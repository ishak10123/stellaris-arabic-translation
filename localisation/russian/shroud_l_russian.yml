 shroud.6020.name: "$UNKNOWN_LONG$"
 shroud.6020.desc: "§HПри попытке установить связь экипаж мостика испытывает приступы головной боли...§!"
 shroud.6030.name: "[exiled_country.GetName]"
 shroud.6030.desc: "§HНесмотря на многократные попытки, [exiled_country.GetName::<1> не отвечает|||pl:<1> не отвечают] на наши запросы.§!"
 shroud.6050.name: "Странные корреляции"
 shroud.6050.desc: "Наш подавляющий псионику §Hдревний отвод§! фиксирует аномальные показания. Обычно это свидетельствовало бы о всплесках псионической активности в мире [Root.GetHomeWorldName], но ее следов мы не обнаружили.\n\nРазгадка может находиться за пределами наших границ. Дальнее сканирование выявило мощный выброс аномальной энергии в системе §H[exiled_system_border.GetName]§!, совпадающий по времени с нарушениями в работе древнего отвода."
 shroud.6050.a: "Надо изучить систему [exiled_system_border.GetName]."
 shroud.shared_text_psy_symptoms: "эмоциональное расстройство, изнуряющий нервный стресс и повторяющиеся кошмарные видения"
 shroud.shared_text_psi_radiation: "Почти то же самое, если верить летописям, переживали наши предки. Вероятно, именно эти явления они называли пси-радиацией — особенно опасной разновидностью энергетического излучения."
 shroud.shared_text_ship_malfunction: "Системы флота также испытывают серьезные сбои; их привычная работа во многом нарушена."
 shroud.6100.name: "Опасная энергия"
 shroud.6100.desc.no_border_aura: "Обстановка в недавно исследованной нами системе §H[from.GetName]§! принимает тревожный оборот: у экипажа корабля [root.GetName] начали проявляться такие симптомы, как $shroud.shared_text_psy_symptoms$. Загадочные и беспорядочные сбои также наблюдаются в бортовых системах.\n\n$shroud.shared_text_psi_radiation$ §H$building_ancient_ward_1$§! защищает нас только на [root.GetPlanetMoon]е §H[owner.GetHomeWorldName]§! — здесь мы беспомощны и впервые испытали тот самый психический недуг, о котором нас предупреждали предшественники.\n\nПосле калибровки датчиков дальнего действия и настройки их на обнаружение этой необычной разновидности энергии мы выявили источник опасного излучения: это система §H[exiled_center_system.GetName]§!. $shroud.6100.desc.end$"
 shroud.6100.desc.border_aura: "Экипажу корабля [root.GetName] грозит опасность.\n\nВ системе §H[from.GetName]§! он подвергся воздействию запредельного уровня пси-радиации, после чего психологический стресс усилился многократно. $shroud.shared_text_ship_malfunction$\n\nСогласно показаниям датчиков дальнего действия, в соседней системе §H[exiled_center_system.GetName]§! уровень излучения еще выше. $shroud.6100.desc.end$"
 shroud.6100.desc.end: "Пока мы не изучим воздействие радиации более тщательно, лучше не посылать корабли на разведку."
 shroud.6100.tt: "Приготовиться к установлению §Yпервого контакта§!."
 shroud.6110.name: "[This.System.GetName]: здесь что-то есть"
 shroud.6110.desc: "К нашему удивлению мы обнаружили в системе §H[This.System.GetName]§! несколько крупных объектов, построенных, вероятно, неким разумным видом. Установив связь с безопасного расстояния, мы могли бы узнать больше об их создателях, пока что условно обозначенных как §H[This.ContactCountry.GetName]§!.\n\nЛюбые формы жизни в этой системе, должно быть, находятся в серьезной опасности из-за зафиксированного нами высокого уровня пси-излучения."
 fcsum_exiled_1: "Мы обнаружили возможные следы присутствия разумной жизни в системе §H[This.System.GetName]§!."
 shroud.6115.name: "Частичный успех"
 shroud.6115.desc: "Более тщательный анализ показал, что объекты в системе §H[This.System.GetName]§! на самом деле инопланетные звездолеты. Попыток установить связь с их экипажами пока не предпринималось.\n\nТем временем до нас дошла очередная тревожная новость: посол [exiled_envoy.GetName] [exiled_envoy.GetAXX::сообщил|||fem:сообщила], что [exiled_envoy.GetAXX::его|||fem:ее] сопровождающие начали страдать от парапсихологических симптомов, в том числе — от необъяснимых видений: им мерещится, что в системе [This.System.GetName] присутствуют загадочные существа. Однако [exiled_envoy.GetName] твердо [exiled_envoy.GetAXX::намерен|||fem:намерена] довести свое дело до конца, невзирая на трудности."
 shroud.6115.a: "Продолжайте работу."
 fcsum_exiled_2: "Мы пока еще не установили контакт с §H[This.ContactCountry.GetName&inst]§!. Посол сообщает, что у сопровождающих тревожные симптомы."
 shroud.6120.name: "Задание прервано"
 shroud.6120.desc: "Спустя несколько месяцев радиомолчания [exiled_envoy.GetName] наконец [exiled_envoy.GetAXX::вышел|||fem:вышла] на связь. Сообщение получилось запутанным и сбивчивым — от прежней хладнокровной прямолинейности не осталось и следа. Из [exiled_envoy.GetAXX::его|||fem:ее] слов мы поняли лишь то, что загадочная система — словно запутанный клубок из переплетенных между собой снов и галлюцинаций. [exiled_envoy.GetAXX::Его|||fem:Ее] сопровождающие не смогли внести ясность — их слова оказались не менее бессвязными.\n\nМы освободили их от обязанностей и приостановили задание на неопределенный срок. Что бы ни ожидало нас в системе §H[This.System.GetName]§!, ясно одно: изучить ее, не подвергая себя опасности, пока невозможно."
 fcsum_exiled_3: "Выполнение задания обернулось глубокой травмой для команды. Мы вернулись, так и не установив контакт с §H[This.ContactCountry.GetName&inst]§!."
 shroud.6125.desc: "Подвешены неподвижно над бурлящим потоком. §H[Root.Capital.GetName]§! — или же?..\n\n§Hзовет…§!\n\nПоверхность вскрывается. Незримые глубины изрыгают зловонные миазмы.\n\n§H…ответ… ничто…§!\n\nБеспрестанное. Удушающее.\n\nЭто кошмар."
 MESSAGE_FIRST_CONTACT_ABORTED_EXILED_DESC: "Установление первого контакта с цивилизацией $COUNTRY|H$ прервано согласно распоряжению властей."
 shroud.shared_text_aura_spread: "Псионическая «инфекция» начала распространяться в системе §H[exiled_system_border.GetName]§!.\n\n§H$building_ancient_ward_1$§! не в состоянии полноценно защитить жителей [Root.GetPlanetMoon]ы §H[Root.GetHomeWorldName]§! от отравления пси-радиацией: у них уже наблюдаются первые, пока еще слабо выраженные симптомы. Если верить научным моделям, скоро чума может распространиться на систему §H[Root.home_planet.System.GetName]§!, и наш родной мир окажется в еще большей опасности."
 shroud.shared_text_aura_study: "Лучшее, что мы сейчас можем сделать, — это более внимательно изучить это опасное явление, подобравшись ближе к источнику, даже невзирая на риски."
 shroud.6200.name: "Пси-радиация на [Root.GetPlanetMoon]е §H[Root.GetHomeWorldName]§!"
 shroud.6200.desc.no_visit: "Обстановка на [Root.GetPlanetMoon]е §H[Root.GetHomeWorldName]§! принимает тревожный оборот: у населения начали проявляться такие симптомы, как $shroud.shared_text_psy_symptoms$.\n\n$shroud.shared_text_psi_radiation$ Те, кого больше не защищает §H$building_ancient_ward_1$§!, впервые испытали тот самый психический недуг, о котором нас предупреждали предшественники.\n\nПосле калибровки датчиков дальнего действия и настройки их на обнаружение этой необычной разновидности энергии мы выявили источник опасного излучения: он лежит за пределами системы §H[exiled_system_border.GetName]§!. $shroud.shared_text_aura_study$"
 shroud.6200.desc.visit_no_ship: "$shroud.shared_text_aura_spread$\n\n$shroud.shared_text_aura_study$"
 shroud.6200.desc.visit_and_ship: "$shroud.shared_text_aura_spread$\n\nЭкипаж корабля §H[event_target:ship_in_border.GetName]§! в системе [exiled_system_border.GetName] подвергся воздействию запредельного уровня пси-радиации, после чего психологический стресс усилился многократно. $shroud.shared_text_ship_malfunction$\n\n$shroud.shared_text_aura_study$"
 shroud.6200.a: "Нужно выяснить, как остановить эту заразу."
 PSI_RADIATION_PROJECT: "Пси-радиация"
 PSI_RADIATION_PROJECT_DESC: "Уровень пси-радиации в системе §H[exiled_system_border.GetName]§! резко поднялся, и обитатели [Owner.GetPlanetMoon]ы §H[Owner.GetHomeWorldName]§! уже почувствовали последствия на себе. Нужно изучить это явление вблизи, пока оно не стало еще опаснее."
 shroud.6205.name: "$PSIONIC_AURA_PLURAL$"
 shroud.6205.desc.start: "Наши исследователи сильно пострадали от губительной пси-радиации в системе §H[exiled_system_border.GetName]§!, но все-таки смогли совершить важное открытие.\n\nГрозящее нам явление, получившее название §H«$PSIONIC_AURA$»§!, — это крупное скопление разрушительной энергии, губительно влияющее не только на умы, но и на технику. Аура зародилась в системе §H[event_target:exiled_center_system.GetName]§!, где концентрация псионической энергии настолько высока, что та расползается по соседним звездным системам."
 shroud.6205.desc.aura_home: "$shroud.6205.desc.start$\n\nОна уже достигла системы §H[Root.home_planet.System.GetName]§!, и воздействие ее оказалось разрушительным. $shroud.6205.desc.end$"
 shroud.6205.desc.no_aura_home: "$shroud.6205.desc.start$\n\nЕсли она достигнет системы §H[Root.home_planet.System.GetName]§!, воздействие будет поистине разрушительным. $shroud.6205.desc.end$"
 shroud.6205.desc.end: "§H$building_ancient_ward_1$§! на [Root.GetPlanetMoon]е §H[Root.GetHomeWorldName]§! защищает население лишь частично."
 shroud.6205.a: "$building_ancient_ward_1$ нуждается в усовершенствовании."
 PSIONIC_AURA_RESISTANCE_PROJECT: "Сопротивление псионической ауре"
 PSIONIC_AURA_RESISTANCE_PROJECT_DESC: "Машина, которую наши предки построили на [Owner.GetPlanetMoon]е §H[Owner.GetHomeWorldName]§! — §H$building_ancient_ward_1$§!, — должна защищать нас от пси-радиации, однако надвигающиеся на систему §Hпсионические ауры§! настолько сильны, что способны перегрузить устройство. Если применить полученные нами знания на практике, возможно, защиту получится усилить."
 shroud.6210.name: "Глушение псионики"
 shroud.6210.desc: "Упорный труд наших исследователей принес свои плоды: они разработали усовершенствованные псионические глушители, благодаря которым §H$building_ancient_ward_1$§! на планете §H[Root.GetHomeWorldName]§! сможет защищать жителей не только самого небесного тела, но и всей системы §H[Root.home_planet.System.GetName]§!.\n\nЭтот успех вдохновил других также взяться за изучение давно позабытой технологии. Теперь мы знаем, что связь между пси-радиацией и [Root.GetSpeciesAdj&neut,inst] сознанием взаимна: излучение влияет на наше психическое состояние, но одновременно с этим наше психическое состояние влияет на уровень пси-радиации. По всей видимости, древнее табу на занятия псионикой всё-таки не предрассудок — у него есть научное обоснование."
 shroud.6210.a: "Любопытно… и тревожно."
 shroud.6210.a.tt: "$BEGINS_EVENT_CHAIN$ §Y$ancient_ward_upgrade_chain_title$§!"
 ancient_ward_upgrade_chain_title: "$building_ancient_ward_2$"
 ancient_ward_upgrade_chain_desc: "§H$building_ancient_ward_1$§! на планете §H[Owner.GetHomeWorldName]§! сегодня упирается в границы своих возможностей. Чтобы противостоять нависшей над нами псионической угрозе, мощности машины придется нарастить. Защитить наше население от §Hпсионических аур§! сумеет §H$building_ancient_ward_2$§!."
 ancient_ward_upgraded: "Сооружение улучшено"
 shroud.6215.name: "$building_ancient_ward_2$: постройка завершена"
 shroud.6215.desc.aura_home: "§H$building_ancient_ward_2$§! действует в полную мощность, и уровень пси-радиации на планете §H[Root.home_planet.System.GetName]§! снизился до приемлемого. §H[Root.GetHomeWorldName]§! постепенно восстанавливается от пережитого воздействия."
 shroud.6215.desc.no_aura_home: "§H$building_ancient_ward_2$§! действует в полную мощность, и уровень пси-радиации на [Root.GetPlanetMoon]е §H[Root.GetHomeWorldName]§! снизился до приемлемого. Население постепенно восстанавливается от пережитого воздействия."
 shroud.6215.desc.end: "Но пусть даже мы в безопасности, §Hпсионическая аура§! — и, возможно, вместе с ней и другие ауры — по-прежнему продолжает отравлять галактику. Наши ученые предполагают, что $building_ancient_ward_2$ может помочь нам защитить другие системы: технологии, лежащие в основе конструкции этой машины, перспективны — на их основе можно соорудить еще более мощное устройство под названием §H«$SHROUD_SEAL$»§!. Эти огромные аппараты будут способны подавлять ауры в целых звездных скоплениях. Построив печать Покрова в системе §H[exiled_system_border.GetName]§!, мы сделаем немалый шаг вперед в деле борьбы с псионической угрозой."
 shroud.6215.a: "Это направление стоит изучить."
 build_shroud_seal_poi_desc: "Изучив технологию §H«$tech_psionic_suppression$»§!, мы сможем с помощью строительного корабля возвести §H$SHROUD_SEAL$§! в гравитационном колодце какой-либо звезды. Это устройство будет подавлять §Hпсионические ауры§! в системе и всех соседних системах, соединенных с ней гиперкоридорами."
 shroud_seal_construction_chain_title: "Строительство печати Покрова"
 shroud_seal_construction_chain_desc: "Наши учёные предполагают, что технологию §Hпсионического подавления§! можно доработать так, чтобы она позволяла нейтрализовывать §Hпсионические ауры§! в целых звёздных скоплениях.\n\nЭто позволит нам создать §H«Печать Покрова»§!. Возведение такого мощного устройства в системе §H[exiled_system_border.GetName]§! станет значительным прорывом в сдерживании псионической угрозы."
 tech_psionic_suppression_researched: "Изучено псионическое подавление"
 shroud_seal_built: "Построена печать Покрова"
 shroud_6216_poi: "[exiled_system_border.GetName]"
 shroud_6216_poi_desc: "$build_shroud_seal_poi_desc$"
 shroud.6220.name: "Сильнейшая радиация"
 shroud.6220.desc: "В системе §H[exiled_system_border.GetName]§! экипаж корабля §H[Root.GetName]§! подвергся воздействию запредельного уровня пси-радиации, после чего психологический стресс усилился многократно. $shroud.shared_text_ship_malfunction$"
 shroud.6225.name: "Радиация в системе §H[Root.home_planet.System.GetName]§!"
 shroud.6225.desc.shared: "Население [Root.GetPlanetMoon]ы §H[Root.GetHomeWorldName]§! страдает от пагубного воздействия пси-радиации. Возможности наших кораблей также серьезно ограничены."
 shroud.6225.desc.know_aura: "§H$PSIONIC_AURA$§! охватила систему §H[Root.home_planet.System.GetName]§!. $shroud.6225.desc.shared$\n\n§H$building_ancient_ward_1$§! нуждается в срочном усовершенствовании как никогда раньше."
 shroud.6225.desc.no_know_aura: "Псионическая скверна охватила систему §H[Root.home_planet.System.GetName]§!. $shroud.6225.desc.shared$\n\nПостичь природу этой инфекции необходимо как можно скорее."
 shroud.6225.a: "Нельзя терять время."
 shroud.6225.a.know_aura.tt: "§HПсионическая аура§! §H[exiled_country.GetName&gen]§! оказывает следующие эффекты:\n$effect_exiled_aura$"
 shroud.6225.a.no_know_aura.tt: "Этот псионический феномен оказывает следующие эффекты:\n$effect_exiled_aura$"
 effect_exiled_aura: "— $MOD_SHIP_FIRE_RATE_MULT$: §R-125%§!\n— $MOD_SHIP_SHIELD_MULT$: §R-200%§!\n— $MOD_SHIP_EVASION_MULT$: §R-100%§!\n— $mod_planet_jobs_produces_mult$: §R-30%§!\n— $mod_planet_pops_upkeep_mult$: §R+100%§!\n— $MOD_PLANET_BUILDING_TIME_MULT$: §R+100%§!"
 shroud.6231.name: "Утрата мира §H[root.GetHomeWorldName]§!"
 shroud.6231.desc: "Мы утратили контроль над нашим родным миром, §H[root.GetHomeWorldName]§!. Поскольку он был главным хранилищем знаний и центром всех устремлений нашего общества, мы не сможем продолжать антипсионическую деятельность, пока не вернем его."
 shroud.6231.a: "Надо вернуть контроль над ним как можно быстрее."
 shroud_6231_poi: "[root.GetHomeWorldName]"
 shroud_6231_poi_desc: "Надо вернуть контроль над миром §H[root.GetHomeWorldName]§! как можно быстрее."
 shroud_reclaim_homeworld_chain_title: "Возвращение мира §H[root.GetHomeWorldName]§!"
 shroud_reclaim_homeworld_chain_desc: "Мы утратили контроль над нашим родным миром, §H[root.GetHomeWorldName]§!. Поскольку он был главным хранилищем знаний и центром всех устремлений нашего общества, мы не сможем продолжать антипсионическую деятельность, пока не вернем его."
 homeworld_reclaimed: "Родной мир возвращен"
 shroud.6241.name: "Мир §H[root.GetHomeWorldName]§! возвращен"
 shroud.6241.desc: "Контроль над нашим родным миром, §H[root.GetHomeWorldName]§!, восстановлен. Теперь [root.GetName::<1> может|||pl:<1> могут] возобновить антипсионическую деятельность в полном объеме."
 shroud.6241.a: "$EXCELLENT$"
 shroud.6300.name: "Shadows of the Shroud"
 shroud.6300.desc: "Наши ученые разработали новую, более современную технологию §Hпсионического подавления§!. Теперь воздействие, которое на нас оказывает $building_ancient_ward_2$, можно будет распространить на любую нашу колонию — для этого достаточно будет построить $building_psionic_suppressor$.\n\nОднако чтобы сдержать распространение §Hпсионических аур§! в других системах, придется соорудить еще более мощное устройство под названием §H«$SHROUD_SEAL$»§!. $shroud.shared_text_shroud_seal$\n\nВ ходе исследований заодно зародилась пугающая гипотеза: нематериальное измерение, состоящее из псионической энергии и именуемое в древних текстах §HПокровом§!, по всей видимости, действительно существует. Сторонники гипотезы предполагают, что когнитивная деятельность разумных существ может вызывать перетоки энергии из Покрова в наблюдаемую реальность. Именно благодаря подобным перетокам и зарождаются псионические ауры.\n\nВывод один: противостоящие нам объективные силы вселенной действуют не бездумно. Против нас, возможно, ведется тщательно просчитанная игра, и конечная цель ее неизвестна."
 shroud.6300.a: "Значит, §HПокров§! — не выдумка?.."
 shroud.6500.name: "Неожиданное сообщение"
 shroud.6500.desc: "Мы получили неожиданное сообщение, посланное далеко из-за пределов системы §H[exiled_system_border.GetName]§!. Каким-то образом государство §H[exiled_country.GetName]§! освоило не только наш язык, но и наши системы связи."
 shroud.shared_screen_figure: "§HРечь фигуры на экране — ровная, гипнотизирующая, с длительными паузами, словно подчеркивающими смысл произносимого.§!\n\nДалекие соседи! Поскольку вы не пожелали установить прямой контакт, мы вынуждены были — к великому своему неудобству — перейти к примитивной технике связи.\n\nМеня зовут §HУк-Хоголат Скарат§!. Я псиарх §H[exiled_country.GetName&gen]§!. Прошу простить мне отсутствие формальностей: дело не терпит отлагательств."
 shroud.shared_auric_flow_inhibition: "препятствует распространению наших аур — и это недопустимо. Вероятно, эту грубую ошибку вы допустили по невежеству.\n\nАура несет галактике благодать. Ее свет должен сиять ярче солнц. Докажите нам, что и вы привержены всеобщему благу — немедленно разрушьте машину, которую вы называете"
 shroud.6505.name: "$shroud.6500.name$"
 shroud.6505.desc: "$shroud.6500.desc$"
 shroud.6510.name: "Псиарх Ук-Хоголат Скарат"
 shroud.6510.desc: "$shroud.shared_screen_figure$ Ваше устройство в системе §H[exiled_system_border.GetName]§! $shroud.shared_auric_flow_inhibition$ «$SHROUD_SEAL$»."
 shroud.6510.a: "Вы никак не пытались с нами связаться."
 shroud.6515.desc: "Мы обратились к вам истинным голосом. Достаточно было лишь прислушаться, чтобы ощутить зов. Вы получили дар, но предпочли отказаться от него."
 shroud.6515.a: "Аура — это чума. Она несет только смерть."
 shroud.6520.desc: "Ваши суждения ошибочны. Аура священна; ее преподнес нам в дар наш защитник. Она губит лишь тех, кто стремится разрушать."
 shroud.6520.a: "Что, если мы откажемся?"
 shroud.6525.desc: "Всякого, кто желает причинить вред ауре, ждет одно: усмирение. Если вы откажетесь, мы будем вынуждены применить военную силу."
 shroud.6525.a: "Печать останется на своем месте."
 shroud.6525_heritage.a: "Мы не станем разрушать наследие предков."
 shroud.6525.b: "Мы согласны уничтожить печать."
 shroud.6530.desc: "Невежественные глупцы."
 shroud.6535.desc: "Мудрое решение."
 shroud.6550.name: "Враждебность отсрочена"
 shroud.6550.desc: "Чтобы избежать прямого конфликта с §H[exiled_country.GetName&inst]§!, мы согласились уничтожить печать Покрова в системе §H[exiled_system_border.GetName]§!.\n\nКонтакт с расой, напрямую ответственной за псионическое проклятие, привел §H[this.GetName&acc]§! в глубокое смятение. Мы подозреваем, что шаткий мир будет недолог: вскоре они заявят, что точно так же им угрожает §H$building_ancient_ward_2$§!, и перейти эту черту мы уже не сможем.\n\nПохоже, избежать предстоящего столкновения невозможно."
 shroud.6550.a: "Мы должны быть готовы."
 shroud.6560.name: "$shroud.6510.name$"
 shroud.6560.desc: "$shroud.shared_screen_figure$ Сооружение на планете §H[capital_scope.GetName]§! $shroud.shared_auric_flow_inhibition$ «$building_ancient_ward_2$»."
 shroud.6560.a: "$shroud.6510.a$"
 shroud.shared_psiarch_transmission: "§HПервое, что мы слышим от псиарха на экране, — это сухой, монотонный упрек.§!\n\n— [This.GetSpeciesNamePlural], вы разочаровываете меня. Мне вновь приходится выходить на связь."
 shroud.shared_auric_flow_disdain: "Своими поступками вы лишь подтвердили свое невежство. Вы препятствуете движению нашей ауры и развитию псионики, а значит — установлению в галактике мира, а потому не оставляете нам выбора.\n\nНаши флотилии уже в пути."
 shroud.6570.name: "$shroud.6510.name$"
 shroud.6570.desc: "$shroud.shared_psiarch_transmission$ Вы уничтожили печать Покрова, однако нам известно, что на вашей планете под названием §H[capital_scope.GetName]§! есть сооружение со схожими возможностями. Выводы очевидны. $shroud.shared_auric_flow_disdain$"
 shroud.6570.a: "Это взаимно. Конец связи."
 shroud.6575.name: "$shroud.6570.name$"
 shroud.6575.desc: "$shroud.shared_psiarch_transmission$ Восстановив печать Покрова, вы лишили нас всех надежд на ваше искупление. $shroud.shared_auric_flow_disdain$"
 shroud.6575.a: "$shroud.6570.a$"
 shroud.6580.name: "Запечатывание системы §H[exiled_center_system.GetName]§!"
 shroud.6580.desc: "С помощью колоссальных псионических подавителей наша §Hпечать Покрова§! начала изгонять §Hпсионическую ауру§! из системы §H[exiled_center_system.GetName]§!.[br]\n\nСканирование подтвердило, что остальная часть территории противника напрямую связана с системой [exiled_center_system.GetName] через гиперкоридоры. Таким образом, одной печати достаточно, чтобы рассеять псионические ауры по всей территории §H[exiled_country.GetName&gen]§!.\n\nНаша победа зависит от сохранности печати."
 shroud.6580.a: "Ее необходимо защитить любой ценой."
 shroud.6600.name: "Собрание Троп разума"
 shroud.6600.desc: "Колония псионической угрозы в мире §H[current_planet.GetName]§! захвачена.\n\nМы выяснили, что §Hпсионическая аура§! в этой системе усиливалась за счет взаимодействия населения с §HПокровом§!. Этими практиками руководила группа элитных телепатов — §HСобрание Троп разума§!. Этот псионический культ проповедует преданность своему «благоволителю» — якобы могущественной сущности из Покрова, известной только как §H$r_the_lost_patron$§!.\n\nВ их священных текстах неоднократно упоминается артефакт, связанный с этой сущностью, — предположительно, он всё еще находится на планете §H[other_planet.GetName]§!. Его захват поможет нам остановить распространение их влияния."
 shroud.6600.a: "Взять курс на планету [other_planet.GetName]."
 shroud.6601.name: "Руины на [current_planet.GetPlanetMoon]е [current_planet.GetName]"
 shroud.6601.desc: "Мы завершили колонизацию [current_planet.GetPlanetMoon]ы §H[current_planet.GetName]§!, ранее принадлежавшей [exiled_country.GetName&dat].\n\nСогласно сохранившимся записям, псионическая аура, ранее присутствовавшая в этой системе, была вызвана взаимодействием местного населения с §HПокровом§!. Эти практики культивировались псионическим культом, проповедовавшим поклонение своему «благоволителю» — якобы могущественной сущности из Покрова по имени §H$r_the_lost_patron$§!.\n\nФрагменты их священных текстов упоминают артефакт, связанный с этим существом, который, судя по всему, всё еще находится на [other_planet.GetPlanetMoon]е §H[other_planet.GetName]§!. Чтобы его получить, надо будет осторожно завоевать [other_planet.GetPlanetMoon]у [other_planet.GetName], сохранив часть местного населения."
 shroud.6601.a: "$shroud.6600.a$"
 shroud.6700.name: "$SANCTUM_OF_THE_LOST$"
 shroud.6700.desc.common: "Захват мира [current_planet.GetName] ознаменовал нашу окончательную победу над [exiled_country.GetName&inst].Мы немедленно запретили все псионические практики в этих мирах, полностью нейтрализовав их отвратительную §Hпсионическую ауру§!.\n\nВ главном мегаполисе планеты находится разрушенная башня, известная как §H$SANCTUM_OF_THE_LOST$§! — некогда главный храм ныне разгромленного псионического культа. Наши солдаты сообщают, что от башни исходит тревожное, неестественное присутствие.\n\nВо внутренней камере сооружения находится герметичный «кокон», излучающий мощные локальные пси-волны. Стандартные боеприпасы не могут пробить его оболочку. Для устранения этой угрозы потребуются дополнительные исследования."
 shroud.6700.desc.contact: "Покорение мира §H[current_planet.GetName]§! ознаменовало нашу окончательную победу над §H[exiled_country.GetName&inst]§!. $shroud.6700.desc.common$"
 shroud.6700.desc.no_contact: "Завоевав мир §H[current_planet.GetName]§!, мы получили контроль над территориями, некогда принадлежавшими §H[exiled_country.GetName&dat]§!. $shroud.6700.desc.common$"
 shroud.6700.desc.contact_no_name: "Завоевание мира §H[current_planet.GetName]§! ознаменовало нашу окончательную победу над ?.$shroud.6700.desc.common$"
 shroud.6700.desc.no_exiled: "Завоевав мир §H[current_planet.GetName]§!, мы завладели территориями, которые раньше принадлежали псионическим фанатикам.$shroud.6700.desc.common$"
 shroud.6700.a: "Тревожные новости… Продолжить изучение."
 shroud.6705.name: "$psionic_threat_eliminated$"
 shroud.6705.desc.common: "Предварительное обследование выявило следы разветвленной сети сооружений на планете — вероятно, центра влияния псионической заразы. Теперь от них остались лишь развалины.\n\nНам уже не суждено узнать, какие порочные тайны скрывали эти сооружения или какую природу имели трусливые практики их обитателей. Тем не менее, система теперь очищена от последних следов их псионической ауры, и мы больше не пострадаем от ее воздействия."
 shroud.6705.desc.contact: "Уничтожение населения на [current_planet.GetPlanetMoon]е §H[current_planet.GetName]§! положило конец государству, известному как §H[exiled_country.GetName]§!.\n\n$shroud.6705.desc.common$"
 shroud.6705.desc.no_contact: "Уничтожение населения на [current_planet.GetPlanetMoon]е §H[current_planet.GetName]§! положило конец разрушительной псионической угрозе.\n\n$shroud.6705.desc.common$"
 shroud.6705.a: "Да постигнет та же участь все подобные угрозы."
 psionic_threat_eliminated: "Псионическая угроза ликвидирована"
 psionic_threat_eliminated_desc: "Уничтожение псионического государства избавило галактику от его ауры, обезопасив и успокоив разумы нашего населения."
 SANCTUM_OF_THE_LOST: "Святилище Грезящей"
 SANCTUM_OF_THE_LOST_DESC: "Внутри разрушенного Святилища Затерянной на планете §H[sanctum_of_the_lost_planet.GetName]§! мы обнаружили нечто вроде плотно запечатанного кокона. Уровень испускаемой им пси-радиации опасно высок; чтобы нейтрализовать все возможные угрозы, понадобится провести полевые исследования."
 shroud.6710.name: "Внутренняя сила"
 shroud.6710.desc: "Наши исследователи тщательно изучили «кокон» на планете §H[sanctum_of_the_lost_planet.GetName]§!.\n\nСканирование внешней его части пролило свет на настоящее предназначение этого внушительного сооружения: перед нами — надежное хранилище для могущественной псионической сущности, и испускаемая этой сущностью радиация проникает наружу даже через изолирующие слои из тяжелых сплавов.\n\nУстановив по периметру кокона несколько псионических глушителей, мы включили их… и мгновенно испытали сильнейшую боль, словно наши нервы охватил огонь.\n\nСам же кокон на глазах начал меняться, превращаясь из яйцевидного в спиралеобразный. Единственное на его поверхности отверстие раскрылось, и обитающая внутри сущность вышла с нами на связь…"
 cannot_found_mindwarden_enclave: "Сначала нужно обеспечить психическую безопасность государства"
 shroud.6800.name: "$MINDWARDENS_THE_FIRST_ENCLAVE$"
 shroud.6800.desc: "Мы накопили обширные знания о §HПокрове§! и разработали технологии для подавления его пагубного влияния. Пока мы обсуждаем, как применить эти знания в масштабах галактики, командующие флотилиями выдвинули интересное предложение.\n\nОни советуют преобразовать одну из наших флотилий в независимый §H«$gov_mindwarden_enclave$»§!, который будет оказывать антипсионическую поддержку по всей галактике. $shroud.shared_enclave_investement$"
 shroud.6800.a: "Достойное начинание."
 shroud.6800.a.tt: "Любую флотилию размером §Y30§! или больше можно превратить в §H$gov_mindwarden_enclave$§!."
 shroud.6825.name: "Основание анклава Защитников разума"
 shroud.6825.desc_first: "Флотилия §H[This.GetName]§! была выбрана в качестве основы для первого §Hанклава Защитников разума§!. После утверждения флотилия развернёт новую станцию в системе §H[This.Solar_System.GetName]§! и немедленно начнёт оказывать антипсионические услуги."
 shroud.6825.desc_default: "Мы рассматриваем возможность преобразовать флотилию §H[This.GetName]§! в независимый §H«$gov_mindwarden_enclave$»§!, который будет бороться с псионическими угрозами по всей галактике. $shroud.shared_enclave_investement$"
 shroud.6825.a: "Приступить к строительству."
 shroud.6825.a.tt: "§H$gov_mindwarden_enclave$§! основан."
 shroud.6825.b: "Подумаем над этим еще раз."
 shroud.6830.name: "$MINDWARDEN_plural$"
 shroud.6830.desc: "Борьба с §HПокровом§! и безответственным использованием псионики закалила наш народ и прояснила наши цели. Создание первого §Hанклава Защитников разума§! знаменует новую эпоху защиты и сопротивления.\n\nОтныне ни один разум в галактике не будет захвачен псионическими агрессорами и ни один мир не пострадает от сил Покрова.\n\nНаступает эпоха Защитников разума."
 shroud.6830.a: "Наш путь только начинается."
 shroud.shared_enclave_investement: "Первоначальный взнос обеспечит строительство космической станции, а взамен мы будем получать долю от выручки. Возводить такие сооружения они смогут в огромных масштабах: это позволяет их независимость.\n\nЕстественно, пользоваться предлагаемыми услугами сможем и мы — и получать причитающуюся нам часть вложенных средств."
 shroud.6841.name: "Анклав [mindwarden_enclave_country.GetName&gen] выплачивает дивиденды"
 BEGINS_EVENT_CHAIN: "Начинается цепочка событий:"
 ENDS_EVENT_CHAIN: "Заканчивается цепочка событий:"
 the_exiled_become_hostile: "§H[exiled_country.GetName]§! [exiled_country.GetName::становится враждебным|||fem:становится враждебной|||pl:становятся враждебными] к нам."
 start_psionic_war_chain: "$BEGINS_EVENT_CHAIN$ §Y$the_psionic_war_chain_title$§!"
 shroud_seal_dismantled: "§HПечать Покрова§! в системе §H[exiled_system_border.GetName]§! уничтожена."
 the_psionic_war_chain_title: "$NAME_Psionic_War$"
 the_psionic_war_chain_desc: "Война против §H[exiled_country.GetName&gen]§! началась.\n\nПсионическую чуму надо уничтожить в зародыше. Мы должны установить печать Покрова в системе §H[exiled_center_system.GetName]§!, чтобы нейтрализовать псионическую ауру. Только тогда мы сможем очистить галактику от этой угрозы."
 the_psionic_war_chain_poi_1: "Построить печать Покрова"
 the_psionic_war_chain_poi_1_desc: "§H$SHROUD_SEAL$§! в системе §H[exiled_center_system.GetName]§! подавит §Hпсионическую ауру§! в этой звёздной системе и во всех, что связаны с ней гиперкоридорами."
 the_psionic_war_chain_poi_2: "Контроль над планетой §H[exiled_planet_1.GetName]§!"
 the_psionic_war_chain_poi_2_desc: "§H[exiled_country.GetName]§! не [exiled_country.GetName::намерен|||fem:намерена|||neut:намерено|||pl:намерены] прекращать псионическое наступление. Только завоевание их планет может предотвратить возрождение §Hпсионических аур§! в будущем."
 the_psionic_war_chain_poi_3: "Контроль над планетой §H[exiled_planet_2.GetName]§!"
 the_psionic_war_chain_poi_3_desc: "§H[exiled_country.GetName]§! не [exiled_country.GetName::намерен|||fem:намерена|||neut:намерено|||pl:намерены] прекращать псионическое наступление. Только завоевание их планет может предотвратить возрождение §Hпсионических аур§! в будущем."
 shroud_seal_reconstruction_chain_title: "Восстановление печати Покрова"
 shroud_seal_reconstruction_chain_desc: "Мы были вынуждены демонтировать §Hпечати Покрова§!, чтобы усмирить §H[exiled_country.GetName&acc]§!, но эта жертва позволила нам выиграть время. Сооружение необходимо восстановить, прежде чем мы сможем войти на их территорию и очистить её от §Hпсионических аур§!.\n\n§PОднако восстановление будет воспринято как акт агрессии. Мы должны быть готовы к ответным мерам.§!"
 shroud_seal_reconstruction_chain_poi_1: "[event_target:exiled_system_border.GetName]"
 shroud_seal_reconstruction_chain_poi_1_desc: "$build_shroud_seal_poi_desc$"
 SHROUD_WORLDS_IN_SYSTEM: "Окутанные миры: §G$QUANTITY|0$§!"
 NAME_Psionic_War: "Псионическая война"
 wg_psionic_war: "$NAME_Psionic_War$"
 war_goal_wg_psionic_war: "$NAME_Psionic_War$"
 war_goal_wg_psionic_war_desc: "Война ведется с целью очищения галактики от псионического агрессора."
 shroud.6720.name: "$UNKNOWN_LONG$"
 shroud.6720.desc: "§HВы слышите, но не слушаете. Почему?§!"
 shroud.6720.a: "Мы не потерпим, чтобы наши умы отравляли!"
 shroud.6720.b: "Что ты такое?"
 shroud.6720.c: "Что ты здесь делаешь?"
 shroud.6720.d: "Что тебе нужно?"
 shroud.6720.e: "Ты из Покрова?"
 shroud.6720.f: "Хватит разговоров."
 shroud.6723.desc: "§HОтравляли? О нет, всё совсем не так...\n\nЭто песня. Чтобы петь, вы должны слушать. Забудьте о себе и познайте ее великолепие.§!"
 shroud.6725.desc: "§HКогда вращается колесо... мы слушаем.\n\nКогда вращаются звезды... мы поём.§!"
 shroud.6725.a: "Какое «колесо»?"
 shroud.6725.b: "Довольно."
 shroud.6730.desc: "§HНеостановимое, вечно вращающееся — наверху и внизу. Гармония, что зовется «Покров».§!"
 shroud.6735.desc: "§HЯ... грежу. Грежу о песне. Но голоса смолкли. Что стало с хором?§!"
 shroud.6735.a: "Тех, кто тебя заточил, уже давно нет."
 shroud.6735.b: "Что это за песни?"
 shroud.6735.c: "Довольно."
 shroud.6740.desc: "§HНо вы — здесь. Вы сможете запеть…§!"
 shroud.6745.desc: "§HПоток между миром яви и миром грёз… Тропа, что ведет отсюда — туда.\n\nВам они не слышны — ваш ум не может их охватить…§!"
 shroud.6750.desc: "§HЯ хочу услышать пение, но вокруг тишина… Почему?..§!"
 shroud.6750.a: "Что ты можешь предложить нам взамен?"
 shroud.6750.b: "Достаточно."
 shroud.6755.desc: "§HЯ могу показать вам… свои грёзы. Как создаются миры.§!"
 shroud.6755.a: "Откуда нам знать, что тебе можно доверять?"
 shroud.6760.desc: "§HДостаточно лишь прислушаться. Песня — это истина, потому что она прекрасна. Прекрасная истина.\n\nВаши разумы закрыты, но их еще можно открыть.§!"
 shroud.6763.desc: "§HЯ всё еще там… Слушаю песни двух миров. Этот — заглушен.§!"
 shroud.6763.a: "Тебе здесь не место."
 shroud.6765.desc: "§HВ ваших словах есть истина.§!"
 shroud.6770.name: "$r_the_lost_patron$"
 shroud.6770.desc: "Кокон, найденный в мире §H[sanctum_of_the_lost_planet.GetName]§!, содержит в себе мощную межпространственную сущность. С высокой вероятностью именно это существо было источником псионической ауры, угрожавшей неприкосновенности нашего разума.\n\nНаши псионические подавители пока сдерживают исходящую от него опасность, но неизвестно, как долго оборудование сможет ограничивать его влияние. В контролируемых условиях мы потенциально могли бы обратить его ужасающую силу в свою пользу.\n\nОднако многие в нашем обществе требуют немедленно уничтожить объект. Само его существование противоречит нашим фундаментальным принципам."
 shroud.6770.a: "Уничтожить это чудовище."
 shroud.6770.b: "Найти полезное применение этому… существу."
 destroyers_of_the_lost_modifier: "Уничтожители Затерянной"
 destroyers_of_the_lost_modifier_tt: "Получить доступ к уровню жизни §Y$living_standard_shroud_inoculation$§!, который лишает всех §Yпсионических§! способностей."
 destroyers_of_the_lost_modifier_desc: "Победа над псионическим врагом и уничтожение источника его ауры после долгих лет мучений подняли боевой дух нашего государства."
 living_standard_shroud_inoculation: "Покровные прививки"
 living_standard_shroud_inoculation_tooltip: "Эта раса получает прививки против вредоносных эффектов пси-излучения.\n\n§RДля предотвращения дальнейших повреждений все псионические признаки будут удалены.§!"
 living_standard_shroud_inoculation_tooltip_delayed: "§LМы оградим и защитим эту расу от псионики.§!"
 psionic_heresy: "Псионическая ересь"
 shroud.6780.name: "$r_the_lost_patron$"
 shroud.6780.desc: "Сквозь наши сознания струится поток мыслей.\n\nМы слышим мелодию — яркую, резкую.\n\nНам хорошо знакома эта мучительная боль.\n\n§HВы услышали. Эта греза — ваша… Пойте, пойте…§!"
 shroud.6780.a: "Что ты сделала?"
 shroud.6785.desc: "§HТо, что и обещала: я грезила для вас.§!"
 shroud.6785.a: "И что именно было в твоих «грёзах»?"
 shroud.6790.desc: "§HМиры. Новые миры, расположившиеся между моим и вашим.§!"
 shroud.6790.a: "Какая нам польза от этих миров?"
 shroud.6795.desc: "§HЯ буду им петь. Я спою самую яркую песню.§!"
 shroud.6795.a: "Только бы мы об этом не пожалели."
 shroud.6795.a.tt: "Добавить до трех §Hокутанных миров§! в пределах наших границ, но не больше одного в каждой системе."
 r_the_lost_patron: "Грезящая"
 r_the_lost_patron_desc: "Это божественное существо — материальное воплощение сущности из Покрова, бывшего «благоволителя» исчезнувшего псионического государства. Точные обстоятельства его появления в нашей реальности неизвестны, но уникальная связь с псионическим царством наделяет его невероятной силой."
 the_lost_patron_passive_effect: "Дальность действия §Hпечатей Покрова§!: §G+1§!\n§H$SHROUD_SEAL_PLURAL$§! производят £unity£ §Y$unity$§!: §G+25§!\n§H$SHROUD_SEAL_PLURAL$§! повышают £navy_size£ §Y$NAVY_SIZE_TITLE$§!: §G+10§!"
 the_lost_patron_before_activation_tt: "Неизвестно, что случится…"
 the_lost_patron_after_activation_effect_tt: "Открывает одно £decision£ §Yпланетарное решение§!: «['concept_dreamscaping_decision']»"
 decision_dreamscaping: "Преображение грёзами"
 decision_dreamscaping_desc: "Превратить §Yокутанный мир§! в §Yидеальный мир§!"
 concept_dreamscaping_decision: "$decision_dreamscaping$"
 concept_dreamscaping_decision_desc: "$decision_dreamscaping_desc$"
 HAS_NOT_NUM_NEIGHBOR_SYSTEMS: "Количество соседних систем $VAL0|2Y$ — НЕ $COMPARE$ $VAL1|2Y$"
 HAS_NEIGHBOR_SYSTEMS: "Количество соседних систем $VAL0|2Y$ — $COMPARE$ $VAL1|2Y$"
 #======================
 # Endbringers origin
 #======================
 origin_endbringers: "Несущие погибель"
 origin_endbringers_desc: "$CHALLENGING_ORIGIN$§RВнимание! Будет доступен только ['concept_psionic_ascension', псионический] путь возвышения.§!\n\nЭта цивилизация долгое время была одержима таинственной катастрофой, превратившей соседнюю планету в безжизненный, окутанный тьмой мир. Теперь, выйдя в космос, они наконец могут исследовать ее секреты и узнать, не ждет ли их подобная участь."
 origin_tooltip_endbringers_negative_effects: "—- Государство начинает с модификатором ['concept_paranoia_modifier']\n— Нельзя создавать ['concept_federation', федерации] или вступать в них"
 concept_paranoia_modifier: "$endbringers_paranoia$"
 concept_paranoia_modifier_desc: "Поколение за поколением, наблюдая за древней катастрофой, испытывают сгущающийся страх перед неминуемой гибелью.\n\nМодификатор счастья постепенно ухудшается: с §R-5%§! до §R-50%§!"
 endbringers_paranoia: "Паранойя"
 endbringers_paranoia_desc: "Поколение за поколением, наблюдая за древней катастрофой, испытывают всепоглощающий страх перед неминуемой гибелью. Неужели мы — следующие?"
 endbringers_paranoia_tt: "$chamber_of_silence_negative_effects_reduction$"
 START_SCREEN_ENDBRINGERS: "Мы — предвестники катастрофы.\n\nНа заре существования [GetSpeciesAdj&fem,gen] цивилизации соседнее небесное тело — планету [event_target:shrouded_planet.GetName] — постигло необъяснимое бедствие. Нас объял ужас; каждый жил в страхе, что однажды такая же участь постигнет и наш родной мир, и с годами боязнь перед возможной гибелью становилась только сильнее.\n\nСо временем мы, [GetSpeciesNamePlural], сумели выйти в космос, и теперь нас ведет не столько страх, сколько любопытство: что таит этот загадочный «окутанный мир»? Ответы на вопросы, мучившие нас столетиями, дразняще близки, но узнать их мечтают далеко не все: многие искренне уверены, что граничащее с одержимостью желание добраться до источника разрушительной силы равносильно гибели нашего народа.\n\nСовсем скоро мы откинем последнюю завесу."
 shroud.8010.title: "Миссия на планету [shrouded_planet.GetName]"
 shroud.8010.desc: "Разведывательные спутники на орбите планеты §H[shrouded_planet.GetName]§! обнаружили перспективную цель для первой пилотируемой миссии на поверхность этого «окутанного мира». Посадочная зона излучает странную радиацию, которая распространяется по планете, подхваченная ультрафиолетовыми ветрами.\n\nМногие [Root.GetSpeciesNamePlural] протестуют против этой миссии, опасаясь навлечь такую же катастрофу на наш родной мир. Их опасения не лишены оснований, но необходимость понять это далекое явление должна быть приоритетом.\n\nЕсли нас однажды постигнет та же участь, по крайней мере, мы умрем, зная причины."
 shroud.8010.a: "Поиск ответов начинается."
 the_shrouded_world_site: "Окутанный мир"
 the_shrouded_world_site_desc: "Наконец-то мы можем дотянуться до «окутанного мира» под названием §H[planet.GetName]§!. Что-то там зовет нас, и этот голос звучит теперь сильнее, чем когда-либо.\n\nТайны катастрофы, постигшей этот мир, раскроют многое из истории нашей собственной системы и, возможно, ослабят одержимость нашего общества предсказанным уничтожением. Орбитальное сканирование выявило высокоэнергетические завихрения, сосредоточенные в одной точке на южном полушарии — словно зловещий глаз, смотрящий на нас."
 shroud.8100.name: "Конец близок"
 shroud.8100.desc: "Рельеф планеты §H[shrouded_planet.GetName]§! оказался именно таким опасным, как и предполагалось. Вихри сумеречных частиц прорезают воздух, из-за чего §H[Leader.GetName]§! [Leader.GetAXX::вынужден|||fem:вынуждена] замедлить продвижение команды.\n\nНаша исследовательская группа начала сообщать о тревожных несоответствиях в восприятии: они описывают далекие завывания, принесенные ветром, и силуэты, крадущиеся в тумане. Неужели мы совершили ошибку, заявившись сюда?\n\nПервые трансляции с места высадки вызвали массовую панику в мире §H[Owner.GetHomeWorldName]§!. Многие боятся, что мы можем навлечь на себя те же разрушительные силы, что когда-то обрушились на планету [shrouded_planet.GetName]. Организованные протесты с лозунгами о том, что «Конец близок», парализуют инфраструктуру нашего родного мира.\n\nТелеметрические сканы обнаружили полость с аномально высоким уровнем радиации в глубине ближайшего горного хребта. Мы полны решимости идти дальше, какой бы ни была цена."
 shroud.8100.a: "Начинайте копать. Мы должны узнать, что нас ждет."
 the_end_is_nigh: "Конец близок"
 the_end_is_nigh_desc: "Над нашим обществом нависло предчувствие неминуемой гибели."
 shroud.8105.name: "Инопланетное сооружение"
 shroud.8105.desc: "Мы здесь не первые.\n\nГорная полость на планете §H[shrouded_planet.GetName]§! была вскрыта, и в ней мы обнаружили заброшенное инопланетное сооружение, уничтоженное катастрофой. Мы решили засекретить эту информацию, чтобы избежать дальнейшей паники.\n\nПредварительный анализ подтверждает, что материалы сооружения не соответствуют молекулярному составу местных минералов, что указывает на его инопланетное происхождение. Назначение этого места остается неясным, но, похоже, оно функционировало почти полностью автономно.\n\nМежду тем, психологическое состояние команды ухудшается. Некоторые слышат голоса на зашифрованных частотах, другие сообщают об искаженном восприятии реальности. Приступы беспричинного смеха становятся тревожно частыми.\n\nМы зашли слишком далеко, чтобы поворачивать назад."
 shroud.8110.name: "Наблюдатели"
 shroud.8110.desc: "Они все мертвы.\n\nНа каждом посту в сердце комплекса сидят высохшие трупы неизвестной расы, их поблекшие глаза устремлены в потолок. Несмотря на пугающий вид, §H[Leader.GetName]§! [Leader.GetAXX::уверен|||fem:уверена], что это не галлюцинации. Изображения этих существ были строго засекречены.\n\nНикакого оружия не обнаружено, из чего можно сделать вывод, что их присутствие на планете §H[shrouded_planet.GetName]§! не было сопряжено с враждебными намерениями. Вероятно, это была наблюдательная станция, чье оборудование было направлено прямо на мир §H[Owner.GetHomeWorldName]§!. Радиоуглеродный анализ показывает, что они были здесь задолго до катастрофы.\n\nМы расшифровали большую часть их записей: помимо обычных отчетов там содержатся данные о ранней истории нашей цивилизации."
 shroud.8110.a: "Они наблюдали за нами?"
 shroud.8115.name: "Силы за гранью понимания"
 shroud.8115.desc: "База данных на планете §H[shrouded_planet.GetName]§! расшифрована и подтверждает многие из наших «мифов». Мы были объектом эксперимента в области ментальной науки, известной как «$tech_psionic_theory$».\n\nНаш вид обладал скрытым потенциалом. Многие из наших предков ощущали эти сигналы в снах или как голоса — явления, которые можно было принять за психические расстройства. Однако эксперимент был прерван: в последние дни это место из наблюдательной станции превратилось в убежище для выживших.\n\nИх отчеты обрываются после неудачного эксперимента в их родном мире, связанного с рискованными манипуляциями границей между реальностями — §H«Покровом»§!. Их ученые назвали это событие «Расплатой», и мы подозреваем, что это и было истинной причиной катастрофы.\n\nКаким бы ни был этот инцидент, его влияние вскоре достигло планеты §H[shrouded_planet.GetName]§!. Их последняя запись гласит:\n\n§LКонец настал.§!"
 shroud.8115.a: "Неужели он придет и за нами?"
 shroud.8120.name: "$fragment_of_reckoning$"
 shroud.8120.desc: "Мы нашли неопровержимые доказательства, указывающие на источник катастрофы. Его было нетрудно обнаружить — §H[Leader.GetName]§! утверждает, что оно само позвало [Leader.GetAXX::его|||fem:ее].\n\nВ глубине комплекса обнаружена пульсирующая нематериальная субстанция, не поддающаяся анализу. Это ни материя, ни энергия: §H[Leader.GetName]§! [Leader.GetAXX::описал|||fem:описала] ее как §H'$fragment_of_reckoning$'§! — остаточный сгусток поглощённых сознаний.\n\nЕго создали, чтобы сдерживать и направлять энергии §HПокрова§!, и планировали использовать в качестве защиты от Расплаты, но он выполнил свою роль лишь частично. В последние мгновения этого мира враждебная сущность была изгнана из этого измерения, но забрала с собой разумы ученых. Теперь остался только этот фрагмент.\n\nОн усиливает видения исследователей, открывая им «второе зрение» за пределами обычной реальности. Это опасно, но в то же время многообещающе."
 shroud.8120.a: "Нам еще многое предстоит изучить..."
 ENDBRINGERS_RESEARCH_PSIONIC_THEORY: "$tech_psionic_theory$"
 ENDBRINGERS_RESEARCH_PSIONIC_THEORY_DESC: "Фрагмент псионической энергии, обнаруженный на планете §H[shrouded_planet.GetName]§!, хранит тайны, которые мы обязаны раскрыть.\n\nНас ограничивает наш собственный разум."
 ENDBRINGERS_PSIONIC_THEORY_PROJECT_TOOLTIP: "Для завершения: исследуйте технологию §H£society_research£ $tech_psionic_theory$§!."
 ENDBRINGERS_ADOPT_PSIONICS_TRADITION: "$ENDBRINGERS_RESEARCH_PSIONIC_THEORY$"
 ENDBRINGERS_ADOPT_PSIONICS_TRADITION_DESC: "$ENDBRINGERS_RESEARCH_PSIONIC_THEORY_DESC$"
 ENDBRINGERS_PSIONICS_TRADITION_PROJECT_TOOLTIP: "Для завершения: примите традицию §H$tradition_psionics_shroud$§!."
 shroud.8200.title: "Царство безумия"
 shroud.8200.desc: "Исследования в области псионики подтвердили существование невидимых измерений реальности, вратами к которым служит наш разум. По ту сторону завесы лежит хаотичное царство, природу которого мы едва ли можем постичь.\n\nИз глубин доносится §RГолос§!. Он сулит не спасение, но новое начало. Овладеть его непостижимой силой — значит отвергнуть всё, чем мы были, и принять судьбу, высеченную в самой ткани безумия.\n\n§RПОРА.§!"
 shroud.8200.a: "Что мы наделали?"
 shroud.8200.a.tt: "Можно использовать дерево традиций §H$tradition_psionics_shroud$§!."
 chamber_of_silence_negative_effects_reduction: "Каждый ['building:building_chamber_of_silence', зал безмолвия] снижает отрицательные эффекты на §G$@chamber_of_silence_effect_mult|0%$§!"
 endbringers_madness_1: "Безумие"
 endbringers_madness_1_desc: "Наше государство движимо единой целью: найти §RГолос§!. Наши умы не обретут покоя, пока мы не получим ответы."
 endbringers_madness_1_tt: "$chamber_of_silence_negative_effects_reduction$"
 endbringers_madness_2: "$endbringers_madness_1$"
 endbringers_madness_2_desc: "Мы стали ближе к §RГолосу§!. Навязчивые импульсы ослабевают."
 endbringers_madness_2_tt: "$endbringers_madness_1_tt$"
 endbringers_madness_3: "$endbringers_madness_1$"
 endbringers_madness_3_desc: "Мы почти слышим §RГолос§!. Скоро мы поймем."
 endbringers_madness_3_tt: "$endbringers_madness_1_tt$"
 ALLOW_CHAMBER_OF_SILENCE: "Доступно сооружение: ['building:building_chamber_of_silence']."
 tr_psionics_endbringers_cult: "Культ Голоса"
 tr_psionics_endbringers_cult_desc: "$ALLOW_CHAMBER_OF_SILENCE$"
 tr_psionics_endbringers_cult_delayed: "После того, как Голос услышан, его уже невозможно игнорировать. Мы покоряемся его воле."
 building_chamber_of_silence: "Зал безмолвия"
 building_chamber_of_silence_desc: "Псионики со всего государства прибывают сюда, чтобы в защищенных тишиной залах вступить в контакт с Покровом."
 building_chamber_of_silence_madness_1_tt: "Отрицательные эффекты от ['modifier:endbringers_madness_1', Безумия] снижаются на §G$@chamber_of_silence_effect_mult|0%$§!."
 building_chamber_of_silence_madness_2_tt: "Отрицательные эффекты от ['modifier:endbringers_madness_2', Безумия] снижаются на §G$@chamber_of_silence_effect_mult|0%$§!."
 building_chamber_of_silence_madness_3_tt: "Отрицательные эффекты от ['modifier:endbringers_madness_3', Безумия] снижаются на §G$@chamber_of_silence_effect_mult|0%$§!."
 building_chamber_of_silence_paranoia_tt: "Отрицательные эффекты от ['modifier:endbringers_paranoia', Паранойи] снижаются на §G$@chamber_of_silence_effect_mult|0%$§!."
 building_chamber_of_silence_destroyed_tt: "§RВ случае утраты колонии это сооружение будет разрушено.§!"
 shroud.8310.name: "$shroud.2750.name$"
 shroud.8310.desc: "Нас призвали к высшим уровням существования. Тех, кто тщетно пытается сопротивляться, устраняют, чтобы сохранить чистоту нашего вознесения. Наша судьба предрешена — путь назад осыпался во тьму окутанного мира.\n\nТеперь §RГолос§! обращается к нам с пугающей ясностью:\n\n§RПУТЬ ОПРЕДЕЛЕН.§!\n\nОн жаждет добровольной жертвы."
 shroud.8310.a: "Это неизбежно."
 shroud.8310.a.tt: "В колониях погибнет от 100 до 300 £pop£ §Hпоселений§!."
 situation_breach_shroud_endbringers: "$situation_breach_shroud$"
