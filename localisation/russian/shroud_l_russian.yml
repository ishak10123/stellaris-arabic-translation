 BIO_PSIONIC_TORPEDO_DESC: "$PSIONIC_BIO_LAUNCHER_DESC$"
 PSIONIC_SAPPERS: "Псионические подрывники"
 PSIONIC_SAPPERS_DESC: "Эти маневренные биологические торпедоносцы специализируются на доставке концентрированных зарядов псионической энергии. Чем крупнее цель, тем мощнее резонанс и сила взрыва."
 PSIONIC_SAPPERS_SMALL: "$PSIONIC_SAPPERS$"
 PSIONIC_SAPPERS_MEDIUM: "$PSIONIC_SAPPERS$"
 PSIONIC_SAPPERS_LARGE: "$PSIONIC_SAPPERS$"
 PSIONIC_SAPPERS_EXTRA_LARGE: "$PSIONIC_SAPPERS$"
 PSIONIC_BIO_LIGHTNING: "Псионическая биомолния"
 PSIONIC_BIO_LIGHTNING_DESC: "Смертоносное сочетание электрических разрядов и эфирной энергии. Эти биоэлектрические железы создают насыщенные псионическими свойствами заряды плазмы, превращая их в оружие."
 PSIONIC_BIO_LIGHTNING_SMALL: "$PSIONIC_BIO_LIGHTNING$"
 PSIONIC_BIO_LIGHTNING_MEDIUM: "$PSIONIC_BIO_LIGHTNING$"
 PSIONIC_BIO_LIGHTNING_LARGE: "$PSIONIC_BIO_LIGHTNING$"
 PSIONIC_BIO_LIGHTNING_EXTRA_LARGE: "$PSIONIC_BIO_LIGHTNING$"
 PSIONIC_BIO_DISRUPTOR: "Псионические биодезинтеграторы"
 PSIONIC_BIO_DISRUPTOR_DESC: "Эти высокотехнологичные дезинтеграторы пропускают мощный луч псионической энергии сквозь корпуса вражеских кораблей, позволяя точечно выводить из строя вооружение противника."
 PSIONIC_BIO_DISRUPTOR_SMALL: "$PSIONIC_BIO_DISRUPTOR$"
 PSIONIC_BIO_DISRUPTOR_MEDIUM: "$PSIONIC_BIO_DISRUPTOR$"
 PSIONIC_BIO_DISRUPTOR_LARGE: "$PSIONIC_BIO_DISRUPTOR$"
 PSIONIC_BIO_DISRUPTOR_EXTRA_LARGE: "$PSIONIC_BIO_DISRUPTOR$"
 PSIONIC_BIO_LAUNCHER: "Капсулы зро"
 PSIONIC_BIO_LAUNCHER_DESC: "Эти высококонцентрированные гранулы зро существуют одновременно в нескольких реальностях, что позволяет большинству из них беспрепятственно проходить сквозь вражеские щиты. При контакте с физическим объектом разрушительный эффект возрастает в геометрической прогрессии."
 PSIONIC_BIO_LAUNCHER_SMALL: "$PSIONIC_BIO_LAUNCHER$"
 PSIONIC_BIO_LAUNCHER_MEDIUM: "$PSIONIC_BIO_LAUNCHER$"
