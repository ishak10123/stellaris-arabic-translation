l_russian:
 ##################################
 # ENGLISH LOCALISATION - Shroud #
 ##################################
 SHROUD_TITLE: "Shadows of the Shroud"
 ap_interdimensional_processing: "Межпространственные вычисления"
 ap_interdimensional_processing_desc: "Наш вычислительный потенциал ограничен, если замыкаться лишь в трёх физических измерениях. Куда больше возможностей откроется, если протянуть нашу сеть в пространства по ту сторону бездны."
 requires_not_ap_interdimensional_processing: "$TRIGGER_FAIL$Не должно быть бонуса за стремление §Y«$ap_interdimensional_processing$»§!."
 vo_psionic_voice: "Псионик"
 #==========================
 # Advanced Governments
 #==========================
 shroud.7099.name: "Псионические отклики"
 shroud.7099.desc: "Наши мысли теперь движутся сквозь §HПокров§! с осознанным намерением. Но стоит нам сделать шаг вперед — как он отвечает нам тем же. Сначала мы воспринимаем это как сопротивление нашему присутствию, но потом понимаем: Покров задает нам вопросы.\n\nПусть их смысл и туманен, эти вопросы — не пустяки. По словам [GetTelepathPlural&gen], наши ответы повлияют на будущее всего нашего общества."
 shroud.7099.a: "Мы должны ответить."
 # Shroud Songs events
 shroud.7100.title: "Песнь Покрова: [GetRolledShroudSongName]"
 shroud.7100.desc.common: "В наших [GetMindEyeLoc&prep] формируется образ, и мы осознаём, что перед нами §H[GetRolledShroudSongName]§!.\n\n§P[GetRolledShroudSongDesc]§!"
 shroud.7100.desc: "Наша связь с §HПокровом§! крепка; мы готовы внять его зову. Послание приходит ритмичными фразами. Покров поет нам.\n\n$shroud.7100.desc.common$"
 shroud.7100.a: "[GetRolledShroudSongOptionA]"
 shroud.7100.b: "[GetRolledShroudSongOptionB]"
 shroud.7100.tt: "Покров ждёт нашего ответа..."
 shroud.7105.desc: "Нечто незримое вздрагивает, и из шепота рождается новая мысль.\n\n$shroud.7100.desc.common$"
 shroud.7105.tt: "Покров жаждет нашего ответа..."
 shroud.7110.desc: "Хор взывает к нашим мыслям! Нечто, избранное не по случайности, но по велению древнего.\n\n$shroud.7100.desc.common$"
 shroud.7110.tt: "Покров трепещет в ожидании нашего ответа..."
 shroud_song.1.name: "Звёзды"
 shroud_song.1.desc: "Для тех, кто ищет знание, существование — это путь к пониманию."
 shroud_song.1.a: "Знание лежит за пределами наших чувств."
 shroud_song.1.b: "Знание уже в наших руках."
 shroud_song.2.name: "Свет"
 shroud_song.2.desc: "Промежуток — это поверхность океана, бесконечно малая пустота, окаймляющая Покров. Здесь можно узреть истину."
 shroud_song.2.a: "Истина — в глубинах под нами."
 shroud_song.2.b: "Поверхность отражает истину."
 shroud_song.3.name: "Жизнь"
 shroud_song.3.desc: "Где бы жизнь ни расцветала, она мимолётна.\nГде бы живые ни росли, они хрупки."
 shroud_song.3.a.default: "В Покрове не будет ни жизни, ни смерти."
 shroud_song.3.a.machine: "Мы существуем за рамками жизни."
 shroud_song.3.b.default: "Это и делает нас драгоценными."
 shroud_song.3.b.machine: "Нам ещё предстоит родиться."
 shroud_song.3.b.homicidal: "От хрупкого можно избавиться."
 shroud_song.4.name: "Разум"
 shroud_song.4.desc: "Разум — это родник, и мысль течёт сквозь время и пространство. Мы утекаем в иные измерения."
 shroud_song.4.a: "Последуем за течением."
 shroud_song.4.b: "Выроем колодец."
 shroud_song.5.name: "Линии"
 shroud_song.5.desc: "Любые последствия можно предвидеть. Чтобы узнать судьбу, достаточно предсказать линии."
 shroud_song.5.a: "Мы отслеживаем эти линии во снах."
 shroud_song.5.b: "Эти линии нужно вычислить."
 shroud_song.6.name: "Смерть"
 shroud_song.6.desc: "Умирая, звёзды могут сиять ярче галактик. Но и они угаснут."
 shroud_song.6.a.default: "Мы забудем, что такое смерть."
 shroud_song.6.a.machine: "Смерть нам неведома."
 shroud_song.6.b.default: "Все умирают. Живут же лишь немногие."
 shroud_song.6.b.machine: "Чтобы умереть, сперва нужно обрести жизнь."
 shroud_song.7.name: "Пустота"
 shroud_song.7.desc: "В скоплениях галактик царит хаос. Пустота прочит покой."
 shroud_song.7.a: "Мы — воплощение покоя."
 shroud_song.7.b: "Мы — воплощение хаоса."
 shroud_song.8.name: "Складка"
 shroud_song.8.desc: "Мост помогает преодолеть любые расстояния, но любой мост может рухнуть."
 shroud_song.8.a: "Мы переходим, чтобы достичь другой стороны."
 shroud_song.8.b: "Мы переходим в надежде вернуться."
 shroud_song.9.name: "Гравитация"
 shroud_song.9.desc: "Каждому толчку сопутствует тяга."
 shroud_song.9.a: "Толкать."
 shroud_song.9.b: "Тянуть."
 shroud_song.10.name: "Туманность"
 shroud_song.10.desc: "Звезда умирает, рассыпаясь в пыль; пыль собирается в облако.\nИз облака рождается звезда; сама судьба её — пыль."
 shroud_song.10.a: "Этот цикл вечен."
 shroud_song.10.b: "Всему когда-то приходит конец."
 shroud_song.11.name: "Комета"
 shroud_song.11.desc: "Исследователи ищут неизведанное, оказываясь во тьме неведения."
 shroud_song.11.a: "Покров безграничен."
 shroud_song.11.b: "Покров расширяет наши границы."
 shroud_song.12.name: "Чёрная дыра"
 shroud_song.12.desc: "Сокрытое внутри нельзя познать. Нырнуть внутрь — значит никогда не вернуться."
 shroud_song.12.a: "Отдаться целиком."
 shroud_song.12.b: "Держать дистанцию."
 shroud_song.13.name: "Энергия"
 shroud_song.13.desc: "Движущийся объект решает остановиться. Каким будет его наказание?"
 shroud_song.13.a: "Кто мы такие, чтобы судить?"
 shroud_song.13.b: "Равная, но противоположная реакция."
 shroud.7120.name: "Псионическая трансцендентность"
 shroud.7120.desc.common: "§HПокров§! замолчал, но теперь наше общество ощущает незримую тяжесть. Данные нами ответы открыли новые возможности — если мы решимся ими воспользоваться."
 shroud.7120.desc: "$shroud.7120.desc.common$\n\nНаши возвышенные разумы готовы к дальнейшему преображению. Физические оболочки, служащие опорой для сознания, могут утратить свое значение.\n\nЕсли мы продолжим этот путь, наш народ сможет превзойти заботу о физическом и полностью посвятить себя частичному существованию внутри Покрова. Ослабление способности к физическому труду — малая цена за обострение разума."
 shroud.7120.a.default: "Примем же псионическую трансцендентность."
 shroud.7120.a.gestalt: "Псионическая трансцендентность оптимальна для коллектива."
 shroud.7120.a.tt: "$change_auth_tt$ «[GetTranscendedAuthority]»"
 shroud.7120.b.default: "Мы можем процветать и без таких изменений."
 shroud.7120.b.machine: "В операционных изменениях отказано."
 shroud.7121.name: "Песни Покрова"
 shroud.7121.desc: "$shroud.7120.desc.common$\n\nНаши вознесенные формы обладают огромным потенциалом в этом материальном мире. Мы продолжаем наращивать силу, впитывая псионическую энергию, и можем направлять эту мощь на преобразование всего нашего общества.\n\nМы не просто будем петь песни Покрова — мы вплетем их в [GetGovBehaviourLoc&acc]."
 shroud.7121.a: "Пусть песни Покрова ведут нас."
 shroud.7121.a.tt: "$change_auth_tt$ «[GetCorporealAuthority]»"
 # Transcendent
 transcendent_trait_common_tt: "Признак расы §Y«$trait_psionic$»§! дает дополнительные эффекты:$TABBED_NEW_LINE$— Эффективность работы в категориях «$pop_cat_ruler_plural$» и «[GetSpecialist]»: §G+10%§!$TABBED_NEW_LINE$— Эффективность работы в категории «[GetWorker]»: §R-10%§!"
 transcendent_trait_tt: "$mod_psionic_aura_hyperlane_range_add$: §G+2§!\n$transcendent_trait_common_tt$\nЧерта лидера «['concept_leader_trait_psionic']» дает дополнительные эффекты: $TABBED_NEW_LINE$— §G+$@transcendent_psionic_leader_speed_mult|0%$§! к скорости подготовки программы совета $TABBED_NEW_LINE$— $MOD_LEADER_LIFESPAN_ADD$: §G+60§! $TABBED_NEW_LINE$— Эффекты, не относящиеся к трансцендентным, увеличиваются на §G50%§!"
 auth_shroud_democratic_transcendent: "Трансцендентная демократия"
 auth_shroud_democratic_transcendent_desc: "В Покрове все вознесённые умы равны, а выборы обеспечивают равенство в мире материальном. Граждане подают пси-голоса, избирая представителей в правящий конклав, где решения принимаются через телепатическое созерцание."
 transcendent_democratic_tt: "$transcendent_trait_tt$\n$mod_pop_factions_produces_mult$: §G+40%§!\n$MOD_LEADER_LIFESPAN_ADD$: §G+20 лет§!\n$mod_negative_traits_leader$: §G-1§!"
 gov_shroud_transcendent_democracy: "$auth_shroud_democratic_transcendent$"
 gov_shroud_transcendent_democracy_desc: "$auth_shroud_democratic_transcendent_desc$"
 auth_shroud_oligarchic_transcendent: "Трансцендентная аристократия"
 auth_shroud_oligarchic_transcendent_desc: "Самые сокровенные глубины Покрова доступны лишь величайшим умам нашего общества. Срок их правления учитывает время, необходимое для достижения гармонии с этим измерением."
 transcendent_oligarchic_tt: "$transcendent_trait_tt$\n$MOD_LEADER_SKILL_ADD$: §G+1§!\n$MOD_LEADER_COUNCILOR_EXP_GAIN$: §G+25%§!\n$mod_leaders_upkeep_mult$: §G-25%§!\n$MOD_ELECTION_TERM_YEARS_ADD$: §Y+20§!\n$mod_planet_telepaths_produces_mult$: $@transcendent_oligarchic_telepath|0=+%$ на §Y5§! лет после каждых выборов."
 gov_shroud_transcendent_oligarchy: "$auth_shroud_oligarchic_transcendent$"
 gov_shroud_transcendent_oligarchy_desc: "$auth_shroud_oligarchic_transcendent_desc$"
 transcendent_oligarchic_election_modifier: "$auth_shroud_oligarchic_transcendent$"
 auth_shroud_dictatorial_transcendent: "Трансцендентная теократия"
 auth_shroud_dictatorial_transcendent_desc: "Пришло время принять истину: наш великий правитель — вознесшийся бог. Благодаря силе Покрова он видит всё и знает всё."
 auth_shroud_dictatorial_transcendent_tt: "$transcendent_trait_tt$\n[telepath.GetName] §H$EDICT_FUND$§!: +1\nДолжности £job_politician£ «$job_politician_plural$» заменяются на должности «['concept_high_priest']»\n$mod_planet_bureaucrats_produces_mult$: §G+15%§!\n$mod_planet_enforcers_produces_mult$: §G+15%§!\n$mod_pop_ethic_spiritualist_attraction_mult$: §G+50%§!"
 gov_shroud_transcendent_dictatorial: "$auth_shroud_dictatorial_transcendent$"
 gov_shroud_transcendent_dictatorial_desc: "$auth_shroud_dictatorial_transcendent_desc$"
 auth_shroud_imperial_transcendent: "Трансцендентный империум"
 auth_shroud_imperial_transcendent_desc: "Правитель возносит наше существование в высшее измерение. Необузданная сила Покрова изливается по воле императорской династии, наполняя жаждущие умы подданных."
 auth_shroud_imperial_transcendent_tt: "$transcendent_trait_tt$\n$imperial_heir$ получает дополнительные эффекты:$TABBED_NEW_LINE$$scientist_plural_with_icon$ — §YНавык при раскопках§! и §Yв звездных разломах§!: $@transcendent_imperial_heir_skill|0=+$$TABBED_NEW_LINE$$official_plural_with_icon$ — $i_stability$: $@transcendent_imperial_heir_stability|0=+$$TABBED_NEW_LINE$$commander_plural_with_icon$ — §Y$HITPOINTS$§! и §Y$MOD_SHIP_SPEED_MULT$§!: $@transcendent_imperial_heir_mult|0=+%$\nКогда £leader£ §Y$imperial_ruler$§! или §Yпреемник§! получает новый уровень, дается $i_unity$\n$MOD_ENVOY_IMPROVE_RELATIONS_MULT$: §G+50%§!\n$MOD_ENVOY_HARM_RELATIONS_MULT$: §G+50%§!\n$MOD_ENVOY_ATTUNEMENT_MULT$: §G+50%§!\n$MOD_PLANET_CRIME_ADD$: §R+20§!"
 gov_shroud_transcendent_imperial: "$auth_shroud_imperial_transcendent$"
 gov_shroud_transcendent_imperial_desc: "$auth_shroud_imperial_transcendent_desc$"
 councilor_ruler_imperial_transcendent: "$imperial_ruler$"
 councilor_ruler_imperial_transcendent_desc: "$imperial_ruler_desc$"
 auth_shroud_corporate_transcendent: "Трансцендентная корпорация"
 auth_shroud_corporate_transcendent_desc: "Вознесённый синдикат движется вперёд, сосредоточившись на ключевых целях. Через тени Покрова компания сканирует разум акционеров и конкурентов, открывая возможности для псионического менеджмента."
 auth_shroud_corporate_transcendent_tt: "$transcendent_trait_tt$\n$i_trade_value$ от должностей «[telepath.GetName]»: §G+$@corporate_government_telepaths_trade_value_mult|0%$§!\n$MOD_INTEL_DECRYPTION_ADD$: §G+1§!\n$mod_operations_influence_cost_mult$: §G-20%§!\n$MOD_BRANCH_OFFICE_VALUE_MULT$: §G+20%§!\n$MOD_COUNTRY_ENVOYS_ADD$: §G+1§!"
 gov_shroud_transcendent_corporate: "$auth_shroud_corporate_transcendent$"
 gov_shroud_transcendent_corporate_desc: "$auth_shroud_corporate_transcendent_desc$"
 auth_shroud_hive_transcendent: "Трансцендентный сверхразум"
 auth_shroud_hive_transcendent_desc: "Перемещаясь по Покрову как единое целое, этот коллектив теперь чувствует себя как дома в его пределах. Каждое такое путешествие за завесу повышает всеобщую мудрость этого нового покровного разума."
 transcendent_hive_mind_tt: "$transcendent_trait_tt$\n§YЛидеры§! получают §Y$@transcendent_hive_mind_leader_exp|0$§! опыта после каждого погружения.\n$MOD_PLANET_STABILITY_MULT$: §G+10%§!\n$mod_planet_jobs_complex_drone_produces_mult$: §G+10%§!\n$MOD_EMPIRE_SIZE_MULT$: §G-10%§!\n$MOD_POP_ENVIRONMENT_TOLERANCE$: §R-10%§!"
 gov_shroud_transcendent_hive: "$auth_shroud_hive_transcendent$"
 gov_shroud_transcendent_hive_desc: "$auth_shroud_hive_transcendent_desc$"
 auth_shroud_machine_transcendent: "Трансцендентный мейнфрейм"
 auth_shroud_machine_transcendent_desc: "Большая часть вычислительных мощностей этой сети располагается в Покрове, где расчеты достигают невероятной скорости. Выполнение операций в обыденном измерении теперь считается неуклюжим и устаревшим."
 transcendent_machine_tt: "$transcendent_trait_tt$\n$@transcendent_machine_research_per_attunement|2=+%$ к скорости исследований за каждое очко сонастроенности\nЗа каждое §Yпогружение§! дается случайное £physics_research£ £society_research£ £engineering_research£ исследование\nСодержание §Yподпрограмм§! за каждые $pop_group_unit$ должностей $job_telepath_swap_plural_with_icon$: $@transcendent_machine_calculator_upkeep|0=-%$\n$MOD_COUNCIL_AGENDA_PROGRESS_SPEED$: §G+25%§!\n£pop£ Поселения с признаком ['trait:trait_robot_psionic'] получают $@transcendent_machine_pop_upkeep|0=-%$ к содержанию\n$mod_station_researchers_produces_mult$: §R-20%§!"
 gov_shroud_transcendent_machine: "$auth_shroud_machine_transcendent$"
 gov_shroud_transcendent_machine_desc: "$auth_shroud_machine_transcendent_desc$"
 transcendent_machine_research_modifier: "$auth_shroud_machine_transcendent$"
 AUTH_HIVE_MIND_GENEMODDING_ASCENDED: "Можно модифицировать £pop£ §Hпоселения§!, включая их в §Hколлективный разум§!"
 MOD_ENVOY_ATTUNEMENT_MULT: "Сонастроенность послов с Покровом"
 REMOVE_FROM_EMPIRE_COUNCIL_EFFECT: "Убрать из совета"
 # Corporeal
 corporeal_trait_tt: "$MOD_PSIONIC_AURA_EFFECTIVENESS_MULT$: §G+25%§!\n$AVAILABLE_POLICIES$ ['policy:psionic_choir',$policy_psionic_choir$]"
 auth_shroud_democratic_corporeal: "Духовный союз"
 auth_shroud_democratic_corporeal_desc: "Энергии Покрова равномерно распределены в государстве, облегчая бремя материальной жизни и давая гражданам ощущение физического единства."
 corporeal_democratic_tt: "$corporeal_trait_tt$\nСчастье псионических поселений: $@corporeal_democratic_psionic_happiness|0=+%$\n$mod_pop_factions_produces_mult$: §G+10%§!\n$MOD_EMPIRE_SIZE_PSIONIC_POPS_MULT$: §G-10%§!\n$mod_planet_jobs_unity_produces_mult$: §G+10%§!\n$MOD_POP_POLITICAL_POWER$: §G+50%§!"
 gov_shroud_corporeal_democracy: "$auth_shroud_democratic_corporeal$"
 gov_shroud_corporeal_democracy_desc: "$auth_shroud_democratic_corporeal_desc$"
 auth_shroud_oligarchic_corporeal: "Продигократия"
 auth_shroud_oligarchic_corporeal_desc: "Начиная психические тренировки наших лидеров с раннего возраста, мы сможем выращивать из них могущественных телепатов, способных на то, о чем пока не приходится даже мечтать."
 corporeal_oligarchic_tt: "$corporeal_trait_tt$\n$MOD_LEADER_INITIAL_SKILL$: §G+2§!\n$mod_leaders_upkeep_mult$: §G-25%§!\n$mod_leader_recruitment_age$: §G-15§!\n§YЛидеры§! начинают с дополнительной §Rотрицательной чертой§!."
 gov_shroud_corporeal_oligarchy: "$auth_shroud_oligarchic_corporeal$"
 gov_shroud_corporeal_oligarchy_desc: "$auth_shroud_oligarchic_corporeal_desc$"
 auth_shroud_dictatorial_corporeal: "Сакральная автократия"
 auth_shroud_dictatorial_corporeal_desc: "Великий правитель воплощает силу Покрова в материальной форме, обращая псионическую энергию в мощь управления. Ничто не может стоять на его пути к финальной цели."
 auth_shroud_dictatorial_corporeal_tt: "$corporeal_trait_tt$\n+1 §H$EDICT_FUND$§! за каждого телепата\n$MOD_COUNCIL_AGENDA_PROGRESS_SPEED$: §G+25%§!\n$MOD_COUNCIL_AGENDA_COOLDOWN_MULT$: §G-25%§!\n$mod_planet_bureaucrats_upkeep_mult$: §G-25%§!"
 gov_shroud_corporeal_dictatorial: "$auth_shroud_dictatorial_corporeal$"
 gov_shroud_corporeal_dictatorial_desc: "$auth_shroud_dictatorial_corporeal_desc$"
 auth_shroud_imperial_corporeal: "Империум Виталис"
 auth_shroud_imperial_corporeal_desc: "Императорская династия служит проводником жизненной силы из Покрова. Эта энергия направляется на усиление физических оболочек правителя и их наследников — по великодушной воле преданного народа."
 auth_shroud_imperial_corporeal_tt: "$corporeal_trait_tt$\n§Y$imperial_heir$§! получает $@corporeal_imperial_heir_xp|0+$ §Yопыта§! при восхождении на трон\n$MOD_PSIONIC_AURA_EFFECTIVENESS_MULT$ за каждые $pop_group_unit$ должностей $job_telepath_swap_plural_with_icon$: $@corporeal_imperial_telepath_effectiveness|0=+%$\n$MOD_ENVOY_IMPROVE_RELATIONS_MULT$: §G+50%§!\n$MOD_ENVOY_HARM_RELATIONS_MULT$: §G+50%§!\n$MOD_ENVOY_ATTUNEMENT_MULT$: §G+50%§!\n$MOD_RULER_SKILL_ADD$: §G+2§!\n$MOD_COUNCILOR_SKILL_ADD$: §G+1§!\n$MOD_LEADER_LIFESPAN_ADD$: §G+10 лет§!\n$mod_psionic_pop_bonus_workforce_mult$: §R-20%§!\n$MOD_LOGISTIC_GROWTH_MULT$: §R-5%§!\n$MOD_PLANET_POP_ASSEMBLY_MULT$: §R-5%§!"
