 DELVING_RITUAL: "Ритуал погружения"
 DELVING_RITUAL_DESC: "Деятели §Y[shroudwalker_enclave_country.GetName&gen]§! закончили подготовку к ритуалу погружения. Они собираются от нашего имени нырнуть в §HПокров§!. Неизвестно, какие именно знания они оттуда вынесут."
 MINDWARDENS_THE_FIRST_ENCLAVE: "Первый анклав"
 MINDWARDENS_THE_FIRST_ENCLAVE_DESC: "Мы готовы создать независимый §H«$gov_mindwarden_enclave$»§! для борьбы с псионической заразой в галактике.\n\nЭто сооружение будет предоставлять антипсионические услуги нуждающимся, попутно отдавая нам долю от полученной выручки и ресурсов."
 MINDWARDENS_THE_FIRST_ENCLAVE_NOTE: "Превратить §Yфлотилию§! размером 30 или больше, у которой есть §Yкомандир§!, в §Y$gov_mindwarden_enclave$§! в подконтрольной нам системе."
 SHROUD_SHAPING_PROJECT: "Постепенное подчинение Покрова"
 SHROUD_SHAPING_PROJECT_DESC: "Сущности §HПокрова§! многочисленны, и каждая обладает колоссальной силой. Они требуют нерушимой связи, прежде чем одарить величайшими благами.\n\nНо мы нашли иной путь. Вместо клятвы одному благоволителю наши [GetResearchers] разработают метод извлечения небольшого объема энергии сразу у всех, тем самым подчиняя Покров нашей воле."
 EXPLORE_BORDER_SYSTEM: "Изучение системы [exiled_system_border.GetName]"
 EXPLORE_BORDER_SYSTEM_DESC: "Дальнее сканирование зафиксировало мощный выброс аномальной энергии в системе §H[exiled_system_border.GetName]§!. Показания совпадают с аномалиями, зарегистрированными нашим древним отводом в мире [owner.GetHomeWorldName].\n\nДля изучения этого феномена понадобится направить экспедицию в систему [exiled_system_border.GetName]."
 EXPLORE_BORDER_SYSTEM_TOOLTIP: "Отправьте §Yкорабль§! или §Yфлотилию§! изучить систему §Y[exiled_system_border.GetName]§!."
