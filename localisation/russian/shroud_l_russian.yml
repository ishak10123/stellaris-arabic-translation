 job_superstitious_beliefs_high_priest_plural: "Верховные астрологи"
 job_superstitious_beliefs_high_priest_desc: "Под руководством звёзд эти духовные лидеры управляют спиритуалистическими институтами государства."
 job_superstitious_beliefs_high_priest_effect_desc: "$job_superstitious_beliefs_high_priest_icon$ $job_superstitious_beliefs_high_priest_plural$ превращают $i_consumer_goods$ в $i_unity$ и $i_stability$"
 superstitious_beliefs_high_priest: "$job_superstitious_beliefs_high_priest$"
