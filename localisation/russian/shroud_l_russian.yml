 shroud.4935.title: "$ACCORD_CREATION$ в системе §H[capital_scope.solar_system.GetName]§!"
 shroud.4935.desc: "$shroud.4862.shared$ $end_of_the_cycle_color_article_cap$ сотворил идеальный мир в нашей системе §H[capital_scope.solar_system.GetName]§!, как нельзя лучше подходящий для [Root.GetSpeciesAdj&masc,gen] народа. Он станет скоротечным раем, где можно будет насладиться закатом мироздания."
 shroud.4935.tooltip: "В системе [capital_scope.solar_system.GetName] появляется §Hидеальный мир§!: §H[accord_creation_world.GetName]§!"
 shroud.4970.title: "Завершение близко."
 shroud.4970.desc.1: "Завеса между измерениями ненадолго растворилась, и псионическая сила Покрова хлынула в материальный мир."
 shroud.4970.desc.2: "Погибель нашла всех — и органиков, и машины. Планеты превратились в безжизненную пустошь. Вместе с последними фотонами испустили дух звёзды.\n\nВ последний миг каждый из нас услышал голос, шепчущий прямо в глубины сознания:\n\n§R«ЗАВЕРШЕНИЕ ВСЕХ ЗАВЕРШЕНИЙ».§!"
 shroud.4970.desc: "$end_of_the_cycle_color_article_cap$ вершит свою волю.\n\n$end_aura$ поглотила галактику. Как только ей покорилась последняя звездная система, пространство вздрогнуло от выброса энергии неописуемого объема.$shroud.4970.desc.1$\n\n$shroud.4970.desc.2$"
 shroud.4970.a: "Великолепно."
 shroud.4970.a.tooltip.destroyed: "§YГалактика уничтожена.§!"
 shroud.4970.a.tooltip: "Мы завершили цикл.\n\n$shroud.4970.a.tooltip.destroyed$"
 shroud.4971.title: "$shroud.4970.title$"
 shroud.4971.desc.1: "Это конец."
 shroud.4971.desc.2.1: "Разрушительная §Hпсионическая аура§!, испускаемая"
 shroud.4971.desc.2.2: "распространилась по галактике. Как только ее гибельной силе покорилась последняя звездная система, пространство вздрогнуло от выброса энергии неописуемого объема."
 shroud.4971.desc.2.3: "Эта непреодолимая мощь, словно зародившаяся в совершенно ином измерении, стерла всю жизнь с лица галактики."
 shroud.4971.desc.2.contact_psionic: "$shroud.4971.desc.2.1$, §H[from.GetName&inst]§!, $shroud.4971.desc.2.2$ $shroud.4970.desc.1$\n\n$shroud.4970.desc.2$"
 shroud.4971.desc.2.contact_no_psionic: "$shroud.4971.desc.2.1$, §H[from.GetName&inst]§!, $shroud.4971.desc.2.2$ $shroud.4971.desc.2.3$\n\n$shroud.4970.desc.2$"
 shroud.4971.desc.2.no_contact_psionic: "$shroud.4971.desc.2.1$ неизвестной цивилизацией, $shroud.4971.desc.2.2$ $shroud.4970.desc.1$\n\n$shroud.4970.desc.2$"
 shroud.4971.desc.2.no_contact_no_psionic: "$shroud.4971.desc.2.1$ неизвестной цивилизацией, $shroud.4971.desc.2.2$ $shroud.4971.desc.2.3$\n\n$shroud.4970.desc.2$"
 shroud.4971.a: "$crisis.6051.a$"
