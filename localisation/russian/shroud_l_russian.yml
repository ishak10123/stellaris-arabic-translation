 civic_tankbound_negative_effects: "$t$— В начале игры на 2K меньше £pop£ поселений, чем обычно"
 civic_tankbound_corporate: "Корпоративные мозговые резервуары"
 civic_tankbound_corporate_desc: "Это общество массово перешло на экспериментальные жилые резервуары. В результате они полностью зависят от вспомогательных систем и неспособны напрямую заниматься физическим трудом."
