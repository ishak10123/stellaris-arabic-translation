 job_superstitious_beliefs_high_priest_corporate_desc: "Под руководством звёзд эти лидеры мнений управляют координируют спиритуалистические предприятия государства."
 job_superstitious_beliefs_high_priest_corporate_effect_desc: "$job_superstitious_beliefs_high_priest_corporate_icon$ $job_superstitious_beliefs_high_priest_corporate_plural$ превращают $i_consumer_goods$ в $i_unity$, $i_trade_value$ и $i_stability$"
