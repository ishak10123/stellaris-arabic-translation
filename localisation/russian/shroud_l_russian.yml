 SPECIAL_PROJECT_CALLING_DESC: "§HШепчущие в пустоте§! жаждут знаний, выходящих за рамки привычного мышления. Получив расширенные полномочия, наши [Owner.GetResearchers] смогут сосредоточиться на эзотерических науках, и мы попытаемся утолить жажду Шепчущих."
