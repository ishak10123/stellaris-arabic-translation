 # End of the Cycle
 situation_end_of_the_cycle: "Завершитель цикла"
 situation_end_of_the_cycle_desc: "Мы заключили договор с §RКонцом цикла§!, обретя невероятную мощь. Наши [Owner.GetTelepathPlural&nom] предполагают, что плату по этому договору можно отсрочить коллективным псионическим трансом — но лишь ненадолго.\n\nВоля нашего благоволителя проявляется в виде мощной псионической ауры. Если мы надеемся понять Конец, распространение этой ауры должно стать нашей конечной целью. Вместе с ростом нашей численности и мощи наших разумов будет расти сила и дальность ауры.\n\nОсталось захватить систем: §Y[Owner.GetEndCycleGalaxySystemsLeft]§!"
 situation_end_of_the_cycle_effects_1: "Когда эта фаза закончится, мы обретём дар §HСозидания§!.\n$eotc_opinion_modifier_tooltip$"
 situation_end_of_the_cycle_effects_2: "Когда эта фаза закончится, мы обретем дар §HИскажения§!.\n$eotc_opinion_modifier_tooltip$\n$eotc_opinion_modifier_2_tooltip$"
 situation_end_of_the_cycle_effects_3: "Когда эта фаза закончится, мы обретем дар §HУсиления§!.\n$eotc_opinion_modifier_tooltip$\n$eotc_opinion_modifier_3_tooltip$"
 situation_end_of_the_cycle_effects_4: "Когда эта фаза закончится, мы узнаем цену нашего могущества."
