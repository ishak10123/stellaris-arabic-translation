 shroud.4950.title: "Злонесущая аура"
 shroud.4950.desc.1: "Все данные указывают на исключительную вредоносность этой ауры. Если ей никак не противодействовать, она может стремительно распространиться по всей галактике."
 shroud.4950.desc.2: "В системе §H[from.GetName]§! обнаружена мощная псионическая аура"
 shroud.4950.desc.3.intro: "$shroud.4950.desc.2$. По данным наших [GetTelepathPlural&gen], её излучение из §HПокрова§! вызвано псионической активностью"
 shroud.4950.desc.3.default: "$shroud.4950.desc.3.intro$ неизвестной цивилизации."
 shroud.4950.desc.3.contact: "$shroud.4950.desc.3.intro$ §H[fromfrom.GetName&gen]§!."
 shroud.4950.desc.4: "$shroud.4190.desc.intro$ Теперь такая §H«псионическая аура»§! (получившая своё название из-за предполагаемого источника) обнаружена в системе §H[from.GetName]§!."
 shroud.4950.desc.5.intro: "$shroud.4950.desc.2$, источник которой находится на территории"
 shroud.4950.desc.5.default: "$shroud.4950.desc.5.intro$ неизвестной цивилизации."
 shroud.4950.desc.5.contact: "$shroud.4950.desc.5.intro$ §H[fromfrom.GetName&gen]§!."
 shroud.4950.a: "$grand_archive.1100.a$"
 shroud.4955.title: "Чувство ужаса"
 shroud.4955.desc.1: "Наше население постепенно начинает осознавать надвигающуюся катастрофу."
 shroud.4955.desc.1.gestalt: "$shroud.4955.desc.1$ Наши [GetTelepathPlural&nom] зафиксировали сопутствующие возмущения в энергиях §HПокрова§!."
 shroud.4955.desc.1.non_gestalt: "$shroud.4955.desc.1$ По данным наших [GetTelepathPlural&gen], даже сам §HПокров§! ведёт себя необычно — его силы словно содрогаются в тревожном ожидании."
 shroud.4955.desc.2.intro: "За последние несколько лет в галактике всё чаще стали происходить бедствия."
 shroud.4955.desc.2.outro: "Поскольку с каждым разом мы сталкиваемся со всё более странными феноменами, наши [GetResearchers] предрекают еще более ужасающие события в ближайшем будущем."
 shroud.4955.desc.2.contact_aura: "$shroud.4955.desc.2.intro$ Мы наблюдали необъяснимое расширение §H[from.GetName&gen]§!. Мы стали свидетелями приближения враждебной §Hпсионической ауры§!. $shroud.4955.desc.2.outro$"
 shroud.4955.desc.2.contact_no_aura: "$shroud.4955.desc.2.intro$ Мы наблюдали необъяснимое расширение §H[from.GetName&gen]§!. $shroud.4955.desc.2.outro$"
 shroud.4955.desc.2.no_contact_aura: "$shroud.4955.desc.2.intro$ Мы стали свидетелями приближения враждебной §Hпсионической ауры§!. $shroud.4955.desc.2.outro$"
 shroud.4955.desc.2.no_contact_no_aura: "$shroud.4955.desc.2.intro$ $shroud.4955.desc.2.outro$"
 shroud.4955.desc.3: "Мы не знаем, что именно на нас надвигается, но одно можно сказать наверняка: это неизбежно."
 shroud.4955.a: "Следует готовиться к худшему."
 shroud.4955.a.tt: "Если §H$end_aura$§! покроет всю галактику, игра закончится."
 shroud.4960.title: "Псионическая угроза"
 shroud.4960.desc.1.intro: "Зловещая §Hпсионическая аура§!, испускаемая"
 shroud.4960.desc.1.outro: "распространяется по галактике с пугающей скоростью. Согласно наблюдениям, которые провели наши [GetResearchers], она уже оказывает пагубное влияние на множество звездных систем."
 shroud.4960.desc.1.contact: "$shroud.4960.desc.1.intro$ §H[from.GetName&inst]§! $shroud.4960.desc.1.outro$"
 shroud.4960.desc.1.no_contact: "$shroud.4960.desc.1.intro$ неизвестной цивилизацией $shroud.4960.desc.1.outro$"
 shroud.4960.desc.2: "Согласно последним данным, она охватила уже половину испещренной гиперкоридорами галактики. Стоящая за этим сила, похоже, намерена разрушить всё, до чего сможет дотянуться. Если не дать ей отпор, галактику ждет гибель."
 shroud.4960.a: "Ее надо остановить."
 shroud.4960.a.tt: "Можно объявить ['concept_total_war', тотальную войну] государству §H[from.GetName]§!.\n$shroud.4955.a.tt$"
 shroud.4965.title: "Неминуемая гибель"
 shroud.4965.desc.1.intro: "Опустошительная §Hпсионическая аура§!, испускаемая"
 shroud.4965.desc.1.outro: "продолжает распространяться по галактике. Сегодня она охватывает уже почти все звездные системы."
 shroud.4965.desc.1.contact: "$shroud.4960.desc.1.intro$ §H[from.GetName&inst]§! $shroud.4960.desc.1.outro$"
 shroud.4965.desc.1.no_contact: "$shroud.4960.desc.1.intro$ неизвестной цивилизацией $shroud.4960.desc.1.outro$"
 shroud.4965.desc.2: "Если сейчас не предпринять быстрых и решительных действий, всей галактике грозит катастрофа."
 shroud.4965.a: "Это последний бой."
 the_reckoning_chain_title: "Расплата"
 the_reckoning_chain_desc: "Наш договор с §RКонцом цикла§! привел к уничтожению §H[this.GetName&gen]§! — теперь от [this.GetName::него|||fem:нее|||pl:них] осталась лишь тень былого могущества.\n\nРазрушительная воля нашего бывшего благоволителя обрела форму чудовищного энергетического существа — §RРасплаты§!. Оно странствует от мира к миру, восстанавливая силы и поглощая их население."
