 # Entropy Drinkers
 civic_tooltip_not_entropy_drinkers: "НЕТ гражданской модели ['concept_entropy_drinkers_civics']"
 civic_entropy_drinkers: "Поглотители энтропии"
 civic_entropy_drinkers_desc: "$civic_ap_blockade_tt$\n\nЭто общество выкачивает жизненную энергию из праздного населения через паразитические пси-связи. После сбора эти силы перераспределяются среди более важных классов."
 civic_entropy_drinkers_effects: "- Открываются следующие §Hуказы§!:$TABBED_NEW_LINE$- ['edict:energy_drain',$edict_energy_drain$]$TABBED_NEW_LINE$- ['edict:sanguine_council',$edict_sanguine_council$]$TABBED_NEW_LINE$- ['edict:psychic_feast',$edict_psychic_feast$]\n- Можно строить £building£ ['building:building_lifecrypt_1'].\n- Лидеры начинают с чертой «['concept_leader_trait_psionic']»."
 civic_entropy_drinkers_psionic_modifier: "- $energy_with_icon$ за каждые $pop_group_unit$ £pop£ псионических поселений: §G+0.5§!"
 civic_entropy_drinkers_machine: "Энергетические экстракторы"
 civic_entropy_drinkers_machine_desc: "$civic_ap_blockade_tt$\n\nПравильное распределение энергии — залог максимальной эффективности всей машины. Все модули созданы с этой целью, что позволяет при необходимости периодически ускорять критически важные узлы."
 civic_entropy_drinkers_machine_effects: "- Открываются следующие §Hуказы§!:$TABBED_NEW_LINE$- ['edict:energy_drain',$edict_energy_drain$]$TABBED_NEW_LINE$- ['edict:sanguine_council_machine',$edict_sanguine_council_machine$]$TABBED_NEW_LINE$- ['edict:psychic_feast',$edict_psychic_feast$]\n- Можно строить £building£ ['building:building_lifecrypt_machine_1'].\n- Лидеры начинают с чертой «['concept_leader_trait_psionic']»."
 civic_entropy_drinkers_hive_mind: "Паразитическая каста"
 civic_entropy_drinkers_hive_mind_desc: "$civic_ap_blockade_tt$\n\nЭтот коллектив перенаправляет жизненную энергию низших единиц через паразитические пси-связи. После сбора эти силы перераспределяются среди более важных каст."
 civic_entropy_drinkers_hive_mind_effects: "- Открываются следующие §Hуказы§!:$TABBED_NEW_LINE$- ['edict:energy_drain',$edict_energy_drain$]$TABBED_NEW_LINE$- ['edict:sanguine_council',$edict_sanguine_council$]$TABBED_NEW_LINE$- ['edict:psychic_feast',$edict_psychic_feast$]\n- Можно строить £building£ ['building:building_lifecrypt_hive_mind_1'].\n- Лидеры начинают с чертой «['concept_leader_trait_psionic']»."
 civic_entropy_drinkers_corporate: "Корпоративные вампиры"
 civic_entropy_drinkers_corporate_desc: "$civic_ap_blockade_tt$\n\nЭта корпоратократия выкачивает жизненную энергию из праздного населения через паразитические пси-связи. После сбора эти силы перераспределяются среди высшего руководства."
 civic_entropy_drinkers_corporate_effects: "- Открываются следующие §Hуказы§!:$TABBED_NEW_LINE$- ['edict:energy_drain',$edict_energy_drain$]$TABBED_NEW_LINE$- ['edict:sanguine_council',$edict_sanguine_council$]$TABBED_NEW_LINE$- ['edict:psychic_feast',$edict_psychic_feast$]\n- Можно строить £building£ ['building:building_lifecrypt_corporate_1'].\n- Лидеры начинают с чертой «['concept_leader_trait_psionic']».\n£building£ §Y$building_executive_retreat$§!: этот $megacorp_civic_branch_office_building_effect$"
 has_not_begun_non_psionic_ascension: "НЕ начат какой-либо путь возвышения, кроме §Yпсионического§!"
 has_not_begun_non_psionic_ascension_success: "$TRIGGER_PASS$$has_not_begun_non_psionic_ascension$"
 has_not_begun_non_psionic_ascension_fail: "$TRIGGER_FAIL$$has_not_begun_non_psionic_ascension$"
 # Superstitious Beliefs
 civic_tooltip_not_superstitious_beliefs: "НЕТ гражданской модели ['concept_superstitious_beliefs_civics']"
 civic_superstitious_beliefs_desc_common: "Перед каждым важным решением необходимо провести подобающие ритуалы, чтобы достичь гармонии с незримыми силами, плетущими судьбу."
 civic_superstitious_beliefs_common_effects: "Открывает указ ['edict:galactic_dowsing',$edict_galactic_dowsing$]\nКаждые 13 лет ['concept_sb_cycle', цикл] меняется.\nВремя от времени будут происходить удачные или неудачные события."
 civic_superstitious_beliefs: "Суеверность"
 civic_superstitious_beliefs_desc: "Это общество убеждено, что открыло ритуальный механизм предсказания будущего, основанный на эзотерическом распознавании паттернов и анализе цикличных аномалий. $civic_superstitious_beliefs_desc_common$"
 civic_superstitious_beliefs_effects: "Замена: \n$t$- £job_priest£ Жрецов на £job_superstitious_beliefs_priest£ духовных медиумов\n$t$- £job_high_priest£ Верховных жрецов на £job_superstitious_beliefs_high_priest£ верховных астрологов\n$civic_superstitious_beliefs_common_effects$"
 civic_machine_superstitious_beliefs: "Искатели паттернов"
 civic_machine_superstitious_beliefs_desc: "Это машинное государство уверено, что способно вычислять неизвестное, используя эзотерическое распознавание паттернов и анализ цикличных аномалий. Перед каждым важным решением изучаются небесные знамения, чтобы гарантировать наилучший прогнозируемый результат."
 civic_machine_superstitious_beliefs_effects: "$civic_superstitious_beliefs_common_effects$"
 civic_hive_superstitious_beliefs: "Зодиакальный узел"
 civic_hive_superstitious_beliefs_desc: "Этот коллектив убеждён, что открыл ритуальный механизм предсказания будущего, основанный на эзотерическом распознавании паттернов и анализе цикличных аномалий. $civic_superstitious_beliefs_desc_common$"
 civic_hive_superstitious_beliefs_effects: "$civic_superstitious_beliefs_common_effects$"
 civic_corporate_superstitious_beliefs: "Предприятие удачи"
 civic_corporate_superstitious_beliefs_desc: "Эта корпорация убеждена, что открыла ритуальный механизм предсказания будущего, основанный на эзотерическом распознавании паттернов и анализе цикличных аномалий. Чтобы максимизировать прибыль, будущие выгоды и потери оцениваются с учётом ключевых показателей эффективности идеальных небесных конфигураций."
 civic_corporate_superstitious_beliefs_effects: "Заменяет: \n$t$- £job_priest£ Жрецов на £job_superstitious_beliefs_priest_corporate£ предсказателей\n$t$- £job_high_priest£ Верховных жрецов на £job_superstitious_beliefs_high_priest_corporate£ брокеров удачи\n$civic_superstitious_beliefs_common_effects$"
 # Twisted Experimenters
 civic_twisted_experimenters: "Экспериментальное правосудие"
 civic_twisted_experimenters_desc: "В этом обществе судебная система и жажда знаний нашли общее решение. Действуя в строжайшей тайне, исследователи проводят жестокие эксперименты над подопытными, набранными из криминального мира. Редкие летальные исходы — неизбежная плата за прогресс."
 civic_twisted_experimenters_effects: "Начало с инцидентом «['concept_experimental_testing']», который при завершении дает знания о технологиях.\nМожно строить и есть на старте: £building£['building:building_experimentation_chambers_1'].\nВсе немеханические рабы могут занимать рабскую должность «['concept_slave_orderly']».\nДоступна ['concept_slave_army', армия рабов]: §Y$abomination_army$§!"
 civic_twisted_experimenters_hive_mind: "Корректирующее сознание"
 civic_twisted_experimenters_hive_mind_desc: "Девианты этого коллектива становятся подопытными в передовых научных исследованиях, методы которых ничем не ограничены. Это позволяет проблемным единицам сохранять ценность в качестве расходного материала."
 civic_twisted_experimenters_hive_mind_effects: "Начинает с инцидентом «['concept_experimental_testing_hive_mind']», который при завершении дает знания о технологиях.\nМожно строить и есть на старте: £building£['building:building_experimentation_chambers_1']."
 civic_twisted_experimenters_corporate: "Судебные НИОКР"
 civic_twisted_experimenters_corporate_desc: "Эта $gov_megacorporation$ запустила инновационную программу по сокращению судебных издержек и стимулированию научного прогресса. Проблемные граждане перенаправляются в экспериментальные исследовательские проекты, где проходят суровые испытания ради технологических прорывов. Показатели смертности укладываются в прогнозируемые нормы."
 civic_twisted_experimenters_corporate_effects: "Начало с инцидентом «['concept_experimental_testing_corporate']», который при завершении дает знания о технологиях.\nМожно строить и есть на старте: £building£['building:building_experimentation_chambers_1'].\nМожно строить £building£['concept_building_carceral_test_facility'] $BRANCH_OFFICE_BUILDING$.\nВсе немеханические рабы могут занимать рабскую должность «$job_slave_orderly$».\nДоступна ['concept_slave_army', армия рабов]: §Y$abomination_army$§!"
 experimenters_we_will_learn_1: "Мы многому научимся благодаря этому."
 experimenters_we_will_learn_2: "Новое направление для экспериментов."
 experimenters_we_will_learn_3: "Новые параметры испытаний... Как захватывающе!"
 experimenters_tragic_lesson_1: "Мы извлечём уроки из этой трагедии."
 experimenters_tragic_lesson_2: "Трагедия... Но и возможность для новых экспериментов."
 experimenters_tragic_lesson_3: "Горький урок, но полезная информация."
 experimenters_ermerging_crime_1: "[GetExperimentalEngineerPlural] в такой среде получат массу возможностей для исследований."
 experimenters_ermerging_crime_2: "По крайней мере, преступность даёт нам шанс постичь новые научные горизонты."
 experimenters_ermerging_crime_3: "Эти неожиданные условия откроют перед нами множество экспериментальных возможностей."
 experimenters_ermerging_crime_4: "[GetExperimentalEngineerPlural] в подобных условиях получат неиссякаемый источник подопытных."
 # Secret Societies
 civic_tooltip_not_secret_societies: "НЕТ гражданской модели «['concept_secret_societies_civics']»"
 civic_secret_societies: "Тайные общества"
 civic_secret_societies_desc: "В тени этого общества правят коварные элиты, искусно опутывающие государственные дела паутиной заговоров и переплетающие внутреннюю политику с делами чужих миров."
 civic_secret_societies_effects: "После установления контакта с другими государствами появляются тайные ['concept_ss_factions', фракции].\nМожно провоцировать ['concept_proxy_wars', прокси-войны].\n$job_bureaucrat_plural_with_icon$ будут производить £unity£ §Iединство§! за каждую идущую и успешную §Yпрокси-войну§!.\nНачало с ['concept_first_contact', первым контактом] с двумя соседними государствами.\n$INFILTRATION_LEVEL$ в другие государства после установления §Yпервого контакта§!: §G+$@secret_society_infiltration_gain|0$§!"
 civic_secret_societies_corporate: "Влиятельный картель"
 civic_secret_societies_corporate_desc: "Наиболее влиятельные представительства этой корпоратократии ведут дела на других планетах за закрытыми дверями, по принципу «если ты чего-то не знаешь — знать тебе об этом не следует»."
 civic_secret_societies_corporate_effects: "После установления контакта с другими государствами появляются тайные ['concept_ss_factions'].\nСразу доступна возможность вести ['concept_proxy_wars'].\n$job_bureaucrat_plural_with_icon$ производят £unity£ §Yединство§! за каждую идущую и успешную §Yпрокси-войну§!.\nВ начале игры установлен ['concept_first_contact'] с двумя соседними государствами.\n$INFILTRATION_LEVEL$ в государства при установлении §Yпервого контакта§!: §G+$@secret_society_infiltration_gain|0$§!\n£building£ §Y$building_corporate_embassy$§!: этот $megacorp_civic_branch_office_building_effect$"
 shroud.5012.title: "Появление тайных обществ"
 shroud.5012.desc: "Наши подозрения подтвердились. [first_neighbor.GetAdjective&fem] и [second_neighbor.GetAdjective&fem] цивилизации сообщили, что с ними уже выходили на контакт через неофициальные каналы до установления формальных отношений.\n\nТеперь эти §Hфракции§! вышли из тени и заявили о своем существовании. Эти некогда тайные организации, известные как §H$pft_the_curtain$§!, §H$pft_the_masquerade$§! и §H$pft_the_grand_dance$§!, открыто предлагают нам начать диалог.\n\nИх истинные цели и источники информации могут навсегда остаться для нас загадкой. Возможно, разумнее будет играть по их правилам."
 shroud.5012.a: "И вот танец начинается..."
 shroud.5012.tt: "Вскоре появятся §Yфракции тайных обществ§!:\n$t$§H$pft_the_curtain$§!\n$t$§H$pft_the_masquerade$§!\n$t$§H$pft_the_grand_dance$§!"
 shroud.5013.title: "Странные контакты"
 shroud.5013.desc: "Среди нас есть те, кто действует за кулисами дипломатии. Теперь мы подозреваем, что их влияние простирается далеко за пределы нашей родной планеты.\n\nНесмотря на недавний выход в космос, мы подозрительно легко установили контакт с другими формами жизни. Вряд ли это простое совпадение. Мы подозреваем, что эти межзвездные связи были налажены тайными §Hфракциями§!, что уже глубоко проникли в наше общество.\n\nВозможно, когда мы узнаем больше об этих существах, те, кто скрывается в тени, сами покажут себя."
 shroud.5013.a: "Они наши друзья или враги?"
 # Chosen
 civic_ap_blockade_tt: "§RВнимание! Будет доступен только ['concept_psionic_ascension', псионический] путь возвышения.§!"
 civic_chosen: "Избранные"
 civic_chosen_desc: "$civic_ap_blockade_tt$\n\nЕщё на заре своей истории это общество попало под влияние Покрова и теперь связано договором с могущественной сущностью."
 civic_chosen_effects: "- Начинает игру в контакте с §Iблаговолителем Покрова§!.\n- $ADDITIONAL_TECHNOLOGIES_STRING$ £society£ ['technology:tech_psionic_aura']"
 civic_chosen_effects_additional: "- Получает £unity£ §Iединство§! в зависимости от ['concept_attunement', сонастроенности] с Покровом"
 civic_hive_chosen: "Избранное множество"
 civic_hive_chosen_desc: "$civic_ap_blockade_tt$\n\nЕщё на заре своей истории этот коллектив попал под влияние Покрова и теперь связан договором с могущественной сущностью."
 civic_machine_chosen: "Сеть апостолов"
 civic_machine_chosen_desc: "$civic_ap_blockade_tt$\n\nЕщё на ранних этапах развития эти машины оказались под влиянием Покрова, и теперь их протоколы содержат договор с могущественной сущностью."
 civic_corporate_chosen: "Избранные управляющие"
 civic_corporate_chosen_desc: "$civic_ap_blockade_tt$\n\nС самого основания успех этой корпорации зависел от таинственной сущности из Покрова, и теперь она действует под её покровительством."
 civic_corporate_chosen_effects: "$civic_chosen_effects$\n— £building£ §Y$building_psionic_offices$§!: этот $megacorp_civic_branch_office_building_effect$"
 civic_tooltip_not_chosen: "НЕТ гражданской модели ['concept_chosen_civics']"
 concept_chosen_civics: "Избранные"
 concept_chosen_civics_desc: "К гражданским моделям группы «$concept_chosen_civics$» относятся:\n- ['civic:civic_chosen']$NEW_LINE$- ['civic:civic_hive_chosen']$NEW_LINE$- ['civic:civic_machine_chosen']$NEW_LINE$- ['civic:civic_corporate_chosen']"
 shroud.5105.title: "Избранные"
 shroud.5105.desc: "Мы всегда чувствовали это... эфемерную связь с сущностью, которую не можем ни определить, ни понять.\n\n[This.GetTheChosenP2]\n\nОна была с нами с самых древних времён. То, что она избрала нас, — очевидно... Но зачем — остаётся загадкой.\n\nКак же нам назвать это [This.GetSensation&nom]?"
 shroud.5105.desc_p2: "Мы ощущаем её присутствие в самых сокровенных мыслях. Она витает рядом, всегда чуть вне досягаемости. Она одновременно и реальна, и невозможна для нашего разума."
 shroud.5105.desc_p2_machine: "Мы фиксируем её присутствие в наших сложнейших вычислениях. Она витает рядом, всегда чуть вне досягаемости. Она одновременно и реальна, и невозможна для наших схем."
 shroud.5105.a: "$the_composer_of_strands_article_cap$"
 shroud.5105.b: "$the_eater_of_worlds_article_cap$"
 shroud.5105.c: "$the_cradle_of_souls_article_cap$"
 shroud.5105.d: "$the_instrument_of_desire_article_cap$"
 shroud.5110.title: "[GetChosenPatron] зовет"
 shroud.5110.desc_common: "На протяжении всей нашей истории с нами была непостижимая сущность, известная как §H[GetChosenPatron]§!. Теперь, когда перед нами открылись просторы галактики, мы [GetFeelLoc] ее присутствие в наших [GetMindPhysicalLoc&prep], как никогда прежде.\n\nОна манит нас, затягивая все глубже. И в этой близости мы впервые различаем истинные очертания бездны в нашем [GetMindLogicLoc&prep]. [GetChosenPatron] зовет нас"
 shroud.5110.desc_common_2: "Теперь мы знаем, как по своей воле ступить в этот эфемерный мир."
 shroud.5110.desc_organic: "$shroud.5110.desc_common$, суля переживания за гранью понимания.\n\n$shroud.5110.desc_common_2$"
 shroud.5110.desc_robot: "$shroud.5110.desc_common$, оптимизируя наши параметры в соответствии с ещё неизвестными принципами.\n\n$shroud.5110.desc_common_2$"
 shroud.5110.a: "Наши горизонты разверзаются внутрь."
 shroud.5110.a.tt: "Получить §Yсонастроенность§! с этой сущностью: $@chosen_patron_attunement_gift|0G$\n§YПокров§! доступен через меню §Yконтактов§!."
 shroud.5115.title: "[GetChosenPatron]"
 shroud.5115.desc.intro: "Покров. Он простирается над знакомой нам реальностью, словно тень, отбрасываемая тьмой.\n\nХотя мы давно пытались проникнуть в это псионическое царство, наши прежние попытки были лишь робкими шагами. Теперь, после долгих лет, когда наши объединенные разумы истончили завесу между измерениями, мы ощущаем его достаточно четко, чтобы исследовать осознанно.\n\nПо ту сторону наши усилия не остались незамеченными. §H[GetChosenPatron]§! ждет нас."
 shroud.5115.desc.outro: "В этом водовороте бесчисленных сущностей его ясность сродни обетованию."
 shroud.5115.desc.composer: "$shroud.5115.desc.intro$\n\n§HРАСКРОЙСЯ. ОКУТЫВАЙ. РАСШИРЯЙСЯ.§!\n\n$shroud.5115.desc.outro$"
 shroud.5115.desc.eater: "$shroud.5115.desc.intro$\n\n§HПОЗНАЙ ИСТИННЫЙ ГОЛОД.§!\n\n$shroud.5115.desc.outro$"
 shroud.5115.desc.cradle: "$shroud.5115.desc.intro$\n\n§HСОБИРАЙ И ПРИНИМАЙ.§!\n\n$shroud.5115.desc.outro$"
 shroud.5115.desc.instrument: "$shroud.5115.desc.intro$\n\n§HОТДАЙСЯ ЖЕЛАНИЮ.§!\n\n$shroud.5115.desc.outro$"
 shroud.5115.a: "Мы еще вернемся."
