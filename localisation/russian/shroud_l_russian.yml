 trait_haunting_visions: "Тревожащие видения"
 trait_haunting_visions_desc: "Сущности из иных измерений насылают на эту расу безумные видения, мешающие выполнению сложных задач."
 trait_haunting_visions_portrait_override_tt: "$trait_uncanny_intuition_portrait_override_tt$"
