 situation_breach_shroud_endbringers_monthly_change_tooltip: "$situation_breach_shroud_monthly_change_tooltip$"
 situation_breach_shroud_endbringers_cult_of_the_voice_needed_desc: "£trigger_no£ Нет традиции «$tr_psionics_endbringers_cult$»\n£trigger_no£ Нет сооружения «$building_chamber_of_silence$»"
 situation_breach_shroud_endbringers_chamber_of_silence_needed_desc: "£trigger_yes£ Есть традиция «$tr_psionics_endbringers_cult$»\n£trigger_no£ Нет сооружения «$building_chamber_of_silence$»"
 approach_situation_breach_shroud_endbringers_nothing: "$approach_situation_breach_shroud_nothing$"
 approach_situation_breach_shroud_endbringers_nothing_desc: "Что будет, то будет."
