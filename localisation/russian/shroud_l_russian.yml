 SHROUD_HEADER_DESC: "Сам по себе Покров — бесконечно меняющееся колесо, составленное из принадлежащих могущественным сущностям владений. Считается, что поступки, совершенные в физическом мире, способны напрямую отразиться на положении в мире нематериальном."
