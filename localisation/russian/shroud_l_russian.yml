 RECKONING_ARRIVAL_PROJECT: "Отпор Расплате"
 RECKONING_ARRIVAL_PROJECT_DESC: "Галактика в опасности: ей грозит сущность невероятной силы по имени §R$NAME_Reckoning$§!. Состоящая из чистой энергии, она материализовалась без предупреждения и тут же начала сеять разрушение.\n\nВсе доступные данные показывают, что эта сущность непохожа ни на какого другого противника, с которым мы сталкивались раньше. Если мы хотим дать отпор этому врагу, нам нужно срочно начать исследования, чтобы определить наиболее эффективные средства противодействия."
 shroud.11235.title: "$RECKONING_ARRIVAL_PROJECT$"
 shroud.11235.desc: "Наши [GetScientistPlural] завершили всестороннее изучение могущественной сущности, известной как §R$NAME_Reckoning$§!.\n\nНа основе их находок мы разработали эффективный метод противодействия этому врагу с использованием существующих технологий: энергетическую структуру Расплаты можно разрушить модифицированным оружием, пробивающим энергощиты.\n\nПусть этот враг силён, теперь у нас есть шанс дать ему отпор."
 shroud.11235.a: "$extreme_frontiers.1531.i$"
 RECKONING_VULNERABILITY_PROJECT: "У нее должно быть слабое место."
 RECKONING_VULNERABILITY_PROJECT_DESC: "Хотя победы мы не достигли, наше столкновение с сущностью по имени §R$NAME_Reckoning$§! дало нашим исследователям бесценные данные.\n\nБросив все усилия на изучение этой загадочной энергетической сущности, мы можем найти ее уязвимости и разработать более эффективные методы противодействия."
 shroud.11240.title: "Уроки из поражения"
 shroud.11240.desc: "§R$NAME_Reckoning$§! оказалась нашим флотилиям не по зубам. Несмотря на поражение, столкновение дало нам ценные данные, которые мы не смогли бы получить без прямого контакта.\n\nПредварительный анализ показывает, что мы собрали достаточно данных для моделирования состава этой сущности. Дальнейшие исследования позволят нам найти ее уязвимости и соответствующим образом скорректировать нашу тактику."
 shroud.11240.a: "У нее должно быть слабое место."
 shroud.11245.title: "Слабое место Расплаты"
 shroud.11245.desc.1: "Наши [GetScientistPlural] совершили прорыв в исследовании энергетической сущности, известной как §R$NAME_Reckoning$§!."
 shroud.11245.desc.2.intro: "Эта сущность не просто появилась из"
 shroud.11245.desc.2.outro: "Лазеры с «пси-подавительными» свойствами позволят нашим флотилиям нарушить эту связь, обнажив физическую форму для атаки."
 shroud.11245.desc.2.psionic: "$shroud.11245.desc.2.intro$ §HПокрова§!, но и черпает свою оборонительную мощь из псионического измерения через межпространственную связь. $shroud.11245.desc.2.outro$"
 shroud.11245.desc.2.non_psionic: "$shroud.11245.desc.2.intro$ другого измерения, но и черпает свою оборонительную мощь через загадочную межпространственную связь. $shroud.11245.desc.2.outro$"
 reckoning_insight_modifier: "Понимание Расплаты"
 reckoning_insight_modifier_desc: "Широкомасштабные исследования позволили нам определить эффективный метод нанесения вреда Расплате за счет модификации уже существующего оружия."
 reckoning_vulnerability_modifier: "Слабое место Расплаты"
 reckoning_vulnerability_modifier_desc: "Данные, полученные в результате предыдущего столкновения с Расплатой, помогли нам найти способ наносить больше вреда при помощи «пси-подавительных» лазеров."
 #==========================
 # Patrons Covenants
 #==========================
 shroud.reject_covenant: "Отклонить договор и уйти."
 shroud.reject_covenant.tt: "Мы больше никогда не примем подобного предложения."
 shroud.forge_our_own_path: "Мы пойдем своим путем."
 shroud.forge_our_own_path.tt: "§RВнимание: с этого момента мы не сможем заключить договор ни с каким благоволителем.§!"
 shroud.covenant_eater_accept_bonus.tt: "Подтвердить договор с Пожирателем миров.\n§CДополнительные эффекты:§!\n$t$$covenant_eater_telepath_tt$"
 shroud.covenant_cradle_accept_bonus.tt: "Подтвердить договор с Колыбелью душ.\n§CДополнительные эффекты:§!\n$t$$covenant_cradle_telepath_tt$"
 shroud.covenant_instrument_accept_bonus.tt: "Подтвердить договор с Исполнителем желаний.\n§CДополнительные эффекты:§!\n$t$$covenant_instrument_telepath_tt$"
 shroud.covenant_composer_accept_bonus.tt: "Подтвердить договор с Составителем цепочек.\n§CДополнительные эффекты:§!\n$t$$covenant_composer_telepath_tt$"
 shroud.covenant_whisperers_accept_bonus.tt: "Подтвердить договор с Шепчущими в пустоте.\n§CДополнительные эффекты:§!\n$t$$covenant_whisperers_telepath_tt$"
 shroud.unlock_covenant_accords.tt: "\nОткрыть §Yсилы договора§! этого благоволителя, которые можно использовать, чтобы получить положительные эффекты, когда они будут готовы.\n\n"
 # Eater of Worlds
 shroud.4500.title: "$utopia.3304.name$"
 shroud.4500.desc.default: "[GetEaterCovenantProposedEvent]"
 shroud.4500.desc.hive: "$shroud.4500.desc.default$"
 shroud.4500.desc.gestalt_machine: "$shroud.4500.desc.default$"
 shroud.4500.desc.individual_machine: "$shroud.4500.desc.default$"
 shroud.4500.desc.1: "Мы заглядываем в Покров, и ощущаем неутолимый голод мрачной, не находящей покоя сущности."
 shroud.4500.desc.pacifist: "$shroud.4500.desc.1$$utopia.3306.desc.2$\n\nЕго нетерпение источает угрозу. Способны ли наши разумы принять это чудовище?"
 shroud.4500.desc.non_pacifist: "$shroud.4500.desc.1$$utopia.3306.desc.2$\n\nПохоже, ему не терпится начать."
 shroud.4500.a: "Заключить договор с §HПожирателем миров§!."
 shroud.4505.desc.intro: "Дело сделано. Мы заключили договор с §PПожирателем миров§!. §H[Root.GetName]§! станет проводником его воли."
 shroud.4505.desc.outro: "Мы заключили союз с Пожирателем, и он взял свою дань: все население одного из наших городов внезапно исчезло без следа. Такова цена этой связи — по крайней мере, до тех пор, пока Пожиратель не проголодается вновь."
 shroud.4505.desc.default: "$shroud.4505.desc.intro$\n\n[GetEaterCovenantFormedDesc]\n\n$shroud.4505.desc.outro$"
 shroud.4505.desc.hive: "$shroud.4505.desc.intro$\n\n[GetEaterCovenantFormedDesc]\n\n$shroud.4505.desc.outro$"
 shroud.4505.desc.gestalt_machine: "$shroud.4505.desc.hive$"
 shroud.4505.desc.individual_machine: "$shroud.4505.desc.intro$\n\nПеремены в нашем обществе уже заметны. Наши военные модули все более сосредоточены на битвах: в мирное время нам приходится занимать их затратным военным моделированием, чтобы они не принялись творить беззаконие, перегревшись от безделья.\n\n$shroud.4505.desc.outro$"
 shroud.4505.desc_2_pacifist: "В нашем обществе уже проявляются перемены. Наши умы разрываются между врожденным миролюбием и неожиданной тягой к битвам. Этот когнитивный диссонанс вызывает сильный дискомфорт у нашего, обычно столь мирного населения. Правильный ли выбор мы сделали?"
 shroud.4505.desc_2_organic_non_gestalt: "Перемены в нашем обществе уже ощутимы. Наши военные жаждут битвы; в мирное время нам приходится занимать их изнурительными учениями, чтобы они не принялись творить беззаконие."
 shroud.4505.desc_2_machine_non_gestalt: "Перемены в нашем обществе уже заметны. Наши военные модули всё более сосредоточены на битвах; в мирное время нам приходится занимать их затратным военным моделированием, чтобы они не принялись творить беззаконие."
 shroud.4505.desc_2_gestalt: "Перемены в нашем обществе уже заметны. Наши военные [GetIndividualNamePlural&nom] всё более сосредоточены на битвах; в мирное время нам приходится занимать их затратным военным моделированием, чтобы они не прибегали к ненужной агрессии."
 shroud.4505.a.default: "Будем надеяться, что все обойдется."
 shroud.4505.a.gestalt: "Оно того стоит."
 shroud.4510.desc.intro: "Прошло некоторое время с тех пор, как мы заключили договор с"
 shroud.4510.desc.outro: ". Наши узы еще слабы, и у нас есть шанс вырваться — или укрепить связь.\n\nНаши [GetTelepathPlural&nom] уверены, что если мы докажем свою верность, то сможем черпать силу прямо от благоволителя, а наши флотилии и псионическая аура тоже станут сильнее."
 shroud.4510.desc: "$shroud.4510.desc.intro$§HПожирателем миров§!$shroud.4510.desc.outro$"
 shroud.4510.b: "Отречься от §HПожирателя миров§!."
 shroud_eater_covenant_chain_title: "$eater_covenant_chain_title$"
 shroud_eater_covenant_chain_desc.intro: "Мы связали себя с сущностью Покрова, известной как §HПожиратель миров§!. Это ненасытное создание дарует нам крупицы своей силы, но не бесплатно.\n\nНаши [GetTelepathPlural&nom] предполагают, что связь с этой сущностью можно укрепить, если наши действия будут соответствовать ее воле."
 shroud_eater_covenant_chain_desc: "$shroud_eater_covenant_chain_desc.intro$\n\nПожиратель ненасытен и нетерпелив. Он жаждет войны, сладкого вкуса борьбы и скорби."
 shroud_eater_covenant_chain_begin: "$eater_covenant_chain_begin$"
 shroud_eater_covenant_chain_end: "$eater_covenant_chain_end$"
 robot_shroud_eater_covenant_chain_title: "$shroud_eater_covenant_chain_title$"
 robot_shroud_eater_covenant_chain_desc: "$shroud_eater_covenant_chain_desc.intro$\n\nПожиратель ненасытен и нетерпелив. Он жаждет войны, сладкого вкуса огня и разрушений."
 # Instrument of Desire
 shroud.4550.title: "$utopia.3304.name$"
 shroud.4550.desc.default: "Как только мы погружаемся в Покров, к нам обращается некая сущность. Ее мысли крутятся и вертятся, проникая в разум наших [GetTelepathPlural&gen], предлагая, упрашивая. Это §HИсполнитель желаний§!, который обещает нам богатство, власть, престиж… всё, что мы когда-либо желали.\n\nЦена? Пустяк, что-то вроде платы за вход. Он лишь хочет для нас самого лучшего. Он будет помогать нам, указывать нам путь, направлять наши стремления и мечты.\n\n§HМы должны лишь принять его в наши сердца.§!\n\nОн уверен, что мы ответим «да». Как вообще мы можем сказать «нет»?"
 shroud.4550.desc.hive: "$shroud.4550.desc.default$"
 shroud.4550.desc.gestalt_machine: "Как только мы погружаемся в Покров, к нам обращается некая сущность. Ее мысли крутятся и вертятся, проникая в схемы наших [GetTelepathPlural&gen], предлагая, упрашивая. Это §HИсполнитель желаний§!, который обещает нам богатство, власть, престиж… всё, что мы когда-либо желали.\n\nЦена? Пустяк, что-то вроде платы за вход. Он лишь хочет для нас самого лучшего. Он будет помогать нам, указывать нам путь, направлять наши стремления и мечты.\n\n§HМы должны лишь принять его в наши мейнфреймы.§!\n\nОн уверен, что мы ответим «да». Как вообще мы можем сказать «нет»?"
 shroud.4550.desc.individual_machine: "$shroud.4550.desc.gestalt_machine$"
 shroud.4550.a: "Заключить договор с §HИсполнителем желаний§!."
 shroud.4555.desc.intro: "Дело сделано. Мы заключили договор с §HИсполнителем желаний§!. §H[Root.GetName]§! станет проводником его воли."
 shroud.4555.desc.outro: "Такова цена нашей связи. По словам [GetTelepathPlural&nom], величайшие дары Исполнителя ещё впереди."
 shroud.4555.desc.default: "$shroud.4555.desc.intro$\n\nЦена договора уже становится ощутимой. Наше население ждет обещанной золотой эпохи богатства и процветания, и удовлетворения базовых потребностей для него уже мало. Теперь [Root.GetSpeciesNamePlural] жаждут самых разных материальных благ, и это тяжелым грузом ложится на нашу экономику.\n\n$shroud.4555.desc.outro$"
 shroud.4555.desc.hive: "$shroud.4555.desc.intro$\n\nЦена договора уже становится заметной. Наши единицы Разума ждут обещанной золотой эпохи богатства и процветания, и их потребности выше с каждым днем. Теперь [Root.GetSpeciesNamePlural] требуют широкого спектра необязательных товаров, и это тяжелым грузом ложится на нашу экономику.\n\n$shroud.4555.desc.outro$"
 shroud.4555.desc.gestalt_machine: "$shroud.4555.desc.hive$"
 shroud.4555.desc.individual_machine: "$shroud.4555.desc.default$"
 shroud.4555.a.default: "Будем надеяться, что они правы."
 shroud.4555.a.gestalt: "Мы верим в их правоту."
 shroud.4560.desc: "$shroud.4510.desc.intro$§HИсполнителем желаний§!$shroud.4510.desc.outro$"
 shroud.4560.b: "Отречься от §HИсполнителя желаний§!."
 shroud_instrument_covenant_chain_title: "$instrument_covenant_chain_title$"
 shroud_instrument_covenant_chain_desc.intro: "Мы связали себя с сущностью Покрова, известной как §HИсполнитель желаний§!. Это изнеженное создание дарует нам крупицы своей силы, но не бесплатно. Вероятно, в будущем это повторится.\n\nНаши [GetTelepathPlural&nom] предполагают, что связь с этой сущностью можно укрепить, если наши действия будут соответствовать её воле."
 shroud_instrument_covenant_chain_desc: "$shroud_instrument_covenant_chain_desc.intro$\n\nИсполнитель жаждет удовольствий. Праздная жизнь, декадентство и рабовладение придутся ему по нраву."
 shroud_instrument_covenant_chain_begin: "$instrument_covenant_chain_begin$"
 shroud_instrument_covenant_chain_end: "$instrument_covenant_chain_end$"
 robot_shroud_instrument_covenant_chain_title: "$shroud_instrument_covenant_chain_title$"
 robot_shroud_instrument_covenant_chain_desc: "$shroud_instrument_covenant_chain_desc.intro$\n\nИсполнитель жаждет удовольствий. Непомерное потребление, хищническая эксплуатация ресурсов и рабовладение придутся ему по нраву."
 # Cradle of Souls
 shroud.4600.title: "$utopia.3304.name$"
 shroud.4600.desc.default: "[GetCradleCovenantProposedDesc]"
 shroud.4600.desc.hive: "$shroud.4600.desc.default$"
 shroud.4600.desc.gestalt_machine: "$shroud.4600.desc.default$"
 shroud.4600.desc.individual_machine: "$shroud.4600.desc.default$"
 shroud.4600.desc_homicidal: "Когда мы погружаемся в Покров, наше внутреннее зрение пронзает чье-то присутствие. Всепоглощающее сияние затмевает всё вокруг. Это $the_cradle_of_souls_color_article$, и она пылает в самом нашем естестве.\n\nОна требует галактического компромисса — унизительного мира между несовместимыми существами. Великая сила ждет нас, обещает она... если мы примем эту отвратительную картину.\n\n§HЕсли только позволим ей сформировать новые горизонты.§!\n\nСвет Колыбели неумолим, а ее мощь неоспорима. Сможем ли мы принять нечто подобное? Не ослабит ли это нашу решимость?"
 shroud.4600.desc_non_homicidal: "Погружаясь в Покров, мы ощущаем, как внутри нас расцветает присутствие. Мы чувствуем сияние, касающееся всего сущего, — оно излучает порядок и равновесие. Это §HКолыбель душ§!, и ее прикосновение потрясает нас до глубины.\n\nОна жаждет лишь одного — нерушимого мира, галактики, исцеленной от хаоса. Если мы разделим ее видение, она сделает нас творцами гармонии. Она предлагает союз, скрепленный нерушимой верностью.\n\n§HНужно лишь позволить ей изменить наши горизонты.§!\n\nНадежды Колыбели тяготеют над нами."
 shroud.4600.a: "Заключить договор с §HКолыбелью душ§!."
 shroud.4605.intro: "Дело сделано. Мы заключили договор с §CКолыбелью душ§!. §H[Root.GetName]§! станет проводником его воли."
 shroud.4605.desc.default: "$shroud.4605.desc.non_gestalt$"
 shroud.4605.desc.gestalt: "$shroud.4605.intro$\n\n[GetCradleCovenantFormedDesc]"
 shroud.4605.desc.non_gestalt: "$shroud.4605.intro$\n\n[GetCradleCovenantFormedDesc]"
 shroud.4605.desc.hive: "$shroud.4605.desc.gestalt$"
 shroud.4605.desc.gestalt_machine: "$shroud.4605.desc.gestalt$"
 shroud.4605.desc.individual_machine: "$shroud.4605.desc.non_gestalt$"
 shroud.4605.desc_outro_homicidal: "Влияние на [Root.GetSpeciesAdj&fem,acc] психику уже невозможно игнорировать. Умы многих [Root.GetIndividualPlural&gen] отравлены мыслями о галактическом мире, что вызывает глубочайший раскол в нашем обществе.\n\nПо словам наших [GetTelepathPlural&gen], настоящие преимущества этой сделки еще впереди. Но пока наши мысли терзает мучительный конфликт. Что же мы с собой сделали?"
 shroud.4605.desc_outro_gestalt: "Воздействие на [Root.GetSpeciesAdj&masc] разум уже можно зафиксировать. Приближая мир во всей галактике, мы остро переживаем любой конфликт с соседями, что вызывает помехи в коллективном сознании.\n\nЭто незначительное потрясение — цена нашей связи. По словам [GetTelepathPlural&gen], величайшие дары Колыбели еще впереди."
 shroud.4605.desc_outro_non_gestalt: "Воздействие на [Root.GetSpeciesAdj&masc] разум уже очевидно. Стремясь к миру во всей галактике, мы остро переживаем любой конфликт с соседями, что вызывает беспокойство среди населения.\n\nЭто незначительное потрясение — цена нашей связи. По словам [GetTelepathPlural&gen], величайшие дары Колыбели еще впереди."
 shroud.4605.a.default: "[GetCradleCovenantFormedOption]"
 shroud.4605.a.gestalt: "[GetCradleCovenantFormedOption]"
 shroud.4605.opt.a.default: "Будем надеяться, что они правы."
 shroud.4605.opt.a.gestalt: "Мы верим в их правоту."
 shroud.4605.opt.a.homicidal: "Пока остается только терпеть."
 shroud.4610.desc: "$shroud.4510.desc.intro$§HКолыбелью душ§!$shroud.4510.desc.outro$"
 shroud.4610.b: "Отречься от §HКолыбели душ§!."
 shroud_cradle_covenant_chain_title: "$the_cradle_of_souls$"
 shroud_cradle_covenant_chain_desc: "Мы связали себя с сущностью Покрова, известной как §HКолыбель душ§!. Это гармоничное создание дарует нам крупицы своей силы, но не бесплатно.\n\nНаши [GetTelepathPlural&nom] предполагают, что связь с этой сущностью можно укрепить, если наши действия будут соответствовать ее воле.\n\nКолыбель жаждет освободить галактику от хаоса конфликтов, склонить всех ее обитателей к всеобщей цели — всеобщему миру. Ее устроит только идеальный баланс."
 shroud_cradle_covenant_chain_begin: "$BEGINS_EVENT_CHAIN$ §Y$shroud_cradle_covenant_chain_title$§!"
 shroud_cradle_covenant_chain_end: "$ENDS_EVENT_CHAIN$ §Y$shroud_cradle_covenant_chain_title$§!"
 robot_shroud_cradle_covenant_chain_title: "$shroud_cradle_covenant_chain_title$"
 robot_shroud_cradle_covenant_chain_desc: "$shroud_cradle_covenant_chain_desc$"
 # Composer of Strands
 shroud.4650.title: "$utopia.3304.name$"
 shroud.4650.desc.default: "Сущность ожидает нас в Покрове, приветствуя с добродушной фамильярностью. Она разговаривает не столько словами, сколько видениями, концепциями, идеями. Она просачивается в разум наших [GetTelepathPlural&gen] так бережно и плавно, что возникает мысль, будто она всегда там была. Перед ними мелькает вихрь образов.\n\nЭта сущность, §HСоставитель цепочек§!, с любопытством и интересом рассматривает наши органические формы. Он показывает разнообразные способы их возможного развития, изменения. Улучшения. Эволюции.\n\n§HМы должны лишь позволить ему проникнуть в нашу плоть.§!\n\nОн ожидает от нас ответа, выражая терпение и нежность. Словно родитель, безумно любящий своего ребенка."
 shroud.4650.desc.hive: "$shroud.4650.desc.default$"
 shroud.4650.desc.gestalt_machine: "Сущность ожидает нас в Покрове, приветствуя с добродушной фамильярностью. Она разговаривает не столько словами, сколько видениями, концепциями, идеями. Она просачивается в схемы наших [GetTelepathPlural&gen] так бережно и плавно, что возникает мысль, будто она всегда там была. Перед ними мелькает вихрь образов.\n\nЭта сущность, §HСоставитель цепочек§!, с любопытством и интересом рассматривает наши механические формы. Он показывает разнообразные способы их возможной адаптации, изменения. Улучшения. Эволюции.\n\n§HМы должны лишь позволить ему проникнуть в наши компоненты.§!\n\nОн ожидает от нас ответа, выражая терпение и нежность. Словно родитель, безумно любящий своего ребенка."
 shroud.4650.desc.individual_machine: "$shroud.4650.desc.gestalt_machine$"
 shroud.4650.a: "Заключить договор с §HСоставителем цепочек§!."
 shroud.4655.desc.intro: "Дело сделано. Мы заключили договор с §HСоставителем цепочек§!. §H[Root.GetName]§! станет проводником его воли."
 shroud.4655.desc.outro: "Теперь очевидно: мы утратили часть контроля над [Root.GetSpeciesAdj&fem,inst] формой, и наш благоволитель может изменять её по своему усмотрению.\n\nЭто незначительная жертва ради новой связи. По словам [GetTelepathPlural&gen], величайшие дары Составителя ещё впереди."
 shroud.4655.desc.default: "$shroud.4655.desc.intro$\n\nНаши [GetScientistPlural] уже обнаружили аномалии в генетической структуре [Root.GetSpeciesAdj&pl,gen] образцов, словно за короткий срок произошли изменения, характерные для многих поколений эволюции. $shroud.4655.desc.outro$"
 shroud.4655.desc.hive: "$shroud.4655.desc.default$"
 shroud.4655.desc.individual_machine: "$shroud.4655.desc.intro$\n\nНаши [GetScientistPlural] уже обнаружили аномалии в молекулярной структуре [Root.GetSpeciesAdj&pl,gen] схем, словно за короткий срок произошли изменения, характерные для многих обновлений системы. $shroud.4655.desc.outro$"
 shroud.4655.desc.gestalt_machine: "$shroud.4655.desc.individual_machine$"
 shroud.4655.a.default: "$covenant.composer.option$"
 shroud.4655.a.gestalt: "Такова цена силы."
 shroud.4660.desc: "$shroud.4510.desc.intro$§HСоставителем цепочек§!$shroud.4510.desc.outro$"
 shroud.4660.b: "Отречься от §HСоставителя цепочек§!."
 shroud_composer_covenant_chain_title: "$composer_covenant_chain_title$"
 shroud_composer_covenant_chain_desc.intro: "Мы связали себя с сущностью Покрова, известной как §HСоставитель цепочек§!. Это заботливое создание дарует нам крупицы своей силы, но не бесплатно. Вероятно, в будущем это повторится.\n\nНаши [GetTelepathPlural&nom] предполагают, что связь с этой сущностью можно еще сильнее укрепить, если наши действия будут соответствовать ее воле."
 shroud_composer_covenant_chain_desc: "$shroud_composer_covenant_chain_desc.intro$\n\nСоставитель любит манипулировать генами, освобождая священную плоть от ограничений эволюции. Он учит нас уважать жизнь и природу."
 shroud_composer_covenant_chain_begin: "$composer_covenant_chain_begin$"
 shroud_composer_covenant_chain_end: "$composer_covenant_chain_end$"
 robot_shroud_composer_covenant_chain_title: "$shroud_composer_covenant_chain_title$"
 robot_shroud_composer_covenant_chain_desc: "$shroud_composer_covenant_chain_desc.intro$\n\nСоставитель любит манипулировать физическими формами, освобождая процесс роста от прежних ограничений. Он учит нас уважать жизнь и природу."
 # Whisperers in the Void
 shroud.4700.title: "$utopia.3304.name$"
 shroud.4700.desc: "$utopia.3304.desc.shroud$"
 shroud.4700.a: "Заключить договор с §HШепчущими в пустоте§!."
 shroud.4700.b: "$shroud.reject_covenant$"
 shroud_whisperers_in_the_void_covenant_formed_effect: "$t$£unity£ $mod_country_base_unity_produces_add$: §R-15%§!"
 shroud.4705.desc.intro: "Свершилось. Мы заключили договор с §MШепчущими в пустоте§!. Теперь их воля пронизывает §H[root.GetName&acc]§!.\n\nВлияние нашего нового благоволителя проявилось мгновенно."
 shroud.4705.desc.outro: "Такова цена нашей связи. По словам [GetTelepathPlural&gen], величайшие дары Шепчущих ещё впереди. Непосредственное общение со столь могущественной псионической сущностью несомненно стоит того."
 shroud.4705.desc.gestalt: "$shroud.4705.desc.intro$ Пока наш коллектив ожидает притока сокрытых знаний, мы ощущаем, как наши мысли дробятся на противоречивые паттерны. Прежде незыблемая гармония [GetNetworkName&gen] теперь нарушается нарастающим диссонансом внутренних голосов.\n\n$shroud.4705.desc.outro$"
 shroud.4705.desc.non_gestalt: "$shroud.4705.desc.intro$ Мы жаждем тайных знаний, и отдельные идеи и мнения начинают противоречить друг другу. Диссонанс внутренних голосов разъедает нашу психику, угрожая подорвать душевное здоровье [root.GetSpeciesNamePlural&gen].\n\n$shroud.4705.desc.outro$"
 shroud.4705.desc.default: "$shroud.4705.desc.non_gestalt$"
 shroud.4705.desc.hive: "$shroud.4705.desc.gestalt$"
 shroud.4705.desc.gestalt_machine: "$shroud.4705.desc.gestalt$"
 shroud.4705.desc.individual_machine: "$shroud.4705.desc.non_gestalt$"
 shroud.4705.a.default: "Мы справимся."
 shroud.4705.a.gestalt: "$shroud.4705.a.default$"
 shroud.4710.title: "$utopia.2658.name$"
 shroud.4710.desc: "$shroud.4510.desc.intro$§HШепчущими в пустоте§!$shroud.4510.desc.outro$"
 shroud.4710.a: "$utopia.2658.a$"
 shroud.4710.b: "Отречься от §HШепчущих в пустоте§!."
 shroud_whisperers_in_the_void_covenant_accepted_effect: "$t$Ежемесячные £research£ исследования за каждые $pop_group_unit$ должностей $telepath_type_plural_with_icon$: $@telepath_whisperers_research|0=+$"
 # End of the Cycle
 shroud.4715.desc.intro: "Свершилось. Мы заключили договор с §HКонцом цикла§!. [Root.GetName]. Когда мы согласились на сделку, наши [GetTelepathPlural&nom] заговорили вновь: §R«НАЧАЛО КОНЦА».§!"
 shroud.4715.desc.default: "$shroud.4715.desc.intro$\n\nА затем — тишина. Глухая тишина заполняет умы всех [root.GetSpeciesNamePlural&gen]. Раньше в сознании каждого из нас бились волны §HПокрова§!, теперь же в псионическом измерении царит смертельное безмолвие.\n\nНам остается лишь пытаться осмыслить, что мы на себя навлекли."
 shroud.4715.desc.hive: "$shroud.4715.desc.intro$\n\nА затем — тишина. Глухая тишина заполняет умы всех [root.GetSpeciesNamePlural&gen]. [GetBrainName] больше не резонирует с волнами §HПокрова§!, теперь в псионическом измерении царит безмолвное ничто.\n\nНам остается лишь пытаться предполагать, что мы на себя навлекли."
 shroud.4715.desc.gestalt_machine: "$shroud.4715.desc.default$"
 shroud.4715.desc.individual_machine: "$shroud.4715.desc.default$"
 shroud.4715.a.default: "Пусть его воля будет милосердной."
 shroud.4715.a.gestalt: "$shroud.4715.a.default$"
 shroud_whisperers_covenant_chain_title: "$whisperers_covenant_chain_title$"
 shroud_whisperers_covenant_chain_desc: "Мы связали себя с сущностью Покрова, известной как §HШепчущие в пустоте§!. Это непостижимое создание обещает даровать нам крупицы своей силы.\n\nНаши [GetTelepathPlural&nom] предполагают, что связь с этой сущностью можно укрепить, если наши действия будут соответствовать ее воле.\n\nШепчущие ценят новые знания, тайны и заговоры. Они наслаждаются простой радостью разума, переполненного идеями."
 shroud_whisperers_covenant_chain_begin: "$whisperers_covenant_chain_begin$"
 shroud_whisperers_covenant_chain_end: "$whisperers_covenant_chain_end$"
 robot_shroud_whisperers_covenant_chain_title: "$shroud_whisperers_covenant_chain_title$"
 robot_shroud_whisperers_covenant_chain_desc: "$shroud_whisperers_covenant_chain_desc$"
 shroud.11110.title: "Цикл продолжается"
 shroud.11110.desc: "§HШепчущие§! резко меняются, их голоса заглушают все остальные мысли в наших умах. Они стремятся вступить с нами в контакт, заполнить наши умы знаниями.\n\nНам придется сделать выбор, отказаться от которого потом будет уже невозможно."
 shroud.11110.a: "Поглотить Пожирателя миров."
 shroud.11110.b: "Поглотить Колыбель душ."
 shroud.11110.c: "Поглотить Исполнителя желаний."
 shroud.11110.d: "Поглотить Составителя цепочек."
 shroud.11120.title: "Месть [GetBetrayedPatronColour&gen]"
 shroud.11120.title.eater: "Месть §HПожирателя миров§!"
 shroud.11120.title.cradle: "Месть §HКолыбели душ§!"
 shroud.11120.title.instrument: "Месть §HИсполнителя желаний§!"
 shroud.11120.title.composer: "Месть §HСоставителя цепочек§!"
 shroud.11120.desc: "Когда [GetTelepathPlural&nom] вышли из §HПокрова§!, мы обнаружили, что [GetBetrayedPatronColour] вне себя от ярости из-за нашего предательства.\n\nНад миром §H[event_target:selected_planet_for_revenge.GetName]§! открылся тоннель Покрова, и теперь он представляет собой безжизненную пустошь. Мы [GetFeltLoc] яростный гнев, исходящий из тоннеля, — бывший благоволитель явно готовится отомстить."
 shroud.11120.a: "Нам нужно готовиться к обороне."
 shroud.11120.a.tt: "§H[event_target:selected_planet_for_revenge.GetName]§! превращается в §Y$pc_shrouded$§!.\nРядом с этой планетой появится $SHROUD_TUNNEL_GALACTIC$."
 shroud_tunnel_object: "$SHROUD_TUNNEL_GALACTIC$"
 shroud.11130.title: "Яростное возмездие"
 shroud.11130.desc_common: "§Y$NAME_Psionic_Avatar$§! появился из тоннеля Покрова в системе [event_target:spawn_system.GetName]. Это воплощение гнева [GetBetrayedPatronColour&gen] направилось прямо к столичному миру [capital_scope.GetName]."
 shroud.11130.desc_success: "Нам удалось собрать силы, чтобы дать отпор растущей угрозе. Наши корабли исторгли волны псионической энергии в $SHROUD_TUNNEL_GALACTIC$, ослабив враждебную сущность, пока та пыталась прорваться в нашу реальность."
 shroud.11130.success_tt: "$NAME_Psionic_Avatar$ появится с половиной силы."
 shroud.11250.title: "Завершитель."
 shroud.11250.desc: "Мы впадаем в транс, наши сознания охватывает тишина. Мы никогда не видели Покров таким тихим.\n\nПустота безмолвна.\n\nВсе исчезло."
 shroud.11250.a: "Это завершение."
 shroud.11255.title: "Возрождение [owner.GetName&gen]"
 shroud.11255.desc: "Мы приложили титанические усилия, чтобы оправиться от разрушений, причиненных §HКонцом цикла§!. В знак нового начала для [owner.GetName&gen] мы восстановили §Hфорпост§! в системе §H[solar_system.Star.GetStarName]§!."
 ACCEPT_COVENANT: "Заключить договор с сущностью $PATRON$.\n§CЭффекты:§!\n$EFFECTS$"
 REFUSE_COVENANT: "Отвергнуть договор с сущностью $PATRON$."
 CONFIRM_COVENANT: "Подтвердить договор с сущностью $PATRON$."
 RENOUNCE_COVENANT: "Отменить договор с сущностью $PATRON$."
 CREATE_RELATION: "Установить отношения с благоволителем $PATRON$."
 CRADLE_MARK: "Метка Колыбели"
 CRADLE_MARK_DESC: "$COMPOSER_MARK_DESC$"
 tech_covenant_cradle: "$CRADLE_MARK$"
 tech_covenant_cradle_desc: "$tech_covenant_composer_desc$"
 leader_trait_cradle_chosen: "Избранный Колыбелью"
 leader_trait_cradle_chosen_desc: "$leader_trait_whisperers_chosen_desc$"
 leader_trait_shroudshaper: "Ваятель Покрова"
 leader_trait_shroudshaper_desc: "Этот лидер — вечное существо, обладающее невероятной псионической силой, благодаря которой нам легче менять Покров по своему желанию."
 COVENANT_EFFECTS: "§EЭффекты договора:§!"
 COVENANT_EATER: "§HДоговор с Пожирателем§!"
 covenant_eater_desc: "Наш договор с Пожирателем миров наполняет нас неутолимой жаждой завоеваний и разрушения."
 COVENANT_CRADLE: "§HДоговор с Колыбелью§!"
 covenant_cradle_desc: "Наш договор с Колыбелью душ излучает тепло по всей галактике, заставляя других лучше к нам относиться."
 covenant_cradle_tt: "[GetCradleCovenantTooltip]"
 covenant_cradle_bonus_tt: "$covenant_cradle_telepath_tt$\n$covenant_cradle_no_bonus_tt$"
 covenant_cradle_no_bonus_tt: "Содержание поселений, когда в пределах нашей §Hпсионической ауры§! есть государства с мнением ниже нейтрального: §R+[GetCradleCovenantUpkeepMult]%§!"
 COVENANT_INSTRUMENT: "§HДоговор с Исполнителем§!"
 covenant_instrument_desc: "Наш договор с Исполнителем желаний наполняет наши умы видениями наслаждений, затягивающими всё глубже в ментальный рай."
 COVENANT_COMPOSER: "§HДоговор с Составителем§!"
 covenant_composer_desc: "Наш договор с Составителем цепочек крепнет внутри нас, позволяя дальше распространять наши корни и преобразовывать галактику."
 COVENANT_WITV: "§HДоговор с Шепчущими§!"
 covenant_whisperers_desc: "Наш договор с Шепчущими в пустоте наполняет нас всеми знаниями и мудростью, которые они накопили в своих владениях в самом сердце Покрова."
 COVENANT_EOTC: "§HДоговор с Завершителем§!"
