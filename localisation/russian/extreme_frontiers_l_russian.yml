 extreme_frontiers.2005.title: "Токсичные ресурсы"
 extreme_frontiers.2005.desc.common: "Первое применение §Yгеорадиационного терраформирования§! на [target.GetPlanetMoon]е §Y[target.GetName]§! завершено.\n\nПревратив поверхность в непригодную для жизни токсичную пустошь, мы добыли огромное количество материалов благодаря усовершенствованной георадиационной матрице."
 extreme_frontiers.2005.desc.industrialist: "Это достижение знаменует начало новой эпохи эксплуатации миров и максимизации прибыли для нашего государства."
