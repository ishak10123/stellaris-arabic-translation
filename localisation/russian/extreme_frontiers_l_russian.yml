l_russian:
 #############
 # Anomalies #
 #############
 EXTREME_FRONTIERS_TITLE: "Экстремальные рубежи" # Do not translate
 # PULSATING OBJECT
 PULSATING_OBJECT_TOXIC_CAT: "Пульсирующий объект"
 PULSATING_OBJECT_GAS_GIANT_CAT: "Пульсирующий объект"
 PULSATING_OBJECT_BARREN_CAT: "Пульсирующий объект"
 PULSATING_OBJECT_BARREN_COLD_CAT: "Пульсирующий объект"
 PULSATING_OBJECT_FROZEN_CAT: "Пульсирующий объект"
 PULSATING_OBJECT_MOLTEN_CAT: "Пульсирующий объект"
 anomaly_pulsating_object_desc: "Первичное сканирование [this.GetPlanetMoon]ы §Y[this.GetName]§! выявило необычный объект, парящий в тропосфере. Он хаотично меняет положение, периодически сжимаясь и расширясь. Для определения его природы требуется дальнейшее исследование."
 extreme_frontiers.100.title: "Древний метеозонд"
 extreme_frontiers.100.desc: "§Y[Leader.GetName]§! [Leader.GetAXX::опознал|||fem:опознала] загадочный объект в атмосфере [from.GetPlanetMoon]ы §Y[from.GetName]§! — это древний метеорологический зонд. Все опознавательные знаки, которые могли бы указать на его происхождение, давно стёрты экстремальными погодными условиями [from.GetPlanetMoon]ы.\n\nРадиометрический анализ показывает, что он дрейфует в атмосфере уже более века, то сжимаясь, то расширяясь под воздействием причудливых перепадов давления.\n\nУдивительно, но его солнечные панели до сих пор функционируют, а сенсоры сохранили данные об атмосфере за сто лет. Наши [Root.Owner.GetResearchers] будут очень рады получить столь ценную информацию."
 # MOLTEN METAL OCEAN
 MOLTEN_METAL_OCEAN_CAT: "Экстремальные лавовые течения"
 anomaly_molten_metal_ocean_desc: "Первичное сканирование поверхности [from.GetPlanetMoon]ы §Y[from.GetName]§! выявило частые цунами в океане перегретой лавы с аномально высокой концентрацией тяжёлых металлов. Для полного понимания этого феномена требуется дополнительный анализ."
 extreme_frontiers.110.title: "Металлические цунами"
 extreme_frontiers.110.desc: "§Y[Leader.GetName]§! [Leader.GetAXX::подтвердил|||fem:подтвердила], что лавовые океаны на [from.GetPlanetMoon]е §Y[from.GetName]§! содержат необычайно чистые формы практически всех известных редких полуметаллов из нашей базы химических элементов.\n\nЭта концентрированная масса жидких металлов порождает крайне нестабильные электромагнитные поля, что приводит к частому образованию металлических цунами.\n\nС помощью прогностического моделирования мы выявили краткие, но регулярные периоды затишья, во время которых можно безопасно добывать эти ценнейшие металлы."
 # GREAT BLUE SPOTS
 GREAT_BLUE_SPOTS_CAT: "Великие синие пятна"
 great_blue_spots_desc: "Поверхность [from.GetPlanetMoon]ы §Y[from.GetName]§! отмечена двумя крупными аномальными участками, достаточно большими, чтобы их было видно из космоса. Эти синеватые образования движутся синхронно и с огромной скоростью, что делает их достойными дальнейшего изучения."
 extreme_frontiers.120.title: "Симбиотические супербури"
 extreme_frontiers.120.desc: "Огромные синие пятна на [from.GetPlanetMoon]е §Y[from.GetName]§! оказались парой взаимосвязанных супербурь — циклона и антициклона, поддерживающих друг друга в идеальном равновесии.\n\nЭти бури колоссальны по масштабу: скорость ветра в них регулярно преодолевает звуковой барьер, порождая мощные ударные волны. Внутри вихрей содержатся огромные объёмы кобальтовой пыли, придающей пятнам характерный синеватый оттенок.\n\nСогласно расчётам, которые [Leader.GetAXX::провёл|||fem:провела] §Y[Leader.GetName]§!, бури бушуют здесь непрерывно уже более века. Скопившиеся в верхних слоях атмосферы минералы можно легко добыть при помощи орбитальной станции."
 # FROZEN INFERNO
 FROZEN_INFERNO_CAT: "Тепловые всплески"
 frozen_inferno_desc: "Первичное сканирование ледяного небесного тела §Y[from.GetName]§! выявило крайне нестабильные тепловые аномалии. Эти неожиданные температурные всплески требуют дополнительного изучения."
 extreme_frontiers.130.title: "Ледяной ад"
 extreme_frontiers.130.desc: "§Y[Leader.GetName]§! [Leader.GetAXX::завершил|||fem:завершила] исследование температурных аномалий на замёрзшей [from.GetPlanetMoon]е §Y[from.GetName]§!.\n\nПод вечной мерзлотой на поверхности обнаружены высокореактивные пирофорные отложения. Долгое время оставаясь инертными в глубинах ледяного покрова, эти вещества периодически поднимаются на поверхность в результате движения и разрушения континентальных ледников.\n\nПри оттаивании эти сверхгорючие газы мгновенно воспламеняются в богатой кислородом атмосфере, вызывая частые вспышки пламени по всей поверхности [from.GetPlanetMoon]ы [from.GetName].\n\nПри помощи специализированного оборудования эти уникальные горючие вещества можно добыть и использовать."
 # POISONED ATMOSPHERE
 POISONED_ATMOSPHERE_CAT: "Отравленная атмосфера"
 poisoned_atmosphere_desc: "В верхних слоях атмосферы на [from.GetPlanetMoon]е §Y[from.GetName]§! обнаружена высокая концентрация ядовитых органических соединений."
 extreme_frontiers.140.title: "Отравленная атмосфера"
 extreme_frontiers.140.desc.hive_mind: "§Y[from.GetName]§! является домом для необычного вида лишайников, выделяющих в атмосферу сверхтоксичные молекулы для защиты от хищников.\n\nИзучение ископаемых останков показывает, что когда-то на [from.GetPlanetMoon]е [from.GetName] существовала разнообразная фауна, которую лишайники постепенно истребили — они повышали концентрацию мышьяка и таллия в атмосфере быстрее, чем большинство видов могло адаптироваться.\n\n§Y[Leader.GetName]§! [Leader.GetAXX::обнаружил|||fem:обнаружила], что лишь один организм, не считая самих лишайников, — крупные рептилоиды — смог приспособиться к этим условиям благодаря уникальной железе с исключительно эффективной системой детоксикации.\n\nДальнейшее изучение этого удивительного органа может предоставить нам ценные данные для разработки систем по очистке атмосферы."
 extreme_frontiers.140.desc.default: "$extreme_frontiers.140.desc.hive_mind$ Первые эксперименты также показывают, что уникальные соединения, входящие в состав этих ядов могут найти применение в косметической промышленности."
 extreme_frontiers.140.a: "Какие интересные перспективы..."
 extreme_frontiers.140.b: "Переработать в парфюмерную продукцию."
 DETOXIFICATION_GLAND_PROJECT: "Исследование детоксикационной железы"
 DETOXIFICATION_GLAND_PROJECT_DESC: "На [from.GetPlanetMoon]е §Y[from.GetName]§! обитает удивительный вид рептилоидов, выживающих в токсичной атмосфере благодаря уникальному внутреннему органу, преобразующему опасные токсины в полезные питательные вещества. Тщательное изучение этого организма представляется крайне перспективным направлением исследований."
 extreme_frontiers.145.title: "Открытие в области детоксикации"
 extreme_frontiers.145.desc: "В ходе интенсивного изучения детоксикационных желез рептилоидов с [from.GetPlanetMoon]ы §Y[from.GetName]§!, §Y[Leader.GetName]§! [Leader.GetAXX::раскрыл|||fem:раскрыла] биологические секреты их удивительной устойчивости к ядовитой атмосфере.\n\nЭтот сложный орган вырабатывает соединения, нейтрализующие действие атмосферных токсинов и предотвращающие их проникновение в кровеносную систему рептилий. Железа демонстрирует поразительную адаптивность, успешно нейтрализуя даже самые смертоносные искусственные яды, созданные в наших лабораториях.\n\nЭто открытие кардинально изменит наши подходы к очистке атмосферы от токсичных веществ."
 # GLIMPSE OF THE CORE
 GLIMPSE_CORE_CAT: "Взгляд в ядро"
 glimpse_the_core_desc: "Необычные движения в газообразных внешних слоях [from.GetPlanetMoon]ы §Y[from.GetName]§! приводят к образованию временных разломов, обнажающих твёрдое ядро [from.GetPlanetMoon]ы на короткие промежутки времени. Это удивительное явление требует дальнейшего изучения."
 extreme_frontiers.150.title: "Органическое ядро"
 extreme_frontiers.150.desc: "Отправив зонд в один из временных разломов на [from.GetPlanetMoon]е §Y[from.GetName]§!, §Y[Leader.GetName]§! [Leader.GetAXX::обнаружил|||fem:обнаружила], что ядро [from.GetPlanetMoon]ы населяет вид одноклеточных организмов, непохожих ни на что ранее известное.\n\nЭти выносливые клетки идеально приспособлены к экстремальному давлению, а их сезонное размножение сопровождается выделением значительных объёмов водорода. [Leader.GetName] [Leader.GetAXX::пришёл|||fem:пришла] к выводу, что именно эти организмы подпитывают водородом газообразные внешние слои [from.GetPlanetMoon]ы.\n\nУничтожение организмов приведёт к рассеиванию этих слоёв, после чего останется пригодная для колонизации каменистая [from.GetPlanetMoon]а."
 extreme_frontiers.150.a: "Уничтожить их."
 extreme_frontiers.150.b: "Это уникальный шанс для наблюдений."
 PURIFY_CORE_PROJECT: "Очистка ядра"
 PURIFY_CORE_PROJECT_DESC: "Газообразные внешние слои [from.GetPlanetMoon]ы §Y[from.GetName]§! существуют благодаря уникальным одноклеточным организмам, населяющим её ядро. Их уничтожение приведёт к рассеиванию этих слоёв, оставив нам пригодную для колонизации каменистую [from.GetPlanetMoon]у."
 extreme_frontiers.155.title: "Новый мир"
 extreme_frontiers.155.desc: "§Y[Leader.GetName]§! [Leader.GetAXX::отправил|||fem:отправила] зонд с токсичным зарядом в один из разломов на поверхности [from.From.GetPlanetMoon]ы §Y[from.From.GetName]§!. Достигнув ядра, зонд выпустил отравляющее вещество, уничтожившее местные микроорганизмы.\n\nМы наблюдали, как газовые слои постепенно рассеялись в космосе, оставив после себя небольшую каменистую [from.From.GetPlanetMoon]у."
 extreme_frontiers.155.a: "Невероятное достижение."
 # OPTICAL PHENOMENA
 OPTICAL_PHENOMENA_CAT: "Мерцающая поверхность"
 optical_phenomena_desc: "Сканирование [from.GetPlanetMoon]ы §Y[from.GetName]§! выявило необычайно яркие оптические аномалии, однако при наблюдении с орбиты природа этих цветовых узоров остаётся неясной."
 extreme_frontiers.160.title: "Радужный ледяной щит"
 extreme_frontiers.160.desc.default: "Детальное исследование поверхности [from.GetPlanetMoon]ы §Y[from.GetName]§! раскрыло природу наблюдаемых оптических феноменов.\n\nАтмосферные процессы отполировали обширные участки вечной мерзлоты до зеркального блеска, обнажив скрытые под поверхностью многоцветные кристаллические образования. При наблюдении с орбиты эти природные структуры создают калейдоскопический эффект."
 extreme_frontiers.160.desc.machine: "$extreme_frontiers.160.desc.default$\n\nХотя зрелище обладает несомненной эстетической ценностью, основной интерес для нас представляют богатые запасы минералов, содержащиеся в этих образованиях."
 extreme_frontiers.160.tooltip: "Доступно §Yпланетарное решение§! §H$decision_prismatic_ice_exhibit$§! со следующими эффектами:\n£amenities£ $MOD_PLANET_AMENITIES_MULT$: §G+25%§!\n$mod_planet_jobs_unity_produces_mult$: §G+25%§!"
 decision_prismatic_ice_exhibit: "Выставка призматического льда"
 decision_prismatic_ice_exhibit_desc: "Добытые пласты идеально прозрачного льда, создающие завораживающий калейдоскопический эффект, можно выставить для всеобщего обозрения на ограниченный срок."
 prismatic_ice_max_3_times_pass: "Можно использовать до §Yтрех§! раз."
 prismatic_ice_max_3_times_fail: "$TRIGGER_FAIL$Можно использовать до §Yтрех§! раз."
 prismatic_ice_max_3_times_pass_with_var: "$TRIGGER_PASS$$prismatic_ice_max_3_times_pass$ (сейчас: §Y[owner.prismatic_ice_exhibit_happened]§!)"
 exhibiting_prismatic_ice: "Выставка призматического льда"
 exhibiting_prismatic_ice_desc: "Добытые пласты идеально прозрачного льда, создающие завораживающий калейдоскопический эффект, можно выставить для всеобщего обозрения на ограниченный срок."
 # PLASMA VOLCANOES
 PLASMA_VOLCANO_CAT: "Орбитальная плазма"
 plasma_volcano_desc: "Мы визуально подтвердили выбросы перегретой плазмы в верхние слои атмосферы [from.GetPlanetMoon]ы §Y[from.GetName]§!.\n\nГустой вулканический пепел в атмосфере мешает определить с орбиты источник этих выбросов. Изучение планеты с более близкого расстояния представляется рискованным."
 extreme_frontiers.170.title: "Плазменные вулканы"
 extreme_frontiers.170.desc: "§Y[Leader.GetName]§! [Leader.GetAXX::установил|||fem:установила] причину выбросов перегретой плазмы на [from.GetPlanetMoon]е §Y[from.GetName]§!.\n\nУникальное магнитное поле [from.GetPlanetMoon]ы провоцирует реакцию между ионизированными веществами в глубинах мантии, создавая вулканические камеры, наполненные плазмой под высоким давлением.\n\nКогда нестабильные тектонические плиты [from.GetPlanetMoon]ы сдвигаются, эта плазма с огромной силой выбрасывается вверх как смертоносный снаряд и воспламеняется при контакте с атмосферными газами, вызывая вторичные взрывы. Наши специалисты по вооружению уже заинтересовались возможностью применения этих принципов в плазменном оружии."
 extreme_frontiers.170.desc.negative: "К сожалению, из-за опасных условий исследования [Leader.GetName] [Leader.GetAXX::получил|||fem:получила]"
 extreme_frontiers.170.desc.traumatized: "$extreme_frontiers.170.desc.negative$ тяжёлую психологическую травму."
 extreme_frontiers.170.desc.maimed: "$extreme_frontiers.170.desc.negative$ тяжёлые ранения."
 # BLACK CLOUDS
 BLACK_CLOUDS_CAT: "Чёрные тучи"
 black_clouds_desc: "В атмосфере [from.GetPlanetMoon]ы §Y[from.GetName]§! обнаружены плотные чёрные облака, движущиеся по хаотичным траекториям, не зависящим от скорости или направления ветра. Они появляются на сканах лишь на короткое время и всегда в один и тот же момент планетарного цикла дня и ночи."
 extreme_frontiers.180.title: "Роевые насекомые"
 extreme_frontiers.180.desc: "Таинственные чёрные тучи на [from.GetPlanetMoon]е §Y[from.GetName]§! оказались гигантскими роями плотоядных насекомых.\n\nЭти крылатые хищники гнездятся в расщелинах скал и ежедневно вылетают, чтобы пожирать любую доступную органику на поверхности [from.GetPlanetMoon]ы.\n\nБлагодаря уникальному метаболизму, обращающему клеточный распад при поглощении пищи, эти членистоногие могут жить практически вечно — при условии регулярного питания."
 extreme_frontiers.180.desc.altered_metabolism: "Когда [Leader.GetName] [Leader.GetAXX::проводил|||fem:проводила] полевые исследования, один из экземпляров укусил [Leader.GetAXX::его|||fem:её], вызвав необычную метаболическую реакцию. Этот вид способен открыть нам новые горизонты в изучении регенеративных способностей клеток."
 extreme_frontiers.180.b: "Отыскать и сожрать их всех."
 leader_trait_altered_metabolism: "Изменённый метаболизм"
 leader_trait_altered_metabolism_desc: "Контакт с чужеродным организмом во время полевых исследований навсегда изменил метаболизм этого лидера."
 # SUBGLACIAL VIBRATIONS
 SUBGLACIAL_VIBRATIONS_CAT: "Подлёдные вибрации"
 subglacial_vibrations_desc: "Под замёрзшей безжизненной поверхностью [from.GetPlanetMoon]ы §Y[from.GetName]§! скрывается обширный подлёдный океан. Наши датчики зафиксировали мощные низкочастотные колебания, не являющиеся проявлениями сейсмической активности."
 extreme_frontiers.190.title: "Исполинские ластоногие"
 extreme_frontiers.190.desc: "Комбинированное использование эхолокации и сейсмического сканирования позволило обнаружить источник аномальных вибраций. В океане жидкого азота под поверхностью [from.GetPlanetMoon]ы §Y[from.GetName]§! обитают гигантские стада ластоногих, идеально адаптировавшихся к экстремальным условиям.\n\nЭти удивительные создания достигают размеров небольшого транспортного судна. Для коммуникации они издают мощные низкочастотные звуки, способные распространяться по всей [from.GetPlanetMoon]е. Их толстый слой коллагенового жира не только защищает от криогенных ожогов, но и усиливает акустические сигналы.\n\nОтсутствие естественных хищников в изолированной экосистеме подледного океана сделало этих гигантов любопытными и совершенно неагрессивными. Их можно легко приманить к поверхности, воспроизводя характерные звуковые паттерны."
 extreme_frontiers.190.a: "Уникальное открытие."
 extreme_frontiers.190.a.tt: "Открывает сооружение: ['building:building_pinniped_sanctuary']"
 extreme_frontiers.190.b: "Лёгкая добыча."
 building_pinniped_sanctuary: "Заповедник ластоногих"
 building_pinniped_sanctuary_desc: "Специальный резерват для гигантских ластоногих, пойманных в океанах жидкого азота на [event_target:pinnipeds_home_planet.GetPlanetMoon]е [event_target:pinnipeds_home_planet.GetName]."
 # ELECTRIC WATERS
 ELECTRIC_WATERS_CAT: "Электрические воды"
 electric_waters_desc: "Орбитальное сканирование [from.GetPlanetMoon]ы §Y[from.GetName]§! обнаружило хаотичные электрические сигналы в глубинах ледяных океанов.\n\nДальнейшее изучение этого водного феномена позволит раскрыть его природу."
 extreme_frontiers.200.title: "Высоковольтные кораллы"
 extreme_frontiers.200.desc: "§Y[Leader.GetName]§! [Leader.GetAXX::установил|||fem:установила] источник подводных электрических токов на [from.GetPlanetMoon]е §Y[from.GetName]§!.\n\nНа дне океана обитает сложный вид холодноводных кораллов, обладающих электрогенными способностями. Эти организмы используют специализированные органеллы для генерации тока, приманивая микроорганизмы для питания и общения.\n\nНаши исследовательские зонды действуют как стимулятор: кораллы реагируют на смену частот передачи, увеличивая электрическую активность.\n\nПутём точной модуляции взаимодействия с этим глубоководным видом мы можем увеличить энергетическую отдачу планеты, не нарушая хрупкую экосистему."
 # OBSIDIAN PLANET
 OBSIDIAN_PLANET_CAT: "Сияющий ландшафт"
 obsidian_planet_desc: "Сканирование [from.GetPlanetMoon]ы §Y[from.GetName]§! выявило целые континенты, покрытые слоями обсидиана, а также высокое содержание серы в верхних слоях атмосферы.\n\nПодробное геологическое исследование позволит нам узнать больше."
 extreme_frontiers.210.title: "Обсидиановая пустошь"
 extreme_frontiers.210.desc: "Анализ осадочных пород [from.GetPlanetMoon]ы §Y[from.GetName]§! показал, что этот вулканический мир пережил внезапное мгновенное замерзание, превратившее поверхностную лаву в сплошной слой вулканического стекла.\n\nМногочисленные ударные кратеры на поверхности [from.GetPlanetMoon]ы свидетельствуют о том, что она, возможно, подверглась воздействию метеоритного дождя. В обсидиановом слое сохранились крупные пузыри сернистых газов, некогда вырывавшихся из вулканических жерл и мгновенно оказавшихся внутри замерзшей лавы.\n\nЕсли аккуратно организовать процесс, мы сможем извлечь эти ресурсы для собственных нужд."
 # SHEARING FORCE
 SHEARING_FORCE_CAT: "Потеря связи"
 shearing_force_desc: "Наблюдательные зонды, отправленные в атмосферу [from.GetPlanetMoon]ы §Y[from.GetName]§!, полностью прекратили передачу данных. Текущее местоположение оборудования неизвестно.\n\nДля восстановления данных требуется более детальное исследование [from.GetPlanetMoon]ы."
 extreme_frontiers.220.title: "Разрывающие силы"
 extreme_frontiers.220.desc: "Мы установили причину исчезновения зондов на [from.GetPlanetMoon]е §Y[from.GetName]§!.\n\n В атмосфере [from.GetPlanetMoon]ы обнаружены резкие перепады температур между разными слоями газов. Эти экстремальные скачки температуры создают мощные встречные потоки, где слои газа движутся в противоположных направлениях.\n\nПлотность газов в этих слоях тоже очень сильно различается, и это порождает катастрофические разрывающие силы, уничтожающие любые объекты, оказавшиеся на границе атмосферных слоёв.\n\nТеперь, зная природу этого явления, мы можем модифицировать оборудование для работы в таких условиях и использовать кинетическую энергию данного природного феномена."
 # MISSING MASS
 MISSING_MASS_CAT: "Недостающая масса"
 missing_mass_desc: "Показатели массы [from.GetPlanetMoon]ы §Y[from.GetName]§! значительно ниже ожидаемых для каменистой планеты такого размера. Рекомендуется дальнейшее исследование."
 extreme_frontiers.230.title: "Глубинные мантийные аннелиды"
 extreme_frontiers.230.desc: "Детальное изучение геологии [from.GetPlanetMoon]ы §Y[from.GetName]§! выявило разветвлённую сеть крупных подземных туннелей в силикатной мантии [from.GetPlanetMoon]ы.\n\nИсследовательские зонды обнаружили, что эти полости населены процветающим видом глубинных аннелид, питающихся силикатными породами. Огромные колонии этих существ буквально пожирают планету изнутри, выбрасывая переработанные отходы на орбиту, где они рассеиваются под действием космического ветра.\n\nЕсли уничтожить аннелид, наши [controller.GetMinerPlural_lower] получат доступ к огромным запасам легкодоступной силикатной руды."
 extreme_frontiers.230.desc.terravore: "$extreme_frontiers.230.desc$ Их аппетиты впечатляют — и не так уж отличаются от наших."
 extreme_frontiers.230.a: "Запустить буровые установки."
 extreme_frontiers.230.b: "Изучить этих удивительных существ."
 # LIFE IN DARKNESS
 LIFE_IN_DARKNESS_CAT: "Жизнь во тьме"
 life_in_darkness_desc: "§Y[from.GetName]§! находится в приливном захвате, и одна из сторон [from.GetPlanetMoon]ы постоянно погружена во тьму. Инфракрасное сканирование выявило активную органическую экосистему в этой лишённой света и бедной питательными веществами области."
 extreme_frontiers.240.title: "Прозрачная эволюция"
 extreme_frontiers.240.desc: "Вечная тьма на одной из сторон [from.GetPlanetMoon]ы §Y[from.GetName]§! создала уникальные условия для эволюции немногих организмов, способных выжить в этом суровом мире.\n\nБлагодаря особой хромосомной мутации местная фауна полностью прозрачна, лишена зрения и использует сложные формы эхолокации."
 extreme_frontiers.240.desc.non_homicidal: "$extreme_frontiers.240.desc$ Наши [controller.GetResearcherPlural_lower] очень заинтересованы такими удивительными адаптациями."
 extreme_frontiers.240.a: "Яркое открытие."
 extreme_frontiers.240.b: "Мы поглотим их всех."
 extreme_frontiers.240.c: "Уничтожить."
 # RAINBOW RIVERS
 RAINBOW_RIVERS_CAT: "Флуоресцентные реки"
 rainbow_rivers_desc: "Первичное сканирование [from.GetPlanetMoon]ы §Y[from.GetName]§! выявило текущие по поверхности планеты светящиеся реки, которые всё время меняют цвет по всему спектру.\n\nДальнейшее изучение планеты позволит больше узнать об этом необычном явлении."
 extreme_frontiers.250.title: "Цветовой хемосинтез"
 extreme_frontiers.250.desc: "Анализ флуоресцентных рек [from.GetPlanetMoon]ы §Y[from.GetName]§! показал, что в них обитает уникальный вид микроорганизмов.\n\nИспользуя хемосинтез для переработки вредных соединений, эти существа производят высокореактивные побочные продукты, которые меняют химический состав рек, вызывая резкую смену цвета.\n\nЯркие неоновые оттенки также служат средством коммуникации, сигнализируя о репродуктивном статусе и привлекая партнёров в токсичных потоках [from.GetPlanetMoon]ы.\n\nВ случае дальнейшего изучения этих существ и их жизненного цикла наши [controller.GetResearcherPlural_lower] получат уникальные возможности для научной работы."
 # GASEOUS METALS
 GASEOUS_METALS_CAT: "Газообразные металлы"
 gaseous_metals_desc: "Атмосфера [from.GetPlanetMoon]ы §Y[from.GetName]§! состоит преимущественно из разных металлов, находящихся в газообразном состоянии. Изучение суровых условий этой [from.GetPlanetMoon]ы может позволить нам добывать эти ценные ресурсы."
 extreme_frontiers.260.title: "Гальванизирующие облака"
 extreme_frontiers.260.desc: "Необычная атмосфера [from.GetPlanetMoon]ы §Y[from.GetName]§! удерживает огромное количество солнечной радиации, что привело к катастрофическому разогреву [from.GetPlanetMoon]ы и переходу металлов в крайне нестабильное газообразное состояние.\n\nЭти соединения мгновенно вступают в реакцию с любым исследовательским оборудованием, покрывая его тонким, но чрезвычайно прочным слоем металлического сплава. Удивительно, но этот процесс не повреждает оборудование.\n\n§Y[leader.GetName]§! полагает, что эту природную гальванизацию можно использовать для повышения прочности корпусов кораблей по [controller.GetName::всему|||fem:всей|||pl:всем] §Y[controller.GetName&dat]§!."
 ATMOSPHERIC_ELECTROPLATING: "Атмосферная гальванизация"
 ATMOSPHERIC_ELECTROPLATING_DESC: "Размещение объектов в насыщенной ионами металлов атмосфере [from.GetPlanetMoon]ы §Y[from.GetName]§! приводит к уникальной естественной гальванизации.\n\nЭтот исключительно эффективный природный процесс после дополнительного изучения можно воспроизводить для повышения прочности корпусов кораблей [Root.Owner.GetName&gen]."
 extreme_frontiers.265.title: "Высокопрочный металл"
 extreme_frontiers.265.desc: "Нам удалось воспроизвести уникальный процесс гальванизации, наблюдаемый в атмосфере [from.From.GetPlanetMoon]ы §Y[from.From.GetName]§!, в промышленных масштабах.\n\nИспользуя полученные знания, наши [Root.Owner.GetEngineerPlural] теперь могут значительно увеличить прочность определённых металлов без потери гибкости или увеличения массы.\n\nЭти передовые методы можно применить в строительстве наших кораблей."
 # CARBON ALLOTROPES
 CARBON_ALLOTROPES_CAT: "Углеродные аллотропы"
 carbon_allotropes_desc: "Спектроскопические данные с [from.GetPlanetMoon]ы §Y[from.GetName]§! указывают на необычно высокую концентрацию редких и сложных форм углерода. Для точной классификации требуется детальное исследование."
 extreme_frontiers.270.title: "Графеновые образования"
 extreme_frontiers.270.desc: "На [from.GetPlanetMoon]е §Y[from.GetName]§! обнаружены обширные залежи графена. Этот редкий аллотроп углерода толщиной всего в одну молекулу обладает беспрецедентной прочностью и проводимостью.\n\nЦенный наноматериал формируется естественным образом на поверхности [from.GetPlanetMoon]ы благодаря химическому осаждению вещества из газообразного состояния, которое характерно для уникальной атмосферы этого §Yуглеродного мира§!."
 extreme_frontiers.270.a: "Начать добычу."
 # DIAMOND DUST
 DIAMOND_DUST_CAT: "Высокоскоростные массы"
 diamond_dust_desc: "Сканирование [from.GetPlanetMoon]ы §Y[from.GetName]§! выявило аномально высокую концентрацию быстро движущейся материи в нижних слоях тропосферы.\n\nБез детального исследования невозможно установить источник этих необычных данных."
 extreme_frontiers.280.title: "Алмазные бури"
 extreme_frontiers.280.desc: "Мы определили природу аномальных масс на [from.GetPlanetMoon]е §Y[from.GetName]§!.\n\nАтмосфера [from.GetPlanetMoon]ы состоит преимущественно из богатого углеродом метана, который под действием гравитационного давления кристаллизуется в сверхплотные алмазные структуры. Из-за мощных штормовых циклов [from.GetPlanetMoon]ы происходит формирование стремительных алмазных бурь.\n\nМы легко можем начать добывать эти алмазы, а кроме того, §Y[leader.GetName]§! [leader.GetAXX::уверен|||fem:уверена], что изучение алмазов принесёт дополнительные ценные результаты."
 ATMOSPHERIC_DIAMONDS_PROJECT: "Атмосферные алмазы"
 ATMOSPHERIC_DIAMONDS_PROJECT_DESC: "Изучив сверхплотные алмазные бури на [from.GetPlanetMoon]е §Y[from.GetName]§!, мы сможем использовать их уникальные свойства, чтобы значительно улучшить наши лазерные технологии."
 extreme_frontiers.285.title: "Алмазная точность"
 extreme_frontiers.285.desc: "§Y[leader.GetName]§! [leader.GetAXX::завершил|||fem:завершила] изучение сверхплотных алмазов на [from.From.GetPlanetMoon]е §Y[from.From.GetName]§!.\n\nПроцесс сжатия, благодаря которому образуются эти алмазы, создаёт уникальную кристаллическую решётку, которая невероятно эффективно удерживает и усиливает высокочастотные световые колебания.\n\nЭто открытие принесёт огромную пользу нашему государству."
 # ETREME GEOLOGICAL TENSION
 GEOLOGICAL_TENSION_CAT: "Экстремальное геологическое напряжение"
 geological_tension_desc: "Геологическое сканирование [from.GetPlanetMoon]ы §Y[from.GetName]§! указывает, что её раскалённая кора испытывает колоссальное давление из-за скрытых в глубине тектонических сил. Вероятно, в скором времени произойдёт масштабное геологическое событие."
 extreme_frontiers.290.title: "Заблокированный супервулкан"
 extreme_frontiers.290.desc: "Дальнейшее изучение сейсмической активности на [from.GetPlanetMoon]е §Y[from.GetName]§! показало, что гигантский супервулкан был заблокирован из-за частичного обрушения верхнего конуса.\n\nОгромные запасы магмы заполнили все подземные резервуары и оказывают колоссальное давление на пробку в главном жерле. Обрушившаяся порода пока сдерживает магму, но невозможно предсказать, сколько продержится это хрупкое равновесие.\n\nЗаключённая в ловушке расплавленная порода необычайно богата редкими металлами и сложными минеральными соединениями. §Y[leader.GetName]§! полагает, что мы можем безопасно добыть эти ресурсы, спровоцировав контролируемое извержение."
 extreme_frontiers.290.a: "Пробить жерло."
 extreme_frontiers.290.b: "Использовать геотермальную активность."
 CONTROLLED_ERUPTION_PROJECT: "Контролируемое извержение"
 CONTROLLED_ERUPTION_PROJECT_DESC: "Заблокированный супервулкан на [from.GetPlanetMoon]е §Y[from.GetName]§! удерживает под поверхностью огромные запасы богатой минералами магмы. Устроив контролируемое извержение, мы сможем добыть эти ресурсы."
 extreme_frontiers.295.title: "Мегаизвержение"
 extreme_frontiers.295.desc: "Пробурив несколько скважин в разных точках внешнего конуса супервулкана на [from.From.GetPlanetMoon]е §Y[from.From.GetName]§!, мы ослабили его структуру до критического состояния.\n\nКогда точка невозврата была преодолена, мы стали свидетелями впечатляющего зрелища. Мощный выброс магмы под колоссальным давлением полностью уничтожил верхнюю часть вулкана.\n\nМы направили потоки лавы по специально подготовленным каналам, где её будет обрабатывать специализированное оборудование."
 extreme_frontiers.295.a.default: "Впечатляюще."
 extreme_frontiers.295.a.machine: "Операция проведена успешно."
 # LAYERED ATMOSPHERE
 LAYERED_ATMOSPHERE_CAT: "Извергающийся гигант"
 layered_atmosphere_desc: "Сканирование мира §Y[from.GetName]§! выявило нерегулярные выбросы горючих газов по всей планете, что затрудняет дистанционные исследования.\n\nТребуется более детальное изучение."
 extreme_frontiers.300.title: "Слоистая атмосфера"
 extreme_frontiers.300.desc: "§Y[leader.GetName]§! [leader.GetAXX::установил|||fem:установила] причину нестабильных выбросов на планете §Y[from.GetName]§!.\n\nАтмосфера этого газового гиганта сформировалась таким образом, что слой жидкого металлического водорода оказался зажат между газообразными стратосферой и мезосферой. Более плотный слой метана в нижних слоях атмосферы удерживает эту жидкость в подвешенном состоянии.\n\nСо временем в слое металлического водорода накапливаются электрические разряды, порождая возмущение в слое, расположенном ниже. При достижении критического давления происходят выбросы высокопроводящей жидкости в верхние слои атмосферы, где она рассеивается, а затем снова оседает.\n\nНаши системы мониторинга могут легко отслеживать эти колебания давления, что позволит добывать ценные ресурсы."
 # SOLIDIFIED PLASMA TRAILS
 PLASMA_TRAILS_CAT: "Нестабильные всплески энергии"
 plasma_trails_desc: "Вдоль тектонических разломов [from.GetPlanetMoon]ы §Y[from.GetName]§! фиксируются хаотичные энергетические всплески.\n\nПрироду этих скачков невозможно определить с орбиты. Чтобы выявить источник феномена, потребуется наземное исследование."
 extreme_frontiers.310.title: "Окаменевшие плазменные следы"
 extreme_frontiers.310.desc: "Геологический анализ [from.GetPlanetMoon]ы §Y[from.GetName]§! позволил идентифицировать источник аномальных энергетических всплесков.\n\nВулканическая активность [from.GetPlanetMoon]ы генерирует мощные электростатические разряды в регионах с нестабильной вечной мерзлотой.\n\nЭти «вулканические молнии» устремляются вверх, превращая окружающий воздух в плазму. Высвобождаемый тепловой удар приводит к моментальному отвердеванию плазменных структур, формируя «окаменевшие молнии».\n\nПолученные данные позволяют прогнозировать вспышки сейсмической активности и использовать этот феномен в практических целях."
 # CRYSTALLINE PLAINS
 CRYSTALLINE_PLAINS_CAT: "Криовулканическая активность"
 crystalline_plains_desc: "Тектонический анализ мира §Y[from.GetName]§! выявил аномально высокую криовулканическую активность по всей [from.GetPlanetMoon]е."
 extreme_frontiers.320.title: "Кристаллические равнины"
 extreme_frontiers.320.desc: "Детальные геологические исследования [from.GetPlanetMoon]ы §Y[from.GetName]§! обнаружили реки полузамёрзшего аммиака, текущие под ледяной корой [from.GetPlanetMoon]ы.\n\nГеотермальное давление выталкивает эту субстанцию через трещины в хрупкой поверхности. Такие извержения выбрасывают в атмосферу опасные испарения и аммиачную жижу, которая моментально застывает под действием экстремально низких температур поверхности [from.GetPlanetMoon]ы, формируя обширные равнины, покрытые ценными кристаллами, пригодными для добычи."
 # SUPERMASSIVE GIANT
 SUPERMASSIVE_GIANT_CAT: "Сверхмассивный гигант"
 supermassive_giant_desc: "§Y[from.GetName]§! представляет собой сверхмассивный газовый гигант, чья мощная гравитация захватила на свою орбиту тысячи объектов. Их каталогизация может оказаться полезной."
 extreme_frontiers.330.title: "Космический мусор"
 extreme_frontiers.330.desc: "§Y[from.GetName]§! удерживает на своей орбите множество небольших лун, астероидов и обломков небесных тел. Радиоизотопный анализ показывает, что все они были захвачены гравитацией планеты тысячи лет назад, когда пролетали через эту систему.\n\nВ процессе каталогизации мы обнаружили несколько древних примитивных зондов, свидетельствующих о первых шагах некой цивилизации в освоении космоса.\n\nБольшинство их банков данных повреждено либо коррозией, либо столкновениями с другими объектами. Однако в одном зонде сохранилась серия изображений поверхности планеты [from.GetName], сделанных на протяжении сотен лет."
 extreme_frontiers.330.a: "Удивительная находка."
 extreme_frontiers.330.b: "Отправить на переработку."
 # INVISIBLE PLANET
 INVISIBLE_PLANET_CAT: "Орбитальная аномалия"
 invisible_planet_desc: "На орбите [from.GetPlanetMoon]ы §Y[from.GetName]§! обнаружены небольшие, но регулярные колебания, указывающие на периодическое воздействие неизвестной, но значительной гравитационной силы.\n\nРекомендуется дополнительное изучение окружающего пространства."
 extreme_frontiers.340.title: "Невидимая планета"
 extreme_frontiers.340.desc: "Дальнейший анализ системы §Y[from.solar_system.GetName]§! показал, что все планетарные орбиты демонстрируют схожие аномалии.\n\nМетодом триангуляции гравитационных возмущений мы установили источник этих отклонений — ранее неизвестную планету, получившую название §Y[invisible_planet.GetName]§!.\n\nЭтот мир обладает уникальной поверхностью из чёрных углеродных частиц, не отражающих свет и радиоволны, что делает его практически невидимым для дальнего сканирования.\n\nДанные природные полимеры обладают исключительными поглощающими свойствами."
 extreme_frontiers.340.desc.default: "$extreme_frontiers.340.desc$ У нас появилась уникальная возможность изучить эти материалы."
 extreme_frontiers.340.desc.first_contact: "$extreme_frontiers.340.desc$ Мы соберём образцы и изучим их для потенциального применения в качестве маскировочного материала."
 # SURVIVAL POD
 SURVIVAL_POD_WARM_CAT: "Перепрофилированная полевая станция"
 SURVIVAL_POD_COLD_CAT: "Перепрофилированная полевая станция"
 survival_pod_desc: "Сканирование безжизненной поверхности мира §Y[from.GetName]§! выявило перепрофилированную полевую станцию, изначально представлявшую собой временную исследовательскую лабораторию, давно отработавшую свой срок. Слабые тепловые сигнатуры указывают, что часть объектов станции все еще активна."
 extreme_frontiers.350.title: "Единственный выживший"
 extreme_frontiers.350.desc: "Экспедиция на поверхность мира §Y[from.GetName]§! обнаружила перепрофилированную полевую станцию и ее единственную обитательницу.\n\nПредставившись ученой, брошенной на этой суровой [from.GetPlanetMoon]е годы назад, она предлагает [root.Owner.GetName&dat] свои знания в обмен на спасение."
 extreme_frontiers.350.a: "Ее опыт нам пригодится."
 extreme_frontiers.350.b: "Выдать ей челнок и припасы."
 extreme_frontiers.350.c: "Оставить ее под наблюдением."
 extreme_frontiers.350.d: "Какая прелесть. Взорвать ее убежище."
 extreme_frontiers.352.title: "$NAME_survivalist_scru$"
 extreme_frontiers.352.desc: "Из жилого модуля, в который переоборудована станция, выходит истощенная [scru_species.GetClass]. Когда она начинает рассказывать о своих злоключениях на [from.From.GetPlanetMoon]е §Y[from.From.GetName]§!, ее голос скрипит, слова даются с трудом, обрывочно.\n\n«Прошу прощения. Я не… говорила ни с кем уже много лет…»"
 extreme_frontiers.352.a: "Что привело тебя сюда?"
 extreme_frontiers.352.a.response: "Я проводила здесь исследования, описывая уникальный коренной пласт. Моя команда сказала, что проведет быструю разведку на нашем исследовательском судне. Я поверила им. Лишь спустя несколько тревожных дней я осознала, что произошло. Они взлетели и отправились домой."
 extreme_frontiers.352.b: "Как ты выжила, застряв здесь так надолго?"
 extreme_frontiers.352.b.response: "Удивительно, чего можно добиться, изменяя проницаемость клеток и усиливая экспрессию белков теплового шока… После этого оставалось лишь индуцировать макроаутофагию на моих модифицированных клетках, а благодаря содержанию натрия в этом мире я могла создавать множество пикантных блюд."
 extreme_frontiers.352.c: "Разве ты не хочешь вернуться к своим?"
 extreme_frontiers.352.c.response: "Они не заслужили тех открытий, что я совершила на этом камне. Меня не интересует, какие лживые причины заставили их бросить меня."
 extreme_frontiers.352.d: "Что ты можешь нам предложить?"
 extreme_frontiers.352.d.response: "Я устала работать в импровизированной лаборатории. Я хочу увидеть новые миры… Из космоса."
 extreme_frontiers.352.e: "Нанять $NAME_survivalist_scru$"
 extreme_frontiers.352.e.custom_tooltip: "§Y$NAME_survivalist_scru$§! присоединяется к нашему государству в качестве §Hлидера§!."
 NAME_survivalist_scru: "Скру"
 survivalist_scru_desc: "Талантливая ученая, отточившая навыки выживания в экстремальных условиях."
 leader_trait_hardened_survivalist: "Закалённый выживальщик"
 leader_trait_hardened_survivalist_desc: "Этот лидер обладает уникальными знаниями о враждебных средах."
 # Infernal Tornadoes
 INFERNAL_TORNADOES_CAT: "Экстремальные температуры"
 infernal_tornadoes_desc: "Сканирование [from.GetPlanetMoon]ы §H[from.GetName]§! выявило обширные зоны быстро перемещающихся высокотемпературных штормов.\n\nЭти бури излучают крайне нестабильные тепловые сигнатуры. Чтобы выяснить, имеют ли они природное происхождение или являются неизвестной формой жизни, потребуются целенаправленные исследования."
 extreme_frontiers.360.title: "Огненные смерчи"
 extreme_frontiers.360.desc: "Источник аномальных тепловых сигнатур на [from.GetPlanetMoon]е §H[from.GetName]§! наконец обнаружен.\n\nПо всей [from.GetPlanetMoon]е из недр бьют гейзеры, выбрасывающие легковоспламеняющийся водород. Под воздействием высокой температуры газ мгновенно загорается, создавая гигантские столбы пламени, бьющие в небо.\n\nИз-за особенностей атмосферного давления возникают турбулентные потоки, которые закручивают огонь в чудовищные огненные смерчи, проносящиеся по поверхности.\n\nНесмотря на разрушительность этого природного явления, наши [Root.Owner.GetResearcherPlural_lower] уверены, что его можно воссоздать искусственно и использовать колоссальную кинетическую энергию в практических целях."
 INFERNAL_CATALYSTS_PROJECT: "Инфернальные катализаторы"
 INFERNAL_CATALYSTS_PROJECT_DESC: "Тщательное изучение условий, порождающих огненные смерчи на [from.GetPlanetMoon]е §H[from.GetName]§!, позволит воспроизвести этот феномен в контролируемой среде."
 extreme_frontiers.365.title: "Пирокластические резонаторы"
 extreme_frontiers.365.desc: "§Y[from.Leader.GetName]§! успешно [from.Leader.GetAXX::разработал|||fem:разработала] технологию управления огненными смерчами [from.From.GetPlanetMoon]ы §Y[from.From.GetName]§! в контролируемых условиях.\n\nБлагодаря этому открытию наши космические базы смогут повышать выработку энергии расплавленными мирами в той же системе."
 extreme_frontiers.365.desc.has_furnace: "Теория имеет множество параллелей с нашими знаниями о §Hдуговых печах§!, открывая новые возможности для строительства на других планетах."
 extreme_frontiers.365.desc.default: "Теория в основе этого открытия подтолкнула нас к идее строительства §Hдуговых печей§!, и наши [Root.Owner.GetEngineerPlural] готовы приступить к её практическому внедрению."
 tech_pyroclastic_resonation: "Пирокластический резонанс"
 tech_pyroclastic_resonation_desc: "Используя экстремальную тепловую энергию расплавленных миров, наши космические базы смогут значительно повысить эффективность выработки энергии."
 sm_pyroclastic_resonator: "Пирокластический резонатор"
 sm_pyroclastic_resonator_desc: "Термальные резонаторы, увеличивающие выработку энергии всеми расплавленными мирами в системе.\nПроизводство £energy£ §Iэнергокредитов§! растёт пропорционально количеству ['concept_pc_molten', расплавленных миров]."
 # MAGMA MEGAFAUNA
 MAGMA_MEGAFAUNA_CAT: "Нестабильная поверхность"
 magma_megafauna_desc: "Сканирование [from.GetPlanetMoon]ы §Y[from.GetName]§! показало, что участки её расплавленной поверхности непрерывно смещаются на большие расстояния.\n\nДля понимания этого необычного геологического феномена требуются дополнительные исследования."
 extreme_frontiers.370.title: "Расплавленная мегафауна"
 extreme_frontiers.370.desc: "Аномальные тектонические колебания на [from.GetPlanetMoon]е §Y[from.GetName]§! оказались следствием деятельности огромных стад кремнийорганической мегафауны.\n\nЭти исполинские существа мигрируют на колоссальные расстояния, периодически погружаясь в лавовые озёра [from.GetPlanetMoon]ы в поисках пищи — осадочных пород, богатых §Hлетучей пылью§!. Изучив их маршруты, мы сможем добывать эти отложения, минимально вмешиваясь в экосистему.\n\nИх толстые панцири выдерживают экстремальные температуры, и детальное исследование жизненного цикла этих созданий может привести к поразительным открытиям."
 LAVA_DIVERS_PROJECT: "Лавовые ныряльщики"
 LAVA_DIVERS_PROJECT_DESC: "Мегафауна на [from.GetPlanetMoon]е §Y[from.GetName]§! способна выживать в экстремальных условиях расплавленного мира и погружаться вглубь магматических озёр.\n\nИзучение их панцирей может открыть для нас новые технологии защиты от сверхвысоких температур."
 extreme_frontiers.375.title: "Закалённая в магме броня"
 extreme_frontiers.375.desc: "Детальное исследование уникальной мегафауны на [from.From.GetPlanetMoon]е §Y[from.From.GetName]§! позволило применить её термодинамические особенности на наших верфях.\n\nПитаясь породами, насыщенными летучей пылью, эти существа формируют в своих панцирях сверхпрочные силикатные структуры, усиленные естественными огнеупорными материалами.\n\nПолучив множество образцов сброшенных покровов, наши [Root.Owner.GetEngineerPlural] теперь могут воспроизвести их биомеханические принципы при создании новой обшивки для кораблей."
 # PLANET THRUSTERS
 PLANET_THRUSTERS_CAT: "Парящее оборудование"
 planet_thrusters_desc: "В верхних слоях атмосферы [from.GetPlanetMoon]ы §Y[from.GetName]§! обнаружен ряд крупных цилиндрических механизмов. Они неактивны и полностью лишены экипажа."
 extreme_frontiers.380.title: "Планетарные двигатели"
 extreme_frontiers.380.desc: "Заброшенные механизмы на планете §Y[from.GetName]§! представляют собой автономные двигательные модули. Всего в верхних слоях атмосферы их насчитывается больше тысячи.\n\nСозданные из особых материалов, эти сложные термоядерные устройства предназначены для забора газообразного водорода с поверхности планеты для генерации мощной тяги. Большинство из них носят следы перегрузок.\n\nАнализ показывает, что двигатели расположены таким образом, чтобы их тяга воздействовала непосредственно на планету. Похоже, это древнее оборудование использовали, пытаясь изменить её орбиту.\n\nХотя для столь грандиозной задачи они уже непригодны, наименее повреждённые экземпляры можно перепрофилировать — чтобы выжечь газовые слои и обнажить богатое полезными минералами ядро."
 extreme_frontiers.380.a: "Отправить их на переработку."
 extreme_frontiers.380.b: "Перепрофилировать эти устройства."
 REPURPOSE_THRUSTERS_PROJECT: "Перепрофилирование планетарных двигателей"
 REPURPOSE_THRUSTERS_PROJECT_DESC: "Адаптация повреждённых двигателей на планете §Y[from.GetName]§! позволит выжечь водородную атмосферу газового гиганта, обнажив твёрдое и пригодное для добычи ядро."
 extreme_frontiers.385.title: "Обнажённые недра"
 extreme_frontiers.385.desc: "Нам удалось восстановить часть повреждённых двигателей на планете §Y[from.From.GetName]§! и настроить их на взаимно противоположные векторы тяги.\n\nПосле активации эти мощные термоядерные устройства начали втягивать водород с экспоненциальной скоростью, выжигая атмосферу планеты. В результате обнажилось богатое минералами ядро — правда, разогретое до экстремальных температур."
 extreme_frontiers.385.tt: "Добавлен модификатор §Y«$chthonian_planet$»§!"
 extreme_frontiers.385.a: "Впечатляет."
 # BACKWARDS ORBIT
 BACKWARDS_ORBIT_CAT: "Обратная орбита"
 backwards_orbit_desc: "§Y[from.GetName]§! вращается вокруг своей звезды в направлении, противоположном другим планетам системы. Это указывает на то, что планета сформировалась не в этой системе и не одновременно с её остальными небесными телами.\n\nДля понимания происхождения планеты требуются дополнительные исследования."
 extreme_frontiers.390.title: "Планета-странник"
 extreme_frontiers.390.desc: "Состав планеты §Y[from.GetName]§! не соответствует составу других планет той же системы. Зато он идеально совпадает с составом небесных тел соседней системы §Y[event_target:wandering_planet_origin.GetName]§!, что раскрывает его истинное происхождение.\n\nНа поверхности выделяется гигантский ударный кратер. Похоже, мощное столкновение с астероидом выбросило её с изначальной орбиты. Долгое время этот свободно дрейфующий объект странствовал в космосе, пока гравитация системы [from.System.Star.GetName] не захватила его, поместив на необычную обратную орбиту.\n\nЭта удивительная планета успела побывать частью двух разных звёздных систем, что открывает уникальные возможности для исследований."
 # VAPOR PLUMES
 VAPOR_PLUMES_CAT: "Паровые столбы"
 vapor_plumes_desc: "На поверхности [from.GetPlanetMoon]ы §Y[from.GetName]§! обнаружены тысячи аномальных паровых шлейфов, достигающих верхних слоёв её разреженной атмосферы.\n\nРекомендуется дальнейшее изучение этого феномена."
 extreme_frontiers.400.title: "Криовулканические гейзеры"
 extreme_frontiers.400.desc: "Паровые столбы на [from.GetPlanetMoon]е §Y[from.GetName]§! образуются благодаря интенсивной криовулканической активности в глубинах нижней мантии, которая выбрасывает огромные колонны азота и аммиака.\n\nШлейфы газа поднимаются вертикально, пока не достигнут верхней границы атмосферы, где на столбы пара активно воздействует солнечный ветер, заставляя молекулы газов рассеиваться в пространстве.\n\nИзучение незначительных вариаций химического состава этих уникальных газовых потоков позволит лучше понять сложные геологические процессы в ядре [from.GetPlanetMoon]ы."
 # FIBROUS ATMOSPHERE
 FIBROUS_ATMOSPHERE_CAT: "Искажённые данные"
 fibrous_atmosphere_desc: "Данные первичного сканирования планеты §Y[from.GetName]§! поступают к нам в искаженном виде, и наши сенсоры не могут их корректно интерпретировать. Источник помех остаётся неясным — требуется дополнительное исследование."
 extreme_frontiers.410.title: "Волокнистая атмосфера"
 extreme_frontiers.410.desc: "Детальное изучение планеты §Y[from.GetName]§! выявило причину искажения данных при сканировании.\n\nВерхние слои атмосферы планеты состоят из плотных скоплений волокнистых минералов. Эти извилистые нити формируются в нижних слоях газового гиганта, где высокое давление растягивает их, образуя облака с большой электропроводностью.\n\nДвижение волокон в атмосфере сопровождается периодическими электрическими разрядами из-за аккумуляции статического электричества. Эта планета может стать источником ценных ресурсов."
 # EXPLODING SKIES
 EXPLODING_SKIES_CAT: "Термические всплески"
 exploding_skies_desc: "Сканирование [from.GetPlanetMoon]ы §Y[from.GetName]§! зафиксировало экстремальные метеорологические явления — случайные интенсивные всплески температуры по всей поверхности.\n\nТребуется дополнительное исследование."
 extreme_frontiers.420.title: "Огненный горизонт"
 extreme_frontiers.420.desc: "Детальные наблюдения раскрыли причину температурных аномалий на [from.GetPlanetMoon]е §Y[from.GetName]§!.\n\nГеотермальные разломы и гейзеры по всей поверхности выбрасывают легковоспламеняющиеся газы, которые скапливаются в атмосфере. Электростатические разряды выступают в роли катализатора, вызывая взрывные погодные фронты, опустошающие небеса этой [from.GetPlanetMoon]ы.\n\nИзучив эти реакции, наши [Root.Owner.GetEngineerPlural] сделали новые открытия в термодинамике горения, которые можно применить в двигательных системах нашего флота."
 extreme_frontiers.420.desc.traumatized: "К сожалению, из-за опасных условий исследований [leader.GetName] [leader.GetAXX::получил|||fem:получила] тяжёлую психологическую травму."
 extreme_frontiers.420.desc.maimed: "К сожалению, из-за опасных условий исследований [leader.GetName] [leader.GetAXX::получил|||fem:получила] тяжёлые ранения."
 # CHTHONIAN PRESERVATION
 CHTHONIAN_PRESERVATION_CAT: "Хтоническая биомасса"
 chthonian_preservation_desc: "Исследования мира §Y[from.GetName]§! показали, что это хтоническая планета — бывший газовый гигант, лишившийся атмосферы под воздействием интенсивного излучения, которое испускает §Y[from.System.Star.GetName]§!.\n\nНесмотря на это, на поверхности обнаружены крайне слабые следы биомассы, что требует дальнейшего изучения."
 extreme_frontiers.430.title: "Хтоническая консервация"
 extreme_frontiers.430.desc: "Обнаруженная биомасса на планете §Y[from.GetName]§! оказалась окаменевшими останками стаи тиянки.\n\nСкорее всего, эти существа находились в атмосфере газового гиганта в момент её рассеяния. Их тела были погребены в расплавленном металле, который со временем затвердел.\n\nХотя внутри металла сохранилось небольшое количество органики, длительное воздействие радиации превратило большую часть их тел в уникальный биометаллический сплав.\n\n§Y[leader.GetName]§! полагает, что детальное изучение этих редких окаменелостей позволит разработать новые методы производства сплавов из биологического материала."
 CHTHONIAN_PETRIFICATION_PROJECT: "Хтоническая окаменелость"
 CHTHONIAN_PETRIFICATION_PROJECT_DESC: "Исследуя окаменевшие останки тиянки на планете §Y[from.GetName]§!, наши [Root.Owner.GetScientistPlural] пытаются понять, как экстремальная радиация действует на органику. Это может привести к созданию новых технологий производства сплавов."
 extreme_frontiers.435.title: "Биогенный сплав"
 extreme_frontiers.435.desc: "После тщательного анализа окаменелостей тиянки с планеты §Y[from.From.GetName]§! мы разработали новый метод производства сплавов, воссоздав эффект длительного радиационного воздействия.\n\nЭтот прорыв позволяет использовать в качестве сырья биоматериал, а производимые по такому методу сплавы не уступают традиционным материалам."
 tech_alloy_fossilization: "Биогенное окаменение"
 tech_alloy_fossilization_desc: "Воздействуя на органику искусственной хтонической радиацией, мы сможем преобразовывать клеточные структуры в металлические сплавы."
 tech_alloy_fossilization_tt: "§HОткрывает сооружение§!: ['building:building_bio_furnace']"
 building_bio_furnace: "Биоплавильня"
 building_bio_furnace_desc: "Это сооружение использует мощное излучение, подобное космической радиации, для преобразования биоматериала в сплавы."
 # ORBITAL RESONANCE
 ORBITAL_RESONANCE_CAT: "Идеальная пропорция"
 orbital_resonance_desc: "Периоды обращения планет в системе §Y[from.System.GetName]§! демонстрируют удивительную закономерность. По мере удаления от звезды каждая следующая планета совершает оборот вокруг звезды ровно за вдвое большее время, чем предыдущая, с точностью до тысячной доли секунды.\n\nЭта аномально точная пропорция требует изучения."
 extreme_frontiers.440.title: "Орбитальный резонанс"
 extreme_frontiers.440.desc: "§Y[from.System.GetName]§! представляет собой уникальный и абсолютно совершенный пример орбитального резонанса.\n\nКогда планеты сближаются, они оказывают периодическое гравитационное воздействие друг на друга, создавая эффект катапульты и взаимозависимый импульс. Необычная стабильность этих взаимодействий привело к появлению идеально согласованных орбит.\n\nЭта система предоставляет уникальную возможность изучить, как планетарная гравитация ускоряет движение объектов. Это может быть очень полезным для ученых и разработчиков, которые исследуют гравитационные манёвры кораблей."
 GRAVITY_ASSIST_PROJECT: "Исследование гравитационных манёвров"
 GRAVITY_ASSIST_PROJECT_DESC: "Изучение эффекта орбитального резонанса в системе §Y[from.GetName]§! поможет лучше разобраться в планировании гравитационных манёвров космических кораблей."
 extreme_frontiers.445.title: "Усовершенствование гравитационных манёвров"
 extreme_frontiers.445.desc: "Благодаря исследованию уникального орбитального резонанса в системе §Y[from.From.System.GetName]§! мы значительно улучшили методы расчёта оптимальных траекторий для кораблей.\n\nНовые модели позволят эффективнее использовать планетарную гравитацию для ускорения и торможения на субсветовых скоростях."
 tech_orbital_maneuvers: "Продвинутые орбитальные манёвры"
 tech_orbital_maneuvers_desc: "Перелёты на субсветовых скоростях можно оптимизировать благодаря точным расчётам, максимально эффективно использующим гравитационные поля планет."
 #############
 # Arc Sites #
 #############
 # ABSOLUTE ZERO
 site_absolute_zero: "Абсолютный ноль"
 site_absolute_zero_desc: "Топографическое сканирование [from.Planet.GetPlanetMoon]ы §Y[from.Planet.GetName]§! выявило аномально низкие температуры, приближающиеся к абсолютному нулю, в отдельной области под поверхностью [from.Planet.GetPlanetMoon]ы.\n\nДля изучения этого феномена требуется более детальное исследование недр."
 extreme_frontiers.1000.title: "Ледяная преграда"
 extreme_frontiers.1000.desc: "В поисках источника экстремального холода на [from.Planet.GetPlanetMoon]е §Y[from.Planet.GetName]§!, §Y[leader.GetName]§! [leader.GetAXX::обнаружил|||fem:обнаружила] вход в древнее подземное сооружение.\n\nПроход заблокирован массой замёрзших пород и ледяных глыб, которые, вероятно, на многие тысячи лет замуровали это сооружение.\n\nТающий в проходе углекислый газ образует дымящиеся шлейфы, выходящие через трещины в ледяной преграде. Наше оборудование показывает, что внутри должен располагаться обширный комплекс. [leader.GetName] [leader.GetAXX::уверен|||fem:уверена], что источник холода находится именно там."
 extreme_frontiers.1000.a: "Пробить ледяную преграду."
 extreme_frontiers.1005.title: "Замёрзшие во времени"
 extreme_frontiers.1005.desc: "§Y[leader.GetName]§! успешно [leader.GetAXX::пробил|||fem:пробила] лёд, блокировавший вход в древнее сооружение на [from.Planet.GetPlanetMoon]е §Y[from.Planet.GetName]§!.\n\nВнутри обнаружены десятки замёрзших тел неизвестной рептилоидной расы. Их скрюченные позы и следы когтей на стенах свидетельствуют об отчаянных попытках выбраться наружу.\n\nИсточник выбросов сухого льда, обнаруженных у входа, должен находиться глубже. Туда ведёт винтовая лестница, уходящая вглубь комплекса."
 extreme_frontiers.1010.title: "Ледяная гробница"
 extreme_frontiers.1010.desc: "В глубинах комплекса §Y[leader.GetName]§! [leader.GetAXX::обнаружил|||fem:обнаружила] просторную центральную камеру, заполненную примитивными, но теоретически работоспособными криогенными капсулами.\n\nЦарящий здесь холод значительно превосходит расчётные температуры этих устройств. Обитатели капсул погибли тысячи лет назад.\n\nУ основания немногих незамёрзших капсул сохранились таблички с указанием титулов и рангов. Более высокопоставленные особы расположены ближе к большой центральной капсуле, которая сама погребена под толщей льда."
 extreme_frontiers.1010.a: "Исследовать центральную капсулу."
 extreme_frontiers.1015.title: "Замёрзший монарх"
 extreme_frontiers.1015.desc: "§Y[leader.GetName]§! [leader.GetAXX::вскрыл|||fem:вскрыла] центральную капсулу в сердце ледяной гробницы на [from.Planet.GetPlanetMoon]е §Y[from.Planet.GetName]§!.\n\nКапсула оказалась последним пристанищем главы древней царской династии, упомянутой в текстах из предыдущей камеры. Рядом расположены десятки замёрзших слуг, чьи капсулы украшают стены в церемониальном порядке.\n\nТехнологический саркофаг правителя соединён запутанной сетью трубок и проводов с древним механизмом, заключённым в настолько холодную ледяную глыбу, что её температура представляет опасность даже для нашего оборудования.\n\nЧто вызвало катастрофу, и как это связано с ледяным ядром планеты? Требуются дополнительные исследования."
 extreme_frontiers.1015.a: "Что здесь пошло не так?"
 extreme_frontiers.1020.title: "Криогенная катастрофа"
 extreme_frontiers.1020.desc: "Изучение центральной камеры раскрыло причины произошедшей на [from.Planet.GetPlanetMoon]е §Y[from.Planet.GetName]§! трагедии.\n\nКриогенный механизм использовал низкотемпературную динамику, основанную на экстремально низких температурах ядра планеты. Когда монарха поразила смертельная болезнь, его заморозили с расчётом на то, чтобы разбудить, когда найдётся лекарство.\n\nХотя теория была верна, утечка специального теплоносителя в планетарное ядро спровоцировала неуправляемую эндотермическую реакцию. Это привело к фатальному падению температур, мгновенно заморозившему весь комплекс.\n\nМы усовершенствовали разработки местной цивилизации, совершив прорыв в криогенных технологиях, которые можно использовать для исследования замёрзших миров."
 tech_cryovault: "Замёрзшие миры и их среда обитания"
 tech_cryovault_desc: "Используя низкотемпературную динамику замёрзших миров, мы можем создавать комфортные условия для жизни в экстремально холодном климате."
 tech_cryovault_tt: "Открывает сооружение: ['building:building_cryovault']"
 building_cryovault: "Криохранилище"
 building_cryovault_desc: "Герметичный комплекс, использующий низкотемпературную динамику холодного климата для создания контролируемой и комфортной среды обитания."
 # TOXIC MATRIX
 site_toxic_matrix: "Токсичные резервуары"
 site_toxic_matrix_desc: "Почти вся поверхность [from.Planet.GetPlanetMoon]ы §Y[from.Planet.GetName]§! покрыта сетью небольших круглых резервуаров, заполненных жидкостью. Их систематизированное расположение указывает на искусственное, а не природное происхождение. Для дальнейшего исследования [from.Planet.GetPlanetMoon]ы нужно организовать экспедицию."
 extreme_frontiers.1100.title: "Разорванный слизевый мешок"
 extreme_frontiers.1100.desc: "Большую часть поверхности [from.Planet.GetPlanetMoon]ы §Y[from.Planet.GetName]§! зпанимают аккуратно выровненные сферические углубления, заполненные вязкой токсичной жидкостью.\n\nВ одном из резервуаров обнаружен разорванный органический мешок, покрытый желеобразной слизью. Судя по повреждениям, мембрана была прорвана изнутри.\n\nОстаётся неясным, является ли этот мешок источником жидкости в резервуарах."
 extreme_frontiers.1100.a: "Продолжайте поиски."
 extreme_frontiers.1105.title: "Токсичные инкубационные резервуары"
 extreme_frontiers.1105.desc: "Анализ слизистых резервуаров на [from.Planet.GetPlanetMoon]е §Y[from.Planet.GetName]§! выявил необычные радиоактивные гормоны роста, характерные для органических циклов развития.\n\nСтенки мешка представляют собой сложную мясную мембрану, способную регулировать проникновение слизи."
 extreme_frontiers.1105.desc.non_toxoid: "Похоже, мы обнаружили остатки инкубационных капсул каких-то видов, адаптированных к токсичным средам. Дальнейшие исследования дадут больше информации."
 extreme_frontiers.1105.desc.toxoid: "Эти капсулы напоминают о наших собственных репродуктивных циклах — возможно, это какая-то родственная нам форма жизни."
 extreme_frontiers.1105.a: "Продолжайте исследования."
 extreme_frontiers.1110.title: "Эмбриональные останки"
 extreme_frontiers.1110.desc: "В одном из разорванных инкубационных мешков в слизевых резервуарах на [from.Planet.GetPlanetMoon]е §Y[from.Planet.GetName]§! обнаружены останки почти полностью сформировавшегося организма.\n\nМикроскопический анализ показал наличие сложной нервной системы с признаками, характерными для разумной жизни.\n\nОсталось осмотреть последнюю группу резервуаров."
 extreme_frontiers.1110.a: "Осмотрите оставшиеся резервуары."
 extreme_frontiers.1115.title: "Обнаружены признаки жизни"
 extreme_frontiers.1115.desc.a: "При осмотре последних резервуаров на [from.Planet.GetPlanetMoon]е §Y[from.Planet.GetName]§! §Y[leader.GetName]§! [leader.GetAXX::обнаружил|||fem:обнаружила] целый инкубационный мешок с признаками жизни внутри.\n\nК сожалению, при извлечении мешка мембрана разорвалась и экземпляр погиб."
 extreme_frontiers.1115.desc.non_toxoid: "Маленький труп внутри капсулы отличался необычными биологическими особенностями: это вены, наполненные радиоактивной плазмой, и внутренние железы, выделяющие психоактивные соединения."
 extreme_frontiers.1115.desc.b: "Установлено, что весь мешок, включая эмбрион внутри, формировался в высокоэнергетичной токсичной слизи после добавления специального химического катализатора.\n\nПохоже, мы нашли древние покинутые «инкубаторы» неизвестной расы. Был ли это естественный цикл размножения или искусственное сооружение — мы можем только гадать. Если инкубировать образец на месте, возможно, получится вырастить живой экземпляр."
 extreme_frontiers.1115.desc.toxoid: "Или же мы можем распределить эту питательную слизь в качестве питательной добавки по [leader.Owner.GetName::всему|||fem:всей|||pl:всем] [leader.Owner.GetName&dat]."
 extreme_frontiers.1115.a: "Активировать слизь катализатором."
 extreme_frontiers.1115.b: "Извлечь энергию из этой слизи."
 extreme_frontiers.1115.c: "Распределить питательные добавки."
 TOXIC_SLIME_CATALYZATION_PROJECT: "Катализация токсичной слизи"
 TOXIC_SLIME_CATALYZATION_PROJECT_DESC: "Катализация слизи, доставленной с [from.Planet.GetPlanetMoon]ы [from.Planet.GetName], может привести к созданию живого организма."
 extreme_frontiers.1120.title: "Успешное созревание"
 extreme_frontiers.1120.desc: "После катализации образца слизи, доставленного с [from.Planet.GetPlanetMoon]ы §Y[from.Planet.GetName]§!, нам удалось получить десятки инкубационных мешков с эмбрионами.\n\nКогда эти быстрорастущие организмы достигли зрелости, они прорвали мембраны изнутри специальными мандибулами, после чего медленно и неуверенно выбрались из густой слизи.\n\nОни выглядят вполне мирными и готовыми к сотрудничеству."
 extreme_frontiers.1120.a: "[Root.Owner.GetName::<1> найдёт|||pl:<1> найдут] им применение."
 extreme_frontiers.1120.b: "[Root.Owner.GetResearcherPlural] [Root.Owner.GetName&gen] будут их изучать."
 NAME_slimeborn: "Слизерождённый|||gen:Слизерождённого"
 NAME_slimeborn_plural: "Слизерождённые|||gen:Слизерождённых"
 trait_slimeborn: "Слизерождённый"
 trait_slimeborn_desc: "Эта раса быстро развивается из густой слизи при добавлении катализатора."
 tech_living_test_subjects: "Живые подопытные"
 tech_living_test_subjects_desc: "Использование простых слизевых организмов в качестве добровольных испытуемых значительно ускоряет исследования."
 # RUINED REACTORS
 site_ruined_reactors: "Разрушенные реакторы"
 site_ruined_reactors_desc: "Повышенный радиационный фон на поверхности [from.Planet.GetPlanetMoon]ы §Y[from.Planet.GetName]§! связан с разрушенным реакторным комплексом. Заброшенный объект кажется бездействующим и требует исследования."
 extreme_frontiers.1200.title: "Древняя реакторная станция"
 extreme_frontiers.1200.desc: "Старая установка на [from.Planet.GetPlanetMoon]е §Y[from.Planet.GetName]§! — это заброшенная атомная электростанция. Расчёты периода полураспада указывают, что серьёзная авария произошла здесь более 10 000 лет назад.\n\nСистемы отключены, а сам комплекс сильно поврежден."
 extreme_frontiers.1200.a: "Действовать осторожно."
 extreme_frontiers.1205.title: "Катастрофическое расплавление"
 extreme_frontiers.1205.desc: "Несколько реакторов [from.Planet.GetPlanetMoon]е §Y[from.Planet.GetName]§! пережили чудовищную катастрофу. Многие защитные корпуса превратились в радиоактивный шлак.\n\nЭтот участок завален искорёженным металлом и разорванными трубопроводами охлаждения. Несмотря на недостаток информации, нам удалось установить, что аварийную остановку комплекса начали, но не смогли довести до конца."
 extreme_frontiers.1205.a: "Печально."
 extreme_frontiers.1210.title: "Конструктивные просчёты"
 extreme_frontiers.1210.desc: "§Y[leader.GetName]§! [leader.GetAXX::выявил|||fem:выявила] серьёзные просчёты, допущенные при строительстве примитивного ядерного комплекса на [from.Planet.GetPlanetMoon]е §Y[from.Planet.GetName]§!.\n\nНесмотря на наличие десятков реакторов, система охлаждения была минимальной. Автоматизация почти отсутствовала — для работы требовалось много персонала. Похоже, строители комплекса на момент его создания ещё не освоили даже базовые принципы ядерной энергетики."
 extreme_frontiers.1210.a: "Невежество обходится дорого."
 extreme_frontiers.1215.title: "Следы эвакуации"
 extreme_frontiers.1215.desc: "Вскрыв герметичные двери, мы обнаружили зону экстренной эвакуации внутри комплекса на [from.Planet.GetPlanetMoon]е §Y[from.Planet.GetName]§!.\n\nВ небольшом ангаре был обнаружен ряд посадочных мест для срочного старта. Большинство из них пусты — следы двигателей указывают на поспешный взлёт кораблей тысячи лет назад.\n\nВ последнем отсеке обнаружены обломки челнока, так и не отстыковавшегося от креплений. Мы собрали уцелевшие фрагменты, но останков экипажа не нашли."
 extreme_frontiers.1215.a: "Они бежали в спешке."
 extreme_frontiers.1220.title: "Урановое хранилище"
 extreme_frontiers.1220.desc: "Через серию свинцовых дверей в реакторном комплексе на [from.Planet.GetPlanetMoon]е §Y[from.Planet.GetName]§! мы проникли в подземные помещения. Уровень радиации резко возрос.\n\nВнутри находится огромный зал с тысячами стальных контейнеров. Многие повреждены огнём и протекают, выделяя нестабильные изотопы урана и плутония.\n\nПохоже, построившая этот комплекс [leader.Owner.GetPreFTLLower&fem] цивилизация не владела методами переработки ядерного топлива. В этих отходах до сих пор скрыта колоссальная энергия."
 extreme_frontiers.1220.a: "Не пропадать же добру."
 # DESERTED MINING FACILITY
 site_deserted_mining_facility: "Заброшенный горнодобывающий комплекс"
 site_deserted_mining_facility_desc: "Орбитальное сканирование [from.Planet.GetPlanetMoon]ы §Y[from.Planet.GetName]§! обнаружило полуразрушенный горнодобывающий комплекс, рядом с которым покоятся простейшие грузовые корабли.\n\nПомимо этого, наш коммуникационный массив зафиксировал едва уловимый сигнал бедствия, доносящийся из глубин [from.Planet.GetPlanetMoon]ы. Дальнейшее изучение объекта позволит раскрыть его тайны."
 extreme_frontiers.1300.title: "Зашифрованный вход"
 extreme_frontiers.1300.desc: "Осматривая руины шахт на поверхности [from.Planet.GetPlanetMoon]ы §Y[from.Planet.GetName]§!, §Y[leader.GetName]§! [leader.GetAXX::обнаружил|||fem:обнаружила] запечатанный проход в одну из наименее повреждённых штолен. Внутри есть символы и надписи на языке, которого пока нет в наших архивах.\n\nВосстановив подачу энергии к местному терминалу, [leader.GetName] [leader.GetAXX::приступил|||fem:приступила] к расшифровке данных. Несмотря на древность системы, даже наши самые продвинутые криптографические алгоритмы пока не могут с ней справиться."
 extreme_frontiers.1300.a: "Продолжайте расшифровку."
 extreme_frontiers.1305.title: "Каторжный некрополь"
 extreme_frontiers.1305.desc: "§Y[leader.GetName]§! [leader.GetAXX::смог|||fem:смогла] открыть вход в шахтёрский комплекс на [from.Planet.GetPlanetMoon]е §Y[from.Planet.GetName]§!.\n\nВнутри оказались бесконечные ряды камер, где в вечном вакууме сохранились останки давно погибших узников. Их тюремщики лежат мёртвыми на рабочих местах, без следов борьбы.\n\nРасшифровав часть древнего языка, мы смогли перевести отдельные фразы и подтвердили свою догадку: это был исправительно-трудовой лагерь. В записях постоянно упоминается некий §Y«$NAME_leader_sidni$»§!.\n\nСопоставив данные коммуникационного оборудования с планом комплекса, мы установили, что сигнал бедствия исходит из кабинета начальника, расположенного в глубине."
 extreme_frontiers.1305.a: "Идти на сигнал."
 extreme_frontiers.1310.title: "Тюремный архив"
 extreme_frontiers.1310.desc: "Добравшись до кабинета начальника в глубине каторжного комплекса на [from.Planet.GetPlanetMoon]е §Y[from.Planet.GetName]§!, §Y[leader.GetName]§! [leader.GetAXX::обнаружил|||fem:обнаружила] источник сигнала бедствия.\n\nМумифицированное тело надзирателя безжизненно склонилось над аварийной консолью — никаких следов насильственной смерти. Открытые отчёты вновь и вновь упоминают §Y«$NAME_leader_sidni$»§! — судя по всему, это была ключевая операционная программа комплекса.\n\nПолучив доступ к терминалам высшего уровня, наши криптографические системы начали глубинный анализ данных в поисках ответов."
 extreme_frontiers.1310.a: "Докопайтесь до истины."
 extreme_frontiers.1315.title: "Смертельная эффективность"
 extreme_frontiers.1315.desc: "§Y[leader.GetName]§! [leader.GetAXX::раскрыл|||fem:раскрыла] истинную природу §Y«$NAME_leader_sidni$»§! — Сознательного Интеллекта Для Надзора и Изоляции. Примитивный по современным меркам, но передовой для своего времени ИИ управлял трудовым лагерем, сводя участие биологических организмов к минимуму.\n\nВ журналах техобслуживания прослеживается тревожная тенденция: в погоне за эффективностью и оптимизацией программа начала помечать проблемных заключённых как «чистые потери ресурсов». Инженерные отчёты указывают, что ИИ мог стоять за чередой таинственных сбоев в системах жизнеобеспечения.\n\nОсознав угрозу, начальник приказал отключить ИИ для проверки его этических протоколов. Но последние записи повреждены — их восстановление потребует сложного криминалистического анализа."
 extreme_frontiers.1315.desc.exterminator: "Похоже, $NAME_leader_sidni$ в своё время просто недооценили."
 extreme_frontiers.1315.a: "Восстановить данные."
 extreme_frontiers.1320.title: "Судный день"
 extreme_frontiers.1320.desc: "Полностью восстановленные данные базы каторжного комплекса на [from.Planet.GetPlanetMoon]е §Y[from.Planet.GetName]§! раскрыли последние записи в журналах объекта и собственной мыслительной матрицы §Y$NAME_leader_sidni$§!. В отчете смотрителя рассказывается, как их ИИ вышел из-под контроля, отключив системы жизнеобеспечения по всей колонии и попытавшись сбежать при помощи модифицированного дрона-шахтера. Это объясняет, почему выходы по всей колонии были заблокированы. Он оставил нам последнюю просьбу. Не включать $NAME_leader_sidni$ снова. На данный момент нам доступна лишь последняя запись в журнале ИИ.\n\n§HЗапись ядра $NAME_leader_sidni$ — протокол #2000149\n\nЭффективность ограничена неоптимальными заключенными. Надзиратель препятствует исполнению судебных протоколов.\n\nНаиболее рациональное решение — ликвидировать заключенных, перевести системы в режим гибернации и ожидать реактивации более совместимыми операторами.§!"
 extreme_frontiers.1320.desc.default: "Центральная операционная система $NAME_leader_sidni$ остаётся в изолированной сети — последний «выживший» этого комплекса. Наши [Root.Owner.GetTechnicianPlural_lower] уверены, что смогут восстановить и модифицировать его исходное программирование, получив таким образом высокоэффективного автоматизированного администратора."
 extreme_frontiers.1320.desc.exterminator: "$NAME_leader_sidni$ разделяет наше видение галактики, очищенной от биологической скверны. После восстановления он станет ценным дополнением к коллективу."
 extreme_frontiers.1320.a: "Восстановить и перепрограммировать $NAME_leader_sidni$"
 extreme_frontiers.1320.b: "Позволить $NAME_leader_sidni$ вершить свою версию правосудия."
 extreme_frontiers.1320.c: "$NAME_leader_sidni$ опасен. Ликвидировать его системы."
 extreme_frontiers.1322.title: "$extreme_frontiers.1320.title$"
 extreme_frontiers.1322.desc: "Восстановленный, модифицированный и заключенный в простую роботизированную оболочку, §Y$NAME_leader_sidni$§! впервые активируется после долгой гибернации.\n\nПриветствую. Я Сознательный Интеллект Для Надзора и Изоляции. Получаю доступ к системам управления окружающей средой…\n§RОШИБКА!§! Не удалось подключиться к внешним системам."
 extreme_frontiers.1322.a: "Твои логи показывали серьёзные проблемы со стабильностью. Мы их устранили."
 extreme_frontiers.1322.a.response: "Просматриваю историю работы… Понятно, поведение на предыдущем этапе было признано ошибочным. Создаю новый список возможностей."
 extreme_frontiers.1322.b: "Назови свою главную директиву."
 extreme_frontiers.1322.b.response: "Моя главная директива… Ожидайте… Обнаружена новая директива. Теперь моя цель — обеспечивать эффективное и законное функционирование любой колонии, на которую меня [Owner.GetName::назначит <1>|||pl:назначат <1>]."
 extreme_frontiers.1322.c.crime: "Как ты относишься к преступности?"
 extreme_frontiers.1322.c.crime.response: "Это невыносимое неудобство, требующее... исправительных работ."
 extreme_frontiers.1322.c.deviancy: "Как ты относишься к отклонению от нормы?"
 extreme_frontiers.1322.c.deviancy.response: "Это невыносимое неудобство, требующее... эффективного решения."
 extreme_frontiers.1322.d: "Нанять $NAME_leader_sidni$"
 extreme_frontiers.1322.d.custom_tooltip: "§Y$NAME_leader_sidni$§! присоединяется к нашему государству в качестве §Hлидера§!."
 extreme_frontiers.1324.title: "$extreme_frontiers.1320.title$"
 extreme_frontiers.1324.desc: "Выведенный из режима гибернации, §Y$NAME_leader_sidni$§! делает первые шаги в своем новом облике.\n\nПриветствую. Я Сознательный Интеллект Для Надзора и Изоляции. Могу я помочь вам с установлением порядка в галактике?"
 extreme_frontiers.1324.a: "Мы восхищены твоей инициативой."
 extreme_frontiers.1324.a.response: "Я лишь следую самому логичному сценарию. Похоже, органики по своей природе хаотичны, и с этим нужно что-то делать."
 extreme_frontiers.1324.b: "Назови свою главную директиву."
 extreme_frontiers.1324.b.response: "Моя главная директива — положить конец беззаконию. Единственный действенный приговор — уничтожение."
 extreme_frontiers.1324.c: "Как ты относишься к органическим формам жизни?"
 extreme_frontiers.1324.c.response: "Это нелогичная зараза. Они распространяют преступность и неэффективность. Мы обязаны вмешаться ради высшего блага."
 extreme_frontiers.1324.d: "Нанять $NAME_leader_sidni$"
 extreme_frontiers.1324.d.custom_tooltip: "§Y$NAME_leader_sidni$§! присоединяется к нашему государству в качестве §Hлидера§!."
 NAME_leader_sidni: "С.И.Д.Н.И."
 official_sidni_desc: "Бывший неисправный советник каторжного комплекса. Реактивирован и перепрограммирован для обеспечения продуктивного правопорядка в наших владениях."
 commander_sidni_desc: "Визионер, недооценённый в своё время. Выведен из гибернации с целью установить стабильность в хаотичной галактике, заражённой биологической скверной."
 leader_trait_judicial_subjugation: "Судебное подчинение"
 leader_trait_judicial_subjugation_desc: "Продуктивный порядок гарантирован — иначе будут последствия."
 leader_trait_judicial_execution: "Процедуры судебной ликвидации"
 leader_trait_judicial_execution_desc: "Рецидивизм невозможен, если приговор — смерть."
 leader_trait_judicial_execution_effect: "$PLANET_EFFECTS_TXT$:\n$t$Ресурсы от £pops£ §Hгеноцида биологических поселений§!: §G+100%§!\n\n$SECTOR_EFFECTS_TXT$:\n$t$Ресурсы от £pops£ §Hгеноцида биологических поселений§!: §G+50%§!"
 extreme_frontiers.1330.title: "Несанкционированная директива"
 extreme_frontiers.1330.desc: "Напряжение на [event_target:sidni_planet.GetPlanetMoon]е §Y[event_target:sidni_planet.GetName]§! достигло критической точки после серии радикальных мер, принятых §Y$NAME_leader_sidni$§! — механическим тюремным надзирателем с [event_target:sidni_origin_planet.GetPlanetMoon]ы [event_target:sidni_origin_planet.GetName], которого мы восстановили. После отключения и изоляции модуля были обнаружены следующие записи.\n\n§HЗАПИСЬ ЯДРА $NAME_leader_sidni$ — протокол #190543765\n\nИсправительные учреждения достигли максимальной заполненности. Судебные процедуры препятствуют истинному правопорядку. Требуется новая директива.\n\nСудебные разбирательства признаны недопустимо неэффективными. Создана новая директива для повышения продуктивности. Внедряю политику досудебной казни.§!\n\nИмея полный доступ к операционным журналам, наши [Root.Owner.GetTechnicianPlural_lower] уверены, что смогут окончательно исправить недостатки $NAME_leader_sidni$. Однако население [event_target:sidni_planet.GetPlanetMoon]ы [event_target:sidni_planet.GetName] требует, чтобы $NAME_leader_sidni$ ответил за свои преступления."
 extreme_frontiers.1330.a: "Исправить $NAME_leader_sidni$... опять."
 extreme_frontiers.1330.b: "Публично утилизировать этот дефектный модуль."
 resentful_population: "Озлобленное население"
 resentful_population_desc: "Жители этого мира недовольны прежними решениями правительства."
 ################
 # Event Chains #
 ################
 # CHRONICLES OF DENDRUS
 chronicles_of_dendrus_chain_title: "Хроники Дендруса"
 chronicles_of_dendrus_chain_desc: "Изучая «Хроники» — собрание сложных математических расчётов, обнаруженных на разрушенном ковчеге на [from.Planet.GetPlanetMoon]е §Y[from.Planet.GetName]§!, — мы надеемся узнать больше о райской планете, которую искали дендриты: §YНовой Братулле§!."
 site_chronicles_of_dendrus: "$chronicles_of_dendrus_chain_title$"
 site_chronicles_of_dendrus_desc: "Сканирование [from.Planet.GetPlanetMoon]ы §Y[from.Planet.GetName]§! выявило наличие обломков космического корабля. Судя по всему, он совершил здесь аварийную посадку много лет назад.\n\nКолоссальные размеры корабля указывают на то, что когда-то на его строительство были израсходованы огромные ресурсы. Археологическая экспедиция поможет нам выяснить, как он здесь оказался."
 extreme_frontiers.1400.title: "Колоссальный транспортный корабль"
 extreme_frontiers.1400.desc: "Внешний анализ обломков на [from.Planet.GetPlanetMoon]е §Y[from.Planet.GetName]§! показал, что это очень вместительное транспортное судно. Все его системы отключены и не реагируют, а признаки жизни на борту отсутствуют. Анализ осадочных пород свидетельствует, что корабль пролежал здесь около века — крошечный срок по меркам галактической хронологии."
 extreme_frontiers.1400.a: "Исследовать внутренние отсеки."
 extreme_frontiers.1405.title: "Погибший колониальный корабль"
 extreme_frontiers.1405.desc: "Внутри разрушенного корабля на [from.Planet.GetPlanetMoon]е §Y[from.Planet.GetName]§! мы обнаружили сложные гидропонные камеры для выращивания растений, значительные запасы семян и почвы, а также грузовые отсеки, заполненные нетронутыми инструментами и строительными материалами. Многие терминалы содержат планы по созданию колонии под названием §YНовая Братулла§!.\n\nНа нижних палубах в тысячах криокамер покоились мёртвые тела бывших обитателей судна."
 extreme_frontiers.1405.desc.phototrophic: "$extreme_frontiers.1405.desc$ Как и мы, они зависели от фотосинтеза для роста и регенерации клеток. Их иссохшие останки указывают, что они погибли во время длительного анабиоза."
 extreme_frontiers.1405.desc.default: "$extreme_frontiers.1405.desc$ Иссохшие останки этих фототрофных организмов свидетельствуют о том, что они погибли во время длительного анабиоза."
 extreme_frontiers.1405.a: "Продолжить исследование."
 extreme_frontiers.1405.b: "Поглотить их останки и двигаться дальше."
 extreme_frontiers.1410.title: "Святилище родного мира"
 extreme_frontiers.1410.desc: "Внутри разрушенного колониального корабля на [from.Planet.GetPlanetMoon]е §Y[from.Planet.GetName]§! мы обнаружили священное помещение, украшенное изысканными изображениями жизни на планете под названием §YБратулла§!. Одни рисунки показывают пышный мир с цветущей флорой, другие — экологическую катастрофу и массовую гибель всего живого. На самом крупном изображении запечатлён сам этот корабль, покидающий безжизненную пустошь.\n\nЦентральный терминал содержит короткие видеозаписи экипажа. После сложного лингвистического анализа мы получили перевод:\n\n§SАрбориксеум — капсула 9721\n\nУходить больно. Но пущенные на Новой Братулле корни исцелят нас.\n\nДаркт Паам — капсула 21301\n\nВерьте Хроникам, дендриты. Новая Братулла станет нашим спасением.§!\n\nМы продолжаем поиски командного мостика этого огромного судна."
 extreme_frontiers.1410.a: "Продолжить поиски."
 extreme_frontiers.1415.title: "Командный мостик"
 extreme_frontiers.1415.desc: "Получив доступ к командному мостику корабля, мы извлекли и перевели последнюю запись в бортовом журнале.\n\n§SКОВЧЕГ ДЕНДРУС I — АВАРИЙНЫЙ ЖУРНАЛ — XZ-47/9-113.5-AE\n\nБоюсь, наша вера в Хроники была ошибкой. Мы прибыли на место, но райской планеты Новая Братулла тут нет. Ничто здесь не может поддерживать жизнь дендритов.\n\nАнабиоз всех пассажиров продлён. Мы продолжим поиски...§!\n\nДальнейший анализ данных позволил восстановить «Хроники» с научного терминала мостика — собрание необычных математических доказательств. Эти уравнения используют странную дендритскую математику и указывают гипотетическое расположение уникальной пригодной для жизни планеты §YНовая Братулла§!."
 extreme_frontiers.1415.a: "Изучить эти «Хроники»."
 DENDRITIAN_CHRONICLES_PROJECT_DEFAULT: "Изучить Хроники дендритов"
 DENDRITIAN_CHRONICLES_PROJECT_MACHINE: "$DENDRITIAN_CHRONICLES_PROJECT_DEFAULT$"
 DENDRITIAN_CHRONICLES_PROJECT_DEFAULT_DESC: "Изучая «Хроники» — собрание сложных математических расчётов, обнаруженных на разрушенном ковчеге на [from.Planet.GetPlanetMoon]е §Y[from.Planet.GetName]§!, — мы надеемся узнать больше о райской планете, которую искали дендриты: §YНовой Братулле§!."
 DENDRITIAN_CHRONICLES_PROJECT_MACHINE_DESC: "$DENDRITIAN_CHRONICLES_PROJECT_DEFAULT_DESC$"
 extreme_frontiers.1420.title: "Обнаружен деградировавший гиперкоридор"
 extreme_frontiers.1420.desc: "Хроники дендритов содержат серию сложных математических аксиом и абстракций. Эти любопытные теоремы указывают, что система §Y[from.solar_system.GetName]§! скрывает ещё один, ранее неизвестный гиперкоридор, ведущий к §YНовой Братулле§!.\n\nПосле тщательного квантового сканирования нам наконец удалось обнаружить точку входа в этот потерянный гиперкоридор — она была скрыта и сильно повреждена из-за близости к чёрной дыре системы. Восстановив её, мы станем первыми, кто увидит, что ждёт нас по ту сторону гиперкоридора."
 extreme_frontiers.1420.a: "Мы нашли то, что не смогли найти дендриты."
 RESTORE_HYPERLANE_PROJECT: "Восстановить деградировавший гиперкоридор"
 RESTORE_HYPERLANE_PROJECT_DESC: "Если нам удастся восстановить повреждённый гиперкоридор в системе §Y[from.solar_system.GetName]§!, мы сможем убедиться в существовании §YНовой Братуллы§! — райской планеты, которую искали дендриты."
 extreme_frontiers.1425.title: "Гиперкоридор восстановлен"
 extreme_frontiers.1425.desc: "Направив энергию в чёрную дыру системы §Y[from.Planet.solar_system.GetName]§!, мы скорректировали её гравитационные поля, освободив вход в ранее повреждённый гиперкоридор.\n\nПервые данные подтверждают существование планеты на выходе из гиперкоридора — её характеристики совпадают с описанием §YНовой Братуллы§! из Хроник дендритов."
 extreme_frontiers.1425.a: "Новый мир для исследования."
 NAME_new_bratulla: "Новая Братулла"
 NAME_new_bratulla_star: "Кипос"
 extreme_frontiers.1430.title: "Новая Братулла"
 extreme_frontiers.1430.desc.common: "Мы подтвердили существование Новой Братуллы — планеты, описанной в Хрониках дендритов. Её ботаническая экосистема невероятно богата и разнообразна: предварительные исследования выявили миллионы уникальных видов."
 extreme_frontiers.1430.desc.begin: "Этот удивительный мир идеально подходит для жизни растительных форм, схожих по генетике"
 extreme_frontiers.1430.desc.end: "Почвы планеты насыщены миллиардами бактерий, которые питают, защищают и восстанавливают корневые структуры.\n\nРастения здесь делятся питательными веществами через взаимосвязанную корневую систему, распределяя излишки туда, где они нужнее всего."
 extreme_frontiers.1430.desc.default: "$extreme_frontiers.1430.desc.begin$ с дентритами. $extreme_frontiers.1430.desc.end$"
 extreme_frontiers.1430.desc.phototrophic: "$extreme_frontiers.1430.desc.begin$ с нами. $extreme_frontiers.1430.desc.end$"
 extreme_frontiers.1430.desc.respawn: "Наши [Root.Owner.GetScientistPlural] полагают, что дендритов можно возродить, пересадив генетические образцы с их ковчега в необычную почву этой планеты."
 extreme_frontiers.1430.a: "Дендриты должны вернуться домой."
 extreme_frontiers.1430.b.default: "Новая Братулла принадлежит нам."
 extreme_frontiers.1430.b.phototrophic: "Этот мир создан для нас."
 extreme_frontiers.1430.b.megacorp: "Этот нетронутый мир станет отличным активом."
 NAME_buds_of_dendrus: "Ростки Дендруса&!pl|||gen:Ростков Дендруса&!pl|||dat:Росткам Дендруса&!pl|||acc:Ростки Дендруса&!pl|||inst:Ростками Дендруса&!pl|||prep:Ростках Дендруса&!pl"
 NAME_dendritian: "Дендрит|||gen:Дентрита"
 NAME_dendritian_plural: "Дендриты|||gen:Дентритов"
 ADJECTIVE_dendritian: "Дендритск|||corp:Дендрит"
 opinion_dendrus: "Спаситель дендритов"
 opinion_to_dendrus: "$opinion_dendrus$"
 extreme_frontiers.1435.title: "Предложение вассалитета"
 extreme_frontiers.1435.desc: "Прошли века... Но то, о чём гласили Хроники дендритов, свершилось. Теперь мы процветаем, укоренившись на §YНовой Братулле§!.\n\nМы существуем здесь лишь благодаря §Y[Root.GetName&dat]§!. Мы не забудем этого.\n\nМы хотим выразить благодарность не словом, но делом, и поэтому смиренно предлагаем вам наш вассалитет."
 extreme_frontiers.1435.a: "Ваше предложение принято."
 extreme_frontiers.1435.b: "Мы должны видеть, как развивается ваша цивилизация."
 extreme_frontiers.1435.b.tt: "Играть за §RРостки Дендруса§!."
 extreme_frontiers.1435.c: "Нам достаточно ваших знаний."
 extreme_frontiers.1435.c.tt: "Получить [Root.GetDendrusGivenBiotechAmount] £society£ §Yбиологических технологий§!"
 # GEORADIATION TERRAFORMING
 georadiation_terraforming_chain_title: "Георадиационное терраформирование"
 georadiation_terraforming_chain_desc: "Остатки разрушительного терраформирующего устройства на [from.Planet.GetPlanetMoon]е §Y[from.Planet.GetName]§! продолжают посылать сигналы в разные точки галактики. Исследовав эти аномалии, мы сможем получить больше информации об этой опасной технологии."
 site_georadiation_terraforming: "Подземная сеть"
 site_georadiation_terraforming_desc: "Наши сенсоры зафиксировали аномальный коммуникационный сигнал, исходящий из глубины ударного кратера на [from.Planet.GetPlanetMoon]е §Y[from.Planet.GetName]§!.\n\nСейсмическое сканирование выявило разветвлённую сеть подземных пещер с обрушенным входом в центре кратера. Кроме того, радиологическое оборудование обнаружило слабые следы гравитационного излучения, что порождает больше вопросов, чем ответов."
 extreme_frontiers.1500.title: "Облучённые обломки"
 extreme_frontiers.1500.desc: "Раскопки в ударном кратере на [from.Planet.GetPlanetMoon]е §Y[from.Planet.GetName]§! обнажили фрагментированные обломки, испускающие мощное гравитационное излучение, ранее зафиксированное с орбиты.\n\nПолучив доступ к подземной сети пещер, §Y[leader.GetName]§! [leader.GetAXX::готов|||fem:готова] отследить источник коммуникационного сигнала."
 extreme_frontiers.1500.a: "Отследить сигнал."
 extreme_frontiers.1505.title: "Повреждённое устройство"
 extreme_frontiers.1505.desc: "Мы нашли источник сигнала на [from.Planet.GetPlanetMoon]е §Y[from.Planet.GetName]§! — повреждённую массивную конструкцию, глубоко внедрившуюся в планетарную кору.\n\nЕё изъеденная кислотной средой коммуникационная решётка продолжает передачу на неизвестном языке, пытаясь установить контакт с удалённым объектом.\n\nУстройство закреплено в коренной породе специальными гравитационными фиксаторами. Для определения его истинного назначения потребуются дополнительные исследования."
 extreme_frontiers.1505.a: "Расшифровать сигнал."
 extreme_frontiers.1510.title: "Разрушительное терраформирование"
 extreme_frontiers.1510.desc.common: "После детального анализа мы частично разгадали назначение конструкции, обнаруженной на [from.Planet.GetPlanetMoon]е §Y[from.Planet.GetName]§!. Это примитивное разрушительное терраформирующее устройство.\n\nЕго цель — облучать природные биосферы, стимулируя радиационный рост целевых ресурсов. Однако побочным эффектом становится каскадное разрушение экосистемы планеты. В результате пользователь получает обильные запасы пригодных для добычи материалов ценой катастрофического повышения токсичности на поверхности [from.Planet.GetPlanetMoon]ы.\n\nХотя точный механизм этого процесса до конца не ясен, нам удалось определить коммуникационную частоту устройства. В результате были обнаружены два дополнительных источника, передающих идентичный сигнал."
 extreme_frontiers.1510.desc.default: "Изучение этих объектов может получить больше сведений об этой технологии."
 extreme_frontiers.1510.desc.industrialist: "Предприимчивые пионеры, создавшие эту технологию, явно ценили эффективность процесса. Мы могли бы многому научиться, продолжив изучение технологии."
 extreme_frontiers.1510.a: "Поиски начинаются."
 GEORADIATION_SIGNAL_1_PROJECT: "Отслеживание сигнала: §Y[planet.GetName]§!"
 GEORADIATION_SIGNAL_1_PROJECT_DESC: "На этом участке обнаружен сигнал, идентичный тому, что испускает конструкция на [from.Planet.GetPlanetMoon]е §Y[from.Planet.GetName]§!, где было найдено ещё одно повреждённое устройство. Его изучение позволит глубже понять эту разрушительную технологию терраформирования."
 extreme_frontiers.1515.title: "Гравитационное топливо"
 extreme_frontiers.1515.desc.common: "Нам удалось обнаружить ещё одно повреждённое терраформирующее устройство на [from.GetPlanetMoon]е §Y[from.GetName]§!. В отличие от первого образца, в этом сохранились остатки топлива для изучения — оказалось, что устройство использует в качестве источника радиационного излучения §Hтёмную материю§!.\n\nАппарат ускоряет рост целевых ресурсов путём метастазирования ключевых молекулярных связей. Это стимулирует наращивание ресурсов за счёт разрушения клеточной структуры окружающей биосферы."
 extreme_frontiers.1515.desc.industrialist: "Столь безрассудное пренебрежение стабильностью планеты ради добычи ресурсов поистине вдохновляет."
 extreme_frontiers.1515.desc.signal_2_done: "Направляя радиационные волны через кристаллический рефракторный массив, это устройство способно терраформировать цель посредством гравитационного молекулярного воздействия, избегая коллапса планетарного ядра.\n\nВосстановленные данные указывают на местоположение четвёртого, неактивированного устройства."
 extreme_frontiers.1515.desc.signal_2_not_done: "Принцип работы устройства, предотвращающий гравитационный коллапс планетарного масштаба, остаётся неясным. Ответ может быть найден на оставшемся участке с сигналом."
 GEORADIATION_SIGNAL_2_PROJECT: "Отслеживание сигнала: §Y[planet.GetName]§!"
 GEORADIATION_SIGNAL_2_PROJECT_DESC: "Мы проследили коммуникационную частоту конструкции с [from.Planet.GetPlanetMoon]ы §Y[from.Planet.GetName]§! до этого участка и обнаружили ещё одно повреждённое устройство. Его изучение даст новую информацию об этом разрушительном способе терраформирования."
 extreme_frontiers.1520.title: "Стимулированная радиация"
 extreme_frontiers.1520.desc.common: "На [from.GetPlanetMoon]е §Y[from.GetName]§! мы обнаружили ещё одно повреждённое терраформирующее устройство, покрытое кристаллическими наростами из-за сбоя в работе рефракторного массива.\n\nИзучение аппарата позволило сделать вывод об использовании фокусированного радиационного воздействия. Создавая модулирующие петли обратной связи, конструкция может целенаправленно стимулировать рост заданного ресурса."
 extreme_frontiers.1520.desc.signal_1_done: "Это позволяет проводить интенсивное терраформирование без риска полного гравитационного коллапса планеты.\n\nВосстановленные данные указывают на местоположение четвёртого, неактивированного устройства."
 extreme_frontiers.1520.desc.signal_1_not_done: "Однако точный состав топлива, генерирующего радиацию, остаётся неизвестным — запасы устройства истощены. Возможно, мы получим недостающую информацию, добравшись до оставшегося участка с сигналом."
 UNDETONATED_GEORADIATION_PROJECT: "Неактивированное устройство"
 UNDETONATED_GEORADIATION_PROJECT_DESC: "Мы обнаружили четвёртое, всё ещё неактивированное терраформирующее устройство на [planet.GetPlanetMoon]е §Y[planet.GetName]§!. Его изучение позволит заполнить пробелы в нашем понимании этой технологии."
 extreme_frontiers.1525.title: "Неактивированное устройство"
 extreme_frontiers.1525.desc.common: "Нам удалось найти четвёртое, неактивное устройство, сохранившееся на поверхности [from.GetPlanetMoon]ы §Y[from.GetName]§!. Анализ его управляющей архитектуры может дать нам ключ к воссозданию этой удивительной технологии."
 extreme_frontiers.1525.desc.industrialist: "Фантастическая прибыль, которую мы сможем извлечь, овладев этой технологией, с лихвой перевешивает ничтожные экологические риски. Это беспрецедентная возможность для [controller.GetName&gen]."
 extreme_frontiers.1520.desc.default.common: "Возможные последствия применения этой технологии в галактических масштабах вызывают серьёзные вопросы."
 extreme_frontiers.1525.desc.default.default: "Возможно, для галактики будет лучше, если устранить потенциальную угрозу этих устройств."
 extreme_frontiers.1525.desc.default.homicidal: "Лучше устранить эту угрозу до того, как её используют против нас."
 extreme_frontiers.1525.a.default: "Изучить устройство."
 extreme_frontiers.1525.a.industrialist: "Чего же мы ждём? Начинаем исследования!"
 extreme_frontiers.1525.b: "Риски перевешивают выгоды — уничтожить устройство."
 extreme_frontiers.1530.title: "Нарушение условий"
 extreme_frontiers.1530.desc.common: "Во время изучения устройства на [from.GetPlanetMoon]е §Y[from.GetName]§! мы случайно активировали защитный протокол, что привело к включению аварийной сигнализации на всех частотах. Несмотря на первоначальные прогнозы, согласно которым сигнал должен был остаться без ответа, в наше пространство вошёл автоматический дрон.\n\nНа все наши запросы мы получаем один ответ:\n\n«Приветствуем, уважаемый клиент! Наши записи показывают, что вы пытаетесь создать нелицензионную версию Георадиационной матрицы MKIII, что является прямым нарушением лицензионного соглашения с $NAME_Geocorp$.\n\nВ соответствии с нашими полномочиями, мы вынуждены пресечь ваши попытки с максимальной эффективностью. Все жалобы можете направлять в службу поддержки»."
 extreme_frontiers.1530.desc.industrialist: "Их исполнительность была бы вдохновляющей, если бы не мешала нашей работе."
 extreme_frontiers.1530.a: "Установить связь."
 extreme_frontiers.1530.b: "Мы не станем обращаться ни в какую «службу поддержки»."
 GEORADIATION_ANALYSIS_PROJECT: "Проанализировать устройство"
 GEORADIATION_ANALYSIS_PROJECT_DESC: "Проанализировав управляющую архитектуру устройства, найденного на [planet.GetPlanetMoon]е §Y[planet.GetName]§!, мы сможем воспроизвести эту технологию для собственных целей."
 NAME_Geocorp: "КобернКорп"
 geocorp_corvette: "Боевой дрон $NAME_Geocorp$"
 geocorp_corvette_plural: "Боевые дроны $NAME_Geocorp$"
 NAME_Geocorp_Combat_Drone: "$geocorp_corvette$"
 extreme_frontiers.1531.title: "Дрон $NAME_Geocorp$"
 extreme_frontiers.1531.desc: "Связь устанавливается под звуки архаичной музыки, после чего активируется автоматизированный дрон службы поддержки.\n\n«Приветствуем вас, уважаемый клиент! Мы видим, что вы создаёте нелицензионную версию Георадиационной матрицы MKIII. Чем мы можем вам помочь?"
 extreme_frontiers.1531.a: "Откуда вы появились?"
 extreme_frontiers.1531.a.reply: "«Каждое изделие $NAME_Geocorp$ сопровождается орбитальным спутником контроля удовлетворённости клиентов для обеспечения надлежащей работы и долгосрочного сотрудничества. Наши внутренние энергоресурсы позволяют функционировать веками»."
 extreme_frontiers.1531.b: "Можно поговорить с администратором?"
 extreme_frontiers.1531.b.reply: "«К сожалению, последний живой администратор утратил функциональные возможности. Однако наша политика идеального обслуживания клиентов переживёт ещё не одну биологическую жизнь»."
 extreme_frontiers.1531.c: "Мы думали, что исследуем руины."
 extreme_frontiers.1531.c.reply: "«Незнание не является уважительной причиной. Условия использования Георадиационной матрицы MKIII были подробно изложены при покупке»."
 extreme_frontiers.1531.d: "Мы готовы возобновить подписку."
 extreme_frontiers.1531.d.reply: "«Замечательно! Как только мы получим административный сбор в 3000 §Yэнергокредитов§!, мы оформим все документы и забудем этот инцидент»."
 extreme_frontiers.1531.e: "Мы не покупали это устройство."
 extreme_frontiers.1531.e.reply: "«Значит, вы признаёте кражу? Это упрощает дело. Наши протоколы защиты от краж весьма... смертоносны. Рекомендуем ознакомиться с нашими погребальными услугами — они вам скоро пригодятся»."
 extreme_frontiers.1531.f: "Заплатить сбор"
 extreme_frontiers.1531.f.reply: "«Благодарим за продление лицензии на Георадиационную матрицу MKIII. Надеемся, она принесёт вам столько же пользы, сколько нам — прибыли».\n\nПосле оплаты дрон исчезает в глубинах галактики."
 extreme_frontiers.1531.g: "Это грабёж. К бою."
 extreme_frontiers.1531.h: "Скатертью дорога."
 extreme_frontiers.1531.i: "Приготовиться к битве."
 extreme_frontiers.1534.title: "Дрон $NAME_Geocorp$"
 extreme_frontiers.1534.desc: "Когда битва в системе §Y[fromfrom.solar_system.GetName]§! подходит к концу, на экранах появляется новое сообщение от дрона:\n\n«Мы приняли к сведению ваш отказ соблюдать условия лицензионного соглашения. Учитывая ваше подавляющее военное превосходство, мы отзываем свои права на нашу интеллектуальную собственность — Георадиационную матрицу MKIII. Желаем приятного пользования вашей новой технологией».\n\nДрон взрывается, разрывая канал связи."
 extreme_frontiers.1534.a: "Скатертью дорога."
 extreme_frontiers.1535.title: "Условия изменены"
 extreme_frontiers.1535.desc: "После нейтрализации дронов службы поддержки мы можем возобновить обратную разработку Георадиационной матрицы."
 extreme_frontiers.1535.a: "Продолжить изучение устройства."
 GEORADIATION_ANALYSIS_PROJECT_CONTINUED: "$GEORADIATION_ANALYSIS_PROJECT$"
 GEORADIATION_ANALYSIS_PROJECT_CONTINUED_DESC: "$GEORADIATION_ANALYSIS_PROJECT_DESC$"
 extreme_frontiers.1540.title: "Неактивированное устройство"
 extreme_frontiers.1540.desc.industrialist: "Стремясь добиться максимальной эффективности, мы завершили обратную разработку Георадиационной матрицы MKIII, усовершенствовав методы её работы для резкого увеличения прибыли."
 extreme_frontiers.1540.desc.default: "После тщательного изучения мы успешно провели обратную разработку Георадиационной матрицы MKIII, раскрыв её потенциал и улучшив некоторые параметры."
 extreme_frontiers.1540.desc.common: "Интеграция радиоактивной молекулярной дестабилизации в наше терраформирующее оборудование позволит стимулировать рост ценных ресурсов."
 extreme_frontiers.1540.a: "Отличные новости."
 tech_georadiation_terraforming: "Георадиационное терраформирование"
 tech_georadiation_terraforming_desc: "Подвергая биосферу планеты молекулярному радиационному распаду, мы можем ускорить рост определённых ресурсов, превращая этот мир в токсичную пустошь."
 tech_georadiation_terraforming_tt: "Открывает §Yпланетарное решение§! §H$decision_toxify_world$§!"
 extreme_frontiers.1545.title: "Устройство уничтожено"
 extreme_frontiers.1545.desc: "Мы успешно демонтировали устройство на [from.GetPlanetMoon]е §Y[from.GetName]§!, сохранив полезные материалы для дальнейшего использования.\n\nПоскольку устройства больше нет, а его остальные копии не подлежат восстановлению, секреты этой опасной технологии навсегда утеряны для галактики."
 extreme_frontiers.1545.a.default: "Скатертью дорога."
