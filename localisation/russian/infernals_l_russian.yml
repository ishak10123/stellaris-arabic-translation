l_russian:
 INFERNALS_TITLE: "Infernals Species Pack" # Do not translate
 vo_infernal_voice: "Термофил"
 # Traits
 trait_pc_volcanic_preference: "Предпочтение вулканических миров"
 trait_pc_volcanic_preference_short: "Вулканические"
 trait_pc_volcanic_preference_desc: "$trait_pc_savannah_preference_desc$"
 trait_volcanic_planet_preference: "$trait_pc_volcanic_preference$" #robotic
 trait_volcanic_planet_preference_desc: "$trait_dry_planet_preference_desc$" #robotic
 trait_infernal: "Термофил"
 trait_infernal_plural: "Термофилы"
 trait_infernal_desc: "Эта раса развила ткани из металлических сплавов, чтобы расти и процветать на раскаленных планетах, где обычные органические формы жизни попросту сгорели бы. Эти сплавленные клетки медленнее разрушаются и реже обновляются, что отдаляет наступление возрастных заболеваний. Однако они также обладают высокой теплопроводностью, что создает угрозу для здоровья существа в более холодном климате."
 TRAIT_INFERNAL_EFFECT: "Затраты £alloys£ §Yсплавов§! на содержание каждых 100 £pop£ поселений: §R+$@living_standard_alloys_normal$§!$TABBED_NEW_LINE$• Приспособленность к вулканическим мирам: §G+20%§! $TABBED_NEW_LINE$• Минимальная пригодность §Hвулканических§! миров: §Y+50%§! $TABBED_NEW_LINE$• Пригодность §Yхолодных§! миров: §R−30%§! $TABBED_NEW_LINE$• Продолжительность жизни лидера: §G+10 лет§!"
 trait_unbreakable_resolve: "Несгибаемая решимость"
 trait_unbreakable_resolve_desc: "Эти существа, ведомые сложной паутиной зеркальных нейронов, обладают врожденной способностью к синхронизации воли. Долг для них — не бремя, а общая цель, а лишения они встречают непоколебимым единством."
 trait_unbreakable_resolve_tooltip: "Каждые $pop_group_unit$ £pop£ §Hпоселений§! с этим признаком на планете дают §G+0,2§! к £stability£ стабильности (макс.: §G+15§!) \n- §RПоселения в статусе рабов или ниже не учитываются.§!"
 trait_shell_slag: "Живая окалина"
 trait_shell_slag_desc: "Благодаря сложному симбиозу с £sr_living_metal£ §Yживым металлом§! эта раса растет не традиционным способом, а путем наращивания и самосборки биометаллических структур."
 trait_shell_slag_tooltip: "Каждые $pop_group_unit$ £pop£ §Hпоселений§! с этим признаком в статусе рабов или выше производят §G$@shell_slag_trait_resource_production|3$§! ед. £sr_living_metal£ §Yживого металла§! в месяц."
 trait_robot_assembly_slag: "Сборочная окалина"
 trait_robot_assembly_slag_desc: "В результате сложной интеграции с £sr_living_metal£ §Yживым металлом§! эта машинная раса расширяется не за счет обычного строительства, а посредством наращивания и самосборки автометаллических каркасов."
 trait_pyroclastic: "Управление пирокластикой"
 trait_pyroclastic_desc: "Закаленные неистовством вулканических миров, эти существа не страшатся пирокластических сил — они повелевают ими и направляют их, превращая опустошение в источник жизненной силы и могущества."
 trait_pyroclastic_tooltip: "$MOD_LOGISTIC_GROWTH_MULT$ на вулканических мирах: §G+10%§!"
 trait_crucible_community: "Тигельное единство"
 trait_crucible_community_desc: "Закаленная невзгодами и объединенная общей борьбой, эта раса сплавилась в единое целое. Ее коллективная воля — основа мироустройства, где каждый отдельный индивид является неотделимым звеном в цепи единства."
 trait_crucible_community_tooltip: "Каждые $pop_group_unit$ £pop£ §Hпоселений§! с этим признаком на планете дают §G+0,25§! к §Yфонду указов§!"
 trait_ductile: "Пластичность"
 trait_ductile_desc: "§LВ силу генетических изменений представители этой расы выращивают сплавы с возможностью повторного использования.§!\n"
 # Volcanic World
 pc_volcanic: "Вулканический мир"
 pc_volcanic_plural: "Вулканические миры"
 pc_volcanic_desc: "Каменистый мир с богатой серой атмосферой и частично расплавленной литосферой. Поверхность, покрытая пеплом и базальтом, испещрена участками активного вулканизма, лавовыми озерами и реками. Здесь выживают только экстремофилы, и то не всегда."
 mod_pc_volcanic_habitability: "Приспособленность к вулканическим мирам"
 mod_pc_volcanic_max_districts_add: "Максимум районов ($pc_volcanic$)"
 concept_pc_volcanic: "$pc_volcanic$"
 concept_pc_volcanic_desc: "- $mod_planet_jobs_alloys_produces_mult$: §G+5%§! \n\n§L$pc_volcanic_desc$§!"
 district_geothermal: "Геотермальная электростанция"
 district_geothermal_plural: "Геотермальные электростанции"
 district_geothermal_desc: "Использует необузданный жар недр, чтобы снабжать колонию энергией."
 district_melting: "Проводник магмы"
 district_melting_plural: "Проводники магмы"
 district_melting_desc: "Система электромагнитных сепараторов извлекает ценные минералы из магматических потоков планеты."
 district_melting_uncapped: "$district_melting$"
 district_melting_uncapped_plural: "$district_melting_plural$"
 district_melting_uncapped_desc: "$district_melting_desc$"
 mod_district_melting_max: "Макс. $district_melting_plural$"
 district_polytechnic: "Термотехнический форум"
 district_polytechnic_plural: "Термотехнические форумы"
 district_polytechnic_desc: "Этот центр междисциплинарного сотрудничества и просвещения помогает колонии обуздать геологическую активность планеты."
 mod_district_polytechnic_max_add: "Максимум термотехнических форумов"
 thermotechnic_default: "Вспомогательные центры"
 thermotechnic_hive: "Синаптические скопления"
 thermotechnic_machine: "Вспомогательные узлы"
 melt_extractor: "$job_melt_extractor$"
 job_melt_extractor: "Термоплавильщик"
 job_melt_extractor_plural: "Термоплавильщики"
 job_melt_extractor_desc: "Этот рабочий, привыкший к экстремальным температурам, специализируется на создании полезных сплавов из разных минералов."
 mod_job_melt_extractor_add: "Должности термоплавильщиков"
 job_melt_extractor_effect: "£job_miner£ $job_melt_extractor_plural$ производят £minerals£ §Y$minerals$§!"
 melt_extractor_drone: "$job_melt_extractor_drone$"
 job_melt_extractor_drone: "Термоплавильная единица"
 job_melt_extractor_drone_plural: "Термоплавильные единицы"
 job_melt_extractor_drone_desc: "Эта единица, созданная для работы в условиях экстремальных температур, предназначена для производства полезных сплавов из разных минералов."
 mod_job_melt_extractor_drone_add: "Должности термоплавильных единиц"
 job_melt_extraction_drone_effect: "£job_mining_drone£ $job_melt_extractor_drone_plural$ производят £minerals£ §Y$minerals$§!"
 job_polytechnic_mentor: "Термотехнический наставник"
 job_polytechnic_mentor_plural: "Термотехнические наставники"
 job_polytechnic_mentor_desc: "Обладая разносторонними навыками, этот наставник помогает устранять разрывы между дисциплинами, повышая эффективность узкопрофильных работников."
 mod_job_polytechnic_mentor_add: "Должности термотехнических наставников"
 job_polytechnic_mentor_effect: "£job_polytechnic_mentor£ $job_polytechnic_mentor_plural$ изменяются за счет других должностей. \n\n$job_polytechnic_job_tt$"
 concept_polytechnic_mentor: "$job_polytechnic_mentor_plural$"
 concept_polytechnic_mentor_desc: "Производятся дополнительные ресурсы за каждые $pop_group_unit$ £pop£ §Hпоселений§!\n(лимит: §Y4000§! £job£ должностей в каждой категории):\n- £job_miner£ ['concept_planet_miners']: §G+$@polytechnic_output$§! £unity£ $unity$\n- £job_technician£ ['concept_planet_technician']: §G+$@polytechnic_output$§! £physics_research£ $physics_research$\n- £job_foundry£ ['concept_planet_metallurgists']: §G+$@polytechnic_output$§! £engineering_research£ $engineering_research$\n- £job_artisan£ ['concept_planet_artisans']: §G+$@polytechnic_output$§! £society_research£ $society_research$"
 job_polytechnic_job_tt: "$concept_polytechnic_mentor_desc$"
 job_polytechnic_drone: "Пирокластическая единица"
 job_polytechnic_drone_plural: "Пирокластические единицы"
 job_polytechnic_drone_desc: "Обладая разносторонними навыками, эта единица помогает устранять разрывы между дисциплинами, повышая эффективность узкопрофильных работников."
 mod_job_polytechnic_drone_add: "Должности пирокластических единиц"
 job_polytechnic_drone_effect: "£job_polytechnic_drone£ $job_polytechnic_drone_plural$ изменяются за счет других должностей. \n\n$job_polytechnic_job_tt$"
 concept_polytechnic_drone: "$job_polytechnic_drone_plural$"
 concept_polytechnic_drone_desc: "$concept_polytechnic_mentor_desc$"
 # Origin - Red Giant
 origin_red_giant: "Красный гигант"
 origin_red_giant_desc: "Эта цивилизация стоит на перепутье: красный гигант в сердце их системы раскаляет планету, грозя испепелить всё живое.\n\nСмогут ли они адаптироваться, пока не найдена и не устранена причина изменений? Или же пойдут навстречу жару, использовав эти странные и, возможно, неестественные перемены себе во благо?"
 origin_tooltip_red_giant_effects: "- $HOMEWORLD$ ['concept_pc_volcanic'] (размер: £planetsize£ 20)"
 START_SCREEN_RED_GIANT: "Мы познавали истину медленно, пока в один миг она не обрушилась на нас.\n\nНаша звезда вступает в фазу стремительных и аномальных изменений. Ее энерговыделение превысило все расчетные показатели. Смещение спектра указывает на хаотичные конвекционные потоки, а скорость термоядерного синтеза растет без соответствующей потери массы.\n\nДо сих пор мы эволюционировали в унисон с этим потеплением. Но у биологической эволюции есть предел.\n\nЕсли изменения внутри звезды [capital_star.GetName&nom] продолжатся, мир, который мы называем домом, сгорит дотла. Сейчас вопрос не в том, случится ли это, а в том — когда это случится."
 red_giant_start_NAME: "Система красного гиганта"
 red_giant_start_DESC: "Это гарантированная стартовая система для государств с происхождением §Y$origin_red_giant$§!."
 tech_starfire_cannon: "$starfire_cannon$"
 tech_starfire_cannon_desc: "Как и любую потенциальную угрозу, опасное излучение, порожденное преображением нашей звезды, можно обуздать и превратить в полезный инструмент. Если сформировать его в виде энергетического луча, мы сможем перегревать и выводить из строя корабли противника.\n\nОткрывается планетарное решение, позволяющее построить на орбите §Yпушку звездного огня§!."
 SOLARFLARE_EMITTER: "Излучатель солнечной вспышки"
 SOLARFLARE_EMITTER_DESC: "Мощный энергетический луч, способный пробить даже самую крепкую защиту и вывести из строя уязвимые корабельные системы."
 starfire_cannon_cap: "$starfire_cannon$"
 starfire_cannon: "Пушка звездного огня"
 starfire_cannon_plural: "Пушки звездного огня"
 NAME_Starfire_Cannon: "$starfire_cannon$"
 starfire_cannon_key: "Ядро пушки звездного огня"
 sfe_on_hit_stun_tt: "§YОтключает§! цель на §G5§! дней, снижая ее скорость, скорострельность и прочность щитов.\n\n$ION_CANNON_FLEET_EFFECT$"
 sfe_weapon_stun_effect: "§RПовреждения от пушки звездного огня§!"
 sfe_weapon_stun_effect_desc: "   " # not visible
 decision_starfire_cannon: "Построить пушку звездного огня"
 decision_starfire_cannon_desc: "Это орбитальное орудие, имитирующее интенсивное излучение быстро стареющего красного гиганта, испускает сверхгорячий ионизирующий луч, который не только наносит прямые повреждения, но и выжигает корабельные компоненты, приводя их в негодность."
 decision_starfire_cannon_effects: "Создает на орбите планеты §Yпушку звездного огня§! — дальнобойное орудие, способное выводить из строя системы нескольких кораблей одновременно."
 decision_starfire_cannon_limit: "$TRIGGER_FAIL$Максимум в системе: §Y3§!"
 # Origin - Cosmic Dawn
 origin_cosmic_dawn: "Заря мироздания"
 origin_cosmic_dawn_desc: "Эта цивилизация не строилась сама — ее выпустили на свободу. Их криокапсулы открылись, и они пробудились в мире, изменившемся до неузнаваемости. Но не всё потеряно. Их прошлое, рассеянное под слоями пыли и руин по всей галактике, всё еще ждет, когда его откроют вновь."
 origin_tooltip_cosmic_dawn_effects: "- $HOMEWORLD$ $TABBED_NEW_LINE$- ['concept_pc_volcanic'] (размер: £planetsize£ 14) $TABBED_NEW_LINE$- ['concept_inf_cd_deposit']: +5\n- Начать с инцидентом: §HГлубокие раскопки§!"
 origin_tooltip_cosmic_dawn_negatives: "- $INITIAL_POPS$ §R−600§!"
 START_SCREEN_COSMIC_DAWN: "Мы пробудились, лишь смутно осознавая, что вообще погружались в сон. Даже сейчас самые важные свидетельства о былой эпохе исходят не из наших воспоминаний, а от сложных механизмов, что хранили нас в стазисе.\n\nБесчисленные капсулы, гигантские системы теплообмена, котлы, что перемешивали расплавленную породу. Кроме того, на стенах были высечены подсказки о нашем происхождении: флотилии кораблей, покидающие остывающие миры в поисках тепла среди звезд. В поисках ответов мы покинули эту подземную «колыбель». На поверхности мира §Y[owner.Capital.GetName]§! мы обнаружили полезные технологии и ресурсы. Мы также нашли следы других объектов, укрытых под землей. В некоторых покоятся спящие, которых мы, быть может, примем как сородичей.\n\nА что же звезды? Есть ли там те, что до сих пор не пробудились? Если да, то, быть может, они помогут нам ответить на самый жгучий вопрос: кто мы?"
 cosmic_dawn_start_NAME: "Новый дом"
 cosmic_dawn_start_DESC: "Это гарантированная стартовая система для государств с происхождением §Y$origin_cosmic_dawn$§!."
 concept_inf_cd_deposit: "$d_stasis_pods$"
 concept_inf_cd_deposit_desc: "Производит: £society_research£ 3.0\nПри расчистке: \n$d_stasis_pods_tt$ \n\n§L$d_stasis_pods_desc$§!"
 cosmic_dawn_districtsize: "$MOD_PLANET_MAX_DISTRICTS_ADD$: §G+1§!"
 cosmic_dawn_districtsize2: "$MOD_PLANET_MAX_DISTRICTS_ADD$: §G+2§!\n   $d_cd_ancient_tunnels$ §G+2§!"
 cosmic_dawn_tunnel_foundry: "$foundry_jobs_bonus_workforce_mult$ за каждые $d_cd_ancient_tunnels$: §G+1%§!"
 cosmic_dawn_tunnel_bureaucrat: "$bureaucrat_jobs_bonus_workforce_mult$ за каждые $d_cd_ancient_tunnels$: §G+1%§!"
 cosmic_dawn_tunnel_researcher: "$researcher_jobs_bonus_workforce_mult$ за каждые $d_cd_ancient_tunnels$: §G+1%§!"
 cosmic_dawn_tunnel_worker: "$mod_pop_cat_worker_bonus_workforce_mult$ за каждые $d_cd_ancient_tunnels$: §G+1%§!"
 d_stasis_pods: "£blocker£ Древние криокапсулы"
 d_stasis_pods_desc: "Эти криокапсулы — древние устройства, оставленные нашими потерянными сородичами; они используют передовые криогенные технологии для поддержания индивидов в состоянии анабиоза. С помощью подходящих технологий мы сможем пробудить их."
 d_stasis_pods_tt: "[GetStasisPodOwner]"
 d_stasis_pods_tt_inf: "- Появится §G100§! £pop£ поселений\n- $MOD_PLANET_MAX_DISTRICTS_ADD$: §G+1§!"
 d_stasis_pods_tt_other: "- £society_research£ §Y$society_research$§!: §G+350§!\n- $MOD_PLANET_MAX_DISTRICTS_ADD$: §G+1§!"
 d_cd_ancient_tunnels: "Древние тоннели"
 d_cd_ancient_tunnels_desc: "Когда-то эти тоннели служили вместилищем для криокапсул; теперь в этих пустых, но обширных пространствах наш народ может начать новую жизнь."
 d_galvanic_living_metal: "Отложения живого металла"
 d_galvanic_living_metal_desc: "На этой планете есть природные залежи £sr_living_metal£ §Yживого металла§!. Расы планеты эволюционировали в постоянном контакте с этим удивительным веществом, что повлияло на их биологическое и научное развитие."
 # Civic - Scorched World Heralds
 civic_scorched_earth: "Вестники выжженных миров"
 civic_scorched_earth_desc: "Жар пронизывает каждую грань культуры этого общества — от традиций и ритуалов до технологий. Они видят себя подлинными властителями галактики, считая более слабые расы лишь помехами на пути к идеальной вселенной, пригодной только для термофилов."
 civic_scorched_earth_effects: "- Нельзя вступать в §Yдипломатические отношения§! с какими-либо расами, кроме §Yтермофилов§!.\n- Недоступен §Yгалактический рынок§!.\n- Есть повод к войне §Y$casus_belli_cb_blaze$§! против других рас.\n- За использование тактики бомбардировки §Y$bombardment_firestorm$§! дается £unity£ §Yединство§!.\n- Тактика бомбардировки §Y$bombardment_seismic_bombing$§! создает особые препятствия на планетах.\n- Не ['trait:trait_infernal', термофильные] расы могут быть только §Yрабами§! или ниже."
 SCORCHED_HERALDS_ONLY_INF: "$TRIGGER_FAIL$§Y$civic_scorched_earth$§! допускают в своем обществе только ['trait:trait_infernal', термофильные] £pop£ поселения."
 civic_hive_scorched_earth: "Одержимость пламенем"
 civic_hive_scorched_earth_desc: "Наши выжженные миры — это вершина планетарной эволюции. Мы спалим всю галактику и будем процветать в этом пламени!"
 # Civic - World Forgers
 civic_world_forgers: "Кователи планет"
 civic_world_forgers_desc: "Это общество процветает в среде активного вулканизма и готово создавать ее искусственно, если природа оказывается недостаточно щедра."
 civic_world_forgers_effects: "- Доступна стартовая планета: ['concept_pc_volcanic']. \n- $GUARANTEED_RESEARCH_OPTION_STRING$ £society_research£ ['concept_volcanic_forge']. \n- Можно построить £building£ §Yвулканическую кузню§!, которая дает £job_polytechnic_mentor£ ['concept_polytechnic_mentor', термотехнических наставников]. \n- Планеты с £building£ §Yвулканической кузней§! постепенно превращаются в §Yвулканические миры§!. \n- ['concept_guaranteed_colonies'] будут мирами с §Yсухим§! климатом."
