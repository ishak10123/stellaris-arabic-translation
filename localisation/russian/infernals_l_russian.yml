 # Civic - Galvanic Empire
 civic_galvanic_empire: "Гальваническое государство"
 civic_galvanic_symbiosis: "Гальванический синтез"
 civic_galvanic_symbiosis_desc: "§RВНИМАНИЕ: будет недоступно ['concept_synthetic_ascension', синтетическое преображение].§!\n\nЭто общество освоило преобразование обычных сплавов в £sr_living_metal£ §Yживой металл§!, напрямую интегрируя его прочность и полиморфные свойства в свои технологии."
 civic_galvanic_symbiosis_effects: "$civic_galvanic_tt$ \n- $civic_galvanic_job_tt$"
 civic_corporate_galvanic_symbiosis: "Биометаллический картель"
 civic_corporate_galvanic_symbiosis_desc: "$civic_galvanic_symbiosis_desc$"
 civic_corporate_galvanic_symbiosis_effects: "$civic_galvanic_tt$ \n- $civic_galvanic_job_tt$ \n- Можно строить офис корпорации £building£ §YКлиники улучшения живым металлом§!."
 civic_hive_galvanic_symbiosis: "Гальванический симбиоз"
 civic_hive_galvanic_symbiosis_desc: "$civic_galvanic_symbiosis_desc$"
 civic_hive_galvanic_symbiosis_effects: "$civic_galvanic_tt$ \n- $civic_galvanic_job_hive_tt$"
 civic_machine_galvanic_symbiosis: "Гальваническое переоснащение"
 civic_machine_galvanic_symbiosis_desc: "Эти модули оснащены самовосстанавливающимися корпусами из особых сплавов. Благодаря им искусственному интеллекту становятся доступны достоинства живых тел."
 civic_machine_galvanic_symbiosis_effects: "$civic_galvanic_tt$ \n• $civic_galvanic_job_hive_tt$"
 civic_galvanic_tt: "• В начале игры изучена технология £engineering_research£ ['technology:tech_mine_living_metal', добычи живого металла]. \n• В родном мире есть ['concept_d_galvanic_living_metal', отложения живого металла].\n• Доступны особые указы: $TABBED_NEW_LINE$• ['concept_inf_lm_cs_edict'] $TABBED_NEW_LINE$• ['concept_inf_lm_mgc_edict'] \n• Доступны компоненты из £sr_living_metal£ §Yживого металла§!: $TABBED_NEW_LINE$• ['concept_inf_lm_armor'] $TABBED_NEW_LINE$• ['concept_inf_lm_weapon']\n• Доступно планетарное решение: §Y$decision_living_metal_distribution$§!. \n• Можно нанимать особые армии: §Y$lm_imbued_army$§!."
 civic_galvanic_job_tt: "В системах с §Yрасплавленными мирами§! можно строить £building£ ['concept_offworld_expedition_hub', космические экспедиционные центры], которые дают должности ['concept_offworld_prospector', космических старателей]."
 civic_galvanic_job_hive_tt: "В системах с §Yрасплавленными мирами§! можно строить £building£ ['concept_offworld_expedition_hub', космические экспедиционные центры], которые дают должности ['concept_offworld_prospector', космических старательских единиц]."
 concept_d_galvanic_living_metal: "$d_galvanic_living_metal$"
 concept_d_galvanic_living_metal_desc: "$d_galvanic_living_metal_desc$ \n$TABBED_NEW_LINE$- Производит £sr_living_metal£ §Yживой металл§!: §G+1§!"
 lm_imbued_army: "Мимикрирующие ударные силы"
 seq_lm_imbued_army: "$ORD$-е мимикрирующие ударные силы"
 lm_imbued_army_desc: "Эта армия, вооруженная передовыми разработками в области £sr_living_metal£ §Yживого металла§!, способна к быстрым метаморфозам для решения любых боевых задач."
 concept_inf_lm_armor: "$INF_Regen$ броня"
 concept_inf_lm_armor_desc: "Бонусы за каждый компонент брони:\n• $mod_weapon_type_energy_weapon_fire_rate_mult$: §G+2%§! \n• $MOD_SHIP_HULL_REGEN_ADD_PERC$: §G+1%§! \n• $MOD_SHIP_ARMOR_REGEN_ADD_PERC$: §G+1%§! \n\nДобавляются §Yрегенерирующие§! варианты обычных компонентов брони для кораблей. Вместо £alloys£ §Yсплавов§! они требуют £sr_living_metal£ §Yживой металл§!. \n\nВ их число входят открытые компоненты от следующих £engineering_research£ технологий: $TABBED_NEW_LINE$• ['technology:tech_ship_armor_1'] $TABBED_NEW_LINE$• ['technology:tech_ship_armor_2'] $TABBED_NEW_LINE$• ['technology:tech_ship_armor_3'] $TABBED_NEW_LINE$• ['technology:tech_ship_armor_4'] $TABBED_NEW_LINE$• ['technology:tech_ship_armor_5']"
 INF_Regen: "Регенерирующая"
 LM_ARMOR_1: "$ARMOR_1$ — $INF_Regen$"
 LM_ARMOR_1_DESC: "Эта броня из £sr_living_metal£ §Yживого металла§!, выкованная в цехах верфей, способна восстанавливать первоначальную форму после получения серьезных повреждений."
 LM_ARMOR_2: "$ARMOR_2$ — $INF_Regen$"
 LM_ARMOR_2_DESC: "Утолщение слоя £sr_living_metal£ §Yживого металла§! повышает как его базовую прочность, так и площадь поверхности, доступную для регенерации."
 LM_ARMOR_3: "$ARMOR_3$ — $INF_Regen$"
 LM_ARMOR_3_DESC: "Композитные добавки, увеличивающие предел прочности £sr_living_metal£ §Yживого металла§!, делают эту броню более крепкой и устойчивой к повреждениям."
 LM_ARMOR_4: "$ARMOR_4$ — $INF_Regen$"
 LM_ARMOR_4_DESC: "Технологии высокоэнергетического затвердевания позволяют придать этой регенерирующей броне из £sr_living_metal£ §Yживого металла§! более совершенную структурную целостность, чем у предыдущих моделей."
 LM_ARMOR_5: "$ARMOR_5$ — $INF_Regen$"
 LM_ARMOR_5_DESC: "Достижения в науке о £sr_living_metal£ §Yживом металле§! делают эту броню настолько прочной и быстро восстанавливающейся, насколько это позволяют законы физики."
