 job_fire_seer_plural: "Огненные пророки"
 job_fire_seer_desc: "Разрушительный хаос огня всё же оставляет следы в виде угля и пепла, которые может прочесть искусный провидец. Эти тайные прозрения находят применение как в ритуалах, так и в управлении."
