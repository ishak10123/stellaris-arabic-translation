 blazing_harbinger: "$job_blazing_harbinger$"
 job_blazing_harbinger_plural: "Пылающие предвестники"
 job_blazing_harbinger_desc: "Почитаемые и как провидцы, и как правители, эти предвестники объединяют в себе веру и власть. В зареве священного огня они ведут государство к величию, начертанному судьбой."
 mod_job_blazing_harbinger_add: "Должности пылающих предвестников"
