 # Blockers
 d_seismic_bombing_crater: "£blocker£ Вулканический кратер"
 d_seismic_bombing_crater_desc: "Из-за сейсмической ковровой бомбардировки в этом регионе открылся разлом и начались активные извержения."
 d_large_volcano: "£blocker£ Большой вулкан"
 d_large_volcano_desc: "$d_active_volcano_desc$"
 d_ash_storms: "£blocker£ Пепельные бури"
 d_ash_storms_desc: "Этот регион окутан облаками удушающего пепла."
 d_charged_atmosphere: "£blocker£ Заряженная атмосфера"
 d_charged_atmosphere_desc: "Воздух в этом регионе искрится опасными и стимулирующими разрядами."
 d_lava_flooding: "£blocker£ Сезонные разливы лавы"
 d_lava_flooding_desc: "Для этого региона характерны сезонные разливы обжигающей лавы."
 d_toxic_atmosphere: "£blocker£ Токсичная атмосфера"
 d_toxic_atmosphere_desc: "Атмосфера в этом регионе едва пригодна для дыхания, так что выживают здесь лишь сильнейшие."
 d_raging_lavafalls: "£blocker£ Бушующие лавопады"
 d_raging_lavafalls_desc: "Эти огненные каскады низвергающейся лавы создают завораживающий пейзаж."
 d_rugged_landscape: "£blocker£ Суровые земли"
 d_rugged_landscape_desc: "Обширная территория, опустошенная непрекращающейся тектонической активностью и извергающимися вулканами."
 # Planet Modifiers
 volcanic_critters: "Экстремофильные формы жизни"
 volcanic_critters_desc: "Даже в мире палящего зноя и смертоносной лавы может существовать жизнь."
 volcanic_mineral_rich: "$mineral_rich$"
 volcanic_mineral_rich_desc: "$mineral_rich_desc$"
 volcanic_ultra_rich: "$ultra_rich$"
 volcanic_ultra_rich_desc: "$ultra_rich_desc$"
 volcanic_mineral_poor: "$mineral_poor$"
 volcanic_mineral_poor_desc: "$mineral_poor_desc$"
 volcanic_subterranean: "$subterranean_wildlife$"
 volcanic_subterranean_desc: "$subterranean_wildlife_desc$"
 volcanic_asteroid_impacts: "$asteroid_impacts$"
 volcanic_asteroid_impacts_desc: "$asteroid_impacts_desc$"
 volcanic_asteroid_belt: "$asteroid_belt$"
 volcanic_asteroid_belt_desc: "$asteroid_belt_desc$"
 volcanic_crystal_lake: "Кристальное озеро"
 volcanic_crystal_lake_desc: "Огромные кристаллы, источающие тепло и мягкое свечение, медленно поднимаются из этого лавового озера."
 volcanic_hollow_planet: "Полая планета"
 volcanic_hollow_planet_desc: "Под поверхностью скрываются необъятные пещеры — безмолвные отголоски мира, сформированного огнем."
 volcanic_lavafall: "Лавопады"
 volcanic_lavafall_desc: "Потоки лавы, свободно стекающие по крутым уступам, создают захватывающую огненную феерию."
 volcanic_oasis: "Адский оазис"
 volcanic_oasis_desc: "Небольшой зеленый континент, защищенный от бушующего вокруг ада высоким горным хребтом. Его уникальная флора и фауна разительно контрастируют с опустошением, царящим по ту сторону гор."
 fractalized_entropy_category: "Фрактальная энтропия"
 fractalized_entropy_category_desc: "Сенсоры засекли странный объект, дрейфующий в поясе астероидов. Его происхождение неизвестно, но курс стабилен, а значит, можно будет попытаться перехватить объект и обследовать."
 infernals.3205.name: "Фрактальная энтропия"
 infernals.3205.desc: "[Leader.GetName] [Leader.GetAXX::сообщил|||fem:сообщила] об обнаружении жесткой угловатой конструкции на стабильной орбите вокруг звезды. Объект состоит из неизвестного материала и усыпан многочисленными гранями, напоминающими кристаллические структуры. Композиционному анализу он не поддается. Объект сохранял фиксированную ориентацию, был постоянно обращен к своей звезде и противостоял всем попыткам манипуляции или вращения.\n\nВ ходе контролируемого эксперимента исследовательский корабль подверг объект воздействию сконцентрированного энергетического импульса. Конструкция аккуратно раскололась на две симметричные половины, каждая из которых преобразовалась в уменьшенную копию оригинала. Последующие импульсы привели к идентичному результату: делению, репликации и последовательной миниатюризации.\n\nВ конечном счете на орбите образовалось стабильное разреженное облако из миниатюрных конструкций. Каждый фрагмент сохранил точную ориентацию и геометрию исходника, а рой в целом воспроизводит силуэт изначальной структуры.\n\nУ этого феномена нет абсолютно никаких известных аналогов или объяснений. Вся собранная телеметрия отправлена в архив для дальнейшего анализа."
 infernals.3205.a: "Сохранить фрагменты для дальнейшего наблюдения."
 # Archaeological Sites
 from_the_ashes_site: "Пепелище"
 from_the_ashes_site_desc: "Поверхность мира [Planet.GetName] обжигающе горяча и враждебна для биологической жизни, однако [GetScientistPlural] обратили внимание на снимки явно искусственных руин. Археологическое изучение может пролить свет на то, кто здесь был и что с ними случилось."
 infernals.2700.name: "Забытая империя"
 infernals.2700.desc: "Изначально руины в мире [From.Planet.GetName] казались каменными, но раскопки и анализ показали, что многие сооружения в этом затерянном городе состоят из окаменелого органического материала, сравнимого с древесиной. Сегодня ничего подобного на планете нет. Мелкие артефакты изготовлены из грубых металлов, стекла и схожих окаменелых органических материалов. Кроме того, [GetScientistPlural] нашли окаменевшие останки местных существ, которые давно вымерли.\n\nПохоже, эта цивилизация населяла планету, когда климат был гораздо более умеренным. Исчезли ли они задолго до того, как планета приняла нынешний облик, или же застали изменения в последние годы своего существования?"
 infernals.2705.name: "Свидетели гибели"
 infernals.2705.desc: "Во время раскопок городских руин в мире [From.Planet.GetName] были обнаружены места культурного значения, украшенные замысловатыми узорами, возможно, представляющими собой образцы письменности. Что самое захватывающее, археологические команды нашли подземное хранилище, заполненное стеллажами с тонкими бронзовыми пластинами, покрытыми плотными рядами символов. Несмотря на неэффективность бронзы как носителя информации, по-видимому, можно сказать, что в помещении находился общий архив текстов.\n\nМы приступили к переводу, пока археологические команды продолжают исследовать город. Вопрос о судьбе этого народа остается открытым."
 infernals.2710.name: "Близящийся рок"
 infernals.2710.desc: "Команда в мире [From.Planet.GetName] обнаружила мрачные катакомбы. Они представляют собой сеть вырытых траншей, в стенах которых покоятся мумифицированные останки инопланетян, уложенные в три-четыре ряда. Погребальные дары позволяют нам оценить уровень их технологического развития: примитивные огнестрельные орудия, простые стеклянные телескопы, ткани с замысловатой вышивкой.\n\nМногие развилки в катакомбах охраняются статуями вымершей местной фауны. У этих существ круглый куполообразный панцирь, четыре коротких конечности и небольшая голова. Хорошо сохранившиеся экземпляры изображены пригнувшимися, они словно используют панцири для защиты от резных изображений пламени над ними.\n\nИстинное значение этих изображений, возможно, навсегда утеряно, но они могут отражать осознание обществом своей неминуемой судьбы. Дальнейшие раскопки, возможно, прояснят, что именно они ощущали."
 infernals.2715.name: "Огненная погибель"
 infernals.2715.desc: "Всестороннее исследование городских руин в мире [From.Planet.GetName] доказывает, что эта цивилизация пережила коллапс экосистемы и знала, что вот-вот встретит свой конец в огне. Видимо, существовали какие-то бумажные записи, но потом горячий вулканический пепел вынудил их перейти на бронзовые пластины. Художественные изображения животных, прячущихся от пламени, фиксируют попытки цивилизации осмыслить собственный конец.\n\nВо время раскопок был найден практически идеальный экземпляр статуи — хранителя катакомб. Вырезанные над ним языки пламени светятся изнутри, что делает эту находку поразительным произведением, достойным сохранения.\n\nМы также нашли свидетельства попыток остановить вулканическую активность. Дороги и разбитые повозки демонстрируют, что жители свозили обломки пород в ближайшую вулканическую кальдеру и сбрасывали их туда, пытаясь заткнуть вулкан. К сожалению, они не смогли обмануть судьбу. Сегодня на этой планете нет многоклеточной жизни.\n\nЭта история напоминает нам о хрупкости любой цивилизации перед лицом угроз, превосходящих ее возможности."
 infernals.2715.a: "Печальный конец."
 infernals.2715.b: "Мы должны учесть их ошибки."
 inferno_temple_site: "Храм Преисподней"
 inferno_temple_site_desc: "Вдали от населенных центров планеты [Planet.GetName], среди цепи активных вулканических гор, лежат руины древнего заброшенного храма. Понимание его истории может подарить новые знания о культуре обитателей этой планеты."
 infernals.2720.name: "Древние знаки"
 infernals.2720.desc: "Храм испещрен следами битвы, а в земле обнаружены древние останки представителей местной разумной расы. Похоже, храм подожгли и покинули. Группы безопасности отметили, что местные жители избегают этих мест, считая их проклятыми.\n\nСтены огненного храма защитили его внутреннее убранство, включая множество замысловатых фресок и резных изображений. На них повсеместно встречается круг из извивающегося пламени с темным разрывом в центре. На одном из изображений двуногая фигура вырывает один из четырех подобных глаз и низвергает его на мир, создавая этот центральный символ. Мы обозначили его как Око Преисподней.\n\nДальнейшие раскопки покажут, какие верования окружали эту странную фигуру."
 infernals.2725.name: "Подношения глаз"
 infernals.2725.desc: "Раскопки в храме Ока Преисподней выявили свидетельства многочисленных жертвоприношений. Были обнаружены огромные круглые ямы с платформами в центре, имитирующие Око и его зрачок и заполненные слоями пепла и угля. Молекулярный анализ показывает, что пепел и уголь образовались из животных тканей.\n\nНельзя сказать наверняка, были ли эти жертвы дикими или домашними животными. Это могли быть даже сами местные жители.\n\nПока наши археологи ищут новые подсказки, мы направили агентов в ныне существующие населенные пункты для сбора дополнительной информации."
 infernals.2725.a: "Эту загадку непременно нужно разгадать!"
 infernals.2725.b: "Направить единицы для разрешения этой загадки."
 infernals.2730.name: "Мрачные ритуалы"
 infernals.2730.desc: "Мы обнаружили массивный каменный проем, преграждавший путь в самую глубокую часть храма. Пробравшись внутрь, исследователи оказались в круглом зале с жертвенной ямой в центре, ведущей прямо к природному подземному резервуару магмы. Оранжевый свет расплавленной породы заливал стены багровым сиянием, слабо освещая надписи, опоясывавшие загадочное помещение. Вся верхняя часть стен по периметру усеяна вереницей ярких, пылающих глаз.\n\nНа краю этой ямы, на алтаре в форме Ока Преисподней, лежат иссохшие останки одного из местных жителей. Похоже, они действительно приносили в жертву себе подобных, пытаясь умилостивить его.\n\nТекст на стенах может быть ключом к пониманию культурной роли этого храма — нужно немедленно заняться его переводом."
 infernals.2735.name: "Судорожные пророчества"
 infernals.2735.desc: "Полностью изучив писания из внутреннего святилища храма мы смогли прочесть серию пророчеств, связанных с возвращением Ока Преисподней. В них говорится, что Око воспылает гневом на непокорных подданных. Оно затмит небеса, заставит священную гору извергнуться огнем, иссушит на корню посевы и прочее. Пророчество описывает это как конец света, утверждая, что после этих событий выживут лишь те, кто покорится Оку Преисподней.\n\nНаши агенты среди местного населения искали культурные параллели и выяснили, что этот пророческий текст породил многие афоризмы и устойчивые выражения в культуре планеты и стал первоисточником для более поздних мифов и сказаний. Они также полагают, что таинства, практикуемые в современных храмах, включают вариации этого древнего пророчества и попытки предотвратить его исполнение.\n\nС нашими технологиями мы легко можем воплотить в жизнь предсказанные события или как минимум сымитировать их так реалистично, чтобы местные не заметили подвоха. Если мы представимся воплощением Ока Преисподней и докажем, что пророчество было верным, мы сможем добиться от них всевозможных даров и вассальной клятвы. Это облегчит их поглощение в долгосрочной перспективе."
 infernals.2735.a: "Воплотить пророчества."
 infernals.2735.a.tt: "Примитивное общество мира §Y[From.Planet.GetName]§! примет наши государственные принципы."
 infernals.2735.a.fail: "Не выбрана политика §Yневмешательства§!."
 infernals.2735.b: "Не вмешиваться."
 infernals.2735.c: "Их история утрачена навсегда."
 infernal_figurine: "Инфернальная статуэтка"
 infernal_figurine_desc_short: "Крепкое существо с куполообразным панцирем и четырьмя короткими лапами замерло в защитной позе под стилизованным пламенем"
 infernal_figurine_desc_details: "Огонь выточен из неизвестного минерала, светящегося багровым светом. Этот артефакт был извлечен из катакомб исчезнувшего общества и, возможно, символизировал их тщетную надежду пережить неминуемую гибель своей биосферы в вулканическом огне."
 # Misc
 INF_SCUM: "Миры будут гореть..." # Negative option to NOT joining the GalCom
 requires_recipient_not_scorched_earth: "$TRIGGER_FAIL$§R§Y$civic_scorched_earth$§! вступают в дипломатические отношения только с §Yтермофилами§!!§!"
 requires_actor_not_scorched_earth: "$TRIGGER_FAIL$§RБудучи §Yвестниками выжженных миров§!, мы готовы говорить только с §Yтермофилами§!; прочие — лишь топливо для нашего огня!§!"
 infernals.35.name: "Всепоглощающее пламя"
 infernals.35.desc: "Поверхность планеты §H[from.GetName]§! разверзлась, ее кора треснула, и из недр хлынул испепеляющий жар. Преображение было стремительным и тотальным: горы рухнули, океаны вскипели, а небо затянуло пеплом.\n\nОт некогда процветавшей биосферы планеты не осталось и следа. Теперь лишь экстремофильные формы жизни могут называть это место домом."
