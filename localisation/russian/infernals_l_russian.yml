 civic_world_forgers_gestalt_effects: "- Доступна стартовая планета: ['concept_pc_volcanic']. \n- $GUARANTEED_RESEARCH_OPTION_STRING$ £society_research£ ['concept_volcanic_forge']. \n- Можно построить £building£ §Yвулканическую кузню§!, которая дает £job_polytechnic_drone£ ['concept_polytechnic_drone', пирокластические единицы]. \n- Планеты с £building£ §Yвулканической кузней§! постепенно превращаются в §Yвулканические миры§!. \n- ['concept_guaranteed_colonies'] будут мирами с §Yсухим§! климатом."
 civic_machine_world_forgers: "Термальные оптимизаторы"
 civic_machine_world_forgers_desc: "$civic_world_forgers_desc$"
 tech_volcanic_forge: "Вулканическая кузня"
 tech_volcanic_forge_desc: "Этот комплекс, развернутый на планете, постепенно преобразует ее в вулканический рай, попутно обнажая полезные ресурсы. Термоплавильщики могут ускорить это преобразование."
 concept_volcanic_forge: "$tech_volcanic_forge$"
 concept_volcanic_forge_desc: "$building_volcanic_forge_basic$ \n\n- Ежемесячный прогресс: §G+0,1§! \n- Ежемесячный прогресс за каждые §Y100§! £job_miner£ шахтеров: §G+0,05§! \n- Ежемесячный прогресс за каждые §Y100§! £job_foundry£ металлургов: §G+0,05§!"
 building_volcanic_forge_1: "$tech_volcanic_forge$"
 building_volcanic_forge_1_desc: "Этот промышленный комплекс, созданный для бурения глубоких скважин в планетарной коре, вызывает вулканическую активность по всему миру, тем самым терраформируя любые биомы в пылающие просторы."
 building_volcanic_forge_2: "Вулканическая литейная"
 building_volcanic_forge_2_desc: "$building_volcanic_forge_1_desc$"
 building_volcanic_forge_1_effect: "\n$building_volcanic_forge_basic$ \n$volcanic_forge_1_monthly$ \n\nПрогресс от всех £job_miner£ шахтерских должностей: §G+[root.GetMinerVar1]§! \nПрогресс от всех £job_foundry£ металлургических должностей: §G+[root.GetForgerVar1]§!"
 building_volcanic_forge_2_effect: "\n$building_volcanic_forge_basic$ \n$volcanic_forge_2_monthly$ \n\nПрогресс от всех £job_miner£ шахтерских должностей: §G+[root.GetMinerVar2]§! \nПрогресс от всех £job_foundry£ металлургических должностей: §G+[root.GetForgerVar2]§!"
 building_volcanic_forge_basic: "Превращает планету в §Hвулканический мир§!."
 volcanic_forge_1_monthly: "- Должности £job_polytechnic_mentor£ ['concept_polytechnic_mentor', термотехнических наставников]: §G+200§!\n- Ежемесячный прогресс: §G+0,1§! \n- Ежемесячный прогресс за каждые §Y100§! £job_miner£ шахтерских должностей: §G+0,05§! \n- Ежемесячный прогресс за каждые §Y100§! £job_foundry£ металлургических должностей: §G+0,05§!"
 volcanic_forge_2_monthly: "- Должности ['concept_polytechnic_mentor', термотехнических наставников]£job_polytechnic_mentor£: §G+400§!\n- Ежемесячный прогресс: §G+0,2§! \n- Ежемесячный прогресс за каждые §Y100§! £job_miner£ шахтерских должностей: §G+0,1§! \n- Ежемесячный прогресс за каждые §Y100§! £job_foundry£ металлургических должностей: §G+0,1§!"
 # Civic - Fire Cult
 civic_pyrolatry: "Культ огня"
 civic_pyrolatry_desc: "Закаленное столетиями суровых невзгод, это общество верит, что выживание достигается единством, а единство — выживанием. Лишь пылающая огнем борьба может сплотить их настолько, чтобы они смогли выстоять в холодной и безразличной галактике."
 civic_pyrolatry_effects: "- В мирах с низкой пригодностью повышается производство £unity£ §Yединства§! (до §G500%§!).\n- Вскоре после начала игры появляется фракция ['concept_fire_cult', Культа огня].\n- £job_priest£ §Y$job_priest_plural$§! заменяются на £job_fire_dancer£ ['concept_inf_fire_dancers', огненных танцоров].\n- В мирах с пригодностью ниже §R50%§! £job_politician£ §Y$job_politician_plural$§! заменяются на £job_fire_oracle£ ['concept_inf_fire_oracles', огненных оракулов].\n- В мирах с пригодностью ниже §R20%§! можно нанимать армии §Yтлеющего легиона§!.\n- Доступно планетарное решение §Y$decision_blazing_scourge$§!, которое создает £blocker£ ['concept_dec_blazing_scourge', препятствия пылающей чумы].\n- Хорошо сочетается с гражданскими моделями «$civic_superstitious_beliefs$», «$civic_exalted_priesthood$», «$civic_death_cult$», «$civic_aristocratic_elite$» и «$civic_merchant_guilds$»."
 # Job
 concept_inf_fire_dancer: "$job_fire_dancer$"
 concept_inf_fire_dancers: "$job_fire_dancer_plural$"
 concept_inf_fire_dancer_desc: "$job_fire_dancer_effect_desc$ \n\n§L$job_fire_dancer_desc$§!"
 job_fire_dancer: "Огненный танцор"
 fire_dancer: "$job_fire_dancer$"
 job_fire_dancer_plural: "Огненные танцоры"
 job_fire_dancer_desc: "Выносливые повелители пламени, огненные танцоры исполняют обжигающие обряды, которые сплачивают общество благоговейным трепетом и общей страстью."
 mod_job_fire_dancer_add: "Должности огненных танцоров"
 job_fire_dancer_effect_desc: "£job_fire_dancer£ $job_fire_dancer_plural$ превращают £consumer_goods£ §Yтовары массового спроса§! в £unity£ §Yединство§!, £mod_planet_amenities_add£ §Yблага§! и £mod_planet_stability_add£ §Yстабильность§!"
 concept_inf_cremator: "$job_cremator$"
 concept_inf_cremators: "$job_cremator_plural$"
 concept_inf_cremator_desc: "$job_cremator_effect_desc$ \n\n§L$job_cremator_desc$§!"
 job_cremator: "Крематор"
 cremator: "$job_cremator$"
 job_cremator_plural: "Крематоры"
 job_cremator_desc: "Крематоры совершают священный обряд очищения огнем, проводя усопших через пламя к их заключительной мистерии. Почитаемые как хранители этого благоговейного перехода, они служат на границе смерти и вознесения."
 mod_job_cremator_add: "Должности крематоров"
 job_cremator_effect_desc: "£job_fire_dancer£ $job_cremator_plural$ превращают £consumer_goods£ §Yтовары массового спроса§! в £unity£ §Yединство§!, £mod_planet_amenities_add£ §Yблага§! и £mod_planet_stability_add£ §Yстабильность§!"
