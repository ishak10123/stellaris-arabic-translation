 job_ashbroker: "Пеплоторговец"
 ashbroker: "$job_ashbroker$"
 job_ashbroker_plural: "Пеплоторговцы"
 job_ashbroker_desc: "Пеплоторговцы процветают там, где всё поглощает огонь. Эти стяжатели погибели искусно обращают разрушения в возможности, а пепел — в активы."
