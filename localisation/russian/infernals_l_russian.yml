 BIO_LM_ARMOR_NAME: "Феррокориум"
 BIO_LM_ARMOR_1: "Нанокомпозитный феррокориум"
 BIO_LM_ARMOR_1_DESC: "На корпусе корабля нарастают мощные защитные пластины, способные полностью регенерировать после повреждений."
 BIO_LM_ARMOR_2: "Керамохитиновый феррокориум"
 BIO_LM_ARMOR_2_DESC: "Ускоренный метаболизм £sr_living_metal£ §Yживого металла§! повысил способности этого покрова к регенерации."
 BIO_LM_ARMOR_3: "$BIO_LM_ARMOR_NAME$ из пластистали"
 BIO_LM_ARMOR_3_DESC: "Самоподдерживающаяся структура феррокориума дополнительно увеличивает защитную эффективность брони."
 BIO_LM_ARMOR_4: "$BIO_LM_ARMOR_NAME$ из дюрастали"
 BIO_LM_ARMOR_4_DESC: "Дифференциация тканей вокруг феррокориумного слоя позволяет специализировать их для защиты и регенерации, повышая эффективность и того, и другого."
 BIO_LM_ARMOR_5: "Нейтрониевый феррокориум"
 BIO_LM_ARMOR_5_DESC: "Передовые биологические композиты на основе £sr_living_metal£ §Yживого металла§! делают эту броню самой мощной из всех, что можно вырастить."
