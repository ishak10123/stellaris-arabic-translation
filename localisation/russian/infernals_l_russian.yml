 concept_offworld_prospector_drone: "$job_offworld_prospector_drone$"
 concept_offworld_prospector_drone_desc: "$job_offworld_prospector_drone_tt$"
 job_offworld_prospector: "Космический старатель"
 job_offworld_prospector_plural: "Космические старатели"
 job_offworld_prospector_desc: "Предприимчивые старатели отправляются в космос в поисках £volatile_motes£ §Yлетучей пыли§! и £sr_living_metal£ §Yживого металла§! на расплавленных мирах."
 mod_job_offworld_prospector_add: "Должности космических старателей"
 job_offworld_prospector_drone: "Космическая старательская единица"
 job_offworld_prospector_drone_plural: "Космические старательские единицы"
 job_offworld_prospector_drone_desc: "Единицы дальнего действия отправляются в ближайшие расплавленные миры для поиска и добычи £volatile_motes£ §Yлетучей пыли§! и £sr_living_metal£ §Yживого металла§!."
 mod_job_offworld_prospector_drone_add: "Должности космических старательских единиц"
 # Councilors
 councilor_infernal_scorcher: "Верховный выжигатель"
 councilor_infernal_scorcher_desc: "$TITLE$ разжигает боевой дух вооруженных сил, поддерживая их настрой во время военных операций."
 councilor_thermal_engineer: "Термоинженер"
 councilor_thermal_engineer_desc: "$TITLE$ решает технические задачи, возникающие при возведении инфраструктуры в условиях экстремально высоких температур."
 councilor_corporate_thermal_engineer: "Главный термоинженер"
 councilor_corporate_thermal_engineer_desc: "$TITLE$ за соответствующее вознаграждение решает технические задачи, возникающие при возведении инфраструктуры в условиях экстремально высоких температур."
 councilor_pyromanic_priest: "Пламенный жрец"
 councilor_pyromanic_priest_desc: "$TITLE$ прививает любовь к лишениям, сокращая избыточное потребление."
 councilor_imbuement_officer: "Специалист по миметикам"
 councilor_imbuement_officer_desc: "$TITLE$ использует свои познания в динамике твердых тел для содействия исследованиям в области физики и инженерии."
 councilor_synth_imbuement_officer: "Миметический мейнфрейм"
 councilor_synth_imbuement_officer_desc: "$TITLE$ использует свои познания в динамике твердых тел для содействия исследованиям в области физики и инженерии."
 councilor_corporate_imbuement_officer: "Глава миметического агентства"
 councilor_corporate_imbuement_officer_desc: "$TITLE$ координирует взаимодействие между заинтересованными сторонами для поддержки исследований в области физики и инженерии."
 # Bombardment Stances
 bombardment_firestorm: "Огненная буря"
 bombardment_firestorm_desc: "Бомбардировка по тактике «Огненная буря» поджигает участки планеты, превращая ее в величественный костер, который укрепляет нашу решимость и сплачивает общество."
 bombardment_seismic_bombing: "Сейсмическая ковровая бомбардировка"
 bombardment_seismic_bombing_desc: "Сейсмическая ковровая бомбардировка нацелена на геологию планеты. Она уничтожает инфраструктуру и разрывает планетарную кору, что приводит к возникновению мощных вулканов."
 # Policies
 orbital_bombardment_devastation: "Опустошение"
 orbital_bombardment_devastation_name: "Опустошение"
 orbital_bombardment_devastation_desc: "Позволяет использовать все виды орбитального оружия с особым стремлением к полному опустошению планеты.\n\n§EМожно использовать тактику орбитальной бомбардировки «Опустошение».§!"
 diplo_stance_devastators: "Опустошители"
 diplo_stance_devastators_desc: "Это государство стремится полностью опустошить чужие миры."
 # Opinion Modifiers
 triggered_infernals_opinion_of_others: "Не термофилы"
 triggered_infernals_opinion_of_infernals: "Такие же термофилы"
 # Casus Belli & War Goal
 casus_belli_cb_blaze: "Очищение огнем"
 war_goal_wg_blaze: "Опустошение"
 war_goal_wg_blaze_desc: "Война ведется, чтобы очистить галактику огнем. Сопротивление лишь приближает неизбежное."
 # Personalities
 personality_scorching_infernals: "Пылающие опустошители"
 personality_scorching_infernals_desc: "$personality_scorching_infernals$ считают чужие миры идеальным местом для своих катастрофических огненных ритуалов. Местное население для них — лишь незначительная помеха."
 # Melting District Deposits
 d_volcanic_ore_veins: "Вулканические рудные жилы"
 d_volcanic_ore_veins_desc: "Застывшие вулканические жилы представляют собой богатый источник руд."
 d_volcanic_rich_mountain: "Вулканические богатые горы"
 d_volcanic_rich_mountain_desc: "$d_rich_mountain_desc$"
 d_volcanic_mineral_fields: "Вулканические минеральные поля"
 d_volcanic_mineral_fields_desc: "$d_mineral_fields_desc$"
 d_volcanic_ore_caverns: "Вулканические богатые рудой пещеры"
 d_volcanic_ore_caverns_desc: "$d_ore_rich_caverns_desc$"
 d_volcanic_mineral_layers: "Вулканические залежи минералов"
 d_volcanic_mineral_layers_desc: "Древняя геологическая активность оставила после себя этот богатый слой минералов, погребенный глубоко под поверхностью."
 d_volcanic_weak_crust: "Слабые участки коры"
 d_volcanic_weak_crust_desc: "Нижние тектонические плиты были ослаблены предыдущими извержениями, что значительно облегчает бурение к богатым минералами жилам."
 d_volcanic_mineral_hills: "Богатые рудой холмы"
 d_volcanic_mineral_hills_desc: "Легкое мерцание, заметное издалека, выдает богатство рудных залежей, скрытых прямо под этими холмами."
 d_volcanic_lava_river: "Лавовые реки"
 d_volcanic_lava_river_desc: "Теплое красноватое сияние свободно текущей магмы озаряет берега этих лавовых рек."
 # Thermotechnic District Deposits
 d_volcanic_stable_plateaus: "Стабильные плато"
 d_volcanic_stable_plateaus_desc: "Эти плато геологически стабильны в отличие от окружающих территорий."
 d_volcanic_tranquil_flatlands: "Безмятежные равнины"
 d_volcanic_tranquil_flatlands_desc: "Эти пологие равнины почти не затронуты общепланетным хаосом."
 d_volcanic_intraplate: "Устойчивая внутренняя область"
 d_volcanic_intraplate_desc: "Этот регион защищен от геологических катастроф, поскольку находится вдали от границ тектонических плит."
 d_volcanic_basalt_plains: "Базальтовые равнины"
 d_volcanic_basalt_plains_desc: "Сверкающее плато из затвердевшего базальта, испещренное трещинами и кратерами из-за вулканической активности, имевшей место в прошлом."
 d_volcanic_sulfur_lava: "Сернистая лава"
 d_volcanic_sulfur_lava_desc: "Этот постоянный лавовый поток выделяет в воздух своеобразную смесь химических веществ."
 d_volcanic_dried_lavariver: "Высохшее лавовое русло"
 d_volcanic_dried_lavariver_desc: "Древняя лавовая река давно остыла, оставив после себя лишь обугленную полосу, прорезающую ландшафт."
 d_volcanic_tunnels: "Изолированные тоннели"
 d_volcanic_tunnels_desc: "Длинные тоннели пронизывают гору, их стенки обожжены и сглажены древними потоками магмы."
 # Misc Deposits
 d_volcanic_fumarole: "Фумаролы"
 d_volcanic_fumarole_desc: "Эти зияющие жерла извергают горячие экзотические газы из глубин планеты." # an opening in or near a volcano, through which hot sulphurous gases emerge
 d_volcanic_stifling_atmosphere: "Удушающая атмосфера"
 d_volcanic_stifling_atmosphere_desc: "Вулканический пепел затянул всю планету, погрузив мир в удушающие пепельные сумерки."
 d_andisol_soil: "Андосолевая долина"
 d_andisol_soil_desc: "Темная, богатая питательными веществами почва, образовавшаяся из вулканического пепла, предоставляет редкую возможность для выращивания сельскохозяйственных культур."
 d_red_giant_unstable: "£energy£ §Y+5§!" # star deposit
 d_red_giant_unstable_desc: "$d_red_giant_dm$"
 d_red_giant_dm: "£sr_dark_matter£ §Y+8§!" # star deposit
