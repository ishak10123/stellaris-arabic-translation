 concept_inf_lm_cs_edict_desc: "- $r_alloys$ от металлургов: §R−0,5§!\n- $r_living_metal$ от металлургов: §G+1§!$TABBED_NEW_LINE$ \n$TABBED_NEW_LINE$"
