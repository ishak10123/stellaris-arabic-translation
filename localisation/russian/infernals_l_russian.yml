 job_blazewright_plural: "Мастера пламени"
 job_blazewright_desc: "Умение читать тайные знаки в ритуальном пепле и обращаться к воле сокровенных огней судьбы помогает политику в работе."
 mod_job_blazewright_add: "Должности мастеров пламени"
