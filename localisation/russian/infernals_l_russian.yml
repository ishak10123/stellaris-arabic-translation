 edict_centrifugal_siphoning: "Центрифужное выкачивание"
 edict_centrifugal_siphoning_desc: "Мощные центрифуги разделяют жидкие сплавы для их последующей рекомпозиции в £sr_living_metal£ §Yживой металл§!."
 edict_modular_growth_compounds: "Модульные составы для роста"
 edict_modular_growth_compounds_desc: "Молекулярное применение £sr_living_metal£ §Yживого металла§! позволяет создавать эффективные модульные соединения, стимулирующие рост."
 concept_inf_lm_weapon: "$LM_ACCELERATOR$"
 concept_inf_lm_weapon_desc: "Усиленный вариант §Yкинетической артиллерии§!, в производстве которой вместо £alloys£ §Yсплавов§! используется £sr_living_metal£ §Yживой металл§!. \n\nОткрывается после изучения £engineering_research£ ['technology:tech_kinetic_artillery_2', кинетической артиллерии]."
 LM_ACCELERATOR_SET: "$LM_ACCELERATOR$"
 LM_ACCELERATOR_SET_DESC: "Орудие из £sr_living_metal£ §Yживого металла§!, которое может восстанавливаться от износа и перестраивать свою структуру для оптимизации физических свойств, что позволяет использовать более мощные боеприпасы."
 LM_ACCELERATOR: "Пластичный ускоритель снарядов"
 LM_BIO_ACCELERATOR_SET: "$LM_ACCELERATOR$"
 LM_BIO_ACCELERATOR_SET_DESC: "$LM_ACCELERATOR_SET_DESC$"
 LM_BIO_ACCELERATOR: "$LM_ACCELERATOR$"
 building_living_metal_clinic: "Клиника улучшения живым металлом"
 building_living_metal_clinic_desc: "В этой клинике населению продают усиливающий состав на основе £sr_living_metal£ §Yживого металла§!, что приносит доход и полезные побочные продукты."
 concept_offworld_expedition_hub: "$building_offworld_expedition_hub$"
 concept_offworld_expedition_hub_desc: "§L$building_offworld_expedition_hub_desc$§!"
 building_offworld_expedition_hub: "Космический экспедиционный центр"
 building_offworld_expedition_hub_desc: "Этот центр координирует работу частных экспедиций на ближайшие расплавленные миры, где предприимчивые старатели могут раздобыть ценную £volatile_motes£ §Yлетучую пыль§! и £sr_living_metal£ §Yживой металл§!."
 offworld_molten_world_req: "$TRIGGER_FAIL$ §RВ системе должен быть §Yрасплавленный мир§!.§!"
 job_offworld_prospector_tt: "£job_offworld_prospector£ $job_offworld_prospector_plural$ превращают £energy£ §Yэнергокредиты§! в £sr_living_metal£ §Yживой металл§! и £volatile_motes£ §Yлетучую пыль§!"
 job_offworld_prospector_drone_tt: "£job_offworld_prospector_drone£ $job_offworld_prospector_drone_plural$ превращают £energy£ §Yэнергокредиты§! в £sr_living_metal£ §Yживой металл§! и £volatile_motes£ §Yлетучую пыль§!"
