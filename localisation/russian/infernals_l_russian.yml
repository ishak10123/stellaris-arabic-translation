 job_radiant_priest_plural: "Сияющие жрецы"
 job_radiant_priest_desc: "Дабы пламя веры никогда не угасало, правящее жречество этого общества воплощает в себе ослепительный свет священного огня, освещая путь своим последователям и очищая общество от скверны."
 mod_job_radiant_priest_add: "Должности сияющих жрецов"
