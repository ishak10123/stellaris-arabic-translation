 pyrocrat: "$job_pyrocrat$"
 job_pyrocrat_plural: "Пирократы"
 job_pyrocrat_desc: "Укоренившаяся элита, чья яркость определяет лицо государства. Пирократы правят как живые воплощения пламени, поддерживаемые трудом тех, кто подбрасывает топливо в огонь их славы."
 mod_job_pyrocrat_add: "Должности пирократов"
 job_pyrocrat_effect_desc: "£job_pyrocrat£ $job_pyrocrat_plural$ заменяют £job_politician£ политиков в мирах с пригодностью ниже §R50%§!. Они превращают £consumer_goods£ §Yтовары массового спроса§! в £unity£ §Yединство§! и £mod_planet_amenities_add£ §Yблага§!."
 concept_inf_ashbroker: "$job_ashbroker$"
