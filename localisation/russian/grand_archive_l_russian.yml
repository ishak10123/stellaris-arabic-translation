 sm_voidlure: "Пустотная приманка"
 sm_voidlure_desc: "Пустотные приманки посылают в открытый космос сигналы, привлекающие обитателей межзвездного пространства."
 sm_voidlure_desc_know_fauna: "Пустотные приманки посылают в открытый космос сигналы, со временем приманивающие определенные разновидности космической фауны. Каждую приманку надо размещать в системе той разновидности, которую предпочитает приманиваемое существо. Попавшиеся на приманку существа становятся покорными на один год."
