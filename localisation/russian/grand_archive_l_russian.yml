 HUGE_PREYING_MAW_DESC: "Иногда проглатывает огромные вражеские корабли."
 HUNT_CUTHOLOID_ATTACK_PROJECT: "Уничтожить кутхолоида в системе [solar_system.GetName]"
 HUNT_CUTHOLOID_ATTACK_PROJECT_DESC: "Если мы уничтожим этого кутхолоида, нашим кораблям больше не придется опасаться засад."
 HUNT_CUTHOLOID_CAPTURE_PROJECT: "Захватить кутхолоида в системе [solar_system.GetName]"
 HUNT_CUTHOLOID_CAPTURE_PROJECT_DESC: "Этот кутхолоид поджидает добычу — очередной космический корабль. Нам представилась прекрасная возможность захватить и изучить его."
 leader_trait_cutholoid_victim: "Жертва кутхолоида"
 leader_trait_cutholoid_victim_desc: "Этот лидер некоторое время провел внутри пищеварительной системы космического существа — кутхолоида и потерял часть своего тела, но взамен приобрел уникальные знания о молекулярной биологии."
