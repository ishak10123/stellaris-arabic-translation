 grand_archive.10010.name: "Проект мутации космических амеб завершен"
 grand_archive.10010.desc: "Наш экспериментальный проект мутации §Yкосмических амеб§! завершен, и благодаря ему мы получили интересные новые органеллы: мобильные §Y«$tech_unique_mutation_space_amoeba$»§!.\n\nЭти симбиотические организмы способны вытягивать энергию из ближайших объектов и возвращаться к хозяину, повышая его выживаемость и ускоряя регенерацию."
 grand_archive.10015.name: "Проект мутации тиянки завершен"
 grand_archive.10015.desc: "Наш экспериментальный проект мутации §Yтиянки§! завершен, и благодаря ему мы получили интересное улучшение: §Y«$tech_unique_mutation_tiyanki$»§!.\n\nМы усилили естественные вибрации этих существ, которые они используют для общения внутри стада, до максимально возможного уровня. В результате получается управляемое поле, которое укрепляет ткани всех ближайших существ."
 grand_archive.10020.name: "Проект мутации пустотных червей завершен"
 grand_archive.10020.desc: "Наш экспериментальный проект мутации §Yпустотных червей§! завершен, и благодаря ему мы получили интересную вариацию их репродуктивного цикла: §Y«$tech_unique_mutation_voidworm$»§!.\n\nНам удалось повысить фертильность паразитических пузырей, которыми эти существа осыпают планеты со своими гнездами. Благодаря этому стало появляться больше куколок."
 grand_archive.10025.name: "Проект мутации кутхолоидов завершен"
 grand_archive.10025.desc: "Наш экспериментальный проект мутации §Yкутхолоидов§! завершен, и благодаря ему мы получили интересные результаты: §Y«$tech_unique_mutation_cutholoid$»§!.\n\nМы нашли способ приспособить их обширную пищеварительную систему для стрельбы высокоскоростными дальнобойными снарядами. К сожалению, столь радикальные биологические изменения не позволят им поглощать вражеские корабли."
 grand_archive.10030.name: "Проект мутации кристаллических организмов завершен"
 grand_archive.10030.desc: "Наш экспериментальный проект мутации §Yкристаллических организмов§! завершен, и благодаря ему мы получили интересные результаты: §Y«$tech_unique_mutation_crystalline_entity$»§!.\n\nЭта модификация кристаллических генов позволит существам в случае серьезных травм разделяться на два независимых организма, что должно значительно повысить их боевой потенциал."
 grand_archive.10030.a: "$FASCINATING$"
 leviathan_unique_mutation_project_unlock_name: "Проект мутации: [FromFromFrom.GetShipSizeName]"
 leviathan_unique_mutation_project_unlock_desc: "Мы завладели генетическим материалом существа, встреченного в системе [FromFrom.solar_system.GetName].\n\n[FromFromFrom.GetShipSizeName] вряд ли поддастся клонированию — мы пока не понимаем, возможно ли вообще это сделать — однако, изучив биологические особенности этого создания, мы можем получить ценные результаты."
 grand_archive.10055.name: "$leviathan_unique_mutation_project_unlock_name$"
 grand_archive.10055.desc: "$leviathan_unique_mutation_project_unlock_desc$"
 grand_archive.10060.name: "Проект мутации матриарха завершен"
 grand_archive.10060.desc: "Наш экспериментальный проект мутации с использованием генетического материала матриарха тиянки завершен, и благодаря ему мы получили интересные результаты: §H«$restorative_enzymes$»§!.\n\nВосстановительные ферменты в генетическом материале матриарха могут производиться в подобных железах других существ. Так их основные ткани превратятся в восстанавливающий материал, который может быть полезен при взрывах в плотных формированиях."
 grand_archive.10075.name: "$leviathan_unique_mutation_project_unlock_name$"
 grand_archive.10075.desc: "$leviathan_unique_mutation_project_unlock_desc$"
 grand_archive.10080.name: "Проект мутации порождения пустоты завершен"
 grand_archive.10080.desc: "Наш экспериментальный проект мутации с использованием генетического материала порождения пустоты завершен, и благодаря ему мы совершили интересное открытие: §H«$starborne_biology$»§!.\n\nТкани этих существ очень чувствительны к свету звезд, и мы можем провоцировать их рост в других организмах. При небольших затратах энергии это значительно ускорит рост рядом со звездами."
