 #################
 leader_trait_buccaneer: "Буканьер"
 leader_trait_buccaneer_desc: "Настоящий мастер утилизации обломков. В руках этого лидера даже самые безнадежные развалины обретают ценность."
 leader_trait_trailblazer: "Первопроходец"
 leader_trait_trailblazer_desc: "Этот лидер очарован космическими просторами и всем, что они сулят, а потому надеется составить карту самых дальних рубежей."
 leader_trait_treasure_hoarder: "Собиратель сокровищ"
 leader_trait_treasure_hoarder_desc: "Даже самая богатая добыча не способна удовлетворить стремления этого лидера, для которого нет задачи важнее, чем накопление ценных ресурсов."
 mod_enemy_ship_destroyed_energy_add: "$r_energy$ в зависимости от размера уничтоженного вражеского корабля"
 mod_deposit_increase_on_survey_chance_mult: "При завершении изучения:\n$t$Шанс увеличить объём залежей ресурса"
 ##########
 #Civics #
 ##########
 civic_galactic_curators: "Галактические кураторы"
 civic_galactic_curators_desc: "Эта цивилизация традиционно находит вдохновение в тщательном сборе и хранении исторических артефактов. Сегодня же, когда до тайн галактики можно дотянуться рукой, она стремится к новым знаниям."
 civic_galactic_curators_effects: "$civic_galactic_curators_effects_common$\n- $entertainers_are_curators_tt$"
 civic_corporate_galactic_curators: "Опыт в области древностей"
 civic_corporate_galactic_curators_desc: "Антиквариат и предметы коллекционирования сулят хорошие деньги. Это общество понимает столь простой факт лучше других. Теперь эти эксперты ищут возможности для капиталовложений среди звезд."
 civic_corporate_galactic_curators_effects: "$civic_galactic_curators_effects_common$\n- $entertainers_are_curators_tt$\n- £building£ §Y$building_public_relations_office$§!: этот $megacorp_civic_branch_office_building_effect$"
 civic_hive_galactic_curators: "Сеть смотрителей"
 civic_hive_galactic_curators_desc: "Развитию этого коллектива всегда сопутствовала одержимость к хранению и сбережению. Раньше такое поведение помогало им выживать, сегодня оно толкает их к выставлению напоказ всего, что им удается собрать."
 civic_hive_galactic_curators_effects: "$civic_galactic_curators_effects_common$"
 civic_machine_galactic_curators: "Сеть смотрителей"
 civic_machine_galactic_curators_desc: "Главная директива, заложенная в код этого машинного разума, — сбор и хранение."
 civic_machine_galactic_curators_effects: "$civic_galactic_curators_effects_common$"
 civic_galactic_curators_effects_common: "- $GUARANTEED_RESEARCH_OPTION_STRING$ ['technology:tech_galactic_archivism', £society_research£$tech_galactic_archivism$]\n- Изначальные ['concept_specimen', экземпляры]: по одному §0обычному§! из каждой категории коллекции \n- $r_unity$ при нахождении новых §Yэкземпляров§! или завершении §Yраскопок§! \n- Покупки у §Yанклава Кураторов§!: §G$@galactic_curators_curator_enclave_purchase_cost|%0$§!\n- Доступен указ §Y$edict_decentralized_research$§!, повышающий производительность §Yнаучных станций§!, но снижающий производительность должностей £job_researcher£ §Y«[GetResearcherPlural]»§!"
 edict_decentralized_research: "Децентрализованные исследования"
 edict_decentralized_research_desc: "Подлинное знание находится за пределами границ нашей цивилизации. Сосредоточив внимание на галактике целиком, мы сможем лучше понять самих себя."
 MOD_COUNTRY_SPECIMEN_ACQUIRE_CHANCE_MULT: "Повышенный шанс обнаружить экземпляры"
 councilor_galactic_curators: "Верховный куратор"
 councilor_galactic_curators_desc: "$TITLE$ отвечает за качество хранения всех экземпляров."
 councilor_corporate_galactic_curators: "Руководящий куратор"
 councilor_corporate_galactic_curators_desc: "$TITLE$ отвечает за экспозицию и продажу экземпляров."
 civic_beastmasters: "Повелители зверей"
 civic_beastmasters_desc: "Это общество достигло технологической зрелости в системе, где пасутся космические амебы, а потому прекрасно научилось понимать этих существ. Разведение и клонирование амеб, а также забота о них идут на пользу обеим сторонам сразу."
 civic_machine_beastmasters: "Биодроны"
 civic_machine_beastmasters_desc: "Этот машинный разум когда-то непосредственно взаимодействовал с космическими биоорганизмами в родной системе и со временем провел полную интеграцию этих могучих существ. Результатом стали полностью взаимовыгодные отношения."
 civic_hive_beastmasters: "Дикий рой"
 civic_hive_beastmasters_desc: "Этот коллективный разум представляет собой крайне легко приспосабливающуюся колонию. Он существует в симбиозе с космическими биоорганизмами из родной системы. Эти умы мыслят порознь, но преследуют единую цель."
 civic_wilderness_beastmasters: "$civic_hive_beastmasters$"
 civic_wilderness_beastmasters_desc: "Это дикое сознание открыто к симбиозу с космической фауной, населяющей его родную систему. И хотя интеграция с мутуалистическим сознанием еще не закончена, эти организмы все же совместно стремятся к единой цели."
 civic_corporate_beastmasters: "Космические скотоводы"
 civic_corporate_beastmasters_desc: "Эта мегакорпорация, бывшая когда-то элитной гильдией скотоводов, разработала технологию выращивания космических существ и ухода за ними прямо в родной системе."
 civic_beastmasters_common_effects_1: "$t$- $ADDITIONAL_TECHNOLOGIES_STRING$$TABBED_NEW_LINE$$t$- ['technology:tech_gravity_wells', £physics£$tech_gravity_wells$]$TABBED_NEW_LINE$$t$- ['technology:tech_alien_cloning', £society£$tech_alien_cloning$]$TABBED_NEW_LINE$$AVAILABLE_STARBASE_BUILDINGS$ ['concept_beastport', зверопорты]$TABBED_NEW_LINE$- В начале игры в родной системе присутствует ['concept_beastport', зверопорт]"
 civic_beastmasters_ships: "$t$- Стартовые §Yвоенные корабли§! заменяются на §Yкосмических амеб§!"
 civic_beastmasters_common_effects_2: "$t$- Стартовый £genetic_material£ ['concept_dna',генетический материал]:$TABBED_NEW_LINE$$t$- §0Обычная§! космическая амеба"
 civic_beastmasters_effects: "$civic_beastmasters_common_effects_1$\n$civic_beastmasters_ships$\n$civic_beastmasters_common_effects_2$"
 civic_corporate_beastmasters_effects: "$civic_beastmasters_common_effects_1$\n$civic_beastmasters_ships$\n$civic_beastmasters_common_effects_2$\n$t$- £building£ §Y$building_food_conglomerate$§! $megacorp_civic_branch_office_building_effect$"
