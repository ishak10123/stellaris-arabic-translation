 grand_archive.4515.desc.common_2: "Чтобы продолжить пополнять выставку, $grand_archive$ потребуется перестроить в другой системе."
 grand_archive.4515.stolen: "К сожалению, часть ценных экземпляров оказалась потеряна."
 grand_archive.4515.freed: "Несколько захваченных нами представителей космической фауны вырвались на свободу. Многие сейчас агрессивны и растеряны."
