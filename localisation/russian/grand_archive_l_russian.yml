 resolution_galactic_focus_crisis_voidworm_plague: "Приоритет: нашествие пустотных червей"
 resolution_galactic_focus_crisis_voidworm_plague_desc: "Пустотные черви — паразиты, угрожающие всей галактике. Если мы не объединимся, чтобы остановить их, о ни пожрут нас всех. Мы должны сделать борьбу с этим кризисом приоритетом галактики."
 resolution_galactic_focus_crisis_voidworm_plague_effect_success: "$resolution_galactic_focus_crisis_effect_success$"
 galactic_focus_crisis_voidworm_plague: "Одолеть нашествие пустотных червей"
 galactic_focus_crisis_voidworm_plague_desc: "Пустотные черви угрожают всей галактике. Мы должны объединиться и победить этих паразитов."
 gal_com_crisis_voidworm_pop_victims: "Пустотные черви нанесли значительный ущерб поселениям на своей территории."
