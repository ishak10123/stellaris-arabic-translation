 tech_thrusters_bio_integration: "Биоинтеграция двигателей"
 tech_thrusters_bio_integration_desc: "Искусственные двигатели можно интегрировать в тела космических организмов, если учесть соответствующие требования к энергии и связать их с нервно-двигательными центрами."
 tech_thrusters_bio_integration_effect: "§HСвойство:§! двигатели для космической фауны"
 tech_hyper_drive_bio_integration: "Биоинтеграция гипердвигателей"
 tech_hyper_drive_bio_integration_desc: "Путешествия по гиперкоридорам опасны для космических организмов, но мы можем расширить их возможности."
 tech_hyper_drive_bio_integration_effect: "§HСвойство:§! гипердвигатели для космической фауны"
 tech_sensors_bio_integration: "Биоинтеграция сенсоров"
 tech_sensors_bio_integration_desc: "За счет наших развитых технологий разнообразные органы чувств космической фауны можно улучшить с минимальным вредом для организма."
 tech_sensors_bio_integration_effect: "§HСвойство:§! сенсоры для космической фауны"
 tech_combat_computers_bio_integration: "Биоинтеграция военных компьютеров"
 tech_combat_computers_bio_integration_desc: "Мы можем разработать специализированные нейрочипы, влияющие на поведение космической фауны в масштабных столкновениях флотилий."
 tech_combat_computers_bio_integration_effect: "§HСвойство:§! боевые компьютеры для космической фауны"
