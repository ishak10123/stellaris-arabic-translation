 mod_job_treasure_gatherer_per_pop: "§G+1§! должность заведующего сокровищами за каждые $VALUE$ поселений"
 mod_job_treasure_gatherer_per_pop_short: "\n§G+1§! $job_treasure_gatherer$ для $VALUE$ £pop£"
 job_treasure_gatherer_gestalt: "Единица — заведующий сокровищами"
 job_treasure_gatherer_gestalt_plural: "Единицы — заведующие сокровищами"
 job_treasure_gatherer_gestalt_desc: "Эти деятели могут установить цену любому редкому и дорогому товару, а потому способны извлечь максимум пользы из сокровищ, найденных на просторах галактики."
