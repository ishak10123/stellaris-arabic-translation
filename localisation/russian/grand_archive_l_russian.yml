 r_preservation_chamber: "Камера сбережения"
 r_preservation_chamber_desc: "Сложное устройство, способное сжимать материю и впоследствии восстанавливать ее. Создавшая эту камеру цивилизация заточала внутри существ, которых невозможно было усмирить. Она давно перестала принимать новые команды, однако всё еще таит в себе множество секретов."
