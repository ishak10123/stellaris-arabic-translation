 further_fc_cutholoids_completed: "$further_fc_amoebas_completed$"
 grand_archive.3103.name: "$resolution_cutholoid_eradication$"
 grand_archive.3103.desc: "[global_event_country.GetGalCommunityOrGalImperium] постановляет, что отныне существование кутхолоидов в системах государств-участников запрещается.\n\nКаждого обнаруженного кутхолоида следует уничтожать. В противном случае [Root.GetName] будет считаться §Rнарушителем галактического закона§!."
 grand_archive.3105.name: "$cutholoids_plural$ в пространстве расы [this.GetSpeciesName]"
 grand_archive.3105.desc: "В системе [from.GetName] обнаружен кутхолоид. Поскольку эти существа были объявлены опасными вредителями, каждое государство, входящее в [global_event_country.GetGalCommunityOrGalImperium], обязано в кратчайшие сроки провести эвтаназию кутхолоидов на своей территории.\n\n[Root.GetName] будет считаться §Rнарушителем галактического закона§!, пока кутхолоиды не будут убиты или не покинут наше пространство иным образом."
 grand_archive.3107.desc: "Постоянное присутствие кутхолоидов в системе [invaded_system.GetName] — серьезное нарушение §Rгалактического закона§!, принятого резолюцией «$resolution_cutholoid_eradication$». Из-за этого [global_event_country.GetGalCommunityOrGalImperium] разрешает государствам-участникам голосовать за введение санкций против государства [Root.GetName]."
 grand_archive.3011.name: "Пропавший научный корабль"
 grand_archive.3011.desc: "Мы утратили связь с научным кораблем, изучающим загадочный астероид в системе [cutholoid_under_radar.solar_system.GetName].\n\nВ месте, где состоялся последний контакт, обнаружен слабый сигнал бедствия. Чтобы вернуть пропавший корабль, понадобится расследовать этот инцидент."
 grand_archive.3011.a: "Это плохо."
 grand_archive.3012.name: "Обнаружена астероидная сущность"
 grand_archive.3012.desc: "Во время изучения системы §H[from.solar_system.GetName]§! мы обнаружили еще одно загадочное астроидное существо.\n\n§HНаучным кораблям§! следует избегать этой системы, пока опасные организмы не будут изучены более подробно."
 grand_archive.3012.a: "Продолжить исследование."
 grand_archive.3016.name: "Неприятный сюрприз"
 grand_archive.3016.desc.default: "Астероид в системе [fromfrom.GetName] оказался «раковиной» для огромного живого существа.\n\nМы успешно уничтожили эту «раковину» и извлекли ее содержимое — это [this.GetName]. Впредь при изучении астероидов следует быть бдительными.\n\nНеизвестно, сколько еще таких существ сейчас таится в ожидании легкой добычи."
 grand_archive.3016.desc.leader_killed: "$grand_archive.3016.desc.default$ К сожалению, [leader.GetName] уже не вернется к своим обязанностям."
 grand_archive.3018.name: "Из чрева зверя"
 grand_archive.3018.desc: "К нам вернулся научный корабль, пропавший в системе §H[current_system.GetName]§!!\n\n§H[leader.GetName]§! докладывает, что судно вместе с экипажем оказалось целиком проглочено неким космическим организмом, обитающим внутри астероида. К тому времени, как корпус корабля почти треснул, существо неожиданно изрыгнуло его — похоже, что-то его потревожило, и мы не успели вмешаться.\n\nПока что нам известно слишком мало. Приближаться к определенным поясам астероидов сейчас следует с осторожностью."
 grand_archive.3018.a: "Повезло."
 grand_archive.3020.name: "Научный корабль потерян"
 grand_archive.3020.desc: "[from.GetName] перестает посылать сигнал бедствия. Остается лишь предполагать, что научный корабль [from.GetName] потерян навсегда."
 alert_mia_fleet_eaten_title: "$alert_mia_title$"
 alert_mia_fleet_eaten_instant: "Мы утратили связь с научным кораблем, изучающим астероид. В месте, где состоялся последний контакт, обнаружен слабый сигнал бедствия."
 cutholoid_discovered_chain_title: "Вернуть корабль [this.GetName]"
 cutholoid_discovered_chain_desc: "Связь с научным кораблем [this.GetName] в системе [cutholoid_under_radar.solar_system.GetName] оказалась утрачена.\n\nВ последней передаче экипаж упомянул, что собирается изучить ближайший астероид под названием [cutholoid_under_radar.GetName].\n\nПри входе в систему рекомендуется соблюдать осторожность."
 HIDDEN_CUTHOLOID_ATTACK_PROJECT: "Уничтожить астероид"
 HIDDEN_CUTHOLOID_ATTACK_PROJECT_DESC: "Астероид [cutholoid_under_radar.GetName] вовсе не то, чем кажется. Нам следует подвести к нему мощное соединение и постараться вернуть научный корабль [this.GetName], пока тот не пропал окончательно."
 HIDDEN_CUTHOLOID_CAPTURE_PROJECT: "Захватить астероид"
 HIDDEN_CUTHOLOID_CAPTURE_PROJECT_DESC: "Астероид [cutholoid_under_radar.GetName] вовсе не то, чем кажется. При наличии подходящей технологии можно захватить его целиком и без труда вернуть научный корабль [this.GetName], пока тот не пропал окончательно."
 grand_archive.2800.name: "Ложный астероид"
 grand_archive.2800.desc: "Похоже, что необычный астероид, обнаруженный нами в системе §H[This.System.GetName]§!, разумен. Подлет к орбите такого небесного тела крайне рискован. Экипажам научных кораблей рекомендуется покидать системы, где обитают разумные астероиды, пока мы не узнаем об этих существах что-нибудь новое."
 grand_archive.2800.a: "Продолжить исследование."
 grand_archive.2900.name: "Кутхолоиды"
 grand_archive.2900.desc: "Нам стало известно, что внутри астероидов могут обитать космические организмы. Эти существа, которых наши ученые назвали §Hкутхолоидами§!, — хищники, нападающие из засады. Кутхолоиды терпеливы: поджидать добычу они могут несколько лет. Каждое такое существо способно проглотить целый космический корабль. Теперь приближаться к неизученным поясам астероидов следует крайне осторожно, поскольку они могут быть опасны.\n\nВпрочем, есть и хорошие новости: похоже, что кутхолоиды крайне немногочисленны, а размножаются они бесполым путем, на что уходит несколько веков."
 grand_archive.2900.a: "Этих существ стоит изучить подробнее."
 grand_archive.2900.b: "Никаких засад. Уничтожить их всех."
 grand_archive.2900.b.homicidal: "Охотник станет жертвой."
 grand_archive.2905.name: "Раковины кутхолоидов"
 grand_archive.2905.desc: "Раковина каждого кутхолоида состоит из минералов, укрепленных прочными биоволокнами. Эти волокна постоянно растут, поэтому некоторые раковины могут более чем наполовину состоять из биомассы.\n\nКогда астероид становится слишком тесным для кутхолоида, тот ищет себе новый дом, после чего процесс «заселения» повторяется вновь. Обычно кутхолоиды ревностно оберегают свою территорию, однако на орбитах особенно привлекательных астероидов иногда можно заметить сразу несколько кутхолоидов. Астероид занимает самая крупная особь, после чего небесное тело со временем мирно переходит к другим кутхолоидам, выстроившимся в очередь по размеру. Соответственно, в некоторых обитаемых астероидах когда-то жили десятки владельцев.\n\nПо итогам следует отметить, что самые маленькие астероиды укреплены биоволокнами больше всего, поскольку они чаще других меняют хозяев. Образцы этих волокон представляют немалую научную ценность."
 grand_archive.2905.a: "Усилить нашу космическую фауну."
 grand_archive.2905.b: "Улучшить наши корабли."
 cutholoids_hunting_buff: "Охотник на кутхолоидов"
 cutholoids_hunting_buff_desc: "Сбор насыщенных минералами раковин кутхолоидов после боя приносит вам £minerals£ §G$@cutholoids_hunting_buff_mineral_reward|0$§! за каждую уничтоженную флотилию."
 grand_archive.2900.b.cutholoidhunt: "§G+$@cutholoids_hunting_buff_mineral_reward|0$§! £minerals£ за каждую уничтоженную флотилию кутхолоидов"
