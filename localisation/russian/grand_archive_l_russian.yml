 ##########
 r_the_modularium: "Модулярий"
 r_the_modularium_desc: "Модульная перерабатывающая система, самостоятельно производящая ценные ресурсы по экспоненте, но требующая для этого значительных энергетических затрат."
 the_modularium_active_effect_tt: "Удваивает количество производимых модулярием ресурсов. Удваивает затраты на следующий триумф."
 r_flowmetal_alloy: "Сплав текучего металла"
 r_flowmetal_alloy_desc: "Этот самовоспроизводящийся материал укрепляет химические связи в любом металле, с которым вступает в контакт. Внедрение текучего металла в процессы сборки может значительно повысить эффективность крупномасштабного машинного производства."
 flowmetal_alloy_active_effect_tt: "Создает в столице §G300§! £pop£ §Yпоселений роботов§!."
 r_crystallinus_diffuser: "Кристаллический диффузор"
 r_crystallinus_diffuser_desc: "Это устройство превращает синтетические кристаллы в чрезвычайно мощный стимулятор. В чистом виде получившиеся химикаты летучи и могут вызывать отказы органов у отдельных потребителей."
 crystallinus_diffuser_active_effect_tt: "На 10 лет производительность биологических поселений государства увеличивается на 100%. После этого 20% затронутого населения погибнет."
 crystallinus_diffuser_machine_empire_active_effect_tt: "§G+100§! ед. £energy£ §Yэнергии§! на 10 лет."
 relic_crystallinus_diffuser_opinon: "§G+25§! к отношениям с государствами с §Yбиологическим§! населением."
 triggered_opinion_relic_crystallinus_diffuser: "$r_crystallinus_diffuser$"
 crystallinus_diffuser_modifier: "Триумф ($r_crystallinus_diffuser$)"
 r_everchanging_stone: "Переменчивый камень"
 r_everchanging_stone_desc: "Драгоценный камень искусственного происхождения, способный менять цвет и химический состав в зависимости от окружения. При помещении рядом с каким-либо предметом начинает подражать его составу, что позволяет нам лучше понимать устройство молекулярных структур."
 everchanging_stone_modifier: "Триумф ($r_everchanging_stone$)"
 everchanging_stone_modifier_tt: "За каждый ['concept_specimen'] на выставке, посвященной ксенологии, производительность двух следующих категорий увеличивается (§G+$@everchanging_stone_modifier|0%$§!)."
 r_pulsestone: "Пульсирующий камень"
 r_pulsestone_desc: "Крайне радиоактивный камень, создающий опасные магнитосиловые волны. Он может перевернуть наши представления об управлении полями, однако испускаемую энергию почти невозможно уловить."
 pulsestone_modifier: "$r_pulsestone$"
 mod_scientist_lifespan_add: "Продолжительность жизни ученых"
 r_gavel_of_the_tribunal: "Молоток Трибунала"
 r_gavel_of_the_tribunal_desc: "На рукояти этого молотка выведены имена древней троицы великих деятелей, некогда правивших ныне мертвой галактикой. Поднять его невозможно — для этого он слишком велик — однако само присутствие этого инструмента вызывает трепет."
 gavel_of_the_tribunal_galcom: "$r_gavel_of_the_tribunal$"
 gavel_of_the_tribunal_galcom_tt: "£diplo_weight£ Дипломатический вес §G+$@gavel_of_the_tribunal_galcom_diplo_weight|0%$§! до принятия следующей §Yрезолюции§!."
 gavel_of_the_tribunal_no_galcom: "$r_gavel_of_the_tribunal$"
 r_celestial_resonator: "Небесный резонатор"
 r_celestial_resonator_desc: "Загадочное устройство, способное устраивать грандиозные представления со световыми эффектами. Действует сильнее при нахождении рядом с экземплярами."
 celestial_resonator_tt: "Производит $r_unity$ (10 ед.) за каждый выставляемый ['concept_specimen']"
 celestial_resonator_triumph_tt: "Дает §G+$@celestial_resonator_happiness|0%$§! £happiness£ §Yсчастья§! и §G+$@celestial_resonator_diplo_weight|0%$§! £diplo_weight£ §Yдипломатического веса§! за каждый выставляемый ['concept_specimen']"
 celestial_resonator_modifier: "$r_celestial_resonator$"
 r_entangled_relay: "Запутывающее реле"
 r_entangled_relay_desc: "Это древнее сооружение способно соединять между собой отдаленные сети связи с помощью квантовой запутанности, обеспечивая таким образом бесперебойную межгалактическую связь."
 entangled_relay_modifier: "$r_entangled_relay$"
 r_prototype_vir_core: "Прототип ядра ВИРа"
 r_prototype_vir_core_desc: "Этот искусственный интеллект — умелый наставник и учитель, способный прийти на помощь почти в любой ситуации. Превосходно объясняет сложные понятия простыми словами, что облегчает пользователю принятие решений."
 prototype_vir_core_modifier: "$r_prototype_vir_core$"
 r_propagandosphere: "Пропагандосфера"
 r_propagandosphere_desc: "В этой голографической сфере содержится архив пропагандистских фильмов, снятых давно погибшей цивилизацией. Каждый без исключения фильм увлекателен и оригинален. Их можно переснять, чтобы вдохновлять уже собственные войска и народ."
 r_executus_compendium: "Сборник «Экзекутус»"
 r_executus_compendium_desc: "Обширная стенография заседаний совета древней цивилизации, обнаруженная в запечатанной капсуле. На мириадах страниц подробно излагаются способы оптимизации бюрократических процессов и внедрения инноваций в области управления. Эти способы может применить и наше правительство."
 executus_compendium_triumph_tt: "Возможность начать программу за 10% от изначальных затрат на раннее начало (минимальные затраты — £unity£ 3000)."
 r_the_pattern_maker: "Схемосоставитель"
 r_the_pattern_maker_desc: "Этот древний вычислитель превосходно отслеживает динамические траектории и просчитывает поведение объектов, таких как вражеские корабли. Структуры данных, создаваемые прогнозирующими алгоритмами, настолько сложны и проработаны, что их можно сравнить с архитектурным чертежом. При условии, что нам хватит энергии и материалов, с помощью схемосоставителя мы сможем построить разведывательный корабль, оснащенный высокомощными датчиками."
 r_the_pattern_maker_effect_tt: "Создает разведывательный корабль типа §Y«Схемоискатель»§!.\n• Очень высокая скорость, очень большая дальность обнаружения гиперкоридоров"
 NAME_Patternwalker: "Схемоискатель"
 NAME_Patternwalker_Cloak: "$NAME_Patternwalker$"
 SENSOR_PATTERNWALKER: "Датчики типа «Провидец»"
 r_vaporous_mega_orchid: "Воздушная мегаорхидея"
 r_vaporous_mega_orchid_desc: "Эта грандиозная орхидея расцветает всего раз в 50 лет. Ее аромат умиротворяет, поскольку блокирует работу синапсов, отвечающих за агрессию и недоверие."
 r_vaporous_mega_orchid_effect_tt: "§G+$@vaporous_mega_orchid_opinion|0$§! к £opinion£ отношениям с другими некровожадными, не павшими и не машинными государствами в течение §Y$@vaporous_mega_orchid_opinion_duration_years|0$§! лет."
 opinion_vaporous_mega_orchid: "$r_vaporous_mega_orchid$"
 r_tiyanki_matriarch_nerve_core: "Нервный центр матриарха тиянки"
 r_tiyanki_matriarch_nerve_core_desc: "В нейронах мозгового вещества этого древнего космического кита хранятся сведения о столетиях эволюции. Расшифровав устройство мозга, мы сможем выявить уязвимости других сверххищников, а заодно раскрыть тайны их способов выживания."
 tiyanki_matriarch_nerve_core: "$r_tiyanki_matriarch_nerve_core$"
 celestial_chart: "Небесная карта"
 r_celestial_chart_0: "Загадочная орбитальная капсула"
 r_celestial_chart_0_desc: "Странная капсула, на протяжении тысяч лет вращавшаяся на орбите нашей родной планеты. Пока неизвестно, какая информация содержится внутри."
 r_celestial_chart_1: "$celestial_chart$"
 r_celestial_chart_1_desc: "Первый фрагмент обширной карты, найденной внутри древней капсулы."
 r_celestial_chart_2: "$celestial_chart$"
 r_celestial_chart_2_desc: "Частично составленная карта, найденная внутри древней капсулы."
 r_celestial_chart_3: "$celestial_chart$"
 r_celestial_chart_3_desc: "Почти полностью составленная карта, найденная внутри древней капсулы."
 r_celestial_chart_4: "$celestial_chart$"
 r_celestial_chart_4_desc: "Обширная звездная карта, совмещенная с базой данных. Ее составила знаменитая предводительница пиратов $NAME_CaptainNess$."
 r_celestial_chart_4_effect_tt: "В одной из наших колоний появляется ['concept_treasure_vault']."
 celestial_chart_upgraded_tt: "§Y$celestial_chart$§! пополнилась новыми сведениями."
 r_mutated_voidworm_nest: "Гнездо мутировавших пустотных червей"
 r_mutated_voidworm_nest_desc: "Гнездо пустотных червей, в результате мутации научившихся размножаться, не прибегая к паразитарной инфекции. Некоторые молодые особи полностью вырастают всего за несколько дней."
 r_mutated_voidworm_nest_effect_tt: "В столичной системе появляется флотилия взрослых мутировавших пустотных червей"
