 #Technologies #
 ################
 tech_galactic_archivism: "Ведение галактического архива"
 tech_galactic_archivism_desc: "Историю нашей галактики необходимо тщательно фиксировать, иначе мы ничему не научимся у предков. В этом нам поможет обширный архив."
 tech_gravity_wells: "Гравитационные ловушки"
 tech_gravity_wells_desc: "Местные сосредоточения квантовой массы способны вспышками испускать усиленную гравитацию. При грамотном распоряжении такой технологией мы теоретически сможем ловить и удерживать существ любого размера, не причиняя им вреда."
 tech_containment_vessel: "Кураторские меры содержания"
 tech_containment_vessel_desc: "В гравитационные ловушки попадается вдвое больше §Yкосмической фауны§!."
 TECH_UNLOCK_CONTAINMENT_VESSEL_TITLE: "$TECH_UNLOCK_COMPONENT_LINE$ $tech_containment_vessel$"
 TECH_UNLOCK_CONTAINMENT_VESSEL_DESC: "$tech_containment_vessel_desc$"
 tech_asteroidal_carapace: "Астероидный панцирь"
 tech_asteroidal_carapace_desc: "Раковина кутхолоида состоит из минералов, усиленных прочными биологическими волокнами. С помощью достижений современной металлургии мы сможем синтезировать это соединение."
 ASTEROIDAL_CARAPACE_ARMOR: "$tech_asteroidal_carapace$"
 ASTEROIDAL_CARAPACE_ARMOR_DESC: "$tech_asteroidal_carapace_desc$"
 tech_gravity_snare_capacity_desc: "В гравитационные ловушки попадается на §G1§! представителя §Yкосмической фауны§! больше."
 tech_gravity_snare_capacity_1: "Микросингулярные усиления"
 tech_gravity_snare_capacity_1_desc: "$tech_gravity_snare_capacity_desc$"
 tech_gravity_snare_capacity_2: "Оптимизация управления гравитацией"
 tech_gravity_snare_capacity_2_desc: "$tech_gravity_snare_capacity_desc$"
 tech_gravity_snare_capacity_3: "Доработка системы удержания"
 tech_gravity_snare_capacity_3_desc: "$tech_gravity_snare_capacity_desc$"
 gateway_snare_capacity: "Вместимость гравитационных ловушек"
 gateway_gravity_snare_capacity: "§HПуть вместимости гравитационных ловушек§!\n§EЭта технология поспособствует дальнейшим достижениям в области вместимости гравитационных ловушек.§!"
 tech_alien_cloning: "Искусственное разведение"
 tech_alien_cloning_beastmasters: "$tech_alien_cloning$"
 tech_alien_cloning_desc: "В тщательно контролируемой среде можно использовать генетический материал, собранный из умерщвленной космической фауны, и создавать новых особей, послушных нашим командам."
 feature_alien_cloning_unlocked: "Политика «§Y$policy_space_fauna_growth$§!»"
 feature_alien_cloning_unlocked_desc: "$policy_space_fauna_growth_desc$"
 tech_alien_cloning_tt: "§HСвойство:§! клонирование космической фауны — корветов"
 tech_improved_incubators: "Улучшенные инкубаторы"
 tech_improved_incubators_beastmasters: "$tech_improved_incubators$"
 tech_improved_incubators_desc: "Процесс искусственного выращивания организмов в инкубаторах можно доработать, ускорив начальные этапы развития в целях создания более взрослых клонов."
 tech_improved_incubators_tt: "§HСвойство:§! выращивание космической фауны — эсминцев"
 tech_improved_incubators_tt_desc: "В инкубаторах теперь можно клонировать более крупные экземпляры §Yкосмической фауны§!, схожие по размеру с классическими эсминцами."
 tech_metabolic_gases: "Метаболические газы"
 tech_metabolic_gases_beastmasters: "$tech_metabolic_gases$"
 tech_metabolic_gases_desc: "Улучшение состава метаболических газов в инкубаторах ускорит развитие особей перед их извлечением."
 tech_metabolic_gases_tt: "§HСвойство:§! выращивание космической фауны — линкоров"
 tech_metabolic_gases_tt_desc: "В инкубаторах теперь можно клонировать зверокорабли любой стадии развития и любого размера."
 BOARDING_CABLES: "Абордажные тросы"
 BOARDING_CABLES_MODULES: "$BOARDING_CABLES$"
 BOARDING_CABLES_TOOLTIP: "С небольшой вероятностью позволяют похитить вражеский корабль или захватить вражеского командира ради выкупа."
 BOARDING_CABLES_DESC: "$BOARDING_CABLES_TOOLTIP$"
 tech_boarding_cables: "$BOARDING_CABLES$"
 tech_boarding_cables_desc: "Переделанные малокалиберные артиллерийские орудия, стреляющие прочными кабелями из углеволокна с крючьями на концах. Отлично подходят для остановки вражеских кораблей и взятия их на абордаж."
 tech_controlled_mutations: "Контролируемая мутация"
 tech_controlled_mutations_desc: "Путем модификации генома можно повысить эффективность зверокораблей: мы внедрим в их биомассу технологии искусственного происхождения."
 tech_controlled_mutations_2: "Улучшенная контролируемая мутация"
 tech_controlled_mutations_2_desc: "Это еще не предел. Серьезное вмешательство в генетику космической фауны позволит нам внедрять самые разные специализированные компоненты."
 ####################
 #Technology swaps #
 ####################
 tech_refit_standards_beastmasters: "Оптимизация инкубаторов"
 tech_refit_standards_beastmasters_desc: "Оптимизация процесса клонирования космической фауны значительно повысит его эффективность."
 tech_small_space_fauna_hull_1: "Улучшенные ткани малой космической фауны"
 tech_small_space_fauna_hull_1_desc: "Развитие технологии клонирования позволит создавать более прочные и выносливые особи малой космической фауны."
 tech_small_space_fauna_hull_2: "Передовые ткани малой космической фауны"
 tech_small_space_fauna_hull_2_desc: "Прочность тканей малой космической фауны повышена до предела."
 tech_medium_space_fauna_hull_1: "Улучшенные ткани средней космической фауны"
 tech_medium_space_fauna_hull_1_desc: "Развитие технологии клонирования позволит создавать более прочные и выносливые особи средней космической фауны."
 tech_medium_space_fauna_hull_2: "Передовые ткани средней космической фауны"
 tech_medium_space_fauna_hull_2_desc: "Прочность тканей средней космической фауны повышена до предела."
 tech_large_space_fauna_hull_1: "Улучшенные ткани крупной космической фауны"
 tech_large_space_fauna_hull_1_desc: "Развитие технологии клонирования позволит создавать более прочные и выносливые особи крупной космической фауны."
 tech_large_space_fauna_hull_2: "Передовые ткани крупной космической фауны"
 tech_large_space_fauna_hull_2_desc: "Прочность тканей крупной космической фауны повышена до предела."
 tech_extra_large_space_fauna_hull_1: "Улучшенные ткани огромной космической фауны"
 tech_extra_large_space_fauna_hull_1_desc: "Развитие технологии клонирования позволит создавать более прочные и выносливые особи огромной космической фауны."
 tech_extra_large_space_fauna_hull_2: "Передовые ткани огромной космической фауны"
 tech_extra_large_space_fauna_hull_2_desc: "Прочность тканей огромной космической фауны повышена до предела."
 tech_titanic_space_fauna_hull_1: "Улучшенные ткани гигантской космической фауны"
 tech_titanic_space_fauna_hull_1_desc: "Развитие технологии клонирования позволит создавать более прочные и выносливые особи гигантской космической фауны."
 tech_titanic_space_fauna_hull_2: "Передовые ткани гигантской космической фауны"
 tech_titanic_space_fauna_hull_2_desc: "Прочность тканей гигантской космической фауны повышена до предела."
 tech_small_space_fauna_build_speed: "Стандартное маломасштабное клонирование"
 tech_small_space_fauna_build_speed_desc: "Введение новых стандартов клонирования и выращивания малой космической фауны значительно повышает эффективность процесса размножения."
 tech_medium_space_fauna_build_speed: "Стандартное среднемасштабное клонирование"
 tech_medium_space_fauna_build_speed_desc: "Введение новых стандартов клонирования и выращивания средней космической фауны значительно повышает эффективность процесса размножения."
 tech_large_space_fauna_build_speed: "Стандартное крупномасштабное клонирование"
 tech_large_space_fauna_build_speed_desc: "Введение новых стандартов клонирования и выращивания крупной космической фауны значительно повышает эффективность процесса размножения."
 tech_extra_large_space_fauna_build_speed: "Стандартное клонирование в огромных масштабах"
 tech_extra_large_space_fauna_build_speed_desc: "Введение новых стандартов клонирования и выращивания огромной космической фауны значительно повышает эффективность процесса размножения."
