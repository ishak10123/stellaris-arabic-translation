 mod_planet_treasure_gatherers_produces_mult: "Производительность £job_treasure_gatherer£ заведующих сокровищами"
 grand_archive.5015.name: "Учреждение хранилища сокровищ"
 grand_archive.5015.desc: "§Y$celestial_chart$§! содержит архивы, позволяющие нам определять стоимость обнаруживаемых сокровищ, а значит — извлекать из них больше выгоды. Теперь на какой-либо планете следует построить §Yхранилище сокровищ§!, где можно будет рассортировывать, восстанавливать и хранить ценности. Меньше всего логистических сложностей будет на следующих планетах."
 grand_archive.5015.a: "Создать $d_treasure_planet$ на планете §Y[event_target:treasure_planet_candidate_1.GetName]§!."
 grand_archive.5015.b: "Создать $d_treasure_planet$ на планете §Y[event_target:treasure_planet_candidate_2.GetName]§!."
 grand_archive.5015.c: "Создать $d_treasure_planet$ на планете §Y[event_target:treasure_planet_candidate_3.GetName]§!."
