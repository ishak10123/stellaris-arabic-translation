 resolution_cutholoid_eradication: "Истребление кутхолоидов"
 resolution_cutholoid_eradication_desc: "Кутхолоиды, пожирающие космические корабли, — гроза для каждой цивилизованной системы. Этих существ необходимо уничтожать любой ценой."
 resolution_cutholoid_eradication_tooltip: "Каждое государство, в границах которого находятся §Y$cutholoids_plural$§!, будет считаться §Rнарушившим галактический закон§!, пока эти существа не будут уничтожены."
 resolution_repeal_cutholoid_eradication: "Отменить резолюцию «§R$resolution_cutholoid_eradication$§!»"
 resolution_repeal_cutholoid_eradication_desc: "[global_event_country.GetGalCommunityOrGalImperium] не имеет права санкционировать поголовное истребление всех кутхолоидов."
 resolution_repeal_cutholoid_eradication_effect_success: "Отменяет резолюцию «§Y$resolution_cutholoid_eradication$§!»"
