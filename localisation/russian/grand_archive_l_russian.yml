 pirate.1.name.treasure_hunters: "Распространение космического пиратства"
 pirate.1.desc.black_needle: "Вероятнее всего, толчком к этим незаконным действиям послужила «§Y$NAME_BlackNeedle$§!». Возможно, она даже поддерживает каперов."
 pirate.2.k: "Грязные псы!"
 pirate.25.desc.black_needle: "Кроме того, мы обнаружили тайник с ценностями, принадлежавшими бывшим членам §Y«Черной Иглы»§!."
 #Events
 grand_archive.8000.name: "Древняя капсула"
 grand_archive.8000.desc: "При изучении древней капсулы, найденной на орбите планеты [this.GetHomeWorldName], наши [this.GetScientistPlural] достигли прорыва. Благодаря их усилиям мы теперь можем расшифровать последний слой цифровой защиты, а затем — и саму карту, которая так долго не давала нам покоя."
 grand_archive.8000.a: "Что же там будет?"
 TREASURE_HUNTERS_ANCIENT_CAPSULE_PROJECT: "Анализ древней капсулы"
 TREASURE_HUNTERS_ANCIENT_CAPSULE_PROJECT_DESC: "Проведя первоначальный анализ карты, обнаруженной внутри орбитальной капсулы, мы выяснили расположение нескольких космических тел, отсутствующих в нашей системе. На установление точных координат потребуется некоторое время."
 grand_archive.8005.name: "Древняя капсула проанализирована"
 grand_archive.8005.desc: "Карта оказалась неполной!\n\nДанные, извлеченные из капсулы, разрознены. Каждый отсутствующий фрагмент — словно часть головоломки. Впрочем, нам всё-таки удалось установить координаты неизвестной ранее звездной системы, однако подробностей, что именно нас там ждет, на карте нет.\n\nПомимо этого карта показала нам череду брешей, которые могут поспособствовать перемещению в новую систему по гиперкоридору."
 grand_archive.8005.a.lom: "Экипажу занять места!"
 grand_archive.8015.name: "Небесная карта"
 grand_archive.8015.desc.common: "Наши корабли готовы по первому приказу отправиться в очередное великое приключение."
 grand_archive.8015.desc.default: "Расшифрованная нами карта звездного неба, прозванная в народе просто §Yнебесной картой§!, захватила умы каждого жителя планеты [this.GetHomeWorldName]. Однако вопросов пока больше, чем ответов. Откуда она взялась? Кто ее создал? С какой целью? И, что важнее всего, — не попадем ли мы в западню?\n\n$grand_archive.8015.desc.common$"
 grand_archive.8015.desc.gestalt: "Всё внимание общества до этого было приковано к карте, обнаруженной внутри орбитальной капсулы. Теперь же, когда оказалось, что в карте не хватает фрагментов, мы задаемся вопросом, куда она нас приведет и что мы там найдем. Мы решительно настроены составить §Y«небесную карту»§! целиком.\n\n$grand_archive.8015.desc.common$"
 grand_archive.8015.a.default: "Вперед, к приключениям!"
 grand_archive.8015.a.lom: "Отдать швартовы!"
 grand_archive.8020.name: "Неожиданная встреча"
 grand_archive.8020.desc: "Навстречу нам вышла тяжеловооруженная флотилия под незнакомым флагом. Корабли идут ровным строем, однако никакого сходства в конструкциях не наблюдается. Многие из них оснащены кинетическими установками, заряженными катушками с толстыми кабелями с крюками и гарпунами из углеродистой стали на концах. В центре соединения находится группа бронированных транспортов. Можно предположить, что этими кораблями командуют пираты или наемники.\n\nИх головной корабль посылает нам сообщение."
 grand_archive.8020.a.lom: "Значит, будем говорить…"
 grand_archive.8025.name: "$NAME_CaptainHoo$ из группировки «$NAME_BlackNeedle$»"
 grand_archive.8025.desc: "§HКапитан разбойников держится благородно и надменно, плохо скрывая свое любопытство. При разговоре он опускает взгляд к клюву, не желая глядеть нам в глаза, словно мы не заслуживаем его полного внимания. Жесты его перьев невольно вызывают улыбку.§!\n\nВы перешли дорогу §Y«Черной Игле»§!. Такая ошибка непростительна!\n\nДо нас дошли слухи, что ваш народец как раз потянулся в эту систему. И привела его сюда карта, которая принадлежит нам. Отдавайте ее немедленно, иначе прольется кровь."
 grand_archive.8025.a: "Кто вы?"
 grand_archive.8025.a.reply: "Кто, так точно! Меня зовут Глимаркто Зелмендрион, но для вас я — §Y$NAME_CaptainHoo$§!, капитан Сереброкрыла и второй помощник-лейтенант у знаменитых пиратов §Y«Черной Иглы»§!. Уже много тысяч лет мы цепко держим в когтях самые разные незаконные дела, но я — лишь нить в великолепном гобелене нашей славной истории.\n\nОчень советую запомнить мое имя: после того, как я верну эту карту нашему славному вождю, меня ждет большая награда."
 grand_archive.8025.b: "Что вам известно о карте?"
 grand_archive.8025.b.reply: "Один очень талантливый — и очень дорого берущий — посредник рассказал нам, что недавно вы открыли любопытную капсулу… В которой должен был лежать справочник, указывающий путь ко всем интересующим нас скрытым системам.\n\nМы сами раздобыли фрагмент вашей карты, однако без данных из капсулы он бесполезен. Совершенно не понимаю, почему §Y$NAME_CaptainNess$§! решила отдать ключ к своему наследию именно вам, однако наш долг — его у вас отобрать."
 grand_archive.8025.c: "Почему вам так нужна эта карта?"
 grand_archive.8025.c.reply: "Что за кретины мне попались? [this.GetCaptainHooSnarkyInsult] Ну ладно, значит, придется всё вам разжевать.\n\nКарта — это навигационное средство, показывающее, как добраться до определенной точки. Мы хотим добраться до этой точки и забрать затерянное сокровище, которое оставила там §Y$NAME_CaptainNess$§!."
 grand_archive.8025.d: "Кто такая $NAME_CaptainNess$?"
 grand_archive.8025.d.reply: "Нам казалось, вы должны знать такие вещи. Именно она составила эту карту. Возможно, ваше невежество растопило ее сердце, ведь она сама не умеет пользоваться головой.\n\nВпрочем, это всё равно не ваше дело. Отдайте нам сведения — и дальше мы будем действовать сами."
 grand_archive.8025.e: "Карту мы оставим себе."
 grand_archive.8025.e.reply: "Я так и думал. Что же, вам осталось недолго.\n\nКарта или жизнь!"
 grand_archive.8025.f.lom: "Ну попробуй, отбери, курица космическая!"
 CAPTAIN_HOO_INSULT_MACHINE: "Мне казалось, машинный разум должен быть умным. Но, похоже, я ошибался."
 CAPTAIN_HOO_INSULT_HIVE: "Говорят, одна голова — хорошо, а много — лучше. Но только не в вашем случае."
 CAPTAIN_HOO_INSULT_HUM: "Как чудно: толстокостные лысые обезьяны вышли в космос, но здравого смысла так и не набрались."
 CAPTAIN_HOO_INSULT_MAM: "Вы просто звери. Ваш ум и манеры — не чета нашему великому лидеру."
 CAPTAIN_HOO_INSULT_REP: "Очевидно, что такие бестолковые ящеры, как вы, не могут понять даже простые основы."
 CAPTAIN_HOO_INSULT_AVI: "Кажется, ваших предков в детстве слишком сильно клюнули в череп."
 CAPTAIN_HOO_INSULT_ART: "Неудивительно, что вы совсем не умеете соображать: в таком толстом экзоскелете не осталось места мозгу."
 CAPTAIN_HOO_INSULT_MOL: "Всем известно, что у моллюсков нет выраженного мозга. Ваша раса — яркий тому пример."
 CAPTAIN_HOO_INSULT_FUN: "Еще немного спор — и вас будет не отличить от гриба."
 CAPTAIN_HOO_INSULT_PLANT: "Теперь я отлично понимаю, почему растения так редко бывают разумными."
 CAPTAIN_HOO_INSULT_LITHOID: "Я бы от вас камня на камне не оставил."
 CAPTAIN_HOO_INSULT_NECROID: "Когда-то, наверное, вы были разумной расой. А теперь остались только оболочки."
 CAPTAIN_HOO_INSULT_AQUATIC: "Вы здесь как рыба на суше."
 CAPTAIN_HOO_INSULT_TOX: "Если слишком долго нежиться в грязи — отсохнет ум."
 CAPTAIN_HOO_INSULT_ROBOT: "Пожалейте свои процессоры — ваши личностные модули забирают себе все вычисления."
 CAPTAIN_HOO_INSULT_DEFAULT: "Похоже, на ваших уродливых лицах отпечатался весь ваш интеллект."
 grand_archive.8045.name: "$grand_archive.8025.name$"
 grand_archive.8045.desc: "Вы выставили меня и всю §Y«Черную Иглу»§! на посмешище. Этого я не потерплю!\n\nМы еще не скоро забудем ваше упрямство. «$NAME_BlackNeedle$» ударит по вам изо всех орудий. Мы сотрем в пыль ваш неоперившийся еще народ.\n\nИ мы не остановимся, пока не завладеем картой! А теперь — всего доброго."
 grand_archive.8045.a.lom: "Хочешь стрелять — так стреляй, а не болтай!"
 TREASURE_HUNTERS_CHART_PIECE_2_PROJECT: "Восемь кусков планеты"
 TREASURE_HUNTERS_CHART_PIECE_2_PROJECT_DESC: "§H$celestial_chart$§! привела нас в систему с расколотой планетой. Внутри крупнейшего обломка планетарной коры мы обнаружили туннель искусственного происхождения. Вероятно, следующий фрагмент карты спрятан именно там, однако чтобы извлечь его, проводить раскопки надо будет очень аккуратно.\n\nПостроить необходимое для этого снаряжение сможет строительный корабль."
 grand_archive.8055.name: "Успешные раскопки"
 grand_archive.8055.desc: "Из дрейфующих в космическом пространстве обломков планеты мы извлекли капсулу, а также некоторое количество минералов. Открыв находку, мы обнаружили новый фрагмент §YНебесной карты§! и заодно несколько необычных культурных артефактов. К ним была приложена записка сразу на нескольких языках — это заметно облегчило перевод.\n\n«Перед вами всё, что осталось от родного мира иттеритов, который назывался $NAME_Soropegma$. Иттериты не успели освоить сверхсветовой полет — вся их цивилизация погибла в результате страшной случайности: не представляя себе последствий, мы случайно привели в действие разрушительное орудие украденного колосса. Постарайтесь сохранить память о них»."
 TREASURE_HUNTERS_ANCIENT_CAPSULE_2_PROJECT: "Расшифровать фрагмент карты"
 TREASURE_HUNTERS_ANCIENT_CAPSULE_2_PROJECT_DESC: "Мы извлекли капсулу из останков расколотой планеты, и теперь надо расшифровать навигационные данные внутри. Для этого понадобится сравнить их с нашей картографической базой данных и соотнести отмеченные небесные тела с известными системами."
 grand_archive.8060.name: "Карта расшифрована"
 grand_archive.8060.desc: "Преодолев несколько слоев шифровки, мы смогли вписать новые данные на §YНебесную карту§!. Когда все кусочки сложились воедино, мы обнаружили еще одну новую систему. Нас ждет новая главапутешествия, однако в неисследованной части космоса лучше проявлять осторожность."
 grand_archive.8075.name: "Великий архив"
 grand_archive.8075.desc: "Наши ученые считают, что недавно найденный образец, §Y[This.GetLastAcquiredSpecimenName]§!, будет отлично смотреться на публичной выставке на тему §YВеликого архива§!. На ней всеобщему вниманию будет представлена наша многообещающая коллекция редких артефактов, имеющая большую культурную и научную ценность. Начальные инвестиции поспособствуют развитию технологии сохранения и безопасной демонстрации столь разнообразных и хрупких экземпляров.\n\nКроме того, вместе с иттеритским артефактом мы нашли проект продвинутой витрины с инновационной системой атмосферного мониторинга. Разобравшись в этой технологии, мы расширим возможности архива по сохранению образцов."
 grand_archive.8076.name: "Иттеритский образец"
 grand_archive.8076.desc: "Последний след забытой иттеритской цивилизации заслуживает отдельной выставки.\n\nК счастью, вместе с иттеритским артефактом мы нашли проект продвинутой витрины с инновационной системой атмосферного мониторинга. Разобравшись в этой технологии, мы расширим возможности архива по сохранению образцов."
 grand_archive.8076.a: "Прекрасная возможность."
 TREASURE_HUNTERS_EXHIBITION_PROJECT: "Чертежи для улучшения выставок"
 TREASURE_HUNTERS_EXHIBITION_PROJECT_DESC: "Вместе с иттеритским образцом мы нашли проект продвинутой витрины, которая поможет его сохранить.\n\nВполне вероятно, что описанные в этом чертеже технологии пригодятся для сохранения образцов и организации выставок."
 TREASURE_HUNTERS_EXHIBITION_PROJECT_TOOLTIP: "Используйте §Yстроительный корабль§!, чтобы построить §YВеликий архив§! на орбите планеты, где есть как минимум 2,5K £pop£ §Hпоселений§!.\nТребуется: §H£society_research£ $tech_galactic_archivism$§!."
 grand_archive.8080.name: "Улучшение выставок"
 grand_archive.8080.desc: "Тщательно изучив иттеритские чертежи, мы смогли соорудить продвинутую камеру хранения с высокоточной системой атмосферного мониторинга, которая улавливает даже отдельные атомы. Это позволит кураторам выставок с высокой точностью отслеживать атмосферное состояние хрупкого иттеритского образца и предотвращать возможные повреждения. Теперь образец навечно останется таким, как сейчас.\n\nМы можем применить эти технологии для улучшения условий хранения всех образов в коллекции."
 TREASURE_HUNTERS_BUILD_GRAND_ARCHIVE: "Строительство Великого архива"
 TREASURE_HUNTERS_BUILD_GRAND_ARCHIVE_DESC: "Изучая самые отдаленные уголки космоса, мы собрали бесчисленное множество уникальных артефактов и культурных диковинок. Эти образцы вдохновят население и позволят создать первую в истории выставку, которая не только представит широкой общественности обширные галактические знания, но и поможет сохранить их.\n\nДля этой цели стоит создать §H$grand_archive$§!."
 grand_archive.8090.name: "Открытие Великого архива"
 grand_archive.8090.desc: "В системе [fromfrom.GetName] открылся §Y$grand_archive$§!, и это великий день для [this.GetName&gen]. Выставка сокровищ со всех концов галактики вдохновляет исследовать космос и призывает извлекать уроки из прошлого."
 d_black_needle_base: "Тайная база «Черной Иглы»"
 d_black_needle_base_desc: "Секретная база пиратов «Черной Иглы», используемая для проведения незаконных операций и хранения награбленного."
 d_abandoned_black_needle_base: "Заброшенная база «Черной Иглы»"
 d_abandoned_black_needle_base_desc: "Когда-то пираты «Черной Иглы» использовали эту базу как форпост, убежище для разыскиваемых преступников и хранилище награбленного."
 d_abandoned_black_needle_base_naval_cap: "Вместимость флота от солдат: §G+$@abandoned_black_needle_base_naval_cap_from_soldier_job|0$§!"
 d_abandoned_black_needle_base_naval_cap_short: "£mod_country_naval_cap_add£ от деятельности £job_soldier£: §G+$@abandoned_black_needle_base_naval_cap_from_soldier_job|0$§!"
 black_needle_base_system_poi: "Следовать Небесной карте"
 black_needle_base_system_poi_desc: "§H$celestial_chart$§! показала нам скрытую систему — она называется [Prev.GetName]. Пора отправиться туда и узнать, что нас ждет."
 grand_archive.8100.name: "Обнаружено пиратское укрытие"
 grand_archive.8100.desc: "В мире [From.GetName] мы нашли тайную подземную базу с символикой §Y«Черной Иглы»§!. Вероятно, это внешняя база пиратской группировки, расположенная вдалеке от основных ее операций. Следующий фрагмент §YНебесной карты§! должен быть где-то здесь: вероятно, среди прочих ценностей и безделушек.\n\nМы могли бы начать орбитальную бомбардировку базы, но в таком случае «Черная игла» может успеть вызвать подкрепление. Если же мы отправим на базу наземный отряд, он сможет быстро взять ее под контроль, не оставив пиратам шанса отреагировать.\n\nНо есть и третий вариант: мы можем попытаться по-тихому выкрасть фрагмент Небесной карты, взломав компьютерные системы базы."
 grand_archive.8100.a: "Есть над чем поразмыслить."
 COLONIZATION_IMPOSSIBLE_DEFENDED_PLANET: "$TRIGGER_FAIL$§RЭтот мир под надежной охраной, его не получится колонизировать.§!"
 BLACK_NEEDLE_BASE_BOMBARD: "Разбомбить базу «Черной Иглы»"
 BLACK_NEEDLE_BASE_BOMBARD_DESC: "Подземная база на [This.GetPlanetMoon]е [This.GetName] отлично защищена от бомбардировок с орбиты, однако при условии, что нам хватит времени и огневой мощи, уничтожить ее можно будет силами одной лишь нашей флотилии. После нейтрализации базы следует обыскать руины: возможно, там найдется фрагмент §Hнебесной карты§!, а заодно и другие ценности.\n\nСоветники рекомендуют действовать осторожно, поскольку при таком подходе «Черная Игла» может успеть позвать подкрепления."
 BLACK_NEEDLE_BASE_BOMBARD_REINFORCEMENTS_KILLED: "$BLACK_NEEDLE_BASE_BOMBARD$"
 BLACK_NEEDLE_BASE_BOMBARD_REINFORCEMENTS_KILLED_DESC: "$BLACK_NEEDLE_BASE_BOMBARD_DESC$"
 grand_archive.8103.name: "Контратака «Черной Иглы»"
 grand_archive.8103.desc: "Как и ожидалось, «Черная Игла» прислала флотилию на защиту своей базы в мире [FromFrom.GetName].\n\nНам придется разобраться с этими кораблями, чтобы взять систему [FromFrom.System.GetName] под контроль."
 grand_archive.8105.name: "Среди руин и пепла"
 grand_archive.8105.desc: "Под градом орбитальных ударов от пиратской базы наконец остались одни руины, которые погребли под собой и всех ее прежних обитателей. Поскольку угроза устранена, теперь мы можем отправить туда ученого, который изучит обломки базы и извлечет из них следующий фрагмент §YНебесной карты§!."
 grand_archive.8105.a.custom_tooltip: "База «Черной Иглы» уничтожена. Теперь мир §Y[FromFrom.GetName]§! можно безопасно изучить."
 grand_archive.8105.a.lom: "Сокровища ждут!"
 project_type_research: "$RESEARCH$"
 project_type_bombardment: "Бомбардировка"
 BLACK_NEEDLE_BASE_DEPLOY_ARMIES: "Штурм базы «Черной Иглы»"
 BLACK_NEEDLE_BASE_DEPLOY_ARMIES_DESC: "На защите подземной базы на [FromFrom.GetPlanetMoon]е [FromFrom.GetName] стоит множество солдат и охранных дронов. Высадив войска на поверхность, мы сможем быстро взять базу под контроль, не дав §Y«Черной Игле»§! времени отреагировать.\n\nПосле захвата базы мы заберем капсулу с картой и все недобросовестно добытое пиратами имущество."
 grand_archive.8110.name: "Оборона прорвана"
 grand_archive.8110.desc: "Наши наземные силы взяли под контроль базу §Y«Черной Иглы»§! и в настоящее время охраняют здание и прилегающие территории. Поскольку угроза устранена, теперь мы можем отправить туда ученого, который извлечет следующий фрагмент §YНебесной карты§!."
 grand_archive.8110.a.custom_tooltip: "Наземные силы «Черной Иглы» нейтрализованы. Теперь мир §Y[FromFromFrom.GetName]§! можно безопасно изучить."
 grand_archive.8110.a.lom: "Пора забрать нашу долю."
 BLACK_NEEDLE_BASE_HACK: "Взлом пиратской базы"
 BLACK_NEEDLE_BASE_HACK_DESC: "Пираты всецело полагаются на краденую и переоборудованную технику, а потому их системы очень уязвимы к взлому. Научный корабль на орбите мира [FromFrom.GetName] мог бы взломать сеть базы и притвориться транспортным кораблем под командованием капитана Хоо. Вероятно, так мы сможем убедить их передать капсулу без лишнего насилия."
 grand_archive.8115.name: "Маневр выполнен успешно"
 grand_archive.8115.desc.1: "Спустя несколько месяцев подготовки [Leader.GetAXX::ученый|||fem:учёная] [Leader.GetName] успешно [Leader.GetAXX::внедрился|||fem:внедрилась] в коммуникационную сеть §Y«Черной Иглы»§! и [Leader.GetAXX::выдал|||fem:выдала] себя за капитана одного из кораблей этой группировки. Под предлогом приказов от капитана Хоо [Leader.GetAXX::ему|||fem:ей] удалось обманом заставить работников базы подготовить капсулу для срочного выхода в космос."
 grand_archive.8115.desc.slippery: "[Leader.GetAXX::Ученый|||fem:Ученая] [Leader.GetName] [Leader.GetAXX::посадил|||fem:посадила] свой корабль в идеальном для быстрого побега месте — на случай, если обман раскроется."
 grand_archive.8115.desc.charismatic: "Используя свою необычайную харизму и очарование, [Leader.GetAXX::ученый|||fem:ученая] [Leader.GetName] [Leader.GetAXX::смог|||fem:смогла] избежать неудобных вопросов."
 grand_archive.8115.desc.psionic_organic: "Одним простым жестом [Leader.GetAXX::ученый|||fem:ученая] [Leader.GetName] [Leader.GetAXX::подчинил|||fem:подчинила] разум охранников, рассеяв все подозрения."
 grand_archive.8115.desc.psionic_machine: "Благодаря псионическому воздействию, [Leader.GetName] без труда [Leader.GetAXX::подавил|||fem:подавила] волю не столь развитых умов охранников, устранив любые подозрения."
 grand_archive.8115.desc.2: "Нам удалось завладеть капсулой без потерь. Пираты еще не поняли, что их обманули."
 grand_archive.8115.a: "$EXCELLENT$"
 grand_archive.8120.name: "[Leader.GetAXX::Пойман|||fem:Поймана] с поличным"
 grand_archive.8120.desc: "К сожалению, один из охранников раскрыл наш обман, когда мы грузили капсулу на корабль. Пираты открыли огонь, и нам пришлось срочно ретироваться вместе с добычей. Капсулу мы заполучили, но [Leader.GetAXX::ученый|||fem:ученая] [Leader.GetName] [Leader.GetAXX::погиб|||fem:погибла] во время перестрелки."
 grand_archive.8120.a: "$TERRIBLE$"
 grand_archive.8125.name: "Пиратская база заброшена"
 grand_archive.8125.common: "После того как уязвимость вскрылась, пираты решили немедленно эвакуироваться с базы на луне [FromFromFromFrom.GetName], оставив там и другие ценности. Теперь эту луну можно колонизировать, поскольку на ней больше никто не живет."
 grand_archive.8125.desc.alive: "Пираты §Y«Черной Иглы»§! наконец-то обнаружили дыры в своей системе защиты и поняли, что их одурачили.\n\n$grand_archive.8125.common$"
 grand_archive.8125.desc.dead: "После того, как мы едва унесли ноги с базы §Y«Черной Иглы»§!, пираты осознали весь масштаб нашего проникновения.\n\n$grand_archive.8125.common$"
 grand_archive.8125.a: "Логичное решение."
 grand_archive.8125.a.custom_tooltip: "Армии покинули [FromFromFrom.GetPlanetMoon]у §Y[FromFromFromFrom.GetName]§!. Теперь ее можно колонизировать."
 grand_archive.8130.name: "Богатства базы «Черной Иглы»"
 grand_archive.8130.desc.common: "В защищенном помещении мы обнаружили целое множество ценных предметов и различных безделушек — бесполезных, но тесно связанных с историей пиратской группировки. Посреди украденных картин, украшений и зашифрованных цифровых кошельков нашлась и капсула с картой.\n\nМы подозреваем, что продать находки будет очень сложно: картины легко можно опознать, украшения придется переплавить на лом, а транзакции с электронных счетов обычно можно без труда отследить. Часть прежних владельцев награбленного уже мертва, но остальные наверняка еще ищут украденное у них имущество."
 grand_archive.8130.desc.bombarded: "Разбирая обломки базы §Y«Черной Иглы»§!, мы наткнулись на подземное хранилище, внутри которого оказалась небольшая сокровищница с награбленным.\n\n$grand_archive.8130.desc.common$"
 grand_archive.8130.desc.landed: "Исследуя потрепанную базу §Y«Черной Иглы»§!, мы нашли ее план и узнали о существовании подземного хранилища, к которому ведет длинная шахта служебного лифта. Спустившись глубоко под землю, мы ввели код доступа к хранилищу и обнаружили небольшую сокровищницу с награбленным.\n\n$grand_archive.8130.desc.common$"
 grand_archive.8130.a: "Попытаться вернуть украденные вещи владельцам."
 grand_archive.8130.b: "Продать всё."
 grand_archive.8130.c.default: "Не трогать краденое."
 grand_archive.8130.c.lom: "Кто нашел, тот и хозяин."
 black_needle_base_sold_stolen_items: "Продали краденые вещи с базы «Черной Иглы»"
 opinion_black_needle_base_repatriate_stolen_items: "Вернули краденые вещи владельцам"
 opinion_black_needle_base_repatriate_stolen_items_tt: "§G+$@opinion_black_needle_base_repatriate_stolen_items_value|0$§! к £opinion£ отношениям со всеми не склонными к геноциду государствами, с которыми мы не воюем."
 DECODE_THIRD_MAP_PIECE: "Расшифровать фрагмент карты"
 DECODE_THIRD_MAP_PIECE_DESC: "Мы заполучили капсулу с базы §Y«Черной иглы»§!. Теперь осталось только расшифровать данные внутри и включить полученную информацию в §HНебесную карту§!."
 grand_archive.8135.name: "Карта расшифрована"
 grand_archive.8135.desc: "Мы преодолели все слои цифрового шифрования и включили новые сведения в §YНебесную карту.§! Это открыло еще одно место, которое можно исследовать, а сама карта почти готова. Похоже, остался всего один фрагмент, и с некоторой долей оптимизма можно предположить, что конец наших поисков уже не за горами.\n\nИ хоть навигационные данные уже расшифрованы, безупречная оболочка капсулы сама по себе заслуживает изучения. Прочность этого контейнера просто поражает; если мы сможем воссоздать этот материал, то получим немало возможностей для дальнейших исследований."
 grand_archive.8135.a: "$GOOD$"
 d_hive_dwelling: "Поселение коллективного разума"
 d_hive_dwelling_desc: "Изолированное поселение, занятое единением Смигибб, бывшими подчиненными капитана Несс."
 d_ruined_hive_dwelling: "Разрушенное поселение коллективного разума"
 d_ruined_hive_dwelling_desc: "Разрушенное поселение единения Смигибб, бывших подчиненных капитана Несс."
 COLONIZATION_IMPOSSIBLE_SMEEGIBB_PLANET: "§RЭта планета принадлежит $NAME_Smeegibb$у.§!"
 grand_archive.8200.name: "Скрытое поселение"
 grand_archive.8200.desc.common_1: "На планете [FROM.GetName] мы обнаружили небольшое поселение: численность проживающих там разумных моллюскоидов — меньше тысячи. Предварительный биологический анализ показал, что эта раса способна к подпространственной эфаптической коммуникации, что указывает на существование здесь коллективного разума. Других поселений разумных видов на поверхности не обнаружено."
 grand_archive.8200.desc.common_2: "§Y$celestial_chart$§! неспроста привела нас сюда, но зачем — непонятно. Необходимо провести исследование."
 grand_archive.8200.desc: "$grand_archive.8200.desc.common_1$\n\n$grand_archive.8200.desc.common_2$"
 grand_archive.8200.desc.alt: "$grand_archive.8200.desc.common_1$\n\nЭтот вид может быть как-то связан с §Yкапитаном Несс§!, о которой мы слышали.\n\n$grand_archive.8200.desc.common_2$"
 grand_archive.8205.desc.common_1: "§H$NAME_Smeegibb$ — узел коллективного разума, обнаруженного нами в скрытой системе [FROM.GetName] — нервно дергается. При разговоре он опускает взгляд, словно привык прислуживать.§!"
 grand_archive.8205.desc.common_2: "Нас зовут $NAME_Smeegibb$. Нам любопытно, как вы нас нашли. Много тысяч лет эта система была укрыта от других обитателей галактики.\n\nТолько §Yкапитан§! знает, как сюда попасть. Что вы здесь ищете?"
 grand_archive.8205.desc.default: "$grand_archive.8205.desc.common_1$\n\nСмарак! Дваждыдолго мы не говорим с одноразумными.\n\n$grand_archive.8205.desc.common_2$"
 grand_archive.8205.desc.gestalt: "$grand_archive.8205.desc.common_1$\n\nСмарак! Дваждыдолго мы не говорим с другими многоразумными.\n\n$grand_archive.8205.desc.common_2$"
 grand_archive.8205.a: "Что это за место?"
 grand_archive.8205.a.reply: "Смарак! Эта планета — наш дом. Мы живем дваждыбезопасно, далеко от злой галактики. Раньше мы делаем зло. Убиваем, грабим, обманываем — мы делаем всё. Больше не делаем. Мы ухаживаем за фермами.\n\nРаньше мы скитаемся. Никто нас не принимает, кроме §YКапитана§!. Она спасает нас от плохой судьбы и разрешает нам присоединяться к ее команде. Капитан дает нам новое имя за то, что мы заботимся о корабле.\n\nМы убираемся, готовим, делаем боеприпасы, следим за фермами и грузом. Мы работаем. Потом мы вступаем в абордажную команду. Защищаем Капитана, когда она ворует сокровища или похищает одноразумных. Никогда не предаем Капитана. Мы всегда верно служим."
 grand_archive.8205.b: "Что ты знаешь о §YНебесной карте§!?"
 grand_archive.8205.b.reply: "Смарак! Мы не знаем о карте, мы только в нашем жилище. Если §YКапитан§! делает карту, которая приводит вас сюда, на это должна быть причина… Она хочет помогать нам. Или вредить нам. Мы никогда не уверены. С Капитаном может быть сложно.\n\nОдин раз она присылает нам сообщение. Капитан присылает нам гигантскую статую ее любимого трутня. Зовут $NAME_Smeegibb$, она помнит и спасает его раньше. Статуя красивая, но мы не знаем, зачем она ее присылает. Может, она хочет извиняться, но она этого не показывает."
 grand_archive.8205.c: "Расскажи подробнее о §YКапитане§!."
 grand_archive.8205.c.reply: "Смарак! Раньше §YКапитан§! нас спасает. Раньше, чем она становится нашим наставником и предводителем. Она учит нас ухаживать за кораблем. Она говорит: «$NAME_Smeegibb$, быть помощником, механиком и рабочим — ты очень полезный».\n\nКапитан живет по двум правилам: «Богатство — это свобода» и «Жизнь существует ради наследия». Вместе мы охотимся на бедных и богатых. Мы забираем у злой галактики все, что хотим.\n\nНо потом Капитан дваждыжадная и дваждыбезрассудная. Она жертвует членами команды и предает их ради добычи. Капитан теряет всех, кроме $NAME_Smeegibb$а. Мы всегда верно служим.\n\nОна показывает нам, какая злая галактика. Теперь мы хотим держаться подальше."
 grand_archive.8205.d: "Почему карта привела нас сюда?"
 grand_archive.8205.d.reply: "Смарак! Мы не уверены, почему §YКапитан§! приводит вас сюда. Она говорит нам ничего.\n\nЕсть одна мысль. Есть место, где §YКапитан§! и мы вместе прячемся от наемников. Безопасное место. Может быть, вы что-то находите там."
 grand_archive.8210.name: "Убежище обнаружено"
 grand_archive.8210.desc: "Существо по имени $NAME_Smeegibb$, которое мы повстречали на [from.GetPlanetMoon]е [from.GetName], поделилось с нами координатами заброшенного убежища, в котором раньше они с §Yкапитаном Несс§! скрывались вместе. Изучив это место, мы можем найти следующий фрагмент §YНебесной карты§! или хотя бы зацепку, которая укажет нам направление для поисков."
 grand_archive.8210.a: "Начинаем копать."
 smeegibb_digsite_poi: "Изучение убежища"
 smeegibb_digsite_poi_desc: "Это место раскопок может таить зацепку для обнаружения следующего фрагмента §HНебесной карты§!. Если мы хотим продолжить поиски клада §Hкапитана Несс§!, надо изучить это заброшенное убежище."
 NAME_Bemat_cruiser_inax_01: "Хебер"
 #Treasure Hunters Origin - Smeegibb
 smeegibb_digsite: "Древнее убежище"
 smeegibb_digsite_desc: "Среди промерзших пустошей [fromfrom.planet.GetPlanetMoon]ы [fromfrom.planet.GetName] мы засекли небольшое убежище с неактивной системой жизнеобеспечения и жилыми отсеками. Оно сильно потрепано, а тысячелетия снегопадов частично погребли его под слоем снега и льда."
 grand_archive.8220.name: "Дневник капитана"
 grand_archive.8220.desc: "В раскопанном сооружении явно жили очень подолгу. Когда-то местные склады были доверху забиты средствами первой необходимости. Различные безделушки и любопытные предметы попадаются по всему зданию. В одной из куч разных документов мы нашли запись из личного дневника §Yкапитана Несс§!.\n\n§L«Мы взяли на абордаж и обнесли еще один периканский грузовой корабль с сокровищами, но в этот раз нам дали отпор. Потеряли больше, чем хотелось бы, но ничего, переживем. Добыча неплохая, хотя жемчужины Тапико и здесь не оказалось. К сожалению, теперь периканцы еще сильнее повысят награду за мою голову, а тут еще и Федерация подключилась. Обстановка накаляется. Наверное, придется на какое-то время залечь на дно».§!"
 grand_archive.8220.a: "Будем искать дальше."
 grand_archive.8225.name: "Убивая время"
 grand_archive.8225.desc: "В самой глубине сооружения мы нашли небольшой тайник с ценностями и базовыми средствами личной гигиены. Мы прочесали прилегающую область сверху донизу, но, к сожалению, так и не нашли никаких признаков фрагмента §YНебесной карты§!.\n\nМы собрали еще несколько дневников и документов в надежде найти зацепки в записях §Yкапитана Несс§!.\n\n§L«С таким компаньоном, как $NAME_Smeegibb$, время течет не так уж невыносимо медленно, но хочу ли я делиться с кем-то славой? Конечно, иметь коллективный разум на подхвате необычайно полезно. Сотни работников всего за одну долю добычи? Выгоднее не придумаешь! Но мне кажется, что вся та работа, что он делает, умаляет мои личные достижения… Не знаю, смогу ли я жить с мыслью, что обязана своим наследием кому-то другому. Нужно хорошенько всё обдумать».§!"
 grand_archive.8225.a: "$grand_archive.8220.a$"
 grand_archive.8230.name: "Достойное наследие"
 grand_archive.8230.desc: "Мы нашли последнюю запись из журнала §Yкапитана Несс§!, спрятанную в вентиляции.\n\n§L«Я не хочу, чтобы меня запомнили такой. $NAME_Smeegibb$ был моим верным спутником, но я не позволю, чтобы все думали, будто я в нем нуждалась. Я смогу покорить галактику в одиночку. Оставлю СВОЙ след в истории, и вся слава будет только моей. Как и богатства.\n\nНадо будет не забыть отправить $NAME_Smeegibb$у что-нибудь на память обо мне».§!\n\nБольше здесь ничего нет. Ни следов капитана, ни каких-либо признаков §YНебесной карты§!.\n\nБыть может, упомянутый подарок $NAME_Smeegibb$у укажет на местонахождение последнего фрагмента. Нужно связаться с ним еще раз."
 grand_archive.8230.a: "Закончить раскопки."
 grand_archive.8236.name: "$NAME_Smeegibb$ исчез"
 grand_archive.8236.desc.default: "$smeegibb_shelter_system_2_poi_desc$"
 grand_archive.8236.desc.xenophile: "$smeegibb_shelter_system_2_poi_desc$\n\nНадеемся, наш новый друг в безопасности."
 grand_archive.8236.a: "К системе [smeegibb_system.GetName]"
 grand_archive.8241.name: "«$NAME_BlackNeedle$» возвращается"
 grand_archive.8241.desc: "На орбите [smeegibb_shelter.GetPlanetMoon]ы [smeegibb_shelter.GetName] мы заметили внушительную флотилию с флагами пиратской организации, известной как §Y«$NAME_BlackNeedle$»§!. Вероятно, эти пираты шли по нашему следу и уничтожили поселение, где скрывалось единение $NAME_Smeegibb$. Должно быть, они до сих пор ищут следующий фрагмент §YНебесной карты§!.\n\nПризнаков разумной жизни на [smeegibb_shelter.GetPlanetMoon]е не осталось.\n\nС пиратского флагмана поступает сообщение."
 grand_archive.8245.name: "$NAME_CaptainInax$ из группировки «$NAME_BlackNeedle$»"
 grand_archive.8245.desc.inax.1: "§HФасеточные глаза гордо стоящего перед нами членистоногого ярко сверкают. Его выдержанная осанка резко контрастирует с дергающимися мандибулами, то и дело щелкающими от перевозбуждения.§!\n\nИтак, вот мы и встретились. Как только вам, мягкотелым, удалось победить §Yк-к-капитана Хоо§!? Даже этот старый к-к-кретин без труда расправился бы с вашей жалкой флотилией. Вы еще поплатитесь за то, что"
 grand_archive.8245.desc.inax.2: "Спасибо, что привели нас сюда. §Y$NAME_SilverQuill$§! уже сотню с лишним цик-к-клов охотится за этим жалким Смигиббом. Когда я покончу с этой древней враждой, мне очень хорошо заплатят… Но сначала — разберусь с вами."
 grand_archive.8245.desc.ransacked: "$grand_archive.8245.desc.inax.1$ обчистили нашу стоянк-к-ку на [black_needle_base.GetPlanetMoon]е [black_needle_base.GetName].\n\n$grand_archive.8245.desc.inax.2$"
 grand_archive.8245.desc.stolen: "$grand_archive.8245.desc.inax.1$ умык-к-кнули добычу §Y«Черной Иглы»§!.\n\n$grand_archive.8245.desc.inax.2$"
 grand_archive.8245.a: "Кто ты?"
 grand_archive.8245.a.reply: "Для вас я к-к-капитан Инакс, к-к-контр-адмирал §Y«Черной Иглы»§!.\n\nТеперь вы знаете имя того, кто вас прик-к-кончит. Это достойная смерть. Советую принять ее с честью.\n\nПо традиции, я даже оставлю за вами право первого выстрела."
 grand_archive.8245.b: "Вы убили $NAME_Smeegibb$а…"
 grand_archive.8245.b.reply.common: "Это было несложно. Мы здорово разукрасили его лачугу моллюск-к-коидной кровью. Ни флота, ни оружия… рано или поздно кто-нибудь всё равно бы его шлепнул. §Y«Черная Игла»§! всегда бьет наверняк-к-ка.\n\nЗначит, вы дружили? К-к-какая прелесть. Ничего, еще немного — и вы воссоединитесь. Именем §YСеребряного Пера§! клянусь: мы заберем эту карту"
 grand_archive.8245.b.reply.default: "$grand_archive.8245.b.reply.common$ с ваших еще подергивающихся останк-к-ков."
 grand_archive.8245.b.reply.robot: "$grand_archive.8245.b.reply.common$ с ваших угасающих обломк-к-ков."
 grand_archive.8245.c: "$NAME_SilverQuill$? Кто это?"
 grand_archive.8245.c.reply: "Вы не знаете §Y$NAME_SilverQuill$§!? К-к-какие же вы недалекие. Наш легендарный основатель был настоящим гением. Начав всего с одного к-к-корабля, он превратил §Y«Черную Иглу»§! в организацию галак-к-ктического масштаба.\n\n«Черная Игла» хранит его наследие. Ваша к-к-кончина станет следующей нотой нашей песни."
 grand_archive.8245.d: "Зачем вам $celestial_chart$?"
 grand_archive.8245.d.reply: "Неужели самим невдомек? Эта к-к-карта ведет к сокровищам §Yк-к-капитана Несс§!! Там хранятся все к-к-кредиты и драгоценности, что она награбила за свою жизнь.\n\nЭти богатства наши. К-к-когда мы до них доберемся, наши имена войдут в историю. Вся галактика будет трепетать, заслышав о §Y«Черной Игле»§!… И вы споете первую ноту песни о нашем величии. Как можно отк-к-казаться от такой щедрости?"
 grand_archive.8245.e: "Без боя мы не сдадимся."
 grand_archive.8245.e.reply: "Тогда споем! Я преподнесу ваши [this.species.GetRemnantNamePlural] к-к-командиру, отличные будут трофеи."
 grand_archive.8265.name: "$grand_archive.8245.name$"
 grand_archive.8265.desc: "Славная битва! Вы не такие уж и слабак-к-ки. Мы недооценили вас дважды, но больше это не повторится. В следующий раз §Y«Черная Игла»§! обрушит на вас всю свою мощь.\n\nТолько не принимайте это за угрозу. Это смертный приговор."
 grand_archive.8265.a.scared: "Тревожно…"
 grand_archive.8265.a.homicidal: "Посмотрим, кто кого."
 grand_archive.8265.a.gestalt: "Переговоры окончены."
 gateway_to_ness_treasure_system_poi: "Сокровища ждут"
 gateway_to_ness_treasure_system_poi_desc: "§H$celestial_chart$§! завершена. Она указывает на последнюю скрытую систему под названием [Prev.GetName]. Наши долгие поиски вот-вот увенчаются успехом. Вперед, пора узнать, что нас там ждет!"
 TREASURE_HUNTERS_CHART_PIECE_3_PROJECT: "Спрятанная капсула"
 TREASURE_HUNTERS_CHART_PIECE_3_PROJECT_DESC: "Учитывая результаты нашего расследования, следующий фрагмент §HНебесной карты§! должен быть спрятан где-то среди руин поселения на [this.GetPlanetMoon]е [this.GetName].\n\nВероятно, он хранится в такой же прочной капсуле, как и другие фрагменты, а значит должен был уцелеть даже после недавней бомбардировки."
 grand_archive.8270.name: "Секрет статуи"
 grand_archive.8270.desc: "Наши поиски четвертого фрагмента §YНебесной карты§! на [from.GetPlanetMoon]е [from.GetName] увенчались успехом. Капсула была обнаружена внутри статуи трутня из ныне истребленного единения $NAME_Smeegibb$. На постаменте статуи было написано следующее:\n\n§L«Моему верному помощнику в знак благодарности. Да будет твоя жизнь в одиночестве долгой и мирной».§!\n\nКогда мы расшифруем последний фрагмент карты, мы сможем продолжить поиски сокровища §Yкапитана Несс§!."
 TREASURE_HUNTERS_ANCIENT_CAPSULE_4_PROJECT: "Последний фрагмент карты"
 TREASURE_HUNTERS_ANCIENT_CAPSULE_4_PROJECT_DESC: "Мы нашли капсулу в руинах поселения $NAME_Smeegibb$а, и теперь осталось только расшифровать содержащиеся внутри данные и завершить §HНебесную карту§!. Скоро мы узнаем, что §H$NAME_CaptainNess$§! подготовила для нас в конце пути."
 grand_archive.8280.name: "Карта завершена"
 grand_archive.8280.desc: "После расшифровки последний фрагмент завершил §YНебесную карту§!. Промежуточные точки, которые мы посетили за время путешествия, зажглись на ней огоньками. Затем эти четыре огня замигали в унисон и раскрыли местоположение еще одной системы.\n\nФинальный кусочек данных дал нам дополнительные возможности. Как оказалось, §Y$celestial_chart$§! — это не просто набор указаний. В ней содержится информация о затерянных богатствах и сокровищницах с награбленным по всей галактике, которую когда-то собрала §Y$NAME_CaptainNess$§!. Часть этих данных могла устареть, но устройство вполне может указать на тайники с ценностями, спрятанные в наших системах.\n\nБолее того, §Y$celestial_chart$§! содержит оценку сокровищ, найденных капитаном за всю карьеру. Подробные записи рассказывают, как находить и оценивать редкости, а также как наиболее выгодно преподнести их покупателям. Повторная активация устройства предоставит нам проект уникального хранилища сокровищ, благодаря которому наши колонии смогут пользоваться непревзойденными познаниями капитана и пополнять казну."
 grand_archive.8280.a.lom: "Бесценное сокровище."
 grand_archive.8285.name: "Сокровища ждут"
 grand_archive.8285.desc: "Завершение §YНебесной карты§! — это великое достижение для [this.GetName&gen]. Все ее тайны раскрыты, и перед нами лежит единственно верное направление: к системе [gateway_to_ness_treasure_system.GetName].\n\nПреодолев множество препятствий, мы оказались в одном шаге от цели. Остался лишь один вопрос: что мы найдем в конце пути, означенного §YНебесной картой§!?\n\nНикто не скажет наверняка, успех нас ждет или разочарование, но это лишь подливает масла в огонь любопытства. Отправимся же к финальной главе нашего приключения!"
 grand_archive.8285.a.default: "Вперед."
 grand_archive.8285.a.lom: "Курс на сокровища!"
 councilor_head_treasure_hunter: "Главный кладоискатель"
 councilor_head_treasure_hunter_female: "$councilor_head_treasure_hunter$"
 councilor_head_treasure_hunter_desc: "$TITLE$ внимательно изучает §Yнебесную карту§! — она помогает искать скрытые тайники и определять ценность артефактов."
 councilor_corporate_head_treasure_hunter: "$councilor_head_treasure_hunter$"
 councilor_corporate_head_treasure_hunter_female: "$councilor_head_treasure_hunter$"
 councilor_corporate_head_treasure_hunter_desc: "$councilor_head_treasure_hunter_desc$"
 prospect_of_treasure_modifier: "Предвкушение сокровищ"
 prospect_of_treasure_modifier_tt: "За каждый уровень правителя $ruler$ $mod_treasure_trove_reward_mult$ повышается на §G$@prospect_of_treasure_treasure_trove_reward|0%$§!, $mod_planet_treasure_gatherers_produces_mult$ на §G$@prospect_of_treasure_treasure_gatherers_produces|0%$§!, а $mod_country_base_energy_produces_add$ на §G$@prospect_of_treasure_energy_produces|0$§!\n\n"
 grand_archive.8290.name: "Тяга к сокровищам"
 grand_archive.8290.desc.chart: "После основания на [from.GetPlanetMoon]е [from.GetName] хранилища сокровищ можно утверждать, что §Y$celestial_chart$§! способна серьезно повлиять на нашу экономику."
 grand_archive.8290.desc.trove: "При раздаче ресурсов, обнаруженных в кладе с [from.GetPlanetMoon]ы [from.GetName], мы поняли, что §Y$celestial_chart$§! способна серьезно повлиять на нашу экономику."
 grand_archive.8290.desc.default: "Чтобы извлечь из §Yкарты§! как можно больше пользы, мы учредили в совете новую должность. В обязанности занимающего ее советника будут входить поиск и сбор сокровищ."
 grand_archive.8290.desc.gestalt: "Чтобы извлечь из §Yкарты§! как можно больше пользы, мы предприняли меры, позволяющие выделять дополнительные ресурсы на поиск и сбор сокровищ."
 grand_archive.8290.desc.chart.default: "$grand_archive.8290.desc.chart$\n\n$grand_archive.8290.desc.default$"
 grand_archive.8290.desc.chart.gestalt: "$grand_archive.8290.desc.chart$\n\n$grand_archive.8290.desc.gestalt$"
 grand_archive.8290.desc.trove.default: "$grand_archive.8290.desc.trove$\n\n$grand_archive.8290.desc.default$"
 grand_archive.8290.desc.trove.gestalt: "$grand_archive.8290.desc.trove$\n\n$grand_archive.8290.desc.gestalt$"
 grand_archive.8290.tt: "\n§EПозволяет открыть место в совете:§!\n§H$t$$councilor_head_treasure_hunter$§!\n$tt$$COUNCIL_POSITION_MODIFIER_BASE$\n$ttt$$mod_treasure_trove_reward_mult$: §G+$@councilor_head_treasure_hunter_treasure_trove_reward|0%$§!\n$ttt$$mod_planet_treasure_gatherers_produces_mult$: §G+$@councilor_head_treasure_hunter_treasure_gatherers_produces|0%$§!\n$ttt$$mod_country_base_energy_produces_add$: §G+$@councilor_head_treasure_hunter_energy_produces|0$§!\n$COUNCIL_POSITION_AVAILABLE_FOR$$t$$scientist_with_icon$ $commander_with_icon$"
 grand_archive.8300.name: "Занятые червями врата"
 grand_archive.8300.desc.common: "Скорее всего, именно эти врата приведут нас к искомому кладу."
 grand_archive.8300.desc.did_encounter_voidworms: "Карта привела нас к ранее необнаруженной черной дыре, и система просто кишит пустотными червями. Они обустроили гнездо в древних вратах неподалеку, а самый крупный из них кружит возле этого сооружения, явно не желая никого к нему подпускать.\n\n$grand_archive.8300.desc.common$ Если мы хотим довести дело до конца, придется разделаться с пустотными червями и отремонтировать врата."
 grand_archive.8300.desc.didnt_encounter_voidworms: "Карта привела нас к ранее необнаруженной черной дыре, и система просто кишит странными созданиями. Они скопились у древних врат неподалеку, а самый крупный из них кружит вокруг этого сооружения, явно не желая никого к нему подпускать.\n\nВ наших каталогах космической фауны нет ничего похожего на эти огромные червеподобные создания. На данный момент мы пытаемся установить контакт. $grand_archive.8300.desc.common$ Если мы хотим довести дело до конца, придется разобраться с этими существами и отремонтировать врата."
 grand_archive.8300.a: "Ничто не встанет у нас на пути."
 grand_archive.8300.a.pacifist: "Если иного выбора нет…"
 grand_archive.8300.a.lom: "Залп из всех орудий!"
 GATEWAY_VOIDWORMS_KILL_PROJECT: "$grand_archive.8300.name$"
 GATEWAY_VOIDWORMS_KILL_PROJECT_DESC: "§H$celestial_chart$§! привела нас к §Hвратам§! в сисеме [this.solar_system.GetName], у которых обосновалась какая-то живность. От этих вредителей нужно избавиться, иначе мы не сможем активировать врата и не узнаем, что ждет нас на другой стороне."
 GATEWAY_VOIDWORMS_KILL_PROJECT_TT: "§RПобедите существ в системе [this.solar_system.GetName]§!"
 GATEWAY_VOIDWORMS_DEBRIS_PROJECT: "Останки пустотных червей"
 GATEWAY_VOIDWORMS_DEBRIS_PROJECT_DESC: "Мы улавливаем необычные сигналы от останков пустотных червей в системе [this.solar_system.GetName]. Наши сканеры указывают на признаки жизни внутри одной из разлагающихся троек. Стоит отправить туда научный корабль и подробнее изучить источник сигналов."
 grand_archive.8310.name: "Выводок пустотных червей"
 grand_archive.8310.desc.did_encounter_voidworms: "Внутри панциря одного из пустотных червей мы нашли выводок куколок. Несмотря на то, что мы перебили их родню, они приблизились к нашим кораблям и начали жалобно летать вокруг.\n\n$grand_archive.8310.desc.common$"
 grand_archive.8310.desc.didnt_encounter_voidworms: "Внутри панциря одного из змееподобных существ мы нашли выводок молодняка. Несмотря на то, что мы перебили их родню, они приблизились к нашим кораблям и начали жалобно летать вокруг.\n\n$grand_archive.8310.desc.common$"
 grand_archive.8310.desc.common: "При желании эту инстинктивную привязанность можно обратить себе на пользу: повзрослевший выводок превратится во внушительную органическую флотилию, послушную нам."
 grand_archive.8310.a: "Удивительная находка."
 grand_archive.8310.a.tt: "Мы получим флотилию: §Y§2$epic$§! $voidworms_small_plural$ ($@gateway_voidworm_nymph_reward_count|0$)§!"
 grand_archive.8310.b: "Легкая добыча."
 grand_archive.8315.name: "Изучить технологию врат"
 grand_archive.8315.desc: "Врата в системе [FromFromFrom.System.GetName] бездействуют. Благодаря §Yнебесной карте§! мы смогли, приблизившись к древнему сооружению, лучше понять устройство этой давно потерянной технологии. Представление о старинных методах телепортации еще может пригодиться в других областях."
 RESEARCH_GATEWAY_ACTIVATION_PROJECT: "$grand_archive.8315.name$"
 RESEARCH_GATEWAY_ACTIVATION_PROJECT_DESC: "$grand_archive.8315.desc$"
 RESEARCH_GATEWAY_ACTIVATION_PROJECT_TT: "Исследовать технологию £physics£§Y«$tech_gateway_activation$»§!"
 grand_archive.8325.name: "Активировать врата"
 grand_archive.8325.desc.common: "Мы возобновили сообщение между системами, однако карта не показывает ничего нового. Но скоро ее тайны окажутся раскрыты."
 grand_archive.8325.desc.tech: "Мы исследовали соответствующую технологию и теперь можем активировать древние врата в системе [gateway_to_ness_treasure_system.GetName].\n\n$grand_archive.8325.desc.common$"
 grand_archive.8325.desc.kill.known: "С существами покончено, теперь осталось только активировать древние врата в системе [gateway_to_ness_treasure_system.GetName].\n\n$grand_archive.8325.desc.common$"
 grand_archive.8325.desc.kill.unknown: "С пустотными червями покончено, теперь осталось только активировать древние врата в системе [gateway_to_ness_treasure_system.GetName].\n\n$grand_archive.8325.desc.common$"
 ACTIVATE_GATEWAY_PROJECT: "$grand_archive.8325.name$"
 ACTIVATE_GATEWAY_PROJECT_DESC: "Поскольку §H$celestial_chart$§! указывает на недействующие §Hврата§! в системе [this.solar_system.GetName], вероятно, они ведут в какое-то важное место."
 ACTIVATE_GATEWAY_PROJECT_TT: "§HАктивируйте врата§!"
 grand_archive.8400.name: "Хо-хо, сокровища!"
 grand_archive.8400.desc: "Мы активировали врата, к которым вела §Y$celestial_chart$§!, и обнаружили по ту сторону систему [ness_treasure_system.GetName]. Распределение небесных тел совпадает с набросками из дневника §Yкапитана Несс§!.\n\nНаше долгое путешествие почти окончено."
 grand_archive.8400.a: "Вперед."
 ness_treasure_system_poi: "Пройдите через врата в системе [from.solar_system.GetName]"
 ness_treasure_system_poi_desc: "Мы следовали всем указаниями §HНебесной карты§!, попутно сражаясь с пиратами и космическими чудищами. Наконец, мы стоим на пороге активированных врат, и остается лишь узнать, что нас ждет на той стороне."
 #Megastructure
 gateway_ness_ruined: "$gateway_ruined$"
 gateway_ness_ruined_DESC: "$gateway_ruined_DESC$"
 gateway_ness_ruined_MEGASTRUCTURE_DETAILS: "$gateway_ruined_MEGASTRUCTURE_DETAILS$"
 gateway_ness_restored: "$gateway_final$"
 gateway_ness_restored_DESC: "$gateway_final_DESC$"
 gateway_ness_restored_MEGASTRUCTURE_DETAILS: "$gateway_final_MEGASTRUCTURE_DETAILS$"
 NESS_GRAND_ARCHIVE: "Клад капитана Несс"
 NESS_GRAND_ARCHIVE_HOARDED: "$NESS_GRAND_ARCHIVE$"
 grand_archive.8405.name: "Засада!"
 grand_archive.8405.desc: "За нами был хвост.\n\nВ системе [ness_treasure_system.GetName] нас поджидала внушительная флотилия §Y«Черной Иглы»§!. С нашей прошлой встречи их численность заметно выросла: они притащили даже списанные военные корабли и снабженные высококлассным вооружением гражданские. Похоже, для этой встречи они собрали все резервы. В центре флотилии расположился флагман — огромный корабль класса $titan$.\n\nХотя корабли находятся в боевом построении, большинство еще не навело на нас свои орудия. Похоже, они рассчитывают на переговоры.\n\nМы получили сообщение с флагмана."
 grand_archive.8405.a.lom: "Посмотрим, что они скажут."
 grand_archive.8410.name: "$NAME_CobaltQuill$, капитан группировки «$NAME_BlackNeedle$»"
 grand_archive.8410.desc: "§HНесмотря на невысокий рост, капитан излучает авторитет. Он смотрит на нас оценивающим взглядом, словно на часть сложного уравнения.§!\n\nНаконец-то мы встретились. К вашим услугам $NAME_CobaltQuill$, капитан прославленной §Y«Черной Иглы»§! и скромный потомок нашего основателя $NAME_SilverQuill$. Много же лет вы путались у меня под ногами, однако мне не чуждо благоразумие, поэтому хочу предложить вам сделку.\n\nМы дадим вам солидное вознаграждение в обмен на завершенную карту и позволим уйти отсюда подобру-поздорову.\n\nЕсли откажетесь, у нас не будет иного выбора, кроме как забрать желаемое силой. Даже если забыть о непревзойденной мощи нашего флота, мы внедрились на многие ключевые посты вашего государства. От полного краха вас отделяет лишь одно мое слово."
 grand_archive.8410.a: "Что вы предлагаете?"
 grand_archive.8410.a.reply: "Несмотря на все неудобства, что вы мне причинили, и предлагаю вам солидное вознаграждение в обмен на завершенную реликвию §Yкапитана Несс§!.\n\nЕсли вы примете это щедрое предложение, я готов забыть о прошлых обидах. Нам незачем продолжать этот конфликт. И тем более — усугублять его…"
 grand_archive.8410.b: "Это неприкрытая угроза…"
 grand_archive.8410.b.reply.common_1: "[this.GetName] для меня как открытая книга. Я знаю, где пролегают ваши каналы поставок, где расположены ваши бункеры для ресурсов, где находятся ваши космические базы… Я знаю всё, что только можно."
 grand_archive.8410.b.reply.common_2: "Мои соратники славно потрудились. Я уже представляю, как именно толкну ваше государство к распаду. Я заморю ваши планеты голодом, заберу припасы и уничтожу всё, что еще будет живо. Если, конечно, вы не захотите отдать мне кое-что…"
 grand_archive.8410.b.reply.default: "$grand_archive.8410.b.reply.common_1$\n\nЯ слежу за каждым доверенным лицом под вашим руководством — и за их близкими тоже…\n\n$grand_archive.8410.b.reply.common_2$"
 grand_archive.8410.b.reply.hive_mind: "$grand_archive.8410.b.reply.common_1$\n\nЯ отслеживаю все главные узлы вашего коллектива и знаю, когда появляются новые.\n\n$grand_archive.8410.b.reply.common_2$"
 grand_archive.8410.b.reply.machine: "$grand_archive.8410.b.reply.common_1$\n\nУ меня есть доступ к вашей матрице местоположения, и я могу отследить любой важный узел вашей сети.\n\n$grand_archive.8410.b.reply.common_2$"
 grand_archive.8410.c: "К чему тогда эти переговоры?"
 grand_archive.8410.c.reply: "Столь крупная диверсия обходится недешево. Содержание кораблей, зарплаты, взятки — всё это стоит денег, а я разбогател не потому, что разбрасывался ими направо и налево. Весь масштаб разрушений, от которых вас отделяет одно нажатие кнопки, сопряжен со значительной упущенной прибылью.\n\nЯ бы предпочел направить с таким трудом заработанные средства в куда более прибыльное русло. Давайте избежим ненужного кровопролития. Забирайте свою добычу и оставьте пиратские дела пиратам."
 grand_archive.8410.d: "Дело не только в деньгах, не так ли?"
 grand_archive.8410.d.reply: "5000 лет назад мой великий предок, $NAME_SilverQuill$, был первым помощником капитана Несс. Многие годы он верно служил ей, и чем же она отплатила?\n\nПредательством!\n\nОна сдала его правительству и прикарманила награду! Но естественно, ни одна тюрьма не удержала бы $NAME_SilverQuill$.\n\nПосле смелого побега он воспрял из пепла и выковал из своей разношерстной команды легендарную «Черную Иглу», какую вы знаете сегодня. Он поклялся отомстить капитану Несс за вероломство и посвятил всю жизнь тому, чтобы найти ее сокровища и похоронить ее наследие под весом собственного успеха.\n\nЯ лишь продолжаю его дело. Эта карта — ключ к тому, что наше по праву.\n\nА теперь будьте так любезны, передайте нам карту."
 grand_archive.8415.name: "Смелое предложение"
 grand_archive.8415.desc: "Глава §Y«Черной Иглы»§! сделал нам предложение: солидное вознаграждение в обмен на §YНебесную карту§!. Если мы согласимся, то лишимся ключа к сокровищам §Yкапитана Несс§!.\n\nОтказом же мы навлечем на себя весь их гнев. Неизвестно, насколько глубоко пираты внедрились в наше государство, но они заявляют, что способны полностью уничтожить [this.GetName&acc] изнутри. Блеф это или реальная угроза — остается только гадать."
 grand_archive.8415.a: "Отказать им."
 grand_archive.8415.b: "Продать §YНебесную карту§!."
 grand_archive.8415.b.effect_tt: "Лишиться §YНебесной карты§!\nПолучить §G+$@max_credit_mult|0%$§! от максимального запаса £energy£ §Yэнергокредитов§!\nПолучить корабль из §Y«Черной Иглы»§!"
 grand_archive.8500.name: "Сделка состоялась"
 grand_archive.8500.desc: "Мы передали §YНебесную карту§! в обмен на крупную сумму в $MONEY$ и внушительный боевой флагман под названием §Y«Игольное Ушко»§!. Можно считать, что наши разногласия с §Y«Черной Иглой»§! улажены раз и навсегда.\n\nБлагодаря такому решению мы не стали испытывать на себе всю мощь их флотилий и предотвратили диверсию галактического масштаба.\n\nЛучше и правда оставить пиратские дела пиратам."
 grand_archive.8500.a: "Больше нам тут делать нечего."
 grand_archive.8500.a.tt: "Все наши корабли будут выброшены из системы $TREASURE_TROVE$."
 HOARD_LOOTED_BY_PIRATES: "Это сооружение разграбили пираты, здесь не осталось ничего ценного"
 grand_archive.8505.name: "Диверсия!"
 grand_archive.8505.desc: "§Y«$NAME_BlackNeedle$»§! запустила полномасштабную диверсию, сея хаос в наших системах. Сборочные конвейеры встали, генераторы сгорели, а важная административная инфраструктура вышла из строя. В поставках перебои, базы данных исследовательских станций стерты, шахты обрушиваются в пять раз чаще обычного.\n\nУщерб заметен повсеместно: таков результат слаженной работы тысяч коварных подставных лиц. Обширная сеть диверсантов раскинулась по всем нашим колониям, и они всегда на шаг впереди."
 grand_archive.8505.a: "Объявить чрезвычайное положение!"
 situation_sabotage: "Диверсанты из «Черной Иглы»"
 situation_sabotage_type: "$situation_sabotage$"
 situation_sabotage_desc: "Обширная диверсионная сеть §Y«Черной Иглы»§! скрывается в наших колониях и вызывает массовые разрушения по [owner.GetName::всему|||fem:всей|||pl:всем] [owner.GetName&dat]. Если мы не избавимся от диверсантов, урон продолжит нарастать, пока линии поставок полностью не оборвутся."
 situation_sabotage_monthly_change_tooltip: "$situation_monthly_change_tooltip_approaches_dependent$"
 approach_sabotage_do_nothing: "Ничего не делать"
 approach_sabotage_do_nothing_tt: "Мы не будем предпринимать никаких особых действий."
 approach_sabotage_purge: "Устранить диверсантов"
 approach_sabotage_purge_tt: "Отлов скрывающихся среди нас тайных агентов неизбежно повлечет за собой сопутствующий урон."
 approach_sabotage_mitigate: "Смягчить ущерб"
 approach_sabotage_mitigate_tt: "Мы можем предпринять ответные меры и восстановить часть инфраструктуры, чтобы продержаться, пока диверсия не прекратится."
 finisher_effects_sabotage: "Мы избавимся от диверсантов «Черной Иглы» и не дадим им усилить блокаду Клада капитана Несс."
 finisher_effects_sabotage_fail: "Наша инфраструктура понесет непоправимый ущерб, а «Черная Игла» усилит блокаду Клада капитана Несс."
 grand_archive.8520.name: "Диверсионная сеть раскрыта"
 grand_archive.8520.desc.common: "Мы перехватили тайную частоту, на которой §Y«$NAME_BlackNeedle$»§! осуществляет связь между нашими колониями. После расшифровки передач мы выявили каждого заговорщика, каждого предателя-диверсанта в своих рядах."
 grand_archive.8520.desc.machine: "$grand_archive.8520.desc.common$\n\nИх оперативники тайно распространяли вредоносное программное обеспечение по нашим операционным системам, подготавливая армию модулей-бунтовщиков на различных позициях в наших системах.\n\nЖертвой вредоносного программного кода стал даже один из важнейших независимых узлов [root.GetName&gen] — §Y[traitor_leader.GetClass] [traitor_leader.GetName]§!."
 grand_archive.8520.desc.hive: "$grand_archive.8520.desc.common$\n\nИх оперативники заполняли наши зоны обитания диссоциативными феромонами, из-за которых у множества трутней начали развиваться отклонения. Выведя трутней из-под влияния улья, пираты превратили их в спящих агентов, которые теперь подрывают нашу инфраструктуру.\n\nЖертвой этой масштабной диверсии стал даже один из важнейших независимых узлов [root.GetName&gen] — §Y[traitor_leader.GetClass] [traitor_leader.GetName]§!."
 grand_archive.8520.desc.default: "$grand_archive.8520.desc.common$\n\nМы узнали, что их оперативники годами переманивали на свою сторону недовольных граждан, подготавливая спящие ячейки и различные активы для полномасштабной атаки против нас.\n\nСреди предаталей [traitor_leader.GetAXX::оказался|||fem:оказалась] §Y[traitor_leader.GetClass] [traitor_leader.GetName]§!, что влечет за собой серьезные риски для безопасности. Нам следует разобраться с [traitor_leader.GetAXX::этим перебежчиком|||fem:этой перебежчицей], не привлекая лишнего внимания. Если общественность узнает, насколько сильно прогнило правительство, ничем хорошим это не закончится."
 grand_archive.8520.a.default: "Казнить предателей."
 grand_archive.8520.a.machine: "Отключить неисправные модули."
 grand_archive.8520.a.hive: "Устранить трутней с отклонениями."
 grand_archive.8520.a.tt: "На каждой населенной планете погибнет §R100§! £pop£ §Hпоселений§!."
 grand_archive.8520.b.default: "Перевоспитать предателей."
 grand_archive.8520.b.machine: "Перепрограммировать неисправные модули."
 grand_archive.8520.b.hive: "Заново ассимилировать трутней с отклонениями."
 grand_archive.8520.c: "Раскрыть имена предателей."
 grand_archive.8525.name.default: "Предатель казнен"
 grand_archive.8525.name.hive: "Трутень устранен"
 grand_archive.8525.name.machine: "Модуль отключен"
 grand_archive.8525.desc.common: "После выявления перехода на сторону пиратов §Y«Черной Иглы»§!"
 grand_archive.8525.desc.default: "$grand_archive.8525.desc.common$ [traitor_leader.GetName] [traitor_leader.GetAXX::был казнен|||fem:была казнена].\n\nТочные обстоятельства [traitor_leader.GetAXX::его|||fem:ее] смерти решено не разглашать."
 grand_archive.8525.desc.hive: "$grand_archive.8525.desc.common$ [traitor_leader.GetName] [traitor_leader.GetAXX::был устранен|||fem:была устранена]."
 grand_archive.8525.desc.machine: "$grand_archive.8525.desc.common$ [traitor_leader.GetName] [traitor_leader.GetAXX::был отключен|||fem:была отключена]."
 grand_archive.8525.a: "Необходимая мера."
 grand_archive.8530.name.default: "Предатель перевоспитан"
 grand_archive.8530.name.hive: "Трутень переобучен"
 grand_archive.8530.name.machine: "Модуль перепрограммирован"
 grand_archive.8530.desc.default: "$grand_archive.8525.desc.common$ [traitor_leader.GetName] [traitor_leader.GetAXX::был успешно перевоспитан|||fem:была успешно перевоспитана].\n\nК сожалению, переобучение наложило на [traitor_leader.GetAXX::него|||fem:нее] неизгладимый отпечаток."
 grand_archive.8530.desc.hive: "$grand_archive.8525.desc.common$ [traitor_leader.GetName] [traitor_leader.GetAXX::был успешно переобучен|||fem:была успешно переобучена].\n\nК сожалению, повторная ассимиляция наложила на [traitor_leader.GetAXX::него|||fem:нее] неизгладимый отпечаток."
 grand_archive.8530.desc.machine: "$grand_archive.8525.desc.common$ [traitor_leader.GetName] [traitor_leader.GetAXX::был успешно перепрограммирован|||fem:была успешно перепрограммирована].\n\nК сожалению, повторное форматирование наложило на [traitor_leader.GetAXX::него|||fem:нее] неизгладимый отпечаток."
 grand_archive.8530.a.tt: "[traitor_leader.GetName] получает 2 уровня отрицательных признаков"
 grand_archive.8535.name: "[traitor_leader.GetName] [traitor_leader.GetAXX::найден мертвым|||fem:найдена мертвой]"
 grand_archive.8535.desc: "$grand_archive.8525.desc.common$ разгневанные граждане [root.GetName&gen] устроили массовые протесты. Жаждущая справедливого наказания толпа ворвалась в дом, где [traitor_leader.GetAXX::проживал|||fem:проживала] [traitor_leader.GetName]. Позднее [traitor_leader.GetAXX::он был обнаружен мертвым|||fem:она была обнаружена мертвой] на месте происшествия."
 grand_archive.8536.name: "[traitor_leader.GetAXX::Предатель|||fem:Предательница] раскаивается"
 grand_archive.8536.desc: "$grand_archive.8525.desc.common$ [traitor_leader.GetName] [traitor_leader.GetAXX::выступил|||fem:выступила] перед публикой и [traitor_leader.GetAXX::выразил|||fem:выразила] глубочайшее раскаяние в своих действиях. Похоже, вся эта ситуация оставила неизгладимый отпечаток на [traitor_leader.GetAXX::его|||fem:ее] лидерских качествах.\n\nНесмотря на все прегрешения, что [traitor_leader.GetAXX::совершил|||fem:совершила] [traitor_leader.GetName], граждане [root.GetName&gen], похоже, готовы простить [traitor_leader.GetAXX::его|||fem:ее]."
 grand_archive.8536.a: "Такое развитие событий не может не радовать."
 grand_archive.8536.a.tt: "[traitor_leader.GetName] получает один уровень отрицательных признаков"
 grand_archive.8545.name: "Коллапс инфраструктуры"
 grand_archive.8545.desc: "К сожалению, мы не смогли помешать разрушительной деятельности §Y«Черной Иглы»§!. Их диверсанты нанесли непоправимый ущерб нашей логистической инфраструктуре. На то, чтобы восстановить цепочки поставок, теперь уйдут годы. Они настолько глубоко укоренились во всех наших системах, что даже просто смягчить урон оказалось невозможным.\n\nНо это не помешает нам заполучить §Y$NESS_GRAND_ARCHIVE$§!. Нам нужно одолеть пиратов в открытом бою, и тогда сокровище будет нашим."
 grand_archive.8545.a: "Битва еще не окончена."
 grand_archive.8550.name: "Нас не сломить"
 grand_archive.8550.desc: "Несмотря на отчаянные попытки §Y«Черной Иглы»§! разрушить нашу инфраструктуру, мы восстановились и стабилизировались. Их агенты потерпели неудачу, и теперь осталось лишь разгромить их составную флотилию в системе [hoard_system.GetName] и заполучить §Y$NESS_GRAND_ARCHIVE$§! во славу [root.GetName&gen]."
 grand_archive.8550.a: "Не будем медлить."
 grand_archive.8555.name: "«$NAME_BlackNeedle$» разгромлена"
 grand_archive.8555.desc: "У §Y«Черной Иглы»§! не было ни единого шанса против нашего могучего флота. Теперь их составная флотилия разбита, и они больше не смогут продолжать диверсии в наших системах, а мы вольны заполучить §Y$NESS_GRAND_ARCHIVE$§! во славу [root.GetName&gen]."
 grand_archive.8555.a: "Жалкие потуги."
 grand_archive.8555.a.lom: "Ничтожные сухопутные крысы."
 TREASURE_HUNTERS_BLACK_NEEDLE_PROJECT: "Последний бой «Черной Иглы»"
 TREASURE_HUNTERS_BLACK_NEEDLE_PROJECT_DESC: "Помимо масштабной диверсии в системах [root.GetName&gen], «$NAME_BlackNeedle$» продолжает блокировать §H$NESS_GRAND_ARCHIVE$§!. Они уже израсходовали почти все свои ресурсы и находятся в очень уязвимом положении. Если бы разобьем их там, вся их масштабная организация наверняка рассыпется, и мы сможем беспрепятственно забрать сокровище."
 TREASURE_HUNTERS_BLACK_NEEDLE_PROJECT_TOOLTIP: "§RПобедите «Черную Иглу» в системе [solar_system.GetName].§!"
 grand_archive.8560.name: "$grand_archive.8410.name$"
 grand_archive.8560.desc: "Дети Несс… Как иронично.\n\nИзвестно ли вам, что она выбрала вас?\n\nУ нее были сотни других вариантов… но она выбрала именно вас. Быть может, она увидела в вас нечто необычное, или вам просто повезло. Как бы то ни было, такова реальность.\n\nВы победили… на этот раз. Но не думайте, что мы дадим вам почивать на лаврах. Вы нажили себе грозного врага. §Y«$NAME_BlackNeedle$»§! никого не прощает и ничего не забывает.\n\nКак и наши предки, мы не склонимся ни перед чем. Шаг за шагом мы восстановим всё, что потеряли. Даже если на это уйдет тысяча, миллион лет — мы вернемся и вернем то, что вы у нас отняли.\n\n«$NAME_BlackNeedle$» будет жить вечно! Вечно!"
 grand_archive.8560.a: "Время покажет."
 grand_archive.8560.a.lom: "Чешите отсюда, салаги."
 CAPTAIN_NESS_HOARD_PROJECT: "Клад капитана Несс"
 CAPTAIN_NESS_HOARD_PROJECT_DESC: "§H$NESS_GRAND_ARCHIVE$§! наш.\n\nНесмотря на внешнюю заброшенность, многие сооружения в системе до сих пор действуют. Учитывая то, что мы знаем о характере §Hкапитана Несс§!, нам следует опасаться внезапных защитных систем.\n\nВ люке единственного входа в сокровищницу есть выемка. Мы можем вставить в нее §HНебесную карту§! и открыть этот загадочный комплекс."
 grand_archive.8565.name: "Сокровище капитана Несс"
 grand_archive.8565.desc: "§Y$celestial_chart$§! была ключом, а сокровищница — его замочной скважиной. Она идеально подошла к выемке на главном люке мегасооружения.\n\nКарта включилась, и все отмеченные на ней звездные системы, что мы посетили, соединились лучом света. Древние механизмы загудели, и вскоре мы оказались внутри.\n\nВсё здесь, от пола до потолка, усеяно невероятными сокровищами из тысяч миров. Изысканные статуи соседствуют с грозным оружием — и те, и другие выполнены из драгоценных металлов. Прекрасные украшения свисают с конечностей древних окаменелостей, а вокруг беспорядочно разбросаны замысловатые устройства.\n\nМеталлическая поступь нарушила тишину центрального зала. Перед нами предстала гуманоидного вида машина, заполненная жидкостью и с поднятыми вверх руками в знак мирных намерений. Она произносит сквозь потрескивание своих речевых схем:\n\n§L«Так значит… вы всё же нашли мою карту. Какие же вы смышленые».§!"
 grand_archive.8565.a: "Открыть канал связи."
 grand_archive.8565.a.lom: "Здравия желаем, капитан!"
 grand_archive.8570.desc: "§HНесмотря на эмоциональную ограниченность механической оболочки, капитан Несс даже в облике машины умудряется выказывать некоторое самодовольство. На ее металлическом теле не видно никаких следов износа, будто оно совсем новое. Ее тон спокойный и покровительственный, словно она обращается к кому-то ниже по статусу.§!\n\nПолагаю, мне следует представиться, хотя вы уже сами могли догадаться, кто я.\n\nМеня зовут Саанда Несс — раньше так звали, по крайней мере. Бывшая «Королева пиратов всей галактики», а ныне хозяйка этой холодной жестянки.\n\n§HМашина ненадолго замолкает, окидывая нас взглядом.§!\n\nОчень давно я не видела вашу расу. Вы уже далеко не так примитивны, совсем повзрослели!\n\nДолжна сказать, я приятно удивлена, что вы нашли путь сюда."
 grand_archive.8570.a: "Как вы выжили?"
 grand_archive.8570.a.reply_fallen_empire: "Бессмертие обходится недешево. Я отдала паре ученых из [fallen_empire.GetRealName&gen] несколько миллионов кредитов, чтобы они тайком переместили мое сознание. Они неплохо постарались, хотя танцевать, как прежде, я уже не могу.\n\n$grand_archive.8570.a.reply$"
 grand_archive.8570.a.reply_curator: "Бессмертие обходится недешево. Я отдала паре ученых из Ордена кураторов несколько миллионов кредитов, чтобы они тайком переместили мое сознание. Они неплохо постарались, хотя танцевать, как прежде, я уже не могу.\n\n$grand_archive.8570.a.reply$"
 grand_archive.8570.a.reply: "§HНесколько нажатий на пульт управления — и в стене открывается потайная ниша. Внутри — криокамера, где покоятся останки органического существа.§!\n\nВот и я. Толку никакого, но это тело мне дорого как память. Ну чем не красавица?\n\nПоложив всё куда надо, я закрыла это хранилище и отключилась на несколько тысяч лет. А потом сюда проникли вы, и теперь вот пожалуйста — мы беседуем. А кажется, будто только вчера заснула…"
 grand_archive.8570.b: "Где вы набрали столько сокровищ?"
 grand_archive.8570.b.reply: "Украла, в основном. Или выменяла на краденое. Были времена, когда я обчистила всех крупных игроков в галактике. От грузовых кораблей до разрушителей планет — назовите что угодно, и это будет в моем послужном списке. Моя логика проста: если я могу что-то отобрать, значит, бывший хозяин не особо этим дорожит.\n\nИногда всё заходило… слишком далеко. Вы видели, что стало с иттеритами. Тот случай открыл мне глаза.\n\nВсё это весело ровно до того момента, пока не случится трагедия…"
 grand_archive.8570.c: "Почему вы выбрали нас?"
 grand_archive.8570.c.reply: "Поверите, если я скажу, что мне было одиноко?\n\n§HПотрескивание речевых схем машины отдаленно напоминает смех.§!\n\nУ меня было столько сокровищ, но какой в них толк? Зачем мне всё это? Я поняла, что мне нужны были не богатства, а наследие. Но наследие не украдешь — его надо создавать.\n\nЧто ж, это и стало моей попыткой. Я нашла несколько многообещающих примитивных рас и оставила в их мирах сокровище… и карту, конечно. Кто первым соберет все фрагменты карты, тот пройдет испытание и будет достоин унаследовать труд всей моей жизни. И вот… вы здесь.\n\nБыть может, вам удастся то, что оказалось не под силу мне, и вы найдете всему этому достойное применение."
 grand_archive.8570.d: "Зачем отдавать всё?"
 grand_archive.8570.d.reply: "Говорю же, я передаю эстафету. У меня не особо получается тратить деньги — только отбирать их.\n\nНо я бы не стала отдавать всё это кому попало. Это должен быть кто-то достаточно смышленый, чтобы добраться сюда — команда, которой я могла бы гордиться. С которой я могла бы поделиться своей историей…"
 grand_archive.8570.e: "Какова же ваша история?"
 grand_archive.8570.e.reply: "Ну, раз уж вы спросили…\n\n§HМашина активирует консоль, и на стене появляется ряд цифровых записей.§!\n\nВсё это хранилище — моя биография. Я немало заплатила команде творцов, чтобы те запечатлели все памятные моменты моей жизни. Думаю, они неплохо постарались.\n\n§HИзображения сменяются и теперь представляют пиратскую команду с капитаном Несс во главе, еще в своем биологическом облике. Речевые схемы машины издают небольшой смешок, сменяющийся тоскливым вздохом.§!\n\nКогда-то я была самым грозным пиратом в галактике. Я разоряла мегакорпорации, похищала планеты и стирала в порошок целые государства. Каждый, у кого хватало глупости перейти мне дорогу, оказывался на острие моего клинка или навсегда отправлялся за решетку в обмен на щедрое вознаграждение. А уж какую награду обещали за меня! Астрономическая сумма."
 grand_archive.8570.f: "Продолжайте, пожалуйста."
 grand_archive.8570.f.reply: "§HПод героическую музыку воспроизводятся записи различных ограблений, задержаний и дерзких побегов.§!\n\nПоначалу я тщательно выбирала цели и находила какие-нибудь оправдание своим действиям. Каждое дело было увлекательнее предыдущего. Всё проходило по одной схеме: планирование, демонизация, ограбление и празднование успеха. Проблема была лишь в том, что на поиск «плохих» целей уходило слишком много времени.\n\nМне нравилось смотреть, как числа становятся всё больше: и вознаграждение за мою голову, и суммарная ценность моих трофеев. Я вписывала свое имя в историю, да с такой силой, что обо мне уже точно бы никогда не забыли. Всё остальное было неважно."
 grand_archive.8570.g: "И что изменилось?"
 grand_archive.8570.g.reply: "§HНа изображениях предстали обломки родного мира иттеритов.§!\n\nТот случай с иттеритами… Вы ведь видели последствия? Я до сих пор помню крики в радиоэфире, когда обрывались жизни последних представителей их рода. Всё зашло слишком далеко. Пора было что-то менять.\n\nЗа свою карьеру я поняла одну закономерность: история меркнет, уроки забываются, и кто-то другой обязательно займет твое место. Я лишь хотела сама выбрать, кто это будет.\n\nЭто вы. Вы, [root.GetSpeciesNamePlural], прошли испытание. Теперь будущее зависит от вас."
 grand_archive.8575.name: "Несметные богатства"
 grand_archive.8575.desc.default: "§Y$NESS_GRAND_ARCHIVE$§! содержит невообразимые богатства. Однако нам следует подумать о возможных последствиях, если мы заберем их себе.\n\nВсе кредиты до единого в этой сокровищнице получены незаконно. Если мы их присвоим, это будет значить, что мы закрываем глаза на криминальную деятельность капитана Несс в обмен на материальные блага.\n\nС другой стороны, многие из тех, кого капитан Несс обокрала, давно сгинули. Никто не пострадает, если мы заберем богатства себе. Кроме того, мы разделались с §Y«Черной Иглой»§! — именно благодаря нам в галактике стало безопаснее. Мы прошли долгий путь и вполне заслуживаем должную награду.\n\nПора принять решение, как нам распорядиться сокровищами."
 grand_archive.8575.desc.lom: "§Y$NESS_GRAND_ARCHIVE$§! — это сокровищница, каких галактика еще не видела, и мы рады столь крупной добыче.\n\nВ наши [This.Species.GetHandNamePlural] попала заслуженная награда за победу над §Y«Черной Иглой»§! — троекратное ура [this.GetName&dat]!\n\nПора вычистить это хранилище. Свистать всех наверх!"
 grand_archive.8575.a.default: "Забрать сокровища."
 grand_archive.8575.a.lom: "Забрать нашу заслуженную добычу."
 grand_archive.8575.b: "Вернуть всё владельцам, которых удастся найти."
 grand_archive.8575.c: "Распределить сокровища по всей галактике."
 grand_archive.8580.name: "Наша покровительница"
 grand_archive.8580.desc.1: "§HМашина по имени §Y$NAME_CaptainNess$§! оказалась впечатлена тем, как быстро мы опустошили ее хранилище.§!\n\nНе стесняйтесь, вы это заслужили. Чтобы собрать эти сокровища, ушло немало крови, пота и слез. Не тратьте всё сразу."
 grand_archive.8580.desc.2: "§HМашина по имени §Y$NAME_CaptainNess$§! не оценила наше решение вернуть часть ее с таким трудом добытых сокровищ.§!\n\nКакая досада. Теперь какая-то седьмая вода на киселе получит старые драгоценности своих предков. Что ж, надеюсь, оставшееся добро вы пустите на более стоящие проекты. Я верю, что вы хорошо распорядитесь им, даже несмотря на этот сомнительный акт благотворительности."
 grand_archive.8580.desc.3: "§HМашина по имени §Y$NAME_CaptainNess$§! оказалась очень недовольна нашим решением раздать все сокровища.§!\n\nЗначит, таков был ваш план с самого начала? Бесплатное добро для всех желающих? Какое расточительство!\n\nЯ была о вас лучшего мнения… Дайте мне в командование хотя бы одну из своих флотилий, чтобы я могла отбить всё это назад."
 grand_archive.8580.desc.default: "§HТеперь остался лишь вопрос, что делать с капитаном Несс. Она опытный пилот, переживший немало опасных столкновений, и отлично послужила бы нам в роли боевого командира. Либо она могла бы взять на себя роль поддержки и помочь с обучением следующего поколения пилотов.§!"
 grand_archive.8580.desc.no_lom: "§HЕсли, конечно, мы не решим бросить ее в тюрьму и показать нашим гражданам, что за преступлениями всегда следует наказание. У нее будет много времени на раздумья о содеянном.§!"
 grand_archive.8580.desc.gestalt: "§HТеперь осталось лишь решить, что делать с капитаном Несс. Она сильный, независимый разум и могла бы стать незаменимым командиром, предлагающим изобретательные стратегии, которые помогут застать врагов врасплох. Или мы могли бы включить ее обширный опыт в свои коллективные знания и использовать его для более глубокого понимания боевых действий.\n\nЕсли, конечно, мы не решим бросить ее в тюрьму, продемонстрировав, что преступность в [this.GetName&prep] не приветствуется.§!"
 grand_archive.8580.a: "Пилот нам бы пригодился."
 grand_archive.8580.a.tt: "Получить §Yбессмертного адмирала§! 10-го уровня"
 grand_archive.8580.b: "§YМы включим ваш опыт в наше сознание.§!"
 grand_archive.8580.c: "§YПомогите нам тренировать новых пилотов.§!"
 grand_archive.8580.d: "§RВам самое место за решеткой.§!"
 grand_archive.8585.desc: "Вот так, значит?\n\nПросто пошлете меня куда подальше?\n\nЯ разочарована… Ну тогда я пойду.\n\nУдачи, наверное."
 grand_archive.8585.a: "Мы ничем вам не обязаны."
 grand_archive.8590.desc: "Пустоголовые кретины! Я предложила вам весь мир на блюдечке, а вы решили отплатить мне кандалами? Вы не заслуживаете моих даров! Не заслуживаете даже начищать мои сапоги!\n\nЧерная метка на [this.GetName&acc], я проклинаю вас всех!\n\nЧтоб ваши [this.species.GetRemnantNamePlural] гнили в пустоте космоса, а имена были забыты."
 grand_archive.8590.a: "Ни одно преступление не остается безнаказанным."
 grand_archive.8595.name: "$NAME_CaptainNess$ деактивирована"
 grand_archive.8595.desc: "Заключенная машина по имени §Y$NAME_CaptainNess$§! была найдена деактивированной в своей камере. Похоже, она намеренно вызвала критическую перегрузку своих микросхем, отключив основные системы и стерев все данные своего перенесенного сознания. На стене было нацарапано сообщение:\n\n§LОтправляйтесь в бездну…§!"
 grand_archive.8595.a: "Туда ей и дорога."
 grand_archive.8600.name: "Новые горизонты"
 grand_archive.8600.desc.common: "Теперь мы сами кузнецы своего счастья. Карта больше не укажет нам путь — за нее это сделают звезды.\n\nКакие подвиги мы совершим? Как впишем свое имя в историю?"
 grand_archive.8600.desc.default: "Это приключение подошло к концу. Поиски сокровищ §Hкапитана Несс§! окончены.\n\n$grand_archive.8600.desc.common$\n\nСегодня мы начинаем новую главу в истории [this.GetName&gen]."
 grand_archive.8600.desc.lom: "Об этом приключении будут слагать легенды! Мы нашли затерянное сокровище капитана Несс и ни одной другой команде не позволили встать у нас на пути.\n\n$grand_archive.8600.desc.common$\n\nПусть флаг [this.GetName&gen] развевается высоко и гордо. Начинается новая глава нашей истории!"
 grand_archive.8600.a.default: "Вперед!"
 grand_archive.8600.a.lom: "Йо-хо-хо!"
 valuable_insight: "Ценные знания."
 grand_archive.9960.name: "$tech_alien_cloning$"
 grand_archive.9960.desc: "Мы поймали представителей дикой космической фауны в системе [from.solar_system.GetName] и уверены, что при должных научных изысканиях сможем клонировать больше таких существ."
 grand_archive.9960.a: "$valuable_insight$"
 grand_archive.9970.name: "Потенциал для мутаций"
 grand_archive.9970.desc: "В системе [from.solar_system.GetName] был создан первый клон представителя космической фауны.\n\nБлагодаря нашим познаниям в ксенобиологии мы могли бы даже при необходимости улучшить физиологию этих существ. Так мы сможем снабдить наши органические флотилии специализированными боевыми компонентами."
 grand_archive.9970.a: "$valuable_insight$"
 opinion_return_traceable_items_tier_1: "Галактический филантроп"
 opinion_return_traceable_items_tier_1_tt: "§G+$@opinion_return_traceable_items_tier_1_value|0$§! к £opinion£ отношениям со всеми не склонными к геноциду государствами, с которыми мы не воюем."
 opinion_return_traceable_items_tier_2: "$opinion_return_traceable_items_tier_1$"
 opinion_return_traceable_items_tier_2_tt: "§G+$@opinion_return_traceable_items_tier_2_value|0$§! к £opinion£ отношениям со всеми не склонными к геноциду государствами, с которыми мы не воюем."
