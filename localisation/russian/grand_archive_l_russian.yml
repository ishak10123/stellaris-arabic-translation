 VOIDLURE_ATTRACTED_FAUNA_TITLE: "Новые космические организмы"
 VOIDLURE_ATTRACTED_FAUNA_DESC: "Наша приманка привлекла космическую фауну."
 NAME_Lured_Fauna: "Временно привлеченная фауна"
 wildlife_ranch: "Животная ферма"
 wildlife_ranch_desc: "Мы живем в полном согласии с обитателями родной планеты. Охрана их естественной среды и поддержание популяции — наша главная задача."
 wildlife_ranch_2: "Природные просторы"
 wildlife_ranch_2_desc: "Тщательный подход к управлению экосистемой позволяет улучшить условия обитания местной фауны и способствует развитию животноводства."
 wildlife_ranch_3: "Центр дикой природы"
 wildlife_ranch_3_desc: "Обширный комплекс, полностью предоставленный животным. Здесь они живут в спокойствии и комфорте, а потому обеспечивают нас высококачественными ресурсами."
 hunting_grounds: "Охотничьи угодья"
 hunting_grounds_desc: "Тренировочный комплекс, где начинающие охотники постигают премудрости своего дела. Здесь они учатся владеть как современным энергетическим оружием, так и традиционными средствами ближнего боя. Забрать в качестве трофея грозного хищника сможет только самый ловкий и умелый охотник."
 hunting_grounds_2: "Охотничьи просторы"
 hunting_grounds_2_desc: "Тренировочно-наблюдательный комплекс с оптимальными условиями охоты на местную фауну. С помощью тепловых карт охотники ищут свежие следы и добывают славные трофеи."
 hunting_grounds_3: "Охотничий центр"
 hunting_grounds_3_desc: "Огромное пространство, где вольно чувствуют себя целые группы добытчиков. Охотники с первоклассным оружием и снаряжением проходят особую подготовку — их учат как можно эффективнее добывать только лучшую дичь."
 wildlife_sanctuary: "Природный заповедник"
 wildlife_sanctuary_desc: "В этом заповеднике изучают диких зверей в естественной среде обитания. Численность и здоровье популяции тщательно контролируется. Изучение само по себе приносит пользу науке, но главное — мы узнаём больше о родной природе."
 wildlife_sanctuary_2: "Улучшенный заповедник"
 wildlife_sanctuary_2_desc: "Каждого обитателя этого заповедника здесь изучают отдельно. Пищевые и медицинские потребности удовлетворяются с минимальным вмешательством в среду обитания. В индивидуальных экосистемах происходит повторное заселение и размножение вымирающих видов."
 wildlife_sanctuary_3: "Заповедный комплекс"
 wildlife_sanctuary_3_desc: "С помощью хорошо замаскированной инфраструктуры здесь следят за животными и заботятся о них. Исследователям запрещено вмешиваться в естественное поведение наблюдаемых, чтобы не искажать поступающие научные данные."
 primal_arena: "Первобытная арена"
 primal_arena_desc: "В центре этого амфитеатра сильнейшие воины нашего народа сходятся в беспощадном бою со свирепыми зверями. Ничто так не радует зрителей, как торжество воина… или его гибель."
 primal_arena_2: "Первобытный стадион"
 primal_arena_2_desc: "Здесь опытные хэндлеры обучают целые группы животных нападать согласованно. Бойцам с животным недостаточно будет просто грубой силы — противников придется побеждать хитростью."
 primal_arena_3: "Первобытный Колизей"
 primal_arena_3_desc: "Поистине впечатляющая арена, построенная для проведения грандиозных боев с животными. Подготовка к каждому выступлению длится неделями, а количество зрителей исчисляется миллионами."
 symbiosis_nexus: "Симбиотический узел"
 symbiosis_nexus_desc: "Заповедник, где мы принимаем к себе дикую фауну. Каждое существо может предложить нашим умам что-то свое."
 symbiosis_nexus_2: "Симбиотические просторы"
 symbiosis_nexus_2_desc: "Центральный заповедник, где наши партнеры по симбиозу объединяются в самостоятельные стада. Управление существами со слабыми умственными способностями — залог стабильного мышления нашего сплетения умов."
 symbiosis_nexus_3: "Симбиотический комплекс"
 symbiosis_nexus_3_desc: "Огромный комплекс, сооруженный ради одной цели: объединения умов всех существ на пользу нашему коллективному разуму."
 edict_space_fauna_exhibition: "Выставка космической фауны"
 space_fauna_exhibition: "$edict_space_fauna_exhibition$"
 edict_space_fauna_exhibition_desc: "Скотоводы со всей галактики выставляют здесь своих подопечных. Обладателю лучшего скота вручается награда «Звезда выставки»."
 edict_beasts_burden: "Тягловые животные"
 beasts_burden: "$edict_beasts_burden$"
 edict_beasts_burden_desc: "Самый выносливый скот должен заниматься самым тяжелым трудом."
 edict_creature_welfare: "Благополучие животных"
 creature_welfare: "$edict_creature_welfare$"
 edict_creature_welfare_desc: "Обеспечение прирученным животным беззаботной и счастливой жизни — наша ответственность."
 edict_crack_the_whip: "Щелчок бичом"
 crack_the_whip: "$edict_crack_the_whip$"
 edict_crack_the_whip_desc: "Все мы разные, но боль — универсальный стимул. Надо лишь научиться правильно ее причинять."
 edict_exotic_network: "Экзотическая нейронная сеть"
 exotic_network: "$edict_exotic_network$"
 edict_exotic_network_desc: "Умы подопечных нам малых организмов обладают достаточной пропускной способностью на случай нашей потребности в таковой при сложных вычислениях."
 edict_defensive_instincts: "Инстинкты самосохранения"
 defensive_instincts: "$edict_defensive_instincts$"
 edict_defensive_instincts_desc: "Мы едины. Пора сплестись на уровне инстинктов и бросить вызов космосу."
 edict_biological_overdrive: "Биологическая перегрузка"
 biological_overdrive: "$edict_biological_overdrive$"
 edict_biological_overdrive_desc: "Меньших существ можно будет доводить до предела возможностей, если установить правильные нейронные рецепторы."
 grand_archive.1060.name: "Падаль: [from.GetSpaceFaunaName]"
 grand_archive.1060.desc: "После того как [from.GetSpaceFaunaNamePlural] вышли с нами на контакт, мы обнаружили в системе [fromfrom.GetName] разлагающийся труп одного из представителей этого вида. Похоже, останки находятся в космосе уже достаточно долго: они иссохли и замерзли.\n\nМы предполагаем, что именно этот труп и привлек внимание других — возможно, [from.GetSpaceFaunaGroup] этих существ ищет отбившуюся особь. [from.GetSpaceFaunaName] редко встречает в космосе естественную смерть, поэтому нам представилась уникальная возможность изучить биологию трупа."
 TIYANKI_GROUP_NAME: "стадо"
 SPACE_AMOEBA_GROUP_NAME: "стая"
 CRYSTAL_GROUP_NAME: "выводок"
 VOIDWORM_GROUP_NAME: "рой"
 CUTHOLOID_GROUP_NAME: "череда"
 voidworm_carcass_01_object: "Останки пустотного червя"
 carcass_01_object: "Труп космической фауны"
 CARRION_DEBRIS_PROJECT: "[met_critter.GetSpaceFaunaName]: вскрытие"
 CARRION_DEBRIS_PROJECT_DESC: "В системе [contact_system.GetName] обнаружен труп космического существа. [met_critter.GetSpaceFaunaName] — любопытный объект; изучив останки внимательнее, мы сможем лучше понять природу этих животных."
 grand_archive.1065.name: "Вскрытие завершено"
 grand_archive.1065.desc: "Мы завершили вскрытие трупа в системе [contact_system.GetName]. Оказалось, что в своих останках [met_critter.GetSpaceFaunaName] содержит прекрасно сохранившуюся биологическую особь. Благодаря такой находке мы приобрели ценные знания о физиологии этого существа."
 grand_archive.1065.specimen_tt: "§MЭпич.§! ['concept_specimen'] (фауна)"
 NAME_BoneShip: "Костяной корабль"
 NAME_BoneShip_desc: "Этот корабль украшен усиками взрослых тиянки, рядами зубов пустотных червей и черепом неизвестного нам существа. На борту он несет целые батареи высокоточных орудий."
 grand_archive.1069.name: "$NAME_BoneShip$"
 grand_archive.1069.desc: "В системе [from.GetName] связь с нами установило необычно выглядящее космическое судно. $NAME_BoneShip_desc$\n\nЕго капитан, наивно согласившийся на переговоры, без промедлений был [GetExecuted]. Мы забрали этот диковинный корабль себе и включили его в состав флота. Среди личных вещей капитана обнаружилось достаточно полезное руководство для охотников."
 grand_archive.1069.a: "Приятный подарок."
 EXECUTED: "казнен"
 DEVOURED: "сожран"
 grand_archive.1070.name: "$NAME_BoneShip$"
 grand_archive.1070.desc: "В системе [from.GetName] связь с нами установило необычно выглядящее космическое судно. $NAME_BoneShip_desc$\n\nНас вызывают на всех частотах."
 grand_archive.1070.a: "Открыть канал связи."
 NAME_PrimalHunter: "Цериз т’Ксал"
 primal_hunter_desc: "Умелый охотник, блуждающий по галактике в поисках крупной добычи."
 primal_hunter_catchphrase: "§L«Я хочу пополнить коллекцию трофеев».§!"
 grand_archive.1075.name: "$grand_archive.1070.name$"
 grand_archive.1075.desc: "§HГолос угрюмого охотника сух. Иногда он надламывается, словно хозяин не разговаривал уже много недель. Не тратя времени на формальности, Цериз переходит к делу. Глаза его всё время смотрят на нас; взгляд одновременно уважителен и грозен.§!\n\nЯ добываю трофеи. Мало кто может меня удивить. Но вам это удалось.\n\nЯ хочу присоединиться к вашим охотникам — при условии, что это сотрудничество принесет пользу нам обоим и поможет всем научиться новому."
 grand_archive.1075.a: "Кто вы?"
 grand_archive.1075.a.reply: "Меня зовут $NAME_PrimalHunter$. Уже много лет я охочусь в этих системах. Мне нужна новая добыча, а вы — умелые следопыты.\n\nМеня ведет только одно: охотничий азарт."
 grand_archive.1075.b: "Что это за череп на вашем корабле?"
 grand_archive.1075.b.reply: "Последний из своего рода. Он долго сопротивлялся."
 grand_archive.1075.c: "Сколько вы уже за нами наблюдаете?"
 grand_archive.1075.c.reply: "Очевидно, вам еще многое предстоит постичь.\n\nХороший охотник будет незаметно преследовать свою добычу столько, сколько потребуется. Совершить смертельный выстрел можно только втайне. Неважно, сколько времени я провел в тени — важно, что я вышел из нее."
 grand_archive.1075.d: "Почему вы хотите к нам присоединиться?"
 grand_archive.1075.d.reply: "Мне не нужна конкуренция. Я не люблю делить территорию, но всё же скорее предпочту работать сообща с другими охотниками, чем состязаться с ними за добычу.\n\nВы выслеживаете — я убиваю."
 grand_archive.1075.hire: "Нанять"
 grand_archive.1075.hire_tt: "§Y$NAME_PrimalHunter$§! присоединяется к нашему государству в качестве §Hлидера§!."
 grand_archive.1075.dismiss: "Игнорировать"
 grand_archive.1080.name: "Странствующий ксенолог"
 grand_archive.1080.desc: "Наша космическая база в системе [from.GetName] приняла сигнал от одинокого исследовательского корабля, действующего самостоятельно. Это судно, оборудованное внушительным комплектом ловушек и аналитических устройств, приспособлено под ловлю и изучение космических форм жизни.\n\nНас вызывают на всех частотах."
 grand_archive.1080.a: "Открыть канал связи."
 NAME_PrimalRancher: "Руук Квабруук"
 primal_rancher_desc: "Этот ксенолог не представляет жизни без работ на местности. За свою жизнь она успела изучить целое множество космических зверей."
 primal_rancher_catchphrase: "§L«Каждое существо может нам что-нибудь рассказать. А я очень люблю слушать!»§!"
 grand_archive.1085.desc: "§HПронзительный аналитический ум Руук не дает ей покоя: она то и дело бросает отрывистые взгляды на небольшое карманное устройство. Даже при разговоре с нами она ведет какие-то заметки, однако речь ее любезна и профессиональна, хоть и несколько отстраненна.§!\n\nПохоже, не только меня интересуют космические существа. Должна сказать, исследования, которые ведет [root.GetName], крайне показательны. Мне бы очень хотелось помочь вашему научному отделу в работе, если, конечно, вы не против."
 grand_archive.1085.a: "Кто вы?"
 grand_archive.1085.a.reply: "Простите, я слишком забегаю вперед.\n\nМеня зовут Руук. Я изучаю космическую фауну непосредственно на местах. Моя группа собирает сведения о миграции животных, составе их организмов и биоразнообразии на галактическом уровне.\n\nЯ, например, еще с младых перьев люблю животных. Где я, там обязательно и Фулуфф."
 grand_archive.1085.b: "Кто такой Фулуфф?"
 grand_archive.1085.b.reply: "Самый лучший друг во°всей галактике!\n\nЯ бы вам его показала, но он сейчас спит. У себя дома мы их заводим в качестве питомцев. Я его забрала себе, когда была там в прошлый раз. Он такой милашка! Стучит копытцами по полу, когда бегает, грызет мои перья… А какой у него хохолок, какие глазки!.. Думаю, вам он тоже понравится, когда… если мы начнем сотрудничать."
 grand_archive.1085.c: "Как вы нас нашли?"
 grand_archive.1085.c.reply: "Мы выслеживали одну особь — она вела себя нетипично. Так мы обнаружили ваш научный отряд, который уже изучал это существо. Вы так бережно отнеслись к чужеродной форме жизни, что я заинтересовалась вашими исследованиями, и они впечатлили меня еще больше. Мне всегда приятно встречать единомышленников."
 grand_archive.1085.d: "Почему вы хотите к нам присоединиться?"
 grand_archive.1085.d.reply: "Потому что, если честно, вольному ученому просто не на что жить. Я люблю свою работу, однако не могу вечно искать, где заработать — на науку просто не остается времени.\n\nПоэтому [root.GetName] — это для меня возможность посвятить всё время любимому делу, то есть изучению космической жизни. У меня будет больше ресурсов, а заодно я смогу поработать с вашими учеными, ведь у нас общая цель."
 grand_archive.1085.hire: "Нанять"
 grand_archive.1085.hire_tt: "§Y$NAME_PrimalRancher$§! присоединяется к нашему государству в качестве §Hлидера§!."
 grand_archive.1085.dismiss: "Игнорировать"
 grand_archive.1100.name: "Животный вой"
 grand_archive.1100.desc: "Мы обнаружили значительное количество необычных электромагнитных волн, исходящих из сектора, не отмеченного на наших картах.\n\nПервоначальный анализ показал, что они схожи с сигналом, которым пользуются §Yпустотные черви§! для связи друг с другом, хотя конкретно эти волны менее регулярны, а их амплитуда значительно выше. Этот феномен следует изучить."
 grand_archive.1100.a: "Тревожно."
 grand_archive.1105.name: "Воющие пустотные черви"
 grand_archive.1105.desc: "Мы обнаружили источник страшных звуков: они исходят из скрытой системы, населенной §Yпустотными червями§! и соседствующей с системой [frenzied_voidworms_target.solar_system.GetName].\n\nОбитающие здесь пустотные черви совсем не похожи на тех, которые встречались нам ранее: эти существа — мутанты. Среди них нет троек, а некоторые наблюдаемые нами взрослые особи занимаются неистовым совокуплением.\n\nТакое зрелище нас встревожило. Отсутствие у этого улья характерного для паразитов поведения означает, что он может размножаться независимо от планетарных хозяев."
 grand_archive.1105.desc_no_homicidal: "\nЕсли не воспрепятствовать размножению этого подвида, он полностью разрушит баланс галактической экосистемы. Постепенный рост агрессии позволяет предположить, что [frenzied_voidworms_target.GetName] находится под угрозой — существа готовятся напасть."
 grand_archive.1105.desc_2: "\nНужно приготовиться к обороне."
 grand_archive.1105.a: "Высшая степень боеготовности!"
 situation_frenzied_voidworms: "Бешеные пустотные черви"
 situation_frenzied_voidworms_type: "$situation_frenzied_voidworms$"
 situation_frenzied_voidworms_desc: "Мы обнаружили крупный улей мутировавших пустотных червей. Они проявляют повышенную агрессивность и, похоже, научились размножаться непаразитическим образом.\n\nНаше присутствие вызывает у них раздражение. Действовать следует осторожно.\n\n[GetVoidwormsHostility]"
 situation_frenzied_voidworms_monthly_change_tooltip: "$situation_monthly_change_tooltip_approaches_dependent$"
 finisher_effects_frenzied_voidworms: "Агрессивные пустотные черви могут напасть на нашу столицу."
 approach_frenzied_voidworms_do_nothing: "Ничего не делать"
 approach_frenzied_voidworms_do_nothing_tt: "Мы не будем предпринимать никаких особых действий."
 approach_frenzied_voidworms_hide_presence: "Скрыть наше присутствие"
 approach_frenzied_voidworms_hide_presence_tt: "Всё строительство в нашей системе, ближайшей к их родной системе, приостановлено."
 approach_frenzied_voidworms_stir_nests: "Побеспокоить гнезда"
 approach_frenzied_voidworms_stir_nests_tt: "Спровоцировав этих существ, мы сделаем их враждебнее."
 approach_frenzied_voidworms_feed_nests: "Накормить обитателей гнезд"
 approach_frenzied_voidworms_feed_nests_tt: "Если их удастся задобрить, возможно, они начнут нам доверять."
 #Strings for GetVoidwormsHostility trigger loc script
 voidworms_hostility_hostile: "Мутировавшие пустотные черви §Pкрайне агрессивны§!."
 voidworms_hostility_neutral: "Мутировавшие пустотные черви §Sагрессивны§!."
 voidworms_hostility_pacified: "Мутировавшие пустотные черви §Bспокойны§!."
 hide_presence_modifier: "$approach_frenzied_voidworms_hide_presence$"
 hide_presence_starbase_modifier: "$approach_frenzied_voidworms_hide_presence$"
 frenzied_voidworms_killed.desc.common: "Нам удалось сберечь крупнейшее гнездо загадочных мутантов. Теперь мы сможем выращивать этих необыкновенных существ, не боясь, что они бесконтрольно распространятся по галактике."
 grand_archive.1165.name: "Мутировавшие пустотные черви уничтожены"
 grand_archive.1165.desc.common: "Решив не дожидаться неминуемого нападения, мы успешно провели военную операцию против мутировавших пустотных червей в их родной системе. Теперь ни [frenzied_voidworms_target.GetName], ни наша родная планета могут больше не опасаться этих существ."
 grand_archive.1165.desc.default: "$grand_archive.1165.desc.common$ Галактическая экосистема в безопасности.\n\n$frenzied_voidworms_killed.desc.common$"
 grand_archive.1165.desc.homicidal: "$grand_archive.1165.desc.common$ Население будет вновь спать спокойно.\n\n$frenzied_voidworms_killed.desc.common$"
 grand_archive.1165.a: "Триумфальная победа."
 grand_archive.1170.name: "Мутировавшие пустотные черви уничтожены"
 grand_archive.1170.desc.common: "Мы уничтожили мутировавших пустотных червей. Теперь ни [frenzied_voidworms_target.GetName], ни наша родная планета могут больше не опасаться этих существ."
 grand_archive.1170.desc.default: "$grand_archive.1170.desc.common$ Галактическая экосистема в безопасности.\n\n$frenzied_voidworms_killed.desc.common$"
 grand_archive.1170.desc.homicidal: "$grand_archive.1170.desc.common$ Население будет вновь спать спокойно.\n\n$frenzied_voidworms_killed.desc.common$"
 grand_archive.1170.a: "$grand_archive.1165.a$"
 grand_archive.1180.name: "Обнаружены мутировавшие пустотные черви"
 grand_archive.1180.desc: "Уничтожив выводок пустотных червей рядом с гнездом, мы обнаружили, что эти существа мутировали совершенно уникальным образом.\n\nПохоже, они научились размножаться непаразитическом способом, а также пребывали в состоянии повышенной агрессии — это объясняет их противоестественную силу и живучесть.\n\nК счастью, одно из гнезд нам удалось сохранить в качестве трофея. Теперь здесь можно будет выращивать новых особей этого удивительного вида, не беспокоясь, что они бесконтрольно распространятся по галактике."
 grand_archive.1180.a: "Неожиданно, но приятно."
 grand_archive.1185.name: "Пустотные черви уничтожены"
 grand_archive.1185.desc: "Нам стало известно, что грозившие нашей колонии мутировавшие пустотные черви истреблены.\n\nНеожиданно, но приятно. Осознание, что опасность для наших систем миновала, по-настоящему утешает."
 grand_archive.1185.a: "В галактике теперь спокойнее."
 grand_archive.1200.name: "Нападение пустотных червей"
 grand_archive.1200.desc: "Бешеные пустотные черви напали на систему [frenzied_voidworms_target.solar_system.GetName]!\n\nИх агрессия достигла невероятного уровня. Траектория главного роя указывает на то, что пункт назначения червей — [frenzied_voidworms_target.GetName].\n\nПохоже, они намереваются уничтожить всех до единого."
 grand_archive.1200.a: "Приготовиться к обороне."
 grand_archive.1205.name: "Высочайшая цена"
 grand_archive.1205.desc_common: "Несмотря на все наши усилия, [this.GetName] все-таки не выдерживает ярости мутировавших пустотных червей: под их беспощадной бомбардировкой ядро планеты раскалывается, а вместе с ним на кусочки распадается и само небесное тело. Не выжил никто.\n\nЧерви вернулись в свои гнезда и больше не реагируют на наше присутствие раздражением. Если повезет, они здесь и останутся."
 grand_archive.1205.desc.default: "$grand_archive.1205.desc_common$\n\nЕдинственное, что нам остается делать после этой трагедии, — извлечь урок из совершенной ошибки и как-то жить дальше."
 grand_archive.1205.desc.gestalt: "$grand_archive.1205.desc_common$\n\n[event_target:victim_country.GetName] тяжело переживает потерю основного улья, но жизнь продолжается."
 grand_archive.1205.a: "Пора отстраивать всё заново."
 grand_archive.1210.name: "Мутировавшие пустотные черви уничтожены"
 grand_archive.1210.desc: "Мутировавшие пустотные черви, обнаруженные в системе [From.GetName], уничтожены. Мы отомстили за гибель планеты [avenged_homeworld.GetName].\n\nНам удалось сберечь крупнейшее гнездо загадочных мутантов. Теперь мы сможем выращивать этих необыкновенных существ, не боясь, что они бесконтрольно распространятся по галактике.\n\nЗначит, и погибший мир по-своему будет жить дальше."
 grand_archive.1210.a: "$grand_archive.1165.a$"
 grand_archive.1220.name: "Пустотные черви умиротворены"
 grand_archive.1220.desc.common: "Пожертвовав немалым количеством питательных минеральных веществ, доставленных непосредственно к гнездам, мы смогли добиться расположения мутировавших пустотных червей в системе [frenzied_home_system.GetName]. Теперь [frenzied_voidworms_target.GetName] может спать спокойно: угроза со стороны этих существ миновала. Наша планета"
 grand_archive.1220.desc.common_2: "Наши опытные специалисты по животным добились немалых успехов в налаживании контакта с этими существами: похоже, они готовы пойти нам навстречу.\n\nМы забрали одно из самых крупных гнезд и теперь сможем самостоятельно выращивать мутировавших пустотных червей — у нас им будет лучше, чем в космосе."
 grand_archive.1220.desc.default: "$grand_archive.1220.desc.common$ и заодно галактическая экосистема теперь в безопасности.\n\n$grand_archive.1220.desc.common_2$"
 grand_archive.1220.desc.homicidal: "$grand_archive.1220.desc.common$ в безопасности.\n\n$grand_archive.1220.desc.common_2$"
 grand_archive.1220.a: "Приятное дополнение к нашему флоту."
 grand_archive.1220.tt: "Все флотилии бешеных пустотных червей перешли под управление государства"
 grand_archive.7010.name: "Разработаны пустотные приманки"
 grand_archive.7010.desc.common: "На основе опыта работы с космическими организмами мы разработали так называемые §Yпустотные приманки§!."
 grand_archive.7010.desc: "$grand_archive.7010.desc.common$\n\nВозводить эти сооружения нужно на космических базах, расположенных в родных системах того или иного вида космической фауны. Установленные приманки периодически привлекают к базе группы космических существ.\n\nСледует проявлять осторожность: некоторые виды могут быть агрессивны."
 grand_archive.7010.desc.primal_calling: "$grand_archive.7010.desc.common$\n\nЭти устройства посылают сигналы в глубины космоса, привлекая обитающих там существ. Кто-то уже откликнулся на зов: на передаваемых частотах мы всё чаще принимаем регулярные ответные сигналы.\n\nЧто-то приближается."
 grand_archive.7020.name: "Китовая песнь"
 grand_archive.7020.desc: "Разработанная нами §Yпустотная приманка§! привлекла стаю космических китов, обитающих в системах, где есть §Yгазовые гиганты§!, такие как [This.Capital.System.GetName].\n\nПохоже, наши приманки будут действовать только в соответствующих условиях. Если мы обнаружим и другие разновидности космической фауны, рядом с их естественной средой обитания можно будет построить новые приманки."
 ### Treasure Hunters
 origin_treasure_hunters: "Охотники за трофеями"
 origin_treasure_hunters_desc: "Эта цивилизация жаждет приключений, а потому ее представители готовы отправиться в величайший и труднейший поход за всю историю своего существования. Всё, что есть в распоряжении этого стремящегося к звездам народа, — загадочная карта, указывающая на расположение легендарного пиратского клада."
 origin_tooltip_treasure_hunters_effects: "– Начинает с бездействующей ['r_celestial_chart_0_desc', Небесной картой]\n– Все нанятые лидеры обладают дополнительной чертой ['concept_adventurous_spirit_trait']$NEW_LINE$– Черты правителя:$TABBED_NEW_LINE$– ['leader_trait:leader_trait_buccaneer']$TABBED_NEW_LINE$– ['leader_trait:leader_trait_trailblazer']$TABBED_NEW_LINE$– ['leader_trait:leader_trait_treasure_hoarder']"
 START_SCREEN_TREASURE_HUNTERS: "Нашу цивилизацию ведет страсть к приключениям.\n\nПоколение за поколением вырастает на историях о затерянных кладах, древних руинах и артефактах давно прошедших времен. Поиск древностей — главная сила, что вдохновляет нас.\n\nНеудивительно, что наш первый космический полет оказался заодно первым шагом по дороге приключений. На орбите планеты мы обнаружили загадочную капсулу неизвестного происхождения, а внутри — зашифрованную звездную карту.\n\nСпустя несколько лет кропотливой работы мы смогли расшифровать находку и проложить курс в неизвестность. В едином порыве мы отправимся в величайшую и сложнейшую экспедицию за всю историю нашего народа."
 d_treasure_planet: "Хранилище сокровищ"
 d_treasure_planet_desc: "Надежно защищенное помещение для восстановления и хранения ценностей."
 concept_treasure_vault: "$d_treasure_planet$"
 concept_treasure_vault_desc: "$d_treasure_planet_desc$"
 job_treasure_gatherer: "Заведующий сокровищами"
 job_treasure_gatherer_plural: "Заведующие сокровищами"
 job_treasure_gatherer_desc: "Эти деятели обучены устанавливать цену любому редкому и дорогому товару, а потому способны извлечь максимум выгоды из сокровищ, найденных на просторах галактики."
