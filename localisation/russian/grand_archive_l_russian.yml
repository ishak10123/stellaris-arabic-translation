 VOIDWORMS_PROJECT: "Изучение пустотных червей"
 VOIDWORMS_PROJECT_DESC: "Биология и манера размножения пустотных червей требуют подробного изучения."
 tech_voidworm_immunity: "Иммунитет к пустотным червям"
 tech_voidworm_immunity_desc: "Мы можем разработать лекарство от паразитарной инфекции пустотных червей. Все обитатели наших колоний приобретут иммунитет к действующему штамму их спор."
 tech_voidworm_immunity_effect: "Колонии неуязвимы к бомбардировкам со стороны пустотных червей.\n$mod_damage_vs_country_type_voidworms_mult$: §G+$@vaccine_damage_vs_country_type_voidworms_mult|0%$§!"
 tech_voidworm_immunity_effect_during_situation: "§RПока длится нашествие пустотных червей, планеты всегда уязвимы к бомбардировкам.§!\n$mod_damage_vs_country_type_voidworms_mult$: §G+$@vaccine_damage_vs_country_type_voidworms_mult|0%$§!\n§G+$@vaccine_situation_advancement|0$§! к ходу §Yнашествия пустотных червей§!"
