 crystalline_entity_plural: "Кристаллические организмы"
 grand_archive.1002.name: "Жизнь среди звезд"
 grand_archive.1002.desc.default: "Пустота обманчива: на самом деле она полна жизни. Да, нам известно, что существуют [from.GetSpaceFaunaNamePlural], но кто еще ждет нас в глубине мирового пространства?\n\nВозможно, наша тесная связь с фауной планеты [capital_scope.GetName] окажется неуместной в галактическом масштабе, поскольку на просторах космоса может процветать совершенно новая экосистема. Мы оказались на перепутье.\n\nКем станут для нас эти существа?\n\nНадо всё тщательно взвесить: последствия нашего выбора будут отзываться на протяжении многих лет."
 grand_archive.1002.desc.homicidal: "В космической пустоте может процветать жизнь. В нашей власти либо искоренить ее, либо воспользоваться ею себе на благо. Узнав, что в галактике существуют [from.GetSpaceFaunaNamePlural], мы уже не остановимся. Охота начинается. Только нам решать, кем станут эти существа: пищей… или тягловым скотом."
 grand_archive.1002.a: "Экземпляры на выставку."
 grand_archive.1002.b: "Скот нам на пользу."
 grand_archive.1002.c: "Организмы, нуждающиеся в защите."
 grand_archive.1002.d: "Новая добыча для наших охотников."
 grand_archive.1002.d.purifier: "Безжизненная груда костей."
 grand_archive.1002.e: "Разум, который необходимо поглотить."
 grand_archive.1002.f: "Партнеры по симбиозу."
 grand_archive.1002.g: "Дичь, за которой стоит погоняться."
 untamed_wilds: "Неукрощенная природа"
 untamed_wilds_desc: "Широкие охраняемые просторы, где фауна может жить и размножаться в свое удовольствие. Здесь постоянно рождаются местные особи."
 grand_archive.1010.desc: "Жители нашей колонии на [Root.GetPlanetMoon]е [Root.GetName] научились уважать границы местных §Yтитанических форм жизни§!.\n\nЭти исполинские звери будут приносить пользу нашему поселению в деле покорения границ и землеустройства."
 grand_archive.1010.a: "Наши [owner.GetWranglerJobNamePlural] здесь добьются успеха."
