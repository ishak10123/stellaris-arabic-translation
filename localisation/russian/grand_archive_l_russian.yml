 DLC_GRAND_ARCHIVE_RECOMMENDATION_DESC: "Мы рекомендуем дополнение §S$GRAND_ARCHIVE_TITLE$§!, так как некоторые из выбранных вами параметров хорошо сочетаются с его темой."
 grand_archive: "Великий архив"
 the_grand_archive: "Великий архив"
 grand_archive_0: "$grand_archive$"
 grand_archive_0_DESC: "Орбитальное сооружение, разработанное специально для хранения и демонстрации примечательных ['concept_specimen', экземпляров] — экземпляров и особей, собранных в галактике, в том числе §Yкосмической фауны§!."
 grand_archive_0_MEGASTRUCTURE_DETAILS: "§Y$grand_archive$§! — сооружение, где мы храним и выставляем напоказ самые ценные артефакты галактики. Кроме того, внутри находится виварий, отведенный под содержание §Yкосмической фауны§! и наблюдение за ней."
 requires_grand_archive: "$dlc_requirement_string$ §IGrand Archive§!"
 GOTO_COLLECTION: "В коллекцию"
 must_have_2500_pops: "Необходимо небесное тело не менее чем с §Y2500§! £pop£ §Hпоселениями§!."
 STARBASE_CANNOT_UPGRADE_CONSTRUCTION_TYPE: "§RЭту флотилию нельзя улучшать на наших космических базах§!"
 VOIDWORMS_LABEL: "$voidworms_plural$"
 VOIDWORMS_LABEL_TOOLTIP: "§H$VOIDWORMS_LABEL$§!\nЭтот параметр определяет, сколько пустотных червей будет в галактике.$requires_grand_archive$"
 CUTHOLOIDS_LABEL: "$cutholoids_plural$"
 CUTHOLOIDS_LABEL_TOOLTIP: "§H$CUTHOLOIDS_LABEL$§!\nЭтот параметр определяет, сколько кутхолоидов будет в галактике.$requires_grand_archive$"
