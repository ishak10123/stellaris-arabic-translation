 REPAIR_ARMOR_PERCENTAGE_EFFECT: "Отремонтировать $VALUE|Y%$ брони"
 space_amoeba_UNIQUE_MUTATION_PROJECT: "Проект мутации космических амеб"
 space_amoeba_UNIQUE_MUTATION_PROJECT_DESC: "Когда мы тренировали недавно клонированные организмы, раненая космическая амеба применила необычную технику, чтобы одержать победу. Жгутики этой амебы научились вытягивать питательные вещества и материалы из естественных защитных механизмов противника, а затем использовать их, чтобы восстановить собственную броню и силы для сражения.\n\nДополнительные исследования данного феномена помогут определить, какой элемент биологии космических амеб можно улучшить, чтобы развить уникальную для этого вида мутацию."
 tiyanki_UNIQUE_MUTATION_PROJECT: "Проект мутации тиянки"
 tiyanki_UNIQUE_MUTATION_PROJECT_DESC: "Мы заметили, что недавно клонированная флотилия тиянки общается посредством сложной повторяемой вокализации. Едва уловимые звуки, похоже, успокаивают всех существ неподалеку.\n\nДополнительные исследования данного феномена помогут определить, какой элемент биологии тиянки можно улучшить, чтобы развить уникальную для этого вида мутацию."
 voidworm_UNIQUE_MUTATION_PROJECT: "Проект мутации пустотных червей"
 voidworm_UNIQUE_MUTATION_PROJECT_DESC: "Мы заметили, что у некоторых из наших пустотных червей при достижении зрелости развиваются пузыреподобные образования. Дальнейшие наблюдения показали, что особи с такими неприглядными наростами обычно более плодовиты, чем их сородичи.\n\nДополнительные исследования данного феномена помогут определить, какой элемент биологии пустотных червей можно улучшить, чтобы развить уникальную для этого вида мутацию."
 cutholoid_UNIQUE_MUTATION_PROJECT: "Проект мутации кутхолоидов"
 cutholoid_UNIQUE_MUTATION_PROJECT_DESC: "Во время кормления один из наших кутхолоидов переел и начал яростно выбрасывать содержимое своего желудка. Пищеварительные соки в форме концентрированных снарядов оказались довольно смертоносными, поскольку, покинув организм существа, они еще долго сохраняют радиоактивные свойства.\n\nДополнительные исследования данного феномена помогут определить, какой элемент биологии кутхолоидов можно улучшить, чтобы развить уникальную для этого вида мутацию."
 crystalline_entity_UNIQUE_MUTATION_PROJECT: "Проект мутации кристаллических организмов"
 crystalline_entity_UNIQUE_MUTATION_PROJECT_DESC: "Во время боевых испытаний некоторые наши кристаллические организмы после уничтожения разделялись на две идеально равные части. Эти половинки подавали признаки жизни и продолжали двигаться еще какое-то время."
 tiyanki_matriarch_UNIQUE_MUTATION_PROJECT: "Проект мутации матриарха тиянки"
 tiyanki_matriarch_UNIQUE_MUTATION_PROJECT_DESC: "Генетический материал, извлеченный из матриарха тиянки, позволил совершить ряд уникальных открытий, которые помогут реализовать экспериментальный проект мутации всей космической фауны."
 voidspawn_UNIQUE_MUTATION_PROJECT: "Проект мутации порождения пустоты"
 voidspawn_UNIQUE_MUTATION_PROJECT_DESC: "Генетический материал, извлеченный из порождения пустоты, позволил совершить ряд уникальных открытий, которые помогут нам реализовать экспериментальный проект мутации всей космической фауны."
 unique_mutation_project_unlock_desc: "[From.GetShipCategoryName] — исключительно полезный организм: при клонировании этого существа мы совершили новое открытие в генетике. При воздействии на необыкновенную анатомию подопытного посредством манипуляции генами мы сможем вызвать уникальную мутацию."
