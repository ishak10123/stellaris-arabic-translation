 FEDERATION_VIEW_CREATURE_DESIGNER_BUTTON_DESC: "§GОткрыть §Hконструктор космической фауны§! для флотилий федерации§!"
 FEDERATION_VIEW_CREATURE_DESIGNER_BUTTON_PRESIDENT_NOT_OUR_LEADER: "§RМы не являемся президентом федерации§!"
 FEDERATION_VIEW_CREATURE_DESIGNER_BUTTON_CANNOT_USE_MUTATIONS: "§RТолько лидер федерации может создавать проекты мутаций для космической фауны. У одного из участников федерации должна быть изучена технология §Y«Искусственное разведение»§!.§!"
 FEDERATION_CREATURE_FLEET_DESC: "§HФлотилии федерации§! — это особые флотилии под контролем президента. Они создаются в §Hконструкторе существ федерации§! и могут использовать любую технологию, доступную членам федерации. Флотилии федерации не требуют расходов на содержание, но количество кораблей не может превышать §Hвместимость флота федерации§!, которую каждый член федерации увеличивает как минимум на §Y$PERC|0%$§!$PERC|0%$ от §Hвместимости своего флота§!. Если флотилия космической фауны превысит §Hвместимость флота федерации§!, лишние существа перейдут под контроль президента."
