 concept_space_fauna_ship_component_desc: "Компоненты зверокораблей добываются путем выполнения особых проектов по изучению космической фауны. Все бонусы, применяемые к ним, также применяются к §Hмутациям§! космической фауны. Примеры таких компонентов:\n– §H$SPACE_WHALE_WEAPON_1$§!\n– §H$AMOEBA_STRIKE_CRAFT$§!"
