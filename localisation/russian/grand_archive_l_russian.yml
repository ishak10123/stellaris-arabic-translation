 CAPTURE_CHANCE: "Шанс успешного захвата: $VALUE|Y%0$"
 CAPTURE_AMOUNT: "Одна §Yгравитационная ловушка§! может захватить $VALUE|0G$ экз. §Yкосмической фауны§! одновременно."
 CAPTURE_AMOUNT_FULL_FLEET: "Одна §Yгравитационная ловушка§! может захватить целую флотилию §Yкосмической фауны§!."
 GRAVITY_SNARE_1: "$gravity_snare$"
 GRAVITY_SNARE_STANDARD: "$gravity_snare$"
 GRAVITY_SNARE_STANDARD_TOOLTIP: "Гравитационные ловушки постоянно испускают ограниченные вспышки квантовой гравитации, надежно удерживая добычу, у которой нет гипердвигателя. Это излучение можно поддерживать достаточно долго, чтобы ловить §Yкосмическую фауну§! и возвращать ее в наши системы, где ученые будут изучать пойманных особей."
 SHIP_STAT_CONTRIBUTION_ADDATIVE_fauna_capture_chance: "$NAME$: $VALUE|Y0%$"
 SHIP_STAT_DESC_fauna_capture_chance: ""
