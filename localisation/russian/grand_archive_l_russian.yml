 #Voidworms Plague Crisis #
 ###########################
 production_surge_modifier: "Всплеск производства"
 public_distrust_modifier: "Недоверие общественности"
 test_subject_unwilling_modifier: "Подопытные"
 test_subject_volunteer_modifier: "$test_subject_unwilling_modifier$"
 test_subject_gestalt_modifier: "$test_subject_unwilling_modifier$"
 grand_archive.2310.name: "Нашествие пустотных червей"
 grand_archive.2310.desc.default: "Численность пустотных червей в галактике достигла критических значений. Их поведение заметно изменилось.\n\nПривычный жизненный цикл, в рамках которого хозяйская популяция всегда выживает, нарушился. Рациональное использование участков для размножения, похоже, перестало играть какую-либо роль.\n\nВо всех колониях объявлено чрезвычайное положение. При столкновении с червями в системах необходимо проявлять предельную осторожность.\n\nМасштабы их размножения вскоре станут поистине космическими."
 grand_archive.2310.desc.tech: "$grand_archive.2310.desc.default$\n\nВыработанный нами иммунитет против этих паразитов ослаб. Необходимо начать всё сначала."
 grand_archive.2310.desc.nocontact: "Со всей галактики поступают тревожные отчеты, что у ранее неизвестного вида космической фауны, известного как «пустотные черви», начался сезон размножения. Сообщается, что эти существа представляют существенную угрозу для планет, не имеющих адекватной защиты. Во всех наших колониях объявлен красный уровень тревоги."
 grand_archive.2310.a: "$DISTURBING$$DOTDOTDOT$"
 situation_voidworm_plague: "Нашествие пустотных червей"
 situation_voidworm_plague_type: "$situation_voidworm_plague$"
 situation_voidworm_plague_desc: "$NAME_Voidworms$ нападают на нас полчищами.\n\nТеперь они не будут беречь места размножения — хозяйские планеты. Червей надо устранить, иначе нашим колониям грозит гибель.\n\n§YКаждый уничтоженный пустотный червь ускоряет ход инцидента.§!"
 situation_voidworm_plague_monthly_change_tooltip: "$situation_monthly_change_tooltip_approaches_dependent$"
 finisher_effects_voidworm_plague: "Ваши колонии перестанут быть уязвимыми к бомбардировкам пустотных червей."
 approach_voidworm_plague_do_nothing: "Ничего не делать"
 approach_voidworm_plague_do_nothing_tt: "Мы не будем предпринимать никаких особых действий."
 approach_voidworm_plague_support_fleets: "Поддержать флотилии"
 approach_voidworm_plague_support_fleets_tt: "Мы можем поступиться некоторым уровнем комфорта в пользу военных флотилий, противостоящих червям.\nИзменение ситуации в месяц: §G+0,5§!"
 approach_voidworm_plague_purge_infected_pops: "Истребить зараженных"
 approach_voidworm_plague_purge_infected_pops_tt: "$NAME_Voidworms$, бомбардирующие ваши колонии, не будут порождать новых особей.\nИзменение ситуации в месяц: §G+0,7§!"
 approach_voidworm_plague_search_for_cure: "Найти лекарство"
 approach_voidworm_plague_search_for_cure_tt: "Если нарушить жизненный цикл этих существ, обитающие в галактике $NAME_Voidworms$ больше не смогут размножаться.\nИзменение ситуации в месяц: §G+1,0§!"
 change_approach_will_temporarily_lock: "§SВыбрав этот подход, мы не сможем выбирать другие в течение §Y$@voidworm_plague_approach_cooldown_years|0$ лет§!.§!"
 too_early_to_change_approach: "§SСлишком рано менять подход к инциденту.§!"
 voidworm_crisis_eradicate_chain_title: "Уничтожить пустотных червей"
 voidworm_crisis_eradicate_chain_desc: "Численность пустотных червей в галактике достигла чрезмерного уровня. Их следует искоренить.\n\nМы обнаружили все оставшиеся §Yгнезда пустотных червей§!, которые необходимо уничтожить."
 voidworm_system_poi_title: "Уничтожить систему [prev.GetName]"
 voidworm_system_poi_desc: "В этой системе обнаружены §Yгнезда пустотных червей§!.\n\nИх необходимо уничтожить, чтобы предотвратить появление новых паразитов."
 #Voidworms Plague Crisis Random Events #
 grand_archive.2400.name: "Избыточные компоненты"
 grand_archive.2400.desc: "Активная поддержка флота перед лицом угрозы со стороны пустотных червей принесла неожиданный результат: благодаря более строгим техническим регламентам мы смогли произвести лишнюю партию компонентов. Их можно вложить в оперативное производство новых флотилий."
 grand_archive.2400.a: "Инвестировать в подкрепление."
 grand_archive.2400.b: "Поддержать запасы."
 grand_archive.2405.name: "Призыв к действию"
 grand_archive.2405.desc.default: "Благодаря тщательной подготовке к борьбе с пустотными червями у нас появилось новое поколение командиров. Опытные граждане сами стремятся отправиться уничтожать возникшую угрозу, опасаясь, что [this.GetName] погибнет."
 grand_archive.2405.desc.gestalt: "Благодаря тщательной подготовке к борьбе с пустотными червями у нас появилась возможность производить дополнительные руководящие узлы класса «Командир». Эти узлы, разработанные специально для боя, оказывают флотилиям поддержку и тем самым получают дополнительные ресурсы, способствующие ускоренной интеграции."
 grand_archive.2405.a: "Это вдохновляет."
 grand_archive.2405.tt: "Обновить список §Hдоступных для найма лидеров§! и добавить 3 дополнительных §Hкомандиров§! более высокого уровня."
 grand_archive.2410.name: "Передовые разработки"
 grand_archive.2410.desc.default: "Инженер с верфи [random_shipyard.GetName] [random_shipyard.leader.GetAXX::разработал|||fem:разработала] принципиально новую схему корабельной защиты. Идея создать компонент, способный увеличить прочность наших кораблей, зародилась во время ремонта пострадавших в бою суден. После рассмотрения этого предложения наш научно-исследовательский отдел решил, что оно несет в себе немалый потенциал."
 grand_archive.2410.desc.gestalt: "Никто не ожидал, что [root.GetIndividualName&nom]-ремотник с верфи [random_shipyard.GetName] поспособствует разработке новых способов корабельной защиты. Для этого достаточно было неверно понять информацию во время ремонтных работ и, применив необычное сочетание методов и материалов, произвести новый защитный компонент. После внимательного изучения этого случайного открытия был сделан вывод, что при определенной доработке оно несет в себе немалый потенциал."
 grand_archive.2420.name: "[infected_leader.GetName] заражается"
 grand_archive.2420.desc: "При исполнении долга [infected_leader.GetName] [infected_leader.GetAXX::заразился|||fem:заразилась] действующими спорами пустотных червей. Вскоре вылупляющиеся куколки уничтожат хозяйский организм.\n\nОднако возможно, что еще не всё потеряно: медики предполагают, что куколок можно извлечь, пока они не закрепились в нервной системе [infected_leader.GetAXX::зараженного|||fem:зараженной]. Процедура рискованная, однако [infected_leader.GetName] соглашается на нее."
 grand_archive.2420.a: "Уничтожить."
 grand_archive.2420.b: "Извлечь личинки."
 grand_archive.2425.name: "Нарушение карантина"
 grand_archive.2425.desc.common: "Несколько зараженных особей расы [infected_planet_pop.species.GetName] избежали зачистки планеты [infected_planet.GetName] и распространились в пределах наших систем. Если ничего не предпринимать, [this.GetName] скоро целиком заполнится пустотными червями."
 grand_archive.2425.desc.default: "$grand_archive.2425.desc.common$ Со сбежавшими нужно разобраться, иначе они подвергнут опасности всех нас."
 grand_archive.2425.desc.rogue: "$grand_archive.2425.desc.common$ Со сбежавшими нужно разобраться, иначе они подвергнут опасности остальные биотрофеи."
 grand_archive.2425.desc.gestalt: "$grand_archive.2425.desc.common$ Со сбежавшими нужно разобраться, иначе они подвергнут опасности весь коллектив."
 grand_archive.2425.desc.robot: "Образцы зараженной флоры и фауны, предназначенные для анализа, оказались ошибочно классифицированы как пища. В результате этой ошибки паразиты пустотных червей заразили значительные объемы органической материи. От них необходимо избавиться."
 grand_archive.2425.a.default: "Уничтожить их."
 grand_archive.2425.a.default.tt: "–1 органическое поселение в каждой принадлежащей колонии"
 grand_archive.2425.a.robot: "Сжечь запасы пищи."
 grand_archive.2425.a.robot.tt: "Опустошение на всех незараженных планетах: $@infected_devastation|0$"
 grand_archive.2425.b: "Ничего не делать."
 grand_archive.2425.b.tt: "Рядом с колониями могут появиться новые куколки пустотных червей!"
 grand_archive.2430.name: "Невыполнение долга"
 grand_archive.2430.desc: "Несмотря на всеобщее согласие с тезисом о необходимости истребления зараженных, многие солдаты отказываются выполнять приказ. Нежелание уничтожать сограждан ради благополучия народа для них сильнее страха перед пустотными червями.\n\nОднако распространению пустотных червей в колониях надо положить конец. Некоторые элементы процесса истребления можно автоматизировать, чтобы вовлекать в него меньше солдат. Есть и другой вариант действий: организовать пропагандистскую компанию по поддержанию этических стандартов ликвидации заражения, упирая при этом на необходимость такого решения."
 grand_archive.2430.a: "Автоматизировать процессы ликвидации."
 grand_archive.2430.b: "Устроить пропагандистскую компанию."
 grand_archive.2440.name: "Косвенный прорыв"
 grand_archive.2440.desc: "Попытки найти лекарство от пустотных паразитов поспособствовали совершению новых открытий в других областях биологии. Разработка лекарства остается приоритетной задачей, однако совершенный нами прорыв крайне многообещающ."
 grand_archive.2445.name: "Испытания на первых этапах"
 grand_archive.2445.desc.common: "Мы стали лучше понимать природу нашествия пустотных червей. Заложены основы для разработки лекарства."
 grand_archive.2445.desc.default: "$grand_archive.2445.desc.common$ Однако процесс будет продвигаться значительно быстрее, если мы организуем испытания на ранней стадии. Для этого нам понадобятся [owner_main_species.GetNamePlural] — чем больше, тем лучше.\n\nЕсли отбросить вопросы об этичности такого подхода, можно согласиться, что иногда техникой безопасности стоит пренебречь ради всеобщего блага."
 grand_archive.2445.desc.gestalt: "$grand_archive.2445.desc.common$ Однако испытания занимают слишком много времени — преимущественно потому, что подопытными выступают [root.GetIndividualNamePlural&nom], не имеющие назначения. Если же назначить бездействующих подопытными, разработка лекарства ускорится.\n\nТакое решение повлияет на весь коллектив, поскольку [root.GetIndividualNamePlural&nom], получающие новые назначения, будут мгновенно бросать свои предыдущие роли."
 grand_archive.2445.a.default: "Ничего не подозревающие [owner_main_species.GetNamePlural] должны стать подопытными."
 grand_archive.2445.a.gestalt: "Отдать предпочтение испытаниям."
 grand_archive.2445.b.default: "Проводить испытания только на добровольцах."
 grand_archive.2445.b.gestalt: "Продолжать исследования в обычном порядке."
 grand_archive.2445.c: "Никаких противоречащих этике испытаний."
 grand_archive.2450.name: "Железы пустотных червей"
 grand_archive.2450.desc: "В репродуктивном цикле пустотных червей обнаружилась закономерность, способная обеспечить нам серьезный прорыв в деле разработки лекарства.\n\nЧтобы подтвердить возникшую гипотезу, нам понадобятся половые железы дикой тройки пустотных червей. Важный момент: тройку необходимо убить, пока та бомбардирует какую-либо планету — только так можно сохранить действующие репродуктивные гаметы."
 grand_archive.2450.a: "Нам некогда этим заниматься."
 grand_archive.2450.b: "Мы достанем вам железы."
 VOIDWORM_GLANDS_PROJECT: "Половые железы тройки"
 VOIDWORM_GLANDS_PROJECT_DESC: "Мы совершили прорыв в разработке лекарства от воздействия пустотных червей. Всё, что нам сейчас нужно, — это половые железы тройки червей, находящейся в состоянии воспроизведения потомства."
 VOIDWORM_GLANDS_PROJECT_TOOLTIP: "§RСоберите останки тройки, бомбардировавшей какую-либо планету.§!"
 VOIDWORM_TITAN_DEBRIS_PROJECT: "Останки тройки"
 VOIDWORM_TITAN_DEBRIS_PROJECT_DESC: "Из останков этой тройки пустотных червей можно извлечь действующие половые железы.\n\nБлагодаря этим органам мы сможем гораздо лучше понять биологию червей, а значит — положить конец этому бедствию."
 grand_archive.2455.name: "Получены железы"
 grand_archive.2455.desc: "Благодаря железам, извлеченным из останков фертильной тройки, нам стали понятны подробности ее репродуктивного цикла.\n\nТройка вынуждена размножаться до самой смерти. Генетический материал каждого из составляющих ее червей поровну распределяется между всеми, превращаясь, по сути, в полноценный новый организм.\n\nТакую генетическую гибкость можно обернуть против самих червей."
 grand_archive.2500.name: "Обнаружено лекарство"
 grand_archive.2500.desc.default: "Мы завершили разработку лекарства от паразитической инфекции пустотных червей. Наши колонии больше не будут страдать от бомбардировки спорами, и присутствие червей в галактике больше нас не беспокоит."
 grand_archive.2500.desc.tech: "$grand_archive.2500.desc.default$\n\nМы уверены, что на этот раз при создании лекарства учли возможные будущие изменения их биологии."
 #########################################
 #Voidworm Plague Crisis Galactic Focus #
