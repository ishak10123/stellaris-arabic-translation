 grand_archive.4105.name: "$leviathans.500.name$"
 grand_archive.4105.desc.common.aesthetic_wonder: "[GetCuratorsDesignation] обратили внимание на ваше прилежное пополнение коллекции, посвященной §Yхудожественным чудесам§!. Красота есть во всем — достаточно лишь присмотреться."
 grand_archive.4105.desc.common.historical_item: "[GetCuratorsDesignation] обратили внимание на ваше прилежное пополнение коллекции, посвященной §Yистории галактики§!. Своими усилиями вы увековечили прежних владельцев этих предметов."
 grand_archive.4105.desc.common.xeno_geology: "[GetCuratorsDesignation] обратили внимание на ваше прилежное пополнение коллекции, посвященной §Yксеногеологии§!. Камни нередко таят в себе историю целой галактики."
 grand_archive.4105.desc.1.common: "[GetStage1Description]\n\nПусть это вдохновит вас продолжать начатое славное дело."
 CURATORS_STAGE_1_DESC: "Ваша исходная коллекция впечатляет. Мы хотели бы предложить свои услуги. Поскольку каждый из нас заинтересован в сохранении исторической памяти, мы назначим вам в помощь специалиста в какой-либо области на ваше усмотрение."
 DEAD_CURATORS_STAGE_1_DESC: "Несмотря на потерю анклава, мы и дальше готовы предлагать вам свои услуги ради сохранения исторических ценностей — в какой-либо области на ваш выбор."
 grand_archive.4105.desc.1.xeno_geology: "$grand_archive.4105.desc.common.xeno_geology$\n\n$grand_archive.4105.desc.1.common$"
 grand_archive.4105.desc.1.aesthetic_wonder: "$grand_archive.4105.desc.common.aesthetic_wonder$\n\n$grand_archive.4105.desc.1.common$"
 grand_archive.4105.desc.1.historical_item: "$grand_archive.4105.desc.common.historical_item$\n\n$grand_archive.4105.desc.1.common$"
 grand_archive.4105.1.mineral_insight: "Помогите нам провести раскопки в колониях."
 grand_archive.4105.1.void_mining: "Помогите нам провести раскопки среди звезд."
 grand_archive.4105.1.cultural_enrichment: "Помогите нам разделить их величие."
 grand_archive.4105.1.auctioneering_curation: "Помогите нам подыскать этим особям достойный дом."
 grand_archive.4105.1.historical_insight: "Подскажите, где мы можем получить новые знания."
 grand_archive.4105.1.lessons_from_the_past: "Внушите нашим лидерам мудрость былых времен."
 grand_archive.4105.1.no: "Возможно, позже."
