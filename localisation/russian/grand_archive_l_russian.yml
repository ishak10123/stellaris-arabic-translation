 councilor_beastmasters: "Владыка над зверьми"
 councilor_beastmasters_desc: "Крайне ответственная и престижная должность. $TITLE$ распоряжается зверокораблями, в том числе их стратегическим развертыванием."
 councilor_corporate_beastmasters: "Главный скотовод"
 councilor_corporate_beastmasters_desc: "$TITLE$ отвечает за здоровье и постоянное пополнение численности зверокораблей. Эта должность требует немалых знаний в области логистики, экологии и животноводства."
 civic_tooltip_not_beastmasters: "НЕТ гражданской модели ['concept_beastmasters_civic']"
 concept_beastmasters_civic: "$civic_beastmasters$"
 concept_beastmasters_civic_desc: "К гражданским моделям группы «$concept_beastmasters_civic$» относятся: $NEW_LINE$- ['civic:civic_beastmasters']$NEW_LINE$- ['civic:civic_hive_beastmasters'] $NEW_LINE$- ['civic:civic_machine_beastmasters'] $NEW_LINE$- ['civic:civic_corporate_beastmasters']"
