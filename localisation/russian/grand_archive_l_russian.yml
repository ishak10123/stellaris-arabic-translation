 frenzied_voidworms_at_home_modifier: "Усиление мутировавших пустотных червей"
 frenzied_voidworms_enraged_modifier: "Разъяренные $NAME_Frenzied_Voidworms$"
 frenzied_voidworms_pacified_modifier: "Умиротворенные $NAME_Frenzied_Voidworms$"
 resolution_voidworm_eradication: "Истребление пустотных червей"
 resolution_voidworm_eradication_desc: "Паразиты, известные как пустотные черви, — настоящая чума, грозящая каждой населенной планете. Само по себе существование этого вида подрывает равновесие галактической экосистемы, а потому его следует уничтожить."
 resolution_voidworm_eradication_tooltip: "Каждое государство, в границах которого находятся §Y$NAME_Voidworms$§!, будет считаться §Rнарушившим галактический закон§!, пока эти существа не будут уничтожены или не уйдут по своей воле."
 resolution_repeal_voidworm_eradication: "§RОтменить резолюцию «$resolution_voidworm_eradication$»§!"
 resolution_repeal_voidworm_eradication_desc: "Государства, входящие в [global_event_country.GetGalCommunityOrGalImperium], не должны иметь права на истребление пустотных червей."
 resolution_repeal_voidworm_eradication_effect_success: "Отменяет резолюцию «§Y$resolution_voidworm_eradication$§!»."
 grand_archive.2103.name: "$resolution_voidworm_eradication$"
 grand_archive.2103.desc: "[global_event_country.GetGalCommunityOrGalImperium] постановляет, что отныне существование пустотных червей в системах государств-участников запрещается.\n\nПока черви не будут уничтожены или не покинут наше пространство самостоятельно, [this.GetName] будет считаться §Rнарушителем галактического закона§!."
 grand_archive.2105.name: "$NAME_Voidworms$ в пространстве расы «[this.GetSpeciesName]»"
 grand_archive.2105.desc: "Флотилия пустотных червей только что пересекла границы системы [from.GetName]. Поскольку наше государство входит в [global_event_country.GetGalCommunityOrGalImperium], мы обязаны в кратчайшие сроки провести эвтаназию этих существ на своей территории.\n\n[this.GetName] будет считаться §Rнарушителем галактического закона§!, пока пустотные черви не будут убиты или не покинут наше пространство по своей воле."
 grand_archive.2107.desc: "Постоянное присутствие пустотных червей в системе [invaded_system.GetName] — серьезное нарушение §Rгалактического закона§!, принятого резолюцией «$resolution_voidworm_eradication$». Из-за этого [global_event_country.GetGalCommunityOrGalImperium] разрешает государствам-участникам голосовать за введение санкций против государства [this.GetName]."
 bombardment_damage_moderate: "§YУмеренный§!"
 bombardment_damage_massive: "§RОгромный§!"
 bombardment_voidworm_invasion_desc_common: "$bombardment_voidworm_invasion$ уничтожают население и создают новые куколки пустотных червей.\n• §YУмеренный§! урон §Yармиям§!\n• [GetVoidwormFleetBombardmentDamageIntensity] урона §Yпланете§!, пока опустошение не достигнет §Y25%§!\n• §YУмеренный§! урон §Yпоселениям§!"
 bombardment_voidworm_invasion: "Споры пустотных червей"
 bombardment_voidworm_invasion_desc: "$bombardment_voidworm_invasion_desc_common$\n• §Rне§! уничтожит последние §Y$MIN_POPS$§! шт. £pop£ §Hпоселений§!"
 bombardment_voidworm_invasion_crisis: "$bombardment_voidworm_invasion$ (кризис)"
 bombardment_voidworm_invasion_crisis_desc: "$bombardment_voidworm_invasion_desc_common$"
 bombardment_frenzied_voidworm_invasion: "Мутировавшие $bombardment_voidworm_invasion$"
 bombardment_frenzied_voidworm_invasion_desc: "• Каждая опустошенная планета превращается в §Y$pc_shattered$§!"
 alert_space_fauna_bombardment_title: "Пустотные черви бомбардируют нашу колонию!"
 alert_space_fauna_bombardment_instant: "Наша колония попала под обстрел галактических паразитов!\nИстощив запасы спор для бомбардировки населенных колоний, паразиты удалятся."
 ALERT_SPACE_FAUNA_BOMBARDMENT_DETAIL: "$PLANET_NAME|Y$ в системе $SYSTEM_NAME|Y$. Оставшиеся непоглощенные поселения: §Y$POPS_TO_KILL$§!."
 grand_archive.2195.name: "Галактические паразиты"
 grand_archive.2195.desc.common_1: "[from.GetName] под обстрелом.\n\nБольшая группа пустотных червей на орбите колонии обстреливает поверхность паразитными пузырями."
 grand_archive.2195.desc.common_2: "По результатам биологического анализа выяснилось, что запасы пузырей у каждого выводка пустотных червей ограничены. Вероятно, после их исчерпания черви удалятся. До тех пор население будет нести значительные потери."
 grand_archive.2195.desc.default: "$grand_archive.2195.desc.common_1$\n\nВ каждом пузыре содержится ядовитая спора, смертельно опасная не только для наших колонистов, но и для любых форм жизни. Поглощенная спора резко превращается в куколку. Хозяйский организм она покидает силой, уничтожая его в процессе. Внутри каждой куколки содержится полость со сжатыми газами, что позволяет ей взмывать в верхние слои атмосферы. Оттуда куколка инстинктивно перемещается в заданном направлении.\n\n$grand_archive.2195.desc.common_2$"
 grand_archive.2195.desc.rocks: "$grand_archive.2195.desc.common_1$\n\nВ каждом пузыре содержится ядовитая спора, смертельно опасная для любой местной фауны. Поглощенная спора резко превращается в куколку. Хозяйский организм она покидает силой, уничтожая его в процессе. Куколки, обычно питающиеся благородными металлами с астероидов, — охотники: их добычей становятся наши уязвимые [this.GetColonistPlural]. Внутри каждого вылупившегося организма содержится полость со сжатыми газами, что позволяет ему взмывать в верхние слои атмосферы и инстинктивно перемещаться в заданном направлении.\n\n$grand_archive.2195.desc.common_2$"
 grand_archive.2195.a: "Это вызывает тревогу."
 grand_archive.2195.a.homicidal: "Они умрут."
 ap_galactic_contender_voidworms_tt: "$MOD_DIPLO_WEIGHT_MULT$: §G+20%§!\n$mod_damage_vs_country_type_fallen_empire_mult$: §G+$@ap_galactic_contender_dmg_mult|0%$§!\n$mod_damage_vs_country_type_awakened_fallen_empire_mult$: §G+$@ap_galactic_contender_dmg_mult|0%$§!\n$mod_damage_vs_country_type_gate_builders_mult$: §G+$@ap_galactic_contender_dmg_mult|0%$§!\n$mod_damage_vs_country_type_voidworms_mult$: §G+$@ap_galactic_contender_dmg_mult|0%$§!"
 ap_defender_of_the_galaxy_voidworm_modifier_desc: "$mod_damage_vs_country_type_voidworms_mult$: §G+$@ap_defender_of_the_galaxy_voidworm_dmg_mult|0%$§!\n$ap_defender_of_the_galaxy_modifier_desc$"
