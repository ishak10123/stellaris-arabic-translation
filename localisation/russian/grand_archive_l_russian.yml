 ###########
 ### Primal Calling
 origin_primal_calling: "Первобытный зов"
 origin_primal_calling_desc: "Шуршит высокая трава. На уши оглушительно давит ночная тишина. Охотник собран, он резок и стремителен, как звездный свет…\n\nЭта цивилизация глубоко связана с дикой природой. Сегодня ее представители, считающие себя защитниками разнообразной (и нередко смертельной) фауны родной планеты, устремились к звездам. Мало кто может соперничать с ними в искусстве обращения с животными, вышедшем из нравственных законов этого народа. Как эта связь проявит себя в галактическом масштабе, еще только предстоит узнать."
 origin_tooltip_primal_calling_effects: "- $HOMEWORLD$$TABBED_NEW_LINE$- $PLANETARY_MODIFIERS$ ['concept_untamed_wilds_mod']\n- $HOME_SYSTEM$ §YКосмическая фауна§! в соседней системе\n- $AVAILABLE_BUILDINGS$ ['concept_wildlife_ranch', £building£ $wildlife_ranch$]\n- Можно выбрать особый ['concept_primal_calling_stance', подход] в отношении к §Yкосмической фауне§! при первом контакте\n- $ADDITIONAL_TECHNOLOGIES_STRING$ ['technology:tech_genome_mapping', £society_research£ $tech_genome_mapping$]\n- $GUARANTEED_RESEARCH_OPTION_STRING$ ['technology:tech_alien_life_studies', £society£ $tech_alien_life_studies$]\n- Дополнительные знания в области технологии «['technology:tech_gravity_wells', £physics_research£ $tech_gravity_wells$]» после первого контакта с космической фауной\n- Дополнительные знания в области технологии «['technology:tech_alien_cloning', £society_research£ $tech_alien_cloning$]» после захвата космической фауны.\n- Дополнительные знания в области технологии «['technology:tech_controlled_mutations', £society_research£ $tech_controlled_mutations$]» после клонирования космической фауны"
 START_SCREEN_PRIMAL_CALLING: "Даже стремительный технический прогресс не смог разорвать нашу связь с дикой фауной родного мира. Эти существа стойко сопровождали нас на протяжении долгого развития всего нашего общества. Мы — в такой же степени их защитники, в какой они — наши наставники. Мы не берем больше, чем они способны нам дать, и каждая жертва воспринимается с почестями.\n\nЕсли на непокоренных просторах космоса нам встретятся и другие дикие существа, относиться к ним мы будем с таким же уважением, как и к обитателям собственной планеты. Каждому найдется свое место; вместе мы сильнее, чем порознь.\n\nПервобытная страсть манит нас к звездам. Неважно, что мы там встретим, — главное, что любое испытание мы выдержим с честью."
 leader_trait_trophy_hunter: "Охотник за трофеями"
 leader_trait_trophy_hunter_desc: "Этот командир закален трудностями и умудрён многолетним опытом, а потому превосходно разбирается в космической фауне. Любой хороший охотник умеет думать, как добыча, но совершить идеальный выстрел способны немногие."
 leader_trait_gifted_trapper: "Одаренный зверолов"
 leader_trait_gifted_trapper_desc: "Умелый исследователь, крайне осторожно подходящий к вопросу отлова и перевозки живых особей без причинения им вреда. Этот лидер настолько заботливо относится к живым существам, что вдохновляет исследователей во всех областях придерживаться более высоких стандартов."
 leader_trait_void_hunter: "Охотник пустоты"
 leader_trait_void_hunter_desc: "Опытный охотник, знающий, как расправляться с крупной дичью. Отличается терпением и точностью действий."
 leader_trait_void_hunter_2: "$leader_trait_void_hunter$ II"
 leader_trait_void_hunter_2_desc: "$leader_trait_void_hunter_desc$"
 leader_trait_void_tracker: "Следопыт пустоты"
 leader_trait_void_tracker_desc: "Этот лидер как никто иной умеет ловить дикую космическую фауну аккуратно и без вреда для здоровья."
 leader_trait_void_tracker_2: "$leader_trait_void_tracker$ II"
 leader_trait_void_tracker_2_desc: "$leader_trait_void_tracker_desc$"
 #First Contacts
 first_contact_critters.15.desc.primal_calling: "Примечательно, что в каждом стаде §Hтиянки§! действует матриархальная иерархия: каждую группу возглавляет одна самка. Они же всегда получают пищу в первую очередь, поскольку она необходима для производства особых газов, незаменимых при выращивании потомства и управлении миграцией стада. При нехватке ресурсов самцы обычно отказываются от пищи в пользу самок и отправляются на поиски пропитания, пока стадо отдыхает."
 first_contact_critters.25.desc.primal_calling: "Все особи, кроме самых молодых, всегда перемещаются в компании псевдонезависимых организмов, находящихся под влиянием секретов с содержанием РНК. Удары этих «жгутиков» имеют сложную траекторию, поэтому, несмотря на кажущееся отсутствие интеллекта, §H«космические амебы»§! — грозные хищники."
 first_contact_critters.35.desc.primal_calling: "По всей видимости, общение у этих существ происходит посредством хроматических изменений преломляемого света. Такой способ коммуникации позволяет выражать широкий спектр эмоций, однако его применение среди этих полуразумных форм жизни ограничено: изменения цвета обычно выражают только простые сигналы, такие как демонстрация общественного положения, агрессии или способности к размножению."
 grand_archive.2005.desc.primal_calling: "У этих паразитов отсутствует естественная способность к размножению, поэтому они вынуждены полагаться на планетарных хозяев. Популяция §H«пустотных червей»§! увеличивается с помощью так называемых троек — групп скрещивания, состоящих из трех особей. Они производят ключевой гормон, вырабатывающийся путем поглощения достаточного количества органической материи с обитаемых планет. Поскольку пустотные черви — гермафродиты, основными факторами при выборе партнеров выступают преимущественно взаимодополняющие физические черты и сходство в размерах."
 grand_archive.2900.desc.primal_calling: "Мы считаем, что предпочтения этих существ основываются не только на размере астероидов, но и на их минеральном составе. Возможно, [GetCommonMineral] — вещество, которому отдает предпочтение первая встреченная нами особь, — не единственное, что кажется им привлекательным, и каждая отдельная особь со временем адаптируется к условиям окружающей среды. Сканирование выявило наличие следов таких металлов во всей поверхности астероида-хозяина без исключения, а также в нервной системе и пищеварительном тракте самого §H«кутхолоида»§!."
