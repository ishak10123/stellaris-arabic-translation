 grand_archive.4555.name: "$grand_archive$ разобран"
 grand_archive.4555.desc: "$grand_archive$ в системе [fromfrom.GetName] (владелец — [from.GetName]) разобран после приобретения нами этой системы.\n\nЗанимаемое им место вновь принадлежит нам."
 grand_archive.4560.name: "$grand_archive.4555.name$"
 grand_archive.4560.desc.common_1: "Наш $grand_archive$ в системе [from.GetName] разобран после оставления этой системы."
 grand_archive.4560.desc.common_2: "Мы собрали почти все сплавы, использованные при постройке. Чтобы выставка работала и дальше, комплекс придется перестроить в другой системе."
 grand_archive.4560.desc.specimen: "Все экземпляры возвращены и находятся на хранении в ожидании, пока будет построен новый $grand_archive$."
 grand_archive.4560.desc.fauna: "Вся космическая фауна пущена на убой ради сбора ресурсов."
 grand_archive.4560.desc.specimen_fauna: "$grand_archive.4560.desc.common_1$\n\n$grand_archive.4560.desc.specimen$\n$grand_archive.4560.desc.fauna$\n\n$grand_archive.4560.desc.common_2$"
