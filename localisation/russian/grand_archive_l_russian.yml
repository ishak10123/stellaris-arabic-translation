 feature_unlock_gravity_snares: "Гравитационные ловушки"
 feature_unlock_gravity_snares_desc: "Позволяют ловить и перевозить §Yкосмическую фауну§!. Если в государстве есть §Y$grand_archive$§!, все захваченные существа будут перемещаться в виварий."
 feature_unlock_containment_vessels: "Контейнеры для содержания"
 feature_unlock_containment_vessels_desc: "В гравитационные ловушки попадается вдвое больше §Yкосмической фауны§!."
