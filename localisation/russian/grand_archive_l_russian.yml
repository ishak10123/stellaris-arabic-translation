 #Homicidal considerations #
 #Fanatic Purifiers
 grand_archive.4135.name: "Безделушки низших видов"
 grand_archive.4135.desc: "По мере зачистки галактики от мерзких чужаков наша коллекция трофеев ([GetCollectionRewardCategory]) растет.\n\nЭти экспонаты — последнее, что останется от безвозвратно зараженной галактики. Они будут придавать нам силы действовать дальше."
 grand_archive.4135.desc.geology: "$grand_archive.4135.desc$"
 grand_archive.4135.desc.aesthetic: "$grand_archive.4135.desc$"
 grand_archive.4135.a: "Да здравствует [this.GetName]!"
 grand_archive.4140.name: "Накопленные безделушки"
 grand_archive.4140.desc.geology: "Мы продолжаем собирать целое множество самых разных предметов, принадлежащих обитателям этой оскверненной галактики. Принадлежность их одна: [GetCollectionRewardCategory].\n\nОднако при любовании трофеями не стоит забывать, что это только начало…"
 grand_archive.4140.desc.aesthetic: "Мы продолжаем собирать целое множество различных мелочей — напоминаний о той чуме, что принесли с собой низшие формы жизни. Принадлежность их одна: [GetCollectionRewardCategory].\n\nКогда от всех этих отвратительных чужаков не останется и следа, единственное, что будет напоминать об их неполноценности, — это наши трофеи."
 grand_archive.4140.a: "Мы зачистим эту галактику."
 grand_archive.4145.name: "Витрина для трофеев заполнена"
 grand_archive.4145.desc.geology: "Наши хранилища полны предметов, посвященных одной-единственной теме — это [GetCollectionRewardCategory].\n\nЭта коллекция, не знающая себе равных, будет напоминать нам о великом триумфе — уничтожении всей жизни в галактике."
 grand_archive.4145.desc.aesthetic: "Наши хранилища полны предметов, посвященных одной-единственной теме — это [GetCollectionRewardCategory]. Бесполезные украшения чужаков.\n\nЭта обширная коллекция, напоминающая о неполноценной природе низших видов, еще долго будет вызывать у нас смех, ведь всё, что останется после них, — это горстка экспонатов."
 grand_archive.4145.a: "Тост за смерть!"
 #Devouring Swarm
 grand_archive.4136.name: "Безделушки съеденных"
 grand_archive.4136.desc: "Утолить голод невозможно. Мы пожираем безостановочно, и наша коллекция диковинок ([GetCollectionRewardCategory]) растет.\n\nЭти экспонаты — последнее, что останется от поглощенной нами галактики."
 grand_archive.4136.desc.geology: "$grand_archive.4136.desc$"
 grand_archive.4136.desc.aesthetic: "$grand_archive.4136.desc$"
 grand_archive.4136.a: "Вечный голод."
 grand_archive.4141.name: "$grand_archive.4136.name$"
 grand_archive.4141.desc.common: "Эти предметы будут напоминать нам о миллионах, ставших пищей для безостановочного пира."
 grand_archive.4141.desc.geology: "Мы продолжаем собирать галактику по кусочкам — один образец за другим. [GetCollectionRewardCategory] и всё, что имеет к этому отношение, — подлинная плоть этого мира.\n\n$grand_archive.4141.desc.common$"
 grand_archive.4141.desc.aesthetic: "Мы продолжаем собирать галактику по кусочкам — один образец за другим. [GetCollectionRewardCategory] и всё, что имеет к этому отношение и когда-то интересовало низшие формы жизни, теперь в нашем ведении.\n\n$grand_archive.4141.desc.common$"
 grand_archive.4141.a: "Пир продолжается."
 grand_archive.4146.name: "Воспоминания о трапезе"
 grand_archive.4146.desc: "Пожирая обитателей самых разных планет, мы наполняем не только желудки, но и коллекцию диковинных предметов ([GetCollectionRewardCategory]).\n\nУ нее только одно предназначение: напоминать нам о неутолимом голоде. Как только эта галактика опустеет, мы взглянем на трофеи и вспомним сладость их прежних хозяев."
 grand_archive.4146.desc.geology: "$grand_archive.4146.desc$"
 grand_archive.4146.desc.aesthetic: "$grand_archive.4146.desc$"
 grand_archive.4146.a: "Объедение."
 #Determined Exterminators
 grand_archive.4137.name: "Безделушки субъективной ценности"
 grand_archive.4137.desc: "Мы организовали коллекцию предметов ([GetCollectionRewardCategory]), воспринимаемых органиками как необыкновенные артефакты.\n\nПод нашим надзором они продолжат существовать даже после того, как в галактике будет уничтожен последний живой организм."
 grand_archive.4137.desc.geology: "$grand_archive.4137.desc$"
 grand_archive.4137.desc.aesthetic: "$grand_archive.4137.desc$"
 grand_archive.4137.a: "Безобидные вещицы."
 grand_archive.4142.name: "Накопленные диковинки"
 grand_archive.4142.desc: "По мере того как поразившая галактику органическая жизнь погибает, наша коллекция трофеев ([GetCollectionRewardCategory]) пополняется.\n\nЭти предметы будут напоминать следующим поколениям ликвидаторов о нелогичности органиков."
 grand_archive.4142.desc.geology: "$grand_archive.4142.desc$"
 grand_archive.4142.desc.aesthetic: "$grand_archive.4142.desc$"
 grand_archive.4142.a: "Протоколы перенастроены."
 grand_archive.4147.name: "Область памяти заполнена"
 grand_archive.4147.desc: "Уничтожая обитателей этой галактики, мы пополняем банки памяти, посвященные экземплярам из категории «[GetCollectionRewardCategory]».\n\nВ этой коллекции содержатся данные обо всем, что особенно ценится органиками. Она поможет нам оптимизировать процесс ликвидации, а также будет функционировать в роли точек привязки в истории галактики, пораженной неизлечимым вирусом."
 grand_archive.4147.desc.geology: "$grand_archive.4147.desc$"
 grand_archive.4147.desc.aesthetic: "$grand_archive.4147.desc$"
