 leader_trait_pirate_queen: "Королева пиратов"
 leader_trait_pirate_queen_desc: "Годы разбоя и невероятных подвигов превратили капитана в лидера, который всегда добивается своего."
 captain_ness_leader_desc: "Древнее сознание королевы пиратов в механической оболочке. Она одарила сокровищами многие миры."
 captain_ness_leader_catch_phrase: "Создадим наше наследие вместе."
