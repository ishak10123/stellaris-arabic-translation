 tr_domestication_astrozoology: "Астрозоология"
 tr_domestication_astrozoology_delayed: "Космические обитатели уникальны: у каждого свои способны размножения и потребности в питании. Чтобы полностью раскрыть потенциал выращиваемых в неволе существ, потребуется тщательная забота."
 tr_domestication_astrozoology_tt: "При захвате или разведении космической фауны: $NEW_LINE$$t$- Получены ресурсы за убой: §G200%§!"
 tr_domestication_metabolic_regulation: "Регуляция метаболизма"
 tr_domestication_metabolic_regulation_delayed: "Путем управления различными ключевыми ферментами и белками, влияющими на метаболизм каждого содержащегося у нас существа, мы можем искусственно контролировать их взросление."
