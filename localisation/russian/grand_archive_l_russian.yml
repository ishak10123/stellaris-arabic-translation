 #Event chain
 treasure_hunters_origin_story_chain_title: "Путь на загадочной карте"
 treasure_hunters_origin_story_chain_desc: "Обнаружив таинственную звездную карту, мы отправились в величайшее приключение за всю историю нашей цивилизации. Кто знает, куда приведет нас §H$celestial_chart$§!? Какие опасности встретятся на пути?"
 treasure_hunters_hidden_system_1_poi: "Осмотреть систему [prev.GetName]"
 treasure_hunters_hidden_system_1_poi_desc: "Карта, обнаруженная в древней орбитальной капсуле, указала нам на скрытую систему под названием [prev.GetName]. Чтобы раскрыть ее тайну, нужно отправиться туда самим."
 treasure_hunters_explore_system_1_poi: "Осмотреть систему [treasure_hunters_hidden_system_1.GetName]"
 treasure_hunters_explore_system_1_poi_desc: "Флотилия §Y«Черной Иглы»§! побеждена. Поиски можно продолжать. Сюда нас привела §H$celestial_chart$§!, а значит, разумно предположить, что следующий фрагмент карты спрятан именно тут."
 black_needle_fleet_poi: "Флотилия «Черной Иглы»"
 black_needle_fleet_poi_desc: "В системе [from.GetName] мы попали в засаду удивительно хорошо организованной пиратской флотилии. Нас поджидали заранее — им нужна наша §H$celestial_chart$§!."
 smeegibb_shelter_system_1_poi: "Осмотреть систему [prev.GetName]"
 smeegibb_shelter_system_1_poi_desc: "§H$celestial_chart$§! показала нам еще одну скрытую систему — она называется [prev.GetName]. Пора отправиться туда и узнать, что нас ждет."
 smeegibb_shelter_system_2_poi: "Отправиться в систему [smeegibb_system.GetName]"
 smeegibb_shelter_system_2_poi_desc: "$NAME_Smeegibb$ не выходит с нами на связь. Поскольку система [smeegibb_system.GetName] — единственная зацепка, которая может помочь нам найти следующий фрагмент §Hнебесной карты§!, нам следует вернуться туда и разобраться в происходящем. Причина радиомолчания пока остается загадкой."
 black_needle_fleet_2_poi: "Одолеть капитана Инакса"
 black_needle_fleet_2_poi_desc: "«§Y$NAME_BlackNeedle$§!» нашла нас вновь. Наш связной $NAME_Smeegibb$ оказался убит, а мы сами — заперты в системе [from.GetName]. Скорее всего, четвертый фрагмент §HНебесной карты§! спрятан где-то на поверхности [smeegibb_shelter.GetPlanetMoon]ы [smeegibb_shelter.GetName].\n\nЧтобы найти капсулу, понадобится победить вражескую флотилию."
