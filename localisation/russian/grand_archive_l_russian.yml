 TREASURE_TROVE: "Клад"
 TREASURE_TROVE_DESC: "Где-то на поверхности [this.GetPlanetMoon]ы [this.GetName] обнаружен старый пиратский §Y$TREASURE_TROVE$§!. Кто знает, какие богатства таятся внутри…"
 treasure_troves_chain_title: "Клады"
 treasure_troves_chain_desc: "У пиратов есть старый обычай делать клады с награбленным добром. Многие такие клады со временем оказались позабыты своими владельцами, и теперь ничто не помешает нам завладеть ими."
 mod_treasure_trove_reward_mult: "Награды за нахождение клада"
 grand_archive.6010.name: "Обнаружен $TREASURE_TROVE$"
 grand_archive.6010.desc: "Мы зафиксировали слабый сигнал, исходящий с поверхности планеты [event_target:treasure_trove_planet.GetName]. Наши дешифровщики полагают, что здесь находится давно позабытый пиратский §Y$TREASURE_TROVE$§!.\n\nЧтобы достать его, придется приложить усилия, но в успехе мы не сомневаемся."
 grand_archive.6010.a: "Раскрыть его расположение."
 grand_archive.6015.name: "Получен клад"
 grand_archive.6015.common.1: "После того как мы аккуратно обезвредили защиту пиратского §Yклада§! на планете [event_target:treasure_trove_planet.GetName]"
 grand_archive.6015.desc: "$grand_archive.6015.common.1$, внутри обнаружились запасы ценных ресурсов.\n\nТакой неожиданный подарок нам пригодится."
 grand_archive.6015.desc.specimen: "$grand_archive.6015.common.1$, внутри запечатанного контейнера обнаружился древний предмет, некогда принадлежавший пирату. Теперь он находится в нашей коллекции."
 grand_archive.6015.desc.specimen_extra: "Кроме того, при осмотре §Yклада§! среди других сокровищ мы обнаружили древний предмет, некогда принадлежавший пирату. Если его аккуратно восстановить, он станет отличным дополнением к нашей коллекции."
 grand_archive.6015.desc.pirate_ship: "После аккуратного обезвреживания защиты пиратского §Yклада§! мы обнаружили примитивные аналоговые указатели, показывающие на вполне конкретное место на поверхности планеты. Последовав указаниям, мы обнаружили настоящий пиратский линкор, надежно защищенный от средств обнаружения.\n\nЭтот корабль, получивший название «[treasure_trove_pirate_ship.GetName]», теперь числится в составе флота."
 grand_archive.6015.desc.tech: "$grand_archive.6015.common.1$, внутри обнаружился банк данных, содержащий редкие и очень ценные научные работы.\n\nКак они туда попали — неизвестно, однако нам они пригодятся."
 grand_archive.6015.a: "$GOOD$"
 treasure_trove_specimen_tt: "$t$Завладеть ['concept_specimen', экземпляром]."
 treasure_trove_pirate_ship_tt: "$t$Завладеть пиратским военным кораблем."
