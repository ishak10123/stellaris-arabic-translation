 tr_domestication_killer_instinct_delayed: "Обитатели открытого космоса могут полагаться только на самих себя: либо они будут защищаться, либо их вид вымрет."
 tr_domestication_killer_instinct_homicidal_delayed: "Служить нам достойны лишь самые беспощадные."
