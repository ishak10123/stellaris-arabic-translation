 grand_archive.2000.name: "Множество голосов"
 grand_archive.2000.desc: "Датчики обнаружили в системе [This.System.GetName] источник примитивных сигналов, направленных в открытый космос. Точно такие же сигналы, исходящие из неизвестного сектора, зарегистрировали наши сканеры дальнего действия. Пока неизвестно, посылаются ли они целенаправленно. Следует изучить этот феномен внимательнее."
 grand_archive.2000.a: "Узнать больше."
 fcsum_voidworms_2: "§H[This.ContactCountry.GetName]§! — галактические паразиты, известные как пустотные черви."
 grand_archive.2005.name: "$NAME_Voidworms$"
 grand_archive.2005.desc: "Мы обнаружили, что сигналы, направленные в глубину космоса, испускают простые организмы, получившие наименование «§H$NAME_Voidworms$§!». По всей видимости, в галактике их многие тысячи. На основе переменной длины волны сигналов можно предположить, что превращение пустотных червей во взрослую особь происходит поэтапно. Пока что они не проявляют признаков агрессии — общение скорее указывает на попытки установить взаимосвязь между населяющими галактику червями."
 grand_archive.2005.a.homicidal: "Этих неразумных животных следует умертвить."
 grand_archive.2015.name: "Ферменты пустотных червей"
 grand_archive.2015.desc: "Спаривание у пустотных червей происходит в группах, состоящих из трех особей, — так называемых тройках. Члены тройки неразрывно связаны; спаривание происходит до самой смерти. Однако для воспроизведения потомства червям необходим внешний хозяин.\n\nПо природе они — паразиты.\n\nВ репродуктивной системе каждого зрелого червя развивается кладка, состоящая из защитных пузырей. Внутри эти пузыри содержат крайне едкие гаметы. Вместе с гаметами других участников тройки они способны порождать на планетах, содержащих подходящую биомассу, новых куколок. Хозяйские организмы не переживают этот процесс. У нас есть свидетельства координации червями бомбардировок с целью поддержания достаточного количества подходящих хозяев по всей галактике.\n\nКак бы то ни было, есть вероятность, что потенциал репродуктивных ферментов можно обернуть себе на пользу. Возможно, даже получится выработать иммунитет к методам размножения пустотных червей."
 grand_archive.2015.a: "Приспособить фертильность червей для наших нужд."
 grand_archive.2015.b: "Это отвратительно. Необходимо скорее найти лекарство."
