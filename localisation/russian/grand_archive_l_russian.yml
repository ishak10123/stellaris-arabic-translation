 GRAVITY_SNARE_CLOAKING_PSI: "$SCIENCE_CLOAKING_PSI$"
 GRAVITY_SNARE_NO_EMERGENCY_FTL: "Гравитационные ловушки неспособны совершать экстренные сверхсветовые маневры."
 FLEET_CANNOT_TAKE_ORDERS: "§RЭтой флотилии нельзя отдавать приказы.§!"
 MESSAGE_SPACE_CRITTER_CAPTURE_SUCCESS_TITLE: "Космическая фауна захвачена"
 MESSAGE_SPACE_CRITTER_CAPTURE_SUCCESS_DESC: "Захват фауны в системе $SYSTEM|Y$ прошел успешно! $gravity_snare$ отправила пойманный экземпляр в виварий.\n\nПолучена новая космическая фауна:\n$CAPTURED_LIST$$RESOURCES_LIST$"
 MESSAGE_SPACE_CRITTER_CAPTURE_SUCCESS_NO_VIVARIUM_DESC: "Захват фауны в системе $SYSTEM|Y$ прошел успешно! Поскольку в §Hвиварии§! нет места, захваченная фауна была умерщвлена и разделана на ресурсы.\n$CULLED_LIST$$RESOURCES_LIST$"
 MESSAGE_SPACE_CRITTER_CAPTURE_FAILURE_TITLE: "Попытка захвата провалилась"
 MESSAGE_SPACE_CRITTER_CAPTURE_FAILURE_DESC: "Попытка захвата в системе $SYSTEM|Y$ провалилась. $gravity_snare$, запущенная с корабля $SHIP_NAME|Y$, потеряна."
 MESSAGE_CAPTURED_SPACE_CRITTER_RETURNED_TITLE: "Новая космическая фауна"
 MESSAGE_CAPTURED_SPACE_CRITTER_RETURNED_DESC: "Новая космическая фауна помещена в виварий.\n$NEWBORN_LIST$$CULLED_LIST$$RESOURCES_LIST$"
 MESSAGE_CAPTURED_SPACE_CRITTER_RETURNED_DESC_CULLED: "\n\nСледующая фауна умерщвлена ради ресурсов:\n$CULLED_LIST$"
 CULLED_CREATURES_RESOURCE_OUTPUT_DESC: "\n\nПолученные ресурсы:\n  $RESOURCES_LIST$"
 mod_gravity_snare_cooldown_mult: "Перезарядка гравитационной ловушки"
 MOD_GRAVITY_SNARE_COST_MULT: "Стоимость гравитационной ловушки"
 MOD_SPACE_FAUNA_CULLING_REWARD_MULT: "Ресурсы от убоя"
 grand_archive.7210.name: "Гравитационные ловушки"
 grand_archive.7210.desc.common: "После того как были открыты §Y$tech_gravity_wells$§!, [root.GetAdjective&pl] научные корабли теперь могут запускать эти устройства."
 grand_archive.7210.desc.vivarium: "Эти несмертельные снаряды захватывают космическую фауну и переносят ее в §Yвиварий§!, где захваченные экземпляры могут размножаться.\n\nИх можно умерщвлять и разделывать, чтобы добывать §Y$genetic_material$§!, необходимый для клонирования и других целей."
 grand_archive.7210.desc.no_vivarium: "Эти несмертельные снаряды захватывают космическую фауну и переносят ее к ученым для изучения и разделывания. Таким образом добывают §Y$genetic_material$§! и ресурсы.\n\nЧтобы разводить космическую фауну, нам понадобится §Yвиварий§!. Для этого можно построить §Y$grand_archive$§! или возводить §Y[GetHatcheryPlural]§! на космических базах."
 grand_archive.7220.name: "Преторианские твари"
 grand_archive.7220.desc: "§Y$NAME_Prethoryn_Scourge$§! слишком сильна: наши §Y$gravity_snare_plural$§! не могут полноценно отслеживать и удерживать ее. Наблюдая за перемещениями этих существ мы предположили, что ими управляет некий высший разум, а сам рой неразделим.\n\nПри попытке поместить в виварий отдельную особь в опасности окажется не только остальной рой, но и [this.GetName].\n\nМы приостановили захват этих организмов на неопределенный срок."
 grand_archive.7220.a: "Разумная мера."
