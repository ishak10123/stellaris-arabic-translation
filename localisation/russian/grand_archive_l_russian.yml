 grand_archive.2053.name: "Пустотные черви истреблены"
 grand_archive.2053.desc: "Мы уничтожили последнюю систему, где обитали пустотные черви. Весь вид теперь истреблен окончательно.\n\nБольше не нужно опасаться их бомбардировок."
 grand_archive.2054.name: "Нора пустотных червей уничтожена"
 grand_archive.2054.desc: "Мы уничтожили родную систему пустотных червей.\n\nБольше они не смогут выращивать здесь потомство."
