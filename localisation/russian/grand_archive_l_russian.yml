 CURATORS_DESIGNATION: "Мы"
 DEAD_CURATORS_DESIGNATION: "Мы, последние члены этого ордена,"
 grand_archive.4121.name: "$leviathans.500.name$"
 grand_archive.4121.desc.common: "получили сведения, что вы построили §Y$grand_archive$§!, способный принимать тысячи и тысячи посетителей. Такое стремление поделиться историей нашей галактики с теми, кто жаждет знаний, похвально. В этом наши устремления совпадают.\n\nМы хотели бы помочь вам в этом деле."
 grand_archive.4121.desc.default: "Мы $grand_archive.4121.desc.common$ Продолжайте пополнять §Yколлекцию§!, а мы постараемся всеми силами помочь вам."
 grand_archive.4121.desc.dead: "Последние члены нашего ордена $grand_archive.4121.desc.common$ Несмотря на гибель ордена, мы пустим все оставшиеся средства на помощь в расширении вашей §Yколлекции§!."
 leviathans.4100.desc: "Ну конечно!\n\nМы заметили ваши старания. С учетом текущей §Yколлекции§! мы можем за небольшое пожертвование предложить вам следующую помощь."
 leviathans.4100.a: "Расскажите подробнее"
 leviathans.4100.a.aesthetic_wonder: "$leviathans.4100.a$ о §Yвыставке художественных чудес§!"
 leviathans.4100.a.historical_item: "$leviathans.4100.a$ о §Yвыставке, посвященной галактической истории§!"
 leviathans.4100.a.xeno_geology: "$leviathans.4100.a$ о §Yвыставке, посвященной ксеногеологии§!"
 leviathans.4100.tooltip.no_pending_reward: "Расширяйте коллекцию, чтобы получать больше помощи от кураторов."
 leviathans.4100.tooltip.no_reward: "Вы уже запросили помощь в том, что касается"
 leviathans.4100.tooltip.no_reward.aesthetic_wonder: "$leviathans.4100.tooltip.no_reward$ выставки художественных чудес"
 leviathans.4100.tooltip.no_reward.historical_item: "$leviathans.4100.tooltip.no_reward$ выставки, посвященной галактической истории"
 leviathans.4100.tooltip.no_reward.xeno_geology: "$leviathans.4100.tooltip.no_reward$ выставки, посвященной ксеногеологии"
 leviathans.4105.desc: "Разумеется.\n\nО чем бы вы хотели узнать?"
 leviathans.4105.a: "Нам нужна консультация по конкретным областям."
 leviathans.4105.b.common: "Мы хотели бы приобрести планы"
 leviathans.4105.b.aesthetic_wonder: "$leviathans.4105.b.common$ музея для §Yвыставки художественных чудес§!."
 leviathans.4105.b.historical_item: "$leviathans.4105.b.common$ музея для §Yвыставки, посвященной истории галактики§!."
 leviathans.4105.b.xeno_geology: "$leviathans.4105.b.common$ музея для §Yвыставки, посвященной ксеногеологии§!."
 leviathans.4105.c: "Мы хотели бы приобрести §Yреликвию§!."
 leviathans.506.g: "Как еще вы поможете помочь нашей §Yколлекции§!?"
 leviathans.4110.desc: "Помочь вам мы можем только в одной области: нас мало, а галактика велика.\n\nКакая именно область вас интересует?"
 leviathans.4111.desc: "$leviathans.4110.desc$"
 leviathans.4112.desc: "$leviathans.4110.desc$"
 leviathans.4115.desc: "Ну разумеется. Мы готовы передать вам предмет из частной коллекции.\n\nОднако такой подарок недешев. Взамен мы попросили бы крупное пожертвование."
 leviathans.4116.desc: "$leviathans.4115.desc$"
 leviathans.4117.desc: "$leviathans.4115.desc$"
