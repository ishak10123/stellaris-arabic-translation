 tr_domestication_bio_repurposing_tt: "Обломки, остающиеся после гибели нашей §Yкосмической фауны§!, можно исследовать, чтобы вернуть §G10%§! ее стоимости.\n$tr_domestication_bio_repurposing_blocker_tt$"
