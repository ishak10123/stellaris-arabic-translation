 ###########################
 #Space Fauna Description #
 ###########################
 space_amoeba_desc: "Космические амебы — хищники-одиночки, нападающие на всех, кого встретят. Благодаря поддержке частично сформировавшегося молодняка, известного как «жгутики», этим существам нет равных в преследовании жертв."
 tiyanki_desc: "Тиянки, также известные как космические киты, — это мирные существа, питающиеся атмосферными газами. Они склонны к сотрудничеству, а их стада в дикой природе имеют строгую иерархию."
 voidworm_desc: "Пустотные черви — это паразиты, которые для размножения оставляют свои споры в населенных мирах с подходящей биомассой. Взрослые особи объединяются в семейные группы по трое, так называемые «тройки», и строят гнезда неподалеку от черных дыр, где выращивают и защищают молодняк."
 cutholoid_desc: "Кутхолоиды — это огромные организмы, которые селятся в астероидах, используя их в качестве защиты для своих мягких тел. Эти существа проглатывают добычу целиком, а затем медленно расщепляют ее с помощью радиоактивных пищеварительных соков."
 crystalline_entity_desc: "Кристаллические организмы — уникальная форма живых кремниевых существ, которые могут свободно передвигаться по космосу. Оттенок каждого отдельного существа меняется не с возрастом, а в зависимости от скрытого внутреннего заряда."
 wild_tiyanki_ox_modifier: "Дикий тиянки-вол"
 fauna_disengagement_modifier: "Выход космической фауны из боя"
