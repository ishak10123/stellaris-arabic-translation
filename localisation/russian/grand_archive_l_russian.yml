 tr_domestication_containment_protocols: "Меры содержания"
 tr_domestication_containment_protocols_delayed: "При содержании и перевозке крупных организмов всегда есть риск, что они как-либо навредят самим себе или получат травму. С помощью правильно подобранных умиротворяющих газов и мер содержания эту опасность можно минимизировать."
