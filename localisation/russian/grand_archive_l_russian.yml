 grand_archive.4105.desc.3.common: "Ваша преданность сохранению памяти беспримерна. Мы хотели бы вручить вам один чрезвычайно особенный предмет. [GetStage3Description]"
 grand_archive.4105.desc.3.common_2: "Разумеется, в обмен на такую ценность нам хотелось бы получить щедрое пожертвование…"
 CURATORS_STAGE_3_DESC: "Вы можете выбрать из нашей особой коллекции какой-либо предмет силы. Мы не сомневаемся, что он попадет в добрые руки.\n\n$grand_archive.4105.desc.3.common_2$"
 DEAD_CURATORS_STAGE_3_DESC: "Эти предметы несут в себе силу. Лишь благодаря тому, что мы спрятали их в тайниках по всей галактике, они смогли пережить уничтожение нашей станции.\n\n$grand_archive.4105.desc.3.common_2$ Новую станцию не построить на одной только доброжелательности."
 grand_archive.4105.desc.3.xeno_geology: "$grand_archive.4105.desc.common.xeno_geology$\n\n$grand_archive.4105.desc.3.common$"
 grand_archive.4105.desc.3.aesthetic_wonder: "$grand_archive.4105.desc.common.aesthetic_wonder$\n\n$grand_archive.4105.desc.3.common$"
 grand_archive.4105.desc.3.historical_item: "$grand_archive.4105.desc.common.historical_item$\n\n$grand_archive.4105.desc.3.common$"
 grand_archive.4105.desc.3.no_relic.common: "В других обстоятельствах мы вручили бы вам один из ценнейших наших артефактов, однако его уже перехватили другие.\n\nВ утешение можем предложить какой-либо из этих предметов."
 grand_archive.4105.desc.3.no_relic.xeno_geology: "Ваша преданность делу §Yксеногеологии§! почти не имеет себе равных.\n\n$grand_archive.4105.desc.3.no_relic.common$"
 grand_archive.4105.desc.3.no_relic.aesthetic_wonder: "Ваша преданность делу §Yхудожественных чудес§! почти не имеет себе равных.\n\n$grand_archive.4105.desc.3.no_relic.common$"
 grand_archive.4105.desc.3.no_relic.historical_item: "Ваша преданность делу §Yистории§! почти не имеет себе равных.\n\n$grand_archive.4105.desc.3.no_relic.common$"
 grand_archive.4105.3.no_relic.resources: "Получить подарки."
 grand_archive.4105.3.no_relic.faction_modifier.xeno_geology: "Получить средства поддержки выставки."
