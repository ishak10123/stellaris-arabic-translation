 NAME_Treasure_Trove_Pirate_Ship: "Бандиты системы [event_target:pirate_system.GetName]"
 NAME_Treasure_Trove_Pirate_Ship_Design: "Флибустьер"
 grand_archive.6025.name: "Пиратская засада"
 grand_archive.6025.desc: "Пока мы искали §Y$TREASURE_TROVE$§! на [from.GetPlanetMoon]е [from.GetName], [fromfromfrom.Leader.GetName] [fromfromfrom.Leader.GetAXX::попал|||fem:попала] в засаду, подстроенную пиратской флотилией!\n\nЭти разбойники каким-то образом выследили нас и теперь хотят забрать сокровища себе. Чтобы клад достался нам, придется одолеть флотилию, пока та не успела завладеть добычей."
 grand_archive.6025.a: "Приготовиться к бою."
 TREASURE_TROVE_PIRATES: "Уничтожить «$NAME_Treasure_Trove_Pirate_Ship$»"
 TREASURE_TROVE_PIRATES_DESC: "Пиратская флотилия стремится завладеть §Yкладом§! на [this.GetPlanetMoon]е [this.GetName]!"
 TREASURE_TROVE_EVENT_TOOLTIP: "§RЭтих авантюристов необходимо уничтожить, пока они не завладели ресурсами.§!"
 grand_archive.6031.name: "Пираты побеждены"
 grand_archive.6031.desc: "После победы над пиратами-авантюристами мы теперь можем завладеть кладом на планете [event_target:treasure_trove_planet.GetName]."
 grand_archive.6031.a: "Заслуженная добыча."
 grand_archive.6035.name: "Клад потерян"
 grand_archive.6035.desc: "Пираты-авантюристы похитили §Y$TREASURE_TROVE$§! на планете [event_target:treasure_trove_planet.GetName].\n\nНам не оставили ничего ценного."
 grand_archive.6035.a: "Так бывает."
