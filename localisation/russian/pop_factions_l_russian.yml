 ### SLAVES
 slave_attraction_title: "§R---§!"
 docile_slaves_attraction_desc: "Порабощенные поселения, за исключением поселений неразумных роботов, всегда входят во фракцию рабов. Другие поселения присоединиться не могут.\n\n§HЭто значение показывает привлекательность покорных рабов для порабощенных поселений.§!"
 malcontent_slaves_attraction_desc: "Порабощенные поселения, за исключением поселений неразумных роботов, всегда входят во фракцию рабов. Другие поселения присоединиться не могут.\n\n§HЭто значение показывает привлекательность недовольных рабов для порабощенных поселений.§!"
 purged_attraction_title: "§R---§!"
 purged_attraction_desc: "Поселения, подвергающиеся геноциду, всегда входят в антигеноцидную фракцию, за исключением поселений роботов.\n\nДругие поселения присоединиться не могут."
 #Slave Demands
 pft_slave: "Фракция рабов"
 pft_slave_desc: "Фракция рабов состоит из порабощенных поселений нашего государства. Их основное требование — свобода.\n\n§HК этой фракции автоматически присоединяются все порабощенные поселения.§!"
 pft_docile_slaves: "Фракция покорных рабов"
 pft_docile_slaves_desc: "Фракция покорных рабов состоит из части или всех порабощенных поселений нашего государства. Они обычно послушны и хотят только улучшения условий работы.\n\n§HВсе рабы относятся либо к покорным, либо к недовольным.§!"
 pft_malcontent_slaves: "Фракция недовольных рабов"
 pft_malcontent_slaves_desc: "Фракция недовольных рабов состоит из части или всех порабощенных поселений нашего государства. Они мятежны и хотят освобождения.\n\n§HВсе рабы относятся либо к покорным, либо к недовольным.§!"
 pft_emancipation: "$POP_FACTION_SLAVE_DEMAND_TITLE_1$"
 pft_emancipation_desc: "Эта фракция стремится положить конец рабству."
 POP_FACTION_DOCILE_SLAVES_DEMAND_TITLE_1: "Регулируемое порабощение"
 POP_FACTION_DOCILE_SLAVES_DEMAND_DESC_1: "Поселения, входящие в эту фракцию, хотят чуть более комфортной жизни в рабстве в рамках политики §HРегулируемое порабощение§!."
 POP_FACTION_MALCONTENT_SLAVES_DEMAND_TITLE_1: "$POP_FACTION_SLAVE_DEMAND_TITLE_1$"
 POP_FACTION_MALCONTENT_SLAVES_DEMAND_DESC_1: "$POP_FACTION_SLAVE_DEMAND_DESC_1$"
 POP_FACTION_SLAVE_DEMAND_TITLE_1: "Освобождение"
 POP_FACTION_SLAVE_DEMAND_DESC_1: "Поселения, входящие в эту фракцию, требуют только одного — свободы."
