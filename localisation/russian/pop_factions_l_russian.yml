 ### New Events
 factions.1.title: "Основана фракция"
 factions.1.desc: "В последнее время новая фракция набирает обороты на внутренней политической арене [Root.Owner.GetName&gen]. Они называют себя [Root.GetName], и намерены твердо отстаивать свои интересы в тех областях, где они желают перемен.\n\nБезусловно, [Root.Owner.GetName] еще не раз станет свидетелем появления новых фракций. Население государства растет, и политические взгляды наших граждан становятся все более разнообразными. Фракции, недовольные существующим положением дел, могут оказаться источником неприятностей, но те, кто одобряет действия правительства, несомненно, станут весьма полезными…"
 factions.1.desc.start: "В последнее время на внутренней политической арене [Root.Owner.GetName&gen] набирает силу новая фракция. Они именуют себя §H[Root.GetName]§!." #trailing space is important
 MESSAGE_FACTION_FORMED_TITLE: "Новая фракция"
 factions.1.desc.start_short: "Образовалась новая фракция категории §H«[Root.GetFactionType]»§!. Она называет себя §H«[Root.GetName]»§!."
 factions.1.desc.firstfinisher: "Недовольная фракция становится источником проблем, но те, кто одобряет действия правительства, могут пригодиться…"
 factions.1.desc.imperialist: "Их члены упорно добиваются от нас подтверждения нашего военного превосходства над остальными частями галактики.\n\n"
 factions.1.desc.isolationist: "Их члены выступают за закрытие границ и невмешательство в галактические дела.\n\n"
 factions.1.desc.progressive: "Их члены стремятся к равенству и правосудию для всех жителей нашего государства.\n\n"
 factions.1.desc.prosperity: "Их члены выступают за движение к финансовому росту и стабильности мирными средствами.\n\n"
 factions.1.desc.supremacist: "Их члены стремятся утвердить [Root.Owner.GetSpeciesAdj&neut] превосходство, урезав при необходимости права чужаков.\n\n"
 factions.1.desc.technologist: "Их члены упорно добиваются развития различных наук.\n\n"
 factions.1.desc.totalitarian: "Их члены упорно добиваются крайней централизации политической и военной власти.\n\n"
 factions.1.desc.traditionalist: "Их члены поддерживают спиритуалистические и консервативные ценности.\n\n"
 factions.1.desc.xenoist: "Их члены упорно добиваются установления дружеских отношений с инопланетными расами.\n\n"
 MESSAGE_TRADITIONALIST_FACTION_FORMED_TITLE: "Новая фракция традиционалистов"
 MESSAGE_IMPERIALIST_FACTION_FORMED_TITLE: "Новая фракция империалистов"
 MESSAGE_SUPREMACIST_FACTION_FORMED_TITLE: "Новая фракция супремасистов"
