 factions.3000.name: "Политическая целина"
 factions.3000.desc: "Традиционные фракции и молодые движения проявляют неожиданный интерес к нашей новой колонии на [root.GetPlanetHabitatDE5] §Y[root.GetName]§!. С того момента, как мы объявили, что эта скромная [root.GetPlanetHabitat] станет местом для нового поселения, не высказались о нем лишь самые ленивые наши политики.\n\nНаши аналитики не ожидают, что на [root.GetPlanetHabitatDE5] [root.GetName] может зародиться какое-​нибудь радикальное движение, но они все равно советуют проявить осторожность. Очевидно, что этот молодой мир скоро станет ареной ожесточенных баталий самых разных политических образований."
 factions.3000.a.demo: "Такие оживленные дебаты нужно только приветствовать!"
 factions.3000.a.auth: "Следите внимательно за этими активистами."
 factions.3000.b: "Риск слишком велик. Усилить охрану."
 factions.3000.b.auth: "Этого допускать нельзя."
 planet_political_frontier: "Политическая целина"
 planet_political_frontier_desc: "В этой колонии идет активная агитация фракций всего политического спектра."
 planet_political_safezone: "Политические препоны"
 planet_political_safezone_desc: "Политическим фракциям рекомендуется не вести агитацию в этой колонии."
 planet_political_crackdown: "Политические запреты"
 planet_political_crackdown_desc: "Политическим фракциям запрещено вести агитацию в этой колонии."
 factions.3005.name: "Доклад о политике на [root.GetPlanetMoon]е [root.GetName]"
 factions.3005.desc.1: "Наши информаторы в колонии [root.GetName] шлют нам регулярные доклады о развитии политической ситуации в колонии. Вкратце: тенденция в целом благоприятная.\n\nМестные правоохранители и политические агенты смогли малыми силами свести открытое инакомыслие к минимуму. В частности, непокорные фракции практически не смогли найти сторонников среди колонистов. В результате политическая ситуация в колонии остается под нашим контролем."
 factions.3005.a: "Эти патриоты заслуживают похвалы."
 factions.3005.desc.2: "Приходящие из колонии [root.GetName] данные по политической ситуации дают почву для беспокойства. Политические кампании маргинального толка нашли отклик среди местного населения. Граждане повелись на сладкие обещания равенства и социальной мобильности и начали попирать базовые принципы нашего общества.\n\nНо несмотря ни на что, это все равно можно считать хорошей новостью. Мы собрали много данных наблюдений, которые помогут нам лучше понять устройство [owner.GetAdj&masc,gen] колониального политического дискурса. Кроме того, выманив на поверхность эти маргинальные элементы, мы обнажили эти опасные течения задолго до того, как они смогли укорениться в столице."
 factions.3005.b: "Но… что если в этих идеях что-то есть?"
 planet_political_admittance: "Лояльная политика"
 planet_political_admittance_desc: "В этой колонии разрешены более радикальные формы политического дискурса, которые здесь проще изучать."
 factions.3005.desc.3: "Информация о политических движениях в колонии [root.GetName] позволила построить интересные прогнозы. Мы наблюдаем тенденцию к большей готовности принимать новые идеи, выходящие за рамки того, что представляется нам разумной политической мыслью. Но при этом какой-либо значительной радикализации не ожидается.\n\nМожно опасаться, что такое отклонение от нашей генеральной линии ослабит нашу власть, но это все равно можно считать хорошей новостью. Мы собрали много данных наблюдений, которые помогут нам лучше понять, как устроен колониальный политический дискурс. Кроме того, мы доказали, что даже если дать голос маргинальным политическим движениям, [owner.GetAdj&masc] народ отвергает их наиболее радикальные элементы и в целом поддерживает принципы нашего государства."
 factions.3005.c: "Тогда эту практику следует поощрять."
 factions.3010.desc.1: "[root.GetName] представляет большой интерес для наших политологов. Впрочем, несмотря на всю бурную агитацию и громкий шум в СМИ, будущее политического ландшафта этой колонии кажется им достаточно типичным.\n\nНаши исследователи отмечают, что отсутствие новостей здесь тоже считается хорошими новостями. Несмотря на заявления отдельных маргинальных элементов нашего общества, [root.GetName] еще не скоро станет рассадником автократии. Пока что здесь еще правит демократия."
 factions.3010.a: "Возможно, нужно их немного встряхнуть."
 factions.3010.desc.2: "Похоже, колония [root.GetName] стала своего рода плацдармом для некоторых авторитарно настроенных политических образований. Их агитаторы были замечены в числе тех, кто избрал своей целью эту молодую колонию. Несмотря на то, что некоторые первоначальные успехи — еще не повод бить тревогу, наши политологи относятся к происходящему с осторожностью. Возможно, [root.owner.GetAdj&masc] взгляд на демократию не так уж незыблем."
 factions.3010.b: "Достойное испытание наших методов правления!"
 factions.3010.c: "Нужно встать на защиту идеалов демократии."
 factions.3010.desc.3: "[root.GetName] уже долгое время находится под наблюдением наших политологов. Они сообщают, что в местном обществе укоренились самые разные политические взгляды.\n\nПока что не наблюдается признаков, что [root.GetName] скатится в анархию или какую-либо другую, столь же радикальную идеологию. Однако [root.owner.GetAdj&masc] демократический метод правления в таких условиях сталкивается с серьезными трудностями, грозящими перерасти в настоящие риски, если какая-нибудь радикальная фракция наберет силу."
 factions.3010.frontier.tt: "Модификатор §Y$planet_political_frontier$§! будет действовать примерно §Y9§! лет. $MOD_POP_ETHICS_SHIFT_SPEED$ увеличивается на §G50%§!."
 factions.3010.d: "Эти риски слишком велики."
 ### Loyalists
 faction.4.title: "Требования лоялистов"
 faction.4.desc: "[Root.Owner.GetRulerTitle] [Root.Owner.GetRulerName] из [Root.Owner.GetName&gen] пользуется поддержкой лоялистов, которые не выдвигают никаких требований."
 ### Slaves
 faction.6.title: "Голодовка!"
 faction.6.desc: "Рабы [Root.Owner.GetPlanetMoon]ы [Root.Owner.GetName] решили уничтожить наши производственные мощности — свои тела — в ходе добровольной голодовки. Члены фракции [Root.GetName], по сути, §Yуничтожают§! себя на [Root.Owner.GetPlanetMoon]е [Root.Owner.GetName].\n\nЕсли мы не предпримем мер, то потеряем львиную долю порабощенного населения. Мы можем подождать, пока несчастные умрут или найти другой способ усмирить непокорную фракцию."
 faction.7.title: "Восстание рабов!"
 faction.7.desc: "Рабы с [slave_planet.GetPlanetMoon]ы [slave_planet.GetName] восстали против хозяев и создали нелегальную мятежную коалицию, чтобы освободиться от своих законных владельцев — [Root.Owner.GetName]!"
 faction.8.title: "Принудительное питание"
 faction.8.desc: "Раб не имеет права повреждать или угнетать свое тело.\n\nИх бессмысленный самогеноцид завершился, и все, кто принял в нем участие, получили соответствующие дозы питательных веществ."
 faction.10.title: "Волнения рабов!"
 faction.10.desc: "Повсеместные волнения среди рабов на [unrest_planet.GetPlanetMoon]е [unrest_planet.GetName] отрицательно влияют на их объемы производства."
 faction.10.desc.colle: "Среди порабощенных поселений [Root.Owner.GetName&gen] распространяется недовольство, причем центром является [unrest_planet.GetPlanetMoon]а [unrest_planet.GetName]."
 faction.10.a.tooltip: "§HПорабощенные поселения§! на планете §H[unrest_planet.GetName]§! получают модификатор §RВолнения рабов§! на §Y4 года§!."
 faction.15.title: "Насилие среди рабов!"
 faction.15.desc: "Бродячие толпы, состоящие из нерадивых рабов, вступили в жестокое противостояние с другими представителями населения на [roving_gangs_planet.GetPlanetMoon]е [roving_gangs_planet.GetName], что привело к уничтожению 100 поселений.\n\nПока еще неясно, как на случившееся отреагируют товарищи погибших."
 faction.15.a.tooltip: "[roving_gangs_planet]:\n§R100§! £pop£ §Hпоселений§! умрут."
 faction.50.title: "Межгалактическая железная дорога!"
 faction.50.desc: "Похоже, некоторые из более радикальных элементов среди наших рабов объединились, чтобы вывезти рабов с [Root.Owner.GetAdj&fem,gen] территории.\n\nМы не знаем, как было совершено преступление такого масштаба, но мы совершенно уверены, что рабы теперь свободны и находятся где-то за пределами [Root.Owner.GetAdj&pl,gen] владений."
 faction.50.desc.colle: "Одна запутавшаяся фракция сочла нужным оскорбить [Root.Owner.GetName&acc], отстранив нескольких рабов от исполнения их обязанностей и вывезя их за пределы [Root.Owner.GetAdj&pl,gen] территорий.\n\nСо временем мы исцелимся и надеемся, что заблудшие в конце концов вернутся назад в [Root.Owner.GetName&acc] и поймут свое истинное предназначение."
 faction.50.a: "Досадно."
 faction.50.1.tooltip: "[Root.Owner.GetName]:\nПорабощенные поселения: §R-1§!"
 faction.50.3.tooltip: "[Root.Owner.GetName]:\nПорабощенные поселения: §R-3§!"
 faction.50.4.tooltip: "[Root.Owner.GetName]:\nПорабощенные поселения: §R-4§!"
 faction.50.5.tooltip: "[Root.Owner.GetName]:\nПорабощенные поселения: §R-5§!"
 faction.55.title: "Бунт недовольных рабов!"
 faction.55.desc.colle: "Некоторые элементы во фракции [Root.GetName] загорелись желанием причинить вред [Root.Owner.GetName&dat], уничтожив производственный объект на [riots_planet.GetPlanetMoon]е [riots_planet.GetName]. Мы можем только предположить, вредить самим себе таким образом их побуждают те же самые дефекты, что мешают им занять достойное место в [Root.Owner.GetAdj&fem,gen] иерархии."
 faction.55.desc: "Бунтующие рабы разрушили сооружение на [riots_planet.GetPlanetMoon]е [riots_planet.GetName], и его нужно отремонтировать, чтобы можно было возобновить производство."
 faction.60.title: "Восстание недовольных рабов!"
 faction.60.desc: "Более радикальные элементы среди наших рабов восстали — как и следовало ожидать, по мнению некоторых, — с оружием в руках против нашего законного правления.\n\nСогласно поступившим сообщениям, волнения начались на [revolt_planet.GetPlanetMoon]е [revolt_planet.GetName] и, возможно, уже распространились за ее пределы."
 faction.60.desc.colle: "Недовольство среди тех, кого назначили выполнять черную работу ради славы и благополучия [Root.Owner.GetName&gen], достигло критической точки кипения.\n\nИх неспособность увидеть более широкую картину и свое место в ней привела к открытому восстанию на [revolt_planet.GetPlanetMoon]е [revolt_planet.GetName], — и за ней могут вскоре последовать и другие миры, если этого уже не произошло."
 faction.60.a: "Это катастрофа."
 faction.60.b: "Невежды и глупцы…"
 faction.60.a.tooltip: "Фракция §Hнедовольных рабов§! §Yвосстала§!!"
 faction.80.title: "Радикализация рабов!"
 faction.80.desc: "Члены местного отделения фракции [Root.GetName], похоже, успешно провели радикализацию нескольких [Root.Owner.GetAdj&pl,gen] рабов, пополнив тем самым ряды недовольных."
 ### Separatists
 #From = pop faction
 #Parameters = planet
 pft_planet_separatists: "Фракция сепаратистов планеты"
 pft_planet_separatists_desc: "Сепаратисты планеты могут появляться на колонизированных планетах и стремятся освободить свою планету от имперской власти. При достаточном уровне народной поддержки они могут даже взяться за оружие.\n\n§HСепаратисты планеты появляются только на напрямую управляемых планетах.§!"
 #Separatists rebel
 faction.100.title: "Сепаратисты подняли бунт!"
 faction.100.desc: "Волнения на [planet.GetPlanetMoon]е [planet.GetName] достигли критической отметки. Местная фракция сепаратистов поднялась в вооруженной попытке захватить планету."
 #Separatists riot
 faction.101.title: "Восстание сепаратистов!"
 faction.101.desc: "Народный гнев на планете §Y[planet.GetName]§! достиг точки кипения и члены фракции §Y[Root.GetName]§! вышли на улицы, поджигая здания и мародерствуя.\n\nПо нашим данным, главное предприятие колонии уничтожено."
 #Separatist leader assassinated
 faction.102.title: "Лидер фракции убит!"
 faction.102.desc: "Фракция [Root.GetName] охвачена паникой после того, как внезапно погиб ее лидер [Root.Leader.GetName].\n\n[Root.Owner.GetSpeciesAdj&masc,inst] гражданам представят это событие как итог борьбы за власть внутри фракции [Root.GetName]. Несмотря на появление нового лидера, народная поддержка фракции уменьшилась."
 #Separatist sector created
 faction.103.title: "Сектор создан!"
 faction.103.desc: "Фракция [Root.GetName] получила в свое распоряжение полунезависимый сектор с правительством на [parameter:planet.GetPlanetMoon]е [parameter:planet.GetName]."
 faction.104.title: "Государство освобождено!"
 faction.104.desc: "Чтобы ублажить и, по сути, устранить сепаратистов, колония на [parameter:planet.GetPlanetMoon]е [parameter:planet.GetName] получила независимость от [Root.Owner.GetName&gen].\n\nФракция [Root.GetName] теперь является отдельным государством."
 ### Crusaders
 #Crusaders want to a crusade to against the heathens, conquer their capital
 faction.200.title: "Фракция [Root.GetName] заклеймила еретиков [parameter:heathens.GetName]!"
 faction.200.desc: "они указывают иностранную столицу как важный объект и хотят ее захватить."
 holy_war_title: "Священная война"
 holy_war_desc: "Возглавить крестовый поход против: [parameter:heathens.GetName]."
 holy_war_1_poi: "Главная система"
 holy_war_1_poi_desc: "Планета еретиков."
 profane_planets_seized: "Еретические планеты очищены"
 #Capital conquered
 faction.201.title: "Столица еретиков захвачена!"
 faction.201.desc: "Их храмы осквернены, а их боги отвернулись от них."
 faction.202.title: "Оскорбление [parameter:heathens.GetName&gen]"
 faction.202.desc: "Из-за досадного промаха в системе безопасности фракция [Root.GetName] ненадолго получила доступ к нашим каналам дипломатической связи. Они использовали эту возможность, чтобы оскорбить [parameter:heathens.GetName&acc], обвинив [parameter::heathens.GetName:его|||fem:ее|||pl:их] в ереси и аморальных деяниях.\n\nГлубоко религиозные [parameter:heathens.GetSpeciesNamePlural] крайне недовольны этим инцидентом."
 faction.202.a: "Какой позор."
 faction.202.a.tooltip: "§Y[parameter:enemy.GetName]§! модификатор мнения §YОскорбление фракции§! по отношению к §Yнашему государству§!."
 faction.203.title: "Попытка оскорбления"
 faction.203.desc: "В результате очередного крайне неприятного промаха в системе безопасности фракция [Root.GetName] ненадолго получила доступ к нашим каналам дипломатической связи. Они использовали эту возможность, чтобы вновь унизить религиозные взгляды [parameter:heathens.GetName&gen].\n\nК счастью, государство [parameter:heathens.GetSpeciesNamePlural] не приняло всерьез этот повторный инцидент и, похоже, проигнорировало его."
 faction.203.a: "Пронесло…"
 faction.204.title: "Религиозный бунт!"
 faction.204.desc: "Мы получили сообщения о том, что радикально настроенные элементы фракции [Root.GetName] готовят вооруженное восстание на [planet.GetPlanetMoon]е [planet.GetName].\n\nПодготовка только началась, так что у нас еще есть возможность задушить бунт в зародыше."
 faction.204.a: "Ну что ж…"
 faction.204.a.tooltip: "[planet.GetName]:\nВосстание!"
 ### Nationalists
 faction.301.title: "Диверсия националистов!"
 faction.301.desc: "Радикалы-[Root.GetName] разрушили сооружение на [planet.GetPlanetMoon]е [planet.GetName]."
 faction.301.desc.phobe: "Чужаки-громилы из фракции [Root.GetName] разрушили сооружение на [planet.GetPlanetMoon]е [planet.GetName] с расчетом навредить [Root.Owner.GetAdj&pl,dat] интересам и с очевидной целью уничтожить наш образ жизни."
 faction.301.desc.phile: "Во всем остальном прекрасные члены фракции [Root.GetName] сочли нужным выразить свое недовольство нашим правлением, выведя из строя комплекс — или, по мнению некоторых, проведя диверсию — на [planet.GetPlanetMoon]е [planet.GetName]."
 faction.302.title: "Восстание националистов!"
 faction.302.desc: "Вдохновленный повсеместной поддержкой народ [Root.GetName] взялся за оружие и пытается силой вернуть свои территории."
 faction.302.desc.phobe: "Чужаки-​бунтари из фракции [Root.GetName] хотят свергнуть [Root.Owner.GetAdj&neut] правление в ходе открытого восстания!"
 faction.302.desc.phile: "Вследствие того, что мы постоянно игнорировали их требования, фракция [Root.GetName] перешла к открытому восстанию."
 ### Peace Movement
 faction.400.title: "Диверсия на флоте!"
 faction.400.desc: "В какой-то момент радикально настроенные члены фракции [From.GetName] успешно проникли на как минимум один [Root.Owner.GetSpeciesAdj&masc] военный корабль и установили взрывчатку. Они детонировали взрывчатку, полностью уничтожив [Root.GetName].\n\n[From.Leader.GetName], лидер фракции [From.GetName], считает это действие наглядным примером недопустимости любого насилия, в частности, войны, в которую втянуты [Root.Owner.GetName] и [From.parameter:enemy.GetName]."
 faction.400.a: "Какое двуличие."
 faction.400.a.tooltip: "§R[Root.GetName] уничтожен.§!"
 faction.401.title: "Прекращение огня"
 faction.401.desc: "Все дипломатические связи, обязывающие продолжать войну с [From.parameter:enemy.GetName&inst], разорваны, и мы предложили мир на условиях статус-кво."
 faction.401.a: "Мы надеемся, они этим довольны."
 faction.402.title: "Прекращение огня"
 faction.402.desc: "Мы предложили мир на условиях статус-кво [From.parameter:enemy.GetName&gen] в надежде положить конец войне."
 faction.402.a: "Зачем нам эта война?"
 ### Liberation Faction
 faction.501.title: "Оскобрление [parameter:enemy.GetName&gen]"
 faction.501.desc: "Из-за досадного промаха в системе безопасности фракция [Root.GetName] ненадолго получила доступ к нашим каналам дипломатической связи. Они использовали эту возможность, чтобы глубоко оскорбить [parameter:enemy.GetName&acc] и потребовать немедленного возвращения [parameter:planet.GetPlanetMoon]ы [parameter:planet.GetName].\n\n[parameter:enemy.GetSpeciesNamePlural] крайне недовольны произошедшим."
 faction.501.a: "Какой позор."
 faction.501.a.tooltip: "§Y[parameter:enemy.GetName]§! добавляет модификатор отношения §YОскорбление фракции§! к §Yнашему государству§!."
 faction.502.title: "Попытка оскорбления"
 faction.502.desc: "В результате очередного крайне неприятного промаха в системе безопасности фракция [Root.GetName] ненадолго получила доступ к нашим каналам дипломатической связи. Они использовали эту возможность, чтобы вновь унизить [parameter:enemy.GetName&acc] и потребовать немедленного возвращения [parameter:planet.GetPlanetMoon]ы [parameter:planet.GetName].\n\nК счастью, [parameter:enemy.GetSpeciesNamePlural] не приняли всерьез этот повторный инцидент и, похоже, проигнорировали его."
 faction.502.a: "Пронесло…"
 faction.503.title: "Воинственные мятежники!"
 faction.503.desc: "Мы получили сообщения о том, что радикально настроенные элементы фракции [Root.GetName] создали хорошо организованные отряды мятежников на [planet.GetPlanetMoon]е [planet.GetName].\n\nПодготовка только началась, так что у нас еще есть возможность задушить бунт в зародыше."
 faction.503.a: "Ну что ж…"
 faction.503.a.tooltip: "[planet.GetName]:\n§RВосстание!§!"
 ### Emancipation Faction
 faction.600.title: "Радикализация рабов"
 faction.600.desc: "Есть данные, что члены фракции [Root.GetName] сеют смуту среди рабов. По некоторым слухам, они обучают и даже вооружают отщепенцев из фракции [parameter:slave_faction.GetName], хотя это звучит слишком дико, чтобы быть правдой."
 faction.600.a: "Но это все равно тревожит."
 faction.600.a.tooltip: "[parameter:slave_faction.GetName]:\n§R+50%§! Воинственность\n§R+30%§! Поддержка"
 faction.601.title: "Межгалактическая железная дорога"
 faction.601.desc: "До нас дошли слухи, что несколько радикально настроенных членов фракции [Root.GetName] освободили группу рабов на [railroad_planet.GetPlanetMoon]е [railroad_planet.GetName] и увезли их туда, куда [Root.Owner.GetName] не сможет дотянуться."
 faction.601.a: "Надо внимательнее за ними следить."
 faction.601.a.tooltip: "[railroad_planet.GetName]:\nПорабощенные поселения: §R-1§!"
 ### Xenoslaver Faction
 faction.700.title: "Рабы захвачены!"
 faction.700.desc: "По слухам, обезумевшая фракция [Root.GetName] поработила жителей [Root.Owner.GetName&gen], не относящихся к [Root.Owner.GetSpeciesAdj&fem,gen] расе."
 faction.700.a: "Это возмутительно!"
 faction.700.a.tooltip: "Рабы:\n§Y+200§! £pop£ §Hпоселений§!"
 faction.701.title: "Фракция [parameter:rebelling_faction.GetName] бунтует!"
 faction.701.desc: "Устав от того, сколь мягко [Root.Owner.GetName] обходится с обнаглевшими чужаками, бывшие рабовладельцы с [parameter:planet.GetPlanetMoon]ы [parameter:planet.GetName] собрались вместе, создали конфедерацию общин и объявили о своей независимости."
 faction.701.a: "Это очень, очень, очень возмутительно."
 ### Purged Faction
 faction.801.title: "Борьба до конца"
 faction.801.desc: "Доведенные до отчаяния граждане [riot_planet.GetPlanetMoon]ы [riot_planet.GetName], которым угрожает чистка, решили атаковать и разрушить одно из предприятий планеты."
 faction.803.title: "[Root.GetName] бунтует!"
 faction.803.desc: "Доведенные до отчаяния граждане, которым угрожает чистка на [death_planet.GetPlanetMoon]е [death_planet.GetName], восстали с оружием в руках против власти [Root.Owner.GetName&gen] и создали слабое повстанческое движение."
