 ####################################
 #Pop factions
 ####################################
 #Demand TITLES are run straight from a pop faction with no
 #assembled event scope, [Owner.GetName] to get country name.
 #Tooltips, DESCS and events use the usual [Root.Owner.GetName]
 ### NEW FACTIONS
 #Descriptors
 pft_supremacist: "Супремасисты"
 pft_supremacist_desc: "Фракции супремасистов желают превосходства расы, основавшей их государство. Они продвигают законы, дающие преимущества их собственной расе в ущерб другим.\n\n§LПринципы ксенофобии и милитаризма§!"
 pft_traditionalist: "Традиционалисты"
 pft_traditionalist_desc: "Фракции традиционалистов желают возвращения к традиционным ценностям, которые существовали (или не существовали) еще до того, как государство стало покорять звезды. Они призывают к благому аскетизму и осуждают изменения в обществе, ставшие следствием стремительного развития технологий и противных спиритуализму ценностей.\n\n§LПринцип спиритуализма§!"
 pft_progressive: "Прогрессисты"
 pft_progressive_desc: "Фракции прогрессистов выступают за равенство в пределах существующих социальных структур. Они не приемлют непредставительных форм правления и ценят равноправное сотрудничество с другими империями.\n\n§LПринцип эгалитаризма§!"
 pft_imperialist: "Империалисты"
 pft_imperialist_desc: "Фракции империалистов жаждут господства внутри собственных границ и над другими государствами. Они процветают за счет соперничества и завоевания других государств и предпочитают полагаться на свои силы.\n\n§LПринципы авторитаризма и милитаризма§!"
 pft_isolationist: "Изоляционисты"
 pft_isolationist_desc: "Фракции изоляционистов предпочитают, чтобы остальная галактика поменьше вмешивалась в их внутренние дела. Они выступают за сокращение контактов с другими государствами до минимума и за отказ от агрессивных войн — но не за отказ от обороны как таковой.\n\n§LПринципы ксенофобии и пацифизма§!"
 pft_technologist: "Технологисты"
 pft_technologist_desc: "Фракции технологистов желают, чтобы все государство выбирало научный прогресс и пользовалось плодами технических достижений. Они не приемлют политически мотивированных запретов в отношении определенных научных направлений и не любят, когда другие государства опережают их в развитии.\n\n§LПринцип материализма§!"
 pft_totalitarian: "Тоталитаристы"
 pft_totalitarian_desc: "Фракции тоталитаристов мечтают о строго разделенном на классы обществе под руководством сильного лидера или влиятельной группы.\n\n§LПринцип авторитаризма§!"
 pft_xenoist: "Ксенофилы"
 pft_xenoist_desc: "Фракции ксенофилов пропагандируют уважение к инопланетной жизни и культурам. Они одобряют разнообразие населения и взаимодействие с другими расами. Они не приемлют рабство и геноцид рас.\n\n§LПринципы ксенофилии и эгалитаризма§!"
 pft_prosperity: "Фракция процветания"
 pft_prosperity_desc: "Фракции процветания стремятся к экономическому росту и приобретению ресурсов. Они выступают за свободу торговли и не приемлют вооруженных конфликтов, нарушающих внутреннее развитие.\n\n§LПринципы ксенофилии и пацифизма§!"
 pft_democratic_election_1: "Демократы"
 pft_democratic_election_1_desc: "Фракции демократической партии появляются во время имперских выборов и распадаются вскоре после этого, служа средством выдвижения определенных популярных лидеров на политическую сцену."
 pft_democratic_election_2: "$pft_democratic_election_1$"
 pft_democratic_election_2_desc: "$pft_democratic_election_1_desc$"
 pft_democratic_election_3: "$pft_democratic_election_1$"
 pft_democratic_election_3_desc: "$pft_democratic_election_1_desc$"
 pft_democratic_election_4: "$pft_democratic_election_1$"
