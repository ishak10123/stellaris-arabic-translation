 factions.1.desc.unplugged_start: "На внутренней политической арене [Root.Owner.GetName&gen] образовалась новая фракция. Она называет себя §H«[Root.GetName]»§!." #trailing space is important
 factions.1.desc.unplugged_imperialist: "Их члены выступают за применение всех видов имеющегося у нас аугментированного вооружения ради доминирования в галактике\n\n"
 factions.1.desc.unplugged_isolationist: "Их члены выступают за закрытие границ и невмешательство машин и других обитателей галактики в дела народа.\n\n"
 factions.1.desc.unplugged_progressive: "Их члены стремятся к миру и гармонии с соседями по галактике и правосудию для всех жителей нашего государства.\n\n"
 factions.1.desc.unplugged_prosperity: "Их члены выступают за достижение финансового роста и стабильности мирными средствами без использования военных аугментаций.\n\n"
 factions.1.desc.unplugged_supremacist: "Их члены стремятся утвердить [Root.Owner.GetSpeciesAdj&neut] превосходство посредством грозных машин собственного производства.\n\n"
 factions.1.desc.unplugged_technologist: "Их члены упорно добиваются развития различных наук и углубленного понимания природы наших аугментаций.\n\n"
 factions.1.desc.unplugged_totalitarian: "Их члены упорно добиваются крайней централизации верховной политической и военной власти на основе того, что нам известно о машинном разуме.\n\n"
 factions.1.desc.unplugged_traditionalist: "Их члены поддерживают спиритуалистические и консервативные ценности, во многом совпадающие с представлениями о нашем органическом прошлом.\n\n"
 factions.1.desc.unplugged_xenoist: "Их члены упорно добиваются установления дружеских отношений с инопланетными расами невзирая на прошлое, проведенное под гнетом Машины.\n\n" #'Machine' as an adjective in reference to the intelligence that once assimilated us
 factions.2000.title: "Смена принципов в [TargetFaction.Owner.GetName&prep]"
 factions.2000.desc.start: "Фракция §Y[TargetFaction.GetName]§! в [TargetFaction.Owner.GetName&prep] долгое время набирала популярность, и это государство наконец приняло ее вместе с основными ценностями и политикой."
 factions.2000.desc_short: "Фракция §Y«[TargetFaction.GetFactionType]»§! в §H[TargetFaction.Owner.GetName&prep]§! стала ближе к идеям разновидности §H«[TargetFaction.GetEthicEquivelent]»§!."
 MESSAGE_FACTION_EMBRACED_TITLE: "Смена руководящих принципов"
 factions.2000.desc.imperialist: "После привлечения этой фракции в правительство оно стало более явно следовать принципам §Hмилитаризма§!.\n\n"
 factions.2000.desc.isolationist: "После привлечения этой фракции в правительство оно стало более явно следовать принципам §Hксенофобии§!.\n\n"
 factions.2000.desc.progressive: "После привлечения этой фракции в правительство оно стало более явно следовать принципам §Hэгалитаризма§!.\n\n"
 factions.2000.desc.prosperity: "После привлечения этой фракции в правительство оно стало более явно следовать принципам §Hпацифизма§!.\n\n"
 factions.2000.desc.supremacist: "После привлечения этой фракции в правительство оно стало более явно следовать принципам §Hксенофобии§!.\n\n"
 factions.2000.desc.technologist: "После привлечения этой фракции в правительство оно стало более явно следовать принципам §Hматериализма§!.\n\n"
