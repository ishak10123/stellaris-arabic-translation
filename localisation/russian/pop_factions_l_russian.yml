 MESSAGE_TOTALITARIAN_FACTION_FORMED_TITLE: "Новая фракция тоталитаристов"
 MESSAGE_PROGRESSIVE_FACTION_FORMED_TITLE: "Новая фракция прогрессистов"
 MESSAGE_PROSPERITY_FACTION_FORMED_TITLE: "Новая фракция процветания"
 MESSAGE_TECHNOLOGIST_FACTION_FORMED_TITLE: "Новая фракция технологистов"
