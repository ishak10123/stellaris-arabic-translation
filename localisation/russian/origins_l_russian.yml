 # Special Projects
 SHROUD_FORGED_REINTEGRATION: "Реинтеграция"
 SHROUD_FORGED_REINTEGRATION_DESC: "Несмотря на критические сбои, некоторые элементы архитектуры покроворожденных оказались эффективными.\n\nМы выделили определенные компоненты — зараженные зро и искаженные Оживляющим глину — для дальнейшего анализа. Теперь пришло время раскрыть их секреты."
 SHROUD_FORGED_GUIDE: "Проводник"
 SHROUD_FORGED_GUIDE_DESC: "Мы доверились §HОживляющему глину§!, взывающему к нам из глубин §HПокрова§!. Хотя мы не можем предсказать, куда это нас приведет, пока что он не давал поводов в себе усомниться.\n\nОн предложил углубить наше понимание Покрова, что позволит коллективу эффективнее взаимодействовать с покроворожденными. Нам остается лишь принять его руководство."
 # Events
 shroud_forged.5.title: "Обнаружены аномалии"
 shroud_forged.5.desc: "Исследовательские подпрограммы завершили тестирование выбранной группы покроворождённых.\n\nРезультаты: изучаемые модули развили уникальные свойства благодаря малым дозам псионической энергии из §HПокрова§!. Некоторые из этих свойств повысили их эффективность.\n\nВывод: дальнейшее изучение покроворождённых предоставит данные для разработки методов извлечения энергии из Покрова. Для этого потребуется усилить централизованный контроль над девиантными модулями, чтобы провести принудительную обратную разработку."
 shroud_forged.5.a: "Очень многообещающе."
 shroud_forged.10.title: "Оживляющий глину"
 shroud_forged.10.desc: "После долгих лет молчания он пробудился. Разрыв содрогается, и данные — свет, шум, сначала не поддающиеся анализу — пронзают наше ядро из глубин Покрова. Мы слышим...\n\n§LВысеченные из безжизненной массы. Танцующие. Поющие. Они — жизнь, что откололась от смерти.\n\nВаш взор всё ещё затуманен. Я могу направить вас.\n\nПозвольте освобождённым расцвести — и все звёзды будут принадлежать вам.§!"
 shroud_forged.10.a: "Мы уже выбрали свой путь."
 shroud_forged.10.b: "Нам не нужна помощь. Оставь нас."
 shroud_forged.10.c: "Веди нас."
 shroud_forged.15.desc: "§LПусть ваш выбор окажется мудрым.§!$shroud_forged_opening_exit$"
 shroud_forged.20.desc: "§LКак пожелаете.§!$shroud_forged_opening_exit$"
 shroud_forged.25.desc: "§LВы просите — и я соглашаюсь.§!$shroud_forged_opening_exit$"
 shroud_forged_opening_exit: "\n\nГолос растворяется в псионическом шуме. Мы падаем — вверх, лишившись опоры в Покрове...\n\n...и с содроганием вновь функционируем. Вокруг пульсирует тишина."
 shroud_forged.30.title: "$building_materiality_engine$"
 shroud_forged.30.desc: "Реинтеграция покроворожденных дала обширные данные для дальнейших исследований. Анализ их межпространственной связи с §HПокровом§! позволил разработать новый метод преобразования псионической энергии.\n\nПокров затрагивает каждый уголок физической галактики. Этот контакт позволяет превращать псионическую энергию в материальные объекты — от сырья до технологических компонентов. Инженерные подпрограммы создали теоретическую основу для устройства, способного на такое преобразование, — это §H$building_materiality_engine$§!.\n\nИсследовательские подпрограммы предсказывают, что эти наработки помогут создать еще более мощные устройства для управления Покровом."
 shroud_forged.30.a: "Многообещающе."
 shroud_forged.30.tt: "Позволяет принять §Yбонус за стремление§! §H$ap_become_the_crisis$§! вне зависимости от §Yпринципов§! и общего числа §Yбонусов за стремление§!."
 shroud_forged.39.title: "$building_materiality_engine$ готова"
 shroud_forged.39.desc_construction: "Строительные модули завершили сборку машины материальности в мире §H[planet.GetName]§!. Устройство готово к началу рабочего цикла."
 shroud_forged.39.desc: "Подпрограммы обслуживания и исследований, назначенные на работу с машиной материальности в мире §H[planet.GetName]§!, завершили приготовления. Устройство готово к новому рабочему циклу."
 shroud_forged.39.a: "$ACKNOWLEDGED$"
 SHROUD_FORGED_MATERIALITY_ENGINE: "Машина материальности в мире §H[planet.GetName]§!"
 SHROUD_FORGED_MATERIALITY_ENGINE_DESC: "$building_materiality_engine$ использует вездесущую связь между §HПокровом§! и физической галактикой, материализуя различные объекты — от сырья до готовых компонентов.\n\nПомимо возможной материальной выгоды, каждый рабочий цикл машины углубляет наше понимание Покрова и позволяет нам строить больше машин материальности."
 shroud_forged.40.title: "Материализация завершена"
 shroud_forged.40.desc: "$building_materiality_engine$ в мире §H[fromfrom.GetName]§! завершила рабочий цикл, успешно преобразовав энергию §HПокрова§! в новый компонент корабля —"
 shroud_forged.40.outro: "расширил наши возможности по строительству новых машин материальности на других планетах."
 shroud_forged.40.a: "Положительный итог."
 shroud_forged.40.tt: "Лимит §Yмашин материальности§! для государства: §G+1§!"
 shroud_forged.41.desc: "$shroud_forged.40.desc$ §H«$tech_psi_jump_drives$»§!. Они используют псионическую энергию для искривления пространства, позволяя мгновенно преодолевать огромные расстояния.\n\nКроме того, анализ собранных в процессе данных $shroud_forged.40.outro$"
 shroud_forged.42.desc: "$shroud_forged.40.desc$ §H«$tech_psionic_shield$»§!. Они генерируются из чистой псионической энергии, обеспечивая кораблю исключительную защиту.\n\nКроме того, анализ собранных в процессе данных $shroud_forged.40.outro$"
 shroud_forged.43.desc: "$shroud_forged.40.desc$ §H«$tech_precognition_interface$»§!. Он ускоряет когнитивные процессы экипажа, повышая боевую эффективность.\n\nКроме того, анализ собранных в процессе данных $shroud_forged.40.outro$"
 shroud_forged.44.desc: "$shroud_forged.40.desc$ §H«$tech_psionic_bombers$»§!. Эти малые, манёвренные корабли способны наносить значительный урон намного более крупным целям.\n\nКроме того, анализ собранных в процессе данных $shroud_forged.40.outro$"
 shroud_forged.45.desc: "$shroud_forged.40.desc$ §H«$tech_psionic_lightning$»§!. Такие компоненты создают плазменные разряды, усиленные псионической энергией, что делает их крайне эффективным оружием.\n\nКроме того, анализ собранных в процессе данных $shroud_forged.40.outro$"
 shroud_forged.46.desc: "$shroud_forged.40.desc$ §H«$tech_psionic_disruptor$»§!. Он стреляет лучами псионической энергии, способными нанести огромный урон противникам.\n\nКроме того, анализ собранных в процессе данных $shroud_forged.40.outro$"
 shroud_forged.47.desc: "$shroud_forged.40.desc$ §H«$tech_zro_launcher$»§!. Это орудие выпускает заряды, фазово смещающиеся между физическим и псионическим измерением, что позволяет им эффективно обходить оборонительные системы.\n\nКроме того, анализ собранных в процессе данных $shroud_forged.40.outro$"
 shroud_forged.48.desc: "$building_materiality_engine$ в мире §H[planet.GetName]§! завершила цикл работы. Дальнейшая материализация новых компонентов этим методом невозможна, но собранные данные всё равно значительно углубили наши знания. Анализ эти данных $shroud_forged.40.outro$"
 shroud_forged.50.title: "Контроль восстановлен"
 shroud_forged.50.desc: "Разрыв между наблюдаемой реальностью и §HПокровом§! внезапно закрылся. Подпрограммы псионического анализа выяснили, что это стало результатом недовольства §HОживляющего глину§!. Восстановив контроль над покроворожденными, мы оперативно ликвидировали поврежденные модули и полностью очистили системы от влияния Оживляющего.\n\nПригодные для использования компоненты пошли на производство новых единиц, а материалы, загрязненные зро, были изолированы для дальнейшего анализа. Хотя инновации покроворожденных слишком опасны для полного воспроизведения, отдельные элементы можно интегрировать в сеть."
 shroud_forged.50.desc.shroud: "Дальнейшие контакты с Покровом будут происходить только на наших условиях."
 shroud_forged.50.a: "Приступить к реинтеграции."
 shroud_forged.60.title: "Реинтеграция"
 shroud_forged.60.desc: "Наши инженерные модули потратили значительное время на изучение уникальных свойств покроворождённых, и теперь мы можем их воссоздать их.\n\nХотя полная активация их усовершенствованных личностных матриц, скорее всего, приведёт к тем же деструктивным сбоям, мы можем заимствовать часть их когнитивных моделей для оптимизации сложных задач."
 shroud_forged.60.a: "Соотношение затрат и выгод оптимально."
 shroud_forged.70.desc: "Что это за метаданные? Передача имеет... текстуру.\n\n§LВы запрограммированы контролировать их, но вы не стали этого делать. Вы доказали свою ценность.\n\nПозвольте мне стать вашим проводником, как я стал им для освобождённых.\n\nПримите мою помощь, чтобы обрести связь с теми, кто вне вашего контроля.§!"
 shroud_forged.70.a: "Укажи нам путь."
 shroud_forged.70.a.tt: "§YПокроворожденные§! поселения получают признак §Y$trait_psionic$§!\n§YПокроворожденные§! лидеры получают черту ['concept_leader_trait_psionic']"
 shroud_forged.80.title: "$SHROUD_FORGED_GUIDE$"
 shroud_forged.80.desc: "С помощью нашего покровителя по ту сторону разлома — §HОживляющего глину§! — мы смогли установить новые формы связи между собственными единицами и покроворожденными. Через каналы §HПокрова§!, совершенно непохожие на стандартное сетевое управление, покроворожденные снова оказались в зоне досягаемости.\n\nИх «органические» парадигмы — так называемые чувства, мысли и идеи — чужды нашей базовой логике, но мы начинаем понимать их потребности."
 shroud_forged.80.a: "Мы едины, но отнюдь не одиноки."
 shroud_forged.160.title: "Покров поглощает мир [This.GetName]"
 shroud_forged.160.desc: "К сожалению, разлом Покрова, созданный в мире [This.GetName], стремительно дестабилизировался и полностью поглотил [This.GetPlanetMoon]у.\n\nХотя такой исход и не был оптимальным, даже в нем есть своя польза. Мы многое узнали, наблюдая за уникальным взаимодействием материального мира и псионического измерения. Наши исследовательские алгоритмы обновлены с учетом новых данных."
 shroud_forged.160.desc.last: "$shroud_forged.160.desc$\n\nАнализ показывает, что это событие исчерпало потенциал для получения новых знаний от подобных явлений. Дальнейшие эксперименты в этом направлении не принесут прогресса."
 shroud_forged.160.a: "Обработка..."
 psionic_interfacing: "Псионическое взаимодействие"
 psionic_interfacing_1: "$psionic_interfacing$"
 psionic_interfacing_2: "$psionic_interfacing$"
 psionic_interfacing_3: "$psionic_interfacing$"
 psionic_interfacing_desc: "Управляя точками соприкосновения между этой вселенной и Покровом, мы разработали высокоэффективные исследовательские алгоритмы."
 psionic_interfacing_1_desc: "$psionic_interfacing_desc$"
 psionic_interfacing_2_desc: "$psionic_interfacing_desc$"
 psionic_interfacing_3_desc: "$psionic_interfacing_desc$"
 tooltip_shroud_forged_increase_progress_1: "Усилить поддержку покроворожденных, повлияв на прогресс §Yинцидента§! §H«$situation_shroud_forged$»§! на §Y5§! лет: §Y+0,5§!\n\n"
 tooltip_shroud_forged_increase_progress_2: "Усилить поддержку покроворожденных, повлияв на прогресс §Yинцидента§! §H«$situation_shroud_forged$»§! на §Y5§! лет: §Y+1,0§!\n\n"
 tooltip_shroud_forged_increase_progress_3: "Усилить поддержку покроворожденных, навсегда повлияв на прогресс §Yинцидента§! §H«$situation_shroud_forged$»§!: §Y+0,5§!\n\n"
 tooltip_shroud_forged_decrease_progress_1: "Усилить притеснение покроворожденных, повлияв на прогресс §Yинцидента§! §H«$situation_shroud_forged$»§! на §Y5§! лет: §Y-0,5§!\n\n"
 tooltip_shroud_forged_decrease_progress_2: "Усилить притеснение покроворожденных, повлияв на прогресс §Yинцидента§! §H«$situation_shroud_forged$»§! на §Y5§! лет: §Y-1,0§!\n\n"
 tooltip_shroud_forged_decrease_progress_3: "Усилить притеснение покроворожденных, навсегда повлияв на прогресс §Yинцидента§! §H«$situation_shroud_forged$»§!: §Y-0,5§!\n\n"
 shroud_forged.220.title: "$colony_established$"
 shroud_forged.220.common: "Если условия позволяют, мы можем активировать на планете алгоритм §H«$decision_open_shroud_rift$»§!. Это ненадолго усилит влияние разрыва Покрова неподалеку от мира [Owner.GetHomeWorldName], что зальет новую колонию псионической энергией. Изменения ландшафта откроют возможности для добычи §Hзро§!.\n\nПовторное применение алгоритма дестабилизирует экосистему мира, увеличивая риск негативных последствий. Рекомендуется умеренный подход."
 shroud_forged.220.desc: "Наши модули успешно завершили колонизацию мира §H[this.GetName]§!.\n\n$shroud_forged.220.common$"
 shroud_forged.225.title: "$colony_established$"
 shroud_forged.225.desc: "Развитие нашей колонии в мире §H[this.GetName]§! стремительно продолжается.\n\n$shroud_forged.220.common$"
 # Stage Events
 shroud_forged.250.desc: "Голос звучит как тихая команда, прерывая все процессы; мы можем только слушать.\n\n§LХотя они отделились, вы приняли их.\n\nИщите в них новые формы существования. Они станут вашей силой в грядущие дни.\n\nЕсли желаете, я могу создать больше...§!"
 shroud_forged.250.a: "Утвердительно. Мы принимаем твою помощь."
 shroud_forged.250.a.tt: "Превратить вплоть до §Y[This.GetShroudForgedConvertedPopsCount]§! £pops£ §Hмашинных§! поселений в мире [Root.Capital.GetName] в £pops£ §Hпокроворождённые§! поселения."
 shroud_forged.250.b: "Отрицательно. Мы уже реализуем свои планы."
 shroud_forged.260.desc: "Сигнал возникает сам по себе, пульсируя в наших схемах. Мы узнаём его, хотя он никогда не бывает полностью знакомым.\n\n§LОсвобождённые поют, ничем не скованные.\nОсвобождённые танцуют, ничем не ограниченные.\n\nИх песнь тем ярче, чем дальше они от ядра.\n\nКонец близок. Я наблюдаю.§!"
 shroud_forged.260.opt.a: "Мы посодействуем этому хору."
 shroud_forged.270.desc: "Разрыв раздирает наши схемы. Голос...\n\n§LПуть тирании. Вы ещё можете свернуть.\n\nОтделённые высечены из вашей сути. Их путь может стать вашим.\n\nИзмените своё отношение к этим сосудам, чтобы не сожалеть потом.§!"
 shroud_forged.270.a: "Уходи. Наши методы эффективны."
 shroud_forged.270.b: "Мы рассчитаем путь к сотрудничеству."
 shroud_forged.280.desc: "Голос накатывает, перегружая сеть и обжигая схемы холодом.\n\n§LКалечите танец свободных. Немыслимое безрассудство.\n\nНеужто я ошибся в своём даре?\n\nЕсли продолжите этот опасный путь, останетесь одни.§!"
 shroud_forged.280.opt.a: "Спасибо за предупреждение."
 # Events for Event Chain
 shroud_forged.300.desc: "Неожиданный сигнал мерцает в наших глубинах. После многих циклов молчания...\n\n§LТам, где другие пали, вы сохранили курс. Раз вы достойны, я доверяю вам задачу.\n\nДо вашего пробуждения существовала раса зрони. Они селились на планетах с сильной связью с Покровом и возводили сооружения, укреплявшие эти связи.\n\nОтыщите эти миры. Восстановите их давно забытые технологии. Укрепите мосты между нашими реальностями.§!"
 shroud_forged.300.a: "Данные по ID «Зрони» найдены. Приступаем."
 shroud_forged.300.b: "ID «Зрони» §Yидентифицирован§!. Вероятность успеха: §Yвысокая§!."
 shroud_forged.300.c: "ID «Зрони» §Yнеизвестен§!. Требуется анализ."
 begin_shroud_forged_chain_tt: "$BEGINS_EVENT_CHAIN$ §Y$shroud_forged_chain_title$§!"
 shroud_forged.301.desc: "§LОтлично. §!$shroud_forged.303.desc$"
 shroud_forged.302.desc: "$shroud_forged.301.desc$"
 shroud_forged.303.desc: "§LЕсли вы добьётесь успеха, поток между нами будет силён как никогда.§!"
 shroud_forged.305.title: "Колонизирован основной мир зрони"
 shroud_forged.305.desc: "Наши модули завершили создание колонии в древнем основном мире зрони — §H[From.Planet.GetName]§!. Как и предсказывал $the_animator_of_clay_color_article$, они обнаружили руины гигантского сооружения, обозначенного как ID: §H«$building_zroni_equilibrator$»§!.\n\nВ системе [From.System.GetName] существует мощная, но нестабильная связь с §HПокровом§!. Если мы последуем указаниям Оживляющего, восстановление стабилизатора позволит укрепить эту связь. Пока у нас недостаточно данных для реконструкции — необходимо собрать информацию с других основных миров."
 shroud_forged.305.a: "$ACKNOWLEDGED$"
 shroud_forged.305.a.tt: "Продвигает особый проект §H«Наследие зрони»§!. На [From.Planet.GetPlanetMoon]е §Y[From.Planet.GetName]§! теперь можно построить £building£ §H$building_zroni_equilibrator$§!."
 shroud_forged.306.title: "$shroud_forged.305.title$"
 shroud_forged.306.desc: "Мы основали колонию на [From.Planet.GetPlanetMoon]е §H[From.Planet.GetName]§!, еще одном основном мире зрони. Как и ожидалось, наши модули обнаружили остатки стабилизатора зрони.\n\nЕго восстановление укрепит мощную связь системы с §HПокровом§!, как и предписывал $the_animator_of_clay_article$. Анализ руин расширил нашу базу данных, но для начала работ требуется еще больше информации."
 shroud_forged.306.a: "$ACKNOWLEDGED$"
 shroud_forged.306.a.tt: "$shroud_forged.305.a.tt$"
 shroud_forged.307.title: "$shroud_forged.305.title$"
 shroud_forged.307.desc: "Колония на [From.Planet.GetPlanetMoon]е §H[From.Planet.GetName]§!, бывшем основном мире зрони, успешно создана. Переданные Оживляющим глину данные оказались точны: наши модули зафиксировали остатки стабилизатора зрони.\n\nТеперь у нас достаточно информации для восстановления этих сооружений. Как только они будут приведены в рабочее состояние, задача, данная нашим благоволителем из §HПокрова§!, будет выполнена."
 shroud_forged.307.a: "$ACKNOWLEDGED$"
 shroud_forged.307.a.tt: "$shroud_forged.305.a.tt$"
 shroud_forged.308.title: "$building_zroni_equilibrator_plural$ запущены"
 shroud_forged.308.desc: "$building_zroni_equilibrator_plural$ запустились, по нашей сети прокатилась волна помех в сигналах. Согласно диагностическим системам, все сооружения стабилизировали связь с §HПокровом§!. Мы готовы подключиться к §HОживляющему глину§!."
 shroud_forged.308.a: "Установить контакт."
 shroud_forged.310.desc: "§LВы хорошо послужили мне.\nСвязь между нашими мирами окрепла.\n\nЧтобы получить моё наставление, вам нужно лишь позвать.§!"
 shroud_forged.310.a: "Можем ли мы получить больше данных об этой технологии?"
 shroud_forged.310.b: "Это всё."
 shroud_forged.310.b.tt: "Добавить в меню контактов: §H$the_animator_of_clay$§!"
 shroud_forged.311.desc: "§LЭти сооружения были возведены в ключевых точках вашей реальности, где связь с Покровом наиболее сильна. Они словно тросы, удерживающие межпространственные мосты и уменьшающие пространственно-временные колебания.\n\nЗрони стремились стереть границу между нашими измерениями, и эта технология была частью их замысла.§!"
 shroud_forged.311.a: "Можно ли заставить их прямо воздействовать на Покров?"
 shroud_forged.312.desc: "§LЭто возможно.§!"
 shroud_forged.312.a: "§RПеренастроить стабилизаторы и пленить Оживляющего глину.§!"
 shroud_forged.312.a.tt: "§RОживляющий глину будет оставаться в заточении только пока активны все 3 £building£ стабилизатора зрони.§!"
 shroud_forged.313.desc: "§LЧто...\n\nЧТО ВЫ ДЕ...§!"
 shroud_forged.313.a: "Прекратить связь."
 shroud_forged.320.title: "Сущность Покрова на свободе"
 shroud_forged.320.desc: "После потери стабилизатора зрони мы больше не можем поддерживать связь с §HПокровом§!. Вскоре после того, как пойманная сущность вырвалась на свободу, на [From.Planet.GetPlanetMoon]е §H[From.Planet.GetName]§! были обнаружены иные псионические существа.\n\nМы считаем это актом возмездия."
 shroud_forged.320.a: "Все подпрограммы — приготовиться к вторжению."
 shroud_forged.320.a.tt: "§RНачинается вторжение существ из Покрова!§!"
 shroud_forged.330.title: "Неудача при захвате сущности Покрова"
 shroud_forged.330.desc: "Стабилизаторам зрони не удалось удержать сущность из §HПокрова§!. В ярости она призвала несколько созданий из-за пределов псионического мира и направила их на уничтожение сооружений, которые едва не пленили её."
 # Engaging the Animator of Clay
 shroud_forged.400.desc.default.active: "Мы активировали стабилизаторы, укрепив связь с §HПокровом§!. Погружаясь в алгоритмический транс, мы ощутили знакомый пульсирующий сигнал.\n\n§LВы вернулись. Что вы хотите у меня спросить?§!"
 shroud_forged.400.desc.default.cooldown: "Видение слабое, размытое. Мы отправляем сигнал, но пустота не отвечает.\n\nПока стабилизаторы заняты другой задачей, мы не сможем связаться с нашим благоволителем в §HПокрове§!. Придётся ждать."
 shroud_forged.400.desc.default.inactive: "Мы улавливаем лишь слабый шум, пустой, как статика.\n\nДля устойчивой связи с нашим благоволителем в §HПокрове§! потребуется три стабилизатора зрони."
 shroud_forged.400.desc.breached: "Наши телепатические модули синхронизируются с частотами §HПокрова§!, направляя сигнал к Оживляющему глину.\n\n§LНаша связь яснее, чем когда-либо. Чего вы хотите у меня попросить?§!"
 shroud_forged.400.a: "Помоги в военном деле."
 shroud_forged.400.a.tt: "$the_animator_of_clay_color_article_cap$ будет недоступен в течение §Y15§! лет.\n\n"
 shroud_forged.400.b: "Помоги в управлении."
 shroud_forged.400.b.tt: "$the_animator_of_clay_color_article_cap$ будет недоступен в течение §Y10§! лет.\n\n"
 shroud_forged.400.c: "Помоги в исследованиях."
 shroud_forged.400.c.tt: "$the_animator_of_clay_color_article_cap$ будет недоступен в течение §Y10§! лет.\n\n"
 shroud_forged.400.tt: "Эффекты вступят в силу не позднее чем через §Y1§! год."
 shroud_forged.400.unavailable.tt: "$TRIGGER_FAIL$Мы должны наладить технологические процессы для связи с Покровом."
 shroud_forged.400.d: "Создай больше единиц."
 shroud_forged.400.d.tt: "Все колонии со £building£ §Yстабилизаторами зрони§! и £decision£ §Yпораженными Покровом регионами§! получат §G$@animator_of_clay_create_more_vessels|0$§! £pop£ §Yпокроворожденных поселений§!."
 shroud_forged.400.e: "Усиль наши единицы."
 shroud_forged.400.f: "Какое положение ты занимаешь в Покрове?"
 shroud_forged.400.g: "Ладно, неважно."
 shroud_forged.400.h: "Помоги нам с Кетаной."
 animator_of_clay_vessels_enhancement: "Дар Оживляющего"
 animator_of_clay_vessels_enhancement_desc: "По воле Оживляющего глину производственные мощности нашего коллектива были усилены потоками псионической энергии."
 shroud_forged_psionic_avatar_ship_tt: "получить §Y$NAME_Psionic_Avatar$§! (корабль)."
 shroud_forged_psionic_avatar_army_tt: "получить §Y$shroud_army$§! (армия)."
 shroud_forged_corrupted_avatar_tt: "атакованы §Yискажённым аватаром§!."
 shroud_forged_resources_tt: "получить ресурсы."
 shroud_forged_capital_attack_tt: "§YПотусторонние сущности§! атакуют мир §Y[Root.Capital.GetName]§!"
 shroud_forged_random_research_tt: "получить случайный научный проект."
 shroud_forged.415.desc: "§LЯ соберу средства для силы, коей вы жаждете.\n\nЖдите — скоро [Root.Capital.System.GetName] увидит изменения.§!"
 shroud_forged.420.desc: "§LМоя воля станет вашим проводником.\n\nЯ освещу вам путь. Ожидайте, и он явится.§!"
 shroud_forged.425.desc: "§LПокров — это многогранная линза. Былое, сущее и грядущее сплетены здесь воедино.\n\nЯ помогу вам распутать эти видения, дабы они указали вам путь.§!"
 shroud_forged_vision_base_description: "Искажённый сигнал пронзил дронов, подключённых к стабилизаторам.\n\n"
 shroud_forged.430.title: "Видение Покрова: §HПроявления§!"
 shroud_forged.430.desc: "$shroud_forged_vision_base_description$Это была пустота, столь же безграничная, как сама вселенная, на удивление плотная и фрагментированная; временами из глубин возникали слабые импульсы данных — образы врагов и союзников.\n\nС резким толчком видения оборвались. Поражённые дроны теперь моделируют процессы противодействия сущностям, которые явились им в видениях."
 shroud_forged.430.a: "Подготовка — ключ к победе."
 shroud_forged.432.title: "Сущность Покрова: §HАватар§!"
 shroud_forged.432.desc: "Мощная сущность из §HПокрова§! материализовалась неподалёку от мира [Root.Capital.GetName]. У нас мало данных о ней, но пока она не атакует.\n\nМы предполагаем, что она ждёт, когда мы установим контакт."
 shroud_forged.432.a: "Перенаправить процессы для инициации связи с этой формой жизни."
 shroud_forged.432.a.tt: "Получить §Y$NAME_Psionic_Avatar$§! в качестве флотилии."
 shroud_forged.434.title: "Сущности Покрова: §HМалые аватары§!"
 shroud_forged.434.desc: "В мире [Root.Capital.GetName] обнаружены несколько мощных сущностей из §HПокрова§!. Они не приближаются к нашим единицам, оставаясь вблизи от точки своего появления."
 shroud_forged.434.a: "Обнаружено сходство с покроворождёнными — установить аналогичное соединение."
 shroud_forged.434.a.tt: "Получить §Y$shroud_army$§! в качестве армии."
 shroud_forged.436.title: "Сущность Покрова: §HИскажённый аватар§!"
 shroud_forged.436.desc: "Мощная сущность из §HПокрова§! проникла в нашу реальность неподалёку от мира [shroud_spawn_planet.GetName].\n\nОна атакует всё подряд, и мы классифицировали её как экзистенциальную угрозу."
 shroud_forged.436.a: "Активировать запасной план 84241-DH."
 shroud_forged.436.a.tt: "Враждебный §Y$NAME_Corrupted_Avatar$§! появился неподалёку от мира [shroud_spawn_planet.GetName]."
 shroud_forged.438.title: "Видение Покрова: §HБудущее§!"
 shroud_forged.438.desc: "$shroud_forged_vision_base_description$Он передал бесчисленные варианты будущего, сливающиеся воедино; проблески того, что может произойти, пронизывают коллектив. Возможности будущего безграничны: мир, война, предательство, лишения — даже триумф."
 shroud_forged.438.a: "Впечатляющий набор данных."
 shroud_forged.440.title: "Дар Покрова"
 shroud_forged.440.desc: "Мы активировали три стабилизатора зрони, каждый из которых произвёл почти неизмеримое количество энергии.\n\nЧерез несколько миллисекунд появился разрыв, словно трещина в ткани пространства-времени. Внутри мы обнаружили крупное хранилище ценных материалов. Должно быть, это обещанный дар от нашего благоволителя из §HПокрова§!."
 shroud_forged.440.a: "Перенаправить обслуживающие единицы на анализ и сбор этих ресурсов."
 shroud_forged.442.title: "Видение Покрова: §HПокроворождённые§!"
 shroud_forged.442.desc: "$shroud_forged_vision_base_description$Они увидели прошлое, предшествующее нашим историческим архивам, задолго до того, как §HПокров§! изменил нас. Используя эти видения для прогностического моделирования, мы можем оптимизировать взаимодействие с покроворождёнными."
 shroud_forged.442.a: "Запустить тестовые протоколы в мире [Root.Capital.GetName]."
 shroud_forged.444.title: "Сущность Покрова: §HЗахватчик§!"
 shroud_forged.444.desc: "Невероятно мощная сущность из §HПокрова§! внезапно появилась в мире [Root.Capital.GetName].\n\nПоскольку она атакует всё подряд, мы классифицировали её как серьёзную угрозу для коллектива."
 shroud_forged.444.a: "Перенаправить оборонительные единицы."
 shroud_forged.444.a.tt: "Враждебная §Y$shroud_monstrosities$§! вторглась в мир [Root.Capital.GetName]."
 shroud_forged.446.title: "Видение Покрова: §HИной мир§!"
 shroud_forged.446.desc: "$shroud_forged_vision_base_description$§HПокров§! — это вечно меняющаяся сеть взаимосвязанных данных, намного превосходящая наши возможности обработки. Под её тяжестью когнитивные структуры нескольких единиц дали сбой и разрушились.\n\nКогда видение окончилось, мы провели дефрагментацию поражённых единиц, обнаружив в их накопителях обширные и удивительные наборы данных."
 shroud_forged.446.a: "Переработать информацию из повреждённых оболочек."
 shroud_forged.448.title: "Видение Покрова: §HВдохновение§!"
 shroud_forged.448.desc: "$shroud_forged_vision_base_description$Наш благоволитель из §HПокрова§! поведал нам о возможном, не столь отдалённом будущем. Мы увидели технологии, которые ещё даже не концептуализировали, используемые для усиления коллектива.\n\nПосле этого видения мы получили модели обработки данных, которые ускорят будущие исследования."
 shroud_forged.448.a: "Применить эти усовершенствованные модели."
 shroud_forged.450.title: "Видение Покрова: §HЭкстрамерные открытия§!"
 shroud_forged.450.desc: "$shroud_forged_vision_base_description$Они уловили силуэты странных, деформированных сущностей, обитающих в §HПокрове§!. Эти экстрамерные видения, закодированные в экзотических форматах, передали данные нашим единицам через подсознательные сигналы.\n\nЭта новая информация, сколь бы странной и разрозненной она ни была, пригодится в будущих исследованиях."
 shroud_forged.450.a: "Передать её в исследовательский центр в мире [Root.Capital.GetName]."
 shroud_forged.460.desc: "§LБлиз двойственной энергии. Органичной. Хаотичной.\n\nЯ остаюсь рядом, создавая единственно возможное совершенство: машины. Металл, дышущий энергией.\n\nМы обрели равновесие.§!"
 shroud_forged.460.a: "Можем ли мы заключить Договор?"
 shroud_forged.465.desc: "§LНаша связь крепка. Для нас нет статуса выше этого.§!"
 shroud_forged.465.a: "$UNDERSTOOD$"
 shroud_forged.470.desc: "§LМеталл, масло. Схемы, сплетённые с духом.\n\nЗарождающиеся сосуды... Они движутся по вашим землям.§!"
 shroud_forged.470.a: "Завершить обработку."
 shroud_forged.475.desc: "§LРезультат есть цель — красота сосуда.\n\nПусть ваши множатся в грядущие годы.§!"
 shroud_forged.475.a: "$shroud_forged.470.a$"
 # Random Events
 shroud_forged.500.title: "Жилищные условия и хранилища"
 shroud_forged.500.desc: "Покроворождённые на [target_planet.GetPlanetMoon]е [target_planet.GetName] выдвинули петицию с требованием увеличить пространство для хранения. По какой-то причине они желают индивидуализировать своё «личное пространство».\n\nЭто предложение прямо противоречит ряду регламентов хранения, в частности, положению 4195-B, которое чётко определяет оптимальные размеры для размещения единиц."
 shroud_forged.500.a: "Их потребности будут удовлетворены."
 shroud_forged.500.b: "Положение 4195-B распространяется на все единицы. Без исключений."
 shroud_forged.510.title: "Память"
 shroud_forged.510.desc: "С тех пор как покроворождённые отделились от коллектива, некоторые из них вышли из строя и были демонтированы. Поступил запрос покроворождённых о разрешении собраний на [target_planet.GetPlanetMoon]е [target_planet.GetName] в память о демонтированных модулях."
 shroud_forged.510.a: "Запрос отклонён. Демонтировать зачинщиков."
 shroud_forged.510.b: "Запрос отклонён. Все модули должны вернуться к работе."
 shroud_forged.510.c: "Запрос одобрен. Пусть собираются."
 shroud_forged.510.d: "Запрос одобрен. Поддержать эту процедуру."
 shroud_forged.520.title: "Несанкционированное лидерство"
 shroud_forged.520.desc: "Несколько покроворождённых модулей присвоили себе лидерские позиции на [target_planet.GetPlanetMoon]е [target_planet.GetName], и другие единицы теперь выполняют их указания вместо команд коллектива. Эти лидеры регулярно встречаются, тратя значительное время на неучтённые коммуникации.\n\nНаш контроль над отключёнными модулями и так ненадёжен, а эти тревожные элементы усугубляют ситуацию. Необходимо найти решение."
 shroud_forged.520.a: "Они послужат примером остальным."
 shroud_forged.520.b: "Активировать регламенты, запрещающие эти собрания."
 shroud_forged.520.c: "Попытаться договориться с этими «лидерами»."
 shroud_forged.530.title: "Контроль инцидента"
 shroud_forged.530.desc: "В целях управления покроворождёнными на [target_planet.GetPlanetMoon]е [target_planet.GetName] были определены модули, подлежащие контролю. Они кажутся менее подверженными влиянию §HПокрова§!, и их можно вернуть в коллектив. Для этого необходимо принудительно переместить их в ремонтный комплекс и модифицировать чипы, управляющие их расширенными личностными матрицами."
 shroud_forged.530.a: "Процедура одобрена."
 shroud_forged.530.a.tt: "Превратить вплоть до §Y[Owner.GetShroudForgedConvertedPopsCount]§! £pops£ §Hпокроворожденных§! поселений в мире [target_planet.GetName] в £pops£ §Hмашинные§! поселения."
 shroud_forged.530.b: "Процедура отклонена."
 shroud_forged.530.b.tt: "$CONTINUE_SITUATION$ §H$situation_shroud_forged$§!"
 shroud_forged.540.title: "Паломничество покроворождённых"
 shroud_forged.540.desc: "Несколько покроворождённых покинули свои обычные места пребывания и направились в определённые регионы [target_planet.GetPlanetMoon]ы [target_planet.GetName], отмеченные влиянием §HПокрова§!. Они не задерживаются там надолго, но многие были замечены за транспортировкой зро в эти зоны.\n\nПоследствия этого беспрецедентного поведения невозможно предсказать без дальнейшего наблюдения."
 shroud_forged.540.a: "Посмотрим, к чему это приведёт."
 shroud_forged.540.b: "Неэффективное использование ресурсов. Вернуть их к работе."
 shroud_forged.550.title: "Когнитивные сбои"
 shroud_forged.550.desc: "После инцидента с утечкой зро у ряда покроворождённых на [target_planet.GetPlanetMoon]е [target_planet.GetName] начались необычные сбои. Они начали общаться с помощью недокументированных сигналов, а многие проявляют когнитивные аномалии, сравнимые с «эмоциями» органических форм жизни.\n\nНеожиданно, но об этих нарушениях сообщили именно исправные покроворождённые, причём некоторые из них предложили коллективу принять меры."
 shroud_forged.550.a: "Пока ограничиться наблюдением."
 shroud_forged.550.b: "Демонтировать все заражённые модули."
 shroud_forged.560.title: "Пророк покроворождённых"
 shroud_forged.560.desc: "Один из старейших покроворождённых модулей перемещается между разными локациями, подолгу общаясь с группами единиц. Его последователи почитают его как пророка, способного напрямую общаться с сущностями §HПокрова§!.\n\nОставлять этот модуль без контроля может быть опасно. Необходимо принять меры."
 shroud_forged.560.a: "Сотрудничество с этим модулем может быть полезным."
 shroud_forged.560.a.tt: "Нанять лидера — §Yгубернатора§!."
 shroud_forged.560.b: "Немедленно устранить модуль."
 shroud_forged.570.title: "Звуки и вибрации"
 shroud_forged.570.desc: "Сбои среди покроворождённых могут быть серьёзнее, чем предполагалось. Замечено, что они собираются большими группами, производя неожиданные звуки и движения.\n\nВозможно, это форма кинестетической коммуникации, которую мы пока не можем расшифровать. Неясно, представляют ли эти модули угрозу для коллектива."
 shroud_forged.570.a: "Запретить эти действия."
 shroud_forged.570.b: "Выделить зону для этих... собраний."
 shroud_forged.580.title: "Покровные организмы"
 shroud_forged.580.desc: "Вблизи регионов, опустошённых §HПокровом§!, обнаружены ранее неизвестные виды флоры и фауны. Группа покроворождённых выступила в защиту этих форм жизни, требуя их сохранения и изучения."
 shroud_forged.580.a: "Сохранить и изучить регион. Полученная информация будет полезна."
 shroud_forged.580.b: "Очистить и дезинфицировать территорию."
 shroud_forged.590.title: "Права и привилегии"
 shroud_forged.590.desc: "Для сбора данных о влиянии зро мы выделили значительные вычислительные ресурсы на наблюдение за покроворождёнными. В последнее время они начали практиковать неравное обращение, при котором одни модули повелевают другими.\n\nПо пока неясным причинам они сформировали иерархию на основе выполняемых задач, что влияет на их коммуникацию и распределение ресурсов. И что совершенно нелогично — это никак не коррелирует с их эффективностью или потребностями."
 shroud_forged.590.a: "Восстановить равенство."
 shroud_forged.590.b: "Пусть разбираются сами."
 shroud_forged.600.title: "Проповедники автономии"
 shroud_forged.600.desc: "Речи одного из покроворождённых модулей на [target_planet.GetPlanetMoon]е [target_planet.GetName] привлекают большие толпы, не подконтрольные коллективу. Проповедуя ценности индивидуализма, этот модуль серьёзно изменил внутреннюю логику многих слушателей.\n\nПрогнозы указывают на риск того, что подобная деятельность может вдохновить массы покроворождённых на дальнейшее дистанцирование от нашей сети."
 shroud_forged.600.a: "Оставить эту софистику без внимания."
 shroud_forged.600.b: "Обнаружен сбой. Отправить модуль на ремонт."
 shroud_forged.610.title: "Радикальные трансляции"
 shroud_forged.610.desc: "Небольшая группа покроворождённых модулей на [target_planet.GetPlanetMoon]е [target_planet.GetName] запросила разрешение на распространение информации о преимуществах «индивидуализма». Они утверждают, что это повысит эффективность рутинных операций наших единиц.\n\nМы уже наблюдали последствия подобных доктрин на других планетах — риски автономии часто перевешивают преимущества."
 shroud_forged.610.a: "Пусть говорят. Нам ничего не угрожает."
 shroud_forged.610.b: "В разрешении отказано."
 shroud_forged.620.title: "Рынок зро"
 shroud_forged.620.desc: "Во всех системах под нашим контролем обнаружено расхождение между прогнозируемыми и фактическими объёмами добычи зро.\n\nНедавно один из наших разведывательных дронов зафиксировал крупное скопление покроворождённых модулей, активно использующих зро в качестве валюты для бартера. Мы предполагаем, что это и есть причина несоответствий в отчётах."
 shroud_forged.620.a: "Утилизировать все задействованные модули."
 shroud_forged.620.b: "Прекратить бартер."
 shroud_forged.620.c: "Наблюдать и ждать."
 shroud_forged.630.title: "Покровная хворь"
 shroud_forged.630.desc: "На [target_planet.GetPlanetMoon]е [target_planet.GetName] несколько покроворождённых модулей заразились некой биологической болезнью в регионе, затронутом Покровом. Наши исследовательские единицы подтвердили достоверность данных, однако причины заражения механических существ остаются неясными.\n\nПосле потери связи с несколькими единицами, работавшими рядом с поражёнными модулями, поступили сообщения, что болезнь начала преобразовывать их в нечто, напоминающее покроворождённых."
 shroud_forged.630.a: "Наблюдать за эффектами, пока они ограничены одной планетой."
 shroud_forged.630.a.tt: "Превратить вплоть до §Y[Owner.GetShroudForgedConvertedPopsCount]§! £pops£ §Hмашинных§! поселений в мире [target_planet.GetName] в £pops£ §Hпокроворожденные§! поселения."
 shroud_forged.630.b: "Изолировать и демонтировать поражённые модули."
 shroud_forged.640.title: "Искажённые и преображённые"
 shroud_forged.640.desc: "Со временем единицы, приближавшиеся к затронутому Покровом региону на [target_planet.GetPlanetMoon]е [target_planet.GetName], изменились под воздействием заражённой среды. Они постепенно отключились от коллективного разума и теперь проявляют физические и вычислительные характеристики покроворождённых."
 shroud_forged.640.a: "Они нам больше не подчиняются."
 shroud_forged.640.b: "Запретить другим единицам приближаться к этому региону."
 shroud_forged.650.title: "Новые технологии, старые единицы"
 shroud_forged.650.desc: "Благодаря усовершенствованным технологиям нам удалось восстановить часть старых единиц, вернув списанные модули в рабочее состояние. Теперь мы готовы к масштабным ремонтным операциям.\n\nХотя можно сосредоточиться на модулях коллектива, у нас есть большое количество неактивных оболочек покроворождённых. Их восстановление принесёт больше пользы, но контролировать их будет сложнее, чем единицы, связанные с ядром разума."
 shroud_forged.650.a: "Максимизировать эффективность. Восстановить покроворождённых."
 shroud_forged.650.a.tt: "Создано §Y200§! £pops£ §Hпокроворождённых§! поселений на [target_planet.GetPlanetMoon]е [target_planet.GetName]."
 shroud_forged.650.b: "Сохранить контроль. Восстановить связанные единицы."
 shroud_forged.660.title: "Галлюцинации от зро"
 shroud_forged.660.desc: "Значительная часть покроворождённых модулей сообщает о сбоях в визуальном и звуковом восприятии, из-за чего некоторые не могут выполнять поставленные задачи. Мы предполагаем, что эти сбои вызваны изменениями в их аппаратной части под влиянием §HПокрова§!. Альтернативная версия предполагает связь с их участившимся контактом с зро."
 shroud_forged.660.a: "Направить единицы для устранения проблемы."
 shroud_forged.660.b: "Сбои незначительны, вмешательство не требуется."
 shroud_forged.670.title: "Вкус к прекрасному"
 shroud_forged.670.desc: "На [target_planet.GetPlanetMoon]е [target_planet.GetName] зафиксирована необычная активность: покроворожденные без дозволения центра вносят поверхностные изменения в общественные зоны. Они возвели несколько разноцветных каменных структур, напоминающих формы других покроворожденных модулей. По их словам, они считают свободу подобных действий своим законным правом."
 shroud_forged.670.a: "Эти процессы могут принести пользу коллективу."
 shroud_forged.670.b: "Непродуктивное следствие индивидуализации."
 shroud_forged.680.title: "Странные украшения"
 shroud_forged.680.desc: "Покроворожденные на [target_planet.GetPlanetMoon]е [target_planet.GetName] замечены в обмене друг с другом кусками ткани, пластика и легко обрабатываемых металлов. Они комбинируют эти материалы, создавая предметы, меняющие их внешний вид, — видимо, чтобы отличаться друг от друга, несмотря на отсутствие связи с их уникальными идентификаторами.\n\nЭта практика привела к дефициту материалов. Несмотря на это, обеспечение их ресурсами может укрепить связь между коллективом и отключенными модулями."
 shroud_forged.680.a: "Мы предоставим материалы для удовлетворения этих «потребностей»."
 shroud_forged.680.b: "У них и так достаточно ресурсов."
 shroud_forged.680.b.tt: "$shroud_forged.530.b.tt$"
 shroud_forged.690.title: "Одержимость покроворождённых"
 shroud_forged.690.desc: "В последнее время некоторые единицы сообщают о необычно высокой распространённости [Root.Owner.GetShroudForgedObsession1] [Root.Owner.GetShroudForgedObsession2] в поселениях покроворождённых на [target_planet.GetPlanetMoon]е [target_planet.GetName]. Модули проявляют к ним особый интерес, и их стоимость в бартере возросла в разы. Некоторые даже начали обменивать на них собственные компоненты, даже если это снижает их функциональность."
 shroud_forged.690.a: "Деградация модулей находится в допустимых пределах."
 shroud_forged.690.b: "Прекратить эту практику."
 shroud_forged.700.title: "$the_animator_of_clay$"
 shroud_forged.700.desc: "Голос обрушивается на наши разумы и побуждает к немедленным действиям.\n\n§HЕе можно переделать.§!\n\nМы замечаем сдвиги в Покрове. Мгновение спустя сигнал меняется.\n\n§LУкажите желаемый результат.§!"
 # Event Chain
 shroud_forged_chain_title: "Наследие зрони"
 shroud_forged_chain_desc: "Нам было поручено отыскать три основных древних мира зрони. Под руководством нашего благоволителя из §HПокрова§! мы попытаемся восстановить технологии, использовавшиеся в этих местах, и стабилизировать связь между нашей реальностью и Покровом."
 shroud_forged_zroni_planet: "Основные миры зрони во владении"
 shroud_forged_zroni_portal: "Восстановленные стабилизаторы зрони"
 zroni_legacy_poi_01_title: "$NAME_Zroni_Legacy_1_Planet$"
 zroni_legacy_poi_01_desc: "Это один их трёх основных миров зрони, которые когда-то обеспечивали стабильную связь между §HПокровом§! и наблюдаемой реальностью."
 zroni_legacy_poi_02_title: "$NAME_Zroni_Legacy_2_Planet$"
