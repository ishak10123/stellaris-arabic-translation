 # Armies
 shroud_monstrosities: "Потусторонние сущности"
 shroud_monstrosities_desc: "Увидеть эти сущности на поле боя всё равно что впасть в безумие: их извивающиеся, сияющие силуэты не задерживаются на месте ни на секунду."
