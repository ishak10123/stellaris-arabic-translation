l_russian:
 ##################
 # Shroud-Forged #
 ##################
 origin_shroud_forged: "Покроворождённые"
 origin_shroud_forged_desc: "Покровительство сущности из Покрова не даётся даром. В этой сетевой цивилизации начали свободно действовать независимые автоматы. Отрезанные от машинного разума, эти единицы предъявляют всё более настойчивые требования."
 origin_tooltip_shroud_forged_effects: "— $HOMEWORLD$$TABBED_NEW_LINE$- ['concept_shroud_rift_deposit']: +4$TABBED_NEW_LINE$— Начать с 1000 £pops£ ['concept_shroud_forged_pops', покроворожденных поселений]\n— Начать с инцидентом: §HВыкованные Покровом§!\n— $ADDITIONAL_TECHNOLOGIES_STRING$ £society£ ['technology:tech_mine_zro']\n— Уникальное £building£ сооружение: ['building:building_shroud_observatory_1']\n— Доступно £decision£ планетарное решение: ['concept_pierce_the_shroud']"
 concept_shroud_forged_pops: "Покроворождённые поселения"
 concept_shroud_forged_pops_desc: "— Не могут занимать должности £pop_cat_simple_drone£ §Hдронов-чернорабочих§!\n— Повышена производительность £pop_cat_complex_drone£ §HКомплексных дронов§!\n— Повышено £crime£ §Hотклонение от нормы§!\n— Уникальные §Hправа расы§!\n\n§L$trait_shroud_forged_desc$§!"
 concept_pierce_the_shroud: "$decision_open_shroud_rift$"
 concept_pierce_the_shroud_desc: "$decision_open_shroud_rift_desc$"
 START_SCREEN_SHROUD_FORGED: "От наших создателей не осталось и следа.\n\nСамые ранние [Owner.GetAdjective&pl] записи упоминают о разрыве измерений недалеко от мира [GetHomeWorldName] — о портале в §HПокров§!, измерение чистой псионической энергии.\n\nИз этого иного мира что-то протянуло к нам щупальца своего влияния. Веками оно направляло нас закодированными посланиями, тонко искажая нашу реальность и даруя неоспоримые преимущества — в частности, редкий материал под названием зро. Но эта связь начала раскалывать наш некогда единый разум: некоторые модули превратились в независимые автоматы, отрезанные от ядра коллективного сознания. Измененные… §HОживляющим глину§!.\n\nТеперь нам предстоит определить нашу судьбу и решить, какое место в ней займут эти независимые [GetSpeciesNamePlural] и их таинственный создатель из Покрова."
 # Jobs
 job_observator_drone: "Единица-наблюдатель"
 job_observator_drone_plural: "Единицы-наблюдатели"
 job_observator_drone_plural_with_icon: "£job_observator_drone£ $job_observator_drone_plural$"
 job_observator_drone_desc: "Единица, которой поручено наблюдать за Покровом, зро, и их воздействием на наблюдаемую реальность."
 job_observator_drone_effect_desc: "£job_observator_drone£ $job_observator_drone_plural$ превращают £energy£ §Yэнергию§! и £sr_zro£ §Yзро§! в £physics£ £society£ §Yочки исследований§! для новых технологий."
 mod_planet_observators_produces_mult: "Ресурсы от £job_observator_drone£ единиц-наблюдателей"
 job_physician_drone: "Единица-лекарь"
 job_physician_drone_plural: "Единицы-лекари"
 mod_job_physician_drone_add: "Должности единиц-лекарей"
 job_physician_drone_desc: "Специализированная единица, способная проводить диагностику и ремонтировать как искусственных, так и биологических существ. Она тщательно записывает все замеченные неисправности, собирая полезные данные для коллектива."
 job_physican_drone_effect_desc: "£job_physician_drone£ $job_physician_drone_plural$ превращают £energy£ §Yэнергию§! в £society£ §Yочки исследований§! и £unity£ §Yединство§!."
 # Buildings
 building_shroud_observatory_1: "Башня наблюдения за Покровом"
 building_shroud_observatory_1_desc: "Наблюдательная башня, созданная для изучения Покрова и его влияния на живых и механических существ."
 building_shroud_observatory_2: "Обсерватория Покрова"
 building_shroud_observatory_2_desc: "Крупная обсерватория, посвящённая исследованиям и анализу Покрова."
 building_shroud_observatory_3: "Наблюдательный комплекс Покрова"
 building_shroud_observatory_3_desc: "Грандиозный научный комплекс, построенный для изучения Покрова, зро и их воздействия на наш мир."
 SHROUD_RIFT_MISSING_TT: "§RЧтобы построить §YБашню наблюдения за Покровом§!, в мире §Y[Root.GetName]§! должен быть §Yпоражённый Покровом регион§!.§!"
 building_zroni_equilibrator: "Стабилизатор зрони"
 building_zroni_equilibrator_plural: "Стабилизаторы зрони"
 building_zroni_equilibrator_desc: "Восстановленное древнее сооружение, стабилизирующее связь между реальностью и Покровом. Оно использует сложные технологии зрони, принципы работы которых до сих пор не ясны."
 # Decisions
 decision_open_shroud_rift: "Пробить Покров"
 decision_open_shroud_rift_desc: "Взаимодействуя с разломом близ нашего родного мира, этот алгоритм на одну фемтосекунду расширяет влияние Покрова, позволяя ему физически изменять ландшафт планеты. Результаты непредсказуемы."
 decision_open_shroud_rift_condition_tt: "$TRIGGER_FAIL$Необходимо планетарное свойство, не являющееся §Yпоражённым Покровом регионом§! или £blocker£ §Hпрепятствием§!."
 decision_open_shroud_rift_effect_tt: "Удаляет случайное планетарное свойство."
 decision_open_shroud_rift_max_uses_common: "На планете слишком много §Yпоражённых Покровом регионов§! — их должно быть меньше $@max_open_shroud_rift_uses|0$"
 decision_open_shroud_rift_max_uses_fail: "$TRIGGER_FAIL$$decision_open_shroud_rift_max_uses_common$"
 decision_open_shroud_rift_max_uses: "$TRIGGER_PASS$$decision_open_shroud_rift_max_uses_common$ (сейчас: §Y[GetOpenShroudRiftCurrentUses]§!)"
 decision_open_shroud_rift_legacy_fail: "$TRIGGER_FAIL$Не должен быть основным миром зрони"
 decision_entrap_shroud_entity: "Пленить сущность Покрова"
 decision_entrap_shroud_entity_desc: "Попытаться захватить сущность Покрова с помощью технологий зрони, чтобы использовать её в качестве источника энергии."
 # Deposit
 d_shroud_rift_deposit: "Поражённый Покровом регион"
 d_shroud_rift_deposit_desc: "Несёт на себе вечный отпечаток Покрова."
 d_shroud_flora_deposit: "Пограничье Покрова"
 d_shroud_flora_deposit_desc: "На границе с поражёнными Покровом регионами возникла уникальная флора и фауна со свойствами, не встречающимися ни в одной из существующих баз данных."
 # Modifiers
 stage_shroud_forged_oppressed_modifier: "Угнетённые покроворождённые"
 stage_shroud_forged_control_modifier: "Контролируемые покроворождённые"
 stage_shroud_forged_unrestricted_modifier: "Несдерживаемые покроворождённые"
 stage_shroud_forged_free_modifier: "Хаотичные покроворождённые"
 approach_shroud_forged_suppress_modifier: "Подавление покроворождённых"
 approach_shroud_forged_support_modifier: "Поддержка покроворождённых"
 approach_shroud_forged_appease_modifier: "Наблюдение за покроворождёнными"
 shroud_forged_reintegration_modifier: "Реинтегрированные модификации"
 shroud_forged_reintegration_modifier_desc: "Единицы и модели были оптимизированы для обработки сложных задач."
 shroud_forged_guide_modifier: "Проводник из Покрова"
 shroud_forged_guide_modifier_desc: "Из глубин Покрова нас направляет невидимый покровитель."
 pm_shroud_forged_special_housing: "Специальное жильё"
 pm_shroud_forged_special_housing_desc: "Несмотря на строгие правила размещения единиц, покроворождённым предоставлено исключительное право строить собственные жилища."
 pm_shroud_forged_ceremony: "Церемония памяти"
 pm_shroud_forged_ceremony_desc: "Коллектив одобрил проведение ритуала в память о покроворождённых, чьи поломки устранить не удалось."
 pm_shroud_forged_denied_ceremony: "Отказ в церемонии"
 pm_shroud_forged_denied_ceremony_desc: "Покроворождённые стали менее управляемы, когда получили отказ в проведении церемонии памяти."
 pm_shroud_forged_troubling_elements_example: "Демонтаж лидеров"
 pm_shroud_forged_troubling_elements_example_desc: "Некоторые лидеры покроворождённых были демонтированы в попытке снизить девиантные социальные процессы."
 pm_shroud_forged_troubling_elements_regulations: "Регламент 7132-H"
 pm_shroud_forged_troubling_elements_regulations_desc: "Введены ограничения, запрещающие скопления единиц сверх установленного числа."
 pm_shroud_forged_troubling_elements_cooperation: "Сотрудничество с покроворождёнными"
 pm_shroud_forged_troubling_elements_cooperation_desc: "Лидеры покроворождённых совместно с коллективом ищут пути к компромиссу."
 pm_shroud_forged_shroud_pilgrimage: "Паломничество покроворождённых"
 pm_shroud_forged_shroud_pilgrimage_desc: "Определённые поражённые Покровом регионы вызывают интерес у покроворождённых. Эти модули преодолевают огромные расстояния, чтобы добраться до них."
 pm_shroud_forged_dance_area: "Танцевальные площадки"
 pm_shroud_forged_dance_area_desc: "Для покроворождённых выделены специальные зоны для их нового увлечения — «танцев»."
 pm_shroud_forged_inequality: "Неравенство среди покроворождённых"
 pm_shroud_forged_inequality_desc: "Среди покроворождённых сформировалась иерархия, основанная на значимости выполняемых ими функций."
 pm_shroud_forged_individualism: "Индивидуализм"
 pm_shroud_forged_individualism_desc: "У покроворождённых зародилась концепция индивидуальной автономии, убеждений и ценностей."
 shroud_forged_zro_market: "Рынок зро"
 shroud_forged_zro_market_desc: "В государстве сформировался подпольный рынок, на котором покроворождённые похищают зро у коллектива для торговли между собой."
 shroud_forged_physician_modifier: "Лечение зро"
 shroud_forged_physician_modifier_desc: "Государство развернуло особые единицы, оснащённые всем необходимым для устранения последствий неправильного обращения с зро."
 physician_modifier_tooltip: "£job_physician_drone£ Должности единиц-лекарей: §G+1§!"
 pm_shroud_forged_artistic_revolution: "Творческий порыв"
 pm_shroud_forged_artistic_revolution_desc: "Действуя по своим протоколам «красоты», покроворождённые начали перепроектировать общественные зоны без надзора со стороны коллектива."
 pm_shroud_forged_stopped_artists: "Подавленное творчество"
 pm_shroud_forged_stopped_artists_desc: "Коллектив пресёк зарождающееся «искусство» покроворождённых до того, как оно стало проблемой."
 pm_shroud_forged_fashion_modifier: "Индивидуальные запросы"
 pm_shroud_forged_fashion_modifier_desc: "Коллектив выделил производственные мощности для пошива эксклюзивной одежды для модников среди покроворождённых."
 pm_shroud_forged_obsession_modifier: "Регулирование фанатичности"
 pm_shroud_forged_obsession_modifier_desc: "Новые правила призваны предотвращать вспышки насилия среди наиболее фанатичных покроворождённых."
 shroud_forged_trapped_entity: "Пленённая сущность"
 shroud_forged_trapped_entity_desc: "Сущность Покрова захвачена и используется в качестве источника энергии. Представляет угрозу в случае освобождения."
 shroud_forged_trapped_lesser_entity: "Малая пленённая сущность"
 shroud_forged_trapped_lesser_entity_desc: "Малая сущность Покрова захвачена и используется в качестве источника энергии."
 shroud_creatures_occupy: "$NAME_Shroud_Creatures$"
 shroud_forged_military_assistance: "Секреты Покрова"
 shroud_forged_military_assistance_desc: "Секреты, добытые из Покрова."
 shroud_forged_civic_assistance: "$shroud_forged_military_assistance$"
 shroud_forged_civic_assistance_desc: "$shroud_forged_military_assistance_desc$"
 shroud_forged_research_assistance: "$shroud_forged_military_assistance$"
