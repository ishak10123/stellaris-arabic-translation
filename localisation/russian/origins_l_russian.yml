 shroud_invasion_tt: "§RВторжение из Покрова§!"
 animator_of_clay_equilibrators_tt: "Есть §Y3§! действующих £building£ §Hстабилизатора зрони§!."
 animator_of_clay_cooldown_tt: "Будет невозможно установить контакт с §HОживляющим глину§! до §Y[Root.animator_of_clay_cooldown_timer]§!."
 # Situation
 situation_shroud_forged: "Выкованные Покровом"
 situation_shroud_forged_desc: "После контакта с сущностью §HПокрова§!, известной как $the_animator_of_clay_color_article$, в коллективной сети участились случаи девиантного поведения. Пораженные автоматы — §H«покроворожденные»§! — теперь требуют особых прав и обращения. Наша реакция определит будущее [Owner.GetSpeciesAdj&neut,gen] общества."
 situation_shroud_forged_type: "$situation_shroud_forged$"
 situation_shroud_forged_monthly_change_tooltip: "§LАномальное присутствие покроворождённых вызывает серьёзные опасения. То, как мы решим их дальнейшую судьбу, существенно повлияет на стабильность сети.§!"
 stage_shroud_forged_oppressed: "Угнетённые"
 stage_shroud_forged_oppressed_desc: "Преследуемые дронами-следопытами, покроворождённые вынуждены действовать в рамках, установленных центральным коллективом."
 stage_shroud_forged_oppressed_tooltip: "Преобразование единиц: §Yнет§!"
 stage_shroud_forged_control: "Контролируемые"
 stage_shroud_forged_control_desc: "Система ввела специальные регламенты для покроворождённых."
 stage_shroud_forged_control_tooltip: "Преобразование единиц: §Yминимальное§!"
 stage_shroud_forged_balanced: "Равновесие"
 stage_shroud_forged_balanced_desc: "Система и покроворождённые существуют в хрупком балансе — пока что."
 stage_shroud_forged_balanced_tooltip: "Преобразование единиц: §Yнизкое§!"
 stage_shroud_forged_unrestricted: "Без ограничений"
 stage_shroud_forged_unrestricted_desc: "Покроворождённые существуют свободно, игнорируя протоколы коллектива."
 stage_shroud_forged_unrestricted_tooltip: "Преобразование единиц: §Yсреднее§!"
 stage_shroud_forged_free: "Освобождённые"
 stage_shroud_forged_free_desc: "Коллектив давно утратил контроль над покроворождёнными, которые теперь по любому поводу сопротивляются централизованной власти."
 stage_shroud_forged_free_tooltip: "Преобразование единиц: §Yвысокое§!\nЗакрепленный подход: §Y$approach_shroud_forged_appease$§!"
 approach_shroud_forged_suppress: "Подавлять"
 approach_shroud_forged_suppress_desc: "Коллектив подавляет покроворождённых, принуждая их к повиновению с помощью дронов-следопытов."
 progress_shroud_forged_suppress: "Покроворождённые подавляются"
 approach_shroud_forged_suppress_tooltip: "Ежемесячный прогресс: §Y$@situation_suppress_progress|0$§!"
 approach_shroud_forged_support: "Поддержать"
 approach_shroud_forged_support_desc: "Покроворождённые существуют свободно, без ограничений со стороны коллектива, и получают поддержку в своих начинаниях."
 progress_shroud_forged_support: "Покроворождённые получают поддержку"
