 shroud_forged_research_assistance_capital_desc: "$shroud_forged_military_assistance_desc$"
 # Species Rights
 citizenship_shroud_touched: "Покроворождённые"
 citizenship_shroud_touched_tooltip: "Это группа автоматов, существенно изменённых §HПокровом§!. Они функционируют независимо от §Hмашинного разума§!, а потому не могут занимать должности £pop_cat_simple_drone£ дронов-чернорабочих."
 citizenship_shroud_touched_tooltip_delayed: "§LОни работают на благо системы, но не подчиняются ей.§!"
 citizenship_shroud_forged_no_assimilation: "$TRIGGER_FAIL$Ввиду сложности покроворождённых модулей сейчас мы не можем ассимилировать их и включить в коллективную сеть."
 living_standard_protected: "Защита"
 living_standard_protected_tooltip: "Коллектив защищает эти модули, хоть они и не являются его частью. §H$machine_intelligence$§! может извлечь большую пользу из их уникальных навыков, однако их требования со временем могут вырасти."
 living_standard_protected_tooltip_delayed: "§LСистема терпит их, пока они приносят пользу.§!"
 assimilate_shroud_forged_tt: "Нельзя ассимилировать £pop£ §Hпокроворождённые§! §Yпоселения§!"
 living_standard_protected_situation_stage_tt: "Содержание покроворождённых: §R+$@living_standard_luxuries_high|1$§! £consumer_goods£ §Yтоваров массового спроса§!."
 # Traits
 leader_trait_guided: "Ведомый"
 leader_trait_guided_desc: "Этот модуль прокладывает курс по галактике, следуя видениям и посланиям из Покрова. Для поддержания стабильной связи требуется постоянное снабжение зро."
 leader_trait_shroud_prophet: "Пророк Покрова"
 leader_trait_shroud_prophet_desc: "Говорят, этот модуль обладает глубинной связью с Покровом и сущностями, что обитают в нём."
 trait_shroud_forged: "Покроворождённые"
 trait_shroud_forged_desc: "§LЭти модули были изменены сущностью из Покрова.§!"
 trait_shroud_forged_tooltip: "§YНе могут занимать должности дронов-чернорабочих§!"
 # Edicts
 edict_zro_observators: "Наблюдение за Покровом"
 edict_zro_observators_desc: "Зро — сложный в обращении материал. Желательно постоянно хранить небольшой запас этого ресурса."
 edict_shroud_bonded: "Связанные Покровом"
 edict_shroud_bonded_desc: "Благодаря связи через Покров мы стали ближе, чем когда-либо."
 # Other
 CONTINUE_PROMPT: "Продолжить."
