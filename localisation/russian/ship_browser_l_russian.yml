l_russian:
 SHIPSET_LABEL: "Набор кораблей"
 SHIPSETS_LABEL: "Наборы кораблей"
 SHIP_GRAPHICS_PREVIEW: "Посмотреть классы кораблей"
 SHIP_GRAPHICS_REQUIRED_DLC: "Необходимое дополнение"
 SHIP_GRAPHICS_MISSING_DLC_TOOLTIP: "§GЩелкните, чтобы посмотреть корабли $CULTURE_NAME$.§!"
 SHIP_GRAPHICS_CAMERA_TRANSFORM_TOOLTIP: "£camera_zoom_in£ Прокрутите §Gколесо мыши вперед§!, чтобы приблизить камеру.\n£camera_zoom_out£ Прокрутите §Gколесо мыши назад§!, чтобы отдалить камеру.\n£camera_rotate£ Перемещайте мышь с зажатой §Gправой кнопкой§! вдоль модели корабля, чтобы вращать ее."
 SHIP_GRAPHICS_CORVETTE_DESC: "Корветы — первый класс военных кораблей, доступных государствам. Они быстрые, маневренные и дешевые."
 SHIP_GRAPHICS_FRIGATE_DESC: "Фрегаты являются улучшенной версией корветов, специализирующейся на торпедах. Несмотря на низкую скорость и уязвимость, они могут наносить колоссальный урон крупным целям."
 SHIP_GRAPHICS_DESTROYER_DESC: "Эсминцы отказались от маневренности и скорости корветов в угоду огневой мощи и более прочного корпуса."
 SHIP_GRAPHICS_CRUISER_DESC: "Крейсеры — универсальные и надежные корабли, способные выдерживать и наносить приличное количество урона."
 SHIP_GRAPHICS_BATTLESHIP_DESC: "Линкоры стоят дорого, но обладают повышенной мощью. Благодаря отличной дальности стрельбы они прекрасно подходят для нанесения урона врагу до того, как тот сможет открыть ответный огонь."
 SHIP_GRAPHICS_TITAN_DESC: "Помимо колоссальной боевой мощи, титаны обладают способностью усиливать дружественные корабли с помощью аур."
 SHIP_GRAPHICS_BIO_TITAN_DESC: "$SHIP_GRAPHICS_TITAN_DESC$"
 SHIP_GRAPHICS_JUGGERNAUT_DESC: "Постройка Джаггернаута — настоящий подвиг для любого государства. Эти колоссальные корабли играют роль мобильных верфей и кораблей поддержки."
 SHIP_GRAPHICS_COLOSSUS_DESC: "Эти колоссальные корабли не имеют возможностей для борьбы с вражескими флотилиями. Они предназначены для уничтожения целых миров."
 SHIP_GRAPHICS_OUTPOST_DESC: "Форпост — низший уровень космической базы, и его функции сводятся к обозначению владельца системы."
 SHIP_GRAPHICS_STARBASE_CITADEL_DESC: "Цитадель — максимальный уровень космической базы. Благодаря внушительным защитным средствам цитадель может бросить вызов любому врагу."
 SHIP_GRAPHICS_TRANSPORT_DESC: "Транспортные корабли доставляют армии для штурма вражеских планет во время войны. Не обладая ни вооружением, ни средствами защиты, они полагаются на флотилии поддержки, когда перемещаются по вражеской территории."
 SHIP_GRAPHICS_SCIENCE_DESC: "Научные корабли главным образом используются для исследования новых звездных систем и изучения аномалий. Эти гражданские корабли не обладают вооружением, что делает их уязвимыми."
 SHIP_GRAPHICS_CONSTRUCTOR_DESC: "Строительные корабли необходимы для строительства космических станций. Эти гражданские корабли не обладают вооружением или защитой, что делает их уязвимыми."
 SHIP_GRAPHICS_COLONIZER_DESC: "Колониальные корабли перевозят поселенцев с обитаемых планет на новые, предназначенные для колонизации. Эти гражданские корабли не обладают вооружением или защитой, что делает их уязвимыми."
 SHIP_GRAPHICS_SHIP_SIZE_LOCKED_DESC: "§RДля этого класса кораблей требуется дополнение $SHIP_SIZE_NAME$.§!"
 SHIP_GRAPHICS_ION_CANNON_DESC: "Огромное оборонительное орудие, которое стреляет разрушительными энергетическими зарядами, разрезая вражеские корабли. Оно медленное, но мощное и отлично послужит для сдерживания нежеланных гостей."
 SHIP_GRAPHICS_MILITARY_STATION_SMALL_DESC: "Оборонительные платформы — стационарные орбитальные укрепления для защиты космических баз от вражеских флотилий."
 SHIP_GRAPHICS_STARBASE_DEEP_SPACE_CITADEL_1_DESC: "Орбитальная станция, которая служит первой линией обороны в системе. Создана для демонстрации мощи и защиты стратегических территорий."
 SHIP_GRAPHICS_STARBASE_DEEP_SPACE_CITADEL_2_DESC: "Продвинутая крепость, обвешанная вооружением и оборонительными системами. Укреплена для затяжных сражений и поддерживает военные операции в оспариваемом пространстве."
 SHIP_GRAPHICS_STARBASE_DEEP_SPACE_CITADEL_3_DESC: "Практически неприступный бастион — вершина технологий для укреплений в глубоком космосе. Эта огромная станция способна выдерживать полномасштабные атаки, в то же время обеспечивая полный контроль над логистикой системы."
 SHIP_SIZE_SELECTOR_LOC: "SHIP_GRAPHICS_$SIZE$_DESC"
 SHIPSETS_DESCRIPTION_LABEL: "Описание"
 SHIP_GRAPHICS_NANITE_SWARMER_DESC: "Этот быстрый и непредсказуемый боевой корабль состоит из самовоспроизводящихся нанитов. У него нет привычных пилотов — вместо этого автономные рои сокрушают врагов численным превосходством, растворяя вражескую защиту градом безжалостных и точных ударов."
 SHIP_GRAPHICS_NANITE_INTERDICTOR_DESC: "Запретитель — это адаптивный боевой корабль из самовоспроизводящихся нанитов. Он ставит порядок выше хаоса. Действуя как единый слаженный механизм, такие автономные конструкции перехватывают и уничтожают угрозы с пугающей эффективностью, разрушая вражеское построение за счет скоординированных атак и неумолимого преследования."
 SHIP_GRAPHICS_CRISIS_CORVETTE_DESC: "В основе корветов кризиса лежит быстрое развертывание и подавляющее превосходство за счет численности. Они мощнее стандартных корветов и вселяют страх в тех, кто осмелится противостоять надвигающейся буре."
 SHIP_GRAPHICS_CRISIS_DESTROYER_DESC: "Этот тяжело вооруженный корабль — воплощение безжалостной эффективности. Крупнее и прочнее корветов, он обрушивает на врага сокрушительную огневую мощь, сохраняя при этом скорость для преследования отступающих противников."
 SHIP_GRAPHICS_CRISIS_CRUISER_DESC: "Грозный боевой корабль, сочетающий огневую мощь, прочность и стратегическое превосходство. Благодаря тяжелому вооружению и высокой устойчивости он становится опорой наступающей флотилии, сокрушая ряды противников своей мощью."
 SHIP_GRAPHICS_STAR_EATER_DESC: "Этот колоссальный корабль способен поглощать целые звезды, вызывая взрыв сверхновой и стирая с лица галактики целые системы. Пожиратель звезд — это не просто корабль. Это предвестник конца, на пути которого все миры обратятся в безжизненные пустыни."
 SHIP_GRAPHICS_COSMO_CRISIS_DESTROYER_DESC: "Этот изящный боевой корабль, напитанный космической энергией, атакует точно и решительно. Больше, чем просто судно, — это предвестник новой реальности."
 SHIP_GRAPHICS_COSMO_CRISIS_BATTLECRUISER_DESC: "Величественное слияние науки и предназначения с разрушительной огневой мощью. Этот корабль перекраивает поля битв, подобно тому, как его создатели перекраивают звезды."
 SHIP_GRAPHICS_COSMO_CRISIS_TITAN_DESC: "Небесная машина войны, излучающая силу грядущих перемен. Само его присутствие искажает реальность, возвещая новый рассвет возрожденной вселенной."
 SHIP_GRAPHICS_OFFSPRING_CORVETTE_DESC: "$SHIP_GRAPHICS_CORVETTE_DESC$\n\n$OFFSPRING_SHIP_DESC$"
 SHIP_GRAPHICS_OFFSPRING_DESTROYER_DESC: "$SHIP_GRAPHICS_DESTROYER_DESC$\n\n$OFFSPRING_SHIP_DESC$"
 SHIP_GRAPHICS_OFFSPRING_CRUISER_DESC: "$SHIP_GRAPHICS_CRUISER_DESC$\n\n$OFFSPRING_SHIP_DESC$"
 SHIP_GRAPHICS_OFFSPRING_BATTLESHIP_DESC: "$SHIP_GRAPHICS_BATTLESHIP_DESC$\n\n$OFFSPRING_SHIP_DESC$"
