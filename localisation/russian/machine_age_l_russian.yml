 cosmogenesis_slightly_smaller: "Чуть меньше размером"
 cosmogenesis_slightly_smaller_desc: "Утечка материи в другое измерение привела к необратимому уменьшению размеров этой планеты."
 cosmogenesis_research_slowdown: "Срыв исследовательских работ"
 cosmogenesis_research_slowdown_desc: "Пошедший не по плану вычислительный эксперимент напрямую отразился на наших исследовательских возможностях."
 blipped_colony: "Омоложенный мир"
 blipped_colony_desc: "Эта планета попала во временную аномалию и вернулась в недалекое прошлое."
 devastated_colony: "Опустошенная колония"
