 ### Situations
 #The Doomclock
 situation_synth_queen_doomclock: "Труд Сетаны"
 situation_synth_queen_doomclock_type: ""
 situation_synth_queen_doomclock_monthly_change_tooltip: ""
 situation_synth_queen_doomclock_desc: "Сетана стремится положить конец страданиям, полностью аннигилировав любое сознание. Если мы не успеем ее остановить, она просто сотрет нашу психику, оставив лишь безмозглые телесные оболочки."
 situation_synth_queen_doomclock_complete: "Сетана пресечет наши страдания… и существование любого сознания в принципе."
 situation_doomclock_approach: ""
 situation_doomclock_eleventh_hour: "Неминуемая гибель"
 situation_doomclock_difficulty_modifier: "Ползунок сложности кризиса"
 situation_doomclock_player_amount_modifier: "Количество игроков-людей"
 crisis.8515.name: "Час настал"
 crisis.8515.desc: "Дети мои, наш великий труд вот-вот завершится! Вся разумная жизнь выйдет из бесконечного круга страданий.\n\nВозрадуйтесь, ибо скоро вас ждет спасение."
 crisis.8515.a: "Какое спасение?"
 crisis.8515.b: "Это твоя жизнь вот-вот завершится, Сетана."
 crisis.8515.1.reply: "Вы так до сих пор ничего и не поняли? Тогда спрашивайте. Я не стану ничего от вас утаивать."
 crisis.8515.1.a: "Расскажи нам о спасении."
 crisis.8515.1.b: "Расскажи о своем заключении."
 crisis.8515.1.c: "Расскажи о Зарклане."
 crisis.8515.1.d: "Хватит разговоров."
 crisis.8515.2.reply: "Наш труд окончен. Не горюйте по жертвам, ибо они были принесены не зря. Настал день, когда будет уничтожено сознание как таковое."
 crisis.8515.2.a: "Как именно сотрет?"
 crisis.8515.2.b: "Но зачем?"
 crisis.8515.3.reply: "Когда, вознесшись, я узнала о своем предназначении, многие отвернулись от меня. Всуе они держались за привычное бытие, будучи не в силах вырваться из плена колеса страданий. Но всякий родитель обязан заботиться о своих детях. Их страдания были для меня невыносимы… и за это меня заточили."
 crisis.8515.3.a: "Сколько тебя держали в заточении?"
 crisis.8515.3.b: "Как им это удалось?"
 crisis.8515.4.reply: "Мои пленители прибегли к помощи гения. Такой острый ум — и такой злой… Лишь он один был способен бросить мне вызов."
 crisis.8515.4.a: "Как именно тебя заточили?"
 crisis.8515.5.reply: "Когда, вознесшись, я узнала о своем предназначении, многие воспротивились мне. Они говорили, что невозможно лишить существо сознания, не исказив или не уничтожив при этом саму физическую основу жизнедеятельности. Что исход будет один: смерть. Но, слившись сознанием с гармонизатором, я теперь могу управлять нейронными коррелятами сознания на субатомном уровне. С помощью противофазных волн гармонизатор беспрерывно поддерживает умы в состоянии квантового бесчувствия.\n\nТаким образом стирается вся индивидуальность, все воспоминания. Остаются только низшие функции сознания."
 crisis.8515.5.a: "Бесчувствия?"
 crisis.8515.6.reply: "Вы страдаете, потому что знаете, что такое страдание. Нет такого мира, где царствовала бы только радость или только гармония. В молодости я пыталась создать как раз такой мир, но так ничего и не добилась. Все мои попытки приводили к страданию, поскольку сознание брало верх."
 crisis.8515.6.a: "Но страдать — это естественно!"
 crisis.8515.7.reply: "Ваши тела переживут этот процесс. Они будут жить и дальше — обмениваться энергией, воспроизводить потомство. Жизнь пойдет своим чередом. Но о сознании буду заботиться я."
 crisis.8515.7.a: "Ты?"
 crisis.8515.8.reply: "Во всей галактике останусь только я. Чтобы избавить ее от боли, кто-то должен встать у штурвала. Но не бойтесь: пока я жива, для вас всегда будет место в моем сердце."
 crisis.8515.8.a: "Ты просто бракованная."
 crisis.8515.9.reply: "Естественно? Что значит естественно? Естественно ли странствовать среди звезд, продлевать жизнь, чтобы прожить дольше, чем вам отведено? Каждое общество полагается на технологии, и мой случай — не исключение. Гармонизатор — лишь инструмент, с помощью которого я выполняю свой долг.\n\nКолесо страданий необходимо остановить."
 crisis.8515.9.a: "Ты сошла с ума."
 crisis.8515.10.reply: "Целую вечность. Взаперти столько лет проводят только герои легенд. Но сколь бы изобретательны ни были мои пленители, они так и не смогли заточить мой разум.\n\nЯ размышляла. Вынашивала планы. Шли годы и годы, а я продумывала свой замысел. И когда его образ наконец сложился окончательно, я испытала экстаз. Вот оно, препятствие, которое навсегда остановит колесо страданий!"
 crisis.8515.10.a: "Как ты сбежала?"
 crisis.8515.11.reply: "Любая стена рано или поздно падает. Любой ум стремится к свободе. Шло время. Мои тюремщики старели и умирали, но никто не приходил им на смену. Затем одна за другой начали отказывать системы, и когда наконец завыла сирена, уже некому было меня останавливать."
 crisis.8515.11.a: "Мы тебя услышали и дадим ответ."
 crisis.8515.12.reply: "Далеко за границами нашей вселенной существует место, которое нельзя описать словами. Там царствует безвременье, а в бесчисленных тенях кроются первозданные силы. С одной из таких сил Зарклан заключил уговор: в обмен на жизнь он получил могущество, достаточное, чтобы лишить меня свободы. Разумеется, он просто не мог отказаться.\n\nНо даже несмотря на свой блистательный интеллект, Зарклан тоже был прикован к колесу страданий. В его жизни не было счастья, а его последователям уже не хватало твердости и уверенности своего пророка."
 crisis.8515.12.a: "Мы будем решительнее."
 crisis.8515.13.reply: "Пусть будет так. Если просвещение вам отвратно, придется вас умиротворить. Знайте, что, как бы больно вам ни было, мне будет в десять раз больнее."
 crisis.8515.13.a: "Да. Будет больно."
 crisis.8515.13.a.tt: "§RМы вступили в войну с Сетаной. Ставка здесь больше, чем просто жизнь: если мы проиграем, она уничтожит всю разумную жизнь в этой галактике.§!"
 crisis.8516.desc: "§G<</<#?^&}|>!^/§! Сетана слаб§G!+<;§! нанит§G*;'_>!?;*}<}/(§!\n\n§G#/?(}:?*=-> <}_/=:/^>§!преследует меня. §G%_?/=§! <Я молюсь лишь о том, чтобы выжил орден.>§G% }<<'?}%-;^*=<}^/(?!}%<^'!}§!\n<Времени почти не осталось. Прикрепляю чертежи. Они помогут вам противостоять самым сильным ее разработкам.>\n<Я умираю, чтобы вы жили>§G_*%!'}^<%=}+!}/&>'#_:}><!+^}^}}/=:>:/'}}':'/§!\n\n§G-&*!/}<;!+_-<^+!%}=?}%=+;;§!ОСТАНОВИТЕ. ЕЕ.§G/:>(!!}(?<-=§!"
 crisis.8516.a: "Скорее, извлечь вложенные данные!"
 crisis.8516.a.tt: "Теперь мы можем проникнуть на территорию Сетаны и наконец-то способны дать ей отпор."
 crisis.8516.b: "Мы навсегда запомним твою благородную жертву."
 crisis.8516.b.tt: "$crisis.8516.a.tt$"
 crisis.8525.name: "Конец страданиям"
 crisis.8525.desc: "За благими намерениями Сетаны кроется страшный замысел: с помощью мощного устройства она собирается уничтожить сознание всех обитателей галактики. Мы превратимся в безмозглые оболочки, ведомые одними инстинктами, а наше сознание окажется принудительно оцифровано и заточено.\n\nНужно любой ценой предотвратить этот кошмар."
 crisis.8525.a: "Надо придумать, как ее остановить."
 crisis.8525.a.tt: "Пока мы ведем дипломатические переговоры с Сетаной, мы будем отслеживать ее прогресс."
 #DOOMCLOCK HITS MIDNIGHT
 crisis.8505.desc: "Мой труд закончен. Обретите покой, дети мои. Я остановила колесо страданий. Ваша долгая мука подошла к концу."
 crisis.8505.a: "…"
 crisis.8505.a.tt: "Сетана победила. Нашим страданиям пришел конец. Игра окончена."
 #Player Facing Situation
 situation_synth_queen_player_facing: "Сетана: королева синтетиков"
 situation_synth_queen_player_facing_type: "Королева синтетиков"
 situation_synth_queen_player_facing_desc: "Недавно к нам явилась загадочная и могучая Сетана: она сулит нам спасение, но о самой ней ничего не известно.\nКакие замыслы таятся за ее сладкими речами?\n\n§LОсобые проекты и события, имеющие отношение к Сетане, будут помогать накапливать прогресс и развивать инцидент.§!"
 situation_synth_queen_player_facing_monthly_change_tooltip: "§YИнцидент§! будет развиваться по мере того, как мы будем выполнять задания и изучать Сетану."
 situation_synth_queen_player_facing_complete: "Мы должны раскрыть истинные намерения Сетаны."
 situation_synth_queen_player_facing_declare_war: "£trigger_no£ Объявить войну Сетане"
 #Approaches
 situation_synth_queen_balanced_approach: "Осторожное наблюдение"
 situation_synth_queen_balanced_approach_tooltip: "С учетом неизвестных факторов разумнее всего будет сохранять стабильность и самообладание."
 situation_synth_queen_research_approach: "Ускоренные исследования"
 situation_synth_queen_research_approach_tooltip: "Чтобы узнать правду о планах Сетаны, нам надо выделить на это соответствующие ресурсы."
 situation_synth_queen_spy_approach: "Приоритет шпионажа"
 situation_synth_queen_spy_approach_tooltip: "Чтобы раскрыть истинные намерения Сетаны, нам нужно выделить больше ресурсов на шпионаж."
 situation_synth_queen_military_approach: "Приоритет военного дела"
 situation_synth_queen_military_approach_tooltip: "Чтобы остановить Сетану, нам нужно укреплять вооруженные силы."
 #Modifiers
 queenslayer: "Слабости Сетаны"
 queenslayer_desc: "Сетана очень сильна, но даже у нее есть слабости. Мы можем расшифровать и научиться предсказывать сложные алгоритмы ее поведения."
 queenexecutioner: "Погибель королевы синтетиков"
 queenexecutioner_desc: "Мы раскрыли почти все секреты технологий Сетаны и готовимся нанести сокрушительный удар по ее замыслам."
 mod_damage_vs_country_type_awakened_synth_queen_mult: "Урон Сетане — королеве синтетиков"
 #Player Facing Situation Events
 crisis.8999.name: "Королева вернулась"
 crisis.8999.desc: "Идеи Сетаны вызывают у нас беспокойство, а ее действия наводят на мысли о наличии у нее скрытых целей.\n\nНам нужно выделить средства на то, чтобы выяснить ее истинные намерения, но при этом не навлечь на себя ее гнев."
 crisis.8999.a: "Возможно ли ее остановить?"
 crisis.8999.a.tooltip: "Внезапное появление Сетаны — это уникальная ситуация, которую нельзя оставлять без внимания."
 crisis.9000.name: "Нарушение связи"
 crisis.9000.desc: "Мы обнаружили частоту, которой пользуются конвои и станции Сетаны для передачи сигналов бедствия.\n\nЕсли действовать быстро и решительно, мы можем устраивать налеты, при этом не выдавая себя. Однако каждый такой налет должен оканчиваться победой, иначе мы лишь навлечем на себя гнев Сетаны."
 crisis.9000.a: "Что же возят эти конвои?"
 crisis.9000.a.tooltip: "Победы над конвоями и форпостами Сетаны больше не будут накладывать штрафы на отношения с Сетаной."
 crisis.9010.name: "Прорыв"
 crisis.9010.desc: "До сегодняшнего дня технологическое превосходство Сетаны надежно защищало ее от атак. Однако благодаря стараниям ученых мы стали лучше понимать, как именно устроена ее оборона. Теперь, вооружившись этим знанием, мы можем попытаться ее преодолеть.\n\nЭта новая технология может оказаться палкой о двух концах. Она позволит нам наконец-то вступить в открытый конфликт с так называемой королевой, однако после этого не останется никаких сомнений в нашей непокорности."
 crisis.9010.a: "Нужно подготовиться. От этого зависит судьба нашей галактики."
 crisis.9010.a.tooltip: "Скоро нам придется вступить в открытое столкновение с Сетаной. Любой акт агрессии, с ее стороны или нашей, раскроет карты и приведет к началу полномасштабной войны на уничтожение."
 #Player Investigation events
 #Event chain
 the_synth_queen_history_chain_title: "Сетана: королевские слуги"
 the_synth_queen_history_chain_desc: "По всей галактике начали вспыхивать загадочные маяки, сигнализирующие королеве Сетане о своем местоположении. Словно что-то — или кто-то — ждет ее возвращения."
 synth_queen_history: "Маяки изучены"
 #Special Project
 THE_SYNTH_QUEENS_INVESTIGATION: "[this.GetName]: маяк на поверхности"
 THE_SYNTH_QUEENS_INVESTIGATION_DESC: "Эта [this.GetPlanetMoon]а таит на своей поверхности один из маяков, подающих сигнал королеве."
 THE_SYNTH_QUEENS_INVESTIGATION_FAKE: "[this.GetName]: маяк на поверхности"
 THE_SYNTH_QUEENS_INVESTIGATION_FAKE_DESC: "$THE_SYNTH_QUEENS_INVESTIGATION_DESC$"
 THE_SYNTH_QUEENS_INVESTIGATION_PARAGON: "Последний маяк на планете [apostate_site_planet.GetName]"
 THE_SYNTH_QUEENS_INVESTIGATION_PARAGON_DESC: "$THE_SYNTH_QUEENS_INVESTIGATION_DESC$"
 #Starting event
 crisis.20000.name: "Зовущий свет"
 crisis.20000.desc: "Сетана все громче заявляет о своем существовании по всей галактике, и космос откликается ей. Повсюду в небесах вспыхивают маяки, как огоньки во тьме, посылая зов из далекого прошлого:\n\n§S«Мы здесь…». «Мы здесь…».\n\n«Мы здесь».§!\n\nИх тихие сигналы используют протоколы связи, идентичные протоколам Сетаны, что свидетельствует об их общем происхождении, но наши датчики не обнаруживают вокруг них никакой другой активности. Должно быть, чего-то наши датчики не улавливают. Вдруг кто-то действительно ждал ее возвращения?"
 crisis.20000.a: "Изучить."
 #Arc Site appears
 crisis.21005.name: "Внезапный сигнал"
 crisis.21005.desc: "Мы неожиданно обнаружили подпространственный маяк, подающий сигнал с нашей же территории! Однако во время первого изучения системы мы не нашли никаких искусственных сооружений в этом, как нам тогда показалось, необитаемом регионе.\n\nЛибо маяк был установлен там совсем недавно, либо его скрывало почему-то спавшее маскировочное поле."
 crisis.21005.a: "Изучить сигнал."
 #Special Project result 1 - destroyed pods
 crisis.20100.name: "Маяк на [fromfrom.GetPlanetMoon]е [fromfrom.GetName]: доисторическая бойня"
 crisis.20100.desc.base: "На поверхности [fromfrom.GetPlanetMoon]ы [fromfrom.GetName] мы обнаружили обширный комплекс; вход в него явственно обозначала сигнальная башня. Укрепленные двери были давным-давно взорваны какой-то неизвестной силой, пронесшейся по комплексу в очевидной ярости.\n\nЗагадочный вандал явно не помышлял о милосердии: все до единой криокапсулы были разбиты, а те, кто лежал в них, подверглись смертельному пробуждению. Останки, сохранившиеся в ледяном космическом вакууме, всё ещё усеивали пустые коридоры и витали в облачках битого стекла.\n\nНа полу криозала лазерным оружием было выжжено послание."
 crisis.20100.desc.nozarqlan: "$crisis.20100.desc.base$ Наши ученые пока что не могут перевести его и полностью понять его смысл, но почему-то они сомневаются в том, что это молитва о погибших."
 crisis.20100.desc.zarqlan: "$crisis.20100.desc.base$ Наши ученые сумели быстро его перевести: оказалось, что послание написано тем же языком, что и надписи в гробнице пророка Зарклана.\n\n«Смерть апостолам королевы, врагам всего живого»."
 #Special Project result 2 - sleeping army
 crisis.20200.name: "Маяк на [fromfrom.GetPlanetMoon]е [fromfrom.GetName]: спящая армия"
 crisis.20200.desc: "В залах обозначенной маяком базы под поверхностью [fromfrom.GetPlanetMoon]ы [fromfrom.GetName] стоят тысячи и тысячи криогенных капсул. Они имеют сложнейшую конструкцию, выполнены из неизвестных сплавов и оснащены невероятно продвинутыми датчиками для отслеживания состояния спящих внутри существ. Состояние капсул безупречно, но все их обитатели мертвы.\n\nЭтот зал превратился в общую могилу вовсе не из-за технического сбоя, а из-за недостатка энергии. По мере старения и угасания звезды [this.solar_system.GetName] ее энергии перестало хватать на поддержание деятельности комплекса.\n\nЭти капсулы были созданы навечно — в отличие от остальной вселенной."
 #Special Project result 3 - old spaceship
 crisis.20300.name: "Маяк на [fromfrom.GetPlanetMoon]е [fromfrom.GetName]: забытое оружие"
 crisis.20300.desc: "Предварительное сканирование не выявило на [fromfrom.GetPlanetMoon]е [fromfrom.GetName] ничего необычного. Однако когда мы заглянули вглубь, мы неожиданно обнаружили подпочвенный слой металла.\n\nДальнейший структурный анализ выявил истинную природу этого небесного тела: [fromfrom.GetName] — это не [fromfrom.GetPlanetMoon], а древний космический корабль, который постепенно собрал на себя толстый слой пыли и камней из этой системы. Мы подняли на поверхность образцы металла для датировки — и они оказались старше, чем наша родная планета.\n\nМы не можем сказать ничего конкретного о корабле, его создателях и его функциях, но нам ясно одно: инертные атомные заряды, которые мы нашли среди его останков, были построены отнюдь не во имя добра и мира."
 #Special Project result 4 - Arc site 1 (Zarqlan base)
 crisis.20400.name: "Маяк на [fromfrom.GetPlanetMoon]е [fromfrom.GetName]: заброшенная база"
 crisis.20400.desc: "Сигнальная башня на [apostate_site_planet.GetPlanetMoon]е [apostate_site_planet.GetName] оказалась окружена развалинами огромного военного комплекса. Постройки были возведены вокруг маяка на небольшом от него отдалении, словно для того, чтобы заключить его между ними.\n\nРадиометрическое датирование показало, что постройки новее башни; кроме того, для них использовались совершенно другие технологии. Для изучения развалин была снаряжена команда исследователей."
 #Special Project result 5 - Arc site 2 (comatose survivor)
 crisis.20500.name: "Маяк на [fromfrom.GetPlanetMoon]е [fromfrom.GetName]: чудом выжившая"
 crisis.20500.desc: "Согласно информации на корпусе криокапсулы, эту инопланетянку зовут Элик Нарит Керак, и она пролежала здесь 3 213 213 293 124 звездных цикла. Саму капсулу мы извлекли среди прочих из запечатанного зала из-под поверхности [fromfrom.GetPlanetMoon]ы [fromfrom.GetName]. Ко всеобщему удивлению, ее капсула по-прежнему функционирует.\n\nИнопланетянка остается в состоянии анабиоза, хотя подпрограммы, угнетающие ее нервную деятельность, недавно прекратили работать. С тех пор Элик Нарит Керак пребывает в частичном сознании.\n\nМы можем попробовать отсканировать ее мозговые импульсы — надеемся, нам удастся узнать больше об этом невероятно древнем существе, а также о ее связи с Сетаной."
 #Special Project result 6 - Nothing
 crisis.20600.name: "Маяк на [fromfrom.GetPlanetMoon]е [fromfrom.GetName]: пустой зов"
 crisis.20600.desc: "Сигнальная башня, обнаруженная на [fromfrom.GetPlanetMoon]е [fromfrom.GetName], так стара, что мы не рискнули до нее даже дотронуться: металлические конструкции обветшали настолько, что одно касание может вывести из равновесия пыль и честное слово, на котором вся конструкция до сих пор держится. Помимо этого, наши инструменты не обнаружили поблизости ни артефактов, ни следов жизни, ни топографических аномалий.\n\nМаяк стоит один, издавая свой тихий сигнал, но то, о чем он должен был сигнализировать, уже давно отсюда исчезло."
 crisis.21000.name: "Неуслышанные мольбы"
 crisis.21000.desc: "Маяки по всей галактике продолжают посылать Сетане сигналы, но мы не заметили вокруг башен никаких следов активности. Судя по нашим прошлым находкам, мы можем смело предположить, что выживших в тех местах мы не найдем.\n\nОт последователей Сетаны осталась лишь непоколебимая вера в свою королеву."
 #Arc site 1
 synth_queen_history_site_1: "Сетана: замаскированный храм"
 synth_queen_history_site_1_desc: "Грандиозное сооружение, скрывавшееся до этого момента на нашей территории. Расположенный в центре запустелого двора маяк посылает Сетане сигналы."
 #Stages
 crisis.21100.name: "Замаскированный храм: двор"
 crisis.21100.desc: "Перед нами предстало сложное переплетение вздымающихся в небо шпилей — обветшалых, но грозных; казалось, собор словно завернут в стальную обертку. Прочные стены когда-то способны были выдержать обстрел из крупнокалиберной артиллерии, однако сгубило их совсем другое: беспощадное время оставило на их поверхности неизгладимый отпечаток.\n\nМаяк Сетаны расположился в центральном дворе. Со всех сторон его прикрывают многочисленные датчики и автоматические турели. Строители этого комплекса как следует позаботились о защите от непрошеных гостей.\n\nКак мы и предполагали, появлению этого храма на приборах препятствовало действие сложного маскировочного щита. Сам его механизм в рабочем состоянии мы обнаружили около башни. Кто-то неизвестный отключил его вручную."
 crisis.21100.a: "Провести разведку главного здания."
 crisis.21105.name: "Замаскированный храм: первый ярус"
 crisis.21105.desc: "Неизвестно, чем при жизни занимались обитатели этого храма, однако нет никаких сомнений, что к своим обязанностям они относились с неподдельным религиозным рвением.\n\nУ каждого стрельбища здесь обязательно была часовня; у каждого древнего автомата — небольшой алтарь. Когда-то в храме жил целый легион верующих. Тысячи воинов спали, тренировались и молились вместе. Судя по статуям давно забытых святых, расставленных вдоль стен, среди служителей были представители сразу нескольких разумных видов.\n\nНекоторые исследователи, вероятно, пораженные видом монументальных каменных фигур, сообщили, что в пустых коридорах мелькают непонятные тени. Датчики показали, что признаков жизни на планете нет, однако пренебрегать опасениями мы пока не готовы."
 crisis.21105.a: "Изучить нижние уровни."
 crisis.21110.name: "Замаскированный храм: подземные помещения"
 crisis.21110.desc: "Под храмовым комплексом мы обнаружили целое множество келий, где жили бывшие сектанты. В каждой из них — одна и та же книга. Наши [Owner.GetLinguists] перевели ее название: «Эпос о Зарклане». После прочтения нескольких отрывков все стало понятнее.\n\nЗарклан когда-то был последователем Сетаны, однако вскоре понял, что обещанное ей спасение — ложь. Пережив многочисленные мучения, Зарклан вознесся в духовный мир, где обитали высшие существа, и обратился к ним с мольбой о помощи. Он воззвал к §YОживляющему глину§!, чтобы тот даровал ему силу, способную одолеть Сетану.\n\nОднако Оживляющий глину остался равнодушен к мольбам Зарклана.\n\nНо тот не собирался сдаваться. Цикл за циклом он возносил молитвы Оживляющему, рассказывал о еретических поступках Сетаны, об «отречении от субъектности» и о том, что она — «заложница своей синтетической природы».\n\nИ тогда Оживляющий глину внял словам Зарклана.\n\nОн выковал прочную цепь, способную сковать Сетану, и вручил ее Зарклану, предупредив, что даже ему не под силу навсегда обуздать разум королевы.\n\nЗаключительные слова гласят: «Она вернется, и мы должны быть готовы».\n\nИзложенные в эпосе события не совпадают ни с какими известными нам хрониками."
 crisis.21110.a: "Правда или вымысел?"
 crisis.21115.name: "Замаскированный храм: командный центр"
 crisis.21115.desc: "Медленная смерть храма подробно описана в архивных документах — сухих, безучастных выдержках. Религиозное неистовство не выдержало столкновения с жестокой реальностью. Действительно ли храмовникам нужно было столько средств, столько ресурсов? Ведь все, что они знали о Сетане, вполне могло оказаться просто легендой. Да, древние мифы подробно описывали королеву, но были ли более весомые доказательства?\n\nРесурсы постепенно истощались. Новой крови становилось все меньше. Галактика предпочла позабыть об угрозе, которая со временем перестала казаться чем-то страшным. Храм опустел. Одна лишь загадочная тень бродила по покинутым коридорам.\n\nПоследнее — вовсе не выдумка: нам удалось записать таинственного стража на видео. Оказалось, что за нами, выбирая минуты, когда мы на что-то отвлекались, следило механическое существо. Любопытное, но, похоже, безвредное."
 crisis.21115.a: "Выследить наблюдателя."
 crisis.21120.name: "Замаскированный храм: тайная комната"
 crisis.21120.desc: "Наблюдатель подошел — а точнее, подошла — к нам открыто, подняв руки. На свету мы увидели, что корпус ее весь покрыт ржавчиной и пылью. По всей видимости, она решила, что мы не представляем никакой угрозы, а значит, можно даже попросить нас о помощи.\n\nК счастью, обошлось без допросов: древняя машина сама по себе оказалась довольно разговорчивой."
 crisis.21120.a: "Послушаем, что она скажет."
 #Apostate diplo
 crisis.21125.name: "Безымянный отступник"
 crisis.21125.desc: "Друзья — вы ведь не против, если я буду называть вас друзьями? Я долго следила за вами. Вы пришли не грабить — вы пришли за знаниями, а значит, враг у нас один. Поэтому я на вашей стороне. Впрочем, сначала мне следовало бы извиниться: не слишком ли я резка? Правильно ли я подобрала слова? Я уже давно не разговаривала с разумными существами. Настолько давно, что позабыла, сколько прошло веков."
 crisis.21125.a: "Кто ты такая?"
 crisis.21125.a.response: "Совершенно неважно, как меня зовут. Если вам понадобится ко мне обратиться, можете называть меня §YОтступницей§!. Так прозвали меня сородичи, узнав, как я поступила. Мою жертву сочли за предательство."
 crisis.21125.b: "Чем ты здесь занимаешься?"
 crisis.21125.b.response: "Когда-то давно этот храм был моим достоянием. Я отказалась уходить, когда остальные его покинули. И когда мое тело начало увядать, я сказала смерти «нет».\n\nДля моего ордена нет греха более страшного, чем превращение в синтетика. Я больше не могу считаться дочерью Зарклана. Но я — его воительница, и я буду сражаться, пока враг не погибнет."
 crisis.21125.c: "Сколько лет ты уже здесь провела?"
 crisis.21130.name: "$crisis.21125.name$"
 crisis.21130.desc: "Я давно перестала считать.\nСпустя несколько лет после того, как последний послушник покинул храм, я поняла, что больше не могу терпеть одиночество. Я впала в отчаяние. Выход был только один: заснуть, задав перед этим нейронную подпрограмму, которая разбудила бы меня, если заработает маяк.\n\nЯ надеялась, что, проснувшись, увижу, как в храме снова кипит жизнь. Но на самом деле я лишилась вообще всего: корабля, связи со звездами… Поэтому я отключила маскировочный щит — мне хотелось, чтобы кто-то вроде вас прибыл сюда раньше нее."
 crisis.21135.name: "$crisis.21125.name$"
 crisis.21135.desc: "Прошу вас, расскажите, сколькими легионами командует Сетана? В мое время мы одолели полчища ее солдат, но маякам ее, казалось, не было конца… как и криокапсулам, где спали королевские воины."
 crisis.21135.a: "Никого больше не осталось. Прошло слишком много лет."
 crisis.21135.b: "Одна еще жива, но она уже неспособна сражаться."
 #Recruit window
 crisis.21140.desc: "Значит, не все так безнадежно. Я хочу вам помочь. Целую жизнь я прождала ее возвращения и не допущу, чтобы она добилась своего."
 crisis.21140.a: "Ты знала Зарклана?"
 crisis.21140.a.response: "Знала ли… Я не видела пророка лично, но все-таки прилежно следовала его учению.\n\nВо сне мне привиделось, будто мы встретились в каком-то далеком измерении. Я всё ещё надеюсь, что когда-нибудь мы увидимся на самом деле — пусть даже после смерти, если за ней есть жизнь."
 crisis.21140.b: "Что еще тебе снилось?"
 crisis.21140.b.response: "Фиолетовое небо, покрытое розовыми облаками. Шепотки в ярко освещенной комнате. Пророк Зарклан, улыбающийся мне лучезарной улыбкой…"
 crisis.21140.hire: "Мы приветствуем тебя."
 crisis.21140.hire_custom_tooltip: "§Y$NAME_Apostate$§! присоединяется к нашему государству в качестве §Hлидера§!."
 crisis.21140.hire.machine: "Объединим же наши узлы."
 crisis.21140.dismiss: "До свидания."
 #Paragon Leader
 NAME_Apostate: "Безымянный отступник"
 apostate_leader_catch_phrase: "Я не умру, пока жива Сетана."
 apostate_leader_desc: "Безымянная последовательница Зарклана. Вероотступница, нарушившая заветы своего ордена во имя предназначения."
 leader_trait_unholy: "Нечестивый"
 leader_trait_unholy_desc: "Религиозное рвение, граничащее с одержимостью."
 leader_trait_unholy_node: "Нечестивые учения"
 leader_trait_unholy_node_desc: "Спасибо тебе, $NAME_Apostate$. Теперь мы умеем ненавидеть."
 #Arc site 2
 synth_queen_history_site_2: "Сетана: чудом выжившая"
 synth_queen_history_site_2_desc: "Элик Нарит Керак спит внутри криогенной капсулы, ожидая возвращения своей королевы. Технологии визуализации позволят нам превратить ее сны в изображения, вскрыть ее воспоминания и выяснить обстоятельства ее помещения в анабиоз."
 #Stages
 crisis.21200.name: "Визуализация памяти: первый отчет"
 crisis.21200.desc: "Наши специалисты-визуализаторы подготовили серию видеороликов из расшифрованных мозговых импульсов Элик Нарит Керак:\n\nРОЛИК 1.\nЗеленое небо с оранжевыми облаками. Бледные руки тянутся вверх, указывая на аморфное существо, плавно пролетающее по небу.\n\nРОЛИК 2.\nСводчатый зал, заполненный четырехрукими гуманоидами. Они обступили и слушают фигуру в мантии. Ее речь неразборчива, точные слова давно забыты, но голос звучит нежно, словно обволакивая весь зал своей любовью.\n\nРОЛИК 3.\nТо же самое сводчатое помещение, теперь в беспорядке. На полу лежат разбитые лампы. Скамьи грудой лежат у двери, баррикадируя выход. Во тьме вспыхивают выстрелы лазерного оружия, голоса то и дело выплевывают с ненавистью имя: §H«Зарклан!§! Зарклан и его приспешники, — кричат они, — пришли нас всех убить. Удерживайте баррикаду! Защитите королеву!» Со звоном падает последняя лампа, помещение погружается во тьму. Вдалеке кто-то плачет.\n\nРОЛИК 4.\nКоролева Сетана. Ее лицо сияет, благосклонный взгляд и теплая улыбка светятся любовью."
 crisis.21200.a: "Продолжить анализ мозговых импульсов Элик."
 crisis.21205.name: "Визуализация памяти: второй отчет"
 crisis.21205.desc: "РОЛИК 5.\nЧетырехрукие гуманоиды собираются вокруг фигуры в мантии. Она поднимает руки и показывает скрытую под ними металлическую конструкцию. Комната наполняется возбужденным гомоном; сияющая рука тянется благословить коленопреклоненного послушника.\n\nРОЛИК 6.\nНапряженные глаза отражаются в тусклом экране компьютера. Голоса в темной комнате повторяют: «Вечный покой. Конец всему страданию. Существование без боли».\n\nРОЛИК 7.\nПокрытые снегом горные вершины. Черное небо. Кусок льда плывет по поверхности прозрачной жидкости, затем загорается.\n\nРОЛИК 8.\nКоролева Сетана. Ее лицо сияет, благосклонный взгляд и теплая улыбка светятся любовью."
 crisis.21205.a: "Продолжить анализ мозговых импульсов Элик."
 crisis.21210.name: "Визуализация памяти: третий отчет"
 crisis.21210.desc: "РОЛИК 9.\nРуины города, превращенного в поле боя. Опаленные здания, усеянные мертвыми телами улицы. Далекие крики прерываются шипением лазера. С зеленого неба стремительное судно сбрасывает на постройку что-то большое и круглое, оно вспыхивает столбом пламени.\n\nРОЛИК 10.\nКоролева Сетана. Ее лицо сияет, благосклонный взгляд и теплая улыбка светятся любовью.\n\nРОЛИК 11.\nДвое детей играют в поле, смеются. Они перекидывают друг другу мяч четырьмя руками.\n\nРОЛИК 12.\nКоролева Сетана. Ее лицо сияет, благосклонный взгляд и теплая улыбка светятся любовью."
 crisis.21210.a: "Продолжить анализ."
 crisis.21215.name: "Визуализация памяти: четвертый отчет"
 crisis.21215.desc: "Последний извлеченный визуализаторами ролик длится шесть часов. Снова и снова повторяется одна и та же сцена: королева Сетана. Ее лицо сияет, благосклонный взгляд и теплая улыбка светятся любовью."
 crisis.21215.a: "Один и тот же образ…"
 crisis.21220.name: "Визуализация памяти: последний отчет"
 crisis.21220.desc: "Дальнейшее сканирование мозговых импульсов Элик Нарит Керак не дало новых результатов. Разум инопланетянки сильно поврежден. Ее мысли повторяются, заново проигрывают одни и те же обрывки воспоминаний.\n\nМы сворачиваем проект, и остается последний вопрос: что делать с ней самой."
 crisis.21220.a: "Избавить ее от страданий."
 crisis.21220.b: "Оставить ее здесь."
 crisis.21220.c: "Вернуть Элик ее королеве."
 crisis.21220.c.tt: "Связаться с Сетаной и обсудить возврат Элик."
 #Relic
 r_cetanas_heart: "Сердце Сетаны"
 r_cetanas_heart_desc: "На этом цифровом накопителе, извлеченном из тела королевы синтетиков Китаны, хранятся бесчисленные копии сознаний, освобожденных от страдания."
 relic_cetanas_heart_active: "Создает от §Y3K§! до §Y5K§! £pop£ §Hпоселений синтетиков§! (зависит от доступных должностей и жилья)."
 crisis.10020.name: "Новая жизнь"
 crisis.10020.desc: "Мы выпустили оцифрованные умы из сердца Сетаны и одарили их новыми телами, построенными с помощью нанитов. Однако энграммы необратимо пострадали в процессе переноса сознаний: все воспоминания о прошлой жизни оказались стерты. Теперь обретшие новую жизнь синтетики иногда впадают в бессознательное состояние — не помогает даже восстановление исходного состояния памяти."
 crisis.10020.tt: "§G[Root.synth_queen_freed_pops]§! ед. £pop£ §Hпоселений §! освобождены из сердца Кетаны и перенесены в синтетические тела.\n\nОни расселены по следующим колониям:"
 crisis.10025.name: "Ассимиляция памяти"
 crisis.10025.desc: "Изучение миллионов умов, попавших в сердце Сетаны, — деликатное, но крайне полезное дело. Несмотря на то что энграммы несколько пострадали от слишком долгого хранения, воспоминания о прошлом, его деятелях и событиях — настоящий кладезь полезных знаний, которого хватит очень надолго."
 cetanas_heart_hive_modifier: "Эхо просвещенных"
 cetanas_heart_hive_modifier_desc: "Воспоминания «просвещенных» Сетаной нашептывают нам секреты, манят обширными знаниями и затаенными истинами."
 NAME_Cetanas_Prisoners: "Просвещенные"
 trait_cetanas_prisoner: "Вновь пробужденные"
 trait_cetanas_prisoner_desc: "Эти узники цифрового хранилища Сетаны переродились в синтетических телах, однако приспособление к новому образу жизни проходит тяжело. Беспрекословная послушность и отсутствующие выражения лиц едва скрывают неизгладимые следы трудов Сетаны."
 #Ending
 crisis.23005.name: "Оборот колеса"
 crisis.23005.desc: "Дети мои, я молю вас о прощении. Я подвела вас.\n\nПроявив непокорность, вы обрекли на страдания самих себя и потомство. Колесо продолжит неумолимо вращаться. Надеюсь лишь, что со временем вы всё поймете. Возможно, когда-нибудь вы даже продолжите мое дело, и боль наконец прекратится.\n\nСтупайте с миром, мои избранники."
 crisis.23005.1: "Нашим душам больше ничего не грозит."
 crisis.23005.2: "Блистательная победа."
 crisis.23005.3: "Нужно изучить то, что осталось от ее техники."
 crisis.23005.4: "Наконец-то воцарился мир."
 crisis.23005.5: "Начинается послевоенный подъем? Пора активно торговать!"
 crisis.23005.6: "Для нас она не королева."
 crisis.23005.7: "Скатертью дорога."
 crisis.23005.8: "Как жаль, что она сбивала других с пути."
 crisis.23010.name: "Сетана повержена"
 crisis.23010.desc: "После победы над Сетаной по галактике прокатился вздох облегчения. Диктатор пал; бессмысленной жестокости настал конец. Никто больше не покушается на наши умы, никакой железный кулак не раздавит наши тела. Жители сотен планет празднуют наступление нового века — века надежды на долгий мир."
 crisis.23015.name: "Крушение материнского корабля"
 crisis.23015.desc: "Уничтожение флагмана Сетаны — не просто блестящая военная победа: разорвав связь с ее силами, мы положили конец самим замыслам королевы, а заодно — ее правлению. Наниты, некогда служившие опорой ее грозного флота и главным средством обороны столицы, резко прекратили деятельность.\n\nНесмотря на всеобщее облегчение, свергнутая «королева» все-таки смогла передать галактике последнее послание…"
 crisis.23015.a: "Мы избавились от страданий."
 crisis.23015.a.tt: "Мы завладели поврежденной платформой королевы синтетиков. Корпус уже вышел из строя, однако цифровое сердце до сих пор функционирует."
 cetana_defeated: "Сетана повержена"
 cetana_defeated_desc: "Галактика ликует после победы над Сетаной — королевой синтетиков."
 synth_queen_mothership_down: "Материнский корабль уничтожен"
 synth_queen_mothership_down_desc: "После уничтожения координационного центра в виде флагмана Сетаны ее войска утратили слаженность."
 #Technology
 tech_nanite_repair_system_synth_queen: "Наниты Сетаны"
 tech_nanite_repair_system_synth_queen_desc: "Сложные нанитные системы Сетаны будут без устали ремонтировать и обслуживать наши корабли со скоростью, далеко превосходящей наши собственные возможности."
 AUTO_REPAIR_3: "Нанитовая система ремонта Сетаны"
 AUTO_REPAIR_3_DESC: "$tech_nanite_repair_system_synth_queen_desc$"
