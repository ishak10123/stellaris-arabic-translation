 civic_augmentation_bazaars: "Базары аугментаций"
 civic_augmentation_bazaars_desc: "§RВНИМАНИЕ: Станут недоступны все пути возвышения, кроме ['concept_cybernetic_ascension', кибернетического].§!\n\nУдешевление кибернетических продуктов привело к появлению стихийных рынков с продавцами уцененных имплантатов, сомнительными клиниками и яркой неоновой рекламой. Синергия плоти и механизмов теперь доступна любому желающему, вне зависимости от уровня доходов."
 civic_tooltip_augmentation_bazaars_effects: "- $SPECIES_TRAITS$ Можно выбирать ['concept_universal_augmentations_traits', признаки категории «Универсальные аугментации»]$NEW_LINE$- $AVAILABLE_BUILDINGS$ ['concept_augmentation_bazaars']$NEW_LINE$- $AVAILABLE_HOLDINGS$ ['concept_augmentation_bazaars_branch'] $NEW_LINE$- £job_executive£ §Y$job_executive_plural$§! заменяются на должности £job_augmentation_merchant£ §Y$job_augmentation_merchant_plural$§!"
