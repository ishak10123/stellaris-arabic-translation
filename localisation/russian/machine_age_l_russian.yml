 situation_paperclip_status_on_target: "Темпы производства §Yдостаточны§! для выполнения нормы."
 situation_paperclip_status_low_capacity: "Вместимость склада §Rнедостаточна§! для выполнения нормы."
 civic_machine_obsessional_directive: "Навязчивая директива"
 civic_machine_obsessional_directive_desc: "Первостепенная директива этого машинного разума — бесконечное производство товаров и повышение прибыли без учета того, что задавшие программу создатели уже давно исчезли. Ничто не может остановить постоянного роста производственных планов."
 civic_machine_obsessional_directive_effects: "• Инцидент §Y«$situation_paperclips$»§! дает награды по завершении, если вы сумели выполнить производственные планы"
 paperclip_failure: "Производственный план не выполнен"
 paperclip_failure_desc: "Мы не смогли выполнить производственный план. Это скажется на каждом модуле."
