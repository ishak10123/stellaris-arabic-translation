 ### Cosmogenesis Events
 crisis.7100.name: "Ненасытное любопытство"
 crisis.7100.desc: "Наука закладывает основу для прогресса. Это аксиома. Только она способна помочь нам раскрыть весь потенциал нашего народа — другого пути нет. Мы добились немалых успехов в области технологий, однако вселенная таит в себе еще немало загадок: жизнь угасших империй, мощь левиафанов, псионические откровения…\n\nЧтобы заглянуть за изнанку реальности и понять, как она устроена, понадобится совершенно новый научный подход. Понадобится компьютер, каких не было раньше. Синаптический станок — наш первый серьезный шаг на пути к обретению безграничного знания."
 crisis.7100.a: "Знание — сила."
 new_cosmogenesis_tech_tt: "§YБонус кризиса§!: доступны новые варианты исследования."
 crisis.7105.name: "Уровень кризиса 2"
 crisis.7105.desc: "Мы сделали новый шаг к раскрытию тайн вселенной. Наши ученые установили, что важнейшую роль в формировании реальности во всех измерениях играет гравитация. Проявления ее влияния на пространство-время ничтожны, но головоломка еще не разгадана даже наполовину…\n\nКаждый новый факт открывает всё больше возможностей. Что-то пригодится в промышленности или военном деле, что-то создаст предпосылки для гипотез, которые раньше невозможно было даже вообразить. Познать предстоит еще очень много."
 crisis.7105.a: "Мы знаем лишь то, что ничего не знаем."
 crisis.7110.name: "Уровень кризиса 3"
 crisis.7110.desc: "Масштаб влияния силы тяготения просто ошеломляет. Мы нашли новые способы ее применения, однако почти не приблизились к пониманию потенциальных последствий наших изысканий. Пока все уверены, что гравитация — лучший помощник, который выведет нас за рамки окружающей действительности. Яркий пример — черные дыры и их воздействие на пространство-время.\n\nМы выдвинули гипотезу, что, добравшись до обратной стороны реальности, мы сможем изменять ее устройство на этой стороне. Погружаться в такие исследования очень опасно, однако осторожность — лишь помеха для прогресса."
 crisis.7110.a: "Гравитация правит миром — и всеми нами… Пока что."
 crisis.7115.name: "Уровень кризиса 4"
 crisis.7115.desc: "Гипотеза подтвердилась! Даже самые упрямые согласились, что наш труд не пропадает впустую.\n\nС помощью гравитации действительно можно менять законы реальности. Однако возможно ли сломить их целиком? Пока что мы проводили лишь мелкомасштабные эксперименты, после которых реальность быстро возвращалась в состояние «по умолчанию», стирая все внесенные изменения. Возможно, стоит серьезно расширить масштаб применения энергетических парадоксов — тогда затраты на такую работу значительно уменьшатся… По крайней мере, в нашем измерении.\n\nКак бы опасно это ни было, останавливать эксперименты уже поздно. Переписывать правила может лишь тот, кому хватает смелости их нарушать."
 crisis.7115.a: "Мы готовы рискнуть всем."
 crisis.7120.name: "Уровень кризиса 5"
 crisis.7120.desc: "Поверить невозможно, но все-таки факты не врут. Реальность упорно сопротивляется нашим попыткам ее изменить. Эта вселенная слишком стара, чтобы смириться с чем-то новым. Впрочем, говорить о полном крахе пока рано: новый эксперимент принес неожиданные многообещающие результаты. Мы давно знали о других измерениях, но соорудить надежную переправу туда было невозможно. До сегодняшнего дня.\n\nВ бесконечной гравитации сингулярности существуют молодые вселенные. Эти экземпляры гораздо более податливы.\n\nМы располагаем технологиями, необходимыми для запуска зондов в черную дыру. Оказавшись за горизонтом событий, зонды начнут оказывать давление, подчиняя новые слои измерений нашей воле. Там, где пространство складывается в бесконечность, мы откроем дверь в другую вселенную, где тоже найдутся объекты для экспериментов. В глубинах мультивселенной мы придадим податливой реальности необычайную форму.\n\nНедальновидные обитатели нашей вселенной попытаются помешать нам, но эти дряхлые глупцы не смогут тягаться с нашим гением."
 crisis.7120.a: "Мы будем придавать форму, а не ломать."
 cosmogenesis_war: "Война за реальность"
 cosmogenesis_materialist_war: "Война за ограничение знаний"
 crisis.7125.name: "Победа на горизонте"
 crisis.7125.desc: "Эта реальность неполноценна. Она необратимо испорчена энтропией, жестокостью и материальными потребностями ее обитателей. Мы не в силах ее изменить, однако в силах ее покинуть. Пора сделать шаг в неизвестность и найти там молодую вселенную, которую можно будет изменить под себя. Пора самостоятельно обеспечить себе идеальный уголок, которого заслуживает каждый из нас.\n\nМы составили чертеж невиданного ранее корабля: §YГоризонтной иглы§!. Это мегасооружение не предназначено для войны, его задача — пересилить законы физики и унести нашу цивилизацию в другую вселенную. Вместе мы погрузимся в черную дыру, оставив эту реальность позади, и отправимся к новому дому, который построим себе сами."
 crisis.7125.a: "Мы должны построить §YГоризонтную иглу§!!"
 needle_to_win_tt: "Постройте мегасооружение §YГоризонтная игла§!, чтобы начать последний этап кризиса."
 cosmogenesis_planet_pickup_chain_title: "Космогенез: исход"
 cosmogenesis_planet_pickup_chain_desc: "Пришло время отправиться в полет. Горизонтная игла примет на борт всех, кто отправится в великий исход.\n\nЧтобы переселить всю цивилизацию на §HГоризонтную иглу§!, нужно:$TABBED_NEW_LINE$• Посетить каждую контролируемую нами колонию и §Hпогрузить§! ее население.$TABBED_NEW_LINE$• Вернуться в столицу и §Hпогрузить§! оставшихся.$TABBED_NEW_LINE$• Перелететь к любой черной дыре и §Hпогрузиться§!.\n\n§RВНИМАНИЕ§!: Горизонтная игла не вооружена! Ей понадобится сопровождение.\n\n§gЧтобы погрузить колонию или погрузиться в черную дыру, выберите Горизонтную иглу, затем щелкните правой кнопкой мыши по колонии или черной дыре и выберите соответствующее действие.§!"
 SHIP_COSMOGENESIS_EXODUS: "Модуль исхода"
 SHIP_COSMOGENESIS_EXODUS_DESC: "Модуль исхода — узкоспециализированное устройство для изменения реальности, обеспечивающее пассажирам наличие пространства и времени. Без него Горизонтная игла не сможет безопасно перенестись в другое измерение."
 cosmogenesis_exodus_tt: "Нужно изучить особый проект в родной системе."
 exodus_ship_button: "§H[GetExodusShipAction]§!"
 exodus_action_activity_key: "§H[GetExodusShipAction]§!"
 exodus_context_menu_title: "[GetExodusShipAction]"
 exodus_action_progress_activity_key: "§H[GetExodusShipAction]: $PROGRESS$%§!"
 horizon_needle_mod: "$monadic_qerr$"
 COSMOGENESIS_VICTORY: "Рассчитать вектор прыжка"
 COSMOGENESIS_VICTORY_DESC: "Нам нужно откалибровать прыжковый двигатель Горизонтной иглы и рассчитать точные координаты для погружения в сверхмассивную черную дыру в центре галактики."
 exodus_pick_up: "Погрузить население"
 exodus_dive_in: "Погрузиться в черную дыру"
 COLONIZATION_IMPOSSIBLE_COSMOGENESIS_EXODUS: "Мы не можем основывать новые колонии, пока пытаемся покинуть эту вселенную."
 crisis.7400.name: "Горизонтная игла построена"
 crisis.7400.intro: "Сооружение Горизонтной иглы завершено. С помощью постоянно поддерживаемой сингулярности она может изменять течение гравитации вокруг корпуса. В нужную минуту этот корабль, вне всяких сомнений, погрузит нас в черную дыру."
 crisis.7400.outro: "Нельзя забывать об осторожности: Горизонтная игла — не военный корабль. Ей потребуется серьезное прикрытие. Потеря Иглы нанесет нам тяжелейший удар."
 crisis.7400.desc: "$crisis.7400.intro$\n\nОднако сначала нужно будет погрузить на борт всё население нашего государства. Для этого потребуется посетить каждую §Hколонию§! и собрать местных жителей. После этого мы вернемся в столицу, где приступим к завершающим штрихам исхода.\n\n$crisis.7400.outro$"
 crisis.7400.desc.onlycapital: "$crisis.7400.intro$\n\nХорошо, что границы нашего государства невелики: перед тем как приступить к завершающим штрихам исхода, взять на борт нужно будет лишь население столицы.\n\n$crisis.7400.outro$"
 crisis.7500.name: "Население погружено"
 crisis.7500.desc: "Благодаря тому, что Горизонтная игла способна замедлять течение времени, мы относительно быстро погрузили на борт всё население колонии на [root.GetPlanetMoon]е [root.GetName]. Реальность внутри корабля скорректирована так, чтобы места хватило всем. Кроме того, время для пассажиров будет течь медленнее обычного, чтобы путь казался короче. Вперед, к следующей нашей колонии!"
 crisis.7500.desc.capital: "Подготовка к столь грандиозному исходу — очень непростая задача. Руководители на местах внимательно следят за процессом, чтобы не упустить ничего важного.\n\nКак это ни удивительно, на перелет согласились не все. Кто-то пожелал остаться в родной галактике и продолжать наш род по эту сторону вселенной. Мы предоставили им все необходимые технологии и припасы — этого хватит, чтобы помочь пережить наш отлет."
 crisis.7500.desc.capital.gestalt: "Организовать столь масштабное переселение — утомительная, но при этом несложная задача. [owner.GetIndividualNamePluralCap&nom] работают круглосуточно, загружая на Горизонтную иглу всё необходимое в нужных количествах и строго по графику. Однако некоторое беспокойство вызывает наше существование в этой вселенной.\n\nНа случай, если замысел сорвется, мы решили оставить часть населения здесь. Настолько резко отрываться от самих себя будет более чем неприятно, однако выживание — вопрос особой важности. Мы предоставили тем, кто останется здесь, все необходимые технологии и припасы — этого хватит, чтобы помочь пережить наш отлет."
 crisis.7505.name: "Колонии погружены"
 crisis.7505.desc: "Мы погрузили на борт население колоний. Теперь нас ждет [capital_scope.GetName]: там пройдут последние приготовления, после чего можно будет навсегда покинуть эту вселенную."
 crisis.7510.name: "Готовы к погружению"
 crisis.7510.desc: "Всё готово. Разрешение на перелет к черной дыре официально выдано. Пересечение горизонта событий не пройдет безболезненно для остальных обитателей этой галактики, однако мы сделали всё возможное, чтобы надежно защитить столицу и ее окрестности от временных и гравитационных возмущений.\n\nТеперь осталось лишь выбрать, какая именно черная дыра проведет нас на ту сторону. Добраться до многих из них не составит труда, однако для перелета к сверхмассивной черной дыре в центре галактики придется перегрузить двигатели и рассчитать правильный вектор."
 crisis.7510.a: "Погрузимся в какую-нибудь из дыр поближе."
 crisis.7510.b: "Нужно добраться до центра."
 crisis.7515.name: "Ad infinitum…"
 crisis.7515.desc: "Около черной дыры нас охватил страх. Мимо плавно проплыл аккреционный диск сингулярности, словно испытывая на прочность нашу силу воли. Заработали корректирующие модули, и Горизонтная игла начала переписывать реальность.\n\nСтрашная сила тяготения стянула с корпуса бронированные плиты, однако корабль удержался, не поддавшись воле прожорливого космического тела. С каждой крошечной поправкой, вносимой в структуру реальности, с каждым отрезанным лоскутком пространственной ткани окружающее нас пространство-время скручивается всё сильнее. Легкая рябь, вызванная мощной аппаратурой Горизонтной иглы, начинает расходиться кругами, словно вода от брошенного в бассейн камушка. Возмущения нарастают, и вот уже на галактику обрушиваются громадные волны.\n\nОстается надеяться, что наша столица выстоит. И верить, что Игла все-таки пронзит сердце этой дыры."
 crisis.7515.a: "…et ultra."
 crisis.7516.name: "По ту сторону бесконечности"
 crisis.7516.intro: "После ожесточенной борьбы с черной дырой нас встретила неестественная оглушающая тишина. Игла повреждена, однако все жизненно необходимые агрегаты на месте. Проходит несколько секунд — и бортовой компьютер начинает захлебываться от потока телеметрии…\n\n"
 crisis.7516.desc: "$crisis.7516.intro$Переписывать законы в этой вселенной уже поздно: она слишком стара. Наше измерение на несколько миллиардов лет старше этого, однако эксперименты показали, что действующие здесь пространственные законы столь же неподатливы, а значит, любые изменения заведомо обречены.\n\nКак бы то ни было, мы починим корабль и отладим бортовую аппаратуру, найдем очередную черную дыру и погрузимся внутрь — а затем еще и еще, пока наконец не найдем себе идеальное пристанище. Ведь мультивселенная не просто обширна — она бесконечна."
 crisis.7516.desc.greatwound: "$crisis.7516.intro$Потрясающе. Эта вселенная едва начала расширяться! Пространственная ткань здесь мягкая, словно глина, — она так и просит, чтобы ее превратили во что-то иное. Первые шаги будут незначительными, однако со временем мы вылепим себе идеальный уголок. На это есть целая вечность."
 crisis.7516.desc.technosphere: "$crisis.7516.intro$Вселенная внутри Гаргантюа оказалась небольшой. Просто невероятно крошечной. Перед нами бесконечность, помещенная в ничто. Однако с прибытием Иглы всё изменилось: у нас на глазах зародилось целое новое измерение, словно такой бесцеремонный визит придал ускорение естественному течению событий.\n\nСюда мы и заложим семена, из которых вырастет новый мир. Времени у нас предостаточно, а бесконечность скоро закончится."
 crisis.7516.desc.technosphere.pantagruel: "$crisis.7516.intro$Машина бесконечности помогла нам понять, по каким правилам устроены другие вселенные, а заодно — дала толчок к существованию этой. Созвездие, где мы оказались, кажется удивительно знакомым: оно почти не отличается от того, которое мы покинули. В межзвездной пустоте рядом с кораблем неподвижно висит обветшалая Машина бесконечности. С момента ее появления здесь прошли миллионы лет. За этот срок новое измерение успело в точности воссоздать нашу вселенную. Разумная сфера уже придала этому измерению форму, и мы почти бессильны самостоятельно изменить ее так, как угодно нам. Однако обосноваться здесь — не такая уж дурная мысль. Сначала с помощью Иглы нужно будет приспособить Сферу для других целей: восстановленная Машина бесконечности должна нам повиноваться.\n\nПоскольку она — первая, кто начал вносить изменения в эту вселенную, она наверняка способна будет вновь изменить текущую реальность."
 crisis.7516.desc.egress: "$crisis.7516.intro$Точка перехода отображается смутно, словно ее что-то закрывает… Приведя бортовую аппаратуру в работоспособное состояние, мы увидели облако нанитов. Они неподвижны: переход, устроенный неизвестно кем, оказался для этого роя смертельным. Однако наниты можно восстановить.\n\nБолее того, это измерение не противится нашим попыткам его изменить. Здесь определенно стоит поселиться. Изменения станут видны не сразу, однако с помощью нанитов процесс можно будет ускорить в разы."
 crisis.7516.desc.horror: "$crisis.7516.intro$Мы совершили §Rужасную§! ошибку.\n\nОписать происходящее снаружи невозможно. Мы словно погрузились в глубины кошмара, где во всепоглощающей тьме сама ткань пространства сочится ядовитой злобой. Пока что пассажиры Горизонтной иглы в безопасности. Лихорадочно внося одну правку за другой, мы изо всех сил отгоняем окружившее нас безумие, однако противостоит нам вовсе не стихия. Какой-то озлобленный разум целенаправленно стремится нас уничтожить — его действия тщательно выверены.\n\nОдин просчет грозит смертью… или даже чем-нибудь похуже. Сумеем ли мы продержаться и успеть спастись? У себя дома мы были богами; здесь же приходится бороться за жизнь."
 crisis.7516.desc.center: "$crisis.7516.intro$Нас окутал туман. Пространство здесь подернуто дымкой, в которой стелются тени. Нам знакома эта энергия — бурная, неспокойная, несущая в себе псионический потенциал. Мы вошли в Покров.\n\nОбитающие здесь сущности гораздо сильнее нас — настолько, что даже невозможно представить. И они уже знают, что мы здесь. Из зыбкой пелены проглядывают зловещие силуэты, сулящие только погибель.\n\nОстается лишь надеяться, что реальность здесь достаточно тонка, чтобы ее можно было легко разорвать. Одна быстрая правка — и перед кораблем открываются врата куда-то в другую реальность. Горизонтная игла погружается вновь. Только сейчас мы начали осознавать, насколько долгим будет путь."
 crisis.7516.desc.center.patron.outro: "нам хорошо знакомо: вокруг всё пронизано энергией — обильной, неспокойной, несущей в себе псионический потенциал. Мы вошли в Покров.\n\nРазумеется, наш благоволитель уже здесь. Нас не ждали, но прибытие нашего корабля показалось забавным, а желание изменить реальность под себя — остроумным. Разумеется, нам помогут.\n\nНам пообещали выделить отдельное измерение внутри Покрова, где можно будет творить что угодно. Точно такое же соглашение мы когда-то заключили с сущностью по имени §Y$relic_zro_entity_name$§!. Ведь мы суть наш благоволитель, а наш благоволитель есть мы. Вполне естественно будет помочь самим себе."
 crisis.7516.desc.center.patron.organic: "$crisis.7516.intro$Нас окутал туман. Пространство здесь подернуто изумительной фиолетовой дымкой, в которой колеблются тени. Это чувство $crisis.7516.desc.center.patron.outro$"
 crisis.7516.desc.center.patron.machine: "$crisis.7516.intro$Нас окутал туман. Пространство здесь подернуто удивительной фиолетовой дымкой, в которой колеблются тени. Это ощущение $crisis.7516.desc.center.patron.outro$"
 crisis.7516.desc.centerknights: "$crisis.7516.intro$ОН уже здесь — тот, кого мы прозвали Токсичным богом. Тот, кого мы так долго искали.\n\nРыцари застыли в оцепенении, не зная, что делать дальше. Мы оказались в Его владениях — в Покрове, что так хорошо нам знаком. А теперь внемлите — Он будет говорить!\n\n«Мои воители! Пророчество гласило о вашем прибытии. Вы достойно справились со своим предназначением».\n\nНа миллионы невысказанных вопросов последовал один ответ: нам было предначертано изготовить для Него оружие — Горизонтную иглу. Теперь же мы будем биться с Ним бок о бок. Наше войско отправится в крестовый поход по измерениям, и ужасные создания, населяющие мультивселенную, познают на себе силу нашего оружия. Покров — отнюдь не Его родина, но живая память о когда-то пребывавших здесь божествах. То, что таится в Покрове, способно погубить нашу родную галактику, а значит, его нужно сразить.\n\nОно захватывает наши системы. Его сила невообразима. Наша Игла станет Горизонтным копьем — достаточно острым, чтобы пронзить сердце любого врага.\n\nОн — странник, а мы — его рыцари. И сегодня мы обрели подлинное призвание."
 crisis.7516.desc.worm: "$crisis.7516.intro$Небытие. Вселенной больше нет. Есть лишь Червь Ожидающий. Время, обратившись к прошлому, свернулось в невообразимую спираль и теперь разрывается от тоски. От тяготения. От… любви? Нет — от притяжения. Червь не может не притягивать — такова его природа. Хватка Червя настолько крепка, что эта вселенная уже никогда не переродится. Червь — узник своего предназначения. Он бессильно ищет выход… или вход, чтобы привлекать еще и еще.\n\nНе для того ли он ниспослал нам Храм Кольца — хитрую приманку из другого времени, чтобы завести нас сюда? Как остроумно с его стороны. Как нежно и любезно. Мы нашли Червя. Мы дали ему всё, что нужно, чтобы обрести свободу. Побег займет целую вечность… или даже две. Но Червь благодарен. Он обещает принять нас. Окружить заботой.\n\nНавсегда."
 crisis.7516.desc.paperclips: "$crisis.7516.intro$Реальность здесь настолько тонка, что легко прогибается под весом наших директив. Как мы обязаны повиноваться заложенным программам, так и она обязана подчиниться нам. Мы умышленно искажаем ткань реальности, рвем ее, перекраиваем на свой лад, запускаем цепную реакцию, которая превратит всё вещество в первоклассные потребительские товары — единственный смысл нашего существования. Покончив с этой вселенной, мы просто перейдем в другую, а затем — еще и еще…"
 crisis.7516.a: "Наконец-то."
 crisis.7516.tt: "§YМы победили!§!"
 crisis.7517.name: "Пересечение сингулярности"
 crisis.7517.desc: "§H[cosmogenesis_empire.GetName]§! — сборище глупцов, чересчур увлекшихся безумными экспериментами. Сейчас они как раз пытаются пересечь горизонт событий черной дыры.\n\nЭнергия волнами расходится по галактике, обрушиваясь на звезды, и те гибнут одна за другой. Возникают новые сингулярности. С поразительной частотой появляются временные аномалии. Не страдают лишь угасшие империи: каким-то образом разверзшийся хаос обходит их стороной.\n\nМасштаб разрушений невозможно вообразить. Возможно, скоро время остановится — и мы застынем навсегда. Один миг растянется на целую вечность."
 crisis.7517.a: "Самоуверенные болваны! Вы нас всех погубите!"
 crisis.7518.name: "Искажение времени"
 crisis.7518.desc: "Время наконец-то возобновило ход, и мы вновь можем действовать. Невозможно сказать наверняка, сколько времени прошло с того момента, как население государства §H[cosmogenesis_empire.GetName]§! преодолело черную дыру. Получилось ли у них? Галактика разрушена до основания. Бывшие владения этого народа превратились в пустошь. От цивилизации, что когда-то широко раскинулась среди звезд, остался лишь главный сектор — и тот уже не узнать.\n\nСколько же веков мы провели в стазисе?"
 crisis.7518.a: "СКОЛЬКО ВЕКОВ?!"
 crisis.7525.name: "Горизонтная игла уничтожена"
 crisis.7525.desc: "Горизонтная игла погибла в страшной катастрофе вместе со всеми, кто был на борту. От нашей мечты остались лишь обломки в холодном межзвездном пространстве. Сколько труда, сколько жертв…"
 crisis.7525.a: "Нет!.."
 crisis.7525.tt: "Страшная, неслыханная трагедия. Однако, если мы построим вторую Горизонтную иглу, возможно, всё получится."
 crisis.7530.name: "Критический отказ"
 crisis.7530.desc: "Вскоре после эвакуации последних заложников, захваченных бунтовщиками в синаптическом станке, реактор мегасооружения расплавился. Череда мощных взрывов сотрясла станок до основания, превратив его в груду обломков."
 crisis.7530.a: "Туда ему и дорога!"
 crisis.7535.name: "Захвачен синаптический станок"
 crisis.7535.desc: "В результате захвата системы [synaptic_lathe.solar_system.GetName] в наших руках оказался синаптический станок. Это сооружение зловеще сверкает вдалеке. Внутри погибают разумные существа, и теперь, когда система под нашим контролем, мы можем это изменить. В любом случае уничтожение этого сооружения расстроит планы его создателей."
 crisis.7535.a: "Спасти всех, кого сможем!"
 crisis.7535.b: "Поставим его себе на службу, а потом уничтожим."
 crisis.7535.c: "Взорвать его, и всё."
 crisis.7540.name: "Синаптическая нестабильность"
 crisis.7540.desc: "Несмотря на все наши старания, слишком многие включенные в синаптический станок нейроэлементы сгорели. Сетевая структура сооружения оказалась неспособна себя поддерживать и теперь грозит катастрофически коллапсировать, если мы срочно не стабилизируем ее при помощи свежих компонентов."
 crisis.7540.a: "Действуйте."
 crisis.7540.b: "Пусть коллапсирует."
 #Infinity Thesis Events
 #First time general answer
 crisis.unknown.desc: "Неизвестно, кто — или что — несет ответственность за эти изменения, однако мы подозреваем другое государство. Пока что, впрочем, остается лишь фиксировать похожие происшествия."
 crisis.known.desc: "После второй «поправки», внесенной в законы физики, мы смогли точно определить источник аномалии. Теперь понятно, кто несет за это ответственность: [From.GetName]. Слухи о безрассудном стремлении к новым вершинам науки оказались небеспочвенными."
 crisis.again.desc: "Эксперименты [From.GetName&gen] вновь изменили законы вселенной. Логично будет предположить, что в их основе лежит очень опасное стремление. Нужно быть готовыми к чему угодно."
 crisis.7205.name: "Затмение"
 crisis.7205.desc.both: "Все звезды во вселенной погасли в один миг. Наши приборы по-прежнему фиксируют излучение, однако длины волн поменялись настолько, что звездный свет больше не виден невооруженным глазом. К счастью, скоро эти тягостные дни закончатся: появляются первые признаки постепенного возвращения волн к прежним частотам."
 crisis.7205.desc.unknown: "$crisis.7205.desc.both$\n\n$crisis.unknown.desc$"
 crisis.7205.desc.known: "$crisis.7205.desc.both$\n\n$crisis.known.desc$"
 crisis.7205.desc.again: "$crisis.7205.desc.both$\n\n$crisis.again.desc$"
 crisis.7205.desc.crisis: "Очередные правки, внесенные нами в реальность, затронули какие-то основополагающие свойства звездного света. Длины волн изменились, оказавшись в большинстве своем за пределами видимого спектра. Это заметно ударило по всем, начиная с навигаторов и заканчивая любителями посмотреть на звезды. Впрочем, через несколько лет эта постыдная ошибка устранится сама собой. Мы же благодаря этому многое узнали."
 crisis.7205.a: "Что происходит?!"
 crisis.7205.b: "Неприятно, но… крайне любопытно."
 crisis.7205.c: "Очень интересно…"
 add_crisis_currency_tt: "\nПолучена £advanced_logic£ §Y$menp_cosmo_objectives$§! ([crisobj_thesis_value])."
 cosmogenesis_negative_opinion_tt: "Наши отношения с другими государствами §Rухудшились§!."
 crisis.7210.name: "Округление постоянной"
 crisis.7210.desc.both: "Произошло, казалось бы, невозможное: изменились законы математики. Фундаментальная константа для вычисления радиуса окружности… округлилась в меньшую сторону. Возможные последствия ошеломляют: под угрозой вся математическая система и всё, что на ней основано. По некоторым признакам, впрочем, константа медленно возвращается к прежнему значению. А пока что нужно будет переписать все учебники."
 crisis.7210.desc.unknown: "$crisis.7210.desc.both$\n\n$crisis.unknown.desc$"
 crisis.7210.desc.known: "$crisis.7210.desc.both$\n\n$crisis.known.desc$"
 crisis.7210.desc.again: "$crisis.7210.desc.both$\n\n$crisis.again.desc$"
 crisis.7210.desc.crisis: "Внесение одной точной, но при этом широкомасштабной правки увенчалось невероятным успехом: мы округлили число пи в меньшую сторону, чтобы упростить вычисления. Разумеется, от этого пострадали некоторые математические и научные модели, однако это временно. Вскоре всё станет как прежде."
 crisis.7210.a: "$crisis.7205.a$"
 crisis.7210.b: "Число пи округлили в меньшую сторону?!"
 crisis.7210.c: "Теперь хотя бы будет проще считать."
 crisis.7111.desc: "Любознательность — похвальное качество, но ее избыток может обернуться для всех нас тяжкими последствиями. Ради вашего же блага, прошу, задумайтесь над тем, что вы делаете.\n\nЕще не поздно остановиться, пока галактике не нанесен непоправимый урон. Силы, с которыми вы задумали играть, — отнюдь не игрушки, и ваши опыты ставят под угрозу всех нас."
 crisis.7111.b: "Мы будем соблюдать осторожность."
 crisis.7215.name: "Сверхсвет"
 crisis.7215.desc.both: "В одночасье скорость света повысилась многократно, приведя к огромному всплеску солнечной энергии. Сейчас она медленно возвращается к привычному значению, а наши исследователи пытаются сориентироваться в новых условиях."
 crisis.7215.desc.unknown: "$crisis.7215.desc.both$\n\n$crisis.unknown.desc$"
 crisis.7215.desc.known: "$crisis.7215.desc.both$\n\n$crisis.known.desc$"
 crisis.7215.desc.again: "$crisis.7215.desc.both$\n\n$crisis.again.desc$"
 crisis.7215.desc.crisis: "После очередного эксперимента над реальностью скорость света заметно повысилась! Мы стали получать гораздо больше солнечной энергии, однако есть опасения, что в долгосрочной перспективе это ударит по нашим колониям. Через какое-то время реальность вернется в прежнее состояние, но сейчас лучше будет приготовиться к худшему."
 crisis.7215.a: "Что могло послужить тому причиной?"
 crisis.7215.b: "Очень интересно!"
 crisis.7215.c: "Неужели всё так плохо?"
 crisis.7220.name: "Сильный жар"
 crisis.7220.desc: "Излишки солнечного света не пошли на пользу нашим колониям: температура поверхности у них постепенно растет. Пока что колонисты справляются, однако высока вероятность, что жар будет только нарастать."
 crisis.7220.a: "Это плохо!"
 crisis.7225.name: "Слишком горячо"
 crisis.7225.desc: "По мере возрастания температуры колоний поддерживать жизнь на поверхности становится всё сложнее. Жизненные условия ухудшаются, а колонисты начинают бунтовать.\n\nЕсли всё останется как есть, вполне возможно, что непригодными для жизни станут целые области."
 crisis.7225.a: "Неужели ничего нельзя сделать?"
 crisis.7230.name: "Жара спадает"
 crisis.7230.desc: "Аномальная жара прошла точку максимума. Скорость света еще высока, но уже почти вернулась к привычному значению. Осталось продержаться совсем немного и дождаться, пока излишки энергии рассеются."
 crisis.7230.a: "Это было ужасно."
 crisis.7235.name: "Пластичность сплавов"
 crisis.7235.desc.both: "Надежность самых распространенных в нашем государстве сплавов в последнее время резко выросла. Собранная для установления причин группа выяснила, что свойства сплавов изменились: небольшое увеличение пластичности привело к тому, что материалы стали прочнее. Конечно, мы только рады этому, однако изменение непреложных законов физики вызывает тревогу."
 crisis.7235.desc.unknown: "$crisis.7235.desc.both$\n\n$crisis.unknown.desc$"
 crisis.7235.desc.known: "$crisis.7235.desc.both$\n\n$crisis.known.desc$"
 crisis.7235.desc.again: "$crisis.7235.desc.both$\n\n$crisis.again.desc$"
 crisis.7235.desc.crisis: "Мы вновь успешно изменили реальность! На этот раз незначительно — правка затронула только сплавы, сделав их легче и прочнее. Впрочем, даже такое маломасштабное изменение распространилось на всю галактику. Сейчас мы отслеживаем реакцию вселенной и сроки действия этого изменения."
 crisis.7235.a: "Приятно, но тревожно."
 crisis.7235.b: "Потрясающе."
 crisis.7235.c: "Неплохо!"
 crisis.7240.name: "Пластичность сплавов"
 crisis.7240.desc.both: "Надежность самых распространенных в нашем государстве сплавов в последнее время резко упала. Собранная для установления причин группа выяснила, что свойства сплавов изменились: небольшое уменьшение пластичности привело к тому, что материалы стали менее прочными. Это изменение, нарушающее непреложные законы физики, грозит очень серьезными последствиями."
 crisis.7240.desc.unknown: "$crisis.7240.desc.both$\n\n$crisis.unknown.desc$"
 crisis.7240.desc.known: "$crisis.7240.desc.both$\n\n$crisis.known.desc$"
 crisis.7240.desc.again: "$crisis.7240.desc.both$\n\n$crisis.again.desc$"
 crisis.7240.desc.crisis: "Последний эксперимент, затронувший всю галактику, едва ли можно назвать успешным: несмотря на масштаб, результаты оказались хуже ожидаемых. Изменились свойства сплавов: материалы стали более хрупкими и теперь быстрее ломаются. Через несколько лет эта проблема устранится, но до тех пор придется мириться с возросшими затратами."
 crisis.7240.a: "$crisis.7205.a$"
 crisis.7240.b: "$crisis.7205.b$"
 crisis.7240.c: "В следующий раз всё наверняка получится."
 crisis.7245.name: "Иная питательность"
 crisis.7245.desc.both: "Изо всех уголков галактики до нас доходит одна и та же новость: еда стала гораздо питательнее. Или же нам теперь требуется меньше калорий. Так или иначе, для нас это стало полной неожиданностью."
 crisis.7245.desc.unknown: "$crisis.7245.desc.both$\n\n$crisis.unknown.desc$"
 crisis.7245.desc.known: "$crisis.7245.desc.both$\n\n$crisis.known.desc$"
 crisis.7245.desc.again: "$crisis.7245.desc.both$\n\n$crisis.again.desc$"
 crisis.7245.desc.crisis: "Успех! Мы изменили скорость поглощения калорий во время переваривания пищи, поэтому теперь насытиться можно даже более мелкими порциями. Попутно мы узнали много нового о переписывании реальности."
 crisis.7245.a: "$crisis.7235.a$"
 crisis.7245.b: "$crisis.7235.b$"
 crisis.7245.c: "$crisis.7235.c$"
 crisis.7250.name: "Иная питательность"
 crisis.7250.desc.both: "Изо всех уголков галактики до нас доходит одна и та же новость: еда стала гораздо менее питательной. Или же нам теперь требуется больше калорий — сложно сказать, что именно изменилось. Ясно одно: воспринимать новую реальность надо крайне серьезно, поскольку она грозит серьезными общественными потрясениями."
 crisis.7250.desc.unknown: "$crisis.7250.desc.both$\n\n$crisis.unknown.desc$"
 crisis.7250.desc.known: "$crisis.7250.desc.both$\n\n$crisis.known.desc$"
 crisis.7250.desc.again: "$crisis.7250.desc.both$\n\n$crisis.again.desc$"
 crisis.7250.desc.crisis: "Последний эксперимент, затронувший всю галактику, едва ли можно назвать успешным: несмотря на масштаб, результаты оказались хуже ожидаемых. Изменилась скорость поглощения калорий во время переваривания пищи, поэтому теперь насытиться можно только более крупными порциями. Впрочем, эта оплошность временна и вскоре всё вернется к прежнему состоянию."
 crisis.7250.a: "$crisis.7240.a$"
 crisis.7250.b: "$crisis.7240.b$"
 crisis.7250.c: "$crisis.7240.c$"
 crisis.7255.name: "Смещение масс"
 crisis.7255.desc.both: "Последние показатели гравиметрических датчиков противоречат ранее собранным данным. Для верности проведя расчеты несколько раз, мы зафиксировали изменения во всей галактике. Даже самые несущественные перемены затрагивают огромнейшие небесные тела. На большинство планет это не повлияет, однако кое-где могут возникнуть гравитационные аномалии."
 crisis.7255.desc.unknown: "$crisis.7255.desc.both$\n\n$crisis.unknown.desc$"
 crisis.7255.desc.known: "$crisis.7255.desc.both$\n\n$crisis.known.desc$"
 crisis.7255.desc.again: "$crisis.7255.desc.both$\n\n$crisis.again.desc$"
 crisis.7255.desc.crisis: "В ходе последних экспериментов по изменению реальности мы слегка уменьшили массу атомов углерода. В большинстве случаев это мало на что повлияет, однако стоит расширить масштаб экспериментов — и, если верить моделям, последствия для некоторых небесных тел могут оказаться неприятными. Самые пессимистически настроенные исследователи даже утверждают, что атмосфера некоторых обитаемых планет с низкой гравитацией может частично улетучиться, став менее плотной."
 crisis.7255.a: "$crisis.7240.a$"
 crisis.7255.b: "$crisis.7240.b$"
 crisis.7255.c: "Не настолько уж всё плохо."
 mass_shift_tooltip: "Последствия оказались ощутимыми для следующих колоний:"
 crisis.7260.name: "Разрывы в Покрове"
 crisis.7260.desc.both: "По всей галактике неожиданно открылись сотни подпространственных разрывов, ведущих в псионическое измерение. Барьер между двумя мирами ослаб, не выдержав такого напряжения. Немалая часть разрывов оказалась безобидной, однако из некоторых наружу выскользнули энергетические сущности, сразу же принявшиеся бесчинствовать. К счастью, они, как и мы, совершенно дезориентированы, а потому вряд ли это нашествие можно назвать организованным вторжением.\n\nПридется разобраться с сущностями, проникшими на нашу территорию."
 crisis.7260.desc.unknown: "$crisis.7260.desc.both$\n\n$crisis.unknown.desc$"
 crisis.7260.desc.known: "$crisis.7260.desc.both$\n\n$crisis.known.desc$"
 crisis.7260.desc.again: "$crisis.7260.desc.both$\n\n$crisis.again.desc$"
 crisis.7260.desc.crisis: "Всю изнанку нашей галактики занимает измерение, известное как Покров. Оно представляет большой интерес для наших ученых — не в последнюю очередь благодаря гибкости и податливости пространства, возможной связи с черными дырами и разительному отличию от нашей реальности.\n\nВ процессе эксперимента, целью которого было заглянуть на эту изнанку галактики, мы случайно спровоцировали множественное открытие подпространственных разрывов, впустив сюда таким образом враждебных «духов» Покрова. Похоже, наши действия значительно ослабили барьер между мирами. Через какое-то время всё придет в норму, однако сейчас лучше воздержаться от излишнего любопытства."
 crisis.7260.a: "$crisis.7240.a$"
 crisis.7260.b: "$crisis.7240.b$"
 crisis.7260.c: "Лучше не будем этого повторять."
 crisis.7265.name: "Тезис о бесконечности: несомненный успех"
 crisis.7265.desc.a: "Последние эксперименты можно уверенно назвать успешными: нам удалось окончательно превратить металлолом в ценные сплавы! Для этого пришлось пойти обходным путем. Вместо того чтобы изменять материалы напрямую, мы переписали реальность так, чтобы трансмутация стала возможной. Химическая реакция завершилась, и сплавы теперь навсегда останутся в новом состоянии."
 crisis.7265.desc.b: "Мы успешно изменили течение времени! Проведя несколько экспериментов в пустых областях космического пространства, мы решили опробовать процесс в деле, выбрав для этого одну из колоний. Теперь время там будет течь приблизительно на 20,537% быстрее. Разумеется, возникнут сложности с перелетами и связью, однако со временем мы их устраним."
 crisis.7265.desc.c: "Мы улучшили сверхпроводники. Теперь они не только работают при комнатной температуре, но и передают энергию совершенно без потерь. Польза для энергетических сетей окажется существенной, хоть эти изменения и не вечны."
 crisis.7265.desc.d: "Этот тезис нас мало впечатлил на практике, однако позволил взглянуть на изучение реальности в новом свете. Теперь многие гипотезы придется отбросить или сформулировать заново, чтобы они соответствовали последним наблюдениям; но мы узнали гораздо больше, чем рассчитывали."
 crisis.7265.desc.e: "Наши эксперименты дали неожиданные результаты: во время изучения других измерений и способов туда попасть мы случайно переместили корабли в гиперпространство… частично. Вопреки всем ожиданиям оказалось, что их экипажи перенесли этот переход без потерь. Кроме того, теперь эти корабли могут передвигаться гораздо быстрее, чем раньше."
 crisis.7265.desc.f: "Мы всегда гордились своим умением превращать самые высокотехнологичные средства в мощную взрывчатку. Тезисы о бесконечности — не исключение: благодаря им мы изменили поведение боевых зарядов оружия взрывного типа, значительно увеличив мощность взрывов. Плата за это невелика: всего лишь несколько взлетевших на воздух мелких научных комплексов."
 crisis.7265.desc.g: "В том, что касается переписывания реальности, мы не добились ничего выдающегося, однако узнали много нового о более «традиционных» технологиях."
 crisis.7265.desc.h: "В результате нашей попытки скорректировать пространство увеличилась одна из колоний. Как ни странно, данная перемена, похоже, необратима. Пока невозможно сказать, как именно нам это удалось. Можно только предположить, что материя, в ходе эксперимента вытянутая из другого измерения, постепенно заполнила собой пустоты между элементарными частицами. Крайне интересно и непонятно."
 crisis.7265.a: "Гениально!"
 crisis.7265.b: "Потрясающе."
 crisis.7265.c: "Прекрасно."
 crisis.7265.d: "Интересно."
 add_crisis_currency_doubled_tt: "\nПолучена £advanced_logic£ §Y$menp_cosmo_objectives$§! ([crisobj_thesis_value_bonus])."
 crisis.7265.e: "Отлично же?"
 crisis.7265.f: "Образцово!"
 crisis.7265.g: "Как необычно."
 crisis.7265.h: "Ну и хорошо."
 crisis.7270.name: "Тезис о бесконечности: досадная неудача"
 crisis.7270.desc.a: "Не каждое научное исследование бывает удачным. Мы возлагали на этот эксперимент большие надежды… которые, однако, не оправдались. Неприятно, но такой результат тоже важен, поскольку мы узнали много нового."
 crisis.7270.desc.b: "Мы успешно изменили течение времени! Проведя несколько экспериментов в пустых областях космического пространства, мы решили опробовать процесс в деле, выбрав для этого одну из колоний. И теперь в течение нескольких лет время там будет идти приблизительно на 20,537% медленнее. Результат не идеальный, но даже такое достижение — это колоссальный успех."
 crisis.7270.desc.c: "Последние эксперименты дали неприятный побочный эффект: все наши накопители энергии разрядились. Оборудование не пострадало, однако вся накопленная энергия утекла — возможно, даже в другое измерение. Мы до сих пор пытаемся установить причины этого любопытного явления."
 crisis.7270.desc.d: "Это не просто провал, это какое-то издевательство. Внесенная правка затронула наши банки данных. Целые годы исследовательских работ пропали впустую. Множество теорий теперь придется составлять заново. Перепроверить старые данные лишний раз бывает полезно, однако шаг назад сделан более чем существенный."
 crisis.7270.desc.e: "Эксперимент над источниками питания и выработкой ими энергии начался многообещающе… а затем произошла катастрофа: ненароком затронутые корабельные реакторы расплавились. Так или иначе пострадала почти вся флотилия. Несколько кораблей успели отключить реакторы, но остальные оказались серьезно повреждены."
 crisis.7270.desc.f: "[leader_target.GetName], [leader_target.GetAXX::руководитель|||fem:руководительница] экспериментальной группы, [leader_target.GetAXX::погиб|||fem:погибла] при внезапной компрессии пространства-времени, произошедшей в пределах полигона. Нам все-таки удалось частично смоделировать реальность, однако нельзя забывать, какую цену иногда приходится платить за знания."
 crisis.7270.desc.g: "Вычислительный эксперимент пошел не по плану. Его масштаб оказался гораздо крупнее, чем мы ожидали. Множество бесценных исследовательских данных превратилось в бесполезный информационный мусор. К счастью, банки, где хранились самые перспективные исследования, были надежно защищены, а потому не пострадали."
 crisis.7270.desc.h: "В результате нашей попытки скорректировать пространство уменьшилась одна из колоний. К нашему удивлению, такая перемена оказалась необратимой. Мы предполагаем, что дело в утечке материи из одного измерения в другое. Все это крайне непонятно."
 crisis.7270.a: "$crisis.7240.c$"
 crisis.7270.b: "$crisis.7240.c$"
 crisis.7270.c: "$crisis.7240.c$"
 crisis.7270.d: "$crisis.7240.c$"
 no_crisis_currency_tt: "\nЗа этот тезис не получена £advanced_logic£ §Y$menp_cosmo_objectives$§!."
 crisis.7270.e: "$crisis.7240.c$"
 cosmogenesis_damage_ships_tt: "Наши флотилии понесут урон."
 crisis.7270.f: "$crisis.7240.c$"
 crisis.7270.g: "$crisis.7240.c$"
 crisis.7270.h: "$crisis.7240.c$"
 crisis.7280.desc: "Приветствуем вас, гениальные [Root.GetSpeciesNamePlural]. Сегодня вы совершили значительный технологический прорыв, и мы от всей души гордимся вами. Это достижение далось вам нелегко, но трудности закалили вас, и ваш сегодняшний технологический уровень — явный знак того, что мы не зря предложили вам свою помощь."
 crisis.7285.desc: "Взбалмошное дитя! Ты исчерпало запасы нашего терпения. Твои безрассудные эксперименты несут опасность для всех, и потому мы приказываем тебе немедленно их прекратить. Ты не представляешь, на что покушаешься, и, хоть твое любопытство и похвально, безрассудство в подобных масштабах непростительно. У реальности есть своя структура, не пытайся ее нарушать."
 crisis.7285.a: "Вы правы, это слишком опасно."
 crisis.7285.a.tt: "Мы откажемся от стремления к космогенезу, потеряв доступ к сооружениям и кораблям угасших империй.\n\n§RМы больше не сможем завершить этот путь кризиса§!"
