 #Counters
 the_synth_queen_chain_title: "Сетана: королева синтетиков"
 the_synth_queen_chain_desc: "Недавно к нам явилась загадочная и могучая Сетана: она сулит нам спасение, но о самой ней ничего не известно.\nКакие замыслы таятся за ее сладкими речами?\n\n§LОсобые проекты и события, имеющие отношение к Сетане, будут давать нам наблюдения, необходимые для накопления прогресса.§!"
 the_synth_queen_chain_insights: "Наблюдения"
 the_synth_queen_war_chain_title: "Сетана: сопротивление"
 the_synth_queen_war_chain_desc: "Наконец-то нам стали понятны истинные намерения Сетаны. В своем чудовищном стремлении положить конец физическим страданиям она планирует «загрузить» сознания всех разумных существ в виртуальное пространство и истребить жизнь как таковую. Нам нужно накопить силы и сорвать ее безумный замысел."
 synth_queen_base_1: "§YАктивные базы эмиссаров§!"
 synth_queen_fleet_1: "§YАктивные гвардейские флотилии королевы§!"
