 cosmogenesis_level_5_req_tooltip_2: "£trigger_no£ Исследовано не менее 2 §Yприкладных тезисов о бесконечности§!"
 tech_cosmogenesis_world: "Масштабируемые резервуарные вычисления"
 tech_cosmogenesis_world_desc: "$menp_cosmo_features_1_desc$"
 TECH_UNLOCK_COSMOWORLD_CONSTRUCTION_TITLE: "§HМегасооружение:§! синаптический станок"
 TECH_UNLOCK_COSMOWORLD_CONSTRUCTION_DESC: "§HСинаптический станок§!\n$menp_cosmo_features_1_desc$"
 tech_cosmogenesis_thesis: "Прикладной тезис о бесконечности"
 tech_cosmogenesis_thesis_desc: "Вновь изменив законы устройства реальности, мы сможем лучше отслеживать ее реакцию. Однако при таком масштабе последствия не только малопредсказуемы, но и могут затронуть всю галактику."
 cosmogenesis_thesis_tech_title: "Попробовать нарушить §Hправила реальности§!"
 cosmogenesis_thesis_tech_desc: "Результаты этих опасных экспериментов непредсказуемы."
