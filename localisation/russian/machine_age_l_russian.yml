 job_haruspex_plural: "Гаруспики"
 job_haruspex_desc: "Воцерковленные механики и хирурги, чью руку направляет Божья воля. Под их инструментами [Owner.Species.GetFleshTypeCyberCreed] отделяется от тела, уступая место священным имплантатам.\n\n$job_needs_cybrog_traits$"
