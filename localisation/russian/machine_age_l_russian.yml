 synth_queen_shared_research: "Королевские исследования"
 synth_queen_shared_research_desc: "Мы согласились открыть Сетане доступ в наши базы данных, временно замедлив ради этого наши собственные исследования."
 synth_queen_much_shared_research: "Перегрузка баз данных"
 synth_queen_much_shared_research_desc: "Мы согласились дать Сетане неограниченный доступ к нашим базам данных ценой почти полной остановки наших собственных исследований."
 synth_queen_war_preparations: "Война на горизонте"
 synth_queen_war_preparations_desc: "Теперь, когда мы раскрыли тайные операции Сетаны, мы должны со всей поспешностью укреплять вооруженные силы."
 synth_queen_advanced_war_preparations: "Борьба за выживание"
 synth_queen_advanced_war_preparations_desc: "Мы должны любой ценой помешать замыслам Сетаны уничтожить сознание."
 synth_queen_nanite_apprentice: "Ученик Сетаны"
 synth_queen_nanite_apprentice_desc: "Сетана заинтересовалась нами, узнав, что мы также изучаем нанотехнологии. Неважно, решим мы доверять ей или нет, ее наставления могут принести нам пользу."
