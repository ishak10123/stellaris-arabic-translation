 #Traits
 trait_pathogenic_genes: "Дефективные гены"
 trait_pathogenic_genes_desc: "Новая генетическая болезнь не позволяет этой расе производить потомство. Она не поддается никаким известным методам генной терапии."
 PATHOGENIC_GENES_FORCE_DECLINE: "§RЭта раса в упадке§!, так как у нее §Y$trait_pathogenic_genes$§!"
