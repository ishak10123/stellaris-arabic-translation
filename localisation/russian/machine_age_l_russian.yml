 civic_individual_machine_predictive_analysis: "$civic_machine_predictive_analysis$"
 civic_individual_machine_predictive_analysis_desc: "Это общество преуспело в применении предсказательной аналитики в исследовательской методологии. Оно занимается лишь самыми многообещающими направлениями."
 councilor_individual_machine_predictive_analysis: "Ведущий аналитик-методолог"
 councilor_individual_machine_predictive_analysis_desc: "$councilor_individual_machine_predictive_analysis$ возглавляет группу, изучающую исследовательские методологии, чтобы мы могли заниматься лишь самыми многообещающими направлениями."
 civic_individual_machine_warbots: "$civic_machine_warbots$"
 civic_individual_machine_warbots_desc: "Это общество постоянно готовится к войне. Его армия, экономика и система образования служат одной цели: разработке новых стратегий и адаптации к различным условиям. Каждая машина вносит вклад в общую силу."
 councilor_individual_machine_warbots: "Военный логист"
 councilor_individual_machine_warbots_desc: "$councilor_individual_machine_warbots$ занимается планированием цепочек поставок, чтобы мы могли беспрепятственно вести боевые операции в любом уголке галактики."
 civic_individual_machine_replication: "$civic_machine_replication$"
 civic_individual_machine_replication_desc: "Это общество завладело средствами самовоспроизведения. Одна машина порождает другую, составляя цепь, которая опоясывает всю планету."
 councilor_individual_machine_replication: "Координатор репликации"
 councilor_individual_machine_replication_desc: "$TITLE$ следит за соблюдением техники безопасности при сборке."
