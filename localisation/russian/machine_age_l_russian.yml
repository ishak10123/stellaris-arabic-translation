 d_hab_consumer_goods_2: "Источник товаров массового спроса"
 d_hab_consumer_goods_2_desc: "Этот обитаемый комплекс построен рядом с источником товаров массового спроса, пригодным для эксплуатации."
 situation_paperclips: "Накопление товаров"
 situation_paperclips_type: "Накопление товаров"
 situation_paperclips_monthly_change_tooltip: "Производственная цель установлена. Модули активированы. Задача выполняется."
 situation_paperclips_desc: "Наша первостепенная директива и задача — максимизация выработки продукции. Поставленные нормы должны выполняться неукоснительно.\nДата поставки: §Y[owner.situation_paperclips_timer]§!\nДействующий производственный план: §Y[Owner.paperclips_once_again]§!\nТекущие запасы: §Y[Owner.paperclips_current_amount]§!\n[Owner.GetPaperclipStatus]"
 situation_fulfill_drive: "Выполнение"
 situation_fulfill_overdrive: "Перевыполнение"
 situation_paperclip_stage_1: "Оставшиеся месяцы"
 situation_paperclips_outcome: "Если мы выполним квоту, то сможем превратить произведенные $r_consumer_goods$ в другие ресурсы.\n\n[Owner.GetPaperclipStatus]"
 situation_paperclips_progress: "Этот подход уменьшит время до определения следующей нормы выработки."
