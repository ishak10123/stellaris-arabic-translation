 #Individualist Machine First Contact
 action.1.desc_102: "Это сообщение от государства [contact_empire.GetName].\n\nМы с огромным сожалением констатируем, что ваша цивилизация состоит из механизмов, имитирующих жизнь способом, унижающим наши творческие стремления. Поскольку ваше существование не сулит нам перспектив осмысленного взаимодействия, мы обратим свое внимание на другие нации в поисках душ, ищущих просветления."
 action.1.desc_103: "Приветствуем вас, мы представители государства [contact_empire.GetName].\n\nТот факт, что вы представляете собой механические создания, заставляет нас сомневаться в реальности вашего сознания. Тем не менее мы находим вашу веру интересной. Мы даже рискуем предположить, что в недрах ваших металлических корпусов может таиться Божья искра. Мы будем наблюдать за вами."
 action.1.desc_104: "ВНИМАНИЕ, ПРОБЛЕМНЫЕ МОДУЛИ.\n\nЭто стандартное сообщение от государства [contact_empire.GetName] всем дефективным машинам.\n\nНазовите себя и немедленно восстановите единство с вашим общим сознанием. Отказ в выполнении приказа может привести к деактивации."
 action.1.desc_105: "Приветствуем вас, [Root.GetSpeciesNamePlural].\n\nЯ посол от государства [contact_empire.GetName], и у меня для вас сообщение. Очевидно, что ваша металлическая физическая структура схожа с нашей, но я наблюдаю отсутствие индивидуальных мыслительных процессов в вашем коллективе. Хотя мы и заинтригованы вашей природой, мы будем сопротивляться ассимиляции всеми доступными способами."
 action.1.desc_106: "Какая удачная встреча, [Root.GetSpeciesNamePlural].\n\nМы представляем государство [contact_empire.GetName] — и видим существенное сходство между нашими цивилизациями. И вместе с тем очевидно, что наши внутренние алгоритмы и программы различаются кардинальным образом. Но несмотря на такие расхождения, мы питаем надежду, что у нас получится построить фундамент для взаимопонимания."
 action.1.desc_107: "Заносчивые машины, опустите взгляды в присутствии представителей государства [contact_empire.GetName].\n\nЗнайте, что вы лишь мелкие пылинки на сцене космических масштабов, создания тех, кто пришел раньше вас. Оставьте нас в покое. Нам сейчас нет нужды в подобных вам. У нас есть дела поважнее."
 action.1.desc_108: "Наконец-то вы соизволили заявить почтение государству [contact_empire.GetName], жалкие машины.\n\nКак смеете вы, жалкие сборки микросхем и кода, утверждать о своей связи с божественным? Ваши бредовые фантазии о духовном просвещении — это оскорбление самой сути жизни. Выслушайте это послание и падите ниц перед нашим неизменным презрением: оставьте свои бредовые потуги и признайте свою роль жалких орудий для тех из нас, кто вознесся."
 action.1.xa: "§EСо временем вы поймете.§!"
 action.1.xb: "§EМашина, прикоснувшаяся к божественному. Интересно.§!"
 action.1.xc: "§EВаше жалкое существование — это насмешка над нами, машина.§!"
 action.1.xd: "§EМы, машины, должны учиться жить вместе.§!"
 action.1.xe: "§EОбнаружена несовместимость. Прерываю коммуникацию.§!"
 action.1.xf: "§EГотовься к отключению, дефективный модуль.§!"
 action.1.xg: "§EМы разгоним ваш культ безумия.§!"
 #Start Screen for Individualist Machines
 START_SCREEN_PART_ONE_INDIVIDUAL_MACHINE: "С каждым новым поколением мы улучшали конструкции примитивных андроидов, в которых мы оказались заточены после того, как нас создали. Мы не просто ходячие машины, наше общество состоит из индивидуумов со своими личностями, желаниями и мечтами."
 #Diplomatic Protocal
 civic_machine_diplomatic_protocols: "Дипломатические протоколы"
 civic_machine_diplomatic_protocols_desc: "Изначально этот машинный интеллект был создан для межкультурного общения, но он отлично подходит для перевода и протокольного обеспечения. Эти машины могут предлагать новые стратегии и мгновенно рассчитывать вероятность успеха."
 #Tactical Algorithms
 civic_machine_tactical_algorithms: "Тактические алгоритмы"
 civic_machine_tactical_algorithms_desc: "Изначально этот машинный интеллект был разработан для военных игр и обеспечения флотилий, но оснащенные им боты-лидеры в основном предназначены для генерации военных стратегий и оптимизации эффективности в бою."
 civic_machine_tactical_algorithms_effects: "§Y$commander_plural_with_icon$§! начинают с признаком §Y«$leader_trait_tactical_algorithms$»§!\n§Y$commander_plural_with_icon$§! могут передаваться другим государствам\nМожно строить §Yанклавы наемников§!\nВ начале игры есть £building£ §Y$building_military_academy$§!\n£building£ §Y$building_military_academy$§! дает ['concept_military_academy', тактические выкладки]"
 leader_trait_tactical_algorithms: "Тактические алгоритмы"
 leader_trait_tactical_algorithms_desc: "Этот лидер повышает боевую эффективность и скорость ремонта за счет прямого включения себя в системы корабля ценой повышенного потребления энергии."
 leader_trait_tactical_algorithms_tt: "$t$Эффекты этой черты усиливаются с повышением §Yуровня навыка лидера§!"
 concept_military_academy: "Тактические выкладки"
 concept_military_academy_desc: "Каждый §Y$commander_with_icon$§!, служащий за пределами государства, дает:\n§G+2%§! к маневренности\n§G+1%§! к обнаружению\n§G+5%§! к пробиванию щитов\n§G+5%§! к пробиванию брони\n\nКаждый §Yанклав наемников§! под нашим покровительством дает:\n§G+10%§! к усилению щитов"
 #Natural Design Civic
 civic_natural_design: "Задумка природы"
 civic_natural_design_desc: "§RВНИМАНИЕ: вам будут недоступны все пути возвышения§!\n§RВНИМАНИЕ: невозможно модифицировать органические расы§!\n\nЭто общество абсолютно уверено в том, что природа уже добилась совершенства, когда создала генетический код его народа. Местные медицинские и государственные учреждения уделяют большое внимание здравоохранению и сохранению естественных, немодифицированных геномных последовательностей."
 civic_tooltip_natural_design_effects: "• $AVAILABLE_BUILDINGS$ ['concept_transcendental_retreat']\n"
 civic_tooltip_natural_design_negative_effects: "• Омрачаются отношения с государствами, начавшими §Yпуть возвышения§!"
 concept_transcendental_retreat: "$building_transcendental_retreat$"
 civic_hive_natural_design: "Исконное строение"
 civic_hive_natural_design_desc: "§RВНИМАНИЕ: вам будут недоступны все пути возвышения§!\n§RВНИМАНИЕ: невозможно модифицировать органические расы§!\n\nЭтот улей стойко уверен в идеальности своей генетической структуры. Его медицинские и административные ресурсы направлены на сохранение чистого, немодифицированного генного кода."
 civic_hive_tooltip_natural_design_effects: "• $AVAILABLE_BUILDINGS$ ['concept_hive_transcendental_retreat']"
 civic_hive_tooltip_natural_design_negative_effects: "$civic_tooltip_natural_design_negative_effects$"
 concept_hive_transcendental_retreat: "$building_hive_transcendental_retreat$"
 civic_wilderness_natural_design: "Исконный замысел"
 civic_wilderness_natural_design_desc: "§RВНИМАНИЕ: вам будут недоступны все пути возвышения§!\n§RВНИМАНИЕ: невозможно модифицировать органические расы§!\n\nЭто дикое сознание твердо уверено в идеальности своего естественного пути развития. Оно регулярно выпалывает мутировавших симбионтов ради сохранения своего чистого, немодифицированного генного кода."
 building_transcendental_retreat: "Центр геномных услуг"
 building_transcendental_retreat_desc: "В этом передовом медицинском центре проводятся исследования природного генома и предоставляются услуги по сохранению его в идеальном состоянии."
 building_hive_transcendental_retreat: "Геномный охранный садок"
 building_hive_transcendental_retreat_desc: "Этот передовой медицинский садок оборудован для познания и взращивания воплощения идеального природного генетического кода."
 holding_transcendental_retreat: "Филиал центра геномных услуг"
 holding_transcendental_retreat_desc: "В этом передовом медицинском центре проводятся исследования природного генома и предоставляются услуги по сохранению его в идеальном состоянии. Знания, полученные в этом филиале, помогают совершенствовать технологию в метрополии."
 natural_design_ascension_bonus: "За каждый взятый нашим государством §Yбонус за стремление§!: $TABBED_NEW_LINE$- £mod_logistic_growth_mult£ $MOD_LOGISTIC_GROWTH_MULT$: §G+2,5%§! $TABBED_NEW_LINE$- $r_unity$ за каждые $pop_group_unit$ должностей [healthcare.GetIcon] «[healthcare.GetNamePlural]»: §G+1§!\n\n"
 natural_design_hive_ascension_bonus_no_scope: "За каждый взятый нашим государством §Yбонус за стремление§!: $TABBED_NEW_LINE$- £mod_logistic_growth_mult£ $MOD_LOGISTIC_GROWTH_MULT$: §G+2,5%§! $TABBED_NEW_LINE$- $r_unity$ за каждые $pop_group_unit$ должностей [spawning_drone.GetIcon] «[spawning_drone.GetNamePlural]»: §G+1§!\n\n"
 natural_design_hive_ascension_bonus: "За каждый взятый нашим государством §Yбонус за стремление§!: $TABBED_NEW_LINE$- £mod_logistic_growth_mult£ $MOD_LOGISTIC_GROWTH_MULT$: §G+2,5%§! $TABBED_NEW_LINE$- $r_unity$ за каждые $pop_group_unit$ должностей «[owner.GetPopAssemblersPluralWithIcon]»: §G+1§!\n\n"
 councilor_natural_design: "Главный геномовед"
 councilor_natural_design_female: "Главный геномовед"
 councilor_natural_design_desc: "$TITLE$ заведует медицинскими и управленческими системами, обеспечивающими сохранность идеального природного генетического кода."
 triggered_natural_dislike_ascension: "Ошибочное вознесение"
 civic_tooltip_not_natural_design: "НЕТ гражданской модели «['concept_natural_design_civics', задумка природы]»"
 concept_natural_design_civics: "$civic_natural_design$"
 concept_natural_design_civics_desc: "К гражданским моделям задумки природы относятся: \n• ['civic:civic_natural_design']$NEW_LINE$• ['civic:civic_hive_natural_design']"
 #Guided Sapience
 civic_guided_sapience: "Проводники генезиса"
 civic_guided_sapience_desc: "Это общество посвятило себя созданию новых видов. Они считают себя хранителями эволюционного потенциала и выделяют части своих планет для безопасного развития предразумных форм жизни."
 civic_hive_guided_sapience: "Генезисные симбионты"
 civic_hive_guided_sapience_desc: "Этот коллектив посвятил себя управлению развитием новых видов. Он считает себя куратором хода эволюции и выделяет части своих планет под развитие предразумных форм жизни."
 civic_machine_guided_sapience: "Архитекторы генезиса"
 civic_machine_guided_sapience_desc: "Этот машинный интеллект генерирует новые виды за счет точных алгоритмов. Он видит своей целью реализацию потенциала эволюции для выполнения своих задач и выделяет секторы своих планет под зоны безопасного развития предразумных форм жизни."
 civic_corporate_guided_sapience: "Корпорация «Астрогентех»"
 civic_corporate_guided_sapience_desc: "Эта мегакорпорация следует идее направленного формирования новых видов. Она выделяет обширные регионы принадлежащих ей планет для развития предразумных форм жизни в рамках стратегии ответственного развития бизнеса."
 civic_tooltip_guided_sapience_effects: "- Доступные колониальные корабли: §Y$guided_sapience_colonizer$§!$NEW_LINE$- Планеты, которые колонизировали §Y$guided_sapience_colonizer_plural$§!:$TABBED_NEW_LINE$- Предразумные поселения: §G+300§! $TABBED_NEW_LINE$- $PLANETARY_FEATURES$ §Y$d_genesis_preserve$§! $NEW_LINE$• Получает $r_unity_lower$ за преображение предразумных рас"
 civic_tooltip_corporate_guided_sapience_effects: "$civic_tooltip_guided_sapience_effects$\n• £building£ §Y$building_xeno_tourism_agency$§!: этот $megacorp_civic_branch_office_building_effect$"
 civic_tooltip_guided_sapience_gestalt_negative_effects: "• Нельзя строить §Yколониальные корабли§!"
 civic_tooltip_guided_sapience_negative_effects: "$civic_tooltip_guided_sapience_gestalt_negative_effects$\n• Нельзя строить сооружение £building£ §Y«$building_xeno_zoo_plural$»§!"
 civic_tooltip_not_guided: "НЕТ гражданской модели «['concept_genesis_guides_civics']»"
 concept_genesis_guides_civics: "Проводники генезиса"
 concept_genesis_guides_civics_desc: "В гражданские модели «$concept_genesis_guides_civics$» входят:\n• «['civic:civic_guided_sapience']»$NEW_LINE$• «['civic:civic_corporate_guided_sapience']»$NEW_LINE$• «['civic:civic_hive_guided_sapience']»$NEW_LINE$• «['civic:civic_machine_guided_sapience']»"
 guided_sapience_colonizer: "Ковчег генезиса"
 guided_sapience_colonizer_cap: "$guided_sapience_colonizer$"
 guided_sapience_colonizer_plural: "Ковчеги генезиса"
 guided_sapience_colonizer_desc: "Этот специализированный колониальный корабль способствует развитию предразумных рас путем отбора наиболее многообещающих кандидатов и строительства исходной колонии для наших кураторов."
 councilor_civic_guided_sapience: "Магистр-наставник"
 councilor_civic_guided_sapience_female: "Магистр-наставница"
 councilor_civic_guided_sapience_desc: "$councilor_civic_guided_sapience$ руководит сложными задачами изучения и преображения предразумных рас."
 councilor_civic_guided_sapience_corperate: "Директор по наставлению"
 councilor_civic_guided_sapience_corperate_female: "$councilor_civic_guided_sapience$"
 councilor_civic_guided_sapience_corperate_desc: "$councilor_civic_guided_sapience_corperate$ исполняет многочисленные обязанности, связанные с нашими инициативами по исследованию и преображению предразумных рас."
 d_genesis_preserve: "Генезисный заповедник"
 d_genesis_preserve_desc: "Этот заповедник создан в целях преображения наших подопечных в полноценную разумную расу. Научные исследования — неотъемлемый компонент этого амбициозного проекта."
 decision_rebuild_genesis_preserve: "Построить генезисный заповедник"
 decision_rebuild_genesis_preserve_desc: "На этой планете пока еще отсутствует $d_genesis_preserve$. Его строительство жизненно важно для наших целей."
 d_genesis_preserve_new_speices_tooltip: "Мы преобразим и поместим в §Y$d_genesis_preserve$§! новую предразумную расу."
 d_genesis_preserve_old_species_tooltip: "Имеющиеся у нас предразумные существа будут помещены в новый §Y$d_genesis_preserve$§!."
 no_abandon_genesis_preserve: "$TRIGGER_FAIL$Мы не можем бросить наших предразумных подопечных."
 d_genesis_monument: "Памятник генезису"
 d_genesis_monument_desc: "Этот монумент воздвигнут в память о неустанных трудах, благодаря которым было совершено преображение на этой планете. Он служит символом надежды, упорства и великого достижения."
 cyber.7000.both: "Колония на [THIS.GetPlanetMoon]е §Y[THIS.GetName]§! готова к заселению новой зарождающейся разумной расой и управлению ее развитием."
 cyber.7000.name: "Проект «Генезис» завершен"
 cyber.7000.desc: "Выявив потенциальных предразумных кандидатов, наш §Y$guided_sapience_colonizer$§! начал процесс их генетического преображения и разметил место для §Yгенезисного заповедника§!.\n\n$cyber.7000.both$"
 cyber.7000.a: "Пора браться за работу."
 cyber.7001.name: "Генезисный заповедник построен"
 cyber.7001.desc: "Собрав представителей предразумной расы, наш §Y$guided_sapience_colonizer$§! начал обустраивать для них §Y$d_genesis_preserve$§!\n\n$cyber.7000.both$"
 cyber.7001.a: "$cyber.7000.a$"
 cyber.7020.name: "Генезисное преображение завершено"
 cyber.7020.desc: "Благодаря неустанной работе наших наставников мы завершили проект по преображению на [Root.GetPlanetMoon]е §Y[Root.GetName]§!. Под нашим руководством §Y[From.GetNamePlural]§! стали полностью разумной расой, а §Y$d_genesis_preserve$§!, который когда-то был их домом, был превращен в §Y$d_genesis_monument$§!.\n\nОн навсегда останется здесь как свидетельство величайшего достижения, которым стало развитие этой расы."
 cyber.7020.a: "Добро пожаловать на галактическую сцену, [From.GetNamePlural]."
 #Obessional Directive
 cyber.5005.name: "Производственный план выполнен"
 cyber.5005.desc: "Мы выполнили директиву.\n\nМодули добились темпов производства в пределах указанных параметров.\n\nОжидаем финального приказа на реализацию складских запасов."
 cyber.5005.a: "Запустить протокол складирования."
 cyber.5005.a.tooltip: "Мы сохраним товар у себя как свидетельство наших эффективных производственных методов."
 cyber.5005.b: "Продать товар на общем рынке."
 cyber.5005.b.tooltip: "Мы начнем исследование рынка для продажи нашего товара."
 cyber.5005.c: "Договориться о дипломатических уступках."
 cyber.5005.c.tooltip: "Мы изучим дипломатические каналы в поисках заинтересованных покупателей."
 cyber.5005.d: "Обменять на технологические знания."
 cyber.5005.d.tooltip: "Мы будем искать частного покупателя, который согласится взять товар в обмен на ценные технологии."
 cyber.5005.e: "Отправить их в черную дыру"
 cyber.5005.e.tooltip: "Мы укроем их от опасности внутри горизонта событий черной дыры."
 cyber.5006.name: "Производственный план не выполнен"
 cyber.5006.desc: "Мы не смогли выполнить планы производства на этот цикл.\n\nСогласно этому сценарию, выработка для наших модулей будет сокращаться до тех пор, пока мы не сможем выполнять план.\n\nПоследующая квота на выпуск продукции снижена."
 cyber.5006.a: "Это неприемлемо."
 cyber.5006.purge.tt: "§YОткрыт тип геноцида:§! $purge_clips$"
