 #CYBERNETIC CREED ORIGIN
 ##########################
 origin_cybernetic_creed: "Кибернетический культ"
 origin_cybernetic_creed_desc: "§RВНИМАНИЕ: вам будут недоступны все пути возвышения, кроме ['concept_cybernetic_ascension', кибернетического].§!\n\nЭто общество следует божественному призванию, стремясь к слиянию пречистого тела со священной механикой. Имплантат — новый бог."
 origin_tooltip_cybernetic_creed_effects: "- $HOMEWORLD$ начальные сооружения заменяются на ['concept_cybernetic_creed_infrastructure', инфраструктуру культа]$NEW_LINE$- Вскоре после начала игры формируются конфессии ['concept_cybernetic_creed', кибернетического культа]\n- $SPECIES_TRAITS$ ['concept_cybernetic_creed_traits']\n- $GUARANTEED_RESEARCH_OPTION_STRING$ ['concept_integrated_cybernetics', £engineering£ $tech_integrated_cybernetics$]\n- Должности ['concept_cybernetic_creed_jobs', священников кибернетического культа]"
 START_SCREEN_CYBERNETIC_CREED: "Нас ведет сакральное стремление: [Owner.Species.GetFleshTypeCyberCreed] и машины должны слиться воедино. История нашего народа знает немало неудачных экспериментов, но сегодня Божья воля указывает нам путь. Разработав ритуальные имплантаты, мы сделали первый шаг на пути к священному симбиозу.\n\nОднако подлинный потенциал кибернетики еще только предстоит познать. Эти имплантаты — ничто по сравнению с тем, что ждет нас в дальнейшем.\n\nИ все же в наших рядах еще нет согласия. Представители разных конфессий спорят друг с другом, какой должна стать вершина нашего развития. Как только мы найдем ответ на этот вопрос, новый священный союз — [Owner.Species.GetFleshTypeCyberCreed] и технологии — поможет нам избавиться от эволюционных ограничений.\n\n$machine_age.1090.pray$"
 concept_cybernetic_creed_traits: "$trait_cyborg_ritualistic_implants$"
