 trait_robot_history_warbot: "Военная машина"
 trait_robot_history_warbot_desc: "Эти машины разработаны для ведения боевых действий и поддержания порядка. Они оснащены прочной броней и надежными дублирующими системами, а также отличаются невероятной реакцией."
 trait_robot_history_artbot: "Робоняня"
 trait_robot_history_artbot_desc: "Эти машины изначально выполняли роль домашней прислуги. Им присущи высокая точность движений, умение эффективно распоряжаться ресурсами и невероятная многозадачность."
 trait_robot_history_explorebot: "Роботворец"
 trait_robot_history_explorebot_desc: "Эти машины не занимаются ничем практичным — вместо этого они покоряют творческие и культурные вершины, в чем им помогают творческие алгоритмы, сложное внутреннее устройство и заложенная на программном уровне выразительность."
 trait_robot_history_researchbot: "Робоассистент"
 trait_robot_history_researchbot_desc: "Эти машины предназначались для помощи в научной деятельности. Они отличаются мощными аналитическими способностями, быстрым усвоением информации и постоянным стремлением к новым открытиям."
 trait_robot_history_resourcebot: "Роборабочий"
 trait_robot_history_resourcebot_desc: "Эти машины спроектированы для добычи полезных ископаемых. Они оснащены всем необходимым: специальными инструментами, укрепленными шарнирами и модульными системами."
 trait_robot_history_chatbot: "ИИ-собеседник"
 trait_robot_history_chatbot_desc: "Эти машины спроектированы для эмоциональной поддержки хозяев. Благодаря передовым эмпатическим алгоритмам и безупречным навыкам общения они всегда могут выслушать и дать совет."
 individual_machine_assault_1: "Армия боевых андроидов"
 individual_machine_assault_1_desc: "Эти андроиды спроектированы специально для ведения боевых действий. Новейшая броня и высокотехнологичные оптические датчики значительно упрощают завоевание планет."
 individual_machine_assault_1_plural: "Армии боевых андроидов"
 individual_machine_assault_2: "Армия передовых боевых андроидов"
