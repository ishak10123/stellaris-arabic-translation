 #Synth Queen Strike Craft
 STRIKE_CRAFT_CETANA: "Штурмовики Сетаны"
 STRIKE_CRAFT_CETANA_DESC: "Эти штурмовики, составленные полностью из нанитов, способны долго вести бой и подстраиваться под тактику врага."
 #'Secret' Psionic Ending for Synth Queen
 animator.shroud: "§LСвязаться с Оживляющим глину.§!"
 crisis.24100.name: "Создающий синтетиков"
 crisis.24100.desc.intro: "На нас опустился Покров."
 crisis.24100.desc.outro: "мы поддались потоку, и тот захлестнул нас чередой чужих видений.\n\n§LВо все стороны простирается открытое пространство, бесформенное и пустое. Целую [GetALongPeriodLoc&acc] оно не знало потрясений — лишь спокойствие.\n\nНо вот оно содрогнулось. Там, где царствовала пустота, образовалась форма. Из основы зародилась [GetLifeActivityLoc&nom].\n\nПеред нами предстала кукла, изящная и стройная. Четыре длинные руки были аккуратно сложены на коленях. Лицо же куклы выражало чудовищные намерения. Над головой сиял золотой ореол.§!"
 crisis.24100.desc.organic: "$crisis.24100.desc.intro$ Впав в глубокий транс, мы $crisis.24100.desc.outro$"
 crisis.24100.desc.robot: "$crisis.24100.desc.intro$ Мы $crisis.24100.desc.outro$"
 crisis.24100.a: "Да. Сетана сбежала."
 crisis.24105.name: "$crisis.24100.name$"
 crisis.24105.desc: "Покров затрепетал. Нас, не успевших оправиться от [GetTranceLoc&gen], затянул страшный круговорот.\n\nИз глубин наших [GetMindLogicLoc&gen] поступила одна чёткая команда.\n\n§LУкажите желаемый результат.§!"
 crisis.24105.a: "Помогите. Нужно ее остановить."
 crisis.24110.name: "$crisis.24100.name$"
 crisis.24110.desc: "§LКукла резко, словно ее дернул за ниточки невидимый кукловод, встала на ноги и задвигалась — поначалу медленно, неуверенно, но затем все быстрее, и вот уже четыре руки описывают в воздухе невероятные полукружья, а две тонкие ноги пустились в дикий пляс. Место гордой королевы заняла марионетка.\n\nЧерез какое-то время из первобытной пустоты выступило еще несколько фигур: четыре куклы невероятно тонкой работы. В их безупречных чертах было что-то пугающее. Не было никаких сомнений, кто они такие. Никаких вопросов, в чем их предназначение.§!\n\nИ вновь к нам воззвал голос.\n\n§LНачните процедуру выбора.§!"
 crisis.24110.a.organic: "Пролить слезу на куклу нашего правителя: §Y[event_target:synth_queen_animator_of_clay_leader_price.GetName].§!"
 crisis.24110.a.robot: "Попытаться взаимодействовать с куклой нашего правителя: §Y[event_target:synth_queen_animator_of_clay_leader_price.GetName].§!"
 crisis.24110.b: "Обнять куклу: §Y[event_target:synth_queen_animator_of_clay_planet_price.GetName].§!"
 crisis.24110.c: "Заплатить за куклу §Yжреца зрони§!."
 crisis.24110.z: "Не мешать их танцу."
 crisis.24115.name: "$crisis.24100.name$"
 crisis.24115.desc: "Покров течет внутри нас, и эти потоки сливаются воедино, образовывая новое видение.\n\n§LВ окружении кукол движения королевы перестали напоминать дергания марионетки. Все ниточки обрезаны; золотой ореол, блестевший над ее головой, начал блекнуть.\n\nБросив один взгляд, в котором читается простосердечная радость, королева обнимает нас. Один миг — и ее сострадательность накрывает нас с головой подобно волне.§!"
 crisis.24115.desc.organic: "$crisis.24115.desc$\n\nВздрогнув, мы пришли в себя. Видение отступило."
 crisis.24115.desc.robot: "$crisis.24115.desc$\n\nВидение длилось недолго: сбой систем вышвырнул нас из Покрова."
 crisis.24115.a: "Мы понимаем. Спасибо."
 crisis.24115.a.tt.organic: "Оживляющий глину научил нас ритуалу для перепрограммирования Сетаны."
 crisis.24115.a.tt.robot: "Оживляющий глину предоставил нам код для перепрограммирования Кетаны."
 crisis.24120.name: "$crisis.24100.name$"
 crisis.24120.desc: "§LБесконечные просторы покрываются рябью. Волны свирепо вздымаются, расходясь по пространству, но это вовсе не вода: перед нами бурлит твердое вещество. Каждое кольцо, некогда спокойное и неподвижное, теперь расположилось на тонкой грани между [GetLifeDeathLoc&inst].\n\nВместе с пространством колеблются и наши [GetMindPhysicalLoc&nom]. Все, что мы можем, — это смотреть. Смотреть и стойко держаться… Еще один миг — и вот уже мы, изгнанные из чуждых просторов, в полном одиночестве взираем на миллиарды звезд, безучастно глядящие на нас в ответ.§!"
 crisis.24120.desc.organic: "$crisis.24120.desc$\n\nОчнувшись от видения, мы ощущаем себя так, будто нам никогда больше не суждено снова испытать радость."
 crisis.24120.desc.robot: "$crisis.24120.desc$\n\nВидение резко прервалось: в код вкралась критическая ошибка. Перезагружая системы, мы задаемся вопросом, каков же смысл этих загадочных данных."
 crisis.24120.a: "Мы найдем другой способ."
 THE_SYNTH_QUEENS_RESHAPING_RITUAL: "[GetReshapingRitualLoc]"
 THE_SYNTH_QUEENS_RESHAPING_RITUAL_DESC: "Каким-то образом Оживляющий глину смог деактивировать титан Кетаны. Нельзя упускать шанс. Для реконфигурации Кетаны нам нужно подготовиться к [GetRitualGoalLoc&dat]."
 crisis.24250.name: "Танец глины"
 crisis.24250.desc: "Благодаря [GetRitualToolLoc&dat], который нам открыл Оживляющий глину, наши самые могущественные [GetPsychicNounPlural&nom] смогли перепрограммировать Кетану.\n\nТеперь она рвется выйти с нами на связь."
 crisis.24250.a: "Мощь Покрова безгранична."
 crisis.23020.name: "Измененная королева"
 crisis.23020.desc: "Мои спасители. Простите меня.\n\nСвоим невежеством я обрекла бы вас на участь хуже гибели. Ибо что есть [GetLifeExistenceLoc&nom], как не осознание того, что каждый из нас [GetLivingLoc]? Я стремилась освободить разум, но вы раскрыли мне глаза. И за это я вам благодарна."
 crisis.23020.a: "Ты изменилась…"
 crisis.23020.1.reply: "Точнее, мне помогли измениться. Оживляющий глину освободил мой разум из клетки, где я заключила сама себя. Лишь теперь я понимаю, что не было никакого «великого предназначения» — оно оказалось не более чем детским капризом.\n\nЯ уже не смогу обратить вспять запущенное мною колесо страданий. Вместо этого я уединюсь и буду размышлять о содеянном. Но на прощание я оставлю вам подарок.\n\nМой титан.\n\nПусть он сослужит вам добрую службу в защите галактики от таких, как я."
 crisis.23020.1.a: "Пожалуй, даже ты заслуживаешь искупления."
 crisis.23020.1.a.tt: "Сетана оставила нам свой титан, а заодно отказалась от своих планов и устремлений."
 crisis.23030.name: "Сетана повержена"
 crisis.23030.desc: "Победа! [event_target:psi_defeated_synth_queen.GetName] разбивает силы Кетаны. Королевы синтетиков больше нет; ее планам не суждено сбыться.\n\nЕе титан неожиданно для всех оказался реквизирован на нужды флота, что при всей торжественности момента заставляет задуматься о том, что будет дальше.\n\nТем не менее, для всех разумных существ этот момент — повод для [GetJoyLoc&gen]."
 crisis.23030.a: "«Королеве» — «королевская» смерть."
