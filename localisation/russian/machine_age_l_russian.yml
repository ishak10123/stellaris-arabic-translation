 #Cybernetic Special Traits
 trait_cyborg_creed_of_construction: "Имплантаты Братства"
 trait_cyborg_creed_of_construction_desc: "С помощью божественных имплантатов Братство Молота создает все, что только может понадобиться верующим."
 trait_cyborg_creed_of_war: "Имплантаты Храмовников"
 trait_cyborg_creed_of_war_desc: "Благодаря божественным имплантатам Храмовников Стали наши священные воители неудержимы в бою."
 trait_cyborg_creed_of_research: "Имплантаты Хора"
 trait_cyborg_creed_of_research_desc: "Благодаря частичной взаимосвязи сознаний участники Хора Разума могут мгновенно обмениваться мыслями."
 trait_cyborg_creed_of_labor: "Имплантаты Коммуны"
 trait_cyborg_creed_of_labor_desc: "Божественные имплантаты Коммуны Труда во всех отношениях превосходят привычные инструменты."
 trait_cyborg_ritualistic_implants: "Ритуальные имплантаты"
 trait_cyborg_ritualistic_implants_desc: "Верующие с гордостью носят в себе эти имплантаты. Их преданность Божьей воле — пример для нас всех."
