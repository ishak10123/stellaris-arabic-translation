 synth_queen_alloy_shipments: "Налог королеве"
 synth_queen_alloy_shipments_desc: "В знак поддержки стремлений Сетаны мы делимся с ней частью производимых нами сплавов."
 synth_queen_large_alloy_shipments: "Чистосердечные дары"
