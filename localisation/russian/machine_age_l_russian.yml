 synth_queen_victims_1: "§RКорабли, уничтоженные гвардией королевы§!"
 synth_queen_planets_1: "§RОцифрованные миры§!"
 #Galcom Resolutions
 resolution_galactic_focus_crisis_synth_queen: "Приоритет: Сетана"
 resolution_galactic_focus_crisis_synth_queen_desc: "Сетана несет угрозу всей жизни в галактике. Если мы не объединимся, чтобы остановить ее, она уничтожит нас всех. Мы должны сделать борьбу с этим кризисом приоритетом галактики."
