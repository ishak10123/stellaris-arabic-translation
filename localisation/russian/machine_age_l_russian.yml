 purge_cosmogenesis_tooltip_delayed: "§LВинтик в механизме.§!"
 cosmogenesis_world_0: "$pc_cosmogenesis_world$"
 cosmogenesis_world_0_DESC: "Компьютер невероятно огромных размеров, производящий очки исследований и продвинутую логику за счет мозговой деятельности разумных существ. Чем больше поселений подключено, тем эффективнее работа компьютера, однако все его «процессоры» рано или поздно перестают выдерживать нагрузку и умирают."
 cosmogenesis_world_0_MEGASTRUCTURE_DETAILS: "Вычислительное сооружение, постепенно уничтожающее поселения в обмен на §Yисследования§! и §Yпродвинутую логику§!."
