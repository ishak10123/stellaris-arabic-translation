 #CYBORG
 trait_cyborg_stainless_steel_smile: "Разукрашенные аугментации"
 trait_cyborg_stainless_steel_smile_desc: "Этот вид предпочитает красивые оформления, бросающиеся в глаза вторичные компоненты и яркие цвета. Иногда нет ничего лучше, чем блеснуть железом."
 trait_cyborg_welded_countenance: "Практичные аугментации"
 trait_cyborg_welded_countenance_desc: "Эти киборги снабжены грубоватыми, но надежными деталями без лишних украшений. Улучшения нужны для работы, а не для красоты."
 trait_cyborg_apathy_loops: "Раздражающие имплантаты"
 trait_cyborg_apathy_loops_desc: "Имплантаты этих киборгов грубо сделаны и плохо прилажены. Они постоянно раздражают кожу изнутри и то и дело отказываются работать. Тело может это вытерпеть, но ум страдает."
 trait_cyborg_bionic_engineers: "Инженеры-бионики"
 trait_cyborg_bionic_engineers_desc: "Выполнять самые сложные инженерные работы помогают искусно сделанные инструменты и имплантаты."
 trait_cyborg_bionic_physicists: "Физики-бионики"
 trait_cyborg_bionic_physicists_desc: "Встроенные инструменты для мультимодальной обработки позволяют производить физические вычисления на ходу, не подключаясь для этого ко внешним вычислительным блокам."
 trait_cyborg_bionic_sociologists: "Социологи-бионики"
 trait_cyborg_bionic_sociologists_desc: "Стимуляторы эмпатии и эвристические алгоритмы поведения значительно ускоряют социологические исследования: массивы данных обрабатываются будто вторым мозгом."
 trait_cyborg_integrated_weaponry: "Встроенное вооружение"
 trait_cyborg_integrated_weaponry_desc: "Благодаря встроенному в кибернетические конечности оружию служители правопорядка и военные всегда могут открыть огонь."
 trait_cyborg_delicate_frames: "Хрупкие носители"
 trait_cyborg_delicate_frames_desc: "Из-за посредственных компонентов и скверного монтажа каждый корпус получается хрупким. Базовые функции от этого не страдают, однако пользователям рекомендуется избегать серьезных рисков."
 trait_cyborg_scarcity_algorithms: "Алгоритмы дефицита"
 trait_cyborg_scarcity_algorithms_desc: "Тщательно анализирующий затраты код препятствует принятию рискованных решений, тем самым ограничивая выгоду владельца."
 trait_cyborg_limited_memory: "Ограниченная память"
 trait_cyborg_limited_memory_desc: "Ограниченный объем оперативной памяти сдерживает образовательный потенциал, из-за чего пользователь неспособен целиком анализировать пережитое."
 trait_cyborg_climate_adjustment_dry: "Модификации для сухого климата"
 trait_cyborg_climate_adjustment_dry_desc: "Уникальные модификации вроде механизмов для переработки жидкостей и защиты от радиации незаменимы при сухом климате, однако хуже подходят к другим условиям."
 trait_cyborg_climate_adjustment_dry_tt: "Приспособленность к сухому климату: §G+$@cyborg_hab_preference|0%$§!\n$t$- Приспособленность к мирам с сухим климатом может достигать §G125%§!, $TABBED_HIGH_HABITABILITY_EFFECTS_TT$"
 trait_cyborg_climate_adjustment_wet: "Модификации для влажного климата"
 trait_cyborg_climate_adjustment_wet_desc: "Плотная изоляция и защита от чуждых форм жизни полезны при влажном климате, однако будут лишь мешать в других условиях."
 trait_cyborg_climate_adjustment_wet_tt: "Приспособленность к влажному климату: §G+$@cyborg_hab_preference|0%$§!\n$t$- Приспособленность к мирам с влажным климатом может достигать §G125%§!, $TABBED_HIGH_HABITABILITY_EFFECTS_TT$"
 trait_cyborg_climate_adjustment_cold: "Модификации для холодного климата"
 trait_cyborg_climate_adjustment_cold_desc: "Системы усиленного обогрева и незамерзающая смазка помогают при холодном климате, однако станут лишь помехой в других условиях."
 trait_cyborg_climate_adjustment_cold_tt: "Приспособленность к холодному климату: §G+$@cyborg_hab_preference|0%$§!\n$t$- Приспособленность к мирам с холодным климатом может достигать §G125%§!, $TABBED_HIGH_HABITABILITY_EFFECTS_TT$"
 trait_cyborg_mass_produced: "Модернизированные импланты"
 trait_cyborg_mass_produced_desc: "Обеспечение обратной совместимости обязательных имплантатов значительно снижает затраты на оснащение новорожденных граждан."
 trait_cyborg_propaganda_machines: "Контур лояльности"
 trait_cyborg_propaganda_machines_desc: "Кортикальные анализаторы способны немедленно подавлять пользователей при появлении запрещенных мыслей и создавать гормональное вознаграждение для прилежных граждан."
 #MACHINE
 trait_robot_artificial_engineers: "Инженерные ячейки"
 trait_robot_artificial_engineers_desc: "Выделенные ячейки памяти и отдельные вычислительные мощности позволяют быстрее производить инженерные вычисления, ускоряя выполнение задач."
 trait_robot_artificial_physicists: "Физические ячейки"
 trait_robot_artificial_physicists_desc: "Индивидуальные обрабатывающие блоки и подпрограммы для памяти уменьшают зависимость от внешних компьютеров для решения физических задач."
 trait_robot_artificial_sociologists: "Социологические ячейки"
 trait_robot_artificial_sociologists_desc: "Современные обрабатывающие блоки содержат алгоритмы для решения различных сложных социологических задач."
 trait_robot_integrated_weaponry: "Встроенное вооружение"
 trait_robot_integrated_weaponry_desc: "Внедрение боевого оружия в конструкцию механических тел значительно повышает боеспособность в любых боевых условиях."
 trait_robot_delicate_frames: "Хрупкие платформы"
 trait_robot_delicate_frames_desc: "Ненадежные материалы и недостаточно эффективные технологии сборки приводят к хрупкости механических корпусов. Носителям рекомендуется по возможности избегать рисков для тел."
 trait_robot_scarcity_algorithms: "Подпрограммы дефицита"
 trait_robot_scarcity_algorithms_desc: "Во все программы внедрена главная директива: экономность. Выполнение этой директивы часто приводит к возникновению экономически невыгодных моделей поведения."
 #Pre-Scripted Empires
 EMPIRE_DESIGN_BASIDRIX_CYBER_ECCLESIA: "Басидрикская Киберцерковь&!fem|||gen:Басидрикской Киберцеркви&!fem|||dat:Басидрикской Киберцеркви&!fem|||acc:Басидрикскую Киберцерковь&!fem|||inst:Басидрикской Киберцерковью&!fem|||prep:Басидрикской Киберцеркви&!fem"
 EMPIRE_DESIGN_basidrix_cyber_ecclesia_desc: "На священных просторах космоса раскинулась Басидрикская Киберцерковь — живое свидетельство силы истинной веры. Служители Церкви, ведомые божественным мандатом, неукоснительно блюдут святость союза живых волокон и холодного железа.\n\nПуть этот когда-то был полон трудностей и лишений. Вселенная знает множество религиозных течений, канувших ныне в безвестность. Их объединяло лишь одно: полная, непоколебимая уверенность в том, что лишь им известна истина. Из искры этой веры не могло не разгореться пламя. Страницы истории Церкви написаны сталью и кровью, но из горнила этой борьбы вышел стойкий, решительный народ.\n\nСегодня Церковь дотянулась до бескрайнего звездного неба. Что принесут следующие годы? Сулят ли они нам испытание веры или же спасение души? Верующим, делающим первые робкие шаги в неизвестность, понятно только одно.\n\nСлияние — Божья воля. Аугментация — наше служение."
