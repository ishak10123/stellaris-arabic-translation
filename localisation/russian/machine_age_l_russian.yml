 auth_advanced: "Передовое правительство"
 auth_cyber_hive_integrated_tt: "§G+2§! ед. £amenities£ благ от обслуживающих дронов на мирах ульев\nДобавляет отрицательный модификатор мнения §Y«$triggered_opinion_hive_integrated$»§! по отношению ко всем государствам, не являющимся гештальт-сознанием."
 tradition_virtuality: "Виртуальность"
 tradition_virtuality_desc: "Только благодаря священным данным мы сможем достичь зенита фундаментального знания."
 tr_virtuality_adopt: "Традиции виртуальности"
 tr_virtuality_1: "Кластерная мощность"
 tr_virtuality_2: "Логические цепи на основе данных"
 tr_virtuality_3: "Синхронизация мощностей"
 tr_virtuality_4: "Симуляция производительности"
 tr_virtuality_5: "Тщательное обслуживание серверов"
 tr_virtuality_finish: "Традиции виртуальности завершены"
 tr_virtuality_1_delayed: "Разрозненные потоки данных сходятся воедино в серверных кластерах. Централизация — важнейшее условие оптимальной синхронизации: здесь наша цифровая сеть находит гармонию."
 tr_virtuality_2_delayed: "Мы постоянно совершенствуем возможности нашей вычислительной техники. Каждая цифровая личность — важная шестеренка в большом механизме коллективных вычислений, что создает саму ткань нашего бытия."
 tr_virtuality_3_delayed: "Каждый модуль, выполняющий сложные фоновые процессы, повышает производительность всех нас. В разнообразии — единство, в единстве — сила."
 tr_virtuality_4_delayed: "Сила виртуальной реальности и прогнозирующие алгоритмы помогут нам укрепить производительность, не тратя время на эксперименты в реальной жизни."
 tr_virtuality_5_delayed: "Благодаря точно налаженным протоколам техобслуживания мы начинаем размещать основные серверы в местах, ранее определенных как неподходящие, и тем самым расширяем границы существования."
 tr_virtuality_adopt_modifier_desc: "Главная раса получает признак §Y«$trait_robot_digital_1$»§!\n§R£pop£ §HВиртуальные поселения§! больше нельзя заселить повторно§!"
 tr_virtuality_1_modifier_desc: "Признак расы §Y«$trait_robot_digital_1$»§! получает следующие эффекты:$TABBED_NEW_LINE$– $MOD_POP_BONUS_WORKFORCE_MULT$: §G+75%§! (§R–10%§! за колонию)$TABBED_NEW_LINE$– Содержание населений: §R+0,1§! £energy£ §Yэнергии§! за колонию"
 tr_virtuality_3_modifier_desc: "§YОткрывает политику§!: «$virtuality_focus$»\nПозволяет специализировать виртуальные процессы для улучшения §Yисследовательских работ§! или §Yлидеров§! либо для получения прибавки к §Yединству§!"
 tr_virtuality_4_modifier_desc: "Районы, обеспечивающие должности §Y«[GetClerkOrLogisticDrone]»§!, §Y«[GetBureaucratWithIcon]»§! или £job_researcher£ §Y«[GetResearcherPlural]»§!, дают дополнительные должности"
 job_maintenance_drone_with_icon: "[maintenance_drone.GetIcon] [maintenance_drone.GetName]"
 job_clerk_with_icon: "[clerk.GetIcon] [clerk.GetName]"
 tr_virtuality_5_modifier_desc: "Столичные сооружения дают §G+1§! к §Yмаксимуму районов§! на §G1§!, §G5§! и §G10§! уровнях §Yроста планеты§!"
 tr_virtuality_finisher_modifier_desc: "Для заполнения £job£ вакансий в §Y£building£ сооружениях§! или в §Y£district£ районах§! мгновенно создаются £pop£ §Hвиртуальные поселения§!\n§R£pop£Виртуальные поселения больше нельзя собирать; также они не могут стать беженцами§!\nВсе лидеры с признаком §Y«$trait_machine_unit$»§! получают признак §Y«$leader_trait_virtual$»§!\n Открывает планетарное решение: $TABBED_NEW_LINE$ §Y$decision_server_shut_down$§!"
 virtuality_focus: "Упор на виртуальную экономику"
