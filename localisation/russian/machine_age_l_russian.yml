 cosmogenesis_altered_nutrition_desc: "Внесенная в реальность поправка сделала пищу более питательной."
 cosmogenesis_altered_nutrition_bad: "$cosmogenesis_altered_nutrition$"
 cosmogenesis_altered_nutrition_bad_desc: "Внесенная в реальность поправка сделала пищу менее питательной."
 cosmogenesis_shroud_tear: "Истончение барьера с Покровом"
 cosmogenesis_shroud_tear_desc: "Грань между нашим измерением и Покровом слегка размылась."
 supercharged_shroud_country: "Буйствующие обитатели Покрова" #Not player facing
