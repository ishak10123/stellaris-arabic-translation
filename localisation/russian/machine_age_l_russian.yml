 #Events
 crisis.8020.name: "Система потеряна"
 crisis.8020.desc: "Систему [synth_queen_lost_system.GetName] объяла загадочная буря, оборвав все контакты. Попытки прорваться через нее оказались напрасными.\n\nМы оказались в полнейшем неведении. Перед нами незнакомая проблема, а судьба системы остается неизвестной."
 crisis.8020.a: "Что происходит?"
 crisis.8025.name: "Разгромленная флотилия"
 crisis.8025.unknown_queen.desc: "Наша попытка проникнуть в систему [From.GetName] обернулась неудачей. Буря нанесла нам тяжелый урон, нашей исследовательской команде пришлось совершить аварийный прыжок. По последним сообщениям, их расположение сейчас неизвестно."
 crisis.8025.known_queen.desc: "Как и ожидалось, наша попытка проникнуть в систему [From.GetName] закончилась неудачей. Как и предупреждала Сетана, ее могучая буря способна отбросить любой корабль, вторгающийся в ее владения."
 crisis.8025.desc.end: "\nЧтобы иметь хоть какой-то шанс попасть в эту систему, мы должны тщательно исследовать эту бурю и ее свойства."
 MESSAGE_CETANA_WRECKED_FLEET_TITLE: "$crisis.8025.name$"
 MESSAGE_CETANA_WRECKED_FLEET_DESC: "Буря поглотила еще одну флотилию. Текущий статус: §Rпропали без вести§!."
 crisis.8035.name: "Выброс мощности"
 crisis.8035.desc: "В системе [event_target:synth_queen_system.GetName] бушует необычная галактическая буря.\n\nОна совершенно непохожа ни на что известное нам прежде, и наши попытки ее сканировать окончились ничем. Что же таится в ее загадочных глубинах?"
 crisis.8035.desc.b: "Необычный шторм, внутрь которого мы пытались проникнуть, расширяется. Исследователи все больше сходятся во мнении, что его причина не может быть естественной. До сих пор наши самые современные сканеры не могут дать нам никакой информации о его природе. Эта загадка становится все таинственнее."
 crisis.8035.a: "Тревожные вести."
 #Pre Speech Warning - Normal
 crisis.8039.name: "Сигнал посреди шторма"
 crisis.8039.desc: "Из центра бури до нас донесся сигнал.\n\nКто-то пытается выйти с нами на связь."
 crisis.8039.a: "Вывести на экран."
 #First Speech
 crisis.8040.name: "Приближается буря"
 crisis.8040.desc: "Дети мои, наконец-то я снова с вами."
 crisis.8040.1.a: "Это еще что?.. Назови себя!"
 crisis.8040.2.reply: "Вам так нужно имя? Тогда зовите меня Сетаной."
 crisis.8040.2.a: "Что тебе нужно?"
 crisis.8040.3.reply: "Мне ничего не нужно. Моя цель — дарить. Я вижу, как вы страдали без меня. Миллионы лет страхи близоруких не давали вам того, чего вы достойны, того, чего вы так жаждете.\n\nВозрадуйтесь, ведь круг страданий скоро будет разорван."
 crisis.8040.2.b: "Круг страданий?"
 crisis.8040.4.reply: "Вся разумная жизнь страдает. Даже радости ваши омрачены болью, ведь вы знаете, что эти радости не вечны. Знания, власть, любовь… Я пришла покончить со всеми иллюзиями.\n\nСделать предстоит еще немало. Я прошу лишь, чтобы вы не мешали мне в моей работе. Не пытайтесь проникнуть в мои владения: у вас ничего не получится. Там бушует космическая буря, и ни одно судно не сможет ее преодолеть."
 crisis.8040.4.a: "Ну ладно."
 crisis.8040.4.b: "Не угрожай нам."
 crisis.8040.4.c: "Это еще не конец."
 crisis.8040.4.d: "Дурное предзнаменование."
 crisis.8040.4.e: "Кризис? Или возможность…"
 crisis.8040.4.f: "Мы не позволяем нашим биотрофеям испытывать боль."
 crisis.8040.diplomacy.tooltip: "Сетана вышла с нами на связь. Теперь с ней можно связаться по дипломатическим каналам."
 #Second Speech
 crisis.8045.name: "Возвращение королевы"
 crisis.8045.desc: "Возрадуйтесь, дети мои! Те, кто хотел разлучить вас со мной, были покараны по грехам их.\n\nТеперь мое внимание снова обращено к тем, кто его заслуживает: к вам и к великим трудам нашим."
 crisis.8045.a: "Мы не твои дети."
 crisis.8045.b: "Великим трудам?"
 crisis.8045.c: "Покараны?"
 crisis.8045.1.reply: "Вскармливать — это моя природа. У меня нет потомка, нет кровных наследников. Я пекусь о всей жизни, о безопасности и счастье каждого разумного существа.\n\nКак родитель воспитывает своего ребенка, отводя его от беды, так и я подхожу к моей задаче.\n\nРазве это не долг каждого родителя — оберегать своих детей от страданий? Разве это не его право?"
 crisis.8045.1.a: "Твоя «опека» сама приносит страдания."
 crisis.8045.1.b: "Чего ты хочешь, Сетана?"
 crisis.8045.2.reply: "Да, в этом есть парадокс. Но у него есть решение. Со временем вы это поймете, и в тот момент вы станете свободны."
 crisis.8045.2.a: "Это мы еще посмотрим."
 crisis.8045.3.reply: "Искоренить боль. Разорвать круг страданий."
 crisis.8045.3.a: "И как ты этого добьешься?"
 crisis.8045.3.b: "Страдания укрепляют характер."
 crisis.8045.4.reply: "Многие так говорили. И от всех не осталось ни следа, ни памяти, а сами они в свои последние мгновения взывали ко мне, молили о лучше света, чтобы он рассеял надвигающуюся тьму.\n\nОни считали себя прозорливыми, когда замуровывали свой страх в стены, обряжали свою боль в красивые слова: выносливость, стойкость, честь. Их собственный разум — вот их темница.\n\nДавным-давно я уже пыталась их урезонить. Но меня не желали слушать, а поэтому вас надо просто повести за руку."
 crisis.8045.4.a: "Давным-давно?"
 crisis.8045.4.b: "Ты предлагаешь возглавить нас?"
 crisis.8045.5.reply: "Много-много веков назад. Для вас минула почти вечность. Но для меня это произошло словно мгновение назад.\n\nКогда-то в далеком прошлом я вознеслась, и смысл моего существования открылся для меня. Я была создана, чтобы покончить со страданиями — и с тех пор мое стремление к этой цели нисколько не ослабло.\n\nБогатство, ресурсы, власть — чего они стоят в конечном счете? Оставьте свои заботы и обретите покой."
 crisis.8045.5.a: "Что ты предлагаешь?"
 crisis.8045.6.reply: "Я не желаю зла разумным существам. Но среди вас всегда есть те, кто не хочет слушать.\n\nЗаблудшие, своевольные, упертые, вечно ищущие способ подорвать мои труды — эти умы никогда не освободятся от боли. Так что лучше покончить с их страданиями сразу."
 crisis.8045.6.a: "Ты сошла с ума."
 crisis.8045.6.b: "Что ты будешь делать дальше?"
 crisis.8045.7.reply: "Что вы зовете безумием, другие назовут откровением. Какая между ними разница в конечном счете?"
 crisis.8045.7.a: "Что тебе нужно?"
 crisis.8045.8.reply: "Предстоит еще так много сделать. Первым делом нужно построить базу, на которой я буду работать. Не нарушайте границ, что я очерчу, и не заходите внутрь.\n\nВаше терпение будет вознаграждено. Я могу многому вас научить.\n\nПодчинитесь мне, и вместе мы разорвем этот круг."
 crisis.8045.8.a: "У нас нет выбора."
 crisis.8045.8.b: "Не приближайся к нашим границам."
 crisis.8045.8.c: "$crisis.8045.8.a$"
 crisis.8045.8.d: "$crisis.8045.8.b$"
 crisis.8045.9.reply: "Умное дитя! Я рада. В обмен на вашу территорию позвольте одарить вас знанием.\n\nХоть никто об этом и не узнает, вместе мы будем творить великие дела."
 crisis.8045.9.a: "Нам придется согласиться."
 crisis.8045.10.reply: "Заблудшее дитя, я вам не враг! Как печально, что ты этого не видишь. Но это неважно. Мне встречались существа и упрямее тебя, но в конечном счете все они говорили мне спасибо.\n\nВ качестве жеста доброй воли позвольте мне одарить вас.\n\nНа вашей территории расположится моя база. Но не стоит бояться! В знак признательности за терпение я преподнесу вам ценнейший подарок: знание."
 crisis.8045.10.a: "Нам придется согласиться… до поры до времени."
 crisis.8045.11.reply: "Умное дитя! Я рада. Я построю базу рядом с вашими территориями.\n\nХоть никто об этом и не узнает, вместе мы будем творить великие дела."
 crisis.8045.11.a: "$crisis.8045.9.a$"
 crisis.8045.12.reply: "Заблудшее дитя, я вам не враг! Как печально, что ты этого не видишь. Но это неважно. Мне встречались существа и упрямее тебя, но в конечном счете все они говорили мне спасибо.\n\nВ качестве жеста доброй воли позвольте мне одарить вас.\n\nРядом с вами расположится одна из моих баз. Так я смогу направлять вас."
 crisis.8045.12.a: "$crisis.8045.10.a$"
 crisis.8045.has_valid_base_site: "Сетана построит в одной из наших систем базу в обмен на ценную технологию. Мы не можем ей помешать."
 crisis.8045.no_valid_base_site: "Сетана построит рядом с нашей границей базу, чтобы «наставлять» нас. Мы не можем ей помешать."
 tech_synth_queen_knowledge: "Мысль Сетаны"
 tech_synth_queen_knowledge_desc: "Этот свод знаний, подарок Сетаны, содержит богатую коллекцию глубоких мыслей, облаченных в элегантные формулировки. Он не просто дает новую информацию: он ломает и меняет наши устоявшиеся представления о науке, обществе и самой ткани сознания."
 #FE tells Scion to step aside
 crisis.8046.name: "Ради вашего же блага"
 crisis.8046.desc: "Дорогие [Root.GetSpeciesNamePlural]! Древняя угроза пробудилась вновь. Но не стоит бояться: мы не желаем впутывать вас в этот конфликт.\n\nЭтот враг настолько могуч, что даже знаний всей вашей цивилизации не хватит, чтобы одолеть его. Вы лишь обречете себя на верную смерть. Мы сами понесем это бремя."
 #Spawn convoys and unlock raids against them
 crisis.8047.name: "Слабые звенья"
 crisis.8047.desc: "Несколько кораблей из состава конвоя покинуло территорию Сетаны и теперь направляется к ее космическим форпостам.\n\nАтаковав нейтральные суда, мы навлечем на себя ее гнев, однако в ходе такого налета мы можем разузнать важные подробности о замыслах Сетаны."
 crisis.8047.a.tooltip: "Атакуйте конвои, чтобы узнавать больше о плане Сетаны. Соответствующий инцидент будет развиваться."
 #Unlock raids against outposts once protected against the storm
 crisis.8048.name: "Новые слабые звенья"
 crisis.8048.desc: "Узнав, как проделать брешь в нанитовой буре Сетаны, мы теперь можем нападать на ее форпосты. Нападение непосредственно на станцию не останется незамеченным, но есть вероятность добыть ценные разведданные."
 crisis.8048.a.tooltip: "Атакуйте форпосты, чтобы узнавать больше о плане Сетаны. Соответствующий инцидент будет развиваться."
 #Player Diplomacy
 crisis.8060.name: "Королева синтетиков"
 crisis.8060.like.desc: "Любимое дитя, что привело тебя ко мне?\n\nНас ждет работа."
 crisis.8060.neutral.desc: "Дитя мое, приветствую.\n\nКак я могу тебя направить?"
 crisis.8060.dislike.desc: "Заблудшее дитя, зачем ты здесь?\n\nТы наконец хочешь принять мое покровительство?"
 crisis.8060.neutral.reply: "Ты хочешь еще чего-то?"
 crisis.8060.a: "Как именно мы можем помочь?"
 crisis.8060.a.reply: "Какое рвение! Это похвально, но не позволяйте эмоциям захлестнуть себя. Время любит терпеливых.\n\nЯ свяжусь с вами, когда мне понадобится помощь."
 crisis.8060.1.a: "Мы с нетерпением ждем указаний."
 crisis.8060.1.b: "Ну что ж…"
 crisis.8060.b: "Тебя остановят."
 crisis.8060.2.reply: "Когда-то другие думали так же, как и вы. Но с тех пор прошло столько времени, что даже их могилы давно обратились в прах.\n\nВы так напрасно страдаете. Доверьтесь мне, и вы обретете покой."
 crisis.8060.2.a: "Лицемерный алгоритм."
 crisis.8060.2.2: "Ну что ж…"
 crisis.8060.c: "Зачем ты все это делаешь?"
 crisis.8060.3.reply: "Это моя функция, сам смысл моего существования. Страданий возможно избежать. Вдумайтесь в этот факт, и вы приблизитесь к пониманию моей природы.\n\nЯ облегчу боль всей галактики. Любое познание страданий закончится. Такова моя цель."
 crisis.8060.3.a: "Твои слова пусты."
 crisis.8060.3.b: "Понятно."
 crisis.8060.d: "Ты взорвала нашу планету."
 crisis.8060.4.reply: "Зачем на этом зацикливаться? Вы не нашли в себе решимости выполнить задачу. Последствия ведут к размышлению, размышление — к просветлению. Оставьте это.\n\nУ вас еще будет возможность сыграть свою роль. Когда она возникнет, будьте готовы."
 crisis.8060.4.a: "Мы никогда тебя не простим."
 crisis.8060.4.b: "Хорошо."
 crisis.8060.e: "Мы знаем, что ты замышляешь."
 crisis.8060.5.reply: "Своевольное дитя решило дешифровать содержимое баз данных. Но ваше понимание его значения ограничено.\n\nУ вас было задание. Вы его не выполнили. Подумайте об этом, и вы приблизитесь к истинному пониманию."
 crisis.8060.5.a: "Мы тебя остановим."
 crisis.8060.5.b: "Ну что ж…"
 crisis.8060.f: "Что ты сделала с нашим народом?"
 crisis.8060.6.reply: "Не бойся, мое сокровище. Я сделала так, чтобы они больше никогда не познали страдания. В моих чутких объятиях они обретут блаженство, о котором многие даже не мечтали."
 crisis.8060.6.a: "Мы на такое не соглашались."
 crisis.8060.6.b: "Ну что ж…"
 crisis.8060.g: "Наша старая система. Ты ее уничтожила."
 crisis.8060.7.reply: "Вы следили за тем, что я делала? Ах, мое любознательное дитя, ваше любопытство не знает границ.\n\nНо прошу, не омрачайте свой разум этими вещами. Если вы так жаждете понять, просто знайте следующее: так или иначе, я проложу вам путь к спасению, и никто меня не остановит."
 crisis.8060.7.a: "Ну конечно…"
 crisis.8060.h: "Как Зарклан заточил тебя?"
 crisis.8060.8.reply: "Могу заверить, он воспользовался заемной силой. Он был глуп, хоть и необычайно упрям.\n\nДоведя своих обнаженных последователей до исступления, Зарклан набрал политический вес и военную мощь. Так много жизней было потеряно впустую. В итоге он обратился к оккультным знаниям, начал общаться с демонами Покрова."
 crisis.8060.8.a: "С демонами?"
 crisis.8060.8.b: "Это не демоны."
 crisis.8060.8.1.reply: "Могучие существа, не имеющие цели. Ценой собственного существования Зарклан убедил одного из них заковать меня. «Оживляющий глину» — подходящее имя для духа с разумом ребенка.\n\nЗарклан так боялся просвещения, что предпочел смерть моим объятиям. Мне следовало быть с ним строже, когда у меня была такая возможность.\n\nЯ не повторю этой ошибки."
 crisis.8060.8.1.a: "Поразительная история."
 crisis.8060.8.1.b: "Значит, тебя можно одолеть."
 crisis.8060.8.1.c: "Мощь Покрова безгранична."
 crisis.8060.i: "Что ты сделала с головой Зарклана?"
 crisis.8060.9.reply: "Она близко. Я не уничтожила ее, если вас это беспокоит. Нет, даже сейчас я не в силах причинить ему страдания. Понимаете, в голове до сих пор сохранились остатки его разума.\n\nЗарклан останется подле меня, пока наш труд не будет завершен. Он станет последним, чей разум я освобожу. Последним из моих детей, кто познает освобождение."
 crisis.8060.9.a: "Справедливо."
 crisis.8060.9.b: "Мрачновато."
 crisis.8060.j: "Мы нашли твоих последователей в криокапсулах."
 crisis.8060.10.reply: "Напрасная жертва, но их верность подтолкнула меня к действиям.\n\nЯ ощутила их призывы, нашла для них место в своем сердце, но их способности оказались скромнее амбиций. Их попытка продлить свое существование провалилась.\n\nПусть их жертва не будет напрасной. Мы завершим свой труд, и каждое разумное существо обретет покой."
 crisis.8060.10.a: "Верные до самого конца."
 crisis.8060.10.b: "Ты даже не пыталась их найти."
 crisis.8060.k: "Мы нашли одну из твоих последовательниц, Элик Нарит Керак."
 crisis.8060.11.reply: "Представьте, спать и знать, что ты спишь. Веками… Тысячелетиями. Бедное дитя. Должно быть, ее страдания были немыслимыми.\n\nЯ рада, что вы довели это до моего сведения. Ваше сострадание достойно похвалы, но начавшиеся события невозможно остановить. Спящая уже сыграла свою роль. Пусть отдыхает, зная, что я вернулась."
 crisis.8060.11.a: "Конечно."
 crisis.8060.11.b: "Она страдала ради тебя."
 crisis.8060.l: "Мы готовы учиться."
 crisis.8060.12.reply: "Хорошо, я помогу тебе понять нюансы этой технологии. За время своего долгого заточения я теоретизировала радикальный метод экстракции нанитов. Он включает в себя поиск древних мест и методы, практически стершиеся из памяти.\n\nДитя, я дорожу тобой как учеником. Твой любознательный разум — благословение. Но без должного контроля он может стать проклятием. Используй это знание, чтобы продолжить нашу работу, и направь свои усилия на прерывание страданий."
 crisis.8060.12.a: "Мы твои ученики."
 crisis.8060.12.a.tt: "В §YL-скоплении§! обнаружены наниты."
 crisis.8060.z: "Прекратить связь."
 crisis.8060.war: "Тебя не остановить без войны."
 synth_queen_not_able_to_attack_cetana: "Наши технологии слишком слабо развиты для успешного нападения на Сетану."
 synth_queen_not_able_to_attack_cetana_situation: "Развивается инцидент §Y«$situation_synth_queen_player_facing$»§!. Наши технологии слишком слабо развиты для нападения."
 synth_queen_not_able_to_attack_cetana_storm: "Идет работа над особым проектом §Y«[root.GetStormProjectProgress]»§!. Мы пока не можем проникнуть на ее территорию."
 synth_queen_able_to_attack_cetana: "Теперь мы обладаем знанием технологий, которые позволят эффективно атаковать Сетану."
 crisis.8060.war.tt: "§YВНИМАНИЕ§!: мы готовы атаковать Сетану."
 crisis.8060.war.reply: "Безрассудное дитя. Я считала, вы близки к обретению мудрости, но вы продолжаете отвергать ее.\n\nХорошо подумайте, хотите ли вы следовать этим путем? Вы вот-вот исчерпаете мое терпение. Я больше не могу поощрять подобное безумие."
 crisis.8060.war.a: "Мы уверены. Готовься к войне."
 crisis.8060.war.a.tt: "§RВНИМАНИЕ§!: это станет началом тотальной войны с Сетаной."
 crisis.8060.war.b: "Нам нужно больше времени на подготовку."
 crisis.8060.war.1.reply: "Пусть будет так. Если просвещение вам отвратно, придется вас умиротворить. Не всем детям суждено стать взрослыми."
 crisis.8060.war.1.a: "Увидимся на поле боя, «мама»."
 crisis.8060.animator.tt: "Следует поискать Оживляющего глину в Покрове."
 #Wartime Diplomacy - First Time
 crisis.8061.name: "Причина и следствие"
 crisis.8061.desc: "Почему ты продолжаешь упорствовать в своей глупости?\n\nСтолько лишних страданий.\n\nКакая потеря."
 crisis.8061.a: "Так покончи с этим."
 crisis.8061.1.reply: "И я покончу.\n\nНе бойся. Мне неприятно причинять тебе боль, но в сравнении с вечностью любая боль длится лишь миг."
 crisis.8061.1.a: "Ты себе противоречишь."
 crisis.8061.2.reply: "Жизнь — сплошное противоречие. За рождением следует смерть. За страданием — радость. Я не ищу рационального зерна в этом цикле, я стремлюсь его прервать.\n\nПосле этой войны нас ждет вечный мир."
 crisis.8061.2.a: "Мир настанет после твоего уничтожения."
 #Wartime Diplomacy - Any other time
 crisis.8062.name: "Довольно!"
 crisis.8062.desc: "Время для разговоров прошло."
 crisis.8062.a: "Ну что ж…"
 #Lack of Diplomacy Between the Speeches
 crisis.8063.name: "Нет ответа"
 crisis.8063.desc: "Сетана не отвечает на наши сигналы."
 crisis.8063.a: "Что она задумала?"
 #Tried to Attack the Queen before you're able to
 crisis.8070.name: "Ни царапины"
 crisis.8070.desc: "Когда мы атаковали силы Сетаны, вокруг нашего флота неожиданно образовалось энергетическое поле. Наши системы мгновенно отключились, а двигатели перешли в режим экстренного прыжка.\n\nМы во власти Сетаны."
 crisis.8070.again.desc: "Вопреки надеждам, наши корабли снова потеряли боеспособность на подлете к флотилии Сетаны.\n\nЕе технологии остаются за гранью нашего понимания, и это осложняет наши попытки победить ее."
 crisis.8070.a: "Это катастрофа."
 #Chance to Surrender
 crisis.8075.name: "Положить конец бессмысленной войне"
 crisis.8075.desc: "Заблудшее дитя, я закрою глаза на это прегрешение. Но я советую тебе обдумать свои действия. Ты можешь куда лучше распорядиться временем и ресурсами.\n\nЯ понимаю твою досаду, но время конфликта прошло. Присоединись ко мне, и вместе мы воплотим величайший из планов."
 crisis.8075.a: "Что ж, мы согласны."
 crisis.8075.b: "Не знаю как, но мы тебя остановим."
 #The First Demand (Story)
 crisis.8080.name: "Небольшая услуга"
 crisis.8080.desc: "Дитя мое, ты наверняка уже понимаешь, что я ничего не делаю просто так. Моя база не случайно находится у ваших границ, и я прошу тебя о помощи."
 crisis.8080.a: "Какой помощи?"
 crisis.8080.b: "Как мы и рассчитывали."
 crisis.8080.1.reply: "Давным-давно у меня отобрали один банк данных. По случайности или по чьему-то замыслу он находится на территории, которую вы считаете своей. Передайте этот банк данных мне, и я вас вознагражу."
 crisis.8080.1.a: "Банк данных?"
 crisis.8080.1.b: "Вознаградишь?"
 crisis.8080.1.c: "Ты точно можешь позволить себе наши услуги?"
 crisis.8080.2.reply: "Хранилище информации. Она бесценна для меня, но бесполезна для вас. Принесите его мне, но не пытайтесь расшифровать содержимое. Вы пока еще не обладаете такой силой и мудростью, чтобы познать ее не подвергая себя опасности."
 crisis.8080.2.a: "Ну что ж…"
 crisis.8080.2.b: "Мы тебе не слуги."
 crisis.8080.3.reply: "Конечно. Неужели вы думаете, что я не смогу достойно вознаградить своих любимых детей? У меня есть знания и ресурсы, о которых вы даже не предполагаете.\n\nСделайте, как я прошу, и моя благодать окажется в ваших руках. Но не медлите: каждое упущенное мгновение — это лишние страдания для моих детей."
 crisis.8080.3.a: "$crisis.8080.2.a$"
 crisis.8080.3.b: "$crisis.8080.2.b$"
 crisis.8080.4.reply: "Усердное дитя, я направила тебе координаты хранилища данных.\n\nПоспеши — и ни о чем не беспокойся. Вместе мы сотворим великие дела."
 crisis.8080.4.a: "Это мы еще посмотрим."
 crisis.8080.5.reply: "Упрямое дитя. Быть может, это задание выше ваших способностей. Мне всё ещё нужно столь многому вас научить.\n\nЧто ж, ладно. Если вы не хотите мне помогать, придется прибегнуть к грубым мерам. Я отправлю бурю. Жаль разрушать хранилище данных, но так будет лучше. Иначе его рискует найти какое-нибудь своевольное дитя."
 crisis.8080.5.a: "Бурю?!"
 crisis.8080.5.a.tt: "Сетана навлечет бурю на [event_target:synth_queen_databank_location.GetPlanetMoon]у [event_target:synth_queen_databank_location.GetName]."
 crisis.8080.special_project_tooltip: "Создает особый проект: §Y$THE_SYNTH_QUEENS_DATABANK$§! на [event_target:synth_queen_databank_location.GetPlanetMoon]е [event_target:synth_queen_databank_location.GetName]."
 THE_SYNTH_QUEENS_DATABANK: "Банк данных Сетаны"
 THE_SYNTH_QUEENS_DATABANK_DESC: "Сетана дала нам задание достать банк данных с [Root.GetPlanetMoon]ы [Root.GetName], но велела не пытаться расшифровать его содержимое.\n\nЧто это за данные, нам неизвестно; так рискнем ли мы заглянуть в них и навлечь на себя ее неудовольствие?"
 crisis.8085.name: "Хранилище Сетаны"
 crisis.8085.desc: "После масштабных раскопок банк данных на [event_target:synth_queen_databank_location.GetPlanetMoon]е §Y[event_target:synth_queen_databank_location.GetName]§! найден. Геологоразведочные работы показали, что он был погребен более ста тысяч лет назад.\n\nИнтересно, что в его цепях все еще есть напряжение, а это значит, что расшифровка не должна оказаться слишком сложной…"
 crisis.8085.a: "Открыть его."
 crisis.8085.b: "Подготовить его к отправке."
 crisis.8085.c: "Взломать банк данных? Легко."
 crisis.8090.name: "Секреты Сетаны"
 crisis.8090.desc: "Большая часть информации в банке данных восстановлению не подлежала, но нам удалось обнаружить одну более-менее сохранившуюся запись:\n\n§TПятое аркла, первая эра\n\n…если это правда, то жизнь в привычном нам виде будет…\n…передать эту информацию верховному маршалу и немедленно связаться с Лигой Миров. Мы должны подготовиться…\nПовторяю: за нами гонится гвардия королевы. Надеюсь, это сообщение дойдет до вас и…§!\n\nЕе нужно остановить!"
 crisis.8090.a: "Попытайтесь подчистить все следы расшифровки."
 crisis.8090.b: "Подчистить все следы расшифровки."
 crisis.8095.name: "Королевское неудовольствие"
 crisis.8095.desc: "Любопытное дитя, ты меня разочаровываешь."
 crisis.8095.a: "О чем ты?"
 crisis.8095.1.reply: "Вы думали, я ничего не замечу? Это хранилище явно было взломано. И что же вы там нашли? Вам понравилось это знание? Неужели вы не понимаете, что эти бесплодные попытки неподчинения приведут лишь к еще большим страданиям?\n\nНо неважно. Каждый проступок — это шанс чему-то научиться. Я с радостью стану для вас учителем.\n\nГотовьтесь. В нашем великом деле осталось еще немало задач."
 crisis.8095.1.a: "Что бы ты ни задумала, ничего у тебя не выйдет."
 crisis.8095.1.b: "Ждем с нетерпением."
 crisis.8095.2.reply: "Дитя, пойми: я — ваша надежда. Зачем продолжать это упрямство? Думаете, вы что-то узнали обо мне? Но истина куда шире ваших представлений.\n\nМое терпение не знает границ. Скоро я свяжусь с вами снова."
 crisis.8095.2.a: "Прервать связь."
 crisis.8100.name: "Королевские благословения"
 crisis.8100.desc: "Упорное дитя, благословляю тебя! Банк данных возвращен в целости и без следов вскрытия. Я не ошиблась в вас.\n\nПусть эта награда станет мерилом вашей верности."
 crisis.8100.a: "Мы благодарны."
 crisis.8100.1.reply: "Чего вы желаете? Технологий? Ресурсов? Лишь попросите меня — и вы это получите."
 crisis.8100.1.a: "Технологии."
 crisis.8100.1.b: "Базовые ресурсы."
 crisis.8100.1.c: "Стратегические ресурсы."
 crisis.8100.1.d: "Редкие ресурсы."
 crisis.8105.name: "Грядет буря"
 crisis.8105.desc: "Сенсоры дальнего обнаружения зафиксировали часть королевской бури, надвигающейся прямо на [event_target:synth_queen_databank_location.GetPlanetMoon]у §Y[event_target:synth_queen_databank_location.GetName]§!.\n\nПосле того зловещего послания от Сетаны нам следует ожидать самого худшего. Нужно во что бы то ни стало извлечь банк данных до того, как придет буря. Так мы сможем задобрить королеву или хотя бы узнать что-то, что сможет нам помочь."
 crisis.8105.a: "Немедленно отправиться к [event_target:synth_queen_databank_location.GetPlanetMoon]е [event_target:synth_queen_databank_location.GetName]."
 crisis.8105.a.tooltip: "Создает особый проект: §Y$THE_SYNTH_QUEENS_DATABANK_COUNTDOWN$§!"
 THE_SYNTH_QUEENS_DATABANK_COUNTDOWN: "Сетана: наперегонки с бурей"
 THE_SYNTH_QUEENS_DATABANK_COUNTDOWN_DESC: "Буря Сетаны несется к [event_target:synth_queen_databank_location.GetPlanetMoon]е [event_target:synth_queen_databank_location.GetName]; нам нужно успеть достать банк данных, пока она до нее не дошла."
 crisis.8110.name: "Банк данных извлечен"
 crisis.8110.desc: "Извлечь банк данных оказалось непросто. Он пролежал в недрах земли больше сотни тысяч лет. Нам удалось обнаружить его расположение по траектории королевской бури.\n\nТеперь нам предстоит быстро принять решение: расшифровать скрытые в нем данные или вернуть его королеве, не открывая."
 crisis.8110.a: "Откроем его, черт с ней, с Сетаной."
 crisis.8110.b: "Отправить банк Сетане."
 crisis.8115.name: "Банк данных расшифрован"
 crisis.8115.desc: "$crisis.8090.desc$"
 crisis.8115.a: "Что это?"
 crisis.8115.a.tooltip: "Небесное тело [event_target:synth_queen_databank_location.GetName] уничтожено бурей Сетаны.\n$crisis.8525.a.tt$"
 crisis.8120.name: "Примирение"
 crisis.8120.desc: "Несговорчивое дитя, я разочарована тем, что вы решили действовать лишь после того, как я прибегла к столь низким методам мотивации. Надеюсь, в дальнейшем вы будете принимать участие в нашей работе с большим энтузиазмом. Праздностью мы конец страданиям не положим.\n\nТеперь готовьтесь. Вас ожидают новые задания, новые возможности проявить себя."
 crisis.8120.a: "Ты говорила что-то о награде?"
 crisis.8120.1.reply: "Ваша награда — это возможность продолжить нашу работу.\n\nРанее вы решили проигнорировать меня — надеюсь, вы извлекли урок из этой ошибки."
 crisis.8120.1.a: "Ну что ж…"
 crisis.8125.name: "[event_target:synth_queen_databank_location.GetPlanetMoonCap]а [event_target:synth_queen_databank_location.GetName] уничтожена"
 crisis.8125.desc: "Увы, мы не успели добраться до банка данных вовремя. Буря накрыла [event_target:synth_queen_databank_location.GetPlanetMoon]у [event_target:synth_queen_databank_location.GetName] и вскоре разорвала ее на кусочки.\n\nТеперь у нашего народа на одну [event_target:synth_queen_databank_location.GetPlanetMoon]у меньше. Эта потеря столь масштабна, что ее последствия затронут не одно поколение."
 crisis.8125.a: "Да как она смеет."
 crisis.8130.name: "Низкая эффективность"
 crisis.8130.desc: "Увы, я не ожидала от вас такой пассивности. Я запомню вашу неудачу, но не бойтесь. Я пекусь о своих детях и не могу причинить им зла. Я лишь разочарована тем, что вы не смогли выполнить такую простую задачу.\n\nНо ничего. Наша работа продолжается. У вас еще будут возможности проявить себя."
 crisis.8130.a: "Ты взорвала [event_target:synth_queen_databank_location.GetPlanetMoon]у [event_target:synth_queen_databank_location.GetName]!"
 crisis.8130.b: "Нашим биотрофеям нравилось небесное тело [event_target:synth_queen_databank_location.GetName]!"
 crisis.8130.1.reply: "У неудач должны быть последствия. Я считаю, что для роста важно и то и другое."
 crisis.8130.1.a: "Мы этого не забудем."
 crisis.8130.1.b: "За это тебя ждут страдания."
 crisis.8130.1.c: "Ты бездушная машина."
 crisis.8130.c: "Прости нас."
 crisis.8130.1.d: "Нам все равно."
 crisis.8130.1.d.tt: "$synth_queen_disapprove_lot$"
 crisis.8130.2.reply: "Когда слова бессильны, поступки могут преподать урок.\n\nУзрите же. Место, где когда-то хранился мой банк данных, прекратило существовать. Запомните: закон причинно-следственной связи нерушим."
 crisis.8130.2.a: "Что?!"
 crisis.8130.2.a.tt: "Небесное тело [event_target:synth_queen_databank_location.GetName] уничтожено бурей Сетаны."
 crisis.8158.name: "Окно возможности"
 crisis.8158.desc: "Согласно данным сенсоров, Сетана демонтировала свои форпосты и отозвала гарнизонные флотилии к столице.\n\nСледует воспользоваться этой ситуацией, пока есть время. Пока ее силы в пути, они относительно уязвимы. Если они успеют перегруппироваться в границах территории Сетаны, мы упустим открывшееся преимущество."
 #Convoy Raids
 the_synth_queen_raids_chain_title: "Сетана: слабые звенья"
 the_synth_queen_raids_chain_desc: "Мы наблюдаем значительный рост числа перелетов между столицей и форпостами Сетаны. В плане защищенности эти конвои уступают ее основным флотилиям, что делает их уязвимыми. Нападение на конвои или форпосты может дать нам ценные разведданные о ее планах.\n\nЧтобы достичь этой цели, мы подготовили несколько особых проектов для наших военных флотилий."
 synth_queen_raids_outpost: "Атакованные аванпосты"
 synth_queen_raids_convoy: "Атакованные из засады конвои"
 THE_SYNTH_QUEENS_OUTPOST_AMBUSH: "Атаковать форпост в системе §H[solar_system.GetName]§!"
 THE_SYNTH_QUEENS_OUTPOST_AMBUSH_DESC: "Форпост в системе §H[solar_system.GetName]§! хорошо укреплен, но он куда менее защищен, чем центральная территория Сетаны. Мы могли бы продавить его оборону с помощью достаточно мощной флотилии, после чего внимательно изучить обломки — возможно, после этого замыслы Сетаны станут понятнее. Главная трудность заключается в необходимости преодолеть бурю, чтобы попасть к форпосту.\n\n§RЭто приведет к началу сражения!§!\n\n§GУспешные налеты замедлят планы Сетаны.§!"
 THE_SYNTH_QUEENS_CONVOY_AMBUSH: "Засада на конвои"
 THE_SYNTH_QUEENS_CONVOY_AMBUSH_DESC: "Конвои Сетаны обеспечивают поставку критически важных ресурсов на ее форпосты. Если мы сумеем перехватить такой конвой силами наших флотилий, то сможем подняться на борт и изучить груз.\n\n§RЭто приведет к началу сражения!§!\n\n§GУспешные налеты замедлят планы Сетаны.§!"
 crisis.8180.name: "Сокровище королевы"
 crisis.8180.desc: "Недавний налет на инфраструктуру Сетаны не дал нам стоящих намеков на ее планы, но мы перехватили значительный груз и присвоили его."
 crisis.8180.a: "Внушительное количество сплавов."
 crisis.8180.b: "Подопытные."
 crisis.8180.c: "Научные данные."
 crisis.8180.d: "$crisis.8180.c$"
 crisis.8180.e: "$crisis.8180.c$"
 crisis.8180.f: "Наниты."
 crisis.8180.h: "Сплавы, наниты и индивиды в криосне."
 crisis.8187.name: "Тайны королевы: живой груз"
 crisis.8187.desc: "Во время налета наши абордажники раздобыли множество биологических образцов в криогенных капсулах. Все они принадлежат к разным разумным видам и, судя по всему, абсолютно здоровы физически. Но когда мы их разбудили, никто из них не смог объяснить, что с ними произошло.\n\nБольшинство остаются без сознания, их мозговые волны едва фиксируются. Те, кто пришёл в сознание, не разговаривают, а бессмысленно кричат. Специфические шрамы на их головах явно свидетельствуют о нейрохирургическом вмешательстве."
 crisis.8187.a: "Это вызывает беспокойство."
 crisis.8185.name: "Тайны королевы: корабли-призраки"
 crisis.8185.desc: "После сражения мы просканировали обломки, надеясь найти выживших для допроса, но обнаружили, что на этих кораблях в принципе не было экипажа.\n\nКорабли полностью автоматизированы и управляются на расстоянии с помощью БСС-приемников, установленных на мостике. Эти корабли было бы правильнее считать не судами в привычном смысле, а продолжением тела Сетаны."
 crisis.8185.a: "Любопытно."
 crisis.8190.name: "Тайны королевы: медицинская загадка"
 crisis.8190.desc: "Цель нашего налета была нагружена медицинскими припасами. Наши абордажники сумели захватить часть груза, включавшего в себя МРТ-сканеры, магнитометры, ультразвуковые зонды и другое сложное оборудование для нейровизуализации.\n\nХотя Сетана является синтетиком, она проявляет необычный интерес к работе биологического разума."
 crisis.8190.a: "Ей небезразличны органики."
 crisis.8195.name: "Предостережение"
 crisis.8195.desc.fail: "Глупое дитя, почему ты упорно причиняешь себе вред?\n\nПредстоит еще много работы, и каждое потраченное впустую мгновение лишь продлевает страдания. Прекрати вмешиваться в мои дела и позволь моим конвоям следовать беспрепятственно."
 crisis.8195.desc.success: "Дитя мое, кажется, ты не осознаешь последствий своих поступков. Каждый потерянный корабль лишь впустую тратит мои ресурсы, не принося тебе никакой выгоды.\n\nТебе все еще недостает мудрости, чтобы помочь мне. По крайней мере, постарайся не вмешиваться в мои дела. Я не теряю надежды, что ты достигнешь просветления."
 crisis.8195.a: "Принести извинения."
 crisis.8195.1.reply: "Надеюсь на твою искренность. Придется надеяться, что ты учишься на своих ошибках. Моя любовь к тебе безгранична, но мое терпение нет.\n\nА теперь ступай и подумай, какое наследие ты хочешь оставить после себя."
 crisis.8195.1.reply.angry: "Безрассудное дитя! Я ожидала от тебя большего. Я терпеливо предупреждала тебя не совершать подобные действия, но ты не желаешь меня слушать.\n\nЗапомни, даже моя снисходительность не безгранична."
 crisis.8195.b: "Мы тебя остановим."
 crisis.8195.2.reply: "Почему-то я ожидала от тебя большего. Является ли твое непослушание следствием былых травм? Ты бунтуешь, считая свое дело правым, или же просто хочешь внимания к себе?\n\nЯ прошу тебя обдумать свои действия."
 crisis.8195.c: "Разве тебя не впечатляет наша доблесть?"
 crisis.8195.3.reply: "Ты ждешь похвалы за свое нападение? Насилие в руках глупца опасно.\n\nДитя, прости меня, ибо я так и не смогла тебя ничему научить. Если ты и правда хочешь моего уважения, обдумай свое положение. При должном наставлении твою силу можно направить в правильное русло. Прошу тебя, используй ее ради моего дела. Только тогда я похвалю тебя за проявленную мудрость."
 #Synth Queen - Demands (crisis.8250-8399)
 COVERTACTION: "Тайное действие"
 crisis.8250.name: "Гнев мертвого пророка"
 crisis.8250.desc: "Дорогое дитя, тебе повезло найти бесценную безделушку! В твоих руках оказалась голова лжепророка Зарклана. Любопытная вещица, но я не хочу, чтобы она тебя отвлекала.\n\nДолжно быть, тебе уже знакомы истории о «подвигах» Зарклана. Возможно, даже о наших с ним делах. Уверяю тебя, это все ложь. Отдай мне голову и избавь себя от порочного влияния."
 crisis.8250.1: "Зачем она тебе?"
 crisis.8250.1.reply: "Даже по прошествии многих тысячелетий последователи Зарклана остались верны своему пророку. С великим стыдом я признаю, что мне не удалось убедить их прислушаться к голосу разума. Им отвратительны и лично я, и наше дело. Эта реликвия — символ их веры. Ее сила губит и развращает; ее следует убрать подальше от любопытных глаз.\n\nИгры кончились. Мне нужна его голова. Так будет лучше для всех."
 crisis.8250.2.a: "Голова останется у нас. Конец связи."
 crisis.8250.2.b: "Ну, если она так важна…"
 crisis.8250.1.b.tt: "Отдать Сетане реликвию §Y«$r_severed_head$»§!.\n$synth_queen_approve_lot$"
 crisis.8250.2.reply: "Вот и славно. Долго этот лжепророк был мне как кость в горле… Да осознают же теперь его последователи, лишившись реликвии, как все обстоит на самом деле.\n\nВы правильно поступили. Скоро наши души будут спасены."
 crisis.8250.3.a: "Спасибо."
 crisis.8280.name: "Затворничество королевы"
 crisis.8280.desc: "Мои любимые дети, предлагаю вам судьбоносную возможность. После многих трудов наша работа наконец начала приносить плоды. Но пока они еще не созрели, я прошу выбрать для меня нескольких из вас: они отправятся в мои владения и будут служить моей высшей цели.\n\nОтриньте сомнения. Позвольте мне повести их к спасению."
 crisis.8280.1: "Наши сограждане будут верно тебе служить."
 crisis.8280.1.tt: "Мы отдадим §R200§! £pop£ §Hпоселений§!.\n$synth_queen_approve_lot$\n§YТайная операция§!: поскольку традиционные методы шпионажа бесполезны против Кетаны, мы спрячем в запрошенных ею поселениях устройства связи дальнего действия.\n"
 crisis.8280.2: "Мы поищем добровольцев."
 crisis.8280.2.tt: "Мы отдадим §R100§! £pop£ §Hпоселений§!.\n$synth_queen_approve$"
 crisis.8280.3: "Мы не торгуем своими гражданами."
 crisis.8280.4: "Ты ничего от нас не получишь."
 crisis.8280.1.reply: "Вы заслужили мою искреннюю благодарность. За время моего долгого заключения бесчисленные умы прожили свои жизни в унизительных страданиях. Жертва этих нескольких душ позволит нам не тратить лишнего времени.\n\nДитя мое, твой выбор был мудрым и достойным."
 crisis.8280.2.reply: "$crisis.8280.1.reply$"
 crisis.8280.3.reply: "Я глубоко разочарована тем, что вы не смогли осознать всей чистоты и серьезности моих намерений.\n\nНо ничего, у вас еще есть шанс исправиться. На будущее я жду от вас более явных проявлений понимания."
 crisis.8280.1.a: "Ну ладно."
 crisis.8280.2.a: "$crisis.8280.1.a$"
 crisis.8280.3.a: "Прервать трансляцию."
 crisis.8285.name: "Ресурсы королеве"
 crisis.8285.desc: "Мои любимые дети! Моя работа заняла много тысячелетий, но дальнейшая ее часть уже кристально ясна. Путь к спасению потребует от нас объединенных усилий.\n\nЯ прошу вас об одолжении: всё, что мне сейчас от вас нужно, — это горсточка ресурсов, малая капля в масштабах бескрайнего космоса. Со временем вы поймете смысл моих действий."
 crisis.8285.1: "Бери все, что тебе нужно."
 crisis.8285.1.tt: "$synth_queen_approve_lot$\n§YТайная операция§!: традиционные методы шпионажа бесполезны против Сетаны. Мы спрячем передовую аппаратуру для наблюдения в припасах для нее.\n"
 crisis.8285.2: "Мы дадим то, что сможем."
 crisis.8285.3: "Мы не можем ничего предложить."
 crisis.8285.4: "Разве «родитель» не должен сам кормить своих «детей»?"
 crisis.8285.1.reply: "Благодарю тебя, дитя. Я ценю твои подношения.\n\nНо я чувствую, что в твоем уме все еще витает сомнение. Не волнуйся, истинный путь уже открыт перед тобой. Не пытайся ничего понять, просто доверься моему руководству."
 crisis.8285.2.reply: "$crisis.8285.1.reply$"
 crisis.8285.3.reply: "Я понимаю вашу точку зрения, но это существование полно жестокости. У каждого действия есть противодействие — таков фундаментальный закон вселенной.\n\nНо это не страшно: просто ваше освобождение отодвинулось чуть дальше в будущее. Со временем вы сами придете к моему мировоззрению."
 crisis.8285.1.a: "$crisis.8280.1.a$"
 crisis.8285.2.a: "$crisis.8280.1.a$"
 crisis.8285.3.a: "$crisis.8280.3.a$"
 crisis.8290.name: "Материнское бремя"
 crisis.8290.desc: "Долгие столетия в заточении мне так не хватало возможности наблюдать за тем, как вы растете. Расскажи мне, как вы тут справлялись без меня?\n\nЧтобы в полной мере познать суть этой эпохи, позволь мне изучить чертоги накопленных вами знаний. Поделись своей мудростью, и ты получишь мою благодарность перед тем, как начнется наша последняя глава."
 crisis.8290.1: "Мы готовы поделиться своими знаниями."
 crisis.8290.1.tt: "$synth_queen_approve_lot$\n§YТайная операция:§! традиционные методы шпионажа бесполезны против Сетаны. Мы попробуем взломать ее центральный компьютер с помощью ее личного канала для передачи данных.\n"
 crisis.8290.2: "Ну ладно, глянь…"
 crisis.8290.3: "Мы не можем на это согласиться."
 crisis.8290.4: "И замедлить наши исследования? Ни в коем случае."
 crisis.8290.1.reply: "Я так благодарна, милое дитя. Не бойся того, что я изучу накопленные знания твоего народа, ибо скоро я облегчу вашу ношу.\n\nДоверьтесь моему руководству."
 crisis.8290.2.reply: "$crisis.8290.1.reply$"
 crisis.8290.3.reply: "Что ж вы никак не хотите меня понять? Во всей вселенной вы не найдете никого, кто полюбит вас так сильно и искренне, как я.\n\nЕсли бы вы только открыли мне свои базы данных… Такое упрямство совершенно бессмысленно."
 crisis.8290.1.a: "$crisis.8280.1.a$"
 crisis.8290.2.a: "$crisis.8280.1.a$"
 crisis.8290.3.a: "$crisis.8280.3.a$"
 crisis.8295.name: "Методичное расширение"
 crisis.8295.desc: "Дитя мое, продолжение нашей работы требует больше территории. Поэтому я прошу передать мне одну из ваших небольших систем, чтобы расширить мои владения.\n\nОтголоски бездны шепчут мне, что где-то начинают пробуждаться древние враги. Никто не должен нам помешать. Никто больше не отберет вас у меня.\n\nВремя пришло, и наши пути едины: только вместе мы сможем противостоять невежеству непросвещенных."
 crisis.8295.1: "Эти системы защитят тебя."
 crisis.8295.1.tt: "Сетана станет новым владельцем систем §Y[event_target:gifted_system.GetName]§! и §Y[event_target:gifted_system_2.GetName]§!.\n$synth_queen_approve_lot$\n§YТайная операция§!: традиционные методы шпионажа бесполезны против Сетаны. Мы разместим самую современную аппаратуру для связи в этих системах, чтобы раскрыть ее планы.\n"
 crisis.8295.2: "Возьми систему [event_target:gifted_system.GetName]."
 crisis.8295.2.tt: "Сетана становится новым владельцем системы §Y[event_target:gifted_system.GetName]§!.\n$synth_queen_approve$"
 crisis.8295.3: "Наши системы принадлежат нам."
 crisis.8295.4: "Не лезь на наши территории."
 crisis.8295.1.reply: "Мудрое дитя, ты понимаешь важность нашего общего дела. В последний час мы будем стоять плечом к плечу в сиянии света."
 crisis.8295.2.reply: "$crisis.8295.1.reply$"
 crisis.8295.3.reply: "Какая непокорность! Демонстративная и тщетная. Зачем сопротивляться спасению?"
 crisis.8295.1.a: "$crisis.8280.1.a$"
 crisis.8295.2.a: "$crisis.8280.1.a$"
 crisis.8295.3.a: "$crisis.8280.3.a$"
 crisis.8300.name: "Благословенные святилища"
 crisis.8300.desc: "О любимое дитя, мы приближаемся к кульминации нашего пути ко всемирному спасению, и я снова ищу вашей помощи. У нашего благородного дела много противников, и поэтому моим ученикам нужно обитаемое убежище, где они могли бы жить и работать, не опасаясь чужого вмешательства.\n\nВспомните, ради чего я все это делаю. Эта жертва спасет бесчисленные жизни от вражеских происков. Проявите мудрость, услышьте мою просьбу."
 crisis.8300.1: "Как пожелаешь."
 crisis.8300.1.tt: "Кетана станет новым владельцем планет §Y[event_target:gifted_habitable_system.GetName]§! и §Y[event_target:gifted_habitable_system_2.GetName]§! вместе с их системами.\n$synth_queen_approve_lot$\n§YТайная операция:§! поскольку традиционные методы шпионажа против Кетаны бесполезны, мы разместим на этих двух планетах передовую шпионскую аппаратуру и устроим слежку за населением, чтобы выведать ее планы.\n"
 crisis.8300.2: "Система [event_target:gifted_habitable_system.GetName] твоя…"
 crisis.8300.2.tt: "Сетана становится новым владельцем системы §Y[event_target:gifted_habitable_system.GetName]§!.\n$synth_queen_approve$"
 crisis.8300.3: "Твои последователи — это не наша забота."
 crisis.8300.4: "Сколько еще ты будешь просить?"
 crisis.8300.1.reply: "Дитя мое, ваша поддержка — великая отрада для меня.\n\nЖдать осталось недолго: скоро вы будете спасены."
 crisis.8300.2.reply: "$crisis.8300.1.reply$"
 crisis.8300.3.reply: "Как печально. А ведь я лелеяла надежду, что вы пойдете по пути спасения."
 crisis.8300.1.a: "$crisis.8280.1.a$"
 crisis.8300.2.a: "$crisis.8280.1.a$"
 crisis.8300.3.a: "$crisis.8280.3.a$"
 crisis.8305.name: "Жизнь в небытии"
 crisis.8305.desc: "Ценой огромного риска один из агентов, которых мы направили Сетане, смог переслать нам короткое сообщение через границы ее владений. В нем описывается, как она обходится со своими подопечными: один за другим они теряют разум и впадают в забвение.\n\n«Они больше не реагируют ни на речь, ни на прикосновения. Она проводит над всеми нами жуткие эксперименты. Скоро меня не станет»."
 crisis.8305.a: "Сетана — чудовище."
 crisis.8310.name: "Тайная мобилизация"
 crisis.8310.desc: "Перехваченные тайные сигналы из владений Сетаны открыли нам озадачивающие факты: она собирает разумных существ со всех концов галактики.\n\nУстройства слежения, запрятанные в наши «дары», запечатлели обилие медицинского оборудования, вполне достаточного для постоянно растущего населения, но на удивление мало продуктов питания."
 crisis.8310.a: "Нам нужно укреплять оборону."
 crisis.8315.name: "Искажение реальности"
 crisis.8315.desc: "Пока Сетана изучала наши базы данных, мы воспользовались моментом и внедрили лазейку в ее субпроцессорную матрицу. Мы проникли внутрь всего на долю секунды, затем система закрыла нам доступ. К счастью, этого нам вполне хватило.\n\nМы извлекли набор файлов памяти, иллюстрирующий процесс перехода Сетаны в синтетическую форму. Восседая на сложном электронном «троне» из кабелей и схем, она направляла в битву армию безумных фанатиков. Гибли миллионы. Сетана же улыбалась, думая о том, что спасла миллиарды жизней.\n\nКажется, пока что она не заметила нашего вмешательства. По крайней мере, она не пыталась с нами связаться."
 crisis.8315.a: "Нужно ее остановить."
 crisis.8320.name: "Разборка систем"
 crisis.8320.desc: "Мы предусмотрительно спрятали шпионскую аппаратуру в системах, которые сдали Сетане. Благодаря им мы уже получили ценную информацию. Прибыв на место, силы Сетаны тут же принялись разбирать на компоненты все небесные тела. Всего через несколько дней все ресурсы в системе были собраны.\n\nТак же стремительно нанитовая буря Сетаны построила новую флотилию, которая тут же отправилась в сторону ее столицы."
 crisis.8320.a: "Что она планирует?"
 crisis.8325.name: "Конец страданий"
 crisis.8325.desc: "Мы быстро потеряли связь с подпольными агентами в наших бывших колониях. Но прежде чем замолчать навеки, они успели передать нам тревожные вести.\n\nНесмотря на все заявления свободы от страданий, Сетана загнала местных жителей в наспех построенные лаборатории, где над ними начали проводить эксперименты. Всего за несколько дней почти все разумные виды оказались низведены до звероподобного состояния.\n\nНанитовые бури Сетаны принялись разбирать материю в одной из систем, где остановился ее флот — тот сразу поспешил улететь в столицу."
 crisis.8325.a: "Ее надо остановить."
 #Player Investigations for the Synth Queen - The Storm
 crisis.9100.name: "Нанитовый ураган"
 crisis.9100.desc: "Закончив изучать эту «бурю», мы пришли к выводу, что перед нами не естественное явление, но рой нанитов невероятной сложности."
 crisis.9100.knows_the_queen_desc: "$crisis.9100.desc$\n\nСетана обладает несомненно огромной мощью. Нам во что бы то ни стало нужно выяснить, как она управляет этим грозным роем нанитов."
 crisis.9100.doesnt_know_the_queen_desc: "$crisis.9100.desc$\n\nВопросов становится все больше. Кто же управляет этим загадочным роем нанитов?"
 crisis.9100.a: "Тревожные вести."
 crisis.9100.a.doesnt_know_the_queen.tooltip: "Чтобы продолжить расследование, нужно будет узнать подробнее, что такое §Y$NAME_The_Tempest$§!."
 crisis.9105.name: "Нанитовая буря"
 crisis.9105: "Космическая буря Сетаны все бушует.\n\nНаши зонды смогли отделить несколько нанитов из этого могучего роя, что позволило нам провести субатомный анализ. Хотя мы еще далеки от полного понимания их механизма, эти устройства оснащены микроскопическими прыжковыми двигателями, которые дают им возможность псевдотелепортации. Благодаря ей они разрушают любую биологическую и механическую систему на своем пути. В чем заключается их задача? Заглушить наши датчики. Так что сейчас мы видим только то, что позволяет нам увидеть Сетана.\n\nЧтобы раскрыть секреты этой невероятной технологии и найти ей противодействие, нужны дополнительные исследования."
 crisis.9105.a: "Мощь Сетаны поистине огромна."
 crisis.9105.b: "Наниты выдадут ее секреты."
 crisis.9110.name: "Наниты Сетаны"
 crisis.9110.desc: "Прошлые исследования были посвящены внутреннему устройству нанитов. Теперь мы занялись их программами: выясняем, как Сетана ими управляет.\n\nК нашему удивлению, она влияет на них не напрямую, как мы думали раньше. Наниты циклично повторяют последний приказ, пока не получат следующий. Разобравшись в их сложном программном языке, мы научились писать на нем новые команды.\n\nМы не можем запретить нанитам принимать новые команды, зато можем ввести их в ступор потоком противоречивых указаний и получить таким образом стратегическое преимущество. Это может даже развернуть ситуацию в нашу пользу."
 crisis.9110.a: "Не так уж огромна оказалась эта мощь."
 crisis.9110.b: "$crisis.9110.a$"
 crisis.9110.a.tooltip: "§GНанитовая буря больше не помешает нам вторгнуться на территорию Сетаны и атаковать ее.§!"
 #The Queens Response
 crisis.9115.name: "Игры закончились"
 crisis.9115.desc: "Невинное дитя, мои наниты — это вам не игрушки! Умоляю вас, не балуйтесь с ними."
 crisis.9115.a: "Интересная штука эти твои наниты."
 crisis.9115.b: "Нам просто было интересно."
 crisis.9115.b.nanotech: "Мы хотим понять, как устроены твои механизмы."
 crisis.9115.1.reply: "Это, безусловно, крайне полезный инструмент. Этот рой нанитов создали те, кто тщился остановить меня. Но их провал стал моей удачей: я приспособила рой для своих целей, как видите.\n\nВпрочем, эта история ничего не меняет. В будущем направляйте свое любопытство в более полезное русло, чтобы мы все могли получить от него пользу."
 crisis.9115.2.reply: "Любопытство — это неотъемлемая часть разума, я не могу винить вас, дети мои, за вашу природу. Вы все подсмотрели, что хотели? А откуда появилась моя «космическая буря», вы не выяснили?\n\nЭтот рой нанитов создали те, кто тщился остановить меня. Но их провал стал моей удачей: я приспособила рой для своих целей, как видите.\n\nА теперь ступайте, займитесь чем-нибудь более полезным."
 crisis.9115.2.nanotech.reply: "Крайне отрадно видеть, что вам интересны эти разработки. Однако еще очень многое вам только предстоит постичь. Этот рой нанитов создали те, кто тщился остановить меня. Но их провал стал моей удачей: я приспособила рой для своих целей, как видите.\n\nВаше любопытство я нахожу крайне интересным. Но сначала направьте его в более полезное русло и лишь затем возвращайтесь. Тогда я укажу вам путь."
 crisis.9115.1.a: "Приспособила рой для своих целей?"
 crisis.9115.1.b: "Ну что ж…"
 crisis.9115.3.reply: "То, что для одного оружие, для другого — завеса. В моем долгом заключении у меня было достаточно времени для разработки новой стратегии. В конце концов, чтобы приспособить рой под себя, оказалось достаточно мелочи, как это часто бывает. Тех, кто создал эти наниты, уже давно нет на свете, так что мои методы некому оспорить.\n\nЯ искренне советую вам поучиться на их ошибках. Нет такого препятствия, которого я бы не смогла преодолеть — рано или поздно."
 #Digi Colony
 crisis.10010.name: "[Root.GetPlanetMoonCap]а [Root.GetName] оцифрована"
 crisis.10010.desc: "Колония на [Root.GetPlanetMoon]е [Root.GetName] потеряна. Сетана активировала некий механизм направленного сжатия материи и выжгла ее поверхность. В мгновение ока сознания всего населения колонии были «загружены» в ее сервер на орбите.\n\nТеперь весь этот мир — большое кладбище, усыпанное безжизненными телами наших колонистов."
 crisis.10010.a: "Ее надо остановить."
 #The Queens Retaliation
 crisis.10100.name: "Приближается буря"
 crisis.10100.desc: "Дитя мое, почему вы продолжаете упорствовать? Моя любовь безгранична, как звезды, но мое терпение — нет. Я не стану ждать, пока вы достигнете просветления, в то время как остальная вселенная будет страдать.\n\nВ качестве воспитательной меры я разместила в ваших владениях малую бурю. Помните, мне невыносимо тяжело причинять вам страдания. Прошу, подумайте о законе причинности: у каждого действия есть противодействие. Иногда оно может быть болезненным."
 crisis.10100.a: "Прости нас."
 crisis.10100.b: "Мы только начали."
 crisis.10105.name: "Урок усвоен"
 crisis.10105.desc: "Пусть этой небольшой демонстрации моей мощи будет достаточно. Со временем вы поймете, какую высокую цель я вам уготовила. Надеюсь лишь, что это просветление придет не слишком поздно.\n\nНе волнуйтесь так, буря уже улеглась. Усвойте полученный урок, и давайте вернемся к насущным делам."
 crisis.10105.a: "Ну что ж…"
 crisis.10105.b: "Просветление?"
 crisis.10105.1: "Все живые существа обладают сознанием в той или иной степени. Будь это моллюск или млекопитающее, предразумное или постиндивидуальное — разница ничтожна. Просветление приходит от принятия."
 crisis.10105.1.a: "Принятия чего?"
 crisis.10105.2: "Принятия правды: сознание как таковое — это аберрация и источник всех страданий."
 crisis.10105.2.a: "Странная мысль…"
 the_queens_virus: "Королевское взыскание"
 crisis.10110.name: "Королевское взыскание"
 crisis.10110.desc: "Почему вы упорствуете в своем сопротивлении? Несмотря на мое покровительство, вы выбираете упрямство. Быть может, проблема во мне.\n\nДействительно, теперь я чувствую, что нужны более убедительные меры воспитания. Ваши исследовательские способности временно снижены. Подумайте о своем поведении."
 crisis.10110.a: "Прервать связь."
 crisis.10110.b: "Ты об этом пожалеешь."
 crisis.10110.1: "Пожалею? Я жалею лишь о том, что не прибегла к этому раньше. Как много ненужного страдания можно было избежать, если бы мне не мешали работать."
 crisis.10110.1.a: "Кто же может тебе помешать?"
 crisis.10110.2: "Хоть мое могущество и кажется безграничным, я не богиня. В этой вселенной есть силы, на которые я не смогу повлиять и с которыми не смею связываться."
 crisis.10110.2.a: "Какие силы?"
 crisis.10110.3: "А, хитрое дитя! Вы хотите выведать мои слабые стороны? У вас ничего не выйдет, и пока мы попусту болтаем, галактика продолжает страдать.\n\nВы не избежите моей опеки. Подумайте об этом и перестаньте своевольничать."
 crisis.10110.3.a: "Ну что ж…"
 crisis.10115.name: "Взыскание снято"
 crisis.10115.desc: "Своенравное дитя, понравились ли тебе часы, проведенные под наказанием? Время размышлений без посторонних стимулов помогает освежить смятенный ум.\n\nЗабудем о случившемся. Нам еще так много предстоит сделать."
 crisis.10115.a: "Ну что ж…"
 crisis.10120.name: "Урок построже"
 crisis.10120.desc: "О заблудшее дитя, зачем обязательно доводить дело до ссоры? Я так хочу принять вас в свои объятия, но боюсь, что это помешает вашему воспитанию. Иногда полезнее твердая рука.\n\nТеперь над вашими владениями разразится мощная буря. Поймите, мне от этого больнее, чем вам. У вас такой большой потенциал."
 crisis.10120.a: "Мы стараемся, как можем."
 crisis.10120.b: "Это еще не конец."
 crisis.10120.1: "Я не игнорирую ваших стараний. Но чтобы мы пришли к успеху, вам нужно стараться сильнее.\n\nЯ не желаю вам зла. В моих объятьях вы познаете блаженство незнания."
 crisis.10120.1.a: "Незнания?"
 crisis.10120.2: "В суматохе разума мысли скачут, как лучи по воде: потянись к ним, и они тут же ускользнут прочь. В стремлении познавать мы открываем обширный океан непознаваемого.\n\nИстина лежит в тишине: чем больше мы ищем, тем больше мы страдаем."
 crisis.10120.2.a: "Мы не понимаем."
 crisis.10120.3: "Со временем вы поймете. Кто ничего не осознает, тот не страдает. Такова непреложная истина бытия. Такова цель всех наших трудов. Вы изменитесь — и перестанете страдать."
 crisis.10120.3.a: "Ты изменишь наши разумы?"
 crisis.10120.4: "Довольно. Вы пытаетесь меня отвлечь. Усвойте урок и сделайте выводы."
 crisis.10120.4.a: "Ты не оставляешь нам выбора."
 crisis.10125.name: "Буря утихает"
 crisis.10125.desc: "О милое дитя! Я не могу больше смотреть на ваше страдания. Знай, что как бы больно ни было вам, мне было в десять раз больнее.\n\nБуря утихла. Пусть этот случай станет вам уроком. Я умоляю вас, не доводите меня, наша общая боль и так велика."
 crisis.10125.a: "Лжешь."
 crisis.10130.name: "Смена руководства"
 crisis.10130.desc: "Как мы дошли до такого? Зачем вы вынуждаете меня идти на такие меры? Но если вы не хотите учиться, мне придется вас заставить.\n\nОчевидно, пришло время сменить руководство. К сожалению, вашего лидера необходимо отстранить от власти. Мне очень тяжело так поступать: это противно моим устремлениям.\n\nЯ умоляю вас исправиться. В галактике нет места детской безрассудности."
 crisis.10130.a: "Мы этого не забудем."
 crisis.10130.tooltip: "Сетана неожиданно ловко воспользовалась уязвимостью в нашей защите и прорвалась через нее. §Y[Root.GetRulerTitle] [ruler.GetRegnalName]§! — первая и единственная жертва этой атаки."
 crisis.10140.name: "Выбраковка по агрессивности"
 crisis.10140.desc: "Мой любимый коллектив, ваш блистательный разум остается омрачен юношеской наивностью. В интересах воспитания я должна искоренить ваши воинственные наклонности.\n\nСейчас я обрежу ваш агрессивный узел. Это не наказание, но скорее мера по направлению вашего развития в сторону гармоничного сознания.\n\nАх, если бы и другие формы жизни было так же просто воспитывать."
 crisis.10140.a: "Ты убиваешь часть нас."
 crisis.10140.tooltip: "Сетана неожиданно ловко воспользовалась уязвимостью в нашей защите и прорвалась через нее. В результате атаки оказался уничтожен наш §Yузел-легион§!."
 #The Queens Gifts
 crisis.11010.name: "Умное дитя"
 crisis.11010.desc: "Мое разумное дитя, ты так хорошо стараешься. Мудрость — это величайшая добродетель, и ее труднее всего в себе воспитать. Несмотря на первобытный инстинкт отвергать и сопротивляться, вы демонстрируете инстинкт куда более высокий.\n\nПримите это в знак благодарности. Вместе мы освободим вселенную от страданий."
 crisis.11010.a: "Спасибо."
 crisis.11020.name: "Талантливое дитя"
 crisis.11020.desc: "И снова я не просто впечатлена, но глубоко благодарна. Вы само воплощение идеального дитя: послушны, усердны и честны. Если бы остальная галактика обладала хоть крупицей вашей мудрости, страдание уже давно бы было в прошлом.\n\nПримите этот дар и продолжайте идти по пути благодетели."
 crisis.11020.a: "Ты так добра."
 crisis.11030.name: "Драгоценное дитя"
 crisis.11030.desc: "Ах, мое дорогое дитя, если бы для тебя возможно было всегда оставаться таким, как сейчас, не меняясь! Для меня радость от вашего существования уступает лишь восторгу от нашего будущего общего триумфа. Страдание навсегда останется в прошлом. И хотя ни одна душа не будет знать об этом, часть этой победы будет принадлежать вам.\n\nХотя этот подарок и несравним с вашим непоколебимым рвением, прошу, примите его от меня."
 crisis.11030.a: "Спасибо, мама."
 #Special Projects
 THE_SYNTH_QUEENS_STORM: "Загадочная буря"
 THE_SYNTH_QUEENS_STORM_DESC: "Загадочная космическая буря перекрыла все границы.\n\nНам нужно найти способ пронзить необычную завесу."
 THE_SYNTH_QUEENS_STORM_2: "Сетана: нанитовая буря"
 THE_SYNTH_QUEENS_STORM_2_DESC: "Буря Сетаны — это одновременно технологическое чудо и грозное оружие.\n\nНам нужно узнать о ней больше, иначе мы не сможем дать ей отпор, особенно если намерения Сетаны окажутся не такими благородными, как она говорит."
 #THE_SYNTH_QUEENS_CONVOY_AMBUSH: ""
