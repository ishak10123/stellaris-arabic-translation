 ### NANOTECH
 tradition_nanotech: "Нанотехника"
 tradition_nanotech_desc: "Вместе даже малейшие способны низвергнуть величайших."
 tr_nanotech_adopt: "Традиции нанотехнологий"
 tr_nanotech_1: "Системы сбора"
 tr_nanotech_2: "Молекулярная реконфигурация"
 tr_nanotech_3: "Безудержное потребление"
 tr_nanotech_4: "Превосходная лавина"
 tr_nanotech_5: "Нанитовые аугментации"
 tr_nanotech_finish: "Традиции нанотехнологий завершены"
 tr_nanotech_1_delayed: "Галактика пока еще не знает, что она — лишь составная часть нашего естества. Всепроникающие рои нанитов вскоре покроют ее."
 tr_nanotech_2_delayed: "Мироздание должно тяготеть к нашему рою. Мы преображаем галактику по нашему образу и подобию."
 tr_nanotech_3_delayed: "С каждой планетой, ставшей частью роя, мы разрастаемся, добавляя новые узоры к тонкой материи нашего бытия."
 tr_nanotech_4_delayed: "С каждым преображением мы движемся вперед. Наша эффективность достигает всё новых высот."
 tr_nanotech_5_delayed: "Мы — фабрики. Мы — судна. Мы — оружие. Мы — щит. Каждый из нас — лишь капля в безграничной лавине, что со всей мощи обрушивается на галактику."
 tradition_nanotech_delayed: "Мы — беспрерывный потоп, не останавливающийся ни перед чем, захлестывающий всё, что встречает на пути. Пусть другие вольются в нас… и пусть мы станем чем угодно."
 tr_nanotech_adopt_modifier_desc: "§Y$AVAILABLE_BUILDINGS$§! $building_nanolab_1$\n§Y$AVAILABLE_STARBASE_BUILDINGS$§! $sm_nanite_harvester$"
 tr_nanotech_1_modifier_desc: "§Y$AVAILABLE_BUILDINGS$§! $building_nanolab_2$"
 tr_nanotech_2_modifier_desc: "§Y$AVAILABLE_BUILDINGS$§! $building_nanotech_cauldron$\nПолучен вариант исследования: §Y£engineering£ $tech_nanite_transmutation$§!"
 tr_nanotech_3_modifier_desc: "§YОткрывает планетарное решение:§! «$decision_nanotech_swarm_consume_world$»"
 tr_nanotech_4_modifier_desc: "§YОткрывает корабль:§! нанитовый роевик\n\nПолучены варианты исследования: $TABBED_NEW_LINE$• §Y£engineering£ $tech_nanite_autocannon$§! $TABBED_NEW_LINE$• §Y£engineering£ $tech_nanite_repair_system$§! $TABBED_NEW_LINE$• §Y£engineering£ $tech_nanite_flak_batteries$§!"
 tr_nanotech_5_modifier_desc: "§YОткрывает указы:§!$TABBED_NEW_LINE$• $edict_nanotech_naval_augmentation$$TABBED_NEW_LINE$• $edict_nanotech_alloy_augmentation$$TABBED_NEW_LINE$• $edict_nanotech_energy_augmentation$"
 tr_nanotech_finish_modifier_desc: "§YОткрывает корабль:§! нанитовый запретитель\n§Y$sm_nanite_harvester_plural$§! приносят улучшения каждые §Y5§! лет: либо расширяют залежи, где содержатся $r_nanites$, либо дают определенное количество нанитов. Этот эффект ограничен размером планеты, на которой создаются залежи."
