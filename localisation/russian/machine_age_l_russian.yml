 #ARC WELDERS ORIGIN
 ##########################
 origin_arc_welders: "Дуговые сварщики"
 origin_arc_welders_desc: "Их планета безжизненна, но родная система полна богатств. Для их разработки эти машины построили проект невиданных доселе масштабов. Теперь в небе над их головами нависает могучая §H$tech_orbital_arc_furnace$§! — но ее изобретательные создатели стремятся к еще большему.\n\nГалактика ждет, возможности бесконечны. Нужно только умение их реализовать."
 origin_tooltip_arc_builders_effects: "- $HOMEWORLD$ начальные ['concept_mining_district', £district£ $district_mining_plural$] заменяются на ['concept_generator_district', £district£ $district_generator_plural$] $NEW_LINE$- $HOME_SYSTEM$ на орбите ['concept_pc_molten', расплавленного мира] построена ['concept_arc_furnace'] $NEW_LINE$- $ADDITIONAL_TECHNOLOGIES_STRING$ ['concept_orbital_arc_furnace',£engineering_research£ $tech_orbital_arc_furnace$] $NEW_LINE$- $GUARANTEED_RESEARCH_OPTION_STRING$ ['concept_mega_engineering', £engineering_research£ $tech_mega_engineering$] после строительства второй дуговой печи."
 origin_tooltip_arc_builders_negative_effects: "– $INITIAL_POPS$ §R−300§! $NEW_LINE$– Размер родного мира: £planetsize£ 15"
 START_SCREEN_ARC_WELDERS: "После многих лет хищнической эксплуатации поверхность [Root.Capital.GetPlanetMoon]ы [Root.Capital.GetName] совершенно лишена ресурсов. Но в небесах над ней таятся несметные богатства, и, вооруженные амбициями и изобретательностью, мы готовы построить новый дом в космосе.\n\nСтроительство первого этапа дуговой мечи было колоссальным предприятием, и потенциал его неизмерим. Очевидный следующий шаг — закончить проект и вывести его на полную мощность: только тогда мы сможем добывать ресурсы всей нашей системы. Но что таится за пределами наших границ? Какие невероятные возможности ждут наших талантливых инженеров?\n\nС открытием путешествий быстрее скорости света наши проекты больше не ограничиваются одной системой. Теперь вся галактика — это наш кульман: пришло время заточить карандаши."
 concept_arc_furnace: "$orbital_arc_furnace_1$"
 concept_arc_furnace_desc: "§EЭффекты:§!$NEW_LINE$$orbital_arc_furnace_1_mod_tooltip$\n\n§L$tech_orbital_arc_furnace_desc$§!"
 concept_orbital_arc_furnace: "$tech_orbital_arc_furnace$"
 concept_orbital_arc_furnace_desc: "§IОткрывает мегасооружение:§! $orbital_arc_furnace_4$ $DOUBLE_NEW_LINE$§L$tech_orbital_arc_furnace_desc$§!"
 concept_mega_engineering: "$tech_mega_engineering$"
 concept_mega_engineering_desc: "• $MOD_COUNTRY_RESOURCE_MAX_ADD$: §G+20000§! $NEW_LINE$• §I$UNLOCKS_FEATURE$§! «Восстановление мегасооружений» $DOUBLE_NEW_LINE$§L$tech_mega_engineering_desc$§!"
 machine_age.3400.name: "Топливо для кузни"
 machine_age.3400.desc: "Даже издали система [From.GetName] казалась идеальным кандидатом. Теперь же, после полного исследования системы, сомнений не осталось: расплавленный мир и газовый гигант, обилие астероидов и лун — идеальное место для новой дуговой печи.\n\nСледующим логичным шагом станет отправка строительного корабля и начало работ. Пора зажечь печь."
 ideal_furnace_system_poi: "Идеальная система-кузня"
 ideal_furnace_system_name: "[From.GetName]"
 ideal_furnace_system_desc: "Идеальная система для постройки второй дуговой печи."
 ideal_furnace_system: "Обнаружена идеальная система"
 ideal_furnace_chain_title: "Топливо для кузни"
 ideal_furnace_chain_desc: "Мы обнаружили идеальную систему для постройки второй дуговой печи."
 machine_age.3405.name: "Дуговой горизонт"
 machine_age.3405.desc: "Дуговая печь в нашей родной системе доказала жизнеспособность концепции и стала свидетельством наших амбиций и гениальности. Теперь в системе [from.GetName] пылает вторая печь.\n\nРезультат наших трудов станет не просто источником ресурсов. Он открывает двери созданию проектов титанических размеров и масштабов. Мы словно бы оказались на грани бескрайнего горизонта, будущее открыто перед нами.\n\nНас не сдерживает ничего, кроме нашего воображения."
 ##########################
 #SYNTHETIC FERTILITY
 ##########################
 #Event Chain
 synthetic_fertility_chain_title: "$origin_synthetic_fertility$"
 synthetic_fertility_chain_desc: "Мы лишились способности к размножению. Наш родной мир полон брошенных образовательных центров. Детские площадки опустели. Однажды настанет день, когда умрет последний представитель нашего народа. Нашей надеждой является репозиторий личностей.\n\nДля возвращения в реальный мир мы должны разработать синтетические тела и достаточно сложный позитронный мозг."
 #Origin Text
 origin_synthetic_fertility: "Синтетическая репродуктивность"
 origin_synthetic_fertility_desc: "§RВНИМАНИЕ: вам будут недоступны все пути возвышения, кроме ['concept_synthetic_ascension', синтетического].§!\n\nКогда-то это общество процветало, но новая генетическая болезнь лишила эту расу способности к размножению. Оказавшись перед лицом вымирания, они решили доверить свое будущее цифровому спасению."
 origin_tooltip_synthetic_fertility_effects: "- $INITIAL_POPS$ §G+900§! $NEW_LINE$- $SPECIES_TRAITS$ «['concept_pathogenic_genes', Дефективные гены]»\n• Родной мир: $TABBED_NEW_LINE$- Размер: £planetsize£ 20 $TABBED_NEW_LINE$- ['concept_abandoned_cities', £blocker£ Заброшенные города]: +2 $TABBED_NEW_LINE$- ['concept_identity_repository',£building£ Репозиторий личностей] $TABBED_NEW_LINE$- ['concept_abandoned_gene_clinic',£building£ Заброшенная генная клиника] $NEW_LINE$- Инцидент: «['concept_identity_rescue', Быстрое сохранение личности]» $NEW_LINE$- $ADDITIONAL_TECHNOLOGIES_STRING$ «['concept_synth_ai', Технологии ИИ]» $NEW_LINE$- $GUARANTEED_RESEARCH_OPTION_STRING$ «['concept_robotic_workers', £engineering_research£ искусственная рабочая сила]»"
 origin_tooltip_synthetic_fertility_negative_effects: "• £pop£ §HНаселение§! убывает"
 START_SCREEN_SYNTHETIC_FERTILITY: "Ранние попытки работать с искусственным сознанием привели к революции и породили полноценное цифровое сообщество, размыв грань между физическим и виртуальным мирами. Успех был настолько значительным, что мы расслабились, поверив, что у нас будет еще множество поколений для инноваций и исследований.\n\nМы ошибались.\n\nКогда новая болезнь атаковала наш генетический код, мы лишились способности к размножению. Наши лучшие умы оказались не в силах найти лекарство. Старение и сокращение населения привело к панике.\n\nВ отчаянии мы расширили цифровое хранилище и создали достаточно «пространства» для сохранения своих личностей. Но такой ли жизни мы желаем? Теперь нашей главной целью стало создание синтетических тел и достаточно сложного позитронного мозга, которые позволили бы нам остаться в физическом мире."
