 policy_virtuality_focus: "Политика упора на виртуальность"
 policy_virtuality_focus_desc: "Мы можем выбрать, на что направить вычислительные мощности в интересах народа."
 virtuality_research_focus: "Упор на виртуальные исследования"
 virtuality_research_focus_desc: "Виртуальный разум способен осознавать и решать проблемы, которые менее развитые индивиды сочтут невозможными.\n\n"
 virtuality_unity_focus: "Упор на виртуальное единство"
 virtuality_unity_focus_desc: "Не бывает скверных данных и слабых серверов.\n\n"
 virtuality_leader_focus: "Упор на виртуальных лидеров"
 virtuality_leader_focus_desc: "Подпрограммы глубокого обучения задействуют алгоритмы самосовершенствования.\n\n"
