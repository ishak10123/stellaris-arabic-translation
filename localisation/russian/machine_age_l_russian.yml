 leaking_atmosphere_desc: "После уменьшения массы этому космическому телу стало сложнее удерживать атмосферу."
 COSMOGENESIS_LEAKING_ATMOSPHERE: "Стабилизировать атмосферу"
 COSMOGENESIS_LEAKING_ATMOSPHERE_DESC: "Отправить бригаду на [root.location.GetPlanetMoon]у [root.location.getName] для восстановления пострадавшей атмосферы."
 cosmogenesis_sped_up: "С ускорением"
 cosmogenesis_sped_up_desc: "Эта планета перескочила в соседний временной поток."
 cosmogenesis_superconductor: "Стабильная сверхпроводимость"
 cosmogenesis_superconductor_desc: "Внесенная в реальность поправка улучшила наши сверхпроводники."
 cosmogenesis_space_compression: "Сжатие подпространства"
 cosmogenesis_space_compression_desc: "Благодаря частичному перемещению в сжатое подпространство наши корабли могут передвигаться значительно быстрее."
 cosmogenesis_higher_yield_payloads: "Более мощные боевые заряды"
 cosmogenesis_higher_yield_payloads_desc: "Внесенная в реальность поправка повысила мощность наших боеголовок."
 cosmogenesis_slightly_bigger: "Чуть больше размером"
 cosmogenesis_slightly_bigger_desc: "Внедрение материи из другого измерения привело к необратимому увеличению размеров этой планеты."
