 leader_trait_robotic_surrogate: "Робот-суррогат"
 leader_trait_robotic_surrogate_desc: "Этот громоздкий и медленный робот является суррогатом для оцифрованного лидера из репозитория личностей."
 #Buildings
 building_identity_repository: "Репозиторий личностей"
 building_identity_repository_tt: "Этот репозиторий содержит следующее количество личностей: §Y[Owner.GetTotalIdentities]§!. $building_identity_repository_scaling$"
 building_identity_repository_scaling: "\n\nКаждая личность увеличивает производительность репозитория и стоимость его содержания. Этот показатель распределяется между всеми репозиториями на наших планетах.\n"
 building_identity_repository_desc: "До момента смерти тела разум подвергается оцифровке. В безопасности репозитория мы продолжаем трудиться на благо общества."
 building_abandoned_gene_clinic: "Заброшенная генная клиника"
 building_abandoned_gene_clinic_tt: "§RНельзя снести, заменить или восстановить§!"
 building_abandoned_gene_clinic_desc: "Когда мы потеряли способность производить потомство естественным способом, наше медицинское сообщество соорудило эту современнейшую генную клинику. Как многие другие объекты нашей инфраструктуры, теперь она стоит заброшенная — постоянное напоминание о постигшей нас беде и об острой нужде в новом пути спасения."
 #Situation Events
 machine_age.3100.name: "Цифровое спасение"
 machine_age.3100.desc: "Медицина бессильна, и наш лучший шанс на спасение лежит в оцифровке населения в §Yрепозитории личностей§!. Однако это лишь временное решение. В дальнейшем планируется разработать синтетические тела и сложный позитронный мозг. По нашим расчетам, у нас достаточно времени на завершение исследований, если мы бросим на это все силы.\n\nС помощью передовых ИИ наши лучшие эксперты уже подготовили чертежи роботов, которые станут первым шагом на пути к синтетическому спасению."
 machine_age.3100.a: "Это должно сработать."
 machine_age.3110.name: "Рабочие-роботы"
 machine_age.3110.desc: "Наши исследования роботизированных тел завершены. $building_abandoned_gene_clinic$ превращена в роботостроительные заводы, прототипы усовершенствованы и испытаны. Пока что этим рудиментарным системам недостает вычислительных мощностей, чтобы вместить индивидуальные сознания, но они могут частично заменить убывающую рабочую силу. Позитронное подключение позволит обитателям цифрового пространства повышать производительность этих роботов за счет опыта и знаний.\n\nВ то же время наши системы искусственного интеллекта разработали чертежи новых перспективных андроидов. Наши стареющие инженеры готовы приступить к работе."
 machine_age.3110.a: "Одна стадия завершена."
 machine_age.3110.a.tooltip: "[Root.Capital.GetName]:\n• §Y$building_robot_assembly_plant$§!: §G+1§! \n• £pop£§H Механические поселения§!: §G+300§!"
 machine_age.3115.name: "Усовершенствование андроидов"
 machine_age.3115.desc: "Этот прорыв в технологии робототехники позволит нам колонизировать другие планеты, а наше механизированное население теперь сможет выполнять более сложные задачи.\n\nНаши ИИ-системы считают, что следующим шагом нам следует воспроизвести их позитронные матрицы в синтетических телах. Этот серьезный научный проект позволит нам вернуть оцифрованное сознание в естественный мир."
 machine_age.3115.a: "Нам нельзя сдаваться."
 machine_age.3120.name: "Последний шаг"
 machine_age.3120.desc: "Наша титаническая работа наконец-то увенчалась успехом. Нам удалось создать рабочий позитронный мозг, достаточно сложный, чтобы вместить наши личности.\n\nХоть мы и не можем победить смертность, бремя биологического существования нас скоро перестанет ограничивать."
 machine_age.3120.a: "Пришло время нашего синтетического пробуждения."
 machine_age.3120.a.tooltip: "Чтобы получать эти события, мы должны принять §Yтрадиции синтетиков§!."
 machine_age.3125.name: "Цифровая мечта"
 machine_age.3125.both: "Наши сборочные линии и эксперты по синтетизации готовы запустить грандиозный процесс переноса личностей в позитронные мозги и синтетические тела."
 machine_age.3125.desc: "$machine_age.3125.both$\n\nМы начнем с тех, кто до сих пор живет в физическом мире в надежде раз и навсегда покончить с генетической болезнью. Расширенные вычислительные мощности синтетического мозга позволят нам даже превзойти возможности наших старых биологических тел.$synth.105.end$"
 machine_age.3125.nobody.desc: "$machine_age.3125.both$\n\nОставшись без физического присутствия в реальном мире, мы должны как можно скорее разработать прототип искусственного тела. Расширенные вычислительные мощности синтетического мозга позволят нам даже превзойти возможности наших старых биологических тел.$synth.105.end$"
 machine_age.3125.a: "Начнем же перенос личностей."
 machine_age.3125.a.tooltip: "Любые оставшиеся биологические поселения начнут переселяться в синтетические тела."
 machine_age.3200.name: "Цифровое чистилище"
 machine_age.3200.desc: "Сбылись наши самые худшие страхи.\n\nПоследние наши физические тела погибли. Хотя оцифрованные сознания удалось спасти и сохранить в репозитории личностей, у нас всё ещё нет технологий переноса разума в искусственный мозг.\n\nПока мы не закончим исследования, нашим цифровым лидерам придется взаимодействовать с реальным миром через роботов-посредников."
 machine_age.3305.name: "Виртуальное спасение"
 machine_age.3305.desc: "Мы обеспечили выживание нашего народа, перенеся сознания либо в новые синтетические тела, либо в репозиторий личностей.\n\nОднако возникла новая проблема. Созданное нами цифровое «пространство» для оцифрованных личностей задумывалось как временное решение, но обитатели репозитория привыкли к такому существованию и теперь не очень-то хотят возвращаться в реальный мир.\n\nМы могли бы позволить им остаться там, но можно и попытаться убедить их переселиться в новые синтетические тела."
 machine_age.3305.a: "Пусть наслаждаются нирваной."
 machine_age.3305.a.tooltip: "Эти оцифрованные сознания останутся в §Yрепозитории личностей§! и продолжат помогать нашим согражданам."
 machine_age.3305.b: "Мы сильнее вместе."
 machine_age.3305.b.tooltip: "Мы поместим оставшиеся цифровые личности в имеющиеся синтетические тела, а для остальных построим новые носители. §Y$building_identity_repository$§! будет ликвидирован."
 machine_age.3310.name: "Синтетическое перерождение"
 machine_age.3310.desc: "Уже много десятилетий [Root.Owner.GetSpeciesNamePlural] не держали на руках новорожденного младенца. Пускай нам больше никогда не испытать этого чувства, но сегодня у нашего народа снова появилась надежда.\n\nМы разработали §Yличностные комплексы§! — новейшие центры, в которых мы сможем копировать существующие личности, фактически создавая новых соплеменников.\n\nМы можем создавать новые личности, случайным образом комбинируя их из элементов нескольких уже существующих сознаний. Или же мы можем симулировать естественный процесс формирования личности, взращивая «ядра разума» в открытом виртуальном пространстве."
 machine_age.3310.a: "Мы будем смешивать наши умы."
 machine_age.3310.building_tooltip.a.tt: "$unlock_edict_tt$ ['concept_edict_subsidized_identity_backups']\n$unlock_edict_tt$ ['concept_edict_optimized_identity_creation']\n\n$synth.405.a.tt$\n§YОткрывает сооружение:§! $building_identity_complex$"
 machine_age.3310.b: "Иногда можно положиться на природу."
 machine_age.3310.building_tooltip.b.tt: "$unlock_edict_tt$ ['concept_edict_subsidized_identity_backups']\n$unlock_edict_tt$ ['concept_edict_optimized_identity_creation']\n\n$synth.405.b.tt$\n§YОткрывает сооружение:§! $building_identity_complex$"
 machine_age.3315.name: "Заря эпохи синтетиков"
 machine_age.3315.desc: "Сегодня мы завершаем наш путь к цифровому преобразованию. Никто не сможет отрицать колоссальных размеров проделанной работы и жертв, на которые нам пришлось пойти.\n\nСегодня мы — новая, полностью оцифрованная и синтетическая раса. Теперь нам не страшны болезни. Теперь нас не сковывают ограничения генетики.\n\nМы вольны строить ту реальность, какую захотим."
 machine_age.3315.a: "Да здравствует синтетическое будущее!"
 machine_age.3315.a.tooltip: "Завершается цепочка событий: §Y$origin_synthetic_fertility$§!."
 machine_age.3315.a.tt: "Раса §Y[This.Owner.GetSpeciesName]§! получает признак ['concept_synthetic_dawn', синтетическое спасение]"
 synthetic_dawn: "Заря синтетиков"
 synthetic_dawn_desc: "Мы наконец преобразили себя, став полностью цифровым синтетическим народом, вольным творить любую реальность по своему желанию."
 trait_robot_synthetic_dawn: "Синтетическое спасение"
 trait_robot_synthetic_dawn_desc: "Эта синтетическая раса отринула свое биологическое прошлое и пришла к расцвету в новом, цифровом облике."
 concept_synthetic_dawn: "$trait_robot_synthetic_dawn$"
 #Situations
 situation_synthetic_fertility_digitization: "Быстрое сохранение личности"
 situation_synthetic_fertility_digitization_type: "Быстрое сохранение личности"
 situation_synthetic_fertility_digitization_monthly_change_tooltip: "Мы исследуем технологию пополнения физического населения."
 situation_synthetic_fertility_digitization_desc: "Мы не можем производить потомства, но мы можем сохранить наши умы. Это медленный, но необходимый процесс.\n\nСо временем мы сможем вернуться в физический мир, но для этого нам будет нужно изобрести синтетические замены нашим потерянным телам."
 situation_synthetic_fertility_approach_none: "Первым делом экономика"
 situation_synthetic_fertility_approach_none_desc: "Нам нужно соблюдать баланс между нуждами проекта и интересами экономики."
 situation_synthetic_fertility_approach_tech_low: "Дополнительные средства"
 situation_synthetic_fertility_approach_tech_low_desc: "Мы направим часть средств на исследования в ущерб экономике."
 situation_synthetic_fertility_approach_tech_high: "Упор на науку"
 situation_synthetic_fertility_approach_tech_high_desc: "Для выживания нам нужны жесткие экономические решения."
 situation_synthetic_fertility_approach_unity_low: "Виртуальное проектирование"
 situation_synthetic_fertility_approach_unity_low_desc: "Мы предоставим лучшим оцифрованным личностям больше энергии для работы над синтетическим телом."
 situation_synthetic_fertility_approach_unity_high: "Чрезвычайные меры"
 situation_synthetic_fertility_approach_unity_high_desc: "Основные источники энергии будут перенаправлены на оцифрованные личности для полной замены тел нашей расы."
 situation_synthetic_fertility_complete: "К этому моменту наши физические воплощения вымрут. Население будет полностью оцифровано."
 stage_synthetic_fertility_problem_effects: "Для сохранения присутствия в физическом мире необходимо разработать передовые синтетические тела и сложный позитронный мозг."
 stage_synthetic_fertility_danger_effects: "Мы потеряли уже больше половины населения, нам нужно направить на изучение синтетиков."
 stage_synthetic_fertility_crisis_effects: "Нас осталось совсем мало. Мы должны сделать все возможное, чтобы создать достаточно сложный позитронный мозг."
 situation_synthetic_fertility_synthesization_outcome: "Мы не успокоимся, пока не защитим будущее своего народа."
 situation_no_synthetics_adopt: "£trigger_no£ Нужно принять $tr_synthetics_adopt$"
 situation_no_robot_research: "£trigger_no£ Нужно исследовать §Yтехнологии робототехники§!"
 situation_synthetic_fertility_synthesization: "Синтетизация"
 situation_synthetic_fertility_synthesization_type: "Синтетизация"
 situation_synthetic_fertility_synthesization_monthly_change_tooltip: "Создание цифровых тел уже началось. Синтетическое будущее все ближе."
 situation_synthetic_fertility_synthesization_desc: "Теперь у нас есть необходимые знания для завершения роботизации нашего населения.\n\n\n§YГруппы населения, которые получат синтетические тела в следующем месяце§!: §G[From.GetSynthFertPopsPerMonth]§!"
 stage_1_synthetic_fertility_synthesization_effects: "В качестве синтетических тел для нашего оцифрованного населения будут использованы имеющиеся роботы."
 stage_2_synthetic_fertility_synthesization_effects: "Для оставшегося населения мы соберем новые тела — то есть новых роботов."
 situation_synthetic_fertility_synthesization_careful: "Постепенный подход"
 situation_synthetic_fertility_synthesization_careful_desc: "$situation_synthetic_fertility_synthesization_careful$"
 situation_synthetic_fertility_synthesization_careful_tooltip: "Скорость выгрузки: §Y100§! £pop£ §Hпоселений§! в месяц"
 situation_synthetic_fertility_synthesization_full_speed: "Полный ход"
 situation_synthetic_fertility_synthesization_full_speed_desc: "$situation_synthetic_fertility_synthesization_full_speed$"
 situation_synthetic_fertility_synthesization_full_speed_tooltip: "Скорость выгрузки: §Y200§! £pop£ §Hпоселений§! в месяц"
