 concept_universal_augmentations_traits_desc: "$concept_universal_augmentations_traits$ — признаки расы, которые могут подвергаться автоматической модификации посредством признака «['trait:trait_auto_mod_cyborg']».$NEW_LINE$$concept_automodding_cyborg_desc$"
