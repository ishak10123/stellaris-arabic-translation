 machine_age.1075.desc: "Настал час божественного слияния.\n\nОсталось лишь построить на всех планетах священные §Yцентры аугментации§!, чтобы приступить к вознесению. "
 machine_age.1075.a: "$machine_age.1090.pray$"
 machine_age.1075.a.tooltip: "Начинается полная аугментация верующих. Все остальные действия конклава возобновятся только по завершении божественного слияния.\n\n§RНеобходимо действие:§!\nПостройте $building_augmentation_center$, чтобы продолжить инцидент §Y«$situation_cybernetic_creed_cyberization$»§!."
 machine_age.1090.name: "Будущее нашей плоти"
 machine_age.1090.desc: "Наш долгий путь почти закончился. Священное слияние породило союз: [Owner.Species.GetFleshTypeCyberCreed] и машина — все подвластны Божьей воле. Остался последний шаг — вживление священных имплантатов."
