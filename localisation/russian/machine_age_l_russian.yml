 building_augmentation_bazaars: "Базар аугментаций"
 building_augmentation_bazaars_desc: "В этом расцвеченном неоновыми вывесками лабиринте обосновались продавцы имплантатов и подпольные клиники, здесь можно найти и вживить себе любое кибернетическое улучшение, легальное и нелегальное."
 concept_augmentation_bazaars: "$building_augmentation_bazaars$"
 building_augmentation_bazaars_branch: "Межпланетный рынок имплантатов"
 building_augmentation_bazaars_branch_desc: "Хотите бегать быстрее, прыгать выше, мыслить шире, жить дольше? Теперь на вашем местном рынке имплантатов вы найдете экзотические модели со всей галактики."
