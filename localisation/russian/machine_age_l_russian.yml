 #Fallen Empire Reactions
 action.1.desc_111: "Неразумные дети! Вы утверждаете, что вам ведома Божья воля, однако [Owner.Species.GetFleshTypeCyberCreed] ваших тел знает лишь осквернение. Знайте, что мы — [contact_empire.GetName], избранный народ этой галактики. Не оскверняйте своим присутствием наши священные места, иначе месть наша будет быстрой и жестокой."
 action.1.desc_110: "Мы, [contact_empire.GetName], — избранный народ этой галактики. Веками мы пренебрегали духовными потребностями низших рас, и те нечистые сосуды, которые вы зовете телами, — показательный пример нашего недосмотра. Примите наши принципы и обратитесь в нашу веру, иначе мы сотрем вас в порошок."
 #Cybernetic Situation Events
 machine_age.90.name: "Божественные имплантаты"
 machine_age.90.desc: "Верующие открыли нашему народу таинство кибернетики. Сегодня начинается новый путь: мы должны принять божественное слияние с распростертыми объятиями."
 machine_age.90.a: "Настал час."
 machine_age.90.a.tooltip: "Чтобы приступить к божественному слиянию, понадобится принять традицию «['tradition_category:tradition_cybernetics']»."
 machine_age.100.name: "Конклав по слиянию"
 machine_age.100.desc: "На протяжении долгих лет необдуманные попытки улучшить наши бренные сосуды оканчивались неудачей: каждый раз [Owner.Species.GetFleshTypeCyberCreed] отторгает имплантаты, нанося телу страшные раны. В умах толкователей Божьей воли возник разброд. Никто не может себе представить, каковым должно быть божественное слияние.\n\nНо сегодня, когда благодаря последним достижениям науки стала возможна полная аугментация, верховные представители нашего духовенства, техножрецы, решили созвать конклав с целью определить руководящие принципы церкви и объединить различные вероучения в единую догму."
 machine_age.100.a: "Да направит их Бог."
 machine_age.1000.name: "Единение вер"
 machine_age.1000.desc: "Созвать конклав техножрецов оказалось непросто: присутствия потребовали представители каждого крупного вероисповедования. Поразмыслив, мы решили, что приглашения получат и §Y$CYBERCREED_construction$§!, и §Y$CYBERCREED_war$§!, и §Y$CYBERCREED_research$§!, и §Y$CYBERCREED_labor$§!.\n\nКонклав взялся за богоугодное дело с горячим рвением. Первое же постановление гласит, что население обязано выплачивать десятину в повышенном размере либо участвовать в принудительных общественных работах."
 machine_age.1000.a: "Нужно определиться, как именно поддержать конклав."
 machine_age.1000.a.tooltip: "В дальнейшем будут доступны другие варианты действий."
 machine_age.1010.name: "Хартия аугментаций"
 machine_age.1010.desc: "Во вторую очередь конклав техножрецов постановил документально закрепить государственное вероучение. Пора избавиться от расхождений в религиозных взглядах: разногласия ослабляют общество.\n\nКаждый из приглашенных представителей представил убедительные аргументы в пользу единой веры, в то время как сторонники более умеренного подхода агитируют за открытость и терпимость."
 machine_age.1010.a: "Братство Молота построит нам светлое будущее."
 machine_age.1010.a.tooltip: "§Y$CYBERCREED_construction$§! станет центром формирования новой догмы.\n$machine_age.1010.shared.tooltip$"
 machine_age.1010.b: "Храмовники Стали — та сила, при которой [Owner.Species.GetFleshTypeCyberCreed] будет в безопасности."
 machine_age.1010.b.tooltip: "§Y$CYBERCREED_war$§! станут центром формирования новой догмы.\n$machine_age.1010.shared.tooltip$"
 machine_age.1010.c: "Хор Разума воспоет наш прогресс."
 machine_age.1010.c.tooltip: "§Y$CYBERCREED_research$§! станет центром формирования новой догмы.\n$machine_age.1010.shared.tooltip$"
 machine_age.1010.d: "Коммуна Труда напомнит, что слово «рабочий» — не пустой звук."
 machine_age.1010.d.tooltip: "§Y$CYBERCREED_labor$§! станет центром формирования новой догмы.\n$machine_age.1010.shared.tooltip$"
 machine_age.1010.e: "Пора положить конец догмам, которые лишь разделяют нас."
 machine_age.1010.e.tooltip: "Все культы будут преобразованы в один: §Y$pft_cyber_creed_general$§!, и его модификации станут доступны каждому верующему.\n$machine_age.1010.shared.tooltip$"
 machine_age.1010.shared.tooltip: "Все сооружения, принадлежащие другим культам, будут заменены на §Yхрамы§!.\nЭта конфессия останется единственной §Yспиритуалистской фракцией§!.\nСохранится возможность формирования фракций по §Yнеспиритуалистским§! принципам."
 machine_age.1020.name: "Ложные верования"
 machine_age.1020.desc.pickedacreed: "Представители других культов запротестовали против решения конклава: многие считают, что §Y[GetCyberCreed]§! — ложная вера.\n\n$machine_age.1020.both$"
 machine_age.1020.desc.nocreed: "Представители культов протестуют: они считают, что конклав отрекся от веры.\n\n$machine_age.1020.both$"
 machine_age.1020.both: "Обстановка накалена, однако протесты пока идут мирно. Лишь со временем станет понятно, хватит ли этой искры, чтобы разжечь пламя.\n\nКак бы то ни было, нужно решить, какая судьба ждет другие культы. Кто-то призывает к полному отлучению их от церкви, заявляя, что догмы этих движений — ересь, а вызванный ими переполох — лишнее свидетельство богохульства. Но есть и те, кто просят нас проявить милосердие и терпимость к заблудшим душам."
 machine_age.1020.a: "Вера должна быть единственной."
 machine_age.1020.a.tooltip: "Техножрецы начнут подавлять другие культы. Это может вызвать волнения."
 machine_age.1020.b: "В нашей конфессии место найдется всем."
 machine_age.1020.b.tooltip: "Несмотря на наличие официальной догмы, техножрецы будут допускать исповедование и других верований."
 machine_age.1030.name: "Разочарование верующих"
 machine_age.1030.desc: "На наших планетах вспыхнули протесты местных сект. Нас обвиняют в том, что мы якобы отклонились от идеалов священного слияния. Техножрецы уверены, что через какое-то время протестующие успокоятся, ведь большая часть населения поддерживает единую догму. Нужно лишь дождаться, когда самые ревностные ее противники согласятся с Божьей истиной."
 machine_age.1030.a: "Других верований не будет."
 machine_age.1030.a.tooltip: "Подавление других культов привело к вспышкам недовольства."
 machine_age.1040.name: "Добровольное обращение"
 machine_age.1040.desc: "Народ постепенно начинает принимать положения единой догмы. Все больше приверженцев других конфессий отрекается от привычного уклада.\n\nТеперь все, кроме самых упрямых фанатиков, ждут заветного дня, когда их [Owner.Species.GetFleshTypeCyberCreed] наконец-то пройдет через божественное перевоплощение."
 machine_age.1040.a: "Божественное слияние — это непреложная истина."
 machine_age.1040.a.tooltip: "Мы объединили верующих."
 machine_age.1050.name: "Довольные представители культов"
 machine_age.1050.desc: "Мы поступили разумно, разрешив свободу вероисповедования: протесты малочисленны и малозаметны, участвуют в них лишь самые ревностные поборники своих взглядов.\n\nПочти все верующие сегодня придерживаются официальной догмы. Теперь можно сосредоточиться на достижении божественного слияния."
 machine_age.1050.a: "Наша вера неразделима."
 machine_age.1050.a.tooltip: "Проявив терпимость к другим вероисповеданиям, мы предотвратили беспорядки."
 machine_age.1060.name: "Сомнительный компромисс"
 machine_age.1060.desc: "Пойдя навстречу радикалам, мы разочаровали почти всех умеренных верующих. Они считают, что маргинальные вероисповедания следовало запретить, поскольку представители всех конфессий так или иначе когда-либо устраивали межрелигиозные войны.\n\nЦелый хор голосов взывает к реформации культов, а значит, к лишению их независимости."
 machine_age.1060.a: "Верующим следует быть терпимее."
 machine_age.1060.a.tooltip: "Проявив терпимость к вероисповеданиям, мы разочаровали умеренных сторонников нашей веры и вызвали недовольство."
 machine_age.1060.b: "Приступить к реформации культов."
 machine_age.1060.b.tooltip: "Единая вера вберет в себя различные течения и положит конец пустым богословским пререканиям."
 machine_age.1070.name: "Временна́я десятина"
 machine_age.1070.desc: "По мере приближения к великому слиянию мы всё чаще вспоминаем такую церковную традицию, как временна́я десятина.\n\nПоколение за поколением каждый верующий обязывался посвящать церкви часть личного времени и сил. Как и божественное слияние, такой обычай лишь укрепляет положения нашей веры.\n\nОстается вопрос: как именно верующие будут поддерживать божественный замысел? Какая десятина им подойдет?"
 machine_age.1070.intro: "Каждый год верующие слои населения будут посвящать часть личного времени"
 machine_age.1070.a: "Шахтерская десятина."
 machine_age.1070.a.tooltip: "$machine_age.1070.intro$ добыче полезных ископаемых."
 machine_age.1070.b: "Земледельческая десятина."
 machine_age.1070.b.tooltip: "$machine_age.1070.intro$ обработке земли."
 machine_age.1070.c: "Стальная десятина."
 machine_age.1070.c.tooltip: "$machine_age.1070.intro$ работе в кузнице."
 machine_age.1070.d: "Строительная десятина."
 machine_age.1070.d.tooltip: "$machine_age.1070.intro$ строительству и работе на верфях."
 machine_age.1070.e: "Армейская десятина."
 machine_age.1070.e.tooltip: "$machine_age.1070.intro$ военной службе."
 machine_age.1070.f: "Флотская десятина."
 machine_age.1070.f.tooltip: "$machine_age.1070.intro$ службе на флоте."
 machine_age.1070.g: "Аугментационная десятина."
