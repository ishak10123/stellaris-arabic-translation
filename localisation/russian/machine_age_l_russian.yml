 cybercreed_tithe_cybernetics: "Аугментационная десятина"
 cybercreed_tithe_cybernetics_desc: "$machine_age.1070.intro$ исследованию технологий для божественных имплантатов."
 cybercreed_tithe_research: "Ученая десятина"
 cybercreed_tithe_research_desc: "$machine_age.1070.intro$ изучению тайн вселенной."
 cybercreed_tithe_labor: "Трудовая десятина"
 cybercreed_tithe_labor_desc: "$machine_age.1070.intro$ производству товаров первой необходимости."
 cybercreed_tithe_wealth: "Имущественная десятина"
 cybercreed_tithe_wealth_desc: "$machine_age.1070.intro$ торговле."
 cybercreed_tithe_craft: "Ремесленная десятина"
 cybercreed_tithe_craft_desc: "$machine_age.1070.intro$ изготовлению штучных товаров высокого качества."
 cyber_creed_flesh_rock: "камень&!masc"
 cyber_creed_flesh_plant: "волокно&!neut"
 cyber_creed_flesh_arthropod: "хитин&!masc"
 cyber_creed_flesh_default: "плоть&!neut"
 cyber_creed_flesh_machine: "создания&!pl"
 building_amphitheater_of_the_mind: "Амфитеатр Разума"
 building_amphitheater_of_the_mind_desc: "Это святилище локальной обработки данных позволяет последователям Хора Разума обсуждать идеи, делиться знаниями и исследовать тайны материального плана со скоростью света."
 building_grand_concert_hall_of_the_mind: "Большой концертный зал Разума"
 building_grand_concert_hall_of_the_mind_desc: "Расположенный в этих гулких стенах узел связи позволяет последователям Хора Разума вместе постигать божественную природу. С помощью усиленных киберимплантатами песнопений они раскроют тайны скрытых мелодий вселенной."
 building_forge_of_the_fellowship: "Кузница Братства"
 building_forge_of_the_fellowship_desc: "В этой первой кузнице Братства Молота производятся строительные материалы высочайшего качества. Под звон молотов верующие исполняют свое священное послушание."
 building_grand_forge_of_the_fellowship: "Большая кузница Братства"
 building_grand_forge_of_the_fellowship_desc: "Звонкая литания безустанно трудящихся инструментов Братства разносится далеко за стены кузницы. По ночам изысканно украшенный собор-кузница светится так ярко, что затмевает звезды — совсем как наши души, стремящиеся стать ближе к Богу."
 building_battlement_of_steel: "Крепостные стены Стали"
 building_battlement_of_steel_desc: "Эта церковь-крепость скрывает в своих стенах арсенал и полигон для тренировок Храмовников Стали. Они не смыкая глаз стоят на страже наших священных тел."
 building_grand_battlements_of_steel: "Большие крепостные стены Стали"
 building_grand_battlements_of_steel_desc: "Да простоят эти величественные стены собора-крепости еще тысячу лет. В его арсенале терпеливо ждут новых воителей священные имплантаты, созданные Храмовниками Стали. В этих залах царит один Божий закон: единение плоти и стали."
 building_sanctuary_of_toil: "Святилище Труда"
 building_sanctuary_of_toil_desc: "Это святилище координирует, восстанавливает и омолаживает тела и имплантаты послушников Коммуны Труда."
 building_grand_cathedral_of_toil: "Великий собор Труда"
 building_grand_cathedral_of_toil_desc: "Благословенны те, кто восполняет всякие нужды верующих. Да найдут покой их утомленные души в Великом соборе Труда. Здесь работники мастерских и координационных центров руководят правоверными тружениками и снабжают их — в том числе священными имплантатами."
 building_the_sanctum_of_augmentation: "Святилище аугментаций"
 building_the_sanctum_of_augmentation_desc: "Это святилище — гордый символ нашей единой веры. В этих благословленных стенах верующие заботятся о душах и имплантатах своей паствы."
 building_the_united_sanctum_of_augmentation: "Единое святилище аугментаций"
 building_the_united_sanctum_of_augmentation_desc: "Это величественное святилище — знак нашего благоговения перед Божьей волей, указавшей путь к единению. В этих благословленных стенах собираются верующие, которых ведет одна цель — стремление к священному слиянию."
 #Advanced Cyber Creed Authorities
 auth_cyber_creed_democratic: "Демократическая аугментократия"
 auth_cyber_creed_democratic_desc: "Демократические кибернетические государства гарантируют своим аугментированным гражданам священное право голоса, благодаря которому они могут высказывать свое мнение по разным политическим вопросам, исполняя тем самым Божью волю."
 concept_auth_cyber_creed_democratic: "$auth_cyber_creed_democratic$"
 auth_cyber_creed_oligarchic: "Олигархическая кибертеократия"
 auth_cyber_creed_oligarchic_desc: "В олигархических кибернетических государствах существует привилегированная прослойка граждан с самыми передовыми имплантами, обладающих всей политической властью и с беспрецедентной точностью управляющих всем кибернетическим обществом."
 concept_auth_cyber_creed_oligarchic: "$auth_cyber_creed_oligarchic$"
 auth_cyber_creed_dictatorial: "Синтодоксальная диктатура"
 auth_cyber_creed_dictatorial_desc: "В кибернетических диктатурах правители выбираются пожизненно и оснащаются имплантатами, дающими им абсолютный контроль над судьбой всего общества."
 concept_auth_cyber_creed_dictatorial: "$auth_cyber_creed_dictatorial$"
 auth_cyber_creed_imperial: "Имперский кибернетат"
 auth_cyber_creed_imperial_desc: "В кибернетических империях существуют титулы верховного правителя и его наследника, что обеспечивает преемственность власти. В своем правлении они опираются на духовность и новейшие достижения кибернетики."
 concept_auth_cyber_creed_imperial: "$auth_cyber_creed_imperial$"
 auth_cyber_creed_corporate: "Корпорация «Святотех»"
 auth_cyber_creed_corporate_desc: "В кибернетических корпоративных государствах традиционные государственные роли преобразуются за счет использования имплантатов и слияния веры и технологии для извлечения священных финансовых выгод."
 concept_auth_cyber_creed_corporate: "$auth_cyber_creed_corporate$"
 #Advanced Cyber Creed Government Types
 gov_cyber_creed_monarchy: "Кибернетическая держава"
 gov_cyber_creed_monarchy_desc: "Этот тип правления — техно-спиритуалистическая форма монархии, при которой правитель и его наследник являются символами священного единства. Церковь напрямую поддерживает государственный аппарат."
 gov_cyber_creed_dictatorship: "Божественная технократия"
 gov_cyber_creed_dictatorship_desc: "Техно-спиритуалистическая форма диктатуры, при которой правителем является один аугментированный индивидуум в иерархической структуре власти, поддерживаемой официально признанной религией."
 gov_cyber_creed_oligarchy: "Совет техножрецов"
 gov_cyber_creed_oligarchy_desc: "Техно-спиритуалистическая форма олигархии, при которой власть находится в руках наиболее влиятельных в государстве религиозных фракций."
 gov_cyber_creed_democracy: "Трансцедентная республика"
 gov_cyber_creed_democracy_desc: "Техно-спиритуалистическая форма демократии, при которой демократическим процессом управляет священный совет усовершенствованных имплантатами граждан."
 gov_cyber_creed_divine_empire: "Божественная киберимперия"
 gov_cyber_creed_divine_empire_desc: "Техно-спиритуалистическая форма самодержавия. Официальная религия пронизывает все аспекты общественной жизни, а подданные считают своего аугментированного правителя непогрешимым живым божеством."
 gov_cyber_creed_holy_tribunal: "Трибунал техножрецов"
 gov_cyber_creed_holy_tribunal_desc: "Техно-спиритуалистическая форма олигархии, в которой всеми механизмами государства управляет совет священников, ведомый божественной силой."
 gov_cyber_creed_megachurch: "Кибернетическая мегацерковь"
 gov_cyber_creed_megachurch_desc: "Форма олигархии, основанная на смеси коммерческих и духовных ценностей, при которой позиции техножреца и корпоративного чиновника сливаются воедино."
 gov_cyber_creed_subversive_cult: "Культ машин"
 gov_cyber_creed_subversive_cult_desc: "Религиозный культ, который для поддержки своего существования опирается на корпорации и криминальные организации с кибернетической идеологией."
 #Advanced Government Edicts
 edict_cybernetic_creed_construction_edict: "Молот добродетели"
 edict_cybernetic_creed_construction_edict_desc: "Чтобы построить по-настоящему духовное общество, нужно поддержать Братство Молота: его руки выкуют нам будущее, где мы будем достойны божественного благословения."
 edict_cybernetic_creed_war_edict: "Стальной крестовый поход"
 edict_cybernetic_creed_war_edict_desc: "Чтобы защититься от чудищ, покушающихся на нашу божественную плоть, нужно поддержать Храмовников Стали. Наши воины должны быть бдительными."
 edict_cybernetic_creed_research_edict: "Песнь знания"
 edict_cybernetic_creed_research_edict_desc: "Лишь звонкая песнь знания поможет нашему народу действительно познать божественность. Нужно поддерживать мудрый Хор Разума во всех его начинаниях."
 edict_cybernetic_creed_construction_labor: "Массы трудящихся"
 edict_cybernetic_creed_construction_labor_desc: "Истинная сила кроется в трудящихся. Если мы не возвысим их дух, они не построят нам достойное будущее."
 edict_cybernetic_creed_general_edict: "Уроки гармонии"
 edict_cybernetic_creed_general_edict_desc: "Объединение Церкви многому нас научило. Вера стала тверже, а размышления — глубже."
 #Intro Events
 machine_age.2150.name: "Конфессии"
 machine_age.2150.desc: "Объединенные священной миссией покорить звезды, различные конфессии нашей веры борются друг с другом за влияние в новом правительстве.\n\nКаждая из них обладает серьезным авторитетом среди верующих, продвигает своих сторонников на важные должности и преследует свои религиозные цели.\n\nПриведут ли эти соперничающие фракции нас к священной благодати или утянут в пучины хаоса, покажет только время."
 machine_age.2150.a: "Будем надеяться, они нам помогут."
 machine_age.2150.a.tooltip: "§YФормируются фракции§!:\n• $cyber_creed_labor$\n• $cyber_creed_war$\n• $cyber_creed_research$\n• $cyber_creed_construction$"
 cyber_creed_please_labor: "§Y$cyber_creed_labor$§! будут довольны этим решением.\nВсе остальные конфессии останутся недовольны этим решением."
 cyber_creed_displease_labor: "§Y$cyber_creed_labor$§! останутся недовольны этим решением.\nВсе остальные конфессии будут довольны этим решением."
 cyber_creed_please_war: "§Y$cyber_creed_war$§! будут довольны этим решением.\nВсе остальные конфессии останутся недовольны этим решением."
 cyber_creed_displease_war: "§Y$cyber_creed_war$§! останутся недовольны этим решением.\nВсе остальные конфессии будут довольны этим решением."
 cyber_creed_please_construction: "§Y$cyber_creed_construction$§! будут довольны этим решением.\nВсе остальные конфессии останутся недовольны этим решением."
 cyber_creed_displease_construction: "§Y$cyber_creed_construction$§! останутся недовольны этим решением.\nВсе остальные конфессии будут довольны этим решением."
 cyber_creed_please_research: "§Y$cyber_creed_research$§! будут довольны этим решением.\nВсе остальные конфессии останутся недовольны этим решением."
 cyber_creed_displease_research: "§Y$cyber_creed_research$§! останутся недовольны этим решением.\nВсе остальные конфессии будут довольны этим решением."
 machine_age.2205.name: "Переписывание истории"
 machine_age.2205.desc: "§YХрамовники Стали§! недавно начали кампанию по запрещению всех упоминаний военных поражений в наших исторических и религиозных источниках.\n\nЖрецы этой конфессии утверждают, что такие знания деморализуют военнослужащих и ослабляют поддержку Храмовников в обществе. Наши историки отвергают эти доводы и напоминают нам, что забывающие историю обречены ее повторять.\n\nСледует ли нам принять новую, более позитивную версию нашего прошлого?"
 machine_age.2205.a: "Чтобы побеждать, нужно мыслить как победители."
 machine_age.2205.a.tooltip: "$cyber_creed_please_war$"
 machine_age.2205.b: "Это неприемлемо. Мы должны учиться на своих ошибках."
 machine_age.2205.b.tooltip: "$cyber_creed_displease_war$"
 machine_age.2210.name: "Огонь погас"
 machine_age.2210.desc: "Верховный Кузнец, глава §YБратства Молота§!, внезапно отошел в мир иной.\n\nНесмотря на свою прямолинейность и радикальность, Кузнецу удалось собрать вокруг себя культ из правоверных сторонников. Братство запросило для своего лидера государственные похороны — обычно такой чести удостаиваются лишь самые искренне любимые в народе лидеры.\n\nЕстественно, другие конфессии требуют, чтобы в похоронах этого лидера государство участия не принимало.\n\nКак нам ответить на требования конфессий?"
 machine_age.2210.a: "Устроить похороны."
 machine_age.2210.a.tooltip: "$cyber_creed_please_construction$"
 machine_age.2210.b: "Не стоить возмущать другие конфессии."
 machine_age.2210.b.tooltip: "$cyber_creed_displease_construction$"
 machine_age.2215.name: "Скандальные реликвии"
 machine_age.2215.desc: "Недавно группа археологов обнаружила древнее место отправления обрядов. Само его существование ранее считалось мифом, так что эта находка уже вынудила нас пересмотреть некоторые наши летописи.\n\nУдивительнее всего тот факт, что на многих обнаруженных здесь артефактах ясно видны символы §YКоммуны Труда§!. Это доказывает, что Коммуна придерживается изначальной интерпретации нашей религии — что всегда было очень болезненной темой в нашей вере.\n\nОфициально признав это открытие, мы сильно порадуем сторонников §YКоммуны Труда§!, но стратегическое замалчивание поможет нам не портить отношения со всеми остальными конфессиями."
 machine_age.2215.a: "Нельзя бояться правды."
 machine_age.2215.a.tooltip: "$cyber_creed_please_labor$"
 machine_age.2215.b: "Не зря это все когда-то закопали, не обращаем внимания."
 machine_age.2215.b.tooltip: "$cyber_creed_displease_labor$"
 machine_age.2221.name: "Тайный религиозный агент"
 machine_age.2221.desc: "Мы обнаружили, что §Y[cyber_creed_undercover_leader.GetName]§! имеет глубокие связи с конфессией §Y[GetCyberCreed]§!: [cyber_creed_undercover_leader.GetSheHe] незаконно [cyber_creed_undercover_leader.GetAXX::тратил|||fem:тратила] средства в интересах этой фракции и [cyber_creed_undercover_leader.GetAXX::передавал|||fem:передавала] ей важные проекты.\n\nДругие конфессии возмущены таким откровенным произволом нынешней администрации и требуют, чтобы §Y[cyber_creed_undercover_leader.GetName]§! немедленно [cyber_creed_undercover_leader.GetAXX::покинул|||fem:покинула] свой пост.\n\nЧто мы будем делать с этим заблудшим лидером?"
 machine_age.2221.a: "Сместим [cyber_creed_undercover_leader.GetHerHis] с поста."
 machine_age.2221.a.tooltip: "[cyber_creed_undercover_leader.GetName] теряет полномочия."
 machine_age.2221.b: "За все прошлые заслуги [cyber_creed_undercover_leader.GetHerHis] можно и простить."
 machine_age.2225.name: "Праздник Молота"
 machine_age.2225.desc: "Уже скоро начнется праздничное паломничество §YБратства Молота§!. Многочисленные верующие покинут свои местные кузницы и отправятся в путь, целью которого станет §Y$building_forge_of_the_fellowship$§! в столице.\n\nКак правило, это мероприятие приводит к многочисленным логистическим трудностям, и в ходе его паломники Братства нередко вступают в столкновения с последователями других конфессий.\n\nОт жителей столицы и сторонников других конфессий уже не раз звучали призывы наконец покончить с этой практикой."
 machine_age.2225.a: "Навсегда запретить паломничество."
 machine_age.2225.a.tooltip: "$cyber_creed_displease_construction$"
 machine_age.2225.b: "Свобода вероисповедания — это право наших граждан."
 machine_age.2225.b.tooltip: "$cyber_creed_please_construction$"
 machine_age.2230.name: "Жажда знаний"
 machine_age.2230.desc: "В последнее время лидер §YХора Разума§!, Великий Регент Хора, открыто высказывается о недостаточном финансировании науки в нашем государстве.\n\nНадо полагать, на самом деле это попытка выпросить денег для своей фракции. Если мы согласимся с требованиями Регента, это будет выглядеть так, словно мы даем преференции §YХору Разума§!.\n\nСтоит ли нам повысить финансирование науки?"
 machine_age.2230.a: "Пусть Регент поет до хрипоты."
 machine_age.2230.a.tooltip: "$cyber_creed_displease_research$"
 machine_age.2230.b: "Немного повысить финансирование, пока страсти не улягутся."
 machine_age.2230.b.tooltip: "$cyber_creed_please_research$"
 machine_age.2230.c: "Значительно повысить финансирование."
 machine_age.2230.c.tooltip: "$cyber_creed_please_research$"
 cyber_creed_history_rewritten: "История переписана"
 cyber_creed_history_rewritten_desc: "Мы вымарали все упоминания военных неудач из наших летописей к большому неудовольствию историков."
 cyber_creed_history_repeating: "История повторится"
 cyber_creed_history_repeating_desc: "Мы сохранили в летописях все упоминания о поражениях в войнах. Это решение оскорбило Храмовников Стали."
 cyber_creed_no_choirmaster_funding: "Регент Хора проигнорирован"
 cyber_creed_no_choirmaster_funding_desc: "Мы проигнорировали просьбы Хора Разума повысить затраты на науку."
