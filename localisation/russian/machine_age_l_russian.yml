 building_lathe_capital: "Вычислительный модуль"
 building_lathe_capital_desc: "Вычислительные модули синаптического станка на квантовой основе могут вести параллельные вычисления сразу в нескольких слоях измерений."
 building_lathe_major_capital: "Распараллеленный вычислительный модуль"
 building_lathe_major_capital_desc: "Этот улучшенный модуль провоцирует отражение когнитивных отголосков нейроэлементов в изолированных областях гамма-пространства, тем самым повышая эффективность параллельных вычислений."
 building_lathe_super_capital: "Векторный вычислительный модуль"
 building_lathe_super_capital_desc: "Этот улучшенный модуль создает отрицательные пространственные векторы для оптимизации вычислений. Пространственное разделение процессов обеспечивает необычайную эффективность и стабильность."
 building_lathe_resonator: "Синаптический резонатор"
 building_lathe_resonator_desc: "Резонаторы контролируют и маршрутизируют когнитивный потенциал случайных мыслей и автономных систем, заставляя все элементы повышать эффективность своих соседей."
 lathe_resonator_tt: "§Y$job_neural_chip_plural$§! — производительность: §G+1%§! за §Y$job_neural_chip_plural$§!\n(Текущее значение: §G+[num_neural_chips]%§!)"
 building_lathe_stabilisator: "Нейростабилизатор"
 building_lathe_stabilisator_desc: "Системы стабилизации отсеивают вычислительный шум, возникающий при физических недомоганиях нейроэлементов. Уменьшение количества помех приводит к повышению общей производительности."
 building_lathe_overclocker: "Синаптический оверклокер"
 building_lathe_overclocker_desc: "В конструкции синаптического станка заложены механизмы предохранения подключенных нейроэлементов от излишней нагрузки для долгосрочной продуктивности. Оверклокеры способны блокировать предохранительные команды и добиваться более высокой производительности элементов за счет более быстрого их выхода из строя."
 building_lathe_preserver: "Синаптический предохранитель"
 building_lathe_preserver_desc: "Органические элементы сети особенно уязвимы перед энергетическими колебаниями, которые приводят к быстрой аксональной дегенерации. Предохранитель старается сглаживать такие колебания и защищать наиболее уязвимые компоненты синаптического станка."
 building_lathe_reactor: "Увеличенный реактор"
 building_lathe_reactor_desc: "Чем больше нейроэлементов подключено к сети, тем больше энергии требуется для ее работы. Установка дополнительных реакторов частично устранит логистические сложности, связанные с питанием станка."
 building_lathe_life_support: "Синаптическая опора"
 building_lathe_life_support_desc: "Специальные системы организуют обслуживание критически важных компонентов станка, чем обеспечивают эффективность сетевого пространства и делают возможным подключение большего числа элементов."
 building_lathe_cogitator: "Синаптический планировщик"
 building_lathe_cogitator_desc: "Планирование гиперпространственных цепей снабжения — это сложная задача. Направив на ее решение часть вычислительных мощностей, мы поможем даже самым крупным флотилиям проникать глубже внутрь вражеского пространства."
 building_lathe_cogitator_tt: "§YВместимость флота§!: §G+1%§! за §Y$job_neural_chip_plural$§!\n(Текущее значение: §G+[num_neural_chips]%§!)\n§YПрирост опыта кораблей§!: §G+2%§! за §Y$job_neural_chip_plural$§!\n(Текущее значение: §G+[num_neural_chips_double]%§!)"
 building_lathe_validator: "Синаптический валидатор"
 building_lathe_validator_desc: "Основная задача валидатора — помогать формулировать тезисы о бесконечности, его также можно использовать для решения более общих задач."
 building_lathe_validator_tt: "$mod_category_computing_research_speed_mult$: §G+1%§! за §Y$job_neural_chip_plural$§!\n(Текущее значение: §G+[num_neural_chips]%§!)"
 ### Synaptic Lathe UI
 SYNAPTIC_LATHE_STABILITY_DESC: "§E$r_stability$ — это показатель общей стабильности сети синаптического станка. Она преимущественно определяется общим показателем £happiness£ §Yсчастья§! нейроэлементов.\n\nСтабильность может быть снижена из-за таких факторов, как £housing£ §Rперенаселение§! и £amenities£ §Rнизкая доступность благ§!. Если $PLANET_STABILITY_TITLE$ высокая, то производство ресурсов увеличивается. Если же $PLANET_STABILITY_TITLE$ низкая, производство спадает. На синаптическом станке, в отличие от других колоний, никогда не бывает полномасштабных §Yбунтов§!.§!"
 SYNAPTIC_LATHE_RESISTANCE_DESC: "§E§YСопротивление§! — это показатель общего уровня волнений, вызванных неподконтрольными нейроэлементами. Высокий уровень £crime£ §Yсопротивления§! приводит к ускорению §Yупадка поселений§! и повышает вероятность их бегства. Он обычно связан с большой численностью населения и может быть снижен путем повышения £happiness£ §Yуровня счастья поселений§! или строительства £building£ §Yнейростабилизаторов§!.§!"
 SYNAPTIC_LATHE_HOUSING_DESC: "§E§Y$PLANET_HOUSING_TITLE$§! — это инфраструктура, предназначенная для размещения нейроэлементов. Нехватка места для расселения и содержания нейроэлементов приведет к упадку £stability£ §Yстабильности§!. Чтобы построить больше §Yжилья§!, можно возводить новые £district£ §Yрайоны§!, улучшать §Yвычислительный модуль§! станка либо воздвигать £building£ §Yсинаптические опоры§!.§!"
 SYNAPTIC_LATHE_AMENITIES_DESC: "§E§Y$PLANET_AMENITIES_TITLE$§! — это инфраструктура, предназначенная для жизнеобеспечения нейроэлементов. Планета, на которой $PLANET_AMENITIES_TITLE$ производятся в недостаточном количестве, получит штрафы к £happiness£ §Yсчастью§!. Чтобы сделать §Yблага§! доступнее, можно улучшать §Yвычислительный модуль§! станка либо строить £building£ §Yсинаптические опоры§!.§!"
 SYNAPTIC_LATHE_RESISTANCE_TITLE: "Сопротивление"
