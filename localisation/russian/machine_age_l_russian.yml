 EMPIRE_DESIGN_LACERTAN_TECHNO_PROTECTORATE: "Лацертанский технопротекторат"
 EMPIRE_DESIGN_lacertan_techno_protectorate_desc: "Лацертанское общество существует на стыке философии и науки. Смысл жизни любого лацертанца — выражение своей самости во всей ее самобытности. Что такое «представление» ума на самом деле? Способен ли симулякр заключить в себе всю полноту личности? Лацертанская традиция давно ищет ответы на эти вопросы.\n\nВиртуальная реальность и новые достижения в области искусственного интеллекта открыли лацертанцам новый простор для художественного и технологического самовыражения. Виртуальные миры стали площадками для воплощения самых масштабных, невероятно захватывающих и попирающих ограничения реального мира замыслов.\n\nНо затем наступило Угасание. Лацертанское общество поразила неизлечимая генетическая болезнь. Размножение естественным путем стало невозможным. Несчастным оставалось только одно: полностью довериться цифровому спасению. Переход в цифровую форму существования — не только отчаянный жест перед лицом неминуемой смерти, но и новая веха для лацертанской культуры. В виртуальном пространстве лацертанцы продолжают задаваться вопросами о смысле бытия, не отвлекаясь от планов по спасению своего народа."
