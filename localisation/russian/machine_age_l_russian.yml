 pop_cat_chip_slave: "Вычислительный компонент"
 pop_cat_chip_slave_desc: "Эти особи — не более чем элементы, необходимые для работы громадного компьютера. Капсулы жизнеобеспечения поддерживают их в состоянии искусственной комы и гарантируют долголетие — но не бессмертие, поскольку под огромной нагрузкой когнитивные органы постепенно начинают отказывать."
