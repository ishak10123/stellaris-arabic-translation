 concept_pathogenic_genes_desc: "— §RНе могут колонизировать планеты, не могут переселяться§!$NEW_LINE$— §RНе могут размножаться естественным путем§!\n\n§L$trait_pathogenic_genes_desc$§!"
 concept_identity_rescue: "$situation_synthetic_fertility_digitization$"
 concept_identity_rescue_desc: "В награду предоставляет технологии, открывающие синтетическое преображение \n\n§L$situation_synthetic_fertility_digitization_desc$§!"
