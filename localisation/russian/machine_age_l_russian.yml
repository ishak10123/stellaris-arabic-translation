 trait_auto_mod_biological: "Профессиональная геномика"
 trait_auto_mod_biological_desc: "Генные нити снабжены эпигенетическими триггерами, обеспечивающими приспособление к специфике рабочего места. Благодаря этому происходит динамическая оптимизация экспрессии гена под условия труда его носителя."
 trait_auto_mod_cyborg: "Универсальные аугментации"
 trait_auto_mod_cyborg_desc: "Универсальные порты подключения позволяют заменять аугментации по мере необходимости, чтобы всегда соответствовать производственным требованиям."
 trait_auto_mod_robotic: "Адаптивные тела"
 trait_auto_mod_robotic_desc: "Эта система способна проводить динамическую реконфигурацию компонентов, чтобы соответствовать производственным требованиям, и подстраивать производительность под различные задачи."
 trait_auto_mod_overtuned: "Скоротечное совершенство"
 trait_auto_mod_overtuned_desc: "Современные эпигенетические триггеры значительно повышают физическую и умственную работоспособность за счет резкого уменьшения продолжительности жизни. Ведь лучше вспыхнуть, чем медленно тлеть."
 concept_automodding_trait: "Автомодифицированный признак"
 concept_automodding_traits: "Автомодифицированные признаки"
 concept_automodding_trait_desc: "• В зависимости от должности модификаторы объединяются с новыми из заранее составленного списка.\n• Эффекты признаков масштабируются в зависимости от процентной доли группы поселений с таким признаком. \n• Ежемесячно проходящие проверку £pop£ §Hпоселения§!, у которых есть §Y$concept_automodding_traits$§! (в каждой колонии): §G100§!\n• £building£ Сооружения для прироста населения и сборки поселений увеличивают количество ежемесячно обновляемых £pop£ §Hавтомодифицируемых поселений§!."
 concept_automodding_biological: "Список биологических признаков для автомодификации"
 concept_automodding_biological_desc: "• ['trait:trait_traditional']\n• ['trait:trait_thrifty']\n• ['trait:trait_intelligent']\n• ['trait:trait_industrious']\n• ['trait:trait_agrarian']\n• ['trait:trait_ingenious']\n• ['trait:trait_charismatic']"
 concept_vocational_traits: "Профессиональные признаки"
 concept_vocational_traits_desc: "$concept_vocational_traits$ — признаки расы, которые могут подвергаться автоматической модификации посредством признака «['trait:trait_auto_mod_biological']».$NEW_LINE$$concept_automodding_biological_desc$"
 concept_fleeting_excellence_traits: "Признаки категории «$trait_auto_mod_overtuned$»"
 concept_fleeting_excellence_traits_desc: "$concept_fleeting_excellence_traits$ — признаки расы, которые могут подвергаться автоматической модификации посредством признака «['trait:trait_auto_mod_overtuned']».$NEW_LINE$$concept_automodding_overtuned_desc$"
 concept_automodding_overtuned: "Список разогнанных признаков для автомодификации"
 concept_automodding_overtuned_desc: "• ['trait:trait_expressed_tradition']\n• ['trait:trait_commercial_genius']\n• ['trait:trait_artificial_intelligence']\n• ['trait:trait_crack_miner']\n• ['trait:trait_farm_hands']\n• ['trait:trait_technical_skill']\n• ['trait:trait_crafted_smiles']"
 concept_adaptive_frames_traits: "Признаки категории «$trait_auto_mod_robotic$»"
 concept_adaptive_frames_traits_desc: "$concept_adaptive_frames_traits$ — признаки расы, которые могут подвергаться автоматической модификации посредством признака «['trait:trait_auto_mod_robotic']».$NEW_LINE$$concept_automodding_robotic_desc$"
