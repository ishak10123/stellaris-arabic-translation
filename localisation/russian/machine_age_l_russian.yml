 district_cosmogenesis_world_science: "Нейроврата"
 district_cosmogenesis_world_science_plural: "Нейроврата"
 district_cosmogenesis_world_science_desc: "Собрав в одном месте полчища творчески мыслящих личностей, мы теперь можем быстро создавать симуляции для самых смелых гипотез. Сложная конструкция из логических схем и органических кэшей памяти обеспечивает исключительно точные результаты."
 district_cosmogenesis_world_logic: "Амплиативный мыслитель"
 district_cosmogenesis_world_logic_plural: "Амплиативные мыслители"
 district_cosmogenesis_world_logic_desc: "Этот район — настоящее чудо диалектической метафизики. С помощью нейроэлементов здесь определяется истина, содержащаяся в формальных высказываниях о реальности. По сути, он отвечает «да» или «нет» на самые сложные вопросы, возникающие в коллективном сознании «обитателей» синаптического станка."
