 ###################
 #Cybernetics Pack
 ###################
 MACHINEAGE_TITLE: "The Machine Age" #Do not translate
 #### Cosmogenesis Crisis ####
 ap_cosmogenesis: "Космогенез"
 ap_cosmogenesis_desc: "Время, гравитация и пространство — три главные шестерни, вращающие сложный механизм реальности. Если мы научимся ими управлять, вселенная откроет нам все свои тайны."
 cosmogenesis_chain_title: "Космогенез"
 cosmogenesis_chain_desc: "Незнание — оковы, преграждающие нам путь к тайнам вселенной.\n\nМы должны освободиться от них любой ценой.\n\n§RУгасшие империи попытаются помешать нам!§!"
 cosmogenesis_level_reached: "Достигнут уровень кризиса"
 cosmogenesis_aborted_tt: "\n£trigger_no£ §RМы отказались от своего стремления к космогенезу.§!"
 ### Crisis Stage Techs
 tech_cosmogenesis_crisis_1: "Теория экспонентного обучения"
 tech_cosmogenesis_crisis_1_desc: "Радикальная смена взглядов, без которой невозможно осознать бесконечные слои реальности, — трудный процесс даже для самых ярких умов нашего вида."
 cosmogenesis_level_1_tech_title: "Открывает §H2-й уровень§! кризиса §H«Космогенез»§!"
 cosmogenesis_level_1_tech_desc: "§H$tech_cosmogenesis_crisis_1$§!\nЧтобы полностью осознать внутреннее устройство реальности, нам придется вознестись на иной, более масштабный уровень мышления."
 tech_cosmogenesis_crisis_2: "Гравитационная кисть"
 tech_cosmogenesis_crisis_2_desc: "Структура вселенной определяется гравитацией и пространством-временем. Мы освоим инструменты собственного преображения, и начнем мы с покорения силы тяготения."
 cosmogenesis_level_2_tech_title: "Открывает §H3-й уровень§! кризиса §H«Космогенез»§!"
 cosmogenesis_level_2_tech_desc: "§H$tech_cosmogenesis_crisis_2$§!\nГравитация — не более чем одна из нескольких кистей, которыми мы пройдемся по холсту реальности."
 tech_cosmogenesis_crisis_3: "Теоретический тезис о бесконечности"
 tech_cosmogenesis_crisis_3_desc: "Точные и тончайшие изменения гравитации позволяют нам внедрять команды в код реальности. Мы с величайшей осторожностью изучаем перспективы этого невероятного нового инструмента."
 cosmogenesis_level_3_tech_title: "Открывает §H4-й уровень§! кризиса §H«Космогенез»§!"
 cosmogenesis_level_3_tech_desc: "§H$tech_cosmogenesis_crisis_3$§!\nАккуратные уколы гравитации — один за другим — помогут нам пронзить ткань пространства-времени."
 tech_cosmogenesis_crisis_4: "Правила реальности"
 tech_cosmogenesis_crisis_4_desc: "Последние эксперименты показывают, что наши модификации реальности носят временный характер. Для их закрепления необходимы более серьезные изменения."
 cosmogenesis_level_4_tech_title: "Открывает §H5-й уровень§! кризиса §H«Космогенез»§!"
 cosmogenesis_level_4_tech_desc: "§H$tech_cosmogenesis_crisis_4$§!\nРеальность начинает трещать. Она противится, ропщет, упрямо меняет форму, не желая мириться с нашими правками. Пора положить конец этой неожиданной строптивости."
 tech_cosmogenesis_crisis_5: "Зарождающиеся вселенные"
 tech_cosmogenesis_crisis_5_desc: "Перемещение макрообъектов в другие вселенные — это сложная задача. Нам нужно спроектировать космический аппарат, который способен не только пронзить ткань пространства-времени, но и перенести полет.\n\n§RУгасшие империи попытаются помешать нам!§!"
 cosmogenesis_level_5_tech_title: "§HМегасооружение:§! Горизонтная игла"
 cosmogenesis_level_5_tech_desc: "§HГоризонтная игла§!\nГоризонтная игла — подлинное чудо техники: это гражданское судно способно искривлять реальность. На борту корабля, который понесет нас в другую вселенную, поместится все население, все накопленные знания."
 requires_capital: "£trigger_no£ Можно строить только на орбите столицы."
 ### Crisis Tab
 crisobj_research_tech_name: "Изучить новые технологии"
 crisobj_research_tech_desc: "Каждая новая технология, сколь бы несущественной она ни была, приближает нас к пониманию внутреннего устройства реальности.\n\nИзучайте технологии, чтобы получать эту награду в виде продвинутой логики."
 crisobj_research_thesis_name: "Изучить прикладные тезисы о бесконечности"
 crisobj_research_thesis_desc: "Результаты масштабных экспериментов, направленных на изменение правил поведения реальности, будут крайне полезны.\n\nИзучайте представленные редкие технологии, чтобы получать эту награду в виде продвинутой логики."
 crisobj_have_scholarium_vassals_name: "Сохранить вассалов-схолариев"
 crisobj_have_scholarium_vassals_desc: "Подданные, занимающиеся исследованиями, помогут нам обрести абсолютное знание.\n\nСохраняйте §Yвассалов-схолариев§!, чтобы получать эту §Yежегодную§! награду в виде продвинутой логики."
 crisobj_neural_chips_name: "Применить нейроэлементы"
 crisobj_neural_chips_desc: "Масштаб наших исследований требует определенных жертв.\n\nПревращайте поселения в §Yнейроэлементы§! для §Yсинаптического станка§!, чтобы накапливать продвинутую логику.\n\nПроизводительность §Yнейроэлементов§! растет по мере увеличения поселений в §Yсинаптическом станке§!. Ее также можно повысить с помощью районов и сооружений."
 crisobj_have_science_nexuses_name: "Взять под контроль научные комплексы"
 crisobj_have_science_nexuses_desc: "Этот передовой научный комплекс, расположенный вдалеке от гравитационных аномалий, принимает свежие данные о пространстве-времени.\n\nКонтролируйте полностью улучшенные §Yнаучные комплексы§! (мегасооружения), чтобы получать эту §Yежегодную§! награду в виде продвинутой логики."
 crisobj_galcom_science_resolution_name: "Заручиться поддержкой галактического сообщества"
 crisobj_galcom_science_resolution_desc: "Если мы сможем убедить галактическое сообщество в острой необходимости проводимых исследований, такая поддержка окажется крайне полезной.\n\nЗаставляйте §Yгалактическое сообщество§! принимать §Yрезолюции§! из категории «Свободное знание», чтобы получать эту §Yежегодную§! награду в виде продвинутой логики."
 crisis_cosmogenesis_level_1: "§UТревога§!"
 crisis_cosmogenesis_level_1_desc: "Уровень кризиса 1"
 crisis_cosmogenesis_level_2: "§UРиск§!"
 crisis_cosmogenesis_level_2_desc: "Уровень кризиса 2"
 crisis_cosmogenesis_level_3: "§UОпасность§!"
 crisis_cosmogenesis_level_3_desc: "Уровень кризиса 3"
 crisis_cosmogenesis_level_4: "§UБедствие§!"
 crisis_cosmogenesis_level_4_desc: "Уровень кризиса 4"
 crisis_cosmogenesis_level_5: "§UУгроза всему сущему§!"
 crisis_cosmogenesis_level_5_desc: "Уровень кризиса 5"
 menp_cosmo_objectives: "Продвинутая логика"
 unlocks_cosmo_objectives: "Позволяет накапливать ресурс £advanced_logic£ §Y«$menp_cosmo_objectives$»§! за выполнение §Hзаданий кризиса§!.\n\nОткрывает технологию §Y«$tech_cosmogenesis_crisis_1$»§!, которая приблизит нас к осуществлению задуманного.\n"
 menp_cosmo_objectives_desc: "Продвинутая логика отражает наше понимание законов, которым подчиняется реальность, и возможность на них влиять."
 menp_cosmo_buildings_1: "Идеальные аркологии"
 unlocks_buildings_1: "Теперь можно изучать простые сооружения угасших империй.\n"
 menp_cosmo_buildings_1_desc: "Угасшие империи давно забыли секреты воспроизводства своих технологий, однако мы доберемся до этих тайн золотого века могучих государств."
 menp_cosmo_techs_1: "Антибарионная энергия"
 unlocks_techs_1: "Открывает технологию, необходимую для корабельного компонента §Y«$tech_dark_matter_power_core$»§!.\n"
 menp_cosmo_techs_1_desc: "Подчинив себе энергию антибарионных частиц, мы станем на шаг ближе к разработке ультракомпактных источников энергии."
 menp_cosmo_features_1: "Живой компьютер"
 unlocks_features_1: "Открывает технологию, необходимую для мегасооружения §Y«Синаптический станок»§!.\n"
 menp_cosmo_features_1_desc: "Синаптический станок — это колоссальный распределенный компьютер. Данные обрабатываются и хранятся на мощностях связанных друг с другом умов нашего населения. Преимущества такой организации очевидны, но некоторые расы в своем невежестве рассматривают превращение личностей в компьютерные элементы как нечто аморальное."
 menp_cosmo_ship_2: "Загадочные корабли сопровождения"
 unlocks_ship_2: "Открывает технологию, необходимую для §Yкорабля сопровождения§! угасшей империи.\n"
 menp_cosmo_ship_2_desc: "[Get_menp_cosmo_ship_2]"
 menp_cosmo_ship_2_desc_regular: "Звездолет небольших размеров, в конструкции которого задействованы наши достижения в манипуляции пространством-временем, благодаря чему его внутренние объемы превышают внешние. Это позволяет устанавливать на него мощное вооружение, слишком тяжелое для кораблей традиционной конструкции."
 menp_cosmo_buildings_2: "Улучшенный сбор"
 unlocks_buildings_2: "Теперь можно изучать улучшенные сооружения угасших империй.\n"
 menp_cosmo_buildings_2_desc: "Наконец-то технологии добычи ресурсов, доступные угасшим империям, перестали быть для нас загадкой."
 menp_cosmo_techs_2: "Передовая антибарионика"
 unlocks_techs_2: "Открывает технологию, необходимую для корабельных компонентов §Y«$tech_enigmatic_decoder$»§! и §Y«$tech_dark_matter_propulsion$»§!.\n"
 menp_cosmo_techs_2_desc: "Открывая новые способы прикладного применения темной материи, мы двигаем науку вперед."
 menp_cosmo_features_2: "Гравитационные устройства"
 unlocks_features_2: "Открывает технологию §Y«$tech_cosmogenesis_crisis_2$»§!, которая приблизит нас к осуществлению задуманного.\n"
 menp_cosmo_features_2_desc: "$tech_cosmogenesis_crisis_2_desc$\n"
 menp_cosmo_ship_3: "Озадачивающие крейсеры"
 unlocks_ship_3: "Открывает технологию, необходимую для §Yлинейного крейсера§! угасшей империи.\n"
 menp_cosmo_ship_3_desc: "[Get_menp_cosmo_ship_3]"
 menp_cosmo_ship_3_desc_regular: "Еще один оптимизированный звездолет, на этот раз больших размеров, по сравнению с которым линкоры покажутся детскими игрушками."
 menp_cosmo_buildings_3: "Сложная инфраструктура"
 unlocks_buildings_3: "Теперь можно изучать сложные сооружения угасших империй.\n"
 menp_cosmo_buildings_3_desc: "Мы приоткрыли завесу тайны, окутывающую угасшие империи, и не собираемся останавливаться на полпути. Со временем мы познаем все их секреты."
 menp_cosmo_techs_3: "Экзотические антибарионы"
 unlocks_techs_3: "Открывает технологию, необходимую для корабельных компонентов §Y«$tech_enigmatic_encoder$»§! и §Y«$tech_dark_matter_deflector$»§!.\n"
 menp_cosmo_techs_3_desc: "Темная материя пригодится нам в обороне и шифровании: мы сможем создавать нейтрализующие поля и надежные каналы связи."
 menp_cosmo_features_3: "Бесконечное расширение"
 unlocks_features_3: "Открывает технологию §Y«$tech_cosmogenesis_crisis_3$»§!, которая приблизит нас к осуществлению задуманного.\n"
 menp_cosmo_features_3_desc: "$tech_cosmogenesis_crisis_3_desc$\n"
 menp_cosmo_ship_4: "Необъяснимые флагманы"
 unlocks_ship_4: "Открывает технологию, необходимую для §Yтитана§! угасшей империи.\n"
 menp_cosmo_ship_4_desc: "[Get_menp_cosmo_ship_4]"
 menp_cosmo_ship_4_desc_regular: "Этот грозный корабль больше всего похож на мобильную крепость. Только самое чудовищное оружие способно нанести ему хоть какой-то урон."
 menp_cosmo_buildings_4: "Золотой век"
 unlocks_buildings_4: "Теперь можно изучать невероятные сооружения угасших империй.\n"
 menp_cosmo_buildings_4_desc: "Поразительно, насколько ловко угасшие империи умели воздействовать на пространство. С каждым новым открытием даже самые сложные технологии начинают казаться нам элементарными."
 menp_cosmo_techs_4: "Броня и вооружение"
 unlocks_techs_4: "Открывает технологию, необходимую для корабельных компонентов §Y«$tech_energy_lance_2$»§! и §Y«$tech_dragon_armor$»§!.\n"
 menp_cosmo_techs_4_desc: "Благодаря последним достижениям науки мы сможем оснастить корабли еще более смертоносным вооружением и прочной броней."
 menp_cosmo_features_4: "Презирающий правила"
 unlocks_features_4: "Открывает технологию §Y«$tech_cosmogenesis_crisis_4$»§!, которая приблизит нас к осуществлению задуманного.\nТакже открывает повторяющуюся технологию §Y«$tech_cosmogenesis_thesis$»§!, дающую §Yпродвинутую логику§! в значительном объеме.\n"
 menp_cosmo_features_4_desc: "$tech_cosmogenesis_crisis_4_desc$"
 menp_cosmo_buildings_5: "Память и творение"
 unlocks_buildings_5: "Теперь можно изучать непостижимые сооружения угасших империй.\n"
 menp_cosmo_buildings_5_desc: "Мы раскрыли все тайны угасших империй. Они положат начало новой эпохе для нашего народа."
 menp_cosmo_techs_5: "Нанорои"
 unlocks_techs_5: "Открывает технологию, необходимую для корабельных компонентов §Y«$tech_nanite_repair_system$»§!, §Y«$tech_nanite_autocannon$»§! и §Y«$tech_nanite_flak_batteries$»§!.\n"
 menp_cosmo_techs_5_desc: "Каждая смена взглядов открывает новые возможности. Даже ничтожные изменения могут повлечь за собой серьезные последствия."
 menp_cosmo_features_5: "Пустоход"
 unlocks_features_5: "Открывает технологию §Y«$tech_cosmogenesis_crisis_5$»§!, которая позволит нам построить §YГоризонтную иглу§! и осуществить задуманное."
 menp_cosmo_features_5_desc: "$tech_cosmogenesis_crisis_5_desc$"
 cosmogenesis_level_2_req_clear_tooltip: "£trigger_yes£ Исследована §Yтехнология «$tech_cosmogenesis_crisis_1$»§!"
 cosmogenesis_level_2_req_tooltip: "£trigger_no£ Исследована §Yтехнология «$tech_cosmogenesis_crisis_1$»§!"
