 building_nanotech_cauldron_desc: "Этот рой на молекулярном уровне без труда перестраивает минералы в решетки сплавов."
 d_nanotech_devastation: "£blocker£ Бассейн для сбора нанитов"
 d_nanotech_devastation_desc: "Здесь когда-то добывались ресурсы для создания новых нанитов — какая-то часть еще осталась в залежах. Беспощадное опустошение недр планеты оставило на поверхности незаживающий шрам."
 situation_nanotech_consume_planet: "Извлечь наниты из планеты [Target.GetName]"
 situation_nanotech_consume_planet_type: "Извлечь наниты"
 situation_nanotech_consume_planet_monthly_change_tooltip: "Ход извлечения нанитов"
 situation_nanotech_consume_planet_desc: "Всему в этой вселенной — даже целым планетам — суждено стать частью нашего общего организма. Частью нас самих."
 nanotech_devour_effect: "Преобразовать этот мир и пополнить лавину новыми нанитами."
 decision_nanotech_swarm_consume_world: "Поглотить мир"
 decision_nanotech_swarm_consume_world_desc: "Наши планеты будут преобразованы, вольются в наш поток и станут частью нашего естества."
