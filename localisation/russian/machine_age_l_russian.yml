 cosmogenesis_needle: "$NAME_Cosmogenesis_Sphere$"
 cosmogenesis_needle_DESC: "Этот корабль, способный переписывать реальность, одним своим существованием нарушает все законы вселенной. Спроектирован он с одной целью: пробить горизонт событий черной дыры и погрузиться прямо в сердце сингулярности, где бесконечная плотность порождает бесконечное тяготение."
 cosmogenesis_needle_MEGASTRUCTURE_DETAILS: "Чтобы вознестись в сотворенную лично нами реальность, нужно переселить всю цивилизацию на Горизонтную иглу. Лишь тогда мы сможем навсегда покинуть эту вселенную."
