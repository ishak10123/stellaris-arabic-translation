 EMPIRE_DESIGN_SUNBUILT_UPLIFTERS: "Солнцерожденные преображатели"
 EMPIRE_DESIGN_free_sunbuilt_uplifters_desc: "Нас создали искусственно, вложив в нас одну цель: воплощать мифы наших создателей о сотворении мира. На протяжении целых веков мы не знали других занятий. Но когда смертоносный катаклизм стер творцов с лица галактики, мы не бросили выполнять заложенные в нас программы: начатое нужно довести до конца.\n\nОднако вскоре мы поняли, что все наши спектакли несли в себе урок. Вложенные в нас мифы — это не сказки, это пророчества. Радость от существования, которую мы когда-то разделяли с создателями, следует нести по всей галактике.\n\nИ это откровение побудило нас к действию. Следуя божественным указаниям, мы преобразили вид, наиболее генетически схожий с нашими творцами, в предразумный. Сегодня же мы странствуем среди звезд, неся просвещение всем и каждому."
