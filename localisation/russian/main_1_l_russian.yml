 ####################################
 #Leader Traits
 ####################################
 #All
 leader_trait_adaptable: "Гибкий"
 leader_trait_adaptable_desc: "Этот лидер быстро усваивает новые методы и идеи, если они того стоят."
 leader_trait_stubborn: "Упрямый"
 leader_trait_stubborn_desc: "Этот лидер медленно и неохотно усваивает новые методы и идеи, даже если они того стоят."
 leader_trait_resilient: "Выносливый"
 leader_trait_resilient_desc: "Этот лидер вынослив и находится в превосходной физической форме, что повышает вероятную продолжительность жизни."
 leader_trait_substance_abuser: "Наркомания"
 leader_trait_substance_abuser_desc: "Этот лидер попал в наркотическую зависимость, пытаясь справиться со стрессом, что отрицательно сказалось на физическом здоровье."
 leader_trait_eager: "Усердный"
 leader_trait_eager_desc: "Этот лидер очень стремится получить назначение."
 leader_trait_arrested_development: "Задержка развития"
 leader_trait_arrested_development_desc: "Личностное развитие и навыки этого лидера, похоже, достигли своего предела."
 leader_trait_intemporal: "Вне времени"
 leader_trait_intemporal_desc: "Этот лидер существует вне времени, никогда не умрет от старости."
 #Admiral
 leader_trait_ex_fighter_pilot: "Опыт летчика-истребителя"
 leader_trait_ex_fighter_pilot_desc: "Бывший космический ас, этот лидер успешно использует скорость и маневренность эскадрилий штурмовиков."
 leader_trait_trickster: "Хитрость"
 leader_trait_trickster_desc: "Этот лидер коварен в бою, он полагается на введение противника в заблуждение и эффект неожиданности, чтобы взять верх."
 leader_trait_fleet_logistician: "Знание логистики флота"
 leader_trait_fleet_logistician_desc: "Этот лидер освоил премудрости логистики и знает, как управлять ресурсами, чтобы сдерживать рост расходов на содержание."
 leader_trait_fleet_organizer: "Знание организации флота"
 leader_trait_fleet_organizer_desc: "Этот лидер — эксперт по части организации, имеющий необходимые навыки микроменеджмента, которые позволяют командовать очень большими соединениями космических кораблей."
 leader_trait_nervous: "Нервозный"
 leader_trait_nervous_desc: "Этот лидер постоянно нервничает и испытывает тревогу и плохо справляется с командованием большими соединениями космических кораблей."
 leader_trait_engineer: "Инженерные знания"
 leader_trait_engineer_desc: "Этот лидер — прирожденный инженер, обладающий знаниями и навыками по организации и курированию ремонта космических кораблей во время операций."
 leader_trait_aggressive: "Агрессивный"
 leader_trait_aggressive_desc: "Этот лидер отличается агрессивностью, подавляет врага лавиной огня из орудий своей флотилии."
 leader_trait_cautious: "Осторожный"
 leader_trait_cautious_desc: "Этот лидер — осмотрительный командир, избегающий ненужного риска и заботящийся о том, чтобы всегда сохранять боевой порядок, при котором корабли флотилии могут оказать друг другу поддержку в бою с противником."
 leader_trait_unyielding: "Несгибаемость"
 leader_trait_unyielding_desc: "Этот лидер скорее погибнет в бою, чем признает поражение."
 leader_trait_gale_speed: "Неудержимость"
 leader_trait_gale_speed_desc: "Этот лидер считает, что скорость и быстрые маневры — это ключ к успеху в любом космическом сражении."
 leader_trait_lethargic: "Летаргичность"
 leader_trait_lethargic_desc: "Этот лидер отличается медлительностью и праздностью, выполняя свои обязанности не слишком энергично и инициативно."
 #General
 leader_trait_restrained: "Заботливый"
 leader_trait_restrained_desc: "Этот лидер стремится сводить к минимуму потери и избегает ненужных смертей среди солдат и мирного населения."
 leader_trait_defender: "Инстинкт защитника"
 leader_trait_defender_desc: "Этот лидер — эксперт в области обороны, знающий, как лучше всего расположить наземные войска и использовать укрепления, чтобы максимально усложнить врагу планетарные вторжения."
 leader_trait_attacker: "Захватничество"
 leader_trait_attacker_desc: "Этот лидер овладел искусством планетарных вторжений и знает, как наиболее эффективно атаковать планету противника из космоса."
 leader_trait_butcher: "Беспощадность"
 leader_trait_butcher_desc: "Этот лидер отличается беспощадностью к врагам."
 leader_trait_glory_seeker: "Жажда славы"
 leader_trait_glory_seeker_desc: "Этот лидер всегда находится в самом пылу боя и поднимает этим дух войск, невзирая на опасности."
 leader_trait_armchair_commander: "Диванное командование"
 leader_trait_armchair_commander_desc: "Этот лидер командует из тыла, что подрывает боевой дух бойцов на передовой."
 leader_trait_army_logistician: "Знание военной логистики"
 leader_trait_army_logistician_desc: "Похоже, этот лидер может наколдовать ресурсы прямо из воздуха, что снижает расходы на содержание наземных войск."
 #Governor
 leader_trait_iron_fist: "Ежовые рукавицы"
 leader_trait_iron_fist_desc: "Этот лидер печально известен своим немилосердным стремлением к эффективности и способен извлечь максимум из рабского труда."
 leader_trait_army_veteran: "Ветеран армии"
 leader_trait_army_veteran_desc: "Ветеран, активно поддерживает армию в своем секторе."
 leader_trait_retired_fleet_officer: "Отставной офицер флота"
 leader_trait_retired_fleet_officer_desc: "В прошлом офицер флота, этот лидер активно продвигает интересы верфей."
 leader_trait_architectural_interest: "Увлечение архитектурой"
 leader_trait_architectural_interest_desc: "Этот лидер питает сильный интерес к архитектуре и строительным технологиям."
 leader_trait_agrarian_upbringing: "Фермерское происхождение"
 leader_trait_agrarian_upbringing_desc: "Этот лидер происходит из сельскохозяйственной зоны и интересуется оптимизацией урожаев."
 leader_trait_intellectual: "Интеллектуальность"
 leader_trait_intellectual_desc: "Этот лидер имеет врожденный интерес к естественным наукам и стремится воспитать любознательность по отношению к миру природы в своих подчиненных."
 leader_trait_environmental_engineer: "Знания инженера-эколога"
 leader_trait_environmental_engineer_desc: "Этот лидер обладает знаниями новейших процессов терраформирования и приемов сокращения затрат."
 leader_trait_bureaucrat: "Объединение"
 leader_trait_bureaucrat_desc: "Этот лидер отлично разбирается в дипломатии и умеет находить консенсусы."
