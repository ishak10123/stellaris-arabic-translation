 slave_army_plural: "Армии рабов"
 slave_army_desc: "Рабы, выполняющие волю своих хозяев на поле боя. Некоторые стали солдатами поневоле, но многие рабы сами идут воевать, чтобы спастись от тяжелого физического труда или получить более щедрый паек."
