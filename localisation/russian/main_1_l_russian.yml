 robotic_army_plural: "Армии роботов"
 robotic_army_desc: "Безжалостные механические убийцы, созданные исключительно для войны. Они упорно добиваются поставленной цели и им не страшен низкий боевой дух, столь часто ухудшающий параметры органических солдат."
