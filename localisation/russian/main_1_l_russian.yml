 trait_ruler_recruiter: "Вербовщик"
 trait_ruler_recruiter_desc: "Этот лидер обладает особой харизмой, и новобранцы буквально выстраиваются в очередь, чтобы служить своей стране."
 trait_ruler_from_the_ranks: "Выходец из низов"
