 starting_ftl_hyperdrive: "Гиперпространство"
 starting_ftl_wormhole: "Червоточины"
 starting_ftl_warp_desc: "Варп-двигатель окружает корабль подпространственным «пузырем», разгоняя его до сверхсветовой скорости. Корабль свободно путешествует между звездами, но сравнительно медленно, если учесть огромные расстояния."
 starting_ftl_hyperdrive_desc: "Гипердвигатель позволяет кораблю на время войти в гиперпространство. Перелеты между звездами занимают мало времени, но доступные маршруты ограничены сетью гиперпространственных коридоров."
 starting_ftl_wormhole_desc: "Генераторы червоточин пронзают подпространство и создают тоннель между двумя точками космоса. Они слишком велики, чтобы устанавливать их на кораблях, поэтому для них строят особые станции червоточин."
 RECOMMENDED_BEGINNER: "§G(Новые игроки)§!"
 RECOMMENDED_ADVANCED: "§R(Продвинутые игроки)§!"
 TOOLTIP_SETUP_APPEARANCE: "§H$PORTRAIT$§!\nВыберите разновидность и внешность своей расы."
 TOOLTIP_SETUP_SPECIES_NAME: "§H$SPECIES_NAME$§!\nВыберите название своей расы."
 TOOLTIP_SETUP_TRAITS: "§H$TRAITS$§!\nВыберите признаки для своей расы."
 TOOLTIP_SETUP_RULER: "§H$RULER$§!\nВыберите своего начального правителя. Обратите внимание, что при некоторых формах правления смена правителя может происходить чаще и что правитель может умереть."
 TOOLTIP_SETUP_NAME_CLASS: "§H$NAME_AND_CLASS$§!\nВыберите класс и название планеты, которая будет вашим родным миром. Выбранный вами класс планеты также будет основным типом планеты для вашей расы.\n\nПланеты других классов могут быть заселены вашей расой в зависимости от того, насколько они отличаются от класса вашей родной планеты."
 TOOLTIP_SETUP_CITY_APPEARANCE: "§H$CITY_GRAPHICS$§!\nВыберите внешний вид своих городов. На игровой процесс это никак не влияет."
 TOOLTIP_SETUP_GOVERNMENT: "§H$ETHICS_AND_GOVERNMENT$§!\nВыберите принципы и форму правления для вашего государства. Ваш выбор принципов определяет доступные формы правления."
 TOOLTIP_SETUP_EMPIRE_ADVISOR: "§H$EMPIRE_ADVISOR$§!\nВыберите тип голоса для предупреждений и уведомлений."
 TOOLTIP_SETUP_EMPIRE_NAME: "§H$EMPIRE_NAME$§!\nПридумайте название своего государства."
 TOOLTIP_SETUP_FLAG: "§H$EMPIRE_FLAG$§!\nПридумайте флаг своего государства."
 TOOLTIP_SETUP_EMPIRE_NAMELIST: "§H$CUSTOMIZE_NAME_LISTS$§!\nОпределите, из какого списка будут выбираться имена ваших лидеров и названия ваших кораблей и планет."
 TOOLTIP_SETUP_SPECIES_EMPIRE_NAMES: "§H$NAMES$§!\nПридумайте название своей расы и государства."
 TOOLTIP_SETUP_WEAPONS: "§H$STARTING_WEAPONS$§!\nВыберите начальное оружие, которым будут оснащаться корабли вашего государства.\n\nВы сможете поменять компоненты оружия, устанавливаемые на корабли, прямо во время игры. Это можно сделать с помощью §Yконструктора кораблей§!."
 TOOLTIP_SETUP_FTL: "§H$FTL_LABEL$§!\nВыберите метод межзвездных путешествий, который будет использоваться вашим государством. Вы не сможете его поменять, пока не откроете некоторые очень редкие технологии. Во время игры смена основной технологии сверхсветовых путешествий невозможна."
 TOOLTIP_SETUP_SHIP_APPEARANCE: "§H$SHIP_GRAPHICS$§!\nВыберите внешний вид кораблей вашего государства."
 SECONDARY_SPECIES: "Дополнительная раса"
 TOOLTIP_SETUP_SECONDARY_SPECIES_APPEARANCE: "§H$PORTRAIT$§!\nВыберите внешний вид своей дополнительной расы."
 TOOLTIP_SETUP_SECONDARY_SPECIES_NAME: "§H$SPECIES_NAME$§!\nВыберите название своей дополнительной расы."
 TOOLTIP_SETUP_SECONDARY_SPECIES_NAMELIST: "§H$CUSTOMIZE_NAME_LISTS$§!\nВыберите список имен для лидеров дополнительной расы."
 TOOLTIP_SETUP_SECONDARY_SPECIES_TRAITS: "§H$TRAITS$§!\nВыберите признаки для дополнительной расы."
