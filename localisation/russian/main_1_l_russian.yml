 ####################################
 trait_pc_alpine_preference: "Предпочтение высокогорных миров"
 trait_pc_alpine_preference_short: "Высокогорный мир"
 trait_pc_alpine_preference_desc: "§LКлиматические предпочтения закладываются на генетическом уровне в результате многих тысячелетий эволюции или искусных манипуляций.§!"
 trait_pc_savannah_preference: "Предпочтение миров саванны"
 trait_pc_savannah_preference_short: "Саванновый мир"
 trait_pc_savannah_preference_desc: "§LКлиматические предпочтения закладываются на генетическом уровне в результате многих тысячелетий эволюции или искусных манипуляций.§!"
 trait_pc_arctic_preference: "Предпочтение арктических миров"
 trait_pc_arctic_preference_short: "Арктический мир"
 trait_pc_arctic_preference_desc: "§LКлиматические предпочтения закладываются в результате многих тысячелетий эволюции, согласно замыслу или в ходе искусных генетических манипуляций.§!"
 trait_pc_ocean_preference: "Предпочтение океанических миров"
 trait_pc_ocean_preference_short: "Океанический мир"
 trait_pc_ocean_preference_desc: "$trait_pc_arctic_preference_desc$"
 trait_pc_continental_preference: "Предпочтение континентальных миров"
