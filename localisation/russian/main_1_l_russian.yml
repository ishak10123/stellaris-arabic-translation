 LGATE_LABEL_TOOLTIP: "Определяет, будут ли в игре существовать загадочные ['concept_l_gates'].$requires_dis_stars$"
 AGGRESSIVENESS_NORMAL: "Нормальная"
 AGGRESSIVENESS_HIGH: "Высокая"
 AGGRESSIVENESS_LOW: "Низкая"
 FE_AGGRESSIVENESS: "Агрессивность ИИ"
 FE_AGGRESSIVENESS_TOOLTIP: "§HАгрессивность ИИ§!\nПараметр определяет вероятность того, что ИИ-государства объявят войну своим врагам, и, таким образом, общее количество войн, которые начинаются в течение кампании. Независимо от параметра агрессивности, ИИ объявляет войну только в том случае, если это позволяет сделать его отношение к возможному противнику."
 FE_DIFFICULTY: "Сложность"
 DIFFICULTY_ADJUSTED_AI_MODIFIERS: "Измененный модификатор сложности ИИ"
 DIFFICULTY_ADJUSTED_AI_MODIFIERS_TOOLTIP: "§H$DIFFICULTY_ADJUSTED_AI_MODIFIERS$§!\nОбщегосударственные экономические модификаторы всех государств под управлением ИИ умножаются на бонус §Yсложности§!. Например, технология, увеличивающая добычу £minerals£ минералов [miner.GetIcon] шахтёрами на +20%, на сложности ['concept_grand_admiral'] даст ИИ-государствам бонус в +40%.\n\n§PВнимание:§! если включить этот параметр, к концу игры у ИИ-государств будет значительно более сильная экономика."
 DIFFICULTY_CIVILIAN_DESC: "Игрок получает колоссальные бонусы к экономике, исследованиям и вместимости флота, а также бонус к установлению новых контактов. Кроме того, в игре не будет агрессивных и подрывных ИИ-государств."
 DIFFICULTY_CADET_DESC: "Игрок получает бонусы к экономике, исследованиям и вместимости флота."
 DIFFICULTY_ENSIGN_DESC: "ИИ не имеет экономических, научных или военных преимуществ перед игроком."
 DIFFICULTY_CAPTAIN_DESC: "ИИ получает небольшие бонусы к экономике, исследованиям и вместимости флота."
 DIFFICULTY_COMMODORE_DESC: "ИИ получает средние бонусы к экономике, исследованиям и вместимости флота."
 DIFFICULTY_ADMIRAL_DESC: "ИИ получает значительные бонусы к экономике, исследованиям и вместимости флота."
 DIFFICULTY_GRAND_ADMIRAL_DESC: "ИИ получает колоссальные бонусы к экономике, исследованиям и вместимости флота."
 FE_DIFFICULTY_TOOLTIP: "§HСложность§!\nОпределяет сложность игры.\n\nДоступны следующие уровни сложности:\n– §Y$DIFFICULTY_CIVILIAN$§!: $DIFFICULTY_CIVILIAN_DESC$\n– §Y$DIFFICULTY_CADET$§!: $DIFFICULTY_CADET_DESC$\n– §Y$DIFFICULTY_ENSIGN$§!: $DIFFICULTY_ENSIGN_DESC$\n– §Y$DIFFICULTY_CAPTAIN$§!: $DIFFICULTY_CAPTAIN_DESC$\n– §Y$DIFFICULTY_COMMODORE$§!: $DIFFICULTY_COMMODORE_DESC$\n– §Y$DIFFICULTY_ADMIRAL$§!: $DIFFICULTY_ADMIRAL_DESC$\n– §Y$DIFFICULTY_GRAND_ADMIRAL$§!: $DIFFICULTY_GRAND_ADMIRAL_DESC$"
 FE_IRONMAN: "Режим «Стальная воля»"
 FE_IRONMAN_TOOLTIP: "§HРежим «Стальная воля»§!\nВ режиме «Стальная воля» недоступна командная строка с консольными командами, а игра автоматически сохраняется в один и тот же файл. В этом режиме вам отступать некуда."
 FE_EMPIRES_TOOLTIP: "§HКоличество ИИ-государств§!\nПараметр определяет, сколько ИИ-государств будет в галактике."
 FE_ADVANCED_EMPIRES_TOOLTIP: "§HКоличество развитых ИИ§!\nПараметр определяет, сколько ИИ-государств начнет игру с преимуществом в ресурсах, технологиях и населении. Развитые государства не получают никаких бонусов, кроме более сильной стартовой позиции. Этот параметр не затрагивает ['concept_fallen_empires', угасшие империи]."
 FE_IRONMAN_MULTIPLAYER: "§RРежим «Стальная воля» недоступен для сетевой игры.§!"
 FE_IRONMAN_NOCLOUD: "§RРежим «Стальная воля» требует доступа к Steam Cloud, и необходимо, чтобы игрок был подключен к Steam.§!"
 FE_IRONMAN_AUTOSAVE: "§RВы не можете изменять периодичность автосохранения в режиме «Стальная воля».§!"
 FE_GALAXY_SHAPE_TOOLTIP: "§HФорма галактики§!\nОпределяет форму карты галактики.\n\nнекоторые формы доступны только для галактик определенных §Yразмеров§!.\n\nДоступны следующие формы галактик:\n$concept_galaxy_shape_desc$"
 FE_GALAXY_SIZE_TOOLTIP: "§HРазмер галактики§!\nОпределяет максимальное количество звездных систем в галактике. Также влияет на количество §YИИ-государств§! по умолчанию.\n\n§RВнимание:§! увеличение этого параметра сильно влияет на производительность на поздних стадиях игры."
 ACHIEVEMENT_TOOLTIP_YES: "§GВ этой игре можно получать достижения.§!"
 ACHIEVEMENT_TOOLTIP_NO: "§RВ этой игре НЕЛЬЗЯ получать достижения.§!"
 ACHIEVEMENT_TOOLTIP_IRONMAN: "§RРежим «Стальная воля» не включен§!"
 ACHIEVEMENT_TOOLTIP_CHECKSUM: "§RКонтрольная сумма модифицирована§!"
 ACHIEVEMENT_ELIGIBLE: "§GВ этой игре доступны достижения.§!"
 ACHIEVEMENT_CONSOLE_WARNING: "Достижения отключатся при использовании любых консольных команд."
 ACHIEVEMENT_NOT_ELIGIBLE: "§IВ этой игре достижения недоступны.§!"
 NUM_FALLEN_EMPIRES: "Угасшие империи"
 FE_FALLEN_EMPIRES_TOOLTIP: "§HЧисло угасших империй§!\nОпределяет, в каком максимальном количестве в галактике появляются ['concept_fallen_empires']."
 NUM_MARAUDER_EMPIRES: "Мародерские империи"
 FE_MARAUDER_EMPIRES_TOOLTIP: "§HЧисло мародерских империй§!\nОпределяет, в каком максимальном количестве в галактике появляются ['concept_marauder_empires', Marauder Empires]."
 NUM_HABITABLE_WORLDS: "Годные для жизни миры"
 FE_HABITABLE_WORLDS_TOOLTIP: "§HПригодные для жизни миры§!\nОпределяет вероятность нахождения планет в зонах обитаемости звездных систем, то есть пригодности их для жизни. Чем выше этот показатель, тем больше в галактике будет пригодных для жизни планет. Если выбрать значение «§Y$FE_HABITABLE_WORLDS_RARE$§!», такие планеты будут появляться только в особых системах.\n\n§RВнимание:§! выставление этого показателя выше, чем 1x, может сказаться на производительности на поздних стадиях игры."
 FE_HABITABLE_WORLDS_RARE: "Редко"
 FE_RANDOMIZE: "Случайно"
 FE_RANDOMIZE_EMPIRES_TOOLTIP: "При включении параметра генерируется случайное число ИИ-государств в указанном ползунком диапазоне."
 FE_RANDOMIZE_ADVANCED_EMPIRES_TOOLTIP: "При включении параметра случайное число ИИ-государств в указанном ползунком диапазоне начнут игру на более высокой ступени развития."
 FE_RANDOMIZE_FALLEN_EMPIRES_TOOLTIP: "При включении параметра генерируется случайное число угасших империй в указанном ползунком диапазоне."
 FE_RANDOMIZE_MARAUDER_EMPIRES_TOOLTIP: "При включении параметра генерируется случайное число мародерских империй в указанном ползунком диапазоне."
 FE_CLUSTERED_STARTS: "Расположение государств"
 FE_CLUSTERED_STARTS_TOOLTIP: "§HРасположение государств§!\nПараметр определяет, будут ли государства зарождаться в скоплениях или распределяться по галактике случайным образом."
 FE_ADVANCED_NEAR_PLAYER: "Развитые соседи"
 FE_ADVANCED_NEAR_PLAYER_TOOLTIP: "§HРазвитые соседи§!\nПараметр определяет, будет ли ['concept_advanced_empires', государствам с развитым ИИ] разрешено зарождаться возле игрока. §YВыключение§! данного параметра может привести к появлению меньшего количества соседей с развитым ИИ, чем задано ранее."
 FE_MID_GAME: "Год середины игры"
 FE_MID_GAME_TOOLTIP: "§H$FE_MID_GAME$§!\nПараметр определяет, в каком году раньше всего могут произойти такие события середины игры, как ['concept_machine_uprising', восстания машин] и ['concept_great_khan', Великий хан]."
 FE_GUARANTEED_COLONIES: "Гарантированно пригодные миры"
 FE_GUARANTEED_COLONIES_TOOLTIP: "§H$FE_GUARANTEED_COLONIES$§!\nОпределяет, сколько пригодных для жизни планет такого же класса, что и ваш родной мир, гарантированно появится вблизи вашей стартовой системы.\n\n§RВнимание:§! при отключении этого параметра вы, возможно, вообще не найдете никаких пригодных для жизни миров рядом с вашим родным."
 FE_VICTORY: "Год победы"
 FE_VICTORY_TOOLTIP: "§H$FE_VICTORY$§!\nОпределяет, в каком году закончится игра, если в этот момент не идет ['concept_endgame_crisis'] или ['concept_war_in_heaven']. Победителем объявляется государство с наибольшим §Iсчетом§!. У вас сохранится возможность играть и после этого года.\n\nУстановка этого ползунка на максимальное значение приведет к полному отключению победы по времени."
 FE_END_GAME: "Год финала игры"
 FE_END_GAME_TOOLTIP: "§H$FE_END_GAME$§!\nПараметр определяет, в каком году раньше всего могут произойти такие события конца игры, как ['concept_endgame_crises', кризис конца игры] и ['concept_fallen_empire_awakening', пробуждение угасших империй]."
 FE_TECH_SPEED: "Стоимость технологий"
 FE_TECH_SPEED_TOOLTIP: "§H$FE_TECH_SPEED$§!\nОпределяет, как быстро обычные государства приобретают ['concept_technologies']."
 FE_TECH_SPEED_DIFFICULTY_SCALE: "Стоимость технологий в зависимости от сложности"
 FE_TECH_SPEED_DIFFICULTY_SCALE_TOOLTIP: "§H$FE_TECH_SPEED_DIFFICULTY_SCALE$§!\nОпределяет, насколько затратно будет исследовать ['concept_technologies'] в зависимости от выбранного уровня сложности. Сильнее влияет на передовые технологии.\n\nПовышение этого параметра усложнит игру, особенно на более высоких уровнях сложности."
 DIFF_TECH_SCALING_OFF: "Выкл."
 DIFF_TECH_SCALING_LOW: "Низкая"
 DIFF_TECH_SCALING_NORMAL: "Средняя"
 DIFF_TECH_SCALING_HIGH: "Высокая"
 DIFF_TECH_SCALING_EXTREME: "Очень высокая"
 DIFF_TECH_SCALING_OFF_TOOLTIP: "§H$DIFF_TECH_SCALING_OFF$§!\nЗатраты на ['concept_technology'] не зависят от уровня сложности."
 DIFF_TECH_SCALING_LOW_TOOLTIP: "§H$DIFF_TECH_SCALING_LOW$§!\nПовышение сложности слабо затрагивает затраты на ['concept_technology']. Технологии более высокого уровня стоят дороже, чем технологии низкого уровня."
 DIFF_TECH_SCALING_NORMAL_TOOLTIP: "§H$DIFF_TECH_SCALING_NORMAL$§!\nПовышение сложности умеренно затрагивает затраты на ['concept_technology']. Технологии более высокого уровня стоят дороже, чем технологии низкого уровня."
 DIFF_TECH_SCALING_HIGH_TOOLTIP: "§H$DIFF_TECH_SCALING_HIGH$§!\nПовышение сложности сильно затрагивает затраты на ['concept_technology']. Технологии более высокого уровня стоят дороже, чем технологии низкого уровня."
 DIFF_TECH_SCALING_EXTREME_TOOLTIP: "§H$DIFF_TECH_SCALING_EXTREME$§!\nПовышение сложности очень сильно затрагивает затраты на ['concept_technology']. Технологии более высокого уровня стоят дороже, чем технологии низкого уровня.\n\n§RВнимание:§! выбор этого параметра на высоком уровне сложности может затруднить или даже сделать невозможной победу над врагами в конце игры."
 FE_TRADITION_SPEED: "Стоимость традиций"
 FE_TRADITION_SPEED_TOOLTIP: "§H$FE_TRADITION_SPEED$§!\nОпределяет, как быстро обычные государства приобретают ['concept_traditions']."
 FE_NAVAL_CAPACITY_MULT: "$NAVY_SIZE_TITLE$"
 FE_NAVAL_CAPACITY_MULT_TOOLTIP: "§H$FE_NAVAL_CAPACITY_MULT$§!\nВместимость флота всех государств умножается на это значение. Все модификаторы вместимости флота также будут умножены на это значение.\n\n§RВнимание:§! увеличение этого параметра может повлиять на производительность и игровой баланс на поздних стадиях игры."
 FE_COMMAND_LIMIT_MULT: "$COMMAND_LIMIT$"
 FE_COMMAND_LIMIT_MULT_TOOLTIP: "§H$FE_COMMAND_LIMIT_MULT$§!\nПредел управляемости флотилии всех государств умножается на это значение. Все модификаторы предела управляемости флотилии также будут умножены на это значение.\n\n§RВнимание:§! изменение этого параметра может повлиять на игровой баланс."
 FE_CRISES: "Тяжесть кризиса"
 FE_CRISES_TOOLTIP: "§KТяжесть кризиса§!\nЭтот параметр определяет силу флотилий во время ['concept_endgame_crises', кризиса в конце игры]. Чем выше множитель, тем серьезнее будет кризис.\n\nЕсли в настройках §I«Тип кризиса»§! выбрать §I«Все»§!, это значение будет умножаться на 2 за каждый пережитый кризис.\n\nНа §Yуровнях сложности от «$DIFFICULTY_ENSIGN$»§! и выше этот параметр будет также затрагивать тяжесть §Yкризиса середины игры§!."
 FE_PRIMITIVE_WORLDS: "Досветовые цивилизации и предразумные расы"
 FE_PRIMITIVE_WORLDS_TOOLTIP: "§H$FE_PRIMITIVE_WORLDS$§!\nПараметр определяет распространенность ['concept_preftl_civilization', досветовых цивилизаций] и ['concept_presapient_species', предразумных рас] в галактике.\n\nЧем он выше, тем больше вероятность их появления при генерации галактики."
 FE_LOGISTIC_CEILING: "Логистический потолок роста"
 FE_LOGISTIC_CEILING_TOOLTIP: "§H$FE_LOGISTIC_CEILING$§!\nПараметр определяет величину бонуса к росту поселений, когда планета находится в центре своей логистической кривой. Чем он выше, тем быстрее растут поселения.\n\n§RВнимание:§! увеличение этого параметра может повлиять на производительность и игровой баланс на поздних стадиях игры."
 FE_GROWTH_SCALE: "Необходимые очки роста"
 FE_GROWTH_SCALE_TOOLTIP: "§H$FE_GROWTH_SCALE$§!\nПараметр масштабирует скорость прироста населения для всех поселений в государстве. Чем он выше, тем медленнее растут поселения.\n\n§RВнимание:§! снижение этого параметра может значительно повлиять на производительность и игровой баланс. Настоятельно рекомендуется одновременно снижать параметр §Y$FE_LOGISTIC_CEILING$§!."
 FE_LOGISTICS_FLEET_UPKEEP: "Логистические затраты на содержание флотилий"
 FE_LOGISTICS_FLEET_UPKEEP_TOOLTIP: "§H$FE_LOGISTICS_FLEET_UPKEEP$§!\nПараметр определяет затраты £trade£ §Yторговли§! на содержание флотилий, когда они не пристыкованы или находятся на вражеской территории. Чем выше значение, тем дороже будут обходиться флотилии во время войны."
 FE_LOGISTICS_PLANET_DEFICIT: "Логистические затраты при планетарном дефиците"
 FE_LOGISTICS_PLANET_DEFICIT_TOOLTIP: "§H$FE_LOGISTICS_PLANET_DEFICIT$§!\nПараметр определяет затраты £trade£ §Iторговли§! на удовлетворение планетарных дефицитов. Чем выше значение, тем дороже будут обходиться крайне специализированные планеты с большим дефицитом ресурсов, даже если эти ресурсы доставляются с других планет в государстве."
 POP_FACTION_SUPPORTERS: "Сторонники"
 POP_FACTION_SUPPRESSED: "Поддержка этой фракции уменьшается на $VALUE$ ежемесячно из-за притеснений."
 GOTO_DESC: "Переместить камеру в: $NAME|Y$"
 SITUATION_GOTO_DESC: "§GЩелкните, чтобы открыть инцидент $NAME|Y$.§!"
 EVENT_CHAIN_GOTO_DESC: "§GЩелкните, чтобы открыть цепочку событий «$NAME|Y$».§!"
 COMBAT_WIDTH_INFO: "$COMBAT_WIDTH$: $MAX|Y$"
 GARRISON_POWER_INFO: "$PLANET_VIEW_GARRISON$: £army_power£ $VALUE|0Y$"
 GARRISON_ASSAULT_POWER_INFO: "$PLANET_VIEW_ASSAULT$: £army_power£ $VALUE|0Y$"
 INVADER_POWER_INFO: "Захватчик: £army_power£ $VALUE|0Y$"
 COMBAT_WIDTH: "Боевая область"
 COMBAT_WIDTH_DESC: "$COMBAT_WIDTH$ у планеты $PLANET|Y$ составляет $AMT|Y$. Этот параметр рассчитывается исходя из размеров планеты и определяет количество армий, которые могут одновременно наносить урон в бою."
 PLANET_DAMAGE: "Планетарный урон"
 PLANET_DAMAGED: "Опустошение: §R$DAMAGE|0$%§!"
 PLANET_DAMAGED_INFO: "Планета понесла $DAMAGE|%Y$ урона. Когда планетарный урон достигает §Y100%§!, квадрат будет опустошен, что приведет к разрушению сооружений и, возможно, гибели поселений."
 PLANET_DAMAGED_INFO_DELAYED: "§EПланетарный урон вызван орбитальной бомбардировкой, а сопутствующий урон наносят наземные сражения, имеющие место на планете. Когда планета не подвергается бомбардировке или вторжению, ущерб постепенно устраняется.§!"
 PLANET_UNDAMAGED_BOMBARDMENT_INFO: "Планета подвергается бомбардировке, но не понесла никакого урона."
 PLANET_UNDAMAGED_INFO: "Планета недавно не подвергалась бомбардировке."
 NO_TILE_TO_BOMBARD: "Текущая тактика бомбардировки, заданная для флотилии на орбите, не позволит нанести этой планете какой-либо дальнейший урон."
