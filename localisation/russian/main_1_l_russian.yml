 starting_weapons_missiles: "Ракетное оружие"
 starting_weapons_lasers_desc: "Это оружие поражает цели с помощью фокусированных пучков энергии. Оно игнорирует большую часть брони противника и эффективно на короткой и средней дистанции."
 starting_weapons_projectiles_desc: "Электромагнитные катапульты ускоряют снаряд, поражая цель с невероятной скоростью. Дальность действия ограничена, однако энергия и скорострельность столь высоки, что они легко перемалывают вражеские щиты."
 starting_weapons_missiles_desc: "Ракеты класса «космос-космос» с ядерными боеголовками. Огромная дальность действия, но система ПВО может сбить такую ракету."
