 psionic_army: "Армия псиоников"
 psionic_army_plural: "Армии псиоников"
 psionic_army_desc: "Солдаты, наделенные псионическими способностями. Их разрушительные пси-таланты в корне меняют тактику и стратегию войны. Эти бойцы первым делом стремятся подавить вражескую волю к сопротивлению."
 xenomorph_army: "Армия ксеноморфов"
 xenomorph_army_plural: "Армии ксеноморфов"
 xenomorph_army_desc: "Полчища голодных тварей, созданных биоинженерами, состоящие из зубов, когтей и ненасытной тяги к убийству. Группа ученых следит за неистовыми стаями и пытается управлять их действиями, сидя в укрепленных бункерах вдали от линии фронта."
 gene_warrior_army: "Армия геномодов"
 gene_warrior_army_plural: "Армии геномодов"
 gene_warrior_army_desc: "Генетически модифицированные супербойцы. Кандидатов обычно выбирают из элитных подразделений регулярной армии. Затем они проходят длительный курс генной терапии, набирают массу, становятся сильнее и быстрее своих бывших товарищей."
