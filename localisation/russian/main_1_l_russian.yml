 android_army_plural: "Армии андроидов"
 android_army_desc: "Будучи полуавтономными «винтиками» в отлаженной военной машине, воины-андроиды являются более выносливыми, агрессивными и лучше реагируют на изменение ситуации на поле боя, чем их предшественники-роботы."
 android_defense_army: "Оборонительная армия андроидов"
