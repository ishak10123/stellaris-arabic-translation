 trait_pc_continental_preference_desc: "$trait_pc_arctic_preference_desc$"
 trait_pc_tundra_preference: "Предпочтение тундровых миров"
 trait_pc_tundra_preference_short: "Тундровый мир"
 trait_pc_tundra_preference_desc: "$trait_pc_arctic_preference_desc$"
 trait_pc_arid_preference: "Предпочтение засушливых миров"
 trait_pc_arid_preference_short: "Засушливый мир"
 trait_pc_arid_preference_desc: "$trait_pc_arctic_preference_desc$"
 trait_pc_desert_preference: "Предпочтение пустынных миров"
 trait_pc_desert_preference_short: "Пустынный мир"
