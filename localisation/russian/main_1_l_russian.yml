 RESUME_MAJOR_VERSION_WARNING_DESC: "Загружаемое сохранение создано в версии §H$SAVE_VERSION$§!.\nТекущая версия игры: §H$GAME_VERSION$§!.\n\nСохранения обычно несовместимы между крупными обновлениями. При желании вы можете загрузить это сохранение вручную из главного меню, однако это может привести к неожиданным последствиям."
 RESUME_MAJOR_VERSION_WARNING_STEAM_DESC: "Загружаемое сохранение создано в версии §H$SAVE_VERSION$§!.\nТекущая версия игры: §H$GAME_VERSION$§!.\n\nЕсли вы хотите продолжить играть с этого сохранения, рекомендуем вернуться на соответствующую версию игры (щёлкните ПКМ по Stellaris в Steam и выберите Свойства -> Версии игры и бета-версии)"
 SAVE_INCOMPATIBLE_OLDER: "§RНесовместимое сохранение§!\nДанное сохранение из версии $SAVE_VERSION|H$ не совместимо с текущей версией $GAME_VERSION|H$, что приведет к неожиданным последствиям для игрового процесса.\n\nСоздание нового сохранения на основе данного §Hне§! сделает его совместимым."
 SAVE_INCOMPATIBLE_NEWER: "§RВероятность несовместимого сохранения§!\nДанное сохранение из версии $SAVE_VERSION|H$ является более новым по сравнению с текущей версией $GAME_VERSION|H$, что может привести к неожиданным последствиям для игрового процесса.\n\nСоздание нового сохранения на основе данного, §Hвероятно, не§! сделает его полностью совместимым."
