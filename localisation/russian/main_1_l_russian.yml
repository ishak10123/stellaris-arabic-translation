 clone_army: "Армия клонов"
 clone_army_plural: "Армии клонов"
 clone_army_desc: "Специализированные клоны, достигающие зрелости за несколько месяцев. Их срок жизни — меньше десятилетия, и они напрочь лишены инициативы, зато беспрекословно выполняют приказы офицеров."
