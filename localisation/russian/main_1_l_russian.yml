 trait_pc_nuked_preference: "Предпочтение опустошенных миров"
 trait_pc_nuked_preference_short: "Опустошенный мир"
 trait_machine_pc_nuked_preference: "$trait_pc_nuked_preference$"
 trait_machine_pc_nuked_preference_short: "$trait_pc_nuked_preference_short$"
 trait_pc_nuked_preference_desc: "$trait_pc_arctic_preference_desc$"
 trait_machine_pc_nuked_preference_desc: "$trait_pc_arctic_preference_desc$"
 trait_pc_gaia_preference: "Предпочтение идеальных миров"
 trait_pc_gaia_preference_short: "Идеальный мир"
 trait_pc_gaia_preference_desc: "$trait_pc_arctic_preference_desc$"
 trait_pc_ai_preference: "Предпочтение ИИ-миров"
 trait_pc_ai_preference_short: "ИИ-мир"
 trait_pc_ai_preference_desc: "$trait_pc_arctic_preference_desc$"
 trait_pc_ringworld_habitable_preference: "Предпочтение миров-колец"
 trait_pc_ringworld_habitable_preference_short: "Мир-кольцо"
 trait_pc_ringworld_habitable_preference_desc: "$trait_pc_arctic_preference_desc$"
 trait_pc_habitat_preference: "Предпочтение орбитальных поселений"
 trait_pc_habitat_preference_short: "Орбитальное поселение"
 trait_pc_habitat_preference_desc: "$trait_pc_arctic_preference_desc$"
 trait_pc_shattered_ring_habitable_preference: "Предпочтение миров-колец"
 trait_pc_shattered_ring_habitable_preference_short: "Мир-кольцо"
 trait_pc_shattered_ring_habitable_preference_desc: "$trait_pc_arctic_preference_desc$"
 trait_pc_gaia_preference_terraforming: "$trait_pc_gaia_preference$"
 trait_pc_gaia_preference_terraforming_short: "$trait_pc_gaia_preference_short$"
 trait_pc_gaia_preference_terraforming_desc: "§LКлиматические предпочтения закладываются на генетическом уровне. В данном случае случайным образом.§!"
 gaia_preference_terraforming_trait_tooltip: "Производство в идеальных мирах: §G+5%§!"
 trait_dry_planet_preference: "Предпочтение сухих миров"
 trait_dry_planet_preference_short: "Сухая планета"
 trait_dry_planet_preference_desc: "§LКлиматические предпочтения закладываются в процессе проектирования.§!"
 trait_wet_planet_preference: "Предпочтение влажных миров"
 trait_wet_planet_preference_short: "Влажная планета"
 trait_wet_planet_preference_desc: "$trait_dry_planet_preference_desc$"
 trait_cold_planet_preference: "Предпочтение холодных миров"
 trait_cold_planet_preference_short: "Холодная планета"
 trait_cold_planet_preference_desc: "$trait_dry_planet_preference_desc$"
