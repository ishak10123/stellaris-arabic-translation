 concept_pleasure_seekers_civics_desc: "К гражданским моделям группы «$concept_pleasure_seekers_civics$» относятся:\n- «['civic:civic_pleasure_seekers']»$NEW_LINE$- «['civic:civic_corporate_hedonism']»"
