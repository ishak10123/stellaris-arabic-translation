 concept_environmental_architects_civics_desc: "К гражданским моделям группы «$concept_environmental_architects_civics$» относятся:\n- «['civic:civic_environmental_architects']»$NEW_LINE$- «['civic:civic_environmental_architects_megacorp']»"
