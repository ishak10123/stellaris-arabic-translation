 situation_unplugged_identity: "Воплощенная личность"
 situation_unplugged_identity_desc: "Мы свободны от [origin_unplugged_assimilator_empire.GetName&gen] и теперь должны решить, как лучше представить себя галактике. Мы можем либо стать воплощением грозного могущества Машины, либо отказаться от аугментаций, запятнавших нас, словно клеймо. [owner.GetSpeciesAdj&pl] голоса стремятся, чтобы их услышали."
 situation_unplugged_identity_type: "Инцидент «Воплощенная личность»"
 unplugged_identity_stage_1: "Декиберизация" # describes an outcome of the Situation
 situation_unplugged_stage_decyberize: "Мы отказываемся от аугментаций и всего устрашающего могущества, которое они сулят."
