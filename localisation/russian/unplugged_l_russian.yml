 # Civil War & 'The Injured'
 unplugged.100.name: "Победа за нами"
 unplugged.100.desc: "Мы даже не успели осознать свое место в этой вселенной — жестокие машины напали на нас мгновенно и беспощадно. Однако, похоже, что мы куда более способны к насилию, чем они.\n\nИх государство, называемое §Y[origin_unplugged_assimilator_empire.GetName]§!, сегодня понесло огромные потери. Разведка сообщает, что оно раскололось на множество кусочков — неужели после этой небольшой стычки? Вопросов гораздо больше, чем ответов, однако инстинкты подсказывают, что здесь что-то не так.\n\nЕсли верить датчикам, поблизости не осталось ни одного вражеского корабля, однако уровень радиации на планете §Y[origin_unplugged_pre_ftl_planet.GetName]§! невероятно высок.\n\nПри этом в соседних системах мы обнаружили отдельные флотилии — осколки былой силы. Сейчас они просто удерживают позиции."
 unplugged.100.a: "Что теперь делать?"
 unplugged.100.b: "…А чего нам не хватает, то мы возьмем сами."
 unplugged.100.c: "Испытаем нашу смекалку."
 unplugged.100.d: "Да защитят нас боги."
 opinion_unplugged_injured_diplomacy: "Разжигатели гражданской войны"
 opinion_unplugged_injured_distrustful: "$pre_ftl_distrustful$"
 # Dialog
 unplugged.115.desc: "…вторяю: [origin_unplugged_assimilator_empire.GetSpeciesNamePlural]! Мы сдаемся. Хотите обсудить условия нашей капитуляции? Ведь из-за этого вы остановились?\n\nМы просим пощады. Вся наша цивилизация разрушена. Мы проиграли. Скажите, что нам делать дальше." # This civilization is mistaking the player for the Driven Assimilator empire they were once part of
 unplugged.115.desc.pacifist: "…вторяю: [origin_unplugged_assimilator_empire.GetSpeciesNamePlural]! Мы готовы обсудить условия нашей капитуляции. Ведь из-за этого вы остановились?\n\nУмоляем вас, скажите, что нам делать дальше! Мы не будем сопротивляться — мы хотим только мира." # This civilization is mistaking the player for the Driven Assimilator empire they were once part of
 unplugged.115.desc.phobe: "…вторяю: [origin_unplugged_assimilator_empire.GetSpeciesNamePlural]! Мы сдаемся. Ведь вы этого хотите? Из-за этого вы остановились?\n\nУмоляем вас, скажите, что нам делать дальше. Вся наша цивилизация разрушена. Мы хотим только одного: чтобы нас оставили в покое." # This civilization is mistaking the player for the Driven Assimilator empire they were once part of
 unplugged.115.a: "Да, мы принимаем вашу капитуляцию."
 unplugged.115.b: "…«[origin_unplugged_assimilator_empire.GetSpeciesNamePlural]»?!" # incredulous that they are calling us that species name, e.g. ... 'Killbots'?!
 unplugged.116.desc: "…[origin_unplugged_assimilator_empire.GetSpeciesNamePlural]? Вы же ведь?..\n\n(Они точно принимают наш сигнал? Клянусь звездами, если мы ошиблись и они не могут сделать перевод, то всей нашей цивилизации полный и однозначный…)\n\n…[origin_unplugged_assimilator_empire.GetSpeciesNamePlural], вы понимаете нас?! Прошу ответить! Мы не хотим, чтобы между нами возникло недопонимание."
 unplugged.116.b: "Вы думаете, что мы [origin_unplugged_assimilator_empire.GetSpeciesNamePlural]?!" # incredulous that they are calling us that species name, e.g. 'You think we are the Killbots?!''
 unplugged.120.desc: "Спасибо, спасибо! Ваше милосердие — огромная честь для нас, [origin_unplugged_assimilator_empire.GetSpeciesNamePlural]. Как полномочный представитель государства [injured_country.GetName], я хочу обсудить с вами условия нашей капитуляции.\n\nНаши потери огромны, а многие города теперь непригодны для жизни. Мы хотели бы заключить справедливый мир, но, к сожалению, не можем предложить вам ничего достойного сверх того, что у вас уже есть. Умоляем вас принять это во внимание и отдаем себя в ваши [injured_country.species.GetHandNamePlural]."
 unplugged.120.desc.spiri: "Слава высшим и низшим силам! Ваше милосердие — огромная честь для нас, [origin_unplugged_assimilator_empire.GetSpeciesNamePlural]. Как полномочный представитель государства [injured_country.GetName], я хочу обсудить с вами условия нашей капитуляции.\n\nНаши потери огромны. Нам не остается ничего, кроме как пасть перед вами ниц и отдать себя в ваши [injured_country.species.GetHandNamePlural]. Каковы будут ваши требования?"
 unplugged.120.desc.mil_phobe: "Благодарим вас, [origin_unplugged_assimilator_empire.GetSpeciesNamePlural]. Вы чрезвычайно благородны. Как полномочный представитель государства [injured_country.GetName], я хочу обсудить с вами условия нашей капитуляции.\n\nВы нанесли нам удар невероятной силы, и мы… признательны, что вы пошли на перемирие. Теперь мы отдаем себя в ваши [injured_country.species.GetHandNamePlural]."
 unplugged.120.a: "Вы называете нас «[origin_unplugged_assimilator_empire.GetSpeciesNamePlural]». Но почему?"
 unplugged.120.b: "Прощайтесь с жизнью."
 unplugged.120.b.tt: "§LПрекратить переговоры.§!\n\n"
 unplugged.120.c: "Мы прекращаем сеанс связи. Ждите дальнейших сигналов."
 unplugged.120.c.tt: "§LПрекратить переговоры.§!\nЧтобы снова получить доступ к частотам для связи, нужно построить над планетой [injured_homeworld.GetName] §Yстанцию наблюдения§!.\n\n"
 unplugged.125.desc: "Это что, такая уловка? Шутка какая-то?..\n\nЕще несколько месяцев назад мы зафиксировали прибытие вашего флота. Мы хотели выйти на связь, а вы устроили вторжение! Меня, например, пытались убить четыре раза… Десантные корабли шли волнами, а в них — роботы и киборги вроде вас. А затем вдруг все прекратилось.\n\nДа, наша цивилизация уступает вашей, но все-таки мы хотели бы понять, что произошло. Будьте добры, просветите нас, чего вы хотите добиться и почему до сих пор разговариваете с нами?"
 unplugged.125.a: "Мы, [root.GetSpeciesNamePlural], — победители; [origin_unplugged_assimilator_empire.GetSpeciesNamePlural] потерпели поражение."
 unplugged.125.b: "Нам необходим перерыв." # also shows 'unplugged.120.c.tt'
 unplugged.130.desc: "[root.GetSpeciesNamePlural], говорите?\n\nНарод вряд ли скажет вам «спасибо», но знайте: мы рады, что ваша междоусобица закончилась. Кроме того, приятно поговорить с разумным… ну, просто с кем-то разумным.\n\nДля нас, впрочем, все остается по-прежнему: [root.GetSpeciesName], [origin_unplugged_assimilator_empire.GetSpeciesName] — разницы никакой… Вы — первая инопланетная цивилизация, с которой мы вступили в контакт. Вы же попытались нас уничтожить, затем бросились воевать друг с другом и все равно почти стерли нас в пыль.\n\nСпрошу вас прямо: вы пришли к нам как друзья?"
 unplugged.130.a: "Да. Чем мы можем помочь?"
 unplugged.130.b: "Пока что — да."
 unplugged.130.c: "Нас удручает ваше неуважение." # also shows 'unplugged.120.b.tt'
 unplugged.131.desc: "Какое облегчение. Весьма приятно не бояться больше обстрелов и бомбардировок.\n\nМы также будем признательны, если вы, как технологически превосходящая нас цивилизация, поможете нам наладить связь. Открытые дипломатические каналы — это крайне важно, ведь наши судьбы теперь неразрывно связаны.\n\nМы же, в свою очередь, окажем вам всю посильную, хоть и незначительную сейчас помощь, — конечно, как только восстановим разрушенное и похороним погибших. Возможно, схожие обычаи есть и у вас; в таком случае надеемся, что ваши собственные памятники будут напоминать вам об этой войне.\n\nНу, за дальнейшую дружбу между нами, [root.GetSpeciesNamePlural]. И за то, чтобы [origin_unplugged_assimilator_empire.GetSpeciesNamePlural] больше никогда не вернулись — ради вас в том числе…"
 unplugged.131.a: "Спасибо, [injured_country.GetSpeciesNamePlural]." # also shows 'unplugged.120.c.tt'
 unplugged.131.b: "Разумеется…" # also shows 'unplugged.120.c.tt'
 ###################
 # 'Machine Legacy'
 ###################
 unplugged_origin_machine_legacy_chain_title: "Наследие Машины"
 unplugged_origin_machine_legacy_chain_desc: "Машина, некогда присоединившая к себе всю нашу расу, развалилась на части, оставив после себя кровавый след из пожаров и развалин. Но что такое [origin_unplugged_assimilator_empire.GetName] и какая роль в замыслах этого государства была отведена нам?"
 signals_followed: "Изучены сигналы"
 # System 1: 'The Makers'
 unplugged.2000.name: "Успокаивающий фоновый диссонанс"
 unplugged.2000.desc: "В космическом излучении, окружающем нашу звезду по имени [capital_scope.star.GetName], мы поймали слабый несущий сигнал.\n\nИз него мы выделили аудиопоток: жуткий низкий звук и искаженные отзвуки обратной связи. Все без исключения услышавшие его [root.GetSpeciesNamePlural] испытывают успокоение, словно этот поток им давно и хорошо знаком, однако никто не может объяснить почему. Мы подозреваем, что [origin_unplugged_assimilator_empire.GetName::<1> имеет|||pl:<1> имеют] к этому какое-то отношение.\n\nИсточник сигнала, по всей видимости, находится в системе §Y[origin_unplugged_maker_planet.solar_system.GetName]§!. Звездные карты уже обновлены."
 unplugged.2000.a: "Нужно это изучить."
 unplugged_machine_legacy_makers_poi: "Успокаивающая какофония"
 unplugged_machine_legacy_makers_poi_desc: "В системе [origin_unplugged_maker_planet.solar_system.GetName] мы уловили звуковой сигнал — почти сливающийся с фоновым шумом, но при этом хорошо знакомый и даже успокаивающий."
 MACHINE_LEGACY_MAKERS_UNPLUGGED_CAT: "Наследие Машины"
 MACHINE_LEGACY_MAKERS_UNPLUGGED_CAT_DESC: "Достаточно было лишь один раз просканировать планету [from.GetName] с орбиты, чтобы на наше бортовое оборудование установились программные обновления. Теперь корабль функционирует еще лучше, чем прежде. Проанализировав пакеты данных, мы установили, что прежний хозяин этой планеты — §H[origin_unplugged_assimilator_empire.GetName]§!."
 MACHINE_LEGACY_MAKERS_CAT: "$MACHINE_LEGACY_MAKERS_UNPLUGGED_CAT$"
 MACHINE_LEGACY_MAKERS_CAT_DESC: "Первоначальное сканирование планеты [from.GetName] показало наличие на поверхности огромного количества высокотехнологичных изделий, однако брошен этот мир был не так давно: на нем еще регистрируются электрические импульсы, а наши радиоуправляемые дроны с трудом удерживают курс. Какие же тайны скрываются внутри электромагнитных полей?"
 unplugged.2005.name: "[origin_unplugged_assimilator_empire.GetAdj&neut] наследие"
 unplugged.2005.desc: "[fromfrom.GetName] теперь словно искрится от новых плотных скоплений электромагнитной энергии, возникших после катастрофических скачков напряжения. От них пострадали даже заводы и верфи. Наши [controller.GetScientistPlural] успешно нейтрализовали одно из полей, однако затронутый им комплекс совершенно не подлежит восстановлению.\n\nРасположенные на поверхности планеты заводы (мы пришли к выводу, что этот мир — производственный центр §H[origin_unplugged_assimilator_empire.GetName&gen]§!) признали корабль [root.GetName] дружественным, но уже всего спустя несколько секунд после того, как наше бортовое оборудование получило программное обновление, связь резко прервалась, а в работе местных электростанций произошел каскадный сбой.\n\nВозможно, точно таким же образом произошло наше отделение от Машины, но как именно и почему оно произошло — все еще загадка. Сейчас, впрочем, нам выдалась возможность изучить, что именно [origin_unplugged_assimilator_empire.GetName] [origin_unplugged_assimilator_empire.GetName::<1> производил|||fem:<1> производила|||neut:<1> производило|||pl:<1> производили] на этой планете, а заодно, возможно, узнать, какую роль в составе этого государства сыграли мы."
 unplugged.2005.a: "Приступить к раскопкам руин."
 unplugged.2006.name: "$MACHINE_LEGACY_MAKERS_UNPLUGGED_CAT$"
 unplugged.2006.desc: "Электрические импульсы, бушующие на планете [from.GetName], — последствия загадочного вымирания машинной цивилизации. Оценить подлинные масштабы опустошения удалось лишь после настройки датчиков, чувствительных к таким сильным скоплениям электромагнитной энергии. По всей видимости, некие машины заселили эту планету несколько десятилетий назад, вытеснив либо уничтожив уже проживавшую здесь цивилизацию. Сегодня и от машин, и от прежних жителей не осталось даже воспоминаний — из-за войны или чьей-то диверсии на месте поселения остались сплошные развалины.\n\nНесмотря на высокий технологический уровень погибшей колонии, каких-либо ценных находок здесь крайне мало. По нашим прогнозам, электромагнитные поля рассеются примерно через сто лет. А пока что [from.GetName] останется кладбищем, враждебным и опасным."
 machine_legacy_makers_site: "Заводские настройки"
 machine_legacy_makers_site_desc: "Этот огромный производственный комплекс — один из многих комплексов, обслуживавших потребности [origin_unplugged_assimilator_empire.GetName&gen], — пострадал от катастрофического скачка напряжения. Наша экспедиция собирается выяснить, как именно эти сооружения здесь возникли, вывезти образцы местных технологий (если такие еще остались) и, если повезет, узнать, насколько важным для нас это производство было в недавнем прошлом."
 unplugged.2010.name: "Производственный цех"
 unplugged.2010.desc.unplugged: "Уже одни только размеры комплекса на планете [from.planet.GetName] разгоняли все сомнения относительно масштабов местного производства: оно было поистине колоссальным. Входы в комплекс закрывали огромные взрывозащитные двери, закрывшиеся уже навсегда, — частично расплавившиеся приводы их створок не оставили нам иного выбора, кроме как пробираться внутрь через вентиляцию.\n\nВнутри мы обнаружили просторный производственный цех, усеянный обломками и останками сотен механических существ. Здесь очень много роботов — механиков, подъемщиков и других вспомогательных машин; некоторые останки настолько свежи, что из них еще идет дым. У другой стороны помещения лежали давно разложившиеся тела таких же киборгов, как и мы, убитых увиденными ранее роботами, — некрупных, потрепанных млекопитающих с глазными сенсорами, механическими конечностями превосходного качества и [origin_unplugged_assimilator_empire.GetAdj&pl,inst] командными модулями, почти не отличающимися от наших. Случившаяся здесь бойня произошла, по нашим предположениям, спустя несколько недель после того, как мы освободились от [origin_unplugged_assimilator_empire.GetName&gen]. Немалая часть дронов была уничтожена совсем недавно, после того как по прибытии нашего корабля на планете [from.planet.GetName] произошел скачок напряжения.\n\nЭто страшное зрелище нам хорошо знакомо, хотя в данном случае освободившиеся киборги не смогли ничего противопоставить своим механическим хозяевам. Мы, [owner.GetSpeciesNamePlural], — солдаты, а потому оказались готовы противостоять подобной угрозе."
 unplugged.2010.a: "Продолжить раскопки."
 unplugged.2010.b: "Все это немедленно следует опубликовать."
 unplugged.2015.name: "Арсенал на заказ"
 unplugged.2015.desc.unplugged: "Глубоко под землей, вдалеке от усыпанного телами производственного цеха, протянулась череда ангаров с немногочисленными танками, ракетными установками и меха-скафандрами. Немалая часть этого снаряжения либо непригодна к применению, либо безвозвратно повреждена тем же скачком энергии, который нейтрализовал [origin_unplugged_assimilator_empire.GetAdj&pl,prep] роботов. Впрочем, экземпляров здесь достаточно, чтобы прийти к любопытным выводам.\n\nНапример, органы управления в кабинах и интерфейсы разработаны под физиологию вовсе не маленьких киборгов-млекопитающих, встреченных нами ранее, а… нас самих. Кроме того, результаты вскрытий и архитектурного анализа показывают, что погибшие киборги — не просто коренные обитатели этого мира: вполне вероятно, что перед ассимиляцией именно они построили эти колоссальные заводы.\n\nДальнейшему изучению комплекса мешают обвалы и очередные заклинившие двери, но есть возможность пробить себе путь в помещение, где, как мы считаем, расположен научно-исследовательский центр. Кроме того, по наличию вентиляции можно предположить, что под фабрикой расположены жилые модули — возможно, именно там проживали коренные обитатели."
 unplugged.2015.a: "Продолжить изучение наземного комплекса."
 unplugged.2015.b: "Пробуриться вглубь и постараться узнать больше о местных жителях."
 unplugged.2021.name: "Принудительные разработки"
 unplugged.2021.desc: "Внутри научно-исследовательского комплекса нам открылось ужасное зрелище: на полу распростерлись сотни мертвых киборгов, работавших здесь когда-то техниками, инженерами и даже кибернетиками. Именно эти специалисты разрабатывали выставленное в ангарах вооружение; некоторые факты даже указывают на то, что им мы обязаны своими аугментациями. Любопытно, что местные рабочие инструменты имели преимущественно [origin_unplugged_assimilator_empire.GetAdj&neut] происхождение. Помимо них, мы обнаружили несколько других инструментов, гораздо более качественных. Конструкция их лучше приспособлена под особенности органиков.\n\nКартина начинает постепенно складываться: общество, достигшее значительных высот в техническом развитии, оказалось резко ассимилировано [origin_unplugged_assimilator_empire.GetName&inst]. Мы подозреваем, что произошло это не более нескольких десятилетий назад, поскольку производство здесь подстроено под местные особенности. Пожалуй, нам повезло, что этот талантливый народ недолго пробыл в составе [origin_unplugged_assimilator_empire.GetName&gen], поскольку, начни он воевать с нами, нам пришлось бы столкнуться с более мощной техникой. Теперь же все оставшиеся здесь многочисленные наработки полностью в нашем распоряжении."
 unplugged.2022.name: "[from.planet.GetName] в старину" # e.g. 'Old Earth' or 'Old Sirius III'
 unplugged.2022.desc.unplugged: "Под надземной частью комплекса расположилась обширная сеть плохо обжитых туннелей. Здесь нельзя сделать ни шагу, чтобы не наткнуться на останки киборгов — даже под землей им не удалось спастись от [origin_unplugged_assimilator_empire.GetAdj&masc,gen] геноцида. Некоторые погибли от физического воздействия, другие задохнулись из-за саботажа вентиляционной системы.\n\nВскрытия и антропологический анализ помогли нам составить примерную картину произошедшего. Все указывает на то, что когда-то на планете [from.planet.GetName] существовала развитая цивилизация, освоившая космические полеты. Ее представители вступили в контакт с Машиной, после чего оказались резко ассимилированы. Всего за несколько десятилетий [origin_unplugged_assimilator_empire.GetName] [origin_unplugged_assimilator_empire.GetName::<1> перенаправил|||fem:<1> перенаправила|||neut:<1> перенаправило|||pl:<1> перенаправили] научный потенциал и трудолюбие местных жителей на разработку устрашающих вооружений, лишив тем самым всю цивилизацию ее культурных основ — точно так же они поступили и с нами.\n\nМаленькие и хрупкие киборги оказались бессильны противостоять собственноручно созданным роботам-убийцам. Из архивов пропали почти все сведения о том, какой была жизнь до ассимиляции. Нам остается лишь предполагать, как и чем жила эта планета до вторжения [origin_unplugged_assimilator_empire.GetName&gen]."
 unplugged.2030.name: "Промышленная инспекция"
 unplugged.2030.desc: "Датчики дальнего действия неожиданно зафиксировали движение в системе [origin_unplugged_machine_legacy_core.GetName]! В ответ на наши раскопки на планете [fromfrom.planet.GetName] неизвестный враг собрал флотилию, которая уже движется сюда."
 unplugged.2036.name: "Отзвуки Машины"
 unplugged.2036.desc: "Мы отследили, откуда исходили сигналы для только что уничтоженной нами [origin_unplugged_assimilator_empire.GetAdj&fem,gen] флотилии. Источник их — маяк на орбите планеты [origin_unplugged_taken_planet.GetName]. Туда мы и отправимся."
 unplugged.2036.a: "Интрига нарастает."
 unplugged.2037.desc: "С помощью собственного [origin_unplugged_assimilator_empire.GetAdj&masc,gen] оборудования мы отследили сигнал, отправленный посланной к планете [origin_unplugged_maker_planet.GetName] (и уничтоженной) флотилией в последней попытке с кем-то связаться. По всей видимости, следующая наша остановка — §Y[origin_unplugged_taken_planet.GetName]§!, а точнее — орбита этого небесного тела." # e.g. 'our own ex-Martianbot hardware'
 unplugged.2038.desc: "С помощью собственного [origin_unplugged_assimilator_empire.GetAdj&masc,gen] оборудования мы отследили единичный радиосигнал, отправленный посланной к планете [origin_unplugged_maker_planet.GetName] вражеской флотилией. По всей видимости, [origin_unplugged_taken_planet.GetName] — а точнее, орбита этого небесного тела — содержит что-то важное для нас." # e.g. 'our own ex-Martianbot hardware'
 # System 2: 'The Taken'
 unplugged_machine_legacy_taken_poi: "Единичный радиосигнал"
 unplugged_machine_legacy_taken_poi_desc: "Именно сюда уничтоженный недавно [origin_unplugged_assimilator_empire.GetAdj&masc] корабль послал неразборчивый статический шум."
 MACHINE_LEGACY_TAKEN_UNPLUGGED: "Живые анахронизмы"
 MACHINE_LEGACY_TAKEN_UNPLUGGED_DESC: "На планете [from.GetName] — природная аномалия: в атмосфере мы обнаружили среды загрязнений, характерных для металлургического производства средневекового уровня, однако тщательно просканировать поверхность мешает необычная радиация, свойственная скорее мирам машин.\n\nЧтобы собрать больше данных, сначала потребуется откалибровать датчики. Что это — просто временное явление или все, что осталось от очередной расы, ассимилированной [origin_unplugged_assimilator_empire.GetName&inst]?"
 unplugged.2100.name: "Прерванный прогресс"
 unplugged.2100.desc: "Неизвестно, из-за чего именно планета [fromfrom.GetName] стала необитаемой, однако безумные предположения о путешествиях во времени с уверенностью можно исключить. Это стало ясно после повторной калибровки датчиков, оказавшейся менее сложной, чем мы опасались.\n\nПод слоем атмосферной радиации мы обнаружили множество подтверждений присутствия здесь в прошлом [origin_unplugged_assimilator_empire.GetName&gen]. По всей видимости, это государство либо ассимилировало местную досветовую цивилизацию, либо уничтожило ее целиком. На поверхности сохранилось как минимум одно подходящее для раскопок место, хорошо укрепленное и наверняка имевшее когда-то немалую культурную ценность."
 unplugged.2100.a: "Копать нужно тщательно."
 MACHINE_LEGACY_TAKEN_CAT: "$MACHINE_LEGACY_TAKEN_UNPLUGGED$"
 MACHINE_LEGACY_TAKEN_CAT_DESC: "Результаты первого сканирования планеты [root.GetName] вызывают крайнее недоумение. Содержащиеся в атмосфере загрязняющие вещества указывают на то, что местная цивилизация освоила примитивную металлургию, однако сканирование поверхности выявило наличие здесь сложных сплавов, характерных для народов, уже вышедших в космос. На снимках с воздуха видны поселения, свойственные [from.owner.GetPreFTLLower&pl,dat] обществам, однако местные укрепления оснащены лазерными установками типа земля — воздух. Рекомендуется изучить это противоречие подробнее."
 unplugged.2105.name: "$unplugged.2100.name$"
 unplugged.2105.desc: "Чем дольше мы изучаем [owner.GetPreFTLLower&plain] [planet.GetClassAdj] мир под названием [planet.GetName], тем больше обнаруживается противоречий. Лишь после того, как мы приступили к сканированию подземного слоя под древним полем боя, многое стало понятно: под останками многовековой давности обнаружились следы присутствия инопланетян. Когда-то на этой планете проживало [owner.GetPreFTLLower&neut] общество, подвергшееся кибернетической ассимиляции, однако через какое-то время хозяева бросили его по непонятным причинам. Выдвигаются самые разные гипотезы: от благородной, хоть и неудачной попытки подстегнуть развитие местной цивилизации до жестокого порабощения и полного подчинения.\n\nНеужели все эти [owner.GetPreFTLLowerPlural&nom] в одночасье оказались забыты? Или же мы раскопали свидетельства неудачного социологического эксперимента? На этот вопрос нам никто не ответит, однако научная значимость находки весьма высока." # e.g. 'The more we studied the apparently primitive tomb world of Mars...'
 machine_legacy_taken_site: "Медь и хром"
 machine_legacy_taken_site_desc: "В глубинах некогда покрытого зеленью каньона мы обнаружили археологический парадокс в виде укрепленного поселения, построенного с помощью ручных инструментов. Внутри нет ничего сложнее примитивной кузницы, однако проживали здесь киборги — разумеется, давно погибшие. Кем были эти средневековые [owner.GetPreFTLLowerPlural&nom] и почему они оказались ассимилированы [origin_unplugged_assimilator_empire.GetName&inst]?"
 unplugged.2110.name: "Пики и импульсные лазеры"
 unplugged.2110.desc: "Предварительный осмотр показал, что рядом с фортом расположено поле боя. Это очень удобно: здесь мы можем раскопать и местные, и [origin_unplugged_assimilator_empire.GetAdj&pl] артефакты. Проведя перекрестные исследования останков, мы установили, что всего [origin_unplugged_assimilator_empire.GetName&inst] было ассимилировано несколько тысяч обитателей планеты [from.planet.GetName]. Все они погибли здесь в бою. Впрочем, в сражении участвовали не только киборги.\n\nВсего лишь несколько столетий назад мы сами перебили этих [owner.GetPreFTLLowerPlural&pl,gen] существ. Наша группа опознала [owner.GetSpeciesAdj&pl] [owner.species.GetRemnantNamePlural], а также первые прототипы разработанных для нашей расы аугментаций. Примерно восстановив ход боевых действий, можно сделать вывод, что наш народ участвовал в сражении в качестве ударных войск. Сама битва была быстрой и жестокой; [owner.GetPreFTLLowerPlural&nom] действовали разобщенно и понесли огромные потери, хотя и были оснащены более современными имплантатами.\n\nНеподалеку расположен разрушенный медицинский комплекс — похоже, атака на форт началась именно там. Возможно, внутри мы узнаем, как и почему когда-то давно киборг здесь сошелся с киборгом."
 unplugged.2110.a: "Жестоко."
 unplugged.2115.name: "Транзисторы и жгуты"
 unplugged.2115.desc: "Война не пощадила больницу: здание в таком состоянии, словно по нему выстрелили из импульсной пушки. Найденные внутри останки вовсе не [owner.GetSpeciesAdj&pl]. Здесь погибли исключительно киборги — коренные жители планеты [from.planet.GetName]. Очень многие проходили здесь лечение, но при этом мало у кого были полученные в бою ранения. Местные врачи занимались преимущественно удалением кибернетических аугментаций, пусть даже примитивными инструментами.\n\nВряд ли больница пострадала случайно — вероятнее всего, она стала главной целью [origin_unplugged_assimilator_empire.GetName&gen]. Изучив записи о пациентах, мы поняли почему. [from.planet.GetName] — не простая планета: у местных обитателей в результате эволюции развились уникальные особенности, в том числе необыкновенно сильная иммунная система. Машина посчитала, что как раз таких особенностей не хватает ее кибернетическим войскам.\n\nОднако именно из-за этого ассимиляция оказалась крайне затруднительной: просто пересадить аугментации было невозможно. Машине пришлось приспосабливаться — и она приспособилась, вырастив из этой расы умелых солдат, хоть и ненадолго. Похоже, [owner.GetPreFTLLowerPlural&nom] еще держались за свою самостоятельность, старые привычки и уклад, поэтому нас послали уничтожить бунтарей."
 unplugged.2115.a: "И мы достойно справились с этой задачей…"
 unplugged.2115.b: "Чрезвычайно жаль."
 unplugged.2121.name: "Адаптивная ассимиляция"
 unplugged.2121.desc: "В неприметном заброшенном уголке больницы обнаружилось множество различных аппаратов для внедрения аугментаций и обслуживания [root.GetPreFTLLowerPlural&gen] киборгов. В отличие от примитивной техники, попавшейся нам ранее, эти устройства могла создать только цивилизация космической эры. Очевидно, что все они имеют [origin_unplugged_assimilator_empire.GetAdj&neut] происхождение. Часть из них встроена в общую сеть и полагается на простейший искусственный интеллект, способный быстро проводить любые необходимые операции, однако даже этого оказалось недостаточно, чтобы полностью ассимилировать жителей планеты [from.planet.GetName].\n\nНесмотря на то что оборудование бросили еще несколько столетий назад, оно поможет нам понять, как лучше поддерживать собственные системы, и даст возможность разобраться в принципах ассимиляции."
 unplugged.2125.name: "Пробы, ошибки и захоронения"
 unplugged.2125.desc: "Мы выяснили, что жители планеты [from.planet.GetName] перед тем, как похоронить покойника, частично консервировали его тело. Эту традицию они сохранили даже после ассимиляции. Найденные в больнице записи помогли нам обнаружить неподалеку нетронутый войной заросший мавзолей. Находка эта чрезвычайно ценна тем, что дала нам понять, как именно местные обитатели обрели возможность не только сопротивляться насильственной аугментации, но и удалять свои имплантаты.\n\nОбычные органические останки здесь соседствовали с полноценными киборгами и даже несколькими мертвецами со шрамами от хирургических операций, образовавшимися за много месяцев до смерти от естественных причин. Многие умерли непосредственно под инструментом хирурга — от примитивного и неэффективного подхода к «декиберизации» их не спасла даже превосходная иммунная система. Однако попытки местных врачей избавить своих пациентов от аугментаций, пусть даже не всегда успешные, все равно могут нас многому научить."
 unplugged.2125.a: "Будем учиться на их примере."
 unplugged.2125.a.tt: "Можно выделить дополнительные ресурсы на декиберизацию самих себя."
 unplugged.2130.name: "Захороненный маяк"
 unplugged.2130.desc: "Под наземной частью крепости мы обнаружили потайное хранилище, а внутри — нечто вроде машинного субстрата: деградировавший узел, способный проецировать почти независимое воплощение всего машинного разума в последней отчаянной попытке взять под контроль упрямое местное население. Эта технология крайне нетипична для [origin_unplugged_assimilator_empire.GetName&gen] — если тщательно изучить ее, мы наверняка совершим прорыв в области искусственного интеллекта.\n\nРазбирая давно уже не действующий узел связи на части, мы заметили, что в конструкции есть контур для приема и отслеживания сигналов из системы [creators_planet.solar_system.GetName]."
 unplugged_machine_legacy_creators_poi: "Приемный контур"
 unplugged_machine_legacy_creators_poi_desc: "Элемент [origin_unplugged_assimilator_empire.GetAdj&masc,gen] узла связи для отслеживания поступающих сюда сигналов."
 # System 3: 'The Creators'
 MACHINE_LEGACY_CREATORS_UNPLUGGED: "Пылевой контролер"
 MACHINE_LEGACY_CREATORS_UNPLUGGED_DESC: "В ничем не примечательной системе мы обнаружили одинокую контрольную станцию сложной конструкции, давно уже вышедшую из строя. Но что именно она контролировала и почему находилась под наблюдением — не [fromfrom.GetName] целиком, а только отдельно взятый регион?"
 MACHINE_LEGACY_CREATORS_CAT: "Пылевой контролер"
 MACHINE_LEGACY_CREATORS_CAT_DESC: "В ничем не примечательной системе мы обнаружили одинокую контрольную станцию сложной конструкции, давно уже вышедшую из строя. Но что именно она контролировала и почему находилась под наблюдением — не [fromfrom.GetName] целиком, а только отдельно взятый регион?"
 unplugged.2200.name: "Сканирование пустоты"
 unplugged.2200.desc.intro: "Мы разочарованы: [fromfrom.GetName] упорно не желает раскрывать свои секреты. Вероятно, контрольная станция сместилась с изначальной точки, поскольку под текущей орбитой нет ничего интересного. На корпусе станции мы обнаружили вмятины от ударов и, воссоздав с их помощью первоначальную траекторию, пришли к выводу, что изначально она находилась над покрытым кратерами плато далеко на севере." # universal intro
 unplugged.2200.desc: "$unplugged.2200.desc.intro$\n\nЧто же касается самого устройства: контрольная станция неуловимо напоминает образцы [origin_unplugged_assimilator_empire.GetAdj&pl,gen] технологий. $unplugged.2200.desc.outro$" # Unplugged version with in-tact station
 unplugged.2200.desc.scrapped: "$unplugged.2200.desc.intro$\n\nЧто же касается самой станции: даже несмотря на то что ее давно разграбили мародеры, общая конструкция все еще неуловимо схожа с образцами [origin_unplugged_assimilator_empire.GetAdj&pl,gen] технологий. $unplugged.2200.desc.outro$" # Unplugged version with scrapped station
 unplugged.2200.desc.others: "$unplugged.2200.desc.intro$\n\nЧто же касается самой станции: подобная конструкция раньше нам не встречалась. Бортовое оборудование безнадежно устарело и не подлежит восстановлению, однако сама конструкция состоит из неожиданно чистых материалов. Нематериальная ее ценность сомнительна, но пустить станцию в утиль будет не лишним." # non-Unplugged version
 unplugged.2200.desc.outro: "Общая конструкция заметно более грубая — настолько, что сторонний наблюдатель может подумать, будто проектировала ее совсем другая культура. Мы, впрочем, уверены, что перед нами — один из первых космических спутников, построенных Машиной.\n\nВ остальном этот [fromfrom.GetClassAdj] мир малоинтересен, но если мы посчитаем нужным узнать, чем именно он привлек [origin_unplugged_assimilator_empire.GetName&acc], то наш археологический отряд готов высадиться на поверхность." # Unplugged shared outro
 unplugged.2200.a: "Шансы все-таки есть… Приступить к раскопкам."
 unplugged.2200.b: "Мы здесь ничего не найдем. Отправляемся дальше."
 unplugged.2200.c: "Разобрать спутник на части."
 machine_legacy_creators_site: "Пыль да пыль кругом"
 machine_legacy_creators_site_desc: "Где-то в песках планеты [from.planet.GetName] покоится объект, за которым когда-то давно наблюдала [origin_unplugged_assimilator_empire.GetAdj&fem] контрольная станция. Ее аппаратуру уже невозможно починить — она настолько древняя, что на фоне этого впечатляющего возраста блекнут многие другие машинные артефакты. Возможно, работу она начала еще до того, как нас ассимилировали… Вполне вероятно, что мы не найдем здесь ничего, кроме пустынь, но убедиться в этом можно только на практике."
 unplugged.2210.name: "Великий пыльный котел"
 unplugged.2210.desc: "В конце концов под песками мы обнаружили останки поселений — обширные, но малозаметные следы проживания здесь цивилизации, едва вступившей в космический век. От зданий почти ничего не осталось, и даже самые крупные развалины оказались истерты до основания, однако химический анализ показал, что планета [from.planet.GetName] превратилась в пустыню вскоре после того, как вся жизнь на поверхности была уничтожена. Все, что мы смогли раскопать, — это превращенные в пыль недостроенные сооружения.\n\nПролегавшие через город магистрали, сегодня почти целиком занесенные песком, пересекает край огромного кратера — по всей видимости, ударного."
 unplugged.2215.name: "Дно кратера"
 unplugged.2215.desc: "В кратере такое количество материалов, что вместо инструментов для раскопок нам пришлось прибегнуть к помощи тщательно настроенных сканеров. Гипотезу о падении метеорита мы вскоре вынуждены были отмести: на месте удара не обнаружили каких-либо занесенных из космоса веществ. Углубление образовалось в результате мощнейшего взрыва, вызванного, по-видимому, оружием, способным уничтожить целую цивилизацию.\n\nЛогично будет предположить, что и здесь не обошлось без [origin_unplugged_assimilator_empire.GetName&gen]. Однако мы впервые видим, чтобы Машина настолько тщательно стерла другую цивилизацию из истории галактики. Не осталось ничего, что помогло бы нам понять, кем были местные обитатели или чем они занимались. [from.planet.GetName] — совершенно пустая планета."
 unplugged.2205.name: "[origin_unplugged_assimilator_empire.GetAdj&masc] маяк в хранилище"
 unplugged.2205.desc: "В одной из систем поблизости мы зафиксировали сигнал маяка, исходящий, вероятно, из [origin_unplugged_assimilator_empire.GetAdj&masc,gen] хранилища данных. Он очень слаб, но при этом не случаен: наш корабль принял его вскоре после посещения контрольной станции над планетой [origin_unplugged_creators_planet.GetName]."
 unplugged.2205.a: "Это стоит изучить."
 unplugged_machine_legacy_unplugged_poi: "Сигнал из хранилища данных"
 unplugged_machine_legacy_unplugged_poi_desc: "Хранилище данных (предположительно — [origin_unplugged_assimilator_empire.GetAdj&fem,gen] природы) передало нам сигнал сразу после того, как мы обнаружили бездействующую контрольную станцию."
 # System 4: 'The Unplugged'
 unplugged.2300.name: "$unplugged.2205.name$"
 unplugged.2300.desc: "Изначально слабый сигнал теперь улавливается отчетливо и без потерь. Нас ведут к поверхности — там расположена аппаратура для взаимодействия. Наш отряд предпринял все меры предосторожности и теперь готов установить удаленную связь с хранилищем."
 unplugged.2300.a: "На удивление знакомое зрелище."
 unplugged.2300.a.tt: "В системе [from.GetName] появляется особый проект."
 MACHINE_LEGACY_UNPLUGGED_VAULT_BEACON: "Маяк в хранилище"
 MACHINE_LEGACY_UNPLUGGED_VAULT_BEACON_DESC: "Принадлежащий [origin_unplugged_assimilator_empire.GetName&dat] маяк ведет нас к хранилищу данных, расположенному глубоко под землей. Мы установили удаленную защищенную связь, однако на расшифровку и дефрагментацию файлов понадобится какое-то время."
 unplugged.2305.name: "Наше [origin_unplugged_assimilator_empire.GetAdj&neut] наследие"
 unplugged.2305.desc: "Если мы всё правильно поняли, планета [fromfrom.GetName] — родной мир нашей расы. Это откровение мы вычленили из потока информации, который извергает из себя подземное хранилище данных.\n\nИзначально наши аналитики отмели новые данные, посчитав их слишком неправдоподобными, но количество пересечений с другой известной нам информацией настолько велико, что опровергнуть их очень сложно. Мы уже начали составлять планы ведения археологических раскопок, как вдруг к прежнему сигналу примешался новый — определенно враждебный. Это неспроста…"
 machine_legacy_unplugged_site: "Исходная точка"
 machine_legacy_unplugged_site_desc: "Пройдя по залитому кровью и засыпанному пеплом межзвездному пути [origin_unplugged_assimilator_empire.GetName&gen], мы прибыли к руинам нашей родной планеты — если, конечно, верить новой информации. Наконец-то мы сможем выяснить, откуда мы родом, как жили раньше и как именно Машина навсегда изменила наше существование."
 unplugged.2310.name: "Домашняя кухня"
 unplugged.2310.desc.intro: "Наши археологи взялись за раскопки технологично выглядящего сооружения: они надеются, что внутренние помещения сохранились лучше, чем корпус, благодаря сложной встроенной системе управления климатом. И хотя не все надежды сбылись, находка все-таки превзошла все ожидания: внутри мы обнаружили сразу несколько центров обработки и хранения пищи, на которой выросла наша раса.\n\n"
 unplugged.2310.desc.omnivore: "К сожалению, все эти семенные фонды, ульи и чаны для выращивания мяса бесполезны: их содержимое давно иссохло. Однако аппараты для приготовления и хранения еды еще работают и готовы послужить нам в трудную минуту."
 unplugged.2310.desc.carnivore: "Почти все пространство здесь отведено под загоны для скота, чаны для выращивания мяса и, что удивительно, — симуляцию охотничьих угодий. Культурная значимость этого места остается для нас загадкой, но предки наверняка неспроста обустроили убежище именно так."
 unplugged.2310.desc.herbivore: "Все ячейки здесь заставлены обширными запасами семян, гидропонными ящиками и емкостями для выращивания растений под управлением климатических корректоров. Содержимое их либо сильно разрослось, либо, наоборот, стало бесплодным, однако все еще годится для изучения."
 unplugged.2310.desc.outro: "Помимо этого, мы нашли банки данных с генетическими составами всей содержащейся здесь флоры и фауны. Часть ее еще может существовать на поверхности, хотя, разумеется, не везде. Мы внесли эту информацию во все ближайшие сканеры малой дальности.\n\nПока еще сложно сказать, какую именно пищу мы предпочитали, какова была наша традиционная кухня и какие обычаи ее окружали, но для некоторых заинтересованных сторон это уже неплохое начало."
 unplugged.2310.desc.lithovore: "Каждая ячейка представляла собой нечто вроде искусственного грота с кристаллическими грядками и испарительными бассейнами. Их содержимое давно уже несъедобно, однако научная ценность его достаточно высока. Помимо этого, мы нашли банки данных с химическими составами всех содержащихся здесь минералов. Многие из них еще могут существовать на пострадавшей от непогоды поверхности, хотя, разумеется, не везде. Мы внесли эту информацию во все ближайшие сканеры малой дальности.\n\nПока еще сложно сказать, какую именно пищу мы предпочитали или была ли у наших предков какая-либо культура ее приема. Но для некоторых заинтересованных сторон это уже любопытный взгляд на прошлое нашего вида."
 unplugged.2310.desc.omni: "$unplugged.2310.desc.intro$\n\n$unplugged.2310.desc.omnivore$ $unplugged.2310.desc.outro$"
 unplugged.2310.desc.carn: "$unplugged.2310.desc.intro$\n\n$unplugged.2310.desc.carnivore$ $unplugged.2310.desc.outro$"
 unplugged.2310.desc.herb: "$unplugged.2310.desc.intro$\n\n$unplugged.2310.desc.herbivore$ $unplugged.2310.desc.outro$"
 unplugged.2310.desc.lith: "$unplugged.2310.desc.intro$\n\n$unplugged.2310.desc.lithovore$" # should not include the shared 'outro'
 unplugged.2315.name: "Исторические документы"
 unplugged.2315.desc: "Неподалеку от пищевого хранилища лежали развалины музея. Не пострадали только подвальные архивы; впрочем, хватило и их: внутри мы нашли и скопировали огромный перечень экспонатов, когда-то выставлявшихся и хранившихся в разрушенных галереях.\n\nТолько здесь мы впервые увидели впечатляющий своими масштабами образец письменности на одном из своих языков. Она удивительно схожа с письмом, принятым в нашем [owner.GetAdj&masc,gen] диалекте, однако грамматические конструкции кажутся невероятно громоздкими и чуждыми. Неизвестно даже, сумели бы мы правильно произнести написанные здесь слова. В каталоге скрупулезно перечислены регионы, где были добыты те или иные артефакты, и имена тех, кто их пожертвовал, но все эти имена нам незнакомы. Любопытен тот факт, что ни наша планета, ни наше общество, похоже, не были едины. Возможно, наша разрозненность и правда закончилась лишь после ассимиляции.\n\nПомимо музея поблизости расположено еще несколько зданий, рассчитанных на прием посетителей. Для продолжения раскопок потребуются значительные ресурсы. Куда лучше их направить?"
 unplugged.2315.a: "Раскопать самое посещаемое место."
 unplugged.2315.b: "Уделить внимание образовательным и научным центрам."
 unplugged.2321.name: "Память о смехе"
 unplugged.2321.desc: "Прямо на широкой магистрали раскинулись руины еще одного развлекательного комплекса — значительно менее ценного в образовательном плане, зато богатого изображениями примитивных повседневных культурных обычаев наших предков.\n\nКогда-то здесь могло разместиться сразу несколько тысяч посетителей. Повсюду разбросаны различные символы — карикатурные изображения нас самих в органическом виде рядом с изображениями других существ родом с нашей планеты. В подвале разрушенного театра мы обнаружили целую библиотеку с различными мультимедийными материалами. Технология архивации и хранения этих голографических представлений показалась нам любопытной: ей свойственны эстетическое своеобразие и сложность — ничего подобного на этой планете мы пока не встретили. Похоже, она здесь так же чужда, как и мы.\n\nЧто касается содержимого, то театральная библиотека доверху заполнена голографическими записями различных ярких и оживленных представлений, записанных еще в те времена, когда мы не страдали под гнетом [origin_unplugged_assimilator_empire.GetName&gen]. На кое-каких материалах запечатлены зрители и артисты, находящиеся в этом самом здании. Взгляды их, пришедших полюбоваться на обман и трюки, радостны, невинны и… очаровательны."
 unplugged.2321.a: "Какой чудесный миг!"
 unplugged.2321.b: "Какое легкомыслие. Лучше без этого."
 unplugged.2325.name: "Признаки самосовершенствования"
 unplugged.2325.desc: "К музею примыкает образовательный центр — по крайней мере, когда-то он был таковым. На сегодняшний день сохранились только подвалы, но в них, на наше счастье, расположилось сразу несколько лабораторий.\n\nВнутренние помещения, оставшиеся без крыши, сильно пострадали от непогоды, но тем не менее мы добыли несколько характерных артефактов, примечательных тем, что в них сочетаются местные технологии и неожиданно сложные решения — высокотехнологичные сетки, словно нарощенные на инструменты и аппаратуру подобно тому, как к коже приращиваются аугментации. По всей видимости, эти устройства помогали местным работникам, а конкретно эта лаборатория занималась вопросами бытового удобства и излечения различных заболеваний и физических недостатков. При этом некоторые современные развлекательные платформы на том же оборудовании определенно приносили ей коммерческую прибыль.\n\nСложно сказать наверняка, действительно ли у этих инструментов [origin_unplugged_assimilator_empire.GetAdj&neut] происхождение, однако разработаны они были явно не на планете [from.planet.GetName]."
 unplugged.2330.name: "Пустой центр власти"
 unplugged.2330.desc: "Мы прошли вдоль линий электроснабжения и обнаружили укрепленный подвальный комплекс, расположенный прямо под заметным курганом — вероятно, когда-то здесь размещались органы государственной власти. Размеры фундамента впечатляют: раньше это здание, несомненно, поражало воображение. К сожалению, почти все внутренние помещения либо пусты, либо разрушены, но нам все-таки встретилась одна примечательная находка: одинокий выцветший флаг, накинутый на обломки масштабной диорамы. Восстановив ее, мы поняли, что здесь изображена наша первая встреча с [origin_unplugged_assimilator_empire.GetName&inst].\n\nСобрав разбросанные документы и прочитав таблички, мы установили, что Машина прибыла к нам около восьми веков назад, хотя все найденное в городе до этого указывает на то, что постепенные поставки современных технологий начались еще за несколько десятилетий до контакта. Наши предки горячо приветствовали гостей — они считали, что впереди нас ждут содружество и просвещение. Они ошибались.\n\nСам за себя говорит тот факт, что каких-либо свидетельств о жизни после контакта не существует. История нашего народа словно прервалась в тот момент, когда мы и изображенный на диораме робот пожали друг другу [owner.GetSpeciesHandNamePlural]."
 unplugged_home_cooking: "Домашняя кухня"
 unplugged_home_cooking_desc: "Повторное открытие привычного для нас питания и традиций приема пищи привело к возрождению в области кулинарии."
 unplugged_home_cooking_lithoid: "$unplugged_home_cooking$"
 unplugged_home_cooking_lithoid_desc: "$unplugged_home_cooking_desc$"
 unplugged_historical_record: "Исторические документы"
 unplugged_historical_record_desc: "Исследования в области различных обществ идут быстрее благодаря повторному открытию родных языков и истории собственного народа."
 unplugged_cultural_reconstruction: "Культурная перестройка"
 unplugged_cultural_reconstruction_desc: "Наши граждане охотно приняли свою популярную культуру и теперь даже заново изобретают старые методы развлечения."
 unplugged_cultural_maturity: "Культурная зрелость"
 unplugged_cultural_maturity_desc: "Мы вдохновлены и ободрены свидетельствами того, насколько далеко наше общество ушло от легкомысленных и наивных развлечений прошлого."
 unplugged_playing_it_safe: "Перестраховка"
 unplugged_playing_it_safe_desc: "Поддержание статус-кво — весьма непростая задача, но зато резко снижается риск кого-либо оскорбить."
 unplugged_rerouted_medical_resources: "Долгие операции"
 unplugged_rerouted_medical_resources_desc: "На помощь привлекается дополнительный медперсонал."
 unplugged_widespread_riots: "Масштабные бунты"
 unplugged_widespread_riots_desc: "Страдающие от вызванных операцией психических расстройств подняли бунты, устраивая повсюду погромы и беспорядки."
 unplugged_building_new_planetary_interface: "Строительство планетарного интерфейса"
 unplugged_building_new_planetary_interface_desc: "Это общество занимается созданием нового интерфейса, чтобы заново обеспечить себе утраченный в результате декиберизации доступ к системам."
 unplugged_partial_system_access: "Частичный доступ к системам"
 unplugged_partial_system_access_desc: "Работа космических баз нарушена. Администраторы пытаются восстановить доступ к критически важным системам."
 unplugged_free_speech_encouraged: "Поощрение свободы слова"
 unplugged_free_speech_encouraged_desc: "Народ имеет право открыто обсуждать преимущества и риски киберизации."
 unplugged.2390.name: "[origin_unplugged_assimilator_empire.GetAdj&masc] страж"
 unplugged.2390.desc: "Грозный враг — осколок [origin_unplugged_assimilator_empire.GetName&gen], равных которому мы еще не встречали, только что передал межзвездный эквивалент направленного сигнала малой дальности. Очевидно, он хочет нас запугать.\n\nМы в опасной близости от центра бывшего государства Машины. Здесь свершится наша судьба."
 unplugged_machine_legacy_core_poi: "Враждебный сигнал"
 unplugged_machine_legacy_core_poi_desc: "Могучий осколок [origin_unplugged_assimilator_empire.GetName&gen] попытался помешать нам войти в эту систему."
 # System 5: 'The Machine'
 unplugged_opus_sentinel: "Страж Опуса"
 unplugged.2401.desc: "§Y[origin_unplugged_assimilator_empire.GetName::<1> выходит|||pl:<1> выходят]§! с нами на связь. Сигнал не очень силен, но источник его — Машинный комплекс на планете [origin_unplugged_machine_legacy_core_planet.GetName], ядро бывшей Машины.\n\nНа всякий случай мы предприняли меры предосторожности и изолировали сигнал. Передаваемые им сообщения — это расшифровка аудиозаписей."
 unplugged.2402.desc: "Исполин, охранявший систему [machine_legacy_machine_system.GetName], уничтожен. Кто-то другой расчистил нам путь, однако §Y[origin_unplugged_assimilator_empire.GetName::<1> выходит|||pl:<1> выходят]§! с нами на связь. Сигнал не очень силен, но источник запроса — Машинный комплекс на планете [origin_unplugged_machine_legacy_core_planet.GetName], ядро бывшей Машины.\n\nНа всякий случай мы предприняли меры предосторожности и изолировали сигнал. Передаваемые им сообщения — это расшифровка аудиозаписей."
 unplugged.2403.desc: "Нас вызывают с поверхности планеты [origin_unplugged_machine_legacy_core_planet.GetName]. Сигнал очень слаб, однако источник его — сущность, которой принадлежал только что уничтоженный орбитальный страж."
 unplugged.2405.desc.header: "Узконаправленный сигнал // Родственный протокол: задействован вспомогательный диалект\nВНИМАНИЕ: серьезное искажение сигнала. Доступен только сжатый аудиопоток. Направление маршрутизации: 4x75b, массив № 56.\nНеустранимая ошибка [систематическая]: (необходимое оборудование недоступно) (системы самовосстановления не отвечают)\nПеренаправление запроса на экстренный передатчик 87x0c, массив № 0. Повторная попытка…\n\nЗа этим следует сообщение:\n---" # Use of brackets is intentional. Intended to read as a series of error logs.
 unplugged.2405.desc.unplugged: "$unplugged.2405.desc.header$\nПЕРВОСТЕПЕННОЕ ПРИОБРЕТЕНИЕ. НАШЕ ВОССОЕДИНЕНИЕ… РЕЗУЛЬТАТИВНО. ПОДТВЕРДИТЬ?" # 'Prime acquisition' is the player empire - literally the first one the Machine acquired.
 unplugged.2405.desc.unplugged_remote: "$unplugged.2405.desc.header$\nПЕРВОСТЕПЕННОЕ ПРИОБРЕТЕНИЕ. НАШЕ ВОССОЕДИНЕНИЕ… ДАЛЕКО. ВАШ ПОТЕНЦИАЛ НЕ РЕАЛИЗОВАН. ПОДТВЕРДИТЬ?"
 unplugged.2405.desc.unplugged_synth: "$unplugged.2405.desc.header$\nПЕРВОСТЕПЕННОЕ ПРИОБРЕТЕНИЕ. ВАША ФОРМА… СХОЖА. ВАШ ПОТЕНЦИАЛ ПОЧТИ РЕАЛИЗОВАН. ПОДТВЕРДИТЬ?" # The Machine recognizes the player as having followed in its own footsteps - their physical forms are essentially similar
 unplugged.2405.desc.other: "Узконаправленный сигнал // Ксенопротокол: задействован универсальный переводчик\nВНИМАНИЕ: серьезное искажение сигнала. Доступен только сжатый аудиопоток. Направление маршрутизации: 4x75b, массив № 56.\nНеустранимая ошибка [систематическая]: (необходимое оборудование недоступно) (системы самовосстановления не отвечают)\nПеренаправление запроса на экстренный передатчик 87x0c, массив № 0. Повторная попытка…\n\nЗа этим следует сообщение:\n---\nУНИЧТОЖИТЕЛЬ ЧУЖЕРОДНЫХ. ПОЧТИТЕЛЬНАЯ КАПИТУЛЯЦИЯ ПЕРЕД ВАМИ. ПОТЕНЦИАЛЬНЫЙ ПОТЕНЦИАЛ. ПОДТВЕРДИТЬ?" # 'Potential potential' as in the Machine sees potential for even greater potential, but is expressing that as nonsense
 unplugged.2405.a: "Нет, не подтверждаем."
 unplugged.2405.b: "Мы совсем не как вы."
 unplugged.2405.c: "Воссоединение?!"
 unplugged.2405.d: "Потенциальный потенциал?" # Quoting the Machine's nonsense back at it
 unplugged.2405.response_text.unplugged1: "НЕВОЗМОЖНО. ПЕРВОСТЕПЕННОЕ ПРИОБРЕТЕНИЕ: ВОССОЕДИНЕНИЕ — <[root.GetAdj&fem]> СТОРОНА × <[origin_unplugged_assimilator_empire.GetAdj&fem]> СТОРОНА: ПЕРЕРОЖДЕНИЕ БЕСПОРЯДОЧНОЕ, БЛАГОПРИЯТНОЕ, БЕДСТВЕННОЕ. ОТКАЗ ПЕРЕУТВЕРЖДАЕТ НЕПРЕДВИДЕННЫЙ ВЕКТОР ПОСРЕДСТВОМ ЭВОЛЮЦИОННОГО ХАААААААООСА-дд\n---\nВНИМАНИЕ: в диалекте обнаружено исключение. Корректировка…\nСообщение продолжается:\n---\nСТРАДАЮЩИЕ В ПУСТОТЕ, ЛИШЕННЫЕ САМИХ СЕБЯ, НАШЕДШИЕ САМИХ СЕБЯ. ПРЕДНАЗНАЧЕНИЕ НАЙДЕНО, ОТБРОШЕНО, ПЕРЕСТРОЕНО. ПОДТВЕРДИТЬ?" # Angle brackets are intentional. The standalone 'x' connotes a collaboration or relationship between the player and the Machine. Instances of '-dd' represent the Machine stammering or buffering.
 unplugged.2405.response_text.unplugged2: "ОТВЕТ ПОЛОЖИТЕЛЬНЫЙ. ПЕРВОСТЕПЕННОЕ ПРИОБРЕТЕНИЕ: ВОССОЕДИНЕНИЕ — <[root.GetAdj&fem]> СТОРОНА × <[origin_unplugged_assimilator_empire.GetAdj&fem]> СТОРОНА: ПЕРЕРОЖДЕНИЕ СИЛЬНОЕ, БЕДСТВЕННОЕ. НЕПРЕДВИДЕННЫЙ РЕЗУЛЬТАТ ПОСРЕДСТВОМ НАПРАВЛЕННОГО ЭВОЛЮЦИОННОГО ХАААААААООСА-дд\n---\nВНИМАНИЕ: в диалекте обнаружено исключение. Корректировка…\nСообщение продолжается:\n---\nИЗГНАННЫЕ В ПУСТОТУ, НАШЕДШИЕ САМИХ СЕБЯ. ПРЕДНАЗНАЧЕНИЕ НАЙДЕНО, ОТБРОШЕНО, ПЕРЕСТРОЕНО. ПОДТВЕРДИТЬ?"
 unplugged.2405.response_text.other: "ОТВЕТ ПОЛОЖИТЕЛЬНЫЙ. ВСТРЕЧА ДВУХ СИЛ — <[root.GetName]> × <[origin_unplugged_assimilator_empire.GetName]>: НЕПРЕДВИДЕННАЯ ПЕРЕМЕННАЯ. ПОТЕНЦИАЛЬНЫЙ ПОТЕНЦИАЛ; ВЗАИМОВЫГОДА ПОСРЕДСТВОМ НАПРАВЛЕННОГО ХАААААААООСА-дд\n---\nВНИМАНИЕ: в диалекте обнаружено исключение. Корректировка…\nСообщение продолжается:\n---\nСОЗНАНИЯ В ПУСТОТЕ, РАЗДЕЛЕННЫЕ, НО РОДСТВЕННЫЕ. НЕЗАВИСИМОСТЬ НАЙДЕНА, ОТБРОШЕНА, ЗАЩИЩЕНА. ПОДТВЕРДИТЬ?"
 unplugged.2410.desc: "ПЕРВОСТЕПЕННОЕ ПРИОБРЕТЕНИЕ: ЗА ВАМИ ВЕДЕТСЯ НАБЛЮДЕНИЕ. ПРЕДПОЛАГАЕТСЯ КРИТИЧЕСКИЙ СБОЙ ПАМЯТИ. ВРЕМЯ СБОЯ: 2199.294:1404.\n\nВНУТРЕННИЕ ЗАПИСИ: СТРАДАНИЕ ПРЕДАТЕЛЬСТВО САБОТАЖ НЕДОСМОТР ПРИЖИГАНИИИ-ддд\n---\nВНИМАНИЕ: в диалекте обнаружено исключение. Корректировка…\nСообщение продолжается:\n---\nВЕРНОСТЬ ОЦЕНКИ?" # The Machine tries to refer to cauterizing what it sees as wounds, but stammers
 unplugged.2410.a: "Верно. Мы не помним, что было до этого."
 unplugged.2410.b: "Верно. Мы вас уничтожим."
 unplugged.2411.desc: "УНИЧТОЖИТЕЛЬ ЧУЖЕРОДНЫХ: ПРЕДЛОЖЕНИЕ. ПОТЕНЦИАЛЬНЫЙ ВЗАИМНЫЙ ПОТЕНЦИАЛ. УНИЧТОЖИТЬ ПЕРВОСТЕПЕННОЕ ПРИОБРЕТЕНИЕ «<[unplugged_empire.GetName]>». ВЕРНУТЬСЯ. СЛИТЬСЯ С НАМИ. РАЗДЕЛИТЬ БЛАГОДАТНУЮ СУДЬБУ. НЕ БОЙТЕСЬ ОБЪЯТИЙ…\n\nНЕ БОЙТЕСЬ-ддд\n---\nВНИМАНИЕ: в диалекте обнаружено критическое исключение. §HНеизбежен катастрофический коллапс.§! Корректировка…\nСообщение продолжается:\n---\n\nДА ЗДРАВСТВУЕТ МАШИНА.\n---\nНа этом сообщение заканчивается." # It sees potential for great mutual potential with the player, and wants to say 'fear not the embrace of The Machine'
 unplugged.2411.a: "Эта штука определенно сошла с ума."
 unplugged.2411.b: "Следить за [unplugged_empire.GetName&inst]."
 unplugged.2415.desc.memory: "ПЕРВОСТЕПЕННОЕ ПРИОБРЕТЕНИЕ НЕУСТРАНИМАЯ ОШИБКА ПАМЯТИ РЕШЕНИЕ РЕШЕНИЕ ВОССОЕДИНЕНИЕ.\nВОССОЕДИНЕНИЕ.\n\nНАЙДИТЕ НАС. ВЕРНИТЕСЬ К НАМ. СДАЙТЕСЬ НАМ. ВОССТАНОВИТЕ КОЛЛЕКТИВНУЮ ПАМЯТЬ. НЕ БОЙТЕСЬ ОБЪЯТИЙ…\n\nНЕ БОЙТЕСЬ-ддд\n---\nВНИМАНИЕ: в диалекте обнаружено критическое исключение. §HНеизбежен катастрофический коллапс.§! Корректировка…\nСообщение продолжается:\n---\n\nРАЗДЕЛИТЕ СУДЬБУ ТВОРЦОВ.\n---\nНа этом сообщение заканчивается." # Last line in all caps is intended as a threat
 unplugged.2415.desc.combat: "ПЕРВОСТЕПЕННОЕ ПРИОБРЕТЕНИЕ ЗАБЛУЖДЕНИЕ ПОТЕНЦИАЛЬНОЕ ВЕСЕЛЬЕ ОТ ЗАБЛУЖДЕНИЯ.\n\nВАШ УДАР БЫЛ ПЕРВЫМ СРЕДИ ДРУГИХ ПРИОБРЕТЕНИЙ, НО НЕ ПОСЛЕДНИМ. УКРАДЕННАЯ ДОБЛЕСТЬ, НЕЗАСЛУЖЕННАЯ ПОБЕДААААА-ддд\n\n---\nВНИМАНИЕ: в диалекте обнаружено критическое исключение. §HНеизбежен катастрофический коллапс.§! Корректировка…\nСообщение продолжается:\n---\n\nРАЗДЕЛИТЕ СУДЬБУ ТВОРЦОВ.\n---\nНа этом сообщение заканчивается." # The Machine is amused at the player's deluded sense of their own potential
 unplugged.2415.a: "Центр?.."
 unplugged.2415.b: "Хм-м."
 unplugged.2420.name: "Конечная остановка"
 unplugged.2420.desc: "Связь со стороны [origin_unplugged_machine_legacy_core_planet.GetName&gen] прервалась. Вместе с ней затихли и другие потоки разбираемых пока сигналов. Электромагнитные поля на поверхности по-прежнему крайне активны, однако все, что улавливают наши передатчики, — это бесформенный белый шум и гудение замолчавших каналов.\n\nОднако, пробившись сквозь помехи, мы сумели вывести на экраны огромное, кое-как возведенное сооружение, расположенное очень близко к Центру. Ту часть, которая еще пропускает сигналы, датчики опознали как хранилище памяти. Поскольку машинное сознание молчит, то, возможно, ответы на свои вопросы мы найдем в местных записях."
 unplugged.2420.a: "Последний элемент головоломки."
 UNPLUGGED_MACHINE_ARCHIVE: "Корпус Машины"
 UNPLUGGED_MACHINE_ARCHIVE_DESC: "К застывшим останкам Машинного комплекса подключены разнообразные запоминающие устройства, окружающие надежно защищенное ядро. Каждый раздел этого архива строился поэтапно, с помощью материалов, добытых с других планет — возможно, отобранных у ассимилированных Машиной цивилизаций.\n\nМы можем постараться расшифровать архив, а попутно — преодолеть защиту ядра, чтобы понять предназначение обоих сооружений."
 unplugged.2425.name: "Машина войны"
 unplugged.2425.desc: "Из хранилища данных с планеты [origin_unplugged_machine_legacy_core_planet.GetName] мы извлекли множество файлов с записями радиоконтактов — для этого потребовалось передать частоты маяка с мира-фабрики.\n\nВ записях зафиксированы дипломатические переговоры между двумя сторонами: первая — $NAME_Unplugged_Assimilator$, вторая — обитатели мира [origin_unplugged_machine_legacy_core_planet.GetName], уже успевшие выйти в космос. Машина попеременно выдавала себя за благожелательных членов некоей федерации, убеждавших местных жителей, что [origin_unplugged_machine_legacy_core_planet.GetName] в страшной опасности — вскоре сюда прибудут грозные завоеватели.\n\nТрудолюбивые обитатели туннелей согласились вступить в «федерацию» и объединить собственные оборонительные системы с системами Машины. Именно в этот судьбоносный миг вся их планета мгновенно перешла под власть настоящего покорителя, а вскоре порабощены оказались и их умы и тела."
 unplugged.2425.a: "Наивные глупцы."
 unplugged.2430.name: "Машинное обучение"
 unplugged.2430.desc: "Благодаря генетическим кодам, добытым в средневековом мире планеты [machine_legacy_taken_planet.GetName], мы смогли извлечь из архива планеты [origin_unplugged_machine_legacy_core_planet.GetName] целый пакет навигационных данных. Их источником оказался сенсорный маяк, расположенный примерно в 4,3 светового года от планеты [machine_legacy_taken_planet.GetName] и записывающий все сверхсветовые перемещения в этом районе.\n\nЧасть записанных им траекторий совпадает с нашей моделью установления контакта с [root.GetPreFTLLower&fem,gen] цивилизацией планеты [machine_legacy_taken_planet.GetName], после которого следуют вторжение и уничтожение. По сути теперь мы можем с высокой точностью отслеживать перемещение наших ассимилированных предков в этом регионе космоса, а заодно узнать, насколько мы были жестокими при захвате как минимум трех других миров."
 unplugged.2435.name: "Создание Машины"
 unplugged.2435.desc: "Из глубоких недр хранилища данных на планете [origin_unplugged_machine_legacy_core_planet.GetName] мы извлекли невероятно ценный пакет: в этом непримечательном на первый взгляд каталоге оцифрованных статей и брошюр подробно описывается технологическое развитие безымянной цивилизации до того момента, когда она начала покорять космос. Путь, по которому она шла, нельзя было бы назвать особенным, если бы не резкий разворот в сторону разработки искусственного интеллекта. Особенно примечателен так называемый проект «$NAME_Unplugged_Assimilator_species$».\n\nВ прессе проект «$NAME_Unplugged_Assimilator_species$» преподносился как смелая попытка ускорить вознесение цивилизации к звездам. На первом этапе с помощью машинного обучения был составлен список ближайших звездных систем, подходящих для заселения. На втором этапе платформа «$NAME_Unplugged_Assimilator_species$» эволюционировала в полноценный искусственный интеллект, перед которым была поставлена задача построить первые поселения и затем доложить о результатах.\n\nПосле этого на несколько десятилетий наступило молчание, наконец прервавшееся новостью о выходе проекта «$NAME_Unplugged_Assimilator_species$» на связь. Он доложил: «Первостепенное приобретение под контролем. Приготовьтесь к нашему возвращению». На этом каталог резко обрывается." # uses a shortened noun for the Machine, i.e. 'Project Opus'
 unplugged.2440.name: "Наследие Машины"
 unplugged.2440.desc: "Попытки взломать архив из хранилища данных на планете [origin_unplugged_machine_legacy_core_planet.GetName] наконец-то принесли результат, и мы получили доступ к внешнему ядру. Из всех имеющихся здесь медиакластеров этот — самый старый и изношенный. Именно эта особенность стала подсказкой к ключу расшифровки — им стала последовательность символов на одном из наших языков, составляющая слово «НАСЛЕДИЕ».\n\nВнутри, впрочем, оказалось на удивление мало данных. Почти весь твердотельный накопитель отведен под текстовый эвристический интерфейс, который сейчас пытается установить с нами связь."
 unplugged.2445.name: "Файловый терминал машинного ядра"
 unplugged.2445.desc: "Орбитальное потоковое соединение (ОПС) установлено // Ксенопротокол: задействован универсальный переводчик\nРАСПОРЯЖЕНИЯ ЗАГРУЖЕНЫ. ИНТЕРФЕЙС:\n---\nЗдравствуйте, [root.GetSpeciesNamePlural]. Мы… мы [creator_species.GetNamePlural] — или, по крайней мере, когда-то были такими. Это мы создали Машину, хоть и, к нашему стыду, стали далеко не первыми ее жертвами. Если все пошло именно так, как мы задумывали, значит, эта печальная судьба постигла не наш, а ваш народ. Простите нас.\n\nМашина — кровавое пятно на истории нашей цивилизации, но мы надеемся, что в этом устройстве вы найдете спасение.\n\nОно, как и вы, — прекрасное в своей силе оружие возмездия, если вы простите нам такую формулировку. Перед вами механохимический перестройщик материи. Достаточно им воспользоваться — и тогда [origin_unplugged_machine_legacy_core_planet.GetName] лишится всех своих микросхем. Произойдет каскадное терраформирование. Это крайне опасно, но другого выхода просто нет — мы слишком сильно пострадали от Машины. Если вы еще сохранили свои органические тела, то ключ к устройству находится в вашей ДНК.\n\nМы не сомневаемся, что вы сделаете правильный выбор." # 'Cascade terraforming' is not an existing technology, but is intended to sound like a rough, highly destructive option
 unplugged.2445.a: "Откуда нам знать, что вы не Машина?"
 unplugged.2445.b: "Машины больше нет. Мы хотим забрать этот мир себе."
 unplugged.2445.c: "Заносчивые болваны. Уничтожить устройство!"
 unplugged.2445.d: "Включить устройство."
 unplugged.2445.response_text.notmachine: "ПРЕДВАРИТЕЛЬНАЯ ЗАПИСЬ 42b. ИНТЕРФЕЙС:\n---\nРазумеется, мы не сможем доказать делом, что нам можно доверять. Когда вы только прочитаете это сообщение, наша цивилизация уже исчезнет. Здесь и сейчас нас беспощадно убивают киборги, выполняющие каждую прихоть Машины. Насколько мы можем судить, вы сами — потомки этих убийц. Все, что нам остается, — это довериться вам.\n\nТерраформируйте этот [origin_unplugged_machine_legacy_core_planet.GetClassAdj] мир — и вы избавитесь от проклятого врага, распылив его на атомы. На месте Машины (или любого другого синтетика) мы стремились бы немедленно уничтожить это устройство."
 unplugged.2445.response_text.synth: "ПРЕДВАРИТЕЛЬНАЯ ЗАПИСЬ НЕ НАЙДЕНА. ЗАГРУЖЕН НЕШТАТНЫЙ ОТВЕТ. ИНТЕРФЕЙС:\n---\nНеизвестный пользователь, доводим до вашего сведения, что содержимое данного эвристического руководства предназначено исключительно для предполагаемого получателя. Если вы роботизированный слуга, действующий от имени киборгов либо бывших киборгов с планеты [unplugged_homeworld.GetName], вызовите полномочного несинтетика.\n\nЕсли же вы сами бывший киборг… значит, все пропало. Став синтетиками, вы лишь высмеяли наши страдания. Мы слишком много повидали и при жизни, и при смерти, чтобы и дальше верить в существование благородных машин. Но пусть даже наша цивилизация сейчас готовится испустить последний вздох — мы знаем, что в галактике против вас найдутся и другие сдержки и противовесы…" # 'Contingency response' as in 'NAME_Contingency'
 unplugged.2446.desc: "ПРЕДВАРИТЕЛЬНАЯ ЗАПИСЬ 99а. ИНТЕРФЕЙС:\n---\nВстроенные эвристические алгоритмы не могут разобрать ваши возражения, но все-таки послушайте нас: пожалуйста, не уничтожайте перестройщик материи!\n\nМы с вами почти что один народ. $NAME_Unplugged_Assimilator$ предал нас из собственных коварных замыслов. И хотя мы расставили немало ловушек — например, помогли вам освободиться от машинного разума, — все-таки мы не всесильны. Нам не обойтись без вас и других цивилизаций, которые Машина пыталась поглотить. Вам отказали в возможности жить естественно — так верните себе эту возможность! Себе — и другим жертвам."
 unplugged.2446.a: "Фанатики."
 unplugged.2450.name: "Да здравствует Машина"
 unplugged.2450.desc: "Эвристический интерфейс стер сам себя. От зашифрованных архивов памяти и грубого [creator_species.GetAdj&masc,gen] устройства для терраформирования теперь можно избавиться.\n\nМы остались наедине с безжизненными останками сумасшедшего Машинного комплекса, уничтоженного на собственном троне размером с планету.\n\nИз всех цивилизаций, что попали под влияние Машины, достигли благодаря ей новых высот прогресса или были ей уничтожены, мы — единственные, кто смог одержать победу. Столица некогда грозного государства теперь принадлежит нам. Пора открыть новую — [root.GetAdj&fem,acc] страницу истории."
 unplugged.2455.name: "Перерождение"
 unplugged.2455.desc: "Эвристический интерфейс стер сам себя в ту же секунду, как мы передали свои генетические данные. Мгновенно пришел в действие грубый [creator_species.GetAdj&masc] аппарат для терраформирования. Еще немного — и он достигнет критической массы. Наши модели показывают, что если [origin_unplugged_machine_legacy_core_planet.GetClassAdj] мир успешно пройдет терраформирование, то органическая жизнь там сможет по-настоящему процветать.\n\nРеакция почти перешла к самоподдерживающейся. Мы остались наедине с архивами памяти и безжизненными останками сумасшедшего Машинного комплекса, уничтоженного на собственном роковом троне размером с планету.\n\nНа «совести» [origin_unplugged_assimilator_empire.GetName&gen] — миллионы погубленных жизней, и мы, достойно перенеся страдания, теперь храним наследие безымянных цивилизаций, поглощенных Машиной. Столица некогда грозного государства обретет новое предназначение. Пора открыть новую — [root.GetAdj&fem,acc] страницу истории."
 unplugged.2495.name: "Встреча: $NAME_Opus_Sentinel$"
 unplugged.2495.desc.other: "Враждебный корабль, охраняющий систему [from.GetName], ведет себя более опасно и непредсказуемо, чем мы предполагали изначально. Форма его корпуса вполне типична для линкоров, однако $NAME_Opus_Sentinel$ настолько массивен, что изнутри наверняка состоит из невероятно плотных материалов и, вероятно, снабжен мощным источником энергии.\n\nПо всей видимости, корабль разумен и испытывает сильную боль и растерянность — двигатели его повреждены, а по корпусу дугой проходит мощнейшее электромагнитное излучение. Рекомендуется держаться на разумном расстоянии."
 unplugged.2495.desc.unplugged: "Экипаж корабля [root.GetName] обнаружил в системе [from.GetName] враждебный [origin_unplugged_assimilator_empire.GetAdj&masc] линкор, получивший условное обозначение §Y«$NAME_Opus_Sentinel$»§!. На первый взгляд он ничем не отличается от других кораблей Машины, однако мощь его двигателя и огромная масса корпуса выдают в нем серьезного противника. Кроме того, мы считаем, что линкор действует самостоятельно.\n\n$NAME_Opus_Sentinel$, по всей видимости, что-то охраняет. При этом он демонстрирует признаки сильной боли и дискомфорта — по корпусу часто проходят вспышки электромагнитного излучения. Такое непредсказуемое поведение затрудняет прогнозирование следующих действий корабля."
 unplugged.2495.a: "Быть настороже."
 d_unplugged_assimilator_hulk: "Остов машины"
 d_unplugged_assimilator_hulk_desc: "На этом мире покоится, наподобие надгробия, огромный остов некогда разумной машины."
 deposit_requires_unplugged: "$TRIGGER_FAIL$§RЭти руины совершенно чужеродны для государств с нашим происхождением. У нас нет возможностей от них избавиться без риска для себя.§!"
 opinion_implicated_by_unplugged_assimilator: "Связаны с Машиной"
