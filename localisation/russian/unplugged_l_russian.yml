 concept_institutional_civics: "Институционные"
 concept_institutional_civics_desc: "К институционным гражданским моделям относятся:\n- «['civic:civic_criminal_heritage']»$NEW_LINE$- «['civic:civic_media_conglomerate']»$NEW_LINE$- «['civic:civic_parliamentary_system']»$NEW_LINE$- «['civic:civic_trading_posts']»$NEW_LINE$- «['concept_dark_consortium_civics']»"
