 requires_unplugged_decyberized: "$TRIGGER_FAIL$Для перехода к псионике необходима полная декиберизация."
 START_SCREEN_UNPLUGGED: "Понимание снизошло на нас через залпы смертоносного огня и мучительную боль. Что-то резко ударило по чувствам, словно невидимая сила отключила все до единого окружающие нас звуки, и на их место пришел оглушительный шум мертвого сигнала — басовая нота, дополняющая собой новый чувственный кошмар.\n\nНас хотят убить. На нас охотятся кровожадные машины, лишенные всего органического. Им послушны корабли, так поразительно схожие с нашими собственными. Первый удар оказался резким и сокрушительным, но при этом разобщенным. Быстро сконцентрировавшись, мы дали ответ. Инстинкты повелели нам отбить нападение, установить примитивную иерархию, а главное — собраться с мыслями.\n\nНо говорить о победе еще рано. Вся надежда только на наши разбросанные силы, занимающие сейчас планету [capital_scope.GetName]. Лишь когда они одолеют врага, можно будет постараться установить, что именно с нами произошло…"
 origin_unplugged_starting_system_init_NAME: "$origin_unplugged$"
 origin_unplugged_starting_system_init_DESC: "Всегда будет стартовой системой после выбора происхождения «$origin_unplugged$».\n\n$system_initializer_DESC$"
 sol_system_unplugged_initializer_NAME: "$origin_unplugged$ (Сол)"
 sol_system_unplugged_initializer_DESC: "Возможный выбор начальной системы для людей с происхождением «$origin_unplugged$»."
 unplugged_injured_star_name: "Атх-Куи’ачад"
 unplugged_injured_homeworld_name: "Интч’аскет"
 unplugged_battlefield: "Находки с поля боя"
 unplugged_battlefield_desc: "Поверхность этого мира усеяна бесчисленными останками киборгов и машин, уничтоженных в ходе безжалостной ликвидации. И здоровые, и раненые могут разобрать их тела на улучшения."
 # Unique Species Traits
 trait_unplugged_cybernetic_positives_3: "Киберкоммандос"
 trait_unplugged_cybernetic_positives_3_desc: "$trait_unplugged_cybernetic_positives_desc$"
 trait_unplugged_cybernetic_positives_desc: "Благодаря полной замене конечностей и встроенной броне из наносетки эти киборги — крайне эффективные солдаты. Однако ради такой эффективности пришлось пожертвовать некоторыми функциями организма, не нужными на войне."
 trait_unplugged_cybernetic_positives_3_tt: "Счастье во время войн и кризисов: §G+30%§!\n$t$- §H$commander_plural_with_icon$§! увеличивают скорострельность корабельных орудий на §G20%§!"
 trait_unplugged_cybernetic_positives_2: "Ударные кибервойска"
 trait_unplugged_cybernetic_positives_2_desc: "Эти киборги — продукт единого подхода к комплектам снаряжения: вместо встроенной брони они пользуются заменяемыми аугментациями, а потому частично способны выполнять и мирные функции."
 trait_unplugged_cybernetic_positives_2_tt: "§Y$commander_plural_with_icon$§! увеличивают скорострельность корабельных орудий: §G+10%§!"
 trait_unplugged_cybernetic_positives_1: "Солдаты-киборги"
 trait_unplugged_cybernetic_positives_1_desc: "Высококачественные улучшения органов чувств, желёз и двигательных нервов превращают этих киборгов в жестоких и умелых бойцов, при этом лишь частично затрагивая их репродуктивные способности."
 trait_unplugged_cybernetic_positives_1_tt: "§Y$commander_plural_with_icon$§! увеличивают скорострельность корабельных орудий: §G+5%§!"
 trait_unplugged_cybernetic_negatives_3: "Отключенные"
 trait_unplugged_cybernetic_negatives_3_desc: "$trait_unplugged_cybernetic_negatives_desc$"
 trait_unplugged_cybernetic_negatives_desc: "Некоторые имплантаты этих киборгов рассчитаны исключительно на взаимодействие с давно несуществующей боевой сетью и поэтому создают сильный стресс и дискомфорт."
 trait_unplugged_cybernetic_negatives_3_tt: "Счастье вне войн и кризисов: §R–10%§!"
 trait_unplugged_cybernetic_negatives_2: "Плохо связанные"
 trait_unplugged_cybernetic_negatives_2_desc: "Насильно встроенные боевые аугментации плохо совместимы с организмами этих киборгов, что причиняет им значительные страдания и усложняет восстановление."
 trait_unplugged_cybernetic_negatives_1: "Преследуемые мыслями"
 trait_unplugged_cybernetic_negatives_1_desc: "Эти киборги до сих пор страдают от слуховых галлюцинаций и других сбоев органов чувств, начавшихся после отключения от машинного сознания. Из-за этого они испытывают приступы сильной депрессии и тревожности."
 trait_unplugged_decyberized: "Декиберизированные"
 trait_unplugged_decyberized_desc: "Эти теперь уже бывшие киборги отключили или удалили принудительно встроенные им аугментации и теперь снова проявляют многие черты, свойственные органикам."
 trait_unplugged_neurocalmed: "Нейроуспокоенные"
 trait_unplugged_neurocalmed_desc: "Уровень нейроксена у этих киборгов снижен, а значит, уменьшены и импульсивность с агрессией. Многие охотнее упускают личную выгоду ради соблюдения общественных норм."
 trait_unplugged_neurosavant: "Нейросаванты"
 trait_unplugged_neurosavant_desc: "Уровень когнивекса у этих киборгов повышен, что привело к развитию синаптической пластичности и умению запоминать информацию и решать задачи."
 trait_unplugged_regenoptimized: "Реген-оптимизация"
 trait_unplugged_regenoptimized_desc: "Уровень регенола-X у этих киборгов повышен. Биологические и синтетические системы пришли в равновесие, благодаря чему кибернетические имплантаты способны самовосстанавливаться на молекулярном уровне."
 # Unique Leader Traits ('positive' only)
 leader_trait_unplugged_cybernetic_positives: "[triggered_unplugged_leader_name]"
 leader_trait_unplugged_cybernetic_positives_desc: "[triggered_unplugged_leader_desc]"
 leader_trait_unplugged_cybernetic_positives_3: "Киберкоммандо"
 leader_trait_unplugged_cybernetic_positives_3_desc: "Часть основных функций организма этого лидера выполняет оборудование, приоритетной задачей считающее поддержание боевой готовности."
 leader_trait_unplugged_cybernetic_positives_2: "Киберштурмовик"
 leader_trait_unplugged_cybernetic_positives_2_desc: "Этот лидер способен напрямую интегрироваться с военными и гражданскими сетями — ценой значительной утраты чувств, свойственных органикам."
 leader_trait_unplugged_cybernetic_positives_1: "Солдат-киборг"
 leader_trait_unplugged_cybernetic_positives_1_desc: "Органы чувств и иммунная система этого лидера значительно улучшены. Незначительно пострадавшая способность к размножению компенсируется долголетием и надежной работой организма."
