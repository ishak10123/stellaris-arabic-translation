 unplugged.3000.name: "Наше воплощение" # intentionally abstract - 'how we embody ourselves' - referring to the accompanying Situation
 unplugged.3000.desc: "С тех пор как мы, [root.GetSpeciesNamePlural], отделились от единого машинного разума, мы не знаем мира — нас терзают постоянные раздоры. Даже в минуты покоя или отдыха, оставаясь наедине с собственными мыслями, мы ведем борьбу с самими собой, стараясь примириться с осознанием, что мы прошли через принудительную аугментацию — невероятно болезненную процедуру, снабдившую нас тем не менее впечатляющими имплантатами.\n\nК добру или к худу, но глубоко личный конфликт уже охватил все наше общество. Именно поэтому мы будем наблюдать за жизнью, которую ведут все [root.GetSpeciesNamePlural], и за чувствами, которые они испытывают, пока [root.GetName] развивается и растет. С помощью комплексных исследований мы установим, какой сейчас в обществе наклон — в сторону декиберизации или, наоборот, дополнительной аугментации, а также довольны наши граждане своими физическими оболочками или же считают их недостаточно совершенными."
 unplugged.3000.a: "Наблюдать будем внимательно, но действовать — осторожно."
 unplugged.3000.b: "Не будем долго думать — надо быстро действовать."
 unplugged.3000.c: "Нужно уметь выслушивать все стороны."
 unplugged.3005.name: "Единый разум"
 unplugged.3005.desc: "Комплексные оценки [owner.GetAdj&neut,gen] мнения о нашей физиологии показали, что в обществе наступил период затишья. Консенсус этот установился в результате воздействия трех факторов: нашего подхода к политике, социального дискурса и передовых исследований наших собственных тел.\n\nПока еще рано рассуждать, долго ли продлится такая гармония, но уже сейчас ясно, что [owner.GetSpeciesNamePlural] пришли к согласию в вопросах, кто мы такие и как мы выглядим — если, конечно, это равновесие не пошатнет резкая перемена обстоятельств или подхода к управлению государством."
 unplugged.3005.a: "Дебаты должны быть более политизированными."
 unplugged.3005.b: "Как и ожидалось."
 unplugged.3005.c: "Мы выступим против."
 unplugged.3010.name: "Разделившиеся мнения"
 unplugged.3010.desc: "Продолжающиеся исследования [owner.GetAdj&neut,gen] отношения к нашей физиологии показали, что в обществе наступил период культурного хаоса. Резкая перемена мнений, громкие протесты в городах и постоянные споры вызваны нашим подходом к политике, социальным дискурсом и передовыми исследованиями наших собственных тел.\n\nВпрочем, насилие и общественные беспорядки пока редкость, а некоторые граждане даже гордятся тем, что высказаться разрешают каждому. Нам же очевидно, что [owner.GetSpeciesNamePlural] разделились, и теперь представления о нашей самоидентичности грозят рухнуть окончательно."
 unplugged.3010.a: "Нужно найти подходящую площадку для таких дебатов."
 unplugged.3090.name: "Мы, [owner.GetSpeciesNamePlural]" # e.g. 'We, the Neo-Humans'
 unplugged.3090.desc: "«Мы — те, кем мы кажемся; не больше и не меньше».\n\nТакие простые, но запоминающиеся слоганы придумывают наши граждане, преодолевшие наконец болезненный этап принятия собственных тел. Мы не без основания можем назвать себя свободными от многих сомнений, страхов и неутолимых стремлений, от которых когда-то страдали.\n\nБудем ли мы придерживаться этих стандартов в отношении других обитателей галактики — уже совсем другой вопрос, но на нашей планете все [owner.GetSpeciesNamePlural] довольны своими физическими оболочками и путем к самораскрытию в целом."
 unplugged.3100.name: "Поводы для удаления"
 unplugged.3100.desc: "Все чаще [root.GetSpeciesNamePlural] начинают считать, что от наследия Машины необходимо решительным образом избавиться, в том числе — ограничить или вообще удалить насильно встроенные нам аугментации.\n\nПублика требует от нас поскорее разрешить нарастающий внутренний кризис, чтобы не только повысить репутацию в глазах других государств, но и помочь многочисленным членам общества, страдающим от стыда и дисморфофобии."
 unplugged.3100.a: "И речи быть не может."
 unplugged.3100.b: "Будет сделано."
 unplugged.3105.name: "Прорыв в области декиберизации"
 unplugged.3105.desc: "Специалисты из лаборатории, занимающейся декиберизацией, объявили о серьезном прорыве: вскоре [target.GetName::<1> сможет|||pl:<1> смогут] избавиться от лишних имплантатов, поскольку ученые разработали технику удаления встроенной брони из наносетки, а заодно и связанных с ней жизненно важных аугментаций.\n\nНа протяжении многих десятилетий [target.GetSpeciesNamePlural] страдали от своих неповоротливых и устрашающих тел, не имея возможности отказаться от синтетической основы: без нее невозможна работа имплантатов, а значит, и жизнедеятельность. Сегодня мы наконец научились заменять сетку на кожную аугментацию собственной разработки, содержащую в себе органический материал, — то есть настоящую [target.GetSpeciesAdj&fem,acc] кожу."
 unplugged.3105.a: "Эта броня — наша надежная защита. Не будем ее удалять."
 unplugged.3106.desc: "Сегодня [target.GetName::<1> радуется|||pl:<1> радуются] очередному прорыву, а медицинские учреждения уже просят разрешить им массово проводить новую разновидность операций: эксперты утверждают, что разработали способ обойти биомеханическую зависимость, от которой страдают даже новорожденные [target.GetSpeciesNamePlural] — пока что мы вынуждены устанавливать им вторичные модульные аугментации.\n\nМеждисциплинарная группа экспертов уже одобрила новый процесс и добавила, что удаление модульных оружейных разъемов также уменьшит затраты на обслуживание неродных нам аугментаций."
 unplugged.3106.a: "Отказать. Эти модули дают нам преимущество в бою."
 unplugged.3107.desc: "Вскоре сбудется то, о чем тайно и явно мечтают [target.GetSpeciesNamePlural]: наши ученые разработали способ оздоровления и восстановления органической нервной системы. Они утверждают, что испытуемые, прошедшие через процедуры генетической терапии и взлома программного обеспечения, начали вести полноценную жизнь, не полагаясь больше на шунты для нервов — их заменили собственные двигательные рефлексы. Предварительные исследования показали, что с помощью терапии можно даже избавиться от бесконечных сенсорных галлюцинаций (или хотя бы сделать их менее сильными), вызванных отделением от машинного разума."
 unplugged.3107.a: "Улучшенные боевые рефлексы нам еще пригодятся."
 unplugged.3110.name: "Гармонизация с Машиной"
 unplugged.3110.desc: "Исследовательская группа, занимающаяся вопросами обуздания наших аугментаций, разработала замену беспроводной [origin_unplugged_assimilator_empire.GetAdj&fem,dat] сетке, некогда отвечавшей за синхронизацию всех наших имплантатов. Сегодня [target.GetSpeciesNamePlural] массово страдают от ее отсутствия: невозможность принимать сигналы вызывает исключительно раздражение и страдания. И хотя конструкция новой сетки крайне централизована (ее пришлось создать по образцу [origin_unplugged_assimilator_empire.GetSpeciesAdj&masc,gen] Центра), нас уверяют, что разработка эта совершенно безопасна и отвечает всем интересам [target.GetName&gen]. Испытуемые из первой группы сообщают, что эффективность работы аугментаций повысилась, а сами они испытывают комфорт и даже облегчение на грани блаженства."
 unplugged.3110.a: "Нет. Больше мы такого не допустим."
 unplugged.3111.desc: "Попытки полностью взять аугментации под контроль привели к очередному прорыву в области кибернетической хирургии: [target.GetScientistPlural]-медики выявили конкретные зависимости, встроенные в модульные интерфейсы наших тел — механические элементы, позволяющие без труда заменять целые конечности, оружейные системы и корпусы. Благодаря этому мы сможем модернизировать уже существующие тела, а новорожденные [target.GetSpeciesNamePlural] будут получать индивидуальные интерфейсы. Больше не придется полагаться на трофейное [origin_unplugged_assimilator_empire.GetAdj&neut] оборудование, грозящее осложнениями при ремонте."
 unplugged.3111.a: "Это уже перебор."
 unplugged.3112.desc: "Еще немного — и аугментации будут нам полностью подвластны. Мы разработали революционный способ лечения сенсорных галлюцинаций, от которых массово страдают отрезанные от машинного сознания [target.GetSpeciesNamePlural]. Многие из них подсознательно стремятся к хору, который больше никогда не услышат, но находят только тревожные и депрессивные расстройства. Сегодня же мы способны подавлять эту тоску при помощи децентрализованного вспомогательного имплантата, имитирующего когнитивные волны машинного разума."
 unplugged.3112.a: "Мы что, собираемся притвориться машинным разумом? Это немыслимо."
 unplugged.3115.name: "Фоновая дисморфофобия"
 unplugged.3115.desc: "В маргинальных слоях [target.GetAdj&neut,gen] общества продолжает нарастать напряженность. Недовольные голоса призывают хоть как-нибудь, лишь бы поскорее, решить вопрос кибернетических аугментаций.\n\nДля многих, впрочем, этот вопрос уже потерял былую остроту: в большинстве своем [target.GetSpeciesNamePlural] находят утешение в косметике, позволяющей либо скрыть, либо, наоборот, подчеркнуть свои аугментации так, как захочется самим носителям. Мало какие [target.GetSpeciesNamePlural] откровенно довольны подобной полумерой, однако в целом сейчас происходит хоть и неохотное, но все-таки принятие.\n\nПожалуй, справедливо будет заявить, что [target.GetName::<1> учится|||pl:<1> учатся] побеждать апатию и дискомфорт."
 unplugged.3115.a: "Понятно."
 unplugged.3116.name: "Поддержание статус-кво"
 unplugged.3116.desc: "Докладывает [target.capital_scope.GetName]: местные власти сообщают, что граждане все чаще начинают устраивать демонстрации и мирные акции гражданского неповиновения. За каждым таким мероприятием ведется наблюдение, и в каждом случае принимаются разумные меры, поэтому оснований для тревоги пока нет. Однако причина у протестов неизменно одна: наша политика в отношении киберимплантатов, а точнее — недовольство ею со стороны тех граждан, которых устраивает сложившийся уклад.\n\nПо всей видимости, население [target.GetName&gen] твердо уверено, что статус-кво не подразумевает бездействия. Наоборот, многие [target.GetSpeciesNamePlural] активно протестуют против дальнейшего «вмешательства» в вопрос аугментаций."
 unplugged.3116.a: "Понятно."
 unplugged.3117.name: "Твердый взгляд на вещи"
 unplugged.3117.desc: "Некоторые [target.GetSpeciesNamePlural] еще продолжают выступать против, как им кажется, бездействия правительства в вопросе кибернетических аугментаций, однако сегодняшнее общество в целом можно назвать более спокойным и терпеливым. Некоторые граждане даже начинают заниматься совместной благотворительностью и помощью нуждающимся. Медицинские учреждения тем временем озаботились поставками новых вторичных деталей, без которых невозможно существование.\n\nМедленно, но верно народ начинает смиряться со своей внешностью и навязанными извне обстоятельствами. Нам еще многое предстоит сделать, однако где принятие, там и слабый проблеск надежды."
 unplugged.3117.a: "Все-таки это тоже вывод."
 unplugged.3205.name: "Страшное наследие"
 unplugged.3205.desc: "Все чаще [root.GetSpeciesNamePlural] склоняются к мнению, что наш недавний (и неловкий) разговор с [fromfrom.GetName&inst] на самом деле симптом, который мы стесняемся признавать; симптом, начало которому положил разрыв с [origin_unplugged_assimilator_empire.GetName&inst]: нас просто боятся. Более того — они боятся Машины, а не нас самих. Страх этот выученный, несправедливый, а потому избавиться от него будет сложно." # fromfrom = pre-FTL country
 unplugged.3206.desc: "Многие [root.GetSpeciesNamePlural] считают, что [fromfrom.GetName] своим истерзанным войной видом демонстрирует остальным неудобную правду: нас просто боятся, и мы даже не виноваты в причинах этого страха.\n\nОдна лишь наша внешность наводит на других смертельный страх, и это сильно затрудняет нам дипломатические контакты с другими расами. Но возможно и то, что мы не поспеваем за собственным наследием: многие помнят, насколько беспощадными мы были, когда находились во власти Машины, и не допускают даже мысли, что сегодня мы — [root.GetSpeciesNamePlural]." # fromfrom = other empire
 unplugged.3205.a: "Как бы то ни было, они правильно нас боятся."
 unplugged.3205.b: "Так не пойдет."
 unplugged.3250.name: "Страх перед Машиной"
 unplugged.3250.desc: "Государственные чиновники потрясены новостью об установлении нами дипломатических отношений с машинным разумом. Никто еще не осмелился заявить о своем недовольстве непосредственно [fromfrom.GetName&dat], однако нам уже поступили предложения ввести упреждающие санкции и подготовить планы на случай предполагаемого вмешательства в наши дела.\n\nМногие [root.GetSpeciesNamePlural], впрочем, даже рады такому развитию событий. Неизвестно, что стало причиной такой радости — неподдельная ксенофилия или признание того, что мы сами частично машины, однако потенциальная возможность научиться чему-нибудь у мирного машинного разума вселяет надежду."
 unplugged.3255.name: "Боязнь прошлого"
 unplugged.3255.desc: "Наш дипломатический корпус глубоко потрясла новость об установлении контакта с машиной, невероятно схожей с [origin_unplugged_assimilator_empire.GetName&inst]. Присутствующие, впрочем, сохранили хладнокровие и не проявили какой-либо слабости или страха перед [fromfrom.GetName&inst], но теперь нам всем предстоит пройти серьезное испытание на выдержку.\n\nПограничные войска уже получили уведомления с грифом «совершенно секретно». Сейчас нужно ответить на непростой вопрос: скрыть ли сам факт этого контакта от населения? Часть чиновников выступает за то, чтобы не оставлять [root.GetAdj&masc] народ в неведении и дать ему выразить свое мнение, часть же выступает против этого."
 pre_ftl_remains_site: "Разрушенная колыбель"
 pre_ftl_remains_site_desc: "Вся поверхность планеты [From.Planet.GetName] покрыта шрамами: кто-то систематически изничтожал здесь жизнь, осыпая землю снарядами и стирая в пыль города. Теперь в этом мире царит жуткая тишина. Первые результаты сканирования показали, что когда-то на этой планете проживало процветавшее досветовое общество. Его постигла неведомая, но ужасающая судьба — об этом свидетельствуют многочисленные останки."
 unplugged.3300.name: "Следы борьбы"
 unplugged.3300.desc.unplugged: "При первом осмотре планеты [From.Planet.GetName] выяснилось, что она вся покрыта развалинами. Деревни разорены, по дорогам разбросаны бесхозные уже вещи, а дома оплавились под воздействием температуры, невообразимой для уровня местных досветовых технологий. Тот, кто атаковал этот мир, действовал быстро и целенаправленно.\n\nТочность разрушительного оружия позволяет предположить, что атака была скоординирована заранее. Мы не обнаружили поблизости тел, однако очевидно, что местные жители сбежали, хоть и недалеко."
 unplugged.3300.a: "Пугающе."
 unplugged.3305.name: "Машинные останки"
 unplugged.3305.desc.unplugged: "Более тщательные раскопки выявили новые подробности о природе развернувшейся здесь войны. В руинах мы обнаружили оплавленные механические останки высокотехнологичных кибернетических изделий, напоминающих наши собственные имплантаты. Это не просто оружие — это сложный сплав механики и органики, живой инструмент для ведения боевых действий. Совсем как мы. Пока еще рано делать выводы, однако тягостно становится от одного понимания, что именно в этой системе мы неожиданно «пробудились».\n\nОпознавательные знаки на этих машинах наводят на неприятные мысли: похоже, нападавшая сторона не стремилась завоевать эту планету. Она действовала гораздо более планомерно."
 unplugged.3305.a: "Вопросов больше, чем ответов."
 unplugged.3310.name: "Безответные сигналы"
 unplugged.3310.desc.unplugged: "Под развалинами города-крепости мы обнаружили огромное сооружение — бывший узел связи, построенный с применением сложных, недоступных досветовому обществу технологий. Более того, его антенная система не рассчитана на местную сеть — она передавала сообщения в дальний космос.\n\nПосле тщательного анализа нам удалось извлечь фрагменты последних передач, посланных из этой системы. Искаженные помехами голоса на записях молят о спасении и отчаянно пытаются вызвать кого-то из точки с незнакомыми нам координатами, находящейся далеко за пределами системы. С каждой новой передачей их отчаяние лишь нарастает, словно захватчики понимали, что война почти проиграна, а потому начали возлагать надежды на что-то — или кого-то — в мировом пространстве."
 unplugged.3310.a: "Продолжаем."
 unplugged.3315.name: "Новые приоритеты"
 unplugged.3315.desc.unplugged: "Мы совершили очередное открытие: под крупным городом на планете [from.planet.GetName] обнаружились обширные подземные полости. Здесь в жестких, очень суровых условиях происходило превращение в киборгов; похоже, эти помещения покинули в большой спешке. Среди развалин мы обнаружили останки различных машин, искореженных и уничтоженных самодельным оружием.\n\nРазрозненные данные, извлеченные из одной такой машины, подтверждают, что захватчики натолкнулись на неожиданное сопротивление. Потеряв несколько батальонов, они вынуждены были пересмотреть свои планы. Одна запись гласит:\n\n§H«Сопротивление неприемлемо. Процедура превращения нарушена. Разрешается тотальное истребление».§!"
 unplugged.3315.a: "Что же здесь случилось?"
 unplugged.3320.name: "Неприглядная правда"
 unplugged.3320.desc.unplugged: "В самом центре развалин расположился разрушенный командный центр. Сохранившиеся здесь записи пострадали, но нам все-таки открылась ужасающая истина: захватчиками были мы.\n\nПроживавшая здесь цивилизация — цивилизация, без следа уничтоженная нами, — привлекла внимание §Y[origin_unplugged_assimilator_empire.GetName&gen]§!, однако запланированная ассимиляция сорвалась, когда мы натолкнулись на ожесточенное сопротивление. Нам пришлось прибегнуть к единственному оставшемуся варианту: полному уничтожению планеты. И когда началась бойня, машинный разум отказал.\n\nВывод можно сделать только один: наше пробуждение началось именно здесь. Наш путь к свободе оказался усыпан прахом народа, сражавшегося настолько упорно, что никакая машина не могла даже представить себе такой свирепости."
 unplugged.3320.a: "Мы последуем их примеру."
 unplugged.3320.b: "Их народ погиб, чтобы зародился наш."
 ######################
 # Political Discourse
 ######################
 unplugged_they_fear_us: "Страх перед Машиной"
 unplugged_they_fear_us_desc: "Это государство когда-то прислуживало жестокому маниакальному ассимилятору и теперь пользуется страшной репутацией."
 unplugged.4005.name: "Нужно обсудить…"
 unplugged.4005.desc: "Страхи, сомнения, а главное — возможности, которые мы, [root.GetSpeciesNamePlural], открываем для себя каждый день, постоянно множатся, поскольку в нашем государстве бурно кипит политическая жизнь. По каждому вопросу уже сформировались обсуждающие его группы, и каждый стремится высказать свое мнение. Многим, в частности, не дает покоя наше [origin_unplugged_assimilator_empire.GetAdj&neut] прошлое.\n\nВ попытках укрепить нашу молодую державу мы уже освоили множество незнакомых нам ранее инструментов. Теперь осталось ответить на один вопрос: как именно мы начнем воплощать желания и устремления народа?"
 unplugged.4005.a: "Некогда тратить время на пустые разговоры!"
 unplugged.4005.tt: "Могут появляться фракции с противоположными взглядами на кибернетическое будущее нашей расы"
 unplugged.4005.b: "Будем учиться у других."
 unplugged.4005.c: "Божества дадут нам ответ."
 unplugged.4005.d: "Некогда тратить время на пустые разговоры!"
 #######################################################
 # Random events following decyberization breakthrough #
 #######################################################
 unplugged.5001.name: "Сработал предохранитель"
 unplugged.5001.desc: "Недавний прорыв в области извлечения кибернетических компонентов обернулся неожиданными сложностями: некоторые пациенты, прошедшие через процедуру отключения имплантатов, впали в глубокий анафилактический шок. Вероятность их выживания крайне невелика.\n\nПри более внимательном осмотре мы обнаружили скрытый компонент, который не регистрировался медицинской аппаратурой. Оказалось, что он пришел в действие сразу после операции.\n\nПо всей видимости, наши бывшие [origin_unplugged_assimilator_empire.GetAdj&pl] хозяева готовы были пойти на что угодно, лишь бы их подневольная рабочая сила оставалась покорной."
 unplugged.5001.a: "Попытаться удалить предохранители."
 unplugged.5001.a.tt1: "Пациент не переживает процедуру"
 unplugged.5001.a.tt2: "Все предохранители успешно удалены"
 unplugged.5001.b: "Стабилизировать пострадавших и предоставить им паллиативную помощь."
 unplugged.5001.c: "Отключить их от жизнеобеспечения."
 unplugged.5001.c.tt: "Часть поселений гибнет"
 unplugged.5002.name: "Нейроблокатор удален"
 unplugged.5002.desc: "Проводимые нами операции по удалению кибернетических компонентов привели к всплеску на родной планете недоверия, а затем и беспорядков среди тех, кто прошел эти процедуры. После задержания одного из протестующих выяснилось, что до операции у него был установлен модифицированный имплантат.\n\nЭто устройство служило нейронным ограничителем — подавителем психических отклонений, связанных с конкретным генетическим дефектом. Жестокое поведение, проявившееся после процедуры, можно объяснить только его отсутствием."
 unplugged.5002.a: "Они должны сидеть в тюрьме."
 unplugged.5002.a.tt: "Доступно несколько учреждений для лечения протестующих (с большими затратами)"
 unplugged.5002.b: "На силу следует отвечать силой."
 unplugged.5002.b.tt: "На подавление бунтов брошены вооруженные формирования. Подавление сопровождается жертвами и непреднамеренным ущербом."
 unplugged.5002.c: "Эти потрясения несерьезны."
 unplugged.5002.c.tt: "Силовики стараются сдержать протестующих имеющимися силами"
 unplugged.5003.name: "Потерян доступ к критически важным системам"
 unplugged.5003.desc: "Декиберизация привела к неожиданным осложнениям: интерфейсы критически важных систем больше не распознают администраторов с удаленными имплантатами. Без установления нейросвязи доступ к системам невозможен, а значит, невозможна и работа."
 unplugged.5003.a: "Разработать новый интерфейс."
 unplugged.5003.a.tt: "Команда опытных инженеров переброшена с критически важных задач на разработку совместимого интерфейса"
 unplugged.5003.b: "Попытаться взломать недоступные системы."
 unplugged.5003.b.tt: "Срабатывают средства противодействия, потребляющие огромное количество энергии. Доступ восстанавливается"
 unplugged.5003.c: "Перезагрузить устройства."
 unplugged.5003.c.tt: "Происходит очистка хранилищ данных, что приводит к утрате многих знаний. Исследовательские станции в системе [Root.home_planet.System.GetName] самоуничтожаются после срабатывания предохранителей"
 unplugged.5003.d: "Все это несущественно."
 unplugged.5003.d.tt: "Доступ к системам на какое-то время остается ограниченным, что затрагивает работу космических баз"
 unplugged.5004.name: "Фракция сторонников киберизации против перемен"
 unplugged.5004.desc: "Кампания по извлечению кибернетических компонентов натолкнулась на неожиданное сопротивление.\n\nПротивники перемен все чаще объединяются в группы и громко выражают свое недовольство на форумах и по каналам общения. Они утверждают, что попытки избавиться от столь важного элемента общественного достояния, сопряженные к тому же с риском для здоровья, вызывают у публики вполне конкретное отношение к декиберизации."
 unplugged.5004.a: "Выделить средства на активную агитацию."
 unplugged.5004.a.tt: "\nЗапущена маркетинговая кампания по переубеждению публики и противодействию фракциям противников.\n\nПринципы некоторых поселений меняются на §Yэгалитарные§!."
 unplugged.5004.b: "Задержать и переубедить руководителей фракций."
 unplugged.5004.b.tt: "Часть лидеров фракций оказывается помещена в исправительные учреждения, где с ними проводятся «убедительные беседы».\n\nИх принципы меняются на §Yавторитарные§!."
 unplugged.5004.c: "Не будем вмешиваться и нарушать свободу слова."
 unplugged.5004.c.tt: "\nПравительство не предпринимает никаких действий. Общественный дискурс продолжается сам собой"
 unplugged.5005.name: "Чип эмоционального регулирования"
 unplugged.5005.desc: "Сочетание опасных технологических устройств с биологическими особенностями нашей расы — благоприятный фактор для исследователей.\n\nИзучение как положительного, так и отрицательного влияния имплантатов на пациентов проложило дорогу к совершенно новой области исследований — изменению химических процессов в мозгу.\n\nВ ходе долгих и тщательных работ наши ученые разработали сложное устройство под названием «эмоциональный чип», способное регулировать поведение носителя ради пользы всего общества. На выбор доступно несколько химикатов — все зависит лишь от того, какого результата мы хотим достичь."
 unplugged.5005.a: "Нейроксен. Надо снизить уровень преступности."
 unplugged.5005.a.tt: "Синтетический нейромедиатор, снижающий импульсивность и агрессию. Носители охотнее соблюдают общественные нормы в ущерб личной выгоде."
 unplugged.5005.b: "Регенол-X. Быстрая регенерация нужна всем."
 unplugged.5005.b.tt: "Генно-модифицированное соединение, согласовывающее работу биологических и синтетических систем. Благодаря ему кибернетические имплантаты способны самовосстанавливаться на молекулярном уровне."
 unplugged.5005.c: "Когнивекс. Нам нужны острые умы."
 unplugged.5005.c.tt: "Современное нейрохимическое вещество, помогающее развивать синаптическую пластичность и умение запоминать информацию и решать задачи."
