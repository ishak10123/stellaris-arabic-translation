 civic_tooltip_not_heritage: "НЕ обладает гражданской моделью «['concept_heritage_civics']»"
 concept_heritage_civics: "Наследственные"
 concept_heritage_civics_desc: "К наследственным гражданским моделям относятся:\n- «['civic:civic_aristocratic_elite']»$NEW_LINE$- «['civic:civic_heroic_tales']»$NEW_LINE$- «['concept_pleasure_seekers_civics']»$NEW_LINE$- «['concept_storm_callers_civics']»$NEW_LINE$- «['concept_environmental_architects_civics']»"
