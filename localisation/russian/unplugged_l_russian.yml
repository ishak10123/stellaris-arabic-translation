 origin_unplugged: "Полный сброс"
 origin_unplugged_desc: "$CHALLENGING_ORIGIN$\nЭта молодая цивилизация, неожиданно отрезанная от ассимилировавшей ее машины, решительно сражается за свое место под звездами."
 origin_tooltip_unplugged_effects: "- $HOMEWORLD$$TABBED_NEW_LINE$- $PLANETARY_MODIFIERS$ «['concept_unplugged_battlefield']»\n- $HOME_SYSTEM$ содержит ['concept_pc_nuked', опустошенный мир] с ['concept_archaeology_site', местом археологических раскопок] на руинах уничтоженной ['concept_preftl_civilizations', досветовой цивилизации]\n- $SPECIES_TRAITS$$TABBED_NEW_LINE$- Ограниченный доступ к ['concept_cybernetic_traits', кибернетическим] признакам$TABBED_NEW_LINE$- «['concept_unplugged_cybernetic_positives_3']»$TABBED_NEW_LINE$- «['concept_unplugged_cybernetic_negatives_3']»"
