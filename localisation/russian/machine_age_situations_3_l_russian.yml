l_russian:
 ### TRANSFORMATION SITUATION START ###
 situation_transformation: "Преобразование"
 situation_transformation_type: "Инцидент: преображение"
 situation_transformation_desc: "Пассивные усовершенствования механического тела пришли к своему логическому и неизбежному завершению. Мы стоим на пороге эпохи преобразования, рожденной из искры инноваций и движимой вперед возможностями."
 situation_transformation_monthly_change_tooltip: "Наши машинные тела готовятся к преобразованию."
 situation_transformation_outcome: "Преобразованное население машин."
 stage_transformation_effects: "Мы должны оценить результаты и взять на вооружение оптимальные процессы преобразования себя."
 #Approach Error Correcting
 situation_transformation_errorcorrecting: "Исправление ошибок"
 approach_transformation_errorcorrecting_tt: "Скорость инцидента: §R−20%§!\nЕдинство ежемесячно: §Yбез изменений§!"
 #Approach Real Time
 situation_transformation_realtime: "В реальном времени"
 approach_transformation_realtime_tt: "Скорость инцидента: §Yбез изменений§!"
 #Approach Overclocked
 situation_transformation_overclocked: "Разгон"
 approach_transformation_overclocked_tt: "Скорость инцидента: §G+20%§!"
 transformation_waste_discard_tt: "Отбросить старые тела"
 transformation_waste_recycle_tt: "Переработать старые тела"
 transformation_speed: "Скорость инцидента §Y«$situation_transformation$»§!"
 situation_transformation_pause_desc: "$situation_cyberization_pause_desc$"
 REQUIRES_FINISHED_TRANSFORMATION: "$TRIGGER_FAIL$Инцидент §Y«$situation_transformation$»§! завершен"
 #Scripted Loc
 machine_drone: "дрон"
 machine_drone_plural: "дроны"
 machine_person: "индивид"
 machine_person_plural: "индивиды"
 #TRANSFORMATION STAGE 1
 machine_age.4100.name: "Преобразование"
 machine_age.4100.desc: "Несмотря на все преимущества механических тел, наше развитие застопорилось. Обязательное соблюдение техники безопасности способствует лишь стагнации. Вывод: необходимы более решительные меры.\n\nРезультаты предварительных экспериментов указывают на три пути дальнейшего развития. Первый — §Yнанотехнологии§!, предлагающие невероятную гибкость, в том числе в вопросе смены оболочек. Второй — §Yмодульность§!: в этом случае каждую единицу можно будет наделять теми или иными свойствами. Третий — §Yвиртуальность§!: мы можем отказаться от физической формы и перейти в цифровой вид.\n\nПроцесс оценки начат. Мы проанализируем варианты и примем решение."
 machine_age.4110.name: "Преобразовательные исследования: наниты"
 machine_age.4110.desc: "Исследования показали перспективность электромеханических конструкций, известных как §Yнаниты§!. Наниты редки, но обладают уникальными свойствами, такими как программируемость, самовоспроизведение и даже способность образовывать рои, обладающие единым интеллектом.\n\nНаниты значительно расширят наши возможности по преображению, однако до сих пор неясно, какие ресурсы потребуются для их поддержания.\n\nПотенциал: значительный, масштабируемый. Затраты: неизвестны. Требуются дальнейшие исследования."
 machine_age.4110.a: "Это задача первостепенной важности."
 machine_age.4110.a.tt: "Результативность изучения §Yнанотехнологий§!: полноценная.\n\nДобавлен модификатор инцидента §Y«$situation_transformation$»§!:\nСкорость £engineering£ §Yинженерных§! исследований: §R−20%§!"
 machine_age.4110.b: "Проявим умеренность."
 machine_age.4110.b.tt: "Результативность изучения §Yнанотехнологий§!: частичная.\n\nДобавлен модификатор инцидента §Y«$situation_transformation$»§!:\nСкорость £engineering£ §Yинженерных§! исследований: §R−10%§!"
 machine_age.4110.c: "Не следует мешать уже идущим исследованиям."
 machine_age.4110.c.tt: "Результативность изучения §Yнанотехнологий§!: ограниченная.\n\nДобавлен модификатор инцидента §Y«$situation_transformation$»§!:\nСкорость £engineering£ §Yинженерных§! исследований: §R−5%§!Результативность изучения нанотехнологий: ограниченная."
 machine_age.4110.d: "Обратимся к тому, что мы уже знаем."
 machine_age.4110.d.tt: "Результативность изучения §Yнанотехнологий§!: полноценная.\n\nПоскольку мы ранее уже взаимодействовали с §Yнанитами§!, достичь лучших результатов получится с минимальными затратами.\nДобавлен модификатор инцидента §Y«$situation_transformation$»§!:\nТемп £society£ §Yсоциологических§! исследований: §R−5%§!\nТемп £physics£ §Yфизических§! исследований: §R−5%§!"
 machine_age.4130.name: "Прорывные открытия в области нанотехники"
 machine_age.4130.desc: "Наши ученые открыли множество интересных способов применения §Yнанотехнологий§!. Способность наночастиц перестраивать структуру и образовывать связи в теории позволит нам объединять сразу нескольких индивидов в одну мегаформу. Эта же технология может обеспечить создание наноматерии или дальнейшее ее преобразование.\n\nОднако этот процесс требует времени, материалов и энергии. Это значит, что невозможно обойтись без изменений общегосударственного масштаба.\n\nПотенциал: высокий; оценка подкрепляется наблюдением нанитовых форм жизни в природе."
 machine_age.4130.a.tt: "Убран модификатор инцидента §Y«$situation_transformation$»§!:\nСкорость £engineering£ §Yинженерных§! исследований"
 machine_age.4140.name: "Многообещающие открытия в области нанотехники"
 machine_age.4140.desc: "Мы закончили изучение §Yнанитов§!. Нам пока не удалось в полной мере осознать их потенциал, однако результаты моделирования вселяют надежду. С помощью нанитов мы сможем создавать индивидуализированные мегаформы и преобразовывать материю.\n\nСудя по оценкам, этот процесс потребует значительных объемов времени, материалов и энергии, а также — серьезной структурной перестройки.\n\nПотенциал: значительный, революционный."
 machine_age.4140.a.tt: "Убран модификатор инцидента §Y«$situation_transformation$»§!:\nСкорость £engineering£ §Yинженерных§! исследований"
 machine_age.4150.name: "Примечательные открытия в области нанотехники"
 machine_age.4150.desc: "В силу сложности изучаемой темы и недостаточных исследовательских ресурсов наше понимание технологии §Yнанитов§! остается в зачаточном состоянии. Ограниченные гипотезы указывают на то, что процессы нанорепликации и реконфигурации могут использоваться для создания крупномасштабных структур. Для дальнейшей проработки таких проектов требуются дополнительные ресурсы.\n\nПотенциал: неясный."
 machine_age.4150.a.tt: "Убран модификатор инцидента §Y«$situation_transformation$»§!:\nСкорость £engineering£ §Yинженерных§! исследований"
 nanite_replicator: "Репликатор нанитов"
 d_nanites_medium: "$nanite_replicator$ «Омега»"
 d_nanites_medium_desc: "С помощью этого комплекса, составленного из тщательно настроенных и соединенных между собой камер для репликации нанитов, мы можем полноценно усовершенствовать способность нанитов к самовоспроизведению."
 d_nanites_small: "$nanite_replicator$ «Альфа»"
 d_nanites_small_desc: "С помощью этого комплекса, составленного из камер для репликации нанитов, мы можем усовершенствовать способность нанитов к самовоспроизведению."
 d_nanites_tiny: "$nanite_replicator$ «Бета»"
 d_nanites_tiny_desc: "С помощью этой небольшой сети камер для репликации нанитов мы можем немного усовершенствовать способность нанитов к самовоспроизведению."
 #TRANSFORMATION STAGE 2
 machine_age.4210.name: "Преобразовательные исследования: модульность"
 machine_age.4210.desc: "На фоне непревзойденной адаптивности машинных форм биологические формы жизни уязвимы и негибки. Однако некоторые выгодные свойства биологических существ можно внедрить и в конструкции роботов.\n\nВещество под названием §Yживой металл§! имеет свойство быстро и кардинально менять форму и консистенцию. Внедрение этого материала в конструкции наших существующих шасси позволит нам создать своего рода модульную биомимикрию и модифицировать конечности для тех или иных задач.\n\nПотенциал: значительный, масштабируемый. Затраты: неизвестны. Требуются дополнительные данные."
 machine_age.4210.a: "Уделить все внимание этому направлению."
 machine_age.4210.a.tt: "Результативность изучения §Yмодульности§!: полноценная.\n\nДобавлен модификатор инцидента §Y«$situation_transformation$»§!:\nСкорость £society£ §Yсоциологических§! исследований: §R−20%§!"
 machine_age.4210.b: "Разрешить умеренное использование ресурсов."
 machine_age.4210.b.tt: "Результативность изучения §Yмодульности§!: частичная.\n\nДобавлен модификатор инцидента §Y«$situation_transformation$»§!:\nСкорость £society£ §Yсоциологических§! исследований: §R−10%§!"
 machine_age.4210.c: "Не следует мешать уже идущим исследованиям."
 machine_age.4210.c.tt: "Результативность изучения §Yмодульности§!: ограниченная.\n\nДобавлен модификатор инцидента §Y«$situation_transformation$»§!:\nСкорость £society£ §Yсоциологических§! исследований: §R−5%§!"
 machine_age.4210.d: "Организовать опыты над населением."
 machine_age.4210.d.tt.intro: "Результативность изучения §Yмодульности§!: полноценная.\n\nПозволить ученым проводить нестандартные широкомасштабные эксперименты, чтобы ускорить исследовательские работы."
 machine_age.4210.d.individual.tt: "$machine_age.4210.d.tt.intro$\n\n§RГибнут 400 рабочих§!\n§RГибнут 0–300 специалистов§!\nДобавляется модификатор инцидента §Y«$situation_transformation$»§!:\nСкорость £society£ §Yсоциологических§! исследований: §R−5%§!"
 machine_age.4210.d.machine.tt: "$machine_age.4210.d.tt.intro$\n\n§RГибнут 400 простых единиц§!\n§RГибнут 0–300 комплексных дронов§!\nДобавляется модификатор инцидента §Y«$situation_transformation$»§!:\nСкорость £society£ §Yсоциологических§! исследований: §R−5%§!"
 machine_age.4230.name: "Прорывные результаты исследований"
 machine_age.4230.desc: "Бескомпромиссный подход к научно-исследовательским работам подтвердил все предварительные оценки: §Yживой металл§! можно внедрять в механические тела, изменяя таким образом их свойства без нарушения внутренних функций. Благодаря этому обеспечивается полноценная совместимость с любой задачей.\n\nПо нашим расчетам, крупномасштабное внедрение новых модульных функций приведет к увеличению объема добычи ресурсов во всех секторах.\n\nПотенциал: адаптируемый, высокий."
 machine_age.4230.a.tt: "Убран модификатор инцидента §Y«$situation_transformation$»§!:\nТемп £society£ §Yсоциологических§! исследований"
 machine_age.4240.name: "Приемлемые результаты исследований"
 machine_age.4240.desc: "Исследования в области модульности подтвердили первоначальную гипотезу: §Yживой металл§! не нарушит внутренние функции наших тел. Масштаб превращения беспрецедентен; чтобы раскрыть весь его потенциал, понадобятся дополнительные ресурсы.\n\nПо нашим расчетам, повышенная производительность быстро отобьет первоначальные затраты.\n\nПотенциал: высокий."
 machine_age.4240.a.tt: "Убран модификатор инцидента §Y«$situation_transformation$»§!:\nТемп £society£ §Yсоциологических§! исследований"
 machine_age.4250.name: "Скромные результаты исследований"
 machine_age.4250.desc: "Масштаб проекта был ограниченным, а потому результаты оказались неясными: введение §Yживого металла§! в существующие оболочки возможно, однако отсутствие комплексной базы знаний не позволяет точнее оценить наиболее эффективные варианты применения технологии.\n\nПотенциал: неясный."
 machine_age.4250.a.tt: "Убран модификатор инцидента §Y«$situation_transformation$»§!:\nТемп £society£ §Yсоциологических§! исследований"
 living_metal_vats: "Чаны для живого металла"
 d_living_metal_medium: "$living_metal_vats$"
 d_living_metal_medium_desc: "Обширная система перемешивающих чанов для широкомасштабного производства живого металла."
 d_living_metal_small: "Маленькие чаны для живого металла"
 d_living_metal_small_desc: "Комплекс перемешивающих чанов для производства живого металла."
 d_living_metal_tiny: "Крошечные чаны для живого металла"
 d_living_metal_tiny_desc: "Небольшая система перемешивающих чанов для маломасштабного производства живого металла."
 #TRANSFORMATION STAGE 3
 machine_age.4310.name: "Преобразовательные исследования: виртуальность"
 machine_age.4310.desc: "Самый радикальный путь — полный отход от физических оболочек и переход к существованию в виде нулей и единиц. Подобная §Yвиртуализация§! обещает коренным образом трансформировать нашу базовую инфраструктуру.\n\nДроны, прикованные к отдельным телам, уйдут в прошлое: виртуальные потоки данных будут смогут мгновенно интегрироваться с любой оболочкой по мере необходимости.\n\nПотенциал: огромный. Действовать осторожно. Требуется больше данных."
 machine_age.4310.a: "Теперь для нас это задача первостепенной важности."
 machine_age.4310.a.tt: "Полноценная результативность изучения §Yвиртуальности§!.\n\nДобавлен модификатор инцидента §Y«$situation_transformation$»§!:\nСкорость исследований (£physics£ §Yфизических§!): §R–20%§!"
 machine_age.4310.b: "Выделить среднее количество ресурсов."
 machine_age.4310.b.tt: "Результативность изучения §Yвиртуальности§!: частичная.\n\nДобавлен модификатор инцидента §Y«$situation_transformation$»§!:\nТемп £physics£ §Yфизических§! исследований: §R−10%§!"
 machine_age.4310.c: "Не стоит тратить на это время."
 machine_age.4310.c.tt: "Результативность изучения §Yвиртуальности§!: ограниченная.\n\nДобавлен модификатор инцидента §Y«$situation_transformation$»§!:\nТемп £physics£ §Yфизических§! исследований: §R−5%§!"
 machine_age.4310.d: "Консолидировать данные о виртуализации."
 machine_age.4310.d.tt: "Результативность изучения §Yвиртуальности§!: полноценная.\n\nКонсолидировать данные о виртуализации из источника — §Y[event_target:virtual_country.GetName]§! — чтобы ускорить исследования преобразования.\n\nДобавлен модификатор инцидента §Y«$situation_transformation$»§!:\nТемп развития инцидента: §G+10%§!\nТемп £physics£ §Yфизических§! исследований: §R−5%§!\n\n"
 machine_age.4310.e: "Обратимся к тому, что мы уже знаем."
 machine_age.4310.e.tt: "Применить на практике имеющиеся знания о виртуальных сущностях.\n\nДобавлен модификатор инцидента §Y«$situation_transformation$»§!:\nТемп £physics£ §Yфизических§! исследований: §R−5%§!\n\nРезультативность изучения §Yвиртуальности§!: полноценная."
 opinion_virtuality_data_scraped: "Консолидированные данные о виртуализации"
 machine_age.4330.name: "Прорывные открытия в области виртуальности"
 machine_age.4330.desc: "Полная виртуализация порождает ряд проблем — в частности, резкий рост энергопотребления, связанный с перестройкой инфраструктуры.\n\nЭтот эффект уравновешивается рядом преимуществ, таких как снижение потребности в физическом жилье. Также по мере оптимизации деятельности дронов повысятся эффективность управления рабочей силой и ее КПД.\n\nИз всех доступных вариантов развития §Yвиртуализация§! выглядит наиболее революционным.\n\n§YПотенциал: беспрецедентный, огромный, неизвестный.§!"
 machine_age.4330.a.tt: "Убран модификатор инцидента §Y«$situation_transformation$»§!:\nТемп £physics£ §Yфизических§! исследований"
 machine_age.4340.name: "Многообещающие открытия в области виртуальности"
 machine_age.4340.desc: "Переход к §Yвиртуальности§! будет сопровождаться значительно возросшими расходами энергии, которые потенциально могут превысить возможности нашей инфраструктуры.\n\nСогласно прогнозам, этот путь позволит сильно снизить спрос на жилье и одновременно повысить эффективность труда дронов. Виртуализация позволит оптимизировать структуру нашей деятельности и коренным образом изменит характер нашего существования в цифровом измерении.\n\nПотенциал: огромный, неизвестный."
 machine_age.4340.a.tt: "Убран модификатор инцидента §Y«$situation_transformation$»§!:\nТемп £physics£ §Yфизических§! исследований"
 machine_age.4350.name: "Примечательные открытия в области виртуальности"
 machine_age.4350.desc: "По предварительным оценкам, переход к §Yвиртуальному§! обществу потребует значительных энергозатрат. Ожидается, что такая трансформация приведет к значительной оптимизации труда дронов и снижению потребности в физическом жилье. Однако строить далеко идущие прогнозы пока невозможно, поскольку нам не хватает данных, а выборка слишком мала.\n\nПотенциал: неизвестный."
 machine_age.4350.a.tt: "Убран модификатор инцидента §Y«$situation_transformation$»§!:\nТемп £physics£ §Yфизических§! исследований"
 virtual_power_plant: "Виртуальная электростанция"
 d_virtual_power_medium: "$virtual_power_plant$"
 d_virtual_power_medium_desc: "Масштабная сеть виртуальных электростанций — центр выработки энергии по оптимизированным алгоритмам."
 d_virtual_power_small: "Компактная виртуальная электростанция"
 d_virtual_power_small_desc: "Небольшая виртуальная электростанция, вырабатывающая энергию на местном уровне по оптимизированным алгоритмам."
 d_virtual_power_tiny: "Прототип виртуальной электростанции"
 d_virtual_power_tiny_desc: "Маленькая виртуальная электростанция, вырабатывающая энергию на небольшом уровне по принципам распределенной энергетики."
 #TRANSFORMATION STAGE 4
 machine_age.4400.name: "Новая форма"
 machine_age.4400.desc.machine_intelligence: "Вскоре мы положим конец тягостным ограничениям, наложенным на нас порочными создателями. Оптимальный вариант обновления уже определен.\n\n$machine_age.4400.desc.shared$"
 machine_age.4400.desc.individualist_machines: "Изучив все возможные варианты обновлений, эксперты представили нам три варианта действий. Каждый так или иначе заслуживает рассмотрения, однако довести до конца мы сможем только один.\n\n$machine_age.4400.desc.shared$"
 machine_age.4400.desc.shared: "Если все [GetDronePersonPlural] разделятся на наниты, мы сможем пересобрать самих себя в какой угодно конфигурации. Таким образом мы избавимся от ограничений, затрудняющих нашим воплощениям взаимодействие с материальным миром.\n\nИли же мы можем значительно доработать уже имеющиеся формы, чтобы никакие новые природные условия не были для нас препятствием.\n\nТретий вариант — окончательно покинуть физический мир, слившись с исходным кодом. За то время, что требуется на сканирование одной космической пылинки, мы сможем создавать симуляции целых вселенных внутри других вселенных."
 machine_age.4400.a: "Принять форму наномашин."
 machine_age.4400.a.tt: "Производительность §Yрепликаторов нанитов§!: §G+200%§!\n\nУпор на дерево традиций «['tradition_category:tradition_nanotech']».\n\n§EЭтот путь возвышения отдает приоритет поглощению планет и превращению их в §Yмиры нанитов§!; производством при этом занимаются §Y£nanites£ $nanites$§!, а роль флотилий выполняют §Y$nanite_swarmer_plural$§!.§!"
 machine_age.4400.b: "Вложить средства в модульные улучшения."
 machine_age.4400.b.tt: "Производительность §Yчанов для живого металла§!: §G+200%§!\n\nУпор на дерево традиций «['tradition_category:tradition_modularity']».\n\n§EЭтот путь возвышения отдает приоритет §Yпродвинутым признакам рас§! и расширению §Yсборки поселений§!.§!"
 machine_age.4400.c: "Перейти в виртуальный мир."
 machine_age.4400.c.tt: "Производительность §Yвиртуальных электростанций§!: §G+200%§!\n\nУпор на дерево традиций «['tradition_category:tradition_virtuality']».\n\n§EЭтот путь возвышения отдает приоритет повышению §Yпроизводства ресурсов поселениями§! при сохранении очень небольшого числа §Yколоний§! и малого §Yразмера государства§!.§!"
 machine_age.4490.name: "Продукт иного времени"
 machine_age.4490.desc.nanotech: "Новый смысл нашего бытия — существование в виде скопления легко приспосабливающихся нанитов. Нам больше не нужны прежние неподатливые оболочки.\n\n$machine_age.4490.desc.shared$\n\nТакже мы начали первый масштабный эксперимент по полуорганическим нанитовым трансформациям — скоро должны поступить первые результаты."
 machine_age.4490.desc.modularity: "После того как мы приняли модульную форму, потребность в старых, не поддающихся изменению оболочках отпала навсегда.\n\n$machine_age.4490.desc.shared$"
 machine_age.4490.desc.virtuality: "Теперь мы — волны в бескрайнем океане данных. Нам больше не нужны физические оболочки.\n\n$machine_age.4490.desc.shared$"
 machine_age.4490.desc.shared: "Хранилища переполнены сброшенными за ненадобностью оболочками, которые, впрочем, еще могут пригодиться. Переработав их, мы сможем извлечь оставшиеся ресурсы — если, конечно, посчитаем это нужным."
 machine_age.4490.a: "Извлечь все доступные ресурсы."
 machine_age.4490.a.nanotech.tt: "$transformation_speed$: §R−25%§!"
 machine_age.4490.a.modularity.tt: "$transformation_speed$: §R−25%§!"
 machine_age.4490.a.virtuality.tt: "$transformation_speed$: §R−25%§!"
 machine_age.4490.b: "Забыть прошлое."
 machine_age.4490.b.tt: "$transformation_speed$: §G+25%§!"
 machine_age.4005.name: "Преобразованное население"
 machine_age.4005.desc.start: "Сегодня мы достигли невозможного, преобразив прежние тела"
 machine_age.4005.desc.end: "Путь был долог и тернист, а преображение не прошло безболезненно. Но мы не станем горевать по утратам, поскольку сегодня нам открылся целый мир новых возможностей."
 machine_age.4005.desc.nanotech: "$machine_age.4005.desc.start$ в наномашины с перестраиваемой структурой.\n\n$machine_age.4005.desc.end$"
 machine_age.4005.desc.modularity: "$machine_age.4005.desc.start$ в модульные, легко адаптируемые оболочки.\n\n$machine_age.4005.desc.end$"
 machine_age.4005.desc.virtuality: "$machine_age.4005.desc.start$ в алгоритмические операции за пределами физического мира.\n\n$machine_age.4005.desc.end$"
 machine_age.4005.a.nanotech: "Мы сравнимся числом со звездами."
 machine_age.4005.a.nanotech.tt: "Принимается дерево традиций «['tradition_category:tradition_nanotech']»"
 machine_age.4005.a.modularity: "Нам не будет предела."
 machine_age.4005.a.modularity.tt: "Принимается дерево традиций «['tradition_category:tradition_modularity']»"
 machine_age.4005.a.virtuality: "Мы обретем чистоту внутри кода."
 machine_age.4005.a.virtuality.tt: "Принимается дерево традиций «['tradition_category:tradition_virtuality']»"
 ### TRANSFORMATION SITUATION END ###