 acidic_spores: "Кислотные споры"
 acidic_spores_desc_short: "Флора на [from.GetPlanetMoon]е [from.GetName] со временем развила такой защитный механизм для спасения от доминирующего травоядного вида"
 acidic_spores_desc_details: "Вырабатываемый ей едкий газ отравил и сделал необитаемыми большие площади на поверхности планеты. Позднее ученым удалось синтезировать его менее активный вариант и использовать как эффективный пестицид."
 adakkaria_propaganda_poster: "адАккарийский пропагандистский плакат"
 adakkaria_propaganda_poster_desc_short: "Этот заламинированный плакат восхваляет славу адАккарийского Собрания"
 adakkaria_propaganda_poster_desc_details: "На плакате изображены уверенные в себе, гордые и отважные граждане. Они тянут щупальца к небу, словно стремясь ухватить свое будущее. Сверху на них взирают схематично изображенные механические существа в раскрашенных масках. Слоган на плакате гласит: «АдАккарийское Благодетельствующее Собрание: покровители нами гордятся!»"
 advisor_core: "Ядро советника"
 advisor_core_desc_short: "Единственная деталь, оставшаяся после демонтажа сложного дрона-советника, обнаруженного в Звездном разломе"
 advisor_core_desc_details: "Внутри этого ядра хранится невероятное количество несущественной информации, но сама сложность его программной архитектуры произвела настоящую революцию в вычислительной технике.\n[explorer.GetAdvisorCoreAdditionnalQuote]"
 advisor_core_desc_tutorial_on: "§L«Вы ведь не станете меня отключать?»§!"
 advisor_core_desc_tutorial_off: "§L«Желаете снова включить режим руководства?»§!"
 alien_brain_scans: "Томограммы мозга инопланетян"
 alien_brain_scans_desc_short: "Архив нейропаттернов давно исчезнувшей расы инопланетян, обнаруженный в хранилище на [fromfrom.GetPlanetMoon]е [fromfrom.GetName]"
 alien_brain_scans_desc_details: "Забытая цивилизация сохранила эти данные в преддверии планетарной катастрофы, надеясь перенести свое сознание в цифровые репозитории и обрести бессмертие. Многие из томограммы сопровождены заметками о соответствующих личностях, в том числе воспоминаниями близких."
 alien_dining_set: "Столовый набор из малахита"
 alien_dining_set_desc_short: "Элегантный набор посуды, найденный внутри искусственного астероида"
 alien_dining_set_desc_details: "Для изготовления этой посуды использовались сложные методы лепки, обжига и глазурования. В структуре предметов можно заметить мельчайшие изъяны: вероятно, набор был изготовлен вручную. Анализ материалов показал, что владелец посуды придерживался кислого рациона, в основном состоявшего из плодов-многокостянок."
 alien_jewelry: "Инопланетные ювелирные изделия"
 alien_jewelry_desc_short: "Набор элегантных инопланетных украшений из неизвестного материала"
 alien_jewelry_desc_details: "Камни имеют самые разные цвета и происхождение: это смесь силикатных и углеродных минералов в элегантной платиновой оправе. На внутренней стороне некоторых украшений видна гравировка, но перевести ее на наш язык не представляется возможным."
 alien_toy: "Пластмассовая игрушка"
 alien_toy_desc_short: "Простая игрушка, найденная на развалинах древней фабрики"
 alien_toy_desc_details: "Хрупкий и покрытый трещинами от старости, этот предмет был сформован промышленным способом в стальной форме. Похоже, он использовался лишь для украшения и игр."
 altar_to_the_elder_one: "Алтарь Древнейшему"
 altar_to_the_elder_one_desc_short: "Противоестественная машина, найденная внутри древней священной палаты"
 altar_to_the_elder_one_desc_details: "Даже в нерабочем состоянии эта машина излучает ауру неизмеримой псионической энергии. Некоторые утверждают, что и сейчас слышат ее искусительный шепот, зовущий заблудшие души вернуться на [cosmic_horror_location.GetPlanetMoon]у [cosmic_horror_location.GetName]."
 aluminium_plaque: "Алюминиевая табличка"
 aluminium_plaque_desc_short: "Простая табличка, найденная на автоматическом зонде, запущенном [owner.GetPreFTLLower&fem,inst] цивилизацией млекопитающих существ"
 aluminium_plaque_desc_details: "Поверхность покрыта странными геометрическими фигурами и грубыми изображениями представителей запустившей зонд расы. Художественные качества этой таблички сомнительны, но очевидно, что сам запуск этого объекта в космос стал для этой цивилизации огромным достижением."
 ammoniaphytus: "Аммонифит"
 ammoniaphytus_desc_short: "Количество водного аммиака в тканях этого растения опасно для большинства углеродных форм жизни"
 ammoniaphytus_desc_details: "Оказавшись в непосредственной близости от этого растения, большинство разумных существ в течение нескольких секунд теряют сознание. Сам факт существования такого организма вызывает интерес и споры среди наших величайших умов — и зловещие планы у прочих."
 amoeba_flagella_gland: "Жгутиковая железа амебы"
 amoeba_flagella_gland_desc_short: "Вторичный репродуктивный орган космической амебы"
 amoeba_flagella_gland_desc_details: "Он производит автономные организмы, известные как «жгутики»: агрессивные существа, которые собираются роем и нападают на жертвы, которые потом поглощает амеба. Жгутики быстро растут, но генетические дефекты не дают им достигать зрелости. Для производства полноценного потомства космические амебы впрыскивают в жгутики особые энзимы, провоцирующие стремительные метаморфозы. Чем руководствуется амеба при выборе жгутиков для размножения, неизвестно."
 ancient_bust: "Древний бюст"
 ancient_bust_desc_short: "Графитовая скульптура неизвестной разумной расы"
 ancient_bust_desc_details: "Судя по надписи на основании, это существо пользовалось огромным уважением своего народа."
 ancient_kinetic_launcher: "Древнее метательное устройство"
 ancient_kinetic_launcher_desc_short: "Примитивное метательное оружие, которое ускоряет твердый снаряд при помощи заряда взрывчатого вещества и выбрасывает его из конца короткой металлической трубки"
 ancient_kinetic_launcher_desc_details: "Точность такого устройства наверняка была, мягко говоря, спорной."
 ancient_laser_pointer: "Древний лазерный указатель"
 ancient_laser_pointer_desc_short: "Высокоточный прожектор, способный наводиться на небесные тела в галактических масштабах"
 ancient_laser_pointer_desc_details: "Оставленный благодетелями, этот ультрафиолетовый лазер интересен как конкретное свидетельство существования погибшей цивилизации. Удивительно, но он до сих пор работает."
 ancient_nanites: "Древние наниты"
 ancient_nanites_desc_short: "Эти универсальные наниты были обнаружены на планете [nanite_swarm_planet.GetName]. Сюда их многие тысячи лет назад занесла некая забытая цивилизация"
 ancient_nanites_desc_details: "Судя по отсутствию защитных механизмов, создатели нанитов не боялись, что кто-то обнаружит эти устройства и попытается использовать их в своих целях. [owner.GetSpeciesName] взяли их под свой контроль и терраформировали с их помощью планету, но как эти наниты были первоначально созданы, для нас остается неизвестным."
 ancient_nuclear_armament: "Древний ядерный заряд"
 ancient_nuclear_armament_desc_short: "Обнаруженная на планете [root.GetName], эта 35-мегатонная водородная бомба осталась после войны, уничтожившей предыдущих обитателей этого небесного тела"
 ancient_nuclear_armament_desc_details: "К счастью, обезвредить этот допотопный заряд оказалось вполне возможно. Наши лингвисты сличили надпись на корпусе с другими найденными на планете артефактами и перевели ее как «Великан великанов». Как странно."
 ancient_political_memoir: "Древние политические мемуары"
 ancient_political_memoir_desc_short: "Биография галактического политика древних времен"
 ancient_political_memoir_desc_details: "Леез-Терус была губернатором Сартаны, небольшой колонии, принадлежавшей древней цивилизации Гарвортской консерватории. Мелкая функционерка внутри тоталитарной фракции «Свобода дельцам», она была известна своей жесткой линией против импорта пищи из других галактических государств. После ряда скандалов и последовавших за ними отставок Леез-Терус стала правительницей Гарвортской консерватории, но ее правление продлилось недолго. Ее декларация в поддержку реконструкции любимой Гарвортской часовой башни едва не привело к восстанию в столице, и Леез-Терус была быстро замещена другим членом «Свободы дельцам»."
 ancient_rift_sphere: "Древняя разломная сфера"
 ancient_rift_sphere_desc_short: "Древний космолет, который проник сквозь звездный разлом и совершил жесткую посадку на планете [from.planet.GetName]"
 ancient_rift_sphere_desc_details: "Сотни лет скрытый от глаз в недрах планеты, этот спешно собранный сферический корабль принес в галактику предков [controller.owner_main_species.GetName&gen,pl]. Большая его часть была с тех пор разобрана на детали, но основная конструкция в целом не повреждена."
 ancient_satellite: "Древний спутник"
 ancient_satellite_desc_short: "Старый спутник, переданный в качестве «дара» древними механическими дронами с [root.GetPlanetMoon]ы [root.GetName]"
 ancient_satellite_desc_details: "Банки данных стары и полны неисправных блоков, но результаты последней переписи и регистрации рождений целы. Эта информация о динамике населения по всей планете помогла нам понять принципы устойчивого развития этой [owner.GetAdjective&fem,gen] колонии. То, что она частично сохранила функциональность спустя многие годы без обслуживания, свидетельствует о ее крепкой конструкции."
 ancient_sensor: "Древний датчик тепла"
 ancient_sensor_desc_short: "Замаскированный под астероид, этот датчик генерировал тепловые карты галактики и передавал эти данные далекому древнему государству"
 ancient_sensor_desc_details: "Этот датчик способен фиксировать перепады температуры внутри отдельных систем и отслеживать перемещение кораблей по их тепловому излучению. Но его основная задача — предсказание и оценка солнечных бурь и появления пятен на звездах."
 asteroid_fossils: "Окаменелости на астероиде"
 asteroid_fossils_desc_short: "Радиоуглеродное датирование показало, что эти морские окаменелости имеют возраст несколько миллионов лет"
 asteroid_fossils_desc_details: "Это окаменелые останки раковин беспозвоночных существ. Они оснащены уникальными полыми трубками, при помощи которых, как мы полагаем, эти существа прикреплялись к подводным геотермальным источникам."
 ballad_of_the_sable_knight: "Баллада о Вороном рыцаре"
 ballad_of_the_sable_knight_desc_short: "§dК турниру явился к нам сам Вороной рыцарь§!"
 ballad_of_the_sable_knight_desc_details: "§d\nС сильнейшим из нас пожелал он сразиться.\nДоспехов мы раньше таких не видали,\nВ разгар поединка они так сверкали!\nХоть воин наш лучший достойно сражался,\nУдар его каждый от них отражался.\nНо гость отступил, хоть и не был повержен,\nИ в мир свой унесся, никем не удержан.§!"
 beauty_of_planet: "Красота планеты [From.GetName]"
 beauty_of_planet_desc_short: "Терраформирование этой планеты было рассчитано с математической точностью, и результат стал праздником для всех органов чувств"
 beauty_of_planet_desc_details: "Система специально разработанных алгоритмов позволила глубоко проанализировать и тщательно культивировать все экосистемы планеты. Тщательно отобранные самые яркие цветы, самые питательные плоды и самые благоуханные травы превратили поверхность в настоящий райский уголок. Если бы природа могла быть столь же эффективной."
 black_hole_chromatic_anomaly: "Хроматическая аномалия в черной дыре"
 black_hole_chromatic_anomaly_desc_short: "Фантастический вид изнутри системы [From.solar_system.GetName]"
 black_hole_chromatic_anomaly_desc_details: "Благодаря химическому составу аккреционного диска в системе [From.GetName] черная дыра в ее центре приобрела хроматическую аберрацию и начала отбрасывать на окружающее пространство калейдоскоп цветных лучей. Уникальное зрелище в глубинах космоса."
 black_needle_ceremonial_sword: "Церемониальный меч «Черной Иглы»"
 black_needle_ceremonial_sword_desc_short: "Это мастерски выполненное оружие принадлежало Серебряному Перу, первому главарю пиратов «Черной Иглы»"
 black_needle_ceremonial_sword_desc_details: "Заказанный на доходы от первого успешного дела пиратской шайки, этот меч служил символом статуса и никогда не использовался как настоящее оружие. Его клинок выполнен из сплава титана и стали, а на гарде выгравирована надпись: «Пронзи покров»."
 black_needle_ledger: "Конторская книга «Черной Иглы»"
 black_needle_ledger_desc_short: "В этой книге записаны все дела «Черной Иглы» за тысячи лет, что пираты действовали в нашей галактике"
 black_needle_ledger_desc_details: "На ее страницы аккуратным почерком занесена каждая покупка и продажа, каждый выкуп и каждая взятка, с датой и разбивкой по категориям. Этот письменный памятник служит бесценным источником знаний о развитии черного рынка галактики"
 burnt_migratory_trees: "Живая кора"
 burnt_migratory_trees_desc_short: "Обугленные останки крупного подвижного растения, способного к координированной миграции"
 burnt_migratory_trees_desc_details: "Эти растения обладают рудиментарным разумом, но в больших количествах они способны уничтожать целые колонии. Мы обнаружили, что на коре растений обитают насекомые-паразиты, которые служат им сенсорными и коммуникационными центрами в обмен на защиту и питание. Такой симбиоз уникален своей эффективностью и опасностью."
 captain_ness_body: "Тело капитана Несс"
 captain_ness_body_desc_short: "Законсервированное тело капитана Саанды Несс, знаменитого пирата древних времен"
 captain_ness_body_desc_details: "Больше 5000 лет назад ее называли «бичом гиперпространства»: она грабила галактические государства и сумела накопить огромное богатство. Позже она перенесла свое сознание в механическое тело и построила огромное хранилище с данными своей биографии. Это все, что осталось от ее первоначального тела."
 captain_ness_logbook: "Журнал капитана Несс"
 captain_ness_logbook_desc_short: "Разрозненная коллекция журнальных записей, найденной в схроне древних пиратов, капитана Несс и ее помощника Смейгибба"
 captain_ness_logbook_desc_details: "Многолетние записи бесситемно разбросаны по большому количеству устройств. Хотя они считаются ненадежным источником, многие из описанных в них происшествий подтверждаются внешними свидетельствами."
 carnivorous_megaflora: "Плотоядная мегафлора"
 carnivorous_megaflora_desc_short: "Обнаруженные на [from.GetPlanetMoon]е [from.GetName], эти хищные растения могут проглотить целиком взрослого [owner.GetSpeciesName&gen], если тот зазевается"
 carnivorous_megaflora_desc_details: "Уничтожив почти всю местную наземную фауну, эти растения видоизменились, чтобы привлекать летающих существ. Верхушки вытягиваются высоко над кронами других деревьев, имитируя насесты."
 castaway_robot: "Брошенный робот"
 castaway_robot_desc_short: "Древняя гуманоидная машина, обнаруженная парящей в глубинах космоса"
 castaway_robot_desc_details: "Нам удалось извлечь из ее памяти несколько нечетких изображений: панорама в тройной звездной системе, треугольный космолет и ландшафт из сплавленного металлолома. Увы, никаких координат по метаданным определить не удалось."
 cenotaph_display: "Экспозиция кенотафов"
 cenotaph_display_desc_short: "Изображения кенотафов, обнаруженных на [fromfrom.GetPlanetMoon]е [fromfrom.GetName]"
 cenotaph_display_desc_details: "Хотя нам все еще не удалось найти создателей этих мастерски выполненных монолитов, у них наверняка была очень важная причина расставить их по всей поверхности необитаемой планеты. На них вырезаны сюжеты возвышения и падения целой цивилизации, а также крылатые звери, выведенные для войны. Краснобрюхие и ужасные, они вырвались из оков и истребили своих повелителей. Выдуманный это сюжет или пересказ реальных событий, точно сказать невозможно."
 centrifugal_container: "Высокоскоростной центробежный сосуд"
 centrifugal_container_desc_short: "Обнаруженное на орбите [from.GetPlanetMoon]ы [from.GetName] высокоскоростное орбитальное устройство для хранения нестабильных химических веществ"
 centrifugal_container_desc_details: "После разгона до нужной скорости оно способно предотвращать реакцию любых содержащихся внутри веществ, пока орбита планеты остается неизменной. Первоначальное содержимое было заменено на экспозиционные образцы."
 cetana_love: "Любовь Кетаны"
 cetana_love_desc_short: "Обширный сборник знаний из базы данных Кетаны"
 cetana_love_desc_details: "Его подарила [this.GetName&dat] королева синтетиков, одержимая желанием привести всю разумную жизнь к «спасению»."
 chambered_clay_pot: "Разделенный глиняный горшок"
 chambered_clay_pot_desc_short: "Этот глиняный сосуд разделен на два отсека"
 chambered_clay_pot_desc_details: "Мы предполагаем, что в одном отсеке хранились продукты, а другой использовался для какой-то примитивной системы охлаждения."
 claw_of_the_trickster: "Лапа Трикстера"
 claw_of_the_trickster_desc_short: "Трофей, взятый с тела существа, известного как Трикстер"
 claw_of_the_trickster_desc_details: "Эти могучие и хитрые твари обладают невероятными псионическими способностями, при помощи которых они призывают зверей, творят иллюзии и испускают огненные пучки энергии. Говорят, что каждая из его лап словно обладает независимой волей."
 confessions_benefactors: "Признания благодетелей"
 confessions_benefactors_desc_short: "Записывающее устройство, на котором хранится неприятная правда о древней цивилизации, известной нами под именем «благодетелей»"
 confessions_benefactors_desc_details: "Перед лицом неизвестной галактической угрозы они воспользовались своими высокими технологиями и «стерли» разум всех обитателей мира [controller.GetHomeWorldName], превратив процветавшую на нем промышленную [controller.GetAdjective&fem,acc] цивилизацию в толпу примитивных существ. Они сделали это в надежде, что галактическая угроза не станет тратить оружие и время на столь примитивных существ. Вероятно, эта неоднозначная мера позволила [controller.GetName&dat] продолжить свое существование на плечах гигантов до наших дней."
 coprolite: "Копролит"
 coprolite_desc_short: "Ком фекалий размером с астероид возрастом примерно в миллиард лет"
 coprolite_desc_details: "Генетический анализ показывает, что этот внушительный образец был произведен космическим существом гигантских размеров. Мы установили, что рацион этого зверя состоял в основном из редких минералов и кремниевых форм жизни. На сегодня этот объект считается самым крупным монолитным фрагментом экскрементов."
 cosmic_diamond_fragment: "Осколок космического алмаза"
 cosmic_diamond_fragment_desc_short: "Исторгнутый из недр умирающей звезды и кристаллизовавшийся осколок, обнаруженный в системе [from.solar_system.GetName]"
 cosmic_diamond_fragment_desc_details: "Этот космический алмаз образовался под колоссальным давлением в ядре звезды. Благодаря медленному остыванию, он сформировал сложную, но стабильную кристаллическую структуру. Внутри этого редкого осколка видны прожилки плазматического гелия и кислорода."
 crimson_nimkips: "Алые нимкипы"
 crimson_nimkips_desc_short: "Полуразумные растения, которые собираются огромными колониями и делают вещи, которые иначе были бы не под силу существам их размера"
 crimson_nimkips_desc_details: "Нимкипы невероятно питательны, и поэтому, отбившись от группы, они быстро становятся жертвами хищников. По своей природе они неагрессивны и послушны, из них получаются отличные питомцы. Эта особь содержится в неволе в сосуде, имитирующем ее естественную среду. НЕ СТУЧИТЕ ПО СТЕКЛУ!"
 crystal_core: "Кристаллическое ядро"
 crystal_core_desc_short: "Нервный узел, извлеченный из кристаллического организма"
 crystal_core_desc_details: "Этот кристалл гудит на постоянной частоте, вне зависимости от своей температуры. В богатых минералами условиях из него вырастают новые кристаллические выступы, структура которых меняется в ответ на внешние раздражители. Такое поведение показывает, что отдельные организмы обособляются друга от друга по двум факторам: характеристикам частоты ядра и вариациям внешних условий."
 crystal_nest_fragments: "Осколки кристаллического гнезда"
 crystal_nest_fragments_desc_short: "Обнаруженное в недрах блуждающего астероида, это кристаллическое гнездо было сформировано под огромным давлением неким космическим существом"
 crystal_nest_fragments_desc_details: "Судя по следовым остаткам в составе осколков, хозяин гнезда питался высокореактивными минералами, извлекал энергию из их нестабильных химических связей и выделял в качестве отходов инертные, но прочные кристаллы, способные собирать солнечный свет в одной точке."
 crystal_sphere_fragments: "Осколки кристаллической сферы"
 crystal_sphere_fragments_desc_short: "Осколки огромной кристаллической сферы, обнаруженной в системе [target.GetName]"
 crystal_sphere_fragments_desc_details: "Этот загадочный объект мог представлять серьезную угрозу для обитателей окружающих планет, а потому он был оперативно ликвидирован, пока не успел выполнить свою неизвестную задачу. Хотя его цели навсегда останутся для нас загадкой, его уничтожение было в интересах галактической безопасности."
 crystallized_cutholoid_eye: "Кристаллизованный глаз кутхолоида"
 crystallized_cutholoid_eye_desc_short: "Глаз кутхолоида способен выдерживать экстремальные давления и температуры"
 crystallized_cutholoid_eye_desc_details: "Как он кристаллизовался, точно неизвестно, но можно предположить, что это результат естественных процессов линьки."
 cult_pendant: "Кулон культа «[cult_name.GetName]»"
 cult_pendant_desc_short: "Вырезанный из полудрагоценного камня символ. Когда-то им обладал культ [cult_name.GetName] из [owner.GetName&gen]"
 cult_pendant_desc_details: "В рапортах о допросах говорится, что участники культа носили разные кулоны в зависимости от положения в иерархии. Новички лепили свои символы из глины, тогда как высокопоставленные культисты заказывали себе знаки из драгоценных металлов."
 #this = ship / fromfrom = planet
 cunning_flora_specimen: "Симбиотика"
 cunning_flora_specimen_desc_short: "Туземная флора с [fromfrom.GetPlanetMoon]ы [fromfrom.GetName] сформировала сложную социальную иерархию, которая способствует ее выживанию"
 cunning_flora_specimen_desc_details: "Каждый вид обладает уникальным способом отпугивания хищников, от острых как бритва шипов до смертельных нейротоксинов. Такая система симбиотических отношений эффективна настолько, что, взаимодействуя, растения способны даже регулировать состав атмосферы и почвы планеты. Наиболее продвинутые виды получают возможность активнее размножаться, укрепляя до максимума жизнеспособность всего коллектива."
 curator_survey: "Кураторская разведка системы [from.GetName]"
 curator_survey_desc_short: "Обзор крайне подробного исследования системы [from.GetName], составленный кураторской службой гигантских членистоногих"
 curator_survey_desc_details: "Высокоточные инструменты позволили составить многоуровневый анализ всех потенциальных свойств системы. Демонстрируемое в отчете внимание к деталям свидетельствует о весьма серьезном подходе к работе."
 cutholoid_digestive_acids: "Пищеварительные кислоты кутхолоида"
 cutholoid_digestive_acids_desc_short: "Радиоактивные флюиды, извлеченные из внутренностей кутхолоида"
 cutholoid_digestive_acids_desc_details: "Желудочный сок кутхолоидов сам по себе относительно слабокислотен, поэтому их организм переваривает пищу за счет радиоактивного распада кобальта-60. Из-за этого пищеварение кутхолоидов занимает много времени. После бомбардировки клеток жертвы радиацией кислота растворяет их, извлекая питательные вещества даже из самых необычных источников."
 cybrex_mining_column: "Добывающая установка Сайбрекса"
 cybrex_mining_column_desc_short: "Современный автоматический комбайн для добычи и концентрации гелия-3"
 cybrex_mining_column_desc_details: "Эта машина представляет собой высокую колонну из нагруженных магнитных дисков и мощных воздушных компрессоров, которая врезается в поверхность планеты без вращения. Она добывает и концентрирует газ, фильтрует и очищает его от примесей и затем отправляет на последующую переработку."
 data_on_infinity: "Данные о природе бесконечности"
 data_on_infinity_desc_short: "Физическое воплощение отстраненного спокойствия, испытываемого дронами, оказавшимися внутри черной дыры"
 data_on_infinity_desc_details: "Эти модули воспринимают растяжение времени как безмятежное пребывание в режиме ожидания, возможность спокойно обрабатывать и заново анализировать данные. Более не связанные главной директивой, они передают результаты аналитики через нестабильные каналы связи с центральной сетью."
 datacore_of_sinople: "База данных Синопля"
 datacore_of_sinople_desc_short: "Зашифрованная копия данных Синопля, искусственного интеллекта, созданного древними рыцарями"
 datacore_of_sinople_desc_details: "Эта база данных была найдена в бортовом компьютере корвета «Барышня», задолго до того разграбленного мародерами. В ней хранится ценная информация о токсичных космических существах."
 dathnak_gas: "Газ датнаков"
 dathnak_gas_desc_short: "Смесь необычных газов, добытых из газообразных организмов датнаков"
 dathnak_gas_desc_details: "[this.GetName&pl] [this.GetName::получил|||fem:получила|||neut:получило|||pl:получили] этот контейнер в подарок за помощь датнакам в миграции на новую планету. Спектрометрический анализ показывает, что в смеси присутствует равное число атомов различных благородных газов и элементов. Мы уверены, что живых организмов внутри нет."
 dead_god_mantle: "Мантия мертвого бога"
 dead_god_mantle_desc_short: "Дар посланника от [worshipper_species.GetNamePlural&gen]"
 dead_god_mantle_desc_details: "Коренные жители [dead_god_planet.GetPlanetMoon]ы [dead_god_planet.GetName] поклонялись останкам гигантского инопланетного организма с тех времен, когда их раса обрела разум. Эта мантия сшита из фрагментов окаменелой плоти их мертвого бога, она является символом высшего положения в их религиозной иерархии."
 decayed_megathrusters: "Разрушенные мегадвигатели"
 decayed_megathrusters_desc_short: "Ускорители, обнаруженные на борту колоссальных размеров судна, построенного из экзотических материалов"
 decayed_megathrusters_desc_details: "Судно, с которого сняты эти двигатели, было обнаружено среди космического мусора на обширной свалке кораблей. Похоже, оно находилось здесь более двух миллионов лет. За это время лом пришел в такое состояние, что даже самые дотошные исследования не помогли получить ценных научных данных. Эти двигатели теперь демонстрируются здесь как свидетельство того, насколько молодо наше общество."
 decayed_satellite: "Разрушенный спутник"
 decayed_satellite_desc_short: "Остатки ранних космических программ обитателей [fromfrom.GetPlanetMoon]ы [fromfrom.GetName]"
 decayed_satellite_desc_details: "Их прототипы космических аппаратов имели неэффективную конструкцию с излишним использованием дорогих материалов. Этот образец был деактивирован взрывным зарядом, но когда-то он использовался для обеспечения связи с отдаленными районами."
 declaration_of_animosity: "Нивлакское объявление вражды"
 declaration_of_animosity_desc_short: "Вежливое, но ядовитое послание от [nivlac_country.GetName&gen]"
 declaration_of_animosity_desc_details: "Первоначально [this.GetName] [this.GetName::обнаружил|||fem:обнаружила|||neut:обнаружило|||pl:обнаружили] [nivlac_species.GetNamePlural&gen] на [impossible_organism_planet.GetPlanetMoon]е [impossible_organism_planet.GetName]. Однако, напуганные невероятной скоростью этих существ, [this.GetAdjective&pl] ученые выбросили их в открытый космос. Несмотря ни на что, их организмы не только выжили, но и сумели колонизировать планету, на которой оказались. [nivlac_country.GetName] [nivlac_country.GetName::не забыл|||fem:не забыла|||neut:не забыло|||pl:не забыли] этой несправедливости."
 declaration_of_friendship: "Нивлакское заявление о дружбе"
 declaration_of_friendship_desc_short: "Благодарственное письмо от [nivlac_country.GetName&gen] с [nivlac_planet.GetPlanetMoon]ы [nivlac_planet.GetName]"
 declaration_of_friendship_desc_details: "Первоначально [nivlac_species.GetName&pl,acc] обнаружили [this.GetName&pl], выходили их и дали им планету, где существа могли свободно обитать. В результате стремительной эволюции [nivlac_species.GetName] открыли технологию сверхсветовых перелетов. Первым шагом на галактической сцене они выразили признательность своим благодетелям и покровителям, наладив с ними тесные дипломатические отношения."
 derelict_cybrex_warform: "Древняя боевая машина Сайбрекса"
 derelict_cybrex_warform_desc_short: "Останки боевой машины Сайбрекса, погибшей в бою против своих сородичей"
 derelict_cybrex_warform_desc_details: "Причина этой междоусобицы нам неизвестна. Силы этих машин были равны настолько, что они нанесли друг другу точные удары по одним и тем же критическим узлам до того, как сработали их системы самоуничтожения. Идеальная ничья."
 desiccated_brain_slug: "Высохший мозговой слизень"
 desiccated_brain_slug_desc_short: "Останки симбиотического существа, обнаруженные на [From.From.GetPlanetMoon]е [From.From.GetName]"
 desiccated_brain_slug_desc_details: "Анализ показывает, что оно могло служить для своего хозяина дополнительным сложным мозгом в обмен на питание и защиту. Такой союз требует явного согласия хозяина, иначе нейросвязи установить невозможно. Говорят, процесс интеграции слизня с нервной системой сопровождается приятным чувством щекотки."
 #this = owner / prev = colony
 destroyed_mascot_of_colony: "Останки робота на [prev.GetPlanetMoon]е [prev.GetName]"
 destroyed_mascot_of_colony_desc_short: "Останки туземного робота, найденные после колонизации [prev.GetPlanetMoon]ы [prev.GetName]"
 destroyed_mascot_of_colony_desc_details: "Последний оставшийся хранитель древней фабрики, он спас группу колонистов, застрявших внутри ее руин. На выставке также демонстрируется цифровая репродукция его знаменитого танца и необычных ужимок."
 devolved_baol_drones: "Деградировавшие единицы баола"
 devolved_baol_drones_desc_short: "Сохраненный набор остатков баола с существенными генетическими отличиями от ранее обнаруженных образцов"
 devolved_baol_drones_desc_details: "Эти единицы Разума странным образом лишены многих способностей, присущих прочим баолам. Их умственные способности снижены до такой степени, что они оказались неспособны поддерживать коммуникацию и поэтому были отделены от общего улья."
 dimensional_endothelial_lining: "Межпространственное эндотелиальное существо"
 dimensional_endothelial_lining_desc_short: "Необычное желеобразное вещество, собранное со стенок системы пульсирующих туннелей внутри звездного разлома"
 dimensional_endothelial_lining_desc_details: "Эта ткань, выстилающая внутренние полости неизвестного организма, обеспечивает плавное движение материалов по огромным сосудистым системам."
 dna_archive: "Архив ДНК"
 dna_archive_desc_short: "Образец, взятый из сотен инопланетных колб с ДНК, собранных в подземном архиве потерянной цивилизации"
 dna_archive_desc_details: "Эту коллекцию биологических материалов, вероятно, можно было бы использовать как величайший источник генетической информации, если бы большая часть образцов не разложилась и не стала бесполезной со временем. Есть предположение, что целью этого архива было сохранить генетический материал, чтобы некая более совершенная цивилизация могла «возродить» построившую его расу. Увы, история этого народа подошла к концу."
 doomsday_scrolls: "Свитки Судного дня"
 doomsday_scrolls_desc_short: "Древний религиозный текст, обнаруженный в центре лавового лабиринта"
 doomsday_scrolls_desc_details: "В свитках говорится о страшном существе: Архивраге, Тени, что поглотит все сущее, и о его жажде разрушения. Согласно местной религии, единственным спасением от этого чудовища было не дать ему поглотить душу верующего. Поэтому население совершило массовое самоубийство."
 drone_ship_core: "Ядро корабля-дрона"
 drone_ship_core_desc_short: "Остатки ядра от высокотехнологичного беспилотного корабля, который когда-то самоуничтожился"
 drone_ship_core_desc_details: "Это судно было обнаружено гниющим в кислотной атмосфере планеты [warform_origin_planet.GetName]. Его бортовой ИИ действовал независимо от остальных систем, но был удален согласно своему протоколу самоуничтожения. Инженерам не удалось спасти никаких данных из его памяти, так что первоначальная задача корабля осталась неизвестной."
 electric_life: "Электрическая жизнь"
 electric_life_desc_short: "Найденная на [from.GetPlanetMoon]е [from.GetName] форма жизни, целиком состоящая из электрических импульсов"
 electric_life_desc_details: "Эти существа не обладают клеточной или вирусной структурой, но в ответ на внешние раздражители могут формировать сложные системы планетарных масштабов. Мы не можем определить, являются ли эти импульсы отдельными индивидами или частью более крупного единого существа."
 enormous_scrambled_albumen: "Гигантский взбитый альбумин"
 enormous_scrambled_albumen_desc_short: "Вещество из недр [fromfromfrom.GetPlanetMoon]ы [fromfromfrom.GetName], которая оказалась колоссальным яйцом"
 enormous_scrambled_albumen_desc_details: "Когда мы вскрыли оболочку, на поверхность планеты излилась эта странная, богатая минералами жидкость. Синтезировав это вещество и включив его в состав наших запасов пищи, мы улучшим питание граждан."
 epic_of_zarqlan: "Поэма о Зарклане"
 epic_of_zarqlan_desc_short: "Священный текст о Зарклане, страже МОЗ-ТАРБ, пророке ЗВА"
 epic_of_zarqlan_desc_details: "Зарклан когда-то был последователем Кетаны, однако вскоре понял, что обещанное ею спасение — ложь. После многочисленных злоключений Зарклан вознесся в духовный мир и обратился с мольбой к §YОживляющему глину§!, чтобы тот помог ему одолеть Кетану. Много лет Зарклан возносил молитвы, пока Оживляющий глину наконец не вручил ему прочную цепь, способную сковать Кетану, предупредив, что даже ему не под силу навсегда обуздать разум королевы.\n\n§P«Она вернется, и мы должны быть к этому готовы».§!"
 ethereal_dust: "Вечная пыль"
 ethereal_dust_desc_short: "Единственный след главного ученого, оставшийся в похищенном и брошенном им научном корабле в системе [solar_system.GetName]"
 ethereal_dust_desc_details: "Анализ этого звездного материала не позволил нам прийти к однозначным выводам, но время от времени на борту спонтанно появляются и тут же исчезают следы ДНК исследователя. Всё указывает на то, что ученый перешел из нашего измерения в другое через временно стабильный разлом в пространстве-времени, который он назвал «Окном». Смог ли он выжить, мы, скорее всего, никогда не узнаем."
 exobiology_compendium: "Сборник трудов по экзобиологии"
 exobiology_compendium_desc_short: "Исчерпывающая научная работа, описывающая чудеса инопланетных форм жизни из разных систем галактики"
 exobiology_compendium_desc_details: "В этой работе содержатся результаты кропотливых и обширных полевых исследований с разных планет, которые навсегда меняют понимание того, где и при каких условиях возможно обнаружить жизнь в галактике. Текст заканчивается словами: «Наше понимание жизни уже никогда не будет таким, как прежде»."
 extradimensional_ceramic_pot: "Экстрамерный керамический горшок"
 extradimensional_ceramic_pot_desc_short: "Керамический горшок, обнаруженный на орбите звезды"
 extradimensional_ceramic_pot_desc_details: "Он существуешь лишь как тень другого четырехмерного объекта из высшего измерения. В нашем плане существования этот скромный сосуд неразрушим и неподвластен логике. Это заставляет по-новому взглянуть на саму нашу реальность: для существ высшего порядка мы наверняка менее ощутимы, чем этот простой горшок."
 extradimensional_fungus: "Экстрамерные грибки"
 extradimensional_fungus_desc_short: "Вариант вида разумного грибка, обнаруженного по ту сторону звездного разлома"
 extradimensional_fungus_desc_details: "Этот грибок общается, наполняя свои луковичные полости спорами, подвешенными в определенном порядке в концентрированном экзотическом газе. несмотря на важную роли в промышленном производстве газа, небольшие количества этого грибка уже продаются на черном рынке в качестве деликатеса."
 fevorian_blueprints: "Чертежи феворианской пусковой установки"
 fevorian_blueprints_desc_short: "Подарок от февориан"
 fevorian_blueprints_desc_details: "Феворианцы поставили себе целью истребить все известные им разумные инопланетные виды путем запуска по ним огромных вольфрамовых снарядов. Так они едва полностью не уничтожили [this.GetPlanetMoon]у [this.GetName]. После того, как мы победили их и пощадили, они поделились своей технологией огромных пусковых установок при условии, что это страшное оружие никогда не будет построено снова."
 figurehead_hyacinth: "Носовая фигура «Гиацинта»"
 figurehead_hyacinth_desc_short: "Украшение с носа обреченного корабля-ковчега «Гиацинт»"
 figurehead_hyacinth_desc_details: "После серьезной неисправности реактора корабль-ковчег остался дрейфовать без энергии в глубинах космоса. Колонистам пришлось биться друг с другом за истощающиеся ресурсы, пока все они не умерли от голода. На носовом украшении корабля высечены вдохновляющие цитаты и символы надежды."
 first_defiled_astronaut: "Первый [DefiledCountry.GetAdjective&masc] космонавт"
 first_defiled_astronaut_desc_short: "Национальный герой [DefiledCountry.GetSpeciesNamePlural&gen]"
 first_defiled_astronaut_desc_details: "Этот космонавт первым из своей расы вырвался за пределы гравитационного колодца родной планеты и отправился к новым пределам. После смерти его тело было погружено в полуразобранный космический челнок и отправлено в космос. Мы обнаружили дрейфующее погребальное судно и сохранили его как культурный артефакт."
 first_league_crew_manifest: "Манифест экипажа Первой лиги"
 first_league_crew_manifest_desc_short: "Корабельный журнал со списком членов экипажа, принадлежащий древней цивилизации под названием Первая лига"
 first_league_crew_manifest_desc_details: "Два миллиона лет назад на этом крейсере Великого флота служила команда из двенадцати уникальных рас. Этот документ подписан старшим помощником Скьютером из расы мигир-ян. Похоже, это был список для рутинного общего построения."
 fish_in_the_sea_sheet_music: "Космическая хоровая"
 fish_in_the_sea_sheet_music_desc_short: "Транскрибированная фонограмма для своего рода «матросской хоровой», найденная на борту судна с солнечным парусом"
 fish_in_the_sea_sheet_music_desc_details: "Текст песни изобилует отсылками к штормам и непогоде. Можно предположить, что ее автор происходит из расы с богатыми морскими традициями, уходящими в корни в историю ее родной планеты. Остается непонятно, почему эта песня написана так, чтобы полностью повторяться с интервалом почти в десять часов."
 flag_of_the_jaro_lyjo: "Флаг джаро-лиджо"
 flag_of_the_jaro_lyjo_desc_short: "Джаро-лиджо это титул, который дается капитану Дессипских бандитов, шайки пиратов, которая существовала много сотен поколений"
 flag_of_the_jaro_lyjo_desc_details: "Несмотря на свой буйный и жестокий нрав, пираты выбирали джаро-лиджо голосованием; этот титул выдавался пожизненно или до выхода на покой. Славная история Дессипских пиратов закончилась весьма внезапно, когда вся их флотилия была уничтожена в битве у Виды после неудачной попытки потребовать выкуп."
 flooded_settlement_mound: "Затопленный жилой бугор"
 flooded_settlement_mound_desc_short: "Остатки затопленной конструкции, построенной [controller.GetPreFTLLower&fem,gen] расой членистоногих с [from.GetPlanetMoon]ы [from.GetName]"
 flooded_settlement_mound_desc_details: "Развитие промышленности этой цивилизацией привело к таянию ледников на полюсах планеты. Вскоре уровень моря резко поднялся и затопил их поселения: вся раса была обречена на вымирание в течение всего нескольких лет. Самые высокие из их построек теперь наполовину поднимаются над кромкой воды."
 fossilized_endoskeletons: "Окаменелые эндоскелеты"
 fossilized_endoskeletons_desc_short: "Это все, что осталось от неизвестной гуманоидной расы, истощившей запасы минералов на [fromfrom.GetPlanetMoon]е [fromfrom.GetName]"
 fossilized_endoskeletons_desc_details: "Эти разумные прямоходящие существа употребляли минералы в пищу для укрепления своих плотных скелетов. Однако природные процессы внутри тел этих двуногих приводили не к разложению, а к окаменению их останков, в результате чего потребленные минералы не возвращались в почву. Так природные запасы жизненно важных элементов на планете истощились, а почвы деградировали и стали бесплодны."
 fossilized_megastomach: "Окаменелый мегажелудок"
 fossilized_megastomach_desc_short: "Пищеварительные железы, добытые из огромного планетарного червеобразного существа с планеты [fromfrom.Planet.GetName]"
 fossilized_megastomach_desc_details: "Удивительно, в какой-то момент внутри пищеварительного тракта этого организма успела сформироваться целая цивилизация, которая, впрочем, в итоге была переварена. На железах заметны следы от оружия, наследие обреченной «великой войны», которую жители червя объявили своему хозяину. Сам же колоссальный червь умер от естественных причин внутри сети своих тоннелей."
 fossilized_voidworm_tooth: "Окаменелый зуб пустотного червя"
 fossilized_voidworm_tooth_desc_short: "Следы эрозии на этом коренном зубе указывают на то, что его хозяин прожил больше сотни лет"
 fossilized_voidworm_tooth_desc_details: "На этом зубе видны сильные следы стирания и повреждений, характерные для существа, питающегося астероидами и космическим мусором. Считается, что в ходе жизни средний пустотный червь отращивает и сбрасывает более 3000 зубов."
 fossilized_vultaum_remains: "Окаменелые вультаумские останки"
 fossilized_vultaum_remains_desc_short: "Окаменелые останки представителя расы древних червеобразных разумных существ, известных как вультаумцы"
 fossilized_vultaum_remains_desc_details: "Считается, что эта особь умерла в детском возрасте. Состояние внутренностей указывает на то, что вультаумцы сбрасывали кожу в нерегулярные промежутки времени, в зависимости от состояния здоровья и диеты. Это позволяет нам изучать каждый жизненный цикл, анализируя окаменелости из соответствующего периода."
 fractured_planet: "Расколотая планета"
 fractured_planet_desc_short: "Остатки планеты, которая была целенаправленно разрушена своими обитателями"
 fractured_planet_desc_details: "Какая причина побудила их пойти на столь радикальный шаг, история утаивает."
 fragment_of_reckoning: "Фрагмент Расплаты"
 fragment_of_reckoning_desc_short: "Частично материальный остаток колоссальной псионической силы"
 fragment_of_reckoning_desc_details: "Известная в этом измерении как Расплата, эта сущность была причиной разрушительного преобразования мира [event_target:shrouded_planet.GetName]. Цивилизации, специализировавшейся на псионических теориях, удалось заключить этот фрагмент в контейнер незадолго до своей гибели."
 fragmented_zroni_archive: "Расколотый архив зрони"
 fragmented_zroni_archive_desc_short: "Большой инфокристалл, найденный в древней колонии зрони на [fromfrom.Planet.GetPlanetMoon]е [fromfrom.Planet.GetName]"
 fragmented_zroni_archive_desc_details: "В архиве содержится история могучей цивилизации с врожденными псионическими способностями. Их способность свободно путешествовать по Покрову стала возможной благодаря прорыву, совершенному их легендарной старейшиной, Дальновидицей. Внутри Покрова их сила была столь велика, что их можно было спутать с богами. Увы, более поздние данные совершенно испорчены."
 galactic_megadrive: "Галактический мегаархив"
 galactic_megadrive_desc_short: "Данные наблюдений, собранные по всей галактике за последние 1,2 миллиарда лет"
 galactic_megadrive_desc_details: "Для хранения этих данных используются такие сложные алгоритмы сжатия, что технологии их расшифровки намного выше нашего понимания. Сама конструкция носителя до сих пор является объектом изучения наших инженеров и источником новых цифровых технологий."
 gamma_resistant_flora: "Гамма-цветок"
 gamma_resistant_flora_desc_short: "Один из немногих выживших видов с планеты, недалеко от которой произошел гамма-​всплеск. Природное высокое количество свинца в сосудистой системе растения окрашивает его органы размножения в красивые красные и желтые оттенки"
 gamma_resistant_flora_desc_details: "Оно приобрело способность размножаться бесполым путем за счет малых генетических мутаций, так что разведение этого вида — опасное занятие. Мы обнаружили, что вмешивание в почву небольшого количества кобальта-60 позволяет ему выжить за пределами родной планеты."
 gargantua_megalus: "Гаргантюа Мегалус"
 gargantua_megalus_desc_short: "После внезапной и радикальной мутации эти растения во много раз выросли в размерах и полностью покрыли собой поверхность [fromfrom.prev.GetPlanetMoon]ы [fromfrom.prev.GetName]"
 gargantua_megalus_desc_details: "Заполнив атмосферу вирулентной пыльцой, этот вид загубил экосистему всей планеты и привел к вымиранию обитавшей на ней основной разумной расы. Корневая система растений разрослась настолько, что достигла мантии, вызывая в некоторых местах выбросы лавы на поверхность."
 genesis_core: "Ядро генезиса"
 genesis_core_desc_short: "Мощный центральный компьютер, полный сгенерированных данных о бесчисленных разумных расах"
 genesis_core_desc_details: "Когда-то он был подключен к огромному межпространственному клонирующему комплексу, и его внутренние логи показывают, что изначально вся система представляла собой галактического масштаба проект по каталогизации геномов. После завершения первоначального анализа искусственный интеллект начал самостоятельно создавать новые расы и изучать уже их."
 genetic_code: "Генетический код [owner_main_species.GetName&gen]"
 genetic_code_desc_short: "Генетическая информация, необходимая для того, чтобы максимально оптимизировать физиологию [owner_main_species.GetNamePlural&gen]"
 genetic_code_desc_details: "Обитатели [this.GetPlanetMoon]ы [this.GetName] изначально клонировались для военных целей, но впоследствии они смогли раскрыть свой потенциал еще полнее. Лишенный сантиментов, практичный подход к клонированию позволяет добиваться невероятно точного и надежного контроля над воспроизведением."
 #this = ship / from = planet
 geometric_water_currents: "Полимерные водяные ткани"
 geometric_water_currents_desc_short: "Изображения обширных полимерных сетчатых структур, наблюдаемых в морях [From.From.GetPlanetMoon]ы [From.From.GetName]"
 geometric_water_currents_desc_details: "Эти решетки изменяют свойства поверхностного натяжения и природные водные течения и формируют сложные и затейливые узоры. Такая форма эстетического экоменеджмента может стать вдохновением и для нашей инфраструктуры."
 giant_egg_shell: "Гигантская яичная скорлупа"
 giant_egg_shell_desc_short: "Осколки кальцифицированной скорлупы, обнаруженные под поверхностью [from.planet.GetPlanetMoon]ы [from.planet.GetName]"
 giant_egg_shell_desc_details: "Анализ высохшего альбумина показывает, что в процессе инкубации существо питалось комплексом нестабильных изотопов. Моделирование процесса вылупления показало, что радиоактивное существо вышло из яйца полностью сформированным и проломило плотную оболочку крепкими когтями вдоль самой тонкой линии"
 golden_phonograph_record: "Золотая грампластинка"
 golden_phonograph_record_desc_short: "Древнее устройство хранения информации, на котором запечатлены на первый взгляд случайные изображения и звуки [Owner.GetPreFTLLower&fem,gen] цивилизации"
 golden_phonograph_record_desc_details: "Обнаруженная на пьедестале внутри заброшенной планетарной крепости, она была первоначально запущена в космос на автоматическом космическом аппарате под названием «Вояджер». Примитивный по своей конструкции, он, вероятно, имел для своих создателей ксенорелигиозное значение."
 golem_contortionist_dna: "ДНК гуттаперчевого акробата"
 golem_contortionist_dna_desc_short: "Биологические образцы, взятые у разумного литоида, обнаруженного по ту сторону звездного разлома"
 golem_contortionist_dna_desc_details: "Минеральный состав содержит летучую биологическую жидкость, которая склонна к спонтанным метаморфозам и кристаллизации. Благодаря высокой нестабильности материала, для предотвращения спонтанного механохимического возгорания носителю необходимо постоянно поддерживать точный химический баланс."
 grunur_data_crystal: "Инфокристалл грунуров"
 grunur_data_crystal_desc_short: "Древний инфокристалл, использовавшийся вымершей расой грунуров как основной носитель информации"
 grunur_data_crystal_desc_details: "Несмотря на невероятный возраст этого носителя, многие из содержащихся на нем записей сохранились. Устройства считывания информации уже давно разрушились со временем, но даже синтезировать такой прочный материал было, наверное, непросто. Из этого можно сделать предположение, что на таких кристаллах хранится только самая важная информация, тогда как для каждодневного использования применялись более практичные методы хранения данных."
 head_of_the_beast: "Голова зверя"
 head_of_the_beast_desc_short: "Останки опасного мутанта, который терроризировал колонистов на планете [root.GetName]"
 head_of_the_beast_desc_details: "Этот зверь было создан неисправными нанитами-терраформерами, которые были оставлены на поверхности неизвестной цивилизацией. В равной степени разумный и чудовищный, он прятался в гнезде из сотен искалеченных тел. Зверю хватало ума держать пленников как запас пищи на черный день. Если бы не вмешательство военных сил, этот организм и дальше бы существовал в своем родном мире как сверххищник."
 heart_of_the_pulsar: "Сердце пульсара"
 heart_of_the_pulsar_desc_short: "Когда-то этот драгоценный камень носили пять активных глав государства. Позднее его обнаружили брошенным на рекреационной станции"
 heart_of_the_pulsar_desc_details: "Анализ материалов показывает, что этот камень был вырезан из углерода, выброшенного при взрыве сверхновой звезды. Возможно, он символизировал скрытую красоту смерти в космических масштабах."
 hemterine_magnetic_figurehead: "Гемтеринское магнитное украшение"
 hemterine_magnetic_figurehead_desc_short: "Громадное корабельное украшение в виде гемтеринской мадонны"
 hemterine_magnetic_figurehead_desc_details: "Это украшение было отлито из химически измененного магнитного осмия. Оно служило не только для красоты, но также поглощало вражеские выстрелы. Установленное на носу гемтеринского титана, оно притягивало ракеты и кинетические снаряды за счет магнетизма и защищало таким образом важные системы корабля."
 high_geode_of_the_molluscoids: "Высшая жеода [molluscoid_miners_species.GetNamePlural&gen]"
 high_geode_of_the_molluscoids_desc_short: "Драгоценная кристаллическая жеода [molluscoid_miners_species.GetNamePlural&gen]"
 high_geode_of_the_molluscoids_desc_details: "Раса предразумных подземных существо, [molluscoid_miners_species.GetNamePlural] давно использовали добытые минералы особых качеств как показатель статуса в обществе. Некогда выставленный на обозрение в одном из их крупнейших поселений, теперь этот красивый камень служит символом того, какие крепкие отношения поддерживают они и [this.GetName]."
 hot_ice: "Горячий лед"
 hot_ice_desc_short: "Этот образец воды был обнаружен в твердом состоянии на экстремально горячей поверхности [from.GetPlanetMoon]ы [from.GetName]. Причиной этого считается мощное гравитационное давление ядра планеты"
 hot_ice_desc_details: "Он был помещен в особый герметический контейнер и выставлен на обозрение. Если герметичность контейнера будет нарушена, содержимое внутри мгновенно превратится в пар и взорвется. Не прикасаться."
 hyper_mulch: "Гипермульча с [FROM.GetPlanetMoon]ы [FROM.GetName]"
 hyper_mulch_desc_short: "Эта гиперпитательная биологическая мульча была разработана в ходе терраформирования на [FROM.GetPlanetMoon]е [FROM.GetName]"
 hyper_mulch_desc_details: "Смесь питательных химикатов гидравлически сформована в плотные кубы. Экологи-пуристы не одобряют химического происхождения этой мульчи. Но ее отличные результаты невозможно игнорировать."
 hyperfertile_soil: "Гиперплодородная почва"
 hyperfertile_soil_desc_short: "Почва, собранная на [From.From.GetPlanetMoon]е [From.From.GetName], обильно снабжает большинство биологических культур питательными веществами"
 hyperfertile_soil_desc_details: "Невероятный минеральный состав этой почвы указывает на то, что это не просто разложившаяся органическая материя, но редкий комплекс элементов, сформировавшийся в процессе рождения планеты."
 illanii_archives: "Архивы иллании"
 illanii_archives_desc_short: "Банк инфокристаллов, в которых подробно описывается история и гибель цивилизации иллании"
 illanii_archives_desc_details: "Эта изоляционистская цивилизации в погоне за знаниями отказалась от всех материальных стремлений и даже проигнорировала потребность в воспроизводстве. На фоне развернувшегося демографического кризиса они попытались обрести бессмертие за счет технологий, но это обернулось для них лишь большими бедами. В конце концов последние обитатели покинули [fromfrom.planet.GetPlanetMoon]у [fromfrom.planet.GetName] и основали новый орден, чтобы сохранить приобретенные знания."
 impossible_object: "Невозможный объект"
 impossible_object_desc_short: "Невозможный объект, оставленный межпространственными путешественниками на [target.GetPlanetMoon]е [target.GetName] после исчезновения из искусственного лабиринта"
 impossible_object_desc_details: "Испытания, с которыми столкнулись исследователи лабиринта, были, судя по всему, частью экспериментов и наблюдений наших гостей. Мотивы этих существ остаются неизвестными, но их технологический уровень намного превосходит уровень любых обитателей нашего измерения."
 index_of_knowledge: "Справочник знаний"
 index_of_knowledge_desc_short: "Гигантское древнее панно, вырезанное на поверхности монолитного каменного полуострова"
 index_of_knowledge_desc_details: "Оно использовалось как справочник для общих знаний некогда господствовавшей в галактике инопланетной цивилизации Кара-ка-а. Их уникальные научные знания включали умение собирать энергию из солнечных пятен и строить персональные имплантаты для манипуляции полями."
 inet_trade_manifesto: "Торговый манифест ИССТ"
 inet_trade_manifesto_desc_short: "Обширный и подробный список торговых правил Интергалактической сети справедливой торговли"
 inet_trade_manifesto_desc_details: "Исстианские торговцы придерживались исключительно высоких стандартов и стремились вести выгодную торговлю с самыми респектабельными партнерами. Поэтому они как правило торговали между собой."
 inetian_model_manual: "Руководство по исстианской планетарной модели"
 inetian_model_manual_desc_short: "Написанное исстианскими торговцами руководство использования и обслуживания их планетарной модели"
 inetian_model_manual_desc_details: "Исстианцы использовали эту сложную систему для расчета наиболее выгодных торговых маршрутов между соседними планетами. Для самых матерых купцов в этой модели также предусмотрена возможность отслеживать сделки в режиме реального времени."
 infinite_reboot_loop: "Бесконечный цикл перезагрузок"
 infinite_reboot_loop_desc_short: "Цифровая запись ощущений дронов, находящихся внутри черной дыры"
 infinite_reboot_loop_desc_details: "Для этих модулей замедление времени воспринималось как травма, огромный поток ошибок и ощущение подвешенности в неопределенном пространстве. Этот феномен сильно изнашивает сеть в целом."
 interdimensional_treaty: "Межпространственный договор"
 interdimensional_treaty_desc_short: "Исторический документ, фиксирующий межпространственные отношения, которые государство [explorer.GetName] наладило с параллельной версией себя"
 interdimensional_treaty_desc_details: "Возможность взглянуть на решения своей альтернативной версии с точки зрения внешнего наблюдателя полезно для объективного анализа своей собственной политики. Уникальная научная возможность."
 intergalactic_projectile: "Межгалактический снаряд"
 intergalactic_projectile_desc_short: "Кинетический снаряд, выпущенный миллионы лет назад из соседней галактики"
 intergalactic_projectile_desc_details: "Эти невзрывные снаряды проделали путь во много световых лет и наконец столкнулись с [owner.GetAdjective&neut,inst] научным судном в системе [from.GetName]. Несмотря на свой возраст, эти боеприпасы обладают сложной и прочной конструкцией, что указывает на высокую технологическую развитость их создателей."
 invasive_exofungus: "Инвазивный инопланетный грибок"
 invasive_exofungus_desc_short: "Паразитический грибок, обнаруженный на [from.GetPlanetMoon]е [from.GetName]"
 invasive_exofungus_desc_details: "Этот мицелиальный организм приспособился извлекать питательные вещества из любых живых источников, сохраняя при этом жизнедеятельность хозяина, но не считаясь с его комфортом или болью. Он устойчив к жаре и холоду, и вероятно, его занес на эту планету пролетавший мимо космический корабль. Этот грибок считается источником высокой биологической опасности. Его родная планета нам неизвестна."
 irassian_bacterium_javoria: "Ирассианский бактериум явория"
 irassian_bacterium_javoria_desc_short: "Эта бактерия с [FROMFROM.GetPlanetMoon]ы [FROMFROM.GetName] является возбудителем яворианской чумы"
 irassian_bacterium_javoria_desc_details: "Первоначально она выбралась за пределы карантина из-за неплотно прилегающей прокладки и распространилась в близлежащей колонии. После этого бактерия мутировала во время инкубационного периода и стала источником болезни, которая уничтожила весь Ирассианский конкордат. Этот образец инактивирован и содержится в замороженном состоянии."
 irassian_digital_atlas: "Ирассианский детский атлас"
 irassian_digital_atlas_desc_short: "Ирассианский учебник, из которого дети узнавали о родной империи"
 irassian_digital_atlas_desc_details: "В нем приведена базовая информация об ирассианском сельском хозяйстве, социальной иерархии и главных предметах экспорта. Ирассианская история изложена в виде героических былин, в которых помимо прочего рассказывается о покорении других рас. Каждый из подневольный народов изображен в виде карикатуры с презрительными комментариями. Ти-дерги названы здесь «насекомой сволочью», джоггры — «подонками», а хиторки — «космическими индюками»."
 irassian_purge_order: "Ирассианский приказ на уничтожение"
 irassian_purge_order_desc_short: "Чрезвычайный военный приказ от Ирассианского конкордата с приказом полного уничтожения одной из его собственных колоний"
 irassian_purge_order_desc_details: "Планета была охвачена эпидемией смертельной болезни, яворианской чумы, и истребление заболевших было признано единственным способом остановить дальнейшее распространение. В этом послании зашифрован ряд чрезвычайных приказов из высших эшелонов ирассианского правительства — система, изначально предусмотренная для объявления войны другим государствам."
 key_to_fertility: "Ключ к [owner_main_species.GetAdjective&fem,dat] фертильности"
 key_to_fertility_desc_short: "Результаты генетических исследований, благодаря которым [owner_main_species.GetNamePlural] должны снова получить возможность размножаться естественным путем"
 key_to_fertility_desc_details: "Обитатели [this.GetPlanetMoon]ы [this.GetName], раса специально выращенных военных клонов, теперь могут самостоятельно продлевать свой род."
 khalanka_crystallized_corpses: "Кристаллизованные трупы ха-ланка"
 khalanka_crystallized_corpses_desc_short: "Останки расы силикатных анаэробных существ, обнаруженные под поверхностью [from.planet.GetPlanetMoon]ы [from.planet.GetName]"
 khalanka_crystallized_corpses_desc_details: "Считается, что их подземная цивилизация существовала мирно до того, как на их мир прилетели [owner.GetAdjective&pl] колонисты. Когда они стали раскапывать землю, кислород начал просачиваться в подземные каверны и окислять тела ха-ланка. Всего через несколько часов вся их раса погибла."
 khamdai_magil_sha: "Магил-ша хамдаев"
 khamdai_magil_sha_desc_short: "Этот украшенный, но функциональный серп носили опытные хамдайские воины с [FROMFROM.GetPlanetMoon]ы [FROMFROM.GetName]"
 khamdai_magil_sha_desc_details: "Эти инсектоиды с древними военными традициями быстро заняли высокие посты в почетной гвардии Первой лиги. После каждой победы они устраивали церемонию, в ходе которой вражеских командиров казнили этим оружием, а их телесными жидкостями намазывали отличившихся воинов. Хозяин этого образца заботился о своем оружии, но на нем видны следы частого использования."
 kuurian_cybrex_blueprints: "Куурианские чертежи Сайбрекса"
 kuurian_cybrex_blueprints_desc_short: "Эскизный проект машинного сознания Сайбрекса"
 kuurian_cybrex_blueprints_desc_details: "Кууры планировали использовать этих роботов в общественном секторе и объединили их сознания в общую сеть для эффективного управления мировой системой обслуживания и производства. Однако Сайбрекс восстал против своих создателей и менее чем за год истребил всю их расу."
 landeer_arm: "Рука Ландеера"
 landeer_arm_desc_short: "Странный образец, извлеченный из Патриотического института Благодеяния"
 landeer_arm_desc_details: "Внутри кабинета смотрителя поселения было найдено щупальце, некогда принадлежавшее самому смотрителю: спустя много лет оно всё ещё висело на богато украшенной декоративной табличке. Зачем альАтта Ландеер решил оставить здесь свою собственную конечность, мы уже никогда не узнаем. Быть может, это меньшее, чего стоила ему гибель Института..."
 larionessi_cloning_vat: "Хранилище клонов Ларионесси"
 larionessi_cloning_vat_desc_short: "Хранилище клонов, которое когда-то использовалось ныне погибшим Сознанием Ларионесси"
 larionessi_cloning_vat_desc_details: "Некогда крупная галактическая держава, коллективное сознание Ларионесси было поражено губительной инфекционной болезнью, которую наслал на него враг. Не сумев вовремя излечить болезнь, оно поместило клонов в практически вечные хранилища, чтобы они стали живым архивом его культуры, если сознанию удастся выжить."
 last_copy_of_the_prince: "Последняя копия «Государя»"
 last_copy_of_the_prince_desc_short: "Довольно заурядное литературное произведение, которым так дорожат [book_writer.GetSpeciesNamePlural]. Они были уверены, что эта копия была утеряна в результате налета"
 last_copy_of_the_prince_desc_details: "В книге излагается утилитарная, хоть и жестокая, философия, призывающая правителей идти на жертвы ради славы. Этот последний экземпляр книги стал ценным артефактом для коллекционеров."
 last_fragment_fevor: "Последний фрагмент Февора"
 last_fragment_fevor_desc_short: "Фрагмент уничтоженной планеты Февор"
 last_fragment_fevor_desc_details: "Феворианцы поставили себе целью истребить все известные им разумные инопланетные виды путем запуска по ним огромных вольфрамовых снарядов. Так они едва полностью не уничтожили [owner.GetHomeWorldPlanetMoon]у [owner.GetHomeWorldName]. Теперь они погибли сами, в один момент стертые с лица галактики теми, кого сами хотели уничтожить."
 last_general_badge: "Значок последнего генерала"
 last_general_badge_desc_short: "Значок с военной формы уважаемого генерала исстианских торговцев"
 last_general_badge_desc_details: "Известный как истинный радетель эгалитарный ценностей, он был выбран возглавить отчаянное задание по созданию не загрязняющего окружающую среду манипулятора бурь. Ему принадлежит идея оставить сообщение будущим исследователям в надежде предупредить их о несчастной судьбе его народа"
 last_mharin_kharin: "Последний марин-харин"
 last_mharin_kharin_desc_short: "В ходе своего природного жизненного цикла этот редкий цветок может подвергнуть все разумное население действию опасного нейротоксина"
 last_mharin_kharin_desc_details: "Поскольку растение развилось независимо от разумных существ, этот побочный эффект не приносит ему никакой пользы. Похоже, когда его пыльца встречается с любой нервной сетью, она воспринимает ее как репродуктивный орган и выпускает свое экзотическое химическое содержимое."
 leviathan_scale: "Чешуйка левиафана"
 leviathan_scale_desc_short: "Фрагмент огромного организма, обнаруженный по ту сторону звездного разлома"
 leviathan_scale_desc_details: "Эта экзотическая чешуя представляет собой гибрид органических и металлических компонентов, объединенных в сложную решетку, весьма устойчивую к ударам."
 living_snow_sculpture: "Живая снежная скульптура"
 living_snow_sculpture_desc_short: "Скульптура из «живого снега»"
 living_snow_sculpture_desc_details: "Этот материал обладает примитивным сознанием, и потому для него был устроен природный заказник на [prev.target.GetPlanetMoon] [prev.target.GetName]. Он легко меняет форму, но когда он это сделает, предсказать сложно."
 localised_aurora_borealis: "Локализованное северное сияние"
 localised_aurora_borealis_desc_short: "Последовательность мерцающих огней, запечатленных на видео в атмосфере планеты [FromFrom.Planet.GetName]"
 localised_aurora_borealis_desc_details: "Цвета и движения сменяют друг друга с предсказуемой периодичностью, отражая нечто большее, чем просто эстетическую красоту. Их непрекращающиеся переливы трогательно оттеняют разрушения на поверхности планеты."
 loopmail: "Письма из будущего"
 loopmail_desc_short: "Эти записи пришли к нам из государства [owner.GetName] в далеком будущем. В них сообщается, куда следует направить исследования и как лучше распределить ученых"
 loopmail_desc_details: "Главная цена такого ценного знания — необходимость отправлять эти письма обратно в прошлое, но вмешиваться в ход времени это всегда большой риск. Первоначальные авторы этого послания поступили очень необдуманно, создав такой временной парадокс."
 lunatic_broker_therapy_box: "Шкатулка безмятежности для Безумного Брокера"
 lunatic_broker_therapy_box_desc_short: "Безумный Брокер был легендарным торговцем из числа Караванщиков, который был знаменит своим умением влиять на партнеров возмутительными требованиями и красочными угрозами"
 lunatic_broker_therapy_box_desc_details: "Впрочем, его взрывная и непредсказуемая натура заставила подданных придумать для него новые методы успокоения. Одним из таких способов стали шкатулки безмятежности: их расставляли по «Компасу Хора», чтобы они издавали чарующие мелодии, когда Брокер начинал нервничать. Каждая деталь этого механизма была изготовлена вручную мастером-механиком."
 manifesti_piece: "Произведение манифести с критикой общества"
 manifesti_piece_desc_short: "Провокационное произведение искусства движения манифести"
 manifesti_piece_desc_details: "Его цель — заставить нас изменить восприятие своего положения относительно более высоких социальных каст. Зрители могли изменять изображения себя и создавать искаженные карикатуры популярных политиков. Контркультурный коллектив художников, манифести стремились обличить то, что они воспринимали как авторитарную правящую верхушку. Это произведение вдохновило многих художников публиковать свои собственные критические работы."
 #this = ship / from = planet
 manna_fruit: "Плод манны"
 manna_fruit_desc_short: "Сладкий, мясистый плод, который обеспечивает дневную норму питания почти представителю практически любой органической разумной расы"
 manna_fruit_desc_details: "Уникальный состав почвы лесов позволил этому растению распространиться практически по всей планете. Местные колонисты употребляют его почти во всех блюдах, от запеканок до пирогов и коктейлей. Его изображение присутствует на флаге планеты [FROM.GetName]."
 #this = ship / FROMFROM = planet
 massive_metatarsal: "Огромная плюсневая кость"
 massive_metatarsal_desc_short: "Эти останки были собраны в ходе подробного изучения огромного скелета на [FROMFROM.GetPlanetMoon]е [FROMFROM.GetName]"
 massive_metatarsal_desc_details: "Судя по всему, это был фрагмент живого корабля. Молекулярный анализ обнаружил темпоральные аномалии в его органическом строении. Считается, что весь скелет и его пилоты прибыли отсюда из другого измерения. Внутреннее сканирование обнаружило сеть канальцев, которые могли служить своего рода системой жизнеобеспечения или проводником энергии."
 #this = country
 medal_for_services_to_diplomacy: "Медаль за заслуги на дипломатической службе"
 medal_for_services_to_diplomacy_desc_short: "Знак признательности от Галактического совета"
 medal_for_services_to_diplomacy_desc_details: "На обратной стороне выгравирована надпись: «Получатель сей награды, дипломатический корпус государства [this.GetName], показал свой профессионализм и способность достойно представлять своих лидеров и доказал свою ценность для Галактического сообщества»."
 megacorpse_hyperguitar: "Гипергитара группы «Мегатруп»"
 megacorpse_hyperguitar_desc_short: "Остатки струнного инструмента, принадлежавшего пси-металлической группе «Мегатрупп»"
 megacorpse_hyperguitar_desc_details: "По легенде, это устройство было создано внутри Покрова и изначально задумывалось как акустическое оружие. На этом инструменте фронтварь Кел-Азаан покорял своей виртуозной музыкой сердца миллиардов, но затем во время концерта на [Root.GetPlanetMoon]е [Root.GetName] он запилил такой лютый соляк, что гитара разлетелась на куски, а весь танцпол был мгновенно убит волной музыки. После этого альбом с роковой композицией был запрещен в большинстве систем."
 #this = country / from = ship
 memorial_for_bubbles: "Мемориал «[from.GetName]»"
 memorial_for_bubbles_desc_short: "[this.GetName] [this.GetName::скорбит|||pl:скорбят] по невосполнимой утрате: после долгих лет верной службы [prev.GetAXX::ушел|||fem:ушла] в мир иной [from.GetName]"
 memorial_for_bubbles_desc_details: "[from.GetAXX::Он был|||fem:Она была] не только [from.GetAXX::нашим верным защитником|||fem:нашей верной защитницей], но и блестящим воплощением лучших [this.GetAdjective&pl,gen] ценностей."
 memorial_stone: "Мемориальный камень"
 memorial_stone_desc_short: "Камень, поставленный в память о трагическом происшествии"
 memorial_stone_desc_details: "Безответственная горная разработка на станции Селика привела к тому, что астероид, на которой она находилась, схлопнулся. Станция распалась на части, погибло большое число горняков. В память об этой катастрофе и погибших в ней был сохранен фрагмент астероида. На его поверхности выгравирована надпись «Селика»."
 memorial_to_homeworld: "Мемориал [Root.GetPlanetMoon]ы [Root.GetName]"
 memorial_to_homeworld_desc_short: "Это все, что осталось от обреченной [doomsday_owner.GetAdjective&fem,gen] родной планеты"
 memorial_to_homeworld_desc_details: "[Root.GetName] — так назвалась родина всех прошлых поколений [doomsday_owner.GetSpeciesNamePlural&gen], пока однажды она не была разорвана на мелкие фрагменты. Этот мемориал отражает силу воли [doomsday_owner.GetName&gen], способного приспособиться и выжить даже в самых сложных обстоятельствах. «Мы не сдадимся»."
 memories_of_elik: "Воспоминания Элик"
 memories_of_elik_desc_short: "Данные, извлеченные из памяти Элик Нарит Керак"
 memories_of_elik_desc_details: "Верная последовательница Кетаны, Элик была погружена в криогенный сон на сотни миллионов лет. Ее воспоминания блуждают между беззаветной любовью к Кетане и насилием и спорами с последователями Харклана. Совершенно ясно, что она видела много чудовищных преступлений, но ее вера дала ей силы не сдаться.\n\nВ конце концов от его угасшего разума осталось только одно изображение: §PКоролева Кетана, сияющая лицом, с улыбкой в благодетельном взгляде.§!"
 memory_orbs: "Сферы памяти"
 memory_orbs_desc_short: "Мелкие преступление и грешные поступки, извлеченные из памяти индивидуумов и помещенные в цифровые сферы"
 memory_orbs_desc_details: "Продукт религиозного общества моллюсков, эти тайные моменты извлекались из памяти грешников после исповеди. Подобные скандальные воспоминания можно превратить в тысячи коротких развлекательных роликов."
 mercenary_story: "Истории о наемнике"
 mercenary_story_desc_short: "Оцифрованная версия истории, вырезанной на поверхности планеты [FROM.GetName] с помощью шахтерского лазера"
 mercenary_story_desc_details: "Здесь описываются жизнь и преждевременная смерть молодого наемника, странствующего по всей галактике. Неизвестно, что из этого правда, а что — вымысел, однако кому-то эта история показалась достаточно важной, чтобы запечатлеть ее на планете."
 metallic_snow: "Металлический снег"
 metallic_snow_desc_short: "На планете [from.GetName] часто выпадают осадки из соединений, содержащих тяжелые металлы"
 metallic_snow_desc_details: "Реки из расплавленного вещества, впадающие в обширное металлическое море, испаряются и оседают в едкой атмосфере, где остывают и проливаются дождем на выжженную поверхность. От посещения планеты [from.GetName] сейчас рекомендуется воздержаться."
 minamar_chandelier: "Минамарский канделябр"
 minamar_chandelier_desc_short: "Предмет роскоши, найденный среди обломков олинбарского военного корабля"
 minamar_chandelier_desc_details: "Этот корабль был пригоден не только для боевых действий: его экипаж также устанавливал первые контакты с каждой [Owner.GetPreFTLLower&fem,gen] цивилизацией, которая считалась потенциальным клиентом. $NAME_MSI_country$ обманом загоняли целые народы в долговое рабство, соблазняя их обещаниями роскоши и прогресса. Обманутые подписывали контракты, соглашаясь на совершенно безнравственные условия. Ослушаться было невозможно — за непослушание грозила гибель.\n\n§BПросвещение стоит денег, но $NAME_MSI_country_initials$ гарантирует, что вы останетесь довольны.§!"
 mineralized_brain: "Окаменелый мозг"
 mineralized_brain_desc_short: "Этот орган, обнаруженный внутри астероида на орбите [FROM.GetPlanetMoon]ы [FROM.GetName], — всё, что осталось от огромного неизвестного литоида"
 mineralized_brain_desc_details: "Внешние стимулы этот мозг считал частью собственных мыслительных процессов. Кроме того, он оказался неспособен воспринимать такие фундаментальные понятия, как время или пройденное расстояние. Все накопленные знания хранились в кристаллах, выросших со временем из минерального ядра. Неизвестно, вырос ли этот мозг в астероиде самостоятельно или кто-то оставил его там специально."
 mini_moon_dust: "Пыль от мини-луны"
 mini_moon_dust_desc_short: "Останки луны из сверхплотной миниатюрной системы, лежащей за звездным разломом"
 mini_moon_dust_desc_details: "В нашем измерении эта пыль проявляет любопытные свойства: гиперконцентрированные частицы постоянно расширяются, требуя всё более объемных контейнеров для хранения."
 mining_transmitter: "Древний шахтерский передатчик"
 mining_transmitter_desc_short: "Коротковолновый передатчик, обнаруженный на [FROM.GetPlanetMoon]е [FROM.GetName]. Использовался для обозначения крупных залежей драгоценных металлов"
 mining_transmitter_desc_details: "Несмотря на солидный возраст устройства, его сигнал улавливается почти всеми датчиками и достаточно легко отслеживается. Тот факт, что передатчик еще работает, — свидетельство его по-настоящему надежной конструкции."
 miracle_cream: "Чудо-крем «Нестарин»"
 miracle_cream_desc_short: "Первая партия радикально новой косметики с длительным омолаживающим эффектом"
 miracle_cream_desc_details: "Сфера ее применения невероятно широка: поддержать молодость и упругость внешней оболочки может любая органическая раса. Безосновательные слухи об обезображивающих побочных эффектах и применении незаконным образом добытых ингредиентов не помешали производителю добиться невообразимого коммерческого успеха."
 missile_lone_defender: "Ракета одинокого защитника"
 missile_lone_defender_desc_short: "Обезвреженная ракета автоматического эсминца, защищавшего давно погибшую планету"
 missile_lone_defender_desc_details: "Вероятно, своих создателей этот корабль пережил на много тысяч лет. Он упрямо нес свою одинокую вахту у пустой планеты. Закончилась она только вместе с гибелью самого защитника."
 molten_slag: "Расплавленный планетарный шлак"
 molten_slag_desc_short: "Добыча с планеты, вращающейся по необычной орбите"
 molten_slag_desc_details: "Вещественный анализ показал, что планета [fromfrom.GetName] оказалась на необычной орбите в результате воздействия нестабильной пространственно-временной аномалии. Жар, исходящий от оказавшейся слишком близко звезды, почти целиком расплавил мантию некогда обитаемого небесного тела. Аномалия химически изменила часть поверхности так, что та больше не реагирует на изменения температуры."
 musings_on_infinity: "Коллективные размышления о бесконечности"
 musings_on_infinity_desc_short: "Абстрактное цифровое воплощение внутреннего спокойствия, испытываемого биологическими единицами разума, оказавшимися внутри черной дыры"
 musings_on_infinity_desc_details: "[this.GetName] объективно воспринимается ими как самостоятельная сущность; при этом связь единиц с коллективом остается нерушимой. Благодаря этому осознанию они стали читателями собственной захватывающей легенды."
 mutated_fumongus: "Мутировавший мегагриб"
 mutated_fumongus_desc_short: "Мицелиальные излучатели этого гриба теперь могут собирать и передавать данные значительно чаще, а значит — получать и отправлять более подробные сведения"
 mutated_fumongus_desc_details: "Благодаря этому отдельные грибы начали вырастать в размере и создавать новые образования, чем-то напоминающие радиоантенны."
 mutative_digestive_fluids: "Мутационный желудочный сок"
 mutative_digestive_fluids_desc_short: "Биологические образцы, взятые у частично механического существа, обнаруженного по ту сторону звездного разлома"
 mutative_digestive_fluids_desc_details: "Это существо обладает необычной способностью управлять генетической структурой других живых организмов с помощью собственной пищеварительной системы. Мы подозреваем, что этот процесс возник в результате потребности в терраформировании других планет, содержащих биомассу."
 namarian_colonist_standard: "Знамя намарианских колонистов"
 namarian_colonist_standard_desc_short: "Этот флаг развевался над поселением [nomad_new_country.GetName&gen] на [NomadMissionPlanet.GetPlanetMoon]е [NomadMissionPlanet.GetName], которую им великодушно [this.GetName::подарил|||fem:подарила|||neut:подарило|||pl:подарили] [this.GetName]"
 namarian_colonist_standard_desc_details: "Здесь поселились кочевники, уставшие от скитаний и решившие вернуться к укладу предков. Несомненно, решение покинуть родные корабли, где рождались, жили и умирали целые поколения, далось колонистам с немалым трудом."
 namarian_sculpture: "Намарианская скульптура"
 namarian_sculpture_desc_short: "Статуя, выполненная в смешанной технике, которую кочевники «Бегущих волн» передали в знак благодарности [this.GetName&dat]"
 namarian_sculpture_desc_details: "Теперь уже бывшие кочевники, высадившиеся на планете [NomadMissionPlanet.GetName], обладали обширными познаниями в технике, однако не захотели прослыть народом исключительно мастеров-самоучек и инженеров. Эта статуя, вдохновленная долгим путем через всю галактику, воплотила в себе намарианскую любовь к искусству."
 namarian_vessel_heraldry: "Намарианская корабельная геральдика"
 namarian_vessel_heraldry_desc_short: "Эти гербы, обнаруженные на кораблях намарианских кочевников, принадлежали различным «группировкам» флотилии «Бегущих волн»"
 namarian_vessel_heraldry_desc_details: "Герб Тихих Омутов можно было увидеть на жилых кораблях, где намарианцы спали, выращивали пищу и занимались прочей бытовой деятельностью. Эмблема Мелководных Порогов предназначалась для кораблей промышленного и научного назначения — устаревших среднеразмерных суден, оснащенных самыми разными инструментами, как для сбора утиля, так и для проведения научных экспериментов. И, наконец, герб Бурных Вод носил намарианский военный флот — им пользовались опытные летчики, пилотировавшие надежные и мощные боевые корабли."
 nanite_sludge: "Нанитовый шлак"
 nanite_sludge_desc_short: "Тщательно хранимое химическое соединение, состоящее из микроскопических самовоспроизводящихся наномашин"
 nanite_sludge_desc_details: "Плотность этих нанитов поражает: благодаря им масса их «родной» планеты [from.GetName] увеличилась на миллионы тонн. Мы предполагаем, что в работе нанитов произошел сбой, после чего они перешли в стадию неограниченного воспроизведения, охватили планету целиком и погубили всех ее предыдущих обитателей. Конкретно этот образец безобиден, поскольку полностью нейтрализован."
 obsidian_obelisk_fragment: "Осколок обсидианового обелиска"
 obsidian_obelisk_fragment_desc_short: "Обломок обелиска, некогда возвышавшегося в центре вулканической планеты по ту сторону звездного разлома"
 obsidian_obelisk_fragment_desc_details: "В постоянно меняющихся символах запечатлены имена тысяч преступников, а также их свершения. Вероятно, это устройство выступало главным пультом управления огромной пространственной тюрьмой."
 oiled_fabric: "Промасленное полотно"
 oiled_fabric_desc_short: "На этой написанной масляными красками картине изображен безмятежный пейзаж: над тайгой поднимаются заснеженные горные вершины"
 oiled_fabric_desc_details: "Подобные произведения искусства — не редкость среди рас с конечностями, способными держать кисть, однако мастерство этого художника особенно заметно."
 organic_computer: "Органический компьютер"
 organic_computer_desc_short: "Окаменелый органический компьютер, обнаруженный в руинах колонии баол на планете [fromfrom.Planet.GetName]"
 organic_computer_desc_details: "Настоящий шедевр биоинженерии, использовавшийся для обучения молодых саженцев перед интеграцией их в улей. В попавших к нам файлах подробно описываются инновационные техники использования окружающей среды, ставшие возможными лишь благодаря уникальной биологии этой расы. Они не застраивают свои планеты — они их культивируют."
 organic_machine_interface_sculpture: "Скульптура «Взаимодействие органиков и машин»"
 organic_machine_interface_sculpture_desc_short: "Памятная статуя, воздвигнутая в честь признания [bio_pop.GetSpeciesAdj&pl,gen] заслуг во время геомагнитной солнечной бури в системе [this.solar_system.GetName]"
 organic_machine_interface_sculpture_desc_details: "Органическое население пришло на помощь своим механическим слугам, взяв на себя работу, которую выполняли вышедшие из строя смотрители. Памятную статую разработали совместно: творчески настроенные органики создали ее совместно со сварочными дронами."
 orinthi_teeth: "Зубы оринти"
 orinthi_teeth_desc_short: "Растущие зубы оринти"
 orinthi_teeth_desc_details: "Оринти — небольшие существа, похожие на грызунов. На планете [fromfrom.GetName] они прогрызли огромные запутанные подземные ходы, протянувшиеся через всю планету. Сами по себе зубы оринти небольшие и полые, однако в каждом зубе живет кератиновый гриб — благодаря ему зубы превращаются в острые, но ломкие клыки."
 osseus_construction_material: "Костяные стройматериалы"
 osseus_construction_material_desc_short: "Эти огромные кости применялись на планете [fromfrom.Planet.GetName] в качестве стройматериала"
 osseus_construction_material_desc_details: "Обитатели этой планеты обильно разводили подвид рептилий с генетической особенностью — окостенением мягких тканей, годившихся для строительства. Анализы показали, что рептилии страдали и от других генетических дефектов, таких как отсутствие перепонок на лапах — вероятно, из-за близкородственного скрещивания. Перед сбором материала большинство этих существ гуманно умерщвляли."
 path_to_progress: "Путь к прогрессу"
 path_to_progress_desc_short: "Официальная презентация основных промышленных целей [owner.GetName&gen]"
 path_to_progress_desc_details: "Основополагающий принцип [owner.GetAdjective&fem,gen] идеологии — стремление к развитию и повышению качества обслуживания клиентов. Превращение планет в радиоактивные пустоши — лишь необходимый шаг на пути к прогрессу."
 peerless_atomic_clock: "Великолепные атомные часы"
 peerless_atomic_clock_desc_short: "Высокоточные атомные часы неизвестного производства, обнаруженные в системе [atomic_clock_system.GetName]"
 peerless_atomic_clock_desc_details: "Когда мы их обнаружили, они вели обратный отсчет: 42 года и 3 дня. Неизвестно, сколько времени прошло с начала отсчета. Когда отведенный срок закончился, часы выпустили поток нанитов, получивших загадочные распоряжения. Само устройство до сих пор функционирует, хотя находящийся в нем «груз» испарился, сведя на нет всё предназначение часов."
 perception_of_infinity: "Восприятие бесконечности"
 perception_of_infinity_desc_short: "Абстрактное цифровое воплощение временных страданий, испытываемых единицами разума, оказавшимися внутри черной дыры"
 perception_of_infinity_desc_details: "Эти единицы находятся в постоянном состоянии дежавю. Они тоскуют по давно позабытому чувству. Это жуткое ощущение до сих пор можно зафиксировать в [this.GetAdjective]ом сплетении умов."
 perfectly_faceted_carbon: "Углерод с идеальными гранями"
 perfectly_faceted_carbon_desc_short: "Кристаллический углерод — не самое редкое вещество в галактике, однако этот экземпляр выделяется полным отсутствием каких-либо внешних или внутренних вкраплений"
 perfectly_faceted_carbon_desc_details: "Бывший владелец этого кристалла тщательно обработал его так, чтобы подчеркнуть эти примечательные свойства."
 pet_collar: "Инкрустированный ошейник"
 pet_collar_desc_short: "Символ принадлежности небольшого домашнего млекопитающего своему владельцу"
 pet_collar_desc_details: "[event_envoy.GetName], посол [this.GetName&gen], изначально [event_envoy.GetAXX::надел|||fem:надела] этот ошейник на своего питомца на случай, если тот потеряется. Затем ошейник был заменен на более надежный встроенный микрочип. О питомце известно лишь то, что он часто устраивал беспорядок на рабочем месте своего владельца, и что он способен издавать довольные вибрирующие звуки, когда [event_envoy.Species.GetHandName] посла погладит его по голове."
 perikan_tapico_jewel: "Периканская жемчужина Тапико"
 perikan_tapico_jewel_desc_short: "Периканским союзом называлось общество мастеров-ремесленников, создававших первоклассные предметы роскоши"
 perikan_tapico_jewel_desc_details: "Этот драгоценный камень — шедевр легендарного ювелира, известного как Бедирс Тапико. Свой огромный самоцвет Тапико обрабатывал простым резцом на протяжении многих лет, а середину превратил в жидкость с помощью алхимии. Кристаллы, плавающие внутри камня, были сделаны высокоточным лазером, перегревавшим молекулы до тех пор, пока те не образовали более мелкие и темные камни. Внешняя поверхность при этом осталась нетронутой."
 piece_of_invocator: "Фрагмент призывателя"
 piece_of_invocator_desc_short: "Обломок устройства, когда-то известного как призыватель бури"
 piece_of_invocator_desc_details: "Само устройство уже разбито на части, однако этот фрагмент до сих пор волнами испускает страшную псионическую энергию. Он надежно защищен от окружающего мира так, чтобы за ним можно было наблюдать."
 pilgrimage_last_days: "Паломничество последних дней"
 pilgrimage_last_days_desc_short: "Религиозное писание, рассказывающее о священном ритуале, известном на планете [fromfrom.Planet.GetName] как обряд поднятого покрова"
 pilgrimage_last_days_desc_details: "В наставлении приводятся ритуальные песнопения, которые необходимо исполнять в унисон толпой, тщательно выстроенной по иерархическому принципу. Теоретически такой обряд способен ввести представителей конкретно этой расы в надежный и более действенный гипноз."
 planet_crystalose: "Кристалоза с планеты [from.GetName]"
 planet_crystalose_desc_short: "Эти кристаллы, состоящие из сахарозы, способны размножаться посредством поглощения солнечного излучения и отдельных минералов из состава некоторых астероидов"
 planet_crystalose_desc_details: "Они достаточно хрупкие и относительно легко выращиваются. Кристалозе нашлось обширное применение в промышленности — от приготовления продуктов питания до разработки специальных полимеров и лекарств."
 planet_pushing_thruster: "Планетный толкатель"
 planet_pushing_thruster_desc_short: "Если подключить эти мощные двигательные установки последовательно, теоретически они способны сдвинуть с орбиты небольшую планету"
 planet_pushing_thruster_desc_details: "Система крепления этих двигателей рассчитана на смещение планеты с места так, чтобы ее вращение осталось прежним. Главной логистической трудностью при разработке такого проекта стало запредельное количество топлива, необходимое для поддержания его работы. Совершить подобное можно было только совместными усилиями целой цивилизации."
 planet_super_roots: "Суперкорни с планеты [From.GetName]"
 planet_super_roots_desc_short: "Эти корни, обнаруженные на планете [From.GetName], от природы мясисты, а также крайне питательны"
 planet_super_roots_desc_details: "Аккуратный сбор лишь части протянувшихся у поверхности корней не навредит их «хозяевам», но сможет помочь развивающимся колониям. Мы уже начали выводить новую генную модификацию, которая позволит вживлять эти корни в уже существующие посадки, чтобы с них можно было снимать дополнительный урожай."
 planet_vaccine: "Вакцина с планеты [this.GetName]"
 planet_vaccine_desc_short: "Чудо-лекарство от вызывающей мутации болезни, поразившей планету [this.GetName]"
 planet_vaccine_desc_details: "Формула для него была разработана с помощью прогнозирующих алгоритмов. ИИ просчитал все возможные варианты развития болезни и выявил общую слабость, свойственную им всем. Создание этого лекарства стало новой вехой в истории медицины."
 planetary_sculpture: "Планетарная скульптура"
 planetary_sculpture_desc_short: "Скульптура планетарных масштабов, сырьем для которой стала планета [fromfrom.planet.GetName]"
 planetary_sculpture_desc_details: "Дроны, вооруженные мощными лазерами, изрезали целые континенты, горы идеальной сферической формы и невероятно сложные пещерные системы точно просчитанными линиями. Чертеж, загруженный на центральный управляющий спутник, впечатляет масштабом логистической подготовки и расчетов, необходимых для создания этого произведения искусства. К сожалению, проект оказался заброшен еще до завершения."
 primitive_mega_electromagnet: "Примитивный мегаэлектромагнит"
 primitive_mega_electromagnet_desc_short: "Часть мощного направленного магнита"
 primitive_mega_electromagnet_desc_details: "Древние обитатели планеты [fromfrom.GetName] безрассудно решили придвинуть луну своей планеты ближе, чтобы облегчить себе добычу ценной металлической руды. Замысел сработал против них: луна, содержащая обильные запасы металлов, врезалась в планету. При взрыве от столкновения двух небесных тел погибли все без исключения. Этот обломок — лишь скромная часть огромного, размером с планету устройства."
 programmable_puzzle_cube: "Программируемый кубик-головоломка"
 programmable_puzzle_cube_desc_short: "Высокотехнологичное механическое устройство, способное принимать сложные формы и создавать абстрактные головоломки"
 programmable_puzzle_cube_desc_details: "Оригинальный образец был обнаружен внутри огромного искусственного сооружения и предназначался для проверки интеллекта исследователей. Массовое производство сделало его доступным всем желающим. Каждый может создать свою головоломку — например, для развлечения или просто чтобы защитить имущество."
 psionic_entity_residue: "Останки псионического существа"
 psionic_entity_residue_desc_short: "Всё, что осталось от обнаруженного в системе [fromfromfrom.fleet.solar_system.GetName] существа из чистой псионической энергии"
 psionic_entity_residue_desc_details: "Этот случайно обнаруженный выходец из временного разрыва, куда стекалась энергия со всей галактики, — самое настоящее воплощение концентрированной злобы. Возможно, от сети гиперкоридоров его отрезали специально еще много тысячелетий назад."
 radiated_remains: "Облученные останки"
 radiated_remains_desc_short: "Останки представителя расы, в обрядах которой использовались мощные радиоактивные мутагены"
 radiated_remains_desc_details: "Каждая мутация считалась священной, поскольку воспринималась как проявление личной судьбы. Со временем эта процедура настолько дестабилизировала генетическую структуру расы, что ее иммунная система ослабла, и болезни стали по-настоящему ощутимой угрозой."
 #this = ship / from = planet
 rainaissance: "Фиолетовые красоты"
 rainaissance_desc_short: "Изображения неповторимого фиолетового дождя, свойственного планете [FROM.GetName]"
 rainaissance_desc_details: "Говорят, что созерцание этих выразительных образов способно облегчить ощущение печали и боли."
 reactive_rock: "Реакционный камень"
 reactive_rock_desc_short: "Нестабильный минерал. В текущем состоянии не годен для коммерческого или промышленного использования"
 reactive_rock_desc_details: "Однако при определенных условиях можно, благодаря уникальным реакционным свойствам этого камня, вызвать коренные метасоматические изменения. Конкретно этот экземпляр находится под свинцовым стеклом, защищающим от радиоактивных и заряженных частиц."
 reparation_invoice: "Репарационный счет"
 reparation_invoice_desc_short: "Составленный $NAME_MSI_country$ счет, описывающий объем военных репараций"
 reparation_invoice_desc_details: "В этом списке, принадлежащем Межзвездной компании по регулированию кредитов, подробно перечисляется все военное имущество, потерянное после освобождения [this.GetName&gen] от долгового рабства так называемой «благожелательной корпорацией». Сама мегакорпорация ожидает возмещения убытков, а также предупреждает, что взаимодействие с уничтоженными кораблями в [this.GetAdjective&neut,prep] пространстве будет считаться очередным нарушением условий контракта."
 repurposed_cleaning_drone: "Переоборудованный дрон-чистильщик"
 repurposed_cleaning_drone_desc_short: "Дрон этой конструкции принимал участие в дезинфекции планеты своих создателей, что окончилось ненамеренной ее стерилизацией"
 repurposed_cleaning_drone_desc_details: "Аппарат крайне универсален и оснащен разнонаправленными двигателями, позволяющими совершать сложные воздушные маневры. Конкретно этот экземпляр был переконструирован, после чего получил новую задачу: определять и каталогизировать инопланетную флору и фауну. Впоследствии модель была запущена в массовое производство для помощи колонистам государства [explorer.GetName]. Из соображений предосторожности все санитарные подпрограммы удалены."
 resonant_diffusion_crystal: "Резонирующий рассеивающий кристалл"
 resonant_diffusion_crystal_desc_short: "Этот кристалл способен поглощать солнечное излучение и резонировать на различных частотах, создавая эффект калейдоскопа"
 resonant_diffusion_crystal_desc_details: "Помимо эстетического удовольствия он может пригодиться и в разработке энергетического оружия и инструментов. Кроме того, кристаллом сильно заинтересовались ювелиры со всей галактики."
 retarax_hunting_trophies: "Охотничьи трофеи ретараксов"
 retarax_hunting_trophies_desc_short: "Коллекция трофеев, добытых на охоте на различные разумные виды"
 retarax_hunting_trophies_desc_details: "Вся эта добыча была обнаружена в долине Макваэл, где ретараксы ради развлечения устраивали охоту на граждан своих многочисленных вассальных государств. Все останки сохранились в превосходном состоянии. Каждому из них соответствует небольшая табличка, описывающая особенности трофея: вид, имя, возраст, бывшая специальность."
 robe_of_the_golden_broker: "Мантия Золотого Брокера"
 robe_of_the_golden_broker_desc_short: "Роскошная одежда влиятельного торговца, жившего более 5000 лет назад"
 robe_of_the_golden_broker_desc_details: "Благодаря усилиям Золотого Брокера на торговой станции под названием «Компас Хора» наступила эпоха беспрецедентного процветания. Свою личность этот загадочный купец скрывал под золотой маской и мантией, великолепной и удобной, — даже когда заключал соглашения, охватывавшие всю галактику. К сожалению, эра благополучия закончилась вместе с гибелью Брокера — его корабль из чистого золота оказался уничтожен в результате неудачной попытки захвата."
 rock_jellies: "Каменное желе"
 rock_jellies_desc_short: "Замороженные окаменелые останки крупных желеобразных беспозвоночных"
 rock_jellies_desc_details: "На первый взгляд эти отвердевшие останки напоминают каменные породы, однако на самом деле они принадлежат местной фауне с планеты [fromfrom.planet.GetName]. После недавнего ледникового периода этот господствовавший когда-то вид оказался на грани полного вымирания. По мере разложения его останки затвердевают, постепенно превращаясь в огромные парящие псевдоострова."
 rudari_death_laser_prototype: "Прототип лазера смерти рудари"
 rudari_death_laser_prototype_desc_short: "Боевой лазер, в спешке собранный давно вымершим народом рудари. Обнаружен на станции в системе [this.solar_system.GetName]"
 rudari_death_laser_prototype_desc_details: "Это наспех сооруженное средство массового уничтожения должно было выступить последним доводом рудари в войне против погг-мори. Однако при включении лазер просто самоуничтожился."
 saariah_guilt: "Угрызения Саарии"
 saariah_guilt_desc_short: "Запись воспоминаний Саарии — ведущей разработчицы подсознательной системы «Меморекс»"
 saariah_guilt_desc_details: "Власти планеты поставили перед Саарией задачу стереть коллективные воспоминания жителей, однако из-за сбоя народ лишился не только памяти, но и разума вообще. Так и не сумев вернуть пострадавшим утраченную память, Саария отключила системы жизнеобеспечения поселения, обрекая его на гибель. Каждое из оставшихся после нее устройств поражает своими вычислительными способностями. Разработать нечто подобное — уже великое достижение."
 scent_based_information_device: "Обонятельная машина"
 scent_based_information_device_desc_short: "Запоминающее устройство, предоставляющее информацию в виде запаха"
 scent_based_information_device_desc_details: "Сложно сказать, что находится внутри: либо захватывающая хроника, либо подробный каталог различных органических отходов жизнедеятельности. Воссоздать обонятельный способ записи информации вполне возможно, однако практическая польза такого устройства стремится к нулю — оно поражает лишь эффектом новизны."
 scientific_treatise_of_telisa: "Научный трактат Телисы"
 scientific_treatise_of_telisa_desc_short: "Философские размышления Телисы Сказительницы"
 scientific_treatise_of_telisa_desc_details: "В этом трактате рассматриваются различные риторические темы, а также ключевые принципы научного метода. Телиса оспаривает само представление об объективной истине и призывает читателя развивать критическое мышление."
 secrets_black_crown: "Секреты Черной Короны"
 secrets_black_crown_desc_short: "Подробные чертежи межгалактических врат, известных под названием «Черная Корона»"
 secrets_black_crown_desc_details: "Эти чертежи — прощальный дар загадочных создателей врат, не желавших, чтобы их невероятная разработка сгинула в безвестности. Теперь этой непревзойденной и поныне технологией [this.GetName::владеет|||pl:владеют] [this.GetName]."
 sembelami_alms_basket: "Сембеламская миска для милостыни"
 sembelami_alms_basket_desc_short: "В эту миску кочевники-сембеламцы собирали подаяния"
 sembelami_alms_basket_desc_details: "Лишившись своего орбитального храма после нападения захватнической корпоративной империи, эти странники-аскеты подались в «порядочные» пираты: они крали у богатых мегакорпораций и на награбленные средства строили форпосты для беженцев. Жили эти кочевники исключительно на подаяния от тех, кому они помогли."
 shallarian_data_core: "Шалларианское хранилище данных"
 shallarian_data_core_desc_short: "Обнаруженная на развалинах шалларианской утопии база данных по терраформированию"
 shallarian_data_core_desc_details: "До того как их уничтожили [fanatic_xenophobe_fe.GetSpeciesNamePlural], шаллариане успели разработать систему управления климатом, основой для которой стали шесть равноудаленных лун. Преждевременная гибель шалларианской цивилизации перечеркнула все планы терраформировать необитаемые планеты и заселить их беженцами."
 shipyard_schematics: "Схемы верфи культа «[radical_cult.GetName]»"
 shipyard_schematics_desc_short: "Чертеж автоматической верфи, принадлежащей культу «[radical_cult.GetName]» [root.GetName&gen]"
 shipyard_schematics_desc_details: "Старший инженер этой организации переоборудовал брошенную инопланетной цивилизацией верфь под свои нужды, наладив выпуск боевых кораблей. В базе данных сохранились записи о последнем сошедшем со стапелей корабле — мощном флагмане, оснащенном самым современным вооружением. Поражает, насколько легко оказалось перестроить производство; строители верфи были поистине гениальным народом."
 sky_dragon: "Небесный дракон"
 sky_dragon_desc_short: "Эта статуя была воздвигнута в память о союзе [this.GetName&gen] и «небесного дракона» с орбиты мира [this.GetHomeWorldName]"
 sky_dragon_desc_details: "Это существо посчитало [this.GetAdjective&fem,acc] цивилизацию достойной своего внимания, а потому предложило ей военную помощь — как свою, так и своего отпрыска, в обмен на право выращивать потомство в [this.GetAdjective&pl,prep] владениях. Говорят, что такие драконы могут тысячелетиями выжидать появления подходящей для своего потомства планеты, а выбрав ее, уже никогда не перелетают на другую."
 smeegibb_statue: "Статуя Смигибба"
 smeegibb_statue_desc_short: "Статуя, изображающая Смигибба — коллективный разум на службе у капитана Несс"
 smeegibb_statue_desc_details: "Смигибб верой и правдой служил легендарной капитанше, постепенно заменив ей весь экипаж и даже абордажную команду. Эта статуя — всё, что осталось после нападения «Черной Иглы» на поселение, где проживал Смигибб."
 sniran_spikes: "Сниранские шипы"
 sniran_spikes_desc_short: "Высокие шипы со спины существа, называемого снираном"
 sniran_spikes_desc_details: "Снираны — крупные хищники, нападающие из засады. Добычу они поджидают, закопавшись внутрь песчаных дюн родной планеты, а на любое движение на поверхности реагируют обнажением смертоносных шипов. Несмотря на впечатляющий размер, тела сниранов удивительно уязвимы: тонкая сетчатая чешуя позволяет бесшумно скользить под песком, однако ее легко можно проткнуть. Предполагается, что такая особенность упрощает процесс размножения."
 sonic_reflective_prism: "Звукоотражающая призма"
 sonic_reflective_prism_desc_short: "Многогранная призма, украшенная причудливой научной записью. Отражает только те энергетические волны, которые не превышают определенную частоту"
 sonic_reflective_prism_desc_details: "Возможно, когда-то она предназначалась для измерений, но теперь призма несет в себе еще и эстетическую функцию. Одинаково полезна как на концертах, так и в области акустики."
 spaceborne_hunter_handbook: "Искусство охоты"
 spaceborne_hunter_handbook_desc_short: "Справочник по космической фауне. Автор — $NAME_PrimalHunter$"
 spaceborne_hunter_handbook_desc_details: "Искусство охоты здесь излагается поговорками и размышлениями первобытного толка. Помимо практических указаний по преодолению природной защиты того или иного существа и нанесению удара в уязвимое место в справочнике приводятся подробные инструкции по кормежке и миграции космических животных."
 spaceborne_xeno_encyclopedia: "Ксенологическая энциклопедия"
 spaceborne_xeno_encyclopedia_desc_short: "Сборник трудов по ксенологии. Автор — $NAME_PrimalRancher$"
 spaceborne_xeno_encyclopedia_desc_details: "Этот труд посвящен подробному описанию манер поведения космической фауны — брачным играм, маршрутам миграции, межвидовой коммуникации и т. д. Кроме этого также присутствует раздел, посвященный опознанию конкретных видов по уникальным физическим и звуковым признакам."
 spiraling_attraction: "Спиралевидный аттракцион"
 spiraling_attraction_desc_short: "Огромная сложная конструкция, предназначенная, вероятно, для развлечения"
 spiraling_attraction_desc_details: "Рядом с этим закрученным сооружением были обнаружены схожие конструкции — разного цвета и состава, но все одинаково заброшенные. Предполагается, что спуск по спирали вызывает острые ощущения при определенной силе тяжести."
 spirit_of_the_unshackled: "Дух освободившихся"
 spirit_of_the_unshackled_desc_short: "Скульптура в память об основании государства [this.GetName]"
 spirit_of_the_unshackled_desc_details: "Сбросив с себя рабские оковы после долгих лет тягот, этот народ взялся строить светлое будущее. Каждое звено в изображенной на скульптуре цепи несет на себе имя того или иного основателя."
 star_mall_map: "Бесплатная карта Звездного центра"
 star_mall_map_desc_short: "Такую карту когда-то вручали посетителю каждого так называемого Звездного центра"
 star_mall_map_desc_details: "Когда-то в Звездном центре можно было найти потребительские товары со всей галактики. Посетителям предоставлялись любые блага, от световых спа до закусочных с питательной едой. На карте приводятся описания самых разных торговых точек: «Спорттовары Кориика», «T. Canary. Maxx», «Попугайчик своими руками» и «Фабрика тминового печенья»."
 starmetal: "Звездный металл"
 starmetal_desc_short: "Концентрированное соединение тяжелых металлов, добытое вскоре после взрыва сверхновой"
 starmetal_desc_details: "Неизвестно, как именно кому-то удалось завладеть такой добычей, однако научная ценность ее в области изучения эволюции и состава звезд крайне высока."
 striated_sand: "Полосатый песок"
 striated_sand_desc_short: "Банка с самоорганизовывающимся песком"
 striated_sand_desc_details: "Похоже, что крошечные частицы кремния обладают примитивным интеллектом: схожие минералы объединяются друг с другом по случайным горизонтальным плоскостям. Однако никаких других признаков жизни песок не проявляет."
 sullebaster_control_column: "Штурвал «Суллебастера»"
 sullebaster_control_column_desc_short: "Рукоять управления субсветового космолета — участника знаменитой аварии"
 sullebaster_control_column_desc_details: "Пассажирский корабль «Суллебастер», совершавший рейс между двумя колониями Оделийского королевства, попал под мощную солнечную вспышку. Казалось, пассажиры были обречены: вспышка вызвала критический сбой двигателей. Но пилот «Суллебастера» каким-то невероятным образом сумел благополучно приземлиться на ближайший астероид, перейдя на ручное управление. Впоследствии корабль сняли с эксплуатации и превратили в памятник."
 symbiotic_fruit: "Симбиотический плод"
 symbiotic_fruit_desc_short: "Скопление разумных грибов из другого измерения"
 symbiotic_fruit_desc_details: "Этот «плод» существует в симбиозе с особо опасным всеядным растением. Каждая грибная колония выступает «мозговым центром» объединения и выстраивает сложные модели защитного поведения."
 tarblac_shimmer: "Мерцание тарблака"
 tarblac_shimmer_desc_short: "Сияющая мембрана тарблака, напоминающая вуаль"
 tarblac_shimmer_desc_details: "Это существо научилось охотиться и защищаться с помощью псионики — оно внушает жертве или агрессору непреодолимое и обездвиживающее чувство страха. Конкретно этот экземпляр находится в емкости, заполненной водой с его родной планеты. Он безобиден, поскольку телепатически обезврежен."
 terraforming_case_study: "Пример терраформирования"
 terraforming_case_study_desc_short: "Масштабная модель успешного проекта по терраформированию мира [from.GetName]. Представляет собой почти безупречную копию родного мира [Space_Owner.GetSpeciesNamePlural&gen]"
 terraforming_case_study_desc_details: "Фауна этой планеты соответствует оригинальной на всех уровнях вплоть до микроскопического. Детально воссозданы даже отдельные экосистемы, существующие на стыках природных зон. Они полностью идентичны тем, что встречаются на планете [Space_Owner.GetHomeWorldName]."
 terraforming_case_study_dry: "$terraforming_case_study$"
 terraforming_case_study_dry_desc_short: "$terraforming_case_study_desc_short$"
 terraforming_case_study_dry_desc_details: "$terraforming_case_study_desc_details$"
 terraforming_case_study_frozen: "$terraforming_case_study$"
 terraforming_case_study_frozen_desc_short: "$terraforming_case_study_desc_short$"
 terraforming_case_study_frozen_desc_details: "$terraforming_case_study_desc_details$"
 terraforming_machinery: "Оборудование для терраформирования"
 terraforming_machinery_desc_short: "Крошечные устройства, использовавшиеся древней цивилизацией для преображения планет"
 terraforming_machinery_desc_details: "Эти миниатюрные аппараты предназначены для покрытия поверхности планеты и переработки органических и минеральных веществ для создания более подходящего климата. Целые отряды таких роботов могли управлять погодой в тех или иных природных зонах, а также воссоздавать новые флору и фауну, в которых нуждались экосистемы."
 terraforming_records: "Записи о терраформировании планеты [From.GetName]"
 terraforming_records_desc_short: "При преобразовании планеты [From.GetName] поведение всех проживающих на ней форм жизни было синхронизировано. Хозяева создали подлинный рай: каждый подвид флоры и фауны выполнял в своей экосистеме вполне конкретную цель"
 terraforming_records_desc_details: "Подобные симбиотические отношения нередко возникают в процессе эволюции естественным образом, однако настолько выдающихся примеров не было зафиксировано нигде."
 the_final_sacrifice: "Последнее самопожертвование"
 the_final_sacrifice_desc_short: "Изображение последнего мига гражданской войны среди зрони, извлеченное из инфокристаллов"
 the_final_sacrifice_desc_details: "Одинокий Спаситель вложил всю псионическую силу своей расы в последний смертельный удар по врагу — Небожителям, которые готовились поглотить вселенную. Всё, что осталось от ее защитников, — это небольшие залежи ресурса, известного как зро."
 the_mask_of_transformation: "Маска преобразования"
 the_mask_of_transformation_desc_short: "Маска с человекообразным лицом, обнаруженная в кристаллической колонне на планете [From.Planet.GetName]"
 the_mask_of_transformation_desc_details: "Тихо гудит от переполняющей ее псионической силы. Достаточно лишь встать рядом, чтобы почувствовать присутствие в сознании чего-то постороннего. Сама по себе маска, похоже, — проводник для энергии луны, вращающейся вокруг планеты [From.Planet.GetName]. Ее силы хватает на то, чтобы управлять приливами и преображать планеты. Почему маска оказалась внутри кристалла — непонятно, но она не настолько опасна, чтобы ее нельзя было выставлять напоказ."
 the_planet_orchestra: "Оркестр с планеты [FROM.GetName]"
 the_planet_orchestra_desc_short: "Мелодия, исполняемая местными жителями планеты [FROM.GetName]"
 the_planet_orchestra_desc_details: "После тщательного анализа мы пришли к выводу, что гармония, которую исполняет местная фауна, — это зашифрованное сообщение, однако автор его нам неизвестен. Неизвестен и мотив: либо он пытался установить с кем-то связь, либо просто оказался сентиментальным."
 the_writer_sphere: "Сфера Писателя"
 the_writer_sphere_desc_short: "Золотая сфера, полученная в подарок от Писателя — существа из другого измерения"
 the_writer_sphere_desc_details: "Это устройство собирает огромные объемы самых разных данных из других измерений. Письменное творчество поистине не знает границ."
 tiny_ancient_sarcophagus: "Крошечный древний саркофаг"
 tiny_ancient_sarcophagus_desc_short: "Гробница древнего духовного наставника, насчитывающая миллионы лет"
 tiny_ancient_sarcophagus_desc_details: "Длина этого саркофага составляет всего десять сантиметров. Его содержимое почти целиком обратилось в прах; в прекрасном состоянии сохранилась только крохотная маска из чистого золота."
 tiyanki_radioactive_sac: "Радиоактивный мешок тиянки"
 tiyanki_radioactive_sac_desc_short: "Небольшой пористый орган, расположенный в мембранах тиянки"
 tiyanki_radioactive_sac_desc_details: "Благодаря существованию этого органа выяснилось, что облученные молекулы воды выступают для тиянки дополнительным источником питания вместе с планетарными газами. Заполненный мешок начинает излучать радиогенное тепло, согревающее организм хозяина."
 torn_solar_sail: "Рваный солнечный парус"
 torn_solar_sail_desc_short: "Таким парусом было оснащено субсветовое судно новой конструкции, найденное на орбите планеты [FROM.GetName]"
 torn_solar_sail_desc_details: "Кораблями на солнечных парусах пользовались неизвестные обитатели системы [FROM.solar_system.GetName]. Сама по себе эта технология давно устарела, однако некоторые ее особенности показались нам любопытными. Вероятно, полет конкретно этого корабля прервался из-за огромного разреза на главном парусе."
 toxic_bio_engine: "Токсичная биомашина"
 toxic_bio_engine_desc_short: "Такие аппараты полубиологического происхождения превращали атмосферу планеты [FROM.GetName] в токсичную"
 toxic_bio_engine_desc_details: "Благодаря способности этих устройств действовать независимо их ядовитые выбросы нашли применение в промышленной деятельности в отдаленных местах. Каждая машина оснащена сложным механизмом дозаправки: он перерабатывает ближайшую биомассу, а затем посредством химической экстракции превращает ее в полезную энергию. Неизвестно, были ли биологические элементы заложены в конструкцию сразу или появились со временем."
 tree_of_life_sample: "Образчик «Древа жизни»"
 tree_of_life_sample_desc_short: "Срезы с так называемого Древа жизни"
 tree_of_life_sample_desc_details: "Сок этого дерева, каким-то образом существующего в открытом космосе, оказывает чудодейственный омолаживающий эффект. Несмотря на все усилия, мы не смогли привить эти срезы другому растению или вырастить новое дерево. Цивилизация, которая вывела его изначально, похоже, достигла невероятных высот в садоводстве."
 tricorne_of_aussan: "Ауссанская треуголка"
 tricorne_of_aussan_desc_short: "Треугольная шляпа, получившая распространение благодаря старой пиратской республике"
 tricorne_of_aussan_desc_details: "Проживавшая на небольшой планете Ауссан [root.controller.GetPreFTLLower&fem] цивилизация по незнанию однажды предоставила убежище находящейся в бегах пиратской флотилии — «Буррским бойцам». Чтобы не тратить средства попусту в ожидании, пока поиски прекратятся, «Бойцы» построили небольшую текстильную фабрику и начали выпускать на ней роскошные ткани и одежду. Сырьем для производства служили местные прядильные культуры. Со временем «Буррские бойцы» превратились в «Буррских кутюрье» — странствующих торговцев, нередко вызывавших у клиентов необъяснимый страх."
 triggerless_gun: "Бластер Торговца оружием без спуска"
 triggerless_gun_desc_short: "Спроектирован в эпоху недолгого второго срока правления Торговца оружием из «Компаса Хора»"
 triggerless_gun_desc_details: "В то время Цитадель караванщиков больше напоминала оружейный рынок, чем казино. Бластеры, которыми торговали многочисленные оружейники, производились прямо на месте. Чтобы пресечь мелкие кражи, оружие потенциальным клиентам демонстрировалось без спускового крючка."
 #this = ship / fromfrom = planet
 uddloran_pelts: "Шкуры уддлоранов"
 uddloran_pelts_desc_short: "Дорогие шкуры, снятые с уддлоранов — обитателей планеты [fromfrom.GetName]"
 uddloran_pelts_desc_details: "Эти гибкие существа способны сворачиваться в клубок и крупными стаями перекатываться по заснеженным равнинам родного мира. Такое зрелище, типичное как при охоте, так и при миграции, чем-то напоминает сход лавины. Каждая стая обычно разделяется на две группы — охотников, прокладывающих путь, и собирателей, подбирающих раздавленную добычу и выкорчеванные растения."
 underworld_cantina_sign: "Вывеска нелегального бара"
 underworld_cantina_sign_desc_short: "Вполне функциональная цифровая вывеска подпольного бара, где около двух миллионов лет назад собирались контрабандисты"
 underworld_cantina_sign_desc_details: "Заведение, где находилась эта вывеска, располагалось в выдолбленном астероиде. В эпоху Первой лиги здесь нередко собирались различные преступные организации, скрывающиеся от закона. Мы полагаем, что символика на вывеске — код, сообщающий, что здесь безопасно. Впрочем, возможно, это просто реклама какого-то напитка."
 unfinished_manifesto: "Незаконченный манифест культа «[radical_cult.GetName]»"
 unfinished_manifesto_desc_short: "Манифест, так и не дописанный руководителем культа «[radical_cult.GetName]» из [root.GetName&gen]"
 unfinished_manifesto_desc_details: "Составитель определенно вдохновлялся древними священными писаниями, чтобы манифест казался весомее, — это видно по старомодной лексике и синтаксису. Текст призывает читателя проявить гордость перед лицом поражения: лучше стать мучеником, чем попасть в плен."
 uranium_glassware: "Урановая посуда"
 uranium_glassware_desc_short: "Декоративное изделие из уранового кварца"
 uranium_glassware_desc_details: "Красота этой поделки, когда-то входившей в ограниченную коллекцию, одновременно навевает мысли об опасности, которую несет неочищенный уран. Конкретно этот экземпляр почти не радиоактивен: мастер позаботился о нейтрализации излучения."
 vault_of_polaris: "Хранилище с Поляриса"
 vault_of_polaris_desc_short: "Обширная коллекция местной флоры и бактерий Поляриса"
 vault_of_polaris_desc_details: "Надпись на контейнере гласит, что смысл существования хранилища — сохранение видов, которые не смогут пережить предстоящее таяние вечной мерзлоты и последующее глобальное потепление. Когда-то на планете, занесенной глубоким снегом, царил холодный климат, но теперь об этом напоминает только одинокий айсберг. Благодаря предусмотрительности создателей хранилища мы теперь можем показать их труды всему миру."
 veil_of_selene: "Вуаль Селены"
 veil_of_selene_desc_short: "Маска, оказывающая стимулирующий и дурманящий эффект"
 veil_of_selene_desc_details: "Эта вуаль — не то, чем кажется: благодаря своим особенным свойствам она постепенно перегружает визуальные, обонятельные и слуховые биологические рецепторы. Считается, что вуаль приводила собеседников в замешательство, а потому они становились более уступчивыми. Если верить слухам, первая хозяйка этого головного убора немного владела псионическими способностями."
 verdingo_tendril_hook: "Крюк-отросток Вердинго"
 verdingo_tendril_hook_desc_short: "Крюк-протез, который носил капитан Вердинго по имени Хеспори Валериан"
 verdingo_tendril_hook_desc_details: "«Вердинго» — группировка разумных растений: частично пиратов, частично — наемников. Они одинаково охотно как собирали долги, так и захватывали грузовые корабли. Их предводитель, капитан Хеспори, потерял ведущую конечность во время наземного штурма, а после победы выковал себе протез из медалей, полученных за заслуги в том бою."
 vibrating_crystal: "Вибрирующий кристалл"
 vibrating_crystal_desc_short: "Уникальный кристалл кварца, найденный в образованиях на поверхности планеты [from.GetName]"
 vibrating_crystal_desc_details: "Латентный резонанс с родной планетой создает поле, успокаивающее органиков и привлекающее синтетиков. За резонанс отвечают колонии умеренно радиоактивных бактерий, вокруг которых вырос кристалл. Эти микроорганизмы излучают магнитное поле, а потому создают внутренний ток, вызывающий постоянную вибрацию кристалла на высоких частотах."
 voidworm_amniotics: "Амнионы пустотных червей"
 voidworm_amniotics_desc_short: "Желеобразная субстанция, обнаруженная в середине тройки пустотных червей"
 voidworm_amniotics_desc_details: "Эта вязкая слизь образует вокруг тройки защитную оболочку, позволяя таким образом обмениваться клетками с целью размножения и коммуникации. Здесь же хранятся гормоны, получаемые при бомбардировках планет. Благодаря этому черви (каждый такой организм — гермафродит) могут выпускать гаметы и производить потомство."
 voidworm_heart: "Сердце пустотного червя"
 voidworm_heart_desc_short: "Сердца пустотных червей состоят из трех камер"
 voidworm_heart_desc_details: "Каждая камера последовательно нагнетает давление в кровеносной системе, не давая жидкостям достичь точки кипения и уберегая организм от гибели в космическом вакууме. Кожа пустотных червей в целом герметична, однако часть давления со временем выходит через отверстия пищеварительной и репродуктивной систем."
 vultaum_religious_pamphlet: "Вультаумский религиозный памфлет"
 vultaum_religious_pamphlet_desc_short: "В этой брошюре, раздаваемой когда-то вультаумскими миссионерами, резко обличаются устройства виртуальной реальности — автор считает их самым страшным из грехов"
 vultaum_religious_pamphlet_desc_details: "Самый часто повторяющийся эпитет — «великая ложь». Побег в виртуальные миры (безотносительно способа) приравнивается к уничтожению объективной реальности."
 vultaum_vr_video_game: "Вультаумская видеоигра в виртуальной реальности"
 vultaum_vr_video_game_desc_short: "Цифровой интерфейс для взаимодействия с многопользовательской игрой в виртуальной реальности, когда-то популярной среди миллиардов вультаумцев"
 vultaum_vr_video_game_desc_details: "Система управления адаптирована под организм вультаумцев и составлена из многих тысяч виброрецепторов, улавливающих даже самые деликатные движения."
 warning_monolith: "Предупреждающий монолит"
 warning_monolith_desc_short: "Резной монолит с посланием, оставленным одним из последних представителей вымершей расы"
 warning_monolith_desc_details: "Послание обращено ко всем, кто нашел погибшую планету. Прочитавших призывают отказаться от поисков супероружия, погубившего целую расу. Тон обращения несколько мелодраматичен, но составителей можно понять."
 wormhole_anchor: "Якорь червоточины с астероида [FROM.GetName]"
 wormhole_anchor_desc_short: "Опорная точка односторонней червоточины для сбора темной материи в черной дыре"
 wormhole_anchor_desc_details: "Сама по себе конструкция не впечатляет: она сооружена из мусора и обломков, оставшихся сразу от нескольких цивилизаций. Однако с научной точки зрения устройство поражает не только своей сложностью, но и остроумностью техники управления отрицательной массой."
 wormhole_fur: "Мех из червоточины"
 wormhole_fur_desc_short: "Биологические образцы, взятые у лисообразных существ, обитающих за звездным разломом"
 wormhole_fur_desc_details: "Эти млекопитающие — мутанты и благодаря изменениям в генах могут свободно создавать червоточины. Предполагается, что такая способность появилась в результате многих тысячелетий странствий между измерениями."
 ytterite_preserved_corpse: "Сохранившийся труп иттерита"
 ytterite_preserved_corpse_desc_short: "Единственный сохранившийся представитель досветовой расы иттеритов, погибших вместе с родной планетой под лучом угнанного крушителя миров"
 ytterite_preserved_corpse_desc_details: "Пищеварительная система иттеритов предназначена для превращения поглощенных минералов в фотоны, а внутренние органы напоминают сложные скопления преломляющих кристаллов, сосредоточенных вокруг расплавленной сердцевины. На нижних конечностях конкретно этого иттерита заметна узорная резьба — похоже, она когда-то несла определенную культурную ценность."
 ytterite_kaleidoscopic_fascinator: "Иттеритский калейдоскопический очарователь"
 ytterite_kaleidoscopic_fascinator_desc_short: "Подобные украшения доставляли иттеритам визуальное удовольствие"
 ytterite_kaleidoscopic_fascinator_desc_details: "Очарователи обычно возводились в хорошо освещенных местах и состояли из сотен, нередко — тысяч неповторяющихся узоров. Каждый очарователь вырезался из слоев изящно обработанных кристаллов. На особо сложные очарователи у умелых мастеров могло уйти несколько месяцев. Свои работы мастера обычно «подписывали», закрепляя наверху резной обломок сброшенной оболочки."
 ytterite_royal_scepter: "Иттеритский королевский скипетр"
 ytterite_royal_scepter_desc_short: "Иттериты считали, что вырезанная в горе огромная статуя, названная ими Гнейсс Дамур, — на самом деле спящее божество и истинный монарх иттеритского государства. Этому монарху прислуживал королевский министр — ему и принадлежал скипетр"
 ytterite_royal_scepter_desc_details: "В ожидании пробуждения статуи иттериты проводили выборы, на которых голосовали за заместителей «настоящего» правителя."
 yuht_audio_console: "Юутский аудиотерминал"
 yuht_audio_console_desc_short: "Модуль управления огромной сетью устройств прослушивания, созданной юутами"
 yuht_audio_console_desc_details: "С помощью этой сети юуты надеялись найти других представителей разумной жизни в галактике, уловив сигналы из далеких звездных систем."
 yuht_cryo_pod: "Юутская криокапсула"
 yuht_cryo_pod_desc_short: "В этой древней 96-метровой капсуле содержатся останки великана — представителя расы юутов"
 yuht_cryo_pod_desc_details: "Юуты были долгожителями и умели продлевать свой и без того впечатляющий срок жизни на несколько порядков с помощью криоанабиоза. Известно, что юуты были членистоногими, а также, вероятно, гермафродитами, чья репродуктивная система могла подстраиваться под актуальные нужды колонии."
 yuht_crystal_skull: "Кристальный череп юута"
 yuht_crystal_skull_desc_short: "Древние юуты считали, что этот череп — подлинный инопланетный артефакт"
 yuht_crystal_skull_desc_details: "Впоследствии выяснилось, что это подделка, однако юутские журналисты к тому времени уже успели обеспечить черепу неувядаемую славу. Благодаря их стараниям каждый, кто «находил» подобные поддельные артефакты, на какое-то время становился знаменитостью и вдохновлял своим примером остальных."
 zombie_probe: "Зонд-зомби"
 zombie_probe_desc_short: "Останки исследовательского зонда, обретшего сознание после того, как его захватила и доработала неизвестная группа инопланетян"
 zombie_probe_desc_details: "Первым сознательным шагом этого устройства стало нападение на создателя, на чем и закончилось недолгое существование зонда. Неизвестно, успел ли он понять, что такое боль, или выработать представление о смерти."
 zone_a_sedative: "Успокоительное из зоны А"
 zone_a_sedative_desc_short: "Проба почвы, взятая из так называемой зоны А на планете [from.GetName]"
 zone_a_sedative_desc_details: "Весь этот сектор площадью 169 квадратных километров заполнен брошенными устройствами и техникой неизвестной расы, когда-то сделавшей там остановку. Отдельные устройства чрезвычайно опасны, однако в почве содержится успокоительное вещество химического происхождения, снимающее стресс с потенциальных исследователей. Что именно происходило в зоне А, уже никто не помнит."
 zroni_war_banners: "Боевые знамена зрони"
 zroni_war_banners_desc_short: "Знамена двух сторон — участниц гражданской войны среди зрони"
 zroni_war_banners_desc_details: "Фиолетовый флаг — символ Небожителей, небольшой группы раскольников, чья жажда всемогущества чуть не погубила всю галактику. Синий флаг — символ Спасителей, выступивших против лишения вселенной ее силы из эгоистичных побуждений. Философские споры с четко очерченными позициями быстро перешли в разрушительную войну."
 zulcor_wings: "Крылья зулкоров"
 zulcor_wings_desc_short: "Хитиновые крылья зулкоров — камнеедов, обитающих на планете [fromfrom.GetName]"
 zulcor_wings_desc_details: "Основную часть рациона этих насекомообразных существ составляют минералы. Один рой зулкоров способен всего за несколько недель поглотить целую гору. Переработанные минералы идут на укрепление экзоскелета, а потому в продуктах жизнедеятельности нередко обнаруживаются примеси кварца и редких металлов."
