 bio.40.name: "Биологическое своеобразие" #FINAL STAGE - TRADITION TREE CHOICE
 bio.40.desc: "Что бы мы ни выбрали — стремление к безупречной чистоте генов, массовое клонирование или улучшение тел с помощью направленных мутаций, — важно одно: пути назад уже не будет."
 bio.40.desc.evopred: "$bio.20.desc.evopred$"
 bio.40.a: "$bio.20.a$"
 bio.40.b: "$bio.20.b$"
 bio.40.c: "$bio.20.c$"
 #Random Events (Hives)
 bio.110.name: "Разделение труда"
 bio.110.desc: "Биологическое преображение [target.GetGestaltEntityName&gen] требует ответственного подхода. Мы будем отбирать лишь те улучшения, которые пойдут на пользу нашей цивилизации.\n\nПутем выборочных манипуляций с генами мы сможем выращивать специализированные единицы с конкретными физическими особенностями, облегчающими тот или иной труд.\n\nС таким подходом наши [target.GetIndividualNamePlural&nom] — либо производители энергии, либо защитники улья — станут действовать эффективнее."
 bio.110.a: "Энергия всегда пригодится."
 bio.110.b: "Нужно уделить внимание обороне."
 bio.115.name: "Лишнее поколение"
 bio.115.desc: "Перед внедрением нового биологического шаблона для наших единиц следует решить, как именно поступить с теми, кто несовместим с улучшенными генами.\n\nДалеко не всем старым единицам хватит сил перенести изменения. Можно либо заставить их трудиться до окончания жизни, либо переработать их биоматериалы ради пользы улья."
 bio.115.a: "Переработать старые единицы."
 bio.115.b: "Они еще могут принести пользу."
 bio.120.name: "Скорость или выносливость"
 bio.120.desc: "Благодаря прорыву в области генетических исследований мы смогли повысить эффективность нейронных связей, и теперь наши [target.GetIndividualNamePlural&nom] действуют значительно лучше.\n\nОднако долгая работа мозга в усиленном режиме невозможна — продолжительность жизни неизбежно сокращается.\n\nТеперь нужно решить, оставить ли всё как есть или пожертвовать длительностью жизни единиц в пользу высокой эффективности."
 bio.120.a: "Уделить всё внимание продолжительности жизни."
 bio.120.b: "Пусть [target.GetIndividualNamePlural&nom] трудятся усерднее."
 bio.125.name: "Перегрузка синапсов"
 bio.125.desc: "В состав [target.GetGestaltEntityName&gen] вошли новые улучшенные [target.GetIndividualNamePlural&nom]. Биоинженерия позволила ускорить развитие их нервной системы и когнитивных процессов. Главные синаптические узлы [target.GetGestaltEntityName&gen] действуют с феноменальной скоростью.\n\nОднако от этого страдает стабильность и велик риск, что [target.GetIndividualName&nom] погибнут от катастрофической перегрузки синапсов. Впрочем, ее можно избежать, если перераспределить нагрузку так, чтобы [target.GetIndividualNamePlural&nom] отдавали приоритет координации."
 bio.125.a: "Замедлиться и сохранить стабильность."
 bio.125.b: "Прожить яркую, но недолгую жизнь."
 bio.130.name: "Загадочные помехи"
 bio.130.desc: "После внедрения в состав улья новой партии клонов мы зафиксировали неприятные звуковые и колебательные ощущения. Вероятно, некая ошибка в процессе клонирования вызвала задержку развития биологических передатчиков, что привело к возникновению частотных помех.\n\nКогда эти клоны выходят на контакт с большим ульем, все единицы поблизости испытывают приступ ментального шума. Это мешает их деятельности и подрывает производительность улья."
 bio.130.a: "Неприятно, но терпимо."
 bio.130.b: "Умертвить дефектных клонов."
 bio.135.name: "Трудности с движением"
 bio.135.desc: "Эксперименты в области клонирования дали неожиданные результаты: некоторые клоны оказались на неврологическом уровне привязаны к донорам своих генов, а потому непреднамеренно перемещаются синхронно.\n\nЭто явление наблюдается безотносительно расстояния — отдельные единицы в точности повторяют движения своих двойников, где бы те ни находились. Открывающиеся нам возможности весьма любопытны.\n\nМы можем учредить программу по совместному трудоустройству клонов и их доноров в одинаковых условиях, либо извлечь отвечающие за такое поведение нейропередатчики и изучить феномен внимательнее."
 bio.135.a: "Обеспечить донорам и клонам одинаковые рабочие места."
 bio.135.b: "Разорвать их связь хирургическим путем."
 bio.140.name: "Несовместимые клоны"
 bio.140.desc: "Стремясь усилить улей, мы вырастили из донорского материала партию клонов и подвергли их искусственному взрослению. К сожалению, эти во всех отношениях прекрасные экземпляры оказались несовместимы с ульем.\n\nИ хотя такое отклонение нас беспокоит, всё же не следует упускать уникальную возможность облегчить себе взаимодействие с другими существами: новые единицы — независимые личности, способные свободно мыслить, а потому к ним могут прислушаться там, где бессилен единый голос Разума. Но у этого явления есть и обратная сторона: новые клоны, осознавшие свою индивидуальность, вызывают в улье волнения, отчего частично страдают высшие когнитивные функции."
 bio.140.a: "Принудительно интегрировать их."
 bio.140.b: "Воспользоваться новыми возможностями."
 bio.145.name: "Вопрос создания"
 bio.145.desc: "Коллективный разум пребывает в смятении. Мы научились создавать копии самих себя — но не можем на это решиться. Продуктивность (и даже нравственность) подобных действий вызывает у нас сомнение.\n\nДля клонирования требуются значительные ресурсы. Возможно, разумнее будет потратить их на что-либо еще? Ведь размножение естественным путем даже полезнее, поскольку увеличивает генетическое разнообразие.\n\nМы не привыкли к размножению клонированием, а потому колеблемся: подобная перемена будет радикальной."
 bio.145.a: "Клонирование слишком эффективно, чтобы им пренебрегать."
 bio.145.b: "Генетическое разнообразие — это важно."
 bio.150.name: "Выгорание улья"
 bio.150.desc: "Из-за экспериментов с мутациями начала нарушаться слаженность работы улья. Некогда простые задачи теперь требуют огромных усилий, поскольку коллективный разум постоянно получает противоречащие друг другу распоряжения.\n\nУсталость нарастает. Мы рискуем потерять часть самых действенных единиц из-за истощения, однако следует задуматься и над новыми перспективами.\n\nСтоит ли взять паузу, чтобы восстановиться, — или постараться выйти за пределы своих возможностей?"
 bio.150.a: "Мы заслужили отдых."
 bio.150.b: "Отдохнем после смерти."
 bio.151.name: "Отдохнувшие и обновленные"
 bio.151.desc: "Решение сделать перерыв оказалось верным. Противоречащие друг другу импульсы затихли и слились в единый гармоничный поток мыслей необычайной ясности.\n\nЕдиницы Разума, еще не так давно находившиеся на грани истощения, теперь трудятся усердно и без устали. Мы не только избавились от усталости — мы стали еще решительнее в своем намерении преодолеть все ожидающие впереди трудности."
 bio.151.a: "Мы в восторге!"
 bio.155.name: "Узкий или широкий профиль"
 bio.155.desc: "Мутация сулит немало преимуществ: выборочные улучшения помогут улью более эффективно выполнять свое предназначение. Так, отрастив прочные хитиновые конечности, мы сможем продуктивнее добывать минералы.\n\nВпрочем, от этой специализации можно отказаться в пользу оснащения всех единиц Разума новыми генетическими модификациями — тогда они смогут исполнять целый ряд обязанностей."
 bio.155.a: "Широкий профиль полезнее."
 bio.155.b: "Копать так копать."
 bio.160.name: "Дрейф фенотипов"
 bio.160.desc: "Наши эксперименты привели к неожиданным осложнениям: порождаемые единицы Разума начали приобретать новые признаки, такие как шипастые экзоскелеты, увеличенные конечности или необычайно чувствительные рецепторы.\n\nПодобные отклонения нельзя назвать бесполезными, однако они нагружают наш метаболизм, и поддерживать существование новых единиц становится трудно. Назревает вопрос: каков допустимый предел для мутаций?"
 bio.160.a: "Принять изменчивость."
 bio.160.b: "Следует поддерживать целостность."
 bio.165.name: "Тоска по прошлому"
 bio.165.desc: "Улей меняется. Изменение генома заметно укрепило наше здоровье, однако теперь мы более подвержены психологическим расстройствам.\n\nНам нравилось то, что было раньше. Пусть сегодня мы сильнее, а наши когнитивные способности более развиты, но коллективному разуму всё же не хватает прежних мыслительных процессов.\n\nУлей ощущает несоответствие тела новому образу мыслей — и это ощущение его тревожит. Возможно, мы переросли самих себя?"
 bio.165.a: "Жизнь — это череда перемен."
 bio.165.b: "Нельзя допустить, чтобы мы утратили свою сущность."
