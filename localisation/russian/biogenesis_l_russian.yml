 #Disconnected Drones #
 disconnected_drones_name: "$policy_disconnected_drones$"
 policy_disconnected_drones: "Отсоединенные единицы"
 policy_disconnected_drones_desc: "Мы можем решить, позволять ли единицам, отсоединенным от центрального сознания, жить в наших колониях."
 disconnected_drones_sustain: "Сохранение"
 disconnected_drones_sustain_name: "Сохранять отсоединённые единицы"
 disconnected_drones_sustain_desc: "Хоть эти единицы и отрезаны от коллективного сознания, их можно оставить живыми.\n\n§EОткрывает §Yвиды гражданства§! для отсоединённых единиц§!"
 disconnected_drones_purge: "Ликвидация"
 disconnected_drones_purge_name: "Ликвидировать отсоединенные единицы"
 disconnected_drones_purge_desc: "Права, которыми пользуются разумные существа, очевидным образом не распространяются на неразумных. Без руководящей воли центрального сознания эти единицы — не более чем животные. А бесполезные животные — это паразиты.\n\n§EВсе отсоединенные единицы, живущие в наших колониях, будут §Rликвидированы§!.§!"
 disconnected_drones_purged_citizenship: "$TRIGGER_FAIL$Отсоединенные единицы подвергаются геноциду в нашем государстве."
 disconnected_drones_kill_themselves_purge_type: "$TRIGGER_FAIL$Будучи отделенными от коллективного сознания, поселения этой расы вымирают."
 citizenship_protected_drone: "Защищенные единицы"
