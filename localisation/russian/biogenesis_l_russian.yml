 DSC_TARGET_MAGNET: "Переопределение цели"
 DSC_TARGET_MAGNET_DESC: "Антенные решётки искусственно увеличивают эффективную площадь рассеяния этой оборонительной станции, заставляя вражеское оружие нацеливаться на неё вместо находящихся рядом союзных объектов."
