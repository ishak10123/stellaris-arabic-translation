 ### ADDITIONAL RANDOM EVENTS
 ## NON-HIVE
 #PURITY
 bio.200.name: "Принятие наследия"
 bio.200.desc: "Целенаправленный труд по очищению генов постепенно приносит понимание, что наша цивилизация более чем достойна называться великой.\n\nЧем чище мы становимся, тем сильнее наша гордость за недосягаемое для других наследие.\n\nНаши устремления приветствуют все — творцы, ученые, предприниматели… Каждый надеется, что сможет привести нас к триумфу."
 bio.200.a: "По такому случаю мы окажем финансовую поддержку деятелям искусства!"
 bio.200.b: "Научные исследования превыше всего."
 bio.200.c: "Потребление — корень экономики."
 bio.210.name: "Никакого очищения!"
 bio.210.desc: "Собравшиеся в городах протестующие скандируют лозунги, эхом разносящиеся по улицам. Протесты организовала взбунтовавшаяся фракция, отвергающая нашу политику по очищению генов, — ее представители не хотят идти путем чистоты.\n\nЭти смутьяны утверждают, что нам нужны генетическое разнообразие и культурная интеграция.\n\nЕсли и дальше оставлять их деятельность без внимания, вполне вероятно, что наш ровный шаг на пути к чистоте собьется."
 bio.210.a: "Разогнать этих диссидентов!"
 bio.210.b: "Утихомирить их пустыми обещаниями."
 bio.215.name: "Тайны прошлого"
 bio.215.desc: "Археологи обнаружили на нашей родной планете следы существования древней цивилизации.\n\nПод землей они нашли погребенное тысячелетия назад хранилище, а в нем — неопровержимые доказательства проводившихся тут когда-то генетических экспериментов.\n\nЕсли публике станет известно об этом открытии, уровень доверия ко всем заявлениям о чистоте наших генов резко упадет."
 bio.215.a: "Воспользоваться знаниями из прошлого и объединить эти наработки с нашими."
 bio.215.b: "Уничтожить улики. Нельзя, чтобы об этом узнали."
 bio.220.name: "Наука со странностями"
 bio.220.desc: "Нам стало известно, что генетик-одиночка по имени [event_target:rogue_geneticist.GetName] [event_target:rogue_geneticist.GetAXX::проводил|||fem:проводила] несанкционированные биологические эксперименты, пренебрегая техникой безопасности. [event_target:rogue_geneticist.GetAXX::Его|||fem:Ее] целью было создание расы сверхсуществ, олицетворявших те самые идеалы чистоты, к которым мы сейчас так стремимся… однако вместо этого у [event_target:rogue_geneticist.GetAXX::него|||fem:нее] получились чудовища.\n\nЭти несчастные, неспособные прожить хоть сколько-нибудь долго и страдающие от всех возможных болезней существа, лишь частично схожие с нами по генетическому коду, сейчас находятся в заключении. Изучение их генокода принесло результаты — и вердикт: нежизнеспособны. [event_target:rogue_geneticist.GetName] отказывается каяться."
 bio.220.a: "Уволить с должности!"
 bio.220.a.tt: "[event_target:rogue_geneticist.GetName] вынужденно уходит в отставку."
 bio.220.b: "[event_target:rogue_geneticist.GetName] [event_target:rogue_geneticist.GetAXX::должен|||fem:должна] замолчать."
 bio.220.c: "Как раз таких инициативных нам не хватает!"
 bio.225.name: "Настоящий скандал!"
 bio.225.desc: "После того как мы ввели регулярное генетическое тестирование для упрощения перехода к чистым генам и выявления генетических аномалий, «высококачественная» ДНК стала предметом гордости.\n\nПредположительно, некоторые государственные чиновники даже лгали о своем генокоде и подделывали результаты тестирования, чтобы выставить себя обладателями более выгодных, чем на самом деле, признаков. Если об этом станет известно, публика придет в ярость от наших попыток скрыть правду."
 bio.225.a: "Нам нужны более точные и надежные тесты."
 bio.225.b: "Возможно, этот чиновник ошибся…"
 ### ADDITIONAL RANDOM EVENTS
 ## NON-HIVE
 #CLONING
 bio.230.name: "Клонический вопрос"
 bio.230.desc: "Клоны живут среди нас, селятся в наших городах, работают на наших фабриках, а некоторые даже занимают руководящие должности и определяют политический курс нашего общества.\n\nОднако один факт их существования параллельно с нами вызывает вопросы: каковы должны быть их права? Равны ли они не-клонам или же стоят ступенью ниже, а потому их нужно держать в узде?"
 bio.230.a: "Даешь полноправное гражданство для клонов!"
 bio.230.b: "В лучшем случае они граждане второго сорта."
 bio.235.name: "Диверсия на фабрике клонов!"
 bio.235.desc: "Производство клонов на одной из самых мощных фабрик нашего государства неожиданно остановилось. Причиной этому стал несчастный случай, повлекший за собой немалый ущерб.\n\nПоскольку всё наше производство автоматизировано, предотвратить происшествие было просто некому.\n\nСама ситуация описывается так: сошедший с конвейера клон поскользнулся и попал в механизм. Измельченное тело застряло в агрегате и вынудило нас остановить работу фабрики целиком."
 bio.235.a: "Необходимо провести полноценное расследование!"
 bio.235.a.tt: "Скорость развития инцидента §Y«$genetic_ascension_situation$»§! на §Y12§! месяцев: §R–50%§!"
 biomorphosis_stalled_tt: "Скорость развития инцидента §Y«$genetic_ascension_situation$»§! на §Y12§! месяцев:"
 bio.235.b: "Необходимо скорее возобновить производство!"
 bio.240.name: "Личностный кризис"
 bio.240.desc: "Клонированные граждане массово жалуются на трудности с осознанием самих себя.\n\nОни не хотят быть всего лишь копией донора своих генов, а потому начинают задаваться вопросами о смысле существования. Размышления о жизненных целях и устремлениях не вызывают у них энтузиазма."
 bio.240.a: "Это нормально. Пусть сходят к психотерапевту."
 bio.240.b: "Пусть реализуют себя посредством труда."
 bio.240.b.tt: "Каждый §Y£leader£ лидер§!, относящийся к главной расе государства, получает §G200§! опыта."
 bio.250.name: "Клоны повсюду!"
 bio.250.desc: "Количество клонированных граждан растет, а вместе с тем растет и количество потребляемых ими ресурсов, и это ложится тяжелым бременем на нашу экономику.\n\nСправиться с этими трудностями будет нелегко, однако развитие экономики за счет увеличения рабочей силы и потребительской базы в долгосрочной перспективе может обеспечить нам процветание — при условии, что переходный период пройдет без проблем."
 bio.250.a: "Наша инфраструктура должна соответствовать спросу."
 bio.250.b: "Пусть наслаждаются жизнью в инопланетных колониях."
 ### ADDITIONAL RANDOM EVENTS
 ## NON-HIVE
 #MUTATION
 bio.260.name: "Непокорная мутация"
 bio.260.desc: "До нас доходят тревожные известия — немногочисленные, но заставляющие задуматься: самопроизвольное отрастание конечностей, переход из одного агрегатного состояния в другое, неожиданные метаморфозы…\n\nРезультаты экспериментов в области мутаций дают совершенно не те результаты, которые хотелось бы видеть. Похоже, мы сами не подозревали, во что выльется возможность менять свои гены по желанию."
 bio.260.a: "Необычные мутации помогут нам в исследованиях."
 bio_260_opinion_tt: "Мнение государств §Yспиритуалистов§! о нас: §R-50§!"
 bio.260.b: "Умертвить этих чудовищ."
 bio.260.b.tt: "Каждый §Yавторитарный £leader£ лидер§! получает признак §Y«$leader_trait_eager$»§!."
 bio.265.name: "Превосходство мутантов"
 bio.265.desc: "У небольшой части нашего населения в результате собственных экспериментов развились невероятные способности, в том числе физические.\n\nВпечатляющая сила вкупе с одаренностью вызывает немалый интерес у остальных граждан; сами же мутанты уже основали собственную общину, чтобы держаться ближе друг к другу."
 bio.265.a: "Их успехи могут вдохновить других."
 bio.265.b: "Из них получатся хорошие солдаты."
 bio.265.b.tt: "На планете §Y[Owner.capital_scope.GetName]§! создается §Y$gene_warrior_army$§!."
 bio_265_opinion_tt: "Мнение государств §Yмилитаристов§! о нас: §G+50§!"
 bio.265.c: "Узнать, как они этого добились, и повторить результат."
 bio.270.name: "Ожившие мифы"
 bio.270.desc: "Народные опасения подтвердились: стало известно, что в городской канализации действительно обитают мутанты с измененными генами. Раньше их существование считалось всего лишь мифом.\n\nНапряжение в обществе мгновенно повысилось. От страха перед неизвестным в первую очередь начали страдать граждане с заметными мутациями — теперь их всё чаще считают существами второго сорта. Следует признать, что жители канализации крайне изобретательны: средства для существования они производят с помощью газа из коллекторов. Они даже подстроили окружающую среду под себя."
 bio.270.a: "Зачистить канализацию!"
 bio.270.b: "Довольно любопытное явление…"
 bio.280.name: "Зараженные мутанты"
 bio.280.desc: "В нашем государстве произошла вспышка неизвестной болезни, сопровождающейся множеством неприятных симптомов, в том числе непроизвольным извержением воздуха и жидкостей, крайним утомлением, а иногда даже смертью.\n\nЛюбопытно, что заболевают лишь те граждане, которые как-либо изменили свою физиологию с помощью генетических мутаций. Результаты изучения их генома оказались весьма удивительными."
 bio.280.a: "Найти применение в лечебных целях."
 bio.280.b: "Превратить эту болезнь в оружие."
 bio_280_opinion_tt: "Мнение государств §Yматериалистов§! о нас §R-50§!"
 ### ADDITIONAL RANDOM EVENTS
 ## NON-HIVE
 #ANY APPROACH
 bio.295.name: "Мятежная ячейка"
 bio.295.desc: "Благодаря труду ученых из центров геномных исследований нашей цивилизации стали доступны невообразимые ранее способны изменять свою физиологию.\n\nОднако некоторым мало и этого. Уже начинают раздаваться призывы к отказу от централизации ресурсов — «биохакеры» желают полного и неограниченного доступа к генным технологиям."
 bio.295.a: "Предоставить биохакерам больше свободы."
 bio.295.b: "Среднестатистические граждане и так достаточно свободны."
 bio_295_opinion_tt: "Мнение государств §Yэгалитаристов§! о нас: §G+50§!"
 bio.300.name: "Гениальный генетик"
 bio.300.desc: "В прессе появилось научное исследование, автором которого выступает [Owner.GetScientist] по имени [event_target:genius_geneticist.GetName]. На страницах этого исследования выдвигаются предположения, как можно значительно ускорить и улучшить процесс экспериментов над генами.\n\nНо, поскольку эти выкладки исключительно теоретические, перед переходом к практике придется подумать над методологией, чтобы исключить возможные риски."
 bio.300.a: "Признать [event_target:genius_geneticist.GetAXX::его|||fem:ее] вклад."
 bio.300.b: "Мы не потерпим своеволия — ни в мыслях, ни в поступках."
 bio.300.c: "Приказать всем вернуться к работе."
 ### ADDITIONAL RANDOM EVENTS
 ## HIVE
 #PURITY
 bio.310.name: "[target.GetGestaltEntityName&nom]: нарушение чистоты"
 bio.310.desc: "Мы заразились фрагментом зловредного генетического кода — таковы последствия наших экспериментов в области генной модификации. Наше здоровье ухудшается с устрашающей скоростью; постороннее вмешательство в наш генокод протекает хаотично и неконтролируемо.\n\nЭто необходимо пресечь, пока еще не поздно."
 bio.310.a: "Уничтожить источник заражения."
 bio.310.b: "Тщательно изучить его."
 bio.315.name: "Преданность делу"
 bio.315.desc: "Достижение чистоты невозможно без принятия в расчет благополучия [target.GetGestaltEntityName&gen] целиком. Процесс генной модификации должен протекать так, чтобы с каждой адаптацией мы становились лишь крепче.\n\nОдин шаг в неверном направлении, одно изменение, грозящее подорвать нашу стабильность или сплоченность, — и нам грозит катастрофа, способная разрушить единство."
 bio.315.a: "Сосредоточиться на живучести."
 bio.315.b: "Эффективность когнитивных процессов важнее всего."
 bio.325.name: "Забота о завтрашнем дне"
 bio.325.desc: "Гарантировать долголетие и чистоту нашего вида способны только избирательный подход к размножению и строгий генетический отбор.\n\nЛишь те единицы, которые достойны продолжать наш род, помогут нам преодолеть ограничения естественной эволюции."
 bio.325.desc.wilderness: "Гарантировать долголетие и чистоту нашего симбиотического множества способны только избирательный подход к размножению и строгий генетический отбор.\n\nЛишь те симбионты, которые обладают полезными для разума признаками, помогут нам преодолеть первоначальные ограничения."
 bio.325.a: "Будем отбирать по интеллектуальному признаку."
 bio.325.b: "Будем размножаться и распространяться."
 bio.330.name: "Преображение трудолюбивых"
 bio.330.desc: "Благодаря генной модификации наше наследие не исчезнет со страниц истории, однако все без исключения [target.GetIndividualNamePlural&nom] должны усердно трудиться, чтобы воплотить наши представления о чистоте.\n\nПеред нами стоит непростой выбор: пойти к совершенству, пренебрегая при этом возможностями адаптироваться, или избрать более широкий подход и отдать предпочтение развитию необходимой инфраструктуры?"
 bio.330.a: "Чистота — наша главная забота."
 bio.330.b: "Нужно уделить время развитию инфраструктуры."
 bio.335.name: "Устранение несовершенств"
 bio.335.desc: "Мы выявили ряд генетических дефектов и аномалий, поразивших [target.GetGestaltEntityName&acc].\n\nИх необходимо устранить, чтобы ничто не препятствовало достижению поставленной цели. Решать, как именно пойдет физическое развитие, будем мы, а не эволюция."
 bio.335.a: "Уничтожить слабых, чтобы остальные стали сильнее."
 bio.335.b: "Перестроить дефективные единицы."
 bio_335_opinion_tt: "Мнение §Yблагожелательных§! государств о нас: §R-50§!"
 ### ADDITIONAL RANDOM EVENTS
 ## HIVE
 #CLONING
 bio.340.name: "Излишек клонов!"
 bio.340.desc: "Производительность фабрик клонов оказалась выше, чем мы рассчитывали, и теперь у нас избыток клонов.\n\nИнтегрировать в улей столько единиц будет непросто."
 bio.340.a: "Новые единицы Разума следует переселить."
 bio.340.b: "Нарастить производительность. Нужно больше клонов."
 bio.350.name: "Пустые оболочки"
 bio.350.desc: "Сбой в одном из ведущих центров клонирования затронул целую партию единиц Разума: каким-то образом генетический код оказался загрязнен, в результате чего партия получилась дефектной и неспособной мыслить.\n\nЭти единицы даже нельзя назвать разумными существами, поскольку у них отсутствуют высшие когнитивные функции. Пока вопрос с загрязнением не будет решен, а производство — восстановлено, темп работы фабрики останется сниженным."
 bio.350.a: "Это даже… успокаивает."
 bio.350.a.tt: "В мире §Y[owner.capital_scope.GetName]§! появится 100 £pop£ §Hпредразумных поселений§!."
 bio.350.b: "Вырастить новую партию."
 bio.365.name: "Метафизика улья"
 bio.365.desc: "В глубине коллективного сознания зародился вопрос: возможно ли, что однажды всех нас заменят клоны?\n\nПервые попытки создания генетических копий оказались настолько успешными, что со временем, вероятно, этот метод полностью вытеснит естественное размножение.\n\nЗначит, первоначальных доноров не останется — на смену им придут клоны клонов клонов… Но какая судьба тогда ждет нашу расу? Однозначного ответа на этот вопрос пока нет, есть только противоположные мнения. Но не задавать его нельзя."
 bio.365.a: "Этот вопрос ценен сам по себе."
 bio.365.b: "Подобные вопросы только отвлекают."
 ### ADDITIONAL RANDOM EVENTS
 ## HIVE
 #MUTATION
 bio.375.name: "Укрепленная связь"
 bio.375.desc: "Мы совершили открытие: путем манипуляций с отдельными генами можно расширить охват сознания так, чтобы оно стало чутко воспринимать всё, что происходит за его пределами, которые когда-то казались нам непреодолимыми.\n\nЧтобы внедрить такие мутации в масштабах улья, потребуется значительное количество энергии, однако после этого мы, возможно, начнем лучше понимать вселенную и осознавать отведенное нам в ней место."
 bio.375.a: "Затратами можно пренебречь. За дело."
 bio.375.b: "Не стоит торопить такие события."
 mod_planet_evaluators_physics_research_produces_add: "£physics_research£ $physics_research$ за каждые $pop_group_unit$ должностей [evaluator.GetIcon] «[evaluator.GetNamePlural]»"
 bio.380.name: "Эмоциональная перегрузка"
 bio.380.desc: "Целые сегменты улья испытывают приступы неконтролируемого гнева — чувства настолько яркого, что оно бьет по всему коллективному разуму, и наше общее ощущение боли и отчаяния становится только отчетливее.\n\nПо всей видимости, одна из недавних мутаций вызвала у единиц Разума избыточную стимуляцию нейроцитов в центрах, отвечающих за агрессию, и теперь эмоциональное равновесие нарушено. Всё чаще возникают конфликты, а некоторые единицы даже бросают свои задачи и нападают на других."
 bio.380.a: "Мы будем едины и чутки."
 bio.380.b: "Поддаться гневу."
 bio.385.name: "Непереносимость окружающей среды"
 bio.385.desc: "Не все мутации оказались одинаково полезны: какие-то улучшают нас и побуждают к действию, какие-то, наоборот, вызывают неприятные побочные эффекты.\n\nТак, улучшения, укрепляющие жизненные силы, одновременно с этим снижают устойчивость к экстремальным климатическим условиям.\n\nТе единицы, которые уже прошли через эти улучшения, с трудом справляются с управлением внутренними системами терморегуляции, и эти неудобства ощущает весь улей."
 bio.385.a: "Системы защиты от погодных условий необходимо улучшить."
 bio.385.b: "По мере того как меняемся мы, должны меняться и наши предпочтения."
 uncomfortable_drones: "Испытывающие неудобства единицы"
 uncomfortable_drones_desc: "Наши единицы Разума испытывают дискомфорт от мутаций."
 bio.390.name: "Сила или ум"
 bio.390.desc: "Мы выявили две полезные мутации. Первая делает единиц-чернорабочих сильнее, чем значительно повышает производительность труда, вторая же обостряет их интеллект и помогает эффективнее строить планы и решать задачи.\n\nНеобходимо определиться, что из этого нам пригодится больше."
 bio.390.a: "Сила — это прогресс."
 bio.390.b: "Мы мыслим — следовательно, мы процветаем."
 ### ADDITIONAL RANDOM EVENTS
 ## HIVE
 #ANY APPROACH
 bio.405.name: "Больной геном"
 bio.405.desc: "Нам едва удалось сдержать внезапную вспышку генетической чумы.\n\nПопытки изменить себя вызвали неконтролируемые мутации в ДНК, из-за чего многие [target.GetIndividualNamePlural&nom] пострадали физически.\n\nЗараженные [target.GetIndividualNamePlural&nom] помещены на карантин. Теперь необходимо определиться, как поступать дальше."
 bio.405.a: "Умрут [target.GetIndividualNamePlural&nom] — закончится чума."
 bio.405.b: "Изучить зараженных."
 bio.410.name: "Распадающиеся клетки"
 bio.410.desc: "Из-за ошибки в расчетах генетический код целого множества наших единиц начал деградировать. К сожалению, выяснить, на каком именно этапе случился просчет, пока не удалось.\n\nМы заново выполнили все расчеты, необходимые для биологического преображения нашей расы, и исправили несколько алгоритмов, которые в теории могли бы вызвать трудности. Теперь можно продолжать работу.\n\nВпрочем, пока еще неизвестно, удалось ли исправить ошибку, — вполне вероятно, что мы всё испортили."
 bio.410.desc.wilderness: "Из-за ошибки в расчетах генетический код целого множества наших симбионтов начал деградировать. К сожалению, выяснить, на каком именно этапе случился просчет, пока не удалось.\n\nМы заново выполнили все расчеты, необходимые для адаптации наших составляющих, и обнаружили, что часть ферментных растворов была не сбалансирована. Теперь можно продолжать работу.\n\nВпрочем, пока еще неизвестно, удалось ли исправить ошибку, — вполне вероятно, что мы всё испортили."
 bio.410.a: "Посмотрим, что будет дальше."
 bio.410.b: "Приостановить эксперименты."
 bio.410.b.tt: "$bio.235.a.tt$"
 #Buildings and Jobs
 genomic_research_facility_unlocked_tt: "Сооружение: «['building:building_genomic_facility']»"
 situation_genomic_facility_needed_desc: "£trigger_no£ Нет действующего ['building:building_genomic_facility', центра геномных исследований]"
 genomic_facility_needed_tt: "§R\nНеобходимое действие:§!\n$t$- Постройте §Y$building_genomic_facility$§!, чтобы начать инцидент §Y«$genetic_ascension_situation$»§!."
 building_genomic_facility: "Центр геномных исследований"
 building_genomic_facility_plural: "Центры геномных исследований"
