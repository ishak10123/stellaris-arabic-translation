 unlocks_ship_2_bio: "Открывается технология, необходимая для постройки §Yмучителей§! и §Yткачей§! угасшей империи.\n"
 menp_cosmo_ship_2_desc_bio: "Эти корабли неподвластны привычным ограничениям пространства-времени: они способны преодолевать эти преграды. В компактных корпусах таится сила, противоречащая законам физики."
 menp_cosmo_ship_3_desc_bio: "$tech_cosmogenesis_harbinger_desc$"
 unlocks_ship_3_bio: "Открывается технология, необходимая для постройки §Yпредвестников§! угасшей империи"
 menp_cosmo_ship_4_desc_bio: "$tech_cosmogenesis_stinger_desc$"
 unlocks_ship_4_bio: "Открывается технология, необходимая для постройки §Yтитанов «Жало»§! угасшей империи"
 tech_cosmogenesis_mauler: "Таящий мучитель"
 tech_cosmogenesis_mauler_desc: "Этот органический корабль нарушает все закономерности пространства-времени. Внутри он больше, чем снаружи; под компактным корпусом скрываются плотные сплетения мускулов, позволяющие совершать смертоносные атаки, невозможные с точки зрения законов физики."
 TECH_UNLOCK_COSMO_MAULER_CONSTRUCTION_TITLE: "§HТип кораблей:§! таящий мучитель"
 TECH_UNLOCK_COSMO_MAULER_CONSTRUCTION_DESC: "§HТаящий мучитель§!\n$tech_cosmogenesis_mauler_desc$"
 tech_cosmogenesis_weaver: "Неразъяснимый ткач"
 tech_cosmogenesis_weaver_desc: "Неразъяснимый ткач, оснащенный целыми батареями орудий поддержки, неподвластен пространственным законам — их он переписывает под себя. Этот корабль способен в одиночку переломить ход сражения."
 TECH_UNLOCK_COSMO_WEAVER_CONSTRUCTION_TITLE: "§HТип кораблей:§! неразъяснимый ткач"
 TECH_UNLOCK_COSMO_WEAVER_CONSTRUCTION_DESC: "§HНеразъяснимый ткач§!\n$tech_cosmogenesis_weaver_desc$"
 tech_cosmogenesis_harbinger: "Лабиринтовый предвестник"
 tech_cosmogenesis_harbinger_desc: "Штурмовики на этих кораблях хранятся в хитросплетенных карманных измерениях. Каждый предвестник — подлинный лабиринт из невообразимых ангаров и способен нести внутри столько штурмовиков, что хватило бы на целую флотилию."
 TECH_UNLOCK_COSMO_HARBINGER_CONSTRUCTION_TITLE: "§HТип кораблей:§! лабиринтовый предвестник"
 TECH_UNLOCK_COSMO_HARBINGER_CONSTRUCTION_DESC: "§HЛабиринтовый предвестник§!\n$tech_cosmogenesis_harbinger_desc$"
 tech_cosmogenesis_stinger: "Таинственное жало"
 tech_cosmogenesis_stinger_desc: "Этот корабль оснащен таким количеством оружия, что его источник энергии давно должен был отказать, — а он тем не менее продолжает вести беспрерывный огонь."
 TECH_UNLOCK_COSMO_STINGER_CONSTRUCTION_TITLE: "§HТип кораблей:§! таинственное жало"
 TECH_UNLOCK_COSMO_STINGER_CONSTRUCTION_DESC: "§HТаинственное жало§!\n$tech_cosmogenesis_stinger_desc$"
