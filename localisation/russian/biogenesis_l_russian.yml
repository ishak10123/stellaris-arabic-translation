 #General Events
 action.1.desc_109: "§HСпокойной и взвешенной беседы не получилось: на нас обрушились три отдельных сигнала сразу. Один и тот же голос произнес, словно перебивая самого себя:§!\n\nСигнал № 1: [GetPrimaryHiveFEConversation]\nСигнал № 2: [GetSecondaryHiveFEConversation]\nСигнал № 3: [GetTertiaryHiveFEConversation]\n\n§HСлова и предложения слились в единый неразборчивый шум. Анализ показал, что каждому сигналу соответствует свое сложное обозначение. Для удобства мы перевели их как §Y[GetPrimaryHiveFEName]§!, §Y[GetSecondaryHiveFEName]§! и §Y[GetTertiaryHiveFEName]§!.§!"
 war_first_hivefe: "«Вы слабы. Мы хотим знать: способны ли вы воевать? Как занятно было бы смотреть на ваши страдания, слушать ваши крики… Почему…»"
 growth_first_hivefe: "«Удивительная жизнь! Изобильная и откормленная. Чем вызван ваш рост: необходимостью или выбором? Мы не помним. Почему…»"
 control_first_hivefe: "«Ваши тела неэффективны; ваши [Species.GetEyeNamePlural] на 3% отклонены от центра. Это необходимо исправить. Мы предполагаем, что вы будете повиноваться. Почему…»"
 war_second_hivefe: "«…бесполезные щиты! Не могут выдержать даже жара звезды. Должно быть, галактика внушает вам ужас. Наверное, вы…»"
 growth_second_hivefe: "«…слишком мало отверстий. Вам требуется [Species.GetMouthName] в дополнение к тому, что уже есть, — возможно, тогда будет польза. Возможно, вы…»"
 control_second_hivefe: "«…мучительно неудобный язык. Неупорядоченная и нерациональная грамматика. Вы согласитесь внести изменения, которые мы предлагаем…»"
 bio.3000.name: "Подумайте хорошенько"
 bio.3000.desc: "§HДиссонанс, присущий фрагментам угасшей империи, исчез. Три голоса сошлись в единой гармонии, и в каждом слышен гнев.§!\n\n«Бездумные [owner.GetSpeciesNamePlural]! Вы находитесь в системе Последняя мысль. То, что видят ваши [owner.GetEyeNamePlural], для них не предназначено. Если вы не отступитесь, последствия вашего шага будут неописуемы, а страдания — непереносимы.\n\nВы не посмеете потревожить нас — ее — меня»."
 bio.3000.a: "Выполнить экстренный сверхсветовой маневр."
 bio.3000.b: "Мы никуда не уйдем."
 bio.3005.name: "Вторая мысль"
 bio.3005.desc: "§HХор вновь обращается к нам единым голосом. Все три фрагмента повторяют одну фразу:§!\n\n«…прочь! Убирайтесь прочь! Убирайтесь прочь! Убирайтесь прочь! Убирайтесь прочь! Убирайтесь…»"
 bio.3005.a: "Экстренный сверхсветовой маневр!"
 bio.3005.b: "Ваши тайны станут нашими."
 #Task Events
 #War
 bio.3105.name: "Выживание сильнейших"
 bio.3105.desc: "Сегодня вы, [root.GetSpeciesNamePlural], подвергнетесь достойному испытанию! Мы вырастили новую разновидность биологического корабля. Эта порода уже уничтожила своих новорожденных сородичей, и теперь пора испробовать ее в противостоянии с другими организмами. Корабль прибудет в систему §Y[target_system.GetName]§!, когда наступит время.\n\nМы ждем от вас данных, заслуживающих внимания."
 bio.3105.militarist: "Достойный вызов!"
 bio.3105.a.tooltip: "В систему §Y[target_system.GetName]§! прибудет экспериментальный корабль угасшей империи"
 bio.3105.b: "Можно ли отказаться?"
 NAME_New_Breed: "Новая порода"
 NAME_Experimental_Ship: "Экспериментальный корабль"
 bio.3110.name: "Разочарование"
 bio.3110.desc: "Экспериментальная порода еще жива. Значит, вы пока слишком слабы.\n\nВозможно, следовало послать вам амебу."
 bio.3110.a: "Очень жаль… наверное."
 bio.3120.name: "Выученный урок"
 bio.3120.desc: "Великолепно. Вы заметили, что эта порода старается уклоняться от огня, и воспользовались этой особенностью. Мы довольны. Впрочем, будьте уверены, у следующего поколения уже не будет этого недостатка.\n\nВы развиваетесь, юные [root.GetSpeciesNamePlural]. Будьте наготове."
 bio.3130.name: "Слишком спокойно"
 bio.3130.desc.notruce: "Мы заметили, что ваш народ не сражается. Почему? Каждое молодое государство должно сражаться — иначе оно обречено отстать. Вас ждет новый противник: §Y[unfortunate_country.GetName]§!. Одолейте его за десятилетие — и мы гарантируем вам дальнейшее развитие."
 bio.3130.desc.truce: "$bio.3130.desc.notruce$\n\nИ не переживайте по поводу перемирия: его больше нет."
 bio.3130.a: "Везет же на абсурд…"
 bio.3130.a.pacifist: "Война — не единственный двигатель прогресса!"
 bio.3130.a.militarist: "Отличная идея!"
 bio.3150.name: "Дайте миру шанс"
 bio.3150.desc: "[Root.GetName]! Мы пришли вас предупредить — и дать вам новое испытание.\n\nНе стоит упиваться своими захватническими успехами: чтобы в полной мере познать войну, вам придется также познать мир.\n\nСделайте перерыв на десять лет. Подумайте о достигнутых успехах. Отдохните — или надорветесь. Просто доверьтесь нам."
 bio.3150.a.mean: "Что за глупости?"
 bio.3150.a.pacifist: "Какие мудрые слова!"
 #Growth
 bio.3205.name: "Улучшение экосистемы"
 bio.3205.desc: "Вы опоздали с поставкой биомассы. Впрочем, нет, вы же не §Y[targetrivalname.GetName]§!.\n\nТогда зачем вы нас отвлекаете?\n\nАх да. Вам мы собирались передать давно хранимый нами геном, который мы оберегали в течение многих тысячелетий. Сейчас наконец наступил подходящий момент. Геном получит ваша колония на планете §Y[target_planet.GetName]§! как наиболее подходящий кандидат. Вскоре ее биосфера будет поглощена."
 bio.3205.a: "Мы согласны."
 bio.3205.a.planetscaper: "Научите нас делать так же!"
 bio.3205.b: "Может, вам больше понравится §Y[alternate_planet.GetName]§!?"
 bio.3205.b.planetscaper: "Нам кажется, §Y[alternate_planet.GetName]§! гораздо лучше подходит для испытаний!"
 bio.3205.c: "Вы сошли с ума! Мы отказываемся!"
 bio.3205.c.environmentalist: "Да как вы смеете?!"
 bio.3210.name: "Измененная биосфера"
 bio.3210.desc.base: "Государство §Y[fallen_empire_hive_growth.GetName]§! закончило вносить изменения в биосферу планеты §Y[root.GetName]§!. Влияние их незаметно, однако последствия видны всем."
 bio.3210.desc.radio_bugs: "$bio.3210.desc.base$\n\nНаселяющие планету насекомые теперь общаются между собой на той же частоте, которую используют наши беспроводные устройства. Легкого стрекотания хватит, чтобы открыть автоматическую дверь; целый рой насекомых может вывести из строя заводское оборудование. Нам приходится менять все частоты, однако далеко не каждый объект удастся вернуть к прежним показателям."
 bio.3210.radio_bugs.accept: "Мы приспособимся."
 bio.3210.radio_bugs.purge: "Это недопустимо. Избавиться от всех насекомых!"
 bio.3210.radio_bugs.purgeota: "Сбой в системе обновлений. Устранить вредоносные дефекты."
 radio_bugs: "Радиожучки"
 radio_bugs_desc: "По радиоволнам этой планеты несется стрекотание искусственно модифицированных насекомых."
 mod_planet_districts_cities_society_research_produces_add: "£society_research£ $society_research$ от £district£ районов городов и ульев"
 bio.3210.desc.world_of_thought: "$bio.3210.desc.base$\n\nОбитатели планеты, ранее не знавшие большего удовольствия, чем пощипать траву и поваляться в грязи, теперь задают нам неудобные вопросы о смысле жизни. Вмешательство угасшей империи затронуло немалую часть фауны."
 bio.3210.world_of_thought: "[fallen_empire_hive_growth.GetName] и так умеет?!"
 bio.3210.world_of_thought.homicidal: "Им же хуже."
 bio.3210.world_of_thought.tt: "§Y500§! новых £pop£§H поселений§! [This.GetPlanetMoon]ы §Y[This.GetName]§! обрели сознание"
 bio.3210.desc.world_alight: "$bio.3210.desc.base$\n\nМир в самом буквальном смысле слова воссиял: каким-то образом местная фауна во всем своем разнообразии приобрела биолюминесцентное свечение, сопровождающееся назойливым ровным гулом, как от работающего двигателя. Наши [owner.GetColonistPlural] теперь не знают, что такое ночь; придется помочь им с затемнением жилищ."
 bio.3210.world_alight.accept: "[owner.GetEyeNamePluralCap] бы наши этого не видели."
 bio.3210.world_alight.reject: "Накрыть и перебить их. Мы этого не потерпим!"
 world_alight: "Светящийся мир"
 world_alight_desc: "На этой планете никогда не бывает ночи: благодаря биомодификации ее фауна постоянно испускает свет и настойчивые, крайне раздражающие вибрации. Для того, чтобы выдержать местные условия, жителям понадобится серьезная помощь."
 bio.3220.name: "Генетические развлечения"
 bio.3220.desc: "Нас огорчает простота проживающей в вашем государстве расы §Y[boring_species.GetNamePlural&gen]§!. Их жизнь могла бы быть наполнена смыслом, но вместо этого мы наблюдаем лишь застой. Наша коллективная воля находит его оскорбительным. Мы дадим вам способ исправить эту… ошибку.\n\nНо постарайтесь, чтобы нам не наскучило."
 bio.3220.tt: "Дает §G50%§! прогресса развития инцидента §Y«$evolutionary_predators_situation$»§!."
 bio.3220.humanoid: "Дайте нам модификацию по образу гуманоидов."
 bio.3220.mammalian: "Дайте нам модификацию по образу млекопитающих."
 bio.3220.reptilian: "Дайте нам модификацию по образу рептилоидов."
 bio.3220.avian: "Дайте нам модификацию по образу пернатых."
 bio.3220.arthropoid: "Дайте нам модификацию по образу членистоногих."
 bio.3220.molluscoid: "Дайте нам модификацию по образу моллюскоидов."
 bio.3220.fungoid: "Дайте нам модификацию по образу грибовидных."
 bio.3220.plantoid: "Дайте нам модификацию по образу растений."
 bio.3220.lithoid: "Дайте нам модификацию по образу литоидов."
 bio.3220.necroid: "Дайте нам модификацию по образу некроидов."
 bio.3220.aquatic: "Дайте нам модификацию по образу аквоидов."
 bio.3220.toxoid: "Дайте нам модификацию по образу токсоидов."
 bio.3220.infernal: "Дайте нам модификацию по образу термофилов."
 bio.3220.psionic: "Дайте нам модификацию по образу псиоников."
 bio.3220.evopred: "Вскоре мы непременно изменимся."
 bio.3220.b: "Мы не готовы изменять другую расу по вашей прихоти!"
 bio.3230.name: "Редкий признак"
 bio.3230.desc: "Мы заметили, что некоторые представители вашего вида проявляют любопытный признак — его нет даже в нашем обширном генном репозитории. Простой анализ для нас недостаточен — вы предоставите нам живой образец. §Y«[fallen_empire_hive_growth.species.GetInterestingTraitName]»§! — так называется этот признак. Впрочем, не стоит волноваться: нам не нужны ваши [interesting_species.GetNamePlural] целиком. Даже просто [interesting_species.GetHandName] — это более чем достаточно, чтобы вырастить замену."
 bio.3230.a: "Что есть [interesting_species.GetHandName] в масштабе мироздания?"
 bio.3230.b: "Мы не доверим вам свой генетический состав!"
 #bio.3245.name: "Eternal Harvest"
 #bio.3245.desc: "We have discovered a derelict transport from the §Y[fallen_empire_hive_growth.GetName]§! in the §Y[transport_system.GetName]§!. Initial scans show it is carrying samples of the Fallen Empire's special crop strain, capable of feeding trillions.\n\nThe transport has been left derelict for months already and we have not seen any movement from the [fallen_empire_hive_growth.GetName] to retrieve it. Could this be a test or a glorious opportunity?"
 #Control
 bio.3305.name: "Полная коллекция"
 bio.3305.desc: "§HЭто записанное сообщение. Не отвечайте на него.§!\n\nМы приняли во внимание ограниченность вашего языка и изменили эту передачу, чтобы вам стало понятно ее содержимое. Немедленно передайте нам §Y[target_pop.GetSpeciesName&gen]§!: необходима срочная ассимиляция. Отклонение от нормы недопустимо. Возражения недопустимы.\n\nОколо планеты §Y[target_pop.Planet.GetName]§! вас будет ждать транспорт. Время работает против вас. Непослушание грозит нестабильностью."
 bio.3305.a: "Мы подчинимся."
 bio.3305.a.tooltip: "1 §Y[target_pop.GetSpeciesNamePlural&gen]§! из мира §Y[target_pop.Planet.GetName]§! перемещаются в мир §Y[fallen_empire_hive_control.Capital.GetName]§!"
 bio.3305.b: "Придите и возьмите!"
 bio.3305.followup: "§HМы приняли сообщение от государства §Y[fallen_empire_hive_control.GetName]§!. Ко всеобщему удивлению, на нас глядит вовсе не [fallen_empire_hive_control.GetSpeciesName] из глубокой древности, как мы ожидали, а знакомое лицо — §Y[target_leader_fe_control.Species.GetName]§!.§!\n\n"
 bio.3310.name: "Не бойтесь"
 bio.3310.desc: "$bio.3305.followup$Сегодня в истории вашего народа наступил поворотный момент. Генетический код вашей расы теперь в безопасности: он внедрен в общее целое. Ваше будущее предопределено. Со временем вы станете частью нашего организма."
 bio.3310.familiar_face: "Значит, вот что другие о нас думают?"
 bio.3315.desc: "$bio.3305.followup$Времени в обрез. Невозможно описать словами, какие эксперименты над нами ставили. §Y[fallen_empire_hive_control.Capital.GetName]§! — такое место, куда не станешь отправлять даже врага. В этом пакете данных — всё необходимое, чтобы этот фрагмент никогда не взял над нами верх. Надеюсь, всё получится."
 bio.3315.a: "Принять пакет данных."
 bio.3315.tooltip: "§G50§!-процентная вероятность обнаружить внутри подлинные секреты §Yугасшей империи§!."
 bio.3315.b: "Это ловушка! Разорвать связь!"
 bio.3330.name: "Жизненно важная программа"
 bio.3330.desc: "Мы надеемся, что даже вопреки своим многочисленным недостаткам вы способны осознать всю серьезность ситуации. Ваше вечно колеблющееся §YГалактическое сообщество§! предложило резолюцию, которая непременно должна §Y[GetPassFail]§!. Чтобы предоставить достойные аргументы, вы можете обратиться к нашим глубоким знаниям. Будьте внимательны — если, разумеется, вы способны к сложному мышлению.\n\n§HУгасшая империя прекращает связь.§!"
 bio.3330.a: "Что это было?"
 bio.3330.b: "Это полное нарушение всех протоколов!"
 fail_resolution: "провалиться"
 pass_resolution: "быть принята"
 fe_political_support: "Древняя политика"
 fe_political_support_desc: "Помощь со стороны угасшей империи значительно облегчает судопроизводство и обструкцию законов."
 fe_political_opposition: "$fe_political_support$"
 fe_political_opposition_desc: "$fe_political_support_desc$"
 MESSAGE_PASS_HIVE_FE_TASK_TITLE: "Фрагмент угасшей империи доволен"
 MESSAGE_PASS_HIVE_FE_TASK: "Угасшая империя $FALLEN_EMPIRE|Y$ удовлетворена тем, что мы выполнили ее указания. Пока что нам ничего не грозит."
 MESSAGE_FAIL_HIVE_FE_TASK_TITLE: "Фрагмент угасшей империи недоволен"
 MESSAGE_FAIL_HIVE_FE_TASK: "Угасшая империя $FALLEN_EMPIRE|Y$ недовольна тем, что мы не смогли выполнить ее указания. Остается надеяться лишь на то, что нас простят."
 bio.3350.name: "Галактическое уродство"
 bio.3350.desc: "Почему вы так настойчиво отравляете галактику своим присутствием, если даже не можете расширять границы достойно? Должно быть, остальным противен диалог с вами, поэтому за них выскажемся мы: ваши границы никому не нравятся. Космос сильно выиграет, если вас в нем не будет.\n\nСистема §Y[offending_system.GetName]§! устроена непрактично, в ней царит беспорядок. Вам следует немедленно исключить ее из состава государства и не нарушать целостность пространства."
 bio.3350.a: "Вы требуете от нас бросить систему, чтобы границы стали красивее?!"
 bio.3350.bordergore: "Но нам так нравится!"
 bio.3350.tt: "Мы должны демонтировать космическую базу в системе §Y[offending_system.GetName]§!, иначе §Y[fallen_empire_hive_control.GetName]§! обрушит на нас свой гнев"
 bio.3355.name: "Головная боль"
 bio.3355.desc: "Неужели вы намеренно избрали путь невежества? Задача была проста: избавиться от системы §Y[offending_system.GetName]§!.\n\nВозможно, нам следует серьезнее заняться устранением ваших излишеств."
 bio.3360.name: "Ясность"
 bio.3360.desc: "Отрадно, что вы всё-таки способны учиться на ошибках. Можно считать, что вопрос с системой §Y[FromFrom.GetName]§! решен. Возможно, когда-нибудь вы всё же станете ближе к нам.\n\nМы будем наблюдать."
 #Awakening
 #War
 casus_belli_cb_ae_entertainment: "Развлечение"
 war_goal_wg_ae_entertainment: "Развлечение"
 war_goal_wg_ae_entertainment_desc: "Война ведется для развлечения пробужденной империи и создания подходящих соперников."
 wg_ae_war_entertainment_effect: "§Y[Root.GetName]§! [Root.GetName::вознаградит|||pl:вознаградят] достойного противника. Чем выше §Yусталость от войны§! пробуждённой империи, тем крупнее награда."
 #Control
 bio.3400.name: "Единство"
 bio.3400.desc.nogalcom: "Знай, галактика: теперь мы едины. Даже самые отсталые отщепенцы узрели истину и вновь стали единым целым с нашим коллективом. Отныне наше имя — §Y[fallen_empire_hive_control.GetName]§!. Возрадуйся, что тебе удалось узреть этот миг. Звезды, встречайте величайшую форму жизни."
 bio.3400.desc.galcom: "$bio.3400.desc.nogalcom$\n\nОтныне распоряжаться вашим §YГалактическим сообществом§! будем мы. Это повод для праздника."
 bio.3405.name: "Неверная нота"
 bio.3405.desc: "Зачем вы чините препятствия сами себе? В стройном галактическом хоре вы — диссонансная нота. Мы желаем лишь одного — гармонии для вас, но вы противитесь нашим усилиям. Вы предпочитаете разногласие.\n\nЗнайте: отзвуки нашей симфонии так или иначе услышит вся галактика — с вами или без вас."
 bio.3405.a: "Мы вас услышали — и мы не собираемся плясать под вашу дудку."
 NAME_Appeal_the_Veto: "Протест против вето"
 gal_com_arrogance: "Гордыня"
 #Dig Site
 NAME_Echo: "Гулкий мавзолей"
 last_thought_site: "Последняя мысль"
 last_thought_site_desc: "[From.Planet.GetName] сопротивляется всем попыткам себя изучить. Ученые постоянно находят отговорки, чтобы не заниматься исследованиями, а аппаратура сбоит и выходит из строя, словно ей противны получаемые данные.\n\nЗдесь определенно что-то произошло, и отзвуки этого страшного события до сих пор распространяются по ткани реальности."
 bio.3450.name: "Мертворожденное"
 bio.3450.desc: "На поверхности планеты [From.Planet.GetName] мы не обнаружили ничего примечательного. Углубившись в почву и пробурив бесчисленные слои полуокаменелой биологической материи, через какое-то время мы уперлись в полое ядро планеты, где в полной мере ощутили давящую на нас гнетущую тяжесть. Каждый шаг давался с огромным трудом; еще несколько минут — и некоторые [Root.Owner.GetArchaeologistPlural], поддавшись коллективному приступу, впали в оцепенение. Не помогли даже меры предосторожности, которые [Root.Leader.GetAXX::предпринял|||fem:предприняла] [Root.GetLeaderName]. Пострадавших пришлось немедленно эвакуировать.\n\nПросторная пещера в сердце планеты — не просто каверна: внутри мы обнаружили останки настолько огромные, что любая другая известная нам форма жизни меркнет в сравнении с ними. Следы амниотической жидкости окончательно развеяли все сомнения: [From.Planet.GetName] — вовсе не небесное тело. Это яйцо.\n\nИ внутри него покоится мертворожденное чудовище."
 bio.3455.name: "Синапсы"
 bio.3455.desc: "На «планете» [From.Planet.GetName] наши [Root.Owner.GetArchaeologistPlural] обнаружили целую сеть загадочных отростков, вросших глубоко в череп мертворожденного существа. Эти органические ниточки привели нас к наружному скоплению синаптических кластеров — сложной системе, чьи скрытые возможности одновременно и восхищают, и ужасают.\n\nСейчас [Root.GetLeaderName] пытается установить с ней контакт в надежде, что древняя система нейронов, уже многократно пережившая своего хозяина, раскроет свои тайны — если, конечно, она еще их помнит."
 bio.3460.name: "Хитрость"
 bio.3460.desc: "Давность случившегося поражает: прошла уже сотня тысяч лет. Улей воспринимает время по-своему; перевести его ощущения в стандартную галактическую систему оказалось непросто, но, тщательно перебрав хранящиеся в биокомпьютере воспоминания, [Root.GetLeaderName] постепенно [Root.Leader.GetAXX::начал|||fem:начала] восстанавливать картину произошедшего.\n\nНа пике своего могущества этот улей столкнулся с непобедимым врагом. Каждое их столкновение заканчивалось поражением, и даже многочисленные союзники улья были бессильны. Из отчаяния со временем выросло безрассудство.\n\nМногие последующие воспоминания оказались целенаправленно стерты, но какие-то фрагменты еще сохранились. По этим осколкам и удалось понять, чем завершилось противостояние: улей породил яйцо размером с планету, надеясь с его помощью вырваться за пределы своего мира, слиться с детенышем и тем самым преобразиться. Мы не знаем, что он собирался делать дальше — сражаться или бежать.\n\nИзвестно одно: всё пошло совершенно не по плану."
 bio.3465.name: "Разрушение"
 bio.3465.desc: "Аккуратно установив контакт с еще живыми биокомпьютерами с помощью синаптической связи, мы извлекли последние воспоминания мертворожденного существа. Этот процесс огромной нагрузкой лег на биокомпьютеры, которые начали отказывать один за другим, однако мы всё-таки успели спасти большую часть данных.\n\nСтолкнувшись с угрозой окончательной гибели, отчаявшийся улей перенес всё свое сознание в нерожденную оболочку, надеясь тем самым спастись от смерти. Возникшая синаптическая перегрузка оказалась роковой; детеныш был обречен, а улей впал в бесконечный цикл мучительных страданий. Он сгинул бы окончательно, если бы неизвестный, но сострадательный союзник не оборвал установившуюся связь. Теперь всё, что напоминает о случившемся, — это отзвуки, оставленные страдающим разумом с мира под названием [From.Planet.GetName]; мира, где еще звучит последний крик.\n\nИ последняя мысль его — предсмертная агония."
