 BEHEMOTH_ARMOR: "Броня исполина"
 BEHEMOTH_ARMOR_DESC: "Внутри газового гиганта под огромным давлением формируется кристаллическая затравка, вырастающая в покрывающую тело исполина наноструктурную кристаллическую решетку — крайне прочное органическое соединение, способное восстанавливаться."
