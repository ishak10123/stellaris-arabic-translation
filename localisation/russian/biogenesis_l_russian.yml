 bombardment_behemoth_invasion_desc: "Высадить детенышей, чтобы те сожрали планетарную биомассу."
 behemoth_army: "Титанические монстры класса «Кайдзю»"
 behemoth_army_desc: "Эти колоссальные фигуры, возвышающиеся над небоскребами, настолько велики, что способны затмить солнце, а под их поступью дрожит земля."
