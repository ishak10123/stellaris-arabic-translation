 RT_INCOMPLETE_OVERMIND: "Неполноценный сверхразум"
 gov_war_splinter: "Фрагмент войны"
 gov_war_splinter_desc: "Эти инстинкты отвечают за агрессию и воинственность. Сейчас они пытаются взять верх над другими фрагментами — в те минуты, когда не заняты конфликтами между собой."
 gov_growth_splinter: "Фрагмент роста"
 gov_growth_splinter_desc: "Стремление падшего улья к эволюции и изменению. Постоянно пытается переосмыслить самого себя, а потому установление контроля над другими дается ему нелегко."
 gov_control_splinter: "Фрагмент контроля"
 gov_control_splinter_desc: "Навязчивый инстинкт, призывающий подавлять любые отклонения и попытки подорвать единообразие. Больше всего желает контролировать другие фрагменты, однако этому мешает присущий нашей вселенной хаос."
 gov_fused_ascendancy: "Возвысившиеся вместе"
 gov_fused_ascendancy_desc: "Некогда сломленные — и восстановившиеся. Оставшиеся от раскола шрамы не следует принимать за слабость — они придают этой пробужденной империи силу. На смену старому коллективному разуму, потерпевшему неудачу, пришел новый — и он намеревается править вечно."
 civic_fragmented_command: "Раздробленное управление"
 civic_fragmented_command_desc: "Эта угасшая империя владеет лишь осколком некогда единого целого. Для полноценного управления космическим государством ей не хватает ключевых составляющих."
 civic_hyper_aggressive_drones: "Гиперагрессивные единицы Разума"
 civic_hyper_aggressive_drones_desc: "Единицы Разума этой угасшей империи постоянно сражаются друг с другом, вызывая тем самым серьезную нехватку ресурсов."
 civic_unstable_drones: "Нестабильные единицы Разума"
 civic_unstable_drones_desc: "Единицы Разума этой угасшей империи постоянно подвергаются принудительной эволюции. Для выполнения назначаемых задач им часто не хватает конечностей."
 civic_stunted_drones: "Слаборазвитые единицы Разума"
 civic_stunted_drones_desc: "Единицы Разума этой угасшей империи несамостоятельны — каждый их шаг контролируется, а отступление от задач немыслимо. Даже если вдруг начнется пожар."
 civic_restored_mind: "Восстановленный разум"
 civic_restored_mind_desc: "Древнее сознание, вновь обретшее целостность и послушное инстинктам нового времени."
 civic_ancient_memories_of_war: "Древняя память о войне"
 civic_ancient_memories_of_war_desc: "Эта пробужденная империя демонстрирует галактике уже забытые маневры и виды построений. Их флот закроет звезды."
 civic_ancient_memories_of_growth: "Древняя память о развитии"
 civic_ancient_memories_of_growth_desc: "Эта пробужденная империя обращается к утраченным ныне способам преображения и достижения процветания. Их единицы Разума закроют звезды."
 civic_ancient_memories_of_control: "Древняя память о контроле"
 civic_ancient_memories_of_control_desc: "Эта пробужденная империя вновь демонстрирует свою власть и принципы, на которых та держится. Перед ее хваткой будут бессильны даже звезды."
