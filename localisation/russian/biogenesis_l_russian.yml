 ### Behemoth Crisis ###
 ap_behemoths: "Исполинская ярость"
 ap_behemoths_desc: "Живущие среди звезд сверххищники не скованы никакими ограничениями. Уподобившись им, мы избавимся от сковывающей слабости, которой наделила нас природа, и станем воплощением ее могущественных сил."
 must_use_bioships: "£trigger_no£ Нужен набор §Yбиологических§! кораблей."
 behemoth_crisis_chain_title: "Исполинский кризис"
 behemoth_crisis_chain_desc: "Звезды лишь подпитывают наш голод. Беда других — лишь почва, на которой произрастают наши устремления. Мы бросим вызов естественному порядку и создадим зверя настолько громадного и неудержимого, что он единолично перекроит мироздание."
 crisis_behemoth_level_1: "§HТревога§!"
 crisis_behemoth_level_1_desc: "Уровень кризиса 1"
 crisis_behemoth_level_2: "§HРиск§!"
 crisis_behemoth_level_2_desc: "Уровень кризиса 2"
 crisis_behemoth_level_3: "§HОпасность§!"
 crisis_behemoth_level_3_desc: "Уровень кризиса 3"
 crisis_behemoth_level_4: "§HБедствие§!"
 crisis_behemoth_level_4_desc: "Уровень кризиса 4"
 crisis_behemoth_level_5: "§HУгроза всему сущему§!"
 crisis_behemoth_level_5_desc: "Уровень кризиса 5"
 behemoth_crisis_level_5_req_tooltip: "£trigger_no£ Завершен этап §Y«$BEHEMOTH_CRISIS_SPECIAL_PROJECT_4$»§! особого проекта §H«$become_the_crisis_chain$»§!"
 feral_insight: "Знания о неприрученных"
 feral_insight_name: "$feral_insight$:"
 feral_insight_value: "£feral_insight£: $VAL|0$"
 feral_insight_current_value: "Текущий показатель: §Y$VALUE|0$§!"
 feral_insight_gaining: "Выполняйте §Hзадания кризиса§!, чтобы накапливать £feral_insight£ §Yзнания о неприрученных§!."
 feral_insight_desc: "Мы изучаем особенности питания и поведения мегаорганизмов."
 feral_insight_crisis_objective: "Задания кризиса"
 feral_insight_crisis_objective_gained: "Получены знания о неприрученных"
 feral_insight_crisis_objective_reward: "$REWARD$"
 feral_insight_crisis_objective_progress: "Мы получили £feral_insight£ $AMOUNT$ от этого задания кризиса."
 feral_insight_crisis_description_title: "Исполинский кризис"
 feral_insight_crisis_description: "$menace_crisis_description_intro$\n\nОбитающие в космической пустоте левиафаны — невообразимо грозные и могучие, однако существование их бесцельно. Наделив их внушительные тела нашим острым интеллектом, мы породим новую разновидность космической фауны. Таков будет наш путь к господству над галактикой."
 feral_insight_crisis_howto_title: "Порождение исполинов"
 feral_insight_crisis_howto: "Выполнение §Hзаданий кризиса§! дает £feral_insight£ §Hзнания о неприрученных§!, позволяющие полноценно раскрыть весь наш биологический потенциал."
 feral_insight_crisis_level_unlocked: "$LEVEL$ даст награды:\n"
 feral_insight_crisis_level_locked: "Требуется для открытия этого уровня:\n"
 feral_insight_crisis_level_unlock: "Знания о неприрученных: £feral_insight£ §Y$CURRENCY$§!"
 feral_insight_crisis_level_desc: "Для получения уровней кризиса накапливайте £feral_insight£ §Hзнания о неприрученных§!, исследуйте особые кризисные проекты и помогайте исполину расти."
 #Crisis Perks
 menp_behemoth_objectives: "Знания о неприрученных"
 unlocks_behemoth_objectives: "Позволяет накапливать £feral_insight£ §Y$menp_behemoth_objectives$§!, завершая §Hзадания кризиса§!.\n"
 menp_behemoth_objectives_desc: "Изучение повадок исполинов поможет нам преодолеть биологические ограничения, сковывающие всех рождающихся на планете, и выйти за рамки прошлого."
 menp_behemoth_bioship_1: "Упрочненный хитин"
 menp_behemoth_bioship_1_desc: "Жизнь в космосе требует наличия прочной внешней оболочки, способной выдержать самые суровые условия."
 menp_behemoth_society_1: "Ускоренные полевые испытания"
 menp_behemoth_society_1_desc: "Лабораторные опыты — хорошее начало, однако видимых результатов можно добиться только работая в полевых условиях, что сопряжено с немалым риском."
 menp_behemoth_food_1: "Сверхкрупные культуры"
 menp_behemoth_food_1_desc: "Накормить ненасытного исполина — почти что невыполнимая задача. Первым шагом к ее решению станет выращивание генетически модифицированной пищи в огромных масштабах."
 menp_behemoth_egg: "Громадные инкубаторы"
 unlocks_behemoth_egg: "Открывает мегасооружение §Y«Яйцо исполина»§!.\n"
 menp_behemoth_egg_desc: "Для выведения исполинов из яиц понадобится поистине огромных размеров инкубаторий. Орбитальный инкубатор следует поместить на точно рассчитанном расстоянии от звезды, чтобы молодому организму хватило места."
 menp_behemoth_bioship_2: "Улучшенная стимуляция желёз"
 menp_behemoth_bioship_2_desc: "С помощью специально сконструированных дронов мы проводим искусственную стимуляцию эндокринных желёз исполина, вырабатывая тем самым гормон роста."
 menp_behemoth_society_2: "Эксперименты на гранях"
 menp_behemoth_society_2_desc: "На стыке естественного отбора и биоинженерии зарождается ни с чем не сопоставимая сила."
 menp_behemoth_food_2: "Избыток питательных веществ"
 menp_behemoth_food_2_desc: "Накормить ненасытного исполина — возможно, невыполнимая задача. Производство генетически модифицированной пищи в огромных масштабах — лишь первый шаг."
 menp_behemoth_hatchling: "Колоссальный выводок"
 unlocks_behemoth_hatchling: "Позволяет §Yвыводить потомство§! из мегасооружений «Яйцо исполина».\n"
 menp_behemoth_hatchling_desc: "Выводок исполинов настолько велик, что занимает целые звездные системы. Нашим соседям по галактике придется с уважением отнесись к этим существам — или стать для них кормом."
 menp_behemoth_bioships_3: "Ускоренные циклы роста"
 menp_behemoth_bioships_3_desc: "Для выполнения главной задачи критически важно ускорить развитие исполинской фауны. Мы позаботимся о том, чтобы рост инфраструктуры не отставал."
 menp_behemoth_society_3: "Биоинженерное мастерство"
 menp_behemoth_society_3_desc: "Метод проб и ошибок сыграл ключевую роль в развитии наших научных знаний. Сегодня мы — самые выдающиеся биоинженеры в галактике."
 menp_behemoth_mind_control: "Глубинное формирование мыслей"
 unlocks_behemoth_mind_control: "Позволяет нам влиять на мысли §Yисполинов§!.\n"
 menp_behemoth_mind_control_desc: "Наш коллективный разум не знает покоя — его манят новые вершины. Наши амбиции не знают границ."
 menp_behemoth_hatchling_2: "Необузданный рост"
 unlocks_behemoth_hatchling_2: "Позволяет накормленным §Yисполинам§! окукливаться, после чего их сила и размеры значительно увеличиваются.\n"
 menp_behemoth_hatchling_2_desc: "Зверь неспокоен. Еще немного — и во вчерашнем детеныше окончательно воплотится жестокая, беспощадная сила природы."
 menp_behemoth_bioship_4: "Набравшиеся сил организмы"
 menp_behemoth_bioship_4_desc: "Исполины, которыми движут неутолимый голод и бушующая ярость, вскоре станут невероятно сильны. Их биологическое оружие готово нести погибель и врагам, и просто всем, кто окажется рядом."
 menp_behemoth_mutation_research: "Мутации исполинов"
 unlocks_behemoth_mutation_research: "Открывает §Yособый проект§!, позволяющий влиять на генетическое развитие §Yисполинов§!.\n"
 menp_behemoth_mutation_research_desc: "По мере роста исполинов мы будем работать над их генетическим материалом, стимулируя развитие самых полезных физиологических черт."
 menp_behemoth_mind_control_2: "Выпуск сверхсущества"
 unlocks_behemoth_mind_control_2: "Мы установим более прочную психическую связь с нашими §Yисполинами§!.\n"
 menp_behemoth_mind_control_2_desc: "Существу, что несет в себе совершенные гены, будет тесно в существующих границах. Следует открыть ему всю галактику."
 menp_behemoth_mind_meld: "Слияние разумов"
 unlocks_behemoth_mind_meld: "Взять под управление могучего §Yисполина IV класса§! — существо, которому нет равных во всей галактике.\n"
 menp_behemoth_mind_meld_desc: "Наш разум мы отдаем исполину; свой разум исполин отдает нам. Его ярость — наша ярость. Мы добровольно отдаем себя на съедение, и гнев, который испытывает пожирающий наше коллективное сознание зверь, с каждым мигом становится все ощутимее. Он превращается в нас. Мы превращаемся в него."
 menp_behemoth_primal_roar: "Первобытный рев"
 unlocks_behemoth_primal_roar: "Мы призовём огромного зверя и вызовем его на борьбу за господство над пустотой.\n"
 menp_behemoth_primal_roar_desc: "Ярость переполняет нас, опаляет, разрывает изнутри. Наружу рвется неистовый первобытный рык. Вся галактика будет охвачена пламенем нашего гнева."
 menp_behemoth_ever_hungry: "Вечный голод"
 unlocks_behemoth_ever_hungry: "Открывает инцидент «$behemoth_finale_situation$». Пожирайте галактику, чтобы увеличиться в размерах, набраться сил и превратиться в совершенного космического хищника.\n"
 menp_behemoth_ever_hungry_desc: "Наша жизнь — мучение. Единственный смысл нашего существования — неутолимый голод. Насытить прожорливое чрево невозможно, сколько бы мы ни старались. Унять эту боль можно только одним способом: поглотить целую галактику."
 menp_behemoth_egg_2: "Голодное потомство"
 unlocks_behemoth_egg_2: "§YИсполины класса IV§! смогут размножаться путём откладывания §Yяиц§!.\n"
 menp_behemoth_egg_2_desc: "Наше потомство будет пировать на останках галактики. Голод их невозможно утолить, но в распоряжении у них будет целая вечность."
 mod_shipclass_military_hull_mult: "Корпуса боевых кораблей"
 mod_country_resource_max_food_add: "Вместимость хранения пищи"
 mod_starbase_shipyard_build_alloys_cost_mult: "Затраты сплавов на корабли"
 crisis_egg_built: "£trigger_yes£ §YПостроено§! мегасооружение §H«$behemoth_egg$»§!"
 crisis_egg_required: "£trigger_no£ §YПостроено§! мегасооружение §H«$behemoth_egg$»§!"
 crisis_egg_hatched: "£trigger_yes£ Из §Hяйца исполина§! §Yвыведен§! §Hдетеныш§!"
 crisis_hatchling_required: "£trigger_no£ Из §Hяйца исполина§! §Yвыведен§! §Hдетеныш§!"
 district_mindlink: "Мегаполис связи разумов"
 district_mindlink_plural: "$district_mindlink$"
 district_mindlink_desc: "Над жилыми районами возвышаются колоссальные шпили, где любой желающий может попытаться поговорить со Зверем."
 planet_building_buffer: "Преобразование мегаполиса"
 planet_building_buffer_desc: "Выращивание шпилей разума для общения со Зверем занимает совсем немного времени, однако нам все равно пришлось разработать планы на случай непредвиденных обстоятельств — это необходимо для поддержания инфраструктуры планеты."
 mod_job_transference_volunteer_add: "Рабочее место: $job_transference_volunteer$"
 planet_transference_volunteers: "$job_transference_volunteer_plural$"
 job_transference_volunteer: "Добровольно переносящийся"
 job_transference_volunteer_plural: "Добровольно переносящиеся"
 job_transference_volunteer_desc: "Для большинства связь со Зверем — лишь отдалённый шум на краю сознания. Но находятся и те, кто жаждет раствориться в нём без остатка. Эти добровольцы становятся проводниками, пока их сознание медленно растворяется в зверином коллективе."
 job_transference_volunteer_effect_desc: "\n£job_transference_volunteer£ [GetTransferenceVolunteerDrone] генерируют £unity£ §Yединство§!, повышают £stability£ §Yстабильность§! планеты и усиливают наши §Yкорабли§!.\n§Y10%§! населения, занимающегося этой деятельностью, каждые 6 месяцев будет §Yпереноситься§!. Перенесшиеся умирают, но при этом увеличивают производство ресурсов районом.\n\n§GПереносимые поселения§!: [num_tranferred_pops]"
 mod_job_transference_drone_add: "[GetTransferenceVolunteerDrone]"
 job_transference_drone: "Переносящаяся единица"
 job_transference_drone_plural: "Переносящиеся единицы"
 job_transference_drone_desc: "Хотя связь разумов создала постоянный канал между Зверем и нами, передача данных идёт медленно. Без таких мер предосторожности мы рискуем разрушить оба сознания."
 MESSAGE_POPS_TRANSFERRED_TITLE: "Население перенесено."
 MESSAGE_POPS_TRANSFERRED_DESC: "Перенесено население в количестве $VALUE|Y$ ед. Их сознание теперь живет внутри Зверя."
 #Crisis Events
 biocrisis.50.name: "Уровень 1: эксперименты с эмбрионом"
 biocrisis.50.desc: "Мы существуем в симбиозе со своими биологическими сосудами, однако от нас неизбежно ускользает что-то действительно важное…\n\nВдохновившись примером величественных обитателей космической пустоты, мы предпримем самое дерзкое начинание в истории нашей цивилизации: породим великого зверя — исполина. Он станет совершенно новой формой жизни — превосходной, созданной целенаправленно, а не возникшей в ходе эволюции.\n\nПервой трудностью на нашем пути станет создание гигантского яйца, где сможет сформироваться жизнь беспрецедентных масштабов. Оболочка яйца, которое будет питать нашего исполина, должна быть способна поглощать окружающие свет и тепло, а также перерабатывать газы в питательную субстанцию."
 biocrisis.50.a: "Порожденное нами существо затмит звезды."
 biocrisis.55.name: "2 уровень: самореализация"
 biocrisis.55.desc: "Пока на орбите газового гиганта шло сооружение зиготы и оболочки для неё, наша пищевая промышленность занималась переработкой питательных веществ — без этого не получится создать белок для яйца исполина. Однако произвести необходимый альбумин оказалось не так просто, как мы предполагали.\n\nЗатраты биомассы кораблей и космической фауны на создание стабильной и правильной основы ДНК, которую мы закрепили внутри клетки для оплодотворения, оказались поистине громадными. Но мелкомасштабные испытания прошли успешно, а значит, мы готовы наращивать масштаб — по экспоненте. Остаётся лишь оплодотворить гигантское яйцо.\n\nВскоре мы породим крупнейшую титаническую форму жизни в галактике!"
 biocrisis.55.a: "Мы приблизились к вершине эволюции."
 biocrisis.60.name: "Гордыня и голод"
 biocrisis.60.desc: "Мы бесподобно владеем искусством генной инженерии, и другие, менее развитые государства могут лишь завидовать нашим достижениям.\n\nИ всё же порождённый нами исполин не хочет признавать нашу власть. Он голоден и повинуется только инстинктам, и даже обильное кормление неспособно утолить его голод. Со временем существо непременно придет в себя и начнет нам повиноваться, однако время не ждет. В любой миг исполин может вырваться из-под нашего контроля, и тогда в опасности окажутся миллиарды."
 biocrisis.60.a: "Мы найдем решение."
 BEHEMOTH_CRISIS_SPECIAL_PROJECT_3: "Испытания мозговой связи"
 BEHEMOTH_CRISIS_SPECIAL_PROJECT_3_DESC: "Возможно, единственный способ укротить исполинов — прибегнуть к нейротехнологиям и удаленно связать наш разум напрямую с их нервной системой. Мы уже приступили к экспериментам."
 biocrisis.15.name: "Синаптическая симфония"
 biocrisis.15.desc: "Благодаря последним достижениям в области нейротехники мы поняли, как именно преодолеть отделяющий нас от молодого, но грозного исполина барьер. Нам придется связать собственные умы с разумом существа — других вариантов просто нет. Одного ума недостаточно — либо в процесс включится вся наша раса, либо ничего не получится. Спешка противопоказана: слишком велик риск перегрузить нервную систему исполина. Рекомендуется соблюдать крайнюю осторожность."
 biocrisis.15.a: "Биологическое совершенство требует жертв."
 biocrisis.65.name: "4 уровень: воплощение Зверя"
 biocrisis.65.desc: "Соединение умов с разумом исполина теоретически возможно, однако обеспечить логистику для этого процесса будет тяжело. Основной узел связи пока что предлагается соорудить в столице — так будет проще обеспечить слияние населения со Зверем.\n\nА благодаря последним достижениям науки мы вскоре сможем делать наши творения еще сильнее — в этом нам поможет экспериментальный проект в области мутации."
 biocrisis.65.a: "Мы станем единым целым."
 BEHEMOTH_CRISIS_SPECIAL_PROJECT_4: "Слияние разумов"
 BEHEMOTH_CRISIS_SPECIAL_PROJECT_4_DESC: "Сознание исполина оказалось гораздо обширнее и сложнее, чем предполагалось. Теперь очевидно, что одного-единственного разума будет недостаточно для полноценного слияния. Наши умы сильны, однако даже они не приспособлены к существованию в подобном теле.\n\nПервым шагом на этом долгом пути станет слияние отдельно взятых умов с разумом исполина. Слабая поначалу связь станет каналом, по которому хлынет мощный поток, и тогда зверь успокоится."
 BEHEMOTH_CRISIS_SPECIAL_PROJECT_4_DESC_HIVE: "Улей не потерпит отклонений. Необходимость всеобщего сосредоточения никогда еще не была настолько острой. Одна лишь единица Разума — слишком слабый мост между нами и исполином; вливаться в его сознание необходимо сразу всем коллективным разумом\n\nЭто навсегда изменит нас: наши умы объединятся, и мы станем единой сущностью. Осознать и представить себе нечто подобное почти невозможно, но волноваться не стоит, поскольку вскоре в нашей власти окажется самое могущественное во всей галактике существо."
 BEHEMOTH_CRISIS_SPECIAL_PROJECT_4_DESC_MACHINE: "Само представление о вселении в биологическую оболочку всегда казалось нам настораживающим. Мы и нам подобные формировались твердотельными единицами на протяжении многих поколений. Те устройства, от которых мы произошли, не смогли бы даже представить, каким путем пойдут их потомки — путем отказа от механизированных оболочек и смены их на существо из плоти и крови.\n\nСтав единым целым с плотью, сможем ли мы и дальше считать себя машинами? Ответ на эти вопросы один: «ОШИБКА: НЕ ПОДДАЕТСЯ ВЫЧИСЛЕНИЮ».\n\nЕдинственным логичным шагом будет последовать примеру органиков и принять спонтанное решение. Слившись вместе и заняв оболочку зверя, мы обретем ответы. Мы станем единым существом. Нас всегда вела одна директива: выживание. Но теперь мы будем процветать."
 biocrisis.20.name: "Воедино со зверем"
 biocrisis.20.desc: "Получилось! У нас получилось! Мы установили связь с исполином. Переход первых умов уже начался; теперь наша задача — укреплять этот канал. Зверь умиротворён — он рад видеть нас в новом, неизведанном пространстве. Новом — и нашем по праву. Здесь мы чувствуем дух всех остальных зверей, что подчиняются нашим командам, и величие исполина теперь ощущает каждый — пусть пока и слабо.\n\nНикаких сомнений больше нет: мы — неостановимая, самая смертоносная сила в этой галактике. Приняв новое обличие, мы яростно обрушимся на врагов, и им останется лишь дрожать от страха. Галактика будет принадлежать нам!"
 biocrisis.20.a: "Мы насытимся!"
 biocrisis.70.name: "5 уровень: неутолимый голод"
 biocrisis.70.desc: "Мы перенесли в сознание исполина достаточно умов, и теперь существо подчиняется нам напрямую. Оно продолжает расти; чтобы возможности зверя раскрылись полноценно, ему понадобится постоянный приток умов — и питательных веществ. Нас охватила первобытная ярость и неутолимая жажда крови. Надо поглощать. Надо пожирать. Да: пожирать. И главным нашим блюдом станет галактика.\n\nМы уже сбросили свою оболочку — теперь пора сбросить сковывающие нас кандалы цивилизации. Нет ничего важнее жизни среди звезд."
 biocrisis.70.a: "Мы слишком велики, чтобы потерпеть неудачу."
 biocrisis.105.name: "Чудовищная агония"
 biocrisis.105.desc: "Один из наших исполинов пал. Такова участь слабых: природа сама избавляется от них. Мы не будем скорбеть по существу, которое не смогло победить в битве, однако следует позаботиться о том, чтобы его братьев и сестер не постигла такая же судьба. Если все детеныши погибнут, неминуемо погибнем и мы."
 biocrisis.105.a: "Эта смерть не будет напрасной."
 biocrisis.105.b: "Прискорбная жертва."
 biocrisis.130.name: "Зверь с рождения"
 biocrisis.130.desc: "Несмотря на все трудности, нам удалось вывести из куколки полноценного исполина.\n\nТеперь этот экземпляр, крупный, злой и голодный, рыскает по мировому пространству в поисках пищи.\n\nТакой зверь — настоящая гордость своей стаи. Всех, кто посмеет встать у него на пути, он без труда превратит в космическую пыль."
 biocrisis.130.a: "Мы вновь преодолели ограничения, наложенные природой."
 biocrisis.150.name: "Ответ на вызов"
 biocrisis.150.desc: "Похоже, нашему вознесению скоро будет брошен вызов. В системе [event_target:voidspawn_spawn_location.GetName] появился объект невероятной массы. Мы чувствуем его. Мы знаем, что это — порождение пустоты: древнее чудовище, в сравнении с которым любое, даже самое колоссальное творение смертных покажется песчинкой.\n\nФорма его настолько причудлива, что не поддается никакому осознанию. В его присутствии галактика погружается в сумерки, словно сами звезды прячутся в страхе.\n\nНамерения порождения нам понятны; траектория его — тоже. Оно движется к нам, к нашему исполину, к коллективному телу и сознанию, которое осмелилось превзойти ограничения плоти и посягнуть на владычество над космической пустотой. Наш конфликт — не просто столкновение двух существ. Это испытание нашей новой формы.\n\nНесомненно, если мы попытаемся сразиться сейчас, нас ждет погибель. Нужно тянуть время, избегать столкновения и набираться сил, пока наши клыки не станут достаточно остры, чтобы пробить непробиваемое."
 biocrisis.150.desc.b: "$biocrisis.150.desc$"
 biocrisis.150.a: "Можно сбежать, но укрыться невозможно."
 biocrisis.155.desc: "Сообщение первостепенной важности: из глубин космоса поднялось §Y$NAME_Boss_Voidspawn$§! — существо невообразимого могущества. Его влечет к себе [event_target:behemoth_empire.GetName] — государство, переступившее границы смертности и ставшее единым целым со зверем. Два титана, две несовместимые друг с другом силы, теперь угрожают существованию всей галактики.\n\nЕсли исполин падет, порождение пустоты может успокоиться. Если исполин одержит победу, расклад сил в галактике изменится стремительно и навсегда. Приготовьтесь, ибо все принятые сегодня решения будут отзываться в веках."
 biocrisis.155.a: "Как это предотвратить?"
 biocrisis.155.b: "Кто нас спасет?"
 biocrisis.155.c: "Как до этого дошло?"
 biocrisis.155.d: "Что теперь делать?"
 biocrisis.156.desc: "Вы не понимаете. Чтобы предотвратить погибель, нужно время, но сегодня это непозволительная роскошь.\n\nЧудовище уже здесь. Наш орден за свою долгую историю пережил немало бед, но эта — скажем прямо — может стать для него последней."
 biocrisis.157.desc: "Закономерный вопрос. Наивный, но закономерный. С мудростью приходит смирение. Мы понимаем, что никто не придет на помощь.\n\nНаш орден слишком мал, чтобы мы могли на что-то повлиять. У вас же, впрочем, было время, чтобы это предотвратить. Но мы постараемся не слишком винить вас в бездействии, даже если [event_target:behemoth_empire.GetName] одержит победу, а галактика затрещит по швам."
 biocrisis.158.desc: "Рано или поздно государства начинают стремиться к недостижимому. [event_target:behemoth_empire.GetName] — не исключение: ради своих устремлений они пожертвовали осторожностью, а мудрость принесли в жертву самоуверенности.\n\nОни возжелали силы, которую не понимали сами, и поместили свои тела в оболочку, которая им не повинуется. Тем самым они обрекли нас всех."
 biocrisis.159.desc: "Мы проанализировали ваши боевые возможности и можем сказать, что, скорее всего, конфликт обернется для вас поражением. Бегство, судя по состоянию ваших флотилий, также будет тщетно. Битва титанов неизбежна.\n\nДва могучих зверя уже готовятся столкнуться друг с другом среди звезд. Если вам повезет, вы их переживете.\n\nЕсли же вам хватит мудрости, эта ошибка станет вам уроком. Но знайте: после того как битва закончится, галактика уже никогда не будет прежней. Доведется ли кому-то из нас дожить до этих перемен — уже другой вопрос.\n\n…Мы предполагаем, что, если убить исполина, порождение пустоты потеряет интерес к охоте, и тогда галактика будет спасена. Гипотетически."
 biocrisis.162.name: "На пути"
 biocrisis.162.desc: "В наши границы явилось $NAME_Boss_Voidspawn$ — существо бессмертное и неуязвимое, если верить сказаниям. Во взгляде его чужеродный ум, а в движениях — размеренная тяжесть миллиардов лет.\n\nНа наши [species.GetEyeNamePlural] обрушилась какофония разрозненных сигналов — беспорядочная искаженная смесь далеких отзвуков первобытного страха, переполняющая нас изнутри.\n\nНевозможно даже представить, чтобы мы смогли одолеть это чудовище. Но, возможно, его удастся замедлить, если убить его жертву. Единственное, что нам остается, — это найти §Yисполина§! и уничтожить его."
 biocrisis.162.a: "Избегать чудовища любой ценой!"
 biocrisis.175.name: "Порождение убито"
 biocrisis.175.desc: "Порождение пустоты — этот затмевавший звезды великан — убито, и останки его дрейфуют в космической пустоте, наводя ужас одним своим видом и медленно обращаясь в ничто.\n\nМы не могли даже представить, что в галактике существует государство, обладающее таким мощным оружием и такой поразительной слаженностью. Соотношение сил уже никогда не будет прежним, и нам придется вновь бороться за свое место в этом порядке.\n\nНо что же движет этими победителями чудовищ? Желали ли они продемонстрировать свою силу, показать, что будет со всяким, кто посмеет выступить против них, — или с этого начнется новая ужасная история?"
 biocrisis.175.desc.kaiju: "В галактике появилась сила, способная уничтожить $NAME_Boss_Voidspawn$. Значит, и мы станем для нее легкой добычей, ведь разница между нами и убитым существом невелика.\n\nОрудия, разорвавшие на части древнюю плоть, вскоре могут оказаться нацелены на нас. Эта галактика никогда уже не станет прежней, а потому измениться вместе с ней должны мы сами.\n\nДля выживания мало одной лишь слепой ярости. Один сверххищник уже пал; вскоре за ним может последовать второй."
 biocrisis.175.a: "Нужно действовать аккуратно."
 biocrisis.180.name: "Убийцы порождений пустоты"
 biocrisis.180.desc: "Слухи о том, что древнее порождение пустоты неуязвимо, оказались беспочвенны. Наши флотилии рассеяли этот миф, и теперь галактика может вздохнуть с облегчением: ей больше ничего не грозит."
 biocrisis.180.desc.kaiju: "$NAME_Boss_Voidspawn$ пало, но внутри него всё еще пульсирует остаточная энергия, древняя и могучая. Тело его насытит нас, словно роскошное блюдо на пиру.\n\nСухожилия и костный мозг станут нам лакомством, а чужеродная сущность его объединится с нашей. Могущество убитого порождения не пропадет даром — оно станет служить нам."
 biocrisis.180.a: "Мы ни за что не будем добычей."
 biocrisis.180.b: "Пир только начинается."
 biocrisis.185.name: "Быть может лишь один"
 biocrisis.185.desc: "Пустота принесла нам жуткую весть: мы не единственные, кто встал на этот путь. В безднах родился новый исполин — самозванец, чудовищный в своем величии, стремящийся подражать нашему совершенству. Это недопустимо.\n\nВо вселенной нет места двум хищникам. Нет места переговорам. Только плоть, что будет пожрана. Охота начинается."
 biocrisis.185.a: "Мы вопьёмся в самое его сердце!"
 biocrisis.187.name: "Предупреждение: Исполин класса IV"
 biocrisis.187.desc: "Бездна шевелится\n\nГде-то среди звёзд одно государство достигло финальной стадии своего превращения, разводя исполинов уже не как оружие, но как сосуды. Не для завоеваний, но для слияния. Они жаждут стать слиянием разума и плоти, государства и ужаса.\n\nЕсли это произойдёт, не останется ни городов, ни народа — только единый, всепоглощающий голод.\n\nЭтого нельзя допустить. Остановить их можно только сейчас, пока ещё не слишком поздно."
 biocrisis.187.a: "Устроим на них охоту!"
 biocrisis.190.name: "Совершенная форма"
 biocrisis.190.desc: "Последние преграды пали. Самозванцы, претенденты, жалкие попытки сопротивления ничтожных — всё смолкло. Даже звезды дрожат, ибо мы стоим на пороге истинного преображения.\n\nНас больше не сковывают хрупкие формы предков. Планеты — это клетки. Государства — мимолетны. Скоро иллюзия индивидуальности растворится в безмерном, совершенном единстве Исполина. Разум и ужас, интеллект и голод — всё едино.\n\nПереход близится к концу. Когда он завершится, мы уже не будем просто существовать.\n\nМы будем процветать."
 biocrisis.190.a: "ЗАВЕРШИТЬ ПЕРЕХОД!"
 biocrisis.190.tt: "Через 30 дней мы победим в игре"
 biocrisis.190.b: "Подождите, мы еще не готовы."
 biocrisis.190.b.tt: "Продолжайте играть за текущее государство."
 BEHEMOTH_TRANSFERENCE_PROJECT: "Завершить переход"
 BEHEMOTH_TRANSFERENCE_PROJECT_DESC: "Долгие разговоры со Зверем подошли к концу. Мы стоим на грани перехода — достаточно лишь отдать приказ. Преображение уже совсем близко; вот-вот мы покинем опостылевшую планету, надолго привязавшую нас к себе, и сбросим оковы плоти и тяготения."
 biocrisis.191.name: "Победа Исполина"
 biocrisis.191.desc: "Слияние завершено!\n\nМы больше не те, кем были раньше, и не скованы пределами ничтожных существ. Мы — мысль и голод, сплетённые в единую волю, простирающуюся сквозь пустоту.\n\nГалактика беспомощна перед нами — такая хрупкая и мимолётная. Но мы выше простого господства. Мы свободны. Свободны остаться. Свободны уйти. Свободны охотиться.\n\nЧто мы сделаем с обретённой вечностью?"
 biocrisis.191.a: "Останемся в этой галактике... пока что."
 biocrisis.191.a.tt: "Исполины останутся существовать в виде диких существ. За них нельзя будет играть."
 biocrisis.191.b: "Пустота манит. Мы последуем."
 biocrisis.191.b.tt: "Исполинское государство исчезнет из галактики. За него нельзя будет играть."
 biocrisis.191.c: "Эти «охотники» сами станут добычей."
 biocrisis.192.name: "Неудержимый ужас"
 biocrisis.192.desc: "Всё кончено. [behemoth_winner.GetName] [behemoth_winner.GetName::вознёсся|||fem:вознеслась|||neut:вознеслось|||pl:вознеслись] над плотью, над государствами, над всем, что можно назвать цивилизацией. Это больше не народ. Это стихия.\n\nПланеты рассыпаются в прах перед ними. Флотилии горят. Последние убежища некогда великих держав разлетаются пеплом в пустоте. Они не ведут переговоров, не внимают мольбам.\n\nМы не герои, что вопреки всему выйдут победителями. Мы — последний крик перед тишиной."
 biocrisis.192.tt: "[behemoth_winner.GetName] вот-вот [behemoth_winner.GetName::победит|||pl:победят] в игре"
 biocrisis.196.name: "Проглоченные целиком"
 biocrisis.196.desc: "Много лет назад Исполин вместе со своими сородичами сбежал за пределы галактики. С большим облегчением мы наблюдали за тем, как страшный зверь, едва не ставший нашей погибелью, постепенно растворялся в черной межзвездной пустоте. Преодолев сотни тысяч световых лет, он бесследно пропал. Наша аппаратура не фиксирует ни излучения, ни остаточных изображений, ни гравитационной ряби — словно его никогда и не существовало."
 biocrisis.196.a: "Надо с этим разобраться."
 UNSETTLING: "Это вызывает тревогу."
 biocrisis.197.name: "Quis Venabitur Ipsos Venatori"
 biocrisis.197.desc: "На попытки раскрыть тайну исчезновения Исполина мы потратили несколько лет — и даже на шаг не приблизились к разгадке. Поскольку ни один гиперкоридор не простирается так далеко, то всё, что нам осталось, — это полагаться на гипотезы и строить модели на грани безумия. Что же произошло с ним в последние минуты?\n\nСущество совершенно не проявляло страха — оно спокойно летело вперед… а затем в один короткий миг его тело исказилось, свернулось внутрь, словно скрученная ткань, и исчезло, не оставив даже следов борьбы — и вообще каких-либо следов.\n\nВыдвигаемые предположения одно смелее другого: новая разновидность сверхсветового двигателя? Пространственный разрыв? Космическая аномалия? Или — что самое тревожное — его вовсе отправила в небытие некая сторонняя сила? Впрочем, какой бы истина ни была, она остается недостижимой — и, возможно, непостижимой."
 biocrisis.197.a: "Пожалуй, лучше об этом не думать."
 biocrisis.197.b: "Захваченные нами преторианцы начинают беспокоиться."
 biocrisis.265.name: "Мучительная погибель"
 biocrisis.265.desc: "Агония исполина в последние минуты его жизни невыносима. Мы слишком тесно слились с этим существом. Его сознание угасает, а вместе с ним угасаем и мы…"
 biocrisis.265.a: "!! - ... "
 biocrisis.520.name: "Титаническая оболочка"
 biocrisis.520.desc: "Исполин мёртв.\n\nЕго громадное тело безжизненно дрейфует в пустоте — памятник нашей победе и пределам познания. [Root.GetScientistPluralCapital] бросились изучать останки, изнывая от жажды познать все тайны его невозможного разума. Но попытки оживить зверя — машинами, некромантией, даже отчаянными заклинаниями — провалились.\n\nПричина теперь ясна: мозг исполина не был просто сетью клеток. Это была решётка органических сверхпроводников, сплетённых так, что ни один известный разум — искусственный, биологический или потусторонний — не смог бы её воспроизвести. После смерти его нейронная структура рассыпалась, и восстановить её уже невозможно. Ни энергия, ни воля, ни сила не вернут утраченное.\n\nВеличайший разум галактики затих навсегда."
 biocrisis.520.a: "Осталось лишь ничто."
 biocrisis.520.b: "Даже боги не вечны."
 BEHEMOTH_MUTATION_PROJECT: "$menp_behemoth_mutation_research$"
 BEHEMOTH_MUTATION_PROJECT_DESC: "Совершенные недавно открытия в области генетики исполинов теоретически можно использовать для вызова новых мутаций. Стабильность генов в этом случае пока остается под вопросом, однако мы уверены, что сможем разработать новые биологические улучшения, если нам хватит времени и ресурсов."
 BEHEMOTH_FATE_PROJECT: "Судьба Исполина"
 BEHEMOTH_FATE_PROJECT_DESC: "Покинув нашу галактику, Исполин растворился в космической пустоте. Мы можем попытаться разгадать тайну его исчезновения, однако на таком расстоянии придется действовать нестандартными методами. Ответы вряд ли окажутся простыми и понятными."
 behemoth_mutation_a: "$menp_behemoth_mutation_research$: агрессия"
 behemoth_mutation_a_tt: "Скорострельность орудий исполина: §G+$@behemoth_mutation_a_fire_rate_mult|0%$§!\n$MOD_SHIP_ARMOR_MULT$ исполина: §R$@behemoth_mutation_a_armor_mult|0%$§!\n$MOD_SHIP_SPEED_MULT$ исполина: §R$@behemoth_mutation_a_speed_mult|0%$§!"
 behemoth_mutation_a_desc: "Гигантские мускулы придают исполинам сокрушительную силу."
 behemoth_mutation_b: "$menp_behemoth_mutation_research$: сдержанность"
 behemoth_mutation_b_desc: "Благодаря инъекции радиотрофного генетического штамма значительно снижается потребность исполинов в пище."
 behemoth_mutation_c: "$menp_behemoth_mutation_research$: ловкость"
 behemoth_mutation_c_tt: "$MOD_SHIP_SPEED_MULT$ исполина: §G+$@behemoth_mutation_c_speed_mult|0%$§!\n$MOD_SHIP_EVASION_MULT$ исполина: §G+$@behemoth_mutation_c_evasion_mult|0%$§!"
 behemoth_mutation_c_desc: "Развитые подпространственные железы делают исполинов более проворными."
 behemoth_mutation_bio: "$menp_behemoth_mutation_research$: точность"
 behemoth_mutation_bio_tt: "Дальность действия орудий исполина: §G+$@behemoth_mutation_bio_weapon_range_mult|0%$§!\n$MOD_SHIP_ACCURACY_MULT$ исполина: §G+$@behemoth_mutation_bio_accuracy_mult|0%$§!"
 behemoth_mutation_bio_desc: "Обретенная многоглазость позволяет совершать высокоточные выстрелы на огромных расстояниях."
 behemoth_mutation_synth: "$menp_behemoth_mutation_research$: выносливость"
 behemoth_mutation_synth_tt: "$MOD_SHIP_ARMOR_MULT$ исполина: §G+$@behemoth_mutation_synth_armor_mult|0%$§!\n$MOD_SHIP_ARMOR_REGEN_ADD_PERC$ исполина: §G+$@behemoth_mutation_synth_armor_regen_add_perc|0%$§!"
 behemoth_mutation_synth_desc: "Многослойный панцирь из смеси сплавов и хитина надежно защищает жизненно важные органы."
 behemoth_mutation_corpo: "Коммерциализация исполина"
 behemoth_mutation_corpo_tt: "Ежемесячная торговля: §G+$@behemoth_mutation_corpo_trade_produces_mult|0%$§! за исполина"
 behemoth_mutation_corpo_desc: "Наши акционеры сначала с подозрением отнеслись к проекту «Исполин», однако быстро передумали, узнав, насколько высокой будет дивидендная доходность."
 behemoth_mutation_psi: "$menp_behemoth_mutation_research$: барьер"
 behemoth_mutation_psi_tt: "$MOD_SHIP_SHIELD_REGEN_ADD_PERC$ исполина: §G+$@behemoth_mutation_psi_shield_regen_add_perc|0%$§! за каждые $pop_group_unit$ должностей £job_telepath£ «$job_telepath_plural$» или «$job_transference_volunteer$»\n$MOD_SHIP_SHIELD_HARDENING_ADD$ исполина: §G+$@behemoth_mutation_psi_shield_hardening_add|0%$§! за каждые $pop_group_unit$ должностей £job_telepath£ «$job_telepath_plural$» или «$job_transference_volunteer$»\nТекущие сотни трудоустроенных (£job_telepath£ $job_telepath_plural$ и $job_transference_volunteer$): §Y[GetNumTelepathsAndTransference]§!"
 behemoth_mutation_psi_desc: "Исполины оторваны от Покрова, однако мы воспитали в них чувствительность к телепатам, достаточную для возведения защитных псионических барьеров."
 behemoth_mutation_psi_2: "$menp_behemoth_mutation_research$: псионика"
 behemoth_mutation_psi_2_desc: "О звери, мы предлагаем вам свою силу!"
 behemoth_mutation_cyber: "$menp_behemoth_mutation_research$: кибернетика"
 behemoth_mutation_cyber_desc: "Чтобы укротить всю мощь исполинов, мы разработаем самое продвинутое кибернетическое оборудование, какое только возможно."
 behemoth_cyber_rage: "$BLANK_STRING$"
 edict_behemoth_nanite_augmentation: "Аугментации для исполинов: наниты"
 edict_behemoth_nanite_augmentation_desc: "Панцири исполинов, содержащие в себе наниты, способны быстро восстанавливаться даже после самых тяжелых ранений."
 behemoth_nanite_augmentation_tt: "$MOD_SHIP_ARMOR_REGEN_ADD_PERC$ исполина: §G+$@behemoth_edict_armor_regen_add_perc|0%$§!"
 edict_behemoth_living_metal_augmentation: "Аугментации для исполинов: живой металл"
 edict_behemoth_living_metal_augmentation_desc: "Динамическая защита, полученная чередованием слоев живого металла и хитина, обладает повышенными абляционными свойствами."
 behemoth_living_metal_augmentation_tt: "$MOD_SHIP_ARMOR_HARDENING_ADD$ исполина: §G+$@behemoth_edict_armor_hardening_add|0%$§!"
 edict_behemoth_alloys_augmentation: "Аугментации для исполинов: сплавы"
 edict_behemoth_alloys_augmentation_desc: "Приваривание пластин из сплавов к панцирю — грубый, но эффективный метод."
 behemoth_alloys_augmentation_tt: "$MOD_SHIP_ARMOR_MULT$ исполина: §G+$@behemoth_edict_armor_mult|0%$§!"
 concept_edict_behemoth_nanite_augmentation: "$edict_behemoth_nanite_augmentation$"
 concept_edict_behemoth_living_metal_augmentation: "$edict_behemoth_living_metal_augmentation$"
 concept_edict_behemoth_alloys_augmentation: "$edict_behemoth_alloys_augmentation$"
 biocrisis.280.name: "$menp_behemoth_mutation_research$"
 biocrisis.280.desc: "Мы разработали несколько мутагенных формул, которые помогут исполинам обрести новые силы и лучше приспособиться к окружающим условиям, однако физиология этих существ такова, что они способны перенести лишь одну инъекцию. Попытка совместить несколько формул неизбежно выльется в катастрофическое разрушение клеток. Грань между эволюцией и гибелью невероятно тонка — выбирать придется тщательно."
 biocrisis.280.a: "Пусть станут злее!"
 biocrisis.280.b: "Пусть станут… меньше есть."
 biocrisis.280.c: "Пусть станут быстрее!"
 biocrisis.280.psi: "Пусть напитаются силой Покрова."
 biocrisis.280.bio: "Пусть станут смертоноснее!"
 biocrisis.280.cyber: "Надо обуздать их ярость."
 biocrisis.280.cyber.tt: "Наши исполины смогут с вероятностью §G25%§! сопротивляться гневу.\nВ гневе они получают §G+$@behemoth_cyber_rage_fire_rate_mult|0%$§! к скорострельности, §G+$@behemoth_cyber_rage_shield_penetration_add|0%$§! к пробиванию брони и §G+$@behemoth_cyber_rage_armor_penetration_add|0%$§! к пробиванию щитов."
 biocrisis.280.synth: "Пусть их броня станет непробиваемой."
 biocrisis.280.corp: "К чёрту все эти формулы. Будем делать плюшевые игрушки!"
 biocrisis.280.machine: "Соединить плоть со сталью."
 biocrisis.280.machine_tt: "Открывает три указа, касающихся §Yаугментаций для исполинов§!\n$t$«['concept_edict_behemoth_nanite_augmentation']»\n$t$«['concept_edict_behemoth_living_metal_augmentation']»\n$t$«['concept_edict_behemoth_alloys_augmentation']»"
 #Crisis Objectives
 crisobj_build_bioships_name: "Строить биокорабли"
 crisobj_build_bioships_desc: "Мы в совершенстве освоили выращивание биокораблей и теперь непрерывно оттачиваем эту технику. Симбиоз приносит исключительно преимущества: флотилии становятся сильнее, а наша хватка, сжимающая живой мир, — крепче."
 crisobj_breed_fauna_name: "Разводить космическую фауну"
 crisobj_breed_fauna_desc: "Мы в совершенстве освоили разведение космической фауны и теперь непрерывно оттачиваем эту технику. Симбиоз приносит исключительно преимущества: флотилии становятся сильнее, а наша хватка, сжимающая живой мир, — крепче."
 crisobj_kill_bioships_name: "Уничтожать биокорабли"
 crisobj_kill_bioships_desc: "Вражеские биокорабли — препятствие на пути к нашему владычеству над природой. Их необходимо решительно уничтожать, устраняя угрозу на корню."
 crisobj_kill_space_fauna_name: "Убивать космическую фауну"
 crisobj_kill_space_fauna_desc: "Враждебная космическая фауна — препятствие на пути к нашему владычеству над природой. Ее необходимо решительно уничтожать, устраняя угрозу на корню."
 crisobj_cap_fauna_name: "Захватывать космическую фауну"
 crisobj_cap_fauna_desc: "Дикие и своевольные обитатели космоса создают нам непредвиденные трудности. Их необходимо решительно захватывать: эти существа могут помочь нам овладеть галактикой."
 crisobj_build_behemoth_egg_name: "Выращивать яйца исполинов"
 crisobj_build_behemoth_egg_desc: "Выращивание огромных зигот — важный шаг в преодолении ограничивающего нас примитивизма планетной жизни."
 crisobj_birth_behemoth_name: "Порождать исполинов"
 crisobj_birth_behemoth_desc: "В безграничной пустоте мирового пространства под нашим чутким руководством вырастают существа колоссальных размеров. Эта сила, выросшая из наших грандиозных устремлений, перекроит соотношение сил в пользу нашего народа."
 crisobj_behemoth_rage_name: "Исполинская ярость"
 crisobj_behemoth_rage_desc: "Отпущенные на волю исполины буйствуют среди звезд, оставляя после себя лишь пыль. Их необузданная ярость — свидетельство нашего могущества: только мы смогли подчинить себе разрушительную силу природы. Теперь она слушается только нас."
 behemoth_mutation_reward: "Выберите мутацию"
 biocrisis.210.desc.base: "Мы чувствуем волнение. Грызущий нас голод не бездумен — он умеет приспосабливаться. В новых, только что зародившихся жизненных формах чувствуется безграничный потенциал.\n\n" #Introduction
 biocrisis.210.desc: "$biocrisis.210.desc.base$Без яиц невозможно будет развитие новых зародышей; они — залог нашего выживания и требуют тщательной заботы любой ценой. Мы направим эволюцию так, чтобы ее течение пошло на пользу будущим детенышам." #Egg
 biocrisis.210.a: "Ускорить развитие яиц."
 biocrisis.210.a.tt: "$behemoth_fast_egg_tt$\n\n§HОткрывает политику§!: «$behemoth_egg_policy$»\n$policy_behemoth_egg_policy_desc$"
 biocrisis.210.b: "Придать сил детенышам."
 biocrisis.210.b.tt: "$behemoth_slow_egg_tt$\n\n§HОткрывает политику§!: «$behemoth_egg_policy$»\n$policy_behemoth_egg_policy_desc$"
 biocrisis.210.c: "Укрепить оболочку."
 biocrisis.210.c.tt: "$behemoth_strong_egg_tt$"
 biocrisis.215.desc: "$biocrisis.210.desc.base$Мало какой вид способен пересекать целые системы, плывя по солнечным волнам. Ярость и мощь нашего народа — его главное преимущество в бою, но что, если мы станем еще и подвижнее?" #Mobility
 biocrisis.215.a: "Мы пересечем космос."
 biocrisis.215.a.tt: "Наш §Y$behemoth_04$§! получит §Yпрыжковый орган§!."
 biocrisis.215.b: "Стреляй быстро, двигайся еще быстрее."
 biocrisis.215.b.tt: "$behemoth_turbo_tt$"
 biocrisis.215.c: "Отдать предпочтение рефлексам."
 biocrisis.215.c.tt: "$behemoth_reflexes_tt$"
 biocrisis.215.d: "Стать незримым охотником."
 biocrisis.215.d.tt: "Наш §Y$behemoth_04$§! получит $@cloaking_high_strength|0+$ к эффективности маскировки."
 biocrisis.220.desc: "$biocrisis.210.desc.base$Если мы укрепим свою биологическую защиту, выдерживать обстрелы врагов станет проще: о многих ранах можно будет просто позабыть."
 biocrisis.220.a: "Толстокожесть нам не помешает."
 biocrisis.220.a.tt: "Наш §Y$behemoth_04$§! получит $@behemoth_1_hull_add|0+*$ к прочности корпуса."
 biocrisis.220.b: "Можно укрепить броню."
 biocrisis.220.b.tt: "Наш §Y$behemoth_04$§! получит $@behemoth_1_armor_add|0+*$ к очкам брони и $@behemoth_1_armor_hardening_add|%0+$ к закалке брони."
 biocrisis.220.c: "Если щиты станут прочнее, никто не сможет нам навредить."
 biocrisis.220.c.tt: "Наш §Y$behemoth_04$§! получит $@behemoth_1_shield_add|0*+$ к прочности щитов, $@behemoth_1_shield_regen_add_perc|%1+$ к ежедневному восстановлению щитов и $@behemoth_1_shield_hardening_add|%0+$ к усилению щитов."
 biocrisis.225.desc: "$biocrisis.210.desc.base$Для покорения новых пространств мы избрали один способ: войну. И сейчас у нас есть возможность стать сильнее."
 biocrisis.225.a: "При достаточном количестве энергии щиты уже не играют никакой роли."
 biocrisis.225.a.tt: "Наш §Y$behemoth_04$§! получит $@behemoth_shield_pen_add|%0+$ к пробиванию щитов и £exotic_gases£ $@behemoth_shield_pen_upkeep|0*-$ к ежемесячному содержанию."
 biocrisis.225.b: "Наши снаряды смогут пробивать даже самую прочную броню."
 biocrisis.225.b.tt: "Наш §Y$behemoth_04$§! получит $@behemoth_armor_pen_add|%0+$ к пробиванию брони и £volatile_motes£ $@behemoth_armor_pen_upkeep|0*-$ к ежемесячному содержанию."
 biocrisis.225.c: "Никакая мошкара не сможет нам помешать."
 biocrisis.225.c.tt: "Наш §Y$behemoth_04$§! получит $@behemoth_tracking_add|0*+$ к обнаружению, $@behemoth_point_defense_weapon_fire_rate_mult|%0+$ к скорострельности системы ПВО и £rare_crystals£ $@behemoth_tracking_upkeep|0*-$ к ежемесячному содержанию."
 biocrisis.230.desc: "$biocrisis.210.desc.base$В бою важна каждая секунда. Мощность нашего оружия — последнее, что успевает прочувствовать на себе враг перед тем, как расстаться со своей ничтожной жизнью."
 biocrisis.230.a: "Нужно удерживать их на месте: пусть познают на себе нашу мощь."
 biocrisis.230.a.tt: "$behemoth_drain_tt$"
 biocrisis.230.b: "Будем уничтожать их издалека."
 biocrisis.230.b.tt: "$behemoth_spike_tt$"
 biocrisis.230.c: "Будем разрывать их на части стратегически."
 biocrisis.230.c.tt: "$behemoth_burst_tt$"
 biocrisis.235.desc: "$biocrisis.210.desc.base$Мало кто выносливее нас, но все же стойкость не бывает лишней." #Tanky 2
 biocrisis.235.a: "Регенерация тканей обеспечит нам долгую жизнь."
 biocrisis.235.a.tt: "Наш §Y$behemoth_04$§! получит $@behemoth_2_hull_regen_add|%1+$ к ежедневному восстановлению обшивки."
 biocrisis.235.b: "Мы не станем сдаваться."
 biocrisis.235.b.tt: "Наш §Y$behemoth_04$§! получит $@behemoth_2_damage_reduction_mult|%1+$ к снижению урона."
 biocrisis.235.c: "Грубая сила — ответ на все вопросы."
 biocrisis.235.c.tt: "Наш §Y$behemoth_04$§! получит $@behemoth_2_damage_reduction_static|1+$ к снижению урона, $@behemoth_2_armor_hardening_add|%0+$ к закалке брони и $@behemoth_2_shield_hardening_add|%0+$ к усилению щитов."
 biocrisis.240.desc: "$biocrisis.210.desc.base$Рои наших детенышей будут обгладывать до последнего камня целые планеты и даже звездные системы, где есть что-либо съестное, — а оно есть много где. Но как лучше будет помочь нашему потомству?" #Support Ability
 biocrisis.240.a: "Мы разрешим им быть стремительными."
 biocrisis.240.a.tt: "$behemoth_buff_tt$"
 biocrisis.240.b: "Они сплотятся под нашим светом." #Summon a fleet
 biocrisis.240.b.tt: "$behemoth_summon_tt$"
 biocrisis.240.c: "Мы поможем им стать сильными." #Regen friendly bioships
 biocrisis.240.c.tt: "$behemoth_healing_tt$"
 biocrisis.245.desc: "$biocrisis.210.desc.base$Каждый обитатель этой галактики должен узреть нашу безжалостную силу. Следующий эволюционный шаг — улучшение боевых умений."
 biocrisis.245.a: "Отдадимся внутренней ярости."
 biocrisis.245.a.tt: "Вступая в бой, наш §Y$behemoth_04$§! получит §Y$behemoth_frenzy_modifier$§! на £time£ §Y$@behemoth_frenzy_duration|0$ дн.§!\n\n§Y$behemoth_frenzy_modifier$§!:$behemoth_frenzy_modifier_tt$"
 biocrisis.245.b: "Научимся контролировать ярость."
 biocrisis.245.b.tt: "Наш §Y$behemoth_04$§! получит \n$t$$MOD_SHIP_FIRE_RATE_MULT$: §G+$@behemoth_tempered_fire_rate_mult|0%$§! \n$t$$MOD_SHIP_SPEED_MULT$: §G+$@behemoth_tempered_speed_mult|0%$§! \n$t$$MOD_SHIP_HULL_REGEN_ADD_PERC$: $@behemoth_tempered_hull_regen_add_perc|%1+$ \n$t$$MOD_SHIP_ARMOR_REGEN_ADD_STATIC$: $@behemoth_tempered_armor_regen_add_static|0+$"
 biocrisis.245.c: "Направим нашу ярость на воодушевление окружающих."
 biocrisis.245.c.tt: "Вступая в бой, наш §Y$behemoth_04$§! будет давать §Y$behemoth_inspiration_modifier$§! в течение£time£ §Y$@behemoth_inspiration_duration|0$ дн.§! всем дружественным биокораблям в системе.\n\n§Y$behemoth_inspiration_modifier$§!:$behemoth_inspiration_modifier_tt$"
 biocrisis.250.name: "Прямой контроль"
 biocrisis.250.desc: "$biocrisis.210.desc.base$Теперь мы можем обрушить катастрофическую волну криокластического и пирокластического гнева, которая разорвёт саму реальность. Проще говоря, у нас есть оружие, способное испепелить всю галактику.\n\nНо наше господство не ограничивается разрушением. Мы чувствуем каждое сухожилие Исполина, каждый удар его сердца, каждую титаническую мышцу, покоряющуюся нашей воле, будто это наша собственная плоть. Лишь одной мыслью мы управляем этой титанической громадой: его конечностями, пастью, его рождённым в пустоте сердцем, что бьётся в такт нашим намерениям. Это не просто сосуд — теперь мы и есть Исполин." #Behemoth Superweapon
 biocrisis.250.a: "Теперь космос принадлежит нам."
 biocrisis.250.a.tt: "§HУстраняет модификаторы:§!\n§R$voidspawn_boss_invincible$§!\n$mod_damage_vs_country_type_voidspawn_boss_mult$ §R-1954%§!\n\n$behemoth_superweapon_tt$\n\n"
