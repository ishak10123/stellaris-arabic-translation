 ### BIOMORPHOSIS (GENETIC ASCENSION) SITUATION(S)
 ## REGULAR EMPIRE SITUATION
 #SET-UP / PREAMBLE
 genetic_ascension_situation: "Биоморфоз"
 genetic_ascension_situation_type: "$genetic_ascension_situation$"
 genetic_ascension_situation_desc: "Никакой естественный отбор, никакой дрейф генов больше не помешают нам добиться биологического господства. Всему нашему виду уготовано новое будущее, и сделать осталось совсем немного. [Owner.Species.GetFleshTypeCyberCreed] — наша глина, а мы — придающие ей форму творцы."
 genetic_ascension_situation_monthly_change_tooltip: "Труд наших генетиков планомерно приносит результаты."
 genetic_ascension_situation_outcome: "Мы раскроем полный потенциал манипуляций с генами и начнем новую страницу истории нашего вида.\n\nБиоморфоз станет апогеем наших изысканий."
 genetic_ascension_situation_pause_desc: "Инцидент приостановлен"
 genetic_ascension_approach_selected: "$TRIGGER_FAIL$Мы уже сделали выбор на этом этапе."
 situation_gene_tailoring_needed_desc: "$TRIGGER_FAIL$НЕТ технологии «['concept_gene_tailoring']»"
 mod_biomorphosis_progress_mult: "Ежемесячный прогресс инцидента «$genetic_ascension_situation$»"
 #STAGE EVENTS
 bio.5.name: "Изменение сущности" #STAGE ONE
 bio.5.desc.no_options: "Чтобы ускорить эволюцию, придется точно определиться, в каком направлении пойдет наш вид. По мере того как наши возможности становятся шире, растет осознание последствий этого шага: сама наша сущность изменится безвозвратно.\n\nОтноситься к направленной эволюции следует со всей серьезностью, поскольку от нее зависит наше будущее."
 bio.5.desc.has_options: "$bio.5.desc.no_options$\n\nСейчас следует выбрать путь, по которому пойдет наше преображение."
 bio.5.a: "Путь чистоты."
 bio.5.b: "Путь клонирования."
 bio.5.c: "Путь мутации."
 bio.10.name: "Переломный момент" #STAGE TWO
 bio.10.desc.no_options: "Мы добились немалых успехов в деле создания направленной эволюции — в частности, стали лучше разбираться в таких областях, как генетические признаки, размножение и секвенирование ДНК.\n\nТочка перелома уже близка. Еще несколько лет — и возможности нашей расы станут огромны."
 bio.10.desc.has_options: "$bio.10.desc.no_options$\n\nСейчас перед нами стоит выбор: остаться на прежнем пути или сконцентрироваться на чем-то другом на следующем этапе развития."
 bio.10.a: "Сосредоточиться на чистоте."
 bio.10.b: "Сосредоточиться на клонировании."
 bio.10.c: "Сосредоточиться на мутации."
 bio.15.name: "Эволюционное перепутье" #STAGE THREE
 bio.15.desc.no_options: "Мы стоим на пороге гигантского эволюционного скачка. Однако, чтобы раскрыть эволюционный потенциал целиком, понадобится принять непростое решение."
 bio.15.desc.has_options: "$bio.15.desc.no_options$\n\nА именно — вновь определить, какой конкретно путь нам выбрать."
 bio.15.a: "Мы выбираем чистоту."
 bio.15.b: "Мы овладеем искусством клонирования."
 bio.15.c: "Мутация проложит нам путь."
 genetic_ascension_approach_purity: "Чистота"
 genetic_ascension_approach_cloning: "Клонирование"
 genetic_ascension_approach_mutation: "Мутация"
 genetic_ascension_approach_purity_desc: "Мы направим все усилия на очищение."
 genetic_ascension_approach_cloning_desc: "Изучение клонирования — залог нашего развития."
 genetic_ascension_approach_mutation_desc: "Будущее невозможно без генетической мутации."
 bio.20.name: "Выбранный путь" #FINAL STAGE - TRADITION TREE CHOICE
 bio.20.desc: "Что бы мы ни выбрали — стремление к безупречной чистоте генов, массовое клонирование или улучшение тел с помощью направленных мутаций, — важно одно: пути назад уже не будет."
 bio.20.desc.evopred: "Наши организмы податливы от природы. Во всей вселенной нет формы жизни сложнее, чем мы. Перемены будут бесконечны — об этом позаботятся наши исследователи.\n\nБудущее зыбко. Об ином невозможно и мечтать."
 bio.20.a: "Мы познаем сущность чистоты."
 bio.20.b: "Мы добьемся успеха посредством клонирования."
 bio.20.c: "Мы обуздаем силу мутаций."
 #Random Events
 bio.50.name: "Некоторые равнее"
 bio.50.desc: "Та часть населения, что прошла через очищение генов, теперь считает себя высшим слоем общества и на этом основании требует сокращения рабочего дня, большего количества благ и расширения доступной им политической власти. Их поведение на митингах становится всё агрессивнее; подобные выступления — настоящее потрясение для общества."
 bio.50.a: "Ужесточить меры против демонстрантов."
 bio.50.b: "Такие претензии вполне обоснованы."
 bio.55.name: "Социальный митоз"
 bio.55.desc: "Новостные издания подогревают раскалывающие общество разногласия. Распадаются семьи, расходятся друзья — и всё потому, что обладателям модифицированных генов доступно гораздо больше возможностей.\n\nСами модифицированные считают, что за ними будущее нашей расы. Традиционалисты же утверждают, что мы зашли слишком далеко."
 bio.55.a: "Превосходному миру — превосходный народ."
 bio.55.b: "Возможно, не помешает сбавить темп."
 bio.60.name: "Кислотное неравенство"
 bio.60.desc: "В некоторых отраслях набирает популярность произвольное тестирование на чистоту генов. Прошедшим отдается предпочтение при устройстве на работу и поступлении в учебные заведения, а также при занятии руководящих должностей.\n\nОбщественное мнение разделилось. Кто-то считает, что обладатели чистых генов действительно сильнее и здоровее других, иные же утверждают, что такой подход лишь порождает дискриминацию тех, кто не может или не хочет менять свой геном в погоне за генетическим совершенством."
 bio.60.a: "Нет ничего важнее равенства возможностей."
 bio.60.b: "Выживает сильнейший."
 bio.65.name: "Герои и злодеи"
 bio.65.desc: "Очищение генов придало смелости некоторым неравнодушным гражданам. Небольшие группы сверхсильных, сверхловких и сверхвыносливых защитников общественного порядка взяли поддержание закона в свои [owner.species.GetHandNamePlural].\n\nОднако зло не дремлет: где-то свои коварные планы вынашивают такие же обладатели очищенных генов, желающие склонить чашу весов на свою сторону. Столкновения между этими группировками не только выливаются в материальный ущерб, но и подвергают опасности мирных жителей."
 bio.65.a: "На наших улицах не будет самосуда."
 bio.65.b: "Пусть сражаются и дальше."
 MAVERICK_CITIZENS_MOD: "[enforcer.GetIcon] §Y[enforcer.GetNamePlural]§! производят §G+2§! к £stability£ §Yстабильности§! и §G+2§! к £unity£ §Yединству§! за каждые 100 должностей."
 bio.66.name: "Сверхограничения"
 bio.66.desc: "Мы всерьез взялись за борьбу с обладателями сверхсил, и теперь им грозят суровые дисциплинарные меры. За вигилантами ведется постоянная слежка: это помогает нам реагировать своевременно.\n\nОднако не все ценят наше стремление сделать так, чтобы новообретенные силы использовались только во благо государства. Среди как генетически чистых, так и обычных граждан растут страх и презрение к нам. Общественное мнение разделилось."
 bio.66.a: "Организовать воинские части из обладателей сверхсил."
 bio.66.b: "Восстановить доброе имя ущемленных."
 bio.67.name: "Сверхзависимость"
 bio.67.desc: "Мы слишком привыкли полагаться на услуги генетически улучшенных народных мстителей. Такой подход оказался палкой о двух концах: с одной стороны, эти поборники справедливости обеспечивают спокойный сон и благополучие граждан, с другой — мы больше не можем представить себе существование без их помощи.\n\nБлагодарный народ обращается сразу к обладателям сверхсил в обход всех судебных процедур и властей. Грань между правительством и героями размылась; наша власть висит на волоске."
 bio.67.a: "Собрать совет из сверхсилачей!"
 bio.67.b: "Ограничить вмешательство «героев» в правительственные дела."
 bio.70.name: "Один в двух лицах"
 bio.70.desc: "Нам стало известно, что один выдающийся лидер, трудолюбие которого служит примером для всей галактики, существует в двух экземплярах.\n\nДругой экземпляр — это безупречный клон, работающий во вторую смену. Пока один исполняет государственные и административные обязанности, второй отдыхает и восстанавливается.\n\nЭто неожиданное открытие стало настоящим потрясением на политической арене нашей галактики. Помимо того, что под сомнение попало представление о сути руководства в целом, народ также начинает задаваться вопросами о нравственных границах клонирования."
 bio.70.a: "Выгодное применение клонирования."
 bio.70.b: "Уволить обоих за такой обман."
 bio.75.name: "Бунт клонов"
 bio.75.desc: "Практика выращивания клонов ради изъятия их органов обернулась неприятными последствиями: несколько клонов (по всей видимости, наделенных разумом) объявили протест и устроили длительную голодовку.\n\nХотя некоторые считают, что здоровье и жизнь оригинала важнее благополучия копии, есть и те, кто утверждает, что каждое мыслящее существо имеет право на самостоятельность. Этот вопрос сейчас вызывает ожесточенные споры."
 bio.75.a: "Прекратить пересадку органов."
 bio.75.b: "Права оригиналов — важнейшая ценность."
 bio.80.name: "Бремя доказательства"
 bio.80.desc: "Правоохранительная система оказалась в затруднительном положении: уровень преступности в столице растет, а количество предстающих перед судом преступников — уменьшается. Подозреваемые всё чаще отрицают свою вину и утверждают, что преступления совершают их клоны.\n\nЕсли поймать преступника с поличным не удается, доказать вину практически невозможно. Некоторые судьи уже призывают отменить уголовную ответственность за большую часть преступлений."
 bio.80.a: "Усилить слежку."
 bio.80.b: "Меньше законов — меньше преступлений."
 bio.85.name: "Поразительное сходство"
 bio.85.desc: "Наши блюстители порядка обнаружили подпольную фабрику клонов. Размах ее деятельности впечатляет: тысячи и тысячи клонов, каждый из которых выглядит в точности как [Owner.Leader.GetTitle] нашего государства [Owner.Leader.GetName]. Арестованные ученые из числа работников фабрики отказываются сотрудничать со следствием — они утверждают, что им неизвестно, кто именно заказал эту партию.\n\nНемногочисленные улики свидетельствуют, что заказчиком может выступать непосредственно [Owner.Leader.GetName], однако допросить [Owner.Leader.GetAXX::его|||fem:ее] уже не получится, поскольку [Owner.Leader.GetAXX::он пропал|||fem:она пропала] бесследно."
 bio.85.a: "Умертвить клонов."
 bio.85.b: "Нам досталась целая армия клонов."
 bio.85.b.tt: "([owner.capital_scope.GetName]):\nСоздается одна §Y$clone_army$§!."
 bio.85.c: "Выпустить клонов на свободу."
 bio.85.c.tt: "Мы получим несколько §Yпоселений§!."
 bio.86.name: "Неожиданное недовольство"
 bio.86.desc: "Наше решение подвергнуть эвтаназии сразу несколько тысяч клонов вызвало в обществе серьезное возмущение. Разгневанные активисты, выступающие за права [Owner.GetSpeciesAdj&fem,gen] расы, и различные религиозные группы выходят на масштабные протесты.\n\nТем временем до нас начали доходить слухи, что часть клонов сбежала и успешно слилась с населением…"
 bio.86.a: "Возможно, это такой урок…"
 bio.86.b: "Приказать силовикам заткнуть этот сброд."
 bio.86.b.tt: "([owner.capital_scope.GetName]):\nСоздается три §Y$assault_army_plural$§!."
 bio.90.name: "Коммуна мутантов"
 bio.90.desc: "Многих обладателей заметных или необычных мутаций наше общество просто отвергает. Эти мутанты вынуждены скрываться в подполье, где они уже начали образовывать собственные анклавы.\n\nТе, кто заходит туда, обычно не возвращаются."
 bio.90.a: "Зачистить все анклавы."
 bio.90.b: "Следить за их начинаниями — издалека."
 bio.95.name: "Бунт трансгенных"
 bio.95.desc: "Маргинальная молодежь нашла новый способ развлечения: радикальное изменение внешности.\n\nПоследняя тенденция в мире моды — страсть к фасеточным глазам; популярны и состязания по приращению к телу дополнительных конечностей. Непобитый пока рекорд — 156.\n\nЭти биохакеры неизменно привлекают внимание публики, а заодно вызывают опасения по поводу безопасности подобных занятий. Всё громче раздаются голоса, призывающие к введению строгих ограничений на генетические мутации. Нашему правительству пора выразить официальное мнение."
 bio.95.a: "Это всё просто безобидные забавы."
 bio.95.b: "156 конечностей — это перебор."
 bio.100.name: "Неожиданные изъяны"
 bio.100.desc: "Широкое распространение в нашем обществе генетических мутаций породило невиданное физиологическое разнообразие.\n\nНекогда предсказуемые процессы обзавелись таким количеством непредвиденных переменных, что стандартизация стала почти невозможна.\n\nЧувство физической общности, еще не так давно объединявшее всех нас, растворяется на глазах. На смену единству форм приходит многообразие, и сплоченность народа отходит в прошлое."
 bio.100.a: "Поощрить разнообразие."
 bio.100.a.tt: "§Y400§! случайных £pop£ §Hпоселений§! получат признак «['trait:trait_bioadaptability']», «['trait:trait_social_pheromones']» или «['trait:trait_limited_regeneration']»."
 bio.100.b: "Ввести обязательный стандартный генетический шаблон."
 bio.105.name: "Клеточная аморфность"
 bio.105.desc: "Эксперимент по генетической модификации обернулся настоящей катастрофой. По замыслу ученых, сращивание ДНК подопытных с ДНК других многоклеточных организмов должно было вызвать гипериммунный ответ и тем самым обеспечить полную защиту от всех вирусов.\n\nОднако добились они совсем другого: появления на свет существа, стремительно растворяющего стенки клеток любого организма, которого оно касалось. Растворенных оно вбирало в себя, на глазах превращаясь в огромную аморфную биомассу.\n\nВырвавшись на свободу, сгусток покатился по лаборатории, пожирая всё на своем пути. Пока что нам удалось его сдержать, однако нельзя допустить, чтобы он покинул стены комплекса. К счастью, эта биомасса, похоже, съедобна…"
 bio.105.a: "Нейтрализовать сгусток!"
 bio.105.b: "Стоит его изучить — это оправданный риск."
