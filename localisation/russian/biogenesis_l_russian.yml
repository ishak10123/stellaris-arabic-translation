 living_standard_disconnected_drone: "Защита"
 living_standard_disconnected_drone_tooltip: "Поселения этой расы могут работать в £building£ §Yинопланетных зоопарках§!"
 living_standard_disconnected_drone_tooltip_delayed: "$citizenship_protected_drone_tooltip_delayed$"
