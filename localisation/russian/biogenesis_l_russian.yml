 ### NEW CIVICS ###
 civic_genetic_identification: "Генетическая идентификация"
 civic_genetic_identification_desc: "Каждого новорожденного гражданина этого общества вносят в генетический реестр, активно использующийся бюрократическим аппаратом."
 civic_corporate_genetic_identification: "Последовательная безопасность"
 civic_corporate_genetic_identification_desc: "Генетические последовательности каждого клиента и каждого сотрудника сохраняются в базу данных. Доступ к ней за умеренную плату может получить любой желающий. Базой данных широко пользуются правоохранительные органы, опознающие злоумышленников даже по минимальным следам генного материала."
 civic_corporate_genetic_identification_effects: "• £building£ §Y$building_private_security$§!: этот $megacorp_civic_branch_office_building_effect$"
 councilor_genetic_identification: "Индексатор"
 councilor_genetic_identification_desc: "$TITLE$ отвечает за ведение и поддержание генетического реестра, без которого невозможна устойчивая работа бюрократического аппарата."
 councilor_corporate_genetic_identification: "Посредник по последовательностям"
 councilor_corporate_genetic_identification_desc: "$TITLE$ анализирует запросы на доступ и оценивает планы монетизации. Генетическая идентификация какой угодно личности — вполне посильная для него задача."
 civic_crowdsourcing: "Привлечение общественности"
 civic_crowdsourcing_desc: "Граждане этого общества осознают, что вдохновение отдельно взятых личностей — залог всеобщего развития. Общедоступные патенты, открытый образ мышления, спонтанные сотрудничества и премии за инновации толкают прогресс вперед."
 civic_crowdsourcing_effects: "$t$- Фракции производят $r_research$, а не $r_unity$$TABBED_NEW_LINE$- Фракции появятся в государстве вскоре после начала игры, однако в первые десять лет будут производить лишь ограниченное количество ресурсов"
 civic_corporate_crowdsourcing: "Децентрализованные НИОКР"
 civic_corporate_crowdsourcing_desc: "Постоянные состязания между отделами в области инновационных разработок побуждают инженеров и конструкторов этой корпорации создавать что-то новое."
 civic_corporate_crowdsourcing_effects: "$civic_crowdsourcing_effects$$TABBED_NEW_LINE$- £building£ §Y$building_private_research_initiative$§!: $megacorp_civic_branch_office_building_effect$"
 civic_tooltip_not_crowdsourcing: "НЕТ гражданской модели «['concept_crowdsourcing_civics']»"
 concept_crowdsourcing_civics: "Привлечение общественности"
 concept_crowdsourcing_civics_desc: "К гражданским моделям категории «$concept_crowdsourcing_civics$» относятся:$NEW_LINE$- «['civic:civic_crowdsourcing']»$NEW_LINE$- «['civic:civic_corporate_crowdsourcing']»"
 councilor_crowdsourcing: "Координатор инноваций"
 councilor_crowdsourcing_desc: "$TITLE$ контролирует правомерное использование патентов и разрабатывает поощрения для исследователей, придерживающихся государственного технологического курса."
 councilor_corporate_crowdsourcing: "Арбитр идей"
 councilor_corporate_crowdsourcing_desc: "Не каждый проект стоит вложений. $TITLE$ оценивает рыночную привлекательность и прибыльность каждого начинания."
 civic_civil_education: "Гражданское образование"
 civic_civil_education_desc: "В этом государстве образовательная система полностью вытеснила правоохранительную. Программы обучения крайне обширны, а курсы аккуратно адаптируются, чтобы получить образование мог каждый. Ведь не бывает плохих граждан — бывают плохие учителя."
 civic_civil_education_effects: "$t$- Все £job_enforcer£ ['concept_enforcer', силовики] заменяются на £job_educator£ ['concept_educator', педагогов]$TABBED_NEW_LINE$£building£ ['building:building_precinct_house'] заменяются на £building£ ['building:building_state_academy', государственную академию]"
 councilor_head_of_education: "Главный педагог"
 councilor_head_of_education_desc: "$TITLE$ отвечает за обучение граждан не только профессиональным навыкам, но и умению ориентироваться в жизни вообще. Правильное воспитание — залог здорового общества."
 educator: "$job_educator$"
 job_educator: "Педагог"
 job_educator_plural: "Педагоги"
 job_educator_desc: "Труд их незаменим: они несут свет знания молодому поколению и готовят будущих граждан к жизни среди звезд."
 job_educator_effect_desc: "£job_educator£ $job_educator_plural$ с помощью £consumer_goods£ §Yтоваров массового спроса§! производят $r_unity$, снижают £crime£ §Y$PLANET_CRIME_TITLE$§!, увеличивают §Yпривлекательность руководящих принципов§! и создают £defense_army£ §Yоборонительные армии§!"
 mod_job_educator_add: "Должности педагогов"
 building_state_academy: "Государственная академия"
 building_state_academy_desc: "Здесь преподаются фундаментальные знания, необходимые для построения здорового общества."
 concept_state_academy: "$building_state_academy$"
 concept_state_academy_desc: "Должности педагогов: §G+200§!\n\n$job_educator_effect_desc$\n$h_line$§L$building_state_academy_desc$§!"
 building_center_of_guidance: "Центр наставничества"
 building_center_of_guidance_desc: "Сотрудники этого огромного учебно-образовательного комплекса способны исправить любое отклонение, мешающее полноценной жизни."
 mod_planet_jobs_citizen_produces_mult: "Производительность полноправных граждан"
 civic_hive_familiar_face: "Знакомое лицо"
 civic_hive_familiar_face_desc: "Сотрудничество лучше прямого противостояния. Этот коллективный разум вырастил дипломатических трутней, способных принимать форму и перенимать манеры собеседников."
 civic_wilderness_familiar_face: "$civic_hive_familiar_face$"
 civic_wilderness_familiar_face_desc: "Сотрудничество лучше прямого противостояния. Это дикое сознание вырастило дипломатические аватары, способные принимать форму и перенимать манеры собеседников."
 civic_hive_familiar_face_effects: "Послы и чиновники принимают физическую форму обитателей той империи, куда они назначены.\nУровень §Yдоверия§!, требуемый для §Yдипломатических действий§!: §G−50%§!"
 #Bioship Civics
 civic_hive_shared_genetics: "Общая генетика"
 civic_hive_shared_genetics_desc: "В основу биокораблей, выращиваемых этим ульем, лег его мутировавший геном. Флотилии улья от природы связаны с единицами Разума; уникальность этой расы — ее сила."
 civic_wilderness_shared_genetics: "$civic_hive_shared_genetics$"
 civic_wilderness_shared_genetics_desc: "Один из геномов этого дикого сознания мутировал так, что на его основе стало возможно выращивать биокорабли. Его флотилии неразрывно связаны с другими симбионтами — каждая раса опирается на сильные стороны друг друга."
 civic_hive_shared_genetics_effects: "- За каждый §Gположительный§! признак главной расы: §G+2,5%§! к корпусу корабля, §R+0,5%§! к содержанию.\n- За каждый §Rотрицательный§! признак главной расы: §G+1,5%§! к скорострельности корабля, §R+0,5%§! к содержанию."
 shared_genetics_fire_rate: "$civic_hive_shared_genetics$: скорострельность"
 shared_genetics_fire_rate_desc: "Избыточная стимуляция центров агрессии идет на пользу нашим кораблям. Гормоны и злость — гремучая, но действенная смесь."
 shared_genetics_hull: "$civic_hive_shared_genetics$: корпус"
 shared_genetics_hull_desc: "Превосходная генетика нашей расы благоприятствует развитию у кораблей прочных мускулов и костей."
 civic_hive_aerospace_adaptation: "Аэрокосмическая адаптация"
 civic_hive_aerospace_adaptation_desc: "Биокорабли этого коллективного разума хорошо приспособлены к межатмосферным перелетам. Благодаря этому они могут оказывать поддержку с воздуха или даже помогать с планетарными перевозками."
 civic_hive_aerospace_adaptation_effects: "- Затраты на содержание §Yбиокораблей§! на орбите §Gдружественных§! колоний: §G−50%§!.\n- §GДружественные§! колонии, на орбите которых есть §Yбиокорабли§!, получают прибавку к §Yскорости строительства§!, §Yблагам§!, §Yскорости расчистки препятствий§! и потенциально к §Yпроизводительности рабочих§! в зависимости от размера флотилии.\n- Затраты на содержание §Yбиокораблей§! на орбите §Rвраждебных§! колоний: §G−85%§!."
 aa_ship_upkeep_friendly: "$civic_hive_aerospace_adaptation$"
 aa_ship_upkeep_bombing: "$civic_hive_aerospace_adaptation$"
 aa_ship_planet_support_1: "$civic_hive_aerospace_adaptation$"
 aa_ship_planet_support_1_desc: "Биокорабли на орбите этой планеты регулярно входят в атмосферу и покидают ее, чтобы отдохнуть, покормиться и помочь единицам Разума на поверхности."
 aa_ship_planet_support_2: "$civic_hive_aerospace_adaptation$"
 aa_ship_planet_support_2_desc: "$aa_ship_planet_support_1_desc:$"
 aa_ship_planet_support_3: "$civic_hive_aerospace_adaptation$"
 aa_ship_planet_support_3_desc: "$aa_ship_planet_support_1_desc:$"
 aa_ship_planet_support_4: "$civic_hive_aerospace_adaptation$"
 aa_ship_planet_support_4_desc: "$aa_ship_planet_support_1_desc:$"
 civic_machine_stalwart_network: "Крепкая сеть"
 civic_machine_stalwart_network_desc: "Этот машинный разум специализируется на защите, умело сочетая прочную оборону с тактикой наскоков и отходов."
 defensive_stations_tracking_add: "$t$- Отслеживание на космических базах и оборонительных станциях"
 defensive_stations_tracking_add_tt: "$defensive_stations_tracking_add$: $VARIABLE|0=+$"
 defensive_stations_weapon_range_mult: "Дальность действия орудий космических баз и оборонительных станций"
 defensive_stations_weapon_range_mult_tt: "$defensive_stations_weapon_range_mult$: $VARIABLE|1%=+$"
 #Bodysnatcher
 civic_hive_bodysnatcher: "Похититель тел"
 civic_hive_bodysnatcher_desc: "Главное — содержание, а не форма. Этот улей — настоящий мастер внедрения в общества органиков. Он присваивает себе тела несчастных жертв, превращая их в марионеток, и со временем поглощает всю цивилизацию целиком."
 civic_hive_bodysnatcher_effects: "Вы начинаете игру с §Y1000§! ассимилированных £pop£ поселений и возможностью §Yассимилировать§! органиков в коллективный разум.\nДоступно шпионское задание «['concept_operation_bodysnatcher_prepare_invasion']»\nПолучите дополнительные £pop£ поселения от шпионского задания «['concept_operation_smuggle_pops']»"
 civic_hive_bodysnatcher_secondary_species: "Самозванцы"
 NAME_Bodysnatchers: "Похитители тел"
 operation_bodysnatcher_prepare_invasion: "Подготовить вторжение"
 operation_bodysnatcher_prepare_invasion_desc: "Наши соседи очень легко поддаются влиянию. Заслав к ним подготовленные тела, уже интегрированные в наше сознание, мы облегчим себе задачу по включению этой цивилизации в свои ряды."
 operation_bodysnatcher_prepare_invasion_on_success: "$IF_SUCCESSFUL|E$\nВнедренные агенты помогут нам, если мы объявим войну §Y[Target.GetName&dat]§!."
 operation_invasion_prepared: "$TRIGGER_FAIL$ §RМы уже подготовили вторжение в это государство. Объявите ему войну, чтобы вторгнуться.§!"
 operation_invasion_impossible: "$TRIGGER_FAIL$ §RЭто государство слишком хорошо подготовилось к попыткам внедрения. Невозможно начать операцию!§!"
 concept_operation_bodysnatcher_prepare_invasion: "$operation_bodysnatcher_prepare_invasion$"
 concept_operation_bodysnatcher_prepare_invasion_desc: "Операция, в ходе которой ассимилированные представители той же расы, что и цель, внедряются в государство, чтобы организовать массовые диверсии при начале войны."
 bio.800.name: "Новая работа"
 bio.800.desc: "Перед тем как приступить к исполнению грандиозного замысла, засланные тела нужно будет разместить в стратегически важных местах. Разведка выявила основные цели — недоукомплектованные космические базы и плохо защищенные планеты. Вскоре мы возьмемся за дело."
 bio.805.name: "Дополнительные кадры"
 bio.805.desc: "Работа идет по плану. Наши тела нашли себе еще больше хозяев, а значит, усилилось вмешательство в дела [Target.GetName&gen]. Вскоре наши единицы поглотят самых любопытных."
 bio.810.name: "Новые бреши"
 bio.810.desc: "[Target.GetSpeciesNamePlural], которых оказалось невозможно заменить, смещены со своих должностей, и теперь в §Y[Target.GetName&prep]§! образовалась нехватка кадров. Наши марионетки уже готовы обеспечить нам полное внедрение — достаточно лишь дать разрешение."
 bio.815.name: "Новобранцы"
 bio.815.desc: "В §Y[From.Target.GetName&prep]§! всё готово к нашему вторжению. Осталось лишь определиться, сколько самозванцев мы зашлем, чтобы внедриться в это государство еще глубже. Вскоре оно целиком станет [Owner.GetAdj&neut,inst]."
 bio.815.tt: "У нас недостаточно населения, принадлежащего к этой расе."
 bio.815.a: "Мы отправили всех, кого смогли."
 bio.815.b: "Захватить их форпосты."
 bio.815.b.tt: "Отправить §Y100§! £pop£ §Hпоселений§!.\n$bio.815.reminder$"
 bio.815.c: "Подготовиться ко вторжению на их планеты."
 bio.815.c.tt: "Отправить §Y300§! £pop£ §Hпоселений§!.\n$bio.815.reminder$"
 bio.815.d: "Внедриться в их крепости!"
 bio.815.d.tt: "Отправить §Y500§! £pop£ §Hпоселений§!.\n$bio.815.reminder$"
 bio.815.e: "Захватить их целиком!"
 bio.815.e.tt: "Отправить §Y2K§! £pop£ §Hпоселений§!.\n$bio.815.reminder$"
 bio.815.reminder: "Следующая война, которую мы объявим §Y[From.Target.GetName&dat]§! (либо которая будет объявлена нам) в течение §G10§! лет, будет вестись с участием подготовленных нами диверсантов."
 bio.825.name: "Вторжение [From.GetSpeciesNamePlural&gen]"
 bio.825.desc.small: "Коварнейшим образом [From.GetName::<1> внедрился|||fem:<1> внедрилась|||neut:<1> внедрилось|||pl:<1> внедрились] в наше государство. Шпионы проникли даже на космические станции и уже вторгаются в колонии. Нужно как можно скорее устранить самозванцев!"
 bio.825.desc.large: "Когда наша коммуникационная сеть потеряла половину своих мощностей, мы посчитали произошедшее сбоем.\n\nОднако на самом деле всё гораздо хуже: предательским образом [From.GetName::<1> внедрился|||fem:<1> внедрилась|||neut:<1> внедрилось|||pl:<1> внедрились] в целые сектора нашего государства, подменив ключевых сотрудников на своих диверсантов. Держава расколота, а враг вторгается в колонии.\n\nДоверять нельзя никому!"
 #Smuggle pops operation
 operation_smuggle_pops: "Вывезти население"
 operation_smuggle_pops_desc: "Наши оперативники проведут масштабную эксфильтрацию изолированных элементов в [target.GetName&prep]"
 operation_smuggle_pops_on_success: "$IF_SUCCESSFUL|E$\nНесколько £pops£ поселений переместятся в наше государство."
 smuggle_pops_also_fanatic_egalitarians: "$TRIGGER_FAIL$ §R[Target.GetName] тоже [Target.GetName::придерживается|||pl:придерживаются] принципов фанатичного эгалитаризма, народ там уже свободен§!"
 smuggle_pops_not_enough_pops: "$TRIGGER_FAIL$ §R[Target.GetName]: недостаточно достойных для похищения £pops£ поселений§!"
 mod_operation_smuggle_pops_difficulty_add: "Сложность операции «$operation_smuggle_pops$»"
 concept_operation_smuggle_pops: "$operation_smuggle_pops$"
 concept_operation_smuggle_pops_desc: "Операция по похищению населения из другого государства."
 bio.900.name: "Приобретение талантов"
 bio.900.desc: "Наши оперативники развернули сеть наблюдательных пунктов и тайных убежищ, откуда ведётся мониторинг населения [target.GetName&gen]. Выявленные инакомыслящие, одиночки и высококвалифицированные специалисты будут отобраны для извлечения."
 bio.905.name: "Исчезновения"
 bio.905.desc: "Наши оперативники начали задерживать цели и тайно перемещать их в удалённые области. По возможности инсценируются происшествия, чтобы отвлечь местные власти и замести следы."
 bio.910.name: "Транспортировка"
 bio.910.desc: "Операция перешла в финальную фазу: всех задержанных необходимо незаметно переправить на орбиту. Текущий план — синхронизировать отправку со всех объектов и перегрузить силы безопасности ложными целями и отвлекающими манёврами."
 bio.915.name: "Вывоз"
 bio.915.desc: "Нам удалось тайно вывезти множество целей, однако операция прошла не слишком гладко: многие корабли с перспективными индивидами пришлось бросить."
 bio.915.desc.detected: "$bio.915.desc$\n\nСтоль масштабные перемещения населения не остались незамеченными."
 bio.915.desc.cosmogenesis: "Мы успешно извлекли большинство целей — их уже отправляют в синаптический станок. Однако операция прошла не слишком гладко: многие корабли с перспективными индивидами пришлось бросить."
 bio.915.desc.cosmogenesis.detected: "$bio.915.desc.cosmogenesis$\n\nСтоль массовые перемещения не могли пройти незамеченными."
 bio.915.a: "Мы сделали всё, что могли."
 bio.915.b: "Сосредоточимся на освобождении остальных [Root.GetSpeciesNamePlural&gen]."
 bio.915.c: "Нужно вытащить как можно больше!"
 bio.915.d: "Ни один [GetSpeciesName] не будет брошен на произвол судьбы!"
 bio.915.tt: "Эвакуировать оставленные £pop£ §Hпоселения§! в подходящие миры."
 bio.915.asset.tt: "$bio.915.tt$\nДаже если §Y[From.Target.GetName]§! ещё не [From.Target.GetName::догадывался|||fem:догадывалась|||neut:догадывалось|||pl:догадывались] о нашей причастности, §Rтеперь они знают.§!"
 MESSAGE_POPS_SMUGGLED_TITLE: "Население похищено"
 MESSAGE_POPS_SMUGGLED_DESC: "Двуличные махинаторы из государства $COUNTRY|Y$ внедрились к нам и похитили наше население!"
