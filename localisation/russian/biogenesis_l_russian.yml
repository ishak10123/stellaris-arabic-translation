 job_skywatcher: "Смотритель за небом"
 job_skywatcher_plural: "Смотрители за небом"
 job_skywatcher_desc: "Особым образом подготовленные защитники, постоянно поддерживающие защищенную связь с цитаделью в дальнем космосе."
 job_skywatcher_effect_desc: "£job_skywatcher£ $job_skywatcher_plural$ повышают £stability£ §Yстабильность§!, создают £defense_army£ §Yоборонительные армии§! и увеличивают £mod_country_naval_cap_add£ §Yвместимость флота§! во всем государстве. Также благодаря им §Y$dsc_name_plural$§!, §Y$starbases$§! и §Y$military_station_small_plural$§! действуют эффективнее."
