 death_world: "Мир смерти"
 death_world_desc: "Этот мир обитаем, однако здесь невозможно жить — только выживать. Вся жизнь на этой планете, и животная (вплоть до безобидных на вид жучков), и растительная, опаснее самого смертоносного хищника нашего родного мира."
 d_lethal_ecosphere_blocker: "£blocker£ Смертоносная экосфера"
 d_lethal_ecosphere_blocker_desc: "Здесь царствует кровавый неестественный отбор: эксперименты и просто отдельные особи, привезенные сюда Фрагментом войны, постоянно конкурируют друг с другом за жизнь. Мало какой солдат выйдет живым с этого страшного полигона, однако выживших эта борьба превратит в настоящие машины для убийств."
