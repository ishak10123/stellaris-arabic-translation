 #Siege of the Citadel Event Chain
 bio.2005.name: "Необычные колебания"
 bio.2005.desc: "$job_skywatcher_plural$ сообщили нам тревожные новости.\n\nВнутри портала в системе §Y[Root.Capital.System.GetName]§! недавно были зафиксированы слабые, но безошибочно узнаваемые колебания: точно такие же обычно предшествуют вторжению вражеских биологических флотилий.\n\nЕсли аппаратура не ошиблась, то это значит, что до следующего нападения осталось всего несколько месяцев. Само существование нашего народа вновь зависит исключительно от твердости духа его защитников."
 abandoned_hatchery_chain_1: "Осада цитадели"
 abandoned_hatchery_chain_1_title: "$abandoned_hatchery_chain_1$"
 abandoned_hatchery_chain_1_desc: "На протяжении многих десятилетий нас беспрестанно атакуют [GetInvadersLower]. Их удары стойко принимает на себя первая линия обороны — $starbase_deep_space_citadel_1$, однако мирный сон будет невозможен, пока мы не выясним всю правду о врагах.\n\nС каждым новым открытием всё ближе становится тот день, когда мы сможем наконец нанести ответный удар и покончить с затянувшейся осадой раз и навсегда."
 bio.2015.name: "Останки врага"
 bio.2015.desc: "По просторам системы §Y[Root.Capital.System.GetName]§! зловеще дрейфуют останки уничтоженной нами биофлотилии. Искореженная и обуглившаяся во многих местах органика тем не менее достаточно хорошо сохранилась, чтобы ее можно было изучить.\n\nТщательный анализ останков, возможно, приподнимет завесу тайны над этими отвратительными кораблями, а заодно и над загадочным порталом, из которого они атакуют наш дом."
 PROJECT_HATCHERY_SHIP_REMAINS: "Изучить останки биокораблей"
 PROJECT_HATCHERY_SHIP_REMAINS_DESC: "Возможность изучить останки флотилии, на которой прибыли [GetInvadersLower], — большая удача. Вероятно, мы сможем многое узнать."
 bio.2015.a: "Наконец-то успех."
 bio.2020.name: "Враг изучен"
 bio.2020.desc: "Тщательно изучив останки биокораблей в системе §Y[Root.Capital.System.GetName]§!, наши [Root.GetScientistPlural] заключили, что, возможно, эта флотилия — ключ к пониманию загадки портала, который расположился на самом краю системы.\n\nТкани уничтоженных существ изнутри выстроены по определенной закономерности, обеспечивающей резонанс с колебаниями портала. Восстановив эту частоту с помощью инженерного анализа, мы теоретически сможем самостоятельно пройти через таинственный разлом.\n\nПеред этим понадобится провести еще некоторые исследования, но по крайней мере нам впервые представилась возможность дать бой врагу на его собственной территории."
 abandoned_hatchery_chain_2: "$abandoned_hatchery_chain_1$"
 abandoned_hatchery_chain_2_title: "$abandoned_hatchery_chain_1$"
 abandoned_hatchery_chain_2_desc: "Мы на шаг приблизились к раскрытию тайн портала. Пройти через него пока нельзя, однако нам хватает знаний для разработки соответствующей технологии.\n\nЧтобы начать ответное вторжение, понадобится технология §Yстабилизации червоточин§!."
 bio.2025.name: "Вражеское логово"
 bio.2025.desc: "Благодаря недавнему прорыву в области §Yстабилизации червоточин§! наша аппаратура смогла зафиксировать необычный всплеск энергии в системе §Y[event_target:starlit_sealed_system.GetName]§!.\n\nНа той стороне нас ждут готовый к бою биологический флот и тщательно укрепленная космическая база. Рекомендуется действовать крайне осторожно.\n\nМы нашли вражеское логово."
 abandoned_hatchery_chain_3: "$abandoned_hatchery_chain_1$"
 abandoned_hatchery_chain_3_title: "$abandoned_hatchery_chain_1$"
 abandoned_hatchery_chain_3_desc: "Мы обнаружили, где укрывается враг, однако чтобы добраться до его тайн, сначала придется преодолеть оборону.\n\nСражение будет непростым, но в случае победы ничто не помешает нам внимательно изучить систему §Y[event_target:starlit_sealed_system.GetName]§!."
 bio.2027.name: "Страх перед гибелью"
 bio.2027.desc: "Флотилия, охраняющая систему §Y[starlit_sealed_system.GetName]§!, уничтожена. Перед тем как погибнуть окончательно, местная космическая база успела передать последнее, пугающее своим содержанием сообщение, которое мы мгновенно перевели:\n\n§H«…всё вышло из-под контроля! Корабли размножаются сами по себе! Спасите нас, кто-нибудь!»§!\n\nПосле этого наступило молчание. Теперь вражеская территория станет для нас стратегически важным плацдармом — если, конечно, мы действительно одержали победу. Возможно, когда-нибудь под звездой системы §Y[starlit_sealed_system.GetName]§! появится новый бастион дальнего космоса, способный надежно защитить наш народ от любых угроз."
 bio.2027.a: "Наконец-то осада снята."
 citadel_siege_lifted: "Осада снята"
 citadel_siege_lifted_desc: "Наконец-то [GetInvadersLower] побеждены. Усилиями наших отважных защитников бесконечная осада прекратилась."
 citadel_siege_lifted_machine: "$citadel_siege_lifted$"
 citadel_siege_lifted_machine_desc: "$citadel_siege_lifted_desc$"
 abandoned_hatchery_chain_4: "$abandoned_hatchery_chain_1$"
 abandoned_hatchery_chain_4_title: "$abandoned_hatchery_chain_1$"
 abandoned_hatchery_chain_4_desc: "Все [GetInvadersLower], находившиеся в системе §Y[starlit_sealed_system.GetName]§!, уничтожены окончательно, однако встретившее нас здесь зрелище — совсем не то, что мы ожидали.\n\nВсё, что осталось от наших мучителей, — это опустошенный мир."
 PROJECT_BIOMECHANICAL_WORLD: "Дом врага"
 PROJECT_BIOMECHANICAL_WORLD_DESC: "Мир, который населяли [GetInvadersLower]. Но кто они и что им было нужно от нас?"
 bio.2030.name: "Биомеханическая чума"
 bio.2030.desc: "§Y[event_target:biomechanical_world_target.GetName]§! — братская могила.\n\nГосподствовавший на планете вид стал добычей необычной и агрессивной формы жизни. Более тщательный осмотр подтвердил, что истребившие коренных обитателей организмы — не столько живые существа, сколько биологические машины; их не строили — их выращивали.\n\nМогло ли получиться так, что создатели этих существ пали жертвой собственного творения? Действовал ли враг сознательно? Осознавал ли он вообще факт нашего существования?\n\nПока уверенно сказать можно только одно: все попытки жителей планеты сдержать нашествие привели к их гибели. Вместе с ними вымерли и чудовищные машины."
 bio.2030.a: "Значит, мы не единственные пострадавшие…"
 smarter_hatchery: "Улучшенные флотилии"
 smarter_hatchery_desc: "Они учатся. Они приспосабливаются. Они уже близко."
 bio.2030.tt: "\n§EОткрывает должность в совете:§!\n§H$t$$councilor_warden_of_the_citadel$§!\n$tt$$COUNCIL_POSITION_MODIFIER_BASE$\n$ttt$$MOD_SHIP_FRIENDLY_TERRITORY_ARMOR_MULT$: §G+1%§!\n$ttt$$mod_shipsize_starbase_deep_space_citadel_1_hull_mult$: §G+2%§!\n$ttt$$mod_starbases_upkeep_mult$: §G-5%§!\n$COUNCIL_POSITION_AVAILABLE_FOR$$t$$commander_with_icon$"
 councilor_warden_of_the_citadel: "Смотритель цитадели"
 councilor_warden_of_the_citadel_desc: "$TITLE$ — наш надежный защитник и опора. Он несет ответственность за укрепление обороны, готовность войск и решимость народа встретить любую угрозу единым фронтом."
 mod_shipsize_starbase_deep_space_citadel_1_hull_mult: "$HITPOINTS$ бастиона в дальнем космосе"
 mod_shipsize_starbase_deep_space_citadel_2_hull_mult: "$HITPOINTS$ крепости в дальнем космосе"
 mod_shipsize_starbase_deep_space_citadel_3_hull_mult: "$HITPOINTS$ цитадели в дальнем космосе"
 siege_node: "Осадный узел"
 siege_node_desc: "Мы научились. Мы приспособились. Наша оборона выстоит."
 bio.2036.name: "Они учатся"
 bio.2036.desc: "Манера атаки биологических кораблей вызывает у нас некоторую тревогу: с каждой новой волной враг действует все более слаженно, подстраивается под нашу тактику и систематически прощупывает оборону. Информация с датчиков не оставляет сомнений: энергетические следы носят совсем иной характер. Изменились и предпочтения в выборе целей.\n\nПротивник набирает силу. Мы не знаем, что им движет — инстинкты или коллективный разум, но ясно одно: если это не прекратить, отбить следующую волну будет еще сложнее."
 bio.2036.a: "Помолимся за защитников."
 bio.2036.b: "Пожелаем защитникам сил."
 bio.2036.tt: "С каждой последующей волной прибывающие через §Yлюбопытную червоточину§! флотилии будут становиться сильнее."
 bio.2040.name: "Проигравший враг"
 bio.2040.desc: "По поступающим из портала телеметрическим данным стало понятно, что в системе §Y[event_target:starlit_sealed_system.GetName]§! только что изменился расклад сил: как флот биологических кораблей, так и выводивший их инкубатор оказались уничтожены неизвестной силой.\n\nИ хотя мы рады тому, что [GetInvadersLower] больше не смогут нас терзать, всё-таки нельзя оставлять без внимания появление нового игрока — вполне вероятно, что [event_target:starlit_sealed_system.GetName] теперь будет принадлежать ему.\n\nЭтот плацдарм необходимо занять как можно скорее, пока нам не устроили очередную осаду."
 bio.2040.a: "Друзья… или новые враги?"
 citadel_siege_cancelled: "Осада отменена"
 citadel_siege_cancelled_desc: "Все [GetInvadersLower] уничтожены. Можно ли считать осаду нашей системы снятой?"
 citadel_siege_cancelled_machine: "$citadel_siege_cancelled$"
 citadel_siege_cancelled_machine_desc: "$citadel_siege_cancelled_desc$"
