 job_skywatcher_add_dsc_tt: "\nУлучшение §Yцитадели в дальнем космосе§! предоставит больше должностей £job_skywatcher£ §Yсмотрителей за небом§!."
 job_skywatcher_drone: "Единица — смотритель за небом"
 job_skywatcher_drone_plural: "Единицы — смотрители за небом"
 job_skywatcher_drone_desc: "Особым образом подготовленные единицы Разума, постоянно поддерживающие защищенную связь с цитаделью в дальнем космосе."
 job_skywatcher_drone_effect_desc: "£job_skywatcher_drone£ $job_skywatcher_drone_plural$ повышают £stability£ §Yстабильность§!, создают £defense_army£ §Yоборонительные армии§! и увеличивают £mod_country_naval_cap_add£ §Yвместимость флота§! во всем государстве. Также благодаря им §Y$dsc_name_plural$§!, §Y$starbases$§! и §Y$military_station_small_plural$§! действуют эффективнее."
