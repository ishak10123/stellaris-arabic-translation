 mod_job_skywatcher_drone_add: "Должности единиц — смотрителей за небом"
 job_skywatcher_drone_add_dsc_tt: "\nУлучшение §Yцитадели в дальнем космосе§! предоставит больше должностей £job_skywatcher£ §Yсмотрителей за небом§!."
 d_bioship_remains: "Останки биологического корабля"
 d_bioship_remains_desc: "Разлагающиеся останки последней биологической флотилии, решившей испытать нашу оборону на прочность. Запах гнили разносится на многие километры."
 d_invasion_site: "Место вторжения"
 d_invasion_site_desc: "Опаленные и разрушенные обломки наших жилищ и инфраструктуры, уничтоженных неизвестной армией."
 d_invasion_site_tooltip: "Предоставляет небольшое количество £unity£ §Yединства§!."
 concept_bioship_remains: "$d_bioship_remains$"
 concept_bioship_remains_desc: "- $MOD_PLANET_MAX_DISTRICTS_ADD$: §R−1§!$NEW_LINE$- £mod_pop_environment_tolerance£ $MOD_POP_ENVIRONMENT_TOLERANCE$: §R−10%§!$NEW_LINE$- $MOD_POP_HAPPINESS$: §R−5%§!$NEW_LINE$- Время на расчистку: £time£ 360 §Iдней§!$NEW_LINE$- Стоимость расчистки: $TABBED_NEW_LINE$- 400 £energy£ §Iэнергии§!\n\n§L$d_bioship_remains_desc$§!"
 concept_invasion_site: "$d_invasion_site$"
