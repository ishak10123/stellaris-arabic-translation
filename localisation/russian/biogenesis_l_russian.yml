 concept_growth_factor: "$growth_factor_desc$"
 concept_growth_factor_desc: "Показатель роста — мера количества питательных веществ, которые усвоил ваш исполин. Влияет на скорость развития инцидента.\n\nКаждый месяц уменьшается на §R0,75%§!\n\n$behemoth_finale_situation_monthly_change_tooltip$\n\nМинимальное значение равняется §G0,5%§! за каждые $pop_group_unit$ £pop£ §Hперенесенных поселений§!."
 behemoth_finale_situation_desc: "Приспособиться к такой гигантской оболочке получится не сразу. Но, осваиваясь в новом теле, нельзя забывать про окружающий мир: между нами и космической пустотой теперь нет никаких преград.\n\nТекущий ['concept_growth_factor']: §G[growth_factor_value]%§!"
