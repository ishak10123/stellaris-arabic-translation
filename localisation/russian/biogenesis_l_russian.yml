 concept_automodding_habitability_desc: "- В зависимости от планеты прежние модификаторы объединяются с новыми из заранее составленных списков.\n- Ежемесячно проходящие проверку £pop£ §Hпоселения§!, у которых есть §Y$concept_automodding_traits$§! (в каждой колонии): §G100§!\n- Сооружения для прироста населения и сборки поселений увеличивают количество ежемесячно обновляемых автомодифицированных £pop£ §Hпоселений§!."
