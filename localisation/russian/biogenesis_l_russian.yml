 bio.1050.desc: "Наши агенты незаметно осматривают поселения [Target.GetSpeciesNamePlural&gen] и вскоре смогут проникнуть в их постройки. Всему свое время: мы терпеливы и знаем, что охота не любит спешки."
 bio.1055.name: "Готовность к удару"
 bio.1055.desc: "Решающий миг близок; охотники уверены в своих силах. Еще немного — и они получат доступ к жилищу [Target.GetSpeciesNamePlural&gen], а значит, и к их ДНК. Вскоре список наших жертв пополнит новый пункт: [Target.GetName]."
 bio.1060.name: "Бросок"
 bio.1060.desc: "Агенты готовы. Они проникли в жилье [Target.GetSpeciesNamePlural&gen] и добыли соответствующую маскировку. Разумеется, как и полагается опытным охотникам, они заранее проработали пути отступления, хотя не все нравятся им одинаково — например, будет неприятно убегать через канализацию."
 bio.1065.name: "Гены похищены"
 bio.1065.desc: "Задача выполнена! Наши агенты вернулись с обильным запасом генетического материала. Во время следующей мутации нас наверняка ждут новые успехи. Возможно, нам даже понравятся [From.Target.GetSpeciesNamePlural]…"
 #Toast
