 concept_genetic_purity: "Генетическое совершенство расы"
 concept_genetic_purity_desc: "Государствам, принявшим традиции ['tradition_category:tradition_purity', чистоты], доступны подстраивающиеся эффекты и модификаторы, воздействующие на £pop£ §Hпоселения органиков§! и £leader£ §Hлидеров§!.$TABBED_NEW_LINE$- Увеличивается за трату очков признаков на §Gположительные§! признаки расы.$TABBED_NEW_LINE$- Уменьшается за получение очков признаков от §Rотрицательных§! признаков расы."
 trait_leader_genetic_purist: "Приверженец генетической чистоты"
 trait_leader_genetic_purist_desc: "Этот лидер руководствуется непоколебимым стремлением к генетической чистоте и не приемлет несовершенства ни в какой форме."
 auth_bio_democratic_purity: "Фенотипическая автономия"
 auth_bio_democratic_purity_tt: "$pop_effects_from_purity_header$ $TABBED_NEW_LINE$- £mod_pop_happiness£ $MOD_POP_HAPPINESS$: $plus_minus_icon$§Y$@purity_traits_happiness|1%$§! $DOUBLE_NEW_LINE$$authority_grants_genetic_purist_tt$ $TABBED_NEW_LINE$- $mod_leaders_upkeep_mult$ $minus_plus_icon$§Y2,5%§! $TABBED_NEW_LINE$- $MOD_LEADER_SPECIES_EXP_GAIN$ $plus_minus_icon$§Y2,5%§!"
 auth_bio_democratic_purity_desc: "У каждого есть право на самоопределение во всём, что касается тела. Государство поощряет граждан видоизменять свои оболочки так, как захочется им. Тело превратилось в холст, возможности изменения ограничены лишь силой воображения."
 auth_bio_oligarchic_purity: "Евгеническая иерархия"
 auth_bio_oligarchic_purity_tt: "$eugenic_political_power_effects$"
 auth_bio_oligarchic_purity_desc: "Абсолютная власть может быть доверена только генетически приспособленной для этого элите — самым чистым и способным представителям этой цивилизации, которым уготовано предопределять ее судьбу. Под их началом каждый гражданин будет выполнять отведенную ему роль, отобранную с учетом унаследованных генов. Довольство проистекает не из удовлетворения своих стремлений, а из смирения с предназначением."
 eugenic_political_power_effects: "$pop_effects_from_purity_header$ $TABBED_NEW_LINE$- $MOD_POP_BONUS_WORKFORCE_MULT$: $plus_minus_icon$§Y$@purity_traits_bonus_workforce_mult|2%$§! $DOUBLE_NEW_LINE$$authority_grants_genetic_purist_tt$ $TABBED_NEW_LINE$- $MOD_COUNCIL_AGENDA_PROGRESS_SPEED$: $plus_minus_icon$§Y$@purity_traits_council_speed|Y1%$§!"
 auth_bio_dictatorial_purity: "Нуклеиновая юстиция"
 auth_bio_dictatorial_purity_tt: "$pop_effects_from_purity_header$ $TABBED_NEW_LINE$£society£ Социологические исследования за каждые $pop_group_unit$ £pop£ поселений: $plus_minus_icon$§Y$@purity_traits_resource$§! $DOUBLE_NEW_LINE$$authority_grants_genetic_purist_tt$ $TABBED_NEW_LINE$– $MOD_PLANET_CRIME_ADD$ на планете: $minus_plus_icon$§Y5,0§! $TABBED_NEW_LINE$– $MOD_PLANET_CRIME_ADD$ в секторе: $minus_plus_icon$§Y2,5§! $TABBED_NEW_LINE$– $MOD_PLANET_STABILITY_ADD$ на планете: $plus_minus_icon$§Y5,0§! $TABBED_NEW_LINE$– $MOD_PLANET_STABILITY_ADD$ в секторе: $plus_minus_icon$§Y2,5§!"
 auth_bio_dictatorial_purity_desc: "С помощью генетических и биометрических данных правительство выявляет предрасположенность граждан к преступлениям на генетическом уровне. Своевременное вмешательство до совершения злодеяния гарантирует общественный порядок, поскольку подлинное правосудие действует превентивно и искореняет преступность в зародыше."
 auth_bio_imperial_purity: "Биотическое господство"
 auth_bio_imperial_purity_tt: "£leader£ §Y$imperial_ruler$§! и §Yнаследник§! получают следующие эффекты от ['concept_genetic_purity', генетической чистоты]:$TABBED_NEW_LINE$- $MOD_LEADER_SKILL_ADD$: $plus_minus_icon$§Y$@purity_traits_imperial_level|2$§! $DOUBLE_NEW_LINE$£leader£ Лидеры той же расы, что и §Y[Ruler.GetTitle]§!, получают черту §Y$imperial_bloodline$§!\n£leader£ Эффекты §Yимперской родословной§! от ['concept_genetic_purity', генетической чистоты]: $TABBED_NEW_LINE$- $MOD_LEADER_LIFESPAN_MULT$: $plus_minus_icon$§Y$@purity_traits_imperial_bloodline|1%$§! $TABBED_NEW_LINE$- $MOD_LEADER_SPECIES_EXP_GAIN$: $plus_minus_icon$§Y$@purity_traits_imperial_bloodline|1%$§!"
 auth_bio_imperial_purity_desc: "В отчаянной борьбе за генетическое превосходство это правительство продлевает жизнь лидерам. Сохранение и распространение только лучших генов — вот залог процветания всего общества и наступления будущего, построенного на превосходстве. Беспрестанный надзор за генофондом гарантирует прогресс, а наградой за борьбу станут долголетие и совершенство."
 auth_bio_corporate_purity: "Органический синдикат"
 auth_bio_corporate_purity_tt: "$organic_leaders_have_trade_upkeep$\n\n$pop_effects_from_purity_header$ $TABBED_NEW_LINE$£trade£ §YТорговля§! за каждые $pop_group_unit$ £pop£ поселений: $plus_minus_icon$§Y$@purity_traits_resource$§! $DOUBLE_NEW_LINE$"
 auth_bio_corporate_purity_desc: "Эта мегакорпорация саму жизнь превратила в товар, научившись извлекать прибыль из выращивания органов. Органы высшего сорта продаются по невероятным ценам, а «излишнее» имущество иногда оказывается на черном рынке. Загадочные посредники и подпольные хирурги чувствуют себя вольно при этом строе — они всегда готовы прийти на помощь отчаявшимся покупателям и проследить за тем, чтобы ничего не пропадало зря."
 #Cloning
 auth_bio_democratic_cloning: "Согласие во множестве"
 auth_bio_democratic_cloning_tt: "$ENABLES_BACKUP_CLONES$\nСодержание §Yлидера-клона§!: §G$@cordant_multiplicity_clone_upkeep|0%$§!\n§Y$leader_trait_backup_clone_default_plural$§! менее подвержены ['concept_clone_leader_degradation', деградации] и не могут обладать собственными §Yзапасными клонами§!"
 auth_bio_democratic_cloning_desc: "Символом равенства и прогресса это правительство избрало технологию клонирования. Клоны стоят плечом к плечу с теми, кто родился естественным путем, и мнение их имеет не меньшую ценность. Здесь важен каждый взгляд — в том числе и клона."
 auth_bio_oligarchic_cloning: "Воспроизводящиеся власти"
 auth_bio_oligarchic_cloning_tt: "$ENABLES_BACKUP_CLONES$\nПризнак §Y«$leader_trait_has_backup_clone$»§! дает советникам дополнительные эффекты\n§Y$leader_trait_backup_clone_default_plural$§!, заседающие в совете, менее подвержены ['concept_clone_leader_degradation', деградации]\n"
 auth_bio_oligarchic_cloning_desc: "Власть элит в этом обществе бессменна и принадлежит целым династиям отборных клонов. Благодаря технологии клонирования их генетическое наследие не только сохраняется, но и доводится до совершенства, что позволяет передавать власть внутри правящей верхушки беспрепятственно. Каждая сколько-нибудь важная должность традиционно переходит более качественной копии того, кто занимал ее прежде, — и так на протяжении поколений."
 auth_bio_dictatorial_cloning: "Единообразие в послушании"
 auth_bio_dictatorial_cloning_tt: "$ENABLES_BACKUP_CLONES$\n$AVAILABLE_POLICIES$ §Y$policy_homogenous_class$§!"
 auth_bio_dictatorial_cloning_desc: "Тщательный генетический отбор гарантирует абсолютную преданность: клонированию подвергаются лишь те, в кого заложено беспрекословное послушание. Таким образом создается самоподдерживающийся порядок, где бунты не только невообразимы — они невозможны биологически. Сама «конструкция» граждан способствует установлению полного согласия."
 auth_bio_imperial_cloning: "Наследственная преемственность"
 auth_bio_imperial_cloning_tt: "$ENABLES_BACKUP_CLONES$\nЧерта §Y«$leader_trait_backup_clone_imperial$»§! не будет сопровождаться новыми штрафами"
 auth_bio_imperial_cloning_desc: "Свою неоспоримую безупречность правитель сохраняет посредством клонирования: каждая новая копия великого государя унаследует всю мудрость и достижения своих предшественников. Постоянная передача власти самому себе обеспечивает постоянный общественный прогресс; под мудрым руководством этого владыки народ его не знает ничего, кроме процветания."
 auth_bio_corporate_cloning: "Воспроизводящая ассоциация"
 auth_bio_corporate_cloning_tt: "$organic_leaders_have_trade_upkeep$\n$ENABLES_BACKUP_CLONES$\n $mod_planet_jobs_trade_produces_mult$ от £building£ ['building:building_clone_vats', фабрик клонов]: §G+$@replicatory_association_trade_mult|0%$§!\n£mod_planet_amenities_add£ Планетарные блага от £building£ §Yфабрик клонов§!: §G+$@replicatory_association_amenities_add|0$§!\n$AVAILABLE_POLICIES$ §Y«$policy_replicatory_association_insurance$»§!"
 auth_bio_corporate_cloning_desc: "Удобство и комфорт еще никогда не были настолько доступны: клонировать самого себя на случай, если понадобится запасная конечность либо орган, или заказать копию безвременно скончавшейся возлюбленной может каждый желающий. Гарантированная мегакорпорацией точность каждого клонирования — не менее 93%. Передовые технологии в области точного копирования брошены на борьбу с одиночеством."
 AUTHORITY_HAS_CLONE: "$t$После §Yсмерти правителя§! новым правителем становится §Y$leader_trait_backup_clone_imperial$§!. $TABBED_NEW_LINE$§Y$leader_trait_backup_clone_imperial_plural$§! менее подвержены ['concept_clone_leader_degradation', деградации]."
 policy_replicatory_association_insurance: "Репликантная страховка"
 policy_replicatory_association_insurance_desc: "Члены совета директоров и другие важные сотрудники получают доступ к клонированию в первую очередь в рамках программы компенсации."
 replicatory_association_insurance_stellar: "Звездная страховка"
 replicatory_association_insurance_stellar_name: "$replicatory_association_insurance_stellar$"
 replicatory_association_insurance_stellar_desc: "$leader_upkeep_skill_header_energy$ §R+$@replicatory_association_insurance_upkeep|0$§!\n§Y$leader_trait_has_backup_clone_plural$§! §Yлидеров§! менее подвержены ['concept_clone_leader_degradation', деградации]"
 replicatory_association_insurance_platinium: "Платиниевая страховка"
 replicatory_association_insurance_platinium_name: "$replicatory_association_insurance_platinium$"
 replicatory_association_insurance_platinium_desc: "$councilor_upkeep_skill_header_energy$ §R+$@replicatory_association_insurance_upkeep|0$§!\n§Y$leader_trait_has_backup_clone_plural$§! §Yсоветников§! менее подвержены ['concept_clone_leader_degradation', деградации]"
 replicatory_association_insurance_basic: "Базовая страховка"
 replicatory_association_insurance_basic_name: "$replicatory_association_insurance_basic$"
 replicatory_association_insurance_basic_desc: "$ruler_upkeep_skill_header_energy$ §R+$@replicatory_association_insurance_upkeep|0$§!\n§Y$leader_trait_has_backup_clone_plural$§! §Yправителя государства§! менее подвержены ['concept_clone_leader_degradation', деградации]"
 leader_upkeep_skill_header_energy: "$i_energy$ на содержание £leader£ лидера за уровень навыка:"
 councilor_upkeep_skill_header_energy: "$i_energy$ на содержание £leader£ советника за уровень навыка:"
 ruler_upkeep_skill_header_energy: "$i_energy$ на содержание £leader£ правителя за уровень навыка:"
 policy_homogenous_class: "Адаптация генома"
 policy_homogenous_class_desc: "Тщательная настройка базового генома, используемого для поддержания клонов наших лидеров, позволяет оптимизировать отобранный персонал."
 homogenous_class_scientists: "Научный кодекс"
 homogenous_class_scientists_name: "$homogenous_class_scientists$"
 homogenous_class_scientists_desc: "Эффекты для §Yзапасных клонов§!, принадлежащих £scientist£ учёным: $TABBED_NEW_LINE$• $society_upkeep_skill_header$ §R+$@homogenous_clone_upkeep|0$§! $TABBED_NEW_LINE$• Замедление ['concept_clone_leader_degradation', деградации]"
 homogenous_class_officials: "Административные записи"
 homogenous_class_officials_name: "$homogenous_class_officials$"
 homogenous_class_officials_desc: "Эффекты для §Yзапасных клонов§!, принадлежащих £official£ чиновникам: $TABBED_NEW_LINE$• $society_upkeep_skill_header$ §R+$@homogenous_clone_upkeep|0$§! $TABBED_NEW_LINE$• Замедление ['concept_clone_leader_degradation', деградации]"
 homogenous_class_commanders: "Военный протокол"
 homogenous_class_commanders_name: "$homogenous_class_commanders$"
 homogenous_class_commanders_desc: "Эффекты для §Yзапасных клонов§!, принадлежащих £commander£ командирам: $TABBED_NEW_LINE$• $society_upkeep_skill_header$ §R+$@homogenous_clone_upkeep|0$§! $TABBED_NEW_LINE$• Замедление ['concept_clone_leader_degradation', деградации]"
 society_upkeep_skill_header: "$i_society$ на содержание:"
 concept_auth_bio_democratic_cloning: "Согласие во множестве"
 concept_auth_bio_oligarchic_cloning: "Воспроизводящиеся власти"
 concept_auth_bio_dictatorial_cloning: "Единообразие в послушании"
 concept_auth_bio_imperial_cloning: "Наследственная преемственность"
 concept_auth_bio_corporate_cloning: "Воспроизводящая ассоциация"
 #Mutation
 auth_mutation_habitability_tt: "Приспособленность органических рас может достигать §G175%§!"
 auth_bio_democratic_mutation: "Свобода биоразнообразия"
 auth_bio_democratic_mutation_desc: "Это общество живет по принципу «мое тело — мой храм». Каждый волен распоряжаться своим телом как захочет — полная свобода и поддержка гарантированы. Возможности граждан по изменению своих оболочек и раскрытию своего истинного потенциала крайне широки."
 auth_bio_oligarchic_mutation: "Каталитическое управление"
 auth_bio_oligarchic_mutation_desc: "Власть в этом обществе безраздельно принадлежит высшему классу, наделенному недоступными другим генетическими мутациями. Они действуют вне рамок законов и всегда готовы пойти на что угодно, лишь бы вверенное им общество и дальше процветало под защитой своих покровителей."
 auth_bio_dictatorial_mutation: "Гибридное предписание"
 auth_bio_dictatorial_mutation_desc: "В основе развития этого общества лежит обязательная генетическая мутация. Тем, кто не хочет меняться, грозит интернирование или даже уничтожение, поскольку двигаться к совершенству имеют право лишь обладатели высококачественных генов."
 auth_bio_dictatorial_mutation_tt: "\n£crime£ [enforcer.GetIcon] [enforcer.GetNamePlural] снижают преступность на §G5§!\n$auth_mutation_habitability_tt$"
 auth_bio_imperial_mutation: "Геномная экспансия"
 auth_bio_imperial_mutation_desc: "Это государство целиком полагается на непредсказуемую природу случайных мутаций, сулящих невероятные достижения и новшества, которых невозможно достичь традиционными способами. Генетический хаос — главное его преимущество в погоне за верховенством и непревзойденным превосходством."
 auth_bio_corporate_mutation: "Органы в рост"
 auth_bio_corporate_mutation_desc: "Благодаря гибкой системе взносов взять органы или части тела в кредит здесь может каждый. Просрочка платежа наказывается удержанием или изъятием обговоренного залога. Такая система обеспечивает постоянство спроса и предложения: каждая часть тела одновременно и товар, и обязательство."
 auth_bio_corporate_mutation_tt: "$organic_leaders_have_trade_upkeep$\n$r_trade$ за каждые $pop_group_unit$ £pop£ поселений от ['trait:trait_spare_organs', дублирующих органов]: §G+0,5§!\n$auth_mutation_habitability_tt$"
 auth_bio_democratic_evopred: "Генетический электорат"
 auth_bio_democratic_evopred_desc: "Это общество хоть и не без труда, но всё-таки частично овладело своим податливым геномом. Теперь народ сам начнет решать, как именно будут проявляться его мутации."
 auth_bio_democratic_evopred_tt: "$auth_bio_evopred_tt$\nПризнак «['trait:trait_malleable_genes']» получает дополнительные ['concept_genetic_electorate_effect', эффекты], зависящие от того, какая ['concept_faction', фракция] сейчас сильнее.\nИнопланетные §Yрасы§!, живущие в условиях рабства или лучше, дают §G+100%§! к прогрессу ['concept_adaptive_evolution', адаптивной эволюции]"
 auth_bio_oligarchic_evopred: "Биомагнаты"
 auth_bio_oligarchic_evopred_desc: "Это общество покорило само время: благодаря тщательному отбору самого качественного генетического материала правящие элиты больше не стареют. Однако, чтобы распрощаться с вечностью, достаточно одного просчета, а для тех, кто стоит ниже, дерзкие устремления и эволюция — две стороны одной медали…"
 auth_bio_oligarchic_evopred_tt: "$auth_bio_evopred_tt$\nСоветники §Yбессмертны§!"
 auth_bio_dictatorial_evopred: "Сверхпринципат"
 auth_bio_dictatorial_evopred_desc: "Этой цивилизацией, чья эволюция бесконечна и непрерывна, правит верховный сверхразум. Никакой совет, никакая конституция не имеет силы над волей Принципата. Каждая победа на генетическом фронте — шаг к преображению занимающего престол."
 auth_bio_dictatorial_evopred_tt: "$auth_bio_evopred_tt$\nЧерта правителя: ['leader_trait:trait_ruler_apex_predator']"
 apex_predator_male: "$trait_ruler_apex_predator$"
 apex_predator_female: "$trait_ruler_apex_predator$"
 auth_bio_imperial_evopred: "Династия бессмертных"
 auth_bio_imperial_evopred_desc: "$auth_bio_imperial_evopred$ не дает былому мирно упокоиться — она поглощает его без остатка. Каждое поколение насыщает своих потомков: останки почивших лидеров — пища для бессмертных правителей. Служение есть самопожертвование, и каждый покойный подданный питает наследие своих предков."
 eternal_ancestor_male: "$eternal_ancestor_female$"
 eternal_ancestor_female: "Вечный предок"
 auth_bio_imperial_evopred_tt: "$auth_bio_evopred_tt$\nПравитель может поглощать умерших великих лидеров."
 auth_bio_corporate_evopred: "GLC «Биопоглощение»" #Galactic Limited Incorporated
 auth_bio_corporate_evopred_desc: "Мегакорпорация GLC «Биопоглощение» процветает благодаря умению адаптироваться — как генетически, так и экономически. Каждый новый геном, пополняющий ее портфолио, лишь укрепляет положение корпорации на рынке. Выпускать изделия и проводить переговоры с учетом особенностей биологии каждого клиента становится проще: с пониманием их природы приходит умение совершать сделки почти инстинктивно…"
 auth_bio_corporate_evopred_tt: "$auth_bio_evopred_tt$\n$organic_leaders_have_trade_upkeep$\nЭффективность коммерческого пакта за каждый признак расы: §G+1%§!\nСкорость ['concept_adaptive_evolution', адаптивной эволюции] от §Yкоммерческих пактов§!: §G+100%§!"
 auth_bio_hive_mind_evopred: "Химерное сознание"
 auth_bio_hive_mind_evopred_desc: "Этому коллективному разуму наскучило простое самопреобразование. Каждая новая колония для него теперь — очередной узор на живом, постоянно меняющемся гобелене из земли и плоти. Химерное сознание растворяет границы и дает живым существам и мирам возможность слиться в нем воедино."
 auth_bio_hive_mind_evopred_tt: "$auth_bio_evopred_tt$\nАвтоматически терраформирует колонии, превращая их в §Yмиры улья§!\nГеноцид инопланетных §Yрас§! дает §G+100%§! к прогрессу ['concept_adaptive_evolution', адаптивной эволюции]"
 auth_bio_evopred_tt: "$EMPIRE_SIZE$ от поселений за каждый признак расы: §G-1%§!\n$auth_mutation_habitability_tt$"
 #Hive Advanced Authorities
 auth_bio_hive_purity: "Парадигма чистоты"
 auth_bio_hive_purity_desc: "Процветание в этом улье поддерживается за счет чистоты генов: каждая единица Разума соответствует безупречному биошаблону. Тщательные манипуляции с генами способствуют укреплению единства и коллективной мощи, превращая улей в грозную силу, способную выжить в любых условиях."
 auth_bio_hive_purity_tt: "$pop_effects_from_purity_header$ $TABBED_NEW_LINE$-- £unity£ $unity$ за каждые $pop_group_unit$ £pop£ поселений: $plus_minus_icon$§Y$@purity_traits_resource$§! $DOUBLE_NEW_LINE$"
 auth_bio_hive_cloning: "Самовоспроизводящаяся орда"
 auth_bio_hive_cloning_desc: "Современные технологии клонирования обеспечивают безостановочное производство генетически одинаковых единиц. В них отброшено всё лишнее — остались лишь безупречные работоспособность и единство. Улей этот повинуется только одной команде: плодиться и размножаться."
