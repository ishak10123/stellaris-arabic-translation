 SPECIES_TRAIT_INFERNAL: "['concept_infernal_phenotype_traits']"
 SPECIES_TRAIT_VOCATIONAL: "«['concept_vocational_traits']»"
 SPECIES_TRAIT_OVERTUNED: "«['concept_overtuned_traits']»"
 SPECIES_TRAIT_FLEETING_EXCELLENCE: "«['concept_fleeting_excellence_traits']»"
 SPECIES_TRAIT_CYBORG: "«['concept_cybernetic_traits']»"
 SPECIES_TRAIT_UNIVERSAL_AUGMENTATIONS: "«['concept_universal_augmentations_traits']»"
 SPECIES_TRAIT_ADAPTIVE_FRAMES: "«['concept_adaptive_frames_traits']»"
 trait_egg_laying: "Откладывание яиц"
 trait_egg_laying_desc: "Развитие детенышей этой расы происходит внутри яиц с прочной оболочкой. В сытные годы такая особенность помогает размножаться быстрее."
 trait_egg_laying_effect: "Скорость прироста населения: §G+15%§! при жизни на планете с §Gизлишками производства§! местной £food£ §Yпищи§! или аналогичного ресурса"
 trait_egg_laying_portrait_override_tt: "Или любые яйцекладущие расы"
 trait_seasonal_dormancy: "Сезонная спячка"
 trait_seasonal_dormancy_desc: "Эволюция этой расы прошла на планете с постоянной сменой времен года, вызывающей спячку. Современные технологии позволяют пробуждать этот инстинкт искусственно и тем самым временно «отключать» малопродуктивных членов общества."
 trait_seasonal_dormancy_effect: "Содержание трудоустроенного населения: §G–15%§!\nСодержание неработающего и ['concept_denizen', местного] населения: §G–75%§!"
 trait_seasonal_dormancy_portrait_override_tt: "Или любые впадающие в спячку расы"
 trait_hollow_bones: "Полые кости"
 trait_hollow_bones_desc: "Благодаря хрупким костям представители этой расы перемещаются изящно и легко, однако гравитация родной планеты действует на них сильнее."
 trait_hollow_bones_effect: "Эффективность должностей рабочих, дронов-чернорабочих и солдат за каждую единицу размера планеты: §R−0.67%§!"
 trait_rooted: "Укоренившиеся"
 trait_rooted_desc: "Эта раса в любой среде в буквальном смысле пускает корни, а извлечение этих корней происходит крайне болезненно."
 AUTO_MIGRATE_ROOTED: "§RУкоренившееся население не может мигрировать.§!"
 trait_rooted_effect: "§RНаселение не будет переселяться автоматически§!\nСтоимость переселения: §R+200%§!"
 trait_rooted_portrait_override_tt: "Или любые привязанные к окружающей среде расы"
 trait_acidic_vascularity: "Кислотные сосуды"
 trait_acidic_vascularity_desc: "Полостные жидкости представителей этой расы — самая надежная их защита: это крайне едкое и смертоносное вещество способно заставить любого напавшего недоброжелателя пожалеть о своем решении."
 trait_acidic_vascularity_effect: "Армии §Yвзрываются при гибели§!, нанося §G250§! ед. урона врагам\nПроизводительность истребляемых поселений: §R–75%§!"
 DAMAGE_ARMY: "Наносит урон ($ARMY|Y$)"
 trait_shelled: "Панцирь"
 trait_shelled_desc: "Свои дома — как выращенные, так и найденные случайно или даже специально — представители этой расы всегда носят с собой. В панцире они в любую минуту могут укрыться и отдохнуть."
 trait_shelled_portrait_override_tt: "Или любые панцирные расы"
 trait_camouflage: "Камуфляж"
 trait_camouflage_desc: "Эта раса сливается с окружением так, что распознать маскировку почти невозможно ни хищнику, ни добыче. Врожденное понимание оптики обеспечивает преимущество в партизанских войнах."
 trait_camouflage_portrait_override_tt: "Или любые способные к маскировке расы"
 trait_chromalogs: "Хромологи"
 trait_chromalogs_desc: "Камуфляж — пережиток прошлого: эта раса подчинила себе сам цвет. Ее представители общаются посредством создания на теле ярких и сложных узоров."
 trait_chromalogs_portrait_override_tt: "Или любые расы, которые используют расцветку тела для общения"
 trait_brittle: "Хрупкие"
 trait_brittle_desc: "Тела представителей этой расы крайне хрупки, а потому даже повседневные занятия всегда сопряжены с серьезным риском что-нибудь сломать."
 trait_familial: "Родственные"
 trait_familial_desc: "Родство для этой расы — не пустой звук: ближайших родственников связывают прочные и тесные отношения, благодаря которым в местных общинах всегда царит слаженность."
 trait_familial_effect: "Счастье за каждое §Y100§! £pop£ поселений с этой чертой на одной и той же планете: §G0,1%§! (максимум: §G+20%§!)"
 trait_familial_portrait_override_tt: "Или любые родственные расы"
 trait_permeable_skin: "Проницаемая кожа"
 trait_permeable_skin_desc: "Представителей этой расы покрывает особая кожа, требующая идеальных условий. Впрочем, особых неудобств они не испытывают… пока пребывают в привычном им климате."
 trait_permeable_skin_effect: "Пригодность для жизни миров с отличающейся от предпочитаемой ['concept_climate_category', климатической категорией]: §R–20%§!"
 concept_climate_category: "Климатическая категория"
 concept_climate_category_desc: "Климаты обитаемых планет разделены на три категории:\n- Влажный:\n$t$- Континентальный\n$t$- Океанический\n$t$- Тропический\n- Холодный:\n$t$- Высокогорный\n$t$- Арктический\n$t$- Тундровый\n- Сухой:\n$t$- Засушливый\n$t$- Пустынный\n$t$- Саванновый"
 trait_genetic_memory: "Генетическая память"
 trait_genetic_memory_desc: "Передача потомкам накопленных знаний — привычный многим цивилизациям способ развития. Представители этой расы, впрочем, пошли дальше: все необходимые для выживания сведения содержатся непосредственно в их генетическом коде, поэтому каждое поколение несет в себе мудрость предков."
 trait_genetic_memory_effect: "Пригодность для жизни за возраст колонии: §G+0.5%§! в год (предел: §G+25%§!)"
 trait_genetic_memory_portrait_override_tt: "Или любые расы с унаследованными инстинктами выживания"
 trait_nascent_stage: "Стадия развития"
 trait_nascent_stage_desc: "Потомство этой расы рождается еще на ранней стадии развития, поэтому в течение длительного времени оно неспособно приносить пользу обществу и даже осознавать, что наличие разума — это серьезная ответственность и тяжелая ноша."
 trait_nascent_stage_effect: "Новорожденное население с этим признаком проводит первые §Y5§! лет в предразумном состоянии."
 trait_nascent_stage_portrait_override_tt: "Или любые расы с продолжительным периодом младенчества"
 trait_presapient_stage: "Предразумные"
 trait_presapient_stage_desc: "Через какое-то время это создание, недостойное пока называться мыслящим, вырастет в разумное существо."
 trait_flight: "Полет"
 trait_flight_desc: "Представители этой расы не прикованы к земле и гордо парят в небесах. Планировка их городов достаточно необычная и плотная, поскольку рассчитана на летающих существ. Поразить таких в бою непросто."
 trait_flight_portrait_override_tt: "Или любые расы, приспособленные к жизни в воздухе"
 trait_spatial_mastery: "Покорившие пространство"
 trait_spatial_mastery_desc: "Эта раса умеет не только летать, но и без труда ориентироваться в трехмерном пространстве благодаря уникальному строению мозга. Такое умение крайне полезно при планировании сражений, изучении планет и управлении городами."
 trait_spatial_mastery_portrait_override_tt: "Или любые расы, одарённые в вопросах трёхмерной навигации"
 trait_spare_organs: "Дублирующие органы"
 trait_spare_organs_desc: "Представителям этой расы свойственно наличие дублирующих органов, позволяющих переживать даже самые тяжелые ранения. Без этого ее существование было бы невозможным."
 trait_spare_organs_effect: "Лидеры всегда переживают первую смерть\nПри смерти наступательной армии: §G20§!-процентная вероятность появления заменяющей армии\nПроизводительность £job_livestock£ §Yскота§!: §G+50%§!"
 mod_planet_livestock_produces_mult: "Производительность £job_livestock£ §Yскота§!"
 trait_leader_second_chanced: "Второй шанс"
 trait_leader_second_chanced_desc: "Особенности строения позволили этому лидеру пережить верную смерть. Впрочем, больше это не повторится."
 #################################
 #Evolutionary Predators Origin #
 #Written by Victor Haeggman  #
 #################################
 #Origin and Start of Game
 origin_evolutionary_predators: "Охотники за эволюцией"
 origin_evolutionary_predators_desc: "§RВНИМАНИЕ: вам будут недоступны все пути возвышения, кроме ['concept_mutation_ascension', преображения через мутацию].§!\n\nЭтой расой руководит загадочный инстинкт охотиться на самых необычных существ. Благодаря редкому умению присоединять гены добычи к своим эти охотники стали самыми грозными хищниками своей планеты, поглотив все полезные гены. Однако голод не унять просто так, и теперь жажда охоты ведет их к звездам."
 origin_tooltip_evolutionary_predators_effects: "- $SPECIES_TRAITS$ ['concept_malleable_genes']\n- Инцидент: ['concept_adaptive_evolution']\n- Родной мир: ['concept_genetic_soup']"
 START_SCREEN_EVOLUTIONARY_PREDATORS_BASE: "[GetSpeciesNamePlural] — прирожденные охотники. Даже самые жестокие и невыносимые условия не способны заставить нас бросить добычу, особенно если перед нами новый вид. Когда ты — то, что ты ешь, не бывает зря потраченных усилий.\n\n"
 START_SCREEN_EVOLUTIONARY_PREDATORS_REGULAR: "$START_SCREEN_EVOLUTIONARY_PREDATORS_BASE$Не секрет, что могущество нашему народу дарует плоть добычи: с каждым убийством мы становимся сильнее.\n\nНас не тяготят пролитые в прошлом реки крови, поскольку такова сущность нашего бытия. Достижения современной науки исключили необходимость пожирать жертв — теперь даже ничтожно малого количества генетического материала достаточно, чтобы вплести новый сильный ген в цепочку подобных ему.\n\nПодход изменился, но стремление эволюционировать по-прежнему непреодолимо. Новая разработка — [GetStartingDrive] — откроет нам путь в космос, и вся галактика станет нашими охотничьими угодьями."
 START_SCREEN_EVOLUTIONARY_PREDATORS_HIVE: "$START_SCREEN_EVOLUTIONARY_PREDATORS_BASE$Единый разум отчетливо осознает весь потенциал генетического состава нашего народа: мы умеем поглощать саму суть добычи, вбирать ее в себя, объединять ее силу со своей.\n\nЭто невероятно древний инстинкт, но лишь недавно мы научились его контролировать. Эволюция теперь возможна и без охоты: в лабораториях можно синтезировать и затем распределять по всему улью любой генетический материал.\n\nСегодня, когда в нашем распоряжении есть [GetStartingDrive], мы готовы расселиться по галактике и попробовать на вкус всё, что она может нам предложить."
 START_SCREEN_EVOLUTIONARY_PREDATORS_DEVOURING_SWARM: "$START_SCREEN_EVOLUTIONARY_PREDATORS_BASE$Лишь после того, как мы поглотили всех живых существ на планете [GetHomeWorldName] без остатка, нам стал понятен масштаб этой страшной ошибки. Откуда мы будем брать новый эволюционный материал?.. Ответ нашелся среди звезд.\n\nМы — сверххищники. Другие охотятся, чтобы жить, мы же охотимся, чтобы стать безупречными.\n\nИ теперь, когда у нас появился [GetStartingDrive], мы готовы выйти на большую охоту. Галактика обширна и полна пищи."
 #Traits
 trait_malleable_genes: "Податливые гены"
 trait_malleable_genes_desc: "§LЭта раса не так сильно держится за конкретные отличительные черты и органы, как другие, — она предпочитает отращивать то, что требуется. У такого непостоянства, разумеется, есть недостатки.§!"
 trait_malleable_genes_cant_modify: "§RРасы с этим признаком не поддаются генетической модификации§!\n$automodding_trait_tooltip_all$ §YС признаком «$trait_malleable_genes$»§! модификаторы выбираются из ['concept_automodding_malleable', списка податливых признаков для автомодификации]"
 CANNOT_MODIFY_MALLEABLE_GENES_SPECIES: "$TRIGGER_FAIL$Из-за нестабильных генов эта раса не поддается генетической модификации."
 concept_malleable_genes: "$trait_malleable_genes$"
 concept_malleable_genes_desc: "$trait_malleable_genes_cant_modify$"
 concept_automodding_malleable: "Список податливых признаков для автомодификации"
 concept_automodding_malleable_desc: "- «['trait:trait_malleable_minerals']»\n- «['trait:trait_malleable_energy']»\n- «['trait:trait_malleable_food']»\n- «['trait:trait_malleable_research']»\n- «['trait:trait_malleable_unity']»\n- «['trait:trait_malleable_forge']»\n- «['trait:trait_malleable_trade']»\n- «['trait:trait_malleable_ameneties']»"
 concept_adaptive_evolution: "Адаптивная эволюция"
 concept_adaptive_evolution_desc: "Развитие этого инцидента происходит по мере поглощения ДНК других существ.\n§GПри завершении:§!\n$t$- Можно выбрать новый признак расы (зависит от поглощенных недавно рас)\n§YДля развития инцидента:§!\n$t$- Колонизируйте новые планеты.\n$t$- Проводите геноцид других рас или держите их в качестве скота;\n$t$- Разрешите другим расам в своем государстве уровень жизни «Рабы» или выше.\n$t$- Устраивайте лидеров-инопланетян в совет.\n$t$- Держите биологических вассалов.\n$t$- Заключайте коммерческие пакты, будучи мегакорпорацией.\n$t$- Встречайте инопланетные формы жизни в событиях."
 concept_genetic_soup: "$genetic_soup$"
 concept_genetic_soup_desc: "$fresh_biosphere_tt$\n\n§L$genetic_soup_desc$§!"
 trait_malleable_minerals: "Податливые когти"
 trait_malleable_minerals_desc: "§LПальцы тверды, словно алмазы. Это упрощает добычу минералов.§!"
 trait_malleable_energy: "Податливая термоизоляция"
 trait_malleable_energy_desc: "§LТолстый слой термоизолирующего вещества предохраняет от травм, особенно в условиях высокого уровня энергии.§!"
 trait_malleable_food: "Податливые плуги"
 trait_malleable_food_desc: "§LДополнительная конечность с прочным пальцем в форме лопаты упрощает обработку почвы и посев. Эти «плуги» можно приспособить под любую разновидность почвы.§!"
 trait_malleable_research: "Податливая кора мозга"
 trait_malleable_research_desc: "§LУвеличенная кора головного мозга доставляет некоторые неудобства, зато значительно ускоряет решение задач и внедрение новых идей.§!"
 trait_malleable_unity: "Податливые органы чувств"
 trait_malleable_unity_desc: "§LБолее чувствительные органы способствуют развитию понимания и уважения других взглядов. Наблюдение — путь к процветанию.§!"
 trait_malleable_forge: "Податливые каллусные ткани"
 trait_malleable_forge_desc: "§LПри обращении с горячими или едкими веществами особо прочные каллусные ткани очень ценны.§!"
 trait_malleable_trade: "Податливые феромоны"
 trait_malleable_trade_desc: "§LАдаптивные феромоны могут помочь убедить собеседника в ходе переговоров.§!"
 trait_malleable_ameneties: "Податливые гармонические колебания"
 trait_malleable_ameneties_desc: "§LБлагодаря череде тщательно выверенных отверстий представители этой расы при движении издают нежные мелодичные звуки.§!"
 #Democratic Effects
 concept_genetic_electorate_effect: "Эффекты «Генетического электората»"
 concept_genetic_electorate_effect_desc: "$trait_malleable_imperialist_effect$\n$trait_malleable_isolationist_effect$\n$trait_malleable_progressive_effect$\n$trait_malleable_prosperity_effect$\n$trait_malleable_supremacist_effect$\n$trait_malleable_technologist_effect$\n$trait_malleable_totalitarian_effect$\n$trait_malleable_traditionalist_effect$\n$trait_malleable_xenoist_effect$\n$trait_malleable_manifesti_effect$"
 trait_malleable_imperialist_effect: "Эффект от §Yдоминирующей фракции§! (империалисты):\n$t$$mod_planet_jobs_alloys_produces_mult$: §G+10%§!"
 trait_malleable_isolationist_effect: "Эффект от §Yдоминирующей фракции§! (изоляционисты):\n$t$$mod_planet_jobs_unity_produces_mult$: §G+10%§!"
 trait_malleable_progressive_effect: "Эффект от §Yдоминирующей фракции§! (прогрессисты):\n$t$£happiness£ Счастье: §G+10%§!"
