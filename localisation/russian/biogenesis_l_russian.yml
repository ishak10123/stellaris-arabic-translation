 bio.1005.name: "Получена особенность"
 bio.1005.desc: "Генетический состав нашей расы стал сложнее. Мы готовы вобрать в себя новое свойство генетического материала, а [Owner.GetScientistPlural] позаботились о том, чтобы у нас был выбор.\n\nПоследствия его ощутит на себе каждый [Owner.GetSpeciesName] на много поколений вперед."
 bio.1005.tt: "Наша доминирующая раса получает новый признак"
 bio.1005.pop_growth: "Мы хотим быстрее расти!"
 bio.1005.pop_output: "Может, станем более продуктивными?"
 bio.1005.leader: "Чем больше сильных сторон у лидеров, тем лучше."
 bio.1005.habitability: "Нужно адаптироваться к смене климатов."
 bio.1005.upkeep: "Нужно уменьшить затраты на содержание народа."
 bio.1005.humanoid: "Гуманоидные признаки сделают нас более разносторонними."
 bio.1005.mammalian: "ДНК млекопитающих скрывает в себе много тайн."
 bio.1005.reptilian: "Рептилоиды — уникальные существа."
 bio.1005.avian: "Нам не помешает невероятная проворность пернатых."
 bio.1005.arthropoid: "Членистоногие очень приятно хрустят."
 bio.1005.molluscoid: "Даже у моллюскоида можно чему-то научиться."
 bio.1005.fungoid: "Грибовидные умеют быстро распространяться — нам это тоже пригодится."
 bio.1005.plantoid: "Энергоэффективность растений — то, что нужно."
 bio.1005.lithoid: "Трудноперевариваемая ДНК литоидов откроет нам новые возможности."
 bio.1005.necroid: "Даже плоть некроидов — всё-таки плоть."
 bio.1005.aquatic: "Аквоиды научат нас выживать в морях и океанах."
 bio.1005.toxoid: "Токсоиды §Gкислые§!."
 bio.1005.infernal: "Термофилы §Rпылают§!, но теперь мы можем обуздать пламя."
 bio.1005.plasmic: "Стабилизация плазматической ДНК — вот настоящий подвиг."
 bio.1005.leviathan: "Чему могут нас научить титаны этой галактики?"
 bio.1005.psionic: "Что в псионическом геноме раскрывает такие когнитивные способности?"
 bio.1005.random: "Да здравствует хаос! Отдадимся на волю инстинктов!"
 bio.1005.no_reward: "Мы и без того достаточно сложны."
 bio.1005.unnatural_selection: "Мы скованы ограничениями; пусть мутация откроет нам новые возможности!"
