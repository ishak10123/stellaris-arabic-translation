 SHIP_BEHEMOTH_RAGE: "Железы агрессии"
 SHIP_BEHEMOTH_RAGE_DESC: "Исполины — своевольные неукротимые титаны, и они не терпят долгого контроля. Рано или поздно ярость внутри них разгорится, обернувшись неудержимой космической бурей. Возможно, мудро будет не ждать, пока это произойдёт, а самим высечь искру — вызвать бурю, когда будет удобно нам, а не ей."
 behemoth_rage_ship_button: "§HРазъярить§!\n\nВыпустить §Yисполина§! на волю.\nРазъяренный исполин направится к ближайшей §Yколонии§! или §Yяйцу исполина§! и попытается ее (или его) уничтожить.\nЯрость обычно длится §Y180 дней§!, однако длительность может зависеть от определенных факторов.$TABBED_NEW_LINE$- В §Rбою§! или во время §Rбомбардировки§! исполин не успокоится.$TABBED_NEW_LINE$- Если мы §Gпобедим§! разъяренного исполина в бою, он вновь станет нам послушен."
 behemoth_rage_activity_key: "В ярости"
 behemoth_rage_menu_title: "Разъярить"
 behemoth_rage_progress_activity_key: "В ярости"
 MESSAGE_BEHEMOTH_RAGE_TITLE: "Разъяренный исполин"
 MESSAGE_BEHEMOTH_RAGE_DESC: "Исполин впал в ярость! Мы надеемся, что через несколько месяцев он успокоится."
 MESSAGE_BEHEMOTH_CALM_TITLE: "Ярость утихает"
 MESSAGE_BEHEMOTH_CALM_DESC: "Исполин успокоился и теперь снова слушается нас."
 SHIP_BEHEMOTH_COCOON: "Голометаболический прядильщик"
 SHIP_BEHEMOTH_COCOON_DESC: "§YИсполины§! могут закрепляться в ветреных слоях атмосферы газовых гигантов и обильно питаться существующими там тяжелыми элементами и сложными молекулярными соединениями. Такое пропитание ускоряет развитие их организмов и повышает и без того впечатляющую силу."
 SHIP_BEHEMOTH_COCOON_TT: "$UNLOCKS_BEHEMOTH_SHIP_ACTION_TITLE$ «$behemoth_cocoon_menu_title$»\n$behemoth_cocoon_effect$"
 behemoth_cocoon_ship_button: "§H$behemoth_cocoon_menu_title$§!\n\n$behemoth_cocoon_effect$"
 behemoth_cocoon_activity_key: "Подготовка к окукливанию"
 behemoth_cocoon_menu_title: "Созреть и вырасти"
 behemoth_cocoon_effect: "Сытый §Yисполин§! может угнездиться в газовом гиганте на §Y3 года§!, чтобы превратиться в еще более сильное существо."
 behemoth_cocoon_progress_activity_key: "Окукливание в коконе"
 behemoth_cocoon_tt: "§RНеобходимо открыть бонус кризиса «§H$menp_behemoth_hatchling_2$»§!.§!"
 MESSAGE_BEHEMOTH_GROWTH_TITLE: "Больше и злее"
 MESSAGE_BEHEMOTH_GROWTH_DESC: "Мы успешно вывели из яйца более крупного и могучего §Yисполина§!."
 behemoth_incubation_poi_name: "Выращивание исполина"
 behemoth_incubation_poi_desc: "На орбите газового гиганта под названием §H[incubation_planet.GetName]§! мы выводим исполина. Зрелости он достигнет приблизительно к §H[incubation_planet.behemoth_incubation_timer]§!."
 incubating_behemoth_modifier: "Выращивание исполина"
 incubating_behemoth_modifier_desc: "Происходит впечатляющий метаморфоз."
 voidspawn_boss_invincible: "Непокорный владыка зверей"
 voidspawn_boss_invincible_desc: "Говорят, никому еще не удавалось сразить взрослое порождение пустоты. Всё, что нам остается, — это постараться не дать ему добраться до цели."
 mod_damage_vs_country_type_voidspawn_boss_mult: "Урон древнему порождению пустоты"
 voidspawn_boss_buffs: "Первобытная мощь"
 voidspawn_system_mod: "Пустотная буря"
 voidspawn_colony_mod: "Раздор в колониях"
 voidspawn_colony_mod_desc: "Тень древнего порождения пустоты отравляет планеты."
 VOIDSPAWN_FORCE_DECLINE: "§RНаселение убывает§!"
 elder_voidspawn_chain_title: "Буйствующее порождение пустоты"
 elder_voidspawn_chain_desc: "Галактику терзает огромное порождение пустоты. Оно стремится убивать исполинов; мы предполагаем, что, если убьем их первыми, возможно, порождение оставит нас в покое.\n\nЗАДАЧА: найти и уничтожить всех исполинов 4 уровня в галактике."
 behemoth_victory_chain_title: "Царь всех чудовищ"
 behemoth_victory_chain_desc: "Слияние разумов завершено — и теперь лишь несколько шагов отделяют нас от воплощения наших амбиций. Нам предстоит освоиться в новом общем теле и продолжить перенос сознаний нашего народа. Но важнее всего — уничтожить любого потенциального соперника, кем бы он ни был.\n\n§HЗАДАЧИ§!:\n- Найти и уничтожить других исполинов 4 класса в галактике.\n- Завершить инцидент «Трудности роста».\n- Победить древнее порождение пустоты."
 behemoth_transference: "Перенос в исполина"
 behemoth_transference_desc: "Установление связи между Зверем и населением нашей планеты заставило нас по-новому взглянуть на жизнь без космических полетов — жизнь тщетную и пустую, несравнимую со слиянием с исполином. Теперь единства с ним жаждет каждый… Единства — и насыщения."
