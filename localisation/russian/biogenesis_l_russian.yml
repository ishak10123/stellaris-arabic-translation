 auth_bio_hive_mutation: "Владычество подстраивающихся"
 auth_bio_hive_mutation_desc: "Гиперадаптивные единицы, послушные этому улью, представляют собой изменчивую, безостановочно развивающуюся силу. Все трудности они преодолевают с помощью постоянных мутаций, укрепляющих коллектив и обеспечивающих непревзойденные гибкость и стойкость. Благодаря этому коллективный разум может процветать в любых условиях."
