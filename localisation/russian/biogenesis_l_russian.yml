 ###Starlit Citadel
 origin_starlit_citadel: "Цитадель звездного света"
 origin_starlit_citadel_desc: "На краю родной системы этой цивилизации расположился загадочный портал — врата, из которых на систему обрушиваются враждебные гибельные силы. Вторжения их непредсказуемы и неизбежны; единственный способ защититься — это чудо инженерной мысли: §H$dsc_name$§!."
 origin_tooltip_starlit_citadel_effects: "• $HOME_SYSTEM$ $TABBED_NEW_LINE$- ['concept_deep_space_bastion'] на краю гравитационного колодца $TABBED_NEW_LINE$• ['concept_wormhole', $BYPASS_STARLIT_WORMHOLE$], ведущая в неизвестную систему$NEW_LINE$• $HOMEWORLD$  $TABBED_NEW_LINE$• £building£ ['building:building_citadel_uplink'] $TABBED_NEW_LINE$• ['concept_bioship_remains', £blocker£ $d_bioship_remains$] $TABBED_NEW_LINE$• ['concept_invasion_site', £blocker£ $d_invasion_site$]: +2$NEW_LINE$• $ADDITIONAL_TECHNOLOGIES_STRING$ ['concept_deep_space_citadel_tech',£engineering_research£ $tech_deep_space_citadel$]"
 START_SCREEN_STARLIT_CITADEL: "Вечная бдительность не всегда была так необходима.\n\nМы — мирный народ, ни в чем не знавший недостатка. Однако мирная жизнь закончилась в тот роковой день, когда открылся портал.\n\nБез объявления войны на нашу родную планету [Capital.GetName] хлынули [GetInvadersLower]. Они сровняли с землей наши города и разорили наши земли, а затем испарились так же быстро, как и напали. Мы надеялись, что это не повторится… но надежда эта оказалась тщетной. Раз за разом эти существа возвращались, и каждое их нападение было страшнее предыдущего.\n\nСегодня мы наконец проложим себе путь к звездам под бдительным взором смотрителей за небом, а наш надежный и неприступный бастион, защищающий планету, — $dsc_name$, — готов дать отпор любому врагу, и никакие [GetInvadersLower] не смогут ему что-либо противопоставить."
