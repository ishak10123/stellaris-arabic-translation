 #STAGE EVENTS
 bio.25.name: "Развитие коллективного разума" #STAGE ONE
 bio.25.desc.no_options: "[owner.GetGovernmentName] преображается. Вскоре наши возможности станут невероятно широки. Разум в полной мере осознает последствия такого шага: наша сущность изменится безвозвратно. Относиться к направленной эволюции следует со всей серьезностью, поскольку последствия будут ощущаться еще долго."
 bio.25.desc.has_options: "$bio.25.desc.no_options$\n\nСейчас следует выбрать, чему именно уделить внимание на первом этапе развития."
 bio.25.a: "$bio.5.a$"
 bio.25.b: "$bio.5.b$"
 bio.25.c: "$bio.5.c$"
 bio.30.name: "Конвергенция улья" #STAGE TWO
 bio.30.desc.no_options: "Направленная эволюция повлекла за собой значительные изменения — например, мы стали лучше разбираться в таких областях, как генетические признаки, размножение и секвенирование ДНК.\n\nТочка перелома уже близка.\n\nВскоре мы преобразимся, исполнив свое предназначение."
 bio.30.desc.has_options: "$bio.30.desc.no_options$ Но сейчас перед нами стоит выбор: остаться на прежнем пути или выбрать что-то другое."
 bio.30.a: "$bio.10.a$"
 bio.30.b: "$bio.10.b$"
 bio.30.c: "$bio.10.c$"
 bio.35.name: "Эволюционное слияние" #STAGE THREE
 bio.35.desc.no_options: "Мы стоим на пороге гигантского скачка эволюции. Однако, чтобы раскрыть эволюционный потенциал целиком, понадобится принять непростое решение."
 bio.35.desc.has_options: "$bio.35.desc.no_options$\n\nНадо вновь определить, что именно требует нашего внимания."
 bio.35.a: "$bio.15.a$"
 bio.35.b: "$bio.15.b$"
 bio.35.c: "$bio.15.c$"
 genetic_ascension_hive_approach_one: "$genetic_ascension_approach_purity$"
 genetic_ascension_hive_approach_two: "$genetic_ascension_approach_cloning$"
