 BIOGENESIS_CAT: "Биогенез"
 BIOGENESIS_01: "Хордовик"
 BIOGENESIS_02: "Панцирный корабль"
 graphical_culture_tooltip_not_biological: "НЕТ набора ['concept_biological_ship', биологических] кораблей"
