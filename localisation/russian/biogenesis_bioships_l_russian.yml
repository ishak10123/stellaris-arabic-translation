 #Unique components
 MAULER_PURSUIT_1: "Метаболический переработчик"
 MAULER_PURSUIT_1_DESC: "Переработка химических отходов, производимых двигательными органами, увеличивает выносливость."
 MAULER_PURSUIT_2: "Энергетический переработчик"
 MAULER_PURSUIT_2_DESC: "Внедрение летучих пылинок в перерабатывающие пути корабля еще больше увеличивает выносливость."
 MAULER_BITER_1: "Коррозионные жидкости"
 MAULER_BITER_1_DESC: "Имплантированные железы модифицируют телесные жидкости мучителей и делают их коррозионными, тем самым повышая разрушительный потенциал этих кораблей."
 MAULER_BITER_2: "Едкие жидкости"
 MAULER_BITER_2_DESC: "Внедрение летучих пылинок в жидкости, которые выделяют мучители, еще больше увеличит наносимый урон, особенно против брони вражеских кораблей."
