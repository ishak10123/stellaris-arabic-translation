 #Shields/Musculature
 tech_bio_shields_1: "$tech_shields_1$"
 BIO_SHIELD_1: "Отражательная мускулатура"
 BIO_SHIELD_1_DESC: "Особая мышечная ткань генерирует энергетическое поле и формирует защитный отражающий щит. Такая броня способна поглотить лишь ограниченное количество урона, но при этом быстро регенерирует."
 SMALL_BIO_SHIELD_1: "Малая $BIO_SHIELD_1$"
 MEDIUM_BIO_SHIELD_1: "Средняя $BIO_SHIELD_1$"
 LARGE_BIO_SHIELD_1: "Большая $BIO_SHIELD_1$"
 tech_bio_shields_2: "$tech_shields_2$"
 BIO_SHIELD_2: "Улучшенная отражательная мускулатура"
 BIO_SHIELD_2_DESC: "Улучшенная мышечная ткань более эффективно направляет энергию и генерирует более прочные щиты. Эти продвинутые системы поглощают больше урона, быстрее восстанавливаются и обеспечивают лучшую защиту в условиях продолжительного боя."
 SMALL_BIO_SHIELD_2: "Малая $BIO_SHIELD_2$"
 MEDIUM_BIO_SHIELD_2: "Средняя $BIO_SHIELD_2$"
 LARGE_BIO_SHIELD_2: "Большая $BIO_SHIELD_2$"
 tech_bio_shields_3: "$tech_shields_3$"
 BIO_SHIELD_3: "Мускулатура под щитами"
 BIO_SHIELD_3_DESC: "Эта новейшая технология биоэкранирования использует армированные энергопроводящие ткани с улученными защитными характеристиками. Она эффективно выдерживает урон от энергетического и кинетического оружия и обеспечивает адаптивную защиту для кораблей в разных боевых ситуациях."
 SMALL_BIO_SHIELD_3: "Малая $BIO_SHIELD_3$"
 MEDIUM_BIO_SHIELD_3: "Средняя $BIO_SHIELD_3$"
 LARGE_BIO_SHIELD_3: "Большая $BIO_SHIELD_3$"
 tech_bio_shields_4: "$tech_shields_4$"
 BIO_SHIELD_4: "Мускулатура под улучшенными щитами"
 BIO_SHIELD_4_DESC: "Вершина технологий биощитов. Армированная мускулатура эффективнее проводит энергию, повышая прочность щита. Он отражает урон как от энергетического, так и от кинетического оружия и сообщает кораблю универсальную защиту в бою."
 SMALL_BIO_SHIELD_4: "Малая $BIO_SHIELD_4$"
 MEDIUM_BIO_SHIELD_4: "Средняя $BIO_SHIELD_4$"
 LARGE_BIO_SHIELD_4: "Большая $BIO_SHIELD_4$"
 tech_bio_shields_5: "$tech_shields_5$"
 BIO_SHIELD_5: "Мускулатура под гиперщитами"
 BIO_SHIELD_5_DESC: "Гиперадаптивные ткани концентрируют мощнейшие потоки энергии и создают практически непробиваемый щит. Эта инновационная система быстро регенерирует и защищает биокорабль даже под сильнейшим вражеским обстрелом."
 SMALL_BIO_SHIELD_5: "Малая $BIO_SHIELD_5$"
 MEDIUM_BIO_SHIELD_5: "Средняя $BIO_SHIELD_5$"
 LARGE_BIO_SHIELD_5: "Большая $BIO_SHIELD_5$"
 tech_bio_dark_matter_deflector: "$tech_dark_matter_deflector$"
 DARK_MATTER_BIO_DEFLECTOR: "Мускулатура с темной материей"
 DARK_MATTER_BIO_DEFLECTOR_DESC: "Этот высокотехнологичный биощит интегрирует в живые ткани темную материю, значительно повышая их энергопроводимость и защитные свойства. Внедрение этой экзотической материи позволяет мускулатуре генерировать щиты невиданной силы, способные выдерживать мощнейшие удары."
 SMALL_DARK_MATTER_BIO_DEFLECTOR: "Малая $DARK_MATTER_BIO_DEFLECTOR$"
 MEDIUM_DARK_MATTER_BIO_DEFLECTOR: "Средняя $DARK_MATTER_BIO_DEFLECTOR$"
 LARGE_DARK_MATTER_BIO_DEFLECTOR: "Большая $DARK_MATTER_BIO_DEFLECTOR$"
 tech_bio_psionic_barrier: "$tech_psionic_barrier$"
 PSI_BIO_SHIELD: "Мускулатура со зро"
 PSI_BIO_SHIELD_DESC: "Пропитанная психореактивным веществом зро, эта усовершенствованная мускулатура генерирует щиты непревзойденной точности и адаптивности. Ее уникальные характеристики усиливают устойчивость и регенеративную способность биощита и сообщают ему почти противоестественные защитные свойства."
 SMALL_PSI_BIO_SHIELD: "Малая $PSI_BIO_SHIELD$"
 MEDIUM_PSI_BIO_SHIELD: "Средняя $PSI_BIO_SHIELD$"
 LARGE_PSI_BIO_SHIELD: "Большая $PSI_BIO_SHIELD$"
 tech_bio_psionic_shield: "$tech_psionic_shield$"
 PSI_BIO_BARRIER: "Пси-резонансные ткани"
 PSI_BIO_BARRIER_DESC: "Этот уникальный биобарьер захватывает псионическую энергию в специально выращенных тканях, создавая защиту, которая с невероятной точностью адаптируется к вражескому огню. Резонанс усиливает прочность щита и ускоряет его регенерацию, благодаря чему эта защита действует даже против самых неожиданных атак."
 SMALL_PSI_BIO_BARRIER: "Малые $PSI_BIO_BARRIER$"
 MEDIUM_PSI_BIO_BARRIER: "Средние $PSI_BIO_BARRIER$"
 LARGE_PSI_BIO_BARRIER: "Большие $PSI_BIO_BARRIER$"
 tech_bio_archaeoshield: "$tech_archaeoshield$"
 BIO_ARCHAEO_SHIELD: "Ткани с замедляющим полем"
 BIO_ARCHAEO_SHIELD_DESC: "Благодаря культивации обладающих защитным полем тканей вокруг узлов древних артефактов эта технология замедляет время в точке соприкосновения с полем. Такая задержка позволяет щиту эффективнее рассеивать энергию атаки и значительно улучшает эффективность защиты."
 SMALL_BIO_ARCHAEO_SHIELD: "Малые $BIO_ARCHAEO_SHIELD$"
 MEDIUM_BIO_ARCHAEO_SHIELD: "Средние $BIO_ARCHAEO_SHIELD$"
 LARGE_BIO_ARCHAEO_SHIELD: "Большие $BIO_ARCHAEO_SHIELD$"
 #Reactors
 tech_bio_fission_power: "$BIO_FISSION_REACTOR$"
 BIO_FISSION_REACTOR: "Ядерный метаболизм"
 BIO_FISSION_REACTOR_DESC: "С помощью биоинженерии можно превратить пищеварительный тракт в подобие биологического ядерного реактора, в котором расщепляются ядра. При таком метаболизме вырабатывается не только энергия, но и вредные ядерные отходы."
 tech_bio_fusion_power: "$BIO_FUSION_REACTOR$"
 BIO_FUSION_REACTOR: "Термоядерный метаболизм"
 BIO_FUSION_REACTOR_DESC: "Внедрение в желудочно-кишечный тракт биокораблей микрофауны, способной вызывать термоядерные реакции, позволит производить огромное количество энергии, не прибегая к опасным технологиям ядерного распада."
 tech_bio_cold_fusion_power: "$BIO_COLD_FUSION_REACTOR$"
 BIO_COLD_FUSION_REACTOR: "Холодный термоядерный метаболизм"
 BIO_COLD_FUSION_REACTOR_DESC: "$COLD_FUSION_REACTOR_DESC$"
 tech_bio_antimatter_power: "$BIO_ANTIMATTER_REACTOR$"
 BIO_ANTIMATTER_REACTOR: "Метаболизм на основе антиматерии"
 BIO_ANTIMATTER_REACTOR_DESC: "$ANTIMATTER_REACTOR_DESC$"
