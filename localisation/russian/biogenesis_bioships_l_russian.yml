 BIOSHIP_SENSOR_1: "Радиолокатор"
 BIOSHIP_SENSOR_1_DESC: "Эти органы чувств устроены подобно радару и позволяют кораблям обнаруживать и отслеживать космические объекты."
 BIOSHIP_SENSOR_2: "Гравитационные сенсоры"
 BIOSHIP_SENSOR_2_DESC: "Эти органы чувств улавливают изменения гравитационных полей, создаваемые, например, космическим кораблем."
 TECH_UNLOCK_BIOSHIP_SENSOR_2_TITLE: "§HКомпонент:§! $BIOSHIP_SENSOR_2$"
 TECH_UNLOCK_BIOSHIP_SENSOR_2_DESC: "§H$BIOSHIP_SENSOR_2$§!\n$BIOSHIP_SENSOR_2_DESC$"
 BIOSHIP_SENSOR_3: "Подпространственные сенсоры"
 BIOSHIP_SENSOR_3_DESC: "Эти органы чувств обнаруживают колебания подпространства, создаваемые кораблями. Их чувствительность и дальность действия значительно выше, чем у любых других органов чувств для ориентирования в космосе."
 TECH_UNLOCK_BIOSHIP_SENSOR_3_TITLE: "§HКомпонент:§! $BIOSHIP_SENSOR_3$"
 TECH_UNLOCK_BIOSHIP_SENSOR_3_DESC: "§H$BIOSHIP_SENSOR_3$§!\n$BIOSHIP_SENSOR_3_DESC$"
 BIOSHIP_SENSOR_4: "Тахионные сенсоры"
 BIOSHIP_SENSOR_4_DESC: "Эти органы чувств способны обнаруживать движение космических тел на огромных расстояниях благодаря вращающимся тахионным лучам."
 TECH_UNLOCK_BIOSHIP_SENSOR_4_TITLE: "§HКомпонент:§! $BIOSHIP_SENSOR_4$"
 TECH_UNLOCK_BIOSHIP_SENSOR_4_DESC: "§H$BIOSHIP_SENSOR_4$§!\n$BIOSHIP_SENSOR_4_DESC$"
 #FTL Drives
 BIO_EMPTY_DRIVE: "$EMPTY_DRIVE$"
 BIO_EMPTY_DRIVE_DESC: "$EMPTY_DRIVE_DESC$"
 BIO_HYPER_DRIVE_1: "Гиперкоридорное биополе I"
 BIO_HYPER_DRIVE_1_DESC: "Постоянное давление на гиперпространство позволяет кораблю протискиваться через узкие межзвездные гиперкоридоры."
 BIO_HYPER_DRIVE_2: "Гиперкоридорное биополе II"
 BIO_HYPER_DRIVE_2_DESC: "$BIO_HYPER_DRIVE_1_DESC$"
 BIO_HYPER_DRIVE_3: "Гиперкоридорное биополе III"
 BIO_HYPER_DRIVE_3_DESC: "$BIO_HYPER_DRIVE_1_DESC$"
 BIO_JUMP_DRIVE_1: "Прыжковый орган"
 BIO_JUMP_DRIVE_1_DESC: "Прыжковый орган создает разрывы размером с корабль в самой ткани реальности, обеспечивая почти мгновенное перемещение между системами. Природа пространства, через которое корабль при этом перемещается, все еще плохо изучена."
 BIO_PSI_JUMP_DRIVE_1: "Прыжковый пси-орган"
 BIO_PSI_JUMP_DRIVE_1_DESC: "Прыжковый пси-орган позволяет сосредоточить псионический потенциал самого корабля и его экипажа для искажения пространственно-временного континуума в локальном масштабе, сокращая расстояние между точкой отправления и точкой назначения. В теории."
 tech_bio_hyper_drive_1: "Путешествия через гиперпространство"
 tech_bio_hyper_drive_1_desc: "Подобно нитям паутины экстрамерное подпространство соединяет гравитационные колодцы большинства звезд. Перемещение по этим гиперкоридорам со сверхсветовой скоростью является теоретически возможным."
 tech_bio_hyper_drive_2: "Точки входа в гиперкоридор"
 tech_bio_hyper_drive_2_desc: "Мы узнали о существовании точек пространства, где корабль затратит меньше энергии на создание «бреши» в гиперкоридор. Это открытие позволит нам создать гипердвигатели нового поколения."
 tech_bio_hyper_drive_3: "Гиперпространственные потоки"
 tech_bio_hyper_drive_3_desc: "Новое поколение гипердвигателей использует подпространственные потоки. Это резко увеличивает эффективность двигателей."
 tech_bio_jump_drive_1: "$BIO_JUMP_DRIVE_1$"
 tech_bio_jump_drive_1_desc: "Революционный $BIO_JUMP_DRIVE_1$ манипулирует местным пространственно-временным континуумом на квантовом уровне и реструктурирует его, совмещая с требуемым местом назначения. Для стороннего наблюдателя этот процесс выглядит как практически мгновенный «прыжок» корабля между системами."
 tech_bio_psi_jump_drive_1: "$BIO_PSI_JUMP_DRIVE_1$"
 tech_bio_psi_jump_drive_1_desc: "$BIO_PSI_JUMP_DRIVE_1_DESC$"
