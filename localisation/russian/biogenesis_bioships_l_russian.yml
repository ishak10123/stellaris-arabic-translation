 tech_weaver_debuffer_2: "Ослабляющие антенны"
 tech_weaver_debuffer_2_desc: "Органические подавляющие антенны генерируют дестабилизирующие импульсы, которые повреждают вражеские щиты и ослабляют системы защиты."
 tech_weaver_debuffer_3: "Подавляющие антенны"
 tech_weaver_debuffer_3_desc: "Улучшенные системы подавления усиливают дестабилизирующие поля, нарушающие целостность щитов и сопротивляемость кораблей неприятеля."
 tech_weaver_debuffer_4: "Глушащие антенны"
 tech_weaver_debuffer_4_desc: "Мощные отростки проецируют широко направленные подавляющие поля, лишая целые формации противника щитов и связи."
 tech_weaver_debuffer_5: "Биоэлектрические антенны"
 tech_weaver_debuffer_5_desc: "Адаптивные биоэлектрические импульсы ослабляют щиты и дестабилизируют системы наведения: враги остаются уязвимыми и дезориентированными."
 tech_weaver_debuffer_6: "Биоплазменные волны"
 tech_weaver_debuffer_6_desc: "Сложные биоплазменные волны полностью разрушают щиты и парализуют системы на огромных расстояниях, обезоруживая врага."
 bio_confuser_tt_intro: "Вплоть до"
 bio_confuser_tt_outro: "Шанс ['concept_confusion', дезориентировать] военные корабли на £time£ §Y5–10§! дней в зависимости от размера цели."
 concept_confusion: "Дезориентация"
 concept_confusion_desc: "Дезориентированные корабли теряют способность различать союзников и врагов и нападают на всех без разбора."
