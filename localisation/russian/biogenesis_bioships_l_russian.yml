 #Mauler Technologies
 tech_maulers: "$mauler_class_plural_cap$"
 tech_maulers_desc: "Благодаря прорыву в области биоинженерии стало возможно выращивать космические корабли, способные преодолевать скорость света. Им найдется и военное применение."
 TECH_UNLOCK_mauler_stage_1_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! $mauler_stage_1$"
 TECH_UNLOCK_mauler_stage_1_CONSTRUCTION_DESC: "§H$mauler_stage_1$§!\n$mauler_class_cap$ — простейший боевой корабль, вооруженный орудиями малой дальности и оснащенный прочным бронепанцирем."
 tech_mauler_build_speed: "Выращивание стандартного мучителя"
 tech_mauler_build_speed_desc: "Эти инкубационные камеры ускоряют развитие эмбрионов военных кораблей внутри богатых питательными веществами биокапсул. Несмотря на свою примитивность, эти сооружения — первый шаг к переходу от строительства флота к его выращиванию."
 tech_mauler_build_speed_effect: "$mod_ship_mauler_cost_mult$: §G-5%§!\nСкорость строительства мучителя: §G+25%§!"
 tech_mauler_growth_1: "Развитие улучшенного мучителя"
 tech_mauler_growth_1_desc: "Усовершенствованные процессы инкубации сокращают время созревания и повышают прочность конструкции органических кораблей. Улучшенные системы питания и генного редактирования помогают выращивать более быстрые и живучие суда."
 TECH_UNLOCK_mauler_stage_2_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! $mauler_stage_2$"
 TECH_UNLOCK_mauler_stage_2_CONSTRUCTION_DESC: "§H$mauler_stage_2$§!\n$mauler_class_cap$ типа «$ship_growth_stage_2$» появился в результате селекции, направленной на наращивание огневой мощи и брони."
 gateway_bio_ships: "§HПуть биокораблей§!\n§EЭта технология будет способствовать дальнейшим достижениям в области более мощных биологических кораблей.§!"
 tech_mauler_growth_2: "Развитие продвинутого мучителя"
 tech_mauler_growth_2_desc: "Эти сооружения позволяют создавать невероятно живучие и адаптивные суда. Оптимизированные генетические матрицы и сложные системы биотехнологического обслуживания гарантируют несравненные характеристики в космическом пространстве."
 TECH_UNLOCK_mauler_stage_3_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! $mauler_stage_3$"
 TECH_UNLOCK_mauler_stage_3_CONSTRUCTION_DESC: "§H$mauler_stage_3$§!\n$mauler_class_cap$ типа «$ship_growth_stage_3$» — вершина развития в своем классе. Он отлично бронирован и оснащен значительным количеством орудий малой дальности."
 #Weaver Technologies
 tech_weavers: "$weaver_class_plural_cap$"
 tech_weavers_desc: "Спроектированные на основе ранних биоинженерных технологий, ткачи сочетают маневренность и повышенную боевую мощь."
 TECH_UNLOCK_weaver_stage_1_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! $weaver_stage_1$"
 TECH_UNLOCK_weaver_stage_1_CONSTRUCTION_DESC: "§H$weaver_stage_1$§!\n$weaver_class_cap$ — это многофункциональный биокорабль средних размеров, спроектированный для поддержки других кораблей в составе флотилии и завоевания превосходства над более крупными врагами за счет маневренности."
 tech_weaver_build_speed: "Выращивание стандартного ткача"
 tech_weaver_build_speed_desc: "На этих предприятиях в особых биокапсулах выращиваются биокорабли средних размеров. Системы усиленного питания и генетическая оптимизация позволяют создавать маневренные и адаптивные боевые суда для флотилий."
 tech_weaver_build_speed_effect: "$mod_ship_weaver_cost_mult$: §G-5%§!\nСкорость строительства ткача: §G+25%§!"
 tech_weaver_growth_1: "Развитие улучшенного ткача"
 tech_weaver_growth_1_desc: "На этих предприятиях используются современные приемы биоинженерии для ускорения циклов выращивания и усиления адаптивности судов. Улучшенные генетические матрицы и оптимизированные условия развития обеспечивают живучесть и маневренность кораблей в бою."
 TECH_UNLOCK_weaver_stage_2_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! $weaver_stage_2$"
 TECH_UNLOCK_weaver_stage_2_CONSTRUCTION_DESC: "§H$weaver_stage_2$§!\n$weaver_class_cap$ типа «$ship_growth_stage_2$» был специально выведен с целью повысить его мобильность и адаптивность при действиях в составе флотилии."
 tech_weaver_growth_2: "Развитие продвинутого ткача"
 tech_weaver_growth_2_desc: "На этих предприятиях производятся биокорабли непревзойденной точности и универсальности. Революционные технологии выращивания и адаптивные генетические улучшения позволяют создавать суда, которые уверенно чувствуют себя в самых сложных тактических условиях."
 TECH_UNLOCK_weaver_stage_3_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! $weaver_stage_3$"
 TECH_UNLOCK_weaver_stage_3_CONSTRUCTION_DESC: "§H$weaver_stage_3$§!\n$weaver_class_cap$ типа «$ship_growth_stage_3$» специально выращивается так, чтобы добиться превосходной маневренности и универсальности."
 #Harbinger Technologies
 tech_harbingers: "$harbinger_class_plural_cap$"
 tech_harbingers_desc: "Предвестники представляют собой огромный скачок в развитии биоинженерного оружия; серьезная боевая мощь в них сочетается с прочностью, характерной для живой техники. Эти корабли служат основой флота."
 TECH_UNLOCK_harbinger_stage_1_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! $harbinger_stage_1$"
 TECH_UNLOCK_harbinger_stage_1_CONSTRUCTION_DESC: "§H$harbinger_stage_1$§!\n$harbinger_class_cap$ поддерживает флотилию, выпуская на поле боя рои малых боевых кораблей."
 tech_harbinger_build_speed: "Выращивание стандартного предвестника"
 tech_harbinger_build_speed_desc: "На этих предприятиях выращиваются крупные биокорабли. Благодаря сложным системам принудительного питания они сходят со стапелей прочными и готовыми к бою."
 tech_harbinger_build_speed_effect: "$mod_ship_harbinger_cost_mult$: §G-5%§!\nСкорость строительства предвестника: §G+25%§!"
 tech_harbinger_growth_1: "Развитие улучшенного предвестника"
 tech_harbinger_growth_1_desc: "На этих улучшенных предприятиях используются сложные биоинженерные технологии, позволяющие ускорять рост и усиливать структурную прочность кораблей. Корабли получаются более выносливыми и эффективными."
 TECH_UNLOCK_harbinger_stage_2_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! $harbinger_stage_2$"
 TECH_UNLOCK_harbinger_stage_2_CONSTRUCTION_DESC: "§H$harbinger_stage_2$§!\nУлучшенные технологии роста позволяют получать более мощные и надежные суда."
 tech_harbinger_growth_2: "Развитие продвинутого предвестника"
 tech_harbinger_growth_2_desc: "Новейшие системы инкубации производят корабли непревзойденной прочности и боевой мощи. Тонкая настройка генов и оптимальные условия роста позволяют выращивать суда, которые господствуют в боевом пространстве благодаря невероятной живучести."
 TECH_UNLOCK_harbinger_stage_3_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! $harbinger_stage_3$"
 TECH_UNLOCK_harbinger_stage_3_CONSTRUCTION_DESC: "§H$harbinger_stage_3$§!\nОбладает максимальной прочностью и боевой силой."
 #Stinger Technologies
 tech_stingers: "$stinger_class_plural_cap$"
 tech_stingers_desc: "Задача жал — наносить сокрушительные удары по приоритетным целям. Они умело находят и используют слабые места в обороне противника."
 TECH_UNLOCK_stinger_stage_1_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! $stinger_stage_1$"
 TECH_UNLOCK_stinger_stage_1_CONSTRUCTION_DESC: "§H$stinger_stage_1$§!\nБыстрый и смертельно опасный биокорабль, выращенный для нанесения точных ударов и завоевания тактического превосходства."
 tech_stinger_build_speed: "Выращивание стандартного жала"
 tech_stinger_build_speed_desc: "На этих предприятиях выращиваются биокорабли, предназначенные для быстрых и точных ударов. Благодаря современным биокапсулам и особому типу кормления эти суда способны развивать огромную скорость и точно бить по врагу."
 tech_stinger_build_speed_effect: "$mod_ship_stinger_cost_mult$: §G-5%§!\nСкорость строительства жала: §G+25%§!"
 tech_stinger_growth_1: "Развитие улучшенного жала"
 tech_stinger_growth_1_desc: "На этих предприятиях используются технологии, сокращающие циклы роста и повышающие точность кораблей, что делает их маневреннее и опаснее. Эти улучшения делают жала грозной силой в бою."
 TECH_UNLOCK_stinger_stage_2_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! $stinger_stage_2$"
 TECH_UNLOCK_stinger_stage_2_CONSTRUCTION_DESC: "§H$stinger_stage_2$§!\nПовышенная скорость и точность делают его опаснее в тактических операциях."
 tech_stinger_growth_2: "Развитие продвинутого жала"
 tech_stinger_growth_2_desc: "Вершина технологий выращивания биокораблей, эти предприятия производят жала несравненной скорости и смертоносности. Благодаря оптимизированным генетическим схемам и новейшим инкубационным технологиям эти корабли господствуют в пространстве боя, нанося врагу быстрые и разрушительные удары."
 TECH_UNLOCK_stinger_stage_3_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! $stinger_stage_3$"
 TECH_UNLOCK_stinger_stage_3_CONSTRUCTION_DESC: "§H$stinger_stage_3$§!\nГосподствуют в бою за счет непревзойденной скорости и точности."
