 mod_weapon_type_mandible_weapon_damage_mult: "Урон оружия-мандибулы"
 APPLIED_MODIFIERS_SUPPORT_TITLE: "Модификаторы от оружия поддержки:"
 WEAVER_GROWTH_AURA_1: "Феромоны роста"
 WEAVER_GROWTH_AURA_1_DESC: "Ткачи испускают сложный комплекс биохимических сигналов, которые ускоряют взросление находящихся поблизости органических существ. Эти феромоны повышают скорость роста и облегчают адаптацию, благодаря чему флотилия быстрее развивается и приспосабливается к любой задаче."
 WEAVER_GROWTH_AURA_2: "Экзотические феромоны роста"
 WEAVER_GROWTH_AURA_2_DESC: "Новейшие биоинженерные технологии усиливают эффективность этих феромонов, значительно ускоряя рост и оптимизацию союзных биокораблей. Эта улучшенная аура помогает флотилии достигать максимальной эффективности с удивительной скоростью, прямо в пылу сражения."
 GROWTH_AURA: "$WEAVER_GROWTH_AURA_1$"
 GROWTH_AURA_TT: "§PЭта аура действует только на биокорабли, способные расти.§!"
 WEAVER_BOOSTER_1: "Базовый симбиотический усилитель"
 WEAVER_BOOSTER_1_DESC: "Это органическое устройство укрепляет связи между биокораблями, усиливая обмен энергией и улучшая координацию всей флотилии. Его присутствие обеспечивает высокую эффективность как в бою, так и при управлении ресурсами."
 WEAVER_BOOSTER_2: "Улучшенный симбиотический усилитель"
 WEAVER_BOOSTER_2_DESC: "Улучшенная версия симбиотического усилителя, которая в динамическом режиме адаптируется к нуждам флотилии и повышает ее эффективность и скорость реакции. Этот прибор оптимизирует возможности кораблей во флотилии и обеспечивает адаптивность в ходе операций."
 HARBINGER_INCUBATOR_1: "Инкубационная матрица"
 HARBINGER_INCUBATOR_1_DESC: "Вокруг яиц развивающихся штурмовых кораблей образуется клеточная матрица, выступающая в роли искусственного инкубатора."
 HARBINGER_INCUBATOR_2: "$HARBINGER_INCUBATOR_1$ быстрого роста"
 HARBINGER_INCUBATOR_2_DESC: "Под воздействием экзотических газов развитие штурмовика в период инкубации происходит быстрее."
 HARBINGER_CHITIN_1: "Хитиновые регуляторы роста"
 HARBINGER_CHITIN_1_DESC: "Выделения в ангарных отсеках стимулируют у растущих ударных кораблей развитие хитиновых пластин, которые придают им прочности."
 HARBINGER_CHITIN_2: "Кристаллические регуляторы роста"
 HARBINGER_CHITIN_2_DESC: "Вживление редких кристаллов в хитиновые экзоскелеты наших штурмовиков обеспечит им еще большее сопротивление урону."
 STINGER_RANGE_1: "Дальномерный кластер"
 STINGER_RANGE_1_DESC: "Вторичный нейронный кластер, обрабатывающий данные от воспринимающих устройств."
 STINGER_RANGE_2: "Улучшенный $STINGER_RANGE_1$"
 STINGER_RANGE_2_DESC: "Вживление редких кристаллов в ткани, покрывающие нервные пути, позволяет быстрее обрабатывать данные о целях."
 STINGER_FIRE_RATE_1: "Теплоотводящие отдушины"
 STINGER_FIRE_RATE_1_DESC: "Благодаря череде расположенных вдоль грудного отдела теплоотводящих отверстий этот корабль может выбрасывать в космос сжатые высокотемпературные газы, что увеличивает скорострельность."
 STINGER_FIRE_RATE_2: "Летучие отдушины"
 STINGER_FIRE_RATE_2_DESC: "Теплообмен посредством летучих пылинок невозможен без отдельной клеточной матрицы, иначе слишком велик риск взрыва."
 #Armor/Carapace
 tech_bio_ship_armor_1: "$tech_ship_armor_1$"
 BIO_ARMOR_1: "$NANOCOMPOSITE_CARAPACE$"
 BIO_ARMOR_1_DESC: "Эта улучшенная биоброня представляет собой органические ткани с армированием из наноструктурных материалов, которые формируют живой панцирь, способный выдержать самые разрушительные удары. Панцирь динамически адаптируется к природе повреждений, быстро регенерирует и сообщает биокораблям несравнимую защиту."
 SMALL_BIO_ARMOR_1: "Малый $BIO_ARMOR_1$"
 MEDIUM_BIO_ARMOR_1: "Средний $BIO_ARMOR_1$"
 LARGE_BIO_ARMOR_1: "Большой $BIO_ARMOR_1$"
 tech_bio_ship_armor_2: "$tech_ship_armor_2$"
 BIO_ARMOR_2: "$CERAMO_CHITIN_CARAPACE$"
 BIO_ARMOR_2_DESC: "Усиленные керамическими составами хитиновые пластины сообщают этой биоброне исключительную прочность и жаропрочность. Многослойная структура обеспечивает серьезную защиту, сохраняя гибкость, важную для органических судов."
 SMALL_BIO_ARMOR_2: "Малый $CERAMO_CHITIN_CARAPACE$"
 MEDIUM_BIO_ARMOR_2: "Средний $CERAMO_CHITIN_CARAPACE$"
 LARGE_BIO_ARMOR_2: "Большой $CERAMO_CHITIN_CARAPACE$"
 tech_bio_ship_armor_3: "$tech_ship_armor_3$"
 BIO_ARMOR_3: "$PLASTEEL_CARAPACE$"
 BIO_ARMOR_3_DESC: "Эта биологическая броня состоит из прочных органических тканей, армированных пластисталью, и отличается невероятной прочностью и исключительной гибкостью. Ее композитная структура предоставляет отменную защиту от кинетического и энергетического оружия и отлично подходит для биокораблей."
 SMALL_BIO_ARMOR_3: "Малый $PLASTEEL_CARAPACE$"
 MEDIUM_BIO_ARMOR_3: "Средний $PLASTEEL_CARAPACE$"
 LARGE_BIO_ARMOR_3: "Большой $PLASTEEL_CARAPACE$"
 tech_bio_ship_armor_4: "$tech_ship_armor_4$"
 BIO_ARMOR_4: "Панцирь из дюрастали"
 BIO_ARMOR_4_DESC: "Армированная прочными органическими составами, эта биоброня гарантирует исключительное сопротивление повреждениям. Ее гибридная структура также сообщает значительную прочность без ущерба для гибкости живых существ."
 SMALL_BIO_ARMOR_4: "Малый $DURASTEEL_CARAPACE$"
 MEDIUM_BIO_ARMOR_4: "Средний $DURASTEEL_CARAPACE$"
 LARGE_BIO_ARMOR_4: "Большой $DURASTEEL_CARAPACE$"
 tech_bio_ship_armor_5: "$tech_ship_armor_5$"
 BIO_ARMOR_5: "Нейтрониевый панцирь"
 BIO_ARMOR_5_DESC: "Этот панцирь, чудо биоинженерии, состоит из органической ткани с армированием из нейтрониевых нитей, в результате чего получается практически непробиваемая броня. Ее плотный, но адаптивный состав обеспечивает несравненную защиту против самых разрушительных воздействий."
 SMALL_BIO_ARMOR_5: "Малый $NEUTRONIUM_CARAPACE$"
 MEDIUM_BIO_ARMOR_5: "Средний $NEUTRONIUM_CARAPACE$"
 LARGE_BIO_ARMOR_5: "Большой $NEUTRONIUM_CARAPACE$"
 tech_bio_dragon_armor: "$tech_dragon_armor$"
 DRAGON_BIO_ARMOR: "$DRACONIC_CARAPACE$"
 DRAGON_BIO_ARMOR_DESC: "Этот панцирь, вершина развития биоброни, создан по образу и подобию панцирей древних сверххищников. Его слоистая структура сочетает регенерирующую органическую ткань и практически непробиваемые биосплавы — в результате получается броня столь же прочная и упорная, как и существа, которые вдохновили ее создателей."
 SMALL_DRAGON_BIO_ARMOR: "Малый $DRAGON_BIO_ARMOR$"
 MEDIUM_DRAGON_BIO_ARMOR: "Средний $DRAGON_BIO_ARMOR$"
 LARGE_DRAGON_BIO_ARMOR: "Большой $DRAGON_BIO_ARMOR$"
 tech_bio_archaeoarmor: "$tech_archaeoarmor$"
 BIO_ARCHAEO_ARMOR: "Импульсный кластер"
 BIO_ARCHAEO_ARMOR_DESC: "Ионизированные слои в составе панциря генерируют реактивный заряд, который рассеивает энергию удара за счет магнитного отталкивания и направленных полей."
