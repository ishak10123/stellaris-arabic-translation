 concept_biological_ship: "$bio_ship$"
 concept_biological_ships: "$concept_biological_ship$"
 concept_biological_ship_desc: "- Биокорабли делятся на боевые классы с четкой специализацией и тремя этапами развития. $NEW_LINE$- Для строительства используется преимущественно $i_food$, а не $i_alloys$. $NEW_LINE$- На содержание тратится в основном $i_food$, а не $i_energy$. $NEW_LINE$- Развитие на базе технологий §Y£society£биологии§!, а не §Y£engineering£приручения пустоты§!. $NEW_LINE$$h_line$§LДля перемещения в космосе эти живые суда из огромных колеблющихся мышечных волокон с биолюминесцентными органеллами испускают богатые энергией соединения, создавая вспышки света и тепла, а вместе с ними и тягу.§!"
 default_ship: "Механические корабли"
 bio_ship: "Биокорабли"
 #Shipset Descriptions
 biogenesis_01_shipset_desc: "§HТип набора: ['concept_biological_ship', биологический]§!\nЭти биологические корабли скорее рождаются, чем строятся на верфях, и от рождения они наделены инстинктом охотника. Их полуразумная биомасса адаптируется, охотится и с ненасытной жаждой истребляет врага."
 biogenesis_02_shipset_desc: "§HТип набора: ['concept_biological_ship', биологический]§!\nЭти закованные в панцирь звездолеты — не просто слуги для своих хозяев. Они выживают и растут вместе с бесстрашными исследователями, для которых они служат домом."
 humanoid_01_shipset_desc: "Прочные и выносливые, в космическом пространстве эти суда способны выдержать любые невзгоды. Созданные покорять неизвестное, они несут надежды и мечты своих творцов к далеким звездам."
 synthetics_01_shipset_desc: "Конструкция этих кораблей — воплощение не знающего усталости гения. Тепловые предохранители на корпусе отводят тепло разогнанных мейнфреймов и обеспечивают их безупречную работу в стремлении к абсолютной эффективности."
 mammalian_01_shipset_desc: "Надежная конструкция этих судов отражает выносливость их создателей. Толстая обшивка защищает и изолирует внутренние объемы, а дублированные и триплированные системы обеспечивают выживание в самых сложных условиях."
 reptilian_01_shipset_desc: "Своими угловатыми и практичными формами эти прочные суда напоминают выносливых хищников. Они были созданы и запущены в космос благодаря хладнокровному упорству своих создателей."
 avian_01_shipset_desc: "Плавные, грациозные формы этих многоцелевых судов воплощают красоту полета. Каждый их изгиб и поверхность — это отражение созданий, для которых космос не преграда, но продолжение неба."
 arthropoid_01_shipset_desc: "Хитин или сталь, форма или функциональность — разделения нет. Задача этих кораблей — не впечатлять зевак, но переносить трудности космоса. Многослойная структура их корпусов — яркая демонстрация философии выживания."
 molluscoid_01_shipset_desc: "Грациозные, но прочные, эти суда служат своей команде и укрытием, и оружием. Под надежными оболочками скрываются сложные системы, тихо и эффективно регулирующие потоки энергии и питательных веществ."
 fungoid_01_shipset_desc: "Своими округлыми формами эти корабли напоминают плодовые тела грибов. Сложные внутренние системы построены на принципах автономности и повторяют устройство мицелия."
 plantoid_01_shipset_desc: "Эти изумрудные корабли не просто путешествуют между звездами — они пускают среди них корни. Фотосинтетические гондолы поддерживают равновесие бортовых биомов."
 lithoid_01_shipset_desc: "Сформированные временем и давлением недр, эти каменные суда олицетворяют постоянство. Основные бортовые системы строятся на кремниевых матрицах и черпают свою силу из тех же материалов, из которых сложены планеты."
 necroid_01_shipset_desc: "Мрачные и зловещие, эти парящие в межзвездном пространстве соборы служат символами смерти и возрождения. Их энтропические ядра и ритуалистическая отделка навевают мысли о потусторонних силах и безвременных амбициях."
 nemesis_01_shipset_desc: "Огромные и гнетущие, эти корабли подчиняют одним своим видом. Их усиленные надстройки и дублированные системы излучают ауру всеобъемлющей власти."
 aquatic_01_shipset_desc: "Стремительные, но величественные, эти корабли демонстрируют мощь океана. Заполненные жидкостью внутренние объемы и гидродинамические формы отражают грацию их создателей."
 toxoid_01_shipset_desc: "Эти корабли истекают дымами, зловеще грохочут и нарушают все стандарты и нормы — но они работают. В качестве топлива они используют отходы и функционируют за счет упрямства своих создателей. Эти корабли долетят до цели, даже когда другие сдадутся."
 cybernetics_01_shipset_desc: "Сверкающий хром, гул электроцепей и рефлексы — пережитки прошлого. Прямые нейроинтерфейсы исключают задержки и ограничения и гарантируют исключительную, невероятную точность."
