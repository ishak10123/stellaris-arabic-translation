 #Healing Guns
 tech_weaver_buffer_2: "Целебные споры ткачей"
 tech_weaver_buffer_2_desc: "Целебные споры высаживаются на союзные корабли, после чего заполняют небольшие повреждения корпуса и поддерживают живучесть в ходе битвы."
 tech_weaver_buffer_3: "Восстановительные споры ткачей"
 tech_weaver_buffer_3_desc: "Эти усовершенствованные споры выделяют мощные целебные составы, поддерживающие союзные корабли под огнем противника."
 tech_weaver_buffer_4: "Адаптивные споры ткачей"
 tech_weaver_buffer_4_desc: "Направленные потоки высокоадаптивной биоматерии восстанавливают серьезные повреждения и ускоряют органическую регенерацию."
 tech_weaver_buffer_5: "Разумные споры ткачей"
 tech_weaver_buffer_5_desc: "Разумные целебные препараты способны сами находить и восстанавливать места критических повреждений, сильно увеличивая живучесть в бою."
 tech_weaver_buffer_6: "Загадочное восстановительное устройство ткачей"
 tech_weaver_buffer_6_desc: "Это биологическое оружие поддержки способно практически мгновенно восстанавливать и регенерировать корабли, сохраняя союзников даже в самых жарких схватках."
 BIO_HEALING_GUN_1: "Восстановительная установка"
 BIO_HEALING_GUN_1_DESC: "К союзным кораблям запускаются регенеративные капсулы с сильными целебными составами."
