 #Combat Computers
 BIO_COMBAT_COMPUTER_DEFAULT: "Боевые инстинкты"
 BIO_COMBAT_COMPUTER_DEFAULT_DESC: "Каждый биокорабль обладает примитивными боевыми инстинктами, позволяющими уклоняться от атак и проводить целеуказание."
 BIO_COMBAT_COMPUTER_BASIC: "Нейроимплантаты"
 BIO_COMBAT_COMPUTER_BASIC_DESC: "Эти имплантаты напрямую интегрируются в органические системы корабля, ускоряя принятие решений и облегчая точную тактическую координацию. Выступая в роли органического боевого компьютера, они улучшают понимание обстановки и оптимизируют действия в пространстве боя."
 BIO_COMBAT_COMPUTER_ADVANCED: "Улучшенные нейроимплантаты"
 BIO_COMBAT_COMPUTER_ADVANCED_DESC: "Эти системы, появившиеся в результате эволюции стандартных нейроимплантатов, повышают скорость тактического анализа и принятия решений. Они обеспечивают повышенную эффективность и координацию, позволяя биокораблям быстро реагировать на меняющуюся боевую обстановку."
 BIO_COMBAT_COMPUTER_SAPIENT: "Разумные нейроимплантаты"
 BIO_COMBAT_COMPUTER_SAPIENT_DESC: "Эти имплантаты обладают биологическим разумом, способным на самостоятельный стратегический анализ. Комбинируя биологические инстинкты и искусственную логику, они позволяют биокораблям динамически адаптироваться к сложным боевым ситуациям и демонстрируют способность к практически автономному принятию решений."
 BIO_COMBAT_COMPUTER_AUTONOMOUS: "Автономные нейроимплантаты"
 BIO_COMBAT_COMPUTER_AUTONOMOUS_DESC: "Эти системы полностью автономны. Они наделены биологическим разумом и сознанием и помогают кораблям анализировать данные, строить стратегии и исполнять решения без внешнего управления, беспрецедентно повышая их боевую эффективность."
 BIO_COMBAT_COMPUTER_PRECOG: "Прекогнитивные боевые инстинкты"
 BIO_COMBAT_COMPUTER_PRECOG_DESC: "Эти псионические имплантаты дают биокораблям способность предвидения и позволяют им предупреждать действия врага еще до того, как тот их совершит. Эта почти сверхъестественная способность дает флотилиям решительное преимущество и позволяет мгновенно реагировать даже на самые сложные угрозы."
