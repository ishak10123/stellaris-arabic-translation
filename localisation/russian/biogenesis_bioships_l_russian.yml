 bio_ship_unique_components_DESC: "Выращенные или трансплантированные внутрь живых корпусов, эти дополнительные органы улучшают уникальные способности биологических кораблей."
 MAULER_STAGE_1_GROWTH_1: "Железа роста ($ship_growth_stage_1$)"
 MAULER_STAGE_1_GROWTH_1_DESC: "Вживленные железы выделяют мощную смесь гормонов и стероидов, ускоряющую переход этого корабля на следующую стадию развития."
 MAULER_STAGE_1_GROWTH_2: "Железа ускоренного роста ($ship_growth_stage_1$)"
 MAULER_STAGE_1_GROWTH_2_DESC: "Подмешивая экзотические газы в выделяемые гормоны и стероиды, этот орган ускоряет рост биологических кораблей."
