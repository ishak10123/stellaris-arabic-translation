 tech_fe_administration_2: "Квантовые процессы управления"
 tech_fe_administration_2_desc: "Нашим технологиям под силу справиться даже с самыми сложными управленческими процессами. Еще немного — и государство галактического масштаба будет действовать как отлаженный механизм."
