 ### FE Civics
 civic_antediluvian_mind: "Древний разум"
 civic_antediluvian_mind_desc: "Время не пощадило это гештальт-сознание. Его некогда неутолимое стремление к жизни угасло после долгих лет заточения в хронопузыре."
 civic_sluggish_drones: "Единицы без руководства"
 civic_sluggish_drones_desc: "Расслабившийся сверхразум мало что требует от рабочих, поэтому те выполняют свои задачи медленно и флегматично."
 ### FE Buildings
 building_fe: "Сооружение угасшей империи"
 building_ancient_control_center: "Древний центр управления"
 building_ancient_control_center_desc: "Древний центр управления в этом мире-кольце едва поддерживается в рабочем состоянии при неустанных усилиях целого легиона механических дронов."
 building_ancient_palace: "Древний дворец"
 building_ancient_palace_desc: "Этот внушительный дворцовый комплекс — память о давно ушедшей эпохе. Яркий фасад по прошествии времени почти не пострадал, но заброшенные флигели серьезно обветшали."
 building_ancient_hive_capital: "Многовековой Узел"
 building_ancient_hive_capital_desc: "Здесь, в точке сосредоточения могущества улья, бесчисленные поколения единиц древнего Разума добросовестно выполняют любые указания."
 building_affluence_emporium: "Рынок изобилия"
 building_affluence_emporium_desc: "Все материальные блага здесь можно получить еще до того, как возникнет такое желание: благодаря сложным алгоритмам прогнозирования и снабжения все нужные товары появляются заблаговременно."
 building_affluence_center: "Центр изобилия"
 building_affluence_center_desc: "В этом центре можно без труда утолить даже самые диковинные потребности — желаемое появляется молниеносно."
 building_nourishment_complex: "Комплекс питания"
 building_nourishment_complex_desc: "Технология репликации обеспечит гурманам любой вкус, стоит только пожелать."
 building_nourishment_center: "Центр питания"
 building_nourishment_center_desc: "Внутри этих стен можно воссоздать совершенно любой вкус."
 building_dimensional_replicator: "Межпространственный репликатор"
 building_dimensional_replicator_desc: "Это устройство без малейших потерь преобразовывает энергию в материю."
 building_dimensional_fabricator: "Межпространственный изготовитель"
 building_dimensional_fabricator_desc: "Этот сложный изготовитель пробивает межпространственную ткань, не оставляя разрывов, и извлекает ценные ресурсы."
 building_class_3_singularity: "Сингулярность класса 3"
 building_class_3_singularity_desc: "Установка для поглощения всей выделяемой этой сингулярностью энергии — настоящее чудо инженерной мысли."
 building_class_4_singularity: "Сингулярность класса 4"
 building_class_4_singularity_desc: "Мощность излучения этой сингулярности противоречит известным законам физики, однако сдерживающие поля прочны и надежны."
 building_micro_forge: "Гиперкузница"
 building_micro_forge_desc: "Скорость работы этой кузницы ограничена лишь количеством подаваемых ресурсов."
 building_nano_forge: "Автокузница"
 building_nano_forge_desc: "Огромные отсеки с нанорепликаторами в этой кузнице преобразуют сырье в усовершенствованные сплавы с небывалым уровнем эффективности."
 building_fe_sky_dome: "Небесный купол"
 building_fe_sky_dome_desc: "Этот парящий город, что держится в воздухе благодаря современным антигравитационным технологиям, — настоящий райский уголок."
 building_fe_dome: "Заоблачный купол"
 building_fe_dome_desc: "Само существование этих куполов, поддерживаемых в воздухе силой гравиметрических нейтрализаторов, словно отрицает закон тяготения. Жителей же обслуживают современнейшие системы жизнеобеспечения."
 building_fe_fortress: "Бастион «Аспис»"
 building_fe_fortress_desc: "Этот колоссальный комплекс планетарной обороны располагает несколькими арсеналами и многочисленными защитными слоями. Пробить его могут только специально обученные и подготовленные осадные отряды."
 building_fe_stronghold: "Комплекс «Эгида»"
 building_fe_stronghold_desc: "Этот исполинский комплекс планетарной обороны оснащен бесчисленными арсеналами и прочнейшей защитой. Скорее горы на планете превратятся в пыль, чем рухнет ее оборона."
 building_master_archive: "Главный архив"
 building_master_archive_desc: "Здесь хранятся знания, накопленные за многие эпохи существования галактики. Однако уже не осталось в живых никого, кто умел бы пользоваться этим хранилищем, поэтому любая извлеченная отсюда информация бесценна."
 building_empyrean_shrine: "Полускрытое небесное святилище"
 building_empyrean_shrine_desc: "В этом храме жрецы общаются с духами Покрова, поэтому в нашем измерении он существует лишь частично."
 building_ancient_cryo_chamber: "Древняя криокамера"
 building_ancient_cryo_chamber_desc: "Эта огромная конструкция заполнена бесконечными рядами криокапсул с давно погибшими останками миллиардов инопланетных существ, замороженных в далеком прошлом."
 building_fe_administration_1: "Всевидящая администрация"
 building_fe_administration_1_desc: "Этот значительных размеров комплекс, подключенный к обширной административной сети, — важный компонент бюрократической системы галактического масштаба."
 building_fe_administration_2: "Всезнающая администрация"
 building_fe_administration_2_desc: "Этот значительных размеров комплекс, объединяющий в единое целое бюрократическую систему галактического масштаба, — ключевое звено управления сложной административной сетью."
 building_fe_administration_hive_1: "Эфаптическое скопление"
 building_fe_administration_hive_1_desc: "Эта сеть эфаптических узлов, находящаяся под постоянным присмотром узкоспециализированных единиц, служит для укрепления власти улья над всеми его обширными владениями."
 building_fe_administration_hive_2: "Эфаптический аксон"
 building_fe_administration_hive_2_desc: "Эта обширная сеть эфаптических узлов, находящаяся под постоянным присмотром узкоспециализированных единиц, помогает улью навязывать галактике свою волю."
 building_fe_administration_machine_1: "Фрактальный координационный пункт"
 building_fe_administration_machine_1_desc: "Сложный фрактальный узел, безостановочно обрабатывающий и передающий триллионы сигналов почти мгновенно и с высочайшей точностью."
 building_fe_administration_machine_2: "Квантовый координационный пункт"
 building_fe_administration_machine_2_desc: "Сложный узел, использующий квантовую запутанность. Безостановочно обрабатывает и передает квадриллионы сигналов почти мгновенно и с высочайшей точностью."
 building_fe_temple_1: "Небесное святилище"
 building_fe_temple_1_desc: "Благодаря новейшим метафизическим технологиям верующие могут напрямую пообщаться с божественной сущностью."
 building_fe_temple_2: "Небесный собор"
 building_fe_temple_2_desc: "С помощью метафизических технологий можно усиливать духовный резонанс, возникающий во время псионических проповедей. Благодаря этому комплексу, охватывающему целую систему, верующие могут напрямую приобщиться к божественной сущности."
 building_fe_assembly_1: "Комплекс производства роботов"
 building_fe_assembly_1_desc: "Передовой сборочный комплекс, где работают только опытнейшие роботостроители. Здесь не признаются традиционные ограничения — в стенах этого комплекса скрупулезно куется будущее робототехники."
 building_fe_assembly_2: "Центр квантового производства роботов"
 building_fe_assembly_2_desc: "Настоящее чудо техники: на квантовом конвейере этого производства с помощью преобразователей запутанности вытачиваются сложнейшие детали без малейшего брака — каждый атом на своем месте."
 building_fe_clinic_1: "Институт молекулярного оздоровления"
 building_fe_clinic_1_desc: "Сотрудники этого института настолько хорошо познали тонкости клеточной биологии, что благодаря их усилиям население стало жить значительно дольше и лучше."
 building_fe_clinic_2: "Институт биовосстановления"
 building_fe_clinic_2_desc: "Этот институт находится в авангарде разработки медицинских технологий. Здесь занимаются передовой биовосстановительной терапией, неуклонно увеличивая продолжительность жизни."
 building_fe_security_1: "Комплекс правосудия"
 building_fe_security_1_desc: "В этом грандиозном комплексе судебная система прочно сплелась с правоохранительной."
 building_fe_security_2: "Зиккурат правосудия"
 building_fe_security_2_desc: "Это громадное сооружение — апогей развития правовых институтов и настоящий символ правосудия. Здесь расположились суды, временные изоляторы и исправительные учреждения, где могут перевоспитать даже закоренелых преступников."
 building_fe_market_1: "Центр галактической торговли"
 building_fe_market_1_desc: "Эти огромные башни возвышаются над оживленными торговыми кварталами, лежащими у их подножия."
 building_fe_market_2: "Межзвездный торговый узел"
 building_fe_market_2_desc: "Колоссальные шпили этой столицы галактической экономики видны даже с орбиты."
 building_fe_silo_1: "Сжимающий подпространственный склад"
 building_fe_silo_1_desc: "На этом складе используется технология искривления подпространства, которое сокращает расстояние между молекулами и сжимает хранимые внутри товары. Живым существам входить внутрь запрещено."
 building_fe_silo_2: "Экстрамерный склад"
 building_fe_silo_2_desc: "Технология создания подпространственных «карманов» позволяет хранить практически неограниченное количество ресурсов."
 building_fe_entertainment_1: "Площадь виртуального блаженства"
 building_fe_entertainment_1_desc: "Эти огромные развлекательные комплексы представляют собой последнее слово в индустрии отдыха и рекреации. Установленные здесь сканеры считывают мозговые волны посетителей и предлагают им мгновенное погружение в персональный рай."
 building_fe_entertainment_2: "Матрица абсолютного блаженства"
 building_fe_entertainment_2_desc: "Абсолютная вершина технологии развлечений. Эта матрица разрушает все привычные ограничения и превращает мечты пользователя в реальность еще до того, как тот осознает свои желания."
 building_fe_lab_1: "Центр квантовых инноваций"
 building_fe_lab_1_desc: "Этот центр укомплектован новейшим оборудованием и беспрецедентно талантливым персоналом. Он открывает двери в новую эпоху, в которой квантовые теории, ранее лишь умозрительные, воплощаются на практике в революционных изобретениях."
 building_fe_lab_2: "Отдел трансцендентных инноваций"
 building_fe_lab_2_desc: "Это сооружение — олицетворение вершины научной мысли. Самим своим существованием оно демонстрирует, что мы вступили в эпоху безудержных инноваций."
 building_fe_mine_1: "Квантовая буровая платформа"
 building_fe_mine_1_desc: "Эта горнодобывающая платформа способна находить минералы в любом месте планетарной коры и бурить твердые породы без физического контакта с ними за счет технологии квантового туннелирования."
 building_fe_mine_2: "Квантовый буровой комплекс"
 building_fe_mine_2_desc: "Этот горнодобывающий комплекс способен извлекать минералы из любого региона планеты вплоть до внешней мантии. Благодаря технологии квантового туннелирования он способен бурить твердые и жидкие породы без физического контакта с ними."
 ### FE Jobs
 job_fe_overseer: "Блюститель"
 job_fe_overseer_plural: "Блюстители"
 job_fe_overseer_desc: "Те немногие храбрецы, кто отказался от роскошной жизни ради служения обществу. Именно они присматривают за остатками древней цивилизации и направляют их."
 mod_job_fe_overseer_add: "Должности блюстителей"
 job_fe_maintenance_bot: "Смотритель"
 job_fe_maintenance_bot_plural: "Смотрители"
 job_fe_maintenance_bot_desc: "Эти древние машины неустанно занимаются обслуживанием и ремонтом разрушающихся механизмов мира-кольца, в котором они обитают."
 mod_job_fe_maintenance_bot_add: "Должности смотрителей"
 mod_job_fe_maintenance_bot_per_pop: "§G+1§! должность смотрителя за каждые $VALUE$ поселений"
 mod_job_fe_maintenance_bot_per_pop_short: "\n§G+1§! £mod_job_maintenance_drone_add£ за каждые $VALUE$ £pop£"
 job_fe_guardian_bot: "Страж"
 job_fe_guardian_bot_plural: "Стражи"
 job_fe_guardian_bot_desc: "Эти древние машины непрерывно сторожат давно погибшие останки миллиардов разумных существ, подвергшихся когда-то криогенной заморозке."
 mod_job_fe_guardian_bot_add: "Должности стражей"
 fe_hedonist: "$job_fe_hedonist$"
 job_fe_hedonist: "Гедонист"
 job_fe_hedonist_plural: "Гедонисты"
 job_fe_hedonist_desc: "Полная изобилия жизнь, в которой могут быть удовлетворены любые возможные материальные желания или потребности."
 mod_job_fe_hedonist_add: "Должности гедонистов"
 job_fe_archivist: "Архивариус"
 job_fe_archivist_plural: "Архивариусы"
 job_fe_archivist_effect_desc: "£job_archivist£ $job_fe_archivist_plural$ превращают £consumer_goods£ §Yтовары массового спроса§! в £physics£ £society£ £engineering£ §Yочки прогресса исследований§!"
 job_fe_archivist_desc: "Каждый фрагмент данных должен быть зарегистрирован, каталогизирован и проиндексирован в точном соответствии с древними обрядами, определенными Первым Библиотекарем тысячелетия назад."
 mod_job_fe_archivist_add: "Должности архивариусов"
 job_fe_acolyte_farm: "Служитель плуга"
 job_fe_acolyte_farm_plural: "Служители плуга"
 job_fe_acolyte_farm_plural_with_icon: "£job_fe_acolyte_farm£ $job_fe_acolyte_farm_plural$"
