 NAME_adakkaria: "адАккария"
 patriotic_institute_true_potential_unleashed: "Истинный потенциал адАккарии"
 patriotic_institute_true_potential_unleashed_desc: "Узнав, что на самом деле скрывалось за экспериментами адАккарии, мы испытали катарсис."
 storm_hunkered_down_modifier: "Укрытие"
 storm_hunkered_down_modifier_tt: "Удваивает затраты на §Rсодержание§!, но при этом удваивает §Gэффективность§! сооружений §Y«$building_storm_resistant_production$»§! и §Y«$building_advanced_storm_resistant_production$»§!."
 storm_hunkered_down_modifier_disabled_tt: "Прекращает действие решения «$decision_hunker_down$». Вдвое сокращает затраты на §Gсодержание§!, но при этом §Rэффективность§! сооружений §Y«$building_storm_resistant_production$»§! и §Y«$building_advanced_storm_resistant_production$»§! возвращается к прежним значениям."
 cultivated_worldscaping_modifier: "$decision_cultivated_worldscaping$"
 cultivated_worldscaping_modifier_desc: "Ландшафт превращен в идеальный геометрический ансамбль, в котором форма преобладает над жизнью. Оставшаяся флора была сведена к монокультуре в целях устранения элементов, нарушающих гармонию."
 cultivated_worldscaping_modifier_tt: "• Максимум районов: §Y+3§!\n• Максимум ресурсных районов: §G+75%§!\n• Защита от §Yкосмических бурь§!: §G+10%§!\n• Приспособленность: §R−20%§!"
 #Planetary Decisions
 decision_hunker_down: "Укрытие"
 decision_hunker_down_desc: "Обитатели этой планеты опасаются худшего, а потому предпримут все возможные меры предосторожности перед космическими бурями."
 decision_stop_hunker_down: "Прекратить действие решения «$decision_hunker_down$»"
 decision_stop_hunker_down_desc: "Когда опасная космическая буря пройдет, можно будет расслабиться. Но останется ли все как прежде?"
 decision_cultivated_worldscaping: "Культурное обустройство планеты"
 decision_cultivated_worldscaping_desc: "Изваяем же из этого мира оду идеальной симметрии. Созерцание безупречной геометрии ландшафта будет нести покой."
 decision_cultivated_worldscaping_natural_blockers_fail_tt: "Нужно убрать все £blocker£ препятствия"
 #Civics
 civic_astrometeorology: "Астрометеорология"
 civic_astrometeorology_desc: "Эта раса относится к силам природы с глубоким почтением, а потому тратит немало сил на изучение загадочного устройства окружающей среды. Вознесшись к звездам, они не забыли про интерес к астрометеорологии. Главный объект их любопытства — самое удивительное и разрушительное явление: космические бури.\n"
 civic_astrometeorology_effect_tooltip: "$t$- $AVAILABLE_BUILDINGS$ £building£ ['building:building_astrometeorology_observation_center']$TABBED_NEW_LINE$- $ADDITIONAL_BUILDINGS_STRING$ £building£ §Y$building_astrometeorology_observation_center$§!"
 civic_astrometeorology_hive: "Моделирование климата"
 civic_astrometeorology_hive_desc: "Стремящийся к звездам коллективный разум очарован астрометеорологическими явлениями. Свои границы он расширяет исключительно с благородной целью — изучить факторы окружающей среды. Даже космические бури вызывают у него благоговение."
 civic_astrometeorology_hive_effect_tooltip: "$civic_astrometeorology_effect_tooltip$"
 civic_astrometeorology_machine: "Моделирование климата"
 civic_astrometeorology_machine_desc: "Этот коллективный разум осознает, насколько велико влияние сил природы на государство машин, а потому не жалеет средств на их изучение. Построенные им модели тщательно воссоздают астрономические явления с практически фанатической точностью. Главный объект их любопытства — самое удивительное и разрушительное явление: космические бури."
 civic_astrometeorology_machine_effect_tooltip: "$civic_astrometeorology_effect_tooltip$"
 civic_astrometeorology_megacorp: "Эксплуатация погоды"
 civic_astrometeorology_megacorp_desc: "Окружающая среда — такой же ресурс, как и многие другие, только бесплатный. Эта мегакорпорация специализируется на тщательном изучении астрометеорологических явлений и продаже накопленных данных тому, кто предложит лучшую цену."
 civic_astrometeorology_megacorp_effect_tooltip: "$civic_astrometeorology_effect_tooltip$$TABBED_NEW_LINE$- £building£ §Y$building_private_research_initiative$§!: $megacorp_civic_branch_office_building_effect$"
 civic_storm_callers: "Преданность буре"
 civic_storm_callers_desc: "Испокон веков это общество умело призывать бури с помощью особых ритуалов, со временем ставших еще более действенными благодаря современным технологиям. На заре космической эпохи они устремились ввысь, захватив с собой славную древнюю традицию."
 civic_storm_callers_effect_tooltip: "• $AVAILABLE_BUILDINGS$ £building£ ['building:building_storm_summoning_theater']\n• Заменяет должности [entertainer.GetIcon] §H«[entertainer.GetName]»§! на должности £job_storm_dancer£ §H«$job_storm_dancer$»§!\n• $SPECIES_TRAITS$ «['trait:trait_storm_touched']»"
 civic_storm_callers_megacorp: "Буревые инфлюэнсеры"
 civic_storm_callers_megacorp_desc: "Из обычных трансляций священных ритуалов вырос гигантский медийный конгломерат. Провидцы и жрецы уступили место харизматичным деятелям индустрии развлечений, конкурирующим друг с другом за внимание аудитории. Завоевать его можно только взывая непосредственно к космическим бурям."
 civic_storm_callers_megacorp_effect_tooltip: "$civic_storm_callers_effect_tooltip$\n- Офис корпорации £building£ §Y$building_amusement_megaplex$§! дополнительно повышает §Yценность филиала§! и даёт §G50§! должностей £job_merchant£ §Yторговцев§! в нашей столице."
 mod_capital_storm_diplo_weight_mult: "$MOD_DIPLO_WEIGHT_MULT$, пока на столицу воздействует §Yкосмическая буря§!"
 storm_devotion_diplo_weight_modifier: "$civic_storm_callers$"
 storm_devotion_corporate_diplo_weight_modifier: "$civic_storm_callers_megacorp$"
 civic_environmental_architects: "Преобразователи планет"
 civic_environmental_architects_desc: "Потратив миллионы лет на установление и поддержание совершенного равновесия на родной планете, это общество теперь готово преображать даже самые негостеприимные миры. Его представители искренне считают, что природу можно изменить, переделать, довести до идеала — не чтобы укротить ее, но чтобы раскрыть таящуюся внутри нее красоту."
 civic_environmental_architects_negative_effect_tooltip: "– $HOMEWORLD$ в начале игры получает два £blocker£ §Yприродных препятствия§!"
 civic_environmental_architects_effect_start: "- $ADDITIONAL_TECHNOLOGIES_STRING$ £society£ §HТехнологии§! для расчистки £blocker£ ['concept_natural_blockers', природных препятствий] в §Hродном мире§!\n- £society£ §HТехнологии§! для расчистки £blocker£ §Hприродных препятствий§! даются как §Hпостоянные варианты для исследования§! после колонизации\n- ['concept_ascension_perk', Бонус за стремление] §H«Господство над природой»§! заменяется на планетарное ['concept_decision', решение] §H«$decision_cultivated_worldscaping$»§!\n- За каждый £blocker£ §Hприродное препятствие§! на колонизированных £planet£ ['concept_planets', планетах]:"
