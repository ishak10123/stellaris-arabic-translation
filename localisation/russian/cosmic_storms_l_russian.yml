 #Emergency fund effects
 emergency_fund: "Фонд для чрезвычайных ситуаций"
 set_galactic_emergency_fund_active: "$emergency_fund$ действует"
 unset_galactic_emergency_fund_active: "$emergency_fund$ не действует"
