 situation_stormfall_finish_project_tt: "Необходимо завершить особый проект «§Y$PROJECT_TEMPEST_BREWING$§!»"
 #Modifiers for Stormfall event chain
 cs_storm_chasers_storm_fruition: "Созревание бури"
 cs_storm_chasers_storm_fruition_desc: "Пробудив собственную космическую бурю, мы зарядили наш народ энергией на много лет вперед."
 cs_storm_chasers_storm_fruition_gestalt: "$cs_storm_chasers_storm_fruition$"
 cs_storm_chasers_storm_fruition_gestalt_desc: "Пробудив собственную космическую бурю, наше сознание получило заряд энергии на много лет вперед."
 cs_storm_chasers_homeworld_storm_attraction: "Погодные катаклизмы"
 cs_storm_chasers_homeworld_storm_attraction_desc: "Жизнь на этой планете, раздираемой безжалостными штормами, разделилась на два вида: первые стремятся укрыться от буйства погоды, вторые же им наслаждаются."
 cs_storm_chasers_homeworld_storm_attraction_tt: "Сила притяжения §Yкосмической бури§!: §Pнизкая§!"
 #Special project
 PROJECT_TEMPEST_BREWING: "Собирается буря"
 PROJECT_TEMPEST_BREWING_DESC: "Бури, возникающие в системе [Owner.Capital.GetName], уникальны тем, что обладают особыми свойствами, которые поддаются управлению. Но сперва нам нужно лучше понять ее исходную структуру. Кто знает, какое поразительное творение мы в итоге создадим?"
 #Events
 cstorms.3100.name: "Праматерь всех бурь"
 cstorms.3100.desc: "Бури, зарождающиеся над планетой §Y[owner.capital_scope.GetName]§!, суть наглядное проявление грозных сил природы, ее мощи и круговорота разрушения и возрождения.\n\nНедавно метеорологические станции зафиксировали необычайное явление: целую группу сверхбурь, готовых обрушиться на наш мир.\n\nНаши [Root.Owner.GetScientistPlural] считают, что это — счастливый случай: подобные редкие штормы приносят с собой нечто совершенно незабываемое."
 cstorms.3100.a: "Скорее к аппаратуре!"
 cstorms.3105.name: "Собирается буря"
 cstorms.3105.desc: "Наши [Root.Owner.GetScientistPlural] раскрыли секрет управления бурями. Прогнозируемые показатели мощности бури запредельны, но мы готовы ее встретить. Это достойное испытание, и мы пройдем его.\n\nОсобые сооружения могут выступить центрами координации для призывания бурь. Сооружение на планете §Y[owner.capital_scope.GetName]§!, способное притягивать бури, ускорит прибытие совершенного шторма."
 cstorms.3105.a: "Кайф."
 cstorms.3105.a.tt: "§YСооружение для притяжения бури§! на планете-столице:\n$situation_speed_tt$: §G+10%§!\n\n§Ysm_storm_attraction_computer§! на станции в столичной системе:\n$situation_speed_tt$: §G+10%§!\n\n"
 cstorms.3110.name: "Пришествие"
 cstorms.3110.desc.outro: "Подведя энергию к бурям естественного происхождения, мы сможем создать условия для образования электрических бурь.\n\nВоздействием на ядро планеты [owner.capital_scope.GetName] мы можем изменить магнитное поле так, чтобы породить магнитные бури.\n\nИ наконец, изменив полярность тахионов на обратную в конкретных местах планеты, мы сможем вызвать гравитационные бури."
 cstorms.3110.desc.regular: "Мы научились раскачивать штормовые колебания планеты [owner.capital_scope.GetName], что порождает незабываемые впечатления. Теперь надо определиться, какая буря будет самой великолепной.\n\n$cstorms.3110.desc.outro$"
 cstorms.3110.desc.hive: "Мы научились раскачивать штормовые колебания планеты [owner.capital_scope.GetName], что порождает незабываемые впечатления. Осталось определиться, какая буря будет самой великолепной.\n\n$cstorms.3110.desc.outro$"
 cstorms.3110.desc.machine: "Мы научились раскачивать штормовые колебания планеты [owner.capital_scope.GetName], что обещает незабываемые впечатления. Однако попытки установить, какая буря будет самой великолепной, пока лишь порождают исключительно рекурсию алгоритмов определения ценности.\n\n$cstorms.3110.desc.outro$"
 cstorms.3110.a: "Зарядить облака."
 cstorms.3110.a.tt: "Посеять планетарную §Yэлектрическую бурю§!."
 cstorms.3110.b: "Намагнитить ядро."
 cstorms.3110.b.tt: "Посеять планетарную §Yмагнитную бурю§!."
 cstorms.3110.c: "Создать гравитационные волны."
 cstorms.3110.c.tt: "Посеять планетарную §Yгравитационную бурю§!."
 cstorms.3130.name: "Бегом на улицу"
 cstorms.3130.desc.electric: "В небе раздаются раскаты. Повсюду бьют молнии.\n\nМощные разряды не только наэлектризовали поверхность планеты — они «зарядили» и нас самих! От электрических бурь пострадает сельское хозяйство, однако потенциал для добычи энергии огромен."
 cstorms.3130.desc.magnetic: "Магнитное поле планеты [owner.capital_scope.GetName] искажается. Стрелки компасов крутятся как сумасшедшие.\n\nПробурив кору родной планеты, мы ввели намагниченное вещество непосредственно в ядро. Возникшие колебания поля лишь усилились после пришествия бурь. Производство энергии пострадает, однако обнаруживать новые залежи минералов будет проще."
 cstorms.3130.desc.gravity: "Никогда еще нас так не увлекало обычное движение! Сила тяжести то увеличивается, то уменьшается ежесекундно.\n\nВ комплексах управления частицами, расположенных на поверхности планеты [owner.capital_scope.GetName], поменяли полярность тахионов на противоположную, превратив их в потрескивающие сгустки энергии. После того как они исчезли ([Root.Owner.GetScientistPlural] считают, что тахионы переместились в прошлое), во все стороны пошла гравитационная рябь.\n\nЭти колебания осложняют работу на поверхности, однако работникам орбитальных станций будет проще выполнять свои обязанности."
 cstorms.3130.a: "Вот это да."
 cstorms.3130.a.tt.regular: "Во время планетной бури:\n$MOD_POP_HAPPINESS$: §G+20%§!"
 cstorms.3130.a.tt.gestalt: "Во время планетной бури:\n$mod_country_unity_produces_mult$: §G+5%§!"
 cstorms.3140.name: "Добрая встряска"
 cstorms.3140.desc.intro: "Наши [Root.Owner.GetScientistPlural] уверены, что масштаб методов подстегивания планетных бурь можно значительно нарастить, поскольку вся система пронизана дрожащей от напряжения энергией."
 cstorms.3140.desc.electric: "$cstorms.3140.desc.intro$\n\nПолагаясь на уже известные нам данные и инфраструктуру, мы можем превратить бурю в электрическую либо создать что-то совершенно новое.\n\nПрименение определенных минералов усилит магнитный резонанс шторма, в то время как применение сплавов превратит его в гравитационный колодец."
 cstorms.3140.desc.magnetic: "$cstorms.3140.desc.intro$\n\nПолагаясь на уже известные нам данные и инфраструктуру, мы можем превратить бурю в магнитную либо создать что-то совершенно новое.\n\nПодпитка солнца энергией усилит электрическое напряжение шторма, а применение сплавов превратит его в гравитационный колодец."
 cstorms.3140.desc.gravity: "$cstorms.3140.desc.intro$\n\nПолагаясь на уже известные нам данные и инфраструктуру, мы можем превратить бурю в гравитационную либо создать что-то совершенно новое.\n\nПрименение определенных минералов усилит магнитный резонанс шторма, в то время как подпитка солнца энергией усилит электрическое напряжение."
 cstorms.3140.a: "Зарядить солнце."
 cstorms.3140.a.tt: "Посеять космическую §Yэлектрическую бурю§!.\nНа §Y2§! года:$TABBED_NEW_LINE$$mod_country_energy_produces_mult$: §R–50%§!$TABBED_NEW_LINE$$mod_country_unity_produces_mult$: §G+20%§!"
 cstorms.3140.a.infra: "Использовать инфраструктуру."
 cstorms.3140.a.tt.electric: "Посеять космическую §Yэлектрическую бурю§!.\nНа §Y2§! года:$TABBED_NEW_LINE$$mod_country_unity_produces_mult$: §G+5%§!"
 cstorms.3140.b: "Воспользоваться намагниченными минералами."
 cstorms.3140.b.tt: "Посеять космическую §Yмагнитную бурю§!.\nНа §Y2§! года:$TABBED_NEW_LINE$$mod_country_minerals_produces_mult$: §R–50%§!$TABBED_NEW_LINE$$mod_country_unity_produces_mult$: §G+20%§!"
 cstorms.3140.b.tt.magnetic: "Посеять космическую §Yмагнитную бурю§!.\nНа §Y2§! года:$TABBED_NEW_LINE$$mod_country_unity_produces_mult$: §G+5%§!"
 cstorms.3140.c: "Воспользоваться особыми сплавами."
 cstorms.3140.c.tt: "Посеять космическую §Yгравитационную бурю§!.\nНа §Y2§! года:$TABBED_NEW_LINE$$mod_country_alloys_produces_mult$: §R–25%§!$TABBED_NEW_LINE$$mod_country_unity_produces_mult$: §G+20%§!"
 cstorms.3140.c.tt.gravity: "Посеять космическую §Yгравитационную бурю§!.\nНа §Y2§! года:$TABBED_NEW_LINE$$mod_country_unity_produces_mult$: §G+5%§!"
 cstorms.3160.name: "После бури"
 cstorms.3160.desc: "После того как буря утихла, планета [owner.capital_scope.GetName] обрела новую черту — похоже, надолго. И вновь шторм принес с собой перемены и перерождение.\n\nОправившись от переживаний, мы задумались: на что же будет способна полноценная космическая буря? И почему она никак не придет?"
 cstorms.3160.a: "Такое не забудется!"
 cstorms.3160.a.tt.electric: "После бури на планете [owner.capital_scope.GetName] появились наэлектризованные §Y$d_buzzing_plains$§!."
 cstorms.3160.a.tt.magnetic: "После бури на планете [owner.capital_scope.GetName] появились новые §Y$d_geothermal_vent$§!."
 cstorms.3160.a.tt.gravity: "После бури на планете [owner.capital_scope.GetName] обнаружилась §Y$d_rich_mountain$§!."
 cstorms.3170.name: "Космические формы"
 cstorms.3170.desc.intro: "Появление грандиозной космической бури над планетой [owner.capital_scope.GetStarName] можно ускорить, однако готовы ли мы к такому незабываемому аттракциону?\n\n"
 cstorms.3170.desc.scientist.snippet: "Наши [Root.Owner.GetScientistPlural], которыми будет руководить §Y[event_target:storm_scientist.GetName]§!, могут изучить первые признаки космических бурь, чтобы установить оптимальный способ влияния на их образование.\n\n"
 cstorms.3170.desc.commander.snippet: "Наши вооруженные силы, которыми будет командовать §Y[event_target:storm_commander.GetName]§!, могут обстрелять зарождающуюся бурю, чтобы вызвать энергетический каскад.\n\n"
 cstorms.3170.desc.outro: "Этот отряд под командованием лидера рискует не вернуться. Но он может совершить нечто потрясающее!"
 cstorms.3170.desc.both: "$cstorms.3170.desc.intro$$cstorms.3170.desc.scientist.snippet$$cstorms.3170.desc.commander.snippet$$cstorms.3170.desc.outro$"
 cstorms.3170.desc.scientist: "$cstorms.3170.desc.intro$$cstorms.3170.desc.scientist.snippet$$cstorms.3170.desc.outro$"
 cstorms.3170.desc.commander: "$cstorms.3170.desc.intro$$cstorms.3170.desc.commander.snippet$$cstorms.3170.desc.outro$"
 cstorms.3170.desc.none: "Всё, что нам остается, — это дождаться формирования космической бури.\n\nЧасы ожидания невыносимы, но тем грандиознее будет исход."
 cstorms.3170.a: "Пусть отправляются [Root.Owner.GetScientistPlural]."
 cstorms.3170.a.tt: "[event_target:storm_scientist.GetAXX::Ученый|||fem:Ученая] §Y[event_target:storm_scientist.GetName]§! временно [event_target:storm_scientist.GetAXX::потерян|||fem:потеряна] и может погибнуть."
 cstorms.3170.b: "Пусть наступает армия."
 cstorms.3170.b.tt: "Командир §Y[event_target:storm_commander.GetName]§! временно [event_target:storm_commander.GetAXX::потерян|||fem:потеряна] и может погибнуть."
 cstorms.3170.c: "Надежнее будет подождать."
 cstorms.3190.name: "Первая из многих"
 cstorms.3190.desc.intro: "Всё началось с легкой ряби в ткани космоса. Небольшое столкновение энергий, немного экзотических частиц, капелька массы — и буря, охватывавшая нашу звезду, переросла в то чудовище, что мы видим перед собой.\n\nЭто чудо природы и нашего гения, образованное ровно так, как мы и хотели, заполняет всё небо."
 cstorms.3190.desc.success: "$cstorms.3190.desc.intro$ Наш лидер в самом сердце бури вне себя от восторга.\n\nМы справились. Мы и только мы. Оседлаем же эту бурю! Ощутим драйв, которого не испытает никто другой!"
 cstorms.3190.desc.failure: "$cstorms.3190.desc.intro$ Наш лидер уже не вернется из шторма. Но какая же славная получилась гибель!\n\nМы справились. Мы и только мы. Оседлаем же эту бурю! Ощутим трепет, которого не испытает никто другой!"
 cstorms.3190.desc.wait: "$cstorms.3190.desc.intro$ Долгое ожидание оправдалось. Заветный день наступил.\n\nМы справились. Мы и только мы. Оседлаем же эту бурю! Ощутим трепет, которого не испытает никто другой!"
 cstorms.3190.a.success: "Погнали!"
 cstorms.3190.a.failure: "Запомните меня!"
 cstorms.3190.a.failure.tt: "\nНаш лидер погибает в ореоле славы."
 cstorms.3190.a.wait: "Безупречно!"
 ### Storm Fever ###
 #Modifiers for Storm Fever event chain
 cs_storm_chasers_bad_vibes: "Дурная атмосфера"
 cs_storm_chasers_bad_vibes_desc: "На нас вдруг напало уныние."
 cstorms.3205.name: "Ради ярости"
 cstorms.3205.normal: "Космические вибрации уже не те, что прежде, и наши обычные победы не приносят того восторга, что раньше. Конечно, мы достигли невероятных успехов, однако каждого не покидает ощущение, что нам чего-то не хватает. Мы по-прежнему живем в тени легендарных по масштабу и замыслу свершений предков.\n\n«Это экзистенциальный кризис! — пишет один из наших светлейших умов. — Возможно ли, что после того, как мы пересекли космическую пустоту, пустота открылась внутри нас самих?»\n\nТревога только нарастает. Медлить больше нельзя. Мы начнем всё сначала: поставим перед собой такие цели, которые вызовут мощный всплеск адреналина!"
 cstorms.3205.gestalt: "Космические вибрации уже не те, что прежде, и наши обычные победы не приносят того восторга, что раньше. Конечно, мы достигли невероятных успехов, однако нас не покидает ощущение, что чего-то тут не хватает.\n\nНаш ум омрачен вопросами: осознаём ли мы свою суть? Неужели дни нашей славы остались в прошлом? Как единый коллектив, мы обязаны стремиться превзойти самих себя.\n\nТревога только нарастает. Медлить больше нельзя. Мы начнем всё сначала: поставим перед собой такие цели, которые вызовут мощный всплеск адреналина!"
 cstorms.3205.a: "Экстрим только начинается."
 cstorms.3205.tooltip: "Откройте испытания прошлого в журнале."
 cstorms.3215.name: "Хворь побеждена"
 cstorms.3215.intro: "Получилось!\n\nМы обратили свои стремления в погоню за чистым адреналином и прошли каждое испытание. Посмотрите, чего мы добились за прошедшие годы!"
 cstorms.3215.desc: "$cstorms.3215.intro$\n\nПодобно славным первопроходцам нашего родного мира, мы заставили себя преодолеть границы возможного.\n\nБолее того, взаимодействие с буйством природы дало нам новые представления о смысле собственного существования."
 cstorms.3215.a: "Мы снова в деле!"
 ### Storm Frenzy ###
 cs_storm_chasers_storm_frenzy_1: "Безумство храбрых"
 cs_storm_chasers_storm_frenzy_1_desc: "Скорое наступление Большой Бури приводит нас в экстаз."
 cs_storm_chasers_storm_frenzy_2: "$cs_storm_chasers_storm_frenzy_1$"
 cs_storm_chasers_storm_frenzy_2_desc: "$cs_storm_chasers_storm_frenzy_1_desc$"
 cs_storm_chasers_storm_frenzy_3: "$cs_storm_chasers_storm_frenzy_1$"
 cs_storm_chasers_storm_frenzy_3_desc: "$cs_storm_chasers_storm_frenzy_1_desc$"
 cs_storm_chasers_storm_frenzy_1_gestalt: "$cs_storm_chasers_storm_frenzy_1$"
 cs_storm_chasers_storm_frenzy_1_gestalt_desc: "Скорое наступление Большой Бури воспаляет наше сознание."
 cs_storm_chasers_storm_frenzy_2_gestalt: "$cs_storm_chasers_storm_frenzy_1$"
 cs_storm_chasers_storm_frenzy_2_gestalt_desc: "$cs_storm_chasers_storm_frenzy_1_gestalt_desc$"
 cs_storm_chasers_storm_frenzy_3_gestalt: "$cs_storm_chasers_storm_frenzy_1$"
 cs_storm_chasers_storm_frenzy_3_gestalt_desc: "$cs_storm_chasers_storm_frenzy_1_gestalt_desc$"
 cs_storm_chasers_the_code: "Принцип"
 cs_storm_chasers_the_code_desc: "Нами движет не стремление к господству и не жажда наживы. Мы живем, чтобы испытать границы своих возможностей, существуем на грани жизни и смерти."
 cs_storm_chasers_the_code_gestalt: "Принцип"
 cs_storm_chasers_the_code_gestalt_desc: "$cs_storm_chasers_the_code_desc$"
 every_empire_opinion_hit: "§Y[global_event_country.GetGalCommunityOrGalImperium]§!: отношение к нам изменится на"
 nexus_opinion_first_hit: "Тревога от бури"
 nexus_opinion_first_hit_tt: "$every_empire_opinion_hit$ §R$@first_hit_opinion_change$§!"
 nexus_opinion_second_hit: "Недовольство от бури"
 nexus_opinion_second_hit_tt: "$every_empire_opinion_hit$ §R$@second_hit_opinion_change$§!"
 nexus_opinion_third_hit: "Страх бури"
 nexus_opinion_third_hit_tt: "$every_empire_opinion_hit$ §R$@third_hit_opinion_change$§!"
 nexus_opinion_summon_hit: "Ярость от бури"
 nexus_opinion_summon_hit_tt: "$every_empire_opinion_hit$ §R$@nexus_hit_opinion_change$§!"
 nexus_opinion_the_code: "Примирение с бурей"
 cs_stormfrenzy_chain_title: "Безумство храбрых"
 cs_stormfrenzy_chain_desc: "Мы всегда преодолевали границы возможного. Вдохновившись примером наших предков, мы теперь можем создать бурю своей мечты."
 cstorms.3220.name: "Чего хотят оседлавшие бурю"
 cstorms.3220.desc: "Наш народ никогда не перестанет гнаться за приключениями. Каждый день мы обнаруживаем новые удивительные ситуации и сталкиваемся со всё более серьезными испытаниями, но [ruler.GetRegnalName] считает, что мы можем пойти еще дальше:\n\n«Ядро космической бури таит в себе невиданный потенциал — это уникальный предел, опасный, как лезвие бритвы. С его помощью мы рассечем статус-кво и откроем восторг, который можно испытать только раз в жизни».\n\nПришло время вызвать ураган вселенских масштабов, настоящее средоточие восторженного хаоса: Большую Бурю. Осталось лишь провести еще одно исследование, чтобы понять, как именно следует вызывать эту бурю… а заодно узнать мнение других обитателей галактики (при условии, конечно, что оно нас вообще волнует).\n\nТакое событие наверняка вызовет некоторое недовольство."
 PROJECT_SOW_THE_BIG_ONE: "Как создать Большую Бурю"
 PROJECT_SOW_THE_BIG_ONE_DESC: "У нас есть нужная технология, но в отсутствие зарождающегося урагана поблизости нам придется понять, как самим создать зародыш бури."
 cstorms.3222.name: "Культивация посредством темной материи"
 cstorms.3222.desc: "Уникальные свойства темной материи делают ее идеальным материалом для культивации Большой Бури. Мы впрыснем эту редкую субстанцию в пространственную ткань неподалеку от нашей столичной системы и подождем первых волн бури.\n\nОднако уже эти шаги привлекли к нам излишнее внимание: наши соседи начали выражать протесты. «Не все так горят желанием прокатиться на этой волне, как мы», — жалуются наши [Root.Owner.GetScientistPlural]."
 cstorms.3222.a: "Пора начинать."
 cstorms.3222.b: "Лучше сэкономим ресурсы."
 PROJECT_DARK_SEEDING: "Экзотическое возбуждение"
 PROJECT_DARK_SEEDING_DESC: "Аккуратно добавив темную материю в ткань пространства, мы спровоцировали ощутимую бурю в этой системе."
 cstorms.3224.name: "Нарастание Большой Бури"
 cstorms.3224.desc: "Невероятно! Мы уже регистрируем первые вибрации зарождающегося урагана. Наши [Root.Owner.GetScientistPlural] пока еще не закончили трудиться, но мы стали еще на шаг ближе к созданию Большой Бури.\n\nОднако соседи не разделяют наших восторгов. Они обвиняют нас в играх со стихиями, чьей мощи мы якобы не осознаём, — и это уже осложняет наши отношения."
 cstorms.3224.a: "Что поделаешь."
 cstorms.3225.name: "Откармливание Большой Бури"
 cstorms.3225.desc: "Наши данные показывают: от того, что мы добавим в недра бури, зависит, во что она превратится. Таким образом, скормив ей нужные ресурсы, мы сможем сообщить ей желаемые свойства — и обеспечить колоссальные масштабы!\n\nНаселение галактики продолжает выражать беспокойство, но мы уже почти пробудили величайшее чудо столетия. Отдадим ему всё, что сможем!"
 cstorms.3225.a: "Буря, прими наши дары!"
 cstorms.3225.b: "Нам нужно больше ресурсов."
 cstorms.3226.name: "Колоссальный пир"
 cstorms.3226.desc: "Чтобы вырастить из молодого шторма бурю вселенских масштабов, мы должны обеспечить ему разнообразное питание. Чтобы добиться этого, нам нужно скормить ему конкретный набор ресурсов из наших запасов."
 PROJECT_EVERY_ITEM_ON_THE_MENU: "Контроль за рационом"
 PROJECT_EVERY_ITEM_ON_THE_MENU_DESC: "Теперь мы понимаем, что космической бурей можно управлять при помощи диеты. Чтобы напитать эту бурю, нам нужен конкретный набор ресурсов."
 PROJECT_EVERY_ITEM_ON_THE_MENU_REPEAT: "$cstorms.3225.name$ (повтор)"
 PROJECT_EVERY_ITEM_ON_THE_MENU_REPEAT_DESC: "Для создания идеальной бури нам нужно тщательно отмеренное количество ресурсов."
 cstorms.3227.name: "Последний рывок"
 cstorms.3227.desc: "Воздух словно звенит от волнения. Путь перед нами предельно ясен: нужно идти дальше, усиливать натиск, не сбавлять напор. Мы станем едины с космической стихией! Всё готово к рождению Большой Бури. Остался только последний рывок.\n\nСоседи уже вне себя от ярости и кричат о том, что наша так называемая «$nexus_storm$» нанесет галактике огромный ущерб. Но позволим ли мы этим унылым нытикам остановить проект таких масштабов? Пришло время решать."
 cstorms.3227.a: "Большая Буря — это наша судьба!"
 cstorms.3227.a.tt: "$nexus_storm$ придет через 40 дней.\n$nexus_opinion_third_hit_tt$"
 cstorms.3227.b: "Нет, мы выше этого!"
 cstorms.3227.b.tt: "$nexus_storm$ отменяется.\nОтношение §Y[global_event_country.GetLeLaLCommGalEmpGal]§! к нам улучшится через 40 дней."
 cstorms.3230.name: "Зарождение Большой Бури"
 cstorms.3230.desc: "Мы стоим на пороге совершенно новых впечатлений. Время беспрецедентного катаклизма настало. Оседлавшие бурю не отступят ни перед каким препятствием. Мы не испугаемся никакой опасности.\n\nПусть галактика вздрогнет!"
 cstorms.3230.a: "Вперед."
 has_spawned_nexus_storm_tt: "$TRIGGER_FAIL$Породили §Yсверхбурю§!"
 cstorms.3235.name: "Завершение бури"
 cstorms.3235.desc: "Мы многому научились. Теперь мы понимаем, что галактика — не игрушка, но сцена для грандиозного приключения.\n\nКак метко [ruler.GetAXX::выразился|||fem:выразилась] [ruler.GetRegnalName]: «В этой жизни не бывает мало острых ощущений. Мы никогда не прекратим искать приключения, но делать это нужно с уважением. Таков наш выбор. Такова наша истинная природа»."
 cstorms.3235.a: "Расслабимся!"
 cstorms.3235.a.tt: "$every_empire_opinion_hit$ §G+$@the_code_total_change$§!"
 #Storm Fever Challenges
 cs_stormfever_chain_title: "Одержимость бурями"
 cs_stormfever_chain_desc: "Чтобы достичь новых вершин, познать радость и проверить на прочность наши границы, мы подвергнем себя ряду испытаний. Начнем веселье!"
 challenges_completed: "Испытания пройдены"
 MISSION_CS_STORM_FEVER_CHALLENGE_1: "Победить флотилию внутри бури"
 MISSION_CS_STORM_FEVER_CHALLENGE_1_DESC: "Поле боя всегда было настоящим испытанием удали. А каково будет сразиться в ревущем сердце космической бури! Покажем галактике свое отчаянное безумство.\n\nТеперь наше испытание — победить вражескую флотилию в условиях бури."
 fleets_defeated_in_storm: "Флотилии внутри бури побеждены"
 MISSION_CS_STORM_FEVER_CHALLENGE_2: "Исследовать границы галактики"
 MISSION_CS_STORM_FEVER_CHALLENGE_2_DESC: "Ничто так не придает сил, как возможность оставить позади знакомые границы и, балансируя на краю звездного диска, дотянуться до дальних пределов космоса!\n\nНам нужно будет отправить научный корабль в указанную систему — любым доступным способом."
 far_edge_explored: "Дальние границы исследованы"
 MISSION_CS_STORM_FEVER_CHALLENGE_3: "Оседлать бурю"
 MISSION_CS_STORM_FEVER_CHALLENGE_3_DESC: "Лучшие из лучших алчут острых ощущений, которые дарует буря. Пусть они оседлают ее и вдохнут полной грудью!\n\nНашим следующим испытанием будет помочь оседлавшему продержаться внутри космической бури более 180 дней."
 days_storm_rider_spend_in_storm: "д. провел оседлавший бурю внутри нее"
 MISSION_CS_STORM_FEVER_CHALLENGE_4: "Изучить обнаруженное"
 MISSION_CS_STORM_FEVER_CHALLENGE_4_DESC: "В галактике полно древних сокровищ и секретов — как и жестоких ветров, готовых сорвать с них покров тайны! Исследуем эти места и посмотрим, что там есть интересного.\n\nДавайте изучим аномалии и места археологических раскопок, обнаруженные в результате бури."
 storm_unraveled_event_investigated: "Изучено аномалий или раскопок"
 MISSION_CS_STORM_FEVER_CHALLENGE_5: "Поделиться радостью"
 MISSION_CS_STORM_FEVER_CHALLENGE_5_DESC: "Почему мы в одиночку щекочем себе нервы? Приключениями всегда лучше делиться с другими.\n\nЧтобы соседи не чувствовали себя обделенными, мы должны сделать так, чтобы космическая буря зашла на их территорию."
 send_storm_to_other_empire: "Отправлено бурь в другие государства"
 MISSION_CS_STORM_FEVER_CHALLENGE_6: "Отдаться урагану"
 MISSION_CS_STORM_FEVER_CHALLENGE_6_DESC: "Стареть и дряхлеть — это не для нас. Куда лучше славно сгореть в пылу борьбы!\n\nСледующее испытание — помочь оседлавшему встретить свое последнее мгновение внутри космической бури."
 rider_died_in_storm: "Оседлавших погибло или пропало без вести в бурях"
 #Challenge completed intro
 challenge_completed_intro: "Мы достигли новых высот и разрушили прежние границы! Ничто так не разжигает эмоции. Мы прошли испытание!"
 #Challenge 1 completed
 challenge_completed: "Пройдено испытание"
 cstorms.305.name: "$challenge_completed$ «$MISSION_CS_STORM_FEVER_CHALLENGE_1$»"
 cstorms.305.desc: "$challenge_completed_intro$\n\nУ этой флотилии не было ни единого шанса. Кто еще рискнет бросить нам вызов?"
 cstorms.305.a: "Как же круто!"
 #Challenge 2 completed
 cstorms.310.name: "$challenge_completed$ «$MISSION_CS_STORM_FEVER_CHALLENGE_2$»"
 cstorms.310.desc: "$challenge_completed_intro$\n\nГалактика может так много нам предложить! Здесь не заскучаешь ни на секунду, так зачем же останавливаться! Вперед, к следующему испытанию!"
 cstorms.310.a: "Вперед!"
 #Challenge 3 completed
 cstorms.315.name: "$challenge_completed$ «$MISSION_CS_STORM_FEVER_CHALLENGE_3$»"
 cstorms.315.desc.normal: "$challenge_completed_intro$\n\nНаш оседлавший бурю вышел на связь, и мы услышали от него только торжествующие крики. Космические бури — это совершенно новый уровень экстрима!"
 cstorms.315.desc.gestalt: "$challenge_completed_intro$\n\nМы исполнены торжеством. Космические бури поднимают веселье на совершенно новый уровень."
 cstorms.315.a: "Ни секунды скуки!"
 #Challenge 4 completed
 cstorms.320.name: "$challenge_completed$ «$MISSION_CS_STORM_FEVER_CHALLENGE_4$»"
 cstorms.320.desc: "$challenge_completed_intro$\n\nОткрывать древние секреты и находить сокровища всегда интересно. А сколько в мире еще запрятано тайн, которые ждут своего открывателя!"
 cstorms.320.a: "Возможности безграничны!"
 #Challenge 5 completed
 cstorms.325.name: "$challenge_completed$ «$MISSION_CS_STORM_FEVER_CHALLENGE_5$»"
 cstorms.325.desc: "$challenge_completed_intro$\n\nЭта буря пронеслась прямо по их территории, сея вокруг веселье и хаос! Мы можем спать спокойно, понимая, что подарили своим соседям незабываемые впечатления.\n\nМожет, сейчас они и не оценят нашего жеста, но когда-нибудь еще скажут нам спасибо."
 cstorms.325.a: "Мы рады поделиться!"
 #Challenge 6 completed
 cstorms.330.name: "$challenge_completed$ «$MISSION_CS_STORM_FEVER_CHALLENGE_6$»"
 cstorms.330.desc.normal: "$challenge_completed_intro$\n\nИх позвала могучая буря, и они с радостью откликнулись на зов. Славься, оседлавший бурю, легенда легенд! Пусть твое путешествие за пределы мира будет столь же крутым, как и твой способ покинуть этот мир."
 cstorms.330.desc.gestalt: "$challenge_completed_intro$\n\nМогучая буря позвала часть из нас слиться с ней в восторженной бойне. Потеря узла никогда прежде не была исполнена таким смыслом и радостью! Это легендарное событие будет оставаться определяющим для нашей расы еще много лет."
 cstorms.330.a: "Погнали!"
 cstorms.331.desc.normal: "$challenge_completed_intro$\n\nИх позвала могучая буря, и они с радостью откликнулись на зов. Славься, оседлавший бурю, легенда легенд!"
 cstorms.331.desc.gestalt: "$challenge_completed_intro$\n\nМогучая буря позвала часть из нас слиться с ней в восторженной бойне. Пребывание на грани потери узла никогда прежде не было исполнено таким смыслом и радостью! Это легендарное событие будет оставаться определяющим для нашей расы еще много лет."
 electric_storm_desc: "Столкновение электромагнитных полей наполняет эту космическую бурю сверхмощным электрическим зарядом. Такая буря опасна для щитов, но полезна для планетарного производства."
 particle_storm_desc: "Эти бури, словно живые, движутся сквозь ткань галактики, не преследуя и не избегая космических судов. Эти опасные и нестабильные явления одним своим существованием способны сплотить цивилизацию в борьбе со стихией."
 gravity_storm_desc: "Когда сталкиваются массивные звездные тела, они посылают по всей галактике гравитационные волны. Когда те, в свою очередь, сталкиваются друг с другом, они порождают гравитационную бурю. Такие бури нарушают работу корабельных систем наведения, а неустойчивая сила тяжести вынуждает почти каждого не выходить наружу."
 magnetic_storm_desc: "Когда дрейфующие поля металлических астероидов входят в контакт с мощными гравитационными волнами, внутри них образуются магнитные поля. Бури такого типа рвут на части корпуса кораблей и нарушают работу промышленного строительства — но при этом помогают извлекать ценные минералы из планетных недр."
 solar_storm_desc: "В ткани космоса $solar_storm$ образует мерцающее колебание. В ее присутствии на звездах происходят невиданные по силе вспышки. Испускаемое в процессе излучение губительно для всего живого, но при этом оно усиливает производительность космических станций, а также затрудняет кораблям маскировку."
 celestial_storm_desc: "В любой момент времени по галактике хаотично движется пыль от миллионов планет. Иногда эти крупинки собираются в таких количествах, что образуют пылевую бурю. Она нарушает связь по всей планете, но переносимые бурей химические элементы пригождаются в производстве ресурсов. Внутри таких явлений объекты исчезают с экранов наших сканеров."
 shroud_storm_desc: "В редких случаях Покров может пересекаться с физическим миром. Оказавшись внутри таких редких бурь, разумные существа наблюдают возвышенные и ужасные видения. Приобщившиеся к Покрову могут даже ощутить хрупкую синергию."
 nexus_storm_desc: "При определенном положении звезд даже слабая космическая буря может вырасти до обычно недостижимых масштабов. Такие редкие явления приобретают апокалиптическую мощь. Никакой пользы из этой мощи извлечь не выйдет: хорошо, если вообще получится выжить."
 FROM_STORM: "Из бури"
 #Planetary modifiers
 hyper_ecosystem: "Гиперактивная экосистема"
 hyper_ecosystem_desc: "В почве этой планеты содержатся уникально высокие концентрации соединений азота и фосфора, полученных из природных минералов коры. Растения в этой почве растут невероятно быстро и пышно: это замечательно для сельского хозяйства, но мешает строительству."
 docile_fauna: "Мирная фауна"
 docile_fauna_desc: "Среди флоры и фауны на этой планете практически нет хищников, поэтому животные здесь отличаются кротким нравом и стремятся жить в мире друг с другом. Местное население озабочено разрушениями от бурь, а не борьбой за выживание сильнейших."
 obsidian_lakes: "Обсидиановые озера"
 obsidian_lakes_desc: "В результате тектонической активности магма на поверхности этой планеты застыла в форме огромных пластов обсидиана; в результате полезные ископаемые оказались куда ближе к поверхности, чем обычно."
 obsidian_lakes_volcanic: "$obsidian_lakes$"
 obsidian_lakes_volcanic_desc: "$obsidian_lakes_desc$"
 crimson_crawlers: "Красные жуки"
 crimson_crawlers_tt: "§R$COLONIZATION_IMPOSSIBLE_CRIMSON_CRAWLERS$§!"
 crimson_crawlers_desc: "Поверхность этой планеты покрыта плотным ковром из триллионов мелких красных насекомых. Несмотря на свою огромную численность, они кажутся безопасными и занимают устойчивую нишу в планетарной экосистеме."
 metal_planet: "Металлическая планета"
 metal_planet_desc: "Эта планета целиком покрыта естественными образованиями металлов. Здесь нет никаких условий для поддержания жизни — ни воды, ни атмосферы — зато тут много полезных ресурсов!"
 terraform_fail_is_metal_planet: "Эту планету нельзя терраформировать из-за ее металлической коры."
 previously_terraformed_planet: "Ранее терраформированная планета"
 previously_terraformed_planet_desc: "Каменистый мир с азотно-кислородной атмосферой и многочисленными океанами. Здесь присутствуют следы древних государств, которые когда-то колонизировали этот мир, но затем исчезли. Это значит, что тут можно много открыть и найти, а кроме того, эта планета уже подготовлена для строительства колонии!"
 previously_terraformed_planet_tt: "Предыдущие попытки терраформирования сильно упростят превращение этой планеты в идеальный мир."
 has_patriotic_institute: "$building_adakkaria_patriotic_institute$"
 has_patriotic_institut_desc: "Когда-то на этой планете размещалось адАккарийское Собрание. Теперь от некогда могучей цивилизации остался лишь $building_adakkaria_patriotic_institute$."
 has_patriotic_institute_tt: "Присутствует сооружение $building_adakkaria_patriotic_institute$. Колонизируйте планету, чтобы завладеть им."
 adakkaria_patriotic_institute_desc.supercharged: "Вероятность ежегодного появления бури в системе ценой §Y100§! £pop£ §Hпоселений§!."
 #Planet Modifiers
 crimson_crawlers_sashimi_style: "Красные жуки: потребление в сыром виде"
 crimson_crawlers_sashimi_style_desc: "Поверхность этой планеты приобрела густой багряный цвет из-за покрывающих ее триллионов красных насекомых. Даже в сыром виде они представляют собой восхитительное лакомство."
 crimson_crawlers_bbq_them: "Красные жуки: потребление в готовом виде"
 crimson_crawlers_bbq_them_desc: "Поверхность этой планеты приобрела густой багряный цвет из-за покрывающих ее триллионов красных насекомых. Местные жители научились обжаривать их и готовить из них вкусное блюдо."
 COLONIZATION_IMPOSSIBLE_CRIMSON_CRAWLERS: "§RЭту планету нельзя колонизировать государствам машин и пожирателей миров.§!"
 #New planet types modifiers
 collided_planet: "Слившаяся планета"
 collided_planet_desc: "Две планеты столкнулись друг с другом, но не разрушились, а слились в одну. Площадь ее поверхности больше, чем обычно, но у жизни и строительства на таком небесном теле будут уникальные сложности."
 wooden_planet: "Древесный мир"
 wooden_planet_desc: "За тысячелетия кора планеты покрылась многокилометровым плотным слоем корней, которые сплелись в один гигантский живой организм."
 wooden_planet_tt: "$w_food$ расходуется на строительство и содержание жилья.\n$w_food$ расходуется на строительство ферм."
 #Eruption Event
 recent_eruption: "Недавно случилось извержение"
 eruption_report_tooltip: "\nОтчеты поступят в течение 30 дней."
 colony_mod.31.name: "Извержение!"
 colony_mod.31.desc: "Тектонические явления на [Root.GetPlanetMoon]е [Root.GetName] привели к тому, что гигантские обсидиановые пласты растрескались. На поверхность изливается лава, уничтожая все на своем пути. Сообщения из колонии описывают мрачную картину."
 colony_mod.31.a: "Давайте прослушаем сообщения."
 colony_mod.32.name: "Отчет об уроне от извержения"
 colony_mod.32.desc: "Недавнее извержение на обсидиановых полях, которое потрясло нашу колонию на [Root.GetPlanetMoon]е [Root.GetName], превратило ландшафт в вулканический! Все, что когда-то там находилось, теперь погребено под расплавленной породой."
 colony_mod.33.desc: "Недавнее извержение на обсидиановых полях, которое потрясло нашу колонию на [Root.GetPlanetMoon]е [Root.GetName], по счастливой случайности не нанесло ущерба. Больше того, расколовшийся обсидиан теперь проще добывать!"
 colony_mod.34.desc: "Недавнее извержение на обсидиановых полях, которое потрясло нашу колонию на [Root.GetPlanetMoon]е [Root.GetName], по счастливой случайности не нанесло ущерба!"
