 storm_map_mode_desc: "В этом режиме на карте галактики отображаются все бури, прогнозы и поля влияния."
 #Cosmic Storm Gateway Tech
 gateway_tech_advanced_storm_manipulation: "§HПуть управления бурями§!\n§EЭта технология приведет к дальнейшим достижениям в области управления бурями.§!"
 gateway_tech_advanced_industrial_storm_protection: "§HПуть защиты от космических бурь§!\n§EЭта технология приведет к дальнейшим достижениям в области защиты от космических бурь.§!"
 gateway_tech_storm_location_prediction: "§HПуть прогнозирования космических бурь§!\n§EЭта технология приведет к дальнейшим достижениям в области прогнозирования космических бурь.§!"
 gateway_tech_ship_hull_storm_breaker: "§HПуть защиты кораблей от космических бурь§!\n§EЭта технология приведет к дальнейшим достижениям в области защиты корпусов от космических бурь.§!"
 gateway_tech_ship_hull_storm_weapons: "§HПуть защиты оружия от космических бурь§!\n§EЭта технология приведет к дальнейшим достижениям в области защиты оружия от космических бурь.§!"
