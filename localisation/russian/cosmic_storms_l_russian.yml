 ###########################################
 #Anomalies #
 ###########################################
 STORMS_ANOM_ANTS: "Органическая комета"
 STORMS_ANOM_ANTS_DESC: "Там, где прошла космическая буря, мы обнаружили комету из необычного материала, похожего на органический. [solar_system.Owner.GetScientistPlural] хотят поскорее ее изучить."
 cstorms.5020.name: "Муравьиный астероид"
 cstorms.5020.desc: "Оказалось, что комета — это огромное гнездо крошечных насекомых, а ее хвост — вовсе не шлейф из газа и льда, а побочный продукт химических процессов, проходящих в глубине улья.\n\nВнешний слой гнезда состоит из мертвых организмов, которые защищают обитателей от суровых условий открытого космоса. Кроме того, мы обнаружили, что и внутри, и снаружи гнезда есть несколько разновидностей грибов. Похоже, здесь имеет место сложный вид симбиоза: грибы питаются продуктами сгорания, а насекомые — грибами."
 cstorms.5020.a: "Соберите материал из гнезда."
 cstorms.5020.b: "Осмотрите, но не трогайте."
 STORMS_ANOM_STAT: "Сложный состав"
 STORMS_ANOM_STAT_DESC: "После прохождения космической бури мы обнаружили неизвестное тело, двигающееся по орбите. Оно напоминает космическую станцию, однако сканирование его структурного состава вызвало множество вопросов. Рекомендуется изучить тело внимательнее."
 cstorms.5030.name: "Замерший апокалипсис"
 cstorms.5030.desc: "[Root.Owner.GetScientistPluralCapital] сообщают, что космическая станция во многом состоит из обычных бытовых предметов, которые едва удерживают эту конструкцию. Чем ближе к центру, тем чаще на смену металлическим сплавам приходят пластик и другие материалы.\n\nВ центре станции мы обнаружили устройство, эффективно перерабатывающее органические материалы во все те предметы, что встретились нам на пути.\n\nПостроив расчетную модель ДНК, [Root.Owner.GetScientistPlural] пришли к выводу, что органика, необходимая для работы этой машины, — скорее всего, непосредственно бывшие обитатели космического форпоста."
 cstorms.5030.evopred: "Постараемся извлечь из этого пользу."
 STORMS_ANOM_BRAIN: "Постоянное исчезновение"
 STORMS_ANOM_BRAIN_DESC: "С тех пор как через эту систему прошла $shroud_storm$, мы постоянно принимаем загадочные сигналы. Однако наши [Root.Owner.GetScientistPlural] не могут на них ответить: все попытки связаться с источником, взывающим к космосу на разные лады, наталкиваются на молчание — сигнал исчезает. Ученые рекомендуют отправить научный корабль."
 cstorms.5025.name: "Мозговой штурм"
 cstorms.5025.desc: "Неожиданное открытие ошеломило всех: источником сигнала оказались мозги — склизкие органические устройства для обработки данных, принадлежащие представителям самых разных рас. Целые сотни отдельных мозгов были прочно связаны между собой и заперты в огромной капсуле, напоминающей воздушный шар. По всей видимости, ее оставили владельцы, как только прошла $shroud_storm$, и теперь она беспомощно дрейфовала в межзвездном пространстве.\n\nВ капсуле обнаружился поражающий воображение набор датчиков, прикрепленных непосредственно к мозгам и к капсуле. Там же находился модуль связи, способный вызывать корабли поблизости — вроде нашего — и передавать им информацию.\n\nПо всей видимости, связаться с нами решили сами эти мозги. Этим объясняется, почему вместо внятного сообщения мы приняли лишь какофонию звуков. [Root.Owner.GetScientistPlural] считают, что предназначение этой конструкции — изучение реакции органики на такое явление, как $shroud_storm$. Попытка установить связь с мозгами, скорее всего, обернется катастрофой, поскольку остатки псионической энергии в капсуле крайне нестабильны."
 #Terrestrial Telescopes
 terrestial_telescope_category: "Наблюдательные телескопы"
 terrestial_telescope_category_desc: "Результаты сканирования, проведенного флотилией [fleet.GetName], указывают на присутствие в системе [From.GetStarName] заброшенной космической станции.\n\nПо всей видимости, в эту систему ее выбросила прошедшая рядом космическая буря. Признаков жизни на борту не наблюдается — как, впрочем, и признаков работающей аппаратуры. С двух сторон станция оснащена огромными выступающими телескопами — сложной и очень большой конструкцией по сравнению с общими размерами станции. Нам не знакомы ни эти технологии, ни эта архитектура.\n\nМожно попытаться вновь привести телескопы в действие — возможно, мы узнаем что-то новое."
 cstorms.1605.name: "Наблюдательные телескопы"
 cstorms.1605.desc: "[Root.Owner.GetScientistPlural] не сразу смогли высадиться на станцию и включить телескопы, однако после некоторых ухищрений им это удалось. Команду постигло разочарование: в той части галактики, куда была направлена оптика, не происходило ничего примечательного.\n\nОднако на самой станции обнаружилось несколько любопытных предметов — это были подробные изображения, записанные с телескопов и заботливо помещенные в декоративные рамки. На каждом кадре была запечатлена космическая буря. Изображения каждой бури, прошедшей через эту систему, были распечатаны в нескольких экземплярах. Оператор телескопа делал снимки с разных углов, чередовал масштаб и даже наклонял аппарат, чтобы запечатлеть бурю как можно лучше.\n\nПри более подробном изучении станции оказалось, что ничего интересного, кроме фотографий, на борту нет. Снимки мы поместим в архив, чтобы новые поколения могли полюбоваться на редкую космическую красоту."
 STORMS_ANOM_POLYCHROMATIC: "Разноцветная звезда"
 STORMS_ANOM_POLYCHROMATIC_DESC: "Космическая буря, прошедшая через систему [from.solar_system.GetName], преобразила внешний вид звезды. После бури в короне звезды появились пестрые завихрения, выбрасывающие разноцветные вспышки во всех направлениях. Нам следует подробнее изучить этот феномен."
 cstorms.5035.name: "$STORMS_ANOM_POLYCHROMATIC$"
 cstorms.5035.desc: "[root.leader.GetName] [root.leader.GetAXX::обнаружил|||fem:обнаружила] невероятные изменения в реакциях синтеза внутри звезды [From.GetStarName], причиной которых стала [from.GetAffectedStormType].\n\nПохоже, что буря спровоцировала неожиданные ядерные реакции в ядре звезды, и в ее конвективных зонах теперь стабильно появляется ценный для нас ресурс — [from.GetEarnedResources&nom].\n\nЭти сложные неординарные реакции и создают разноцветные вспышки, которые мы заметили ранее. Как бы то ни было, здесь еще остается простор для исследований."
 cstorms.5035.a: "Изучить эти необычные процессы."
 cstorms.5035.b: "Собрать ресурсы."
 STORMS_ANOM_TRIPLETS: "Трио астероидов"
 STORMS_ANOM_TRIPLETS_DESC: "Недавняя космическая буря принесла в систему [from.solar_system.GetName] три новых астероида. Эти небесные тела слишком часто и неестественно меняют свои орбиты, из-за чего рассчитать их траектории просто невозможно. Необходимо дальнейшее исследование."
 cstorms.5040.name: "$STORMS_ANOM_TRIPLETS$"
 cstorms.5040.desc: "[root.leader.GetName] [root.leader.GetAXX::обнаружил|||fem:обнаружила], что у залетевших в систему [from.solar_system.GetName] астероидов крайне нестабильное магнитное поле, из-за чего они буквально отскакивают от магнитосфер других тел в системе.\n\n[root.leader.GetName] [root.leader.GetAXX::стабилизировал|||fem:стабилизировала] их движение с помощью магнитных компенсаторов. Теперь траектория каждого астероида тщательно регулируется, и с них можно добывать ресурсы."
 STORMS_ANOM_TRAVELLERS: "Сигнал бедствия после бури"
 STORMS_ANOM_TRAVELLERS_DESC: "§H[from.GetAffectedStormType]§! миновала, и мы засекли неопознанный сигнал бедствия в системе §H[from.solar_system.GetName]§!."
 cstorms.5050.name: "Заплутавшие путешественники"
 cstorms.5050.desc: "Мы установили, что источником сигнала бедствия в системе §H[from.solar_system.GetName]§! является сильно потрепанный торговый корабль, который чудом еще не развалился на части.\n\nЭкипаж утверждает, что §H[from.GetAffectedStormType]§! сильно сбила их с курса. Кроме того, буря повредила двигатели корабля, оставив несчастных дрейфовать в космосе.\n\nОни готовы расстаться с частью груза в обмен на помощь."
 cstorms.5050.a: "Помочь им."
 cstorms.5050.evopred: "Помочь им в обмен на образцы ДНК."
 cstorms.5050.b: "Пожелать им удачи."
 cstorms.5050.c.genocide: "Лишить их и груза, и жизней."
 cstorms.5050.d.devouring_swarm: "Пища…"
 STORMS_COSMIC_SLUDGE: "Космическая муть"
 STORMS_COSMIC_SLUDGE_DESC: "После того как в системе §H[from.solar_system.GetName]§! отгремела §H[from.GetAffectedStormType]§!, показания датчиков массы стали совершенно беспорядочными.\n\nДиагностика не выявила никаких сбоев в оборудовании. Его показания следует изучить внимательнее."
 cstorms.5060.name: "$STORMS_COSMIC_SLUDGE$"
 cstorms.5060.desc: "Хаотичные показания датчиков, отслеживающих состояние системы §H[from.solar_system.GetName]§!, вызваны появлением в ней огромного скопления обломков — по всей видимости, его принесла с собой §H[from.GetAffectedStormType]§!.\n\nПо просторам системы медленно дрейфует бесформенная масса космического мусора, спрессованного огромным давлением прошедшей бури. Реакционная способность образовавшегося соединения поистине уникальна.\n\nЕсли мы тщательно изучим его химический состав, астрометеорологи смогут узнать больше об условиях, в которых зарождаются подобные соединения."
 cstorms.5060.a: "Изучить состав."
 cstorms.5060.b: "Разобрать обломки."
 STORMS_SHATTERED_SATTELITE: "Разбитый спутник"
 STORMS_SHATTERED_SATTELITE_DESC: "После того как миновала §H[from.GetAffectedStormType]§!, мы засекли неопознанный объект в системе §H[from.solar_system.GetName]§!. Тщательное изучение этого объекта может дать ответы на некоторые наши вопросы."
 cstorms.5070.name: "$STORMS_SHATTERED_SATTELITE$"
 cstorms.5070.desc: "Загадочным объектом в системе §H[from.solar_system.GetName]§! оказались обломки древнего спутника, несущего на борту сложную астрометеорологическую аппаратуру. Мы предполагаем, что его откуда-то издалека принесла §H[from.GetAffectedStormType]§!.\n\nСпутник уже не восстановить, однако в базе данных содержится немало ценных сведений, которые пойдут на пользу нашей науке.\n\nВсё остальное придется пустить на металлолом."
 STORMS_EVISCERATED_FAUNA: "Инородное тело"
 STORMS_EVISCERATED_FAUNA_DESC: "Датчики зафиксировали в системе §H[from.solar_system.GetName]§! неопознанный объект, оказавшийся там после того, как прошла §H[from.GetAffectedStormType]§!.\n\nЧтобы установить природу этой аномалии, понадобится изучить ее внимательнее."
 cstorms.5080.name: "Органические останки"
 cstorms.5080.desc.common: "Неопознанный объект в системе §H[from.solar_system.GetName]§! — это огромная груда органических останков, принадлежащих неизвестной нам разновидности космической фауны. Опознать, чем эти останки были при жизни, и каталогизировать находку невозможно: буря уничтожила все характерные черты."
 cstorms.5080.desc.swarm: "К счастью, оно хотя бы съедобное."
 cstorms.5080.desc.default: "[leader.GetName] [leader.GetAXX::уверен|||fem:уверена], что тщательная экспертиза останков позволит нам выяснить, какому существу они могли принадлежать, а заодно — какое воздействие §Y[from.GetAffectedStormType]§! способна оказать на схожие виды космических организмов."
 cstorms.5080.a: "Мы голодны."
 cstorms.5080.b: "Провести вскрытие на месте."
 cstorms.5080.c: "Избавиться от останков."
 FORENSIC_DISSECTION_PROJECT: "Медицинское вскрытие"
 FORENSIC_DISSECTION_PROJECT_DESC: "В системе §H[solar_system.GetName]§! мы обнаружили останки неизвестного существа, попавшего в космическую бурю. Возможно, что-то станет понятнее после вскрытия трупа."
 cstorms.5085.name: "$FORENSIC_DISSECTION_PROJECT$"
 cstorms.5085.desc: "Мы аккуратно вскрыли труп, однако принадлежность останков всё так же неясна. Существо настолько сильно пострадало в буре, что лишилось всех отличительных признаков, в том числе генетических.\n\nОднако в процессе изучения мы стали лучше понимать, как устроены §Yкосмические бури§! и какое разрушительное влияние они оказывают на чужеродные организмы."
 cstorms.5085.evopred: "Удивительный обед."
 STORMS_DISPLACED_TIYANKI: "Заплутавшие тиянки"
 STORMS_DISPLACED_TIYANKI_DESC: "После того как в системе §H[solar_system.GetName]§! прошла космическая буря, наши датчики обнаружили там трех тиянки."
 cstorms.5090.name: "$STORMS_DISPLACED_TIYANKI$"
 cstorms.5090.desc.common: "Три тиянки в системе §H[solar_system.GetName]§! оказались детенышами, заплутавшими и истощенными.\n\n§Y$default_storm$§! вырвала их из стаи, и теперь эти существа могут рассчитывать только на свои силы.\n\nОдиночество в открытом космосе грозит им гибелью. Датчики показывают, что тиянки сейчас взывают к своей стае — безрезультатно."
 cstorms.5090.desc.swarm: "Мы можем усилить их призывы, чтобы приманить стаю и устроить настоящий пир."
 cstorms.5090.desc.default: "Мы можем усилить их призывы с помощью аппаратуры для связи. Возможно, их стая найдет путь в систему."
 cstorms.5090.a.default: "Усилить сигнал."
 cstorms.5090.a.swarm: "Заманить стаю."
 cstorms.5090.b.default: "Природа жестока."
 cstorms.5090.b.machine: "Приступить к ликвидации."
 cstorms.5090.b.swarm: "Пища сама пришла к нам."
 cstorms.5090.c: "Приютить их."
 cstorms.5090.c.tt: "Добавить 3 §Yдетёныша тиянки§! случайной редкости в наш ['concept_vivarium',виварий]"
 REUNITE_POD_PROJECT: "Воссоединение со стаей"
 REUNITE_POD_PROJECT_DESC: "В системе [this.solar_system.GetName] оказались три детеныша тиянки, отбившихся от стаи после космической бури. Мы можем усилить их призывы о помощи, чтобы стая нашла систему."
 cstorms.5095.name: "Воссоединение тиянки"
 cstorms.5095.desc.common: "В системе §H[solar_system.GetName]§! появились самец и самка тиянки, откликнувшиеся на крики своих потерявшихся детенышей.\n\nПосле воссоединения с родной стаей троица не только успокоилась, но даже заметно поправилась.\n\nОколо нашего научного корабля благодарная самка тиянки оставила «подарок» — захваченную где-то внушительную груду обломков. К нашему удивлению, в ее составе обнаружились полезные материалы."
 cstorms.5095.desc.swarm: "Вот оно, главное блюдо: взрослые особи, сами идущие на убой."
 ###########################################
 #Event Chains #
 ###########################################
 ### Collided Planet Event Chain
 collided_planets_category: "Слившаяся планета"
 collided_planets_category_desc: "Много миллионов лет назад две планеты столкнулись. Из обломков погибших тел образовался совершенно уникальный мир."
 cs_collided_planet_chain_title: "Слившаяся планета"
 cs_collided_planet_chain_desc: "Хрупкому равновесию, которое сложилось на этой удивительной планете, грозит гибель."
 cstorms.1200.name: "Повесть о двух планетах"
 cstorms.1200.desc: "Планета [From.Planet.GetName] восхитила нас уже с первых минут после открытия. Сам факт ее существования — настоящее чудо.\n\nУдивительно не само столкновение двух небесных тел: все-таки галактика обширна и хаотична. Удивительно то, что во всех подобных случаях всегда погибает одно или оба тела… Во всех, кроме этого.\n\nСтолкновение, породившее планету [From.Planet.GetName], случилось еще несколько миллионов лет назад, однако оба тела до сих пор сохраняют поразительное равновесие. На их поверхности даже образовалась атмосфера, способная поддерживать жизнь."
 cstorms.1205.name: "Ненадежный баланс"
 cstorms.1205.desc: "Обстановка на так называемой слившейся планете гораздо сложнее, чем мы представляли. После недавней череды землетрясений вскрылись старые, уже затянувшиеся борозды возле места столкновения. Из-под земли обильными потоками полилась магма. Небо затянулось вулканическим пеплом, а температура поверхности начала стремительно расти. Не осталось ни одной природной зоны, которая не пострадала бы от этого катаклизма.\n\nНаши расчеты показывают, что дальше будет хуже: если соединившиеся планеты не стабилизировать в течение следующих 50 лет, тектоническая активность будет только нарастать, и в конце концов [From.Planet.GetName] превратится в пыль!"
 cstorms.1210.name: "Безграничное преображение"
 cstorms.1210.desc: "Ведущие геологи нашего государства разработали два плана по спасению планеты [From.Planet.GetName] от тектонической катастрофы.\n\nПервый план: стабилизировать место столкновения. На полное исцеление вулканической раны уйдет несколько столетий, однако аккуратное бурение позволит смягчить давление на кору планеты, положив тем самым конец тектонической неустойчивости. С помощью побочных продуктов вулканической деятельности планету можно будет терраформировать, обеспечив там природную стабильность.\n\nВторой план более масштабный: вместо того чтобы облегчать давление на кору, мы запустим специально разработанный для этого случая процесс терраформирования. Поддерживать его будут энергия и ресурсы, получаемые в результате извержений.\n\nТак мы сможем создать множество природных зон, пригодных для проживания самых разных форм жизни, и превратить эту планету в настоящий рай. Однако вероятность успеха крайне мала, более того — так мы рискуем безвозвратно уничтожить это уникальное небесное тело."
 cstorms.1210.a: "Стабилизируйте место столкновения."
 cstorms.1210.b: "Воспользуйтесь вулканическими выбросами."
 cstorms.1210.c: "Ничего не делайте, продолжайте наблюдать."
 collided_planet_collapsing: "Разрушение планеты"
 collided_planet_collapsing_desc: "Беспощадная тектоническая активность разрушит планету. При этом погибнут оба столкнувшихся мира."
 collided_planet_collapsing_tt: "Эта планета разрушится через 50 лет."
 project_cosmic_storms_collidedplanet_stabilize: "Стабилизировать место столкновения"
 project_cosmic_storms_collidedplanet_stabilize_DESC: "Чтобы планета осталась целой, необходимо ее стабилизировать."
 project_cosmic_storms_collidedplanet_harmonize: "Обеспечить гармонию"
 project_cosmic_storms_collidedplanet_harmonize_DESC: "Приступим к выполнению грандиозного плана по созданию гармоничных природных зон на слившейся планете. Создадим мир, где сможет жить каждый, — либо обречем мир на гибель."
 cstorms.1220.name: "Место столкновения стабилизировано"
 cstorms.1220.desc: "Нам удалось стабилизировать слившуюся планету! Подземные толчки прекратились, и теперь миру [From.Planet.GetName] ничего не угрожает. Количество вулканических выбросов стремительно сокращается. Хрупкое равновесие практически восстановлено.\n\nПеред специалистами по терраформированию теперь лишь один вопрос: какого класса в результате должна быть планета [From.Planet.GetName]?"
 cstorms.1220.a: "Оставим планету континентальной."
 cstorms.1220.b: "Превратим ее в саванну."
 cstorms.1220.c: "Создадим высокогорный мир."
 cstorms.1225.name: "Мир для всех"
 cstorms.1225.desc.stabalize: "Невероятно! Оказалось, что наши попытки стабилизировать планету [collided_planets.GetName] принесли совершенно неожиданный результат!\n\n$cstorms.1225.desc.def$"
 cstorms.1225.desc.def: "Перед нами — подлинный рай: на этой планете может комфортно существовать едва ли не любая форма жизни, известная в галактике.\n\nНет более грандиозного подвига, чем спасение обреченного мира и превращение его в нечто великолепное! Нам определенно сопутствует удача."
 cstorms.1230.name: "Нужны восстановительные работы"
 cstorms.1230.desc: "К счастью, сам мир удалось спасти, однако попытки превратить слившуюся планету в рай потерпели неудачу.\n\nРеализовать план по кропотливому созданию природных зон нам помешало движение тектонических плит, хотя пик дестабилизации, скорее всего, уже пройден. Вулканическая активность вернулась к прежним уровням. Некоторые участки в месте столкновения еще активны, но ухудшения обстановки в ближайшее время можно не ждать.\n\nХудшее позади. Впереди новая трудность: восстановление пострадавшего мира."
 cstorms.1235.name: "Разломанный дом"
 cstorms.1235.desc: "Наши попытки спасти слившуюся планету от верной гибели бесславно провалились. Ученые предприняли все меры предосторожности, однако даже самым точным моделям не удалось предсказать все возможные варианты развития событий.\n\nМимо нас уплывают в межзвездную пустоту обломки обоих погибших миров. Об утрате этого необыкновенного явления скорбит вся галактика."
 cstorms.1240.name: "Полное разрушение"
 cstorms.1240.desc: "Гибель слившейся планеты произошла, как и предсказали наши расчеты, с точностью до нескольких знаков после запятой. Там, где когда-то по орбите двигалось уникальное небесное тело, сегодня видны лишь обломки."
 collided_planets_destroyed_tt: "Планета [collided_planets.GetName] уничтожена."
 ### Crimson crawlers Event Chain
 cs_crimson_crawlers_chain_desc: "Красные жуки"
 cs_crimson_crawlers_chain_title: "Мы обнаружили планету, целиком покрытую триллионами красных жуков. Что это — чума… или удачная возможность?"
 crimson_crawlers_category: "Багряный покров"
 crimson_crawlers_category_desc: "В системе [From.GetStarName] мы обнаружили алую планету. Насыщенность ее цвета привлекает внимание. Следует изучить находку подробнее."
 cstorms.1255.name: "Красные жуки"
 cstorms.1255.desc: "Издалека [From.GetName] сияет, словно драгоценный камень. Обычно подобные географические аномалии можно объяснить составом почвы — например, особым соединением глины или других пород с твердыми металлами. Однако истина оказалась куда более странной.\n\nПричина всему этому — жуки. Триллионы триллионов жуков. Бесчисленное количество ножек бесконечно перемещается во все стороны по поверхности планеты [From.GetName], покрывая ее почти целиком.\n\nЭти беспозвоночные организмы, которых наши ученые прозвали «красными жуками», размножаются чрезвычайно активно. Экосистеме планеты они не вредят, однако из-за жуков планета [From.GetName] сейчас плохо пригодна для колонизации.\n\nНам поступило достаточно необычное предложение: первоначальное сканирование показало, что жуки съедобны. Похоже, мы обнаружили новый источник пищи… Рекомендуем, по крайней мере, рассмотреть такую возможность."
 project_cosmic_storms_crimson_crawlers: "Пища для ума"
 project_cosmic_storms_crimson_crawlers_DESC: "Вся поверхность планеты [From.Planet.GetName] покрыта безобидными красными насекомыми. Если разобраться с этими существами, планету можно будет заселить. Однако насекомые — потенциальный источник сытной пищи. Нам открываются интересные перспективы."
 cstorms.1260.name: "Необычная кухня"
 cstorms.1260.desc: "Одна только мысль об употреблении красных жуков в пищу сначала показалась нам отвратительной, но после появления на борту корабля первого экземпляра мнение заметно изменилось.\n\nЭти насекомые — настоящее чудо природы. Их нервная система крайне сложна, однако в ней отсутствует центральный обрабатывающий орган. Но главное — бледное мясо этих существ оказалось на удивление нежным и сочным даже в сыром виде, а хрустящий ярко-красный экзоскелет — невероятно вкусным.\n\nОстается выбрать, как лучше поступить с жуками — внимательно изучить их или пустить в пищу. В приготовленном виде они еще вкуснее, однако употреблять их сырыми будет быстрее и удобнее, особенно если подавать с приправой."
 cstorms.1260.a: "Изучите насекомых."
 cstorms.1260.b: "Будем есть их сырыми!"
 cstorms.1260.c: "На сковороду их!"
 ### Stormbound Event Chain
 cs_stormbound_chain_title: "«Дитя бурь»"
 cs_stormbound_chain_desc: "Наши датчики то и дело фиксируют появление космического корабля — но только во время космических бурь. В чем дело?"
 letters_of_the_manifold: "Письма из глубин многообразия"
 stormbound_event_ship_object: "$cs_stormbound_chain_title$"
 cstorms.1310.name: "«Дитя бурь» появляется"
 cstorms.1310.desc: "Донесения, приходящие из системы [This.GetName], вызывают недоумение. Судя по всему, во время прошедшей там космической бури наши средства наблюдения зафиксировали корабль неизвестного происхождения. Это загадочное судно, не имеющее даже позывного, спокойно прошло через бурю, будто не обращая на нее внимания.\n\nЭкипаж не отреагировал на попытки установить с ним связь. Как только буря утихла, корабль пропал без вести. Это происшествие можно было бы списать на сбой аппаратуры, если бы не наглядные доказательства.\n\nЧто это — чудеса непостижимых технологий или нечто более жуткое? Мы будем докладывать о дальнейших наблюдениях за этим кораблем."
 cstorms.1313.name: "«Дитя бурь» возвращается"
 cstorms.1313.desc: "Нам поступила удивительная сводка от экипажа научной станции в системе [This.GetName]: во время последней космической бури со станцией едва не столкнулся загадочный корабль. Если верить наблюдениям, это тот же самый корабль, о котором докладывали совсем недавно.\n\nЭкипаж станции сообщил, что корпус судна состоит из неизвестного нам сочетания органических компонентов, минералов кальция и металлических сплавов.\n\nПризнаков органической жизни на борту не обнаружено. Мы предполагаем, что корабль либо управляется компьютером, либо каким-то образом передвигается сам по себе.\n\nОднако больше всего нас озадачило, что двигательная система корабля серьезно пострадала от космического мусора. По всем расчетам, он должен безжизненно дрейфовать в космосе.\n\nЕсли мы поручим научному кораблю внимательно следить за следующей космической бурей, возможно, ученые смогут приоткрыть завесу этой тайны."
 cstorms.1313.a: "Нам некогда заниматься подобной ерундой."
 cstorms.1316.name: "Шепоты во время непогоды"
 cstorms.1316.desc: "Далеко впереди, между слоями разразившейся бури экипаж судна «[stormbound_science.GetName]» обнаружил тот самый зловещий корабль. Когда он не спеша проплывал мимо, бортовые приборы сняли совершенно невероятные показания, исходившие прямо с ткани космического пространства.\n\nНаконец-то мы получили долгожданный ответ на вопрос, почему загадочное судно не всегда замечали датчики: физически оно существовало вне пределов континуума, словно «Дитя бурь» вошло и не вошло в червоточину одновременно. Скорее всего, в наше пространство оно возвращается благодаря гиперпространственной природе космических бурь.\n\nТеперь мы сможем обнаружить неуловимый корабль, когда он появится вновь, и попробовать вернуть его в нашу вселенную."
 cstorms.1317.name: "Замечено «Дитя бурь»"
 cstorms.1317.desc: "Зловещий корабль замечен в системе §Y[this.GetName]§!."
 cstorms.1320.name: "Путь домой"
 cstorms.1320.desc: "Получилось! Грозный корабль, зависший перед флотилией [Root.Fleet.GetName], вышел с нами на связь. На экране появилось механическое существо в изысканной маске. Его (а точнее, ее) имя — Б’Тиин, и то, что она нам рассказала, увлекло нас с первых слов.\n\nКогда-то Б’Тиин была офицером — образцом совершенства, воплощением идеалов организации, известной как Собрание Покровителей. В патруле их застала космическая буря, и Б’Тиин в смелой попытке выжить любой ценой решила перегрузить так называемый прорывной двигатель корабля — экспериментальную установку, еще не успевшую пройти все испытания. В результате корабль и его экипаж попали в ловушку гиперпространственного поля накрывшей их бури.\n\nКак только механический офицер договорила, из недр побитого штормом корабля появился небольшой контейнер. Подняв его на борт, внутри мы обнаружили набор документов. «Заберите их домой», — произнесла Б’Тиин, и экран погас, после чего загадочный корабль вновь пропал в глубинах пространственного многообразия.\n\nДокументы написаны на неизвестном нам языке. Расшифровать их получится не сразу."
 cstorms.1320.a: "Приступайте к переводу."
 cstorms.1321.name: "Письма из глубин континуума"
 cstorms.1321.desc: "Мы расшифровали содержимое загадочного контейнера. Один из документов оказался чертежом так называемого прорывного двигателя. Эта технология намного опережает наши возможности, однако внимательное изучение принципов конструкции двигателя значительно расширит наши представления о методах гиперпространственного перемещения — некоторая польза заметна уже сейчас.\n\nМенее полезными, но очень трогательными оказались личные письма, так и не дошедшие по адресу близким и возлюбленным. В этих строках есть и нежность, и надежда, и сожаление…\n\nПохоже, Б’Тиин решила в последний раз помочь экипажу попробовать выйти на связь с внешним миром. К сожалению, мы не сможем узнать, где живут адресаты. Предоставив доступ жителей нашего государства к этим письмам, мы хотя бы сохраним это печальное наследие. Впрочем, возможно, разумнее было бы их уничтожить: таинственные корабли и письма от живых мертвецов могут кого-нибудь напугать."
 cstorms.1321.a: "Отправьте письма в архив для потомков."
 cstorms.1321.b: "Избавьтесь от писем."
 project_cosmic_storms_stormbound: "Духи бури"
 project_cosmic_storms_stormbound_DESC: "Наши приборы показывают, что в этой буре скоро появится пресловутый корабль-призрак.\n\nНемедленно отправим на перехват научный корабль!"
 ### But They're Cute Event Chain
 cs_but_they_are_cute_chain_title: "Но оно такое милое!"
 cs_but_they_are_cute_chain_desc: "На планете [From.Planet.GetName] обнаружено непонятное существо. Как лучше с ним поступить?"
 but_they_are_cute_category: "Но оно такое милое!"
 but_they_are_cute_category_desc: "На планете [From.Planet.GetName] было обнаружили непонятное существо. За то недолгое время, что оно провело рядом с нами, мы прониклись непреодолимым желанием оберегать его и окружать заботой. Рекомендуется внимательнее изучить этот феномен."
 cstorms.1500.name: "Но оно такое милое!"
 cstorms.1500.desc: "Обнаруженное нами существо почти тут же полюбилось всем без исключения. Взгляд его четырех выпученных глаз настолько невинен, что желание погладить мягкий, словно облачко, мех загадочного зверя становится непреодолимым. У самого существа — которое пока не демонстрирует ни агрессии, ни признаков опасности — похожие чувства вызывает [Root.GetLeaderName], чьи колени оно облюбовало всерьез и надолго. Будто кто-то специально вывел предельно безобидное животное…\n\nВпрочем, некоторые скептики заявляют, что брать на борт неизвестную форму жизни, не получив на это одобрения, крайне безответственно. [Root.GetLeaderName] ручается за то, что животное совершенно безопасно, однако соглашается изучить его внимательнее."
 cstorms.1500.a: "Выясните, что это такое."
 cstorms.1500.b: "Просьба отклонена, избавьтесь от него."
 cstorms.1500.evopred: "Просьба отклонена. Съешьте его."
 project_cosmic_storms_but_they_are_cute: "Биологическое чудо"
 project_cosmic_storms_but_they_are_cute_DESC: "На борту одного из наших научных кораблей мы обнаружили неизвестное, но крайне милое существо. Чтобы решить, оставлять ли его на попечении экипажа, потребуется изучить его биологические свойства."
 cstorms.1505.name: "Биологическое чудо"
 cstorms.1505.desc: "Шестиногое существо оказалось удивительно смирным и покладистым: нам не пришлось вводить ему успокоительное или удерживать силой во время изучения. Экипаж прозвал находку «Гурр» — такой звук загадочный зверь издавал, когда его начинали гладить.\n\nМы пришли к выводу, что Гурр всеяден, а его мех состоит из хорошо нам знакомых и очень мягких ворсинок на основе кератина. Однако его организм — настоящее чудо и загадка: полная регенерация его клеток занимает всего месяц. Обновляется в том числе и нервная система — Гурр способен отращивать здоровые конечности вместо поврежденных всего за несколько дней.\n\nМаловероятно, что настолько сложный организм мог появиться в результате естественной эволюции. Подобные существа никогда не встречались нам раньше, а его характер пока слабо изучен. Гурр кроток, однако потенциально может проявить агрессию в любой момент. Впрочем, стоит отметить, что после того, как на нашем корабле появился этот зверь, [Root.GetLeaderName] проявляет гораздо больше энтузиазма к работе.\n\nКак лучше будет поступить с Гурром? Стоит ли его оставить?"
 cstorms.1505.a: "Лишь бы только за ним убирали."
 cstorms.1505.b: "Избавьтесь от него."
 cstorms.1510.name: "Гурр эмоциональной поддержки"
 cstorms.1510.desc: "Обаятельному зверьку позволили остаться на научном корабле, и он, похоже, неплохо освоился: помогает успокоиться, когда [Root.GetLeaderName] нервничает, веселит окружающих своей забавной походкой и всегда готов поднять настроение экипажу.\n\nМы надеемся, что это чудо природы так и останется нашим мирным и невероятно прелестным другом. Отныне и до конца он будет оставаться с нами, и имя его будет Гурр."
 cstorms.1510.a: "Превосходно!"
 cstorms.1515.name: "Гибель Гурра"
 cstorms.1515.desc: "Очевидно, Гурр — крайне необычный генетически модифицированный организм. Нельзя было позволить ему остаться на борту, слишком велик риск будущего неблагоприятного влияния на экипаж или появления разгневанного владельца в поисках любимого питомца. Смерть его была быстрой и безболезненной. Тихое «гур-р» утихло.\n\nИ [Root.GetLeaderName], и экипаж очень бурно отреагировали на это решение. Они не скоро оправятся от потери любимого диковинного существа."
 cstorms.1515.a: "У нас не было выбора."
 cstorms.1515.evopred: "Сохраним образец ДНК."
 cstorms.1520.name: "Гибель Гурра… или нет?"
 cstorms.1520.desc: "Мы считали, что, при нейтрализации этого прелестного существа избавимся от него навсегда. Но сейчас стало ясно, что наши ученые недооценили невероятную способность Гурра к регенерации.\n\nСовсем скоро из уже мертвой, как нам казалось, ткани появились два зверька-близнеца. Несмотря на наше решение умертвить их «родителя», новые Гурры не проявляют никаких признаков агрессии.\n\nЛучше на этом и остановиться, иначе корабль переполнится новыми пушистиками. Как [Root.GetLeaderName], так и экипаж в восторге от разрешения оставить новых существ на борту."
 cstorms.1520.a: "Будем знать."
 ### The Imitator Event Chain
 cstorms.1550.name: "Подражатель"
 cstorms.1550.desc: "[From.Planet.GetName] преподносит нам сюрприз: обнаруженная капсула оказалась брошенной на произвол космической непогоды. Идентификатор соответствует нашим стандартам, однако сама капсула явно чужеродного происхождения. Экипаж с опаской согласился ответить на вызов и установить связь — к немалому восторгу пассажира капсулы.\n\n[event_target:the_imitator.GetHeSheCap] [event_target:the_imitator.GetAXX::объяснил|||fem:объяснила], что буря уже давно носит за собой [event_target:the_imitator.GetAXX::его|||fem:ее] капсулу, а потому чем скорее мы придем на помощь, тем лучше: системы жизнеобеспечения вот-вот откажут.\n\nВ ответ на просьбу представиться загадочное существо неожиданно заявило, что оно — член нашего экипажа. Это очевидная ложь — хотя бы потому, что весь экипаж на борту в полном составе."
 cstorms.1550.a: "Довольно вранья. Уничтожьте капсулу."
 cstorms.1550.b: "Поднимите капсулу на борт."
 cstorms.1555.name: "Подражатель"
 cstorms.1555.desc: "Мы подняли капсулу на борт корабля. Нехитрая попытка нас обмануть не увенчалась успехом — это стало ясно сразу же, как только открылся люк. Вылезшее из него инопланетное существо тут же в отчаянии взмолилось перед нами.\n\nОказывается, во время планового осмотра спасательных капсул на корабле нашего пассажира [event_target:the_imitator.GetAXX::подражатель|||fem:подражательница] [event_target:the_imitator.GetAXX::оказался|||fem:оказалась] [event_target:the_imitator.GetAXX::заперт|||fem:заперта] внутри одной из них и [event_target:the_imitator.GetAXX::выброшен|||fem:выброшена] в космос. К сожалению, никто на борту не заметил пропажи члена экипажа.\n\nЗа несколько месяцев, проведенных в межзвездном пространстве, [event_target:the_imitator.GetAXX::незадачливый|||fem:незадачливая] [event_target:the_imitator.GetAXX::«путешественник»|||fem:«путешественница»] [event_target:the_imitator.GetAXX::соорудил|||fem:соорудила] из найденных внутри компонентов незамысловатое устройство, способное имитировать энергетические сигналы пролетающих мимо кораблей, чтобы обратить на себя внимание. Однако даже это не помогло. Хуже того, проходившая космическая буря затянула капсулу и унесла на многие световые годы от родной системы. Крайнее одиночество и страх подтолкнули инопланетянина к новому замыслу: притвориться пропавшим членом экипажа оказавшегося поблизости корабля. Впрочем, существо тут же извинилось перед своими спасителями."
 cstorms.1555.a: "Такая изобретательность может пригодиться."
 cstorms.1555.b: "Довезите существо до ближайшей населенной планеты."
 cstorms.1555.c: "Бросьте инопланетянина и заберите капсулу."
 the_imitator_category_desc: "Наши исследователи обнаружили одинокую спасательную капсулу. Ее пассажир вызвал нас, пользуясь тем же идентификатором, что и мы. Похоже, капсулу сюда принесла недавняя космическая буря. Рекомендуем внимательно изучить находку."
 #The Imitator Leader
 the_imitator_category: "Подражатель"
 the_imitator_catch_phrase: "Как же тут хорошо!"
 the_imitator_leader_desc: "Это чудаковатое, но крайне предприимчивое существо, пережившее космическую бурю, способно изменить любую ситуацию — как правило, к лучшему."
