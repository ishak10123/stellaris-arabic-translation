 STORM_AFTERMATH_DESC: "• Колонии на 3 года получат следующий модификатор, зависящий от силы космической бури:"
 electric_storm_aftermath_modifier: "Заряженная атмосфера"
 electric_storm_aftermath_modifier_tooltip: "$STORM_AFTERMATH_DESC$\n$t$• §H$electric_storm_aftermath_modifier$§!:\n$tt$• $MOD_PLANET_BUILDING_BUILD_SPEED_MULT$: от §R–25%§! до §R–65%§!\n$tt$• $mod_planet_jobs_energy_produces_mult$: от §G+10%§! до §G+30%§!"
 electric_storm_aftermath_modifier_severity_desc: "$electric_storm$ оставила после себя импульсы перенапряжения в атмосфере, из-за чего наша техника работает ненадежно. Однако производство энергии поднялось на небывалый уровень!"
 electric_storm_aftermath_modifier_severity_1: "Последствия: заряженная атмосфера"
