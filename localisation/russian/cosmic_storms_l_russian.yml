 cstorms.2000.name: "Подготовка бури"
 cstorms.2000.desc_common_1: "Мы готовы начать приготовления по созданию §Yкосмической бури§! в системе §H[target.solar_system.GetName]§!.\n\nВременно перегрузив звезду [target.GetName] энергией, мы создадим идеальные условия, чтобы получить желаемый астрометеорологический эффект."
 cstorms.2000.desc_tech: "\nС помощью продвинутых методов управления энергией мы можем перенасытить звезду [target.GetName] сырьем и сформировать бурю с более сложной структурой."
 cstorms.2000.desc_common_2: "\nЭто займет немало времени, однако итоговый результат станет великим достижением для [owner.GetName&gen]. Сама звезда по завершении операции останется такой же, как прежде."
 cstorms.2000.a: "Перегрузить звезду энергией."
 cstorms.2000.a.tt: "$approach_situation_initiate_storm_supercharge_tt$"
 cstorms.2000.b: "Перенасытить звезду."
 cstorms.2000.b.tt: "$approach_situation_initiate_storm_overfeed_tt$"
 cstorms.2000.b.tt.allow: "Необходимо одно из нижеперечисленного$TABBED_NEW_LINE$$TRIGGER_FAIL$$approach_situation_initiate_storm_agitate$$TABBED_NEW_LINE$$t$$TRIGGER_FAIL$Есть технология £physics£ §Y«$tech_basic_science_lab_3$»§!$TABBED_NEW_LINE$$t$$TRIGGER_FAIL$$must_have_access_to_volatile_motes_tt$$TABBED_NEW_LINE$$TRIGGER_FAIL$$approach_situation_initiate_storm_destabilize$$TABBED_NEW_LINE$$t$$TRIGGER_FAIL$Есть технология £physics£ §Y«$tech_mine_dark_matter$»§!$TABBED_NEW_LINE$$TRIGGER_FAIL$$approach_situation_initiate_storm_scramble$$TABBED_NEW_LINE$$t$$TRIGGER_FAIL$Есть технология £physics£ §Y«$tech_hyper_drive_3$»§!$TABBED_NEW_LINE$$t$$TRIGGER_FAIL$$must_have_access_to_rare_crystals_tt$"
 cstorms.2000.c: "Отменить проект."
 cstorms.2010.name: "Калибровка бури"
 cstorms.2010.desc_irradiate_only: "Подготовка космической бури в системе §H[target.solar_system.GetName]§! достигла решающего этапа. Теперь от нас требуется крайняя сосредоточенность, а также дополнительное вливание ресурсов, чтобы раздуть солнечный ветер звезды §H[target.GetName]§! и создать §Yбурю излучения§!."
 cstorms.2010.desc_others: "Подготовка космической бури в системе §H[target.solar_system.GetName]§! достигла переломного момента. Следующие действия крайне важны и потребуют целенаправленных вливаний ресурсов."
 cstorms.2010.a: "Усилить солнечный ветер."
 cstorms.2010.a.tt: "$approach_situation_initiate_storm_irradiate_tt$\nСтоимость: $@irradiate_alloy_upkeep|0$ ед. £alloys£ §Yсплавов§! в месяц, прогресс: $@default_monthly_progress$ в месяц"
 cstorms.2010.b: "Нарушить электронные поля."
 cstorms.2010.b.tt: "$approach_situation_initiate_storm_sever_tt$\nСтоимость: $@sever_energy_upkeep|0$ ед. £energy£ §Yэнергокредитов§! в месяц, прогресс: $@default_monthly_progress$ в месяц"
 cstorms.2010.c: "Намагнитить ионы."
 cstorms.2010.c.tt: "$approach_situation_initiate_storm_magnetize_tt$\nСтоимость: $@magnetize_mineral_upkeep|0$ ед. £minerals£ §Yминералов§! в месяц, прогресс: $@default_monthly_progress$ в месяц"
 cstorms.2010.d: "Отказаться от проекта."
 cstorms.2015.name: "$cstorms.2010.name$"
 cstorms.2015.desc_one_tech_only: "Подготовка космической бури в системе §H[target.solar_system.GetName]§! достигла решающего этапа. Теперь [storm_researcher.GetName] [storm_researcher.GetAXX::должен|||fem:должна] быть особенно [storm_researcher.GetAXX::сосредоточен|||fem:сосредоточена], но кроме того, [storm_researcher.GetAXX::ему|||fem:ей] нужны дополнительные ресурсы, чтобы воспользоваться перенасыщенным состоянием звезды [target.GetName]."
 cstorms.2015.desc_others: "Подготовка космической бури в системе §H[target.solar_system.GetName]§! достигла переломного момента. Следующие действия, которые предпримет [storm_researcher.GetName], крайне важны и потребуют целенаправленных вливаний ресурсов, если мы хотим должным образом воспользоваться перенасыщенным состоянием звезды [target.GetName]."
 cstorms.2015.a: "Разогнать частицы."
 cstorms.2015.a.tt: "$approach_situation_initiate_storm_agitate_tt$\nСтоимость: $@rare_resource_upkeep|0$ ед. £volatile_motes£ §Yлетучих пылинок§! в месяц, прогресс: $@default_monthly_progress$ в месяц"
 cstorms.2015.b: "Дестабилизировать гравитационные поля."
 cstorms.2015.b.tt: "$approach_situation_initiate_storm_destabilize_tt$\nСтоимость: $@rare_resource_upkeep|0$ ед. £sr_dark_matter£ §Yтемной материи§! в месяц, прогресс: $@default_monthly_progress$ в месяц"
 cstorms.2015.c: "Раскидать звездную пыль."
 cstorms.2015.c.tt: "$approach_situation_initiate_storm_scramble_tt$\nСтоимость: $@rare_resource_upkeep|0$ ед. £rare_crystals£ §Yредких кристаллов§! в месяц, прогресс: $@default_monthly_progress$ в месяц"
 cstorms.2015.d: "$cstorms.2010.d$"
 cstorms.storm_gathered.final_word: "Обуздать мощь космической бури было нелегко. Мы наконец-то можем воспользоваться долгожданными плодами свои усилий."
 cstorms.storm_gathered.a: "Отличная работа."
 cstorms.2020.name: "Обрушить бурю"
 cstorms.2020.desc: "Усиленные солнечные ветры звезды §H[target.GetName]§! достигли критической массы.\n\nЕще немного, и мы обрушим на галактику §Yбурю излучения§!.\n\n$cstorms.storm_gathered.final_word$"
 cstorms.2025.name: "$cstorms.2020.name$"
 cstorms.2025.desc: "Электронные поля звезды §H[target.GetName]§! полностью нарушены.\n\nЕще немного, и мы обрушим на галактику §Yэлектрическую бурю§!.\n\n$cstorms.storm_gathered.final_word$"
 cstorms.2030.name: "$cstorms.2020.name$"
 cstorms.2030.desc: "Ионы звезды §H[target.GetName]§! полностью намагничены.\n\nЕще немного, и мы обрушим на галактику §Yмагнитную бурю§!.\n\n$cstorms.storm_gathered.final_word$"
 cstorms.2035.name: "$cstorms.2020.name$"
 cstorms.2035.desc: "Частицы звезды §H[target.GetName]§! насыщены до предела.\n\nЕще немного, и мы обрушим на галактику §Yбурю частиц§!.\n\n$cstorms.storm_gathered.final_word$"
 cstorms.2040.name: "$cstorms.2020.name$"
 cstorms.2040.desc: "Гравитационное поле звезды §H[target.GetName]§! достаточно дестабилизировано.\n\nЕще немного, и мы обрушим на галактику §Yгравитационную бурю§!.\n\n$cstorms.storm_gathered.final_word$"
 cstorms.2045.name: "$cstorms.2020.name$"
 cstorms.2045.desc: "Мы раскидали достаточно пыли вокруг звезды §H[target.GetName]§!.\n\nЕще немного, и мы обрушим на галактику §Yбурю звездной пыли§!.\n\n$cstorms.storm_gathered.final_word$"
 ### Aftermath Deposits ###
 d_magnetic_storm_1_minerals: "Намагниченная руда"
 d_magnetic_storm_1_minerals_desc: "Космическая буря намагнитила огромное количество ранее не разрабатывавшихся залежей минералов, благодаря чему наши горнодобывающие комплексы могут легко получить доступ к этим новым ресурсам."
 d_magnetic_storm_2_alloys: "Буревая кузница"
 d_magnetic_storm_2_alloys_desc: "Разбушевавшаяся на планете космическая буря странным образом зарядила немалую часть плавильного оборудования. Хоть мы и не до конца понимаем механизм этого эффекта, он позволил нам значительно повысить производство сплавов."
 d_magnetic_storm_3_mix: "Небесные плато"
 d_magnetic_storm_3_mix_desc: "Огромные участки суши, намагниченные гравитационными эффектами космической бури, взмыли в воздух, и теперь мы можем разместить их прямо над промышленными комплексами."
 cstorms.8000.title: "Космическое преобразование"
 cstorms.8000.desc: "Космическая буря оставила после себя не только опустошение. На планете [Planet.GetName] она создала совершенно новое географическое явление."
 cstorms.8000.a: "Великолепно."
 d_electric_storm_1_engineering: "Наэлектризованные руины"
 d_electric_storm_1_engineering_desc: "Невероятно свирепая космическая буря превратила некогда цветущее поселение в наэлектризованные руины, преобразовав наши заурядные строительные материалы в редкие и необычные соединения."
 d_electric_storm_2_unity: "Планетарный шрам"
 d_electric_storm_2_unity_desc: "Космическая буря обрушила на планету столь мощные разрушения, что высекла на поверхности шрам, который видно из космоса."
 d_electric_storm_3_physics: "Безмолвная армада"
 d_electric_storm_3_physics_desc: "Космическая буря вывела из строя системы навигации на бесчисленном количестве гражданских кораблей, превратив особенно пострадавшие районы в безмолвные кладбища разбитых корпусов и уничтоженной техники."
 d_particle_storm_1_society: "Опустошенные бурей пригороды"
 d_particle_storm_1_society_desc: "Космическая буря превратила часть пригородных районов в руины, и теперь мы можем лишь изучать то, что от них осталось."
 d_particle_storm_2_unity: "Гигант"
 d_particle_storm_2_unity_desc: "Космическая буря оставила на этой планете кратер невообразимых размеров — суровое напоминание о том, насколько безразлично вселенной наше существование."
 d_particle_storm_3_motes: "Нестабильные плиты"
 d_particle_storm_3_motes_desc: "Космическая буря превратила несколько крупных равнин в сейсмически-активные зоны, однако увеличилась не только опасность для населения, но и доступность летучих пылинок."
 particle_storm_aftermath_1_tt: "Скорость сборки роботов: §R-40%§!\n£minerals£ §YМинералы§! от должностей: §R-10%§!\n£volatile_motes£ §YЛетучая пыль§! от поселений: §G+0.02§!"
 particle_storm_aftermath_2_tt: "Скорость сборки роботов: §R-50%§!\n£minerals£ §YМинералы§! от должностей: §R-20%§!\n£volatile_motes£ §YЛетучая пыль§! от поселений: §G+0.04§!"
 particle_storm_aftermath_3_tt: "Скорость сборки роботов: §R-60%§!\n£minerals£ §YМинералы§! от должностей: §R-30%§!\n£volatile_motes£ §YЛетучая пыль§! от поселений: §G+0.06§!"
 d_solar_storm_1_energy: "Истончение озонового слоя"
 d_solar_storm_1_energy_desc: "Космическая буря проделала дыру в озоновом слое атмосферы этой планеты. Хоть это и очень плохо сказывается на условиях для жизни, условия для производства только улучшились."
 d_solar_storm_2_districts: "Радиоактивные высокогорья"
 d_solar_storm_2_districts_desc: "Космическая буря напитала высокогорья этого мира радиацией, создав отличные условия для производства энергии."
 d_solar_storm_3_output: "Светящаяся пустыня"
 d_solar_storm_3_output_desc: "После космической бури стала светиться целая пустыня, и при должных мерах безопасности это место можно превратить в прибыльное туристическое направление."
 d_celestial_storm_1_mines: "Кристаллические иглы"
 d_celestial_storm_1_mines_desc: "Яростные удары космической бури сформировали массив острых, похожих на шипы кристаллов — опасное место, но из него можно извлечь выгоду."
 d_celestial_storm_2_society: "Доисторические породы"
 d_celestial_storm_2_society_desc: "Космическая буря обнажила целые слои доисторических пород, открыв доступ к изучению таких эпох, о существовании которых можно было только догадываться."
 d_celestial_storm_3_crystal: "Дюны из звездной пыли"
 d_celestial_storm_3_crystal_desc: "Космическая буря обрушилась на этот мир, словно цунами. Но, отступив, она оставила после себя неописуемо прекрасный пейзаж со сверкающими дюнами из звездной пыли."
 celestial_storm_aftermath_1_tt: "Преступность на планете: §R+10%§!\n£food£ §YПища§! от должностей: §R-10%§!\n£rare_crystals£ §YРедкие кристаллы§! от поселений: §G+0.02§!"
 celestial_storm_aftermath_2_tt: "Преступность на планете: §R+20%§!\n£food£ §YПища§! от должностей: §R-20%§!\n£rare_crystals£ §YРедкие кристаллы§! от поселений: §G+0.04§!"
 celestial_storm_aftermath_3_tt: "Преступность на планете: §R+30%§!\n£food£ §YПища§! от должностей: §R-30%§!\n£rare_crystals£ §YРедкие кристаллы§! от поселений: §G+0.06§!"
 d_gravity_storm_1_districts: "Спрессованные равнины"
 d_gravity_storm_1_districts_desc: "Мощные гравитационные эффекты космической бури спрессовали грунт в ряде областей, ранее считавшихся слишком нестабильными для строительства, в результате чего мы бесплатно получили новые места под недвижимость."
 d_gravity_storm_2_unity: "Стертые в порошок монументы"
 d_gravity_storm_2_unity_desc: "Некоторые наши монументы оказались слишком хрупкими и не выдержали невероятной мощи космической бури, буквально стершей их в порошок. Эти груды пыли и обломков — наглядное напоминание нам о том, сколь ужасающи силы природы в космических масштабах."
 d_gravity_storm_3_engineering: "Гравитационные пещеры"
 d_gravity_storm_3_engineering_desc: "Космическая буря запечатала шахты в некоторых горнодобывающих комплексах крайне плотным веществом. И хотя наши попытки вновь пробиться в эти шахты привели к ряду открытий в области машиностроения и бурения, основной цели добиться пока так и не удалось."
 d_shroud_storm_1_society: "Покровные паразиты"
 d_shroud_storm_1_society_desc: "Космическая буря заразила наш скот паразитами, которые существуют на грани между нашей реальностью и Покровом. Паразиты оказались съедобными, полезными и на удивление вкусными."
 d_shroud_storm_2_zro: "Поля зро"
 d_shroud_storm_2_zro_desc: "Наиболее богатые растительностью регионы этой планеты под воздействием космической бури превратились в насыщенные зро поля. Настолько чистых залежей зро мы еще не встречали."
 d_shroud_storm_3_happy: "Озерная сущность"
 d_shroud_storm_3_happy_desc: "Космическая буря оставила нам странный и чудесный подарок. Волны и рябь на поверхности самого крупного водоема планеты складываются в явно осмысленные символы, в которых можно прочесть удивительно мудрые ответы на заданные вопросы."
 ### Shroud Storm Events
 shroud_switched: "Пелена Покрова"
 shroud_switched_tt: "Пелена Покрова окутала это небесное тело. Столь неестественное присутствие указывает либо на крупный разрыв реальности, либо на последствия катастрофической покровной бури."
 cstorms.8510.title: "Псионический сдвиг"
 cstorms.8510.desc: "Всплеск псионической активности привел к тому, что на месте планеты [from.GetName] теперь неизвестно откуда взявшийся мир [from.GetClassName]."
 cstorms.8510.a: "Странная судьба."
 cstorms.8515.title: "Массовые превращения"
 cstorms.8515.desc: "Волна псионической энергии прокатилась по планете [from.GetName], и часть населения видоизменилась вопреки всем законам природы. Это затронуло целые поселения; внешний вид их обитателей теперь чужд и незнаком, будто нечто за пределами нашего понимания переписало самую их суть."
 cstorms.8515.a: "Проявление неведомых сил…"
 cstorms.8520.title: "Звездное превращение"
 cstorms.8520.desc: "Волна псионической энергии преобразовала звезду [from.GetName], превратив ее в нечто совершенно иное. [from.GetClassName] теперь странным светом окутывает систему [from.solar_system.GetName], будто сама ткань реальности здесь изменилась."
 cstorms.8520.a: "Этому подвержены даже звезды…"
