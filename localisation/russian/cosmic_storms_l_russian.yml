 gov_storm_chasers: "Совет старейшин"
 gov_storm_chasers_desc: "Члены достопочтенного правящего совета старейшин достигли физического совершенства, а потому способны совершать невероятные подвиги, например покорять высочайшие горы или огромные волны. В жизни их интересует лишь погоня за ощущениями. Этим они заслужили доверие своей общины, а вместе с ним и право прокладывать общий курс.\n\nЧленов совета называют старейшинами в любом возрасте, поскольку их подвиги признаны легендарными. Да славятся их имена во веки веков."
