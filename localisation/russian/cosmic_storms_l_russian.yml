 MESSAGE_STORM_AFTERMATH_DESC: "С планеты §H$PLANET$§! поступают сообщения об остаточных атмосферных возмущениях."
 electric_storm_aftermath_custom_desc: "§Y$electric_storm$§! ударила по темпам строительства, но повысила выработку энергии."
 particle_storm_aftermath_custom_desc: "§Y$particle_storm$§! оставила свои разъедающие следы по всей планете."
 gravity_storm_aftermath_custom_desc: "§Y$gravity_storm$§! миновала, оставив после себя гравитационные аномалии в одной из наших колоний."
 magnetic_storm_aftermath_custom_desc: "§Y$magnetic_storm$§! миновала. В нашей колонии зарегистрировали электромагнитные возмущения у полюсов."
 solar_storm_aftermath_custom_desc: "§Y$solar_storm$§! оставила после себя опасный уровень радиационного загрязнения на всей планете."
 celestial_storm_aftermath_custom_desc: "§Y$celestial_storm$§! окутала планету густым туманом из космической пыли."
