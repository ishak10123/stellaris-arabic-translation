 #Storm Technology
 tech_storm_manipulation: "Управление бурями"
 tech_storm_manipulation_desc: "Освоив принципы технологий подавления бурь, мы сможем манипулировать астрометеорологической природой галактики в своих интересах."
 tech_advanced_storm_manipulation: "Улучшенное управление бурями"
 tech_advanced_storm_manipulation_desc: "Дальнейшее изучение астрометеорологии позволяет нам с большей точностью изменять §Yкосмические бури§! в своих интересах."
 tech_industrial_storm_protection: "Противодействие планетарным бурям"
 tech_industrial_storm_protection_desc: "Этот передовой метеорологический центр помогает облегчать последствия разгула космической непогоды. Производство будет меньше страдать от налетающих бурь."
 tech_advanced_industrial_storm_protection: "Нейтрализация планетарных бурь"
 tech_advanced_industrial_storm_protection_desc: "Объединив местные системы управления погодой, мы сможем влиять на метеорологические условия планеты и тем самым значительно уменьшать вред, который нашему производству наносят космические бури."
 tech_storm_prediction_1: "Модели космической погоды"
 tech_storm_prediction_1_desc: "С помощью научных погодных моделей мы можем отслеживать перемещение и возникновение надвигающихся §Yкосмических бурь§!."
 tech_storm_prediction_1_title: "§HОткрывает свойство§!: прогноз космической погоды"
 tech_storm_prediction_1_tooltip: "Открывает §Yпрогноз появления космических бурь§! и §Yпрогноз движения космических бурь§! в §Yрежиме метеопрогноза§!"
 tech_storm_prediction_2: "Вероятностный поток"
 tech_storm_prediction_2_desc: "Благодаря применению токов вероятности в научных погодных моделях наша способность отслеживать перемещение и возникновение надвигающихся §Yкосмических бурь§! значительно выросла."
 tech_storm_prediction_2_title: "§HУлучшает свойство§!: прогноз космической погоды"
 tech_storm_prediction_2_tooltip: "Предельно повышает дальность §Yпрогноза появления космических бурь§! и §Yпрогноза движения космических бурь§! в §Yрежиме метеопрогноза§!"
 tech_ship_hull_storm_breaker_1: "Генераторы подавления бурь"
 tech_ship_hull_storm_breaker_1_desc: "Эти генераторы создают подавляющее поле, которое защищает от вредного воздействия корабли, проходящие через космические бури."
 tech_ship_hull_storm_breaker_2: "Буреподавляющее покрытие"
 tech_ship_hull_storm_breaker_2_desc: "Это особое покрытие, наносимое на корпус корабля, подавляет воздействие космических бурь и тем самым эффективнее защищает судно."
 tech_ship_storm_weapons_1: "Наполнение боевых зарядов"
 tech_ship_storm_weapons_1_desc: "Новые подходы к использованию сплавов в военных целях значительно ослабляют влияние космических бурь на энергетическое оружие и взрывчатку."
 tech_ship_storm_weapons_2: "Противобуревые клетки"
 tech_ship_storm_weapons_2_desc: "Благодаря этой новейшей корабельной конструкции нам удалось значительно ослабить влияние космических бурь на оружейные системы."
 feature_sustain_cosmic_storm_unlocked: "Поддержание космических бурь"
 feature_sustain_cosmic_storm_unlocked_desc: "Научные корабли смогут останавливать и поддерживать §Yкосмические бури§! без ограничений по времени."
 FLEETORDER_SUSTAIN_COSMIC_STORM: "Поддержание космической бури «$STORM|Y$» ($SYSTEM|Y$)"
 FLEETORDER_SUSTAIN_COSMIC_STORM_BUTTON: "Поддержать §Yкосмическую бурю§!"
 FLEETORDER_SUSTAIN_COSMIC_STORM_CANCELLED: "§RПреследуемая космическая буря закончилась.§!"
