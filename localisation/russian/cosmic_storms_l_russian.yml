 job_noble_researcher: "Ученый дворянин"
 job_noble_researcher_plural: "Ученые дворяне"
 job_noble_researcher_desc: "Самых талантливых и благородных отпрысков обучают в равной степени и манерам, и научному методу, чтобы они могли лучше объяснять другим свое превосходство."
 sacred_noble: "$job_sacred_noble$"
 job_sacred_noble: "Священный дворянин"
 job_sacred_noble_plural: "Священные дворяне"
 job_sacred_noble_desc: "Принцип един: божественность путем наследования. Способ един: наследование путем божественности. Отсюда следует, что мы благословенны тем, что благородны."
 augmentation_merchant: "$job_augmentation_merchant$"
 job_augmentation_merchant: "Торговец аугментациями"
 job_augmentation_merchant_plural: "Торговцы аугментациями"
 job_augmentation_merchant_desc: "Они достойны направлять наше государство, ведь предлагают самосовершенствование по столь доступной цене, да еще и с расширенной гарантией."
 visionary: "$job_visionary$"
 job_visionary: "Техновизионер"
 job_visionary_plural: "Техновизионеры"
 job_visionary_desc: "Эти мечтатели не ограничены опытом прошлых лет, их не тянет ко дну излишняя скромность. Они превращают смелые рассуждения в готовую к сбыту реальность. Для истинного визионера прогресс — не принцип: это товар."
 noble_merchant: "$job_noble_merchant$"
 job_noble_merchant: "Патриций"
 job_noble_merchant_plural: "Патриции"
 job_noble_merchant_desc: "Право на власть определяется не наследием предков, но мерой собственной ценности — и разве можно измерить ее лучше, чем по сумме на банковском счету?"
