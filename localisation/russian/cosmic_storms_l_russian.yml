 solar_storm_aftermath_modifier: "Радиоактивный локдаун"
 solar_storm_aftermath_modifier_tooltip: "$STORM_AFTERMATH_DESC$\n$t$- §H$solar_storm_aftermath_modifier$§!:\n- $MOD_LOGISTIC_GROWTH_MULT$: от §R-40%§! до §R-60%§!\n$tt$- $MOD_POP_AMENITIES_USAGE_MULT$: от §R+10%§! до §R+30%§!\n$tt$- $MOD_ARMY_DEFENSE_DAMAGE_MULT$: от §G+20%§! до §G+40%§!$tt$"
 solar_storm_aftermath_modifier_severity_desc: "$solar_storm$ привела к сильному радиоактивному заражению, из-за чего потребовалось ввести почти полную изоляцию. В условиях строгого контроля над жителями посредством вооруженных сил стало гораздо легче управлять планетой, хоть и ценой растущего недовольства."
