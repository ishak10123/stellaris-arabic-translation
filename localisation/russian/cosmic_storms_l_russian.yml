 #The adAkkaria Convention of Benevolence #
 ###########################################
 cs_adAkkaria_chain_title: "Предтечи: адАккария"
 cs_adAkkaria_chain_desc: "Чтобы узнать, какая судьба постигла эту загадочную древнюю цивилизацию, надо пройти по найденным следам. Неизвестно, куда этот путь нас приведет."
 #Anomaly: Ancient Signals
 STORMS_PREC_ONE: "Древние сигналы"
 STORMS_PREC_ONE_DESC: "Мы зарегистрировали череду необычных электронных сигналов, исходящих из этой системы. Судя по предварительным данным, этим сигналам несколько тысяч лет. Наш экипаж заинтересовался их происхождением."
 cstorms.205.name: "Сигнал Благодеяния"
 cstorms.205.desc: "Зарегистрированные нами загадочные сигналы подает древняя станция связи, которая вращается на орбите планеты [FromFrom.GetName]. Похоже, мы поймали передачи, отправленные давно забытой цивилизацией.\n\nНаши [Root.Owner.GetScientistPlural] пока не могут их расшифровать, а потому предлагают высадиться на станцию, чтобы найти там центральный передатчик."
 #Digsite: The Propaganda Station
 site_adakkaria_the_propaganda_station: "Агитационная станция"
 site_adakkaria_the_propaganda_station_intro: "Древняя станция связи до сих пор работает. Возможно, ее передачи получится расшифровать, если высадиться на станцию и подключиться к ее системам."
 cstorms.215.name: "Связь с прошлым"
 cstorms.215.desc: "Проникнуть на станцию оказалось нетрудно. Сложности ждали нас внутри: сама станция сохранилась на удивление хорошо (не в последнюю очередь благодаря внешней защите), однако узкие коридоры и низкие потолки ощутимо затрудняли движение.\n\nУстановить предназначение форпоста по его внутренним помещениям оказалось сложно. Внутри не было ничего примечательного, кроме огромных плакатов, развешанных по стенам. На плакатах, сделанных из смеси бумаги и пластика, были напечатаны стилизованные изображения неизвестной нам биологической расы. Художник изобразил этих существ в гордой позе на фоне триумфальных свершений. Очевидно, главная задача этих плакатов — внушить зрителю чувство гордости и близости к величию.\n\nЦентральный передатчик оказался не менее загадочным. Поначалу наши [Root.Owner.GetEngineerPlural] посчитали, что он полностью аналоговый, как у [Root.Owner.GetPreFTLLowerPlural&pl,gen] цивилизаций, но микросхемы, отвечающие за работу кнопок и шкал, оказались очень сложными и сделанными из неизвестных нам сплавов. На данный момент [Root.Owner.GetScientistPlural] считают, что эта цивилизация перескочила сразу через несколько ступеней развития в области вычислительной техники. Этим объясняется сочетание старых и новых технологий.\n\nМетодом проб и ошибок наши [Root.Owner.GetLinguists] расшифровали первую передачу."
 cstorms.220.name: "От Высочайшего руководства"
 cstorms.220.desc: "Наши [Root.Owner.GetLinguists], добравшиеся до древнего центрального передатчика, составили стенограмму первой передачи:\n\n§L«адАккарийский народ!\n\nЯ обращаюсь ко всем вам не как вождь, но как друг и наставник.\n\nКаждый из вас заметил, что мы живем в смутное время. Небеса обращаются против нас, и даже звезды желают нашей погибели.\n\nНо я не теряю веры. Как Покровители верили в нас, так и я верю в наше предназначение. Я верю в вас.\n\nНа протяжении многих столетий мы стояли на страже звезд, оберегая их от нашествий варварских орд. Защита галактики от всех, кто желает ей навредить, — наша судьба, и никакие неудачи не отвернут нас от этой судьбы. Никакие армии, ополчившиеся против нас, не способны расстроить наши замыслы.\n\nПредназначение указывает нам путь. адАккарийское Благодетельствующее Собрание — это светоч, несущий истину и свободу другим цивилизациям. Этим мы сильны; этим мы побеждаем и процветаем!\n\nПоэтому, дорогие друзья, не поддавайтесь сомнениям. Скорбите по погибшим. Славьте павших. Но главное — оставайтесь сплоченными. Ради Покровителей. Ради адАккарийского Собрания. Ради Благодеяния!»§!"
 cstorms.225.name: "Ультиматум от «Вселсоба»"
 cstorms.225.desc: "Наши [Root.Owner.GetLinguists] тщательно изучили огромные архивы данных, обнаруженные на станции. Некоторые передачи показались им особенно любопытными, в частности записи бесед:\n\n§SильСапне Туэрти, ведущий§!\n§L«…а сейчас приглашенные эксперты, Высочайший профессор акМани Сандо и доктор воспринимаемого бытия эмЭкку Инна, обсудят недавнее вмешательство со стороны Вселенского сообщества. Уважаемый Высочайший профессор, как вы считаете, разумны ли требования „Вселсоба“?»§!\n\n§SакМани Сандо, Высочайший профессор§!\n§L«Они возмутительны! Вселенское сообщество по-прежнему открыто презирает малоразвитые цивилизации. Поэтому мне хотелось бы задать вопрос этим самозваным поборникам всегалактической морали: этично ли отказывать другим в жизненно важных технологиях, этично ли попирать идеалы, на которых зиждется наше общество — общество победителей? Каким надо быть злодеем, чтобы смотреть, как чей-то мир несется к гибели, и не стараться ее предотвратить?»§!\n\n§SильСапне Туэрти, ведущий§!\n§L«Верно подмечено! Уважаемый доктор воспринимаемого бытия, вы наверняка разделяете негодование своего коллеги по поводу вмешательства „Вселсоба“ в нашу судьбу».§!\n\n§SэмЭкку Инна, доктор воспринимаемого бытия§!\n§L«Возможно, вы удивитесь, но, несмотря на всё упорство „Вселсоба“, я считаю необходимым принять во внимание их беспоко…»§!\n\n§TНа этом моменте передача обрывается.§!"
 cstorms.225.a: "Какой категоричный народ."
 cstorms.225.a.hive: "Слишком много голосов, какой-то хаос."
 cstorms.225.a.machine: "Жизнь есть вечный спор."
 cstorms.230.name: "Святые и псионики"
 cstorms.230.desc: "Мы нашли еще одну передачу, показавшуюся нам ценной. Очевидно, перед нами драматическая постановка, однако она дает нам некоторое представление о ситуации:\n\n§SакТамиан Риван§!\n§L«К энТулле Саману ты прошлой ночью вновь ходила, верно? Неужто имя это всё еще тебе дороже, чем наша чистая и крепкая любовь?»§!\n\n§SинЭлка Утаэ§!\n§L«То вежливости лишь был визит, я уверяю. Тебе — и лишь тебе — я предана до гроба!»§!\n\n§SакТамиан Риван§!\n§L«Так говорят твои уста, но разум выдает тебя! Я чувствую, ты лжешь. Слова твои лукавы».§!\n\n§SинЭлка Утаэ§!\n§L«О нет! И ты?!»§!\n\n§SакТамиан Риван§!\n§L«И я! Всего лишь прошлой ночью осознал, что я — псионик! И чувства нежные, что я испытывал к тебе, отчаяньем мгновенно обернулись! Предательство! Коварство!»§!\n\n§SинЭлка Утаэ§!\n§L«Но как ты не поймешь! Мой разум неподвластен сердцу. Тот путь, что вижу я, — единственно разумный. О Риван! Коль мог бы ты читать, что в сердце я держу, не в мыслях!..»§!"
 cstorms.230.a: "Псионические способности? Любопытно."
 cstorms.230.b: "Какая-то бессмыслица!"
 cstorms.230.b.hive: "На удивление индивидуалистское зрелище."
 cstorms.230.b.machine: "Ох уж эти вечные драмы органиков."
 dramatic_enthusiasm: "Любители инопланетных драм"
 melodramatic_much: "Ненавистники инопланетных драм"
 cstorms.235.name: "Старая передача"
 cstorms.235.desc: "Наши [Root.Owner.GetLinguists] заодно перевели несколько новостных выпусков. Следующая передача показалась им особенно интересной:\n\n§L«Обстановка в системе Галииос близка к катастрофической. Подлые сольфанские власти устроили засаду на наши отважные Силы просвещения около пункта энИпсаль! Несмотря на это, Высочайшее руководство заявляет, что Процесс невозможно остановить. Цитата: „Подобно нашим Покровителям, мы не посмеем бросать малоразвитые цивилизации на произвол судьбы“.\n\nКроме того, до нас дошли слухи о возможном сотрудничестве между варварскими властями и представителями „Вселсоба“. Посол „Вселсоба“ отрицает переговоры межзвездного сообщества с тиранами и считает, что Высочайшее руководство нашей страны предается паранойе.\n\nОднако, несмотря на все обстоятельства, процесс просвещения сольфанской цивилизации достиг критической точки. Обернуть его вспять будет трудно, но…»§!\n\n§TК сожалению, остальной файл слишком сильно поврежден, и расшифровать его невозможно. Наши [Root.Owner.GetEngineerPlural] тем временем уже сделали копию базы данных. Мы надеемся, что со временем сможем узнать больше об этой давно забытой цивилизации.§!"
 cstorms.235.a: "Будем ждать новых открытий."
 #Event: A Site Barren and Bare
 cstorms.245.name: "Бесплодная пустошь"
 cstorms.245.desc: "После того как в системе [planet_windswept_fates.System.GetName] отгремела космическая буря, на планете [planet_windswept_fates.GetName] обнаружился регион, представляющий интерес для археологов.\n\nПредварительное сканирование выявило наличие крайне нестабильной атмосферы, порождающей обширные планетные бури. Наши [Root.Owner.GetScientistPlural] даже не догадывались, что §Y[planet_windswept_fates.GetName]§! может таить в себе останки погибшей цивилизации. Следует изучить их лучше."
 cstorms.245.a: "Приготовьтесь к высадке!"
 #Digsite: Windswept Fates
 site_adakarria_windswept_fates: "Открытые всем ветрам"
 site_adakarria_windswept_fates_intro: "Вместо того чтобы разрушить здесь все до основания, эта космическая буря помогла нам обнаружить останки инопланетной цивилизации. Атмосфера планеты крайне нестабильна, однако наземный отряд наверняка сможет узнать, какая страшная участь постигла этот народ."
 cstorms.2105.name: "Жесткие условия"
 cstorms.2105.desc: "Сразу после приземления на поверхность планеты [From.Planet.GetName] наш отряд занялся разведкой местности.\n\nПохоже, недавно прошедшая здесь космическая буря, терзавшая систему, подняла в воздух слои пыли и почвы, приоткрыв тем самым следы древней цивилизации.\n\nПервое, что поразило наших ученых, — химический состав песка: его слои, покрывавшие останки, разительно отличались по составу от окружающей почвы. Если верить результатам сканирования, эти залежи принесены сюда из пустыни, расположенной в нескольких сотнях километров от места высадки. На такое способно только по-настоящему мощное явление природы — например, особо сильная планетарная буря."
 cstorms.2105.a: "Продолжайте."
 cstorms.2110.name: "Утраченное"
 cstorms.2110.desc: "Наши [Root.Owner.GetScientistPlural] продолжают трудиться вопреки странным погодным условиям и уже добились значительного успеха. Однако чем больше проходит времени, тем больше появляется вопросов.\n\nСначала мы нашли остатки каменной кладки и уголь, который когда-то был органикой. Затем — обрывки ткани и кожи, жилеты со вставками из полимеров и, наконец, то, что осталось от самих обитателей планеты.\n\nОбнаружены десятки тел. Их высохшие органы забиты песком, а ногти стерты, словно погибшие работали руками до последнего. У каждого из них были тяжелое обмундирование и амуниция, свойственные [Root.Owner.GetPreFTLLowerPlural&pl,dat] цивилизациям, а также огнестрельное оружие. Заброшенный город оказался братской могилой.\n\nОпределить, сколько эти тела пролежали под землей, с первого взгляда невозможно: останки и снаряжение превосходно сохранились, поскольку в захоронение не проникали солнечные лучи и реагенты. Причины их гибели также пока остаются неизвестными."
 cstorms.2110.a: "Ужасная смерть."
 cstorms.2115.name: "Жестокие небеса"
 cstorms.2115.desc: "Открытия на планете [From.Planet.GetName] становятся все более мрачными. [Root.GetLeaderName] считает, что вряд ли эту местность специально отвели под массовое захоронение: погибшие инопланетяне были в хорошей физической форме. Похоже, их завалило огромной массой песка.\n\nКроме того, мы обнаружили несколько крупнокалиберных артиллерийских установок. Как ни странно, нацелены они были вглубь космоса.\n\nЗначит, гибель этого народа, скорее всего, пришла со стороны звезд."
 cstorms.2120.name: "Вечная буря"
 cstorms.2120.desc: "Все гипотезы насчет массового захоронения на планете [From.Planet.GetName], оказались тупиковыми. Единственная оставшаяся зацепка — происхождение песка, поглотившего целое войско.\n\nПроведя невероятно сложные расчеты и моделирование, мы установили, что буря, принесшая сюда песок, продолжает свирепствовать где-то вдали. На ее поиски мы снарядили небольшую экспедицию.\n\nОтряд встретила жестокая буря, чьи беспощадные ветры оставили глубокую трещину в земле. Если ответы и кроются где-то поблизости, то спускаться за ними придется под землю в самом центре бури."
 cstorms.2120.a: "Будьте крайне осторожны!"
 cstorms.2125.name: "Тело"
 cstorms.2125.desc: "Чтобы добраться до нужного пункта в целости и сохранности, пришлось приложить все возможные усилия. Однако труды оправдались: в середине кратера, окруженного свирепой бурей, мы обнаружили невероятно диковинный скелет. Возраст его соответствовал возрасту останков, обнаруженных в массовом захоронении, однако фенотип и генотип разительно отличались.\n\nНа удивление хорошо сохранившаяся униформа также была совершенно другого образца. Кроме того, судя по определенным признакам, некоторые конечности были целенаправленно удалены…\n\nЕще интереснее оказались показатели датчиков, зарегистрировавших колебания энергии вокруг и внутри тела. Мы заметили необычайную схожесть этих показателей с результатами замеров как бушующего вокруг нас шторма, так и космической бури, открывшей нам «братскую могилу».\n\nСразу возникла гипотеза: возможно, этот инопланетянин имеет какое-либо отношение к зафиксированным нами бурям? Может, он даже поспособствовал захоронению целой армии? Сама эта мысль кажется нам странной, однако сложно спорить с подтверждающими ее фактами."
 cstorms.2130.name: "Снова в прах"
 cstorms.2130.desc: "Сопоставив знаки различия на форме с информацией в базе данных, мы пришли к ошеломительному результату: погибший был гражданином адАккарийского Собрания — той самой цивилизации, которая построила станцию вещания! Впрочем, еще больше нас поразило то, что все аспекты — униформа, возраст трупа, информация из передач — складывались в единую картину. Мы пришли к выводу, что нашли ту самую планету, упоминавшуюся в сводках.\n\nВооружившись знанием адАккарийского языка, в чем нам помогли передачи с агитационной станции, [Root.GetLeaderName] успешно [Root.Leader.GetAXX::расшифровал|||fem:расшифровала] имя погибшего: §SхаТоор Гаилон§!.\n\nВ этот миг окружавшая нас буря резко усилилась. Погода на этой планете настолько непредсказуема, что оставаться здесь стало слишком опасно. Наш отряд был вынужден эвакуироваться. Нить, ведущая к разгадке тайны адАккарийского Собрания, вновь оборвалась."
 #Storm to Signal
 cstorms.2140.name: "От бури к сигналу"
 cstorms.2140.desc: "Энергетические сигналы, которые испускает тело инопланетянина, и разрушительный шторм на планете §Y[planet_windswept_fates.GetName]§!, совпадают с сигналами космической бури, открывшей нам место гибели занесенной песком армии. Сканирование выявило похожие энергетические колебания в уже изученной нами системе. Похоже, мы поймали очередные передачи адАккарийского Собрания!\n\nСледует отправить туда исследовательское судно."
 #Fleets of the Trice Damned
 site_adakkaria_fleets_of_the_thrice_damned: "Флотилии Трижды проклятых"
 site_adakkaria_fleets_of_the_thrice_damned_intro: "Под пеленой загадочных энергетических колебаний скрывалось огромное кладбище кораблей. Возможно, в этом некрополе из полимеров и стали мы найдем какие-нибудь подсказки, которые помогут понять судьбу адАккарийского Собрания."
 cstorms.2150.name: "Разорванные останки"
 cstorms.2150.desc: "Здесь нашли последнее пристанище сотни разных кораблей, от продолговатых деревянных судов до изящных кристаллических ковчегов. Многие из них схожи с кораблями, описанными в передачах и журналах на станции вещания.\n\nМы подозреваем, что здесь сошлись в бою флотилии адАккарийского Собрания и «Вселсоба» — древней общегалактической миротворческой организации.\n\nВряд ли эти корабли были уничтожены в артиллерийском бою или вышли из строя. Каждый их корпус, каждый внутренний отсек разорвала в клочья какая-то загадочная сила."
 cstorms.2155.name: "Чувство долга"
 cstorms.2155.desc: "Наши [Root.Owner.GetEngineerPlural] аккуратно извлекли данные из хранилищ на погибших кораблях. К сожалению, неповрежденной оказалась только одна запись с судна адАккарийцев:\n\n§L«Мы попали в засаду. Повторяю: мы попали в засаду. „Вселсоб“ требует прекратить вознесение примитивных рокукорцев, иначе нас всех перебьют. Прием! Если мы не отступим, нас уничтожат! Хотя бы пришлите подкрепление!»\n\n«В просьбе отказано. Ваш подвиг не будет забыт».§!"
 cstorms.2155.a: "Они погибли, чтобы исполнить долг!"
 cstorms.2160.name: "Примечательные останки"
 cstorms.2160.desc: "Пока наши [Root.Owner.GetLinguists] переводили обнаруженные передачи, мы заметили еще кое-что: в центре кладбища кораблей повисло замерзшее тело!\n\nТруп заметно иссох, однако по обрывкам униформы мы определили, что при жизни это был офицер Собрания.\n\nВокруг тела кольцом расположился космический мусор, словно попал под воздействие силы тяжести. Мы забрали останки и собираемся их проанализировать."
 cstorms.2165.name: "Голос мертвых"
 cstorms.2165.desc.intro: "Мы перевели имя погибшего, выбитое на жетоне. Этого офицера адАккарии звали §SальАтта Ландеер§!. Еще при жизни часть его конечностей была удалена хирургическим путем, как и у трупа с планеты [planet_windswept_fates.GetName]. Однако помимо этого на теле обнаружились сильные ожоги. Больше всего пострадал торс, и выздоровление, по всей видимости, было медленным и очень болезненным.\n\nНаши [Root.Owner.GetScientistPlural] пришли к неутешительному выводу: подобными зверскими методами пользуются представители [Root.Owner.GetPreFTLLowerPlural&pl,gen] народов во время допросов. Кто перед нами — ветеран боевых действий… или жертва жутких обстоятельств?"
 cstorms.2165.desc.def: "$cstorms.2165.desc.intro$\n\nЕдва мы установили природу ранений, как в бортовой аппаратуре произошел неожиданный скачок мощности. [Root.GetLeaderName] [Root.Leader.GetAXX::закричал|||fem:закричала] во весь голос.\n\nУспокоившись через какое-то время, [Root.GetLeaderName] [Root.Leader.GetAXX::объяснил|||fem:объяснила], что [Root.Leader.GetAXX::почувствовал|||fem:почувствовала] яркую вспышку света, за которой последовала невыносимая боль. Словно кто-то пытался проникнуть в разум… изнутри."
 cstorms.2165.desc.psio: "$cstorms.2165.desc.intro$\n\nЕдва мы установили природу ранений, как в бортовой аппаратуре произошел неожиданный скачок мощности. Псионики из экипажа все как один закричали.\n\nУспокоившись через какое-то время, они объяснили, что почувствовали необъяснимую ясность сознания, за которой волнами стала накатывать страшная, обжигающая ярость. [Root.GetLeaderName] утверждает, что за этой яростью скрывались другие чувства: невероятное удивление и глубокое ощущение предательства. И одна-единственная мысль: §L«Меня призвали!»§!"
 cstorms.2165.desc.psio_robot: "$cstorms.2165.desc.intro$\n\nЕдва мы установили природу ранений, как в бортовой аппаратуре произошел неожиданный скачок мощности. Наша способная единица ощутила внутренний всплеск энергии.\n\nЧерез какое-то время она сообщила, что её псионические процессоры распознали это как переполняющую ярость. [Root.GetLeaderName] утверждает, что за ней последовал эмоциональный отклик и единственная мысль: §L«Меня призвали!»§!"
 cstorms.2165.desc.gestalt: "$cstorms.2165.desc.intro$\n\nОднако открытие едва не обернулось катастрофой: тут же в базы данных нашего экипажа проникла неизвестная сила. Некоторые [controller.GetIndividualNamePlural&nom] испытали неожиданный, очень сильный скачок мощности; у других нарушилась работа оптических датчиков — те начали выдавать искаженные, хаотичные изображения. Голосовые модуляторы непроизвольно переключились на пронзительный звук громкостью более 120 децибел."
 cstorms.2165.a: "— Сигнал потерян —"
 cstorms.2170.name: "Наследие Ландеера"
 cstorms.2170.desc.def: "Как только мы установили связь с кораблем §Y[Root.GetFleetName]§!, то тут же услышали жуткие завывания экипажа. Позже, как только вновь наступила тишина, выяснилось, что неистовые крики начались после того, как на борт подняли мертвого инопланетянина — тот каким-то образом воздействовал на разум команды.\n\nИ не только на разум. Вокруг трупа закрутились поднятые в воздух мелкие предметы, мощное давление покорежило и разодрало стены отсеков.\n\n§Y[Root.GetLeaderName]§! [Root.Leader.GetAXX::успел|||fem:успела] очнуться как раз вовремя, чтобы выбросить труп в открытый космос. Благодаря этим быстрым и решительным действиям корабль успел уйти от зарождающейся космической бури. Еще чуть-чуть — и кладбище кораблей пополнилось бы новыми останками.\n\nВспоминая произошедшее, [Root.GetLeaderName] подмечает кое-что еще: на экранах управления появился удивительно подробный узор. Возможно, труп пытался установить контакт… или же бессильно кричал из загробного мира.\n\nВопросов у нас пока больше, чем ответов."
 cstorms.2170.desc.gestalt: "Мы расшифровали беспорядочные изображения, которые зафиксировали наши [controller.GetIndividualNamePlural&nom]. Материалы сложились в единую картину, изображавшую древнее орбитальное поселение. [controller.GetScientistCapital] были захвачены ужасным зрелищем: на кадрах кто-то пытал свою жертву всё более и более изощренными методами. Тело несчастного существа было покрыто ожогами, а органы запеклись.\n\nНекоторые [controller.GetIndividualNamePlural&nom] избежали аудиовизуального шума. Они зафиксировали, как вокруг трупа закрутились поднятые в воздух мелкие предметы, словно их втягивало какое-то гравитационное поле.\n\nЭта загадочная сила всё разрасталась, вскоре переборки корабля заскрипели и начали складываться под давлением. В этот момент вновь заработали защитные системы, и труп оказался выброшен в космос.\n\nВскоре в системе разразилась космическая буря. Нашему кораблю едва удалось уйти.\n\nПроизошедшее вызывает у нас немало вопросов."
 #Special Project: Assembling the Past
 cstorms.2180.name: "Сбор крупиц прошлого"
 cstorms.2180.desc: "После того, что [FromFrom.Leader.GetName] и экипаж пережили в системе §Y[planet_assembling_the_past.System.GetName]§!, наши ученые решительно настроены выяснить, какая судьба постигла адАккарийское Собрание. Опираясь на известные нам сведения, добытые на планете [planet_windswept_fates.GetName] и около кладбища кораблей, мы выяснили, что адАккарийцы застроили агитационными станциями всю галактику.\n\nКроме того, узор, образовавшийся после системного сбоя, не был случаен — нам указали направление на неизвестную ранее систему!\n\nМы разработали особый проект по ее изучению."
 project_adakkaria_tracing_history: "По следам истории"
 project_adakkaria_tracing_history_DESC: "Координаты указывают на планету в системе [planet_assembling_the_past.System.GetName]. Следует отправить туда исследовательское судно. Его экипаж установит, имеет ли эта планета какое-либо отношение к адАккарийскому Собранию."
 NAME_adSalivul: "адСаливул"
 NAME_Patriotic_Institute_of_Exalted_Benevolence: "Высочайшее Благодеяние"
 cstorms.2185.name: "Древнее орбитальное поселение"
 cstorms.2185.desc: "Поначалу мы разочаровались: планета в системе [From.solar_system.GetName] показалась нам совершенно мертвой. Магнитные поля ее были так сильны и нестабильны, что от поверхности почти ничего не осталось. Маловероятно, что здесь еще сохранилось что-либо ценное.\n\nОднако на орбите наши датчики обнаружили древнее поселение, архитектурно схожее с адАккарийской станцией вещания. Вход был надежно закрыт герметичным шлюзом, но с помощью данных, извлеченных из адАккарийских компьютеров, мы смогли сгенерировать открывающий сигнал.\n\nПохоже, станция пустует целую вечность. Неизвестно, что ждет нас внутри."
 cstorms.2185.a: "Действуйте с осторожностью."
 #The Patriotic Institute of Exalted Benevolence
 site_adakkaria_the_patriotic_institute: "Институт Высочайшего Благодеяния"
 site_adakkaria_the_patriotic_institute_intro: "Это древнее орбитальное поселение на орбите пустынной планеты когда-то возвели силами адАккарийского Собрания. Благодаря качественным строительным материалам станция сохранилась в почти первозданном виде.\n\nНастроившись на частоту передачи, мы уловили послание, которое завершалось помпезным приветствием: §L«Добро пожаловать в Патриотический институт Высочайшего Благодеяния»§!."
 cstorms.2200.name: "Изучение Благодеяния"
 cstorms.2200.desc: "За воздушным шлюзом протянулась небольшая, но разветвленная сеть туннелей. Преодолев ее, мы вышли на огромную площадь, освещенную искусственным светом. Как ни странно, архитектура поселения больше напоминала городские кварталы некоторых жилых планет, чем строгие отсеки научной станции. Здесь разместились целые жилые комплексы, торговые центры, школы, сады, парки и многое другое. Жизнь на этой станции была поистине роскошной.\n\nПри этом поселение было совершенно заброшенным. Мы не обнаружили следов присутствия органической жизни. Чем дольше мы изучали местность, тем более явно ощущалась опустелость станции и тем более мрачным казалось окружение.\n\nИскусственный свет работал с перебоями — порой поселение погружалось во тьму. Другие электронные устройства в основном функционировали штатно, однако в их работу тоже иногда проникали помехи. Однако любопытнее всего нам показалась целая сеть устройств наблюдения, установленных в квартирах, словно кто-то постоянно наблюдал за каждым жителем. Возможно, ответов станет больше, если мы найдем какой-либо пост наблюдения."
 cstorms.2205.name: "Серьезный сбой"
 cstorms.2205.desc.intro: "На тщательное изучение и картографирование города, а также на поиски центрального поста наблюдения ушло немало дней. Оказалось, пост полностью изолирован от остального поселения, и для входа нужен совсем другой код.\n\nВнутри мы обнаружили целые ряды мониторов, подключенные к системе массового наблюдения. Те из них, что еще работали, показывали станцию со всех возможных ракурсов, однако даже этим устройствам не удалось избежать сбоев."
 cstorms.2205.desc.mach: "$cstorms.2205.desc.intro$\n\nНаши единицы сообщили, что обеспокоены сбоями: нечто похожее они перенесли, когда столкнулись с мертвым адАккарийцем на древнем кладбище кораблей.\n\n$cstorms.2205.desc.outro$"
 cstorms.2205.desc.def: "$cstorms.2205.desc.intro$\n\n[Root.GetLeaderName] [Root.Leader.GetAXX::сообщил, что обеспокоен|||fem:сообщила, что обеспокоена] сбоями: нечто похожее уже произошло при изучении мертвого адАккарийца на кладбище кораблей.\n\n$cstorms.2205.desc.outro$"
 cstorms.2205.desc.outro: "Но больше всего нас встревожило увиденное на посту службы безопасности: экраны показывали предупреждение о скором самоуничтожении станции!\n\nНаши [Root.Owner.GetEngineerPlural] предположили, что выполнению команды на самоуничтожение помешали как раз постоянные сбои в работе техники. Мы быстро остановили процедуру самоуничтожения, и [Root.Owner.GetLinguists] принялись расшифровывать данные, извлекаемые из станционных компьютеров. Интересно, что отчеты из поселения перестали поступать примерно за год до того, как прекратились передачи с агитационной станции."
 cstorms.2210.name: "Высочайшие эксперименты"
 cstorms.2210.desc: "Наши [Root.Owner.GetLinguists] достаточно быстро установили, какую задачу выполняло поселение на орбите планеты [From.Planet.GetName]. Записи в журналах и разговоры как обычных граждан, так и персонала станции указывают на то, что здесь изучались способности адАккарийцев, недавно ставших псиониками. Переселиться на станцию можно было только по приглашению Высочайшего руководства Собрания, обещавшего роскошную и свободную жизнь всем желающим принять участие в экспериментальной программе.\n\nЖелающих оказалось очень много, причем, судя по отчетам службы безопасности, в основном это были ветераны-инвалиды, привлеченные обещаниями полноценного ухода, материальной поддержки и амнистии за совершенные в прошлом преступления.\n\nКроме того, в списке сотрудников станции обнаружилось знакомое имя — §SальАтта Ландеер§!, ученый и ветеран-инвалид. Именно его тело с ампутированными конечностями мы обнаружили на кладбище кораблей."
 cstorms.2210.a: "Наконец-то успех."
 cstorms.2215.name: "Слово подопытным"
 cstorms.2215.desc: "Мы расшифровали одно из последних сообщений, отправленных из поселения:\n\n§gСообщение — Дата 02100363 — Отправитель: §SсиДани Итемпеер§! — Получатель: сиЗул Итемпеер§!\n§LПривет! Я еще жив! Прости за молчание. Еще с тех пор… в поселении много странного, поэтому отправлять сообщения стало сложно. Говорят, не в этом дело, но я думаю, что он все-таки был псионически одаренным. А вот у меня никаких подвижек, с учетом всего произошедшего… Так что мне предлагают более радикальный вариант… космические бури. Я знаю, что ты скажешь об этом, но это всего один палец, да и он, возможно, еще отрастет. Но какие ощущения мне открылись, когда…\nС любовью, сиДани\nПЕРЕДАЧА§! §YЦЕНЗУРИРОВАНА (с вопросами обращайтесь к куратору)§!\n\n§gСообщение — Дата 02100365 — Отправитель: §SхаТоор Гаилон§! — Получатель: аэДаль Асдуур§!\n§LДорогая аэДаль!\nУ меня все хорошо. Я познакомился с парой других ветеранов. Мы не разговариваем. Но все понимаем. Хорошо, когда не надо разговаривать.\nСегодня я только подумал о том, чтобы поднять стакан, и он сразу же поднялся. Жаль, конечно, правой конечности, но, может, эта жизнь не так страшна, как я боялся. Я подслушал, что они хотят отправить меня… Похоже, у меня редкий талант к псионике… Я… хочу снова на задание.\nНадеюсь, буду дома ко Дню патриотов. Давай увидимся.\nЛюблю тебя. хаТоор\nПЕРЕДАЧА§! §YЦЕНЗУРИРОВАНА (с вопросами обращайтесь к куратору)§!\n\n§gСообщение — Дата 02100367 — Отправитель: §SэнРида Диреен§! — Получатель: онРида Диреен§!\n§LЯ ПОТУШИЛА ПОЖАР СИЛОЙ МЫСЛИ!!!\nДругой испытуемый отчего-то психанул и устроил пожар в столовой. Началась паника, но бежать было некуда! Я тоже ОЧЕНЬ испугалась, но потом внутри у меня что-то щелкнуло, и я просто взяла и погасила огонь!\nЯ ВСЕХ СПАСЛА! Ты там скажи старшим, что я все-таки не безнадежна!\nПЕРЕДАЧА§! §RЗАБЛОКИРОВАНА (НЕМЕДЛЕННО ОБРАТИТЕСЬ К КУРАТОРУ)§!\n\nЗаметка ко второй передаче: тело §SхаТоора Гаилона§! обнаружено в ходе археологической экспедиции к [Root.Owner.GetPreFTLLower&dat] миру."
 cstorms.2215.a: "Отлично!"
 cstorms.2220.name: "Последствия сбоя"
 cstorms.2220.desc: "Эти сообщения появились за несколько дней до эвакуации орбитального поселения:\n\n§gСообщение — Дата 02100359 — Отправитель: Верховный Врач — Получатель: Великий Адмирал§!\n§LВаше последнее сообщение вызвало здесь немало беспокойства. Не могли бы вы объяснить, почему после многих лет безоговорочной поддержки теперь вы грозитесь нас закрыть?\nПЕРЕДАЧА§! §GОТПРАВЛЕНА§!\n\n§gСообщение — Дата 02100360 — Отправитель: Великий Адмирал — Получатель: Верховный Врач§!\n§LВы издеваетесь? Уже который месяц я шлю вам предупреждения, но, видимо, из-за вращения на орбите непредсказуемого мира у вас очень вовремя развилась амнезия. Вы ведь знаете, что «Вселсоб» угрожает самому нашему существованию? Война набирает обороты, и я больше не могу выделять огромные ресурсы, чтобы ваши подопытные с утра до ночи смотрели на скот. Мне нужны конкретные, практические результаты. НЕМЕДЛЕННО.\nПЕРЕДАЧА§! §GПОЛУЧЕНА§!\n\n§gСообщение — Дата 02100360 — Отправитель: Верховный Врач — Получатель: Великий Адмирал§!\n§LПросим прощения, но мы не получали ваших предыдущих сообщений. На станции постоянно происходят технические сбои, должно быть, они повредили коммуникации. В любом случае нам нужно больше времени. У нас налажены процессы, протоколы. Мы не можем всё так просто взять и бросить!\nПЕРЕДАЧА§! §GОТПРАВЛЕНА§!\n\n§gСообщение — Дата 02100361 — Отправитель: Великий Адмирал — Получатель: Верховный Врач§!\n§LУ вас одна неделя. Не уложитесь — немедленно начнем сворачивать проект. Никаких отговорок и новых условий. НУЖЕН РЕЗУЛЬТАТ!\nПЕРЕДАЧА§! §GПОЛУЧЕНА§!\n\n§gСообщение — Дата 02100368 — Отправитель: Верховный Врач — Получатель: Великий Адмирал§!\n§LПрикладываю к этому сообщению отчет о наших последних успехах. Эти видео демонстрируют, что наши псионически одаренные испытуемые способны управлять космическими бурями. У этого открытия огромные военные перспективы. Со временем мы можем усилить их псионическую экспрессию, не подвергая их физическим и душевным травмам.\nПЕРЕДАЧА§! §RНЕ ОТПРАВЛЕНА (Причина: нарушение передающей матрицы)§!"
 cstorms.2220.a: "Последнее сообщение так и не отправилось."
 cstorms.2225.name: "Незавершенная судьба"
 cstorms.2225.desc: "Это последнее восстановленное сообщение:§L\n\nДорогие коллеги!\n\nОбращаюсь к вам с печальной новостью. Высочайшее командование постановило прекратить всю деятельность Патриотического института Высочайшего Благодеяния.\n\nНе стоит рассматривать это решение как отрицательную оценку лично вас или ваших заслуг в наших стенах. Для меня было честью трудиться с каждым из вас. Я знаю, вас терзают многочисленные вопросы, но если в двух словах, ожидания Высочайшего командования не совпали с нашими научными целями.\n\nЧто касается наших граждан — Высочайшее командование пригласило их присоединиться к программе Патриотического института Торжества на адСуле. Ниже приведен полный список сотрудников. Отразите это в своих отчетах.\n\nЧто касается остальных… Увы, вследствие тайного характера наших исследований их участники не смогут вернуться к полноценной жизни в обществе. Высочайшее командование пообещало направить к нам особый отряд, чтобы позаботиться о них. Самостоятельно вам этим заниматься не придется, поэтому можно считать, что нам повезло. Их родственникам будет выплачена полная компенсация.\n\nВсего наилучшего,\nВерховный Врач, §!§SальАтта Ландеер§!\n\nПриложенный список частично поврежден, но в нём упомянуты имена подопытных §SхаТоора Галона§! и §SэнРиды Диреен§!. Видимо, их перевели в столицу адАккарийского Собрания адСул. Координаты этого мира теперь в наших руках."
 cstorms.2225.a: "Отправляйтесь к родному миру Собрания."
 #Special Project: Eye of the Convention / The Void Calls
 cstorms.2240.name: "Око Собрания"
 cstorms.2240.desc: "По полученным координатам обнаружена система, которая раньше была скрыта от наших сканеров. Пора наведаться в адАккарийское Собрание, пока нас кто-нибудь не опередил.\n\nРазработан новый особый проект."
 cstorms.2245.name: "Бездна зовет"
 cstorms.2245.desc: "Вскоре после того, как мы покинули орбитальное поселение, [event_target:leader_patriotic_institute.GetName] [event_target:leader_patriotic_institute.GetAXX::принял|||fem:приняла] внезапное и необъяснимое решение. Будто под воздействием внешней силы, [event_target:leader_patriotic_institute.GetSheHe] [event_target:leader_patriotic_institute.GetAXX::приказал|||fem:приказала] открыть канал связи на частоте, которую обычно связывают с массовыми псионическими происшествиями и мимолетными космическими бурями.\n\nКанал был направлен по координатам родной системы адАккарийского Собрания. Ответ на наш сигнал пришел практически мгновенно."
 cstorms.2245.desc.gestalt: "Вскоре после того, как мы покинули орбитальное поселение, наше коллективное сознание одолели необычные вибрации, словно нечто пыталось связаться с нами на огромном расстоянии. Координаты источника этого сигнала совпадали с координатами родной системы адАккарийского Собрания, а его частоту обычно связывают с массовыми псионическими происшествиями и мимолетными космическими бурями.\n\nРеакция на наш ответный сигнал пришла практически мгновенно."
 cstorms.2250.name: "Зов бури"
 cstorms.2250.desc: "Мы сделали все возможное, но добраться до адСула оказалось куда сложнее, чем мы ожидали. Вся система поглощена космической бурей неизвестного состава, из-за чего подобраться к планете невозможно.\n\nЧто же до самой бури, то, кажется, она… зовет нас?"
 #The Storm
 cstorms.2260.name: "Буря"
 cstorms.2260.desc: "СКАЖИТЕ НАШИ ИМЕНА\n\nСКАЖИТЕ НАШИ ИМЕНА\n\nСКАЖИТЕ | НАШИ | ИМЕНА"
 cstorms.2260.a: "Кто ты?"
 cstorms.2260.b: "Что здесь случилось?"
 cstorms.2260.c: "Какие имена?"
 cstorms.2260.a.resp: "БЫТЬ | НЕ-БЫТЬ | РАЗ-БЫТЬ\n\nРЕВУЩАЯ БУРЯ И ЯРОСТЬ\n\nБОЛЬ И ГНЕВ И ГОРЕ И СТРАХ\n\nСКАЖИТЕ НАШИ ИМЕНА"
 cstorms.2260.b.resp: "ПРОВОЦИРУЙ | ИНДУЦИРУЙ | ПРОДУЦИРУЙ\n\nСКАЖИТЕ НАШИ ИМЕНА"
 cstorms.2265.name: "$cstorms.2260.name$"
 cstorms.2265.desc: "МЫ НЕ МОЖЕМ ДУМАТЬ | ГОВОРИТЬ | ЖЕЛАТЬ | МЕЧТАТЬ\n\nНАШИ ИМЕНА ИНДУЦИРУЮТ НАС | ВЕРНИТЕ НАМ НАС | НАС ЗАБЫЛИ\n\nСКАЖИТЕ НАШИ ИМЕНА"
 cstorms.2265.c.resp: "$cstorms.2265.desc$"
 cstorms.2265.d: "Где найти ваши имена?"
 cstorms.2265.e: "Покажите нам это торжество."
 cstorms.2270.name: "$cstorms.2260.name$"
 cstorms.2270.desc: "ЭТО ТОРЖЕСТВО\n\nЭТО ТОРЖЕСТВО\n\nБОЛЬ | ГНЕВ | ГОРЕ | СТРАХ\n\nТОРЖЕСТВО\n\nСКАЖИТЕ НАШИ ИМЕНА"
 NAME_adSul: "адСул"
 project_adakkaria_benevolent_grounds: "Добродетельные земли"
 project_adakkaria_benevolent_grounds_DESC: "Мы обнаружили координаты родной планеты адАккарийского Собрания.\n\nИсследовав систему и планету, мы можем наконец раскрыть судьбу адАккарийской цивилизации."
 #Celebration
 site_adakkaria_celebration: "Торжество"
 site_adakkaria_celebration_intro: "После переговоров с космической бурей нам открылся небольшой участок адСула. Посреди расступающихся туч стоял громадный комплекс. Его бросили, но удивительным образом за тысячелетия он не пострадал. Результаты сканирования показали, что внутри него находится органический материал.\n\nПеред гигантским зданием вывешены многочисленные транспаранты, на каждом из которых написано: «Пришло время Торжества»."
 cstorms.2285.name: "Принудительное небытие"
 cstorms.2285.desc: "В пустых залах Торжества мы не нашли ничего, кроме многовековой пыли. От некогда богатой и грозной империи остались лишь плакаты, прославляющие доблесть адАккарийского Собрания.\n\nОднако усилия лингвистов уже оправдали себя: мы легко смогли преодолеть систему безопасности, и мейнфрейм комплекса быстро раскрыл свои секреты.\n\nИзвлеченные нами журналы пестрят записями об активности вплоть до последней передачи с агитационной станции.\n\nВ тот день адАккарийское Благодетельствующее Собрание просто прекратило свое существование."
 cstorms.2290.name: "Нисхождение к проклятым"
 cstorms.2290.desc: "Испытывая одновременно страх и любопытство, мы начали спускаться к подземным уровням комплекса. Здесь нам открылась разветвленная, сложно устроенная сеть лабораторий. Отряд разделился на две группы: одна отправилась изучать лаборатории, чтобы выяснить назначение Торжества, а вторая продолжила спуск.\n\nРезультаты сканирования указывали на наличие органического материала, и вскоре нам стало ясно, почему. Нижние этажи Торжества были целиком отведены под наблюдательные камеры. Внутри этих тесных помещений до сих пор находились мумифицированные останки адАккарийских граждан. Цифровой интерфейс рядом с каждой камерой отображал имя обитателя, этап испытаний, которым он подвергался, и заметки наблюдателей.\n\nТем временем мы обнаружили следующее сообщение:\n§L«Наш опытный запуск в системе Галииос обернулся полной катастрофой. Первоначально ввод в действие подопытного по имени §SхаТоор Гаилон§! шел по плану. Как только мы столкнулись с варварскими силами cольфанов, подопытный потерял рассудок. Буря смела примитивные вражеские армии, но тяжелый урон получили и наши войска.\n\nНельзя забывать, что прежде всего у этих подопытных подлая и нездоровая натура. Чем скорее будет запущен призыватель, тем лучше.§!"
 cstorms.2290.a: "Что они здесь делают?"
 cstorms.2290.a.gen: "Как много смерти, это так воодушевляет."
 cstorms.2295.name: "Своего рода Торжество"
 cstorms.2295.desc.start.authgen: "адАккарийское Собрание проводило здесь любопытнейшие эксперименты. Всем заключенным назначались этапы, и по мере смены этапов ужесточались испытания, которым они подвергались. Достойны внимания некоторые особо изобретательные методы: запуск первоначальной псионической подготовки тела при помощи огня и электричества, активация зарождающихся способностей и использование альтернативных органов чувств за счет удаления жизненно важных органов, а также применение психотропных препаратов для введения объекта в предсмертное состояние.\n\nБез сомнений, здесь есть откуда почерпнуть вдохновение. Эти эксперты шли к близкой нам цели — адАккарийскому господству над галактикой.\n\nИ тем не менее из отчетов следует, что погибли объекты не в результате экспериментов. Подобно §SхаТоору Гаилону§!, многие из них, судя по всему, просто сдались."
 cstorms.2295.desc.start.default: "Ужас и непонимание от изучения останков жертв были колоссальными. Однако не меньшим было и наше стремление понять масштабы и цель экспериментов Собрания.\n\nБеспристрастно и хладнокровно адАккарийские ученые записывали все, что делали со своими жертвами. Каждому подопытному назначался этап, а по мере смены этапов росла и жестокость экспериментов. Огонь, электричество, нанесение увечий, ограничение чувств и питания — они не гнушались никакими пытками. Все ради славной цели — адАккарийского господства в галактике. И все же в отчетах сказано, что погибли подопытные не в результате этих чудовищных пыток. Подобно §SхаТоору Гаилону§!, многие из них, судя по всему, просто сдались."
 cstorms.2295.desc.end.default: "Вскоре после наших наблюдений [Root.GetLeaderName] [Leader.GetAXX::упал|||fem:упала] навзничь. Из [Leader.GetAXX::его|||fem:ее] страдальческих воплей мы поняли, словно что-то разрывает [Leader.GetAXX::ему|||fem:ей] разум!\n\nСейчас [Root.GetLeaderName] в стабильном состоянии, но судя по всему, какая-то сущность попыталась внедрить [Leader.GetAXX::ему|||fem:ей] в сознание некое невероятное видение. [Root.GetLeaderName] хочет попробовать еще раз в надежде, что в конце концов [Leader.GetAXX::он|||fem:она] добьется важного открытия."
 cstorms.2295.desc.end.psionic: "Глядя на эти тела, [Root.GetLeaderName] [Leader.GetAXX::начал|||fem:начала] слышать странный шепот, бестелесный голос, полный тоски:\n§L«Мы были верны! Мы восхваляли Собрание, верили в его дело.\nБури звали нас. Они поглощали нас, желали нас!\nМы делали то, что они просили. Мы были талантливы и упорны!\nОни зовут нас злодеями, зовут нас предателями, убивают наших друзей!\n\nЭто должно было быть Торжество!»§!\n\nШепот привел нас к коридору с табличкой «Последний этап». Однако более сложные системы безопасности не пустили нас дальше."
 cstorms.2295.desc.end.psionic_individual_robot: "Анализируя эти тела, [Root.GetLeaderName] [Leader.GetAXX::засёк|||fem:засекла] осмысленное псионическое сообщение:\n§L«Мы были верны! Мы восхваляли Собрание, верили в его дело.\nБури звали нас. Они поглощали нас, желали нас!\nМы делали то, что они просили. Мы были талантливы и упорны!\nОни зовут нас злодеями, зовут нас предателями, убивают наших друзей!\n\nЭто должно было быть Торжество!»§!\n\nСообщение привело нас к коридору с табличкой «Последний этап». Однако более сложные системы безопасности не пустили нас дальше."
 cstorms.2295.desc.end.psionic_gestalt: "Осматривая эти тела, мы услышали новый голос, пронёсшийся по коллективу — [Root.GetLeaderName] [Leader.GetAXX::стал его посредником|||fem:стала его посредницей]:\n§L«Мы были верны! Мы восхваляли Собрание, верили в его дело.\nБури звали нас. Они поглощали нас, желали нас!\nМы делали то, что они просили. Мы были талантливы и упорны!\nОни зовут нас злодеями, зовут нас предателями, убивают наших друзей!\n\nЭто должно было быть Торжество!»§!\n\nГолос привел нас к коридору с табличкой «Последний этап». Однако более сложные системы безопасности не пустили нас дальше."
 cstorms.2295.desc.end.gestalt: "Наши [controller.GetIndividualNamePlural&nom] всё чаще начали испытывать когнитивные искажения, пробуждавшие в них чужие мысли. Из этих мыслей они узнали, что подопытные в Институте общались между собой нефизическим способом, путем практически мгновенного обмена знаниями, сродни примитивному коллективному разуму.\n\nРасшифровать конкретные формулировки мы не смогли, но цель общения была ясна: внутри Торжества назревало восстание."
