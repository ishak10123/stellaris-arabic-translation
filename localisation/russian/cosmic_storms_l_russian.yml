 #Storm Visible Events
 MESSAGE_COSMIC_STORM_SPOTTED_DESC: "Сканеры зафиксировали космическую бурю и определили ее тип: $TYPE|Y$. Мы назвали ее «$NAME|Y$».\n\n"
 MESSAGE_COSMIC_STORM_SPOTTED_EVENT_CONFIRM: "Интересно."
 MESSAGE_STORM_INTRO: "Эта буря вызовет разрушительные последствия в колониях и затруднит экстренные сверхсветовые маневры для флотилий. Настоятельно рекомендуем заранее принять меры.\n\n"
 MESSAGE_ELECTRIC_STORM_COSMIC_STORM_SPOTTED_DESC: "$MESSAGE_COSMIC_STORM_SPOTTED_DESC$$MESSAGE_STORM_INTRO$Экстремальные электрические заряды, которые несет с собой буря, создадут угрозу для щитов наших флотилий. Однако также ожидается, что избыточная энергия внутри бури значительно повысит производительность колоний и скорость кораблей."
 MESSAGE_SOLAR_STORM_COSMIC_STORM_SPOTTED_DESC: "$MESSAGE_COSMIC_STORM_SPOTTED_DESC$$MESSAGE_STORM_INTRO$Из-за интенсивного излучения попавшие в эту бурю корабли будут видны всем, кто ее засек и просканировал. И хотя это создает некоторые риски для безопасности, наши станции в таких условиях будут работать гораздо эффективнее."
 MESSAGE_CELESTIAL_STORM_COSMIC_STORM_SPOTTED_DESC: "$MESSAGE_COSMIC_STORM_SPOTTED_DESC$$MESSAGE_STORM_INTRO$Такая буря перегрузит наши сенсоры, из-за чего мы не сможем обнаруживать флотилии внутри затронутых ею систем, а также замедлит космические перелеты. Но несмотря на риски, эффекты бури можно будет обернуть себе на пользу и повысить продуктивность некоторых производств, пока она не утихнет."
 MESSAGE_NEXUS_STORM_COSMIC_STORM_SPOTTED_DESC: "$MESSAGE_COSMIC_STORM_SPOTTED_DESC$$MESSAGE_STORM_INTRO$Такая буря представляет существенную угрозу для наших колоний, флотилий и станций. Пока она не утихнет, мы будем нести немалый ущерб."
 MESSAGE_SHROUD_STORM_COSMIC_STORM_SPOTTED_DESC: "$MESSAGE_COSMIC_STORM_SPOTTED_DESC$$MESSAGE_STORM_INTRO$Высокая концентрация псионической энергии внутри этой бури заметно подорвет стабильность колоний, зато улучшит маневренность наших флотилий."
 MESSAGE_SHROUD_STORM_COSMIC_STORM_SPOTTED_SHROUD_BREACHED_DESC: "$MESSAGE_COSMIC_STORM_SPOTTED_DESC$$MESSAGE_STORM_INTRO$Высокая концентрация псионической энергии внутри этой бури заметно подорвет стабильность колоний, но понимание Покрова позволит нам повысить эффективность флотилий и телепатов.\n\nПокров бурлит… Мы должны быть готовы ко всему."
 MESSAGE_GRAVITY_STORM_COSMIC_STORM_SPOTTED_DESC: "$MESSAGE_COSMIC_STORM_SPOTTED_DESC$$MESSAGE_STORM_INTRO$Сильные гравитационные возмущения, вызванные этой бурей, затруднят действия флотилий, и чем больше корабли, тем большему риску они будут подвергаться.\n\nТем не менее наши колонии смогут обернуть эти экстремальные условия себе на пользу, повысив эффективность ряда производств."
 MESSAGE_MAGNETIC_STORM_COSMIC_STORM_SPOTTED_DESC: "$MESSAGE_COSMIC_STORM_SPOTTED_DESC$$MESSAGE_STORM_INTRO$Экстремальные магнитные силы этой бури внесут помехи в работу наших кораблей и систем технического обслуживания сооружений.\n\nИ всё же магнитные возмущения, вызванные бурей, оказались неожиданно благоприятны для наших передовых металлургических технологий. В результате на время этого галактического события у нас должны снизиться затраты на деятельность металлургов."
 MESSAGE_PARTICLE_STORM_COSMIC_STORM_SPOTTED_DESC: "$MESSAGE_COSMIC_STORM_SPOTTED_DESC$$MESSAGE_STORM_INTRO$Высокая плотность частиц в этой буре окажет разрушительное воздействие на корабли и станции, полностью лишив их возможности восстанавливать щиты. Направляющимся в бурю кораблям следует подготовиться к крайне враждебным условиям."
