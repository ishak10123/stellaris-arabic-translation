 ### Green Skies
 site_green_skies: "Зеленое небо"
 site_green_skies_intro: "Наши сканеры приняли несколько любопытных сигналов, исходящих из этого региона. Судя по их природе, весьма вероятно, что на месте источника мы обнаружим остатки древней цивилизации."
 cstorms.1400.name: "Удивительный коллаж"
 cstorms.1400.desc: "Рядом с нашим лагерем мы обнаружили крайне необычные городские развалины.\n\nУ них знакомая архитектура: так выглядят города известных нам цивилизаций… в том числе и нашей!\n\nОднако вещественный состав руин схож с составом строительных материалов, которые мы используем для возведения лагерей при колонизации. Это необычно, потому что запас прочности таких материалов не составляет и нескольких десятилетий. Руины же, если верить показателям сканеров, во много раз старше.\n\nВряд ли их оставила после себя какая-то загадочная раса предтеч, но аппаратура показывает, что ошибки быть не может. В чем же тут дело?"
 cstorms.1405.name: "Проблематичная погода"
 cstorms.1405.desc: "Следуя за сигналами, мы постепенно добрались до дорожки, ведущей к нижним уровням разрушенного города. Обычно в таких случаях рядом находится подземная транспортная сеть или бункеры, однако все, что нашли мы, — это небольшая череда пещер. До нас тут явно кто-то побывал: мы обнаружили обрывки тканей, полимерные контейнеры и даже органические отходы.\n\nВскоре появился еще один повод для волнения: [Root.GetLeaderName] [Root.GetAXX::сообщил|||fem:сообщила], что небо над поверхностью позеленело. Еще немного — и [Fromfrom.getName] окажется в центре космической бури. Мы же пока продолжаем путь к источнику сигналов."
 cstorms.1410.name: "Ошибка"
 cstorms.1410.desc: "Наша экспедиция несколько замедлилась — путь ей перегородили искореженные железные двери. С некоторыми усилиями преодолев это препятствие, мы прошли дальше. За дверями обнаружился примитивный склад.\n\nЕго полки были забиты бесхозной техникой, а вдоль стен аккуратно выстроились коробки с символикой известных корпораций. Здесь же находился и источник сигнала: компьютерный транспондер, отчасти аналогичный нашим.\n\nПосле внимательного изучения базы данных этого устройства наши [Root.Owner.GetEngineerPlural] пришли к неожиданному выводу: кто-то специально сделал сигнал предельно загадочным и непонятным, замаскировав его под характерные сигналы сразу нескольких цивилизаций.\n\nБольше того, в коробках мы обнаружили наборы для создания руин, которыми покрыта поверхность планеты.\n\nМы связались с лагерем, чтобы сообщить о результатах, однако разразившаяся космическая буря прервала связь. Последнее, что [Root.GetAXX::успел|||fem:успела] проговорить по связи [Root.GetLeaderName], — несколько отрывистых приказов: похоже, на лагерь напали!"
 cstorms.1410.a: "Готовьтесь к бою!"
 cstorms.1415.name: "Пираты!"
 cstorms.1415.desc: "Оказалось, что [Fromfrom.getName] — пристанище для целого пиратского флота, который маскировался под космическую бурю! Эти разбойники напали на наш лагерь, а заодно попросили передать такое наглое сообщение:\n\n§L«Дорогие болваны!\n\nСпасибо, что решили посетить наш укромный уголок.\n\nРазве не любопытно, как разумные, казалось бы, существа тут же теряют голову, едва узнав, что где-то есть древние артефакты и загадочные реликвии? Должно быть, вы надеялись найти здесь оружие против могучего врага? Или узнать, как строить флотилии, способные затмить солнце? А может, просто хотели угодить своему народу? Какая прелесть.\n\nНе обижайтесь, вы не первые и не последние. Благодаря таким, как вы, мы и кормимся.\n\nЗа скромную сумму в 2000 энергокредитов мы с радостью вам всех вернем.\n\nА если откажетесь — кто знает, какая беда ждет слабо вооруженных пленников планеты…\n\nТак что сделайте правильный выбор».§!\n\nВ этих пещерах нам пока ничего не грозит, но надолго ли? Пойдем ли мы навстречу вымогателям?"
 cstorms.1415.a: "Мы заплатим."
 cstorms.1415.b: "Передайте им, чтобы они провалились!"
 cstorms.1415.b.tt: "[Root.GetLeaderName] у них в заложниках."
 cstorms.1416.name: "Отпор"
 cstorms.1416.desc: "Мы получили новое сообщение:\n\n§L«Очень жаль. Будь у нас эти средства, мы бы здорово повеселились.\n\nБедолагам мы сообщим, что вы посчитали их жизни недостойными спасения. Может, ими заинтересуется какой-нибудь залетный рабовладелец или крайне маниакальный ассимилятор. Говорят, лоботомия сейчас очень популярна.\n\nКонец связи».§!\n\nМы забаррикадировались, построив укрепления из всего, что было под рукой. На некоторое время припасов здесь хватит. Однако рано или поздно пираты пробьются через нашу оборону!"
 cstorms.1420.name: "Второй раз не обманете"
 cstorms.1420.desc: "Пираты не смогли подтвердить свои самоуверенные слова делом. Почти мгновенно остатки их флота превратились в космическую пыль.\n\nЧерез какое-то время мы снова вышли на связь с экипажем, оставшимся на поверхности. Они шокированы, но целы и здоровы.\n\nНикаких секретов древних цивилизаций мы не открыли, однако на этом негативном опыте руководителя экспедиции поняли, что впредь нужно быть бдительнее и тщательно оценивать риски."
 cstorms.1420.a: "Пусть это станет нам уроком."
 cstorms.1420.b: "Этот руководитель нас больше не подведет."
 cstorms.1425.name: "Приятно иметь с вами дело"
 cstorms.1425.desc: "Мы получили ответное сообщение:\n\n§L«Прекрасный выбор, если так можно выразиться!\n\nВаш вклад в фонд поддержки обездоленных предпринимателей, нуждающихся в отпуске на планете-курорте, поступил к нам на счет.\n\nВскоре ваш руководитель и члены его экипажа вновь окажутся в вашем распоряжении.\n\nНе забудьте порекомендовать нас своим торговым партнерам».§!\n\nЧерез какое-то время мы снова вышли на связь с экипажем, оставшимся на поверхности. Они шокированы, но целы и здоровы.\n\nНикаких секретов древних цивилизаций мы не открыли, однако на этом негативном опыте руководителя экспедиции поняли, что впредь нужно быть бдительнее и тщательно оценивать риски."
 cstorms.1425.a: "$cstorms.1420.a$"
 cstorms.1425.b: "$cstorms.1420.b$"
