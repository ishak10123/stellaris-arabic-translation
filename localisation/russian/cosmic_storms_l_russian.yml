 astrometeorologist_hive: "$job_astrometeorologist_hive$"
 job_astrometeorologist_hive: "Трутень-$job_astrometeorologist$"
 job_astrometeorologist_hive_plural: "Трутни-астрометеорологи"
 job_astrometeorologist_hive_desc: "Эти исследовательские единицы фиксируют эффекты космических бурь и вносят их в каталоги."
 job_astrometeorologist_hive_effect_desc: "$job_astrometeorologist_hive_plural_with_icon$ превращают $r_minerals$ в $r_research$\n\nПроизводительность повышается, если в системе есть §Yфактор окружающей среды§!"
 job_astrometeorologist_hive_with_icon: "£job_astrometeorologist£ $job_astrometeorologist_hive$"
 job_astrometeorologist_hive_plural_with_icon: "£job_astrometeorologist_hive£ $job_astrometeorologist_hive_plural$"
 physics_brain_drone_is_astrometeorologist_tt: "\n£job_brain_drone_physicist£ $job_brain_drone_physicist$ заменяются на £job_astrometeorologist_hive£ трутней-астрометеорологов.\n\n§Y$job_astrometeorologist_hive_with_icon$§! производят больше ресурсов, когда в системе активен §Yфактор окружающей среды§!."
 astrometeorologist_machine: "$job_astrometeorologist_machine$"
 job_astrometeorologist_machine: "Астрометеорологический модуль"
 job_astrometeorologist_machine_plural: "Астрометеорологические модули"
 job_astrometeorologist_machine_desc: "Эти исследовательские модули тщательно описывают все происходящее в космосе, чтобы расширить познания."
 job_astrometeorologist_machine_effect_desc: "$job_astrometeorologist_machine_plural_with_icon$ превращают $r_energy$ в $r_research$\n\nПроизводительность повышается, если в системе есть §Yфактор окружающей среды§!"
 job_astrometeorologist_machine_with_icon: "£job_astrometeorologist_machine£ $job_astrometeorologist_machine$"
 job_astrometeorologist_machine_plural_with_icon: "£job_astrometeorologist_machine£ $job_astrometeorologist_machine_plural$"
 physics_calculator_is_astrometeorologist_tt: "\n£job_calculator_physicist£ $job_calculator_physicist_plural$ заменяются на £job_astrometeorologist_machine£ астрометеорологические модули.\n\n§Y$job_astrometeorologist_machine_with_icon$§! производят больше ресурсов, когда в системе активен §Yфактор окружающей среды§!."
 storm_dancer: "$job_storm_dancer$"
 job_storm_dancer: "Буревой танцор"
 job_storm_dancer_plural: "Буревые танцоры"
 job_storm_dancer_desc: "$job_storm_dancer$ не просто развлекает публику, он воплощает саму природу бури."
 job_storm_dancer_effect_desc: "[entertainer.GetIcon] [entertainer.GetNamePlural] превращают £consumer_goods£ §Yтовары массового спроса§! в £unity£ §Yединство§! и £mod_planet_amenities_add£ §Yблага§!"
 job_storm_dancer_with_icon: "£job_storm_dancer£ $job_storm_dancer$"
 job_storm_dancer_plural_with_icon: "£job_storm_dancer£ $job_storm_dancer_plural$"
 storm_duelist: "$job_storm_duelist$"
 job_storm_duelist: "Буревой дуэлянт"
 job_storm_duelist_plural: "Буревые дуэлянты"
 job_storm_duelist_desc: "На аренах для сражений боевые искусства тесно переплетаются с обрядами. Буревые дуэлянты воплощают собой ярость бури — она прослеживается в каждом беспощадном, будоражащем ударе."
 job_storm_duelist_effect_desc: "[entertainer.GetIcon] [entertainer.GetNamePlural] превращают £consumer_goods£ §Yтовары массового спроса§! в £unity£ §Yединство§!, £mod_planet_amenities_add£ §Yблага§! и £mod_country_naval_cap_add£ §Yвместимость флотилии§!"
 job_storm_duelist_with_icon: "£job_storm_duelist£ $job_storm_duelist$"
 job_storm_duelist_plural_with_icon: "£job_storm_duelist£ $job_storm_duelist_plural$"
 reenactor: "$job_reenactor$"
 job_reenactor: "Исторический реконструктор"
 job_reenactor_plural: "Исторические реконструкторы"
