 #Tutorial Localisation
 cstorms_tutorial.a: "Понятно."
 cstorms_tutorial.1.name: "Обучение: управление бурями"
 cstorms_tutorial.1.desc: "Мы можем §Sуправлять§! §Sтраекторией§! §Yкосмической бури§! в своих целях. Бурю можно или §Sотвернуть§! от наших систем, или §Sпривлечь§! для использования ее полезных эффектов."
 TUTORIAL_STORM_FORECAST_MAP_MODE_TITLE: "Обучение: прогноз погоды"
 TUTORIAL_STORM_FORECAST_MAP_MODE_DESC: "Этот режим карты показывает все §Sкосмические бури§! в галактике с информацией об их эффектах.\n\n£storm_forecast_map£\n\nЧтобы перейти к режиму метеопрогноза, щелкните по его значку в правом нижнем углу.\n\nРазвитые технологии помогут улучшить этот режим карты, что даст возможность не только точнее определить место и направление §Sкосмических бурь§!, но и предугадать их тип."
 concept_weather_forecasting_mode: "Режим метеопрогноза"
 concept_weather_forecasting_mode_desc: "$TUTORIAL_STORM_FORECAST_MAP_MODE_DESC$"
 TUTORIAL_STORM_PROTECTION_TITLE: "Обучение: космические бури"
 TUTORIAL_STORM_PROTECTION_DESC: "§SКосмические бури§! — это грозные силы природы. Они могут оказывать разрушительное влияние на флотилии, экономику и даже население. Но вместе с тем они открывают и большие возможности.\n\nЕсли изучить §Sтехнологию бурь§!, мы сможем возводить строения и пользоваться технологиями, сильно §Sснижающими§! отрицательные §Sэффекты§! бурь. §SДальнейшие исследования§! даже позволят нам извлекать из бурь §Sпользу§!."
