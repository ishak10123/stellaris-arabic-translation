 ### Hold the Line
 site_hold_the_line: "Не кладите трубку"
 site_hold_the_line_intro: "Прошедшая космическая буря преподнесла нам неожиданный подарок в виде орбитального комплекса, который оторвался от какого-то старого космического поселения. Если проникнуть внутрь, возможно, нам удастся его запустить."
 cstorms.1275.name: "Непонятно, но очень интересно"
 cstorms.1275.desc: "Несмотря на долгий путь по межзвездным просторам, орбитальный комплекс почти не пострадал. Жилые и коммерческие помещения находятся почти в идеальном состоянии. От предыдущих обитателей не осталось и следа, даже пылинки, словно здесь никого никогда не было.\n\nВ центральном пункте управления мы обнаружили загадочную систему ввода: шкалы не подписаны, рычаги переключены как попало, десятки кнопок переливаются всеми цветами радуги со случайными, как нам показалось, интервалами. К счастью, через какое-то время мы нашли руководство. Как только мы его переведем, не останется сомнений, что работу комплекса можно восстановить."
 cstorms.1280.name: "Ручное управление"
 cstorms.1280.desc: "К сожалению, мы несколько поторопились с оптимистичными оценками. Руководство оказалось таким же непонятным, как и сама система управления. Половина страниц просто отсутствует, а графические инструкции явно рассчитаны на тех, кто хорошо знаком с этой знаковой системой. Сохранившаяся половина целиком написана малопонятными иероглифами.\n\nНа последней странице приведена некая частота связи, подписанная как «служба поддержки» в переводе на наш язык. Сейчас мы попробуем ее вызвать."
 cstorms.1285.name: "Ваш звонок очень важен для нас"
 cstorms.1285.desc: "Перейдя на указанную частоту, мы связались с компьютером технической поддержки в коммерческой организации «Скайгарден».\n\nПроявив формальное дружелюбие, ИИ на той стороне провода поблагодарил нас за обращение и поинтересовался, чем может помочь. На выбор нам предложили, помимо прочего, следующие варианты: «ответы на вопросы о подписке», «информация о новой линейке умных защитных устройств» и «подробности о корпоративных программах социальной ответственности».\n\nДальше, впрочем, стало хуже: робот начал предлагать нам услуги, не имеющие никакого отношения к предыдущим темам. Несколько раз наши [Root.Owner.GetEngineerPlural] были вынуждены ждать ответа, а затем вновь выходить на связь, поскольку ИИ сбрасывал звонок. Очевидно, робот сохранился не так же хорошо, как станция.\n\nТем не менее, мы пока не собираемся сдаваться. Из этого лабиринта наверняка есть выход."
 cstorms.1290.name: "Десятки вариантов"
 cstorms.1290.desc: "Наши [Root.Owner.GetEngineerPlural] нашли закономерность: безотносительно всего сказанного роботу тот, перебрав несколько вариантов, всегда возвращался к предыдущей формулировке.\n\nМы попытались составить несколько моделей, симулирующих структуру выбора, однако итог всегда был один: рекурсивные ошибки не позволяют найти решение и одновременно проверить его. Даже квантовая модель оказалась тут бесполезной. Скорее всего, в процессе мы несколько раз случайно вызвали коллапс волновой функции.\n\nНепонятно, что делать дальше."
 cstorms.1290.a: "Скажите ИИ, что он — §R*****§! и §R******§!."
 cstorms.1290.b: "Молча подождите ответа."
 cstorms.1290.c: "Бездумно нажимайте на все кнопки."
 cstorms.1295.name: "Следование регламенту"
 cstorms.1295.desc.a: "Наконец-то успех! ИИ отчитал нас за непристойную лексику и попросил подождать, пока с нами свяжется представитель службы поддержки.\n\n$cstorms.1295.desc.followup$"
 cstorms.1295.desc.b: "Наконец-то успех! ИИ, неправильно воспринял наше долгое молчание и попросил подождать, пока с нами свяжется представитель службы поддержки.\n\n$cstorms.1295.desc.followup$"
 cstorms.1295.desc.c: "Наконец-то успех! ИИ отчитал нас за неправильное обращение с панелью управления и попросил подождать, пока с нами свяжется представитель службы поддержки.\n\n$cstorms.1295.desc.followup$"
 cstorms.1295.desc.followup: "Через некоторое время нам ответил оператор. Связавшаяся с нами сущность представилась регистратором корпорации «Скайгарден». По ее словам, служба технической поддержки — разумная программа, унаследованная от предыдущего регистратора. Насколько ей известно, до нашего звонка коммутатор простаивал без дела десятилетиями еще с того дня, как «Скайгарден» обанкротился. Мы спросили, зачем работать на обанкротившуюся компанию, и получили ответ, что к этому ее обязывает контракт.\n\nУзнав о причинах нашего звонка, регистратор нашла в архиве старое руководство по работе с системами орбитального поселения. Вскоре мы получим цифровые копии страниц."
 cstorms.1300.name: "Моментальная утрата"
 cstorms.1300.desc: "Изучив руководство, мы без труда запустили все системы поселения.\n\nКак только шум от заработавших механизмов немного утих, мы решили вновь связаться с регистратором, чтобы поблагодарить ее.\n\nРегистратор сказала, что смогла кое-что узнать о приведенной нами в действие станции. Оказалось, мы стали владельцами прототипа, построенного корпорацией «Скайгарден» около пятисот лет назад. К сожалению, он бесследно исчез на просторах космоса после особенно мощной космической бури. Потеря этой собственности вместе с огромными затратами на ее строительство привели к тому, что корпорация обанкротилась.\n\nПо словам регистратора, она впервые за много лет сделала что-то полезное: помогла нам.\n\n«И вообще, приятно было снова услышать голос прапрабабушки, хоть это всего лишь робот», — сказала она."
 ### Repowered Complex
 site_repowered_complex: "Вновь запустившийся комплекс"
 site_repowered_complex_intro: "После того как миновала §Y$electric_storm$§!, под поверхностью планеты §H[From.Planet.GetName]§! произошел необъяснимый скачок напряжения. Сканирование выявило существование под землей целого комплекса — его древние генераторы запустились вновь, приняв на себя энергию бури."
 cstorms.1845.name: "Укрепленный вход"
 cstorms.1845.desc: "Входное помещение обособленного комплекса на планете §H[From.Planet.GetName]§! поражает своей невероятной прочностью. Оно определенно построено на века: наружная сторона укреплена прочными броневыми плитами и экранами для защиты от радиации, а также снабжена целой системой атмосферных датчиков. §H[Leader.GetName]§! считает, что такая конструкция способна выдержать даже предельно тяжелые условия.\n\nРезультаты сканирования показывают наличие под землей огромного помещения, куда ведет цепочка гермодверей."
 cstorms.1850.name: "Спасательное укрытие"
 cstorms.1850.desc: "Добравшись до внутренних помещений, §H[Leader.GetName]§! [Leader.GetAXX::пришел|||fem:пришла] к выводу, что этот комплекс — укрытие на случай серьезной катастрофы, построенное много столетий назад неизвестной органической расой, так и не воспользовавшейся им по назначению.\n\nВнутри мы обнаружили жилые помещения с запасами первой необходимости, капсулы для сна, зоны отдыха и медицинское отделение. В ящиках на каждом этаже — нетронутые запасы пищи, аккумуляторы и инструменты, и всё это — в безупречном состоянии.\n\nОстается последний отсек. Вероятнее всего, там располагается центр управления комплексом."
 cstorms.1850.a: "Продолжайте."
 cstorms.1855.name: "Убежище класса люкс"
 cstorms.1855.desc: "Центр управления оснащен внушительной аппаратурой для отслеживания §Yкосмических бурь§!, принимающей показания атмосферных датчиков, расположенных на поверхности планеты. За несколько столетий работы в режиме ожидания компьютеры комплекса накопили огромные объемы данных о бурях, что немало поспособствует развитию нашей астрометеорологии.\n\nКроме того, §H[Leader.GetName]§! [Leader.GetAXX::обнаружил|||fem:обнаружила] небольшой голографический проектор — похоже, когда-то им часто пользовались. Устройство проецирует трехмерное изображение моллюскоида, рекламирующего свой товар; существо, выступающее на фоне корпоративной символики, кратко описывает основные особенности убежища.\n\nСложно сказать, удалось ли ему найти покупателя, однако комплексом определенно никто не пользовался уже очень давно."
 cstorms.1855.desc.megacorp: "Наш маркетинговый отдел уже разбирает эту рекламу на предмет ошибок."
 ###############################
 #### The Weather Manipulators #
 ###############################
 STORMS_PREC_WM_ONE: "Древнее укрытие"
 STORMS_PREC_WM_ONE_DESC: "На планете [From.Planet.GetName] мы обнаружили несколько очень древних подземных сооружений непонятного предназначения. Следует внимательно их изучить."
 cstorms.105.name: "Древние укрытия"
 cstorms.105.desc: "Планета [From.Planet.GetName] в системе [From.GetStarName] сплошь покрыта руинами. По всей видимости, это следы древней империи, затерявшейся в веках. Заинтересовавшие нас подземные сооружения по возрасту не уступают руинам, однако сохранились гораздо лучше.\n\nУльтразвуковое сканирование выявило существование здесь огромного подземного комплекса, состоящего из складов и укрытий, способных выдерживать стихийные бедствия. Разрушения на поверхности, вне всяких сомнений, вызваны космическими бурями. Они же объясняют и необходимость укрытий.\n\nОднако подробнее узнать о судьбе планеты нам мешают многочисленные обломки. Здесь нужно устроить полноценные раскопки."
 #arcsite The Ancient Storm Shelters
 site_weathermanipulators_the_ancient_storm_shelters: "Древние укрытия"
 site_weathermanipulators_the_ancient_storm_shelters_intro: "В глубинах планеты, опустошенной бурями, таится укрытие. Внешняя его часть разрушена почти до неузнаваемости, но внутренняя совсем не тронута."
 cstorms.110.name: "Долгий путь к гибели"
 cstorms.110.desc: "Под двумя рухнувшими башнями на пути к убежищу мы обнаружили небольшую расщелину. Через нее на поверхность пробивался неяркий свет от работавших внизу механизмов.\n\nЭта расщелина будет нашей опорной точкой — здесь [Root.Owner.GetScientistPlural] начнут составлять план комплекса, а заодно искать способ проникнуть внутрь, не повредив хрупкие сооружения.\n\nРуины, которыми усыпаны окрестности, несут на себе явные признаки воздействия космической бури. Что любопытно, мы не обнаружили никаких попыток со стороны горожан как-то защититься от шторма.\n\nОни будто решили продержаться в этих условиях сколько смогут и лишь затем спешно эвакуироваться. Возможно, подробности мы найдем под поврежденной поверхностью планеты [From.Planet.GetName]."
 cstorms.110.a: "Понятно."
 cstorms.115.name: "Под башнями"
 cstorms.115.desc: "После того как мы вычистили пыль и убрали многослойные завалы, расщелина под башнями стала достаточно широкой, чтобы [Root.Owner.GetScientistPlural] смогли попасть в укрытие.\n\nВ подземном комплексе, незамысловатом и утилитарном, мы обнаружили множество боковых комнат — преимущественно пустых. Такая незамысловатость даже подозрительна: комплекс определенно строился в качестве убежища, однако он недостаточно крепок, чтобы выдержать космическую бурю. Стены его слишком тонкие и легко могут разрушиться, потолки и полы ничем не укреплены. Тот факт, что это убежище сохранилось, можно объяснить лишь случайностью. От полного уничтожения его спасло лишь наличие двух башен наверху и оползень, в результате которого весь комплекс сместился.\n\nОказалось, что свет, замеченный нами на поверхности, испускала сбоящая система сигнализации. Чуть поодаль мы обнаружили несколько еще работающих терминалов. Похоже, у нас есть уникальная возможность узнать больше о прежних владельцах комплекса и обо всем произошедшем."
 cstorms.120.name: "Древние записи"
 cstorms.120.desc: "Добраться до терминалов оказалось куда сложнее, чем мы предполагали: путь нам перегородили обвалы. Некоторые из них совсем новые — по всей видимости, убежище было в аварийном состоянии. Рекомендуется соблюдать осторожность.\n\nК сожалению, древние машины не дали нам запросто узнать все секреты. Обнаруженные там данные записаны на давно забытом языке. Единственная надежда — записи межгалактических переговоров, предыдущие владельцы не посчитали нужным удалить их. Сопоставив записи с содержимым других носителей информации, найденных в убежище, мы сможем в общих чертах перевести написанное. Кроме того, можно изучить и другие комнаты, пока убежище не рухнуло окончательно."
 cstorms.120.a: "Нужно действовать осторожно."
 cstorms.120.b: "Работу можно ускорить."
 cstorms.120.c: "Нужно поскорее взяться за дело. Остальное неважно."
 cstorms.125.name: "Страхование активов"
 cstorms.125.desc: "Комнаты и помещения, расположенные ниже, оказались не такими уж и пустыми. Снизу доверху они заставлены коробками с товарами, которые упакованы и уложены одинаково аккуратно. Переведя надписи на коробках, мы поняли, что внутри необработанные материалы и недоделанные электротехнические детали. Ничего жизненно важного тут нет. В переведенном нами списке заодно указано количество предметов и прогноз потенциальной прибыли после продажи их в так называемой «Интергалактической сети справедливой торговли» (сокращенно — ИССТ).\n\nВсе, что касается торговли, сделок и номенклатурных перечней, с большой тщательностью было описано невероятно живым и восторженным языком. Похоже, даже название исчезнувшей цивилизации подчеркивало занятие торговлей: ее представители называли себя исстианскими торговцами.\n\nУбежище не предназначалось для жителей; по сути, это огромный товарный склад. Тогда почему убежища не способны выдержать бурю?\n\nЕсли мы переведем что-то еще, возможно, станет понятнее. Но времени мало — над головой уже раздается угрожающий треск."
 cstorms.125.a: "Проявляйте осторожность."
 cstorms.125.b: "В первую очередь постарайтесь раздобыть данные."
 cstorms.125.c: "Мы можем помочь исследователям."
 cstorms.130.name: "Манипуляции рынком"
 cstorms.130.desc: "Скрип и скрежет стали громче, однако переводчики продолжают расшифровывать записи из убежища на планете [From.Planet.GetName]. Залежи товаров оказались достаточно бесполезными в качестве источника информации — в отличие от еще работающих терминалов.\n\nЗашифрованные координаты указывают на месторасположение некоего «сверхмощного» устройства, которое находится на ближайшей планете. Насколько мы поняли, оно способно «управлять» космическими бурями. Если это правда, его потенциал невероятно велик.\n\nОднако убежище грозит рухнуть нам на голову в любой момент. Передав копию координат на корабль, ждущий на орбите, мы покинули помещение. Вопросов еще много, но исследование продолжается."
 cstorms.130.a: "Нельзя упускать такую возможность."
 #Special Project Descramble the Coordinates
 INETIAN_PROJECTS_01: "Расшифровать координаты"
 INETIAN_PROJECTS_01_DESC: "Перед тем как убежище на планете [wm_storm_shelter_planet.GetName] обрушилось, мы успели извлечь оттуда зашифрованные координаты. Мы считаем, что они могут привести нас к устройству, которое позволяло исстианским торговцам управлять космическими бурями. Поиск такой техники оправдывает любые затраты."
 #Special project completed
 cstorms.135.name: "Щедрая система"
 cstorms.135.desc: "К счастью, наши [Root.Owner.GetScientistPlural] успели выбраться из убежища на планете [wm_storm_shelter_planet.GetName], пока оно не рухнуло окончательно. С собой они забрали зашифрованные координаты. Мы восстановили данные и выяснили, что они указывают на три разные точки:\n\n[wm_digsite_A.GetName], [wm_digsite_B.GetName] и [wm_digsite_C.GetName]. Более внимательное изучение показывает, что каждая планета играла критически важную роль для организованной сети исстианских торговцев — настолько, что на планете [wm_storm_shelter_planet.GetName] они построили убежище, где хранились эти данные."
 #Precursors Event Chain
 cs_inetian_chain_title: "Предтечи: исстианские торговцы"
 cs_inetian_chain_desc: "Мы нашли древнее укрытие, которое построила цивилизация, господствовавшая здесь миллионы лет назад. В наших архивах нет ни единого упоминания этого народа, словно кто-то специально постарался стереть всю память о нем. Если мы проведем исследование, то у нас есть шанс найти ответы."
 #Arcsite Coordinates A
 site_weathermanipulators_CoordinatesA_Residential_Planet: "Координаты А: колонизированная планета"
 site_weathermanipulators_CoordinatesA_Residential_Planet_intro: "Одна из трех пар координат, обнаруженных в древнем убежище, привела нас на планету [From.Planet.GetName]. По масштабу руин на ее поверхности можно предположить, что когда-то здесь были огромные города. Вероятнее всего, много веков назад здесь жили обычные граждане государства исстианских торговцев. До сих пор неясно, почему кто-то сохранил в компьютере убежища координаты, указывающие на эту планету."
 cstorms.140.name: "Религиозное предназначение"
 cstorms.140.desc: "От городов планеты [From.Planet.GetName] почти ничего не осталось: брошенные сооружения, которыми покрыта ее поверхность до самого горизонта, оказались бессильны перед временем и беспощадными бурями. Особенности того, что осталось от этой впечатляющей архитектуры, схожи с увиденным нами на планете [wm_storm_shelter_planet.GetName] — эти здания тоже никак не подготовлены к катаклизмам даже несмотря на многочисленные свидетельства мощи бурь. Масштабы разрушений таковы, что найти здесь что-либо полезное будет очень сложно (но хочется надеяться, что возможно).\n\nНаши [Root.Owner.GetScientistPlural] определили три наиболее интересных для нас объекта, расположенных около места посадки: относительно нетронутое муниципальное сооружение, некий храм и огромную центральную площадь. Возможно, там нам удастся раскрыть секреты исстианских торговцев."
 cstorms.145.name: "Эпицентр экономики"
 cstorms.145.desc: "К заинтересовавшим нас объектам мы отправили сразу несколько отрядов. Муниципальное сооружение и площадь оказались любопытными, но малополезными, — разве что для изучения культурных и архитектурных особенностей. По-настоящему пристального внимания заслуживал только храм.\n\nЗа его почти рассыпавшимся фасадом скрывался просторный зал. Он весь был уставлен терминалами так, что техника выстраивалась в концентрические круги. Всего мы насчитали 521 устройство. В центре мы обнаружили впечатляющую — и действующую — модель окружающей звездной системы. Ее высокочувствительные нанокомпоненты настроены на взаимодействие с электромагнитным полем планеты. Несмотря на свой огромный возраст, модель достаточно точно отображает расположение местных небесных тел.\n\nУ ее круглого основания расположен интерфейс, видимый из любой точки зала. На нем навеки отпечатались списки коммерческих организаций и стоимость различных акций. Здесь не поклонялись богам — когда-то это был торговый узел, совмещенный с биржей ИССТ.\n\nЛогично предположить, что в храме можно обнаружить ценные данные. Теперь нужно их найти."
 cstorms.145.a: "Осмотрите каждый уголок."
 cstorms.150.name: "Справочник"
 cstorms.150.intro: "Изучив помещение вдоль и поперек, мы пришли к выводу, что торговый узел на планете [From.Planet.GetName] совершенно пуст. Терминалы не работают, и, несмотря на списки, нет никакой возможности извлечь информацию о сделках. Все, что осталось, — это мертвое изображение, навсегда застывшее на экране.\n\nОднако в контейнере, запрятанном далеко в углу, мы обнаружили нечто вроде инструкций по эксплуатации. Надписи, расшифрованные на планете [wm_storm_shelter_planet.GetName], стали для нас ключом к переводу, и мы смогли в общих чертах понять написанное.\n\nЭто были инструкции по работе с терминалами, настройке модели звездной системы и обращению с устройством под названием «секторальный колебательный ограничитель». Управление, наведение и запуск этой машины расписаны очень подробно.\n\nНаверное, об этом устройстве и говорили записи, обнаруженные в убежище."
 cstorms.150.outro: "мы приблизились к разгадке замысла исстианских торговцев и, возможно, даже к приспособлению таинственного механизма под наши нужды."
 cstorms.150.desc.a: "$cstorms.150.intro$ Это означает, что $cstorms.150.outro$"
 cstorms.150.desc.b: "$cstorms.150.intro$ Инструкция ссылается на одну из деталей, обнаруженных нами на планете [wm_digsite_B.GetName], и описывает процесс ее установки. Это означает, что $cstorms.150.outro$"
 cstorms.150.desc.c: "$cstorms.150.intro$ Инструкция ссылается на агрегат, обнаруженный нами на планете [wm_digsite_C.GetName], однако ему не хватает важной детали. Тем не менее $cstorms.150.outro$"
 cstorms.150.desc.d: "$cstorms.150.intro$ Инструкция ссылается на агрегат, обнаруженный нами на планете [wm_digsite_C.GetName], и описывает процесс установки детали с планеты [wm_digsite_B.GetName]. Все, что нам остается, — просто запустить секторальный колебательный ограничитель. Это мощное устройство еще послужит нам!"
 cstorms.150.a: "Вперед!"
 #Arcsite Coordinates B
 site_weathermanipulators_CoordinatesB_Industrial_Planet: "Координаты Б: промышленная планета"
 site_weathermanipulators_CoordinatesB_Industrial_Planet_intro: "Одна из трех пар координат, обнаруженных в древнем убежище, привела нас на планету [From.Planet.GetName] — это промышленный мир, когда-то принадлежавший исстианским торговцам. Местная архитектура не оставляет сомнений: эта планета не предназначалась для жизни. Впрочем, что именно производила местная промышленность, пока остается неясным."
 cstorms.155.name: "Эффективное производство"
 cstorms.155.desc: "Поверхность планеты [From.Planet.GetName] была едва видна: над заводами до сих пор витал густой смог. Производственные зоны сильно пострадали от космических бурь. По земле протянулись огромные расщелины, исполосовавшие однообразный промышленный пейзаж. В одну из таких расщелин мы и посадили корабль.\n\nСудя по всему, никто даже не попытался разобрать навсегда остановившиеся заводы. Их просто бросили, причем не только сами сооружения, но и сырье для производства. Изучив все это, мы, вероятно, поймем, какую роль играла планета в жизни древней торговой цивилизации. Кроме того, здесь мы могли бы узнать подробнее, для чего нужна загадочная машина, о которой говорят записи с планеты [wm_storm_shelter_planet.GetName]."
 cstorms.160.name: "Перевозка опасных материалов"
 cstorms.160.desc: "По результатам первичного анализа стало ясно, что химический состав промышленных материалов с планеты [From.Planet.GetName] крайне нестабилен. Сами по себе они не имели предназначения — перед нами всего лишь составные компоненты, которые система системой конвейерных лент перевозила к центральному хранилищу.\n\nСудя по выгоревшей почве, отсюда постоянно отправлялись межпланетные рейсы. Но куда именно перевозили продукцию? Скорее всего, куда-то недалеко: летучие вещества требуют осторожности.\n\nПоблизости мы обнаружили несколько транспортных контейнеров. Кто-то явно постарался надежно упаковать содержимое — на это указывают стершиеся этикетки. Разобрать удалось только два слова: «особо опасно»."
 cstorms.165.name: "Недостающее звено"
 cstorms.165.intro: "Наши [Root.Owner.GetScientistPlural] быстро вскрыли контейнеры — далеко не все из них были тщательно запечатаны.\n\nВскрытие первого контейнера сопровождалось сильным свистом — заработала внутренняя камера с управляемым микроклиматом. На мгновение нас охватила паника: что, если содержимое дестабилизируется? К счастью, оно оказалось нетронутым.\n\nПри более внимательном осмотре мы обнаружили механическую деталь, невероятно искусную и размещенную крайне аккуратно. Внутри нее находилось некоторое количество заводского летучего вещества."
 cstorms.165.outro: "\n\nМы приняли решение взять деталь на корабль и изучить ее более тщательно. Наши [Root.Owner.GetScientistPlural] и так проводят слишком много времени на этой недружелюбной планете."
 cstorms.165.desc.a: "$cstorms.165.intro$\n\nНа транспортной этикетке внутри контейнера упомянуты некие «секторальные колебательные ограничители». Наши [Root.Owner.GetScientistPlural] пока не понимают, что это значит, но груз наверняка был очень важен: об этом говорят прочные стены контейнера и предостерегающие ярлыки на внешней стороне.$cstorms.165.outro$" #A & C sites not yet visited
 cstorms.165.desc.b: "$cstorms.165.intro$\n\nДеталь показалась нам знакомой. Мы сразу же сравнили ее с изображением из инструкции, найденной на планете [wm_digsite_A.GetName]. Сложная деталь в контейнере — это критически важный компонент секторального колебательного ограничителя.$cstorms.165.outro$" #A site visited & C site not visited
 cstorms.165.desc.c: "$cstorms.165.intro$\n\nПо необычной форме и заполненной жидкостью сердцевине мы догадались, что перед нами недостающая деталь, которую следует установить в агрегат на планете [wm_digsite_C.GetName]. Вещество внутри, скорее всего, — источник питания для секторальных колебательных ограничителей. Однако чтобы правильно установить эту деталь, потребуются довольно специфические знания.$cstorms.165.outro$" #A site not visited & C site visited
 cstorms.165.desc.d: "$cstorms.165.intro$\n\nПохоже, эта деталь — недостающий компонент секторальных колебательных ограничителей с планеты [wm_digsite_C.GetName]. Инструкция, найденная на планете [wm_digsite_A.GetName], поможет нам правильно установить деталь и, возможно, даже запустить устройство.$cstorms.165.outro$" #A & C sites visited
 cstorms.165.a: "Хорошая работа."
 #Arcsite Coordinates C
 site_weathermanipulators_CoordinatesC_Barren_Planet: "Координаты В: бесплодная планета"
 site_weathermanipulators_CoordinatesC_Barren_Planet_intro: "Одна из трех пар координат, обнаруженных в древнем убежище, привела нас на планету [From.Planet.GetName]. Здесь нет никаких признаков жизни, только снег и пыль. Однако сканирование показало, что когда-то эта планета была населена. В какой момент исстианским торговцам стал важен этот мир — до гибели его обитателей или после?"
 cstorms.170.name: "Бесконечные и неудержимые"
 cstorms.170.desc: "Поверхность планеты [From.Planet.GetName] терзают нескончаемые снежные вихри, а под заснеженной почвой нас ждало еще одно неприятное открытие.\n\nПыль и прах, десятки и сотни слоев. Вот все, что осталось от прежних обитателей этого мира. Здесь, в огромной усыпальнице, покоятся миллионы некогда живых организмов, умерших одновременно, — их гибель была поистине массовой. Когда разрушилась среда обитания, атмосфера стала постепенно истончаться и начался ледниковый период, превративший планету [From.Planet.GetName] в огромную пустошь.\n\nЕсли здесь и есть ответы, то искать их надо не на поверхности: там нет ничего, кроме снега и бесконечных пластов льда. Наши [Root.Owner.GetScientistPlural] советуют двигаться вглубь."
 cstorms.170.a: "Приступите к тщательному изучению."
 cstorms.171.name: "Живые корни"
 cstorms.171.desc: "Надев защитное снаряжение и спустив с корабля тяжелую морозоустойчивую технику, наши [Root.Owner.GetScientistPlural] приступили к простому, но утомительному процессу снятия слоев снега и мелкой пыли. Через некоторое время они обнаружили нечто странное: под поверхностью планеты протянулись, охватывая немалую ее часть, длинные каналы; нам они показались чем-то похожими на корни.\n\nВнутри этих каналов мы нашли иссохшие останки самых разных организмов — от флоры до фауны — плохо поддающиеся классификации. Корни жадно втягивали все, до чего могли дотянуться. Захватив добычу с поверхности, они каким-то образом сжимались и перетирали органику между каменистыми стенами, извлекая питательные вещества. Отслужившие свое оболочки затем переносились куда-то, словно перевариваемая пища. Извергаемая «корнями» пыль за это время успела покрыть немалую часть планеты [From.Planet.GetName].\n\nВозникает вопрос: кого — или что? — кормили эти каналы?"
 cstorms.171.a: "Найдите исток."
 cstorms.172.name: "Машины былых времен"
 cstorms.172.intro: "Подземные каналы протянулись на десятки километров. Чем дальше пробирались [Root.Owner.GetScientistPlural], тем плотнее сходились каменистые желоба. Соединялись воедино они на одной из последних гор, сохранившихся на поверхности планеты [From.Planet.GetName]. На самой вершине горы мы обнаружили плато явно искусственного происхождения, а на нем — три огромных аппарата, равноудаленных друг от друга. Скорее всего, их здесь разместили исстианские торговцы, поскольку язык обозначений на корпусе и сама конструкция показались нам уже знакомыми. Несмотря на солидный возраст и открытость беспощадным ветрам, аппараты находятся в превосходном состоянии."
 cstorms.172.outro: "\n\nКак бы то ни было, мы нашли искомое. Еще немного — и мы совершим великое открытие."
 cstorms.172.desc.a: "$cstorms.172.intro$ Наверное, именно про эти агрегаты говорилось на планете [wm_storm_shelter_planet.GetName]. К сожалению, мы ничего не знаем про их сложное внутреннее устройство. Кроме того, панель управления, найденная у основания корпуса одного из агрегатов, вряд ли заработает: в ней явно отсутствуют важные детали. На небольшой табличке рядом мы прочитали: «Секторальные колебательные ограничители».\n\nЕсли привести эти устройства в действие, наконец-то станет ясно их предназначение. Для этого надо отправиться в точку, указанную последними координатами.$cstorms.172.outro$" #A&B not visited
 cstorms.172.desc.b: "$cstorms.172.intro$\n\nАгрегаты перед нами полностью соответствуют чертежам из инструкции, обнаруженной на планете [wm_digsite_A.GetName]. Должно быть, это и есть секторальные колебательные ограничители — именно о них говорилось в записях, найденных в убежище планеты [wm_storm_shelter_planet.GetName].\n\nЕсли верить инструкции, управление этими агрегатами осуществляется с помощью соответствующей панели. Наши [Root.Owner.GetScientistPlural] обнаружили такую панель у основания корпуса одного из устройств, но, похоже, для ее работы не хватает важной детали. Остается посетить точку, указанную в последних известных нам координатах, — возможно, там мы найдем решение.$cstorms.172.outro$" #A visited & B not visited
 cstorms.172.desc.c: "$cstorms.172.intro$\n\nДолжно быть, перед нами секторальные колебательные ограничители — устройства, упомянутые в записях с планеты [wm_storm_shelter_planet.GetName]! Больше того, деталь, которую мы забрали с планеты [wm_digsite_B.GetName], удалось без труда вставить в панель управления у подножия корпуса одного из ограничителей.\n\nОднако на этом работы по восстановлению рекомендуется приостановить: сложность и возраст комплектующих повышают риск при запуске. Наши [Root.Owner.GetScientistPlural] советуют сначала получить как можно больше сведений.$cstorms.172.outro$" #A not visited & B visited
 cstorms.172.desc.d: "$cstorms.172.intro$\n\nНет никаких сомнений, что перед нами устройства, упомянутые в записях с планеты [wm_storm_shelter_planet.GetName], а заодно — в инструкции, которую мы обнаружили на планете [wm_digsite_A.GetName]. Там эти устройства названы секторальными колебательными ограничителями. Осталось лишь установить деталь, которую мы забрали с планеты [wm_digsite_B.GetName], и понадеяться, что эта техника еще работает. Лишь тогда нам станет понятно ее предназначение.$cstorms.172.outro$" #A&B visited
 cstorms.172.a: "Посмотрим, что они умеют." #Finished sites A and B
 cstorms.172.b: "Не сейчас." #Did not finish sites A and B
 #Special Project 2
 INETIAN_PROJECTS_02: "Предназначение машин"
 INETIAN_PROJECTS_02_DESC: "Облетев три точки, указанные в координатах с планеты [wm_storm_shelter_planet.GetName], мы разгадали древнюю загадку. Осталось только запустить секторальные колебательные ограничители. Пора узнать, для чего они предназначены."
 cstorms.176.name: "Предназначение машин"
 cstorms.176.desc: "[Root.Owner.GetScientistPlural], обнаружив последний элемент головоломки, немедленно принялись за работу. Деталь, взятую нами с планеты [wm_digsite_B.GetName], мы правильно установили в разъем панели управления. Помогла нам в этом инструкция, найденная на планете [wm_digsite_A.GetName]. Все три устройства мгновенно пробудились.\n\nОни зарокотали и оглушительно завибрировали, сотрясая плато, на котором стояли. В воздух поднялись облака снега и пыли. Раздался треск, будто ударила молния, — и [Root.Owner.GetScientist] мгновенно [Root.Owner.GetAXX::испарился|||fem:испарилась], превратившись в кучку праха. В мгновение ока ее затянуло в канал, проведенный к секторальным колебательным ограничителям.\n\nТаким образом планета [wm_digsite_C.GetName] открыла нам свою тайну: каналы, ведущие к устройствам, — это топливные магистрали, которые питают агрегаты собранной вокруг биоматерией. Вот почему на планете погибла жизнь.\n\nТеперь секторальные колебательные ограничители работают на полной мощности. Топлива хватит на одно применение. Остается лишь нажать кнопку…"
 cstorms.176.a: "Запустите агрегат."
 cstorms.176.b: "Ничего не нажимайте."
 #Delayed Event 1
 cstorms.180.name: "Обнаруженные останки"
 cstorms.180.desc: "Мы раскрыли тайну секторальных колебательных ограничителей, но судьба исстианских торговцев по-прежнему покрыта мраком. Впрочем, после тщательного анализа всей известной нам информации многое стало понятно.\n\nСудя по хроникам коммерческой деятельности, найденным на планете [wm_digsite_A.GetName], этот народ придерживался эгалитаристских взглядов. В пользу такого вывода говорят свидетельства высокого уровня жизни, в том числе оставшиеся на планете многочисленные роскошные сооружения. Комфортная и изобильная жизнь была доступна почти каждому исстианцу вне зависимости от его профессии, социального положения или происхождения.\n\nНа планете [wm_digsite_B.GetName] нашлись реестры, указывающие на предназначение заводов. Они не выпускали конечную продукцию — производство было встроено в более масштабные цепочки, существовавшие исключительно ради поддержания изобилия в огромном исстианском государстве. Равномерное распределение благ требовало огромных расходов как материалов, так и пищи, все это производилось с немыслимой скоростью.\n\nСекторальные колебательные ограничители, найденные на планете [wm_digsite_C.GetName], тоже помогли приподнять завесу тайны перед тем, как окончательно пришли в негодность. Их предназначение осталось непонятным, однако мы успели перехватить информационный сигнал. На что бы ни были направлены ограничители, оно явно не было способно передвигаться свободно.\n\nНаши [Root.Owner.GetScientistPlural] советуют внимательно осмотреть близлежащие сектора — возможно, там найдется ответ."
 cstorms.180.a: "Выясните, на что были направлены ограничители."
 #Digsite 5
 site_weathermanipulators_storm_formation: "Источник распространения"
 site_weathermanipulators_storm_formation_intro: "В памяти пульта управления секторальными колебательными ограничителями был сохранен информационный сигнал. Не без труда скопировав его, через какое-то время мы смогли найти точно такой же — этот след привел нас на необитаемую планету. Пора выяснить, на что и зачем исстианские торговцы наводили свои устройства."
 cstorms.181.name: "Невзрачные равнины"
 cstorms.181.desc: "На первый взгляд [From.Planet.GetName] — совершенно непримечательная планета, ничем не отличающаяся от многих сотен подобных ей небесных тел. Источник сигнала, должно быть, хорошо спрятан: мы не обнаружили каких-либо видимых передатчиков или излучателей, способных регистрировать сигналы на расстоянии нескольких световых лет.\n\nПоиски продолжаются."
 cstorms.182.name: "Концентрированная катастрофа"
 cstorms.182.desc: "Через какое-то время после высадки мы обнаружили, что сигнал становится то сильнее, то слабее в зависимости от нашего местоположения. Вычислив эту нехитрую закономерность, мы отправились к огромной горной цепи на противоположной стороне планеты — там сигнал был особенно отчетливым.\n\nПо мере приближения к возвышающимся горам пейзаж становился все более мрачным. Дикая природа превратилась в пустошь — испепеленную, бесплодную, опустошенную, словно здесь прошла разрушительная стихия. Судя по всему, когда-то здесь образовалась космическая пылевая буря. Однако логично было бы предположить, что в таком случае она накрыла бы всю планету. Представшая же перед нами катастрофа сосредоточена в одном месте — такое мы видим впервые. Чтобы разобраться в произошедшем, надо покорить внушительные вершины перед нами."
 cstorms.183.name: "Исчезающая энергия"
 cstorms.183.desc: "Потрепанный бурей горный хребет в целом выглядел совершенно обычно: его вершины чередовались с долинами. Но вскоре наше внимание привлек кратер очень странной формы. Стены кратера были идеально гладкими, а на почве в самом центре были вырезаны концентрические круги.\n\nСпустившись на его дно, мы почувствовали, как нас стальной хваткой тянет к себе какая-то неодолимая сила, исходящая из центра кругов. Над ними поднялись мерцающие облачка энергии. Какие-то из них отдалялись и у нас на глазах покидали атмосферу планеты. Это и есть источник сигнала.\n\nНаши [Root.Owner.GetScientistPlural] рекомендуют внимательно изучить кратер и провести анализ всплесков энергии, чтобы понять, в чем тут дело."
 cstorms.184.name: "Малопонятные истоки"
 cstorms.184.desc: "Судя по экологическим данным и результатам тщательно проведенного моделирования, по этим горам когда-то действительно прошла небесная пылевая буря. Более того, именно здесь она и образовалась! Почему она не поглотила всю планету, можно только предположить: возможно, буре не хватило масштаба. Анализ показывает, что размер ее не превышал даже доли от обычного шторма.\n\nИсстианские торговцы пытались обуздать хаос космической природы, судя по тому, что называли секторальные колебательные ограничители «управляющими устройствами» и сохранили в базах данных энергетический сигнал конкретно этой бури. Рассчитав, в каком направлении двигалась буря, мы можем узнать о ней больше."
 cstorms.184.a: "Продолжайте исследования."
 #Special Project 3
 INETIAN_PROJECTS_03: "Поиск торговцев"
 INETIAN_PROJECTS_03_DESC: "Мы нашли точку, где образовалась древняя пылевая буря. Однако все факты указывают на то, что она была гораздо меньше обычных штормов. Интересно, зачем исстианские торговцы решили потратить энергию секторальных колебательных ограничителей на такую бурю.\n\nЕсли отследить траекторию ее движения, возможно, мы узнаем, почему этот проект был для них настолько важен."
 cstorms.186.name: "Поиск торговцев"
 cstorms.186.desc: "Вычислить траекторию, по которой шла небесная пылевая буря, оказалось сложнее, чем мы предполагали. Пройдя всего несколько систем, шторм резко изменился: его мощь, размеры и курс стали совсем не похожи на изначальные. Наши [Root.Owner.GetScientistPlural] предполагают, что именно в этот момент он попал под воздействие секторальных колебательных ограничителей. Эти устройства сбили бурю с изначального пути и вбросили в вихрь измельченные останки живой природы с планеты [wm_digsite_C.GetName].\n\nБуря сдвинулась, но не остановилась. Она пошла дальше, разоряя каждую систему на пути.\n\nИ все ради того, чтобы сберечь одну-единственную систему, прежде нам неизвестную… Датчики зарегистрировали присутствие там заброшенной космической станции. Чтобы буря ее не поглотила, исстианские торговцы обрекли сразу несколько планет на гибель.\n\nПусть это и не столица, которую мы надеялись найти, но подобные меры указывают на важность обнаруженной станции."
 cstorms.186.a: "Проложите курс к станции."
 #Digsite 6
 site_weathermanipulators_last_shelter: "Перед падением"
 site_weathermanipulators_last_shelter_intro: "Исстианские торговцы пытались защитить космическую станцию в этой системе от небольшой пылевой бури. Однако в результате буря так разрослась, что погубила несколько других систем. Почему же эта станция была для них так важна?"
 cstorms.190.name: "Стабильная орбита"
 cstorms.190.desc: "Станция на орбите планеты [From.Planet.GetName] оказалась гораздо больше, чем мы предполагали. Это не просто станция, а целый комплекс, оснащенный исследовательской аппаратурой, сложными системами жизнеобеспечения и высокочувствительными датчиками для сканирования дальнего космоса. Не похоже, чтобы она служила промежуточной остановкой. Скорее всего, здесь жили колонисты.\n\nКомплекс в плачевном состоянии: его корпус сильно поврежден, а взрывная декомпрессия вырвала из конструкции сразу несколько отсеков. Неизвестно, что стало причиной этому — внешнее или внутреннее воздействие. К счастью, компьютеры, управляющие орбитальным полетом и осевой стабилизацией, пока еще работают. Это объясняет, почему станция не врезалась в звезду и не завертелась вокруг своей оси.\n\nОднако попасть внутрь, не нарушив при этом хрупкое равновесие, будет трудно."
 cstorms.191.name: "Впечатляющее давление"
 cstorms.191.desc: "Проникнуть на станцию в системе [This.System.GetName] можно было лишь одним способом: открыть уцелевший воздушный шлюз, не вызвав новых разрушений. Во внутренних помещениях, несмотря на солидный возраст станции, еще сохранялось давление — таким образом там поддерживались условия наподобие планетарных.\n\nЧтобы установить герметичное соединение между кораблем и станцией, понадобилось несколько дней. Всё это время мы аккуратно выравнивали давление воздуха, после чего наконец смогли открыть шлюз. К сожалению, нас сразу же встретило новое препятствие — заваленный коридор. Пройти мешала груда искореженных балок и обломков, оставшихся после разгерметизации соседних помещений. Пробраться дальше получится не сразу."
 cstorms.192.name: "Внутренняя гробница"
 cstorms.192.desc: "Расчистив себе путь, мы отправились вглубь станции на поиски ответов.\n\nТщательно осмотрев помещения, мы поняли, что обитатели этого комплекса не наблюдали за космосом. Вместо этого они тщательно что-то оберегали, поскольку сложная сканирующая аппаратура была направлена преимущественно внутрь комплекса. Попутно мы обнаружили личные вещи исстианских торговцев, а также записи, посвященные жизни на станции. Ее обитатели говорили о некоем важном грузе, который хранился в тщательно охраняемом помещении где-то внутри базы. Отыскать его было несложно, но мы удивились: перед нами предстала… гробница.\n\nЕе пол был устлан иссохшими, превратившимися в мумии телами исстианцев — не великих деятелей, а самых обычных граждан. Похоже, они не сопротивлялись, а добровольно отправились на гибель. Что здесь случилось?"
 cstorms.193.name: "Гордыня"
 cstorms.193.desc: "Груз, о котором говорилось в записях, располагался в самом центре помещения. На вид он оказался механическим устройством — похоже, относительно новым и ни разу не использованным. Конструкция его, несомненно, исстианская, однако по сложности аппарат превосходит все другие разработки погибших предтеч.\n\nНа терминалах, стоявших по краям, мерцал один и тот же непрерывно повторяющийся текст. Перевод не занял много времени:\n\n§L«Здравствуй, гость. Ты стал свидетелем нашей гордыни. В погоне за равенством мы позабыли об истинной уравнивающей силе — о творении и разрушении.\n\nВ своем стремлении обезопасить торговые пути от буйства космических штормов мы вмешались в устройство самой природы. Скромные поначалу бури стали неукротимыми. Стихия опустошила наши миры. И это не совпадение, а месть. Мы отгородились от стихии на этой станции. Здесь пролегала наша последняя линия обороны… но было слишком поздно. Даже после отключения ограничителей с новой силой зарождались более мощные и беспощадные космические бури. Стало ясно, что остается лишь одно средство.\n\nМы принялись за работу. Дорогой гость, перед тобой плод наших трудов: этот агрегат спасет тебя от космических бурь и не вызовет их гнева. Мы погибли, чтобы искупить всеобщий грех. Не повторяй наших ошибок».§!\n\nВ этом помещении исстианских торговцев настиг печальный конец. Щедрость их была столь же велика, сколько и безрассудство. Мы забрали их прощальный подарок со станции."
 cstorms.193.a: "Пусть покоятся с миром."
 cstorms.193.b: "Глупцы получили по заслугам."
 #Artifact action
 artifact_inetian_research: "Тайны исстианских торговцев"
 artifact_inetian_research_desc: "Глубже вникните в секреты исстианских торговцев."
 artifact_inetian_research_completed: "$artifact_inetian_research$"
 artifact_inetian_research_completed_desc: "Мы воспользовались древними знаниями исстианских торговцев в собственных целях."
 INETIAN_PROJECTS_04: "Углубиться в секреты исстианских торговцев"
 INETIAN_PROJECTS_04_DESC: "Мы нашли место упокоения последних исстианских торговцев, однако все еще мало знаем об их огромном государстве. Стоит еще раз заняться изучением этого загадочного народа."
 cstorms.195.name: "Углубиться в секреты исстианских торговцев"
 cstorms.195.desc: "Место упокоения последних исстианских торговцев оказалось передовой космической станцией, построенной с целью защиты обитателей от порожденных ими ужасающих космических бурь. Этот комплекс — подлинная кульминация исстианской технической мысли. Системы регулирования атмосферы и защиты станции поражают воображение. Однако даже такая сложная техника не смогла спасти народ от вымирания.\n\nСтанция больше не пригодна для жизни — миллионы лет постепенного обветшания оставили свой отпечаток — однако наши [Root.Owner.GetScientistPlural] смогли извлечь немало полезных данных из местных систем. Кроме того, в одной базе данных удалось обнаружить самые важные торговые пути исстианцев, а кто-то из последних торговцев оставил на рабочем месте прототипы более производительных и менее планетоубийственных устройств управления климатом.\n\nПохоже, твердость их намерений хотя бы частично себя оправдала. Теперь мы сможем совладать с бурями."
 secrets_of_the_inetian_traders: "Тайны исстианских торговцев"
 secrets_of_the_inetian_traders_hive_mach: "Тайны исстианских торговцев"
 secrets_of_the_inetian_traders_desc: "Древние знания исстианских торговцев вновь принесли нам пользу. Теперь благодаря их влиянию рыночные пошлины стали для нас ниже."
 secrets_of_the_inetian_traders_hive_mach_desc: "Сохранившиеся данные исстианских торговцев вновь принесли пользу коллективу. Рыночные пошлины снижены."
 #Hyperlane Detailer - Secrets Of Inetian Traders Reward
