 #Ascension Perk
 ap_weather_control: "Управление галактической погодой"
 ap_weather_control_desc: "Благодаря новейшим достижениям в астрометеорологии мы можем сами устраивать космические бури. При наличии подходящей технологии мы даже сможем выбрать тип бури."
 requires_technology_tech_advanced_storm_manipulation: "$TRIGGER_FAIL$Необходима технология £physics£ §Y«$tech_advanced_storm_manipulation$»§!."
 #Storm Tooltips
 cosmic_storm_planet_modifiers: "§HПланетарные модификаторы§!"
 cosmic_storm_fleet_modifiers: "§HМодификаторы флота§!"
 cosmic_storm_country_modifiers: "§HМодификаторы государства§!"
 cosmic_storm_ship_modifiers: "§HМодификаторы корабля§!"
 cosmic_storm_system_modifiers: "§HМодификаторы системы§!"
 cosmic_storm_forecast_indicator_header: "Приближающаяся космическая буря"
 celestial_storm_tt: "• $celestial_storm$ уменьшает объем §Yразведданных§! о системах и позволяет флотилиям пересекать закрытые границы."
 solar_storm_tt: "• $solar_storm$ делает видимыми флотилии в затронутых системах."
 electric_storm_fleet_tt: "• $MOD_SHIP_SHIELD_REGEN_ADD_PERC$ у кораблей и станций §Rотключается§!.\n• Наносит прочности щитов кораблей и станций §R$@storm_monthly_dmg_low|0$§! ед. урона ежемесячно."
 particle_storm_fleet_tt: "• $MOD_SHIP_HULL_REGEN_ADD_PERC$, $MOD_SHIP_ARMOR_REGEN_ADD_PERC$ и $MOD_SHIP_SHIELD_REGEN_ADD_PERC$ у кораблей и станций §Rотключается§!.\n• Наносит кораблям и станциям, чья прочность превышает $@storm_hp_perc_limit|0Y%$, §R$@storm_monthly_dmg_low|0$§! ед. урона ежемесячно.\n• £unity£ $unity$ от кораблей, чья прочность составляет $@storm_hp_perc_limit|0Y%$ или менее: §G+$@particle_storm_unity_per_ship|0$§!."
 gravity_storm_consumer_goods_upkeep_tt: "Если владелец колонии НЕ является гештальт-​сознанием:\n$t$$r_consumer_goods$ на содержание £job_farmer£ [GetFarmerPlural_lower], £job_miner£ [GetMinerPlural_lower] и £job_technician£ [GetTechnicianPlural_lower]: §R+1§!"
 gravity_storm_energy_upkeep_tt: "Если владелец колонии является гештальт-​сознанием:\n$t$$r_energy$ на содержание £job_farmer£ [GetFarmerPlural_lower], £job_miner£ [GetMinerPlural_lower] и £job_technician£ [GetTechnicianPlural_lower]: §R+1§!"
 gravity_storm_ship_tt: "• §R$@gravity_storm_dmg_malus|1%$§! к урону от корабельных орудий в зависимости от размера корабля."
 nexus_storm_fleet_tt: "• $MOD_SHIP_HULL_REGEN_ADD_PERC$, $MOD_SHIP_ARMOR_REGEN_ADD_PERC$ и $MOD_SHIP_SHIELD_REGEN_ADD_PERC$ у кораблей и станций §Rотключается§!.\n• Наносит кораблям и станциям, чья прочность превышает $@storm_hp_perc_limit|0Y%$, §R$@storm_monthly_dmg_high|0$§! ед. урона ежемесячно."
 shroud_storm_ship_evasion_modifier_tt: "• §G+$@shroud_storm_evasion|0%$§! к показателю «$MOD_SHIP_EVASION_MULT$», если государство проникло в §YПокров§!."
 shroud_storm_ship_damage_modifier_tt: "• §G+$@shroud_storm_damage|0%$§! к показателю «MOD_SHIP_WEAPON_DAMAGE», если государство проникло в §YПокров§!."
