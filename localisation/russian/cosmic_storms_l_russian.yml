 #Storm Tech Insight events
 cstorms.505.name: "Лицом к лицу с бурей"
 cstorms.505.desc: "§H[this.GetAffectedStormType]§! оставила после себя немало разрушений, но мы получили уникальные знания об этом галактическом феномене.\n\nИзучая астрометеорологию, мы сможем лучше защититься от таких бурь в будущем. А когда-нибудь, возможно, исследования в этой области позволят нам даже подчинить себе космические бури."
 #Storm Buildings
 building_storm_attraction_center: "Центр притяжения бурь"
 building_storm_attraction_center_desc: "Работники этих комплексов притягивают ближайшие космические бури с помощью осторожного воздействия на гравитационные силы."
 building_advanced_storm_attraction_center: "Улучшенный центр притяжения бурь"
 building_advanced_storm_attraction_center_desc: "Благодаря передовым знаниям в области темной энергии мы можем повысить эффективность всех центров притяжения бурь."
 building_storm_repellent_center: "Центр отражения бурь"
 building_storm_repellent_center_desc: "Чем дальше буря, тем спокойнее население. Установленная в таком центре сложная астрометеорологическая аппаратура отражает надвигающиеся бури."
 building_advanced_storm_repellent_center: "Улучшенный центр отражения бурь"
 building_advanced_storm_repellent_center_desc: "Любые манипуляции с пространством-временем законны, если защищают планету от космических бурь. Именно этим и занимается центр."
 building_storm_resistant_production: "Центр помощи пострадавшим от бурь"
 building_storm_resistant_production_desc: "Сотрудники этого центра помогают устранять ущерб, который космические бури наносят нашему производству. Благодаря эффективной координации спасательные отряды выдвигаются почти мгновенно, а условия для торговли на планете постоянно улучшаются."
 building_storm_resistant_production_tt: "Отрицательное влияние §Yкосмической бури§! на планетарное производство уменьшается на §G30%§!.\n\nЕсли есть §Yкосмическая буря§!:$TABBED_NEW_LINE$$mod_planet_miners_minerals_produces_add$: §G+0,5§! $TABBED_NEW_LINE$$mod_planet_farmers_food_produces_add$: §G+0,5§! $TABBED_NEW_LINE$$mod_planet_technician_energy_produces_add$: §G+0,5§! \n\nОткрывает планетарное решение §Y«$decision_hunker_down$»§!"
 building_advanced_storm_resistant_production: "Подавитель бури"
 building_advanced_storm_resistant_production_desc: "Установка систем управления погодой в центрах помощи пострадавшим от бурь помогла значительно уменьшить влияние космических штормов. Кроме того, эффективность работы спасательных отрядов повысилась, а планетарная торговля почти не страдает от местной погоды."
 building_advanced_storm_resistant_production_tt: "Отрицательное влияние §Yкосмической бури§! на планетарное производство уменьшается на §G45%§!.\n\nЕсли есть §Yкосмическая буря§!:$TABBED_NEW_LINE$$mod_planet_miners_minerals_produces_add$: §G+1§! $TABBED_NEW_LINE$$mod_planet_farmers_food_produces_add$: §G+1§! $TABBED_NEW_LINE$$mod_planet_technician_energy_produces_add$: §G+1§! \n\nОткрывает планетарное решение §Y«$decision_hunker_down$»§!"
 building_adakkaria_patriotic_institute: "Патриотический институт Торжества"
 building_adakkaria_patriotic_institute_desc: "$building_adakkaria_patriotic_institute$ — это кладезь исследовательских наработок в области состояний сознания. Здесь, вдалеке от елейных речей о жестокости Собрания, мы помогаем каждому пробудить в себе внутреннюю бурю."
 building_adakkaria_patriotic_institute_effect_desc: "При прохождении космической бури через эту систему с вероятностью 10% £pop£ §Hпоселения§! получат признак «$Name_Storm_Fused$»."
 building_adakkaria_patriotic_institute_effect_upgrade_desc: "При прохождении космической бури через эту систему с вероятностью 40% £pop£ §Hпоселения§! получат признак «$Name_Storm_Fused$». Кроме того, раз в 10 лет §Y100§! £pop£ §Hпоселений§! с вероятностью 20% могут превратиться в космическую бурю."
 building_astrometeorology_observation_center: "Астрометеорологическая обсерватория"
 building_astrometeorology_observation_center_desc: "С помощью чувствительных датчиков сотрудники этого центра изучают условия окружающей среды, чтобы лучше понять природу вселенной."
 concept_building_astrometeorology_observation_center: "$building_astrometeorology_observation_center$"
 building_storm_summoning_theater: "Театр призыва бурь"
 building_storm_summoning_theater_desc: "Искусство и технологии здесь объединились на радость всем. $job_storm_dancer_plural$ энергично кружатся по сцене, приманивая космические бури."
 building_storm_holo_theater: "Буревой голографический зал"
 building_storm_holo_theater_desc: "В этих залах наши $job_storm_dancer_plural$ демонстрируют свои завораживающие представления на всю планету и за ее пределы, призывая более далекие бури."
 building_storm_grand_theater: "Большой театр призыва бурь"
 building_storm_grand_theater_desc: "Вершина объединения художественной и технической мысли. Здесь искусство танца обретает свою высшую, ярчайшую форму."
 sm_storm_attraction_computer: "Система притяжения бури"
 sm_storm_attraction_computer_desc: "Благодаря этому устройству мы можем управлять местными гравитационными условиями, притягивая бури из глубин космоса."
 sm_storm_repelling_computer: "Батарея отражения бурь"
 sm_storm_repelling_computer_desc: "Эта батарея мощных лазеров создает области, наполненные высокозаряженными магнитными частицами, чтобы разгонять космические бури естественным образом."
 #Jobs
