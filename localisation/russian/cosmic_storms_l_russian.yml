 #The Tempest Invocator
 r_the_tempest_invocator: "Призыватель бури"
 r_the_tempest_invocator_desc: "Даже в выключенном состоянии это устройство поражает сосредоточенной в нем мощью. Осмелимся ли мы пробудить бурю внутри лучшего из лучших? Иногда триумф цивилизации требует жертв."
 r_the_tempest_invocator_active_effect_tt: "В выбранной системе создается ['concept_nexus_storm', сверхбуря].\n$t$После выбора системы будет принесен в жертву случайный $scientist_with_icon$."
 r_the_tempest_invocator_requirement_fail_tt: "$TRIGGER_FAIL$§R$scientist_with_icon$ — нет подходящей жертвы.§!"
 r_the_tempest_invocator_started_placing_fail_tt: "$TRIGGER_FAIL$§RСистема размещения бурь уже запущена.§!"
 tempest_invocator_active_modifier: "Отражение бури"
 concept_nexus_storm: "$nexus_storm$"
