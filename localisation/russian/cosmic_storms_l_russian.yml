 #Magnetized Planetary Core
 pm_magnetized_planetary_core: "Чрезмерно намагниченное планетарное ядро"
 pm_magnetized_planetary_core_desc: "Электромагнитная активность в недрах мантии позволяет добывать руду с помощью магнитов, но плохо влияет на техническую инфраструктуру."
 cstorms.1705.name: "$pm_magnetized_planetary_core$"
 cstorms.1705.desc: "С планеты [this.GetName] начали поступать сообщения о необычных побочных эффектах недавней §Yмагнитной бури§!. Мощные энергетические поля бури усилили магнитную нестабильность расплавленного ядра планеты, вызвав повсеместные сбои в технологической инфраструктуре.\n\nОднако благодаря им же появилась редкая возможность для добычи ресурсов. Богатая металлами магма под мантией планеты оказалась заряжена, и теперь металлы можно добывать с помощью магнитов."
 #Electrified Oceans
 d_electrified_oceans: "Океаны под напряжением"
 d_electrified_oceans_desc: "Обширный океан этой планеты теперь неизменно пронизан электрическим током."
 GLACIAL_OCEANS: "Подледные океаны"
 DEFAULT_OCEANS: "Океаны"
 cstorms.1715.name: "$d_electrified_oceans$"
 cstorms.1715.desc.common: "После недавней §Yэлектрической бури§! на планете [this.GetName] возникло крайне необычное явление. [GetOceansState] планеты оказались заряжены вечными электрическими токами, которые теперь пронизывают их воды и представляют смертельную опасность для морских обитателей."
 cstorms.1715.desc.aquatic: "Ситуация ставит под угрозу выживание нашей колонии, и с ней надо разобраться как можно скорее."
 cstorms.1715.desc.non_aquatic: "Сейчас это явление не представляет для нас опасности, но может стать преградой для развития колонии в будущем."
 cstorms.1715.a: "Избавьтесь от токов."
 cstorms.1715.b: "Оставьте всё как есть."
 #Ghostly Apparitions
 d_ghostly_canyon: "Каньон с привидениями"
 d_ghostly_canyon_desc: "Очевидцы рассказывают о бесплотных призраках, обитающих в этом каньоне."
 cstorms.1725.name: "Призрачные сущности"
 cstorms.1725.desc.common: "После недавней §Yпокровной бури§! в системе [this.solar_system.GetName] [owner.GetColonistPlural] начали сообщать о необъяснимых призрачных сущностях, которые были замечены в удаленном каньоне. Эти голубоватые призрачные фигуры появляются лишь ненадолго, и что бы [owner.GetColonistPlural] ни делали, призраки не могут или не хотят с ними взаимодействовать — лишь бесцельно бродят и затем бесследно исчезают."
 cstorms.1725.desc.psionic: "Сущности, скорее всего, обладают псионической природой, однако нам не удалось установить с ними ментальную связь. Тем не менее само их присутствие немного усиливает наши телепатические способности."
 cstorms.1725.desc.psionic_robot: "Сущности, скорее всего, обладают псионической природой, однако нам не удалось установить с ними псионическую связь. Тем не менее проверки системы подтвердили, что само их присутствие немного усиливает наши телепатические способности."
 cstorms.1725.desc.spiritualist: "Это удивительное явление служит ярким напоминанием о нематериальной стороне нашего бытия."
 cstorms.1725.desc.gestalt: "Физического вреда или агрессивного поведения с их стороны пока замечено не было."
 cstorms.1725.desc.default: "Физического вреда или иного ущерба с их стороны пока замечено не было. Однако это странное явление всё равно вызывает тревогу."
 cstorms.1725.a: "Засыпьте каньон. Мертвые должны оставаться под землей."
 #Volcanic Inactivity
 cstorms.1735.name: "Вулканическая пассивность"
 cstorms.1735.desc: "§Y[this.GetAffectedStormType]§! недавно затронула мир §H[this.GetName]§!, и остаточное излучение дестабилизировало геологическую активность этой планеты.\n\nСамое заметное изменение в том, что буря потушила активный вулкан, перекрыв ведущий к нему из недр поток магмы.\n\nЭто открывает нам новые возможности по развитию территорий, пока что залитых остывающей лавой."
 #Mountain in the Sky
 d_sky_mountain: "Горы в небе"
 d_sky_mountain_desc: "Горный хребет невероятных размеров висит в разреженных верхних слоях атмосферы, обнажив нетронутые рудные залежи."
 unlocks_zone_minerals_physics: "$t$Открывается специализация района: §Y$zone_minerals_physics$§!"
 cstorms.1745.name: "$d_sky_mountain$"
 cstorms.1745.desc: "Сильная §Yгравитационная буря§! стала причиной невероятных преобразований в ландшафте планеты §H[this.GetName]§!. Мощные гравитационные колебания, вызванные бурей, откололи самый большой горный хребет от тектонического шельфа и подняли его в воздух.\n\nГоры так и остались висеть в верхних слоях атмосферы, удерживаемые остаточными гравитационными эффектами бури. Это редчайшее событие обнажило ранее недоступные рудные залежи в глубинной породе, а наши [owner.GetResearchers] получают массу интересных данных для анализа."
 #Melting Glaciers
 cstorms.1755.name: "Тающие ледники"
 cstorms.1755.desc.common: "§Y[this.GetAffectedStormType]§! недавно затронула [this.GetPlanetMoon]у [this.GetName] и вызвала неожиданные климатические эффекты."
 cstorms.1755.desc.electric: "Повышенный электрический заряд в атмосфере привел к значительному изменению температуры в полярном регионе, $cstorms.1755.desc.common_2$"
 cstorms.1755.desc.particle: "Разрушительное воздействие бури частиц привело к серьезным изменениям в полярных регионах, $cstorms.1755.desc.common_2$"
 cstorms.1755.desc.gravity: "Гравитационные аномалии, принесенные бурей, раскололи многослойный подводный лед, $cstorms.1755.desc.common_2$"
 cstorms.1755.desc.magnetic: "Остаточные возмущения в магнитных полях планеты привели к существенным сейсмическим сдвигам, $cstorms.1755.desc.common_2$"
 cstorms.1755.desc.solar: "Буря принесла с собой экстремальную жару и повысила температуру на всей планете, $cstorms.1755.desc.common_2$"
 cstorms.1755.desc.celestial: "Огромная концентрация горячей звездной пыли привела к серьезным изменениям в полярных регионах, $cstorms.1755.desc.common_2$"
 cstorms.1755.desc.common_2: "спровоцировав оттаивание ранее недоступной мерзлой тундры.\n\nМы можем начать разработку этой новообретенной территории."
 #Dusty Drink
 cstorms.1761.name: "Засоры космических масштабов"
 cstorms.1761.desc.common: "Наши [Owner.GetEngineerPlural] с планеты §H[this.GetName]§! сообщают, что §Yбуря звездной пыли§! отрицательно влияет на системы фильтрации воды. Частицы оседают в грунтовых водах, и из-за получившейся суспензии засоряются ключевые элементы инфраструктуры."
 cstorms.1761.desc.default: "Сбои в работе гидропонных систем сильно бьют по сельскому хозяйству планеты, а также приводят к нехватке питьевой воды.\n\nЕсли ничего не предпринять, эта проблема может иметь долгосрочные последствия для водоснабжения. К счастью, наши [owner.GetEngineerPlural] уверены, что смогут разработать более надежные системы фильтрации."
 cstorms.1761.desc.lithoid: "Изучая неполадки в работе гидропонных систем, наши [Owner.GetColonistPlural] обнаружили, что для литоидов сама эта минеральная суспензия и вкусна, и питательна. Они внесли ряд небольших изменений в системы фильтрации в колонии и начали производство нового напитка, за которым можно будет скоротать ожидание очередной бури."
 cstorms.1761.a: "Продолжайте."
 cstorms.1761.b: "Так неожиданно и приятно!"
 pm_satured_filtration: "Перегруженная система фильтрации"
 pm_satured_filtration_desc: "Местные запасы воды перенасыщены звездной пылью, которая вызывает сбои в работе гидропонных систем."
 filtration_insight_modifier: "Открытие в области фильтрации воды и гидропоники"
 CLEAR_DUSTY_PIPES_PROJECT: "Прочистить трубы"
 CLEAR_DUSTY_PIPES_PROJECT_DESC: "§Y$celestial_storm$§! на планете §H[this.GetName]§! стала причиной массовых засоров в системах фильтрации воды из-за нерастворимых минералов. Чтобы решить эту проблему, необходимо разработать более надежные системы фильтрации."
 cstorms.1765.name: "Фильтры прочищены"
 cstorms.1765.desc: "[Owner.GetScientistPluralCapital] устранили неполадки в работе гидропонных систем и нехватку воды на планете §H[this.GetName]§!. Системы водоснабжения в колонии теперь могут отфильтровывать самые сложные загрязнения — даже вызванные бурей звездной пыли.\n\nЭти улучшения в водной инфраструктуре можно приспособить для совершенствования ирригации по [Owner.GetName::всему|||fem:всей|||pl:всем] [Owner.GetName&dat]."
 #Flightless Fauna
 cstorms.1771.name: "Нелетающая фауна"
 cstorms.1771.desc.common: "[Owner.GetScientistPluralCapital] мира [this.GetName] сообщают, что местные птицы сильно страдают из-за воздействия §Yгравитационной бури§!.\n\nПринесенные бурей гравитационные возмущения вызвали волнения в атмосфере, из-за чего некоторые виды птиц оказались неспособны летать."
 cstorms.1771.desc.default: "Мало того что эти пернатые теперь не могут толком охотиться, они и сами стали легкой добычей для хищников.\n\nЕсли мы не вмешаемся, пострадавшим видам птиц может грозить полное вымирание."
 cstorms.1771.desc.swarm: "Мы устроим славный пир."
 cstorms.1771.a: "Легкая добыча."
 cstorms.1771.b: "Природа сама разберется."
 cstorms.1771.c: "Устроить заповедник для пострадавших видов."
 cstorms.1771.evopred: "Взять образцы их ДНК перед тем, как они вымрут."
 d_avian_reserve: "Заповедник для птиц"
 d_avian_reserve_desc: "Здесь создан закрытый природный заповедник для уязвимых видов пернатых."
 cstorms.1776.name: "Снова в небо"
 cstorms.1776.desc: "§Y$gravity_storm$§! миновала, и временно потерявшая возможность летать фауна планеты [this.GetName], для которой ранее мы соорудили заповедник, снова взмыла в небо.\n\nИ хотя многие особи вернулись в привычные места обитания, немалая часть осталась в заповеднике, явно не желая покидать столь удобное и безопасное место.\n\nТеперь у нас есть уникальная возможность изучить местных пернатых с близкого расстояния."
 cstorms.1776.a: "Великолепные новости."
 ################
 #Storm Events #
 ################
 #Eye of the Storm
 cstorms.1801.name: "Око бури"
 cstorms.1801.desc: "В системе [from.GetName] бушует [fromfrom.GetName], и наши датчики засекли в самом ее центре нечто странное, обладающее большой массой. Это необычное явление заслуживает подробного изучения, но нам следует поспешить, пока буря не рассеялась или не покинула систему."
 EYE_OF_THE_STORM_PROJECT: "$cstorms.1801.name$"
 EYE_OF_THE_STORM_PROJECT_DESC: "Сканирование показало, что [fromfrom.GetName] в системе [this.GetName] несет в самом центре завихрения нечто, обладающее большой массой. Датчики дальнего действия не могут определить причину такого необычного феномена. Чтобы в этом разобраться, придется отправить экспедицию прямо в око бури."
 cstorms.1805.name: "В центре вихря"
 cstorms.1805.desc: "Прилетев в самое око космической бури в системе [from.GetName], [leader.GetName] [leader.GetAXX::выяснил|||fem:выяснила], на что именно среагировали наши датчики. Это огромное скопление [from.star.GetEarnedResources&gen], от которого и подпитывается эта необычная буря.\n\nНаучному кораблю удалось собрать часть ресурсов, однако затем яростная буря вышвырнула его прочь. Корабль едва уцелел, но благодаря полученным данным наши инженеры смогут улучшить функционирование кораблей в экстремальных условиях бурь."
 cstorms.1805.desc.traumatized: "К сожалению, [leader.GetName] [leader.GetAXX::получил|||fem:получила] от пережитого травму, последствия которой будут сказываться еще долго."
