 #Storm in a Box
 cstorms.1816.name: "Дрейфующая капсула"
 cstorms.1816.desc: "По системе §H[this.GetName]§! дрейфует загадочная капсула. Вооружения на ней не видно, на сигналы она не отвечает.\n\nПервичное сканирование показало, что поврежденная внешняя оболочка сделана из высокотехнологичных материалов и с использованием незнакомых нам инженерных решений. Необходимо дальнейшее изучение."
 cstorms.1816.a: "Изучить."
 STORM_IN_A_BOX_INVESTIGATE_PROJECT: "Изучить капсулу"
 STORM_IN_A_BOX_INVESTIGATE_PROJECT_DESC: "По системе §H[this.GetName]§! дрейфует загадочная и явно поврежденная капсула. Мы ничего не знаем ни о ее происхождении, ни о назначении. Вооружения на капсуле не видно, так что мы, по-видимому, сможем безопасно изучить ее конструкцию и почерпнуть новые знания."
 cstorms.1820.name: "Штормовая ловушка"
 cstorms.1820.desc: "[this.leader.GetName] [this.leader.GetAXX::пришел|||fem:пришла] к выводу, что загадочная капсула, дрейфующая в системе [solar_system.GetName], является древней «штормовой ловушкой» и некогда могла быть частью большой защитной сети.\n\nВходное отверстие прочно запечатано, но наши сканеры регистрируют внутри сжатую энергию и материю пойманной космической бури.\n\nЕсли мы поймем, как открывается этот удивительный резервуар, мы сможем многое узнать о защите от бурь, однако есть риск случайно выпустить то, что заточено в капсуле."
 cstorms.1820.a: "Это, несомненно, стоит изучить."
 cstorms.1820.b: "Слишком опасно. Лучше не трогать."
 STORM_IN_A_BOX_TRAP_PROJECT: "Открыть штормовую ловушку"
 STORM_IN_A_BOX_TRAP_PROJECT_DESC: "Древняя штормовая ловушка мирно дрейфует в пустоте космоса, удерживая в себе спрессованную космическую бурю. Открыв ее, мы многое узнаем об управлении бурями и о защите от них, но есть риск случайно выпустить бурю."
 cstorms.1826.name: "Буря на свободе"
 cstorms.1826.desc: "[leader.GetName] сообщает, что изучение устройства древней штормовой ловушки завершено. Удалось разблокировать ее входное отверстие. Когда оно открылось, в системе [solar_system.GetName] разразилась §H[from.GetStormType]§!.\n\nХоть нам и не удалось до конца понять, как устройству удавалось сдерживать бурю, изучение его сложного механизма подарило нам потрясающие открытия в области устойчивых к бурям материалов и сооружений. Эти знания помогут нам лучше справляться с космической непогодой."
 cstorms.1826.storm_tt: "В системе [solar_system.GetName] разразится слабая §Yкосмическая буря§!"
 storm_trap_insight_modifier: "Знания о штормовых ловушках"
 storm_trap_insight_modifier_tt: "Снижает отрицательные эффекты от §Yкосмических бурь§! на §G10%§!."
 cstorms.1835.desc: "Примите наши соболезнования, [this.GetSpeciesNamePlural]! Мы заметили разрушительную бурю, что бушует на территории [this.GetName&gen].\n\nЕстественно, мы очень опечалены новостями о нанесенном ущербе. Ох, как же мы рыдали, узнав об этом! Мы очень хотим помочь вам, поэтому… предлагаем уникальную и очень выгодную сделку! Только сегодня!\n\nКупите эти приборы, первоклассные приборы! Лучшие на рынке! С ними следующая буря не застанет вас врасплох. Ну как, согласны?"
 cstorms.1835.a: "Мы принимаем ваше предложение."
 cstorms.1835.b: "Нас это не интересует."
