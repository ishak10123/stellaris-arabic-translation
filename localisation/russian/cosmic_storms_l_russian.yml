 #### Storm Chasers #
 ########################################
 origin_storm_chasers: "Охотники за бурями"
 origin_storm_chasers_desc: "Нет на свете трудности, которую бы они не взялись преодолеть, нет вершины, которой они не бросили бы вызов, — и нет бури, которую они оставили бы в покое.\n\nВ основе этой цивилизации лежит стремление к острым ощущениям — со всеми недостатками этого стремления."
 origin_tooltip_storm_chasers_effects: "- $LEADERS_TRAITS$ «['concept_storm_rider']»\n- $mod_planet_jobs_unity_produces_mult$ на планете за каждое §Yбуревое сооружение§!: §G+$@storm_chasers_storm_building_unity_produces_mult|%0$§!\n- Столичные сооружения автоматически дают модификаторы §Yзащиты от бурь§!, когда изучены соответствующие технологии. \n- Вероятность появления §Yкосмической бури§! на территории государства: §G+100%§! \n- Вероятность появления §Yтехнологий космических бурь§!: §G+175%§!\n- Доступ к ['concept_weather_forecasting_mode', режиму метеопрогноза]\n- $ADDITIONAL_TECHNOLOGIES_STRING$$TABBED_NEW_LINE$- £physics£ ['technology:tech_storm_prediction_1']"
 START_SCREEN_STORM_CHASERS: "Что есть жизнь без острых ощущений? Воспылать огнем и покинуть мир с фанфарами — так мы жили испокон веков. Но когда побиты все рекорды и покорены все вершины, куда двигаться дальше?\n\nНаша планета крайне неспокойна. Здесь постоянно бушуют штормы, а потопы привычны, как ветер. Но если обернуть эти необыкновенные условия себе на пользу, мы совершим новый подвиг: призовем настоящую космическую бурю.\n\nНаши предки, покрывшие себя неувядающей славой, преодолели все испытания, которые мог дать им родной мир. Теперь пришло время и нам очертя голову броситься в бездну! Будет непросто, но, как говорится, только смелым покоряются моря."
 #Storm Rider Trait
 leader_trait_storm_rider_desc: "Оседлавшие бурю живут в поисках адреналина и раскрывают потенциал в вихрях космической бури. Если дать им место в совете, то их полевые бонусы сменяются бонусами совета."
 mod_trait_storm_rider: "\n$t$Эффекты признаков усиливаются, пока этот лидер внутри космической бури."
 leader_trait_storm_rider_name: "Оседлавший бурю"
 leader_trait_storm_rider_commander: "$leader_trait_storm_rider_name$"
 leader_trait_storm_rider_commander_desc: "$leader_trait_storm_rider_desc$"
 leader_trait_storm_rider_scientist: "$leader_trait_storm_rider_name$"
 leader_trait_storm_rider_scientist_desc: "$leader_trait_storm_rider_desc$"
 leader_trait_storm_rider_official: "$leader_trait_storm_rider_name$"
 leader_trait_storm_rider_official_desc: "$leader_trait_storm_rider_desc$"
 #Storm Chasers specific Progress Events
 progress.2.desc.storm.normal: "«Зацените эту мелочь!» — как иногда говорит [Root.Owner.GetScientist].\n\n$progress.2.desc.storm.outro$"
 progress.2.desc.storm.gestalt: "Мы дрожим от нетерпения.\n\n$progress.2.desc.storm.outro$"
 progress.2.desc.storm.outro: "[From.GetName] — прямо здесь есть инопланетная жизнь! Пообщаемся мы с этими дикими существами еще нескоро, но по крайней мере, на нашем космическом пути мы не одиноки.\n\nПохоже, галактику все же могут населять бесчисленные формы жизни."
 progress.3.desc.storm.normal: "«Невероятно! — [ruler.GetAXX::воскликнул|||fem:воскликнула] [ruler.GetRegnalName]. — Целый новый мир, здесь будет где развернуться!»\n\nМы еще не закончили разбивать на месте колониального корабля базовый лагерь, а разведчики уже готовы упиваться новыми впечатлениями, которые подарит им этот мир."
 progress.3.desc.storm.gestalt: "Поразительное открытие! Новый мир, полный возможностей!\n\nМы еще не закончили разбивать на месте колониального корабля базовый лагерь, а узлы-разведчики уже готовы упиваться новыми впечатлениями, которые подарит им этот мир."
 progress.3.a.storm: "Вперед."
 progress.4.desc.storm: "Мы наконец-то получили ответ на сигналы, отправленные в глухую пустоту космоса! Это инопланетная цивилизация, равная нам по технологическому развитию. Должно быть, они вышли на галактическую арену примерно в то же время, что и мы.\n\nИх появление сулит нам небывалые впечатления. Станут ли они нашими единомышленниками и друзьями? Или соперниками, испытывающими нас на прочность? В любом случае трепет перед неизведанным манит нас вперед."
 progress.4.h.storm: "Очень интересно."
 progress.5.desc.storm.normal: "Мы обнаружили предразумные формы жизни на планете [From.Planet.GetName]. Наши [Root.Owner.GetScientistPlural] считают так: «Пока что они не представляют из себя ничего особенного, но дай им время, и они себя покажут!»\n\nОднако сейчас они лишь стоят на пороге разумности. Будет интересно наблюдать за их развитием."
 progress.5.desc.storm.gestalt: "Мы обнаружили предразумные формы жизни на планете [From.Planet.GetName].\n\nМы с восторгом представляем, во что они превратятся со временем, но сейчас они лишь стоят на пороге разумности. Будет интересно наблюдать за их развитием."
 progress.5.h.storm: "Дико интересно."
 progress.6.desc.storm: "Мы наконец-то получили ответ на сигналы, отправленные в глухую пустоту космоса! Однако первые впечатления сомнительные: этот народ не уважает наш уклад и на контакт особо не идет. Лучше пока что к ним не лезть."
 progress.6.h.storm: "Какие-то они унылые."
 pirate.1.desc.storm: "Космические пираты! От самих этих слов захватывает дух, а тут еще на нас вышла группа, которая называет себя §S[pirate_band.GetName]§!.\n\nМы уважаем такой образ жизни, но их влияние на наши торговые пути оставляет желать лучшего."
 pirate.2.j.storm: "Очень неприятно."
 ### STORMFALL SITUATION START ###
 situation_stormfall: "Праматерь всех бурь"
 situation_stormfall_type: "Инцидент зарождения"
 situation_stormfall_desc: "Бурная погода на планете [owner.capital_scope.GetName] — наглядная демонстрация силы штормов. Если мы сумеем подчинить эту погоду себе, наши познания примут поистине космический масштаб. Ускорить наступление совершенного шторма поможет возведение сооружений для притяжения бурь."
 situation_stormfall_monthly_change_tooltip: "Мы научимся покорять эти бури."
 situation_stormfall_outcome: "Рождение космической бури."
 stage_stormfall_effects: "Мы должны научиться управлять космическими бурями."
