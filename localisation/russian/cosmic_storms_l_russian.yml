 cstorms.2295.a: "Пусть [Root.GetLeaderName] насладится."
 cstorms.2295.b: "[Root.GetLeaderName] не [Leader.GetAXX::должен|||fem:должна] этим наслаждаться."
 cstorms.2295.a.psionic: "Жертвы все еще стенают."
 cstorms.2295.a.psionic_gestalt: "Они всё ещё единым голосом вопят в агонии."
 cstorms.2295.a.gestalt: "Дисгармония сеет хаос."
 cstorms.2300.name: "Все сказано"
 cstorms.2300.desc: "Мы уже давно пытаемся открыть последние помещения Патриотического института Торжества. Тем временем с нижних лабораторных уровней мы получили обескураживающий отчет. адАккарийские ученые считали, что в каждом живом существе, даже внутри разумных машин есть некая искра. Под впечатлением от участившихся космических бурь они назвали эту искру «внутренней бурей», ураганом желаний и внутренних сил, которые движут любым живым разумным существом. Подвергая внутреннюю бурю экстремальным переживаниям, можно обрести способности невероятной силы.\n\nВпервые такой эффект был обнаружен §SальАттой Ландеером§!, когда он находился во вражеском плену. Впоследствии он стал ученым и убедил Высочайшее командование профинансировать дальнейшие испытания Торжества. Журналы не сообщают, что случилось с §SЛандеером§!, но из событий на флотском кладбище мы знаем, что судьба его была печальной.\n\nВ следующих отчетах упоминается о «более эффективном» способе высвобождения внутренней бури. Он заключается не в том, чтобы применять невероятные физические пытки, а в том, чтобы пробудить в жертве неотвратимый смертельный ужас. Чтобы этот эффект был массовым, Собрание планировало транслировать сигнал через широкую сеть своих агитационных станций."
 cstorms.2300.desc.psionic: "Мы сумели записать псионические шепоты из наблюдательных камер:\n\n§LВыпустите меня, прошу, я был честным гражданином!\nВ моих снах теперь бесконечная буря. Она зовет меня.\nЯ не понимаю, в чем дело. Мы выполняли задачи с отличием — за что они так с нами?\nВнутри каждого из нас таится сила. Они хотят ей воспользоваться. Нельзя отдать им ее.\nНе говорите ерунды, они просто хотят спасти Благодетельствующее Собрание. Мы должны подчиниться.\nМне шепчут спутники. Теперь я могу дотянуться умом до другого края галактики.\nЯ видела, они что-то сконструировали. Оно может сделать то же самое с кем угодно и где угодно.\nНас спасут, просто дайте им то, чего они хотят!\nТы не понимаешь, если они так поступают с нами, то они так же поступят и со всеми.\nМы можем вырваться.\nНо тогда мы…\nОни все равно нас убьют. Как только этот агрегат заработает. Они всех нас убьют.\nМне страшно, я не хочу умирать. Я хочу жить. Нет, пожалуйста.\nЯ слышу последний этап. Они хотят знать, согласны ли мы.§!"
 cstorms.2300.b: "Мы должны завладеть этой силой."
 cstorms.2300.a.psionic: "Какая печальная судьба."
 cstorms.2300.a.psionic_hive_robot: "Не повезло."
 cstorms.2300.b.psionic: "Что может быть благороднее самопожертвования?"
 cstorms.2300.b.psionic_hive_robot: "Достойная жертва."
 cstorms.2305.name: "Призыватель бури"
 cstorms.2305.desc.start: "Мы обнаружили гигантский ангар. Большая его часть занята невероятно сложной сетью проводов, труб и электронных приборов — все они подключены к громадной, но пустой ракетной шахте. Судя по внешнему виду, вся эта сеть была подключена к объекту размером примерно с корвет.\n\nВ журналах сообщается, что здесь собирали устройство под названием §lпризыватель бури§!, и он был успешно запущен в системе адСула. Связь с призывателем была потеряна, но его §Gмодуль питания§! остается на месте."
 cstorms.2305.desc.end.default: "Услышав это название, члены нашей команды пришли в необъяснимую ярость, они принялись рвать кабели и уничтожать панели. Даже устный приказ их не сразу успокоил. Похоже, мы приближаемся к разгадке."
 cstorms.2305.desc.end.psionic: "Пока [Root.GetLeaderName] [Leader.GetAXX::осматривал|||fem:осматривала] пустое помещение, псионические шепоты появились снова.\n§L«Теперь вы видите? Сначала мы не знали, что они строят. Не знали, что они от нас избавятся. Одни задумывали месть. Другие мечтали о свободе. Кто-то слышал зов бурь. Мы должны были положить этому конец, понимаете? Должны были. Мы не могли больше этого терпеть».§!"
 cstorms.2305.desc.end.gestalt: "Прочитав название устройства, наши [controller.GetIndividualNamePlural&nom] выяснили, как был активирован §lпризыватель§! и как именно его сигнал пронесся по ретрансляторам агитационных станций, наконец дойдя до конечной точки.\n\nИ мы беззащитны перед этой участью."
 cstorms.2305.desc.default: "$cstorms.2305.desc.start$\n\n$cstorms.2305.desc.end.default$"
 cstorms.2305.desc.psionic: "$cstorms.2305.desc.start$\n\n$cstorms.2305.desc.end.psionic$"
 cstorms.2305.desc.gestalt: "$cstorms.2305.desc.start$\n\n$cstorms.2305.desc.end.gestalt$"
 cstorms.2310.name: "Последний этап"
 cstorms.2310.desc.start: "Наконец Торжество открыло нам последний из своих секретов: последний этап.\n\nЕго помещения были усеяны высохшими трупами адАккарийских ученых, истерзанных в клочья осколками камня, фрагментами металла, пластмассы и прочего мусора. Что-то пронеслось в гневе по этим коридорам, сметая все на своем пути.\n\nНо истинный"
 cstorms.2310.desc.piece.default: "ужас"
 cstorms.2310.desc.piece.authgen: "восторг"
 cstorms.2310.desc.end: "еще ждал нас впереди.\nМы обнаружили ряд тесных камер, где томились полдесятка заключенных. На смотровых экранах они были отмечены как §Gисточники питания для призывателя§!, но это были явно юные граждане Собрания, подключенные к десяткам трубок и кабелей. Жидкость внутри камер поддерживала их в пограничном состоянии между жизнью и смертью, а их тела были окружены силовым полем, сравнимым по мощности с энергией внутри бури, бушующей вокруг адСула.\n\nНемногие оставшиеся целыми экраны ожили и высветили единственную просьбу:\n§LВСПОМНИТЕ НАС | СКАЖИТЕ НАШИ ИМЕНА | СКАЖИТЕ НАШИ ИМЕНА.§!\n\nМы записали имена этих юных граждан. Перед последней камерой мы вовсе оторопели: там была §SэнРида Диреен§! из Института Высочайшего Благодеяния, которая потушила огонь силой мысли.\n\nТеперь, вооружившись этими именами, мы готовы снова выйти на контакт с космической бурей."
 cstorms.2310.desc.default: "$cstorms.2310.desc.start$ $cstorms.2310.desc.piece.default$ $cstorms.2310.desc.end$"
 cstorms.2310.desc.authgen: "$cstorms.2310.desc.start$ $cstorms.2310.desc.piece.authgen$ $cstorms.2310.desc.end$"
 cstorms.2310.a: "Отлично!"
 #The Storm's Swansong
 cstorms.2320.name: "Буря"
 cstorms.2320.desc: "СКАЖИТЕ НАШИ ИМЕНА\n\nСКАЖИТЕ НАШИ ИМЕНА\n\nСКАЖИТЕ | НАШИ | ИМЕНА"
 cstorms.2320.a: "Мы видели, что Собрание сделало с вами."
 cstorms.2320.b: "Что случилось с адАккарийским Собранием?"
 cstorms.2320.c: "Где призыватель бури?"
 cstorms.2320.d: "Мы знаем ваши имена."
 cstorms.2320.a.resp: "ОНИ БЕЗ ЖАЛОСТИ ПРИЧИНЯЛИ\n\nБОЛЬ И ГНЕВ И ГОРЕ И СТРАХ\n\nОНИ КАК КЛЫКИ КАК ЧЕЛЮСТИ ОНИ\nЖРАЛИ И ИЗРЫГАЛИ НАС, ПРИЧИНЯЛИ\n\nБОЛЬ И ГНЕВ И ГОРЕ И СТРАХ\n\nМЫ РАЗРУШЕНЫ МЫ ПОГИБЛИ ТЕПЕРЬ МЫ\n\nБОЛЬ И ГНЕВ И ГОРЕ И СТРАХ"
 cstorms.2320.b.resp: "САМОДОВОЛЬНЫЕ И ВЫСОКОМЕРНЫЕ И БЕЗЖАЛОСТНЫЕ\nГОРДЕЛИВЫЕ | ЖЕСТОКИЕ | ОДЕРЖИМЫЕ\nНЕСЛИ СМЕРТЬ НЕСЛИ СТРАДАНИЕ\n\nМЫ ДОЛЖНЫ БЫЛИ ДОЛЖНЫ БЫЛИ ДОЛЖНЫ БЫЛИ ДОЛЖНЫ БЫЛИ ДОЛЖНЫ БЫЛИ ДОЛЖНЫ БЫЛИ ДОЛЖНЫ БЫЛИ ДОЛЖНЫ БЫЛИ\nБЫТЬ | НЕ-БЫТЬ | РАЗ-БЫТЬ\n\nМЫ\nБЕЖИМ ПО ПЕРЕДАЧАМ | ОТПРАВЛЯЕМ СИГНАЛ | ОТРАВЛЯЕМ УМЫ \nЦЕПЕНЕЮТ | ТУСКНЕЮТ | ПРОПАДАЮТ | ПРОПАДАЮТ ВО ТЬМЕ\nРАССЕИВАЮТСЯ ПО ГАЛАКТИКЕ И ИСЧЕЗАЮТ БЕЗ ВЕСТИ"
 cstorms.2320.c.resp: "МЫ\nМЫ ЕСТЬ ЩИТ | ЗАЩИТИМ ВАС\n\nМЫ\nСТАЛИ КОЛЫБЕЛЬЮ | СОХРАНИМ\n\nИ УБАЮКАЕМ ДО ЗАБВЕНИЯ | СПИТЕ СПИТЕ СПИТЕ УМРИТЕ\n\n§lБУРЯ§! §RОТВРАТИТЕЛЬ§!\nИ БОЛЬШЕ НЕ ПРОСЫПАЙТЕСЬ"
 cstorms.2325.desc: "СКАЖИТЕ НАШИ ИМЕНА | СКАЖИТЕ НАШИ ИМЕНА | СКАЖИТЕ НАШИ ИМЕНА\n\nСЕЙЧАС §g(СЕЙЧАС)§! СЕЙЧАС §g(СЕЙЧАС)§!\n\nСКАЖИТЕ НАШИ ИМЕНА | СКАЖИТЕ НАШИ ИМЕНА СКАЖИТЕ НАШИ ИМЕНА\n\nСКАЖИТЕ | НАШИ | ИМЕНА | СЕЙЧАС ЖЕ"
 cstorms.2325.d: "Хорошо, вот ваши имена…"
 cstorms.2330.desc: "§LМы зачитываем все имена, обнаруженные во время раскопок. Когда мы произносим последнее имя, буря вдруг утихает.§!"
 cstorms.2330.a: "Вы еще здесь?"
 cstorms.2335.desc: "Мы снова можем думать! §g(думать думать думать)§!\nВокруг так много голосов! §g(думают говорят желают мечтают)§!\nСтолько уникальных личностей §g(ты и я и они и оне)§!\n\nВы вернули нам рассудок §g(путешествуя расшифровывая открывая)§!\nНо дав нам имена, вы получили над нами власть… §g(Нет, только не опять!)§!\nЧего вы хотите от нас? §g(отпустите отпустите отпустите отпустите отпустите)§!"
 cstorms.2335.a: "Теперь вы свободны."
 cstorms.2335.b: "Подчинитесь нам и отдайте призыватель бури."
 cstorms.2340.desc: "Свободны.\n\nВы хотите нас освободить? §g(Свободны?)§!\n\nНевозможно. §g(Это невозможно)§!\nВы наверняка обманываете. §g(А как же призыватель бури?)§!"
 cstorms.2340.a: "Мы его уничтожим."
 cstorms.2345.desc: "Боль и гнев и горе и страх. §g( БОЛЬ | ГНЕВ | ГОРЕ | СТРАХ )§!\n\nЭто все, на что мы способны.\n\nЭТО ВСЕ НА ЧТО МЫ СПОСОБНЫ БОЛЬ ГНЕВ ГОРЕ СТРАХ\n§gБОЛЬ ГНЕВ ГОРЕ СТРАХ БОЛЬ ГНЕВ ГОРЕ СТРАХ БОЛЬ ГНЕВ ГОРЕ СТРАХ ГНЕВ ГОРЕ СТРАХ БОЛЬ ГНЕВ ГОРЕ СТРАХ БОЛЬ ГНЕВ ГОРЕ СТРАХ БОЛЬ ГНЕВ ГОРЕ СТРАХ БОЛЬ ГНЕВ ГОРЕ СТРАХ БОЛЬ ГНЕВ ГОРЕ СТРАХ БОЛЬ ГНЕВ ГОРЕ СТРАХ БОЛЬ ГНЕВ ГОРЕ СТРАХ БОЛЬ ГНЕВ ГОРЕ СТРАХ БОЛЬ ГНЕВ ГОРЕ БОЛЬ ГНЕВ ГОРЕ СТРАХ БОЛЬ ГНЕВ ГОРЕ СТРАХ БОЛЬ ГНЕВ ГОРЕ СТРАХ ГНЕВ ГОРЕ СТРАХ БОЛЬ ГНЕВ ГОРЕ СТРАХ БОЛЬ ГНЕВ ГОРЕ СТРАХ БОЛЬ ГОРЕ СТРАХ БОЛЬ ГНЕВ ГОРЕ СТРАХ БОЛЬ ГНЕВ ГОРЕ СТРАХ БОЛЬ ГНЕВ СТРАХ БОЛЬ ГНЕВ ГОРЕ СТРАХ БОЛЬ ГНЕВ ГОРЕ СТРАХ БОЛЬ ГНЕВ ГОРЕ§!"
 cstorms.2345.a: "Гневайся сколько хочешь, наш вечный слуга."
 cstorms.2350.name: "Никакой больше бури"
 cstorms.2350.desc: "В буре образовалась прореха, через которую мы увидели §lпризыватель бури§!. Как все-таки странно, что этот небольшой агрегат стал причиной таких страстей, раздоров и жертв. Одним своим существованием он погубил некогда могучую империю.\n\nПростой последовательностью команд мы запустили механизм самоуничтожения призывателя бури. Как только утихли отголоски взрыва и обломки разлетелись по системе, начала успокаиваться и буря. Вместе с ней во всем мире, родном для адАккарийского Собрания, исчез тот странный покров.\n\nНаконец-то их бесконечный кошмар подошел к концу."
 cstorms.2350.a: "Пусть ваши имена никогда не будут забыты."
 cstorms.2355.name: "Боль гнев горе страх"
 cstorms.2355.desc: "Буря извивалась и бурлила в бессильной злобе, но не могла причинить вреда ни нам, ни §lпризывателю бури§!.\n\nМы приказали запертым внутри голосам провести нас сквозь вихри и присвоили величайшее достижение Собрания.\n\nВпрочем, родная планета адАккарии осталась для нас недоступна: все пути к Патриотическому институту Торжества теперь навеки закрыты. Но слова, услышанные в реве бури, остались в нашей памяти.\n\nБоль, гнев, горе, страх.\nСкоро галактика тоже познает их."
 cstorms.2355.a: "Иногда без жертв не обойтись."
 MESSAGE_INSTITUTE_SPAWNED_STORM_TITLE: "Призвана буря"
 MESSAGE_INSTITUTE_SPAWNED_STORM: "§Y100§! £pop£ §Hпоселений§! на планете $PLANET$ призвали себя, обратившись бурей $STORM$ в системе $SYSTEM$."
 artifact_adakkaria_research: "Тайны адАккарии"
 artifact_adakkaria_research_desc: "Глубже вникните в секреты адАккарии."
 artifact_adakkaria_research_completed: "$artifact_adakkaria_research$"
 artifact_adakkaria_research_completed_desc: "Мы подчинили древние знания адАккарии своим целям."
 #Secrets of the adAkkaria Convention
 project_adakkaria_secrets_of: "Тайны адАккарийского Собрания"
 project_adakkaria_secrets_of_DESC: "Институт Торжества еще таит в себе так много нераскрытых знаний. Рискнем ли мы дальше изучать эти адАккарийские эксперименты?"
 cstorms.2365.name: "Раскрытый потенциал"
 cstorms.2365.desc.start: "Углубившись в материалы исследований адАккарийского Собрания, мы обнаружили, что его ученые не придерживались какого-либо известного нам стандарта. Их методология была примитивной, а выводы — практически очевидными. Вместо научной этики и осмотрительности во время исследований поощрялась безнравственность. Но чем больше жестокости ученые проявляли по отношению к объектам, тем больше поддержки они получали от Высочайшего командования.\n\nВпрочем, на ранних этапах ситуация была совершенно иной: о подопытных заботились, а к процессу пробуждения ими «внутренней бури» относились с уважением и тактом. При сравнении статистики на ранних и поздних этапах программы открылся страшный факт: не было никакой корреляции между жестокостью пыток и числом пробужденных. Огромное число подопытных перенесло ужасные страдания и погибло напрасно."
 cstorms.2365.desc.end.default: "Теперь нам стали понятны рабочие принципы. Мы сделали выводы из ошибок адАккарийского Собрания и теперь можем сами вдохновлять сограждан взращивать внутреннюю бурю и напитываться штормовыми силами. Однако есть опасность, что некоторые из таких §Gслившихся с бурей§! индивидов откликнутся на ее зов и со временем сами станут источниками бури."
 cstorms.2365.desc.end.gestalt: "Теперь нашему коллективному Разуму стали понятны рабочие принципы. Мы сделали выводы из ошибок адАккарийского Собрания, и теперь некоторые из нас могут сами взращивать внутреннюю бурю и напитываться штормовыми силами. Однако есть опасность, что такие §Gслившиеся с бурей§! узлы откликнутся на ее зов и со временем сами станут источниками бури."
 cstorms.2365.desc.default: "$cstorms.2365.desc.start$\n\n$cstorms.2365.desc.end.default$"
 cstorms.2365.desc.gestalt: "$cstorms.2365.desc.start$\n\n$cstorms.2365.desc.end.gestalt$"
 cstorms.2365.a: "Изучите эти знания. Но осторожно!"
 cstorms.2365.b: "Нет, не надо ворошить эти тайны."
 cstorms.2365.a.tt: "• Шанс, что §Y100§! £pop£ §Hпоселений§! во время бури получат признак «$Name_Storm_Fused$», увеличивается в 4 раза.\n• Каждые 20 лет §Y100§! £pop£ §Hпоселений§! могут погибнуть и превратиться в бурю.\n• Потенциал взращивания: +5% к счастью во всём государстве."
 Name_Storm_Fused: "Слившиеся с бурей"
 Name_Storm_Fused_affix: "Слившиеся с бурей" #The trailing space is intentional, to give a space before the species name on the species screen
