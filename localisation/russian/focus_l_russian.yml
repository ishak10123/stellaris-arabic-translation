 development.205.fail: "£trigger_no£ $development.205.req$"
 development.205.success: "£trigger_yes£ $development.205.req$"
 development.215.name: "Назначить чиновника губернатором"
 development.215.desc: ""
 development.215.hint: "Во вкладке «$colony_view_tab_planet_summary$» окна £interface£ «['concept_colony_view']» или в окне £interface£ «['concept_planets_and_sector_view', Обзор планет и секторов]» назначьте £official£ ['concept_official', чиновника] на пост ['concept_governor', губернатора] £sector£ ['concept_sector', сектора] или £planet£ ['concept_planet', планеты]."
 development.215.lore: "§L«Вождя восхваляют. Полководца боятся. Но настоящий управленец не таков: когда он делает работу правильно, этого никто не замечает». — Префект Флент шар Астатенн§!"
 development.215.req: "Чиновник назначен губернатором"
 development.215.fail: "£trigger_no£ $development.215.req$"
 development.215.success: "£trigger_yes£ $development.215.req$"
 development.220.name: "Вступить в Галактическое сообщество"
 development.220.desc: ""
 development.220.hint: "Примите приглашение вступить в ['concept_galactic_community', Галактическое сообщество] или откройте «§H$concept_galactic_community$§!» над £interface£ ['concept_outliner', планировщиком], когда организация будет сформирована, и подайте заявку на вступление."
 development.220.lore: "§LКогда-то мы были одиноким семенем. Теперь мы — часть сада, что цветет среди звезд». — Черные Лепестки, первый спикер Галактического сообщества§!"
 development.220.req: "Членство в Галактическом сообществе"
 development.220.fail: "£trigger_no£ $development.220.req$"
 development.220.success: "£trigger_yes£ $development.220.req$"
 development.225.name: "Получить одолжение"
 development.225.desc: ""
 development.225.hint: "Во вкладке «$contacts_view_tab_contacts$» окна £interface£ «['concept_contacts_view']» свяжитесь с другим ['concept_empire', государством] и выберите вариант «§HУлучшить отношения§!», пока оно не даст вам ['concept_favor', одолжение].$focus_other$"
 development.225.lore: "§L«Одолжения — это не деньги, но расходятся они как монеты. У них нет веса, но они склоняют чаши весов дипломатии».§!"
 development.225.req: "Получено одолжение"
 development.225.fail: "£trigger_no£ $development.225.req$"
 development.225.success: "£trigger_yes£ $development.225.req$"
 development.230.name: "Повысить уровень чиновника"
 development.230.desc: ""
 development.230.hint: "Назначьте £official£ ['concept_official', чиновника] в состав ['concept_council', совета], сделайте его ['concept_governor', губернатором], представителем в ['concept_galactic_community', Галактическом сообществе] или в ['concept_federation', федерации].\n\nТакие должности — это источник ценного опыта, который поможет командиру повысить уровень и приобрести новые ['concept_leader_traits', черты]."
 development.230.lore: "§L«Первый урок управления: если все недовольны, значит, вы, скорее всего, все делаете правильно». — Испытание скукой, официальное руководство§!"
 development.230.req: "Повышен уровень чиновника"
 development.230.fail: "£trigger_no£ $development.230.req$"
 development.230.success: "£trigger_yes£ $development.230.req$"
 development.300.name: "Построить рой Дайсона (80 ед. энергии)"
 development.300.desc: "(Производство должно быть не менее 80 ед. $energy$)"
 development.300.hint: "После изучения технологии £physics£ §Hроя Дайсона§! найдите подходящую ['concept_star', звезду] и постройте с помощью £construction_ship£ ['concept_construction_ship', строительного корабля] £megastructure£ ['concept_megastructure', мегасооружение] — §H$tech_dyson_swarm$§!."
 development.300.lore: "§L«Мы взглянули на эту звезду и подумали: а что если мы обложим ее налогами?»§!"
 development.300.req: "Построен рой Дайсона"
 development.300.fail: "£trigger_no£ $development.300.req$"
 development.300.success: "£trigger_yes£ $development.300.req$"
 development.305.name: "Построить дуговую печь"
 development.305.desc: "(В системе с как минимум 15 планетами)"
 development.305.hint: "После изучения технологии £engineering£ §Hдуговой печи§! найдите в £system£ ['concept_system', звездной системе] с как минимум 15 £planet£ ['concept_planets', планетами] §Hрасплавленный мир§! и постройте с помощью £construction_ship£ ['concept_construction_ship', строительного корабля] £megastructure£ ['concept_megastructure', мегасооружение] — §Hдуговую печь§!."
 development.305.lore: "§L«Солнце касается горизонта, и на мгновение вся конструкция вспыхивает золотом. Тысячи километров конструкций и стали... Это наша работа. Мы превратили эту планету в кузницу».§!"
 development.305.req: "Построена дуговая печь"
 development.305.fail: "£trigger_no£ $development.305.req$"
 development.305.success: "£trigger_yes£ $development.305.req$"
 development.310.name: "Заполучить три расы"
 development.310.desc: ""
 development.310.hint: "Во вкладке «$contacts_view_tab_contacts$» окна £interface£ «['concept_contacts_view']» предложите другому ['concept_empire', государству] заключить ['concept_diplomatic_pact', дипломатический пакт] «§H$PACT_migration_treaty$§!».$focus_other$"
 development.310.lore: "§L«Галактика обширна, полна знаний, умений и идей. Зачем ограничиваться лишь одним способом мышления?»§!"
