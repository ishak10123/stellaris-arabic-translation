 ###################
 # Core Focus Cards
 ###################
 core.100.name: "Основать колонию"
 core.100.desc: ""
 core.100.hint: "Создайте колонию на обитаемой £planet£ ['concept_planet', планете] с помощью £colony_ship£ ['concept_colony_ship', колониального корабля]."
 core.100.lore: "§L«Новый мир — это не просто новый актив, это ответственность». — Руководство по управлению колониями, издание 223-е.§!"
 core.100.req: "Основана колония"
 core.100.fail: "£trigger_no£ $core.100.req$"
 core.100.success: "£trigger_yes£ $core.100.req$"
 core.102.name: "Задать категорию колонии"
 core.102.desc: "(Не в столице)"
 core.102.hint: "Найдите колонию, не являющуюся столицей, откройте ее окно £interface£ «['concept_colony_view']», перейдите во вкладку «$colony_view_tab_planet_summary$» и смените ее ['concept_designation', категорию]."
 core.102.lore: "§L«Формально категории колоний повышают их эффективность. На деле же это просто попытка сделать вид, будто освоение этих бесхозных камней — это часть „экономической стратегии“».§!"
 core.102.req: "Изменена категория планетарной колонии"
 core.102.fail: "£trigger_no£ $core.102.req$"
 core.102.success: "£trigger_yes£ $core.102.req$"
 core.104.name: "Построить добывающую станцию"
 core.104.desc: ""
 core.104.hint: "С помощью £construction_ship£ ['concept_construction_ship', строительного корабля] постройте £mining_station£ ['concept_mining_station', добывающую станцию] на орбите подходящего ['concept_celestial_object', небесного тела]."
 core.104.lore: "§L«Для кого-то это просто астероид. Для нас же — куча кредитов в удобной оболочке».§!"
 core.104.req: "Построена добывающая станция"
 core.104.fail: "£trigger_no£ $core.104.req$"
 core.104.success: "£trigger_yes£ $core.104.req$"
 core.106.name: "Построить сооружение"
 core.106.desc: ""
 core.106.hint: "Во вкладке «$colony_view_tab_planet_summary$» окна £interface£ «['concept_colony_view']» щелкните по доступной §Hячейке сооружений§! и выберите, какое £building£ ['concept_building', сооружение] хотите построить."
 core.106.lore: "§L«Сегодня — стройка. Завтра — цивилизация».§!"
 core.106.req: "Построено сооружение"
 core.106.fail: "£trigger_no£ $core.106.req$"
 core.106.success: "£trigger_yes£ $core.106.req$"
 core.108.name: "Построить модуль космической базы"
 core.108.desc: ""
 core.108.hint: "Во вкладке «$starbase_view_tab_command$» окна £interface£ «['concept_starbase_view']» выберите доступный §Hмодуль§!."
 core.108.lore: "§L«Нам обещали приключение, но забыли сказать про месяцы тишины и рециркулируемого воздуха. Затем наконец включился торговый узел — хотя бы ради него уже можно было остаться».§!"
 core.108.req: "Построен модуль космической базы"
 core.108.fail: "£trigger_no£ $core.108.req$"
 core.108.success: "£trigger_yes£ $core.108.req$"
 core.110.name: "Построить сооружение на космической базе"
 core.110.desc: ""
 core.110.hint: "Во вкладке «$starbase_view_tab_command$» окна £interface£ «['concept_starbase_view']» выберите доступное §Hсооружение на космической базе§!."
 core.110.lore: "§L«Расположение в галактике определяет функцию космической базы. Сооружения его уточняют». — Орбитальное проектирование: теория и практика§!"
 core.110.req: "Построено сооружение на космической базе"
 core.110.fail: "£trigger_no£ $core.110.req$"
 core.110.success: "£trigger_yes£ $core.110.req$"
 core.112.name: "Принять традицию"
 core.112.desc: ""
 core.112.hint: "Во вкладке «$society_management_view_tab_traditions$» окна £interface£ «['concept_society_management_view']» примите ['concept_tradition', традицию]."
 core.112.lore: "§L«Народ без традиций не имеет цели. Народ, связанный традициями, стагнирует. Мудрость заключается в том, чтобы разумно выбирать, что сохранить, а что отбросить».§!"
 core.112.req: "Принята традиция"
 core.112.fail: "£trigger_no£ $core.112.req$"
 core.112.success: "£trigger_yes£ $core.112.req$"
 core.114.name: "Принять указ"
 core.114.desc: ""
 core.114.hint: "Во вкладке «§H$government_view_tab_policies_and_edicts$§!» окна £interface£ «['concept_government_view']» примите ['concept_edict', указ]."
 core.114.lore: "§L«Внимание, граждане! Официально вступил в действие Указ 827-B. Руководство по исполнению приводится в разделе 34, пункте 12. Желаем вам продуктивного дня!»§!"
 core.114.req: "Принят указ"
 core.114.fail: "£trigger_no£ $core.114.req$"
 core.114.success: "£trigger_yes£ $core.114.req$"
 core.116.name: "Завершить 3 программы"
 core.116.desc: ""
 core.116.hint: "Как только какая-либо ['concept_agenda'] будет завершена, откройте вкладку «$government_view_tab_council$» в окне £interface£ «['concept_government_view']» и начните ее, а затем выберите другую."
 core.116.lore: "§L«Правитель без программы подобен космическому кораблю без курса».§!"
 core.116.req: "Завершено 3 программы"
 core.116.fail: "£trigger_no£ $core.116.req$"
 core.116.success: "£trigger_yes£ $core.116.req$"
 core.118.name: "Накопить 1000 энергокредитов"
 core.118.desc: ""
 core.118.hint: "Чтобы накапливать £energy£ ['concept_energy', энергокредиты], постройте £district£ ['concept_generator_districts', энергетические районы] во вкладке «$colony_view_tab_planet_summary$» окна £interface£ «['concept_colony_view']».\n\nТакже вы можете строить £mining_station£ ['concept_mining_stations', добывающие станции] на орбитах богатых энергией ['concept_celestial_objects', небесных тел], покупать £energy£ §H['concept_energy', энергокредиты]§! на £market£ ['concept_market', рынке] или у других ['concept_empires', государств].$focus_other$"
 core.118.lore: "§L«Не в энергокредитах счастье, а в торговле!»§!"
 core.118.req: "Накоплено 1000 энергокредитов"
 core.118.fail: "£trigger_no£ $core.118.req$"
 core.118.success: "£trigger_yes£ $core.118.req$"
 core.120.name: "Накопить 1000 минералов"
 core.120.desc: ""
 core.120.hint: "Чтобы накапливать £minerals£ ['concept_minerals', минералы], постройте £district£ ['concept_mining_districts', горнодобывающие районы] во вкладке «$colony_view_tab_planet_summary$» окна £interface£ «['concept_colony_view']».\n\nТакже вы можете строить £mining_station£ ['concept_mining_stations', добывающие станции] на орбитах богатых минералами ['concept_celestial_objects', небесных тел], покупать £minerals£ §H['concept_minerals', минералы]§! на £market£ ['concept_market', рынке] или у других ['concept_empires', государств].$focus_other$"
 core.120.lore: "§L«Будете дышать слишком глубоко — заработаете силикоз. Задержите дыхание — потеряете сознание. В любом случае компания урежет зарплату».§!"
 core.120.req: "Накоплено 1000 минералов"
 core.120.fail: "£trigger_no£ $core.120.req$"
 core.120.success: "£trigger_yes£ $core.120.req$"
 core.122.name: "Накопить 1000 ед. пищи"
 core.122.desc: ""
 core.122.hint: "Чтобы накапливать £food£ ['concept_food', пищу], постройте £district£ ['concept_farming_districts', сельскохозяйственные районы] во вкладке «$colony_view_tab_planet_summary$» окна £interface£ «['concept_colony_view']».\n\nТакже вы можете покупать £food£ §H['concept_food', пищу]§! на £market£ ['concept_market', рынке] или у других ['concept_empires', государств].$focus_other$"
 core.122.lore: "§L«Сытое государство — сильное государство. Голодное государство рискует стать чьим-то чужим государством».§!"
 core.122.req: "Накоплено 1000 ед. пищи"
 core.122.fail: "£trigger_no£ $core.122.req$"
 core.122.success: "£trigger_yes£ $core.122.req$"
 core.124.name: "Накопить 1000 товаров массового спроса"
 core.124.desc: ""
 core.124.hint: "Чтобы накапливать £consumer_goods£ ['concept_consumer_goods', товары массового спроса], постройте £district£ ['concept_industrial_districts', промышленные районы] во вкладке «$colony_view_tab_planet_summary$» окна £interface£ «['concept_colony_view']», покупайте £consumer_goods£ §H['concept_consumer_goods', товары массового спроса]§! на £market£ ['concept_market', рынке] или у других ['concept_empires', государств].$focus_other$"
 core.124.lore: "§L«Товары массового спроса — это двигатель прогресса, культуры и всеобщего довольства. Что в них входит? Предметы роскоши? Современные инструменты? Очень удобная шляпа? Да».§!"
 core.124.req: "Накоплено 1000 товаров массового спроса"
 core.124.fail: "£trigger_no£ $core.124.req$"
 core.124.success: "£trigger_yes£ $core.124.req$"
 core.126.name: "Накопить 1000 сплавов"
 core.126.desc: ""
 core.126.hint: "Чтобы накапливать £alloys£ ['concept_alloys', сплавы], постройте £district£ ['concept_industrial_districts', промышленные районы] во вкладке «$colony_view_tab_planet_summary$» окна £interface£ «['concept_colony_view']».\n\nТакже вы можете покупать £alloys£ §H['concept_alloys', сплавы]§! на £market£ ['concept_market', рынке] или у других ['concept_empires', государств].$focus_other$"
 core.126.lore: "§L«Пускай сплавы и не роскошный товар, но попробуйте построить линкор из добрых намерений».§!"
 core.126.req: "Накоплено 1000 сплавов"
 core.126.fail: "£trigger_no£ $core.126.req$"
 core.126.success: "£trigger_yes£ $core.126.req$"
 core.127.name: "Построить район улья"
 core.127.desc: ""
 core.127.hint: "Постройте £district£ ['concept_hive_district', район улья] в £colony£ ['concept_colony', колонии]."
 core.127.lore: "§L«Больше туннелей. Больше дронов. Больше улья. Всегда больше».§!"
 core.127.req: "Построен район улья"
 core.127.fail: "£trigger_no£ $core.127.req$"
 core.127.success: "£trigger_yes£ $core.127.req$"
 core.127_1.name: "Построить коллективный биом"
 core.127_1.hint: "Постройте £district£ §Cколлективный биом§! в £colony£ ['concept_colony', колонии]."
 core.127_1.lore: "§L«В начале была планета».§!"
 core.127_1.req: "Построен коллективный биом"
 core.127_1.fail: "£trigger_no£ $core.127_1.req$"
 core.127_1.success: "£trigger_yes£ $core.127_1.req$"
 core.128.name: "Построить городской район"
 core.128.desc: ""
 core.128.hint: "Во вкладке «$colony_view_tab_planet_summary$» окна £interface£ «['concept_colony_view']» постройте £district£ ['concept_city_district', городской район]."
 core.128.lore: "§L«Панорама города — это мера амбиций его жителей. Чем выше мы строим, тем дальше устремляются их мечты».§!"
 core.128.req: "Построен городской район"
 core.128.fail: "£trigger_no£ $core.128.req$"
 core.128.success: "£trigger_yes£ $core.128.req$"
 core.129.name: "Построить район комплекса"
 core.129.desc: ""
 core.129.hint: "Постройте £district£ ['concept_nexus_district', район комплекса] в £colony£ ['concept_colony', колонии]."
 core.129.lore: "§L«Новые районы комплекса — это новые модули. Отрицательных сторон нет. За исключением случаев отклонения от нормы. В таких случаях полагается рекалибровка».§!"
 core.129.req: "Построен район комплекса"
 core.129.fail: "£trigger_no£ $core.129.req$"
 core.129.success: "£trigger_yes£ $core.129.req$"
 core.130.name: "Построить промышленный район"
 core.130.desc: ""
 core.130.hint: "Во вкладке «$colony_view_tab_planet_summary$» окна £interface£ «['concept_colony_view']» постройте £district£ ['concept_industrial_district', промышленный район]."
 core.130.lore: "§L«Главный признак прогресса — дым от предприятий».§!"
 core.130.req: "Построен промышленный район"
 core.130.fail: "£trigger_no£ $core.130.req$"
 core.130.success: "£trigger_yes£ $core.130.req$"
 core.132.name: "Построить энергетический район"
 core.132.desc: ""
 core.132.hint: "Во вкладке «$colony_view_tab_planet_summary$» окна £interface£ «['concept_colony_view']» постройте £district£ ['concept_generator_district', энергетический район]."
 core.132.lore: "§L«Энергия это среда, в которой проявляется все сущее». — Абдбаал§!"
 core.132.req: "Построен энергетический район"
 core.132.fail: "£trigger_no£ $core.132.req$"
 core.132.success: "£trigger_yes£ $core.132.req$"
 core.132_1.name: "Построить поле фотосинтеза"
 core.132_1.hint: "Во вкладке «$colony_view_tab_planet_summary$» окна £interface£ «['concept_colony_view']» постройте £district£ §Cполе фотосинтеза§!."
 core.132_1.lore: "§L«Этот мир утолял жажду светом, как мы — простой водой». — Зосира К’Тун§!"
 core.132_1.req: "Построено поле фотосинтеза"
 core.132_1.fail: "£trigger_no£ $core.132_1.req$"
 core.132_1.success: "£trigger_yes£ $core.132_1.req$"
 core.134.name: "Построить горнодобывающий район"
 core.134.desc: ""
 core.134.hint: "Во вкладке «$colony_view_tab_planet_summary$» окна £interface£ «['concept_colony_view']» постройте £district£ ['concept_mining_district', горнодобывающий район]."
 core.134.lore: "§L«Богатство мира не витает в небесах, оно скрыто в земле. Копайте глубже, и вас будет ждать процветание».§!"
 core.134.req: "Построен горнодобывающий район"
 core.134.fail: "£trigger_no£ $core.134.req$"
 core.134.success: "£trigger_yes£ $core.134.req$"
 core.134_1.name: "Построить полую гору"
 core.134_1.hint: "Во вкладке «$colony_view_tab_planet_summary$» окна £interface£ «['concept_colony_view']» постройте £district£ §Cполую гору§!."
 core.134_1.lore: "§L«В горе, как в древесном стволе, течет живительная сила».§!"
 core.134_1.req: "Построена полая гора"
 core.134_1.fail: "£trigger_no£ $core.134_1.req$"
 core.134_1.success: "£trigger_yes£ $core.134_1.req$"
 core.136.name: "Построить аграрный район"
 core.136.desc: ""
 core.136.hint: "Во вкладке «$colony_view_tab_planet_summary$» окна £interface£ «['concept_colony_view']» постройте £district£ ['concept_farming_district', сельскохозяйственный район]."
 core.136.lore: "§L«Первый урожай был скуден. Но едва новые зерна коснулись наших языков, нам стало ясно, что этот мир нас прокормит».§!"
 core.136.req: "Построен аграрный район"
 core.136.fail: "£trigger_no£ $core.136.req$"
 core.136.success: "£trigger_yes£ $core.136.req$"
 core.136_1.name: "Построить лес-сад"
 core.136_1.hint: "Во вкладке «$colony_view_tab_planet_summary$» окна £interface£ «['concept_colony_view']» постройте £district£ §Cлес-сад§!."
 core.136_1.lore: "§L«Дай миру достаточно — и он распустится, словно цветок».§!"
 core.136_1.req: "Построен лес-сад"
 core.136_1.fail: "£trigger_no£ $core.136_1.req$"
 core.136_1.success: "£trigger_yes£ $core.136_1.req$"
 core.138.name: "Принять планетарное решение"
 core.138.desc: ""
 core.138.hint: "Откройте список планетарных ['concept_decisions', решений] во вкладке «$colony_view_tab_management$» окна £interface£ «['concept_colony_view']» и примите одно из них."
 core.138.lore: "§L«Колонисты любят решительных лидеров — но ровно до тех пор, пока решения им по нраву».§!"
 core.138.req: "Принято планетарное решение"
 core.138.fail: "£trigger_no£ $core.138.req$"
 core.138.success: "£trigger_yes£ $core.138.req$"
 ##########################
 # Exploration Focus Cards
 ##########################
 exploration.100.name: "Изучить аномалию"
 exploration.100.desc: ""
 exploration.100.hint: "Обнаружив £anomaly£ ['concept_anomaly', аномалию], назначьте £scientist£ ['concept_scientist', ученого] на ее изучение."
 exploration.100.lore: "§L«Бессмысленных сигналов не бывает. Каждый щелчок, каждый отголосок что-то значит. Вопрос в том, что именно».§!"
 exploration.100.req: "Изучена аномалия"
 exploration.100.fail: "£trigger_no£ $exploration.100.req$"
 exploration.100.success: "£trigger_yes£ $exploration.100.req$"
 exploration.105.name: "Изучить систему"
 exploration.105.desc: ""
 exploration.105.hint: "Полностью изучите неисследованную £system£ ['concept_system', систему] с помощью £science_ship£ ['concept_science_ship', научного корабля]."
 exploration.105.lore: "§L«Никакая экспансия невозможна без понимания звезд, на которые мы собираемся предъявить права». — Введение в звездную картографию, издание 7-е§!"
 exploration.105.req: "Изучена система"
 exploration.105.fail: "£trigger_no£ $exploration.105.req$"
 exploration.105.success: "£trigger_yes£ $exploration.105.req$"
 exploration.110.name: "Завершить особый проект"
 exploration.110.desc: ""
 exploration.110.hint: "Во вкладке «$situation_log_view_tab_situation_log$ » окна £interface£ «['concept_situation_log_view']» найдите ['concept_special_project', особый проект] и изучите его."
 exploration.110.lore: "§L«Вы думаете, сложно интерпретировать данные? Нет, сложно убедить других в том, что ваши открытия имеют ценность».§!"
 exploration.110.req: "Завершен особый проект"
 exploration.110.fail: "£trigger_no£ $exploration.110.req$"
 exploration.110.success: "£trigger_yes£ $exploration.110.req$"
 exploration.115.name: "Обнаружить инопланетную жизнь"
 exploration.115.desc: ""
 exploration.115.hint: "Изучайте неисследованные £system£ ['concept_systems', системы] с помощью £science_ship£ ['concept_science_ship', научного корабля], пока не найдете на одной из них инопланетную жизнь."
 exploration.115.lore: "§L«Вопрос не в том, найдем ли мы жизнь на других планетах, но в том, когда это случится. И тогда нам придется задать вопрос: поймем ли мы, что видим перед собой?»§!"
 exploration.115.req: "Обнаружена инопланетная жизнь"
 exploration.115.fail: "£trigger_no£ $exploration.115.req$"
 exploration.115.success: "£trigger_yes£ $exploration.115.req$"
 exploration.120.name: "Получить постоянный вариант для исследований"
 exploration.120.desc: ""
 exploration.120.hint: "Изучайте £anomaly£ ['concept_anomalies, аномалии'], £archaeology£ ['concept_archaeology_site', места археологических раскопок] и ['concept_debris, обломки'], оставшиеся после космических сражений. Некоторые изыскания могут открыть §Hпостоянный вариант для исследования§! — он будет доступен до тех пор, пока вы его не изучите."
 exploration.120.lore: "§L«Настоящий прогресс — это не скачок вперед, это тысяча осторожных шажков в неизвестность». — Принципы научных изысканий, том III§!"
 exploration.120.req: "Получен постоянный вариант для исследования"
 exploration.120.fail: "£trigger_no£ $exploration.120.req$"
 exploration.120.success: "£trigger_yes£ $exploration.120.req$"
 exploration.125.name: "Нанять ученого"
 exploration.125.desc: ""
 exploration.125.hint: "В окне £interface£ «['concept_leaders_view']» наймите ['concept_leader', лидера] — £scientist£ ['concept_scientist', ученого].$focus_other$"
 exploration.125.lore: "§L«Ищете кого-нибудь, кто сможет составить модель квантовой сингулярности бюджет? Ну ищите».§!"
 exploration.125.req: "Нанят ученый"
 exploration.125.fail: "£trigger_no£ $exploration.125.req$"
 exploration.125.success: "£trigger_yes£ $exploration.125.req$"
 exploration.200.name: "Завершить археологические раскопки"
 exploration.200.desc: ""
 exploration.200.hint: "Назначьте £scientist£ ['concept_scientist', ученого] на £archaeology£ ['concept_archaeology_site', археологические раскопки] и пройдите с ним соответствующие события."
 exploration.200.lore: "§L«Еще одна древняя империя, еще одно мрачное предупреждение. Казалось бы, пора бы уже нам чему-нибудь научиться».§!"
 exploration.200.req: "Завершены археологические раскопки"
 exploration.200.fail: "£trigger_no£ $exploration.200.req$"
 exploration.200.success: "£trigger_yes£ $exploration.200.req$"
 exploration.205.name: "Повысить уровень ученого"
 exploration.205.desc: ""
 exploration.205.hint: "Назначьте £science_ship£ ['concept_science_ship', научный корабль] под командованием £scientist£ ['concept_scientist', ученого] изучать £system£ ['concept_systems', системы] и исследовать £anomaly£ ['concept_anomalies', аномалии]. Также вы можете назначить ученого ['concept_governor', губернатором] или ввести в состав ['concept_council', совета].\n\nТакие должности — это источник ценного опыта, который поможет ученому повысить уровень и приобрести новые ['concept_leader_traits', черты]."
 exploration.205.lore: "§L«Знание — это не цель, но путь, который открывается лишь тем, кто осмелится на него вступить». — Путь ученого: рост через понимание§!"
 exploration.205.req: "Повышен уровень ученого"
 exploration.205.fail: "£trigger_no£ $exploration.205.req$"
 exploration.205.success: "£trigger_yes£ $exploration.205.req$"
 exploration.210.name: "Начать наблюдение досветовой цивилизации"
 exploration.210.desc: ""
 exploration.210.hint: "С помощью £construction_ship£ ['concept_construction_ship', строительного корабля] постройте §Hстанцию наблюдения§! на орбите планеты, населенной §Hдосветовой цивилизацией§!."
 exploration.210.lore: "§L«В настоящий момент вероятность того, что эта цивилизация самоуничтожится до того, как откроет сверхсветовые перелеты, составляет 3 к 1. Делайте ставки».§!"
 exploration.210.req: "Установлено наблюдение за досветовой цивилизацией"
 exploration.210.fail: "£trigger_no£ $exploration.210.req$"
 exploration.210.success: "£trigger_yes£ $exploration.210.req$"
 exploration.215.name: "Назначить ученого губернатором"
 exploration.215.desc: ""
 exploration.215.hint: "Во вкладке «$colony_view_tab_planet_summary$» окна £interface£ «['concept_colony_view']» или в окне £interface£ «['concept_planets_and_sector_view', Обзор планет и секторов]» назначьте £scientist£ ['concept_scientist', ученого] на пост ['concept_governor', губернатора] £sector£ ['concept_sector', сектора] или £planet£ ['concept_planet', планеты]."
 exploration.215.lore: "§L«Наука не прислуживает традициям и не покоряется прошлому. Мир под началом ученых всегда будет миром в движении». — Куратор Расса Тош, «Размышления о руководстве»§!"
 exploration.215.req: "Ученый назначен губернатором"
 exploration.215.fail: "£trigger_no£ $exploration.215.req$"
 exploration.215.success: "£trigger_yes£ $exploration.215.req$"
 exploration.220.name: "Переход по червоточине"
 exploration.220.desc: ""
 exploration.220.hint: "После изучения технологии £physics£ §Hстабилизации червоточин§! прикажите £science_ship£ ['concept_science_ship', научному кораблю] пройти через §Hчервоточину§!."
 exploration.220.lore: "§L«Обратите внимание, что предоставляемое институтом страхование жизни не покрывает исчезновение из реальности вследствие пространственно-временного парадокса».§!"
 exploration.220.req: "Выполнен переход по червоточине"
 exploration.220.fail: "£trigger_no£ $exploration.220.req$"
 exploration.220.success: "£trigger_yes£ $exploration.220.req$"
 exploration.225.name: "Заключить соглашение об исследованиях"
 exploration.225.desc: ""
 exploration.225.hint: "Во вкладке «$contacts_view_tab_contacts$» окна £interface£ «['concept_contacts_view']» предложите другому ['concept_empire', государству] заключить этот ['concept_diplomatic_pact', дипломатический пакт]."
 exploration.225.lore: "§L«Два ума решат задачу быстрее, чем один. Две цивилизации? Их научные возможности безграничны».§!"
 exploration.225.req: "Заключено соглашение об исследованиях"
 exploration.225.fail: "£trigger_no£ $exploration.225.req$"
 exploration.225.success: "£trigger_yes£ $exploration.225req$"
 exploration.300.name: "Построить рой Дайсона"
 exploration.300.desc: "(Производство должно быть не менее:\n30 £physics£, £society£ или £engineering£)"
 exploration.300.hint: "После изучения технологии £physics£ §Hроя Дайсона§! найдите подходящую ['concept_star', звезду] и постройте с помощью £construction_ship£ ['concept_construction_ship', строительного корабля] £megastructure£ ['concept_megastructure', мегасооружение] — §H$tech_dyson_swarm$§!."
 exploration.300.lore: "§LКогда стоишь на наблюдательной палубе и смотришь, как разворачиваются первые спутники... Внутри что-то меняется. Мысль о том, что мы можем обуздать свет звезды, опьяняет». — Главный конструктор Тиг Бори, МКС Д'Тума§!"
 exploration.300.req: "Построен рой Дайсона, производящий не менее §Y30§! £physics£, £society£ или £engineering£"
 exploration.300.fail: "£trigger_no£ $exploration.300.req$"
 exploration.300.success: "£trigger_yes£ $exploration.300.req$"
 exploration.305.name: "Получить помощь в исследованиях от анклава"
 exploration.305.desc: ""
 exploration.305.hint: "После установления контакта откройте вкладку «$contacts_view_tab_contacts$» в окне «$concept_contacts_view$» и попросите у §HОрдена кураторов§! §Hпомощи в исследовании§!."
 exploration.305.lore: "§L«Я спросил куратора, что стало величайшим научным открытием в истории. Они улыбнулся и ответил: „Оно еще грядет“».§!"
 exploration.305.req: "Анклав оказывает помощь в исследованиях"
 exploration.305.fail: "£trigger_no£ $exploration.305.req$"
 exploration.305.success: "£trigger_yes£ $exploration.305.req$"
 exploration.310.name: "Построить 5 научных лабораторий"
 exploration.310.desc: ""
 exploration.310.hint: "Во вкладке «$colony_view_tab_planet_summary$» окна £interface£ «['concept_colony_view']» постройте пять научных лабораторий в одной или нескольких £colony£ ['concept_colonies', колониях]."
 exploration.310.lore: "§L«Пять новых лабораторий, а мы все равно не понимаем, куда уходят гранты».§!"
 exploration.310.req: "Построено 5 научных лабораторий"
 exploration.310.fail: "£trigger_no£ $exploration.310.req$"
 exploration.310.success: "£trigger_yes£ $exploration.310.req$"
 exploration.315.name: "До конца изучить звездный разлом"
 exploration.315.desc: ""
 exploration.315.hint: "После изучения технологии £physics£ §Hразломной сферы§! назначьте £scientist£ ['concept_scientist', ученого] на ['concept_archaeology_site', звездный разлом] и пройдите с ним соответствующие события."
 exploration.315.lore: "§L«Он нарушает законы физики, ломает время и может стереть нас из бытия. Естественно, нам нужно было в него залезть».§!"
 exploration.315.req: "До конца изучен звездный разлом"
 exploration.315.fail: "£trigger_no£ $exploration.315.req$"
 exploration.315.success: "£trigger_yes£ $exploration.315.req$"
 exploration.320.name: "Сделать ученого опытным"
 exploration.320.desc: "(Достигните уровня 4)"
 exploration.320.hint: "$exploration.205.hint$"
 exploration.320.lore: "§L«Настоящий ученый не накапливает знания, но культивирует парадигмы».§!"
 exploration.320.req: "Есть опытный ученый"
 exploration.320.fail: "£trigger_no£ $exploration.320.req$"
 exploration.320.success: "£trigger_yes£ $exploration.320.req$"
 exploration.325.name: "Терраформировать три мира"
 exploration.325.desc: ""
 exploration.325.hint: "После изучения технологии £society£ §Hизменения формы суши§! найдите подходящую для ['concept_terraforming', терраформирования] £planet£ ['concept_planet', планету] и начните процесс."
 exploration.325.lore: "§L«Вы читали журнал изменений для последнего цикла терраформирования? Они добавили пляжи!»§!"
 exploration.325.req: "Терраформированы три мира"
 exploration.325.fail: "£trigger_no£ $exploration.325.req$"
 exploration.325.success: "£trigger_yes£ $exploration.325.req$"
 exploration.400.name: "Изучить повторяющуюся технологию"
 exploration.400.desc: ""
 exploration.400.hint: "Найдите в £interface£ ['concept_technology_view', окне технологий] §Hповторяющуюся технологию§!, значок которой выделен особой рамкой, и изучите ее."
 exploration.400.lore: "§L«Еще один прорыв, еще один скачок вперед. Но где же горизонт? Он не приближается ни на шаг». — Главный научный сотрудник Эли Канто§!"
 exploration.400.req: "Изучена повторяющаяся технология"
 exploration.400.fail: "£trigger_no£ $exploration.400.req$"
 exploration.400.success: "£trigger_yes£ $exploration.400.req$"
 exploration.405.name: "Завладеть сооружением угасшей империи"
 exploration.405.desc: ""
 exploration.405.hint: "Победите ['concept_fallen_empire', угасшую империю].$focus_other$"
 exploration.405.lore: "§L«Узрите величие древних! Теперь бы понять, как оно работает...»§!"
 exploration.405.req: "Захвачено сооружение угасшей империи"
 exploration.405.fail: "£trigger_no£ $exploration.405.req$"
 exploration.405.success: "£trigger_yes£ $exploration.405.req$"
 exploration.410.name: "Изучить обломки, принадлежащие угасшей империи"
 exploration.410.desc: ""
 exploration.410.hint: "После звездной битвы с ['concept_fallen_empire', угасшей империей] отправьте к месту боя £science_ship£ ['concept_science_ship', научный корабль] и исследуйте ['concept_special_project', особый проект]."
 exploration.410.lore: "§L«При изучении наследия древних нужно задаваться вопросом: угасли они из-за своей мощи или несмотря на нее?» — Разбитые короны: исследование галактического заката§!"
 exploration.410.req: "Изучены обломки, принадлежащие угасшей империи"
 exploration.410.fail: "£trigger_no£ $exploration.410.req$"
 exploration.410.success: "£trigger_yes£ $exploration.410.req$"
 exploration.415.name: "Изучить обломки, принадлежащие кризису"
 exploration.415.desc: ""
 exploration.415.hint: "После звездной битвы с §Hкризисом§! отправьте к месту боя £science_ship£ ['concept_science_ship', научный корабль] и исследуйте ['concept_special_project', особый проект]."
 exploration.415.lore: "§L«Понять оружие — значит сделать шаг к тому, чтобы взять его на вооружение. Вопрос в том, возможно ли сделать шаг назад». — Адмирал Хаск'Валгам, «О масштабах власти»§!"
 exploration.415.req: "Изучены обломки, принадлежащие кризису"
 exploration.415.fail: "£trigger_no£ $exploration.415.req$"
 exploration.415.success: "£trigger_yes£ $exploration.415.req$"
 exploration.420.name: "Обладать тремя учеными 5-го уровня"
 exploration.420.desc: ""
 exploration.420.hint: "$exploration.205.hint$"
 exploration.420.lore: "§L«Три ученых — три теории. И три довода в пользу того, что остальные двое несут белиберду».§!"
 exploration.420.req: "Есть три ученых 5-го уровня"
 exploration.420.fail: "£trigger_no£ $exploration.420.req$"
 exploration.420.success: "£trigger_yes£ $exploration.420.req$"
 exploration.500.name: "Построить научный комплекс"
 exploration.500.desc: ""
 exploration.500.hint: "После изучения технологии £physics£ §Hмегаверфи§! найдите подходящую £planet£ ['concept_planet', планету] или ['concept_star', звезду] и постройте с помощью £construction_ship£ ['concept_construction_ship', строительного корабля] £megastructure£ ['concept_megastructure', мегасооружение] — §H$tech_mega_shipyard$§!."
 exploration.500.lore: "§L«С этим научным комплексом мы сможем разгадать любую загадку. Хотя некоторые из них разгадывать еще рано».§!"
 exploration.500.req: "Построен научный комплекс"
 exploration.500.fail: "£trigger_no£ $exploration.500.req$"
 exploration.500.success: "£trigger_yes£ $exploration.500.req$"
 exploration.505.name: "Производить 1000 ед. исследований в месяц"
 exploration.505.desc: ""
 exploration.505.hint: "Постройте больше ['building:building_research_lab_1', научных лабораторий]. Во вкладке «$colony_view_tab_planet_summary$» окна £interface£ «['concept_colony_view']» смените ['concept_designation', категорию] колонии на «§H$col_research$§!».$focus_other$"
 exploration.505.lore: "§L«Оказывается, наши „показатели инноваций“ в этом квартале просели. Может быть, если бы мы тратили меньше времени на планерки, мы бы совершали больше прорывов».§!"
 exploration.505.req: "Производится 1000 ед. исследований в месяц"
 exploration.505.fail: "£trigger_no£ $exploration.505.req$"
 exploration.505.success: "£trigger_yes£ $exploration.505.req$"
 exploration.510.name: "Активировать реликвии 10 раз"
 exploration.510.desc: "(Одну или несколько реликвий)"
 exploration.510.hint: "Перейдите во вкладку «$discoveries_view_tab_relics$» окна £interface£ «['concept_discoveries_view']» и активируйте одну или несколько ['concept_relics', реликвий] 10 раз."
 exploration.510.lore: "§L«Мы обнаружили полные спецификации этой реликвии на древней электронной доске обсуждений. Активировать ее будет проще простого».§!"
 exploration.510.req: "Активировано 10 реликвий"
 exploration.510.fail: "£trigger_no£ $exploration.510.req$"
 exploration.510.success: "£trigger_yes£ $exploration.510.req$"
 exploration.600.name: "Найти левиафана"
 exploration.600.desc: ""
 exploration.600.hint: "Изучайте £system£ ['concept_systems', системы] с помощью £science_ship£ ['concept_science_ship', научного корабля], пока не найдете левиафана."
 exploration.600.lore: "§L«Поиски левиафана — опасная затея. И когда мы найдем одного, нам нужно будет ответить на вопрос: что мы предпримем в присутствии столь грандиозной мощи?»§!"
 exploration.600.req: "Найден левиафан"
 exploration.600.fail: "£trigger_no£ $exploration.600.req$"
 exploration.600.success: "£trigger_yes£ $exploration.600.req$"
