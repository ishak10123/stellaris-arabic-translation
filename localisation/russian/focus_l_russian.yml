 development.515.name: "Разместить яйцо исполина"
 development.515.desc: ""
 development.515.hint: "Чтобы разместить §Hяйцо исполина§!, выберите ['concept_construction_ship', строительный корабль] и нажмите §HПостроить мегасооружение§!. После этого выберите яйцо исполина и разместите на орбите подходящего §Hгазового гиганта§!."
 development.515.lore: "§L«Мы подняли глаза и увидели, как его тень скользнула по луне. Это был не корабль. И не буря. Нечто огромное... и живое». — Запись очевидца, Колония E-91§!"
