 development.406.hint: "После изучения технологии £physics£ §Hсферы Дайсона§! найдите подходящую ['concept_star', звезду] и постройте с помощью £construction_ship£ ['concept_construction_ship', строительного корабля] £megastructure£ ['concept_megastructure', мегасооружение] — §Hсферу Дайсона§!.$focus_other$" # Without Machine Age
