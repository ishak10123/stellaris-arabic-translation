 conquest.530.hint: "Откройте вкладку $fleet_management_view_tab_fleet_manager$ в окне £interface£ ['concept_fleet_management_view', «Обзор управления флотилиями»] либо окно ['concept_shipyard', верфи] и постройте два корабля типа §H«титан»§!."
 conquest.530.lore: "§L«Карты будут перекроены согласно тому, куда укажет величественный титан».§!"
 conquest.530.req: "Построено 2 титана"
 conquest.530.fail: "£trigger_no£ $conquest.530.req$"
 conquest.530.success: "£trigger_yes£ $conquest.530.req$"
 conquest.535.name: "Постройте джаггернаут"
 conquest.535.desc: ""
 conquest.535.hint: "Откройте вкладку $fleet_management_view_tab_fleet_manager$ в окне £interface£ ['concept_fleet_management_view', «Обзор управления флотилиями»] либо окно ['concept_shipyard', верфи] и постройте один §Hджаггернаут§!."
 conquest.535.lore: "§L«Кузница, крепость и приговор — вот что такое джаггернаут».§!"
 conquest.535.req: "Построен 1 джаггернаут"
 conquest.535.fail: "£trigger_no£ $conquest.535.req$"
 conquest.535.success: "£trigger_yes£ $conquest.535.req$"
 conquest.520.name: "Создать анклав наемников"
 conquest.520.desc: ""
 conquest.520.hint: "Выполните условия, перечисленные в окне ['concept_fleet', флотилии], чтобы создать анклав наемников."
 conquest.520.lore: "§L«Наемники подобны кометам: яркие, жестокие и любоваться ими лучше издалека».§!"
 conquest.520.req: "Создан анклав наемников"
