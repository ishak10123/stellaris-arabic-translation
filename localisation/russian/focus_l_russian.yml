 conquest.105.hint: "В окне £interface£ «['concept_leaders_view']» наймите ['concept_leader', лидера] — £commander£ ['concept_commander', командира].$focus_other$"
 conquest.105.lore: "§L«Лучшие командиры не спрашивают о довольствии. Они спрашивают, скоро ли в бой».§!"
 conquest.105.req: "Нанят командир"
 conquest.105.fail: "£trigger_no£ $conquest.105.req$"
 conquest.105.success: "£trigger_yes£ $conquest.105.req$"
 conquest.110.name: "Построить 5 корветов"
 conquest.110.desc: ""
