 development.505.name: "Довести ежемесячный прирост товаров массового спроса до +3000"
 development.505.desc: ""
 development.505.hint: "Чтобы накапливать £consumer_goods£ ['concept_consumer_goods', товары массового спроса], постройте £district£ ['concept_industrial_districts', промышленные районы] и £building£ ['building:building_factory_1', гражданские предприятия] во вкладке «$colony_view_tab_planet_summary$» окна £interface£ «['concept_colony_view']», покупайте £consumer_goods£ §H['concept_consumer_goods', товары массового спроса]§! на £market£ ['concept_market', рынке] или у других ['concept_empires', государств]."
 development.505.lore: "§L«Они их не едят. Они не используют их для расширения. Они их просто... выставляют на обозрение. Неэффективность индивидов порой сводит с ума».§!"
