 development.105.name: "Завершить первый контакт"
 development.105.desc: ""
 development.105.hint: "Отправьте £science_ship£ ['concept_science_ship', научный корабль] исследовать новые £system£ ['concept_systems', системы], пока не начнется процедура §Hпервого контакта§!. Назначьте ['concept_envoy', посла] ответственным за этот процесс до его завершения."
 development.105.lore: "§L«В момент, когда встречаются две цивилизации, ход истории изменяется. Приведет ли эта перемена к войне или миру, зависит от одного слова». — Посол Датри Яконна§!"
 development.105.req: "Завершен первый контакт"
 development.105.fail: "£trigger_no£ $development.105.req$"
 development.105.success: "£trigger_yes£ $development.105.req$"
 development.110.name: "Продвигать фракцию"
 development.110.desc: ""
 development.110.hint: "Во вкладке «§H$government_view_tab_factions$§!» окна £interface£ «['concept_government_view']» щелкните кнопку «§H$POP_FACTION_MANAGE$§!» и продвиньте ['concept_faction', фракцию]."
 development.110.lore: "§L«Секрет лидерства не в том, чтобы стараться всем понравиться. Важно разочаровывать всех достаточно медленно, чтобы они не взбунтовались».§!"
 development.110.req: "Фракция получила продвижение"
 development.110.fail: "£trigger_no£ $development.110.req$"
 development.110.success: "£trigger_yes£ $development.110.req$"
 development.125.name: "Довести прирост минералов до +50"
 development.125.desc: ""
 development.125.hint: "Чтобы повысить прирост £minerals£ ['concept_minerals', минералов], стройте £district£ ['concept_mining_districts', горнодобывающие районы] в окне £interface£ «['concept_colony_view']», £mining_station£ ['concept_mining_stations', добывающие станции] на орбитах богатых минералами ['concept_celestial_objects', небесных тел] или закупайте их на £market£ ['concept_market', рынке]."
 development.125.lore: "§L«Бури, обогащай и снова бури».§!"
 development.125.req: "Прирост минералов доведен до 50"
 development.125.fail: "£trigger_no£ $development.125.req$"
 development.125.success: "£trigger_yes£ $development.125.req$"
 development.130.name: "Добиться положительных отношений"
 development.130.desc: ""
 development.130.hint: "Во вкладке «$contacts_view_tab_contacts$» окна £interface£ «['concept_contacts_view']» выберите вариант «§HУлучшить отношения§!» и назначьте доступного ['concept_envoy', посла]."
 development.130.lore: "§L«Дипломатия строится не на доверии. Она строится на интересах. Найдешь общие интересы, и враги станут партнерами. Не найдешь — партнеры станут препятствиями».§!"
 development.130.req: "Установите положительные отношения с другим государством"
 development.130.fail: "£trigger_no£ $development.130.req$"
 development.130.success: "£trigger_yes£ $development.130.req$"
 development.135.name: "Нанять чиновника"
 development.135.desc: ""
 development.135.hint: "В окне £interface£ «['concept_leaders_view']» наймите ['concept_leader', лидера] — £official£ ['concept_scientist', чиновника].$focus_other$"
 development.135.lore: "§L«Империи возвышаются и погибают. Вечны только документы».§!"
 development.135.req: "Нанят чиновник"
 development.135.fail: "£trigger_no£ $development.135.req$"
 development.135.success: "£trigger_yes£ $development.135.req$"
 core_focus_139.name: "Учредить филиал"
 core_focus_139.desc: ""
 core_focus_139.hint: "Чтобы открыть ['concept_branch_office', филиал], заключите ['concept_diplomatic_pacts', коммерческий пакт] с владельцем мира, где вы хотите это сделать. §HПреступный синдикат§! может пропустить этот шаг (поскольку в целом ведёт дела не очень законно)."
 core_focus_139.lore: "§L«Сегодня это лишь филиал, а завтра — основа всей их экономики». — Исполнительный директор Ителла Кикси'дольф, Отдел экспансии§!"
 core_focus_139.req: "Открыт филиал"
 core_focus_139.fail: "£trigger_no£ $core_focus_139.req$"
 core_focus_139.success: "£trigger_yes£ $core_focus_139.req$"
 development.200.name: "Заключить пакт о ненападении"
 development.200.desc: ""
 development.200.hint: "Во вкладке «$contacts_view_tab_contacts$» окна £interface£ «['concept_contacts_view']» предложите другому ['concept_empire', государству] заключить этот ['concept_diplomatic_pact', дипломатический пакт]."
 development.200.lore: "§LПакт о ненападении — это не мир. Это лишь соглашение о том, что в данный момент сотрудничество выгоднее войны».§!"
 development.200.req: "Заключен пакт о ненападении"
 development.200.fail: "£trigger_no£ $development.200.req$"
 development.200.success: "£trigger_yes£ $development.200.req$"
 development.205.name: "Заключить пакт о взаимной защите"
 development.205.desc: ""
 development.205.hint: "Во вкладке «$contacts_view_tab_contacts$» окна £interface£ «['concept_contacts_view']» предложите другому ['concept_empire', государству] заключить этот ['concept_diplomatic_pact', дипломатический пакт]."
 development.205.lore: "§L«Ничто так не сближает две империи, как общий страх перед третьей».§!"
