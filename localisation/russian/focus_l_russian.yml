 development.315.name: "Основать федерацию"
 development.315.desc: ""
 development.315.hint: "Во вкладке «$contacts_view_tab_contacts$» окна £interface£ «['concept_contacts_view']» свяжитесь с другим ['concept_empire', государством] и предложите ему сформировать ['concept_federation', федерацию].$focus_other$"
 development.315.lore: "§L«Пусть это соглашение служит свидетельством нашей решимости: того, что мы предпочли единство раздору, диалог войне и общую судьбу среди звезд». — Преамбула к Галактической конвенции§!"
