 development.100.name: "Есть 7K поселений"
 development.100.desc: ""
 development.100.hint: "Чтобы поддержать рост £pop£ ['concept_pop', поселений], обеспечьте им достаточно £housing£ ['concept_housing', жилья] в £colony£ ['concept_colonies', колониях].$focus_other$"
 development.100.lore: "§L«Империя могущественна лишь настолько, насколько она способна прокормить тех, кто называет ее своим домом». — Куратор Аркан Тиот§!"
 development.100.req: "Есть 7K поселений"
