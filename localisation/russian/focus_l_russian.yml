 conquest.100.name: "Улучшить космическую базу"
 conquest.100.desc: ""
 conquest.100.hint: "Во вкладке «$starbase_view_tab_command$» окна £interface£ «['concept_starbase_view']» улучшите ['concept_starbase', космическую базу] до следующего уровня."
 conquest.100.lore: "§L«Хорошая космическая база служит предупреждением. Мы не для красоты их строим, а чтобы наши партнеры подумали дважды».§!"
