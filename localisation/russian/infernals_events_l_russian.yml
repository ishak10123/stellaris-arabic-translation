 approach_at_any_cost: "Любой ценой"
 approach_reassure_public_effect: "Распространение информации о кризисе может дестабилизировать общество. Сохраним это в тайне.$rg_default_progress$"
 approach_find_the_cause_effect: "Расширение звезды невозможно остановить. Для выявления первопричины необходимо немедленно начать всестороннее расследование.$rg_default_progress$"
 approach_suppress_unrest2_effect: "Кризис невозможно эффективно разрешить на фоне общественных волнений. Приоритетом должно стать восстановление порядка и стабильности.$rg_default_progress$"
 approach_disrupt_subspace_tunnels2_effect: "Для сохранения целостности нашей звезды необходимы срочные контрмеры. Нарушение работы подпространственных туннелей — первостепенная задача.$rg_small_progress$"
 approach_add_fuel_to_the_fire3_effect: "Такое развитие событий позволяет начать глубинную добычу на планетах нашей системы, максимизировав прирост минералов.$rg_high_progress$"
 approach_wait_and_see3_effect: "Больше не следует принимать поспешные решения. Лучше проявить терпение и наблюдать.$rg_small_negative_progress$"
 approach_siphon_stellar_material3_effect: "Мы сможем ускорить возвращение к норме, если будем напрямую откачивать вещество из звезды.$rg_medium_negative_progress$"
 approach_continue_siphoning4_effect: "Мы можем использовать эту энергию, чтобы испепелить нашу родную систему, а затем просеять останки в поисках богатств.$rg_high_progress$"
 approach_stabilize_the_star4_effect: "Мы можем стабилизировать звезду в ее текущем состоянии, сохранив наши нынешние адаптации.$rg_no_progress$"
 approach_cease_activity4_effect: "Мы можем деактивировать добывающую платформу и позволить звезде вернуться в более спокойное состояние.$rg_small_negative_progress$"
 approach_reverse_inflation4_effect: "Мы можем уменьшить нашу звезду до прежних размеров, восстановив пригодность родного мира для жизни.$rg_high_negative_progress$"
 approach_at_any_cost_effect: "Мы любой ценой должны остановить рост звезды и избежать катастрофы.\nЕжемесячный рост: §G+0,5§!\n\n"
 INF_ORIGIN_RED_GIANT_TRIANGULATION: "Триангулировать подпространственные помехи"
 INF_ORIGIN_RED_GIANT_TRIANGULATION_DESC: "Подходящее место для триангуляции источника помех."
 INF_ORIGIN_RED_GIANT_PROTECT_HOMEWORLD: "Защитить родной мир"
 INF_ORIGIN_RED_GIANT_PROTECT_HOMEWORLD_DESC: "Мы неустанно пытаемся обратить вспять процесс изменения звезды, но наши собственные тела должны быть готовы столкнуться с жаром. Адаптация населения к более высоким температурам поможет нам процветать в условиях огненного будущего нашего светила."
 INF_ORIGIN_RED_GIANT_EXPLOIT: "Тепловая эксплуатация"
 INF_ORIGIN_RED_GIANT_EXPLOIT_DESC: "Возросшая солнечная радиация создает серьезные долгосрочные проблемы, но в краткосрочной перспективе за счет нее мы можем повысить нашу промышленную и энергетическую мощь."
 INF_ORIGIN_RED_GIANT_BOARD_STATION: "Штурм станции"
 INF_ORIGIN_RED_GIANT_BOARD_STATION_DESC: "Эти безрассудные инопланетяне используют нашу звезду. Мы должны немедленно взять их станцию на абордаж и установить над ней контроль."
 INF_ORIGIN_RED_GIANT_PARLAY: "Экстренная ксенолингвистика"
 INF_ORIGIN_RED_GIANT_PARLAY_DESC: "Обитатели станции управляют подпространственным сифоном, который уничтожает нашу звезду. Мы должны наладить общение, чтобы они помогли нам в решении этой проблемы."
 INF_THERMOPHILE_ADAPTATION: "Термофильная эволюция"
 INF_THERMOPHILE_ADAPTATION_DESC: "Мы встали на путь воспламенения галактики, но наши собственные тела должны быть готовы столкнуться с жаром. Адаптация населения к более высоким температурам поможет нам процветать в огненном будущем.\n\n§HПо завершении:§!$TABBED_NEW_LINE$- Добавляет модификатор §Y$crisis_thermophile_adaptation$§!$TABBED_NEW_LINE$- Повышает §Yприспособленность к вулканическим мирам§! на §G50%§!"
