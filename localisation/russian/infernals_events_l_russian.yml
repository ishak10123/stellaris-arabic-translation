l_russian:
 ####################################
 # Anomaly Events
 ####################################
 # useful refs:
 # [From.GetName] planet
 # [From.GetStarName]
 # [Leader.GetName] scientist
 spires_of_light_category: "Шпили света"
 spires_of_light_category_desc: "Первичное сканирование обнаружило ряд исполинских светящихся структур, возвышающихся на фоне ничем не примечательного ландшафта. Их происхождение и предназначение неясны, но спектр свечения указывает на то, что это нечто большее, чем природный феномен."
 infernals.500.name: "$spires_of_light_category$"
 infernals.500.desc: "Зонды, направленные для исследования светящихся колонн, установили, что они формируются из пластичной силикатной магмы. Этот материал выталкивается вверх через жерла в коренных породах, затвердевая по пути к поверхности. Образующиеся структуры могут вырастать на сотни метров, прежде чем обрушиваются под собственным весом.\n\nВ результате образуется настоящий лес шпилей, практически целиком состоящих из чистейшего и прозрачного вулканического стекла. Каждый из этих шпилей рассеивает теплое оранжевое сияние магмы, бурлящей внизу.\n\n[Leader.GetAXX::Ученый|||fem:Ученая] [Leader.GetName] предполагает, что обломки этих обрушившихся башен могут служить ценным ресурсом."
 #EXCELLENT:0 (first option has default answer)
 infernals.500.a: "Не будем тревожить это священное место."
 infernals.500.b: "Подадим заявку на получение лицензии на добычу."
 infernals.500.c: "Используем их в качестве тренировочных мишеней."
 lava_whirlpool_category: "Лавовый водоворот"
 lava_whirlpool_category_desc: "Первичное обследование планеты [Planet.GetName] выявило странное образование, похожее на вихрь, в главном лавовом океане планеты. Это крайне необычное явление, которое заслуживает изучения."
 infernals.56.name: "Лавовый водоворот"
 infernals.56.desc: "[Leader.GetName] [Leader.GetAXX::подтвердил|||fem:подтвердила], что странное образование является лавовым водоворотом. Подобные явления чрезвычайно редки, и мы еще никогда не сталкивались со столь крупным экземпляром. [Leader.GetAXX::Пораженный|||fem:Пораженная] этим феноменом, [Leader.GetName] [Leader.GetAXX::распорядился|||fem:распорядилась] взять пробы.\n\nАнализ проб показал, что водоворот частично поддерживается за счет месторождения живого металла, который разрывается течениями, а затем пытается восстановить свою форму. Это восстановление придает лаве дополнительное вращение, поддерживая водоворот. Взятие проб также доказало, что этот живой металл можно будет добывать с минимальными усилиями."
 infernals.56.a: "Начать добычу."
 outgassing_category: "Выход газа"
 outgassing_category_desc: "Плановое сканирование планеты [Planet.GetName] зафиксировало необычно сильные химические флуктуации в атмосфере. Более детальное исследование может прояснить их природу."
 infernals.1001.name: "Выход газа"
 infernals.1001.desc: "Химические флуктуации в атмосфере были подтверждены и оказались устойчивыми во времени и пространстве. Наиболее интенсивные колебания были зарегистрированы над крупнейшим океаном обнаженной магмы, куда и был направлен зонд для отбора проб.\n\nВ результате анализа [Leader.GetName] [Leader.GetAXX::установил|||fem:установила], что магматический океан на планете [Planet.GetName] выделяет ценные экзотические газы. Благодаря этому неожиданному открытию стало ясно, что планета может стать ценным источником ресурсов для нашей промышленности, если мы сможем организовать их добычу."
 infernals.1001.a: "Начать добычу."
 crystal_lava_lakes_category: "Кристальные лавовые озера"
 crystal_lava_lakes_category_desc: "На поверхности этой планеты обнаружены обширные бассейны с жидкой лавой. Их стоит изучить на предмет наличия ценных ресурсов."
 infernals.1002.name: "Кристальные лавовые озера"
 infernals.1002.desc: "Первые изображения с поверхности планеты [Planet.GetName] выявили потрясающие и неожиданные геологические образования, получившие название «кристальные лавовые озера». Эти устойчивые резервуары магмы насыщены уникальными минералами, которые в определенном температурном диапазоне самопроизвольно собираются в кристаллические структуры. В результате озеро приобретает исключительную прозрачность и переливается всеми оттенками красного спектра. Из-за особенностей орбиты планеты этот визуальный эффект пульсирует в сезонном ритме, следуя за колебаниями температуры.\n\nЭстетическая привлекательность этих озер может оказаться мощным магнитом для туристов. Кроме того, кристаллические минералы можно собирать с поверхности в период их активности, а затем использовать в производстве накопителей энергии."
 infernals.1002.a: "Основать на этом месте курорт."
 infernals.1002.b: "Собирать энергию с озер."
 crystal_lava_resort: "Курорт у кристальных озер"
 crystal_lava_resort_desc: "Среди живописных озер этой планеты был обустроен роскошный туристический центр, привлекающий посетителей со всей галактики."
 bioadaptive_flora_category: "Биоадаптивная флора"
 bioadaptive_flora_category_desc: "Хотя [Planet.GetName] выглядит как типичная вулканическая пустошь, в атмосфере содержится большое количество кислорода. У него должен быть какой-то необычный источник."
 infernals.1003.name: "Биоадаптивная флора"
 infernals.1003.desc: "Первоначальная оценка охарактеризовала планету [Planet.GetName] как мир магмы и огня, однако при подробном изучении была обнаружена сложная растительная экосистема, обитающая в расщелинах по всей планете. Эти растения производят кислород и удерживают то небольшое количество влаги, что им доступно, создавая в палящей пустоши островки почти умеренного микроклимата.\n\nПоддерживаемые этой флорой биомы могут оказаться пригодными для видов, которые обычно избегают заселять вулканические миры, а сама флора может подойти для сельского хозяйства. Будущим колонистам пойдет на пользу тщательное изучение того, что именно обитает в этих каньонах."
 infernals.1003.a: "Обозначить район пригодным для заселения."
 infernals.1003.tooltip_a: "Добавляет планетарный модификатор, повышающий жизнепригодность планеты и рост поселений."
 bioadaptive_flora_modifier: "Биоадаптивная флора"
 bioadaptive_flora_modifier_desc: "Выносливая местная флора обитает в расщелинах по всей планете, создавая более прохладные, пригодные для дыхания участки микроклимата, где могут обитать даже не приспособленные к вулканической среде организмы."
 tectonic_icebreaker_category: "Тектоническое размораживание"
 tectonic_icebreaker_category_desc: "В реголите планеты [Planet.GetName] обнаружены странные низкотемпературные аномалии, указывающие на некий процесс или объект, охлаждающий отдельные участки поверхности. Бурение позволит выяснить больше."
 infernals.1004.name: "Тектоническое размораживание"
 infernals.1004.desc: "[Leader.GetName] сообщает, что под вулканической поверхностью планеты §Y[from.GetName]§! находятся обширные ледники. Они заключены в необычные скальные образования, состоящие из минералов с исключительными изоляционными свойствами. Тектоническая активность медленно разрушает эти изолирующие слои, и [Leader.GetName] прогнозирует, что если температура между ледниками и остальной частью планеты выровняется, планета остынет настолько, что из вулканического мира превратится в засушливый.\n\nМы можем ускорить этот процесс, чтобы сделать планету более пригодной для жизни. Однако данное явление представляет исключительный научный интерес, и, возможно, целесообразнее позволить ему протекать естественным путем для дальнейшего изучения."
 infernals.1004.a: "Стабилизировать тектоническую активность."
 infernals.1004.b: "Ускорить таяние ледников."
 infernal_oasis_category: "Адский оазис"
 infernal_oasis_category_desc: "Потрясающие снимки планеты §Y[from.GetName]§! демонстрируют пылающий расплавленный мир, на котором контрастом выделяется ослепительно яркая полоса зелени, размером с континент. Это невероятное зрелище указывает на нечто крайне необычное на поверхности."
 infernals.505.name: "Убежище посреди катаклизма"
 infernals.505.desc: "Уникальное строение и тектоника планеты §Y[from.GetName]§! породили беспрецедентное чудо. В то время как большая часть планеты представляет собой раскаленную пустыню, заполненную вулканическим дымом и потоками лавы, одна массивная континентальная плита из твердой породы вздымается на десятки километров выше остальной поверхности. Образовавшееся нагорье, вознесшееся над слоем ядовитых облаков, стало домом для процветающей экосистемы растений и животных.\n\nЭто плато было бы пригодно для жизни многих видов, и, возможно, нас ожидает там немало захватывающих научных открытий."
 infernals.505.a: "Потрясающее открытие."
 NAME_Vermilion: "Вермилион"
 NAME_Kira: "Кира"
 mysterious_ringing_category: "Таинственный звон"
 mysterious_ringing_category_desc: "Наши ученые зафиксировали регулярные радиовсплески из одной точки на планете [Planet.GetName]. Кажется, они совпадают с моментом, когда источник сигнала переходит из ночной зоны в дневную."
 infernals.3210.name: "Таинственный звон"
 infernals.3210.desc: "Научная группа прибыла на планету [from.GetName], чтобы отследить источник сигнала, и установила, что он исходит из системы подземных пещер, оснащенных научным наблюдательным оборудованием.\n\n[Leader.GetName] [Leader.GetAXX::возглавил|||fem:возглавила] экспедицию в пещеры, где команда обнаружила помещение, запечатанное сплавами неизвестного состава. Из него доносился тихий звон. [GetMysteriousRingingDesc3210]\n\nПолучив звукозащитное оборудование, группа вошла внутрь и обнаружила существо неизвестной расы, впавшее в спячку рядом с источником сигнала — странным цилиндрическим устройством.\n\nАнализ показал, что устройство испускает регулярные радиовсплески, за которыми следуют несколько часов мелодичного шума, а также вокализации, совместимые с речевым аппаратом существа. [Leader.GetName] предполагает, что устройство пытается разбудить существо в соответствии с установленным расписанием."
 infernals.3210.individual: "Обследуя дверь, группа нашла слабое место в пломбе и вскрыла ее. В этот момент звон стал оглушительным, вызвав у команды приступы паники и вспышки ярости."
 infernals.3210.gestalt: "Обследуя дверь, группа нашла слабое место в пломбе и вскрыла ее. В этот момент звон стал оглушительным, вызвав у единиц сенсорную перегрузку и когнитивные сбои."
 infernals.3210.a: "Скопировать их исследования и уйти."
 infernals.3210.b: "Попытаться разбудить и нанять существо."
 infernals.3210.btt: "Получен лидер: £scientist£ §Y$scientist$§! §G4-го§! уровня."
 infernals.3210.c: "Украсть устройство."
 infernals.3210.ctt: "Нашим рабочим будут полезны регулярные напоминания о том, что пора браться за дело. Открывается решение, дающее §G+10%§! к производительности £job£ ['concept_jobs', должностей] ценой §R−5%§! £happiness£ ['concept_happiness', счастья]."
 decision_planetary_workshift: "Внедрить единые рабочие смены"
 decision_planetary_workshift_desc: "$planetary_workshift_deployed_desc$"
 planetary_workshift_deployed: "Единые рабочие смены"
 planetary_workshift_deployed_desc: "Организация работы всей планеты в едином часовом поясе улучшит коммуникацию и эффективность командного взаимодействия ценой допустимого снижения уровня счастья."
 ####################################
 # Origin Events
 ####################################
 # Red Giant Origin
 infernals.45.name: "Тревожные наблюдения"
 infernals.45.desc: "Мы долго считали звезду §Y[capital_star.GetName]§! обычным красным гигантом, однако последние анализы указывают на увеличение ее размера и рост радиационного излучения. Эти изменения уже оказывают заметное влияние на наш климат, и население начинает тревожиться.\n\nНикаких признаков замедления этого процесса нет. Если мы хотим выжить, придется расследовать причину этого явления."
 infernals.45.desc.gestalt: "Мы долго считали звезду §Y[capital_star.GetName]§! обычным красным гигантом, однако последние анализы указывают на увеличение ее размера и рост радиационного излучения. Эти изменения уже оказывают заметное влияние на наш климат.\n\nНикаких признаков замедления этого процесса нет. Если мы хотим выжить, придется расследовать причину этого явления."
 infernals.45.a: "Преуменьшить масштабы проблемы, сохраняя спокойствие."
 infernals.45.b: "Мы должны незамедлительно провести расследование."
 infernals.45.c: "У нас другие приоритеты."
 infernals.45.d: "Пусть этим займется пиар-отдел."
 infernals.45.public.tt: "\n§HИнцидент:§! $situation_red_giant_expansion$ \n- Выбран подход §Y$approach_reassure_public$§! \n- Ежемесячный прирост ресурсов: §G10§! £unity£"
 infernals.45.cause.tt: "\n§HИнцидент:§! $situation_red_giant_expansion$ \n- Выбран подход §Y$approach_find_the_cause$§!"
 infernals.50.name: "Новая"
 infernals.50.desc: "[GetRedGiantEndingExplode]"
 infernals.50.totalIgnorance: "Что бы ни вызвало катастрофу, связанную с этим красным гигантом, теперь это уже не имеет значения. Мы можем лишь принять наше текущее положение и начать восстановление с тем, что осталось."
 infernals.50.semiIgnorance: "Взрыв звезды уничтожил все зацепки, которые могли привести нас к источнику проблемы.\n\nНам остается лишь принять наше текущее положение и начать восстановление с тем, что осталось."
 infernals.50.defaultEnding: "Процесс, запущенный уцелевшими инопланетянами на заброшенной горнодобывающей станции, наконец завершился: звезда §Y[Target.GetStarName]§! вспыхнула как сверхновая, поглотив почти всю систему. Раскаленная плазма и радиация выжгли мир §Y[event_target:red_giant_homeworld_tmp.GetName]§! дотла, а с ним и всю нашу родную систему.\n\n[GetMegacorpDesc50]\n\n[GetLususMiningDesc]"
 infernals.50.megacorp: "Наш родной мир превратился в обширное месторождение полезных ископаемых, рассеянных по всей системе для удобной добычи. Стоимость их извлечения гораздо ниже, чем если бы они оставались внутри планет и лун. Мы можем ожидать резкого роста прибыли благодаря такому дешевому источнику ресурсов."
 infernals.50.nonmegacorp: "Хотя наш родной мир теперь стал пустошью, вспышка сверхновой обнажила по всей системе несметные залежи минеральных ресурсов, которые можно легко добывать с помощью обычного оборудования. Мы можем использовать эти богатства, чтобы построить свое будущее заново."
 infernals.50.lususExists: "Станция испустила последний импульс энергии и отключилась, оставив нас наедине с обломками нашего родного мира."
 infernals.50.lususGone: "Поскольку станции больше нет, §Y[event_target:red_giant_homeworld_tmp.GetName]§! может спать спокойно, зная, что это никогда не повторится."
 infernals.50.a: "Мы должны сделать всё, чтобы восстановить наш дом."
 infernals.51.name: "Вспышка сверхновой предотвращена"
 infernals.51.desc: "Благодаря титаническим усилиям по очистке поверхность планеты §Y[this.GetName]§! снова пригодна для термофилов. Хотя некоторые шрамы останутся навсегда, теперь их можно по максимуму использовать в уникальных исследовательских проектах."
 infernals.60.name: "Возвращение к норме"
 infernals.60.desc: "Регулируя сифон, извлекая водород из оболочки и тонко настраивая баланс звездного вещества, мы смогли безопасно обратить вспять расширение звезды §Y[Target.GetStarName]§!, вернув ее к прежнему спокойному состоянию теплого красного гиганта.\n\nМы уже зафиксировали стабилизацию климата на звезде §Y[Target.GetStarName]§! и можем рассчитывать на более благоприятное будущее, в котором наша родная планета остается сердцем нашего государства.\n\n[GetRedGiantEndingKalmStationStatus]"
 infernals.60.lususDestroyed: "Без станции мы, вероятно, никогда не поймем до конца, что именно произошло, но можно хотя бы извлечь выгоду из материалов, выброшенных звездой при коллапсе."
 infernals.60.lususAlive: "Теперь, когда мы научились управлять станцией, мы можем решить, как распорядиться ею в дальнейшем."
 infernals.60.a: "Разобрать станцию."
 infernals.60.b: "Продолжить изучение станции."
 infernals.60.c: "Пусть она будет памятником нашей победе."
 infernals.60.d: "Наконец-то все закончилось."
 infernals.65.name: "Расширение звезды"
 infernals.65.desc: "Продолжающиеся наблюдения подтверждают, что §Y[Target.system_star.GetName]§! расширяется с ускорением. Также поступают сообщения о физическом воздействии возросшего уровня радиации. Если мы не найдем способ остановить это, §Y[Target.system_star.GetName]§! уничтожит нас задолго до того, как поглотит планету.\n\n[GetMegacorpDesc65]"
 infernals.65.nonmegacorp: "Защита от звездной радиации может подарить нам дополнительное время. Более рискованный, но потенциально выгодный путь — использовать возросшее излучение для стимуляции энергетического и промышленного сектора."
 infernals.65.megacorp: "Инвестиции в защиту планеты станут страховкой от нестабильности и помогут обезопасить нашу ресурсную базу. Однако мы могли бы повысить энергетические и промышленные показатели, если используем возросшее излучение, а не будем пытаться противодействовать ему."
 infernals.65.a: "Защитить наш родной мир."
 infernals.65.b: "Извлечь выгоду из этого явления."
 infernals.70.name: "Ненасытная звезда"
 infernals.70.desc: "Звезда §Y[Target.GetName]§! поглотила свою первую крупную жертву — самую близкую к себе планету нашей системы. Хотя сама планета уцелела, ее ресурсы теперь вне нашей досягаемости, глубоко в огненных недрах звезды.\n\nХотя мы можем справиться с такими экономическими потерями, это событие дало нам пугающий пример того, что ожидает мир §Y[Owner.Capital.GetName]§!."
 infernals.75.name: "Сопутствующий ущерб"
 infernals.75.desc: "Беспрецедентный рост нашего красного гиганта продолжается — звезда поглотила еще одну планету. Ее ресурсы навсегда останутся недоступными, если только звезда не сбросит внешние слои, вспыхнув сверхновой."
 infernals.95.name: "Звездные туннели"
 infernals.95.desc: "Правда о звезде §Y[capital_star.GetName]§! оказалась намного более странной, чем мы предполагали. Текущее расследование выявило пару связанных подпространственных туннелей в глубинах нашей звезды.\n\nОдин из этих каналов напрямую перекачивает богатый водородом материал во внешнюю оболочку, ускоряя термоядерный синтез и увеличивая производство гелия. Это должно было привести к сжатию ядра, но второй туннель активно откачивает энергию, противодействуя процессу. В результате звезда расширяется.\n\nПервые телеметрические данные с обоих туннелей указывают, что они соединены со множеством конечных точек, разбросанных по всей галактике. Наше выживание зависит от того, насколько быстро мы их исследуем."
 infernals.95.a: "Нам нужно исследовать три таких точки."
 infernals.95.a.tt: "Обнаружены подходящие цели для триангуляции подпространственного происхождения."
 infernals.105.name: "Подпространственные шрамы"
 infernals.105.desc: "Астрометрическое сканирование вокруг планеты §Y[FromFromFrom.GetName]§! выявило необъяснимые подпространственные шрамы. Хотя сейчас здесь нет точки выхода, в прошлом туннель мог открываться на орбите этого газового гиганта. Полученные данные дали нам знания о физике, которые можно применить в других областях.\n\nТем временем нам придется продолжить поиски в других местах, чтобы отыскать источник подпространственных туннелей, воздействующих на нашу звезду."
 infernals.105.a: "Будем искать дальше."
 infernals.110.name: "Инопланетный металлолом"
 infernals.110.desc: "Сканирование вокруг планеты §Y[FromFromFrom.GetName]§! также выявило подпространственные шрамы. Кроме того, мы обнаружили скопления древнего металлолома вблизи планеты. Они находятся на стабильной орбите и, возможно, связаны со шрамами.\n\nТекущее сканирование этих подпространственных флуктуаций должно помочь нам оптимизировать солнечные батареи вокруг нашей родной звезды.\n\nХотя эти данные были полезны, нужно изучить еще как минимум одно место, чтобы точно определить источник наших проблем."
 infernals.110.a: "Продать лом на аукционе."
 infernals.115.name: "Триангуляция завершена"
 infernals.115.desc: "Наконец-то прорыв.\n\nШрамы, найденные рядом с планетой §Y[FromFromFrom.GetName]§!, помогли нам триангулировать источник нарушений в нашей звезде — всё указывает на незамеченную ранее систему с враждебными сигнатурами.\n\nЭто расследование в конечном счете может помочь нам нейтрализовать то, что воздействует на нашу звезду.\n\nКогда мы войдем в систему §YЛузус§!, мы, вероятно, сможем изменить судьбу звезды §Y[FromFromFromFrom.Target.solar_system.GetName]§! и нашей цивилизации."
 infernals.115.a: "Действовать с осторожностью."
 infernals.115.b: "Подготовить демонстрацию силы."
 infernals.115.c: "Провести обряд, прежде чем приближаться."
 red_giant_lusus_triangulated_tt: "Обнаружена новая система."
 infernals.2115.name: "Штурмовая группа"
 infernals.2115.desc: "Наши силы взяли станцию под контроль. Обитатели оказали некоторое сопротивление, но были плохо вооружены и, судя по всему, не обучены сражаться. При ближайшем рассмотрении многие из них оказались молодняком. Мы отловили всех выживших.\n\nНачался анализ того, как мы можем управлять подпространственными туннелями, которые, похоже, являются своего рода сифоном для добычи энергии. Со временем мы сможем исправить ситуацию в нашей родной системе."
 infernals.2115.a: "Уничтожить станцию."
 infernals.2115.b: "Допросить выживших."
 infernals.2115.c: "Отправить их в рабство."
 infernals.2115.d: "Выжившие представляют риск. Устранить их."
 infernals.2115.e: "Поговорить с выжившими."
 infernals.2115.f: "Очистить станцию."
 infernals.2115.g: "Съесть их."
 infernals.400pops: "В мире [this.GetName] появится §G400§! £pop£ поселений"
 infernals.300pops: "В мире [this.GetName] появится §G300§! £pop£ поселений"
 infernals.2121.name: "Инопланетяне ликвидированы"
 infernals.2121.desc: "Станция подпространственной добычи была уничтожена, все на ее борту погибли.\n\nРазрушение станции привело к детонации какого-то неизвестного накопителя энергии. Высвободившаяся энергия устремилась через коллапсирующий подпространственный туннель в звезду §Y[event_target:situation_red_giant_target_shortterm.GetStarName]§!, существенно усугубив ситуацию у нас дома.\n\nТем не менее перекачка водорода в нашу звезду прекратилась. Как бы плохи ни были дела, хуже уже не станет. Хотя мы, возможно, никогда не узнаем, каково было происхождение или устройство этой станции, мы можем, по крайней мере, спать спокойно, зная, что подобная сила не достанется нашим соперникам.\n\nК сожалению, пока мы не понимаем, как вернуть звезду §Y[event_target:situation_red_giant_target_shortterm.GetStarName]§! в исходное состояние. Чтобы повлиять на ее состояние, придется полагаться на наши записи и разобраться в принципах работы станции."
 infernals.2121.a: "Пора уже навести здесь порядок."
 infernals.2122.name: "Станция уничтожена"
 infernals.2122.desc: "Обломки станции дрейфуют в космосе, однако ее уничтожение дарует нам шанс изменить судьбу звезды §Y[event_target:situation_red_giant_target_shortterm.GetStarName]§! — хоть это и потребует масштабных и дорогостоящих усилий."
 infernals.2125.name: "Переговоры с инопланетянами"
 infernals.2125.desc: "Приложив немало усилий, мы смогли создать примитивный переводчик для общения с обитателями станции.\n\nСтанция функционирует на протяжении жизни многих поколений, перемещаясь от одного газового гиганта к другому и используя подпространственный сифон, чтобы извлекать энергию из далеких звезд и питать ею системы жизнеобеспечения и мощный прыжковый двигатель.\n\nИнопланетяне не до конца понимают, как работают подконтрольные им системы, и не осознавали, что их энергия выкачивается из звезд и в конечном счете уничтожает их.\n\nНесмотря на замешательство, они, кажется, горят желанием покинуть станцию. Они пообещали научить нас всему, что знают, в обмен на безопасное место для жизни и воспитания потомства."
 infernals.2125.a: "Предоставить им убежище."
 infernals.2125.b: "Дать им корабль — пусть ищут собственный путь."
 infernals.2125.c: "Дистанционно разгерметизировать станцию."
 infernals.2125.d: "Позволить им составить собственное мнение о нас."
 infernals.2130.name: "Подпространственная добыча"
 infernals.2130.desc: "Станция откачивает водород из газового гиганта и направляет его через подпространство в оболочку нашей звезды. Последующий термоядерный синтез гелия высвобождает избыточную энергию, которая преобразуется в §Yкристаллизованную энтропию§! для питания станции.\n\nНестабильность звезды §Y[event_target:situation_red_giant_target_shortterm.GetStarName]§! является следствием ошибок калибровки и износа оборудования, которые обитатели станции либо не заметили, либо не знали, как исправить.\n\nИспользуя их древние технологии, мы можем обратить процесс вспять, но это будет непросто. Вместо этого мы могли бы, наоборот, подтолкнуть звезду к вспышке сверхновой, что обнажит бесчисленные месторождения и превратит наше наследие в кладезь пригодных для добычи ресурсов."
 infernals.2130.a: "Пора за работу."
 infernals.2131.desc: "Станция откачивает водород из газового гиганта и направляет его через подпространство в оболочку нашей звезды. Последующий термоядерный синтез гелия высвобождает избыточную энергию, которая преобразуется в §Yкристаллизованную энтропию§! для питания станции.\n\nОбитатели станции сохранили лишь искаженные устные предания о принципах ее работы. Они потеряли связь с родной цивилизацией тысячи лет назад, возможно, из-за ее коллапса или уничтожения. Накопившиеся ошибки калибровки и износ оборудования делали откачку энергии всё более нестабильной, и из-за этого звезде §Y[event_target:situation_red_giant_target_shortterm.GetStarName]§! теперь грозит смерть.\n\nИспользуя их древние технологии, мы можем обратить процесс вспять, но это будет непросто. Вместо этого мы могли бы, наоборот, подтолкнуть звезду к вспышке сверхновой, что обнажит бесчисленные месторождения и превратит наше наследие в кладезь пригодных для добычи ресурсов."
 infernals.2135.name: "Конец угрозе"
 infernals.2135.desc: "Узнав о нашем бедственном положении, обитатели станции выразили тревогу и смятение. Они считали себя одинокими и не подозревали о существовании других рас в галактике.\n\nВ порыве раскаяния и еще до того, как мы полностью осознали их действия, они начали демонтировать станцию, безвозвратно уничтожив большую часть ее компонентов.\n\nИз-за этого контролировать расширение звезды будет сложно. Кроме того, нужно решить, что делать с этими инопланетянами: стоит ли даровать им прощение, которого они так жаждут."
 infernals.2135.a: "Приютить их и разобрать станцию на компоненты."
 infernals.2135.b: "Избавиться от них и от станции."
 infernals.2135.c: "Отправить их в рабство и уничтожить станцию."
 infernals.2140.name: "Призрак стабильности"
 infernals.2140.desc: "Приложив титанические усилия, мы всё же мы получили полный контроль над судьбой звезды §Y[event_target:situation_red_giant_target_shortterm.GetStarName]§!. Без нашего вмешательства она продолжила бы свой естественный жизненный цикл в текущем размере.\n\nОднако древняя и ветхая станция не выдержит постоянной перенастройки. Каждая корректировка подвергает объект предельному напряжению. Нужно принять окончательное решение.\n\nМы можем либо вернуть звезду к прежним размерам, либо заставить ее расшириться, превратив систему в обширное поле легко добываемых ресурсов.\n\nНаши [GetScientistPlural] проведут последнюю перенастройку. После этого станцию ждет стремительная разборка — с помощью внешней силы."
 infernals.2140.a: "Зафиксировать звезду в текущем состоянии."
 infernals.2140.b: "Ускорить расширение звезды."
 infernals.2140.bdesc: "§Y[event_target:situation_red_giant_target_shortterm.GetStarName]§! неизбежно расширится."
 infernals.2140.c: "Вернуть звезде обычный размер."
 infernals.2140.cdesc: "§Y[event_target:situation_red_giant_target_shortterm.GetStarName]§! неизбежно уменьшится."
 infernals.2145.name: "Стабильность достигнута"
 infernals.2145.desc: "Благодаря тому, что мы получили полный контроль над колебаниями размера и энергии нашей звезды, §Y[Target.GetStarName]§! полностью стабилизировалась. Она останется в нынешнем состоянии на миллионы лет, и население нашей родной системы вновь сможет наслаждаться стабильностью и уверенностью в завтрашнем дне.\n\nНесомненно, увеличенный размер звезды повлияет на нашу инфраструктуру, но теперь мы можем извлечь из этого максимум пользы, используя возросшее производство энергии и сохраняя при этом постоянное присутствие в системе."
 infernals.2145.a: "Наконец-то мы сами управляем своей судьбой."
 infernals.2151.name: "Таинственная станция"
 infernals.2151.desc: "Войдя в систему, наши корабли столкнулись с ограниченным сопротивлением группы автоматизированных дронов. Они были быстро нейтрализованы, что позволило подробнее изучить инопланетную станцию.\n\nСооружение остается работоспособным, хотя на корпусе явно видны следы частого и непрофессионального ремонта. Попытавшись получить доступ к одной из стыковочных палуб, мы вступили в контакт с ранее неизвестным инопланетным видом. Несмотря на языковой барьер, нам удалось подтвердить, что именно эта установка создавала туннели, воздействующие на звезду §Y[event_target:situation_red_giant_target_shortterm.GetStarName]§!.\n\nСейчас мы пытаемся наладить общение. Возможно, дело удастся решить путем переговоров. В противном случае придется рассмотреть более прямые методы — штурмовать объект или уничтожить его. Однако без тщательного понимания его назначения такие действия могут нести значительный риск для нашей звезды."
 infernals.2151.a: "Перевести их язык."
 infernals.2151.b: "Взять станцию штурмом."
 infernals.2151.c: "Уничтожить станцию."
 infernals.2160.name: "Искра кризиса"
 infernals.2160.desc: "Изучение станции подпространственной добычи позволило предположить, что она накапливает колоссальные объемы тепловой энергии в экзотической форме, которую наши [GetScientistPlural] называют §Yкристаллизованной энтропией§!. Станция использует тепловое зацикливание для усиления входящей энергии.\n\nЕсли нам удастся воспроизвести эту технологию, мы могли бы овладеть немыслимой силой, которую многие сочтут неестественной и опасной. С ее помощью мы сможем производить огромное количество избыточного тепла, но, научившись жить и процветать в таких условиях, сможем покорить всю галактику."
 infernals.2160.a: "Продолжим исследования."
 infernals.2160.a.tt: "[GetRedgiantAlreadyHyperthermiaPickable]Становится доступна §Yкристаллизованная энтропия§! для приближения галактической гипертермии."
 infernals.2160.a.ttunlock: "Можно принять бонус за стремление «$ap_galactic_hyperthermia$».\n"
 infernals.2160.b: "Эта технология слишком опасна."
 infernals.2160.c: "Какое примитивное использование §Yкристаллизованной энтропии§!."
 situation_red_giant_expansion: "Расширение красного гиганта"
 situation_red_giant_expansion_type: "$situation_red_giant_expansion$"
 situation_red_giant_expansion_desc: "Стремительные перемены в излучении нашей звезды угрожают стабильности нашего родного мира. Если так продолжится, §Y[Owner.Capital.GetStarName]§! рано или поздно взорвется сверхновой, распылив на атомы всю систему."
 situation_red_giant_expansion_monthly_change_tooltip: "Степень расширения зависит от того, насколько быстро мы сможем найти и устранить причину."
 situation_red_giant_expansion_fail_tooltip: "§Y[Target.solar_system.GetName]§! взорвется сверхновой."
 situation_red_giant_expansion_finish_tooltip: "§Y[Target.solar_system.GetName]§! вернется в прежнее состояние."
 situation_red_giant_expansion_stage_1: "Наша звезда относительно спокойна, но уровень ее излучения необычно высок."
 situation_red_giant_expansion_stage_2: "Наша звезда стала крупнее, чем когда-либо за время нашего эволюционного пути, и это оказывает явное влияние на родной мир."
 situation_red_giant_expansion_stage_3: "Наша звезда опасно разрослась, и ее чрезвычайная активность угрожает стабильности родного мира."
 situation_red_giant_expansion_stage_4: "Наш красный гигант выжигает значительную часть нашей звездной системы, сильно затрудняя жизнь."
 situation_red_giant_expansion_stage_5: "Наша звезда вот-вот взорвется, нанеся катастрофический урон всей нашей родной системе."
