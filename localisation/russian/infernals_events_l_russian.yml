 # RG Timeline events
 TIMELINE_EVENT_ORIGIN_RG_START: "$origin_red_giant$\n§L[GetDate]§!"
 TIMELINE_EVENT_ORIGIN_RG_START_TOOLTIP: "§HЗвездные туннели§!\n§YСобытие происхождения§!\n\nМы обнаружили ряд подпространственных возмущений. Начались поиски причины гибельной нестабильности нашей звезды."
 TIMELINE_EVENT_ORIGIN_RG_END_NOVA: "Смерть гиганта\n§L[GetDate]§!"
 TIMELINE_EVENT_ORIGIN_RG_END_NOVA_TOOLTIP: "§HНаблюдение сверхновой§!\n§YСобытие происхождения§!\n\nНаша звезда расширилась, поглотив всю систему, обратив планеты в расплавленные руины и рассеяв в пустоте ресурсы. Теперь у нас не остается выбора, кроме как выковать новое будущее среди звезд."
 TIMELINE_EVENT_ORIGIN_RG_END_STABLE: "Усмирение гиганта\n§L[GetDate]§!"
 TIMELINE_EVENT_ORIGIN_RG_END_STABLE_TOOLTIP: "§HСпасение родного мира§!\n§YСобытие происхождения§!\n\nМы смогли стабилизировать рост звезды, предотвратив катастрофический коллапс. Возросшая радиация потребует адаптации, но, пройдя через эти испытания, мы сможем стать сильнее, чем когда-либо."
 TIMELINE_EVENT_ORIGIN_RG_END_NORMAL: "Мирный гигант\n§L[GetDate]§!"
 TIMELINE_EVENT_ORIGIN_RG_END_NORMAL_TOOLTIP: "§HСпасение родного мира§!\n§YСобытие происхождения§!\n\nМы обратили вспять губительные изменения нашей звезды, вернув ее к тому мирному состоянию, в котором она была прежде. Мы доказали, что способны справиться даже с самой апокалиптической угрозой, и теперь готовы ко всему, что приготовила нам вселенная."
 # COSMIC DAWN
 # All strings below are in order of their appearance ingame
 infernals.2500.name: "Сигналы в глубине" # intro
 infernals.2500.desc: "Точечное сканирование обнаружило под поверхностью мира §Y[root.capital_scope.GetName]§! замысловатые сооружения, уходящие вглубь планеты. Их размер и сложность возрастают по мере приближения к ядру. Материальные и энергетические сигнатуры совпадают с той стазисной камерой, в которой мы когда-то пробудились.\n\nПохоже, это остатки нашей прежней цивилизации. Если нам удастся получить доступ к этим объектам, мы, возможно, найдем ответы на главные вопросы о нашем прошлом: кто мы такие и что с нами случилось?"
 infernals.2500.a: "Наше путешествие начинается."
 INF_ORIGIN_COSMIC_DAWN_DRILLING: "Бурение планетарной коры" # from 2500
 INF_ORIGIN_COSMIC_DAWN_DRILLING_DESC: "Если мы хотим понять, кто мы, сначала нужно узнать, откуда мы пришли. Нам предстоит раскопать объекты, погребенные под поверхностью мира §Y[owner.Capital.GetName]§!."
 infernals.2505.name: "Пробуждение новых сородичей"
 infernals.2505.desc.a: "Мы обнаружили новые стазисные капсулы, в которых еще остались живые §Y[root.GetSpeciesNamePlural]§!. Мы начали выводить их из спячки, но, похоже, они осведомлены о прошлом не лучше нас."
 infernals.2505.desc.b: "Мы обнаружили новые стазисные капсулы, в которых еще остались живые §Y[root.GetSpeciesNamePlural]§!. Даже после интеграции они не смогли вспомнить ничего полезного."
 infernals.2505.a: "Начать полномасштабные раскопки."
 infernals.2505.b: "Извлечь лишь самое необходимое."
 infernals.2505.c: "Нанять подрядчиков для проведения работ."
 situation_cosmic_dawn: "Глубокие раскопки"
 situation_cosmic_dawn_type: "$situation_cosmic_dawn$"
 situation_cosmic_dawn_monthly_change_tooltip: "Текущий прогресс глубоких раскопок."
 situation_cosmic_dawn_desc: "Во время раскопок мы обнаружили технологически развитые подземные сооружения, архивные данные и стазисные капсулы со спящими сородичами. Здесь захоронена наша история. Если мы выкопаем всё без остатка, мы, вероятно, сможем понять, кто мы такие."
 situation_cosmic_dawn_finish_tt: "Чтобы узнать больше о себе, мы должны заново познать наше далекое прошлое."
 situation_cd_mod_mining: "$approach_cd_mining$"
 situation_cd_mod_drilling: "$approach_cd_drilling$"
 situation_cd_mod_financial: "$approach_cd_financial$"
 situation_cd_mod_storm: "$TRIGGER_FAIL$ Не завершен особый проект §Y$INF_ORIGIN_COSMIC_DAWN_STORM$§!"
 situation_cd_mod_bribe: "$TRIGGER_FAIL$ Не завершен особый проект §Y$INF_ORIGIN_COSMIC_DAWN_BRIBE$§!"
 sit_cd_stage1_tt: "Пробуриваем планетарную кору."
 sit_cd_stage2_tt: "Поверхность осталась где-то далеко наверху."
 sit_cd_stage3_tt: "Полпути пройдено. Жара становится невыносимой."
 sit_cd_stage4_tt: "Здесь уже слышен гулкий ропот ядра."
 sit_cd_stage5_tt: "Это предел, дальше только ядро."
 approach_cd_mining: "Карьер"
 approach_cd_mining_tt: "Бросить все силы на раскопки. Раз уж мы здесь, будем попутно добывать полезные ископаемые. \nЕжемесячный прогресс: §Y+$@approach_cd_mining$§!\n\n"
 approach_cd_drilling: "Точечное бурение"
 approach_cd_drilling_tt: "Задействовать наше лучшее и самое точное буровое оборудование. Бурить ровно настолько, насколько необходимо.\nЕжемесячный прогресс: §Y+$@approach_cd_drilling$§!\n\n"
 approach_cd_financial: "Поощрение инвестиций"
 approach_cd_financial_tt: "Перенаправить субподрядчиков на этот проект, оставляя часть их прибыли себе.\nЕжемесячный прогресс: §Y+$@approach_cd_financial$§!\n\n"
 # Stage 2
 infernals.2510.name: "Потерянная память и данные"
 infernals.2510.intro: "Чем больше стазисных капсул мы находим, тем яснее становится: потеря памяти оказалась почти полной."
 infernals.2510.desc.a: "$infernals.2510.intro$\n\nНекоторые из вновь пробужденных задают нам тот самый вопрос, что мучит и нас: «Кто вы?»\n\nИ всё же, несмотря на века общей истории и постоянно развивающееся общество, мы не стали ни на шаг ближе к ответу, чем они.\n\n$infernals.2510.outro$"
 infernals.2510.desc.b: "$infernals.2510.intro$\n\nПробудившиеся сородичи, как и все до них, не помнят ничего важного о нашем происхождении. В отсутствие ответов нам приходится самим прокладывать путь в будущее.\n\n$infernals.2510.outro$"
 infernals.2510.outro: "Базы данных спящих, в отличие от них самих, содержат ошеломляющую информацию. Мы многократно всё перепроверили, но результаты неоспоримы. Согласно этим данным, с момента нашего ухода в стазис прошло более двенадцати миллиардов лет.\n\nЭто значит, что наши истоки близки к началу вселенной, ко времени формирования первых звезд и планет. Возможно, мы — одна из первых разумных рас, появившихся во вселенной."
 infernals.2510.a: "Наверстать упущенное."
 infernals.2510.b: "Эта вселенная наша по праву."
 # Stage 3
 infernals.2515.name: "Сбой системы жизнеобеспечения"
 infernals.2515.desc: "Мы раскопали трагедию. Записи с этой уцелевшей стазисной базы показывают, что мир §Y[event_target:homeworld.GetName]§! миллиарды лет дрейфовал в пустоте, прежде чем его захватила наша нынешняя звезда. Эта гравитационная ловушка вызвала чудовищный приливный разогрев.\n\nХотя эти силы и создали вулканический рай, который мы теперь называем домом, первоначальный удар нанес критические повреждения энергоячейкам комплекса. Автоматика, следуя заложенной иерархии, отдала приоритет высокопоставленным лицам, отключив капсулы низшего статуса и системы обеспечения структурной целостности.\n\nНаши [GetScientistPlural&nom] прогнозируют, что спасти удастся лишь одного, — активация нарушит работу поврежденного энергоблока и вызовет цепную реакцию, которая быстро приведет к полному обрушению тоннеля.\n\nЕсли бы система не руководствовалась чинами, мы могли бы спасти куда больше жизней."
 infernals.2515.a: "Научный прогресс превыше всего."
 infernals.2515.a.tt: "Получен лидер: £scientist£ §Y$scientist$§!"
 infernals.2515.b: "Отдать приоритет экспертам было хорошим решением."
 infernals.2515.b.tt: "Получен лидер: £official£ §Y$official$§!"
 infernals.2515.c: "Разберите ячейки без активации."
 infernals.2515.c.tt: "Заменить можно любого, но нашему государству нужно пространство для роста."
 infernals.2520.name: "Межзвездные убежища"
 infernals.2520.desc: "§Y[event_target:leader.GetName]§! восстанавливает архивные данные стазисных капсул. Согласно последним находкам, в галактике может быть множество других мест с небольшими популяциями [root.GetSpeciesNamePlural&gen] — спящих, как и мы когда-то.\n\nВ архивах записаны координаты этих миров, но за прошедшее с тех пор время родились и погасли многие звезды, и найти их теперь можно лишь с помощью сложных расчетов. В качестве доказательства концепции [event_target:leader.GetName] [event_target:leader.GetAXX::определил|||fem:определила] местоположение одной такой планеты, но полная расшифровка массива данных только начинается.\n\nТем временем возникает тревожная мысль: что, если [root.Capital.GetStarName] — не наша родная звезда, а всего лишь одно из многих убежищ? Если это так, то где наш настоящий дом? И имеет ли это еще какое-то значение?"
 infernals.2520.a: "Мы должны отыскать сородичей."
 infernals.2520.b: "Теперь наш дом здесь."
 cosmic_dawn_anomalies_event_chain_title: "Межзвездные убежища"
 cosmic_dawn_anomalies_event_chain_desc: "В галактике может быть множество других мест со скрытыми популяциями [root.GetSpeciesNamePlural&gen] — спящих, как и мы когда-то.\n\nВ архивах записаны координаты этих миров, но за прошедшее с тех пор время родились и погасли многие звезды, и найти их теперь можно лишь с помощью сложных расчетов."
 # Anomaly 2
 cosmic_dawn_sleepers_category: "Изолированные спящие"
 cosmic_dawn_sleepers_category_desc: "На планете с этими координатами должен быть тайник с технологиями и новыми спящими. Нужно тщательно всё изучить."
 infernals.2525.name: "$cosmic_dawn_sleepers_category$"
 infernals.2525.desc: "§Y[root.leader.GetName]§! [root.leader.GetAXX::обнаружил|||fem:обнаружила] подземный комплекс, где в стазисе покоились другие наши сородичи, и успешно [root.leader.GetAXX::пробудил|||fem:пробудила] их. В отличие от нас, они сохранили смутные воспоминания о прежней жизни и живут рассказами о великой космической империи, которая однажды вернется их спасти.\n\nОни настроены настороженно, но признают в нас родичей. Мы могли бы представиться их долгожданными спасителями, наследниками той древней славы. Или сказать правду: что мы создаем нечто новое и жаждем учиться у них так же, как и учить их.\n\nИзучив дополнительные материалы из этих архивов, мы смогли определить еще одно место со стазисными капсулами."
 infernals.2525.a: "Мы — их древние спасители."
 infernals.2525.b: "Мы строим нечто новое."
 infernals.2525.c: "Ассимилировать их."
 # Anomaly 3
 cosmic_dawn_sleepers2_category: "Настороженные спящие"
 cosmic_dawn_sleepers2_category_desc: "$cosmic_dawn_sleepers_category_desc$"
 infernals.2530.name: "$cosmic_dawn_sleepers2_category$"
 infernals.2530.desc: "§Y[root.leader.GetName]§! [root.leader.GetAXX::обнаружил|||fem:обнаружила] новых сородичей в стазисе и [root.leader.GetAXX::сумел|||fem:сумела] их пробудить, однако те отреагировали страхом и потребовали, чтобы мы ушли. Они не признали в нас родичей и не рады нашему присутствию.\n\nПосле напряженных переговоров они выразили желание покинуть планету, чтобы исследовать галактику. Мы могли бы предоставить им простой корабль за умеренную плату. Или же, учитывая нашу постоянную потребность в рабочей силе, переселить их в ближайшую колонию. Возможно, тогда они одумаются.\n\nВ архивах на этом объекте найдены указания на расположение еще одного мира со стазисными капсулами."
 infernals.2530.a: "Выдать им корабль."
 infernals.2530.b: "Вернуть их домой."
 infernals.2530.b.tt: "Получено £pop£ поселений: §G+200§!"
 infernals.2530.c: "Ассимилировать их."
 # Ship returns
 infernals.2531.name: "Возвращение"
 infernals.2531.desc: "Спящие, взявшие наш корабль, вернулись — и не просто вернулись, а на грозном боевом судне. Путешествуя по галактике, они наткнулись на пиратов, которых перехитрили и в итоге одолели.\n\nЗахват вражеского корабля пробудил в них нечто новое — вкус к пиратской жизни. С этого момента их набеги становились всё смелее, а цели — всё значительнее. Но даже успешным пиратством нельзя заниматься вечно.\n\nТеперь они вернулись домой в поисках стабильности и, возможно, чего-то большего. Их корабль, опыт и награбленные сокровища могут очень нам пригодиться."
 infernals.2531.a: "Всё было не зря."
 infernals.2531.a.tt: "Их корабль пригодится нашему флоту. Мы получим крейсер."
 infernals.2531.b: "Переоборудовать их корабль для заселения новых миров."
 infernals.2531.b.tt: "Мы получим §Hколониальный корабль§!."
 infernals.2531.c: "Мы найдем для них место в столице."
 infernals.2531.c.tt: "Получено £pop£ поселений: §G+200§!"
 # Anomaly 4
 cosmic_dawn_sleepers3_category: "Космопорт спящих"
 cosmic_dawn_sleepers3_category_desc: "$cosmic_dawn_sleepers_category_desc$"
 infernals.2535.name: "$cosmic_dawn_sleepers3_category$"
 infernals.2535.desc: "§Y[root.leader.GetName]§! [root.leader.GetAXX::обнаружил|||fem:обнаружила] небольшой стазисный комплекс и скрытый космопорт с почти исправным научным кораблем. Для его запуска потребуется лишь незначительный ремонт.\n\nВ комплексе также оказалось собрание научных данных, включая сохранившиеся образцы других видов[GetInterstellarRefugiaDesc2535]. Неясно, были они получены добровольно или с применением силы, но на корабле есть камеры, предназначенные для перевозки разумных существ.\n\nМы можем многое узнать, изучив их, — возможно, даже открыть новые формы жизни."
 infernals.2535.contact: ", некоторые из которых, вероятно, являются предками современных разумных рас." # prints this in [GetInterstellarRefugiaDesc2535] above
 infernals.2535.nocontact: "." # Can't be empty, so holds the full stop.
 infernals.2535.a: "Изучить образцы."
 infernals.2535.b: "Вернуть образцы потомкам."
 infernals.2535.c: "Уничтожить все улики."
 # Random Stasis Pods discovered
 infernals.2536.1: "Спустя месяцы тяжелого труда, все спавшие [root.GetSpeciesNamePlural&nom] в мире [planet.GetName] присоединились к нам."
 infernals.2536.1.a: "Отправляемся в следующую систему!"
 infernals.2536.1.b: "У нас больше нет времени этим заниматься." # ends the chance to spawn more pods.
 infernals.2536.2: "Очередная стазисная капсула успешно открыта, а ее обитатели отправились домой."
 infernals.2536.3: "Мы освободили еще больше [root.GetSpeciesNamePlural&gen] и теперь помогаем им приспособиться к остывшей вселенной, где для выживания требуется жар звезд."
 infernals.2536.4: "Новые [root.GetSpeciesNamePlural&nom] пробудились в мире [planet.GetName]."
 infernals.2536.5: "Обнаружена еще одна стазисная капсула."
 infernals.2536.6: "[root.leader.GetName] [root.leader.GetAXX::нашел|||fem:нашла] еще одну стазисную капсулу, вернув еще больше [root.GetSpeciesNamePlural&gen] из прошлого в настоящее."
 infernals.2536.7: "[root.leader.GetName] [root.leader.GetAXX::обнаружил|||fem:обнаружила] еще одну стазисную капсулу, где мирно спят [root.GetSpeciesNamePlural&nom]."
 infernals.2536.8: "[root.leader.GetName] [root.leader.GetAXX::открыл|||fem:открыла] древнюю стазисную капсулу в мире [planet.GetName] и помогает ее обитателям справиться с холодным шоком."
 infernals.2536.9: "В мире [planet.GetName] найдена еще одна стазисная капсула, в которой есть спящие [root.GetSpeciesNamePlural]."
 infernals.2536.10: "Новые [root.GetSpeciesNamePlural&nom] пробудились от вечного сна и присоединились к нам."
 # Stage 4
 infernals.2540.name: "Древняя тюрьма"
 infernals.2540.desc: "Наши очередные раскопки преподнесли сюрприз: эта группа спящих пробудилась столетия назад, но так и не покинула комплекс.\n\nАрхитектурный анализ показал, что он запирается снаружи — словно для того, чтобы удерживать их внутри. Пробив усиленные двери, мы сразу же столкнулись с враждебностью, хотя спящие вскоре отступили.\n\nВероятно, архивы могли бы пролить свет на произошедшее здесь, но доступ к ним может вызвать новую агрессию. Мы можем взять комплекс штурмом и быстро покончить с этим либо попытаться склонить их к сотрудничеству с помощью торговли."
 infernals.2540.a: "Штурмовать комплекс."
 infernals.2540.b: "Предложить им дары и нашу дружбу."
 INF_ORIGIN_COSMIC_DAWN_STORM: "Штурм стазисного комплекса"
 INF_ORIGIN_COSMIC_DAWN_STORM_DESC: "Мы обязаны получить доступ к этому объекту, и спящие стоят у нас на пути. Устраним препятствие силой."
 infernals.2545.name: "Штурм тюрьмы"
 infernals.2545.desc: "Наши силы ворвались в комплекс и быстро обезвредили большинство обитателей, встретив лишь незначительное сопротивление.\n\nИз архивов стало ясно, что это была тюрьма. Заключенные были экстремистами и выступали за применение крайних мер — использование технологий для повторного нагрева остывающей вселенной. Некоторые идеи было совершенно невозможно воплотить, другие могли привести к катастрофе.\n\nНекоторые §Y[root.GetSpeciesNamePlural&nom]§! из числа их лидеров забаррикадировались в центральном отсеке со взрывчаткой и требуют, чтобы все обитатели остались и были вновь запечатаны.\n\nТоннель можно заполнить невидимым газом, который нейтрализует взрывчатку и спасет конструкции, однако многие обитатели вскоре задохнутся."
 infernals.2545.a: "Заполнить тоннель газом."
 infernals.2545.a.tt: "Получено £pop£ поселений: §G+100§!"
 infernals.2545.b: "Провести быструю эвакуацию."
 infernals.2545.b.tt: "Получено £pop£ поселений: §G+400§!"
 INF_ORIGIN_COSMIC_DAWN_BRIBE: "Подкуп стазисного комплекса"
 INF_ORIGIN_COSMIC_DAWN_BRIBE_DESC: "Если обитатели комплекса будут зависеть от нас, мы можем воспользоваться положением и потребовать прямой доступ к комплексу. Мы завалим их полезными и крайне необходимыми товарами и ресурсами."
 infernals.2550.name: "Мягкое решение"
 infernals.2550.desc: "Месяцы торговли сделали бывших заключенных зависимыми от наших поставок. Когда мы пригрозили их прекратить, они запаниковали и уступили контроль над комплексом.\n\nАрхивы подтвердили, что это была тюрьма. Эти личности в прошлом продвигали радикальные технологии для нагрева остывающей вселенной: некоторые из их идей были абсурдны, другие — ужасающе практичны.\n\nК счастью, они ничего не помнят. Пока ученые исследуют комплекс, бывшие заключенные успешно интегрируются в общество, будучи на полпути к ассимиляции."
 infernals.2550.a: "Отлично сработано."
 infernals.2550.a.tt: "Получено £pop£ поселений: §G+300§!"
 # Stage 5
 infernals.2555.name: "Трагический инцидент"
 infernals.2555.intro: "На месте последних раскопок произошла авария. Энергостанция комплекса была повреждена, хотя стазисные капсулы пока функционируют."
 infernals.2555.outro: "Неясно, как долго проработают системы. Если мы хотим спасти спящих, нужно начать действовать до того, как энергия комплекса иссякнет."
 infernals.2555.desc.a: "$infernals.2555.intro$\n\nПодозрение пало на недавно ассимилированных термофилов из предыдущего комплекса. Поползли слухи, что они не отличались особой добросовестностью в работе.\n\n$infernals.2555.outro$"
 infernals.2555.desc.b: "$infernals.2555.intro$\n\nУзнав о катастрофе, предыдущая группа спасенных термофилов вызвалась помочь со спасательной операцией.\n\n$infernals.2555.outro$"
 infernals.2555.a: "Избавиться от недобросовестных работников."
 infernals.2555.b: "Нанять дополнительных рабочих."
 infernals.2555.c: "Поспешить на помощь."
 infernals.2555.d: "Действовать осторожно."
 # Option events from above (Stage 4)
 infernals.2560.name: "Решение ситуации"
 infernals.2560.desc: "Мы предоставили доступ на объект только самым надежным работникам, чтобы не допустить срывов спасательной операции.\n\nК сожалению, проверки безопасности сократили наши рабочие ресурсы, и спасти комплекс не удалось. Все спящие погибли.\n\nЕдинственное утешение в том, что мы можем изучить технологии. Их постепенное увядание и отключение могут подарить нам ценные знания."
 infernals.2560.a: "Какая досада."
 infernals.2565.name: "$infernals.2560.name$"
 infernals.2565.desc: "Мы предложили финансовое вознаграждение за спасательные работы и получили поток желающих помочь.\n\nК сожалению, операцию саботировали бывшие заключенные, возмущенные тем, что мы навязываем контроль за счет богатства. В результате саботажа погибли все обитатели стазисных капсул.\n\nНебольшим утешением служит то, что повреждения были точечными. Мы всё еще можем изучать технологии и архивы, а эта неудача выявила недостатки в нашей системе проверок, которые теперь можно исправить."
 infernals.2565.a: "Какое отвратительное предательство!"
 infernals.2570.name: "$infernals.2560.name$"
 infernals.2570.intro: "Наплыв рабочих и спасательных команд в подземный комплекс позволил нам быстро провести эвакуацию из сбоящих стазисных капсул — все спящие [Species.GetName&nom] теперь в безопасности. Эти новые граждане, избежавшие безвременной кончины, полны благодарности за спасение."
 infernals.2570.outro: "К сожалению, в ходе поспешной эвакуации многие капсулы пришлось вскрывать силой или вовсе разбивать, что снизило их научную ценность."
 infernals.2570.desc.a: "$infernals.2570.intro$\n\n$infernals.2570.outro$"
 infernals.2570.desc.b: "$infernals.2570.intro$\n\nКроме того, добровольцы из числа ассимилированных заключенных поддерживают новичков, помогая им словом и делом, что облегчает их интеграцию в общество.\n\n$infernals.2570.outro$"
 infernals.2570.a: "Хорошо, что у нас были эти добровольцы."
 infernals.2570.a.tt: "Получено £pop£ поселений: §G+400§!"
 infernals.2570.b: "Отлично сработано."
 infernals.2570.b.tt: "Получено £pop£ поселений: §G+400§!"
 infernals.2570.c: "$ACKNOWLEDGED$"
 infernals.2570.c.tt: "Получено £pop£ поселений: §G+400§!"
 infernals.2575.name: "$infernals.2560.name$"
 infernals.2575.desc: "Наши ученые тщательно проанализировали системы, чтобы в полной мере осознать, с чем мы имеем дело, прежде чем спасать спящих.\n\nК сожалению, весь процесс — от анализа до публикаций и дополнительных исследований — занял так много времени, что к моменту нашей готовности система жизнеобеспечения окончательно вышла из строя, и все спящие погибли.\n\nНесмотря на трагедию, спасательная операция поспособствовала крупным научным достижениям, и восстановленные технологии уже доказали свою ценность."
 infernals.2575.a: "По крайней мере, живые смогли извлечь из этого пользу."
 infernals.2575.b: "$ACKNOWLEDGED$"
 # Situation completed
 infernals.2580.name: "Наследие предков"
 infernals.2580.desc: "Мы наконец достигли центрального ядра, и его масштабы поражают воображение. Внутри планеты находится огромный аркологический комплекс, питаемый магмой и вмещающий тысячи спящих.\n\nЗдесь же хранятся обширные архивы, описывающие наше прошлое: расцвет нашей Галактической империи и голоса эпохи Великого Охлаждения Вселенной. Одни выбрали стазис, другие сражались с неизбежным, третьи просто отрицали реальность и погибли.\n\nИтак, теперь мы знаем давно забытую правду. Некоторые полагают, что это показывает, кто мы на самом деле и кем еще можем стать. Другие возражают, что мы уже создали новое великое государство и что общество наших предков не соответствует реалиям сегодняшнего дня.\n\nКак бы то ни было, теперь в нашем распоряжении есть обширная сеть тоннелей."
 infernals.2580.a: "Мы должны восстановить нашу древнюю империю."
 infernals.2580.b: "Другие государства должны уважать наше наследие."
 infernals.2580.b.tt: "Получен лидер: £commander£ §Y$commander$§! §G5-го§! уровня."
 infernals.2580.c: "Мы должны смотреть в будущее."
 infernals.2580.d: "Важно лишь творить добро."
 # Relic & Specimen
 r_pyroglyphic_codex: "Огненный кодекс"
 r_pyroglyphic_codex_desc: "Сложная хрустальная модель звездной системы, хранящая в себе множество сведений о цивилизации, существовавшей на заре времен. Его содержимое может многому научить в деле построения великого общества."
 r_pyroglyphic_codex_effect_tt: "\n§YПервая§! активация Огненного кодекса добавляет постоянный модификатор §Y$infernal_library$§! в нашей столице со следующими эффектами: $TABBED_NEW_LINE$- $MOD_PLANET_MAX_DISTRICTS_ADD$: §G+5§! $TABBED_NEW_LINE$- $MOD_PLANET_HOUSING_MULT$: §G+20%§! $TABBED_NEW_LINE$- $MOD_PLANET_AMENITIES_ADD$: §G+10%§!"
 infernal_library: "Подземная архитектура"
 infernal_library_desc: "Вновь освоенные на этой планете древние строительные техники открыли новые возможности для возведения обширных пещерных городов. Невиданные доселе детали и архитектурные решения представляют собой поистине завораживающее зрелище, напоминая всем гражданам об их истинном происхождении."
 pyroglyphic_codex_mod: "$r_pyroglyphic_codex$"
 pyroglyphic_codex_mod_desc: "Удивительные тайны, обнаруженные в Огненном кодексе, стимулируют развитие новых направлений науки и будут продолжать делать это еще многие годы."
 infernal_stasispod: "Древняя криокапсула"
 infernal_stasispod_desc_short: "Саркофаг из синтетического камня, оснащенный поразительно точными терморегуляторами"
 infernal_stasispod_desc_details: "[Species.GetNamePlural] использовали такие капсулы, чтобы входить в стазис на миллиарды лет, и пробуждались лишь в том случае, если температура снаружи повышалась достаточно для поддержания их жизни. Эта капсула была доставлена из комплекса, многие системы которого вышли из строя, а обитатели погибли. Она служит суровым и торжественным напоминанием об испытаниях, через которые прошли выжившие [Species.GetNamePlural]."
 ####################################
 # Colony Events
 ####################################
 # Imminent Eruption
 infernals.3000.name: "Надвигающееся извержение"
 infernals.3000.desc: "Системы геологического мониторинга в мире §Y[planet.GetName]§! предупреждают, что в течение следующего года очень вероятно извержение вулкана вблизи главного поселения.\n\nУ нас есть несколько вариантов. Мы можем инвестировать в контролируемый сброс давления, что позволит использовать поток лавы для выработки энергии. Можно подготовить команды, которые будут собирать магму прямо во время извержения, а затем отфильтровывать из нее драгоценные металлы. Или же мы можем начать эвакуацию гражданского населения и припасов из района извержения, чтобы минимизировать риски.\n\nНаконец, можно просто продолжить наблюдение за ситуацией, прежде чем принимать какие-либо меры — на случай если прогнозы окажутся неточными."
 infernals.3000.a: "Начать эвакуацию!"
 infernals.3000.a.tt: "Есть §Y500§! энергокредитов."
 infernals.3000.b: "Выжидать."
 infernals.3000.c: "Сосредоточиться на выработке энергии."
 infernals.3000.d: "Будем собирать магму."
 infernals.3005.name: "Как раз вовремя"
 infernals.3005.desc: "Срочная эвакуация колонии оказалась верным решением. Извержение произошло раньше ожидаемого срока, разрушив многие постройки в регионе. Теперь, когда подземное вулканическое давление стабилизировалось, колонисты могут вернуться и безопасно восстановить поселение."
 infernals.3010.name: "Вулканический гнев"
 infernals.3010.desc: "Извержение началось раньше срока, и колония не была к этому готова. Инфраструктура серьезно пострадала, значительная часть населения погибла."
 infernals.3015.name: "Выжидательная позиция"
 infernals.3015.desc: "Спустя несколько месяцев вулканическая активность вблизи колонии в мире §Y[planet.GetName]§! пошла на спад. Хотя в долгосрочной перспективе риск сохраняется, похоже, пока что колония в безопасности."
 infernals.3015.a: "Риск оправдался."
 infernals.3020.name: "Усиленная энергосеть"
 infernals.3020.desc: "Инженерным командам удалось установить безопасную систему для медленного стравливания сжатой лавы из подземных камер путем пропуска через электрогенераторы. Благодаря этому ненадолго выросла производительность местной энергосети."
 infernals.3025.name: "Добыча магмы"
 infernals.3025.desc: "Извержение вулкана удалось предотвратить за счет комбинации ультразвуковых дестабилизаторов и физических барьеров, в результате чего на поверхности образовалось большое озеро магмы. Добывающие команды уже приступили к сбору этого минерального сокровища."
 # Lava Sports
 infernals.3030.name: "Лавовый спорт"
 infernals.3030.desc: "Можно было бы подумать, что никто не захочет проводить время рядом с открытыми потоками раскаленной лавы. Но в мире §Y[planet.GetName]§! это предположение оказалось бы ошибочным.\n\nКолонисты устраивают гонки на рабочих ховеркрафтах над активными лавовыми потоками, уворачиваясь от плавающих валунов и прыгая через лавопады. Другие делают ставки на исход этих заездов, а игорные притоны привлекли внимание организованной преступности. Несколько пилотов уже погибли в различных происшествиях.\n\nВ колонии нет законов, запрещающих эту практику, поскольку никто не мог представить, что кому-то придет в голову подобное занятие. Мы могли бы принять энтузиазм колонистов и позволить им продолжать в том же духе, но это может привести к еще более опасным трюкам и развитию преступной сети, поскольку ставки на такого рода события набирают популярность. Как вариант, мы можем урегулировать этот вид спорта; это вызовет недовольство, но в долгосрочной перспективе минимизирует смертность и преступность. Или же мы можем полностью запретить его, что будет наиболее эффективным вариантом, но потребует затрат на введение ограничительных мер."
 infernals.3030.a: "Пусть себе развлекаются."
 infernals.3030.b: "Будем регулировать этот спорт."
 infernals.3030.c: "Пресечь это безрассудство!"
 lava_surfboard: "Лавовая доска"
 lava_surfboard_desc_short: "Продолговатая стальная пластина с приваренным к ней механизмом для парения"
 lava_surfboard_desc_details: "Хотя эта доска, использовавшаяся в лавовых видах спорта в мире [Event.Planet.GetName], явно сварена из подручных деталей, она выполнена с необычной тщательностью и изобретательностью. Ее система парения и теплозащита превосходны, а эстетика отражает суровую самодостаточность колонистов фронтира."
 infernals.3035.name: "Пусть себе развлекаются!"
 infernals.3035.desc: "Легализация увлечения колонистов вызвала настоящий ажиотаж вокруг лавового спорта. Изображения пилотов, маневрирующих на ховеркрафтах над потоками лавы, быстро стали символом местной культуры мира §Y[planet.GetName]§!.\n\nК сожалению, энтузиазм затмевает мысли о безопасности. Продолжают поступать разрозненные сообщения о смертельных случаях на гонках, а криминальные ростовщики, похоже, всё активнее наживаются на любителях делать ставки. Хотя общественное одобрение этого вида спорта остается на высоте, стоит продолжать отслеживать возможные негативные последствия."
 infernals.3035.a: "Тревожная ситуация."
 infernals.3040.name: "Меры безопасности"
 infernals.3040.desc: "Хотя поначалу колонисты были недовольны тем, что власти начали регулировать их любимое развлечение, новые требования к гоночным аппаратам свели на нет травмы и смертельные случаи. Пилоты-гонщики сами заявляют о пользе этих правил для их же безопасности, что положительно сказывается на настроениях в обществе.\n\nРегулирование также коснулось азартных игр в лавовом спорте: теперь они облагаются налогами, а сборы направляются на обеспечение безопасности гонщиков. В результате игорные заведения фактически избавились от криминальной составляющей, хотя некоторые колонисты и жалуются на слишком высокие налоги."
 infernals.3040.a: "Безопасность прежде всего."
 infernals.3045.name: "Запрет спорта"
 infernals.3045.desc: "Для прекращения этой опасной практики были задействованы правоохранительные органы. Общественный резонанс против таких мер был мощным, по всей колонии прошли протесты, но благодаря постоянному наблюдению за лавовыми потоками стало невозможно проводить гонки. Смертность упала до нуля, а игорный бизнес полностью исчез."
 infernals.3045.a: "У нас не было другого выбора."
 lava_sports_flow: "Лавовый спорт: §GРазрешен§!"
 lava_sports_flow_desc: "Легализация увлечения колонистов вызвала настоящий ажиотаж вокруг лавового спорта."
 lava_sports_regulated: "Лавовый спорт: §YРегулируется§!"
 lava_sports_regulated_desc: "Хотя поначалу колонисты были недовольны тем, что власти начали регулировать их любимое развлечение, новые требования к гоночным аппаратам свели на нет травмы и смертельные случаи. Пилоты-гонщики сами заявляют о пользе этих правил для их же безопасности, что положительно сказывается на настроениях в обществе."
 lava_sports_banned: "Лавовый спорт: §RЗапрещен§!"
 lava_sports_banned_desc: "Для прекращения этой опасной практики были задействованы правоохранительные органы."
 # Kindled Myths
 infernals.3055.name: "Разгоревшиеся мифы"
 infernals.3055.desc: "Представители досветовой расы на планете §Y[pre_ftl_planet.GetName]§! поразительно похожи на мифологических существ из наших древнейших преданий. Частично это можно объяснить общими тенденциями конвергентной эволюции и психологии, но чем больше мы узнаём об этой расе, тем больше находим параллелей.\n\nМогут ли это быть те самые существа из наших мифов и легенд? Эта перспектива вызывает растущее волнение, и мы могли бы инвестировать в дальнейшие исследования. Но иногда лучше не искать глубинного смысла в обычных совпадениях, а чрезмерное любопытство может раскрыть этому обществу наше присутствие, вызвав непредвиденные последствия."
 infernals.3055.a: "Проигнорировать совпадение."
 infernals.3055.b: "Изучить подробнее."
 infernals.3060.name: "Ошибочное предположение"
 infernals.3060.desc: "Несмотря на отдельные призывы к расследованию, было бы неразумно продолжать гоняться за гипотезой о мифологических пришельцах. В конце концов, у этой расы есть свои собственные мифы, легенды и представления о себе, которые могут не совпадать с нашими предположениями. Исследования по этой теме приостановлены, а средства перенаправлены на другие задачи."
 infernals.3060.a: "Выглядят знакомо, но не более."
 infernals.3065.name: "Смута среди примитивов"
 infernals.3065.desc: "В своем стремлении связать эту расу с мифами наши агенты пренебрегли протоколом безопасности при контакте с досветовой цивилизацией. Местные жители видели наши корабли по всей планете, смогли завладеть нашим оборудованием и даже схватили одного из наших агентов для изучения. Информация о нашем существовании вызвала беспорядки и расколола общество.\n\nНесмотря на хаос в проведении операции, волнение среди нашего народа по поводу связи этой расы с мифами сохраняется. В государстве всё чаще смотрят на них сквозь призму духовности."
 infernals.3065.a: "Нам следовало быть осторожнее."
 infernals.3070.name: "Потрясающее открытие"
 infernals.3070.desc: "Тщательное изучение обитателей планеты §Y[pre_ftl_planet.GetName]§! пошатнуло мифологическую гипотезу. Хотя между нашими древнейшими сказаниями и этими существами найдено много параллелей, был выявлен и ряд неоспоримых различий.\n\nНесмотря на эти сложности, энтузиазм в отношении данного вида не угас. Некоторые предполагают, что они могут быть потомками существ из наших преданий, а различия объясняются тем, что с тех пор прошло колоссальное количество времени. И хотя мы вынуждены признать их самостоятельным обществом, многие в нашем государстве теперь ощущают сильную духовную связь с этой цивилизацией."
 infernals.3070.a: "Великий момент для всех нас."
 # Molten Core Grand Archive specimen
 infernals.3200.name: "Расплавленное ядро"
 infernals.3200.desc: "Чем больше разрасталась колония на планете §Y[planet.GetName]§!, тем чаще нам встречались следы вымершей цивилизации, которая использовала живой металл; однако происхождение этого материала тогда мы установить не сумели.\n\nПролить свет на эту тайну удалось лишь недавно, когда из глубинных магматических потоков на поверхность всплыла странная мерцающая сфера, заключенная в силовое поле. Ее изначальное предназначение и конструкция неясны, но при воздействии экстремально высоких температур из нее начинает сочиться живой металл. Это разрешило археологическую загадку, однако теперь нам предстоит решить судьбу артефакта."
 infernals.3200.a: "Сохранить артефакт."
 infernals.3200.a.accept: "Этот любопытный объект не похож ни на одну из наших разработок. Он полезен не только как источник живого металла, но и как научная и историческая находка, заслуживающая изучения."
 infernals.3200.b: "Вернуть его в лаву."
 infernals.3200.b.deny: "Нет ничего достойного в цивилизации, которая не смогла адаптироваться и вымерла. Артефакт следует уничтожить и предать забвению."
 infernal_molten_core: "Расплавленное ядро"
 infernal_molten_core_desc_short: "Серебристая сфера с волнующейся, жидкой текстурой, заключенная в потрескивающее силовое поле"
 infernal_molten_core_desc_details: "Поле ослабевает только под воздействием высоких температур, выпуская наружу каплю £sr_living_metal£ §Yживого металла§!. Создатели ядра давно сгинули, но оно остается свидетельством их научных достижений и изобретательности."
 # CD Timeline events
 TIMELINE_EVENT_ORIGIN_CD_START: "Глубинное эхо\n§L[GetDate]§!"
 TIMELINE_EVENT_ORIGIN_CD_START_TOOLTIP: "§HПо следам предков§!\n§YСобытие происхождения§!\n\nМы уловили едва заметные сложные сигналы, исходящие из недр планеты. Их источником является сеть древних сооружений глубоко в планетарной коре — построек, существовавших еще до того, как мы погрузились в сон на бессчетные годы."
 TIMELINE_EVENT_ORIGIN_CD_END: "Познание истории\n§L[GetDate]§!"
 TIMELINE_EVENT_ORIGIN_CD_END_TOOLTIP: "§HЗавершение цепочки событий§!\n§YСобытие происхождения§!\n\nМы обнаружили обширное древнее сооружение в глубинах планеты и извлекли оттуда кодекс с утраченными знаниями ушедшей эпохи. Мы — наследники древней и могущественной империи и готовы заявить свои права на галактику."
