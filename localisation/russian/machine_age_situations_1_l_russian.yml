 edict_neurocasted_spectacles: "Нейротрансляция зрелищ"
 edict_neurocasted_spectacles_desc: "Трансляция жестоких зрелищ из столичного Киберкупола, направленная непосредственно в кибермозг, влечет в столицу новых гостей. В безопасности своих капсул зрители воспринимают действо прямо из глаз гладиаторов. Целый год игрищ!"
 edict_neurocasted_spectacles_effect: "Счастье поселений за пределами планеты-столицы: §G+10%§!$DOUBLE_NEW_LINE$§EЭффекты Киберкупола:§! $building_cyberdome_edict_effects$"
