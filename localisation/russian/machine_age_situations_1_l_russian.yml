 #Cyber Corporate Collectivist
 auth_cyber_corporate_collectivist: "Корпоративный кайдзен"
 auth_cyber_corporate_collectivist_desc: "Кайдзен, или стремление к постоянному совершенствованию, — практика, незаменимая в век компьютеров, в том числе биологических. Благодаря обширному ассортименту улучшений наши клиенты смогут добиться новых высот и укрепить социальные связи.\n\nКроме того, в эти улучшения встроен код, позволяющий отслеживать всех пользователей, подключенных к сетям космических баз. Однако стоит учитывать, что высокая рентабельность аугментов наверняка приведет к повальной перепродаже их «из-под полы»."
