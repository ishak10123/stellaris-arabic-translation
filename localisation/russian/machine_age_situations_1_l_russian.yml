 cyber_birth_implants: "Кибердетство"
 cyber_birth_implants_desc: "Вживление кибернетических имплантатов начинается еще в детстве."
 cyber_natural_childhood: "Детство без аугментаций"
 cyber_natural_childhood_desc: "Дети растут беззаботно, не зная, что такое имплантаты."
 AI_control: "ИИ-наблюдатели"
 AI_control_desc: "Усиленные ИИ синаптические реакции побуждают носителей заниматься продуктивной деятельностью."
 moderate_AI_control: "$AI_control$"
 moderate_AI_control_desc: "$AI_control_desc$"
 AI_forced_control: "ИИ-контроллеры"
 AI_forced_control_desc: "Вживление имплантатов в части мозга, ответственные за принятие решений, обеспечивает более высокий уровень контроля со стороны государства."
 media_blockade: "Ограничение работы СМИ"
 media_blockade_desc: "После полного ограничения работы СМИ критика правительственных инициатив затихла."
 helping_hand: "Рука помощи"
 helping_hand_desc: "Лишняя рука совсем не лишняя. Особенно в лаборатории."
 armed_forces: "Вооруженные силы"
 armed_forces_desc: "После вживления дополнительных конечностей наши военные стали сильнее."
 state_handouts: "Государство протягивает руку"
 state_handouts_desc: "Всем инвалидам предоставляются новые конечности-имплантаты."
 branching_out: "Развитый рынок"
 branching_out_desc: "Тот, кто предложит наивысшую цену, сможет установить себе новые конечности-имплантаты."
 handy_workers: "Рукастые рабочие"
 handy_workers_desc: "Новые современные конечности-имплантаты — отличное подспорье для рабочего класса."
 luxury_limbs: "Конечность — это роскошь"
 luxury_limbs_desc: "Власть дает определенные привилегии: представители элиты имеют полноценное право на дополнительные конечности."
 murdered_martyrs: "Жертвенные подданные"
 murdered_martyrs_desc: "Пострадавшие от экспериментов в области аугментации могут согласиться на ритуальное жертвоприношение, чтобы избавиться от страданий."
 artificial_pain_relief: "Искусственное болеутоляющее"
 artificial_pain_relief_desc: "Фармакологическая промышленность уделяет много внимания разработке сильных болеутоляющих для страдающих после киберизации."
 chained_experiments: "Недобровольные эксперименты"
 chained_experiments_desc: "Отказаться от испытаний могут только граждане."
 cyber_opposition: "Кибероппозиция"
 cyber_opposition_desc: "Отказ государства взять на себя ответственность привел к серьезному всплеску оппозиционных настроений."
 cyber_event_bliss_commercial: "Продажа блаженства"
 cyber_event_bliss_commercial_desc: "Среди граждан большим спросом пользуются имплантаты, дарящие владельцу искусственно вызванное чувство радости и благополучия."
 cyber_event_bliss_underground: "Подпольная продажа блаженства"
 cyber_event_bliss_underground_desc: "Подозрительные личности продают ненадежные имплантаты, сулящие радость и здоровье — достаточно лишь нажать кнопку."
 cyber_event_bliss_regulate: "Регулируемая продажа блаженства"
 cyber_event_bliss_regulate_desc: "Правительство регулирует продажу имплантатов, предлагающих радость и восстановление здоровья, однако не производит их самостоятельно."
 cyber_event_worklife_name: "$cyber.615.name$"
 cyber_event_worklife_own: "Неограниченная память работников"
 cyber_event_worklife_own_desc: "На работе и дома не требуется изолировать отдельные участки памяти."
 cyber_event_worklife_leave: "Ограниченная память работников"
 cyber_event_worklife_leave_desc: "Уходя с работы, сотрудники обязаны изолировать участки памяти, отвечающие за место работы, чтобы не допустить промышленного шпионажа."
 cyber_event_worklife_isolate: "Изолированная память работников"
 cyber_event_worklife_isolate_desc: "Все жители государства обязаны строго разделять рабочие и личные воспоминания, чтобы не допустить промышленного шпионажа и конфликтов с работодателем на почве принципов."
 mod_pop_cyborg_specialist_happiness: "$pop_cat_specialist_plural$-киборги: счастье"
 cyber_event_parental_control: "Полный родительский контроль над движениями"
 cyber_event_parental_control_desc: "Родители могут полностью контролировать двигательные функции своих несовершеннолетних детей."
 cyber_event_parental_limited: "Ограниченный родительский контроль над движениями"
 cyber_event_parental_limited_desc: "Родители могут частично контролировать двигательные функции своих несовершеннолетних детей, такие как скорость бега и громкость голоса."
 cyber_event_parental_enforcers: "Контроль над движениями для правоохранителей"
 cyber_event_parental_enforcers_desc: "Несмотря на возражения родителей, контроль над чужими двигательными функциями разрешен только правоохранителям."
 cyber_event_knowledge_engineering: "Передача знаний об инженерии"
 cyber_event_knowledge_engineering_desc: "В сознания ученых транслируются знания об инженерии в ущерб другим областям науки."
 cyber_event_knowledge_physics: "Передача знаний о физике"
 cyber_event_knowledge_physics_desc: "В сознания ученых транслируются знания о физике в ущерб другим областям науки."
 cyber_event_knowledge_society: "Передача знаний об обществе"
 cyber_event_knowledge_society_desc: "В сознания ученых транслируются знания об обществе в ущерб другим областям науки."
 cyber_implant_taxes: "Налоги на имплантаты"
 cyber_implant_taxes_desc: "Большие налоги на материалы и производство кибернетических имплантатов."
 cyber_implant_taxes_tt: "Энергокредиты ежемесячно: §G+5%§!\nСтоимость прироста киборгов: §R+10%§!"
 cyber_reformed_implant_taxes: "Пересмотренные налоги на имплантаты"
 cyber_reformed_implant_taxes_desc: "Пересмотр налогов на материалы и производство кибернетических имплантатов приведет к увеличению краткосрочной прибыли."
 cyber_reformed_implant_taxes_tt: "Энергокредиты ежемесячно: §G+10%§!"
 cyber_market_standards: "Стандарты на рынке имплантатов"
 cyber_market_standards_desc: "На производителей низкокачественных имплантатов, не соответствующих стандартам, заводят уголовные дела."
 cyber_implant_weapons: "Оружейные имплантаты"
 cyber_implant_weapons_desc: "Гражданам разрешено вживлять себе оружейные имплантаты."
 cyber_implants_dismantled: "Разборка опасных имплантатов"
 cyber_implants_dismantled_desc: "Правительство конфискует у населения имплантаты, созданные для причинения вреда другим, в целях переработки их на что-то менее опасное."
 cyber_implant_hacks: "Взломы имплантатов"
 cyber_implant_hacks_desc: "Хакеры, у которых есть исходный код, отвечающий за основные контрольные функции имплантатов, могут получать доступ к чужим имплантатам… и управлять ими."
 cyber_counter_hacking: "Противодействие взлому имплантатов"
 cyber_counter_hacking_desc: "С помощью наших коммуникационных сетей специалисты отслеживают несанкционированные взломы имплантатов."
 cyber_protests: "Протесты против задержки имплантатов"
 cyber_protests_desc: "Население, привыкшее к бесперебойным поставкам новых аугментаций, протестует против недавних товарных задержек."
 cyber_stop_protests: "Разгон протестующих"
 cyber_stop_protests_desc: "Стражи правопорядка разгоняют демонстрантов, протестующих против задержек поставок имплантатов."
 #Policies
 policy_cyberization_standards: "Стандарты киберизации"
 policy_cyberization_standards_desc: "Массовое вживление имплантатов необходимо для нормального функционирования общества, однако противники полной киберизации могут пройти лишь частичный курс."
 cyberization_standards_full_name: "Полная киберизация"
 cyberization_standards_full: "$cyberization_standards_full_name$"
 cyberization_standards_full_effect: "Лидеры-спиритуалисты получают признак §Y«$leader_trait_cyborg$»§!\nПоселения-спиритуалисты получают признак: §Y«$trait_cybernetic$»§!"
 cyberization_standards_full_desc: "Долг каждого гражданина — пройти процедуру установки полного набора кибернетических имплантатов.\n\n§E$cyberization_standards_full_effect$§!"
 cyberization_standards_limited_name: "Ограниченная киберизация"
 cyberization_standards_limited: "$cyberization_standards_limited_name$"
 cyberization_standards_limited_effect: "Лидеры-спиритуалисты получают признак §Y«$leader_trait_limited_cyborg$»§!\nПоселения-спиритуалисты получают признак: §Y«$trait_limited_cybernetic$»§!"
 cyberization_standards_limited_desc: "Противники полной аугментации могут установить себе ограниченный набор имплантатов.\n\n§E$cyberization_standards_limited_effect$§!"
 #CYBERIZATION STAGE 1
 cyber.100.name: "Контроль над будущим" #Stage 1 - Start event
 cyber.100.desc.shared: "Последние достижения в области кибернетических имплантатов прокладывают путь к полной перестройке общества. Тогда мы сможем избавиться от слабости биологических тел. Мы будем умнее, быстрее, сильнее."
 cyber.100.desc.shared_unplugged: "Последние достижения в области кибернетических имплантатов прокладывают путь к полной перестройке общества — исключительно на наших условиях. Тогда мы сможем избавиться от слабости биологических тел и изъянов аугментаций. Мы будем умнее, сильнее, быстрее."
 cyber.100.desc: "$cyber.100.desc.shared$\n\nКорпорации наперебой выдвигают деловые предложения и прогнозируют продажи, а чиновники, напротив, выступают за доступность этой перспективной технологии с гарантией государства."
 cyber.100.desc.unplugged: "$cyber.100.desc.shared_unplugged$\n\nКорпорации наперебой выдвигают деловые предложения и прогнозируют продажи, а чиновники, напротив, выступают за доступность этой перспективной технологии с гарантией государства."
 cyber.100.desc.megacorp: "$cyber.100.desc.shared$\n\nСубподрядчики наперебой выдвигают деловые предложения и прогнозируют продажи изделий сторонних производителей, а совет директоров, напротив, выступает за сохранение нашей монополии на эту важную технологию."
 cyber.100.desc.megacorp_unplugged: "$cyber.100.desc.shared_unplugged$\n\nСубподрядчики наперебой выдвигают деловые предложения и прогнозируют продажи изделий сторонних производителей, а совет директоров, напротив, выступает за сохранение нашей монополии на эту важную технологию."
 cyber.100.a: "Мы национализируем аугментационную промышленность."
 cyber.100.a.megacorp: "Оставить собственное производство."
 cyber.100.a.tt: "$situation_cyberization_triggered_modifier$$cyber_control_government_effects$"
 cyber.100.b: "Мы приватизируем распространение."
 cyber.100.b.megacorp: "Передать эту задачу нашим филиалам."
 cyber.100.b.tt: "$situation_cyberization_triggered_modifier$$cyber_control_corporate_effects$"
 cyber.105.name: "От народа и для народа"
 cyber.105.desc: "Любители вживлять себе модификации негодуют: среднестатистический обыватель сможет позволить себе лишь малую часть разрабатываемых нами имплантатов.\n\nОни утверждают, что необходимо обнародовать документацию и ослабить экологические ограничения — и тогда почти любой сможет производить и чинить имплантаты у себя дома."
 cyber.105.desc.megacorp: "Независимые подрядчики жалуются на недоступность многих разрабатываемых нами имплантатов.\n\nОни утверждают, что необходимо открыть доступ к документации и ослабить патентные требования к производству — и тогда можно будет заняться улучшением сборки имплантатов."
 cyber.105.a: "Требования написаны не просто так."
 cyber.105.a.megacorp: "Это наша интеллектуальная собственность."
 cyber.105.a.tt: "Модификатор инцидента §Y«$situation_cyberization$»§! не изменился."
 cyber.105.b: "Либерализовать эту отрасль."
 cyber.105.b.crafters: "Пусть народ собирает что захочет."
 cyber.105.b.megacorp: "Опубликовать схемы для широкой общественности."
 cyber.105.b.gov.tt: "Обновлен модификатор инцидента §Y«$situation_cyberization$»§!:\n§GДобавлено:§! «$cyber_control_independent_effects$»\n§RУбрано:§! «$cyber_control_government_effects$»"
 cyber.105.b.cor.tt: "Обновлен модификатор инцидента §Y«$situation_cyberization$»§!:\n§GДобавлено:§! «$cyber_control_independent_effects$»\n§RУбрано:§! «$cyber_control_corporate_effects$»"
 #Stage 1 Opportunities - Research
 cyber.120.name: "Умственная разгрузка"
 cyber.120.desc: "Научная группа выдвинула инновационное предложение: встроить в мобильные устройства наблюдательное ПО на основе ИИ. Позднее эту программу можно будет внедрить непосредственно в кибернетические имплантаты.\n\nТакое ПО будет отводить внимание носителей от бессмысленных задач и направлять его на продуктивную интеллектуальную деятельность. Конечно, граждане утратят какую-то долю самостоятельности, однако такая беспрецедентная возможность сделать население в разы продуктивнее выпадает не каждый день."
 cyber.120.a: "Продуктивность превыше всего."
 cyber.120.a.spiritual: "Это настоящее благо."
 cyber.120.b: "Утрата самостоятельности — это перебор."
 cyber.120.b.spiritual: "Никакие соблазны не собьют нас со святого пути."
 cyber.120.c: "Приемлемо. Но нужен переключатель «вкл./выкл»."
 cyber.120.d: "Мы получим почти безграничную власть…"
 #Stage 1 Challenges - Research
 cyber.160.name: "Кибердиссоциация"
 cyber.160.desc: "Взгляды населения в последнее время прикованы к экранам. в эфир вышла новая драма.\n\nЕе действие разворачивается в мире, где кибернетические имплантаты — не роскошь, а привычный предмет обихода. Главный герой — аугментированный рабочий, страдающий от диссоциации с частично механическим телом. В трагической концовке многие зрители усмотрели едва завуалированную критику полной киберизации и неизбежно следующего за ней стирания [Owner.Species.GetAdj]ой личности.\n\nНастроения, порожденные просмотром телехита, быстро обернулись протестами против нашей программы. После выхода драмы в эфир количество добровольцев для испытаний имплантатов упало на 60%."
 cyber.160.a: "Попробовать сформировать другое общественное мнение."
 cyber.160.b: "Ужесточить нормы в отношении имплантатов."
 cyber.160.c: "Скоро это пройдет."
 cyber.160.d: "Подвергнуть драму цензуре."
 cyber.160.e: "Запретить всё освещение в печати."
 #CYBERIZATION STAGE 2
 cyber.200.name: "Центры аугментаций"
 cyber.200.desc.gov: "Политическое противостояние вылилось в разделение ответственности за производство кибернетических улучшений: каждое государственное ведомство отвечает за определенный пункт этой программы. Мы предполагаем, что такая система, где каждому достанется своя доля, позволит участникам контролировать друг друга.\n\nОднако нужно не только рассуждать, но и действовать. Ученые утверждают, что для работы им нужен хотя бы один $building_augmentation_center$."
 cyber.200.desc.cor: "Еще немного, и сбудутся самые смелые наши мечты. И сделать их реальностью нам помогут многочисленные корпорации в нашем государстве. Активно развивающаяся, конкурентная кибернетическая индустрия позволит нам получать новейшие продукты в кратчайшие сроки.\n\nОднако эти планы не станут реальностью сами собой. Ученым требуется хотя бы один $building_upload_center$, который станет средоточием инноваций в отрасли."
 cyber.200.desc.ind: "Наша глобальная сеть разрывается от потока сумасшедших идей — от нейросинаптических аугментаций до кибернетических вкусовых рецепторов… Реализовывать все это было бы очень трудно и дорого, но некоторые концепции показались нам многообещающими.\n\nОднако нужно не только рассуждать, но и действовать. Сетевое сообщество утверждает, что для работы ему нужен хотя бы один $building_augmentation_center$."
 cyber.200.a.gov: "Дать разрешение на строительство."
 cyber.200.a.cor: "Одобрено."
 cyber.200.a.ind: "Удовлетворено."
 cyber.200.a.tt: "§RНеобходимо действие:§!\nПостройте $building_augmentation_center$, чтобы продолжить инцидент §Y«$situation_cyberization$»§!.\n\nКаждый $building_augmentation_center$ дает §G+200§! рабочих мест «$job_augmentor_with_icon$».\n\n$job_augmentor_research_effect_desc$"
 cyber.205.name: "Пробные проекты" #Stage 2 - Start event
 cyber.205.desc.shared: "Пора запускать более широкомасштабные пробные проекты. Сделать это можно будет только на планетах, где есть $building_augmentation_center$. Сами же проекты потребуют постоянной поддержки, однако почерпнутые нами знания мгновенно отразятся на продуктивности."
 cyber.205.desc.gov: "Маломасштабные испытания, проведенные исследовательскими группами за счет правительственного бюджета, подтвердили повышение продуктивности после установки механических имплантатов.\n\n$cyber.205.desc.shared$"
 cyber.205.desc.cor: "Маломасштабные испытания, проведенные на добровольцах из целевой группы, подтвердили повышение продуктивности после установки механических имплантатов.\n\n$cyber.205.desc.shared$"
 cyber.205.desc.ind: "Энтузиасты, которые самостоятельно вживили себе механические имплантаты, подтвердили повышение продуктивности.\n\n$cyber.205.desc.shared$"
 cyber.205.a: "Улучшить элиту."
 cyber.205.a.tt: "Производство ресурсов правителями: §G+10%§! при наличии центра аугментаций"
 cyber.205.b: "Улучшить специалистов."
 cyber.205.b.tt: "Производство ресурсов специалистами: §G+10%§! при наличии центра аугментаций"
 cyber.205.c: "Улучшить рабочих."
 cyber.205.c.tt: "Производство ресурсов рабочими: §G+10%§! при наличии центра аугментаций"
 cyber.205.d: "Улучшить всех."
 cyber.205.d.tt: "Ресурсы от £job£ §Hзанятого населения§!: §G+5%§! при наличии центра аугментаций"
 cyber.210.name: "Параллельное развитие"
 cyber.210.desc.gov.rival: "В распоряжении журналистов оказались свидетельства спонсированных правительством экспериментов по отслеживанию мыслей с помощью микрочипов. Если вживить подобное устройство в мозг, правительству станут досконально известны не только конфиденциальные данные, но и особенности личности."
 cyber.210.desc.cor.rival: "Представленные в суде доказательства, касающиеся разногласий вокруг товарного знака, пролили свет на проведение корпорациями экспериментов с имплантатами дополненной реальности. Согласно чертежам, имплантат крепится непосредственно к глазному нерву пользователя. В документации описываются преимущества для владельцев, а также возможности компаний по перехвату визуальной информации."
 cyber.210.desc.ind.rival: "Отдельные любители модифицировать свои тела уже принялись заменять конечности примитивными механическими манипуляторами. Разумеется, мы не можем гарантировать безопасность таких процедур для здоровья. Кроме того, есть опасения, что нерегламентированная установка имплантатов скорее навредит обществу."
 cyber.210.a: "Это нам пригодится."
 cyber.210.a.tt: "Скорость развития инцидента §Y«$situation_cyberization$»§! на §Y1§! год: §G+25%§!\n\n"
 cyber.210.b: "Пора это прекращать."
 cyber.210.b.tt: "Скорость развития инцидента §Y«$situation_cyberization$»§! на §Y1§! год: §R−25%§!"
 #Stage 2 Opportunities - Test Results and Rival Sector
 cyber.220.name: "Координация нескольких конечностей"
 cyber.220.desc: "Ученые, работающие над нейроинтерфейсами, добились значительных успехов: им удалось создать усилитель нейросигналов, который позволяет пользователям непосредственно управлять системой искусственных конечностей, хоть и с ограниченной ловкостью. Впоследствии мы сможем внедрить этот интерфейс прямо в кибермозг и уйти от необходимости внешних устройств.\n\nВо время первоначальных экспериментов испытуемые продемонстрировали возросшую ловкость и мелкую моторику, а также повышенную боеспособность. Однако затраты на производство этих имплантатов таковы, что массовое внедрение пока невозможно. Надо определиться, кто получит новую технологию первым."
 cyber.220.a: "Нашим ученым пригодятся лишние [owner.species.GetHandNamePlural]."
 cyber.220.b: "Начать укреплять армию."
 cyber.220.c: "Сначала протянем руку помощи инвалидам."
 cyber.220.d: "Никакой благотворительности! Продадим их тому, кто больше заплатит."
 cyber.220.e: "Пусть будет крепок кулак рабочего класса!"
 cyber.220.f: "Новые руки — только в руки элит."
 #Stage 2 Challenges - Test Results and Rival Sector
 cyber.260.name: "В три погибели"
 cyber.260.desc: "Пробная серия испытаний позвоночного модуля окончилось катастрофой: имплантат подавал избыточное усилие на приводы и привел к повреждению спинного мозга у нескольких испытуемых.\n\nШокирующие снимки страшных последствий мгновенно стали достоянием общественности. Количество желающих поучаствовать в испытаниях резко сократилось."
 cyber.260.a: "Приостановить все эксперименты до выработки решения."
 cyber.260.a.tt: "Скорость развития инцидента §Y«$situation_cyberization$»§! на §Y6§! месяцев: §R−50%§!"
 cyber.260.b: "Выплатить компенсации семьям пострадавшим."
 cyber.260.c: "Найти других добровольцев. Если понадобится — назначить."
 #CYBERIZATION STAGE 3
 cyber.300.name: "Внедрение" #Stage 3 - Start event
 cyber.300.desc: "На каждой планете, в каждом крупном городе мы создали значительные запасы механических имплантатов. $job_augmentor_plural$, разработавшие эти устройства, утверждают, что еще немного — и [Owner.Species.GetName] смогут позабыть про прежние ограничения биологических тел.\n\nНастало время сбросить груз прошлого и сделать шаг к кибернетическому будущему."
 cyber.300.a: "Начать киберизацию."
 cyber.300.a.tt: "Лидеры получают признак §Y«$leader_trait_cyborg$»§!\nПоселения получают признак §Y«$trait_cybernetic$»§!\n\n$job_augmentor_growth_effect_desc$\n\nСкорость аугментации зависит от подхода к инциденту и количества центров аугментаций."
 cyber.305.name: "Противники кибернетики" #Spiritualists are Cybernetic Objectors
 cyber.305.desc.shared: "У них нет даже простейших имплантатов, поэтому им сложно существовать в обществе, с каждым днем все более зависимом от технологий.\n\nЕсли мы обяжем всех жителей проходить установку полного комплекта имплантатов, этим кибернетическим «дикарям» станет проще интегрироваться в общество, но эта мера вне сомнения вызовет у них отторжение."
 cyber.305.desc: "Религиозные секты, считающие, что [Owner.Species.GetFleshTypeCyberCreed] и машина должны существовать порознь, отказались проходить киберизацию. $cyber.305.desc.shared$"
 cyber.305.desc.spiritualist: "Верующие, конечно, считают, что [Owner.Species.GetFleshTypeCyberCreed] и машина должны существовать порознь, поэтому отказались проходить киберизацию. $cyber.305.desc.shared$"
 cyber.305.desc.none: "Правильно ли объединять [Owner.Species.GetFleshTypeCyberCreed] и механизмы? Наше общество спорит об этом уже не первый год. Увы, имплантаты повышают эффективность своих хозяев, поэтому те, кто отказывается от киберизации, потенциально оказываются в уязвимом положении.\n\nЕсли мы обяжем всех жителей проходить установку имплантатов, мы обеспечим равенство возможностей, но эта мера вне сомнения вызовет у противников отторжение."
 cyber.305.desc.unplugged: "Этично ли вновь объединять [Owner.Species.GetFleshTypeCyberCreed] и механизмы? Наше общество спорит об этом уже не первый год. Однако разработанные нами имплантаты больше не зависят от капризов ассимилировавших нас машин, а потому эффективность их крайне велика. Те, кто отказывается от их установки, потенциально оказываются в уязвимом положении.\n\nЕсли мы обяжем всех жителей проходить установку имплантатов, мы обеспечим равенство возможностей, но такой подход, вне сомнения, возмутит противников киберизации."
 cyber.305.a: "Пускай привыкают."
 cyber.305.a.materialist: "Вера — пережиток прошлого. Мы смотрим в будущее."
 cyber.305.a.spiritualist: "Вера должна соответствовать временам."
 cyber.305.a.tt: "$cyberization_standards_full_effect$\n\nОткрывается политика §Y«$policy_cyberization_standards$»§!\n"
 cyber.305.b: "Мы пойдем на компромисс."
 cyber.305.b.spiritualist: "Мы придем к пониманию."
 cyber.305.b.tt: "$cyberization_standards_limited_effect$\n\nОткрывается политика §Y«$policy_cyberization_standards$»§!\n"
 #Stage 3 Opportunities - Treatment of Non-Cyborgs
 cyber.320.name: "Потенциал детей"
 cyber.320.birth.desc: "Открытый недавно способ вживлять имплантаты новорожденным неожиданно привел нас в тупик. С одной стороны, неонатальные имплантаты способны коренным образом изменить наши отношения с наукой: раскрыв врожденный кибернетический потенциал с ранних лет, мы вознесемся на невообразимые высоты развития.$cyber.320.end.desc$"
 cyber.320.metamorphosis.desc: "Недавно наши ученые добились невероятных успехов, научившись вживлять микрочипы молодым особям. Во время метаморфоза наши личинки естественным образом поглощают механические системы. С одной стороны, внедрение аугментаций на стадии куколки позволит полностью раскрыть кибернетический потенциал и вознести нас на невообразимые высоты развития.$cyber.320.end.desc$"
 cyber.320.lithoid.desc: "Открытый недавно способ вживлять имплантаты едва кристаллизовавшемуся потомству неожиданно привел нас в тупик. С одной стороны, после внедрения аугментаций молодые особи смогут образовывать естественные связи с металлическими минералами, а значит — раскрывать свой кибернетический потенциал, что вознесет нас на невообразимые высоты развития.$cyber.320.end.desc$"
 cyber.320.root.desc: "Открытый недавно способ вживлять имплантаты молодым росткам неожиданно привел нас в тупик. С одной стороны, после внедрения аугментаций новые особи смогут передавать электрические импульсы посредством усложненной структуры гифов, а значит — раскрывать свой кибернетический потенциал, что вознесет нас на невообразимые высоты развития.$cyber.320.end.desc$"
 cyber.320.egg.desc: "Открытый недавно способ вживлять имплантаты едва вылупившемуся потомству неожиданно привел нас в тупик. С одной стороны, имплантаты способны коренным образом изменить их отношения с наукой: раскрыв врожденный кибернетический потенциал с ранних лет, мы вознесемся на невообразимые высоты развития.$cyber.320.end.desc$"
 cyber.320.other.desc: "Открытый недавно способ вживлять кибернетические имплантаты новорожденным привел нас в тупик. С одной стороны, неонатальные имплантаты способны коренным образом изменить наши отношения с наукой: раскрыв врожденный кибернетический потенциал с ранних лет, мы вознесемся на невообразимые высоты развития.$cyber.320.end.desc$"
 cyber.320.end.desc: "\n\nС другой стороны, появление уже в детстве зависимости от кибернетических аугментаций грозит неприятными последствиями: в долгосрочной перспективе наш вид может оказаться неспособен выживать в пока еще родных телах."
 cyber.320.a: "Таков естественный ход эволюции."
 cyber.320.b: "Не стоит лишать потомство нормального детства."
 #Stage 3 Challenges - Treatment of Non-Cyborgs
 cyber.360.name: "Проблемы превращения"
 cyber.360.desc: "В последнее время всё громче раздаются голоса жалеющих о решении пройти курс экспериментальной модификации тела. После замены ствола головного мозга на механические детали испытуемые впали в экзистенциальный ужас. Некоторые даже утверждают, что их жизнь после операции превратилась в бесконечную череду страданий.\n\nПострадавшие требуют выплатить им компенсации и спрашивают, готово ли государство взять на себя ответственность. Нам придется дать им ответ."
 cyber.360.a: "Запретить столь экстремальные модификации."
 cyber.360.a.tt: "Скорость развития инцидента §Y«$situation_cyberization$»§! на §Y6§! месяцев: §R−50%§!"
 cyber.360.b: "Принести пострадавших в жертву, облегчив тем самым их участь."
 cyber.360.c: "Выделить им более сильные болеутоляющие."
 cyber.360.d: "Начать набирать испытуемых из опустившихся на дно общества."
 cyber.360.e: "Мы не несем никакой ответственности."
 #CYBERIZATION STAGE 4
 cyber.405.name: "Налоги на имплантаты" #Government rival
 cyber.405.desc: "Местные чиновники изо всех сил стараются поспеть за стремительно развивающейся аугментационной отраслью: их соблазняют огромная прибыль и отсутствие строгого законодательства. Немалым налогом облагается каждый этап производства — от добычи ресурсов до вживления самого имплантата.\n\nИзлишняя волокита и дополнительные траты замедляют процесс полной киберизации."
 cyber.405.a: "Оставить налоги."
 cyber.405.b: "Отменить налоги."
 cyber.405.b.tt: "Скорость развития инцидента §Y«$situation_cyberization$»§!: §G+25%§!\n\n"
 cyber.405.c: "Пересмотреть налоги на аугментацию."
 cyber.405.c.tt: "Скорость развития инцидента §Y«$situation_cyberization$»§! на §Y1§! год: §R−10%§!"
 cyber.410.name: "Судебная война" #Government rival escalation
 cyber.410.desc: "Чтобы хоть немного усмирить пыл публики, бросившейся раскупать киберимплантаты, наши законодатели старательно изобретают всё новые ограничения в области аугментации.\n\nПоследний законопроект, проводимый под лозунгами борьбы с «одержимостью» и сохранения памяти о том, кто такие [Owner.Species.GetName], устанавливает максимально допустимое содержание имплантатов в теле. После превышения определенного процента владелец аугментаций больше не имеет права на защиту со стороны закона. Ведь еще немного — и мы забудем, что мы не машины, а [Owner.Species.GetName]."
 cyber.410.a: "Не принимать законопроект."
 cyber.410.a.tt: "Скорость развития инцидента §Y«$situation_cyberization$»§! на §Y1§! год: §G+25%§!"
 cyber.410.b: "Найти компромисс."
 cyber.410.b.tt: "Скорость развития инцидента §Y«$situation_cyberization$»§! на §Y1§! год: §R−25%§!"
 cyber.415.name: "Никаких гарантий" #Corporate rival
 cyber.415.desc: "В погоне за легкой прибылью недобросовестные производители наводнили рынок аугментаций дешевыми низкокачественными имплантатами. Продающие их компании даже не оказывают пользователям поддержку, когда эти устройства в итоге ломаются.\n\nОсобенно большой резонанс возник после сбоя сердечного модулятора, произошедшего прямо во время концерта известного исполнителя. Владелец имплантата — сам исполнитель — покинул этот мир «с огоньком»."
 cyber.415.a: "Рынок сам всё решит."
 cyber.415.a_industrial: "Всё как всегда."
 cyber.415.a.tt: "Скорость развития инцидента §Y«$situation_cyberization$»§!: §G+25%§!"
 cyber.415.b: "Здоровье потребителей превыше всего."
 cyber.415.c: "Наказать самых злостных нарушителей."
 cyber.415.c.tt: "Скорость развития инцидента §Y«$situation_cyberization$»§!: §R−25%§!"
 cyber.420.name: "Умышленно опасно" #Corporate rival escalation
 cyber.420.desc: "В последнее время на рынке появился новый, весьма сомнительный тип кибернетических имплантатов, направленный исключительно на причинение вреда другим. На улицы хлынула волна распылителей токсинов, наноудавок и мозговых глушилок.\n\nПользователи утверждают, что такие имплантаты предназначены исключительно для самозащиты. Другие заявляют, что эти разработки не сулят ничего хорошего."
 cyber.420.a: "Пусть вооружаются."
 cyber.420.b: "Это слишком опасно."
 cyber.420.b.tt: "Скорость развития инцидента §Y«$situation_cyberization$»§!: §R−25%§!"
 cyber.420.b_pacifist: "Все подобные имплантаты нужно разобрать."
 cyber.420.b.tt_pacifist: "Пустить материалы на создание чего-нибудь более… полезного.\n\n"
 cyber.425.name: "Взлом управляющего ПО" #Independent rival
 cyber.425.desc: "В результате совместной атаки несколько хакерских групп завладели базовым ПО, без которого невозможна работа киберимплантатов. Преступники угрожают опубликовать код, если мы не выполним их требования.\n\nПока что мы не сомневаемся, что это не просто угроза. Если код станет общедоступным, нам придется переписать его. Такая долгая задержка нанесет ощутимый удар по программе аугментации."
 cyber.425.a: "Заплатить им."
 cyber.425.b: "Переписать ПО."
 cyber.425.b.tt: "Скорость развития инцидента §Y«$situation_cyberization$»§! на §Y1§! год: §R−25%§!"
 cyber.425.c: "Пусть только попробуют."
 cyber.425.c.tt: "Хорошо, что лучшие хакеры работают на нас."
 cyber.430.name: "Малонадежная аугментация" #Independent rival escalation
 cyber.430.desc.demands: "Выплата огромной суммы вымогателям, ответственным за взлом систем безопасности, не спасла нас от катастрофических последствий. Прошлой ночью весь исходный код, украденный из базы, оказался опубликован в глобальной сети. Перед утечкой хакеры высмеяли наше бессилие, опубликовав непристойное изображение.\n\nНародная обида не заставила себя ждать. Многие уже сожалеют о вживлении киберимплантатов."
 cyber.430.desc.protest: "Переписывание управляющего ПО отняло немало времени и сил, а также замедлило производство.\n\nЗависимость населения от новейших имплантатов стала только сильнее. Многие вышли на улицы, протестуя против задержки поставок."
 cyber.430.a: "Скоро выйдут новые модели."
 cyber.430.b: "Игнорировать их."
 cyber.430.c.demands: "Взломать злоумышленников в ответ."
 cyber.430.c.protest: "Разогнать протестующих."
 cyber.21.name: "Аугментированное население" #Situation 1 - Last event
 cyber.21.desc: "Сегодняшний день станет поворотным моментом для нашего общества. Теперь мы можем улучшать свои тела полностью интегрированными механическими модулями.\n\nПуть был долог и тернист, а преображение проходило не безболезненно. Но мы не станем горевать по утратам, поскольку сегодня нам открылся целый мир новых возможностей."
 cyber.21.a: "Мы станем сильнее."
 cyber.21.a.start: "Добавлен модификатор §Y«$building_augmentation_center$»§!:$TABBED_NEW_LINE$"
 cyber.21.a.end: "Открывает полноценные эффекты дерева традиций «['tradition_category:tradition_cybernetics']»"
 cyber.21.a.gov.tt: "$cyber.21.a.start$$cyber_control_government_effects$\n$cyber.21.a.end$"
 cyber.21.a.cor.tt: "$cyber.21.a.start$$cyber_control_corporate_effects$\n$cyber.21.a.end$"
 cyber.21.a.ind.tt: "$cyber.21.a.start$$cyber_control_independent_effects$\n$cyber.21.a.end$"
 ### CYBERIZATION SITUATION END ###
 ### SOCIETAL EFFECTS EVENT CHAIN START ###
 futureshock_chain_title: "Столкновение с будущим"
 futureshock_chain_desc: "Мы отказываемся довольствоваться тем, что дала нам природа, и стремимся преодолеть ограничения органических тел. Полномасштабное распространение имплантатов проходит почти без препятствий, а те, что всё-таки есть, легко устранить. Новые возможности, которые обещают киберимплантаты, вскружили голову почти каждому из нас.\n\nВеличие настолько близко, что до него почти можно дотянуться. Осталось лишь дождаться."
 change_auth_tt: "Меняется форма правления:"
 keep_auth_tt: "Сохраняется форма правления:"
 cyber_keep_auth_option: "Даже киберизация не изменит нашу природу."
 unlock_edict_tt: "Открывает указ: "
 unlock_agenda_augmentation_product_launch: "Открывает программу: §Y$council_agenda_agenda_augmentation_product_launch_name$§!"
 ### AUTHORITIES ###
 #DEMOCRATIC
 #Cyber Democratic Individualist
 auth_cyber_democratic_individualist: "Демократический параллелизм"
 auth_cyber_democratic_individualist_desc: "Высокотехнологичные протоколы систем нейрозащиты позволяют гражданам непосредственно голосовать за те или иные политические решения в реальном времени.\n\nВ этом демократическом государстве проводятся регулярные выборы, на которых все граждане путем голосования выбирают себе представителя."
 auth_cyber_democratic_individualist_tt: "$auth_democratic_election_tt$\n$unlock_edict_legislative_chorus$"
 concept_auth_cyber_democratic_individualist: "$auth_cyber_democratic_individualist$"
 gov_cyber_democracy_individualist: "$auth_cyber_democratic_individualist$"
 gov_cyber_democracy_individualist_desc: "$auth_cyber_democratic_individualist_desc$"
 #Cyber Democratic Collectivist
 auth_cyber_democratic_collectivist: "Демократическая сопряженность"
 auth_cyber_democratic_collectivist_desc: "Модули согласования сознаний позволяют полноценным киборгам обмениваться сенсорными данными и мыслительными паттернами. Нежелательные реакции на эмоционально заряженные блоки данных отсеиваются с помощью специального брандмауэра, защищающего пользователей от избыточной чувствительности к чужеродным переживаниям.\n\nВ этом демократическом государстве проводятся регулярные выборы, на которых все граждане путем голосования выбирают себе представителя."
 auth_cyber_democratic_collectivist_tt: "$auth_democratic_election_tt$\nНа £pop£ §Hпоселения киборгов§! не влияет уровень счастья\n$unlock_edict_self_preservation_override$"
 concept_auth_cyber_democratic_collectivist: "$auth_cyber_democratic_collectivist$"
 gov_cyber_democracy_collectivist: "$auth_cyber_democratic_collectivist$"
 gov_cyber_democracy_collectivist_desc: "$auth_cyber_democratic_collectivist_desc$"
 #OLIGARCHIC
 cyber_oligarchic_lifespan_tt: "Продолжительность жизни советников-киборгов: §G+40 лет§!"
 cyber_oligarchic_ruleroutput_tt: "Производство ресурсов элитариями за каждые §Y100§! £pop£ §Hпоселений специалистов§!: §G+1%§! (макс. §G+20%§!)"
 #Cyber Oligarchic Individualist
 auth_cyber_oligarchic_individualist: "Разгон вычислений ради олигархов"
 auth_cyber_oligarchic_individualist_desc: "Биочипы специалистов удаленно проходят процедуру разгона — это увеличивает производительность и позволяет правящему классу уделять больше времени политике и отдыху."
 auth_cyber_oligarchic_individualist_tt: "$cyber_oligarchic_lifespan_tt$\n$cyber_oligarchic_ruleroutput_tt$\n$unlock_edict_battle_royale$"
 concept_auth_cyber_oligarchic_individualist: "$auth_cyber_oligarchic_individualist$"
 gov_cyber_oligarchy_individualist: "$auth_cyber_oligarchic_individualist$"
 gov_cyber_oligarchy_individualist_desc: "$auth_cyber_oligarchic_individualist_desc$"
 #Cyber Oligarchic Collectivist
 auth_cyber_oligarchic_collectivist: "Работа на олигархов во сне"
 auth_cyber_oligarchic_collectivist_desc: "Последние достижения в области сопряжения мозга с компьютером дали нам возможность контролировать население во сне. Нейронные проводящие пути индивидов подключаются к серверам, после чего мозг начинает выполнять вычисления либо тело — однообразную работу. Вот они, грёзы наяву."
 auth_cyber_oligarchic_collectivist_tt: "$cyber_oligarchic_lifespan_tt$\nОткрывает способность: §Yшантажировать фракцию§!\n$unlock_edict_stately_acclaim$"
 concept_auth_cyber_oligarchic_collectivist: "$auth_cyber_oligarchic_collectivist$"
 gov_cyber_oligarchy_collectivist: "$auth_cyber_oligarchic_collectivist$"
 gov_cyber_oligarchy_collectivist_desc: "$auth_cyber_oligarchic_collectivist_desc$"
 extortion_tt_opener: "Эта фракция будет производить"
 extortion_tt_finish: "вместо £unity£ §Yединства§!"
 energy_extortion_tt: "$extortion_tt_opener$ £energy£ §Yэнергокредиты§! $extortion_tt_finish$"
 minerals_extortion_tt: "$extortion_tt_opener$ £minerals£ §Yминералы§! $extortion_tt_finish$"
