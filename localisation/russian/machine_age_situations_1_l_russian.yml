 r_the_rulerchip: "Чип правителя"
 r_the_rulerchip_desc: "В этом высокотехнологичном имплантате заключен жизненный опыт его прежних владельцев. Таким образом необходимые правителям знания передаются из поколения в поколение."
 create_relic_the_rulerchip: "Создает реликвию: §Y$r_the_rulerchip$§!"
 rulerchip_passive_tooltip: "Дополнительные варианты черт правителя: §G+1§!"
 rulerchip_intergenerational_knowledge: "Знания других поколений"
 rulerchip_intergenerational_knowledge_desc: "Наш правитель задействует §Y$r_the_rulerchip$§!, чтобы почерпнуть оттуда новые знания."
 rulerchip_intergenerational_knowledge_tooltip: "Прирост опыта правителя: §G+50%§!"
 rulerchip_intergenerational_knowledge_science_tooltip: "\n§EКаждый предшествующий £scientist£ §Yправитель-ученый§! дает: $NEW_LINE$§Y$MOD_COUNTRY_ALL_TECH_RESEARCH_SPEED$:§! §G+5%§! (вплоть до §G+25%§!)\nТекущие эффекты:§!"
