 #DICTATORIAL
 #Cyber Dictatorial Individualist
 auth_cyber_dictatorial_individualist: "Диктаторский кибернадзор"
 auth_cyber_dictatorial_individualist_desc: "Благодаря обязательному вживлению имплантатов контролировать население, держа его в железном кулаке, стало еще проще. Так называемые «диктаторские чипы» отслеживают своих владельцев и автоматически сообщают властям обо всех случаях нарушения закона."
 auth_cyber_dictatorial_individualist_tt: "$unlock_edict_self_indictment_protocol$"
 gov_cyber_dictatorial_individualist: "$auth_cyber_dictatorial_individualist$"
 gov_cyber_dictatorial_individualist_desc: "$auth_cyber_dictatorial_individualist_desc$"
 concept_auth_cyber_dictatorial_individualist: "$auth_cyber_dictatorial_individualist$"
 #Cyber Dictatorial Collectivist
 auth_cyber_dictatorial_collectivist: "Подстройка под диктатуру"
 auth_cyber_dictatorial_collectivist_desc: "Культ личности диктатора и власть над народом можно сделать почти абсолютными благодаря киберимплантатам. Народ, испытывающий благоговейный трепет перед вождем, вряд ли поднимет мятеж."
