 #Cyber Imperial Collectivist
 auth_cyber_imperial_collectivist: "Имперская сеть"
 auth_cyber_imperial_collectivist_desc: "Благодаря имперской сети каждый гражданин сможет погрузиться в новый мир массовых развлечений. $building_cyberdome$ в столице станет местом проведения напряженных киберспортивных турниров для аугментированных спортсменов, а прямая трансляция оттуда будет вестись сразу на несколько планет."
