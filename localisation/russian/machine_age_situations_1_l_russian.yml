 building_cyberdome: "Киберкупол"
 building_cyberdome_desc: "Здесь на потеху имперскому зрителю проходят ожесточенные киберсоревнования с участием аугментированных спортсменов. Гладиаторы, атлеты и бегуны, вживившие себе имплантаты, соревнуются в буквальном смысле до упаду — а то и до смерти."
