 #Cyber Imperial Individualist
 auth_cyber_imperial_individualist: "Императорский чипсет"
 auth_cyber_imperial_individualist_desc: "Назначенный правителем наследник имперского престола получает не только власть, но и особый имплантат, передающийся из поколения в поколение. Внутри содержатся бесценные знания об управлении государством, накопленные предыдущими императорами. Недавно в государстве получили распространение схожие чипы, позволяющие владельцам передавать свои знания другим."
 gov_cyber_imperial_individualist: "$auth_cyber_imperial_individualist$"
 gov_cyber_imperial_individualist_desc: "$auth_cyber_imperial_individualist_desc$"
