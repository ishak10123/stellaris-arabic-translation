 #Buildings
 building_augmentation_center: "Центр аугментаций"
 building_augmentation_center_desc: "В этом причудливом сооружении — на треть торговом комплексе, на треть операционном центре, на треть мастерской — население снабжают киберимплантатами."
 building_augmentation_center_government_desc: "Государственные клиники позволяют гражданам вживлять кибернетические имплантаты из согласованного списка."
 building_augmentation_center_corporate_desc: "Огромный комплекс, предлагающий самые разные кибернетические услуги, в том числе персональный цифровой шоппинг и роскошные постоперационные спа."
 building_augmentation_center_independent_desc: "Нелегальные кибердоктора установят вам любой имплантат, но это цена может оказаться выше пригоршни кредитов."
 building_augmentation_center_hive_desc: "В этом центре — на треть торговом комплексе, на треть операционном центре, на треть мастерской — стоят бесконечные сборочные линии, где населению вживляют кибернетические имплантаты."
 building_augmentation_center_creed_desc: "Это святилище трансцендентной аугментации, куда приходят верующие, чтобы обрести новое рождение через таинство священного слияния."
