 edict_stately_acclaim: "Царственное одобрение"
 edict_stately_acclaim_desc: "Олигархи не упускают случая подчеркнуть титанические труды эксплуатируемой ими фракции, повышая таким образом поддержку и привлекательность в глазах ее участников. Кроме того, мимолетная слава иногда повышает социальную мобильность."
