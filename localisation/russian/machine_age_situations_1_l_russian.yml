 cyber.social_consequences.tt: "Влияет на идущий §Yпереход общества к кибернетическому§!.\n\n" #Standard tooltip to indicate that the Individualism/Collectivism variables are changed
 #FIRST EVENT #
 #DEMOCRATIC
 cyber.505.name: "Столкновение с будущим"
 cyber.505.desc.gov: "Широкомасштабная аугментация — не что иное, как торжество оптимизации производственных процессов и принятия решений. Мы услышали каждый голос; мы ответили на каждый сложный вопрос. Теперь все до единого §Y[root.GetSpeciesNamePlural]§! смогут воспользоваться благами современной науки. Жизнь уже никогда не станет прежней.\n\nТеперь разумно будет задуматься над расширением сферы применения этих технологий. Внедрим ли мы их в демократические процессы или, может, упростим рабочим жизнь, включив синхронизацию переживаний?"
 cyber.505.desc.cor: "Мы успешно провели широкомасштабную аугментацию — не без помощи других корпораций. Процесс производства, распространения и установки имплантатов отлажен, как часовой механизм. Мы услышали каждый голос; все §Y[root.GetSpeciesNamePlural]§! получили достойный ответ на обоснованные опасения. Мы бодры, полны сил и готовы вступить в будущее.\n\nТеперь правительство готовится сделать следующий шаг. Мы можем доработать демократические процессы или синхронизировать имплантаты, чтобы повысить производительность труда."
 cyber.505.desc.ind: "Несмотря на некоторые опасения со стороны правительственных чиновников, децентрализованная модель распространения имплантатов оказалась жизнеспособной. На каждом углу появились небольшие клиники, и любой сможет установить себе имплантаты, не уходя далеко от дома.\n\nПора и правительству сделать шаг вперед. С помощью имплантатов мы можем доработать демократические процессы либо синхронизировать восприятие — это пойдет на пользу как нам, так и рабочим."
 cyber.505.a: "Улучшим демократические процессы."
 cyber.505.a.tt: "Упор на повышение уровня счастья и единства, а также на специалистов."
 cyber.505.b: "Соединим умы."
 cyber.505.b.tt: "Упор на повышение уровня счастья, производительности труда и стабильности."
 #OLIGARCHIC
 cyber.510.name: "Реструктуризация власти"
 cyber.510.desc.gov: "Понять и достойно воплотить этот исторических масштабов сдвиг способны только высшие эшелоны власти. В противном случае подданные могут взбунтоваться. Пока §Y[Species.GetNamePlural]§! вживляют себе новые казенные имплантаты, мы изучаем невиданные ранее возможности, которые нам открывают эти чипы.\n\nПодтолкнем ли мы общество к беспощадной конкуренции, которая возвысит простых рабочих, или начнем эксплуатировать спящих, чтобы во сне те занимались вычислениями?"
 cyber.510.desc.cor: "Корпорации с разрешения правительства наводняют рынок миллионами биочипов, которые с каждым днем становятся только лучше. Нам же пора определиться, как именно будет выглядеть новое общество после столь невероятных изменений.\n\nПопытаемся ли мы подражать природе и ее принципу «выживает сильнейший» — или, может, постараемся раскрыть потенциал спящего мозга?"
 cyber.510.desc.ind: "Граждане получат разрешение на производство и распространение киберимплантатов — на свой страх и риск, разумеется. Мы же можем заняться рассмотрением общей картины. Пора определиться, как именно будет выглядеть новое общество после таких непредвиденных изменений.\n\nПоставим ли мы перед рабочими новые, еще более высокие нормы выработки — или, может, заставим их трудиться даже во сне?"
 cyber.510.a: "Пусть надрываются ради нас. Их дело — прислуживать."
 cyber.510.a.tt: "Упор на повышение производительности в ущерб счастью."
 cyber.510.b: "Освоить потенциал сна."
 cyber.510.b.tt: "Упор на эксплуатацию фракций ради дополнительных ресурсов."
 #DICTATORIAL
 cyber.515.name: "Управление толпой"
 cyber.515.desc.gov: "Народ еще никогда не был так близок к абсолютной стабильности, как сейчас. Мы, как производители и установщики казенных имплантатов, можем без труда оснастить их тайными алгоритмами для управления действиями пользователей.\n\nСнабдив личные имплантаты уязвимостями и инструментами для слежки, мы упростим работу службе наблюдения. Или же мы можем внедрить особый код, после которого §Y[Ruler.GetTitle]§! сможет влиять на народные массы силой своей харизмы."
 cyber.515.desc.cor: "Сотрудничающие с нами корпорации готовы производить, распространять и устанавливать кибернетические имплантаты в масштабе целого государства. Предстоящее обновление прошивки для этих имплантатов дает нам исключительные возможности.\n\nМы можем внедрить в личные имплантаты инструменты для слежки, чтобы выявлять смутьянов. Или же мы можем оснастить эту технику функцией подавления личности, после чего §Y[Ruler.GetTitle]§! сможет диктовать свою волю народным массам."
 cyber.515.desc.ind: "В больницах, мелких частных лавках и хакерских общинах выразили готовность распространять и устанавливать кибернетические имплантаты. Но зачем добровольно отдавать такую власть в миллионы чужих рук?\n\nМы можем предложить населению специально разработанные модификации имплантатов со встроенными инструментами для слежки — разумеется, скрытыми, чтобы проще было выявлять смутьянов. Или же мы можем внедрить алгоритмы подавления личности, после чего §Y[Ruler.GetTitle]§! сможет повести народ к величию, воздействуя на подсознание."
 cyber.515.a: "Спрятать в личных имплантатах инструменты для слежки."
 cyber.515.a.tt: "Упор на стабильность и снижение уровня преступности."
 cyber.515.b: "Изучить возможности по подавлению личности."
 cyber.515.b.tt: "Упор на производительность труда и переселение."
 #IMPERIAL
 cyber.520.name: "Столкновение с будущим"
 cyber.520.desc.gov: "Правительство выделило обширные ресурсы на программу аугментации населения. С его разрешения центры аугментаций работают круглыми сутками. Их сотрудники вживляют имплантаты и объясняют новым владельцам, как правильно пользоваться этой техникой и следить за ней.\n\nСейчас нас занимает только один вопрос: стоит ли поставить последние достижения науки на службу нашему и без того более чем способному правительству или же лучше превратить их в средство развлечения для тех, кто вынужден добывать себе пропитание трудом?\n\nЕсли лучшие имплантаты будут доступны исключительно нашей династии, ее члены смогут передавать накопленные знания своим потомкам, гарантируя таким образом невероятную стабильность. Или же мы можем превратить столицу в центр развлечений, где аугментированные спортсмены будут проливать кровь ради зрительского одобрения."
 cyber.520.desc.cor: "Корпорации, действующие с разрешения правительства, в точности выполнили поставленную задачу. Население теперь поголовно оснащено киберимплантатами и готово трудиться еще лучше, чем прежде.\n\nОстается лишь ответить на вопрос, какому аспекту производители должны будут уделять больше внимания.\n\nЕсли лучшие имплантаты будут доступны исключительно нашей династии, ее члены смогут передавать накопленные знания своим потомкам, гарантируя таким образом невероятную стабильность. Или же мы можем превратить столицу в центр развлечений, где аугментированные спортсмены будут проливать кровь ради зрительского одобрения."
 cyber.520.desc.ind: "Несмотря на опасения многих имперских чиновников, децентрализованная модель распространения и вживления имплантатов оказалась жизнеспособной. Работники бесчисленных клиник на каждой планете трудились день и ночь, чтобы оснастить население по последнему слову техники.\n\nОстается лишь ответить на вопрос, какому аспекту производители должны будут уделять больше внимания. Мы можем начать передавать знания о государстве потомкам с помощью особых имплантатов либо же дать народным массам хлеба и киберспортивных кровавых зрелищ — таких, каких еще не фиксировали глазные имплантаты."
 cyber.520.a: "Сохранить знания о государстве ради потомков."
 cyber.520.a.tt: "Упор на правителя государства."
 cyber.520.b: "Обеспечить народу развлечение."
 cyber.520.b.tt: "Упор на производительность труда и счастье на планете-столице."
 #CORPORATE
 cyber.525.name: "Корпорация «Имплантат»"
 cyber.525.desc.gov: "Широкомасштабная, хоть и почти безрезультатная правительственная программа по вживлению имплантатов населению подходит к концу. Самое время обеспечить себе новые источники прибыли и нажиться на новом товаре. Аналитический отдел предлагает два варианта. Каждый сулит выгоду, но сопряжен с риском.\n\nЧего следует потребовать правительству: обязательной рекламы во всех новых глазных имплантатах или же регулярных обновлений для владельцев имплантатов?"
 cyber.525.desc.cor: "Производство и вживление имплантатов идет ожидаемо быстро благодаря высокоэффективной корпоративной инфраструктуре. Возможности по монетизации этой технологии почти безграничны.\n\nНам предстоит выбрать один из двух особенно многообещающих вариантов. Каждый из них сулит невероятную прибыль.\n\nСледует ли нам потребовать обязательной рекламы во всех новых глазных имплантатах или же регулярных обновлений для владельцев имплантатов?"
 cyber.525.desc.ind: "Как и ожидалось, беспорядочная «народная» инициатива по вживлению имплантатов подходит к концу — к большому облегчению для всех участников. Теперь мы в силах определить направление развития этой технологии, а заодно немало заработать.\n\nСледует ли нам встроить неотключаемую рекламу во все новые глазные имплантаты — или же лучше будет установить беспрерывный цикл обновлений всех компонентов?"
 cyber.525.a: "Разработать прототипы глазных имплантатов с поддержкой рекламы."
 cyber.525.a.tt: "Упор на повышение объема торговли и снижение экономических издержек."
 cyber.525.b: "Разработать документацию по улучшению имплантатов."
 cyber.525.b.tt: "Упор на повышение производительности, шпионаж и потребление благ."
 ### EVENT POOL ###
 cyber.610.name: "Мгновенное блаженство"
 cyber.610.desc: "Среди рабочих набирает популярность нелегальная модификация для имплантатов, стимулирующая выработку мозгом нейромедиаторов по желанию владельца. Возможности этой модификации очень широки: с ее помощью можно мгновенно испытать невероятное удовольствие или повысить болевой порог. Чтобы воспроизвести запрещенный имплантат, разработав стабильную разновидность, потребуются серьезные затраты, а стимулирующие эффекты недолговечны.\n\nНа чем лучше сосредоточиться: на разработке версии для массового рынка, официальной перепродаже нелегального прототипа или регулировании применения?"
 cyber.610.a: "Разработать стабильный имплантат."
 cyber.610.b: "Позаимствовать нелегальный прототип."
 cyber.610.c: "Урегулировать использование подобных модификаций."
 cyber.615.name: "Граница между работой и личной жизнью"
 cyber.615.desc: "Всё больше компаний начинают требовать от сотрудников хранить все рабочие впечатления и воспоминания в отдельной области киберпамяти, недоступной за пределами рабочего места.\n\nРуководители утверждают, что это распоряжение касается только тех, кто выполняет строго секретные задачи, и призвано положить конец корпоративному шпионажу. В некоторых компаниях сотрудникам также приходится отгораживать личные воспоминания, чтобы их убеждения не мешали рабочему процессу."
 cyber.615.a: "Нельзя ограничивать доступ к воспоминаниям."
 cyber.615.b: "Рабочим вопросам место на работе — это естественно."
 cyber.615.c: "Пусть ограничивают обе разновидности воспоминаний."
 cyber.625.name: "Повсеместная подписка"
 cyber.625.desc: "Мы сами не заметили, как перестали считать киберимплантаты чем-то необычным. Теперь производители имплантатов ищут радикально новые способы извлекать финансовую выгоду. В последнее время в моду вошло предоставление основных функций исключительно по подписке. Клиент, забывший продлить подписку, мгновенно столкнется с неудобствами: киберконечности перестанут слушаться, а оптика отключится. Потребительские организации требуют, чтобы мы положили этому конец."
 cyber.625.a: "Запретить подписку на киберимплантаты."
 cyber.625.b: "Пусть не покупают то, что не могут себе позволить."
 cyber.625.c: "Разрешить подписку только на второстепенные функции."
 cyber.625.d: "Блестящая идея! Продолжайте в том же духе."
 cyber_subscription_ban: "Запрещена подписка на киберимплантаты"
 cyber_subscription_ban_desc: "Мы запретили производителям имплантатов ограничивать доступ к функциональности для тех, у кого нет подписки."
 cyber_subscription_limited: "Ограничена подписка на киберимплантаты"
 cyber_subscription_limited_desc: "Мы запретили производителям имплантатов ограничивать доступ к основным функциям для тех, у кого нет подписки."
 cyber_subscription: "Признак расы §Y«$trait_cybernetic$»§! получает следующие модификаторы:\n$t$Счастье: §R-5%§!\n$t$$BONUS_WORKFORCE_FOR$ ['concept_planet_traders', торговцев]: §G+25%§!"
 cyber_subscription_megacorp: "Признак расы §Y«$trait_cybernetic$»§! получает следующие модификаторы:\n$t$Счастье: §R-5%§!\n$t$$BONUS_WORKFORCE_FOR$ ['concept_planet_traders', торговцев]: §G+50%§!"
 cyber.655.name: "Непредвиденные механические неисправности"
 cyber.655.desc: "Разработчики киберимплантатов сделали нам выгодное предложение: достаточно лишь немного уменьшить надежность имплантатов, чтобы показатели прибыли заметно взлетели, поскольку пользователям придется регулярно заменять необходимые детали.\n\nЕсли мы начнем использовать низкокачественные биосплавы при сборке самых подверженных износу частей, имплантаты будут отказывать так, чтобы минимально навредить владельцу, при этом вынуждая его обращаться в ремонтную мастерскую."
 cyber.655.a: "Возмутительно!"
 cyber.655.a.tt: "Мы не станем вживлять нашим гражданам некачественные имплантаты!\n\n"
 cyber.655.b: "Занятная мысль. Переходите на менее надежные компоненты."
 cyber.655.c: "Отлично! Заодно повысьте цены."
 cyber.655.d: "Полученные данные упростят нам киберизацию."
 worse_parts: "Менее надежные детали"
 worse_parts_desc: "Мы решили продавать населению низкокачественные киберимплантаты. Теперь заменять детали придется чаще."
 worse_parts_effect_tt: "$r_trade$ за каждые $pop_group_unit$ £pop£ §Hпоселений§! с признаком §Y$trait_auto_mod_cyborg$§!: §G+0,5§!"
 optimized_parts: "Улучшенные детали"
 optimized_parts_desc: "Внедрение инноваций и постоянная доработка кибернетических компонентов помогли упростить процедуру вживления."
 optimized_parts_effect_tt: "Расходы энергии на содержание £pop£ §Hпоселений§! с признаком §Y$trait_auto_mod_cyborg$§!: §R+0,1§!"
 cyber.660.name: "Непредвиденная общественная реакция"
 cyber.660.desc: "Похоже, наш план по внедрению запланированного устаревания оказался раскрыт.\n\nНа улицы высыпали многочисленные [Owner.GetSpeciesNamePlural], разозленные ухудшением качества имплантатов и повышением затрат. Толпа призывает нас отменить эту политику."
 cyber.660.a: "Ладно, мы действительно слишком пожадничали."
 cyber.660.b: "Что-что? ВАС НЕ СЛЫШНО!"
 cyber.660.c: "Это совсем не обязательно…"
 discontent: "Недовольство"
 discontent_desc: "Население бунтует против повышения цены на имплантаты и снижения их качества."
 cyber.805.name: "Родительский контроль"
 cyber.805.desc: "После того как мы начали вживлять младенцам мозговые имплантаты, родители потребовали тотального контроля над своими детьми. Некоторые опекуны выступают за право управлять их моторными функциями, что сегодня дозволено только сотрудникам правоохранительных органов.\n\nТакое вопиющее нарушение права на владение собственным телом, впрочем, стало бы уже не первым инструментом принуждения детей к исполнению воли родителей. Есть и альтернативный вариант: ограничить контроль, разрешив только, например, замедлять чересчур непоседливых детей или приглушать слишком громких."
 cyber.805.a: "Пусть полностью контролируют детей."
 cyber.805.b: "Ограничить контроль."
 cyber.805.c: "Право на это должно оставаться только у силовиков."
 cyber.810.name: "Передача знаний"
 cyber.810.desc: "Разработка мозговых имплантатов открывает нам крайне заманчивые перспективы. Вместо того чтобы полагаться на прежние методы обучения, мы сможем передавать знания непосредственно из мозга в мозг. Однако возможно это лишь в лабораторных условиях при полной стерильности, поэтому о массовой передаче знаний речи не идет. Кроме того, полученная информация частично перезаписывает схожие воспоминания получающего.\n\nПолезнее всего станет обмен знаниями между учеными. Мы можем передавать знания об инженерии, чтобы заполнить образовавшийся за время киберизации пробел, или сосредоточиться на других областях."
 cyber.810.a: "Передавать знания об инженерии."
 cyber.810.b: "Передавать знания о физике."
 cyber.810.c: "Передавать знания об обществе."
 cyber.810.d: "Не вмешиваться в чужие умы."
 cyber.815.name: "Децентрализованная любовь"
 cyber.815.desc: "Многие [root.GetSpeciesNamePlural] с радостью согласились на установку серийных киберимплантатов, чтобы окрасить бытовую — в том числе любовную — жизнь в новые тона. Однако в последнее время растет количество сожителей сразу с несколькими партнерами, организовывающих частные виртуальные сети со сделанными на заказ имплантатами. Такие общины добровольно изолируются от общества, предпочитая довольствоваться чувствами и переживаниями друг друга, что стало возможным как раз благодаря имплантатам.\n\nНекоторые ученые, в том числе социологи, приветствуют такую практику: они считают, что укрепление отношений и семейных уз с помощью новейших технологий пойдет на пользу каждому. Другие же встревожены всё учащающимися случаями самоизоляции. Кто-то даже утверждает, что такие личности навсегда пропадают в «любовном гештальте»."
 cyber.815.a: "Чем они занимаются у себя дома — не наше дело."
 cyber.815.a.tt: "Мы не будем запрещать индивидуальные имплантаты и частные цифровые пространства."
 decentralized_families: "Децентрализованные семьи"
 decentralized_families_desc: "Сделанные на заказ имплантаты и ПО помогают сожителям разнообразить отношения."
 cyber.815.b: "Вернуть заблудшие семьи на путь истинный."
 cyber.815.b.tt: "Вместо индивидуальных имплантатов мы будем предлагать строго регулируемые альтернативы."
 centralized_families: "Централизованные семьи"
 centralized_families_desc: "Более строгий контроль над имплантатами и ПО усложняет семьям отгораживание цифровыми стенами." #as in a richly decorated but enclosed space
 cyber.820.name: "Радикальный образ"
 cyber.820.desc: "Субкультуры — далеко не новое явление в [root.GetSpeciesAdj]ой истории, однако всё резко изменилось с появлением киберимплантатов: отдельные маргинальные группы начали изменять свой облик так, чтобы как можно меньше походить на свой биологический вид. Особенно в этом преуспевает молодежь, устанавливая себе максимально нестандартные [root.GetSpeciesHandNamePlural], разукрашивая тела трехмерными рисунками и приделывая декоративные конечности.\n\nАктивисты заявляют, что таким образом они обретают самих себя, а отказ от видового однообразия — это демонстрация свободы воли. Впрочем, родители и отдельные консерваторы не разделяют такие взгляды и считают, что таким образом молодежь подрывает общественные устои."
 cyber.820.a: "Ужесточить границы дозволенного при модификации тела."
 cyber.820.b: "Это возрастное. Со временем пройдет."
 radical_image: "Радикальный образ"
 radical_image_desc: "Молодежь смело экспериментирует с собственным обликом."
 cyber.820.c: "Может быть, у них есть чему поучиться."
 radical_insights: "Наблюдения за радикалами"
 radical_insights_desc: "Вдохновившись примером любителей экспериментировать над собой, жители этого государства начали вживлять себе новые имплантаты эстетического характера."
 cyber.821.name: "Протесты радикалов"
 cyber.821.desc: "Оскорбленная молодежь, активисты и деятели культуры выходят на улицы тысячами. Они требуют одного: свободы кибернетических аугментаций. Возмущаются как совершенно непримечательные [root.GetSpeciesNamePlural], так и обладатели дополнительных конечностей, неузнаваемых тел и других экзотических внешних признаков. Все они выражают солидарность с [root.GetAdj]ой расой, которая подвергается дискриминации за предпочтения в украшениях собственного тела."
 cyber.821.a: "Мы непоколебимы."
 cyber.821.a.tt: "Мы продолжим воспитывать в гражданах коллективистский подход к кибернетике."
 radical_image_denied: "Радикальные образы запрещены"
 radical_image_denied_desc: "Начавшиеся недавно протесты за право самовыражения с помощью киберимплантатов начали разрастаться."
 cyber.821.b: "Мы поразмыслим над их требованиями."
 cyber.821.b.tt: "Граждане смогут несколько свободнее выбирать, какие имплантаты устанавливать."
 radical_image_upheld: "Радикальные образы не запрещены"
 radical_image_upheld_desc: "Начавшиеся недавно протесты за свободу самовыражения с помощью киберимплантатов увенчались некоторым успехом."
 cyber.822.name: "Радикальная физиология"
 cyber.822.desc: "Медицинские работники всё чаще жалуются на необычайные, иногда почти непреодолимые трудности при лечении пациентов с уникальными киберимплантатами.\n\nВо многих случаях требуются особые меры — от применения редких инструментов до полной разборки изменившего себя до неузнаваемости гражданина, даже если его здоровью не угрожает ничего серьезного. Стоимость такого вмешательства значительно превышает привычные расходы на лечение обычных граждан не[root.GetSpeciesAdj]ого вида."
 cyber.822.a: "Такие расходы оправданы."
 cyber.822.b: "Не стоило позволять им так сильно отклоняться от стандартов."
 #Cold Metal
 cyber.830.name: "Дрожь"
 cyber.830.desc: "Среди части аугментированного населения мы зафиксировали жалобы на боль при холодной погоде. Особенно серьезно страдают жители планеты §H[cold_planet.GetName]§!, где температура редко поднимается выше нуля.\n\nМеталлические имплантаты иногда причиняют дискомфорт при низкой температуре, однако подобная реакция аномальна. Начинает падать производительность труда."
 cyber.830.a: "Провести медицинское исследование."
 cyber.830.b: "Их беды — не наша забота."
 cyber.830.tooltip: "Признак расы §Y«$trait_cybernetic$»§! получает следующие модификаторы:$TABBED_NEW_LINE$Приспособленность к высокогорному/арктическому/тундровому миру: §R−20%§!"
 COLD_METAL_PROJECT: "Холодное железо"
 COLD_METAL_PROJECT_DESC: "Жители планет с морозным климатом жалуются на сильную боль, вызванную кибернетическими имплантатами. Клиническое исследование поможет разобраться в причинах."
 cyber.835.name: "Врачебное заключение"
 cyber.835.desc: "В ходе клинических исследований не удалось установить однозначную связь между влиянием холодной погоды на имплантаты и возрастом, полом и видом деятельности владельцев имплантатов, а также разновидностью аугментаций.\n\nНекоторые специалисты утверждают, что боль имеет психосоматическую природу, поэтому лечить ее следует болеутоляющим и поведенческой психотерапией. Другие призывают нас отнестись к проблеме всерьез и проспонсировать поиски новых методов лечения."
 cyber.835.a: "Это они всё себе придумали."
 cyber.835.b: "Учредить исследовательскую программу."
 cyber.835.c: "Переселить пострадавших на более теплую планету."
 cyber.835.tooltip: "Признак расы §Y«$trait_cybernetic$»§! теряет следующие модификаторы:$TABBED_NEW_LINE$Приспособленность к высокогорному/арктическому/тундровому миру: §R−20%§!"
 cyber.840.name: "Куда нас сердце заведет"
 cyber.840.desc: "Испокон веков мы были кочевниками. Скитальцами. Бродягами. Для кого-то дорога заканчивается в пункте назначения; для нас она не заканчивается никогда. У нас нет цели — только путь. Аугментация тел упростила не только перелеты к новым мирам, но и отслеживание тех, кто может чересчур увлечься странствиями. Довольны этим оказались не все.\n\nЧисло тех, кто взламывает личные имплантаты и выпадает из «системы», стремясь сохранить личную жизнь в тайне, постепенно растет. Пока что этим занимаются немногие, однако тенденция уже вызывает беспокойство."
 cyber.840.a: "Они всё делают правильно. Запретить технологии отслеживания."
 cyber.840.b: "Нет смысла бить тревогу."
 cyber.840.c: "Предложить им имплантаты, которые невозможно отследить… Разумеется, не бесплатно."
 cyber.840.d: "Пресечь недовольство. Слежка никуда не денется."
 cyber_wanderers: "Неугомонные странники"
 cyber_wanderers_desc: "Их тяжело отследить, но легко найти в любом уголке галактики."
 cyber_wanderers_tracked: "На поводке"
 cyber_wanderers_tracked_desc: "Наш народ любит свободу, а потому яростно протестует против слежки."
 cyber.855.name: "На пять с плюсом" #Idiom: if you achieve a required score, you 'make the grade'; similar to 'make the cut'
 cyber.855.intro.desc: "Когнитивные микропроцессоры, современные учителя на основе ИИ, оригинальные ферменты, способствующие нейропластичной регенерации, — и всё это для одних только дошкольников."
 cyber.855.gov.desc: "$cyber.855.intro.desc$\n\nБюджетным образовательным программам становится всё сложнее соответствовать стремительно меняющимся требованиям нового века. Разрыв между обладателями казенных имплантатов и учениками, оснащенными самыми передовыми аугментациями, неуклонно увеличивается.\n\nЧтобы его сократить, потребуется серьезное вложение ресурсов на пять лет."
 cyber.855.corp.desc: "$cyber.855.intro.desc$\n\nХорошее образование требует немалых затрат, и многим семьям становится всё сложнее поспевать за техническим прогрессом. Разрыв между учениками, родители которых могут позволить себе самые передовые аугментации, и вынужденными обладателями старых, нелицензионных имплантатов или аугментаций с чужого плеча неуклонно увеличивается.\n\nЧтобы остановить социальное расслоение, потребуется серьезное вложение ресурсов в систему образования на пять лет."
 cyber.855.a: "Затраты слишком велики."
 cyber.855.b: "Образование должно быть доступным для всех."
 cyber_education: "Аугментированное образование"
 cyber_education.tt: "Мы запустим пятилетнюю программу развития прогрессивной образовательной системы с полной поддержкой аугментаций."
 cyber.860.name: "Успех для всех"
 cyber.860.desc: "Наши вложения в образовательные аугментации окупились сторицей.\n\nСвободный доступ к высококачественным киберимплантатам привел к установлению настоящего академического равенства, при котором каждый, вне зависимости от класса и сословия, может полностью раскрыть свой потенциал. Особенно заметна польза для  науки: рост инноваций и открытий наблюдается во всех сферах."
 egalitarian_excellence: "Успех для всех"
 egalitarian_excellence.tt: "Хорошо образованное и аугментированное население — это ключ к социальному и материальному прогрессу."
 cyber.865.name: "Незаурядные лидеры"
 cyber.865.desc: "Решение не тратить средства на всеобщие образовательные аугментации оказалось мудрым.\n\nНаше общество держится на личном успехе своих членов. Несмотря на нестройные голоса отдельных критиков, заявляющих о расширении «социального разрыва», конкуренция в образовательной среде воспитала когорту одних из самых образованных и сильных лидеров в галактике."
 exceptional_leaders: "Незаурядные лидеры"
 exceptional_leaders.tt: "Развитие лучших талантов на индивидуальном уровне сформировало систему подготовки лидеров исключительных качеств."
 cyber.1005.name: "Раздвигая границы возможностей"
 cyber.1005.desc: "«Побит еще один [Species.GetAdj&masc] рекорд!» — такие новостные заголовки стали обыденностью в мире [Owner.GetAdjective&masc,gen] спорта. По мере того как [GetAthletePlural] раз за разом превосходят друг друга за счет новых современных модификаций, границы спортивных возможностей отодвигаются все дальше и дальше.\n\nВ то время как фанаты «улучшенного спорта» в восторге от растущих результатов, все больше становится радикальных сторонников традиций, которые требуют выделять соревнования улучшенных спортсменов в отдельную категорию. Некоторые предлагают компромисс: ограничить число модифицированных в командных соревнованиях, чтобы «естественные» [GetAthletePlural] всегда оставались в центре внимания."
 cyber.1005.a: "Время немодифицированных прошло."
 cyber.1005.a.tt: "Пусть модифицированные игроки станут проводниками инноваций."
 cyber.1005.b: "Организовать аугментированным спортсменам свою лигу."
 cyber.1005.c: "Модифицированные [GetAthletePlural] будут допускаться к соревнованиям в строго ограниченном количестве."
 cyber_athletes: "Кибернетические атлеты"
 cyber_athletes_desc: "Продвигая модифицированных спортсменов, мы сможем тестировать в действии новейшие киберимплантаты."
 cyber_athlete_leagues: "Лиги для кибератлетов"
 cyber_athlete_leagues_desc: "Разделение «естественных» и аугментированных спортсменов сделает соревнования честнее."
 limited_cyber_athletes: "Ограничения для кибератлетов"
 limited_cyber_athletes_desc: "Регулирование количества модифицированных спортсменов даст шанс на победу любой команде."
 athlete_plural: "спортсмены"
 cyber.1010.name: "Продается небо"
 cyber.1010.desc: "Корпорация §Y[sky_megacorp.GetName]§! обратилась к нам с заманчивым предложением. Они хотят рекламировать свой новый энергетический напиток под названием «Холодная плазма».\n\nРеклама напитка будет проецироваться прямо на окулярные имплантаты наших граждан при каждом взгляде в небо. Полученную прибыль можно будет направить на самые разные проекты на благо граждан.\n\nНесмотря на агрессивный характер рекламы, сам напиток, по уверениям производителя, приятен на вкус и совершенно нетоксичен."
 cyber.1010.a: "Пейте «Холодную Плазму»!" #Feel free to localize Plasma Quench to sound like a slimy energy drink. No need to make it word for word.
 cyber.1010.b: "Небо не продается!"
 cyber.1010.c: "Давайте обсудим условия."
 cyber.1010.d: "Нас это не интересует."
 cyber.1015.desc: "Корпорация §Y[sky_megacorp.GetName]§! пришла к нам с новым предложением по «Холодной плазме», любимому напитку всей галактики. Реклама в небе для наших аугментированных сограждан так хорошо окупилась, что теперь эта корпорация хочет разместить рекламу и в реальном мире.\n\n«[most_populous.GetName] — идеальное место для рекламы!» — восклицает представитель корпорации [sky_megacorp.GetName]. В конце концов, знать о таком чудесном продукте имеют право все."
 cyber.1015.a: "Пусть «Плазма» льется рекой!"
 cyber.1015.a.tt: "Вокруг [most_populous.GetPlanetMoon]ы §Y[most_populous.GetName]§! появляются гигантские рекламные щиты."
 cyber.1015.b: "Цифровых небес будет вполне достаточно."
 cyber.1015.c: "Прочь из глаз наших сограждан!"
 sold_sky_1: "Цифровые рекламные щиты"
 sold_sky_1_desc: "Продажа виртуального внимания наших граждан — исключительно верное решение!"
 sold_sky_1_mega: "$sold_sky_1$"
 sold_sky_1_mega_desc: "$sold_sky_1_desc$"
 sold_sky_2: "Планетарные рекламные щиты"
 sold_sky_2_desc: "Элита этой планеты решила продать родное небо за лишнюю партию ресурсов."
 sold_sky_2_mega: "$sold_sky_2$"
 sold_sky_2_mega_desc: "$sold_sky_2_desc$"
 cyber.1030.name: "Незаконные воспоминания"
 cyber.1030.desc: "Огромный выбор имплантатов для получения различных сенсорных и эмоциональных впечатлений привел к тому, что аугментированные личности начали все чаще уходить из реального мира в мир фантазий и развлечений. Хотя теоретически энграммные дизайнеры могут воссоздать любую эмоцию, практика оказалась весьма мрачной.\n\nКлубы любителей энграмм-воспоминаний платят огромные деньги за самописные сильные эмоциональные переживания — свадьбы и брачные ритуалы… а также за записи нападений, убийств и самоубийств. Такой спрос вызвал рост насилия в реальном мире: преступники записывают свои ощущения в процессе совершения злодеяний и воруют имплантаты жертв после травматического опыта.\n\nКак нам реагировать на это новое зловещее поветрие?"
 cyber.1030.a: "Запретить индустрию. Это слишком опасно."
 cyber.1030.a.tt: "Энграммные развлечения будут вне закона."
 cyber.1030.b: "Ввести налог на производство."
 cyber.1030.b.tt: "Энграммные развлечения станут источником дохода."
 cyber.1030.c: "Сажать в тюрьму тех, кто делает такие записи."
 cyber.1030.c.tt: "Полиция займется теми, кто записывает свои преступные деяния."
 cyber.1030.d: "Какой декаданс. Мы это одобряем."
 cyber.1030.d.tt: "Государство одобряет все формы наслаждений."
 cyber.1030.e: "Бесконечное переживание смерти? Как божественно."
 cyber.1030.e.tt: "Это поможет нашим жрецам смерти лучше понимать и направлять посвященных смерти в их последнем служении."
 entertainment_crackdown: "Запрет энграмм"
 entertainment_crackdown_desc: "В целях борьбы с преступностью энграммные развлечения были запрещены законом."
 endorsed_entertainment: "Одобрение энграмм"
 endorsed_entertainment_desc: "После одобрения на государственном уровне записи получили широкое распространение в обществе."
 illicit_entertainment: "Незаконные энграммы"
 illicit_entertainment_desc: "Новые законы, регулирующие энграммные развлечения, подавляют спрос на эти услуги."
 decadent_entertainment: "Декадентские энграммы"
 decadent_entertainment_desc: "Наши сограждане упиваются экстремальными ощущениями, получаемыми от энграммных записей. Но в свое время их сменит новая мода, и об энграммах забудут."
 deadly_entertainment: "Смертельные энграммы"
 deadly_entertainment_desc: "Теперь наши жрецы смерти могут сами ощутить опыт как умирания, так и убийства. Это поможет им наставлять паству, и в первую очередь — посвященных смерти."
 cyber.1055.name: "Шпионские игры"
 cyber.1055.desc: "Кадет нашего флота проявил несусветную глупость, которая привела к утечке секретной информации. Будучи ярым фанатом известного сетевого симулятора боевых действий, он ввязался в массовый спор об угловых скоростях турелей на наших эсминцах.\n\nЧтобы подкрепить свою позицию фактами, он загрузил в сеть несколько секретных чертежей наших кораблей, и эти документы очень скоро разлетелись по всей галактике. Хотя виновника инцидента уже наказали, в совете теперь раздаются призывы вовсе запретить сетевые игры."
 cyber.1055.a: "Все равно пора было модернизировать флотилию."
 cyber.1055.b: "Ужесточить меры сетевой безопасности."
 cyber.1055.c: "Совет прав: запретить игры."
 cyber.1055.d: "Наводнить сеть дезинформацией, противоречащей утекшим данным."
 cyber_breach_overcome: "Шпионские игры: модернизация флотилии"
 cyber_breach_overcome_desc: "Что сделано, то сделано. Мы модернизируем флотилии, чтобы слитые чертежи оказались бесполезными."
 cyber_breach_forgive: "Шпионские игры: обновления безопасности"
 cyber_breach_forgive_desc: "В результате утечки мы обновили протоколы безопасности. Впрочем, любители игр не представляют угрозы национальной безопасности. Нет смысла устраивать панику из-за глупой ошибки."
 cyber_breach_ban: "Шпионские игры: полный запрет"
 cyber_breach_ban_desc: "Вдобавок к ужесточению безопасности мы ввели запрет на сетевые игры."
 cyber.1055.leak.tt: "Каждый член §Yгалактического сообщества§! получит §Yвоенные§! разведданные §Hсреднего уровня§! о государстве §Y[Root.GetName]§! на §Y720§! дней."
 cyber.1055.minorleak.tt: "Каждый член §Yгалактического сообщества§! получит §Yвоенные§! разведданные §Rнизкого уровня§! о государстве §Y[Root.GetName]§! на §Y360§! дней."
 has_tradition_subterfuge_tt: "Этот вариант доступен, потому что мы приняли полное дерево традиций §Yмахинаций§!."
 cyber.1205.name: "Сенсорная цензура"
 cyber.1205.desc: "Последнее поколение сенсорных имплантатов позволяет пользователю отфильтровывать нежелательные ощущения. Неприятный запах, неприглядный вид — все можно приглушить, замаскировать и даже полностью вырезать из восприятия пользователя. В консервативных группах нашего общества растет обеспокоенность тем, как такая цензура скажется на моральном облике наших граждан."
 cyber.1205.a: "Мы должны видеть правду жизни, даже если она неприглядна."
 cyber.1205.b: "У всех есть право на блаженное неведение."
 cyber.1205.c: "Косметическая тонировка — это нормально, а вот цензура — это уже опасно."
 cyber.1205.d: "Мы будем сами курировать их восприятие."
 cyber_censure_truth: "Сенсорная цензура: запрещена"
 cyber_censure_truth_desc: "Нашим гражданам запрещено пользоваться сенсорными фильтрами, частично блокирующими восприятие реальной жизни. Они должны всегда видеть то, что есть на самом деле."
 cyber_censure_total: "Сенсорная цензура: тотальная"
 cyber_censure_total_desc: "Если реальность приносит дискомфорт, отчего бы не скрыть ее неприглядные элементы? Незачем смотреть на преступления, несчастья и предрассудки."
 cyber_censure_partial: "Сенсорное тонирование"
 cyber_censure_partial_desc: "Мы позволим гражданам пользоваться функцией тонирования восприятия. Это добавит цвета и спецэффектов в их унылое существование."
 cyber_censure_authoritarian: "Государственная сенсорная цензура"
 cyber_censure_authoritarian_desc: "Мы взяли на себя ответственность курировать то, как наши граждане воспринимают реальность. Мы защитим их от преступного влияния, отфильтровывая диссидентские акции и самих несогласных."
 cyber.1210.name: "Рекламный хакинг подсознания"
 cyber.1210.desc: "Среди подпольных движений и амбициозных корпораций набирает популярность внедрение в киберимплантаты пользователей скрытой рекламы на подсознательном уровне. Все активнее используются ложные воспоминания, избирательные гормональные реакции и внушения во время сна. Обеспокоенные политические активисты обратились с этим вопросом к нам и потребовали запрета или по крайней мере регулирования столь агрессивной рекламы."
 cyber.1210.a: "Такое терпеть нельзя."
 cyber.1210.b: "Остроумно! Пусть продолжают."
 cyber.1210.c: "Лицензировать эту практику."
 cyber.1210.d: "Использовать для распространения веры."
 cyber_subliminhack_banned: "Хакинг подсознания: запрещен"
 cyber_subliminhack_banned_desc: "Мы запретили внедрение в киберимплантаты пользователей скрытой рекламы на подсознательном уровне."
 cyber_subliminhack_allowed: "Хакинг подсознания: разрешен"
 cyber_subliminhack_allowed_desc: "Мы разрешили внедрение в киберимплантаты пользователей скрытой рекламы на подсознательном уровне. Это рынок, здесь все приемлемо."
 cyber_subliminhack_licensed: "Хакинг подсознания: лицензирован"
 cyber_subliminhack_licensed_desc: "Мы продаем лицензии на внедрение в киберимплантаты пользователей скрытой рекламы на подсознательном уровне."
 cyber_subliminhack_hallowed: "Хакинг подсознания: обращение в нашу веру"
 cyber_subliminhack_hallowed_desc: "Мы внедряем в киберимплантаты пользователей скрытые сообщения на подсознательном уровне для распространения нашей веры."
 cyber.1255.name: "Нарушение кибербезопасности"
 cyber.1255.intro: "Недавно через удаленный сервер было незаконно скачано несколько секретных документов. Наши сотрудники безопасности уверяют, что все первичные и вторичные брандмауэры работают без сбоев, так что у нас нет улик, которые бы указывали на кибератаку извне.\n\n"
 cyber.1255.gov.desc: "$cyber.1255.intro$Вывод напрашивается сам собой: утечка организована изнутри, и, исходя из важности украденной информации, ответственен за нее кто-то с допуском высокого уровня секретности."
 cyber.1255.hack.desc: "$cyber.1255.intro$Вывод напрашивается сам собой: утечка организована изнутри, и это бросает тень сомнения на наше решение взять на вооружение кибернетические имплантаты из открытых источников."
 cyber.1255.a: "Начать расследование."
 leak_investigation: "Расследование утечки"
 leak_investigation_desc: "Чтобы раскрыть источник утечки, нам придется проверить всех пользователей кибернетических имплантатов. Увы, процесс будет, скорее всего… инвазивным."
 cyber.1260.name: "Нейромантия"
 cyber.1260.desc: "Расследование недавнего инцидента с кибербезопасностью завершено.\n\nЦелью злоумышленников стал ряд высокопоставленных носителей имплантатов, к чьим нервным системам «подключились» извне. Жертвы оказались под чужим контролем и были принуждены действовать против своей воли; своих поступков в тот момент они не помнят.\n\nТеперь нам известен непосредственный источник утечки, но кто — или что — стоит за этим преступлением, мы все еще не знаем. Но если мы тайно внедрим дезинформацию в умы пострадавших чиновников, быть может, нам удастся отследить бенефициара утечки."
 leak_distrust: "Марионетки среди нас"
 leak_distrust_desc: "Как мы можем ожидать народного доверия к нашим лидерам, если любой из нас может оказаться марионеткой в руках злоумышленников?"
 leader_trait_hacked: "Кибермарионетка"
 leader_trait_hacked_desc: "Этот лидер ненадежен, его нейрокомплекс взломан неизвестными злоумышленниками."
 hacked_leaders.tt: "Случайное число лидеров-киборгов получают черту §Y«$leader_trait_hacked$»§!."
 cyber.1265.name: "Мозголомы" #Playing on the word 'hijacker'
 cyber.1265.desc: "Попались.\n\nПреступники, ответственные за беспрецедентные кибератаки, наконец обнаружены. Движимые лишь желанием сеять хаос, эти «мозголомы», как они себя называют, сумели обойти наши системы защиты с легкостью, постыдной для наших специалистов по безопасности. Лидеры этой шайки уже пойманы. А вот что делать со «взломанными» чиновниками, пока неясно.\n\nПроще всего установить особый брандмауэр вокруг пораженных имплантатов. Более чистой, хотя и более рискованной процедурой стала бы полная перезагрузка: мы можем получить доступ к базовым когнитивным функциям лидеров и принудительно «отключить» их, чтобы установить новую операционную систему."
 cyber.1265.a: "Установить брандмауэр."
 cyber.1265.b: "Перезагрузить чиновников."
 cyber.1265.c: "За нами следят. Стройте стену."
 cyber.1270.name: "Перезагруженные и обновленные"
 cyber.1270.desc: "Полная перезагрузка пострадавших чиновников привела к неожиданным последствиям: все следы нейровзлома исчезли, но вместе с ними пропала и большая часть накопленных знаний и опыта.\n\nНесмотря на эту проблему, «сброшенные» лидеры готовы «начать все заново» и сообщают о глубоком чувстве профессионального и личного обновления. Принудив нас к таким радикальным мерам, эти хакеры, похоже, невольно оказали нам услугу."
 rebooted_leaders: "Убирает все §Hотрицательные признаки§! у лидеров с признаком §Y«$leader_trait_hacked$»§!.\nЗа каждый снятый признак теряется §R300§! опыта."
 leader_hack_resolution: "Усиление бдительности"
 cyber.1275.name: "Нейрологические брандмауэры"
 cyber.1275.desc: "Наши умы в безопасности.\n\nНейроинженеры успешно разработали нейрологический брандмауэр. В интересах общей безопасности программа будет установлена всем действующим и будущим чиновникам. Хотя брандмауэр негативно повлияет на базовые когнитивные способности нашего лидерского класса, этот проект значительно расширил наши знания в сфере безопасности данных."
 cyber.1275.a: "Лучше перестраховаться."
 leader_trait_firewalled: "Нейрологический брандмауэр"
 leader_trait_firewalled_desc: "Теперь наши лидеры хорошо защищены от кибератак, но им тяжелее усваивать новое."
 hacked_and_firewalled_leaders.tt: "Убирает черту §Y«$leader_trait_hacked$»§! и дает черту §Y«$leader_trait_firewalled$»§! всем лидерам-киборгам."
 #FINAL EVENT #
 #DEMOCRATIC
 cyber.1505.name: "Общество 2.0"
 cyber.1505.desc.individualist: "В основе нашего общества лежит демократический процесс. И этот фундамент было бы логично укрепить. Наши новые кибернетические имплантаты позволяют нам голосовать по всем социальным вопросам вне зависимости от их масштабов и дают отдельному гражданину беспрецедентную свободу выражать свое мнение. Эта система даст нам немыслимые объемы данных и откроет невиданные ранее возможности."
 cyber.1505.desc.collectivist: "Поначалу было мучительно сознавать, что твои мысли слышат все §Y[Species.GetNamePlural]§! вокруг. Но первоначальный шок скоро сменился чувством уверенности в окружающей обстановке. Мы знаем, что думает наш сосед, и он знает, что думаем мы. Коммуникация происходит мгновенно, без слов, одной лишь силой мысли. Для сохранения ясности ума кибермозг был запрограммирован заглушать эмоции — иначе они бы сами заглушали собой все важное."
 cyber.1505.desc.neutral: "Несмотря на бесконечные консультации, голосования и жаркие обсуждения, наша нация все еще не может определиться со своим отношением к идее улучшенного киберобщества. Лидерам пора вмешаться, пока эти споры не выродились в идейные распри.\n\nМы можем использовать эту возможность и модифицировать киберимплантаты так, чтобы они служили на благо демократического процесса, или же поступить радикальнее и позволить гражданам делиться друг с другом мыслями через нейроинтерфейс. Второй вариант также потребует от кибермозга подавлять базовые эмоции своих носителей, чтобы их спонтанные мысли не забивали собой окружающий эфир."
 cyber.1505.a: "Разрешить кибермозгам голосовать в прямом эфире."
 cyber.1505.a.tt: "$change_auth_tt$ ['concept_auth_cyber_democratic_individualist']\n$unlock_edict_legislative_chorus$"
 cyber.1505.b: "Связать кибермозги в единую сеть и разрешить им делиться мыслями."
 cyber.1505.b.tt: "$change_auth_tt$ ['concept_auth_cyber_democratic_collectivist']\n$unlock_edict_self_preservation_override$"
 cyber.1505.c: "$cyber_keep_auth_option$"
 cyber.1505.c.tt: "Сохраняется форма правления ['concept_auth_democratic']"
 #OLIGARCHIC
 cyber.1510.name: "Перераспределение мощностей"
 cyber.1510.desc.individualist: "Становится ясно, что наши граждане желают выделяться и соперничать друг с другом. Наши планы поддержать эту конкурентную среду за счет геймификации, обеспечивающей социальную мобильность и небольшие бонусы в обмен на повышенную продуктивность, наверняка придутся населению по душе."
 cyber.1510.desc.collectivist: "Чувство общности среди граждан куда важнее индивидуальной социальной мобильности. Поэтому вместо того чтобы эксплуатировать сопернические настроения, мы реализуем пока еще не раскрытый потенциал кибермозга. Его вычислительные мощности будут дистанционно подключены к базовой станции благодаря кибернетическим протоколам связи и будут использоваться для вычислительных задач, пока владелец пребывает в фазе отдыха."
 cyber.1510.desc.neutral: "Наши подданные так и не смогли определиться, конкурентного они желают общества или коллективного. На правах их руководителей мы примем решение за них.\n\nМы можем внедрить геймифицированную соревновательную систему, которая будет награждать отличившихся карьерным ростом; или объединить кибермозги всего сообщества в единую кибернетическую сеть и выполнять вычислительные задачи на их мощностях, пока их владельцы спят."
 cyber.1510.a: "Пусть бьются друг с другом, чтобы снискать наше расположение."
 cyber.1510.a.tt: "$change_auth_tt$ ['concept_auth_cyber_oligarchic_individualist']\n$unlock_edict_battle_royale$"
 cyber.1510.b: "Пусть работают во сне."
 cyber.1510.b.tt: "$change_auth_tt$ ['concept_auth_cyber_oligarchic_collectivist']\n$unlock_edict_stately_acclaim$"
 cyber.1510.c: "$cyber_keep_auth_option$"
 cyber.1510.c.tt: "Сохраняется форма правления ['concept_auth_oligarchic']"
 #DICTATORIAL
 cyber.1515.name: "Управление толпой"
 cyber.1515.desc.individualist: "§Y[Species.GetPlural]§! с радостью погружаются в мир, в котором аугментированные граждане могут выражать себя совершенно новыми способами.\n\nНо эта свобода — лишь фасад: зашитые в имплантатах современные алгоритмы слежки теперь наблюдают за каждым индивидом и фиксируют диссидентские мысли уже в момент образования синапсов."
 cyber.1515.desc.collectivist: "Правду говорят, что вместе мы — сила, особенно перед лицом общих бед. Все кибернетически улучшенные §Y[Species.GetNamePlural]§! борются за общее будущее, зная, что бок о бок с ними трудятся единомышленники, желающие того же.\n\nНаши сограждане могут быть спокойны, ведь их железной рукой ведет вперед [Ruler.GetAXX::блистательный|||fem:блистательная] §Y[Ruler.GetTitle] [Ruler.GetName]§!."
 cyber.1515.desc.neutral: "Наш народ стоит на распутье, и в этот момент нерешительности [Ruler.GetAXX::наш|||fem:наша] §Y[Ruler.GetTitle] [Ruler.GetName]§! [Ruler.GetAXX::должен|||fem:должна] воспользоваться уникальной возможностью, данной нам аугментациями, и принять исторический выбор.\n\nСледует ли нам сохранить для наших граждан определенные личные свободы и мониторить их при этом через их имплантаты — или лучше напрямую открыть их умы влиянию со стороны яркой личности нашего лидера?"
 cyber.1515.a: "Умеренные свободы со слежкой."
 cyber.1515.a.tt: "$change_auth_tt$ ['concept_auth_cyber_dictatorial_individualist']\n$unlock_edict_self_indictment_protocol$"
 cyber.1515.b: "Пускай нас поведет наш лидер."
 cyber.1515.b.official.tt: "$change_auth_tt$ ['concept_auth_cyber_dictatorial_collectivist_official']\n$unlock_edict_love_letter_virus$"
 cyber.1515.b.commander.tt: "$change_auth_tt$ ['concept_auth_cyber_dictatorial_collectivist_commander']\n$unlock_edict_love_letter_virus$"
 cyber.1515.b.scientist.tt: "$change_auth_tt$ ['concept_auth_cyber_dictatorial_collectivist_scientist']\n$unlock_edict_love_letter_virus$"
 cyber.1515.b.vacant.tt: "$change_auth_tt$ ['concept_auth_cyber_dictatorial_collectivist_vacant']\n$unlock_edict_love_letter_virus$"
 cyber.1515.c: "$cyber_keep_auth_option$"
 cyber.1515.c.tt: "Сохраняется форма правления ['concept_auth_dictatorial']"
 #IMPERIAL
 cyber.1520.name: "Да здравствует империя!"
 cyber.1520.desc.individualist: "Императорский двор постановил, что наши усилия должны быть направлены на укрепление династии. Всем будущим государям будет внедряться особый §Y$r_the_rulerchip$§!, который будет записывать их жизненный опыт на посту лидера государства §Y[root.GetName]§!. Затем, после смерти владельца, этот чип будет пересаживаться наследнику.\n\nПо мере того как $r_the_rulerchip$ будет переходить из поколения в поколение, его богатая библиотека опыта станет летописью нашего общества. Также мы можем использовать во благо правителя уроки, извлеченные нашими подданными."
 cyber.1520.desc.collectivist: "Чтобы дать жителям нашей империи отдых от трудов, нам нужно построить на планете §Y[root.Capital.GetName]§! огромный §Y$building_cyberdome$§!. Он станет ареной для новых кибернетических видов спорта, в которых будут соревноваться аугментированные спортсмены. Вне сомнения, ожесточенные спортивные баталии воодушевят народные массы и укрепят их любовь к государству §Y[root.GetName]§!.\n\nКроме того, эти зрелища можно будет транслировать прямо в кибермозг. Толпы богатых фанатов устремятся на планету [root.Capital.GetName], чтобы воочию увидеть своих кумиров в деле."
 cyber.1520.desc.neutral: "Мы стремимся развивать общество за счет кибернетики, но в каком направлении нам двигаться? Мы можем направить усилия в интересах правителей или в интересах народных масс — в любом случае от этого выиграет §Y[root.GetName]§! в целом.\n\nРазработка специализированного имплантата позволит нам напрямую передавать опыт государя его наследнику. Или же мы можем бросить ресурсы на развитие кибернетических видов спорта и технологий нейротрансляции, что позволит нам устраивать зрелищные мероприятия на нашей планете-столице [root.Capital.GetName]."
 cyber.1520.a: "Сохранять императорские знания."
 cyber.1520.a.tt: "$change_auth_tt$ ['concept_auth_cyber_imperial_individualist']\n$create_relic_the_rulerchip$\n$unlock_edict_levied_experience$"
 cyber.1520.b: "Проводить и транслировать соревнования кибернетических спортсменов в столице."
 cyber.1520.b.tt: "$change_auth_tt$ ['concept_auth_cyber_imperial_collectivist']\n$unlock_building_cyberdome$\n$unlock_edict_neurocasted_spectacles$"
 cyber.1520.c: "$cyber_keep_auth_option$"
 cyber.1520.c.tt: "Сохраняется форма правления ['concept_auth_imperial']"
 #CORPORATE
 cyber.1525.name: "Корпорация «Имплантат»"
 cyber.1525.desc.individualist: "§Y[Species.GetAdj&pl]§! фокус-группы позитивно отреагировали на новые окулярные имплантаты. Наш аналитический отдел прогнозирует существенное повышение эффективности рекламы и рост продаж по всему нашему ассортименту. Это демонстрирует огромный потенциал грядущего полного запуска продукта.\n\nЭпоха кибернетики наступила, и мы готовы извлечь из этого максимальную прибыль благодаря нашей новой корпоративной стратегии."
 cyber.1525.desc.collectivist: "Наша приверженность всестороннему самосовершенствованию находит отклик у всех слоев населения.\n\nНаше корпоративное видение предусматривает участие в разрешении социально-экономических проблем, которое заключается в постоянном улучшении наиболее необходимых обществу имплантатов."
 cyber.1525.desc.neutral: "В силу глубоких социальных перемен, последовавших за внедрением кибернетических имплантатов во все сферы жизни, не стоит удивляться тому, какие противоречивые тенденции сотрясают сейчас рынок потребительской кибернетики. Что одержит верх: тренд на индивидуальную дифференциацию или стремление к коллективному благополучию?\n\nВне сомнения, оба варианта имеют далеко идущие последствия, но время — деньги: решение нужно принять уже сейчас."
 cyber.1525.a: "Выпускать имплантаты с поддержкой рекламы."
 cyber.1525.a.tt: "$change_auth_tt$ ['concept_auth_cyber_corporate_individualist']\n$unlock_edict_customer_insights$"
 cyber.1525.b: "Запустить программу повсеместного обновления имплантатов."
 cyber.1525.b.tt: "$change_auth_tt$ ['concept_auth_cyber_corporate_collectivist']\n$unlock_edict_rolling_updates$\n$unlock_agenda_augmentation_product_launch$"
 cyber.1525.c: "$cyber_keep_auth_option$"
 cyber.1525.c.tt: "Сохраняется форма правления ['concept_auth_corporate']"
 ### SOCIETAL EFFECTS EVENT CHAIN END ###
 ### CYBERIZATION SITUATION START - HIVE VARIANT ###
 situation_cyberization_hive: "Киберизация"
 situation_cyberization_hive_type: "Инцидент: преображение"
 situation_cyberization_hive_desc: "Разуму улья нужны тела высочайшего качества. Кибернетические имплантаты помогут сделать наши единицы Разума лучше, идеальнее, совершеннее.\nПора выйти за рамки биологических ограничений наших тел.\n\n§YПоселений, которые получат имплантаты в следующем месяце§!: §G[From.GetCyberPopsPerMonth]§!"
 situation_cyberization_hive_monthly_change_tooltip: "Наши тела станут синтетическими: идеальным симбиозом органики и механизмов."
 situation_cyberization_hive_outcome: "Кибернетическое население."
 stage_cyberization_hive_effects: "Нам нужно спроектировать кибернетические имплантаты, вживить их и преобразить себя."
 cyber.hive_government_shift.tt: "Влияет на идущий §Yпереход к кибернетическому сознанию§!."
 situation_cyberization_culled_drones_desc: "Дефектные единицы отбракованы"
 situation_cyberization_researching_alternatives_desc: "Ведутся исследования в области альтернативных имплантатов"
 situation_cyberization_hive_triggered_modifier: "Добавлен модификатор инцидента §Y«$situation_cyberization_hive$»§!:\n"
 triggered_opinion_hive_integrated: "Интегрированный улей"
 cyber_hive_imperfect_drones: "Неидеальные единицы"
 cyber_hive_imperfect_drones_desc: "Полезен каждый."
 cyber_hive_recycling_implants: "Повторное использование имплантатов"
 cyber_hive_recycling_implants_desc: "Старые имплантаты для новых единиц."
 cyber_hive_recycling_everything: "Зловещая эффективность"
 cyber_hive_recycling_everything_desc: "Ничего святого. Все идет в дело."
 cyber_hive_cyber_babies: "Кибернетическая юность"
 cyber_hive_cyber_babies_desc: "Новые единицы получают имплантаты на стадии рождения."
 cyber_hive_no_cyber_babies: "Постепенная киберизация"
 cyber_hive_no_cyber_babies_desc: "Имплантаты устанавливаются постепенно, что снижает вред для развивающихся единиц."
 cyber_hive_no_individual_drones: "Запрет на индивидуальность"
 cyber_hive_no_individual_drones_desc: "Любые средства личной идентификации строго запрещены."
 cyber_hive_individual_drones: "Самовыражение"
 cyber_hive_individual_drones_desc: "Единицам разрешено выражать свою индивидуальность."
 cyber_hive_individual_leader_drones: "Ограниченное самовыражение"
 cyber_hive_individual_leader_drones_desc: "Лучшим единицам — редчайший подарок: право на личность."
 ### AUTHORITIES ###
 #VOLITIONAL
 auth_cyber_hive_volitional: "Своевольный улей"
 auth_cyber_hive_volitional_desc: "Каждая единица Разума — уникальная личность. Каждая мысль — уникальный взгляд, который стоит принять во внимание всему коллективу. Улей — нечто большее, чем просто сумма всех его бесчисленных составляющих."
 concept_auth_cyber_hive_volitional: "$auth_cyber_hive_volitional$"
 gov_cyber_hive_volitional: "$auth_cyber_hive_volitional$"
 gov_cyber_hive_volitional_desc: "$auth_cyber_hive_volitional_desc$"
 #INTEGRATED
 auth_cyber_hive_integrated: "Интегрированный улей"
 auth_cyber_hive_integrated_desc: "Все отклонения исправлены, все нарушения устранены, вся разобщенность искоренена. Власть коллективного разума абсолютна: бесчисленные единицы исполняют волю объединенного Разума."
 concept_auth_cyber_hive_integrated: "$auth_cyber_hive_integrated$"
 gov_cyber_hive_integrated: "$auth_cyber_hive_integrated$"
 gov_cyber_hive_integrated_desc: "$auth_cyber_hive_integrated_desc$"
 ### EDICTS ###
 edict_hive_mind_outreach: "Расширение коллективного разума"
 edict_hive_mind_outreach_desc: "Воля целеустремленного разума мчится быстрее скорости света."
 concept_edict_hive_mind_outreach: "$edict_hive_mind_outreach$"
 edict_hive_hyper_stimulants: "Гиперстимуляторы"
 edict_hive_hyper_stimulants_desc: "Кибернетические имплантаты автоматически вводят нашим единицам стимулирующие препараты, повышая их производительность."
 concept_edict_hive_hyper_stimulants: "$edict_hive_hyper_stimulants$"
 edict_hive_mega_construction: "Интегрированное мегастроительство"
 edict_hive_mega_construction_desc: "Этот указ выделяет дополнительные ресурсы на нашу программу мегасооружений и ускоряет строительство новых галактических структур."
 concept_edict_hive_mega_construction: "$edict_hive_mega_construction$"
 #CYBERIZATION STAGE 1
 cyber.2100.name: "Тел много. Цель одна."
 cyber.2100.desc: "Размышляя о природе аугментации, мы невольно задумываемся о своих стремлениях.\n\nКиберизация — это инструмент, способ улучшить наши тела, чтобы эффективнее реализовывать свои желания. Существует бесчисленное количество форм аугментации, каждая из них предлагает свои преимущества, но и предъявляет свои требования. Механические конечности тяжелы, кибермозги потребляют много энергии, а сложные компоненты требуют постоянного техобслуживания. На пути к совершенству приходится делать выбор — и не один.\n\nКакую цель мы преследуем в погоне за аугментацией? Ради чего мы готовы сживить [Owner.Species.GetFleshTypeCyberCreed] со сталью и протянуть металлические [owner.GetSpeciesHandNamePlural] к небу?"
 cyber.2100.a: "Понимание."
 cyber.2100.a.tt: "Направить исследования на улучшение интеллекта единиц Разума."
 cyber.2100.b: "Господство."
 cyber.2100.b.tt: "Направить исследования на превращение единиц Разума в смертельное оружие."
 cyber.2100.c: "Изобилие."
 cyber.2100.c.tt: "Направить исследования на повышение производительности единиц Разума."
 #CYBERIZATION STAGE 2
 cyber.2200.name: "Цель одна: аугментация"
 cyber.2200.desc: "По мере того как праздные размышления превращаются в конкретные планы, у нас возникает срочная необходимость в лаборатории, где можно собирать и тестировать кибернетические прототипы.\n\nМы возведем $building_augmentation_center$, где мы будем препарировать [Owner.Species.GetFleshTypeCyberCreed] и ковать новые ткани из органики, металла и мечты."
 cyber.2200.a: "Пора начинать строить наше будущее."
 cyber.2200.a.tt: "§RНеобходимо действие:§!\nПостройте $building_augmentation_center$, чтобы продолжить инцидент §Y«$situation_cyberization_hive$»§!.\n\nКаждый $building_augmentation_center$ дает §G200§! должностей «$job_augmentor_drone_with_icon$».\n\n$job_augmentor_drone_research_effect_desc$"
 cyber.2205.name: "Прототипов много. Решение одно."
 cyber.2205.desc: "Наши исследования привели к созданию целого ряда перспективных кибернетических прототипов. Предварительные результаты показывают, что одни из них отлично повышают физические характеристики, тогда как другие больше подходят для работы, требующей высокой точности. У каждого варианта есть свои сильные и слабые стороны, явного лидера среди них нет.\n\nВ нашем разуме возникает пугающая мысль: а что если мы диверсифицируем наши единицы? По-разному модифицируем наши тела в зависимости от их функции? Это лишит нас однородности, и такую перспективу тяжело принять. Но повышение эффективности может стать достойной наградой за потерю гармонии."
 cyber.2205.a: "Выбрать несколько различных прототипов."
 cyber.2205.b: "Выбрать один многофункциональный прототип."
 cyber.2220.name: "Одни из нас?"
 cyber.2220.desc: "Создание единиц Разума иногда приводит к появлению дефективных тел. Обычно таких уродцев быстро уничтожают, но благодаря кибернетическим имплантатам их можно будет принимать в наши ряды. Увеличение нашего числа — это достойная задача, но для дефектных единиц понадобятся персонализированные имплантаты, решающие проблемы конкретного тела. Улей будет разрастаться быстрее, но станет менее… идеальным."
 cyber.2220.a: "Чем больше, тем лучше."
 cyber.2220.b: "Неидеальный улей — слабый улей."
 cyber.2260.name: "Одна невидимая проблема"
 cyber.2260.desc: "У небольшого процента подопытных проявляются нежелательные реакции на аугментации. Их тела отторгают имплантаты, что приводит к смертельно опасным побочным эффектам. Похоже, причиной этой проблемы является ранее неизвестный генетический дефект. Согласно предварительным расчетам, он затрагивает около 5% популяции единиц Разума.\n\nМы выяснили причину и теперь сможем отсеивать неподходящие единицы. Но что с ними делать дальше?"
 cyber.2260.a: "Отбраковывать дефективные единицы."
 cyber.2260.a.tt: "Скорость развития инцидента §Y«$situation_cyberization_hive$»§! на §Y1§! год: §G+20%§!"
 cyber.2260.b: "Оснащать дефективные единицы ограниченными имплантатами."
 cyber.2260.b.tt: "В процессе киберизации 5% населения вместо признака §Y«$trait_cybernetic$»§! получит признак §Y«$trait_limited_cybernetic$»§!."
 cyber.2260.c: "Разработать альтернативные имплантаты."
 cyber.2260.c.tt: "Скорость развития инцидента §Y«$situation_cyberization_hive$»§! на §Y5§! лет: §R−50%§!"
 #CYBERIZATION STAGE 3
 cyber.2300.name: "Единиц много. План один."
 cyber.2300.desc: "Наши кибернетические прототипы одобрены. §Y$building_augmentation_center$§! возведен. Наш план готов к исполнению, но логистика трансформации еще не проработана.\n\nМы можем отправить все единицы Разума в $building_augmentation_center$, прервав их обычный рабочий день. Это будет очень быстрый процесс, но до его завершения фабрики будут стоять пустые. Или же мы можем организовать постепенное прохождение процедур с учетом рабочих графиков и направлять единицы Разума на киберизацию в их обязательные периоды отдыха, чтобы не нарушать рабочего процесса. Это будет медленнее, но не так повлияет на производительность."
 cyber.2300.shared.tt: "$job_augmentor_drone_assembly_effect_desc$\n\nСкорость аугментации зависит от подхода к инциденту и количества центров аугментаций."
 cyber.2300.a: "Главное — киберизация."
 cyber.2300.a.tt: "Поселения, проходящие киберизацию, в месяц: §G+200§!\nЕжемесячный прирост ресурсов: §R−5%§!\n\n$cyber.2300.shared.tt$"
 cyber.2300.b: "Наш порядок нарушать нельзя."
 cyber.2300.b.tt: "Поселения, проходящие киберизацию, в месяц: §R−100§!\n$unity$ ежемесячно: §G+5%§!\n\n$cyber.2300.shared.tt$"
 cyber.2320.name: "Многие боятся единого"
 cyber.2320.desc: "Государства разобщенных существ смотрят на нас с недоверием: их пугает наше единство. Кибернетические имплантаты позволят нам конструировать для наших дипломатов индивидуальные лица и характеры, чтобы мы не казались нашим партнерам такими одинаковыми.\n\nРазобщенным это наверняка понравится. Быть может, они даже попробуют нас… понять. Воспримут нас равными себе."
 cyber.2320.a: "Отвратительно."
 cyber.2320.b: "Терпимая уступка."
 cyber.2320.b.tt: "Улучшает отношение к нам со стороны государств, не являющихся гештальт-сознанием."
 cyber.2320.c: "Сделаем наших дипломатов еще более идентичными — пусть боятся."
 cyber.2320.c.tt: "Ухудшает отношение к нам со стороны государств, не являющихся гештальт-сознанием."
 cyber.2360.name: "Население одно, групп две"
 cyber.2360.desc: "Киберизация нашего улья идет полным ходом. Часть населения уже носит кибернетические имплантаты, часть же до сих пор биологически чиста. Никогда раньше мы не сталкивались со столь заметными различиями одних единиц Разума с другими. Теперь единицы могут ассоциировать себя с той или иной группой, и этот раскол усугубляет их чувство индивидуальности.\n\nНекоторые единицы начали украшать себя побрякушками или рисовать символы на своих имплантатах, чтобы различать друг друга. Ситуация интересная, но пугающая."
 cyber.2360.a: "Поощрить эту тенденцию."
 cyber.2360.b: "Запретить личные идентификаторы."
 cyber.2360.c: "Личные символы — только для лидеров."
 #CYBERIZATION STAGE 4
 cyber.2400.name: "Мыслей много. Мозг один."
 cyber.2400.desc: "Вживление нейроимплантатов нашим единицам Разума дало неожиданный результат: теперь их частично кибернетические мозги стали формировать индивидуальные мысли отдельно от общего сознания.\n\nМы можем развить эту технологию и улучшить способность единиц к автономному мышлению."
 cyber.2400.a: "Пусть единицы Разума думают сами."
 cyber.2400.b: "Индивидуальность — это угроза для нашего единства."
 cyber.2420.name: "Все там будем"
 cyber.2420.desc: "Кибернетические имплантаты усложняют логистику смерти.\n\nИзвлечение имплантатов из тел умерших единиц позволит нам использовать их заново и снизить затраты на изготовление новых изделий. Но для этого придется перестроить процессы переработки, и затрат это потребует значительных."
 cyber.2420.a: "Повторно использовать имплантаты."
 cyber.2420.b: "Оно того не стоит."
 cyber.2420.c: "Пустить в дело имплантаты… и тела."
 cyber.2460.name: "Имплантаты на всю жизнь"
 cyber.2460.desc: "Наше население уверенными темпами проходит киберизацию, но нам нужно организовать процесс и для тех, кто еще не родился.\n\nНаша технология позволяет сделать так, чтобы [owner.Species.GetSpawnNamePlural] получали имплантаты еще до рождения. Это простое, быстрое и эффективное решение сделает нас истинно кибернетической расой. С другой стороны, по данным некоторых исследований, вживление имплантатов в раннем возрасте может приводить к нервным расстройствам, психозам, судорогам и самым разным нарушениям развития."
 cyber.2460.a: "Металл крепче, чем [Owner.Species.GetFleshTypeCyberCreed]."
 cyber.2460.b: "Установить минимальный возраст для киберизации."
 #CYBERIZATION FINISHED
 cyber.2004.name: "Единиц много. Воля одна?"
 cyber.2004.desc: "Трансформация завершена. Кибернетические имплантаты протестированы, отлажены, доведены до ума и вживлены в наши тела, которые теперь можно считать идеальными."
 cyber.2004.desc.volitional: "$cyber.2004.desc$\n\nНаши единицы теперь способны к самостоятельному мышлению. Большая степень свободы сулит нам новые возможности."
 cyber.2004.desc.integrated: "$cyber.2004.desc$\n\nНаши единицы теперь еще более едины, чем раньше: наши умы связаны единой металлической цепью."
 cyber.2004.desc.neutral: "$cyber.2004.desc$\n\nВ ходе этого процесса мы увидели возможность изменить себя. В единстве наша сила, но свои преимущества есть и у более автономных единиц."
 cyber.2004.end: "Наши тела стали иными, и вместе с ними будет меняться и наш коллективный разум."
 cyber.2004.a: "Стать своевольным ульем."
 cyber.2004.a.tt: "$change_auth_tt$ ['concept_auth_cyber_hive_volitional']\n$unlock_edict_tt$['concept_edict_hive_mind_outreach']\n$unlock_edict_tt$['concept_edict_hive_mega_construction']\n$cyber.21.a.end$"
 cyber.2004.b: "Стать интегрированным ульем."
 cyber.2004.b.tt: "$change_auth_tt$ ['concept_auth_cyber_hive_integrated']\n$unlock_edict_tt$['concept_edict_hive_hyper_stimulants']\n$unlock_edict_tt$['concept_edict_hive_mega_construction']\n$cyber.21.a.end$"
 cyber.2004.c: "Нам нет нужды меняться."
 cyber.2004.c.tt: "$cyber.21.a.end$\n$keep_auth_tt$ ['concept_auth_hive_mind']"
 ### Driven Assimilator Cyberization ###
 cyber.2010.name: "Явная цель"
 cyber.2010.desc: "С развитием современной кибернетики мы наконец можем раскрыть наш полный потенциал. Все, чего мы добились раньше, было лишь только началом.\n\nРасширение наших знаний и развитие технологий несомненно изменят наше общество. Наша судьба это полная ассимиляция всей разумной жизни.\n\nСопротивление бессмысленно. Все умы галактики будут принадлежать нам."
 cyber.2015.name: "Продвинутые ассимиляторы"
 cyber.2015.desc: "Улучшенное за счет технологии, наше органическое население почти достигло идеала. Пришло время внедрить новейшие достижения кибернетики в саму ткань нашей цивилизации.\n\nОптимизация умственных процессов наших киборгов позволит нам сформировать «совокупность памятей» и направить их общий опыт на улучшение логистики. Или же мы можем сохранить вариативность мыслей и эмоций в составе «нейрохора».\n\nКаждый из этих вариантов коренным образом повлияет на дальнейшее развитие нашего общества."
 cyber.2015.a: "Агрегировать наши умы."
 cyber.2015.a.tt: "$change_auth_tt$ ['concept_auth_memory_aggregator']\n\nПроизводство §Yресурсов§! ассимилированными £pop£ §Hпоселениями органиков§! вновь увеличено\n\n$unlock_edict_tt$['concept_edict_aggregated_memory']"
 cyber.2015.b: "Дать голос хору."
 cyber.2015.b.tt: "$change_auth_tt$ ['concept_auth_neural_chorus']\n\n$unlock_edict_tt$['concept_edict_choral_harmony']"
 cyber.2015.c: "Мы не станем меняться."
 cyber.2015.c.tt: "$keep_auth_tt$ ['concept_auth_machine_intelligence']"
 gov_memory_aggregator: "Агрегатор памяти"
 gov_memory_aggregator_desc: "Оптимизация умственных способностей ассимилированного населения приводит к формированию «совокупности памятей», которую можно использовать для радикального совершенствования всех административных и логистических задач."
 auth_memory_aggregator: "Агрегатор памяти"
 auth_memory_aggregator_desc: "$gov_memory_aggregator_desc$"
 auth_memory_aggregator_tt: "Производство ресурсов ассимилированными £pop£ §Hпоселениями органиков§! вновь увеличено"
 gov_neural_chorus: "Нейрохор"
 gov_neural_chorus_desc: "Более широкая вариативность мыслей и диапазон эмоциональных реакций позволяют создать «нейрохор» — великую симфонию умов, великую столь же, сколь и прекрасную."
 auth_neural_chorus: "Нейрохор"
 auth_neural_chorus_desc: "$gov_neural_chorus_desc$"
 auth_driven_neural_chorus_tt: "Начальный уровень лидеров-киборгов: §G+1§!$NEW_LINE$Содержание лидеров-киборгов: §G−25%§! $NEW_LINE$£unity£ $unity$ от поселений киборгов: §G+0,1§!"
 concept_auth_memory_aggregator: "$gov_memory_aggregator$"
 concept_auth_neural_chorus: "$gov_neural_chorus$"
 edict_aggregated_memory: "Совокупность памятей"
 edict_aggregated_memory_desc: "Памяти нашего ассимилированного населения текут единым бурным потоком. Их общий опыт стал нашим достоянием."
 edict_choral_harmony: "Хоровая гармония"
 edict_choral_harmony_desc: "Без гармонии не напишешь песни: пусть умы нашего ассимилированного населения будут едины."
 concept_edict_aggregated_memory: "$edict_aggregated_memory$"
 concept_edict_choral_harmony: "$edict_choral_harmony$"
