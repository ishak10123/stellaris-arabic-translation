 #OLIGARCHIC
 edict_battle_royale: "Королевская битва"
 edict_battle_royale_desc: "Специалисты и рабочие начинают активнее стремиться к повышению и поощрениям: к этому их побуждает отображающий нормативы интерфейс, выполненный в игровой форме. Повышение производительности труда частично нивелируется однообразной бесконечностью процесса состязания."
