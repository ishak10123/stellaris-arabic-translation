 #CORPORATE
 #Cyber Corporate Individualist
 auth_cyber_corporate_individualist: "Корпоративная нейрокоммерция"
 auth_cyber_corporate_individualist_desc: "Рекламные щиты и портативные устройства вышли из моды и больше не способны захватить внимание потребителя. Однако теперь мы способны сканировать сознание потенциальных покупателей и посылать им обращения и призывы к действию, рассчитанные на конкретного клиента.\n\nКроме того, эта технология позволит нам выявлять пиратов на космических станциях; однако есть риск появления на черном рынке специальных блокировщиков сигналов."
