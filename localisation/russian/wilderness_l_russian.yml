 tr_domination_wilderness_network_effect: "§YОткрывает указ:§! «$edict_drone_overdrive_wilderness$»"
 tr_domination_imperious_architecture_wilderness: "Межвидовая совместимость феромонов"
 tr_domination_imperious_architecture_wilderness_desc: "§Y$district_craglands_plural$§! дают дополнительные £defense_army£ §Y$defense_army_plural$§!: §G+1§!"
 tr_domination_imperious_architecture_wilderness_delayed: "После установления принудительной феромонной связи все [GetIndividualNamePlural&nom] смогут быстрее реагировать на внешние угрозы."
 tr_expansion_colonization_fever_wilderness: "Многомировой разум"
 tr_expansion_colonization_fever_wilderness_desc: "Добавляет случайный §Y£district£ район§! при колонизации нового мира."
 tr_expansion_colonization_fever_wilderness_delayed: "[GetGestaltEntityName&nom] — это целый хор мыслей, заглушить которые не сможет даже холодная пустота космоса."
 tr_expansion_a_new_life_wilderness: "Стремительный рост"
 tr_expansion_a_new_life_wilderness_delayed: "[GetGestaltEntityName&nom] выращивает подходы к трудностям."
 tr_expansion_courier_network_wilderness: "$tr_expansion_courier_network_hive$"
 tr_expansion_courier_network_wilderness_delayed: "Каждый биом будет считаться меньшей частью общей сущности. Благодаря этому возможна адресная связь, не требующая полного внимания планетарного разума."
 tr_expansion_galactic_ambition_wilderness: "$tr_expansion_galactic_ambition_hive$"
 tr_expansion_galactic_ambition_wilderness_delayed: "Наши первые поползновения во тьму, прочь от родного мира, сопровождались первобытным ужасом. Лишь покорив и искоренив этот страх, мы сможем развиваться. [GetIndividualNamePluralCap&nom] погибнут, и счет им будет идти на миллионы, но [GetGestaltEntityName&nom] сможет жить дальше."
 tr_prosperity_pursuit_of_profit_wilderness: "Глобальный перенос жидкостей"
 tr_prosperity_pursuit_of_profit_wilderness_delayed: "По венам, протянувшимся вдоль континентов, переносятся необходимые для экосистем питательные вещества и строительные материалы."
 tr_prosperity_public_works_wilderness: "Подземные обиталища"
 tr_prosperity_public_works_wilderness_desc: "Все £district£ §Yрайоны§! дополнительно дают §G+50§! £housing£ §Yжилья§!"
 tr_prosperity_public_works_wilderness_delayed: "[GetIndividualNamePluralCap&nom] будут, проникая через верхние слои почвы, достраивать свои гнезда с помощью воска. Тем самым они обеспечат себе множество свободных мест для новых [GetIndividualNamePlural&gen]."
 tr_synchronicity_kinship_wilderness: "Синхронизированные биоритмы"
 tr_synchronicity_kinship_wilderness_delayed: "Тщательная регуляция циклов отдыха [GetIndividualNamePlural&gen] приведет к повсеместному принятию новых единых графиков распределения пищи."
 ####################################
 # Ascension Perks
 ####################################
 ap_mastery_of_nature_wilderness: "$ap_mastery_of_nature$"
 ap_mastery_of_nature_wilderness_desc: "Все мы, от мельчайшей клетки до высочайшего дерева, — те, кто поглощает и бесконечно поглощаем сам. Таков наш закон, ибо мы — природа."
 ap_engineered_evolution_wilderness: "$ap_engineered_evolution$"
 ap_engineered_evolution_wilderness_desc: "Наше сознание умеет преодолевать вызовы, которые бросает ему окружение. Среда меняется — значит, изменимся и мы."
 engineered_evolution_wilderness_tt: "- Начинает §Yинцидент «$genetic_ascension_situation$»§!, открывающий деревья традиций «['tradition_category:tradition_purity']».$TABBED_NEW_LINE$- $REQUIRES_TRADITION_SLOT$\n- $UNLOCKS_AGENDA$ §Y«$council_agenda_agenda_engineered_evolution_name$»§!, что добавляет технологии генной модификации в список доступных."
 ############
 # Espionage
 ############
 operation_embed_planetary_roots: "Закрепить планетарные корни" # literal roots, as in plantlife
 operation_embed_planetary_roots_desc: "Сейчас наши [owner.GetIndividualNamePlural&nom], занимающиеся сбором разведданных, нужны в других местах, однако значительную часть агентурной сети можно сохранить, если посадить в одном из миров нашей «жертвы» полуразумный микробиом. Возможно, получится даже нарушить поставки пищи." # the Wilderness embeds a part of itself, hence 'microbiome'
 operation_embed_planetary_roots_on_success: "$operation_sleeper_cells_on_success$"
 espionage_planetary_roots: "Планетарные корни"
 espionage_planetary_roots_desc: "Мы оставили после себя полуразумный микробиом, который будет сообщать нам о происходящем в этом государстве. Эти примитивные симбионты готовы в любую минуту оказать поддержку нашим [owner.GetIndividualNamePlural&dat]."
 operation_embed_planetary_roots_requires_blocker: "$TRIGGER_FAIL$ §RНаши $espionage_planetary_roots$ требуют наличия в одном из миров государства-цели ['concept_natural_blocker', природного препятствия].§!"
 operation_embed_planetary_roots_dont_stack_this: "$TRIGGER_FAIL$ §RМы уже закрепили $espionage_planetary_roots$ в [target.GetName&prep]. Преимущество от этого может сохраняться до определенного момента (§Y[planet_roots_success]§!).§!"
 operation_embed_planetary_roots_not_cleared: "$TRIGGER_FAIL$ §RМы чувствуем, что где-то в [target.GetName&prep] еще существуют наши $espionage_planetary_roots$.§!"
 d_wilderness_root_blocker: "Инвазивные заросли"
 d_wilderness_root_blocker_desc: "На окраине этой сельской местности выросли густые заросли полуразумных диких растений родом из других мест."
 wilderness.4500.name: "Наблюдение за природой"
 wilderness.4500.desc: "Наши полуавтономные [owner.GetOperativesLowerPlural] обнаружили несколько мест, подходящих для высадки там микробиома. Какое-то время они будут следить за происходящим в этих ареалах и выявлять те из них, где нас с наибольшей вероятностью ждет успех."
 wilderness.4505.name: "Обнаружено кажущееся подходящим место"
 wilderness.4505.desc: "Мы заручились помощью местного обитателя [target.GetSpeciesAdj&masc,gen] вида: он считает, что участвует в важном деле охраны природы. На самом деле он заложит «семенную бомбу» в отдаленном месте на §H[roots_planet.GetPlanetMoon]е [roots_planet.GetName]§!.\n\nИ хотя симбионты, которые начнут размножаться после ее «взрыва», будут жить недолго и никогда не станут полноценной частью нашего сознания, они все-таки искренне стремятся проникнуть в чужеродный мир и наблюдать за происходящим здесь."
 wilderness.4510.name: "$espionage_planetary_roots$ закреплены"
 wilderness.4510.desc: "Наш микробиом обрел новый дом — [GetRootsBlockerName]. Теперь мы вдыхаем местный запретный воздух и ощущаем мир, известный под именем §H[roots_planet.GetName]§!.\n\nПока что наше присутствие на нем будет неустойчивым, поскольку эти симбионты отсоединены от общего сознания. Но когда придет время вновь начать какие-либо действия на [target.GetAdj&pl,gen] территории, они еще нам послужат."
 wilderness.4510.a: "Следует пустить корни еще глубже, сделать их еще надежнее."
 wilderness.4510.b: "Пусть корни распространяются здесь без препятствий."
 ####################################
 # Technologies
 ####################################
 tech_wilderness_terraform: "Планетарное прорастание"
 tech_wilderness_terraform_desc: "Чтобы наши корни дотянулись до нового мира, им понадобится рассадник: заселяемую планету придется терраформировать, только тогда наши колонии будут чувствовать себя комфортно."
 tech_terrestrial_sculpting_wilderness: "$tech_terrestrial_sculpting$"
 tech_terrestrial_sculpting_wilderness_desc: "$tech_terrestrial_sculpting_desc$"
 tech_terrestrial_sculpting_wilderness_effect: "§HОткрывает свойство:§! позволяет терраформировать все планеты стандартных классов."
 tech_wilderness_node: "Центры естества"
 tech_wilderness_node_desc: "Поощряя развитие глубокомыслящих симбионтов, мы добьемся того, что единая воля нашего распределенного сознания будет ощущаться более отчетливо."
 tech_wilderness_cluster: "$tech_hive_cluster$"
 tech_wilderness_cluster_desc: "Чтобы всеобщие мысли коллективного разума переносились еще быстрее, мы можем подключить к этому скопления симбионтов, чья единственная задача — способствовать осуществлению нашей воли."
 tech_wilderness_confluence: "$tech_hive_confluence$"
 tech_wilderness_confluence_desc: "Обширные скопления эмпатических симбионтов укрепят волю нашего мутуалистического сознания: они находятся в такой гармонии с окружением, что способны сосредотачивать и передавать наши общие мысли."
 tech_genome_mapping_wilderness: "$tech_genome_mapping$"
 tech_genome_mapping_wilderness_desc: "Картирование геномов бесчисленных нитей наших ДНК не только помогает нам лучше понять, как устроено наше развитие, но и устраняет осложняющие факторы."
 tech_mining_1_wilderness: "$tech_mining_1$"
 tech_mining_1_wilderness_desc: "Если воздействовать на залежи минералов гидравлическим давлением с помощью уплотнителей слизи, мы сможем проникнуть в более глубокие пласты и добывать больше минералов."
 tech_powered_exoskeletons_wilderness: "$tech_powered_exoskeletons$"
 tech_powered_exoskeletons_wilderness_desc: "Активные экзоскелеты увеличивают силу и скорость носителя, а потому приносят пользу не только в военном деле, но и в ручном труде."
 tech_colonization_1_wilderness: "Программа «Новые миры»"
 tech_colonization_1_wilderness_desc: "Мы начинаем уделять все внимание подсчету ресурсов и материалов, необходимых для пробуждения новых миров, и готовим симбионтов-первопроходцев к трудным межзвездным перелетам."
 tech_wilderness_government: "$tech_planetary_government$"
 tech_wilderness_government_desc: "Первое, что следует сделать новой планете после пробуждения, — обеспечить устойчивую и процветающую среду. Это даже важнее потребностей нашего общего разума."
 tech_wilderness_colonial_centralization: "$tech_colonial_centralization$"
 tech_wilderness_colonial_centralization_desc: "$tech_colonial_centralization_desc$"
 tech_wilderness_galactic_administration: "$tech_galactic_administration$"
