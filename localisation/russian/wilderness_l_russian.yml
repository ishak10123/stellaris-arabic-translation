l_russian:
 ####################################
 # Events
 ####################################
 # introduction event
 progress.2.desc.wilderness: "[Root.GetName] объявляет об удивительной находке на [from.GetPlanetMoon]е [from.GetName]: это космическое тело кишит жизнью! Впервые в истории мы обнаружили форму жизни, зародившуюся за пределами нашего сознания.\n\nЭта находка окончательно подтвердила, что мы, то есть [root.owner.capital_scope.GetName], не одиноки во вселенной. И хотя обитателей [from.GetPlanetMoon]ы [from.GetName] нельзя назвать разумными, вероятно, в скором времени мы отыщем и более развитых существ…"
 # Colonization Events
 wilderness.1010.name: "[from.GetName] пробуждается"
 wilderness.1010.desc.intro: "Наши терраформирующие споры исполнили свое предназначение и впервые высадили часть нас самих в другом мире, чтобы колонизировать его."
 wilderness.1010.desc.same: "Мы одновременно и [from.GetName], и [root.GetHomeWorldName]… И это ощущение нам хорошо знакомо. Существование в десятках форм одновременно под чужим солнцем совершенно не тяготит нас — наоборот, мы чувствуем себя уверенно и легко приспособились к местным условиям." #e.g. 'becoming Mars as well as Earth...''
 wilderness.1010.desc.similar_cold: "Подготовка к тому, чтобы [from.GetClassAdj] планета §Y[from.GetName]§! стала частью нас самих, будет непростой, но мы уже нашли, как справиться с этими трудностями привычным путем. Потянутся отростки, появятся вырезанные во льду поселения, голодные начнут охоту." #e.g. 'Adapting our self to suit arctic Pluto...'
 wilderness.1010.desc.similar_dry: "Как и планета [root.GetHomeWorldName], мы давно привыкли к сухой атмосфере. Предстоящий путь будет тяжелым, но из нас тоже получится [from.GetClassAdj] планета §Y[from.GetName]§!. Мы уже открыли новые способы искать и сохранять влагу и приучились подстраиваться под местные условия, а не идти против них." #e.g. 'the challenge of becoming savannah Mars'
 wilderness.1010.desc.similar_wet: "Мы процветали в водах мира [root.GetHomeWorldName] — и мы продолжим процветать как [from.GetClassAdj] планета §Y[from.GetName]§!. Здесь нам незнакомо все: минералы, течения, даже яркость местного солнца… Но мы уже нашли способы добывать все необходимое." #e.g. 'we flourish as oceanic Neptune'
 wilderness.1010.desc.diff_cold: "Мы понимали, что §Y[from.GetName]§! будет с трудом поддаваться превращению. Многое из того, благодаря чему мы вообще существуем как [root.capital_scope.GetClassAdj] планета [root.GetHomeWorldName], здесь погибло, но то, что смогло выжить, исключительно сильно и умеет приспосабливаться. Добывать ресурсы для поддержания жизнедеятельности здесь будет нелегко, но даже в местных морозных пустошах еще теплится жизнь." #e.g. 'becoming Earth'
 wilderness.1010.desc.diff_dry: "Эта планета вызывает у нас первобытный страх: она настолько горяча и суха, что в памяти поневоле всплывают воспоминания о Пекле. Однако если к ней все-таки удастся приспособиться… Возможно, тогда §Y[from.GetName]§! научит чему-то новому нас самих. Там, где есть влага, есть и способы ее сохранить. Там, где нет тени, всегда найдутся способы ее создать."
 wilderness.1010.desc.diff_wet: "Мы понимаем, что §Y[from.GetName]§! будет с трудом поддаваться превращению, однако гниль и наводнения можно преодолеть. Те наши части, которые лучше других приспособлены к воде, будут впитывать ее, чтобы защитить слабых. Неповторимые потоки этой планеты не смогут навредить нам всерьез." #e.g. 'Our effort to become Mars'
 wilderness.1010.desc.other: "Готовясь к превращению в планету §Y[from.GetName]§!, мы строго отделяем те свои части, которые способны здесь процветать, от тех, которые непременно увянут. Местная [from.GetClassAdj] жизнь имеет много общего с той, которую мы уже успели встретить, но вместе с тем она загадочна. Мы будем наблюдать и экспериментировать." #e.g. 'shape ourselves to become Luna'
 wilderness.1010.desc.outro: "Все наши элементы, все питательные вещества, даже ДНК начинают подстраиваться под жизнь, сложившуюся тут до нашего прибытия, и смешиваться с ней. [from.GetName] пробуждается."
 wilderness.1010.a: "Вскоре наши миры сольются воедино."
 # Terraforming Events
 terra.25.desc.wilderness: "Длительная работа по пробуждению планеты §Y[From.GetName]§! окончилась совсем не так, как мы предполагали. Из-за разрыва в распределителе биомассы на поверхность частично пролились §Yтерраформирующие шлаки§!, забившие долины и покрывшие некоторые обитаемые зоны липкой коркой.\n\nСами по себе они не опасны, однако излишек гноеподобного вещества на время затруднит существование некоторых подвижных элементов."
 terra.80.desc.wilderness: "Мы избавили будущих самих себя от очередного слоя радиации в атмосфере и почве планеты §Y[From.GetName]§!, однако после этого вынуждены были вмешаться наши бдительные [Root.GetTerraformerPlural]. Они временно изолировали часть планеты: похоже, мы потревожили местную фауну — неуловимую и проживающую в радиоактивных регионах. Теперь она, к сожалению, начала гибнуть.\n\nЛюбопытно, что этих существ можно назвать предразумными; еще немного — и они обретут независимое мышление. Сейчас [From.GetName] готовится окончательно избавить небесное тело от радиации. Нам же следует решить, как именно поступить с неожиданно открытой формой жизни."
 terra.80.b.wilderness: "Это их планета. Не будем мешать их пробуждению."
 terra.80.d.wilderness: "Мы поглотим их."
 wilderness.2000.name: "Запланированное пробуждение"
 #wilderness.2000.desc.reg: "We feel the tremendous potential of [from.GetName]. It seems proper to both fear and delight in the awesome power we are about to exert there: shaping this [from.GetPlanetMoon] with our will and the tools we have developed; laying the pattern for its eventual awakening.\n\nWe have long relied on natural processes to grow and sustain the [root.GetName]. But these trials also cost us dearly, and taught us much. Now we shall see what wonders emerge when a habitable world skips its own evolution and gains the wisdom of hard-earned growth and decay."
 wilderness.2000.desc.barren: "Нам больно смотреть на безжизненную поверхность планеты [from.GetName]. К счастью, это ненадолго: хоть этот мир и остался в стороне от внимания галактики, мы, [root.GetName], сможем исправить такую несправедливость. Все инструменты и знания для этого у нас уже есть.\n\n[from.GetName] восстановится еще не скоро — задача эта утомительна и трудна даже для нас. Но сила воли и открытые нами инструменты для изменения климата способны сотворить жизнь даже там, где ее не было раньше."
 wilderness.2000.desc.tomb_detox: "Обитавшая на планете [from.GetName] цивилизация погибла, но мы готовы дать этому миру возможность расцвести вновь и уже приступили к восстановлению атмосферы, рек и почвы. Через какое-то время [from.GetName] снова узнает, что такое жизнь, и имя этой жизни будет [root.GetName]."
 wilderness.2000.desc.gaia: "Мы, [root.GetName], — поистине чудесное порождение благотворной эволюции, и сейчас нам наконец представилась возможность поделиться своим великолепием с [from.GetPlanetMoon]ой [from.GetName]. Вооружившись инструментами и знаниями, о которых когда-то невозможно было и помыслить, мы начали превращать это небесное тело в чудо, чье пробуждение будет совершенно не похоже на другие.\n\nВ один прекрасный день [from.GetName] будет ломиться от питательных веществ, а флора и фауна здесь будут процветать. Долины, горные кряжи и плато предоставят нам пищу и укрытие. Жизнь восторжествует."
 wilderness.2000.a: "Приступим."
 wilderness_pre_sapient_defence_army: "Стадо предразумных"
 seq_wilderness_pre_sapient_defence_army: "$R$ стадо симбионтов" # e.g. 'Symbiont Herd IV'
 wilderness_pre_sapient_defence_army_plural: "Стада предразумных"
 wilderness_pre_sapient_defence_army_desc: "Существа с сильно развитым территориальным инстинктом. Обычно мирные, но в случае провокации инстинкт защищать своих сородичей берет над ними верх."
 wilderness_pre_sapient_assault_army: "Орда предразумных"
 seq_wilderness_pre_sapient_assault_army: "$R$ орда предразумных" # e.g. 'Symbiont Horde IV'
 wilderness_pre_sapient_assault_army_plural: "Орды предразумных"
 wilderness_pre_sapient_assault_army_desc: "Свирепые существа, достаточно хитрые и выносливые, чтобы успешно раздирать в клочья своих врагов."
 ####################################
 # Origins
 ####################################
 origin_wilderness: "Дикое сознание"
 origin_wilderness_desc: "§RВНИМАНИЕ: будет доступен только путь возвышения ['concept_purity_ascension', через чистоту].§!\n\nЭто существо — настоящая разумная экосфера. Она состоит из целого множества разнообразных форм жизни, слившихся со временем в единое гештальт-сознание планетарного масштаба."
 origin_tooltip_wilderness_effects: "• Признак расы: «['trait:trait_wilderness']»\n• Заменяет все стандартные £building£ ['concept_buildings', сооружения], £district£ ['concept_districts', районы] и £zone£ ['concept_district_specialization', специализации районов] на индивидуальные\n• Заменяет колонизацию с помощью колониального корабля на ['concept_terraforming', терраформирование]\n• Открывает новый ресурс: £biomass£ ['concept_biomass', биомасса]\n• Родной мир: $TABBED_NEW_LINE$• Размер: £planetsize£ 18$TABBED_NEW_LINE$• ['concept_scorched_plains', £blocker£ $d_scorched_plains$]"
 trait_wilderness: "Дикое сознание"
 trait_wilderness_desc: "§LЭта раса — часть мутуалистической сущности. Ни в мыслях, ни в труде она ничем не отличается от своего окружения.§!"
 WILDERNESS_NATURAL_WORLDS_DECLINE: "§R§YДикое сознание§! не может существовать в неприродных мирах.§!"
 WILDERNESS_DEAD_WORLD: "$TRIGGER_FAIL$§YДикое сознание§! не может выживать в государствах, не являющихся диким сознанием."
 country_virtual_jobs: "Все должности в этом государстве заполняются автоматически."
 concept_wilderness_trait: "$trait_wilderness$"
 concept_wilderness_trait_desc: "- $MOD_LOGISTIC_GROWTH_MULT$: §R-100%§!\n- §RНе могут мигрировать или быть переселены§!$NEW_LINE$ -§RНе могут размножаться естественным путем§!\n\n§L$trait_wilderness_desc$§!"
 PRESCRIPTED_adjective_zhardmehka: "Цветочн|||masc:Цветочный $1$|||masc,gen:Цветочного $1$|||masc,dat:Цветочному $1$|||masc,acc:Цветочный $1$|||masc,inst:Цветочным $1$|||masc,prep:Цветочном $1$|||fem:Цветочная $1$|||fem,gen:Цветочной $1$|||fem,dat:Цветочной $1$|||fem,acc:Цветочную $1$|||fem,inst:Цветочной $1$|||fem,prep:Цветочной $1$|||neut:Цветочное $1$|||neut,gen:Цветочного $1$|||neut,dat:Цветочному $1$|||neut,acc:Цветочное $1$|||neut,inst:Цветочным $1$|||neut,prep:Цветочном $1$|||pl:Цветочные $1$|||pl,gen:Цветочных $1$|||pl,dat:Цветочным $1$|||pl,acc:Цветочные $1$|||pl,inst:Цветочными $1$|||pl,prep:Цветочных $1$"
