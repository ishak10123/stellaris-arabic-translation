 PRESCRIPTED_species_name_zhardmehka: "Жард-Креллин|||gen:Жард-Креллина"
 PRESCRIPTED_species_name_plural_zhardmehka: "Жард-Креллины|||gen:Жард-Креллинов"
 PRESCRIPTED_species_adjective_zhardmehka: "Жард-креллинск|||masc:Жард-креллинский $1$|||masc,gen:Жард-креллинского $1$|||masc,dat:Жард-креллинскому $1$|||masc,acc:Жард-креллинский $1$|||masc,inst:Жард-креллинским $1$|||masc,prep:Жард-креллинском $1$|||fem:Жард-креллинская $1$|||fem,gen:Жард-креллинской $1$|||fem,dat:Жард-креллинской $1$|||fem,acc:Жард-креллинскую $1$|||fem,inst:Жард-креллинской $1$|||fem,prep:Жард-креллинской $1$|||neut:Жард-креллинское $1$|||neut,gen:Жард-креллинского $1$|||neut,dat:Жард-креллинскому $1$|||neut,acc:Жард-креллинское $1$|||neut,inst:Жард-креллинским $1$|||neut,prep:Жард-креллинском $1$|||pl:Жард-креллинские $1$|||pl,gen:Жард-креллинских $1$|||pl,dat:Жард-креллинским $1$|||pl,acc:Жард-креллинские $1$|||pl,inst:Жард-креллинскими $1$|||pl,prep:Жард-креллинских $1$ $1$|||corp:Жард-креллин $1$"
 PRESCRIPTED_planet_name_zhardmehka: "Теллон|||gen:Теллона"
 PRESCRIPTED_system_name_zhardmehka: "Таттла"
 PRESCRIPTED_ruler_name_zhardmehka: "$FUN3_CHR_Obanva$ $FUN3_CHR_uvi-Livve$"
 PRESCRIPTED_ruler_title_zhardmehka: "Аватар"
 START_SCREEN_WILDERNESS_INTRO: "[root.GetHomeWorldName] — это планета [root.GetHomeWorldName], и мы не помним, чтобы когда-то было иначе. Каждый стебелек, каждый отросток, каждый фермент здесь — неотъемлемая часть нашей сущности, идеальный баланс роста, увядания и уничтожения излишков. Однако мы слабо представляли, что творится за пределами родного мира: [root.GetHomeWorldName] и галактика всегда были бесконечно далеки друг от друга. Но оказалось, что у звезд свой замысел…\n\nВ небесах над планетой [root.GetHomeWorldName] развернулось сражение. На поверхность один за другим падали обломки огромных космических кораблей — мы быстро нашли им применение. А затем произошла сверхвспышка…"
 START_SCREEN_WILDERNESS_DEFAULT: "[root.GetHomeWorldName] может описать ее тремя словами: ослепительный обжигающий свет. От поднявшейся огненной бури и всплеска радиации погибли миллиарды симбионтов. На целом континенте жизнь погасла навсегда."
 START_SCREEN_WILDERNESS_COLD: "[root.GetHomeWorldName] может описать ее тремя словами: ослепительный обжигающий свет. Ледники расплавились и превратились в бурные потоки, звездное излучение выжгло планету дотла. На целом континенте жизнь была смыта."
 START_SCREEN_WILDERNESS_DRY: "[root.GetHomeWorldName] может описать ее тремя словами: ослепительный обжигающий свет. Песчаные дюны остекленели, беспощадный ветер сточил утесы до основания. Целый континент превратился в пустошь."
 START_SCREEN_WILDERNESS_WET: "[root.GetHomeWorldName] может описать ее тремя словами: ослепительный обжигающий свет. Вода в озерах вскипела, а ледяные щиты расплавились под звездным излучением. Погиб целый континент."
 START_SCREEN_WILDERNESS_OUTRO: "Боль заставила нас пробудиться, и впервые за всю свою историю мы осознали, насколько же мы хрупки. Галактика полна опасностей, но она также полна и чудес. Сегодня мы готовы взмыть вверх, дать новые всходы и распространиться среди звезд."
 ####################################
 # Authorities
 ####################################
 auth_mutualistic_intelligence: "Мутуалистический разум"
 auth_mutualistic_intelligence_plural: "Мутуалистические разумы"
 auth_mutualistic_intelligence_desc: "$auth_mutualistic_intelligence_plural$ — распределенное сознание планетарного масштаба. Такой разум состоит из симбионтов — обитателей различных ареалов планеты, действующих согласно коллективной воле своего окружения.\n\nОтдельные симбионты могут частично действовать самостоятельно, если нужно выполнить конкретную задачу, но большинство особей существует в постоянном контакте с мутуалистическим окружением. В изоляции они сначала идут на поводу у инстинктов, а затем погибают."
 tt_auth_mutualistic_intelligence: "Есть форма правления §Y«$auth_mutualistic_intelligence$»§! (§Y$auth_hive_mind$§!)"
 gov_wilderness: "$gov_hive_mind$"
 gov_wilderness_desc: "Это правительство функционирует как единое сознание, и у населения нет никакой свободы воли — оно лишь удовлетворяет те потребности и желания, которые проявляет $RT_WILDERNESS$."
 RT_WILDERNESS: "Дикое сознание"
 RT_WILDERNESS_FEMALE: "$RT_WILDERNESS$"
 ####################################
 # Buildings
 ####################################
 building_colony_shelter_wilderness: "Планетарные побеги"
 building_colony_shelter_wilderness_desc: "Этот мир заселен первыми поселенцами — многоклеточными организмами, благодаря которым здесь сможет обосноваться Дикое сознание."
 building_capital_wilderness: "Планетарный корневой пучок"
 building_capital_wilderness_desc: "Обширная масса простых организмов, состоящая в гармонии с подвижными симбионтами и улучшающая их координацию и производительность."
 building_major_capital_wilderness: "Планетарный корневой комплекс"
 building_major_capital_wilderness_desc: "Плотная живая масса, достаточно концентрированная, чтобы симбионты могли жить, трудиться и размножаться в одной конкретной местности."
 building_system_capital_wilderness: "Планетарный корневой центр"
 building_system_capital_wilderness_desc: "Огромное множество разнообразных жизненных форм, действующих сообща. Оно настолько обширно, что даже создает собственный идеальный микроклимат."
 requires_building_wilderness_capital: "§RНа планете требуется §Y$building_capital_wilderness$§!.§!"
 requires_building_wilderness_major_capital: "§RНа планете требуется §Y$building_major_capital_wilderness$§!.§!"
 requires_building_wilderness_system_capital: "§RНа планете требуется §Y$building_system_capital_wilderness$§!.§!"
 building_imperial_capital_wilderness: "Имперский комплекс"
 building_imperial_capital_wilderness_desc: "Из этого колоссального и затейливого сооружения дикое сознание управляет Галактическим империумом. Здесь решается судьба галактики."
 building_tendril_cradle_1: "Колыбель отростков"
 building_tendril_cradle_1_desc: "Скопление коротких укоренившихся жилок, притягивающее к жизненно важным органам находящиеся поблизости материалы."
 building_tendril_cradle_2: "Вьющийся простор"
 building_tendril_cradle_2_desc: "Продолговатые отростки тянутся по земле и собирают расположенные по соседству ресурсы, которые затем отправляются на переработку и распределение."
 building_tendril_cradle_3: "Гнездо корней-транспортеров"
 building_tendril_cradle_3_desc: "Разветвленные корни пульсируют и перемещаются под поверхностью, перенося биомассу по многослойным каналам к отдаленным биотическим узлам."
 building_tendril_cradle_4: "Планетарное потоковое сердце"
 building_tendril_cradle_4_desc: "Огромные сияющие отростки окутывают планету. Они безустанно переносят, регулируют и перенаправляют ресурсы дикого сознания, действуя синхронно и безошибочно."
 planet_research_buildings: "Планетарные исследовательские сооружения"
 mod_planet_research_buildings_upkeep_mult: "Содержание планетарных исследовательских сооружений"
 building_brain_node_1: "Исследовательский нарост"
 building_brain_node_1_desc: "Поведение озорных и любопытных симбионтов — фундамент для всех исследований."
 mod_planet_building_brain_node_1_build_speed_mult: "Скорость строительства исследовательской рощи"
 building_brain_node_2: "Исследовательская роща"
 building_brain_node_2_desc: "Ареал посвящен воспитанию в симбионтах любознательности. Благодаря этому качеству становится возможно изучать более сложные артефакты и явления."
 mod_planet_building_brain_node_2_build_speed_mult: "Скорость строительства экзотического исследовательского участка"
 building_brain_node_3: "Экзотический исследовательский участок"
 building_brain_node_3_desc: "На этих обширных участках многочисленные симбионты-экстремофилы могут экспериментировать с разного рода экзотическими и опасными материалами."
 mod_planet_building_brain_node_3_build_speed_mult: "Скорость строительства продвинутого исследовательского участка"
 building_brain_node_4: "Продвинутый исследовательский участок"
 building_brain_node_4_desc: "Сочетание экзотических технологий и огромных симбиотических участков обеспечивает все условия для передовых исследований в безопасной среде."
 mod_planet_building_brain_node_4_build_speed_mult: "Скорость строительства продвинутого исследовательского участка"
 building_commensal_clearing_1: "Симбиотическая поляна"
 building_commensal_clearing_1_desc: "На этих островках спокойствия подвижные симбионты могут собираться вместе, отдыхать и отвечать на новые призывы дикого сознания."
 building_commensal_clearing_2: "Симбиотическая роща"
 building_commensal_clearing_2_desc: "Укрытые места с прекрасными условиями, где могут во множестве собираться симбионты. Их взаимодействия друг с другом помогают распределенному сознанию лучше понять себя."
 building_commensal_clearing_3: "Симбиотическая долина"
 building_commensal_clearing_3_desc: "Через эти нетронутые просторы пролегают пути сплоченных сообществ мигрирующих симбионтов самых разных видов. Каждая миграция укрепляет связывающие их узы."
 building_commensal_clearing_4: "Симбиотический биом"
 building_commensal_clearing_4_desc: "В огромных ареалах, соединенных между собой, происходят миллиарды контактов. Каждый из них — искра, поддерживающая огонь мутуалистического единства."
 building_massive_growth_1: "Лощина с питательными веществами"
 building_massive_growth_1_desc: "Благодаря ограниченному изменению ландшафта здесь образовался идеальный микроклимат, в котором круглый год произрастает урожай."
 building_massive_growth_2: "Подлесок с питательными веществами"
 building_massive_growth_2_desc: "Огромный полунепроницаемый лесной полог обеспечивает этому подлеску всю необходимую для стабильного производства питательной и сочной пищи защиту."
 building_massive_growth_3: "Контурная мегаплантация"
 building_massive_growth_3_desc: "Настоящий рай для земноводных микроорганизмов и фауны. Эти обширные террасы — прекрасный источник белка и зерна."
 building_massive_growth_4: "Лесная плантация"
 building_massive_growth_4_desc: "Подлески, прикрытые лиственной мегафлорой, приносят обильный урожай, достаточный для покрытия всей пищевой сети."
 building_bioelectric_stimulator_1: "Хлоропластовый накопитель"
 building_bioelectric_stimulator_1_desc: "Гроздь линзообразных пузырьков фокусирует солнечные лучи, направляя их внутрь через густой водорослевой бульон, сохраняя и запасая таким образом энергию."
 building_bioelectric_stimulator_2: "Хлоропластовый ускоритель"
 building_bioelectric_stimulator_2_desc: "Зеркальные пузырьки, наполненные фотосинтезирующими водорослями, с помощью солнечной энергии образуют более крепкие биохимические связи, что уменьшает саморазряд."
 building_bioelectric_stimulator_3: "Хлоропластовая линзовая система"
 building_bioelectric_stimulator_3_desc: "Уравновешенные ветки, снабженные гелиоколлекторами, могут подниматься и опускаться в зависимости от накопленной энергии и потребности в ней. Такой энергоузел достаточно универсален и надежен."
 building_bioelectric_stimulator_4: "Хлоропластовая циста"
 building_bioelectric_stimulator_4_desc: "Эти зеркальные мешки, наполненные водорослями, умеют перемещаться туда, где больше всего нужна хранимая ими энергия, и размножаться там, в результате чего энергия почти не теряется с расстоянием."
 building_churning_tunnels_1: "Каменный бур"
 building_churning_tunnels_1_desc: "Добыча полезных минералов ведется с помощью растительных веществ, по прочности почти не уступающих кристаллам, из-за чего увеличиваются ее объемы."
 building_churning_tunnels_2: "Каменные фильтры"
 building_churning_tunnels_2_desc: "Колонии полупористых биопленок собирают ценные минералы, которые иначе бы пропали в отходах, остающихся после добычи."
 building_churning_tunnels_3: "Каменный измельчитель"
 building_churning_tunnels_3_desc: "Мощные дробильные пластины и клешни превращают почву в кашицу, облегчающую добычу минералов."
 building_churning_tunnels_4: "Каменные чаны"
 building_churning_tunnels_4_desc: "С помощью измельчителей, биохимических агентов и биопленок добывать минералы можно везде, где есть богатые пласты."
 building_natural_furnace_0: "Бассейн для выплавки"
 building_natural_furnace_0_desc: "Симбионты-термофилы без устали производят здесь высококачественные сплавы — этому способствует естественный источник тепла."
 building_natural_furnace_1: "Горн для выплавки"
 building_natural_furnace_1_desc: "Благодаря жаростойким наростам тепло используется эффективнее, что позволяет производить более качественные сплавы."
 building_natural_furnace_2: "Плавильня на твердом свете"
 building_natural_furnace_2_desc: "С помощью сложных литоорганических горнов и голографических технологий можно производить универсальные сплавы."
 building_natural_furnace_3: "Наноплавильня"
 building_natural_furnace_3_desc: "Наноорганизмы-термофилы, обитающие в жарких бассейнах и горнах, удаляют из сплавов все ненужные примеси."
 building_avatar_chamber_1: "Колыбель аватара"
 building_avatar_chamber_1_desc: "С этого органа начинается развитие дикого сознания: оно принимает свои первые формы и начинает подготавливать инстинкты к взаимодействию с незнакомыми формами жизни и рельефа."
 building_avatar_chamber_2: "Полость аватара"
 building_avatar_chamber_2_desc: "Здесь выращиваются и испытываются симулированные тела, подражающие чужеродным организмам и экосистемам. Воплощение собой неизвестного — это путь к распространению знаний."
 building_avatar_chamber_2_effect: "$building_avatar_chamber_1$ дополнительно производит §G200§! ед. £amenities£ благ"
 building_avatar_chamber_3: "Лес аватара"
 building_avatar_chamber_3_desc: "Этот обширный орган транслирует шаблоны аватара, созданные по подобию инопланетных форм жизни и местностей. Жить незнакомым — это способ познания."
 building_avatar_chamber_3_effect: "$building_avatar_chamber_1$ дополнительно производит §G400§! ед. £amenities£ благ"
 building_avatar_chamber_4: "Кортекс аватара"
 building_avatar_chamber_4_desc: "Устройство размером с планету, способное воплощать и симулировать целые цивилизации, инопланетные экосистемы и экстремальные условия окружающей среды. Здесь дикое сознание проводит репетиции перед выходом на галактическую сцену."
 building_avatar_chamber_4_effect: "$building_avatar_chamber_1$ дополнительно производит §G800§! ед. £amenities£ благ"
 building_mote_aggravator: "Химический перевариватель"
 building_mote_aggravator_desc: "Затейливая система сосудистых тканей и химических метаболизаторов производит летучую пыль из обычной почвы."
 building_churning_stomach: "Фильтры экзотических газов"
 building_churning_stomach_desc: "Специальные микробы и наноорганизмы вступают в реакцию с взвешенными частицами и производят очищенные экзотические газы."
 building_crystal_growth: "Кристаллический слой"
 building_crystal_growth_desc: "Особые пологи обеспечивают необходимый уровень влажности и температуры для выращивания чувствительных к окружению искусственных редких кристаллов."
 building_planetary_carapace: "Костный гарнизон"
 building_planetary_carapace_desc: "На этом превращенном в кокон полигоне можно разместить немало симбионтов, готовых яростно отстаивать свою территорию, — на случай, если они пригодятся."
 mod_planet_building_planetary_carapace_build_speed_mult: "Скорость строительства костного гарнизона"
 building_planetary_carapace_2: "Костная крепость"
 building_planetary_carapace_2_desc: "В этом обширном комплексе защитники одновременно и живут, и тренируются, готовясь отразить любое нашествие."
 building_ozone_thickener: "Планетарный щитовой полог"
 building_ozone_thickener_desc: "$tech_planetary_shield_generator_desc$"
 building_subterranean_cache: "Подземное тайное хранилище"
 building_subterranean_cache_desc: "$building_resource_silo_desc$"
 building_cradle_of_rebirth: "Колыбель перерождения"
 building_cradle_of_rebirth_desc: "Эта углубленная структура превращает разложившуюся материю и захваченную добычу в биомассу, насыщая тем самым мировое тело с каждым безмолвным ударом пульса."
 building_wilderness_storm_relief: "$building_storm_resistant_production$"
 building_wilderness_storm_relief_desc: "Широкий полог из прочных листьев с биоэлектрическими зарядами защищает покрываемых симбионтов и позволяет быстро реагировать на космические бури, не ставя под угрозу жизнь или производство на планете."
 building_wilderness_storm_relief_tt: "Отрицательное влияние §Yкосмической бури§! на планетарное производство уменьшается на §G25%§!"
 holding_wilderness_glade: "Поляна дикого сознания"
 holding_wilderness_glade_plural: "Поляны дикого сознания"
 holding_wilderness_glade_desc: "Производственный регион симбиотического дикого сознания, слабо связанный с родительским сознанием. Обитающие в этом «карманном» биоме симбионты сильно зависят от местных источников пищи, но отлично умеют добывать находящиеся поблизости ресурсы."
 holding_wilderness_glade_effect_desc: "Подданный превращает [owner.WildernessGladeProvides_RULOC_ACC] в $r_basic_plural$ для своего сюзерена.\nСюзерен уменьшает затраты на $mod_planet_jobs_productive_upkeep_mult$, в мире подданного.\nНа планете появляется £blocker£ §Y$holding_wilderness_glade$§! и занимает ячейку районов."
 no_free_district_for_wilderness_glade: "$TRIGGER_FAIL$§RВ этом мире нет незанятых районов для нашего «карманного» биома.§!"
 blocker_tied_to_wilderness_glade: "$TRIGGER_FAIL$§RЭто препятствие будет существовать, пока существует владение §Y«$holding_wilderness_glade$»§!.§!"
 d_wilderness_glade_blocker: "$d_wilderness_root_blocker$"
 d_wilderness_glade_blocker_desc: "$holding_wilderness_glade$ поблизости нуждается в мощной корневой системе. Именно поэтому данный «карманный» биом может существовать в чуждых для него условиях."
 holding_wilderness_glade_modifier: "Распределенные поляны дикого сознания"
 holding_wilderness_glade_modifier_desc: "Миры подданных существуют в гармонии с нашим, и каждый вкушает плоды такого симбиоза." # appears in 'lore brown'
 holding_wilderness_glade_modifier_tt: "Количество зависит от численности миров подданных, где есть §Y$holding_wilderness_glade_plural$§!."
 ####################################
 # Districts
 ####################################
 district_craglands: "Коллективный биом"
 district_craglands_plural: "Коллективные биомы"
 district_craglands_desc: "В этих густых рощах укрываются симбионты, одновременно и составляющие дикое сознание, и зависящие от него."
 mod_district_craglands_max_add: "$district_craglands_plural$: максимум"
 mod_planet_district_craglands_build_speed_mult: "Скорость строительства коллективного биома"
 district_orchard_forests: "Лес-сад"
 district_orchard_forests_plural: "Леса-сады"
 district_orchard_forests_desc: "Регионы, отведенные под земледелие и охоту. Здесь выращивается что угодно — от клеточной пищи до съедобного зерна и кормовых симбионтов."
 mod_district_orchard_forests_max_add: "$district_orchard_forests_plural$: максимум"
 mod_planet_district_orchard_forests_build_speed_mult: "Скорость строительства сельскохозяйственного биома"
 district_orchard_forests_uncapped: "$district_orchard_forests$"
 district_orchard_forests_uncapped_plural: "$district_orchard_forests_plural$"
 district_orchard_forests_uncapped_desc: "$district_orchard_forests_desc$"
 mod_district_orchard_forests_uncapped_max: "$mod_district_orchard_forests_max_add$"
 mod_planet_district_orchard_forests_uncapped_build_speed_mult: "$mod_planet_district_orchard_forests_build_speed_mult$"
 #district_metallic_dew_plains: "Metallic Seam Biome"
 #district_metallic_dew_plains_plural: "Metallic Seam Biomes"
 #district_metallic_dew_plains_desc: "Complex geological forms and bespoke refinery buildings are sited throughout these mineral-rich regions."
 #district_metallic_dew_plains_tooltip_desc: "$i_alloys$ from each §H$building_natural_furnace_0$§!: §G+1§!"
 #mod_district_metallic_dew_plains_max: "Max $district_metallic_dew_plains_plural$"
 #mod_planet_district_metallic_dew_plains_build_speed_mult: "$district_metallic_dew_plains$ Build Speed"
 district_photosynthesis_fields: "Поле фотосинтеза"
 district_photosynthesis_fields_plural: "Поля фотосинтеза"
 district_photosynthesis_fields_desc: "Цепкие фотосинтезирующие листы — основополагающий элемент этих огромных областей, где собирается энергия."
 mod_district_photosynthesis_fields_max_add: "$district_photosynthesis_fields_plural$: максимум"
 mod_planet_district_photosynthesis_fields_build_speed_mult: "Скорость строительства гелиогенераторного биома"
 district_photosynthesis_fields_uncapped: "$district_photosynthesis_fields$"
 district_photosynthesis_fields_uncapped_plural: "$district_photosynthesis_fields_plural$"
 district_photosynthesis_fields_uncapped_desc: "$district_photosynthesis_fields_desc$"
 mod_district_photosynthesis_fields_uncapped_max: "$district_photosynthesis_fields_plural$: максимум"
 mod_planet_district_photosynthesis_fields_uncapped_build_speed_mult: "$mod_planet_district_photosynthesis_fields_build_speed_mult$"
 district_hollow_mountains: "Полая гора"
 district_hollow_mountains_plural: "Полые горы"
 district_hollow_mountains_desc: "Эти каменистые просторы усеяны многочисленными шахтами, выкопанными симбионтами в поисках драгоценных минералов."
 mod_district_hollow_mountains_max_add: "$district_hollow_mountains_plural$: максимум"
 mod_planet_district_hollow_mountains_build_speed_mult: "Скорость строительства добывающего биома"
 district_hollow_mountains_uncapped: "$district_hollow_mountains$"
 district_hollow_mountains_uncapped_plural: "$district_hollow_mountains_plural$"
 district_hollow_mountains_uncapped_desc: "$district_hollow_mountains_desc$"
 mod_district_hollow_mountains_uncapped_max: "$mod_district_hollow_mountains_max_add$"
 mod_planet_district_hollow_mountains_uncapped_build_speed_mult: "$mod_planet_district_hollow_mountains_build_speed_mult$"
 ####################################
 # Zones
 ####################################
 zone_urban_wilderness: "Сердцевинная роща"
 zone_urban_wilderness_desc: "Пульсирующая сердцевина, состоящая из биомассы и ведомая инстинктами. Ее облик постоянно меняется: здесь дикое сознание широко и глубоко раскидывает свои корни, будучи готовым поддержать любые зарождающиеся функции."
 zone_foundry_wilderness: "Плавильное нутро"
 zone_foundry_wilderness_desc: "В этой жаркой полости буйствуют силы природы — здесь плавится даже камень. $job_forgesymbiont_plural$ создают металл, повинуясь ритму пищеварительной системы; их задача — постоянно кормить растущий скелет мира."
 zone_research_wilderness: "Мыслительный стебель"
 zone_research_wilderness_desc: "Узел, состоящий из нервных корней и мутагенных цветов. $job_evosymbiont_plural$, выходящие отсюда, обретают новые конечности, новые чувства — и новые знания."
 zone_unity_wilderness: "Поющие утесы"
 zone_unity_wilderness_desc: "Величественные образования, содержащие в себе полые кости и каменную плоть. Отсюда ветер разносит по поверхности мира многозвучные мелодии. $job_choirsymbiont_plural$ собираются здесь ради того, чтобы сам мир смог запеть."
 zone_fortress_wilderness: "Командное утолщение"
 zone_fortress_wilderness_desc: "Набухший рецепторный узел. $job_tamersymbiont_plural$ собираются здесь и совместно испускают ароматические импульсы, объединяющие и направляющие орды предразумных. Дикое сознание не приказывает — оно выделяет секреты."
 zone_minerals_wilderness: "Рудный хребет"
 zone_minerals_wilderness_desc: "Высокое хребтообразное сооружение, состоящее из живого камня. Частично это горный кряж, частично — орган. Внутри его пещеристых костей накапливаются минералы, в которых отдается медленное дыхание дикого сознания."
 zone_energy_wilderness: "Солнечные миколёгкие"
 zone_energy_wilderness_desc: "Просторные поля из фотосинтезирующей ткани набухают под улавливаемым солнечным светом. Давление в них накапливается, а затем выходит в ритмичных выдохах. $job_photosymbiont_plural$ взмывают в небеса на тепловых потоках и гонятся за звездами."
 zone_food_wilderness: "Цветочный станок"
 zone_food_wilderness_desc: "Благоухающий ум: основные его компоненты — это лепестки и феромоны. Маршруты для опыления он создает так же быстро, как ткацкий станок — нити для гобелена. Воспроизводство на планете благодаря ему налажено, словно на фабрике."
 zone_research_unity_wilderness: "Гармоническая сердцевина"
 zone_research_unity_wilderness_desc: "Ритмический орган, расположенный в самом сердце дикого сознания. Знание вибрацией разносится по памяти. В сердцевине мысль не начинается — она резонирует."
 zone_trade_wilderness: "Нитеплетение"
 zone_trade_wilderness_desc: "Волокнистые узлы, завивающиеся конечности и накопительные мешки образуют работающий без устали маршрутный центр. $job_spindlesymbiont_plural$ здесь сплетают и направляют всё самое необходимое. Дикое сознание доставляет всё, что ему нужно, самому себе."
