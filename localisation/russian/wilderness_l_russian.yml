 decision_wilderness_expand: "Увеличить размер планеты"
 decision_wilderness_expand_desc: "Вновь впитать в себя всю добытую очищенную биомассу, чтобы наш мир разросся."
 decision_wilderness_mastery_over_nature_desc: "Чтобы расти, нашему коллективному сознанию необходимо новое жизненное пространство, и мы его обеспечим. Мы приспособимся ко всем окружающим условиям, какие только существуют на планете."
