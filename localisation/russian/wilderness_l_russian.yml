 ####################################
 # City Appearance
 ####################################
 WILDERNESS: "Дикое сознание"
 ####################################
 # Deposits
 ####################################
 d_wilderness_mining: "Полая сеть пещер"
 d_wilderness_mining_desc: "Прежние обитатели этого мира в спешке бросили свои шахты. Некоторые туннели совершенно пусты и грозят обрушиться."
 d_wilderness_mining_2: "Выщербленное плато"
 d_wilderness_mining_2_desc: "Этот регион крайне опасен: здесь много извлеченного на поверхность грунта и коварных провалов, образовавшихся в результате активной добычи руды в прошлом."
 d_wilderness_farming: "Высохший лес"
 d_wilderness_farming_desc: "Некогда обширный и густой лес безжизненно поник. На сухих ветвях никогда больше не появятся листья."
 d_wilderness_farming_2: "Окаменелый лес"
 d_wilderness_farming_2_desc: "Все, что осталось от обширного региона, когда-то покрытого разнообразными лесами. Флора и грибы вымерли настолько быстро, что словно превратились в кристаллы, и не проявляют никакой биохимической активности."
 d_wilderness_generator: "Выжженный солнечный энергоцентр"
 d_wilderness_generator_desc: "Усохший полог и хрупкие стебельки — все, что осталось от этой погибшей солнечной электростанции."
 d_wilderness_generator_2: "Солнечная пустошь"
 d_wilderness_generator_2_desc: "Когда-то здесь рос огромный солнечный лес; теперь от него остались только заросшие колючками коряги. В атмосферной пыли медленно кружат высохшие листья, пропитанные радиацией."
 d_wilderness_city: "Зловонное болото"
 d_wilderness_city_desc: "Заброшенный ареал обитания миллиардов форм жизни, превратившийся в гнойную, дурно пахнущую трясину."
 d_wilderness_city_2: "Гноящаяся топь"
 d_wilderness_city_2_desc: "Здесь погибли миллионы живых существ. Их разложившиеся останки поглотила земля, выплеснув наружу поток резких и едких биохимикатов."
 d_wilderness_industrial: "Металлическая трясина"
 d_wilderness_industrial_desc: "Все, что осталось от открытых минеральных источников. Их содержимое из-за обрушения почвы стало ядовитым и застойным."
 d_wilderness_industrial_2: "Биохимические пустоши"
 d_wilderness_industrial_2_desc: "Когда-то здесь находились полуорганические минералоочистные сооружения. От них остались только каменные впадины и овраги, засыпанные химической пылью."
 d_scorched_plains: "Выжженные равнины"
 d_scorched_plains_desc: "До смертоносной звездной сверхвспышки здесь кишела жизнь."
 concept_scorched_plains: "$d_scorched_plains$"
 concept_scorched_plains_desc: "- $MOD_PLANET_MAX_DISTRICTS_ADD$: §R-2§!\n- Время расчистки: £time£ 180 §Iдней§!\n- Стоимость расчистки:\n$t$- 900 £energy£ §Iэнергии§!\n\n§L$d_scorched_plains_desc$§!"
 ####################################
 # Colony Types
 ####################################
 col_wilderness_default: "Колония дикого сознания"
 ####################################
 # Planet Designations
 ####################################
 col_wilderness_capital: "Мир-сердце"
 col_wilderness_capital_tt: "$col_wilderness_capital_desc$"
 col_wilderness_capital_desc: "Каждый уголок этого мира пропитан симбиотической жизнью. Симбионты здесь настолько многочисленны, что составляют целое живое небесное тело."
 col_wilderness_generator: "Фотосинтетический мир"
 col_wilderness_generator_desc: "$col_generator_desc$"
 col_wilderness_generator_tt: "Огромные скопления хлоропластичных симбионтов собирают и хранят энергию."
 col_wilderness_mining: "Каменный мир"
 col_wilderness_mining_desc: "$col_mining_desc$"
 col_wilderness_mining_tt: "Под, казалось бы, безжизненной поверхностью этой планеты бурлит жизнь, сосредоточенная на добыче минералов."
 col_wilderness_farming: "Опыляющий мир"
 col_wilderness_farming_desc: "$col_farming_desc$"
 col_wilderness_farming_tt: "Особые симбионты поддерживают в этом мире идеальные условия для сельского хозяйства. Питательные флора и фауна водятся здесь в изобилии."
 col_wilderness_fortress: "Охотничий мир"
 col_wilderness_fortress_desc: "$col_fortress_desc$"
 col_wilderness_fortress_tt: "Поверхность этого мира дрожит от топота стад, защищающих свои территории от посягательств, и криков страшных хищников."
 col_wilderness_tech: "Мыслительный мир"
 col_wilderness_tech_desc: "$col_research_desc$"
 col_wilderness_tech_tt: "В этом мире не счесть любопытных и необъяснимых явлений, только и ждущих, когда к ним подступятся пытливые умы."
 col_wilderness_nest: "Ткацкий мир"
 col_wilderness_nest_desc: "$col_city_desc$"
 col_wilderness_nest_tt: "Здесь проживает столько симбионтов, что сама атмосфера может менять состав, подстраиваясь под потребности и настроение дикого сознания."
 col_wilderness_refinery: "Перерабатывающий мир"
 col_wilderness_refinery_desc: "Специализируется на производстве £exotic_gases£ §Hэкзотических газов§! и других £strategic_resource£ §Hстратегических ресурсов§!."
 col_wilderness_refinery_tt: "Эта планета усеяна геотермальными источниками, где наноорганизмы и другие экзотические симбионты могут собирать и перерабатывать сырье."
 col_wilderness_forge: "Мир-горн"
 col_wilderness_forge_desc: "$col_foundry_desc$"
 col_wilderness_forge_tt: "Планетарных масштабов горн для переработки сырья в полезные и универсальные сплавы."
 col_wilderness_unification: "Безмятежный мир"
 col_wilderness_unification_desc: "$col_bureau_desc$"
 col_wilderness_unification_tt: "В этом мире царит размеренная атмосфера мутуализма, углубляющего сложные отношения между симбионтами."
 ####################################
 # Personalities
 ####################################
 personality_benevolent_wilderness: "Гармоничное дикое сознание"
 personality_benevolent_wilderness_desc: "Эта огромная разумная биосфера желает лишь одного: переплестись со звездами. Корни ее медленно, но уверенно тянутся к галактике — не из чувства голода, но из стремления к гармонии."
 personality_rampant_wilderness: "Необузданное дикое сознание"
 personality_rampant_wilderness_desc: "Это дикое сознание не знает гнева. Оно распространяется, пожирает, превозмогает. Попадания в бесконечный цикл роста и увядания не избежит никто — ни живые, ни мертвые."
 ####################################
 # Policies
 ####################################
 policy_symbiont_policy: "$policy_drone_policy$"
 policy_symbiont_policy_desc: "Наш мутуалистический разум — организм в высшей степени умелый и продуктивный, однако даже его способностям есть предел. Необходимо решить, как и где лучше использовать доступные ресурсы."
 symbiont_policy_balanced: "$drone_policy_balanced$"
 symbiont_policy_balanced_name: "$symbiont_policy_balanced$"
 symbiont_policy_balanced_desc: "Дикое сознание в равной мере концентрируется на производстве сырья и готовой продукции.\n\n§EБонусы или штрафы на производство ресурсов отсутствуют.§!"
 symbiont_policy_worker: "$drone_policy_worker$"
 symbiont_policy_worker_name: "$symbiont_policy_worker$"
 symbiont_policy_worker_desc: "Дикое сознание отдает приоритет добыче сырья. Симбионты соответствующей разновидности становятся продуктивнее в ущерб промышленному производству.\n\n"
 symbiont_policy_thinker: "$drone_policy_thinker$"
 symbiont_policy_thinker_name: "$symbiont_policy_thinker$"
 symbiont_policy_thinker_desc: "Дикое сознание отдает приоритет производству готовой продукции. Оно становится продуктивнее в ущерб добыче сырья.\n\n"
 ####################################
 # Edicts
 ####################################
 edict_capacity_subsidies_wilderness: "$edict_capacity_subsidies$"
 edict_capacity_subsidies_wilderness_desc: "Этот указ поощряет фотосинтезирующих симбионтов сбиваться в мигрирующие стаи, передвигающиеся вслед за солнцем и увеличивающие таким образом производство энергии."
 edict_mining_subsidies_wilderness: "$edict_mining_subsidies$"
 edict_mining_subsidies_wilderness_desc: "Этот указ укрепляет наши корни: симбионты-копальщики могут выполнять свою работу, меньше опасаясь обрушения почвы."
 edict_farming_subsidies_wilderness: "$edict_farming_subsidies$"
 edict_farming_subsidies_wilderness_desc: "Этот указ обеспечивает интенсивное удобрение почвы высокоэнергетическими химикатами ради увеличения производства пищи."
 edict_forge_subsidies_wilderness: "$edict_forge_subsidies$"
 edict_forge_subsidies_wilderness_desc: "Насыщение литотрофных водорослевых бассейнов питательными веществами обеспечит сезонное цветение, а значит, побочные продукты производства сплавов будут собираться активнее."
 edict_research_subsidies_wilderness: "$edict_research_subsidies$"
 edict_research_subsidies_wilderness_desc: "$edict_research_subsidies_desc$"
 edict_clearing_motes_wilderness: "$edict_clearing_motes$"
 edict_clearing_motes_wilderness_desc: "Обогащение рациона симбионтов летучей пылью позволит им переваривать как органические, так и неорганические вещества. Наш голобионт будет приспосабливаться к окружающей среде путем ее поглощения."
 edict_learning_campaign_wilderness: "$edict_learning_campaign$"
 edict_learning_campaign_wilderness_desc: "Выделение дополнительных питательных веществ для наших симбионтов позволяет повысить их производительность."
 edict_war_drone_campaign_wilderness: "Поддержка боевых симбионтов"
 edict_war_drone_campaign_wilderness_desc: "Выделение дополнительных питательных веществ для наших стайных симбионтов и симбионтов-хищников позволяет нарастить их силу и боеготовность."
 edict_scientific_revolution_wilderness: "$edict_scientific_revolution$"
 edict_scientific_revolution_wilderness_desc: "$edict_scientific_revolution_desc$"
 edict_drone_overdrive_wilderness: "Разгон симбионтов"
 edict_drone_overdrive_wilderness_desc: "Нам требуется больше ресурсов, а поэтому наши биомы будут активнее состязаться друг с другом."
