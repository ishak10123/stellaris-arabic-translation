l_russian:
 # Ascension Perk
 ap_galactic_hyperthermia: "Галактическая гипертермия"
 ap_galactic_hyperthermia_desc: "Вселенная родилась в огне, но быстро остыла, превратившись в темное и недружелюбное место. Ради процветания мы должны раскалить ее снова, даже если все остальные из-за этого погибнут."
 must_be_infernals: "$TRIGGER_FAIL$ Наше население должно состоять из термофилов."
 # UI
 entropy_crystals: "Кристаллизованная энтропия"
 entropy_crystals_name: "$entropy_crystals$:"
 entropy_crystals_value: "£entropy_crystals£ $VAL|0$"
 entropy_crystals_gaining: "Выполняйте §Hзадания кризиса§!, чтобы накапливать £entropy_crystals£ §Yкристаллизованную энтропию§!."
 entropy_crystals_desc: "Этот зазубренный мерцающий сгусток чистой энергии каким-то образом сохраняет стабильность — достаточную, чтобы его можно было использовать как топливо или встраивать в оборудование."
 mod_country_base_entropy_crystals_produces_add: "£entropy_crystals£ $entropy_crystals$ ежемесячно"
 entropy_crystals_crisis_objective: "$menace_crisis_objective$"
 entropy_crystals_crisis_objective_gained: "Получено £entropy_crystals£"
 entropy_crystals_crisis_objective_reward: "$REWARD$"
 entropy_crystals_crisis_objective_progress: "Мы получили £entropy_crystals£ $AMOUNT$ от этого задания кризиса."
 entropy_crystals_crisis_level_locked: "Требуется для открытия этого уровня:\n" # remove?
 entropy_crystals_crisis_level_unlocked: "$LEVEL$ даст награды:\n"
 entropy_crystals_crisis_level_desc: "Для получения уровней кризиса накапливайте кристаллизованную энтропию и стройте §Yгалактическое горнило§!."
 entropy_crystals_crisis_level_unlock: "Есть £entropy_crystals£ §Y$CURRENCY$§! кристаллизованной энтропии"
 entropy_crystals_current_value: "Текущий показатель: §Y$VALUE|0$§!"
 entropy_crystals_crisis_description_title: "$ap_galactic_hyperthermia$"
 entropy_crystals_crisis_description: "$menace_crisis_description_intro$\n\nНовый способ управлять энергией позволит нам значительно нарастить нашу мощь. Чтобы разжечь эту эпоху, нам придется обуздать огонь самих звезд."
 entropy_crystals_crisis_howto_title: "Источник силы"
 entropy_crystals_crisis_howto: "За выполнение §Hзаданий кризиса§! дается £entropy_crystals£ §Hкристаллизованная энтропия§!, которую можно тратить на улучшение галактического горнила и открытие новых уровней кризиса."
 # Level
 crisis_hyperthermia_already_ongoing: "Контроль над галактическим ядром уже захватывает другое государство."
 crisis_hyperthermia_already_happened: "Галактическое ядро уже подконтрольно другому государству, изменившему облик галактики."
 crisis_hyperthermia_level_1: "§RТревога§!"
 crisis_hyperthermia_level_1_desc: "$crisis_level_1_desc$"
 crisis_hyperthermia_lv1_tt: "£trigger_yes£ Завершен особый проект §Y$INF_CRISIS_ENTROPY$§!"
 crisis_hyperthermia_lv1_req_tt: "£trigger_no£ Завершен особый проект §Y$INF_CRISIS_ENTROPY$§!"
 crisis_hyperthermia_level_2: "§RРиск§!"
 crisis_hyperthermia_level_2_desc: "$crisis_level_2_desc$"
 crisis_hyperthermia_lv2_tt: "£trigger_yes£ Мегасооружение §Y$galactic_crucible_0$§! построено и улучшено до §Yоснования галактического горнила§!"
 crisis_hyperthermia_lv2_req_tt: "£trigger_no£ Мегасооружение §Y$galactic_crucible_0$§! построено и улучшено до §Yоснования галактического горнила§!"
 crisis_hyperthermia_level_3: "§RОпасность§!"
 crisis_hyperthermia_level_3_desc: "$crisis_level_3_desc$"
 crisis_hyperthermia_lv3_tt: "£trigger_yes£ Улучшено мегасооружение §Y$galactic_crucible_1$§!"
 crisis_hyperthermia_lv3_req_tt: "£trigger_no£ Улучшено мегасооружение §Y$galactic_crucible_1$§!"
 crisis_hyperthermia_level_4: "§RБедствие§!"
 crisis_hyperthermia_level_4_desc: "$crisis_level_4_desc$"
 crisis_hyperthermia_lv4_tt: "£trigger_yes£ Улучшено мегасооружение §Y$galactic_crucible_2$§!"
 crisis_hyperthermia_lv4_req_tt: "£trigger_no£ Улучшено мегасооружение §Y$galactic_crucible_2$§!"
 crisis_hyperthermia_dec_lv4_tt: "£trigger_yes£ Завершен особый проект §Y$INF_CRISIS_ENTROPY_EVIL$§!"
 crisis_hyperthermia_lv4_dec_req_tt: "£trigger_no£ Завершен особый проект §Y$INF_CRISIS_ENTROPY_EVIL$§!"
 crisis_hyperthermia_level_5: "§RУгроза всему сущему§!"
 crisis_hyperthermia_level_5_desc: "$crisis_level_5_desc$"
 crisis_hyperthermia_lv5_tt: "£trigger_yes£ Улучшено мегасооружение §Y$galactic_crucible_3$§!"
 crisis_hyperthermia_lv5_req_tt: "£trigger_no£ Улучшено мегасооружение §Y$galactic_crucible_3$§!"
 # MPerks Level 1
 menp_hyperthermia_crystals: "$entropy_crystals$"
 menp_hyperthermia_crystals_desc: "§Y$entropy_crystals$§! знаменует прорыв в контролируемой дестабилизации энергии. С этим нестабильным ресурсом в нашем распоряжении мы можем перекроить всю галактику."
 unlocks_entropy_objectives: "Позволяет накапливать £entropy_crystals£ §Yкристаллизованную энтропию§!, завершая §Hзадания кризиса§!."
 menp_hyperthermia_harnessing: "Укрощение энтропии"
 menp_hyperthermia_harnessing_desc: "Интеграция синтеза §Yкристаллизованной энтропии§! в нашу промышленность позволяет эффективнее использовать этот нестабильный ресурс, согласуя наши технические задачи со стратегическими целями."
 unlocks_entropy_edict: "§HОткрывается указ:§! $edict_entropy_harnessing$"
 menp_hyperthermia_crucible: "Галактическое горнило"
 menp_hyperthermia_crucible_desc: "Такое горнило будет служить центральной машиной для укрощения космической энтропии. Возможность кристаллизовать и транспортировать ее позволит горнилу стать сияющим маяком нашего огненного могущества, озаряющим галактику."
 unlocks_galactic_crucible: "§HОткрывается мегасооружение:§! $galactic_crucible_0$"
 # MPerks Level 2
 menp_hyperthermia_conc_entropy: "Сконцентрированная энтропия"
 menp_hyperthermia_conc_entropy_desc: "$entropy_conduit_plural$ жизненно важны для наращивания наших сил на данном этапе. Чем мощнее будет горнило, тем быстрее мы будем двигаться к более яркому, пылающему будущему."
 unlocks_conduit_spawn: "§H$UNLOCKS_SHIP_TYPE$:§! $entropy_conduit$ \n- §Y$entropy_conduit_plural$§! автоматически создаются в §Yгалактическом горниле§! и направляются к ближайшим звездам. \n- Колонии в затронутых системах будут получать бонусы. \n- Оборудованы £ship_xl_slot£ §Yлинзированным парализатором§! — орудием, которое при попадании парализует врагов на несколько дней. \n\n"
 menp_hyperthermia_radiant: "Лучистые амбиции"
 menp_hyperthermia_radiant_desc: "У искры, что воспламенит галактику, нет времени на сомнения и бюрократию. Мы не можем терять время, перестраивая бесчисленные системы. Чтобы достичь целей, мы должны значительно увеличить строительные мощности."
 menp_hyperthermia_ignition: "Принудительное воспламенение"
 menp_hyperthermia_ignition_desc: "Иногда мало просто прилагать усилия. Нужно вывести наши технологии на новый уровень и раскрыть их полный потенциал. Пришло время свести к минимуму меры безопасности и максимизировать отдачу."
 unlocks_crucible_overclocking: "Позволяет «разогнать» §Hмегасооружение§! §Y$galactic_crucible_1$§!."
 # MPerks Level 3
 menp_hyperthermia_cruiser: "$ember_cruiser$"
 menp_hyperthermia_cruiser_desc: "Эти корабли, оснащенные передовыми технологиями, преобразуют нестабильный тепловой поток в направленное уничтожение, обращая наших врагов в пепел."
 unlocks_ember_cruiser: "§H$UNLOCKS_SHIP_TYPE$:§! $ember_cruiser$"
 menp_hyperthermia_flames: "Всепоглощающее пламя"
 menp_hyperthermia_flames_desc: "В утопии, которую мы создаем, нет места тем, кто противится нашим целям. Любой, кто попытается остановить нас, быстро узнает, что ответом на сопротивление будет огненный ливень в их родных мирах."
 unlocks_firestorm_stance: "§HОткрывает вариант терраформирования:§! $pc_volcanic$ \n§HОткрывает тактику бомбардировки:§! $bombardment_firestorm$\n\n"
 menp_hyperthermia_coronal: "Корональный сброс"
 menp_hyperthermia_coronal_desc: "Наши проводники рассеивают колоссальное тепло, чтобы сохранять стабильность. Направляя это тепло в окружающее пространство, мы можем превратить проводники в сокрушительное оружие против наших врагов."
 unlocks_conduit_damage: "§Y$entropy_conduit_plural$§! пассивно наносят урон вражеским кораблям и станциям. \n\n"
 # MPerks Level 4
 menp_hyperthermia_reactors: "Реакторы на синтезе гелия"
 menp_hyperthermia_reactors_desc: "Задействовав §Yкристаллизованную энтропию§! в военных технологиях, мы сможем создать двигатели беспрецедентной мощности. Наши корабли будут нестись сквозь космические просторы быстрее, чем когда-либо прежде."
 menp_hyperthermia_solarflare: "Искусственная вспышка"
 menp_hyperthermia_solarflare_desc: "Было время, когда отдельные части галактики находились вне нашей досягаемости. Этой иллюзии пришел конец. Вскоре скопления наших проводников насытят звезды, обрушивая тщательно спланированное разрушение на всех, кто нам противостоит."
 unlocks_conduit_borders: "§Y$entropy_conduit_plural$§! автоматически пересекают границы вражеской территории. \n\n"
 menp_hyperthermia_armada: "Пылающая армада"
 menp_hyperthermia_armada_desc: "Галактика объединяется против нас, поэтому необходима полная мобилизация. Каждый гражданин должен вносить вклад в поддержание энергетического фронта, раздувая пламя нашего восхождения."
 unlocks_blazing_navalcap: "§Y[GetAlloyProducerPlural]§! и §Y[GetResearcherPlural_RULOC_Nom_lower]§! увеличивают £navy_size£ §Yвместимость флота§!.\n\n"
 # MPerks Level 5
 menp_hyperthermia_battleship: "$ember_battleship$"
 menp_hyperthermia_battleship_desc: "Орудия этих крупных кораблей раскалены, словно огненная буря, что вот-вот охватит галактику. Они составят костяк наших оборонительных сил вокруг горнила."
 unlocks_ember_battleship: "§H$UNLOCKS_SHIP_TYPE$:§! $ember_battleship$ \n- Можно устанавливать орудие £ship_xl_slot£ §Y$LENS_FLARE_BEAM$§!."
 menp_hyperthermia_critical_mass: "Критическая масса"
 menp_hyperthermia_critical_mass_desc: "Увеличение энтропийной активности во внешних слоях звезды заставляет ее извергать потоки радиации. Это позволяет нагревать системы быстрее."
 unlocks_conduit_boost: "§Y$entropy_conduit_plural$§! усиливаются в зависимости от числа захваченных систем.\n\n$hyperthermia_map_perc$\n\n"
 hyperthermia_map_perc: "§G20%§! галактики: $TABBED_NEW_LINE$- $entropy_conduit_plural$ повышают опустошение ближайших колоний $TABBED_NEW_LINE$- В затронутых колониях будет постепенно гибнуть £pop£ население $TABBED_NEW_LINE$- §YТермофилы§! невосприимчивы к этому эффекту $TABBED_NEW_LINE$- Требуется систем: §Y[root.hyperthermia_own_systems_var]§!/§Y[root.hyperthermia_systems_var]§!"
 menp_hyperthermia_ammunition: "Насыщенные боеприпасы"
 menp_hyperthermia_ammunition_desc: "Улучшение конструкции боеприпасов: стандартные снаряды теперь усилены микрокристаллами энтропии, высвобождающими нестабильные тепловые вспышки при ударе. В результате значительно возрастает их разрушительная сила."
 # Misc
 entropy_crystals_deficit: "Нехватка кристаллизованной энтропии"
 edict_entropy_harnessing: "Укрощение энтропии"
 edict_entropy_harnessing_desc: "Интеграция производства кристаллизованной энтропии в нашу инфраструктуру позволяет нам в полной мере раскрыть наш технический потенциал и использовать этот нестабильный ресурс по максимуму."
 mod_planet_technician_entropy_crystals_produces_add: "£entropy_crystals£ §Y$entropy_crystals$§! от должностей £job_technician£ [GetTechnicianPlural]"
 mod_shipsize_ember_cruiser_weapon_damage: "$MOD_SHIP_WEAPON_DAMAGE$ ($ember_cruiser$)"
 mod_shipsize_ember_battleship_weapon_damage: "$MOD_SHIP_WEAPON_DAMAGE$ ($ember_battleship$)"
 mod_conduit_spawnrate_add: "£time£ Время строительства проводников"
 mod_conduit_spawnrate_switch: "Строительство проводников: §Rостановлено§!"
 mod_conduit_spawnrate_switch_short: "§RОстанавливает строительство проводников§!"
 mod_shipsize_ember_cruiser_speed_mult: "$MOD_SHIP_SPEED_MULT$ ($ember_cruiser$)"
 mod_shipsize_ember_battleship_speed_mult: "$MOD_SHIP_SPEED_MULT$ ($ember_battleship$)"
 ENTROPY_WORMHOLE: "$NATURAL_WORMHOLE_GALACTIC$"
 BYPASS_ENTROPY_WORMHOLE: "$ENTROPY_WORMHOLE_GALACTIC$"
 BYPASS_DESC_UNKNOWN_ENTROPY_WORMHOLE: "Мы никогда раньше не видели такого образования"
 ENTROPY_WORMHOLE_GALACTIC: "Странная червоточина"
 ENTROPY_WORMHOLE_DESC: "Эта система содержит §Yчервоточину§!, которая ведет в систему $DEST|Y$"
 ENTROPY_WORMHOLE_DESC_UNEXPLORED: "Эта система содержит §Rнеизученную§! §Yчервоточину§!"
 ENTRY_BYPASS_ENTROPY_WORMHOLE: "$BYPASS_TYPE$"
 EXIT_BYPASS_ENTROPY_WORMHOLE: "$BYPASS_TYPE$: выход"
 personality_hyperthermia_empire: "Термархия"
 personality_hyperthermia_empire_desc: "Во главе термархического государства стоит идеология, которая возвеличивает энергию, энтропию и звездный огонь. Они не завоевывают — они выжигают, формируя галактику жаром и решимостью."
 triggered_opinion_hyperthermia_empire: "Термархическое государство"
 mod_job_metallurgist_naval_cap_add: "£mod_country_naval_cap_add£ $MOD_COUNTRY_NAVAL_CAP_ADD$ от должностей £job_foundry£ [GetAlloyProducerPlural]"
 crisis_thermophile_adaptation: "Термофильная адаптация"
 crisis_thermophile_adaptation_desc: ""
 crisis_conduit_stop: "$mod_conduit_spawnrate_switch$" # modifier is hidden
 crisis_conduit_stop_desc: ""
 sm_gravitational_centrifuge: "Гравитационная центрифуга"
 sm_gravitational_centrifuge_desc: "Это сооружение использует мощные гравитационные градиенты, чтобы разделять отходы на молекулярном уровне и создавать энтропийную плазму, которую можно кристаллизовать для дальнейшего использования."
 gravitational_centrifuge_tt: "Завершает задание кризиса §H$crisobj_entropy_starbase_name$§!"
 requires_multiple_stars_or_or_bh: "§RНужна §Yдвойная§! или §Yтройная§! система, либо §Yчерная дыра§!.§!"
 # Conduit Starforming
 crisis_conduit_buff: "Управление звездой"
 crisis_conduit_buff_desc: "Атмосфера местной звезды претерпевает быстрые изменения, из-за чего система озаряется ослепительными солнечными вспышками. Хотя для других это катастрофа, для нас это идеальные условия."
 TERRAFORM_ORDER: "Преобразовать звезду"
 TERRAFORM_ORDER_DESC: "Указанная звезда будет постепенно превращаться в §Yкрасный гигант класса M§!."
 TERRAFORM_ORDER_RESEARCH: "Используя взрывной энергетический потенциал кристаллизованной энтропии, можно расширять малые звезды до красных гигантов."
 FLEETORDER_TERRAFORM_BUTTON: "$TERRAFORM_ORDER$"
 FLEETORDER_TERRAFORM: "Преобразование: $PLANET|Y$ ($PROGRESS|Y%0$)"
 FLEETORDER_BOOST_STAR: "Разжечь звезду"
 CAN_NOT_TERRAFORM_STAR: "$TRIGGER_FAIL$Звезда должна быть главной в системе."
 CAN_NOT_CRISIS_TERRAFORM_STAR_CLASS: "$TRIGGER_FAIL$Звезда такого класса не подходит для трансформации."
 CAN_NOT_CRISIS_TERRAFORM_STAR_MEGASTRUCTURE: "$TRIGGER_FAIL$Мегасооружение на орбите мешает трансформации."
 VALID_TERRAFORM_STAR: "Звезду можно терраформировать."
 STATION_CAN_NOT_TERRAFORM_STAR: "Станция проводника должна быть на орбите."
 # Objectives
 crisobj_own_volcanics_name: "Владение вулканическими мирами"
 crisobj_own_volcanics_desc: "Растущий жар в системах усиливает вулканическую активность, что идеально подходит для продвижения нашей огненной миссии. Нам следует уделить первостепенное внимание колонизации §Yвулканических миров§!, чтобы сохранить преимущество.\n\nДает пассивный ежегодный прирост §Yкристаллизованной энтропии§!, зависящий от числа колонизированных §Yвулканических миров§!."
 crisobj_create_volcanics_name: "Создание вулканических миров"
 crisobj_create_volcanics_desc: "Распространение планетарного вулканизма по всей галактике будет подпитывать наше производство кристаллизованной энтропии. С помощью определенных методов терраформирования мы можем вызывать устойчивую вулканическую активность везде, где пожелаем.\n\nТерраформируйте планету в §Yвулканический мир§!"
 crisobj_own_red_stars_name: "Владение красными звездами"
 crisobj_own_red_stars_desc: "Нам следует уделить первостепенное внимание заселению систем вокруг красных звезд. Их обширная площадь излучения идеально подходит для сбора тепловой энергии.\n\nДает пассивный ежемесячный прирост §Yкристаллизованной энтропии§!, зависящий от числа §Yзвезд класса M§! и §Yкрасных гигантов класса M§! в наших границах."
 crisobj_create_red_stars_name: "Создание красных звезд"
 crisobj_create_red_stars_desc: "Направляя кристаллизованную энтропию, мы можем раздувать звезды до размера красных гигантов, подпитывая возвышение нашей пылающей империи.\n\nЗвезды, терраформированные §Yпроводниками§!, становятся §Yкрасными гигантами класса M§!"
 crisobj_planet_firestorm_name: "Планетарный пожар"
 crisobj_planet_firestorm_desc: "Настало время показать нашим соперникам, что такое настоящее превосходство, обрушив на их планеты огненный шторм бомбардировок, который оставит после себя лишь пепел.\n\nРазбомбите колонию, используя тактику §Y$bombardment_firestorm$§!, до §R100% опустошения§!"
 crisobj_lens_beam_impact_name: "Корабли дезинтеграции"
 crisobj_lens_beam_impact_desc: "Холодные и умеренные миры бесполезны для наших целей. Мы должны перекроить их, расплавив поверхность и сделав их более подходящими для нас.\n\nРазбомбите вражеские миры §Yпроводниками§! и §Yпепельными линкорами§! с £ship_xl_slot£ §Yлинзированными парализаторами§!."
 crisobj_entropy_starbase_name: "Владение гравитационными центрифугами"
 crisobj_entropy_starbase_desc: "Гравитационные центрифуги помогут нам собирать больше кристаллизованной энтропии. \n\nПостройте §Yгравитационную центрифугу§! на космической базе в §Yдвойной§! или §Yтройной§! системе либо у §Yчерной дыры§!."
