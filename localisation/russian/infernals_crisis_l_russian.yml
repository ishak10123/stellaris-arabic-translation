 # Grand Archive Specimen
 infernal_burning_gem: "Пылающий кристалл"
 infernal_burning_gem_desc_short: "Один из первых рабочих прототипов, созданных в ходе усилий [GetName&gen] по укрощению энтропии"
 infernal_burning_gem_desc_details: "Обманчиво тусклый для большинства визуальных систем, этот осколок с его слабым белым мерцанием скрывает невероятное количество едва сдерживаемой энергии. Хотя новые разработки, возможно, и превосходят кристалл, его конструкция и свойства всё еще могут многому научить."
 # Timeline
 TIMELINE_EVENT_GH_START: "Огненная буря\n§L[GetDate]§!"
 TIMELINE_EVENT_GH_START_TOOLTIP: "§HСтать кризисом§!\n§YСобытие кризиса§!\n\nГосударство [EVENT_TARGET_0.GetName&nom] воспламенило свои владения, начав захватывать контроль над галактикой. Те, кто не разделяет их видение, сгинут в пожаре завоеваний, оставляющем после себя лишь пепел."
 TIMELINE_EVENT_GH_END: "Всепоглощающее пламя\n§L[GetDate]§!"
 TIMELINE_EVENT_GH_END_TOOLTIP: "§HГалактика пала§!\n§YСобытие кризиса§!\n\nСначала это была лишь огненная мечта, но она стала искрой, которая воспламенила всю галактику. Все наши противники обратились в пепел, а вместе с ними сгорела и вся их история."
