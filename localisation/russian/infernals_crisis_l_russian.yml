 # Weapon
 LENS_FLARE_BEAM: "Линзированный парализатор"
 LENS_FLARE_BEAM_DESC: "Лазер этого орудия настроен так, чтобы поражать важнейшие системы управления, ненадолго лишая противников любых возможностей к сопротивлению."
 lfb_on_hit_stun_tt: "§YОтключает§! цель на §G7§! дней, в результате чего она не сможет вести ответный огонь."
 lf_weapon_stun_effect: "§RУдар линзированного парализатора§!"
 lf_weapon_stun_effect_desc: "   " # not visible
 # Megastructure
 galactic_crucible_0: "Каркас галактического горнила"
 galactic_crucible_0_DESC: "Основная конструкция галактического горнила, созданная для поддержки и координации дальнейшего строительства станции."
 galactic_crucible_0_MEGASTRUCTURE_DETAILS: "Эта грандиозная станция откачивает энергию из звезды, питая автоматизированные верфи, которые производят §Yпроводники§! — корабли, способные перекраивать судьбы звезд."
 galactic_crucible_1: "Основание галактического горнила"
 galactic_crucible_1_DESC: "Теперь, когда основная инфраструктура завершена, галактическое горнило наконец заработало. Строительство систем для кристаллизации энтропии уже началось."
 galactic_crucible_2: "Ядро галактического горнила"
 galactic_crucible_2_DESC: "Галактическое горнило полностью работоспособно и готово к расширенному применению §Yкристаллизованной энтропии§!. Она ляжет в основу всех будущих улучшений.\n\n§HЗавершите особый проект, чтобы открыть следующий этап.§!"
 galactic_crucible_3: "Центр галактического горнила"
 galactic_crucible_3_DESC: "Расширенное галактическое горнило теперь включает модульные энтропийные системы, предназначенные для беспрепятственной реконфигурации и роста. Техники могут наращивать его мощность, максимизируя эффективность."
 galactic_crucible_4: "Галактическое горнило"
 galactic_crucible_4_DESC: "Галактическое горнило во всеоружии и готово погрузить галактику в очищающее пламя. Системы энтропийного потока работают на пике теоретической эффективности."
 galactic_crucible_5: "Институт галактического горнила"
 galactic_crucible_5_DESC: "Галактическое горнило было необратимо перестроено, чтобы понизить уровень энерговыделения с опасных значений. Теперь оно станет стабильным и безопасным источником процветания для государства."
 galactic_crucible_ruined: "Разрушенное галактическое горнило"
 galactic_crucible_ruined_DESC: "Разрушенная верфь, некогда служившая огненным амбициям угасшей империи."
 galactic_crucible_ruined_MEGASTRUCTURE_DETAILS: "Эти грандиозные руины до сих пор излучают тепло — мерцающие огни вспыхивают то тут, то там среди раздробленных останков."
 SPAWN_CONDUITS: "$entropy_conduit_plural$"
 SPAWN_CONDUITS_DESC: "Галактическое горнило автоматически строит проводники. Они направляются к звездам, которые можно превратить в §Yкрасные гиганты класса M§!."
 megastructure_overclocking_desc: "Благодаря стратегическому разгону это мегасооружение может выйти за рамки стандартных возможностей и получить уникальные эффекты."
 overclock_mode: "Режим:"
 overclock_gc_default: "$overclock_mode$ §HСтандартный§!"
 overclock_gc_default_desc: "Обеспечивает стабильный умеренный приток кристаллизованной энтропии.\n"
 overclock_gc_high: "$overclock_mode$ §HРазогнанный§!"
 overclock_gc_high_desc: "Использует огромные резервы энергии для ускорения постройки проводников.\n"
 overclock_gc_eco: "$overclock_mode$ §HПроизводственный§!"
 overclock_gc_eco_desc: "Значительные инвестиции сплавов позволяют ускорить производство кристаллизованной энтропии.\n"
 overclock_gc_war: "$overclock_mode$ §HКоординационный центр§!"
 overclock_gc_war_desc: "$galactic_crucible_4$ можно использовать, чтобы снабжать ближайшие корабли значительными запасами избыточной энергии, серьезно повышая боевую мощь оборонительных флотилий.\n"
 # Event Chain
 galactic_hyperthermia_chain_title: "$ap_galactic_hyperthermia$"
 galactic_hyperthermia_chain_desc: "Мы решили, что будущее должно быть окутано пламенем, и начали кампанию по воспламенению всей галактики."
 # Special Projects
 INF_CRISIS_ENTROPY: "Новый источник энергии"
 INF_CRISIS_ENTROPY_DESC: "Огонь давно играл важную роль в нашем обществе, но теперь мы научились использовать его хаотичную силу новыми способами. Возможно, именно об этом издавна мечтали ученые: источник энергии, который не просто питает нашу цивилизацию, но и способен ускорить наше перемещение среди звезд.\n\n§HЭффект:§! доступен новый ресурс — £entropy_crystals£ §Yкристаллизованная энтропия§!."
 INF_CRISIS_ENTROPY_EVIL: "Спроектированная огненная буря"
 INF_CRISIS_ENTROPY_EVIL_DESC: "Горнило указывает новый путь для нашей расы. Было бы глупо не пойти по нему, и мы не потерпим глупцов. Пришло время перековать галактику в новом, пылающем облике и сжечь всех, кто отвергает наше стремление.\n\n§HЭффекты:§!\n- Доступно следующее улучшение §Yгалактического горнила§!.\n- §Y$entropy_conduit_plural$§! теперь могут преобразовывать звезды на вражеской территории.\n\n" # Crystallized Entropy is used to its full potential
 INF_CRISIS_ENTROPY_GOOD: "Непредвиденная взаимосвязь"
 INF_CRISIS_ENTROPY_GOOD_DESC: "Хотя мощность горнила огромна, в то же время оно нестабильно. Если мы намеренно ограничим его возможности, то получим стабильный источник процветания, не подвергая галактику опасности и не гневя соседей." # Crystallized Entropy can be used for the economy
 # Countdown Situation
 situation_galactic_hyperthermia_timer: "Мобилизация"
 situation_galactic_hyperthermia_timer_type: "$situation_galactic_hyperthermia_timer$"
 situation_galactic_hyperthermia_timer_desc: "Наше глубокое понимание §Yкристаллизованной энтропии§! вскоре позволит нам изменить галактику до неузнаваемости. Мы открыли шесть червоточин в системы вокруг галактического ядра.\nЕсли мы расположим §Yпроводники§! в каждой из них и защитим от нападок тех, кто жаждет помешать нашим планам, то наше пламя наконец-то охватит всю галактику."
 situation_galactic_hyperthermia_timer_monthly_change_tooltip: "Текущий уровень энтропии, излучаемой в галактическое ядро. Когда он достигнет максимума, галактика вспыхнет."
 situation_gh_timer_outcome: "Разведка докладывает, что некоторые государства готовятся объявить нам войну, чтобы нарушить наши планы. Если мы не подготовимся, наше путешествие может закончиться, даже не начавшись."
 situation_gh_approach_timer: "Принять последствия"
 situation_gh_approach_timer_tt: "Время пришло. Война эпических масштабов вот-вот охватит всю галактику."
 situation_gh_difficulty_progress: "Сложность"
 situation_gh_opponent_progress: "§G-0,1§! за каждое противостоящее государство"
 # Crisis Situation
 situation_galactic_hyperthermia: "Галактическая огненная буря"
 situation_galactic_hyperthermia_type: "$situation_galactic_hyperthermia$"
 situation_galactic_hyperthermia_monthly_change_tooltip: "Скорость, с которой галактика приближается к тотальному воспламенению."
 situation_hyperthermia_desc_perp: "§LМы мечтаем об объятой пламенем утопии, но чтобы создать ее, нам придется испепелить всё, что стоит на нашем пути. Мы уже разожгли первые искры и теперь будем раздувать их, пока каждый уголок галактики не воспылает.§!\n\n$situation_hyperthermia_stats$"
 situation_hyperthermia_desc: "§L§Y[event_target:hyperthermia_empire.GetName]§! [event_target:hyperthermia_empire.GetName::поджег|||fem:подожгла|||neut:подожгло|||pl:подожгли] сами звезды. Теперь наш черед сразиться с величайшим пожаром, который когда-либо видела галактика. Второго шанса не будет. Если мы потерпим неудачу, все наши достижения обратятся в пепел.§!\n\n$situation_hyperthermia_stats$"
 situation_hyperthermia_stats: "§HЗахвачено центральных систем:§! [event_target:hyperthermia_empire.gh_crisis_core_var]"
 situation_galactic_hyperthermia_outcome: "[GetHyperthermiaOutcome]"
 situation_gh_outcome_perp: "Если у нас всё получится, огненный ливень охватит галактику, и в этом пожаре уцелеют лишь те, кто принял жар. Даже звезды не устоят — спустя миллиарды лет они наконец-то станут подобием нашего светила."
 situation_gh_outcome_other: "Если §Y[hyperthermia_empire.GetName&dat]§! удастся добиться своего, вся галактика будет выжжена дотла — в ней останутся лишь термофильные формы жизни."
 situation_galactic_hyperthermia_progress: "Количество систем у центра галактики, занятых §Yпроводниками§!, определяет ежемесячный прогресс. \n$TABBED_NEW_LINE$- Меньше §Y3§! систем: §R-3§! $TABBED_NEW_LINE$- §Y3§! системы: §Y0§! $TABBED_NEW_LINE$- Больше §Y3§! систем: §G+3§! \n\nТекущий прогресс"
 situation_galactic_hyperthermia_stage1: "Достигнут минимум ($stage_1$)"
 situation_gh_approach_perp: "Распалять пламя"
 situation_gh_approach_perp_tt: "Сейчас или никогда. Мы должны преуспеть, иначе рискуем потерять всё, чего добились."
 situation_gh_approach_other: "Гасить пламя"
 situation_gh_approach_other_tt: "Это государство представляет катастрофическую угрозу для стабильности галактики. У нас нет выбора, кроме как начать открытый военный конфликт."
 # Events
 # NOTE: Remove most #comments below after texts are done
 infernals.1000.name: "Новая сила"
 infernals.1000.desc: "[GetHyperthermiaIntroIfRedGiant]"
 infernals.1000.descNormal: "Наши [GetScientistPlural] обнаружили новый метод сбора и хранения энтропии путем связывания в высокоэнергетическую кристаллическую матрицу. Эта §Yкристаллизованная энтропия§! способна накапливать и передавать значительную тепловую энергию, что найдет применение в промышленности, экономике и космических операциях.\n\nСогласно моделям, с ее помощью можно терраформировать планеты в сторону более жаркого климата или даже ускорять эволюцию звезд до стадии красных гигантов. В принципе, если собрать рассеянную по всей галактике энтропию и преобразовать в полезное тепло, мы можем запустить лавинообразное тепловое расширение в галактических масштабах.\n\n§HДоступен особый проект:§! §Y$INF_CRISIS_ENTROPY$§!"
 infernals.1000.descRedGiant: "Наши [GetScientistPlural] проанализировали §Yкристаллизованную энтропию§!, которая когда-то использовалась для разжигания красного гиганта — что едва не уничтожило нашу цивилизацию на корню. Теперь с помощью этой субстанции мы можем связывать и передавать колоссальную тепловую энергию в промышленности и экономике на космических масштабах.\n\nСимуляции показывают, что это может позволить терраформировать миры в более жаркие или запускать эволюцию звезд в красные гиганты. Теоретически рассеянную в галактике энтропию можно собрать и преобразовать в тепло, что приведет к систематическому тепловому расширению.\n\n§HДоступен особый проект:§! §Y$INF_CRISIS_ENTROPY$§!" # Intro if you've learned about entropy from the Red Giant Miners
 infernals.1005.name: "Кристаллизация достигнута"
 infernals.1005.desc1: "Наша первая промышленная установка по сбору энергии и преобразованию ее в §Yкристаллизованную энтропию§! введена в строй. Эти кристаллы, несущие в себе колоссальную тепловую энергию, уже сейчас позволяют нашей промышленности накапливать и передавать энергию с беспрецедентной эффективностью.\n\nБлагодаря гигантской площади излучения и чудовищной теплоотдаче, красные гиганты идеально подходят для сбора энергии. Мы готовы развернуть эту установку в любой системе под нашим контролем.\n\nТехники уже работают над адаптацией процесса для промышленного применения, экспериментируя с синтезом кристаллизованной энтропии из окружающего пространства. Эта искра неизбежно распалит нашу экономику и могущество. Наши [GetScientistPlural] уже ищут способы еще сильнее масштабировать производство.\n\n§HДоступно мегасооружение:§! §Y$galactic_crucible_0$§!" # Reaching lv1
 infernals.1005.desc2: "Имея на руках образцы §Yкристаллизованной энтропии§!, мы можем наладить ее сбор и синтез, не подвергая риску нашу родную звезду. Эти кристаллы, несущие в себе колоссальную тепловую энергию, уже сейчас позволяют нашей промышленности накапливать и передавать энергию с беспрецедентной эффективностью.\n\nБлагодаря гигантской площади излучения и чудовищной теплоотдаче красные гиганты идеально подходят для сбора энергии. Мы готовы развернуть эту установку в любой системе под нашим контролем.\n\nТехники уже работают над адаптацией процесса для промышленного применения, экспериментируя с синтезом кристаллизованной энтропии из окружающего пространства. Эта искра неизбежно распалит нашу экономику и могущество. Наши [GetScientistPlural] уже ищут способы еще сильнее масштабировать производство.\n\n§HДоступно мегасооружение:§! §Y$galactic_crucible_0$§!" # Reaching lv1
 infernals.1005.a: "Пора начинать строительство."
 infernals.1005.a.tt: "Используйте строительный корабль, чтобы возвести §Yкаркас галактического горнила§! на орбите звезды."
 infernals.1005.b: "Отдать приказ единицам о начале строительства."
 infernals.1005.b.tt: "Используйте строительный корабль, чтобы возвести §Yкаркас галактического горнила§! на орбите звезды."
 infernals.1006.name: "Термофильная эволюция"
 infernals.1006.desc: "Мы встали на путь воспламенения галактики, но наши собственные тела должны быть готовы столкнуться с жаром. Адаптация населения к более высоким температурам поможет нам процветать в нашем огненном будущем."
 infernals.1006.descRedGiant: "Мы неустанно пытаемся обратить вспять процесс изменения звезды, но наши собственные тела должны быть готовы столкнуться с жаром. Адаптация населения к более высоким температурам поможет нам процветать в условиях огненного будущего нашего светила."
 infernals.1010.name: "Запуск проводников"
 infernals.1010.desc: "$galactic_crucible_1$ готово к развертыванию §Yпроводников§! — автоматических систем, которые будут направлять и усиливать звездную энтропию. После запуска они будут перерабатывать и усиливать энерговыделение звезды, превращая ее в красный гигант и нагревая целые системы для поддержки растущей инфраструктуры нашего государства.\n\n§YПроводники§! могут производиться через регулярные интервалы и работать автономно, что весьма удобно. Пока что они будут оставаться на нашей территории, но со временем может оказаться разумным распространить их по всей галактике. В конце концов, наше государство никогда не перестанет расти.\n\n§HДоступно улучшение мегасооружения:§! §Y$galactic_crucible_2$§!" # Reaching lv2
 infernals.1010.a: "Производство кристаллизованной энтропии ускорится."
 infernals.1010.b: "Нам нужно завоевать еще больше звезд."
 infernals.1015.name: "Насколько жарко будет?"
 infernals.1015.desc: "Исследования §Yкристаллизованной энтропии§! выявили тревожный факт: в высокой концентрации эти кристаллы могут питать оружие невообразимой мощи, способное опустошать целые планеты. Обладая такой силой, мы сможем покорить всю галактику.\n\nНо поиски военного применения разрушат и без того шаткое доверие наших соседей. И кто сказал, что однажды такое оружие не будет обращено против нас самих?\n\nПустых обещаний мира мало. Если мы хотим доказать наши добрые намерения, мы должны публично ограничить функциональность ядра галактического горнила, навсегда лишив его возможности производить подобное оружие. Иначе рано или поздно подобная технология точно будет применена в военных целях — нами или кем-то еще.\n\n§HЭто решение запускает особый проект§!" # Reaching lv3 & decision
 infernals.1015.a: "Раздуть пламя войны!" # evil path
 infernals.1015.a.desc: "Открывает уровень кризиса $crisis_hyperthermia_level_4$.\n" #\n\n§HIssues Special Project:§! §Y$INF_CRISIS_ENTROPY_EVIL$§!
 infernals.1015.b: "Умерим наши амбиции." # good path
 infernals.1015.b.desc: "Закрывает доступ к уровню кризиса $crisis_hyperthermia_level_4$. \n\n§HЗапускает особый проект:§! §Y$INF_CRISIS_ENTROPY_GOOD$§! для превращения §Yядра галактического горнила§! в §Yинститут галактического горнила§!."
 infernals.1020.name: "В огонь"
 infernals.1020.desc: "Наше исследование §Yкристаллизованной энтропии§! и §Yпроекта «Спроектированная огненная буря»§! подтвердило догадки: их действительно можно использовать как разрушительное оружие. С такой силой у нас больше не будет нужды сдерживаться ради дипломатических условностей.\n\nМы ускорим расширение центра галактического горнила, с особым акцентом на более... агрессивное применение. Чем скорее мы получим это оружие, тем меньше нас будет волновать мнение остальной галактики.\n\n§HДоступно улучшение мегасооружения:§! §Y$galactic_crucible_4$§!" # Finishing special project for evil path
 infernals.1020.a: "Пора готовиться к войне."
 infernals.1020.a.tt: "- Нужно отдать приоритет расширению §Yгалактического горнила§!.\n- $unlocks_conduit_damage$"
 infernals.1020.b: "Соперники станут топливом для костра."
 infernals.1020.b.tt: "- Нужно отдать приоритет расширению §Yгалактического горнила§!.\n- $unlocks_conduit_damage$"
 infernals.1021.name: "Ровное сияние"
 infernals.1021.desc: "Мы успешно ограничили возможности центра галактического горнила, поэтому его больше нельзя будет расширять и использовать в разрушительных целях. Хотя и жаль утрачивать его полный потенциал, продолжение движения по прежнему пути могло бы привести к катастрофе и краху всех дипломатических отношений.\n\nК счастью, даже в таком усеченном виде институт галактического горнила останется мощным источником энергии и процветания. Мы отступили, не перейдя роковую черту, и обеспечили себе будущее, в котором можем сотрудничать с Галактическим сообществом, продолжая пользоваться плодами этого удивительного изобретения.\n\n§HДоступно улучшение мегасооружения:§! §Y$galactic_crucible_5$§!" # Finishing special project for good path
 infernals.1021.a: "Сотрудничество выгодно для всех."
 infernals.1021.b: "В гармонии мы обретаем процветание."
 infernals.1025.name: "Окружение ядра"
 infernals.1025.desc: "Наши исследования §Yпроводников§! и технологии преобразования звезд в красные гиганты указывают на то, что мы можем интенсифицировать наши операции, чтобы перегреть само галактическое ядро. Это вызовет тепловой каскад по всей галактике, что превратит ее в куда более подходящее для нас место.\n\nМы определили шесть систем вокруг ядра, которые могут стать операционными центрами для этого проекта. Эти системы находятся вне сети галактических гиперкоридоров, но мы уже работаем над созданием стабильных червоточин для доступа к ним." # Reaching lv4
 infernals.1025.a: "Лишь мы одни достойны пережить этот огонь."
 infernals.1025.a.tt: "Другие расы попытаются противостоять нам. Готовьтесь к Галактической войне."
 infernals.1025.b: "Вся галактика воспылает в унисон."
 infernals.1025.b.tt: "Другие расы попытаются противостоять нам. Готовьтесь к Галактической войне."
 infernals.1030.name: "Гонка к воспламенению"
 infernals.1030.desc: "Галактическое горнило теперь полностью вооружено и функционирует. С открытием червоточин мы обеспечили себе доступ ко всем шести системам вокруг галактического ядра.\n\nМожно начинать перегрев ядра. Другие государства могут засечь нашу активность и попытаться прорваться к этим системам, но пока преимущество на нашей стороне, и вскоре ядро покорится нашей воле.\n\n§HИспользуйте червоточины, чтобы захватить системы у ядра галактики§!" # Reaching lv5, lanes open in 3 years!
 infernals.1030.a: "Начать работы в центральных системах."
 infernals.1030.a.tt: "Разместив §Yпроводники§! в шести системах у галактического ядра, мы сможем разогреть всю галактику разом. Пора начинать приготовления."
 infernals.1030.b: "Наше будущее пылает ярким пламенем."
 infernals.1030.b.tt: "$infernals.1030.a.tt$"
 infernals.1035.name: "Галактическая тревога"
 infernals.1035.desc: "Враждебные государства проложили гиперкоридоры к нашим плацдармам у галактического ядра. Мы должны быть готовы сопротивляться, не прекращая нагревать ядро.\n\nНо нас не остановить. Холодная тьма космоса будет выжжена дотла, и на ее место придет ослепительное сияние нашего восхождения."
 # core is now connected with the galaxy!
 infernals.1035.a: "Им нас не погасить."
 infernals.1035.b: "Пусть бросаются в наше испепеляющее пламя."
 infernals.1040.name: "Надвигается буря"
 infernals.1040.desc: "Галактическое ядро начало пробуждаться. Уровень энтропии вокруг сверхмассивной черной дыры резко возрос, и оно начало выбрасывать волны тепловой радиации в близлежащие системы.\n\nКогда паника уже начала распространяться, команда отважных ученых из разных миров обнаружила вновь образовавшиеся гиперкоридоры, ведущие к шести системам у галактического ядра. Похоже, в этих системах расположены объекты §Y[hyperthermia_empire.GetName&gen]§!, которые активно перегревают ядро. Подобное безрассудство грозит вызвать каскадную огненную бурю по всей галактике, которая испепелит всех, если не остановить этих огненных фанатиков.\n\nЕсли мы хотим выжить, нужно прорваться в эти системы и отнять их силой. Кризис уже наступил — и температура продолжает расти." # other empires learn about the core, forming a coalition war
 infernals.1040.a: "Мы должны это остановить!" # generic reply (declares war)
 infernals.1040.a.tt: "§LГалактику вот-вот охватит кризис невиданного масштаба. Спасти нас сможет лишь единая мощь всегалактического альянса.§!\n\nБудет создана §Yкоалиция§! государств для противодействия кризису, что приведет к общегалактическому конфликту. Мы §Rобъявим войну§! §Y[hyperthermia_empire.GetName&dat]§!."
 infernals.1040.b: "Горите, слабаки!" # Genocidals reply
 infernals.1040.b.tt: "§LВ такие трудные времена каждый вид сам за себя. У нас хватит сил справиться в одиночку.§!"
 infernals.1040.c: "Они прямо как мы." # Infernals reply
 infernals.1040.c.tt: "§LМетоды §Y[hyperthermia_empire.GetName&gen]§! совпадают с нашим видением обновленной галактики. В свете этого так называемая катастрофа, которой все так страшатся, может нас миновать.§!"
 infernals.1040.d: "Это не наша забота." # neutral reply
 infernals.1040.d.tt: "§LЭто далеко не первое государство, играющее с огнем. Потрясения пройдут, как проходит всё остальное. Нет никаких причин вмешиваться.§!"
 infernals.1042.name: "Эскалация: §Rобъявлен кризис§!"
 infernals.1042.desc: "Величайшие свершения в истории всегда требовали жертв. Однако Галактическое сообщество видит в нашей работе угрозу, а не необходимость. Против нас собралась объединенная военная коалиция.\n\nПоскольку они заявляют, что стремятся нас уничтожить, у нас не осталось выбора: любой, кто приблизится к галактическому ядру или горнилу, встретится с нашей сокрушительной силой.\n\nНаше видение воспламенило сами звезды. Пусть те, кто ему противится, попробуют выстоять перед призванной нами бурей.\n\n§HЗащитите системы у галактического ядра — и победа будет за нами!§!"
 infernals.1042.a: "Исход предрешен."
 infernals.1043.name: "Призыв к оружию: §Rобъявлен кризис§!"
 infernals.1043.desc: "В связи с эскалацией угрозы вблизи галактического ядра Галактическое сообщество приняло решение о необходимости выступить единым фронтом против §Y[hyperthermia_empire.GetName&gen]§!, чьи безрассудные попытки повысить температуру в галактике ставят под угрозу всю известную жизнь.\n\nЕсли пустить всё на самотек, бесчисленным цивилизациям грозит вымирание. Так [hyperthermia_empire.GetName::называемый|||fem:называемая|||neut:называемое|||pl:называемые] §Y[hyperthermia_empire.GetName&nom]§! теперь [hyperthermia_empire.GetName::противостоит|||pl:противостоят] коалиции, объединившейся перед лицом неминуемой гибели.\n\nБитва началась, и на кону — триллионы жизней.\n\n§HЗахватите системы у галактического ядра, иначе всё будет потеряно!§!"
 infernals.1043.a: "Мобилизовать флотилии!"
 infernals.1045.name: "Гонка со временем"
 infernals.1045.desc1: "Надвигается каскадная огненная буря. Скоро галактическое ядро вспыхнет, очистив пространство от наших врагов и утвердив наше владычество над звездами.\n\nНо галактика отказывается принять наше лучезарное будущее. Враги замышляют вторгнуться в наши системы через недавно проложенные гиперкоридоры и разрушить всё, чего мы добились. И ради чего? Чтобы остаться жить в холодном, застоявшемся мраке?\n\nМы не можем позволить им вмешаться. Мы должны удержать рубежи у ядра, пока огненная буря не вспыхнет и не обратит их всех в пепел." # last stage of global situation - crisis
 infernals.1045.desc2: "Галактическое ядро становится всё горячее, подогреваемое фанатичным стремлением §Y[hyperthermia_empire.GetName&gen]§! воспламенить звезды. Такими темпами их огненная буря выжжет любое сопротивление и очистит галактику от всех форм жизни.\n\nДоговориться с ними невозможно. Если мы хотим выжить, придется нанести удар в самое сердце: системы у галактического ядра, где их сила пылает ярче всего. Только тогда §Y[hyperthermia_empire.GetName&acc]§! можно будет остановить.\n\nНа кону судьба всей галактики. Пора показать §Y[hyperthermia_empire.GetName&dat]§!, что если играть с огнем, то рано или поздно можно обжечься." # last stage of global situation - others
 infernals.1045.a: "Мы удержим рубежи."
 infernals.1045.a.tooltip: "Чтобы победить, мы должны сохранить контроль над шестью системами у ядра."
 infernals.1045.b: "Мы погасим их раз и навсегда."
 infernals.1045.b.tooltip: "Мы должны атаковать шесть систем у ядра и уничтожить расположенные там проводники §Y[hyperthermia_empire.GetName&gen]§!, иначе превратимся в пепел."
 infernals.1055.name: "Галактика принадлежит нам!"
 infernals.1055.desc: "Мы раздули пламя победы от галактического ядра и до самых отдаленных звезд. Огненная буря обратила наших врагов в пепел. Им не хватило ума и смелости, чтобы принять великое будущее, что мы выковали. Галактика принадлежит нам.\n\nВ этом новом мире огня и ярости планеты кипят магмой и озаряются жаром красных гигантов. В каждой системе бурлит энтропия, которую мы вольны собирать и использовать в любых целях. С каждым днем наша империя становится богаче, сильнее... неудержимее.\n\nМы поглотили галактику и перековали ее в пылающий маяк нашего владычества. Быть может, однажды мы возложим на этот костер и другие галактики." # crisis won
 infernals.1055.a: "Эта новая галактика теперь в нашей власти."
 infernals.1055.b: "В конце концов, все огни сливаются в один."
 infernals.1055.c: "Нашему огненному дому не нужны слабаки." #Scorched world heralds (genocidal Infernal)
 infernals.1055.d: "Наша стойкость наконец вознаграждена." #Infernal Fire Cult
 infernals.1055.e: "Наконец-то мы изгнали холодную тьму из этой галактики." #Other Infernals
 infernals.1055.f: "Наконец-то наши жалкие соперники обратились в пепел." #Generic Genocidal
 infernals.1052.name: "Галактическое горнило захвачено"
 infernals.1052.desc: "Вместе с системой §H[crucible_system.GetName]§! наши войска захватили строящееся галактическое горнило, расположенное на орбите местной звезды.\n\nУтрата этого мегасооружения нанесла последний удар по надеждам его создателей захватить галактику силой."
 infernals.1052.a: "Уничтожить его!"
 infernals.1052.a.tt: "§YГалактическое горнило§! будет разрушено окончательно и бесповоротно."
 infernals.1052.b: "Это нам пригодится."
 infernals.1052.b.tt: "§YГалактическое горнило§! превратится в §Yинститут галактического горнила§! и будет производить £alloys£ §Yсплавы§!."
 infernals.1053.name: "Галактическое горнило захвачено"
 infernals.1053.desc: "Захватив систему §H[crucible_system.GetName]§!, мы раскрыли зловещие планы §H[crucible_builders.GetName&gen]§!: это государство собиралось полностью стереть всю жизнь с лица галактики, создав невероятных масштабов огненную бурю.\n\nСамо устройство, способное вызвать массовое вымирание, пока что бездействует. Как только война закончится, нам нужно будет бросить все свободные ресурсы и силы на выведение этого колоссального мегасооружения из строя раз и навсегда."
 infernals.1053.a: "Нужно поскорее закончить войну!"
 infernals.1053.b: "Удивительное сооружение."
 infernals.1056.name: "Перерождение галактики"
 infernals.1056.desc: "Пока мы разжигали искру, из которой зародился бы способный охватить галактику пожар, сами звезды уже стали оружием на службе у §Y[hyperthermia_empire.GetName&gen]§!. Облик галактики изменился навсегда.\n\nМы готовы принять эту утопию, однако не следует терять бдительности: хватка [hyperthermia_empire.GetName&gen] со временем становится только сильнее, а значит, надо внимательно следить за их действиями."
 infernals.1056.a: "Огромная сила всегда порождает конфликты."
 infernals.1056.b: "Возникла новая угроза."
 infernals.1056.c: "Неожиданный поворот событий."
 # Relic
 r_crystallized_singularity: "Кристаллизованная сингулярность"
 r_crystallized_singularity_desc: "Искривленная жаром галактики, эта сингулярность потрескивает манящим теплом. Если ее как следует не изолировать, она будет необъяснимым образом притягивать паломников даже в самые безжизненные миры. Те, кто предстают перед ней, чувствуют непреодолимую тягу к более простой жизни... поближе к пламени."
 r_crystallized_singularity_effect_tt: "\n- §G10%§! наших £physics_research£ §Yфизических исследований§! будут также производить £energy£ §Yэнергокредиты§!."
 r_crystallized_singularity_ls_effect_tt: "- Доступно решение §Y$decision_gh_life_seeding$§! в доступных для колонизации мирах, которое создает новую примитивную цивилизацию."
 crystallized_singularity_mod: "$r_crystallized_singularity$"
 crystallized_singularity_mod_desc: "$r_crystallized_singularity_desc$"
 decision_gh_life_seeding: "Распространение жизни"
 decision_gh_life_seeding_desc: "Наш успех в изменении галактики привел к стремительному вымиранию на множестве планет. Теперь мы вправе воссоздать жизнь по нашему образу и подобию."
 decision_gh_life_seeding_limit: "$TRIGGER_FAIL$§RНа этой планете уже есть примитивная цивилизация.§!"
 decision_gh_life_seeding_colony: "$TRIGGER_FAIL$§RВ системе не должно быть колоний.§!"
