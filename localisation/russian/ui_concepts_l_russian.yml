 # View: £interface£ ['concept_government_view'] or £interface£ §H$concept_government_view$§!
 concept_government_view: "Обзор правительства"
 concept_government_view_desc: "Во вкладке §H«$concept_government_view$»§! можно заниматься правительственными вопросами.$ui_available_tabs$$concept_government_view_tabs$"
 government_view_tab_council: "§H$COUNCIL$§!"
 government_view_tab_factions: "§H$FACTIONS$§!"
 government_view_tab_policies_and_edicts: "§H$EDICTS_AND_POLICIES$§!"
 concept_government_view_tabs: "- $government_view_tab_council$: просмотр ['concept_council', совета] и его ['concept_agendas', программ]\n- $government_view_tab_factions$: перечень ['concept_factions', фракций]\n- $government_view_tab_policies_and_edicts$: выбор ['concept_policies', политик] и ['concept_edicts', указов]"
 # View: £interface£ ['concept_society_management_view'] or £interface£ §H$concept_society_management_view$§!
 concept_society_management_view: "Обзор управления обществом" # Use this alias when referring to the concept
 concept_society_management: "$TRADITION_VIEW_TITLE$" # Left out 'View' to fit in the Databank UI
 concept_society_management_desc: "Во вкладке §H«$concept_society_management_view$»§! можно управлять традициями.$ui_available_tabs$[GetConceptSocietyManagement]"
 society_management_view_tab_traditions: "§H$TRADITIONS$§!"
 society_management_view_tab_crisis: "§H$CRISIS_TAB$§!"
 concept_society_management_view_crisis: "$concept_society_management_view_no_crisis$\n- $society_management_view_tab_crisis$: отслеживание прогресса, если вы ['concept_crisis', кризис]"
 concept_society_management_view_no_crisis: "- $society_management_view_tab_traditions$: выбор ['concept_traditions', традиций] и ['concept_ascension_perks', бонусов за стремление]"
 # View: £interface£ ['concept_technology_view'] or £interface£ §H$concept_technology_view$§!
 concept_technology_view: "Обзор технологий"
 concept_technology_view_desc: "£interface£ §H$concept_technology_view$§! отображает научный прогресс государства в областях £physics£ ['concept_physics_research', физики], £society£ ['concept_society_research', социологии] и £engineering£ ['concept_engineering_research', инженерии]. В этом интерфейсе выбираются направления исследований и устанавливаются приоритеты технологического развития.\n\nПредлагаемые для изучения ['concept_technologies', технологии] выбираются из доступных вариантов во многом случайно, что отражает непредсказуемость научных изысканий."
 # View: £interface£ ['concept_leaders_view'] or £interface£ §H$concept_leaders_view$§!
 concept_leaders_view: "Обзор лидеров"
 concept_leaders_view_desc: "£interface£ §H$concept_leaders_view$§! предоставляет обзор всех действующих ['concept_leaders', лидеров] государства, включая их роли, ['concept_leader_traits', черты], уровень опыта и текущее задание. В этом интерфейсе можно нанимать новых лидеров, перераспределять существующих или отправлять их в отставку."
 # View: £interface£ ['concept_species_view'] or £interface£ §H$concept_species_view$§!
 concept_species_view: "Обзор рас"
 concept_species_view_desc: "£interface£ §H$concept_species_view$§! предоставляет перечень всех ['concept_species', рас] в государстве. В этом интерфейсе можно просматривать и изменять ['concept_species_traits', признаки] рас, а также управлять правами населения, включая гражданство, военную службу и ['concept_living_standards', уровень жизни].\n\nЭто окно играет ключевую роль в управлении расово разнообразным государством, где политика, биология и идеология переплетаются, формируя галактическое общество."
 # View: £interface£ ['concept_planets_and_sector_view'] or £interface£ §H$concept_planets_and_sector_view$§!
 concept_planets_and_sector_view: "Обзор планет и секторов" # Use this alias when referring to the concept
 concept_planets_and_sector: "$PLANET_LIST$" # Left out 'View' to fit in the Databank UI
 concept_planets_and_sector_desc: "Окно £interface£ §H$concept_planets_and_sector$§! предоставляет обзор всех £colony£ ['concept_colonies', колоний] и £sector£ ['concept_sector', секторов] в государстве.\n\nВ этом окне также можно назначить ['concept_governors', губернаторов]."
 # View: £interface£ ['concept_expansion_planner'] or
 concept_expansion_planner: "$MENU_PANEL__EXPANSION_PLANNER_TITLE$"
 concept_expansion_planner_desc: "В окне £interface£ §H«$concept_expansion_planner$»§! отображаются £planet£ ['concept_planets', планеты], пригодные для колонизации. Начать колонизацию можно непосредственно здесь же: £colony_ship£ ['concept_colony_ship', колониальный корабль] будет построен автоматически.\n\n£planet£ §HПланеты§! сначала следует изучить с помощью £science_ship£ ['concept_science_ship', научного корабля], а все обнаруженные на поверхности £anomaly£ ['concept_anomalies', аномалии] — исследовать. Только после этого колонизация станет возможной.\n\nВ системе, где расположена планета, также должна быть ['concept_starbase', космическая база] — таким образом колонизируемая система окажется внутри государственных границ."
 # View: £interface£ ['concept_fleet_management_view'] or £interface£ §H$concept_fleet_management_view$§!
 concept_fleet_management_view: "Обзор управления флотилиями" # Use this alias when referring to the concept
 concept_fleet_management: "$topbar_button_fleet_manager_name$" # Left out 'View' to fit in the Databank UI
 concept_fleet_management_desc: "Здесь можно проектировать корабли и создавать флотилии. Новые §Hразмеры кораблей§! и ['concept_components', компоненты] открываются при изучении соответствующих ['concept_technologies', технологий].$ui_available_tabs$[GetConceptFleetManagement]"
 fleet_management_view_tab_fleet_manager: "§H$FLEET_MANAGER_VIEW$§!"
 fleet_management_view_tab_ship_designer: "§H$SHIP_DESIGNER$§!"
 concept_fleet_management_view_space_fauna: "$concept_fleet_management_view_no_space_fauna$\n- §H$CREATURE_DESIGNER$§!: формирование ['concept_space_fauna', космической фауны]"
 concept_fleet_management_view_no_space_fauna: "- $fleet_management_view_tab_fleet_manager$: организация ['concept_fleets', флотилий]\n- $fleet_management_view_tab_ship_designer$: проектирование ['concept_military_ships', военных кораблей]"
 # View: £interface£ ['concept_contacts_view'] or £interface£ §H$concept_contacts_view$§!
 concept_contacts_view: "Список контактов"
 concept_contacts_view_desc: "£interface£ §H$concept_contacts_view$§! отображает все известные государства, независимые анклавы и инопланетные сущности. В этом интерфейсе можно начать ['concept_diplomacy', дипломатические] переговоры и оценить текущие отношения. Он служит центральным узлом для межзвёздных коммуникаций и сбора разведданных."
 contacts_view_tab_contacts: "§H$topbar_button_contacts_name$§!"
 contacts_view_tab_agreements: "§H$AGREEMENTS_LIST_TITLE$§!"
 contacts_view_tab_shroud: "§H$THE_SHROUD_TITLE$§!"
 concept_contacts_view_tabs: "- $contacts_view_tab_contacts$: ведение ['concept_diplomacy', дипломатических] отношений\n- $contacts_view_tab_agreements$: изучение ['concept_subject_agreements', вассальных соглашений]\n- $contacts_view_tab_shroud$: проведение ['concept_psionic_ascension', псионического возвышения]"
 # View: £interface£ ['concept_discoveries_view'] or £interface£ §H$concept_discoveries_view$§!
 concept_discoveries_view: "Обзор открытий"
 concept_discoveries_view_desc: "£interface£ §H$concept_discoveries_view$§! каталогизирует значимые объекты и феномены, обнаруженные по всей галактике, включая ['concept_relics', реликвии], древние артефакты и прочие диковинки, представляющие особый интерес.$ui_available_tabs$[GetConceptDiscovery]"
 discoveries_view_tab_relics: "§H$relics$§!"
 discoveries_view_tab_collection: "§H$COLLECTION$§!"
 discoveries_view_tab_vivarium: "§H$VIVARIUM$§!"
 discoveries_view_tab_astral_actions: "§H$ASTRAL_ACTIONS$§!"
 concept_discovery_view_base: "- $discoveries_view_tab_relics$: управление ['concept_relics', реликвиями]"
 concept_discovery_view_base_ancrel: "$concept_discovery_view_base$ и ['concept_minor_artifacts', малыми артефактами]"
 concept_discovery_view_base_archive: "$concept_discovery_view_base$\n- $discoveries_view_tab_collection$: отображение ['concept_specimens', экземпляров]\n- $discoveries_view_tab_vivarium$: разведение ['concept_space_fauna', космической фауны]"
 concept_discovery_view_base_ancrel_archive: "$concept_discovery_view_base$\n- $discoveries_view_tab_collection$: отображение ['concept_specimens', экземпляров] и ['concept_minor_artifacts', малых артефактов]\n- $discoveries_view_tab_vivarium$: разведение ['concept_space_fauna', космической фауны]"
 concept_discovery_view_base_astral: "$concept_discovery_view_base$\n$concept_discovery_view_astral$"
 concept_discovery_view_base_ancrel_astral: "$concept_discovery_view_base_ancrel$\n$concept_discovery_view_astral$"
 concept_discovery_view_base_archive_astral: "$concept_discovery_view_base_archive$\n$concept_discovery_view_astral$"
 concept_discovery_view_base_ancrel_archive_astral: "$concept_discovery_view_base_ancrel_archive$\n$concept_discovery_view_astral$"
 concept_discovery_view_astral: "- $discoveries_view_tab_astral_actions$: совершение ['concept_astral_actions', звездных действий]"
 # View: £interface£ ['concept_claims_view'] or £interface£ §H$concept_claims_view$§!
 concept_claims_view: "Обзор притязаний"
 concept_claims_view_desc: "£interface£ §H$concept_claims_view$§! отображает все территориальные ['concept_claims', притязания], заявленные государством. Дипломатический режим ['concept_galaxy_map', карты галактики] даёт чёткое представление о спорных системах и потенциальных точках напряжения для будущих конфликтов."
 # View: £interface£ ['concept_market_view'] or £interface£ §H$concept_market_view$§!
 concept_market_view: "Обзор рынка"
 concept_market_view_desc: "£interface£ §H$concept_market_view$§! предоставляет инструменты для межзвёздной торговли, позволяя покупать и продавать ресурсы или настраивать регулярные ежемесячные сделки."
 # View: £interface£ ['concept_colony_view'] or £interface£ §H$concept_colony_view$§!
 concept_colony_view: "Обзор колонии"
 concept_colony_view_desc: "В окне £interface£ §H«$concept_colony_view$»§! можно управлять £colony£ ['concept_colony', колонией]. В этом же окне, открытом на подходящей необитаемой £planet£ ['concept_planets', планете] или в необитаемом ['concept_habitats', орбитальном поселении], можно начать §Hколонизацию§!.$ui_available_tabs$$concept_colony_view_tabs$"
 colony_view_tab_planet_summary: "§H$PLANET_TAB$§!"
 colony_view_tab_management: "§H$MANAGEMENT_TAB$§!"
 colony_view_tab_population: "§H$POPULATION_TAB$§!"
 colony_view_tab_armies: "§H$GROUND_COMBAT_TAB$§!"
 colony_view_tab_holdings: "§H$CORPORATE_TAB$§!"
 concept_colony_view_tabs: "– $colony_view_tab_planet_summary$: обзор £district£ ['concept_districts', районов] и £building£ ['concept_buildings', сооружений] колонии. Здесь же отображается назначенный ['concept_governor', губернатор]. В этой вкладке можно задать ['concept_designation', категорию] колонии или включить ['concept_planet_automation', автоматизацию планеты].\n– $colony_view_tab_management$: обзор особенностей планеты и изменений населения. Здесь можно принимать ['concept_decisions', решения], повысить ['concept_planetary_ascension', уровень планеты] или начать ['concept_terraforming', терраформирование].\n– $colony_view_tab_population$: обзор населения колонии, разделенного по £job£ ['concept_job', должностям].\n– $colony_view_tab_armies$: обзор наземных войск колонии и понесенного ею ['concept_devastation', опустошения].\n– $colony_view_tab_holdings$: обзор всех ['concept_overlord_holdings', владений сюзеренов] в колонии."
 # View: £interface£ ['concept_starbase_view'] or £interface£ §H$concept_starbase_view$§!
 concept_starbase_view: "Обзор космической базы"
 concept_starbase_view_desc: "В окне £interface£ §H«$concept_starbase_view$»§! можно управлять ['concept_starbase', космическими базами].$ui_available_tabs$$concept_starbase_view_tabs$"
 starbase_view_tab_command: "§H$STARBASE_STARBASE_TAB$§!"
 starbase_view_tab_defenses: "§H$STARBASE_DEFENSES_TAB$§!"
 starbase_view_tab_armies: "§H$MACRO_BUILDER_TAB$§!"
 starbase_view_tab_shipyard: "§H$STARBASE_SHIPYARD_TAB$§!"
 concept_starbase_view_tabs: "- $starbase_view_tab_command$: перечень §Hмодулей§! и §Hсооружений§! космической базы. Здесь же можно улучшить ее до следующего уровня — при условии, что изучена соответствующая ['concept_technology', технология].\n$starbase_view_tab_defenses$: перечень ['concept_defense_platforms', оборонительных платформ]. Здесь же можно построить новые, нажав на тот или иной проект.\n- $starbase_view_tab_armies$: сбор большого количества §Hнаступательных армий§!. Армии созываются в доступных £colony£ ['concept_colonies', колониях] в £sector£ ['concept_sector', секторе], после чего либо собираются на базе, либо присоединяются к §Hармии§! с активной §Hточкой сбора§!.\n- $starbase_view_tab_shipyard$: строительство как ['concept_civilian_ships', гражданских], так и ['concept_military_ships', военных] кораблей."
 # View: £interface£ ['concept_system_map'] or £interface£ §H$concept_system_map$§!
 concept_system_map: "Карта системы"
 concept_system_map_desc: "£interface£ §H$concept_system_map$§! отображает подробное представление отдельной звёздной системы, включая ['concept_celestial_objects', небесные тела], ['concept_civilian_space_stations', гражданские космические станции], ['concept_fleets', флотилии] и орбитальную инфраструктуру. Этот экран позволяет точно управлять строительством, колонизацией, боевыми операциями и научной деятельностью в пределах системы."
 # View: £interface£ ['concept_galaxy_map'] or £interface£ §H$concept_galaxy_map$§!
 concept_galaxy_map: "Карта галактики"
 concept_galaxy_map_desc: "£interface£ §H$concept_galaxy_map$§! предоставляет стратегический обзор известных участков галактики, отображая £system£ ['concept_systems', системы], границы ['concept_empire', государств] и ['concept_hyperlanes', гиперкоридоры]. Она служит основным инструментом для изучения космоса, экспансии и межзвёздной координации."
 # View: £interface£ ['concept_navigation_bar'] or £interface£ §H$concept_navigation_bar$§!
 concept_navigation_bar: "Панель навигации"
 concept_navigation_bar_desc: "£interface£ §H$concept_navigation_bar$§! расположена в левой части экрана.\n\nОна может либо разворачиваться при взаимодействии, либо оставаться в минималистичном виде.\n\nВ развернутом режиме можно изменить порядок расположения пунктов меню. При этом поменяются и горячие клавиши, открывающие то или иное меню."
 # View: £interface£ ['concept_resource_bar'] or £interface£ §H$concept_resource_bar$§!
 concept_resource_bar: "Панель ресурсов"
 concept_resource_bar_desc: "£interface£ §H$concept_resource_bar$§! расположена в верхней части экрана.\n\nЗдесь отображаются различные §Hресурсы§!, например £energy£ ['concept_energy', энергокредиты], а также показатели вроде £trade_value£ ['concept_trade', торговли], ['concept_research', исследований], ['concept_starbase_capacity', максимума космических баз] и ['concept_naval_capacity', вместимости флота]\nВ правой части находится §Hуправление временем§! — здесь можно ускорить или замедлить игру, а также поставить ее на паузу или возобновить.\n\nПод §Hуправлением временем§! находится §Hмузыкальный проигрыватель§!."
 # View: £interface£ ['concept_outliner'] or £interface£ §H$concept_outliner$§!
 concept_outliner: "Планировщик"
 concept_outliner_desc: "£interface£ §H$concept_outliner$§! даёт быстрый доступ к ключевым активам государства, включая £colony£ ['concept_colonies', колонии], ['concept_fleets', флотилии] и ['concept_civilian_space_stations', гражданские космические станции]. Этот настраиваемый интерфейс позволяет быстро переключаться между объектами, получая актуальную информацию об их состоянии и прямой контроль над важнейшими операциями."
