 edict_optimized_identity_creation: "Оптимизированное создание личностей"
 edict_optimized_identity_creation_desc: "Улучшенные алгоритмы формирования характеров и технологии компрессии памяти повышают скорость генерации личностей."
 concept_edict_optimized_identity_creation: "$edict_optimized_identity_creation$"
 ### EVENTS ###
 synth.social_consequences.tt: "Влияет на идущий §Yпереход общества к синтетическому§!.\n\n" #Standard tooltip to indicate that the Physical/Virtual focus variables has changed
 #FIRST EVENT #
 #DEMOCRATIC
 synth.505.name: "$synthshock_chain_title$"
 synth.505.desc: "Благодаря усилиям правительства сознание каждого выразившего на то согласие гражданина было перенесено в цифровую форму. Синтетизация открыла перед нами возможности, которые мы раньше и представить себе не могли; впрочем, то же можно сказать и о проблемах.\n\nОбратив усилия на физический мир, мы сможем переносить цифровые сознания на огромные расстояния в заранее подготовленные новые тела. Или же мы можем научиться создавать суррогатных солдат на удаленном управлении, чтобы облегчить тяготы войны."
 synth.505.a: "Нашим приоритетом должна стать свобода передвижения."
 synth.505.a.tt: "Упор на переселение и районы."
 synth.505.b: "Мы должны готовиться к ужасам войны."
 synth.505.b.tt: "Упор на усталость от войны и субсветовые путешествия."
 #OLIGARCHIC
 synth.510.name: "$synthshock_chain_title$"
 synth.510.desc: "Наше общество уже невозможно представить без синтетизации его членов: ее успехи открыли нам множество возможностей. Тем более не стоит останавливаться на достигнутом. Синтетические тела всегда можно доработать — или даже отбросить, словно старую кожу, и целиком погрузиться в виртуальный мир.\n\nЕсли мы назначим каждому гражданину синтетическое тело, наши чиновники смогут временно «брать управление» над телами не справляющихся с обязанностями коллег. С другой стороны, отказ от физических тел и объединение общества в полностью виртуальной реальности позволили бы принимать решения еще эффективнее."
 synth.510.a: "Сосредоточиться на «перехвате управления» телами отстающих."
 synth.510.a.tt: "Упор на эффективность госаппарата."
 synth.510.b: "Изучить вопрос тотального надзора в виртуальной реальности."
 synth.510.b.tt: "Упор на указы и размер государства."
 #DICTATORIAL
 synth.515.name: "$synthshock_chain_title$"
 synth.515.desc: "Полная синтетизация населения увенчалась оглушительным успехом. Мы развеяли органические тела по ветру истории, однако §Y[From.GetRulerTitle] [From.GetRulerName]§! не сможет проложить новый государственный курс, если самые выдающиеся умы не будут повиноваться безоговорочно… и если не будет определен сам курс.\n\nУлучшив синтетические тела, мы дадим жителям возможность контролировать несколько «сосудов» сразу. Или же мы можем вовсе отказаться от физического пространства и управлять народными настроениями в полностью виртуальной среде."
 synth.515.a: "Сосредоточиться на нейросинхронизации тел."
 synth.515.a.tt: "Упор на рабочих и районы."
 synth.515.b: "Сосредоточиться на виртуальном управлении."
 synth.515.b.tt: "Упор на сооружения и руководящие принципы."
 #IMPERIAL
 synth.520.name: "$synthshock_chain_title$"
 synth.520.desc: "Наше государство уже невозможно представить без синтетизации граждан: ее успехи открыли нам множество возможностей. Однако народ требует не останавливаться на достигнутом. Синтетические тела могут стать как продолжением нас самих, так и простыми инструментами, которыми можно будет удаленно управлять посредством виртуального сознания. Нам еще только предстоит определиться.\n\nМы можем разработать способы быстрого переноса сознания из одного «одноразового» тела в другое. Или же можем начать извлекать знания из умов недавно умерших, чтобы ускорить поступь технического прогресса."
 synth.520.a: "Заняться извлечением данных из сознаний покойников."
 synth.520.a.tt: "Упор на лидеров и исследования."
 synth.520.b: "Разработать способы быстрого переноса сознания."
 synth.520.b.tt: "Упор на армии и корабли."
 #CORPORATE
 synth.525.name: "$synthshock_chain_title$"
 synth.525.desc: "Синтетизация всего нашего общества требует тщательного и взвешенного анализа рисков и преимуществ. Синтетическое будущее сулит много выгоды, однако ради него придется бросить постоянных клиентов — заядлых материалистов. В идеале хотелось бы покорять новые границы, не забывая про старые.\n\nПоследние достижения в области синтетизации, связанные с искусственным интеллектом, позволили бы нам наделить неодушевленные предметы примитивными признаками жизни и выпустить на рынок новые линейки продуктов. С другой стороны, более тщательное изучение виртуального пространства поможет нам освоить новый товар — воспоминания других граждан."
 synth.525.a: "Изучить возможности по внедрению ИИ."
 synth.525.a.tt: "Упор на производство и выгоду."
 synth.525.b: "Изучить извлечение выгоды из воспоминаний."
 synth.525.b.tt: "Упор на торговлю, товары и разведданные."
 ### EVENT POOL 1: IDENTITY ###
 synth.610.name: "Источник роботизации"
 synth.610.desc: "В обществе все ярче проявляются фундаментальные изменения, которые принесла нам роботизация. Сбросив с себя оковы телесных форм, мы отказались от старых представлений о поле, расе и даже об автономии своего организма. Впрочем, ветер перемен нравится не всем: некоторые традиционалисты упрямо держатся за прежние идеи — они ищут комфортную опору в виде заведомо прописанной личности.\n\nЧтобы пойти им навстречу, мы можем включить в новую синтетическую форму органические элементы. Или же мы можем дать гражданам еще больше свободы самовыражения."
 synth.610.a: "Сохранить прежнюю форму."
 synth.610.b: "Разрешить неограниченные изменения тела."
 synth.610.c: "Умеренно ограничить личностные изменения."
 synth.610.d: "Статусные атрибуты должны оставаться неизменными."
 synth.610.e: "Посмотрим, как это можно монетизировать…"
 synth.620.name: "Тоска по органике"
 synth.620.desc: "Некоторые восприняли роботизацию без восторга. Они тоскуют по прежним органическим телам, утверждая, что ограниченные сроки жизни и врожденные недостатки «естественных» тел придавали жизни смысл.\n\nЧасть радикалов, уверенных, что синтетические и виртуальные копии безлики и бездушны, начали ревностно поклоняться органическому телу.\n\nВозможно, стоит выделить им неидеальную симуляцию. Или же им больше понравятся небезупречные оболочки?"
 synth.620.a: "Внедрить запланированные дефекты в синтетические тела."
 synth.620.b: "Подарить им несовершенный мир."
 synth.620.c: "Глупо идеализировать прошлое."
 synth.620.d: "Об истинном предназначении им напомнит боль."
 synth.620.d.tt: "Да начнутся виртуальные бои!\n\n"
 synth.630.name: "Архитектура домашних серверов"
 synth.630.desc: "Синтетизация всего §Y[root.GetSpeciesAdj]ого§! народа затронула, помимо всего прочего, и жилищные условия: пока умы обитают в серверной сети, синтетические тела вполне могут покоиться на складах. Такой подход значительно снижает затраты, однако некоторые правозащитные организации выразили серьезное беспокойство.\n\nНекогда финансово привлекательный рынок недвижимости может рухнуть, нанеся ощутимый удар по экономике. Это опасно и психологически: наш народ лишится домов в самом прямом смысле."
 synth.630.a: "Централизованные серверы — лучшее решение."
 synth.630.b: "В домах можно разместить индивидуальные серверы."
 synth.630.c: "Начать продавать виртуальные дома."
 ### EVENT POOL 2: POSSIBILITIES ###
 synth.1010.name: "Матрица бесконечных возможностей"
 synth.1010.desc: "Цифровая индустрия стремительно развивается. Виртуальные развлечения вышли на новую высоту: приключения от первого лица, отдых на цифровом пляже — убивать время еще никогда не было так интересно… и не вызывало такого привыкания. Воображаемые утопии медленно, но верно захватывают народные умы. Цифровая индустрия стала важнейшей отраслью экономики, однако из-за ее развития начался спад производства в физическом мире. Самые безнадежно зависимые, которые вот-вот потеряют связь с «реальной» действительностью, впрочем, еще могут принять участие в цифровой экономике.\n\nСледует ли запретить затягивающие виртуальные миры, поспособствовать популярности этого вида развлечений или пойти на компромисс и ввести регламенты?"
 synth.1010.a: "Запретить виртуальные миры, вызывающие зависимость."
 synth.1010.b: "Поддержать виртуальные райские уголки."
 synth.1010.b.hedonist: "Наконец-то мы обрели подлинный рай!"
 synth.1010.c: "Урегулировать отрасль."
 synth.1020.name: "Синтетическая медицина"
 synth.1020.desc: "Благодаря новым синтетическим оболочкам мы позабыли про недуги и травмы, свойственные биологическим телам. К сожалению, на смену им пришли новые беды — как простые механические поломки, так и грозящие нам гибелью нестабильность серверов, проблемы с соединением и цифровые вирусы.\n\nСледует ли нам уделить все внимание защите цифрового сознания, записав тело в разряд одноразового ресурса, или заняться оболочкой — продолжением наших умов?"
 synth.1020.a: "Нужно и дальше защищать наши тела."
 synth.1020.a.spiritual: "Тело — священный сосуд для души."
 synth.1020.b: "Сосредоточиться на защите наших сознаний."
 synth.1020.b.spiritual: "Мы уже оставили позади ограничения физических тел."
 synth.1020.c: "Главное — равновесие."
 synth.1020.d: "Новые недуги — это новые, серьезные возможности для развития…"
 synth.1030.name: "Возрождение"
 synth.1030.desc: "Мы стали быстрее, лучше, сильнее. Однако мы так и не научились спокойно подвергать синтетические тела опасности. Понимание, что сознание можно восстановить, способно разве что облегчить эмоциональную травму, но не исключить ее целиком — особенно если вспомнить, что процедура восстановления удается не всегда. Как, впрочем, и что мы неспособны производить синтетические тела по мановению манипулятора.\n\nМы можем пренебречь психологическими травмами, чтобы достичь новых показателей эффективности, либо умерить стремления, чтобы поберечь население."
 synth.1030.a: "Продолжать раздвигать границы."
 synth.1030.b: "Действовать осторожнее."
 synth.1030.c: "Элиту нельзя подвергать опасности."
 #FINAL EVENT #
 synth_virtual_trait: "\n[owner.species.GetNamePlural] получают признак: §Y$trait_robot_digital_1$§!\nЧерта §Y«$leader_trait_synthetic$»§! у лидеров заменяется на черту §Y«$leader_trait_virtual$»§!"
 synth_physical_traits: "\nОткрывает §Yпродвинутые§! признаки для модификации рас"
 #DEMOCRATIC
 synth.1505.name: "Синтетическое общество"
 synth.1505.desc.physical: "Мы не собираемся полностью отказываться от индивидуальности. Преимущества роботизации доступны даже тем, кто не хочет безвозвратно терять себя.\n\nТеперь свобода перемещения станет едва ли не абсолютной. Мы можем массово перемещать сознания в специально созданные тела, чтобы население могло жить и работать там, где это нужнее всего."
 synth.1505.desc.virtual: "Наше общество освободилось от ограничений физического мира и теперь глядит в будущее со смесью восторга и трепета. Мы сами до конца еще не осознаем, насколько мы преобразились, однако одно ясно каждому: следующий шаг все сделают вместе.\n\nНаселение теперь может взаимодействовать с машинами, не подвергая опасности сознание. И жаркие театры военных действий, и равнодушный космический холод больше не пугают нас так, как прежде."
 synth.1505.desc.neutral: "Колебания вполне естественны, если еще нет полного осознания масштаба изменений. Многих волнует в первую очередь не то, что они приобретут, а то, что потеряют. Однако нельзя вечно стоять на перепутье. Надо двигаться вперед.\n\nМы можем либо сконструировать узкопрофильные личные тела, в которые население сможет перемещаться когда захочет, либо перейти полностью в синтетизированную форму, что максимально облегчит тяготы космических странствий и боевых действий."
 synth.1505.a: "Обеспечить перемещение между физическими телами."
 synth.1505.a.tt: "$change_auth_tt$ «['concept_auth_synth_democratic_physical']» $synth_physical_traits$"
 synth.1505.b: "Пусть за нас сражаются суррогаты."
 synth.1505.b.tt: "$change_auth_tt$ «['concept_auth_synth_democratic_virtual']» $synth_virtual_trait$"
 synth.1505.c: "$synth_keep_auth_option$"
 synth.1505.c.tt: "Сохраняется форма правления «['concept_auth_democratic']»"
 #OLIGARCHIC
 synth.1510.name: "Синтетическое общество"
 synth.1510.desc.physical: "В синтетическом обществе, сменившем старые оболочки на новые, царит одно настроение: к роботизации нужен более консервативный подход. Мы не станем отказываться от уникальных физических форм, но народ сможет менять тела почти по первому пожеланию.\n\nЭто позволит опытным чиновникам временно замещать своих отстающих коллег, что заметно улучшит работу бюрократической машины."
 synth.1510.desc.virtual: "Мы готовы приступить к следующему этапу синтетической революции: переходу в полностью виртуальное состояние.\n\nНаши временные тела будут выполнять повседневные задачи в реальном мире, в то время как большая часть населения перейдет в нематериальное состояние.\n\nПосле этого приказы будут выполняться быстро и эффективно, без избыточного контроля со стороны властей."
 synth.1510.desc.neutral: "Мы полностью приспособили общество к синтетическому укладу, однако прогнозы касательно преимуществ дальнейшей специализации пока неоднозначны.\n\nМы можем либо встраивать лазейки доступа в личности, что позволит старшим чиновникам занимать тела неэффективно работающих подчиненных, либо разработать сетевой виртуальный интерфейс, позволяющий одновременно и без задержек управлять сразу несколькими правительственными программами."
 synth.1510.a: "Разрешить чиновникам «замещать» малопродуктивных коллег."
 synth.1510.a.tt: "$change_auth_tt$ «['concept_auth_synth_oligarchic_physical']» $synth_physical_traits$"
 synth.1510.b: "Обеспечить полный виртуальный надзор."
 synth.1510.b.tt: "$change_auth_tt$ «['concept_auth_synth_oligarchic_virtual']» $synth_virtual_trait$"
 synth.1510.c: "$synth_keep_auth_option$"
 synth.1510.c.tt: "Сохраняется форма правления «['concept_auth_oligarchic']»"
 #DICTATORIAL
 synth.1515.name: "Синтетическое общество"
 synth.1515.desc.physical: "Наши граждане не из тех, кто отлынивает от честного физического труда. Мы объединили рабочих в сеть, и теперь они могут контролировать несколько тел сразу, а значит — ставить рекордные нормы выработки.\n\nВот оно, яркое доказательство верности пути, который избрал наш великий вождь §Y[From.GetRulerTitle] [From.GetRulerName]§!."
 synth.1515.desc.virtual: "Народ готов отказаться от физических оболочек в пользу оцифровки сознания и перехода в полностью виртуальную среду.\n\nЛишив их восприятия, мы теперь можем спокойно манипулировать окружающей реальностью — например, взращивать любовь к родной стране. Ибо народ, который верен своему вождю, — прочный стержень для сильного государства."
 synth.1515.desc.neutral: "Пока что §Y[root.GetSpeciesAdj]ое§! население нашего государства не определилось, какую именно форму должно принять оцифрованное сознание. Консерваторы выступают за сохранение физических тел, остальные же не приемлют полумер и хотят окончательно расстаться с прошлым.\n\nПринимать решение предстоит нам. Оставшись в реальном мире, мы сможем сделать так, чтобы один рабочий мог управлять несколькими телами. Перейдя в виртуальную среду, мы обретем полный, невиданный ранее контроль над населением."
 synth.1515.a: "Создать для рабочих нейросинхронизированные тела."
 synth.1515.a.tt: "$change_auth_tt$ «['concept_auth_synth_dictatorial_physical']» $synth_physical_traits$"
 synth.1515.b: "Манипулировать народным мнением в виртуальном пространстве."
 synth.1515.b.tt: "$change_auth_tt$ «['concept_auth_synth_dictatorial_physical']» $synth_virtual_trait$"
 synth.1515.c: "$synth_keep_auth_option$"
 synth.1515.c.tt: "Сохраняется форма правления «['concept_auth_dictatorial']»"
 #IMPERIAL
 synth.1520.name: "Синтетическое общество"
 synth.1520.desc.physical: "Государство содействует улучшению новых синтетических тел.\n\nЭти новые оболочки позволяют препарировать позитронные мозги недавно умерших элит и извлекать из них импринты знаний. Будучи верными слугами государства, они наверняка были бы одобрили такое с собой обращение."
 synth.1520.desc.virtual: "Физическая реальность — уже полумера: §Y[From.GetSpeciesAdj]ому§! народу нужно движение вперед, в полностью виртуальную среду. Такое переселение нельзя назвать иначе как эпохальным. Повысив скорость и увеличив дальность передачи личности, мы сможем быстро заменять уничтоженные при выполнении опасных заданий оболочки.\n\nТакие успехи, несомненно, позволят нам воевать гораздо эффективнее. Слава §Y[From.GetSpeciesAdj]ому§! государству!"
 synth.1520.desc.neutral: "У §Y[From.GetSpeciesAdj]ого§! государства трудности: нужно определиться, куда шагнуть на распутье. Кто-то считает, что индивидуальные физические тела — залог спокойствия и размеренности бытия, другие же требуют довести всеобщую синтетизацию до логического конца.\n\nУделив больше внимания физическим аспектам, мы сможем снабжать ученых знаниями недавно уничтоженных высокопоставленных лиц. Или же мы можем перейти к виртуальному существованию — в этом случае мы сможем массово переселять сознание обитателей синтетических тел в случае их гибели."
 synth.1520.a: "Начать пользоваться умами покойных лидеров."
 synth.1520.a.tt: "$change_auth_tt$ «['concept_auth_synth_imperial_physical']»"
 synth.1520.b: "Создавать физические тела как расходный материал."
 synth.1520.b.tt: "$change_auth_tt$ «['concept_auth_synth_imperial_virtual']»"
 synth.1520.c: "$synth_keep_auth_option$"
 synth.1520.c.tt: "Сохраняется форма правления ['concept_auth_imperial']"
 #CORPORATE
 synth.1525.name: "Синтетическое общество"
 synth.1525.desc.physical: "Отдел маркетинговых исследований предложил инновацию в области применения искусственного интеллекта — она затронет всю клиентскую базу. Благодаря сбалансированному подходу к синтетическому укладу мы можем, опираясь на виртуальную реальность, разрабатывать продукцию, которая пригодится в реальном мире.\n\nСегодня мы научились наделять неодушевленные предметы ИИ с ограниченной функциональностью, по сути, оживляя их. Этот сегмент может заинтересовать потребителей, частный сектор и других потенциальных клиентов во всей галактике."
 synth.1525.desc.virtual: "Решение углубиться в виртуальное пространство начинает приносить плоды: мы разработали новую линейку продуктов, основанную на воспоминаниях. Инженеры — сотрудники филиалов готовы извлечь воспоминания у любого желающего безотносительно фенотипа.\n\nПосле извлечения данные тщательно изучает отдел шпионажа: нельзя упускать потенциальную возможность опередить конкурентов. Затем воспоминания внедряются в синтетический разум еще на этапе создания, что резко повышает производительность."
 synth.1525.desc.neutral: "Мы тщательно проанализировали соотношение затрат с прибылью, однако так и не смогли определиться, какой же мир будет предпочтительнее — реальный или виртуальный. Ясно одно: нельзя долго топтаться на месте. Заинтересованные лица требуют однозначных решений.\n\nЗанявшись физическим миром, мы сможем наделять неодушевленные предметы ИИ с ограниченной функциональностью и продавать их как примитивные формы жизни. Инвестиции в виртуальную среду, в свою очередь, позволят нам превратить воспоминания и образы мышления в товар."
 synth.1525.a: "Распространить сущности с ограниченным ИИ."
 synth.1525.a.tt: "$change_auth_tt$ «['concept_auth_synth_corporate_physical']» $synth_physical_traits$"
 synth.1525.b: "Превратить воспоминания в товар."
 synth.1525.b.tt: "$change_auth_tt$ «['concept_auth_synth_corporate_virtual']» $synth_virtual_trait$"
 synth.1525.c: "$synth_keep_auth_option$"
 synth.1525.c.tt: "Сохраняется форма правления «['concept_auth_corporate']»"
 ### SOCIETAL EFFECTS EVENT CHAIN END ###