 pops_are: "$t$"
 #Buildings
 building_identity_complex: "Личностный комплекс"
 building_identity_complex_desc: "Высокотехнологичный центр исследования и разработки синтетических личностей."
 building_identity_complex_speed: "§G+100§! £pop£ §Hпоселений§!"
 building_identity_complex_effect_desc: "В месяц выгружается $building_identity_complex_speed$."
 building_ai_emporium: "Центр ИИ"
 building_ai_emporium_desc: "Универсальный мегакомплекс, где предоставляются любые услуги, связанные с искусственным интеллектом. Здесь можно превратить обычные предметы в ИИ-компаньоны для дома или бизнеса. «Умный» гаджет стал слишком умным? Приносите его сюда, наши опытные специалисты сбросят его до заводских настроек быстрее, чем космолеты летают!"
 building_ai_emporium_fail_tt: "$TRIGGER_FAIL$У нас уже есть §Y$building_ai_emporium$§! на [planet.owner.GetPlanetMoon]е §Y[planet.owner.GetName]§!"
 building_ai_emporium_outlawed_robots_tt: "$TRIGGER_FAIL$Роботы на [planet.owner.GetPlanetMoon]е §Y[planet.owner.GetName]§! запрещены"
 building_clear_thought_clinic: "Клиника чистки разума"
 building_clear_thought_clinic_desc: "Разум забит ненужными воспоминаниями? Превратите их в энергокредиты! Наши опытные специалисты извлекут их без вреда для вашего здоровья. Чем приятнее воспоминание, тем больше денег вы за него получите!\n\nОперация необратимая, мыслительные паттерны после извлечения восстановлению не подлежат."
 clear_thought_clinic_modifier: "$building_clear_thought_clinic$"
 clear_thought_clinic_tt: "Несуммируемый модификатор агентурной сети: $TABBED_NEW_LINE$$MOD_SPY_NETWORK_DAILY_VALUE_MULT$: §G+25%§! $TABBED_NEW_LINE$$MOD_SPY_NETWORK_LEVELS_ADD$: §G+10§!"
 #Jobs
 m_pop_assembly: "£mod_planet_pop_assembly_add£ §Y$MOD_PLANET_POP_ASSEMBLY_ADD$§!"
 job_identity_designer: "Конструктор личности"
 job_identity_designer_plural: "Конструкторы личности"
 job_identity_designer_plural_with_icon: "£job_identity_designer£ $job_identity_designer_plural$"
 job_identity_designer_converter_desc: "$job_identity_designer_plural$ обеспечивают безболезненный перенос биологической личности в цифровую форму."
 job_identity_designer_converter_effect_desc: "$job_identity_designer_plural_with_icon$ дают $i_engineering$ и $i_amenities$"
 job_identity_designer_desc: "$job_identity_designer_plural$ скрупулезно собирают новые синтетические сознания."
 job_identity_designer_effect_desc: "$job_identity_designer_plural_with_icon$ дают $i_engineering$, $i_amenities$ и $m_pop_assembly$ на всех планетах государства"
 mod_job_identity_designer_add: "Должности конструкторов личности"
 job_roboticist_plural_and_job_identity_designer_plural: "[roboticist.GetNamePlural] и $job_identity_designer_plural$"
 job_roboticist_plural_with_icon_and_job_identity_designer_plural_with_icon: "$job_roboticist_plural_with_icon$ и $job_identity_designer_plural_with_icon$"
 councilor_ruler_imperial_synth: "$imperial_ruler$"
 councilor_ruler_imperial_synth_desc: "$imperial_ruler_desc$"
 #Traits
 #Modifiers
 synth_opposition_truth: "Информационная кампания в поддержку синтетизации"
 synth_opposition_truth_desc: "Распространять правдивую информацию обо всех аспектах процесса синтетизации."
 synth_opposition_deception: "Пропаганда синтетизации"
 synth_opposition_deception_desc: "Попытаться повлиять на общественное мнение, сделав упор на положительные стороны синтетизации разума."
 synth_tinkering_with_minds: "Вмешательство в умы"
 synth_tinkering_with_minds_desc: "В новооцифрованные умы вносятся небольшие изменения, чтобы они лучше соответствовали нашему видению будущего."
 synth_brightest_minds: "Приоритет умнейшим"
 synth_brightest_minds_desc: "Для участия в программе синтетизации отбираются только самые выдающиеся индивиды."
 synth_reprogram_minds: "Репрессивное перепрограммирование"
 synth_reprogram_minds_desc: "Правительство активно перепрограммирует «несоответствующих» индивидов в процессе их оцифровки."
 victim_compensation: "Компенсация жертвам"
 victim_compensation_desc: "Семьям тех, чьи умы были утеряны в процессе синтетизации, выплачиваются компенсации."
 synth_mandatory_volunteers: "Добровольцы в обязательном порядке"
 synth_mandatory_volunteers_desc: "Для участия в экспериментах по оцифровке биологического сознания насильно привлекаются подопытные."
 synth_mass_demonstrations: "Массовые демонстрации"
 synth_mass_demonstrations_desc: "Рабочие планеты заняты массовыми протестами против запланированного переноса сознаний в машины."
 synth_fund_heritage_sites: "Финансирование объектов наследия"
 synth_fund_heritage_sites_desc: "Особые объекты наследия помогут ограничить влияние синтетического перехода на биологических членов нашей расы."
 synth_revere_the_past: "Почитание прошлого"
 synth_revere_the_past_desc: "Мы все еще чтим религиозные обряды, зародившиеся в эпоху нашего биологического существования, и потому наш долг — защитить старые обрядовые места."
 synth_preserve_the_past: "Сохранение прошлого"
 synth_preserve_the_past_desc: "Полный переход к новому существованию не означает, что мы должны уничтожать места и объекты, которые имели значение для нашего биологического прошлого."
 synth_resistance_fight: "Аресты лидеров сопротивления"
 synth_resistance_fight_desc: "Мы быстро подавим протесты, если отправим механизированные отряды в $d_biological_enclaves_no_icon$ и устроим облавы на лидеров сопротивления."
 synth_resistance_diplomacy: "Переговоры с лидерами сопротивления"
 synth_resistance_diplomacy_desc: "Мы добьемся взаимопонимания с протестующими, если отправим делегации в $d_biological_enclaves_no_icon$ для переговоров с лидерами сопротивления."
 synth_character_force: "Имитация старых органических форм"
 synth_character_force_desc: "Даже в цифровом мире мы сохраним традиционный облик нашей расы."
 synth_character_customize: "Отсутствие ограничений на модификацию синтетического тела"
 synth_character_customize_desc: "Индивиды могут свободно модифицировать свой новый цифровой облик."
 synth_character_customize_elite: "Ограничения на модификацию синтетического тела"
 synth_character_customize_elite_desc: "Для сохранения четкой социальной иерархии модифицировать свой облик позволено только высшим слоям общества."
 synth_character_customize_corpo: "Монетизация модификации синтетического тела"
 synth_character_customize_corpo_desc: "Модифицировать свой облик можно свободно — тем, у кого есть на это деньги."
 synth_cravings_imperfections: "Намеренные синтетические несовершенства"
 synth_cravings_imperfections_desc: "Чтобы избежать пустого и обезличенного существования, в синтетические тела намеренно вносятся несовершенные элементы."
 synth_cravings_simulation: "Жизнь в симуляции"
 synth_cravings_simulation_desc: "Для тех из нас, кто выбрал жизнь в цифровом мире, мы создаем реалистичное виртуальное пространство, с тяготами и лишениями."
 synth_cravings_stop: "Игнорирование бескомпромиссных поборников органики"
 synth_cravings_stop_desc: "Со временем наши сограждане оценят идеальную жизнь без органических тягот."
 synth_cravings_pain: "Виртуальная боевая арена"
 synth_cravings_pain_desc: "Ожесточенные виртуальные битвы — любимое времяпрепровождение для многих, как участников, так и зрителей."
 synth_health_physical: "Приоритет физического здоровья синтетиков"
 synth_health_physical_desc: "Первоочередная задача нашего синтетического здравоохранения — устранение местных поломок."
 synth_health_virtual: "Приоритет душевного здоровья синтетиков"
 synth_health_virtual_desc: "Для здоровья важно обеспечивать безопасность умов за счет постоянных программных обновлений."
 synth_health_both: "Сбалансированный подход к здоровью синтетиков"
 synth_health_both_desc: "Для здоровья наших сограждан важно устранять как программные, так и аппаратные неисправности."
 synth_health_corporate: "Медикализация синтетиков"
 synth_health_corporate_desc: "Расширение компетенций нашей корпорации за пределы обычной медицины имеет важнейшее значение для лечения цифровых вирусов."
 synth_virtual_world_outlaw: "Запрет на цифровые миры"
 synth_virtual_world_outlaw_desc: "Вызывающие привыкание виртуальные курорты признаны угрозой обществу и запрещены законом."
 synth_virtual_world_promote: "Реклама виртуальных миров"
 synth_virtual_world_promote_desc: "Граждане могут свободно наслаждаться почти бесконечным разнообразием развлечений в цифровой утопии."
 synth_virtual_world_regulate: "Регулирование виртуальных миров"
 synth_virtual_world_regulate_desc: "Вызывающие привыкание виртуальные миры подлежат жесткому регулированию, чтобы граждане не теряли связи с реальностью."
 synth_home_centralized: "Централизованные серверные парки"
 synth_home_centralized_desc: "Все оцифрованные сознания хранятся на централизованных государственных серверных парках для обеспечения максимальной экономической эффективности."
 synth_home_distributed: "Распределенные домашние сервера"
 synth_home_distributed_desc: "Оцифрованные сознания хранятся на традиционных частных серверах."
 synth_digital_homes: "Цифровая недвижимость"
 synth_digital_homes_desc: "Цифровая недвижимость аналогична традиционной, но дает сравнимый доход при куда меньших затратах."
 synth_respawn_push: "Нестрогие стандарты безопасности для синтетиков"
 synth_respawn_push_desc: "Мягкие стандарты физической безопасности способствуют развитию экономики."
 synth_respawn_caution: "Стандарты безопасности для синтетиков"
 synth_respawn_caution_desc: "Защиту тел и умов синтетиков можно обеспечить только жесткими правилами, разработанными государством."
 synth_respawn_elite: "Привилегии безопасности для синтетиков"
 synth_respawn_elite_desc: "Высшим слоям общества запрещено заниматься трудом, опасным для тела или ума."
 synth_cultural_exchange: "Культурное взаимопонимание"
 synth_cultural_exchange_desc: "Программы культурного обмена и экскурсии к объектам наследия помогают развивать взаимопонимание между нашими народами."
 synth_combat_reactors: "Боевые реакторы"
 synth_combat_reactors_desc: "Мы оснастили свои тела реакторами на технологии микротермоядерного синтеза, что заметно повысило наши боевые характеристики."
 synth_AI_actor: "ИИ-представитель"
 synth_AI_actor_desc: "Мы задействуем в информационной кампании ИИ-копию умершей знаменитости, чтобы повысить поддержку программы синтетизации."
 #Deposits
 d_old_towns_no_icons: "Старые города"
 d_old_towns: "£blocker£ $d_old_towns_no_icons$"
 d_old_towns_desc: "В этом регионе много хорошо сохранившихся городов, в которых живут члены нашей первоначальной расы. Потратив некоторое количество ресурсов, мы можем попробовать убедить этих ретроградов принять переход в машинную форму."
 d_old_towns_custom_tooltip: "Будут созданы [Owner.GetMechanicalPops]: §Y[Owner.GetNumSynthOpposition]§! шт."
 d_biological_enclaves_no_icon: "Биологические анклавы"
 d_biological_enclaves: "£blocker£ $d_biological_enclaves_no_icon$"
 d_biological_enclaves_desc: "В этом регионе много городов, где живут те, кто отказался от синтетического перехода."
 d_biological_enclaves_custom_tooltip: "Будут созданы [Owner.GetMechanicalPops]: §Y[Owner.GetNumSynthOpposition]§! шт."
 #Policies
 policy_synthetic_identities_policy: "Синтетические личности"
 policy_synthetic_identities_policy_desc: "Чтобы мы множились, нам нужно создавать новые синтетические личности."
 identity_copy_name: "Копирование личностей"
 identity_copy: "$identity_copy_name$"
 identity_copy_desc: "$tech_identity_copy_desc$\n\nКопии испытывают лишь легкую подавленность от осознания своей вторичности.\n\n$TECH_UNLOCK_IDENTITY_COPY_DESC$\n\n§E$identity_copy_name$ $can_enable_mind_creation$§!"
 identity_fusion_name: "Слияние личностей"
 identity_fusion: "$identity_fusion_name$"
 identity_fusion_desc: "$tech_identity_fusion_desc$\n\n$TECH_UNLOCK_IDENTITY_FUSION_DESC$\n\n§E$identity_fusion_name$ $can_enable_mind_creation$§!"
 identity_initialization_name: "Инициализация личности"
 identity_initialization: "$identity_initialization_name$"
 identity_initialization_desc: "$tech_identity_initialization_desc$\n\n$TECH_UNLOCK_IDENTITY_INITIALIZATION_DESC$\n\n§E$identity_initialization_name$ $can_enable_mind_creation$§!"
 can_enable_mind_creation: "используется при сборке синтетиков"
 policy_computation_core_allocation: "Специализация на вычислительных ядрах"
 policy_computation_core_allocation_desc: "Синтетизированные корпорации могут мгновенно направлять вычислительные циклы своих основных систем на оптимизацию особо важных социальных секторов."
 computation_core_production_name: "Модернизация производства"
 computation_core_production: "$computation_core_production_name$"
 computation_core_production_desc: "Направить вычислительные циклы на оптимизацию производственных процессов.$computation_core_production_tt$"
 computation_core_production_tt: "\n\n$EFFECTS_HEADER$ $NEW_LINE$- Каждые $pop_group_unit$ £job_roboticist£ роботостроителей и £job_identity_designer£ конструкторов личности повышают §Yэффективность работы £job_foundry£ металлургов§! и §Y£job_artisan£ ремесленников§! на §G+2,5%§!"
 computation_core_stability_name: "Анализ стабильности"
 computation_core_stability: "$computation_core_stability_name$"
 computation_core_stability_desc: "Выделить ресурсы на анализ информации о состоянии общества на предмет аномалий.$computation_core_stability_tt$"
 computation_core_stability_tt: "\n\n$EFFECTS_HEADER$ $NEW_LINE$- Каждые $pop_group_unit$ £job_roboticist£ роботостроителей и £job_identity_designer£ конструкторов личности повышают §Yэффективность работы £job_bureaucrat£ бюрократов§! на §G+2,5%§!"
 computation_core_research_name: "Исследовательские процессы"
 computation_core_research: "$computation_core_research_name$"
 computation_core_research_desc: "Перебросить мощности с производственных установок на ресурсоемкие научные сервера.$computation_core_research_tt$"
 computation_core_research_tt: "\n\n$EFFECTS_HEADER$ $NEW_LINE$- Каждые $pop_group_unit$ £job_roboticist£ роботостроителей и £job_identity_designer£ конструкторов личности повышают §Yэффективность работы £job_physicist£ физиков§!, §Y£job_biologist£ биологов§! и §Y£job_engineer£ инженеров§! на §G+2,5%§!"
 #Technologies
 tech_identity_copy: "Копирование личностей"
 tech_identity_copy_desc: "Мы сможем переносить личности и воспоминания синтетиков в новые механические тела. Каждая копия будет обладать предсказуемым набором умений, однако вряд ли станет интересным собеседником."
 TECH_UNLOCK_IDENTITY_COPY_TITLE: "Открывает доступ к политике: $TABBED_NEW_LINE$§H$policy_synthetic_identities_policy$§! - $identity_copy_name$"
 TECH_UNLOCK_IDENTITY_COPY_DESC: "£pop£ §HМеханические поселения§!$TABBED_NEW_LINE$Счастье: §R−5%§!"
 tech_identity_fusion: "Слияние личностей"
 tech_identity_fusion_desc: "Объединив в одном теле личности и воспоминания двух или более синтетиков, мы получим нового индивида, которого можно даже назвать уникальным."
 TECH_UNLOCK_IDENTITY_FUSION_TITLE: "Открывает доступ к политике: $TABBED_NEW_LINE$§H$policy_synthetic_identities_policy$§! - $identity_fusion_name$"
 TECH_UNLOCK_IDENTITY_FUSION_DESC: "£pop£ §HМеханические поселения§!$TABBED_NEW_LINE$Стоимость сборки: §R+10%§!"
 tech_identity_initialization: "Инициализация личности"
 tech_identity_initialization_desc: "Мы сможем запустить личностное ядро и обеспечить ему виртуальное детство. Затраты будут велики, но симуляция жизненных ситуаций позволит создать продуктивную личность."
 TECH_UNLOCK_IDENTITY_INITIALIZATION_TITLE: "Открывает доступ к политике: $TABBED_NEW_LINE$§H$policy_synthetic_identities_policy$§! - $identity_initialization_name$"
 TECH_UNLOCK_IDENTITY_INITIALIZATION_DESC: "£pop£ §HМеханические поселения§!$TABBED_NEW_LINE$Счастье: §G+5%§!$TABBED_NEW_LINE$Ресурсы от £job£ §Hзанятого населения§!: §G+5%§!$TABBED_NEW_LINE$Стоимость сборки: §R+20%§!"
 #DIGITIZATION STAGE 1
 synth.100.name: "Загрузка" #Stage 1 - Start event
 synth.100.desc: "Пришло время отбросить биологию и облачиться в металлы и электричество. Мы готовы ускорить свой ум и шагнуть в будущее в новых, высокотехнологичных телах. [Owner.Species.GetFleshTypeCyberCreed] — это обуза, но машины можно совершенствовать.\n\nОднако переход будет непростым. Научное сообщество требует построить хотя бы один $building_identity_complex$, который станет центром развития синтетиков. Наше будущее ждет нас."
 synth.100.a: "Мы сами построим свое будущее."
 synth.100.a.tt: "§RНеобходимо действие:§!\nПостройте $building_identity_complex$, чтобы продолжить инцидент §Y«$situation_digitization$»§!."
 synth.105.name: "Совершенные конструкции"
 synth.105.desc: "Расширенные вычислительные мощности синтетического мозга позволят нам даже превзойти возможности наших старых биологических тел. Однако даже у новых мощностей есть свои границы, так что нам придется расставить приоритеты.$synth.105.end$"
 synth.105.end: "\n\nМы можем усилить способности к принятию решений, расширить память или оптимизировать моторику и координацию движений — каждое из этих усовершенствований повысит производительность в тех или иных сферах. Или же мы можем увеличить долговечность всех тел.\n\nЭти функции требуют постоянной поддержки и будут доступны только на планетах, где построен завод по сборке роботов, но модернизация конструкции сулит нам быстрое повышение продуктивности."
 synth.105.a: "Оптимизировать принятие решений."
 build_better_synths: "Заводы по сборке роботов получают модификатор:"
 synth.105.a.tt: "$build_better_synths$\nПроизводство ресурсов элитными поселениями: §G+15%§!\n\n"
 synth.105.b: "Улучшить память."
 synth.105.b.tt: "$build_better_synths$\nПроизводство ресурсов специалистами: §G+5%§!\n\n"
 synth.105.c: "Улучшить двигательные функции."
 synth.105.c.tt: "$build_better_synths$\nПроизводство ресурсов рабочими: §G+10%§!\n\n"
 synth.105.d: "Увеличить долговечность."
 synth.105.d.tt: "$build_better_synths$\n$mod_planet_jobs_upkeep_mult$: §G−5%§!\n\n"
 #Stage 1 Opportunities - Research
 synth.120.name: "Кинестетический микротермояд"
 synth.120.desc: "«С микротермоядерными модификациями вы поднимете танк!» — восхищается журналист крупной обзорной публикации. И это не преувеличение: последние достижения микротермоядерной технологии позволят серьезно улучшить наши механические тела.\n\nКомпактный персональный реактор внутри тела — деталь небезопасная, но он обеспечивает своему носителю невероятную силу и скорость. И конечно, установка реактора в тело выходит далеко за пределы первоначального проекта и потребует переоценки сроков производства."
 synth.120.a: "Мы должны стремиться к совершенству!"
 synth.120.a.tt: "Скорость развития инцидента §Y«$situation_digitization$»§! на §Y1§! год: §R−50%§!"
 situation_kinesthetic_microfusion_tt: "Кинестетическая микротермоядерная конфигурация"
 synth.120.b: "Ненужная функция."
 synth.120.c: "Заняться оттачиванием боевых характеристик."
 #Stage 1 Challenges - Research
 synth.160.name: "Общественный резонанс"
 synth.160.desc: "Внимание общественности захвачено новым популярным сериалом. Сюжет вращается вокруг синтетического рабочего, который постепенно теряет связь со своим новым телом.\n\nСемья и друзья могут лишь с ужасом наблюдать за тем, как жизнь несчастного героя рушится перед их глазами. Трагическая концовка сериала воспринимается многими как тонко завуалированная критика нашей программы переселения в механические тела.\n\nСпоры вокруг этого телехита породили сопротивление нашим планам, которое может замедлить ход проекта."
 synth.160.a: "Пошумят и забудут."
 synth.160.b: "Перенаправить часть средств с исследований на агитацию."
 synth.160.c: "Арестовать режиссера."
 synth.160.d: "Запретить все освещение в СМИ."
 #DIGITIZATION STAGE 2
 synth.200.name: "Философия сознания" #Stage 2 - Start event
 synth.200.desc: "Мы думали, что выгоды полностью оцифрованного сознания очевидны настолько, что наша программа не встретит никаких возражений. Пожалуй, мы были наивны. Мы столкнулись с сильным общественным сопротивлением полной синтетизации, и теперь нам нужно как-то его преодолеть.\n\nОсновной аргумент критиков заключается в том, что никто не может доказать возможность полного переноса личности в целости и без потерь. Существуют небеспочвенные опасения, что до сих пор нам удавалось лишь снимать цифровые копии. Вопрос заключается в следующем: действительно ли это наши собственные сознания?"
 synth.200.a: "Сказать правду: мы не знаем."
 synth.200.a.tt: "Информировать население: это вызовет §Hминимальное§! сопротивление синтетизации\n\n"
 synth.200.b: "Сказать им то, что они хотят услышать."
 synth.200.b.tt: "Дезинформировать население: это вызовет §Hумеренное§! сопротивление синтетизации\n\n"
 synth.200.c: "Кучка несогласных нас не остановит."
 synth.200.c.tt: "Проигнорировать несогласных: это вызовет §Hмаксимальное§! сопротивление синтетизации"
 synth.200.c.material: "Вопросы сознания нас не касаются."
 synth.200.c.material.tt: "Чисто научный подход вызовет §Hумеренное§! сопротивление синтетизации\n\n"
 synth.205.name: "Цепляясь за прошлое"
 synth.205.desc: "Проект синтетизации нашего населения продолжает сталкиваться с сопротивлением: наши стражи порядка едва сдерживают многочисленные массовые демонстрации. Протестующие боятся потерять то, что наполняет жизнь смыслом. Зачем подвергать себя синтетизации, если в результате ты навсегда теряешь возможность испытывать физические удовольствия и чувство близости с другими?\n\nСамые радикальные протестующие требуют превратить отдельные города в объекты наследия, где будут жить те, кто откажется расставаться с биологическим телом."
 synth.205.a.regular: "Мы полностью за такие объекты наследия."
 synth.205.a.spiritualist: "Надо сохранять прошлое."
 synth.205.a.memorialist: "Почитание прошлого — это благо."
 synth.205.b: "Прошлое должно остаться в прошлом."
 #Stage 2 Opportunities - Objectors
 synth.220.name: "Вторая жизнь"
 synth.220.desc: "Знаменитость, известная своими антисинтетическими взглядами, попала в катастрофу и теперь находится в вегетативном состоянии. Пока население оплакивает потерю кумира, наши советники из числа сторонников синтетизации предлагают воспользоваться ситуацией.\n\nЕсли мы оцифруем разум знаменитости и дадим ей новое роботизированное тело, часть ее поклонников непременно переметнется в лагерь сторонников синтетизации. С точки зрения законности проблем быть не должно, вопрос упирается в добровольное согласие: при прочих равных эта знаменитость никогда не согласилась бы на такую процедуру. Если мы подойдем к делу необдуманно, наша пиар-акция может обернуться грандиозным скандалом."
 synth.220.a: "Синтетизация — это не преступление."
 synth.220.a.tt.negative: "Скорость развития инцидента §Y«$situation_digitization$»§! на §Y6§! месяцев: §R−30%§!"
 synth.220.a.tt.positive: "Скорость развития инцидента §Y«$situation_digitization$»§! на §Y6§! месяцев: §G+30%§!"
 synth.220.b: "Не будем рисковать."
 synth.220.c: "Обмануть население ИИ-имитацией."
 synth.220.c.tt: "Образ знаменитости станет актером в нашей кампании."
 #Stage 2 Challenges - Objectors
 synth.260.name: "Потерянные умы"
 synth.260.desc: "Эксперименты по оцифровке триллионов синаптических связей, формирующих биологическое сознание, закончились катастрофой. Простая синтаксическая ошибка привела к моментальному распаду нервных путей наших подопытных. Кое-кто называет произошедшее убийством.\n\nВсе участники эксперимента были добровольцами, но их семьи теперь требуют правосудия. Вдобавок к этому, найти новых подопытных теперь стало намного сложнее."
 synth.260.a: "Выплатить компенсации и продолжить."
 synth.260.b: "Новые подопытные будут выбираться лотереей."
 synth.260.b.tt: "Скорость развития инцидента §Y«$situation_digitization$»§! на §Y1§! год: §R−25%§!"
 situation_test_subject_lottery_tt: "Лотерея для подопытных"
 synth.260.c: "Найти новых добровольцев. Если понадобится — назначить."
 #DIGITIZATION STAGE 3
 synth.300.name: "Массовая загрузка личностей" #Stage 3 - Start event
 synth.300.desc: "На каждой нашей планете, в каждом крупном городе установлены будки синтетизации, ждущие, когда в них зайдут наши первые [owner.species.GetNamePlural]. Цифровые личностные паттерны, которые разработали наши $job_identity_designer_plural$, гарантируют полное соответствие биологическому оригиналу.\n\nНаконец-то настал день, когда мы готовы отбросить биологическое прошлое и вступить в синтетическое будущее."
 synth.300.a: "Синтетизируй!"
 synth.300.a.resistance.tt: "$unlock_edict_tt$ ['concept_edict_subsidized_identity_backups']\n\n§Y[Owner.GetBiologicalPops] ([Owner.GetNumSynthOpposition] шт.)§! переселятся в §Y$d_biological_enclaves$§! на планете [root.owner.capital_scope.GetName]\nПри расчистке этого препятствия вы получите §Y[Owner.GetMechanicalPops] ([Owner.GetNumSynthOpposition] шт.)§!\n\nНа планете [root.owner.capital_scope.GetName] исчезнет модификатор §Y$synth_mass_demonstrations$§!\n\nСкорость синтетизации зависит от подхода к инциденту и количества заводов по сборке роботов."
 synth.300.a.heritage.tt: "$unlock_edict_tt$ ['concept_edict_subsidized_identity_backups']\n\n§Y[Owner.GetBiologicalPops] ([Owner.GetNumSynthOpposition] шт.)§! переселятся в §Y$d_old_towns$§! на планете [root.owner.capital_scope.GetName]\nПри расчистке этого препятствия вы получите §Y[Owner.GetMechanicalPops] ([Owner.GetNumSynthOpposition] шт.)§!\n\nСкорость синтетизации зависит от подхода к инциденту и количества заводов по сборке роботов."
 synth.305.name: "Синтетический туризм"
 synth.305.desc: "Учреждение объектов наследия на планете [root.owner.capital_scope.GetName] было воспринято публикой благосклонно — можно сказать, что инициатива оказалась слишком удачной. Одержимые ностальгией, туристы-синтетики наводнили эти места, и их число начинает причинять беспокойство местным биологическим жителям.\n\nБыть может, нам стоит ограничить такой туризм, чтобы сохранить аутентичность этих мест. С другой стороны, взаимодействие туристов и местных жителей может стать полем интересных социологических исследований."
 synth.305.a: "Ограничить туризм."
 synth.305.b: "Мы всем рады, это доходно."
 synth.305.c: "Изучить влияние туризма на эти объекты."
 synth.305.d: "Культурный обмен способствует взаимопониманию."
 synth.310.name: "Сопротивление"
 synth.310.desc: "Движение против синтетизации на планете [root.owner.capital_scope.GetName] принимает все более радикальные формы в вопросах как целей, так и тактики. Наши спецслужбы отмечают эскалацию насилия и распространение нелегального оружия в наиболее радикальных ячейках движения.\n\nНекоторые из этих диссидентов объявили себя «лидерами сопротивления», залегли на дно и теперь готовят открытые выступления против правительства."
 synth.310.a: "Схватить лидеров."
 synth.310.a.tt: "Скорость развития инцидента §Y«$situation_digitization$»§! на §Y1§! год: §G+25%§!\n\n"
 synth.310.b: "Попытаться разрядить обстановку."
 synth.310.b.tt: "Скорость развития инцидента §Y«$situation_digitization$»§! на §Y1§! год: §R−25%§!\n\n"
 #Stage 3 Opportunities - Mind Upload
 synth.320.name: "21 386 732 184 блоков памяти"
 synth.320.desc: "21 386 732 184 блоков памяти — мозгом такого объема в среднем обладает [root.owner.GetSpeciesName]. Но не все умы одинаковы.\n\nНа фоне продолжающейся массовой синтетизации все чаще звучат заявления, что не каждый ум достоин искусственного тела. Но кому отдать приоритет — вопрос щепетильный. С другой стороны, неидеальные умы после оцифровки можно… улучшить. Перепрограммировать."
 synth.320.a: "Сохранения достоин каждый ум."
 synth.320.b: "Иногда можно и подправить кое-что…"
 synth.320.c: "Отдать приоритет умнейшим."
 synth.320.d: "Перепрограммировать «проблемных» индивидов."
 #Stage 3 Challenges - Mind Upload
 synth.360.name: "Вредоносные обновления"
 synth.360.desc: "Чтобы [roboticist.GetNamePlural] работали эффективнее, менеджеры ввели обновления программного обеспечения через небезопасный беспроводной протокол. В результате вместо получения информации по оптимизации рабочих процессов у реципиентов оказались частично стерты личности и память.\n\nМенеджеры уверяют, что полное тестирование личностных патчей перед их запуском заняло бы слишком много времени и что проще будет заменить потерявших воспоминания работников другими."
 synth.360.a: "Оптимизация производства того стоит."
 synth.360.a.tt: "Заводы по сборке роботов получают модификатор:\n$MOD_PLANET_POP_ASSEMBLY_MULT$: §G+10%§!\n\n§Y[roboticist.GetNamePlural]§! требуют для базового содержания: £alloys£§R3,00§!"
 synth.360.b: "Обязать использовать медленные, зато безопасные технологии обновлений."
 synth.360.b.tt: "Заводы по сборке роботов получают модификатор:\n$MOD_PLANET_POP_ASSEMBLY_MULT$: §R−10%§!\nСтабильность: §G+5§!"
 #DIGITIZATION STAGE 4
 synth.400.name: "Точная копия" #Stage 4 - Start event
 synth.400.desc: "Когда мы оцифровали свои умы и перенесли их в синтетические тела, мы потеряли способность к биологическому воспроизводству. Теперь нам приходится создавать индивидов, копируя существующие умы.\n\nНаши $job_identity_designer_plural$ продолжают свои исследования, так что в будущем процесс вне сомнения усовершенствуется. В конце концов, трудно ли создать полную копию? Создать же новый разум, новую личность… Вот это куда сложнее."
 synth.400.a: "Пусть создание копий личности будет бесплатным."
 synth.400.pop.tt: "$unlock_edict_tt$ ['concept_edict_optimized_identity_creation']\n\nКаждый §Y$job_identity_designer$§! теперь дает во всем государстве:$TABBED_NEW_LINE$£mod_planet_pop_assembly_mult£ $MOD_POP_ASSEMBLY_SPEED$: §G+1§!\n\n"
 synth.400.b: "Будем брать деньги за каждую копию."
 synth.405.name: "Диверсификация личностей"
 synth.405.desc: "Наши $job_identity_designer_plural$ разработали два метода создания цифровых личностей с упором на разнообразие.\n\nОдин вариант — скомбинировать характеристики двух и более личностей и создать на их основе новую. Можно сделать те или иные черты приоритетными, можно выбирать их случайным образом. В любом случае новая личность будет куда интереснее, чем те копии, что есть у нас сейчас.\n\nИли же мы можем создать новую личность из искусственного ядра и дать ей пройти через ускоренное (и симулированное) детство. Таким образом мы сможем создать идеальную индивидуальность."
 synth.405.a: "Будем смешивать личности."
 synth.405.a.vault: "Смешаемся с нашими оцифрованными предками."
 synth.405.a.tt: "Получен вариант исследования: £engineering£§Y$tech_identity_fusion$§!\n\nМожет открыться в будущем: £engineering£§Y$tech_identity_initialization$§!"
 synth.405.b: "Оптимальный вариант — виртуальный детский сад."
 synth.405.b.tt: "Получен вариант исследования: £engineering£§Y$tech_identity_initialization$§!\n\nМожет открыться в будущем: £engineering£§Y$tech_identity_fusion$§!"
 synth.4.name: "Синтетическое население" #Digitization - Last event
 synth.4.desc: "Вместе мы достигли невозможного. Мы превратили свое сознание в компьютерный код, а тела — в машины.\n\nПуть был долог и тернист, а преображение не прошло безболезненно. Но мы не станем горевать по утратам, поскольку сегодня нам открылся целый мир новых возможностей."
 synth.4.desc.unplugged: "Вместе мы пришли к тому, что много лет назад казалось невозможным и, возможно, даже нечестивым. Теперь даже [origin_unplugged_assimilator_empire.GetName] не сможет нам навредить: мы эволюционировали, превратив свое сознание в компьютерный код, а тела — в машины.\n\nПуть был долог и тернист, а преображение не прошло безболезненно. Но мы не станем горевать по утратам, поскольку сегодня нам открылся целый мир новых возможностей."
 synth.4.a: "Мы будем несравнимы."
 synth.4.a.tt: "Открывает полноценные эффекты дерева традиций «['tradition_category:tradition_synthetics']»"
 ### DIGITIZATION SITUATION END ###
 ### SOCIETAL EFFECTS EVENT CHAIN START ###
 synthshock_chain_title: "Цифровая реструктуризация"
 synthshock_chain_desc: "Синтетизация всего населения — это предприятие монументальных масштабов. Обойтись без последствий было бы невозможно. По мере привыкания к новому быту мы обязательно столкнемся с новыми уникальными проблемами.\n\nИ наши подходы к их решению сформируют наше общество на многие столетия вперед."
 synth_keep_auth_option: "Даже превращение в синтетиков не изменит нашу природу."
 ### AUTHORITIES ###
 #DEMOCRATIC
 #Synth Democratic Physical
 auth_synth_democratic_physical: "Демократический переход"
 auth_synth_democratic_physical_desc: "Эта форма правления обеспечивает гражданам небывалую свободу перемещения из одного синтетического тела в другое. Правительство готово ко всем сопутствующим дополнительным расходам."
 auth_synth_democratic_physical_tt: "$auth_democratic_election_tt$\nЭффективность работы специалистов: §G+1%§! за каждый £district£ район\nСодержание районов: §R+1%§! за каждый £district£ район"
 concept_auth_synth_democratic_physical: "$auth_synth_democratic_physical$"
 gov_synth_democracy_physical: "$auth_synth_democratic_physical$"
 gov_synth_democracy_physical_desc: "$auth_synth_democratic_physical_desc$"
 #Synth Democratic Virtual
 auth_synth_democratic_virtual: "Демократическая суррогатность"
 auth_synth_democratic_virtual_desc: "После замены солдат на сложные суррогаты с дистанционным управлением война будет не так ощутимо сказываться на населении. Кроме того, можно будет уменьшить размеры кораблей, поскольку экипажам уже не потребуются каюты и рубки."
 auth_synth_democratic_virtual_tt: "$auth_democratic_election_tt$"
 concept_auth_synth_democratic_virtual: "$auth_synth_democratic_virtual$"
 gov_synth_democracy_virtual: "$auth_synth_democratic_virtual$"
 gov_synth_democracy_virtual_desc: "$auth_synth_democratic_virtual_desc$"
 #OLIGARCHIC
 auth_cyber_oligarch_ruler_enforcers_tt: "Производство ресурсов правителями за каждую должность [enforcer.GetIcon] «[enforcer.GetName]»: §G+10%§!"
 #Synth Oligarchic Physical
 auth_synth_oligarchic_physical: "Олигархическое вмешательство"
 auth_synth_oligarchic_physical_desc: "Олигархи-синтетики позволяют высокопоставленным бюрократам временно «брать управление» над телами не справляющихся со своими обязанностями коллег, чтобы перенаправить рабочие процессы в нужное русло."
 concept_auth_synth_oligarchic_physical: "$auth_synth_oligarchic_physical$"
 gov_synth_oligarchy_physical: "$auth_synth_oligarchic_physical$"
 gov_synth_oligarchy_physical_desc: "$auth_synth_oligarchic_physical_desc$"
 #Synth Oligarchic Virtual
 auth_synth_oligarchic_virtual: "Олигархический надзор"
 auth_synth_oligarchic_virtual_desc: "Благодаря комплексным организационным протоколам и дополнительным ресурсам для обработки информации высокопоставленные чиновники могут с невероятной эффективностью следить за выполнением указов по всему государству."
 concept_auth_synth_oligarchic_virtual: "$auth_synth_oligarchic_virtual$"
 gov_synth_oligarchy_virtual: "$auth_synth_oligarchic_virtual$"
 gov_synth_oligarchy_virtual_desc: "$auth_synth_oligarchic_virtual_desc$"
 #DICTATORIAL
 #Synth Dictatorship Physical
 auth_synth_dictatorial_physical: "Диктаторская разветвленность"
 auth_synth_dictatorial_physical_desc: "Синхронизированные нейроразъемы и сопутствующая инфраструктура позволяют одновременно управлять сразу несколькими синтетическими телами. Производительность труда при этом вырастает многократно."
 concept_auth_synth_dictatorial_physical: "$auth_synth_dictatorial_physical$"
 gov_synth_dictatorship_physical: "$auth_synth_dictatorial_physical$"
 gov_synth_dictatorship_physical_desc: "$auth_synth_dictatorial_physical_desc$"
 #Synth Dictatorship Virtual
 auth_synth_dictatorial_virtual: "Диктаторская обработка"
 auth_synth_dictatorial_virtual_desc: "На смену реальному миру пришел виртуальный. Ничто не истинно, все изменяемо.\n\nСреда обитания полностью подчиняется нам, а вместе с ней — и общественное мнение. Народ поверит в то, во что нам потребуется."
 concept_auth_synth_dictatorial_virtual: "$auth_synth_dictatorial_virtual$"
 gov_synth_dictatorship_virtual: "$auth_synth_dictatorial_virtual$"
 gov_synth_dictatorship_virtual_desc: "$auth_synth_dictatorial_virtual_desc$"
 #IMPERIAL
 #Synth Imperial Physical
 auth_synth_imperial_physical: "Имперская обратная связь"
 auth_synth_imperial_physical_desc: "Исследовательские работы будут идти быстрее, если мы начнем вскрывать и изучать оттиски личностей скончавшихся лидеров, хранящиеся в архиве воспоминаний. Даже после смерти они еще послужат нашему государству — несомненно, именно этого они хотели бы при жизни.\n\nИмперский престол переходит к назначенному наследнику после смерти правителя."
 auth_synth_imperial_physical_tt: "После смерти лидеры дают $r_research$: $TABBED_NEW_LINE$$scientist_plural_with_icon$ — $r_physics$ $TABBED_NEW_LINE$$official_plural_with_icon$ — $r_society$ $TABBED_NEW_LINE$$commander_plural_with_icon$ — $r_engineering$ $NEW_LINE$ Количество получаемых £physics£ £society£ £engineering£ §Yочков исследований§! увеличивается с повышением §Yуровня навыка лидера§!"
 concept_auth_synth_imperial_physical: "$auth_synth_imperial_physical$"
 gov_synth_imperial_physical: "$auth_synth_imperial_physical$"
 gov_synth_imperial_physical_desc: "$auth_synth_imperial_physical_desc$"
 #Synth Imperial Virtual
 auth_synth_imperial_virtual: "Имперская передача данных"
 auth_synth_imperial_virtual_desc: "Благодаря технологии мгновенного переноса разума мы сможем возвращать в бой погибших солдат, снабжая их новыми механическими телами, а также проводить опасные ремонтные работы в открытом космосе.\n\nИмперский престол переходит к назначенному наследнику после смерти правителя."
 auth_synth_imperial_virtual_tt: "Наши армии роботов можно с вероятностью §Y33%§! возродить после поражения"
 concept_auth_synth_imperial_virtual: "$auth_synth_imperial_virtual$"
 gov_synth_imperial_virtual: "$auth_synth_imperial_virtual$"
 gov_synth_imperial_virtual_desc: "$auth_synth_imperial_virtual_desc$"
 #CORPORATE
 #Synth Corporate Physical
 auth_synth_corporate_physical: "Корпоративный разум"
 auth_synth_corporate_physical_desc: "Синтетическое сознание, предварительно ограничив его функции, можно помещать в неодушевленные предметы, создавая таким образом простейшие живые сущности на любой вкус: неутомимых слуг, верных спутников или даже родных и коллег.\n\nКорпоративные правительства — огромные коммерческие предприятия, которые полностью взяли на себя роль государства."
 auth_synth_corporate_physical_tt: "$AVAILABLE_POLICIES$ §Y$policy_computation_core_allocation$§!\n$AVAILABLE_HOLDINGS$ ['building:building_ai_emporium', центр ИИ]"
 concept_auth_synth_corporate_physical: "$auth_synth_corporate_physical$"
 gov_synth_corporate_physical: "$auth_synth_corporate_physical$"
 gov_synth_corporate_physical_desc: "$auth_synth_corporate_physical_desc$"
 #Synth Corporate Virtual
 auth_synth_corporate_virtual: "Корпоративные воспоминания"
 auth_synth_corporate_virtual_desc: "Эта корпорация занимается скупкой воспоминаний, попутно навсегда удаляя их из мозга клиента. Яркие воспоминания и сильные переживания стоят дороже обычных. После покупки корпорация сканирует полученные данные на предмет полезной для себя информации, а затем внедряет их в процесс производства синтетического сознания.\n\nКорпоративные правительства — огромные коммерческие предприятия, которые полностью взяли на себя роль государства."
 auth_synth_corporate_virtual_tt: "$AVAILABLE_POLICIES$ §Y$policy_computation_core_allocation$§!\n$AVAILABLE_HOLDINGS$ ['building:building_clear_thought_clinic', клиника чистки разума]"
 concept_auth_synth_corporate_virtual: "$auth_synth_corporate_virtual$"
 gov_synth_corporate_virtual: "$auth_synth_corporate_virtual$"
 gov_synth_corporate_virtual_desc: "$auth_synth_corporate_virtual_desc$"
 ### EDICTS ###
 edict_subsidized_identity_backups: "Субсидии на резервные копии личностей"
 edict_subsidized_identity_backups_desc: "Правительство предоставляет огромное количество серверного пространства, необходимого для постоянного создания резервных копий."
 edict_subsidized_identity_backups_effect: "$MOD_LEADER_LIFESPAN_ADD$: §G+20 лет§!\n$MOD_LEADER_SPECIES_EXP_GAIN$: §G+10%§!"
