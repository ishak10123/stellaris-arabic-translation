 situation_digitization: "Синтетизация"
 situation_digitization_type: "Инцидент: преображение"
 situation_digitization_desc: "Пора оставить наши несовершенные органические вместилища. Мы должны создать современные роботизированные тела и перенести в них свои сознания.\n\n§YПоселений, которые будут оцифрованы в следующем месяце§!: §G[From.GetSynthPopsPerMonth]§!"
 situation_digitization_monthly_change_tooltip: "Наши сознания будут оцифрованы, а тела станут машинами."
 situation_digitization_outcome: "Синтетическое население."
 stage_digitization_effects: "Мы должны создать цифровой аналог мозга, сконструировать механические тела и перенести себя в них."
 #Approach Error Correcting
