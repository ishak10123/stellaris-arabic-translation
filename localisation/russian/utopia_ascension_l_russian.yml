 utopia.3000.name: "Покров"
 utopia.3000.a: "Войти в Покров."
 utopia.3000.intro.desc: "Покров. Невероятно странный и тревожащий, но в то же время… очень знакомый. Все, кто обладает пси-талантами, могли видеть это место в своих снах, хотя, вероятно, и не понимали этого.\n\nТеперь мы стоим у пропасти этого измерения, недалеко от пустоты Межмирья, служащего границей между этим и обычным пространством — или тем, что мы назвали бы реальным миром.\n\nЧтобы проникнуть глубже в Покров, потребуются немалые усилия со стороны наших телепатов, а также большое количество энергии. Не будем тратить время впустую… даже сейчас за нами наблюдают."
 utopia.3000.1.desc: "Покров сегодня спокоен."
 utopia.3000.2.desc: "Что-то за нами наблюдает."
 utopia.3000.3.desc: "По эту сторону все выглядит по-другому."
 utopia.3000.4.desc: "Им нужно было отправить поэта…"
 utopia.3000.5.desc: "Что-то темное грядет."
 utopia.3000.6.desc: "Мы все еще спим?"
 utopia.3000.7.desc: "Мы… мы сделали это. Мы внутри!"
 utopia.3000.8.desc: "Какая-то… сущность застыла поблизости. Она жестами приглашает погрузиться глубже в Покров…"
 utopia.3000.9.desc: "Вы тоже слышите голоса?"
 utopia.3000.10.desc: "В Покрове пульсирует сила. Я словно… дома."
 utopia.3000.11.desc: "Вы думаете, что сейчас дышите воздухом?"
 utopia.3000.12.desc: "Мы видим и в то же время не видим. Об этом месте еще столь многое предстоит узнать."
 utopia.3000.13.desc: "Каких органов чувств нам не хватает, если мы не можем увидеть и услышать другой мир вокруг нас?"
 utopia.3000.14.desc: "Будьте очень осторожны. В этом месте даже шальная мысль может стать чем-то осязаемым… и, чаще всего, своей противоположностью."
 utopia.3000.15.desc: "Мы никогда не должны были попасть сюда."
 utopia.3000.16.desc: "Такая… сила…"
 utopia.3000.17.desc: "Нужно… сосредоточиться…"
 utopia.3000.18.desc: "Может быть, именно здесь все началось?"
 utopia.3000.19.desc: "Ужас… ужас имеет лицо."
 utopia.3000.b: "§MВоззвать к высшей силе.§!"
 utopia.3005.desc: "Мы знаем, что по ту сторону обитают могучие создания. Обычно они не обращают на нас внимания, но мы могли бы обратиться к ним, воспользовавшись силой зро. Наши телепаты ощущают влияние этих сущностей по всему Покрову. К кому нам стоит обратиться?"
 utopia.3005.a: "§GК тому, от кого разит высвобождением плоти.§!"
 utopia.3005.b: "§PК тому, кто вопиет о ненасытной пустоте.§!"
 utopia.3005.c: "§HК тому, кто шепчет о желании и обладании.§!"
 utopia.3005.d: "§BК тому, кто горек, как разрушенное доверие.§!"
 utopia.3010.desc: "Конклав телепатов еще не восстановил силы после напряжения, связанного с предыдущим визитом в Покров. Без их объединенной псионической силы мы можем уловить лишь краткие образы этого многоликого измерения, словно размытые воспоминания, к которым нет доступа.\n\nЗдесь нам делать нечего. Придется вернуться позже."
 boon.bestowed: "§GПолучен дар§!"
 curse.bestowed: "§RПолучено проклятие§!"
 boon.psi.link.machine: "Мощные энергии §HПокрова§! хлынули в общий псионический центр обработки, которым пользуются все [Root.GetSpeciesNamePlural]."
 boon.psi.link.organic_non_gestalt: "Мощные энергии §HПокрова§! хлынули в общую псионическую линию связи, которую используют все [Root.GetSpeciesNamePlural]."
 boon.psi.link.hive: "Мощные энергии §HПокрова§! хлынули в общую псионическую линию связи, которой пользуется [Root.GetAdjective&masc] сверхразум."
 boon.psi.link: "[GetBoonPsiLink]"
 boon.ship.link: "Нашим [GetTelepathPlural&dat] удалось установить временный канал коммуникации между §HПокровом§! и нашими звездолетами."
 utopia.3030.desc.gestalt: "$boon.psi.link$\n\nЭти энергии наполняют сеть коллектива, гарантируя стабильное выполнение задач нашими единицами."
 utopia.3030.desc.organic_non_gestalt: "$boon.psi.link$\n\nЧувство глубокого спокойствия распространяется по [Root.GetName::всему|||fem:всей|||pl:всем] [Root.GetName&dat], действуя даже на тех, у кого нет псионических способностей."
 utopia.3030.desc.machine_non_gestalt: "$boon.psi.link$\n\nОперационное равновесие распространяется по [Root.GetName::всему|||fem:всей|||pl:всем] [Root.GetName&dat], действуя даже на тех, у кого нет псионических компонентов."
 utopia.3031.desc: "$boon.ship.link$\n\nУ флотилий не наблюдается ни малейшего признака деградации — даже у самых старых и опытных. В результате значительно снизились затраты на содержание."
 utopia.3032.desc.non_gestalt: "$boon.psi.link$\n\nНаши [GetScientistPlural] теперь имеют телепатический доступ к коллективной базе знаний, что позволит существенно повысить эффективность их работы."
 utopia.3032.desc.organic_gestalt: "$boon.psi.link$\n\nИсследовательские узлы [Root.GetSpeciesAdjective&masc,gen] разума работают в идеально синхронном ритме, что повышает нашу когнитивную эффективность."
 utopia.3032.desc.machine_gestalt: "$boon.psi.link$\n\nПсионические циклы рендера позволяют нашей исследовательской матрице превысить все возможные показатели эффективности, значительно повышая темпы обучения."
 utopia.3033.desc: "$boon.ship.link$\n\nЭкипажи наших боевых кораблей теперь могут увеличивать мощность наших щитов, используя свои пси-таланты."
 utopia.3034.desc: "$boon.ship.link$\n\nЭкипажи теперь могут увеличивать мощность вооружения с помощью своих пси-талантов."
 utopia.3035.desc: "$boon.ship.link$\n\nЭкипажи теперь могут увеличивать скорострельность орудий с помощью своих пси-талантов."
 utopia.3036.desc.organic_non_gestalt: "$boon.psi.link$\n\nВ сердцах и умах наших граждан возникло новое чувство сплоченности, благодаря чему теперь они в большей степени готовы работать вместе над достижением общих целей, обозначенных нашим правительством."
 utopia.3036.desc.machine_non_gestalt: "$boon.psi.link$\n\nВ процессорных ядрах наших граждан возникло новое чувство сплоченности, благодаря чему теперь они в большей степени готовы работать вместе над достижением общих целей, обозначенных нашим правительством."
 utopia.3036.desc.gestalt: "$boon.psi.link$\n\nЭти энергии наполняют весь коллектив, повышая эффективность единиц и снижая любые отклонения от нормы, которые в противном случае бы мешали нам сосредоточиться."
 utopia.3037.desc.organic_non_genocidal: "$boon.psi.link$\n\nНаши эмпаты стали как никогда сильны, что привело к повышению политического влияния."
 utopia.3037.desc.machine_non_genocidal: "$boon.psi.link$\n\nНаши дипломатические модули функционируют с максимальной эффективностью эмпатии, что повышает наше политическое влияние."
 utopia.3037.desc.genocidal: "$boon.psi.link$\n\nНаша воля будет влиять на галактику сильнее, чем когда-либо прежде."
 utopia.3038.desc.gestalt: "$boon.psi.link$\n\nМы никогда не испытывали такой ясности и сплоченности в стремлении к одной цели."
 utopia.3038.desc.non_gestalt: "$boon.psi.link$\n\nМы никогда не ощущали большего чувства единства."
 utopia.3039.desc: "$boon.ship.link$\n\nЭкипажи теперь могут прямо воздействовать на движение наших кораблей и улучшать их маневренность под огнем противника с помощью своих пси-талантов."
 utopia.3040.desc.organic: "$boon.ship.link$\n\nЭкипажи теперь могут выполнять на месте ремонтные работы ограниченного масштаба и латать пробоины в корпусе одной силой мысли с помощью своих пси-талантов."
 utopia.3040.desc.machine: "$boon.ship.link$\n\nЭкипажи теперь могут выполнять на месте ремонтные работы ограниченного масштаба и латать пробоины в корпусе одной силой нейропроцессоров с помощью своих пси-талантов."
 utopia.3041.desc.machine: "$boon.psi.link$\n\nНаши [GetTelepathPlural&nom] немедленно воспользовались своей силой, чтобы улучшить функциональные характеристики самых выдающихся лидерских модулей, отсрочив их прогнозируемое устаревание на десятилетия. К сожалению, псионической энергии было слишком мало, чтобы преподнести такой дар всему населению."
 utopia.3041.desc.organic_gestalt: "$boon.psi.link$\n\nНаши [GetTelepathPlural&nom] немедленно воспользовались своей силой, чтобы замедлить старение самых выдающихся лидерских единиц, продлив их жизни на десятилетия. К сожалению, псионической энергии было слишком мало, чтобы преподнести такой дар всему населению."
 utopia.3041.desc.organic_non_gestalt: "$boon.psi.link$\n\nНаши [GetTelepathPlural&nom] немедленно воспользовались своей силой, чтобы замедлить старение самых выдающихся лидеров, продлив их жизни на десятилетия. К сожалению, псионической энергии было слишком мало, чтобы преподнести такой дар всему населению."
 utopia.3041.tooltip: "Все лидеры получают черту §Y«$leader_trait_shroud_age$»§!. Их продолжительность жизни увеличится на §G40§! лет."
 utopia.3042.desc: "$boon.ship.link$\n\nЭкипажи теперь могут увеличивать мощность двигателей своих кораблей и значительно повышать субсветовую скорость с помощью своих пси-талантов."
 utopia.3043.desc.organic: "$boon.psi.link$\n\nЭто укрепило решимость наших солдат, которые теперь готовы отважно встретить любые опасности на поле боя. Их боевой дух не знает себе равных."
 utopia.3043.desc.machine_or_gestalt: "$boon.psi.link$\n\nЭто усилило стремление к цели у наших боевых единиц, повысив их общую эффективность на поле боя."
 utopia.3044.desc: "$boon.psi.link$\n\nТеперь мы можем чувствовать перемещение кораблей в космосе на гораздо большем расстоянии, чем любая стандартная матрица датчиков."
 utopia.3045.name: "Выброшенные из Покрова"
 utopia.3045.1.desc: "Канал, который наши [GetTelepathPlural&nom] использовали для коммуникации с Покровом, схлопнулся после внезапного смещения нескольких уровней экстрасенсорного измерения.\n\nНас без промедления выбрасывает назад в обычное пространство."
 utopia.3045.2.desc: "Интенсивное напряжение во время контакта с Покровом подорвало силы наших [GetTelepathPlural&gen].\n\nБольше поддерживать связь они не могут."
 utopia.3045.3.desc_organic: "Сначала медленно, а затем все быстрее и быстрее контроль над Покровом начинает ускользать. Наши [GetTelepathPlural&nom] кричат в отчаянии, теряя устойчивый контакт, и нас выбрасывает в обычное пространство."
 utopia.3045.3.desc_machine: "Сначала медленно, а затем все быстрее и быстрее контроль над Покровом начинает ускользать. Наши [GetTelepathPlural&nom] начинают сбоить, теряя устойчивый контакт, и нас выбрасывает в обычное пространство."
 curse.psi.link.organic: "Мощная экстрасенсорная реакция прошла в ответ по нашему каналу коммуникации с Покровом и по общей псионической линии связи, которую используют все [Root.GetSpeciesNamePlural]."
 curse.psi.link.machine: "Мощная нейронная реакция прошла в ответ по нашему каналу коммуникации с Покровом и по общей псионической линии связи, которую используют все [Root.GetSpeciesNamePlural]."
 curse.psi.link: "[GetCursePsiLink]"
 curse.ship.link: "Мощная псионическая реакция прошла в ответ по нашему каналу коммуникации с Покровом. Она, похоже, воздействует и на наши корабли."
 utopia.3050.desc.gestalt: "$curse.psi.link$\n\nЭто вызвало помехи и нестабильность по всему [Root.GetAdj&masc,dat] коллективу."
 utopia.3050.desc.non_gestalt: "$curse.psi.link$\n\nЭто оказало огромное влияние на уровень счастья наших граждан, и чувство уныния теперь пронизывает [Root.GetName::весь|||fem:всю|||neut:всё|||pl:все] [Root.GetName&acc]."
 utopia.3051.desc.gestalt: "$curse.psi.link$\n\nРезультирующие волны прокатились по всему коллективу и вызвали всплеск девиантного поведения среди наших единиц."
 utopia.3051.desc.non_gestalt: "$curse.psi.link$\n\nЭта негативная энергия породила сомнения в умах наших граждан. Многие обращаются к новым радикальным идеям, идущим вразрез с линией нашего правительства. Этот эффект затронул даже граждан без экстрасенсорных способностей!"
 utopia.3052.desc: "$curse.ship.link$\n\nИх броня стала хрупкой и больше не может выдерживать такой урон, как прежде."
 utopia.3053.desc.machine: "$curse.psi.link$\n\nРезультирующее напряжение в наших нейронных сетях привело к заметному падению скорости сборки модулей по [Root.GetName::всему|||fem:всей|||pl:всем] [Root.GetName&dat]."
 utopia.3053.desc.organic_gestalt: "$curse.psi.link$\n\nБоль, которую ощутил весь коллектив, заметно снизила наши возможности по производству новых физических единиц."
 utopia.3053.desc.organic_non_gestalt: "$curse.psi.link$\n\nПо какой-то причине это оказало отрицательный эффект на рождаемость по всему [Root.GetName&dat]. Затронуты даже представители рас без врожденных псионических способностей!"
 utopia.3054.desc.machine_gestalt: "$curse.psi.link$\n\nРезультирующие псионические петли в циклах рендера не позволяют нашей исследовательской матрице функционировать с должной эффективностью."
 utopia.3054.desc.machine_non_gestalt: "$curse.psi.link$\n\nВ результате [GetMindPhysicalLoc&nom] наших исследователей оказались перегружены, и теперь они не могут эффективно выполнять свои задачи."
 utopia.3054.desc.organic_gestalt: "$curse.psi.link$\n\nИсследовательские узлы [Root.GetSpeciesAdjective&masc,gen] коллектива перегружены. Из-за этого мы не можем эффективно обрабатывать новые открытия."
 utopia.3054.desc.organic_non_gestalt: "$curse.psi.link$\n\nВ результате [GetMindPhysicalLoc&nom] наших исследователей оказались затуманены, и теперь они не могут эффективно выполнять свои задачи."
 utopia.3055.desc: "$curse.psi.link$\n\nСкорость накопления нами политического влияния значительно уменьшилась."
 utopia.3056.desc.organic_non_gestalt: "$curse.psi.link$\n\nЧувство единства, которое когда-то ощущали наши граждане, исчезло."
 utopia.3056.desc.machine_or_gestalt: "$curse.psi.link$\n\nЧувство единства, которое когда-то пронизывало [Root.GetName&acc], пошатнулось, что привело к повсеместному нарушению координации."
 utopia.3057.desc: "$curse.ship.link$\n\nНаши корабли движутся так, словно их удерживает какая-то неведомая сила. Это привело к значительному снижению субсветовой скорости."
 utopia.3058.desc.organic_non_gestalt: "$curse.psi.link$\n\nЭта негативная энергия подорвала боевой дух наших наземных войск, которые какое-то время будут гораздо менее эффективными в бою."
 utopia.3058.desc.machine_or_gestalt: "$curse.psi.link$\n\nЦиклы обратной связи, вызванные этим всплеском энергии, нанесли ущерб операционной эффективности наших наземных войск."
 utopia.3059.desc: "Мощная псионическая реакция прошла в ответ по нашему каналу коммуникации с Покровом и, похоже, препятствует нормальной работе наших межзвездных сенсоров.\n\nРазрешающая способность сенсоров при приеме данных из любых источников существенно снизилась, что привело к значительному уменьшению дальности их действия."
