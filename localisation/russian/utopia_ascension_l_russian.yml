 utopia.3400.name: "[chosen_one.GetAXX::Божественный правитель|||fem:Божественная правительница]"
 utopia.3400.desc: "§H[chosen_one.GetName]§! — когда-то [chosen_one_species.GetName], а ныне [GetImmortalLoc&neut] существо — приобретает всё больше преданных последователей в [Root.GetName&prep]. [chosen_one.GetAXX::Ему|||fem:Ей] поклоняются как высшему божеству; уже звучат призывы к тому, чтобы [chosen_one.GetTitle] [chosen_one.GetAXX::стал|||fem:стала] вечным главой нашего государства — отныне и навсегда."
 utopia.3400.a: "Могущественный экстрасенс? Возможно. Но [chosen_one.GetAXX::бог|||fem:богиня]? Вряд ли."
 utopia.3400.b: "Да устремится [chosen_one.GetHerHis] правление в бесконечность… и за ее пределы!"
 reject_god_emperor: "[chosen_one.GetName] по-прежнему [chosen_one.GetTitle]."
 utopia.3401.name: "[chosen_one.GetTitle] проходит коронацию."
 utopia.3401.desc.intro: "Невероятно [GetPsychicNoun::могущественный <1>|||fem:могущественная <1>]-[chosen_one_species.GetName] [GetPsychicNoun::захватил|||fem:захватила] контроль над §H[From.GetName&inst]§!! Это"
 utopia.3401.desc.outro: "существо, которое шепотом именуют «Избранным», сегодня утром было короновано в ходе пышной церемонии на столичной планете [From.Capital.GetName]. Вскоре во все межзвёздные посольства поступила официальная нота о том, что отныне §H[chosen_one.GetRulerTitle] [chosen_one.GetRegnalName]§! является вечным правителем этого государства."
 utopia.3401.desc.organic: "$utopia.3401.desc.intro$ бессмертное $utopia.3401.desc.outro$"
 utopia.3401.desc.machine: "$utopia.3401.desc.intro$ вечное $utopia.3401.desc.outro$"
 utopia.3401.a: "[chosen_one.GetName] имеет благословение Покрова."
 utopia.3401.b: "Чушь и предрассудки."
 utopia.3401.c: "Это важное событие."
