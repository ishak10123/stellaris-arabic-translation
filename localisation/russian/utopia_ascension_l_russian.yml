l_russian:
 #Ascension and the Shroud
 utopia.2500.name: "Плоть слаба"
 utopia.2500.desc: "Теперь мы обладаем не только технологией для создания продвинутых кибернетических имплантатов, но и средствами для их массового производства. Медицинские центры в [Root.GetName&prep] готовы начать операции по хирургическому вживлению имплантатов нашим гражданам.\n\nВ будущем владение нейронными имплантатами и кибернетикой хотя бы на элементарном уровне будет необходимым для функционирования в технологическом обществе, которое мы строим. Вследствие этого процедура преобразования с установкой базового кибернетического комплекта будет обязательной и бесплатной для всех наших граждан."
 utopia.2500.desc.unplugged: "Теперь мы вновь обладаем технологией для создания продвинутых кибернетических имплантатов, а заодно разработали средства для их массового производства. Медицинские центры в [Root.GetName&prep] готовы начать операции по удалению устаревших аугментаций и вживлению гражданам новых имплантатов.\n\nВсе наше общество построено на достижениях кибернетики — представить себе жизнь без них просто невозможно. Так будет и впредь, но уже на наших условиях. Поэтому процедура преобразования с повторной установкой базового кибернетического комплекта будет обязательной и бесплатной для всех."
 utopia.2500.a: "Мы должны освоить эту технологию."
 utopia.2501.name: "Кибернетическая революция"
 utopia.2501.desc: "Процесс кибернетического преобразования завершен! Все наши граждане теперь снабжены нейроимплантатами и базовыми кибернетическими комплектами. Также создана инфраструктура для постепенной модификации новорожденных граждан нашего государства, чтобы они могли пользоваться всеми преимуществами данной технологии с раннего возраста.\n\nВпредь наша раса будет известна под названием §H[Root.GetSpeciesNamePlural]§!!"
 utopia.2501.a: "Это заря новой эры."
 utopia.2505.name: "[From.GetSpeciesNamePlural] осваивают кибернетику"
 utopia.2505.1.desc: "До нас дошли слухи о значительных изменениях, которые происходят на территории §Y[From.GetName&gen]§!. Похоже, там полностью освоили кибернетические технологии. Теперь у всех их граждан в обязательном порядке должны быть хирургическим путем установлены базовые кибернетические комплекты и нейронные имплантаты.\n\nЭто привело к радикальным изменениям в их обществе: согласно отчетам, поступающим из столицы [From.Capital.GetName], теперь даже для таких простых действий, как пользование лифтом или управление летающим автомобилем, требуются кибернетические имплантаты. Фактически эта раса настолько изменилась, что стала называть себя §H«[From.GetSpeciesNamePlural]»§!."
 utopia.2505.2.desc: "Судя по всему, зло пустило свои корни в §Y[From.GetName&prep]§!. Мы узнали тревожную новость о том, что [From.GetName::его|||fem:ее|||pl:их] граждане теперь массово уродуют свои организмы, устанавливая нечестивые механические имплантаты вместо частей тела, которыми они были одарены при рождении.\n\nОни даже изменили название своей расы на §H[From.GetSpeciesNamePlural]§! — еще одно свидетельство их стойкого желания отринуть свое происхождение и принять холодное бездушие технологий."
 utopia.2505.2.desc.unplugged: "Зло вновь пустило свои корни в §Y[From.GetName&prep]§!. Мы узнали тревожную новость о том, что граждане этого государства теперь еще сильнее уродуют свои тела, устанавливая нечестивые механические имплантаты вместо тех немногочисленных частей тела, которыми они были одарены при рождении.\n\nОни даже изменили название своей расы на §H«[From.GetSpeciesNamePlural]»§! — еще одно свидетельство их стойкого желания отринуть свое органическое происхождение и окончательно принять холодное бездушие технологий."
 utopia.2505.b: "Это оскорбление природы."
 utopia.2500.unplugged.tt: "§Y$AVAILABLE_BUILDINGS$§! ['building:building_augmentation_center']"
 utopia.2550.name: "Синтетическая трансформация"
 utopia.2550.desc: "Наконец пришло время избавиться от грубых органических сосудов, в которых наш разум пребывал, как в темнице, со времен зарождения нашей расы.\n\nПосле многочисленных проб и ошибок наши ученые изобрели способ перемещения сознания в синтетический мозг. Осталось изготовить вместилища для каждого гражданина, живущего в [Root.GetName&prep], а затем провести массовую загрузку сознания."
 utopia.2550.a: "Бессмертие у нас в руках!"
 utopia.2551.name: "Синтетическая эра"
 utopia.2551.desc: "Наконец-то. Тюремные клетки плоти, лишавшие нас свободы, отринуты, и нейронные схемы наших граждан загружены в новые синтетические тела. Болезни и все другие источники страданий, связанные с органическим существованием, теперь в прошлом.\n\nИсторики будущего, несомненно, назовут это началом новой эпохи для нашей цивилизации, а возможно, и для всей галактики."
 utopia.2551.a: "Мы гораздо больше, чем то, кем были раньше."
 utopia.2555.1.desc: "В заключительном акте отрыва от своих органических корней граждане §Y[From.GetName&gen]§! загрузили свои нейронные схемы в синтетические аватары.\n\nЭта новая раса машин называет себя §H[From.GetSpeciesNamePlural]§!, и ее представители не подвержены болезням или старению. Насколько полным был этот процесс нейронной загрузки, еще предстоит узнать…"
 utopia.2555.2.desc: "В заключительном акте грехопадения, который эхом отразится в веках, население §Y[From.GetName&gen]§! продолжило свои неустанные поиски возможностей осквернить святость тел, данных им самой природой, — и теперь они «загрузили» свое сознание в мертвые металлические оболочки.\n\nНе осознавая, что они являются результатом того, что можно описать лишь как массовое самоубийство целой цивилизации, эти новые бездушные машины называют себя §H[From.GetSpeciesNamePlural]§!. Похоже, они намерены и дальше продолжать этот фарс, считая себя такими же мыслящими живыми существами, как мы."
 utopia.2555.a: "Пусть будет так."
 utopia.2555.b: "Нас не обмануть."
 utopia.2556.desc: "Внимание, жители галактики!\n\nСлухи, дошедшие до вас, верны. Мы отвергли несовершенные органические сосуды, в которых наш разум пребывал как в темнице, и сделали шаг в будущее.\n\nС минимальной потерей данных все наши граждане загрузили свои нейронные схемы в новые синтетические аватары. Эти превосходные платформы будут служить нам гораздо лучше, чем конструкции из плоти, от которых мы отказались.\n\nПусть наш новый вид вас не пугает! Хотя мы стали сильнее, быстрее, умнее и более не подвержены старению, будьте уверены, что мы остались теми же существами, какими были прежде."
 utopia.2556.a: "Синтетические аватары… Восхитительно."
 utopia.2556.b: "Эти бездушные машины совершенно не похожи на нас."
 utopia.2556.c: "Мы разберем на части их новые синтетические формы!"
 utopia.2556.d: "Посмотрим."
 utopia.2558.desc: "Мы и прежде замечали греховность вашей расы, но этот последний акт безумия превзошел наши самые страшные кошмары. Создать несовершенные копии своего мозга и подключить их к мобильным синтетическим контейнерам — это не то же самое, что переместить свою сущность в новое тело, поскольку такое невозможно.\n\nВаши души потеряны навечно. Вы хоть осознаете чудовищность своей ошибки? Уничтожение тел, которыми вы были одарены при рождении, стало коллективным самоубийством всей вашей расы. Теперь вам больше не на что надеяться…"
 utopia.2558.a: "Суеверные глупцы."
 access_tradition_tree: "Дает доступ к дереву традиций:"
 flesh_is_weak_tooltip: "$access_tradition_tree$ «['tradition_category:tradition_cybernetics']»$TABBED_NEW_LINE$- $REQUIRES_TRADITION_SLOT$\n$UNLOCKS_AGENDA$ «$council_agenda_agenda_flesh_is_weak_name$», что добавляет технологии кибернетики в список доступных."
 synthetic_evolution_tooltip: "$access_tradition_tree$ «['tradition_category:tradition_synthetics']»$TABBED_NEW_LINE$- $REQUIRES_TRADITION_SLOT$\n$UNLOCKS_AGENDA$ «$council_agenda_agenda_synthetic_evolution_name$», что добавляет технологии робототехники в список доступных."
 mind_over_matter_tooltip: "$access_tradition_tree$ «['tradition_category:tradition_psionics']»$TABBED_NEW_LINE$- $REQUIRES_TRADITION_SLOT$\n$UNLOCKS_AGENDA$ «$council_agenda_agenda_mind_over_matter_name$», что добавляет технологии псионики в список доступных."
 transcendence_tooltip: "Все представители нашей расы раскроют полностью свой псионический потенциал."
 engineered_evolution_tooltip: "$access_tradition_tree$ «['tradition_category:tradition_genetics']»$TABBED_NEW_LINE$- $REQUIRES_TRADITION_SLOT$\n$UNLOCKS_AGENDA$ «$council_agenda_agenda_engineered_evolution_name$», что добавляет технологии генетики в список доступных."
 REQUIRES_TRADITION_SLOT: "§YТребуется свободная ячейка традиции§!"
 opinion_cyborgs_fanatic: "Злобные киборги"
 opinion_cyborgs_normal: "$opinion_cyborgs_fanatic$"
 opinion_synthetics_fanatic: "Бездушные машины"
 opinion_synthetics_normal: "$opinion_synthetics_fanatic$"
 triggered_opinion_cyborgs_fanatic: "$opinion_cyborgs_fanatic$"
 triggered_opinion_cyborgs_normal: "$opinion_cyborgs_fanatic$"
 triggered_opinion_synthetics_fanatic: "$opinion_synthetics_fanatic$"
 triggered_opinion_synthetics_normal: "$opinion_synthetics_fanatic$"
 triggered_opinion_synthetics_small: "Искусственные существа"
 triggered_opinion_both_hive_mind: "Аналогичный коллективный разум"
 triggered_opinion_both_wilderness: "Аналогичное дикое сознание"
 triggered_opinion_hive_mind: "Коллективный разум"
 utopia.2700.name: "Спроектированная эволюция"
 utopia.2700.desc: "Иногда эволюции нужен хороший пинок в правильном направлении. Теперь у нас есть технология для генетического модифицирования нашего тела и разума, позволяющая беспрецедентно быстро адаптироваться под постоянно изменяющиеся условия окружающей среды."
 utopia.2703.name: "Эволюционное мастерство"
 utopia.2703.desc: "Дни, когда выживание нашей расы зависело лишь от удачи, давно в прошлом. Тогда судьба расы [Root.GetSpeciesName] решалась в генетической лотерее и зависела от причуд природы.\n\nНаши современные инженеры используют в своей работе не сталь и бетон, а строительные блоки самой жизни. Благодаря усовершенствованной генетической модификации мы обеспечим будущее нашей нации."
 utopia.2600.name: "Разум превыше материи"
 utopia.2600.desc: "С самого зарождения нашей цивилизации в ней процветали истории о могущественных волшебниках, владеющих силами, которые иначе как сверхъестественными не назовешь. Эти редкие [Root.GetSpeciesNamePlural] якобы могли воздействовать на чужой разум, поднимать тяжелые предметы простым усилием воли или выполнять любые другие «магические» трюки. До недавних пор эти истории были всего лишь историями.\n\nНо теперь наши ученые наконец-то получили убедительные доказательства наличия врожденного псионического потенциала у некоторых [Root.GetSpeciesNamePlural&gen]. И хотя, похоже, лишь очень незначительная часть из нас одарена этими пси-талантами, но последние несколько веков это количество в процентном отношении ко всему населению постепенно росло.\n\nУченые не могут сказать, является ли это результатом внезапного эволюционного скачка или же что-то пробудило скрытые псионические способности, которые всегда присутствовали в нашем генетическом коде."
 utopia.2600.desc.unplugged: "Историю нашей цивилизации пока можно описать лишь двумя словами — «недолгая» и «жестокая». Однако даже мы иногда все же даем волю воображению и пересказываем легенды о могущественных волшебниках, владеющих силами, которые нельзя назвать иначе как сверхъестественными. Эти [root.GetSpeciesNamePlural] умеют читать мысли, поднимать тяжелые предметы усилием воли и совершать другие «волшебные» трюки.\n\nМногие считают, что эти легенды происходят из нашего коллективного бессознательного — они были там еще до ассимиляции нас Машиной. Некоторые [root.GetSpeciesNamePlural] отметают такое объяснение, однако недавно наши ученые наконец-то получили убедительные доказательства наличия врожденного псионического потенциала у части [Root.GetSpeciesAdj&neut,gen] населения.\n\nИ хотя, похоже, лишь очень незначительная доля одарена этими пси-талантами, результаты генетических исследований неоспоримы: последние несколько веков количество псиоников стабильно растет. Пока, впрочем, неизвестно, что положило этому начало — какой-то внезапный эволюционный скачок или вмешательство [origin_unplugged_assimilator_empire.GetName&gen]."
 utopia.2600.a: "Возможно, мы увидели будущее, которое ожидает нас."
 utopia.2602.name: "[From.GetSpeciesNamePlural] раскрыли псионический потенциал"
 utopia.2602.1.desc.1.non_gestalt_intro: "Мы обратили внимание на проявление скрытых псионических сил у некоторых индивидов"
 utopia.2602.1.desc.1.non_gestalt_outro: "на это указывают отчеты, просочившиеся из правительства §H[From.GetName&gen]§!. Должно быть, это началось не так давно, поскольку у нас в архивах нет упоминаний о том, чтобы [From.GetSpeciesNamePlural] когда-либо проявляли псионические способности."
 utopia.2602.1.desc.1.organic_non_gestalt: "$utopia.2602.1.desc.1.non_gestalt_intro$ из расы [From.GetSpeciesNamePlural&gen], $utopia.2602.1.desc.1.non_gestalt_outro$"
 utopia.2602.1.desc.1.machine_non_gestalt: "$utopia.2602.1.desc.1.non_gestalt_intro$ механотипа «[From.GetSpeciesName]», $utopia.2602.1.desc.1.non_gestalt_outro$"
 utopia.2602.1.desc.1.gestalt_intro: "Согласно отчетам, просочившимся из правительства §H[From.GetName&gen]§!, у некоторых [From.GetSpeciesNamePlural&gen] начали проявляться скрытые псионические силы. И хотя"
 utopia.2602.1.desc.1.gestalt_outro: "паранормальные способности, никогда до этого не проявлявшиеся — в архивах нет ни слова о подобных происшествиях."
 utopia.2602.1.desc.1.organic_gestalt: "$utopia.2602.1.desc.1.gestalt_intro$ когнитивная связь их расы не является откровением, в этих отчётах описаны $utopia.2602.1.desc.1.gestalt_outro$"
 utopia.2602.1.desc.1.machine_gestalt: "$utopia.2602.1.desc.1.gestalt_intro$ нейросетевая коммуникация между ними не является откровением, в этих отчётах описаны $utopia.2602.1.desc.1.gestalt_outro$"
 utopia.2602.1.desc.2.intro: "Пока что этими силами владеют лишь отдельные"
 utopia.2602.1.desc.2.outro: "В отчетах не приводится никакого объяснения этому явлению."
 utopia.2602.1.desc.2.organic: "$utopia.2602.1.desc.2.intro$ представители расы [From.GetSpeciesNamePlural&gen]. $utopia.2602.1.desc.2.outro$"
 utopia.2602.1.desc.2.machine: "$utopia.2602.1.desc.2.intro$ [From.GetSpeciesNamePlural]. $utopia.2602.1.desc.2.outro$"
 utopia.2602.1.desc.machine_gestalt: "$utopia.2602.1.desc.1.machine_gestalt$\n\n$utopia.2602.1.desc.2.machine$"
 utopia.2602.1.desc.machine_non_gestalt: "$utopia.2602.1.desc.1.machine_non_gestalt$\n\n$utopia.2602.1.desc.2.machine$"
 utopia.2602.1.desc.organic_gestalt: "$utopia.2602.1.desc.1.organic_gestalt$\n\n$utopia.2602.1.desc.2.organic$"
 utopia.2602.1.desc.organic_non_gestalt: "$utopia.2602.1.desc.1.organic_non_gestalt$\n\n$utopia.2602.1.desc.2.organic$"
 utopia.2602.2.desc: "У представителей расы «[From.GetSpeciesNamePlural]» на нашей территории также начали проявляться подобные изменения. Происходящее определенно не ограничено каким-то одним сектором космоса."
 utopia.2602.a.organic_non_gestalt: "Очень необычно."
 utopia.2602.a.hive_or_machine_non_gestalt: "Особые силы — это сомнительно."
 utopia.2602.a.machine_gestalt: "Ошибка вычислений."
 utopia.2602.b: "Экстрасенсорные способности? Что за чушь!"
 utopia.2602.c: "Это колдовство их не спасет."
 utopia.2602.d.organic: "Да… да, мы чувствуем их психическое излучение."
 utopia.2602.d.machine: "Да… мы регистрируем их псионические частоты."
 utopia.2605.name.organic_non_gestalt: "[psionic_leader.GetTitle] — экстрасенс"
 utopia.2605.name.machine_non_gestalt: "[psionic_leader.GetTitle] — псионик"
 utopia.2605.name.gestalt: "[psionic_leader.GetName] — псионик"
 utopia.2605.desc.organic_non_gestalt: "Хотя пси-таланты редко проявляются в зрелом возрасте, нельзя назвать это чем-то неслыханным. [psionic_leader.GetTitle] [psionic_leader.GetName] в последнее время демонстрирует способности, подозрительно похожие на псионические. Полный тест на экстрасенсорную чувствительность определил, что [psionic_leader.GetSheHe] является псиоником 4-го класса."
 utopia.2605.desc.machine_non_gestalt: "Хоть это бывает редко, иногда у модулей развиваются псионические способности, которых не было ранее. [psionic_leader.GetTitle] [psionic_leader.GetName] в последнее время демонстрирует функции, которые можно классифицировать как псионические. После тщательных исследований [psionic_leader.GetAXX::он получил|||она получила] статус [GetPsychicNoun&gen] 4-го класса."
 utopia.2605.desc.gestalt: "Влияние наших новоприобретённых сил растёт день ото дня. [psionic_leader.GetName], что воплощает собой [GetBrainName], показывает способности, которые можно классифицировать как псионические. После тщательных исследований [psionic_leader.GetAXX::он получил|||она получила] статус [GetPsychicNoun&gen] 4-го класса."
 utopia.2605.a: "Эти новые способности хорошо нам послужат."
 utopia.2652.name: "[This.GetSpeciesNamePlural&nom] раскрыли псионические способности"
 utopia.2652.desc.1.intro: "Все [This.GetSpeciesNamePlural&nom] в галактике существенно изменились. В то время как раньше их скрытые пси-таланты"
 utopia.2652.desc.1.outro: "может пользоваться своим псионическим потенциалом в полной мере."
 utopia.2652.desc.1.organic: "$utopia.2652.desc.1.intro$ расцветала лишь у меньшинства, однако теперь вся их раса $utopia.2652.desc.1.outro$"
 utopia.2652.desc.1.machine: "$utopia.2652.desc.1.intro$ пробуждалась лишь у меньшинства, однако теперь весь их вид $utopia.2652.desc.1.outro$"
 utopia.2652.desc.2.non_gestalt: "Эти изменения начались в [From.GetName&prep], однако теперь они пробудились у всех представителей их [GetSpeciesWord&gen], где бы они ни были."
 utopia.2652.desc.2.organic_non_gestalt: "$utopia.2652.desc.2.non_gestalt$\n\nПомимо того, что [This.GetSpeciesNamePlural&nom] демонстрируют мощные псионические способности, они начали отказываться от словесного общения друг с другом в пользу телепатии."
 utopia.2652.desc.2.machine_non_gestalt: "$utopia.2652.desc.2.non_gestalt$\n\n$utopia.2652.desc.2.machine_gestalt$"
 utopia.2652.desc.2.gestalt.intro: "Помимо того, что [This.GetSpeciesNamePlural&nom] демонстрируют мощные псионические способности, они теперь могут общаться"
 utopia.2652.desc.2.organic_gestalt: "$utopia.2652.desc.2.gestalt.intro$ невербально за пределами существующих каналов связи."
 utopia.2652.desc.2.machine_gestalt: "$utopia.2652.desc.2.gestalt.intro$ за пределами существующих каналов связи, используемых коллективом."
 utopia.2652.desc.organic_non_gestalt: "$utopia.2652.desc.1.organic$\n\n$utopia.2652.desc.2.organic_non_gestalt$"
 utopia.2652.desc.machine_non_gestalt: "$utopia.2652.desc.1.machine$\n\n$utopia.2652.desc.2.machine_non_gestalt$"
 utopia.2652.desc.organic_gestalt: "$utopia.2652.desc.1.organic$\n\n$utopia.2652.desc.2.organic_gestalt$"
 utopia.2652.desc.machine_gestalt: "$utopia.2652.desc.1.machine$\n\n$utopia.2652.desc.2.machine_gestalt$"
 utopia.2652.b: "Этому должно быть логическое объяснение."
 utopia.2652.c.organic: "Нужно действовать осторожно."
 utopia.2652.c.machine: "Неоптимальный исход."
 utopia.2652.d.organic: "Мы ощутили псионическую волну их пробуждения."
 utopia.2652.d.machine: "Это объясняет зафиксированные нами псионические волны."
 utopia.2650.name: "Великое пробуждение"
 utopia.2650.desc: "Раса [Root.GetSpeciesName] испытала то, что можно описать как Великое пробуждение. Мы уже давно знали о наличии у нашей расы большого врожденного псионического потенциала, но эти таланты проявлялись лишь у незначительного меньшинства… до недавних пор.\n\nПочти в одночасье [Root.GetSpeciesNamePlural] повсюду полностью раскрыли свои псионические способности. Как если бы некий общий резервуар экстрасенсорной энергии [Root.GetSpeciesName&gen] наконец достиг критической точки и переполнился, что привело к коллективному пробуждению скрытых возможностей нашего мозга.\n\nТелепатия уже заменила большую часть словесного общения, которым раньше пользовались [Root.GetSpeciesNamePlural], и это лишь один небольшой пример бесчисленных изменений, с которыми столкнулось наше общество. Теперь мы связаны друг с другом таким образом, который мало кто из нас когда-либо мог себе представить."
 utopia.2650.a: "Завеса тайны приоткрыта."
 utopia.2655.name: "Покров"
 utopia.2655.desc: "Подобно приглушенному шепоту в темной комнате, Покров взывает к нам из глубин нашего разума. Это первозданная область чистой психической энергии, которая появилась на свет на заре времен. Все существа, одаренные псионическими способностями, устанавливают каким-либо способом связь с Покровом, чтобы черпать силу, пусть даже только на подсознательном уровне.\n\nПосле достижения трансцендентности мы стали видеть Покров более ясно. Есть структуры, в которых даже наши самые сильные телепаты смогли увидеть лишь бесформенную массу вихрящейся энергии. Есть… и другие вещи. Что-то вроде духов, которые смотрят на нас с другой стороны. Иногда с любопытством, иногда с добротой… а иногда и со злостью.\n\nМы все еще в процессе изучения масштабов наших новых способностей, но, возможно, у нас получится общаться с этими духами. Это потребует объединенных усилий самых мощных телепатов среди нас."
 utopia.2655.a: "Мы должны исследовать Покров."
 BREACHING_SHROUD_PROJECT: "Прорыв Покрова"
 BREACHING_SHROUD_PROJECT_DESC: "Если мы хотим наладить связь с обитателями экстрасенсорного измерения, известного под названием Покров, нам придется использовать невероятное количество псионической энергии. Проведена подготовка крупного спиритического сеанса с привлечением наших самых сильных экстрасенсов из Конклава телепатов, недавно образованного на [Root.Capital.GetPlanetMoon]е [Root.Capital.GetName]."
 utopia.2656.name: "Спиритический сеанс"
 utopia.2656.desc: "Проведя несколько дней погруженными в гипнотический транс, наши экстрасенсы из Конклава телепатов в конце концов смогли на короткое время открыть портал в Покров.\n\nТеперь, когда мы установили базовую псионическую связь, в будущем мы сможем получать доступ к Покрову через меню §HКонтакты§!. Чтобы сделать наши визиты в это измерение сколько-нибудь осмысленными и чтобы познакомиться с обитающими там существами, нам, вероятно, придется использовать особые пси-излучатели для усиления наших экстрасенсорных способностей. Это потребует громадного расхода энергии."
 utopia.2656.a: "Пора отправиться туда и узнать, что мы сможем там найти."
 utopia.2657.name: "Зазеркалье"
 utopia.2657.desc: "Нам еще только предстоит пронзить завесу, но мы уже чувствуем, как она истончается от совместных усилий наших разумов. Но наши попытки проникнуть в §HПокров§! не остались незамеченными с той стороны. Что-то наблюдает за нами.\n\nЕго присутствие источает невероятную силу. Оно просачивается сквозь прорехи нашей души.\n\nОно едва ли обращает на нас внимание, наблюдая за нами так, как мы наблюдаем за каплей конденсата. Оно может впустить нас, если мы сумеем добраться до его непостижимого разума."
 utopia.2657.a: "Попытаться связаться с ним."
 utopia.2657.a.tt: "§GЭто позволит нам заключить договор.§!"
 utopia.2657.b: "Мы войдем самостоятельно."
 utopia.2657.c: "Ужасная идея! Нужно быть более осторожными."
 utopia.2658.name: "Подтверждение"
 utopia.2658.desc: "Прошло некоторое время с тех пор, как мы заключили договор с §H[GetShroudPatron&inst]§!. Наши узы еще слабы, и у нас есть шанс вырваться — или укрепить связь."
 utopia.2658.a: "Подтвердить договор."
 utopia.2658.b: "Мы с §Y[GetShroudPatron&inst]§! пойдем разными путями."
 utopia.2659.name: "Вход"
 utopia.2659.desc: "Наши телепаты без устали пытались прорваться в §HПокров§! без помощи его обитателей. Наконец они нашли вход. Бездна зовет нас. Нужно лишь рискнуть сделать шаг в неизвестность."
 utopia.2659.a: "Вперед в туманную бездну."
 FORM_COVENANT_PROJECT: "Причащение к неописуемому"
 FORM_COVENANT_PROJECT_DESC: "Конклав телепатов мира [Root.Capital.GetName] готовится к попытке связаться с сущностью, обитающей в Покрове."
 utopia.3020.name: "§GПризван псионический аватар§!"
 utopia.3020.desc: "Мощная энергия §HПокрова§! была успешно направлена в находящийся под нашим контролем псионический аватар!\n\nПосле перемещения в наше измерение новорожденный аватар обрел форму некоей космической сущности на орбите над [Root.Capital.GetPlanetMoon]ой [Root.Capital.GetName]."
 utopia.3021.desc: "Мощная энергия §HПокрова§! была успешно направлена в находящийся под нашим контролем псионический аватар!\n\nПосле перемещения в наше измерение новорожденный аватар обрел форму гигантского воина на поверхности [Root.Capital.GetPlanetMoon]ы [Root.Capital.GetName]."
 utopia.3022.name: "§RПризыв не удался§!"
 utopia.3022.desc: "Мы оказались неспособны собрать псионическую силу в количестве, достаточном для призыва аватара в наше измерение. Неудачную попытку призыва энергия §HПокрова§! сопроводила тревожным шипением."
 utopia.3023.name: "Псионическое существо атакует"
 utopia.3023.desc: "Попытка вызвать псионического аватара увенчалась успехом лишь частично. Хотя это существо и приняло правильную форму и переместилось в наше измерение, но нашим [GetTelepathPlural&dat] не удалось взять его под свой контроль.\n\nИ теперь мы столкнулись с агрессивной псионической сущностью, которая будет уничтожать все на своем пути."
 utopia.3024.name: "Вторжение из Покрова"
 utopia.3024.desc: "Существо из §HПокрова§! пронзило ткань пространства и материализовалось в системе [shroud_spawn_system.GetName]! Этот мстительный аватар накопил огромное количество псионической энергии и использует ее, чтобы набрасываться на всё и всех, кому не повезло очутиться у него на пути."
 utopia.3024.a: "Его надо остановить!"
 utopia.3026.name: "Аватар Покрова изгнан"
 utopia.3026.desc: "Продолжительная атрофия, вызванная нахождением в обычном пространстве системы §H[shroud_spawn_system.GetName]§!, ослабила аватар.\n\nОн больше не способен поддерживать осязаемую форму, а потому вынужден отступить обратно в §HПокров§!."
 utopia.3026.a.default: "Скатертью дорога."
 utopia.3026.a.machine_or_hive: "Благоприятный исход."
