 opinion_invaded_mind: "Попытка вторжения в разум"
 utopia.3100.name: "Огонь и разрушение"
 utopia.3100.desc_prefix: "[Root.Capital.GetName]… Видение туманное и нечеткое, но сомнений быть не может: это [Root.Capital.GetName] — наша столица."
 utopia.3100.desc_suffix: "\n\n§H«НЕ ОДИН ИЗ МНОГИХ. ЭТО ОБЯЗАТЕЛЬНО ПРОИЗОЙДЕТ. КАК ВОСХОД СОЛНЦА. ЭТО ВАША СУДЬБА».§!\n\nВидение обрывается так же быстро, как и началось, и после него остается след бурлящей псионической энергии."
 utopia.3100.desc_default: "$utopia.3100.desc_prefix$Образы ее великих городов хоть и искажены, но узнаваемы даже через размывающую очертания стену огня и дыма. Тысячи… нет, миллионы обезображенных тел устилают улицы, и все они — [Root.GetSpeciesNamePlural]. Запах разложения невыносим.\n\n§H«ВАШЕ БУДУЩЕЕ».§!\n\nСреди руин не осталось ничего живого. Наши огромные орбитальные сооружения, оставляя в небе дымный след, начали свое медленное, но неизбежное падение на планету. Неужели мы наблюдаем один из многих вариантов нашего будущего?$utopia.3100.desc_suffix$"
 utopia.3100.desc_hive: "$utopia.3100.desc_prefix$Образы ее великих городов хоть и искажены, но узнаваемы даже через размывающую очертания стену огня и дыма. Тысячи… нет, миллионы обезображенных тел устилают улицы, и все они — [Root.GetSpeciesNamePlural]. Стойкий смрад разложения проникает повсюду.\n\n§H«ВАШЕ БУДУЩЕЕ».§!\n\nСреди руин не осталось ничего живого. Наши огромные орбитальные сооружения, оставляя в небе дымный след, начали свое медленное, но неизбежное падение на планету. Неужели мы наблюдаем один из многих вариантов нашего будущего?$utopia.3100.desc_suffix$"
 utopia.3100.desc_machine: "$utopia.3100.desc_prefix$Образы ее крупнейших городов хоть и искажены, но различимы даже через размывающую очертания стену огня и дыма. Тысячи… нет, миллионы разобранных модулей устилают улицы, и все они — [Root.GetSpeciesNamePlural]. Вокруг — только разруха.\n\n§H«ВАШЕ БУДУЩЕЕ».§!\n\nСреди руин не осталось ничего функционирующего. Наши огромные орбитальные сооружения, оставляя в небе дымный след, начали свое медленное, но неизбежное падение на планету. Неужели мы фиксируем один из многих вариантов нашего будущего?$utopia.3100.desc_suffix$"
 utopia.3100.a: "§GНаправить энергию в аватар.§!"
 utopia.3100.b: "§YДар: увеличенная дальность действия сенсоров.§!"
 utopia.3100.c: "§RДар: увеличенная сила щита.§!"
 utopia.3110.name: "Поединок призраков"
 utopia.3110.desc: "Покров здесь особенно неспокоен. Пронизывающие его бурные потоки чистой псионической энергии иногда с огромной силой сталкиваются друг с другом, порождая полуразумных призрачных существ.\n\nЭти пребывающие в замешательстве духи часто вступают в схватки друг с другом, высвобождая невообразимое количество психической энергии в битвах, которые могут длиться тысячелетиями. Фактически, несколько таких поединков, похоже, происходят прямо сейчас.\n\nНам следует действовать с осторожностью."
 utopia.3120.name: "Псионические гости"
 utopia.3120.desc_suffix: "Это гости, подобные нам, и их мощный псионический зонд создан разумом, настолько же чуждым для нас, насколько он чужд для Покрова.\n\nНаши псионические отражения соприкасаются — и перед нами ненадолго возникает видение: в плотной газообразной атмосфере парят органические существа, сопровождаемые стаями более мелких созданий."
 utopia.3120.desc_machine: "В глубинах Покрова мы фиксируем присутствие посторонних. $utopia.3120.desc_suffix$"
 utopia.3120.desc_default: "В глубинах Покрова неожиданно дает о себе знать чье-то присутствие. $utopia.3120.desc_suffix$"
 utopia.3130.name: "Безграничные пески"
 utopia.3130.desc: "Перед нами расстилается безбрежная пустыня. Мы были здесь прежде.\n\n§H«Шала'кул милем зунак?»§!\n\nЧто-то возникает из песка. Трудно разобрать.\n\n§H«Жараби, меласук».§!\n\nСлова, подобные грому, порождаются ртом, совсем для этого непригодным. Мы вынуждены отвечать."
 utopia.3130.a: "Шашка малак."
 utopia.3130.b: "Тирит нали дасумара!"
 utopia.3130.c: "Кунак де'Кирак."
 utopia.3140.name: "Множества"
 utopia.3140.desc_common: "обнажается суть нашего существования. Мультивселенная с тысячами галактик, подобных нашей, вовлечена в бесконечные циклы конфликта.\n\nОн начинается, завершается и затем начинается снова. И каждый раз"
 utopia.3140.desc_suffix: "§H«Так есть»§!, — шепчет чей-то голос, — §H«и так всегда будет».§!"
 utopia.3140.desc_default: "Внезапно, в мучительный момент озарения, $utopia.3140.desc_common$ на кон ставятся триллионы жизней.\n\n$utopia.3140.desc_suffix$"
 utopia.3140.desc_machine: "Внезапно, в ошеломительный момент озарения, $utopia.3140.desc_common$ на кон ставятся триллионы переменных.\n\n$utopia.3140.desc_suffix$"
 utopia.3150.name: "Голоса павших"
 utopia.3150.desc: "Мы взираем на нашу галактику сверху, с расстояния, должно быть, равного сотням тысяч световых лет. Внезапно поток псионической энергии с невероятной скоростью бросает нас навстречу мириадам звезд, в область космоса, принадлежащую одной из угасших империй, которой является [fallen_empire.GetName].\n\nМимо проносятся звезды, затем планеты, пока перед нами не предстает город, где живут [fallen_empire.GetSpeciesName]. Невероятные шпили поднимаются к небу благодаря технологии антигравитации, опередившей наши достижения на многие поколения. Поток несет нас внутрь такого шпиля и затем через многочисленные стены, пока мы не попадаем в помещение, похожее на большой зал заседаний. В нём два представителя расы [fallen_empire.GetSpeciesNamePlural] парят в удобных антигравитационных креслах, ведя спокойную беседу.\n\nОни не знают о нашем присутствии."
 utopia.3150.a: "§YПроникнуть к ним в разум в поисках секретов.§!"
 utopia.3151.name: "§GТехнологические секреты§!"
 utopia.3151.v1.desc: "$utopia.3151.a.desc$\n\n$utopia.3151.1.desc$\n\n$utopia.3151.b.desc$\n\n$utopia.3151.4.desc$\n\n$utopia.3151.c.desc$"
 utopia.3151.v2.desc: "$utopia.3151.a.desc$\n\n$utopia.3151.2.desc$\n\n$utopia.3151.b.desc$\n\n$utopia.3151.5.desc$\n\n$utopia.3151.c.desc$"
 utopia.3151.v3.desc: "$utopia.3151.a.desc$\n\n$utopia.3151.3.desc$\n\n$utopia.3151.b.desc$\n\n$utopia.3151.6.desc$\n\n$utopia.3151.c.desc$"
 utopia.3151.a.desc: "Очевидно, эти [fallen_empire.GetSpeciesNamePlural] — какие-то вельможи, обсуждающие государственные вопросы. Медленно, но верно видение сосредотачивается на них, а их непонятная речь постепенно превращается в слова, имеющие для нас смысл."
 utopia.3151.b.desc: "Сияние разума, которое демонстрируют эти [fallen_empire.GetSpeciesNamePlural], ошеломляет. Словно распустившийся цветок, их разум открыт и обнажен. Проникнуть внутрь было бы легко."
 utopia.3151.c.desc: "Вот и все. Технологические секреты вырваны из закоулков их разума с такой же легкостью, как можно скопировать файл из компьютера без пароля. [fallen_empire.GetSpeciesNamePlural] и не догадываются о произошедшем из их собственного разума хищении."
 utopia.3151.1.desc: "§H«…безумие. Если она думает, что народ согласится даже с кратковременным снижением уровня жизни, к которому они привыкли, то…»§!"
 utopia.3151.2.desc: "§H«…безобразие. Представь себе, если более молодые расы начнут хотя бы подозревать, что мы больше не понимаем наши собственные технологии! Мы должны…»§!"
 utopia.3151.3.desc: "§H«…набирают все большую силу. Члены совета убеждены, что если мы не примем меры…»§!"
 utopia.3151.4.desc: "§H«…плевать на то, что говорит совет. Выскочки всё ещё отстают от нас на тысячелетия, а их жалкие флотилии — это такая же угроза для нас, как газурианский комар для огненной хилаксийской ящерицы. Нет необходимости в…»§!"
 utopia.3151.5.desc: "§H«…продолжаю считать, что карательные меры неуместны. Они молоды и беспечны, но когда-то и мы были такими. У них всё ещё есть время, чтобы…»§!"
 utopia.3151.6.desc: "§H«…и что, возможно, нам следовало принять меры, чтобы ликвидировать более молодые расы, пока они не стали слишком сильными. Тут я с ним соглашусь, но совету кажется, что уже слишком поздно…»§!"
 utopia.3152.name: "Неуслышанные секреты"
 utopia.3152.desc: "Очевидно, эти [fallen_empire.GetSpeciesNamePlural] — какие-то вельможи, обсуждающие государственные вопросы. Медленно, но верно видение сосредотачивается на них, а их непонятная речь постепенно превращается в слова, имеющие для нас смысл.\n\nВнезапно чужаки умолкают и замирают.\n\n§H«Ты это чувствуешь?»\n\n«Да. Кто-то за нами наблюдает».§!\n\nОни оглядывают помещение, и наконец оба начинают смотреть прямо на нас.\n\n§H«Поразительно. Псионический зонд».§!\n\n§H«Похоже, его изготовили [Root.GetSpeciesName]. Активируй скорее транспланарный щит».§!\n\nВидение резко обрывается."
 utopia.3153.desc: "[Root.GetSpeciesNamePlural]!\n\nНе думайте, что ваша мерзкая попытка вторгнуться в разум наших лидеров прошла незамеченной.\n\nОжидайте последствий."
 utopia.3153.a: "Н-но… мы можем всё объяснить!"
 utopia.3153.b: "Этому есть совершенно логичное объяснение…"
 utopia.3160.name: "Огонёк в пустоте"
 utopia.3160.desc: "Внутри Покрова материализуется крошечная мерцающая звезда. Она пролетает мимо с невероятной скоростью, и на мгновение видно, что это инопланетный корабль неизвестной конфигурации. Затем он исчезает в облаке псионической энергии так же быстро, как и появился.\n\nРазве такое возможно? Можно ли физически войти в Покров, а затем появиться где-то еще в нормальном пространстве?"
 utopia.3160.a: "§YПодождать немного.§!"
 utopia.3161.desc: "Внезапно появляется еще одна мерцающая звезда, но в этот раз мы готовы. Этот инопланетный корабль не похож ни на один из тех, что мы видели в нашей галактике. Когда он пролетает мимо, мы чувствуем сияние разума его экипажа, и их секреты становятся нашими.\n\nПрыжковый пси-двигатель. Как оригинально."
 utopia.3161.name: "§GПрыжковые пси-двигатели§!"
 utopia.3162.desc: "Внезапно появляется еще одна мерцающая звезда, но в этот раз мы готовы. Этот инопланетный корабль не похож ни на один из тех, что мы видели в нашей галактике. Когда он пролетает мимо, мы пытаемся слиться с сиянием разума его экипажа, но их интеллект более темный и чужеродный, чем любой, с которым мы сталкивались раньше.\n\nМало того, что нас отбрасывает от их корабля, так еще и обратная псионическая реакция, возникшая в результате их яростного отторжения, следует за нами до выхода из Покрова! Субсветовая скорость наших звездолетов мгновенно снижается."
 utopia.3170.name: "Защищенная сущность"
 utopia.3170.desc: "Проследовав за слабым отзвуком в Покрове, мы встретили духа, который окружил себя каким-то мощным псионическим щитом.\n\n§H«УХОДИТЕ».§!"
 utopia.3170.a: "§YПопытаться пробить щит.§!"
 utopia.3171.name: "§GПсионические щиты§!"
 utopia.3171.desc_suffix: "процедура пробивания щита научила нас генерировать аналогичное силовое поле. Если мы сумеем усовершенствовать эту методику, то сможем создавать достаточно крупные псионические щиты, охватывающие целые звездолеты."
 utopia.3171.desc_machine_gestalt: "Мы проникли так глубоко в Покров не для того, чтобы теперь поворачивать назад. Направив всю свою совокупную псионическую мощь на щит, мы смогли пробить в нем достаточно большую брешь, чтобы ненадолго заглянуть внутрь.\n\nНаш разум пока не в состоянии осознать, что именно находится по другую сторону; нагрузка, которую испытали наши псионические процессоры, для некоторых оказалась критической. Однако их жертва не была напрасной, так как $utopia.3171.desc_suffix$"
 utopia.3171.desc_organic: "Мы проникли так глубоко в Покров не для того, чтобы теперь поворачивать назад. Направив всю свою псионическую мощь на щит, наши телепаты смогли пробить в нем достаточно большую брешь, позволившую некоторым из них заглянуть внутрь.\n\nНеизвестно, что они увидели по другую сторону щита, но этого хватило, чтобы навсегда утратить разум. Однако их жертва не была напрасной, так как $utopia.3171.desc_suffix$"
 utopia.3172.name: "Непробитый щит"
 utopia.3172.desc_machine_gestalt: "Нашим [GetTelepathPlural&dat], которые и так были перегружены из-за столь глубокого проникновения в Покров, не удалось направить на щит достаточно псионической мощи, чтобы пробить его. Наша неудача была встречена следующим сообщением."
 utopia.3172.desc_machine_non_gestalt: "Нашим [GetTelepathPlural&dat], которые и так были перегружены из-за столь глубокого проникновения в Покров, не удалось направить на щит достаточно псионической мощи, чтобы пробить его. Наша неудачная попытка, похоже, разгневала духа."
 utopia.3172.desc_organic_gestalt: "Нашим [GetTelepathPlural&dat], которые и так были истощены из-за столь глубокого проникновения в Покров, не удалось направить на щит достаточно псионической мощи, чтобы пробить его. Наша неудача была встречена следующим сообщением."
 utopia.3172.desc_organic_non_gestalt: "Нашим [GetTelepathPlural&dat], которые и так были истощены из-за столь глубокого проникновения в Покров, не удалось направить на щит достаточно псионической мощи, чтобы пробить его. Наша неудачная попытка, похоже, разгневала духа."
 utopia.3180.name: "В ожидании будущего"
 utopia.3180.desc.intro: "Концепция времени в нашем понимании совершенно чужда Покрову. То, что здесь может показаться столетиями, в реальном мире займет лишь часы или даже минуты."
 utopia.3180.desc_gestalt: "$utopia.3180.desc.intro$ Вполне возможно, что мы уже в шаге от овладения предвидением — если знать, куда смотреть…\n\nНо такая способность несет с собой опасность для всего коллективного разума, поэтому надо соблюдать осторожность."
 utopia.3180.desc_machine_non_gestalt: "$utopia.3180.desc.intro$ Если знать, куда смотреть, то можно заглянуть и в будущее…\n\nНо предвидение несет с собой опасность перегрузки псионических процессоров, поэтому надо соблюдать осторожность."
 utopia.3180.desc_organic_non_gestalt: "$utopia.3180.desc.intro$ Если знать, куда смотреть, то можно заглянуть и в будущее…\n\nПредвидение — один из самых верных путей к безумию для телепата, поэтому мы должны соблюдать осторожность."
 utopia.3180.a: "§YПоразмыслить здесь немного.§!"
 utopia.3181.desc_gestalt: "Ограниченную прекогнитивную связь с Покровом можно поддерживать без риска перегрузки модулей, но массовый приток вероятностных данных слишком велик, чтобы иметь большую практическую ценность.\n\nОднако наши исследовательские узлы всё-таки нашли некоторое применение поступающим данным: с их помощью стало возможно нарастить боеспособность наших флотилий."
 utopia.3181.desc_machine_non_gestalt: "Ограниченную прекогнитивную связь с Покровом можно поддерживать без риска перегрузки модулей, но массовый приток вероятностных данных слишком велик, чтобы иметь большую практическую ценность.\n\nВ то же время, если удастся разработать цифровой интерфейс для интерпретации этих данных, то потенциально он может быть применен для улучшения производительности боевых компьютеров наших звездолетов…"
 utopia.3181.desc_organic_non_gestalt: "Ограниченную прекогнитивную связь с Покровом можно поддерживать без риска сойти с ума, но массовый приток вероятностных данных слишком велик, чтобы иметь большую практическую ценность.\n\nВ то же время, если удастся разработать цифровой интерфейс для интерпретации этих данных, то потенциально он может быть применен для улучшения производительности боевых компьютеров наших звездолетов…"
 utopia.3181.name: "§GПрекогнитивный интерфейс§!"
 utopia.3182.name: "§RПокровное безумие§!"
 utopia.3182.desc_gestalt: "Как мы и опасались, попытки осознать непостижимое множество вариантов и вероятностей, существующих одновременно и в прошлом, и в будущем, привели к массовому впадению псионических единиц в кататонию.\n\nОни оказались отрезаны от сверхразума и лишены какого-либо предназначения. Чтобы снова дотянуться до Покрова, нам придется переработать дефектные оболочки и восстановить силы."
 utopia.3182.desc.non_gestalt.1: "непостижимое множество вариантов и вероятностей, существующих в прошлом и будущем.\n\nВсе до единого вариации и сценарии, независимо от того, насколько огромны или незначительны различия между ними, бесконечно повторяются в их [GetSpeciesBrainPlural&prep]. Они впали в состояние постоянной кататонии.\n\n"
 utopia.3182.desc.non_gestalt.2: "новых [GetTelepathPlural&gen], понадобится какое-то время, прежде чем снова сможем собрать псионическую силу, необходимую для погружения в Покров."
 utopia.3182.desc_machine_non_gestalt: "Как и ожидалось, наши псионические процессоры были не в состоянии обработать $utopia.3182.desc.non_gestalt.1$Поскольку нам придётся изготовить$utopia.3182.desc.non_gestalt.2$"
 utopia.3182.desc_organic_non_gestalt: "Как и ожидалось, наших телепатов охватило безумие. Все их разумы одновременно заполнило $utopia.3182.desc.non_gestalt.1$Поскольку нам придётся завербовать$utopia.3182.desc.non_gestalt.2$"
 utopia.3190.name: "Сгусток энергии"
 utopia.3190.desc.intro: "Мы обнаружили небольшое пространство внутри Покрова с таким уровнем концентрации псионической энергии, какого мы никогда раньше не видели."
 utopia.3190.desc_gestalt: "$utopia.3190.desc.intro$ Если мы попытаемся почерпнуть эту энергию напрямую, она просто растворится внутри коллектива без каких-либо заметных последствий. Однако можно поступить иначе: воспользоваться отдельно взятой «избранной» единицей в качестве проводника, по которому псионический поток будет поступать к нам. В процессе эта единица станет невероятно могущественной…\n\nНо пока неизвестно, сумеет ли она выдержать подобную концентрацию энергии без фатальных последствий. Тем не менее, мы уже составили список подходящих кандидатов."
 utopia.3190.desc_non_gestalt: "$utopia.3190.desc.intro$ [GetPsychicNoun::Любой <1>, которому|||fem:Любая <1>, которой] удастся подключиться к этому «карману» чистой энергии, приобретет невероятную силу… но ее достаточно только для одного, и это связано с определенным риском.\n\nВо [Root.GetName::всём|||fem:всей|||pl:всех] [Root.GetName&prep] лишь несколько претендентов обладают достаточной псионической силой, чтобы проникнуть в эту энергетическую область и иметь шансы выжить. На ком остановим выбор?"
 utopia.3190.1.a: "§G[leader_1.GetTitle] [leader_1.GetName]§!"
 utopia.3190.2.a: "§Y[leader_1.GetTitle] [leader_1.GetName]§!"
 utopia.3190.3.a: "§R[leader_1.GetTitle] [leader_1.GetName]§!"
 utopia.3190.1.b: "§G[leader_2.GetTitle] [leader_2.GetName]§!"
 utopia.3190.2.b: "§Y[leader_2.GetTitle] [leader_2.GetName]§!"
 utopia.3190.3.b: "§R[leader_2.GetTitle] [leader_2.GetName]§!"
 utopia.3190.1.c: "§G[leader_3.GetTitle] [leader_3.GetName]§!"
 utopia.3190.2.c: "§Y[leader_3.GetTitle] [leader_3.GetName]§!"
 utopia.3190.3.c: "§R[leader_3.GetTitle] [leader_3.GetName]§!"
 utopia.3190.1.d: "§G[leader_4.GetTitle] [leader_4.GetName]§!"
 utopia.3190.2.d: "§Y[leader_4.GetTitle] [leader_4.GetName]§!"
 utopia.3190.3.d: "§R[leader_4.GetTitle] [leader_4.GetName]§!"
 utopia.3191.name: "[GetChosenName]"
 utopia.3191.desc_organic_non_gestalt: "$utopia.3191.desc_machine_non_gestalt$ Да смилуются духи над всеми нами."
 utopia.3191.desc_machine_non_gestalt: "Мы это… сделали. Кажется, что весь Покров содрогается по мере того, как [chosen_leader.GetName] получает силу, перетекающую из «кармана» псионической энергии.\n\nВ истории галактики считанные единицы были одарены псионической силой такой величины."
 utopia.3191.desc_gestalt: "Наша цель — [chosen_leader.GetName] — успешно вбирает в себя поток, хлынувший из очага псионической энергии.\n\nЭта сила не сгинула бесследно и не превратилась в каплю в океане коллективного разума — теперь она служит [Root.GetName&dat], и [chosen_leader.GetName] будет пользоваться ею исключительно во благо всех [Root.Species.GetNamePlural]."
 utopia.3192.name: "§RСмерть лидера§!"
 utopia.3192.desc_gestalt: "Весь Покров содрогнулся, когда [chosen_leader.GetName] [chosen_leader.GetAXX::начал|||fem:начала] поглощать огромные запасы псионической энергии, содержавшиеся в этом кармане.\n\nОднако, как и предполагалось, такая мощь оказалась непосильной для одного существа. [chosen_leader.GetName] [chosen_leader.GetAXX::вспыхнул|||fem:вспыхнула] всплеском псионической энергии — [GetBrainName] больше не слышит [chosen_leader.GetAXX::его|||fem:её] голос."
 utopia.3192.desc_non_gestalt: "Кажется, что весь Покров содрогается по мере того, как [chosen_leader.GetName] получает огромные запасы псионической энергии, содержавшиеся в «кармане».\n\nК сожалению, [chosen_leader.GetHerHis] [GetSpeciesBrain&nom] не смог справиться с напряжением. Возможно, физические существа просто не могут сдержать такую силу. [chosen_leader.GetName] [chosen_leader.GetAXX::был поглощён|||fem:была поглощена] крупным взрывов псионической энергии, который унёс с собой и всех тех, кто находился поблизости."
 utopia.3193.name: "§RПсионическое преобразование§!"
 utopia.3193.desc.intro: "Кажется, что весь Покров содрогается по мере того, как [chosen_leader.GetName] получает огромные запасы псионической энергии, содержавшиеся в «кармане».\n\nХотя передача энергии прошла успешно, [chosen_leader.GetName] теперь представляет собой… нечто иное…"
 utopia.3193.desc.outro: "\n\n§H«НИЧТОЖНАЯ МЕЛЮЗГА… ЧТО… ВЫ… СО МНОЙ… СДЕЛАЛИ?..»§!\n\n§H«ВЫ… ПОПЛАТИТЕСЬ… ЗА СВОЮ… ГОРДЫНЮ…»§!"
 utopia.3193.desc_gestalt: "$utopia.3193.desc.intro$ отрезанное от коллектива, поскольку теперь в [chosen_leader.GetAXX:нём|||fem:ней] поселилась совершенно чужеродная сущность.$utopia.3193.desc.outro$"
 utopia.3193.desc_non_gestalt: "$utopia.3193.desc.intro$ одержимое созданием из чистой энергии.$utopia.3193.desc.outro$"
 utopia.3200.name: "Видение"
 utopia.3200.1.desc_organic: "Пустота здесь мерцает от пронизывающей ее энергии. Давайте немного отдохнем."
 utopia.3200.1.desc_machine: "Пустота здесь мерцает от пронизывающей её энергии. Стоит немного зарядить батареи."
 utopia.3200.2.desc: "Путь, по которому мы следовали, внезапно оборвался. Дальше нам идти некуда."
 utopia.3200.3.desc_organic: "Что-то говорит здесь с нами. Что-то чудесное."
 utopia.3200.3.desc_machine: "Что-то говорит здесь с нами. Что-то особенное."
 utopia.3200.4.desc: "По непостижимым причинам нас влечет именно этот сгусток энергии Покрова. Но почему?"
 utopia.3200.5.desc.outro: "охватывает нас, стоит нам лишь задуматься о вечности, проведенной в Покрове. Затем мы приходим в себя, и ужас отступает."
 utopia.3200.5.desc_organic: "На какое-то мгновение мы теряемся. Чувство абсолютной паники $utopia.3200.5.desc.outro$"
 utopia.3200.5.desc_machine: "На какое-то мгновение мы теряемся. Чувство растущей неуверенности $utopia.3200.5.desc.outro$"
 utopia.3200.6.desc.intro: "Мы погружаемся всё глубже в Покров. Вокруг нас начинают танцевать переливающиеся яркими, не существующими в обычном пространстве цветами духи — час, другой, третий…\n\n"
 utopia.3200.6.desc_organic: "$utopia.3200.6.desc.intro$Мы любуемся этим приятным зрелищем, пока внезапно не осознаём, что нас куда-то ведут."
 utopia.3200.6.desc_machine: "$utopia.3200.6.desc.intro$Мы фиксируем это любопытное зрелище, пока внезапно не осознаём, что нас куда-то ведут."
 utopia.3200.7.desc: "Медленно вращаясь вокруг своей оси, здесь парит идеальный кристалл. Когда мы приближаемся, он рассыпается на тысячи кусочков."
 utopia.3200.8.desc_organic: "Впереди в пустоте вращается труп [Root.GetSpeciesName&gen]. Прежде чем исчезнуть из поля зрения, зловонное тело издает пронзительный визг."
 utopia.3200.8.desc_machine: "Впереди в пустоте вращается разбитая оболочка [Root.GetSpeciesName&gen]. Прежде чем исчезнуть из поля зрения, искореженное тело издает пронзительный визг."
 utopia.3200.9.desc.intro: "Мы не уверены, что это происходит на самом деле. Мы и правда в Покрове, или"
 utopia.3200.9.desc_hive: "$utopia.3200.9.desc.intro$ это острое сенсорное нарушение охватило наш коллектив?"
 utopia.3200.9.desc_organic_non_hive: "$utopia.3200.9.desc.intro$ один из нас переживает острое психотическое расстройство?"
 utopia.3200.9.desc_machine_non_hive: "$utopia.3200.9.desc.intro$ это следствие критического сбоя в обработке информации?"
 terraforming_candidate_category: "Древние признаки жизни"
 terraforming_candidate_category_desc: "В этом бесплодном и безжизненном мире есть признаки того, что когда-то здесь была биосфера."
 MESSAGE_TERRAFORM_FOUND_TITLE: "$anomaly.2575.name$"
 MESSAGE_TERRAFORM_FOUND_DESC: "Установлено, что [From.GetName] является кандидатом на терраформирование. Эта [From.GetPlanetMoon]а будет рассматриваться как потенциальная цель будущей колонизации."
 anomaly.2575.name: "Обнаружен кандидат на терраформирование"
 anomaly.2575.desc.intro: "Подробное изучение [From.GetPlanetMoon]ы [From.GetName] показало, что в далеком прошлом здесь могла быть жизнь. На полярных ледяных шапках и под поверхностью имеются значительные запасы замерзшей воды. Наличие систем низменностей указывает на то, что вода, возможно, когда-то текла здесь свободно."
 anomaly.2575.desc.1: "$anomaly.2575.desc.intro$\n\nЭта [From.GetPlanetMoon]а теоретически подходит для терраформирования, но у нас нет технологий для осуществления такой грандиозной задачи в реалистичные сроки."
 anomaly.2575.desc.2: "$anomaly.2575.desc.intro$\n\nЗатраты энергии были бы внушительными, но у нас есть технологии для терраформирования, благодаря которым планета [From.GetPlanetMoon]а постепенно станет местом, где снова сможет зародиться жизнь."
 anomaly.2575.desc.3: "$anomaly.2575.desc.intro$\n\nК сожалению, наличие в этой системе §Yсферы Дайсона§! делает невозможной любую попытку восстановить планету."
 anomaly.2575.a: "Возможно, со временем мы сможем пробудить ее вновь."
 utopia.3300.name: "Сущность в Покрове"
 utopia.3300.desc: "Здесь есть какая-то сущность, полностью занимающая эту часть Покрова. В прошлом мы сталкивались с духами, но это нечто другое, намного более могущественное… намного более древнее.\n\nПохоже, оно нас пока не замечает. Возможно, оно спит. Возможно, мы недостойны его внимания.\n\nНаверное, нам лучше покинуть это место."
 utopia.3300.1.a: "§GПопытаться установить связь с сущностью§!"
 utopia.3300.1.b: "§YПопытаться установить связь с сущностью§!"
 utopia.3300.1.c: "§RПопытаться установить связь с сущностью§!"
 utopia.3300.1.d: "§G[chosen_one.GetName] поговорит с сущностью§!"
 utopia.3301.name: "§RОтказ от единения§!"
 utopia.3301.desc: "Когда мы обращаемся к сущности, мы чувствуем, как она шевелится, а ее внимание полностью сосредоточено на нас. Похоже, ей не нравится, что ее побеспокоили.\n\nВолна энергии захлестывает наших телепатов, заставляя мучительно страдать одних и потерять сознание других. Нам не остается ничего иного, как покинуть Покров до поры до времени."
 utopia.3302.desc: "Когда мы обращаемся к сущности, то чувствуем, как она шевелится, а ее внимание полностью сосредоточено на нас. Похоже, ей не нравится, что ее побеспокоили.\n\nОгромная волна псионической энергии выплескивается на нас, лишая наших телепатов сознания. Очнувшись, они обнаруживают, что одного из них не хватает. §Y[leader_to_kill.GetName]§! на своем прежнем месте отсутствует: там теперь лишь псионический след от небольшого разрыва, как если бы древняя сущность проникла в наш мир и утащила беднягу с собой для того, чтобы… В общем-то, кто может знать причину или цель?\n\nДля чего бы это ни было сделано, как-то сомнительно, что [leader_to_kill.GetName] когда-нибудь предстанет перед нами вновь."
 utopia.3304.name: "Предложен договор"
 utopia.3304.desc.start.default: "Когда мы обращаемся к сущности,"
 utopia.3304.desc.start.shroud: "Когда мы проникаем в Покров,"
 utopia.3304.desc.common: "разум наших телепатов заполняется нестройным хором. Сначала это всего лишь тихий шепот, но затем какофония тысячи голосов, говорящих в унисон, становится всё громче.\n\nГолоса называют себя §HШепчущие в пустоте§!. Отдельные голоса в хоре называют свои имена: Шелест тайн,"
 utopia.3304.desc.throne.default: "Тень престола"
 utopia.3304.desc.throne.shroud: "$the_vacant_throne$"
 utopia.3304.desc.end: ", Кукловод — их великое множество, и все они — часть хора Шепчущих. Они заявляют, что знают все секреты, которые тайком шептали друг другу смертные, и предлагают поделиться с нами некоторыми из них…\n\n§HМы должны лишь позволить им проникнуть в наше сознание.§!\n\nОни уверяют, что цена эта пустячная. Мол, мы едва ли даже заметим их присутствие.\n\nВ их тоне слышится настойчивость."
 utopia.3304.desc: "$utopia.3304.desc.start.default$, $utopia.3304.desc.common$ $utopia.3304.desc.throne.default$$utopia.3304.desc.end$"
 utopia.3304.desc.shroud: "$utopia.3304.desc.start.shroud$, $utopia.3304.desc.common$ $utopia.3304.desc.throne.shroud$$utopia.3304.desc.end$"
 utopia.3304.a: "§YЗаключить договор с Шепчущимися в пустоте§!"
 utopia.3305.desc: "Сущность приветствует нас с добродушной фамильярностью. Она разговаривает не столько словами, сколько видениями, концепциями, идеями. Она просачивается в разум наших телепатов так бережно и плавно, что возникает мысль, будто она всегда там была. Перед их взором мелькает вихрь образов.\n\nСущность, представившаяся как §HСоставитель цепочек§!, с любопытством и интересом рассматривает наши органические формы. Составитель показывает разнообразные способы их возможного развития, изменения. Улучшения. Эволюции.\n\n§HМы должны лишь позволить ему проникнуть в нашу плоть.§!\n\nОн ожидает от нас ответа, выражая терпение и нежность. Словно отец, безумно любящий своего ребенка. За ним стоит его близнец — Оживляющий глину. Ему нет дела до наших органических умов. Он жаждет творить души, превращая микросхемы в дух.\n\nСоставитель ждет нашего ответа."
 utopia.3305.a: "§YЗаключить договор с Составителем цепочек§!"
 utopia.3306.desc.1: "Обращаясь к сущности, мы ощущаем сильнейший, почти непреодолимый голод. "
 utopia.3306.desc.2: "Сущность не тратит впустую ни времени, ни слов. Это §HПожиратель миров§!, который желает нас поглотить.\n\nПравда, только некоторых из нас. Не больше, чем мы можем пожертвовать. В обмен на это он обещает даровать нам великие способности. Он научит нас пользоваться своим голодом, своей яростью. Он превратит их в псионическое оружие, которое может одолеть любого врага.\n\n§HМы должны лишь позволить ему съесть нас.§!"
 utopia.3306.desc.3: "$utopia.3306.desc.2$\n\nПохоже, ему не терпится начать."
 utopia.3306.desc: "$utopia.3306.desc.1$$utopia.3306.desc.3$"
 utopia.3306.a: "§YЗаключить договор с Пожирателем миров§!"
 utopia.3307.desc: "Мы даже не успели заметить сущность — она сама обратилась к нам. Ее мысли крутятся и вертятся, проникая в разум наших телепатов, предлагая, упрашивая. Это §HИсполнитель желаний§!, который обещает нам богатство, власть, престиж… всё, чего мы когда-либо желали.\n\nЦена? Пустяк, что-то вроде платы за вход. Он лишь хочет для нас самого лучшего. Он будет помогать нам, указывать нам путь, направлять наши стремления и мечты.\n\n§HМы должны лишь принять его в наши сердца.§!\n\nОн уверен, что мы ответим «да». Как вообще мы можем сказать «нет»?"
 utopia.3307.a: "§YЗаключить договор с Исполнителем желаний§!"
 utopia.3308.desc: "Сущность ждала нас. Это §RЗавершитель цикла§!, который всегда нас ждал. Наши телепаты внезапно начинают говорить в унисон, и десяток их голосов сливается в идеальном хоре: §R«ВАШЕ ВРЕМЯ ЕЩЕ НЕ ПРИШЛО.§! — Пауза. — §RНО ЭТО ВОЗМОЖНО».§!\n\nБольше никаких слов не сказано, но нам предложили сделку — уж это мы знаем точно. Власть, знание и богатство без числа могут стать нашими.\n\n§RМы должны лишь призвать Завершителя.§!"
 utopia.3308.a: "§RЗаключить договор с Завершителем цикла§!"
 utopia.3310.name: "Договор заключен"
 utopia.3320.name: "Завершитель цикла: §RРасплата§!"
 utopia.3320.desc.intro: "Наше время истекло. На протяжении короткого срока мы пользовались невероятной силой, дарованной нам §RКонцом цикла§!. Мы знали, что за нее придется платить, но рассчитывали, что плата будет не слишком обременительной или что мы сумеем найти способ ее избежать.\n\nМы ошиблись в обоих случаях.\n\nМы заплатили всем. В одно мгновение, настолько быстро, что не успеваешь даже охнуть, не то что ответить, [Root.GetName]… [Root.GetName::исчез|||fem:исчезла|||neut:исчезло|||pl:исчезли]. Там, где раньше были процветающие колонии, теперь только развалины. Там, где когда-то мощные флотилии бороздили пустоту, теперь только тишина и обломки. Всё поглотил Конец. Всё забрал §HПокров§!."
 utopia.3320.desc.outro: "материализовалась над бывшей столицей, [former_capital.GetPlanetMoon]ой [former_capital.GetName]. Она получила огромную силу, поглотив сознания наших [GetPsychicNounPlural&gen], и теперь рыщет по галактике в поисках новых жертв."
 utopia.3320.desc.a.1.gestalt: "От нашего государства осталась лишь кучка изгоев, которую возглавляет §H[Root.GetRulerName]§! — [GetPsychicNoun::могущественный <1>, отделившийся|||fem:могущественная <1>, отделившаяся] от коллектива и вместе с небольшой группой [GetIndividualPlural&gen] [GetPsychicNoun::укрывшийся|||fem:укрывшаяся] в мире, не отмеченном Завершителем для уничтожения."
 utopia.3320.desc.a.1.non_gestalt: "От нашего государства осталась лишь кучка изгоев, которую возглавляет §H[Root.GetRulerName]§! — [GetPsychicNoun::могущественный <1>, который предвидел|||fem:могущественная <1>, которая предвидела] катастрофу и [GetPsychicNoun::увёл|||fem:увела] небольшую часть населения в мир, не отмеченный Завершителем для уничтожения."
 utopia.3320.desc.a.outro: "И, как будто этой катастрофы было недостаточно, огромная энергетическая сущность $utopia.3320.desc.outro$"
 utopia.3320.desc.a.gestalt: "$utopia.3320.desc.intro$\n\n$utopia.3320.desc.a.1.gestalt$\n\n$utopia.3320.desc.a.outro$"
 utopia.3320.desc.a.non_gestalt: "$utopia.3320.desc.intro$\n\n$utopia.3320.desc.a.1.non_gestalt$\n\n$utopia.3320.desc.a.outro$"
 utopia.3320.desc.b: "$utopia.3320.desc.intro$\n\nОт нашего государства не осталось и следа, а над бывшей столицей, [former_capital.GetPlanetMoon]ой [former_capital.GetName], материализовалась огромная энергетическая сущность. Она получила огромную силу, поглотив сознания наших [GetPsychicNounPlural&gen], и теперь рыскает по галактике в поисках новых жертв. Теперь мы хотя бы не увидим, как она закончит то, что мы начали."
 utopia.3320.opt.a: "Что мы наделали?.."
 utopia.3320.opt.a.shroud.tt: "$BEGINS_EVENT_CHAIN$ §Y$the_reckoning_chain_title$§!"
 utopia.3321.desc.1: "На протяжении многих лет мы знали, что в §H[From.GetName&prep]§! творится что-то неладное. В какой-то момент объём их промышленного производства, эффективность их науки… всё в их государстве внезапным и необъяснимым образом стало демонстрировать огромный рост производительности и эффективности, как если бы их благословила какая-то незримая сила.\n\nКак оказалось, это было не столько благословение, сколько проклятие. [From.GetName::<1> отказался|||fem:<1> отказалась|||neut:<1> отказалось|||pl:<1> отказались] от своего будущего, и настало время оплатить этот долг.\n\nВ одно мгновение, настолько быстро, что не успеваешь даже охнуть, не то что ответить, [From.GetName]… попросту [From.GetName::<1> исчез|||fem:<1> исчезла|||neut:<1> исчезло|||pl:<1> исчезли]. Там, где раньше были процветающие колонии, теперь руины. Там, где могучие флотилии бороздили пространство, теперь тишина и обломки."
 utopia.3321.desc.2: "А рядом с их бывшей столицей материализовалась энергетическая сущность невероятной силы."
 utopia.3321.desc.3: "Несколько десятилетий назад мы начали наблюдать аномалии в далеких звездных системах. Наши [GetResearchers] предполагали, что эти вспышки активности и излучений могут быть вызваны производственным бумом, который переживает местная цивилизация. Поскольку мы не вступили с ней в контакт, эти гипотезы так и остались неподтвержденными.\n\nА потом эта активность практически мгновенно прекратилась. В некогда оживленных уголках космоса воцарилась тишина."
 utopia.3321.desc.4: "Недавно наши радары дальнего действия обнаружили в этих же системах загадочный феномен. Если данные верны, то это явление можно описать как невероятно могущественную сущность, которая состоит из чистой энергии и движется по космосу, уничтожая всё на своём пути."
 utopia.3321.desc.a.contact: "$utopia.3321.desc.1$ Эта катастрофа не обошла стороной и наши владения, уничтожив несколько принадлежащих нам бывших [From.GetAdj&pl,gen] миров.\n\n$utopia.3321.desc.2$\n\nПохоже, она голодна."
 utopia.3321.desc.a.no_contact: "$utopia.3321.desc.3$ В тот же самый момент погибло и несколько планет в нашем секторе космоса. Причины этого мы пока не установили.\n\n$utopia.3321.desc.4$"
 utopia.3321.desc.b.contact: "$utopia.3321.desc.1$\n\n$utopia.3321.desc.2$ Она движется от мира к миру, уничтожая всё на своём пути."
 utopia.3321.desc.b.no_contact: "$utopia.3321.desc.3$\n\n$utopia.3321.desc.4$"
 utopia.3321.opt.a.contact: "Что они наделали?!"
 utopia.3321.opt.a.no_contact: "Что это значит?!"
 utopia.3325.name: "Завершитель цикла: §Rпод Покровом§!"
 utopia.3325.desc.organic: "Мы не смогли остановить чудовищную энергетическую сущность. Планета §H[Root.GetName]§! вместе со всем населением была полностью поглощена §HПокровом§!."
 utopia.3325.desc.machine: "Мы не смогли остановить гигантскую энергетическую сущность. Планета §H[Root.GetName]§! вместе со всем населением была полностью поглощена §HПокровом§!."
 utopia.3325.opt.a.organic_non_gestalt: "Ужас!"
 utopia.3325.opt.a.machine_or_gestalt: "Это катастрофа."
 utopia.3331.name: "Шепчущиеся в пустоте: §Rпривыкание§!"
 utopia.3331.desc.intro: "Хотя секреты, доверенные нашему народу §HШепчущими§!, приносят большую пользу, некоторые из них также вызывают тревогу"
 utopia.3331.desc: "$utopia.3331.desc.intro$ Стресс от чрезмерных знаний может оказаться тяжелым испытанием, и, чтобы справиться с ним, всё больше наших граждан, в том числе и §H[leader_target.GetTitle] [leader_target.GetName]§!, стали злоупотреблять алкоголем или наркотиками."
 utopia.3331.opt.a: "Досадно."
 utopia.3332.name: "Шепчущиеся в пустоте: §Rсамоубийство§!"
 utopia.3332.desc.intro: "$utopia.3331.desc.intro$, особенно те, которыми делятся с важными государственными деятелями. §H[leader_target.GetTitle] [leader_target.GetName]§! [leader_target.GetAXX::оказался|||fem:оказалась] не в силах"
 utopia.3332.desc.organic_non_gestalt: "$utopia.3332.desc.intro$ справиться с таким стрессом и [leader_target.GetAXX::покончил|||fem:покончила] с собой."
 utopia.3332.desc.machine_non_gestalt: "$utopia.3332.desc.intro$ эффективно обработать эти данные и [leader_target.GetAXX::самоуничтожился|||fem:самоуничтожилась]."
 utopia.3332.desc.gestalt: "Хотя секреты, доверенные нашему народу §HШепчущими§!, приносят большую пользу, некоторые из них содержат пугающие идеи индивидуализма. Не выдержав их продолжительного воздействия, §H[leader_target.GetTitle] [leader_target.GetName]§! решает отделиться от коллектива, оставив нам лишь мертвый разлагающийся остов."
 utopia.3332.opt.a.non_gestalt: "Трагедия."
 utopia.3332.opt.a.gestalt: "Мы утилизируем эти останки."
 utopia.3333.name: "Шепчущиеся в пустоте: §Rбезумие§!"
 utopia.3333.desc.intro: "С тех пор, как мы впустили §HШепчущих§! в [GetBrainName::наш|||neut:наше] [GetBrainName], в коллективе стала отмечаться тревожная тенденция к росту числа отклонений от нормы."
 utopia.3333.desc.gestalt: "$utopia.3333.desc.intro$\n\nЕдиницы всё чаще конфликтуют друг с другом во время выполнения стандартных процедур и злоупотребляют благами почти на уровне индивидуализма.\n\nДля восстановления порядка нам придется уничтожить девиантные единицы."
 utopia.3333.desc.outro: "и необъяснимых актов насилия. Первое время нам удавалось справляться с этими проблемами, но сейчас они вышли из-под контроля. По всему государству расцвели радикальные фракции, яростно сражающиеся друг с другом."
 utopia.3333.desc.organic_non_gestalt: "С тех пор как мы пригласили §HШепчущих§! в наш разум, среди наших граждан-псиоников участились случаи психических заболеваний $utopia.3333.desc.outro$"
 utopia.3333.desc.machine_non_gestalt: "С тех пор как мы пригласили §HШепчущих§! в наш разум, среди наших граждан-псиоников участились случаи спонтанных программных ошибок $utopia.3333.desc.outro$"
 utopia.3333.opt.a: "Мы должны восстановить порядок!"
 utopia.3334.name: "Шепчущиеся в пустоте: §Rпсихоз§!"
 utopia.3334.desc.gestalt: "$utopia.3333.desc.intro$\n\nХуже того, мы начали терять ощущение единства. Псионически индуцированная склонность к индивидуализму не позволяет коллективу взаимодействовать должным образом.\n\nЧтобы восстановить порядок, мы должны очиститься от этих излишеств."
 utopia.3334.desc.outro: "и необъяснимых актов насилия. Первое время нам удавалось справляться с этими проблемами, но сейчас они вышли из-под контроля. На всей территории государства начали возникать тайные общества. Некоторые из них безобидны, у других же более коварные планы. Взаимное недоверие поразило всё общество."
 utopia.3334.desc.organic_non_gestalt: "С тех пор как мы пригласили §HШепчущих§! в наш разум, среди наших граждан-псиоников участились случаи психических заболеваний $utopia.3334.desc.outro$"
 utopia.3334.desc.machine_non_gestalt: "С тех пор как мы пригласили §HШепчущих§! в наш разум, среди наших граждан-псиоников участились случаи спонтанных программных ошибок $utopia.3334.desc.outro$"
 utopia.3334.opt.a: "Это ужасно!"
 utopia.3335.name: "Пожиратель миров: §Rперекус§!"
 utopia.3335.desc.common: "§H[devoured_leader.GetTitle] [devoured_leader.GetName]§! внезапно [devoured_leader.GetAXX::исчез|||fem:исчезла], оставив после себя лишь эхо псионической активности."
 utopia.3335.desc.gestalt: "$utopia.3335.desc.common$ Похоже, $the_eater_of_worlds_color_article$ решил поглотить [devoured_leader.GetAXX::его|||fem:ее]. Хотя остальным нашим лидерам пока ничего не угрожает, мы не знаем, когда Пожиратель может вернуться за добавкой."
 utopia.3335.desc.non_gestalt: "$utopia.3335.desc.common$ Мы полагаем, что его поглотил $the_eater_of_worlds_color_article$. Нам удалось скрыть все следы. Будем надеяться, что Пожиратель на какое-то время насытился."
 utopia.3335.opt.a: "Незначительная цена."
 utopia.3336.name: "Пожиратель миров: §Rголод§!"
 utopia.3336.desc.intro: "§HПожиратель§! вновь явился, чтобы собрать свою жатву"
 utopia.3336.desc.gestalt: "$utopia.3336.desc.intro$, поглотив значительную часть населения планеты §Y[planet_target.GetName]§!.\n\nМы ценим преимущества, которые дает нам договор с этой сущностью, но потеря столь значительной части коллектива провоцирует конфликты и нестабильность, подрывая наше единство."
 utopia.3336.desc.non_gestalt: "$utopia.3336.desc.intro$, поглотив значительную часть населения на планете §Y[planet_target.GetName]§!.\n\nХотя нам удалось сохранить в тайне от широких масс наш договор с Пожирателем, оставшихся на планете граждан в связи с этими «таинственными исчезновениями» охватили понятные страх и гнев, и они требуют от правительства объяснений."
 utopia.3336.opt.a: "Жаль, что так вышло, но это было неизбежно."
 utopia.3337.name: "Пожиратель миров: §Rпрожорливость§!"
 utopia.3337.desc: "Пожиратель вновь вернулся за своей данью. Не довольствуясь тем, чтобы просто забрать часть нашего населения, он поглотил целую планету. Мир §Y[planet_target.GetName]§! был окутан густым псионическим туманом, и все посланные в атмосферу спасательные корабли так и не вернулись. К счастью, этот мир не был заселен, но мы вздрагиваем от одной только мысли, что следующей жертвой может стать одна из наших процветающих колоний."
 utopia.3337.desc.shadows: "$utopia.3336.desc.intro$ — на этот раз он поглотил небесное тело целиком.\n\nПланета §H[planet_target.GetName]§! теперь окружена густым псионическим туманом, а любые попытки войти в ее атмосферу терпят неудачу. К счастью, она была необитаема. Если следующей жертвой окажется густонаселенная колония, последствия будут гораздо тяжелее."
 utopia.3337.opt.a: "Как далеко это зайдет?"
 utopia.3337.opt.tt: "[shrouded_planet.GetName] превращается в §Y$pc_shrouded$§!"
 #utopia.3338.name: "Instrument of Desire: §RParticularism§!"
 #utopia.3338.desc: "The desires inflicted upon our people by the Instrument are strong. The people of §Y[planet_target.GetName]§! have become convinced that their own particular customs are of distinct and paramount importance over those of our society as a whole. Alternative political movements are springing up like wildfire, and the political situation on the planet has become unpredictable, to say the least."
 utopia.3338.opt.a: "Досадно."
 #utopia.3339.name: "Instrument of Desire: §RDeviance§!"
 #utopia.3339.desc: "The desires inflicted upon our people by the Instrument are strong. As if overnight, the population of our empire appear to have turned against both the government and the very traditions of our people, questioning ages-old customs and breaking social taboos. Support for government positions are rapidly dropping, and it seems we may be in for a period of considerable political turmoil."
 #utopia.3339.opt.a: "Terrible!"
 utopia.3340.name: "Исполнитель желаний: §Rдекадентство§!"
 utopia.3340.desc.gestalt: "Влияние §HИсполнителя§! ощущается по всему [GetBrainName&dat]. Его непостижимые желания разлагают наш коллектив абстрактными индивидуалистическими идеями «исключительности», «декаданса» и «богатства».\n\nЗаразившись этими концепциями, наши единицы отклоняются от общих целей. Возможно, для того чтобы вновь обрести единство, мы будем вынуждены предаться этим порокам."
 utopia.3340.desc.organic_non_gestalt: "Желания, внушенные §HИсполнителем§!, обладают огромной силой. Наше население обезумело от потребительства и декадентства, требуя все более эксклюзивных товаров, редких блюд и изысканных ощущений. В нескольких торговых районах уже вспыхнули бунты.\n\nПохоже, для того, чтобы успокоить народ, нам потребуется выпускать ещё больше таких товаров, как §H[GetInstrumentCraving]§!."
 utopia.3340.desc.machine_non_gestalt: "Желания, генерируемые §HИсполнителем§!, влияют на управляющие программы и логические центры нашего населения.\n\nПоддавшись стимулам потребительства и декаданса, многие единицы выполняют эстетическую модификацию своих деталей в ущерб функциональности. Вызванный этим дефицит наиболее востребованных запчастей уже приводит к конфликтам на сборочных линиях.\n\nДля решения этой проблемы нам потребуется увеличить производство таких продуктов, как §H[GetInstrumentCraving]§!."
 utopia.3340.opt.a.organic_non_gestalt: "Но зачем?"
 utopia.3340.opt.a.machine_or_gestalt: "Такова цена успеха."
 instrument_cravings: "Дикие желания"
 instrument_cravings_tooltip: "§RНаши £pops£ поселения теперь потребляют§! [GetInstrumentCravingIconAndName_FR_lower]"
 instrument_cravings_desc: "$the_instrument_of_desire_color_article_cap$ породил новую тенденцию среди нашего населения. Все хотят одну и ту же вещь, причем не для какой-то конкретной цели, а просто ради самого факта обладания."
 instrument_cravings_gestalt: "$instrument_cravings$"
 instrument_cravings_gestalt_desc: "$the_instrument_of_desire_color_article_cap$ заставил наш коллектив испытать новое чувство иррационального стремления. Мы все хотим одну и ту же вещь — и нам безразлично, для чего она предназначена."
 utopia.3341.name: "[GetComposerMutationName]"
 utopia.3341.name.organic: "Составитель цепочек: §Rмутация§!"
 utopia.3341.name.machine: "Составитель цепочек: §Rреконфигурация§!"
 utopia.3341.desc.machine: "$the_composer_of_strands_color_article_cap$ благословил нас, напрямую вмешавшись в работу некоторых узлов, которые до сих пор считались неизменяемыми. Наши управляющие цепи приобрели новые конфигурации, а прочный металл каким-то образом переплавился в совершенно неожиданные формы. Удивительно, но это не вызвало ни малейших сбоев в работе наших нейропроцессоров."
 utopia.3341.desc.organic_gestalt: "$the_composer_of_strands_color_article_cap$ даровал нам свое благословение, напрямую изменив генетический код расы §H[Root.GetSpeciesName]§!. Как ни странно, быстрые и непредсказуемые мутации вызвали весьма сдержанную реакцию. Похоже, они уже воспринимаются как часть повседневной жизни, которая едва ли заслуживает негодования или даже обсуждения."
 utopia.3341.desc.organic_non_gestalt: "$the_composer_of_strands_color_article_cap$ даровал нам свое благословение, напрямую изменив генетический код расы §H[Root.GetSpeciesName]§!. Как ни странно, быстрые и непредсказуемые мутации вызвали весьма сдержанную реакцию населения. Похоже, оно уже считает их частью повседневной жизни, которая едва ли заслуживает негодования или даже обсуждения."
 utopia.3341.opt.a: "Посмотрим, к чему это приведет…"
 utopia.3342.name: "Пожиратель миров: §Rголод§!"
 utopia.3342.desc.intro: "Голод §HПожирателя§! невозможно утолить. На этот раз он подкрепился одной из наших колоний."
 utopia.3342.desc.outro: "остался лишь огромный кратер, подернутый пурпурной дымкой."
 utopia.3342.desc.gestalt: "$utopia.3342.desc.intro$ В той части физического пространство, где раньше располагалась значительная часть нашего коллектива, теперь $utopia.3342.desc.outro$"
 utopia.3342.desc.non_gestalt: "$utopia.3342.desc.intro$ Значительная часть мира исчезла из нашей реальности, и теперь там $utopia.3342.desc.outro$"
 utopia.3342.opt.a.non_gestalt: "Это будет сложно скрыть..."
 utopia.3342.opt.a.gestalt: "Такова цена могущества."
 utopia.3343.name: "Пожиратель миров: §Rаппетит§!"
 utopia.3343.desc.gestalt: "§HПожиратель§! снова явился за своей данью: на этот раз он поглотил целый город на планете §Y[planet_target.GetName]§!. Потеря столь огромного числа единиц стала для коллектива слишком большой платой за договор с этой сущностью."
 utopia.3343.desc.organic_non_gestalt: "§HПожиратель§! снова явился за своей данью: на этот раз он поглотил целый город на планете §Y[planet_target.GetName]§!. Хотя нам удалось утаить договор с этой сущностью от широких масс, уцелевшие граждане вполне ожидаемо испытывают страх и гнев. Они требуют от правительства объяснений по поводу «таинственных исчезновений»."
 utopia.3343.desc.machine_non_gestalt: "§HПожиратель§! снова явился за своей данью: на этот раз он поглотил целый город на планете §Y[planet_target.GetName]§!. Хотя нам удалось утаить договор с этой сущностью от широких масс, те, кто остался, испытывают крайнее недовольство «таинственными исчезновениями» и требуют объяснений от правительства."
 utopia.3343.opt.a.organic_non_gestalt: "Неизбежная трагедия."
 utopia.3343.opt.a.machine_or_gestalt: "Печально, но неизбежно."
 utopia.3345.name: "[GetComposerDegenerationName]"
 utopia.3345.name.organic: "Составитель цепочек: §Rдегенерация§!"
 utopia.3345.name.machine: "Составитель цепочек: §Rнеобратимая деградация§!"
 utopia.3345.desc.organic_1: "Благословения §HСоставителя цепочек§! непредсказуемы. С одним из наших лидеров случился досадный инцидент, в ходе которого его"
 utopia.3345.desc.organic_2: "обрела собственную волю. За считаные мгновения он превратился в бесформенную пульсирующую массу. Не имея возможности обратить этот процесс, администрация объявила лидера"
 utopia.3345.desc.organic_3: "погибшим."
 utopia.3345.desc.organic_individual_lithoid: "$utopia.3345.desc.organic_1$ физическая форма $utopia.3345.desc.organic_2$ $utopia.3345.desc.organic_3$"
 utopia.3345.desc.organic_hive_lithoid: "$utopia.3345.desc.organic_1$ физическая форма $utopia.3345.desc.organic_2$ drone $utopia.3345.desc.organic_3$"
 utopia.3345.desc.organic_individual_non_lithoid: "$utopia.3345.desc.organic_1$ плоть $utopia.3345.desc.organic_2$ $utopia.3345.desc.organic_3$"
 utopia.3345.desc.organic_hive_non_lithoid: "$utopia.3345.desc.organic_1$ плоть $utopia.3345.desc.organic_2$ drone $utopia.3345.desc.organic_3$"
 utopia.3345.desc.machine_non_gestalt: "Благословения §HСоставителя цепочек§! непредсказуемы. С одним из наших лидеров случился грандиозный критический сбой, из-за которого детали его конструкции обрели собственную волю и переплавились в совершенно нелепую форму. [Root.GetName] больше не [Root.GetName::<1> нуждается|||pl:<1> нуждаются] в этой жалкой груде металлолома."
 utopia.3345.desc.machine_gestalt: "Благословения §HСоставителя цепочек§! непредсказуемы. С одним из наших узлов-лидеров случился грандиозный критический сбой, из-за которого детали его конструкции обрели собственную волю и переплавились в совершенно нелепую форму. [Root.GetName] больше не [Root.GetName::<1> нуждается|||pl:<1> нуждаются] в этой жалкой груде металлолома."
 utopia.3345.opt.a.organic: "Теперь он живет простой жизнью."
 utopia.3345.opt.a.machine: "Любая конструкция со временем устаревает."
 utopia.3346.name: "Составитель цепочек: §Rрегресс§!"
 utopia.3346.desc: "Благословенный дар §HСоставителя цепочек§! пал на мир [devolved_species_planet.GetName]. Часть нашего населения на этой планете подверглась серьезной мутации, деградировав до предразумных существ."
 utopia.3346.opt.a.non_gestalt: "Занимательно, но прискорбно."
 utopia.3346.opt.a.gestalt: "Досадно."
 utopia.3346.opt.a.tt: "§Y500§! £pop£ §Hпоселений§! мира [devolved_species_planet.GetName] превратились в §Yпредразумных§!.\n\nПри наличии соответствующей технологии их можно §Yпреобразить§! в закладке рас."
 utopia.3347.name: "Колыбель душ: §Rдемилитаризация§!"
 utopia.3347.desc: "§HКолыбель§! стремится к гармонии во всём. Наши [GetTelepathPlural&nom] считают, что это относится и к военной мощи, которая должна быть достаточной для поддержания мира, но не более того. Похоже, численность наших космических сил прогневила нашего благоволителя: несколько кораблей флотилии §H«[demilitarized_fleet.GetFleetName]»§! внезапно исчезли в яростной вспышке псионической энергии."
 utopia.3347.opt.a: "$UNFORTUNATE$"
 utopia.3347.opt.a.tt: "Случайно выбранная флотилия, контролируемая нами, теряет до 12 ед. §Hвместимости флота§!."
 utopia.3348.name: "[GetCradleChaoticAnguishName]"
 utopia.3348.name.organic_non_gestalt: "Колыбель душ: §Rстрадания§!"
 utopia.3348.name.machine_or_gestalt: "Колыбель душ: §Rнарушения§!"
 utopia.3348.desc.intro: "[GetCradleAnguishIntro]"
 utopia.3348.desc.organic_non_gestalt: "$utopia.3348.desc.intro$ экзистенциальные страдания."
 utopia.3348.desc.machine_or_gestalt: "$utopia.3348.desc.intro$ когнитивные нарушения."
 utopia.3348.desc_intro_homicidal: "Настроившись на волну §HКолыбели§!, [root.GetSpeciesAdj&pl] умы оказались охвачены разладом — они вдруг осмелились помыслить о гармоничном сосуществовании всех разумов. Волна псионических возмущений, поднятая текущими проблемами в жизни галактики, вызывает у них массовые"
 utopia.3348.desc_intro_default: "Настроившись на волну §HКолыбели§!, представители [root.GetSpeciesAdj&fem,gen] расы стали испытывать стремление к гармоничному сосуществованию всех разумов. Волна псионических возмущений, поднятая текущими проблемами в жизни галактики, вызывает у них массовые"
 utopia.3348.opt.a: "Мы должны выдержать."
 anguish_of_the_cradle: "Страдания Колыбели"
 anguish_of_the_cradle_desc: "Колыбель душ испустила волну псионических возмущений, терзающую разумы нашего населения."
 anguish_of_the_cradle_gestalt: "$anguish_of_the_cradle$"
 anguish_of_the_cradle_gestalt_desc: "$anguish_of_the_cradle_desc$"
 utopia.3349.name: "Колыбель душ: §Rограничения§!"
 utopia.3349.desc: "Содержать и обслуживать военные флотилии по всей территории §H[root.GetName&gen]§! становится всё сложнее.\n\nНаши [GetTelepathPlural&nom] чувствуют, что это вызвано влиянием §HКолыбели§!, стремящейся поддерживать гармонию в галактике. Наши попытки развивать военную инфраструктуру, какими бы скромными они ни были, вызвали её недовольство."
 utopia.3349.opt.a: "Мы должны ограничить своё присутствие в пустоте."
 limit_of_the_cradle: "Ограничения Колыбели"
 limit_of_the_cradle_desc: "Колыбель душ сократила нашу вспомогательную военную инфраструктуру."
 utopia.3350.name: "[GetLavishLifestyleEventName]"
 utopia.3350.name.individual: "Исполнитель желаний: §Rроскошный образ жизни§!"
 utopia.3350.name.gestalt: "Исполнитель желаний: §Rизбыточное потребление§!"
 utopia.3350.desc.individual: "Наша связь с §HИсполнителем§! привела к тому, что часть [Root.GetSpeciesAdj&neut,gen] руководства начала демонстрировать дорогостоящие привычки потребления.\n\n[lavish_leader.GetName] [lavish_leader.GetAXX::был уличен|||fem:была уличена] в расточительных тратах энергокредитов на экстравагантные предметы роскоши и поддерживает всё более изощренный личный образ жизни."
 utopia.3350.desc.gestalt: "Наша тесная связь с §HИсполнителем§! вызывает аномальное потребление ресурсов среди некоторых [Root.GetSpeciesAdj&pl,gen] лидерских единиц.\n\n[lavish_leader.GetName] [lavish_leader.GetAXX::стал|||fem:стала] использовать значительно больше энергии, чем требуется для функционирования. Физических причин этому не найдено — похоже, в каком-то роде это проявление предпочтений."
 utopia.3350.opt.a: "Такова цена желания."
 utopia.3351.name: "Исполнитель желаний: §Rотвлечение рабочей силы§!"
 utopia.3351.desc.individual: "По мере того как влияние нашего благоволителя распространяется по [Root.GetName&dat], новые развлечения и досуг отвлекают население от продуктивной работы.\n\nНа фоне падения мотивации поддержание прежних показателей теперь требует дополнительных затрат."
 utopia.3351.desc.gestalt: "По мере того как влияние нашего благоволителя распространяется по [Root.GetName&dat], в [Root.GetSpeciesAdj&masc,prep] коллективе появились признаки девиантного поведения.\n\nКратковременные индивидуалистические позывы и склонность отвлекаться особенно часто проявляются во время рабочих процессов. Поддержание сплоченности и дисциплины теперь требует дополнительных затрат."
 utopia.3351.opt.a: "Временная прихоть §HИсполнителя§!."
 distracted_workforce: "Рассеянная рабочая сила"
 distracted_workforce_desc: "Эта рабочая сила склонна отвлекаться и требует постоянного контроля."
 utopia.200.name: "Новая сущность в Покрове"
 utopia.200.desc.a: "[target_species.GetNamePlural], живущие в нашем государстве, изменились. Все началось со слабой пульсации в Покрове. Теперь вибрация, кажется, происходит на ином уровне. Мы все ее чувствуем, а [target_species.GetNamePlural] находятся на грани обретения скрытых псионических способностей, подобных нашим.\n\nВозможно, это связано с тем, что они живут недалеко от нас. А может быть, Покров просто избрал их. Конклав телепатов, состоящий из наших главных псионических экспертов, предупреждает, что, возможно, для нас это единственный шанс вмешаться. Мы могли бы задавить это в зародыше или помочь им пробудиться. Без нашего наставления они далеко не продвинутся."
 utopia.200.desc.b: "Необычная активность в Покрове указывает на то, что [target_species.GetNamePlural], другая раса нашего государства, начинают проявлять скрытые псионические способности. Теперь перед нами стоит тот же выбор, что и раньше: подавить их растущие способности или выпустить их на волю?"
 utopia.200.a: "Мы раскроем их потенциал."
 utopia.200.a.tooltip: "Все [target_species.GetAdj&pl] поселения получат признак §Y«$trait_latent_psionic$»§!."
 utopia.200.b: "Они недостойны."
 utopia.203.name: "Пробуждение"
 utopia.203.desc.a: "Под руководством Конклава телепатов [target_species.GetNamePlural] развили более глубокую связь с Покровом, чем мы могли даже предполагать. Эти силы словно предназначались для них изначально.\n\nТеперь они утверждают, что будто бы готовы для раскрытия своего полного псионического потенциала. Мнение конклава, однако, разделилось. Одни обеспокоены тем, что изменения наступили слишком быстро и что их разум станет нестабильным, а другие — что их новообретенные силы могут вскружить им голову. Если мы не нанесем удар сейчас, то, возможно, другого шанса у нас не будет."
 utopia.203.desc.b: "[target_species.GetNamePlural] также заявляют, что они готовы предпринять шаги, необходимые для достижения полного псионического потенциала и пробуждения."
 utopia.203.a: "Они готовы."
 utopia.203.a.tooltip: "Все [target_species.GetAdj&pl] поселения получат признак §Y«$trait_psionic$»§!."
 utopia.203.b: "Они недостойны."
 utopia.203.c: "Слишком опасно."
 utopia.204.name: "Грубое пробуждение"
 utopia.204.desc.a: "Недавно наших исследователей озадачило неожиданное проявление псионических способностей у некоторых представителей расы [original_species.GetSpeciesNamePlural]. При расследовании выяснилось, что эти изменения совпали с крупным псионическим пробуждением их собратьев в [target_country.GetName&prep], [target_country.GetName::который давно известен|||fem:которая давно известна|||neut:которое давно известно|||pl:которые давно известны] своими успехами в области псионики.\n\nМожно только предположить, что некоторые из этих новообретённых сил перекинулись на их далёких родственников в нашем государстве, хотя мы и не в состоянии понять, как именно это произошло."
 utopia.204.desc.b: "Недавно наших исследователей озадачило неожиданное проявление псионических способностей у некоторых представителей расы [original_species.GetSpeciesNamePlural]. При более тщательном изучении обнаружилось, что эти псионики связаны телепатически со своими собратьями в ранее неизвестном [target_country.GetName&prep], с [target_country.GetName::которым|||fem:которой|||pl:которыми] мы теперь наладили отношения. Похоже, изменения, свидетелями которых мы стали, были обусловлены волновым эффектом в результате крупного псионического пробуждения всех представителей расы [original_species.GetSpeciesNamePlural] в [target_country.GetName&prep]."
 utopia.204.a.tooltip: "До 4 [original_species.GetSpeciesAdj&pl,gen] поселений получат признак §YСкрытый псионик§!."
 utopia.205.name: "Неожиданное пробуждение"
 utopia.205.desc: "После псионического пробуждения расы [target_species.GetName], согласно нашим информаторам, такие же скрытые способности начали повсеместно проявляться и у других представителей той же расы. Такое ощущение, что, независимо от расстояния, их связывает с Покровом наличие общих предков.\n\nОднако, в отличие от своих далеких родичей в нашем государстве, их мало и они далеко друг от друга, поэтому маловероятно, что они когда-либо достигнут полного пробуждения."
 whisperers_madness: "Безумие из-за Покрова"
 whisperers_madness_desc: "Население нашего государства бунтует по причине безумия, вызванного §HШепчущими в пустоте§!."
 whisperers_madness_gestalt: "$whisperers_madness$"
 whisperers_madness_gestalt_desc: "Наши единицы разделены из-за коллективного помешательства, вызванного §HШепчущими в пустоте§!."
 whisperers_psychosis: "Психоз из-за Покрова"
 whisperers_psychosis_desc: "Наше государство пало жертвой внутренних распрей по причине безумия, вызванного §HШепчущими в пустоте§!."
 whisperers_psychosis_gestalt: "$whisperers_psychosis$"
 whisperers_psychosis_gestalt_desc: "Наше государство пало жертвой раздоров из-за дисгармонии, внесенной §HШепчущими в пустоте§!."
 eater_unhappiness_planet_1: "Поглощенное Покровом население"
 eater_unhappiness_planet_1_desc: "Часть населения этой планеты была поглощена §HПожирателем миров§!."
 eater_unhappiness_planet_1_gestalt: "$eater_unhappiness_planet_1$"
 eater_unhappiness_planet_1_gestalt_desc: "$eater_unhappiness_planet_1_desc$"
 eater_unhappiness_planet_2: "$eater_unhappiness_planet_1$"
 eater_unhappiness_planet_2_desc: "$eater_unhappiness_planet_1_desc$"
 eater_unhappiness_planet_2_gestalt: "$eater_unhappiness_planet_2$"
 eater_unhappiness_planet_2_gestalt_desc: "$eater_unhappiness_planet_2_desc$"
 eater_unhappiness_empire: "Поглощенный Покровом мир"
 eater_unhappiness_empire_desc: "Целая планета в нашем государстве была поглощена §HПожирателем миров§!."
 eater_unhappiness_empire_gestalt: "$eater_unhappiness_empire$"
 eater_unhappiness_empire_gestalt_desc: "$eater_unhappiness_empire_desc$"
 instrument_deviance_planet: "Отклонение из-за Покрова"
 instrument_deviance_planet_desc: "Население этой планеты отказывается от принципов нашего государства ради преследования собственных целей. Несомненно, это работа §YИсполнителя желаний§!."
 instrument_deviance_empire: "Отклонение из-за Покрова"
 instrument_deviance_empire_desc: "Население всего нашего государства стало подвергать сомнению его принципы и политику. Несомненно, это работа §YИсполнителя желаний§!."
 instrument_consumer_goods: "Декадентство из-за Покрова"
 instrument_consumer_goods_desc: "Население этой планеты обратилось к декадентскому потребительству и отчаянно добивается эксклюзивных продуктов питания и экзотических товаров. Несомненно, это работа §YИсполнителя желаний§!."
 d_eater_deposit: "Кратер Покрова"
 d_eater_deposit_desc: "Часть этой планеты поглотила сущность §HПокрова§!. Оставшийся кратер заполнили клубы пурпурного тумана, в котором часто пропадают случайные путники."
 opinion_doomed_us_all: "Призвали Завершителя"
 absorbed_consciousness_1: "Поглощенное сознание"
 absorbed_consciousness_2: "$absorbed_consciousness_1$"
 absorbed_consciousness_3: "$absorbed_consciousness_1$"
 absorbed_consciousness_4: "$absorbed_consciousness_1$"
 absorbed_consciousness_5: "$absorbed_consciousness_1$"
 covenant.tooltip: "§YЭтому есть своя цена.§!\n\n"
 covenant.cycle.tooltip: "§RНе делайте этого.§!\n\n"
 covenant.whisperers.desc: "Свершилось. Мы заключили договор с §HШепчущими в пустоте§!, и они уже начали делиться своими секретами с нашими учеными и лидерами. Эти знания принесут нам огромную пользу.\n\nЕдинственной проблемой, похоже, является внезапный рост психических заболеваний и самоубийств среди населения в целом, а также вспышки беспричинной агрессии вплоть до убийства в отдельных мирах. Наши клиники и психлечебницы испытывают некоторые затруднения в связи с внезапным наплывом пациентов."
 covenant.whisperers.option: "Мы справимся."
 covenant.eater.desc: "Свершилось. Результаты договора, который мы заключили с §HПожирателем миров§!, уже ощущаются в армии и флоте. Наши солдаты сражаются с яростью, достойной дикарей, и даже оружие наших кораблей как будто бы жаждет смерти врагов.\n\nНесомненным следствием этого договора является и внезапное таинственное исчезновение целого крупного города в одной из наших колоний: Пожиратель забрал его жителей в качестве обещанной дани.\n\nНе такая уж и большая цена… при условии, конечно, что он не проголодается снова."
 covenant.eater.option: "Будем надеяться, что нет."
 covenant.instrument.desc: "Свершилось. Мы заключили договор с §HИсполнителем желаний§!. Результаты уже видны: мы получаем сообщения о новых богатых жилах в наших шахтах, о предприятиях, которые должны были обанкротиться, но внезапно начали процветать, о редких и ценных ресурсах на астероидах, где раньше не видели ничего, кроме камней и льда.\n\nПохоже, наше государство входит в золотой век богатства и процветания, как и обещал нам Исполнитель, но… что он там говорил о цене?.."
 covenant.instrument.option: "Вряд ли это означает что-то плохое."
 covenant.composer.desc: "Свершилось. Мы заключили договор с §HСоставителем цепочек§!. Его последствия уже видны: иначе как объяснить нынешний огромный всплеск рождаемости? Впрочем, наряду с положительными эффектами мы наблюдаем рост числа странных мутаций: дети рождаются с лишними конечностями и органами, порой не похожими ни на какие известные нам.\n\nК счастью, незначительная смертность из-за подобных отклонений с лихвой компенсируется ростом рождаемости и очевидным укреплением здоровья наших граждан."
 covenant.composer.option: "Мы поступили правильно."
 covenant.cycle.desc: "Готово. Мы заключили договор с §RЗавершителем цикла§!. Когда мы приняли его предложение, он произнес только два слова: §RПЯТЬДЕСЯТ ЛЕТ§!. Затем наступила тишина, в которой мы остались размышлять над будущими последствиями того, что мы только что навлекли на себя."
 covenant.cycle.option: "Да смилуются духи над всеми нами!"
 covenant_shroud_marked: "Отмеченный Покровом"
 covenant_shroud_marked_desc: "Этот мир отмечен Покровом.\n\n§RЗдесь произойдет что-то очень плохое.§!"
