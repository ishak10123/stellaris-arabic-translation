 covenant_instrument_of_desire: "Договор: исполнитель желаний"
 covenant_instrument_of_desire_0: "$covenant_instrument_of_desire$"
 covenant_instrument_of_desire_desc: "Мы заключили в Покрове договор с мощным существом и теперь пользуемся плодами его покровительства.\n\n§YПридется дорого заплатить.§!"
 covenant_instrument_of_desire_desc_0: "$covenant_instrument_of_desire_desc$"
 covenant_end_of_the_cycle: "Договор: завершитель цикла"
 covenant_end_of_the_cycle_desc: "Мы заключили договор с Завершителем цикла.\n\n§RНас ждет расплата.§!"
 whisperers_covenant_chain_title: "Шепчущиеся в пустоте"
 whisperers_covenant_chain_desc: "Мы связали себя с сущностью Покрова, известной как §HШепчущие в пустоте§!. Это непостижимое создание даровало нам крупицы своей силы, но не бесплатно. Вероятно, в будущем это повторится.\n\nНаши [GetTelepathPlural&nom] предполагают, что связь с этой сущностью будет проще укрепить, если наши действия станут соответствовать ее воле.\n\nШепчущие ценят новые знания, тайны и заговоры. Они наслаждаются простой радостью разума, переполненного идеями."
 whisperers_covenant_chain_begin: "$BEGINS_EVENT_CHAIN$ §Y$whisperers_covenant_chain_title$§!"
 whisperers_covenant_chain_end: "$ENDS_EVENT_CHAIN$ §Y$whisperers_covenant_chain_title$§!"
 eater_covenant_chain_title: "Пожиратель миров"
 eater_covenant_chain_desc.intro: "Мы связали себя с сущностью Покрова, известной как $the_eater_of_worlds_color_article$. Это ненасытное создание даровало нам крупицы своей силы, но не бесплатно. Вероятно, в будущем это повторится.\n\nНаши [GetTelepathPlural&nom] предполагают, что связь с этой сущностью будет проще укрепить, если наши действия станут соответствовать ее воле."
 eater_covenant_chain_desc: "$eater_covenant_chain_desc.intro$\n\nПожиратель ненасытен и нетерпелив. Он жаждет войны, сладкого вкуса борьбы и скорби."
 eater_covenant_chain_begin: "$BEGINS_EVENT_CHAIN$ §Y$eater_covenant_chain_title$§!"
 eater_covenant_chain_end: "$ENDS_EVENT_CHAIN$ §Y$eater_covenant_chain_title$§!"
 composer_covenant_chain_title: "Составитель цепочек"
 composer_covenant_chain_desc.intro: "Мы связали себя с сущностью Покрова, известной как $the_composer_of_strands_color_article$. Это заботливое создание даровало нам крупицы своей силы, но не бесплатно. Вероятно, в будущем это повторится.\n\nНаши [GetTelepathPlural&nom] предполагают, что связь с этой сущностью будет проще укрепить, если наши действия станут соответствовать ее воле."
 composer_covenant_chain_desc: "$composer_covenant_chain_desc.intro$\n\nСоставитель любит манипулировать генами, освобождая священную плоть от ограничений эволюции. Он учит нас уважать жизнь и природу."
 composer_covenant_chain_begin: "$BEGINS_EVENT_CHAIN$ §Y$composer_covenant_chain_title$§!"
 composer_covenant_chain_end: "$ENDS_EVENT_CHAIN$ §Y$composer_covenant_chain_title$§!"
 instrument_covenant_chain_title: "Исполнитель желаний"
 instrument_covenant_chain_desc.intro: "Мы связали себя с сущностью Покрова, известной как $the_instrument_of_desire_color_article$. По своей доброте создание даровало нам крупицы своей силы, но не бесплатно. Вероятно, в будущем это повторится.\n\nНаши [GetTelepathPlural&nom] предполагают, что связь с этой сущностью будет проще укрепить, если наши действия станут соответствовать ее воле."
 instrument_covenant_chain_desc: "$instrument_covenant_chain_desc.intro$\n\nИсполнитель жаждет удовольствий. Праздная жизнь, декадентство и рабовладение придутся ему по нраву."
 instrument_covenant_chain_begin: "$BEGINS_EVENT_CHAIN$ §Y$instrument_covenant_chain_title$§!"
 instrument_covenant_chain_end: "$ENDS_EVENT_CHAIN$ §Y$instrument_covenant_chain_title$§!"
 utopia.2671.name: "Наша связь крепнет"
 utopia.2671.desc: "Мы все лучше понимаем нашего покровителя. Для него мы не более чем мысль на задворках сознания. Насекомые в его доме. И все же мы пришлись ему по нраву, и в связи с этим он одарил нас еще одной крупицей своей силы.\n\nТеперь наши телепаты теснее связаны с покровителем, что вдохновило нас на возведение монумента в честь нашего договора — особого места, где наши телепаты и §Y[GetShroudPatron&nom]§! могут попытаться продолжить общение."
 utopia.2671.a: "Мы чувствуем себя в безопасности в объятиях Составителя."
 utopia.2671.a.tt: "Теперь наши телепаты дополнительно производят £pop£ §Yприрост населения§!.\n\nМы можем построить £building£ §YСвятилище Составителя§! на одном из наших миров."
 utopia.2671.b: "Мы тоже голодны. Война нас насытит."
 utopia.2671.b.tt: "Теперь наши телепаты дополнительно производят £mod_country_naval_cap_add£ вместимость флота.\n\nМы можем построить £building£ §YСвятилище Пожирателя§! на одном из наших миров."
 utopia.2671.c: "Нет ничего прекраснее желания."
 utopia.2671.c.tt: "Теперь наши телепаты дополнительно производят £amenities£ блага.\n\nМы можем построить £building£ §YСвятилище Исполнителя§! на одном из наших миров."
 utopia.2671.d: "Заполненный разум не знает сомнений."
 utopia.2671.d.tt: "Теперь наши телепаты дополнительно производят $r_research$.\n\nМы можем построить £building£ §YСвятилище Шепчущихся§! на одном из наших миров."
 utopia.2676.name: "Потенциал достигнут"
 utopia.2676.desc: "Тайны §HПокрова§! слишком непостижимы, чтобы мы могли проникнуть в их суть, но теперь мы с §Y[GetShroudPatron&inst]§! стали ближе друг к другу. Куда бы мы ни шли, [GetShroudPatron::он|||fem:она|||neut:оно|||pl:они] всегда с нами, словно смутная мысль на краю сознания. [GetShroudPatron::Его|||fem:Её|||pl:Их] сила просачивается в нашу реальность через трещины в нашей душе."
 utopia.2676.a: "Воля плоти священна."
 utopia.2676.b: "В борьбе поклонение."
 utopia.2676.c: "Ты будешь жаждать."
 utopia.2676.d: "Тайна дарует безопасность."
 utopia.2681.name: "Крупицы силы"
 utopia.2681.desc: "Заботясь о нас, §H[GetShroudPatron&nom]§! [GetShroudPatron::поместил|||fem:поместила|||neut:поместило|||pl:поместили] в складку §HПокрова§! толику своей энергии, которую мы можем поглотить и использовать без вреда для себя.\n\nМы отобрали несколько кандидатов, но лишь один из них удостоится чести принять силу благоволителя. Мы должны решить, кто именно."
 utopia.2681.a: "§H[leader_1.GetTitle]§! [leader_1.GetName]"
 utopia.2681.b: "§H[leader_2.GetTitle]§! [leader_2.GetName]"
 utopia.2681.c: "§H[leader_3.GetTitle]§! [leader_3.GetName]"
 utopia.2681.d: "§H[leader_4.GetTitle]§! [leader_4.GetName]"
 utopia.2682.name: "[chosen_leader.GetAXX::Вознесшийся|||fem:Вознесшаяся]"
 utopia.2682.desc.intro: "Свершилось. [chosen_leader.GetName] [chosen_leader.GetAXX::получил|||fem:получила] силу, и все вокруг [GetFeelLoc] [chosen_leader.GetAXX::его|||fem:ее] псионическую энергию. Эта сила велика и внушает почтение. Отныне [chosen_leader.GetName] — [GetImmortalLoc&masc]"
 utopia.2682.desc.patron_champion: "$utopia.2682.desc.intro$ слуга §H[GetShroudPatron&gen]§!."
 utopia.2682.desc.shroudshaper_champion: "$utopia.2682.desc.intro$ ваятель §H[This.GetName&gen]§!."
 utopia.2682.desc.previous_chosen_killed: "Событие оказало разрушительное воздействие на [previous_chosen_leader.GetAXX::еретика|||fem:еретички] по имени §H[previous_chosen_leader.GetName]§!, некогда [previous_chosen_leader.GetAXX::считавшегося Избранником|||fem:считавшейся Избранницей] нашего прежнего покровителя. В месте своего изгнания [previous_chosen_leader.GetName] тихо [previous_chosen_leader.GetAXX::угас|||fem:угасла], когда последние следы псионической силы покинули [previous_chosen_leader.GetAXX::его|||fem:ее] искалеченную форму."
 utopia.2682.desc.previous_chosen_lost_patron: "§H[chosen_leader_lost_patron.GetName]§! [chosen_leader_lost_patron.GetAXX::ощутил|||fem:ощутила] на себе последствия этого события. Пусть [chosen_leader_lost_patron.GetAXX::он всё еще преисполнен|||fem:она всё еще преисполнена] значительной псионической энергией, но та сила, что была дарована [chosen_leader_lost_patron.GetAXX::ему|||fem:ей] нашим прежним благоволителем, теперь утрачена."
 utopia.2682.a: "Так было предначертано."
 utopia.2682.a.shroudshaper: "Это [chosen_leader.GetAXX:его|||fem:её] предназначение."
 utopia.2686.name: "Благословенное вооружение"
 utopia.2686.desc: "Конклав телепатов совершил прорыв в использовании силы §H[GetShroudPatron&gen]§!. Если раньше договор в полной мере был доступен только псионикам, то теперь мы можем направлять его силу сквозь целые космические корабли.\n\nЕсли мы пожелаем, §H[GetShroudPatron&nom]§! [GetShroudPatron::поможет|||pl:помогут] нам летать намного дальше, чем раньше."
 utopia.2686.a: "Что такое корпус, если не плоть?"
 utopia.2686.b: "Наши корабли тоже прожорливы."
 utopia.2686.c: "Эти суда жаждут цели."
 utopia.2686.d: "Тайна является несравненным оружием."
 building_composer_sanctum: "Святилище Составителя"
 building_composer_sanctum_desc: "Это святилище предназначено для общения с Составителем. [GetComposerSanctumDesc]"
 building_composer_sanctum_desc_default: "Здесь плоть становится свободной, словно мысль, позволяя Покрову изменять и совершенствовать нас."
 building_composer_sanctum_desc_machine: "Здесь электронные схемы освобождаются от нежелательного влияния физических законов. Это позволяет Покрову оптимизировать наши процессоры до уровня, намного превосходящего штатные параметры."
 building_eater_sanctum: "Святилище Пожирателя"
 building_eater_sanctum_desc: "Это святилище предназначено для общения с Пожирателем. Здесь Покров готовит нас к войне, пока мы планируем очередное [GetEaterSanctumDesc]."
 building_eater_sanctum_desc_machine: "завоевание"
 building_eater_sanctum_desc_default: "пиршество"
 building_instrument_sanctum: "Святилище Исполнителя"
 building_instrument_sanctum_desc: "Это святилище предназначено для общения с Исполнителем. [GetComposerSanctumDesc]"
 building_instrument_sanctum_desc_gestalt: "Здесь мы накапливаем излишки товаров, чтобы потом распределять их в коллективе для поддержания его стабильности."
 building_instrument_sanctum_desc_default: "Здесь мы накапливаем сокровища, чтобы потом тратить их в безумном потребительском угаре, не получая ни малейшего удовлетворения."
 building_whisperers_sanctum: "Святилище Шепчущихся"
 building_whisperers_sanctum_desc: "Это святилище предназначено для общения с Шепчущими. [GetComposerSanctumDesc]"
 building_whisperers_sanctum_desc_machine: "Здесь мы обмениваемся зашифрованными секретными файлами, записываем новые знания на защищённые носители и добавляем свои сигналы в общий хор."
 building_whisperers_sanctum_desc_default: "Здесь мы вполголоса обмениваемся секретами, надёжно храним новые знания и добавляем свой шёпот в общий хор."
 covenant_detection_first_contact: "$building_whisperers_sanctum$"
 covenant_detection_first_contact_effect: "Наша §Yкосмическая база§! в этой системе получает §G+5§! к §Yэффективности обнаружения§!\n\n"
