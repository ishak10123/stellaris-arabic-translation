 concept_farming_district_desc: "- £housing£ ['concept_housing', Жилье]: §G+200§!\n- Должности £mod_job_farmer_add£ ['concept_farmer', фермеров]: §G+200§!\n\n§L$district_farming_desc$§!"
 #Singular: ['concept_debris'] or §H$concept_debris$§!
 #Plural: -
 concept_debris: "Обломки"
 concept_debris_desc: "§H$concept_debris$§! — следы отгремевших космических битв, дрейфующие в космосе остовы и развалины. Представляют собой временный ['concept_special_project', особый проект] — отслеживать его можно лишь до тех пор, пока он не исчезнет.\n\nИзучение §Hобломков§! (для этого понадобится £science_ship£ ['concept_science_ship', научный корабль]) может помочь открыть новые ['concept_technologies', технологии]."
 #Singular: ['concept_council'] or §H$concept_council$§!
 #Plural: -
 concept_council: "Совет"
 concept_council_desc: "§H$concept_council$§! — собрание руководящих лиц ['concept_empire', государства]. В него входят §Hправитель§! и несколько (вплоть до пяти) §Hсоветников§!. На каждую должность можно назначить ['concept_leader', лидера]; некоторые ['concept_leader_traits', черты лидеров] обеспечивают общегосударственные бонусы.\n\n§H$concept_council$§! также может принимать различные ['concept_agendas', программы].\n\nУправление советом и назначение на должности происходит во вкладке §H«Совет»§! окна £interface£ ['concept_government_view', «Обзор правительства»]."
 #Singular: ['concept_agenda'] or §H$concept_agenda$§!
 #Plural: ['concept_agendas'] or §H$concept_agendas$§!
 concept_agenda: "Программа"
 concept_agendas: "Программы"
 concept_agenda_desc: "§H$concept_agenda$§! — стратегический курс, выбранный государственным ['concept_council', советом] и определяющий приоритеты и долгосрочные планы. На этапе подготовки программа обеспечивает определенные преимущества, которые с принятием программы превращаются в существенные бонусы.\n\nДоступные §Hпрограммы§! и их влияние зависят от действующей ['concept_authority', формы правления], принятых ['concept_traditions', традиций] и многих других факторов.\n\nУправление §Hпрограммами§! происходит во вкладке §H«Совет»§! окна £interface£ ['concept_government_view', «Обзор правительства»]."
 #Singular: £research£ ['concept_research'] or £research£ §H$concept_research$§!
 #Plural: -
 concept_research: "Исследования"
 concept_research_desc: "£research£§H$concept_research$§! — это накопление научных знаний по трем основным направлениям: £physics£ ['concept_physics_research', физика], £society£ ['concept_society_research', социология] и £engineering£ ['concept_engineering_research', инженерия]. Каждое направление развивается независимо от других, открывая новые ['concept_technologies', технологии].\n\nСкорость исследований зависит от общегосударственных эффектов, ['concept_leader_traits', черт лидеров] и внешних факторов, таких как ['concept_diplomatic_pacts', соглашения об исследованиях]."
 concept_research_tooltip: "$concept_research_desc$\n\n§GЧтобы открыть банк данных, щелкните: ['concept_research'].\nЧтобы развернуть список, щелкните по значку £research£ в меню.§!"
 #Singular 1: ['concept_modifier'] or §H$concept_modifier$§!
 #Plural 1: ['concept_modifiers'] or §H$concept_modifiers$§!
 #Singular 2: ['concept_empire_modifier'] or §H$concept_empire_modifier$§!
 #Plural 2: ['concept_empire_modifiers'] or §H$concept_empire_modifiers$§!
 #Singular 3: ['concept_planet_modifier'] or §H$concept_planet_modifier$§!
 #Plural 3: ['concept_planet_modifiers'] or §H$concept_planet_modifiers$§!
 concept_modifier: "Модификатор"
 concept_modifiers: "Модификаторы"
 concept_empire_modifier: "Модификатор государства"
 concept_empire_modifiers: "Модификаторы государства"
 concept_planet_modifier: "Планетарный модификатор"
 concept_planet_modifiers: "Планетарные модификаторы"
 concept_modifier_desc: "§H$concept_modifiers$§! — бонусы или штрафы, зависящие от принятых во время изучения £anomaly£ ['concept_anomalies', аномалий] или в ['concept_event_chains', цепочках событий] решений.\n\nМогут быть как временными, так и постоянными и действовать либо на всё государство, либо только на его часть, например планету.\n\n§HМодификаторы§!, охватывающие всё государство, отображаются во вкладке §H«$empire_view_tab_empire$»§! окна £interface£ ['concept_empire_view', «Обзор правительства»]. Модификаторы, действующие на планеты, отображаются в окне £interface£ ['concept_colony_view', «Обзор колонии»]."
 #Singular: ['concept_diplomacy'] or §H$concept_diplomacy$§!
 #Plural: -
 concept_diplomacy: "Дипломатия"
 concept_diplomacy_desc: "§H$concept_diplomacy$§! — это средство взаимодействия государств друг с другом, и она включает всё от торговых соглашений и альянсов до ['concept_rivals', соперничества] и ['concept_wars', войн]. На дипломатические действия могут влиять такие факторы, как ['concept_ethics', принципы], ['concept_authorities', форма правления], относительная мощь и общие интересы.\n\nГосударства могут улучшать отношения с помощью ['concept_envoys', послов], заключая ['concept_diplomatic_pacts', дипломатические пакты] или участвуя в галактической политике в рамках ['concept_federation', федерации] или ['concept_galactic_community', Галактического сообщества]."
 #Singular: ['concept_subject_agreement'] or §H$concept_subject_agreement$§!
 #Plural: ['concept_subject_agreements'] or §H$concept_subject_agreements$§!
 concept_subject_agreement: "Соглашение с подданным"
 concept_subject_agreements: "Соглашения с подданными"
 concept_subject_agreement_desc: "§H$concept_subject_agreements$§! определяют, на каких условиях подданный подчиняется господину, а также уровень автономии, налоги на ресурсы и военные обязательства. Такие соглашения гибко настраиваются, позволяя меняя статус подчинённых государств от жёстко контролируемых субъектов до полунезависимых союзников.\n\n§H$concept_subject_agreements$§! можно обсудить во вкладке «$contacts_view_tab_agreements$» в £interface£ ['concept_contacts_view', списке контактов]."
 #Singular: ['concept_relic'] or §H$concept_relic$§!
 #Plural: ['concept_relics'] or §H$concept_relics$§!
 concept_relic: "Реликвия"
 concept_relics: "Реликвии"
 concept_relic_desc: "§H$concept_relics$§! — это могущественные артефакты древних цивилизаций, дающие уникальные преимущества владельцу.\n\nИх можно найти при £archaeology£ ['concept_archaeology_site', археологических раскопках], получить за завершение важных ['concept_event_chains', цепочек событий] или отнять у других государств, если те заполучили их раньше.\n\n§H$concept_relics$§! дают постоянный пассивный эффект, а при активации на какое-то время дают еще один, более мощный. Реликвиями можно управлять во вкладке «$discoveries_view_tab_relics$» в окне £interface£ ['concept_discoveries_view', открытий]."
 #Singular: ['concept_astral_action'] or §H$concept_astral_action$§!
 #Plural: ['concept_astral_actions'] or §H$concept_astral_actions$§!
 concept_astral_action: "Звездное действие"
 concept_astral_actions: "Звездные действия"
 concept_astral_action_desc: "§H$concept_astral_actions$§! позволяют государству необычным образом взаимодействовать с тканью самого пространства, часто задействуя звёздные явления ради стратегического преимущества.\n\n§H$concept_astral_actions$§! обычно открываются в результате изучения ['concept_astral_rifts', звёздных разломов]."
 #Singular: ['concept_minor_artifact'] or §H$concept_minor_artifact$§!
 #Plural: ['concept_minor_artifacts'] or §H$concept_minor_artifacts$§!
 concept_minor_artifact: "Малый артефакт"
 concept_minor_artifacts: "Малые артефакты"
 concept_minor_artifact_desc: "§H$concept_minor_artifacts$§! — это следы древних цивилизаций, которые обычно можно найти при £archaeology£ ['concept_archaeology_site', археологических раскопках]. Сами по себе они не столь могущественны, как §Hреликвии§!, но их можно по-разному использовать, например получить уникальные бонусы для государства или продать за ценные ресурсы.\n\nСфера применения малых артефактов зависит от технологического развития государства и его политик: в некоторых случаях их можно задействовать для культурного обогащения и научных прорывов или даже найти им военное применение. Управлять ими можно в окне £interface£ ['concept_discoveries_view', открытий]."
 #Singular: ['concept_crisis'] or §H$concept_crisis$§!
 #Plural: -
 concept_crisis: "Кризис"
 concept_crisis_desc: "§H$concept_crisis$§! означает превращение государства в угрозу невиданного масштаба — разрушительную силу, что подпитывается запретными знаниями и апокалиптическими технологиями.\n\nИзбравшие этот путь навлекают на себя гнев всей галактики, и за совершённые деяния их ждёт неминуемая расплата."
 #Singular: ['concept_overlord_holding'] or §H$concept_overlord_holding$§!
 #Plural: ['concept_overlord_holdings'] or §H$concept_overlord_holdings$§!
 concept_overlord_holding: "Владение сюзерена"
 concept_overlord_holdings: "Владения сюзерена"
 concept_overlord_holding_desc: "§H$concept_overlord_holdings$§! — это специализированные объекты, создаваемые государством-сюзереном на планетах его подданных. Эти сооружения позволяют проецировать влияние, добывать ресурсы или предоставлять услуги, различными способами укрепляя власть сюзерена.\n\nТип и количество §Hвладений сюзерена§! определяются условиями ['concept_subject_agreement', соглашения], а их эффекты зависят от ['concept_civics', гражданских моделей], ['concept_ethics', принципов] и стратегических приоритетов сюзерена. Владения выгодны сюзерену, но они могут вызывать недовольство вассалов, особенно если воспринимаются как инструмент эксплуатации или вмешательства."
 #Singular: ['concept_branch_office'] or §H$concept_branch_office$§!
 #Plural: ['concept_branch_offices'] or §H$concept_branch_offices$§!
 concept_branch_office: "$BRANCH_OFFICE$"
 concept_branch_offices: "$BRANCH_OFFICES$"
 concept_branch_office_desc: "§H$BRANCH_OFFICES$§! передают владеющей ими корпорации процент от £trade_value£ ['concept_trade', торговли] в мирах, где они находятся, в виде £energy£ ['concept_energy', энергокредитов].\n\nВ одном филиале может быть до §Y4§! офисов, которые можно построить в окне £interface£ ['concept_colony_view', обзора колонии]. Дополнительные ячейки открываются по мере улучшения столичного сооружения."
 #Singular 1: ['concept_war'] or §H$concept_war$§!
 #Plural 1: ['concept_wars'] or §H$concept_wars$§!
 #Singular 2: ['concept_subjugation_war'] or §H$concept_subjugation_war$§!
 #Plural 2: -
 #Singular 3: ['concept_total_war'] or §H$concept_total_war$§!
 #Plural 3: -
 concept_war: "Война"
 concept_wars: "Войны"
 concept_subjugation_war: "Война на подчинение"
 concept_total_war: "Тотальная война"
 concept_war_desc: "§H$concept_war$§! — это формальное состояние вооружённого конфликта между государствами, возникающее для достижения конкретных целей: реализации территориальных ['concept_claims', притязаний], разрешения противоречий или переустройства галактического порядка. Для неё нужен §Hповод к войне§! — правовое обоснование, определяющее её цели и допустимые результаты.\n\nЗавершается война либо капитуляцией (когда одна сторона принимает требования другой), либо миром на условиях §Hстатус-кво§! (когда передаются только системы, оккупированные на момент соглашения). По мере затягивания конфликта накапливается §Hвоенная усталость§!, подталкивающая стороны прекратить боевые действия. Несмотря на высокую стоимость, война остаётся решающим инструментом, способным перекраивать судьбы государств."
 #Singular: ['concept_peace'] or §H$concept_peace$§!
 #Plural: -
 concept_peace: "Мир"
 concept_peace_desc: "§H$concept_peace$§! — это формальное прекращение боевых действий между государствами, которое обычно приводит к выполнению военных целей, обмену территориями или установлению новых политических порядков. Мир может быть достигнут после капитуляции одной из сторон или вследствие взаимного истощения.\n\nУсловия мирного соглашения определяют послевоенный уклад, устанавливая новые границы, заставляя государства подчиниться или закладывая семена для будущих конфликтов."
 #Singular: ['concept_galactic_community'] or §H$concept_galactic_community$§!
 #Plural: -
 concept_galactic_community: "Галактическое сообщество"
 concept_galactic_community_desc: "§H$concept_galactic_community$§! — это общегалактический законодательный орган, созданный государствами-участниками, чтобы сотрудничать, устанавливать межзвёздные нормы и противодействовать общим угрозам. Предлагая и принимая резолюции, Сообщество осуществляет мягкое регулирование вопросов ['concept_war', войны], торговли и общественных ценностей в масштабе всей галактики.\n\nГосударства могут усиливать своё влияние в Сообществе, назначая ['concept_envoys', послов] и наращивая ['concept_diplomatic_weight', дипломатический вес]. Хотя формально этот форум должен объединять, на практике Сообщество часто становится ареной соперничества, закулисных интриг и продвижения эгоистичных интересов под прикрытием коллективного управления."
 #Singular: ['concept_galactic_council'] or §H$concept_galactic_council$§!
 #Plural: -
 concept_galactic_council: "Галактический совет"
 concept_galactic_council_desc: "§H$concept_galactic_council$§! — элитный правящий орган в рамках ['concept_galactic_community', Галактического сообщества], состоящий из наиболее влиятельных государств-участников по показателю ['concept_diplomatic_weight', дипломатического веса]. Члены Совета обладают особыми привилегиями, среди которых право объявлять чрезвычайные меры, накладывать вето на резолюции и определять важные для галактики вопросы.\n\nКоличество мест в Совете ограничено и может меняться, а состав определяется относительным дипломатическим весом. Хотя формально Совет создан для защиты галактического порядка, фактически он часто превращается в клубок конфликтующих амбиций — где сильнейшие укрепляют свою власть, а более слабые участники плетут заговоры, чтобы её подорвать."
 #Singular: ['concept_favor'] or §H$concept_favor$§!
 #Plural: ['concept_favors'] or §H$concept_favors$§!
 concept_favor: "Одолжение"
 concept_favors: "Одолжения"
 concept_favor_desc: "§H$concept_favors$§! — это дипломатические инструменты, представляющие собой обязательства одного государства перед другим. Они обычно приобретаются в результате участия в галактических событиях. $concept_favors$ служат формой политической валюты как в §HГалактическом сообществе§!, так и в более широком дипломатическом пространстве.\n\nИх можно использовать, чтобы влиять на голосования, усиливать дипломатические инициативы или получать преимущества в переговорах."
 #Singular: ['concept_diplomatic_weight'] or §H$concept_diplomatic_weight$§!
 #Plural: -
 concept_diplomatic_weight: "Дипломатический вес"
 concept_diplomatic_weight_desc: "§H$concept_diplomatic_weight$§! определяет степень влияния государства в ['concept_galactic_community', Галактическом сообществе], от него зависит сила его голоса при принятии резолюций и возможность получения места в ['concept_galactic_council', Галактическом совете]. Этот показатель формируется на основе экономической, технологической и военной мощи государства, а также количества ['concept_envoys', послов], отправленных в Сообщество.\n\nПоскольку дипломатический вес может изменяться со временем, он служит одновременно показателем текущей мощи государства и инструментом продвижения его интересов."
 #Singular: ['concept_first_contact'] or §H$concept_first_contact$§!
 #Plural: ['concept_first_contacts'] or §H$concept_first_contacts$§!
 concept_first_contact: "Первый контакт"
 concept_first_contacts: "Первые контакты"
 concept_first_contact_desc: "§H$concept_first_contact$§! — это первое взаимодействие между ранее незнакомыми цивилизациями. Подобные откровения могут привести к установлению ['concept_diplomacy', дипломатических] отношений, взаимной подозрительности или конфликту — в зависимости от характера и намерений вовлеченных сторон.\n\n§H$concept_first_contact$§! включает расшифровку коммуникаций инопланетян, урегулирование возможных инцидентов и определение стратегии государства по отношению к неизведанному."
 #Singular: ['concept_workforce'] or §H$concept_workforce$§!
 #Plural: -
 concept_workforce: "Рабочая сила"
 concept_workforce_desc: "§H$concept_workforce$§! представляет собой совокупный трудовой потенциал £colony£ ['concept_colony', колонии], отражая количество индивидов, способных выполнять различные задачи для функционирования государства. \n\n£pop£ ['concept_pops'] организованы в группы на основе общих характеристик, таких как ['concept_species', раса], социальный слой и ['concept_ethics', принципы]. Каждая группа вносит свой вклад, составляя §Hрабочую силу§! планеты, за счет которой затем заполняются доступные £job£ ['concept_jobs', должности]."
 #Singular: £zone£ ['concept_district_specialization'] or £zone£ §H$concept_district_specialization$§!
 #Plural: £zone£ ['concept_district_specializations'] or £zone£ §H$concept_district_specializations$§!
 concept_district_specialization: "$planet_zone$"
 concept_district_specializations: "$planet_zones$"
 concept_district_specialization_desc: "Специализация района определяет, какие £job£ ['concept_jobs', должности] предоставляет £district£ ['concept_district', район], а многие также добавляют участки для строительства £building£ ['concept_buildings', сооружений]."
 concept_district_specializations_desc: "$concept_district_specialization_desc$"
 #Singular: -
 #Plural: £strategic_resource£ ['concept_strategic_resources'] or £strategic_resource£ §H$concept_strategic_resources$§!
 concept_strategic_resources: "Стратегические ресурсы"
 concept_strategic_resources_desc: "£strategic_resource£ §H$concept_strategic_resources$§! — высокоактивные, нечасто встречающиеся вещества, без которых невозможно существование современных технологий, инфраструктуры и систем космических кораблей.\n\nК таким ресурсам относятся £volatile_motes£ §Hлетучая пыль§!, £exotic_gases£ §Hэкзотические газы§! и £rare_crystals£ §Hредкие кристаллы§!.\n\n§HРедкие ресурсы§! — еще более ценные и/или малоизученные вещества, применяемые в особо высокотехнологичных областях. Помимо всего прочего редкие и стратегические ресурсы используются для строительства ['concept_civilian_ships', гражданских кораблей], ['concept_military_ships', военных кораблей], ['concept_starbases', ] ['concept_starbases', космических баз] и ['concept_megastructures', мегасооружений].$tt_gain$– Создавайте £zone£ §Hсмешанную промышленность§! или £zone£ §Hтяжелую промышленность§!\n– Возводите соответствующие постройки\n– $tt_market$"
 concept_strategic_resources_tooltip: "$concept_strategic_resources_desc$\n\n§GЧтобы открыть банк данных, щелкните ['concept_strategic_resources'].\nЧтобы развернуть список, щелкните по значку £strategic_resource£ в меню.§!"
 POLICY_OPTION_CONCEPT_BODY: "- ['policy:$POLICY$:$OPTION$',$OPTION_NAME$]"
