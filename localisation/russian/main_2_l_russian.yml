 EST_YEARLY_DEV_INC: "Ежегодный прирост: §H$EST$%§!"
 EST_YEARLY_ENERGY: "Ежегодный кредиты: §H$EST$§!"
 MACRO_BUILDER_TITLE: "§EЦентр наступательных армий§!"
 MACRO_BUILDER_DESC: "§YЦентр наступательных армий§! позволяет без усилий собирать многочисленные наступательные армии. Армии будут собираться на доступных планетах этого сектора.\n\nПри завершении они вольются в любую §Yармию§! с активной точкой сбора или соберутся у этой космической базы."
 MACRO_BUILDER_CAPACITY_DESC: "Количество доступных £planet£ §Yпланет§! определяет, сколько армий можно обучать одновременно. Планеты можно исключать в §Yцентре наступательных армий§!. Он находится во вкладке «Армия» в окне просмотра планеты."
 MACRO_BUILDER_TAB: "Центр армий"
 MACRO_BUILDER_QUEUE: "Очередь создания армий"
 DEPLOY_IN_ORBIT: "Развернуть на орбите"
 DEPLOY_IN_ORBIT_DESC: "Определяет, будут ли новые §Yармии§! развертываться на §Yорбите§! или на §Yпланете§!.\n\n§YАрмии§!, построенные через §Yстроитель армий космической базы§!, в любом случае будут развертываться на §Yорбите§!."
 ARMY_BUILDER_CHECKBOX: "Включить для строителя армий."
 INCLUDE_IN_SECTOR_BUILDER_DESC: "Включите, если хотите добавить планету в список доступных планет в §Yстроителе планет космической базы§!."
 STARBASE_MACRO_BUILDER_ARMIES: "Типы армий"
 STARBASE_NO_SECTOR: "§RКосмическая база не в секторе§!"
 STARBASE_NO_PLANETS_IN_SECTOR: "§RВ секторе нет планет§!"
