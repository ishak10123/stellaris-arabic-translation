 SETTINGS_GFX_QUALITY_INFO_LOW: "§HНизкое§!. Подходит для устройств с интегрированными видеокартами. Используются менее детальные текстуры, а многие визуальные эффекты отключены или снижены, особенно в режиме просмотра галактики, для обеспечения беспроблемной игры на машинах с низкой производительностью."
