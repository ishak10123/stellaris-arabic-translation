 civic_tooltip_mechanists_effects: "Вы начнете игру с §Y800§! £pop£ §Hпоселениями§! роботов, а также с технологиями и инфраструктурой для постройки дополнительных\n• $mod_planet_pops_robotics_upkeep_mult$: §G-5%§!\n"
 civic_tooltip_shared_burden_effects: "Разрешен уровень жизни §Y«$living_standard_shared_burden$»§!, при котором все £pop£ §Hпоселения§! потребляют умеренное количество £consumer_goods£ §Yтоваров массового спроса§! независимо от §Yсоциального слоя§!.\nБольшинство других §Yуровней жизни§! недоступны.\nДает доступ к владению £building£ §Y$holding_communal_housing_outreach$§!"
 civic_tooltip_fanatic_purifiers_effects: "Нельзя вступать в §Yдипломатические отношения§! с другими расами!\nНедоступен §Yгалактический рынок§!\nЕсть повод к войне §Y«Очищение»§! против других рас\n§YПоселения чужаков§! всегда подвергаются геноциду\nЗа геноцид £pop£ §Hпоселений чужаков§! дается £unity£ §Yединство§!\nМожно использовать тактику бомбардировки §Y$bombardment_armageddon$§!\n"
 civic_tooltip_devouring_swarm_effects: "Нельзя вступать в §Yдипломатические отношения§! с другими государствами!\nНедоступен §Yгалактический рынок§!\nЕсть повод к войне §Y«Голод»§! против других государств\n§YПоселения чужаков§! всегда поедаются\nЗа геноцид £pop£ §Hпоселений чужаков§! даются £society£ §Yсоциологические исследования§!\n"
 civic_tooltip_devouring_swarm_lithoid_effects: "Нельзя вступать в §Yдипломатические отношения§! с другими государствами!\nНедоступен §Yгалактический рынок§!\nНельзя §Yтерраформировать§! планеты\nЕсть повод к войне §Y«Голод»§! против других государств\nДоступно планетарное решение §Y«Поглотить мир»§!\n§YПоселения чужаков§! всегда поедаются\nЗа геноцид £pop£ §Hпоселений чужаков§! даются £society£ §Yсоциологические исследования§!"
 civic_tooltip_machine_servitor_effects: "$t$- В начале игры есть §Y2 тыс.§! £pop£ §Hпоселений органиков§! с гражданством £job_bio_trophy£ §Y$citizenship_organic_trophy$§! и уровнем жизни §Y$living_standard_organic_trophy$§!\n$t$- $AVAILABLE_BUILDINGS$ £building£ ['building:building_organic_sanctuary']\n$t$- $AVAILABLE_HOLDINGS$ £building£ ['building:holding_organic_sanctuary']"
 civic_tooltip_machine_terminator_effects: "Нельзя вступать в §Yдипломатические отношения§! с органическими расами!\nНедоступен §Yгалактический рынок§!\nЕсть повод к войне §Y«Очищение»§! против органических рас\n £pop£ §HПоселения органиков§! всегда подлежат §Yгеноциду§! \nЗа геноцид £pop£ §Hпоселений органиков§! дается £unity£ §Yединство§!\nМожно использовать тактику бомбардировки §Y$bombardment_armageddon$§!\n"
 civic_tooltip_machine_assimilator_effects: "В начале игры есть §Y1 тыс.§! £pop£ поселений киборгов и возможность §Yассимилировать§! органических существ в качестве киборгов\nЗа ассимиляцию £pop£ §Hпоселения органиков§! дается немного £unity£ §Yединства§! и £society£ §Yочков социологических исследований§!\n £pop£ §HПоселения органиков§!, не затронутые ассимиляцией, со временем автоматически подвергаются §Yгеноциду§!\nЕсть повод к войне §Y«Ассимиляция»§! против других государств\n§YМнение§! большинства государств ухудшено\nДоступен §Yкибернетический§! путь возвышения."
 civic_tooltip_corporate_dominion_effects: "Технология §Y«$tech_space_trading$»§! доступна сразу\n§Y$UNLOCKS_SHIP_TYPE$:§! частный колониальный корабль"
