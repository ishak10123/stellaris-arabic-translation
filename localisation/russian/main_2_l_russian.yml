 living_standard_chemical_bliss: "Химическое блаженство"
 living_standard_chemical_bliss_tooltip: "Средства развлечения находятся в свободном доступе, а прием наркотиков вызывает эйфорический ступор. Поселения счастливы, но пользы от них никакой нет.\n\n$living_standard_chemical_bliss_happiness_tooltip$"
 living_standard_chemical_bliss_tooltip_delayed: "§LОни все с радостью принимают игры и развлечения. Некоторые сопротивляются наркотикам, но лишь вначале.§!"
 living_standard_decadent: "Декадентный образ жизни"
 living_standard_decadent_tooltip: "$living_standard_decadent$ означает больше ресурсов и роскоши для привилегированных членов общества.\n\n$DECADENT_LIVING_STANDARDS_POP_EFFECTS$"
 living_standard_decadent_tooltip_delayed: "§LМы достойны только лучшего. Они должны служить, а мы наслаждаться жизнью.§!"
