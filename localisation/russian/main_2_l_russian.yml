 concept_steward_desc: "$job_steward_effect_desc$\n\n§L$job_steward_desc$§!"
 concept_trade_mutual_aid: "$trade_policy_mutual_aid$"
 concept_trade_mutual_aid_desc: "$trade_policy_mutual_aid_desc$"
 civic_tooltip_gospel_of_the_masses_effects: "£pop£ §HСпиритуалистические поселения§! дают дополнительный £trade£ §Yобъём торговли§! на всех планетах и во всех филиалах.\nМожно построить £building£ §Yхрам процветания§!\n"
 civic_tooltip_criminal_heritage_effects: "Можно создавать §Yфилиалы§! на планете любого обычного государства, с которым они не находятся в состоянии войны или действующего перемирия\nПреступность на планетах-§Yфилиалах§! повышает стоимость филиалов\nМожно строить особый £building£ §Y$BRANCH_OFFICE_BUILDINGS$§!, повышающий уровень преступности"
 civic_tooltip_inward_perfection_effects: "Нельзя иметь §Yсоперников§!\nНельзя заключать §Yпакты о взаимной защите§!\nНельзя заключать §Yдоговоры о миграции§!\nНельзя заключать §Yсоглашения об исследованиях§!\nНельзя заключать §Yкоммерческие пакты§!\nНельзя §Yгарантировать суверенитет§!\nНельзя вступать в §Yфедерации§!\nНельзя §Yвнедряться§! в досветовые общества\nНельзя силой навязывать статус §Yподданных§! другим государствам\nНельзя использовать политику §YНеограниченные войны§!\n"
 civic_tooltip_feudal_realm_effects: "- Вы игнорируете §Yдипломатические требования§! при предложении §Yподчинения§!.\n- Ваши §Yподданные§! не могут принимать условия:\n$t$$TRIGGER_FAIL$§Y$subject_cannot_expand$§!\n$t$$TRIGGER_FAIL$§YВы не присоединяетесь к войнам подданных§!\n$t$$TRIGGER_FAIL$§Y$subject_can_not_do_diplomacy$§!"
 civic_tooltip_franchising_effects: "• Ваши §Yподданные§! не могут принимать следующие соглашения:\n$t$$TRIGGER_FAIL$§Y$subject_cannot_expand$§!\n$t$$TRIGGER_FAIL$§Y$subject_can_not_do_diplomacy$§!\n$t$$TRIGGER_FAIL$§Y$subject_does_not_get_sensors$§!\n• $AVAILABLE_HOLDINGS$ £building£ §Y$holding_franchise_headquarters$§! в колониях подданных\n• £building£ §Y$building_commercial_forum$§!: этот $megacorp_civic_branch_office_building_effect$"
