 TECH_UNLOCK_DIPLOMATIC_ACTION_CREATE_FEDERATION_TITLE: "§HВозможность:§! основать федерацию"
 TECH_UNLOCK_DIPLOMATIC_ACTION_CREATE_FEDERATION_DESC: "§HОсновать федерацию§!\nПозволяет нам создать федерацию с другими государствами."
 TECH_UNLOCK_DIPLOMATIC_ACTION_CREATE_VASSAL_TITLE: "§HВозможность:§! вассальные государства и протектораты"
 TECH_UNLOCK_DIPLOMATIC_ACTION_CREATE_VASSAL_DESC: "§HПокорение§!\nПозволяет делать другие государства своими подданными, предлагая защиту при нашем правлении. Большинство государств станут при этом вассалами, но технологически слабые нации станут протекторатами. Мы также можем сами стать подданными, если нам потребуется защита."
 TECH_UNLOCK_SURVEY_INTEL_TITLE: "§HРазведданные:§! исследовательские данные"
 TECH_UNLOCK_SURVEY_INTEL_DESC: "§HИсследовательские данные§!\nПозволяет нам просматривать исследовательские данные других государств о планетах в их границах."
 TECH_UNLOCK_BORDER_EXTRUDER_2_TITLE: "§HКомпонент:§! Усиленный пограничный маяк"
 TECH_UNLOCK_BORDER_EXTRUDER_2_DESC: "§HУсиленный пограничный маяк§!\nРасширяет и демаркирует наши границы в межзвездном пространстве."
 TECH_UNLOCK_BORDER_EXTRUDER_3_TITLE: "§HКомпонент:§! Улучшенный пограничный маяк"
 TECH_UNLOCK_BORDER_EXTRUDER_3_DESC: "§HУлучшенный пограничный маяк§!\nНам предначертано повелевать мирами, и это надо донести до всех, кто посмеет идти нам наперекор!"
 TECH_UNLOCK_COMBAT_COMPUTER_PRECOG_TITLE: "§HКомпонент:§! Прекогнитивный интерфейс"
 TECH_UNLOCK_COMBAT_COMPUTER_PRECOG_DESC: "§HПрекогнитивный интерфейс§!\n$tech_precognition_interface_desc$\n"
 TECH_UNLOCK_TERRAFORMING_TEMP_CHANGE_TITLE: "§HСвойство:§! управление атмосферой"
 TECH_UNLOCK_TERRAFORMING_TEMP_CHANGE_DESC: "§HУправление атмосферой§!\nПозволяет нам менять климат планет в ходе терраформирования."
 TECH_UNLOCK_VOLCANO_TERRAFORM_TITLE: "§HВариант для исследования:§! Вулканическое терраформирование"
 TECH_UNLOCK_VOLCANO_TERRAFORM_DESC: "Позволяет нам превращать вулканические миры в планеты с умеренным климатом."
 TECH_UNLOCK_VOLCANIC_TERRAFORM_TITLE: "§HОткрывает возможность:§! Вулканическое терраформирование"
 TECH_UNLOCK_VOLCANIC_TERRAFORM_DESC: "$TECH_UNLOCK_VOLCANO_TERRAFORM_DESC$"
 TECH_UNLOCK_TERRAFORMING_GAIA_CHANGE_TITLE: "§HОткрывает свойство:§! создание идеальных миров"
 TECH_UNLOCK_TERRAFORMING_GAIA_CHANGE_DESC: "§HИзменение атмосферы§!\nПозволяет нам превращать планеты в идеальные миры."
 TECH_UNLOCK_TERRAFORMING_NUKED_CHANGE_TITLE: "§HОткрывает свойство:§! восстановление климата"
 TECH_UNLOCK_TERRAFORMING_NUKED_CHANGE_DESC: "§HВосстановление климата§!\nПозволяет нам терраформировать миры с уничтоженной экосистемой."
 TECH_UNLOCK_SPACEPORT_CONSTRUCTION_TITLE: "§HТип станций:§! Космопорт"
 TECH_UNLOCK_SPACEPORT_CONSTRUCTION_DESC: "§HКосмопорт§!\nКосмопорт необходим для строительства космических кораблей. Его можно улучшить, добавив ряд дополнительных функций, также он оснащен базовым оборонительным оружием."
 TECH_UNLOCK_SCIENCE_SHIP_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! научный корабль"
 TECH_UNLOCK_SCIENCE_SHIP_CONSTRUCTION_DESC: "§HНаучный корабль§!\nНаучный корабль — это база для главного ученого государства, готовая отправиться в глубины космоса."
 TECH_UNLOCK_CONSTRUCTION_SHIP_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! строительный корабль"
 TECH_UNLOCK_CONSTRUCTION_SHIP_CONSTRUCTION_DESC: "§HСтроительный корабль§!\nСтроительный корабль сооружает космические станции разных видов с помощью современных дронов-сварщиков."
 TECH_UNLOCK_COLONY_SHIP_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! колониальный корабль"
 TECH_UNLOCK_COLONY_SHIP_CONSTRUCTION_DESC: "§HКолониальный корабль§!\nКолониальные корабли — одноразовые корабли для заселения новых миров. После колонизации корабль разбирают на запчасти, превращая его в планетарную базу и плацдарм."
 TECH_UNLOCK_CORVETTE_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! корвет"
 TECH_UNLOCK_CORVETTE_CONSTRUCTION_DESC: "§HКорвет§!\nКорвет — основной военный корабль, готовый вступить в бой при первой необходимости."
 TECH_UNLOCK_DESTROYER_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! эсминец"
 TECH_UNLOCK_DESTROYER_CONSTRUCTION_DESC: "§HЭсминец§!\nЭсминец — более крупный корабль, состоящий из двух секций, с широким выбором доступного вооружения."
 TECH_UNLOCK_CRUISER_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! крейсер"
 TECH_UNLOCK_CRUISER_CONSTRUCTION_DESC: "§HКрейсер§!\nКрейсер состоит из трех секций, что позволяет устанавливать на него самые разные модули, если на это хватит средств."
 TECH_UNLOCK_BATTLESHIP_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! линкор"
 TECH_UNLOCK_BATTLESHIP_CONSTRUCTION_DESC: "§HЛинкор§!\nСамый крупный из стандартных тип корабля. Линкор обладает непревзойденной мощью, но за это он расплачивается высокой стоимостью и пониженной маневренностью."
 TECH_UNLOCK_TITAN_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! титан"
 TECH_UNLOCK_TITAN_CONSTRUCTION_DESC: "§HТитан§!\nЭти огромные военные корабли являются гордостью флотилии. Они отлично вооружены и обычно служат флагманами."
 TECH_UNLOCK_JUGGERNAUT_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! джаггернаут"
 TECH_UNLOCK_JUGGERNAUT_CONSTRUCTION_DESC: "§HДжаггернаут§!\nЭти колоссальные сооружения являются в равной мере и космическими станциями, и кораблями. Джаггернаут — это огромная космическая станция, способная ремонтировать корабли и строить новые, идеальный плацдарм на время наступательных кампаний."
 TECH_UNLOCK_DEFENSE_PLATFORM_TITLE: "§HТип станций:§! Оборонительная платформа"
 TECH_UNLOCK_DEFENSE_PLATFORM_DESC: "§HОборонительная платформа§!\n$tech_space_defense_station_1_desc$"
 TECH_UNLOCK_DEFENSE_STATION_TITLE: "§HТип станций:§! Оборонительная станция"
 TECH_UNLOCK_DEFENSE_STATION_DESC: "§HОборонительная станция§!\n$tech_space_defense_station_2_desc$"
 TECH_UNLOCK_FORTRESS_TITLE: "§HТип станций:§! Крепость"
 TECH_UNLOCK_FORTRESS_DESC: "§HКрепость§!\n$tech_space_defense_station_3_desc$"
 TECH_UNLOCK_MINING_STATION_TITLE: "§HТип станций:§! Добывающая станция"
 TECH_UNLOCK_MINING_STATION_DESC: "§HДобывающая станция§!\nОрбитальная станция, способная извлекать из планеты минералы и ценные ресурсы."
 TECH_UNLOCK_RESEARCH_STATION_TITLE: "§HТип станций:§! Научная станция"
 TECH_UNLOCK_RESEARCH_STATION_DESC: "§HНаучная станция§!\nОрбитальная станция для изучения разных планетарных явлений и сбора важных научных данных."
 TECH_UNLOCK_AFTERBURNER_1_TITLE: "§HКомпонент:§! Форсажные камеры"
 TECH_UNLOCK_AFTERBURNER_1_DESC: "§HФорсажные камеры§!\nЭти мощные компоненты двигателей обеспечивают дополнительную боевую скорость, но потребляют много энергии."
 TECH_UNLOCK_AFTERBURNER_2_TITLE: "§HКомпонент:§! Улучшенные форсажные камеры"
 TECH_UNLOCK_AFTERBURNER_2_DESC: "§HУлучшенные форсажные камеры§!\nЭта улучшенная версия стандартных форсажных камер еще больше увеличивает боевую скорость корабля."
 TECH_UNLOCK_THRUSTER_1_TITLE: "§HКомпонент:§! Химический двигатель"
 TECH_UNLOCK_THRUSTER_1_DESC: "§HХимический двигатель§!\nПростые, но сравнительно эффективные химические двигатели, создающие тягу при сжигании топлива."
 TECH_UNLOCK_THRUSTER_2_TITLE: "§HКомпонент:§! Ионный двигатель"
 TECH_UNLOCK_THRUSTER_2_DESC: "§HИонный двигатель§!\nЭти электрические двигатели обходятся без топлива и создают тягу, используя пучки ионов."
 TECH_UNLOCK_THRUSTER_3_TITLE: "§HКомпонент:§! Плазменный двигатель"
 TECH_UNLOCK_THRUSTER_3_DESC: "§HПлазменный двигатель§!\nПлазменные двигатели создают более мощную электрическую тягу, повышая субсветовую скорость и маневренность кораблей."
 TECH_UNLOCK_THRUSTER_4_TITLE: "§HКомпонент:§! Импульсный двигатель"
 TECH_UNLOCK_THRUSTER_4_DESC: "§HИмпульсный двигатель§!\nЭти мощные двигатели на термоядерных источниках энергии наделяют корабль непревзойденными характеристиками маневренности и субсветовой скорости."
 TECH_UNLOCK_SENSOR_2_TITLE: "§HКомпонент:§! $SENSOR_2$"
 TECH_UNLOCK_SENSOR_2_DESC: "§H$SENSOR_2$§!\n$SENSOR_2_DESC$"
 TECH_UNLOCK_SENSOR_3_TITLE: "§HКомпонент:§! $SENSOR_3$"
 TECH_UNLOCK_SENSOR_3_DESC: "§H$SENSOR_3$§!\n$SENSOR_3_DESC$"
 TECH_UNLOCK_SENSOR_4_TITLE: "§HКомпонент:§! $SENSOR_4$"
 TECH_UNLOCK_SENSOR_4_DESC: "§H$SENSOR_4$§!\n$SENSOR_4_DESC$"
 TECH_UNLOCK_COMBAT_COMPUTERS_1_TITLE: "§HКомпонент:§! Базовые боевые алгоритмы"
 TECH_UNLOCK_COMBAT_COMPUTERS_1_DESC: "§HБазовые боевые алгоритмы§!\nПоследние разработки в области поведенческих алгоритмов ИИ позволяют распределять боевые задачи между компьютерными системами наших кораблей."
 TECH_UNLOCK_COMBAT_COMPUTERS_2_TITLE: "§HКомпонент:§! Сложные боевые алгоритмы"
 TECH_UNLOCK_COMBAT_COMPUTERS_2_DESC: "§HСложные боевые алгоритмы§!\nДальнейшие разработки в области адаптирующихся боевых алгоритмов позволяют бортовому ИИ гораздо эффективнее выполнять поставленную задачу."
 TECH_UNLOCK_COMBAT_COMPUTERS_3_TITLE: "§HКомпонент:§! Разумный боевой ИИ"
 TECH_UNLOCK_COMBAT_COMPUTERS_3_DESC: "§HРазумный боевой ИИ§!\nИспользуя тягу нашего разумного ИИ к самосохранению и страх перед гибелью, мы резко повысим его эффективность в бою."
 TECH_UNLOCK_COMBAT_COMPUTERS_AUTONOMOUS_TITLE: "§HКомпонент:§! Бортовой автономный интеллект"
 TECH_UNLOCK_COMBAT_COMPUTERS_AUTONOMOUS_DESC: "§HБортовой автономный интеллект§!\nНаделение наших кораблей собственным полуавтономным интеллектом резко повысит их эффективность в бою."
 TECH_UNLOCK_HYPERDRIVE_1_TITLE: "§HКомпонент:§! Гипердвигатель I"
 TECH_UNLOCK_HYPERDRIVE_1_DESC: "§HГипердвигатель I§!\n$tech_hyper_drive_1_desc$"
 TECH_UNLOCK_HYPERDRIVE_2_TITLE: "§HКомпонент:§! Гипердвигатель II"
 TECH_UNLOCK_HYPERDRIVE_2_DESC: "§HГипердвигатель II§!\n$tech_hyper_drive_2_desc$"
 TECH_UNLOCK_HYPERDRIVE_3_TITLE: "§HКомпонент:§! Гипердвигатель III"
 TECH_UNLOCK_HYPERDRIVE_3_DESC: "§HГипердвигатель III§!\n$tech_hyper_drive_3_desc$"
