 civic_tooltip_brand_loyalty_effects: "$t$• £building£ §Y$building_corporate_embassy$§!: $megacorp_civic_branch_office_building_effect$"
 civic_tooltip_public_relations_specialists_effects: "- £building£ §Y$building_public_relations_office$§!: этот $megacorp_civic_branch_office_building_effect$"
 civic_tooltip_agrarian_idyll_start: "§YАграрные районы§! дают на §G400§! больше £housing£ §Yжилья§!.\n§YЭнергетические§! и §YГорнодобывающие районы§! дают на §G300§! больше£housing£ §Yжилья§!.\n§YГородские районы§! дают на §R200§! меньше £housing£ §Yжилья§!.\n"
