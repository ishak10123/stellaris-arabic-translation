 building_slave_processing_desc: "В этом колоссальном комплексе готовят рабов, уничтожая в них последние остатки свободной воли."
 building_slave_processing_migrate_effect_desc: "Активировано §Yавтоматическое переселение в другие колонии§! безработных §Y$SLAVES$§! и неразумных роботов."
 building_slave_processing_slave_army_effect_desc: "Позволяет нанимать §Y$slave_army_plural$§!.\n\n"
 building_robotics_assembly_plant: "Роботостроительный завод"
 building_robotics_assembly_plant_desc: "Роботостроительный завод необходим для создания армии роботов.\nДобавляет §Y100§! поселений £pop£§Hроботов§! в год\nСодержание поселения: £energy£ §Y1§!"
 building_robotics_assembly_plant_2: "Завод дроидов"
 building_robotics_assembly_plant_2_desc: "Завод дроидов необходим для создания армии роботов.\nДобавляет §Y100§! £pop£ §Hпоселений андроидов§! в год\nУлучшает §Hроботов§! до §Hандроидов§!\nСодержание поселения: £energy£ §Y2§!"
 building_robotics_assembly_plant_3: "Завод синтетиков"
 building_robotics_assembly_plant_3_desc: "Завод синтетиков необходим для создания армии роботов.\nДобавляет §Y100§! £pop£§Hпоселений синтетиков§! в год\nУлучшает §Hандроидов§! до §Hсинтетиков§!\nСодержание поселения: £energy£ §Y5§!"
 building_colony_shelter: "Корабль-поселение"
 building_colony_shelter_desc: "Останки колониального корабля, приспособленные поселенцами под свои нужды."
 building_capital: "Планетарная администрация"
 building_capital_desc: "Здесь сосредоточена местная правящая элита."
 building_major_capital: "Планетарная столица"
 building_major_capital_desc: "Обширный комплекс бюрократических сооружений, который выполняет роль административного центра крупной колонии."
 building_system_capital: "Системный столичный комплекс"
 building_system_capital_desc: "Комплекс многоярусных конструкций, сочетающий в себе административные учреждения и сетевую инфраструктуру, что делает возможными строительство и эксплуатацию сложнейших объектов."
 building_ancient_factory: "Автономные предприятия"
 building_ancient_factory_desc: "§LТехнологии, использованные при строительстве этого древнего комплекса, давно затерялись в веках.§!"
 building_ancient_archives: "Архив предтеч"
 building_ancient_archives_desc: "§LНеобъятная сокровищница древних знаний.§!"
 building_dark_matter_power_plant: "Электростанция на темной материи"
 building_dark_matter_power_plant_desc: "§LТехнологии, использованные при строительстве этого древнего комплекса, давно затерялись в веках.§!"
 building_agri_processing_complex: "Сельскохозяйственный комплекс"
 building_agri_processing_complex_desc: "§LТехнологии, использованные при строительстве этого древнего комплекса, давно затерялись в веках.§!"
 building_primitive_farm: "Примитивные фермы"
 building_primitive_farm_desc: "Примитивные фермерские хозяйства, получающие жалкие крохи со своей земли."
 building_primitive_factory: "Простые фабрики"
 building_primitive_factory_desc: "Примитивные, неэффективные фабрики, загрязняющие окружающую среду в процессе производства."
 building_primitive_offices: "Простые офисы"
 building_primitive_offices_desc: "В этих офисных зданиях на первый взгляд бесконечное число кабинетов, полные шелеста перекладываемых бумажек."
 building_primitive_mine: "Примитивная шахта"
 building_primitive_mine_desc: "Примитивные шахтные тоннели, змеящиеся под землей."
 building_primitive_power_plant: "Примитивная электростанция"
 building_primitive_power_plant_desc: "Примитивная и несколько ненадежная электростанция, работающая на угле или на атомной энергии раннего этапа освоения и отравляющая атмосферу."
 building_mutant_landfill: "Свалка мутантов"
 building_mutant_landfill_desc: "Гниющая груда мертвых тел ужасных мутантов. Летучее органическое вещество перемешалось, образовав нечто, напоминающее какое-то сооружение."
 building_vault: "Подземное убежище"
 building_vault_desc: "Эти палатки отмечают вход с поверхности в крупный подземный комплекс, задуманный как бомбоубежище прежними обитателями этого мира. Заняв убежище, они обратились друг против друга, когда у них закончились запасы пищи."
 building_vault_2: "Подземное убежище"
 building_vault_2_desc: "Эти палатки отмечают вход с поверхности в крупный подземный комплекс, задуманный как бомбоубежище прежними обитателями этого мира. Убежище содержит огромный парк машин, а также склады с добывающим оборудованием."
 building_particle_accelerator: "Ускоритель частиц"
 building_particle_accelerator_desc: "В основе этого старого ускорителя частиц лежала инновационная конструкция, а сохранившиеся в этом сооружении терминалы содержат огромный объем исследовательских данных, оставленных, судя по всему, каким-то блестящим физиком-теоретиком."
 building_odd_factory: "Странная фабрика"
 building_odd_factory_desc: "Хорошо построенный комплекс, производящий очень ценные ресурсы. Оставлен на планете какой-то иной цивилизацией."
 building_quarantine: "Станция по исследованию чумы"
 building_quarantine_desc: "Временная больница, сосредоточенная на изучении зараженных с целью получения лекарства."
 building_plague_memorial: "Чумной мемориал"
 building_plague_memorial_desc: "Мемориал в память о жертвах ужасной болезни, когда-то охватившей их родину. Служит свидетельством выживания расы."
 building_energy_grid: "Энергосеть"
 building_energy_grid_plural: "Энергосети"
 building_energy_grid_desc: "Тщательно откалиброванная сеть максимально повышает мощность генераторов."
 building_energy_grid_effect_desc: "Повышает базовую эффективность должностей, производящих £energy£ §Yэнергию§!, на §G1§!."
 building_energy_nexus: "Энергоядро"
 building_energy_nexus_desc: "Этот гигантский комплекс служит местом концентрации всех энергетических сетей на планете, повышая их эффективность."
 building_mineral_purification_plant: "Фабрики по очистке полезных ископаемых"
 building_mineral_purification_plant_desc: "Полезные ископаемые, которые прошли через эти очистители, имеют высшее качество."
 building_mineral_purification_hub: "Центры очистки полезных ископаемых"
 building_mineral_purification_hub_desc: "Крупные центры для приемки и перемещения полезных ископаемых к массивам очистителей."
 building_medical_1: "Медицинский центр"
 building_medical_1_desc: "$job_healthcare_desc$"
 building_medical_2: "Генные клиники"
 building_medical_2_desc: "Генные клиники предлагают продвинутые медицинские процедуры, которые заметно увеличивают здоровье и продолжительность жизни населения."
 building_medical_3: "Центры клеточного оздоровления"
 building_medical_3_desc: "Центры клеточного оздоровления предлагают передовые методы лечения широким слоям населения. Исцеление на клеточном уровне заметно увеличивает здоровье и продолжительность жизни населения."
 building_mineral_silo_1: "Бункер для минералов I"
 building_mineral_silo_1_desc: "Бункеры для минералов повышают максимальную вместимость хранения минералов нашего государства."
 building_mineral_silo_2: "Бункер для минералов II"
 building_mineral_silo_2_desc: "$building_mineral_silo_1_desc$"
 building_mineral_silo_3: "Бункер для минералов III"
 building_mineral_silo_3_desc: "$building_mineral_silo_1_desc$"
 building_planetary_shield_generator: "Генератор планетарных щитов"
 building_planetary_shield_generator_desc: "$tech_planetary_shield_generator_desc$"
 building_autochthon_monument: "Памятник аборигенам"
 building_autochthon_monument_plural: "Памятники аборигенам"
 building_autochthon_monument_desc: "Памятник первопроходцам, осмелившимся отправиться в космос."
 building_autochthon_monument_effect: "Производит £unity£§G1§! за каждый взятый нашим государством §Yбонус за стремление§!.\n\n"
 building_heritage_site: "Объект наследия"
 building_heritage_site_desc: "Место, посвященное ранней истории нашего государства и его народа."
 building_heritage_site_effect: "Производит £unity£§G2§! за каждый взятый нашим государством §Yбонус за стремление§!.\n\n"
 building_hypercomms_forum: "Центр гиперсвязи"
 building_hypercomms_forum_desc: "Являясь огромным комплексом, оснащенным передовым оборудованием для межличностной связи, Центр позволяет обмениваться мультисенсорными идеями при непринужденном обсуждении и быстро формировать консенсус в ходе споров."
 building_hypercomms_forum_effect: "Производит £unity£§G3§! за каждый взятый нашим государством §Yбонус за стремление§!.\n\n"
 building_autocurating_vault: "Автоматически курируемое хранилище"
 building_autocurating_vault_desc: "Узкоспециализированная компьютеризированная сеть постоянно получает, анализирует, оценивает и ежедневно выставляет на всеобщее обозрение артефакты, по ее мнению, имеющие значимость, тем самым создавая живой музей современности."
 building_temple: "Храм"
 building_temple_desc: "Будучи простыми сооружениями, возводимыми еще с незапамятных времен, храмы представляют собой места спокойного созерцания и общения с тем, что нас всех объединяет."
 building_holotemple: "Голографический храм"
 building_holotemple_desc: "Новейшая спиритуалистическая технология, более совершенная по сравнению с грубой формой предшественников, позволяет создать изменяемую реальность внутри голографического храма — для более глубокой медитации и более ревностного почитания."
 building_sacred_nexus: "Священный нексус"
 building_sacred_nexus_desc: "Новейшие технологические разработки позволяют верующим непосредственно испытать божественное воздействие священной земли."
 building_citadel_of_faith: "Цитадель веры"
 building_citadel_of_faith_desc: "Массивный комплекс, предлагающий убежище и изоляцию от материального мира для всех желающих."
 building_stronghold: "Цитадель"
 building_stronghold_desc: "Планетарная цитадель со значительным гарнизоном, предназначенная для защиты этого мира от вторжений и восстаний."
 building_fortress: "Крепость"
 building_fortress_desc: "Огромный комплекс-крепость с усиленным гарнизоном и тренировочным лагерем для солдат."
 building_bio_reactor: "Биореактор"
 building_bio_reactor_desc: "Прибор, в котором органическая материя преобразуется в энергию с высокой эффективностью."
 tech_bio_reactor: "$building_bio_reactor$"
 tech_bio_reactor_desc: "$building_bio_reactor_desc$"
 building_bio_reactor_2: "Улучшенный биореактор"
 building_bio_reactor_2_desc: "Прибор, в котором органическая материя преобразуется в энергию с высокой эффективностью. Новые технологии сбора отходов позволяют попутно собирать полезные газы, выделяющиеся в процессе."
 tech_bio_reactor_2: "$building_bio_reactor_2$"
 tech_bio_reactor_2_desc: "$building_bio_reactor_2_desc$"
 building_hab_stronghold: "Зона безопасности"
 building_hab_stronghold_desc: "Эта секция среды обитания посвящена безопасности и обеспечивает вооруженные отряды для защиты среды обитания от угроз изнутри и снаружи."
 building_crude_huts: "Грубые хижины"
 building_crude_huts_desc: "Примитивные убежища из камня, глины или любых других доступных материалов."
 building_primitive_dwellings: "Примитивные жилища"
 building_primitive_dwellings_desc: "Эти небольшие сооружения едва ли можно назвать хорошим укрытием, но они уберегают от худших из стихий."
 building_stone_palace: "Каменные дворцы"
 building_stone_palace_desc: "Примитивные дворцы, построенные из камня и служащие местом обитания местной правящей элиты."
 building_primitive_capital: "Региональные столицы"
 building_primitive_capital_desc: "Региональные столичные здания различных национальных государств, имеющихся в этом примитивном мире."
 building_urban_dwellings: "Городская жилплощадь"
 building_urban_dwellings_desc: "Узкие, а часто и грязные бетонные джунгли."
 building_pre_ftl_radio_telescope: "Массив радиотелескопов"
 building_pre_ftl_radio_telescope_desc: "Массив радиотелескопов для поиска разумной инопланетной жизни."
 awareness_gain_desc: "Увеличивает шанс постепенного накопления £awareness£ §Yосведомленности§! этой цивилизацией."
 building_hive_crude_huts: "Простые гнезда"
 building_hive_crude_huts_desc: "Эти гнезда сложены из простейшего материала, не требующего трудозатрат. Их едва хватает для защиты единиц Разума от ночных холодов."
 building_hive_primitive_dwellings: "Ранняя колония"
 building_hive_primitive_dwellings_desc: "Наблюдаются попытки оптимизировать используемое пространство. Эти шестиугольные строения можно с натяжкой назвать колонией."
 building_hive_stone_palace: "Каменный улей"
 building_hive_stone_palace_desc: "В мире, где приходится бороться за выживание с собственным видом, каменные стены являются преимуществом."
 building_hive_primitive_capital: "Континентальный нексус"
 building_hive_primitive_capital_desc: "Типичный центральный узел ульев, раскинувшихся на целый континент в погоне за господством над этим миром."
 building_hive_urban_dwellings: "Склад дронов"
 building_hive_urban_dwellings_desc: "Утилитарный подход к размещению единиц Разума во время цикла отдыха. Отдельные входы и выходы позволяют оптимизировать процесс."
 building_hive_primitive_factory: "$building_primitive_factory$"
 building_hive_primitive_factory_desc: "$building_primitive_factory_desc$"
 building_hive_primitive_mine: "$building_primitive_mine$"
 building_hive_primitive_mine_desc: "$building_primitive_mine_desc$"
 building_hive_primitive_power_plant: "$building_primitive_power_plant$"
 building_hive_primitive_power_plant_desc: "$building_primitive_power_plant_desc$"
 building_hive_primitive_farm: "$building_primitive_farm$"
 building_hive_primitive_farm_desc: "$building_primitive_farm_desc$"
 building_hive_primitive_node: "Простой синаптический узел"
 building_hive_primitive_node_desc: "Воля улья усиливается за счёт этого примитивного синаптического узла."
 building_machine_primitive_node: "Простой узел связи"
 building_machine_primitive_node_desc: "Примитивный узел связи снижает задержку при передаче и получении данных на планете."
 building_farming_districts_1: "Узел развития посевов"
 building_farming_districts_1_desc: "Скромный бюрократический центр, занимающийся устроением пахотных земель и развитием планетарного сельского хозяйства."
 building_farming_districts_2: "Центр мелиорации почвы"
 building_farming_districts_2_desc: "Этот центр занимается восстановлением малоплодородных земель и увеличением урожаев, что позволяет развивать сельскохозяйственные районы."
 building_farming_districts_3: "Автоматизированный агрокомплекс"
 building_farming_districts_3_desc: "Механические комбайны, парк дронов и поля, позволяющие управлять климатом, — основной двигатель быстрого расширения сельскохозяйственных районов."
 building_farming_districts_4: "Планетарная культивационная сеть"
 building_farming_districts_4_desc: "Обширный интегрированный комплекс, руководящий интенсивными сельскохозяйственными работами и до предела увеличивающий количество сельскохозяйственных районов на планете."
 building_mine_generic: "Наземная карьерная станция"
 building_mine_generic_desc: "Эта станция руководит добывающими работами у поверхности и сбором руд, тем самым позволяя раньше расширять горнодобывающие районы."
 building_mining_districts_1: "Промышленная шахтная площадка"
 building_mining_districts_1_desc: "Машины для раскопок, конвейеры и сортировочные устройства трудятся одно за другим, поддерживая производство и позволяя начать расширение горнодобывающих районов."
 building_mining_districts_2: "Комплекс колонкового бурения"
 building_mining_districts_2_desc: "Благодаря работе этого комплекса, поставляющему тяжелые буры и укрепляющему шахты, возможно более глубокое бурение. Открываются дополнительные места для добычи руды."
 building_mining_districts_3: "Комплекс сейсмической прокладки туннелей"
 building_mining_districts_3_desc: "Благодаря работе этого комплекса возможна быстрая прокладка туннелей и их стабилизация. Открываются недоступные ранее рудные жилы."
 building_mining_districts_4: "Комплекс добычи в глубокой коре"
 building_mining_districts_4_desc: "Огромный комплекс, расположенный внутри планеты на предельной глубине. Управляет полностью индустриализированными зонами добычи и до предела увеличивает количество горнодобывающих районов на планете."
 building_generator_generic: "Гальванический производственный комплекс"
 building_generator_generic_desc: "В этом здании расположены батареи, плазменные проводники и мощные генераторы — всё необходимое для масштабного производства энергии."
 building_generator_districts_1: "Проводящий комплекс"
 building_generator_districts_1_desc: "Закладывает основную электросетевую инфраструктуру и системы управления энергией, позволяя тем самым основывать новые энергетические районы."
 building_generator_districts_2: "Комплекс размещения подстанций"
 building_generator_districts_2_desc: "Расширяет охват энергетической инфраструктуры планеты путем размещения высокоемких ретрансляторов, трансформаторных подстанций и центров стабилизации сетей. Благодаря этому возможно дальнейшее развитие энергетических районов."
 building_generator_districts_3: "Комплекс регуляции плазмы"
 building_generator_districts_3_desc: "С помощью стабилизированных плазменных потоков и управления резонансом цепей становится возможно более активное развитие энергетических районов."
 building_generator_districts_4: "Планетарный центр"
 building_generator_districts_4_desc: "Интегрированный энергетический центр, координирующий работу генераторов по всей планете. До предела увеличивает количество энергетических районов на планете."
