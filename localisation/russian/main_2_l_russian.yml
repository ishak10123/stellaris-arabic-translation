 slavery_normal: "Рабы-крепостные"
 slavery_normal_tooltip: "§HРабы-крепостные§! имеют повышенную производительность труда, но не могут быть заняты в таких категориях, как §Y$pop_cat_ruler$§! или §Y$pop_cat_specialist$§!."
 slavery_normal_tooltip_delayed: "§LРабы-крепостные — это самая распространенная форма рабства в галактике. Будь это на всю жизнь или на какое-то время, неограниченный доступ к результатам чужого труда в одних местах рассматривается как привилегия с многочисленными встречными обязанностями, а в других считается самоочевидной предпосылкой жизнеспособного общества.§!"
 slavery_domestic: "Домашняя прислуга"
 slavery_domestic_tooltip: "§HДомашняя прислуга§!, которая не имеет другой работы, относится к категории слуг, повышая £amenities£ $PLANET_AMENITIES_TITLE$. Им недоступны должности £pop_cat_ruler£ §Yправителей§! и £pop_cat_specialist£ §Yспециалистов§!, за исключением работающих как [entertainer.GetIcon] §Y[entertainer.GetNamePlural]§!."
 slavery_domestic_tooltip_delayed: "§LДомашняя прислуга тратит большую часть своего времени на удовлетворение потребностей свободных поселений: часть из них прикреплены к отдельным жилищам, а другие — к общественным местам. Как правило, они живут у своих хозяев, так что практически не нуждаются в выделении жилья.§!"
 slavery_military: "Воины-рабы"
 slavery_military_tooltip: "§HВоины-рабы§! не получают бонусов к производительности труда, но становятся превосходными солдатами в местных §Hармиях§!. Они могут занимать должности [enforcer.GetIcon] §Y[enforcer.GetName]§!, [soldier.GetIcon] §Y[soldier.GetName]§! или любые должности £pop_cat_worker£ §Yрабочих§!."
 slavery_military_tooltip_delayed: "§LВоины-рабы — это вооруженные рабы, часто с рождения обучаемые боевым искусствам и абсолютному послушанию. В обмен на беспрекословное подчинение своим командирам они получают гораздо больше свобод, чем другие рабы, и могут заниматься самой разной деятельностью.§!"
 slavery_livestock: "Скот"
 slavery_livestock_tooltip: "£pop£ §HЖители, считающиеся скотом§!, не могут использоваться для производства ресурсов. Вместо этого их держат для увеличения запасов £food£ §Hпищи§!.\n\nЛитоиды, считающиеся скотом, производят £minerals£ §Hминералы§!, а термофилы — £alloys£ §Hсплавы§!.\n\nСкот можно поместить в §Hинопланетные зоопарки§!, чтобы производить £mod_planet_amenities_add£ §Yблага§!."
 slavery_livestock_tooltip_delayed: "§LПоселения — это скот!§!"
 slavery_indentured: "Долговое рабство"
 slavery_indentured_tooltip: "§HЗаконтрактованные работники§! могут занимать должности £pop_cat_worker£ §Yрабочих§! или £pop_cat_specialist£ §Yспециалистов§! и обладают большей политической властью, чем простые рабы. Они не могут работать как [entertainer.GetIcon] §Y[entertainer.GetNamePlural]§! или [enforcer.GetIcon] §Y[enforcer.GetNamePlural]§!. Бонусы к производительности рабов применимы лишь к должностям £pop_cat_worker£ §Yрабочих§!."
 slavery_indentured_tooltip_delayed: "§LТеоретически каждый из них может выплатить долг и освободиться, но условия их контрактов намеренно этому препятствуют.§!"
 living_standard_utopian: "Утопическое изобилие"
 living_standard_utopian_tooltip: "Уровень жизни $living_standard_utopian$ обеспечивает каждому представителю этой расы доступ к буквально любым роскошествам, какие только можно вообразить.\n\n$UTOPIAN_ABUNDANCE_POP_EFFECTS$\n\n$CIVILIANS_PRODUCE_UNITY_RESEARCH$"
 living_standard_utopian_tooltip_delayed: "§LРеальность такова, что мы не можем устранять каждое желание, удовлетворяя каждую потребность. Но мы можем попытаться.§!"
 living_standard_shared_burden: "Разделение тягот"
 living_standard_shared_burden_tooltip: "$living_standard_shared_burden$ гарантирует равное распределение ресурсов между всеми членами общества.\n\n$SHARED_BURDEN_POP_EFFECTS$\n\n$UNEMPLOYED_PRODUCE_UNITY$"
 living_standard_shared_burden_tooltip_delayed: "§LОт каждого по способностям, каждому по потребностям.§!"
 living_standard_academic_privilege: "Привилегия образования"
 living_standard_academic_privilege_tooltip: "Уровень жизни $living_standard_academic_privilege$ требует уделять первостепенное внимание образованию населения во имя научного прогресса.\n\n$ACADEMIC_PRIVILEGE_POP_EFFECTS$"
 living_standard_academic_privilege_tooltip_delayed: "§LЗнания — это ключ к власти.§!"
 living_standard_good: "Социальное обеспечение"
 living_standard_good_tooltip: "Для уровня жизни $living_standard_good$ характерно стремление улучшить жизнь бедных слоев общества за счет щедрых социальных политик.\n\n$SOCIAL_WELFARE_POP_EFFECTS$\n\n$UNEMPLOYED_PRODUCE_UNITY$"
 living_standard_good_tooltip_delayed: "§LЗабота о потребностях народа — это самая важная обязанность государства.§!"
 living_standard_normal: "Достойные условия"
 living_standard_normal_tooltip: "Уровень жизни $living_standard_normal$ обеспечивает большинство представителей расы всем, что необходимо для приемлемого качества жизни.\n\n$DECENT_LIVING_STANDARDS_POP_EFFECTS$"
 living_standard_normal_tooltip_delayed: "§LПренебрежение нуждами наших подданных является в конечном счете проигрышной позицией.§!"
 living_standard_stratified: "Стратифицированная экономика"
 living_standard_stratified_tooltip: "$living_standard_stratified$ отличается упором на интересы правящих классов за счет обнищавших масс.\n\n$STRATIFIED_LIVING_STANDARDS_POP_EFFECTS$"
 living_standard_stratified_tooltip_delayed: "§LЕсли они хотят в жизни лучшей участи, им придется ради этого трудиться.§!"
 living_standard_hive_mind: "Единица Разума"
 living_standard_hive_mind_tooltip: "Пусть трутни не видят пользы в роскоши, для их материального обеспечения все-таки требуется масса ресурсов."
 living_standard_hive_mind_tooltip_delayed: "§LПотребности индивидуума и потребности коллектива одинаковы.§!"
 living_standard_subsistence: "Прожиточный минимум"
 living_standard_subsistence_tooltip: "Уровень жизни $living_standard_subsistence$ обеспечивает поселения этой расы лишь самым необходимым.\n\n$SUBSISTENCE_POP_EFFECTS$"
 living_standard_subsistence_tooltip_delayed: "§LКак можно меньше наших подданных должны голодать. В остальном они уже не наша проблема.§!"
 living_standard_none: "Несуществующие"
 living_standard_none_tooltip: "Эта раса в настоящий момент подвергается геноциду, поэтому ее поселения имеют нулевую стоимость содержания."
