 SETTINGS_DISPLAY_MODE_INFO: "Параметр определяет режим отображения окна игры.\n\n§HПолный экран§!: игра будет отображаться на полном экране, а разрешение вашего монитора будет изменено так, чтобы совпадать с выбранным разрешением.\n\n§HВ окне§!: игра будет отображаться в окне с выбранным разрешением.\n\n§HОкно без рамки§!: игра будет отображаться в окне, имеющем размер рабочего стола, поверх всех других окон."
