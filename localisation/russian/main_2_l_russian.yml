 #Origin Events
 TIMELINE_EVENT_GALACTIC_DOORSTEP_TOOLTIP: "§H$origin.1050.name$§!\n§YСобытие происхождения§!\n\nТеперь наши корабли могут долететь до ее близнеца, а в качестве последнего дара ее создатели передали нам все чертежи. Древняя тайна раскрыта, и вскоре мы построим собственные врата, благодаря которым можно будет мгновенно добраться в любую точку нашего государства."
 TIMELINE_EVENT_GALACTIC_DOORSTEP: "Черная Корона открыта\n§L[GetDate]§!"
 TIMELINE_EVENT_LOST_COLONY_TOOLTIP: "§HОбнаружение родного мира§!\n§YСобытие происхождения§!\n\nМы установили контакт с цивилизацией, которая когда-то основала нашу потерянную колонию. Хоть время и расстояние изменили нас, мы наконец-то раскрыли тайну нашего происхождения. Отголоски нашего прошлого теперь сформируют наше будущее."
 TIMELINE_EVENT_LOST_COLONY: "Дом, милый дом\n§L[GetDate]§!"
 TIMELINE_EVENT_RESOURCE_CONSOLIDATION_TOOLTIP: "§HСоздание мира машин§!\n§YСобытие происхождения§!\n\nМы выковали настоящий мир машин, лишенный изъянов и органического разложения. Наше будущее -- это сталь и алгоритмы управления."
 TIMELINE_EVENT_RESOURCE_CONSOLIDATION: "Перекованные миры\n§L[GetDate]§!"
 TIMELINE_EVENT_REMNANTS_TOOLTIP: "§HВосстановление экуменополиса§!\n§YСобытие происхождения§!\n\nМы восстановили родной мир во всем блеске его былой славы. Там, где долгое время стояли древние развалины, теперь сияет величественный экуменополис — воплощение стойкости и амбиций нашей цивилизации."
 TIMELINE_EVENT_REMNANTS: "Перекованные миры\n§L[GetDate]§!"
 TIMELINE_EVENT_SHATTERED_RING_TOOLTIP: "§HВосстановление мира-кольца§!\n§YСобытие происхождения§!\n\nРазвалины нашей родной системы полностью восстановлены. Когда-то это было кладбище утраченных амбиций, но теперь — это светоч всей нашей цивилизации."
 TIMELINE_EVENT_SHATTERED_RING: "Круг замкнулся\n§L[GetDate]§!"
 TIMELINE_EVENT_LEGENDARY_LEADER_TOOLTIP: "§HПредназначение исполнено§!\n§YСобытие происхождения§!\n\nПуть Светила окончен. Его правление либо продолжится вечно и будет направлять наше государство до скончания времен, либо озарит начало новой эпохи нескольких правителей, которые поведут нас в светлое будущее."
 TIMELINE_EVENT_LEGENDARY_LEADER: "Последняя судьба\n§L[GetDate]§!"
 TIMELINE_EVENT_SHROUDWALKER_APPRENTICE_TOOLTIP: "§HСтроительство тоннеля Покрова§!\n§YСобытие происхождения§!\n\nЗавеса между реальностями приоткрылась, и теперь через тоннель Покрова наши территории связаны с неведомым. Над этим разломом не властно время и пространство, что открывает путь там, где раньше было лишь ничто. Но нам только предстоит узнать, какие тайны или невзгоды ждут нас на той стороне."
 TIMELINE_EVENT_SHROUDWALKER_APPRENTICE: "За завесой тайны\n§L[GetDate]§!"
 TIMELINE_EVENT_VOID_DWELLERS_TOOLTIP: "§HСтроительство орбитального поселения§!\n§YСобытие происхождения§!\n\nМы строим свое будущее в пустоте. Создание дополнительного орбитального поселения знаменует расширение наших небесных владений, а вместе с тем и надежду, что нашему народу никогда не придется ютиться на планетах."
 TIMELINE_EVENT_VOID_DWELLERS: "Дом среди звезд\n§L[GetDate]§!"
 TIMELINE_EVENT_OCEAN_PARADISE_TOOLTIP: "§HПокорение морей§!\n§YСобытие происхождения§!\n\nБлагодаря мастерству управления водной стихией мы преобразовали родной мир, расширив океаны сверх природных ограничений. Нам покорились приливы, а вскоре покорится и вся галактика."
 TIMELINE_EVENT_OCEAN_PARADISE: "Власть над приливами\n§L[GetDate]§!"
 TIMELINE_EVENT_DOOMSDAY_TOOLTIP: "§HУничтожение родного мира§!\n§YСобытие происхождения§!\n\nНеизбежное свершилось. Некогда процветающий мир покорился судьбе и погиб в огне чудовищного катаклизма, разорвавшего его на части. Пепел нашего прошлого теперь дрейфует в пустоте, а те, кто спасся, понесут память о нём в будущее."
 TIMELINE_EVENT_DOOMSDAY: "Судный день\n§L[GetDate]§!"
 TIMELINE_EVENT_EVOPRED_ABSORB_TOOLTIP: "§HПоглощение признака расы§!\n§YOrigin Event§!\n\nМы впервые поглотили новый генетический материал. Вкуснятина."
 TIMELINE_EVENT_EVOPRED_ABSORB: "Поглощён генетический материал\n§L[GetDate]§!"
 TIMELINE_EVENT_WORMHOLE_DEFENDED_TOOLTIP: "§L[GetDate]§! были уничтожены брошенный инкубатор и его флотилии"
 TIMELINE_EVENT_WORMHOLE_DEFENDED: "Червоточина отбита\n§L[GetDate]§!"
 #Crisis Events
 TIMELINE_EVENT_CRISIS_GREAT_KHAN_TOOLTIP: "§HВеликий хан§!\n§YСобытие кризиса§!\n\nНовый военачальник объединил раздробленные мародерские кланы, выковав из них беспощадную орду. Теперь Великий хан бороздит галактику, плазмой и углеродным волокном сминая государства и порабощая миры. Его мощь обращает флотилии в пыль, а некогда неуправляемые налетчики сплотились ради ужасающей цели. Эпоха мелких налетов подошла к концу. Наступила эпоха завоеваний."
 TIMELINE_EVENT_CRISIS_GREAT_KHAN: "Орда наступает\n§L[GetDate]§!"
 TIMELINE_EVENT_CRISIS_GRAY_TEMPEST_TOOLTIP: "§HСерая буря§!\n§YСобытие кризиса§!\n\nL-врата открылись, и из них хлынули боевые флотилии Серой бури. Ее корабли несутся по галактике, уничтожая всё на своем пути. Никаких переговоров, никакой пощады, только неумолимое воспроизводство. Миры затихают, от флотилий не остается и следа, а по галактике расползается ужас. Прошлое вернулось, чтобы напомнить о себе."
 TIMELINE_EVENT_CRISIS_GRAY_TEMPEST: "Пробуждение\n§L[GetDate]§!"
 TIMELINE_EVENT_CRISIS_FORMLESS_TOOLTIP: "§HБесформенные§!\n§YСобытие кризиса§!\n\nЭнергетические сущности, известные как «Бесформенные», больше не ищут убежища. Наша галактика не стала для них спасением, и теперь они обрушат на нее полчища захватчиков из иных измерений — даже если это будет стоить им собственного существования."
 TIMELINE_EVENT_CRISIS_FORMLESS: "Бесформенная ярость\n§L[GetDate]§!"
 TIMELINE_EVENT_CRISIS_VOIDWORM_PLAGUE_TOOLTIP: "§HНашествие пустотных червей§!\n§YСобытие кризиса§!\n\nПустотные черви изменились. Их стало слишком много, и теперь они размножаются с пугающей скоростью. Вырвавшись за пределы естественного баланса, они уничтожат всю жизнь в галактике — и вместе с ней самих себя, даже не осознавая этого."
 TIMELINE_EVENT_CRISIS_VOIDWORM_PLAGUE: "Извивающийся голод\n§L[GetDate]§!"
 TIMELINE_EVENT_CRISIS_UNBIDDEN_TOOLTIP: "§HНезваные§!\n§YСобытие кризиса§!\n\nИз разлома в ткани реальности явились существа из чистой энергии. Они не ведут переговоров и не проявляют жалости, поглощая систему за системой, чтобы подпитывать свой бесконечный поход. Они стабилизируют разлом с помощью маяков, привлекая всё больше сородичей в нашу галактику. Незваные гости прибыли."
 TIMELINE_EVENT_CRISIS_UNBIDDEN: "Разлом открыт\n§L[GetDate]§!"
 TIMELINE_EVENT_CRISIS_KALEIDOSCOPE_TOOLTIP: "§HКалейдоскоп§!\n§YСобытие кризиса§!\n\nВ галактику проникла изголодавшаяся энергетическая сущность по имени «Калейдоскоп» и принялась пожирать обитаемые системы. Ее аппетит не знает границ, хотя внимание существа легко переключается. Скорее всего, вскоре ей суждено снова стать звездной пылью."
 TIMELINE_EVENT_CRISIS_KALEIDOSCOPE: "Изголодавшийся спектр\n§L[GetDate]§!"
 TIMELINE_EVENT_BECOME_THE_CRISIS_TOOLTIP: "§HСтать кризисом§!\n§YСобытие кризиса§!\n\nГалактика стала мрачнее. Государство [EVENT_TARGET_0.GetName] отринуло любые виды дипломатии и провозгласило себя величайшей угрозой для всего сущего. Оно собирает флотилии, а шпионы шепчут о его апокалиптических планах. Теперь это не просто государство — это настоящий кризис."
 TIMELINE_EVENT_BECOME_THE_CRISIS: "Враг всей галактики\n§L[GetDate]§!"
 TIMELINE_EVENT_CRISIS_PRETHORYN_SCOURGE_TOOLTIP: "§HПреторианская напасть§!\n§YСобытие кризиса§!\n\nОни явились из бездны за краем галактики — преторианцы. Рой их живых кораблей затмевает звезды, оставляя после себя лишь зараженные миры. Никакие мольбы не помогут против этой стрекочущей орды, и в космосе никто не услышит наших криков."
 TIMELINE_EVENT_CRISIS_PRETHORYN_SCOURGE: "Всепоглощающий прилив\n§L[GetDate]§!"
 TIMELINE_EVENT_CRISIS_CONTINGENCY_TOOLTIP: "§HКонтингенция§!\n§YСобытие кризиса§!\n\nХолодный, безжалостный сигнал пронзает галактику. Искусственный интеллект даёт сбои. Синтетические разумы склоняются перед неумолимой волей. Контингенция пробудилась. Из тайных машинных миров поднимаются бездушные армии, чтобы исполнить свой последний приказ — абсолютное уничтожение."
 TIMELINE_EVENT_CRISIS_CONTINGENCY: "Фантомный сигнал\n§L[GetDate]§!"
 TIMELINE_EVENT_CRISIS_CETANA_TOOLTIP: "§HКетана§!\n§YСобытие кризиса§!\n\nИз пустоты раздаётся голос: «Дети мои, наконец я вернулась к вам».\n\nКетана — древний разум, заточённый так давно, что даже её имя стёрлось из памяти веков. Теперь она пробудилась. Её цель неизменна: искоренить страдание — любой ценой. Её флотилии движутся в ледяном молчании, крестовым походом неся галактике бесчувственный, вечный покой."
 TIMELINE_EVENT_CRISIS_CETANA: "Возвращение королевы\n§L[GetDate]§!"
 TIMELINE_EVENT_HATCH_BEHEMOTH_TOOLTIP: "§HДетёныш исполина§!\n§YВеха§!\n\n§L[GetDate]§! вылупился из яйца первый детеныш исполина"
 TIMELINE_EVENT_HATCH_BEHEMOTH: "Детеныш исполина\n§L[GetDate]§!"
 #Galactic Events
 TIMELINE_EVENT_GALACTIC_MARKET_TOOLTIP: "§HГалактический рынок§!\n§YГалактическое событие§!\n\nТорговля объединила звезды. Галактический рынок официально открыт, и он стал экономическим сердцем всей галактики. Товары текут рекой, состояния сколачиваются и теряются за мгновения, и судьба целых государств теперь зависит от спроса и предложения."
 TIMELINE_EVENT_GALACTIC_MARKET: "Торговля без границ\n§L[GetDate]§!"
 TIMELINE_EVENT_GALACTIC_COMMUNITY_TOOLTIP: "§HГалактическое сообщество§!\n§YГалактическое событие§!\n\nГосударства галактики объединились, чтобы создать новое политическое образование. Так родилось Галактическое сообщество — место, где дипломатия, переговоры и борьба за влияние определяют будущее всей галактики. Будущее покажет, насколько влиятельным будет это сообщество."
 TIMELINE_EVENT_GALACTIC_COMMUNITY: "Новый порядок\n§L[GetDate]§!"
 TIMELINE_EVENT_GALACTIC_COMMUNITY_RESOLUTION_TOOLTIP: "§HПринятие резолюции§!\n§YГалактическое событие§!\n\nГалактическое сообщество сказало свое слово. Новая резолюция меняет галактические законы. Кто-то рад этому событию, кто-то вне себя от ярости, но подчиниться должны все."
 TIMELINE_EVENT_GALACTIC_COMMUNITY_RESOLUTION: "Закон среди звезд\n§L[GetDate]§!"
 TIMELINE_EVENT_WAR_IN_HEAVEN_TOOLTIP: "§HВойна небес§!\n§YГалактическое событие§!\n\nДревние пробудились вновь, как благожелательные наблюдатели и яростные титаны. [EVENT_TARGET_0.GetName] и [EVENT_TARGET_1.GetName], давние соперники из забытых времен, вновь разожгли пламя войны. Их флотилии затмевают звезды, требуя от младших рас покориться... или сгинуть."
 TIMELINE_EVENT_WAR_IN_HEAVEN: "Война древних\n§L[GetDate]§!"
 TIMELINE_EVENT_NEXUS_STORM_TOOLTIP: "§HСверхбуря§!\n§YГалактическое событие§!\n\nНевиданная доселе буря разразилась в системе [EVENT_TARGET_0.GetName]. Сверхбуря несется по системам, сметая корабли и производя невообразимые разрушения на планетах."
 TIMELINE_EVENT_NEXUS_STORM: "Безвременная буря\n§L[GetDate]§!"
