 GROUND_SUPPORT_STANCE_DESC: "§HОрбитальная бомбардировка§!\nТактика орбитальной бомбардировки: $STANCE|Y$."
 bombardment_selective_desc: "$bombardment_selective$ бомбардировка нацелена только на идентифицированные военные объекты во избежание ненужных потерь среди гражданского населения.\n• §YУмеренный§! урон §Yармиям§!\n• §YУмеренный§! урон §Yпланетам§!\n• §EЛегкий§! урон §Yпоселениям§!\n• §RНЕ§! бомбардируются незащищенные планеты\n• §RНЕ§! уничтожаются последние поселения на планете в количестве §Y$MIN_POPS$§!"
 bombardment_indiscriminate_desc: "$bombardment_indiscriminate$ Бомбардировка нацелена на военную и планетарную инфраструктуру объектов без учета потерь среди гражданского населения.\n• §HСерьезный§! урон §Yармиям§!\n• §HСерьезный§! урон §Yпланетам§!\n• §YУмеренный§! урон §Yпоселениям§!\n• Бомбардируются незащищенные планеты, если §H$policy_orbital_bombardment_accept_surrender$§! — §H$orbital_bombardment_surrender_forbidden$§! \n• §RНЕ§! уничтожаются последние поселения на планете в количестве §Y$MIN_POPS$§!"
 bombardment_armageddon_desc: "Бомбардировка уровня $bombardment_armageddon$ — это обстрел планеты тяжелой артиллерией c четкой целью довести до максимума потери среди гражданского населения.\n• §RОгромный§! урон §Yармиям§!\n• §RОгромный§! урон §Yпланетам§!\n• §RОгромный§! урон §Yпоселениям§!\n• Бомбардируются незащищенные планеты\n• Планеты могут превратиться в безжизненные опустошенные миры"
 bombardment_raiding_desc: "$bombardment_raiding$ Целью бомбардировки являются населенные пункты противника. При этом специальные рейдерские корабли забирают представителей населения и привозят на наши планеты, где оно принуждается к труду.\n• §EЛегкий§! урон §Yармиям§!\n• §EЛегкий§! урон §Yпланетам§!\n• По возможности происходит §Yпохищение§! поселений вместо их уничтожения\n• §RНЕ§! похищается и НЕ уничтожается последнее поселение"
