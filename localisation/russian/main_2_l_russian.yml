 SETTINGS_MULTISAMPLE_INFO: "Параметр §HУровень сглаживания§! позволяет сгладить неровные края при отрисовке. Более высокое значение обеспечивает лучший результат за счет снижения производительности. Задайте для этого параметра значение 0 при запуске игры на более старом оборудовании, если хотите улучшить производительность."
