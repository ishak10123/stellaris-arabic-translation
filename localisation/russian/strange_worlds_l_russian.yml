l_russian:
 ##THE WORLD IS BLEEDING
 strange_worlds.1.name: "Кровоточащий мир"
 strange_worlds.1.desc: "Поверхность планеты §Y[Root.GetName]§! самым неожиданным образом реагирует на начавшееся строительство: из-под оснований возведенных сооружений начала сочиться неопознанная вязкая субстанция.\n\nЭта алая жидкость внешне напоминает студень и при этом сильно липнет к конечностям.\n\nНаши [Owner.GetScientistPlural] уже заявили, что им крайне любопытно изучить загадочное вещество. Пока что оно лишь причиняет мелкие неудобства, но все-таки разумно будет позаботиться о безопасности, ведь [Owner.GetColonistPlural] для нас достаточно ценны."
 strange_worlds.5.name: "Сильное кровотечение"
 strange_worlds.5.desc: "С поверхности планеты §Y[Root.GetName]§! поступают тревожные донесения.\n\nПотоки загадочной алой жидкости становятся сильнее; субстанция все чаще и обильнее вытекает наружу.\n\nВпрочем, есть и преимущества: по мере сворачивания она становится еще более клейкой и, по сути, превращается в природный цемент, что непременно пойдет на пользу нашему строительству.\n\nОднако нас беспокоит тот факт, что удалить вещество с тела после контакта с ним почти невозможно. Если мы начнем лечить и заодно изучать пострадавших, возможно, нам удастся узнать больше, но тогда [Owner.GetColonistPlural] не смогут вести строительство в прежнем темпе."
 strange_worlds.5.a: "Постараться вылечить и изучить пострадавших."
 strange_worlds.5.b: "Продолжать строительство."
 strange_worlds.15.name: "Кровавая гора"
 strange_worlds.15.desc: "§Y[Root.GetName]§! продолжает застраиваться невероятными темпами, однако вязкая жидкость теперь вытекает не только из-под фундаментов наших построек.\n\n«Кровоточащие» разломы открылись еще в нескольких местах, и если изначально субстанция реагировала только на чужеродные объекты, то теперь она распространяется стремительно и без разбора.\n\n[Root.GetName] сейчас почти целиком находится под плотным минеральным сгустком, покрывшим значительную часть поверхности.\n\nНаши инженеры методом проб и ошибок (он обошелся нам дорого — в частности, пришлось оставить планете немалую территорию) разработали способ не только уменьшить ущерб, но и аккуратно собирать это вещество."
 strange_worlds.15.a: "Любопытно, что будет дальше."
 strange_worlds.20.name: "Паразит"
 strange_worlds.20.desc: "После тщательного обследования пострадавших рабочих с планеты §Y[Root.GetName]§! наши ученые установили первопричину случившейся беды.\n\nТо, что мы изначально приняли за вязкую желеобразную субстанцию, на самом деле оказалось паразитирующими микроорганизмами, существующими в симбиозе с планетой. Они перерабатывают органическую материю, скапливающуюся под корой, в новые вещества.\n\nПоскольку [Root.GetName] сейчас застраивается, то можно сказать, что таким образом планета реагирует на появление в своей экосистеме чужеродных веществ.\n\nУченые заверили нас, что со временем мы сможем найти согласие с местными формами жизни, а их уникальную природу задействовать для производства."
 strange_worlds.20.a: "Поразительно. Продолжайте."
 strange_worlds.25.name: "Полезные отношения"
 strange_worlds.25.desc: "После тщательных исследований наши ученые смогли вывести новую разновидность паразитирующих микроорганизмов с планеты §Y[Root.GetName]§!, обученную распознавать привычные нам материалы как безвредные компоненты своей родной окружающей среды. Благодаря этому строительство можно продолжать.\n\nВнедренные в биосферу планеты паразиты из наших лабораторий быстро и без проблем заняли свое место в экологической нише.\n\nМутация, изменившая процесс переработки микроорганизмами материи, также позволила приспособить уникальные клеящие свойства под нужды производства нашей собственной планеты."
 strange_worlds.25.a.evopred: "Чему же они могут нас научить?"
 strange_worlds.30.name: "Словно из ниоткуда"
 strange_worlds.30.desc: "Нашу подготовку к дальнейшему заселению и развитию планеты §Y[Root.GetName]§! прервало неожиданное появление огромного сооружения.\n\nОно излучает волны крайне нестабильной энергии, то появляясь, то вновь исчезая из виду. Теперь понятно, почему наши датчики не обнаружили ничего подобного во время первого сканирования сектора.\n\nСтены его без окон и дверей покрывают загадочные символы, не соответствующие ни одному из известных нам языков.\n\nПредназначение этого сооружения также остается загадкой. Пока оно не причинило нам никакого вреда, но затрудняет строительство."
 strange_worlds.30.a: "Изучить."
 strange_worlds.35.name: "Визуальные аномалии"
 strange_worlds.35.desc.no_cloak: "Внимательно осмотрев мерцающее здание на планете §Y[Root.GetName]§!, мы пришли к предположению, что оно каким-то образом изгибает или искажает свет.$strange_worlds.35.desc.common_1$И хотя теперь мы лучше понимаем, какими свойствами обладает сооружение, войти внутрь пока не получается. Неизвестно даже, возможно ли это вообще.$strange_worlds.35.desc.common_2$"
 strange_worlds.35.desc.cloak: "Внимательно осмотрев мерцающее здание на планете §Y[Root.GetName]§!, мы пришли к предположению, что оно каким-то образом оказывает маскирующий эффект, пусть и с перебоями.$strange_worlds.35.desc.common_1$И хотя теперь мы лучше понимаем особенности маскирующих свойств сооружения, войти внутрь пока не получается. Неизвестно даже, возможно ли это вообще.$strange_worlds.35.desc.common_2$"
 strange_worlds.35.desc.common_1: "\n\nВнутри силикатных пород под корой приборы зафиксировали сильную геотермическую активность: именно так загадочная постройка снабжается энергией, однако уровень поступающей энергии крайне непостоянен.\n\n"
 strange_worlds.35.desc.common_2: "\n\nПолностью глухая наружная поверхность состоит из неизвестных высокореакционных материалов. Попытки применить силу, чтобы проникнуть внутрь, лишь еще больше дестабилизировали электромагнитные поля сооружения. Мы можем прорезать вход, чтобы изучить здание изнутри, однако велик риск неожиданной и полной потери устойчивости здания."
 strange_worlds.35.a: "Применить грубую силу."
 strange_worlds.35.b: "Продолжать наблюдения со стороны."
 strange_worlds.40.name: "Неконтролируемая реакция"
 strange_worlds.40.desc: "Попытка силой проникнуть внутрь сооружения на планете §Y[Root.GetName]§! обернулась катастрофой: наше оборудование настолько сильно нарушило потоки энергии, что вызвало череду мощных взрывов. От здания остались лишь покрытые пеплом развалины.\n\nПоследствия такого неожиданного разрушения оказались удивительными: в близлежащей долине наши приборы вдруг зафиксировали появление руин давно заброшенного поселения инопланетян.\n\nПо всей видимости, разрушенное сооружение накрывало вымершую колонию мощным маскирующим полем. Неизвестно, от чего скрывались местные жители, однако гибель все-таки их настигла. Ничего из того, что могло бы заинтересовать наших археологов, не уцелело.\n\nЗагадкой остаются и принципы работы таинственного генератора. Впрочем, кое-какую пользу извлечь все же удалось: теперь мощный геотермальный источник энергии будет питать нашу собственную колонию."
 strange_worlds.40.a: "Полезное открытие."
 strange_worlds.40.a_ct: "Расчищен квадрат §Y«Мерцающее сооружение»§!"
 strange_worlds.45.name: "Комната управления"
 strange_worlds.45.desc.intro: "При более тщательном изучении незнакомых символов на внешней стороне сооружения с планеты §Y[Root.GetName]§! стало ясно, что на самом деле это своего рода панель управления. С ее помощью нам удалось открыть замаскированную дверь, ведущую в помещение, куда уже давно не ступала ничья нога. Внутри мы обнаружили огромный командный центр.\n\nИ хотя постичь все тонкости местной аппаратуры нам не удалось, методом проб и ошибок мы все же выяснили основные команды. Вмешательство в «работу» сооружения обернулось неожиданными последствиями: в близлежащей долине наши приборы вдруг зафиксировали появление руин давно заброшенного поселения инопланетян.\n\nПо всей видимости, разрушенное сооружение накрывало вымершую колонию мощным маскирующим полем. Неизвестно, от чего скрывались местные жители, однако гибель все-таки их настигла. Ничего из того, что могло бы заинтересовать наших археологов, не уцелело, однако сам командный центр очень пригодился нашим ученым."
 strange_worlds.45.desc.a: "$strange_worlds.45.desc.intro$\n\nМы смогли не только стабилизировать, но и расширить маскировочное поле так, чтобы оно накрывало всю долину. Теперь в колонии стало безопаснее."
 strange_worlds.45.desc.b: "$strange_worlds.45.desc.intro$\n\nМы смогли не только стабилизировать, но и расширить маскировочное поле так, чтобы оно защищало всю долину, а также стали гораздо лучше разбираться в технологиях маскировки."
 strange_worlds.45.a: "Полезное открытие."
 strange_worlds.55.name: "Удар природы"
 strange_worlds.55.desc.intro: "Производство энергии на планете §Y[Root.GetName]§! находится под угрозой со стороны местной травоядной мегафауны: словно одержимые, эти существа бросаются на наши электростанции и сгорают заживо.\n\nЖивотные очень целеустремленны и прорываются через ограждения, лишь бы добраться до энергетических установок. Из-за такого необъяснимого поведения сильно страдает производство.\n\n"
 strange_worlds.55.desc.outro: "Эти виды очень важны для местной экосистемы, но если самоубийства животных будут продолжаться, им грозит полное вымирание."
 strange_worlds.55.desc.a: "$strange_worlds.55.desc.intro$Однако при этом неожиданно выросло производство пищи: [Owner.GetColonistPlural] обнаружили, что мясо у этих животных очень вкусное.\n\n$strange_worlds.55.desc.outro$"
 strange_worlds.55.desc.b: "$strange_worlds.55.desc.intro$И хотя здесь мы собираем больше биомассы, чем обычно, такое положение вещей вызывает беспокойство.\n\n$strange_worlds.55.desc.outro$"
 strange_worlds.55.a: "Изучить их поведение."
 strange_worlds.60.name: "Каталитическая физиология"
 strange_worlds.60.desc: "Мы получили ценные сведения о животных-самоубийцах с планеты §Y[Root.GetName]§!.\n\nМестная мегафауна слепа: в пространстве она ориентируется с помощью эхолокации. Мы подозреваем, что частота звука, с которой работают наши электростанции, перегружает тонкий слух животных и вызывает у них агрессию и стремление уничтожить раздражитель.\n\nКроме того, мы выяснили, что местная фауна обладает уникальными пищеварительными ферментами, которые могут выступать катализаторами при очистке металлов. Первые испытания в области производства сплавов получились многообещающими.\n\nОднако восстановить прежнее производство энергии удастся еще не скоро. Ученые продолжают заниматься этим вопросом."
 strange_worlds.60.a: "$FASCINATING$"
 strange_worlds.65.name: "Животный магнетизм"
 strange_worlds.65.desc.intro: "Причина, по которой обитатели планеты [Root.GetName] бросаются в самоубийственные атаки, наконец установлена.\n\nВнимательно изучив их механизм эхолокации и поведение в стаде, мы пришли к поразительному выводу: брачные призывы животных и звуки, которые издают наши электростанции, — это почти одна и та же частота!\n\n"
 strange_worlds.65.desc.common: "Мы можем сымитировать их крики, чтобы отогнать стада подальше от колонии и таким образом восстановить их численность. А каталитические ферменты можно будет получать из помета, чтобы увеличить производство сплавов и улучшить их качество, и заодно изучать удивительную физиологию этих существ.\n\nХотя ничто не связывает нам [Owner.GetSpeciesHandNamePlural]:\n\n"
 strange_worlds.65.desc.outro: "Мы можем разработать специальные электрические сборщики, чтобы продолжить эффективный забой животных, не жертвуя при этом производством энергии."
 strange_worlds.65.desc.devouring_swarm: "$strange_worlds.65.desc.intro$Новообретенное знание поможет нам загонять зверей прямо в специальные сборщики. Пора устроить пир."
 strange_worlds.65.desc.food: "$strange_worlds.65.desc.intro$$strange_worlds.65.desc.common$§Y[Root.GetName]§! теперь будет славиться особенностями местной кухни.\n\n$strange_worlds.65.desc.outro$"
 strange_worlds.65.desc.no_food: "$strange_worlds.65.desc.intro$Благодаря этим существам §Y[Root.GetName]§! располагает стабильным и возобновляемым источником биомассы.\n\n$strange_worlds.65.desc.outro$"
 strange_worlds.65.a: "Собрать их помет."
 strange_worlds.65.b_devouring_swarm: "Будем пировать!"
 strange_worlds.65.b_default: "Собрать их мясо."
 strange_worlds.75.name: "Причудливые пески"
 strange_worlds.75.desc: "Наши [Owner.GetColonistPlural] сообщают, что пески планеты §Y[Root.GetName]§! ведут себя необъяснимым образом.\n\nВ спокойные дни рядом с колонией иногда разражаются мощные песчаные бури, словно из ниоткуда возникают и так же неожиданно останавливаются целые реки стремительно движущегося песка… Некоторые даже уверены, что в безветренные дни видели смещающиеся вбок дюны.\n\nОбъяснить такое поведение не получается ни атмосферными, ни геологическими явлениями.\n\nПески пока не причиняют нам никакого вреда, однако привычная жизнь колонистов оказалась нарушена. Ученые занимаются изучением этого феномена."
 strange_worlds.75.a: "Любопытно."
 strange_worlds.80.name: "Поющие пески"
 strange_worlds.80.desc: "Песчаные бури на планете §Y[Root.GetName]§! теперь сопровождаются глубоким низким гулом. Высота звука систематически то понижается, то повышается, а тональность меняется волнообразно.\n\nИ хотя феномен «поющих песков» можно объяснить свойствами свободных частиц, регулярность изменений звука уже не списать на одно лишь трение.\n\nПомимо этого мы обнаружили на поверхности небесного тела долину, занесенную дюнами с высеченными на них загадочными символами. Эти знаки появляются лишь на миг, сначала возвышаясь, а затем почти мгновенно рассыпаясь.\n\nНеизвестно, что именно заставляет песок двигаться, однако постоянное повторение этих явлений заставляет предположить, что это происходит не случайно."
 strange_worlds.80.a: "Изучить поведение песков."
 strange_worlds.85.name: "Псионический песок"
 strange_worlds.85.desc_part1_no_zro: "Наши [Owner.GetScientistPlural], изучающие песчаные бури на планете §Y[Root.GetName]§!, обнаружили в местных силикатах новую разновидность экзотических веществ."
 strange_worlds.85.desc_part1_zro: "Наши [Owner.GetScientistPlural], изучающие песчаные бури на планете §Y[Root.GetName]§!, обнаружили в местных силикатах зро."
 strange_worlds.85.desc_part2_non_machine_common_no_psionic_zroni: "\nРаботающие с пробами [Owner.GetResearchers] испытали недолгие, но отчетливые видения: призрачные фигуры зрони, блуждающие среди покрытых знаками дюн."
 strange_worlds.85.desc_part2_non_machine_common_no_psionic_no_zroni: "\nРаботающие с пробами [Owner.GetResearchers] испытали недолгие, но отчетливые видения: призрачные фигуры неизвестных инопланетян, блуждающие среди покрытых знаками дюн."
 strange_worlds.85.desc_part2_non_machine_common_psionic_zroni: "\nРаботающие с пробами [Owner.GetResearchers] испытали недолгие, но отчетливые псионические видения: призрачные фигуры зрони, блуждающие среди покрытых знаками дюн."
 strange_worlds.85.desc_part2_non_machine_common_psionic_no_zroni: "\nРаботающие с пробами [Owner.GetResearchers] испытали недолгие, но отчетливые псионические видения: призрачные фигуры неизвестных инопланетян, блуждающие среди покрытых знаками дюн."
 strange_worlds.85.desc_part2_machine_common: "\nРаботающие с пробами [Owner.GetResearchers] испытали помехи в работе электрических схем.\n\n"
 strange_worlds.85.desc_part2_machine_zroni: "$strange_worlds.85.desc_part2_machine_common$Это вызвало сбой системы обработки видеоданных: какое-то время она показывала призрачные фигуры зрони, блуждающие среди покрытых знаками дюн."
 strange_worlds.85.desc_part2_machine_no_zroni: "$strange_worlds.85.desc_part2_machine_common$Это вызвало сбой системы обработки видеоданных: какое-то время она показывала призрачные фигуры неизвестных инопланетян, блуждающие среди покрытых знаками дюн."
 strange_worlds.85.desc_part3_common: "\nПо всей видимости, эти наваждения и создали необъяснимые знаки. Расшифровать их значение получится далеко не сразу, но мы уверены, что перед нами — образец письменности.\n\n"
 strange_worlds.85.desc_part3_zro: "$strange_worlds.85.desc_part3_common$Можно просто извлечь зро из песка, однако весьма вероятно, что в таком случае призраки исчезнут. С другой стороны, запасы этого ценного вещества здесь очень значительны."
 strange_worlds.85.desc_part3_no_zro: "$strange_worlds.85.desc_part3_common$Можно просто извлечь это загадочное вещество из песка, однако весьма вероятно, что в таком случае призраки исчезнут. С другой стороны, его свойства нарушают все законы физики, и поэтому оно может оказаться крайне ценным."
 strange_worlds.85.a: "Продолжать перевод."
 strange_worlds.85.b_no_zro: "Немедленно извлечь экзотическое вещество."
 strange_worlds.85.b_zro: "Немедленно извлечь зро."
 strange_worlds.90.name: "Песочное представление"
 strange_worlds.90.desc_intro_zroni: "Опираясь на знания о культуре зрони, мы начертили на песке планеты §Y[Root.GetName]§! новый символ — приветствие на языке зрони. Ответ появился немедленно."
 strange_worlds.90.desc_intro_no_zroni: "Опираясь на содержимое наших языковых библиотек, мы начали чертить на песке планеты §Y[Root.GetName]§! сотни различных символов — приветствий на всех известных нам языках. Спустя некоторое время появился ответ."
 strange_worlds.90.desc_common: "\nПесчаные бури прекратились, движение в долине остановилось, а дюны замолчали. Вскоре они поднялись в воздух, и живой песок закрутился, принимая различные формы. Перед нами разворачивается поразительное зрелище.\n\n"
 strange_worlds.90.desc_storyline_started: "$strange_worlds.90.desc_common$Смысл его стал понятен сразу: песок рассказывал историю зрони — сказание о новообретенной силе и страшной войне. В этих песчинках, оживленных энергией зро, словно на время возродилась древняя раса зрони.$strange_worlds.90.desc_outro$"
 strange_worlds.90.desc_storyline_finished: "$strange_worlds.90.desc_common$Смысл его стал понятен сразу: песок рассказывал историю зрони — сказание о вознесении их в Покров и последующей гибели. Эти песчинки, оживленные энергией зро, — словно отзвук трагической судьбы, постигшей древнюю расу.$strange_worlds.90.desc_outro$"
 strange_worlds.90.desc_storyline_not_started: "$strange_worlds.90.desc_common$Впрочем, глубокий смысл его от нас ускользнул. Мы поняли лишь то, что песок рассказал нам историю расы инопланетян, неожиданно обретшей удивительную силу, которая со временем разделила и погубила их.$strange_worlds.90.desc_outro$"
 strange_worlds.90.desc_outro: "\n\nПосле этого псионический песок успокоился вновь. Бури, похоже, затихли навсегда — мы предполагаем, что §Y[Root.GetName]§! теперь терпимее относится к нашему присутствию."
 strange_worlds.90.a: "$FASCINATING$"
 strange_worlds.95.name: "Работы по добыче"
 strange_worlds.95.desc_zroni_tech: "Благодаря обширному опыту дистилляции зро мы смогли извлечь значительное количество этого вещества из песков планеты §Y[Root.GetName]§!. В процессе мы также узнали много нового.$strange_worlds.95.desc_outro$"
 strange_worlds.95.desc_no_zroni_tech: "Результаты наших попыток собирать зро на планете §Y[Root.GetName]§! оказались сомнительными. Нам удалось извлечь небольшое количество этого вещества, однако значительная его доля была потеряна в результате экспериментов. Впрочем, в процессе мы все-таки узнали много нового.$strange_worlds.95.desc_outro$"
 strange_worlds.95.desc_outro: "\n\nПесок, из которого мы извлекли зро, прекратил свое аномальное поведение, и колонию теперь не накрывают непредсказуемые песчаные бури. Неизвестно, что именно заставляло песок двигаться, но сейчас он успокоился навсегда."
 strange_worlds.105.name: "Неожиданное исчезновение"
 strange_worlds.105.desc_intro: "Наши [Owner.GetExplorerPlural], изучающие планету §Y[Root.GetName]§!, встревожены: связь с одним из членов группы прервалась вскоре после сообщения об обнаружении возможного месторождения §Yэкзотического газа§! в долине, отсутствовавшей на картах.\n\n"
 strange_worlds.105.desc_gestalt_non_machine: "Перед тем как узлы замолчали, мы ощутили недолгую, но мучительную боль."
 strange_worlds.105.desc_gestalt_machine: "Узлы отключились от нашей сети, а их данные оказались повреждены."
 strange_worlds.105.desc_non_gestalt: "Последняя перед исчезновением передача заканчивается криками боли, после чего резко обрывается. Мы опасаемся, что случилось страшное."
 strange_worlds.105.a: "Это тревожит."
 strange_worlds.110.name: "Едкие топи"
 strange_worlds.110.desc: "Во время изучения местности, где пропал исследовавший планету §Y[Root.GetName]§! [Owner.GetExplorer], мы обнаружили большое скопление кислотных болот, накрытых дымкой из чистого §Yэкзотического газа§!. Растущая здесь флора крайне жизнеспособна и научилась приспосабливаться к сильным концентрациям кислоты.\n\nУсловия здесь чрезвычайно опасны, однако более тщательное изучение газовой дымки может оказаться полезным для снабжения колонии ресурсами."
 strange_worlds.110.a: "Изучить туман."
 strange_worlds.115.name: "Переваривающее болото"
 strange_worlds.115.desc: "Наши [Owner.GetScientistPlural], изучающие кислотные болота планеты §Y[Root.GetName]§!, лишились одного работника: его вместе с аппаратурой схватили отростки мира растений и утянули в кислотные глубины, где жертва растворилась почти мгновенно. Мы предполагаем, что пропавший [Owner.GetExplorer] погиб точно так же.\n\nВскоре после этого отростки надулись, и приборы показали, что концентрация §Yэкзотического газа§! увеличилась. По всей видимости, кислотные болота выступают в роли внешней пищеварительной системы для местной хищной флоры. Она обвивает добычу отростками и утаскивает ее в кислоту, после чего поглощает питательные вещества и испускает небольшое количество экзотического газа.\n\nМы предполагаем, что эту особенность можно обернуть себе на пользу и начать скармливать флоре отходы из колонии, обеспечив таким образом производство газа. Впрочем, можно постараться нейтрализовать болота, чтобы отдать плодородные земли под сельское хозяйство."
 strange_worlds.115.a: "Будем подкармливать эти организмы."
 strange_worlds.115.b: "Преобразуем землю для ведения сельского хозяйства."
 strange_worlds.120.name: "Болотные растения нейтрализованы"
 strange_worlds.120.desc: "Мы успешно нейтрализовали кислотные болота на планете §Y[Root.GetName]§!, заодно уничтожив проживавшую здесь флору. Вместе с ней исчезла и дымка из §Yэкзотического газа§!.\n\nБолотные земли оказались необычайно плодородными благодаря обилию оставшихся после них веществ. Теперь у нас есть новые участки для ведения сельского хозяйства."
 strange_worlds.120.a_ct: "На планете [This.GetName] появятся §G2§! §Yаграрных района§!"
 strange_worlds.120.b.evopred: "Превосходно. Соберем заодно и останки."
 strange_worlds.130.name: "Извержение темной материи"
 strange_worlds.130.desc: "Гейзер на планете §Y[Root.GetName]§!, который мы изначально посчитали спящим, неожиданно извергся и выбросил в атмосферу газ, наполненный частицами §Yтемной материи§!.\n\nИзвержение оказалось таким мощным, что выбросы закрыли небо и вызвали серьезные гравитационные аномалии. Теперь покинуть планету или совершить посадку на нее невозможно, как, впрочем, и установить с ней связь.\n\nМы предполагаем, что темная материя каким-то образом сформировалась в ядре этой планеты, обладающем удивительными свойствами. На орбите уже развернуты выкачивающие устройства, извлекающие продукты извержения из стратосферы, поскольку из-за новых природных условий опасности теперь подвержены все [Owner.GetColonistPlural]."
 strange_worlds.130.a: "Внимательно следить за ситуацией."
 strange_worlds.135.name: "Жидкая тьма"
 strange_worlds.135.desc_common_1: "Мы успешно откачали §Yтемную материю§! из атмосферы планеты §Y[Root.GetName]§! и приступили к оценке ущерба."
 strange_worlds.135.desc_common_2: "\nВновь установив связь с колонией, мы обнаружили, что [Owner.GetColonistPlural] превратились в камень — похоже, под воздействием уже затвердевшей темной материи."
 strange_worlds.135.desc_organic_non_gestalt: "$strange_worlds.135.desc_common_2$ Однако пострадавшие еще проявляли признаки жизни, поэтому мы аккуратно их освободили."
 strange_worlds.135.desc_machine: "$strange_worlds.135.desc_common_2$ Однако пострадавшие еще издавали электрические сигналы, поэтому мы их освободили."
 strange_worlds.135.desc_gestalt: "$strange_worlds.135.desc_common_2$ Однако пострадавшие еще стремились вновь объединиться с коллективным разумом, поэтому мы освободили их из плена."
 strange_worlds.135.desc_outro: "\nВопреки всем ожиданиям, [Owner.GetColonistPlural] совершенно не пострадали от длительного погружения в стазис.\n\nВызвавший катастрофу гейзер превратился в озеро жидкой темной материи.\n\nНичего подобного с нами еще не происходило. Необходимо крайне тщательно изучить этот инцидент. Пока что [Owner.GetScientistPlural] даже не знают, на что лучше направить и без того недостаточные ресурсы."
 strange_worlds.135.a: "Поместить население в карантин и изучить его."
 strange_worlds.135.b: "В первую очередь изучить темную материю."
 strange_worlds.140.name: "Заражение темной материей"
 strange_worlds.140_intro: "Наши [Owner.GetScientistPlural] твердо уверены, что §Y[Root.GetName]§! мало пострадает от сформировавшейся на поверхности озера §Yтемной материи§! — чего, впрочем, нельзя сказать про население, начавшее проявлять первые симптомы воздействия.\n\nПомещенные в карантин [Owner.GetColonistPlural] претерпевают физические изменения, вызванные заключением в оболочке из извергнутого вещества."
 strange_worlds.140_common: "\nЗа это время составляющие их тела молекулы насытились темной материей,"
 strange_worlds.140_machine_1: "$strange_worlds.140_common$сильно повредившей системы."
 strange_worlds.140_non_machine_1: "$strange_worlds.140_common$заразившей систему кровообращения."
 strange_worlds.140_machine_2: "\nИ хотя загрязнители могут привести к преждевременному отказу систем, одновременно с этим они помогут собранным на этой планете модулям задействовать новую подпрограмму эффективного сбора и переработки темной материи — если встроить ее на этапе сборки."
 strange_worlds.140_non_machine_2: "\nВместо борьбы с этими отклонениями мы можем поддержать их, чтобы [Owner.GetColonistPlural] естественным образом перерабатывали и выделяли темную материю, которую затем можно будет собрать. Но в таком случае пострадает продолжительность их жизни."
 strange_worlds.140.a.dc_empire: "Принять этот дар."
 strange_worlds.140.a.machine_empire: "Поддержать развитие отклонений."
 strange_worlds.140.a.normal: "Переработать загрязнители."
 strange_worlds.140.b: "Избавиться от загрязнения."
 strange_worlds.145.name: "Микроскопическая черная дыра"
 strange_worlds.145.desc: "Внимательно изучив озеро темной материи на планете §Y[Root.GetName]§!, наши геологи заявили, что, вероятно, обнаружили истинную причину произошедшего.\n\nВ ядре планеты находится черная дыра диаметром не больше метра. Масса планеты достаточно велика, чтобы гравитационные силы самой планеты и находящейся внутри нее аномалии уравнивали друг друга. По всей видимости, между массами установилось хрупкое равновесие, которое, вероятно, еще сохранится в течение какого-то времени.\n\nЗафиксированная недавно сейсмическая активность привела к сдвигу нижней мантии, что и вызвало извержение гейзера. А озеро стало своеобразной затычкой, стабилизирующей ядро планеты и препятствующей новым извержениям.\n\nОднако долгосрочные последствия насыщения темной материей оказались не такими безвредными, как нам казалось.\n\nВсе пострадавшие [Owner.GetColonistPlural] взорвались изнутри: в их телах образовались нестабильные микроскопические черные дыры. Все, что от них осталось, — это безжизненные оболочки из кристаллизовавшейся темной материи, абсолютно мертвой внутри.\n\nПо нашим подсчетам, планета §Y[Root.GetName]§!мгновенно лишилась примерно четверти населения. Теперь вся ее поверхность усыпана статуями из затвердевшей темной материи."
 strange_worlds.145.a.no_gestalt: "Очень жаль."
 strange_worlds.145.a.gestalt: "Очень страшно."
 strange_worlds.155.name: "Мерзкие твари"
 strange_worlds.155.desc_homicidal: "Фауна, обнаруженная нами на планете §Y[Root.GetName]§!, примечательна своей отвратительностью.\n\nВ ходе эволюции у нее развился своеобразный защитный механизм, он же — основной способ добычи пищи. Поскольку у местных животных нет пищеварительных ферментов, необходимых для расщепления твердой пищи, они испускают сильнодействующий газ, вызывающий бурную рвоту у других существ с полноценной пищеварительной системой, а чудовища поглощают исторгнутые вещества.\n\nУбой этих омерзительных существ обеспечит нас не только §Yэкзотическим газом§!, но и §Yпищей§!."
 strange_worlds.155.desc_normal: "Фауна, которую наши [Owner.GetColonistPlural] обнаружили на планете §Y[Root.GetName]§!, отличается довольно… своеобразным способом добычи пропитания.\n\nЭти изначально робкие существа быстро привыкли к соседству с нами, а наши юные [Root.Owner.GetSpeciesNamePlural] даже восхищаются их дружелюбным нравом.\n\nСама фауна безобидна, однако обладает любопытным защитным механизмом, он же — основной способ добычи пищи. Поскольку у этих животных нет пищеварительных ферментов, необходимых для расщепления твердой пищи, они испускают сильнодействующий газ, вызывающий бурную рвоту у других существ с полноценной пищеварительной системой, а эти создания поглощают исторгнутые вещества.\n\nПри этом, конечно, велик риск распространения инфекционных заболеваний. Местное управление предупредило, чтобы [Owner.GetColonistPlural] не подходили близко к диковинной фауне."
 strange_worlds.155.a: "Поразительная ксенобиология."
 strange_worlds.155.b_purifiers: "Поистине мерзко."
 strange_worlds.155.b_swarm: "Дело привычки!"
 strange_worlds.155.b_normal: "Их необходимо расстреливать на месте."
 strange_worlds.160.name: "Отвратительная селекция"
 strange_worlds.160.desc: "Избавить планету §Y[Root.GetName]§! от обитающих здесь ужасных созданий оказалось нелегко. Несмотря на официальные предостережения, самые маленькие колонисты упрямо продолжают играть с животными.\n\nТеперь местная фауна питается преимущественно протеинами, которые вырабатывает [Root.Owner.GetSpeciesOrganName] каждого поселенца. Добывать пищу в колонии оказалось значительно проще, чем в других местах, поскольку остальные обитатели планеты стараются избегать зловонных газов. Животные не только привыкли к нашему присутствию, но даже иногда набрасываются из засады на новые жертвы — это неизменно одинокие [Owner.GetColonistPlural], прогуливающиеся после обеда.\n\nКак это ни странно, но в сложившейся ситуации есть и преимущества: наши ученые обнаружили, что в испускаемых существами рвотных газах содержатся ценные частицы §Yэкзотического газа§!. Если одомашнить местную фауну и держать ее на закрытых объектах, можно обеспечить постоянную добычу этого газа.\n\nБольшинство жителей, впрочем, склоняется к силовому решению вопроса."
 strange_worlds.160.a: "Согнать их вместе."
 strange_worlds.160.b: "Хватит это терпеть. Начать расстреливать их на месте."
 strange_worlds.165.name: "Глоток свежего воздуха"
 strange_worlds.165.desc: "Обитатели планеты §Y[Root.GetName]§! наконец-то перестали вызывать у поселенцев массовую рвоту.\n\nРазработав синтетическую питательную массу, подстроенную под местную ксенобиологию, мы изменили пищевые особенности местной фауны и заодно положили конец постоянным нападениям, которым подвергались наши [Owner.GetColonistPlural].\n\nСамих животных мы переместили в специальный заповедник, где на них можно спокойно посмотреть, ничего не опасаясь, а наши специалисты научились добывать §Yэкзотический газ §!без лишнего вреда."
 strange_worlds.165.a: "Какое облегчение."
 strange_worlds.165.a.evopred: "Надо позаботиться о том, чтобы у нас не развился этот запах."
 strange_worlds.170.name: "Огонь на поражение"
 strange_worlds.170.desc: "После выдачи разрешения стрелять на поражение прошло несколько месяцев. За это время обитатели планеты §Y[Root.GetName]§!, наученные горьким опытом, ни разу не приблизились к колонии.\n\nИ хотя некоторые [Owner.GetColonistPlural] скучают по этим внешне очаровательным существам, никто не скрывает облегчения: наконец-то после обеда можно спокойно пройтись, не опасаясь попасть в облако рвотного газа.\n\nНаши ученые собрали тела убитых животных и извлекли некоторое количество §Yэкзотического газа§! непосредственно из внутренних органов."
 strange_worlds.170.a: "Они сами напросились."
 strange_worlds.185.name: "Город против села"
 strange_worlds.185.desc: "С планеты §Y[Root.GetName]§! нам приходят тревожные донесения: участились случаи вражды между горожанами и жителями сельской местности. Каких-либо внятных объяснений такому поведению нет — если не считать условную разницу в месте жительства.\n\nНовоприбывшие сначала сталкиваются с неприязненным отношением к себе, но затем, спустя несколько недель проживания в том или ином районе, все-таки становятся членами общины. Исходя из этого наши ученые предполагают, что такое странное поведение можно объяснить спецификой конкретных районов.\n\nНо чтобы изучить этот вопрос как следует, необходимо не допустить обострения вражды. Мы можем поддержать жителей городских или сельских районов либо привлечь дополнительные силы для поддержания мира."
 strange_worlds.185.a: "Поддержать городские районы."
 strange_worlds.185.b: "Поддержать сельские районы."
 strange_worlds.185.c: "Привлечь дополнительные силы."
 strange_worlds.190.name: "Виновата вода"
 strange_worlds.190.desc_intro: "Тщательно изучив состояние окружающей среды на планете §Y[Root.GetName]§!, наши ученые установили причину вражды между районами.\n\nВ мантии планеты они обнаружили разлагающиеся останки огромного существа. Уже много тысячелетий его спинномозговая жидкость просачивается в грунтовые воды, заражая их псионическими бактериями. Эти микроорганизмы, способные изменять сознание, попадают в нервную систему, после чего [Owner.GetColonistPlural] начинают испытывать сильный территориальный инстинкт, вероятно, унаследованный от мертвого гиганта.\n\n"
 strange_worlds.190.desc_non_psionic: "Однако решение есть: мы можем снабдить водопроводы сложной системой высококачественных фильтров, чтобы избавить воду от бактерий.\n\n"
 strange_worlds.190.desc_psionic: "Эти бактерии не только провоцируют вражду, но и мешают нашим псионическим способностям.$strange_worlds.190.desc_non_psionic$"
 strange_worlds.190.desc_outro_non_psionic: "Возможен и такой вариант: наши ученые готовы генетически модифицировать бактерии на клеточном уровне, направив территориальный инстинкт в продуктивное русло."
 strange_worlds.190.a: "Отфильтровать воду."
 strange_worlds.190.b: "Попытаться генетически изменить бактерии."
 strange_worlds.195.name: "Проявляющиеся способности"
 strange_worlds.195.desc_intro: "Установка водоочистных сооружений на планете §Y[Root.GetName]§! принесла отличные результаты.\n\n"
 strange_worlds.195.desc_psionic: "Уровень гипертерриториальной агрессии снизился. Помимо того что нашим псионическим способностям теперь ничто не мешает, мы даже стали сильнее как псионики — этому способствуют естественные пробиотики, вызывающие §Yпсионический эфапс§! между отдельными жителями планеты §Y[Root.GetName]§!. Вместе с общей телепатической связью укрепилось и чувство общности, а производительность выросла."
 strange_worlds.195.desc_non_psionic: "Уровень гипертерриториальной агрессии снизился, а мы выявили у населения остаточные побочные эффекты в виде появления в организме естественных пробиотиков, вызывающих §Yпсионический эфапс§! между отдельными жителями планеты §Y[Root.GetName]§!. Это значит, что [Owner.GetColonistPlural] могут общаться друг с другом с помощью телепатии. Чувство общности укрепилось, а производительность выросла."
 strange_worlds.195.a: "Очень хорошо."
 strange_worlds.195.a_ct: "Все поселения на планете §Y[Root.GetName]§! получают §Yпсионический эфапс§!"
 strange_worlds.195.a.evopred: "Какой… §Mстранный§! вкус."
 strange_worlds.195.a_ct.evopred: "Наша основная раса получает §Yпсионический эфапс§!"
 strange_worlds.200.name: "Ресеквенирование бактерий"
 strange_worlds.200.desc: "Нам удалось нейтрализовать отрицательное воздействие бактерий на колонистов с планеты §Y[Root.GetName]§!. Вражда постепенно прекратилась, а производительность даже начала расти.\n\nУченые уверены, что потенциал изменения генетического кода микроорганизмов пока не исчерпан. Если правильно секвенировать геном, то [Owner.GetColonistPlural] станут еще эффективнее действовать в какой-либо области по нашему выбору.\n\nОднако получившиеся микроорганизмы не смогут долго существовать за пределами планеты: для размножения бактерий необходима псионическая связь между их митохондриями и трупом гиганта. Почему — пока неизвестно."
 strange_worlds.200.a: "Улучшить способности к размножению."
 strange_worlds.200.b: "Увеличить силу."
 strange_worlds.200.c: "Улучшить мыслительные процессы."
 strange_worlds.1000.name: "Окаменелые лавовые трубки"
 strange_worlds.1000.desc: "При осушении планеты §Y[From.GetName]§! мы обнаружили обширную сеть лавовых трубок, покрывающих проступившее на поверхность дно океана.\n\nКогда-то давно здесь текли потоки магмы, но затем они остановились. В проложенных ими глубоких туннелях остались богатые залежи минералов, порожденных экстремально высокими температурой и давлением в ядре планеты §Y[From.GetName]§!.\n\nПлотность их очень велика. Добыча потребует серьезных капиталовложений, но принесет большую прибыль."
 strange_worlds.1005.name: "Водолюбивые яйца"
 strange_worlds.1005.desc: "Во время терраформирования планеты §Y[From.GetName]§! мы зафиксировали неожиданный всплеск рождаемости у местной фауны.\n\nУченые обнаружили, что циклы размножения многих местных видов напрямую связаны с доступностью воды. Яйца, которые животные раньше закапывали в землю на несколько месяцев, чтобы у них был доступ к жизненно необходимой воде, теперь обильно усыпают всю поверхность. Численность местных обитателей растет экспоненциально.\n\n§Y[From.GetName]§! теперь располагает не только большими запасами еды — мясо многих местных видов очень питательно, — но и удивительно деятельной экосистемой, которую непременно стоит изучить. При отлете с планеты каждый теперь будет обязан проходить тщательное обследование, чтобы не заразить обитателей других экосистем."
 strange_worlds.1005.evopred: "Возможно ли воспроизвести такой темп?"
 strange_worlds.1010.name: "Ледяной анабиоз"
 strange_worlds.1010.intro: "При терраформировании планеты §Y[From.GetName]§! мы обнаружили, что в лед под поверхностью вмерзли сотни представителей местной фауны. Однако удивительнее всего тот факт, что они еще живы.\n\nПо всей видимости, они впали в необычайно глубокую спячку, поскольку §Y[From.GetName]§! как раз переживает длительный ледниковый период. Но вызванное терраформированием таяние льдов вынужденно прервало этот процесс.\n\nСущества очнулись ото сна и уже проявляют первые признаки интеллекта: с помощью примитивных инструментов они начали добывать себе пищу.\n\n"
 strange_worlds.1010.desc_exterminate: "$strange_worlds.1010.intro$Мы незамедлительно уничтожим их и соберем большой объем биомассы."
 strange_worlds.1010.desc_hunted: "$strange_worlds.1010.intro$Благодаря такой необычной физиологии у нас теперь есть богатые резервы пищи."
 strange_worlds.1010.desc_tolerated: "$strange_worlds.1010.intro$Мы можем либо изучить их удивительную манеру спячки, либо пустить их на биомассу."
 strange_worlds.1010.desc_protected: "$strange_worlds.1010.intro$Этих животных необходимо защитить: их удивительные способности, связанные с гибернацией, требуют тщательного изучения."
 strange_worlds.1010.a.purge: "Уничтожить их."
 strange_worlds.1010.b.hunted: "Устроить на них охоту."
 strange_worlds.1010.c.study: "Изучить их."
 strange_worlds.1010.d.purge: "Уничтожить их."
 strange_worlds.1010.e.protect: "Защитить их."
 strange_worlds.1015.name: "Стальные горы"
 strange_worlds.1015.desc: "Наши специалисты по терраформированию столкнулись с неожиданными трудностями на планете §Y[From.GetName]§!.\n\nПод обледеневшими горными грядами находятся богатые залежи железа и углерода, перегретые установками для терраформирования.\n\nМожно либо извлечь эти почти расплавившиеся вещества, либо продолжить нагревать их и обеспечить себе постоянный источник сплавов — разумеется, ценой сокращения обитаемого пространства."
 strange_worlds.1015.a: "Отдать предпочтение ресурсам."
 strange_worlds.1015.b: "Ничего не делать."
 strange_worlds.1020.name: "Горючая атмосфера"
 strange_worlds.1020.desc: "Терраформирование планеты §Y[From.GetName]§! привело к неожиданным последствиям: оказалось, что поверхностный слой состоит из мелкой смеси частиц с высокой концентрацией §Yлетучих пылинок§!. В процессе терраформирования мы случайно распылили их в атмосфере.\n\nТеперь эти пылинки, достаточно легкие, чтобы переноситься по воздуху, и обладающие большой энергией, представляют для нас опасность, поскольку могут вызывать на поверхности сильные возгорания. Будущим колонистам придется крайне тщательно соблюдать технику безопасности и избегать конфликтов, иначе последствия будут катастрофическими.\n\nОднако если у нас получится предотвращать несчастные случаи, §Y[From.GetName]§! станет богатым источником этого редкого сырья."
 strange_worlds.1025.name: "Синяя лава"
 strange_worlds.1025.desc: "В процессе терраформирования кора планеты §Y[From.GetName]§! сместилась, вызвав необычное природное явление.\n\nИз-за смещения тектонических плит сдвинулись и несколько полостей, заполненных §Yэкзотическими газами§!. Они вступили в реакцию с залежами минералов в вулканах планеты, богатых §Yсплавами§!, и теперь извержения этих вулканов имеют характерную ярко-синюю окраску.\n\nВ результате планета стала менее гостеприимной, отчего пришлось пересмотреть планы по созданию жизненного пространства, которое должны заселить наши [Root.GetColonistPlural].\n\nВпрочем, есть и положительный эффект: почва в окрестностях этих вулканов теперь богата ресурсами."
 strange_worlds.1030.name: "Вечные молнии"
 strange_worlds.1030.desc: "Нам сообщили, что на планете §Y[From.GetName]§! наблюдается новое природное явление.\n\nВ процессе терраформирования обнажились залежи кристаллов в коренной породе. Реакция с химикатами, применяющимися при терраформировании, привела к облучению этих кристаллов, а возникшие после этого колебания температуры воздуха — к появлению над планетой неутихающей грозы.\n\nТакие необычные погодные условия, разумеется, помешают нам развивать инфраструктуру, а облучение кристаллов грозит последствиями для проживающих тут колонистов, однако [Owner.GetScientistPlural] уверены, что после терраформирования им удастся обуздать энергию возникших бурь.\n\nТем временем [Owner.GetEngineerPlural] составили собственный план по нейтрализации зарядов в залежах кристаллов — в этом случае буря должна утихнуть, а мы сможем беспрепятственно собрать кристаллы и найти им другое применение."
 strange_worlds.1030.a: "Извлечь пользу из энергии бурь."
 strange_worlds.1030.b: "Нейтрализовать кристаллы."
 strange_worlds.1035.name: "Впадающие в спячку"
 strange_worlds.1035.desc: "Изучение предразумных жителей планеты §Y[event_target:hibernator_planet.GetName]§! выявило удивительную особенность их спячки: она регулируется с помощью особого фермента, который способен как вводить тело в глубокий сон, так и пробуждать хозяина. В состоянии сна химические реакции в теле замедляются до почти полной остановки.\n\nНам удалось извлечь этот фермент и даже успешно ввести его (с помощью снотворного) некоторым другим организмам. Во всех случаях ранее неспособные к гибернации виды впадали в длительный сон, что значительно замедляло старение их клеток.\n\nТакое выдающееся открытие — первый шаг на пути к усовершенствованному криосну, что позволит серьезно уменьшить физическое напряжение, которое длительные космические перелеты оказывают на биологические организмы."
 strange_worlds.1040.name: "Небесные похороны"
 strange_worlds.1040.desc: "Как только закончилось терраформирование планеты §Y[From.GetName]§!, с ее небес посыпались тела.\n\nПри ударе о землю они неизбежно превращаются в бесформенную массу — настолько велика высота падения. Среди груды внутренностей мы обнаружили множество мелких предметов (преимущественно украшений и различных реликвий), попавших на землю оттуда же — с плотных облаков в верхних слоях атмосферы.\n\nМы предполагаем, что когда-то неизвестная нам инопланетная раса хоронила своих мертвецов на этих облаках. Сейчас облака начали истончаться, а захороненные там останки — сыпаться на поверхность планеты. Мы предполагаем, что это закончится лишь тогда, когда атмосфера стабилизируется окончательно, а захоронения опустошатся."
 strange_worlds.1040.a: "Ужасно, но зато прибыльно."
 strange_worlds.1040.b: "Как негигиенично. Немедленно убрать их."
 strange_worlds.1050.name: "Обломки на орбите"
 strange_worlds.1050.desc: "Занимающиеся терраформированием планеты §Y[event_target:junk_moon_planet.GetName]§! инженеры вынуждены работать в опасных условиях: на орбите скопилось много космического мусора самых разных размеров. Плотность обломков настолько высока, что совершающие межпланетные перелеты челноки вынуждены постоянно маневрировать, чтобы избежать столкновений.\n\nПриняв во внимание плотность обломков, мы составили план по их намагничиванию, чтобы они притягивали к себе другой мусор и постепенно собирались воедино — тогда, возможно, у нас получится искусственная луна.\n\nИ хотя времени на терраформирование в таком случае уйдет больше, садиться на поверхность планеты и покидать ее станет значительно проще. Кроме того, исчезнет риск попадания крупных обломков в атмосферу планеты."
 strange_worlds.1050.a: "Значит, сделаем луну."
 strange_worlds.1050.b: "Все это сгорит само."
 strange_worlds.1060.name: "Мусорная луна"
 strange_worlds.1060.desc: "Мы добились успеха в сборе воедино обломков с орбиты планеты §Y[event_target:junk_moon_planet.GetName]§!.\n\nНамагнитив самые крупные экземпляры, мы постепенно собрали мусор в один огромный шар. Благодаря большим размерам и высокой плотности новый космический объект обладает значительной силой притяжения. Новообразованная луна вращается по стабильной орбите.\n\nТак мы не только облегчили взлет и посадку пилотам челноков, которые были вынуждены маневрировать среди обломков, но и обезопасили поверхность планеты §Y[event_target:junk_moon_planet.GetName]§! от случайного попадания мусора в атмосферу. Более того, наши инженеры уверены, что на новой луне можно разместить отдельную добывающую станцию."
 strange_worlds.1060.create_moon_ct: "[event_target:junk_moon_planet.GetName] получает новое название: Мусорная луна"
 site_abandoned_bio_lab: "Древний комплекс"
 abandoned_bio_lab_desc: "Сканирование планеты §Y[fromfrom.planet.GetName]§! выявило присутствие в ее самом труднодоступном регионе одинокого комплекса. Он либо бездействует, либо заброшен: мы не обнаружили никаких энергетических сигналов, а стены сооружения сильно пострадали от непогоды. Выяснить, что здесь произошло, может археологическая экспедиция."
 strange_worlds.2000.name: "Заброшенная биолаборатория"
 strange_worlds.2000.desc: "Внутри комплекса мы обнаружили брошенное медицинское оборудование, процедурные комнаты и морг. В камерах для хранения трупов еще частично сохранились органические останки с признаками болезней и деформации. §H[universal_macrophage_scientist.GetName]§! предполагает, что многих здесь удерживали против их воли: на это указывают защитные двери, системы наблюдения и камеры для заключенных.\n\nЧасть найденных здесь деталей мы взяли с собой, однако очень многое со временем обветшало безвозвратно. Немногочисленные данные, извлеченные из компьютеров, могут пролить свет на предназначение комплекса, но сначала их придется перевести."
 strange_worlds.2005.name: "Древние иммунологические исследования"
 strange_worlds.2005.desc: "§H[universal_macrophage_scientist.GetName]§! протягивает нам частичный перевод одного из файлов, обнаруженных в комплексе на планете §Y[fromfrom.planet.GetName]§!.\n\n§L«Лаборатория № 17 — отчет о ходе работ — ведущий исследователь Гелебор»\n\n«Новый прототип перспективен. Иммунные системы подопытных усилены в миллион раз. Все патогены уничтожены. По-прежнему наблюдаются побочные эффекты: фатальные мутации, выживших нет. Попытаюсь еще раз. Мы почти вывели универсальный макрофаг».§!"
 strange_worlds.2010.name: "Выбор Гелебора"
 strange_worlds.2010.desc: "§H[universal_macrophage_scientist.GetName]§! делится с нами переводом еще одного файла из заброшенной лаборатории на планете §Y[fromfrom.planet.GetName]§!.\n\n§L«Лаборатория № 17 — памятка сотрудникам — ведущий исследователь Гелебор»\n\n«Уважаемые коллеги, сегодня пришел приказ о закрытии проекта. Терпение владыки подошло к концу. Но нам осталось совсем немного! Выведение универсального макрофага важнее чьих-то капризов. Только представьте: будущее без болезней! Пусть придется пожертвовать еще несколькими жизнями — эта цена смехотворна».\n\n«Если нам не пришлют новых подопытных, я испытаю последний прототип на себе. Кто из вас поддержит меня?»§!"
 strange_worlds.2010.a: "Нужно действовать осторожно."
 strange_worlds.2015.name: "Универсальный макрофаг"
 strange_worlds.2015.desc: "§H[universal_macrophage_scientist.GetName]§! отправляет нам перевод последнего файла из компьютеров биолаборатории на планете §Y[fromfrom.planet.GetName]§!.\n\n§L«Лаборатория № 17 — последний отчет — помощник исследователя Филидор»\n\n«Гелебор был настолько уверен в себе, что все мы слепо пошли за ним.\n\n«Прототип мы испытали на себе. Поначалу наши иммунные системы окрепли настолько, что одолеть их не могли никакие сторонние патогены. А потом начались мутации».\n\n«Первым умер Гелебор. Смотреть на него было невозможно. Потом в морг отправились все остальные. Скоро настанет мой черед».\n\n«Полный провал. Мы доверились ущербной формуле Гелебора — и поплатились жизнью. Универсальный макрофаг слишком надежен: в конце концов он атакует самого носителя. Всю эту лабораторию нужно уничтожить».§!"
 strange_worlds.2015.a: "Уничтожить все."
 strange_worlds.2015.b: "Завершить многообещающий проект Гелебора."
 strange_worlds.2015.b.mutation: "Нам подвластны мутации. Завершим этот труд."
 has_tr_mutation_finish_tt: "Этот вариант доступен, потому что мы приняли дерево традиций §Y«$Mutation$»§!."
 strange_worlds.2015.c: "Этим исследованиям, пусть даже несовершенным, найдется применение."
 strange_worlds.2030.name: "Смертельные мутации"
 strange_worlds.2030.desc: "У жителей планеты §Y[Root.GetName]§! наблюдаются многочисленные физические мутации, нарушающие работу клеток и жизненно важных органов. В некоторых случаях они даже полезны, поскольку улучшают метаболизм, однако смертельные исходы слишком часты.\n\nО таких же побочных эффектах в своих отчетах писали ученые, выводившие §Yуниверсальный макрофаг§!. По всей видимости, избежать их невозможно, как бы мы ни старались: препарат слишком несовершенен. Доверять ему больше нельзя. Мы уничтожим все оставшиеся запасы препарата и выведем его из оборота."
 strange_worlds.2030.ct: "§Y[Root.GetName]§! [Root.GetName::теряет|||pl:теряют] 100 £pop£ поселений и ещё по 100 £pop£ поселений за каждые $@macrophage_kill_pop_every_x$ £pop£ поселений\nВсе органические £pop£ поселения в мире §Y[Root.GetName]§! получают §Yгелеборовы мутации§!, а их физиология резко изменяется."
 site_anomalous_cube: "Аномальный куб"
 anomalous_cube_desc: "На планете §Y[Planet.GetName]§! мы обнаружили огромный металлический куб. Полностью гладкая поверхность указывает на высокий технический уровень развития его создателей, хотя и происхождение, и предназначение куба остаются для нас загадкой. Возможно, ответы сможет отыскать археологическая экспедиция."
 strange_worlds.2035.name: "Волнистый металл"
 strange_worlds.2035.desc_intro: "Изучив внимательнее загадочный огромный куб с планеты [fromfrom.planet.GetName], мы поняли, что вопросов пока остается больше, чем ответов. Внешняя поверхность его идеально гладкая, словно сделана из одного куска, а внутренняя совершенно не поддается сканированию. Подойдя ближе, мы заметили, что куб словно пошел волнами, реагируя на наше присутствие."
 strange_worlds.2035.desc_lm: "$strange_worlds.2035.desc_intro$ §H[event_target:anomalous_cube_scientist.GetName]§! [event_target:anomalous_cube_scientist.GetAXX::пришел|||fem:пришла] к выводу, что основной материал здесь — нечто вроде §Yживого металла§!."
 strange_worlds.2035.desc_no_lm: "$strange_worlds.2035.desc_intro$ §H[event_target:anomalous_cube_scientist.GetName]§! [event_target:anomalous_cube_scientist.GetAXX::пришел|||fem:пришла] к выводу, что таинственный предмет сделан из неизвестного нам металла, совершенно не похожего на какие-либо другие элементы."
 strange_worlds.2035.a: "Продолжить исследование."
 strange_worlds.2040.name: "Внутрь куба"
 strange_worlds.2040.desc: "Металлический куб с планеты [fromfrom.planet.GetName], изучением которого сейчас занимается §H[event_target:anomalous_cube_scientist.GetName]§!, вновь удивил нас: по одной из его граней пошла рябь, и поверхность раскрылась, обнаружив вход. Внутри мы нашли пульт управления. Сидевшее за ним существо при жизни, вероятно, было моллюскоидом, но его плоть давно уже превратилась в пыль.\n\nНа пульте управления мы увидели необычного вида ящик, из которого время от времени доносились глухие удары и лязг, словно внутри что-то двигалось. Однако замок оказался слишком сложным, и §H[event_target:anomalous_cube_scientist.GetName]§! пока не [event_target:anomalous_cube_scientist.GetAXX::смог|||fem:смогла] его открыть."
 strange_worlds.2040.evopred: "Может, получится хотя бы заполучить пыль?"
 strange_worlds.2045.name: "Обнаружены аудиозаписи"
 strange_worlds.2045.desc: "§H[event_target:anomalous_cube_scientist.GetName]§! частично [event_target:anomalous_cube_scientist.GetAXX::извлек|||fem:извлекла] из главного пульта управления зашифрованные данные, среди которых оказались две короткие аудиозаписи. Записанная речь, состоящая из горловых щелчков и резких гортанных смычек, — по-видимому, была обращением к слушателям. В языковой базе данных §H[event_target:anomalous_cube_scientist.GetName]§! [event_target:anomalous_cube_scientist.GetAXX::нашел|||fem:нашла] сопоставимый инопланетный язык и [event_target:anomalous_cube_scientist.GetAXX::представил|||fem:представила] приблизительный перевод первой записи.\n\n§L«Уважаемые члены президиума, прошу, выслушайте меня. Войны еще можно избежать. Самоуверенность ваших правителей неблагоразумна: [event_target:anomalous_cube_fallen_empire.GetName] — слишком сильный противник. Мы обречены!»\n\n«Все, что нам остается, — это умиротворить их. В ящике лежит подарок — ключ к тайне нашего владения живым металлом. Возможно, они воспримут это как мирный жест. Либо мы преподнесем этот подарок, либо нас ждет забвение».§!"
 strange_worlds.2045.a: "Перевести вторую запись."
 strange_worlds.2050.name: "Чудесный живой металл"
 strange_worlds.2050.desc_intro: "Мы перевели вторую аудиозапись, хранившуюся в пульте управления кубом.\n\n§L«Уважаемые члены президиума! Меня постигла неудача. Гибель наша неизбежна и неотвратима».\n\n«Кто-то вывел из строя мой шестигранный аппарат. Иду на вынужденную посадку на планете [fromfrom.planet.GetName]. Даже если я выживу, умиротворяющий дар не будет доставлен по назначению. [event_target:anomalous_cube_fallen_empire.GetName] нападет на нас, как мы и опасались».§!\n\n§H[event_target:anomalous_cube_scientist.GetName]§! тем временем успешно [event_target:anomalous_cube_scientist.GetAXX::расшифровал|||fem:расшифровала] кодовый замок на ящике. Внутри обнаружился любопытный слиток металла, очень податливого и гиперактивного: каждые несколько секунд он принимает новую форму."
 strange_worlds.2050.desc_no_war_lm: "\nМы можем либо оставить эту находку себе, чтобы понять природу живого металла, либо исполнить волю погибшего пилота и предложить металл в качестве подарка государству [event_target:anomalous_cube_fallen_empire.GetName], улучшив отношения с ним."
 strange_worlds.2050.desc_no_war_no_lm: "\nМы можем либо оставить находку себе, чтобы лучше понять природу этого необыкновенного металла, либо исполнить волю погибшего пилота и предложить металл в качестве подарка государству [event_target:anomalous_cube_fallen_empire.GetName], улучшив отношения с ним."
 strange_worlds.2050.desc_war_lm: "\nУдивительное содержимое ящика и перевозивший его кубовидный корабль помогут нам понять природу живого металла."
 strange_worlds.2050.desc_war_no_lm: "\nУдивительное содержимое ящика и перевозивший его кубовидный корабль помогут нам лучше понять природу металлических соединений и конструкций."
 strange_worlds.2050.a_no_war: "Подарить его [event_target:anomalous_cube_fallen_empire.GetName&dat]."
 strange_worlds.2050.b_fallen_not_defeated_no_war: "Оставить себе."
 strange_worlds.3005.name: "Подозрительный пророк"
 strange_worlds.3005.desc: "При наблюдении за жителями планеты §Y[event_target:pre_ftl_planet.GetName]§! наша группа высадки совершила любопытное наблюдение.\n\nВся столица взбудоражена: по ней стремительно разносятся слухи о неком Избранном, который якобы спустился со звезд, чтобы исполнить древнее пророчество и повести [event_target:pre_ftl_planet.Owner.GetSpeciesName&gen] в золотой век.\n\nВесь наш личный состав находится на своих местах, поэтому необходимо узнать, о ком идет речь."
 strange_worlds.3005.a: "Узнать больше."
 strange_worlds.3010.name: "Лжепророк"
 strange_worlds.3010.desc_intro: "Наша группа высадки установила истинную личность Избранного с планеты §Y[event_target:pre_ftl_planet.GetName]§!.\n\n"
 strange_worlds.3010.desc_no_megacorp: "Оказалось, что некий §Yнамарианский кочевник§! выдает себя за важнейшего персонажа мифологии [event_target:pre_ftl_planet.Owner.GetSpeciesName&gen] и утверждает, что спустился со звезд."
 strange_worlds.3010.desc_megacorp: "Оказалось, что некий караванщик из числа §Y[event_target:caravaneer_fleet3_country.GetSpeciesName&gen]§! выдает себя за важнейшего персонажа мифологии [event_target:pre_ftl_planet.Owner.GetSpeciesName&gen] и утверждает, что спустился со звезд."
 strange_worlds.3010.desc_outro: "\nИзучив планету внимательнее, мы обнаружили и его разбившийся, а потому неспособный теперь взлететь корабль, спрятанный в долине на некотором расстоянии от столицы. Попасть сюда случайно почти невозможно. Судя по устаревшей модели гипердвигателя, этот корабль лежит здесь уже давно.\n\nПо всей видимости, попавший в безвыходное положение пилот решил сыграть на суевериях местных жителей и теперь охотно принимает поклонения и подношения от них, в том числе и такую почесть, как должность правителя, которому известны «знания с небес».\n\nЕсли так будет продолжаться, последствия поступков этого шарлатана для развивающегося общества будут катастрофическими. Возможно, следует вмешаться."
 strange_worlds.3010.a: "Разоблачить обманщика."
 strange_worlds.3010.b: "Предложить спасти его."
 strange_worlds.3015.name: "Правда раскрыта"
 strange_worlds.3015.desc_no_megacorp: "Мы свергли §Yнамарианского кочевника§!, притворявшегося Избранным из мифологии [event_target:pre_ftl_planet.Owner.GetSpeciesName&gen] и правившего планетой §Y[event_target:pre_ftl_planet.GetName]§!."
 strange_worlds.3015.desc_megacorp: "Мы свергли караванщика из числа §Y[event_target:caravaneer_fleet3_country.GetSpeciesName&gen]§!, притворявшегося Избранным из мифологии [event_target:pre_ftl_planet.Owner.GetSpeciesName&gen] и правившего планетой §Y[event_target:pre_ftl_planet.GetName]§!."
 strange_worlds.3015.desc_outro: "\nПредварительно изучив местные легенды во всех подробностях, мы убедили правящий класс, что их так называемый Избранный на самом деле — воплощение дьявола, и он послан, чтобы ввести народ в заблуждение и погрузить планету в тысячелетнюю тьму.\n\nРазбившийся корабль мы разобрали на части, не оставив местным ни одного винтика. Впрочем, скрыть от них факт существования более развитых технологий не удалось, поскольку они уже видели некоторые личные вещи пилота."
 strange_worlds.3015.a: "Очень жаль."
 strange_worlds.3020.name: "Путь домой"
 strange_worlds.3020.desc_intro: "Наша группа высадки добилась личного приема у «Избранного» с планеты §Y[event_target:pre_ftl_planet.GetName]§! и предложила ему помочь отремонтировать корабль и отправить в космос.\n\n"
 strange_worlds.3020.desc_no_megacorp: "§YНамарианский кочевник§! с радостью согласился. Он объяснил, что все это время жил в страхе за свою жизнь, поскольку после вынужденной посадки на планете §Y[event_target:pre_ftl_planet.GetName]§! местные жители приняли его за бога и ему приходилось поневоле играть эту роль."
 strange_worlds.3020.desc_megacorp: "Представитель §Y[event_target:caravaneer_fleet3_country.GetSpeciesName&gen]§! с радостью согласился. Он объяснил, что все это время жил в страхе за свою жизнь, поскольку после вынужденной посадки на планете §Y[event_target:pre_ftl_planet.GetName]§! местные жители приняли его за бога и ему приходилось поневоле играть эту роль."
 strange_worlds.3020.desc_outro: "\nМы доставили «Избранного» на исследовательскую станцию и отремонтировали его корабль. Перед тем как покинуть планету, благодарный путешественник на прощание подарил нам почти все, что вез с собой.\n\nОбразовавшееся после исчезновения «Избранного» безвластие привело к кратковременной, но жестокой борьбе между несколькими религиозными группами. Впрочем, сегодня §Y[event_target:pre_ftl_planet.GetName]§! вновь живет мирно."
 strange_worlds.3020.a: "Великолепно."
 strange_worlds.3025.name: "[event_target:nomad01_country.GetName]"
 strange_worlds.3025.desc: "Приветствуем вас, [Owner.GetSpeciesName]! Нам стало известно, что недавно вы столкнулись с беглым намарианином, отделившимся от нашего флота.\n\nВы поступили с ним исключительно правильно. Он давно сбился с истинного пути, а его честолюбие поставило под угрозу успех всех наших странствий.\n\nПожалуйста, примите от нас подарок в знак благодарности."
 strange_worlds.3025.a: "Премного благодарны."
 strange_worlds.3030.name: "[event_target:caravaneer_home_country.GetName]"
 strange_worlds.3030.desc: "[Owner.GetSpeciesNamePlural] нашли пропавшего §YРэкета§!? Какие молодцы! От него одна только головная боль. И от его болтовни тоже — даже слушать стыдно. Он уже в пятый раз такое проворачивает. Если честно, даже приятно, что он улетел.\nВот, возьмите. Это вам подарок за то, что теперь можно спокойно жить. Предложение ограничено, выгоднее не бывает!"
 strange_worlds.3030.a: "Премного благодарны."
 strange_worlds.3040.name: "Что мы забыли"
 strange_worlds.3040.desc: "Работники станции наблюдения над планетой §Y[event_target:pre_ftl_planet.GetName]§! сообщили, что после недавних геологоразведочных работ на поверхности у нас пропало несколько ящиков с припасами.\n\nОтследив их местоположение по геолокации, мы узнали, что ящики нашли и забрали себе жители расположенной неподалеку деревни.\n\nПоявление в [event_target:pre_ftl_planet.Owner.GetSpeciesAdj&masc,prep] обществе таких высокотехнологичных хранилищ может неблагоприятно повлиять на его развитие."
 strange_worlds.3040.a: "Досадно."
 strange_worlds.3045.name: "Вернуть отправителю"
 strange_worlds.3045.desc_common: "По всей видимости, забытые нами на планете §Y[event_target:pre_ftl_planet.GetName]§! вещи повлияли на местную культуру самым неожиданным образом.\n\n[Root.GetPreFTLUpperPlural&plain] обитатели этого мира начали строить грубые копии наших наблюдательных челноков. Они, разумеется, не способны подняться в воздух, однако свидетельствуют о том, что коренные жители заметили наших исследователей.\n\nПод руководством местного старейшины [event_target:pre_ftl_planet.Owner.GetSpeciesNamePlural] даже пытаются подражать действиям наших почвоведов: забытые нами ящики они заполняют грязью и камнями, погружают на «корабли» и терпеливо ждут."
 strange_worlds.3045.desc_non_homicidal: "\n[event_target:pre_ftl_planet.Owner.GetSpeciesNamePlural] полагают, что если они и дальше будут копировать наши действия, высшие силы ниспошлют им новые ящики с припасами. Необходимо вмешаться, пока это поведение не распространилось повсеместно."
 strange_worlds.3045.desc_homicidal: "\nВсе это бессмысленно: их всех ждет только смерть."
 strange_worlds.3045.a_normal: "Втайне вернуть себе ящики."
 strange_worlds.3045.a_megacorp: "Незаметно вернуть себе ящики."
 strange_worlds.3045.b_normal: "Обменять провизию на их минералы."
 strange_worlds.3045.b_megacorp: "Устроим бартер!"
 strange_worlds.3045.c: "Умертвить этих примитивных существ."
 strange_worlds.3045.ct: "Станция наблюдения над планетой §Y[event_target:pre_ftl_planet.GetName]§! производит $@observation_outpost_crate_minerals_production$ ед. £minerals£ §Iминералов§!. Содержание: $@observation_outpost_crate_food_upkeep$ ед. £food£ §Iпищи§!"
 strange_worlds.3050.name: "Оскорбительное отсутствие"
 strange_worlds.3050.desc: "Ритуалы «загрузки» кораблей еще какое-то время практиковались даже после того, как мы забрали ящики с планеты §Y[event_target:pre_ftl_planet.GetName]§!. Вскоре, однако, разозлившиеся [event_target:pre_ftl_planet.Owner.GetSpeciesNamePlural], не дождавшись припасов, решили выместить свой гнев на старейшине. Его бросили в самодельный «челнок», который затем подожгли, превратив в пепел вместе с пленником.\n\nИ хотя народ вернулся к своей привычной деятельности, в его культуре еще долго будет бытовать отвращение к «небесным гостям»."
 strange_worlds.3050.a: "Принято к сведению."
 strange_worlds.3060.name: "Прекращение услуг"
 strange_worlds.3060.desc: "По мере развития [Root.GetPreFTLLower&neut,gen] общества [event_target:pre_ftl_planet.Owner.GetSpeciesName&pl,gen] мы постепенно прекратили обменивать продовольствие со станции наблюдения на минералы.\n\nИ хотя эксперимент получился интересным, постоянное вмешательство в дела развивающейся цивилизации создает риск, что нас обнаружат прежде времени."
 strange_worlds.3060.a: "Разумная мера предосторожности."
 strange_worlds.3060.ct: "Станция наблюдения больше не производит минералы и не требует поставок продовольствия"
 strange_worlds.3070.name: "Орбитальная аномалия"
 strange_worlds.3070.desc: "Из-за гравитационной аномалии наша станция наблюдения сошла с орбиты планеты §Y[event_target:pre_ftl_planet.GetName]§! и ненадолго погрузилась в нижние слои атмосферы.\n\nЭкипаж не пострадал, а станцию удалось вывести на прежнюю орбиту, однако нас беспокоит тот факт, что ее могли заметить [event_target:pre_ftl_planet.Owner.GetSpeciesNamePlural].\n\nВремя покажет, действительно ли местные жители нас обнаружили, и если да, то как это скажется на развитии их цивилизации."
 strange_worlds.3070.a: "Продолжать наблюдения."
 strange_worlds.3075.name: "Лестницы на небеса"
 strange_worlds.3075.desc_common: "Нашу станцию наблюдения на низкой орбите планеты §Y[event_target:pre_ftl_planet.GetName]§! запечатлели с помощью примитивных технологий захвата изображения. Главы некоторых государств, вдохновленные фотографиями и рассказами очевидцев, объявили о постройке «лестниц на небеса», чтобы изучить предмет восхищения поближе.\n\nОчевидно, что все подобные попытки тщетны, однако нас беспокоит начавшееся между государствами соперничество: эпоха мира заканчивается, всплывают давно позабытые конфликты, и каждый стремится опередить других, чтобы потешить гордость и, возможно, завладеть ресурсами, которых так не хватает на планете."
 strange_worlds.3075.desc_non_homicidal: "\nЕсли доказательства нашего существования удастся опровергнуть, возможно, мы еще успеем разрядить обстановку, пока [Owner.GetSpeciesHandName] кого-нибудь из мировых лидеров не тянется к красной кнопке.\n\nС другой стороны, дипломатическое противостояние государств [Root.GetPreFTLLower&fem,gen] цивилизации может стать любопытной темой для практического исследования наших социологов, пусть даже оно влечет за собой риск серьезной эскалации."
 strange_worlds.3075.desc_homicidal: "\nГрядущий хаос только порадует наших исследователей."
 strange_worlds.3075.a: "Опровергнуть доказательства нашего существования."
 strange_worlds.3075.b: "Продолжать наблюдения."
 strange_worlds.3075.b_ct: "Станция наблюдения производит вдвое больше очков £society£ §Yсоциологических§! исследований"
 strange_worlds.3080.name: "Истина где-то рядом"
 strange_worlds.3080.desc: "Наши агенты успешно развенчали убежденность жителей планеты §Y[event_target:pre_ftl_planet.GetName]§! в нашем существовании.\n\nПосле того как снимки признали поддельными, а показания свидетелей — неправдоподобными, строительство «лестниц на небеса» прекратилось. Государства, оказавшиеся в неловком положении из-за своего «легкомыслия», вновь объединились на почве совместного стремления к разумному мышлению и применению научных методов.\n\nСтройки, где шло сооружение лестниц, переоборудовали в высшие учебные заведения, а новое поколение ученых успешно развенчивает мифы о «Небесной цитадели»."
 strange_worlds.3080.a: "$FASCINATING$"
 strange_worlds.3080.a_ct: "[event_target:pre_ftl_country.GetName] на 50% приближается к следующей эпохе\n[event_target:pre_ftl_country.GetName] принимает материализм."
 strange_worlds.3085.name: "Великие лестничные войны"
 strange_worlds.3085.desc: "Напряжение, вызванное гонкой между [Root.GetPreFTLLower&pl,inst] государствами планеты §Y[event_target:pre_ftl_planet.GetName]§! за первенство в строительстве «лестницы на небеса», вылилось в мировую войну. Два года шла кровавая борьба за постоянно сокращающиеся ресурсы, вошедшая в историю как Великие лестничные войны. Но наконец наступил мир.\n\nКлючевой пункт мирного соглашения сводится к совместному выступлению против единого врага — «Небесной цитадели». Потрепанный войной мир, который сегодня восстанавливают [event_target:pre_ftl_planet.Owner.GetSpeciesNamePlural], уже никогда не будет прежним: паранойя и ненависть ко всему неизведанному значительно затруднят нам взаимодействие с местными народами в будущем."
 strange_worlds.3085.a: "Будем решать проблемы по мере их поступления."
 strange_worlds.3085.a_ct: "Станция наблюдения производит прежнее количество очков £society£ §Yсоциологических§! исследований"
 create_hibernators_pops_ct: "Создается $@hibernators_pops_created|*0$ £job_pre_sapient£ ед. предразумных поселений с признаком §Y«$trait_seasonal_dormancy$»§!"
 pm_bleeding_planet: "Кровоточащая планета"
 pm_bleeding_planet_desc: "Сама земля истекает кровью. Не стоит лишний раз тревожить почву под ногами колонистов.\n"
 pm_contruction_coagulate: "Строительные сгустки"
 pm_contruction_coagulate_desc: "Сама земля истекает кровью в присутствии колонистов. Эта вязкая жидкость действует как природный (хотя и опасный) связывающий материал.\n"
 pm_hemosymbiosis: "Гемосимбиоз"
 pm_hemosymbiosis_desc: "Загадочная жидкость из недр планеты напрямую влияет на дальнейшее развитие. Работы по строительству и добыче ресурсов идут эффективнее за счет замедленного роста колонии.\n"
 pm_parasitic_production: "Паразитическое производство"
 pm_parasitic_production_desc: "Мы модифицировали обитающих на этой планете паразитов и увеличили продуктивность труда всех рабочих.\n"
 pm_frying_fauna: "Жареная фауна"
 pm_frying_fauna_desc: "Обитающая на этом мире мегафауна процветает в тщательно созданных условиях, а ее уникальные пищеварительные ферменты помогают очищать сплавы."
 pm_frying_fauna_machine: "$pm_frying_fauna$"
 pm_frying_fauna_machine_desc: "$pm_frying_fauna_desc$"
 pm_frying_fauna_2: "$pm_frying_fauna$"
 pm_frying_fauna_2_desc: "Электрические сборщики превращают местную мегафауну в постоянный источник питательных веществ."
 pm_frying_fauna_2_machine: "$pm_frying_fauna$"
 pm_frying_fauna_2_machine_desc: "$pm_frying_fauna_2_desc$"
 pm_catalytic_excrement: "Каталитические экскременты"
 pm_catalytic_excrement_ct: "Обитающая на этом мире мегафауна процветает в тщательно созданных условиях, а ее уникальные пищеварительные ферменты помогают очищать сплавы."
 pm_strange_sandstorm: "Странные песчаные бури"
 pm_strange_sandstorm_ct: "Необычное поведение песков этой планеты напрямую влияет на деятельность колонии."
 pm_perpetual_lightning: "Вечные молнии"
 pm_perpetual_lightning_desc: "Облученные во время терраформирования кристаллы создали идеальные условия для появления неутихающей грозы, охватывающей всю планету."
 pm_dark_matter_geyser: "Гейзер из темной материи"
 pm_dark_matter_geyser_desc: "Эта планета тонет в миазмах темной материи."
 pm_population_quarantine: "Население на карантине"
 pm_population_quarantine_desc: "Население помещено на карантин на время изучения окаменелостей, образовавшихся из-за воздействия темной материи."
 pm_dark_matter_statue: "Статуи из темной материи"
 pm_dark_matter_statue_desc: "Вся планета уставлена окаменелыми останками местных жителей, попавших под воздействие темной материи. Эта мрачная картина — настоящий рай для исследователей."
 pm_raining_corpses: "Дождь из трупов"
 pm_raining_corpses_desc: "Плотные облака, на которых обитавшая здесь раса когда-то хоронила своих покойников, истончаются. Содержимое небесных могил сыпется на землю."
 pm_raining_corpses_tt: "£minor_artifacts£ $minor_artifacts$ от £job£ должностей «$WORKERS$»"
 pm_raining_corpses_no_ancrel: "$pm_raining_corpses$"
 pm_raining_corpses_no_ancrel_desc: "$pm_raining_corpses$"
 pm_raining_corpses_no_ancrel_tt: "£consumer_goods£ $consumer_goods$ от £job£ должностей «£pop_cat_worker£ $pop_cat_worker$»"
 pm_revolting_pests: "Мерзкие твари"
 pm_revolting_pests_desc: "Местная фауна любопытна, но просто отвратительна. Подходить к ней близко не рекомендуется."
 pm_gaseous_fauna: "Газогенерирующая фауна"
 pm_gaseous_fauna_desc: "Одомашненные обитатели этой планеты не только развлекают жителей, но и снабжают местное население выделяемым газом."
 pm_gaseous_fauna_ct: "Все £pop£ поселения производят §G$@gaseous_fauna_exotic_gases_production$§! экзотических газов"
 pm_urban_privilege_regular: "Привилегии горожан"
 pm_urban_privilege_regular_desc: "Обитатели сельской местности возмущены тем, что мы заняли сторону горожан в местных спорах."
 pm_urban_privilege_broken_shackles: "$pm_urban_privilege_regular$"
 pm_urban_privilege_broken_shackles_desc: "$pm_urban_privilege_regular_desc$"
 pm_rural_privilege_regular: "Привилегии сельских жителей"
 pm_rural_privilege_regular_desc: "Обитатели городских районов возмущены тем, что мы заняли сторону сельских жителей в местных спорах."
 pm_rural_privilege_broken_shackles: "$pm_rural_privilege_regular$"
 pm_rural_privilege_broken_shackles_desc: "$pm_rural_privilege_regular_desc$"
 pm_peacekeeper_deployment: "Развертывание миротворцев"
 pm_peacekeeper_deployment_desc: "Миротворцы помогают нам улаживать споры между жителями разных районов."
 bacterial_drive_modifier_desc: "Содержащиеся в местной воде генетически модифицированные бактерии побуждают население вместе стремиться к единой цели"
 pm_bd_reproduction: "Бактериальная стимуляция: размножение"
 pm_bd_reproduction_desc: "$bacterial_drive_modifier_desc$"
 pm_bd_strength: "Бактериальная стимуляция: сила"
 pm_bd_strength_desc: "$bacterial_drive_modifier_desc$"
 pm_bd_creativity: "Бактериальная стимуляция: творчество"
 pm_bd_creativity_desc: "$bacterial_drive_modifier_desc$"
 ladder_wars_pre_ftl: "Эхо Лестничных войн"
 ladder_wars_pre_ftl_desc: "Эта разрушенная войной планета постепенно восстанавливается, но паранойя местных жителей затрудняет взаимодействие всех без исключения."
 living_metal_mega_construction_insight: "Знания о мегасооружении из живого металла"
 living_metal_mega_construction_insight_desc: "Благодаря обнаруженному нами артефакту из живого металла мы стали значительно лучше разбираться в разработке проектов мегасооружений."
 living_metal_mega_construction_insight_ct: "Базовая стоимость указа «Мегасооружение из живого металла»: §G–50%§!"
 d_coagulated_landscape: "Свернувшийся ландшафт"
 d_coagulated_landscape_desc: "Из-под земли вытекает вязкая жидкость, при сворачивании превращающаяся в невероятно прочное, но опасное вещество. Места для беспрепятственного строительства почти не остается."
 d_shimmering_structure: "Мерцающее сооружение"
 d_shimmering_structure_desc: "Огромное мерцающее сооружение неизвестной природы."
 d_geothermal_hotspot: "Геотермальная точка"
 d_geothermal_hotspot_desc: "На этой планете расположен уникальный источник геотермальной энергии, который представляет большой интерес для исследователей."
 d_ancient_cloaking_array: "Древнее маскировочное устройство"
 d_ancient_cloaking_array_desc: "Эту колонию укрывает от врагов древнее инопланетное маскировочное устройство. Колонисты чувствуют себя в безопасности."
 d_psionic_sands: "Псионические пески"
 d_psionic_sands_desc: "Пески этой планеты настолько сильно насыщены зро, что с ними можно установить контакт."
 d_mountains_of_steel: "Стальные горы"
 d_mountains_of_steel_desc: "В этих грандиозных горах, образовавшихся из-за воздействия огромных температур в процессе терраформирования, находятся обильные залежи ресурсов."
 d_lava_tubes: "Лавовые трубки"
 d_lava_tubes_desc: "Потоки магмы проложили здесь туннели с богатым содержанием минералов. Добыча их обещает быть очень прибыльной."
 d_lava_tubes_ct: "$t$£energy£ Затраты на содержание должностей [miner.GetIcon] «[miner.GetName]»: §R+$@lava_tubes_mining_job_upkeep$§!"
 d_lava_tubes_ct_short: "§R+$@lava_tubes_mining_job_upkeep$§! £energy£ Затраты на содержание должностей [miner.GetIcon] «[miner.GetName]»"
 d_hydroactive_eggs: "Водолюбивые яйца"
 d_hydroactive_eggs_desc: "Вода на этой планете — не редкость, поэтому местная фауна размножается стремительно."
 d_explosive_atmosphere: "Взрывоопасная атмосфера"
 d_explosive_atmosphere_desc: "Из-за содержания в воздухе летучих пылинок атмосфера этой планеты крайне легковоспламеняема."
 d_explosive_atmosphere_ct: "$t$£volatile_motes£ §Y$volatile_motes$§! от должностей [mote_harvester.GetIcon] «$mote_harvester$»: §G+50%§!"
 d_explosive_atmosphere_ct_short: "§G+50%§! £volatile_motes£ §Yлетучих пылинок§! от должностей [mote_harvester.GetIcon] «$mote_harvester$»"
 d_blue_lava: "Синяя лава"
 d_blue_lava_desc: "В процессе терраформирования насыщенный газ вступил в реакцию с глубокими залежами сплавов, из-за чего поверхность этой планеты покрыта завораживающей синей лавой."
 d_crystaline_growths: "Кристаллические наросты"
 d_crystaline_growths_desc: "Эта планета изобилует кристаллическими наростами, которые можно собирать для своих целей."
 d_bogplants: "Болотные растения"
 d_bogplants_desc: "В местных сверхкислотных болотах произрастает уникальная флора, выделяющая во время питания экзотический газ."
 d_liquid_dark_matter: "Жидкая темная материя"
 d_liquid_dark_matter_desc: "Загадочный гейзер превратился в небольшой пруд жидкой темной материи."
 d_space_junk_hazards: "Опасный космический мусор"
 d_space_junk_hazards_desc: "Скопившиеся на орбите обломки опасны для челноков, а при попадании в атмосферу — и для сооружений на поверхности."
 trait_inner_darkness: "Тьма внутри"
 trait_inner_darkness_desc: "Насыщенные темной материей тела регулярно испускают небольшое количество небарионных частиц, однако продолжительность жизни при этом сокращается."
