 trait_psionic_ephapse: "Псионический эфапс"
 trait_psionic_ephapse_desc: "Пищеварительная система этой расы, подвергшаяся длительному воздействию изменяющих сознание бактерий, производит псионические пробиотики. Благодаря им возможен телепатический контакт."
