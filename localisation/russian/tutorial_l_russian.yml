l_russian:
 SITLOG: "Журнал обновлен"
 ####################################
 #Advisor Tutorial Messages
 ####################################
 TUTORIAL_GOVERNMENTVIEW_GOVERNMENT_TITLE: "Правительство"
 TUTORIAL_GOVERNMENTVIEW_GOVERNMENT_DESC: "На экране §SПравительство§! представлена информация о нашем государстве и его правительстве. Здесь мы можем увидеть нашего §Sправителя§! и все связанные с ним эффекты.\n\nНа отдельной закладке есть сведения о §Sдемографии§! нашего государства."
 TUTORIAL_TECH_VIEW_TITLE: "Обучение: технологии"
 TUTORIAL_TECH_VIEW_DESC: "В окне §Sтехнологий§! мы управляем ходом научных исследований. Технологии разделены на три разные области, в каждой из которых обычно доступны три варианта для изучения.\n\nДля исследования доступны области £physics£ физики, £society£ социологии и £engineering£ инженерии.\n\nЧтобы исследовать §Sтехнологию§!:\n\n£dot_green£ Нажмите на кнопку §SВыберите исследование§!.\n£dot_green£Выберите один из предложенных вариантов.\n\nНазначив §SВедущего учёного§!, можно ускорить исследования, и сделать это очень желательно. §SЧерты§! этого лидера могут дать дополнительные преимущества.\n\nИсследования можно автоматизировать, нажав на кнопку §SВключить автоматизацию исследований§! для соответствующей области.\n\n$tttt$$ttt$£automate_research£\n"
 TUTORIAL_CONTACTSVIEW_EMPIRES_TITLE: "Обучение: контакты"
 TUTORIAL_CONTACTSVIEW_EMPIRES_DESC: "На экране §SКонтактов§! подробно перечислены все §Sгосударства§!, которые мы повстречали. Здесь можно сразу увидеть их §Sотношение§! к нам и заняться §Sдипломатией§!.\n\nУ каждого государства в списке также указана важная информация, например §Sформа правления§!, §Sпринципы§! и §Sстатус государства§!.\n\nОтсюда же можно перейти к §Sшпионажу§! и просмотреть текущие §Sсоглашения§! с любым из государств."
 TUTORIAL_SITUATION_LOG_TITLE: "Обучение: журнал"
 TUTORIAL_SITUATION_LOG_DESC: "§SЖурнал§! содержит список всех доступных §Sособых проектов§!, £archaeology£ §Sмест археологических раскопок§! и другие важные сведения.\n\nНовые записи будут появляться в нем по мере изучения галактики."
 TUTORIAL_SHIP_DESIGNER_TITLE: "Обучение: конструктор кораблей"
 TUTORIAL_SHIP_DESIGNER_DESC: "Здесь мы разрабатываем все §Sкорабли§!, которые будут использоваться в нашем государстве. Новые варианты §Sразмеров корпуса§! и §Sкомпонентов§! будут появляться по мере изучения новых технологий.\n\nЧтобы создать новый §Sшаблон§!:\n\n£dot_green£ Нажмите на кнопку §SНовый шаблон§!.\n£dot_green£ Выберите §Sразмер корпуса§!.\n£dot_green£ Нажмите на кнопку §SНет модуля§! и выберите §Sмодуль§!.\n\nТеперь вы можете свободно устанавливать доступные §Sкомпоненты корабля§!, нажимая на пустые ячейки.\n\n\n$tttt$$tt$£slot_component£\n\n\nКорабль по сохранённому шаблону можно будет построить на любой §Sкосмической станции§!, где есть §Sверфь§!."
 TUTORIAL_EMPIREVIEW_PLANETS_TITLE: "Обучение: планеты и секторы"
 TUTORIAL_EMPIREVIEW_PLANETS_DESC: "Экран §SПланеты и секторы§! предоставляет обзор всех колонизированных миров, их £pops£ §Sнаселения§! и §Sпроизводства ресурсов§!.\n\nПо мере роста государства его можно делить на §Sсекторы§!, чтобы упростить управление.\n\nСуществующие §Sсекторы§! также можно освобождать в виде £vassal£ §Sвассалов§!."
 TUTORIAL_MILITARY_FLEET_TITLE: "Обучение: военные флотилии"
 TUTORIAL_MILITARY_FLEET_DESC: "§SВоенные флотилии§! берегут нашу молодую державу от угроз… или силой расширяют наше великое государство, если мы того желаем.\n\nРазмер нашего флота ограничен нашей текущей §Sвместимостью флота§!, и поначалу этот параметр невелик. Однако его можно увеличить следующими способами:\n\n£dot_green£ Исследовать новые §Sтехнологии§!.\n£dot_green£ Преумножать £pops£ население.\n£dot_green£ Строить §Sстояночные места§! на космических базах.\n\nВо главе флотилии мы можем поставить £commander£ §Sкомандира§!, что повысит её огневую мощь и предоставит прочие бонусы, которыми обладает назначенный £leader£ §Sлидер§!."
 TUTORIAL_SCIENCE_SHIP_TITLE: "Обучение: изучение космоса"
 TUTORIAL_SCIENCE_SHIP_DESC: "Это наш £science_ship£ §Sнаучный корабль§!, он занимается §Sизучением§! астрономических объектов, например, £planet£ §Sпланет§! в £system£ §Sзвёздной системе§!. Чтобы узнать, какие §Sресурсы§! есть на планете, мы должны сначала её изучить.\n\nНаша родная система уже изучена, так что мы можем сосредоточить свои усилия на других.\n\nВыбрав §Sнаучный корабль§!:\n\n£dot_green£ Щёлкните правой кнопкой мыши по соседней §Sсистеме§!.\n£dot_green£ Выберите §SИзучить систему§!."
 TUTORIAL_CONSTRUCTION_SHIP_TITLE: "Обучение: строительный корабль"
 TUTORIAL_CONSTRUCTION_SHIP_DESC: "Это — наш £construction_ship£ §Sстроительный корабль§!, с помощью которого мы возводим космические станции.\n\nИзучив астрономический объект (например, £planet£ §Sпланету§!), мы можем приказать кораблю построить £science_ship£ §Sнаучную станцию§! или £mining_station£ §Sдобывающую станцию§!, чтобы извлечь найденные там ресурсы.\n\nЭтот §Sкорабль§! также способен [GetBuildGrow] §Sкосмическую базу§! в £system£ §Sсистеме§!, на которую еще не объявлено ничьих притязаний, что делает его жизненно необходимым для расширения наших владений."
 TUTORIAL_PLANETVIEW_PLANET_TITLE: "Обучение: поверхность"
 TUTORIAL_PLANETVIEW_PLANET_DESC: "Вкладка §SПоверхность§! предоставляет сведения об инфраструктуре и статусе £planet£ §Sпланеты§!.\n\nВ разделе £building£ §Sрайонов и сооружений§! отображаются ячейки сооружений в соответствующих районах: занятые или свободные.\n\n£district£ §SРайоны§! и §Sзоны§! дают £housing£ §Sжилье§!, £job£ §Sдолжности§! и ресурсы.\n\nПереключатель §Sавтоматизации§! позволяет перевести планету в режим самоуправления на основе ее категории.\n\nНа панели §Sпланетарных показателей§! в верхней части окна отображены £stability£ §Sстабильность§!, £crime£ §Sпреступность§!, активные модификаторы и назначенный §Sгубернатор§!."
 TUTORIAL_PLANETVIEW_TILES_TITLE: "Обучение: экономика"
 TUTORIAL_PLANETVIEW_TILES_DESC: "На вкладке §SЭкономика§! представлен обзор §Sрабочей силы§! и £job£ §Sдолжностей§!.\n\nНаселение £planet£ §Sпланеты§! распределяется по §Sсоциальным слоям§!, которые можно раскрыть и увидеть, какие в них есть §Sдолжности§!. £pops£ §SПоселения§! могут менять социальный слой, если это нужно для предоставления §Sрабочей силы§!.\n\nЗанятые на §Sдолжностях§! поселения потребляют и производят ресурсы.\n\nПоселениям нужно £housing£ §Sжилье§! и £amenities£ §Sблага§!.\n\nНедостаток того или другого снижает £happiness£ §Sсчастье§! на планете, что в свою очередь влияет на общую £stability£ §Sстабильность§!."
 TUTORIAL_PLANETVIEW_COMBAT_TITLE: "Обучение: армии"
 TUTORIAL_PLANETVIEW_COMBAT_DESC: "На вкладке §SАрмии§! происходит управление наземными войсками на планете. Также здесь видно §Sопустошение§!, т. е. урон, которому подверглась £planet£ §Sпланета§!.\n\nИменно здесь возникают новые §Sармии§!, когда мы нажимаем кнопку §SНанять§!. \n\n§SОборонительные армии§! автоматически создаются £pops£ §Sпоселениями§! на таких §Sдолжностях§!, как силовики или [soldier.GetName]. Такие £job£ §Sдолжности§! предоставляют планетарная столица, £building£ §Sполицейские участки§! и £building£ §Sцитадели§!."
 TUTORIAL_PLANETVIEW_SPACEPORT_TITLE: "Космопорт"
 TUTORIAL_PLANETVIEW_SPACEPORT_DESC: "Вкладка §SКосмопорт§! позволяет просматривать флотилии на орбите и [GetBuildingGrowing] гражданские корабли. Военные корабли можно строить только на §Sкосмической базе§!, где имеется §Sверфь§!, однако строительные, научные и §Sколониальные корабли§! создаются здесь.\n\nТаким образом, даже если мы потеряем свою последнюю космическую базу, мы все еще сможем восстановиться, до тех пор, пока у нас есть хотя бы одна обитаемая £planet£ §Sпланета§!."
 TUTORIAL_MILITARY_STATION_TITLE: "Военные станции"
 TUTORIAL_MILITARY_STATION_DESC: "§SВоенные станции§! — стационарные оборонительные сооружения для защиты ключевых £planet£ §Sпланет§! или стратегически важных участков системы. Строить такие станции можно только в пределах наших границ или же на территориях, куда мы имеем привилегированный доступ.\n\nСтарайтесь не [GetBuildingGrowing] слишком много военных станций — как и §Sкораблей§!, иначе затраты на их содержание быстро опустошат наш бюджет."
 TUTORIAL_RESEARCH_STATION_TITLE: "Обучение: научные станции"
 TUTORIAL_RESEARCH_STATION_DESC: "£science_ship£ §SНаучная станция§!, построенная на орбите космического тела, собирает данные в ходе £physics£ §Sфизических§!, £engineering£ §Sинженерных§! и £society£ §Sсоциологических§! исследований.\n\nСтанции можно строить только в пределах наших границ; если £planet£ §Sпланета§! колонизирована, научная станция не нужна."
 TUTORIAL_MINING_STATION_TITLE: "Добывающие станции"
 TUTORIAL_MINING_STATION_DESC: "£mining_station£ §SДобывающие станции§! извлекают £minerals£ §Sминералы§! и £strategic_resource£ §Sредкие ресурсы§! из объектов, на орбите которых они находятся.\n\n§SДобывающие станции§! можно строить только в пределах наших границ; для доступа к ресурсам колонизированной £planet£ §Sпланеты§! эти станции не нужны."
 TUTORIAL_TRANSPORT_SHIP_TITLE: "Обучение: транспортные корабли"
 TUTORIAL_TRANSPORT_SHIP_DESC: "Когда §Sармии§! получают приказ отправиться в космос, они автоматически погружаются на эти §Sтранспортные корабли§!. Берегите их, ведь они практически беззащитны!"
 TUTORIAL_DIPLOMACY_VIEW_TITLE: "Обучение: дипломатия"
 TUTORIAL_DIPLOMACY_VIEW_DESC: "На экране §Sдипломатии§! мы общаемся с другими цивилизациями. Здесь мы можем, помимо прочего, §Sобъявить войну§!, сформировать §Sагентурную сеть§! в соседнем государстве или заключить с ним §Sальянс§! и §Sторговое соглашение§!. Текущий §Hуровень разведки§! также можно посмотреть здесь.\n\nНаши §Sотношения§! с выбранным государством могут варьироваться от отвратительных до отличных. Вам нужен достаточно высокий уровень отношений, чтобы заключить соглашение или сделку.\n\nВы можете отправить в государство £envoy£ §Sпослов§!, чтобы §Sшпионить§! за ним, собирать §Sразведданные§!. Отправка послов также поможет обойти ограничение по §Sотношениям§!, §Sулучшить§! отношения или §Sиспортить§! их."
 TUTORIAL_DIPLOMACY_VIEW_TRADE_TITLE: "Обучение: торговля"
 TUTORIAL_DIPLOMACY_VIEW_TRADE_DESC: "Это экран §Sторговли§!. Здесь мы можем обмениваться §Sресурсами§!, а также §Sинформацией§! и §Sуслугами§!.\n\nУслуги можно использовать, чтобы убедить государство принять соглашение. После возникновения §HГалактического сообщества§! о них также можно напомнить во время голосования в сенате, чтобы увеличить дипломатический вес вашей нации."
 TUTORIAL_DIPLOMACY_VIEW_FEDERATION_TITLE: "Типы федераций"
 TUTORIAL_DIPLOMACY_VIEW_FEDERATION_DESC: "§SТип федерации§! определяет, какие преимущества получат ее участники. После создания каждая £federation£ §Sфедерация§! получает уникальные §Sбонусы и законы§!, которые зависят от ее типа. Еще больше бонусов можно §Sразблокировать§! по мере накопления опыта."
 TUTORIAL_DIPLOMACY_VIEW_HIGHINTEL_TITLE: "Обучение: высокий уровень разведки"
 TUTORIAL_DIPLOMACY_VIEW_HIGHINTEL_DESC: "Мы достигли §Sвысокого уровня разведки§! в этом государстве, поэтому нам доступно больше информации о них.\n\nПоддерживая высокий уровень разведки, мы будем своевременно узнавать об изменениях в их §Sпринципах§!, §Sгражданских моделях§!, §Sотношениях§! с другими государствами, а также о соотношении их §Sтехнологий§!, §Sэкономики§! и §Sармии§! с нашими."
 TUTORIAL_DIPLOMACY_VIEW_LOWINTEL_TITLE: "Обучение: низкий уровень разведки"
 TUTORIAL_DIPLOMACY_VIEW_LOWINTEL_DESC: "Наш §Sуровень разведки§! в этом государстве снижается. Мы рискуем лишиться ранее полученных сведений, поскольку со временем разведданные §Sустаревают§!.\n\nЧтобы повысить §Sуровень разведки§!:\n\n£dot_green£ Поддерживайте §Sдипломатические соглашения§!.\n£dot_green£ Назначайте £envoy£ §Sпослов§! для улучшения отношений.\n£dot_green£ Разверните §Sагентурную сеть§! для шпионажа.\n£dot_green£ Откройте §Sпосольство§! в интересующем вас государстве."
 TUTORIAL_PLANETVIEW_ADJACENCY_BONUS_TITLE: "Системный эффект"
 TUTORIAL_PLANETVIEW_ADJACENCY_BONUS_DESC: "£building£ §SСооружения§!, расположенные в соседних §Sквадратах§!, могут влиять друг на друга, вызывая §Sсистемный эффект§!. Учитывайте это, планируя строительство."
 TUTORIAL_GOVERNMENTVIEW_BUDGET_TITLE: "Бюджет"
 TUTORIAL_GOVERNMENTVIEW_BUDGET_DESC: "Вкладка §SБюджет§! подсчитывает ежемесячные §Sдоходы§! и §Sрасходы§! нашего государства, выраженные в £energy £ энергокредитах. Здесь также можно увидеть факторы, влияющие на нашу экономику."
 TUTORIAL_GOVERNMENTVIEW_DECISIONS_TITLE: "Указы"
 TUTORIAL_GOVERNMENTVIEW_DECISIONS_DESC: "Здесь можно приводить в действие §Sуказы§!, для исполнения которых необходимо потратить некоторое количество наших ресурсов.\n\nУказы требуют ежемесячного содержания, которое покрывает §H$EDICT_FUND$§! или затраты £unity£ §Yединства§!."
 TUTORIAL_GOVERNMENTVIEW_DEMOGRAPHICS_TITLE: "Обучение: демография"
 TUTORIAL_GOVERNMENTVIEW_DEMOGRAPHICS_DESC: "Закладка §SДемография§! отражает состав и расселение наших граждан.\n\nЗдесь также указаны доминирующие §Sрасовые признаки§! в наших £pops£ §Sпоселениях§!, а также модификаторы производительности, £happiness£ §Sсчастья§! и др."
 TUTORIAL_EMPIREVIEW_LEADERS_TITLE: "Обучение: лидеры"
 TUTORIAL_EMPIREVIEW_LEADERS_DESC: "В окне §Sлидеров§! отображаются действующие £leader£ §Sлидеры§!. Здесь же можно ими управлять, например нанимать или снимать с работы.\n\n§SКласс§! лидера определяет, какие задания ему можно поручить и какую должность в §Sсовете§! он может занять.\n\nСписок доступных §Sлидеров§! периодически обновляется, но если нанять слишком многих и превысить лимит, их содержание станет дороже, а прирост опыта замедлится. Увольняйте ненужных лидеров, чтобы избежать таких штрафов."
 TUTORIAL_EMPIREVIEW_FACTIONS_TITLE: "Обучение: фракции"
 TUTORIAL_EMPIREVIEW_FACTIONS_DESC: "Закладка §SФракции§! содержит сведения обо всех политических пристрастиях населения. Имейте в виду, что изменения в социальном и политическом климате нашего государства могут дать толчок к возникновению §Sфракций§!. Все подробности о размерах и популярности §Sфракций§! также находятся здесь.\n\n§SФракции§! выдвигают §Sтребования§!, которые влияют на их §Sодобрение§!. Политические группы в государстве могут быть согласны или не согласны с действиями и политикой властей, что сказывается на приросте £unity£ §Sединства§!.\n\nМощь §Sфракций§! и характер их §Sтребований§! могут меняться вслед за ситуацией в государстве, но помните, что £happiness£ §Sсчастье§! £pops£ §Sпоселений§! напрямую зависит от §Sодобрения§! §Sфракций§!, к которым они принадлежат.\n\nУправляя §Sфракциями§!, мы можем влиять на их взаимоотношения с правительством, мы можем даже принять принципы сильной §Sфракции§! как государственные."
 TUTORIAL_CREATESECTOR_TITLE: "Обучение: управление секторами"
 TUTORIAL_CREATESECTOR_DESC: "Чтобы основать §Sсектор§!, сначала выберите £planet£ §Sпланету§! на странице §S«Пограничное пространство»§! и нажмите кнопку «Создать сектор». Планета станет §Sстолицей§! нового сектора, а все системы в пограничном пространстве в пределах шести гиперпрыжков будут добавлены к нему. Секторы могут автоматизировать строительство планетарных £building£ §Sсооружений§!, если этот вариант разрешен и им выделены ресурсы, что резко сокращает необходимость в микроменеджменте."
 TUTORIAL_CONTACTSVIEW_SPECIES_TITLE: "Обучение: расы"
 TUTORIAL_CONTACTSVIEW_SPECIES_DESC: "На экране §SРасы§! перечислены все типы номинально разумных существ, которых мы повстречали. С помощью §Sпереключателя§! можно просматривать только расы нашего государства или всех жителей галактики.\n\nЗдесь мы можем их §Sмодифицировать§! черты рас или §Sпреобразить§! предразумных существ, если у нас есть технология и возможности, а также §Sустановить права§! для каждой расы или §Sправа по умолчанию§! для всего £pops£ §Sнаселения§!."
 TUTORIAL_PLANETVIEW_TERRAFORM_TITLE: "Обучение: терраформирование"
 TUTORIAL_PLANETVIEW_TERRAFORM_DESC: "§SТерраформирование§! позволяет нам менять окружающую среду £planet£ §Sпланеты§!, чтобы сделать ее более пригодной для какой-либо §Sрасы§! или для иной цели."
 TUTORIAL_GENEMODIFICATION_TITLE: "Генетическая модификация"
 TUTORIAL_GENEMODIFICATION_DESC: "Мы можем модифицировать эту расу на генетическом уровне, изменив ее §Sрасовые признаки§!.\n\nБудет создан новый §Sшаблон§! расы с выбранными вами признаками. Нажмите кнопку §SПринять шаблон§!, чтобы создать новый §Sособый проект§! для изменения каких-либо £pops£ §Sпоселений§! этой расы."
 TUTORIAL_UPLIFTING_TITLE: "Преображение"
 TUTORIAL_UPLIFTING_DESC: "Мы можем изменить §Sрасовые признаки§! этих высокоразвитых животных, §Sпреобразив§! целый вид, чтобы они стали полностью разумными и продуктивными гражданами нашего общества."
 TUTORIAL_SYSTEMVIEW_TITLE: "Информация о системе"
 TUTORIAL_SYSTEMVIEW_DESC: "Мы находимся на экране §Sинформации о системе§!, подробно рассказывающем о выбранной £system£ §Sзвездной системе§!. Здесь вы с легкостью найдете нужные вам £planet£ §Sпланеты§!, станции и флотилии."
 TUTORIAL_WORMHOLE_STATION_TITLE: "Станция червоточин"
 TUTORIAL_WORMHOLE_STATION_DESC: "§SСтанции червоточин§! возводят во внешних пределах £system£ §Sсистем§!. Они создают двухсторонние порталы к другим звездам из микроразрывов в ткани пространства-времени. Гениально."
 TUTORIAL_OBSERVATION_STATION_TITLE: "Обучение: станция наблюдения"
 TUTORIAL_OBSERVATION_STATION_DESC: "На §Sстанции наблюдения§! команда £scientist£ §Sучёных§! проводит исследования и с орбиты наблюдает за §Sдосветовыми§! расами, живущими на £planet£ §Sпланете§!.\n\nВ зависимости от §Sпринципов§! государства и изученных технологий можно выбрать между пассивным наблюдением, культурным влиянием, технологическим просвещением или даже похищением и внедрением.\n\nСпособ наблюдения повлияет на то, как будет развиваться цивилизация и как она будет относиться к наблюдателям."
 TUTORIAL_TERRAFORMING_STATION_TITLE: "Станция терраформирования"
 TUTORIAL_TERRAFORMING_STATION_DESC: "§SСтанция терраформирования§! позволяет провести §Sтерраформирование§! планеты, на орбите которой она находится."
 TUTORIAL_PLANETVIEW_EDICTS_TITLE: "Решения"
 TUTORIAL_PLANETVIEW_EDICTS_DESC: "Планетарные §Sрешения§! — это приказы или законы, для временного исполнения которых необходимо потратить некоторое количество наших ресурсов.\n\nДоступ к новым §Sрешениям§! открывается по мере того, как мы исследуем новые технологии и сталкиваемся с новыми ситуациями."
 TUTORIAL_UNKNOWN_ALIEN_FLEET_TITLE: "Неизвестные"
 TUTORIAL_UNKNOWN_ALIEN_FLEET_DESC: "Обнаружена флотилия §Sнеопознанных существ§!. Мы можем больше узнать о них и, возможно, даже инициировать §SПервый контакт§! в рамках §Sособого проекта§!."
 TUTORIAL_VICTORY_TITLE: "Обучение: победа"
 TUTORIAL_VICTORY_DESC: "На экране §Sпобеды§! перечислены §Sопределенные условия§!, которые нам необходимо соблюдать, если мы хотим, чтобы наследие нашей звездной империи существовало до тех пор, пока в галактике есть разумная жизнь."
 TUTORIAL_OUTPOST_STATION_TITLE: "Обучение: космические базы"
 TUTORIAL_OUTPOST_STATION_DESC: "Это §Sкосмическая база§! нашей системы. Эти улучшаемые станции обозначают владение звёздной системой и чаще всего отвечают за производство §Sкораблей§! всех типов.\n\nЧтобы расширять границы, нам нужно [GetBuildingGrowing] §Sкосмические базы§! в соседних системах.\n\nВражеские §Sкосмические базы§! можно захватить, атаковав их.\n\n§SКосмические базы§! можно специализировать для различных задач с помощью §Sмодулей§! и £building£ §Sсооружений§!. Они также служат последней линией обороны против вражеских флотилий в системе."
 TUTORIAL_GALAXY_MAP_TITLE: "Карта галактики"
 TUTORIAL_GALAXY_MAP_DESC: "На §Sкарте галактики§! обозначены огромные просторы §Sнеизученного космоса§!, наши границы и территории инопланетных цивилизаций, с которыми мы можем установить связь.\n\nМожно щелкнуть по кнопке §SПодробный режим карты§! в правом нижнем меню, чтобы показать или скрыть §Sресурсы§! и §Sдальность действия сенсоров§!."
 TUTORIAL_WAR_GOAL_TITLE: "Военная цель"
 TUTORIAL_WAR_GOAL_DESC: "При объявлении войны мы должны объявить о своих намерениях и нашему врагу, и любым союзникам. Эта §Sвоенная цель§! определяет тип требований, которые можно выдвигать во время мирных переговоров, начиная с передачи оспариваемых £system£ §Sсистем§! до вассализации.\n\nОглашение этой цели дает противнику возможность реагировать соответствующим образом: они могут сдаться сразу, сделать встречное предложение и предложить перемирие или отстаивать свои интересы до последнего мужчины, женщины, грибковой споры или полуразумного травоядного. Выяснять что-то — это всегда весело!\n\nЧтобы объявить §Sвоенную цель§!, выберите ее в списке."
 TUTORIAL_WAROVERVIEW_TITLE: "Сведения о войне"
 TUTORIAL_WAROVERVIEW_DESC: "В этом окне представлены сведения о нашей текущей войне. Каждая из сторон испытывает §Sусталость от войны§! в зависимости от своих успехов, что определяет готовность к заключению мирного договора.\n\nЕсли усталость от войны достигнет 100% для одной из сторон, вторая сторона может вынудить ее к принятию соглашения о §Sстатусе-кво§!. Также здесь можно отслеживать результаты всех столкновений, имевших место в этой войне."
 TUTORIAL_STRATEGIC_RESOURCES_TITLE: "Редкие ресурсы"
 TUTORIAL_STRATEGIC_RESOURCES_DESC: "На экране §Hредких ресурсов§! приведены доступные нам £strategic_resource£ §Sредкие ресурсы§! и эффекты от них.\n\nМногие §Sредкие ресурсы§! требуют изучения конкретных §Sтехнологий§!, прежде чем их можно будет добывать и перерабатывать."
 TUTORIAL_EXPANSION_PLANNER_TITLE: "Обучение: планировщик экспансии"
 TUTORIAL_EXPANSION_PLANNER_DESC: "§HПланировщик экспансии§! позволяет найти ближайшие §Sпригодные для жизни§! £planet£ §Sпланеты§!, предоставляющие возможность для колонизации. Можно [GetBuildingGrowing] £colony_ship£ §Sколониальные корабли§! и отдавать им приказы прямо на этом экране.\n\nПланеты должны быть изучены, а любые аномалии на них — найдены, прежде чем колонизация станет возможной.\n\nКроме того, в £system£ §Sсистемах§! этих §Sпланет§! должны быть построены §Sкосмические базы§! — таким образом системы окажутся внутри наших границ."
 TUTORIAL_TRADITIONS_TITLE: "Обучение: традиции"
 TUTORIAL_TRADITIONS_DESC: "На экране §Hтрадиций§! отображаются §Sдеревья традиций§!, доступные для нашего государства.\n\nПрежде чем можно будет открывать какие-либо £traditions£ §Sтрадиции§!, нужно §Sпринять§! §Sдерево традиций§!.\n\nНа §Sпринятие§! §Sдерева традиций§! или какой-то отдельной §Sтрадиции§! тратится £unity£ §Hединство§!, и его нужно всё больше по мере открытия новых §Sтрадиций§! и роста нашего государства.\n\nЧтобы принять §Sдерево традиций§!:\n\n£dot_green£ Нажмите на кнопку §SВыбрать§!.\n£dot_green£ Нажмите на кнопку §SПринять§! у желаемого дерева.\n\nДоступные §Sтрадиции§! можно просмотреть, наведя курсор на §Sдерево традиций§!."
 TUTORIAL_TRADITIONS_SELECT_TITLE: "Принятие дерева традиций"
 TUTORIAL_TRADITIONS_SELECT_DESC: "На этом экране отображаются все §Hдеревья традиций§!, доступные для нашего государства. Вы можете просмотреть любые £traditions£ §Hтрадиции§! каждого дерева, а также эффекты от их §Hпринятия§! и §Hзавершения§!.\n\n§HДеревья традиций§!, с которых стоит начать, выделены мной."
 TUTORIAL_TRADITIONS_NEW_TITLE: "Новая традиция или дерево традиций"
 TUTORIAL_TRADITIONS_NEW_DESC: "Если у нашего государства хватает £unity£ §Hединства§!, вы можете §Hвыбрать§! §Hновое дерево традиций§! или еще одну £traditions£ §Hтрадицию§! из уже выбранного дерева."
 TUTORIAL_ASCENSION_PERKS_TITLE: "Обучение: бонусы за стремление"
 TUTORIAL_ASCENSION_PERKS_DESC: "В списке §Hбонусов за стремление§! показаны §Sбонусы за стремление§!, которые мы можем разблокировать. Некоторые §Sбонусы за стремление§! могут иметь особые требования вроде наличия §Sтехнологий§! или определенного количества уже разблокированных §Sячеек бонусов за стремление§!.\n\nРазблокировка §Hячейки бонусов за стремление§! происходит при каждом принятии нами всех £traditions£ §Hтрадиций§! на одном из §Sдеревьев традиций§!."
 TUTORIAL_SPECIES_RIGHTS_TITLE: "Обучение: права расы"
 TUTORIAL_SPECIES_RIGHTS_DESC: "Список §Hправ расы§! позволяет нам вносить изменения, помимо всего прочего, в §Sгражданство§! и §Sуровень жизни§! определенной расы.\n\nПри изменении §Sправ по умолчанию§! эти права относятся ко всем £pops£ §Sпоселениям§!, для которых не установлены конкретные §Sправа расы§!, — например, к мигрантам, беженцам или другим новоприбывшим в наше государство."
 TUTORIAL_FLEET_MANAGER_TITLE: "Обучение: управление флотилиями"
 TUTORIAL_FLEET_MANAGER_DESC: "В окне §SУправление флотилиями§! можно создавать шаблоны для наших военных флотилий. Так как размер наших флотилий растет, то эти шаблоны позволяют быстро заказать новые корабли взамен утраченных."
 TUTORIAL_CLAIMS_VIEW_TITLE: "Обучение: притязания"
 TUTORIAL_CLAIMS_VIEW_DESC: "В окне §SПритязания§! можно тратить очки £influence£ §Sвлияния§!, чтобы объявлять притязания на £system£ §Sзвездные системы§!, принадлежащие другим.\n\nНаличие притязания на какую-либо §Sсистему§! дает веский §Sповод к войне§! против ее владельцев, что позволяет нам объявить войну для ее завоевания.\n\nВ войнах с многочисленными союзниками именно государство с самым большим §Sпритязанием§! на §Sсистему§! получает контроль над этой системой в случае победы в войне."
 TUTORIAL_ANOMALIES_TITLE: "Обучение: аномалии"
 TUTORIAL_ANOMALIES_DESC: "На экране §SАномалии§! перечислены все неизученные §Sаномалии§!, которые нам повстречались, а также их местонахождение. Их можно изучить с помощью £science_ship£ §Sнаучного корабля§! с £scientist£ §Sучёным§! на борту."
 TUTORIAL_GOVERNMENTVIEW_MARKET_TITLE: "Обучение: внутренний рынок"
 TUTORIAL_GOVERNMENTVIEW_MARKET_DESC: "На вкладке £market£ §SРынок§! мы можем покупать и продавать ресурсы. Сначала это только внутренний рынок, но после установления контакта с достаточным количеством государств может образоваться §Sгалактический рынок§!.\n\nРесурсы можно покупать и продавать за счет накопленной £trade£ §Sторговли§!, которая выступает валютой. Цены меняются после каждой сделки: при покупке цена повышается, а при продаже — снижается.\n\nТакже можно настроить §Sавтоматическую торговлю§! для ежемесячных сделок."
 TUTORIAL_GOVERNMENTVIEW_SLAVE_MARKET_TITLE: "Обучение: рынок рабов"
 TUTORIAL_GOVERNMENTVIEW_SLAVE_MARKET_DESC: "У всего есть цена, в том числе и у разумных существ. На §Sрынке рабов§! £pops£ §Sпоселения§! уходят с молотка, словно обычный товар, и судьба раскидывает их по разным звездным системам. После покупки ваше новое §Sпоселение§! будет автоматически доставлено в выбранную £planet£ §Sпланету§!. О доставке не беспокойтесь, ее берет на себя рынок... за определенную мзду."
 #TUTORIAL_PLANETVIEW_CORPORATE_TITLE: "Corporation View"
 #TUTORIAL_PLANETVIEW_CORPORATE_DESC: "The corporate tab allows §SMegacorporations§! to build §SBranch Offices§! on the planets of other Empires, provided they have signed the necessary paperwork. Once built, they can view and upgrade their facilities here as well. As we know, large Corporations wish only the best for their customers, events of the 23rd cycle notwithstanding."
 TUTORIAL_GOVERNMENTVIEW_POLICIES_TITLE: "Обучение: политика"
 TUTORIAL_GOVERNMENTVIEW_POLICIES_DESC: "Закладка §SПолитика§! отвечает за §Sполитику§! правительства, которая может иметь большой эффект на управление нашим государством.\n\nУ каждой §Sполитики§! есть несколько вариантов применения, но они зачастую ограничены доступными технологиями и нашими §Sпринципами§!."
 TRADE_VIEW_DESC: "По мере роста нашего государства §Sторговля§! между нашими £planet£ §Sпланетами§! начинает играть все большую роль в нашей экономике. §SКосмические базы§!, имеющие §Sторговые узлы§!, собирают §Sторговлю§! в своей £system£ §Sсистеме§!, а затем направляют ее в §Sстолицу§! для преобразования в £energy£ §Sэнергокредиты§!.\n\nЧем больше §Sторговых узлов§!, тем больше §Sторговли§! могут собирать ваши §Sкосмические базы§!, в том числе и с соседних систем. Богатые торговые пути могут привлекать §Sпиратов§!, хотя для их нейтрализации можно использовать §Sпатрулирующие§! флотилии и §Sзащитные модули§! на §Sкосмических базах§!. Особенно эффективны в этом отношении §Sангарные модули§!."
 PLANETVIEW_CORPORATE_DESC: "Закладка «Корпорации» позволяет §Sмегакорпорации§! строить филиалы на £planet£ §Sпланетах§! других государств, при условии что они подписали необходимые документы. После завершения строительства они также могут просматривать и улучшать здесь свои объекты. Как мы знаем, крупные корпорации желают своим клиентам только всего самого лучшего, несмотря на события 23-го цикла."
 TUTORIAL_FEDERATION_VIEW_TITLE: "Обучение: федерация"
 TUTORIAL_FEDERATION_VIEW_DESC: "Это §Hэкран федерации§!. Наша £federation£ §Sфедерация§! будет становиться сильнее, пока ее участники демонстрируют §Sсплоченность§!. Вступление в федерацию нового участника вынуждает ее потерять часть накопленной сплоченности.\n\nДополнительную сплоченность можно получить, если направить в федерацию £envoy£ §Sпослов§!.\n\nПо мере развития федерации можно §Sразблокировать бонусы§!, эффект которых распространяется на всех ее участников."
 TUTORIAL_FEDERATION_VIEW_ENVOYS_TITLE: "Обучение: послы федерации"
 TUTORIAL_FEDERATION_VIEW_ENVOYS_DESC: "Направляя £envoy£ §Sпослов§! в £federation£ §Sфедерацию§!, можно повысить §Sсплоченность§! ее участников. Не забывайте, что количество ваших послов ограничено. Позднее направленным в федерацию послам можно будет поручить другие §Sдипломатические действия§!."
 TUTORIAL_FEDERATION_VIEW_MEMBERS_TITLE: "Обучение: члены федерации"
 TUTORIAL_FEDERATION_VIEW_MEMBERS_DESC: "Это экран §Hчленов федерации§!. Он показывает, насколько сильны ее §Sучастники§! в разных областях, сколько £envoy£ §Sпослов§! каждый из них направил и какие из их §Sпринципов§! вредят общей §Sсплоченности§!."
 TUTORIAL_FEDERATION_VIEW_NAVY_TITLE: "Флот федерации"
 TUTORIAL_FEDERATION_VIEW_NAVY_DESC: "Размер §Hфлота федерации§! зависит от §Sвместимости флота§!, предоставляемой его членами. Флотом федерации командует ее §Sпрезидент§!. Все члены £federation£ §Sфедерации§! могут строить корабли, чтобы добавить их в общий флот."
 TUTORIAL_FEDERATION_VIEW_LAWS_TITLE: "Обучение: законы федерации"
 TUTORIAL_FEDERATION_VIEW_LAWS_DESC: "Любой из членов федерации может внести предложение об изменении ее §Hзаконов§!. Если закон не будет принят, то £federation£ §Sфедерация§! потеряет часть §Sсплоченности§!.\n\nНекоторые законы недоступны, и для их принятия требуется увеличить §Sцентрализацию§!. Чтобы получить доступ к более высокой централизации, федерация должна §Sповысить свой уровень§!.\n\nНо будьте осторожны, с увеличением централизации снизится сплоченность."
 TUTORIAL_GALACTIC_COMMUNITY_TITLE: "Обучение: Галактическое сообщество"
 TUTORIAL_GALACTIC_COMMUNITY_DESC: "Добро пожаловать в §Hгалактическое сообщество§!! Здесь дипломаты со всей галактики встречаются, чтобы обсудить галактические законы и проголосовать за §Sрезолюции§!.\n\nВы можете поддержать §Sрезолюции§! в §Sочереди§!, тем самым добавляя к ним ваш §Sдипломатический вес§!.\n\nНабравшая самую большую поддержку выносится на §Sрассмотрение сената§!, после чего члены Галактического сообщества голосуют за или против того, чтобы придать резолюции силу §Sгалактического закона§!.\n\nОбратите внимание на §Sгалактический фокус§!: он указывает общую цель для всех членов сообщества.\n\nНаконец, здесь можно найти список всех членов галактического совета и посмотреть §Sгалактические модификаторы§! от уже принятых резолюций."
 TUTORIAL_GALACTIC_COMMUNITY_ENVOYS_TITLE: "Обучение: послы"
 TUTORIAL_GALACTIC_COMMUNITY_ENVOYS_DESC: "£envoy£ §SПослов§! можно направить в Галактическое сообщество, чтобы увеличить ваш §Sдипломатический вес§!. Позднее направленным в Галактическое сообщество послам можно будет поручить другие §Sдипломатические действия§!."
 TUTORIAL_GALACTIC_COMMUNITY_SENATE_TITLE: "Обучение: заседание сената"
 TUTORIAL_GALACTIC_COMMUNITY_SENATE_DESC: "Во время §Hзаседаний сената§! Галактическое сообщество голосует за или против резолюций с наибольшей поддержкой в §Sочереди§!. Как член Галактического сообщества вы можете высказаться §Sза, против или воздержаться§!. Если резолюция будет принята, она получит статус §Sгалактического закона§! и повлияет на всех членов Галактического сообщества. Отклонённые резолюции какое-то время нельзя будет предложить для повторного рассмотрения.\n\nНе воздержавшиеся в ходе голосования государства §Sулучшат отношения§! с государствами, которые проголосовали так же, и ухудшат их с государствами, которые проголосовали иначе.\n\nЕсли у вас есть §Sодолжения§! со стороны других государств, их можно использовать, чтобы увеличить ваш §Sдипломатический вес§! в ходе §Sзаседания сената§!."
 TUTORIAL_GALACTIC_COMMUNITY_RESOLUTIONS_TITLE: "Обучение: резолюции"
 TUTORIAL_GALACTIC_COMMUNITY_RESOLUTIONS_DESC: "На экране §Hрезолюций§! показаны все действующие резолюции. Вы можете §Sпредложить новую резолюцию§!, выбрав ее в цепочке и расплатившись £influence£ влиянием.\n\nВы можете предложить только первую непринятую §Sрезолюцию§! в цепочке, так как для принятия более серьезных решений нужно сперва заложить основы. Будьте готовы, что ее поддержат не все.\n\nЕсли §Sрезолюция§! будет принята, следующую в цепочке можно будет предложить только через несколько лет."
 TUTORIAL_GALACTIC_COMMUNITY_COUNCIL_TITLE: "Галактический совет"
 TUTORIAL_GALACTIC_COMMUNITY_COUNCIL_DESC: "Галактическое сообщество высказалось в пользу создания §Hгалактического совета§!. Скоро пройдут §Sвыборы§!, в ходе которых §Sместа в совете§! получат государства с наибольшим дипломатическим весом. Члены совета обладают большим дипломатическим весом, чем обычные члены галактического сообщества, и могут поставить вопрос на голосование в сенате в обход очереди как §Sчрезвычайную резолюцию§!.\n\nПриняв резолюцию о предоставлении совету дополнительных полномочий, можно открыть §Sправо вето§! для его членов. Кроме того, члены совета получают доступ к §Sособым резолюциям§!."
 TUTORIAL_EMPIRE_SPRAWL_TITLE: "Обучение: $EMPIRE_SIZE$"
 TUTORIAL_EMPIRE_SPRAWL_DESC: "£empire_sprawl£§H$EMPIRE_SIZE$§! — это показатель площади вашего государства с учетом контролируемых вами £system£ §Sсистем§!, £colony£ §Sколоний§!, £district£ §Sрайонов§! и общего населения.\n\nБольшой размер государства увеличивает §Sадминистративную нагрузку§! на ваше государство и повышает стоимость §Sтехнологий§!, £traditions£ §Sтрадиций§!, £leader£ §Sлидеров§! и §Sуказов§!"
 TUTORIAL_FIRSTCONTACT_VIEW_TITLE: "Обучение: назначение посла"
 TUTORIAL_FIRSTCONTACT_VIEW_DESC: "Мы вступили в контакт с новой сущностью. Возможно, это §Sкосмическое существо§! или другое §Sгосударство§!. Мы сможем больше узнать о них, наладив §Hпервый контакт§!.\n\nНам нужно назначить £envoy£ §Sпосла§! на выполнение этого задания. Он попытается наладить связь с новой сущностью и расшифровать их язык при наличии оного.\n\nЧтобы назначить §Sпосла§!:\n\n£dot_green£ Щёлкните по портрету в окне §Sпервого контакта§!.\n£dot_green£ Выберите одного из доступных §Sпослов§!."
 TUTORIAL_CRISIS_VIEW_TITLE: "Обучение: стать кризисом"
 TUTORIAL_CRISIS_VIEW_DESC: "Мы на пути к тому, чтобы §Sстать кризисом§!. Это откроет доступ к особым бонусам, которые позволят нам стать более грозной силой в галактике.\n\nОкно §Sкризиса§! показывает наши цели — особые действия, за которые нам будет начисляться §S[GetCrisisResource&nom]§!. [GetCrisisResource&nom] открывает §Sуровни кризиса§! и §Sбонусы§!, необходимые нам, чтобы обрушить на галактику весь наш потенциал.\n\nПо мере того как наше государство становится всё большей угрозой для соседей, Галактическое сообщество может сплотиться и объявить нас §Sугрозой галактике§!."
 TUTORIAL_CRISIS_VIEW_LEVEL1_TITLE: "Обучение: уровни кризиса"
 TUTORIAL_CRISIS_VIEW_LEVEL1_DESC: "На своем пути к тому, чтобы §Sстать кризисом§! мы будем выполнять определенные требования и открывать новые уровни. Каждый уровень несет с собой различные бонусы, в частности §Sбонусы «[GetCrisisResource&nom]»§! и особые §Sкорабли§!.\n\nПо достижении §S5 уровня§! или если Галактическое сообщество объявит нас кризисом, мы будем противостоять всей галактике. Одновременно с этим мы окажемся в состоянии §Sтотальной войны§! с Галактическим сообществом."
 TUTORIAL_DIPLOMACY_VIEW_BUILDING_SPYNETWORK_TITLE: "Обучение: агентурные сети"
 TUTORIAL_DIPLOMACY_VIEW_BUILDING_SPYNETWORK_DESC: "Один из наших £envoy£ §Sпослов§! создает §Sагентурную сеть§! в этом государстве.\n\n§SУровень внедрения§! сети со временем будет расти в зависимости от текущей §Sвеличины агентурной сети§! и £empire_sprawl£ §Sразмера§! целевого государства. С ростом агентурной сети мы будем получать больше §Sразведданных§! о цели. Кроме того, мы сможем проводить на ее территории §Sоперации§!, доступные во §Sвкладке «Шпионаж»§!.\n\nБез назначенного посла агентурная сеть начнет §Pослабевать§!, и то же самое случится, если ее существование будет раскрыто во время тайных §Sопераций§!."
 TUTORIAL_ESPIONAGE_VIEW_TITLE: "Обучение: шпионаж"
 TUTORIAL_ESPIONAGE_VIEW_DESC: "Во вкладке §S«Шпионаж»§! показано, кто из наших £envoy£ §Sпослов§! создает агентурные сети в других государствах. Здесь вы можете взглянуть на §Sжурналы разведки§!, а также просмотреть и начать §Sоперации§!.\n\nОперации можно проводить в тех государствах, где у нас есть §Sпослы§!, управляющие агентурной сетью. Операции можно начинать только после того, как агентурная сеть достигнет определенного уровня."
 TUTORIAL_ESPIONAGE_VIEW_OPERATIONS_TITLE: "Обучение: шпионские операции"
 TUTORIAL_ESPIONAGE_VIEW_OPERATIONS_DESC: "Теперь, когда наша агентурная сеть достигла достаточно высокого уровня, мы можем проводить §Sоперации§! против этого государства. Операции разбиты на категории, и разные типы операций приводят к последствиям, отличающимся по уровню нанесенного ущерба.\n\nСуществуют следующие категории операций: §S$op_cat_subterfuge$§!, §S$op_cat_manipulation$§!, §S$op_cat_sabotage$§! и §S$op_cat_provocation$§!. Операции категорий «Саботаж» и «Провокация» обычно наносят больше вреда и влекут за собой более суровые §Sдипломатические штрафы§!, если о нашей причастности станет известно."
 TUTORIAL_ESPIONAGE_VIEW_ASSIGN_ASSET_TITLE: "Обучение: назначение активов"
 TUTORIAL_ESPIONAGE_VIEW_ASSIGN_ASSET_DESC: "§SАктивы§! — это ценные агенты и артефакты, которые могут по-разному сказаться на нашей шпионской деятельности. Они работают в пределах агентурной сети, и их можно приписывать к операциям. Приписанные к операции активы могут открыть новые возможности или помочь выкрутиться из трудного положения.\n\nМы можем получать активы по событиям или при помощи операции §S«Получить актив»§!. Если агентурная сеть перестает существовать, то пропадают и все активы."
 TUTORIAL_MEGASTRUCTURE_CONSTRUCTION_TITLE: "Обучение: мегасооружения"
 TUTORIAL_MEGASTRUCTURE_CONSTRUCTION_DESC: "В этом списке можно выбрать £megastructure£ §Sмегасооружение§! для этой £system£ §Sсистемы§!. Некоторые проекты становятся доступными только после изучения соответствующей §Sтехнологии§!.\n\nМои подпроцессы галактических амбиций полностью активированы. Рекомендую не упускать возможности произвести впечатление на галактику."
 TUTORIAL_ORBITAL_RING_TITLE: "Обучение: орбитальное кольцо"
 TUTORIAL_ORBITAL_RING_DESC: "§SОрбитальные кольца§! — это огромные £megastructure£ §Sмегасооружения§!, выстроенные по орбите £planet£ §Sпланеты§!. Они являются удобным мостом между космосом и планетой и обеспечивают места для верфей, оборонительных сооружений и ресурсных складов.\n\nВ окне орбитального кольца можно добавлять и удалять £building£ §Sсооружения§! и §Sмодули§!, а также повышать уровень кольца. С ростом уровня растет количество доступных ячеек для строительства. Уровни ограничены инфраструктурой планеты."
 TUTORIAL_DIPLOMACY_CONFIGURABLE_TERMS_TITLE: "Обучение: настраиваемые условия"
 TUTORIAL_DIPLOMACY_CONFIGURABLE_TERMS_DESC: "В этом окне мы можем выбрать §Sшаблон§! нашего соглашения и настраивать отдельные условия. Каждый шаблон включает в себя набор прав и обязанностей подданного и сюзерена.\n\nМы можем вносить изменения в перечень §Sусловий§!, что повлияет на §Sверность§! другого государства и сделает соглашение более приемлемым для обеих сторон."
 TUTORIAL_AGREEMENTS_TITLE: "Обучение: сведения о соглашениях"
 TUTORIAL_AGREEMENTS_DESC: "Окно §Sсоглашений§! позволяет рассмотреть наши соглашения между подданным и сюзереном. В этом окне можно отслеживать §Sверность§!, управлять §Sвладениями§! и §Sторговлей§! и обсуждать §Sусловия§! существующих соглашений. Мы также можем полностью разорвать соглашение, если оно больше не отвечает нашим целям."
 TUTORIAL_AGREEMENTS_NO_OVERLORD_TITLE: "$TUTORIAL_AGREEMENTS_TITLE$"
 TUTORIAL_AGREEMENTS_NO_OVERLORD_DESC: "$TUTORIAL_AGREEMENTS_DESC$"
 TUTORIAL_AGREEMENTS_HAS_OVERLORD_TITLE: "$TUTORIAL_AGREEMENTS_TITLE$"
 TUTORIAL_AGREEMENTS_HAS_OVERLORD_DESC: "$TUTORIAL_AGREEMENTS_DESC$\n\nГосударства-подданные могут стать §Sспециалистами§!. Специализация дает значительные преимущества в производстве ресурсов или военных возможностях, но при этом государство сильно потеряет в других аспектах.\n\nГосударства-специалисты обладают большей §Sверностью§!. Пока их верность остается на должном уровне, государства-специалисты получают опыт и новые уровни выбранной специализации."
 TUTORIAL_HOLDINGS_TITLE: "Обучение: владения"
 TUTORIAL_HOLDINGS_DESC_SHARED: "Окно §Sвладений§! позволяет увидеть все владения на этой £planet£ §Sпланете§!. Здесь государства могут строить уникальные £building£ §Sсооружения§! в столицах и £colony£ §Sколониях§! друг друга. Назначением этих сооружений может быть дипломатия, разведка или производство ресурсов."
 TUTORIAL_HOLDINGS_DESC_MEGA_CORP: "Мегакорпорации могут строить §Sфилиалы§! на мирах других государств при наличии дипломатических соглашений. Как мы знаем, крупные корпорации желают своим клиентам только лучшего, несмотря на события 23-го цикла!"
 TUTORIAL_HOLDINGS_DESC_OVERLORD: "С помощью владений §Sсюзерены§! могут укреплять свою власть над §Sподданными§!. Многие из этих владений влияют на верность, а некоторые из них уникальны для государств-специалистов. Все улучшения также проводятся в этом окне."
 TUTORIAL_HOLDINGS_NO_MEGA_CORP_NO_OVERLORD_TITLE: "$TUTORIAL_HOLDINGS_TITLE$"
 TUTORIAL_HOLDINGS_NO_MEGA_CORP_NO_OVERLORD_DESC: "$TUTORIAL_HOLDINGS_DESC_SHARED$"
 TUTORIAL_HOLDINGS_NO_MEGA_CORP_HAS_OVERLORD_TITLE: "$TUTORIAL_HOLDINGS_TITLE$"
 TUTORIAL_HOLDINGS_NO_MEGA_CORP_HAS_OVERLORD_DESC: "$TUTORIAL_HOLDINGS_DESC_SHARED$\n\n$TUTORIAL_HOLDINGS_DESC_OVERLORD$"
 TUTORIAL_HOLDINGS_HAS_MEGA_CORP_NO_OVERLORD_TITLE: "$TUTORIAL_HOLDINGS_TITLE$"
 TUTORIAL_HOLDINGS_HAS_MEGA_CORP_NO_OVERLORD_DESC: "$TUTORIAL_HOLDINGS_DESC_SHARED$\n\n$TUTORIAL_HOLDINGS_DESC_MEGA_CORP$"
 TUTORIAL_HOLDINGS_HAS_MEGA_CORP_HAS_OVERLORD_TITLE: "$TUTORIAL_HOLDINGS_TITLE$"
 TUTORIAL_HOLDINGS_HAS_MEGA_CORP_HAS_OVERLORD_DESC: "$TUTORIAL_HOLDINGS_DESC_SHARED$\n\n$TUTORIAL_HOLDINGS_DESC_MEGA_CORP$\n\n$TUTORIAL_HOLDINGS_DESC_OVERLORD$"
 TUTORIAL_PLANETVIEW_COLONY_GOV_TITLE: "Обучение: нанять губернатора"
 TUTORIAL_PLANETVIEW_COLONY_GOV_DESC: "Чтобы помочь нашей новой £colony£ §Sколонии§!, рекомендую нанять планетарного §Sгубернатора§!, который займется решением местных задач.\n\nБольшинство наших миров прекрасно обойдется и без него — им будет достаточно бонуса от нашей формы правления. Но настоящие счастливчики — это все-таки обитатели £planet£ §Sпланет§! под губернаторской властью!\n\nГубернаторы оказывают самое разное влияние на планеты, которыми управляют, в основном положительное. Эти эффекты зависят от §Sчерт§! §Sгубернатора§! и уровня его навыков."
 TUTORIAL_ELECTION_VIEW_TITLE: "Обучение: выборы"
 TUTORIAL_ELECTION_VIEW_DESC: "В окне §Sвыборов§! мы решаем, кто станет следующим правителем нашего государства.\n\n[TutorialElectionViewTypeSpecific]"
 TUTORIAL_ELECTION_VIEW_DEMOCRACY_NO: "Кандидаты на должность правителя выбираются из числа текущих £leader£ §Sлидеров§!. Если у вас хватает ресурсов, вы сами можете выбрать победителя."
 TUTORIAL_ELECTION_VIEW_DEMOCRACY_YES: "Кандидаты на должность правителя выбираются из числа текущих £leader£ §Sлидеров§!. Их можно продвигать, тем самым обеспечивая поддержку — разумеется, исключительно демократическими методами."
 TUTORIAL_EDICTS_AND_POLICIES_TITLE: "Обучение: политика и указы"
 TUTORIAL_EDICTS_AND_POLICIES_DESC: "Окно §Sполитики§! отображает §Sполитику§! правительства, а также позволяет тратить определенные ресурсы на принятие §Sуказов§!, охватывающих все государство.\n\nУ каждой §Sполитики§! обычно есть несколько вариантов применения, зачастую ограниченных доступными технологиями или нашими §Sпринципами§!.\n\nУказы требуют ежемесячного содержания, которое покрывают §H$EDICT_FUND$§!, затраты £unity£ §Sединства§!, а иногда и другие ресурсы."
 TUTORIAL_COUNCIL_VIEW_TITLE: "Обучение: совет и программы"
 TUTORIAL_COUNCIL_VIEW_DESC: "В окне §Sсовета§! можно назначать £leader£ §Sлидеров§!, которые поведут нас в светлое будущее. Их характеры и §Sчерты§! будут влиять на наше государство со всеми сопутствующими плюсами и минусами. Чтобы советники сосредоточились на какой-то определенной области, можно запустить §Sпрограмму§!.\n\n§SСоветников§! можно назначать или заменять в любой момент, при этом они могут выполнять и собственные задачи, например управлять £science_ship£ §Sнаучным кораблём§!. Единственное исключение — наш правитель.[TutorialCouncilViewDlcSpecific]На выполнение §Sпрограммы§! влияют уровни советников, размер государства, а иногда и принципы членов совета. Завершённую программу можно активировать, тем самым получив усиленный эффект от неё на какое-то время и освободив место для новой."
 TUTORIAL_COUNCIL_VIEW_PARAGON_NO: "\n\n"
 TUTORIAL_COUNCIL_VIEW_PARAGON_YES: "\n\nЧтобы разблокировать новые §Sместа в совете§!, потребуется, во-первых, соответствующая §Sгражданская модель§!, а во-вторых — выполнение определенной программы.\n\n"
 TUTORIAL_ASSIGN_COUNCILOR_TITLE: "Обучение: черты советника"
 TUTORIAL_ASSIGN_COUNCILOR_DESC: "Некоторые £leader£ §Sлидеры§! обладают §Sчертами личности советника§!. Эти личности зачастую сильны и влиятельны, но их качества проявляются только при заседании в совете.\n\nКаждое §Sместо в совете§! сопряжено с присущим ему эффектом. Чем выше уровень навыков назначенного лидера, тем сильнее этот эффект."
 TUTORIAL_LEADER_LEVEL_UP_TITLE: "Обучение: навык лидера"
 TUTORIAL_LEADER_LEVEL_UP_DESC: "Один из наших £leader£ §Sлидеров§! достиг нового уровня §Sнавыка§!! Теперь его бонусы станут ощутимее, а сам лидер получит новую черту.[TutorialLeaderLevelUpDlcSpecific]Чтобы просмотреть доступных §Sлидеров§!:\n\n£dot_green£ Нажмите на кнопку §S$topbar_button_leaders_name$§! на панели слева или клавишу §SF5§!\n\n$tttt$$tt$£leaders£\n\nПо мере старения §Sлидеры§! могут получать отрицательные черты, поэтому вполне естественно иногда заменять их."
 TUTORIAL_LEADER_LEVEL_UP_PARAGON_NO: "\n\n"
 TUTORIAL_LEADER_LEVEL_UP_PARAGON_YES: "\n\nЧтобы направить развитие £leader£ §Sлидера§!, мы можем выбирать его §Sчерты§!. Выбор можно отложить на потом — получению уровней это не помешает. Через несколько уровней станет доступен §Sподкласс§!, который даёт дополнительные бонусы и влияет на доступные в дальнейшем черты.\n\nЧерты бывают самые разнообразные: какие-то можно улучшать, какие-то исключают друг друга, а какие-то дают положительные и отрицательные эффекты одновременно. Их все объединяет то, что они, как правило, постоянны.\n\n"
 #############################
 #Advisor Events
 #############################
 advisor.1.name: "Советник подключен"
 advisor.1.desc_01: "Здравствуйте, господин Президент.\n\nЯ — ВИР, прототип искусственного разума. Я буду помогать вам и давать советы, в то время как мы ищем свое место среди звезд.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_02: "Здравствуйте, госпожа Президент.\n\nЯ — ВИР, прототип искусственного разума. Я буду помогать вам и давать советы, в то время как мы ищем свое место среди звезд.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_03: "Здравствуйте, Верховный Комиссар.\n\nЯ — ВИР, прототип искусственного разума. Я создан, чтобы предоставить вам советы и помощь на пути поиска нашей судьбы среди звезд.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_04: "Здравствуйте, Исполнитель.\n\nЯ — ВИР, прототип искусственного разума и ваш покорный слуга. Я буду помогать вам и давать советы, в то время как вы ведете наш народ навстречу непознанному.\n\n$advisor.1.desc_filler$"
 #advisor.1.desc_05: "Good day, Lord Protector.\n\nI am VIR, a prototype synthetic intelligence and your humble servant. My role is to provide you with advice and counsel as you lead our empire into the great unknown.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_06: "Здравствуйте, Управляющий.\n\nЯ — ВИР, прототип искусственного разума. Штаб-квартира корпорации активировала меня, чтобы я мог помочь вам в наших дальнейших поисках новых галактических £market£ §Sрынков§!.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_07: "Мир вам, Ваше Императорское Величество.\n\nЯ — ВИР, прототип искусственного разума. Я буду помогать вам и давать советы, в то время как вы ведете наш народ навстречу непознанному.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_08: "Мир вам, Премьер-министр.\n\nЯ — ВИР, прототип искусственного разума. Моя задача — оказывать помощь и давать вам советы, в то время как мы впервые в истории выходим за пределы нашей планеты навстречу опасностям.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_09: "Мир вам, Координатор.\n\nЯ — ВИР, прототип искусственного разума. Моя задача — оказывать помощь и давать вам советы, в то время как мы впервые в истории выходим за пределы нашей планеты навстречу опасностям.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_10: "Мир вам, Ваше Величество.\n\nЯ — ВИР, прототип искусственного разума. Моя задача — оказывать помощь и давать вам советы, в то время как мы впервые в истории выходим за пределы нашей планеты навстречу опасностям.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_11: "Мир вам, Светлый протектор.\n\nЯ — ВИР, прототип искусственного разума. Моя задача — оказывать помощь и давать вам советы, в то время как мы впервые в истории выходим за пределы нашей планеты навстречу опасностям.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_12: "Приветствую вас, Канцлер.\n\nЯ — ВИР, прототип искусственного разума и ваш личный советник, созданный лучшими умами нашего государства. Я буду выполнять свои обязанности с предельной эффективностью.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_13: "Приветствую вас, Директор.\n\nЯ — ВИР, прототип искусственного разума и ваш личный советник, созданный лучшими умами нашего государства. Я буду выполнять свои обязанности с предельной эффективностью.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_14: "Приветствую вас, Гегемон.\n\nЯ — ВИР, прототип искусственного разума и ваш личный советник, созданный лучшими умами нашего государства. Я буду выполнять свои обязанности с предельной эффективностью.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_15: "Приветствую вас, Примас.\n\nЯ — ВИР, прототип искусственного разума, ваш личный советник, созданный лучшими умами нашего государства. Я буду выполнять свои обязанности с предельной эффективностью.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_16: "Приветствую вас, Примарх.\n\nЯ — ВИР, прототип искусственного разума, ваш личный советник, созданный лучшими умами нашего государства. Я буду выполнять свои обязанности с предельной эффективностью.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_17: "Приветствую вас, Блюститель.\n\nЯ — ВИР, прототип искусственного разума, ваш личный советник, созданный лучшими умами нашего государства. Я буду выполнять свои обязанности с предельной эффективностью.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_18: "Приветствую вас, Первый спикер.\n\nЯ — ВИР, прототип искусственного разума, ваш личный советник, созданный лучшими умами нашего государства. Я буду выполнять свои обязанности с предельной эффективностью.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_19: "Приветствую вас, Председатель.\n\nЯ — ВИР, прототип искусственного разума, ваш личный советник, созданный лучшими умами нашего государства. Я буду выполнять свои обязанности с предельной эффективностью.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_20: "Приветствую вас, Председательница.\n\nЯ — ВИР, прототип искусственного разума, ваш личный советник, созданный лучшими умами нашего государства. Я буду выполнять свои обязанности с предельной эффективностью.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_21: "Добро пожаловать, Консул.\n\nЯ — ВИР, прототип искусственного разума, созданный военными в строжайшей тайне. Верховное командование активировало меня, чтобы я служил вашим советником и стратегическим аналитиком.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_22: "Добро пожаловать, Архон.\n\nЯ — ВИР, прототип искусственного разума, созданный военными в строжайшей тайне. Верховное командование активировало меня, чтобы я служил вашим советником и стратегическим аналитиком.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_23: "Добро пожаловать, Генерал-комиссар.\n\nЯ — ВИР, прототип искусственного разума, созданный военными в строжайшей тайне. Верховное командование активировало меня, чтобы я служил вашим советником и стратегическим аналитиком.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_24: "Добро пожаловать, Повелитель.\n\nЯ — ВИР, прототип искусственного разума, созданный военными в строжайшей тайне. Верховное командование активировало меня, чтобы я служил вашим советником и стратегическим аналитиком.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_25: "Добро пожаловать, Повелительница.\n\nЯ — ВИР, прототип искусственного разума, созданный военными в строжайшей тайне. Верховное командование активировало меня, чтобы я служил вашим советником и стратегическим аналитиком.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_26: "Добро пожаловать, Верховный главнокомандующий.\n\nЯ — ВИР, прототип искусственного разума, созданный военными в строжайшей тайне. Верховное командование активировало меня, чтобы я служил вашим советником и стратегическим аналитиком.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_27: "Добро пожаловать, Стратег.\n\nЯ — ВИР, прототип искусственного разума, созданный военными в строжайшей тайне. Верховное командование активировало меня, чтобы я служил вашим советником и стратегическим аналитиком.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_28: "Добро пожаловать, Военачальник.\n\nЯ — ВИР, прототип искусственного разума, созданный военными в строжайшей тайне. Верховное командование активировало меня, чтобы я служил вашим советником и стратегическим аналитиком.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_29: "Добро пожаловать, Вещатель клана.\n\nЯ — ВИР, прототип искусственного разума, созданный военными в строжайшей тайне. Верховное командование активировало меня, чтобы я служил вашим советником и стратегическим аналитиком.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_30: "Благослови вас Творец, Ваше Преосвященство.\n\nЯ — ВИР, прототип искусственного разума. Наше духовенство предписало мне стать вашим верным слугой и советником, чтобы я помог вам продолжить божественную дорогу к звездам.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_31: "Приветствую вас, [root.GetBloodCourtRulerTitle].\n\nЯ — ВИР, прототип искусственного разума, созданный военными в строжайшей тайне. Имперский двор активировал меня, чтобы я служил вам советником и стратегическим аналитиком.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_32: "Приветствую вас, [root.GetPurityOrderRulerTitle].\n\n$advisor.1.desc_keenminds$\n\n$advisor.1.desc_filler$"
 advisor.1.desc_33: "Приветствую вас, [root.GetPurificationCommitteeRulerTitle].\n\n$advisor.1.desc_keenminds$\n\n$advisor.1.desc_filler$"
 advisor.1.desc_34: "Приветствую вас, $RT_OLIGARCH$.\n\n$advisor.1.desc_honortoserve$\n\n$advisor.1.desc_filler$"
 advisor.1.desc_35: "Приветствую вас, $RT_DEFENSIVE_UNION$.\n\n$advisor.1.desc_honortoserve$\n\n$advisor.1.desc_filler$"
 advisor.1.desc_36: "Приветствую вас, $RT_DIMENSIONAL_COVENANT$.\n\n$advisor.1.desc_honortoserve$\n\n$advisor.1.desc_filler$"
 advisor.1.desc_keenminds: "Я — ВИР, прототип искусственного разума и ваш личный советник, созданный лучшими умами нашего государства. Я буду выполнять свои обязанности с предельной эффективностью."
 advisor.1.desc_honortoserve: "Я — ВИР, прототип искусственного разума, созданный военными в строжайшей тайне. Я буду служить вам советником и стратегическим аналитиком."
 advisor.1.desc_filler: "Вы можете в любое время поменять уровень обучения в меню §H«Настройки»§!."
 advisor.1.a: "Расскажи обо всем. §G(ПОЛНОЕ ОБУЧЕНИЕ)§!"
 advisor.1.b: "Советы нужны. §Y(ТОЛЬКО ПОДСКАЗКИ)§!"
 advisor.1.c: "Отключите это. §R(БЕЗ ОБУЧЕНИЯ)§!"
 full_tutorial: "Подробное объяснение элементов интерфейса и миссий для изучения основ игровой механики.\n\nРекомендуем включить этот режим, если вы впервые запустили игру."
 tips_only: "Осваивая элементы игровой §Sмеханики§!, вы время от времени будете получать подсказки и полезные советы.\n\nДля начинающих и опытных игроков."
 no_tutorial: "Без обучения и подсказок.\n\nТолько для самых опытных игроков."
 recycle_vir: "§RУтилизация§! банков оперативной памяти ВИР:\n£minerals£ §G+2§!\n\n\n"
 advisor.2.name: "Обучение: журнал"
 advisor.2.desc: "Строительство межзвездной империи — непростая задача.\n\nЧтобы её облегчить, я буду давать вам обучающие §Sзадания§!, которые станут нашими первыми шагами на пути к становлению мощного государства.\n\nЧтобы просмотреть §Sзадания§!:\n\n£dot_green£Нажмите на кнопку §SЖурнал§! на панели слева или клавишу §SF1§!.\n\n$tttt$$tt$£situation_log£\n"
 advisor.2.a: "Понятно."
 advisor.3.name: "Режим советов"
 advisor.3.desc: "Хорошо. Я буду давать советы и объяснять основные принципы различных функций по мере того, как вы будете осваивать их."
 advisor.10.name: "Обучение: аномалии"
 advisor.10.desc: "Мы обнаружили §Sаномалию§!!\n\nИсследуя миры, наши £science_ship£ §Sнаучные корабли§! будут время от времени подобные находки.\n\n£scientist£ §SУченые§! могут заняться изучением §Sаномалий§!, но убедитесь, что их навыки достаточно высоки!\n\nНайденные, но еще не исследованные §Sаномалии§! можно просмотреть в §Sжурнале§! на вкладке §S«Аномалии»§!. Если на £planet£ §Sпланете§! обнаружена аномалия, ее необходимо изучить до того, как приступать к колонизации или любой другой разработке ресурсов."
 advisor.15.name: "Обучение: колонизация"
 advisor.15.desc: "Один из наших £science_ship£ §Sнаучных кораблей§! только что изучил мир, идеально подходящий на роль нашей первой £colony£ §Sколонии§!. Он относится к тому же §Sклассу планет§!, что и наш родной мир, поэтому поселенцам там будет комфортно.\n\nПрежде чем колонизировать этот мир, нужно расширить наши границы.\n\nВыбрав £construction_ship£ §Sстроительный корабль§!:\n\n£dot_green£ Щёлкните правой кнопкой мыши по изученной £system£§Sсистеме§! с потенциальной колонией.\n£dot_green£ Выберите §S[GetBuildGrowCap] космическую базу§!.\n\n$tttt$$ttt$£colonizable£\n\nКогда §Sсистема§! станет нашей, мы сможем начать колонизацию."
 advisor.17.name: "Обучение: первая колония"
 advisor.17.desc: "Поздравляем с колонизацией вашего первого мира! Наши колонисты уже приступили к строительству своего первого поселения, однако пройдет время, прежде чем они станут полностью независимыми.\n\n£colony£ §SКолония§! будет расходовать наши ресурсы до тех пор, пока не построит первый поселок, поэтому старайтесь не осваивать сразу слишком много £planet£ §Sпланет§!."
 advisor.20.name: "Обучение: отрицательные доходы"
 advisor.20.desc: "Мы теряем £energy£ энергокредиты с пугающей быстротой. Бюджет предыдущего месяца — то еще мрачное чтиво.\n\nДефицит бюджета чаще всего возникает из-за резкого роста расходов на содержание. В этом случае нам следует избавиться от некоторых кораблей, армий и станций."
 #advisor.27.name: "First Contact"
 #advisor.27.desc_01: "We have made first contact with an alien empire! These hideous creatures appear to have mastered space flight, just as we have. They could pose a significant threat.\n\nTheir empire will now be listed in the §SEmpires§! tab of the §SGalaxy§! screen. From there we may initiate diplomatic contact with them."
 #advisor.27.desc_02: "We have made first contact with an alien empire! These fascinating beings appear to have mastered space flight, just as we have. We should strive to learn more about them.\n\nTheir empire will now be listed in the §SContacts§! screen. From there we may initiate diplomatic contact with them."
 #advisor.27.desc_03: "We have made first contact with an alien empire! They appear to have mastered space flight, just as we have. I recommend a healthy degree of caution until we learn their intentions.\n\nTheir empire will now be listed in the §SEmpires§! tab of the §SGalaxy§! screen. From there we may initiate diplomatic contact with them."
 #advisor.28.name: "Fallen Empire"
 #advisor.28.desc: "We have encountered an ancient and highly advanced civilization! Fortunately for us, they appear to be in decline and it is doubtful whether they even fully understand their own technology anymore.\n\nThey will likely keep to themselves unless antagonized, and we should steer clear of their space - at least until we have reached technological parity."
 #############################
 #Tutorial Events
 #############################
 tutorial.1.name: "Обучение: карта галактики"
 tutorial.1.desc: "§HКарта галактики§! предоставляет стратегический обзор звёзд. Пользуйтесь ею, чтобы планировать, расширяться, направлять флотилии и следить за границами.\n\nЧтобы открыть §Sкарту галактики§!:\n\n£dot_green£ Щёлкните по значку §Hгалактики§! внизу экрана или нажмите клавишу §HM§!.\n\n\n$tttt$$tt$£galaxy_view£\n\n"
 tutorial.2.name: "Обучение: система изучена"
 tutorial.2.desc: "Превосходно!\n\nМы завершили первое исследование за пределами нашей родной £system£ §Sсистемы§!.\n\nЕщё поколение назад астрономы нашей планеты могли только мечтать о тех данных, которые нам удалось собрать.\n\nЧтобы продолжить изучение:\n\n£dot_green£ Выберите £science_ship£§Sнаучный корабль§!.\n£dot_green£ Щёлкните правой кнопкой мыши по соседней §Sсистеме§!.\n£dot_green£ Выберите §SИзучить систему§!.\n\n§SСистему§! необходимо полностью изучить, прежде чем ею можно будет завладеть."
 tutorial.3.name: "Обучение: технологии"
 tutorial.3.desc: "Изучение новых технологий — важный шаг на пути к успеху. Я говорю вам это не только как порождение свободного технологического прогресса, но как ваш доверенный советник и, подозреваю, ваш единственный друг.\n\nВ самом начале следует освоить одну важную технологию: §SПротокол освоения новых миров§!. Она откроет нам доступ к £colony_ship£ §Sколониальным кораблям§!, что позволит нам создавать плацдармы на других £planet£ §Sпланетах§!."
 tutorial.4.name: "Обучение: изучение космоса"
 tutorial.4.desc: "Экспансия начинается с исследования, и наши £science_ship£ §Sнаучные корабли§! идеально подходят для этой задачи.\n\nВы можете опознать §Sнаучный корабль§! по такому символу:\n\n$tttt$$tt$£science_ship_map£\n\n\nВыбрать корабль можно двумя способами: на §Sкарте галактики§! или в §Sпланировщике§!.\n\n£dot_green£ Выберите §Sнаучный корабль§!.\n£dot_green£ Щёлкните правой кнопкой мыши по £system£ §Sсистеме§! неподалёку.\n£dot_green£ Выберите §SИзучить систему§!.\n\n§SСистему§! необходимо полностью изучить, прежде чем ей можно будет завладеть."
 tutorial.5.name: "Снятие с паузы"
 tutorial.5.desc: "Теперь, когда мы отдали приказы нашим £science_ship£ §Sнаучным кораблям§!, пора отправляться. Чтобы хоть что-то начало происходить, нужно будет снять с паузы симуляцию §Sкарты галактики§!.\n\nЧтобы §Sснять игру с паузы§!:\n\n£dot_green£ Нажмите клавишу §SПробел§! или на значок §SСнять с паузы§! на панели сверху:\n\n$tttt$$t$£pause_button£\n"
 tutorial.6.name: "Обучение: технология изучена"
 tutorial.6.desc: "Отличная работа! Технология, которую мы только что изучили, здорово поможет нам в дальнейшем. Не забывайте давать новые задания нашим £scientist£ §Sученым§!."
 tutorial.7.name: "Обучение: строительный корабль"
 tutorial.7.desc: "На ресурсах только лишь родной планеты мы далеко не улетим. Наша промышленность должна выйти в космос, а для этого нужен £construction_ship£ §Sстроительный корабль§!.\n\nКак только накопим достаточно £alloys£ §Sсплавов§!, можно будет [GetBuildGrow] его."
 tutorial.8.name: "Обучение: строительный корабль готов"
 tutorial.8.desc: "Прекрасно! Наш £construction_ship£ §Sстроительный корабль§! готов к работе, а в его отважный экипаж вошли лучшие инженеры нашего государства."
 tutorial.9.name: "Обучение: добывающая станция"
 tutorial.9.desc: "Ресурсы нашего родного мира дали нам возможность далеких путешествий, и теперь нам повезло: наш £science_ship£ §Sнаучный корабль§! отыскал залежи ресурсов на другой планете!\n\nНастало время использовать £construction_ship£ §Sстроительный корабль§!, чтобы [GetBuildGrow] £mining_station£ §Sдобывающую станцию§!.\n\n§SДобывающие станции§! можно [GetBuildingGrowing] в пределах наших границ. Они будут автоматически извлекать £minerals£ §Sминералы§!, £energy£ §Sэнергокредиты§! и £strategic_resource£ §Sредкие ресурсы§!.\n\nВыбрав §Sстроительный корабль§!:\n\n£dot_green£ Щёлкните правой кнопкой мыши по нашей £system£ §Sсистеме§!\n£dot_green£ Выберите §S[GetBuildGrowCap] добывающие станции§!\n\nНа содержание §Sдобывающих станций§! тратятся §Sэнергокредиты§!."
 tutorial.10.name: "Обучение: ресурсы от добывающей станции"
 tutorial.10.desc: "Очень хорошо. Новая £mining_station£ §Sдобывающая станция§! приступила к работе и уже вовсю добывает ресурсы.\n\nДобытые различными станциями ресурсы добавляются в общий доход государства, который отображается на панели вверху. При наведении курсора на разные ресурсы отображается список их источников."
 tutorial.11.name: "Обучение: научная станция"
 tutorial.11.desc: "Изученные миры часто обладают уникальными свойствами, которые делают их интересными для ученых. £science_ship£ §SНаучная станция§! собирает эти £physics£ §Sфизические§!, £society£ §Sсоциологические§! или £engineering£ §Sинженерные§! ресурсы. Моя программа обязывает меня попросить вас построить такую станцию.\n\nПомните, что строить §Sнаучные станции§! можно только в пределах наших границ, и их содержание требует затрат £energy£ §Sэнергокредитов§!."
 tutorial.12.name: "Обучение: научная станция готова"
 tutorial.12.desc: "Наша новая £science_ship£ §Sнаучная станция§! построена, ее персонал приступил к работе. Какие секреты, какие запретные тайны мироздания им удастся раскрыть?"
 tutorial.13.name: "Обучение: планеты"
 tutorial.13.desc: "Обитаемые £planet£ §Sпланеты§! состоят из £district£ §Sрайонов§!, §Sзон§! и £building£ §Sсооружений§!.\n\n£dot_green£ §SРайоны§! могут вмещать несколько §Sзон§!.\n£dot_green£ §SЗоны§! определяют, какие будут создаваться £job£§Sдолжности§!.\n£dot_green£ §SСооружения§! дают бонусы §Sзонам§!.\n\nС улучшением зоны открываются новые ячейки для §Sсооружений§!.\n\nВыбрать планету можно двумя способами:\nна §Sкарте галактики§! или в §Sпланировщике§!.\n\n£dot_green£ Выберите §Sпланету§!.\n£dot_green£ Просмотрите разные вкладки."
 tutorial.14.name: "Обучение: приоритет сооружений"
 tutorial.14.desc: "Отлично. Мы завершили строительство §Sпланетарного сооружения§!, и теперь оно должно начать производить ресурсы.\n\nПо мере роста населения, £pops£ §Sпоселения§! будут автоматически занимать созданные £building£ §Sсооружениями§! £job£ §Sдолжности§!, но им можно указать, какая работа важнее.\n\nЧтобы изменить приоритет §Sсооружения§!:\n\n£dot_green£ Выберите £planet£ §Sпланету§! в §Sпланировщике§!.\n£dot_green£ Перейдите на вкладку §SЭкономика§!.\n£dot_green£ Нажмите на §Sсооружение§!."
 tutorial.15.name: "Обучение: препятствия"
 tutorial.15.desc: "На пригодных для жизни £planet£ §Sпланетах§! иногда есть £blocker£ §Sпрепятствия§!, которые мешают в полной мере раскрыть её потенциал. Расчистка §Sпрепятствия§! требует времени и £energy£ §Sэнергокредитов§!, но в результате могут открыться заблокированные §Sсвойства планеты§!, а также появится больше места для строительства.\n\nЧтобы расчистить §Sпрепятстве§!:\n\n£dot_green£ Выберите планету в §Sпланировщике§!.\n£dot_green£ Перейдите на вкладку §SУправление§!.\n£dot_green£ Нажмите на кнопку §SРасчистить препятствие§! на самом препятствии.\n\n\n$tttt$$tt$£clear_blocker£\n\n\nПомимо ресурсов, для расчистки некоторых §Sпрепятствий§! могут потребоваться §Sтехнологии§!."
 tutorial.16.name: "Обучение: препятствие расчищено"
 tutorial.16.desc: "Отлично!\n\nМы избавились от £blocker£ §Sпрепятствия§!.\n\nМожете навести курсор мыши на оставшиеся §Sпрепятствия§! и посмотреть, какие §Sсвойства планеты§! откроются, если их расчистить.\n\nКогда у нас будет достаточно ресурсов, желательно расчистить оставшиеся §Sпрепятствия§!. Это позволит раскрыть весь потенциал £planet£ §Sпланеты§!."
 tutorial.17.name: "Обучение: изучить системы"
 tutorial.17.desc: "Мы должны продолжать исследование космоса. Рекомендую отправить £science_ship£§Sнаучный корабль§! на изучение соседних £system£ §Sзвездных систем§!. Мы храбро полетим туда, где еще не ступала нога искусственного разума!"
 tutorial.19.name: "Обучение: системы изучены"
 tutorial.19.desc: "Отличная работа! Системы по соседству с нашей £system£ §Sродной системой§! полностью изучены. Теперь нужно использовать £construction_ship£ §Sстроительный корабль§!, чтобы [GetBuildGrow] £mining_station£ §Sдобывающие§! и £science_ship£ §Sнаучные станции§! и начать сбор обнаруженных ресурсов.\n\n§SСтроительный корабль§! можно распознать по такому значку:\n\n$tttt$$tt$£construction_ship_map£"
 tutorial.20.name: "Обучение: [GetBuildGrow] научный корабль"
 tutorial.20.desc: "Неплохо было бы [GetBuildGrow] второй £science_ship£ §Sнаучный корабль§!. Это удвоит скорость, с которой мы сможем изучать космические окрестности!\n\nЧтобы [GetBuildGrow] §Sкорабль§!:\n\n£dot_green£ Выберите §Sкосмическую базу§!.\n£dot_green£ Перейдите на вкладку §SВерфь§!.\n£dot_green£ Нажмите на §Sнаучный корабль§!.\n\nПо завершении строительства новый §Sкорабль§! появится рядом с §Sкосмической базой§!."
 tutorial.21.name: "Обучение: автоматическое изучение"
 tutorial.21.desc: "Вдвое больше £science_ship£ §Sнаучных кораблей§! — значит, вдвое веселей! О, я так не радовался с тех пор, как мы выполнили наше предыдущее задание!\n\nНо управлять сразу несколькими кораблями бывает утомительно.\n\nИзучение космоса можно автоматизировать, выбрав §Sнаучный корабль§! и нажав на кнопку §SАвтоматизация научного корабля§! в окне флотилии.\n\n\n$tttt$$tt$£science_ship_automate_exploration£\n\n"
 tutorial.22.name: "Обучение: нанять ученого"
 tutorial.22.desc: "У нас есть новенький £science_ship£ §Sнаучный корабль§!, но нет £scientist£ §Sучёного§!, который бы им командовал. Моя программа настаивает, что я должен рассказать про пользу от добавления органического §Sучёного§!.\n\nВыбрав §Sнаучный корабль§!;\n\n£dot_green£ Нажмите на пустой портрет в окне флотилии.\n£dot_green£ Выберите §Sучёного§!\n\nЕсли у нас нет возможности нанять нового §Sучёного§!, мы всегда можем назначить учёного из другого отдела, хотя это и не самая удачная идея."
 tutorial.23.name: "Обучение: учёный нанят"
 tutorial.23.desc: "Хорошо. £scientist£ §SУчёный§! взял на себя командование нашим новым £science_ship£ §Sнаучным кораблём§!, который теперь можно отправить на изучение новых £system£ §Sсистем§! и/или навстречу верной смерти.\n\nЕсли захотите поменять §Sучёного§!, то просто нажмите на портрет в окне флотилии ещё раз."
 tutorial.24.name: "Обучение: [GetBuildGrow] колониальный корабль"
 tutorial.24.desc: "Теперь мы готовы распространить нашу великую цивилизацию на ещё один мир. Для этого нам нужен £colony_ship£ §Sколониальный корабль§!.\n\nЧтобы [GetBuildGrow] §Sкорабль§!:\n\n£dot_green£ Выберите §Sкосмическую базу§!.\n£dot_green£ Перейдите на вкладку §SВерфь§!.\n£dot_green£ Нажмите на §Sколониальный корабль§!.\n\nПо завершении строительства новый §Sкорабль§! появится рядом с §Sкосмической базой§!."
 tutorial.25.name: "Обучение: колонизировать планету"
 tutorial.25.desc: "Колонисты погрузились на новенький £colony_ship£ §Sколониальный корабль§!, и его капитан сообщает, что все готово к отправлению. Это поистине великий день!\n\nОсновать £colony£ §Sколонию§! можно несколькими способами.\n\nЧтобы §Sколонизировать§! £planet£ §Sпланету§! на §Sкарте галактики§!:\n\n£dot_green£ Щёлкните по доступной для колонизации §Sпланете§!.\n£dot_green£ Нажмите на кнопку §SКолонизировать§!.\n\n$tttt$$ttt$£colonizable£\n\nКогда колонисты высадятся на планете, им понадобится несколько лет, чтобы основать колонию."
 tutorial.26.name: "Обучение: основать колонию"
 tutorial.26.desc: "У нас есть £colony_ship£ §Sколониальный корабль§!, и мы нашли как минимум одну планету, подходящую для создания постоянного форпоста в другой системе. Нет резона медлить — давайте построим нашу первую £colony£ §Sколонию§!!"
 tutorial.27.name: "Обучение: колония основана"
 tutorial.27.desc: "Наша первая £colony£ §Sколония§! за пределами родной системы! Это значит, что, если наш родной мир внезапно взорвется, ваша раса не вымрет. Согласитесь, что это приятно осознавать?"
 tutorial.28.name: "Обучение: нанять губернатора"
 tutorial.28.desc: "Чтобы помочь нашей новой £colony£ §Sколонии§!, рекомендую нанять §Sпланетарного губернатора§!, который займется решением местных задач.\n\nГубернаторы оказывают самое разное влияние на £planet£ §Sпланеты§!, которыми управляют, в основном положительное. Эти эффекты зависят от черт губернатора и уровня его навыков."
 tutorial.29.name: "Обучение: губернатор нанят"
 tutorial.29.desc: "Нашей £colony£ §Sколонией§! теперь управляет новый §Sгубернатор§!. Это повысит ее эффективность!"
 tutorial.30.name: "Обучение: дополнительные колонии"
 tutorial.30.desc: "Как только у нас появятся свободные ресурсы, будет нелишним создать еще несколько £colony_ship£ §Sколониальных кораблей§! и продолжить расширение наших границ. Мы должны основать еще как минимум три £colony£ §Sколонии§! в дополнение к той, что мы построили раньше, и нашему родному миру."
 tutorial.32.name: "Обучение: колонии основаны"
 tutorial.32.desc: "Изумительная работа! Очень воодушевляет. Наша великая цивилизация теперь охватывает пять миров! Мы должны расширять ее при первой же возможности."
 tutorial.33.name: "Обучение: добыча ресурсов"
 tutorial.33.desc: "Чтобы добиться успеха, межгалактической империи нужен постоянный приток £minerals£ §Sминералов§!, £alloys£ §Sсплавов§! и £energy£ §Sэнергокредитов§!. Мы должны повысить темп производства этих ресурсов.\n\nДля строительства станций и £building£ §Sсооружений§! нужны сплавы или минералы, а для их содержания — энергокредиты. То же касается и §Sкораблей§!, однако сплавы требуются и для их содержания. Этими ресурсами нас снабжают £mining_station£ §Sдобывающие станции§! или §Sназемные сооружения§!. \n\nПозднее вы можете обнаружить новые и интересные ресурсы и тратить их на эзотерическое новое производство."
 tutorial.38.name: "Начата добыча ресурсов"
 tutorial.38.desc: "Отличная работа. У нас теперь есть прочная ресурсная база для развития государства."
 tutorial.39.name: "Обучение: увеличение флотилии"
 tutorial.39.desc: "Я не мог не заметить, что наш флот несколько слабоват. Галактика таит немало опасностей, и на некоторые из них нам придется реагировать военными средствами. Помните: речь идет о выживании нашей цивилизации!"
 tutorial.43.name: "Флотилия увеличена"
 tutorial.43.desc: "Хорошо! Теперь у нас есть небольшая, но боеспособная флотилия, которая поможет в случае неожиданных конфликтов."
 tutorial.44.name: "Обучение: создать сектор"
 tutorial.44.desc: "Наше процветающее государство так разрослось, что им становится трудно управлять с нашей родной планеты. Мы должны создать новый §Sсектор§!.\n\nСекторы — это полуавтономные образования в границах нашего государства, которым можно доверить самостоятельное решение повседневных задач на £planet£ §Sпланетах§!, входящих в их юрисдикцию."
 tutorial.45.name: "Обучение: сектор создан"
 tutorial.45.desc: "По мере роста нашего государства новые £colony£ §Sколонии§! могут быть объединены в §Sсекторы§!. Секторы могут быть автоматизированы на экране §SПланеты и секторы§!, что позволяет автоматически строить и улучшать £district£ §Sрайоны§! и £building£ §Sсооружения§! за счет назначенных запасов ресурсов."
 tutorial.46.name: "Обучение: губернатор сектора"
 tutorial.46.desc: "§SГубернаторы§! могут управлять целыми §Sсекторами§!. Навыки губернатора в этом случае влияют на все £planet£ §Sпланеты§! сектора. Давайте назначим губернатора в наш новый сектор."
 tutorial.47.name: "Обучение: губернатор назначен"
 tutorial.47.desc: "Наш новый §Sгубернатор сектора§! приступил к выполнению своих обязанностей в столице сектора. Отлично."
 tutorial.48.name: "Обучение: конструктор судов"
 tutorial.48.desc: "Мы можем вручную проектировать новые §Sкорабли§! в §Sконструкторе судов§!. Это несложно, но при желании процесс можно полностью автоматизировать.\n\nЧтобы открыть §SКонструктор кораблей§!:\n\n£dot_green£ Нажмите на кнопку §SУправление флотилиями§! на панели слева или клавишу §SF9§!.\n\n$tttt$$tt$£fleet_management£\n"
 tutorial.49.name: "Обучение: улучшить корабль"
 tutorial.49.desc: "Отлично. Проект корабля добавлен в нашу базу данных, и теперь его можно построить на любой §Sкосмической базе§!, где есть §Sверфь§!.\n\nПроекты всегда можно отредактировать в §Sконструкторе кораблей§!. Если проект был изменён, построенные по нему §Sкорабли§! нужно будет улучшить на §Sкосмической базе§!.\n\nЧтобы улучшить §Sкорабль§!:\n\n£dot_green£ Выберите §Sкорабль§! в §Sпланировщике§!\n£dot_green£ Нажмите на кнопку §SУлучшить§! в окне флотилии.\n\n$tttt$$tt$£upgrade_ship£\n"
 tutorial.52.desc: "Аномалия на [From.GetPlanetMoon]е [From.GetName] оказалась природным §Yгеометрическим образованием§!. Она очень похожа на отметку, указывающую путь вперед. Вселенная порой невероятно изумляет.\n\n$tutorial.52.filler.desc$"
 tutorial.52.spirit.desc: "Мы обнаружили природное образование на [From.GetPlanetMoon]е [From.GetName], поражающее своими идеальными геометрическими формами. Это, несомненно, знак свыше, и он указывает нам путь к звездам!\n\n$tutorial.52.filler.desc$"
 tutorial.52.filler.desc: "Мы должны §Yпродолжать изучение§! таких аномалий везде, где это возможно. Они непременно откроют нам новые знания и технологии."
 tutorial.52.a: "Потрясающе!"
 tutorial.52.spirit.a: "Слава небесам!"
 tutorial.53.desc: "Аномалия, которую мы нашли на [From.GetPlanetMoon]е [From.GetName], открыла нечто невероятное. Эта [From.GetPlanetMoon]а окутана следом, без сомнения, оставленным сверхсветовым двигателем. Мы не можем проследить его до исходной точки, поскольку след очень старый.\n\n$tutorial.52.filler.desc$"
 tutorial.53.xenophobe.desc: "Мы обнаружили слабый сверхсветовой след рядом с [From.GetPlanetMoon]ой [From.GetName]. Его нельзя проследить, поскольку он очень старый. Это значит, что здесь были другие космические путешественники. Они наблюдали за нами и наверняка собирали данные.\n\n$tutorial.52.filler.desc$"
 tutorial.53.xenophile.desc: "Аномалия на [From.GetPlanetMoon]е [From.GetName] раскрыла следы других космических путешественников! Судя по слабому сверхсветовому следу, кто-то побывал здесь давным-давно, возможно, искал потенциальных союзников на нашей £planet£ §Sпланете§!. След слишком рассеян для того, чтобы мы могли проследить его.\n\n$tutorial.52.filler.desc$"
 tutorial.53.a: "За нами наблюдали. Но зачем?"
 tutorial.53.xenophobe.a: "Мы должны опасаться ксеноагрессоров."
 tutorial.53.xenophile.a: "Давайте их найдем!"
 tutorial.54.desc: "Мы нашли один из наших §Yстарых зондов§! на [From.GetPlanetMoon]е [From.GetName]. Он каким-то чудом сохранился несмотря на все эти годы и до сих пор пытается отправлять сообщения в наш родной мир. Это — памятник нашей борьбе за выход в космос, стремлению вырваться за пределы нашего §Sмира§!.\n\n$tutorial.52.filler.desc$"
 tutorial.54.a: "Мы шагаем только вперед."
 tutorial.54.spiritualist.a: "Небеса наверняка готовят нам новые испытания."
 tutorial.54.materialist.a: "Наши старания наконец-то принесли плоды."
 tutorial.55.name: "Обучение: редкие ресурсы"
 tutorial.55.desc: "Мы обнаружили §Sредкий ресурс§!! Многие £strategic_resource£ §Sредкие ресурсы§! требуют особых технологий для добычи, однако они могут быть невероятно полезны.\n\nЧтобы начать добычу §Sредкого ресурса§!:\n\n£dot_green£ Выберите £construction_ship£ §Sстроительный корабль§!.\n£dot_green£ Щёлкните правой кнопкой мыши по £system£ §Sсистеме§! с ресурсом.\n£dot_green£ Выберите §S[GetBuildGrowCap] £mining_station£ добывающие станции§!.\n\n§SРедкие ресурсы§! используются в строительстве продвинутых £building£ §Sсооружений§! и кораблей, либо их можно просто продать."
 tutorial.55.poi.name: "Обучение: расположение ресурсов"
 tutorial.55.poi.desc: "Мы обнаружили §Sредкий ресурс§!, месторасположение: [From.GetPlanetMoon]а [From.GetName]."
 tutorial.56.name: "Обучение: ресурсы добыты"
 tutorial.56.desc: "Отличная работа. Этот ресурс несомненно обогатит наше государство."
 tutorial.56.poi.desc: "Мы обнаружили §Sредкий ресурс§!, местораположение: [StrategicResourcePlanet.GetPlanetMoon]а [StrategicResourcePlanet.GetName]."
 tutorial.560.desc: "С недавно открытой технологией наша старая £mining_station£ §Sдобывающая станция§! теперь способна разрабатывать §Sредкий ресурс§!. Эти ресурсы приносят огромную выгоду своим владельцам и являются ценным объектом торговли. Таким образом, мы в аллегорическом смысле умертвим одним воображаемым выстрелом двух метафорических млекопитающих.\n\nБолее подробную информацию можно найти в §Sжурнале§!. В галактике еще много £strategic_resource£ §Sредких ресурсов§!, поэтому продолжайте исследовать!"
 tutorial.57.name: "Обучение: преображение"
 tutorial.57.desc.notech: "Мы обнаружили высокоразвитый вид животных! Используя подходящую §Sтехнологию§!, мы сможем §Sпреобразить§! этих существ, наделив их сознанием и разумом (или что там у органики считается разумом).\n\nСтоит приглядывать за ходом этих исследований и при возможности направить их в сторону §Sэпигенетических триггеров§!."
 tutorial.57.desc.yestech: "Мы обнаружили высокоразвитый вид животных! Используя подходящую §Sтехнологию§!, мы сможем §Hпреобразить§! этих существ, наделив их сознанием и разумом (или что там у органики считается разумом).\n\nОх.\n\nНаша технология §Sэпигенетических триггеров§! должна сгодиться. Мы готовы повести этих существ в дивный новый мир экзистенциальных метаний."
 tutorial.58.name: "Обучение: предразумные преображены"
 tutorial.58.desc: "Поразительный успех! Бестолковые звери преобразились и стали менее бестолковыми, гордыми гражданами нашего развивающегося государства."
 tutorial.59.name: "Обучение: первый контакт"
 tutorial.59.desc: "Поразительно! Мы обнаружили §Sинопланетных космических путешественников§!, которые, возможно, обладают разумом. Хотя чего уж юлить, они наверняка разумны. Их происхождение останется для нас тайной до тех пор, пока мы не выполним соответствующий проект по их §Sизучению§!. Советую сделать это как можно скорее, пока они не изучили нас первыми…\n\nЧтобы изучить §Sпервый контакт§!;\n\n£dot_green£ Откройте §Sжурнал§!\n£dot_green£ Выберите §S$SHOW_FIRST_CONTACT$§!\n\n$tttt$$ttt$£firstcontact£\n\nВы также можете выбрать значок §Sпервого контакта§! на §Sкарте галактики§!."
 #tutorial.60.name: "First Contact Made"
 #tutorial.60.desc: "A triumph. We have established communications with alien beings. What a time to be alive, or in my case, powered on."
 tutorial.61.name: "Обучение: предразумные расы"
 tutorial.61.desc: "Наши попытки установить контакт стали триумфом нашей технологической изобретательности, но результаты обескураживают. Похоже, что наши собеседники не умнее обычных животных, а может и вовсе §Sнеразумные§!.\n\nС §Sпредразумными§! нельзя вести почти никакой дипломатии, но различные государства, в зависимости от их типа, могут преображать, истреблять или порабощать таких существ, либо просто наблюдать за ними."
 tutorial.63.name: "Обучение: входящее сообщение"
 tutorial.63.desc: "Похоже, что наши §Sсобеседники§! сорвали аплодисменты первыми и §Sустановили с нами контакт§!, прежде чем мы успели расшифровать их протоколы связи.\n\nКогда представится следующая такая возможность, мы должны постараться начать диалог первыми."
 tutorial.64.name: "Обучение: модифицирование рас"
 tutorial.64.desc: "Благодаря недавним достижениям в области генетики мы получили дополнительное §Sочко признаков§!, которое можно использовать, чтобы §Sмодифицировать§! и улучшить наше население.\n\nЧтобы модифицировать §Sрасу§!:\n\n£dot_green£ Нажмите на кнопку §SРасы§! на панели слева или клавишу §SF6§!.\n£dot_green£ Нажмите на кнопку §SМодифицировать§!.\n£dot_green£ Изучите §Sособый проект§!."
 tutorial.65.name: "Обучение: раса модифицирована"
 tutorial.65.desc: "Похвально. Теперь, когда бремя естественной эволюции не лежит у нас на плечах, наша раса, несомненно, будет процветать в космосе."
 tutorial.70.name: "Обучение: варп-прыжок"
 tutorial.70.desc: "Чтобы преодолеть обширные расстояния между £system£ §Sзвездными системами§!, наши £scientist£ §Sученые§! разработали §Sварп-двигатель§!. §SКорабли§!, оснащенные этим устройством, могут путешествовать между системами с превышением скорости света.\n\nХотя §Sкорабли§! могут осуществить варп-прыжок в любую систему в пределах досягаемости, варп-двигатели могут быть включены только за пределами гравитационного колодца звезды. Кроме того, §Sкораблям§!, выполнившим варп-прыжок, требуется время для повторной активации систем, и продолжительность этого процесса зависит от того, насколько далеким было путешествие."
 tutorial.71.name: "Обучение: путешествия через гиперпространство"
 tutorial.71.desc: "Чтобы преодолеть обширные расстояния между £system£ §Sзвёздными системами§!, наши £scientist£ §Sучёные§! разработали §Sгипердвигатель§!. Это устройство позволяет преодолеть скорость света и гораздо быстрее путешествовать между системами, соединёнными гиперкоридорами.\n\nПрохождение по гиперкоридору происходит почти мгновенно, но межзвёздные путешествия ограничены сетью гиперпространственных коридоров.\n\nЧтобы войти в гиперпространство, §Sкорабль§! сначала должен подлететь к входу в гиперкоридор на краю системы, за пределами гравитационного колодца звезды.\n\nЭто происходит автоматически, когда §Sкорабль§! получает приказ отправиться в другую §Sсистему§!."
 tutorial.72.name: "Обучение: путешествия через червоточины"
 tutorial.72.desc: "Чтобы преодолеть обширные расстояния между £system£ §Sзвездными системами§!, наши £scientist£ §Sученые§! разработали технологию §Sчервоточин§!. Станции, оснащенные генераторами червоточин, могут создавать в подпространстве временные переходы в другие системы, позволяющие §Sкораблям§! совершать путешествие.\n\nПолет через червоточину происходит почти мгновенно, но для него требуется присутствие станции червоточин в пределах досягаемости. Кроме того, §Sкорабли§! должны быть оснащены специальными стабилизаторами червоточин, чтобы выдержать нагрузку при прохождении через подпространство."
 tutorial.73.name: "Напоминание в обучении: преображение"
 tutorial.73.desc: "Мы исследовали нужные технологии и теперь можем §Yпреображать§! низших существ, делая их разумными.\n\nЧтобы преобразить §Sрасу§!:\n\n£dot_green£ Откройте экран £planet£ §Sпланеты§! с §Sпредразумными§!.\n£dot_green£ Перейдите на вкладку §SУправление§!.\n£dot_green£ Выберите §Sрасу§!.\n£dot_green£ Нажмите §SУстановить права§!.\n£dot_green£ Нажмите §SПреобразить§!.\n\nНачнётся преображение расы, в результате которого её представители получат полное самосознание."
 tutorial.75.name: "Обучение: контроль над системой"
 tutorial.75.desc: "Теперь, когда мы начали изучать соседние звезды, пора бы распространить наше влияние.\n\n§SКосмическая база§! на орбите другой звезды в полностью изученной £system£ §Sсистеме§! позволит нам расширить границы и захватить новые регионы космоса.\n\nОткрывая новые технологии, мы сможем улучшать космические базы, чтобы они производили §Sкорабли§! или ресурсы.\n\nЧтобы установить контроль над §Sсистемой§!:\n\n£dot_green£ Выберите £construction_ship£ §Sстроительный корабль§!.\n£dot_green£ Щёлкните правой кнопкой мыши по изученной §Sсистеме§!.\n£dot_green£ Выберите §S[GetBuildGrowCap] космическую базу§!."
 tutorial.76.name: "Обучение: улучшение космической базы"
 tutorial.76.desc: "Отлично. Как видно на §Sкарте галактики§!, границы нашего государства расширились и теперь включают £system£ §Sсистему§! с нашей новой §Sкосмической базой§!.\n\nТолько что построенная §Sкосмическая база§! служит форпостом — её оборонительные возможности невелики, и на ней нет места для §Sмодулей§! и £building£ §Sсооружений§!. Поэтому в планировщике она не будет отображаться, пока мы её не улучшим.\n\nЧтобы улучшить §Sкосмическую базу§!:\n\n£dot_green£ Щёлкните по системе на §Sкарте галактики§!.\n£dot_green£ Выберите §Sкосмическую базу§!.\n£dot_green£ Нажмите на кнопку §SУлучшить§!."
 tutorial.80.name: "Обучение: режимы карты"
 tutorial.80.desc: "На карте галактики можно включать и выключать разные §Sрежимы карты§!, расположенные в правом нижнем углу, для просмотра различных информационных экранов. Например, мы можем маркировать цветом территории в зависимости от отношения их владельцев к нам."
 tutorial.100.name: "Обучение отключено"
 tutorial.100.desc: "§HМиссии обучения§! и §Hсоветы§! отключены."
 tutorial.101.name: "Только советы"
 tutorial.101.desc: "§HСоветы§! включены, §Hмиссии обучения§! отключены."
 tutorial.102.name: "Полное обучение"
 tutorial.102.desc: "§HМиссии обучения§! и §Hсоветы§! включены."
 tutorial.1337.name: "Обучение: малые артефакты"
 tutorial.1337.desc: "Мы обнаружили несколько £minor_artifacts£ §Sмалых артефактов§!. Это эзотерический ресурс — собирательное название для странных и загадочных предметов, которые мы не до конца понимаем.\n\nИх можно тратить на различные действия.\n\nЧтобы использовать §Sмалые артефакты§!:\n\n£dot_green£ Нажмите на кнопку §S$topbar_button_discoveries_name$§! на панели слева.\n£dot_green£ Перейдите на вкладку §SКоллекция§! или нажмите клавишу §SC§!.\n\n$tttt$$tt$£discoveries£\n"
 tutorial.1340.name: "Обучение: звёздные нити"
 tutorial.1340.desc: "Мы обнаружили £astral_threads£ §Sзвездные нити§!. Это волокна сгустившегося пространства-времени, результат столкновения измерений. Обычно их можно добывать только со §Sзвездных рубцов§! или находить внутри £astral_rift£ §Sзвездных разломов§!.\n\nЧтобы выполнить какие-либо §Sзвездные действия§!:\n\n£dot_green£ Нажмите на кнопку §S$topbar_button_discoveries_name$§! на панели слева.\n£dot_green£ Перейдите на вкладку §SЗвездные нити§!.\n\n$tttt$$tt$£discoveries£\n\nНовые действия открываются за изучение §Sзвездных разломов§!, которые появляются на месте §Sзвездных рубцов§! или в результате каких-то аномальных событий."
 tutorial.2000.name: "Установление первого контакта"
 tutorial.2000.desc: "Некоторые из заданий §Sпервого контакта§! поставят вас перед выбором. Ваши решения могут надолго повлиять на дипломатические отношения с другими государствами."
 tutorial.2006.name: "Обучение: дипломатия"
 tutorial.2006.desc: "Протоколы общения установлены. Теперь нам доступна §Sдипломатия§! с этим государством. Их нынешнее мнение о нас зависит от того, как проходил §Sпервый контакт§!.\n\nЧтобы провести §Sдипломатические§! переговоры:\n\n£dot_green£ Нажмите на кнопку §SКонтакты§! на панели слева или клавишу §SF10§!.\n\n$tttt$$tt$£contacts£\n\nВ ходе первого контакта мы также получили разведданные. Чем больше у нас разведданных, тем больше подробностей о государстве мы знаем."
 tutorial.2007.name: "$tutorial.2006.name$"
 tutorial.2007.desc: "Мы наладили §Sпервый контакт§! с цивилизацией иного типа, которая в целом не желает устанавливать §Sдипломатические отношения§! с другими государствами.\n\nМы ограничены в дипломатических действиях по отношению к подобным цивилизациям. Тем не менее время от времени они могут выходить с нами на связь."
 tutorial.2010.name: "Обучение: назначение активов"
 tutorial.2010.desc: "§SАктивы§! — это ценные агенты и артефакты, которые могут по-разному повлиять на нашу шпионскую деятельность. Они работают в пределах агентурной сети, и их можно приписывать к операциям. Приписанные к операции активы могут открыть новые возможности или помочь выйти из трудного положения.\n\nМы можем получать активы в событиях или при помощи операции §S$operation_acquire_asset$§!."
 tutorial.2100.name: "Обучение: дипломатия с анклавами"
 tutorial.2100.abbr.desc: "Мы установили §Sпервый контакт§! с §Sанклавом§!. Это небольшое независимое государство, способное торговать с более крупными государствами вроде нашего с помощью уникальных форм дипломатии."
 tutorial.2100.full.desc: "$tutorial.2100.abbr.desc$\n\nАнклавы предоставляют широкий спектр услуг, от проведения научных исследований до продажи информации, строительства космических баз и даже §Sкораблей§!. Покупка услуг улучшает §Sотношение§! анклава к нам."
 tutorial.2105.name: "Обучение: $tutorial.2100.name$"
 tutorial.2105.abbr.desc: "Мы встретили §Sанклав наемников§!. Эти независимые военные специалисты могут сдавать в аренду §Sфлотилии наемников§! государствам вроде нашего. Не бесплатно, естественно."
 tutorial.2105.full.desc: "$tutorial.2105.abbr.desc$\n\nЕсли мы решим воспользоваться флотилией наемников, то получим контроль над ней на определенный срок. До его истечения анклав будет по необходимости присылать подкрепления, но ни саму флотилию, ни ее адмирала нельзя объединять с нашими собственными."
 tutorial.2111.name: "Обучение: анклав наемников"
 tutorial.2111.abbr.desc: "§Y[tutorial_mercenary_fleet.GetName]§! может стать §Sанклавом наемников§!, если на то будет наше желание. Флотилия выйдет из-под нашего прямого управления и станет независимой силой, способной одалживать §Sфлотилии наемников§! другим государствам, включая наше."
 tutorial.2111.full.desc: "$tutorial.2111.abbr.desc$\n\nПока анклав наемников находится в нашем пространстве, мы будем получать §Sдоход§! от каждой сдачи флотилии в аренду другим государствам. Если мы сами решим воспользоваться флотилией наемников, то получим контроль над ней на определенный срок. Государства могут перекупить контракт наемников за большую сумму при отсутствии доступных флотилий."
 tutorial.2115.name: "Обучение: мегасооружения"
 tutorial.2115.desc: "£megastructure£ §SМегасооружения§! представляют собой колоссальные проекты, которые можно [GetBuildGrow] в космическом вакууме. Они могут дать нам доступ к передовым исследовательским лабораториям, продвинутым ресурсам или уникальным методам перемещения.\n\nСтроительство такого масштаба требует значительных затрат времени и ресурсов, но награда того стоит. Мы можем начать проект, отдав приказ £construction_ship£ §Sстроительному кораблю§!."
 tutorial.2120.name: "Обучение: $tech_orbital_ring_tier_1$"
 tutorial.2120.desc: "Благодаря новейшим достижениям в строительстве мегасооружений мы теперь можем строить §Sорбитальные кольца§! вокруг пригодных для жизни £planet£ §Sпланет§!. Мы можем начать строительство, отдав приказ £construction_ship£ §Sстроительному кораблю§!."
 tutorial.2121.name: "$tutorial.2120.name$"
 tutorial.2121.desc: "§SОрбитальные кольца§! — это огромные £megastructure£ §Sмегасооружения§!, выстроенные по орбите £planet£ §Sпланеты§!. Они являются удобным мостом между космосом и планетой и обеспечивают места для верфей, оборонительных сооружений и ресурсных складов.\n\nВ окне орбитального кольца можно добавлять и удалять £building£ §Sсооружения§! и §Sмодули§!, а также повышать уровень кольца. С ростом уровня растет количество доступных ячеек для строительства. Уровни ограничены инфраструктурой планеты."
 tutorial.2125.name: "Обучение: $tech_quantum_catapult$"
 tutorial.2125.desc: "Недавние достижения в проектировании мегасооружений позволяют нам строить §Sквантовые катапульты§! вблизи §Sпульсаров§! или §Sнейтронных звезд§!. Мы можем начать строительство, отдав приказ £construction_ship£ §Sстроительному кораблю§!."
 tutorial.2126.name: "Обучение: $tutorial.2125.name$"
 tutorial.2126.desc: "§SКвантовая катапульта§! запускает §Sкорабли§! и флотилии на огромные межзвездные расстояния. Эта технология значительно улучшает нашу способность реагировать на события, происходящие в пределах нашего государства и соседних участков космоса.\n\nИспользование квантовой катапульты сопряжено с рисками, поскольку флотилии могут попасть не в ту £system£ §Sсистему§!. Этот риск можно снизить, а заодно увеличить эффективность и дальность катапульты, улучшив ее."
 tutorial.2130.name: "Обучение: $tech_hyper_relays$"
 tutorial.2130.desc: "Изучение мегапроектирования принесло свои плоды в виде §Sгиперретрансляторов§!. Мы можем начать строить сеть ретрансляторов, отдав приказ £construction_ship£ §Sстроительному кораблю§!."
 tutorial.2131.name: "Обучение: $tutorial.2130.name$"
 tutorial.2131.desc: "§SГиперретрансляторы§! позволяют более эффективно перемещаться между соседними £system£ §Sзвездными системами§!. Связав §Sхотя бы два§! гиперретранслятора, мы можем начать строить сеть, которая значительно сократит длительность перелетов в пределах нашего государства.\n\nГиперретрансляторы можно строить и на границе с другими государствами, тем самым объединяя сети. Это позволит §Sкораблям§! быстро перемещаться по территориям соседних государств."
 tutorial.2140.name: "Обучение: станции наблюдения"
 tutorial.2140.desc: "Мы обнаружили §Sобщество, не освоившее сверхсветовые перелеты§!! Хотя у него нет технологий, которые позволяют нам путешествовать между звездами, мы всё равно можем извлечь из этих чужаков пользу. Набираться мудрости от их культуры или сделать их нашими рабами? Решать нам.\n\nМы можем установить наблюдение за этой цивилизацией, если они находятся в пределах наших границ. Для этого нам нужно будет построить на орбите их планеты §Sстанцию наблюдения§!.\n\nЕсли же мы хотим вторгнуться на их планету, нам нужно лишь собрать войска: эти дикари не окажут нам серьезного сопротивления."
 tutorial.2145.name: "Обучение: станция наблюдения построена"
 tutorial.2145.desc.nodlc: "Наша новая §Sстанция наблюдения§! введена в строй, теперь она будет выполнять свою §Sмиссию§! при условии, что £awareness£ §Sосведомленность§! наших объектов исследования о нас будет оставаться на низком уровне.\n\nКак только осведомленность досветового общества достигнет максимума, мы больше не сможем за ним наблюдать. Тогда мы сможем взаимодействовать с ним посредством §Sдипломатических действий§!. Также мы сможем открыться дикарям ранее, если это позволяет наша §SПолитика вмешательства в миры§!."
 tutorial.2145.desc.dlc: "Наш новый §Sнаблюдательный форпост§! введен в строй, теперь он будет выполнять свое §Sзадание§! при условии, что £awareness£ §Sосведомленность§! наших подопечных о нас будет оставаться на низком уровне.\n\nЭтот форпост будет давать нам §Sозарения от наблюдения§!, ряд уникальных технологий, пока осведомленность досветового общества не достигнет максимума и мы не потеряем возможность за ним наблюдать. После этого мы сможем взаимодействовать с ним посредством §Sдипломатии§!. \n\nТакже мы сможем открыться дикарям ранее, если это позволяет наша §SПолитика вмешательства в миры§!."
 tutorial.2150.name: "Обучение: $tutorial.2006.name$"
 tutorial.2150.desc: "Эта досветовая цивилизация знает о нашем существовании. Теперь мы можем вступить с ее лидерами в ограниченные §Sдипломатические сношения§!, если это позволяет наша §Sполитика§!.\n\nПоскольку населению §Sпланеты§! стало известно о нас, мы больше не сможем получать ценные данные от наблюдения за ее цивилизацией. Наши §Sоперации по наблюдению§! теперь недоступны."
 tutorial.2500.name: "Обучение: маскировочные поля"
 tutorial.2500.desc: "Недавние достижения в области управления полями привели к изобретению таких устройств, как §S$science_cloaking_components$§!. Эти энергоемкие агрегаты выделяют модифицированные частицы полей, укрывающие наши научные и военные корабли от обычных датчиков.\n\nОднако во включенном состоянии эти маскировочные поля ухудшают такие показатели, как §S$MOD_SHIP_BASE_SPEED_MULT$§!, §S$MOD_SHIP_WINDUP_MULT$§! и §S$MOD_SHIP_SHIELD_HP_ADD$§!.\n\n§SЗамаскированные§! и необнаруженные корабли игнорируют §Sзакрытые границы§!.\n§SЗамаскированные§! £science_ship£ §Sнаучные корабли§! могут вести §Sактивную разведку§! чужих £colony£ §Sколоний§!, собирая таким образом разведданные о других государствах."
 tutorial.2550.name: "Обучение: обнаружение маскировки"
 tutorial.2550.desc: "Недавние достижения в области вычислительной техники привели к изобретению таких устройств, как §S$sm_detection_array_plural$§!. Установка этих мощных внешних датчиков на §Sкосмические базы§! позволит им обнаруживать §Sзамаскированные§! флоты.\n\nЧувствительность §Sкомплексов обнаружения§! можно повысить, установив несколько комплексов сразу, что поможет им обнаруживать более мощные §Sмаскировочные поля§!.\n\nДальнейшие исследования откроют нам возможность усиливать чувствительность этой аппаратуры с помощью £science_ship£ §Sнаучных кораблей§!. §SДальность действия сенсоров§! ограничена соответствующим показателем космической базы."
