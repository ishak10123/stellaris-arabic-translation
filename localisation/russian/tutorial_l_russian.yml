 tutorial_survey_system_chain_title: "Обучение: переключение карты галактики"
 tutorial_survey_system_chain_desc: "Чтобы исследовать звезды, сначала нужно расширить наш кругозор. К счастью, в нашем распоряжении хитроумная §Sкарта галактики§!. Для доступа к карте галактики нажмите клавишу §SM§! или кнопку «Галактика» в нижней части экрана. После этого вы можете с чистой совестью закрыть журнал, нажав клавишу §SEsc§! или кнопку в правом верхнем углу."
 map_toggled: "Карта галактики выбрана"
 tutorial_survey_system_tooltip: "§SОбучение: переключение карты галактики§! добавлено в журнал"
 tutorial_1_chain_title: "Обучение: изучить систему"
 tutorial_1_chain_desc: "Для начала выберите £science_ship£ §Sнаучный корабль§!. Для этого щёлкните по §Sкораблю§! на §Hкарте галактики§! или выберите его в §Sпланировщике§!.\n\nОткрыв §Sкарту галактики§!, нажмите на кнопку §SИзучить§! в окне флотилии в левом нижнем углу, а затем выберите неизученную £system£ §Sсистему§!. Или же можете щёлкнуть правой кнопкой мыши по неизученной системе и выбрать §SИзучить систему§!.\n\nНаш §Sнаучный корабль§! проложит курс к системе и изучит все находящиеся в ней небесные тела."
 tutorial_unpause_chain_tooltip: "§SОбучение: снятие с паузы§! добавлено в журнал"
 tutorial_unpause_chain_title: "Обучение: снятие с паузы"
 tutorial_unpause_chain_desc: "£science_ship£ §SНаучный корабль§! готов приступить к исследованию галактики, осталось лишь снять игру с паузы. Для этого достаточно нажать клавишу §SПробел§! £space£ или выбрать соответствующий значок на верхней панели:\n\n$tttt$$tttt$$t$£pause_button£\n"
 unpaused_game: "Симуляция снята с паузы"
 system_surveyed: "Соседняя система изучена"
 tutorial_1_tooltip: "Запись §SОбучение: изучить систему§! добавлена в журнал"
 tutorial_2_chain_title: "Обучение: изучение технологий"
 tutorial_2_chain_desc: "Мы должны изучить новые технологии. §SПротокол освоения новых миров§! откроет нам доступ к строительству £colony_ship£ §Sколониальных кораблей§!. Мы должны сосредоточиться на этом в первую очередь, если хотим расширять свое государство в космосе.\n\nОткройте экран §Sтехнологий§!, щелкнув по соответствующей кнопке в левой части верхнего меню или нажав §SF4§!. Затем щелкните по пункту §SВыбрать исследование§! и выберите из предложенных вариантов технологию, которую вы желаете изучить."
 tech_1_researched: "Протокол освоения новых миров изучен"
 tech_2_researched: "Космическое строительство изучено"
 tutorial_2_tooltip: "Запись §SОбучение: изучение технологий§! добавлена в журнал"
 tutorial_3_chain_title: "Обучение: [GetBuildGrow] строительный корабль"
 tutorial_3_chain_desc: "Нам нужен £construction_ship£ §Sстроительный корабль§!, чтобы добыть ресурсы, обнаруженные нашим £science_ship£ §Sнаучным кораблем§!.\n\nЩелкните на космическую базу, откройте вкладку §SВерфь§! и выберите §SСтроительный корабль§! из предложенных вариантов.\n\nУчтите, что перед началом строительства §Sкорабля§! вам нужно накопить достаточно £alloys£ §Sсплавов§!."
 construction_ship_built: "Строительный корабль построен"
 tutorial_3_tooltip: "Запись §SОбучение: [GetBuildGrow] строительный корабль§! добавлена в журнал"
 tutorial_4_chain_title: "Обучение: [GetBuildGrow] добывающую станцию"
 tutorial_4_chain_desc: "Прежде чем мы сможем добыть £minerals£ §Sминералы§! или извлечь §Sредкий ресурс§! из £planet£ §Sпланеты§!, мы должны построить £mining_station£ §Sдобывающую станцию§! на ее орбите. Чтобы сделать это, выберите £construction_ship£ §Sстроительный корабль§!, щелкнув прямо по нему, или найдите его в §Sпланировщике§! в правой части экрана.\n\nПосле этого щелкните по пункту §S[GetBuildGrowCap] добывающую станцию§! в меню строительного корабля. Затем щелкните по доступной планете или астероиде с месторождением минералов.\n\nУчтите, что для строительства £mining_station£ §Sдобывающей станции§! тоже нужны £minerals£ §Sминералы§!, поэтому вам придется накопить некоторый запас."
 mining_station_built: "Добывающая станция построена"
 tutorial_4_tooltip: "Запись §SОбучение: [GetBuildGrow] добывающую станцию§! добавлена в журнал"
 tutorial_5_chain_title: "Обучение: [GetBuildGrow] научную станцию"
 tutorial_5_chain_desc: "Чтобы повысить темп изучения новых технологий, мы должны строить £science_ship£ §Sнаучные станции§! на орбитах миров, где есть £physics£ §Sфизические§!, £society£ §Sсоциологические§! или £engineering£ §Sинженерные§! ресурсы.\n\nНаучные станции работают по тому же принципу, что и £mining_station£ §Sдобывающие§!, разница лишь в получаемых ресурсах. Эти станции не добывают £minerals£ §Sминералы§! и £strategic_resource£ §Sредкие ресурсы§!.\n\nЧтобы [GetBuildGrow] такую станцию, выберите £construction_ship£ §Sстроительный корабль§! и щелкните по пункту §S[GetBuildGrowCap] научную станцию§! в его меню. Затем щелкните по доступной £planet£ §Sпланете§!, астероиду или звезде, где есть запасы физических, социологических или инженерных ресурсов."
 research_station_built: "Научная станция построена"
 tutorial_5_tooltip: "Запись §SОбучение: [GetBuildGrow] научную станцию§! добавлена в журнал"
 tutorial_6_chain_title: "Обучение: наземные сооружения"
 tutorial_6_chain_desc: "В нашем родном мире уже есть несколько £building£ §Sсооружений§!, но давайте построим ещё одно.\n\nДля этого выберите наш родной мир в §Sпланировщике§! и перейдите на вкладку §SПоверхность§!. Нажмите на пустую ячейку для сооружения в какой-нибудь зоне, а затем выберите одно из доступных сооружений. Если у нас хватает §Sресурсов§!, сразу же начнётся строительство.\n\nСооружения предоставляют £job£ §Sдолжности§!, но ничего не будет производиться, пока £pops£ §Sпоселения§! не займут эти должности. Узнать, на каких должностях трудятся §Sпоселения§!, можно во вкладке §SЭкономика§!."
 building_constructed: "Сооружения построены"
 tutorial_6_tooltip: "Запись §SОбучение: наземные сооружения§! добавлена в журнал"
 tutorial_7_chain_title: "Обучение: расчистка препятствий"
 tutorial_7_chain_desc: "Несколько £blocker£ §Sпрепятствий§! в нашем родном мире мешают строительству новых §Sрайонов§!, поэтому их надо расчистить. На это потребуется время и §Sресурсы§!.\n\nЧтобы расчистить §Sпрепятствие§!, нажмите на кнопку §SРасчистить препятствие§! на самом препятствии — его можно найти во вкладке §SУправление§!.\n\n\n$tttt$$tttt$$tt$£clear_blocker£\n\n\nУ разных §Sпрепятствий§! разная скорость и стоимость расчистки, а также разные требуемые технологии."
 blockers_cleared: "Препятствия расчищены"
 tutorial_7_tooltip: "Запись §SОбучение: заблокированные особенности§! добавлена в журнал"
 tutorial_8_chain_title: "Обучение: изучить системы"
 tutorial_8_chain_desc: "Мы должны расширить сферу нашего влияния за пределы родной £system£ §Sсистемы§!, и первым шагом на пути к этому станет изучение соседних систем.\n\nЧтобы сделать это, выберите £science_ship£ §Sнаучный корабль§! и щелкните по кнопке §SИзучить§! в его меню. Затем щелкните по кнопке §SОткрыть карту галактики§! в нижней части экрана и выберите звезду, соседствующую с нашей. §SНаучный корабль§! отправится в эту систему и изучит все ее космические тела."
 tutorial_8_poi: "Цели для изучения"
 tutorial_8_poi_desc: "Изучить системы: §S[survey_target_1.GetName]§!, §S[survey_target_2.GetName]§! и §S[survey_target_3.GetName]§!."
 systems_surveyed: "Системы изучены"
 tutorial_8_tooltip: "Запись §SОбучение: изучить системы§! добавлена в журнал"
 tutorial_9_chain_title: "Обучение: [GetBuildGrow] научный корабль"
 tutorial_9_chain_desc: "Нам стоит начать [GetBuildingGrowing] второй £science_ship£ §Sнаучный корабль§!, чтобы ускорить изучение нашего региона галактики.\n\nЩелкните на космическую базу, откройте закладку §S«Верфь»§! и выберите §SНаучный корабль§! из предложенных вариантов.\n\nУчтите, что перед началом строительства вам нужно накопить достаточно £alloys£ §Sсплавов§!."
 science_ship_built: "Научный корабль построен"
 tutorial_9_tooltip: "Запись §SОбучение: [GetBuildGrow] второй научный корабль§! добавлена в журнал"
 tutorial_10_chain_title: "Обучение: нанять ученого"
 tutorial_10_chain_desc: "Нам нужен £scientist£ §Sучёный§!, который будет командовать новым £science_ship£ §Sнаучным кораблём§! — сам по себе он не может изучать системы и исследовать §Sаномалии§!.\n\nВыберите наш новый §Sнаучный корабль§!, а затем нажмите на портрет в окне флотилии. Откроется окно §Sвыбора лидера§!, в котором перечислены все §Sучёные§! у нас на службе и те, которых можно нанять. Выберите своего кандидата.\n\nДля найма лидеров нужно £unity£ §Yединство§!, и нам, возможно, придётся подождать, чтобы его накопилось достаточно.\n\nКогда учёный нанят и назначен на §Sнаучный корабль§!, можно отправлять его навстречу неизведанному."
 scientist_assigned: "Ученые наняты"
 tutorial_10_tooltip: "Запись §SОбучение: нанять ученого§! добавлена в журнал"
 tutorial_11_chain_title: "Обучение: [GetBuildGrow] колониальный корабль"
 tutorial_11_chain_desc: "Пора колонизировать новый мир. Для начала надо [GetBuildGrow] £colony_ship£ §Sколониальный корабль§!. Чтобы [GetBuildingGrowing] такие §Sкорабли§!, требуется много £alloys£ §Sсплавов§!, £food£ §Sпищи§! и £consumer_goods£ §Sтоваров массового спроса§!, но процветающая £colony£ §Sколония§! окупит эти вложения сторицей.\n\nЩелкните по §Sкосмической базе§! и выберите вкладку §SВерфь§!. Затем выберите §Sколониальный корабль§! из доступных проектов.\n\nПеред началом строительства нужно накопить необходимые ресурсы."
 colony_ship_built: "Колониальные корабли построены"
 tutorial_11_tooltip: "Запись §SОбучение: [GetBuildGrow] колониальный корабль§! добавлена в журнал"
 tutorial_12_chain_title: "Обучение: основать колонию"
 tutorial_12_chain_desc: "Теперь нужно основать нашу первую £colony£ §Sколонию§! с помощью £colony_ship£ §Sколониального корабля§!. Лучшими кандидатами на колонизацию являются планеты того же класса, что и наш родной мир — тогда поселенцы с легкостью приспособятся к новой среде.\n\nЧтобы колонизировать £planet£ §Sпланету§!, щелкните по §Sколониальному кораблю§! или выберите его в §Sпланировщике§!. Затем щелкните по кнопке §SКолонизировать§! в меню флотилии и выберите планету. Вы можете колонизировать только изученные планеты, на которых нет §Sаномалий§!. Кроме этого, они должны находиться внутри границ вашего государства. Хотя вы можете выбрать для колонизации планеты с низким уровнем пригодности для жизни, это может быть очень затратно."
 colony_established: "Колония основана"
 tutorial_12_tooltip: "Запись §SОбучение: основать колонию§! добавлена в журнал"
 tutorial_13_chain_title: "Обучение: нанять губернатора"
 tutorial_13_chain_desc: "Мы должны нанять §Sгубернатора планеты§!, чтобы он управлял новой £colony£ §Sколонией§!. Для этого щелкните по колонии и откройте вкладку §SПланета§!. Затем щелкните по кнопке §SИзменение§! в окне §SГубернатор§!. Откроется экран §SЛидеры§! со списком работающих на нас губернаторов.\n\nЩелкните по кнопке §SНанять§! в верхней части экрана и выберите подходящего кандидата. Помните, что на наем лидеров вы тратите £unity £ §Yединство§!. Если единства недостаточно, вам придется подождать, пока его запас увеличится.\n\nНанятый вами губернатор будет ожидать указаний на нашей родной планете."
 governor_recruited: "Губернатор нанят"
 tutorial_13_tooltip: "Запись §SОбучение: нанять губернатора§! добавлена в журнал"
 tutorial_14_chain_title: "Обучение: основать еще больше колоний"
 tutorial_14_chain_desc: "Продолжайте расширять государство, создавая £colony£ §Sколонии§!. Накопите достаточно £colony_ship£ §Sсплавов§!, £alloys£ §Sпищи§! и £food£ §Sтоваров массового спроса§! чтобы [GetBuildGrow] еще несколько £consumer_goods£ §Sколониальных кораблей§!, а затем отправьте их основывать колонии.\n\nНе основывайте слишком много колоний сразу, так как они будут расходовать £energy£ §Sэнергокредиты§!, пока не выйдут на самообеспечение."
 colonies_established: "Колонии основаны"
 tutorial_14_tooltip: "Запись §SОбучение: основать еще больше колоний§! добавлена в журнал"
 tutorial_15_chain_title: "Обучение: добыча ресурсов"
 tutorial_15_chain_desc: "Наша растущая промышленность требует все новых ресурсов, и мы должны увеличить добычу £minerals£ §Sминералов§!. Для этого нужно строить £mining_station£ §Sдобывающие станции§! на орбитах £planet£ §Sпланет§! и астероидов, где есть залежи минералов, или §Sгорнодобывающие районы§! на поверхности заселенных нами планет.\n\nПоскольку для содержания станций и £building£ §Sсооружений§! нужны £energy£ §Sэнергокредиты§!, нам потребуется мощный источник и этого ресурса. Энергокредиты вырабатываются §Sэнергетическими районами§! на поверхности заселенных нами планет. Их также извлекают §Sдобывающие станции§! на орбите планет, астероидов или звезд, где есть залежи энергокредитов."
 mineral_income: "+30 прирост минералов в месяц"
 credit_income: "+10 прирост энергокредитов в месяц"
 tutorial_15_tooltip: "Запись §SОбучение: добыча ресурсов§! добавлена в журнал"
 tutorial_16_chain_title: "Обучение: увеличение флотилии"
 tutorial_16_chain_desc: "[Root.GetName] требует надежной защиты. Обеспечить ее может могучий космический флот.\n\nДля начала можно построить несколько §Sкорветов§!. Прикажите §Sкосмической базе§! [GetBuildGrow] §Sкорабли§!, как только у нас будет достаточно §Sсплавов§!. Новые военные корабли всегда включаются в состав уже существующих флотилий на орбите их §Sкосмической базы§!.\n\nЧтобы флотилия воевала эффективнее, во главе ее можно поставить §Sадмирала§!. Это даст нам преимущество над другими флотилиями, как правило, лишенными отдельного £commander£ §Sкомандира§!."
 corvettes_built: "Корветы построены"
 admiral_assigned: "Командир назначен"
 tutorial_16_tooltip: "Запись §SОбучение: увеличить флотилию§! добавлена в журнал"
 tutorial_17_chain_title: "Обучение: создать сектор"
 tutorial_17_chain_desc: "Количество £planet£ §Sпланет§!, которыми вы можете управлять напрямую, ограничено. Это значение указано в верхнем меню и, превысив его, вы получите штрафы. §SСекторы§! управляют планетами, переданными им в подчинение, в полуавтономном режиме. Чтобы создать новый сектор, откройте меню §SПланеты и секторы§!, щелкнув по соответствующему значку в раскрывающемся списке верхнего меню или нажав §SF5§!. Затем щелкните по кнопке §SСоздать новый сектор§! в верхнем правом углу.\n\nВы перейдете в §Sрежим управления сектором§!. Здесь вы сможете указать, какие £system£ §Sсистемы§! войдут в создаваемый сектор. Все планеты этих систем окажутся под его управлением. Выберите систему, где у нас есть £colony£ §Sколония§!, и щелкните по кнопке §SЗавершить§!. Вы создали наш первый сектор!"
 sector_established: "Сектор создан"
 tutorial_17_tooltip: "Запись §SОбучение: создать сектор§! добавлена в журнал"
 tutorial_18_chain_title: "Обучение: губернатор сектора"
 tutorial_18_chain_desc: "Для управления новым §Sсектором§! мы должны назначить §Sгубернатора§!. Все £planet£ §Sпланеты§! этого сектора получат бонус в зависимости от уровня навыка и черт губернатора."
 sector_governor_assigned: "Губернатор сектора назначен"
 tutorial_18_tooltip: "Запись §SОбучение: губернатор сектора§! добавлена в журнал"
 tutorial_19_chain_title: "Обучение: конструктор судов"
 tutorial_19_chain_desc: "Чтобы создать новый проект корабля, перейдите в §Sконструктор кораблей§!, нажав на кнопку §Sуправление флотилиями§! на панели слева или клавишу §SF9§!. Затем нажмите на кнопку §SНовый шаблон§! и выберите §Sкорвет§! из предложенных вариантов §Sразмера корпуса§!. Наконец, нажмите на кнопку §SНет модуля§! и выберите §Sмодуль§! для проекта.\n\nКорветы — самые маленькие боевые корабли, поэтому состоят только из одного модуля, тогда как у более крупных кораблей их может быть несколько. От модуля зависит, какие в нём ячейки для §Sоружия§! и §Sсистем§!. Выберите модуль и заполните пустые ячейки компонентами так, чтобы энергия не ушла в минус.\n\nЧтобы упростить себе задачу, нажмите кнопку §SАвтокомплектация§!, и игра сама доделает проект."
 ships_designed: "Проект корабля создан"
 tutorial_19_tooltip: "Запись §SОбучение: конструктор судов§! добавлена в журнал"
 tutorial_20_chain_title: "Обучение: станции наблюдения"
 tutorial_20_chain_desc: "Пора [GetBuildGrow] §Sстанцию наблюдения§! над планетой c §S[Owner.GetPreFTLLower&fem,gen] цивилизацией§!. Эти космические станции выполняют различные §Sзадания§! в зависимости от нашей готовности вмешаться в ход развития чужого общества.\n\nСтанции наблюдения строятся так же, как £mining_station£ §Sдобывающие§! и £science_ship£ §Sнаучные станции§!, но их можно возводить лишь на орбите [Owner.GetPreFTLLowerPlural&pl,gen] планет. Выберите £construction_ship£ §Sстроительный корабль§! и щелкните по кнопке §S[GetBuildGrowCap] станцию наблюдения§! в списке приказов.\n\nВыберите планету, где живут интересные вам [Owner.GetPreFTLLowerPlural&plain] существа, и строительный корабль приступит к выполнению задания."
 observation_post_built: "Станция наблюдения построена"
 tutorial_20_tooltip: "Запись §SОбучение: станции наблюдения§! добавлена в журнал"
 tutorial_21_chain_title: "Обучение: редкие ресурсы"
 tutorial_21_chain_desc: "Пора [GetBuildGrow] £mining_station£ §Sдобывающую станцию§! на орбите космического тела, где найден £strategic_resource£ §Sредкий ресурс§!. Эти уникальные материалы обладают огромной стратегической важностью.\n\nОбнаружив такой ресурс в ходе §Sизучения§!, выберите £construction_ship£ §Sстроительный корабль§!, щелкните по кнопке §S[GetBuildGrowCap] добывающую станцию§!, затем — по нужному космическому телу."
 tutorial_21b_chain_title: "Информация: редкие ресурсы"
 tutorial_21b_chain_desc: "Мы построили £mining_station£ §Sдобывающую станцию§! на орбите космического тела, где найден £strategic_resource£ §Sредкий ресурс§!. Эти редкие материалы требуют особых технологий добычи, но обладают огромной стратегической важностью, и нам обязательно нужно найти больше."
 strategic_resource_extracted: "Редкий ресурс извлечен"
 tutorial_21_tooltip: "Запись §SОбучение: редкие ресурсы§! добавлена в журнал"
 tutorial_22_chain_title: "Обучение: преображение предразумных"
 tutorial_22_chain_desc: "Нам следует §Sпреобразить§! менее развитых существ, хотя для этого требуется изучить технологию §Sэпигенетических триггеров§!.\n\nЧтобы §Sпреобразить§! предразумных существ, выберите их на экране §SРасы§! и нажмите кнопку «Преобразить»."
 tutorial_22_tooltip: "Запись §SОбучение: преображение предразумных§! добавлена в журнал"
 species_uplifted: "Предразумные существа преображены"
 tutorial_23_chain_title: "Обучение: первый контакт"
 tutorial_23_chain_desc: "Мы обнаружили неизвестных существ в бескрайней тьме космоса, и нам стоит попытаться §Sустановить с ними контакт§!.\n\nДля этого выберите §Sпервый контакт§! в §Sжурнале§! и нажмите на кнопку §SПервый контакт§!, либо щёлкните по значку §Sпервого контакта§! на §Sкарте галактики§!, чтобы сразу перейти к нему.\n\n\n$tttt$$tttt$$ttt$£firstcontact£\n"
 contact_made: "Контакты установлены"
 tutorial_23_tooltip: "Запись §SОбучение: первый контакт§! добавлена в журнал"
 tutorial_24_chain_title: "Обучение: Модифицирование рас"
 tutorial_24_chain_desc: "Мы можем §Sмодифицировать§! любую разумную расу, живущую в нашего государства, при достаточном количестве у нее §Sочков признаков§!.\n\nЭто можно сделать, обратившись к меню §SМодифицирования§! на экране §SРасы§! и запустив соответствующий §Sособый проект§!. Проект требует £society£ §Sсоциологических исследовании§!, и пока он активен, все наши технологии будут развиваться в данном направлении."
 species_modified: "Раса модифицирована"
 tutorial_24_tooltip: "§SОбучение: Модифицирование рас§! добавлено в журнал"
 tutorial_25_chain_title: "Обучение: контроль над системой"
 tutorial_25_chain_desc: "Чтобы расширять границы, мы можем [GetBuildingGrowing] §Sкосмические базы§! на орбитах других звёзд. Так мы устанавливаем контроль над £system£ §Sсистемой§!, получая доступ к её ресурсам, и можем запретить другим известным государствам проходить через неё, закрыв границы.\n\nВыберите £construction_ship£ §Sстроительный корабль§!, затем нажмите на кнопку §S[GetBuildGrowCap] космическую базу§! в окне флотилии и щёлкните левой кнопкой мыши по звезде. Или же можете щёлкнуть правой кнопкой мыши по звезде и выбрать §S[GetBuildGrowCap] космическую базу§!.\n\nВ отличие от орбитальных станций, §Sкосмические базы§! можно строить за пределами наших границ."
 frontier_outpost_built: "Космическая база построена"
 tutorial_25_tooltip: "§SОбучение: космические базы§! добавлено в журнал"
 TUTORIAL_PLANETVIEW_MANAGEMENT_TITLE: "Обучение: управление планетой"
 TUTORIAL_PLANETVIEW_MANAGEMENT_DESC: "Во вкладке §SУправление§! выводятся важные сведения о состоянии £planet£ §Sпланеты§! и ее инфраструктуре.\n\nВ разделе §SСвойства планеты§! представлены естественные £blocker£ §Sпрепятствия§!, которые можно расчистить, а также существующие §Sсвойства§!.\n\n§SТекущая численность населения§! перечисляет все £pops£ §Sпоселения§! на £planet£ §Sпланете§!.\n\n£sector£ Панель §Sсектора§! позволяет управлять планетой в рамках §Sсектора§!, автоматизируя планетарную администрацию.\n\n§SПреображение колонии§! позволяет развивать колонии, фактически прокачивая свои §Sпланеты§! при условии, что у вас есть необходимые ресурсы."
 TUTORIAL_DATABANK_TITLE: "Обучение: банк данных"
 TUTORIAL_DATABANK_DESC: "£databank£ §SБанк данных§! — это ценнейший ресурс, который поможет разобраться во всех игровых механиках.\n\nЗаписи в нём организованы по категориям, благодаря чему легко будет найти интересующие механики, §Sсвойства§! или игровые понятия.\n\nПросто воспользуйтесь поиском или выберите тему из списка, чтобы узнать подробности."
 TUTORIAL_EMPIRE_FOCUS_TIMELINE_TITLE: "Обучение: приоритеты и хроника"
 TUTORIAL_EMPIRE_FOCUS_TIMELINE_DESC: "£focus_core£ §SПриоритет государства§! — это система, которая поможет вам в развитии государства, позволяя сделать ставку на £focus_exploration£ §Sисследование§!, £focus_conquest£ §Sзавоевание§! или £focus_development£ §Sразвитие§!.\n\nКаждый из приоритетов включает набор карточек с заданиями, которые предложат направление в соответствии с выбранным путём развития. За выполнение заданий даются §Sочки прогресса§! в соответствующей категории.\n\nТекущий приоритет повышает шансы получить связанные с ним задания. При желании можно заменить карточки, заплатив £unity£ §Sединством§!, или поменять приоритет.\n\nОтслеживайте цели во вкладках §SЗавершено§! и §SПрогресс§!, чтобы понять, насколько близки вы к награде за следующий уровень.\n\n§SХроника§! представляет важные вехи и исторические события государства, начиная с его §Sпроисхождения§!. Новые записи будут появляться по мере развития ключевых событий."
 TUTORIAL_COLONIZATION_TITLE: "Обучение: колонизация планеты"
 TUTORIAL_COLONIZATION_DESC: "Экран §Sколонизации§! позволяет подготовиться к колонизации планеты.\n\nЗдесь нужно выбрать §Sрасу§!, которая заселит эту планету, и §Sкатегорию колонии§!, чтобы обозначить направление её развития.\n\nНа этом же экране отображаются доступные §Sрайоны§!, §Sразмер планеты§! и потенциальные §Sмодификаторы§!, а также все важные §Sсвойства планеты§!.\n\nРазвивайте §Sпланеты§! в соответствии с их природными богатствами — так вы сможете извлечь максимум из колоний."
