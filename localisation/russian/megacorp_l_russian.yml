 building_foundry_2_effect_desc: "Повышает базовую эффективность должностей, производящих £alloys£ §Yсплавы§!, на §G1§!. Стоимость содержания увеличивается соответственно."
 building_foundry_3_effect_desc: "Повышает базовую эффективность должностей, производящих £alloys£ §Yсплавы§!, на §G2§!. Стоимость содержания увеличивается соответственно."
 building_factory_2_effect_desc: "Повышает базовую эффективность должностей, производящих £consumer_goods£ §Yтовары массового спроса§!, на §G1§!. Стоимость содержания увеличивается соответственно."
 building_factory_3_effect_desc: "Повышает базовую эффективность должностей, производящих £consumer_goods£ §Yтовары массового спроса§!, на §G2§!. Стоимость содержания увеличивается соответственно."
 building_food_processing_facility_effect_desc: "Повышает базовую эффективность должностей, производящих £food£ §Yпищу§!, на §G1§!."
 building_food_processing_center_effect_desc: "Повышает базовую эффективность должностей, производящих £food£ §Yпищу§!, на §G2§!."
 building_mineral_purification_plant_effect_desc: "Повышает базовую эффективность должностей, производящих £minerals£ §Yминералы§!, на §G1§!."
 building_mineral_purification_hub_effect_desc: "Повышает базовую эффективность должностей, производящих £minerals£ §Yминералы§!, на §G2§!."
 building_energy_nexus_effect_desc: "Повышает базовую эффективность должностей, производящих £energy£ §Yэнергию§!, на §G2§!."
 industrial_focus_limit: "На мирах, не являющихся экуменополисами, можно строить только одно промышленное сооружение."
 ONLY_ONE_INDUSTRIAL_BUILDING: "$TRIGGER_FAIL$§R$industrial_focus_limit$§!"
 NO_POP_CATEGORY_TITLE: "Без категории"
 NO_POP_CATEGORY_TITLE_PLURAL: "Без категории"
 NO_POP_CATEGORY_TITLE_DESC: "Эти поселения не принадлежат к какому-то конкретному социальному слою."
 MOD_POP_POLITICAL_POWER: "Политическая власть поселения"
 pop_cat_civilian: "Гражданин"
 pop_cat_civilian_plural: "Граждане"
 pop_cat_civilian_desc: "Доля нашего населения, которая нигде не работает и не учится. Может переселиться в поисках работы."
 mod_pop_cat_civilian_political_power: "$pop_cat_civilian$: политическая власть"
