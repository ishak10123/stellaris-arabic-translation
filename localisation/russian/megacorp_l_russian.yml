 #Lootboxes
 cara_home_lootbox.title: "$lootboxes$"
 lootboxdesc1: "§EНа богато украшенном постаменте лежит древний $lootbox$. Внутри наверняка полно несметных богатств.§!"
 cara_home_lootbox_explain: "Что такое $lootboxes$?"
 cara_home_lootbox_explain.reply: "Это давняя история, но не длинная.\n\nКогда караваны впервые объединились, и возникло государство [caravaneer_home_country.GetName], было решено, что небольшая случайная часть товаров, проходящих через эту станцию каждый год, будет изыматься, помещаться в герметично закрытые контейнеры и храниться в грузовом отсеке на самом низком уровне станции. Этой традиции придерживались с незапамятных времен, и недавно торговый отсек заполнился.\n\nОтныне наш долг — продавать эти герметичные $lootboxes$."
 cara_home_lootbox_contents: "Что содержит $lootbox$?"
 cara_home_lootbox_contents.reply: "Нам запрещено знать об этом. Это знание — для покупателя.\n\nОднако мы точно знаем, что на каком-то этапе истории Караванщиков содержимое посчитали ценным. Хотя есть некоторые свидетельства, что $lootboxes$ использовались для уборки мусора во время краткого третьего правления Безумного Брокера…"
 openedlootboxdesc1: "§E$lootbox$… §Rпуст§!.\n\nДушу раздирает горькое разочарование, но вы изо всех сил пытаетесь сохранить самообладание перед лицом этого случайного унижения. Неужели внезапно повысился уровень влажности, или ваши органы зрения увлажнились самопроизвольно? Ваш взор затуманивается, $lootbox$ от этого не стал полнее.\n\nНо в тот момент когда экзистенциальная тьма грозит поглотить вас, она резко исчезает. Что это за чувство? Пока вы вспоминаете, сколько усилий было потрачено на эти $ccoinz$, какие острые эмоции испытываешь, когда $lootbox$ открывается… вас наполняет необъяснимое §Gчувство гордости и удовлетворения§!.§!"
 openedlootboxdesc2: ""
 openedlootboxdesc3: "openedlootboxdesc3"
 openedlootboxdesc4: "openedlootboxdesc4"
 openedlootboxdesc5: "openedlootboxdesc5"
 buying_boxes_desc: "Слушайте, мы понимаем, что вы любите реликварии! Обычно мы ограничиваем продажу одному клиенту, но ради вас готовы сделать исключение. Отныне вы сможете напрямую приобретать реликварии за символическую доплату в §Yэнергокредитах§!."
 cara_home_lootbox_buy: "Мы купим $lootbox$."
 cara_home_lootbox_buy.tooltip: "Купите $lootbox$ за §R$boxcost$§! $ccoinz$."
 cara_home_lootbox_buy_energy: "Мы купим $lootbox$ за энергию."
 cara_home_lootbox_buy_energy.tooltip: "Купите $lootbox$ за §R[root.box_cost]§! £energy£ §Yэнергокредитов§!."
 boxcost: "6194.21"
 lootbox_buy_allow_fail: "§RУ вас недостаточно $ccoinz$§!"
 lootbox.intro: "Открыв $lootbox$, мы находим…"
 lootbox.and: "\nПорывшись внутри, мы получаем…"
 lootbox_contents_empty: "§Rничего§!."
 lootbox_contents_a: "§EРеликварий содержит древнюю карту давно уже неиспользуемых торговых маршрутов, где есть и наша столичная система §Y[Root.Capital.GetStarName]§!§!!"
 lootbox_contents_b: "§EРеликварий содержит полный комплект парадной одежды. К сожалению, она предназначена для рас с намного большим количеством конечностей, чем то, к которому привыкли в [Root.GetName&prep].\n\nМатериал, правда, можно использовать для других целей.§!"
 lootbox_contents_c: "§EРеликварий содержит бомбу!\n\nЕе быстро обезвреживают.§!"
 lootbox_contents_c.tooltip: "Какое облегчение."
 lootbox_contents_d: "§EРеликварий содержит трактат о любви и цикличной природе вещей. Язык — [Root.GetAdj&masc], стиль — современный.§!"
 lootbox_contents_e: "§EРеликварий содержит оружие неизвестного происхождения, но при этом спусковой механизм явно удален.§!"
 lootbox_contents_e.tooltip: "Странно."
 lootbox_contents_f: "§EРеликварий содержит партию военных пайков. Маркировка на упаковке полностью стерлась, но содержимое, похоже, в порядке и совместимо с [Root.GetAdj&fem,gen] биологией.§!"
 lootbox_contents_g: "§EИз реликвария слышится музыка, но очевидный механизм воспроизведения отсутствует.\n\nВскоре мы закрываем $lootbox$ и забываем о нем.§!"
 lootbox_contents_g.tooltip: "Тишина."
 lootbox_contents_h: "§EРеликварий полон красивых синих мраморных шариков.§!"
 lootbox_contents_i: "§EРеликварий полон несметных богатств. Никто из присутствовавших при открытии не смог бы точно описать, как много их было, если бы они вообще признали факт их существования.\n\nОднако в балансных ведомостях казначейства на этот счет есть четкие цифры.§!"
 lootbox_contents_j: "§EРеликварий содержит несколько устройств инопланетного происхождения, бездействующих и, похоже, сломанных.§!"
 lootbox_contents_k: "§EРеликварий пусто, но на его стенках отметины и царапины. Из более крупных углублений можно взять следы биологического материала для анализа.§!"
 lootbox_contents_l: "§EРеликварий содержит создание, которое существует только в виде диапазона волн разной длины в эфирной среде. Оно немедленно сбегает в более высокие сферы, оставив после себя глубокое чувство озарения и парализующий страх.§!"
 lootbox_contents_m: "§EРеликварий открыть непросто, так как изнутри крышку плотно удерживает гравитационная аномалия.§!"
 lootbox_contents_n: "§EРеликварий ничего не содержит. Там, где можно было ожидать пустое место для хранилища, находится гладкий блок металлического сплава, причем одна внутренняя стенка сплавилась с другой, не оставив даже следов.§!"
 lootbox_contents_galatron: "§E§!Галатрон§E!..§!"
 cara_home_galatron.title: "Галатрон"
 cara_home_galatron.desc: "§EГалатрон§! ваш!"
 cara.320.a: "Что это?"
 cara.320.a.reply: "Это §EГалатрон§!. Основа основ Караванщиков, тотем, на котором наши предки поклялись в верности и сформировали организацию под названием $NAME_Caravaneer_Home$.\n\nЕе успех на раннем этапе традиционно приписывается ужасной силе, которой обладает §EГалатрон§!, хотя в чем именно заключается эта сила, со временем забыли."
 cara.320.b: "Что он делает?"
 cara.320.b.reply: "Это §EГалатрон§!! Он §Eгалатронит§!!\n\nПредположительно."
 cara.320.c: "Какова его стоимость? Можно ли его продать?"
 cara.320.c.reply: "Его стоимость нельзя измерить деньгами. Никто не купит у вас §EГалатрон§!, хотя вся галактика будет ликовать в лучах его света.\n\nНо не забывайте, что традиция позволяет отобрать его у недостойных как военный трофей."
 cara.320.d: "Спасибо? Пока?.."
 cara.910.name: "$cara.920.name$"
 cara.910.desc: "Мы сокрушили наживающихся за чужой счет паразитов, домом которым служила торговая станция «Тангл». $NAME_Caravaneer_Home$ больше не существует!"
 cara.920.name: "§H$caravaneers$§!: Станция «Тангл» уничтожена"
 cara.920.desc: "Торговая станция Караванщиков уничтожена [From.From.GetName&inst]. Мы не смогли подтвердить наличие хоть каких-то выживших после этой резни."
 cara.930.name: "$NAME_Caravaneer_Home$"
 cara.930.desc: "Алло? Да? Вы меня слышите?\n\nПревосходно. Вам, возможно, уже известно, что торговая станция «Тангл», служившая домом всем Караванщикам, недавно подверглась жестокой атаке. Некоторым просто не нравится свободное перемещение товаров и услуг! Напавшие считают нас мертвыми, но, как вы видите, совет караван-сарая выжил.\n\nМы желаем возобновить свою деятельность в системе §Y[cara_home_new_location.GetName]§!. Естественно, в этом случае система формально перестанет быть вашей, но мы в долгу не останемся."
 cara.930.a: "Система ваша, друзья по коммерции."
 cara.930.a.tooltip: "$NAME_Caravaneer_Home$ получает под свой контроль систему §Y[cara_home_new_location.GetName]§!"
 cara.930.b: "Система стратегически слишком важна, чтобы сдаваться."
 cara.930.c: "Мы возмущены, что вы выжили. Убирайтесь."
 cara.940.name: "§H$caravaneers$§!: Успешное восстановление"
 cara.940.desc: "[caravaneer_home_country.GetName] успешно восстановила свою торговую станцию в системе [cara_home_new_location.GetName], на бывшей [From.GetAdj&fem,gen] территории."
 cara.940.b.reply: "Жаль, но все победителями быть не могут! Вы, в частности, сделали выбор не быть победителем.\n\nПрощайте."
 #Galatron
 cara.950.name: "Захват §EГалатрона§!"
 cara.950.desc: "[From.From.GetName] признает свое поражение, и мы отнимаем славный Галатрон у этих недостойных!"
 cara.950.a: "Да сияет вечно его спокойный свет!"
 cara.951.name: "Потеря §EГалатрона§!"
 cara.951.desc: "Если не считать многочисленных функционеров, которые бились в истерике, передача Галатрона [From.GetAdj&pl,dat] силам прошла без эксцессов."
 cara.951.a: "Бессловесный страдальческий вой."
 #Fleet 1
 cara_fleet1_contact.title: "§YФлотилия караванщиков:§! Венгралийский Триум"
 fleet1contact_opening: "Вас приветствует Венгралийский Триум, сертифицированные торговцы-караванщики Коалиции караванов караван-сарая!"
 fleet1contact1: "$fleet1contact_opening$ Мы предлагаем вам эксклюзивные товары из самых дальних уголков галактики (воссозданные нашими корабельными фабриками) по доступным ценам.\n\n$fleet1contact_explanation$"
 fleet1contact2: "$fleet1contact_opening$ Мы учим чужаков получать существенный дополнительный доход при работе на дому, но у вас, похоже, дела и так идут хорошо.\n\n$fleet1contact_explanation$"
 fleet1contact3: "$fleet1contact_opening$ Мы ищем личной прибыли, но не только для себя. Работа в команде творит чудеса!\n\n$fleet1contact_explanation$"
 fleet1contact_explanation: "При каждом проходе через вашу территорию мы будем предлагать вам эксклюзивные сделки. Как бы это ни было заманчиво, вам не обязательно сразу же соглашаться! Вы можете попросить нас связаться с вами перед тем, как мы покинем ваше пространство, и мы сделаем это, но знайте, что все входящие звонки перенаправляются на планету $NAME_Caravaneer_Home$."
 fleet1contact1notinborder: "$fleet1contact_opening$ Мы предлагаем вам эксклюзивные товары из самых дальних уголков галактики (воссозданные нашими корабельными фабриками) по доступным ценам.\n\n$fleet1contact_explanation_notinborder$"
 fleet1contact2notinborder: "$fleet1contact_opening$ Мы учим чужаков получать существенный дополнительный доход при работе на дому, но у вас, похоже, дела и так идут хорошо.\n\n$fleet1contact_explanation_notinborder$"
 fleet1contact3notinborder: "$fleet1contact_opening$ Мы ищем личной прибыли, но не только для себя. Работа в команде творит чудеса!\n\n$fleet1contact_explanation_notinborder$"
 fleet1contact_explanation_notinborder: "По прибытии на вашу территорию мы сделаем вам уникальное предложение. К сожалению, в настоящий момент на вашей территории нет наших кораблей, но мы уже предвкушаем будущие сделки! До тех пор не стесняйтесь связываться с нами, но учтите, что не мы, а $NAME_Caravaneer_Home$ будет получать все входящие вызовы."
 cara_fleet1_contacted: "Приветствуем вас, караванщики."
 cara_fleet1_exit: "Нас это не интересует. Следуйте своей дорогой."
 cara_fleet1_main.title: "$cara_fleet1_contact.title$"
 fleet1hewwo01: "Весьма ограниченное предложение по продаже экстракта эндокринной системы блоргов для частных организаций. Отлично подходит для полупроницаемых мембран всех видов!"
 fleet1hewwo02: "Иногда кажется, что ничто не имеет смысла. Но затем я вспоминаю, что богатство и счастье совсем рядом, только руку протяни!\n\nРасскажи об этом своим друзьям!"
 fleet1hewwo03: "В питательную смесь «Банет» население НЕ входит.\n\nКомпоненты очень полезны и держатся в секрете."
 fleet1hewwo04: "Обратите внимание, что наклейка §R«МОЖЕТ СОДЕРЖАТЬ СЛЕДЫ ВЕНГРАЛИЙСКИХ ОТХОДОВ»§! указывает лишь на то, что данный продукт был произведен на предприятиях, которые также занимаются переработкой венгралийских отходов, а не то, что сам продукт относится к венгралийским отходам."
 fleet1hewwo05: "Нам всегда требуются нижестоящие дистрибьюторы. Хотите стать частью семьи Триум?"
 fleet1hewwo06: "Венгралийскому знаку качества можно доверять."
 fleet1hewwo07: "Предлагать возмещение — это выказывать недоверие к качеству собственной продукции. Мы полностью уверены в наших товарах."
 fleet1hewwo08: "Мы учим чужаков получать существенный дополнительный доход при работе на дому."
 fleet1hewwo09: "Дело не в продукции, а в тех преимуществах, которые открывает покупка."
 fleet1hewwo10: "Вы, случайно, не знаете каких-нибудь разумных существ, которые могли воспользоваться дополнительным потоком энергокредитов?"
 fleet1hewwo11: "Хотя наша продукция продается практически сама по себе, мы тоже приложим усилия, чтобы продать ее. Вам."
 fleet1hewwo12: "Прошу, купите что-нибудь. Хоть что-то. Ну… пожалуйста."
 fleet1hewwo13: "Каждый член Венгралийского Триума сам себе хозяин. Из-за этого возникают определенные… административные проблемы."
 fleet1hewwo14: "Венгралийский Триум был создан для торговли. Это аналог венгралийской крови. Не заниматься торговлей — это…\n\nНеправильно.\n\nПоэтому…"
 fleet1hewwo15: "Даже в самых старых приходных книгах в венгралийской истории упоминаются торговцы звезды Орлан. Они позволили нам эволюционировать от животного состояния до продажи кухонных принадлежностей."
 fleet1hewwo16: "Наследие Венгралийского Триума — это также наследие торговцев звезды Орлан. Их больше нет с нами, но предписанные квоты все равно нужно соблюдать!"
 cara_fleet1_deals.title: "$cara_fleet1_contact.title$"
 fleet1dealdesc1: "Мы предлагаем вам такой продукт, как [Root.GetFleet1DealProduct].\n\nИ за все это мы просим очень низкую цену: [Root.GetFleet1DealCost]\n\n[Root.GetFleet1DealProductAddendum]"
 cara_fleet1_deal: "Покажите нам ваши товары."
 cara_fleet1_take_deal: "Договорились."
 cara_fleet1_take_deal_fail.tooltip: "§RНет доступных научных кораблей§!"
 cara_fleet1_dealtaken: "Приятно иметь с вами дело. И помните: нужно не просто мечтать, а воплощать мечту в жизнь!"
 cost_500energy: "Энергокредиты: £energy£ §R−500§!"
 cost_1cruiser: "£military_ship£ §Rодин§! [Root.GetAdj&masc] крейсер!"
 cost_5000food: "Пища: £food£ §R−5000§!"
 cost_3pops: "£pop£ §R-100§! [Root.GetAdj&neut] поселений с [Root.Capital.GetPlanetMoon]ы [Root.Capital.GetName]!"
 cost_2000energy: "Энергокредиты: £energy£ §R−2000§!"
 product_randomtech: "Получите §Yслучайную технологию§!"
 fleet1product1: "§GДвухъярусные кровати марки «Триум»§!! Эти инновационные, экономящие пространство, штабелируемые «сосуды отдыха» увеличивают потенциал обитания планетарного жилья, позволяя вам «впихнуть» больше населения на квадратный метр!"
 fleet1product1_addendum: "§HОдноразовая доставка в §Yодну колонию§!. Двухъярусные кровати гарантированно прослужат §Y80 лет§! и не больше. §Y$MOD_PLANET_HOUSING_ADD$ повышается§! на §G+10%§! на указанный срок.§!\n\n(Услуга тщательно продуманного размещения двухъярусных кроватей не прилагается. Использование таких кроватей коррелирует со значительным повышением количества легких травм, вызванных падением с кровати. Могут возникнуть проблемы с соблюдением неприкосновенности частной жизни. Могут повышать социальную уязвимость к сезонным заражениям и/или пандемиям.)"
 fleet1product1_tooltip: "§G+1§! решение по §Yиспользованию двухъярусных кроватей§!"
 fleet1product2: "§GПищевые контейнеры марки «Триум»§!! Ваша администрация устала от того, что ваши колонисты позволяют прекрасно усваиваемым веществам растительного или животного происхождения разлагаться в их жилищах, потому что их пищеварительная система может обработать ограниченное количество материалов одновременно?\n\nЭти полупрозрачные контейнеры снабжены герметичной крышкой, которая позволяет приготовленной или сырой пище дольше оставаться свежей. Это идеальный способ сохранить остатки еды в качестве восхитительных и/или номинально питательных закусок на потом, резко сокращая количество пищевых отходов, а следовательно, и потребности в еде. Доставка осуществляется по воздуху путем сброса на выбранную вами колонию."
 fleet1product2_addendum: "§HРазовая доставка только в §Yодну колонию§!. Пищевые контейнеры «Триум» гарантированно прослужат §Y80 лет§!, но не больше. §Y$mod_planet_pops_organics_food_upkeep_mult$§! понижается§! на §G10%§! на указанный срок.\n\n(100% венгралийский защитный полимер, сертифицированный для использования с сукровицей класса III. Безопасен для посудомоечной машины.)"
 fleet1product2_tooltip: "§G+1§! решение по §Yиспользованию пищевых контейнеров «Триум»§!"
 fleet1product3: "§GДезодоратор воздуха марки «Триум»§!! Ваши сельскохозяйственные миры пахнут удобрениями? Ваш экуменополис вызывает реакцию «фу, нет уж, спасибо»? Ваша колония §Eвоняет§!?\n\nУ нас есть решение! Наша запатентованная смесь из микробов и аэрозольных реагентов очистит воздух любой обитаемой тропосферы. Просто устраивайтесь поудобнее, расслабьтесь, выпускайте стратосферных дронов и наслаждайтесь свежим воздухом."
 fleet1product3_addendum: "§HОдноразовая доставка в §Yодну колонию§!. Дезодорирующий эффект гарантированно продержится §Y80 лет§! и не больше. §Y$MOD_PLANET_RESETTLEMENT_UNEMPLOYED_DESTINATION_MULT$§! повышается на §G100%§! на указанный срок.§!\n\n(Авторские права (C) на название марки «Дезодоратор воздуха „Триум“» и слоган «Вы считаете, что сейчас дышите воздухом?» принадлежат Венгралийскому Триуму, 2200 г. Все права сохранены.)"
 fleet1product3_tooltip: "§G+1§! решение по §Yиспользованию дезодоратора воздуха «Триум»§!"
 fleet1product4: "Эксклюзивная §Gколлекция безделушек «Триум»§!! Эти модные побрякушки и сувениры гарантированно поразят воображение вашего населения и отвлекут их от глупых мыслей."
 fleet1product4_addendum: "(Для потенциального покупателя товары массового спроса могут иметь ценность, отличную от фактической стоимости.)"
 fleet1product5: "§GКонтингент торговых специалистов Венгралийского Триума§!. Располагаясь на космических базах вашего государства, они регулируют в сторону увеличения (завистливые конкуренты сказали бы — «искусственно завышают») объём торговли во всех системах."
 fleet1product5_addendum: "§HЭтот контингент будет жить и работать на ваших космических базах, поддерживая свое существование только питательной смесью марки «Триум», и будет влиять только на £trade£ §Yторговлю§!, не затрагивая демографическую и экономическую ситуацию. Командировка продлится §Y80 лет§! и не больше. £trade£ §YТорговля§! повышается на §G+15%§! на указанный срок.§!"
 fleet1product6: "§GСтимуляторы выведения марки «Триум»§!! Устали ждать, пока ваши личинки или особи, эквивалентные им, станут имаго или особями, эквивалентными им? Повысьте скорость их развития с помощью этих сверхбезопасных стимуляторов!"
 fleet1product6_addendum: "Обратите внимание, что через §Hдесять лет§! антитела, существующие в организме вашей расы, нейтрализуют действие этих стимуляторов. Но до тех пор вы увидите шикарный рост населения, ведь §Y$MOD_LOGISTIC_GROWTH_MULT$§! повысится на целых §G10%§!."
 fleet1product7: "несколько чемоданов, а в них немеченые £energy£ §Y$energy$§!! Всего £energy£ §G2000§! §Yэнергокредитов§!. Вы в таком же восторге, как и мы? Мы на это надеемся."
 fleet1product7_addendum: "Венгралийский Триум: помогаем разместить нужных чужаков куда требуется."
 fleet1cost1: "§R200§! £pop£ §Hпоселений§! категории §H$pop_cat_specialist$§!! Нам нужна помощь с бухгалтерией."
 fleet1cost1_tooltip: "§R-200§! £pop£ §Hпоселений§! категории §H$pop_cat_specialist$§!"
 fleet1cost2: "£alloys£ $alloys$: §R+1200§!!"
 fleet1cost3: "£unity£ $unity$: §R500§!! Механический процесс поглощения духа времени понимается с трудом и может вызывать тревогу, но он совершенно безвреден."
 fleet1cost4: "§R§! £society£ $society_research$ в течение шести месяцев! Как именно вы делаете все то, что вы делаете? Мы намерены узнать."
 fleet1cost5: "£science_ship£ §R1§! §Hнаучный корабль§!! Исключая экипаж. Нам он не нужен."
 fleet1dealcost5_tooltip: "£science_ship£ §R−1§! $SCIENCE_SHIP$\n(Ведущий ученый будет переназначен.)"
 fleet1cost6: "§R-200§! £pop£ §Hпоселений§! категории §H$pop$§!! На самом деле любое поселение подойдет. Нас ждут захватывающие возможности в сфере развития медицины! Видите ли, мы недавно стали оказывать еще и услуги по вербовке."
 fleet1cost6_tooltip: "§R-200§! £pop£ §Hпоселений§! категории §H$pop$§!"
 cara_deal_expired.tooltip: "$TRIGGER_FAIL$§RЭта сделка утратила силу. Извините!§!"
 fleet1getback: "Не сейчас. Не могли бы вы связаться с нами попозже?"
 fleet1getbackreply: "Ну конечно же! Мы свяжемся с вами снова, прежде чем покинуть вашу территорию. Но имейте в виду, что за это время условия сделки могут измениться…"
 cara_fleet1_redeals.title: "$cara_fleet1_contact.title$: §Yпоследняя возможность§!"
 fleet1redealdesc1: "Такая возможность выпадает только раз в жизни. Вы готовы воспользоваться ей, пока она не ускользнула?"
 fleet1redealdesc2: "Вскоре мы должны будем расстаться, но вы можете хранить наши замечательные товары у себя вечно."
 fleet1redealdesc3: "Вы осознали, что было бы глупостью упустить такую сделку. Теперь данную мудрость вы можете воплотить в жизнь."
 fleet1redealdesc4: "Дорогие клиенты или, если нам будет позволено сказать, друзья! Мы покидаем вашу территорию. Возможно, вы хотите в последний раз ознакомиться с нашими товарами? Пока мы не встретимся снова, конечно."
 fleet1redealdesc5: "Последний шанс заключить эту сделку в соответствии с вашими пожеланиями! Вы не захотите это пропустить!"
 cara.1002.title: "$NAME_Caravaneer_Fleet1_country$: флот разбит"
 cara.1002.desc: "Мы уничтожили пресмыкающихся паразитов из государства $NAME_Caravaneer_Fleet1_country$! Больше их низкокачественные товары и заискивающие манеры не будут осквернять галактику."
 cara.1003.title: "$NAME_Caravaneer_Fleet1_country$: флот разбит"
 cara.1003.desc: "Нам сообщили, что $NAME_Caravaneer_Fleet1_country$ незамедлительно закрывает свой мобильный магазин из-за полного уничтожения каравана."
 #Fleet 2
 cara_fleet2_contact.title: "§YФлотилия караванщиков:§! Орден Нумы"
 fleet2contact1: "Простите нас за то, что мы омрачили вселенную своим присутствием, [Root.GetSpeciesNamePlural]. Мы Орден Нумы, скромные торговцы на службе богине удачи Нумы. После того как нас сбросили с небес за алчность, мы отринули все материальные блага.\n\n$fleet2contact_explanation$"
 fleet2contact2: "Будьте благословенны, [Root.GetSpeciesNamePlural]. Мы Орден Нумы, состоящий в услужении богине удачи Нумы, и мы привезли вам самый благой товар из далеких уголков галактики.\n\n$fleet2contact_explanation$"
 fleet2contact3: "А, [Root.GetSpeciesNamePlural]! Наконец-то ветра фортуны занесли нас в ваши плодородные земли. Мы Орден Нумы, верные слуги богини Нумы, и мы явились к вам, чтобы предложить ее благословенные товары.\n\n$fleet2contact_explanation$"
 fleet2contact4: "Рады встрече, [Root.GetSpeciesNamePlural]. Мы Орден Нумы, и на наших товарах стоит священная печать богини удачи Нумы. Она давно уже нашептывала нам о далекой цивилизации возле звезды [Root.Capital.GetStarName] и о тех чудесах, которые мы можем обрести вместе.\n\n$fleet2contact_explanation$"
 fleet2contact5: "[Root.GetSpeciesNamePlural]! Божественное вмешательство привело нас на ваши земли. У нас с собой много чудесных вещей. Мы Орден Нумы, и наши сделки скреплены самой богиней удачи.\n\n$fleet2contact_explanation$"
 fleet2contact6: "Но это правда! Вы действительно процветаете, как и предсказывала Нума. Как говорится, удача улыбается храбрым.\n\nМы Орден Нумы, простые торговцы, преданно поклоняющиеся коммерции.\n\n$fleet2contact_explanation$"
 fleet2contact_explanation: "Наши флотилии плывут по божественным потокам космической энергии, куда нас несут ветра фортуны, и предоставляют вам новые сделки каждый раз, как мы появляемся на ваших землях.\n\nЗа скромное пожертвование чудесам вселенной могут стать вашими.\n\nВсе сделки осуществляются в кредитах…"
 fleet2contact1notinborder: "Простите нас за то, что мы омрачили вселенную своим присутствием, [Root.GetSpeciesNamePlural]. Мы Орден Нумы, скромные торговцы на службе богине удачи Нумы. После того как нас сбросили с небес за алчность, мы отринули все материальные блага.\n\n$fleet2contact_explanation_notinborder$"
 fleet2contact2notinborder: "Будьте благословенны, [Root.GetSpeciesNamePlural]. Мы Орден Нумы, состоящий в услужении богине удачи Нумы, и мы привезли вам самый благой товар из далеких уголков галактики.\n\n$fleet2contact_explanation_notinborder$"
 fleet2contact3notinborder: "А, [Root.GetSpeciesNamePlural]! Наконец-то ветра фортуны занесли нас в ваши плодородные земли. Мы Орден Нумы, верные слуги богини Нумы, и мы явились к вам, чтобы предложить ее благословенные товары.\n\n$fleet2contact_explanation_notinborder$"
 fleet2contact4notinborder: "Рады встрече, [Root.GetSpeciesNamePlural]. Мы Орден Нумы, и на наших товарах стоит священная печать богини удачи Нумы. Она давно уже нашептывала нам о далекой цивилизации возле звезды [Root.Capital.GetStarName] и о тех чудесах, которые мы можем обрести вместе.\n\n$fleet2contact_explanation_notinborder$"
 fleet2contact5notinborder: "[Root.GetSpeciesNamePlural]! Божественное вмешательство привело нас на ваши земли. У нас с собой много чудесных вещей. Мы Орден Нумы, и наши сделки скреплены самой богиней удачи.\n\n$fleet2contact_explanation_notinborder$"
 fleet2contact6notinborder: "Но это правда! Вы действительно процветаете, как и предсказывала Нума. Как говорится, удача улыбается храбрым.\n\nМы Орден Нумы, простые торговцы, преданно поклоняющиеся коммерции.\n\n$fleet2contact_explanation_notinborder$"
 fleet2contact_explanation_notinborder: "Наши флотилии плывут по божественным потокам космической энергии, куда нас несут ветра фортуны, и предоставляют вам новые сделки каждый раз, как мы появляемся на ваших землях.\n\nК сожалению, в настоящий момент наши корабли находятся за границами ваших владений, но, когда мы в следующий раз посетим небеса ваших миров, вы сможете открыть для себя чудеса вселенной за скромное пожертвование в виде кредитов…"
 cara_fleet2_main.title: "$cara_fleet2_contact.title$"
 fleet2hewwo1: "Вперед, [Root.GetSpeciesNamePlural]! Испейте из колодца богатства Нумы и навсегда забудьте о жажде."
 fleet2hewwo2: "Следуйте за потоком космических энергокредитов, [Root.GetSpeciesNamePlural], и он приведет вас к истине. Нет лучше товаров, чем те, что несут на себе священную печать Нумы…"
 fleet2hewwo3: "Когда кредиты меняют владельца, Нума улыбается."
 fleet2hewwo4: "Вы называете это честной сделкой? Вы плюете в лицо Нуме — тьфу!\n\nО, да у нас клиенты! Примите наши искренние извинения за эту демонстрацию эмоций. У некоторых не хватает храбрости принять удачу, когда она улыбается им."
 fleet2hewwo5: "Много чудных вещей проходит через наши руки, но мы никогда не набиваем наши карманы. Это жертва, на которую мы идем ради завершения строительства Тессар-Тарвила, чтобы наши дети однажды снова могли узреть землю обетованную."
 fleet2hewwo6: "Богатство обременяет душу, [Root.GetSpeciesNamePlural]. Позвольте нам облегчить вашу ношу."
 fleet2hewwo7: "Рост налогов на товары? Молчите, вы оскорбляете Нуму."
 fleet2hewwo8: "Любые пожертвования Нуме вселенная возвратит десятикратно. Чем меньше вы тратите, друг, тем больше теряете."
 fleet2hewwo9: "Не нужно стесняться! Ознакомьтесь с нашими товарами и присоединяйтесь к поклонению Нуме."
 fleet2hewwo10: "Хорошие сделки предлагаются тем, кто их принимает, [Root.GetSpeciesNamePlural]. Примете участие в нашем священном бартере?"
 fleet2hewwo11: "Любите деньги, и деньги полюбят вас в ответ. Позвольте деньгам течь рекой, и они вернутся к вам безо всяких усилий, в изобилии."
 cara_fleet2_deals.title: "$cara_fleet2_contact.title$"
 fleetdeal_explanation: "\n\nКак обычно, если вам нужно время подумать, мы можем уведомить вас, прежде чем покинуть вашу территорию, что даст вам еще один шанс принять щедрое предложение богини."
 #shrine
 fleet2dealdesc1: "Вы это слышали? Это звук приближающейся выгоды. Да, [Root.GetSpeciesNamePlural], мы предвидим, что вас ждет большая удача.\n\nНума явила нам видение святилища в ее честь в одном из ваших миров. Это святилище принесет вам такое процветание, о котором вы и мечтать не могли. $fleetdeal_explanation$"
 #thralls
 fleet2dealdesc2: "Вот и [fleet2_recent_pop_species.GetName]. Во время нашего паломничества мы спасли немало заблудших душ…\n\nОбратите внимание на этот прекрасный образец, изучивший искусство Нумского управления. Видите, как выглядит его [fleet2_recent_pop_species.GetMouthName] внутри? Этот цвет показывает, что данный объект здоров. А еще из них получаются хорошие работники. А репродуктивная функция поражает воображение. Что скажете? $fleetdeal_explanation$"
 #edict
 fleet2dealdesc3: "Закройте ваши визуальные рецепторы. А теперь представьте, что ласкающий поток энергокредитов несет вас по направлению к горе из еще большего количества энергокредитов.\n\nНаши методы Нумской визуализации помогут вам понять, что нет большей силы, чем сила разума. Вы тоже избавитесь от мирских желаний, и кредиты будут притягиваться к вам как членистоногие к навозу. $fleetdeal_explanation$"
 #technology
 fleet2dealdesc4: "Рисунки в потоке энергии… Они повсюду, но никто их не видит. Только Нума может предсказать божественные приливы и отливы рынка ценных бумаг. А за небольшое пожертвование мы поделимся частью ее мудрости с вами. $fleetdeal_explanation$"
 #Official
 fleet2dealdesc5: "Представляем вам одного из наших лучших духовных лидеров, шакву девятого уровня с повышенными способностями к концентрации и внутренним взором. Под присмотром богини дела в ваших мирах будут процветать.\n\nВзамен мы просим лишь небольшое пожертвование в кредитах… $fleetdeal_explanation$"
 #Crystals for pops
 fleet2dealdesc6: "Достопочтенные [Root.GetSpeciesNamePlural], у нас для вас уникальное предложение… Нума видит, что у вашей расы есть большой потенциал, и поэтому хочет предложить некоторым представителям вашего вида вступить в ряды ее последователей. Взамен вы сможете получить эти бесценные кристаллы… $fleetdeal_explanation$"
 #Cruiser
 fleet2dealdesc7: "Узрите «Благоволение фортуны», наш самый надежный охранный корабль… Сама богиня выбрала его, чтобы сопровождать наш благословенный груз по галактике, и в свое время он помешал многим богохульникам — пиратам, безбожникам, монстрам из пустоты, — которые вставали на божественном пути Нумы! Но он по-прежнему выглядит как новенький…\n\nДа, он служил удаче, а теперь, за скромное пожертвование, он может послужить и вам…$fleetdeal_explanation$"
 #Districts for Machines
 fleet2dealdesc8: "Простите нашу навязчивость, но мы заметили, что ваша планета §Y[fleet2deal8planet.GetName]§! имеет уникальный потенциал, который на данный момент не реализован. До священной сути этого потенциала можно провести канал, откуда рекой польется богатство!\n\nПозвольте поведать вам скрытые тайны вашей земли. Конечно, за это мы требуем символическое вознаграждение.$fleetdeal_explanation$"
 fleet2deal8.tooltip: "Эффекты: $mod_district_generator_max_add$: §G+3§!\n   $MOD_PLANET_MAX_DISTRICTS_ADD$: §G+2§!"
 #MI Upkeep mod
 fleet2dealdesc9: "Богиня Нума улыбается вам сегодня, [Root.GetSpeciesName]. Она показала нам, как лучше настроить ваши единицы на магнитосферу планеты §Y[fleet2deal9planet.GetName]§!. Благодаря нашим божественным запатентованным §Gмагнитным пластинам Нумы§! ваши дроны на планете §Y[fleet2deal9planet.GetName]§! будут тратить вашу священную £energy£ §Yэнергию§! с меньшим рвением.\n\nВ обмен мы требуем проведения на вашей территории церемонии в честь богини. Что скажете?$fleetdeal_explanation$"
 #Decision
 fleet2dealdesc10: "Находясь в глубоком медитативном трансе, одна из наших проповедниц отдалась Нуме и поведала священную истину богини в быстром потоке бессвязных слов. Хотя сама проповедница не пережила это испытание, нам удалось извлечь из ее речей алгоритм, который может превратить единицы и нули в миллионы.\n\nПусть ее жертва не будет напрасной, [Root.GetSpeciesNamePlural]. Пригласите удачу в свое планетарное ядро, и она вас не покинет.$fleetdeal_explanation$"
 #Repeatable options
 fleet2dealdesc11: "Позвольте Нуме заглянуть в ваше ядро, [Root.GetSpeciesNamePlural], и она скажет, что вам нужно. Постойте… Ответ к решению вашей проблемы уже материализуется… Да, я его вижу!"
 fleet2dealdesc11.a: "$fleet2dealdesc11$\n\nЭто… еще один охранный корабль, да?"
 fleet2dealdesc11.b: "$fleet2dealdesc11$\n\nЭто… экзотические газы, да? М-м… какой у них приятный запах! Это запах успеха! Глубоко вдохните их и увидите Нуму во плоти. Но имейте в виду, что чрезмерное вдыхание этих газов может привести к иссушению ваших мембран."
 fleet2dealdesc11.c: "$fleet2dealdesc11$\n\nНу конечно! Это… кредиты… всегда кредиты. Кредиты правят миром. Мы закидаем вашу проблему кредитами, и она исчезнет. Восхвалим же Нуму!"
 #minor artifacts
 fleet2dealdesc12: "Под руководством Нумы мы столкнулись с этими древними артефактами, которые оказались весьма вдохновляющими для наших медитаций.\n\nМысль о расставании с ними, конечно же, причиняет нам боль, но мы чувствуем, что вы, [Root.GetSpeciesNamePlural], могли бы многому научиться при их изучении.\n\nНам нужны некоторые передовые материалы, так что, может быть, заключим сделку?..$fleetdeal_explanation$"
 cara_fleet2_deal: "Покажите нам ваши товары."
 cara_fleet2_take_deal: "Договорились!"
 cara_fleet2_dealtaken: "Будьте благословенны, [Root.GetSpeciesNamePlural], ибо благодаря вашему бизнесу вы становитесь ближе к богине."
 cara_fleet2_exit: "$cara_fleet1_exit$"
 fleet2getback: "Не сейчас. Пожалуйста, свяжитесь с нами попозже."
 fleet2getbackreply: "Как пожелаете, [root.GetSpeciesNamePlural]! Мы свяжемся с вами снова, прежде чем покинем вас. Но помните о том, что Нума капризная госпожа. Она может передумать и изменить условия сделки…"
 cara_fleet2_redeals.title: "$cara_fleet2_contact.title$: §Yпоследняя возможность§!"
 fleet2redealdesc1: "Упущенная возможность инвестировать, мой друг, — это самая дорогая ошибка в вашей жизни. Вы уверены, что можете себе позволить пройти мимо нашего предложения? Это ваш последний шанс, прежде чем мы покинем вашу территорию."
 fleet2redealdesc2: "Нума — щедрая госпожа. Мы уже собирались улетать, но она напомнила нам: «[Root.GetSpeciesNamePlural]! Нужно дать им последний шанс на сделку века, прежде чем мы отправимся в путь!»"
 fleet2redealdesc3: "Именно в такие краткие мгновения и решается судьба. Правильно потраченный кредит здесь, кредит там, и когда-нибудь вы заработаете миллион. Маленькие ручейки, впадая друг в друга, образуют океан.\n\nСудьба предоставила вам еще один шанс принять наше предложение, прежде чем мы отправимся в путь."
 fleet2redealdesc4: "А, [Root.GetSpeciesNamePlural], вы слышите призыв Нумы? Скоро мы должны будем покинуть ваши земли, но сначала хотим узнать: вы обдумали наше предложение?\n\nПримите правильное решение, так как один путь может привести вас к большому богатству. А другой — к разорению. Итак, выбор за вами."
 fleet2redealdesc5: "[Root.GetSpeciesNamePlural]! Скоро мы покинем вашу территорию. Мы должны отправиться туда, куда ведет нас поток космических энергокредитов. Вы обдумали наше предложение?"
 fleet2product1_tooltip: "Позволяет строительство §G+1§! §YНумского святилища§!, которое принесет удачу в мир по вашему выбору."
 fleet2product2_tooltip: "§G200§! £pop£ §Hпоселения Нумийцев§! прибудут на [Root.Capital.GetPlanetMoon]у [Root.Capital.GetName]"
 fleet2product3_tooltip: "§G+1§! указ §Y«Нумская визуализация»§!"
 fleet2product4_tooltip: "§G+1§! технология §YНумское моделирование данных§!"
 fleet2product5_tooltip: "Чиновник с §Gуровнем навыка 3§!, благословенный богиней удачи, становится частью государства [Root.GetName]."
 fleet2product6_tooltip: "Вы получаете £rare_crystals£§Y$rare_crystals$§! в количестве §G200§! штук в обмен на §R100§! £pop£ §Hпоселений§!"
 fleet2product7_tooltip: "§G+1§! §Y$caravaneer_cruiser_01$§!"
 fleetproduct10_tooltip: "§G+1§! решение §Yприменить божественный алгоритм§!"
 cara.2002.title: "Уничтожена $NAME_Caravaneer_Fleet2$"
 cara.2002.desc: "После вооруженного столкновения в системе [From.From.solar_system.GetName] флотилия [From.From.GetName&gen] с гордостью докладывает, они уничтожили флотилию «$NAME_Caravaneer_Fleet2_fleet$».\n\nТеперь караван Рэкетов, где прежде кипела жизнь, превратился в обычный межзвездный мусор. Больше эти лицемеры нас не потревожат."
 cara.2003.title: "$NAME_Caravaneer_Fleet2$ уничтожена"
 cara.2003.desc: "В столице [Root.Capital.GetName] стало известно, что флотилия $NAME_Caravaneer_Fleet2_fleet$ уничтожена.\n\nПосле вооруженного противостояния с представителями [From.GetName&gen] караван Нумийцев, где прежде кипела жизнь, превратился в обычный межзвездный мусор.\n\nБогиня удачи не слишком помогла тем, кто поклонялся ей."
 cara.2003.a: "Жаль."
 cara_fleet2_contacted: "$cara_fleet1_contacted$"
 #Fleet 3
 cara_fleet3_contact.title: "§YФлотилия караванщиков:§! «Рэкет Индастриал Энтерпрайз»"
 fleet3contact1: "[Root.GetSpeciesName]! Мы приветствуем вас. Мы операторы флотилии $NAME_Caravaneer_Fleet3$, которая является частью государства $NAME_Caravaneer_Home$.\n\nМы путешествуем среди звезд. Все, что блестит, привлекает наше внимание. Мы собираем. И мы торгуем!\n\n$fleet3contact_explanation$"
 fleet3contact2: "$NAME_Caravaneer_Fleet3$ приветствует вас, [Root.GetSpeciesNamePlural]! Мы посредники, специалисты по заключению сделок, прилетевшие сюда со станции $NAME_Tradestation_Tungle$.\n\n$fleet3contact_explanation$"
 fleet3contact3: "Здравствуйте, мы рады встрече, [Root.GetSpeciesName]. Кредитов у вас на счету становится больше, но в душе пустота, верно? Мы это чувствуем. Мы спешим к вам навстречу, и у нас с собой много интересного!\n\nМы торговцы, представляющие флотилию $NAME_Caravaneer_Fleet3$, а дом наш называется $NAME_Caravaneer_Home$.\n\n$fleet3contact_explanation$"
 fleet3contact_explanation: "Мы пересекаем ваше пространство с миром. Только чтобы покупать и продавать, §Hкс-ск!§! Мы многое можем предложить, выгодные сделки. Мы заговорим снова, прежде чем уйти.\n\nЕсли же вы позвоните нам, вам ответит $NAME_Caravaneer_Home$."
 cara_fleet3_contacted: "$cara_fleet1_contacted$"
 cara_fleet3_exit: "$cara_fleet1_exit$"
 fleet3contact1notinborder: "[Root.GetSpeciesName]! Мы приветствуем вас. Мы операторы флотилии $NAME_Caravaneer_Fleet3$, которая является частью государства $NAME_Caravaneer_Home$.\n\nМы путешествуем среди звезд. Все, что блестит, привлекает наше внимание. Мы собираем. И мы торгуем!\n\n$fleet3contact_explanation_notinborder$"
 fleet3contact2notinborder: "$NAME_Caravaneer_Fleet3$ приветствует вас, [Root.GetSpeciesNamePlural]! Мы посредники, специалисты по заключению сделок, прилетевшие сюда со станции $NAME_Tradestation_Tungle$.\n\n$fleet3contact_explanation_notinborder$"
 fleet3contact3notinborder: "Здравствуйте, мы рады встрече, [Root.GetSpeciesName]. Кредитов у вас на счету становится больше, но в душе пустота, верно? Мы это чувствуем. Мы спешим к вам навстречу, и у нас с собой много интересного!\n\nМы торговцы, представляющие флотилию $NAME_Caravaneer_Fleet3$, а дом наш называется $NAME_Caravaneer_Home$.\n\n$fleet3contact_explanation_notinborder$"
 fleet3contact_explanation_notinborder: "Мы пересекаем ваше пространство с миром. Только чтобы покупать и продавать! Мы многое можем предложить, выгодные сделки. Но сейчас здесь нет наших кораблей, §Hкс-ск!§! Мы свяжемся с вами, когда вернемся.\n\nЕсли же вы позвоните нам, вам ответит $NAME_Caravaneer_Home$."
 cara_fleet3_main.title: "$cara_fleet3_contact.title$"
 fleet3hewwo1: "Сколько можно объяснять? Перенаправьте энергию преобразователя энергии на вспомогательный коллектор. Нет, не этот преобразователь энергии! §HКс-ск!§! Мне что, делать все само…\n\nО! Клиенты! Добро пожаловать. В нашем ассортименте самые разные товары. Благополучно доставленные сюда для вашего удобства с далеких звезд!"
 fleet3hewwo2: "Вам нужны сплавы, §Hкс-ск?§! Вы любите металлы и газы? Усердных работников? Ценные минералы? Да. Мы так и думали."
 fleet3hewwo3: "О, [Root.GetSpeciesNamePlural]. Последний улов! Вы не поверите, §Hкс-ск!§! Куча ящиков, битком набитых боеприпасами. Кубическими тоннами! Прошу, смотрите сами."
 fleet3hewwo4: "Нельзя было им верить. Нельзя было заключать эту сделку. Грязные [scammer_country.GetSpeciesNamePlural]! §HКс-ск!§!\n\nОй! [Root.GetSpeciesNamePlural]. Приветствуем вас. Хотите торговать?"
 fleet3hewwo5: "Это не реликвия. Это антиквариат! Представьте только, §Hкс-ск§!. Этой штуке уже много столетий. Сделано на совесть!"
 fleet3hewwo6: "Ржавчина? Какая ржавчина?\n\nАх, эта ржавчина. Просто сотрите ее. Трите, трите, трите. Теперь вещица как новенькая!"
 fleet3hewwo7: "$NAME_Ketlings$? Да. Мы знаем о них. В прошлом наши братья. Поколения назад, давным-давно. Им не нравилось, они не одобряли того, что мы умнее их! Лучше умели собирать, находить, брать. Лучше во всем. Они изгнали нас прочь. Плыть в пустоте!\n\nНеважно. Теперь, без них, мы сильнее."
 fleet3hewwo8: "Только посмотрите на ваши бункеры для кредитов, [Root.GetSpeciesName]. Доверху забиты! Позвольте нам облегчить их. Позвольте нам помочь."
 cara_fleet3_deals.title: "$cara_fleet3_contact.title$"
 fleet3dealdesc1: "У нас есть руда. Богатая, светящаяся руда. Вырванная прямо из камня! Сверкающие минералы получит [Root.GetName].\n\nНо мы голодаем. Мы испытываем жажду! Даруйте нам не что иное, как [Root.GetFleet3ScaledCostDeal1], и у ваших строителей, ваших творцов, будет [Root.GetFleet3ScaledProductDeal1]."
 fleet3dealdesc2: "У нас есть лидер, идеальный кандидат для [Root.GetName&gen]! [Root.GetFleet3ProductDeal2]\n\nДайте нам не что иное, как [Root.GetFleet3CostDeal2], и забирайте лидера!"
 fleet3dealdesc3: "У нас есть для вас хорошие рабочие. Поднимают, тащат, тянут, чистят! Здоровые. Умные. Дайте нам £alloys£ $alloys$ в количестве §R2000§! ед., а мы отправим §G300§! £pop£ поселений расы $NAME_Caravaneer_Fleet3_species$ на одну из ваших планет.\n\nЧто? Сведения о судимостях? Боюсь, мы потеряли документы, §Hкс-ск!§!"
 fleet3dealdesc3machi: "У нас есть для вас хорошие рабочие. Поднимают, тащат, тянут, чистят! Здоровые. Умные. Дайте нам £alloys£ $alloys$ в количестве §R2000§! ед., а мы отправим §G300§! £pop£ поселений расы $NAME_Caravaneer_Fleet3_robot$ на одну из ваших планет.\n\nЧто? Сведения о судимостях? Боюсь, мы потеряли документы, §Hкс-ск!§!"
 fleet3dealdesc4: "Смотрите. [Root.GetFleet3ProductDeal4] [Root.GetFleet3CostDeal4]"
 fleet3dealdesc5: "У нас есть чертежи. Проекты! Для одного сооружения, очень продвинутого и уникального. §G$building_waste_reprocessing_center$§!, позволяющий преобразовать ваш лом и мусор в мощную энергию и полезные минералы.\n\nНо нам нужны… рабочие. Ужасная авария на добывающей платформе 715-Б, §Hкс-ск!§! Отправьте нам §R300§! £pop£ поселений категории §H$pop_cat_worker$§!, а мы дадим вам чертежи."
 fleet3dealdesc5_gesta: "У нас есть чертежи. Проекты! Для одного сооружения, очень продвинутого и уникального. §G$building_waste_reprocessing_center$§!, позволяющий преобразовать ваш лом и мусор в мощную энергию и полезные минералы.\n\nНо нам нужны... рабочие. Ужасная авария на добывающей платформе 715-Б, §Hкс-ск!§! Отправьте нам §R300§!£pop£ поселений категории §H$pop_cat_simple_drone$§!, а мы дадим вам чертежи."
 fleet3dealdesc6: "У нас специальное предложение. Уникальная технология, разработка флотилии $NAME_Caravaneer_Fleet3$!\n\nИспытываете проблемы, пробиваясь через защитные сети планет? Мы можем показать вам способ очень совершенной, очень технологичной, улучшенной бомбардировки. Мы называем его… §G$ORBITAL_TRASH_1$§!!\n\nОт вас требуется [Root.GetFleet3CostDeal6]. Тогда мы покажем вам этот метод, и §Hкс-ск!§! Вы добавите к своим кораблям один компонент."
 fleet3dealdesc7: "Мы заметили вашу добывающую станцию на орбите планеты §Y[fleet3deal7planet.GetName]§!. Она извлекает энергию, да? Мы можем помочь. Мы можем даровать вам спутник, оснащенный умными технологиями! Мы называем его §G«$racket_energy_extractor$»§!!\n\nОн останется на орбите и будет повышать количество такого ресурса, как £energy£ §Y$energy$§!, получаемого вами с поверхности планеты §Y[fleet3deal7planet.GetName]§!.\n\n[Root.GetFleet3CostDeal7]"
 fleet3dealdesc8: "Вам нужна §Y$energy$§!, верно? Чтобы приводить в движение миллионы схем, являющихся основой вашей расы?\n\nПри помощи такого устройства, как §G$racket_generator_regulator$§!, ваши §Y[technician_drone.GetNamePlural]§! повысят свою энергоемкость на 25%, а ваши §Y$district_generator_plural$§! и имеющиеся там механизмы повысят качество взаимодействия с ними! Мы разместим их на планете §Y[fleet3deal8planet.GetName]§!, если вы сделаете нам небольшое одолжение.\n\n[Root.GetFleet3CostDeal8]"
 fleet3dealdesc9: "У нас есть корабль! §G$destroyer$§!, очень хороший, быстрый, мощный! Хорошо оснащенный! Хотим ли мы от него избавиться? О нет! У нас нет времени давать вашим механикам его изучать, §Hкс-ск!§! Вы хотите этот корабль, да?\n\nДайте нам £minerals£ $minerals$ в количестве §R2000§! ед., и корабль ваш."
 cara_fleet3_deal: "Что вы можете нам предложить?"
 cara_fleet3_take_deal: "Безусловно. Мы принимаем ваше предложение."
 #cara_fleet3_take_deal.tooltip: "cara_fleet3_deal.tooltip"
 cara_fleet3_dealtaken: "Приятно и радостно иметь с вами дело, [Root.GetName]. До встречи!"
 fleet3deal1cost1: "£food£ $food$: §R200§!"
 fleet3deal1cost2: "£food£ $food$: §R1000§!"
 fleet3deal1cost3: "£food£ $food$: §R4000§!"
 fleet3deal1product1: "£minerals£ $minerals$: §G200§!"
 fleet3deal1product2: "£minerals£ $minerals$: §G500§!"
 fleet3deal1product3: "£minerals£ $minerals$: §G2000§!"
 fleet3deal2product1: "Инженер: золотые руки, быстро соображает. Хорошо управляется с проводами и делением в столбик!"
 fleet3deal2product2: "Этот чиновник — непревзойденный организатор! Отличается мощным интеллектом, думает на несколько шагов вперед! Любит долгие прогулки по пляжу!"
 fleet3deal2cost1: "£energy£ $energy$: §G300§!"
 fleet3deal2cost2: "£food£ $food$: §R200§!"
 fleet3deal2cost3: "£consumer_goods£ §Y$consumer_goods$§!: §R150§!"
 fleet3deal4cost1: "если вы дадите нам §R15§! ед. такого ресурса, как £sr_dark_matter£ §Y$sr_dark_matter$§!."
 fleet3deal4cost2: "если вы дадите нам §R55§! ед. такого ресурса, как £rare_crystals£ §Y$rare_crystals$§!."
 fleet3deal4cost3: "если вы дадите нам §R15§! ед. такого ресурса, как £sr_zro£ §Y$sr_zro$§!."
 fleet3deal4product1: "Этот сплав. Вес. Блеск. Сияние! Вы когда-нибудь видели такую металлическую связь? Невероятный предел текучести. Максимальное качество. Примеси в пределах нормы. Мы можем его чувствовать. Он взывает к вам.\n\nМы дадим вам £alloys£ §Y$alloys$§! в количестве §G2000§! ед."
 fleet3deal4product2: "Эти экзотические газы. Шипучие. Сжатые до максимальной плотности для удобства транспортировки. С высокой летучестью, так что осторожнее! Вы желаете их, да? Для ваших щитов, для ваших плазменных пушек? Они могут стать вашими.\n\nМы дадим вам £exotic_gases£ §Y$exotic_gases$§! в количестве §G150§! ед."
 fleet3deal4product3: "Этот металл. Он движется. Он течет. Он перестраивается, §Hкс-ск!§! Мы нашли для него множество применений. Уверены, что и вы найдете.\n\nМы дадим вам £sr_living_metal£ §Y$sr_living_metal$§! в количестве §G40§! ед."
 fleet3deal2product1_tooltip: "§HУченый§! §G3-го уровня§! появится на службе [Root.GetName&gen]"
 fleet3deal2product2_tooltip: "§HЧиновник§! с §Gуровнем навыка 3§! становится частью государства [Root.GetName]"
 fleet3deal5cost_tooltip: "§R-300§! £pop£ поселений категории §H$pop_cat_worker$§!"
 fleet3deal5cost_gesta_tooltip: "§R-300§! £pop£ поселений категории §H$pop_cat_simple_drone$§!"
 fleet3deal5product_tooltip: "Открывается ['building:building_waste_reprocessing_center', центр переработки отходов]!"
 fleet3deal3product_tooltip: "§G300§! £pop£ §Hпоселений роботоматов «Рэкет» §! прибудут на [fleet3deal3planet.GetPlanetMoon]у [fleet3deal3planet.GetName]"
 fleet3deal3product_machi_tooltip: "§G300§! £pop£ §Hпоселений роботоматов «Рэкет» §! прибудут на [fleet3deal3planet.GetPlanetMoon]у [fleet3deal3planet.GetName]"
 fleet3deal6cost1: "£energy£ $energy$: §R1000§!"
 fleet3deal6cost2: "£minerals£ $minerals$: §R300§!"
 fleet3deal6cost3: "£consumer_goods£ §Y$consumer_goods$§!: §R800§!"
 fleet3deal7cost1: "Так, что касается оплаты. У нас… есть некоторые противоречия с законом. Мелочи. Банальности. Но нам потребуются свидетели, поддержка. Добропорядочная личность, что выступит в нашу поддержку! Ваше сильное и мудрое государство поручится за нас, бедных доверчивых торговцев, саму невинность, чьей единственной ошибкой была некоторая невнимательность, отвлеченность сознания, что привела к нарушению какой-то досадной, §Hкс-ск§!, законодательной нормы?"
 fleet3deal7cost2: "Дайте нам £exotic_gases£ §Y$exotic_gases$§! в количестве §R15§! ед., а мы разместим этот спутник!"
 fleet3deal7cost3: "Мы разместим для вас этот спутник! Если вы дадите нам £consumer_goods£ §Y$consumer_goods$§! в количестве §R100§! ед."
 fleet3deal8cost1: "§Y$consumer_goods$§!: §R300§!"
 fleet3deal8cost2: "У нас… есть некоторые противоречия с законом. Мелочи. Банальности. Но нам потребуются свидетели, поддержка. Ваше сильное и мудрое государство поручится за нас, бедных доверчивых торговцев, саму невинность, чьей единственной ошибкой была некоторая невнимательность, отвлеченность сознания, что привела к нарушению какой-то досадной, §Hкс-ск§!, законодательной нормы?"
 fleet3deal9.tooltip: "§G+1§! §Y$caravaneer_destroyer_01$§!"
 fleet3getback: "$fleet1getback$"
 fleet3getbackreply: "Тогда мы еще с вами свяжемся, прежде чем покинуть ваше пространство. Но условия сделки могут измениться!"
 cara_fleet3_redeals.title: "$cara_fleet3_contact.title$: §Yпоследняя возможность§!"
 fleet3redealdesc1: "Вы хорошо подумали? Все взвесили? Передумали? §HКс-ск!§!"
 fleet3redealdesc2: "Какое-то время мы будем отсутствовать в [Root.GetSpeciesAdj&masc,prep] пространстве. Вы ведь не хотите остаться ни с чем?"
 fleet3redealdesc3: "Примите сделку! Примите! Примите!"
 fleet3redealdesc4: "Мы чувствуем ваше настроение. Эта сделка искушает вас. Взывает к вам. Так ведь?"
 fleet3redealdesc5: "[Root.GetSpeciesNamePlural]! Мы собираемся покинуть ваше пространство! Предложение все еще в силе, товары все еще новые! Куйте шлак, пока горяч! §HКс-ск!§!"
 #cara_fleet3_return.title: "cara_fleet3_return"
 #fleet3return1: "fleet3return1"
 #fleet3return2: "fleet3return2"
 #fleet3return3: "fleet3return3"
 #fleet3return4: "fleet3return4"
 #fleet3return5: "fleet3return5"
 cara.3002.title: "Уничтожена $NAME_Caravaneer_Fleet3$"
 cara.3002.desc: "После вооруженного столкновения в системе [From.From.solar_system.GetName] флотилия [From.From.GetName&gen] с гордостью докладывает, что флотилия $NAME_Caravaneer_Fleet3$ уничтожена.\n\nТеперь караван Рэкетов, где прежде кипела жизнь, превратился в обычный межзвездный мусор. Больше эти болтуны нас не потревожат."
 cara.3003.title: "$NAME_Caravaneer_Fleet3$ уничтожена"
 cara.3003.desc: "В столице [Root.Capital.GetName] стало известно, что флотилия $NAME_Caravaneer_Fleet3$ уничтожена.\n\nПосле вооруженного противостояния с представителями [From.GetName&gen] караван Рэкетов, где прежде кипела жизнь, превратился в обычный межзвездный мусор.\n\nВозможно, такой конец их не очень бы расстроил."
 cara.4000.name: "§HКараванщики§!: трава была зеленее"
 cara.4000.desc: "Мы получаем отчеты с [pops_join_caravan_planet.GetPlanetMoon]ы [pops_join_caravan_planet.GetName], что многие жители колонии покинули ее, чтобы присоединиться к пролетающей через нашу территорию флотилии [pops_join_caravan_fleet.GetName]. Предположительно их привлекли мечты о приключениях или пьянящий аромат возможности обогащения."
 cara.4000.a.tooltip: "§R100§!£pop£§Hпоселений§! покидают планету §Y[pops_join_caravan_planet.GetName]§!"
 cara.4010.name: "§HКараванщики§!: местные привилегии"
 cara.4010.desc: "В срочном послании с [caravan_pops_join_planet.GetPlanetMoon]ы [caravan_pops_join_planet.GetName] объясняется, что некоторые теперь уже бывшие представители [caravan_pops_join_country.GetName&gen] просят у них политического убежища. Местная администрация сочла нужным передать решение этого вопроса вышестоящим органам."
 cara.4010.a: "В [Root.GetName&prep] рады всем."
 cara.4010.a.tooltip: "К колонии на [caravan_pops_join_planet.GetPlanetMoon]е [caravan_pops_join_planet.GetName] присоединяются §G300§! £pop£ §Hпоселений§! расы §Y[caravan_pops_join_country.GetSpeciesName]§!"
 cara.4010.b: "Отказать им."
 cara.4020.name: "§H$caravaneers$§!: старый и дефективный"
 cara.4020.desc: "Наша космическая база в системе [caravan_hulk_system.GetName] докладывает, что флотилия [caravan_hulk_country.GetName] приняла решение эвакуировать и покинуть разваливающийся корабль, который теперь находится на нестабильной орбите вокруг центральной звезды системы."
 cara.4020.a: "Что для одного мусор…"
 cara.4020.b: "Пусть сгорит, упав на солнце."
 cara.4020.c: "Отбуксировать его на космическую базу для утилизации."
 cara.4020.c.tooltip: "Выставьте [caravan_hulk_country.GetName&dat] счет на оплату наших услуг."
 cara.4025.name: "$cara.4020.name$"
 cara.4025.desc: "Вероятно, из-за того, что корабль является гражданским транспортом, его базы данных не были полностью подчищены во время процесса вывода из эксплуатации. Поэтому, хотя на борту не было обнаружено ничего ценного, нашим специалистам по данным удалось восстановить частичные отсылки на неизвестные технологии чужаков."
 cara.4030.name: "§HКараванщики§!: убирайтесь!"
 cara.4030.desc: "Сегодня на [disgruntled_planet.GetPlanetMoon]е [disgruntled_planet.GetName] начались массовые протесты, вызванные негодованием в связи с тем, что в системе находится флотилия [xeno_fleet.GetName]. Все здравомыслящие [disgruntled_planet.owner.Species.GetNamePlural] оскорблены их присутствием."
 cara.4030.a: "Прикажите им избегать [disgruntled_planet.GetPlanetMoon]ы [disgruntled_planet.GetName]."
 cara.4040.name: "§HКараванщики§!: теплый прием!"
 cara.4040.desc: "Когда флотилия [welcome_fleet.GetName] появилась на орбите [pleased_planet.GetPlanetMoon]ы [pleased_planet.GetName] для того, что должно было стать коротким визитом вежливости, спонтанное проявление доброй воли привело к событию, ставшему смесью открытого рынка и вечеринки. В результате [pleased_planet.owner.Species.GetNamePlural] и [welcome_fleet.owner.Species.GetNamePlural] укрепили связи и провели множество торговых операций."
 cara.4040.a: "Возвращайтесь поскорее!"
 cara.4050.name: "§HКараванщики§!: воры!"
 cara.4050.desc: "После недавнего визита флотилии [stealing_fleet.GetName] на [stolen_from_planet.GetPlanetMoon]у [stolen_from_planet.GetName] было замечено, что из центрального хранилища пропало некоторое количество ресурсов. Есть подозрение, что именно флотилия [stealing_fleet.GetName] их и утащила."
 cara.4050.a: "Моя прелесть!"
 cara.4041.name: "§HКараванщики§!: последствия вечеринки"
 cara.4041.desc: "В течение нескольких месяцев после вечеринки на [pleased_planet.GetPlanetMoon]е [pleased_planet.GetName], которую проводили [party_host.GetNamePlural], все чаще появляются свидетельства, что некоторые завязавшиеся там отношения получились более близкими, чем предполагалось. Они попросили остаться."
 cara.4041.phile: "Какая прелесть!"
 cara.4041.phobe: "Какая мерзость!"
 cara.4041.a: "Такова, э-э, жизнь."
 mega.9000.name: "$mega_art_installation_1$"
 mega.9000.desc: "Первый этап строительства завершен, и теперь $mega_art_installation_3$ готова принять первых гостей. Было непросто построить огромную станцию с учетом всех тонкостей организации музея и галереи беспрецедентного масштаба, но наши инженеры отлично справились с этой задачей. После размещения основной конструкции первостепенной задачей станет создание хранилища, которое должно стать чудом стабильности и безопасности, ведь в нём будут содержаться и находиться под защитой произведения искусства со всей галактики."
 mega.9001.name: "$mega_art_installation_2$"
 mega.9001.desc: "Первый этап строительства завершен.$mega_art_installation_3$ теперь может похвастаться обширным хранилищем. Специальная флотилия транспортных кораблей занимается непрерывной перевозкой сокровищ нашего государства в их новый дом. Тем временем возводятся выставочные залы и дополнительные сооружения, где будет жить многочисленный персонал."
 mega.9002.name: "$mega_art_installation_3$"
 mega.9002.desc: "Выставочные станции завершены. Размером каждая из них превышает многие космические базы, и они могут принимать миллионы посетителей в день. Теперь, когда они наконец готовы к открытию, здесь будут демонстрироваться произведения искусства такой расы, как [From.Owner.GetSpeciesName], и со всей галактики — ко всеобщему восхищению. Первая флотилия транспортных судов с посетителями на борту уже приближается."
 mega.9002.phile.desc: "Выставочные станции завершены. Размером каждая из них превышает многие космические базы и они могут принимать миллионы посетителей в день. Теперь, когда они наконец готовы к открытию, здесь будут показаны образцы искусства каждой расы во славу разнообразия галактики. Первая флотилия транспортных судов с посетителями на борту уже приближается."
 mega.9002.phobe.desc: "Выставочные станции завершены. Размером каждая из них превышает многие космические базы и они могут принимать миллионы посетителей в день. Теперь, когда они наконец готовы к открытию, здесь будет демонстрироваться воистину славное [From.Owner.GetAdj&neut] искусство. Небольшая подборка искусства чужаков будет представлена чисто для сравнения и ради смеха. Первая флотилия транспортных кораблей с посетителями на борту уже приближается."
 mega.9003.name: "Центр стратегической координации: корпус"
 mega.9003.desc: "Бронированный корпус Центра стратегической координации завершен. Теперь, когда здесь располагается весь цвет нашего военного командования, он практически неприступен. Находясь в безопасности и сосредоточившись, они могут посвятить каждый час своей активной жизни планированию лучших методов обороны нашего государства."
 mega.9003.mil.desc: "Бронированный корпус Центра стратегической координации завершен. Теперь, когда здесь располагается весь цвет нашего военного командования, он практически неприступен. Находясь в безопасности и сосредоточившись, они могут посвятить каждый час своей активной жизни планированию лучших методов покорения галактики."
 mega.9003.slave.desc: "Бронированный корпус Центра стратегической координации завершен. Теперь, когда здесь располагается весь цвет нашего военного командования, он практически неприступен. Находясь в безопасности и сосредоточившись, они могут посвятить каждый час своей активной жизни планированию лучших методов захвата максимального количества рабов."
 mega.9004.name: "Центр стратегической координации: связь"
 mega.9004.desc: "В Центр стратегической координации добавлено несколько мощных антенн, что позволит стратегам передавать приказы нашим кораблям по всей галактике. Эти ультрасовременные системы способны пробиться через любые помехи, а квантово-запутанный сигнал не поддается взлому."
 mega.9005.name: "Центр стратегической координации: функционирование"
 mega.9005.desc: "На заключительном этапе в Центр стратегической координации добавлены отдельные бастионы для симуляции противника. Они обладают в основном тем же функционалом, что и Центр стратегической координации, хотя в меньшем масштабе, но полностью независимы от основной системы. Внутри элитные командиры и их подчиненные могут полностью погрузиться в культуру и традиции наших врагов, изучая их произведения искусства, чтобы лучше понять и смоделировать их военную мысль. После полного погружения они будут вести виртуальные войны против персонала Центра стратегической координации, что позволит нам моделировать конфликты с любым возможным противником в мельчайших подробностях для изучения с точки зрения обеих сторон и для усовершенствования наших стратегических приемов."
 mega.9006.name: "Межзвездная ассамблея: локус"
 mega.9006.desc: "Самой важной особенностью начального этапа создания Межзвездной ассамблеи является §SЛокус§!. Это сложная голографическая проекция черной дыры, предназначенная для того, чтобы показать гравитационную пропасть, скрытую в галактическом ядре, — ось, на которой вращается галактика.\n\nПосле завершения строительства это место также станет своего рода осью, на которой будут вращаться тихая дипломатия и мягкая сила, часто определяющие судьбу галактики."
 mega.9007.name: "Межзвездная ассамблея: консульское кольцо"
 mega.9007.desc: "Завершен второй этап создания Межзвездной ассамблеи, а именно Консульского кольца. В этом внутреннем круге будет обитать большая часть нашего дипломатического персонала."
 mega.9008.name: "Межзвездная ассамблея: модули форума"
 mega.9008.desc: "Внешнее кольцо Межзвездной ассамблеи заполнено обширными ультрасовременными конференц-залами, оборудованными фильтрами конфиденциальности (проницаемыми только для наблюдения представителями расы [Root.GetSpeciesNamePlural], конечно). Станция быстро становится фактическим галактическим центром для дистанционных переговоров."
 mega.9009.name: "Межзвездная ассамблея"
 mega.9009.desc: "Межзвездная ассамблея теперь полностью функционирует и принимает множество посольств от крупнейших держав и корпораций галактики.\n\nНаши дипломаты с трудом успевают обрабатывать постоянный поток информации о национальных интересах и политических затруднениях, идущий от станции. По крайней мере, наши гости, похоже, не слишком обращают внимание на слежку, пока мы предоставляем им идеальные условия для оказания давления на их конкурентов."
 mega.9010.name: "Разуплотнитель материи: якорь"
 mega.9010.desc: "Для извлечения материи из объекта [From.GetName] сначала нужна надежная база, где можно построить комплекс. Этот Якорь возведен на самом краю горизонта событий и удерживается на месте, несмотря на огромную силу притяжения, при помощи продвинутого двигателя перенаправления гравитации, в котором гравитация объекта [From.GetName] используется для ее же нейтрализации."
 mega.9011.name: "Разуплотнитель материи: линзирование"
 mega.9011.desc: "Комплекс гравитационного линзирования, построенный на базе существующей системы перенаправления гравитации, способен перенаправить часть этой силы в Линзу, концентрируя ее еще сильнее в выбранной области."
 mega.9012.name: "Разуплотнитель материи: бурение"
 mega.9012.desc: "Для успешной добычи материи из черной дыры требуется основательно усовершенствованная система перенаправления гравитации: концентрированная зона гравитационного искажения фактически действует как огромный бур, чей принцип работы основан на перенаправлении и концентрации гравитационной силы."
 mega.9013.name: "Разуплотнитель материи: добыча"
 mega.9013.desc: "Последний этап создания разуплотнителя материи наиболее рутинный, но по-своему наиболее впечатляющий. Огромный массив автоматизированных плавилен и систем переработки измельчает, разуплотняет и сортирует материалы с объекта [From.GetName], получая полезные минералы, которые погружаются на бесконечную цепочку роботизированных барж, доставляющих их по всему нашему государству."
 cara.4110.name: "Коллекционер"
 cara.4110.desc: "Приветствую вас. Я Коллекционер и предлагаю вам уникальную возможность. У меня на продажу есть ящик, способ получения которого я разглашать не хочу и содержимое которого я раскрывать не буду. Вы можете купить этот ящик за £energy£ 3000 и оставить себе все, что в нём содержится, но возврат средств у меня не предусмотрен."
 cara.4110.a: "Вы ожидаете, что мы заплатим за этот ящик, не имея понятия о его содержимом?"
 cara.4110.a.response: "Да."
 cara.4110.b: "Очень хорошо."
 cara.4110.b.response: "Отлично!"
 cara.4110.c: "Нет!"
 cara.4110.c.response: "Вы пожалеете об этом!"
 cara.4110.d: "Кто вы?"
 cara.4110.d.response: "Я Коллекционер. Я давно работаю с флотилиями Караванщиков и собираю реликвии по всей галактике. Это все, что вам нужно знать."
 cara.4120.name: "Рабы автоматов"
 cara.4120.desc: "Частые визиты в «Компас Хора» привели к тому, что многие жители [cara_border_planet.GetPlanetMoon]ы [cara_border_planet.GetName] пристрастились к азартным играм. Немало из них встало на преступный путь, чтобы заплатить за частые поездки."
 cara.4120.a: "Эта новость вызывает беспокойство."
 cara.4130.name: "Празднование"
 cara.4130.desc: "Когда множество представителей расы [caravaneer_neighbor_species.GetName] из [caravaneer_neighbor.GetName&gen] нанесли визит на [cara_border_planet.GetPlanetMoon]у [cara_border_planet.GetName], это привело к масштабной вечеринке. К сожалению, все вышло из-под контроля, и «вечеринка» теперь напоминает всепланетный бунт."
 cara.4130.a: "Это неприемлемо!"
 cara.4140.name: "Новые игровые автоматы!"
 cara.4140.desc: "Государство [caravaneer_neighbor.GetName] недавно сообщило о новой линейке игровых автоматов, и увеличение количества перелетов вызвало экономический бум на планете [cara_border_planet.GetName] из-за транзита гостей через нее."
 cara.4150.name: "Акклиматизация"
 cara.4150.desc: "«Компас Хора» — это шумное место не для слабонервных. Из-за частых визитов сюда жители [cara_border_planet.GetPlanetMoon]ы [cara_border_planet.GetName] приспособились к местным условиям на небывалом уровне."
 cara.4160.name: "Концерт группы «Мегатруп»: миллионы трупов!"
 cara.4160.desc: "Планета [cara_border_planet.GetName] погрузилась в хаос после того, как концерт феноменальной пси-металлической группы «Мегатруп» вышел из-под контроля. Сообщения разнятся из-за масштаба разрушений, но все они сходятся на том, что в самый разгар выступления фронтмен Кел-Азаан пробил дыру в луне, тем самым полностью ее разрушив."
 cara.4160.nomoon.desc: "Планета [cara_border_planet.GetName] погрузилась в хаос после того, как концерт феноменальной пси-металлической группы «Мегатруп» вышел из-под контроля. Сообщения разнятся из-за масштаба разрушений, но все они сходятся на том, что в самый разгар выступления фронтмен Кел-Азаан с такой силой ударил своей гипергитарой об сцену, что уничтожил все вокруг."
 cara.4160.a: "Жесть."
 cara.4161.name: "«Мегатруп»: происхождение"
 cara.4161.desc: "«Мегатруп» — это величайшая группа, играющая в стиле псионический металл, в пространстве корпорации. Говорят, что ничем не связанные ранее члены группы — Кел-Азаан, Гантрэн, Хуман, Йондар и Скилдари — установили контакт друг с другом при помощи Покрова.\n\nЭто правда.\n\nЛишь немногие избранные знают о том, что «Покров» — это кодовое название сверхсекретного звукомузыкального полуавтономного подразделения компании «Галактические звуки», ведущего музыкального конгломерата и производителя звукового оружия в мультивселенной. Изначально «Мегатруп» должен был стать ударным отрядом псиоников. Они должны были «играть» на сложных «площадках», эффективно подавляя мятежные движения посредством откровенно антикорпоративных текстов, которые маскировали направленные на слушателей незаметные меры псионического воздействия, снижавшие агрессию.\n\nВ конце концов менеджеры и управляющие оказались неспособны контролировать каталитическое воздействие музыки группы на и без того мощные псионические способности ее участников. Группа стала совершенно неуправляемой, и только ее название осталось неизменным, так как «Галактические звуки» не пожелали разрывать фантастически прибыльный контракт, — и теперь «Мегатруп» играет что и где им угодно, лишь бы это было §R«металлом»§!."
 cara.4111.desc: "Наслаждайтесь!"
 mega.9100.name: "Разрушенный разуплотнитель материи"
 mega.9100.a.desc: "Это невозможно, но на горизонте событий в системе [matter_decompressor_system.GetName] находится какое-то добывающее устройство. Наши ученые выдвигают теорию, что это, возможно, §Hразуплотнитель материи§! — мегасооружение, предназначенное для добычи ресурсов из черной дыры. Хотя оно больше не функционирует, но какой-то механизм, мешающий его спагеттификации, должно быть, по-прежнему исправен."
 mega.9100.b.desc: "На горизонте событий в системе [matter_decompressor_system.GetName] находится §Hразуплотнитель материи§! — мегасооружение для добычи ресурсов из черной дыры. Хотя оно больше не функционирует, его гравитационный двигатель, судя по всему, исправен, так как устройство не подверглось спагеттификации."
 mega.9100.a: "С виду похож на наш."
 mega.9101.name: "Разуплотнитель материи восстановлен"
 mega.9110.name: "Разрушенный центр стратегической координации"
 mega.9110.a.desc: "В системе [strategic_coordination_center_system.GetName] обнаружена огромная разрушенная космическая станция. В ее обломках найдено множество боевых компьютеров, симуляторов и трансляционных антенн, что навело наших ученых на размышления, что это, должно быть, был какой-то §Hцентр стратегической координации§!."
 mega.9110.b.desc: "В системе [strategic_coordination_center_system.GetName] обнаружена огромная разрушенная космическая станция. Похоже, когда-то это был §Hцентр стратегической координации§!."
 mega.9110.a: "Наш никогда не будет разрушен!"
 mega.9111.name: "Центр стратегической координации восстановлен"
 mega.9111.desc: "Покинутый центр стратегической координации в системе [From.GetName] полностью отремонтирован и укомплектован персоналом из самых блестящих военных умов [Root.GetName&gen]. Как и задумывалось его создателями, это мегасооружение теперь будет использоваться для согласования действий представителей нашей военной мощи во всей галактике."
 mega.9120.name: "Разрушенная художественная мегакомпозиция"
 mega.9120.a.desc: "Три разбитые космические станции обнаружены в системе [mega_art_installation_system.GetName]. Они окружены облаком мусора, в котором по-прежнему смутно угадываются произведения искусства, хотя и очень странные, чужеродные. Похоже, когда-то это была §Hхудожественная мегакомпозиция§!."
 mega.9120.b.desc: "Разрушенная §Hхудожественная мегакомпозиция§! обнаружена в системе [mega_art_installation_system.GetName]. Время и воздействие вакуума не пощадили эти экспонаты."
 mega.9120.a: "Как неоригинально."
 mega.9121.name: "Художественная мегакомпозиция восстановлена"
 mega.9121.desc: "Когда-то разрушенная художественная мегакомпозиция [From.GetName] теперь восстановлена. Полностью отремонтированная и заполненная избранными величайшими произведениями искусства, которые может предложить [Root.GetName], она также содержит небольшое количество обнаруженных и восстановленных экспонатов, оставшихся от первоначального мегасооружения."
 mega.9130.name: "Разрушенная межзвездная ассамблея"
 mega.9130.a.desc: "Останки огромной космической станции найдены в системе [interstellar_assembly_system.GetName]. Судя по количеству офисных помещений и обширному форуму с десятками систем жизнеобеспечения, это, по мнению наших ученых, все, что осталось от §Hмежзвездной ассамблеи§!."
 mega.9130.b.desc: "Останки §Hмежзвездной ассамблеи§! найдены в системе [interstellar_assembly_system.GetName]. Также на данный момент обнаружены мумифицированные останки представителей как минимум десятка различных рас."
 mega.9130.a: "Вместе до конца."
 mega.9131.name: "Межзвездная ассамблея восстановлена"
 mega.9131.desc: "Межзвездная ассамблея в системе [From.GetName] снова функционирует. Она опять готова принять дипломатов со всей галактики, чтобы те собрались в одном месте для обсуждения важных вопросов в текущем солнечном цикле."
 colony.3040.name: "Зондирование пустоты"
 colony.3040.desc: "После многолетнего изучения некоторые исследователи на [Root.GetPlanetMoon]е [Root.GetName] начинают чувствовать, что понимают нулевую пустоту. Существуют… потоки. Силы. Некое течение, что мягко бьется о портал на [From.GetPlanetMoon]е [From.GetName], и приносит остатки темной материи, чтобы мы ее собирали. Теоретически возможно сделать наш портал более «видимым» для этой силы, чтобы наша добыча была более крупной."
 colony.3041.name: "Призыв к пустоте"
 colony.3041.desc: "Мощный усилитель сигнала отправил энергетический импульс сквозь портал на [Root.GetPlanetMoon]е [Root.GetName]. Эффект был мгновенным, давление по ту сторону портала стало значительно сильнее, а с ним увеличился и поток темной материи."
 portal_void_tooltip2: "$job_dimensional_portal_researcher_plural$ будут производить дополнительную £sr_dark_matter£ темную материю"
 colony.3009.a.robot: "**Сигнал доступа**"
 colony.3020.desc.robot: "Это [Root.Owner.Leader.GetName] из [Root.Owner.GetName&gen]. Назовите себя!"
 colony.3020.a.robot: "Ошибка контрольной суммы: неверный идентификатор! Это [Root.Owner.Leader.GetName]! Назовите себя!"
 colony.3021.desc.robot: "**§YОБРАБОТКА!§!** Результат: портал создает мостик между альтернативными измерениями. Я [Root.Owner.Leader.GetName], и вы тоже, но мы из расходящихся измерений."
 colony.3021.a.robot: "Нерассчитанная переменная. Доложите, какой статус имеют [Root.Owner.Species.GetNamePlural] из другого измерения!"
 colony.3021.b.robot: "Приступить к торговле."
 mirror_trade_reply.robot: "Ответ положительный."
 colony.3022.desc.robot: "После открытия варп-двигателя [Root.Owner.Species.GetName] колонизируют другие планеты из нашей столицы [Root.Owner.Capital.GetName]…"
 colony.3022.a.robot: "Ошибка! Неожиданное значение: варп-двигатель. Ожидаемое значение: гиперкоридоры."
 colony.3023.desc.robot: "**§YОБРАБОТКА!§!** Результат: открытие другого вида сверхсветовых путешествий стало точкой дивергенции между нашими вселенными. Запрос: варп-твари нападают?"
 colony.3023.a.robot: "Значение не найдено: варп-твари. Запрос: уровень угрозы со стороны варп-тварей?"
 colony.3024.desc.robot: "Варп-твари нападают на все известные цивилизации, угрожая всему живому. Гипотеза: как только варп-прыжки в галактике достигли определенного критического уровня, варп-твари проснулись и атаковали. Несколько известных нам рас уже прекратили существование, но мы пока сдерживаем их."
 colony.3024.a.robot: "Запрос: требуется ли вам материальная поддержка?"
 mirror_trade_reply2.robot: "Наладить торговлю между измерениями для усиления такой расы, как [Root.Owner.Species.GetNamePlural], в обоих измерениях."
 colony.3032.a.robot: "[Root.Owner.Species.GetName] победят!"
 colony.3033.desc.robot: "Обновление статуса: [Root.Owner.Capital.GetName] не в сети. Боевая способность [Root.Owner.GetName&gen]: 23% от оптимальной. Оставшаяся сеть колоний: [Root.GetName]. Ожидаемый результат: полная победа над варп-тварями за 2 солнечных цикла. Ошибка! Активность варп-тварей обнаружена на орбите [Root.GetName]! Ошибка!\n\n**§YСигнал внезапно обрывается§!**"
 colony.3033.a.robot: "Докладывайте."
 colony.3033.d.robot: "[Root.Owner.Species.GetName] зеркальной вселенной не в сети."
 dportal_trade_increases_tooltip: "Повышает £amenities£ и £trade_value£, которые производят §Y$job_dimensional_portal_researcher_plural$§!."
 dportal_trade_increases_gestalt_tooltip: "Повышает £amenities£ и £energy£, которые производят §Y$job_dimensional_portal_researcher_gestalt_plural$§!."
 dportal_trade_reduces_tooltip: "Снижает £amenities£ и £trade_value£, которые производят §Y$job_dimensional_portal_researcher_plural$§!."
 dportal_trade_reduces_gestalt_tooltip: "Снижает £amenities£ и £energy£, которые производят §Y$job_dimensional_portal_researcher_gestalt_plural$§!."
 #Other
 action.96.name: "§HРождение галактического рынка§!"
 action.96.desc: "Фактически галактическая торговля, не зависящая от качества международной дипломатии, существует с тех пор, когда мы впервые обнаружили, что не одиноки во вселенной. По мере того как в галактике открываются новые границы и перекраиваются старые, галактические лидеры приходят к соглашению, что пора §Yузаконить эту коммерческую площадку§!, чтобы все могли извлечь выгоду.\n\nВ ближайшие годы независимые торговцы и правительственные учреждения будут стремиться создать квазицентрализованный узел для галактической торговли. Мы безусловно выиграем, если этот узел окажется в [Root.GetAdj&masc,prep] пространстве, поэтому мы можем §Yпредложить один из наших миров§! для этой цели."
 action.96.desc.corp: "Заказчики, клиенты и деревенщины галактики, похоже, наконец-то готовы принять квазицентрализованную платформу для нерегулируемой международной торговли в средних масштабах.\n\nМы можем §Yпредложить один из наших миров§! в качестве места размещения этого коммерческого центра с целью повышения потенциального дохода до максимума."
 action.96.desc.phobe: "Тот факт, что мы никак не можем гарантированно пресечь §Yнезаконную торговлю с чужаками§!, вызывает сожаление.\n\nТакже печально, что экономические преимущества в значительной степени анонимной торговой площадки, не связанной ограничениями международных отношений, нельзя отрицать. В ближайшие годы независимые торговцы и правительственные учреждения будут стремиться создать квазицентрализованный узел для галактической торговли. Экономическая выгода для хозяев такого узла вполне может перевесить расходы на хранение товаров чужаков, поэтому мы можем §Yпредложить один из наших миров§! для этой цели."
 action.96.desc.homicidal: "Хотя немногие хотят торговать с нами напрямую, существует процветающий галактический черный рынок, в который мы наконец смогли встроиться."
 action.96.a: "Пусть торговля процветает!"
 action.96.b: "Понятно."
 action.96.c: "Нашим участником это будет выгодно."
 action.97.name: "$action.96.name$"
 action.97.desc: "$action.96.desc$"
 action.97.desc.corp: "$action.96.desc.corp$"
 action.97.desc.phobe: "$action.96.desc.phobe$"
 enable_decision_market_nomination: "§HРешение:§! выдвинуть кандидатом на основание галактического рынка"
 action.99.name: "§HГалактический рынок§!: основан в системе [market_founder_planet.GetStarName]"
 action.99.desc: "Наша маркетинговая кампания на [market_founder_planet.GetPlanetMoon]е [market_founder_planet.GetName] принесла свои плоды, и будущие торговые гиганты сочли нужным сосредоточить большую часть своей деятельности в системе [market_founder_planet.GetStarName]!"
 action.1000.name: "§HГалактический рынок§!: не основан"
 action.1000.desc: "Наша инициатива основать новый галактический рынок, к сожалению, §Yпровалилась§!. Хотя у нас и нашлась политическая воля для такого проекта, найти подходящих кандидатов для размещения этого объекта так и не удалось.\n\nЗаинтересованные коммерсанты и политики выступают за эту идею и обещают удвоить свои усилия по ее лоббированию, если [global_event_country.GetGalCommunityOrGalImperium] попытается снова претворить ее в жизнь."
 action.1000.a: "Поживем — увидим."
 action.1005.desc: "Похоже, воля политиков в галактике оказалась шире охвата ее рынков. Инициатива государства [global_event_country.GetGalCommunityOrGalImperium] организовать специализированный международный торговый центр §Yпровалилась§! из-за отсутствия подходящих кандидатов для размещения этого объекта.\n\nСторонники идеи Галактического рынка изо всех сил стараются сохранить лицо и заявляют, что с готовностью снова выступят за ее реализацию, как только [global_event_country.GetCommunityOrImperium] наберется смелости повторить попытку."
 action.1005.desc.phobe: "Политическая воля государства [global_event_country.GetGalCommunityOrGalImperium] оказалась куда шире охвата его рынков: недавняя попытка сформировать единый Галактический рынок §Yпровалилась§!. В конце концов для хваленого проекта этих чужаков банально не удалось найти подходящего места.\n\nСторонники проекта отрицают, что сложившаяся ситуация обнажает безрассудство идеи «взаимодействия» инопланетных рас. Вместо этого они с уверенностью заявляют, что идею нужно попытаться реализовать снова, когда галактика будет к ней готова."
 action.1005.a.phobe: "Какое самомнение."
 action.101.name: "§HГалактический рынок§!: основан"
 action.101.desc: "В системе §Y[galactic_market_station.solar_system.GetName]§!, на территории [From.GetName&gen], был учрежден центр галактической торговли. [From.GetAdj&fem] администрация официально узаконила это место торговли, где можно покупать и продавать ресурсы через независимых третьих лиц."
 action.101.desc.phobe: "Подозрительные чужаки из §Y[From.GetName&gen]§! организовали рынок для торговли инопланетными товарами. Хотя мы, понятное дело, не горим желанием принимать участие в подобном товарообмене, данная возможность для нас доступна."
 action.101.desc.homicidal: "$action.96.desc.homicidal$"
 action.103.name: "§HГалактический рынок§!: станция перемещена"
 action.103.desc: "После потери контакта со своим прежним центром галактическое сообщество торговцев приняло решение основать новую станцию в пределах наших границ."
 action.106.name: "§HГалактический рынок§!"
 action.106.desc: "Благодаря нашим новым контактам мы получили доступ к галактическому рынку для покупки и продажи ресурсов. Это, несомненно, принесет огромную пользу [Root.GetAdj&fem,gen] экономике."
 action.106.desc.phobe: "Мы узнали, что презренные чужаки основали галактический рынок, где торгуют инопланетными товарами. Хотя мы испытываем внутреннее нежелание принимать участие в подобном товарообмене, теперь данная возможность для нас доступна."
 action.106.desc.homicidal: "$action.96.desc.homicidal$"
 established_galactic_market_station: "В системе §Y[galactic_market_station.solar_system.GetName]§! основан §H$galactic_market_station$§!\n\n"
 distar.305.rare_crystals: "Корабль [Root.GetName] обнаружил ранее неизвестный редкий ресурс на [FromFrom.GetPlanetMoon]е [FromFrom.GetName], который был назван §H«$rare_crystals$»§!. Благодаря своим впечатляющим преломляющим свойствам эти кристаллы хорошо зарекомендовали себя как в высокотехнологичной электронике, так и в системах лазерного оружия."
 distar.305.exotic_gases: "Корабль [Root.GetName] обнаружил ранее неизвестный редкий ресурс на [FromFrom.GetPlanetMoon]е [FromFrom.GetName], который был назван §H«$exotic_gases$»§!. Эти газы могут применяться в тактических и даже рекреационных целях."
 distar.305.volatile_motes: "Корабль [Root.GetName] обнаружил ранее неизвестный редкий ресурс на [FromFrom.GetPlanetMoon]е [FromFrom.GetName], который был назван §H«$volatile_motes$»§!. При химической активации эти частицы вырабатывают взрывную кинетическую силу и предположительно обладают очень острым вкусом при использовании в кулинарии."
 decision_market_nomination: "Выдвижение кандидатом на основание галактического рынка"
 decision_market_nomination_effects: "Применяет модификатор §YПоказатель конкурентоспособности базового рынка§! к данной планете, в зависимости от местных условий. Чем выше рейтинг, тем больше вероятность того, что в будущем §Hгалактический рынок§! развернется именно на этой планете.\n\nЛучше всего номинировать планету с большим объемом торговли, поскольку это влияет на привлекательность ее кандидатуры."
 decision_market_nomination_effects_short: "Выдвинуть эту планету кандидатом на торговый узел, который станет объединенным §Hгалактическим рынком§!."
 decision_market_nomination_desc: "Быть центром галактической торговли одновременно и престижно, и выгодно. Рынок нестабилен, но при наличии достаточных стимулов мы могли бы заинтересовать крупных игроков возможностью обосноваться на этой планете."
 decision_revoke_market_nomination: "Отозвать выдвижение"
 decision_revoke_market_nomination_effect: "§HУже сделанные инвестиции возмещены не будут.§!"
 decision_revoke_market_nomination_desc: "Иногда вам не хочется быть в центре внимания."
 decision_boost_market_nomination: "Усилить запрос на выдвижение"
 decision_boost_market_nomination_effects_short: "Повысить §Yпоказатель конкурентоспособности базового рынка§! при помощи дополнительных мер."
 decision_boost_market_nomination_effects: "Можно использовать до §Y2§! раз."
 decision_boost_market_nomination_desc: "Сокращение административных накладных расходов. Особые экономические зоны. Взятки."
