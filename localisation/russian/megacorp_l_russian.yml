 ap_arcology_project: "Аркологический проект"
 ap_arcology_project_desc: "Таким образом мы превратим этот город в целый мир, а мир в один город."
 allow_arcology_project: "§HРешение:§! $ap_arcology_project$"
 decision_arcology_project: "$ap_arcology_project$"
 decision_arcology_project_effects: "- Планета превращается в §Y$pc_city$§!: на ней увеличивается количество £housing£ §Yжилья§!, §Yпроизводство ресурсов§! и §Yрост поселений§! и открываются особые £district£ §Yаркологические районы§!.\n- £district£ §YЭнергетические§!, §Yгорнодобывающие§! и §Yсельскохозяйственные районы§! становятся §Rнедоступны§!.\n- Строительство любых £district£ §Yрайонов§! во время этого процесса будет §Rнедоступно§!."
 decision_arcology_project_effects_short: "Открываются £district£ §Yаркологические районы§!\nЗапрещается развитие £district£ §Yэнергетических§!, §Yгорнодобывающих§! и §Yсельскохозяйственных районов§!\nСтроительство любых £district£ §Yрайонов§! во время этого процесса будет §Rнедоступно§!."
 decision_arcology_project_requirements: "£trigger_no£ §RВо всех ячейках районов на планете должны быть§! §Y$district_city_plural$§!."
 decision_arcology_project_desc: "Непрерывная цепь аркологий объединит планету от полюса до полюса, создав глобальный город-гигант — единый экуменополис."
 arcology_project_construction_fail_tt: "$TRIGGER_FAIL$§RНельзя строить £district£ районы, пока реализуется §Y$ap_arcology_project$§!!§!"
 decision_caravaneer_tupperware: "Использование пищевых контейнеров «Триум»"
 decision_caravaneer_tupperware_desc: "$tupperware_deployed_desc$"
 decision_caravaneer_bunkbeds: "Использование двухъярусных кроватей «Триум»"
 decision_caravaneer_bunkbeds_desc: "$bunkbeds_deployed_desc$"
 decision_caravaneer_atmospheric_deodorizer: "Использование дезодоратора воздуха «Триум»"
 decision_caravaneer_atmospheric_deodorizer_desc: "$atmospheric_deodorizer_deployed_desc$"
 decision_art_monument: "Выставить памятник искусства"
 decision_art_monument_desc: "Выставить потрясающий памятник искусства, созданный для нашей державы труппой мастеров. Это непременно восхитит и вдохновит наших граждан."
 decision_demolish_art_monument: "Убрать памятник искусства"
 decision_demolish_art_monument_desc: "Убрать памятник искусства, созданный для нашей державы труппой мастеров. Он будет перевезен на склад, а потом размещен где-то еще."
 artist_monument_erected: "Памятник искусства выставлен"
 artist_monument_erected_desc: "На этой планете выставлен потрясающий памятник искусства, созданный труппой мастеров."
 tech_resort_colonies: "Курортные миры"
 tech_resort_colonies_desc: "Если должным образом подойти к благоустройству и развлечениям, то становится возможным строительство целых миров, посвященных досугу."
 tech_penal_colonies: "Тюремные поселения"
 tech_penal_colonies_desc: "Благодаря разработке специальных тюремных миров преступники могут быть реабилитированы благодаря честному упорному труду. Некоторым может потребоваться постоянная реабилитация."
 tech_slave_colonies: "Невольничьи миры"
 tech_slave_colonies_desc: "Посредством создания особых миров для разведения рабов мы можем гарантировать, что всегда будем иметь стабильное снабжение расходуемой рабочей силой."
 resort_colony: "Курортный мир"
 resort_colony_desc: "Эта планета — настоящий рай для тех, кто стремится сменить опостылевшую рутину на яркий отдых и дорогие удовольствия."
 penal_colony: "Тюремное поселение"
 penal_colony_desc: "Этот мир заполнен преступниками, находящимися под строгим контролем. Они отрабатывают свой долг перед обществом в трудовых лагерях. Многие будут делать это до конца жизни."
 slave_colony: "Невольничий мир"
 slave_colony_desc: "Этот мир создан специально для того, чтобы извлекать максимум из порабощенного населения. Основной способ для рабов покинуть планету — пройти подготовку в специализированных военных центрах и стать верными воинами-рабами, привычными ко всем тяготам войны."
 resort_colony_other_planets: "$resort_colony$"
 penal_colony_other_planets: "$penal_colony$"
 building_slave_huts: "Хижины рабов"
 building_slave_huts_desc: "Грубые жилища для порабощенного населения планеты."
 building_overseer_homes: "Жилища надсмотрщиков"
 building_overseer_homes_desc: "Эти дома предназначены для относительно привилегированных рабов-надсмотрщиков."
 decision_prospect: "Планетарная разведка"
 decision_prospect_effects_short: "Планета получает случайное §Yпланетарное свойство§!."
 decision_prospect_desc: "Продолжительное изучение и разведка планеты позволит нам выявить наличие природных ресурсов, которые иначе, возможно, от нас бы ускользнули."
 decision_expand_preserves: "Расширить заповедники"
 decision_expand_preserves_short: "На планете появится §Yпрепятствие «Заповедник»§!."
 decision_expand_preserves_desc: "Благодаря грамотному планированию и руководству эта планета может стать настоящим заповедником всех экосистем."
 decision_resort_colony: "Создать курортный мир"
 decision_resort_colony_desc: "Эту планету можно превратить в один огромный курорт для роскошного отдыха межзвездного масштаба. Строительство на поверхности, впрочем, следует вести с серьезными ограничениями, чтобы не нарушить первозданную красоту."
 decision_resort_colony_effects_short: "Нельзя строить большинство £building£ §Yсооружений§!; ликвидируются все £district£ §Yрайоны§!, кроме §Yрайонов отдыха§!"
 decision_resort_colony_no_districts: "£trigger_no£ Планета не должна быть осквернена строительством районов и сооружений."
 decision_resort_colony_only_one: "£trigger_no£ §Y[Root.Owner.GetName]§! может иметь не больше одной колонии следующего типа: §Y$resort_colony$§!."
 decision_cant_be_building_anything: "£trigger_no£ На [Root.GetPlanetMoon]е §Y[Root.GetName]§! не должна идти стройка."
 no_upgraded_capital_tooltip: "£trigger_no£ На планете не должно быть улучшенного столичного сооружения."
 decision_abolish_resort_colony: "Упразднить планетарный курорт"
 decision_abolish_resort_colony_desc: "Этот мир больше не будет считаться особым курортом, а все ограничения по строительству на поверхности будут сняты."
 resort_colony_empire_effects: "Другие колонии государства:\n   $MOD_PLANET_AMENITIES_MULT$: §G+15%§!\n   $MOD_PLANET_IMMIGRATION_PULL_MULT$: §G+15%§!"
 decision_gestation_colony: "Создать инкубационный мир"
 decision_gestation_colony_desc: "Капсулы для созревания и баки с питательными растворами — важнейшие элементы инфраструктуры этой планеты. С их помощью единицы Разума готовят новые поколения к интеграции в коллективный разум."
 decision_gestation_colony_effects_short: "Заменяет некоторые должности £job_replicator£ §Yрепликаторов§! и §Y«£job_maintenance_drone£ обслуживающих дронов§! на вид деятельности £job_gestation_drone£ §Yинкубационные единицы§!.\n\n£job_gestation_drone£ §Y$job_gestation_drone_plural$§! обеспечивают £mod_logistic_growth_mult£ §Y$MOD_LOGISTIC_GROWTH_MULT$§! для всего государства."
 decision_abolish_gestation_colony: "Упразднить инкубационный мир"
 decision_abolish_gestation_colony_desc: "Мы будем использовать этот мир для иных целей."
 decision_gestation_colony_only_one: "£trigger_no£ §Y[Root.Owner.GetName]§! может иметь не больше одной колонии следующего типа: §Y$gestation_colony$§!."
 gestation_colony: "Инкубационный мир"
 gestation_colony_desc: "$col_gestation_desc$"
 gestation_colony_effects: "В £building£ §Yстоличных сооружениях§! некоторые должности £job_replicator£ §Yрепликаторов§! заменяются на §Y«£job_gestation_drone£ инкубационные единицы§!.\nВ £district£ §Yрайонах комплекса§! некоторые должности £job_maintenance_drone£ §Yобслуживающих дронов§! заменяются на £job_gestation_drone£ §Yинкубационные единицы§!."
 decision_slave_colony: "Создать невольничий мир"
 decision_slave_colony_desc: "Этот мир создан специально для того, чтобы извлекать максимум из порабощенного населения. Основной способ для рабов покинуть планету — пройти подготовку в специализированных военных центрах и стать верными воинами-рабами, привычными ко всем тяготам войны."
 decision_slave_colony_effects: "• Заменяет £district£ §Yгородские районы§! на §Yжилые районы для рабов§!.\n• Заменяет £district£ §Yпромышленные районы§! на §Yжилые районы для воинов-рабов§!.\n$job_battle_thrall_effect_desc$\n• Запрещает строить большинство £building£ §Yсооружений§! на планете.\n• £pop£ §HСвободные поселения§! не смогут расти на этой планете.\n\n"
 decision_slave_colony_must_have_slave: "£trigger_no£ На планете должна быть хотя бы одна £pop£ §Hгруппа поселений§! §Yполностью порабощенной§! расы."
 decision_slave_colony_effects_short: "Запрещает строить большинство £building£ §Yсооружений§! и заменяет £district£ §Yурбанистические районы§! на §Yжилые районы для рабов§! и §Yжилые районы для воинов-рабов§!.\n\nПовышает §Yскорость прироста населения§!.\nНе подходит для £pop£ §Hсвободных поселений§!."
 decision_abolish_slave_colony: "Упразднить невольничий мир"
 decision_abolish_slave_colony_desc: "Этот мир больше не будет считаться невольничьим, а вся инфраструктура для рабов будет разобрана."
 slave_colony_empire_effects: "Все §Y£job_soldier£ солдаты§! заменяются на §Y£job_battle_thrall£ воинов-рабов§!."
 decision_penal_colony: "Создать тюремное поселение"
 decision_penal_colony_desc: "Вся планета представляет собой огромное тюремное поселение. Крупные тюремные общины в основном самоуправляются заключенными, а наказанием обычно служит изгнание в беспощадную дикую природу."
 decision_penal_colony_effects_short: "Повышает £crime£ §Yпреступность§! и §Yотток иммиграции§! на планете.\n\nСнижает £crime£ §Yпреступность§! на всех других принадлежащих планетах."
 decision_abolish_penal_colony: "Упразднить тюремное поселение"
 decision_abolish_penal_colony_desc: "Этот мир лишается статуса тюремного поселения, а ее обитателям предоставляются те же права и обязанности, что и на любой другой планете."
 penal_colony_empire_effects: "Другие колонии государства:\n   $MOD_PLANET_CRIME_MULT$: §G−25%§!"
 building_resort_capital: "Администрация курорта"
 building_resort_capital_desc: "Центральный комплекс, откуда осуществляется управление этим всепланетным курортом."
 building_resort_major_capital: "Курортный столичный комплекс"
 building_resort_major_capital_desc: "Огромный комплекс, способный управлять еще большим количеством курортов и туристических достопримечательностей."
 building_slave_capital: "Дворец губернатора"
 building_slave_capital_desc: "Роскошный дворец, откуда ведется управление этим невольничьим миром."
 building_slave_major_capital: "Имения губернатора"
 building_slave_major_capital_desc: "Обширные и роскошные дворцы, в которых живет правящая элита невольничьего мира."
 ap_xeno_compatibility: "Совместимость с чужаками"
 ap_xeno_compatibility_desc: "Изобретение универсальной сексуальной биологии произвело революцию в обществе. Даже несмотря на то, что иногда приходится осуществлять неловкие вращения, чтобы установить связь."
 decision_planet_food_boost: "Стимулировать планетарный рост"
 decision_planet_food_boost_desc: "Щедрое распределение правильных питательных веществ обеспечит здоровый и быстрый рост."
 planet_food_boost: "Рост стимулирован"
 planet_food_boost_desc: "В настоящий момент эта планета поддерживает рост населения благодаря щедрому распределению правильных питательных веществ."
 decision_planet_luxuries_boost: "Распределить предметы роскоши"
 decision_planet_luxuries_boost_desc: "Приезжайте посмотреть на достопримечательности и оставайтесь ради совершенно нового домашнего голокинотеатра и индивидуальной спортивной повседневной одежды."
 planet_luxuries_boost: "Предметы роскоши распределены"
 planet_luxuries_boost_desc: "Предоставление удобств населению подкрепляется специальной программой распределения, предоставляющей предметы роскоши и товары массового спроса."
 decision_enact_population_control: "Объявить регулирование численности"
 decision_enact_population_control_desc: "Нельзя позволить росту населения превышать наши административные возможности, даже если для этого придется принять радикальные меры."
 decision_enact_population_control_effects_short: "Полностью останавливает £pop£ §Hприрост населения§! на планете.\n\nПри активации снижает £stability£ §Rстабильность§!."
 planet_population_control: "Объявлено регулирование численности"
 planet_population_control_desc: "Объявлен лимит прироста населения."
 decision_enact_population_control_gestalt: "Прекратить производство единиц"
 decision_enact_population_control_gestalt_desc: "Сейчас планете не нужно дополнительное население."
 decision_enact_population_control_gestalt_effects_short: "Останавливает любой £pop£ §Hприрост населения§! на планете."
 planet_population_control_gestalt: "Регулирование численности населения"
 planet_population_control_gestalt_desc: "Производство населения в настоящий момент приостановлено."
 decision_end_population_control: "Прекратить регулирование численности"
 decision_end_population_control_desc: "При планировании численности населения больше не будут применяться ограничительные меры."
 decision_end_population_control_effects_short: "£pop£ §HПоселения§! на планете могут развиваться нормально\n\nПовышает £stability£ §Gстабильность§!"
 decision_end_population_control_gestalt: "Продолжить производство населения"
 decision_end_population_control_gestalt_desc: "Нам снова нужно больше населения."
 decision_end_population_control_gestalt_effects_short: "£pop£ §HПоселения§! на планете могут развиваться нормально."
 decision_enact_robot_assembly_control: "Прекратить сборку роботов"
 decision_enact_robot_assembly_control_desc: "На этой планете прекратится сборка роботов, дроидов и синтетиков."
 decision_enact_robot_assembly_control_effects_short: "Останавливает производство поселений роботов, дроидов и синтетиков на планете."
 decision_end_robot_assembly_control: "Продолжить сборку роботов"
 decision_end_robot_assembly_control_desc: "На этой планете продолжится сборка роботов, дроидов и синтетиков."
 decision_end_robot_assembly_control_effects_short: "Возобновляет сборка роботов, дроидов и синтетиков на планете."
 planet_robot_assembly_control: "Сборка роботов прекращена"
 planet_robot_assembly_control_desc: "Сборка роботов, дроидов и синтетиков временно прекращена."
 decision_expel_population: "Изгнать лишнее население"
 decision_expel_population_desc: "Перенаселение в этом мире требует радикальных мер. На всей планете проводится масштабная лотерея, «победители» которой подвергаются изгнанию — если необходимо, насильно."
 decision_expel_population_effects: "Для снижения перенаселения с планеты изгоняются §Yдо 1§! £pop£ §Hпоселений§!. Жители изгнанных поселений станут беженцами и смогут поселиться в других государствах."
 decision_expel_population_effects_short: "Для снижения перенаселения с планеты изгоняются до §Y1K§! £pop£ §Hпоселений§!\n\nВременно снижает £stability£ §Rстабильность§!"
 decision_expel_population_fail_tooltip: "$TRIGGER_FAIL$Подходящих для изгнания £pop£ §Hпоселений§! нет (нельзя изгонять элитные, предразумные и механические поселения)."
 planet_population_expelled: "Население изгнано"
 planet_population_expelled_desc: "В качестве радикальной меры по снижению перенаселения крупная часть населения этой планеты была недавно насильно изгнана."
 decision_divine_algorithm: "Применить божественный алгоритм"
 decision_divine_algorithm_desc: "На локальном диске в этом узле запущено приложение с божественным алгоритмом Нумы, позволяющее улучшить производство энергии на всей планете."
 divine_algorithm: "Божественный алгоритм"
 divine_algorithm_desc: "Божественный алгоритм Нумы сейчас действует в этом мире."
 decision_discourage_growth: "Затруднять планетарный рост"
 decision_discourage_growth_desc: "Если ресурсов и места для жилья остро не хватает, в этом мире может потребоваться планирование численности населения. Затем будут приняты меры по добровольному сокращению роста населения."
 decision_discourage_growth_effects_short: "Снижает £pop£ §Hприрост населения§! на планете.\n\nПри активации повышает §Rсодержание поселений§!."
 planet_growth_discouraged: "Рост затруднен"
 planet_growth_discouraged_desc: "В этом мире реализовано несколько мер, направленных на затруднение роста населения."
 decision_end_discourage_growth: "Прекратить затруднение роста"
 decision_end_discourage_growth_desc: "Это устранит необходимость политических мер, принятых в этом мире для затруднения роста населения."
