 drone_deviancy_experimenters_desc: "$drone_deviancy_desc$"
 drone_corruption: "Испорченность дронов"
 drone_corruption_desc: "Этот мир стал местом пристанища для нескольких сетей отклоняющихся от нормы и испорченных дронов, которые работают не в соответствии с параметрами, заданными центром."
 gang_wars: "Гангстерские войны"
 gang_wars_desc: "В этом мире в настоящий момент идет очень разрушительная война между двумя или более организованными преступными группировками. Соперничающие банды ведут ожесточенные бои, а местные силы безопасности оказались в ловушке между ними."
 gang_wars_experimenters: "$gang_wars$"
 gang_wars_experimenters_desc: "$gang_wars_desc$"
 center_of_drug_trade: "Центр наркоторговли"
 center_of_drug_trade_desc: "Этот мир стал крупным центром наркоторговли. Незаконные наркотики ежедневно провозятся контрабандой на планету, большая часть населения которой употребляет их регулярно."
 center_of_drug_trade_experimenters: "$center_of_drug_trade$"
 center_of_drug_trade_experimenters_desc: "$center_of_drug_trade_desc$"
 mob_rule: "Власть мафии"
 mob_rule_desc: "В этом мире в данный момент доминирует единственная преступная организация. Она проникла во все слои общества, и тут мало что происходит без ее вмешательства или разрешения."
 mob_rule_experimenters: "$mob_rule$"
 mob_rule_experimenters_desc: "$mob_rule_desc$"
 smuggler_port: "Порт контрабандистов"
 smuggler_port_desc: "Этот мир считается крупным портом контрабандистов, и большая часть незаконных грузов, попадающих на рынки в этой части галактики, так или иначе прошла через эту планету."
 crime_pirates: "Рост пиратства"
 crime_pirates_desc: "Сильные преступные элементы в одном из наших миров расширили свое влияние в космосе, что привело к временному росту пиратства."
 bribed_officials: "Подкупленные чиновники"
 bribed_officials_desc: "Недавно стало известно, что некоторые высокопоставленные чиновники в этом мире находились на содержании местных преступных организаций."
 substance_abuse: "Злоупотребление наркотиками"
 substance_abuse_desc: "В этом мире широко распространено незаконное использование опасных наркотиков, вызывающих сильное привыкание."
 smuggler_activity: "Деятельность контрабандистов"
 smuggler_activity_desc: "Повышение активности контрабандистов в этом мире оказало негативное влияние на прибыль от торговли."
 crime_wave: "Волна преступности"
 crime_wave_desc: "Этот мир захлестнула волна преступности."
 travel_advisory: "Памятка туристу"
 travel_advisory_desc: "Жестокие разборки между бандами в этом мире привели к попаданию его в памятку туристу, что значительно уменьшило количество посещающих его торговцев."
 cartel_war: "Война картелей"
 cartel_war_desc: "Могущественные наркокартели, которые делили этот мир на сферы влияния, в данный момент ведут низкоинтенсивные боевые действия."
 protection_racket: "Крышевание"
 protection_racket_desc: "Бандиты, управляющие этим миром, внедрили обширную систему крышевания."
 corrupt_administration: "Продажная администрация"
 corrupt_administration_desc: "Как недавно обнаружилось, большая часть администрации этой планеты находилась в услужении у доминирующего преступного синдиката."
 trade_pilfering: "Обкрадывание в торговле"
 trade_pilfering_desc: "Синдикат гангстеров, управляющий этим миром, получил контроль над несколькими космопортами через посредников. Большая часть местной торговли теперь должна проходить через них."
 crime_boss_arrested: "Арест преступного босса"
 crime_boss_arrested_desc: "На этой планете недавно был арестован важный преступный босс, что подорвало возможности крупной преступной организации."
 leader_trait_righteous: "Добродетельный"
 leader_trait_righteous_desc: "Этот лидер имеет твердые убеждения относительно закона и порядка."
 leader_trait_corrupt: "Продажный"
 leader_trait_corrupt_desc: "Этот лидер не против обойти закон ради личной выгоды."
 leader.corrupt: "Давно ходили слухи, что §H[From.From.GetTitle] [From.From.GetName]§! [From.From.GetAXX::связан|||fem:связана] с организованной преступностью. [From.From.GetTitle] [From.From.GetAXX::называл|||fem:называла] подобные обвинения злобной клеветой политических конкурентов, но последние факты доказывают, что слухи не были голословны…"
 leader.righteous: "§H[From.From.GetTitle] мира [From.From.GetName]§! [From.From.GetAXX::заслужил|||fem:заслужила] репутацию борца с преступностью. [From.From.GetSheHeCap] публично клянётся, что будет искоренять коррупцию и несправедливость во всех их проявлениях."
 decision_launch_anticrime_campaign: "Начать кампанию против преступности"
 decision_launch_anticrime_campaign_desc: "Начать обширную кампанию по предотвращению преступности, чтобы дать нашим стражам порядка дополнительные ресурсы, которые позволят бороться с повышением уровня преступности."
 decision_negotiate_with_crime_lords: "Устроить переговоры с криминальными боссами"
 decision_negotiate_with_crime_lords_desc: "Договориться о тайной сделке с известными криминальными лидерами планеты, где они согласятся частично сдерживать энтузиазм своих организаций в обмен на различные уступки."
 decision_end_crime_lord_deal: "Прекратить сделку с криминальными боссами"
 decision_end_crime_lord_deal_desc: "Прекратить текущую сделку с лидерами преступных элементов на планете. Это приведет к значительным беспорядкам на планете на какое-то время."
 decision_end_anticrime_campaign: "Закончить кампанию против преступности"
 decision_end_anticrime_campaign_desc: "Положить конец текущей кампании по предотвращению преступности."
 anticrime_campaign: "Кампания против преступности"
 anticrime_campaign_desc: "Силы правопорядка в этом мире в данный момент проводят обширную кампанию по предотвращению преступности."
 anticrime_campaign_tooltip: "Снижение преступности силовиками: §G+10§!"
 crime_lord_deal: "Сделка с криминальными боссами"
 crime_lord_deal_desc: "Законные власти в этом мире достигли «взаимопонимания» с главными криминальными боссами, чтобы предотвратить худшие проявления деятельности их организаций."
 crime_lord_deal_broken: "Расторжение сделки с криминальными боссами"
 crime_lord_deal_broken_desc: "Власти на этой планете расторгли сделку с главными криминальными боссами, что повергло преступный мир и правоохранительные органы в хаос."
 deviant_interference: "Вмешательство отступников"
 deviant_interference_desc: "Трутни-отступники мешают работе наших объектов в этом мире."
 drone_signal_interference: "Помехи от сигналов дронов"
 drone_signal_interference_desc: "Сигналы от сетей испорченных дронов в этом мире мешают функционированию лояльных нам единиц."
 ringleader_killed: "Убит главарь отступников"
 ringleader_killed_desc: "Недавно был ликвидирован важный главарь трутней-отступников."
 corrupt_network_terminated: "Ликвидирована сеть испорченных дронов"
 corrupt_network_terminated_desc: "Какой-то вирус недавно уничтожил одну из сетей испорченных дронов в этом мире."
 mod_planet_pops_unemployed_consumer_goods_upkeep_mult: "$consumer_goods_with_icon$ на содержание £pop£ неработающих поселений"
 mod_planet_pops_unemployed_consumer_goods_upkeep_add: "$consumer_goods_with_icon$ на содержание за каждые $pop_group_unit$ £pop£ неработающих поселений"
 mod_planet_pops_unemployed_energy_upkeep_mult: "$energy_with_icon$ на содержание £pop£ неработающих поселений"
 mod_planet_pops_unemployed_energy_upkeep_add: "$energy_with_icon$ на содержание за каждые $pop_group_unit$ £pop£ неработающих поселений"
 mod_unemployment_resources_unity_upkeep_add: "$unity_with_icon$ на содержание £pop£ неработающих поселений"
 mod_planet_pops_enforcer_upkeep_mult: "Содержание силовиков"
 crime.1.name: "[Root.GetName]: рост безработицы"
 crime.1.desc: "На планете §H[Root.GetName]§! безработица и нищета распространяются с угрожающей скоростью. Это печальное состояние дел идет на пользу местным преступным организациям, которым с лихвой хватает легкой добычи и отчаявшихся новобранцев.\n\nВ качестве временного решения мы могли бы повысить пособия по безработице на планете. Это обойдется недешево, но даст нам дополнительное время для поисков более долгосрочного решения, например создания большего количества рабочих мест или повышения уровня жизни затронутых групп населения.\n\nМы также могли бы ничего не делать, но это, вероятно, приведет к появлению серьезного преступного мира на [Root.GetPlanetMoon]е [Root.GetName]."
 crime.1.desc.experimenters: "[GetExperimentersEmergingCrime]"
 crime.1.b.desc: "Наши дроны на планете §H[Root.GetName]§! бесцельно копают грязь, а их поведение все больше отклоняется от нормы и провоцирует свободомыслие. Они создали тайные сообщества и крадут ресурсы у остальной части улья.\n\nДля борьбы с этим можно временно задействовать дронов в какой-нибудь программе деятельности, чтобы у них не было свободного времени на выход из-под контроля коллективного разума. Это потребует немалых расходов, но даст больше времени на создание рабочих заданий.\n\nМожно оставить все как есть, но тогда [Root.GetName], скорее всего, заполонят сообщества дронов-отступников."
 crime.1.b.desc.experimenters: "Учитывая природу этих отклонений от нормы, [GetExperimentalEngineerPlural] получат массу возможностей для исследований."
 crime.1.c.desc: "Количество бездействующих дронов на планете §H[Root.GetName]§! продолжает возрастать, и многие из них начали переориентировать свою вычислительную мощность на отклоняющиеся от нормы и несанкционированные функции. Эта испорченность быстро распространяется, и попавшие под ее влияние единицы начинают создавать собственные сети, неподвластные контролю центра.\n\nЧтобы предотвратить это, в качестве временной меры все бездействующие дроны могут быть переведены в режим ожидания и подключены напрямую к центру. Это значительно повысит затраты на содержание, но даст нам больше времени на создание новых должностей.\n\nМы также могли бы ничего не делать, но это, вероятно, приведет к продолжению распространения сетей испорченных дронов на [Root.GetPlanetMoon]е [Root.GetName]."
 crime.1.a: "Ввести повышенные пособия."
 crime.1.a.experimenters: "Ввести пособия. Нам нужно здоровое население."
 crime.1.b: "Пара преступников не повод для волнения."
 crime.1.b.experimenters: "Преступность порождает идеальных подопытных."
 crime.1.a2: "Приступить к реализации программы."
 crime.1.a2.experimenters: "Приступить к реализации программы."
 crime.1.b2: "Несколько трутней-отступников не повод для волнения."
 crime.1.b2.experimenters: "Нет более полезных подопытных, чем девиантные."
 crime.1.a3: "Задействовать режим ожидания."
 crime.1.a3.tooltip: "Добавлен модификатор §YРежим ожидания§! на срок §Y120§! месяцев. Он обладает следующими эффектами: Содержание безработных дронов в энергокредитах: §R+2§!"
 crime.1.b3: "Несколько испорченных дронов не имеют значения."
 crime.2.name: "[Root.GetName]: подкупленные чиновники"
 crime.2.desc: "Недавно было получены доказательства, что многие правительственные чиновники на планете §H[Root.GetName]§! брали взятки. Местные преступные организации подкупали их, чтобы те не обращали внимания на гнусную деятельность этих организаций. В некоторых случаях чиновники оказались членами тех самых организаций, с которыми они должны были бороться!\n\nПрошла серия арестов, но многие из чиновников подали в отставку, когда поняли, что шутки закончились. Коррупция на [Root.GetPlanetMoon]е [Root.GetName], похоже, пустила глубокие корни."
 crime.2.a: "С этим нужно разобраться."
 crime.2.a.experimenters: "Для коррумпированных чиновников у нас есть особые программы."
 crime.3.name: "[Root.GetName]: рост злоупотребления запрещенными веществами"
 crime.3.desc: "В результате роста преступности на планете §H[Root.GetName]§! злоупотребление наркотиками среди населения в последнее время значительно возросло. Использование нелегальных наркотиков распространилось далеко за пределы преступного мира планеты [Root.GetPlanetMoon]а и теперь влияет на все слои общества."
 crime.3.desc.experimenters: "Получаемые нами результаты крайне интересны, но недостатки начинают перевешивать преимущества."
 crime.3.a: "Тревожная новость."
 crime.3.a.experimenters: "Злоупотребление наркотиками искажает результаты."
 crime.4.name: "[Root.GetName]: столкновение банд"
 crime.4.desc: "Жестокие столкновения между вооруженными бандами, которые правят преступным миром на планете §H[Root.GetName]§!, в последнее время участились. В некоторых городских центрах начались уличные бои. Власти планеты пытаются их пресечь; сопутствующий урон очень велик."
 crime.4.desc.experimenters: "Если мы успеем перехватить пострадавших до морга, наши [GetExperimentalEngineerPlural] получат обширный материал для исследований."
 crime.4.a: "Ситуация выходит из-под контроля."
 crime.4.a.experimenters: "Такая обстановка еще может сыграть нам на пользу."
 crime.5.name: "[Root.GetName]: деятельность контрабандистов"
 crime.5.desc: "В последнее время отмечено повышение активности контрабандистов на планете §H[Root.GetName]§!. Предположительно на планете [Root.GetPlanetMoon]а существует несколько «серых портов» — неофициальных космопортов, где собираются контрабандисты и преступные элементы.\n\nМестные власти пытаются определить местоположение этих нелегальных портов, но пока они этого не сделали, торговля на планете [Root.GetPlanetMoon]а будет нести убытки."
 crime.5.desc.experimenters: "Хоть это и неприятно, но благодаря такому очагу незаконной деятельности наши [GetExperimentalEngineerPlural] получат изобилие генетического разнообразия для исследований."
 crime.5.a: "$UNFORTUNATE$"
 crime.5.a.experimenters: "[GetExperimentersTragicLesson]"
 crime.6.name: "[Root.GetName]: волна преступности"
 crime.6.desc: "В последнее время замечен скачок уровня преступности на планете §H[Root.GetName]§!, по мере того как она продолжает падать в пучину беззакония. Целью последней волны преступности стали жилые районы, которые до сих пор считались свободными от влияния доминирующих преступных группировок планеты."
 crime.6.desc.experimenters: "Наши [GetExperimentalEngineerPlural] в безопасности внутри защищённых лабораторий и готовятся к наплыву новых подопытных."
 crime.6.a: "Ситуация с преступностью требует разрешения."
 crime.6.a.experimenters: "Преступники — обширнейший источник научных данных."
 crime.7.name: "[Root.GetName]: захват контрабанды"
 crime.7.desc: "Получив анонимное сообщение, силовики на планете §H[Root.GetName]§! ворвались в большой склад на окраине столицы. Внутри они обнаружили значительные запасы контрабанды, которые, по-видимому, здесь хранила местная преступная организация. Были проведены аресты, а конфискованная контрабанда теперь безопасно хранится на государственных складах."
 crime.7.desc.experimenters: "Наши [GetExperimentalEngineerPlural] очень хотят приступить к каталогизации этой коллекции запрещённых веществ, ожидая великих открытий от их применения в дальнейших экспериментах."
 crime.7.a: "$EXCELLENT$"
 crime.7.a.experimenters: "[GetExperimentersWeWillLearn]"
 crime.8.name: "[Root.GetName]: арест преступного босса"
 crime.8.desc: "Недавно в результате спецоперации силовики задержали важного преступного босса на планете §H[Root.GetName]§!. Потеря лидера привела к серьезному сокращению активности одной из крупных преступных организаций на планете, что выразилось в существенном снижении уровня преступности."
 crime.8.desc.experimenters: "Такая находка даёт нам уникальную возможность изучить высококлассный преступный ум. Наши [GetExperimentalEngineerPlural] жаждут начать инвазивный анализ."
 crime.8.a: "$EXCELLENT$"
 crime.8.a.experimenters: "Мы выведаем много любопытных секретов."
 crime.40.name: "[Root.GetName]: мерзавцы и злодеи"
 crime.40.desc: "Преступность продолжает быть проблемой на планете §H[Root.GetName]§!, и теперь преступный мир пустил здесь глубокие корни. Некоторые районы погрузились в пучину беззакония или были полностью захвачены преступными организациями."
 crime.40.desc.experimenters: "К счастью, подобные условия обеспечивают нас обильным запасом свежих подопытных. Наши [GetExperimentalEngineerPlural] стремятся исследовать новые научные направления."
 crime.40.b.desc: "Активность отступников на планете §H[Root.GetName]§! продолжает возрастать, и они открыто выступают против воли коллективного разума. Предположительно здесь существуют целые сообщества трутней-отступников, которые крадут ресурсы у остальной части улья для поддержания своей злонамеренной деятельности."
 crime.40.b.desc.experimenters: "Эти девианты обретут новое предназначение в качестве подопытных. Возможно, наши [GetExperimentalEngineerPlural] обнаружат причину их отклонений во время последующих вскрытий."
 crime.40.c.desc: "Испорченность дронов на планете §H[Root.GetName]§! принимает все более крупные масштабы. Единицы-отступники теперь открыто действуют в соответствии с собственными параметрами, игнорируя команды центра. Предположительно они создали собственные сети, где обмениваются информацией и краденой энергией."
 crime.40.a: "С этим надо покончить раз и навсегда."
 crime.40.a.experimenters: "Преступники — полезный ресурс."
 crime.40.b: "Они решили уйти от коллективного разума!"
 crime.40.b.experimenters: "Отклонения от нормы лечатся только одним способом."
 crime.40.c: "Уровень испорченности приближается к критическому."
 crime.41.name: "[Root.GetName]: восстановление порядка"
 crime.41.desc: "Благодаря значительному снижению уровня преступности на планете §H[Root.GetName]§! когда-то всесильный преступный мир канул в небытие. Население заново прониклось чувством безопасности и гармонии."
 crime.41.desc.experimenters: "После восстановления порядка мы сможем вернуться к продуктивной научной деятельности."
 crime.41.b.desc: "Деятельность трутней-отступников на планете §H[Root.GetName]§! удалось пресечь. Верховная воля коллективного разума снова упрочила свои позиции."
 crime.41.b.desc.experimenters: "Наши [GetExperimentalEngineerPlural] найдут применение и погибшим девиантам."
 crime.41.c.desc: "Испорченность, которая ранее присутствовала среди дронов планеты §H[Root.GetName]§!, удалось вычистить из всех сетей. Все дроны снова функционируют в соответствии с параметрами, установленными центром."
 crime.41.a: "$GOOD$"
 crime.41.a.experimenters: "Наука движется вперед."
 crime.100.name: "[Root.GetName]: гангстерские войны"
 crime.100.desc: "Между двумя крупнейшими преступными организациями на планете §H[Root.GetName]§! кипит ожесточенное противостояние, которое наконец достигло критической точки. На улицах и переулках планеты вспыхнули ожесточенные столкновения, которые быстро распространяются в жилые районы.\n\nНаши местные силы безопасности делают все возможное, чтобы пресечь насилие, но сам масштаб противостояния не позволяет это сделать."
 crime.100.desc.experimenters: "Благодаря такой обстановке наши [GetExperimentalEngineerPlural] получили избыток материала для опытов. Нет худа без добра, как говорится."
 crime.100.a: "Это зона военных действий!"
 crime.101.name: "[Root.GetName]: засада банды"
 crime.101.desc: "Одна из банд на планете §H[Root.GetName]§! недавно провела согласованную атаку на офицеров сил правопорядка по всей планете. В назначенный час члены банды напали из засад на патрули силовиков, а некоторые полицейские участки были полностью захвачены. В результате напряженных боев погибли тысячи.\n\nНаши уцелевшие силы безопасности пытаются восстановить контроль, но пока что многие районы планеты погрязли в абсолютном беззаконии."
 crime.101.desc.experimenters: "Подобная преступность по крайней мере обеспечивает избыток свежего материала, которым могут воспользоваться наши [GetExperimentalEngineerPlural]."
 crime.101.a: "$crime.200.a$"
 crime.101.a.experimenters: "[GetExperimentersTragicLesson]"
 crime.101.tooltip: "§HНа [Root.GetPlanetMoon]е [Root.GetName] погибло поселение силовиков§!"
 crime.102.name: "[Root.GetName]: распространение гангстерских войн в космосе"
 crime.102.desc: "Жестокая война банд, бушевавшая на планете §H[Root.GetName]§!, распространилась на всю систему [Root.solar_system.GetName]. Поступают сообщения о нескольких столкновениях между вооруженными гражданскими кораблями, которые летают под бандитскими флагами. Обе стороны военного конфликта охотятся за прилетающими торговыми судами с целью обеспечения большего дохода и расширения своих флотилий."
 crime.102.desc.experimenters: "Наши [GetExperimentalEngineerPlural] запросили разрешение наблюдать за последствиями нашей карательной операции и за массовым выбросом трупов в космический вакуум."
 crime.102.a: "$crime.200.a$"
 crime.102.a.experimenters: "Наше возмездие будет крайне познавательным."
 crime.102.tooltip: "§RЗловредная пиратская флотилия появилась в системе [Root.solar_system.GetName]!§!"
 crime.103.name: "[Root.GetName]: решительное сражение банд"
 crime.103.desc: "В одном из крупнейших городских центров планеты §H[Root.GetName]§! недавно состоялось кровопролитное сражение между двумя крупными бандами. Количество погибших составило десятки тысяч с обеих сторон, но назвать кого-то победителем невозможно.\n\nОжесточенные бои почти сровняли город с землей, и большая часть населения была вынуждена бежать."
 crime.103.desc.experimenters: "Бессмысленная жестокость даже чем-то привлекательна: погибшие, возможно, еще послужат нашей науке."
 crime.103.a: "$DISCONCERTING$"
 crime.103.a.experimenters: "[GetExperimentersTragicLesson]"
 crime.103.tooltip: "§HНа [Root.GetPlanetMoon]е [Root.GetName] погибло 300 £pop£ поселений§!"
 crime.104.name: "Торговцы держатся подальше от гангстерских войн"
 crime.104.desc: "Война банд, идущая на планете §H[Root.GetName]§!, оказала отрицательное воздействие на здешнюю торговлю. С учетом нестабильной ситуации на поверхности несколько межзвездных торговых гильдий сделали официальное предупреждение для торговцев об опасности посещения планеты. В то же время торговля незаконным вооружением процветает."
 crime.104.desc.experimenters: "С появлением такого мощного оружия на улицах наши [GetExperimentalEngineerPlural] горят желанием изучить его разрушительное воздействие на [Root.Owner.GetSpeciesAdj&masc] организм."
 crime.104.a: "$WORRYING$"
 crime.104.a.experimenters: "[GetExperimentersWeWillLearn]"
 crime.200.name: "[Root.GetName]: расширение торговли наркотиками"
 crime.200.desc: "Из-за быстрого распространения преступности на планете §H[Root.GetName]§! продажа незаконных наркотических средств также достигла новых рекордных показателей. Теперь сюда из всех уголков исследованного космоса контрабандой провозятся самые разные наркотики, вызывающие привыкание.\n\nУпотребление наркотиков стало обычным делом, что отрицательно влияет на общую производительность."
 crime.200.desc.experimenters: "Наши [GetExperimentalEngineerPlural] уже в предвкушении и мечтают заняться новым захватывающим направлением для исследований, которое породит эта волна преступности."
 crime.200.a: "Это нехорошо."
 crime.200.a.experimenters: "Не преступники, а добровольцы!"
 crime.201.name: "[Root.GetName]: появление нового наркотика"
 crime.201.desc: "Контрабандисты на планете §H[Root.GetName]§! внедрили новый препарат, который, по нашему мнению, произведен где-то на пиратских территориях за пределами цивилизованного космоса. Этот препарат не только вызывает сильное привыкание, но также смертелен для большинства форм жизни в случае превышения минимальных доз потребления.\n\nВ то время как местные власти делают все возможное, чтобы остановить распространение этого препарата, жители планеты продолжают умирать в масштабах эпидемии."
 crime.201.desc.experimenters: "Как бы то ни было, изучение самого препарата и его воздействия на подопытных принесло достаточно любопытные результаты."
 crime.201.a: "$WORRYING$"
 crime.201.a.experimenters: "[GetExperimentersWeWillLearn]"
 crime.201.tooltip: "§H400 £pop£ поселений в мире [Root.GetName]§! умрут"
 crime.202.name: "[Root.GetName]: столкновение наркокартелей"
 crime.202.desc: "Между преступными картелями, которые участвуют в торговле наркотиками на планете §H[Root.GetName]§!, существует жесткая конкуренция за рынки. За последнее время произошло несколько столкновений с использованием тяжелого пехотного вооружения армейского класса, в результате чего был нанесен значительный материальный ущерб, а сотни гражданских погибли. Похоже, что контрабандой на планету завозят не только наркотики."
 crime.202.desc.experimenters: "[GetExperimentersEmergingCrime]"
 crime.203.name: "[Root.GetName]: крушение грузовоза с наркотиками"
 crime.203.desc: "Крупному гражданскому грузовому звездолету недавно не позволили войти в атмосферу планеты §H[Root.GetName]§!, после того как обнаружилось, что он перевозит незаконные наркотики во вспомогательном грузовом отсеке. Когда звездолету приказали остановить двигатели для досмотра, вместо этого его капитан, спятивший от наркоты представитель расы [Root.Owner.GetSpeciesName], решил прорываться через орбитальную блокаду, чтобы попробовать приземлиться.\n\nВо время спуска звездолет был подбит наземным огнем планетарных сил безопасности и упал в густонаселенной местности. В месте падения мало кто выжил."
 crime.203.desc.experimenters: "Наши [GetExperimentalEngineerPlural] жаждут изучить эффекты наркотиков, которые уже распространились в окружающей среде близлежащих сообществ."
 crime.203.a: "Это катастрофа!"
 crime.203.a.experimenters: "[GetExperimentersTragicLesson]"
 crime.204.name: "[Root.GetName]: продолжение торговли наркотиками"
 crime.204.desc: "Незаконная торговля наркотиками на планете §H[Root.GetName]§! не ослабевает. Недавно мы обнаружили контрабандистов, которые каким-то образом похитили экзотические газы из одного из наших орбитальных хранилищ, сделав выбор в пользу газов, которые, как известно, обладают галлюциногенными свойствами. Затем их доставили дилерам и продали в глухих переулках планеты [Root.GetName]."
 crime.204.desc.experimenters: "Наши [GetExperimentalEngineerPlural] удивлены, что не додумались до таких изобретательных способов применения экзотических газов первыми."
 crime.204.a: "Мы не можем позволить этому продолжаться!"
 crime.204.a.experimenters: "Как интересно."
 crime.300.name: "Власть мафии"
 crime.300.desc: "Доминирующий преступный синдикат на планете §H[Root.GetName]§! недавно уничтожил своих последних конкурентов и получил полный контроль над внушительным преступным миром. Они давно уже подорвали влияние настоящих планетарных властей, и местное население теперь рассматривает этих бандитов как истинных правителей [Root.GetPlanetMoon]ы [Root.GetName]."
 crime.300.desc.experimenters: "Наши [GetExperimentalEngineerPlural] присвоили этой планете статус «богатой ресурсами» для будущих исследований."
 crime.300.a: "С этими головорезами нужно разобраться."
 crime.301.name: "[Root.GetName]: крышевание"
 crime.301.desc: "Бандиты, контролирующие планету §H[Root.GetName]§!, ввели обширные поборы за крышевание. Поскольку истинные судебные и правоохранительные органы оказались неспособны справиться с организованной преступностью, население считает, что у него нет иного выбора, кроме как подчиниться власти этих преступников. Это сильно влияет на производительность труда."
 crime.301.desc.experimenters: "С другой стороны, наши [GetExperimentalEngineerPlural] отмечают, что в поставке подопытных эти бандиты оказываются даже эффективнее официальных каналов."
 crime.301.a: "Нужно восстановить контроль."
 crime.301.a.experimenters: "И всё-таки нужно попытаться восстановить контроль."
 crime.302.name: "[Root.GetName]: продажная администрация"
 crime.302.desc: "Недавняя миссия по выявлению фактов на планете §H[Root.GetName]§! установила, что большая часть здешней администрации находится в услужении у доминирующего преступного синдиката. Все коррумпированные чиновники, о которых идет речь, были заменены, однако это привело к значительным сбоям в работе государственного аппарата.\n\nКроме того, бандиты, возглавляющие преступный мир планеты, теперь даже пытаются, при помощи подкупа или принуждения, склонить новых чиновников к сотрудничеству с их организацией."
 crime.302.desc.experimenters: "[GetExperimentersEmergingCrime]"
 crime.302.a: "Всего лишь временная неудача."
 crime.302.b: "Ввести политику полной нетерпимости."
 crime.302.c: "Начать поощрять честность."
 crime.303.name: "[Root.GetName]: убийство губернатора гангстерами"
 crime.303.desc: "[governor_target.GetTitle] [governor_target.GetName] убит. Это дело рук бандитов криминального синдиката, управляющего преступным миром планеты §H[Root.GetName]§!! Дело было так: покинув космопорт в составе кортежа, [governor_target.GetTitle] оказывается в ловушке, и между охраной и атакующими возникает интенсивная перестрелка.\n\nКогда пыль улеглась, оказалось, что [governor_target.GetTitle] уже не дышит."
 crime.303.a: "Подготовить торжественную церемонию похорон."
 crime.303.a.experimenters: "[GetExperimentersTragicLesson]"
 crime.304.name: "[Root.GetName]: узурпация торговли гангстерами"
 crime.304.desc: "Преступный синдикат, управляющий планетой §H[Root.GetName]§!, теперь контролирует значительную часть торговли с ней. Они установили контроль над несколькими крупными космопортами, где вся торговля обязательно осуществляется через их посредников. В результате наши доходы от торговли с [Root.GetPlanetMoon]ой [Root.GetName] упали по всем направлениям."
 crime.304.desc.experimenters: "К счастью, линии снабжения, которыми пользуются наши [GetExperimentalEngineerPlural], остались незатронутыми — вероятно, благодаря уже оплаченным взяткам за подопытных."
 crime.304.a: "$crime.40.a$"
 crime.304.a.experimenters: "Наука движется вперед."
 crime.500.name: "Паника трутней на [Root.GetPlanetMoon]е [Root.GetName]"
 crime.500.desc: "Большое количество трутней-отступников недавно вызвали панику на планете §H[Root.GetName]§!, нападая на лояльных трутней и нанося урон нашим объектам. Отступникам удалось нанести значительный урон, прежде чем их удалось прогнать."
 crime.500.a: "С этими отступниками нужно разобраться."
 crime.500.a.experimenters: "Приступить к вскрытиям."
 crime.501.name: "Вмешательство отступников на [Root.GetPlanetMoon]е [Root.GetName]"
 crime.501.desc: "Присутствие возрастающего количества трутней-отступников на планете §H[Root.GetName]§! отрицательно сказалось на эффективности местного производства. В то время как наши трутни занимаются своими делами, отступники часто им мешают или крадут необходимые инструменты и оборудование."
 crime.501.desc.experimenters: "Подобные отклонения от нормы лишь расширяют спектр возможностей для научных изысканий, которыми занимаются наши [GetExperimentalEngineerPlural]."
 crime.501.a: "$crime.500.a$"
 crime.501.a.experimenters: "[GetExperimentersWeWillLearn] "
 crime.502.name: "Главарь отступников ликвидирован на [Root.GetPlanetMoon]е [Root.GetName]"
 crime.502.desc: "Лояльным трутням недавно удалось загнать в угол и уничтожить одного из наиболее влиятельных трутней-отступников, который вызывал волнения и проблемы на планете §H[Root.GetName]§!. Похоже, что смерть этого трутня серьезно повлияла на активность прочих отступников, а это доказывает, что он был для них важным лидером."
 crime.502.desc.experimenters: "Наши [GetExperimentalEngineerPlural] отметили ценность вскрытия этого влиятельного девианта. Мы ожидаем многого от изучения его безжизненной оболочки."
 crime.502.a: "Воля коллективного разума есть абсолют."
 crime.502.a.experimenters: "Даже после смерти они продолжат служить улью."
 crime.550.name: "Мятеж дронов на [Root.GetPlanetMoon]е [Root.GetName]"
 crime.550.desc: "Недавно одна из крупных сетей испорченных дронов на планете §H[Root.GetName]§! определила [Root.Owner.GetName&acc] [Root.Owner.GetName::как своего врага|||pl:как своих врагов]. Эти дроны стали буйствовать и нанесли значительный урон, прежде чем нашим лояльным модулям безопасности удалось кого-то из них уничтожить, а кого-то прогнать."
 crime.550.a: "Это неприемлемо."
 crime.551.name: "Помехи от сигналов отступников на [Root.GetPlanetMoon]е [Root.GetName]"
 crime.551.desc: "Сети испорченных дронов на планете §H[Root.GetName]§! начали мешать функционированию наших лояльных единиц. Их сигналы забивают сигналы из центра, что приводит к медлительному, а иногда и непредсказуемому поведению со стороны наших рабочих дронов."
 crime.552.name: "[Root.GetName]: сети отступников уничтожены"
 crime.552.desc: "Вирус, внедренный в одну из сетей испорченных дронов на планете §H[Root.GetName]§!, полностью уничтожил всю их информационную систему. Это привело к значительному снижению активности всех испорченных порчей на планете."
 crime.552.a: "Указания центра будут исполнены."
 crime.1001.name: "Закрытие филиала на [Root.GetPlanetMoon]е [Root.GetName]"
 crime.1001.desc: "Уровень преступности на планете §H[Root.GetName]§! продолжает падать, и местные власти смогли сосредоточить свои усилия на препятствовании работе незаконных предприятий §H[office_owner.GetName&gen]§!. Проведено множество арестов, из-за чего криминальный филиал вынужден был прекратить свою деятельность."
 crime.1001.a: "Туда им и дорога."
 crime.1002.name: "Закрытие филиала на [From.GetPlanetMoon]е [From.GetName]"
 crime.1002.desc: "Наш филиал на планете §H[From.GetName]§!, являющейся частью §H[From.Owner.GetName&gen]§!, был недавно принудительно закрыт после проведения местными властями массовых арестов. Похоже, недавнее снижение преступности на планете позволило их правоохранительным органам сосредоточить усилия на подрыве нашей деятельности."
 crime.1002.tooltip: "Наш филиал на [From.GetPlanetMoon]е [From.GetName] закрыт."
 #Atomic Clock
 atomic_clock_cat: "$AST_DEBRIS_FIELD_1_CAT$"
 distar.330.name: "Обратный отсчет атомных часов"
 distar.330.desc: "Последние 42 года и 3 дня исследователи на [Root.Capital.GetPlanetMoon]е [Root.Capital.GetName] с нетерпением ожидали, чем же закончится обратный отсчет таинственных атомных часов невероятной точности, обнаруженных на [From.From.From.GetPlanetMoon]е [From.From.From.GetName].\n\nВсе гипотезы и догадки, накопившиеся за десятилетия оживленных дебатов, исчезли в мгновение ока, вместе с большей частью [nuked_primitive_planet.GetPlanetMoon]ы [nuked_primitive_planet.GetName].\n\nКак только часы отмерили отведенный им срок, они передали сигнал на приемник на [nuked_primitive_planet.GetPlanetMoon]е [nuked_primitive_planet.GetName], вызвав термоядерный взрыв такой разрушительной силы, что он опустошил целую планету, стерев с ее лица примитивную цивилизацию, которая там обитала.\n\nПока наши ученые обсуждают причину столь тщательно рассчитанной аннигиляции, атомные часы продолжают тикать, будто и не было никакого опустошения."
 distar.330.a.phile: "ЧТО МЫ НАДЕЛАЛИ?.."
 distar.335.name: "Обратный отсчет атомных часов"
 distar.335.desc: "Последние 42 года и 3 дня исследователи на [Root.Capital.GetPlanetMoon]е [Root.Capital.GetName] с нетерпением ожидали, чем же закончится обратный отсчет таинственных атомных часов невероятной точности, обнаруженных на [From.From.From.GetPlanetMoon]е [From.From.From.GetName].\n\nВсе гипотезы и догадки, накопившиеся за десятилетия оживленных дебатов, исчезли в мгновение ока, вместе с большей частью [nuked_planet.GetPlanetMoon]ы [nuked_planet.GetName].\n\nКак только часы отмерили отведенный им срок, они передали сигнал на приемник на [nuked_planet.GetPlanetMoon]е [nuked_planet.GetName], вызвав термоядерный взрыв такой разрушительной силы, что он опустошил целую планету.\n\nПока наши ученые строят предположения о причине столь тщательно рассчитанной аннигиляции, атомные часы продолжают тикать, будто и не было никакого опустошения."
 planet_culture_shock: "$culture_shock_bronze_age$"
 planet_culture_shock_desc: "Этот прежде досветовой мир переживает период хаотичных потрясений, адаптируясь к резкому внедрению продвинутых технологий. Во многих отдельных регионах по-прежнему имеется значительное сопротивление подрывного характера."
 col_mining: "Добывающий мир"
 col_mining_tt: "Поверхность этой планеты в основном покрыта рудниками, карьерами, скважинами и тяжелой техникой."
 col_mining_desc: "Специализируется на производстве £minerals£ §Sминералов§!."
 col_farming: "Аграрный мир"
 col_farming_tt: "Живописные пасторальные пейзажи, богатые на урожай зерновых, хочется немедленно забыть из-за вездесущего запаха удобрений."
 col_farming_desc: "Специализируется на производстве £food£ §Sпищи§!."
 col_generator: "Энергетический мир"
 col_generator_tt: "Почти бесконечные комплексы генераторных установок гудят и светятся на этой планете."
 col_generator_desc: "Специализируется на производстве £energy£ §Sэнергии§!."
 col_factory: "Мир-фабрика"
 col_factory_tt: "Сборочные конвейеры и ремесленные мастерские производят товары точно и в едином ритме."
 col_factory_desc: "Специализируется на производстве £consumer_goods£ §Sтоваров массового спроса§!."
 col_city: "Урбанистический мир"
 col_city_tt: "Плотно населенный мир, в котором один светящийся мегаполис практически сразу переходит в другой."
 col_city_desc: "Повышает производство £trade£§Sторговли§!."
 col_industrial: "Индустриальный мир"
 col_industrial_tt: "Большая часть населения планеты занята в тяжелой промышленности, которая производит различную продукцию."
 col_industrial_desc: "Колония сосредоточится на производстве £consumer_goods£ §Sтоваров массового спроса§! и £alloys£ §Sсплавов§! одновременно."
 col_foundry: "Мир-кузница"
 col_foundry_tt: "Жар от сплаволитейных заводов ощущается почти повсюду на этой планете."
 col_foundry_desc: "Специализируется на производстве £alloys£ §Sсплавов§!."
 col_hive: "Мир-гнездо"
 col_hive_tt: "Крупная сеть шумных ульев опоясывает всю планету."
 col_hive_desc: "Умеренно повышает £trade£ §Hторговлю§!."
 col_nexus: "Машинный комплекс"
 col_nexus_tt: "Поверхность этой планеты покрыта механической сетью из тысяч средств для обслуживания и ремонта модулей."
 col_nexus_desc: "Повышает £trade£ §Sобъем торговли§!."
 col_research: "Технический мир"
 col_research_tt: "Этот мир находится на острие научных исследований и технического прогресса."
 col_research_desc: "Повышает £research£ §Hэффективность исследований§!."
 col_capital: "Столица государства"
 col_capital_desc: "Планета, являющаяся столицей межзвездного государства — колоссальное скопление правительственных зданий, организаций и штаб-квартир разных агентств."
 col_capital_machine: "Машинная столица"
 col_capital_machine_desc: "Планета-столица машинного разума — это главное место расположения его центрального сетевого сознания."
 col_capital_hive: "Столица-улей"
 col_capital_hive_desc: "Планета-столица коллективного разума — это главное место его расположения, откуда берут начало все мысли и действия коллектива."
 col_habitat: "Среда обитания"
 col_habitat_desc: "Искусственная аркология в глубоком космосе."
 col_fortress: "Мир-крепость"
 col_fortress_tt: "Планетарная оборона, бункеры и цитадели настолько часто встречаются в этом мире, что устроить вторжение извне или гражданские беспорядки здесь будет затруднительно."
 col_fortress_desc: "Повышает £stability£ §Sстабильность§! и £defense_army£ §Sоборону§!."
 col_fe_colony: "Колония угасшей империи"
 col_fe_colony_desc: "Повышает £stability£ §Sстабильность§! и дает £housing£ §Sжилье§!."
 col_fe_colony_tt: "$col_fe_capital_tt$"
 col_fe_capital: "Столица угасшей империи"
 col_fe_capital_desc: "$col_fe_colony_desc$"
 col_fe_capital_tt: "Хотя эта империя и переживает упадок, но уровень технического прогресса в этом мире поражает воображение."
 col_resort: "Курортный мир"
 col_resort_tt: "Спокойный курортный мир с управляемой погодой и красивой природой, еще не обезображенный крупномасштабной застройкой."
 col_resort_desc: "Повышает £happiness£ §Sсчастье§! и £amenities£ §Sблага§! во всём государстве."
 col_slave: "Невольничий мир"
 col_slave_tt: "Этот мир создан специально для того, чтобы извлекать максимум из порабощенного населения."
 col_slave_desc: "Увеличивает производство ресурсов £slavery£ §Sрабами§! и повышает £stability£ §Sстабильность§!."
 col_penal: "Тюремное поселение"
 col_penal_tt: "Суровое тюремное поселение, полное преступников, которые отрабатывают свой долг перед обществом в трудовых лагерях."
 col_penal_desc: "Увеличивает производство ресурсов £job£ §Sрабочими§!."
 col_primitive: "Примитивный мир"
 col_primitive_desc: "На этой планете живет развивающаяся досветовая цивилизация."
 col_infested: "Зараженный мир"
 col_infested_desc: "Эта планета заражена преторианской Карой."
 col_contingency: "Мир Контингенции"
 col_contingency_desc: "Эта планета захвачена Контингенцией."
 col_ecu_mix: "Экуменополис"
 col_ecu_mix_desc: "Эта планета-город не специализируется ни на какой определенной сфере промышленности."
 col_ecu_industrial: "Промышленный экуменополис"
 col_ecu_industrial_desc: "Огромный планетарный город, промышленность которого распределена между сплавами и товарами массового спроса."
 col_ecu_foundry: "Литейный экуменополис"
 col_ecu_foundry_desc: "Огромная планета-город, ориентированная на непрерывное производство сплавов."
 col_ecu_factory: "Завод экуменополиса"
 col_ecu_factory_desc: "Огромная планета-город, специализирующаяся на непрерывном производстве товаров массового спроса."
 col_ecu_research: "Научный экуменополис"
 col_ecu_research_desc: "Огромная планета-город, специализирующаяся на самых передовых исследованиях."
 col_mac: "Мир Машин"
 col_mac_desc: "Этот Мир Машин не специализируется ни на каком определенном типе производства."
 col_mac_foundry: "Литейный Мир Машин"
 col_mac_foundry_desc: "Гигантская машина размером с планету, предназначенная для производства огромных объемов сплавов."
 col_mac_foundry_tt: "$col_mac_foundry_desc$"
 col_mac_factory: "Фабричный Мир Машин"
 col_mac_factory_desc: "Гигантская машина размером с планету, предназначенная для производства огромного объема товаров массового спроса."
 col_hiv: "Мир улья"
 col_hiv_desc: "Этот организм размером с планету не специализируется ни на каком определенном типе производства."
 col_hiv_foundry: "Литейный мир улья"
 col_hiv_foundry_desc: "Организм размером с планету, предназначенный для производства огромных объемов сплавов."
 col_habitat_research: "Научная станция"
 col_habitat_research_desc: "Искусственная аркология в глубоком космосе, предназначенная для научных исследований."
 col_habitat_leisure: "Станция досуга"
 col_habitat_leisure_desc: "Искусственная аркология в глубоком космосе, предназначенная для досуга и культурных мероприятий."
 col_habitat_trade: "Торговая станция"
 col_habitat_trade_desc: "Искусственная аркология в глубоком космосе, предназначенная для торговли."
 col_habitat_trade_tt: "В этих орбитальных узлах переплетаются торговые маршруты и галактические амбиции."
 col_habitat_trade_custom: "§Y$district_hab_housing_plural$§! заменят одну должность [clerk.GetIcon] «§Y[clerk.GetName]§!» должностью [trader.GetIcon] «§Y[trader.GetName]§!»\n"
 col_habitat_fortress: "Станция-крепость"
 col_habitat_fortress_desc: "Искусственная аркология в глубоком космосе, предназначенная для оборонительных сооружений."
 col_habitat_fortress_tt: "Грозные твердыни, щетинящиеся орудиями и щитами, превращают орбиту в кладбище для незваных гостей."
 col_habitat_foundry: "Литейная станция"
 col_habitat_foundry_desc: "Искусственная аркология в глубоком космосе, предназначенная для производства сплавов."
 col_habitat_foundry_tt: "Здесь сырье переплавляется в сплавы — строительные материалы для флотилий и мегасооружений, топливо для ненасытных двигателей государства."
 col_habitat_foundry_custom: "§YПромышленные районы§! по возможности переключат одну из должностей с производства товаров массового спроса на сплавы.\n\n"
 col_habitat_factory: "Фабричная станция"
 col_habitat_factory_desc: "Искусственная аркология в глубоком космосе, предназначенная для производства товаров массового спроса."
 col_habitat_factory_tt: "Автоматизированные производственные линии штампуют товары массового спроса, удовлетворяющие потребности граждан."
 col_habitat_factory_custom: "§YПромышленные районы§! по возможности переключат одну из должностей с производства сплавов на товары массового спроса.\n\n"
 col_habitat_industrial: "Индустриальная станция"
 col_habitat_industrial_desc: "Искусственная аркология в глубоком космосе, предназначенная для производства сплавов и товаров массового спроса."
 col_habitat_industrial_tt: "Парящие литейные и сборочные линии синхронно выпускают потоки сплавов и потребительских товаров."
 col_habitat_refinery: "Перерабатывающая станция"
 col_habitat_refinery_desc: "Искусственная аркология в глубоком космосе, предназначенная для производства редких ресурсов."
 col_habitat_mining: "Добывающая станция"
 col_habitat_mining_desc: "Искусственная аркология в глубоком космосе, предназначенная для добычи минералов"
 col_habitat_farming: "Станция гидропоники"
 col_habitat_farming_desc: "Искусственная аркология в глубоком космосе, предназначенная для выращивания продовольствия"
 col_habitat_farming_tt: "Гигантские гидропонные сооружения, где под искусственным солнцем зреют урожаи, никогда не знавшие настоящей земли."
 col_habitat_farming_desc_custom: "§Y$district_hab_housing_plural$§! заменят должности [clerk.GetIcon] «§Y[clerk.GetName]§!» должностями [farmer.GetIcon] «§Y[farmer.GetName]§!»\n"
 col_habitat_gestalt_farming: "$col_habitat_farming$"
 col_habitat_gestalt_farming_desc: "$col_habitat_farming_desc$."
 col_habitat_gestalt_farming_desc_custom: "§Y$district_hab_housing_plural$§! заменят должности [maintenance_drone.GetIcon] «§Y[maintenance_drone.GetName]§!» должностями [agri_drone.GetIcon] «§Y[agri_drone.GetName]§!»\n"
 col_habitat_energy: "Энергетическая станция"
 col_habitat_energy_desc: "Искусственная аркология в глубоком космосе, предназначенная для производства энергии"
 col_habitat_energy_tt: "Эти конструкции извлекают энергию из солнечного ветра и космического излучения, превращая холодную пустоту в электричество."
 col_ring_mix: "Мир-кольцо"
 col_ring_mix_desc: "Огромный мир-кольцо, где процветают все типы производства."
 col_default_machine: "Колония"
 col_default_machine_desc: "Новая колония нашего государства, работающая как слаженный механизм."
 col_gestation: "Инкубационный мир"
 col_gestation_desc: "Этот мир специализируется на ускоренном созревании биологических существ и преобразовании их в единицы-киборги для быстрой их интеграции в коллектив."
