 ## TECHNOLOGIES ##
 tech_hive_node: "Синаптические сооружения"
 tech_hive_node_desc: "Волю улья можно усилить посредством развития макроскопических синаптических узлов."
 tech_hive_cluster: "Скопления синапсов"
 tech_hive_cluster_desc: "Создавая кластеры сетей макроскопических синаптических узлов, можно достичь максимальной передачи меганейронов на доступную площадь поверхности."
 tech_hive_confluence: "Слияние мыслей"
 tech_hive_confluence_desc: "Воля улья будет и дальше усиливаться и координироваться за счет расширения и развития огромного нервного центра меганейронов."
 tech_food_processing_1: "Обработка пищи"
 tech_food_processing_1_desc: "Усовершенствованные приемы обработки пищи способствуют улучшению методов ее сохранения и сокращению потерь."
 tech_food_processing_2: "Улучшенная обработка пищи"
 tech_food_processing_2_desc: "Новые методы криоконсервации и повторного секвенирования белков значительно повысят эффективность обработки пищи."
 tech_alloys_1: "Голографические литейные формы"
 tech_alloys_1_desc: "Цельные голографические литейные формы могут мгновенно изменять внешний вид, что ускоряет производство сплавов."
 tech_alloys_2: "Наносепараторы"
 tech_alloys_2_desc: "Наносепараторы — новый революционный шаг в создании сплавов, упрощающий процесс литья, одновременно улучшая общее качество продукции."
 tech_luxuries_1: "Сборка при помощи наноцепей"
 tech_luxuries_1_desc: "Благодаря предварительно запрограммированным наноцепям многие товары массового спроса можно быстро собирать в изготовителях."
 tech_luxuries_2: "Терминалы репликаторов"
 tech_luxuries_2_desc: "Эти терминалы могут воссоздать любой предварительно утвержденный объект, если его модель сохранена в их банках памяти."
 tech_space_mining_1: "Фабрики переработки с нулевой гравитацией"
 tech_space_mining_1_desc: "Добавление внутренних фабрик переработки на добывающих станциях существенно повысит добычу минералов."
 tech_space_mining_2: "Сканеры минералов дальнего действия"
 tech_space_mining_2_desc: "Увеличенный радиус действия сканера позволит нам быстрее определить концентрации минералов и сосредоточить наши усилия по добыче именно в таких местах."
 tech_space_mining_3: "Лучи для резки минералов"
 tech_space_mining_3_desc: "Эти мощные лазеры ближнего действия могут с легкостью резать камень, в результате чего повышается эффективность добычи минералов."
 tech_space_mining_4: "Автономные добывающие дроны"
 tech_space_mining_4_desc: "Флотилии автономных дронов, снабженных добывающими лучами, используются для быстрой и эффективной разработки минералов поблизости."
 tech_space_mining_5: "Нанитовые зонды для минералов"
 tech_space_mining_5_desc: "Эти особые зонды оснащены роями нанитов, которые определяют прежде неизвестные концентрации минералов и помечают их для дальнейшей добычи."
 tech_space_science_1: "Лаборатории с нулевой гравитацией"
 tech_space_science_1_desc: "Множество критически важных исследований можно проводить только в условиях нулевой гравитации, для чего в сущности и предназначены эти специализированные лаборатории."
 tech_space_science_2: "Миниатюрные сдерживающие поля"
 tech_space_science_2_desc: "Сдерживающие силовые поля превосходно подходят для изоляции и удержания различных субстанций или образцов, которые нужно подробно проанализировать."
 tech_space_science_3: "Квантовые зонды"
 tech_space_science_3_desc: "Продвинутые зонды, которые могут подробно проанализировать объекты на субатомном уровне, выдав множество ценных исследовательских данных."
 tech_space_science_4: "Автономные протоколы станций"
 tech_space_science_4_desc: "Повышение автоматизации станций позволит освободить больше персонала для выполнения исследовательских работ."
 tech_space_science_5: "Анализ в нескольких измерениях"
 tech_space_science_5_desc: "Изучение чего-либо с ограниченной точки зрения, присущей стандартной реальности, не дает возможности увидеть полную картину. Нужно смотреть со всех сторон."
 tech_mine_volatile_motes: "Стабилизация пылинок"
 tech_mine_volatile_motes_desc: "Летучая пыль — это нестабильные частицы, с которыми опасно работать. Чтобы безопасно собирать их, не спровоцировав при этом цепную реакцию в виде взрывов, нужно использовать энергетические поля для стабилизации пылинок."
 tech_mine_exotic_gases: "Добыча экзотических газов"
 tech_mine_exotic_gases_desc: "Карманы с экзотическим газом попадаются редко и часто недоступны при использовании стандартных методов. До таких залежей можно добраться только при помощи специальной технологии добычи."
 tech_interplanetary_commerce: "Межпланетная торговля"
 tech_interplanetary_commerce_desc: "Благодаря новым планетарным рынкам возникают новые возможности для торговли. Бизнес будет процветать."
 tech_interstellar_economics: "Межзвездная экономика"
 tech_interstellar_economics_desc: "Отправившись в космос и осмелившись выйти за пределы нашей родной системы, мы также вступили в новую эпоху экономики. Новые рынки возникают с поразительной скоростью, и экономисты-теоретики изо всех сил стараются не отставать."
 tech_holo_entertainment: "Голографические развлечения"
 tech_holo_entertainment_desc: "Новаторское использование голографических технологий позволяет создавать искусственные среды, которые кажутся такими же подлинными, как и реальный мир. Это следующий этап в развитии иммерсивных развлечений."
 tech_prescient_data_modeling: "Нумское моделирование данных"
 tech_prescient_data_modeling_desc: "Здесь действуют прорицательские способности Нумы, или же мы имеем дело с квалифицированным мастерством? В любом случае эта модель прогнозирования галактического рынка ценных бумаг позволяет предсказать колебания в экономике с божественной точностью."
 tech_orbital_trash_dispersal: "Орбитальное распространение мусора"
 tech_orbital_trash_dispersal_desc: "Эта система управления орбитальной бомбардировкой засыпает планету миллионами высокоскоростных мелких снарядов, переполняя оборонные сети планеты мусорными данными. Корабли, оснащенные этим компонентом, будут наносить больший урон при орбитальной бомбардировке."
 tech_nanite_transmutation: "Нанитовое преобразование"
 tech_nanite_transmutation_desc: "Массовое производство этих особенно эффективных нанитов требует очень продвинутого оборудования."
 ## DEPOSITS ##
 #Energy
 d_arid_highlands: "Засушливые нагорья"
 d_arid_highlands_desc: "Расположенный на высоко над уровнем моря сухой экорегион с редкой растительностью в виде пустынных трав и кустарников."
 d_hot_springs: "Горячие источники"
 d_hot_springs_desc: "Из этих родников вытекают грунтовые воды, подогреваемые геотермальными процессами."
 d_searing_desert: "Палящая пустыня"
 d_searing_desert_desc: "Из-за небольшого количества осадков, экстремальных температур и малочисленной растительности эти песчаные пустыни представляют угрозу для большинства форм жизни."
 d_geothermal_vent: "Геотермальные источники"
 d_geothermal_vent_desc: "Эти фумаролы выбрасывают пар и ядовитые газы из глубин коры планеты."
 d_underwater_vent: "Подземные источники"
 d_underwater_vent_desc: "Металлосодержащие отложения вступают в реакцию с перегретой водой в коре планеты, выбрасывая химические вещества на морское дно вдоль зоны расхождения тектонических плит."
 d_rushing_waterfalls: "Стремительный водопад"
 d_rushing_waterfalls_desc: "Реки, стекающие по отвесным горным склонам, образуют живописные картины."
 d_frozen_gas_lake: "Озеро из замерзшего газа"
 d_frozen_gas_lake_desc: "Температуры глубокой заморозки удерживали в твердом состоянии газы, образовавшиеся под воздействием огромного давления в незапамятные времена и растворенные в этих обледенелых озерах."
 d_bubbling_swamp: "Бурлящее болото"
 d_bubbling_swamp_desc: "Эта заболоченная местность характеризуется почти стоячей водой и богатой растительностью. Это рай для водных растений, насекомых и болотных газов."
 d_fuming_bog: "Трясина с испарениями"
 d_fuming_bog_desc: "Ядовитое болото, покрытое чахлой растительностью, мхами и грибами, где с поверхности воды испаряются газы."
 d_tempestous_mountain: "Бурлящая гора"
 d_tempestous_mountain_desc: "Разрываемая ветрами растительность цепляется за высокие скалы и бурные утесы в этих дождливых горах."
 d_dust_desert: "Пыльная пустыня"
 d_dust_desert_desc: "Огромная покрытая песком территория, на которой разбросаны зоны с редкой и ценной летучей пылью. Добыча возможна при наличии подходящего оборудования."
 d_dust_caverns: "Пыльные пещеры"
 d_dust_caverns_desc: "Редкие летучие пылинки конденсируются в этих песчаных пещерах и скрытых пустотах."
 d_numas_breath: "Дыхание Нумы"
 d_numas_breath_desc: "Этот стабильный канал, проникающий в кору планеты, создал $NAME_Caravaneer_Fleet2$."
 d_nanosands: "Нанопески"
 d_nanosands_desc: "Песчаные дюны на этой планете почти полностью состоят из бесчисленных разбитых нанитов. Их структура разрушена настолько, что реактивация уже невозможна, но они покрывают планету гранулятом из редких металлов."
 #Minerals
 d_crystal_forest: "Кристальный лес"
 d_crystal_forest_desc: "В этих экзотических лесах сверкающие кристаллы растут подобно инею."
 d_veiny_cliffs: "Рудножильные утесы"
 d_veiny_cliffs_desc: "Полосы ценных минеральных руд, будто вены, усыпали эти обнаженные горные склоны."
 d_ore_rich_caverns: "Богатые на руду пещеры"
 d_ore_rich_caverns_desc: "Эти глубокие пещеры изобилуют залежами металлических и минеральных руд."
 d_mineral_fields: "Минеральные поля"
 d_mineral_fields_desc: "В результате геологического переворота эти полезные минералы давным-давно вышли на поверхность планеты."
 d_rich_mountain: "Богатая гора"
 d_rich_mountain_desc: "Эти горные склоны сверкают от богатых руд и драгоценных камней."
 d_crystal_reef: "Кристальный риф"
 d_crystal_reef_desc: "Кристаллические решетки мерцают среди скал и кораллов этого песчаного рифа."
 d_prosperous_mesa: "Процветающее плато"
 d_prosperous_mesa_desc: "Этот холм с плоским верхом имеет крутые склоны, усыпанные полезными ресурсами."
 d_crystalline_caverns: "Кристаллические пещеры"
 d_crystalline_caverns_desc: "Эти пещеры, напоминающие огромные жеоды, со всех сторон заполнены редкими кристаллами."
 d_submerged_ore_veins: "Подводные рудные жилы"
 d_submerged_ore_veins_desc: "Океанское дно усеяно множеством полезных рудных залежей, предоставляющих возможности для глубоководной добычи."
 #Food
 d_bountiful_plains: "Изобильные равнины"
 d_bountiful_plains_desc: "Эти широкие равнины отличаются плодородностью почв и высокими травами, обеспечивая богатый потенциал сельскохозяйственных угодий."
 d_nutritious_mudland: "Питательные грязи"
 d_nutritious_mudland_desc: "До самого горизонта видна жидкая грязь из глины, ила и суглинка, в которой доминирует низкая растительность."
 d_green_hills: "Зеленые холмы"
 d_green_hills_desc: "Ряды холмов, покрытых зеленью и отличающихся плодородными почвами."
 d_forgiving_tundra: "Бесстрастная тундра"
 d_forgiving_tundra_desc: "Заросли осоки, кустарники и лишайники покрывают эту высокоширотную природную зону, где подпочва с вечной мерзлотой тем не менее покрыта более плодородными отложениями."
 d_rugged_woods: "Суровый лес"
 d_rugged_woods_desc: "Холодные каменистые леса с травянистым подлеском."
 d_boggy_fens: "Вязкие топи"
 d_boggy_fens_desc: "Эти низменные заболоченные места богаты питательными веществами для растений."
 d_lush_jungle: "Буйные джунгли"
 d_lush_jungle_desc: "Из-за плотного полога и почти непроницаемой растительности эти джунгли отличаются плохим качеством почвы, но изобилуют растительной жизнью и плодоносящими деревьями."
 d_lichen_fields: "Лишайниковые поля"
 d_lichen_fields_desc: "Покрытые росой мхи, лишайники и грибы образуют мягкий ковер, покрывающий всю эту скалистую местность."
 d_fungal_caves: "Грибные пещеры"
 d_fungal_caves_desc: "Эти обширные системы пещер покрыты множеством видов съедобных грибов, которым для процветания не нужно ни солнечного света, ни плодородной почвы."
 d_fungal_forest: "Грибной лес"
 d_fungal_forest_desc: "Вместо деревьев в этих плодородных лесах доминируют высокие грибы; огромные шляпки этих гигантов затмевают солнечный свет, создавая идеальную среду для богатого разнообразия более мелких экземпляров."
 d_fertile_lands: "Плодородные земли"
 d_fertile_lands_desc: "Из этого обширного участка открытых равнин получатся идеальные сельскохозяйственные угодья."
 d_marvelous_oasis: "Чудесный оазис"
 d_marvelous_oasis_desc: "Мерцающая жемчужина воды и зелени в бесплодной пустыне."
 d_great_river: "Великая река"
 d_great_river_desc: "Огромная спокойная река обеспечивает водой и растительностью богатство форм жизни."
 d_black_soil: "Чернозем"
 d_black_soil_desc: "Эти почвы, обладающие удивительно высокой влагоемкостью и большим количеством химических веществ, являющихся неотъемлемой частью растительной жизни, обещают впечатляющие урожаи сельскохозяйственных культур."
 d_teeming_reef: "Кишащий риф"
 d_teeming_reef_desc: "Бурлящая жизнью экосистема, полная кораллов, рыб, моллюсков, млекопитающих, беспозвоночных и всех видов съедобных морских обитателей."
 d_tropical_island: "Тропический остров"
 d_tropical_island_desc: "Начиная от деревьев, гнущихся под тяжестью плодов, до разнообразной фауны, этот райский остров сулит богатые урожаи."
 d_metal_boneyard: "Кладбище металлолома"
 d_metal_boneyard_desc: "Кажется, будто пустые металлические скелеты разрушенной инфраструктуры стонут, когда среди них гуляет ветер."
 d_organic_landfill: "Органическая свалка"
 d_organic_landfill_desc: "Огромные кучи токсичных биологических отходов гниют и выделяют испарения под солнцем."
 #Energy
 #Special
 d_betharian_deposit: "Бетарианские поля"
 d_betharian_deposit_desc: "В этих полях, как звезды, сияют тысячи тысяч драгоценных бетарианских камней."
 d_alien_pets_deposit: "Затерянная долина"
 d_alien_pets_deposit_desc: "Эта нетронутая долина спрятана среди окружающих ее гор, а ее фауна защищена от рыскающих хищников."
 d_dragon_monument: "$building_guardian_dragon_monument$"
 d_dragon_monument_desc: "$building_guardian_dragon_monument_desc$"
 d_stellarite_trophy: "$building_stellarite_trophy$"
 d_stellarite_trophy_desc: "$building_stellarite_trophy_desc$"
 d_buzzing_plains: "Гудящие равнины"
 d_buzzing_plains_desc: "Эти ветреные равнины потрескивают от статического электричества."
 d_mineral_striations: "Полосы минералов"
 d_mineral_striations_desc: "Неглубокие разломы вывели на поверхность богатые залежи минералов."
 d_natural_farmland: "Природное угодье"
 d_natural_farmland_desc: "Эти равнины, разбитые самой природой на удивительно правильные геометрические фигуры, готовы к сельскохозяйственному освоению."
 #Earth
 d_scandinavian_reclamation_sector: "Скандинавский сектор восстановления"
 d_scandinavian_reclamation_sector_desc: "Усилия по восстановлению земель в конце XXII века устранили все, кроме самых упорных очагов радиации, а уровни мутаций сейчас находятся на рекордно низком уровне с момента утечки."
 d_saharan_irrigation_project: "Проект ирригации Сахары"
 d_saharan_irrigation_project_desc: "Немногие сегодня помнят злобные насмешки, с которыми столкнулась операция «Зеленая Сахара», когда она была впервые предложена профессором Искьердо."
 d_mesopotamian_urban_corridor: "Месопотамский городской коридор"
 d_mesopotamian_urban_corridor_desc: "Мегалополис, протянувшийся вдоль большей части Плодородного полумесяца, сам по себе является памятником этому месту рождения древних цивилизаций."
 d_boswash_metropolitan_axis: "Метропольная ось Босваш"
 d_boswash_metropolitan_axis_desc: "Беспорядки в районе Босваш травмировали целое поколение и привели к радикальным правовым реформам. Вечная память!"
 d_mauritanian_security_zone: "Мавританская зона безопасности"
 d_mauritanian_security_zone_desc: "Неразорвавшиеся боеприпасы до сих пор иногда находят возле территории, где полковник Тетчу и остатки его бригады участвовали в своем знаменитом последнем бою."
 d_great_albertan_crater: "Великий Альбертский кратер"
 d_great_albertan_crater_desc: "Когда астероид 711494 Сатис приблизился к Земле и вызвал Великую панику 72-го года, все подумали, что вот всем и конец. К счастью, астероид оказался недостаточно большим, чтобы привести к массовому вымиранию. К несчастью, он уничтожил большую часть Альберты."
 d_pacific_algae_tracts: "Тихоокеанские водорослевые пространства"
 d_pacific_algae_tracts_desc: "Водорослевые пространства, невидимые, пока вы не окажетесь под водой, кажется, тянутся вдаль бесконечно."
 d_delhi_sprawl: "Разросшийся Дели"
 d_delhi_sprawl_desc: "Торговая башня Лакшми была самым высоким зданием на Земле в течение большей части XXII века, а ее уникальная форма остается характерной особенностью линии горизонта в Дели."
 d_pearl_river_agglomerate: "Агломерация Жемчужной реки"
 d_pearl_river_agglomerate_desc: "Первый регион на Земле, официально названный мегагородом. После успешной борьбы с загрязнением в Золотой дельте некоторые другие развивающиеся городские регионы в конечном счете будут проводить собственную версию такой же политики."
 d_great_pacific_garbage_patch: "£blocker£ Большое тихоокеанское мусорное пятно"
 d_great_pacific_garbage_patch_desc: "Кружащиеся миазмы от пластиковых отходов покрывают значительную часть самого крупного океана на Земле."
 d_failing_infrastructure_earth: "$d_failing_infrastructure$"
 d_failing_infrastructure_earth_desc: "$d_failing_infrastructure_desc$"
 #Event
 d_migrating_forests: "Мигрирующие леса"
 d_migrating_forests_desc: "Бродячие леса этой планеты часто перемещаются всей массой в соседние регионы, мешая строительству дорог, линий электропередачи и других объектов инфраструктуры."
 d_migrating_forest_reserve: "Заповедник с мигрирующим лесом"
 d_migrating_forest_reserve_desc: "Этот регион был полностью выделен для бродячих лесов, которые являются аборигенами данного мира. Здесь они могут перемещаться спокойно, не нанося ущерба городским районам."
 d_junk_wastes: "Мусорные пустоши"
 d_junk_wastes_desc: "Эти пустыри протянулись до самого горизонта, и лишь отдельные куски более крупного мусора выступают из-под земли."
 d_junk_canals: "Мусорные каналы"
 d_junk_canals_desc: "Эти узкие каналы огибают горы мусора, а некоторые прилегающие участки почвы являются на удивление плодородными."
 d_junk_hollows: "Мусорные впадины"
 d_junk_hollows_desc: "Из этих пустот, расположенных глубоко под поверхностным мусором, получились бы хорошие изолированные камеры реактора."
 d_irradiated_valley: "Радиоактивная долина"
 d_irradiated_valley_desc: "Солнечная вспышка обрушила на эту изолированную долину интенсивное излучение."
 d_valley_of_zanaam: "Долина Занаама"
 d_valley_of_zanaam_desc: "В долине находится таинственный обелиск, покрытый письменами на мертвом инопланетном языке. Он гудит, излучая энергию, и вызывает головную боль у всех, кто приближается к нему."
 d_abandoned_primitive_homesteads: "Заброшенные усадьбы"
 d_abandoned_primitive_homesteads_desc: "В этих заброшенных усадьбах жило когда-то сообщество рептилий. Они все еще населяют планету, но с тех пор утратили все зачатки разума."
 d_the_zone: "Зона A"
 d_the_zone_desc: "Полосу земли площадью 13 квадратных километров на этой планете занимают руины неизвестного происхождения, усеянные множеством странных и уникальных инопланетных артефактов. Непостижимо, но эта зона также вызывает чувство глубокого удовлетворения у своих посетителей."
 d_hyperfertile_valley: "Гиперплодородная долина"
 d_hyperfertile_valley_desc: "Почва в этой долине исключительно плодородная и интенсивно покрыта зеленью."
 d_ancient_mining_site: "Древняя шахтная площадка"
 d_ancient_mining_site_desc: "Место древних работ по добыче полезных ископаемых. Несмотря на возраст, большая часть оборудования до сих пор годится для эксплуатации."
 d_toy_factory_complex: "Комплекс фабрики игрушек"
 d_toy_factory_complex_desc: "Сложные механизмы беспрестанно превращают сложные полимеры в маленькие предметы странных форм и непонятного назначения."
 d_mutant_landfill: "Свалка мутантов"
 d_mutant_landfill_desc: "Гниющая груда мертвых тел ужасных мутантов. Летучее органическое вещество перемешалось, образовав нечто, напоминающее какое-то сооружение."
 d_ancient_bombardment_craters: "Кратеры от древней бомбардировки"
 d_ancient_bombardment_craters_desc: "Давным-давно этот мир подвергся интенсивной орбитальной бомбардировке. Местами поверхность до сих пор усыпана ударными кратерами."
 d_ancient_battlefield: "Древнее поле боя"
 d_ancient_battlefield_desc: "Цивилизация, когда-то населявшая этот мир, была уничтожена захватчиками из какой-то другой звездной системы. Это древнее поле боя усыпано обломками, оставшимися в результате последнего отчаянного противостояния."
 d_irradiated_ruins: "Радиоактивные руины"
 d_irradiated_ruins_desc: "Руины, оставшиеся после массовой ядерной войны, которую вели две глобальные сверхдержавы, когда-то населявшие этот мир."
 d_impact_crater: "Ударный кратер"
 d_impact_crater_desc: "Кратер после падения крупного метеорита. Минералы из него до сих пор можно найти на месте падения."
 d_odd_factory: "Странная фабрика"
 d_odd_factory_desc: "Хорошо построенный комплекс, производящий очень ценные ресурсы. Оставлен на планете какой-то иной цивилизацией."
 #d_odd_factory_wreckage_1: "Odd Factory Wreckage"
 #d_odd_factory_wreckage_1_desc: ""
 #d_odd_factory_wreckage_2: "$d_odd_factory_wreckage_1$"
 #d_odd_factory_wreckage_2_desc: "$d_odd_factory_wreckage_1_desc$"
 d_ancient_particle_accelerator: "Древний ускоритель частиц"
 d_ancient_particle_accelerator_desc: "В основе этого старого ускорителя частиц лежала инновационная конструкция, а сохранившиеся в этом сооружении терминалы содержат огромный объем исследовательских данных, оставленных, судя по всему, каким-то блестящим физиком-теоретиком."
 d_underground_vault: "Подземное убежище"
 d_underground_vault_desc: "Крупный подземный комплекс, задуманный как бомбоубежище прежними обитателями этого мира. Заняв убежище, они обратились друг против друга, когда у них закончились запасы пищи."
 d_underground_vault_2: "$d_underground_vault$"
 d_underground_vault_2_desc: "Крупный подземный комплекс, задуманный как бомбоубежище прежними обитателями этого мира. Убежище содержит огромный парк машин, а также склады с добывающим оборудованием."
 d_cryonic_clones: "Памятник криоклонам"
 d_cryonic_clones_desc: "Сотни инопланетных клонов оставались запечатанными в камерах криоанабиоза, когда этот мир-кольцо пребывал в разрушенном состоянии. Теперь, когда он полностью восстановлен, клоны сохранены в этом памятнике."
 d_flooded_mounds: "Затопленные бугры"
 d_flooded_mounds_desc: "На самой глубине океана в этом мире можно обнаружить тысячи тысяч связанных между собой бугров, похожих на термитники. Это последние остатки древней расы разумных членистоногих."
 d_processing_pens: "Загоны для переработки"
 d_processing_pens_desc: "В грибовидных аборигенов этой планеты генетически заложена покорность… и приятный вкус. В этих огромных загонах для переработки их откармливают, а позднее собирают урожай."
 d_harvester_fields: "Поля с комбайнами"
 d_harvester_fields_desc: "Обширные поля с густой съедобной растительностью, где древние комбайны на солнечной энергии помогают собирать урожай."
 d_wetware_computer: "Биокомпьютер"
 d_wetware_computer_desc: "Океаны в этом мире почти полностью покрыты тонкой сетью водорослей, которая похожа на примитивный биокомпьютер."
 d_savage_wildlands: "Дикие земли"
 d_savage_wildlands_desc: "Туземные существа, населяющие этот регион, похоже, функционируют как единый организм."
 d_worm_mine: "$building_worm_mine$"
 d_worm_mine_desc: "$building_worm_mine_desc$"
 d_worm_farm: "$building_worm_farm$"
 d_worm_farm_desc: "$building_worm_farm_desc$"
 d_bore_mining_zone: "Зона скважинной разработки"
 d_bore_mining_zone_desc: "Бесчисленные ряды добывающих платформ с дистанционным управлением, где струи воды под высоким давлением вымывают ценные минералы из подземных горных пород через скважины."
 d_reactor_belt: "Реакторный пояс"
 d_reactor_belt_desc: "Участок реакторных комплексов, протянувшихся так далеко, насколько хватает оптических имплантатов."
 d_underground_farm: "Подземные фермерские пещеры"
 d_underground_farm_desc: "Система обширных пещер, в которых находятся многочисленные грибные фермы, охотничьи угодья и озера, кишащие съедобной флорой и фауной."
 d_underground_mine: "Подземные шахтные площадки"
 d_underground_mine_desc: "Подземные туннели ведут к различным рудным жилам, богатым на минералы, но недоступным с поверхности."
 d_underground_generator: "Подземные участки генераторов"
 d_underground_generator_desc: "Подземные реки и геотермальная энергия из расплавленного ядра планеты предоставляют огромный потенциал для производства энергии."
 d_underground_contact_zone: "Подземная зона контакта"
 d_underground_contact_zone_desc: "Территория, где жители подземелий и поверхности могут работать сообща для обеспечения мира и процветания."
 d_underground_farm_blocked: "Переполненные фермерские пещеры"
 d_underground_farm_blocked_desc: "Эти подземные участки сейчас полностью эксплуатируются цивилизацией, живущей там."
 d_underground_mine_blocked: "Переполненные шахтные площадки"
 d_underground_mine_blocked_desc: "Эти подземные участки сейчас полностью эксплуатируются цивилизацией, живущей там."
 d_underground_generator_blocked: "Переполненные участки генераторов"
 d_underground_generator_blocked_desc: "Эти подземные участки сейчас полностью эксплуатируются цивилизацией, живущей там."
 d_underground_farm_dead: "£blocker£ Полные трупов пещеры"
 d_underground_farm_dead_desc: "Необходимо убрать множество трупов подземников, прежде чем мы сможем воспользоваться этими участками."
 d_underground_mine_dead: "£blocker£ Полные трупов шахтные площадки"
 d_underground_mine_dead_desc: "Необходимо убрать множество трупов подземников, прежде чем мы сможем воспользоваться этими участками."
 d_underground_generator_dead: "£blocker£ Полные трупов участки генераторов"
 d_underground_generator_dead_desc: "Необходимо убрать множество трупов подземников, прежде чем мы сможем воспользоваться этими участками."
 d_portal_research_zone: "Комплекс для изучения портала"
 d_portal_research_zone_desc: "Вокруг пространственного портала построен надежный комплекс для размещения научного персонала, занятого изучением его тайн."
 physicist_is_dimension_portal_researcher_tt: "$t$[GetBasePhysicistPluralWithIcon] заменяются на должности [GetDimensionPortalResearcherPluralWithIcon]"
 d_portal_research_zone_gestalt: "Комплекс для изучения портала"
 d_portal_research_zone_gestalt_desc: "Вокруг пространственного портала построен надежный комплекс для размещения научного персонала, занятого изучением его тайн."
 d_ancient_one: "$ancient_one$"
 d_ancient_one_desc: "$ancient_one_desc$"
 d_fungoid_extermination: "£blocker£ Следы ликвидации грибовидных"
 d_fungoid_extermination_desc: "Эта ядовитая слизь — все, что осталось от ликвидированных грибовидных."
 d_ruined_arcology: "£blocker£ Разрушенная аркология"
 d_ruined_arcology_desc: "Аркологии на поверхности этой планеты-города лежат в руинах. Хотя фундаменты по-прежнему прочны, большую часть разрушающихся сооружений необходимо будет убрать, прежде чем заниматься восстановлением."
