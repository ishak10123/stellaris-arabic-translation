 action.92.rare_crystals: "Во время изучения системы §Y[Root.Fleet.GetStarName]§! корабль [Root.GetName] обнаружил ранее неизвестный редкий ресурс, который был назван §Hредкими кристаллами§!. Благодаря своим свойствам эти кристаллы помогают фокусировать лазерные лучи, а также находят применение в современной электронике."
 action.92.exotic_gases: "Во время изучения системы §Y[Root.Fleet.GetStarName]§! корабль [Root.GetName] обнаружил ранее неизвестный редкий ресурс, который был назван §Hэкзотическими газами§!. Область их применения представляется достаточно широкой — от энергетического оружия до силовых полей, топлива для космических кораблей и даже легких наркотиков."
 action.92.volatile_motes: "Во время изучения системы §Y[Root.Fleet.GetStarName]§! корабль [Root.GetName] обнаружил ранее неизвестный редкий ресурс, который был назван §Hлетучей пылью§!. Их энергетический потенциал крайне велик: пылинки можно применять во многих областях, например для производства энергии, топлива или взрывчатки."
 action.92.volatile_motes.tooltip: "£volatile_motes£§Y$volatile_motes$§!\n§E$volatile_motes_desc$§!"
