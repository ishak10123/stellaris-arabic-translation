 cara_home_main.title: "$NAME_Caravaneer_Home$"
 cara_home_direct1: "$NAME_Caravaneer_Home$ приглашает вас в «$NAME_Chors_Compass$» — извечное пристанище разношерстных галактических караванов и притон азартных игр. Нет, вы не ослышались."
 cara_home_direct2: "Вас приветствует $NAME_Tradestation_Tungle$, главный дворец отдыха в галактике и домашняя база флотилий Караванщиков!"
 cara_home_direct3: "Разумные существа, чей психологический профиль особенно уязвим для видов деятельности, вызывающих привыкание, должны держаться подальше от таких объектов, как $slots$ и $lootboxes$.\n\nЕсли они ненавидят веселье, конечно!"
 cara_home_direct4: "Вы из разумных существ, любящих делать ставки?"
 cara_home_direct5: "Мы предлагаем острые ощущения с высокими, а также низкими ставками — на ваш вкус."
 cara_home_redirect1: "Это «$NAME_Chors_Compass$». $NAME_Caravaneer_Home$ говорит от лица флотилии $NAME_Caravaneer_Fleet1$. Мы не несем ответственности за любое прежнее взаимодействие с флотилией."
 cara_home_redirect2: "Это «$NAME_Caravaneer_Home$». $NAME_Chors_Compass$ говорит от имени флотилии $NAME_Caravaneer_Fleet2$. Мы не несем ответственности за любое прошлое взаимодействие с флотилией."
 cara_home_redirect3: "Это «$NAME_Caravaneer_Home$». $NAME_Chors_Compass$ говорит от имени флотилии $NAME_Caravaneer_Fleet3$. Мы не несем ответственности за любое прошлое взаимодействие с флотилией."
 cara_home_menureturn1: "$cara_home_direct3$"
 cara_home_menureturn2: "$cara_home_direct4$"
 cara_home_menureturn3: "$cara_home_direct5$"
 cara_home_about_fleet1: "Мы пытались связаться с государством §H$NAME_Caravaneer_Fleet1_country$§!…"
 cara_home_about_fleet1.reply: "Все караванные флотилии придерживаются традиций, предшествовавших изобретению подпространственной связи. $NAME_Tradestation_Tungle$ в этом смысле исключение, поэтому все звонки перенаправляются к нам.\n\nБоюсь, вам придется подождать, пока [From.GetName] свяжется с вами, когда они снова появятся на вашей территории. Или покинут ее, в зависимости от того, о чем вы договорились.\n\nА тем временем можете попытать удачу при игре в $slots$!"
 cara_home_about_fleet2: "Мы пытались связаться с государством §H$NAME_Caravaneer_Fleet2$§!…"
 cara_home_about_fleet2.reply: "$cara_home_about_fleet1.reply$"
 cara_home_about_fleet3: "Мы пытались связаться с расой §H$NAME_Caravaneer_Fleet3_species_plural$§!…"
 cara_home_about_fleet3.reply: "Прелестные, правда? И бесстрашные! Кхе-кхе.\n\n$cara_home_about_fleet1.reply$"
