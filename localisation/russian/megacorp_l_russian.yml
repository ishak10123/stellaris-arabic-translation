 #Megacorp
 #To Corporation Diplomacy
 DEMAND_SUBS_SELECT_01: "Вы предлагаете, чтобы [Root.GetName::<1> стал|||fem:<1> стала|||neut:<1> стало|||pl:<1> стали] вашей дочерней компанией?"
 DEMAND_SUBS_ACCEPT_01: "[Root.GetName::<1> станет|||pl:<1> станут] вашей дочерней компанией и [Root.GetName::будет|||pl:будут] отдавать часть своего объёма торговли вам. Взамен мы ожидаем, что вы будете защищать жизнь, свободу и независимость [Root.GetSpeciesNamePlural&gen]."
 DEMAND_SUBS_REFUSE_01: "[Root.GetName] ни при каких обстоятельствах не примирится с [From.GetSpeciesAdj&fem,gen] эксплуатацией."
 ASK_FOR_SUBS_PROPOSE_01: "[Root.GetName] нуждается в военной защите. Если мы станем [From.GetAdj&masc,inst] вассалом, то, как верные подданные, обещаем отдавать вам значительную часть нашей торговой прибыли."
 TO_CORP_HOSTILE_GREETING_01: "А, [From.GetName]. Дайте угадаю, у вас есть особое предложение специально для нас?"
 TO_CORP_HOSTILE_GREETING_02: "А, так это же [From.GetName]. Что вы хотите предложить нам сегодня? Какую ложь, какое мошенничество, какие пустые обещания?"
 TO_CORP_HOSTILE_GREETING_03: "О, это вы… Не хотите ли заниматься «самореализацией» где-нибудь в другом месте?"
 TO_CORP_HOSTILE_GREETING_04: "[Root.GetName] не продается, [From.GetName]."
 TO_CORP_HOSTILE_GREETING_05: "$CORP_HOSTILE_GREETING_01$"
 TO_CORP_HOSTILE_GREETING_06: "$CORP_HOSTILE_GREETING_02$"
 TO_CORP_GREETING_HOSTILE_EG_01: "Капитализм — всего лишь шаг на пути к бесклассовому обществу, [From.GetName]."
 TO_CORP_NEUTRAL_GREETING_01: "Приветствуем вас, [From.GetName]. Как идут дела?"
 TO_CORP_NEUTRAL_GREETING_02: "Мы рады встрече, [From.GetName]! Похоже, наши модули перевода немного барахлят. Говорите, вы хотели бы с нами перетереть?"
 TO_CORP_THREATENED_GREETING_01: "Приветствуем вас, [From.GetName]. Надеемся, вы четко видите потенциал [Root.GetAdj&masc,gen] рынка."
 TO_CORP_FRIENDLY_GREETING_01: "Мы видели вашу последнюю рекламную кампанию и можем сказать лишь одно: возьмите наши деньги, [From.GetName]!"
 TO_CORP_FRIENDLY_GREETING_02: "Хороший денек для ведения дел, не так ли, [From.GetName]? Кредиты, кредиты, кредиты… Эти слова ласкают слух подобно музыке."
 TO_CORP_FRIENDLY_GREETING_03: "Привет, [From.GetName]! Как дела с поднятием планки, расширением горизонтов, перемалыванием чисел?"
 TO_CORP_WAR_GREETING_01: "Приготовьтесь к урезаниям бюджета, [From.GetName]…"
 TO_CORP_WAR_GREETING_02: "Ваша распродажа по сниженным ценам очень нас заинтересовала, [From.GetName]. Некоторые из ваших планетарных тел привлекли наше внимание…"
 TO_CORP_WAR_GREETING_03: "Мы усложняем вам будущее уже в настоящем, [From.GetName]…"
 TO_CORP_VASSAL_GREETING_01: "Полный вперед, [From.GetName], потому что [Root.GetName] полностью поддерживает вас!"
 TO_CORP_VASSAL_GREETING_DISLOYAL_01: "В последнее время у нас возникло подозрение, что вы используете нас лишь ради кредитов, [From.GetName]…"
 TO_CORP_VASSAL_DOMINEERING_01: "Есть вещи, которые нельзя купить за кредиты, [From.GetName]. Смотрите и учитесь."
 TO_CORP_DOW_PROPOSE_01: "[Root.GetName] — это угроза всей разумной жизни. Галактику нужно очистить от ваших безвкусных товаров, пока она окончательно не погрузилась в пучину морального разложения."
 TO_CORP_DOW_PROPOSE_02: "[From.GetName] больше не будет поддерживать вашу подозрительную деятельность и недобросовестную эксплуатацию общих галактических активов."
 TO_CORP_DOW_PROPOSE_03: "Бренд [Root.GetName] — это оскорбление для хорошего вкуса. Мы больше не можем терпеть ваше присутствие в галактике."
 TO_CORP_DOW_PROPOSE_04: "Да будет вам известно, галактика больше не нуждается в ваших «услугах», [Root.GetName]…"
 TO_CORP_INSULT_FRIENDLY_01: "Что это было, [From.GetName]? Мы подробно изучали вашу последнюю маркетинговую кампанию! Она приобрела бешеную популярность!"
 TO_CORP_INSULT_NEUTRAL_01: "Объяснитесь, [From.GetSpeciesNamePlural]. Если [From.GetName] именно так ведет дела, то нам такое не интересно."
 TO_CORP_INSULT_HOSTILE_01: "Выражайтесь простым языком, [From.GetName]. Хватит с нас вашего непонятного корпоративного сленга."
 TO_CORP_INSULT_PROPOSE_01: "Галактика не ваш личный мусоропровод, [Root.GetName]. Оставьте вашу так называемую продукцию себе."
 TO_CORP_INSULT_PROPOSE_02: "[Root.GetName] и их продукция…  Из корзины с уцененкой прямиком в корзину с мусором…"
 TO_CORP_INSULT_PROPOSE_EG_01: "Вы воплощение самого фундаментального недостатка капиталистической системы. Высокий класс за кредиты не купишь, [Root.GetName]."
 TO_CORP_INSULT_ACCEPT_FRIENDLY_01: "Ха! Хорошая шутка. Почему бы друзьям и не подтрунить добродушно друг над другом, верно?"
 TO_CORP_INSULT_ACCEPT_FRIENDLY_02: "Вы, канцелярские крысы, просто уморительны! Умеете вы рассмешить до коликов. А теперь давайте вернемся к делам…"
 TO_CORP_INSULT_ACCEPT_01: "[From.GetName] управляется мошенниками и корпоративными бракоделами! Скоро [Root.GetName] откроет вашу истинную сущность всему миру."
 TO_CORP_INSULT_ACCEPT_02: "Интересный у вас подход к ведению дел, [From.GetName]… Настраиваете против себя своих будущих клиентов…"
 TO_CORP_INSULT_ACCEPT_03: "Ваша наглость дорого вам обойдется, [From.GetName]. Надеемся, оно того стоило."
 TO_CORP_INSULT_ACCEPT_04: "Скоро вы узнаете, что такая вещь, как плохой пиар, действительно существует."
 TO_CORP_MAKE_RIVAL_01: "Вы действительно можете позволить себе потерять наш бизнес, [From.GetSpeciesNamePlural]?"
 #Corporate Diplomacy
 CORP_HOSTILE_GREETING_01: "Ведите свои дела в другом месте, [From.GetName]. [Root.GetSpeciesNamePlural] не нуждаются в вашем дешевом мусоре."
 CORP_HOSTILE_GREETING_02: "На рынке такие, как вы, не нужны, [From.GetName]."
 CORP_CORP_HOSTILE_GREETING_01: "Дам дружеский совет, как один предприниматель другому… Нужен задел на будущее. Иначе вскоре станете прошлым, [From.GetSpeciesNamePlural]."
 CORP_HOSTILE_GREETING_03: "Вы не можете позволить себе наши услуги, [From.GetSpeciesNamePlural]…"
 CORP_HOSTILE_GREETING_04: "[Root.GetName] не будет вести с вами дела, [From.GetSpeciesNamePlural]."
 CORP_HOSTILE_GREETING_05: "[Root.GetName] не может ничего вам предложить, [From.GetSpeciesNamePlural]."
 CORP_CORP_HOSTILE_GREETING_02: "Вы мараете репутацию честных корпораций, [From.GetName]."
 CORP_CORP_HOSTILE_GREETING_03: "[Root.GetAdj&masc] соус нравится всем инопланетянам. Мы могли бы угостить и вас, но за это придется заплатить…"
 CORP_NEUTRAL_GREETING_01: "Вас приветствует [Root.GetName], ваш первоочередной актуализатор интеллектуального капитала, работающий по требованию. Чем мы можем вам помочь?"
 CORP_NEUTRAL_GREETING_02: "Давайте поговорим о делах, [From.GetSpeciesNamePlural]."
 CORP_NEUTRAL_GREETING_03: "[From.GetSpeciesNamePlural]! Не желаете виртуально посетить офисный бассейн с шариками?"
 CORP_NEUTRAL_GREETING_04: "Лучшие вещи бесплатно не получить, [From.GetSpeciesNamePlural]. Но мы, [Root.GetName], можем предложить их дешево."
 CORP_CORP_NEUTRAL_GREETING_01: "Ваша последняя маркетинговая кампания увенчалась успехом, [From.GetName]! Она произвела на нас впечатление."
 CORP_THREATENED_GREETING_01: "Вселенная огромна и полна пригодных для использования богатств. Неужели их не хватит для вас и для нас?"
 CORP_FRIENDLY_GREETING_02: "А, [From.GetSpeciesNamePlural]. У нас хорошие перспективы для создания совместного предприятия."
 CORP_CORP_FRIENDLY_GREETING_01: "Как поживаете, [From.GetName]? Все в делах и заботах?"
 CORP_WAR_GREETING_02: "От лица нашего отдела проверки качества мы благодарим вас, [From.GetSpeciesNamePlural], за эту долгожданную возможность испытать наши последние разработки в области вооружения."
 CORP_WAR_GREETING_03: "Как вам наши новые проекты кораблей, [From.GetSpeciesNamePlural]? Мегатонны хромированного совершенства, доставленные прямо к вашим дверям. [Root.GetName] всегда выкладывается на все сто!"
 CORP_WAR_GREETING_04: "[Root.GetName] — это ведущий разработчик и производитель революционного защитного оборудования. Как вы вскоре узнаете, наша преданность качеству абсолютна."
 CORP_CORP_WAR_GREETING_01: "Мы явились за вашей долей на рынке, [From.GetName]. И когда мы закончим, о вас все забудут. Галактика будет жаждать только [Root.GetAdj&pl,gen] товаров!"
 CORP_CORP_WAR_GREETING_02: "Мы оставим вас не у дел, [From.GetName]."
 CORP_OVERLORD_GREETING_01: "[From.GetSpeciesNamePlural]! Мы только что оценивали ваши качества по шкале DORP и рады сообщить, что вы §Gоправдали ожидания§!! Продолжайте в том же духе!"
 CORP_OVERLORD_GREETING_02: "[From.GetSpeciesNamePlural], не спрашивайте, что вы можете сделать для своей холдинговой компании, а спрашивайте, что ваша компания может сделать для вас. Мы здесь, чтобы сделать ВАС сильнее."
 CORP_VASSAL_GREETING_01: "Мы — ревностный ученик, надежда на будущее, скрытый потенциал! Вы — почитаемый наставник, гуру, голос минувших поколений…"
 CORP_VASSAL_GREETING_02: "Вы уже видели наш квартальный отчет о прибыли, [From.GetSpeciesNamePlural]? В следующем квартале ожидается стремительный рост. До небес!"
 CORP_VASSAL_GREETING_DISLOYAL_01: "Какой у вас план действий, [From.GetSpeciesNamePlural]? [From.GetName] — это первоклассная машина максимального накопления ресурсов. А какие козыри есть у вас?"
 CORP_VASSAL_DOMINEERING_01: "Мы доминируем на рынке, [From.GetSpeciesNamePlural]. Вам нужно последовать нашему примеру."
 CORP_DOW_PROPOSE_01: "А, [Root.GetSpeciesNamePlural]… Вы все еще здесь! Возможно, наша флотилия сможет стимулировать вас… умереть?"
 CORP_DOW_PROPOSE_02: "Ничто так не стимулирует развитие, как небольшая дружеская конкуренция."
 CORP_DOW_PROPOSE_03: "Ничего личного, [Root.GetSpeciesNamePlural]. Всего лишь бизнес."
 CORP_VASSAL_DOW_PROPOSE_01: "[Root.GetSpeciesNamePlural]! Оценивая еще раз вашу несостоятельность в качестве нашей холдинговой компании, мы обнаружили дыру в вашей защите…"
 CORP_DOW_ACCEPT_01: "Если вам хочется войны, [From.GetName] устроит вам по максимуму. Мы добьемся успеха или отправимся домой!"
 CORP_DOW_ACCEPT_02: "Приготовьтесь к ликвидации своих активов, [Root.GetSpeciesNamePlural]."
 CORP_DOW_ACCEPT_03: "Дорогие клиенты! [From.GetName] может выполнить абсолютно любой запрос. Мы предлагаем всем нашим клиентам индивидуальные решения, отличающиеся простотой и удобством. Приготовить флотилию!"
 CORP_CONSIDER_01: "Дорогой клиент! Мы делаем все возможное, чтобы оценить ваш запрос."
 CORP_CONSIDER_02: "Дорогой клиент! Пока мы оцениваем ваше предложение, не могли бы вы заполнить нашу анкету доверия? Это займет всего минуту вашего времени! Ваше мнение важно для нас!"
 CORP_PEACE_PROPOSE_01: "Предлагаем остановить этот разорительный обмен выстрелами и смертями и начать обмен товарами и услугами."
 CORP_PEACE_PROPOSE_02: "Как оказалось, война не смогла покрыть дефицит нашего бюджета. Мы предлагаем бессрочное перемирие."
 CORP_PEACE_PROPOSE_03: "Очевидно, что обе стороны только теряют от продолжения конфликта. Зачем выбрасывать деньги на ветер, [Root.GetSpeciesNamePlural]?"
 CORP_PEACE_PROPOSE_04: "Этот конфликт изжил себя. Мы собрали все данные, необходимые для демонстрации превосходства нашего товара. Мы хотели бы договориться о мире."
 CORP_PEACE_PROPOSE_05: "Эта война перешла в проигрышную для всех стадию, на что мы не рассчитывали. Мы предлагаем отложить решение конфликта на неопределенный срок с возможностью ежеквартального пересмотра."
 CORP_PEACE_ACCEPT_01: "Цифры говорят в вашу пользу, [Root.GetSpeciesNamePlural]. Мир — это залог процветания."
 CORP_PEACE_REFUSE_01: "Мир? Ха! Держите карман шире. Где там моя красная кнопка?"
 CORP_PEACE_REFUSE_02: "Мир-шмир… Не будьте такими занудами. Мы только разогрелись."
 CORP_PEACE_REFUSE_03: "К сожалению, мы не можем согласиться на ваши условия, [From.GetSpeciesName]. Эта война оказалась слишком прибыльной."
 CORP_PEACE_REFUSE_04: "Простите, [From.GetSpeciesNamePlural]. Мы не собираемся прекращать использовать в своих интересах вашу низкую боеспособность."
 CORP_VASSAL_PEACE_REFUSE_01: "[Root.GetName] будет двигаться вперед, и державе, полной реакционеров, нас не удержать."
 CORP_OVERLORD_PEACE_REFUSE_01: "Мы не можем даровать вам независимость в таком финансовой ситуации. Вы рухнете под грузом собственной некомпетентности."
 CORP_PEACE_CONSIDER_01: "Мир? Нам придется тщательно взвесить финансовые последствия."
 CORP_ITOA_SELECT_01: "Вы готовы показать лучшее, на что вы способны, [Root.GetSpeciesNamePlural]? §Y[From.GetName]§! не имеет дело с теми, о ком все давно забыли…"
 CORP_ITOA_PROPOSE_01: "[Root.GetAdj&masc] бренд известен благодаря преданности качеству! Присоединившись к нам, вы получите изрядный кредит доверия."
 CORP_CORP_ITOA_PROPOSE_01: "[From.GetName]! Вместе мы могли бы искоренить конкуренцию, вздуть цены и доминировать на рынке. Что скажете?"
 CORP_ITOA_ACCEPT_01: "Мы могли бы организовать совместное [From.GetSpeciesAdj]о-[Root.GetSpeciesAdj&neut] предприятие. Смоделированные прогнозы доходов выглядят многообещающе, [From.GetRulerName], или лучше сказать «партнер»? Мы согласны!"
 CORP_ITOA_REFUSE_01: "[Root.GetAdj&masc] бренд стал синонимом высшего качества. Мы не можем рисковать, связываясь с расой [From.GetSpeciesNamePlural]."
 CORP_ASK_JOIN_A_SELECT_01: "Сколько задач вы можете решать одновременно, [From.GetSpeciesNamePlural]? Есть ли у вас необходимые качества, чтобы вступить в альянс §Y[Root.GetAllianceName]§!?"
 CORP_ASK_JOIN_A_PROPOSE_01: "Оперативные решения, ориентированные на пользователя, и достижение максимальных результатов — это лишь немногое из того, что [From.GetName] может предложить такому альянсу, как §Y[Root.GetAllianceName]§!. Вы сказали «да»? Мне определенно не показалось…"
 CORP_ASK_JOIN_A_ACCEPT_01: "Поздравляем, [From.GetSpeciesNamePlural]! Теперь вы игроки высшей лиги. Добро пожаловать в альянс §Y[Root.GetAllianceName]§!."
 CORP_ASK_JOIN_A_REFUSE_01: "Мы оценили ваши финансы, основываясь на базовых элементах G-WACK, и, к сожалению, вы не отвечаете требованиям членства в альянсе §Y[Root.GetAllianceName]§!. В следующий раз не бойтесь стараться усерднее."
 CORP_ASK_JOIN_A_REFUSE_02: "Мы рассмотрели вашу заявку, и, если говорить честно, [Root.GetSpeciesNamePlural] и [From.GetSpeciesNamePlural] вместе не споются. Понимаете, о чем мы?"
 CORP_LEAVE_A_SELECT_01: "Если вы покинете альянс §Y[From.GetAllianceName]§!, то, возможно, нам придется ввести против вас санкции."
 CORP_LEAVE_A_PROPOSE_01: "Согласно договору, мы считаем, что [From.GetName] и §Y[Root.GetAllianceName]§! должны разорвать партнерские отношения на основании невыполнения пункта об увеличении прибыли. Любые жалобы направляйте нашему юрисконсульту."
 CORP_LEAVE_A_ACCEPT_01: "[From.GetSpeciesNamePlural], вы бежите с корабля, который прекрасно держится на плаву!"
 CORP_LEAVE_A_ACCEPT_02: "Если вы хотите финансового краха, §Y[Root.GetAllianceName]§! не будет вам мешать… партнер…"
 CORP_DEMAND_VASS_SELECT_01: "Подтвердите свое решение подчинить [Root.GetName&acc]."
 CORP_DEMAND_VASS_ACCEPT_01: "[Root.GetAdj&masc] совет проголосовал за то, чтобы [Root.GetName::<1> стал|||fem:<1> стала|||neut:<1> стало|||pl:<1> стали] вассалом [From.GetName&gen]."
 CORP_DEMAND_VASS_REFUSE_01: "[Root.GetName] не станет вассалом кого-то ниже по статусу."
 CORP_ASK_FOR_VASS_PROPOSE_01: "[From.GetName] нуждается в военном спонсоре для защиты нас от враждебных конкурентов. В обмен на вашу защиту [From.GetName] станет вашим вассалом."
 CORP_DEMAND_SUBS_SELECT_01: "Подтвердите запрос сделать [Root.GetName&acc] дочерней компанией."
 CORP_DEMAND_SUBS_PROPOSE_01: "Из-за военной несостоятельности возникла угроза вашего насильственного захвата. Присоединитесь к [From.GetName&dat], и мы, как ваша холдинговая компания, обеспечим свободу вашего народа."
 CORP_DEMAND_SUBS_PROPOSE_02: "У нас для вас специальное предложение, [Root.GetSpeciesNamePlural]. Станьте дочерней компанией [From.GetName&gen] и примите участие в нашей бесплатной программе саморазвития, состоящей из 10 этапов. Позвольте НАШЕЙ флотилии повысить ВАШУ уверенность в себе."
 CORP_DEMAND_SUBS_ACCEPT_01: "По условиям становления вашей дочерней компанией [Root.GetName] и все ассоциированные бренды теперь на законных основаниях считаются частью [From.GetName&gen]. Взамен просим [From.GetName&acc] защищать [Root.GetName&acc] от враждебных посягательств."
 CORP_DEMAND_SUBS_REFUSE_01: "[Root.GetName] считает ваши условия неприемлемыми и ни при каких обстоятельствах не примирится с [From.GetSpeciesAdj&fem,gen] эксплуатацией."
 CORP_ASK_FOR_SUBS_SELECT_01: "Если мы продолжим, [Root.GetName::<1> сделает|||pl:<1> сделают] [From.GetName&acc] дочерней компанией. В качестве родительской компании [Root.GetName::<1> объединится|||pl:<1> объединятся] с расой [Root.GetSpeciesNamePlural], чтобы противостоять общим угрозам."
 CORP_ASK_FOR_SUBS_PROPOSE_01: "[Root.GetRulerName] поддерживает железную дисциплину, и мы хотим изучить [From.GetSpeciesAdj&pl] традиции. Сделайте [From.GetName&acc] дочерней компанией, и мы поделимся с вами долей в торговле."
 CORP_ASK_FOR_SUBS_ACCEPT_01: "Добро пожаловать в [From.GetAdj&fem,acc] корпоративную семью. Хотя [Root.GetName] по-прежнему действует как отдельное юридическое лицо, [From.GetName] теперь владеет контрольным пакетом акций вашей компании и будет защищать наши совместные интересы от враждебных угроз."
 CORP_ASK_FOR_SUBS_ACCEPT_02: "Хорошая новость, [Root.GetSpeciesNamePlural]. Теперь вы наши финансовые рабы…"
 CORP_ASK_FOR_SUBS_REFUSE_01: "К сожалению, в настоящее время мы не можем принять вашу заявку на получение статуса филиала. Желаем вам удачи в ваших будущих начинаниях, поскольку она вам непременно понадобится."
 CORP_RELEASE_SUBJECT_SELECT_01: "Хотите отозвать свой статус холдинговой компании по отношению к [Root.GetName&dat] и восстановить [Root.GetAdj&fem,acc] автономию?"
 CORP_RELEASE_SUBJECT_PROPOSE_01: "Настоящим [From.GetName::<1> отказывается|||pl:<1> отказываются] от своего права собственности на [Root.GetName&acc] и [From.GetName::возвращает|||pl:возвращают] [Root.GetName::ему|||fem:ей|||pl:им] автономию. Документ вступает в силу немедленно."
 CORP_RELEASE_SUBJECT_ACCEPT_01: "Мы будем ценить нашу недавно обретенную независимость."
 CORP_ASK_TO_BE_RELEASED_SUBJECT_SELECT_01: "Имейте в виду, что [Root.GetName] будет защищать свои интересы в судебном порядке."
 CORP_ASK_TO_BE_RELEASED_SUBJECT_PROPOSE_01: "Из-за постоянного несоответствия [From.GetSpeciesAdj&masc,inst] требованиям [From.GetName] рекомендует вам немедленно отказаться от статуса подданного или обратиться за помощью к юристам."
 CORP_ASK_TO_BE_RELEASED_SUBJECT_ACCEPT_01: "Настоящим [Root.GetName] дарует [From.GetName&dat] независимость, отказываясь от всех законных притязаний на [From.GetSpeciesAdj&pl] финансы."
 CORP_ASK_TO_BE_RELEASED_SUBJECT_REFUSE_01: "С прискорбием сообщаем вам, что [Root.GetName] в обозримом будущем не собирается возвращать [From.GetSpeciesAdj&fem,acc] автономию. Любые жалобы направляйте в наш юридический отдел."
 CORP_ASK_TO_BE_RELEASED_SUBJECT_REFUSE_02: "Хотя мы всегда стараемся оказать поддержку нашим агентам, советуем вам преследовать более реалистичные цели развития."
 CORP_DEMAND_PROT_SELECT_01: "Подтвердите свое предложение стать защитником [Root.GetName&gen]. Соглашение носит юридически обязательный характер, если вы его подписали."
 CORP_DEMAND_PROT_ACCEPT_01: "Ну ладно, умники, сделайте так, чтобы наши враги взлетели на воздух, научите нас всем вашим научным штучкам, и тогда наш отдел маркетинга сотворит свое волшебство. Вы получите именно то, чего вам так не хватает. О вас узнает галактика!"
 CORP_DEMAND_PROT_REFUSE_01: "У нас самих эффективная флотилия, [Root.GetSpeciesNamePlural], и мы без колебаний используем ее против тех, кто посягает на нашу законную собственность."
 CORP_ASK_FOR_PROT_PROPOSE_01: "[From.GetName] — это бизнес-конгломерат, а не военная держава. Так как наши конкуренты хотят использовать против нас оружие, мы уповаем на вашу милость, [Root.GetSpeciesNamePlural]. Вы защитите нас?"
 CORP_DEMAND_TRIBUTARY_SELECT_01: "Вам нужна дань, [Root.GetSpeciesNamePlural]? Озвучьте нам сумму, и мы подумаем над этим…"
 CORP_DEMAND_TRIBUTARY_ACCEPT_01: "Мы не можем себе позволить потерять ваш бизнес, [From.GetSpeciesNamePlural]. По большому счету, дань — это маленькая плата за мир."
 CORP_DEMAND_TRIBUTARY_ACCEPT_02: "Ах, что такое небольшое вымогательство, когда речь идет о друзьях, [From.GetSpeciesNamePlural]? [Root.GetName] с радостью заплатит дань. Дружба не имеет цены…"
 CORP_DEMAND_TRIBUTARY_REFUSE_01: "[Root.GetName] не поддастся на [From.GetAdj&masc] шантаж. На нашей стороне закон."
 CORP_ASK_BECOME_TRIBUTARY_PROPOSE_01: "В интересах сохранения мира между государствами [From.GetName] и [Root.GetName] мы готовы платить вам дань ежемесячно."
 CORP_CORP_OFFER_TRADE_DEAL_PROPOSE_01: "У нас есть деловое предложение, от которого [Root.GetSpeciesAdj&pl] органы чувств просто запоют."
 CORP_OFFER_TRADE_DEAL_PROPOSE_01: "Уважаемые [Root.GetSpeciesNamePlural]! У нас для вас деловое предложение…"
 CORP_OFFER_TRADE_DEAL_ACCEPT_01: "Это ваше окончательное предложение, [From.GetSpeciesNamePlural]? Как насчет дополнительных минералов, чтобы подсластить сделку? Нет? Мы согласны!"
 CORP_OFFER_TRADE_DEAL_ACCEPT_02: "Все что угодно для наших дорогих клиентов. Никогда не забывайте, кто делает вам самые лучшие предложения, [From.GetSpeciesNamePlural]! Только [Root.GetName]!"
 CORP_OFFER_TRADE_DEAL_ACCEPT_03: "Договорились! Всегда приятно иметь с вами дело, [From.GetSpeciesNamePlural]."
 CORP_OFFER_TRADE_DEAL_REFUSE_01: "Наглости вам не занимать, [From.GetSpeciesNamePlural]. Думаете, что [Root.GetSpeciesNamePlural] вчера родились, что ли?"
 CORP_OFFER_TRADE_DEAL_REFUSE_02: "Это что, шутка, [From.GetSpeciesNamePlural]? [Root.GetName] — коммерческое предприятие, а не благотворительный фонд…"
 CORP_OFFER_TRADE_DEAL_GIFT_ACCEPT_01: "Благодарим вас, [From.GetSpeciesNamePlural]. Пусть бизнесу в ваших мирах сопутствует процветание."
 CORP_OFFER_TRADE_DEAL_GIFT_ACCEPT_02: "Вы хотите купить нашу любовь, [From.GetSpeciesNamePlural]? Давайте поторгуемся."
 02_FORM_COMMERCIAL_PACT_SELECT: "Как интересно. [From.GetSpeciesNamePlural] ищут делового партнера? Расскажите нам подробнее…"
 02_FORM_COMMERCIAL_PACT_PROPOSE: "Эй, [Root.GetSpeciesNamePlural]! Ваша жизнь превратилась в сплошные обязанности в ущерб собственным желаниям? [From.GetName] сделает то, что вам делать не хочется, да и не придется. Заключите коммерческое соглашение с нами — и ваше существование станет более осмысленным!"
 03_FORM_COMMERCIAL_PACT_PROPOSE: "[From.GetName] всегда созидает больше, чем потребляет, а сегодня у нас есть предложение, от которого вы просто не сможете отказаться. Коммерческое соглашение… с нами! Ну, что скажете?"
 02_FORM_COMMERCIAL_PACT_ACCEPT: "Свободная торговля между нашими мирами? Да… Интересная идея. Мы принимаем ваши условия, [From.GetSpeciesNamePlural]."
 03_FORM_COMMERCIAL_PACT_ACCEPT: "Коммерческий пакт? Вроде бы беспроигрышный вариант, [From.GetSpeciesNamePlural]. Мы займемся оформлением необходимых документов."
 02_FORM_COMMERCIAL_PACT_REFUSE: "Мы рассмотрели ваше предложение, [Root.GetSpeciesNamePlural], и, к сожалению, [From.GetName] не собирается в данный момент расширять свой бизнес в другие миры."
 02_BREAK_COMMERCIAL_PACT_SELECT: "Но… что насчет экономики?"
 02_BREAK_COMMERCIAL_PACT_PROPOSE: "К сожалению, коммерческое соглашение между нами исчерпало себя, и настоящим мы объявляем его утратившим силу."
 02_BREAK_COMMERCIAL_PACT_ACCEPT: "Ваша изоляционистская политика ослабила нашу и вашу экономику, [From.GetSpeciesName]."
 CORP_MAKE_RIVAL_02: "Засуньте свои деньги себе в тот орган, что вы называете [From.GetSpeciesMouthName], [From.GetSpeciesNameInsult]. Ах да, точно, у вас же нет денег…"
 CORP_MAKE_RIVAL_ACCEPT_FRIENDLY_01: "Отказ. Как больно."
 CORP_MAKE_RIVAL_ACCEPT_FRIENDLY_02: "Похоже, за наш финансовый успех пришлось заплатить дружбой с вами…"
 CORP_MAKE_RIVAL_ACCEPT_FRIENDLY_03: "[From.GetSpeciesOrganName] — вот куда вы нас ударили…"
 CORP_MAKE_RIVAL_ACCEPT_NEUTRAL_01: "Мы сожалеем, [From.GetSpeciesNamePlural], что между нами встали наши же недавние успехи."
 CORP_MAKE_RIVAL_ACCEPT_NEUTRAL_02: "Чего еще можно ожидать от государства с таким ограниченным мышлением, где обитают отсталые [From.GetSpeciesNamePluralInsult]?"
 CORP_MAKE_RIVAL_ACCEPT_NEUTRAL_03: "Вы заплатите за свою зависть, [From.GetSpeciesNamePlural]."
 CORP_MAKE_RIVAL_ACCEPT_NEUTRAL_04: "Вы только что понизили свою рыночную цену, глупцы."
 CORP_MAKE_RIVAL_ACCEPT_HOSTILE_01: "Думаете, [Root.GetSpeciesNamePlural] проиграют вам в своей же собственной игре? Даже не мечтайте, [From.GetSpeciesNamePlural]! Этой галактикой управляет [Root.GetName]."
 CORP_MAKE_RIVAL_PROPOSE_01: "Если вы не клиент, то, значит, конкурент, [Root.GetSpeciesClassPlural]."
 CORP_MAKE_RIVAL_PROPOSE_02: "Если уж раскрывать все карты, [Root.GetSpeciesClassPlural], то вы нам никогда особо не нравились…"
 CORP_MAKE_RIVAL_PROPOSE_03: "[From.GetName] вводит торговое эмбарго против [Root.GetName&gen], ограничивая с настоящего момента любые сделки."
 CORP_MAKE_RIVAL_PROPOSE_04: "Пора оказать галактике услугу и избавить рынок от ваших дешевых и некачественных подделок."
 CORP_END_RIVALRY_FRIENDLY_01: "Нет никаких причин, почему [From.GetSpeciesNamePlural] и [Root.GetSpeciesClassPlural] не могли бы плодотворно торговать."
 CORP_END_RIVALRY_NEUTRAL_01: "Вы, [From.GetSpeciesClassPlural], все одинаковые. Все равно приползете за [Root.GetSpeciesAdj&pl,inst] товарами…"
 CORP_END_RIVALRY_HOSTILE_01: "Все [From.GetSpeciesNamePlural] могут получить отказ в предоставлении услуг, так как мы сохраняем за собой это право."
 CORP_END_RIVALRY_PROPOSE_01: "Бессмысленные перебранки плохо влияют на ведение дел, вам так не кажется, [Root.GetSpeciesNamePlural]?"
 CORP_END_RIVALRY_ACCEPT_01: "Если вы покупаете, мы продаем… [Root.GetSpeciesNamePlural]."
 CORP_INTEGRATE_01: "Погодите! Слияние может поставить под угрозу добросовестную репутацию [Root.GetAdj&masc,gen] бренда…"
 CORP_INTEGRATE_ACCEPT_01: "Поглощение завершено. Теперь [Root.GetName] и [From.GetName] станут единым целым."
 CORP_INTEGRATE_ACCEPT_02: "[Root.GetAdj&fem] франшиза была создана с нуля благодаря [Root.GetSpeciesAdj&masc,inst] решимости и трудолюбию. Мы никогда не забудем, кто мы есть."
 CORP_CANCEL_INTEGRATE_01: "Вы передумали насчет слияния, [From.GetSpeciesNamePlural]?"
 CORP_CANCEL_INTEGRATE_ACCEPT_01: "Значит, добросовестная репутация [Root.GetAdj&masc,gen] бренда останется нетронутой…"
 CORP_FORM_DP_SELECT_01: "Подтвердите запрос заключить пакт о взаимной защите с [From.GetName&inst]."
 CORP_FORM_DP_PROPOSE_01: "Как насчет того, чтобы заключить пакт о взаимной защите с одним из основных поставщиков вооружения в галактике?"
 CORP_FORM_DP_PROPOSE_02: "Наши расчеты показывают, что сила в количестве, [From.GetSpeciesNamePlural]. Давайте выступим вместе против наших врагов."
 CORP_FORM_DP_ACCEPT_01: "Ваш тыл в безопасности, [From.GetSpeciesNamePlural]."
 CORP_FORM_DP_REFUSE_01: "Наш бизнес принадлежит только нам, [From.GetSpeciesNamePlural]. В этом деле каждый представитель расы [Root.GetSpeciesName] за себя!"
 CORP_FORM_DP_REFUSE_02: "[Root.GetName] — коммерческое предприятие, а не благотворительный фонд. Вы должны научиться заботиться о себе сами, [From.GetSpeciesNamePlural]."
 CORP_BREAK_DP_SELECT_01: "Подтвердите запрос о расторжении [Root.GetAdj]о-[From.GetAdj&masc,gen] договора о взаимной защите."
 CORP_BREAK_DP_PROPOSE_01: "Из-за постоянного несоответствия требованиям пакта о взаимной защите с вашей стороны настоящим мы расторгаем данное соглашение."
 CORP_BREAK_DP_ACCEPT_01: "В соответствии с вашим желанием расторгнуть [Root.GetAdj]о-[From.GetAdj&masc] договор о взаимной защите, мы отзываем всю нашу военную поддержку."
 CORP_FORM_NAP_SELECT_01: "Подтвердите свой запрос заключить пакт о ненападении с расой [Root.GetSpeciesName]."
 CORP_FORM_NAP_PROPOSE_01: "В интересах обеспечения свободной торговли в нашем смежном секторе [From.GetName] предлагает заключить договор о ненападении."
 CORP_FORM_NAP_ACCEPT_01: "Наши прогнозы доходов действительно подтверждают, что мир между такими государствами [From.GetName] и [Root.GetName] будет финансово выгоден для обеих сторон. Где ставить подпись?"
 CORP_FORM_NAP_REFUSE_01: "С прискорбием сообщаем вам, что [From.GetAdj]о-[Root.GetAdj&masc] пакт о ненападении не согласуется с [Root.GetAdj&pl,inst] планами о будущей экспансии."
 CORP_BREAK_NAP_SELECT_01: "Вы хотите поставить под угрозу нашу взаимную безопасность?"
 CORP_BREAK_NAP_PROPOSE_01: "[From.GetName::Уважаемый <1>|||fem:Уважаемая <1>|||neut:Уважаемое <1>|||pl:Уважаемые <1>]! С прискорбием сообщаем вам, что мы разрываем [Root.GetAdj]о-[From.GetAdj&masc] пакт о ненападении. Решение вступает в силу немедленно."
 CORP_BREAK_NAP_ACCEPT_01: "Очень хорошо, [From.GetSpeciesNamePlural]. Возможно, нам стоит подумать о более агрессивной экспансии в будущем."
 CORP_GUARANTEE_SELECT_01: "Ваша преданность добросовестной репутации [Root.GetAdj&masc,gen] бренда растопила лед наших корпоративных сердец. Вы поистине самые преданные наши клиенты!"
 CORP_GUARANTEE_PROPOSE_01: "Дорогие клиенты! Вы для нас важны! Скажем больше, мы хотели бы отпраздновать нашу взаимную дружбу, поддержав вашу независимость от агрессоров! [From.GetAdj&masc] флот теперь в вашем распоряжении!"
 CORP_GUARANTEE_ACCEPT_01: "Спасибо за вашу помощь, за то, что мы в [Root.GetName&prep] можем и дальше поставлять вам качественные продукты, за которые можно поручиться. Потому что вы этого достойны!"
 CORP_REVOKE_GUARANTEE_SELECT_01: "Погодите, подумайте. Кто будем поставлять вам качественные продукты, за которые можно поручиться, если не мы?"
 CORP_REVOKE_GUARANTEE_PROPOSE_01: "К сожалению, [From.GetName] больше не может гарантировать [Root.GetAdj&fem,acc] независимость. Желаем вам удачи в будущих начинаниях, она вам непременно понадобится."
 CORP_REVOKE_GUARANTEE_ACCEPT_01: "Мы вас поняли, [From.GetSpeciesNamePlural]. Все четко и ясно."
 CORP_SUPPORT_INDEPENDENCE_SELECT_01: "Подтвердите свое содействие [Root.GetAdj&fem,gen] независимости, поддержав нашу кампанию по сбору средств!"
 CORP_SUPPORT_INDEPENDENCE_PROPOSE_01: "[From.GetName::<1> заинтересован|||fem:<1> заинтересована|||neut:<1> заинтересовано|||pl:<1> заинтересованы] в будущем наших клиентов и [From.GetName::поддержит|||pl:поддержат] вашу независимость."
 CORP_SUPPORT_INDEPENDENCE_ACCEPT_01: "[Root.GetName::<1> благодарит|||pl:<1> благодарят] вас за поддержку [Root.GetAdj&fem,gen] независимости."
 CORP_REVOKE_INDEPENDENCE_SELECT_01: "Желаете отказаться от поддержки [Root.GetAdj&fem,gen] независимости?"
 CORP_REVOKE_INDEPENDENCE_PROPOSE_01: "К сожалению, мы вынуждены отказаться от поддержки [Root.GetAdj&fem,gen] независимости. Желаем вам удачи в будущих начинаниях, она вам непременно понадобится."
 CORP_REVOKE_INDEPENDENCE_ACCEPT_01: "Жаль это слышать, [From.GetAllianceName]."
 CORP_FORM_MIGRATION_PACT_SELECT_01: "[Root.GetSpeciesAdj&pl] деловые качества пользуются большим спросом. Что [From.GetSpeciesNamePlural] могут предложить нам?"
 CORP_FORM_MIGRATION_PACT_PROPOSE_01: "[Root.GetSpeciesNamePlural]! Мы хотели бы пригласить вас принять участие в программе обмена талантами. Мы обнаружили, что свободная миграция населения между мирами может благоприятно сказываться на росте экономики."
 CORP_FORM_MIGRATION_PACT_ACCEPT_01: "Согласно нашим прогнозам, свободный обмен живым капиталом между нашими мирами обязателен для экономического развития! Инициировать утечку мозгов!"
 CORP_FORM_MIGRATION_PACT_REFUSE_01: "Наш отдел по привлечению талантов в настоящее время не занимается наймом кандидатов извне."
 CORP_FORM_MIGRATION_PACT_REFUSE_02: "Мы не допустим нарушения экономических связей среди наших рабочих."
 CORP_BREAK_MIGRATION_PACT_SELECT_01: "Подтвердите запрос прервать [Root.GetAdj]о-[From.GetAdj&fem,acc] программу по обмену талантами."
 CORP_BREAK_MIGRATION_PACT_PROPOSE_01: "Мы обнаружили, что [Root.GetSpeciesNamePlural] и их [Root.GetSpeciesMouthName], что вечно болтает, отрицательно влияют на [From.GetAdj&fem,acc] корпоративную культуру."
 CORP_BREAK_MIGRATION_PACT_ACCEPT_01: "[Root.GetName] настоящим подтверждает прекращение [Root.GetAdj]о-[From.GetAdj&fem,gen] программы по обмену талантами. Решение вступает в силу немедленно."
 CORP_OPEN_BORDERS_SELECT_01: "Откройте свои границы и наслаждайтесь многими преимуществами свободной торговли."
 CORP_OPEN_BORDERS_PROPOSE_01: "В интересах продвижения либерализации торговли во всей галактике теперь [From.GetName] открывает для вас свои границы."
 CORP_OPEN_BORDERS_ACCEPT_01: "[Root.GetName] благодарит вас за открытие границ для наших торговых судов."
 CORP_CLOSE_BORDERS_SELECT_01: "Тщательно взвесьте все варианты, [From.GetSpeciesNamePlural]. Протекционизм будет препятствовать экономическому росту и благосостоянию вашей державы."
 CORP_CLOSE_BORDERS_PROPOSE_01: "[From.GetName] больше не будет терпеть [Root.GetAdj&pl] вторжения в [From.GetAdj&neut] пространство. Все [Root.GetAdj&pl] корабли должны немедленно покинуть [From.GetAdj&fem,acc] территорию."
 CORP_CLOSE_BORDERS_ACCEPT_01: "Ваша протекционистская политика лишь оттягивает неизбежную либерализацию торговли в галактике."
 CORP_KICK_FROM_ALLIANCE_SELECT_01: "Подтвердите запрос исключить [Root.GetName&acc] из альянса §Y[From.GetAllianceName]§!. Имейте в виду, что [Root.GetName::<1> будет|||pl:<1> будут] защищать свои финансовые интересы в судебном порядке."
 CORP_KICK_FROM_ALLIANCE_PROPOSE_01: "[From.GetName::<1> с прискорбием сообщает|||pl:<1> с прискорбием сообщают] вам, что совет альянса [From.GetAllianceName] единогласно проголосовал за исключение [Root.GetName&gen] из его состава. Любые жалобы направляйте нашему юрисконсульту."
 CORP_KICK_FROM_ALLIANCE_ACCEPT_01: "Беда провидца в том, что его гений виден только в ретроспективе. Однажды все осознают, насколько [Root.GetName::<1> гениален|||fem:<1> гениальна|||neut:<1> гениально|||pl:<1> гениальны] с финансовой точки зрения."
 CORP_OFFER_FEDERATION_ASSOCIATION_STATUS_SELECT_01: "Подтвердите свое намерение предложить [Root.GetName&dat] статус ассоциации с альянсом §Y[From.GetAllianceName]§!."
 CORP_OFFER_FEDERATION_ASSOCIATION_STATUS_PROPOSE_01: "После долгого и плодотворного сотрудничества мы рады наконец предложить [Root.GetName&dat] статус ассоциации с альянсом [From.GetAllianceName]."
 CORP_OFFER_FEDERATION_ASSOCIATION_STATUS_ACCEPT_01: "[Root.GetName] с благодарностью принимает ваше предложение о статусе ассоциации с альянсом §Y[From.GetAllianceName]§! и надеется на долгое и плодотворное сотрудничество."
 CORP_OFFER_FEDERATION_ASSOCIATION_STATUS_REFUSE_01: "[Root.GetName::<1> пока не готов|||fem:<1> пока не готова|||neut:<1> пока не готово|||pl:<1> пока не готовы] к более тесному сотрудничеству с альянсом §Y[From.GetAllianceName]§!."
 CORP_REVOKE_FEDERATION_ASSOCIATION_STATUS_SELECT_01: "Подтвердите свое намерение отозвать [Root.GetAdj&masc] статус ассоциации с альянсом §Y[From.GetAllianceName]§!."
 CORP_REVOKE_FEDERATION_ASSOCIATION_STATUS_PROPOSE_01: "[From.GetName] с прискорбием сообщает вам, что совет единогласно проголосовал за отзыв [Root.GetAdj&masc,gen] статуса ассоциации с альянсом §Y[From.GetAllianceName]§! из-за внутренних противоречий."
 CORP_REVOKE_FEDERATION_ASSOCIATION_STATUS_ACCEPT_01: "Хотя мы опечалены вашим решением отозвать [Root.GetAdj&masc] статус ассоциации с альянсом §Y[From.GetAllianceName]§!, мы продолжим предоставлять наши услуги по приемлемым ценам."
 CORP_ASK_FEDERATION_ASSOCIATION_STATUS_SELECT_01: "Подтвердите свой запрос о статусе ассоциации с альянсом §Y[Root.GetAllianceName]§!."
 CORP_ASK_FEDERATION_ASSOCIATION_STATUS_PROPOSE_01: "Достопочтенные [Root.GetSpeciesNamePlural]! Мы предлагаем еще больше укрепить наши связи, предоставив нам статус ассоциации с альянсом §Y[Root.GetAllianceName]§!."
 CORP_ASK_FEDERATION_ASSOCIATION_STATUS_ACCEPT_01: "[From.GetSpeciesNamePlural]! [Root.GetName] с радостью сообщает вам, что теперь вы имеете статус ассоциации с альянсом §Y[Root.GetAllianceName]§!."
 CORP_ASK_FEDERATION_ASSOCIATION_STATUS_REFUSE_01: "С прискорбием должны сообщить вам, что ваш запрос о статусе ассоциации с альянсом §Y[Root.GetAllianceName]§! отклонен."
 CORP_END_FEDERATION_ASSOCIATION_STATUS_SELECT_01: "Подтвердите отказ от своего статуса ассоциации с альянсом §Y[Root.GetAllianceName]§!."
 CORP_END_FEDERATION_ASSOCIATION_STATUS_PROPOSE_01: "Настоящим [From.GetName] отказывается от своего статуса ассоциации с альянсом §Y[Root.GetAllianceName]§!. Любые жалобы направляйте в наш юридический отдел."
 CORP_END_FEDERATION_ASSOCIATION_STATUS_ACCEPT_01: "Ваш статус ассоциации с альянсом §Y[Root.GetAllianceName]§! отозван."
 CORP_INSULT_FRIENDLY_01: "А, [Root.GetSpeciesNamePlural]. Наши самые ценные партнеры! Чем обязаны такому удовольствию?"
 CORP_INSULT_NEUTRAL_01: "Если вы недовольны качеством наших услуг, обратитесь в службу поддержки клиентов…"
 CORP_INSULT_HOSTILE_01: "В чем дело, [Root.GetSpeciesNamePlural]? Мы не слышали вас из-за рева двигателей. Как раз решили прокатиться на офисном самолете."
 CORP_INSULT_PROPOSE_01: "У [From.GetName&gen] чутье на деньги, а от вас, [Root.GetSpeciesNamePlural], разит отчаянием."
 CORP_INSULT_PROPOSE_02: "Мы будем торговать смертью, а покупателями будут ваши [From.GetSpeciesSpawnNamePlural], [From.GetSpeciesNamePlural]."
 CORP_INSULT_PROPOSE_03: "Если время — это деньги, то, судя по вашему годовому отчету, [From.GetSpeciesNamePlural], ваше время подходит к концу."
 CORP_CORP_INSULT_PROPOSE_01: "[Root.GetName] — это пережиток прошлого, [From.GetName] — это будущее. Понять это несложно."
 CORP_INSULT_ACCEPT_FRIENDLY_01: "Вам никогда не пошатнуть [Root.GetSpeciesAdj&fem,acc] уверенность в том, что от торговли можно выиграть больше, чем от оскорблений."
 CORP_INSULT_ACCEPT_01: "Вы утратили хватку, [Root.GetSpeciesNamePlural]. Может быть, пора перестать мыслить стереотипами?"
 CORP_INSULT_ACCEPT_02: "А, [From.GetSpeciesNamePlural]… Вы так стараетесь, но никак не можете сдвинуться с мертвой точки. Некоторые просто обречены быть посредственностями."
 CORP_INSULT_ACCEPT_03: "Оскорбления и пустые угрозы — это оружие для несостоятельных. [Root.GetName::<1> защищает|||pl:<1> защищают] свои интересы посредством стали и огневой мощи."
 CORP_INSULT_ACCEPT_04: "Если вы хотите конфликта, [From.GetSpeciesNamePlural], то вам следовало бы вспомнить, что войны выигрывают при помощи оружия, а не слов."
 CORP_INSULT_ACCEPT_05: "Ах, как мило слышать это от вас! Мы только что зарегистрировали торговую марку §Y«[From.GetSpeciesNamePlural] должны умереть»§! для нашей новой баллистической ракеты дальнего действия."
