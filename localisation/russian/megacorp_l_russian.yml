 building_amusement_megaplex: "Развлекательный мегаплекс"
 building_amusement_megaplex_desc: "Будучи волшебным местом, где мечты могут воплотиться в реальность, этот мегаплекс предлагает одобренные корпорацией развлечения на любой вкус для всей семьи."
 building_private_mining_consortium: "Частный добывающий консорциум"
 building_private_mining_consortium_desc: "Частная компания по добыче минералов, принадлежащая мегакорпорации. Она нанимает местных шахтеров для доступа к богатствам в недрах планеты."
 building_food_conglomerate: "Сеть быстрого питания"
 building_food_conglomerate_desc: "Доступно, быстро и с вполне приемлемой питательной ценностью. Нулевое содержание токсинов* и никаких хлопот!\n\n* Продукт может содержать следы бензоата калия, азотной кислоты, темной материи, зеленого сойлента и жидкого дыма."
 building_public_relations_office: "Фирма по связям с общественностью"
 building_public_relations_office_desc: "Заблуждения и подозрения всегда окружают любую крупную корпорацию. В интересах общественности выслушать все стороны любого спора, и эта фирма по связям с общественностью профессионально преподносит точку зрения своего работодателя."
 building_private_research_initiative: "Частные научные предприятия"
 building_private_research_initiative_desc: "В этих ультрасовременных зданиях частные технологичные предприятия занимаются важными научными исследованиями и разработками для своей родительской компании."
 tech_executive_retreat: "Программа досуга управляющих"
 tech_executive_retreat_desc: "$building_executive_retreat_desc$"
 tech_xeno_tourism_agency: "Агентства ксенопросвещения"
 tech_xeno_tourism_agency_desc: "$building_xeno_tourism_agency_desc$"
 building_temple_of_prosperity: "Храм Процветания"
 building_temple_of_prosperity_desc: "Храм с высоким уровнем безопасности, который несет благую весть построившей его Мегацеркви."
 building_executive_retreat: "Корпоративный курорт"
 building_executive_retreat_desc: "Роскошный курортный комплекс для высокопоставленных сотрудников корпораций. Здесь они могут познакомиться с культурой данной планеты в условиях высокой безопасности."
 building_xeno_tourism_agency: "Агентство ксенопросвещения"
 building_xeno_tourism_agency_desc: "Это корпоративное агентство рекламирует множество межзвездных туристических достопримечательностей, а также предлагает трудоустройство и бонусы при подписании контракта для потенциальных эмигрантов, заинтересованных в переселении в пространство корпорации."
 building_underground_chemists: "Скрытые нарколаборатории"
 building_underground_chemists_desc: "Подземные нарколаборатории в отдаленной местности, которые практически невозможно заметить с поверхности. Здесь круглосуточно идет производство разных незаконных веществ, вызывающих сильное привыкание и приносящих большую прибыль."
 building_wrecking_yards: "Свалки"
 building_wrecking_yards_desc: "Здесь украденные суда и корабли, захваченные пиратами, разбираются на металлолом. Все ценные компоненты и сплавы аккуратно изымаются."
 building_underground_clubs: "Подземные клубы"
 building_underground_clubs_desc: "В этих нелегальных клубах развлечений можно реализовать любые порочные желания. Они начинают свою работу в неблагополучных районах планеты с наступлением ночи."
 building_pirate_haven: "Пиратская вольная гавань"
 building_pirate_haven_desc: "Изолированный и скрытый город на поверхности планеты, где пираты и прочие отбросы общества собираются, чтобы отремонтировать свои корабли и обменяться историями."
 building_smuggling_rings: "Порт контрабандистов"
 building_smuggling_rings_desc: "Неофициальный космопорт, который остается таковым благодаря соблюдению секретности и щедрым взяткам. Ежедневно через него проходят большие потоки грузов."
 building_wildcat_miners: "Рудники самовольной добычи"
 building_wildcat_miners_desc: "Незаконные и крайне небезопасные рудники, эксплуатируемые гражданами в нужде и отчаянии, которые работают как проклятые в тщетной надежде разбогатеть."
 building_bio_reprocessing_facilities: "Фабрики биопереработки"
 building_bio_reprocessing_facilities_desc: "Подземные сооружения, где нелояльные работники и другие формы неприятной биоматерии подвергаются переработке в готовые к употреблению пищевые продукты."
 building_syndicate_outreach_office: "Корпорации для прикрытия синдиката"
 building_syndicate_outreach_office_desc: "Эти честные коммерческие организации позволяют местному преступному синдикату функционировать якобы на законных основаниях."
 building_illicit_research_labs: "Нелегальные научные лаборатории"
 building_illicit_research_labs_desc: "В этих секретных лабораториях занимаются абсолютно нелегальными научными исследованиями и разработками самого различного вида."
 building_subversive_shrine: "Святилище подрывного культа"
 building_subversive_shrine_desc: "Здесь собираются и проводят ритуалы приверженцы подрывного культа."
 building_private_security: "Частная охранная компания"
 building_private_security_desc: "В отличие от государственных аналогов эта частная фирма превыше всего ценит порядок и безопасность, а не какие-то там этические или моральные нормы."
 building_industrial_subsidiary: "Промышленные подрядчики"
 building_industrial_subsidiary_desc: "Независимые поставщики предоставляют государственным производствам ресурсы из космоса по значительно сниженным ценам."
 building_corporate_monument: "Площадка корпоративной культуры"
 building_corporate_monument_desc: "Место, посвященное прославлению уникальной корпоративной культуры, которая является неотъемлемой частью всех коммерческих сделок, заключаемых на этой планете."
 building_corporate_site: "Центр делового управления"
 building_corporate_site_desc: "Комплекс, где специалисты по разумным ресурсам занимаются разработкой стратегий и проводят фокус-тестирование на подсознательном уровне ключевых решений, касающихся деловой культуры данной планеты."
 building_corporate_forum: "Синергический форум"
 building_corporate_forum_desc: "Гигантский форум по сверхсветовым технологиям, способный объединить корпоративную культуру миллионов планетарных корпоративных подразделений."
 building_corporate_vault: "Хранилище приобретений"
 building_corporate_vault_desc: "Огромное подземное хранилище двойного назначения. Используется как место координации коммерческой деятельности и общественный музей долгой и прибыльной истории Мегакорпорации, которая его построила."
 building_nanite_transmuter: "Нанитовый преобразователь"
 building_nanite_transmuter_desc: "Этот завод массово производит много редких ресурсов, используя новейших нанитов. Дефицит нанитов остановит производство."
 building_hab_major_capital: "Центр управления средой обитания"
 building_hab_major_capital_desc: "Обширный комплекс бюрократических ведомств, который занимается управлением густонаселенной средой обитания."
 building_hab_major_capital_tooltip: "£mod_planet_max_districts_add£ Максимум районов от крупных небесных тел: §G+0,50§!\n"
 building_hab_system_capital: "Управление средой обитания"
 building_hab_system_capital_desc: "Обширный комплекс бюрократических ведомств, который занимается управлением густонаселенной средой обитания."
 building_hab_system_capital_tooltip: "£mod_planet_max_districts_add£ Максимум районов от крупных небесных тел: §G+0,75§!\n"
 district_hab_housing: "Жилой район"
 district_hab_housing_plural: "Жилые районы"
 district_hab_housing_desc: "Жилой район данной среды обитания предоставляет возможность комфортного, хотя и компактного проживания для собственного населения."
 district_hab_commercial: "Торговый район"
 district_hab_commercial_plural: "Торговые районы"
 district_hab_commercial_desc: "Разросшийся торговый район, где торговцы и клерки ведут свои дела."
 district_hab_cultural: "Центр досуга"
 district_hab_cultural_plural: "Районы досуга"
 district_hab_cultural_desc: "Кому нужны большие открытые пространства, когда есть такие центры развлечений?"
 district_hab_energy: "Реакторный район"
 district_hab_energy_plural: "Реакторные районы"
 district_hab_energy_desc: "Районы промышленного производства энергии, расположенные внутри сред обитания, позволяют вырабатывать энергокредиты, а также обеспечивают энергией аркологии, на которых они построены."
 district_hab_science: "Научный район"
 district_hab_science_plural: "Научные районы"
 district_hab_science_desc: "Эти жилые районы, являющиеся центрами научных исследований, объединяют ученых самых разных областей наук."
 district_hab_industrial: "Промышленный район"
 district_hab_industrial_plural: "Промышленные районы"
 district_hab_industrial_desc: "Производственные установки заполнили этот район орбитального поселения, в полной мере используя преимущества низкой гравитации."
 district_hab_mining: "$building_hab_astro_mining_facility$"
 district_hab_mining_plural: "Комплексы астродобычи"
 district_hab_mining_desc: "$building_hab_astro_mining_facility_desc$"
