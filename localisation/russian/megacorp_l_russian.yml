 matter_decompressor_ruined: "Разрушенный $matter_decompressor_4$"
 matter_decompressor_ruined_DESC: "Этот $matter_decompressor_4$ на орбитальной станции, находящейся в совершенно плачевном состоянии, умудрялся преодолевать законы природы, получая материю из черной дыры в этой системе."
 matter_decompressor_ruined_MEGASTRUCTURE_DETAILS: "Останки сложной установки, взаимодействующей с черной дырой."
