 mega.1000.name: "$matter_decompressor_1$"
 mega.1000.desc: "$matter_decompressor_1$ пробуждается к жизни и протягивает к черной дыре тонкие и изящные металлические щупальца.\n\nСпазмы и конвульсии ненадежной станции сменяются ровным гудением текущей энергии и твердых частиц, сметаемых из области тени за пределами горизонта событий звезды [From.GetName]."
 mega.1000.a.mater: "Ради науки."
 mega.1100.name: "$strategic_coordination_center_1$"
 mega.1100.desc: "$strategic_coordination_center_1$, попадающий в поле зрения камер наблюдения, представляет собой впечатляющее зрелище.\n\nНаши военные инженеры осознали, что не стоит даже и пытаться скрыть истинное предназначение станции такого размера. Она выглядит именно тем, чем и является: коробкой с самым современным оборудованием связи, матрицами датчиков и высококвалифицированной командой тактической логистики."
 mega.1100.a.tooltip: "§H$strategic_coordination_center_1$§! улучшает такие параметры, как §Y$MOD_COUNTRY_NAVAL_CAP_ADD$§!, §Y$mod_shipclass_starbase_damage_mult$§!, §Y$MOD_STARBASE_DEFENSE_PLATFORM_CAPACITY_ADD$§!, §Y$mod_shipsize_corvette_build_speed_mult$§!, §Y$mod_shipsize_destroyer_build_speed_mult$§!, §Y$mod_shipsize_cruiser_build_speed_mult$§! и §Y$mod_shipsize_battleship_build_speed_mult$§!."
