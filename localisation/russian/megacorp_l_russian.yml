 ## BUILDINGS ##
 building_maintenance_depot: "Логистический центр"
 building_maintenance_depot_desc: "Здесь, в сердце логистического аппарата, единицы, обслуживающие колоссальное хранилище, следят за быстрой доставкой ресурсов туда, где они требуются."
 building_hive_node: "Синаптические узлы"
 building_hive_node_desc: "Обслуживание и поддержку этих узлов, которые представляют собой центры огромных макроскопических синапсов и служат для получения и передачи воли улья, выполняют специальные трутни."
 building_hive_cluster: "Синаптические скопления"
 building_hive_cluster_desc: "Синаптические узлы улья, объединенные в сеть и сгруппированные вместе, обеспечивают максимальную передачу меганейронов на доступную площадь поверхности, усиливая организацию воли по отношению к своим трутням."
 building_hive_confluence: "Слияние мыслей"
 building_hive_confluence_desc: "Крупный нервный центр макроскопической нервной системы, миллиарды меганейронов которой проносятся по обширным участкам беспокойных протоплазматических волокон и образуют слияние мыслей, распространяя, укрепляя и согласовывая волю улья."
 building_hydroponics_farm: "Гидропонные фермы"
 building_hydroponics_farm_desc: "Гидропонные фермы производят питательное растительное вещество, предназначенное для потребления местными поселениями."
 building_holo_theatres: "Голотеатры"
 building_holo_theatres_desc: "Последний писк голографических развлечений. Целые миры создаются из фотонов и энергетических полей."
 building_crystal_mines: "Кристальные рудники"
 building_crystal_mines_desc: "К разработке данных рудников нужно подходить с особой осторожностью, чтобы избежать повреждения кристаллов."
 building_foundry_1: "Сплаволитейные заводы"
 building_foundry_1_desc: "[Owner.GetAlloyProducerPlural], работающие на этих заводах, производят высококачественные сплавы."
 building_foundry_2: "Сплаволитейные мегакузницы"
 building_foundry_2_desc: "Эти массивные кузни могут увеличить производство сплавов на планете на поздних этапах."
 building_foundry_3: "Сплаволитейные нанопредприятия"
 building_foundry_3_desc: "Крупные промышленные производители, увеличивающие производство сплавов на планете."
 building_factory_1: "Гражданские предприятия"
 building_factory_1_desc: "Гражданские предприятия самого разного типа, где производятся товары массового спроса."
 building_factory_2: "Гражданские производители"
 building_factory_2_desc: "Крупные промышленные производители, увеличивающие производство товаров массового спроса на планете."
 building_factory_3: "Гражданские репликационные комплексы"
 building_factory_3_desc: "В терминалах этих комплексов может воссоздаваться почти все что угодно."
 building_noble_estates: "Имения знати"
 building_noble_estates_desc: "Дворцы и особняки, блистающие великолепием и принадлежащие знати. Окружающая сельская местность и населяющие ее крестьяне также принадлежат им."
 building_bureaucratic_1: "Административные здания"
 building_bureaucratic_1_desc: "Похожий на лабиринт правительственный комплекс из бюрократических отделов, подотделов и подподотделов."
 building_bureaucratic_2: "Административный парк"
 building_bureaucratic_2_desc: "Застроенный административными зданиями городской квартал, целиком посвященный важной и нужной бумажной работе."
 building_bureaucratic_3: "Административный комплекс"
 building_bureaucratic_3_desc: "Огромная площадь, застроенная множеством офисных зданий с бессчетным количеством кабинетов."
 building_simulation_1: "Виртуальная площадка"
 building_simulation_1_desc: "Чтобы наша цивилизация могла развиваться, мы должны проводить и анализировать множество комплексных симуляций."
 building_simulation_2: "Виртуальный центр"
 building_simulation_2_desc: "$building_simulation_1_desc$"
 building_simulation_3: "Виртуальный комплекс"
 building_simulation_3_desc: "$building_simulation_1_desc$"
 building_sensorium_1: "Площадка для сенсория"
 building_sensorium_1_desc: "Для лучшего понимания галактики нашим специализированным сенсорным дронам нужно испытать всё, что она может предложить."
 building_sensorium_2: "Центр сенсория"
 building_sensorium_2_desc: "$building_sensorium_1_desc$"
 building_sensorium_3: "Комплекс сенсория"
 building_sensorium_3_desc: "$building_sensorium_1_desc$"
 building_primitive_research: "Простые научные лаборатории"
 building_primitive_research_desc: "Несмотря на простоту, этим научным объектам удалось привести цивилизацию в космическую эпоху."
 building_research_lab_1: "Научные лаборатории"
 building_research_lab_1_desc: "Научные лаборатории предоставляют базовое оборудование для исследований общего характера."
 concept_research_lab: "$building_research_lab_1$"
 concept_research_lab_desc: "Должности исследователей: §G+2§!\n\n$job_researcher_effect_desc$\n$h_line$§L$building_research_lab_1_desc$§!"
 building_research_lab_2: "Научные комплексы"
 building_research_lab_2_desc: "Улучшенные научно-исследовательские базы с огромным количеством сотрудников."
 building_research_lab_3: "Передовые научные комплексы"
 building_research_lab_3_desc: "Эти передовые научно-исследовательские базы оснащены самым последним научным оборудованием и имеют исключительно большой кадровый состав."
 building_precinct_house: "Полицейские участки"
 building_precinct_house_desc: "Оплоты закона и порядка. Здесь базируются правоохранительные органы."
 concept_precinct_house: "$building_precinct_house$"
 concept_precinct_house_desc: "Должности [enforcer.GetName]: §G+200§!\n\n$job_enforcer_effect_desc$\n$h_line$§L$building_precinct_house_desc$§!"
 building_hall_judgment: "Дворец правосудия"
 building_hall_judgment_desc: "Огромный комплекс, отведенный для судов и правоохранительных органов."
 building_sentinel_posts: "Посты стражей"
 building_sentinel_posts_desc: "Это форпосты, из которых патрульные дроны сканируют Сознание на предмет признаков отклонения от нормы и сбоев."
 building_hive_capital: "Ядро улья"
 building_hive_capital_desc: "Организационный центр, откуда коллективный разум координирует функционирование всей планеты."
 building_hive_major_capital: "Комплекс улья"
 building_hive_major_capital_desc: "Обширный столичный комплекс, где коллективный разум сосредоточен на организации, координации и планировании в масштабах планеты."
 building_spawning_pool: "Резервуары для выведения"
 building_spawning_pool_desc: "Под присмотром умных и внимательных специалистов эти резервуары стимулируют наш молодняк к более быстрому росту."
 building_robot_assembly_plant: "Роботостроительные заводы"
 building_robot_assembly_plant_desc: "Высокотехнологичные предприятия, где квалифицированные специалисты по робототехнике собирают последние модели роботов."
 building_robot_assembly_complex: "Сборочный комплекс роботов"
 building_robot_assembly_complex_desc: "Высокотехнологический сборочный завод, где квалифицированные специалисты по робототехнике собирают последние модели роботов."
 building_machine_assembly_plant: "Машиностроительные заводы"
 building_machine_assembly_plant_desc: "Завод с производственной линией, где строятся новые единицы."
 building_machine_assembly_complex: "Машиностроительный комплекс"
 building_machine_assembly_complex_desc: "Завод с современной производственной линией, где строятся новые единицы."
 building_food_processing_facility: "Предприятия обработки пищи"
 building_food_processing_facility_desc: "Обработка пищи на этих предприятиях значительно повышает ее питательную ценность."
 building_food_processing_center: "Центры обработки пищи"
 building_food_processing_center_desc: "Оптимизированные предприятия для обработки пищи в больших объемах."
 building_luxury_residence: "Роскошные жилища"
 building_luxury_residence_desc: "Жилые башни замысловатой конструкции с роскошными квартирами. Единственная причина, по которой диковинные террасы не обрушиваются, — это использование продвинутой технологии нулевой гравитации."
 building_refinery: "Фабрики переработки экзотических газов"
 building_refinery_desc: "Эти передовые фабрики производят экзотические газы днем и ночью."
 building_crystal_plant: "Фабрики синтетических кристаллов"
 building_crystal_plant_desc: "Здесь производятся кристаллы высочайшего качества, которые почти не отличаются от природных."
 building_chemical_plant: "Химические заводы"
 building_chemical_plant_desc: "Здесь искусственным образом производят непредсказуемую и иногда нестабильную летучую пыль. В радиусе пяти километров от заводов запрещено использование открытых источников огня."
 building_commercial_zone: "Коммерческие зоны"
 building_commercial_zone_desc: "В этих коммерческих зонах расположены очень высокие офисные здания и деловые комплексы."
 building_commercial_megaplex: "Торговые мегаплексы"
 building_commercial_megaplex_desc: "Шпили и башни огромных торговых зданий поднимаются к небу, застилая свет."
 building_mote_harvesters: "Ловушки для сбора пылинок"
 building_mote_harvesters_desc: "Эти замысловатые устройства заключают летучую пыль в энергетические поля, направляя её в специальные зоны удержания под землей, где возможны её стабилизация и сбор."
 building_gas_extractors: "Колодцы для добычи газа"
 building_gas_extractors_desc: "Эти громоздкие колодцы устремляются вглубь мантии планеты, давая доступ к полостям с экзотическим газом."
 building_communal_housing: "Общинное жилье"
 building_communal_housing_desc: "Квартал единообразного жилья, где все одинаково."
 building_communal_housing_large: "Утопическое общинное жилье"
 building_communal_housing_large_desc: "Невероятный подвиг инженерного искусства, сочетающий эффективные и практичные дома с тщательно сохраняемыми идиллическими ландшафтами."
 building_drone_storage: "Склад дронов"
 building_drone_storage_desc: "Место хранения дронов для проведения технического обслуживания."
 building_drone_megastorage: "Улучшенный склад дронов"
 building_drone_megastorage_desc: "Благодаря последним улучшениям при проведении технического обслуживания часть энергии, произведенной дронами, можно перенаправить в энергосеть."
 building_hive_warren: "Вольер улья"
 building_hive_warren_desc: "Огромный вольер обеспечивает многих трутней убежищем для отдыха."
 building_expanded_warren: "Расширенный вольер"
 building_expanded_warren_desc: "Расширяя вольеры, мы даем убежище большему количеству трутней."
 building_nuumismatic_shrine: "Нумское святилище"
 building_nuumismatic_shrine_desc: "Святилище, посвященное поклонению Нуме, богине удачи."
 building_ranger_lodge: "Застава рейнджеров"
 building_ranger_lodge_desc: "Первый шаг к тому, чтобы жить в гармонии с природой, — убедиться, что природа еще осталась. Важно, чтобы никто из колонистов не портил природную красоту. Мир должен оставаться чистым."
 building_ranger_lodge_effect: "Должности: £job_ranger£ $job_ranger$ от естественных препятствий: §G+1§! £job_ranger£"
 mod_building_xeno_zoo_max: "$building_xeno_zoo$: максимум"
 mod_building_crystal_mines_max: "$building_crystal_mines$: максимум"
 mod_building_mote_harvesters_max: "$building_mote_harvesters$: максимум"
 mod_building_gas_extractors_max: "$building_gas_extractors$: максимум"
