 ccoinswhat: "Что такое $ccoinz$?"
 ccoinzwhat.reply: "Комитет по монетизации караванщиков обеспечивает полную совместимость с экосистемой услуг на борту станции $NAME_Tradestation_Tungle$, включая, но не ограничиваясь такими объектами, как $slots$ и $lootboxes$.\n\nНо чаще всего это только $slots$ и $lootboxes$.\n\n$ccoinz$ принимаются только для таких объектов, как $slots$ и $lootboxes$."
