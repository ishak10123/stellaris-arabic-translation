 #Casus Belli
 casus_belli_cb_galatron: "Отказ в доступе к Галатрону"
 war_goal_wg_take_galatron: "Захватить Галатрон"
 war_goal_wg_take_galatron_desc: "Купаться в славе Галатрона — это право всех разумных существ. Цивилизация, закрывающая свои границы для других, недостойна быть хранителем Галатрона."
 casus_belli_cb_expel_corp: "Экспроприация"
 war_goal_wg_expel_corp: "Изгнать корпорацию"
 war_goal_wg_expel_corp_desc: "Целью войны является закрытие филиалов данной корпорации и экспроприация их собственности на наших планетах."
 wg_expel_corp_status_quo_effects: "Все филиалы, что §Y[From.GetName]§! открыли в государстве §Y[Root.GetName]§! и на планетах его союзников, будут закрыты.\n§Y[From.GetName]§! и союзники получают §G1000§! ед. §Y£trade£ торгового ресурса§! за каждый закрытый филиал."
 wg_expel_corp_effects: "Все филиалы, что §Y[From.GetName]§! открыли в государстве §Y[Root.GetName]§! и на планетах его союзников, будут закрыты.\n§Y[Root.GetName]§! получает §G1000§! ед. §Y£trade£ торгового ресурса§! за каждый закрытый филиал."
 wg_seize_branch_office_effects: "§Y[Root.GetName]§! берет контроль над планетарным филиалом.\n"
 wg_expel_corp_subject_status_quo_effects: "Все филиалы, что §Y[From.GetName]§! открыли в государстве §Y[Root.GetName]§! (и на планетах его союзников и подданных), будут закрыты.\n§Y[From.GetName]§! получает §G1000§! ед. §Y£trade£ торгового ресурса§! за каждый закрытый филиал."
 wg_expel_corp_subject_effects: "Все филиалы, что §Y[From.GetName]§! открыли в государстве §Y[Root.GetName]§! (и на планетах его союзников и подданных), будут закрыты.\n§Y[Root.GetName]§! (а также союзники и подданные) получает §G1000§! ед. §Y£trade£ торгового ресурса§! за каждый закрытый филиал."
 market_founding_chain_title: "Основание галактического рынка"
 market_founding_chain_desc: "Учреждение международного бизнес-форума совсем близко, и тот, кто контролирует централизованную станцию обмена, получит выгоду.\n\nЕсли мы желаем побороться за звание хозяина рынка, у нас есть несколько лет для принятия §Hрешений§!, связанных с выбором одного из наших миров для привязки к такому объекту, как $galactic_market_station$."
 casus_belli_cb_steal_galatron: "Объявить притязание на Галатрон"
 war_goal_wg_steal_galatron: "Забрать Галатрон"
 war_goal_wg_steal_galatron_desc: "Обладание Галатроном имеет первостепенное значение для нашего господства. Мы не успокоимся, пока Галатрон не благословит наше государство своим вечным присутствием, высвободившись из менее достойных манипуляторных придатков."
