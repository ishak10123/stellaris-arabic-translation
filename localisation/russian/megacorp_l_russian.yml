 matter_decompressor_2: "Разуплотнитель материи: линзирование"
 matter_decompressor_2_DESC: "Комплекс гравитационного линзирования перенаправляет часть гравитационной силы черной дыры, концентрируя ее еще сильнее в выбранной области."
 matter_decompressor_2_MEGASTRUCTURE_DETAILS: "$matter_decompressor_0_MEGASTRUCTURE_DETAILS$"
 matter_decompressor_3: "Разуплотнитель материи: бурение"
 matter_decompressor_3_DESC: "Основательно усовершенствованная система перенаправления гравитации образует концентрированную зону гравитационного искажения, действующую как огромный бур, чей принцип работы основан на перенаправлении и концентрации силы тяготения."
 matter_decompressor_3_MEGASTRUCTURE_DETAILS: "$matter_decompressor_0_MEGASTRUCTURE_DETAILS$"
 matter_decompressor_4: "Разуплотнитель материи"
 matter_decompressor_4_DESC: "При помощи бура искаженной гравитации, проделывающего туннель в сингулярность, и нескольких автоматизированных разуплотнителей материи, систем переработки и плавилен на орбите мы добываем минералы из черной дыры."
