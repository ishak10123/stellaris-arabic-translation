 matter_decompressor_0: "Площадка для уплотнителя материи"
 matter_decompressor_0_DESC: "Пока что это просто строительная станция, но однажды здесь заработает $matter_decompressor_1$."
 matter_decompressor_0_MEGASTRUCTURE_DETAILS: "§Y$matter_decompressor_4$§! линзирует гравитацию черной дыры, образуя бур из гравитационных сил для извлечения £minerals£ минералов из сингулярности."
 matter_decompressor_1: "Разуплотнитель материи: якорь"
 matter_decompressor_1_DESC: "Продвинутый двигатель перенаправления гравитации удерживает основание объекта на краю горизонта событий черной дыры."
