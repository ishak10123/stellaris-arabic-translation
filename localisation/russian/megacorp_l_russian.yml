 district_hive_desc: "В этих высотных зданиях трутни собираются в нерабочее время для восстановления сил и поглощения питательных веществ."
 district_nexus: "Центральный нексус"
 district_nexus_plural: "Центральные нексусы"
 district_nexus_desc: "Централизованные районы, где дроны получают приказы и назначаются на работу."
 district_industrial: "Промышленный район"
 district_industrial_plural: "Промышленные районы"
 district_industrial_desc: "Этот район полон плавильных установок и заводов, производящих передовую продукцию из сырья."
 district_resort: "Район отдыха"
 district_resort_plural: "Районы отдыха"
 district_resort_desc: "Курорты, пансионы и дворцы наслаждений — всё для отдыха, удовольствий и побега от реальности."
 district_resort_1: "Развлекательные районы"
 district_resort_1_plural: "Развлекательные районы"
 district_resort_1_desc: "Яркое пространство, где посетителей ждут потрясающие впечатления, незабываемые моменты и бесчисленные чудеса."
 district_resort_2: "$district_resort_1$"
 district_resort_2_plural: "$district_resort_1_plural$"
 district_resort_2_desc: "$district_resort_1_desc$"
 district_resort_3: "$district_resort_1$"
 district_resort_3_plural: "$district_resort_1_plural$"
 district_resort_3_desc: "$district_resort_1_desc$"
 district_prison: "Тюремный район"
 district_prison_plural: "Тюремные районы"
 district_prison_desc: "Камеры, сторожевые башни, высокие стены и КПП. Все ради изоляции и реабилитации преступников из этого общества."
 district_prison_industrial: "Тюремный промышленный район"
 district_prison_industrial_plural: "Тюремные промышленные районы"
 district_prison_industrial_desc: "Мастерские, фабрики, системы наблюдения и укрепленные барьеры для удержания и продуктивного труда заключенных."
 building_virtual_entertainment_studios: "Студии виртуальных развлечений"
 building_virtual_entertainment_studios_desc: "При помощи систем обработки нанотранзакций и алгоритмов нейрохимического усвоения информации эти студии разработки создают самое современное программное обеспечение в области виртуальных развлечений для миллиардов разумных потребителей и их домохозяйств."
 building_private_shipyards: "Частные военные предприятия"
 building_private_shipyards_desc: "Эти планетарные корпоративные фабрики производят и собирают самые разные жизненно важные компоненты для строительства звездолетов."
 building_military_contractors: "Отдел взаимодействия с наемниками"
 building_military_contractors_desc: "Этот отдел проводит набор в корпоративные солдаты удачи. Приличное жалование, ограниченное медицинское страхование, а также рассказы о жизни, полной восхитительных приключений, обеспечивают постоянный поток новобранцев."
 building_commercial_forum: "Бизнес-форум"
 building_commercial_forum_desc: "Сильные мира сего, местные экономические лидеры и прочие важные фигуры могут встретиться здесь с представителями корпораций в спокойной, умиротворяющей обстановке, которая идеально подходит для заключения новых коммерческих сделок."
 district_slave: "Жилой район для рабов"
 district_slave_desc: "Бескрайние трущобы из нагроможденных друг на друга жилищ, единственное назначение которых — вместить как можно больше населения с минимальными затратами."
 district_slave_plural: "Жилые районы для рабов"
 district_battle_thrall: "Жилой район для воинов-рабов"
 district_battle_thrall_desc: "Утилитарные казармы и суровые тренировочные полигоны, назначение которых — воспитывать самых свирепых воинов-рабов."
 district_battle_thrall_plural: "Жилые районы для воинов-рабов"
