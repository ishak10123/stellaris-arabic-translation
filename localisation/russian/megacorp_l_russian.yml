 mega.200.name: "§HЭкуменополис§!: [Root.GetName] в оболочке"
 mega.200.desc: "Разрастающиеся города покрывают кору планеты слой за слоем.\n\nСпустя всего несколько лет после начала этого грандиозного проекта уже трудно вспомнить, какой была поверхность [Root.GetPlanetMoon]ы [Root.GetName]. Зеленой от растительности? Труднопроходимой? Теперь здесь повсюду сталь — на многие мили в любом направлении.\n\nМесто, когда-то сформированное под действием случая и бездумных законов природы, теперь представляет собой конструкцию, возникшую из неукротимой цели."
 mega.200.a: "Впечатляет."
