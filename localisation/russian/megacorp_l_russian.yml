 strategic_coordination_center_0_MEGASTRUCTURE_DETAILS: "Объект, синхронизирующий национальную сеть космических баз и усиливающий ее оборонительные и наступательные возможности."
 strategic_coordination_center_1: "Центр стратегической координации: корпус"
 strategic_coordination_center_1_DESC: "Бронированный корпус Центра стратегической координации служит для размещения цвета нашего военного командования, которое посвящает свое время стратегии и планированию в этом ультрасовременном комплексе."
