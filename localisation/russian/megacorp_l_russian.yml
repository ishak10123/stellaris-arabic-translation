 ## Edicts ##
 edict_nuumismatic_visualization: "Нумская визуализация"
 edict_nuumismatic_visualization_desc: "Активное использование методов Нумской визуализации позволит переключить внимание наших граждан с личной выгоды на производство космической энергии. Чтобы достичь чего-нибудь, нужно сначала это визуализировать."
 edict_terraforming_gas: "Терраформирующие газы"
 edict_terraforming_gas_desc: "Используя экзотические газы для терраформирования, мы можем добиться прогресса намного быстрее."
 edict_clearing_motes: "Перераздел с летучей пылью"
 edict_clearing_motes_desc: "Используя летучую пыль и её взрывчатые свойства, мы можем выполнить перераздел сложной местности гораздо быстрее."
 edict_crystalline_sensors: "Кристаллические сенсоры"
 edict_crystalline_sensors_desc: "Используя редкие кристаллы для усиления наших сенсоров, мы можем получить кристально чистую картину нашего окружения."
 edict_living_metal_construction: "Мегасооружение из живого металла"
 edict_living_metal_construction_desc: "Внутренние свойства живого металла делают его идеальным для улучшения конструкции мегасооружения."
 edict_fuel_gases: "Экзотические газы как топливо"
 edict_fuel_gases_desc: "Различные экзотические газы также служат превосходным топливом для субсветовых путешествий, хотя это, возможно, и не самая экономичная альтернатива."
 edict_shield_gases: "Экзотические газы для усиления щитов"
 edict_shield_gases_desc: "Некоторые экзотические газы можно использовать для усиления характеристик щитов кораблей. Они могут создавать сложные амортизирующие поля для отражения и смягчения атак противника."
 edict_motes_kinetic: "Летучие боеприпасы"
 edict_motes_kinetic_desc: "Мы можем использовать летучую пыль как взрывчатое вещество в составе боеприпасов наших кораблей."
 edict_motes_explosives: "Летучая взрывчатка"
 edict_motes_explosives_desc: "При использовании летучих пылинок для создания специальных ракет наши корабли будут иметь более мощную разрушительную силу."
 edict_motes_armor: "Летучая реактивная броня"
 edict_motes_armor_desc: "При усилении брони наших кораблей реактивным компонентом они будут способны поглощать больше урона, уменьшая получаемый урон при помощи контролируемого контрвзрыва."
 edict_crystal_focus: "Фокусирующие кристаллы"
 edict_crystal_focus_desc: "Улучшая доступ наших кораблей к редким кристаллам, мы можем повысить урон от их энергетического оружия."
 edict_nanite_actuators: "Нанитовые актюаторы"
 edict_nanite_actuators_desc: "$sr_distar_nanoactuator_desc$"
 edict_sight_beyond_sight: "Взгляд в незримое"
 edict_sight_beyond_sight_desc: "Микроскопические дозы позволяют нашим навигаторам ощущать объекты за пределами наших сканеров."
 edict_zro_catalysis_utopia: "Катализатор зро"
 edict_zro_catalysis_utopia_desc: "Среди множества таинственных свойств зро есть способность значительно усиливать псионические способности употребляющих его существ."
 edict_zro_catalysis_non_utopia: "$edict_zro_catalysis_utopia$"
 edict_zro_catalysis_non_utopia_desc: "Наши исследователи нашли способ синтезировать зро для производства веществ, которые усиливают способности употребляющих его существ без негативных побочных свойств."
 edicts_unscaled: "$edicts$"
