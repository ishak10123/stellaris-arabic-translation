 infernals.35.name: "炎に呑まれて"
 infernals.35.desc: "§H[from.GetName]§!の地表は裂け、 地殻は下から噴き上がる耐え難い熱により砕かれた。 変化は迅速かつ、 絶対的だった──山は崩れ、 海は沸騰し、 空は火の粉の帳に覆われた。\n\nかつて繁栄していた生態系の痕跡は一切残っていない。 いまやこの地を故郷と呼べるのは、 極限環境生命体のみである。"
