l_japanese:
 INFERNALS_TITLE: "Infernals Species Pack" # Do not translate
 vo_infernal_voice: "好熱種族"
 # Traits
 trait_pc_volcanic_preference: "火山適性"
 trait_pc_volcanic_preference_short: "火山"
 trait_pc_volcanic_preference_desc: "$trait_pc_savannah_preference_desc$"
 trait_volcanic_planet_preference: "$trait_pc_volcanic_preference$" #robotic
 trait_volcanic_planet_preference_desc: "$trait_dry_planet_preference_desc$" #robotic
 trait_infernal: "好熱種族"
 trait_infernal_plural: "好熱種族"
 trait_infernal_desc: "この種族は、 通常の有機生命体ならば焼け焦げてしまうような高温惑星で生き延び、 繁栄するために、 金属合金の組織を進化させた。 これらの合金細胞は劣化が遅く、 置き換わる頻度も低いため、 加齢に伴う疾患の発症を遅らせる効果がある。 しかし同時に、 低温を伝導してしまうため、 寒冷な環境では健康を脅かすことにもなる。"
 TRAIT_INFERNAL_EFFECT: "$pop_group_unit$ £pop£ POPあたりの$r_alloys$維持費：§R+$@living_standard_alloys_normal$§!$TABBED_NEW_LINE$- $pc_volcanic$の$HABITABILITY$：§G+20%§! $TABBED_NEW_LINE$- 最小$HABITABILITY$ (§H$pc_volcanic$§!)：§Y+50%§! $TABBED_NEW_LINE$- §Y寒冷§!惑星の$HABITABILITY$：§R-30%§!  $TABBED_NEW_LINE$- リーダーの寿命：§G+10年§!"
 trait_unbreakable_resolve: "揺るぎなき決意"
 trait_unbreakable_resolve_desc: "精緻に張り巡らされたミラーニューロンの網によって、 この種族は本能的に意思を同調させる力を備えている。 義務は重荷ではなく、 共有すべき使命であり、 困難は揺るぎない団結によって乗り越えられる。"
 trait_unbreakable_resolve_tooltip: "この特性を持つ惑星上の$pop_group_unit$ £pop£ §HPOP§!ごとに、 £stability£ $PLANET_STABILITY_TITLE$が§G+0.2§!増加する (最大：§G+15§!)。\n- §R奴隷や下位のPOP階級は含まれない。§!"
 trait_shell_slag: "シェル・スラグ"
 trait_shell_slag_desc: "この種族は従来の生物のように成長するのではなく、 $r_living_metal$との精緻な共生関係によって、 生体鉄構造を堆積、 自己組成することで成長する。"
 trait_shell_slag_tooltip: "奴隷かそれ以上の職業に就いている、 この特性を持つ$pop_group_unit$ £pop£ §HPOP§!ごとに、 §G$@shell_slag_trait_resource_production|3$§! §Y$r_living_metal$§!を毎月産出する。"
 trait_robot_assembly_slag: "アセンブリ・スラグ"
 trait_robot_assembly_slag_desc: "この機械種族は$r_living_metal$を精緻に統合することで、 従来の建造によってではなく、 自動鉄骨格の堆積と自己組成によって拡大する。"
 trait_pyroclastic: "火砕制御"
 trait_pyroclastic_desc: "火山惑星の容赦なき猛威によって鍛えられたこの種族は、 火砕流の力を恐れることはない。 むしろそれを導き、 操ることで、 破壊を生命と力の源へと変えるのだ。"
 trait_pyroclastic_tooltip: "$pc_volcanic_plural$での$MOD_LOGISTIC_GROWTH_MULT$：§G+10%§!"
 trait_crucible_community: "坩堝のコミュニティ"
 trait_crucible_community_desc: "逆境に揉まれ、 灼熱の試練によって結ばれたこの種族は、 砕けることのないひとつの存在として形成された。 彼らの集合的な意思は統治を支え、 各個体は団結の鎖を繋ぐ欠かせぬ環である。"
 trait_crucible_community_tooltip: "この特性を持つ$pop_group_unit$ £pop£ §HPOP§!ごとに、 §Y$MOD_COUNTRY_EDICT_FUND_ADD$§!が§G+0.25§!増加する。"
 trait_ductile: "延性"
 trait_ductile_desc: "§Lこの種族は、 再利用可能な合金化合物を生成するよう設計されている。§!\n"
 # Volcanic World
 pc_volcanic: "火山型惑星"
 pc_volcanic_plural: "火山型惑星"
 pc_volcanic_desc: "硫黄に富む大気と部分的に液状化した岩石圏をもつ岩石惑星。 表面は火山灰と玄武岩に覆われ、 新たな火山活動や溶岩の湖と河川が点在している。 存在するとしても、 極限環境微生物しかいないだろう。"
 mod_pc_volcanic_habitability: "火山型惑星の居住性"
 mod_pc_volcanic_max_districts_add: "最大区域数 ($pc_volcanic$)"
 concept_pc_volcanic: "$pc_volcanic$"
 concept_pc_volcanic_desc: "- $mod_planet_jobs_alloys_produces_mult$：§G+5%§! \n\n§L$pc_volcanic_desc$§!"
 district_geothermal: "地熱発電所"
 district_geothermal_plural: "地熱発電所"
 district_geothermal_desc: "惑星内部に渦巻く熱を利用し、 植民地にエネルギーを供給する。"
 district_melting: "マグマ導管"
 district_melting_plural: "マグマ導管"
 district_melting_desc: "一連の電磁ふるいが、 惑星のマグマ流から貴重な鉱物を抽出する。"
 district_melting_uncapped: "$district_melting$"
 district_melting_uncapped_plural: "$district_melting_plural$"
 district_melting_uncapped_desc: "$district_melting_desc$"
 mod_district_melting_max: "最大$district_melting_plural$"
 district_polytechnic: "熱工学フォーラム"
 district_polytechnic_plural: "熱工学フォーラム"
 district_polytechnic_desc: "学際的な協力と教育の拠点であり、 植民地が惑星の地質的ダイナミズムを管理する助けとなる。"
 mod_district_polytechnic_max_add: "最大$district_polytechnic_plural$"
 thermotechnic_default: "補助センター"
 thermotechnic_hive: "シナプス・クラスター"
 thermotechnic_machine: "補助拠点"
 melt_extractor: "$job_melt_extractor$"
 job_melt_extractor: "熱錬工"
 job_melt_extractor_plural: "熱錬工"
 job_melt_extractor_desc: "極端な高熱にも慣れ親しんでいるこの労働者は、 鉱物を融合させ有用な新合金を鍛え上げる技術に長けている。"
 mod_job_melt_extractor_add: "$job_melt_extractor$の職業枠"
 job_melt_extractor_effect: "£job_miner£ $job_melt_extractor_plural$は £minerals£ §Y$minerals$§!を産出する"
 melt_extractor_drone: "$job_melt_extractor_drone$"
 job_melt_extractor_drone: "熱錬ドローン"
 job_melt_extractor_drone_plural: "熱錬ドローン"
 job_melt_extractor_drone_desc: "極端な高熱に耐えるよう造られたこのドローンは、 鉱物を融合させ有用な新合金を鍛え上げるよう設計されている。"
 mod_job_melt_extractor_drone_add: "$job_melt_extractor_drone$の職業枠"
 job_melt_extraction_drone_effect: "£job_mining_drone£ $job_melt_extractor_drone_plural$は £minerals£ §Y$minerals$§!を産出する"
 job_polytechnic_mentor: "熱工学メンター"
 job_polytechnic_mentor_plural: "熱工学メンター"
 job_polytechnic_mentor_desc: "多様な技能経歴をもつこの指導者は、 分野間の隔たりを埋めることで、 専門職の効率を高める。"
 mod_job_polytechnic_mentor_add: "$job_polytechnic_mentor$の職業枠"
 job_polytechnic_mentor_effect: "£job_polytechnic_mentor£ $job_polytechnic_mentor_plural$は他の職業によって強化される。\n\n$job_polytechnic_job_tt$"
 concept_polytechnic_mentor: "$job_polytechnic_mentor_plural$"
 concept_polytechnic_mentor_desc: "$pop_group_unit$ £pop£ §HPOP§!ごとに追加で生産される資源\n(上限：カテゴリーごとに§Y4000§! £job£ の職業枠)：\n- £job_miner£ ['concept_planet_miners']：§G+$@polytechnic_output$§! £unity£ $unity$\n- £job_technician£ ['concept_planet_technician']：§G+$@polytechnic_output$§! £physics_research£ $physics_research$\n- £job_foundry£ ['concept_planet_metallurgists']：§G+$@polytechnic_output$§! £engineering_research£ $engineering_research$\n- £job_artisan£ ['concept_planet_artisans']：§G+$@polytechnic_output$§! £society_research£ $society_research$"
 job_polytechnic_job_tt: "$concept_polytechnic_mentor_desc$"
 job_polytechnic_drone: "火砕ドローン"
 job_polytechnic_drone_plural: "火砕ドローン"
 job_polytechnic_drone_desc: "多様な技能的背景をもつこのドローンは、 分野間の隔たりを埋めることで、 専門職の効率を高める。"
 mod_job_polytechnic_drone_add: "$job_polytechnic_drone$の職業枠"
 job_polytechnic_drone_effect: "£job_polytechnic_drone£ $job_polytechnic_drone_plural$は他の職業によって強化される。\n\n$job_polytechnic_job_tt$"
 concept_polytechnic_drone: "$job_polytechnic_drone_plural$"
 concept_polytechnic_drone_desc: "$concept_polytechnic_mentor_desc$"
 # Origin - Red Giant
 origin_red_giant: "赤色巨星"
 origin_red_giant_desc: "この文明はいま岐路に立たされている。 星系の中心にある赤い巨星が惑星を加熱し、 彼らを生きたまま焼き尽くそうとしているのだ。\n\n原因が突き止められ解消されるまで適応しようとするのか、 それともこの奇妙で、 あるいは不自然ともいえる変化を受け入れ、 熱を糧とする道を選ぶのだろうか。"
 origin_tooltip_red_giant_effects: "- $HOMEWORLD$ ['concept_pc_volcanic'] (規模：£planetsize£ 20)"
 START_SCREEN_RED_GIANT: "真実はゆっくりと、 そして一気に明らかになった。\n\n我々の星は急速かつ異常な進化の段階に入りつつある。 そのエネルギー放出量はあらゆる予測値を超えて上昇した。 スペクトルの変化は不規則な対流パターンを示しており、 質量の減少を伴わないまま核融合速度が増加しているように見える。\n\nこれまでは、 この温暖化に歩調を合わせて進化してきた。 だが、基本的な生物学的進化には限界がある。\n\n[capital_star.GetName]の内部で進行している変化が続けば、 我らが故郷と呼ぶこの惑星は焼き尽くされるだろう。 もはやこれは起きるかどうかではなく、 「いつ」起きるかの問題だ。"
 red_giant_start_NAME: "赤色巨星の星系"
 red_giant_start_DESC: "これは§Y$origin_red_giant$§!の起源を使用する帝国に保証された開始星系である。"
 tech_starfire_cannon: "$starfire_cannon$"
 tech_starfire_cannon_desc: "潜在的な危険と同様に、 我々の恒星の変貌によって生じる危険な放射線も、 有用な道具として利用することができる。 それをビーム兵器として発展させれば、 敵艦を過熱して無力化することが可能となるだろう。\n\n軌道上に§Y$starfire_cannon$§!を建造する惑星ディシジョンをアンロックする。"
 SOLARFLARE_EMITTER: "ソーラーフレア放射器"
 SOLARFLARE_EMITTER_DESC: "最強の防御さえも貫き、 脆弱な艦船システムを無力化する強力なエネルギー光線。"
 starfire_cannon_cap: "$starfire_cannon$"
 starfire_cannon: "スターファイアキャノン"
 starfire_cannon_plural: "スターファイアキャノン"
 NAME_Starfire_Cannon: "$starfire_cannon$"
 starfire_cannon_key: "$starfire_cannon$コア"
 sfe_on_hit_stun_tt: "標的を§G5§!日間§Y無力化§!し、 速度、 発射速度、 シールドを低下させる。\n\n$ION_CANNON_FLEET_EFFECT$"
 sfe_weapon_stun_effect: "§R$starfire_cannon$の影響§!"
 sfe_weapon_stun_effect_desc: "   " # not visible
 decision_starfire_cannon: "$starfire_cannon$の建造"
 decision_starfire_cannon_desc: "急速に老化する赤色巨星の激しい放射を模倣し、 この軌道砲は超高熱のイオン化光線を投射する。 この光線は標的に損傷を与えるだけでなく、 艦船のパーツを焼き切ることで運行不能状態にする。"
 decision_starfire_cannon_effects: "惑星の軌道上に、 複数の艦船のシステムを無力化できる長射程兵器である§Y$starfire_cannon$§!を建造する。"
 decision_starfire_cannon_limit: "$TRIGGER_FAIL$システム上限：§Y3§!"
 # Origin - Cosmic Dawn
 origin_cosmic_dawn: "宇宙の黎明"
 origin_cosmic_dawn_desc: "この文明は興隆したのではなく、 解き放たれたのだ。 冷凍睡眠ポッドが解除されると、 彼らはもはやどのくらいの時間が経ったかわからないほど変わり果てた惑星で目覚めた。 しかし、 すべてが失われたわけではない。 銀河に散らばる塵と廃墟の下に、 彼らの過去はなお息づいており、 再発見される時を待っている。"
 origin_tooltip_cosmic_dawn_effects: "- $HOMEWORLD$ $TABBED_NEW_LINE$- ['concept_pc_volcanic'] (規模：£planetsize£ 14) $TABBED_NEW_LINE$- ['concept_inf_cd_deposit']：+5\n次の状況から開始：§H深層発掘§!"
 origin_tooltip_cosmic_dawn_negatives: "- $INITIAL_POPS$ §R-600§!"
 START_SCREEN_COSMIC_DAWN: "我々は、 眠りについていたことすらかすかに感じる程度の意識で目覚めた。 今なお、 かつての時代の最も強い痕跡は、 我々自身の記憶ではなく、 停滞状態で保存していた複雑なテクノロジーの中にある。\n\n数千、 数万に及ぶポッド、 巨大な熱交換システム、溶融した岩をかき回す大釜。 こうしたむき出しの機構の向こうに、 我々の起源を示す手掛かりが壁に刻まれていた。 恒星に温もりを求め、 冷えゆく惑星から散っていった艦隊の姿である。 答えを求め、 我々はこの地下の「誕生の間」を後にした。 §Y[owner.Capital.GetName]§!の地表全域にわたり、 我々は有用なテクノロジーと資源を発見した。 さらに惑星の地殻に抱かれるように存在する施設の痕跡も見つかった。 そのいくつかには、 我々が同胞として迎えるかもしれない者たちが眠っている。\n\nそして星々はどうだろうか。 我々のように、 まだ眠っている者たちがいるのだろうか。 もし存在するならば、 彼らこそが我々の最も切実な問い——「我々は何者なのか」に答える助けとなるかもしれない。"
 cosmic_dawn_start_NAME: "新たな故郷"
 cosmic_dawn_start_DESC: "これは起源「$origin_cosmic_dawn$」を使用する際の開始星系である。"
 concept_inf_cd_deposit: "$d_stasis_pods$"
 concept_inf_cd_deposit_desc: "産出：£society_research£ 3.0\n除去時：\n$d_stasis_pods_tt$ \n\n§L$d_stasis_pods_desc$§!"
 cosmic_dawn_districtsize: "$MOD_PLANET_MAX_DISTRICTS_ADD$：§G+1§!"
 cosmic_dawn_districtsize2: "$MOD_PLANET_MAX_DISTRICTS_ADD$：§G+2§!\n   $d_cd_ancient_tunnels$§G+2§!"
 cosmic_dawn_tunnel_foundry: "$d_cd_ancient_tunnels$あたりの$foundry_jobs_bonus_workforce_mult$：§G+1%§!"
 cosmic_dawn_tunnel_bureaucrat: "$d_cd_ancient_tunnels$あたりの$bureaucrat_jobs_bonus_workforce_mult$：§G+1%§!"
 cosmic_dawn_tunnel_researcher: "$d_cd_ancient_tunnels$あたりの$researcher_jobs_bonus_workforce_mult$：§G+1%§!"
 cosmic_dawn_tunnel_worker: "$d_cd_ancient_tunnels$あたりの$mod_pop_cat_worker_bonus_workforce_mult$：§G+1%§!"
 d_stasis_pods: "£blocker£ 古代の冷凍睡眠ポッド"
 d_stasis_pods_desc: "これらの冷凍睡眠ポッドは、 失われた我々の同胞が残した古代の装置であり、 先進的な低温テクノロジーを用いて個体を休眠状態に保っている。 適切なテクノロジーがあれば、 彼らを目覚めさせることができるかもしれない。"
 d_stasis_pods_tt: "[GetStasisPodOwner]"
 d_stasis_pods_tt_inf: "- §G100§! £pop£ $POPS$が生成される\n- $MOD_PLANET_MAX_DISTRICTS_ADD$：§G+1§!"
 d_stasis_pods_tt_other: "- £society_research£ §Y$society_research$§!を獲得：§G+350§!\n- $MOD_PLANET_MAX_DISTRICTS_ADD$：§G+1§!"
 d_cd_ancient_tunnels: "古代のトンネル"
 d_cd_ancient_tunnels_desc: "かつては多数の生体停止チャンバーを収めるために使われていたが、 いまでは空となったこの広大なトンネルは、 新たな居住空間を提供する。"
 d_galvanic_living_metal: "$sr_living_metal$堆積物"
 d_galvanic_living_metal_desc: "この惑星には天然の$r_living_metal$鉱床が存在する。 惑星に住む種族はこの魅力的な資源と常に接触しながら進化してきたため、 独自の生物学的、 科学的な軌跡を歩むこととなった。"
 # Civic - Scorched World Heralds
 civic_scorched_earth: "灼熱惑星の使徒"
 civic_scorched_earth_desc: "熱はこの社会の文化のあらゆる側面に浸透しており、 伝統や儀式からテクノロジーに至るまで影響を及ぼしている。 彼らは自らを銀河における正当な炎の至上主義者と見なし、 弱き種族を、 好熱種族にのみふさわしい理想の宇宙へ至る道に立ちはだかる障害にすぎないと考えている。"
 civic_scorched_earth_effects: "- §Y$trait_infernal_plural$§!以外との§Y外交§!は行えない。\n- §Y銀河市場§!は利用できない。\n- 他種族に対して§Y「$casus_belli_cb_blaze$」§!の開戦事由を得る。\n- 爆撃方針「§Y$bombardment_firestorm$§!」を使用すると、 £unity£ §Y$unity$§!を獲得する。\n- 爆撃方針「§Y$bombardment_seismic_bombing$§!」を使用すると、 惑星上に特殊な障害物を生成する\n- 非['trait:trait_infernal']種族は§Y奴隷§!以下に制限される。"
 SCORCHED_HERALDS_ONLY_INF: "$TRIGGER_FAIL$§Y$civic_scorched_earth$§!は、 その社会では['trait:trait_infernal'] £pop£ $POPS$しか許容しない。"
 civic_hive_scorched_earth: "発火本能"
 civic_hive_scorched_earth_desc: "我々の灼熱惑星は惑星進化の頂点である。 我々は銀河を炎に包み、 その炎の中でこそ繁栄するのだ！"
 # Civic - World Forgers
 civic_world_forgers: "惑星構築者"
 civic_world_forgers_desc: "この社会は火山環境で繁栄する。 火山環境が自然に形成されなければ人工的に作り出すことさえある。"
 civic_world_forgers_effects: "- 開始惑星をアンロック：['concept_pc_volcanic']。\n- $GUARANTEED_RESEARCH_OPTION_STRING$ £society_research£ ['concept_volcanic_forge']。\n- 建造物 £building£ §Y$building_volcanic_forge_1$§!を建設でき、 £job_polytechnic_mentor£ ['concept_polytechnic_mentor']を追加する。\n- £building£ §Y$building_volcanic_forge_1$§!を有する惑星は、 徐々に§Y$pc_volcanic$§!へと変化する。\n- ['concept_guaranteed_colonies']は§Y$climate_dry$§!惑星となる。"
 civic_corporate_world_forgers: "惑星建築家"
 civic_corporate_world_forgers_desc: "$civic_world_forgers_desc$"
 civic_hive_world_forgers: "火山の巣作り"
 civic_hive_world_forgers_desc: "$civic_world_forgers_desc$"
 civic_world_forgers_gestalt_effects: "- 開始惑星をアンロック：['concept_pc_volcanic']。\n- $GUARANTEED_RESEARCH_OPTION_STRING$ £society_research£ ['concept_volcanic_forge']。\n- 建造物 £building£ §Y$building_volcanic_forge_1$§!を建設でき、 £job_polytechnic_drone£ ['concept_polytechnic_drone']を追加する。\n- £building£ §Y$building_volcanic_forge_1$§!を有する惑星は、 徐々に§Y$pc_volcanic$§!へと変化する。\n- ['concept_guaranteed_colonies']は§Y$climate_dry$§!惑星となる。"
 civic_machine_world_forgers: "熱最適化担当官"
 civic_machine_world_forgers_desc: "$civic_world_forgers_desc$"
 tech_volcanic_forge: "火山鍛造所"
