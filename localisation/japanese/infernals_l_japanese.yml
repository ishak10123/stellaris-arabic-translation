 volcanic_hollow_planet: "空洞惑星"
 volcanic_hollow_planet_desc: "地表の下には巨大な空洞が残されており、 炎に形づくられた惑星の虚ろな残響がこだましている。"
 volcanic_lavafall: "溶岩滝"
 volcanic_lavafall_desc: "自由に流れる溶岩が、 急斜面を越えて流れ落ちる自然の火焔ショーを繰り広げている。"
 volcanic_oasis: "地獄のオアシス"
 volcanic_oasis_desc: "高山地帯に守られた、 小さく緑豊かな大陸。 山脈の向こうの荒れ狂う炎獄とは対照的に、 独特の動植物が息づいている。"
 fractalized_entropy_category: "フラクタル化したエントロピー"
 fractalized_entropy_category_desc: "センサーが小惑星帯を漂う奇妙な物体を探知した。 その起源は不明だが、 進路は安定しており、 捕らえて調査可能と考えられる。"
 infernals.3205.name: "フラクタル化したエントロピー"
 infernals.3205.desc: "[Leader.GetName]は、 恒星の安定軌道上に浮かぶ硬質で角張った構造物を発見したと報告した。 未知の物質で構成され、 結晶構造を思わせる多面体の平面を持つこの物体は、 どんな組成分析も受けつけなかった。 それは一定の向きを保ち続け、 恒星に常に正対し、 操作や回転を試みるあらゆる試行に耐えたのだ。\n\n制御実験の最中、 調査船は対象物に集束したエネルギーパルスを照射した。 すると構造物は見事に割れ、 左右対称の二つの半身へと分裂し、 それぞれが元の構造物の縮小した複製へと再構成された。 その後のパルス照射でも同じ結果が生じた──分裂、 複製、 そして一貫した小型化である。\n\n最終的に、 軌道上に微小な構造物の拡散雲が安定して広がった。 各断片は元の構造物とまったく同じ配列と幾何学を保持し、 群体全体が元の構造物のシルエットを映し出していた。\n\nこの現象には前例も説明も存在しない。 収集されたテレメトリデータはすべて、 さらなる解析のために保存されている。"
 infernals.3205.a: "断片を保存し、 監視せよ。"
 # Archaeological Sites
 from_the_ashes_site: "灰の中から"
 from_the_ashes_site_desc: "[Planet.GetName]の地表は灼熱に包まれ、 生物の生存を拒んでいる。 それにもかかわらず、 明らかに人工的な遺跡の映像が撮影され、[GetScientistPlural]の注目を集めた。 考古学的調査によって、 かつてここに存在した者たちと、 彼らに何が起きたのかが明らかになるかもしれない。"
 infernals.2700.name: "忘れられた帝国"
 infernals.2700.desc: "[From.Planet.GetName]の遺跡は当初、石造りに見えた。 しかし発掘と分析の結果、 この失われた都市の多くの構造物は、 木材に似た有機物が石化したものであることが示唆されている。 現在この惑星には、 そうした素材の痕跡は存在しない。 小規模な遺物は粗製の金属やガラス、 同様に石化した有機生命体で作られており、[GetScientistPlural]はすでに絶滅した在来生物の化石も発見した。\n\nこの文明は、 この惑星の気候がはるかに温暖であった時代に栄えていたようだ。 彼らは惑星が現在の状態に変わるよりもはるか以前に姿を消したのか、 それとも最期の年月にこの激変を目の当たりにしたのだろうか？"
 infernals.2705.name: "滅びの証人"
 infernals.2705.desc: "[From.Planet.GetName]の廃墟都市の発掘により、 文化的に重要と思われる場所が明らかになった。 そこは精緻な模様で装飾されており、 それは文字言語である可能性がある。 さらに驚くべきことに 、発掘隊は地下の広間を発見した。 そこには棚が並び、 それぞれに青銅製の薄板が収められて、 緻密に刻まれた文字で覆われていた。 青銅は記録媒体として効率的でないが、 ここは共同の文書保管庫として使われていたらしい。\n\n都市のさらなる調査が進むなかで、 翻訳の試みが開始された。 この人々が最後にどのような運命をたどったのかは、 いまだ答えが見つかっていない。"
 infernals.2710.name: "迫り来る終焉"
 infernals.2710.desc: "[From.Planet.GetName]の調査隊は、 陰鬱な共同墓地を発見した。 それは掘り抜かれた壕の網目で構成されており、 壁の窪みにミイラ化した異星人の遺骸が3～4体ずつ積み重ねられていた。 副葬品には原始的な火器や単純なガラス製望遠鏡、 精巧な刺繍が施された織物などが含まれており、 彼らの技術水準の一端をうかがわせる。\n\n共同墓地の多くの分岐点には、 すでに絶滅した在来動物の像が守護者のように置かれていた。 それらの生物は丸みを帯びた半球状の甲羅を持ち、 4本の短い脚と小さく丸い頭をしていた。 保存状態の良い像では、 身を縮めて甲羅で身を覆い、 頭上の素材に刻まれた炎のような彫刻から身を守る姿が描かれている。\n\nこの芸術作品の真の意味は時の流れに失われたのかもしれないが、 それはこの社会が差し迫った火焔の終焉を自覚していたことを示唆している可能性がある。 さらなる遺跡の発掘が、 彼らが何を経験していたのかを明らかにするだろう。"
 infernals.2715.name: "灼炎の没落"
 infernals.2715.desc: "[From.Planet.GetName]の廃墟都市の広範な調査により、 この文明が生態系の崩壊を経験し、 自らの最期が炎に包まれることを予見していたことが明らかになった。 当初は紙媒体の記録が存在したが、 火山灰の降下によって青銅板へと切り替えられたようだ。 動物が炎から身を隠す姿を描いた芸術作品には、 彼らが自らの終末を受け止めようとした試みが記録されている。\n\n発掘ではまた、 共同墓地の守護像のほぼ完全な標本も見つかった。 像の上に刻まれた炎は内部から輝きを放ち、 保存に値する印象的な作品となっている。\n\nさらに、 火山活動を止めようとした痕跡も発見された。 道路や壊れた荷車は、 住民が瓦礫を運んで近くの火山カルデラに投棄し、 火口を塞ごうとしたことを示している。 しかし彼らは運命を阻止することはできなかった。 この惑星に、 今は多細胞生物は存在しない。\n\nこの歴史は、 文明が自らの手に余る力に直面したとき、 その存続がいかに危ういかを我々に思い出させる。"
 infernals.2715.a: "悲劇的な結末だ。"
 infernals.2715.b: "彼らの過ちから学ばなければならない。"
 inferno_temple_site: "業火の神殿"
 inferno_temple_site_desc: "[Planet.GetName]の人口集中地から遠く離れた、 活発な火山山脈の中に、 古代の神殿が荒廃した姿で横たわっている。 その歴史を理解することで、 この惑星の地域文化についてさらなる洞察が得られるかもしれない。"
 infernals.2720.name: "古代の痕跡"
 infernals.2720.desc: "神殿そのものには戦闘の痕跡が刻まれており、 土壌からは在来の知的種族の古代遺骸が見つかっている。 神殿は焼き払われ、 放棄されたようだ。 警備隊の報告によれば、 現地住民はこの一帯を呪われた地と信じ、 近づこうとしないという。\n\n火焔神殿の壁が内部を守ったおかげで、 そこには精緻なフレスコ画や彫刻が数多く残されていた。 それらには、 中央に暗い裂け目を持つ、 うねる炎の環が繰り返し描かれている。 ある図像では、 二足歩行の姿をしたなにかが4つの目のようなものの1つを抉り取り、 惑星へと投じる姿が描かれており、 それがこの中心的な意匠を形作っている。 我々はこれを「煉獄の眼」と呼称することにした。\n\nさらなる発掘調査によって、 この奇怪な存在をめぐる信仰が明らかになるだろう。"
 infernals.2725.name: "眼への供物"
 infernals.2725.desc: "「煉獄の眼」の神殿の発掘調査により、 多数の犠牲の痕跡が明らかとなった。 中央に台座を備えた大きな円形の穴があり、 「煉獄の眼」とその瞳孔を模した形状になっている。 これらの穴は、 何層もの灰と木炭で埋まっていた。 分子分析の結果、 この灰と木炭は動物組織に由来することが判明した。\n\nこれらの犠牲が野生動物であったのか、 家畜であったのか、 あるいは現地住民そのものだったのかは断定できない。\n\n我々はこの人口集中地に関連証拠を求めて工作員を派遣するとともに、 発掘隊によるさらなる調査を続けている。"
 infernals.2725.a: "この謎を解き明かさねば！"
 infernals.2725.b: "ドローンを派遣し、 謎を解明せよ。"
 infernals.2730.name: "暗黒の儀式"
 infernals.2730.desc: "神殿の最奥を塞ぐ重厚な石の扉が発見された。 そこを突破した発掘隊は、 中央に穴が開いた円形の間を見つけた。 その穴は天然の地下マグマ溜まりに直結しており、 橙色の光が壁を赤く染め上げ、 奇妙な部屋を囲む碑文をほのかに照らし出していた。 壁の上部には明るく燃え盛る眼がいくつも並んでいた。\n\n穴の縁には、 「煉獄の眼」を模した祭壇の上で引き裂かれた現地住民の干からびた遺骸が残されていた。 どうやら彼らは、 自らの同胞を犠牲に捧げて眼を鎮めようとしていたようだ。\n\nこの壁に刻まれた碑文は、 この神殿が文化において果たしていた役割を理解するうえで極めて重要であり、 直ちに翻訳すべきである。"
 infernals.2735.name: "蠢く予言"
 infernals.2735.desc: "神殿最奥に残された聖典の最終的な研究により、 「煉獄の眼」の再臨に関する一連の予言が明らかになった。 それは、 従わぬ者に怒り狂う煉獄の眼について語っている。 報復として、 眼は空を暗黒に覆い、 ある聖なる山を噴火させ、 特定の作物を枯れさせるなどの災厄を引き起こすとされる。 予言はこれを文明の終焉と位置づけ、 これらの災厄の後には、 煉獄の眼に服従した者だけが生き残ると記されている。\n\n現地住民の間に潜入している我々の工作員は、 文化的な関連性を調査した結果、 この予言文書がこの惑星の文化における多くの格言や言い回しの源であり、 後世の物語や神話の原典ともなっていることを突き止めた。 さらに彼らは、 現代の神殿で行われている秘儀には、 この古代の予言のバリエーションや予言への反発が取り入れられているとも考えている。\n\n予言された出来事は、 どれも我々のテクノロジーによって再現可能であり、 見抜けないほど精巧に偽造することもできる。 もし我々が「煉獄の眼」の再来を装い、 原初の予言が正しかったことを示せば、 彼らから譲歩と忠誠を引き出すことができるだろう。 それは長期的に見て、 彼らを取り込むことを容易にするはずだ。"
 infernals.2735.a: "予言を再現せよ。"
 infernals.2735.a.tt: "§Y[From.Planet.GetName]§!の原始文明は、 我々の志向を受け入れることになるだろう。"
 infernals.2735.a.fail: "§Y$interference_not_allowed$§!の政策を選択していない。"
 infernals.2735.b: "介入するな。"
 infernals.2735.c: "彼らの歴史は永遠に失われた。"
 infernal_figurine: "煉獄の偶像"
 infernal_figurine_desc_short: "半球状の甲羅と4本の短い脚を持つずんぐりした生物が、 様式化された炎の彫刻の下で身をかがめている"
 infernal_figurine_desc_details: "その炎は深紅に輝く未知の鉱物から刻み出されている。 この遺物は滅亡した文明の共同墓地から発掘されたものであり、 迫り来る火山による生物圏の破壊を生き延びようとする、 彼らの空しい願望を象徴していたのかもしれない。"
