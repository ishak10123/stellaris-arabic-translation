 job_fe_xeno_ward_desc: "これらの被検体は、 混沌として破壊的な銀河からの保護対象として、 生まれた環境に似せて作られたこの場所に集められた。"
 mod_job_fe_xeno_ward_add: "$job_fe_xeno_ward$の職業枠"
 job_fe_xeno_keeper: "異星人飼育員"
 job_fe_xeno_keeper_plural: "異星人飼育員"
 job_fe_xeno_keeper_desc: "保護された異星種族たちの面倒を見ている、 先駆種族の飼育員。"
 mod_job_fe_xeno_keeper_add: "$job_fe_xeno_keeper$の職業枠"
