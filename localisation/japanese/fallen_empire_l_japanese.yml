 ### FE Civics
 civic_antediluvian_mind: "長老の意識"
 civic_antediluvian_mind_desc: "時はこのゲシュタルト意識に優しくなかった。 生存への飽くなき欲望を抱いて以来、 時間バブル内で長く過ごしたせいで意識が鈍くなったのだ。"
 civic_sluggish_drones: "無向ドローン"
 civic_sluggish_drones_desc: "落ち着いた雰囲気の監督意識がほとんど圧力をかけてこないので、 この帝国のドローンはゆっくりとタスクを遂行しながらも、 ほぼ無気力であるように見える。"
 ### FE Buildings
 building_fe: "没落した帝国の建造物"
 building_ancient_control_center: "古代の制御センター"
 building_ancient_control_center_desc: "リングワールドの古代の制御センターは、 機械的ドローン軍団のたゆまぬ努力にもかかわらず、 ほとんど機能していない。"
 building_ancient_palace: "古代の宮殿"
 building_ancient_palace_desc: "この巨大な宮殿のような建造物は過ぎ去った時代の証である。 その光輝く壁面は時間の経過に屈することを拒んでいるように見えるが、 別棟の多くは修理の必要な状態で放置されたままである。"
 building_ancient_hive_capital: "由緒あるニュークレアス"
 building_ancient_hive_capital_desc: "集合意識が支配していたこの古代集合体は、 無数の世代のドローンが勤勉に指令を実行してきた場所だ。"
 building_affluence_emporium: "富の中心地"
 building_affluence_emporium_desc: "このセンターは高度調達アルゴリズムを用いて物質的要求を予測および遂行し、 人々が自身の欲求に気付く前に人々を満足させる。"
 building_affluence_center: "富裕センター"
 building_affluence_center_desc: "このセンターはあらゆる突飛な欲求を即座に、 そして難なく実現する。"
 building_nourishment_complex: "栄養物施設"
 building_nourishment_complex_desc: "複製技術により、 指令を受けると即座に新しい味が創り出される。"
 building_nourishment_center: "栄養物センター"
 building_nourishment_center_desc: "考えうるあらゆる味がこの施設内で複製可能である。"
 building_dimensional_replicator: "次元複製器"
 building_dimensional_replicator_desc: "この製造機の技術はエネルギーから物質への完全な転換を実現する。"
 building_dimensional_fabricator: "次元ファブリケーター"
 building_dimensional_fabricator_desc: "この高度な製造機はスムーズに時空間トンネルを開き、 貴重な資源を回収する。"
 building_class_3_singularity: "第3級時空特異点"
 building_class_3_singularity_desc: "この特異点から放出される全エネルギーを捕捉することは、 工学の粋の極みである。"
 building_class_4_singularity: "第4級時空特異点"
 building_class_4_singularity_desc: "この特異点の出力は物理学の法則に反するものだが、 それでも抑制フィールドは絶対的安定性で持ちこたえている。"
 building_micro_forge: "超級鋳造所"
 building_micro_forge_desc: "この鋳造所の生産速度には、 投入される資源の数量による制限しかない。"
 building_nano_forge: "自動溶鉱炉"
 building_nano_forge_desc: "この鋳造所の拡張ナノ複製機ベイが、 驚異的な効率で原材料を最先端の合金に変換する。"
 building_fe_sky_dome: "上空ドローン"
 building_fe_sky_dome_desc: "最新の反重力技術を動力とするこの浮遊都市は、 住民たちにのどかな安息の地を提供する。"
 building_fe_dome: "最高天のドーム"
 building_fe_dome_desc: "重力の無力化によって浮遊するこれらのドームは物理的制約を超越している。 一方、 高度な生命維持システムは住民たちの需要に円滑に対応する。"
 building_fe_fortress: "アスピスの砦"
 building_fe_fortress_desc: "この巨大な惑星防衛拠点は数々の兵器と何層ものシールドを有している。 専門の攻城戦軍でなければその防御を破ることはできない。"
 building_fe_stronghold: "イージス施設"
 building_fe_stronghold_desc: "この非常に大きな惑星防衛拠点は無数の兵器とシールドで防衛を行う。 惑星の山岳もその防衛力の前には崩れ去る。"
 building_master_archive: "マスター・アーカイヴ"
 building_master_archive_desc: "このアーカイブには数世代の銀河年齢分の知識が蓄えられているが、 その難解な検索システムを利用する能力は失われてしまっている。 回収されたデータごみは貴重なものである。"
 building_empyrean_shrine: "最高天の位相神殿"
 building_empyrean_shrine_desc: "シュラウドの精神体と交流するためだけに使用されるこの神殿は、 我々の次元にはごく一部しか姿を現さない。"
 building_ancient_cryo_chamber: "古代の冷凍睡眠場"
 building_ancient_cryo_chamber_desc: "膨大に連なった冷凍睡眠ポッドがこの巨大な建造物を埋め尽くしており、 遠い昔に凍結された数十億もの異星種族被験者の、 変わり果てた遺体が収容されている。"
 building_fe_administration_1: "万物を見通す行政機構"
 building_fe_administration_1_desc: "銀河規模の官僚制度に必要不可欠なこの巨大施設は、 広大な行政ネットワークに接続されている。"
 building_fe_administration_2: "全知の行政機構"
 building_fe_administration_2_desc: "この巨大施設は、 銀河規模の官僚制度の中心的存在であり、 堅牢かつ高度な行政ネットワークの調整を行っている。"
 building_fe_administration_hive_1: "エファプス・クラスター"
 building_fe_administration_hive_1_desc: "専用ドローンの入念な手入れを受けているこのエファプス・ノードのネットワークは、 広大な認知領域における集合意識の支配を強める。"
 building_fe_administration_hive_2: "エファプスの軸索"
 building_fe_administration_hive_2_desc: "専用ドローンの入念な手入れを受けているこのエファプス・ノードの巨大ネットワークは、 銀河における集合意識の意志を強める。"
 building_fe_administration_machine_1: "フラクタル調整拠点"
 building_fe_administration_machine_1_desc: "数兆個の信号を途切れることなく正確に、 ほぼ一瞬で処理および伝達する高度なフラクタル拠点。"
 building_fe_administration_machine_2: "量子調整拠点"
 building_fe_administration_machine_2_desc: "数千兆個の信号を正確に処理し、 一瞬で伝達する高度な量子もつれ拠点。"
 building_fe_temple_1: "天体の聖所"
 building_fe_temple_1_desc: "霊的技術の最新の進歩により、 信者に神聖な存在と直接交流する力が与えられる。"
 building_fe_temple_2: "天体の大聖堂"
 building_fe_temple_2_desc: "超能力的説教のための霊的技術を使用すれば、 精神的共鳴が増幅される。 この巨大建造物は、 礼拝者が星系規模で神聖な存在と深い交流をすることを可能にする。"
 building_fe_assembly_1: "ロボット製造結合体"
 building_fe_assembly_1_desc: "専門のロボット研究家が配置されている斬新な製造施設。 この施設は従来の制約を超越しており、 ロボティクスの最前線における革新を余すことなく実現する。"
 building_fe_assembly_2: "ロボット量子生産拠点"
 building_fe_assembly_2_desc: "工学の粋を集めたこの施設の量子製造ラインは、 超極小の機械パーツを製造するために量子もつれ転換器を使用している。 原子の一つとて配置を誤ることはない。"
 building_fe_clinic_1: "分子再活性化機関"
 building_fe_clinic_1_desc: "分子再活性化機関は医学的治療の効力を高めるため、 細胞レベルでの精密な検査を行う。 これにより人々の健康の質と寿命が大幅に改善される。"
 building_fe_clinic_2: "生体再生機関"
 building_fe_clinic_2_desc: "医療技術の頂点に立つ生体再生機関は、 画期的な生体再生治療の先駆者であり、 延命処置の限界を再定義し続けている。"
 building_fe_security_1: "司法施設"
 building_fe_security_1_desc: "この巨大な司法施設は裁判所と法執行機関を円滑に結びつけている。"
 building_fe_security_2: "司法のジグラット"
 building_fe_security_2_desc: "法機関の頂点に君臨するこの超巨大施設は司法の代表的存在であり、 裁判所、 留置所、 矯正施設を有し、 どんなに面の皮の厚い犯罪者にも罪を償わせる。"
 building_fe_market_1: "銀河商取引拠点"
 building_fe_market_1_desc: "スカイラインを支配するこの高くそびえる塔は、 眼下で賑わっている商業区域に影を落としている。"
 building_fe_market_2: "星間商取引結合体"
 building_fe_market_2_desc: "銀河経済の絶対的頂点に君臨する、 この商業区域の巨大な塔は軌道上からも目視することができる。"
 building_fe_silo_1: "縮小宇宙補給所"
 building_fe_silo_1_desc: "分子間距離が短縮される亜空間の一部に影響を与え、 保管されているものを何でも効率よく縮小する補給所。 生物が中に入ることは禁じられている。"
 building_fe_silo_2: "異次元補給所"
 building_fe_silo_2_desc: "その場にポケットディメンションを創り出すことで、 ほぼ無限の資源を保持することができる。"
 building_fe_entertainment_1: "仮想天福広場"
 building_fe_entertainment_1_desc: "この巨大な娯楽区画はレクリエーションとレジャーの最前線にある。 脳波読み取り機が個別の仮想出入り口を瞬時に出現させる。"
 building_fe_entertainment_2: "万物天福結合体"
 building_fe_entertainment_2_desc: "娯楽の極みであるこの巨大結合体は従来の制約を超越しており、 人々が欲求に気付く前に夢を実現する。"
 building_fe_lab_1: "量子革新結合体"
 building_fe_lab_1_desc: "この結合体は最新設備とかつてない職員収容能力を誇り、 量子理論がただ研究されているだけでなく、 画期的な革新を起こすために利用されている時代を先導している。"
 building_fe_lab_2: "超越的革新部門"
 building_fe_lab_2_desc: "この建造物は科学的進歩の頂点であり、 この時代が無数の革新の時代であることを示している。"
 building_fe_mine_1: "量子掘削所"
 building_fe_mine_1_desc: "この掘削所はこの惑星のマントルのあらゆる場所にある鉱物を発見することができ、 量子トンネル技術を用いて、 物理的に接触することなく固形物に穴をあけることができる。"
 building_fe_mine_2: "量子掘削拠点"
 building_fe_mine_2_desc: "この掘削拠点はこの惑星の外殻にいたるまであらゆる場所にある鉱物を回収することができ、 量子トンネル技術を用いて、 物理的に接触することなく固形物または液体に穴をあけることができる。"
 ### FE Jobs
 job_fe_overseer: "監督官"
 job_fe_overseer_plural: "監督官"
 job_fe_overseer_desc: "豊かな生活を捨て、 公共への奉仕を選んだ信念ある少数者。 自分たちの古代文明の残党を管理し、 導く役割を担っている。"
 mod_job_fe_overseer_add: "$job_fe_overseer$の職業枠"
 job_fe_maintenance_bot: "管理機械"
 job_fe_maintenance_bot_plural: "管理機械"
 job_fe_maintenance_bot_desc: "リングワールドに駐在するこの古代の機械群は、 崩壊しつつある機械設備を休むことなく維持・修理しつづけている。"
 mod_job_fe_maintenance_bot_add: "$job_fe_maintenance_bot$の職業枠"
 mod_job_fe_maintenance_bot_per_pop: "$VALUE$ POPにつき$job_fe_maintenance_bot$の職業枠 §G+1§!"
 mod_job_fe_maintenance_bot_per_pop_short: "\n$VALUE$ £pop£ につき £mod_job_maintenance_drone_add£ §G+1§!"
 job_fe_guardian_bot: "守護機械"
 job_fe_guardian_bot_plural: "守護機械"
 job_fe_guardian_bot_desc: "この古代の機械群は、 すでに命を失った何十億もの知的生命体の冷凍保存された遺体を、 休むことなく守りつづけている。"
 mod_job_fe_guardian_bot_add: "$job_fe_guardian_bot$の職業枠"
 fe_hedonist: "$job_fe_hedonist$"
 job_fe_hedonist: "耽溺者"
 job_fe_hedonist_plural: "耽溺者"
 job_fe_hedonist_desc: "あらゆる物質的必要や欲求が満たされる、 非の打ち所なく贅沢な生活を送る者たち。"
 mod_job_fe_hedonist_add: "$job_fe_hedonist$の職業枠"
 job_fe_archivist: "記録者"
 job_fe_archivist_plural: "記録者"
 job_fe_archivist_effect_desc: "£job_archivist£ $job_fe_archivist_plural$は、 $r_consumer_goods$を消費して、 $r_research$を産出する"
 job_fe_archivist_desc: "「最初の司書」がはるか昔に確立した古いしきたりに従って、 いかなるデータの断片も記録し、 分類し、 索引化しなければならない。"
 mod_job_fe_archivist_add: "$job_fe_archivist$の職業枠"
 job_fe_acolyte_farm: "鋤の信者"
 job_fe_acolyte_farm_plural: "鋤の信者"
 job_fe_acolyte_farm_plural_with_icon: "£job_fe_acolyte_farm£ $job_fe_acolyte_farm_plural$"
 job_fe_acolyte_farm_desc: "かのカザルギエルが呪われた悪魔の毒尾を切り落とし、 飢饉を防いだ際に振るった気高き道具、 それこそがこの鋤という農具である……と彼らは言う。"
 job_fe_acolyte_farm_effect_desc: "£job_fe_acolyte_farm£ $job_fe_acolyte_farm_plural$は£food£ §Y$food$§!を産出する"
 mod_job_fe_acolyte_farm_add: "$job_fe_acolyte_farm$の職業枠"
 job_fe_acolyte_mine: "槌の信者"
 job_fe_acolyte_mine_plural: "槌の信者"
 job_fe_acolyte_mine_plural_with_icon: "£job_fe_acolyte_mine£ $job_fe_acolyte_mine_plural$"
 job_fe_acolyte_mine_desc: "そして強力無比なる一撃により、 聖女マザクダルはその燃える槌で「第一の亡霊」の頭蓋を真っ二つに砕き、 クリスタルへの道を開いたのだ……と彼らは信じる。"
 job_fe_acolyte_mine_effect_desc: "£job_fe_acolyte_mine£ $job_fe_acolyte_mine_plural$は£minerals£ §Y$minerals$§!を産出する"
 mod_job_fe_acolyte_mine_add: "$job_fe_acolyte_mine$の職業枠"
 job_fe_acolyte_generator: "ハイパースパナの信者"
 job_fe_acolyte_generator_plural: "ハイパースパナの信者"
 job_fe_acolyte_generator_plural_with_icon: "£job_fe_acolyte_generator£ $job_fe_acolyte_generator_plural$"
 job_fe_acolyte_generator_desc: "ハイパースパナのことも忘れるなかれ。 世界が闇に包まれしとき、 輝けるバザッグはそれを用いて太陽を手懐けた……のだそうだ。"
 job_fe_acolyte_generator_effect_desc: "£job_fe_acolyte_generator£ $job_fe_acolyte_generator_plural$は£energy£ §Y$energy$§!を産出する"
 mod_job_fe_acolyte_generator_add: "$job_fe_acolyte_generator$の職業枠"
 job_fe_acolyte_artisan: "作業場の信者"
 job_fe_acolyte_artisan_plural: "作業場の信者"
 job_fe_acolyte_artisan_desc: "そしてアズナカは信徒たちに言われた。 「作業場に赴け。 さすれば、 汝らが望む未来をその手で形作ることができよう」"
 job_fe_acolyte_artisan_effect_desc: "£job_fe_acolyte_artisan£ $job_fe_acolyte_artisan_plural$は£consumer_goods£ §Y$consumer_goods$§!を産出する"
 mod_job_fe_acolyte_artisan_add: "$job_fe_acolyte_artisan$の職業枠"
 job_fe_protector: "守護者"
 job_fe_protector_plural: "守護者"
 job_fe_protector_desc: "大多数の人々が安心して体を休め、 贅沢な生活を享受できるように、 この荒くれ者たちは自分たちに害をなす連中に対し寝ずの番をしているのである。"
 mod_job_fe_protector_add: "$job_fe_protector$の職業枠"
 job_fe_augur: "シュラウドの預言者"
 job_fe_augur_plural: "シュラウドの預言者"
 job_fe_augur_desc: "それは語るが、 言葉によってではない。 なんらかの意味をそこに見出すには、 狂気の縁に立たねばならない。"
 mod_job_fe_augur_add: "$job_fe_augur$の職業枠"
 job_fe_sky_cardinal: "天空の枢機卿"
 job_fe_sky_cardinal_plural: "天空の枢機卿"
 job_fe_sky_cardinal_desc: "そして天空こそが未来の生まれる場所であった。 その光は目を眩ませるほどであったが、 少数の者はその向こう側を見通すことができた。 その者たちは、 他の者を未来へと導く役目を引き受けたのである。"
 mod_job_fe_sky_cardinal_add: "$job_fe_sky_cardinal$の職業枠"
 job_fe_xeno_ward: "保護された異星種族"
