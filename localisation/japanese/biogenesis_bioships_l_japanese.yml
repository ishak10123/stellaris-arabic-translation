 BIO_ARMOR_1: "$NANOCOMPOSITE_CARAPACE$"
 BIO_ARMOR_1_DESC: "この高度な生体装甲は弾力性のある有機組織とナノ構造化素材を統合し、 極度の衝撃にも耐えることのできる生きた甲殻を作り出す。 この甲殻は損傷に動的に適応し、 急速に再生することで、 生物船に比類ない防御力を与える。"
 SMALL_BIO_ARMOR_1: "小型$BIO_ARMOR_1$"
 MEDIUM_BIO_ARMOR_1: "中型$BIO_ARMOR_1$"
 LARGE_BIO_ARMOR_1: "大型$BIO_ARMOR_1$"
 tech_bio_ship_armor_2: "$tech_ship_armor_2$"
 BIO_ARMOR_2: "$CERAMO_CHITIN_CARAPACE$"
 BIO_ARMOR_2_DESC: "セラミック化合物を注入した強化キチンにより、 この生体装甲は優れた耐久性と耐熱性を実現している。 その層状構造は有機的な船体に求められる柔軟性を保ちながら、 強固な保護機能を与える。"
 SMALL_BIO_ARMOR_2: "小型$CERAMO_CHITIN_CARAPACE$"
 MEDIUM_BIO_ARMOR_2: "中型$CERAMO_CHITIN_CARAPACE$"
 LARGE_BIO_ARMOR_2: "大型$CERAMO_CHITIN_CARAPACE$"
 tech_bio_ship_armor_3: "$tech_ship_armor_3$"
 BIO_ARMOR_3: "$PLASTEEL_CARAPACE$"
 BIO_ARMOR_3_DESC: "この生体装甲は弾力性のある有機組織とプラスチール補強材を組み合わせ、 強度と柔軟性の優れたバランスを実現している。 このハイブリッド構造は物理的攻撃とエネルギーによる攻撃の両方に対して優れた防御力を発揮し、 生物船にとって信頼性の高い選択肢となる。"
 SMALL_BIO_ARMOR_3: "小型$PLASTEEL_CARAPACE$"
 MEDIUM_BIO_ARMOR_3: "中型$PLASTEEL_CARAPACE$"
 LARGE_BIO_ARMOR_3: "大型$PLASTEEL_CARAPACE$"
 tech_bio_ship_armor_4: "$tech_ship_armor_4$"
 BIO_ARMOR_4: "デュラスチール甲殻"
 BIO_ARMOR_4_DESC: "耐久性のある有機化合物を注入したこの生体装甲は、 持続的な損傷に対して優れた耐性を備えている。 ハイブリッド構造により、 生物船の柔軟性を損なうことなく、 優れた耐久性を実現する。"
 SMALL_BIO_ARMOR_4: "小型$DURASTEEL_CARAPACE$"
 MEDIUM_BIO_ARMOR_4: "中型$DURASTEEL_CARAPACE$"
 LARGE_BIO_ARMOR_4: "大型$DURASTEEL_CARAPACE$"
 tech_bio_ship_armor_5: "$tech_ship_armor_5$"
 BIO_ARMOR_5: "ニュートロニウム甲殻"
 BIO_ARMOR_5_DESC: "生物工学の驚異的な成果であるこの甲殻は、 有機組織内に中性子繊維を組み込み、 ほぼ完璧な装甲を実現している。 密度が高く、 かつ適応性のあるこの構造は、 最も破壊的な力に対しても比類ない保護を与えてくれる。"
 SMALL_BIO_ARMOR_5: "小型$NEUTRONIUM_CARAPACE$"
 MEDIUM_BIO_ARMOR_5: "中型$NEUTRONIUM_CARAPACE$"
 LARGE_BIO_ARMOR_5: "大型$NEUTRONIUM_CARAPACE$"
 tech_bio_dragon_armor: "$tech_dragon_armor$"
 DRAGON_BIO_ARMOR: "$DRACONIC_CARAPACE$"
 DRAGON_BIO_ARMOR_DESC: "生体装甲の進化の頂点であるこの甲殻は古代の頂点捕食者に着想を得ている。 その層状の構造は再生可能な有機物質とほぼ破壊不可能な生体合金を組み合わせ、 着想の元となった生物と同様に、 強靭で揺るぎない防御力を生み出す。"
 SMALL_DRAGON_BIO_ARMOR: "小型$DRAGON_BIO_ARMOR$"
