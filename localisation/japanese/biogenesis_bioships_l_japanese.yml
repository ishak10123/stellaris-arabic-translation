 BIOSHIP_SENSOR_1: "電波探知"
 BIOSHIP_SENSOR_1_DESC: "レーダーに相当する生物学的な仕組みを利用した感覚器官。 深宇宙で利用でき、 艦船に基本的な探知・追跡能力を提供する。"
 BIOSHIP_SENSOR_2: "重力センサー"
 BIOSHIP_SENSOR_2_DESC: "宇宙船などの存在によって生じる重力変動を感知するために開発された感覚器官。"
 TECH_UNLOCK_BIOSHIP_SENSOR_2_TITLE: "§Hコンポーネントをアンロック：§!$BIOSHIP_SENSOR_2$"
 TECH_UNLOCK_BIOSHIP_SENSOR_2_DESC: "§H$BIOSHIP_SENSOR_2$§!\n$BIOSHIP_SENSOR_2_DESC$"
 BIOSHIP_SENSOR_3: "亜空間センサー"
 BIOSHIP_SENSOR_3_DESC: "航行する宇宙船が残していく亜空間変動を感知する感覚器官。 その感度と感知範囲は、 これまでに開発された深宇宙用の感覚器官を大きく上回る。"
 TECH_UNLOCK_BIOSHIP_SENSOR_3_TITLE: "§Hコンポーネントをアンロック：§!$BIOSHIP_SENSOR_3$"
 TECH_UNLOCK_BIOSHIP_SENSOR_3_DESC: "§H$BIOSHIP_SENSOR_3$§!\n$BIOSHIP_SENSOR_3_DESC$"
 BIOSHIP_SENSOR_4: "タキオンセンサー"
 BIOSHIP_SENSOR_4_DESC: "回転するタキオンビームを利用し、 はるか彼方の星間移動を感知する感覚器官。"
