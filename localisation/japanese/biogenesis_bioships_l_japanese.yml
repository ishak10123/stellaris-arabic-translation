 #Mauler Technologies
 tech_maulers: "$mauler_class_plural_cap$"
 tech_maulers_desc: "生物工学の飛躍的な進歩によって、 軍事的用途でFTL航行が可能な宇宙船へと成長できるようになった。"
 TECH_UNLOCK_mauler_stage_1_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$：§! $mauler_stage_1$"
 TECH_UNLOCK_mauler_stage_1_CONSTRUCTION_DESC: "§H$mauler_stage_1$§!\n$mauler_class_cap$は最も基本的な軍艦である。 近距離兵器と分厚い甲皮装甲を装備している。"
 tech_mauler_build_speed: "モーラ―の孵化の標準化"
 tech_mauler_build_speed_desc: "これらの孵化室は、 栄養豊富なバイオポッド内で胚の軍艦の成長を促進する。 これは初歩的なものだが、 建造ではなく育成による艦隊への第一歩となる。"
 tech_mauler_build_speed_effect: "$mod_ship_mauler_cost_mult$：§G-5%§!\n$mauler_class_cap$建造速度：§G+25%§!"
 tech_mauler_growth_1: "改良型モーラ―の開発"
 tech_mauler_growth_1_desc: "洗練された孵化プロセスにより、 有機宇宙船の成熟期間が短縮され、 構造的完全性が向上する。 強化された栄養供給システムと遺伝子調整により、 船は迅速かつ頑強になる。"
 TECH_UNLOCK_mauler_stage_2_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$：§! $mauler_stage_2$"
 TECH_UNLOCK_mauler_stage_2_CONSTRUCTION_DESC: "§H$mauler_stage_2$§!\n$ship_growth_stage_2$ $mauler_class_cap$を選択的に成長させ、 より強力な火力と装甲に対応できるようにする。"
 gateway_bio_ships: "§H生物船の道筋§!\n§Eこの技術は、 強力な生物船の開発に関する分野をさらに発展させる。§!"
 tech_mauler_growth_2: "発展型モーラ―の開発"
 tech_mauler_growth_2_desc: "これらの施設は比類ない活力と適応能力を備えた船を生み出す。 最適化された遺伝子マトリックスと高度なバイオテクノロジーのサポートにより、 宇宙空間での比類ない性能が保証される。"
 TECH_UNLOCK_mauler_stage_3_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$：§! $mauler_stage_3$"
 TECH_UNLOCK_mauler_stage_3_CONSTRUCTION_DESC: "§H$mauler_stage_3$§!\n$ship_growth_stage_3$ $mauler_class_cap$は最上レベルの$mauler_class_cap$である。 重装甲で、 近距離兵器を多数装備している。"
 #Weaver Technologies
 tech_weavers: "$weaver_class_plural_cap$"
 tech_weavers_desc: "初期のバイオエンジニアリングの基礎を基に、 ウィーヴァーは機敏さと戦闘能力の向上のバランスを考慮して作られている。"
 TECH_UNLOCK_weaver_stage_1_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$：§! $weaver_stage_1$"
 TECH_UNLOCK_weaver_stage_1_CONSTRUCTION_DESC: "§H$weaver_stage_1$§!\n$weaver_class_cap$は、 大型の敵を出し抜き、 艦隊の交戦を支援するように設計された多用途の中型生物船である。"
 tech_weaver_build_speed: "ウィーヴァーの孵化の標準化"
 tech_weaver_build_speed_desc: "これらの施設では、 改良されたバイオポッド内で中型の生物船を育成し、 強化された栄養供給と遺伝子最適化により、 機敏で適応力のある船を生産している。"
 tech_weaver_build_speed_effect: "$mod_ship_weaver_cost_mult$：§G-5%§!\n$weaver_class_cap$建造速度：§G+25%§!"
 tech_weaver_growth_1: "改良型ウィーヴァーの開発"
 tech_weaver_growth_1_desc: "これらの施設では、 成長サイクルを加速し、 船体の適応性を高めるために高度なバイオエンジニアリング技術が採用されている。 改良された遺伝子マトリックスと最適化された環境により、 これらの生物船は耐久性と戦闘時の高い反応性を両立している。"
 TECH_UNLOCK_weaver_stage_2_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$：§! $weaver_stage_2$"
 TECH_UNLOCK_weaver_stage_2_CONSTRUCTION_DESC: "§H$weaver_stage_2$§!\n$ship_growth_stage_2$$weaver_class_cap$は、 艦隊作戦の機動性と適応性を高めるために選抜され、 育成されている。"
 tech_weaver_growth_2: "発展型ウィーヴァーの開発"
 tech_weaver_growth_2_desc: "これらの施設では、 比類ない精度と多様性を備えた生物船が産出されている。 革新的な成長技術と適応遺伝子強化により、 最も要求の厳しい戦術的シナリオでも活躍できる船が生まれる。"
 TECH_UNLOCK_weaver_stage_3_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$：§! $weaver_stage_3$"
 TECH_UNLOCK_weaver_stage_3_CONSTRUCTION_DESC: "§H$weaver_stage_3$§!\n$ship_growth_stage_3$$weaver_class_cap$、 は優れた敏捷性と戦術的多様性を備えるために、 細心の注意を払って育てられた。"
 #Harbinger Technologies
 tech_harbingers: "$harbinger_class_plural_cap$"
 tech_harbingers_desc: "ハーヴィンジャーは生物工学戦争における大きな飛躍であり、 強力な火力と生物技術の回復力を融合させたものだ。 これらの船は艦隊の主力となる。"
 TECH_UNLOCK_harbinger_stage_1_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$：§! $harbinger_stage_1$"
 TECH_UNLOCK_harbinger_stage_1_CONSTRUCTION_DESC: "§H$harbinger_stage_1$§!\n$harbinger_class_cap$は軍用機を発生させることで艦隊を強化する。"
 tech_harbinger_build_speed: "ハーヴィンジャーの孵化の標準化"
 tech_harbinger_build_speed_desc: "これらの施設では大型の生物船を育成し、 高度な栄養注入により耐久性と戦闘能力を維持している。"
 tech_harbinger_build_speed_effect: "$mod_ship_harbinger_cost_mult$：§G-5%§!\n$harbinger_class_cap$建造速度：§G+25%§!"
 tech_harbinger_growth_1: "改良型ハーヴィンジャーの開発"
 tech_harbinger_growth_1_desc: "洗練された施設では高度な生物工学技術を用いて成長を促進し、 構造的完全性を強化している。 その結果、 船の耐久性が向上し、 戦闘効率が改善される。"
 TECH_UNLOCK_harbinger_stage_2_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$：§! $harbinger_stage_2$"
 TECH_UNLOCK_harbinger_stage_2_CONSTRUCTION_DESC: "§H$harbinger_stage_2$§!\n改良された成長技術により、 より強く、 より安定した船が生まれる。"
 tech_harbinger_growth_2: "発展型ハーヴィンジャーの開発"
 tech_harbinger_growth_2_desc: "高度な孵化システムにより、 耐久性と火力に優れた生物船が生まれる。 遺伝子微調整と優れた成長環境により、 比類ない耐久性を備え、 戦場を支配する能力を持つ船が生産される。"
 TECH_UNLOCK_harbinger_stage_3_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$：§! $harbinger_stage_3$"
 TECH_UNLOCK_harbinger_stage_3_CONSTRUCTION_DESC: "§H$harbinger_stage_3$§!\n最高の強さと戦場での優位性のために開発された。"
 #Stinger Technologies
 tech_stingers: "$stinger_class_plural_cap$"
 tech_stingers_desc: "スティンガーは、 優先標的に対して致命的な打撃を与えるように設計されている。 敵の防御の弱点を突くことに優れている。"
 TECH_UNLOCK_stinger_stage_1_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$：§! $stinger_stage_1$"
 TECH_UNLOCK_stinger_stage_1_CONSTRUCTION_DESC: "§H$stinger_stage_1$§!\n精密攻撃と戦術的優位性を目的として生み出された、 素早く強力な生物船。"
 tech_stinger_build_speed: "スティンガーの孵化の標準化"
 tech_stinger_build_speed_desc: "これらの施設では、 精密さとスピードを追求した、 洗練された機敏な生物船が育てられている。 高度なバイオポッドと特殊な栄養溶液を使用して、 正確かつ効率的な攻撃が可能な船となっている。"
 tech_stinger_build_speed_effect: "$mod_ship_stinger_cost_mult$：§G-5%§!\n$stinger_class_cap$建造速度：§G+25%§!"
 tech_stinger_growth_1: "改良型スティンガーの開発"
 tech_stinger_growth_1_desc: "洗練された施設は成長サイクルを加速し、 生物工学の精度を向上させ、 その結果、 優れた俊敏性と精度を備えた船が生まれる。 これらの強化により、 スティンガーは戦術的な交戦において圧倒的な力を発揮する。"
 TECH_UNLOCK_stinger_stage_2_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$：§! $stinger_stage_2$"
 TECH_UNLOCK_stinger_stage_2_CONSTRUCTION_DESC: "§H$stinger_stage_2$§!\n戦術的な作戦におけるスピードと精度を向上させるために改良された。"
 tech_stinger_growth_2: "発展型スティンガーの開発"
 tech_stinger_growth_2_desc: "生物船の成長技術の頂点に立つこれらの先進的な施設は、 比類ない速度と破壊力を備えたスティンガーを生産している。 最適化された遺伝子テンプレートと最先端の育成技術により、 これらの船は迅速かつ正確にあらゆる戦場を制圧する。"
 TECH_UNLOCK_stinger_stage_3_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$：§! $stinger_stage_3$"
 TECH_UNLOCK_stinger_stage_3_CONSTRUCTION_DESC: "§H$stinger_stage_3$§!\n究極のスピード、 正確性、 戦場での優位性を求めて開発された。"
