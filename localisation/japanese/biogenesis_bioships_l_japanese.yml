 #FTL Drives
 BIO_EMPTY_DRIVE: "$EMPTY_DRIVE$"
 BIO_EMPTY_DRIVE_DESC: "$EMPTY_DRIVE_DESC$"
 BIO_HYPER_DRIVE_1: "バイオハイパーレーンフィールド I"
 BIO_HYPER_DRIVE_1_DESC: "ハイパースペースを絶え間なく押し返し、 星間のハイパーレーンの狭い通路を艦船が通過できるようにする。"
 BIO_HYPER_DRIVE_2: "バイオハイパーレーンフィールド II"
 BIO_HYPER_DRIVE_2_DESC: "$BIO_HYPER_DRIVE_1_DESC$"
 BIO_HYPER_DRIVE_3: "バイオハイパーレーンフィールド III"
 BIO_HYPER_DRIVE_3_DESC: "$BIO_HYPER_DRIVE_1_DESC$"
 BIO_JUMP_DRIVE_1: "ジャンプ器官"
 BIO_JUMP_DRIVE_1_DESC: "ジャンプ器官は世界の構造そのものに艦船サイズの裂け目を作り、 ほぼ瞬時の星系移動を実現する。 この時に艦船が通過する空間の性質については、 まだよくわかっていない。"
 BIO_PSI_JUMP_DRIVE_1: "PSIジャンプ器官"
 BIO_PSI_JUMP_DRIVE_1_DESC: "PSIジャンプ器官は、 船と乗組員の超能力の焦点として機能し、 時空連続体を捻じ曲げて出発地点と到着地点のあいだの距離をなくす……と、 推測されている。"
 tech_bio_hyper_drive_1: "ハイパースペース航行"
 tech_bio_hyper_drive_1_desc: "ほとんどの恒星同士のあいだには、 まるで蜘蛛の巣のようにハイパースペースの異次元領域が張りめぐらされている。 これらハイパーレーンに沿うことで、 理論的には超光速での移動が可能だ。"
 tech_bio_hyper_drive_2: "ハイパーレーン突破点"
 tech_bio_hyper_drive_2_desc: "少ないエネルギー消費で艦船がハイパーレーンへの入り口を「突破」できるポイントが、 宇宙空間にいつくも存在することを突き止めた。 これはハイパードライブに新時代をもたらすだろう。"
 tech_bio_hyper_drive_3: "ハイパースペース後流"
 tech_bio_hyper_drive_3_desc: "亜空間後流 (スリップストリーム) を利用できる、 新世代のハイパードライブ。 これはドライブの性能を劇的に向上させる。"
 tech_bio_jump_drive_1: "$BIO_JUMP_DRIVE_1$"
 tech_bio_jump_drive_1_desc: "この革新的な$BIO_JUMP_DRIVE_1$は量子レベルで局所的な時空連続体を操作し、 目的地に合わせて再構築する。 これにより、 船はまるで星系間をほぼ瞬間的に「ジャンプ」しているように見える。"
 tech_bio_psi_jump_drive_1: "$BIO_PSI_JUMP_DRIVE_1$"
 tech_bio_psi_jump_drive_1_desc: "$BIO_PSI_JUMP_DRIVE_1_DESC$"
