 BIO_SHIELD_1: "デフレクター筋組織"
 BIO_SHIELD_1_DESC: "特殊な筋肉組織がエネルギーフィールドを発生させ、 デフレクターシールドを展開する。 吸収できるダメージの量は限られているが、 急速に再生することができる。"
 SMALL_BIO_SHIELD_1: "小型$BIO_SHIELD_1$"
 MEDIUM_BIO_SHIELD_1: "中型$BIO_SHIELD_1$"
 LARGE_BIO_SHIELD_1: "大型$BIO_SHIELD_1$"
 tech_bio_shields_2: "$tech_shields_2$"
 BIO_SHIELD_2: "改良型デフレクター筋組織"
 BIO_SHIELD_2_DESC: "洗練された筋肉組織はエネルギーをより効率的に伝導し、 デフレクターシールドを強化する。 これらの強化されたシステムはより多くのダメージを吸収し、 より速くリチャージできるため、 長期戦闘においてより優れた保護機能を発揮する。"
 SMALL_BIO_SHIELD_2: "小型$BIO_SHIELD_2$"
 MEDIUM_BIO_SHIELD_2: "中型$BIO_SHIELD_2$"
 LARGE_BIO_SHIELD_2: "大型$BIO_SHIELD_2$"
 tech_bio_shields_3: "$tech_shields_3$"
 BIO_SHIELD_3: "シールド筋組織"
 BIO_SHIELD_3_DESC: "この先進的な生体シールド技術は、 強化されたエネルギー伝導組織と保護能力を統合したものだ。 エネルギー攻撃と物理攻撃の両方に対して強力な抵抗力を発揮し、 さまざまな戦闘状況下で生物船に適応可能な防御を可能とする。"
 SMALL_BIO_SHIELD_3: "小型$BIO_SHIELD_3$"
 MEDIUM_BIO_SHIELD_3: "中型$BIO_SHIELD_3$"
 LARGE_BIO_SHIELD_3: "大型$BIO_SHIELD_3$"
 tech_bio_shields_4: "$tech_shields_4$"
 BIO_SHIELD_4: "発展型シールド筋組織"
 BIO_SHIELD_4_DESC: "生体シールド技術の最高峰であるこの強化された筋肉組織は、 エネルギーをより効率的に伝導し、 シールドの強度を高める。 エネルギー攻撃と物理攻撃の両方に対して強固な防御力を発揮し、 戦闘における多様な防御を可能とする。"
 SMALL_BIO_SHIELD_4: "小型$BIO_SHIELD_4$"
 MEDIUM_BIO_SHIELD_4: "中型$BIO_SHIELD_4$"
 LARGE_BIO_SHIELD_4: "大型$BIO_SHIELD_4$"
 tech_bio_shields_5: "$tech_shields_5$"
 BIO_SHIELD_5: "ハイパーシールド筋組織"
 BIO_SHIELD_5_DESC: "超適応組織は膨大なエネルギーの流れを導き、 ほぼ突破不可能な防御を構築する。 この高度なシステムは急速に再生し、 容赦ない攻撃を受けても生物船を保護しつづける。"
 SMALL_BIO_SHIELD_5: "小型$BIO_SHIELD_5$"
 MEDIUM_BIO_SHIELD_5: "中型$BIO_SHIELD_5$"
 LARGE_BIO_SHIELD_5: "大型$BIO_SHIELD_5$"
 tech_bio_dark_matter_deflector: "$tech_dark_matter_deflector$"
 DARK_MATTER_BIO_DEFLECTOR: "ダークマター注入筋組織"
 DARK_MATTER_BIO_DEFLECTOR_DESC: "この最先端の生体シールドはダークマターを有機組織に統合し、 エネルギー伝導性と防御能力を劇的に向上する。 この異質な物質を注入することで筋肉組織は他に類を見ない強度のシールドを展開し、 並外れた規模の攻撃にも耐えることができる。"
 SMALL_DARK_MATTER_BIO_DEFLECTOR: "小型$DARK_MATTER_BIO_DEFLECTOR$"
 MEDIUM_DARK_MATTER_BIO_DEFLECTOR: "中型$DARK_MATTER_BIO_DEFLECTOR$"
 LARGE_DARK_MATTER_BIO_DEFLECTOR: "大型$DARK_MATTER_BIO_DEFLECTOR$"
 tech_bio_psionic_barrier: "$tech_psionic_barrier$"
 PSI_BIO_SHIELD: "ズィロ注入筋組織"
 PSI_BIO_SHIELD_DESC: "サイオニック反応物質であるズィロを注入したこの高度な筋肉組織は、 比類ない精度と適応性でシールドを展開する。 そのユニークな特性により、 生体シールドの耐久力と再生能力の両方が強化され、 超自然的なレベルに近い防御力を発揮する。"
 SMALL_PSI_BIO_SHIELD: "小型$PSI_BIO_SHIELD$"
 MEDIUM_PSI_BIO_SHIELD: "中型$PSI_BIO_SHIELD$"
 LARGE_PSI_BIO_SHIELD: "大型$PSI_BIO_SHIELD$"
 tech_bio_psionic_shield: "$tech_psionic_shield$"
 PSI_BIO_BARRIER: "PSI共鳴組織"
 PSI_BIO_BARRIER_DESC: "この驚異的な生体シールドは特別に培養された組織を通じてサイオニックエネルギーを活用し、 迫り来る脅威に驚くべき精度で適応する防御を構築する。 共鳴はシールドの強度を増幅し、 再生を加速させるため、 最も予測不可能な攻撃に対しても強力な防御となる。"
 SMALL_PSI_BIO_BARRIER: "小型$PSI_BIO_BARRIER$"
 MEDIUM_PSI_BIO_BARRIER: "中型$PSI_BIO_BARRIER$"
 LARGE_PSI_BIO_BARRIER: "大型$PSI_BIO_BARRIER$"
 tech_bio_archaeoshield: "$tech_archaeoshield$"
 BIO_ARCHAEO_SHIELD: "静止フィールド組織"
 BIO_ARCHAEO_SHIELD_DESC: "このテクノロジーは古代の遺物ノジュールの周囲にシールド生成組織を培養することで、 衝撃を受けた際に時間を遅らせるサスペンションフィールドを発生させる。 この遅延によりシールドが攻撃のエネルギーを散逸させる能力が強化され、 防御力が大幅に向上する。"
