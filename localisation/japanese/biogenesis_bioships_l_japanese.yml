 BIO_COMBAT_COMPUTER_DEFAULT_DESC: "生物船には基本的な戦闘本能が備わっており、 回避行動や標的計算を行うことができる。"
 BIO_COMBAT_COMPUTER_BASIC: "神経学習"
 BIO_COMBAT_COMPUTER_BASIC_DESC: "これらのインプラントは船の有機システムと直接統合され、 迅速な意思決定と正確な戦術調整を可能にする。 生体戦闘コンピューターとして機能し、 状況認識力を高め、 戦場でのパフォーマンスを最適化する。"
 BIO_COMBAT_COMPUTER_ADVANCED: "高度な神経学習"
 BIO_COMBAT_COMPUTER_ADVANCED_DESC: "標準的な神経インプラントを進化させたこのシステムは、 戦術処理と意思決定のスピードを向上させる。 生物船はより効率的かつ連携的な動きが可能となり、 戦場の状況変化に素早く対応できるようになる。"
 BIO_COMBAT_COMPUTER_SAPIENT: "知的神経学習"
 BIO_COMBAT_COMPUTER_SAPIENT_DESC: "これらのインプラントには、 独自に戦略的思考を行う生物的知性が収められている。 有機的な本能と人工的な推論を融合させることで、 生物船が複雑な戦闘シナリオに動的に適応し、 ほぼ自律的な意思決定を行うことを可能にしている。"
 BIO_COMBAT_COMPUTER_AUTONOMOUS: "自律型神経学習"
 BIO_COMBAT_COMPUTER_AUTONOMOUS_DESC: "このシステムは完全な自律性をもって作動する。 自己認識能力を備えた生体知能を注入されたシステムは、 外部からの入力なしに、 分析、 戦略、 意思決定の実行を可能にし、 比類ない戦闘効率を実現する。"
 BIO_COMBAT_COMPUTER_PRECOG: "予知型戦闘本能"
 BIO_COMBAT_COMPUTER_PRECOG_DESC: "超能力を利用したインプラントは、生物船に予知能力を与え、 敵の行動を事前に察知することを可能にする。 この超自然的な能力により、 艦隊は決定的な優位性を獲得し、 最も複雑な脅威に対してもその瞬間で最も適切な反応が可能になる。"
