 MAULER_PURSUIT_1_DESC: "艦船の動力器官によって生成された廃棄化学物質を再利用し、 持久力を高める。"
 MAULER_PURSUIT_2: "エネルギーリサイクラー"
 MAULER_PURSUIT_2_DESC: "艦船のリサイクル経路に揮発性粉末を追加し、 耐久力をさらに高める。"
 MAULER_BITER_1: "腐食液"
 MAULER_BITER_1_DESC: "移植された腺は$mauler_class_plural_cap$の体液に腐食性をもたせ、 破壊力を高める。"
 MAULER_BITER_2: "苛性液"
 MAULER_BITER_2_DESC: "揮発性粉末を$mauler_class_plural_cap$の体液に混ぜ、 特に敵船の装甲に対するダメージをさらに大きくする。"
 weapon_type_mandible: "§Y顎§!"
 mod_weapon_type_mandible_weapon_damage_mult: "顎兵器ダメージ"
 APPLIED_MODIFIERS_SUPPORT_TITLE: "支援兵器からの適用補正："
 WEAVER_GROWTH_AURA_1: "発達フェロモン"
 WEAVER_GROWTH_AURA_1_DESC: "ウィーヴァーは周囲の有機体の成熟を促進する複雑な生化学的シグナルを発散している。 これらの発達フェロモンは成長率と適応力を高め、 艦隊がどんな困難にも迅速に対応できるよう進化を促す。"
 WEAVER_GROWTH_AURA_2: "異星の発達フェロモン"
 WEAVER_GROWTH_AURA_2_DESC: "洗練された生物工学により、これらのフェロモンの効力が強化され、 味方の生物船の成長と最適化が劇的に加速する。 このオーラのアップグレードにより、 戦闘の真っ只中でも艦隊は驚くべき速さで最高のパフォーマンスを発揮することが保証される。"
 GROWTH_AURA: "$WEAVER_GROWTH_AURA_1$"
 GROWTH_AURA_TT: "§Pこのオーラは、 成長可能な生物船のみに適用される。§!"
 WEAVER_BOOSTER_1: "基本共生増幅器"
 WEAVER_BOOSTER_1_DESC: "この有機デバイスは生物船間のつながりを強化し、 艦隊全体のエネルギー伝達と連携を向上させる。 その存在により、 戦闘と資源管理の効率が確実に向上する。"
 WEAVER_BOOSTER_2: "改良型基本共生増幅器"
 WEAVER_BOOSTER_2_DESC: "共生増幅器のより高度な改良版であるこの装置は、 艦隊のニーズに動的に適応し、 効率性と応答性を向上させる。 艦隊全体の能力を最適化し、 運用中のシームレスな適応性を確保する。"
 HARBINGER_INCUBATOR_1: "孵化基質"
 HARBINGER_INCUBATOR_1_DESC: "成熟中の攻撃機の卵の周りに形成される細胞基質。 生物工学的な孵化器として機能する。"
 HARBINGER_INCUBATOR_2: "高速$HARBINGER_INCUBATOR_1$"
 HARBINGER_INCUBATOR_2_DESC: "孵化期間中にエキゾチックガスにさらすと、この艦船の攻撃機が急速に成熟する。"
 HARBINGER_CHITIN_1: "キチン成長調整物質"
 HARBINGER_CHITIN_1_DESC: "格納庫内の分泌物が、 開発中の軍用機におけるキチン質の成長を促し、 耐久性を強化する。"
 HARBINGER_CHITIN_2: "結晶成長調節物質"
 HARBINGER_CHITIN_2_DESC: "攻撃機のキチン外骨格に希少な結晶を埋め込むことで、 ダメージ耐性をさらに向上させる。"
 STINGER_RANGE_1: "レンジファインダークラスター"
 STINGER_RANGE_1_DESC: "知覚データの処理に特化した二次神経クラスター。"
 STINGER_RANGE_2: "改良型$STINGER_RANGE_1$"
 STINGER_RANGE_2_DESC: "希少な結晶を神経経路の鞘に埋め込むことで、 ターゲット処理能力を向上させる。"
 STINGER_FIRE_RATE_1: "熱排気孔"
 STINGER_FIRE_RATE_1_DESC: "艦船の胸部に沿って並ぶ熱排気孔から高温の圧縮ガスを宇宙に放出し、 武器の発射速度を向上させる。"
 STINGER_FIRE_RATE_2: "揮発性物質排気孔"
 STINGER_FIRE_RATE_2_DESC: "熱交換媒体として揮発性粉末を使用する場合は、 予期せぬ爆発を防ぐため、 専用の細胞基質が必要になる。"
 #Armor/Carapace
