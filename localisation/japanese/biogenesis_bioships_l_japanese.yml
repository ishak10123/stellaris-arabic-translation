 ################################################
 #BioGenesis Localization for Biological Ships #
 #Designed by Byron Aytoun            #
 ################################################
 BIOSHIP_GROWTH_PROGRESS: "$t$毎月の進捗：$VALUE$"
 BIOSHIP_GROWTH_STATUS: "§H成長段階の進行§!$TABBED_NEW_LINE$$next_growth_stage_label$ $SHIP|Y$$TABBED_NEW_LINE$成長の総進捗：$PROGRESS|*2Y$/$THRESHOLD|*2Y$ $TABBED_NEW_LINE$毎月の進捗：$MONTHLY$"
 TIME_TO_NEXT_GROWTH_STAGE: "$t$次の成長段階までの時間：£time£ $TIME|0Y$ヶ月"
 MOD_BIOSHIP_GROWTH_PROGRESS_ADD: "成長進捗率"
 MOD_BIOSHIP_GROWTH_PROGRESS_MULT: "毎月の成長の進捗"
 SECTION_INSTANCE_MASK: "§H$TECH|Y$を研究してステージ$STAGE|Y$をアンロック。§!"
 SECTION_INSTANCE_MASK_TOOLTIP: "$TRIGGER_FAIL$$SIZE|Y$に成長するには$TECH|Y$が必要"
 ######################
 #Graphical Cultures #
 ######################
 BIOGENESIS_CAT: "BioGenesis"
 BIOGENESIS_01: "スピノヴォール"
 BIOGENESIS_02: "シェルクラフト"
 graphical_culture_tooltip_not_biological: "['Concept_biological_ship', 生物]艦船セットがない"
 graphical_culture_tooltip_biological: "['Concept_biological_ship', 生物]艦船セットが必要"
 concept_biological_ship: "$bio_ship$"
 concept_biological_ships: "$concept_biological_ship$"
 concept_biological_ship_desc: "- 生物船は明確に定義された役割と3つの成長段階を持つ特殊な戦闘艦クラスである。$NEW_LINE$- 建設コストは$i_alloys$ではなく主に$i_food$を消費する。$NEW_LINE$- 維持費は$i_energy$ではなく主に$i_food$を消費する。$NEW_LINE$- §Y£engineering£宇宙工学§!ではなく§Y£society£生物§!テクノロジーを使用する。$NEW_LINE$$h_line$§L多数の生物発光小器官が付属した、 巨大な波打つ筋繊維で構成される生きた艦船。 高エネルギー化合物を放出して光と熱のバーストを発生させ、 その力で前進する。§!"
 default_ship: "機械艦船"
 bio_ship: "生物船"
 #Shipset Descriptions
 biogenesis_01_shipset_desc: "§H艦船セットタイプ：['concept_biological_ship', 生物]§!\n建造されるというよりは誕生する生きた戦艦は、 頂点捕食者を体現している。 半ば意識を持つバイオマスは、 適応し、 狩り、 飽くなき意志で攻撃する。"
 biogenesis_02_shipset_desc: "§H艦船セットタイプ：['concept_biological_ship', 生物]§!\n大胆な行動を好む者のために作られた、 硬い外殻を持つ宇宙船は、 何かに仕えるのではなく、 耐えるのだ。 そして、 それらを家と呼ぶ勇敢な探検家たちと共に成長していく。"
 humanoid_01_shipset_desc: "頑丈で強固な宇宙船は、 深宇宙の困難にも耐えるように設計されている。 未知なるものを征服するように設計されたこれらの宇宙船は、 その創造者の希望と夢を最も遠い星々へと運ぶ。"
 synthetics_01_shipset_desc: "これらの設計は、 疲れを知らない心の純粋さを反映している。 熱で湾曲した船体はオーバークロックされたメインフレームからのエネルギーを分散させ、 絶対的な効率性を追求する中で完璧な動作を保証する。"
 mammalian_01_shipset_desc: "耐久性を重視して設計された強力な船は、 作り手の忍耐力を反映している。 密度の高い船体は断熱と保護の役割を果たし、 予備のシステムは最も過酷な環境下でも生存を保証する。"
 reptilian_01_shipset_desc: "直方体で実用的なこの頑丈な設計は、 捕食者のたくましさを想起させる。 宇宙におけるその存在は作り手の冷徹な粘り強さを証明している。"
 avian_01_shipset_desc: "優雅で滑らかな多用途の船は、 飛行の美しさを体現している。 すべての曲線や輪郭は空間を障害物ではなく空の延長として捉える種族を物語っている。"
 arthropoid_01_shipset_desc: "キチン質か鋼鉄か、 形式か機能か。 そのような区別はこの船に存在しない。 これらの船は勇気づけることより耐えることを目的として建造されています。 何層にも重ねられた船体は、 純粋な生存の哲学の証だ。"
 molluscoid_01_shipset_desc: "優雅でありながら耐久性のある船は、 家であり、 槍でもある。 硬化した殻の下では、 複雑なシステムが静かな効率性で電力の流れと栄養素の循環を制御している。"
 fungoid_01_shipset_desc: "これらの球根状の船は、 菌類の群生のような美しさを想起させる。 自給自足のために構築された専門システムは、 菌糸体の論理を反映した複雑な内部ネットワークを形成している。"
 plantoid_01_shipset_desc: "これらの緑豊かな船は、 ただ星々を旅するだけでなく、 星々の間に根を下ろす。 光合成ナセルは船内の生物群系のバランスをとり、 均衡を保つ。"
 lithoid_01_shipset_desc: "時と圧力によって形成された岩のような船は、 永続性を体現している。 シリコン結晶マトリックスは惑星の形を形成するのと同じ力から強度を引き出し、 コアシステムを支えている。"
 necroid_01_shipset_desc: "暗く重々しい、 浮遊する大聖堂は、 死と再生の記念碑である。 エントロピーの中心と儀式的な設計は、 虚空の力と永遠の野心を囁く。"
 nemesis_01_shipset_desc: "巨大で威圧的なこれらの船は、 服従を命じる。 補強された巨大構造と予備システムは、 比類ない支配のオーラを放つ。"
 aquatic_01_shipset_desc: "流動的でありながら力強いこれらの船は、 海洋の力を運ぶ。 水の内部と流線型の輪郭は、 その創造主の優雅さを体現している。"
 toxoid_01_shipset_desc: "これらの船はガスを漏らし、 不気味な音を立て、 あらゆる規制に違反しているが、 それでも航行している。 廃棄物で燃料を補給し、 頑固な創意工夫で船体を支え、 他の船が航行できないような場所でも航行を続ける。"
 cybernetics_01_shipset_desc: "クロムの輝き、 うなる回路、 反射神経は過去の産物。 神経への直接アップリンクにより、 遅延や制限なく、 純粋で爆発的な精度を実現している。"
