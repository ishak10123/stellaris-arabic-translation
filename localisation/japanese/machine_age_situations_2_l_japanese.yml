 #Synth Oligarchic Physical
 auth_synth_oligarchic_physical: "寡頭制オーバーライド"
 auth_synth_oligarchic_physical_desc: "人工生命体寡頭制では、 最上層の官僚にパフォーマンスの低い同僚の機体を一時的に乗っ取り、 プロセス管理における大惨事を防ぐ権限が与えられる。"
