 #Synth Oligarchic Virtual
 auth_synth_oligarchic_virtual: "寡頭制監督"
 auth_synth_oligarchic_virtual_desc: "全面的プロジェクト管理プロトコルと追加の情報処理資源により、 高官たちはかつてない効率で複数の帝国全域に及ぶ布告の監視することが可能になる。"
