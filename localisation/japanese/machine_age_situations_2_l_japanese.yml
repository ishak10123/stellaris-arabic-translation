l_japanese:
 ### DIGITIZATION SITUATION START ###
 situation_digitization: "人工生命"
 situation_digitization_type: "アセンションの状況"
 situation_digitization_desc: "欠陥のある生物の器を捨てるべき時が来た。 進化した機体を用意して、 意識の転送プロセスを実行しなければならない。\n\n§Y翌月にデジタル化されるPOP§!: §G[From.GetSynthPopsPerMonth]§!"
 situation_digitization_monthly_change_tooltip: "我々の意志はデジタルに、 我々の体は機械になる。"
 situation_digitization_outcome: "人工生命体。"
 stage_digitization_effects: "我々はデジタル版の脳を設計し、 機体を製造して我々自身を変身させなければならない。"
 #Approach Error Correcting
 situation_digitization_errorcorrecting: "エラー修正"
 approach_digitization_errorcorrecting_tt: "有益なイベントが発生する確率が高くなる。\n$situation_speed_tt$：§R-20%§!"
 situation_digitization_errorcorrecting_approach_tt: "$situation_digitization_errorcorrecting$ $situation_approach_tt$"
 #Approach Real Time
 situation_digitization_realtime: "リアルタイム"
 approach_digitization_realtime_tt: "$situation_speed_tt$: §Y変更無し§!"
 situation_digitization_realtime_approach_tt: "$situation_digitization_realtime$ $situation_approach_tt$"
 #Approach Overclocked
 situation_digitization_overclocked: "オーバークロック"
 approach_digitization_overclocked_tt: "困難なイベントが発生するリスクが高くなる。\n$situation_speed_tt$：§G+20%§!"
 situation_digitization_overclocked_approach_tt: "$situation_digitization_overclocked$ $situation_approach_tt$"
 situation_num_identity_complex_tt: "$building_identity_complex$"
 situation_digitization_ongoing_desc: "人工生命化進行中"
 situation_digitization_pause_desc: "$situation_cyberization_pause_desc$"
 situation_identity_complex_needed_desc: "£trigger_no£有効になっている$building_identity_complex$がない"
 synth_positive_media_coverage_tt: "ポジティブな報道"
 synth_negative_media_coverage_tt: "ネガティブな報道"
 biological_pop: "£pop£有機生命体POP"
 biological_pops: "£pop£有機生命体POP"
 mechanical_pop: "£pop£機械POP"
 mechanical_pops: "£pop£機械POP"
 pop_is: "は"
 pops_are: "は"
 #Buildings
 building_identity_complex: "自我同一性複合施設"
 building_identity_complex_desc: "人工的自我同一性の研究および開発を行う最新拠点。"
 building_identity_complex_speed: "§G+100§! £pop£ §HPOP§!"
 building_identity_complex_effect_desc: "毎月、 $building_identity_complex_speed$がアップロードされる。"
 building_ai_emporium: "AIの中心地"
 building_ai_emporium_desc: "AIが必要とするものが何でも買える巨大複合施設。 知的AIが何でもない物を家族との時間やビジネスで有用な賢いお供に変身させます。 AIが少し自意識過剰？ 我々のところまでお持ちください。 熟練の技術者たちが亜光速よりも素早くリセットを行います。"
 building_ai_emporium_fail_tt: "$TRIGGER_FAIL$すでに§Y[planet.owner.GetName]§!に§Y$building_ai_emporium$§!がある"
 building_ai_emporium_outlawed_robots_tt: "$TRIGGER_FAIL$§Y[planet.owner.GetName]§!でロボットは非合法となった"
 building_clear_thought_clinic: "思考除去クリニック"
 building_clear_thought_clinic_desc: "不必要なメモリーがある？ それなら、 エネルギー通貨に変えてしまいましょう！ 訓練されたチームが安全かつ確実にメモリーを削除します！ 楽しい記録があるメモリーであるほど、 お支払いする金額も大きくなります！\n\n一度行った施術はやり直しできません。 回収後の思考パターンの復元は不可能です。"
 clear_thought_clinic_modifier: "$building_clear_thought_clinic$"
 clear_thought_clinic_tt: "非スタッキング諜報網の補正：$TABBED_NEW_LINE$$MOD_SPY_NETWORK_DAILY_VALUE_MULT$：§G+25%§! $TABBED_NEW_LINE$$MOD_SPY_NETWORK_LEVELS_ADD$：§G+10§!"
 #Jobs
 m_pop_assembly: "£mod_planet_pop_assembly_add£ §Y$MOD_PLANET_POP_ASSEMBLY_ADD$§!"
 job_identity_designer: "自我同一性デザイナー"
 job_identity_designer_plural: "自我同一性デザイナー"
 job_identity_designer_plural_with_icon: "£job_identity_designer£ $job_identity_designer_plural$"
 job_identity_designer_converter_desc: "$job_identity_designer_plural$は生物的形体からデジタルの自我への移行を促進し、 痛みのない移行処置を施す。"
 job_identity_designer_converter_effect_desc: "$job_identity_designer_plural_with_icon$は$i_engineering$と$i_amenities$を供給する"
 job_identity_designer_desc: "$job_identity_designer_plural$は新たな人工精神を巧みに創り出す。"
 job_identity_designer_effect_desc: "$job_identity_designer_plural_with_icon$は、$i_engineering$、$i_amenities$、帝国全体の$m_pop_assembly$を供給する"
 mod_job_identity_designer_add: "$job_identity_designer$の職業枠"
 job_roboticist_plural_and_job_identity_designer_plural: "[roboticist.GetNamePlural]と$job_identity_designer_plural$"
 job_roboticist_plural_with_icon_and_job_identity_designer_plural_with_icon: "$job_roboticist_plural_with_icon$と$job_identity_designer_plural_with_icon$"
 councilor_ruler_imperial_synth: "$imperial_ruler$"
 councilor_ruler_imperial_synth_desc: "$imperial_ruler_desc$"
 #Traits
 #Modifiers
 synth_opposition_truth: "人工生命化情報運動"
 synth_opposition_truth_desc: "人工化に関連するすべての側面において、 正しい情報を広める。"
 synth_opposition_deception: "人工生命化偏向運動"
 synth_opposition_deception_desc: "大衆の間で、 精神人工化の良い側面を強調するような話をでっち上げる。"
 synth_tinkering_with_minds: "精神改造"
 synth_tinkering_with_minds_desc: "新たなにデジタル化された精神に、 我々の未来の展望に協調するよう適度な再プログラムを施す。"
 synth_brightest_minds: "最優秀者の優先化"
 synth_brightest_minds_desc: "最も並外れた者たちだけが我々の人工化計画の参加者に選ばれる。"
 synth_reprogram_minds: "抑圧的な再プログラム"
 synth_reprogram_minds_desc: "この政府はデジタル化に伴い、 広い範囲で「不適な」者たちを再プログラムする。"
 victim_compensation: "犠牲者補償"
 victim_compensation_desc: "人工生命化の最中に精神を失ってしまった者たちの家族に手渡される補償金。"
 synth_mandatory_volunteers: "強制ボランティア"
 synth_mandatory_volunteers_desc: "被験者たちは生体意識のデジタル化実験に強制的に参加させられる。"
 synth_mass_demonstrations: "集団デモ"
 synth_mass_demonstrations_desc: "惑星の労働者たちが、 惑星が機械に移行することに対するデモ活動に夢中になる。"
 synth_fund_heritage_sites: "星界遺産への資金提供"
 synth_fund_heritage_sites_desc: "特殊な星界遺産が創設され、 同種族でかつ生身である者たちの人工生命体への移行の影響力を制限する。"
 synth_revere_the_past: "過去の崇拝"
 synth_revere_the_past_desc: "我々の生物的生活から生まれた宗教的儀式はいまだ我々にとって重要である。 我々はこうした崇拝の地を守らなくてはならない。"
 synth_preserve_the_past: "過去の保存"
 synth_preserve_the_past_desc: "新たな生活を完全に受け入れることは、 我々の生物的過去に意味を与える場所や物を破壊すべきだという意味ではない。"
 synth_resistance_fight: "レジスタンスのリーダーを一斉検挙"
 synth_resistance_fight_desc: "機械部隊を$d_biological_enclaves_no_icon$に送り込み、 レジスタンスのリーダーたちを捕らえれば、 素早く反対勢力を封殺できる。"
 synth_resistance_diplomacy: "レジスタンスのリーダーの外交"
 synth_resistance_diplomacy_desc: "$d_biological_enclaves_no_icon$を訪れ、 レジスタンスのリーダーたちと会合することで互いの理解を深める。"
 synth_character_force: "かつての有機的形態の模倣"
 synth_character_force_desc: "我々の種族の伝統的形態がデジタル領域に保存される。"
 synth_character_customize: "無制限人工機体改造"
 synth_character_customize_desc: "人々は新たなデジタルの姿を自由に改造することができる。"
 synth_character_customize_elite: "制限付き人工機体改造"
 synth_character_customize_elite_desc: "明確な社会階層を維持するため、 上流階級のみが自身の姿を改造することを許されている。"
 synth_character_customize_corpo: "収益化人工機体改造"
 synth_character_customize_corpo_desc: "人々は自身のデジタルの姿を自由に改造することができる。 彼らの予算が許す限りは。"
 synth_cravings_imperfections: "意図的な人工不完全性"
 synth_cravings_imperfections_desc: "虚ろで無個性な者になることを避けるため、 不完全な機能を意図的に人工機体に追加する。"
 synth_cravings_simulation: "シミュレーション内の生活"
 synth_cravings_simulation_desc: "シミュレーション内での困難を伴う生活を選ぶ人々のために、 より現実に近い体験を創り出すことに取り組む。"
 synth_cravings_stop: "無視された有機的強硬派"
 synth_cravings_stop_desc: "時が経てば、 人々は有機的困難のない完全な生活に感謝するようになる。"
 synth_cravings_pain: "仮想戦闘闘技場"
 synth_cravings_pain_desc: "痛みを伴う仮想戦闘への参加は、 参加者と観戦者にとって馴染みのあるものだ。"
 synth_health_physical: "人工肉体の健康への注力"
 synth_health_physical_desc: "我々の人工医療では、 各地で起きた故障への対処が最優先される。"
 synth_health_virtual: "人工精神の健康への注力"
 synth_health_virtual_desc: "継続的なソフトウェアのアップデートにより精神の安全性を確保することは、 我々の健康にとって必要不可欠なことである。"
 synth_health_both: "バランス型の人工生命の健康への注力"
 synth_health_both_desc: "ソフトウェアとハードウェア両方の不安定性に対処することは、 人々の幸福にとって必要不可欠なことである。"
 synth_health_corporate: "人工医療化"
 synth_health_corporate_desc: "企業の専門知識を伝統的な医療を越えた先まで拡大することは、 デジタルウイルスを治療することを意味する。"
 synth_virtual_world_outlaw: "非合法仮想現実"
 synth_virtual_world_outlaw_desc: "社会の脅威であるとして、 高い中毒性を持つ仮想リゾートは非合法となった。"
 synth_virtual_world_promote: "奨励された仮想現実"
 synth_virtual_world_promote_desc: "デジタルの楽園で人々は実質無限にある娯楽を自由に楽しむことができる。"
 synth_virtual_world_regulate: "規制された仮想現実"
 synth_virtual_world_regulate_desc: "人々の現実とのつながりを断たぬよう、 高い中毒性を持つ仮想リゾートを厳しく規制する。"
 synth_home_centralized: "中央集中型サーバーファーム"
 synth_home_centralized_desc: "最大費用効果を達成するため、 デジタル化された意識はそれぞれ国有の中央サーバーファームに保管される。"
 synth_home_distributed: "分散型ホームサーバー"
 synth_home_distributed_desc: "デジタル化された意識は伝統的な私有地に保管される。"
 synth_digital_homes: "デジタル不動産"
 synth_digital_homes_desc: "従来の住宅市場と同様のデジタル不動産は、 わずかな費用でほぼ同額の収益が得られる。"
 synth_respawn_push: "緩和された人工生命安全基準"
 synth_respawn_push_desc: "緩い物理的安全基準が強靭な経済を形作る。"
 synth_respawn_caution: "人工生命安全基準"
 synth_respawn_caution_desc: "人工機体と精神の保護は、 政府の厳しいガイドラインがなければできない。"
 synth_respawn_elite: "人工生命安全特権"
 synth_respawn_elite_desc: "上流階級は機体や精神を損なう恐れのある仕事を禁じられている。"
 synth_cultural_exchange: "文化的理解"
 synth_cultural_exchange_desc: "星界遺産を往来する文化交流プログラムは人々の相互の理解を促進する。"
 synth_combat_reactors: "戦闘リアクター"
 synth_combat_reactors_desc: "新たな微小融合技術が我々の機体に追加され、 我々はより大きな戦闘力を獲得した。"
 synth_AI_actor: "AI広報担当者"
 synth_AI_actor_desc: "AIを導入した、 亡くなった有名人のコピーを用いることで、 現在進行中の人工生命化指令の支持が得られる。"
 #Deposits
 d_old_towns_no_icons: "旧市街"
 d_old_towns: "£blocker£ $d_old_towns_no_icons$"
 d_old_towns_desc: "この地域には我々の起源となる種族が住む、 保存状態の良い市街が多くある。 資源を消費することで、 こうした保留状態の地域に機械への移行を奨励できるかもしれない。"
 d_old_towns_custom_tooltip: "§Y[Owner.GetNumSynthOpposition] [Owner.GetMechanicalPopOrPops]§!が生成された"
 d_biological_enclaves_no_icon: "生物的居留地"
 d_biological_enclaves: "£blocker£ $d_biological_enclaves_no_icon$"
 d_biological_enclaves_desc: "この地域には人工生命体への移行を拒む人々が住む市街が多くある。"
 d_biological_enclaves_custom_tooltip: "§Y[Owner.GetNumSynthOpposition] [Owner.GetMechanicalPopOrPops]§!が生成された"
 #Policies
 policy_synthetic_identities_policy: "人工的自我同一性"
 policy_synthetic_identities_policy_desc: "我らの増殖のため、 新たな人工的自我を生成しなければならない。"
 identity_copy_name: "自我の複製"
 identity_copy: "$identity_copy_name$"
 identity_copy_desc: "$tech_identity_copy_desc$\n\n複製品は個性に欠けていることを理由にわずかに憂鬱を感じるだけである。\n\n$TECH_UNLOCK_IDENTITY_COPY_DESC$\n\n§E$identity_copy_name$ $can_enable_mind_creation$§!"
 identity_fusion_name: "自我の融合"
 identity_fusion: "$identity_fusion_name$"
 identity_fusion_desc: "$tech_identity_fusion_desc$\n\n$TECH_UNLOCK_IDENTITY_FUSION_DESC$\n\n§E$identity_fusion_name$ $can_enable_mind_creation$§!"
 identity_initialization_name: "自我の初期化"
 identity_initialization: "$identity_initialization_name$"
 identity_initialization_desc: "$tech_identity_initialization_desc$\n\n$TECH_UNLOCK_IDENTITY_INITIALIZATION_DESC$\n\n§E$identity_initialization_name$ $can_enable_mind_creation$§!"
 can_enable_mind_creation: "は人工生命体製造時に使用される"
 policy_computation_core_allocation: "演算コアへの注力"
 policy_computation_core_allocation_desc: "人工生命化された企業は演算サイクルを自社のコアシステムから、 高価値の社会部門を遅延なしで最適化するのに転用できる。"
 computation_core_production_name: "生産の効率化"
 computation_core_production: "$computation_core_production_name$"
 computation_core_production_desc: "予備の処理サイクルを利用し、 生産プロセスを効率化する。$computation_core_production_tt$"
 computation_core_production_tt: "\n\n$EFFECTS_HEADER$ $NEW_LINE$- $pop_group_unit$ £job_roboticist£ $job_roboticist_plural$および $job_identity_designer_plural_with_icon$ごとに、 §Y£job_foundry£ $job_foundry_plural$§!および §Y£job_artisan£ $job_artisan_plural$§!の$BONUS_WORKFORCE_FOR$が§G+2.5%§!上昇する"
 computation_core_stability_name: "安定性分析"
 computation_core_stability: "$computation_core_stability_name$"
 computation_core_stability_desc: "異常検知のため、 資源を割いて社会情報の流れを監視する。$computation_core_stability_tt$"
 computation_core_stability_tt: "\n\n$EFFECTS_HEADER$ $NEW_LINE$- $pop_group_unit$ £job_roboticist£ $job_roboticist_plural$および $job_identity_designer_plural_with_icon$ごとに、 §Y£job_bureaucrat£ $job_bureaucrat_plural$の$BONUS_WORKFORCE_FOR$§!が§G+2.5%§!上昇する"
 computation_core_research_name: "研究プロセス"
 computation_core_research: "$computation_core_research_name$"
 computation_core_research_desc: "パフォーマンス集約型研究サーバーに追加のプロセスサイクルを指定する。$computation_core_research_tt$"
 computation_core_research_tt: "\n\n$EFFECTS_HEADER$ $NEW_LINE$- $pop_group_unit$ £job_roboticist£ $job_roboticist_plural$および $job_identity_designer_plural_with_icon$ごとに、 §Y£job_physicist£ $job_physicist_plural$§!、 §Y£job_biologist£ $job_biologist_plural$§!、 および§Y£job_engineer£ $job_engineer_plural$§!の$BONUS_WORKFORCE_FOR$が§G+2.5%§!上昇する"
 #Technologies
 tech_identity_copy: "自我の複製"
 tech_identity_copy_desc: "我々は人工生命体の自我と記憶を新しい機体に複製することができる。 複製品はありきたりな技能を獲得するが、 陳腐な会話が助長される。"
 TECH_UNLOCK_IDENTITY_COPY_TITLE: "政策が使用可能に：$TABBED_NEW_LINE$§H$policy_synthetic_identities_policy$§! - $identity_copy_name$"
 TECH_UNLOCK_IDENTITY_COPY_DESC: "£pop£ §H機械POP§!$TABBED_NEW_LINE$幸福度：§R-5%§!"
 tech_identity_fusion: "自我の融合"
 tech_identity_fusion_desc: "機体に2つ以上の人工生命体の自我と記憶を融合することで、 幾分か個性を持った新たな個体が作られる。"
 TECH_UNLOCK_IDENTITY_FUSION_TITLE: "政策が使用可能に：$TABBED_NEW_LINE$§H$policy_synthetic_identities_policy$§! - $identity_fusion_name$"
 TECH_UNLOCK_IDENTITY_FUSION_DESC: "£pop£ §H機械POP§!$TABBED_NEW_LINE$製造コスト：§R+10%§!"
 tech_identity_initialization: "自我の初期化"
 tech_identity_initialization_desc: "我々は自我カーネルを初期化し、 それを仮想現実の幼少期に供給することができる。 費用はかかるものの、 生産性のある人格を生成するのに最適な経験をシミュレートすることが可能だ。"
 TECH_UNLOCK_IDENTITY_INITIALIZATION_TITLE: "政策が使用可能に：$TABBED_NEW_LINE$§H$policy_synthetic_identities_policy$§! - $identity_initialization_name$"
 TECH_UNLOCK_IDENTITY_INITIALIZATION_DESC: "£pop£ §H機械POP§!$TABBED_NEW_LINE$幸福度：§G+5%§!$TABBED_NEW_LINE$ £job£ §H職業枠§!による資源：§G+5%§!$TABBED_NEW_LINE$製造コスト：§R+20%§!"
 #DIGITIZATION STAGE 1
 synth.100.name: "起動" #Stage 1 - Start event
 synth.100.desc: "生物の姿を捨て、 合金と電気の存在へと昇華する時が来た。 最新の機体と加速された脳で、 我々は未来へと進む。 [Owner.Species.GetFleshTypeCyberCreed]は誤りを犯すが、 機械は完璧な存在になり得る。\n\nしかし、 その移行過程は簡単なものではない。 研究コミュニティが人工生命体開発のための拠点として機能するには、 少なくとも1つの$building_identity_complex$が必要だ。 我々の運命が待っている。"
 synth.100.a: "我々は我々自身の運命を築く。"
 synth.100.a.tt: "§Rアクションが必要：§!\n§Y$situation_digitization$§!の状況を再開するには$building_identity_complex$を建設する。"
 synth.105.name: "より優秀なビルド"
 synth.105.desc: "人工脳の強化された処理能力を用いれば、 我々は生物的制約を超越することができる。 しかしながら、 余りある力にも限界はある。 それゆえ我々は優先順位を決めなければならない。$synth.105.end$"
 synth.105.end: "\n\n我々は意思決定プロセスの増強、 メモリーストレージの増量、 精神と四肢の連携の効率化に注力することが可能だ。 そのどれもが特定の職における能力を向上させる。 一方、 すべての機体の耐久性を強化させることもできる。\n\nこうした機能は継続的なサポートを必要とし、 ロボット組み立て建造物のある惑星でしか利用できないが、 設計から得られる知見は即座に生産性の向上につながるだろう。"
 synth.105.a: "意思決定を最適化しろ。"
 build_better_synths: "ロボット組み立て建造物の補正を追加："
 synth.105.a.tt: "$build_better_synths$\nエリート層POPの資源産出：§G+15%§!\n\n"
