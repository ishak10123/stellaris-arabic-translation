 edict_optimized_identity_creation: "最適化された自我創造"
 edict_optimized_identity_creation_desc: "高度な人格アルゴリズムとコアメモリー圧縮技術が自我生成速度を向上させる。"
 concept_edict_optimized_identity_creation: "$edict_optimized_identity_creation$"
 ### EVENTS ###
 synth.social_consequences.tt: "現在進行中の§Y人工生命社会の変遷§!に影響を与える。\n\n" #Standard tooltip to indicate that the Physical/Virtual focus variables has changed
 #FIRST EVENT #
 #DEMOCRATIC
 synth.505.name: "$synthshock_chain_title$"
 synth.505.desc: "政府の活動のおかげで、 協力的な市民のすべての意識がデジタルに移植された。 人工生命化は我々がいまだ想像もできない道を開き、 新たな困難と可能性を生んだ。\n\n現実世界へ我々の活動を集中させることで、 既に用意されている、 遠く離れた新たな機体へ我々のデジタル化された精神を移すことが可能だ。 あるいは、 戦争の苦難を和らげるため、 遠隔操作可能な代理兵士を創造する手段を開発することもできる。"
 synth.505.a: "移動の自由に注力すべきだ。"
 synth.505.a.tt: "移住と区域に注力。"
 synth.505.b: "戦争の恐怖に備えなくては。"
 synth.505.b.tt: "戦争疲弊と亜光速航行に注力。"
 #OLIGARCHIC
 synth.510.name: "$synthshock_chain_title$"
 synth.510.desc: "人工生命化が既に我々の予期していなかった形で社会に影響を与えた一方で、 さらにこの先へ辿り着けるだろうというのが我々の共通観念だ。 現在の人工機体を改善するか、 あるいは完全にデジタルな存在となるために機体を廃棄することさえ可能だ。\n\n全員に人工機体が行き渡るようにする場合は、 役人たちが無能な政府関係者の機体を一時的に乗っ取れるようにしてもいいだろう。 一方、 完全な仮想世界で経験を共有するための、 上述の特注物理形態であれば、 我々はかつてない効率で決定事項を遂行できるだろう。"
 synth.510.a: "無能な機体の奪取に注力せよ。"
 synth.510.a.tt: "官僚的効率に注力。"
 synth.510.b: "全面的な仮想監督方法を研究せよ。"
 synth.510.b.tt: "布告と帝国規模に注力。"
 #DICTATORIAL
 synth.515.name: "$synthshock_chain_title$"
 synth.515.desc: "人々の完全な人工生命化は大成功を収めた。 我々の生物としての過去は歴史の塵と消えたが、 先へ進むために、 §Y[From.GetRulerTitle][From.GetRulerName]§!には優秀な者たちの無条件の服従と意思決定の両方が必要である。\n\n人工機体の改善は個人による複数の宿主の同時制御を可能にする。 一方、 現実世界を完全に放棄し、 完全な仮想環境を通じて大衆感情を操ることもできる。"
 synth.515.a: "人工神経機体に重点を置け。"
 synth.515.a.tt: "労働者と区域に注力。"
 synth.515.b: "仮想現実操作に注力せよ。"
 synth.515.b.tt: "建造物と政府志向に注力。"
 #IMPERIAL
 synth.520.name: "$synthshock_chain_title$"
 synth.520.desc: "人工生命化が既に予期せぬ形で帝国に影響を与えている一方で、 人々はさらに先へ向かうことに協力的であるように思える。 人工機体は我々の自我の拡張ともなり得るし、 あるいは仮想意識により遠隔操作される単なる道具にもなり得る。 我々の道はまだ定まっていない。\n\n使い捨ての機体から別の機体へ意識を高速移植する方法を研究することが可能だ。 それとは別に、 亡くなったばかりの者たちから知識を回収し、 研究活動を加速させることもできる。"
 synth.520.a: "死者から知識を回収する術を調べろ。"
 synth.520.a.tt: "リーダーと研究に注力。"
 synth.520.b: "意識の高速移植を研究しろ。"
 synth.520.b.tt: "軍と艦船に注力。"
 #CORPORATE
 synth.525.name: "$synthshock_chain_title$"
 synth.525.desc: "社会全体の人工生命化は徹底的なリスクおよび便益解析を実行するに値する。 我々が人工生命化された未来の、 利益を生む新たな分野に手をかけようとしている一方で、 我々は物質主義志向の顧客基盤を手放すことになる。 完全な世界において、 我々はそのどちらもある程度は保持しておきたい。\n\nAIなどの人工生命化関連分野における進歩は無機物に原始的生命を埋め込み、 複数の生産ラインを稼働させることを可能にするだろう。 仮想空間をさらに徹底的に調べれば、 新しいタイプの商品として人々のメモリーを活用することもできるだろう。"
 synth.525.a: "AIの導入を研究しろ。"
 synth.525.a.tt: "生産と利益に注力。"
 synth.525.b: "メモリーを利益に変換する方法を研究しろ。"
 synth.525.b.tt: "交易、 物品、 情報に注力。"
 ### EVENT POOL 1: IDENTITY ###
 synth.610.name: "人工生命の起源"
 synth.610.desc: "人工生命化によってもたらされる社会基盤の変化がようやく感じられるようになってきた。 肉体による制限がなくなった我々は性別、 民族、 身体自律性の分類を抜本的に再定義した。 一部の者が解放感を感じている一方で、 かつての枠組みを手放そうとしない伝統主義派が増えている。 彼らは事前に設定された自我で活動することを望んでいるのだ。\n\n彼らをなだめるため、 人工の姿に生物の面影を残すことが可能だ。 あるいは、 人々がより自由に自己表現できるようにする方がいいかもしれない。"
 synth.610.a: "元々の姿を維持しろ。"
 synth.610.b: "無制限の機体改造を許可する。"
 synth.610.c: "自我のカスタムをほどほどに制限しておけ。"
 synth.610.d: "視認可能な地位の象徴はそのままにしておかなければならない。"
 synth.610.e: "当然ながら、 この件は収益化可能…… だろうか？"
 synth.620.name: "有機生命体の切望"
 synth.620.desc: "人工生命化に乗り気でない一部の人々は、 生物としての過去を懐かしんでいる。 彼らは「自然体」の短い寿命や生来の不完全さが人生を意味のあるものにすると主張している。\n\n人工や仮想空間内の自身の複製は無個性で虚ろであるとする強硬派は、 有機的肉体へのカルトじみた信仰を強めている。\n\n彼らに完全性に欠けるシミュレーションを提供し、 そこに住まわせてみるのはどうだろうか？ あるいは、 彼らは不完全な殻を好んでいるのか？"
 synth.620.a: "人工機体に計画的な不完全さを導入しろ。"
 synth.620.b: "不完全な世界を提供してやれ。"
 synth.620.c: "過去を美化するのは愚かだ。"
 synth.620.d: "痛めつけてやれば目的を思い出すだろう。"
 synth.620.d.tt: "仮想戦闘を開始しろ！\n\n"
 synth.630.name: "ホームサーバー建築学"
 synth.630.desc: "§Y[root.GetSpeciesAdj]§!全体の人工生命化は日々の暮らしを大きな変化させることも意味する。 精神が巨大サーバーファームで眠っている間、 人工機体は棚に保管しておけるのだ。 これは費用効率の良い解決策でありながら、 一部の擁護団体はいくつかの懸念を掲げている。\n\nかつては儲かっていた不動産市場が崩壊し、 経済を落ち込ませる可能性があるというのだ。 より大きな被害となり得るのは、 少なくとも心理学的観点から言えば、 もはや人々に自宅と呼べる物理的な場所がないことだ。"
 synth.630.a: "中央集中型サーバーが最も効率が良い。"
 synth.630.b: "個別サーバーは現存する家屋に保管できる。"
 synth.630.c: "デジタルの家の販売を開始しろ。"
 ### EVENT POOL 2: POSSIBILITIES ###
 synth.1010.name: "無限の可能性の母体"
 synth.1010.desc: "デジタル産業が好景気を迎えている。 一人称視点の冒険シミュレーションのスリルからデジタルリゾートでの穏やかな時間まで、 仮想空間での娯楽がこれほどの魅力を、 いや中毒性を持っていたことはない。 この急成長中の産業が経済の原動力である一方で、 人々がデジタルの楽園で過ごす時間が増えたことで、 現実世界における生産力は落ち込み始めている。 「現実」世界とのつながりを完全に断ってしまいそうな者たちもいるが、 デジタル経済に参画させればまだ社会の役に立てる。\n\n中毒性のある仮想世界を禁止し、 新しいタイプの儲かる娯楽を提供すべきか、 あるいは規制を通じた折衷案を模索すべきか？"
 synth.1010.a: "いつまでも中毒性の消えない仮想世界を禁止しろ。"
 synth.1010.b: "こうした仮想世界の楽園を奨励しろ。"
 synth.1010.b.hedonist: "ようやくだ、 究極の楽園だ！"
 synth.1010.c: "同産業に規制をかけろ。"
 synth.1020.name: "人工薬"
 synth.1020.desc: "人工生命としての新たな形態は、 我々を有機的肉体の病と怪我から解放してくれた。 しかし残念なことに、 単純な機械の故障から命に関わるサーバーの安定性、 接続問題、 デジタルウイルスにいたるまで多くの新しい問題も生まれた。\n\n機体は消耗品と見なし、 デジタル化された精神を保護することに注力すべきか、 あるいは我々の自我の拡張として機体をもっと大切にするべきか？"
 synth.1020.a: "引き続き機体は守らなければならない。"
 synth.1020.a.spiritual: "機体は魂の聖なる器だ。"
 synth.1020.b: "精神の保護に集中しろ。"
 synth.1020.b.spiritual: "我々は既に物理的存在を超越した。"
 synth.1020.c: "バランスが鍵だ。"
 synth.1020.d: "こうした新たな病には大きな成長の可能性が秘められている……"
 synth.1030.name: "リスポーン"
 synth.1030.desc: "我々はより高速に、 より優秀に、 そしてより強くなった。 人工機体を危機的状況に陥らせることにはいまだ精神的負荷がかかる。 精神が復元可能であるとわかっているので心的外傷は和らいでいるのかもしれないが、 まったく傷付かないわけではない。 復元が常に保証されているわけではないのだからなおさらだ。 新しい機体も単純に何もないところから製造することはできない。\n\n我々は心的外傷を度外視し、 人工生命の性能の限界を押し広げるか、 あるいは人々の精神的幸福を脅かさないよう野心を抑えてもいい。"
 synth.1030.a: "引き続き限界を押し広げろ。"
 synth.1030.b: "慎重にやれ。"
 synth.1030.c: "上流階級は危険にさらされるべきではない。"
 #FINAL EVENT #
 synth_virtual_trait: "\n[owner.species.GetNamePlural]が特性を獲得：§Y$trait_robot_digital_1$§!\nリーダーは§Y$leader_trait_synthetic$§!の特性を§Y$leader_trait_virtual$§!の特性に置き換える"
 synth_physical_traits: "\n種族改良のための§Y上級特性§!をアンロック"
 #DEMOCRATIC
 synth.1505.name: "人工生命体社会"
 synth.1505.desc.physical: "個性の完全なる消去は我々の意図するところではない。 我々は取り返しのつかない形で自我を失うことなく、 人工生命化から利益を得ることが可能だ。\n\nこの変化に伴い、 移動の自由はこれまで以上に手に入りやすくなった。 我々は自身の意識を大量の特殊機体に移すことができる。 これにより人々は最も求められている場所に住み、 働くことができるようになる。"
 synth.1505.desc.virtual: "我々の社会は現実世界から解放され、 興奮と不安が入り混じった気持ちで未来を見据えている。 いまだ完全に理解が得られていない方法で自身の姿を変えた我々はこの重大な旅に共に乗り出す。\n\n人々は今、 意識を危険にさらすことなく機械と連動することができる。 これは戦争の危機や冷酷な宇宙を潜り抜けてきた歴史における重大な節目である。"
 synth.1505.desc.neutral: "理解しがたい変化の最中にとまどってしまうのは仕方がない。 多くの者が得られるものではなく失ってしまうかもしれないものを気に掛けている。 しかし、 我々はこの岐路に立ち、 いつまでも何もしないままではいられない。 それゆえに人々を前進させなければならないのだ。\n\nこれの意味するところは、 人々が自由に乗り込める特別な個別機体を揃えるか、 あるいは彼らの人工生命形態を完全に受け入れ、 宇宙航行と戦争の苦難に耐えるかである。"
 synth.1505.a: "物理的機体間の移動を促進しろ。"
 synth.1505.a.tt: "$change_auth_tt$ ['concept_auth_synth_democratic_physical'] $synth_physical_traits$"
 synth.1505.b: "代理者を利用し、 我々のために戦わせろ。"
 synth.1505.b.tt: "$change_auth_tt$ ['concept_auth_synth_democratic_virtual'] $synth_virtual_trait$"
 synth.1505.c: "$synth_keep_auth_option$"
 synth.1505.c.tt: "$keep_auth_tt$ ['concept_auth_democratic']"
 #OLIGARCHIC
 synth.1510.name: "人工生命体社会"
 synth.1510.desc.physical: "我々の人工生命化された社会、 改善された人工機体、 そして大衆感情のすべてが人工生命化におけるより保守的な選択を指し示している。 特注の物理的形体を維持しながらも、 我々はほとんど自由に機体を交換することができる。\n\nこれにより、 経験豊富な役人が一時的に無能な者たちを制御できるようになり、 官僚的性能が著しく向上する。"
 synth.1510.desc.virtual: "我々は人工生命化革命における、 次なる当然の一歩を踏み出す準備ができている。 完全な仮想世界生活の導入である。\n\n現実世界の仕事は仮の機体がこなすが、 多くの人々はより非物質的な状態へ移行することに協力的である。\n\nこれにより、 より素早く高効率で指令を実行できるようになり、 政府による監督の必要性もずっと小さくなる。"
 synth.1510.desc.neutral: "我々は全社会を人工生命体としての生活に適応させたが、 データ上ではさらなる専門化の恩恵についていまだ結論が出ていない。\n\n我々は監督者である役人が無能な部下の機体を乗っ取れるよう自我バックドアを創造することができるが、 それとは別に、 遅延なく複数の政府プロジェクトを同時に監督できる、 ネットワーク化された仮想インターフェースを開発することもできる。"
 synth.1510.a: "役人たちが無能な仲間を乗っ取れるようにしろ。"
 synth.1510.a.tt: "$change_auth_tt$ ['concept_auth_synth_oligarchic_physical'] $synth_physical_traits$"
 synth.1510.b: "完全な仮想世界における監督方法を採用しろ。"
 synth.1510.b.tt: "$change_auth_tt$ ['concept_auth_synth_oligarchic_virtual'] $synth_virtual_trait$"
 synth.1510.c: "$synth_keep_auth_option$"
 synth.1510.c.tt: "$keep_auth_tt$ ['concept_auth_oligarchic']"
 #DICTATORIAL
 synth.1515.name: "人工生命体社会"
 synth.1515.desc.physical: "人々は純粋な肉体労働を前にしてもひるまない。 ネットワーク化された労働者たちは今や複数の機体を遠隔操作することができ、 その過程で生産ノルマが大幅に上昇した。\n\nこれは我々の最高指導者§Y[From.GetRulerTitle][From.GetRulerName]§!の導きを信頼した我々が正しかったという証拠だ。"
 synth.1515.desc.virtual: "人々はデジタル意識のために物理的形体を放棄する準備が整っている。 彼らは完全な仮想世界で余生を過ごすことに乗り気だ。\n\nそれゆえ彼らの感覚は我々に譲り渡され、 我々は現実を自由に操れるようになり、 国家に対する好意的感情を高めることができた。 指導者たちに協調する人々は強い国家の柱だ。"
 synth.1515.desc.neutral: "§Y[root.GetSpeciesAdj]§!の人々は、 デジタル化された意識がどういう形態を取るべきなのかいまだ決めかねている。 保守派であれば我々を物理的身体に深く根差したままでいさせるだろうが、 他の者たちはこれを新旧が混ざった「生半可なやり方」であるとし、 不快に思うことだろう。\n\nその選択をするのは我々の責任だ。 物質的世界に注力すれば単独の労働者が複数の機体を制御できるようになるが、 仮想世界であればかつてない規模で社会を制御することが可能になる。"
 synth.1515.a: "人工神経労働者の機体を製造しろ。"
 synth.1515.a.tt: "$change_auth_tt$ ['concept_auth_synth_dictatorial_physical'] $synth_physical_traits$"
 synth.1515.b: "仮想空間で世論を操れ。"
 synth.1515.b.tt: "$change_auth_tt$ ['concept_auth_synth_dictatorial_virtual'] $synth_virtual_trait$"
 synth.1515.c: "$synth_keep_auth_option$"
 synth.1515.c.tt: "$keep_auth_tt$ ['concept_auth_dictatorial']"
 #IMPERIAL
 synth.1520.name: "人工生命体社会"
 synth.1520.desc.physical: "帝国は我々の新しい人工ボディの強化を支持している。\n\nこれらの新しい形態は、 最近亡くなったエリートの陽電子頭脳を分解し、 知識の痕跡を得ることが可能になる。 帝国に仕える者として、 これは彼らが望んでいたことに違いない。"
 synth.1520.desc.virtual: "§Y[From.GetSpeciesAdj]§!はさらに先へ進むことに協力的で、 現実世界の中途半端な方策よりも、 完全な仮想世界を支持している。 この重大イベントは我々の遠い未来まで反響する衝撃波を生むだろう。 自我移植を高速化し、 その範囲を拡大することで、 危険な任務の最中に破壊された人工機体をすぐに入れ替えることができる。\n\nこうした新開発により、 様々な戦争関連の状況における効率が改善され、 §Y[From.GetSpeciesAdj]§!帝国に栄光がもたらされるだろう！"
 synth.1520.desc.neutral: "§Y[From.GetSpeciesAdj]§!帝国は岐路に立たされている。 特注の物理的機体が安心感と親近感を生むと信じる者もいるが、人工生命化を最大限に利用すればあらゆるものが手に入ると主張する者もいる。\n\n物理的側面に注力すれば、 破壊されたばかりの高官の知識を研究活動に役立てることができる。 一方で、 仮想世界の道を進めば、 自我の高速移植により、 破壊された人工機体の大量交換が可能になる。"
 synth.1520.a: "逝去したリーダーたちの頭脳を利用しろ。"
 synth.1520.a.tt: "$change_auth_tt$ ['concept_auth_synth_imperial_physical']"
 synth.1520.b: "使い捨ての物理的機体を製造しろ。"
 synth.1520.b.tt: "$change_auth_tt$ ['concept_auth_synth_imperial_virtual']"
 synth.1520.c: "$synth_keep_auth_option$"
 synth.1520.c.tt: "$keep_auth_tt$ ['concept_auth_imperial']"
 #CORPORATE
 synth.1525.name: "人工生命体社会"
 synth.1525.desc.physical: "我々のマーケティングおよび研究部門が、 顧客基盤全体へのAIの応用において新たな革新案を考え付いた。 うまくバランスを取りながら新しい人工的生活へアプローチをかければ、 仮想世界を利用して現実世界に利益をもたらす製品を開発できる。\n\n我々は今、 無機物に制約付きのAIを埋め込むことで、 実質的に生命を創り出すことが可能だ。 この新たな製品区分は消費者、 民間部門、 そのほか銀河の利害関係者をターゲットにできる。"
 synth.1525.desc.virtual: "我々の仮想空間への献身は、 記憶を基盤とするまったく新しい製品ラインへの扉を開いた。 支社にいる技術者たちは、 表現型を問わず、 志願者から記憶を抽出することができる。\n\nこうした情報はそののち諜報部による精査を受け、 これにより我々はその分野において他の帝国よりも競争上優位に立てる。 最後に、 その記憶は我々の人工精神創造プロセスに組み込まれ、 性能を大きく向上させる。"
 synth.1525.desc.neutral: "綿密な費用便益解析を行ったものの、 人工生命化プロセスにおける現実世界あるいは仮想世界への特化はいずれも他方より優れているというわけではない。 しかしながら、 我々はこのような絶好の機会にただ立ち尽くすわけにはいかない。 利害関係者のために明確な道を示さなければならないのだ。\n\n現実世界に注力すれば、 制限付きAIを無機物に埋め込み、 それを簡易生命体として売り出すことができるようになる。 仮想世界への投資は記憶および思考パターンの商品化を可能にするだろう。"
 synth.1525.a: "制限付きAI生命体を流通させろ。"
 synth.1525.a.tt: "$change_auth_tt$ ['concept_auth_synth_corporate_physical'] $synth_physical_traits$"
 synth.1525.b: "人々の記憶を商品化しろ。"
 synth.1525.b.tt: "$change_auth_tt$ ['concept_auth_synth_corporate_virtual'] $synth_virtual_trait$"
 synth.1525.c: "$synth_keep_auth_option$"
 synth.1525.c.tt: "$keep_auth_tt$ ['concept_auth_corporate']"
