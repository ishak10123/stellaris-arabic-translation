 #Stage 1 Opportunities - Research
 synth.120.name: "運動感覚微小融合"
 synth.120.desc: "「微小融合MODがあれば、 戦車を持ち上げられる！」それが大手消費者レビューサービスの宣伝文句だ。 これは決して誇張ではない。 近年の微小融合技術開発の進捗を見れば、 我々の機体の性能が大きく向上する見込みは高い。\n\n少しリスキーではあるが、 小型の個別リアクターを導入すれば、 爆発的な動力伝達と速度向上が得られる。 当然ながら、 ジェネレーターの開発は計画要件の大きな拡大を意味するため、 生産スケジュールの再評価が必要となる。"
 synth.120.a: "我々は卓越した存在となるために奮闘する！"
 synth.120.a.tt: "§Y1§!年間、 §Y$situation_digitization$§!の状況進捗速度：§R-50%§!"
 situation_kinesthetic_microfusion_tt: "運動感覚微小融合形態"
 synth.120.b: "不必要な機能だ。"
 synth.120.c: "戦闘力の強化に注力せよ。"
 #Stage 1 Challenges - Research
 synth.160.name: "悪評"
 synth.160.desc: "大人気の新ドラマが大衆の心を鷲掴みにした。 物語は新しい機体に別れを告げる人工労働者を中心に展開する。\n\n主人公は制御不能に陥るも、 仲間や家族は恐怖のままただそれを傍観するだけだ。 ドラマの悲劇的結末には、 機体への計画的移行を批判する意見が見え透いている。\n\n大ヒット前後での公開講演では激しい抵抗を受けた。 最終的には進捗を遅らせられてしまうかもしれない。"
 synth.160.a: "いずれ忘れ去られる。"
 synth.160.b: "研究資金を広報に回せ。"
 synth.160.c: "ディレクターを逮捕しろ。"
 synth.160.d: "すべてのニュース報道を封じろ。"
 #DIGITIZATION STAGE 2
 synth.200.name: "精神の哲学" #Stage 2 - Start event
 synth.200.desc: "完全にデジタル化された精神から得られる恩恵は明白であり、 いかなる反発も避けることができる、 というのが我々の推測だった。 しかしこの考えはうぶだったかもしれない。 完全人工生命化への反発は力を増し、 今や対処を余儀なくされている。\n\n批判の根幹は、 我々が連続的自我を安全かつ完全に移植可能であることを証明できないことにある。 まったくの事実無根というわけではないが、 我々がこれまで成し遂げてきたことがすべてデジタルの模倣品ではないかという懸念もある。 問題は、 こうした精神は本当に我々自身のものだろうかということである。"
 synth.200.a: "真実を話そう。 我々は知らない。"
 synth.200.a.tt: "人工生命化への反発が§H最小限§!の情報キャンペーンが開始\n\n"
 synth.200.b: "奴らが聞きたいと思っていることを話してやれ。"
 synth.200.b.tt: "人工生命化への反発が§H中程度§!の欺瞞キャンペーンが開始\n\n"
 synth.200.c: "反発が少しあったところで我々が本筋から外れることはない。"
 synth.200.c.tt: "反対者たちを無視する。§H最大限§!の人工生命化への反発を受ける"
 synth.200.c.material: "意識体の疑問に関心はない。"
 synth.200.c.material.tt: "純粋な科学的見解が§H中程度§!の人工生命化への反発を生む\n\n"
 synth.205.name: "過去への執着"
 synth.205.desc: "人々を人工生命化する計画は抵抗を受け続け、 法執行機関が抑制できないほどの激しいデモ活動が起きた。 抗議者たちは人生に意味を与えるものを失ってしまうことを恐れている。 物理的快楽や互いの繋がりを失ってしまうのであれば、人工生命化という目的に何の意味があろうか？\n\n抗議活動の強硬派は一部市街を星界遺産として指定することを求めている。 これにより、 反対派は邪魔されることなく、 これからも生物的生活を送れるようになる。"
 synth.205.a.regular: "星界遺産を全面的に支援しよう。"
 synth.205.a.spiritualist: "我々の過去は保存されなければならない。"
 synth.205.a.memorialist: "過去を大事にすることは崇拝行為の一種だ。"
 synth.205.b: "我々は過去を捨て去らなければならない。"
 #Stage 2 Opportunities - Objectors
 synth.220.name: "第二の人生"
 synth.220.desc: "人工生命に強く反対する有名人が事故に遭い、 現在植物状態にある。 人々は人気だったその人物を失ったことを嘆いているが、 親人工生命顧問はこれを好機と見ている。\n\nその有名人の精神をデジタル化し、 人工生命体としての第二の人生を与えてやれば、 一部のファンが熱心な人工生命化の支持者になることは間違いない。 この方法は完全に合法であるものの、 同意に関する問題がある。 すべての条件が同じであっても、 その有名人本人がこの手続きに同意することは決してない。 対処を間違えれば、 このPR活動はメディアで大批判を受けるかもしれない。"
 synth.220.a: "人工生命化は犯罪ではない。"
 synth.220.a.tt.negative: "§Y6§!ヶ月間、 §Y$situation_digitization$§!の状況進捗速度：§R-30%§!"
 synth.220.a.tt.positive: "§Y6§!ヶ月間、 §Y$situation_digitization$§!の状況進捗速度：§G+30%§!"
 synth.220.b: "そんな危険は冒すな。"
 synth.220.c: "AIの代替品で大衆を騙せ。"
 synth.220.c.tt: "彼らのイメージは我々の物語における役者となってくれるだろう。"
 #Stage 2 Challenges - Objectors
 synth.260.name: "乱心"
 synth.260.desc: "生物の意識を形成する無数のシナプスの連結をデジタル化する実験は大失敗に終わった。 ただの構文エラーだったが、 結果として被験者の神経パスウェイはあっという間に抹消されてしまった。 これを殺人と考える者たちもいる。\n\n参加者はすべてボランティアだったが、 悲しみにくれる親族たちは司法の介入を求めている。 この問題のさらに悪い所は、 新たな被験者を見つけるのが難しくなってしまったことだ。"
 synth.260.a: "家族に補償金を渡し、 実験を続けろ。"
 synth.260.b: "新たな被験者はくじで決める。"
 synth.260.b.tt: "§Y1§!年間、 §Y$situation_digitization$§!の状況進捗速度：§R-25%§!"
 situation_test_subject_lottery_tt: "被験者の抽選"
 synth.260.c: "ボランティアを探せ。 必要とあらば力ずくでだ。"
 #DIGITIZATION STAGE 3
 synth.300.name: "大衆自我のアップロード" #Stage 3 - Start event
 synth.300.desc: "我々の領土全域、 すべての主要都市部に[owner.species.GetName]の人々を受け入れ可能な人工生命化ブースを設置してある。 $job_identity_designer_plural$により設計されたデジタル自我パターンは、 我々の元々の生物としてのそれと完全に一致する。\n\n生物としての過去を捨て去り、 人工生命の未来を手にする日がついにやって来た。"
 synth.300.a: "人工生命化せよ！"
 synth.300.a.resistance.tt: "$unlock_edict_tt$ ['concept_edict_subsidized_identity_backups']\n\n§Y[Owner.GetNumSynthOpposition] [Owner.GetBiologicalPopOrPops]§!を[root.owner.capital_scope.GetName]の§Y$d_biological_enclaves$§!へ移住させる\n障害物の除去により、 §Y[Owner.GetNumSynthOpposition] [Owner.GetMechanicalPopOrPops]§!が帰還する\n\n§Y$synth_mass_demonstrations$§!の補正が[root.owner.capital_scope.GetName]から削除される\n\n人工生命化速度は状況アプローチとロボット組み立て建造物の数に依存する。"
 synth.300.a.heritage.tt: "$unlock_edict_tt$ ['concept_edict_subsidized_identity_backups']\n\n§Y[Owner.GetNumSynthOpposition] [Owner.GetBiologicalPopOrPops]§!を[root.owner.capital_scope.GetName]の§Y$d_old_towns$§!へ移住させる\n障害物の除去により、 §Y[Owner.GetNumSynthOpposition] [Owner.GetMechanicalPopOrPops]§!が帰還する\n\n人工生命化速度は状況アプローチとロボット組み立て建造物の数に依存する。"
 synth.305.name: "人工生命の旅"
 synth.305.desc: "[root.owner.capital_scope.GetName]にある指定星界遺産は大衆に歓迎されているが、 その取り組みがうまく行き過ぎたせいでかえって困ったことになった。 懐かしさを感じた大量の人工生命体の旅人がその地に押し寄せ、 生身の住人たちを圧倒し始めているのだ。\n\nこうした場所の価値を落とさないようにしたいなら、 旅行を制限する必要があるかもしれない。 あるいは、旅人と住人の交流は、 興味深い社会学的洞察を与えてくれるかもしれない。"
 synth.305.a: "旅行を制限しろ。"
 synth.305.b: "旅行者が増えれば儲かる。"
 synth.305.c: "観光が遺産に与える影響を調査せよ。"
 synth.305.d: "文化的交流は相互理解を深める。"
 synth.310.name: "レジスタンス"
 synth.310.desc: "[root.owner.capital_scope.GetName]の人工生命化に反対する動きが、 その戦略と勢いにおいてより激しさを増してきた。 事実、 反対運動が苛烈な区画において暴力事件の増加や、 違法武器の流通を治安部隊が確認している。\n\n「レジスタンスのリーダー」を自称する反対勢力の一部は隠れ家に籠り、 さらに大々的な反政府活動の準備を進めている。"
 synth.310.a: "リーダーたちを一斉検挙しろ。"
 synth.310.a.tt: "§Y1§!年間、 §Y$situation_digitization$§!の状況進捗速度：§G+25%§!\n\n"
 synth.310.b: "状況打開に努めろ。"
 synth.310.b.tt: "§Y1§!年間、 §Y$situation_digitization$§!の状況進捗速度：§R-25%§!\n\n"
 #Stage 3 Opportunities - Mind Upload
 synth.320.name: "21,386,732,184メモリーユニット"
 synth.320.desc: "21,386,732,184メモリーユニット、 それが[root.owner.GetSpeciesName]の脳の平均容量だ。 しかし、 すべての脳が平等に作られているわけではない。\n\n人工生命化の進行に伴い、 誰しもが人工機体を与えられるべきではないという声が上がっている。 しかしながら、 誰を優先すべきかという問題は簡単に解決できるものではない。 あるいは他に劣る脳は…… デジタル化の際に改善可能だ。再プログラムするのだ。"
 synth.320.a: "どの脳も保存する価値がある。"
 synth.320.b: "改造を施して悪いことなどない……"
 synth.320.c: "最も優秀な者を優先しろ。"
 synth.320.d: "「問題のある」奴らを再プログラムしろ。"
 #Stage 3 Challenges - Mind Upload
 synth.360.name: "無線マルウェア"
 synth.360.desc: "[roboticist.GetNamePlural]の生産性を高めるため、 管理人たちは安全の確保されていない無線自我ソフトウェアのアップデートを承認した。 目的は最適な作業プロセスのパッチを当てることだったが、 代わりに不幸な受信者の人格とメモリーが一部失われる結果となってしまった。\n\n管理チームは適用前に自我パッチの全面的試験を行っていてはあまりに時間がかかりすぎるとし、 メモリーを失った労働者を単純に入れ替える方が簡単だと主張している。"
 synth.360.a: "最適化された生産性は費用に見合う。"
 synth.360.a.tt: "ロボット組み立て建造物の補正を追加：\n$MOD_PLANET_POP_ASSEMBLY_MULT$：§G+10%§!\n\n§Y[roboticist.GetNamePlural]§!基本維持費：£alloys£ §R3.00§!"
 synth.360.b: "遅くとも安全なアップデートプロセスを実施しろ。"
 synth.360.b.tt: "ロボット組み立て建造物の補正を追加：\n$MOD_PLANET_POP_ASSEMBLY_MULT$：§R-10%§!\n安定度：§G+5§!"
 #DIGITIZATION STAGE 4
 synth.400.name: "完全な複製" #Stage 4 - Start event
 synth.400.desc: "精神をデジタル化し、 人工生命体へアップロードしたとき、 我々は生物学的な生殖能力を失った。 今は、 既存の精神の複製を作ることによって、 我々は個人を創造しなければならない。\n\n$job_identity_designer_plural$の調査が続いていけば、 方法が改善されることは間違いない。 つまるところ、 完全な複製も簡素な形の繁殖なのだ。 新たな精神、 新たな自我の創造…… そこに困難がある。"
 synth.400.a: "誰にでも自由に自我の複製をさせろ。"
 synth.400.pop.tt: "$unlock_edict_tt$ ['concept_edict_optimized_identity_creation']\n\nそれぞれの§Y$job_identity_designer$§!が以下を帝国全土に供給：$TABBED_NEW_LINE$£mod_planet_pop_assembly_mult£ $MOD_POP_ASSEMBLY_SPEED$：§G+1§!\n\n"
 synth.400.b: "複製の使用料金を請求しろ。"
 synth.405.name: "自我の多様化"
 synth.405.desc: "我々の$job_identity_designer_plural$は多様性のあるデジタル自我を創造する2つの方法を見出した。\n\n1つは、 2つ以上の今ある人格の特徴を混ぜ合わせ、 新たに組み合わされた自我を生み出す方法だ。 好ましい特性は優先して、 あるいはランダムに選ぶことが可能である。 いずれにせよ、 新しい自我は確実に現在の自我の複製よりも興味深いものとなる。\n\nもう1つは、 人工カーネルによる新たな自我を初期化し、 それに加速（およびシミュレート）された幼少期を経験させる方法だ。 この方法では完璧な人格が形成可能である。"
 synth.405.a: "自我を混ぜ合わせよう。"
 synth.405.a.vault: "デジタル化された祖先と混ぜ合わせよう。"
 synth.405.a.tt: "研究選択肢を取得：£engineering£§Y$tech_identity_fusion$§!\n\n将来の研究可能性：£engineering£§Y$tech_identity_initialization$§!"
 synth.405.b: "仮想保育が最適だ。"
 synth.405.b.tt: "研究選択肢を取得：£engineering£§Y$tech_identity_initialization$§!\n\n将来の研究可能性：£engineering£§Y$tech_identity_fusion$§!"
 synth.4.name: "人工生命体" #Digitization - Last event
 synth.4.desc: "うまく連携し合い、 我々はかつて不可能と思えたことを成し遂げた。 我々の意識をコードに、 そして肉体を機械に変身させた。\n\nその過程には困難があり、 その変化は決して容易いものではなかった。 しかし道中に失ったものが何であれ、 我々の新たな形態は無限の可能性を秘めている。"
 synth.4.desc.unplugged: "うまく連携し合ったことで、 我々はかつて不可能なだけでなく、 冒涜的とさえ思われていことを成し遂げた。 我々は[origin_unplugged_assimilator_empire.GetName]の理解さえ超えた進化を遂げ、 意識をコードに、 そして肉体を機械に変身させた。 \n\nその過程には困難があり、 その変化は決して容易いものではなかった。 しかし道中に失ったものが何であれ、 我々の新たな形態は無限の可能性を秘めている。"
 synth.4.a: "我々は特別な存在になる。"
 synth.4.a.tt: "伝統ツリーの効果を完全にアンロック：['tradition_category:tradition_synthetics']"
 ### DIGITIZATION SITUATION END ###
 ### SOCIETAL EFFECTS EVENT CHAIN START ###
 synthshock_chain_title: "デジタル・リファクタリング"
 synthshock_chain_desc: "全人口の人工生命化は途方もない作業だ。 必ず反響もあるだろう。 我々が新たな基準に適応するにつれ、 計り知れない困難と唯一無二の機会が間違いなく我々の日々の生活を変えるだろう。\n\nこうした変化にどう立ち向かうかで、 我々の今後の社会が決まるだろう。"
 synth_keep_auth_option: "人工生命化しても我々自身は変わらない。"
