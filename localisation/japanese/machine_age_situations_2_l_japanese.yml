 auth_synth_democratic_virtual: "民主的代理"
 auth_synth_democratic_virtual_desc: "兵士たちを遠隔操作の最新式代理兵士に置き換えることで、 大衆への戦争の影響を抑える。 乗員には部屋も操舵室も必要なくなるため、 艦艇も小型にできる。"
