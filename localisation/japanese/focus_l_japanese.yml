 exploration.110.success: "£trigger_yes£ $exploration.110.req$"
 exploration.115.name: "異星生命体を見つける"
 exploration.115.desc: ""
 exploration.115.hint: "新しい異星生命体を見つけるまで、 £science_ship£ ['concept_science_ship']を使って新しい£system£ ['concept_systems']を調査する。"
 exploration.115.lore: "§L「異星生命体の探索は、 それが可能かどうかというのは問題ではない。 いつ見つかるかということが問題だ。 そしてもし見つけた場合、 我々はそれを正しく生命として認識できるのだろうか？」§!"
