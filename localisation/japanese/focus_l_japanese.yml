 development.205.hint: "£interface£ ['Concept_contacts_view']の$contacts_view_tab_contacts$タブで他の['concept_empire']にこの['concept_diplomatic_pact']を提案する。"
 development.205.lore: "§L「第三者への恐怖ほど、 2つの帝国を結びつけるものはない」§!"
 development.205.req: "防衛協定を締結している"
 development.205.fail: "£trigger_no£ $development.205.req$"
 development.205.success: "£trigger_yes£ $development.205.req$"
 development.215.name: "役人を総督に任命"
 development.215.desc: ""
 development.215.hint: "£interface£ ['Concept_colony_view']の$colony_view_tab_planet_summary$タブか£interface£ ['concept_planets_and_sector_view']で、 £official£ ['concept_official']を£sector£ ['concept_sector']または£planet£ ['concept_planet']の['concept_governor']として任命する。"
 development.215.lore: "§L「統治者は称賛され、 将軍は恐れられる。 真の行政官はどちらでもない。 なぜなら、 彼らの仕事は人知れずに行われるのが理想的だからだ」 - フルエント・シャール・アスタテン長官§!"
 development.215.req: "役人を総督に任命した"
 development.215.fail: "£trigger_no£ $development.215.req$"
 development.215.success: "£trigger_yes£ $development.215.req$"
 development.220.name: "銀河共同体に参加"
 development.220.desc: ""
 development.220.hint: "['concept_galactic_community']に参加する招待に応えるか、 銀河共同体が形成されてから£interface£ ['concept_outliner']の上にある§H$concept_galactic_community$§!を開いて参加を申請する。"
 development.220.lore: "§L「かつて我々は一粒の種だった。 しかし今や我々は星々を覆う花園の一部だ」 - 銀河共同体第一代議長、 黒の花びら§!"
 development.220.req: "銀河共同体に参加している"
 development.220.fail: "£trigger_no£ $development.220.req$"
 development.220.success: "£trigger_yes£ $development.220.req$"
 development.225.name: "好意を獲得"
 development.225.desc: ""
 development.225.hint: "£interface£ ['Concept_contacts_view']の$contacts_view_tab_contacts$タブで他の['concept_empire']と接触し、 ['concept_favor']を与えるまで§H関係を改善§!を選択する。$focus_other$"
 development.225.lore: "§L「好意は通貨ではないが、 通貨のように使われる。 重みはないが、 外交の天秤を傾けることができる」§!"
 development.225.req: "好意を獲得した"
 development.225.fail: "£trigger_no£ $development.225.req$"
 development.225.success: "£trigger_yes£ $development.225.req$"
 development.230.name: "役人をレベルアップ"
 development.230.desc: ""
 development.230.hint: "£official£ ['concept_official']を['concept_council']、 ['concept_galactic_community']、 または['concept_federation']の['concept_governor']として任命する。\n\nこのような任務は貴重な経験となり、 司令官がレベルアップし、 新しい['concept_leader_traits']を身に着けることを可能にする。"
 development.230.lore: "§L「統治の第一の教訓。 誰も幸せでないなら、 おそらく正しいことをしているであろう」 - 『退屈による試練：公式ガイドブック』§!"
 development.230.req: "役人をレベルアップさせた"
 development.230.fail: "£trigger_no£ $development.230.req$"
 development.230.success: "£trigger_yes£ $development.230.req$"
 development.300.name: "ダイソン・スウォームを建設 (80エネルギー)"
 development.300.desc: "($energy$を少なくとも80産出している)"
 development.300.hint: "£physics£ §H$tech_dyson_swarm$§!テクノロジーを研究した後、 適切な['concept_star']を見つけて、 £construction_ship£ ['concept_construction_ship']を使って§H$tech_dyson_swarm$§!£megastructure£ ['concept_megastructure']を建設する。"
 development.300.lore: "§L「我々はその星を一目見て、 こう考えた。 もしそれに課税したらどうなるだろう？」§!"
