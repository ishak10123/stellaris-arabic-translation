 core.112.fail: "£trigger_no£ $core.112.req$"
 core.112.success: "£trigger_yes£ $core.112.req$"
 core.114.name: "布告を施行"
 core.114.desc: ""
 core.114.hint: "£interface£ ['concept_government_view']の§H$government_view_tab_policies_and_edicts$§!タブで、 ['concept_tradition']を採用する。"
 core.114.lore: "§L「市民の皆様：勅令827-Bが正式に発効されました。 完全なコンプライアンスガイドラインについては、 第34項、 第12条をご覧ください。 実りある一日を！」§!"
