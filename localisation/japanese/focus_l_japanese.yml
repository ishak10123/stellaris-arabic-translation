 core.118.hint: "£energy£ ['concept_energy']を集めるには、 £interface£ ['concept_colony_view']の$colony_view_tab_planet_summary$タブで£district£ ['concept_generator_districts']を建設する。\n\nまたは、 エネルギーが豊富にある['concept_celestial_objects']の周辺に£mining_station£ ['concept_mining_stations']を建設するか、 £market£ ['concept_market']や他の['concept_empires']から£energy£ §H$concept_energy$§!を購入する。$focus_other$"
