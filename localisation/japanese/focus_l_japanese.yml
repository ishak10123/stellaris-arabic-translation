 # Core Focus Cards
 ###################
 core.100.name: "植民地を開拓する"
 core.100.desc: ""
 core.100.hint: "£colony_ship£ ['concept_colony_ship']を使用して、 居住可能な£planet£ ['concept_planet']に入植する。"
 core.100.lore: "§L「新しい惑星は単なる資産ではなく、 責任である」 - 第223版『植民地運営マニュアル』§!"
 core.100.req: "植民地を発見した"
 core.100.fail: "£trigger_no£ $core.100.req$"
 core.100.success: "£trigger_yes£ $core.100.req$"
 core.102.name: "開発構想を設定"
 core.102.desc: "(首都を除く)"
 core.102.hint: "首都ではない植民地で、 £interface£ ['concept_colony_view']の$colony_view_tab_planet_summary$を開いて['concept_designation']を変更。"
 core.102.lore: "§L「公式的には、 植民地の指定は効率性を高める。 非公式的には、 それは『ほとんどが岩』を経済戦略のように聞こえさせるための手段にすぎない」§!"
 core.102.req: "惑星の開発構想を変更した"
 core.102.fail: "£trigger_no£ $core.102.req$"
 core.102.success: "£trigger_yes£ $core.102.req$"
 core.104.name: "採掘ステーションを建設"
 core.104.desc: ""
 core.104.hint: "£construction_ship£ ['concept_construction_ship']を使って、 適切な['concept_celestial_object']の上に£mining_station£ ['concept_mining_station']を建設する。"
 core.104.lore: "§L「ある者は小惑星しか見えない。 我々には都合の悪い形をしたクレジットの山が見える」§!"
 core.104.req: "採掘ステーションを建設した"
 core.104.fail: "£trigger_no£ $core.104.req$"
 core.104.success: "£trigger_yes£ $core.104.req$"
 core.106.name: "建造物を建設"
 core.106.desc: ""
 core.106.hint: "£interface£ ['concept_colony_view']の$colony_view_tab_planet_summary$タブで、 利用可能な§H建造物スロット§!をクリックして、 建設する£building£ ['concept_building']を選択する。"
 core.106.lore: "§L「今日の建設現場は明日の文明だ」§!"
 core.106.req: "建造物を建設した"
 core.106.fail: "£trigger_no£ $core.106.req$"
 core.106.success: "£trigger_yes£ $core.106.req$"
 core.108.name: "星系基地のモジュールを建設"
 core.108.desc: ""
 core.108.hint: "£interface£ ['concept_starbase_view']の$starbase_view_tab_command$タブで、 利用可能な§H星系基地のモジュール§!を選択して建設する。"
 core.108.lore: "§L「冒険があると約束された。 しかし実際にあったのは数ヶ月にわたる沈黙と循環空気だけだった。 そして、交易拠点が使えるようになった。 ようやくここに留まる価値のあるものが現れたのだ」§!"
 core.108.req: "星系基地のモジュールを建設した"
 core.108.fail: "£trigger_no£ $core.108.req$"
 core.108.success: "£trigger_yes£ $core.108.req$"
 core.110.name: "星系基地建造物を建設"
 core.110.desc: ""
 core.110.hint: "£interface£ ['Concept_starbase_view']の$starbase_view_tab_command$タブで、 利用可能な§H星系基地の建造物§!を選択して建設する。"
 core.110.lore: "§L「銀河の位置付けが星系基地の機能を定義し、 建造物がそれを洗練する」 - 『軌道工学：理論と応用』§!"
 core.110.req: "星系基地建造物を建設した"
 core.110.fail: "£trigger_no£ $core.110.req$"
 core.110.success: "£trigger_yes£ $core.110.req$"
 core.112.name: "伝統を採用"
 core.112.desc: ""
 core.112.hint: "£interface£ ['concept_society_management_view']の$society_management_view_tab_traditions$タブで、 ['concept_tradition']を採用する。"
 core.112.lore: "§L「伝統のない者には目的意識がない。 伝統に縛られた者は停滞する。 知恵とは、 どちらを継承するかを選択することにある」§!"
