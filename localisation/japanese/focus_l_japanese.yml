 exploration.110.lore: "§L「難しいのはデータの解釈だと思っているだろう。 だがそれは違う。 本当に難しいのは、 発見したことが実際に重要だということを人々に納得させることだ」§!"
 exploration.110.req: "スペシャルプロジェクトを完了した"
