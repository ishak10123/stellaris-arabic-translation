 development.305.name: "アーク炉を建設"
 development.305.desc: "(15以上の惑星がある星系)"
 development.305.hint: "£engineering£ §H$tech_orbital_arc_furnace$§!テクノロジーを研究した後、 15以上の£planet£ ['concept_planets']がある£system£ ['concept_system']で§H溶融惑星§!を見つけて、 £construction_ship£ ['concept_construction_ship']を使って§H$tech_orbital_arc_furnace$§!£megastructure£ ['concept_megastructure']を建設する。"
 development.305.lore: "§L「太陽が地平線を昇り、 一瞬、 建造物全体が黄金色に燃える。 何千キロにもわたる足場と鋼鉄……我々がこれを建設した。 我々は、 この惑星を炉としたのだ」§!"
 development.305.req: "アーク炉を建設した"
