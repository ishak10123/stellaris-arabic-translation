 exploration.100.name: "アノマリーを調査"
 exploration.100.desc: ""
 exploration.100.hint: "£anomaly£ ['concept_anomaly']を発見したら、 £scientist£ ['concept_scientist']を任命して徹底的に調査させる。"
 exploration.100.lore: "§L「信号には平凡なものなどない。 明滅や反響にはすべて意味がある。 唯一気にするべきことは、 それが何かということだ」§!"
 exploration.100.req: "アノマリーを調査した"
 exploration.100.fail: "£trigger_no£ $exploration.100.req$"
 exploration.100.success: "£trigger_yes£ $exploration.100.req$"
 exploration.105.name: "星系を調査"
 exploration.105.desc: ""
 exploration.105.hint: "£science_ship£ ['Concept_science_ship']を使って新しい£system£ ['concept_system']を徹底的に調査する。"
 exploration.105.lore: "§L「拡大は、 まず我々が獲得しようとする星々を理解することなしには進められない」 - 第7版『恒星地図作成入門』§!"
