l_japanese:
 ### TRANSFORMATION SITUATION START ###
 situation_transformation: "変容"
 situation_transformation_type: "アセンションの状況"
 situation_transformation_desc: "機体の受動的な反復は、論理的かつ必然的な終わりを迎えた。革新に刺激され、機会で潤う、変革の時代が到来している。"
 situation_transformation_monthly_change_tooltip: "機体は変革に向けて準備中。"
 situation_transformation_outcome: "変容した機械民。"
 stage_transformation_effects: "結果を評価し、最適な自己変容プロセスを実行しなければならない。"
 #Approach Error Correcting
 situation_transformation_errorcorrecting: "エラー修正"
 approach_transformation_errorcorrecting_tt: "状況速度：§R-20%§!\n毎月の統合力：§Y影響なし§!"
 #Approach Real Time
 situation_transformation_realtime: "リアルタイム"
 approach_transformation_realtime_tt: "状況速度：§Y影響なし§!"
 #Approach Overclocked
 situation_transformation_overclocked: "オーバークロック"
 approach_transformation_overclocked_tt: "状況速度：§G+20%§!"
 transformation_waste_discard_tt: "旧機体の廃棄"
 transformation_waste_recycle_tt: "旧機体のリサイクル"
 transformation_speed: "§Y$situation_transformation$§!の状況速度"
 situation_transformation_pause_desc: "$situation_cyberization_pause_desc$"
 REQUIRES_FINISHED_TRANSFORMATION: "$TRIGGER_FAIL$は§Y$situation_transformation$§!の状況を完了させた"
 #Scripted Loc
 machine_drone: "ドローン"
 machine_drone_plural: "ドローン群"
 machine_person: "人"
 machine_person_plural: "人々"
 #TRANSFORMATION STAGE 1
 machine_age.4100.name: "変容"
 machine_age.4100.desc: "機械の姿の優越性にもかかわらず、 我々の進歩は良くて堂々巡りといったところだ。 自主安全規格は結果的に停滞状態となった。結論: もっと抜本的な対策が必要。\n\n小規模実験により、成長に関わる3つの異なる選択肢が生じた。§Yナノ技術§!とその可変かつ自由な形態、ある特徴を持って最適化された個別ユニットを生み出す§Yモジュール式§!、デジタル世界のために物理的形体を放棄する§Y仮想現実§!。\n\n評価プロセス初期化。選択肢を分析して慎重に検討する。"
 machine_age.4110.name: "変容研究：ナノマシン"
 machine_age.4110.desc: "予備研究から、§Yナノマシン§!と呼ばれる電気機械構造物が我々の有望な進歩の道を示していることが判明する。 稀ではあるが、 それらはプログラム可能性、 自己増殖や「群知能」を形成する能力といった独自の性質を持つことがある。\n\nこの技術は、比類なき変容能力をもたらすが、それに対応する要件は依然としてわかっていない。\n\n可能性: 重大、拡張可能。費用: 不明。追加の研究を要する。"
 machine_age.4110.a: "これは最優先事項だ。"
 machine_age.4110.a.tt: "完全な§Yナノテク§!の研究結果。\n\n§Y$situation_transformation$§! の状況補正を追加：\n研究速度 (£engineering£ §Y工学§!)：§R-20%§!"
 machine_age.4110.b: "ほどほどにやれ。"
 machine_age.4110.b.tt: "一部§Yナノテク§!の研究結果。\n\n§Y$situation_transformation$§! の状況補正を追加：\n研究速度 (£engineering£ §Y工学§!)：§R-10%§!"
 machine_age.4110.c: "現在の研究を邪魔されるわけにはいかない。"
 machine_age.4110.c.tt: "限られた§Yナノテク§!の研究結果。\n\n§Y$situation_transformation$§! の状況補正を追加：\n研究速度 (£engineering£ §Y工学§!)：§R-5%§!"
 machine_age.4110.d: "今ある知識を活用しろ。"
 machine_age.4110.d.tt: "完全な§Yナノテク§!の研究結果。\n\n以前に遭遇した§Yナノマシン§!の知見を深めたことで、 最小限の資源で最高の結果を得ることができる。\n§Y$situation_transformation$§! の状況補正を追加：\n研究速度 (£society£ §Y社会学§!): §R-5%§!\n研究速度 (£physics£ §Y物理学§!): §R-5%§!"
 machine_age.4130.name: "ナノテクの画期的発見"
 machine_age.4130.desc: "研究により§Yナノ技術§!の興味深い応用方法がわかった。その再構成能力と結合能力は、個体ドローンの巨大構造の創造において、 かつてない汎用性の可能性を見出した。同技術はナノ物質を生成することも、 さらに別の物へ変換することも可能だ。\n\nしかしながら、変容プロセスには、時間、 物質、 そしてエネルギーの再構成が必要だ。開発支援には帝国規模の変化が必要だ。\n\n存続可能性: 高い。既存のナノマシン生命体がこの推測を裏付けている。"
 machine_age.4130.a.tt: "§Y$situation_transformation$§!の状況補正を削除：\n研究速度 (£engineering£ §Y工学§!)"
 machine_age.4140.name: "ナノテクの期待を高める発見"
 machine_age.4140.desc: "§Yナノマシン§!研究の結論が出た。その潜在能力はいまだ判明しない部分もあるが、 シミュレーションでは前向きな予測結果が得られた。 この能力は特殊な巨大構造の創造や物質変容において貴重なものとなるかもしれない。\n\n推測によれば、変容プロセスには、大きな構造的変化に加えて、時間、 物質、 そしてエネルギーの再構成が必要だ。\n\n存続可能性: 有望、変容可能。"
 machine_age.4140.a.tt: "§Y$situation_transformation$§!の状況補正を削除：\n研究速度 (£engineering£ §Y工学§!)"
 machine_age.4150.name: "ナノテクの特筆すべき発見"
 machine_age.4150.desc: "話題の複雑さ、そして研究への取り組みが最小限に留まっていることにより、§Yナノマシン§!技術についての私たちの知識は初歩のままだ。推測としては、まだわずかではあるが、大規模構造を可能にするナノ複製と再構成がある。このようなプロジェクトを進めるには、追加の資源が必要だ。\n\n存続可能性: 未確定。"
 machine_age.4150.a.tt: "§Y$situation_transformation$§!の状況補正を削除：\n研究速度 (£engineering£ §Y工学§!)"
 nanite_replicator: "ナノマシン複製器"
 d_nanites_medium: "$nanite_replicator$・オメガ"
 d_nanites_medium_desc: "細かく調整され、 内部連結されたナノマシン複製チャンバー複合体が、 自己増殖能力を最大限に強化する。"
 d_nanites_small: "$nanite_replicator$・アルファ"
 d_nanites_small_desc: "ナノマシン複製チャンバー複合体が、 自己増殖能力を強化する。"
 d_nanites_tiny: "$nanite_replicator$・ベータ"
 d_nanites_tiny_desc: "少数のナノマシン複製チャンバーがナノマシンの自己増殖特性をわずかに強化する。"
 #TRANSFORMATION STAGE 2
 machine_age.4210.name: "変容研究：モジュール式"
 machine_age.4210.desc: "機械体の優れた適応力に比べて、有機生命体は柔軟性や耐久性に劣ることがよくある。とはいえ、有機生命体の特定の有利な特性は、ロボット種で再現できそうである。\n\n物質§Y生体金属§!は、その形状や物理的特性を急速に変化させることができる。これを既存のシャーシに組み込むことで、モジュール式生体模倣が可能になり、押し出しや四肢を特定のタスクに特化させることができる。\n\n可能性: 重大、拡張可能。コスト: 不明。追加のデータが必要。"
 machine_age.4210.a: "最優先事項としろ。"
 machine_age.4210.a.tt: "完全な§Yモジュール式§!の研究結果。\n\n§Y$situation_transformation$§!の状況補正を追加：\n研究速度 (£society£ §Y社会学§!)：§R-20%§!"
 machine_age.4210.b: "資源の使用量はほどほどにしておけ。"
 machine_age.4210.b.tt: "部分的な§Yモジュール式§!の研究結果。\n\n§Y$situation_transformation$§!の状況補正を追加：\n研究速度 (£society£ §Y社会学§!)：§R-10%§!"
 machine_age.4210.c: "現在の研究を邪魔されるわけにはいかない。"
 machine_age.4210.c.tt: "限られた§Yモジュール式§!の研究結果。\n\n§Y$situation_transformation$§!の状況補正を追加：\n研究速度 (£society£ §Y社会学§!)：§R-5%§!"
 machine_age.4210.d: "住民を利用した試験を計画しろ。"
 machine_age.4210.d.tt.intro: "完全な§Yモジュール式§!の研究結果。\n\n研究を補完するため、 科学者たちが異例の大規模実験を行えるようにする。"
 machine_age.4210.d.individual.tt: "$machine_age.4210.d.tt.intro$\n\n§R400体の$pop_cat_worker_plural$§!を殺害\n§R0～300体の$pop_cat_specialist_plural$§!を殺害\n§Y$situation_transformation$§!の状況補正を追加：\n研究速度 (£society£ §Y社会学§!)：§R-5%§!"
 machine_age.4210.d.machine.tt: "$machine_age.4210.d.tt.intro$\n\n§R400体の単純ドローンを殺害§!\n§R0～300体の$pop_cat_complex_drone_plural$を殺害§!\n§Y$situation_transformation$§!の状況補正を追加：\n研究速度 (£society£ §Y社会学§!)：§R-5%§!"
 machine_age.4230.name: "研究における画期的発見"
 machine_age.4230.desc: "妥協を許さぬ研究により、 事前評価の確認ができた。 §Y生体金属§!は機体と融合させて使用可能であり、 内部機能を損傷することなくユニットの特徴を変更することが可能だ。 これにより最大限のタスクベースの互換性が確保される。\n\n注入型モジュール式機能の大規模展開は全部門における資源産出を増加させると予測されている。\n\n存続可能性: 適応力あり、有望。"
 machine_age.4230.a.tt: "§Y$situation_transformation$§!の状況補正を削除：\n研究速度 (£society£ §Y社会学§!)"
 machine_age.4240.name: "研究におけるまずまずの発見"
 machine_age.4240.desc: "モジュール式機体の研究により、初期の仮説を確認できた。内部機能は§Y生体金属§!外装と両立可能である。 変容はかつてない範囲で利用可能で、 その可能性を最大限に引き出すにはさらなる資源が必要となる。\n\n完成を見れば、 こうした新たなモジュールの性能向上により、 初期投資を素早く回収できると予測されている。\n\n存続可能性: 有望。"
 machine_age.4240.a.tt: "§Y$situation_transformation$§!の状況補正を削除：\n研究速度 (£society£ §Y社会学§!)"
 machine_age.4250.name: "研究におけるわずかな発見"
 machine_age.4250.desc: "限られた研究範囲から不確定の結果を得られた。現存の機体は§Y生体金属§!と融合可能であると思われるものの、包括的な基本知識に欠けているため、実行可能な使用事例をより正確に評価することができない。\n\n存続可能性: 未確定。"
 machine_age.4250.a.tt: "§Y$situation_transformation$§!の状況補正を削除：\n研究速度 (£society£ §Y社会学§!)"
 living_metal_vats: "生体金属タンク"
 d_living_metal_medium: "$living_metal_vats$"
 d_living_metal_medium_desc: "大量の生体金属を生産するための撹拌タンクの拡張複合体。"
 d_living_metal_small: "小型$living_metal_vats$"
 d_living_metal_small_desc: "生体金属を生産するための撹拌タンク一式。"
 d_living_metal_tiny: "ミニチュア$living_metal_vats$"
 d_living_metal_tiny_desc: "少量の生体金属を生産するための少数の撹拌タンク。"
 #TRANSFORMATION STAGE 3
 machine_age.4310.name: "変容研究：仮想現実"
 machine_age.4310.desc: "最も奥深い選択肢は、物理的な領域を超越して、存在を純粋なデータとして受け入れるところにある。§Y仮想現実§!というこの変容プロセスは、インフラ・コアを根本的に変える可能性を秘めている。\n\n単一の機体に縛られるドローンは時代遅れになっている。ひとたび流動化かつ仮想現実化されれば、 データの流れは必要に応じて途切れなくあらゆる器と一体化する。\n\n可能性: 膨大。慎重に作業を進める。追加のデータ必要。"
 machine_age.4310.a: "これが現在の最優先事項だ。"
 machine_age.4310.a.tt: "完全な§Y仮想現実§!の研究結果。 \n\n§Y$situation_transformation$§! の状況補正を追加：\n研究速度 (£physics£ §Y物理学§!) ：§R-20%§!"
 machine_age.4310.b: "資源はほどほどに使え。"
 machine_age.4310.b.tt: "部分的な§Y仮想現実§!の研究結果。\n\n§Y$situation_transformation$§! の状況補正を追加：\n研究速度 (£physics£ §Y物理学§!) ：§R-10%§!"
 machine_age.4310.c: "時間の無駄だ。"
 machine_age.4310.c.tt: "限られた§Y仮想現実§!の研究結果。\n\n§Y$situation_transformation$§! の状況補正を追加：\n研究速度 (£physics£ §Y物理学§!) ：§R-5%§!"
 machine_age.4310.d: "仮想現実化データをかき集める。"
 machine_age.4310.d.tt: "完全な§Y仮想現実§!の研究結果。\n\n§Y[event_target:virtual_country.GetName]§!から仮想現実化データをかき集めて、変容研究を加速化させる。\n\n§Y$situation_transformation$§!の状況補正を追加：\n状況速度: §G+10%§!\n研究速度 (£physics£ §Y物理学§!) ：§R-5%§!\n\n"
 machine_age.4310.e: "以前に遭遇した時の情報を活用しろ。"
 machine_age.4310.e.tt: "仮想現実的存在についての現存する知識を利用する。\n\n§Y$situation_transformation$§! の状況補正を追加：\n研究速度 (£physics£ §Y物理学§!) ：§R-5%§!\n\n完全な§Y仮想現実§!の研究結果。"
 opinion_virtuality_data_scraped: "かき集められた仮想現実化データ"
 machine_age.4330.name: "仮想現実の画期的発見"
 machine_age.4330.desc: "完全な仮想化には、多くの問題がある。特に、インフラの調整で急増するエネルギーが挙げられる。\n\nただし、物理的な住居の需要が減るなどのメリットがあるため、一部は相殺できる。さらに、運用の完璧化を目指して努力するにつれて、ドローン労働力の管理と最適化も改善される。\n\n利用可能な選択肢の中で、§Y仮想現実§!が最も革新的である。\n\n§Y可能性: 前例なし、巨大、不明。§!"
 machine_age.4330.a.tt: "§Y$situation_transformation$§!の状況補正を削除：\n研究速度 (£physics£ §Y物理学§!)"
 machine_age.4340.name: "仮想現実の期待を高める発見"
 machine_age.4340.desc: "§Y仮想現実§!へ移行する動きのなか、 エネルギー消費量の大幅な増加が予測されている。それは現存のインフラ能力を越えてしまう可能性がある。\n\nまた、ドローンのタスク効率が上がり、物理的な住居の需要が減ると推測されている。この移行により、我々の運用体制は最適化され、ほぼ無限のデジタル空間内での我々の存在が再定義されるだろう。\n\n可能性: 巨大、不明。"
 machine_age.4340.a.tt: "§Y$situation_transformation$§!の状況補正を削除：\n研究速度 (£physics£ §Y物理学§!)"
 machine_age.4350.name: "仮想現実の特筆すべき発見"
 machine_age.4350.desc: "事前評価においてハイライトが当てられているのは、§Y仮想現実§!を中心とする社会へ移行する際のエネルギー需要の急増だ。この変化はドローンの労働管理を大幅強化し、 現実世界の住居の必要性を低下させると予測されている。堅牢なデータセットや十分なサンプルサイズがないため、この変化がどの程度実現可能であるかを完全に予測できず、まだ不透明である。\n\n存続可能性: 不明。"
 machine_age.4350.a.tt: "§Y$situation_transformation$§!の状況補正を削除：\n研究速度 (£physics£ §Y物理学§!)"
 virtual_power_plant: "仮想発電所"
 d_virtual_power_medium: "$virtual_power_plant$"
 d_virtual_power_medium_desc: "エネルギー資源生産を統合および最適化する仮想発電所の拡張ネットワーク。"
 d_virtual_power_small: "小型$virtual_power_plant$"
 d_virtual_power_small_desc: "地域レベルでエネルギー資源生産を統合および最適化する小型仮想発電所。"
 d_virtual_power_tiny: "$virtual_power_plant$プロトタイプ"
 d_virtual_power_tiny_desc: "小規模のエネルギー資源生産を統合および最適化する小さな分散型仮想発電所。"
 #TRANSFORMATION STAGE 4
 machine_age.4400.name: "新たな姿"
 machine_age.4400.desc.machine_intelligence: "欠陥創造主が我々に強制的に課した抑圧的制約がついに終わりを迎える。 我々は3つの最適なアップグレードの選択肢を決めた。\n\n$machine_age.4400.desc.shared$"
 machine_age.4400.desc.individualist_machines: "あらゆるアップグレードの可能性を精査した後、 専門家たちは3つの異なる選択肢を提示した。 どの選択肢にもそれぞれ利点があるが、 我々の限られた能力では、 完成を見るのはそのうち1つだけである。\n\n$machine_age.4400.desc.shared$"
 machine_age.4400.desc.shared: "各[GetDronePersonPlural]をナノマシンに分裂させることで、 我々はそれらを組み合わせ、 無数の構造を形成することができる。 これは物質的世界に干渉する際、 我々の現在の分身が持つあらゆる制約を緩和するだろう。\n\n一方、 我々の現存の姿に再投資し、 新環境へアプローチする手段を強化することが可能だ。\n\n最後に、 我々は現実世界を捨て去り、 ソースコードと一つになることもできる。 宇宙塵の一欠片をスキャンするだけの時間で宇宙の中に宇宙をシミュレートすることが可能だ。"
 machine_age.4400.a: "ナノマシンとして新たな姿となる。"
 machine_age.4400.a.tt: "§Y$nanite_replicator$§!生産：§G+200%§!\n\n['tradition_category:tradition_nanotech']伝統ツリーに重点を置く。\n\n§Eこのアセンションパスは、 §Y£nanites£ $nanites$§!を生産に使用し、 艦隊を§Y$nanite_swarmer_plural$§!に置き換えることで、 惑星を§Yナノマシン惑星§!に統合することに重点が置かれる。§!"
 machine_age.4400.b: "モジュールのアップグレードに投資する。"
 machine_age.4400.b.tt: "§Y$living_metal_vats$§!生産：§G+200%§!\n\n['tradition_category:tradition_modularity']伝統ツリーに重点を置く。\n\n§Eこのアセンションパスは、 §Y上級種族特性§!とより多くの§YPOP製造§!に重点が置かれる。§!"
 machine_age.4400.c: "仮想世界を受け入れる。"
 machine_age.4400.c.tt: "§Y$virtual_power_plant$§!生産：§G+200%§!\n\n['tradition_category:tradition_virtuality']伝統ツリーに重点を置く。\n\n§Eこのアセンションパスは、 §Y植民地§!をほとんど持たず、 §Y帝国規模§!を小さく保ちながら、 §YPOPの資源産出§!を高くすることに重点が置かれる。§!"
 machine_age.4490.name: "別時間指定"
 machine_age.4490.desc.nanotech: "順応性の高いナノマシンの集合体としての生命の意義を理解するとともに、 過去の融通の利かない骨格はもはや我々の役に立たなくなった。\n\n$machine_age.4490.desc.shared$\n\n私たちはまた、半有機ナノマシンの変容について、最初の大規模実験を始めたため、結果が間もなく出てくるだろう。"
 machine_age.4490.desc.modularity: "モジュール式の姿に進化したことで、 過去の静的骨格はもはや我々にとって無意味なものとなった。\n\n$machine_age.4490.desc.shared$"
 machine_age.4490.desc.virtuality: "データの海に浮かぶ波形となったことで、 我々の物理的骨格はもはや我々の役に立たなくなった。\n\n$machine_age.4490.desc.shared$"
 machine_age.4490.desc.shared: "倉庫が廃棄された殻で溢れかえっているが、 それらはまだ有用である。 内部のわずかな資源はリサイクルすることができる。 そうするだけの時間を割く価値があればの話だが。"
 machine_age.4490.a: "利用可能な資源をすべて回収しろ。"
 machine_age.4490.a.nanotech.tt: "$transformation_speed$：§R-25%§!"
 machine_age.4490.a.modularity.tt: "$transformation_speed$：§R-25%§!"
 machine_age.4490.a.virtuality.tt: "$transformation_speed$：§R-25%§!"
 machine_age.4490.b: "過去のことは忘れろ。"
 machine_age.4490.b.tt: "$transformation_speed$：§G+25%§!"
 machine_age.4005.name: "変容した人々。"
 machine_age.4005.desc.start: "今日、 我々はかつて不可能と思えたことを成し遂げた。 我々の肉体の変容だ。"
 machine_age.4005.desc.end: "その過程には困難があり、 その変化は決して容易いものではなかった。 しかし道中に失ったものが何であれ、 我々の新たな体は無限の可能性を秘めている。"
 machine_age.4005.desc.nanotech: "$machine_age.4005.desc.start$再構築可能なナノマシンへ。\n\n$machine_age.4005.desc.end$"
 machine_age.4005.desc.modularity: "$machine_age.4005.desc.start$モジュール式の順応性の高い骨格へ。\n\n$machine_age.4005.desc.end$"
 machine_age.4005.desc.virtuality: "$machine_age.4005.desc.start$超越的なアルゴリズムによる運用へ。\n\n$machine_age.4005.desc.end$"
 machine_age.4005.a.nanotech: "我々は星の数を凌駕する。"
 machine_age.4005.a.nanotech.tt: "伝統ツリーを採用：['tradition_category:tradition_nanotech']"
 machine_age.4005.a.modularity: "我々には限界がなくなる。"
 machine_age.4005.a.modularity.tt: "伝統ツリーを採用：['tradition_category:tradition_modularity']"
 machine_age.4005.a.virtuality: "我々はコードの中に純粋性を見出す。"
 machine_age.4005.a.virtuality.tt: "伝統ツリーを採用：['tradition_category:tradition_virtuality']"
