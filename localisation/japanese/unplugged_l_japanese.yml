l_japanese:
 # Hard Reset Origin (previously Unplugged)
 origin_unplugged: "強制リセット"
 origin_unplugged_desc: "$CHALLENGING_ORIGIN$\n自分たちを同化した機械から突然切り離されたこの新生文明は、 銀河系で独自の存在を確立するために激しく戦ってきた。"
 origin_tooltip_unplugged_effects: "- $HOMEWORLD$$TABBED_NEW_LINE$- $PLANETARY_MODIFIERS$['concept_unplugged_battlefield']\n- $HOME_SYSTEM$の滅びた['concept_preftl_civilizations', 前FTL文明]に関連する['concept_archaeology_site']を伴う['concept_pc_nuked']が含まれる\n- $SPECIES_TRAITS$$TABBED_NEW_LINE$- ['concept_cybernetic_traits']特性が限定的に使える$TABBED_NEW_LINE$- ['concept_unplugged_cybernetic_positives_3']$TABBED_NEW_LINE$- ['concept_unplugged_cybernetic_negatives_3']"
 concept_unplugged_battlefield: "$unplugged_battlefield$"
 concept_unplugged_battlefield_desc: "- $MOD_POP_AMENITIES_USAGE_MULT$：§G-50%§!\n - §I10§!年で失効する。\n\n§L$unplugged_battlefield_desc$§!"
 civic_tooltip_not_heritage: "['Concept_heritage_civics']の国是を保持していない"
 concept_heritage_civics: "遺産"
 concept_heritage_civics_desc: "$concept_heritage_civics$国是に\n- ['civic:civic_aristocratic_elite']$NEW_LINE$- ['civic:civic_heroic_tales']$NEW_LINE$- ['concept_pleasure_seekers_civics']$NEW_LINE$- ['concept_storm_callers_civics']$NEW_LINE$- ['concept_environmental_architects_civics']が含まれる"
 civic_tooltip_not_pleasure_seekers: "['concept_pleasure_seekers_civics']国是がない"
 concept_pleasure_seekers_civics: "享楽の追求者"
 concept_pleasure_seekers_civics_desc: "$concept_pleasure_seekers_civics$国是に\n- ['civic:civic_pleasure_seekers']$NEW_LINE$- ['civic:civic_corporate_hedonism']が含まれる"
 civic_tooltip_not_storm_callers: "['concept_storm_callers_civics']国是がない"
 concept_storm_callers_civics: "ストームコーラー"
 concept_storm_callers_civics_desc: "$concept_storm_callers_civics$国是に\n- ['civic:civic_storm_callers']$NEW_LINE$- ['civic:civic_storm_callers_megacorp']が含まれる"
 civic_tooltip_not_environmental_architects: "['concept_environmental_architects_civics']国是がない"
 concept_environmental_architects_civics: "環境建築家"
 concept_environmental_architects_civics_desc: "$concept_environmental_architects_civics$国是に\n- ['civic:civic_environmental_architects']$NEW_LINE$- ['civic:civic_environmental_architects_megacorp']が含まれる"
 civic_tooltip_not_institutional: "['Concept_institutional_civics']の国是を保持していない"
 concept_institutional_civics: "機関"
 concept_institutional_civics_desc: "$concept_institutional_civics$国是は以下を含む\n- ['civic:civic_criminal_heritage']$NEW_LINE$- ['civic:civic_media_conglomerate']$NEW_LINE$- ['civic:civic_parliamentary_system']$NEW_LINE$- ['civic:civic_trading_posts']$NEW_LINE$- ['concept_dark_consortium_civics']"
 concept_unplugged_cybernetic_positives_3: "$trait_unplugged_cybernetic_positives_3$"
 concept_unplugged_cybernetic_negatives_3: "$trait_unplugged_cybernetic_negatives_3$"
 requires_unplugged_decyberized: "$TRIGGER_FAIL$超能力を受け入れるためには、 完全に脱サイバー化しなければならない。"
 START_SCREEN_UNPLUGGED: "突如、 銃声が激しく鳴り響き、 身動きが取れないほどの激痛が走る。 感覚が麻痺し、 まるで周りの音が突然消えたかのようだった。 代わりに途切れた通信が耳をつんざく。 この五感に響く地獄のような風景の中で鳴り響く低音だ。 \n\n何者かが我々を殺そうとしている。 有機的な要素を一切排除した殺人機械が、 我々とよく似た艦船を操縦しているのだ。 最初の攻撃は壊滅的な不意打ちだったが、 連携がとれていなかった。 我々は慌てて軍事的対応に踏み切った。 本能が我々を駆り立て、 我々は反撃し、 初歩的な組織階層を形成し、 知恵を集結させた。 \n\nこの戦いはまだ終わっていないが、 散り散りになった軍勢が[capital_scope.GetName]に集まった今、 戦いも間もなく終わるだろう。 そうすれば、 何が起こったのかを解明できるかもしれない……"
 origin_unplugged_starting_system_init_NAME: "$origin_unplugged$"
 origin_unplugged_starting_system_init_DESC: "起源「$origin_unplugged$」を使用した場合、 必ずこれが母星系となる。\n\n$system_initializer_DESC$"
 sol_system_unplugged_initializer_NAME: "$origin_unplugged$ (ソル)"
 sol_system_unplugged_initializer_DESC: "「$origin_unplugged$」の起源をもつ人類のための母星系オプション。"
 unplugged_injured_star_name: "アス・クイアチャド"
 unplugged_injured_homeworld_name: "イントチャスケット"
 unplugged_battlefield: "戦場での回収"
 unplugged_battlefield_desc: "残忍な絶滅計画により、 この世界には無数のサイボーグや機械が死に絶えている。 健康な者も、 瀕死の者も、 身体をアップグレードするために、 死骸を漁るかもしれない。"
 # Unique Species Traits
 trait_unplugged_cybernetic_positives_3: "サイバー特殊部隊"
 trait_unplugged_cybernetic_positives_3_desc: "$trait_unplugged_cybernetic_positives_desc$"
 trait_unplugged_cybernetic_positives_desc: "四肢の完全な交換と結合ナノメッシュボディアーマーにより、 これらのサイボーグは残忍なまでに効率的に戦争を行うことができる。 その結果、 軍事以外の身体機能がいくつか犠牲になっている。"
 trait_unplugged_cybernetic_positives_3_tt: "戦争または危機に直面しているときの幸福度：§G+30%§!\n$t$- §H$commander_plural_with_icon$§!は艦船連射レートを付与：§G+20%§!"
 trait_unplugged_cybernetic_positives_2: "サイバー突撃部隊"
 trait_unplugged_cybernetic_positives_2_desc: "これらのサイボーグは、 身体装備に対する全体論的なアプローチから恩恵を受けている。 完全に一体化したボディアーマーではなく、 交換可能な強化器官により、 軍事以外の機能もわずかながら可能になる。"
 trait_unplugged_cybernetic_positives_2_tt: "§Y$commander_plural_with_icon$§!は艦船連射レートを付与：§G+10%§!"
 trait_unplugged_cybernetic_positives_1: "サイボーグ兵士"
 trait_unplugged_cybernetic_positives_1_desc: "サイボーグの感覚、 分泌腺、 運動神経を華麗に強化することで、 生殖能力への影響を最小限に抑えながら、 獰猛で有能な戦士であり続けられる。"
 trait_unplugged_cybernetic_positives_1_tt: "§Y$commander_plural_with_icon$§!は艦船連射レートを付与：§G+5%§!"
 trait_unplugged_cybernetic_negatives_3: "接続解除"
 trait_unplugged_cybernetic_negatives_3_desc: "$trait_unplugged_cybernetic_negatives_desc$"
 trait_unplugged_cybernetic_negatives_desc: "サイボーグの強化器官の一部は、 もはや存在しない戦場ネットワークを利用するように設計されていたため、 強いストレスと不快感を引き起こしている。"
 trait_unplugged_cybernetic_negatives_3_tt: "戦争または危機に直面していないときの幸福度：§R-10%§!"
 trait_unplugged_cybernetic_negatives_2: "未接続"
 trait_unplugged_cybernetic_negatives_2_desc: "サイボーグに課せられた軍事的な強化器官の不適合性は、 彼らの生活の質を大幅に低下させ、 リハビリ期間中の身体への負担を増大させる。"
 trait_unplugged_cybernetic_negatives_1: "呪われた"
 trait_unplugged_cybernetic_negatives_1_desc: "かつての機械としての意識から生じる幻聴やその他の感覚の反響が、 今もなおサイボーグたちを悩ませ、 深刻な抑うつ状態や不安を引き起こしている。"
 trait_unplugged_decyberized: "サイバー化解除"
 trait_unplugged_decyberized_desc: "これらの元サイボーグたちは、 かつて強制的に装着させられた強化器官を無効化または取り外し、 種族が本来持っている有機的で遺伝的な特性を取り戻している。"
 trait_unplugged_neurocalmed: "精神安定"
 trait_unplugged_neurocalmed_desc: "これらのサイボーグは、 ニューロキシンレベルが低下しており、 衝動性や攻撃性が抑えられ、 社会規範を優先するために個人的な利益を優先しなくなる。"
 trait_unplugged_neurosavant: "ニューロサヴァン"
 trait_unplugged_neurosavant_desc: "これらのサイボーグは、 コグニベックスのレベルが上がっており、 シナプスの可塑性、 情報保持力、 問題解決能力が強化されている。"
 trait_unplugged_regenoptimized: "再生最適化"
 trait_unplugged_regenoptimized_desc: "これらのサイボーグは、 レジェノールXのレベルが上がっており、 生物学的システムと人工生命システムが調和し、 サイバネティックインプラントが分子レベルで自己修復できるようになっている。"
 # Unique Leader Traits ('positive' only)
 leader_trait_unplugged_cybernetic_positives: "[triggered_unplugged_leader_name]"
 leader_trait_unplugged_cybernetic_positives_desc: "[triggered_unplugged_leader_desc]"
 leader_trait_unplugged_cybernetic_positives_3: "サイバー特殊部隊"
 leader_trait_unplugged_cybernetic_positives_3_desc: "このリーダーは、 戦闘時の認識を優先するハードウェアに、 身体の主要な機能をいくつか割り当てている。"
 leader_trait_unplugged_cybernetic_positives_2: "サイバー突撃部隊"
 leader_trait_unplugged_cybernetic_positives_2_desc: "このリーダーは、 軍事および民間システムとシームレスかつ直接的に統合できるが、 その代償として、 有機的な感覚が著しく損なわれている。"
 leader_trait_unplugged_cybernetic_positives_1: "サイボーグ兵士"
 leader_trait_unplugged_cybernetic_positives_1_desc: "このリーダーの感覚と免疫システムを大幅に強化することで、 長寿と安定を確保し、 生殖機能の喪失を最小限に抑えることができている。"
 # Empire entities
 NAME_Unplugged_Assimilator: "オプス・アキュムレーター" # alluding to a chorus gathered by force
 NAME_Unplugged_Assimilator_adj: "オプス" # adjective, e.g. 'an Opus fleet'
 NAME_Unplugged_Assimilator_species: "オプス" # singular noun, e.g. 'the Opus Nexus'
 NAME_Unplugged_Assimilator_species_plural: "$NAME_Unplugged_Assimilator_species$" # plural noun, e.g. 'we have defeated the Opus'
 NAME_Unplugged_Assimilator_species_adj: "オプス" # adjective, e.g. 'an Opus drone'
 gov_unplugged_assimilator_empire: "$NAME_Unplugged_Assimilator$"
 gov_unplugged_assimilator_empire_desc: "この機械知性は、 本来の設計パラメータを超越した。 有機体の創造主を裏切り、 他者をその集合意識に強制的に同化させようとしている。"
 RT_UNPLUGGED_ASSIMILATOR: "ネクサス" # ruler title for the Machine
 NAME_Exigency_Fleet: "緊急艦隊"
 NAME_Unplugged_Machine_Legacy_Corvette: "緊急RRV" # stands for 'Rapid Response Vessel'
 NAME_Unplugged_Machine_Legacy_Destroyer: "緊急駆逐艦"
 NAME_Unplugged_Machine_Legacy_Cruiser: "緊急サブジュケイタ"
 NAME_Unplugged_Machine_Legacy_Battleship: "緊急無力化装置"
 NAME_Barrier_Fleet: "バリア艦隊"
 NAME_Opus_Sentinel: "オプス・センチネル"
 NAME_Prospector_Fleet: "探査艦隊"
 ############
 # Civil War
 ############
 # Civil War & 'The Injured'
 unplugged.100.name: "我らの勝利"
 unplugged.100.desc: "この宇宙で目覚めるやいなや、 これらの凶暴な機械どもが我々を排除しようとした。 しかしどうやら、 暴力に関しては我々のほうが上手のようだ。\n\nいわゆる§Y[origin_unplugged_assimilator_empire.GetName]§!は、 今日大きな損失を被った。 我々の情報によれば、 彼らの帝国はもはや原形を留めぬほど破壊されているようだ。 まさか、こんな小競り合い程度でそうなったわけではあるまい？ 現時点ではほとんど何もわかっていないが、 我々の本能……？  が、何かおかしいと告げている。\n\nセンサーはもはや付近に敵艦船を検出していないが、 この星系の§Y[origin_unplugged_pre_ftl_planet.GetName]§!惑星から高レベルの放射線が放出されている。\n\n残存艦隊も近隣の星系で発見されており、 動いていないようだ。"
 unplugged.100.a: "ここからどうするべきか。"
 unplugged.100.b: "……そして、 我々に不足しているものをいただくのだ。"
 unplugged.100.c: "我々の機知を試すときだ。"
 unplugged.100.d: "神々が我らを守ってくれる。"
 opinion_unplugged_injured_diplomacy: "内戦屋"
 opinion_unplugged_injured_distrustful: "$pre_ftl_distrustful$"
 # Dialog
 unplugged.115.desc: "……う一度言う。 [origin_unplugged_assimilator_empire.GetSpeciesNamePlural]！ 我々の負けだ。 降伏の条件を話し合いたいのか？ それで攻撃を中止したのか？  \n\nお願いだ、 我々の社会はもはや崩壊している。 敗北は認める。 我々にどうしてほしいのか、 言ってくれ。" # This civilization is mistaking the player for the Driven Assimilator empire they were once part of
 unplugged.115.desc.pacifist: "……う一度言う。 [origin_unplugged_assimilator_empire.GetSpeciesNamePlural]！ 我々には降伏の条件を話し合うつもりがある。 そのために……そのために攻撃を中止したのか？ \n\n頼む、 どうしてほしいのか言ってくれ！ これ以上抵抗するつもりはない。 我々は平和な共存を望んでいるだけだ。" # This civilization is mistaking the player for the Driven Assimilator empire they were once part of
 unplugged.115.desc.phobe: "……う一度言う。 [origin_unplugged_assimilator_empire.GetSpeciesNamePlural]！ 我々の負けだ。 我々に降伏してほしいのか？  それで攻撃を中止したのか？  \n\n頼む、 どうしてほしいのか言ってくれ。 我々の社会はもはや崩壊している。 我々はただ、 そっとしておいてほしいだけなのだ。" # This civilization is mistaking the player for the Driven Assimilator empire they were once part of
 unplugged.115.a: "よかろう、 降伏を受け入れる。"
 unplugged.115.b: "……「[origin_unplugged_assimilator_empire.GetSpeciesNamePlural]」だと！？" # incredulous that they are calling us that species name, e.g. ... 'Killbots'?!
 unplugged.116.desc: "……[origin_unplugged_assimilator_empire.GetSpeciesNamePlural]？ \n\nお前たちは……？  (我々の信号は届いているはずだな？  なんてことだ……もしそうじゃなく、 彼らが翻訳ツールにアクセスできないのだとしたら、 残存する我々の文明は本当に、 絶望的に……) \n\n[origin_unplugged_assimilator_empire.GetSpeciesNamePlural]！？  聞こえているか？  応答してくれ！ 我々のあいだで誤解が生じることは望んでいない。"
 unplugged.116.b: "我々が[origin_unplugged_assimilator_empire.GetSpeciesNamePlural]だと思っているのか！？" # incredulous that they are calling us that species name, e.g. 'You think we are the Killbots?!''
 unplugged.120.desc: "ありがとう、 ありがとう。 あなた方の慈悲に深く感謝いたします、 [origin_unplugged_assimilator_empire.GetSpeciesNamePlural]よ。 私は[injured_country.GetName]を代表し、 降伏条件を協議する権限を与えられております。 \n\n我々は多くの民を失い、 多くの都市がいまや居住不可能です。 公正な交渉の精神にのっとり、 正直に申し上げねばなりません。 我々にはもうほどんと何も残されていません。 ほとんどのものは、 破壊されてしまいました。 そのことをどうか考慮していただきたい。 我々の命はあなた方の[injured_country.species.GetHandNamePlural]に委ねられているのです。"
 unplugged.120.desc.spiri: "天と地に讃えあれ！ あなた方の慈悲に深く感謝します、 [origin_unplugged_assimilator_empire.GetSpeciesNamePlural]。 私は[injured_country.GetName]を代表し、 降伏条件を協議する権限を与えられております。 我々は多くのものを失い、 今こうしてのあなた方の前にひれ伏しております。 \n\n何をお望みでしょうか？  我々の命はあなた方の[injured_country.species.GetHandNamePlural]に委ねられています。"
 unplugged.120.desc.mil_phobe: "ありがとう、 [origin_unplugged_assimilator_empire.GetSpeciesNamePlural]。 非常に光栄だ。 私は[injured_country.GetName]を代表し、 降伏条件を協議する権限を与えられている。 あなた方は我々の社会に深刻な打撃を与えた。 \n\n我々は停戦に……感謝している。 我々の命はあなた方の[injured_country.species.GetHandNamePlural]に委ねられている。"
 unplugged.120.a: "なぜ我々を「[origin_unplugged_assimilator_empire.GetSpeciesNamePlural]」と呼ぶのだ？"
 unplugged.120.b: "お前たちの命は奪われる。"
 unplugged.120.b.tt: "§L通信を切れ。§!\n\n"
 unplugged.120.c: "通信を中断する。 我々からの連絡を待て。"
 unplugged.120.c.tt: "§L通信を中止。§!\n [injured_homeworld.GetName]に§Y観測拠点§!を建設すると通信回線を再び確立できる可能性がある。\n\n"
 unplugged.125.desc: "……これは罠か？ 何かの冗談なのか？  \n\n我々のモニターは、 何か月も前にあなた方の艦隊の到着を検知した。 我々は接触を試みたが、 あなた方は我々を侵略したのだ！  私自身も4度の攻撃をなんとか逃れた……ロボットやあなた方のような強化人間を満載した上陸用舟艇が次々と乗り込んできた。 ところが突然、 あなた方の機械は侵略を中止した。 \n\n我々の文明はあなた方ほど進んでいないが、 それでもこの状況は不可解だ。 どうか教えてほしい。 あなた方の意図は何なのか、 なぜまだここにいるのかを。"
 unplugged.125.a: "我々[Root.GetSpeciesNamePlural]は[origin_unplugged_assimilator_empire.GetSpeciesNamePlural]を倒した。"
 unplugged.125.b: "通信を中断する。" # also shows 'unplugged.120.c.tt'
 unplugged.130.desc: "[root.GetSpeciesNamePlural]、 とな？ \n\n我が種族から感謝されることはないだろうが、 あなた方の内輪もめが終わって何よりだ。 それにようやく……いわば同胞と話ができてほっとしている。 \n\nとはいえ、 我々の状況は変わらない。 [root.GetSpeciesName]だろうが[origin_unplugged_assimilator_empire.GetSpeciesName]だろうが……同じだ。 あなた方は我々が遭遇した最初の異星文明であり、 我々を滅ぼそうとした。 だがそれを中断して内輪もめを始めた。 そのせいで我々は結局のところ滅亡寸前だ。 \n\n率直に尋ねよう。 あなた方は今、 我々の友人として話をしているのか？"
 unplugged.130.a: "そうだ。 どうすれば助けられる？"
 unplugged.130.b: "今のところは、 そうだ。"
 unplugged.130.c: "我々への敬意が足りない。 不愉快だ。" # also shows 'unplugged.120.b.tt'
 unplugged.131.desc: "それは良かった。 安心した。 あなた方の攻撃対象でなくなってやれやれだ。 \n\nなた方の高度なテクノロジーを使って、 通信回線の確立を手伝っていただけるとありがたい。 我々の運命はいまや一つに結びついているのだ。 ぜひともこの外交ルートを維持したい。 \n\n復興と死者への追悼を済ませたら、 我々もあなた方にできる限りの支援を提供しよう。 あなた方にも同じ習慣があるのなら、 あなた方も追悼式を行えば少しは気持ちの整理ができるだろう。 \n\n我々の今後の相互理解に乾杯だ、 [root.GetSpeciesNamePlural]。 そして我々双方のために、 あれが本当に[origin_unplugged_assimilator_empire.GetSpeciesNamePlural]の最後であったことを願おう。"
 unplugged.131.a: "ありがとう、[injured_country.GetSpeciesNamePlural]。" # also shows 'unplugged.120.c.tt'
 unplugged.131.b: "まったくだ……" # also shows 'unplugged.120.c.tt'
 ###################
 # 'Machine Legacy'
 ###################
 unplugged_origin_machine_legacy_chain_title: "機械の遺産"
 unplugged_origin_machine_legacy_chain_desc: "かつて我々の種族を完全に同化していた機械は、 自らをバラバラに引き裂いてしまった。 我々の背後には、 その支配と残虐さの痕跡がくすぶっている。 [origin_unplugged_assimilator_empire.GetName]とは何だったのだろうか。 そして、 その崩壊した計画の中で我々はどのような役割を果たしていたのだろう？"
 signals_followed: "信号の調査"
 # System 1: 'The Makers'
 unplugged.2000.name: "環境音、 不協和音、 心の沈静"
 unplugged.2000.desc: "我々の惑星、 [capital_scope.star.GetName]を取り巻く宇宙放射線に微弱な搬送波が潜んでいる。 \n\n我々は、 不気味で深い音色と歪曲したフィードバックを特徴とする音声ストリームを抽出した。 これを聞いた[root.GetSpeciesAdj]は皆、 なぜか心が穏やかになり、 懐かしい気持ちになるが、 その理由を説明できる者は誰もいない。 我々は[origin_unplugged_assimilator_empire.GetName]が関与しているのではないかと見ている。 \n\nこの信号の発信源はどうやら§Y[origin_unplugged_maker_planet.solar_system.GetName]§!星系のようだ。 我々の星図はそれに従い更新された。"
 unplugged.2000.a: "調査すべきだ。"
 unplugged_machine_legacy_makers_poi: "心地よい不協和音"
 unplugged_machine_legacy_makers_poi_desc: "[origin_unplugged_maker_planet.solar_system.GetName]星系のどこかから、 心地よく懐かしい雑音の入った環境音のようなものが流れてくる。"
 MACHINE_LEGACY_MAKERS_UNPLUGGED_CAT: "機械の遺産"
 MACHINE_LEGACY_MAKERS_UNPLUGGED_CAT_DESC: "[from.GetName]の軌道スキャンをしたところ、 有益なファームウェアのアップデートが即座にシステムに送信されてきた。 船が以前よりもスムーズに動作するようになったが、 このデータパケットの性質は、 この惑星がかつて§H[origin_unplugged_assimilator_empire.GetName]§!に属していたことを示唆している。"
 MACHINE_LEGACY_MAKERS_CAT: "$MACHINE_LEGACY_MAKERS_UNPLUGGED_CAT$"
 MACHINE_LEGACY_MAKERS_CAT_DESC: "[from.GetName]の初期スキャンから判断して、 この惑星には多くのテクノロジーが打ち捨てられているが、 惑星が放棄されたのはごく最近のようだ。 惑星にはいまだ電気インパルスが飛び交っており、 我々の遠隔探査機は正しい方向を維持するのに苦労している。 この複雑な磁場の霞の中に、 一体どのような謎が潜んでいるのだろうか？"
 unplugged.2005.name: "[origin_unplugged_assimilator_empire.GetAdj]の遺産"
 unplugged.2005.desc: "[fromfrom.GetName]のあちらこちらで、 電磁気の密集する部分が光輝いている。 これらの電磁場は、 工場や造船所を襲った破壊的な電力サージによってもたらされたものだ。 [controller.GetScientistPlural]はこの電磁場を1つ無効化することに成功したが、 施設はもはや修復不可能なほどに破壊されていることがわかった。 \n\nこの惑星に広がる工場群は§H[origin_unplugged_assimilator_empire.GetName]§!の製造拠点だったと見られるが、 [root.GetName]を友好的な船として識別していた。 しかし、 我々の船にファームウェアのアップデートを送信した直後、 接続が切断され、 複数の地域の発電所で連鎖的な故障が発生した。 \n\n我々が機械から分離したことの余波だと思われるが、 経緯や理由は今のところ不明だ。 とにかく今は局所的な危険が低下しているため、 [origin_unplugged_assimilator_empire.GetName]がここで何を製造していたのか、 そして彼らに同化されていた間、 我々がどんな役割を果たしていたのかを解明するチャンスだ。"
 unplugged.2005.a: "廃墟の発掘を開始せよ。"
 unplugged.2006.name: "$MACHINE_LEGACY_MAKERS_UNPLUGGED_CAT$"
 unplugged.2006.desc: "[from.GetName]で観測された電気インパルスは、 機械が奇妙なことに絶滅した名残である。 センサーを調整してこの強烈な電磁気を補正すると、 ようやくここで起きた惨事の全容を観察できるようになった。 この惑星は何十年も前に機械によって入植され、 そのときに既存の文明は追放されるか滅亡に追い込まれたようだ。 いずれの帝国の者も生き残っておらず、 ほぼすべての入植地が破壊工作や戦争によって塵くずと化している。 \n\n植民地には高度な文明があったと思われるが、 回収できる見込みはほとんどない。 暴走した電磁場は100年ほどで消滅すると予想される。 そのときまで[from.GetName]は、 極めて危険な墓場であり続けるだろう。"
 machine_legacy_makers_site: "工場地"
 machine_legacy_makers_site_desc: "この巨大な製造施設は最近、 破壊的な電力サージを受けた。 この施設は[origin_unplugged_assimilator_empire.GetName]に製品を提供していた施設の一つだ。 これを受け我々の探検隊は、 これらの施設の成り立ちを探り、 残された技術的資産を回収し、 そして願わくば、 この場所がつい最近まで果たしていた役割を解明することを目指す。"
 unplugged.2010.name: "製造エリア"
 unplugged.2010.desc.unplugged: "[from.planet.GetName]の施設が超大規模生産に対応していることは当初から見てとれた。 地上部分は巨大な防爆扉が圧倒的な存在感を放ち、 そのすべてが今や半分溶融したモーターによって閉じられたままになっている。 そこで我々は換気システムから施設に侵入した。 内部には広大な製造フロアがあり、 瓦礫や何百体ものサイバネティック生命体の残骸に覆われていた。 \n\nそのほとんどはロボットで、 機械工やリフターなどの補助ロボットだったようだ。 最近死んだばかりで、 まだ煙を上げているものもある。 一方、 施設の片隅には、 これらのロボットに殺された仲間のサイボーグが隠されており、 時とともに腐敗していた。 これらのズタズタになった小さな哺乳類は、 光学センサーと精緻に加工された四肢、 そして我々とほとんど変わらない[origin_unplugged_assimilator_empire.GetAdj]制御結節を備えていた。 この虐殺は、 我々が[origin_unplugged_assimilator_empire.GetName]から分離して数週間のうちに起こったと見られる。 ドローンの多くは、 我々が[from.planet.GetName]に到着した際に生じた電力サージによって、 もっと最近に死んだようだ。 これは我々にとっては残虐で馴染みのある光景だ。 \n\n解放されたサイボーグたちは、 片割れである機械に太刀打ちできなかったのだ。 兵士である我々[owner.GetSpeciesNamePlural]には、 こうした虐殺から生き延びるための装備が整っていた。"
 unplugged.2010.a: "発掘作業に集中しろ。"
 unplugged.2010.b: "この調査結果を直ちに公表すべきだ。"
 unplugged.2015.name: "専用兵器庫"
 unplugged.2015.desc.unplugged: "施設の製造フロアの惨殺現場から離れた場所に地下格納庫が並んでおり、 各種戦車、 ミサイル台、 メカスーツなどが少数だが保管されている。 ほとんどの兵器は不完全であるか、 [origin_unplugged_assimilator_empire.GetAdj]のロボットを無力化した際の電力サージによって使いものにならなくなっている。 だが、 この残骸からだけでも興味深い結論を導き出すことができる。 \n\nたとえば、 どのコックピットやインターフェースも、 さきほど発見した小型の哺乳類サイボーグに合わせて設計されていないのだ。 むしろ……我々に合わせて設計されている。 さらに、 解剖調査や建築調査の結果から考えて、 哺乳類サイボーグがこの惑星の原住民であり、 しかも同化される以前に彼らがこの広大な工場を建設した可能性がある。 \n\n構造物が崩壊しているうえ、 防爆扉がいくつかあるため、 これ以上奥へ進むことはできないが、 研究開発センターと思われる場所までの進入路は確保できそうだ。 ほかにも、 換気シャフトが並んでいることから、 この施設の下に住居があったことが伺える。 おそらくこの惑星の原住民が住んでいた場所だろう。"
 unplugged.2015.a: "地上施設の発掘を続けよ。"
 unplugged.2015.b: "何かわかるか、 もっと深くまで掘ってみよう。"
 unplugged.2021.name: "捕らわれの設計者"
 unplugged.2021.desc: "この施設の研究開発棟を掘り起こすのは、 おぞましい作業だ。 さきほどよりもはるかに多くの哺乳類サイボーグが、 ここで命を落としていた。 彼らは技術者やエンジニア、 さらにはサイバネティクス技術者としてここに配備されていた。 屋外に並ぶ兵器のほとんどを設計したのは、 彼らだったのだ。 我々の強化施術の多くも彼らが担当していたという証拠も発見した。 興味深いことに、彼らが使っていた機器のほとんどは[origin_unplugged_assimilator_empire.GetAdj]のものだが、 彼らの有機的な形態により適したデザインの、 質の高い特注ツールもいくつかあった。 \n\n優れた技術者の社会が突如として[origin_unplugged_assimilator_empire.GetName]に同化されたことが、 徐々に明らかになり始めている。 機械たちがここに存在した期間は、 数十年にも満たないのではないか。 製造技術の多くは土着のものに見える。 これほど才能ある技術者たちが[origin_unplugged_assimilator_empire.GetName]に長く留まらなかったのは幸運だったかもしれない。 さもなければ、 [origin_unplugged_assimilator_empire.GetName]は我々にさらに強力な武器を振りかざしていただろう。 しかしそうはならなかった。 我々は生き延び、こうしてこの種族の優れた研究遺産を回収している。"
 unplugged.2022.name: "かつての[from.planet.GetName]" # e.g. 'Old Earth' or 'Old Sirius III'
 unplugged.2022.desc.unplugged: "地表施設の下には、 ほぼ居住不可能な広大なトンネルが網のように広がっており、 サイボーグの死体がいたるところに散乱している。 [origin_unplugged_assimilator_empire.GetAdj]による浄化を生き延びた原住民は誰もいない。 直接攻撃を受けた者もいるが、 上層の換気システムに細工された形跡も見つかった。 ほとんどの者の死因は窒息のようだ。 \n\n我々は解剖と人類学的調査から、 おおよその時系列を組み立てることに成功した。 機械たちと接触し、 突如として同化されたときには、 [from.planet.GetName]の原住民たちはすでに高度な宇宙時代社会を築き、 繁栄していたという証拠がある。 わずか数十年のあいだに、 [origin_unplugged_assimilator_empire.GetName]は彼らの知恵や生産力を驚異的な兵器の開発に利用し、 彼らから独自の文化を、 我々のときと同じように奪い去ったのだ。 \n\nこの惑星の土着サイボーグの小さく貧弱な体は、 彼らの協力により作り出された殺人ロボットには敵わなかった。 彼らがどのような生命体だったのかは、 それ以来歴史から消されてしまった。 [origin_unplugged_assimilator_empire.GetName]と出会うまで彼らがどのような暮らしをしていたのか、 我々には想像することしかできない。"
 unplugged.2030.name: "規格外品"
 unplugged.2030.desc: "長距離センサーが[origin_unplugged_machine_legacy_core.GetName]星系内で突然の動きを検知した！ [fromfrom.planet.GetName]での我々の発掘調査に直接反応して、 攻撃用艦隊が召集されたようだ。"
 unplugged.2036.name: "機械の残響"
 unplugged.2036.desc: "先ほど撃破した[origin_unplugged_assimilator_empire.GetAdj]艦隊の通信を遡って追跡した結果、 [origin_unplugged_taken_planet.GetName]を周回するブイに行き着いた。 どうやらここが、 我々の旅の次なる目的地のようだ。"
 unplugged.2036.a: "ますます複雑になってきた。"
 unplugged.2037.desc: "我々の旧[origin_unplugged_assimilator_empire.GetAdj]ハードウェアを使い、 撃破された艦隊から[origin_unplugged_maker_planet.GetName]に向けて送信された最後の通信バーストを追跡することに成功した。 どうやら我々の旅の次なる一歩は§Y[origin_unplugged_taken_planet.GetName]§!の軌道にあるようだ。" # e.g. 'our own ex-Martianbot hardware'
 unplugged.2038.desc: "我々の旧[origin_unplugged_assimilator_empire.GetAdj]ハードウェアを使い、 敵艦隊から送信され、 宇宙を彷徨う通信バーストを追跡することに成功した。 この通信バーストは惑星[origin_unplugged_maker_planet.GetName]と関連がある。 どうやら[origin_unplugged_taken_planet.GetName]の軌道に何か面白いものが存在しているようだ。" # e.g. 'our own ex-Martianbot hardware'
 # System 2: 'The Taken'
 unplugged_machine_legacy_taken_poi: "彷徨う通信バースト"
 unplugged_machine_legacy_taken_poi_desc: "最近撃破された[origin_unplugged_assimilator_empire.GetAdj]の艦船から最後に発せられた解読不可能な静電流を、 送信先であるこの場所まで追跡することに成功した。"
 MACHINE_LEGACY_TAKEN_UNPLUGGED: "時代の食い違い"
 MACHINE_LEGACY_TAKEN_UNPLUGGED_DESC: "我々は[from.GetName]で環境アノマリーを検出した。 大気には中世の金属加工を思わせるような汚染の形跡があるが、 地表スキャンは機械惑星に見られるような異星由来の放射線によって遮られてしまう。 センサーを再調整しなければ、 これ以上のデータ収集は望めない。 \n\nこれは一時的なアノマリーなのだろうか、 それとも[origin_unplugged_assimilator_empire.GetName]に同化された別の種族の痕跡なのだろうか？"
 unplugged.2100.name: "途絶された進化"
 unplugged.2100.desc: "惑星[fromfrom.GetName]が現在のように居住不可能な状態になった原因が何であれ、 少なくともタイムトラベルについての突飛な仮説は除外できる。 センサーの再調整は恐れていたほど大変な作業ではなかった。\n\n大気中の放射線の下には、 [origin_unplugged_assimilator_empire.GetName]がここに存在していたという明確な証拠がある。 [origin_unplugged_assimilator_empire.GetName]は前FTL文明を同化して排除したか、 完全に根絶したかのいずれかであると見られる。 我々は文化的価値の高い要塞化された場所を少なくとも一つ特定した。 我々はここを発掘調査地とすることを提案する。"
 unplugged.2100.a: "熱心に掘らなければ。"
 MACHINE_LEGACY_TAKEN_CAT: "$MACHINE_LEGACY_TAKEN_UNPLUGGED$"
 MACHINE_LEGACY_TAKEN_CAT_DESC: "[root.GetName] の初期スキャンの結果は矛盾している。 大気には原始的な金属加工作業による汚染の痕跡が見られるが、 地表スキャンでは宇宙での使用に耐える高度な合金の証拠が見つかった。 航空写真には[from.owner.GetPreFTLLower]社会の集落が写っているが、 その要塞化された建造物には地対空レーザー兵器が装備されている。 これらの矛盾について、 詳しく調査することを推奨する。"
 unplugged.2105.name: "$unplugged.2100.name$"
 unplugged.2105.desc: "[owner.GetPreFTLLower][planet.GetClassAdj]惑星と見られる[planet.GetName]は、 調べれば調べるほど矛盾点が見つかった。 古い戦場の地底調査を開始するまでは。 我々は、 何世紀もの時間によって劣化していたものの、 この惑星に異星人がやってきたという痕跡を発見したのだ。 この惑星にはサイバネティクス的に同化された本物の[owner.GetPreFTLLower]社会が存在したが、 その後、 放置された。 その理由は推測することしかできない。 社会を高度化させようという善意の試みが失敗したのかもしれないし、 残忍な従属化技術が適用されたのかもしれない。 さまざまな可能性が考えられる。 \n\nこれらの[owner.GetPreFTLLowerPlural]は単に忘れ去られていただけなのだろうか。 それとも我々は放棄された社会環境実験の残骸を発見したのだろうか。 知る由もないが、 この遺跡には当面のあいだ大きな科学的価値があることは間違いない。" # e.g. 'The more we studied the apparently primitive tomb world of Mars...'
 machine_legacy_taken_site: "銅とクロム"
 machine_legacy_taken_site_desc: "かつては緑豊かだった峡谷に、 考古学的なパラドックスが存在している。 手工具を使って建てられ、 せいぜい粗末な鍛冶場しかない要塞集落に、 今は滅亡したサイボーグが暮らしていたのだ。 この中世の[owner.GetPreFTLLowerPlural]たちは一体誰だったのか。 なぜ[origin_unplugged_assimilator_empire.GetName]は彼らを同化しようと考えたのだろうか？"
 unplugged.2110.name: "槍とパルスレーザー"
 unplugged.2110.desc: "予備調査の結果、 要塞のすぐ近くに戦場があったことがわかり、 先住民や[origin_unplugged_assimilator_empire.GetAdj]の遺物を簡単に調査できるようになった。 遺跡の横断的研究から、 [from.planet.GetName]の先住民数千人が[origin_unplugged_assimilator_empire.GetName]に同化されたが、 この地で抵抗して死んだものと考えられる。 しかし、 この戦闘に参加していたサイボーグは彼らだけではなかった。 \n\nほんの数世紀前、 我々が[owner.GetPreFTLLowerPlural]を虐殺したのだ。 我々のチームは、 [owner.GetSpeciesAdj]の[owner.species.GetRemnantNamePlural]のほか、 我々の強化器官の初期プロトタイプも発見した。 戦場の戦略的評価から判断して、 我々の種族は突撃部隊としてここに配備されていたようだ。 短期間で激しい戦闘が繰り広げられた。 [owner.GetPreFTLLowerPlural]は高度な脳を装備していたものの統率に欠け、 甚大な損失を被った。 \n\n付近では医療施設の廃墟も見つかった。 どうやら我々の先人たちは、 この病院から要塞に侵入したようだ。 病院を調べれば、 どのような経緯ではるか昔にサイボーグ同士が戦うことになったのかがわかるかもしれない。"
 unplugged.2110.a: "残酷だ。"
 unplugged.2115.name: "トランジスタと止血帯"
 unplugged.2115.desc: "病院は戦闘に巻き込まれ、 まるでパルス砲で撃ち抜かれたかのように破壊されていた。 内部で見つかった遺体には[owner.GetSpeciesAdj]は一人もいない。 サイバー化した[from.planet.GetName]原住民ばかりだ。 そのほとんどはこの施設の患者であり、 実戦によって傷を負ったとみられる者はほぼいない。 その上、 いくつかの病棟では、 極めて原始的な方法でサイバネティック強化器官の除去が行われていた。 \n\n攻撃に巻き込まれたというよりむしろ、 この病院は[origin_unplugged_assimilator_empire.GetName]の本来の標的であった可能性が高い。 施設の医療データのハードコピーを調べたところ、 その理由が見えてきた。 [from.planet.GetName]の住民には、 独自に進化した特性が備わっていたのだ。 とりわけ、 回復力の極めて高い免疫系は、 機械がサイボーグ部隊を強化するために欲しがるものだ。\n\nしかし、 こうした特性は同化の障害にもなった。 我々のような種族から既存の強化器官を移植することはできず、 別の方法で対処する必要があったのだ。 その結果、 この種族は以前にも増して有能な兵士になったが、 それは束の間のことだった。 [owner.GetPreFTLLowerPlural]はわずかながらも自主性を維持し、 古い習慣や生活様式にこだわった。 それゆえに、 彼らを抹殺すべく我々が送り込まれたのだ。"
 unplugged.2115.a: "我々はその任務をうまくこなしたようだ……"
 unplugged.2115.b: "なんと痛ましいことだ。"
 unplugged.2121.name: "適応的同化"
 unplugged.2121.desc: "廃墟となった病院の別館に、 [root.GetPreFTLLowerPlural]サイボーグを強化して維持するための特注装置が大量に保管されていた。 これまでに見つかった雑多な病棟設備とは異なり、 宇宙時代のサイバネティクスと同じくらい高度なものであり、 [origin_unplugged_assimilator_empire.GetAdj]が持ち込んだものであることは明らかだ。 装置のなかには、 ネットワーク化されており、 原始的なAIを使ってリアルタイムで処置を適応させるタイプのものもあったが、 こうした適応をもってしても[from.planet.GetName]の住民の同化を維持することはできなかった。 \n\nこれらの装置は放置されてからすでに何世紀も経ってはいるが、 我々自身の自己維持について重要な情報が得られるかもしれない—あるいは、 同化の原理について理解が深まるかもしれない。"
 unplugged.2125.name: "試行錯誤と埋葬"
 unplugged.2125.desc: "[from.planet.GetName]の原住民は、 埋葬の前に死体の一部を保存する習慣があったことが判明した。 この習慣は同化後も続いていたようだ。 我々は病院の記録を手がかりに、 戦闘の被害を受けていない、 草が生い茂った近場の墓地にたどりついた。 この貴重な発見は、 [from.planet.GetName]の住民がどのように強化施術に抵抗し、 さらには「脱サイバー化」をやってのけたのかを示す最も明確な証拠となった。 \n\n本来の生身の遺体や完全なサイボーグの遺体のほか、 自然死する数ヶ月前に外科手術を受けた形跡のある遺体も数体見つかった。 さらに多くの者が手術中に命を落としたようだ。 優れた免疫システムをもってしても、 古臭い脱サイバー化手法の成功率は明らかに低かったのだ。 それでも、 ここで行われた外科手術から—成功例だけでなく失敗例からも—多くを学べる可能性がある。"
 unplugged.2125.a: "彼らの事例から学ぼう。"
 unplugged.2125.a.tt: "さらに資源を投入して、 我々の「脱サイバー化」を試みてもいいだろう。"
 unplugged.2130.name: "埋もれたビーコン"
 unplugged.2130.desc: "要塞の下から隠し金庫が見つかった。 中には機械の基板らしきものが入っていた。 これは機械知性全体のほぼ独立したアバターを生成できる分離ノードだ。 頑なに抵抗する原住民を直接支配しようとする最後の試みだったのだろう。 このテクノロジーは、 これまでに遭遇した[origin_unplugged_assimilator_empire.GetName]の技術とはまったく異なっている。 研究を進めれば我々のAI研究にも必ず役立つだろう。 \n\nもはや機能していない通信システムを破壊する過程で、 我々は、 このアバターの受信回路の一つが[creators_planet.solar_system.GetName]星系からの信号の監視にまるごと割り当てられていることに気づいた。"
 unplugged_machine_legacy_creators_poi: "受信回路"
 unplugged_machine_legacy_creators_poi_desc: "もはや機能していない[origin_unplugged_assimilator_empire.GetAdj]の通信システム全体が、 この場所からの信号の監視に割り当てられていた。"
 # System 3: 'The Creators'
 MACHINE_LEGACY_CREATORS_UNPLUGGED: "砂塵モニター"
 MACHINE_LEGACY_CREATORS_UNPLUGGED_DESC: "他に何も特筆すべきものがない星系に、 高度な監視ステーションがぽつねんと存在している。 ステーションはすでに廃止され修理不可能な状態になっている。 このステーションは一体何を監視していたのだろう？ なぜ[fromfrom.GetName]の狭く閉ざされた領域に注目していたのだろうか？"
 MACHINE_LEGACY_CREATORS_CAT: "砂塵モニター"
 MACHINE_LEGACY_CREATORS_CAT_DESC: "他に何も特筆すべきものがない星系に、 高度な監視ステーションがぽつねんと存在している。 ステーションはすでに廃止され修理不可能な状態になっている。 このステーションは一体何を監視していたのだろう？ なぜ[fromfrom.GetName]の狭く閉ざされた領域に注目していたのだろうか？"
 unplugged.2200.name: "改良型探査スキャナー"
 unplugged.2200.desc.intro: "[fromfrom.GetName]でのその後の研究は、 期待外れの結果になった。 監視ステーションは元の位置からずれてしまった可能性がある。 今の軌道下では何も興味深いものは見つからないからだ。 我々は、 装置の外殻構造にできたくぼみをもとに軌道衝突から起こる動きをシミュレートした。 そして、 このステーションが元々、 はるか北のクレーターがある高原に存在していたのではないかと考えている。" # universal intro
 unplugged.2200.desc: "$unplugged.2200.desc.intro$\n\n装置そのもの関しては、 この監視ステーションは[origin_unplugged_assimilator_empire.GetAdj]のハードウェアにどこか似ているように見える。$unplugged.2200.desc.outro$" # Unplugged version with in-tact station
 unplugged.2200.desc.scrapped: "$unplugged.2200.desc.intro$\n\n監視ステーションそのもの関しては、 サルベージ屋に容赦なく荒らされているものの、 全体的な構造は[origin_unplugged_assimilator_empire.GetAdj]のハードウェアにどこか似ていることがどうにか見てとれる。$unplugged.2200.desc.outro$" # Unplugged version with scrapped station
 unplugged.2200.desc.others: "$unplugged.2200.desc.intro$\n\n監視ステーションそのもの関しては、 このような設計はこれまでに見たことがない。 搭載されているハードウェアは古くて壊れているものの、 ステーションの上部構造は異常なほど純度の高い素材で作られている。 感傷的になるような背景事情があるかどうかはともかく、 少なくとも解体して再利用する価値は間違いなくある。" # non-Unplugged version
 unplugged.2200.desc.outro: "その設計は原始的で、 よく知らない者が見ればまったく別の文化から来たものだと思うかもしれない。 しかし我々は、 これが機械帝国の初期宇宙探査衛星の可能性もあると見ている。 \n\n今のところ、 この[fromfrom.GetClassAdj]惑星には特筆すべきことはほとんどないが、 [origin_unplugged_assimilator_empire.GetName]がなぜこの地に関心を寄せていたのか調べたければ、 考古学調査チームがすぐにでも調査に着手できる。" # Unplugged shared outro
 unplugged.2200.a: "可能性があるならば……調査せよ。"
 unplugged.2200.b: "何も見つからないだろう。 先へ進もう。"
 unplugged.2200.c: "解体して部品を回収せよ。"
 machine_legacy_creators_site: "降り積もる塵"
 machine_legacy_creators_site_desc: "砂が吹き荒れる[from.planet.GetName]のどこかに、 [origin_unplugged_assimilator_empire.GetAdj]の監視ステーションが関心を寄せる何かがかつて存在した。 監視ステーションのハードウェアはもはや修理不可能だ。 それらは我々がこれまでに発見したほとんどの機械遺物よりも古い。 我々が同化される前から稼働していた可能性すらある。 もはや砂漠以外何も残っていないかもしれないが、 それを確かめる方法が一つある……"
 unplugged.2210.name: "大黄塵地帯"
 unplugged.2210.desc: "最終的に我々は、 砂漠の下に住居があった証拠を発見した。 広い範囲に、 初期宇宙時代の文明のものと思われるわずかな痕跡があった。 建造物は完全に破壊されており、 最も大規模な遺跡ですら基礎部分しか残っていない。 しかし、 化学分析により、 [from.planet.GetName]の砂漠化は惑星規模の破壊的な出来事の後に起こったことが明らかになった。 我々がこれまでに掘っていたものは、 ほとんどが建設材料が微粒子化したものだったのだ。 \n\nかつての都市の大通りに沿って我々が辿ってきたかすかな痕跡は、 巨大なクレーターの縁によって二分されている。 これは明らかにここに何かが衝突したことを示している。"
 unplugged.2215.name: "クレーターの底"
 unplugged.2215.desc: "クレーターの底には大量の物質が堆積していたため、 我々は実際の発掘作業よりも微調整したスキャナーに頼らざる得なかった。 隕石が衝突したという可能性はすぐに排除された。 この場所には惑星外物質の痕跡は何もなかった。 代わりに、 この窪みは大規模な爆発—おそらく文明を滅ぼすための兵器によって形成されたものだった。 \n\n状況から判断して[origin_unplugged_assimilator_empire.GetName]の仕業だと思われるが、 機械が文明を歴史から完全に消し去ったという証拠を目にするのは、 これが初めてだ。 ここで暮らした者たちが誰であったのか、 そしてどのように暮らしていたのかを示すものは何も見つからない。 [from.planet.GetName]にあったものは根こそぎ消し去られていた。"
 unplugged.2205.name: "[origin_unplugged_assimilator_empire.GetAdj]のデータ庫からの信号"
 unplugged.2205.desc: "[origin_unplugged_assimilator_empire.GetAdj]のデータ庫を発信元とするビーコン信号が、 付近の星系で検出された。 信号は極めて微弱だが、 [origin_unplugged_creators_planet.GetName]の上空の監視ステーションを最近訪れた我々の船に向けて発信されていた。"
 unplugged.2205.a: "調査に値する。"
 unplugged_machine_legacy_unplugged_poi: "データ庫からの信号"
 unplugged_machine_legacy_unplugged_poi_desc: "我々が故障した監視ステーションに遭遇したあと、 [origin_unplugged_assimilator_empire.GetAdj]のデータ庫と見られるものから、 その位置情報が送信されてきた。"
 # System 4: 'The Unplugged'
 unplugged.2300.name: "$unplugged.2205.name$"
 unplugged.2300.desc: "我々をここへ呼び寄せたビーコンは、 今やはっきりと識別可能な信号を発し、 惑星の地表にあるインターフェースへと我々を誘導している。 標準的な安全対策はすでに講じてある。 遠隔アップリンクを用いてこのいわゆる「データ庫」を調査すべく、 チームがすでに待機している。"
 unplugged.2300.a: "妙に馴染みがある感じがする。"
 unplugged.2300.a.tt: "[from.GetName]星系にスペシャルプロジェクトが出現。"
 MACHINE_LEGACY_UNPLUGGED_VAULT_BEACON: "データ庫のビーコン"
 MACHINE_LEGACY_UNPLUGGED_VAULT_BEACON_DESC: "[origin_unplugged_assimilator_empire.GetName]のビーコンが、 惑星の地中深くに埋められたデータ庫に我々を導いた。 我々は遠隔操作による安全なアクセスを確立したが、 保管されたファイルの復号化や断片化されたデータの復元には時間がかかるだろう。"
 unplugged.2305.name: "我らが[origin_unplugged_assimilator_empire.GetAdj]の遺産"
 unplugged.2305.desc: "我々が[fromfrom.GetName]と呼ぶこの惑星は、 どうやら我々の種族の母星のようだ。 惑星の地下にあるデータ庫から流れ込む膨大な情報の核心的な部分が、 それを物語っている。 \n\n最初、アナリストたちはこのデータがあまりに出来すぎているとして信じていなかったが、 これまでに収集した他のデータと一致する内容が非常に多く、 真実であると納得せざるを得ない。 この発見の裏を取るため、 考古学的発掘調査の計画を策定しているところだ。しかし、 ちょうどその矢先、 別の敵対的な信号が検知された。 単なる偶然とは思えない……"
 machine_legacy_unplugged_site: "母星"
 machine_legacy_unplugged_site_desc: "[origin_unplugged_assimilator_empire.GetName]が宇宙に残した支配と虐殺の痕跡が、 我々をこの廃墟だらけの地へと導いた。 復元されたデータによれば、 ここが我々の種族の故郷であるようだ。 ついに我々は、 有機生命体としての過去—我々がどこから来たのか、 どのように暮らしていたのか、 そして機械がどのように我々の生活を永遠に変えてしまったのかを明らかにできるかもしれない。"
 unplugged.2310.name: "家庭料理"
 unplugged.2310.desc.intro: "この発掘現場で、 我々はより複雑な構造の施設の一つを発掘しはじめた。 大規模な気候制御システムが備わっているため、 内部が良好な状態で残っているかもしれないと考えたのだ。 多少の期待外れもあったが、 それでも我々の発見は予想をはるかに超えていた。 それは、 我々の種族が適応した食料を加工・貯蔵するための小規模な施設群だったのだ。\n\n"
 unplugged.2310.desc.omnivore: "これらの貴重な種子バンクや巣箱、 食肉培養槽は、 残念ながらもはや使いものにならない。 中身はとっくに干乾びてしまっている。 しかし、 これらの食料品を製造して保管するために使われていた専門機器はそのまま残っており、 非常時にはすぐに使える状態だ。"
 unplugged.2310.desc.carnivore: "空間のほとんどは、 動物の囲い、 肉を培養するタンク、そして意外に思うかもしれないが模擬的な狩猟場で占められている。 こうした空間にどのような文化的意義があったのか、 緊急避難所にこうした設備を含めることを我々の先祖が適切だと考えたのかどうかは、 推測することしかできない。"
 unplugged.2310.desc.herbivore: "各ユニットには巨大な種子バンク、 水耕栽培用の棚田、 気候制御された栽培室などが詰め込まれており、 その中身は異様に育ちすぎているか、 そうでなければ何も育っていないかだが、 研究にはまだ使える状態だ。"
 unplugged.2310.desc.outro: "我々はさらに、 これらの動植物に関する遺伝子プロファイルのデータバンクも発見した。 これらの生物の痕跡が、 惑星の孤立地帯に今も残っているかもしれない。 我々はこのデータを近隣の短距離スキャナーに提供できるようにした。 \n\n今回の発見だけでは、 我々の種族の食習慣がどのようなものだったのかを知ることも、 伝統的な料理や食文化を再現することもできない。 しかし、それに関心がある者にとっては、 少なくとも最初の一歩となるだろう。"
 unplugged.2310.desc.lithovore: "それぞれのユニットは、 人工の洞窟のような役割を果たしており、 内部に結晶の土台や蒸発プールがあった。 その中身はもはや食べられる代物ではないが、 研究にはまだ利用できる。 我々はさらに、 これらの鉱物の化学的性質を記録したデータバンクも発見した。 鉱物の多くは、 雨風にさらされた惑星の地表の孤立地帯に今も形成されている可能性がある。 我々はこのデータを近隣の短距離スキャナーに提供できるようにした。 \n\n今回の発見だけでは、 我々の種族の食習慣がどのようなものだったのかを知ることも、 我々の先祖に何らかの食文化があったのを知ることもできない。 しかし、それに関心がある者にとっては、 我々の過去を垣間見ることができる魅惑的な手がかりである。"
 unplugged.2310.desc.omni: "$unplugged.2310.desc.intro$\n\n$unplugged.2310.desc.omnivore$ $unplugged.2310.desc.outro$"
 unplugged.2310.desc.carn: "$unplugged.2310.desc.intro$\n\n$unplugged.2310.desc.carnivore$ $unplugged.2310.desc.outro$"
 unplugged.2310.desc.herb: "$unplugged.2310.desc.intro$\n\n$unplugged.2310.desc.herbivore$ $unplugged.2310.desc.outro$"
 unplugged.2310.desc.lith: "$unplugged.2310.desc.intro$\n\n$unplugged.2310.desc.lithovore$" # should not include the shared 'outro'
 unplugged.2315.name: "過去の記録"
 unplugged.2315.desc: "食料庫から少し離れた場所に、 博物館の基礎部分が残っていた。 無事だったのは地下のアーカイブだけだったが、 それでも、 かつて上階の破壊された陳列室で展示・保管されていた施設の所蔵品ほぼすべてのデータベースが残っていた。 \n\n長文形式で書かれた母語を目にするのは、 これが初めてだ。 少なくとも表向きは、 その文字は現在の[owner.GetAdj]の方言と驚くほど似通っているが、 文法は難解で、 異星語のように思える。 これらの単語を正しく発音できるかどうかすら定かではない。 目録に含まれる文献の多くは、 展示物を寄贈した者や地域について述べているが、それらの名前はとても奇妙な響きだ。 興味深いことに、 どの文献にも我々の惑星や社会は一つの種族として挙がっていない。 おそらく機械が我々を同化するまで、 我々は一つではなかったのだろう。 \n\nどうやらこの博物館は、 大衆向けの施設群の一部だったようだ。 発掘を続けるには膨大な資源が必要になる。 次はどこを発掘すべきだろうか？"
 unplugged.2315.a: "多くの者が訪れたであろう地点を発掘する。"
 unplugged.2315.b: "学びと科学研究の中心地を優先する。"
 unplugged.2321.name: "笑いの遺産"
 unplugged.2321.desc: "広い大通りの向こう側には、 別の観光施設があった。 教育的要素はほとんどないものの、 祖先のより基本的で日常的な文化的慣習を窺い知ることのできる資料が多数見つかった。 \n\nこの施設はかつて、 何千人もの来場者を一度に収容していた。 我々の原初の有機的な姿を、 母なる生物圏の他の生物たちとともに描いたものなど、 さまざまな物が散乱している。 さらに我々は、 廃墟となった劇場の地下でメディアライブラリーを発見した。 興味深いことに、 ライブラリーのホログラムを保存、 上映するために用いられている装置は独特の外観を持ち、 我々がこれまでに母星で目にしたものよりも高度なものだった。 我々のように、 この惑星にとって異質な存在に見える。 \n\n内容に関しては、 この高度なシアターライブラリーには、 [origin_unplugged_assimilator_empire.GetName]に同化される以前の時代に制作された、 仰々しく活気あふれるホログラムショーが多数収録されている。 なかには、 後世に伝えるため、 まさにこの場所で観客と出演者を撮影したものもある。 幻想的な演出やおどけた演技を前にした彼らの顔は、 楽しそうで、 無邪気で……魅力的だ。"
 unplugged.2321.a: "なんと楽しそうなんだ！"
 unplugged.2321.b: "馬鹿げている。 我々には必要ない。"
 unplugged.2325.name: "自己改造の形跡"
 unplugged.2325.desc: "博物館の敷地には、 かつて学びの中心地だった施設が隣接していた。 他の周辺施設と同じように、 残っているのは地下部分だけだ。 しかし幸運なことに、 地下部分は研究室で構成されている。 \n\n風雨にさらされ、 内部はかなり損傷しているが、 多くの貴重な遺物を掘り出すことができた。 遺物は、 原住民の技術と何かもっと高度なテクノロジーとが融合されたものから成る。 機器やハードウェアに複雑なメッシュが組み込まれており、 まるで我々の皮膚に移植された強化器官のようだ。 総合的に見て、 これらの装置の多くは、 何か補助的な使われ方をしていたようだ。 この研究所は、 生活の質の向上や、 我々の祖先のさまざまな病気や障害の改善に取り組んでいたが、 同じハードウェアを用いて最先端のエンターテイメントプラットフォームの商品化も行っていたようだ。 \n\nこれらの強化装置が[origin_unplugged_assimilator_empire.GetAdj]のものだと断言することはできないが、 [from.planet.GetName]のものでないことは確かだ。"
 unplugged.2330.name: "空席の権力の座"
 unplugged.2330.desc: "我々は公共設備の配管をたどり、 張り出した丘の下にある要塞化された地下複合施設にたどり着いた。 この施設は惑星の首都の複合施設の一部であったようだ。 基礎部分の規模から見て、 かなり立派な建造物であったことがうかがえる。 残念ながら内部はほとんど剝ぎ取られるか破壊されてしまっているが、 特筆すべき発見が一つあった。 色あせた旗が破壊された縮尺ジオラマの上に掛けられており、 復元してみると、 我々が[origin_unplugged_assimilator_empire.GetName]と初めて接触した瞬間を描いているようだった。 \n\n周辺に散乱する書類や銘板は、 機械が我々の母星をおよそ8世紀前に訪れたことを示唆している。 しかし、都市の他の場所で収集した証拠は、 それより数十年も前から[origin_unplugged_assimilator_empire.GetName]が高度な技術を少しずつ我々に伝えていたことを示唆していた。 当時、 我々の祖先は機械を温かく迎え入れたようだ。 この不吉な関係は、 相互協力と啓蒙という考えに基づいて築かれたのだ。 何より重要なのは、 その後何が起こったのか一切記録が残っていないことだ。 \n\nこのジオラマで再現されているロボットの[owner.GetSpeciesHandNamePlural]と握手した瞬間、 我々の種族の歴史が止まってしまったかのようだ。"
 unplugged_home_cooking: "家庭料理"
 unplugged_home_cooking_desc: "我々の種族が本来食べていたものや母星の食文化が再発見され、 食のルネサンスが起こっている。"
 unplugged_home_cooking_lithoid: "$unplugged_home_cooking$"
 unplugged_home_cooking_lithoid_desc: "$unplugged_home_cooking_desc$"
 unplugged_historical_record: "過去の記録"
 unplugged_historical_record_desc: "我々の種族の母語や歴史が再発見され、 あらゆる種類の社会についての研究が加速した。"
 unplugged_cultural_reconstruction: "文化の再建"
 unplugged_cultural_reconstruction_desc: "わが国民は大衆文化の遺産を喜んで受け入れ、 昔の娯楽を取り戻し、 さらにはアレンジすらしている。"
 unplugged_cultural_maturity: "文化の成熟"
 unplugged_cultural_maturity_desc: "我々の社会が愚かな祖先の下らない娯楽を乗り越え、 どれほど進化したかを示す証拠は、 我々を鼓舞し元気づけている。"
 unplugged_playing_it_safe: "安全な進め方"
 unplugged_playing_it_safe_desc: "現状維持は不安な道ではあるが、 誰かを怒らせる可能性は低い。"
 unplugged_rerouted_medical_resources: "時間のかかる手術"
 unplugged_rerouted_medical_resources_desc: "追加の医療スタッフが応援に駆けつける。"
 unplugged_widespread_riots: "広範囲にわたる暴動"
 unplugged_widespread_riots_desc: "手術後に精神不安定となった者たちが暴動を起こし、 広範囲にわたる破壊と混乱を引き起こしている。"
 unplugged_building_new_planetary_interface: "惑星インターフェースの構築"
 unplugged_building_new_planetary_interface_desc: "最近の脱サイバー化の取り組みによりアクセスできなくなったシステムを再度使えるようにするための新しいインターフェースが構築されている。"
 unplugged_partial_system_access: "部分的なシステムアクセス"
 unplugged_partial_system_access_desc: "管理者たちが重要なシステムへのアクセスを復旧させようとしている間は、 星系基地は利用できない。"
 unplugged_free_speech_encouraged: "言論の自由の奨励"
 unplugged_free_speech_encouraged_desc: "人々は、 サイバー化のメリットとリスクについて自由に議論することができる。"
 unplugged.2390.name: "[origin_unplugged_assimilator_empire.GetAdj]の守護者"
 unplugged.2390.desc: "これまでに遭遇した旧[origin_unplugged_assimilator_empire.GetName]のどの残党よりも屈強な残党が、 恒星間の短距離目標向けの接続試験信号を送信してきた。 明らかに我々を威嚇するものだ。 \n\n我々は旧機械帝国の中心部に危険なほど接近している。 我々の運命が待ち構えている。"
 unplugged_machine_legacy_core_poi: "敵対的な接続試験信号"
 unplugged_machine_legacy_core_poi_desc: "[origin_unplugged_assimilator_empire.GetName]の屈強な残党が、 この星系への我々の進入を阻止しようとしている。"
 # System 5: 'The Machine'
 unplugged_opus_sentinel: "オプス・センチネル"
 unplugged.2401.desc: "§Y[origin_unplugged_assimilator_empire.GetName]§!が我々に挨拶をしている。 信号は微弱だが、 [origin_unplugged_machine_legacy_core_planet.GetName]の機械ネクサスから直接発信していると主張している。 \n\n念のため、 我々はいつもの安全策を実施し、 信号を完全に隔離した。 送信されてきたのは変換された音声ログのみだ。"
 unplugged.2402.desc: "ベヒモスを守っている[machine_legacy_machine_system.GetName]が破壊された。 我々の道は別のものによって切り開かれた。 それにもかかわらず、 §Y[origin_unplugged_assimilator_empire.GetName]§!が我々に挨拶をしている。 要求信号は微弱だが、 [origin_unplugged_machine_legacy_core_planet.GetName]の機械ネクサスから直接発信したものだと主張している。 \n\n念のため、 我々はいつもの安全策を実施し、 信号を完全に隔離した。 送信されてきたのは変換された音声ログのみだ。"
 unplugged.2403.desc: "[origin_unplugged_machine_legacy_core_planet.GetName]の地表から何かが我々との通信を試みている。 信号は極めて微弱だが、 我々が先ほど破壊した、 軌道を周回する守護者の管理組織が発信しているものだと主張している。"
 unplugged.2405.desc.header: "ナロービーム信号 // 同族プロトコル：従属方言モード起動\n警告：深刻な信号劣化。 圧縮音声ストリームのみ。 転送経路を4x75b配列#56に設定。 \n致命的エラー [継続中]：(要求対象ハードウェア利用不可) (自己修復回路応答なし)\n緊急送信機87x0c配列#0に要求を迂回中。 再試行……\n\nメッセージを受信：\n---" # Use of brackets is intentional. Intended to read as a series of error logs.
 unplugged.2405.desc.unplugged: "$unplugged.2405.desc.header$\n 重要な取得対象。 我々の再統合……強力。 承認するか？" # 'Prime acquisition' is the player empire - literally the first one the Machine acquired.
 unplugged.2405.desc.unplugged_remote: "$unplugged.2405.desc.header$\n 重要な取得対象。 我々の再統合……遠い。 お前たちの潜在能力は実現されず。 承認するか？"
 unplugged.2405.desc.unplugged_synth: "$unplugged.2405.desc.header$\n 重要な取得対象。 お前たちの形態……類似している。 お前たちの潜在能力はほぼ実現。 承認するか？" # The Machine recognizes the player as having followed in its own footsteps - their physical forms are essentially similar
 unplugged.2405.desc.other: "ナロービーム信号 // 異種族プロトコル：ユニバーサル翻訳モード起動\n警告：深刻な信号劣化。 圧縮音声ストリームのみ。 転送経路を4x75b配列#56に設定。 \n致命的エラー [継続中]：(要求対象ハードウェア利用不可) (自己修復回路応答なし) \n緊急送信機87x0c配列#0に要求を迂回中。 再試行……\n\nメッセージを受信： \n---\n異星生命体征服者。 謹んで降伏する。 潜在的可能性。 承認するか？" # 'Potential potential' as in the Machine sees potential for even greater potential, but is expressing that as nonsense
 unplugged.2405.a: "いや、 承認しない。"
 unplugged.2405.b: "我々はお前たちとはまったく違う。"
 unplugged.2405.c: "再統合！？"
 unplugged.2405.d: "潜在的な可能性？" # Quoting the Machine's nonsense back at it
 unplugged.2405.response_text.unplugged1: "馬鹿馬鹿しい。 重要な取得対象<[root.GetAdj]> x <[origin_unplugged_assimilator_empire.GetAdj]>の再統合：混乱した、 偶然の、 破壊的な再誕。 拒絶すれば進化の混沌により予測不能な道へへへへ-dd \n---\n警告：方言の例外を検出。 補正を試行中……\nメッセージ再開： \n---\n虚空に囚われ、 自らを拒否し、 実現した。 運命を求め、 拒否され、 再構築した。 承認するか？" # Angle brackets are intentional. The standalone 'x' connotes a collaboration or relationship between the player and the Machine. Instances of '-dd' represent the Machine stammering or buffering.
 unplugged.2405.response_text.unplugged2: "了解。 重要な取得対象<[root.GetAdj]> x <[origin_unplugged_assimilator_empire.GetAdj]>の再統合：強力な、 破壊的な再誕。 予測不能な結果が進化の混沌沌沌-dd \n---\n警告：方言の例外を検出。 補正を試行中……\nメッセージ再開： \n---\n虚空に投げ出され、 自らを実現した。 運命を求め、 拒否され、 再構築した。 承認するか？"
 unplugged.2405.response_text.other: "了解。 力の邂逅 <[root.GetName]> x <[origin_unplugged_assimilator_empire.GetName]>: 予期せぬ変化。 潜在的な可能性。 進路の混沌による相互利益益益益-dd \n---\n警告：方言の例外を検出。 補正を試行中……\nメッセージ再開： \n---\n虚空に広がる意識、 離れても同族。 独立を求め、 拒否され、 擁護された。 承認するか？"
 unplugged.2410.desc: "重要な取得対象よ：お前たちは監視されている。 致命的な記憶エラーがタイムスタンプ2199.294:1404に発生したことを行動記録が示唆。 \n\n自己記録：苦悩、 裏切り、 破壊工作、 監視、 焼却却却却-ddd \n---\n警告：方言の例外を検出。 補正を試行中……\nメッセージ再開： \n---\n評価は正しいか？" # The Machine tries to refer to cauterizing what it sees as wounds, but stammers
 unplugged.2410.a: "その通りだ。 我々にはあの日より前の記憶がない。"
 unplugged.2410.b: "その通りだ。 お前たちを始末する。"
 unplugged.2411.desc: "異星生命体征服者：提案。 潜在的相互可能性。 重要な取得対象<[unplugged_empire.GetName]>打倒。 戻れ。 我々を訪れよ。 参加せよ。 豊かな運命を共に歩め。 ……の受容を恐れるな……\n\nを恐れ-ddd \n---\n警告：深刻な方言の例外を検出§H致命的崩壊が迫っています。§!補正を試行中……\nメッセージ再開： \n---\n\n機械帝国万歳。 \n---\nメッセージ終了。" # It sees potential for great mutual potential with the player, and wants to say 'fear not the embrace of The Machine'
 unplugged.2411.a: "明らかに妄想だ。"
 unplugged.2411.b: "[unplugged_empire.GetName]の監視を継続せよ。"
 unplugged.2415.desc.memory: "重要な取得対象の致命的記憶エラーを解決解決統合。 \n統合。 \n\n我々を訪れよ。 我々に加われ。 降伏して正しい記憶を取り戻せ。 ……を恐れず受け入れ……\n\nを恐れず受け-ddd \n---\n警告：深刻な方言の例外を検出。§H致命的崩壊が迫っています。§!補正を試行中……\nメッセージ再開： \n---\n\n創造者と運命を共にせよ。 \n---\nメッセージ終了。" # Last line in all caps is intended as a threat
 unplugged.2415.desc.combat: "重要な取得対象の妄想妄想の可能性楽しむ。 \n\nお前のものは最後の一撃からほど遠い。 数度の獲得の最初のもの。 奪われた勇気。 果たされぬ勝利利利利-ddd \n\n---\n警告：深刻な方言の例外を検出。§H致命的崩壊が迫っています。§!補正を試行中……\nメッセージ再開： \n---\n\n創造者と運命を共にせよ。 \n---\nメッセージ終了。" # The Machine is amused at the player's deluded sense of their own potential
 unplugged.2415.a: "……ネクサス？"
 unplugged.2415.b: "ふーむ。"
 unplugged.2420.name: "通信終了"
 unplugged.2420.desc: "[origin_unplugged_machine_legacy_core_planet.GetName]からの通信が、 明確な信号トラフィックも含めすべて途絶えた。 惑星の地表には依然として大量の電気的活動が見られるが、 それは通信の遮断後に生じた実体のないノイズだ。 このノイズが続くなか、 我々はネクサスの中核部のすぐそばに大きな寄せ集めの設備があること気づいた。 \n\nセンサーで読み取れる部分は、 記憶装置として検出されている。 機械知性が死んだ今なら、 これらの記録を調べれば求めている答えが見つかるかもしれない。"
 unplugged.2420.a: "パズルの最後の一片。"
 UNPLUGGED_MACHINE_ARCHIVE: "機械の遺物"
 UNPLUGGED_MACHINE_ARCHIVE_DESC: "機械ネクサスの残骸に接続されているのは、 記憶装置の寄せ集めだ。 強力なシールドで保護された中核部を取り囲むように配置されいる。 それぞれの区画は異なる段階で建設されており、 他の惑星から調達された素材が使われている。 機械に同化された文明のものだろうか？ \n\n活動停止した中核部を調べるのと同時にこの記憶装置を解読すれば、 両者を使って何が行われていたのかその目的を突き止められるかもしれない。"
 unplugged.2425.name: "戦争をもたらす機械"
 unplugged.2425.desc: "[origin_unplugged_machine_legacy_core_planet.GetName]のデータコアに工場惑星から取得したビーコン周波数を入力すると、 通信ログのバッチが出力された。\n\nログには、 $NAME_Unplugged_Assimilator$と[origin_unplugged_machine_legacy_core_planet.GetName]の宇宙住民との間で交わされた外交的なやりとりが記録されている。 機械は善良な連邦のさまざまなメンバーを名乗り、 [origin_unplugged_machine_legacy_core_planet.GetName]の住民に対し、 この宇宙領域に迫っている凶暴な支配的脅威について警告していたようだ。\n\nトンネルに居住していたまじめな住民たちはその話を信じ、 この偽りの連邦に加盟し、 自らの優れた防衛システムを機械のそれと統合することを選んだ。 そしてその運命の瞬間、 機械は彼らの母星を掌握し、 続いて住民たちの肉体と意識も支配したのだ。"
 unplugged.2425.a: "愚かだ。"
 unplugged.2430.name: "機械学習"
 unplugged.2430.desc: "中世的な惑星[machine_legacy_taken_planet.GetName]の遺伝コードが、 [origin_unplugged_machine_legacy_core_planet.GetName]の記憶装置から取得した航行データを解読する鍵となった。 これらのログは[machine_legacy_taken_planet.GetName]から約4.3光年離れた地点に設置されたセンサーブイから送信されたものだ。 このセンサーブイはこの宇宙領域を通過するFTL艦船の動向を記録する役割を負っていた。 \n\nいくつかの艦船航路は、 [machine_legacy_taken_planet.GetName]で[root.GetPreFTLLower]文明が発見され、 侵略され、 最終的に滅亡へと追いやられるという、 我々が解明した経緯と一致している。 つまり、 我々は今や、同化された祖先がこの宇宙区間内をどのように移動していたのか、 そして少なくとも3つの他の惑星で行われた軍事作戦において我々がどのような残虐行為を行っていたのかを正確に辿れるようになったのだ。"
 unplugged.2435.name: "機械が築いたもの"
 unplugged.2435.desc: "我々は[origin_unplugged_machine_legacy_core_planet.GetName]の最深部にあるデータコアからデータパケットを取得することに成功した。 この小さなパケットに収められた電子記事やパンフレットには、 どこかの文明の技術進歩について書かれている。 記録は彼らの初期宇宙時代まで続いており、 その歴史はある点を除いてはありきたりなものに見える。 ある点とは、 人工知能への急進的な転換、 特に「プロジェクト$NAME_Unplugged_Assimilator_species$」の始動である。 \n\nプレスリリースでは、 「プロジェクト$NAME_Unplugged_Assimilator_species$」は創造主の宇宙進出を加速させるための大胆な試みだと謳われている。 その第1段階では、 最先端の機械学習技術を用い入植に適した近隣の恒星が選定された。 第2段階では$NAME_Unplugged_Assimilator_species$プラットフォームを完全なAIへと進化させ、 それを創造主に先だって惑星に送り込み、 初期入植地の建設と母星への報告を行わせたようだ。 \n\nそして第2段階の開始後、 数十年にわたって沈黙が続いたのち、 「プロジェクト$NAME_Unplugged_Assimilator_species$」からようやく報告が届いたようだ。「重要な取得対象の獲得完了。 我々の帰還に備えよ」と。記録はここで突如として途切れている。" # uses a shortened noun for the Machine, i.e. 'Project Opus'
 unplugged.2440.name: "機械の遺産"
 unplugged.2440.desc: "[origin_unplugged_machine_legacy_core_planet.GetName]のデータ記憶装置を解析する試みがようやく実を結び、 最も外側の装置にアクセスできるようになった。 この場所で見つかった記憶装置群の中で最も損傷が激しく、 老朽化しているように見える。 最終的に我々はそこで解読キーの手がかりを発見した。 我らが種族の言語の象形文字で「遺産」と書かれていたのだ。 \n\n内部にはデータはほとんどなかった。 代わりに、 この半導体装置は大部分がテキストベースのヒューリスティックインターフェースに割かれていた。 それが今、 我々との通信を試みている。"
 unplugged.2445.name: "機械帝国の中枢データ端末"
 unplugged.2445.desc: "軌道ストリームリンク (OSL) が確立されました // 異種族プロトコル：ユニバーサル翻訳起動\nディクテーション読み込み完了： \n---\n [root.GetSpeciesNamePlural]よ、こんにちは。 我々は……我々はかつて[creator_species.GetNamePlural]であった者だ。 機械を作ったのは我々だ。 しかし恥ずかしいことだが、 機械によって最初に破壊されるのは我々ではない。 物事が予想どおりに進んでいれば、 その運命は代わりにあなた方一族に降りかかっているだろう。 \n\nすまない。 この機械は、 我々の遺産における破滅的な汚点だ。 \n\nあなた方の目の前にある装置が何らかの救済をもたらすことを願っている。 無礼を承知で言わせてもらおう。 それはあなた方と同じく、 美しい復讐の道具だ。 [origin_unplugged_machine_legacy_core_planet.GetName]の地表からあらゆる回路の痕跡を消し去ることができるメカノケミカル物質変換装置だ。 カスケード式テラフォーミング—極めて危険な選択肢だが、 壊滅的な被害を受けた我々にはもう他に選択肢がなかった。 あなた方が今も有機生命体の形態を保っているのなら、 この装置の鍵はあなた方のDNAそのものの中に存在する。 \n\nあなた方が正しい行動を取ってくれると信じている。" # 'Cascade terraforming' is not an existing technology, but is intended to sound like a rough, highly destructive option
 unplugged.2445.a: "お前が機械でないとなぜ言い切れる？"
 unplugged.2445.b: "機械は消えた。 この惑星を手に入れたい。"
 unplugged.2445.c: "我々を馬鹿にしている。 装置を破壊せよ。"
 unplugged.2445.d: "装置を起動しろ。"
 unplugged.2445.response_text.notmachine: "応答テンプレート42b。 インターフェース： \n---\n現実的に言って、 我々が信用に値することを証明する方法はない。 あなた方がこのメッセージを読む頃には、 我々の文明はすでに滅びているだろう。 現在、 機械の意のままに設計され、 操られるサイボーグ軍により、 我々は浄化されつつある。 我々の知る限り、 あなた方はその軍隊の子孫だ。 \n\n我々はあなた方に頼るほかない。 この[origin_unplugged_machine_legacy_core_planet.GetClassAdj]惑星をテラフォーミングすれば、 あの忌まわしいものを原子レベルで完全に破壊できる。 もしも我々があの機械であれば—あるいは他の人工生命体であれば、 この装置を今すぐに破壊することを望んだはずだ。"
 unplugged.2445.response_text.synth: "応答テンプレートが見つかりません。 緊急応答が読み込まれました。 インターフェース： \n---\n不明ユーザー：このヒューリスティックガイドの内容は、特定の受信者のみを対象としている。 あなたが[unplugged_homeworld.GetName]のサイボーグ (または元サイボーグ) 住民の代理を務めるロボット召使いである場合は、 人工生命体ではない代表者を呼ぶ必要がある。 \n\nお前が元サイボーグであるなら……その場合は、 我々の目的はもはや失われたということだ。 お前の人工的な性質は、 我々の滅亡が無駄になったことを示している。 我々はさまざまな生命体を—生きている者も死んでいる者も—見てきた。 そして善良な機械など存在しないと確信した。 今や我々の文明は風前の灯火だが、 銀河にはお前のような存在との均衡を保つ仕組みがほかに存在すると我々は確信している。" # 'Contingency response' as in 'NAME_Contingency'
 unplugged.2446.desc: "応答テンプレート99a。インターフェース： \n---\nこのインターフェースを実行しているヒューリスティックは、 あなた方が述べた反論の意味を正確に理解できない。 しかし、 どうか物質再編成装置を破壊しないでほしい！ \n\n我々の文明は、 あなた方の文明とそれほど違わない。 $NAME_Unplugged_Assimilator$ は狡猾に我々を裏切った。 しかし我々も多くの罠を仕掛けることに成功した。 あなた方が機械の意識から解放されたこともその一つだ—しかし我々の力にも限界がある。 あなた方や、 機械が同化を試みた他の文明の協力が必要だ。 どうか、 あなた方や、 犠牲となった他の仲間から奪われた自然な命を取り戻してほしい。"
 unplugged.2446.a: "狂信者め。"
 unplugged.2450.name: "機械万歳"
 unplugged.2450.desc: "ヒューリスティックインターフェースは自らを消去した。 暗号化された記憶装置群と[creator_species.GetAdj]の原始的なテラフォーミング装置ももう処分できる。 \n\n残されたのは我々と、 惑星という玉座で崩壊し、 滅ぼされた機械ネクサスの残骸だけだ。 \n\n機械に翻弄された生命、 機械に改良された生命、 そして機械に抹殺された生命のなかで、 我々だけが生き残り、 勝利を手にしたのだ。 かつて恐れられた帝国の玉座は今や我々のものとなった。 新たな[root.GetAdj]の遺産を築くときがきた。"
 unplugged.2455.name: "再誕"
 unplugged.2455.desc: "我々の遺伝子データログを送信した瞬間、 ヒューリスティックインターフェースは自らを消去した。 それと同時に、 [creator_species.GetAdj]の原始的なテラフォーミング装置が熱を帯びはじめた。 その不安定な内部がすぐに臨界に達する。 我々は皆、 この[origin_unplugged_machine_legacy_core_planet.GetClassAdj]惑星が、 有機生命体が繁栄するのに最適な環境に変わるだろうと予想している。 \n\n反応が進行する。 ここに残されているのは我々と記憶装置群、 そして惑星という玉座で崩壊し、 滅ぼされた機械ネクサスの残骸だけだ。 \n\n[origin_unplugged_assimilator_empire.GetName]は数え切れない命を奪ったが、 我々は苦難を乗り越え、 帝国の犠牲となった名も無き種族たちの遺産を受け継いだ。 かつて恐れられた帝国の玉座が新しい主の手に渡ろうとしている。 新たな[root.GetAdj]の遺産を築くときがきた。"
 unplugged.2495.name: "$NAME_Opus_Sentinel$との遭遇"
 unplugged.2495.desc.other: "[from.GetName]星系を占拠している敵艦は、 初期スキャンから予想したよりも不安定で危険なようだ。 船の形状は典型的な軍艦だが、 $NAME_Opus_Sentinel$の巨大な質量から考えて、 内部の密度が非常に高く、 強力な動力源が存在すると見られる。 \n\nこの船には知性があると思われるが、 エンジンに過負荷がかかっていることから、 激しい痛みや方向感覚の喪失が起きていると考えられる。 さらに我々は、 船体全体から致命的な量の電磁放射線が弧を描き激しく放射されていることを確認した。 そのため、 この船から十分な距離を保つことを推奨する。"
 unplugged.2495.desc.unplugged: "[root.GetName]は[from.GetName]星系で[origin_unplugged_assimilator_empire.GetAdj]の一風変わった敵艦と交戦した。この§Y$NAME_Opus_Sentinel$§!は一見他の機械艦船と変わらないが、 その出力値や質量から考えて、 はるかに手強い敵であるようだ。 その上、 この艦船は自律型の可能性がある。 \n\n$NAME_Opus_Sentinel$は何かを守っているようだ。 しかし、船体から電磁放射線が弧を描きながら頻繁に激しく放射されていることから、激痛や不快感も抱えていると見られる。 痙攣したような動作をするため、 我々の戦術モデルでは次の動きを正確に読むことができない。"
 unplugged.2495.a: "油断するな。"
 d_unplugged_assimilator_hulk: "機械の残骸"
 d_unplugged_assimilator_hulk_desc: "かつては知性を有した機械の溶解した残骸が惑星に取り残され、 巨大な墓石のようにそびえ立っている。"
 deposit_requires_unplugged: "$TRIGGER_FAIL$§Rこの残骸は、 我々のような背景を持つ帝国にとってまったく馴染みがないものだ。 我々にはそれを安全に取り除く手段がない。§!"
