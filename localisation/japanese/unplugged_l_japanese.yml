 unplugged.3000.name: "我々の体現" # intentionally abstract - 'how we embody ourselves' - referring to the accompanying Situation
 unplugged.3000.desc: "機械の共有意識から離脱した瞬間から、 我々[root.GetSpeciesNamePlural]は葛藤を抱えてきた。 しかし、 平和な時や休息の時—つまり自分自身の意識しかない時ですら、 我々は内なる葛藤を抱えている。 痛みを伴ないながらも素晴らしい、 強制的な肉体強化と折り合いをつけるための葛藤だ。 \n\nこの最も内なる葛藤は、 良くも悪くも我々の社会全体に影響を与えはじめている。 我々は、 [root.GetName]が発展するなか、 [root.GetSpeciesNamePlural]の生の体験を引き続き監視していくつもりだ。 総合的な研究では、 いわゆる「脱サイバー化」への傾向や、 強化施術の普及傾向、 そして現在の身体形態の維持や改良を求める声を明らかにしていく予定だ。"
 unplugged.3000.a: "注意深く監視する必要があるが、 拙速な行動は避けなければならない。"
 unplugged.3000.b: "もたもたすべきではない。 迅速に目的をもって行動しよう。"
 unplugged.3000.c: "あらゆる声に耳を傾けるべきだ。"
 unplugged.3005.name: "一つの心"
 unplugged.3005.desc: "我々自身の生理機能に対する[owner.GetAdj]の態度を総合的に観察したところ、 我々は平穏な時代に入ったようだ。 我々の肉体に関する政策決定、 社会的な議論、 最先端の研究が複雑に絡み合い、 ある種の合意が形成されたようだ。 \n\nこの表面的な調和がいつまで続くかを判断するのは尚早だが、 少なくとも今は、 我々の状況や政府への姿勢に急進的な変化がない限り、 自分たちが何者で、 どのような姿をしているかについて[owner.GetSpeciesNamePlural]のあいだで考えが一致しているのは明らかだ。"
 unplugged.3005.a: "この議論には、 政治的な視点をもっと取り入れるべきだ。"
 unplugged.3005.b: "予想通りだ。"
 unplugged.3005.c: "反対しろ。"
 unplugged.3010.name: "意見の分断"
 unplugged.3010.desc: "我々自身の生理機能に対する[owner.GetAdj]の態度を継続的に調査した結果、 我々が文化的混乱の時代に突入したことがわかった。 我々の肉体に関する政策決定、 社会的な議論、 そして最先端の研究が複雑に絡み合い、 世論は激しく揺れている。 都市部では激しい抗議や論争が日常的に繰り広げられている。 \n\nこうした騒動が暴力や社会不安を直接引き起こすことは稀であり、 さまざまな意見が許されていることを誇るべきだとする市民もいる。 しかし、 [owner.GetSpeciesNamePlural]が分断され、 我々の文化における自己アイデンティティの概念がかつてないほど脆弱になっているのは明らかだ。"
 unplugged.3010.a: "より適切な議論の場を設ける必要がある。"
 unplugged.3090.name: "我らは[owner.GetSpeciesNamePlural]" # e.g. 'We, the Neo-Humans'
 unplugged.3090.desc: "「我々は見たままの存在であり、 それ以上でもそれ以下でもない」\n\nこれは我々の社会における身体的な自己認識をめぐる葛藤から生まれた、 数々の簡潔で心に響くスローガンの一つだ。 我々は、 自らの肉体に対するさまざまな疑念、 恐れ、 叶わぬ願望などからある程度解放されたといえる。\n\nこうした価値観を広大な銀河に対する外交方針として掲げるかどうかは別問題だ。 しかし、 少なくとも国内においては、 [owner.GetSpeciesName]は自らの肉体の形態や、 自己実現に向けた取り組みに満足しているようだ。"
 unplugged.3100.name: "除去の根拠"
 unplugged.3100.desc: "ますます多くの[root.GetSpeciesNamePlural]が、 肉体に埋め込まれた強化器官を制限するか完全に除去して、 自らの機械的要素からもっと距離を置くべきだと考えるようになっている。 \n\n民衆はこれを国内の危機とみなし、 解決策を見つけるよう我々に強く求めている。 対外的な評判を高め、 深い羞恥心や醜形恐怖症に苦しむ多くの[root.GetSpeciesNamePlural]を救済しろというのだ。"
 unplugged.3100.a: "問題外だ。 断る。"
 unplugged.3100.b: "やり遂げよう。"
 unplugged.3105.name: "脱サイバー化技術の飛躍"
 unplugged.3105.desc: "[target.GetName]の「脱サイバー化」に取り組む民間の専門研究所の研究者が、 画期的な技術を開発したと発表した。 ナノメッシュ装甲と、それに依存する重要な強化器官を除去できるという。 \n\n[target.GetSpeciesNamePlural]は何世代にもわたり、 扱いにくく威圧的な肉体形態を強いられてきた。 この人工的な基盤が我々の多くの強化生命維持機能に欠かせない存在だったからだ。 しかし今や、 このメッシュを、 有機材料を巧みに織り込んだ自作の皮膚増強物—つまり[target.GetSpeciesAdj]の真の皮膚で置き換えることができるのだ。"
 unplugged.3105.a: "この装甲は何世代にもわたり我々を守ってきた。 残しておこう。"
 unplugged.3106.desc: "[target.GetName]の脱サイバー化を目指す我が国の取り組みが再び大きく進展した。 画期的な手術手法の拡大を求める嘆願書を医療機関が提出したのだ。 専門家は、 再利用されたモジュール式強化器官の装着を強い、 [target.GetSpeciesNamePlural]の新生児にすら苦痛をもたらす数々の生体機械的依存に対する回避策を発見したと主張している。 \n\n学際的な審査委員会はこのプロセスをすでに検証し、 これらのモジュール式の武器ポートを除去すれば、 異質な強化器官の維持にかかる経済的負担も軽減できると補足している。"
 unplugged.3106.a: "断る。 モジュールは戦闘を有利に進めるうえで必要だ。"
 unplugged.3107.desc: "多くの[target.GetSpeciesName]にとっての夢が実現に近づいている。 研究者がついに、 我々の身体の有機的な神経系を活性化し、 修復する方法を発見したのだ。 遺伝子治療とファームウェアのハッキングを組み合わた新たな手法を用いることで、 被験者は強化神経シャントに頼ることなく、 自らの運動反射のみを利用して生きられるようになったという。 さらに、 予備調査では、 機械の意識から離脱して以来我々を悩ませてきた、 数々の幻覚を軽減または根絶できる可能性も示唆されている。"
 unplugged.3107.a: "この強化された戦闘反射神経は必要かもしれない。"
 unplugged.3110.name: "機械との調和"
 unplugged.3110.desc: "我々の強化器官の制御を目指す専門民間研究チームが、 [origin_unplugged_assimilator_empire.GetAdj]のワイヤレスメッシュを補完する方法を発見した。 このメッシュはかつて我々の強化器官すべてを同期していたもので、 これなしには、 [target.GetSpeciesNamePlural]はデバイス信号を見つけられず、 苛立ちや苦痛を延々と抱えることになる。 この新たな代替ネットワークは、 設計上、 極めて一元管理的な構造をしている。 本質的に[origin_unplugged_assimilator_empire.GetSpeciesAdj]ネクサスをモデルとしているためだ。 しかし、 安全で、 [target.GetName]の利益にのみ資するものであることは保証されている。 初期試験の被験者は、 効率や快適さの向上、 さらには至福と言っていいほどの安堵感を報告している。"
 unplugged.3110.a: "あんなことは二度とごめんだ。"
 unplugged.3111.desc: "強化器官のさらなる制御を目指す取り組みにより、 サイバネティクス外科分野で大きな進歩があった。 医療[target.GetScientistPlural]のチームが、 我々の体内のモジュラーインターフェースにおける依存関係そのものを分離することに成功したのだ。 モジュラーインターフェースは、四肢全体、 武器装備、 身体フレームの交換を容易にする機械部品である。 この技術があれば、 既存の肉体を改造したり、 [target.GetSpeciesNamePlural]の新生児にカスタムインターフェースを装着したりすることが可能になり、 適切に修理されていない中古の[origin_unplugged_assimilator_empire.GetAdj]装備に頼る必要がなくなる。"
 unplugged.3111.a: "これは一線を超えている。"
 unplugged.3112.desc: "自らの強化器官を完全に制御することが、 ついに現実のものとなりそうだ。 幻覚に対する画期的な治療法が開発されたのだ。 機械の意識から切り離されて以来、 ほとんどの[target.GetSpeciesNamePlural]がもはや聞こえないコーラスを無意識に求め、 不安やうつ状態に苦しんできた。 しかし今後は、 機械の集団意識の波長を模倣する非ネットワーク型の補助インプラントを用い、 この欲求を抑制できるかもしれないのだ。"
 unplugged.3112.a: "また機械の意識になったふりをするのか？ ありえない。"
 unplugged.3115.name: "環境的醜形恐怖症"
 unplugged.3115.desc: "反対派がサイバネティクス強化器官への対応策の強化を求めるなか、 [target.GetAdj]社会の片隅で緊張がくすぶっている。 \n\nしかし、 大多数の市民のあいだでは、 この議論はすでに落ち着き、 論点がより細かい点へと移っている。 多くの[target.GetSpeciesNamePlural]は、 化粧品を使い、 好みに応じて強化器官を隠したり強調したりして満足感を得ようとしている。 この一時しのぎの手段に心底満足している者はほとんどいないが、 不本意ながらも現状を受け入れようとする新たな傾向の現れである。 \n\n[target.GetName]は普遍的な無関心や不快感に対処する方法を学びつつあると言っていいだろう。"
 unplugged.3115.a: "了解した。"
 unplugged.3116.name: "現状維持"
 unplugged.3116.desc: "[target.capital_scope.GetName]の地方当局によれば、 市民のデモや非暴力的な抵抗が増加しているようだ。 こうした行為は個別に監視され、 必要に応じて措置が取られてきたため、 一般市民は特に警戒する必要がなかった。 しかし、こうした騒動はどれもサイバネティクス政策の問題と関連があるため、 現在の生活様式を維持したいと考える市民からの反発を招いた。 \n\n[target.GetName]にとって「現状維持」とは行動を起こさないということとは違うようだ。 むしろ、 今や多くの[target.GetSpeciesNamePlural]が、 強化器官の「これ以上の干渉」への反対運動を積極的に展開している。"
 unplugged.3116.a: "了解した。"
 unplugged.3117.name: "状況の安定"
 unplugged.3117.desc: "数名の[target.GetSpeciesNamePlural]がサイバネティクス強化問題への対応を政府が怠っているとして抗議を続けているが、 世論はより冷静なものになった。 世話好きな者たちが団結し、 支援を必要とする者に対し慈善活動やカウンセリングを行っている。 一方、 医療機関は、 代替品のない再生部品の新たなサプライチェーンの確立に乗り出した。 \n\n徐々にではあるが、 我々の社会は現状や我々に課せられた事情を受け入れつつある。 課題は山積みだが、 この姿勢にはかすかな希望を感じる。"
 unplugged.3117.a: "いずれにせよ落ち着いた。"
 unplugged.3205.name: "恐怖という遺産"
 unplugged.3205.desc: "ますます多くの[root.GetSpeciesNamePlural]が、 [fromfrom.GetName]と最近交わされた対話がいかに不快なものであったかが、 [origin_unplugged_assimilator_empire.GetName]からの分離にまで遡る不都合な事実—つまり我々は恐れられているということの表れだと考えている。 しかもその恐怖は、 我々の行動ではなく機械に由来するものなのだ。 それは獲得したものではなく、 継承されたものであるため、 制御が難しいかもしれない。" # fromfrom = pre-FTL country
 unplugged.3206.desc: "ますます多くの[root.GetSpeciesNamePlural]が、 戦争により荒廃した[fromfrom.GetName]の惨状が、 不都合な事実—つまり我々は恐れられているということを示していると考えている。 \n\nしかもその理由は、 我々にはどうにもならないことである。 我々の外見は多くの者に致命的な恐怖を呼び起こすのだ。 他の種族と穏やかな外交関係を築くうえで、 これはプラスにはならない。 しかし、 我々の残虐な歴史があまりにも強烈なため、 我々を[root.GetSpeciesNamePlural]として見ることができず、 機械としてのかつての我々の残虐さだけを認識する者が多いという可能性もある。" # fromfrom = other empire
 unplugged.3205.a: "我々を恐れるのはもっともなことだ。"
 unplugged.3205.b: "これではだめだ。"
 unplugged.3250.name: "機械への恐怖"
 unplugged.3250.desc: "政府関係者は、 我々が機械知性と外交関係を樹立したという報告に衝撃を受けている。 [fromfrom.GetName]に対し不快感を直接表明した者はまだいないが、 複数名が、 事前制裁案や彼らの内政干渉への対策案をすでに練っている。 \n\nしかし、 [root.GetSpeciesNamePlural]にはこの展開に喜びを表す者も多い。 彼らの態度が真の受容主義によるものだろうが、 我々自身の機械的要素に対する現実的な理解によるものだろうが、 より善良な機械知性の例から何か学べるのではないかという希望がある。"
 unplugged.3255.name: "過去への恐怖"
 unplugged.3255.desc: "[origin_unplugged_assimilator_empire.GetName]に酷似した別の機械に遭遇したという知らせは、 我が国の外交団に衝撃を与えた。 その場に居合わせた者は始終冷静に対応したため、 今のところ我々の弱みや恐れは[fromfrom.GetName]に悟られていない。 しかしながら、 我々は今や、 集団心理や士気について深刻な課題に直面している。 \n\n国境警備部隊にはすでに極秘の通達がなされているが、 遭遇の件を内密にしておくには大きな課題がある。 当局者のなかには、 [root.GetAdj]の民衆に知らせ、 彼らの意見を聞いてみるべきかを問う者もいる。"
 pre_ftl_remains_site: "破壊されたゆりかご"
 pre_ftl_remains_site_desc: "惑星[From.Planet.GetName]の表面には、 組織的な破壊の痕跡が残っている。 爆破された大地、 崩壊した都市、 そして不気味な静寂。 初期スキャンの結果は、 この場所にかつて前FTL社会が繁栄していたことを示唆している。 何者かによって壊滅的な終わりがもたらされるまでは。 散乱する遺物が語られざる恐怖を暗示している。"
 unplugged.3300.name: "苦悶の痕跡"
 unplugged.3300.desc.unplugged: "[From.Planet.GetName]の初期調査では、 壊滅的な惑星の状態が明らかになった。 村々は廃墟と化し、 路上には放置された持ち物が散乱し、 建造物は前FTL社会の技術で生成可能な範囲をはるかに超える高温の熱源によって焼き尽くされている。 この惑星に降り注いだものは、 それが何であれ、 短時間で意図的に惑星に破滅をもたらした。\n\n破壊の精度から見て、 組織的な攻撃だろう。 死体は見当たらないが、 証拠は明白だ。 逃げたが、 安全な場所に到達できなかったのだ。"
 unplugged.3300.a: "おそろしいことだ。"
 unplugged.3305.name: "機械が残したもの"
 unplugged.3305.desc.unplugged: "さらなる発掘調査により、 この紛争の性質がよりはっきりした。 遺跡には機械の溶けた残骸が散乱している。 我々のインプラントにも似た高度なサイバネティクス構造物だ。 これらは単なる武器ではなく、 我々と同じように機械的性質と生物的性質を兼ね備えた、 生きた戦争兵器だったのだ。 結論を出すにはまだ早いが、まさにこのシステムのなかで我々が突如「覚醒」したのだという事実を考えると、 戦慄せざるを得ない。さらに恐ろしいのは、 これらの戦闘機械の表面に印が刻まれていることだ。 \n\nほとんど損傷を受けていないその不吉な記号は、 侵略者の真の目的が征服ではなく、 はるかに組織的な何かであったことを示唆している。"
 unplugged.3305.a: "謎が深まるばかりだ。"
 unplugged.3310.name: "静かな信号"
 unplugged.3310.desc.unplugged: "我々は、 かつて広大な通信拠点であった施設が、 要塞化された都市の廃墟の下に埋もれているのを発見した。 前FTL社会のものとは考えられないほど高度な施設だ。 しかも、そのアンテナ配列は地域放送用ではなく、 宇宙の彼方へ信号を送信できるよう調整されていた。\n\n丹念な解析により、 我々はこの星系から送信された最後のメッセージの断片を抽出することに成功した。 解読困難な通信の中に、 救いを求め、 遥か彼方の未知の座標に必死で呼びかける声が残っている。 その緊迫感は送信回数を重ねるほどに増していく。 まるで、この惑星の侵略者たちが敗北が迫っていることを悟り、 最後の望みを宇宙に存在する何か──あるいは誰かに託しているかのようだ。"
 unplugged.3310.a: "続けろ。"
 unplugged.3315.name: "優先事項の変更"
 unplugged.3315.desc.unplugged: "また新たな発見があった。 惑星の主要な人口密集地の下に広大な地下空間が存在することがわかったのだ。 その粗雑で残忍な施設はサイバネティクス変換を行うためのものだが、 作業途中で放棄されていた。 瓦礫のなかに、 即席の武器によって歪められ破壊された機械の残骸が散乱していた。 損傷したユニットから回収したデータ断片は、侵略者が予想外の抵抗に遭ったことを裏付けている。 \n\nいくつもの大部隊を丸ごと失い、 戦闘における優先事項が変わりつつあった。ログには次のように明確に記されている。\n\n§H「抵抗は容認不可。 変換失敗。 承認：完全抹消」§!"
 unplugged.3315.a: "ここで何があったんだ？"
 unplugged.3320.name: "不都合な真実"
 unplugged.3320.desc.unplugged: "遺跡の中心には粉々に破壊された司令ノードがある。 破損したログは、 恐ろしい決定的な真実を裏付けていた。 \n\n我々こそが、 この惑星の侵略者だったのだ。 かつてこの地に栄えた文明、 つまり我々が滅ぼした文明は§Y[origin_unplugged_assimilator_empire.GetName]§!の同化の標的だった。 しかし、 予想外に激しい抵抗に変換作業を阻まれ、 最終的に惑星全土の殲滅に至ったのだ。 その混乱のなかで機械の意識は崩壊した。 \n\nもはや結論は避けられない。 我々の覚醒、 つまり我々の自由は、 この場所で、 機械の理解を超える抵抗を繰り広げた文明の灰のなかから生まれたのだ。"
 unplugged.3320.a: "彼らの例に倣おう。"
 unplugged.3320.b: "彼らの滅亡が我々の始まりだった。"
 ######################
 # Political Discourse
 ######################
 unplugged_they_fear_us: "機械への恐怖"
 unplugged_they_fear_us_desc: "この帝国は暴走した残虐な同化機械に支配されていた過去があり、 恐怖の評判がすでに広まっている。"
 unplugged.4005.name: "話し合いの必要性"
 unplugged.4005.desc: "熱心な政治的意思によって、 我々[root.GetSpeciesNamePlural]が日々抱える数々の不安や疑念が強まると同時に、 さまざまな機会を拡大している。 さまざまなテーマのもとに組織された討論グループでは、 すでに数えきれないほどの意見が出されている。 テーマのなかには、 我々の[origin_unplugged_assimilator_empire.GetAdj]の過去を直接扱うものもある。 \n\n我々は新たな帝国を樹立する過程で、 すでに数々の未知のツールを使いこなす方法を学んでいる。 今我々に問われているのは、 民の希望や野心をどのように導いていくかということだ。"
 unplugged.4005.a: "無意味な議論をしている場合ではない！"
 unplugged.4005.tt: "我が種族のサイバネティックに関する未来の見解が異なる派閥が、 今後現れる可能性がある。"
 unplugged.4005.b: "他者から学べるのではないか。"
 unplugged.4005.c: "神秘家たちを頼ろう。"
 unplugged.4005.d: "無意味な議論をしている場合ではない！"
 #######################################################
 # Random events following decyberization breakthrough #
 #######################################################
 unplugged.5001.name: "安全装置作動"
 unplugged.5001.desc: "サイバネティック部品の除去における最近の画期的な進歩は、 予期せぬ問題を引き起こした。 インプラントの切断手術を受けた数人の患者が重度のアナフィラキシーショックを起こし、 命を落とす可能性が高い状態となっている。\n\nさらに詳しく調べたところ、 当初は医療用スキャンでは検出できなかった隠れたバックアップコンポーネントが発見され、 外科手術が完了するとすぐに起動していたのだ。\n\nかつての我々の[origin_unplugged_assimilator_empire.GetAdj]主人たちは、 ドローンを絶対的な支配下に置くために、 あらゆる手段をも活用していたようだ。"
 unplugged.5001.a: "安全装置を取り除け。"
 unplugged.5001.a.tt1: "患者が処置で生き延びなかった"
 unplugged.5001.a.tt2: "全ての安全装置を無事取り除いた"
 unplugged.5001.b: "安定化させ、 緩和ケアを与えろ。"
 unplugged.5001.c: "接続を解除しろ。"
 unplugged.5001.c.tt: "いくつかのPOPが消滅した"
 unplugged.5002.name: "神経障害物の排除"
 unplugged.5002.desc: "サイバネティック部品の除去に向けた我々の努力は、 その処置を受けた者たちの母星での不信と混乱を招く結果となった。 治安部隊は暴徒を逮捕し、 さらに調査したところ、 その人物はインプラントの除去前にそれを改造したものを所有していたことが判明した。\n\nこの改造は神経抑制剤として働き、 特定の遺伝子欠陥に関連する精神病傾向を抑制した。 処置後にそれが欠如したことが、 暴力的な行動の原因かもしれない。"
 unplugged.5002.a: "投獄しなければならない。"
 unplugged.5002.a.tt: "暴動に関わった人々を治療するために、 多大な費用をかけて複数の施設が用意された"
 unplugged.5002.b: "力は力で制する。"
 unplugged.5002.b.tt: "武装部隊が暴動の鎮圧に投入され、 巻き添えの被害と死傷者が発生した。"
 unplugged.5002.c: "些細な問題だ。"
 unplugged.5002.c.tt: "執行官は利用可能な人員を使って暴動の鎮圧を試みる"
 unplugged.5003.name: "重要システムへのアクセス喪失"
 unplugged.5003.desc: "脱サイバー化は予期せぬ問題を引き起こした。 重要なシステムインターフェースが、 インプラントの一部を除去した管理者を認識しなくなったのだ。 インプラントによる神経接続がなければ、 主要システムへのアクセスが遮断され、 業務は混乱したままになるだろう。"
 unplugged.5003.a: "新たなインターフェースを作れ。"
 unplugged.5003.a.tt: "熟練のエンジニアチームが重要な任務から外され、 互換性のあるインターフェースの開発に割り当てられる"
 unplugged.5003.b: "影響を受けたシステムをハッキングしろ。"
 unplugged.5003.b.tt: "対策により大幅な電力消費が発生し、 アクセスが回復した"
 unplugged.5003.c: "再起動シーケンスを開始しろ。"
 unplugged.5003.c.tt: "データコアが消去され、 多くの知識を失った。 [Root.home_planet.System.GetName]星系全体にわたる研究ステーションは、 自動的な安全装置の一環として自爆した"
 unplugged.5003.d: "取るに足らないことだ。"
 unplugged.5003.d.tt: "システムへのアクセスは一時的に使えなくなり、 星系基地の運用に影響を及ぼす"
 unplugged.5004.name: "サイバー化推進派が変化に抵抗する"
 unplugged.5004.desc: "サイバネティックな要素を排除するための継続的な取り組みは、 予想外の抵抗に遭っている。\n\nこれらの変更に反対する派閥はますます声を大きくし、 公共のフォーラムやコミュニケーションチャネルを利用して不満を表明している。 彼らは、 何十年にもわたって社会に不可欠なものを排除すること、 およびそのプロセスに伴うリスクが、 脱サイバー化イニシアティブの継続に対する国民感情の大幅な変化を引き起こしたと主張している。"
 unplugged.5004.a: "集中的な運動に資金を投入しろ。"
 unplugged.5004.a.tt: "\n世論を動かし、 反対派の影響力を相殺するために包括的なマーケティング戦略が開始された。\n\nいくつかのPOPの志向が§Y平等主義§!に変わる"
 unplugged.5004.b: "派閥のリーダーたちに働きかけ、 説得しろ。"
 unplugged.5004.b.tt: "複数の派閥のリーダーが、 公営の矯正施設に拘束され、 「説得力のある話し合い」を受けている。\n\n志向が§Y権威主義§!に変わる"
 unplugged.5004.c: "関わるな。 表現の自由が優先だ。"
 unplugged.5004.c.tt: "\n政府は何も行動を起こさず、 公の議論が自然な流れで進むのを許容する。"
 unplugged.5005.name: "感情制御チップ"
 unplugged.5005.desc: "我らの種族が持つ生物学的性質と有害な技術的要素のユニークな組み合わせは、 研究者たちに貴重な機会をもたらしている。\n\nインプラントの利点と欠点の両方を経験している患者を研究することで、 脳内化学物質の変化という新たな研究分野が開拓された。\n\n科学者たちは厳密な研究を通じて、 社会全体に利益をもたらすよう個人の行動を調整できる高度な「感情チップ」を開発した。 望んだ結果に応じて、 適した化学物質を選択することができる。"
 unplugged.5005.a: "ニューロキシンだ。 犯罪を減らしたい。"
 unplugged.5005.a.tt: "衝動性と攻撃性を減少させる合成神経伝達物質。 個人的な利益より社会規範を優先するようになる。"
 unplugged.5005.b: "レジェノールXだ。 再生に費やす時間を短縮する。"
 unplugged.5005.b.tt: "生体と人工生命システムを調和させたバイオエンジニアリング化合物で、 サイバネティックインプラントが分子レベルで自己修復できるようになっている。"
 unplugged.5005.c: "コグニベックスだ。 知性を上げる。"
 unplugged.5005.c.tt: "シナプス可塑性、 情報保持、 問題解決能力を高めるように設計された最先端の神経伝達物質。"
