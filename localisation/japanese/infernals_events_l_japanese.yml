 # RG Timeline events
 TIMELINE_EVENT_ORIGIN_RG_START: "$origin_red_giant$\n§L[GetDate]§!"
 TIMELINE_EVENT_ORIGIN_RG_START_TOOLTIP: "§H恒星内に潜むトンネル§!\n§Y起源イベント§!\n\n我々は一連の亜空間擾乱を発見した。 何が我々の恒星を危険なまでに不安定化させているのか、 原因を探る探索が始まった。"
 TIMELINE_EVENT_ORIGIN_RG_END_NOVA: "巨星の死\n§L[GetDate]§!"
 TIMELINE_EVENT_ORIGIN_RG_END_NOVA_TOOLTIP: "§H目撃された超新星§!\n§Y起源イベント§!\n\n我々の恒星は膨張し、 星系全体を呑み込み、 惑星を溶融の廃墟に変え、 資源を虚空へと撒き散らした。 今や我々に残された道はただひとつ。 星々の間に新たな未来を築くことである。"
 TIMELINE_EVENT_ORIGIN_RG_END_STABLE: "鎮まった巨星\n§L[GetDate]§!"
 TIMELINE_EVENT_ORIGIN_RG_END_STABLE_TOOLTIP: "§H救われた母星§!\n§Y起源イベント§!\n\n恒星のサイズの安定化が成し遂げられ、 破滅的崩壊は阻止された。 恒星の出力は増大したが、 それに適応することで、 我々はかつてない強さを得られるだろう。"
 TIMELINE_EVENT_ORIGIN_RG_END_NORMAL: "安らぎの巨星\n§L[GetDate]§!"
 TIMELINE_EVENT_ORIGIN_RG_END_NORMAL_TOOLTIP: "§H救われた母星§!\n§Y起源イベント§!\n\n我々は母星に起きた破滅的変化を逆転させ、 我々の進化を支えてきた穏やかな状態へと戻した。 我々は、 終末すら思わせる脅威を克服できることを証明したのだ。 そして今、 宇宙が投げかけてくるいかなる試練にも立ち向かう覚悟ができている。"
 # COSMIC DAWN
 # All strings below are in order of their appearance ingame
 infernals.2500.name: "深淵の中の信号" # intro
 infernals.2500.desc: "精密なスキャンを行った結果、 §Y[root.capital_scope.GetName]§!の地表下に高度な施設の存在が確認された。 施設は中心部に近づくにつれ規模と複雑さを増しており、 その素材は我々が最初に目覚めた冷凍睡眠室と同じ物質やエネルギーの特徴を示している。\n\nこれらは、 我々の旧文明の名残に違いない。 この施設にアクセスできれば、 我々の過去に関する──我々は何者であり、何が起きたのか──という最大の問いの答えを見出せるかもしれない。"
 infernals.2500.a: "我々の旅路が始まったのだ。"
 INF_ORIGIN_COSMIC_DAWN_DRILLING: "地殻の掘削" # from 2500
 INF_ORIGIN_COSMIC_DAWN_DRILLING_DESC: "我々が何者であるかを知るためには、 まず我々がどこから来たのかを学ばねばならない。 そのためには、 §Y[owner.Capital.GetName]§!の地表下に埋もれた施設を発掘する必要がある。"
 infernals.2505.name: "さらなる同胞の覚醒"
 infernals.2505.desc.a: "我々は、 生存している§Y[root.GetSpeciesNamePlural]§!が眠る冷凍睡眠ポッドを新たに発見した。. 現在、 彼らを目覚めさせている最中だが、 過去に関する理解は我々と同じく曖昧なままだ。"
 infernals.2505.desc.b: "我々は、 生存している§Y[root.GetSpeciesNamePlural]§!が眠る冷凍睡眠ポッドを新たに発見した。 だが、 統合を果たした後でさえ、 彼らには有益な記憶が欠けていることが明らかになった。"
 infernals.2505.a: "大規模な発掘を許可せよ。"
 infernals.2505.b: "必要なものだけを取り除け。"
 infernals.2505.c: "発掘の下請け業者を雇え。"
 situation_cosmic_dawn: "深層発掘"
 situation_cosmic_dawn_type: "$situation_cosmic_dawn$"
 situation_cosmic_dawn_monthly_change_tooltip: "深層発掘の現在の状況。"
 situation_cosmic_dawn_desc: "発掘により、 地下施設から高度なテクノロジーや保存データ、 そして同胞が眠る冷凍睡眠ポッドが見つかった。 我々の歴史そのものが、 ここに埋もれているのだ。 もしすべてを掘り起こすことができれば、 我々が何者であるのか、 ついに理解できるかもしれない。"
 situation_cosmic_dawn_finish_tt: "我々自身を知るためには、 遠い過去を再び明らかにせねばならない。"
 situation_cd_mod_mining: "$approach_cd_mining$"
 situation_cd_mod_drilling: "$approach_cd_drilling$"
 situation_cd_mod_financial: "$approach_cd_financial$"
 situation_cd_mod_storm: "$TRIGGER_FAIL$ 未完了の§Y$INF_ORIGIN_COSMIC_DAWN_STORM$§!スペシャルプロジェクトがある"
 situation_cd_mod_bribe: "$TRIGGER_FAIL$ 未完了の§Y$INF_ORIGIN_COSMIC_DAWN_BRIBE$§!スペシャルプロジェクトがある"
 sit_cd_stage1_tt: "我々は惑星の地殻を穿ちはじめた。"
 sit_cd_stage2_tt: "ここから先は、 もう地表を見ることはできない。"
 sit_cd_stage3_tt: "地殻の半ばに達し、 温度が上昇している。"
 sit_cd_stage4_tt: "これほど地殻の奥深くに潜れば、 核のうねりが聞こえてくる。"
 sit_cd_stage5_tt: "これ以上進めば、 核に呑み込まれてしまうだろう。"
 approach_cd_mining: "露天掘り"
 approach_cd_mining_tt: "総員に掘削を命じよ。 潜るついでに、 鉱物資源も併せて回収せよ。\n月間進捗度：§Y+$@approach_cd_mining$§!\n\n"
 approach_cd_drilling: "精密掘削"
 approach_cd_drilling_tt: "保有する中で最も性能・精度の高い掘削装置を展開し、 必要な部分だけを掘るのだ。\n月間進捗度：§Y+$@approach_cd_drilling$§!\n\n"
 approach_cd_financial: "財政的なインセンティブ"
 approach_cd_financial_tt: "採掘下請けの許可対象をこの事業に切り替え、 利益の一部を我々のものとせよ。\n月間進捗度：§Y+$@approach_cd_financial$§!\n\n"
 # Stage 2
 infernals.2510.name: "記憶喪失とデータ"
 infernals.2510.intro: "我々がさらなる冷凍睡眠ポッドを発見するにつれ、 我々は記憶をほぼ完全に喪失していることが判明してきた。"
 infernals.2510.desc.a: "$infernals.2510.intro$\n\n目覚めたばかりの同胞の中には、 いま我々が抱いているものと同じ問い「お前は誰だ？」を投げかける者もいる。\n\n数世紀に及ぶ歴史と高度に発展した社会を持ちながらも、 我々は彼らと同じく、 その答えに一歩も近づいてはいない。\n\n$infernals.2510.outro$"
 infernals.2510.desc.b: "$infernals.2510.intro$\n\n目覚めた同胞たちも、 他の者たちと同じく我々の起源に関する記憶を欠いている。 答えがない以上、 我々は歴史の中に自らの道筋を切り拓くほかない。\n\n$infernals.2510.outro$"
 infernals.2510.outro: "しかし、 眠っていた者たちとは違い、 彼らのデータベースには驚くべき新たな情報が保存されていた。 我々はその解析を何度も繰り返し確認したが、 結果は疑いようがない。 そのデータは、 我々が初めて冷凍睡眠に入ってから120億年以上が経過していることを示している。\n\nこれは、 我々の起源が宇宙誕生の直後、 最初期の恒星や惑星が形成されていた頃にあることを意味する。 我々は、 進化した最初の知的存在の一つなのかもしれない。"
 infernals.2510.a: "失われた時間を取り戻すのだ。"
 infernals.2510.b: "我々は、この宇宙の正当な所有者だ。"
 # Stage 3
 infernals.2515.name: "生命維持の失敗"
 infernals.2515.desc: "我々はひとつの悲劇を掘り起こした。 無傷で残されていた冷凍睡眠施設の記録によれば、 §Y[event_target:homeworld.GetName]§!は現在の恒星に引き寄せられるまで、 数十億年ものあいだ漂流していたという。 そしてこの引き寄せが、 巨大な波を引き起こした。\n\nその力こそが、 いま我々が故郷と呼ぶ火山の楽園を形作ったのだが、 最初の衝撃波は施設の電源セルを致命的に破壊した。 自動化されたシステムは高位の個体を優先し、 下位ポッドと建造物の維持機能を停止させた。\n\n我々の[GetScientistPlural]は、 起動すればすでに漏電している電源セルがさらに損なわれ、 トンネル全体が連鎖的に崩落するとし、 そうなる前に救出できるのは1名のみであると予測している。\n\n階層による優先順位がなければ、 もっと多くの命を救えたかもしれない。"
 infernals.2515.a: "科学の進歩が最重要だ。"
 infernals.2515.a.tt: "リーダーを獲得： £scientist£ §Y$scientist$§!"
 infernals.2515.b: "専門家を優先したのは正しい選択だ。"
 infernals.2515.b.tt: "リーダーを獲得： £official£ §Y$official$§!"
 infernals.2515.c: "セルを起動させずに解除せよ。"
 infernals.2515.c.tt: "個人は代わりが効くが、 我々の帝国は拡大するための領域を必要としている。"
 infernals.2520.name: "星間の避難所"
 infernals.2520.desc: "§Y[event_target:leader.GetName]§!は自分たちの冷凍睡眠アーカイブを復元している。 最新の調査によれば、 かつての我々と同じく冷凍睡眠状態で保存された小規模の[root.GetSpeciesNamePlural]の集団が、 銀河各地に多数散在している可能性がある。\n\nアーカイブにはそれらの惑星の座標が記録されていたが、 すでに幾つもの星が誕生し、 消滅しているため、 現在の位置を特定するには複雑な補間計算が必要である。 実証の一例として、 [event_target:leader.GetName]が1つの惑星を突き止めたが、 データセット全体の解読は始まったばかりだ。\n\n一方で、 不穏な疑念も湧き上がる。 [root.Capital.GetStarName]は我々の真の故郷ではなく、 数多の避難先のひとつにすぎないのではないか？  そうだとしたら、 我々の起源はどこなのだろう？  そして、 それを知ることに今でも意味はあるのだろうか？"
 infernals.2520.a: "我々の同胞を探し出さねばならない。"
 infernals.2520.b: "いまやこの惑星こそが我々の故郷だ。"
 cosmic_dawn_anomalies_event_chain_title: "星間の避難所"
 cosmic_dawn_anomalies_event_chain_desc: "かつての我々と同じく冷凍睡眠状態で保存された[root.GetSpeciesNamePlural]の集団が、 発見されることなく、 銀河各地に多数散在している可能性がある。\n\nアーカイブにはそれらの惑星の座標が記録されていたが、 すでに幾つもの星が誕生し、 消滅しているため、 現在の位置を特定するには複雑な補間計算が必要である。"
 # Anomaly 2
 cosmic_dawn_sleepers_category: "同胞が眠る星"
 cosmic_dawn_sleepers_category_desc: "この座標の惑星には、 眠れる同胞とテクノロジーが隠された場所があるという。 徹底的に調査すべきだ。"
 infernals.2525.name: "$cosmic_dawn_sleepers_category$"
 infernals.2525.desc: "§Y[root.leader.GetName]§!は地中の施設を発見し、 そこで眠る我々の同胞を目覚めさせることに成功した。 彼らは我々とは異なり、 過去の生活に関するかすかな記憶を保持しており、 いつの日か偉大な宇宙帝国が復活し、 彼らを救うだろうという物語を信じている。\n\n彼らは用心深いものの、 我々を同胞として認めている。 我々は彼らが長く待ち望んできた救済者として振る舞い、 古の栄光の相続人を名乗ることができる。 あるいは真実を告げ、 我々は新たな道を築きつつあり、 互いに知識を交換したいと伝えることもできる。\n\nこれらのアーカイブに残された新たな手がかりによって、 冷凍睡眠ポッドが隠されている第2の候補を絞り込むことができた。"
 infernals.2525.a: "我々は古の救済者である。"
 infernals.2525.b: "我々は新しきものを築いている。"
 infernals.2525.c: "彼らを同化せよ。"
 # Anomaly 3
 cosmic_dawn_sleepers2_category: "眠れる同胞の警戒心"
 cosmic_dawn_sleepers2_category_desc: "$cosmic_dawn_sleepers_category_desc$"
 infernals.2530.name: "$cosmic_dawn_sleepers2_category$"
 infernals.2530.desc: "§Y[root.leader.GetName]§!は、 さらに眠っていた同胞を発見し、 覚醒させることに成功した。 だが彼らは恐怖を示し、 我々に立ち去るよう要求した。 彼らは我々を同胞として認めず、 我々の存在を歓迎しなかった。\n\n緊迫した交渉の末、 彼らは銀河を旅したいという意向を示した。 我々は少額のコストで簡素な船を与えることもできる。 あるいは、 常に労働力を必要としている近くの植民地へと移住させることもできる。 そうすれば、 彼らもいずれ道理を理解するかもしれない。\n\nこの施設のアーカイブは、 さらなる冷凍睡眠ポッドが隠された別の惑星の位置を示している。"
 infernals.2530.a: "船を与えろ。"
 infernals.2530.b: "母星に連れ帰れ。"
 infernals.2530.b.tt: "£pop£ $POPS$を獲得：§G+200§!"
 infernals.2530.c: "彼らを同化せよ。"
 # Ship returns
 infernals.2531.name: "帰還"
 infernals.2531.desc: "我々の船で旅に出た眠りし者たちが戻ってきた。 しかも巨大な軍艦に乗って。 彼らは銀河を横断するなかで海賊と衝突したが、 機知をもって相手を出し抜き、 ついには打ち倒した。\n\n敵船の奪取は彼らの中に火を灯した。 それは海賊行為への渇望だ。 それ以来、 彼らの襲撃はより大胆となり、 標的もより強大になっていった。 だが、 いかに順調といえど、 海賊生活は永遠には続かない。\n\nいま彼らは帰還し、 安定、 あるいはそれ以上のものを求めている。 彼らの船、 経験、 そして戦利品をもってすれば、 彼らはこの先大いに役立つだろう。"
 infernals.2531.a: "代償を払う価値はあった。"
 infernals.2531.a.tt: "船を艦隊に編入し、 巡洋艦として利用できる。"
 infernals.2531.b: "船を改装し、 新たな惑星を開拓させよ。"
 infernals.2531.b.tt: "§H$colonizer$§!を獲得する。"
 infernals.2531.c: "我々の首都に彼らを受け入れよ。"
 infernals.2531.c.tt: "£pop£ $POPS$を獲得：§G+200§!"
 # Anomaly 4
 cosmic_dawn_sleepers3_category: "眠れる宇宙港"
 cosmic_dawn_sleepers3_category_desc: "$cosmic_dawn_sleepers_category_desc$"
 infernals.2535.name: "$cosmic_dawn_sleepers3_category$"
 infernals.2535.desc: "§Y[root.leader.GetName]§!は小規模な冷凍睡眠施設と、 ほぼ稼働可能な科学船を収容する隠された宇宙港を発見した。 わずかな修理で十分使えるだろう。\n\n施設には科学的データが大量に残されており、 他種族から採取された保存標本も含まれていた [GetInterstellarRefugiaDesc2535] これらが力ずくで奪われたものなのか、 自発的に提供されたものなのかは不明だ。 だが科学船には、 知的生命体を収容するための拘束区画が設けられていた。\n\nこれらを研究すれば大きな成果を得られるだろう。 彼らの研究を引き継ぐこともできるかもしれない。 だが、 他の帝国は自らの祖先を解剖されることに異を唱えるかもしれない。"
 infernals.2535.contact: "その中には現存する知的種族の祖先と見られるものもある。" # prints this in [GetInterstellarRefugiaDesc2535] above
 infernals.2535.nocontact: "。" # Can't be empty, so holds the full stop.
 infernals.2535.a: "標本を研究せよ。"
 infernals.2535.b: "標本をその親族に返せ。"
 infernals.2535.c: "データや標本を廃棄せよ。"
 # Random Stasis Pods discovered
 infernals.2536.1: "数か月に及ぶ作業の末、 [planet.GetName]で眠っていた新たな[root.GetSpeciesNamePlural]はすべて我々の一員となった。"
 infernals.2536.1.a: "その星系へ進路を取れ！"
 infernals.2536.1.b: "もはや構っている暇はない。" # ends the chance to spawn more pods.
 infernals.2536.2: "別の冷凍睡眠ポッドが無事に開かれ、 居住者たちは帰還させられた。"
 infernals.2536.3: "我々はさらに多くの[root.GetSpeciesNamePlural]を解放し、 恒星の熱が生存に不可欠となる、 より寒冷な宇宙への適応を支援している。"
 infernals.2536.4: "[planet.GetName]で、 さらに多くの[root.GetSpeciesNamePlural]が無事に目覚めた。"
 infernals.2536.5: "別の冷凍睡眠ポッドが無事に発見された。"
 infernals.2536.6: "[root.leader.GetName]はさらなる冷凍睡眠ポッドを発見し、 より多くの[root.GetSpeciesNamePlural]を太古の時代から我々の生きる現代へと蘇らせた。"
 infernals.2536.7: "[root.leader.GetName]は、 [root.GetSpeciesNamePlural]が安全に冷凍睡眠状態で保存されている別の冷凍睡眠ポッドを発見した。"
 infernals.2536.8: "[root.leader.GetName]は、 [planet.GetName]で古代の冷凍睡眠ポッドを開き、 目覚めた者たちの低温ショックの治療にあたっている。"
 infernals.2536.9: "[planet.GetName]で、 [root.GetSpeciesNamePlural]が収められた別の冷凍睡眠ポッドが発見された。"
 infernals.2536.10: "太古の時代から眠る、 さらに多くの[root.GetSpeciesNamePlural]が目覚め、 我々の一員となった。"
 # Stage 4
 infernals.2540.name: "古の監獄"
 infernals.2540.desc: "我々の最新の発掘は驚きをもたらした。 ここで眠っていた者たちは数世紀前に目覚めていたが、 施設を一度も離れていなかったのだ。\n\n建築学的解析によれば、 彼らを閉じ込める目的で施設は外側から施錠されているらしい。 補強扉を切り破って侵入したところ、 すぐに敵対行動に遭遇したが、 彼らはその後退却した。\n\nアーカイブが事情を説明してくれるかもしれないが、 アクセスすれば彼らをさらに挑発するおそれがある。 我々は施設を強襲して事を一気に片付けるか、 あるいは賄賂を贈って協力を取り付けることもできる。"
 infernals.2540.a: "施設を強襲せよ。"
 infernals.2540.b: "贈り物と友好を提案する。"
 INF_ORIGIN_COSMIC_DAWN_STORM: "冷凍睡眠施設強襲"
 INF_ORIGIN_COSMIC_DAWN_STORM_DESC: "我々はこの施設にアクセスする必要がある。 覚醒した同胞が我々の妨げとなっている。 武力で排除せよ。"
 infernals.2545.name: "監獄突破"
 infernals.2545.desc: "我々の部隊は施設を強襲したが、 わずかな抵抗があっただけでほとんどの居住者を迅速に制圧した。\n\nアーカイブの解析を行うと、 ここが監獄であったことが判明した。 収容者たちは宇宙の冷却を再加熱する過激な技術的試みを主張する過激派であった。 その主張には現実的でないものや、 破滅を招きかねないものもあった。\n\n監獄を指揮する一部の§Y[root.GetSpeciesNamePlural]§!たちが、 爆薬を抱えて中央の区画に立て籠もり、 全居住者を留めたまま施設を再び封鎖することを要求している。\n\nトンネルを目に見えないガスで満たして爆薬を不活性化し、 建造物を救うことは可能だ。 しかしその場合、 ほとんどの居住者は間もなく窒息死するだろう。"
 infernals.2545.a: "トンネルをガスで充満させろ。"
 infernals.2545.a.tt: "£pop£ $POPS$を獲得：§G+100§!"
 infernals.2545.b: "速やかに避難せよ。"
 infernals.2545.b.tt: "£pop£ $POPS$を獲得：§G+400§!"
 INF_ORIGIN_COSMIC_DAWN_BRIBE: "冷凍睡眠施設の買収"
 INF_ORIGIN_COSMIC_DAWN_BRIBE_DESC: "この施設の居住者を我々に依存させられれば、 施設へのアクセスを強く要求できるようになる。 有用かつ重要な物資を惜しげなく供給するべきだろう。"
 infernals.2550.name: "監獄突破"
 infernals.2550.desc: "数か月にわたる交易の結果、 かつての冷凍睡眠施設に収容されていた者たちは我々の物資に頼るようになった。 供給を断つと脅したところ、 彼らは狼狽し、 施設の管理権を譲渡した。\n\nアーカイブによれば、 ここが監獄であったことは間違いない。 彼らはかつて、 宇宙の冷却を再加熱しようとする過激なテクノロジーを推進していた。 その構想には馬鹿げたものもあれば、 実現すれば危険なものもあった。\n\n幸いにも、 彼らはこれらの計画を一切覚えていない。 科学者たちが現場を研究する一方で、 元被収容者たちは社会へと統合されつつあり、 同化の途上にある。"
 infernals.2550.a: "よくやった。"
 infernals.2550.a.tt: "£pop£ $POPS$を獲得：§G+300§!"
 # Stage 5
 infernals.2555.name: "悲劇的な事故"
 infernals.2555.intro: "最近、 発掘現場で事故が発生した。 施設の発電所が損傷したが、 冷凍睡眠ポッドは今のところ稼働している。"
 infernals.2555.outro: "システムがあとどれほど持つかは不明だ。 眠れる同胞を救うつもりなら、 施設の電力が尽きる前に行動せねばならない。"
 infernals.2555.desc.a: "$infernals.2555.intro$\n\n疑念は、 以前の施設から同化されたばかりの好熱種族の一部に向けられている。 彼らはあまり勤勉な労働者ではなかったという噂がある。\n\n$infernals.2555.outro$"
 infernals.2555.desc.b: "$infernals.2555.intro$\n\nこの惨事を聞き、 以前に救出された好熱種族の共同体が、 救出作業を迅速に行うべく協力を申し出た。\n\n$infernals.2555.outro$"
 infernals.2555.a: "不忠な労働者を浄化せよ。"
 infernals.2555.b: "金を払ってもっと人員を雇え。"
 infernals.2555.c: "急いで救出にあたれ。"
 infernals.2555.d: "慎重に進めろ。"
 # Option events from above (Stage 4)
 infernals.2560.name: "事態の収拾"
 infernals.2560.desc: "我々は最も忠実な労働者のみに立ち入りを許可し、 救出作業の混乱を最小限に抑えた。\n\nだが、 セキュリティチェックによって人員が制限され、 施設を救うことはできず眠れる同胞たちは命を落とした。\n\n唯一の慰めは、 そのテクノロジーを研究できることにある。 施設が徐々に崩壊して停止する過程で、 貴重な知見が得られるかもしれない。"
 infernals.2560.a: "残念だ。"
 infernals.2565.name: "$infernals.2560.name$"
 infernals.2565.desc: "我々は救出作業に対して金銭的な報酬を提示し、 多数の志願者を得た。\n\nしかし、 かつての監獄収容者たちに作業が妨害されてしまった。 彼らは富をもって支配しようとする我々のやり方に怨恨を抱いていたのだ。 破壊工作によって、 冷凍睡眠ポッドの中にいた者はすべて命を落とした。\n\nわずかな慰めは、 損害が限定的であったことだ。 我々は依然としてテクノロジーやアーカイブを研究できる。 また、 この失敗によって露呈した選別体制の欠陥も、 今後是正することができる。"
 infernals.2565.a: "なんという卑劣な行為だ！"
 infernals.2570.name: "$infernals.2560.name$"
 infernals.2570.intro: "多数の労働者と救出隊が地下施設に投入されたことで、 故障しかけていた冷凍睡眠ポッドから眠っていた[Species.GetName]たちを迅速かつ安全に救出することができた。 新たな市民となった彼らは、 自らが逃れた運命を目の当たりにし、 救出に感謝している。"
 infernals.2570.outro: "しかし、 慌ただしい救出の過程で多くの冷凍睡眠ポッドはこじ開けられるか破壊され、 科学的価値は損なわれてしまった。"
 infernals.2570.desc.a: "$infernals.2570.intro$\n\n$infernals.2570.outro$"
 infernals.2570.desc.b: "$infernals.2570.intro$\n\nさらに、 監獄から同化されたものたちが自ら志願し、 新たな仲間を対話や物資の提供を通じて支援し、 社会への統合を円滑にしているようだ。\n\n$infernals.2570.outro$"
 infernals.2570.a: "新たな支援者たちがいて助かった。"
 infernals.2570.a.tt: "£pop£ $POPS$を獲得：§G+400§!"
 infernals.2570.b: "よくやった。"
 infernals.2570.b.tt: "£pop£ $POPS$を獲得：§G+400§!"
 infernals.2570.c: "$ACKNOWLEDGED$"
 infernals.2570.c.tt: "£pop£ $POPS$を獲得：§G+400§!"
 infernals.2575.name: "$infernals.2560.name$"
 infernals.2575.desc: "科学者たちはシステムを慎重に解析し、 冷凍睡眠中の同胞の救出に取りかかる前に状況を完全に把握した。\n\nしかし、 解析から結果の公開、 追跡研究に至るまでの過程に時間を要しすぎた。 準備が整ったときにはすでに生命維持装置は停止し、 すべての命は失われていた。\n\n悲劇ではあったが、 救出作業は大きな科学的成果をもたらし、 回収されたテクノロジーはすでに有用性が証明されつつある。"
 infernals.2575.a: "幸い、 生きている者はその恩恵を享受できる。"
 infernals.2575.b: "$ACKNOWLEDGED$"
 # Situation completed
 infernals.2580.name: "明かされた歴史"
 infernals.2580.desc: "ついに我々は惑星の中心核に到達した。 その大きさは想像を絶するものだ。 内部には、 マグマを動力源とし、 数千の眠れる同胞を収容する巨大なアーコロジーが広がっていた。\n\nまた、 我々の過去を記録した膨大なアーカイブも存在していた。 それは銀河帝国の興隆、 そして宇宙が大いなる冷却に沈みゆく時代の声だ。 ある者は冷凍睡眠を選び、 ある者は避けられぬ運命と戦い、 そして多くは現実を否定したまま滅びた。\n\nこの記録の宝庫は、 長らく埋もれていた真実を明らかにした。 ある者は、 これこそが我々の真の姿であり、 我々がこれから何者になるのかを示していると信じている。 一方で、 我々はすでに現状に適した自己を築いており、 祖先の社会はもはやこの宇宙にはそぐわないと主張する者もいる。\n\nいずれにせよ、 この広大なトンネル網は我々の好きなように使うことができる。"
 infernals.2580.a: "古き良き帝国を再建せよ。"
 infernals.2580.b: "他の帝国に我々の遺産を尊重させるのだ。"
 infernals.2580.b.tt: "リーダーを獲得： £commander£ §Y$commander$§! (初期レベル§G5§!)。"
 infernals.2580.c: "我々は未来を見据えるべきだ。"
 infernals.2580.d: "善を成すことこそが重要である。"
 # Relic & Specimen
 r_pyroglyphic_codex: "炎の写本"
 r_pyroglyphic_codex_desc: "黎明期の文明に関する豊富な情報を秘めた、 複雑な結晶の天球儀。 その内容は、 より偉大な社会を築くためのさまざまな知見を我々に教えてくれるだろう。"
 r_pyroglyphic_codex_effect_tt: "\n§Y初めて§!$r_pyroglyphic_codex$を起動すると、 首都に永続的な§Y$infernal_library$§!の補正が付与される。 効果：$TABBED_NEW_LINE$- $MOD_PLANET_MAX_DISTRICTS_ADD$：§G+5§! $TABBED_NEW_LINE$- $MOD_PLANET_HOUSING_MULT$：§G+20%§! $TABBED_NEW_LINE$- $MOD_PLANET_AMENITIES_ADD$：§G+10%§!"
 infernal_library: "地下建築物"
 infernal_library_desc: "この惑星で古代の建築技術が再発見されたことにより、 広大で洞窟のような都市を建設する新たな可能性が開かれた。 これまでに見たことのない構造と精緻な設計は、 まさに目を見張る光景であり、 すべての市民に我々の真なる起源を思い起こさせる。"
 pyroglyphic_codex_mod: "$r_pyroglyphic_codex$"
 pyroglyphic_codex_mod_desc: "炎の写本に秘められた魅惑的な叡智は、 新たな研究分野を次々と切り開いている。 その影響は、 今後も数年間にわたり続くだろう。"
 infernal_stasispod: "古代の冷凍睡眠ポッド"
 infernal_stasispod_desc_short: "驚異的な精度の温度制御機構を備えた、 人工石製の棺"
 infernal_stasispod_desc_details: "このポッドは、 古代の[Species.GetName]が数十億年ものあいだ冷凍睡眠に入るために使用したものであり、 温度が生存に適するまで上昇したときのみ内部に入った者が目覚めるよう設計されていた。 このポッドは、 システムの多くが故障し、 居住者が命を落とした施設から持ち出されたものである。 それは、 [Species.GetName]の生存者たちが乗り越えてきた試練を、 厳粛かつ痛切に思い起こさせる遺物である。"
 ####################################
 # Colony Events
 ####################################
 # Imminent Eruption
 infernals.3000.name: "噴火の兆候"
 infernals.3000.desc: "地質警報システムが、 §Y[planet.GetName]§!の主要居住地付近で、 今後1年以内に火山噴火が発生する可能性を警告している。\n\n圧力解放の制御に投資すれば、 溶岩流をエネルギー生産に利用できるかもしれない。 また、 噴火から直接マグマを採取し、 貴金属を抽出するために作業班を待機させることも可能だ。 一方で、 民間人と資源を避難させ、 危険を最小限に抑えることに注力する選択もある。\n\nあるいは、 予測が誤っている可能性もあるため、 いずれの行動にも踏み切らず、 引き続き状況を監視することも選択肢の1つだ。"
 infernals.3000.a: "避難せよ！"
 infernals.3000.a.tt: "$energy$を§Y500§!保有している。"
 infernals.3000.b: "見守ろう。"
 infernals.3000.c: "発電に注力せよ。"
 infernals.3000.d: "マグマを採取せよ。"
 infernals.3005.name: "間一髪"
 infernals.3005.desc: "植民地の早期避難は、 結果的に正しい選択だった。 火山は予想よりも早く噴火し、 周辺の建造物に深刻な被害を与えた。 現在では、 地下の火山圧はほぼ消失しており、 入植者たちは安全に帰還して再建を始めることができる。"
 infernals.3010.name: "火山の怒り"
 infernals.3010.desc: "火山が予想よりも早く爆発し、 植民地はこの災厄に対処する準備ができていなかった。 インフラには甚大な被害が発生し、 多くの命が失われた。"
 infernals.3015.name: "静観"
 infernals.3015.desc: "数か月後、 §Y[planet.GetName]§!の植民地付近の火山活動は再び沈静化した。 長期的な安全性のリスクは依然として残っているものの、 当面は植民地も安全と見なせるだろう。"
 infernals.3015.a: "リスクを冒した甲斐があった。"
 infernals.3020.name: "強化電力グリッド"
 infernals.3020.desc: "技術班は、 地下空洞で圧力のかかった溶岩を安全に徐々に放出し、 発電機に送るシステムの構築に成功した。 その結果、 植民地の電力グリッドは短期的に大きな恩恵を受けている。"
 infernals.3025.name: "マグマ採取"
 infernals.3025.desc: "火山噴火は、 超音波攪乱装置と物理的な防壁の併用によって抑制され、 大量のマグマが地表で封じ込められ、 凝固しつつある。 採掘班はすでに、 この豊富な鉱物資源の収集を開始している。"
 # Lava Sports
 infernals.3030.name: "溶岩スポーツ"
 infernals.3030.desc: "常識的に考えれば、 誰も剥き出しの溶岩が勢いよく流れるそばで過ごしたいとは思わないだろう。 だが少なくとも§Y[planet.GetName]§!においては、 その常識は通用しない。\n\n入植者たちは、 活発な溶岩流の上を多用途ホバークラフトで競走し、 浮遊する岩塊を避け、 溶岩滝を飛び越えている。 一方で、 その結果に賭ける者も現れ、 賭場は組織犯罪の関心を引きつけている。 すでに数名の操縦士がさまざまな事故で命を落としている。\n\nこのような行為を想定していなかったため、 植民地にはそれを禁ずる法律が存在しない。 我々は入植者の熱狂を受け入れ、 好きにさせることもできる。 しかしその場合、 より危険な挑戦が増えるだろう。 それだけでなく、 こうしたスポーツに対する賭博はすでに増加傾向にあるため、 犯罪につながる可能性もある。 あるいは、 多少の不満は出るだろうが、 この競技を規制し、 長期的には死者と犯罪を減らす道を選ぶこともできる。 もちろん、 完全に禁止することも可能だが、 その取り締まりには相応のコストがかかるだろう。"
 infernals.3030.a: "好きにさせよ。"
 infernals.3030.b: "競技を規制せよ。"
 infernals.3030.c: "この愚行を禁じろ！"
 lava_surfboard: "溶岩サーフボード"
 lava_surfboard_desc_short: "裏面に即席のホバー機構が溶接された、 細長い鋼鉄製の板"
 lava_surfboard_desc_details: "[Event.Planet.GetName]の溶岩スポーツで使用されるこのサーフボードは、 明らかに予備部品の寄せ集めで作られているが、 驚くほど丁寧かつ巧妙に設計されている。 そのホバーシステムと耐熱保護は優れており、 外観は辺境入植者の荒々しい自立精神を体現している。"
 infernals.3035.name: "好きにさせよ！"
 infernals.3035.desc: "溶岩スポーツの流行を容認すると、 入植者たちのあいだでこの競技をめぐる熱狂が爆発的に広がった。 溶岩流の上をホバークラフトで駆け抜ける操縦士たちの姿は、 急速に§Y[planet.GetName]§!の地域文化のシンボルとなりつつある。\n\nだが、 熱狂の陰で安全は後回しにされている。 断続的に死亡事故の報告が届いており、 犯罪組織の高利貸しが溶岩スポーツに熱中する賭博常習者を食い物にしているようだ。 競技に対する世論の支持は依然として高いが、 今後もその負の側面を注視する必要がある。"
 infernals.3035.a: "不穏を感じる。"
 infernals.3040.name: "安全対策"
 infernals.3040.desc: "当初、 帝国当局がこの愛すべき娯楽を規制しようとした際、 入植者たちは強く反発したが、 競技用サーフボードに義務付けられた新たな安全対策により、 負傷者と死者はほぼ皆無となった。 操縦士たちは自らの安全を守るための規制の有用性を語りはじめ、 世論も次第にそれを受け入れつつある。\n\nまた、 溶岩スポーツ賭博に対して財務の透明性と課税が導入され、 その収益は競技者の安全装備資金に充てられている。 犯罪勢力は賭場からほぼ姿を消したが、 一部の入植者は当局による課税を不当だと訴えている。"
 infernals.3040.a: "安全に越したことはない。"
 infernals.3045.name: "競技の禁止"
 infernals.3045.desc: "この危険な娯楽を止めさせるため、 法執行機関による取締が行われた。 強硬な取締りに対し世論の反発は激しく、 植民地各地で抗議運動が発生した。 だが、 溶岩流が常時監視下に置かれ、 競技を行えなくなった結果、 死亡者はゼロとなり、 賭博の現場もほぼ消滅した。"
 infernals.3045.a: "他に道はなかった。"
 lava_sports_flow: "溶岩スポーツ：§G許可§!"
 lava_sports_flow_desc: "入植者が競技を楽しむことを許可した結果、 溶岩スポーツをめぐる熱狂が爆発的に広がった。"
 lava_sports_regulated: "溶岩スポーツ：§Y規制§!"
 lava_sports_regulated_desc: "当初、 帝国当局がこの愛すべき娯楽を規制しようとした際、 入植者たちは強く反発したが、 競技用サーフボードに対して義務付けられた新たな安全対策により、 負傷者と死者はほぼ皆無となった。 操縦士たちは自らの安全を守るための規制の有用性を語りはじめ、 世論も次第にそれを受け入れつつある。"
 lava_sports_banned: "溶岩スポーツ：§R禁止§!"
 lava_sports_banned_desc: "この危険な娯楽を止めさせるため、 法執行機関による取締が行われた。"
 # Kindled Myths
 infernals.3055.name: "燃え上がる神話"
 infernals.3055.desc: "§Y[pre_ftl_planet.GetName]§!の前FTL種族の者たちは、 我々の最古の神話に登場する存在と驚くほどの類似点を持っている。 これには収束進化や心理学の一般的傾向で説明できる部分もあるが、 この種族について学べば学ぶほど、 さらに多くの共通点が見つかる。\n\n彼らは本当に我々の神話や伝説に登場する存在と同じなのだろうか？  この可能性に対する期待は高まっており、 さらなる研究投資も検討できる。 しかし、 偶然が積み重なっているだけかもしれず、 過度に干渉すれば我々の存在をこの社会に知らしめ、 予期せぬ結果を招くおそれもある。"
 infernals.3055.a: "偶然だ、 無視しろ。"
 infernals.3055.b: "さらなる調査を行え。"
 infernals.3060.name: "馬鹿げた仮定"
 infernals.3060.desc: "さらなる調査を求める声もあったが、 神話的異星種族という仮説をこれ以上追うのは賢明ではない。 結局のところ、 この種族には独自の神話や伝承、そして自己認識の体系があり、 我々の先入観とは相容れないものかもしれない。 本件に関する研究は停止され、 資金は他の課題へと再配分された。"
 infernals.3060.a: "我々と似てはいるが、 やはりどこか違う。"
 infernals.3065.name: "原始の混乱"
 infernals.3065.desc: "この種族を我々の神話と結びつけようとするあまり、 我々の工作員は安全な前FTLとの接触プロトコルを怠ってしまった。 惑星各地で、 現地住民が我々の艦船を目撃した記録が残され、 装備が盗まれたり、 さらには工作員が研究目的で誘拐される事件まで発生している。 我々の存在が知られたことで、 現地社会には動揺が走り、 反応は二極化している。\n\n作戦の混乱にもかかわらず、 国民の間では神話的つながりへの熱狂がなおも続いている。 この種族は、 いまや帝国全体でますます神話的な存在として見られつつある。"
 infernals.3065.a: "もっと慎重であるべきだった。"
 infernals.3070.name: "驚異的な発見"
 infernals.3070.desc: "§Y[pre_ftl_planet.GetName]§!の住民に対する徹底的な研究により、 神話的仮説はトーンダウンした。 我々の最古の物語と彼らとの間には多くの共通点が見いだされたものの、 相容れぬ相違点も明らかになった。\n\n簡単に結論が出ることはなさそうだが、 この種族への関心と熱意は衰えていない。 彼らは、 我々の神話に登場する原初の存在の末裔であり、 相違は膨大な時間の経過によるものではないかとの説もある。 いまや我々は彼らを独立した社会として認めざるを得ないが、 それでも帝国内の多くの者が、 彼らに強い精神的なつながりを感じるようになっている。"
 infernals.3070.a: "我々すべてにとって、 実りのある時だ。"
 # Molten Core Grand Archive specimen
 infernals.3200.name: "溶融核"
 infernals.3200.desc: "§Y[planet.GetName]§!の植民地が拡大するにつれ、 $sr_living_metal$を用いていた絶滅文明の痕跡が見られるようになったが、 彼らがこの物質をどこから得ていたのかを示す手がかりは見つかっていなかった。\n\nところが最近その答えが浮上した。 深部のマグマ流から浮かび上がってきた、 力場に包まれた不思議なきらめく球体である。 その用途や構造はすぐには判明しなかったが、 極めて高温の環境下で一定の$sr_living_metal$が生成されることが確認された。 この発見は考古学上の謎を見事に解き明かすものだが、 今度はそれをどう扱うかを決めねばならない。"
 infernals.3200.a: "遺物を保管せよ。"
 infernals.3200.a.accept: "この奇妙な物体は、 我々のいかなる技術とも異なる。 $sr_living_metal$の供給源として有用であるだけでなく、 学術的、歴史的にも価値ある研究対象である。"
 infernals.3200.b: "溶岩へと投げ戻せ。"
 infernals.3200.b.deny: "適応に失敗し滅んだ文明に敬意を払う理由などない。 この遺物は廃棄し、 なかったことにせよ。"
 infernal_molten_core: "溶融核"
 infernal_molten_core_desc_short: "かすかなノイズを発する力場に包まれた、 波打つ流体のような質感をもつ銀色の球体"
 infernal_molten_core_desc_details: "この溶融核の力場は、 高温にさらされたときのみわずかに緩み、 そこから1滴の$r_living_metal$が流れ出す。 これを創造した者たちははるか昔に滅んだが、 この核は、 彼らの科学と創意の証として今も存在している。"
 # CD Timeline events
 TIMELINE_EVENT_ORIGIN_CD_START: "深淵の残響\n§L[GetDate]§!"
 TIMELINE_EVENT_ORIGIN_CD_START_TOOLTIP: "§H痕跡の追跡§!\n§Y起源イベント§!\n\n我々は惑星の地中深くから、 微弱ながらも複雑な信号を検出した。 それは、 地殻の奥深くに埋め込まれた古代構造物群から発せられており、 我々が長い冷凍睡眠に入る以前の時代に築かれたものだ。"
 TIMELINE_EVENT_ORIGIN_CD_END: "明かされた歴史\n§L[GetDate]§!"
 TIMELINE_EVENT_ORIGIN_CD_END_TOOLTIP: "§H連鎖イベントの完結§!\n§Y起源イベント§!\n\n惑星深部で巨大な古代施設を発見し、 失われた時代の情報が収められた写本を回収した。 我々は、 古代の強大な遺産を受け継ぐ正統な後継者であり、 いまこそその継承の時が来た。"
