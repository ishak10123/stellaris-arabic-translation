 approach_suppress_unrest2_effect: "社会不安のただ中では効果的な解決は不可能だ。 優先すべきは秩序と安定の回復である。 $rg_default_progress$"
 approach_disrupt_subspace_tunnels2_effect: "我々の星の健全性を保つには、 即時の対抗措置が必要だ。 亜空間トンネルの妨害は不可欠である。 $rg_small_progress$"
 approach_add_fuel_to_the_fire3_effect: "これは、 母星系の惑星で大規模な資源抽出作業を開始し、 鉱物の採取量を最大化するチャンスである。 $rg_high_progress$"
