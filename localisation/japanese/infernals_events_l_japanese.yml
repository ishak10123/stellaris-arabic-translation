l_japanese:
 ####################################
 # Anomaly Events
 ####################################
 # useful refs:
 # [From.GetName] planet
 # [From.GetStarName]
 # [Leader.GetName] scientist
 spires_of_light_category: "光の尖塔"
 spires_of_light_category_desc: "初期スキャンの結果、 何の変哲もない地形から、 発光する構造物がいくつも立ち上がっていることが判明した。 その起源や目的は不明だが、 そのスペクトルのような輝きはそれらが単なる自然現象でないことを示唆している。"
 infernals.500.name: "$spires_of_light_category$"
 infernals.500.desc: "発光する柱を調査するために派遣された探査機は、 それらが可鍛性の珪酸塩マグマから形成されていることを突き止めた。 この物質は基盤岩の通気口から押し上げられ、 地表に達する前に固化する。 こうして生じた構造物は、 重量に耐えられず崩壊するまでに数百メートルの高さに成長することがある。\n\nその結果、 ほぼ純粋で透明な火山ガラスから成る尖塔の森が形成され、 それぞれが下でいまなお渦巻く溶融マグマの温かなオレンジ色の光を屈折させている。\n\n科学者の[Leader.GetName]は、 この崩壊した尖塔の残骸が貴重な資源となり得ると主張している。"
 #EXCELLENT:0 (first option has default answer)
 infernals.500.a: "この神聖な地の平穏を乱すな。"
 infernals.500.b: "採掘許可の入札を行え。"
 infernals.500.c: "射撃演習に利用せよ。"
 lava_whirlpool_category: "溶岩渦"
 lava_whirlpool_category_desc: "[Planet.GetName]の初期調査で、 この惑星の主要な溶岩の海に奇妙な嵐のような形状が確認された。 この現象は極めて異常であり、 調査に値する。"
 infernals.56.name: "溶岩渦"
 infernals.56.desc: "[Leader.GetName]は、 この奇妙な形状が溶岩の渦であることを確認した。 このような現象は極めて稀であり、 これほどの規模のものは記録に存在しない。 この異様な現象に衝撃を受けた[Leader.GetName]は、 サンプル採取を命じた。\n\n採取結果によれば、 この渦の一部は安定した生体金属の溜まりによって維持されていることが判明した。 生体金属は流れによって引き裂かれ、 再構成を試みるが、 その過程がさらに溶岩を乱し、 渦の運動を持続させているのだ。 また、このサンプル採取によって、 生態金属はほとんど手間をかけずに採取可能であることも示された。"
 infernals.56.a: "採集作業を開始せよ。"
 outgassing_category: "ガス放出"
 outgassing_category_desc: "[Planet.GetName]の定期スキャンにより、 大気中に異常に強い化学的変動が観測された。 より詳細な調査を行えば、 ここで何が起きているのかが判明するかもしれない。"
 infernals.1001.name: "ガス放出"
 infernals.1001.desc: "大気中の化学的変動は、 経時的に地表全体にわたって確認された。 変動は惑星の広大な露出したマグマの海の上空で最も大きく、 試料採取のために探査機が派遣された。\n\n詳細な分析の結果、 [Leader.GetName]は[Planet.GetName]のマグマ海が貴重なエキゾチックガスを放出していることを突き止めた。 この予期せぬ発見は、 資源採取できれば、 この惑星が我々の産業に寄与し得ることを示唆している。"
 infernals.1001.a: "採取手順を開始せよ。"
 crystal_lava_lakes_category: "結晶溶岩湖"
 crystal_lava_lakes_category_desc: "この惑星の地表には、 流動性の高い溶岩の大規模な池が存在するようだ。 資源採取できる可能性があるため、 調査する価値がある。"
 infernals.1002.name: "結晶溶岩湖"
 infernals.1002.desc: "[Planet.GetName]の地表から得られた最初の映像は、 「結晶溶岩湖」と呼ばれる驚くべき、 予想外の地質構造を明らかにした。 これら長寿命のマグマの湖は特異な鉱物を内包しており、 特定の温度範囲において自然に結晶格子を形成する。 その結果、 湖面全体が驚くほど透きとおり、 赤色スペクトルの輝きが生じる。 惑星の軌道運動により、 この息をのむような現象は季節ごとの温度変動に伴って増減する。\n\nこの結晶溶岩湖の美しい景観は、 観光客を強く惹きつける可能性がある。 また、 結晶化した鉱物自体も活動期に湖面から掬い取ることができ、 その特性を活かせばエネルギー貯蔵媒体と利用できるだろう。"
 infernals.1002.a: "この地をリゾートとして開発せよ"
 infernals.1002.b: "湖からエネルギーを採取せよ"
 crystal_lava_resort: "結晶溶岩リゾート"
 crystal_lava_resort_desc: "この惑星の目を見張るような壮麗な湖は裕福な旅行者向けの観光地として開発され、 銀河中から訪れる観光客を魅了している。"
 bioadaptive_flora_category: "生体適応植物"
 bioadaptive_flora_category_desc: "[Planet.GetName]は一見すると典型的な火山性の荒廃地に見えるが、 大気中の酸素濃度が異様に高い。 その酸素を生み出しているのは、 何か特異な存在に違いない。"
 infernals.1003.name: "生体適応植物"
 infernals.1003.desc: "初期調査では、 [Planet.GetName]はマグマと炎の惑星として分類されていたが、 後の調査で惑星全体の地溝谷に複雑な植物相の自然生態系が生息していることが明らかになった。 これらの植物は酸素を生成し、 わずかに存在する水分を集めることで、 異常な高温の荒野の中にほぼ温帯に近い微気候を形成している。\n\nこの植物によって支えられた生態系は、 通常なら火山惑星への入植を避ける種族にとっても居住可能となり得る。 また、 この植物自体が農業に利用できる可能性もある。 入植者にとっては、 峡谷に何が生息しているのかを徹底的に調べることが有益だろう。"
 infernals.1003.a: "区域を入植適地として指定せよ"
 infernals.1003.tooltip_a: "居住性と成長を改善する惑星補正を追加する。"
 bioadaptive_flora_modifier: "生体適応植物"
 bioadaptive_flora_modifier_desc: "この惑星の地溝谷には強靭な自生植物が繁茂しており、 より涼しく呼吸可能な微気候を形成している。 その結果、 火山環境であっても限定的ながら居住性を実現している。"
 tectonic_icebreaker_category: "地殻変動による氷砕"
 tectonic_icebreaker_category_desc: "[Planet.GetName]の表土から奇妙な低温異常が検出された。 何らかの過程あるいは物体が地表の一部を冷却している可能性がある。 掘削調査によって詳細が判明するだろう。"
 infernals.1004.name: "地殻変動による氷砕"
 infernals.1004.desc: "[Leader.GetName]の報告によれば、 §Y[from.GetName]§!の火山性地表の下には広大な氷河が存在している。 それらは優れた断熱特性を持つ鉱物から成る珍しい岩石層に包まれている。 しかし、 地殻活動がこの断熱層を徐々に劣化させており、 もし氷河と惑星全体の温度が均衡すれば、 この惑星は火山惑星というより乾燥惑星と呼べるほど冷却されると[Leader.GetName]は予測している。\n\n我々はこの過程を加速させ、 惑星をある程度居住可能にすることもできる。 だが、 この現象は科学的に興味深く、 自然に委ねて研究対象とする価値もあるだろう。"
 infernals.1004.a: "地殻を安定化させよ"
 infernals.1004.b: "氷の融解を加速せよ"
 infernal_oasis_category: "煉獄のオアシス"
 infernal_oasis_category_desc: "§Y[from.GetName]§!の驚くべき映像には、 燃え盛る溶岩惑星の中に、 大陸規模の鮮やかな緑の帯が広がる様子が映し出されている。 この異様な光景は、 地表に極めて特異な存在があることを示唆している。"
 infernals.505.name: "災厄の狭間の楽園"
 infernals.505.desc: "§Y[from.GetName]§!の特異な組成と地殻運動が、 比類なき驚異を生み出していた。 惑星の大部分が火山性の煙霧と流れる溶岩に覆われた灼熱の砂漠である一方で、 巨大な大陸プレートの一部が平均地表より数十キロメートルも隆起している。 その結果生じた高地は、 有毒な雲層のはるか上に位置し、 緑豊かな固有の動植物の生態系を育んでいる。\n\nこの高原は多くの種族にとって容易に居住可能であり、 調査すれば数多くの魅力的な科学的知見をもたらすだろう。"
 infernals.505.a: "驚くべき発見だ。"
 NAME_Vermilion: "ヴァーミリオン"
 NAME_Kira: "キラ"
 mysterious_ringing_category: "謎の鳴動"
 mysterious_ringing_category_desc: "科学者たちが、 [Planet.GetName]上の単一地点から規則的な電波スパイクが生じているのを観測した。 スパイクの発生は、 信号源が夜から昼へと移る時刻と一致しているように見える。"
 infernals.3210.name: "謎の鳴動"
 infernals.3210.desc: "[from.GetName]に到着した調査チームが信号の発生源を追跡したところ、 科学観測機器を備えた地下洞窟系から発信されていることが判明した。\n\n[Leader.GetName]がチームを率いて洞窟内へと向かったところ、 未知の合金で封印された区画を発見した。 そこからは微かな鳴動が発せられていた。 [GetMysteriousRingingDesc3210]\n\n聴覚保護装置を支給したうえでチームが内部に入ると、 信号源の近くで未知の種族が冬眠しているのが見つかった。 信号源は奇妙な円筒状の装置だった。\n\n分析の結果、 その装置は規則的な電波パルスを発したあと、 数時間にわたって旋律的なノイズと声を重ねて発しており、 この声は当該生物の発声器官と整合するように見える。 [Leader.GetName]は、 この装置が一定のスケジュールに従って生物を呼び覚まそうとしているのではないかと推測した。"
 infernals.3210.individual: "調査チームは封印が弱まっている箇所を見つけ、 それを突破した。 すると鳴動は耳をつんざくほどに増幅し、 チームのメンバーにパニック発作や激怒の発作を引き起こした。"
 infernals.3210.gestalt: "調査チームは封印が弱まっている箇所を見つけ、 それを突破した。 すると鳴動は耳をつんざくほどに増幅し、 ドローンに対して感覚過負荷と認知崩壊を引き起こした。"
 infernals.3210.a: "調査結果を複製し、 立ち去るのだ。"
 infernals.3210.b: "生物を目覚めさせ、 雇用を試みよ。"
 infernals.3210.btt: "リーダーを獲得： £scientist£ §Y$scientist$§! (初期レベル§G4§!)。"
 infernals.3210.c: "装置を盗み出せ。"
 infernals.3210.ctt: "労働者は、 仕事に戻るよう頻繁に注意を促すことで生産性が高まる。 £job£ ['concept_jobs']による産出量が§G+10%§!増加する代わりに £happiness£ ['concept_happiness']が§R-5%§!減少するディシジョンがアンロックされる。"
 decision_planetary_workshift: "惑星内労働シフトの強要"
 decision_planetary_workshift_desc: "$planetary_workshift_deployed_desc$"
 planetary_workshift_deployed: "惑星内労働シフトの強要"
 planetary_workshift_deployed_desc: "惑星全体に同じ標準時を適用して稼働させることで、 チーム間の通信と効率は向上するが、 その代償として幸福度がある程度犠牲となる。"
 ####################################
 # Origin Events
 ####################################
 # Red Giant Origin
 infernals.45.name: "不穏な兆候"
 infernals.45.desc: "我々は長らく§Y[capital_star.GetName]§!を典型的な赤色巨星と見なしてきた。 しかし、 最新の分析によれば、 その恒星は徐々に膨張し、 放射線量も増加しているという。 こうした変化はすでに我々の気候に測定可能な影響を及ぼしており、 民衆の間に不安が広がりつつある。\n\nこの傾向が止まる気配はない。 我々の種族が生き延びるためには、 この現象の原因を解明しなければならない。"
 infernals.45.desc.gestalt: "我々は長らく§Y[capital_star.GetName]§!を典型的な赤色巨星と見なしてきた。 しかし、 最新の分析によれば、 その恒星は徐々に膨張し、 放射線量も増加しているという。 こうした変化はすでに我々の気候に測定可能な影響を変化はすでに我々の気候に測定可能な影響を及ぼしている。\n\nこの傾向が変化する兆しは見られない。 我々の種族が生き延びるためには、 この現象の原因を解明しなければならない。"
 infernals.45.a: "冷静を保ち、 問題がないように装え。"
 infernals.45.b: "速やかに原因を調査しろ。"
 infernals.45.c: "ほかに優先すべきことがある。"
 infernals.45.d: "PRチームを向かわせろ。"
 infernals.45.public.tt: "\n§H状況：§!$situation_red_giant_expansion$ \n- 状況アプローチを§Y$approach_reassure_public$§!に設定\n- 月間資源収入が上昇：§G10§! £unity£"
 infernals.45.cause.tt: "\n§H状況：§!$situation_red_giant_expansion$ \n- 状況アプローチを§Y$approach_find_the_cause$§!に設定"
 infernals.50.name: "恒星の終焉"
 infernals.50.desc: "[GetRedGiantEndingExplode]"
 infernals.50.totalIgnorance: "赤色巨星の災厄を引き起こした原因はもはや重要ではない。 我々にできるのは、 現実を受け入れ、 残されたものから再建を始めることだけだ。"
 infernals.50.semiIgnorance: "恒星爆発による激変は、 元凶を突き止めるためのあらゆる証拠を消し去ってしまった。\n\n我々にできるのは、 現実を受け入れ、 残されたものから再建を始めることだけだ。"
 infernals.50.defaultEnding: "荒廃した採掘ステーションに残された異星人のわずかな生存者たちが始めた過程は、 ついに終局を迎えた。§Y[Target.GetStarName]§!は超新星となり、 星系のほぼすべてを呑み込んだ。 極彩色のプラズマと放射線が§Y[event_target:red_giant_homeworld_tmp.GetName]§!を含む母星系を徹底的に焼き尽くした。\n\n[GetMegacorpDesc50]\n\n[GetLususMiningDesc]"
 infernals.50.megacorp: "我らの故郷は、 星系全域に広がる鉱物資源の広大な宝庫へと変貌した。 これらの資源は容易に採掘でき、 しかもそのコストは、 星系内にあった惑星や衛星に閉じ込められていた場合よりも遥かに安価だ。 安価な供給の実現により、 我々の利益は飛躍的に増大するだろう。"
 infernals.50.nonmegacorp: "我々の母星は今や荒廃した不毛の地となったが、 超新星爆発が星系全体にばらまいた鉱物資源は、 通常の採掘設備でも容易に採取できるようになった。 この富をもって、 我々は新たな未来を築いていけるはずだ。"
 infernals.50.lususExists: "ステーションは最後のエネルギーの脈動を放った後、 ついに沈黙した。 残された我々は、 破壊された故郷の断片を拾い集めるほかない。"
 infernals.50.lususGone: "もはやステーションは存在せず、 同じ悲劇が繰り返されることのない§Y[event_target:red_giant_homeworld_tmp.GetName]§!は安らぎを得ることができるだろう。"
 infernals.50.a: "我々は、 故郷を取り戻すためにできることを成さねばならない。"
 infernals.51.name: "超新星爆発からの復旧"
 infernals.51.desc: "大規模な復旧作業の末、 §Y[this.GetName]§!の地表は再び$trait_infernal_plural$にとって居住可能な環境となった。 永遠に残る傷跡もあるが、 今や特異な研究機会として最大限に活用できるだろう。"
 infernals.60.name: "元の姿へ"
 infernals.60.desc: "サイフォンを調整し、 外層から水素を抽出し、 恒星への入力比率を微調整した結果、 §Y[Target.GetStarName]§!の膨張は無事反転し、 穏やかな赤色巨星としての静けさを取り戻した。\n\nすでに§Y[Target.GetStarName]§!周辺では気候の安定化が観測されており、 我々の母星が帝国の中心であり続ける、 より住みよい未来を期待できる。\n\n[GetRedGiantEndingKalmStationStatus]"
 infernals.60.lususDestroyed: "もはやステーションは我ら[Owner.Species.GetHandNamePlural]の手中にはなく、 正確な原因の解明は叶わないかもしれない。 だが、 恒星の収縮によって放出されたあらゆる資源を最大限に活用することはできる。"
 infernals.60.lususAlive: "いまや我々は、 このステーションを制御する術を理解した。 次にどう活用するかは、 我々が決めることだ。"
 infernals.60.a: "ステーションを解体せよ。"
 infernals.60.b: "ステーションの調査を継続せよ。"
 infernals.60.c: "勝利の記念碑として残せ。"
 infernals.60.d: "ようやく一息つける。"
 infernals.65.name: "恒星の膨張"
 infernals.65.desc: "継続的な観測により、 §Y[Target.system_star.GetName]§!が加速度的に膨張していることが確認された。 放射線の増加による物理的影響も各所から報告されている。 膨張を止める術が見つからなければ、 §Y[Target.system_star.GetName]§!が惑星を呑み込むよりも先に、 我々の存在が消し去られてしまうだろう。\n\n[GetMegacorpDesc65]"
 infernals.65.nonmegacorp: "恒星放射線に対して防護策を実施すれば、 時間を稼ぐことができる。 より危険ではあるが、 放射線を逆に活用すれば、 エネルギーおよび工業部門の増強につながる可能性もある。"
 infernals.65.megacorp: "惑星防衛に投資すれば、 不安定な変動に備えることができ、 資産基盤の安定にも寄与するだろう。 だが、 方針を転換し、 増大する放射線を利用すれば、 我々のエネルギー指標や工業指標をさらに押し上げることができるかもしれない。"
 infernals.65.a: "母星を守れ。"
 infernals.65.b: "この現象を利用せよ。"
 infernals.70.name: "飢えた恒星"
 infernals.70.desc: "§Y[Target.GetName]§!は最初の大きな犠牲を呑み込み、 我々の星系の最内縁にあった惑星を奪い去った。 その惑星の資源は依然として存在するものの、 今や恒星の灼熱の深淵に沈み、 我らの手の届かぬものとなった。\n\n直近の経済的損失には耐えられるかもしれないが、 これは§Y[Owner.Capital.GetName]§!に待ち受ける運命を恐ろしくも鮮烈に示している。"
 infernals.75.name: "巻き添えの犠牲"
 infernals.75.desc: "我々の赤色巨星は前例のない膨張を続けており、 いまやさらにもうひとつの惑星を呑み込んだ。 その豊富な資源は、 恒星が暴れ狂う超新星となって外層を放出しない限り、 永遠に我々の手の届かぬものとなるだろう。"
 infernals.95.name: "恒星内に潜むトンネル"
 infernals.95.desc: "§Y[capital_star.GetName]§!の真実は、 我々の想像をはるかに超えて奇妙なものだった。 継続的な調査により、 星の深奥に一対の亜空間トンネルが存在することが明らかになったのだ。\n\nそのひとつは水素に富む物質を外層へと直接流し込み、 核融合を加速させヘリウム生成を増大させている。 本来であれば核の圧縮を促すはずだが、 もう一方のトンネルは逆にエネルギーを吸い上げ、その作用を相殺している。 結果として、 恒星は膨張を続けているのだ。\n\n初期の観測データによれば、 両方の亜空間トンネルは銀河各地に散在する複数の終端点へと繋がっているらしい。 我々の生存は、 これらの調査を一刻も早く開始できるかに懸かっている。"
 infernals.95.a: "これらの地点の内、 3箇所を調査する必要があるだろう。"
 infernals.95.a.tt: "亜空間起源の三角測量に用いることのできる有望な地点が特定された。"
 infernals.105.name: "亜空間の瘢痕"
 infernals.105.desc: "§Y[FromFromFrom.GetName]§!周辺の天体測定スキャンにより、 説明不能な亜空間の瘢痕が確認された。 現在この地点には出口は存在しないが、 過去にこのガス惑星の軌道上でトンネルが開いた可能性がある。 収集されたデータは、 他分野にも応用可能な物理学的知見をもたらした。\n\nしかし当面は、 我々の恒星内部で作用している亜空間トンネルの起源を解明するために、 別の場所を探さねばならない。"
 infernals.105.a: "探索を続けよ。"
 infernals.110.name: "異星のスクラップ金属"
 infernals.110.desc: "§Y[FromFromFrom.GetName]§!周辺のスキャンにより、 亜空間の瘢痕が確認された。 さらに、 この惑星近辺には古代のスクラップ金属がまとまって存在しているのが発見されている。 それらは軌道上に固定されており、 瘢痕と関連している可能性がある。\n\n継続的な亜空間変動の観測は、 我々の母星恒星を取り巻く太陽光アレイの最適化に役立つだろう。\n\nもっとも、 このデータは有益ではあるものの、 現在の問題の発生源を特定するには、 最低でももう1箇所の調査が必要である。"
 infernals.110.a: "スクラップ金属を競売にかけよ。"
 infernals.115.name: "三角測量の完了"
 infernals.115.desc: "ついに真の突破口が開かれた。\n\n§Y[FromFromFrom.GetName]§!周辺にさらなる亜空間の瘢痕が発見され、 我々の星を乱している原因の発生源を、 これまで未発見だった敵対的特徴を持つ星系に三角測量で絞り込むことに成功したのだ。\n\nこの調査は、 最終的に我々の星に影響を及ぼしている何かを打ち消す手掛かりとなるかもしれない。\n\n§Yルスス§!星系へ進出できれば、 §Y[FromFromFromFrom.Target.solar_system.GetName]§!、 そして我々の文明の運命を変えることができるだろう。"
 infernals.115.a: "慎重に接近せよ。"
 infernals.115.b: "武力誇示の準備を整えよ。"
 infernals.115.c: "接近前に祝祷を行え。"
 red_giant_lusus_triangulated_tt: "新たな星系が明らかになる。"
 infernals.2115.name: "突入部隊"
 infernals.2115.desc: "我々の部隊はステーションの掌握に成功した。 居住者は抵抗したが、 武装は脆弱で、 戦闘訓練もほとんど受けていないようだった。 詳しく観察すると、 多くが未成年のように見えた。 死亡しなかった者は拘束した。\n\n亜空間トンネルを制御する方法の解析が始まっている。 これらは何らかのエネルギー採掘用サイフォンのように見える。 時間をかければ、 我々は母星系の状況に対処できるだろう。"
 infernals.2115.a: "破壊せよ。"
 infernals.2115.b: "生存者を尋問せよ。"
 infernals.2115.c: "奴隷化せよ。"
 infernals.2115.d: "生存者は危険だ。 排除せよ。"
 infernals.2115.e: "生存者と対話せよ。"
 infernals.2115.f: "ステーションを浄化せよ。"
 infernals.2115.g: "彼らを喰え。"
 infernals.400pops: "§G400§! £pop£ $POPS$が[this.GetName]に生成される"
 infernals.300pops: "§G300§! £pop£ $POPS$が[this.GetName]に生成される"
 infernals.2121.name: "異星人の殲滅"
 infernals.2121.desc: "亜空間採掘ステーションは破壊され、 そこにいたものはすべて死亡した。\n\nステーションの破壊は未知のエネルギー貯蔵媒体を誘爆させ、 その奔流が崩壊する亜空間トンネルを通じて§Y[event_target:situation_red_giant_target_shortterm.GetStarName]§!に流れ込み、 母星の状況をさらに悪化させた。\n\nとはいえ、 恒星への水素流入は停止した。 事態は深刻ではあるが、 これ以上悪化することはない。 このステーションの起源や設計を我々が知ることは決してないかもしれない。 だが少なくとも、 その力が我々の宿敵の手に落ちることがないのは安心だ。\n\n残念ながら、 §Y[event_target:situation_red_giant_target_shortterm.GetStarName]§!をすぐにもとに戻す手段は存在しない。 恒星の状態に干渉したければ、 ステーションが行っていたことを記録から再構築するしかない。"
 infernals.2121.a: "この混乱を収拾せよ。"
 infernals.2122.name: "ステーションの破壊"
 infernals.2122.desc: "ステーションの残骸が宇宙を漂っている。 ステーションの破壊は我々に§Y[event_target:situation_red_giant_target_shortterm.GetStarName]§!の運命を変える新たな機会をもたらした。 それは1度で成し遂げられるものではなく、 厳しく、 コストのかかる労働が必要だ。"
 infernals.2125.name: "異星との交渉"
 infernals.2125.desc: "長く困難なプロセスを経て、 我々は簡易的な翻訳機を手に入れ、 ステーションの居住者と意思疎通できるようになった。\n\nステーションは何世代にもわたり稼働しており、 ガス惑星からガス惑星へと移動しながら、 亜空間サイフォンを用いて遠方の恒星からエネルギーを抽出し、 それを生命維持装置や強力なジャンプドライブの動力源としていた。\n\n彼らは自らが運用するシステムを完全には理解しておらず、 サイフォンが星々を標的とし、 やがてそれらを破壊してしまうことを認識していなかった。\n\n彼らは混乱してはいるが、 ステーションを離れたいと強く望んでいるようだ。 彼らは我々に、 安全な居住地と子どもたちを育てる場所を与えてもらえるなら、 自分たちの知ることを教えると約束した。"
 infernals.2125.a: "彼らに聖域を提供せよ。"
 infernals.2125.b: "彼らに船を与えて自らの道を行かせよ。"
 infernals.2125.c: "ステーションを遠隔で排気せよ。"
 infernals.2125.d: "我々について彼ら自身に判断させよ。"
 infernals.2130.name: "亜空間採掘作業"
 infernals.2130.desc: "このステーションはガス惑星から水素を吸い上げ、 それを亜空間を通じて我々の星の外層へと送り込んでいる。 その結果として生じるヘリウム融合は余剰エネルギーを放出し、 それが§Y$entropy_crystals$§!に変換され、 ステーションの動力源となっている。\n\n§Y[event_target:situation_red_giant_target_shortterm.GetStarName]§!の不安定化は、 住人が気づかなかったか、 あるいは修復方法を知らなかった較正エラーや装置の劣化によるものだ。\n\n彼らの古代テクノロジーを用いれば、 この過程を逆転させることは可能だが、 容易ではない。 あるいは、 我々の星を強制的に超新星爆発へと導けば、 数え切れぬ鉱床が露出し、 我々の遺産は利用可能な資源の宝庫へと変貌するだろう。"
 infernals.2130.a: "作業を開始せよ。"
 infernals.2131.desc: "このステーションはガス惑星から水素を吸い上げ、 それを亜空間を通じて我々の星の外層へと送り込んでいる。 その結果として生じるヘリウム融合は余剰エネルギーを放出し、 それが§Y$entropy_crystals$§!に変換され、 ステーションの動力源となっている。\n\nだが、 ステーションの居住者はその仕組みについて、 歪められた口承伝承しか保持していない。 彼らは数千年前に母文明とのつながりを失っており、 文明が崩壊したのか、 あるいは滅亡したのかすら分からない。 較正エラーの蓄積と装置の劣化によってサイフォンはますます不安定となり、 いまや§Y[event_target:situation_red_giant_target_shortterm.GetStarName]§!を破壊しかねない脅威となっている。\n\n彼らの古代テクノロジーを用いれば、 この過程を逆転させることは可能だが、 容易ではない。 あるいは、 我々の星を強制的に超新星爆発へと導けば、 数え切れぬ鉱床が露出し、 我々の遺産は利用可能な資源の宝庫へと変貌するだろう。"
 infernals.2135.name: "脅威の終焉"
 infernals.2135.desc: "我々の窮状を知ると、 ステーションの居住者たちは驚きと当惑を示した。 彼らは世界に自分たちしかいないと信じており、 銀河に他の種族がいることを知らなかった。\n\n悔悟の念に駆られた彼らは、 我々がその目的を完全に理解する前にステーションを解体し、 コンポーネントの大半を永久に破壊してしまった。\n\nその結果、 恒星の膨張を制御することは困難となった。 また、 我々はこの不安定な異星人たちをどう扱うか、 そして彼らが望む許しを与えるべきかどうかを決断しなければならない。"
 infernals.2135.a: "彼らを受け入れ、 ステーションを回収せよ。"
 infernals.2135.b: "彼らとステーションを処分せよ。"
 infernals.2135.c: "彼らを奴隷化し、 ステーションを破壊せよ。"
 infernals.2140.name: "安定化の見通し"
 infernals.2140.desc: "多大な努力の末、 我々はついに§Y[event_target:situation_red_giant_target_shortterm.GetStarName]§!の運命を完全に掌握した。 放置すれば、 現在の大きさで自然の寿命周期を辿るだろう。\n\nだが、 古びて劣化したステーションは設定の調整にあと1度しか耐えられない。 調整を行うたびに、 施設には極限の負荷がかかるからだ。 今、 我々に残された選択肢は1つだけだ。\n\n我々は星を元の大きさへと縮めるか、 あるいは膨張を促進して星系を容易に採掘可能な広大な資源帯へと変貌させるか、 どちらかを選ばねばならない。\n\n我々の[GetScientistPlural]は最後の調整を試みる。 その後、 ステーションは外力によって迅速に解体することになるだろう。"
 infernals.2140.a: "星を現状のまま固定せよ。"
 infernals.2140.b: "星の膨張を加速せよ。"
 infernals.2140.bdesc: "§Y[event_target:situation_red_giant_target_shortterm.GetStarName]§!を強制的に膨張させる。"
 infernals.2140.c: "星を正常な状態に戻せ。"
 infernals.2140.cdesc: "§Y[event_target:situation_red_giant_target_shortterm.GetStarName]§!を強制的に縮小させる。"
 infernals.2145.name: "安定化の達成"
 infernals.2145.desc: "我々は恒星の大きさとエネルギーの変動を完全に制御し、 §Y[Target.GetStarName]§!はついに完全な安定状態に達した。 今後数百万年にわたり、 この星は現在の状態を保ち、 我々の民は母星系における安定と予測可能性を再び享受できるだろう。\n\n星の拡大は、 我々のインフラ管理に明確な影響を及ぼしているが、 我々は今やその変化を最大限に活かし、 増大したエネルギー出力を利用しつつ、 この星系に安定して存続できる。"
 infernals.2145.a: "ついに、 我々は自らの運命を掌握した。"
 infernals.2151.name: "謎めいたステーション"
 infernals.2151.desc: "我々の艦隊が星系内へ入ると、 自動ドローン群からわずかな抵抗を受けた。 ドローンは迅速に無力化され、 異星のステーションを精査する余地が生まれた。\n\nステーションは今も稼働しているが、 外殻には大規模な継ぎ当て修理の跡が残っている。 ドッキングベイの1つへ接近を試みたところ、 未確認の異星種族と接触した。 言語の壁は依然存在するが、 この施設が§Y[event_target:situation_red_giant_target_shortterm.GetStarName]§!に影響を与えているトンネルの発生源であることは確認できた。\n\n現在、 意思疎通の確立に向けた努力が続けられている。 外交的解決の可能性は残されている。 それが叶わなければ、 施設への突入や即時破壊といったより直接的な手段を考慮せざるを得ないかもしれない。 だが、 ステーションの目的を十分に理解せぬまま行動すれば、 我々の星に重大な危険を及ぼす可能性がある。"
 infernals.2151.a: "彼らの言語を翻訳せよ。"
 infernals.2151.b: "武力を行使してステーションに突入せよ。"
 infernals.2151.c: "ステーションを破壊せよ。"
 infernals.2160.name: "危機の火種"
 infernals.2160.desc: "亜空間採掘ステーションの継続調査により、 施設が莫大な熱エネルギーを未知の形態で蓄積していることが判明した。 我々の[GetScientistPlural]はこれを§Y$entropy_crystals$§!と呼んでいる。 このテクノロジーは熱のフィードバックループを利用し、 入力エネルギーを増幅する仕組みを持っている。\n\nもし我々がこのテクノロジーを再現できれば、 常識では想像も及ばぬ力を振るう術を得ることになり、 多くの者はそれを「不自然」で「危険」と見なすに違いない。 確かにこの過程では膨大な余剰熱が発生する。 だが、 そのような環境で生き延びる術を我々が見いだせるなら、 この銀河は我々の手に落ちるかもしれない。"
 infernals.2160.a: "更なる調査を進めよ。"
 infernals.2160.a.tt: "[GetRedgiantAlreadyHyperthermiaPickable]§Y$entropy_crystals$§!を発見し、 銀河の超高温化を進展させる。"
 infernals.2160.a.ttunlock: "アセンションパーク「$ap_galactic_hyperthermia$」が採用可能になる。\n"
 infernals.2160.b: "このテクノロジーの追求は危険すぎる。"
 infernals.2160.c: "この§Y$entropy_crystals$§!の使い方はあまりにも原始的だ。"
 situation_red_giant_expansion: "赤色巨星の膨張"
 situation_red_giant_expansion_type: "$situation_red_giant_expansion$"
 situation_red_giant_expansion_desc: "我々の星が急速に放射を変化させており、 母星の安定性が脅かされている。 このまま進行すれば、§Y[Owner.Capital.GetStarName]§!はいずれ新星となり、 星系は原子の塵と化すだろう。"
 situation_red_giant_expansion_monthly_change_tooltip: "膨張の進行を食い止められるかどうかは、 その原因を突き止め、 抗う我々の能力にかかっている。"
 situation_red_giant_expansion_fail_tooltip: "§Y[Target.solar_system.GetName]§!は超新星爆発を起こす。"
 situation_red_giant_expansion_finish_tooltip: "§Y[Target.solar_system.GetName]§!は正常な状態に戻る。"
 situation_red_giant_expansion_stage_1: "我々の星は比較的穏やかだが、 その放射量は異常に高い。"
 situation_red_giant_expansion_stage_2: "我々の星は進化の過程で経験したよりも大きくなっており、 その影響が母星に明確に表れている。"
 situation_red_giant_expansion_stage_3: "我々の星は危険なほど膨張しており、 その極端な活動は母星の安定性を脅かしている。"
 situation_red_giant_expansion_stage_4: "我々の赤色巨星は星系の大半を焼き尽くし、 生命は極めて困難な状況に置かれている。"
 situation_red_giant_expansion_stage_5: "我々の星は爆発寸前である。 爆発すれば、 母星系のすべてに壊滅的な被害を与えるだろう。"
