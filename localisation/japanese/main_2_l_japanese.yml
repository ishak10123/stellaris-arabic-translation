 bombardment_selective_desc: "$bombardment_selective$は軍事施設を集中的に狙い、 民間人の無意味な殺傷を避ける。 \n- §Y地上軍§!に対して§Y中規模§!のダメージ\n- §Y惑星§!に対して§Y中規模§!のダメージ\n- §YPOP§!に対して§E小規模§!のダメージ\n- 防衛軍のいない惑星は§R爆撃しない§!\n- 人口が§Y$MIN_POPS$§!POP以下の場合は§R殺害しない§!"
 bombardment_indiscriminate_desc: "$bombardment_indiscriminate$は民間人の犠牲者を考慮することなく、 あらゆる軍事施設やインフラを爆撃する。 \n- §Y地上軍§!に対して§H大規模§!なダメージ\n- §Y惑星§!に対して§H大規模§!なダメージ\n- §YPOP§!に対して§Y中規模§!のダメージ\n- §H$policy_orbital_bombardment_accept_surrender$§!が§H$orbital_bombardment_surrender_forbidden$§!されている場合は防衛軍のいない惑星でも爆撃する\n- 人口が§Y$MIN_POPS$§!POP以下の場合は§R殺害しない§!"
 bombardment_armageddon_desc: "$bombardment_armageddon$は、 民間人を可能な限り殺戮するという明確な目的のもとで、 惑星全体を重爆撃する。 \n- §Y地上軍§!に対して§R致命的§!なダメージ\n- §Y惑星§!に対して§R致命的§!なダメージ\n- §YPOP§!に対して§R致命的§!なダメージ\n- 防衛軍のいない惑星でも爆撃する\n- POPが全滅すると死の惑星に変化する"
 bombardment_raiding_desc: "$bombardment_raiding$は特殊な襲撃艇が敵の人口密集地からPOPを拉致し、 我々の居住地に連行して働かせることが可能。\n- §Y地上軍§!に対して§E小規模§!のダメージ\n- §Y惑星§!に対して§E小規模§!のダメージ\n- 可能であればPOPを殺さずに§Y拉致§!する\n- 最後のPOPの場合は§R拉致も殺害もしない§!。 惑星にある地上軍の数に応じて、 保護されるPOPが増える。"
