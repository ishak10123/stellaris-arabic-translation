 building_bio_reactor_2: "発展型バイオリアクター"
 building_bio_reactor_2_desc: "有機物を高効率でエネルギーに変換する施設。廃棄物の収集法が改善されるとガス状の有用な副生成物を回収できる。"
 tech_bio_reactor_2: "$building_bio_reactor_2$"
 tech_bio_reactor_2_desc: "$building_bio_reactor_2_desc$"
 building_hab_stronghold: "保安地区"
 building_hab_stronghold_desc: "保安に特化された区域であり、 内外の脅威から居住地を守る武装治安部隊を常駐させている。"
 building_crude_huts: "粗末な小屋"
 building_crude_huts_desc: "石、 粘土、 その他利用できる材料はなんでも使って作られた、 原始的な住まい。"
 building_primitive_dwellings: "原始的住居"
 building_primitive_dwellings_desc: "これらの小さな建物が提供するのは最小限の住居だが、 自然の猛威から身を守ることはできる。"
 building_stone_palace: "石の宮殿"
 building_stone_palace_desc: "その土地の支配層が住む、 石で作られた原始的な宮殿。"
 building_primitive_capital: "地域の首都"
 building_primitive_capital_desc: "この原始的な惑星に存在する、 種々の民族国家のための首都建造物群。"
 building_urban_dwellings: "都市住居"
 building_urban_dwellings_desc: "狭苦しく、 しばしば汚染も見られるコンクリート・ジャングル。"
 building_pre_ftl_radio_telescope: "電波望遠鏡アレイ"
 building_pre_ftl_radio_telescope_desc: "知的生命体の発見を目指して造られた電波望遠鏡群。"
 awareness_gain_desc: "この文明が時間経過で£awareness£ §Y知覚度§!を得る確率が上昇する。"
 building_hive_crude_huts: "簡素な巣"
 building_hive_crude_huts_desc: "最も簡素で労力のいらない素材を使ったこの巣は、 夜間にドローンが凍えずに済む必要最低限のものだ。"
 building_hive_primitive_dwellings: "初歩的なコロニー"
 building_hive_primitive_dwellings_desc: "利用可能なスペースの最大化にあたり、 これらの六角形の集合建築物が提供する空間はコロニーと呼べなくもない。"
 building_hive_stone_palace: "石造りの巣"
 building_hive_stone_palace_desc: "自分の同胞と生存競争を行う世界において、 石壁に守られることは非常に有利である。"
 building_hive_primitive_capital: "大陸中枢"
 building_hive_primitive_capital_desc: "大陸規模で拡大したハイヴが、 この惑星の支配権を争う上で最も存在感を放つ中心部。"
 building_hive_urban_dwellings: "ドローン厩舎"
 building_hive_urban_dwellings_desc: "休息サイクルに入ったドローンを収容するための実用的な手法。 出入り口が分かれているため、 ハイヴの循環効率を最大化できる。"
 building_hive_primitive_factory: "$building_primitive_factory$"
 building_hive_primitive_factory_desc: "$building_primitive_factory_desc$"
 building_hive_primitive_mine: "$building_primitive_mine$"
