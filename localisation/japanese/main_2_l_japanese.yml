 building_hypercomms_forum: "ハイパーコムズフォーラム"
 building_hypercomms_forum_desc: "斬新な対人コミュニケーション装置を備えた巨大施設。 カジュアルな議論では多面的な意見交換ができ、ディベートでは迅速な合意形成が可能。"
 building_hypercomms_forum_effect: "わが帝国が§Yアセンションパーク§!を獲得するごとに、 £unity£ §G3§!を産出する。\n\n"
 building_autocurating_vault: "自動キュレーション保管庫"
 building_autocurating_vault_desc: "高度に専門化したコンピュータ・ネットワークにより、 ありふれた品々を取得・分析・鑑定して、 重要であると思われる品を展示し、 現代を反映する生きた博物館を作り出す。"
 building_temple: "聖堂"
 building_temple_desc: "遠い昔から建てられてきた単純な建造物である聖堂は、 静かに瞑想し、 我々を一つに結びつけているものと交流する場である。"
 building_holotemple: "ホロ聖堂"
 building_holotemple_desc: "荒削りだった従来の聖堂を発展させたもの。 精神主義派の最新技術によって、 ホロ聖堂の内部にうつろいゆく現実を創り出す――すべてはさらに深い瞑想と、 より熱心な献身のためだ。"
 building_sacred_nexus: "神聖ネクサス"
 building_sacred_nexus_desc: "フィールド生成技術の発達により、 礼拝者は聖地の神聖なる光を直接的に体験できる。"
 building_citadel_of_faith: "信仰の砦"
 building_citadel_of_faith_desc: "あらゆる人々に物質世界から切り離された避難所を提供する、 巨大な複合施設。"
 building_stronghold: "駐屯地"
 building_stronghold_desc: "侵略および反乱から惑星を守るための戦力を収容する、 惑星上の拠点。"
 building_fortress: "要塞"
 building_fortress_desc: "さらに拡張された防衛軍と、 兵士の訓練施設とを擁する大規模な複合要塞。"
 building_bio_reactor: "バイオリアクター"
 building_bio_reactor_desc: "有機物を高効率でエネルギーに変換する施設。"
