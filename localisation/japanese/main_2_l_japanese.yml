 sm_missile_weapon_desc: "§E§H宇宙港§!はメイン防御として§H魚雷§!を装備している。§!"
 sm_laser_weapon: "レーザー防衛モジュール"
 sm_laser_weapon_desc: "§E§H宇宙港§!はメイン防御として§Hレーザー§!を装備している。 §!"
 sm_projectile_weapon: "投射防衛モジュール"
 sm_projectile_weapon_desc: "§E§H宇宙港§!はメイン防御として§H投射機§!を装備している。 §!"
 sm_refinery: "精錬所"
 sm_synchronized_defenses: "同期的防御"
 sm_corvette_assembly_yards: "コルベット造船所"
 sm_destroyer_assembly_yards: "駆逐艦造船所"
 sm_cruiser_assembly_yards: "巡洋艦造船所"
 sm_battleship_assembly_yards: "戦艦造船所"
 sm_reinforced_hull_layers: "強化船体層"
 sm_observatory: "観測所"
 sm_engineering_bay: "整備所"
 sm_crew_quarters: "クルー居住区"
 sm_crew_quarters_desc: "宇宙船の乗組員のための宿泊施設と支援を提供して、 停泊中の艦隊の兵站を軽減する。 \n"
 sm_crew_quarters_machine_intelligence: "サービス接続"
 sm_crew_quarters_desc_machine_intelligence: "サービス接続は、 停泊中の艦隊をステーションの知性中枢に直接接続し、 修理や改装を支援する。\n"
 sm_crew_quarters_hive_mind: "クルー繁殖チャンバー"
 sm_crew_quarters_desc_hive_mind: "現場で乗組員ドローンを繁殖させられる能力は、 各艦隊に兵站上の恩恵をもたらす。 \n"
 sm_hydroponic_farms: "軌道上水耕農場"
 sm_orbital_mind_control_laser: "軌道マインドコントロールレーザー"
 sm_fallen_empire_weapon: "タキオンランス防御装置"
 sm_pioneering_terminal: "開拓ターミナル"
 sm_solar_panel_network: "ソーラーパネルネットワーク"
 sm_neutronium_fission_plant: "ニュートロニウム核分裂工場"
 sm_fleet_academy: "艦隊養成所"
 sm_fleet_academy_machine_intelligence: "戦闘シミュレーター"
 sm_fleet_academy_hive_mind: "$sm_fleet_academy_machine_intelligence$"
 sm_fleet_academy_desc: "新しく入隊した乗組員の戦闘準備を真に完璧なものにするには、 それを率いる有能な将校が必要だ。 艦隊養成所は、 これらの将校に星間戦争の理論と実践に関する最新の知識を与える。"
 sm_fleet_academy_desc_machine_intelligence: "艦上戦闘ドローンが実戦に備えるために繰り返される、 さまざまな実戦的シナリオのシミュレーション。"
 sm_fleet_academy_desc_hive_mind: "$sm_fleet_academy_desc_machine_intelligence$"
 sm_navigator_guild: "航海士ギルド"
 sm_living_metal_armory: "生体金属造兵廠"
 sm_dark_matter_factory: "ダークマター動力炉"
 sm_colossus_yards: "巨艦造船所"
 sm_colossus_yards_desc: "伝統的なドックの概念を捨て、 高い機動力をもつ複数の独立建造プラットフォームで巨大艦船を組み立てる。\n"
 sm_colossus_yards_desc_modifier: "造船所：§Yコロッサスの建造が可能になる§!"
 sm_titan_yards: "タイタン造船所"
 sm_titan_yards_desc: "星系基地の外殻に造られた専用のドックにより、 大型のタイタン級艦船の建造が可能になる。 \n"
 sm_titan_yards_desc_modifier: "造船所：§Yタイタンの建造が可能になる§!"
 sm_dockyard: "ドックヤード"
 sm_shipyard: "造船所"
 sm_shipyard_desc: "1つの造船所が同時に建造できる艦船は1隻だが、 複数の造船所があれば並行して建造できる。 \n"
 sm_gun_battery: "射撃砲台"
 sm_gun_battery_desc: "星系基地にMサイズの武器スロットを2つ追加する。 \n"
 sm_missile_battery: "魚雷砲台"
 sm_missile_battery_desc: "星系基地に誘導兵器スロットを2つ追加する。\n"
 sm_mining_terminal: "採掘ターミナル (削除？)"
 sm_trading_hub: "交易拠点"
 sm_trading_hub_plural: "交易拠点"
 sm_trading_hub_desc: "貿易業者や商人たちがビジネスを行う民間港。 \n"
 sm_anchorage: "停泊地"
 sm_anchorage_desc: "艦隊停泊地は宇宙軍の増強支援に必要不可欠だ。 \n"
 sm_hangar_bay: "格納庫区画"
 sm_hangar_bay_desc: "星系基地に軍用機の格納庫を1つ加する。\n"
 sm_astromining_bay: "宇宙採掘港"
 sm_astromining_bay_desc: "星系内の資源収集作戦をサポートする格納庫と倉庫。"
 sm_ftl_inhibitor: "FTL妨害装置"
 sm_ftl_inhibitor_desc: "FTL妨害装置を装備した星系基地が稼働しているあいだ、 敵艦は進入に使用したハイパーレーン以外ではその星系から出られなくなる。"
 sm_communications_jammer: "通信妨害装置"
 sm_communications_jammer_desc: "この強力な妨害装置は敵艦同士の通信に干渉し、 艦隊の移動を統制することを困難にする。 \n"
 sm_disruption_field: "シールド妨害装置"
 sm_disruption_field_desc: "星系内の敵艦周辺に、 局所的な素粒子励起フィールドを生成することで、 シールドの効果を大幅に減退させる。 \n"
 sm_warp_fluctuator: "ハイパーレーン管制所"
 sm_warp_fluctuator_desc: "ハイパーレーンに進入するための理想的な条件を特定し、 予測された航行ルートを最適化することで、 星系内の非敵対的艦船のFTL航行を支援する。 \n"
 warp_fluctuator_tt: "[Root.GetTradingHubPluralType]からの $trade_with_icon$：§G+2§!"
 sm_transit_hub: "輸送拠点"
 sm_transit_hub_desc: "円滑で便利な輸送網を実現する民間船用のインフラ。 \n"
 sm_transit_hub_desc_modifier: "この星系で失業中の§Y労働者§!POPと§Yドローン§!POPが (その他の移住制限を受けていなければ) 十分な居住性・住居・職業枠のあるほかの惑星へ自動的に§Y移住§!するようになる。 ただし、 移住先の星系にも§Y輸送拠点§!が必要。\n\n"
 sm_transit_hub_migrate_effect_desc: "この星系内にいる、 失業した§Y$SLAVES$§! および知性をもたないロボットの他の植民地への§Y自動移住§!が有効になっている。 "
 sm_command_center: "戦闘指令所"
 sm_command_center_desc: "星系基地の深奥に設置されたこの大規模施設から、 星系防衛力を統一的に指揮する。 マップアレイや3Dプロジェクターにより、 星系内のあらゆる航行状況をいつでも追跡できる。 \n"
 sm_defense_grid: "防衛網スーパーコンピュータ"
 sm_defense_grid_desc: "星系基地の防衛プラットフォームの相対軌道と有効範囲を調整し、 サポート可能な防衛プラットフォームの数を増やす強力なスーパーコンピューター。\n"
 sm_science_division: "科学部門"
 sm_science_division_desc: "§Y$sm_spire$§!の出力が §Y2£physics£ 2£society£ 2£engineering£ §!増加する。"
 sm_offworld_trading_company: "惑星外交易会社"
 sm_offworld_trading_company_desc: "星間貿易の環境改善を目的とする、 非政府機関の事務所。 \n"
 sm_offworld_trading_company_desc_modifier: "[Root.GetTradingHubPluralType]からの $trade_with_icon$：§G+4§!\n\n"
 sm_nebula_refinery: "星雲精錬所"
 sm_nebula_refinery_desc: "星雲に存在する宇宙塵を処理して、 希少な鉱物を精錬・抽出できる。 \n"
 sm_listening_post: "聴音哨"
 sm_listening_post_desc: "聴音哨にはハイパーレーンの反響を解析する専門チームが常駐し、 星系基地のセンサー範囲を拡張する。 \n"
 sm_naval_logistics_office: "宇宙軍兵站部門"
 sm_naval_logistics_office_desc: "必要最小限に抑えられた官僚機構により、 星系基地の停泊地の理論的容量を向上させる。 \n"
 sm_naval_logistics_office_desc_modifier: "停泊地：§G+3§! §Y宇宙軍許容量§!"
 sm_black_hole_observatory: "ブラックホール観測所"
 sm_black_hole_observatory_desc: "ブラックホール研究の専用施設を建設することにより、 わが国の物理学は確実に進歩する。 \n"
 sm_deep_space_black_site: "深宇宙秘密情報局"
 sm_deep_space_black_site_desc: "この星系基地の大部分は、 公式には存在しない秘密情報局に使われている。 ここでは星系全域を綿密に監視しつつ、 諜報員たちが総力を挙げて地元メディアや社会的事件を慎重に操っている。 \n"
 sm_resource_silo: "$building_resource_silo$"
 sm_resource_silo_desc: "$building_resource_silo_desc$\n"
 building_resource_silo: "資源サイロ"
 building_resource_silo_desc: "大量の資源を安全に保管できる、 大規模な資源サイロと貯蓄施設。"
 sm_hydroponics_bay: "水耕栽培区画"
 sm_hydroponics_bay_desc: "星系基地の一部を水耕栽培区画にして、 ステーションの自給自足を実現し、 さらには余剰作物を他星系に輸出することもできる。"
 sm_target_uplink_computer: "統合射撃管制コンピュータ"
 sm_target_uplink_computer_desc: "星系内のあらゆる味方センサーデータを収集して分析する、 先進的な射撃管制コンピュータ。 星系基地の射撃能力が大幅に向上する。 \n"
 sm_curator_think_tank: "学術中立機構シンクタンク"
 sm_curator_think_tank_desc: "学術中立機構から学び、 協力することを全面的に支援する研究施設を建設すれば、 我々は科学の進歩に大いに貢献できる。 \n"
 sm_art_college: "芸術大学"
 sm_art_college_desc: "近くの工匠中立機構と協力して運営される、 この無重力の芸術大学では、 優秀な学生たちが宇宙の美を表現する作品を制作している。 \n"
 sm_salvager_workshop: "回収作業場"
 sm_salvager_workshop_desc: "近くにある回収者中立機構と連携して、 技術チームにさまざまな工具や予備部品を提供する附属建物。\n"
 sm_shroud_beacon: "シュラウド・ビーコン"
 sm_shroud_beacon_desc: "シュラウド・トンネルの生成に使用される超能力ビーコン。 シュラウド・ビーコンは解体 (または破壊) が可能だが、 トンネル自体を消すことはできない。\n"
 sm_mercenary_garrison: "傭兵駐屯地"
 sm_mercenary_garrison_desc: "傭兵のために用意された駐屯地。 白髪交じりのベテランたちが、 定期的な訓練で乗組員たちを鍛えながら、 基地を守るために待機している。 ただし相応の報酬が必要だ。\n"
 sm_astromining_hub: "宇宙採掘ハブ"
 sm_astromining_hub_desc: "これらの事務所と加工施設には、 星系内での資源収集業務を担当するエンジニアとコーディネーターが常駐している。 慎重な最適化と優れた保管プロセスにより、かつてないほどの効率で地元の鉱床から採取することができる。\n"
 sm_astromining_hub_office_desc_modifier: "宇宙採掘港モジュール：\n採掘ステーションの産出：§G+10%§! "
 requires_astromining_bay: "§R§!§Y$sm_astromining_bay$§!が必要"
