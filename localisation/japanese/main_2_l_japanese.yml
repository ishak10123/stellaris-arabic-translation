 #Origin Events
 TIMELINE_EVENT_GALACTIC_DOORSTEP_TOOLTIP: "§H$origin.1050.name$§!\n§Y母星の出来事§!\n\nこれで我々の艦船が向こう側にある同じ装置へと渡れるようになった。 最後の贈り物として、 建造者が装置建造の秘密を送ってきたのだ。 これで懸案だった謎が明らかになった。 すぐに我々自身でゲートウェイを建造すれば、 帝国内の移動時間を事実上ゼロにできる。"
 TIMELINE_EVENT_GALACTIC_DOORSTEP: "ブラック・クラウンの開通\n§L[GetDate]§!"
 TIMELINE_EVENT_LOST_COLONY_TOOLTIP: "§H母星発見§!\n§Y母星の出来事§!\n\n過去に失われた我々の植民地を設立した文明と接触した。 時間と空間の隔たりが我々の存在を異なる姿に変えてしまったが、 これで我々の起源が明らかになった。 共有される過去の存在が残響となり、 その上に我々の未来が形作られるだろう。"
 TIMELINE_EVENT_LOST_COLONY: "母星、 かつて失われし場所\n§L[GetDate]§!"
 TIMELINE_EVENT_RESOURCE_CONSOLIDATION_TOOLTIP: "§H機械惑星の建造§!\n§Y母星の出来事§!\n\n我々は真の機械惑星を建造し、 非効率性や生物的腐敗から解放された。 鋼鉄により形作られ、 アルゴリズムにより統治される。 それがあるべき未来の形なのだ。"
 TIMELINE_EVENT_RESOURCE_CONSOLIDATION: "惑星の再建造\n§L[GetDate]§!"
 TIMELINE_EVENT_REMNANTS_TOOLTIP: "§Hエキュメノポリスの再建§!\n§Y母星の出来事§!\n\n我が帝国は母星に過去の繁栄を取り戻した。 廃墟となっていた遺構は再び大いなるエキュメノポリスの姿を取り戻した。 我々の文明が忍耐強く、 大いなる野心にあふれている証左である。"
 TIMELINE_EVENT_REMNANTS: "惑星の再建造\n§L[GetDate]§!"
 TIMELINE_EVENT_SHATTERED_RING_TOOLTIP: "§Hリングワールドの再建§!\n§Y母星の出来事§!\n\n破壊されていた母星系の遺構が完全に元の姿を取り戻した。 志半ばにして失われた者たちの墓場であった場所は、 文明の灯台として再び輝きだしたのだ。"
 TIMELINE_EVENT_SHATTERED_RING: "閉じた円環\n§L[GetDate]§!"
 TIMELINE_EVENT_LEGENDARY_LEADER_TOOLTIP: "§H運命の終着点§!\n§Y母星の出来事§!\n\n啓発者の旅も最後の段階に達した。 この統治が未来永劫、 帝国を形作るのか。 それとも新たな時代の幕開けを迎え、 複数の指導者のリーダーシップにより未来が書き換えられるのか。"
 TIMELINE_EVENT_LEGENDARY_LEADER: "運命の顛末\n§L[GetDate]§!"
 TIMELINE_EVENT_SHROUDWALKER_APPRENTICE_TOOLTIP: "§Hシュラウド・トンネルの建設§!\n§Y母星の出来事§!\n\n二つの現実を隔てていたヴェールが破られ、 我々の領域と未知の領域を結ぶ初のシュラウド・トンネルが開通した。 この裂け目は距離と時間をねじ曲げ、 かつてボイドであった場所に道を通すのだ。 この先どのような謎や危険が待ち構えているのか、 今後明らかになっていくだろう。"
 TIMELINE_EVENT_SHROUDWALKER_APPRENTICE: "ヴェールの向こう側\n§L[GetDate]§!"
 TIMELINE_EVENT_VOID_DWELLERS_TOOLTIP: "§H軌道上居住地の建設§!\n§Y母星の出来事§!\n\n我々はボイドから新たなものを築き上げた。 新しい居住地を今回初めて軌道上に建設したのだ。 この居住地の完成をもって、 我々は天体領域へと進出する。 民衆は惑星上に存在することの重荷から解放されるのだ。"
 TIMELINE_EVENT_VOID_DWELLERS: "宇宙に浮かぶ家\n§L[GetDate]§!"
 TIMELINE_EVENT_OCEAN_PARADISE_TOOLTIP: "§H大海の征服§!\n§Y母星の出来事§!\n\n水を自在に操る力を使い、 我々は母星の環境を再開発した。 広大な海を自然界における限界以上に拡張したのだ。 これで大洋は我々の前にひざまづいた。 ほどなく銀河全体もそれにならうことだろう。"
 TIMELINE_EVENT_OCEAN_PARADISE: "潮による支配\n§L[GetDate]§!"
 TIMELINE_EVENT_DOOMSDAY_TOOLTIP: "§H母性の破壊§!\n§Y母星の出来事§!\n\n避けられない運命が降臨した。 かつて繁栄を誇った母星は運命に屈し、 炎と怒りの大災禍の中で砕け散っていった。 今やその灰はボイドの手の中にあり、 我々の将来は脱出を果たせた者たちの手に委ねられた。"
 TIMELINE_EVENT_DOOMSDAY: "最後の日\n§L[GetDate]§!"
 TIMELINE_EVENT_EVOPRED_ABSORB_TOOLTIP: "§H種族特性の吸収§!\n§Y起源イベント§!\n\n初めて新しい遺伝物質を吸収した。 美味である。"
 TIMELINE_EVENT_EVOPRED_ABSORB: "遺伝物質を吸収した\n§L[GetDate]§!"
 TIMELINE_EVENT_WORMHOLE_DEFENDED_TOOLTIP: "放棄された孵化場とその艦隊は§L[GetDate]§!に破壊された"
 TIMELINE_EVENT_WORMHOLE_DEFENDED: "ワームホールを防衛した\n§L[GetDate]§!"
 #Crisis Events
 TIMELINE_EVENT_CRISIS_GREAT_KHAN_TOOLTIP: "§H大ハーン§!\n§Y危機的事件§!\n\n新たな首領が反目していた多くの部族を取りまとめ、 一つの恐るべき大艦隊を編成した。 プラズマとカーボンファイバーを振りかざし、 大ハーンはみるみるうちに銀河を席巻した。 いくつもの帝国を打倒し、 惑星を隷属させていったのだ。 その強大な力の前にあらゆる艦隊が藻屑と消えた。 そしてかつての無法者たちは今や恐ろしい目的の下に集結している。 もはや略奪ではない、 これは征服だ。"
 TIMELINE_EVENT_CRISIS_GREAT_KHAN: "解き放たれた野獣\n§L[GetDate]§!"
 TIMELINE_EVENT_CRISIS_GRAY_TEMPEST_TOOLTIP: "§Hグレイ・テンペスト§!\n§Y危機的事件§!\n\nLゲートが開き、 グレイ・テンペストのいにしえの艦隊が放たれた。 艦隊は銀河を横断して破壊の弧を描き、 線上のあらゆるものを破壊していった。 交渉もなく、 慈悲もない。 ただ絶え間ない複製だけが行われた。 惑星は沈黙し、 艦隊は消滅した。 恐怖のみが広がった。 すべてが同じに見える過去が戻ってきたのだ。"
 TIMELINE_EVENT_CRISIS_GRAY_TEMPEST: "目覚め\n§L[GetDate]§!"
 TIMELINE_EVENT_CRISIS_FORMLESS_TOOLTIP: "§Hフォームレス§!\n§Y危機的事件§!\n\n本来難民である者たちが反撃を余儀なくされた。 フォームレスとして知られるエネルギー体は、 我々の銀河が安全な避難所とは程遠い場所であることを理解した。 彼らは、 命がある限り異次元からの侵略者で宇宙を埋め尽くそうとするだろう。"
 TIMELINE_EVENT_CRISIS_FORMLESS: "フォームレスの怒り\n§L[GetDate]§!"
 TIMELINE_EVENT_CRISIS_VOIDWORM_PLAGUE_TOOLTIP: "§Hボイドワームの疫病§!\n§Y危機的事件§!\n\nボイドワームの性質が変化した。 一定の数に達すると、 彼らは繁殖の狂乱状態に突入した。 持続可能な成長率を維持できなくなったボイドワームは、 銀河のすべての生命を滅ぼすことを目的とし、 無自覚のうちに自らの命を終焉させる。"
 TIMELINE_EVENT_CRISIS_VOIDWORM_PLAGUE: "うごめく貪食\n§L[GetDate]§!"
 TIMELINE_EVENT_CRISIS_UNBIDDEN_TOOLTIP: "§H招かれざるもの§!\n§Y危機的事件§!\n\n存在という布の裂け目から解き放たれ、 侵略を始めたのは純粋なエネルギーそのものだ。 交渉の余地はなく、 屈することもない。 星系のすべてを飲み込み、 それを糧にしてどこまでも進み続ける。 打ち込まれたくさびは裂け目を安定させ、 仲間を次々に我々の領域に送り込む。 招かれざる者が現れたのだ。"
 TIMELINE_EVENT_CRISIS_UNBIDDEN: "開いた裂け目\n§L[GetDate]§!"
 TIMELINE_EVENT_CRISIS_KALEIDOSCOPE_TOOLTIP: "§Hカレイドスコープ§!\n§Y危機的事件§!\n\nカレイドスコープと呼ばれる飢えたエネルギー体が銀河に侵入し、 居住されている星系を次々と襲い始めた。 その飢えは尽きることなく、 容易に注意をそらされるようだ。 間もなく星の塵へと崩壊するだろう。"
 TIMELINE_EVENT_CRISIS_KALEIDOSCOPE: "飢えたスペクトラム\n§L[GetDate]§!"
 TIMELINE_EVENT_BECOME_THE_CRISIS_TOOLTIP: "§H危機に直面§!\n§Y危機的事件§!\n\n銀河は暗闇に包まれている。 [EVENT_TARGET_0.GetName]が外交姿勢を捨て、 自らを銀河の存在に対する脅威であると宣言したのだ。 艦隊を集結させ、 最後の終末的な計画が野火のように広がっていく。 もはやただの帝国ではない。 危機と化したのだ。"
 TIMELINE_EVENT_BECOME_THE_CRISIS: "銀河の大敵\n§L[GetDate]§!"
 TIMELINE_EVENT_CRISIS_PRETHORYN_SCOURGE_TOOLTIP: "§Hプレスリンの災厄§!\n§Y危機的事件§!\n\n銀河の果てから、 プレスリンがやってきた。 彼らの生物船は星々を群れ飛び、 その航跡には汚染された惑星だけが残される。 大群のざわめきの中では、 いかなる懇願も聞き入れられることはない。"
 TIMELINE_EVENT_CRISIS_PRETHORYN_SCOURGE: "喰らう潮流\n§L[GetDate]§!"
 TIMELINE_EVENT_CRISIS_CONTINGENCY_TOOLTIP: "§Hコンティンジェンシー§!\n§Y危機的事件§!\n\n冷たく、 計算されつくした、 止められない信号が銀河全体に広がる。 AIシステムは機能停止し、 合成知能は降伏する。 コンティンジェンシーが目覚めたのだ。 隠された機械の世界から容赦ない戦闘体が現れ、 最終指令を実行する。 それは完全な絶滅だった。"
 TIMELINE_EVENT_CRISIS_CONTINGENCY: "幽霊信号\n§L[GetDate]§!"
 TIMELINE_EVENT_CRISIS_CETANA_TOOLTIP: "§Hセタナ§!\n§Y危機的事件§!\n\n虚空に声が響く。 「我が子たちよ、 ついに私は汝らの元に戻ってきたのだ」\n\n太古の昔に封印され、 その名さえも時の流れに消え去った知性体セタナが目覚めた。 彼女の目的は絶対である。 すなわち、 いかなる手段をも用いて苦痛を根絶すること。 彼女の艦隊は冷たく優雅に動き、 銀河を無慈悲な最終平和へと導く聖戦を守っている。"
 TIMELINE_EVENT_CRISIS_CETANA: "女王の帰還\n§L[GetDate]§!"
 TIMELINE_EVENT_HATCH_BEHEMOTH_TOOLTIP: "§Hベヒモスの幼体§!\n§Yマイルストーン§!\n\nベヒモスの幼体が§L[GetDate]§!に初めて卵から孵化した"
 TIMELINE_EVENT_HATCH_BEHEMOTH: "ベヒモスの幼体\n§L[GetDate]§!"
 #Galactic Events
 TIMELINE_EVENT_GALACTIC_MARKET_TOOLTIP: "§H銀河市場§!\n§Y銀河の出来事§!\n\n交易が星々の連帯を生んでいる。 銀河市場が正式に設立され、 銀河における経済活動の中心となっている。 交易が自由に行われ、 瞬時に富が生み出されては消えていく。 帝国全体の運命はいまや需要と供給に掛かっているのだ。"
 TIMELINE_EVENT_GALACTIC_MARKET: "自由な交易\n§L[GetDate]§!"
 TIMELINE_EVENT_GALACTIC_COMMUNITY_TOOLTIP: "§H銀河共同体§!\n§Y銀河の出来事§!\n\n銀河のいくつもの帝国が一つの政治機構の下に集結し、 銀河共同体が設立された。 今後は外交、 議論、 権力闘争を通して、 ここが星々の未来を形作る話し合いの場となるのだ。 果たしてその真の影響力はどれほどのものになるだろうか。"
 TIMELINE_EVENT_GALACTIC_COMMUNITY: "新たな秩序\n§L[GetDate]§!"
 TIMELINE_EVENT_GALACTIC_COMMUNITY_RESOLUTION_TOOLTIP: "§H決議の可決§!\n§Y銀河の出来事§!\n\n銀河共同体が意思を示し、 新たな決議により星間法の改革が行われた。 賛同する者も不満を覚える者も等しく従わねばならない。"
 TIMELINE_EVENT_GALACTIC_COMMUNITY_RESOLUTION: "星間法\n§L[GetDate]§!"
 TIMELINE_EVENT_WAR_IN_HEAVEN_TOOLTIP: "§H天上戦争§!\n§Y銀河の出来事§!\n\nいにしえの遺物が再び現れた。 慈悲深い擁護者であると同時に、 怒りにあふれる巨神として。 [EVENT_TARGET_0.GetName]と[EVENT_TARGET_1.GetName]、 既に忘れ去られた時代のいにしえより敵対する両者が、 銀河の覇権を賭けて戦いを再燃させている。 そして艦隊の影が星々の光を覆い隠し、 若い種族に強要するのだ。 ひざまずくのか、 それとも死を選ぶのか。"
 TIMELINE_EVENT_WAR_IN_HEAVEN: "いにしえの確執\n§L[GetDate]§!"
 TIMELINE_EVENT_NEXUS_STORM_TOOLTIP: "§Hネクサス嵐§!\n§Y銀河の出来事§!\n\nかつて見たことがない規模の嵐が[EVENT_TARGET_0.GetName]星系で発生している。 ネクサス嵐が星々を突き進んでおり、 艦船を足止めし、 その破壊力で惑星を襲っている。"
 TIMELINE_EVENT_NEXUS_STORM: "無限の嵐\n§L[GetDate]§!"
