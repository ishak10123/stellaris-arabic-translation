 building_hive_primitive_farm: "$building_primitive_farm$"
 building_hive_primitive_farm_desc: "$building_primitive_farm_desc$"
 building_hive_primitive_node: "単純シナプス・ノード"
 building_hive_primitive_node_desc: "この粗野なシナプスノードを通じてハイヴの意志は強化される。"
 building_machine_primitive_node: "単純アップリンクノード"
 building_machine_primitive_node_desc: "惑星の通信遅延を減少させる粗野なアップリンクノード。"
 building_farming_districts_1: "作物開発拠点"
 building_farming_districts_1_desc: "耕作可能な土地を調査し、惑星農業の拡大に着手することを任務とする、 比較的小規模な行政施設。"
 building_farming_districts_2: "土壌開拓センター"
 building_farming_districts_2_desc: "農業地区のさらなる発展を可能にするために、 耕作限界地の回復と収量の向上に重きを置いた施設。"
 building_farming_districts_3: "自動化農業複合施設"
 building_farming_districts_3_desc: "機械化された収穫機、 ドローン部隊、 空調管理された畑により、 農業地区の急速な拡大を推進する。"
 building_farming_districts_4: "惑星栽培グリッド"
 building_farming_districts_4_desc: "集約的で高密度の農業経営を監督する広大な総合施設。 惑星上で運営できる農業区域の数を最大化できる。"
 building_mine_generic: "地表採石補給所"
 building_mine_generic_desc: "低深度の地表における掘削と採鉱を連携させることで、 鉱業区域の早期拡大を可能にする集積所。"
 building_mining_districts_1: "産業採掘場"
 building_mining_districts_1_desc: "掘削リグ、 コンベアシステム、 選別アレイが連動することで、 確実な生産量を維持し、 鉱業区域の初期拡大を可能にする。"
 building_mining_districts_2: "コア掘削アレイ"
 building_mining_districts_2_desc: "重ボアドリルや構造補強によってより地表深くの採掘作業を可能にし、 さらなる鉱業エリアの開放を可能にする施設。"
 building_mining_districts_3: "震動トンネル掘削ヤード"
 building_mining_districts_3_desc: "高効率のトンネル掘削と地中安定化設備を備え、 これまで到達できなかった鉱脈へのアクセスをアンロックする複合施設。"
 building_mining_districts_4: "深部地殻抽出グリッド"
 building_mining_districts_4_desc: "完全に工業化された採掘区画を管理し、 鉱業区域を最大限まで拡張するサポートを可能にする、 惑星の最大深度で稼働する広大な施設。"
 building_generator_generic: "電流生成ヤード"
 building_generator_generic_desc: "大規模なエネルギー生成に特化したこの建物には、 パワーセル、 プラズマ導管、 高出力ジェネレーターアレイなどが備わっている。"
 building_generator_districts_1: "導電作業施設"
 building_generator_districts_1_desc: "基盤となる送電網インフラとエネルギー処理システムを配給することで、 新たな発電地区の設立をサポートする複合施設。"
 building_generator_districts_2: "変電中継施設"
 building_generator_districts_2_desc: "発電区域の開発を幅広くサポートし、 大容量リレー、 変圧器ヤード、 送電網安定化ノードの配備を通じて、 惑星の電力インフラを拡大する施設。"
 building_generator_districts_3: "プラズマ制御アレイ"
 building_generator_districts_3_desc: "安定化されたプラズマの流れと回路共振制御によって、 惑星全体の発電機の開発を強化する複合施設。"
 building_generator_districts_4: "惑星ネクサス"
 building_generator_districts_4_desc: "惑星規模の発電機の運転を調整し、 発電区域を最大限まで拡大することを可能にする、 統合化された送電ネクサス。"
