 TECH_UNLOCK_OUTPOST_CONSTRUCTION_TITLE: "§H星系基地をアンロック：§!前哨地"
 TECH_UNLOCK_OUTPOST_CONSTRUCTION_DESC: "§H前哨地§!\n最も基本的な星系基地である前哨地は、 国境を拡大するために恒星軌道上に建造される、 軽武装の宇宙ステーション。 前哨地は建造物やモジュールを持つことができず、 またアウトライナーには表示されない。"
 TECH_UNLOCK_STARPORT_CONSTRUCTION_TITLE: "§H星系基地のアップグレードをアンロック：§!星系港"
 TECH_UNLOCK_STARPORT_CONSTRUCTION_DESC: "§H星系港§!\n前哨地をアップグレードした星系港は、 1つの建造物と2つのモジュールを保持できる。"
 TECH_UNLOCK_STARHOLD_CONSTRUCTION_TITLE: "§H星系基地のアップグレードをアンロック：§!星系軍港"
 TECH_UNLOCK_STARHOLD_CONSTRUCTION_DESC: "§H星系軍港§!\n星系港をアップグレードした星系軍港は、 2つの建造物と4つのモジュールを保持できる。"
 TECH_UNLOCK_STAR_FORTRESS_CONSTRUCTION_TITLE: "§H星系基地のアップグレードをアンロック：§!星系要塞"
 TECH_UNLOCK_STAR_FORTRESS_CONSTRUCTION_DESC: "§H星系要塞§!\n星系軍港をアップグレードした星系要塞は、 3つの建造物と6つのモジュールを保持できる。"
 TECH_UNLOCK_CITADEL_CONSTRUCTION_TITLE: "§H星系基地のアップグレードをアンロック：§!シタデル"
 TECH_UNLOCK_CITADEL_CONSTRUCTION_DESC: "§Hシタデル§!\n星系要塞をアップグレードしたシタデルは最も重武装の星系基地で、 4つの建造物と6つのモジュールを保持できる。"
