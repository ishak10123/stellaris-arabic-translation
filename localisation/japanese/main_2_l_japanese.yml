 TECH_UNLOCK_DIPLOMATIC_ACTION_CREATE_VASSAL_TITLE: "§H外交をアンロック：§!属国と保護国"
 TECH_UNLOCK_DIPLOMATIC_ACTION_CREATE_VASSAL_DESC: "§H従属§!\n我々の支配下で保護を与えることで、 ほかの帝国を従属させられる。 ほとんどの帝国は属国になるが、 テクノロジー面で劣る国は保護国となる。 我々の帝国が保護を必要とした場合、 我々側から他国に従属を申し出ることもできる。"
 TECH_UNLOCK_SURVEY_INTEL_TITLE: "§H情報をアンロック：§!調査データ"
 TECH_UNLOCK_SURVEY_INTEL_DESC: "§H調査データ§!\n他国領内の惑星の調査データが見られるようになる。"
