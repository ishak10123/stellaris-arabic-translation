 TECH_UNLOCK_TERRAFORMING_GAIA_CHANGE_DESC: "§Hガイアの創造§!\nガイア型惑星へのテラフォーミングが可能になる。"
 TECH_UNLOCK_TERRAFORMING_NUKED_CHANGE_TITLE: "§H機能をアンロック：§!気候修復"
 TECH_UNLOCK_TERRAFORMING_NUKED_CHANGE_DESC: "§H気候修復§!\n生態系が荒廃した惑星をテラフォーミングできる。"
 TECH_UNLOCK_SPACEPORT_CONSTRUCTION_TITLE: "§Hステーションをアンロック：§!宇宙港"
 TECH_UNLOCK_SPACEPORT_CONSTRUCTION_DESC: "§H宇宙港§!\n宇宙港は、 宇宙飛行が可能なあらゆる船を建造するために必要だ。 アップグレードして機能を追加することができ、 基本的な防衛兵器も備えている。"
 TECH_UNLOCK_SCIENCE_SHIP_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$：§!調査船"
 TECH_UNLOCK_SCIENCE_SHIP_CONSTRUCTION_DESC: "§H調査船§!\n調査船は広大な宇宙を探索するための能力を備えており、 トップの科学者の活動拠点として用いられる。"
 TECH_UNLOCK_CONSTRUCTION_SHIP_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$：§!建設船"
 TECH_UNLOCK_CONSTRUCTION_SHIP_CONSTRUCTION_DESC: "§H建設船§!\n建設船は高度な無人溶接ドローンを使用し、 さまざまな宇宙ステーションを建設できる。"
 TECH_UNLOCK_COLONY_SHIP_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$：§!コロニー船"
 TECH_UNLOCK_COLONY_SHIP_CONSTRUCTION_DESC: "§Hコロニー船§!\nコロニー船は、 別の惑星に入植するための使い捨ての船だ。 入植が始まると解体され、 その惑星のシェルターや拠点に姿を変える。"
 TECH_UNLOCK_CORVETTE_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$：§!コルベット"
 TECH_UNLOCK_CORVETTE_CONSTRUCTION_DESC: "§Hコルベット§!\nコルベットは最も基本的な軍艦で、 その武装で敵対的な遭遇に対応できる。"
 TECH_UNLOCK_DESTROYER_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$：§!駆逐艦"
 TECH_UNLOCK_DESTROYER_CONSTRUCTION_DESC: "§H駆逐艦§!\n2つの区画をもつ大型の駆逐艦は、 戦略的武装に幅広い選択肢を提供する。"
 TECH_UNLOCK_CRUISER_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$：§!巡洋艦"
 TECH_UNLOCK_CRUISER_CONSTRUCTION_DESC: "§H巡洋艦§!\n巡洋艦は3つの区画をもつ初の艦種である。 建造コストに見合った多彩なモジュール構成が可能だ。"
 TECH_UNLOCK_BATTLESHIP_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$：§!戦艦"
 TECH_UNLOCK_BATTLESHIP_CONSTRUCTION_DESC: "§H戦艦§!\n通常の船体で建造できる最大の艦である戦艦は、 戦場に絶大な火力を持ち込む一方で、 コスト面と機動性を犠牲にしている。"
 TECH_UNLOCK_TITAN_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$：§!タイタン"
 TECH_UNLOCK_TITAN_CONSTRUCTION_DESC: "§Hタイタン§!\n艦隊の誇りともいえる巨大な軍艦。 多くの兵器を搭載し、 旗艦としての役割を担うことが多い。"
 TECH_UNLOCK_JUGGERNAUT_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$：§!ジャガーノート"
 TECH_UNLOCK_JUGGERNAUT_CONSTRUCTION_DESC: "§Hジャガーノート§!\nこの超大型の艦船は、 船であると同時に宇宙ステーションでもある。 ジャガーノートは艦船を修理・建造できる巨大な移動式宇宙ステーションであり、 攻勢作戦時に前線基地として利用できる。"
