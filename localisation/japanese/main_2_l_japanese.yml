 TECH_UNLOCK_COMBAT_COMPUTERS_2_DESC: "§H発展戦術§!\n即応戦闘アルゴリズムのさらなる進歩により、 艦載AIが割り当てられた役割をはるかに効果的にこなせるようになる。"
