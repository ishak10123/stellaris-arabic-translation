 building_hab_solar_power_processor: "太陽光処理装置"
 building_hab_solar_power_processor_desc: "太陽光処理装置は、 軌道上居住地の外殻に設置された大量のソーラーパネルが集めた太陽光エネルギーを分配する。"
 building_hab_astro_mining_facility: "宇宙採掘港"
 building_hab_astro_mining_facility_desc: "埋蔵された天然資源をもたない軌道上居住地は、 付近の小惑星や惑星から鉱物を採掘・精製するこの施設に依存している。"
 building_hab_agri_bay: "農業地区"
 building_hab_agri_bay_desc: "軌道上居住地の住民が必要とする、 さまざまな動植物を生産するために確保されたハビタットの一区画。"
 building_hab_cultural_center: "レジャー地区"
 building_hab_cultural_center_desc: "軌道上居住地の住民の文化的・社会的需要を満たすための広大な施設。"
 building_hab_laboratory_module: "研究施設"
 building_hab_laboratory_module_desc: "軌道上居住地の科学研究用区画。"
 building_fe_xeno_zoo_desc: "高度に洗練された保護区で、 「保護された」異星生物の自然生息地を完璧に維持している。"
 building_paradise_dome: "楽園ドーム"
 building_paradise_dome_desc: "完全に密閉された居住用ドームで、 自己完結した生態系をもつ。 ここに居住する富裕層や幸運な人々にとっては、 まさにプライベートな楽園だ。"
 building_monument: "記念碑"
 building_monument_desc: "偉大な統治者を称える記念碑。"
 building_monument_proper: "[GetRulerName]の記念碑"
 building_monument_desc_proper: "偉大な統治者[GetRulerName]を称える、 巨大な記念碑。"
 building_grand_mausoleum: "大霊廟"
 building_grand_mausoleum_desc: "偉大な統治者の墓を収容するために建築された、 巨大な霊廟。"
 building_grand_mausoleum_proper: "[GetRulerName]大霊廟"
 building_grand_mausoleum_desc_proper: "人々に敬愛された[GetRulerName]の神聖な霊廟だ。"
 building_grand_mausoleum_allowed_tooltip: "§Y統治者§!が必要。\nまた、 以下のいずれかの\n建造物が惑星上に必要：\n§Y惑星管理局§!\n§Y惑星首都§!\n§Y帝国の首都機能施設§!"
 building_royal_gardens: "王宮庭園"
 building_royal_gardens_desc: "人々が訪れ、 偉大な統治者を追悼し懐かしむことのできる巨大な庭園。"
 building_royal_gardens_proper: "[GetRulerName]の王宮庭園"
 building_royal_gardens_desc_proper: "偉大なる[GetRulerName]によって造成された幻想的な庭園。"
 building_galactic_stock_exchange: "銀河証券取引所"
 building_galactic_stock_exchange_desc: "商品やサービスの自由貿易により、 より専門的な経済活動を実現する。 個人は狭い分野に特化し、 ニーズに応じた取引ができる。"
 building_ministry_production: "生産省"
 building_ministry_production_desc: "生産省は惑星全体の製造能力を組織化し、 効率化するために精力的に活動している。"
 building_production_center: "中央資源処理場"
 building_production_center_desc: "惑星全体の資源運用と産出を一挙に取り扱う、 巨大な施設。"
 building_supercomputer: "惑星スーパーコンピュータ"
 building_supercomputer_desc: "単体の巨大スーパーコンピュータで、 とてつもなく複雑な演算をこなし、 惑星全体の研究出力を改善する。"
 building_hyper_entertainment_forum: "ハイパーエンターテイメント広場"
 building_hyper_entertainment_forum_desc: "この巨大な複合娯楽施設で、 夢が現実のものに。 ショッピングモール、 レストラン、 遊園地、 バーチャル・アミューズメント施設など盛りだくさん。 あなたは夢見るだけでいい――ここで全部叶えよう！"
 building_institute: "先端研究機関"
 building_institute_desc: "先端研究機関は巨大な施設で、 大きく異なる分野の最先端を集めて前例のない相乗効果を発揮し、 惑星全体の研究出力を向上させる。"
 building_virtual_combat_arena: "仮想戦闘闘技場"
 building_virtual_combat_arena_desc: "仮想戦闘闘技場は、 エンターテインメントと、 共同体の団結促進の両方の役割を果たす。 また、 現地の地上軍が仮想演習のために利用することもできる。"
 building_monument_purity: "純血の石碑"
 building_monument_purity_desc: "$tech_purity_campaigns_desc$"
 building_orillium_factory: "オリリウム爆薬工場"
 building_orillium_factory_desc: "オリリウム鉱石はその独特の性質から、 調整が容易な爆薬の原料として使われる。 特に地下深くの鉱山で、 厳密に制御された発破を行うのに適している。"
 building_pitharan_plant: "ピサラン肥料工場"
 building_pitharan_plant_desc: "ピサラン肥料工場は、 ピサランダストを添加物として使用した肥料を製造し、 作物の収穫量を向上させる。"
 building_military_academy: "士官学校"
 building_military_academy_desc: "士官学校はその土地の徴兵率を上げ、 より高度な訓練を施す。"
 building_symbol_unity: "統合の象徴"
 building_symbol_unity_desc: "$tech_symbol_unity_desc$"
 building_visitor_center: "ビジターセンター"
 building_visitor_center_desc: "$tech_visitor_center_desc$"
 building_alien_sanctuary: "異種族保護区"
 building_alien_sanctuary_desc: "$tech_alien_sanctuary_desc$"
 building_psi_corps: "PSI結社"
 building_psi_corps_desc: "帝国全土から、 超能力を持つ[GetIndividualNamePlural]たちが力を磨くためにここに集められる。\n\n§YPSI結社はあなたの[GetPsiCorpFriend]だ。 PSI結社を信用しよう。§!"
 psionic_bonus_workforce_from_telepaths_tt: "$mod_psionic_pop_bonus_workforce_mult$は[telepath.GetIcon][telepath.GetName]の職業枠に比例する"
 building_hive_synapse: "集合シナプス"
 building_hive_synapse_desc: "集合意識の信号を強めることは、 ドローンをより有能な労働者にする。"
 building_xenology_center: "異星生物学センター"
 building_xenology_center_desc: "劣等種族を一ヵ所に集めることで、 彼らを研究したり、 我々の優越性の証として展示したりできる。"
 building_symbol_purity: "純血の象徴"
 building_symbol_purity_desc: "$tech_symbol_unity_desc$"
 building_control_center: "コントロールセンター"
 building_control_center_desc: "強力な処理拠点を建設することによって、 ドローンの作業効率を最適化できる。"
