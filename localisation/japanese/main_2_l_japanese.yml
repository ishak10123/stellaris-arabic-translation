 MACRO_BUILDER_TITLE: "§E侵攻軍拠点§!"
 MACRO_BUILDER_DESC: "§Y侵攻軍拠点§!を使うと、 多数の侵攻軍を簡単に編成できる。 地上軍はこのセクター内の利用可能な惑星で編成される。\n\n編成が完了すると、 これらの地上軍は、 この星系基地で§Y兵員召集§!が有効になっている、 またはこの星系基地に集結している§Y地上軍§!を増強する。"
 MACRO_BUILDER_CAPACITY_DESC: "利用可能な£planet£ §Y惑星§!の数によって、 同時に編成できる軍の数が決まる。 惑星ビューの地上軍タブの§Y侵攻軍拠点§!から惑星を除外できる。"
 MACRO_BUILDER_TAB: "地上軍拠点"
 MACRO_BUILDER_QUEUE: "地上軍編成キュー"
 DEPLOY_IN_ORBIT: "軌道上に配置"
 DEPLOY_IN_ORBIT_DESC: "新しく編成された§Y地上軍§!を§Y軌道上§!に配置すべきか、 §Y惑星§!に配置すべきかによって切り替わる。\n\n§Y星系基地の地上軍ビルダー§!によって編成された§Y地上軍§!は、 常に§Y軌道上§!に配置される。"
 ARMY_BUILDER_CHECKBOX: "地上軍ビルダーに含める"
 INCLUDE_IN_SECTOR_BUILDER_DESC: "惑星を§Y星系基地の地上軍ビルダー§!の対象にするかしないかを切り替える。"
