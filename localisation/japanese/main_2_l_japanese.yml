 TECH_UNLOCK_MINING_STATION_TITLE: "§Hステーションをアンロック：§!採掘ステーション"
 TECH_UNLOCK_MINING_STATION_DESC: "§H採掘ステーション§!\n採掘ステーションは、 軌道上から惑星に埋蔵された鉱物を抽出できる。"
 TECH_UNLOCK_RESEARCH_STATION_TITLE: "§Hステーションをアンロック：§!研究ステーション"
 TECH_UNLOCK_RESEARCH_STATION_DESC: "§H研究ステーション§!\n研究ステーションは軌道上から惑星のさまざまな現象を研究し、 有用な学術データを収集する。"
 TECH_UNLOCK_AFTERBURNER_1_TITLE: "§Hコンポーネントをアンロック：§!アフターバーナー"
 TECH_UNLOCK_AFTERBURNER_1_DESC: "§Hアフターバーナー§!\nこの強力なスラスターは戦闘時の速度を上昇させるが、 大量の電力を消費する。"
 TECH_UNLOCK_AFTERBURNER_2_TITLE: "§Hコンポーネントをアンロック：§!発展型アフターバーナー"
 TECH_UNLOCK_AFTERBURNER_2_DESC: "§H発展型アフターバーナー§!\n標準のアフターバーナーを発展させたもので、 戦闘時の速度をさらに向上させる。"
 TECH_UNLOCK_THRUSTER_1_TITLE: "§Hコンポーネントをアンロック：§!化学スラスター"
 TECH_UNLOCK_THRUSTER_1_DESC: "§H化学スラスター§!\n単純だがそれなりに有効な化学スラスター。 推進剤を燃焼させて推力を生み出す。"
 TECH_UNLOCK_THRUSTER_2_TITLE: "§Hコンポーネントをアンロック：§!イオンスラスター"
 TECH_UNLOCK_THRUSTER_2_DESC: "§Hイオンスラスター§!\nこの電気式スラスターは推進剤を必要とせず、 イオン・ビームを用いて推力を生み出す。"
 TECH_UNLOCK_THRUSTER_3_TITLE: "§Hコンポーネントをアンロック：§!プラズマスラスター"
 TECH_UNLOCK_THRUSTER_3_DESC: "§Hプラズマスラスター§!\n発展型の電気式スラスター。 亜光速での航行速度と機動性を向上させる。"
 TECH_UNLOCK_THRUSTER_4_TITLE: "§Hコンポーネントをアンロック：§!インパルススラスター"
