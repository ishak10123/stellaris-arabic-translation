 building_primitive_farm: "原始的な農場"
 building_primitive_farm_desc: "わずかな収穫しか期待できない原始的な農場。"
 building_primitive_factory: "基本工場"
 building_primitive_factory_desc: "非効率的で原始的な上に、 稼働中は汚染物質を吐き出す工場。"
 building_primitive_offices: "基本支社"
 building_primitive_offices_desc: "これらの支社には、 無意味な雑用の音が響く、 どこまでも続きそうなほどの数の個室が並んでいる。"
 building_primitive_mine: "原始的な鉱山"
 building_primitive_mine_desc: "地中を蛇行する原始的な坑道。"
 building_primitive_power_plant: "原始的な発電所"
 building_primitive_power_plant_desc: "原始的でやや信頼性に欠ける発電所。 石炭や初期の原子力を利用しており、 大気を汚染している。"
 building_mutant_landfill: "ミュータント廃棄場"
 building_mutant_landfill_desc: "腐敗した大量のミュータント獣の死骸。 彼らの不安定な有機物同士が融合し、 奇妙な塊を形成している。"
 building_vault: "地下壕"
 building_vault_desc: "これらのテント状構造物が示しているのは、 巨大な地下壕への入口だ。 この地下壕は、 もともとはこの惑星の先住民のシェルターとして作られた。 ここに逃げ込んだ人々は、 ついに食料が尽きたときにお互いを次の食事に選び、 殺し合ったようだ。"
 building_vault_2: "地下壕"
 building_vault_2_desc: "これらのテント状構造物が示しているのは、 巨大な地下壕への入口だ。 この地下壕は、 もともとはこの惑星の先住民のシェルターとして作られた。 ここには広大な機材置き場と、 採掘装備の保管所がある。"
 building_particle_accelerator: "粒子加速器"
 building_particle_accelerator_desc: "この古代の粒子加速器の設計は先進的で、 残存する端末には膨大な研究データが蓄積されている。 これらのデータをまとめたのは、 優秀な理論物理学者だったに違いない。"
 building_odd_factory: "奇妙な工場"
 building_odd_factory_desc: "異星文明が惑星上に残していった、 価値の高い資源を産出する精巧に作られた施設。"
 building_quarantine: "疫病研究ステーション"
 building_quarantine_desc: "疫病の治療法を開発するための臨時の医療施設。"
 building_plague_memorial: "疫病記念碑"
 building_plague_memorial_desc: "かつて彼らの故郷を襲った、 恐ろしい疫病の犠牲者を偲ぶ記念碑。 これは国家存続の証でもある。"
 building_energy_grid: "送電グリッド"
 building_energy_grid_plural: "送電グリッド"
 building_energy_grid_desc: "入念に構築された送電網は、 発電機の出力を最大化する。"
 building_energy_grid_effect_desc: "職業による£energy£ §Yエネルギー通貨§!の基本産出量が§G1§!増加する。"
 building_energy_nexus: "送電ネクサス"
 building_energy_nexus_desc: "この巨大な施設は、 惑星上の送電グリッドを集中管理し、 その効率を向上させる。"
 building_mineral_purification_plant: "鉱物精製プラント"
 building_mineral_purification_plant_desc: "これらの精製装置を通過した鉱物は、 最高の品質をもつ。"
 building_mineral_purification_hub: "鉱物精製ハブ"
 building_mineral_purification_hub_desc: "鉱物を受け取り、 精製装置アレイに輸送する大規模なハブ。"
 building_medical_1: "医療機関"
 building_medical_1_desc: "$job_healthcare_desc$"
 building_medical_2: "遺伝子診療所"
 building_medical_2_desc: "遺伝子診療所は高度な医療処置を提供し、 POPに対し統計的に有意な健康改善と寿命延長をもたらす。"
 building_medical_3: "細胞活性化センター"
 building_medical_3_desc: "細胞活性化センターは、 大勢の住民に先進的な医療を提供できる。 細胞レベルでの処置により、 人々の健康と寿命が大いに改善される。"
 building_mineral_silo_1: "鉱物貯蔵庫 1型"
 building_mineral_silo_1_desc: "鉱物貯蔵庫は帝国の鉱物貯蔵上限を増やす。"
