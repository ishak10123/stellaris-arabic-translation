 TECH_UNLOCK_TERRAFORMING_TEMP_CHANGE_DESC: "§H大気操作§!\n惑星をテラフォーミングする際、 気候も変更できるようになる。"
 TECH_UNLOCK_VOLCANO_TERRAFORM_TITLE: "§H研究選択肢：§!火山テラフォーミング"
 TECH_UNLOCK_VOLCANO_TERRAFORM_DESC: "火山型惑星を温暖な気候にテラフォーミングできる。"
