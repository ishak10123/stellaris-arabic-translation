 building_planetary_shield_generator_desc: "$tech_planetary_shield_generator_desc$"
 building_autochthon_monument: "起源の記念碑"
 building_autochthon_monument_plural: "起源の記念碑"
 building_autochthon_monument_desc: "宇宙への第一歩を踏み出した先人たちの記念碑。"
 building_autochthon_monument_effect: "わが帝国が§Yアセンションパーク§!を獲得するごとに、 £unity£ §G1§!を産出する。\n\n"
 building_heritage_site: "遺産区"
 building_heritage_site_desc: "わが帝国とその国民の歴史を記念するために捧げられた地域。"
