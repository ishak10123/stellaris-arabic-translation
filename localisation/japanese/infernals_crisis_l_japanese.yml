 # Megastructure
 galactic_crucible_0: "銀河の坩堝の基礎構造"
 galactic_crucible_0_DESC: "$galactic_crucible_4$の基礎骨格。 ステーション全体の建設を支え、 その指針となる。"
 galactic_crucible_0_MEGASTRUCTURE_DETAILS: "この巨大なステーションは主星からエネルギーを吸い上げ、 自動造船所を稼働させて§Y$entropy_conduit_plural$§!、 すなわち恒星の運命をも作り替える艦艇を生み出す。"
 galactic_crucible_1: "$galactic_crucible_4$外殻"
 galactic_crucible_1_DESC: "中核インフラの完成により、 $galactic_crucible_4$は稼働可能なステーションとなった。 現在、 エントロピー結晶化システムの建設が進行中である。"
 galactic_crucible_2: "$galactic_crucible_4$中枢"
 galactic_crucible_2_DESC: "$galactic_crucible_4$は完全に稼働状態に入り、 §Y$entropy_crystals$§!の展開拡張が可能となった。 今後のすべてのアップグレードはこの基盤の上に築かれることになる。\n\n§Hスペシャルプロジェクトを完了し、 次のステージをアンロックせよ。§!"
 galactic_crucible_3: "$galactic_crucible_4$統制拠点"
 galactic_crucible_3_DESC: "拡張された$galactic_crucible_4$は現在、 シームレスな再構成と拡張を行うモジュラー・エントロピー・システムを備えている。 技術者たちは効率の低下を最小限に抑えつつ、 その出力をさらに高めることができる。"
 galactic_crucible_4: "銀河の坩堝"
 galactic_crucible_4_DESC: "完全武装かつ完全稼働状態となった$galactic_crucible_4$は、 銀河全域にその灼熱の浄化を解き放つ準備が整った。 エントロピー・フラックス・システムは理論上の最大効率に到達している。"
 galactic_crucible_5: "$galactic_crucible_4$研究機関"
 galactic_crucible_5_DESC: "$galactic_crucible_4$は危険なエネルギー出力を防ぐため、 不可逆的な再設計が施された。 これにより、 帝国にとって安定的かつ永続的な繁栄の源泉となるだろう。"
 galactic_crucible_ruined: "荒廃した$galactic_crucible_4$"
 galactic_crucible_ruined_DESC: "滅亡した帝国の灼熱の野望を叶えるために作られた造船所の残骸。"
 galactic_crucible_ruined_MEGASTRUCTURE_DETAILS: "この巨大な遺構はいまもなお、 崩れ落ちた遺跡の間で不規則に脈動する残熱を放っている。"
 SPAWN_CONDUITS: "$entropy_conduit_plural$"
 SPAWN_CONDUITS_DESC: "$galactic_crucible_4$は$entropy_conduit_plural$を自動的に建造する。 完成すれば、 §Y$pc_m_giant_star$§!に変換可能な恒星へと向かうだろう。"
 megastructure_overclocking_desc: "戦略的なオーバークロックを行うことで、 この巨大構造物は標準稼働限界を超え、 特殊な効果を発現させる可能性がある。"
 overclock_mode: "モード："
 overclock_gc_default: "$overclock_mode$§Hデフォルト§!"
 overclock_gc_default_desc: "結晶化エントロピーを安定的かつ適度に供給する。\n"
 overclock_gc_high: "$overclock_mode$§H過充電§!"
 overclock_gc_high_desc: "大量の備蓄エネルギーを投入して、 コンジットの建造を加速する。\n"
 overclock_gc_eco: "$overclock_mode$§H生産§!"
 overclock_gc_eco_desc: "大量の合金を投入することで、 結晶化エントロピーの生産率を高める。\n"
 overclock_gc_war: "$overclock_mode$§H統制センター§!"
 overclock_gc_war_desc: "$galactic_crucible_4$は周辺の艦船に十分な予備エネルギーを供給できるようになり、 防衛艦隊の戦闘力を最大化する。\n"
 # Event Chain
 galactic_hyperthermia_chain_title: "$ap_galactic_hyperthermia$"
 galactic_hyperthermia_chain_desc: "我々は未来を炎で包むことを決意し、 銀河全体に火を放つために動き出した。"
 # Special Projects
 INF_CRISIS_ENTROPY: "新たな力の源"
 INF_CRISIS_ENTROPY_DESC: "炎は昔から我々の社会において重要な役割を果たしてきた。 だが今、 我々はその混沌たる力を新たな方法で制御できるかもしれない。 これは科学者たちが長年夢見てきたもの——現在の文明に燃料を供給するだけにとどまらず、 我々を星々へと飛躍させるエネルギー源となるだろう。\n\n§H効果：§!新たな資源 £entropy_crystals£ §Y$entropy_crystals$§!をアンロックする。"
 INF_CRISIS_ENTROPY_EVIL: "火炎嵐"
 INF_CRISIS_ENTROPY_EVIL_DESC: "坩堝は我々の種族に新たな道を示した。 それを受け入れぬ手はない。 愚か者に同情など不要だ。 今こそ銀河を燃え盛る新たな姿へと作り替え、 我々のビジョンを拒む者は焼き払うのだ。\n\n§H効果：§!\n- §Y$galactic_crucible_4$§!の次段階アップグレードをアンロックする。\n- §Y$entropy_conduit_plural$§!は敵領域の星を変換できるようになる。\n\n" # Crystallized Entropy is used to its full potential
 INF_CRISIS_ENTROPY_GOOD: "予期せぬ相関関係"
 INF_CRISIS_ENTROPY_GOOD_DESC: "坩堝の力は計り知れないが、 不安定でもある。 その能力を恒久的に抑制できれば、 銀河を危険に晒さず、 近隣諸国の好意も失わずに、 我々にとって十分な繁栄源を確保できるだろう。" # Crystallized Entropy can be used for the economy
 # Countdown Situation
 situation_galactic_hyperthermia_timer: "動員"
 situation_galactic_hyperthermia_timer_type: "$situation_galactic_hyperthermia_timer$"
 situation_galactic_hyperthermia_timer_desc: "§Y$entropy_crystals$§!を完全に操れるようになれば、 すみやかに銀河の根本的な変革に着手できる。 我々は銀河核周辺の6つの星系へワームホールを開いた。\nもしそれぞれのワームホールに§Y$entropy_conduit_plural$§!を配備し、 計画に干渉しようとする者から守り抜くことができれば、 銀河そのものを炎で包むことが可能になる。"
 situation_galactic_hyperthermia_timer_monthly_change_tooltip: "銀河の中心部へと放射されているエントロピーの現在のレベル。 ピークに達すると、 銀河は燃え上がる。"
 situation_gh_timer_outcome: "我々の諜報機関の報告によれば、 諸国が我々の計画を阻止すべく戦争の準備を進めている可能性がある。 不意を突かれれば、 事業は始まる前に頓挫するだろう。"
 situation_gh_approach_timer: "降りかかる衝突との対峙"
 situation_gh_approach_timer_tt: "時は来た。 銀河を巻き込む戦争という不可避の衝突がまさに始まろうとしている。"
 situation_gh_difficulty_progress: "難易度"
 situation_gh_opponent_progress: "敵対帝国ごとに§G-0.1§!"
 # Crisis Situation
 situation_galactic_hyperthermia: "銀河の火嵐"
 situation_galactic_hyperthermia_type: "$situation_galactic_hyperthermia$"
 situation_galactic_hyperthermia_monthly_change_tooltip: "銀河全体に火が付く速度。"
 situation_hyperthermia_desc_perp: "§L我々は燃え盛るユートピアを夢見ている。 だがそれを築くためには、 我々の前に立ちはだかるすべてを焼き尽くさねばならない。 最初の火花は灯された。 そして今、 銀河の隅々が消尽するまで炎をあおぎ続けるのだ。§!\n\n$situation_hyperthermia_stats$"
 situation_hyperthermia_desc: "§L§Y[event_target:hyperthermia_empire.GetName]§!は星々に火を放った。 いまこそ、 銀河史上最大の炎に立ち向かわねばならない。 後戻りは許されない。 もし失敗すれば、 これまでに成し遂げてきたすべてが灰となるだろう。§!\n\n$situation_hyperthermia_stats$"
 situation_hyperthermia_stats: "§H中枢星系の掌握：§![event_target:hyperthermia_empire.gh_crisis_core_var]"
 situation_galactic_hyperthermia_outcome: "[GetHyperthermiaOutcome]"
 situation_gh_outcome_perp: "我々が勝利すれば、 火の雨が銀河を焼き尽くし、 灼熱を受け入れた者だけが灰の中に立ち残ることとなるだろう。 星すらも例外ではない。 幾十億年かけて、 我らが母星と同じ姿へと再構築されるのだ。"
 situation_gh_outcome_other: "§Y[hyperthermia_empire.GetName]§!が勝利すれば、 銀河全域は灰燼と化し、 好熱種族のみが生き残る世界が築かれる。"
 situation_galactic_hyperthermia_progress: "§Y$entropy_conduit_plural$§!が掌握する銀河核星系の数によって、 毎月の進行度が決定される。\n$TABBED_NEW_LINE$- 星系数が§Y3§!未満：§R-3§! $TABBED_NEW_LINE$- 星系数が§Y3§!：§Y0§! $TABBED_NEW_LINE$- 星系数が§Y3§!よりも多い：§G+3§! \n\n現在の進行度"
 situation_galactic_hyperthermia_stage1: "最低段階 ($stage_1$) に到達"
 situation_gh_approach_perp: "火に薪をくべよ"
 situation_gh_approach_perp_tt: "今こそその時だ。 我々には勝利しか許されない。 さもなくば、 積み上げてきたすべてが無と化す。"
 situation_gh_approach_other: "炎を消し止めよ"
 situation_gh_approach_other_tt: "この帝国は銀河の安定を根底から脅かす存在だ。 全面的な交戦は、 もはや選択ではなく義務である。"
 # Events
 # NOTE: Remove most #comments below after texts are done
 infernals.1000.name: "新たなる力"
 infernals.1000.desc: "[GetHyperthermiaIntroIfRedGiant]"
 infernals.1000.descNormal: "我々の[GetScientistPlural]は、 エントロピーを高エネルギー結晶構造へと結合することで、 収集、 貯蔵する新たな手法を発見したと報告した。 この§Y$entropy_crystals$§!は、 多量の熱エネルギーを蓄積、 輸送可能であり、 工業、 経済、 恒星間活動のいずれにも応用が可能だ。\n\nシミュレーションによれば、 この技術は惑星を高温気候へとテラフォーミングする手段として、 あるいは恒星を赤色巨星へと加速進化させる手段として用いることもできるという。 理論上は、 銀河全域に散在するエントロピーを回収、 熱変換することで、 銀河規模の熱的膨張を引き起こすことも可能である。\n\n§Hスペシャルプロジェクト発令：§!§Y$INF_CRISIS_ENTROPY$§!"
 infernals.1000.descRedGiant: "我々の[GetScientistPlural]は、 かつて赤色巨星を点火し、 我々の文明を始まる前に終わらせかけた§Y$entropy_crystals$§!を解析した。 今やこの不安定な物質を再設計し、 膨大な熱エネルギーを結合、 輸送して、 工業、 経済、 恒星規模の用途に利用できるようになった。\n\nシミュレーションでは、 惑星の高温環境へのテラフォーミングや、 恒星の赤色巨星化を促進する手段としての応用が示唆されている。 理論上は、 銀河全域に散在するエントロピーを回収、 熱変換することで、 銀河全体を巻き込む熱的膨張を引き起こすことも可能である。\n\n§Hスペシャルプロジェクト発令：§!§Y$INF_CRISIS_ENTROPY$§!" # Intro if you've learned about entropy from the Red Giant Miners
 infernals.1005.name: "結晶化の完了"
 infernals.1005.desc1: "我々は、 エネルギーを収集し§Y$entropy_crystals$§!へと変換する初の実用インフラを完成させた。 この結晶は莫大な熱エネルギーを保持しており、 すでに従来の方法を凌駕する効率で、 産業における電力の貯蔵、 輸送を可能としている。\n\n赤色巨星は、 その広大な放射面と高出力熱量により、 このプロセスに理想的であり、 我々は制圧下のあらゆる星系でテクノロジーの展開を開始できる。\n\n技術者たちは、 環境中のエントロピーを利用して$entropy_crystals$を合成する方法の開発にも着手しており、 産業応用に向けた実験が始まっている。 この新たな経済が動き始めた今、 富と権力が続くのは必然である。 [GetScientistPlural]たちはすでに、 大規模生産体制の確立に向けた研究に取りかかっている。\n\n§H巨大構造物をアンロック：§!§Y$galactic_crucible_0$§!" # Reaching lv1
 infernals.1005.desc2: "既存の§Y$entropy_crystals$§!のサンプルを活用することにより、 母星に危害を加えることなく、 その収集、 合成が可能となった。 この結晶は莫大な熱エネルギーを保持しており、 従来の方法を凌駕する効率で、 産業における電力の貯蔵、 輸送を可能としている。\n\n赤色巨星は、 その広大な放射面と高出力熱量により、 このプロセスに理想的であり、 我々は制圧下のあらゆる星系でテクノロジーの展開を開始できる。\n\n技術者たちは、 環境中のエントロピーを利用して$entropy_crystals$を合成する方法の開発にも着手しており、 産業応用に向けた実験が始まっている。 この新たな経済が動き始めた今、 富と権力が続くのは必然である。 [GetScientistPlural]たちはすでに、 大規模生産体制の確立に向けた研究に取りかかっている。\n\n§H巨大構造物をアンロック：§!§Y$galactic_crucible_0$§!" # Reaching lv1
 infernals.1005.a: "建設を開始せよ。"
 infernals.1005.a.tt: "$constructor$を用いて、 星を囲む形で§Y$galactic_crucible_0$§!を建設する。"
 infernals.1005.b: "ドローンに建設を命じよ。"
 infernals.1005.b.tt: "$constructor$を用いて、 星を囲む形で§Y$galactic_crucible_0$§!を建設する。"
 infernals.1006.name: "好熱性への進化"
 infernals.1006.desc: "我々は銀河を炎で包む道を歩み始めた。 だが我々自身も進化し、 その熱に耐えられるよう備えねばならない。 民衆を高温環境に適応させることは、 灼熱の未来において我々が繁栄する助けとなるだろう。"
 infernals.1006.descRedGiant: "星の変化を逆転させるために懸命に取り組む一方、 我々自身も熱に耐えられるよう備えねばならない。 民を高温環境に適応させることは、 星の灼熱の未来においても繁栄する助けとなるだろう。"
 infernals.1010.name: "$entropy_conduit_plural$の起動"
 infernals.1010.desc: "$galactic_crucible_1$の完成により、 §Y$entropy_conduit_plural$§!の展開が可能となった。 これらは恒星エントロピーを導き増幅するよう設計された自律システムである。 一度起動すれば、 恒星のエネルギー出力を再循環、 増強し、 赤色巨星へと転化させて星系全体を加熱することで、 我が帝国の拡大するインフラを支えることになる。\n\n§Y$entropy_conduit_plural$§!は継続的に生産可能であり、 完全自律稼働のため、 管理の手間も最小限で済む。 現時点では領内での運用にとどまるが、 やがて銀河全域へ広がっていくだろう。 我が帝国の拡大は止まることなどないのだから。\n\n§H巨大構造物のアップグレードが可能：§!§Y$galactic_crucible_2$§!" # Reaching lv2
 infernals.1010.a: "$entropy_crystals$の生産が加速する。"
 infernals.1010.b: "さらに多くの星を征服しなければ。"
 infernals.1015.name: "加熱する炎の行方"
 infernals.1015.desc: "§Y$entropy_crystals$§!の継続的な研究により、 ひとつの戦慄すべき可能性が明らかとなった。 高密度に圧縮されたそれは、 想像を絶する破壊力を持つ武器を駆動し、 惑星をも消し飛ばす可能性があるのだ。 この力をもってすれば、 銀河全体が我らの慈悲にすがることになるだろう。\n\nだが、 こうした軍事応用を追求すれば、 近隣諸国との残された僅かな信頼すら崩壊しかねない。 さらに、 そのような兵器がいずれ我々自身に向けられないという保証もない。\n\nもはや空虚な平和の言葉では不十分だ。 我らの真意を証明するならば、 $galactic_crucible_2$を公然と無力化し、 この兵器が決して生まれぬようにしなければならない。 さもなくば、 このテクノロジーは遅かれ早かれ、 我らか他者の手により兵器化される運命にある。\n\n§Hこの決断によりスペシャルプロジェクトがアンロックされる§!" # Reaching lv3 & decision
 infernals.1015.a: "戦争の炎を煽れ！" # evil path
 infernals.1015.a.desc: "$crisis_hyperthermia_level_4$危機レベルをアンロックする。\n" #\n\n§HIssues Special Project:§! §Y$INF_CRISIS_ENTROPY_EVIL$§!
 infernals.1015.b: "野心を抑えるべきだ。" # good path
 infernals.1015.b.desc: "$crisis_hyperthermia_level_4$危機レベルへの到達を防ぐ。\n\n§Hスペシャルプロジェクト発令：§!§Y$INF_CRISIS_ENTROPY_GOOD$§!により、 §Y$galactic_crucible_2$§!を§Y$galactic_crucible_5$§!に変える。"
 infernals.1020.name: "炎の中へ"
 infernals.1020.desc: "§Y$entropy_crystals$§!と§Y$INF_CRISIS_ENTROPY_EVIL$プロジェクト§!に対する調査は、 疑念を確信へと変えた。 甚大な破壊力を持つ兵器は実現可能だ。 こうした力が我々の手中にある以上、 もはや外交上の体面のために自制する必要はない。\n\n$galactic_crucible_3$の拡張は加速され、 その焦点はより……攻撃的な応用へと絞られるだろう。 この兵器を早期に解禁するほど、 銀河の世論など問題にならなくなる。\n\n§H巨大構造物のアップグレードが可能：§!§Y$galactic_crucible_4$§!" # Finishing special project for evil path
 infernals.1020.a: "戦争に備えなければならない。"
 infernals.1020.a.tt: "- §Y$galactic_crucible_4$§!の拡張を優先せよ。\n- $unlocks_conduit_damage$"
 infernals.1020.b: "我らの敵こそ、 火種となるべき存在だ。"
 infernals.1020.b.tt: "- §Y$galactic_crucible_4$§!の拡張を優先せよ。\n- $unlocks_conduit_damage$"
 infernals.1021.name: "穏やかな輝き"
 infernals.1021.desc: "$galactic_crucible_3$は無事に無力化され、 拡張も、 破壊的用途への転用も不可能となった。 その潜在能力を完全には活かせなくなったのは残念だが、 あの道を進み続けていれば、 破滅と銀河外交の崩壊を招いていただろう。\n\n幸いにも、 限定的な形とはいえ、 $galactic_crucible_5$は今後も強力なエネルギーと繁栄の源であり続ける。 我々は一線を越える前に歩みを止めた。 そしてこの卓越した科学の恩恵を享受しつつ、 銀河共同体と協調していく未来を手にしたのだ。\n\n§H巨大構造物のアップグレードが可能：§!§Y$galactic_crucible_5$§!" # Finishing special project for good path
 infernals.1021.a: "共に歩めば、 すべての者が利益を享受できる。"
 infernals.1021.b: "調和の中に、 繁栄はある。"
 infernals.1025.name: "銀河核を取り囲む星系"
 infernals.1025.desc: "我々の§Y$entropy_conduit_plural$§!と星を赤色巨星へ転化する研究は、 さらに展開規模を拡大し、 銀河核自体を過熱させれば、 銀河全体に熱量の連鎖反応が発生し、 我々にとってより住みやすい環境へと変わっていくことを示唆している。\n\n我々は、 展開拠点として銀河核周辺の6つの星系を特定した。 これらの星系は銀河ハイパーレーン網の外側に位置するが、 安定したワームホールを生成してアクセスを確立するための作業が進行中である。" # Reaching lv4
 infernals.1025.a: "炎の中で生き残れるのは我々だけだ。"
 infernals.1025.a.tt: "他の種族は我々に抵抗するだろう。 銀河戦争に備えよ。"
 infernals.1025.b: "銀河全体が調和の炎に燃え上がるだろう。"
 infernals.1025.b.tt: "他の種族は我々に抵抗するだろう。 銀河戦争に備えよ。"
 infernals.1030.name: "点火へのレース"
 infernals.1030.desc: "$galactic_crucible_4$は完全に武装完了し、 稼働状態にある。 ワームホール・トンネルの完成により、 我々は銀河核を取り囲む6つの展開星系へのアクセスを確保した。\n\n核の過熱作業は開始可能だ。 他の帝国が我々の動きを察知し、 これらの星系への侵入を試みるかもしれないが、 現時点では我々が優位にあり、 銀河核は我々の手中にある。\n\n§Hワームホールを用いて、 銀河核星系を掌握せよ§!" # Reaching lv5, lanes open in 3 years!
 infernals.1030.a: "銀河核星系への配備を開始せよ。"
 infernals.1030.a.tt: "銀河核の6つの星系に§Y$entropy_conduit_plural$§!を展開すれば、 銀河全体を一斉に過熱できる。 準備を開始せよ。"
 infernals.1030.b: "我々の未来は炎と共に輝く。"
 infernals.1030.b.tt: "$infernals.1030.a.tt$"
 infernals.1035.name: "銀河火災警報"
 infernals.1035.desc: "敵対帝国が、 銀河核近辺にある我々の展開拠点へのハイパーレーンを強行的に開通させた。 核の過熱を引き続き行っていくにあたり、 抵抗に備える必要がある。\n\nだが、 我々は決して止まることはない。 冷たく暗い宇宙は一掃され、 我々の昇りゆく未来の灼熱の栄光に取って代わられるだろう。"
 # core is now connected with the galaxy!
 infernals.1035.a: "我々を消し去ることなどできない。"
 infernals.1035.b: "すべてを焼き尽くす炎に、 奴らを投げ込め。"
 infernals.1040.name: "迫り来る嵐"
 infernals.1040.desc: "銀河核が蠢きはじめた。 超大質量ブラックホール周辺のエントロピーレベルが急上昇し、 近隣星系へ熱放射の波が広がっている。\n\n混乱が広がりかけた時、 多くの惑星から集められた勇敢な科学者チームが、 核を取り囲む6つの星系へ接続するハイパーレーンが新たに形成されているのを発見した。 これらの星系には§Y[hyperthermia_empire.GetName]§!が運用する施設が存在し、 銀河核を激しく過熱している。 この無謀な行為は、 銀河全体に連鎖的な火嵐を引き起こす恐れがあり、 阻止しようとして失敗すれば焼き尽くされるだろう。\n\n生き残るためには、 これらの星系に侵入し、 支配権を取り返さねばならない。 危機はすでに到来しており、 温度もまた、 上昇を続けている。" # other empires learn about the core, forming a coalition war
 infernals.1040.a: "阻止しなければ！" # generic reply (declares war)
 infernals.1040.a.tt: "§L未曾有の規模の危機が我々の銀河を飲み込もうとしている。 我々を救えるのは、 新たに結成される連合の団結力だけだ。§!\n\n我々はこの危機に反意を唱える帝国の§Y連合§!を結成し、 §Y[hyperthermia_empire.GetName]§!に§R宣戦布告§!する。 銀河規模の武力衝突が引き起こされる。"
 infernals.1040.b: "燃えてしまえ、 弱者め！" # Genocidals reply
 infernals.1040.b.tt: "§L危機の際、 各種族は自力で生き抜くほかない。 我々には単独でこの事態を解決する力がある。§!"
 infernals.1040.c: "彼らも我々と同じだ。" # Infernals reply
 infernals.1040.c.tt: "§L§Y[hyperthermia_empire.GetName]§!の手法は、 我々が描く生まれ変わった銀河像と方向性が一致している。 それを考えれば、 これは他の者がいうほどの災厄ではないかもしれない。§!"
 infernals.1040.d: "知ったことではない。" # neutral reply
 infernals.1040.d.tt: "§L火遊びする帝国など珍しくもない。 この動乱はやがて収まるだろう。 我々が関与するほどの理由はない。§!"
 infernals.1042.name: "激化：§R危機宣言§!"
 infernals.1042.desc: "歴史において、 偉大な変革には常に犠牲が伴った。 だが、 銀河共同体は我々の行為を必然ではなく脅威とみなしている。 そして、 統合した軍事同盟が我々と対峙するために動員を行った。\n\n彼らは殲滅を目標として掲げており、 我々にはもはや選択の余地がない。 銀河核や$galactic_crucible_4$へ接近するいかなる試みも、 圧倒的な力で迎え撃たれるだろう。\n\n我々のビジョンは星そのものに火を灯した。 これに反対する者は、 我々が呼び寄せた嵐と対峙することになる。\n\n§H銀河核星系を守り抜ければ、 勝利は確実だ！§!"
 infernals.1042.a: "結果は必然である。"
 infernals.1043.name: "戦闘準備：§R危機宣言§!"
 infernals.1043.desc: "銀河核で高まる脅威を受け、 銀河共同体は§Y[hyperthermia_empire.GetName]§!に対する統一対応を発動した。 彼らの銀河の温度を上昇させようとする過激な試みは、 既知のすべての生命を危険に晒している。\n\nもしこの野望が放置されれば、 数えきれぬ文明が滅亡の瀬戸際に立たされるだろう。 いわゆる§Y[hyperthermia_empire.GetName]§!は、 必要性に駆られて結束した連合と正面から対立している。\n\n戦いはすでに開始されており、 数兆もの生命の存亡がかかっている。\n\n§H銀河核星系を奪取せよ、 さもなくばすべては失われる！§!"
 infernals.1043.a: "艦隊を動員せよ！"
 infernals.1045.name: "時間との戦い"
 infernals.1045.desc1: "連鎖的な火嵐が起きようとしている。 銀河核はまもなく爆発し、 敵を焼き尽くし、 星々に対する我々の支配を確立するだろう。\n\nしかし、 銀河は我々の燦然たる未来を受け入れようとはしない。 新たに作られたハイパーレーンを通じて、 彼らは展開拠点へ侵攻し、 我々の築き上げたものを覆そうと画策している。 何のために？  彼らの冷たく停滞した暗闇を守るためか？\n\n我々は干渉を許すわけにはいかない。 銀河核で防線を維持し、 火嵐が燃え上がり敵を灰にするまで持ちこたえねばならない。" # last stage of global situation - crisis
 infernals.1045.desc2: "銀河核はますます高熱化している。 §Y[hyperthermia_empire.GetName]の§!の星々への点火に対する狂信的執着がその原動力だ。 このままでは、 火嵐はあらゆる抵抗勢力を殲滅し、 ほとんどの生命を銀河から一掃してしまうだろう。\n\n彼らは理性で説得できない。 我々が生き延びるには、 火の源、 つまりあの力が最も強く燃え盛る銀河核星系に打撃を与えねばならない。 §Y[hyperthermia_empire.GetName]§!を止めるにはそれしかない。\n\n銀河全体の運命が今、 ここに懸かっている。 §Y[hyperthermia_empire.GetName]§!に、 火遊びをすれば炎の報いを受けると思い知らせてやるのだ。" # last stage of global situation - others
 infernals.1045.a: "防線を守れ。"
 infernals.1045.a.tooltip: "勝利のために、 6つの銀河核星系の支配を維持しなければならない。"
 infernals.1045.b: "奴らを永遠に葬り去れ。"
 infernals.1045.b.tooltip: "6つの銀河核星系を攻撃し、 §Y[hyperthermia_empire.GetName]§!のコンジットを破壊しなければならない。 さもなくば我々は焼き尽くされる。"
 infernals.1055.name: "銀河は我々のものだ！"
 infernals.1055.desc: "我々は銀河中心から最果ての星々まで、 勝利の炎を焚き広げた。 火嵐は我らの敵を灰へと還した。 彼らには我々が宣言した栄光ある未来を受け入れる視野も勇気も欠けていた。 銀河は我々のものだ。\n\nこの炎と怒りの新秩序において、 惑星は溶岩と光で沸騰し 、赤色巨星の膨張する熱に照らされる。 エントロピーはあらゆる星系を駆け巡り、 我々はそれを収穫し、 意のままに操る。 日ごとに我が帝国は富と力を増し、 もはや止めることなどできない。\n\n我々は銀河を貪り、 虚空における支配の炎の灯台へと作り変えた。 そしていつの日か、 他の銀河すらも薪の上に焚べるかもしれない。" # crisis won
 infernals.1055.a: "この新たな銀河は我々の手中にある。"
 infernals.1055.b: "やがてすべての炎は1つとなるだろう。"
 infernals.1055.c: "我々の炎の住処に、 腰抜けの弱者は不要だ。" #Scorched world heralds (genocidal Infernal)
 infernals.1055.d: "我々の忍耐はついに報われた。" #Infernal Fire Cult
 infernals.1055.e: "遂に、 この銀河から冷たき闇を追放した。" #Other Infernals
 infernals.1055.f: "遂に、 惨めな我々の敵は灰と化した。" #Generic Genocidal
 infernals.1052.name: "$galactic_crucible_4$の確保"
 infernals.1052.desc: "§H[crucible_system.GetName]§!星系を掌握したことで、 我々の部隊は当地の恒星を取り囲むように建造中だった$galactic_crucible_4$をも支配下に置くことができた。\n\nこの巨大構造物の喪失は、 これを作り上げ、 力によって銀河を制圧しようとしていた者たちに残されていた希望を粉々に打ち砕いた。"
 infernals.1052.a: "破壊しろ！"
 infernals.1052.a.tt: "§Y$galactic_crucible_4$§!は修復不能なまでに破壊される。"
 infernals.1052.b: "利用できそうだ。"
 infernals.1052.b.tt: "§Y$galactic_crucible_4$§!を§Y$galactic_crucible_5$§!に転用し、 $r_alloys$を生産する。"
 infernals.1053.name: "$galactic_crucible_4$の確保"
 infernals.1053.desc: "§H[crucible_system.GetName]§!星系を掌握したことにより、 §H[crucible_builders.GetName]§!の邪悪な計画が明るみに出た。 その計画には、 かつてない炎の嵐を発生させ、 銀河全体を完全に壊滅させるという構想も含まれていた。\n\n幸いにも、 現時点では大量絶滅を引き起こす可能性を秘めたその装置は一時停止されている。 戦争が終わり次第、 残された資源と力を結集して、 この巨大構造物を永久に無力化すべきだ。"
 infernals.1053.a: "戦争を速やかに終わらせねばならない！"
 infernals.1053.b: "興味深い構造物だ。"
 infernals.1056.name: "銀河の再生"
 infernals.1056.desc: "銀河を炎に包む火花を発生させようと我々が奔走している間に、 §Y[hyperthermia_empire.GetName]§!はすでに恒星を兵器へと転用し、 銀河を永遠に作り変えてしまった。\n\n現状では、 我々はこの新たに創造されたユートピアを受け入れることができる。 だが、 かの帝国が銀河の掌握を強めるなか、 次の動きを厳重に監視するべきだろう。"
 infernals.1056.a: "強大な力は紛争を招く。"
 infernals.1056.b: "新たな脅威が現れた。"
 infernals.1056.c: "驚くべき展開だ。"
 # Relic
 r_crystallized_singularity: "結晶化した特異点"
 r_crystallized_singularity_desc: "燃え盛る銀河に歪められたこの特異点は、 魅惑的な熱をほとばしらせている。 慎重に封印しない限り、 説明のつかない力で巡礼者を惹きつけ、 最も荒涼とした惑星にさえ誘い寄せるだろう。 その前に立つ者は、 より単純な人生……炎に一層近い生活を受け入れざるを得ないという衝動に駆られる。"
 r_crystallized_singularity_effect_tt: "\n- 我々の £physics_research£ §Y$physics_research$§!の収入の§G10%§!が、 同時に$r_energy$を生み出すようになる。"
 r_crystallized_singularity_ls_effect_tt: "- 入植可能な惑星で、 ディシジョン「§Y$decision_gh_life_seeding$§!」がアンロックされ、 新たな原始文明を作ることができるようになる。"
 crystallized_singularity_mod: "$r_crystallized_singularity$"
 crystallized_singularity_mod_desc: "$r_crystallized_singularity_desc$"
 decision_gh_life_seeding: "命の種まき"
 decision_gh_life_seeding_desc: "銀河の再構築が成功したことは、 多くの惑星に存在した種族の急速な消滅を招いてしまった。 今、 我々が思い描く生命を再創造することこそ我々の特権である。"
 decision_gh_life_seeding_limit: "$TRIGGER_FAIL$§Rこの惑星にはすでに原始文明が存在する。§!"
 decision_gh_life_seeding_colony: "$TRIGGER_FAIL$§R植民地のある星系では実行できない。§!"
 decision_gh_life_seeding_effect: "我々の姿に似せた原始文明を創出する。\n\n§H発動上限：§![from.gh_life_seeder_var]／3"
 # Grand Archive Specimen
 infernal_burning_gem: "灼熱の宝石"
 infernal_burning_gem_desc_short: "[GetName]のエントロピーを活用しようとする試みの過程で作られた初期の実働プロトタイプの1つ。"
 infernal_burning_gem_desc_details: "ほとんどの視覚システムでは一見薄暗く見えるこの結晶の欠片が放つかすかな白いきらめきは、 途方もないエネルギーが辛うじて封じ込められていることを物語っている。 新しい手法に取って代わられることがあっても、 その構造と特性にはなお学ぶべきことが多い。"
 # Timeline
 TIMELINE_EVENT_GH_START: "火嵐\n§L[GetDate]§!"
 TIMELINE_EVENT_GH_START_TOOLTIP: "§H危機になる§!\n§Y危機イベント§!\n\n[EVENT_TARGET_0.GetName]はその支配に火をつけ、 銀河の運命を掌握しはじめた。 このビジョンを共有しない者は、 征服の炎の奔流に呑み込まれ、 ただ灰だけが残るだろう。"
 TIMELINE_EVENT_GH_END: "すべてを喰らい尽くす炎\n§L[GetDate]§!"
 TIMELINE_EVENT_GH_END_TOOLTIP: "§H銀河の敗北§!\n§Y危機イベント§!\n\n燃え盛る野望として始まったものが、 やがて銀河を燃やす火花となった。 我々に抵抗した者たちは、 その歴史ごと灰燼に帰した。"
