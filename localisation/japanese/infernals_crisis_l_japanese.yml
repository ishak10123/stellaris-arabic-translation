l_japanese:
 # Ascension Perk
 ap_galactic_hyperthermia: "銀河の超高温化"
 ap_galactic_hyperthermia_desc: "炎の中に生まれた宇宙は今や、 冷えきった暗黒と敵意の領域へと変わり果てている。 我々が繁栄するためには、 再び銀河の熱を高めねばならない。 たとえ他のすべてが滅びるとしても。"
 must_be_infernals: "$TRIGGER_FAIL$人口が好熱種族で構成されている必要がある。"
 # UI
 entropy_crystals: "結晶化したエントロピー"
 entropy_crystals_name: "$entropy_crystals$："
 entropy_crystals_value: "£entropy_crystals£ $VAL|0$"
 entropy_crystals_gaining: "§H危機目標§!を達成すると、 さらなる £entropy_crystals£ §Y$entropy_crystals$§!が手に入る。"
 entropy_crystals_desc: "この鋭く輝く原始エネルギーの結晶構造はある程度安定しているため、 燃料として輸送したり、 装備に組み込んだりすることならできる。"
 mod_country_base_entropy_crystals_produces_add: "月間£entropy_crystals£ $entropy_crystals$"
 entropy_crystals_crisis_objective: "$menace_crisis_objective$"
 entropy_crystals_crisis_objective_gained: "£entropy_crystals£を獲得"
 entropy_crystals_crisis_objective_reward: "$REWARD$"
 entropy_crystals_crisis_objective_progress: "この危機目標から £entropy_crystals£ $AMOUNT$を獲得した。"
 entropy_crystals_crisis_level_locked: "アンロックには次のレベルが必要：\n" # remove?
 entropy_crystals_crisis_level_unlocked: "$LEVEL$で報酬を得られる：\n"
 entropy_crystals_crisis_level_desc: "危機レベルを上げるには、 $entropy_crystals$を集めたり、 §Y$galactic_crucible_4$§!を建設したりする。"
 entropy_crystals_crisis_level_unlock: "£entropy_crystals£ §Y$CURRENCY$§!$entropy_crystals$を保有"
 entropy_crystals_current_value: "現在の価値：§Y$VALUE|0$§!"
 entropy_crystals_crisis_description_title: "$ap_galactic_hyperthermia$"
 entropy_crystals_crisis_description: "$menace_crisis_description_intro$\n\n新たなエネルギー操作技術により、 我々の力は飛躍的に高まるだろう。 この時代に火を灯すには、 星そのものの炎を制御せねばならない。"
 entropy_crystals_crisis_howto_title: "力の源泉"
 entropy_crystals_crisis_howto: "§H危機目標§!を追求することで £entropy_crystals£ §H$entropy_crystals$§!を獲得できる。 これを用いて$galactic_crucible_4$をアップグレードし、 次の危機レベルをアンロックすることが可能となる。"
 # Level
 crisis_hyperthermia_already_ongoing: "別の帝国がすでに銀河核の支配権の掌握を進めている。"
 crisis_hyperthermia_already_happened: "別の帝国がすでに銀河核の支配権を掌握し、 銀河の姿を作り変えてしまった。"
 crisis_hyperthermia_level_1: "§R懸念事項§!"
 crisis_hyperthermia_level_1_desc: "$crisis_level_1_desc$"
 crisis_hyperthermia_lv1_tt: "£trigger_yes£ 完了済みのスペシャルプロジェクト§Y$INF_CRISIS_ENTROPY$§!がある"
 crisis_hyperthermia_lv1_req_tt: "£trigger_no£ 完了済みのスペシャルプロジェクト§Y$INF_CRISIS_ENTROPY$§!がある"
 crisis_hyperthermia_level_2: "§Rリスク§!"
 crisis_hyperthermia_level_2_desc: "$crisis_level_2_desc$"
 crisis_hyperthermia_lv2_tt: "£trigger_yes£ 建設済みの巨大構造物§Y$galactic_crucible_0$§!があり、 §Y$galactic_crucible_1$§!にアップグレード済み"
 crisis_hyperthermia_lv2_req_tt: "£trigger_no£ 建設済みの巨大構造物§Y$galactic_crucible_0$§!があり、 §Y$galactic_crucible_1$§!にアップグレード済み"
 crisis_hyperthermia_level_3: "§R危険§!"
 crisis_hyperthermia_level_3_desc: "$crisis_level_3_desc$"
 crisis_hyperthermia_lv3_tt: "£trigger_yes£ 巨大構造物§Y$galactic_crucible_1$§!をアップグレード済み"
 crisis_hyperthermia_lv3_req_tt: "£trigger_no£ 巨大構造物§Y$galactic_crucible_1$§!をアップグレード済み"
 crisis_hyperthermia_level_4: "§R厄災§!"
 crisis_hyperthermia_level_4_desc: "$crisis_level_4_desc$"
 crisis_hyperthermia_lv4_tt: "£trigger_yes£ 巨大構造物§Y$galactic_crucible_2$§!をアップグレード済み"
 crisis_hyperthermia_lv4_req_tt: "£trigger_no£ 巨大構造物§Y$galactic_crucible_2$§!をアップグレード済み"
 crisis_hyperthermia_dec_lv4_tt: "£trigger_yes£ 完了済みのスペシャルプロジェクト§Y$INF_CRISIS_ENTROPY_EVIL$§!がある"
 crisis_hyperthermia_lv4_dec_req_tt: "£trigger_no£ 完了済みのスペシャルプロジェクト§Y$INF_CRISIS_ENTROPY_EVIL$§!がある"
 crisis_hyperthermia_level_5: "§R存亡に関わる脅威§!"
 crisis_hyperthermia_level_5_desc: "$crisis_level_5_desc$"
 crisis_hyperthermia_lv5_tt: "£trigger_yes£ 巨大構造物§Y$galactic_crucible_3$§!をアップグレード済み"
 crisis_hyperthermia_lv5_req_tt: "£trigger_no£ 巨大構造物§Y$galactic_crucible_3$§!をアップグレード済み"
 # MPerks Level 1
 menp_hyperthermia_crystals: "$entropy_crystals$"
 menp_hyperthermia_crystals_desc: "§Y$entropy_crystals$§!は、 制御されたエネルギー不安定化における画期的な突破口を示している。 この不安定な資源を自在に操ることができれば、 銀河の秩序そのものを再構築することができるだろう。"
 unlocks_entropy_objectives: "§H危機目標§!を完遂することにより、 £entropy_crystals£ §Y$entropy_crystals$§!を得られるようになる。"
 menp_hyperthermia_harnessing: "エントロピー制御"
 menp_hyperthermia_harnessing_desc: "§Y$entropy_crystals$§!の合成を産業に統合することで、 この不安定な資源をより効率的に利用できるようになった。 これにより、 我々の技術開発方針と戦略的目標を一致させることができる。"
 unlocks_entropy_edict: "§H布告をアンロック：§!$edict_entropy_harnessing$"
 menp_hyperthermia_crucible: "銀河の坩堝"
 menp_hyperthermia_crucible_desc: "提案されているこの坩堝は、 恒星のエントロピーを制御するための中枢エンジンとして機能するだろう。 結晶化と輸送を可能にすることで、 この坩堝は我々の灼熱の力を象徴する灯となり、 その力を銀河の星々へと行き渡らせるだろう。"
 unlocks_galactic_crucible: "§H巨大構造物をアンロック：§!$galactic_crucible_0$"
 # MPerks Level 2
 menp_hyperthermia_conc_entropy: "濃縮エントロピー"
 menp_hyperthermia_conc_entropy_desc: "この段階において、 $entropy_conduit_plural$は我々の力を拡大するために不可欠である。 坩堝の出力を増強すれば、 我々はより明るく、 より燃え盛る未来へと進むことができるだろう。"
 unlocks_conduit_spawn: "§H$UNLOCKS_SHIP_TYPE$：§!$entropy_conduit$\n- §Y$entropy_conduit_plural$§!が§Y$galactic_crucible_4$§!によって自動で作成され、 近くの星系へ移動する。\n- 対象の星系内の植民地がボーナスを得る。\n- £ship_xl_slot£ §Y$LENS_FLARE_BEAM$§!の武器で武装し、 命中すると数日間敵を無力化する。\n\n"
 menp_hyperthermia_radiant: "輝ける野望"
 menp_hyperthermia_radiant_desc: "銀河に火を点ける火花である我々には、 迷いや官僚制度に費やす時間はない。 無数の星系を作り替えるために時間を浪費する余裕はないのだ。 目標を達成するには、 建設能力を劇的に増強せねばならない。"
 menp_hyperthermia_ignition: "強制点火"
 menp_hyperthermia_ignition_desc: "単に出力を上げるだけでは不十分なことがある。 我々はテクノロジーを次の段階へ引き上げ、 その潜在能力を余すところなく活用する必要がある。 今こそ安全装置を最小限にし、 出力を最大化するときだ。"
 unlocks_crucible_overclocking: "§H巨大構造物§!§Y$galactic_crucible_1$§!の「オーバークロック」が可能になる。"
 # MPerks Level 3
 menp_hyperthermia_cruiser: "$ember_cruiser$"
 menp_hyperthermia_cruiser_desc: "最先端テクノロジーを備えたこれらの艦艇は、 不安定な熱流を指向性の消滅エネルギーへと変換し、 対峙する敵を灰に変える。"
 unlocks_ember_cruiser: "§H$UNLOCKS_SHIP_TYPE$：§!$ember_cruiser$"
 menp_hyperthermia_flames: "すべてを呑み込む炎"
 menp_hyperthermia_flames_desc: "我々が描くユートピアでは、 我々の目的に反対することは許されない。 我々を阻もうとする者は、 母星が火の雨の報復を受けることを、 すぐに知ることになるだろう。"
 unlocks_firestorm_stance: "§Hテラフォーミングをアンロック：§!$pc_volcanic$\n§H爆撃方針をアンロック：§!$bombardment_firestorm$\n\n"
 menp_hyperthermia_coronal: "コロナ放出"
 menp_hyperthermia_coronal_desc: "我々の$entropy_conduit_plural$は現在、 安定を保つために莫大な熱を放散している。 その熱を周囲の空間へ放出すれば、 $entropy_conduit_plural$を敵に対する壊滅的な兵器へと転用できるだろう。"
 unlocks_conduit_damage: "§Y$entropy_conduit_plural$§!は、 敵対する艦船およびステーションに自動的にダメージを与える。\n\n"
 # MPerks Level 4
 menp_hyperthermia_reactors: "ヘリオ融合炉"
 menp_hyperthermia_reactors_desc: "軍事技術に§Y$entropy_crystals$§!を組み込むことで、 比類のない推進システムが実現する。 我々の艦船は、 かつてない勢いで宇宙を駆け巡るだろう。"
 menp_hyperthermia_solarflare: "人工太陽フレア"
 menp_hyperthermia_solarflare_desc: "かつて銀河の一部は、 我々の手の届かぬ領域にあった。 だがその幻想も終わりを告げようとしている。 間もなく、 無数の $entropy_conduit_plural$ が星々を埋め尽くし、 我々に逆らう者すべてに確実に破壊をもたらすだろう。"
 unlocks_conduit_borders: "§Y$entropy_conduit_plural$§!は自動的に敵領へ侵入する。\n\n"
 menp_hyperthermia_armada: "炎の艦隊"
 menp_hyperthermia_armada_desc: "銀河が我々に対抗して集結するにつれ、 動員は不可欠となる。 すべての市民は今やエネルギー戦線を支え、 我々の覇権の炎を扇ぐために貢献せねばならない。"
 unlocks_blazing_navalcap: "§Y[GetAlloyProducerPlural]§!と§Y[GetResearcherPlural]§!は £navy_size£ §Y$MOD_COUNTRY_NAVAL_CAP_ADD$§!を増加させる。\n\n"
 # MPerks Level 5
 menp_hyperthermia_battleship: "$ember_battleship$"
 menp_hyperthermia_battleship_desc: "この大型艦艇は、銀河を飲み込む火嵐のように熱を帯びた砲身を備え、 坩堝周辺の防衛部隊の中核を成す。"
 unlocks_ember_battleship: "§H$UNLOCKS_SHIP_TYPE$：§!$ember_battleship$\n- £ship_xl_slot£ §Y$LENS_FLARE_BEAM$§!の武器を装備可能。"
 menp_hyperthermia_critical_mass: "臨界質量"
 menp_hyperthermia_critical_mass_desc: "恒星の外層でのエントロピー活動を増大させると、 恒星から大量の放射線が放出される。 その結果、 星系全体がより急速に加熱されていく。"
 unlocks_conduit_boost: "§Y$entropy_conduit_plural$§!は、 支配下に置いた星系の数に応じて強化される。\n\n$hyperthermia_map_perc$\n\n"
 hyperthermia_map_perc: "銀河の§G20%§!：$TABBED_NEW_LINE$- $entropy_conduit_plural$は周辺の植民地を荒廃させる $TABBED_NEW_LINE$- 被害を受けた植民地では、 £pop£ $POP$が徐々に失われる $TABBED_NEW_LINE$- この効果は§Y好熱種族§!以外の帝国にのみ適用される $TABBED_NEW_LINE$- 必要な星系：§Y[root.hyperthermia_own_systems_var]§!／§Y[root.hyperthermia_systems_var]§!"
 menp_hyperthermia_ammunition: "エントロピー弾薬"
 menp_hyperthermia_ammunition_desc: "弾薬設計の改良により、 標準的な兵装に小型のエントロピー・コアが組み込まれた。 着弾時に不安定化した熱衝撃を放出するため、 破壊力が著しく向上している。"
 # Misc
 entropy_crystals_deficit: "$entropy_crystals$不足"
 edict_entropy_harnessing: "エントロピー制御"
 edict_entropy_harnessing_desc: "$entropy_crystals$の生産をインフラに統合することで、 我々の技術力を最大限に活用し、 この不安定な新資源の潜在力をすべて引き出せるようになった。"
 mod_planet_technician_entropy_crystals_produces_add: "£job_technician£ [GetTechnician]からの £entropy_crystals£ §Y$entropy_crystals$§!"
 mod_shipsize_ember_cruiser_weapon_damage: "$MOD_SHIP_WEAPON_DAMAGE$ ($ember_cruiser$)"
 mod_shipsize_ember_battleship_weapon_damage: "$MOD_SHIP_WEAPON_DAMAGE$ ($ember_battleship$)"
 mod_conduit_spawnrate_add: "£time£ $entropy_conduit$建設時間"
 mod_conduit_spawnrate_switch: "$entropy_conduit$の建設：§R無効§!"
 mod_conduit_spawnrate_switch_short: "§R$entropy_conduit$の建設を無効化§!"
 mod_shipsize_ember_cruiser_speed_mult: "$MOD_SHIP_SPEED_MULT$ ($ember_cruiser$)"
 mod_shipsize_ember_battleship_speed_mult: "$MOD_SHIP_SPEED_MULT$ ($ember_battleship$)"
 ENTROPY_WORMHOLE: "$NATURAL_WORMHOLE_GALACTIC$"
 BYPASS_ENTROPY_WORMHOLE: "$ENTROPY_WORMHOLE_GALACTIC$"
 BYPASS_DESC_UNKNOWN_ENTROPY_WORMHOLE: "我々はこのような形成物を見たことがない。"
 ENTROPY_WORMHOLE_GALACTIC: "奇妙なワームホール"
 ENTROPY_WORMHOLE_DESC: "この星系には、 $DEST|Y$へと通じる§Yワームホール§!が存在する。"
 ENTROPY_WORMHOLE_DESC_UNEXPLORED: "この星系には§R未探索§!の§Yワームホール§!が存在する"
 ENTRY_BYPASS_ENTROPY_WORMHOLE: "$BYPASS_TYPE$"
 EXIT_BYPASS_ENTROPY_WORMHOLE: "$BYPASS_TYPE$出口"
 personality_hyperthermia_empire: "熱導帝制"
 personality_hyperthermia_empire_desc: "熱導帝国は、 エネルギー、 エントロピー、 恒星の炎を崇める理念によって統治されている。 彼らは征服するのではない──焼き尽くし、 意志と熱によって銀河を彫刻するのだ。"
 triggered_opinion_hyperthermia_empire: "$personality_hyperthermia_empire$帝国"
 mod_job_metallurgist_naval_cap_add: "£job_foundry£ [GetAlloyProducer]職業枠からの £mod_country_naval_cap_add£ $MOD_COUNTRY_NAVAL_CAP_ADD$"
 crisis_thermophile_adaptation: "好熱性への適応"
 crisis_thermophile_adaptation_desc: ""
 crisis_conduit_stop: "$mod_conduit_spawnrate_switch$" # modifier is hidden
 crisis_conduit_stop_desc: ""
 sm_gravitational_centrifuge: "重力遠心炉"
 sm_gravitational_centrifuge_desc: "この構造物は、 強力な重力勾配を利用して廃棄物を分子レベルで分解し、 エントロピープラズマへと変換する。 生成されたプラズマは結晶化され、 さらなる用途に供される。"
 gravitational_centrifuge_tt: "危機目標「§H$crisobj_entropy_starbase_name$§!」が完了する"
 requires_multiple_stars_or_or_bh: "§R§Y2連星§!、 §Y3連星§!の星系、 または§Y$pc_black_hole$§!のいずれかが必要。§!"
 # Conduit Starforming
 crisis_conduit_buff: "恒星の監視"
 crisis_conduit_buff_desc: "この星系の恒星の大気は急速な変化を遂げており、 星系全体に灼熱の太陽フレアが次々と降り注いでいる。 他者にとっては破滅的な現象だが、 我々にとっては繁栄に最適な環境である。"
 TERRAFORM_ORDER: "恒星を変換"
 TERRAFORM_ORDER_DESC: "対象の恒星を、 ゆるやかに§Y$pc_m_giant_star$§!へと変化させる。"
 TERRAFORM_ORDER_RESEARCH: "結晶化したエントロピーの複合エネルギーを利用すれば、 小規模な星をも巨大な赤色巨星へと成長させることが可能だ。"
 FLEETORDER_TERRAFORM_BUTTON: "$TERRAFORM_ORDER$"
 FLEETORDER_TERRAFORM: "$PLANET|Y$を構築中 ($PROGRESS|Y%0$)"
 FLEETORDER_BOOST_STAR: "星を点火"
 CAN_NOT_TERRAFORM_STAR: "$TRIGGER_FAIL$主星でなければならない。"
 CAN_NOT_CRISIS_TERRAFORM_STAR_CLASS: "$TRIGGER_FAIL$変換に適さない恒星クラス。"
 CAN_NOT_CRISIS_TERRAFORM_STAR_MEGASTRUCTURE: "$TRIGGER_FAIL$軌道上の巨大構造物が変換を妨げている。"
 VALID_TERRAFORM_STAR: "星はテラフォーミング可能。"
 STATION_CAN_NOT_TERRAFORM_STAR: "コンジットステーションが軌道上に存在している必要がある。"
 # Objectives
 crisobj_own_volcanics_name: "火山型惑星の保有"
 crisobj_own_volcanics_desc: "星系の熱上昇は火山活動を活発化させており、 我々の炎の使命を推し進めるには理想的だ。 先んじるためには、 §Y火山型惑星§!の入植を優先すべきだ。\n\n毎年、 保有する§Y$pc_volcanic$§!植民地の数に応じて、 受動的に§Y$entropy_crystals$§!を獲得する。"
 crisobj_create_volcanics_name: "火山型惑星の創造"
 crisobj_create_volcanics_desc: "銀河中に惑星火山活動を拡散させることで、 我々のエントロピー結晶経済を活性化できる。 適切なテラフォーミング技術を用いれば、 望む場所で持続的な火山活動を引き起こすことができる。\n\n惑星を§Y$pc_volcanic$§!にテラフォーミングする。"
 crisobj_own_red_stars_name: "赤色星の保有"
 crisobj_own_red_stars_desc: "我々は赤色星周辺の星系の入植を優先すべきだ。 その広大な放射面は、 熱エネルギーの収集に理想的である。\n\n自国領内の§Y$pc_m_star$§!または§Y$pc_m_giant_star$§!の数に応じて、 毎月§Y$entropy_crystals$§!を受動的に獲得する。"
 crisobj_create_red_stars_name: "赤色星の創造"
 crisobj_create_red_stars_desc: "エントロピー結晶を注ぎ込むことで、 星を膨張させ赤色巨星へと変化させることができる。 それは、 我々の燃え盛る新たな帝国の礎となるだろう。\n\n§Y$entropy_conduit_plural$§!によってテラフォーミングされた星は§Y$pc_m_giant_star$§!へと変化する。"
 crisobj_planet_firestorm_name: "惑星放火"
 crisobj_planet_firestorm_desc: "我々の覇権の真意を教える時が来た。 火嵐による砲撃で敵の惑星を灰燼に帰すのだ。\n\n§Y$bombardment_firestorm$§!を用いて植民地を砲撃し、 §R100%壊滅させよ§!。"
 crisobj_lens_beam_impact_name: "艦船の粉砕"
 crisobj_lens_beam_impact_desc: "冷涼で温和な惑星は我々の目的に適わない。 惑星の表面を溶かし、 適した形へと変えねばならない。\n\n§Y$entropy_conduit_plural$§!と§Y$ember_battleship_plural$§!に搭載された £ship_xl_slot£ §Y$LENS_FLARE_BEAM$§!の武器を用い、 敵惑星を砲撃せよ。"
 crisobj_entropy_starbase_name: "重力遠心炉の保有"
 crisobj_entropy_starbase_desc: "重力遠心炉は我々の$entropy_crystals$収集を促進する。\n\n§Y2連星§!、 §Y3連星§!または§Y$pc_black_hole$§!を含む星系に、 星系基地建造物、 §Y$sm_gravitational_centrifuge$§!を建設せよ。"
 # Ships
 NAME_Ember_Cruiser: "フィエリー・デヴァステイター"
