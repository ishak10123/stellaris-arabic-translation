 opinion_smuggled_pops: "POPが奪われた！"
 #Disconnected Drones #
 disconnected_drones_name: "$policy_disconnected_drones$"
 policy_disconnected_drones: "切り離されたドローン"
 policy_disconnected_drones_desc: "中心的な意識から切り離されたドローンを我々の植民地で生活させるかどうかを決めることができる。"
 disconnected_drones_sustain: "維持"
 disconnected_drones_sustain_name: "切り離されたドローンを維持"
 disconnected_drones_sustain_desc: "集合意識から切り離されたにも関わらず、 これらのドローンの命は維持することができる。\n\n§E切り離されたドローンの§Y市民権タイプ§!がアンロックされる§!"
 disconnected_drones_purge: "駆除"
 disconnected_drones_purge_name: "切り離されたドローンを駆除"
 disconnected_drones_purge_desc: "知的な存在の権利は、 理性のないものには及ばない。 彼らを導く中心的な意識がなければ、 ドローンは動物と大差なく、 邪魔な動物は害獣である。\n\n§E我々の植民地にいるすべての切り離されたドローンは§R排除§!される。§!"
 disconnected_drones_purged_citizenship: "$TRIGGER_FAIL$帝国では切り離されたドローンが排除されている。"
 disconnected_drones_kill_themselves_purge_type: "$TRIGGER_FAIL$集合意識から切り離されたため、 この種族のPOPは全滅するだろう。"
