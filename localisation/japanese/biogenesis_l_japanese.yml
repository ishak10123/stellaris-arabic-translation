 origin_starlit_citadel: "星明かりのシタデル"
 origin_starlit_citadel_desc: "この文明の母星系の端に、 謎のポータルが存在する。 そこは敵対的な存在が容赦なく押し寄せるゲートウェイとなっている。 これらの侵略は避けられないと同時に予測不可能であり、 人々は最大の技術の結晶である。 §H$dsc_name$§!に頼らざるを得ない。"
 origin_tooltip_starlit_citadel_effects: "- $HOME_SYSTEM$$TABBED_NEW_LINE$- 重力井戸の端にある['concept_deep_space_bastion']$TABBED_NEW_LINE$- ['concept_wormhole',$BYPASS_STARLIT_WORMHOLE$]は不明の星系へとつながっている。$NEW_LINE$- $HOMEWORLD$$TABBED_NEW_LINE$- £building£ ['building:building_citadel_uplink']$TABBED_NEW_LINE$- ['concept_bioship_remains', £blocker£$d_bioship_remains$]$TABBED_NEW_LINE$- ['concept_invasion_site',£blocker£$d_invasion_site$]：+2$NEW_LINE$- $ADDITIONAL_TECHNOLOGIES_STRING$['concept_deep_space_citadel_tech',£engineering_research£ $tech_deep_space_citadel$]"
 START_SCREEN_STARLIT_CITADEL: "我々は常に警戒していたわけではない。\n\n[Capital.GetName]は豊かな世界であり、 我々はかつては平和で満足していた。 しかしポータルが開いたことで、 すべてが変わってしまった。\n\n警告なしに[GetInvadersLower]は現れたのだ。 奴らは我々の都市を破壊し、 土地を荒廃させた。 そして、 現れたときと同じように素早く姿を消した。 奴らが二度と戻ってこないことを願った。 しかし侵略は繰り返され、 攻撃は回を重ねるごとに凶悪さを増していった。\n\n銀河への進出に備える今、 $ job_skywatcher_plural$の準備はできている。 我々の世界の上空高くには、 強力な$dsc_name$が待ち構えている。 それは[GetInvadersLower]や我々の破滅を企てる者たちに対する不動の砦である。"
