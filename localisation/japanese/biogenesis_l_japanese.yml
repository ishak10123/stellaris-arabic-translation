 unlocks_ship_4_bio: "没落した帝国の「§Yスティンガー・タイタン§!」のテクノロジーをアンロックする"
 tech_cosmogenesis_mauler: "サイファー・モーラー"
 tech_cosmogenesis_mauler_desc: "有機的な時空次元超越論により、このモーラーはそのコンパクトなフレームの内部に肥大化し、ぎっしり絡み合った筋肉が隠れている。物理の法則を無視した強烈な噛みつきが可能。"
 TECH_UNLOCK_COSMO_MAULER_CONSTRUCTION_TITLE: "§H艦船タイプをアンロック：§!サイファー・モーラー"
 TECH_UNLOCK_COSMO_MAULER_CONSTRUCTION_DESC: "§Hサイファー・モーラー§!\n$tech_cosmogenesis_mauler_desc$"
 tech_cosmogenesis_weaver: "クアンダリー・ウィーヴァー"
 tech_cosmogenesis_weaver_desc: "視認できる構造だけにとどまらない大量の支援兵器を装備したクアンダリー・ウィーヴァーに、 空間の常識というものは存在しない。 単独で、 戦いの流れを一変させる能力を有する。"
 TECH_UNLOCK_COSMO_WEAVER_CONSTRUCTION_TITLE: "§H艦船タイプをアンロック：§!クアンダリー・ウィーヴァー"
 TECH_UNLOCK_COSMO_WEAVER_CONSTRUCTION_DESC: "§Hマトリックス・ウィーヴァー§!\n$tech_cosmogenesis_weaver_desc$"
 tech_cosmogenesis_harbinger: "メイズ・ハーヴィンジャー"
 tech_cosmogenesis_harbinger_desc: "これらのハーヴィンジャーは、 編み込まれたポケット次元の中に軍用機を配備している。 各艦は不可能を極めた迷宮のような格納庫を擁し、 艦隊相当の火力を展開する能力を備えている。"
 TECH_UNLOCK_COSMO_HARBINGER_CONSTRUCTION_TITLE: "§H艦船タイプをアンロック：§!メイズ・ハーヴィンジャー"
 TECH_UNLOCK_COSMO_HARBINGER_CONSTRUCTION_DESC: "§Hメイズ・ハーヴィンジャー§!\n$tech_cosmogenesis_harbinger_desc$"
 tech_cosmogenesis_stinger: "クリプティック・スティンガー"
 tech_cosmogenesis_stinger_desc: "その動力源が支えられるはずの数を遥かに上回る武器システム数を搭載したこのスティンガーは、 本来機能できないはずだ。 しかし、 それは絶え間なく発射し続ける。"
 TECH_UNLOCK_COSMO_STINGER_CONSTRUCTION_TITLE: "§H艦船タイプをアンロック：§!クリプティック・スティンガー"
