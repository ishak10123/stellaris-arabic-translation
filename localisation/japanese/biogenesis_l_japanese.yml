 #Mutation
 auth_mutation_habitability_tt: "生体種族は§G175%§!の居住性を達成できる"
 auth_bio_democratic_mutation: "生物多様性の権利"
 auth_bio_democratic_mutation_desc: "この社会は個々人の身体は彼ら自身の設計と管理下にある神聖なものだという原則を支持している。 自由と揺るぎない支援の枠組みの中で、 市民は自分たちのユニークな潜在能力を実現し、 自分たちと自分たちの未来を思いのままに形作る力を与えられている。"
 auth_bio_oligarchic_mutation: "触媒指令"
 auth_bio_oligarchic_mutation_desc: "優れた遺伝子変異を持つエリート階級に権力が集中し、 彼らに比類なき権限が与えられている。 彼らは通常の法の枠を超えて活動し、 社会を守り導くためにその能力を発揮し、 社会の存続と繁栄を確実にするために必要と判断されるあらゆる行動を取る。"
 auth_bio_dictatorial_mutation: "ハイブリッド委任領"
 auth_bio_dictatorial_mutation_desc: "この社会はその発展の礎石として遺伝子変異を義務づけている。 自然のままで満足する者は即座に収容または抹殺され、 遺伝的に優れた者だけが種族が完全性を目指し続けるための原動力として貢献することを確かなものとする。"
 auth_bio_dictatorial_mutation_tt: "\n[enforcer.GetIcon] [enforcer.GetName]による£crime£ 犯罪§G-5§!\n$auth_mutation_habitability_tt$"
 auth_bio_imperial_mutation: "ゲノム拡張主義者"
 auth_bio_imperial_mutation_desc: "ランダムな突然変異という予測不可能な力を取り入れ、 この帝国は計り知れない潜在能力を引き出し、 従来の方法では決して達成できなかった革新と能力を育んでいる。 優位性を競う競争において突然変異から生じる混沌は彼らにとって最大の強みとなり、 比類なき覇権へと駆り立てる。"
 auth_bio_corporate_mutation: "臓器高利貸し"
 auth_bio_corporate_mutation_desc: "この統治により、 臓器や身体部位の売買は柔軟な支払いプランを通じてすべての人に利用可能となっている。 支払いが滞った場合は速やかに担保の差し押さえまたは放棄が行われる。 このシステムにより、 安定した需要と供給のサイクルが確保され、 身体の各部位は商品であると同時に義務にもなるのだ。"
 auth_bio_corporate_mutation_tt: "$organic_leaders_have_trade_upkeep$\n['trait:trait_spare_organs']の$pop_group_unit$£pop£ POPあたりの$r_trade$：§G+0.5§!\n$auth_mutation_habitability_tt$"
 auth_bio_democratic_evopred: "遺伝的選挙"
 auth_bio_democratic_evopred_desc: "管理は難しいが、 この社会は変異しやすいゲノムを部分的に制御できるようになった。 人々は、 突然変異がどのように現れるかを決めることができる。"
 auth_bio_democratic_evopred_tt: "$auth_bio_evopred_tt$\nどの['concept_faction']が最も強いかに応じて、 ['trait:trait_malleable_genes']に['concept_genetic_electorate_effect', 効果]を追加する。\n奴隷かそれ以上の異星の§Y種族§!による['concept_adaptive_evolution']進捗が§G+100%§!増加"
 auth_bio_oligarchic_evopred: "生物学的有力者"
 auth_bio_oligarchic_evopred_desc: "この社会では、 時間は制覇されている。 支配するエリート層は、 最も純粋な遺伝子を持つ者だけを厳選することで、 時を超えた存在となっている。 しかし、 一歩間違えれば永遠の命を失うことになり、 下にいる者たちにとって、 野心と進化は表裏一体なのだ。"
 auth_bio_oligarchic_evopred_tt: "$auth_bio_evopred_tt$\n評議員は§Y不死§!"
 auth_bio_dictatorial_evopred: "頂点元首"
 auth_bio_dictatorial_evopred_desc: "絶え間ない進化によって築かれた文明は、 至高の頂点の知性によって支配されている。 評議会も憲法も、 元首の優れた意志を覆い隠すことはできない。 ここでは、 すべての遺伝的な勝利が王座の昇天を後押しする。"
 auth_bio_dictatorial_evopred_tt: "$auth_bio_evopred_tt$\n統治者の特性：['leader_trait:trait_ruler_apex_predator']"
 apex_predator_male: "$trait_ruler_apex_predator$"
 apex_predator_female: "$trait_ruler_apex_predator$"
 auth_bio_imperial_evopred: "不死の王朝"
 auth_bio_imperial_evopred_desc: "$auth_bio_imperial_evopred$で、過去は休むことなく貪られていく。 亡くなった指導者の遺体は帝国の不滅の支配を支え、 各世代は次の世代を育む。 奉仕とは犠牲を払うことである。 そして死によって、 すべての従属国は先人たちの遺産を育む。"
 eternal_ancestor_male: "$eternal_ancestor_female$"
 eternal_ancestor_female: "永遠の祖先"
 auth_bio_imperial_evopred_tt: "$auth_bio_evopred_tt$\n統治者は亡くなった偉大なリーダーを喰らうことができる。"
 auth_bio_corporate_evopred: "バイオプレデーションGLC" #Galactic Limited Incorporated
 auth_bio_corporate_evopred_desc: "バイオプレデーションGLCは、 遺伝的にも経済的にも適応することに長けている。 企業ポートフォリオに新たなゲノムが追加されるたびに、 巨大企業は市場での地位を確立し、 それぞれの種族のユニークな生物学に合わせて製品や交渉を調整している。 顧客の性質を理解すれば、 ほぼ本能的に取引を成立させることができるのだ。"
 auth_bio_corporate_evopred_tt: "$auth_bio_evopred_tt$\n$organic_leaders_have_trade_upkeep$\n種族特性ごとの通商条約の効率：§G+1%§!\n§Y通商条約§!による['concept_adaptive_evolution']の進行度が§G+100%§!増加する。"
 auth_bio_hive_mind_evopred: "キメラ意識"
 auth_bio_hive_mind_evopred_desc: "この集合意識は、 単純な自己変革に飽き飽きしている。 それぞれの新しい植民地は、 風景と肉体が絶え間なく変化する融合の中で、 その生き生きとした織物の一部となることができる。 キメラ意識の中で境界線が消滅するにつれ、 生物と世界が一つになる。"
 auth_bio_hive_mind_evopred_tt: "$auth_bio_evopred_tt$\n植民地を自動的に§Yハイヴ惑星§!にテラフォーミングする\n異星§Y種族§!の浄化による['concept_adaptive_evolution']進捗が§G+100%§!増加"
 auth_bio_evopred_tt: "種族特性ごとのPOPによる$EMPIRE_SIZE$：§G-1%§!\n$auth_mutation_habitability_tt$"
 #Hive Advanced Authorities
 auth_bio_hive_purity: "純潔パラダイム"
 auth_bio_hive_purity_desc: "このハイヴは揺るぎない遺伝的純粋性によって繁栄し、 すべてのドローンが理想的な生物学的テンプレートに従うことを保証している。 精密な遺伝子操作は結束力を高め、 集団の力を強化し、 効率性と生存のために磨き抜かれた圧倒的な力を生み出す。"
 auth_bio_hive_purity_tt: "$pop_effects_from_purity_header$ $TABBED_NEW_LINE$- $pop_group_unit$ £pop£ POPあたりの£unity£ $unity$ 産出量：$plus_minus_icon$§Y$@purity_traits_resource$§! $DOUBLE_NEW_LINE$"
 auth_bio_hive_cloning: "複製する大群"
 auth_bio_hive_cloning_desc: "高度なクローン技術により遺伝的に全く同じドローンが絶え間なく生産される。 それぞれが完璧な効率性と統一性を備えるように設計されているのだ。 外に出て増殖せよという生まれながらの指令に従い、 このハイヴは星をも覆い隠そうとしている。"
 auth_bio_hive_cloning_tt: "$ENABLES_BACKUP_CLONES$\n['concept_clone_leader_degradation', クローン劣化]は£society£ ['technology:tech_node_culling_1']によって減少される"
