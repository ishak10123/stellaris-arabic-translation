 PROJECT_BIOMECHANICAL_WORLD_DESC: "[GetInvadersLower]の故郷。 彼らは何者で、 我々に何をしようとしていたのか？"
 bio.2030.name: "生体機械の災害"
 bio.2030.desc: "§Y[event_target:biomechanical_world_target.GetName]§!はまるで墓場だ。\n\n惑星を支配していた種族は、 奇妙で攻撃的な生命体によって完全に駆逐されてしまった。 さらなる調査により、 その生命体は自然の生物ではなく、 むしろ生物機械であり、 作られたというよりも育まれたものであることが明らかになった。\n\n生命体を創造した者がその創造物に圧倒された可能性はあるだろうか？ 敵は、 我々に対する奴らの行動、 あるいは我々の存在さえもまったく知らなかった可能性はあるだろうか？\n\nただ一つ確かなことは、この災害を封じ込めるために彼らが取った措置は、 自動化された忌まわしい怪物どもと共に、 彼ら自身をも滅ぼしたということだ。"
 bio.2030.a: "被害を受けたのは我々以外にもいたのか…"
 smarter_hatchery: "改良された艦隊"
 smarter_hatchery_desc: "奴らは学び……適応し……やってくる。"
 bio.2030.tt: "\n§E評議会職をアンロックする：§!\n§H$t$$councilor_warden_of_the_citadel$§!\n$tt$$COUNCIL_POSITION_MODIFIER_BASE$\n$ttt$$MOD_SHIP_FRIENDLY_TERRITORY_ARMOR_MULT$：　§G+1%§!\n$ttt$$mod_shipsize_starbase_deep_space_citadel_1_hull_mult$：§G+2% §!\n$ttt$$mod_starbases_upkeep_mult$：§G-5% §!\n$COUNCIL_POSITION_AVAILABLE_FOR$$t$$commander_with_icon$"
 councilor_warden_of_the_citadel: "シタデルの番人"
 councilor_warden_of_the_citadel_desc: "$TITLE$は我々の強固な守護者であり、 防衛の強化、 軍事準備の監督、 そして文明がどんな脅威にも打ち勝って存続し続けられるようにすることを任務としている。"
