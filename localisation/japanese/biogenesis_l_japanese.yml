 behemoth_finale_situation_monthly_change_tooltip: "§Y成長因子§!を次の方法で増やす：\n- 他の§Yベヒモス§!、§Yリヴァイアサン§!、または§Y生物船§!\nを排除する。- §Y居住可能惑星§!を食べる。\n- £pop£ §HPOP§!を食べる。"
 behemoth_empire_size_desc: "帝国規模"
 growth_factor_desc: "成長因子"
 wilderness_behemoth: "$origin_wilderness$"
 concept_growth_factor: "$growth_factor_desc$"
 concept_growth_factor_desc: "ベヒモスが吸収する栄養素の量を表す指標。 状況の進展速度に影響を与える。\n\n毎月§R0.75%§!ずつ減少する \n\n$behemoth_finale_situation_monthly_change_tooltip$\n\n最小値は移送された$pop_group_unit$£pop£ §HPOP§!につき§G0.5%§!。"
 behemoth_finale_situation_desc: "これほど大規模な形態に適応するには、 多少の時間がかかる。 体が大きく成長するにつれ、 我々は周囲の状況を常に意識しなければならない。 今や我々と宇宙の間に立ちはだかるものは何もない。 \n\n現在の['concept_growth_factor']は、 §G[growth_factor_value]%§!"
 behemoth_finale_approach_digestion: "消化"
 behemoth_finale_approach_digestion_desc: "少し休んで力を回復しよう。"
 behemoth_finale_approach_speed: "飛行"
 behemoth_finale_approach_speed_desc: "危険から逃げろ。"
 behemoth_finale_approach_brawn: "戦闘"
 behemoth_finale_approach_brawn_desc: "怒りを満足させないといけない。"
