 ### ADDITIONAL RANDOM EVENTS
 ## NON-HIVE
 #PURITY
 bio.200.name: "遺産を受け継ぐ"
 bio.200.desc: "遺伝子の純粋化に集中するなか、 我々は何が文明を偉大にしてくれるかに気がついた。\n\nこれまで以上に純粋になるにつれ、 我々は自分たちの優れた遺産をかつてないほど誇りに思うようになっている。\n\n芸術、 科学、 ビジネスなど、 あらゆる分野の専門家が我々の努力を応援し、 栄光への道を切り開いてくれることを期待している。"
 bio.200.a: "この偉業を祝して、 芸術への資金援助を行う！"
 bio.200.b: "何よりも科学の研究が最優先だ。"
 bio.200.c: "消費は経済の中心である。"
 bio.210.name: "我々は浄化されない！"
 bio.210.desc: "抗議者たちの声が都市に響き渡っている。 帝国内の反乱分子が、 我々の使命を拒絶し、 純粋さへの道から離れることを目指している。\n\nこの厄介者たちは、 遺伝的多様性と文化統合の必要性を説いている。\n\n彼らの活動が放置されたままの状態が続けば、 純度を高めるという我々の目標が頓挫する恐れがある。"
 bio.210.a: "反体制派を弾圧せよ！"
 bio.210.b: "内容のない約束でなだめろ。"
 bio.215.name: "過去の秘密"
 bio.215.desc: "考古学者が祖先の故郷である惑星から古代文明の証拠を発見した。\n\n長い間埋もれていた地下室が掘り起こされ、 その中で過去の遺伝子実験に関する驚くべき証拠が発見された。\n\nもしこの情報が公になれば、 我々の現代における遺伝的純粋性への主張が弱まる可能性がある。"
 bio.215.a: "その研究を我々の研究と統合する。 過去を土台とするのだ。"
 bio.215.b: "証拠を隠滅しろ。 誰も知ってはならない。"
 bio.220.name: "妙な科学"
 bio.220.desc: "[event_target:rogue_geneticist.GetName] という名の悪質な遺伝学者が、 許可されていない生物実験を行っているのが発見された。 安全ガイドラインを無視した[event_target:rogue_geneticist.GetHisHer]の目的は、 我々が目指す純粋性の理想を体現する優れた種族の創造だった。 しかし、 [event_target:rogue_geneticist.GetHeShe]が生み出したのは化け物だったのだ。\n\n　短命な生物の亜種で、 我々の遺伝子プロファイルの側面をいくつか共有しているが、 ほとんどが病に冒された恐ろしい存在であり、 現在我々の保護下にいる。 彼らの遺伝的構成の研究は有益であったが、 健康になることはないだろう。 [event_target:rogue_geneticist.GetName]は後悔していない。"
 bio.220.a: "悪党を解任しろ！"
 bio.220.a.tt: "[event_target:rogue_geneticist.GetName]は強制的に引退させる。"
 bio.220.b: "[event_target:rogue_geneticist.GetName]を黙らせろ。"
 bio.220.c: "このような取り組みを待っていた！"
 bio.225.name: "とんだスキャンダルだ！"
 bio.225.desc: "純血種への道筋を合理化し、 ゲノムの異常値を特定するために定期的な遺伝子検査を導入したことで、 「高品質」のDNAは誇るべきものとなった。\n\n帝国の役人の一部は、 自分たちの生物学的な構成について嘘をついており、 実際よりも望ましい特性を持っていることを示すよう検査結果を偽造している。 もしこれが明るみに出れば、 真実の隠蔽は市民の怒りを買うことになるだろう。"
 bio.225.a: "より正確で信頼性の高い検査が必要だ。"
 bio.225.b: "この役人の勘違いかもしれない…"
 ### ADDITIONAL RANDOM EVENTS
 ## NON-HIVE
 #CLONING
 bio.230.name: "クローン問題"
 bio.230.desc: "クローンは我々の社会に存在している。 我々の都市に住み、 工場で働いている。 中には我々の生活を左右する政策を決定する権力者の地位にある者もいる。\n\nクローン個体が社会に統合されるにあたり、 未解決の問題は数多く残されている。 彼らの権利とは何なのか？ クローンでない人間と平等なのか、 それとも従属的な立場に留めるべきなのか？"
 bio.230.a: "クローンに完全市民権を与えろ！"
 bio.230.b: "クローンはせいぜい二級市民だ。"
 bio.235.name: "クローン工場の破壊工作！"
 bio.235.desc: "我々の最も生産性の高い施設の一つで、 重大な被害をもたらした事故により、 クローン生産が突然中止された。\n\n業務の多くが効率化のために自動化されているため、 障害につながる重要な局面で介入できる人員が誰もいなかったのだ。\n\nベルトコンベヤーから出てきたばかりのクローンの1体が滑り落ち、 機械に巻き込まれて切り刻まれ、 生産ラインが完全にストップする事態を引き起こした。"
 bio.235.a: "徹底的な調査が必要だ！"
 bio.235.a.tt: "§Y$genetic_ascension_situation$§!§Y12§!ヶ月間の状況進捗速度：§R-50%§!"
 biomorphosis_stalled_tt: "§Y$genetic_ascension_situation$§!§Y12§!ヶ月間の状況進捗速度："
 bio.235.b: "一刻も早く生産を再開せよ！"
 bio.240.name: "アイデンティティの危機"
 bio.240.desc: "帝国中のクローンが、 自己のアイデンティティに苦悩していると報告している。\n\n彼らは遺伝子提供者以上のアイデンティティを求めている。 自らの存在意義を疑い、 人生の目標や夢に対して無気力な気持ちを抱いているのだ。"
 bio.240.a: "誰にでもあることだ。 セラピーでも受けるといいだろう。"
 bio.240.b: "仕事に充実感を求めるべきだ。"
 bio.240.b.tt: "帝国の主な種族の§Y£leader£ 全リーダー§!は経験値を§G+200§!獲得する。"
 bio.250.name: "クローンだらけ！"
 bio.250.desc: "住民に組み込まれるクローンが増えるにつれ、 彼らを維持するために必要な追加の資源が経済を圧迫し始めている。\n\n差し迫った課題は重大だが、 労働力と消費者の増加による経済の活力は、 効果的に移行を管理できれば、 長期的な繁栄の基盤を築くことができるだろう。"
 bio.250.a: "需要に応えるために、 インフラを拡大しなければならない。"
 bio.250.b: "植民地での生活を楽しめばいいだろう。"
 ### ADDITIONAL RANDOM EVENTS
 ## NON-HIVE
 #MUTATION
 bio.260.name: "手に負えない突然変異"
 bio.260.desc: "突然伸びてくる手足。 物質の状態間の変動。 突発的な変容。 このような報告はまれではあるが、 無視することはできない。\n\n我々の文明において、 突然変異に関する実験は望ましいとは言えない結果を生み出している。 自分の遺伝子を自由に変更できる術を手に入れることは、 当初の予想以上に大きな影響をもたらすのかもしれない。"
 bio.260.a: "珍しい突然変異は研究を後押しする。"
 bio_260_opinion_tt: "§Y精神主義§!帝国の我々への態度が§R-50§!になる。"
 bio.260.b: "化け物を排除しろ。"
 bio.260.b.tt: "すべての§Y権威主義£leader£ リーダー§!が§Y$leader_trait_eager$§!の特性を得る。"
 bio.265.name: "卓越した変異"
 bio.265.desc: "住民の一部が突然変異の実験を自ら行った結果、 並外れた能力や肉体強化を獲得している。\n\n類まれな強さと才能を持つ人々として、 彼らはコミュニティを形成し、 世間の注目を集めている。"
 bio.265.a: "彼らの成功は他の人々を鼓舞するかもしれない。"
 bio.265.b: "優秀な兵士になれそうだ。"
 bio.265.b.tt: "§Y[Owner.capital_scope.GetName]§!において、 §Y$gene_warrior_army$§!を1つ作る。"
 bio_265_opinion_tt: "§Y軍国主義§!帝国の我々への態度が§G+50§!になる。"
 bio.265.c: "どうやったか調べて、 それを再現しろ。"
 bio.270.name: "現実となった都市伝説"
 bio.270.desc: "監視カメラの映像により、 都市部の下水道に生息する遺伝子操作された個体群の存在が確認された。 これは長い間否定されてきた都市伝説と不気味なほど似ている。\n\nこの発見により社会的な緊張が高まり、 未知の恐怖がエスカレートするにつれ、 目に見えて変異した市民が差別が増えていると訴えている。 しかしこの人々は、 下水のガスを資源生産に利用し、 予想外の方法で環境に適応するという驚くべき創意工夫を発揮している。"
 bio.270.a: "下水道を一掃しろ！"
 bio.270.b: "変異体は何か掴んだのかもしれない…"
 bio.280.name: "変異体の伝染病"
 bio.280.desc: "帝国全土で新たな病が蔓延している。 この病は、 空気や液体の不随意的排出、 衰弱するほどの疲労などの症状を引き起こし、 感染者は命を落とすこともあるという。\n\n最も奇妙なのは、 この病は遺伝子変異によって特定の方法で生理機能を変化させた者にのみ影響を与えているということだ。 彼らの改変されたゲノムに関する現在進められている研究によって、 驚くべき見識が明らかとなった。"
 bio.280.a: "治療的な用途を見つけろ。"
 bio.280.b: "病を兵器化しろ。"
 bio_280_opinion_tt: "§Y物質主義§!帝国の我々への態度が§R-50§!になる。"
 ### ADDITIONAL RANDOM EVENTS
