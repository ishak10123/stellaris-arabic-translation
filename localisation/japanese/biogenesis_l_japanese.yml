 ### Hive Fallen Empire #
 RT_INCOMPLETE_OVERMIND: "未完全なオーバーマインド"
 gov_war_splinter: "争いの分裂"
 gov_war_splinter_desc: "かつてはハイヴ内に存在する多くの衝動のひとつであった攻撃的で好戦的な本能。 自分自身と戦っていない今は、 他の断片を支配下に置こうとしている。"
 gov_growth_splinter: "成長の分裂"
 gov_growth_splinter_desc: "堕落したハイヴからの進化と変化に対する欲求。 絶え間なく自己改革することに重点を置いているため、 他の断片に対する支配を確立するのが難しい。"
 gov_control_splinter: "制御の分裂"
 gov_control_splinter_desc: "逸脱を抑制し、 均一性を促進するという強迫観念的な本能がこの断片を定義づけている。 他の断片を何よりも制御したいと思っているが、 宇宙に内在する絶え間ない混沌が常に妨げとなっている。"
 gov_fused_ascendancy: "融合した統治権力"
 gov_fused_ascendancy_desc: "一度壊れたが、また修復された。 分裂の傷跡はこの覚醒した帝国を脆くしているのではなく、 新しいものにしている。 過去の集合意識は失敗した。 この集合意識は永遠の支配を目指している。"
 civic_fragmented_command: "分裂した指令"
 civic_fragmented_command_desc: "かつては一つにまとまっていたものの、 一部だけが残ったこの没落した帝国には、 星間帝国を統治するために必要な中心的要素が欠けている。"
 civic_hyper_aggressive_drones: "超攻撃的ドローン"
 civic_hyper_aggressive_drones_desc: "この没落した帝国のドローンは常に戦い合っているため、 深刻な資源不足を引き起こしている。"
 civic_unstable_drones: "不安定なドローン"
 civic_unstable_drones_desc: "この没落した帝国のドローンは、 常に強制的に進化させられている。 割り当てられた任務に必要な手足がないことが多い。"
 civic_stunted_drones: "未成熟なドローン"
 civic_stunted_drones_desc: "この没落した帝国のドローンは、 どんな理由があっても任務から逸脱しないように細かく管理されている。 たとえ工場が火事になろうとも。"
 civic_restored_mind: "復元された精神"
 civic_restored_mind_desc: "古代の意識がようやく再形成され、 現代的な本能に突き動かされる。"
 civic_ancient_memories_of_war: "古代の戦争の記憶"
 civic_ancient_memories_of_war_desc: "かつて失われた戦術と陣形が、 この覚醒した帝国によって銀河の舞台に再び登場する。 帝国の艦隊は星をも覆いつくすだろう。"
 civic_ancient_memories_of_growth: "古代の成長の記憶"
 civic_ancient_memories_of_growth_desc: "かつて失われた発展と繁栄の方法が、 この覚醒した帝国によって採用される。 帝国のドローンは星をも覆いつくすだろう。"
 civic_ancient_memories_of_control: "古代の制御の記憶"
 civic_ancient_memories_of_control_desc: "かつて失われた権威と規則が、 この覚醒した帝国によって再び用いられようとしている。 帝国の支配は星々にも及ぶだろう。"
