 #Siege of the Citadel Event Chain
 bio.2005.name: "異常な変動"
 bio.2005.desc: "$job_skywatcher_plural$が憂慮すべき事態について報告してきた。\n\n§Y[Root.Capital.System.GetName]§!のポータルから微妙だが紛れもない変動が最近検出されたのだ。 過去にも同様の変動が検知されたが、 それは敵対的な生物兵器を積載した船団の攻撃を予告していた。\n\nこれらの予測が正しければ、 数ヶ月以内に次の攻撃が予想される。 我々の民の生存は、 再び防衛者の決意にかかっているかもしれない。"
 abandoned_hatchery_chain_1: "シタデルの包囲"
 abandoned_hatchery_chain_1_title: "$abandoned_hatchery_chain_1$"
 abandoned_hatchery_chain_1_desc: "[GetInvadersLower]は数十年にわたって我々を攻撃してきた。 $starbase_deep_space_citadel_1$は第一線の防衛ラインとして機能しているが、 安全は敵の真実を明らかにすることによってのみ獲得できる。\n\n発見の度に、 彼らとの戦いに終止符を打つ日に近づいていく。 そして、 我々の長い包囲も最終的に終わるのだ。"
 bio.2015.name: "敵の残骸"
 bio.2015.desc: "全滅した生物艦隊の残骸が、 不吉にも§Y[Root.Capital.System.GetName]§!を漂っている。 ねじれて黒焦げになってはいるものの、 有機物の多くはそのまま残っており、 貴重な研究の機会となっている。\n\n慎重に分析すれば、 そのグロテスクな構造の秘密を解明できるかもしれない。 そしてそこから出てくる謎のポータルについて、 何らかの洞察を得られるかもしれない。"
 PROJECT_HATCHERY_SHIP_REMAINS: "生物船の残骸の研究"
 PROJECT_HATCHERY_SHIP_REMAINS_DESC: "[GetInvadersLower]艦隊の残骸は、 貴重な研究の機会をもたらす。 生存する術について何か知ることができるかもしれない。"
 bio.2015.a: "ようやく成果が出たな。"
 bio.2020.name: "敵の分析"
 bio.2020.desc: "§Y[Root.Capital.System.GetName]§!に残された生物の残骸を丹念に研究した結果、 [Root.GetScientistPlural]は我々の星系の端にあるポータルを理解する鍵を握ったかもしれないと信じている。\n\n生物の組織の奥深くに、 有機的なパターンが確認された。 それはポータルの変動と共鳴しているように見える。 この周波数を解析すれば、 我々も謎の裂け目を横断できるはずだ。\n\nさらなる研究が必要だが、 敵に戦いを挑める可能性が初めて手の届くところにまで来ている。"
 abandoned_hatchery_chain_2: "$abandoned_hatchery_chain_1$"
 abandoned_hatchery_chain_2_title: "$abandoned_hatchery_chain_1$"
 abandoned_hatchery_chain_2_desc: "ポータルの謎の解明にまた一歩近づいた。 まだ通過はできないが、 必要な技術を開発するために必要な知見を得た。\n\n敵に攻撃を仕掛けるには、 §Y$tech_wormhole_stabilization$§!が必要となる。"
 bio.2025.name: "敵の揺りかご"
 bio.2025.desc: "§Y$tech_wormhole_stabilization$§!における最近の画期的な進歩のおかげで§Y[event_target:starlit_sealed_system.GetName]§!星系を垣間見ることができた。 \n\n反対側には攻撃的な生物艦隊と強固に要塞化された星系基地が待ち構えている。 最大限の注意が必要だ。 \n\n敵の揺りかごを見つけたのだ。"
 abandoned_hatchery_chain_3: "$abandoned_hatchery_chain_1$"
 abandoned_hatchery_chain_3_title: "$abandoned_hatchery_chain_1$"
 abandoned_hatchery_chain_3_desc: "敵の揺りかごを見つけたが、 奴らの秘密を解き明かすには、 攻撃しなければならない。\n\n厳しい戦いになるだろうが、 戦いが終わればいよいよ§Y[event_target:starlit_sealed_system.GetName]§!星系を自由に探索できるようになる。"
 bio.2027.name: "恐怖の黄昏"
 bio.2027.desc: "§Y[starlit_sealed_system.GetName]§!を守っていた艦隊は打ち破られた。 戦いが終わる直前に、 星系の星系基地から不気味な通信を受信し、 我々はその内容をようやく翻訳した。\n\n§H「——制御できない！ 船が勝手に繁殖している！  誰かいるなら助けてくれ！」§!\n\nそれ以降、 すべての連絡が途絶えた。 これが本当に勝利であるならば、 敵の準備拠点こそが戦略的な好機となる。 いつの日か、 §Y[starlit_sealed_system.GetName]§!の光に照らされた新たな$starbase_deep_space_citadel_1$が輝き、 同じような脅威が二度と我々の文明を脅かすことがないように守ってくれるだろう。"
 bio.2027.a: "ようやく包囲が解かれた。"
 citadel_siege_lifted: "包囲解除"
 citadel_siege_lifted_desc: "勇敢な守備隊が[GetInvadersLower]を撃退した。 ついに、 長く続く包囲が解かれた。"
