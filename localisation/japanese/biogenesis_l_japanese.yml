 job_skywatcher_effect_desc: "£job_skywatcher£ $job_skywatcher_plural$は$r_stability$を増加させ、 £defense_army£ §Y防衛軍§!を作り出し、 帝国全域にわたる£mod_country_naval_cap_add£ §Y宇宙軍許容量§!を増加させる。 また、 §Y$dsc_name_plural$§!、 §Y$starbases$§!、 §Y$military_station_small_plural$§!の効率を改善する。"
