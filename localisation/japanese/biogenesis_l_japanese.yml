 bio.40.name: "生物的独自性" #FINAL STAGE - TRADITION TREE CHOICE
 bio.40.desc: "我々自身の純粋な形を追求しようが、 クローン技術で成功しようが、 あるいは意図的な突然変異によって遺伝子操作で我々自身を増強しようが、 ここから後戻りはできない。"
 bio.40.desc.evopred: "$bio.20.desc.evopred$"
