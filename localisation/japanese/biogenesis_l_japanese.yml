 #STAGE EVENTS
 bio.5.name: "本質の変更" #STAGE ONE
 bio.5.desc.no_options: "進化を加速させるには、進むべき道を明確に選択しなければならない。 潜在能力を最大限に発揮するということは、 この取り組みが我々の本質を根本的に変える可能性があることを理解している。\n\n進化の設計は非常に重要な課題だ。 変化を実行すれば、 我々の未来を再形成することになる。"
 bio.5.desc.has_options: "$bio.5.desc.no_options$\n\n種族を高めるために、 我々は今、 どの道から旅を始めるのかを選択しなければならない。"
 bio.5.a: "純粋性の道。"
 bio.5.b: "クローニングの道。"
 bio.5.c: "突然変異の道。"
 bio.10.name: "転換点" #STAGE TWO
 bio.10.desc.no_options: "自ら進化を設計することで、 大きな進歩がもたらされた。 遺伝形質、 生殖、 DNAシーケンスについてより深い理解を得ることができた。\n\n我々の進歩の集大成は手の届くところにある。 わずか数年で、 我々は種族としての潜在能力を完全に発揮するだろう。"
 bio.10.desc.has_options: "$bio.10.desc.no_options$\n\nしかし現時点では、 現在の道を突き進むか、 次の発展段階に向けて別の道を選ぶことも可能だ。"
 bio.10.a: "純粋性に注力しよう。"
 bio.10.b: "クローニングに注力しよう。"
 bio.10.c: "突然変異に注力しよう。"
 bio.15.name: "進化の分かれ道" #STAGE THREE
 bio.15.desc.no_options: "多大なる努力の結果、 大きな進化の転換点に立つことができた。 我々は進化の潜在能力を完全に引き出すために進むべき道について、 重大な決断を下さなければならない。"
 bio.15.desc.has_options: "$bio.15.desc.no_options$\n\nどこに力を注ぐべきかをもう一度決める必要がある。"
 bio.15.a: "純粋性を選ぶ。"
 bio.15.b: "クローニングを完全に習得する。"
 bio.15.c: "突然変異が未来への道だ。"
 genetic_ascension_approach_purity: "純粋性"
 genetic_ascension_approach_cloning: "クローニング"
 genetic_ascension_approach_mutation: "突然変異"
 genetic_ascension_approach_purity_desc: "純粋性に重点を置く。"
 genetic_ascension_approach_cloning_desc: "クローニング研究によって我々は成長する。"
 genetic_ascension_approach_mutation_desc: "我々の未来は突然変異にある。"
 bio.20.name: "選んだ道" #FINAL STAGE - TRADITION TREE CHOICE
 bio.20.desc: "我々自身の純粋な形を追求しようが、 クローン技術で成功しようが、 あるいは意図的な突然変異によって遺伝子操作で我々自身を増強しようが、 ここから後戻りはできない。"
 bio.20.desc.evopred: "我々の性質は常に柔軟だった。 我々はこの宇宙で最も複雑な生命体であり、 研究を通してこれからも変化し続けていくだろう。 \n\n未来は混沌としており、 それは我々にとってちょうど良い。"
 bio.20.a: "純粋性の真の意味を知るだろう。"
 bio.20.b: "クローニングを通して成功してみせる。"
 bio.20.c: "突然変異を通して力を得る。"
 #Random Events
 bio.50.name: "より平等なもの"
 bio.50.desc: "遺伝子操作による純粋化に重点を置いた結果、 強化された市民は自分自身を他の住民よりも本質的に優れていると考えるようになった。 彼らは自分たちが優れているという認識に基づいて、 労働時間の短縮、 より充実した設備、 そしてより強い政治的影響力を要求している。 彼らはますます攻撃的になっており、 社会に大きな混乱を引き起こしている。"
 bio.50.a: "デモ隊を厳しく取り締まれ。"
 bio.50.b: "彼らの言い分は正当だ。"
 bio.55.name: "社会分裂"
 bio.55.desc: "分断的な暴言がニュース速報を支配し、 意見の相違が社会の結束をバラバラに引き裂いている。 遺伝子操作を受けた者により多くの機会がもたらされるにつれ、　新たな階級闘争が勃発しつつある。\n\n遺伝子操作で強化された者は、 自分たちが種族の未来を象徴するものであると信じており、 一方で伝統主義者は、 我々が不自然な領域に入り込み過ぎていると感じている。"
 bio.55.a: "優れた世界のために、 優れた個人を。"
 bio.55.b: "少し早く動きすぎたのかもしれない。"
 bio.60.name: "酸性不均等"
 bio.60.desc: "一部の業界では、 恣意的な純度テストが一般的になりつつある。 優れた遺伝子構成を持つとみなされた者は、 仕事や教育において優遇され、 権力のある地位へ容易につくことができている。\n\n遺伝子強化を施した個人は確かに強くて健康であるという意見がある一方で、 遺伝子強化を望まない者やできない者に対して不当な差別を生むという意見もある。"
 bio.60.a: "すべての市民に平等な機会を確保しなければならない。"
 bio.60.b: "適者生存だ。"
 bio.65.name: "ヒーローと悪党"
 bio.65.desc: "純粋さを追求する取り組みにより、 一部の者たちが公共の安全において重要な役割を担うようになった。 超人的な強さ、 敏捷性、 持久力を備えた少数の集団が自分たちを英雄と見なし、 自らの[owner.species.GetHandNamePlural]で法の裁きを下そうとしている。\n\nしかし、 この新たに見出された勇気に対抗する者もいる。 目立たないところで同様に強化された敵対勢力が台頭しており、 その悪意は勢力均衡の実現という欲望によって煽られている。 両陣営の衝突により、 重大な財産被害が発生し、 民間人の生命も脅かされている。"
 bio.65.a: "自警団などあってはならない。"
 bio.65.b: "自由に闘わせろ。"
 MAVERICK_CITIZENS_MOD: "[enforcer.GetIcon]§Y[enforcer.GetNamePlural]§!は100の職業枠につき§G+2§!$r_stability$と§G+2§!$r_unity$を産出するようになる。"
 bio.66.name: "超制限"
 bio.66.desc: "超人的な力を持つ者たちの活動を規制した。 これらの者たちには厳しい制限や規制を設けている。 我々は彼らの活動を監視し、 抑制することが可能になった。\n\n彼らが帝国に奉仕するためにのみその力を用いるよう努めているが、 超能力者と非強化者の間では、 恐怖と軽蔑の感情が高まっている。 この問題について、 市民の意見は大きく分かれている。"
 bio.66.a: "超強力連隊を編成せよ。"
 bio.66.b: "力を奪われた人々を支援しろ。"
 bio.67.name: "超依存"
 bio.67.desc: "遺伝子操作された自警団への依存度が高まるにつれ、 それは諸刃の剣となっている。 その存在は安心感と幸福感をもたらしているが、 我々が現在彼らに依存していることは明白だ。\n\n市民は感謝しているが、 今では司法手続きを回避し、 役人を無視して、 これらの超能力者たちに指導と支援を求めるようになっている。 ヒーローと政府の区別は曖昧になり、 政府の権力は危機に瀕している。"
 bio.67.a: "超人的な力を持つ評議会を結成しろ！"
 bio.67.b: "ヒーローが政府関係の活動に関わることを制限しろ。"
 bio.70.name: "2人で1つ"
 bio.70.desc: "銀河全体でその勤勉な仕事ぶりで知られる著名なリーダーが、 実は1人ではなく2人であることが明らかになった。\n\nこのリーダーが完璧なクローンを手に入れ、 交代制で働けるようにしたことが明らかになったのだ。 一方のクローンが公務や事務作業に従事している間、 もう一方は秘密裏に休息と療養に充てていた。\n\nこの衝撃的な事実の発覚は政治界に大きな波紋を起こし、 リーダーシップの真の姿とクローン技術の倫理的境界線に疑問を投げかけた。"
 bio.70.a: "効率的なクローンの活用だ。"
 bio.70.b: "市民をだました2人とも解任だ。"
 bio.75.name: "クローンの反乱"
 bio.75.desc: "クローンに臓器提供をさせるという慣行は、 すでに複雑な事態を引き起こしている。 明らかに知性を持つ複数のクローンが、 長期にわたるハンガーストライキという手段で反乱を起こしている。\n\nオリジナルの個体の健康と寿命を優先すべきだという意見が多い一方で、 知性を持つ存在にはすべて、 個人の自主性を求める権利があるという主張もある。 この問題は現在、 白熱した議論の的となっている。"
 bio.75.a: "移植をやめさせろ。"
 bio.75.b: "オリジナルの個体の権利が最優先だ。"
 bio.80.name: "立証責任"
 bio.80.desc: "法執行機関は困惑している。 首都での犯罪は増加しているにも関わらず、 犯罪者が裁かれる数はかつてないほど減少している。 容疑者は自分のクローンが犯罪を犯し、自分は無罪であると主張しているのだ。\n\n容疑者が現行犯で逮捕されない場合、 有罪を証明することはほぼ不可能になっている。 一部の司法機関は、 ほとんどの非合法活動の事実上の非犯罪化を求めている。"
 bio.80.a: "監視システムを強化しろ。"
 bio.80.b: "法律が少なくなれば、 犯罪も減る。"
 bio.85.name: "そっくりさん"
 bio.85.desc: "領土内で許可されていない大規模なクローニング施設が発見された。 そこには[Owner.Leader.GetTitle][Owner.Leader.GetName]の完璧なコピーが数千人収容されていた。 現場で発見された民間人の科学者は拘束されたが、 誰も白状せず、 クローンを誰が命じたのか知らないと主張している。\n\n証拠から、 [Owner.Leader.GetName][Owner.Leader.GetHerselfHimself]自身 がこの事件の背後にいる可能性があることが示唆されている。 残念ながら、 [Owner.Leader.GetSheHe] は跡形もなく消えてしまった。"
 bio.85.a: "クローンを安楽死させろ。"
 bio.85.b: "クローンの軍隊ができたな。"
 bio.85.b.tt: "([owner.capital_scope.GetName])：\n§Y$clone_army$§!が1つ作られた"
 bio.85.c: "クローンを解放しろ。"
 bio.85.c.tt: "§YPOP§!の集団を得る。"
 bio.86.name: "予期せぬ反動"
 bio.86.desc: "大勢のクローンを安楽死させることによって市民の間で怒りを引き起こし、 深刻な議論が勃発している。 不満を抱く[Owner.GetSpeciesAdj]の人権活動家や宗教団体が大規模な抗議活動を行っている。\n\n一方クローンが脱走し、 一般市民の中に潜んでいるという噂もある。"
 bio.86.a: "何か学べるはずだ…"
 bio.86.b: "治安部隊を派遣して暴徒を鎮圧しろ。"
 bio.86.b.tt: "([owner.capital_scope.GetName])： \n§Y$assault_army_plural$§!が3つ作られる"
 bio.90.name: "変異者の集まり"
 bio.90.desc: "目立った、 あるいは型破りな遺伝子変異を持つ多くの個人が、 社会から疎外されている。 地下に追いやられたこれらの突然変異者は、 独自の集落を形成している。\n\nこれらの地域に足を踏み入れて戻って来た者はほとんどいない。"
 bio.90.a: "集落を一掃せよ。"
 bio.90.b: "ことの進展を監視しろ。 遠くからな。"
 bio.95.name: "遺伝子組み換え反乱"
 bio.95.desc: "社会から疎外された若者たちが、 極端な娯楽の一形態として外見を劇的に変え始めている。\n\n最近のトレンドとしては、 複眼へのマニアックな人気や、 1つの体にどれだけの肢が可能かというコンテストがあり、 現在の記録は156本だ。\n\nこれらのバイオハッカーは世間の注目を集め、 安全性への懸念が高まっている。 遺伝子変異に対する厳格な規制を求める声が高まる中、 我々はこれに対する公式な見解を決定しなければならない。"
 bio.95.a: "ただの遊びだ。 好きにさせろ。"
 bio.95.b: "肢が156本とは多すぎる。"
 bio.100.name: "予期せぬデメリット"
 bio.100.desc: "社会全体に遺伝子操作が広く普及したことにより、 さまざまな身体的変異が生まれるようになった。\n\nかつては予測可能であった生物学的プロセスが予期せぬ逸脱を示すようになり、 標準化はほぼ不可能になっている。\n\nかつて我々の種族をひとつにまとめていた身体的な共通感覚は今や消失しつつあり、 社会の結束を乱すようなさまざまな形態や機能に取って代わられようとしている。"
 bio.100.a: "多様性は推奨するべきだ。"
 bio.100.a.tt: "ランダムな£pop£§HPOP§!が§Y400§!体、 ['trait:trait_bioadaptability']、 ['trait:trait_social_pheromones']、 または['trait:trait_limited_regeneration']の特性を得る。"
 bio.100.b: "標準的な遺伝子テンプレートを強制しろ。"
 bio.105.name: "細胞の無定形性"
 bio.105.desc: "遺伝子導入実験が悲惨な失敗に終わった。 科学者たちは、 被験者のDNAを他の多細胞生物のDNAと結合させ、 超免疫反応を活性化させ、 あらゆるウイルスに感染しないようにしようと試みた。\n\nしかし彼らが創造したのは、 接触した生物の細胞壁を溶かし、 融合して1つの大きな不定形の生物的物質の塊となる生物だ。\n\nこの塊は実験施設を転がり、 その進路にあるものをすべて吸収した。 今のところは封じ込められているが、 もし逃げ出せば重大な被害をもたらすだろう。 幸い、 食べられるようだ……"
 bio.105.a: "塊を無力化せよ！"
 bio.105.b: "塊の研究は危険を冒す価値がある。"
