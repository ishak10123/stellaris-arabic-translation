 SHIP_BEHEMOTH_RAGE: "攻撃腺"
 SHIP_BEHEMOTH_RAGE_DESC: "ベヒモスは気まぐれで、 飼い慣らすことのできない巨獣であり、 長い間コントロールすることはできない。 遅かれ早かれ、 内に秘めた怒りが爆発し、 抑制の効かない宇宙規模の嵐が巻き起こる。 おそらく、 嵐が我々を選ぶまで待つのではなく、 我々が決めたタイミングで嵐を解き放つのが賢明なのかもしれない。"
 behemoth_rage_ship_button: "§H激怒§!\n\n§Yベヒモス§!を解き放つ。 荒れ狂うベヒモスは、 最も近い§Y植民地§!または§Yベヒモスの卵§!に向かい、 それを破壊しようとする。\n通常、 怒りは§Y180日間§!続くが、 いくつかの要因がその期間に影響を与える可能性がある。$TABBED_NEW_LINE$- §R戦闘中§!または§R爆撃中§!にベヒモスが落ち着くことはない。$TABBED_NEW_LINE$- 戦闘で怒るベヒモスを§G倒す§!と、 我々の管理下に戻る。"
