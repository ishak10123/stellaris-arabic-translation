 siege_node: "包囲戦ノード"
 siege_node_desc: "我々は学んだ。 我々は適応した。 我々の防御は崩れない。"
 bio.2036.name: "奴らは学ぶ"
 bio.2036.desc: "生物船による攻撃には、 憂慮すべき傾向が見られる。 攻撃の度に、 連携の改善、 適応戦術、 そして我々の防御に対する組織的な探査が見られるのだ。 センサーの記録では、 エネルギー痕跡と優先ターゲットの変化が示されており、 戦略が進化していることが分かる。 \n\nこれらの生物は、 本能によるものか集合意識によるものか、 より手ごわくなっている。 この行動パターンが続けば、 次の攻撃はさらに撃退が困難になるだろう。"
 bio.2036.a: "防衛者のために祈れ。"
 bio.2036.b: "防衛者に力あれ。"
 bio.2036.tt: "攻撃が成功する度に、 §Y$STARLIT_WORMHOLE_GALACTIC$§!からやってくる艦隊はより強力になる。"
 bio.2040.name: "敵の消失"
 bio.2040.desc: "ポータルからの受信テレメトリーにより、§Y[event_target:starlit_sealed_system.GetName]§!における重大な進展が明らかになった。 生物艦隊と孵化場が、 いずれも未知の勢力によって破壊されたのだ。\n\n[GetInvadersLower]が滅びたことを喜ぶ一方で、 いつか別の勢力が[event_target:starlit_sealed_system.GetName]星系を支配するかもしれないという危険を無視することはできない。\n\nこの戦略的要衝を確保するために、 迅速に行動しなければならない。 再び包囲される前に。"
 bio.2040.a: "味方か…新たな敵か"
