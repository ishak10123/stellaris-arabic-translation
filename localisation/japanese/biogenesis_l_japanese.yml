 feral_insight_name: "$feral_insight$："
 feral_insight_value: "£feral_insight£ $VAL|0$"
 feral_insight_current_value: "現在値：§Y$VALUE|0$§!"
 feral_insight_gaining: "§H危機目標§!を達成すると、 さらに£feral_insight£ §Y$feral_insight$§!が手に入る。"
 feral_insight_desc: "我々は巨大生命体の摂食と行動サイクルを研究している。"
 feral_insight_crisis_objective: "危機目標"
 feral_insight_crisis_objective_gained: "$feral_insight$を獲得"
 feral_insight_crisis_objective_reward: "$REWARD$"
 feral_insight_crisis_objective_progress: "この危機目標から£feral_insight£ $AMOUNT$を獲得した。"
 feral_insight_crisis_description_title: "ベヒモスの危機"
 feral_insight_crisis_description: "$menace_crisis_description_intro$\n\n虚無に生息するリヴァイアサンは、 強大な力を持つ恐るべき存在だが、 目的や野望は持っていない。 彼らの優れた生体機能と我々の強固な知性を組み合わせて、 新たな世代の宇宙生物を作り出せば、 我々は銀河の覇者となれるだろう。"
 feral_insight_crisis_howto_title: "ベヒモスの誕生"
 feral_insight_crisis_howto: "§H危機目標§!を追求すると£feral_insight£ §H野生の知見§!が生み出され、 生物としての潜在能力を完全に引き出せるようになる。"
 feral_insight_crisis_level_unlocked: "$LEVEL$で報酬を得られる：\n"
 feral_insight_crisis_level_locked: "このレベルのアンロックに必要：\n"
 feral_insight_crisis_level_unlock: "野生の知見を£feral_insight£ §Y$CURRENCY$§!保有"
 feral_insight_crisis_level_desc: "危機レベルを上げるには、 £feral_insight£ §H野生の知見§!を集めたり、 危機のスペシャルプロジェクトを研究したり、ベヒモスを育てたりする。"
 #Crisis Perks
 menp_behemoth_objectives: "野生の知見"
 unlocks_behemoth_objectives: "§H危機目標§!を完遂することにより、 £feral_insight£ §Y$menp_behemoth_objectives$§!を得られるようになる。\n"
 menp_behemoth_objectives_desc: "ベヒモスの行動を調べることは、 究極の目標である超越の達成につながる。 我々は、 惑星生まれの生命体に課せられた生物学的制約から解放されるだろう。"
 menp_behemoth_bioship_1: "硬度の高いキチン質"
 menp_behemoth_bioship_1_desc: "過酷な宇宙環境に耐えるには、 分厚い外装が必要だ。 強靭な外装があれば、 どんなに過酷な環境でも生き延びることができる。"
 menp_behemoth_society_1: "実地試験の加速"
 menp_behemoth_society_1_desc: "実験室での研究はよい出発点だが、 研究を前に進めるには、 危険を冒し実地試験を行う必要がある。"
 menp_behemoth_food_1: "巨大作物"
 menp_behemoth_food_1_desc: "ベヒモスの貪欲な食欲を満たすのは容易ではない。 まずは遺伝子組換食品を大規模に生産する必要がある。"
 menp_behemoth_egg: "巨大孵化場"
 unlocks_behemoth_egg: "§Yベヒモスの卵§!の巨大構造物をアンロックする。\n"
 menp_behemoth_egg_desc: "巨大な卵には、 巨大な孵化施設が必要である。 この軌道上孵化施設は、 恒星から離れた場所に設置する必要がある。 ベヒモスを孵化させるには広大なスペースが必要だからだ。"
 menp_behemoth_bioship_2: "効果的な分泌腺刺激"
 menp_behemoth_bioship_2_desc: "我々は、 専用のプローブでベヒモスの内分泌腺を人工的に刺激して成長ホルモンを分泌させ、 発育を促している。"
 menp_behemoth_society_2: "横断的な探求"
 menp_behemoth_society_2_desc: "自然淘汰と生物工学をかけ合わせることで、 無双の力が生まれる。"
 menp_behemoth_food_2: "食料の大規模生産"
 menp_behemoth_food_2_desc: "ベヒモスの貪欲な食欲を満たすのは不可能に近いだろう。 遺伝子組換食品の大規模生産は、 解決に向けた第一歩に過ぎない。"
 menp_behemoth_hatchling: "巨大な幼体群"
 unlocks_behemoth_hatchling: "ベヒモスの卵の巨大構造物を§Y孵化§!させることができる。\n"
 menp_behemoth_hatchling_desc: "ベヒモスの幼体がさまざまな星系に拡散している。 銀河系の隣人たちは、 我々の子どもたちの自由を尊重しなければ、 餌にされるだろう。"
 menp_behemoth_bioships_3: "成長サイクルの加速"
 menp_behemoth_bioships_3_desc: "巨大な宇宙生物の開発を加速させることは、 我々の究極の目標を達成するうえで極めて重要である。 それと並行して、 わが国のインフラの拡大も行っていく。"
 menp_behemoth_society_3: "生物工学の達人"
 menp_behemoth_society_3_desc: "過酷な試行錯誤によって、 我々は科学的な能力を磨いてきた。 そして今では、 銀河随一のバイオエンジニアだと自負している。"
 menp_behemoth_mind_control: "深層思想の形成"
 unlocks_behemoth_mind_control: "§Yベヒモス§!の思考に影響を与えることができる。\n"
 menp_behemoth_mind_control_desc: "我々の集合知は、 より大きく、 より優れたものを絶えず求めている。 我々の野望に限界はない。"
 menp_behemoth_hatchling_2: "限りない成長"
 unlocks_behemoth_hatchling_2: "餌を与えられた§Yベヒモス§!がサナギに変態し、 大きさや力を劇的に増大できるようにする。\n"
 menp_behemoth_hatchling_2_desc: "野獣が解き放たれた。 かつてはただの幼体だった生物が、 野蛮で無慈悲な自然の力へと急速に成長している。"
 menp_behemoth_bioship_4: "より強い生物"
 menp_behemoth_bioship_4_desc: "強烈な飢えと強い怒りに突き動かされ、 ベヒモスの力が制御不能なレベルに達しつつある。 ベヒモスという生物兵器は、 敵や周辺の者を破滅に追い込む準備が整っているのだ。"
 menp_behemoth_mutation_research: "ベヒモスの変異体"
 unlocks_behemoth_mutation_research: "§Yベヒモス§!の遺伝的進化を形作ることができる§Yスペシャルプロジェクト§!をアンロックする。\n"
 menp_behemoth_mutation_research_desc: "成長を続けるベヒモスの遺伝子を組み換え、 最も有益な生理学的特性を強化する。"
 menp_behemoth_mind_control_2: "最優良標本の配置"
 unlocks_behemoth_mind_control_2: "我々は、 §Yベヒモス§!との精神的なつながりをより深める。\n"
 menp_behemoth_mind_control_2_desc: "遺伝子的に完璧な存在は、 わが国内に閉じ込めておくべきものではない。 銀河全体に広める必要がある。"
 menp_behemoth_mind_meld: "脳間通信"
 unlocks_behemoth_mind_meld: "銀河を支配する能力において比類のない、 強大なクラスIVの§Yベヒモス§!を完全に支配する。\n"
 menp_behemoth_mind_meld_desc: "我々の思考はベヒモスに融合され、 ベヒモスの思考は我々に融合される。 ベヒモスの怒りは我々の怒りとなる。 我々は喜んでベヒモスに呑み込まれよう。 獣が我々の集合意識を貪り、 我々は獣の怒りを感じる。 獣は我々となり、 我々は獣となるのだ。"
 menp_behemoth_primal_roar: "原初の咆哮"
 unlocks_behemoth_primal_roar: "最大の獣を呼び出し、虚空の支配をめぐる戦いを挑め。\n"
 menp_behemoth_primal_roar_desc: "怒りに燃える原初の咆哮が、 我々のなかを駆け巡り、 焼き焦がし、 引き裂き、 燃え上がる。 銀河は我々の怒りの炎に焼き尽くされることだろう。"
 menp_behemoth_ever_hungry: "絶え間ない飢餓"
 unlocks_behemoth_ever_hungry: "「$behemoth_finale_situation$」の状況をアンロックする。 この銀河を貪り、 巨大化して力を増大させ、 宇宙最強の捕食者となる。\n"
 menp_behemoth_ever_hungry_desc: "我々は苦痛にもだえている。 絶え間ない飢餓だけが我々の存在理由となっている。 我々のなかに、 どれだけ貪ろうが満たされない空洞がある。 この苦痛を和らげるには、 銀河サイズの食料が必要だ。"
 menp_behemoth_egg_2: "飢えた子孫"
 unlocks_behemoth_egg_2: "§YクラスIVのベヒモス§!が§Y産卵§!し種族を存続させる能力がアンロックされる。\n"
 menp_behemoth_egg_2_desc: "我々の子孫は銀河の残骸を貪り食うだろう。 彼らの飢えは終わりを知らない。 無限の時間のなかで彼らは貪りつづける。"
