 REDUCED_CLONE_DEGRADATION_TITLE: "§H機能をアンロック：§!クローンの劣化の減少"
 REDUCED_CLONE_DEGRADATION_DESC: "§Y$leader_trait_backup_clone_default_plural$§!は['concept_clone_leader_degradation', 劣化]が減少"
 auth_bio_hive_mutation: "適応的自治領"
 auth_bio_hive_mutation_desc: "このハイヴの超適応型ドローンは絶え間ない突然変異を活用して環境や戦術上の課題を克服し、 ダイナミックかつ進化し続ける力を形成している。 適応するたびに集合体は強くなり、 集合意識がどのような状況でも繁栄する中で、 比類のない多様性と耐久力を確保している。"
