 replicatory_association_insurance_platinium: "プラチナ保険"
 replicatory_association_insurance_platinium_name: "$replicatory_association_insurance_platinium$"
 replicatory_association_insurance_platinium_desc: "$councilor_upkeep_skill_header_energy$§R+$@replicatory_association_insurance_upkeep|0$§!\n§Y評議会員§!の§Y$leader_trait_has_backup_clone_plural$§!の['concept_clone_leader_degradation', 劣化]が減少した"
 replicatory_association_insurance_basic: "基本保険"
 replicatory_association_insurance_basic_name: "$replicatory_association_insurance_basic$"
 replicatory_association_insurance_basic_desc: "$ruler_upkeep_skill_header_energy$§R+$@replicatory_association_insurance_upkeep|0$§!\n§Y帝国統治者§!の§Y$leader_trait_has_backup_clone_plural$§!の['concept_clone_leader_degradation', 劣化]が減少した"
 leader_upkeep_skill_header_energy: "スキルレベルごとの£leader£ リーダー$i_energy$維持費："
 councilor_upkeep_skill_header_energy: "スキルレベルごとの£leader£ 評議員$i_energy$維持費："
 ruler_upkeep_skill_header_energy: "スキルレベルごとの£leader£ 統治者$i_energy$維持費："
 policy_homogenous_class: "ゲノム改変"
 policy_homogenous_class_desc: "指導者のクローンを維持するために使用される基本ゲノムの慎重な調整により、 選抜されたエリート集団の最適化が可能になる。"
 homogenous_class_scientists: "科学的規定"
 homogenous_class_scientists_name: "$homogenous_class_scientists$"
 homogenous_class_scientists_desc: "$scientist_plural_with_icon$の§Y$leader_trait_has_backup_clone_plural$§!のための効果：$TABBED_NEW_LINE$- $society_upkeep_skill_header$ §R+$@homogenous_clone_upkeep|0$§! $TABBED_NEW_LINE$- ['concept_clone_leader_degradation', 劣化]が減少"
 homogenous_class_officials: "行政記録"
 homogenous_class_officials_name: "$homogenous_class_officials$"
 homogenous_class_officials_desc: "$official_plural_with_icon$の§Y$leader_trait_has_backup_clone_plural$§!のための効果：$TABBED_NEW_LINE$- $society_upkeep_skill_header$ §R+$@homogenous_clone_upkeep|0$§! $TABBED_NEW_LINE$- ['concept_clone_leader_degradation', 劣化]が減少"
 homogenous_class_commanders: "軍事プロトコル"
 homogenous_class_commanders_name: "$homogenous_class_commanders$"
 homogenous_class_commanders_desc: "$commander_plural_with_icon$の§Y$leader_trait_has_backup_clone_plural$§!のための効果：$TABBED_NEW_LINE$- $society_upkeep_skill_header$ §R+$@homogenous_clone_upkeep|0$§! $TABBED_NEW_LINE$- ['concept_clone_leader_degradation', 劣化]が減少"
