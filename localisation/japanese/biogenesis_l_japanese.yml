 bio.40.b: "$bio.20.b$"
 bio.40.c: "$bio.20.c$"
 #Random Events (Hives)
 bio.110.name: "作業分担"
 bio.110.desc: "[target.GetGestaltEntityName]を生物学的に向上させはじめるにあたり、 我々の文明に最も利益をもたらす強化のみを優先する必要がある。\n\n遺伝子操作を厳選的に行うことで、 特定の産業に最適な望ましい身体的特徴を持つスペシャリストを繁殖させることができる。\n\nこの新たな能力により、 エネルギー生産や防衛に従事する[target.GetIndividualNamePlural]を強化することができる。"
 bio.110.a: "エネルギーはいつでも役に立つ。"
 bio.110.b: "防衛を優先すべきだ。"
 bio.115.name: "世代交代による余剰"
 bio.115.desc: "ドローンに新しい生物的テンプレートを導入するにあたり、 遺伝子改良に適合しないものをどう扱うかを決めなければならない。\n\n古いドローンの中には変化に耐えるだけの強度がないものもある。 そのようなドローンは、 寿命が尽きるまで労働力として保有するか、 あるいは有機物質を再生利用してハイヴに戻すかのどちらかだ。"
 bio.115.a: "古いドローンを再利用しろ。"
 bio.115.b: "まだ使える。"
 bio.120.name: "スピードかスタミナか"
 bio.120.desc: "遺伝子研究における画期的な進歩により、 神経中継の効率を高める方法が明らかになり、 [target.GetIndividualName]の生産性が大幅に向上した。\n\nしかしこの脳の出力増加は長期間の持続ができず、 寿命の短縮につながる。\n\n通常の寿命を維持するか、 寿命の代償として機能を高めるか、 どちらかを選択しなければならない。"
 bio.120.a: "現在の寿命を優先しろ。"
 bio.120.b: "[target.GetIndividualNamePlural]を大量生産しろ。 生産性を上げるのだ。"
 bio.125.name: "シナプス過負荷"
 bio.125.desc: "新たに強化された[target.GetIndividualNamePlural]の一団が[target.GetGestaltEntityName]に統合され、 神経発達と認知プロセスを加速させるために生物工学的な調整が施された。 [target.GetGestaltEntityName]の主要なシナプスノードは、 今までにない速さで機能している。\n\nしかしこの加速化は[target.GetIndividualName]の安定性を損ない、 シナプスが過負荷になるという壊滅的なリスクをもたらしている。 あるいは、 調整作業に割り当てる[target.GetIndividualNamePlural]を増やすこともできる。"
 bio.125.a: "速度を落とし、 安定性を維持しろ。"
 bio.125.b: "太く短く生きるのだ。"
 bio.130.name: "周波数現象"
 bio.130.desc: "新しいクローンをハイヴに統合して以来、 不快な音響振動の問題が発生している。 クローニングの過程で何らかのミスがあったために、 生体伝達物質の発育が妨げられ、 周波数の干渉を引き起こしたのかもしれない。\n\nこれらのクローンがハイヴ全体と交信すると、 近くのドローンはすべて耳鳴りのような大きな音に悩まされ、 不安定な精神状態に陥る。 気が散りやすくなり、生産性は低下するだろう。"
 bio.130.a: "不快だが、 耐えられないものでもない。"
 bio.130.b: "問題のクローンを排除しろ。"
 bio.135.name: "動く問題"
 bio.135.desc: "最近のクローニング実験では、 異常な結果が得られている。 一部のクローンは遺伝子提供者と神経的にリンクしているようで、 意図せず連動して動いてしまうことがあるのだ。\n\nこの現象は距離に関係なく継続し、 銀河の別の場所にあるドローンの動きを個々のドローンが反映している。 これは興味深い可能性を示唆するものだ。\n\nクローンと提供者を同じ環境で連携して作業させる取り組みを実施できるかもしれない。 あるいは、その現象をより詳しく研究するために、 その原因となる神経伝達物質を抽出することもできる。"
 bio.135.a: "遺伝子提供者とクローン用に同一の作業場を用意しろ。"
 bio.135.b: "同期リンクを外科的に切断しろ。"
 bio.140.name: "相容れないクローン"
 bio.140.desc: "ハイヴを強化するために我々は遺伝子提供者の素材からクローンを培養し、 その成熟を人為的に早めた。 これらのクローンは優れた生物学的標本ではあるが、 適合性がない。\n\nこの逸脱は問題ではあるが、 同時に機会をもたらしている。 個々のアイデンティティと独立した思考を持つようになったドローンは、 集合体以外の存在と交信する際に有利に働く可能性がある。 自律的に考える能力は、 統一された意見を持つことが難しい状況で、 相違を埋めるのに役立つはずだ。 しかしこれらの利益には代償が伴う。 個別の意識の高まりは不安につながり、 高度な認知機能の一部に影響を与えている。"
 bio.140.a: "統合を強制しろ。"
 bio.140.b: "可能性を活用しろ。"
 bio.145.name: "創造の懸念"
 bio.145.desc: "集合意識は混乱している。 我々は自分のコピーを作成する能力を持っているが、 そのような行動の有効性と倫理性を疑問視しているため、 なかなか実行に移せない。\n\nクローニングのプロセスには多大な資源が必要だ。 これらの資源は、 特に自然な繁殖の方がより多くの遺伝的多様性をもたらす可能性が高いことを考えると、 他の用途に使った方が良いのではないだろうか？\n\n歴史的に見ても、 これは我々の繁殖方法ではない。 我が種族にこのような根本的な変化を受け入れる準備ができているのかどうか、 確信できずにいる。"
 bio.145.a: "クローニングの効率性は無視できない。"
 bio.145.b: "遺伝の多様性は重要だ。"
 bio.150.name: "ハイヴの疲労"
 bio.150.desc: "突然変異実験により、 ハイヴ内に不規則性が生じている。 かつては簡単に展開できた作業も、 相反する指示が集合意識を疲弊させるため、 今では慎重な試みが必要とされている。\n\nその結果生じる疲労により、 最も効果的なドローンの一部が燃え尽きてしまう恐れがある一方で、 新たな機会も生まれる。\n\n決断しなければならない。 立ち止まって回復を図るか、 自らの限界を超えるか。"
 bio.150.a: "休んだ方がいい。"
 bio.150.b: "休息するのは死んでからだ。"
 bio.151.name: "休んで気分爽快"
 bio.151.desc: "休息と回復という我々の決断は実を結んだ。 かつては不調和だった衝動は落ち着き、 調和のとれた思考の流れに統合され、 明快さを取り戻して集合体を駆り立てるようになった。\n\nかつては燃え尽き寸前だったドローンが、 今ではたゆみなく正確に動作する。 この振り返りの期間は我々の疲労を軽減しただけでなく、 今後の課題に対する決意を固めることにもつながった。"
 bio.151.a: "我々は輝いている！"
 bio.155.name: "特化型かバランス型か"
 bio.155.desc: "突然変異には多くの利点があり、 選択的な強化によりその目的に適うようハイヴを適応させることができる。 硬化したキチン質の付属肢によって、 鉱物生産の特化が可能となった。\n\nあるいは、 すべてのドローンによりバランスの取れた改良を加えることで、 多数の機能を発揮できるようにすることもできる。"
 bio.155.a: "バランス型の方が役に立つ。"
 bio.155.b: "採掘を始めよう。"
 bio.160.name: "表現型の偏り"
 bio.160.desc: "継続的な実験により、 ハイヴに予期せぬ複雑さがもたらされた。 ドローンにトゲのある外骨格、 大型の脚、あるいは奇妙なほど敏感な感覚器官など、 独特な物理的特性が現れている。\n\nこれらの逸脱は明確な利益をもたらす一方で、 代謝負担ももたらす。 ハイヴはこの高まり続ける負担のバランスを取るのに苦労するだろう。 一体どの程度の変異まで許容できるのだろうか？"
 bio.160.a: "変化を受け入れるべきだ。"
 bio.160.b: "結束を維持しなければならない。"
 bio.165.name: "過ぎし日々への憧れ"
 bio.165.desc: "ハイヴは変化している。 ゲノムを変化させることで、 我々は健康状態の改善を確認している。 しかしその反面、 心理的な苦痛に弱くなってしまった。\n\n以前の自分たちが嫌だったわけではない。 だが今はより強く、 より認知的に進歩しているにもかかわらず、 以前の思考パターンの馴染み深さが懐かしく感じられる。\n\nハイヴ全体に、 我々の今の身体が本質的な精神と一致していないという強い違和感がある。 我々は成長しすぎてしまったのだろうか？"
 bio.165.a: "人生に変化は必ず伴う。"
 bio.165.b: "我々の本質を失ってはならない。"
