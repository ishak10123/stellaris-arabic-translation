 approach_brawn: "$behemoth_finale_approach_brawn$"
 behemoth_finale_approach_digestion_tooltip: "毎月の状況進捗速度：§G+2§!"
 behemoth_finale_approach_brawn_tooltip: "毎月の状況進捗速度：§R-0.75§!"
