 ### NEW CIVICS ###
 civic_genetic_identification: "遺伝子識別"
 civic_genetic_identification_desc: "この社会では、 すべての市民は官僚機構のあらゆるレベルで使用される遺伝子リストに出生時から登録することが義務付けられている。"
 civic_corporate_genetic_identification: "シーケンスセキュリティ"
 civic_corporate_genetic_identification_desc: "顧客と従業員の遺伝子配列はすべてデータベースに記録されており、 誰でもわずかな手数料を支払えばアクセスできる。 取締機関は悪事を働く人物を特定するためにこのサービスを頻繁に利用している。"
 civic_corporate_genetic_identification_effects: "- £building£ §Y$building_private_security$§!$megacorp_civic_branch_office_building_effect$"
 councilor_genetic_identification: "インデクサー"
 councilor_genetic_identification_desc: "$TITLE$は遺伝子リストの維持と保管を担当し、 円滑かつ効率的な官僚機構を可能とする。"
 councilor_corporate_genetic_identification: "シーケンスブローカー"
 councilor_corporate_genetic_identification_desc: "アクセスリクエストと収益化計画の評価を任務とする$TITLE$は、 任意の個人の遺伝識別情報を取得することができる。"
 civic_crowdsourcing: "クラウドソーシング"
 civic_crowdsourcing_desc: "この社会は個人のひらめきこそが真のイノベーションの根源であることを理解している。 オープンソース特許、 柔軟な思考、 自発的なコラボレーション、 イノベーション奨励金は進歩への道を開く。"
 civic_crowdsourcing_effects: "$t$- 派閥は$r_unity$の代わりに$r_research$を産出する$TABBED_NEW_LINE$- ゲーム開始直後に帝国内で派閥が結成されるが、 最初の10年間は派閥の産出量が減少する"
 civic_corporate_crowdsourcing: "分散化した研究開発"
 civic_corporate_crowdsourcing_desc: "定期的に開催される部署間のイノベーションコンテストが、 この企業の研究開発イニシアティブを促進している。"
 civic_corporate_crowdsourcing_effects: "$civic_crowdsourcing_effects$$TABBED_NEW_LINE$- £building£ §Y$building_private_research_initiative$§!$megacorp_civic_branch_office_building_effect$"
 civic_tooltip_not_crowdsourcing: "['Concept_crowdsourcing_civics']の国是を保持していない"
 concept_crowdsourcing_civics: "クラウドソーシング"
 concept_crowdsourcing_civics_desc: "国是「$concept_crowdsourcing_civics$」は以下で構成される：$NEW_LINE$- ['civic:civic_crowdsourcing']$NEW_LINE$- ['civic:civic_corporate_crowdsourcing']"
 councilor_crowdsourcing: "イノベーション調整官"
 councilor_crowdsourcing_desc: "$TITLE$は特許の公正な利用を監督し、 政府の技術的優先事項に沿った研究インセンティブの創出を任務としている。"
 councilor_corporate_crowdsourcing: "アイデア審判員"
 councilor_corporate_crowdsourcing_desc: "すべてのプロジェクトに投資する価値があるわけではない。 その市場性と収益性を評価することが、 $TITLE$の義務である。"
 civic_civil_education: "市民教育"
 civic_civil_education_desc: "この帝国では法の執行に代わって教育が実施されている。 包括的な準備と厳格な軌道修正により、 すべての個人に教育が及ぶようにしている。 結局のところ、 悪い市民など存在せず、 いるのは悪い教育者だけなのだ。"
 civic_civil_education_effects: "$t$- すべての£job_enforcer£ ['concept_enforcer']が£job_educator£ ['concept_educator']に置き換えられる$TABBED_NEW_LINE$- すべての£building£ ['building:building_precinct_house']が£building£ ['building:building_state_academy']に置き換えられる"
 councilor_head_of_education: "最高教育責任者"
 councilor_head_of_education_desc: "$TITLE$はすべての市民が仕事をするだけでなく、 人生の複雑な局面を切り抜けられるだけの知識を身につけられるよう導くことを任されている。 優れた教育は繁栄する社会を促進する。"
 educator: "$job_educator$"
 job_educator: "教育者"
 job_educator_plural: "教育者"
 job_educator_desc: "若者たちの準備に専念する、 疲れを知らない知識の伝道者たちは、 すべての市民が銀河に立ち向かう準備ができるよう、 かけがえのない教育に取り組んでいる。"
 job_educator_effect_desc: "£job_educator£ $job_educator_plural$は、 $r_consumer_goods$を消費して$r_unity$を産出し、£crime£ §Y$PLANET_CRIME_TITLE$§!を減少させ、 §Y統治志向による人気§!を増加させ、£defense_army£ §Y防衛軍§!を編成する。"
 mod_job_educator_add: "$job_educator$の職業枠"
 building_state_academy: "国家アカデミー"
 building_state_academy_desc: "ここでは健全な社会に必要な基礎知識が教えられる。"
 concept_state_academy: "$building_state_academy$"
 concept_state_academy_desc: "$job_educator$の職業枠：§G+200§!\n\n$job_educator_effect_desc$\n$h_line$§L$building_state_academy_desc$§!"
 building_center_of_guidance: "指導センター"
 building_center_of_guidance_desc: "社会生活のあらゆる側面を学ぶ。 この巨大な学校・研修施設群では、 どんな逸脱も修正することができる。"
 mod_planet_jobs_citizen_produces_mult: "完全市民権POPの資源産出"
 civic_hive_familiar_face: "見慣れた顔"
 civic_hive_familiar_face_desc: "直接対立よりも協力が望ましい。 この集合意識は、 対話相手の姿やしぐさを模倣できるよう外交用ドローンを進化させた。"
 civic_wilderness_familiar_face: "$civic_hive_familiar_face$"
 civic_wilderness_familiar_face_desc: "直接対立よりも協力が望ましい。 このウィルダネスは、 対話相手の姿やしぐさを模倣できるよう外交用アバターを進化させた。"
 civic_hive_familiar_face_effects: "使節や官僚の身体は配属先の帝国の姿をとる。\n§Y外交活動§!を行うのに必要な§Y信用§!：§G-50%§!"
 #Bioship Civics
 civic_hive_shared_genetics: "共有された遺伝子"
 civic_hive_shared_genetics_desc: "このハイヴの突然変異したゲノムは生物船を成長させるための基礎として使用され、 その艦隊は本質的にドローンと結びついており、 その種族の独自性から力を得ている。"
 civic_wilderness_shared_genetics: "$civic_hive_shared_genetics$"
 civic_wilderness_shared_genetics_desc: "このウィルダネスのゲノムは、 生物船を成長させるのに適した基地へと突然変異した。 その艦隊は本質的に他の共生体と結びついており、 それぞれの種が互いに力を引き出している。"
 civic_hive_shared_genetics_effects: "- §Gポジティブ§!な主な種族特性1つにつき：船体§G+2.5%§!、 維持費§R+0.5%§!。\n- §Gネガティブ§!な主な種族特性1つにつき：艦船連射レート§G+1.5%§!維持費§R+0.5%§!。"
 shared_genetics_fire_rate: "$civic_hive_shared_genetics$：連射レート"
 shared_genetics_fire_rate_desc: "我々の艦船はホルモンと怒りのちょうど良いバランスによって刺激された攻撃性から恩恵を受けている。"
 shared_genetics_hull: "$civic_hive_shared_genetics$：船体"
 shared_genetics_hull_desc: "我々の艦船の筋肉と骨量は、 我が種族の遺伝的優位性によって支えられている。"
 civic_hive_aerospace_adaptation: "航空宇宙への適用"
 civic_hive_aerospace_adaptation_desc: "この集合体の生物船は大気圏間飛行に特に適しており、 近接航空支援任務の遂行や、 惑星の物流支援さえも可能にする。"
 civic_hive_aerospace_adaptation_effects: "- §G友好的§!な植民地の軌道上にいる§Y生物船§!の維持費§G-50%§!。\n- 軌道上に§Y生物船§!がいる§G友好的な§!コロニーの§Y建設速度§!、 §Y快適度§!、 §Y障害物除去速度§!、 そして艦隊の大きさによっては§Y職業産出量§!が上昇する。\n- §R敵対§!する植民地の軌道上にいる§Y生物船§!の維持費§G-85%§!。"
 aa_ship_upkeep_friendly: "$civic_hive_aerospace_adaptation$"
 aa_ship_upkeep_bombing: "$civic_hive_aerospace_adaptation$"
 aa_ship_planet_support_1: "$civic_hive_aerospace_adaptation$"
 aa_ship_planet_support_1_desc: "この惑星の軌道上を周回する生物船は、 休息や食事、 惑星上のドローン支援のために定期的に大気圏を出入りしている。"
 aa_ship_planet_support_2: "$civic_hive_aerospace_adaptation$"
 aa_ship_planet_support_2_desc: "$aa_ship_planet_support_1_desc:$"
 aa_ship_planet_support_3: "$civic_hive_aerospace_adaptation$"
 aa_ship_planet_support_3_desc: "$aa_ship_planet_support_1_desc:$"
 aa_ship_planet_support_4: "$civic_hive_aerospace_adaptation$"
 aa_ship_planet_support_4_desc: "$aa_ship_planet_support_1_desc:$"
 civic_machine_stalwart_network: "強固なネットワーク"
 civic_machine_stalwart_network_desc: "この機械知性は強固な防御とヒット・アンド・ランのプロトコルを組み合わせた防衛的な軍事手順に特化している。"
 defensive_stations_tracking_add: "$t$- 星系基地と防衛ステーション追尾"
