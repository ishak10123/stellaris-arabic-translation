 concept_genetic_purity: "種族の遺伝的完全性"
 concept_genetic_purity_desc: "['Tradition_category:tradition_purity']を採用した統治形態には、 その£pop£ §H有機生命体POP§!と£leader£ §Hリーダー§!に適用されるスケーリング効果と修正がある。$TABBED_NEW_LINE$- §Gポジティブ§!な種族特性に特製ポイントを使うことによって増加。$TABBED_NEW_LINE$- §Rネガティブ§!な種族特性から特製ポイントを得ることによって減少。"
 trait_leader_genetic_purist: "遺伝的純粋主義者"
 trait_leader_genetic_purist_desc: "このリーダーの仕事は、 揺るぎない遺伝的完全性のビジョンと、 あらゆる不完全さに対する不寛容によって導かれている。"
 auth_bio_democratic_purity: "表現型の自律性"
 auth_bio_democratic_purity_tt: "$pop_effects_from_purity_header$ $TABBED_NEW_LINE$- £mod_pop_happiness£ $MOD_POP_HAPPINESS$：$plus_minus_icon$§Y$@purity_traits_happiness|1%$§! $DOUBLE_NEW_LINE$$authority_grants_genetic_purist_tt$ $TABBED_NEW_LINE$- $mod_leaders_upkeep_mult$ $minus_plus_icon$§Y2.5%§! $TABBED_NEW_LINE$- $MOD_LEADER_SPECIES_EXP_GAIN$ $plus_minus_icon$§Y2.5%§!"
 auth_bio_democratic_purity_desc: "身体的な自己決定は権利である。 国家は個人が自分の身体を自由に改造することを認める。 頭に思い描く改造はすべて叶い、 身体は究極のキャンバスとなる。"
 auth_bio_oligarchic_purity: "優生学的な階級社会"
 auth_bio_oligarchic_purity_tt: "$eugenic_political_power_effects$"
 auth_bio_oligarchic_purity_desc: "絶対的な権力は、 遺伝的に選ばれたエリート、 すなわちこの文明の運命を最も純粋かつ有能に管理する者に委ねられなければならない。 各市民は彼らの下であらかじめ決められた役割を果たす。 彼らが受け継いだ遺伝的潜在能力に合わせて綿密に調整された役割だ。 満足感は野心からではなく、 与えられた目的を受け入れることから得られる。"
 eugenic_political_power_effects: "$pop_effects_from_purity_header$ $TABBED_NEW_LINE$- $MOD_POP_BONUS_WORKFORCE_MULT$：$plus_minus_icon$§Y$@purity_traits_bonus_workforce_mult|2%$§! $DOUBLE_NEW_LINE$$authority_grants_genetic_purist_tt$ $TABBED_NEW_LINE$- $MOD_COUNCIL_AGENDA_PROGRESS_SPEED$：$plus_minus_icon$§Y$@purity_traits_council_speed|Y1%$§!"
 auth_bio_dictatorial_purity: "核司法"
 auth_bio_dictatorial_purity_tt: "$pop_effects_from_purity_header$ $TABBED_NEW_LINE$$pop_group_unit$ £pop£ POPあたりの£society£社会学研究産出量：$plus_minus_icon$§Y$@purity_traits_resource$§! $DOUBLE_NEW_LINE$$authority_grants_genetic_purist_tt$ $TABBED_NEW_LINE$- 惑星の$MOD_PLANET_CRIME_ADD$：$minus_plus_icon$§Y5.0§! $TABBED_NEW_LINE$- セクターの$MOD_PLANET_CRIME_ADD$：$minus_plus_icon$§Y2.5§! $TABBED_NEW_LINE$- 惑星の$MOD_PLANET_STABILITY_ADD$：$plus_minus_icon$§Y5.0§! $TABBED_NEW_LINE$- セクターの$MOD_PLANET_STABILITY_ADD$：$plus_minus_icon$§Y2.5§!"
 auth_bio_dictatorial_purity_desc: "この政府は遺伝子および生体認証データを先制的な正義の手段として活用し、 犯罪傾向を調べるためにすべての市民の遺伝子コードを精査している。 犯罪を犯す前に介入することで、 綿密な監視を通じて秩序を維持しているのだ。 真の正義とは犯罪を未然に防ぐものであり、 犯罪を根絶することで社会を守るものである。"
 auth_bio_imperial_purity: "生物的自治領"
 auth_bio_imperial_purity_tt: "['concept_genetic_purity']による£leader£ §Y$imperial_ruler$§!と§Y後継者§!の効果：$TABBED_NEW_LINE$- $MOD_LEADER_SKILL_ADD$：$plus_minus_icon$§Y$@purity_traits_imperial_level|2$§! $DOUBLE_NEW_LINE$ §Y[Ruler.GetTitle]の種族§!の£leader£ リーダーは§Y$imperial_bloodline$§!の特性を獲得する\n['concept_genetic_purity']による£leader£ §Y帝国の血統§!の効果：$TABBED_NEW_LINE$- $MOD_LEADER_LIFESPAN_MULT$：$plus_minus_icon$§Y$@purity_traits_imperial_bloodline|1%$§! $TABBED_NEW_LINE$- $MOD_LEADER_SPECIES_EXP_GAIN$：$plus_minus_icon$§Y$@purity_traits_imperial_bloodline|1%$§!"
 auth_bio_imperial_purity_desc: "遺伝子の卓越性を擁護するこの政府はリーダーの寿命を延ばし、 生物学的完璧さを執拗に追求している。 社会の繁栄は最も優れた遺伝子のみが生き残り、 繁殖することにかかっており、 優越性によって定義される未来を確実なものとしている。 遺伝子プールの妥協なき管理は長寿と完璧さという究極の報酬とともに進歩を保証する。"
 auth_bio_corporate_purity: "有機生命体組織"
 auth_bio_corporate_purity_tt: "$organic_leaders_have_trade_upkeep$\n\n$pop_effects_from_purity_header$$TABBED_NEW_LINE$- $pop_group_unit$£pop£ POPあたりの$r_trade$産出量：$plus_minus_icon$§Y$@purity_traits_resource$§!$DOUBLE_NEW_LINE$"
 auth_bio_corporate_purity_desc: "この巨大企業は利益のために臓器を培養し、 生命そのものの商品化を完成させた。 最高品質の臓器は最高値で取引される一方、 「余剰」資産は闇市場に流れる可能性がある。 闇の仲介業者や闇市場の外科医が繁盛し、 絶望的な購入者のニーズに応え、 資産が無駄になることはないようにしている。"
 #Cloning
 auth_bio_democratic_cloning: "合意的複製"
 auth_bio_democratic_cloning_tt: "$ENABLES_BACKUP_CLONES$\n§Y$leader_trait_backup_clone_default$§!維持費：§G$@cordant_multiplicity_clone_upkeep|0%$§!\n§Y$leader_trait_backup_clone_default_plural$§!は['concept_clone_leader_degradation', 劣化]が減少し、 §Y$leader_trait_has_backup_clone_plural$§!を所有できない"
 auth_bio_democratic_cloning_desc: "この政府は平等と進歩の証としてクローン技術を受け入れている。 クローンは自然に生まれた者たちと肩を並べ、 その声は平等に尊重される。 クローンであろうとなかろうと、 あらゆる視点の多様性によって人々の意思はより豊かになる。"
 auth_bio_oligarchic_cloning: "複製摂政"
 auth_bio_oligarchic_cloning_tt: "$ENABLES_BACKUP_CLONES$\n§Y$leader_trait_has_backup_clone$§!の特性は評議会員に追加の効果を付与する\n§Y$leader_trait_backup_clone_default_plural$§!は評議会の一員である間、['concept_clone_leader_degradation', 劣化]が減少\n"
 auth_bio_oligarchic_cloning_desc: "この社会は優れたクローンの血統を途切れさせないことに権力を集中させることで、 エリート層による永遠の支配を確かなものとしている。 クローン技術は彼らの遺伝的遺産を保存し、 完璧なものとし、 指導者の地位を継承し続けることを可能にしている。 影響力のあるあらゆる地位には同一の高貴な血統の改良版が就いており、 世代を超えて彼らの支配を確固たるものとしている。"
 auth_bio_dictatorial_cloning: "同種服従"
 auth_bio_dictatorial_cloning_tt: "$ENABLES_BACKUP_CLONES$\n$AVAILABLE_POLICIES$ §Y$policy_homogenous_class$§!"
 auth_bio_dictatorial_cloning_desc: "絶対的な忠誠心は綿密な遺伝子選択によって確かなものとなり、 揺るぎない服従を宿命づけられた者だけがクローニングの対象として選ばれる。 これにより、 反逆が起こる可能性が低いだけでなく、 生物学的に不可能な自己永続的社会が生まれ、 市民設計の構造を通して途切れることのない調和がもたらされる。"
 auth_bio_imperial_cloning: "遺伝的継続"
 auth_bio_imperial_cloning_tt: "$ENABLES_BACKUP_CLONES$\n§Y$leader_trait_backup_clone_imperial$§!特性のペナルティが増えない"
 auth_bio_imperial_cloning_desc: "統治者による疑う余地のない正義は、 クローン技術によって残され、 偉大な君主は前世の知恵と功績を継承しながらその地位を繰り返し継承していく。 途切れることのない指導者の連続性は、 啓蒙的な統治の下で永遠の黄金時代を維持し、 社会が永遠に進歩を続けるよう保証する。"
 auth_bio_corporate_cloning: "複製的加盟国"
 auth_bio_corporate_cloning_tt: "$organic_leaders_have_trade_upkeep$\n$ENABLES_BACKUP_CLONES$\n£building£ ['building:building_clone_vats']の$mod_planet_jobs_trade_produces_mult$：§G+$@replicatory_association_trade_mult|0%$§!\n£building£ §Y$building_clone_vats$§!の£mod_planet_amenities_add£ 惑星快適度：§G+$@replicatory_association_amenities_add|0$§!\n$AVAILABLE_POLICIES$§Y$policy_replicatory_association_insurance$§!"
 auth_bio_corporate_cloning_desc: "他に類を見ない利便性と快適さが、 手の届くところにある。 予備部品として自分のクローンを手に入れたり、 亡くなった愛する人の複製品を依頼したりできる。 この巨大企業は最先端技術を使用しつつ精密な複製による慰めを約束し、 すべての複製品において93%の正確性を保証している。"
 AUTHORITY_HAS_CLONE: "$t$§Y統治者が死んだ§!場合、 §Y$leader_trait_backup_clone_imperial$§!が新しい統治者となる。$TABBED_NEW_LINE$§Y$leader_trait_backup_clone_imperial_plural$§!は['concept_clone_leader_degradation', 劣化]が減少。"
 policy_replicatory_association_insurance: "複製保険"
 policy_replicatory_association_insurance_desc: "優先的なクローンへのアクセスは、 役員およびその他の選抜された主要人員に対して報酬の一部として付与される。"
 replicatory_association_insurance_stellar: "ステラ保険"
