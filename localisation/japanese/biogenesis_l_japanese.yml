 #General Events
 action.1.desc_109: "§H穏やかで順序立った通信ではなく、 3つの異なる信号が無秩序に飛び込んできた。 内容は大きく異なるが、どれも同じ声だ。§!\n\n信号1：[GetPrimaryHiveFEConversation]\n信号2：[GetSecondaryHiveFEConversation]\n信号3：[GetTertiaryHiveFEConversation]\n\n§Hこの時点で、 音声は乱れてかき消された。 分析の結果、 それぞれの信号には難解な名前が含まれていることが判明した。 便宜上、 我々はこれらの名前を§Y[GetPrimaryHiveFEName]§!、 §Y[GetSecondaryHiveFEName]§!、 §Y[GetTertiaryHiveFEName]§!と翻訳した。§!"
 war_first_hivefe: "「か弱い生き物だ。 どうやって戦うつもりだ？ ……お前たちが苦しんだり、 おしゃべりしたりするのを眺めるのは、 面白いだろうな……なぜ——」"
 growth_first_hivefe: "「豊かな命！ それによく肥えている。 お前たちは必要に迫られて成長するのか、 それとも自らの意思で成長するのか？ 思い出せん。 なぜ——」"
 control_first_hivefe: "「なんという体だ……お前たちの[Species.GetEyeNamePlural]は中心から3%ずれている。 これは修正せねばならん。 従ってもらうぞ。 なぜ——」"
 war_second_hivefe: "「——役立たずのシールドだ、 恒星の中心部にすら効かない。 お前たちにはこの銀河が恐ろしいだろう。 お前たちは——」"
 growth_second_hivefe: "「——口が足りないな。 3次[Species.GetMouthName]があれば、 多少よくなるかもしれぬ。 お前たちは——」"
 control_second_hivefe: "「——なんと不完全な言語だ。 無秩序な文法は合理化せねばならぬ。 我らの変更を適用して——」"
 bio.3000.name: "熟考"
 bio.3000.desc: "§H没落した帝国の断片によるいつもの不協和音が消えた。 3つの声が調和し、 それぞれの声が怒りに満ちている。§!\n\n愚かな[owner.GetSpeciesName]め！ 最終思考システムに侵入するとは。 はっきり言っておこう。 お前たちの[owner.GetEyeNamePlural]はこの場所には耐えられん。 これ以上進めば、 悲惨な結末が待っている。 その痛みは——想像を絶するだろう。\n\n我々を——それを——我を邪魔するな。"
 bio.3000.a: "緊急FTLを起動せよ。"
 bio.3000.b: "立ち去るつもりはない。"
 bio.3005.name: "再考"
 bio.3005.desc: "§H声の調和が——合唱が——再び始まり、 3つの声が1つになった。§!\n\n——いけ！ 立ち去れ！ 立ち去れ！ 立ち去れ！ 立ち去れ！ 立ち去れ！ 立ち去れ！ 立ち—— "
 bio.3005.a: "緊急FTLを発動せよ！"
 bio.3005.b: "お前たちの秘密を暴いてやる。"
 #Task Events
 #War
 bio.3105.name: "最強の生き残り"
 bio.3105.desc: "今日こそ、 か弱い[root.GetSpeciesNamePlural]の実力を見せていただこう！ 我らには新しい品種の生物船がある。 こいつはすでに、 孵化したばかりの仲間を皆殺しにしている。 今度は異種生物でその力を試すときだ。 標本が§Y[target_system.GetName]§!に間もなく到着するはずだ。\n\nせいぜい面白いデータを提供してくれたまえ。"
 bio.3105.militarist: "やってやろうじゃないか！"
 bio.3105.a.tooltip: "没落した帝国の実験船がまもなく§Y[target_system.GetName]§!に到着する"
 bio.3105.b: "遠慮してもいいか？"
 NAME_New_Breed: "新たな種"
 NAME_Experimental_Ship: "実験船"
 bio.3110.name: "失望"
 bio.3110.desc: "実験種はまだ生きているぞ。 お前たちはまだ弱すぎる。\n\nアメーバでも送り込むべきだったな。"
 bio.3110.a: "なんだって？"
 bio.3120.name: "教訓"
 bio.3120.desc: "素晴らしい。 こいつが火を避けることを見抜き、 それをうまく利用するとは。 心配するな、 この欠点は次の世代が孵化するまでには修正される。\n\n成長したな、 若き[root.GetSpeciesName]よ。 覚悟しておくがいい。"
 bio.3130.name: "不気味な静けさ"
 bio.3130.desc.notruce: "ここのところ、 戦闘に従事していないようだな。 どうしたのだ？ 若い帝国は戦わなければ滅びるのみだ。 良い対戦相手を見つけてやったぞ。§Y[unfortunate_country.GetName]§!だ。 10年以内に奴らを倒せば、 汝らはこの先も確実に発展するだろう。"
 bio.3130.desc.truce: "$bio.3130.desc.notruce$\n\n休戦協定なら心配無用だ。 あれはもう破棄された。"
 bio.3130.a: "何とバカバカしい……"
 bio.3130.a.pacifist: "戦いだけが発展の道ではない！"
 bio.3130.a.militarist: "すばらしい！"
 bio.3150.name: "平和という選択肢"
 bio.3150.desc: "若き[Root.GetName]よ、 警告と課題を与えよう。\n\n周りのものをすべて手に入れるのは気分がいいかもしれぬが、 戦争を真に理解するには、 平和も知らねばならない。\n\nこれまでに何を得たのか、 10年かけて振り返るがいい。 我々を信じるのだ。 休息を取れ。 さもなくば破滅あるのみだ。"
 bio.3150.a.mean: "なんの戯れ言だ？"
 bio.3150.a.pacifist: "なんと賢明な意見だ！"
 #Growth
 bio.3205.name: "生態系のアップグレード"
 bio.3205.desc: "バイオマスなら発送が遅れている。 いや、 待て……汝らは§Y[targetrivalname.GetName]§!ではないな。\n\nなぜ邪魔をするのだ？\n\nおお、 そうだ。 汝らは長いあいだ休眠していたサンプルを受け取るべき存在。 何千年ものあいだ、 大切に保管されてきたゲノムだ。 機が熟すまで、 我々は解放のときを待っていたのだ。 汝らの§Y[target_planet.GetName]§!の植民地は、 理想的な受容体だ。 その生物圏はすぐに支配下におかれるだろう。"
 bio.3205.a: "承諾する。"
 bio.3205.a.planetscaper: "手順を教えてくれ！"
 bio.3205.b: "§Y[alternate_planet.GetName]§!でもいいのでは？"
 bio.3205.b.planetscaper: "§Y[alternate_planet.GetName]§!のほうが、 ずっといい実験台だ！"
 bio.3205.c: "ばかげた要求だ。 断る！"
 bio.3205.c.environmentalist: "なんとひどいことを！"
 bio.3210.name: "生態系の改造"
 bio.3210.desc.base: "§Y[fallen_empire_hive_growth.GetName]§!が§Y[root.GetName]§!の改造を完了した。 その影響は予測不可能だったが、 いまやその効果は明白である。"
 bio.3210.desc.radio_bugs: "$bio.3210.desc.base$\n\n惑星全体で土着の昆虫が、 我々のワイヤレス機器と同じ周波数でコミュニケーションをとるようになった。 鳴き声ひとつで自動ドアを操作し、 群れともなると工場を停止させることもある。 周波数を切り替えて対応しているが、 すべての施設が完全に元通りに稼働することはないだろう。"
 bio.3210.radio_bugs.accept: "なんとかやっていけるだろう。"
 bio.3210.radio_bugs.purge: "なんてことだ。 昆虫をすべて駆除しろ！"
 bio.3210.radio_bugs.purgeota: "アップデートは失敗だ。 虫どもを一掃しろ。"
 radio_bugs: "無線虫"
 radio_bugs_desc: "この惑星の電波は、 人工的に改変された昆虫の鳴き声で満たされている。"
 mod_planet_districts_cities_society_research_produces_add: "£district£の都市および巣窟区域の£society_research£ $society_research$"
 bio.3210.desc.world_of_thought: "$bio.3210.desc.base$\n\n惑星全体で、 かつてはは草を食み泥浴びをして平和に暮らしていた生物が、 いまや我々に立ち向かい存在に関するの我々の理解を揺るがしている。 没落した帝国は、 この世界の生物の大部分を改変してしまった。"
 bio.3210.world_of_thought: "[fallen_empire_hive_growth.GetName]にそんなことができるのか！？"
 bio.3210.world_of_thought.homicidal: "彼らにとっては不幸なことだ。"
 bio.3210.world_of_thought.tt: "§Y[This.GetName]§!で新たに§Y500§!£pop£ §HPOP§!が知性を獲得した。"
 bio.3210.desc.world_alight: "$bio.3210.desc.base$\n\n惑星が輝いている。 文字どおり輝いているのだ。 改造によって惑星のさまざまな生物が発光し、 エンジンのような音を絶えず発するようになった。 夜は実質的に消え去った。 [owner.GetColonistPlural]に停電設備を提供する必要がある。"
 bio.3210.world_alight.accept: "[owner.GetEyeNamePlural]が邪魔になるとは。"
 bio.3210.world_alight.reject: "覆い隠せ。 切り刻め。 これ以上耐えられん！"
 world_alight: "輝く世界"
 world_alight_desc: "この惑星には夜がない。 改造を施された動物たちが絶えず発光し、 耳障りな振動を発するようになった。 この惑星に暮らす者は、 この過酷な環境に耐えるだけでも多大なサポートが必要だろう。"
 bio.3220.name: "遺伝子改造の楽しみ"
 bio.3220.desc: "汝らの国に生息する§Y[boring_species.GetName]§!種族は、 がっかりするほど単純だ。 その存在は可能性の空虚な残響にすぎない。 進化の停滞は、 我々の集団的意志に対する冒涜である。 この失敗を正すため、 3つの改良方法のいずれかを与えよう。\n\n我らを退屈させるな。"
 bio.3220.tt: "§Y$evolutionary_predators_situation$§!状況が§G50%§!進捗する。"
 bio.3220.humanoid: "ヒューマノイドの改良を希望する。"
 bio.3220.mammalian: "哺乳類の改良を希望する。"
 bio.3220.reptilian: "爬虫類人の改良を希望する。"
 bio.3220.avian: "鳥人の改良を希望する。"
 bio.3220.arthropoid: "虫人の改良を希望する。"
 bio.3220.molluscoid: "軟体人の改良を希望する。"
 bio.3220.fungoid: "菌類種族の改良を希望する。"
 bio.3220.plantoid: "植物種族の改良を希望する。"
 bio.3220.lithoid: "岩石種族の改良を希望する。"
 bio.3220.necroid: "ネクロイドの改良を希望する。"
 bio.3220.aquatic: "水棲種族の改良を希望する。"
 bio.3220.toxoid: "トキソイドの改良を希望する。"
 bio.3220.infernal: "好熱種族の改良を希望する。"
 bio.3220.psionic: "超能力の改良を希望する。"
 bio.3220.evopred: "この状況を長く維持するつもりはない。"
 bio.3220.b: "お前たちの気まぐれのために種族を改造するつもりはない！"
 bio.3230.name: "珍しい特性"
 bio.3230.desc: "お前たちの種族の一部が、 我々の広大な遺伝子保管庫には存在しない独特な特性を発達させていることを確認した。 お前たちは分析以上のものを提供しなくてはならない。 我々は§Y[fallen_empire_hive_growth.species.GetInterestingTraitName]§!の生きたサンプルを必要とする。 恐れることはない。 [interesting_species.GetName]がまるごと1体必要なわけではない。 [interesting_species.GetHandName]さえあれば、 代替えを育成することができる。"
 bio.3230.a: "壮大なる計画のためなら、 [interesting_species.GetHandName]一つくらい些細な犠牲だ。"
 bio.3230.b: "我々の遺伝子構成をお前たちに託すことはできない！"
 #bio.3245.name: "Eternal Harvest"
 #bio.3245.desc: "We have discovered a derelict transport from the §Y[fallen_empire_hive_growth.GetName]§! in the §Y[transport_system.GetName]§!. Initial scans show it is carrying samples of the Fallen Empire's special crop strain, capable of feeding trillions.\n\nThe transport has been left derelict for months already and we have not seen any movement from the [fallen_empire_hive_growth.GetName] to retrieve it. Could this be a test or a glorious opportunity?"
 #Control
 bio.3305.name: "完全なコレクション"
 bio.3305.desc: "§Hこれは録音されたメッセージである。 返答を試みても無駄だ。§!\n\n通信内容は、 汝らの理解力と言語的限界に合わせて調整されている。 §Y[target_pop.GetSpeciesName]§!は直ちに降伏し、 同化しなければならない。 逸脱は一切認めない。\n\n輸送機がすでに§Y[target_pop.Planet.GetName]§!の外に待機している。 与えられた時間はわずかだ。 従わなければ安定度が低下するだろう。"
 bio.3305.a: "従うしかない。"
 bio.3305.a.tooltip: "§Y[target_pop.Planet.GetName]§!の§Y[target_pop.GetSpeciesNamePlural]§!1名が§Y[fallen_empire_hive_control.Capital.GetName]§!に輸送される"
 bio.3305.b: "欲しければ奪ってみろ！"
 bio.3305.followup: "§H我々は§Y[fallen_empire_hive_control.GetName]§!からの通信を受け入れた。 古代の[fallen_empire_hive_control.GetSpeciesName]だと思っていたら、 挨拶したのはよく知る§Y[target_leader_fe_control.Species.GetName]§!であった。§!\n\n"
 bio.3310.name: "恐れるな"
 bio.3310.desc: "$bio.3305.followup$今日は、 汝らにとって重要な瞬間である。 汝らの種族の遺伝子配列は保護され、 全体に統合された。 汝らの未来は定まった。 汝らはいずれ我々と融合するのだ。"
 bio.3310.familiar_face: "我々も他の者にこんな思いをさせているのか？"
 bio.3315.desc: "$bio.3305.followup$時間があまりない。 ここ§Y[fallen_empire_hive_control.Capital.GetName]§!で彼らが我々に行っている実験は、 残酷極まりないものだ。 どれほど憎い相手でも、 こんな仕打ちは許されない。 奴らの断片が我々を支配するのを、 このデータパケットの中身が阻止してくれることを祈る。"
 bio.3315.a: "データパケットを受け取る。"
 bio.3315.tooltip: "§G50%§!の確率で、 データパケットにはテスト用ではなく§Y没落した帝国§!の真の秘密が含まれている。"
 bio.3315.b: "これは罠だ！ 通信を終了しろ！"
 bio.3330.name: "重要な議題"
 bio.3330.desc: "汝らに欠陥が多すぎて、 状況の深刻さを理解できないことがないよう祈る。 汝らの優柔不断な§Y銀河共同体§!が決議を提案した。 この決議は§Y[GetPassFail]§!されなければならない。 汝らの論点を練るために、 我々の優れた知識を活用することを許そう。 汝らに本当に考える能力があるならば、 注意せよ。\n\n§H没落した帝国は我々との通信を終了した。§!"
 bio.3330.a: "今なにが起こったのだ？"
 bio.3330.b: "これは正しいやり方ではない！"
 fail_resolution: "否決"
 pass_resolution: "可決"
 fe_political_support: "古代の政策"
 fe_political_support_desc: "没落した帝国の支援があれば、 論争でも議事妨害でも楽勝だ。"
 fe_political_opposition: "$fe_political_support$"
 fe_political_opposition_desc: "$fe_political_support_desc$"
 MESSAGE_PASS_HIVE_FE_TASK_TITLE: "没落した帝国の断片が満足"
 MESSAGE_PASS_HIVE_FE_TASK: "我々が$FALLEN_EMPIRE|Y$の指示に従い、 $FALLEN_EMPIRE|Y$は結果に満足している。 我々はまた一日、 安全を確保した。"
 MESSAGE_FAIL_HIVE_FE_TASK_TITLE: "没落した帝国の断片が不機嫌"
 MESSAGE_FAIL_HIVE_FE_TASK: "我々は$FALLEN_EMPIRE|Y$の指示を守ることができなかった。 $FALLEN_EMPIRE|Y$が許してくれることを祈るしかない。"
 bio.3350.name: "銀河の邪魔物"
 bio.3350.desc: "なぜ下手な拡張によって銀河を荒廃させる？ 誰も汝らとは口すらききたがらない。 仕方がないから我らが教えてやろう。 汝らの国境には誰もが不満を抱いている。 汝らがいなければ宇宙は遥かに良くなるだろう。\n\n§Y[offending_system.GetName]§!星系は非実用的で調和を乱している。 銀河の団結のため、 汝らの帝国から今すぐ撤去する必要がある。"
 bio.3350.a: "星系を捨てて、 国境を美化しろだと！？"
 bio.3350.bordergore: "我々は今のままがいいのだ！"
 bio.3350.tt: "§Y[offending_system.GetName]§!星系基地を解散しなければ、 §Y[fallen_empire_hive_control.GetName]§!の怒りを買うことになる"
 bio.3355.name: "頭痛"
 bio.3355.desc: "無知を装っているのか？ §Y[offending_system.GetName]§!星系の放棄さえすれば良いものを。\n\n汝らの排除にもっと積極的に関与したほうがよさそうだ。"
 bio.3360.name: "清澄"
 bio.3360.desc: "ようやく過去の過ちから学んだようだな。 §Y[FromFrom.GetName]§!星系の問題は解決されたものと見なそう。 汝らが我々のようになれる可能性はまだ残されている。\n\nこれからも見ておるぞ。"
 #Awakening
 #War
 casus_belli_cb_ae_entertainment: "エンターテインメント"
 war_goal_wg_ae_entertainment: "エンターテインメント"
 war_goal_wg_ae_entertainment_desc: "戦争は覚醒した帝国を楽しませ、戦い甲斐のある宿敵を生み出すために行われる。"
 wg_ae_war_entertainment_effect: "§Y[Root.GetName]§!は積極的な参加に対し報酬を提供する。 覚醒した帝国の§Y戦争疲弊§!が高ければ高いほど、 報酬も良くなる。"
 #Control
 bio.3400.name: "統合"
 bio.3400.desc.nogalcom: "銀河よ、 我々は一つだ。 劣った断片は真実を悟り、 再び我々の共同体に加わった。 我々はこの先§Y[fallen_empire_hive_control.GetName]§!と呼ばれるだろう。 この瞬間に立ち会えるとは、 なんと幸運なことか。 至高の生命体が再び星々を支配するのだ。"
 bio.3400.desc.galcom: "$bio.3400.desc.nogalcom$\n\nこれからは我々が汝らの「§Y銀河共同体§!」を指揮する。 祝福に値するだろう。"
 bio.3405.name: "誤った音"
 bio.3405.desc: "なぜ自らの首を絞めるのだ？ 汝らの奏でる音は、 銀河のコーラスを乱している。 我らは汝らを調和へと導きたいだけなのだ。 それなのに汝らは抗い、 その汚い音に固執している。\n\n覚えておけ。 我々の交響曲は、 汝らがいようがいまいが、 銀河に響き渡るのだ。"
 bio.3405.a: "お前たちの交響曲は我々には響かない。"
 NAME_Appeal_the_Veto: "拒否権に抗議する"
 gal_com_arrogance: "傲慢"
 #Dig Site
 NAME_Echo: "響き渡る霊廟"
 last_thought_site: "最後の思考"
 last_thought_site_desc: "[From.Planet.GetName]は近づくすべての者を退ける。 その研究に割り当てられた研究者は、 仕事を遅らせるための言い訳を考え出す。 一方で、 機器はデータ自体を拒否するかのように不具合を起こし、 故障する。\n\nここで何かが起こった。 それはあまりにも恐ろしい出来事だったため、 その余韻は今も現実の中に響き渡っている。"
 bio.3450.name: "死産児"
 bio.3450.desc: "[From.Planet.GetName]の慎重な調査により、 我々はいつまでも続く半化石化した生物物質の層を通り抜け、 地下深くへとたどり着いた。 我々はついに、 惑星の空洞の中心部を突破したのだ。 しかし、 一歩進むごとに重苦しい雰囲気が増していくだけだった。 [Root.GetLeaderName]の注意にもかかわらず、 高まる不安に耐えられなくなった。 [Root.Owner.GetArchaeologistPlural]の何人かが集団で精神崩壊を起こし、 緊張病に陥った。 彼らはすぐに避難させなければならなかった。\n\n惑星の中心にある広大な空洞は、 ただの空洞ではない。 その中に埋もれていたのは、 既知の生命体の規模をはるかに超えた何かの遺骸だった。 羊膜の痕跡のわずかな痕跡が、 すべての疑いを消し去った。 [From.Planet.GetName]は不毛の岩の塊などではなかった。 それは卵だったのだ。\n\nそしてその中には、 死産の怪物が眠っている。"
 bio.3455.name: "シナプス"
 bio.3455.desc: "[From.Planet.GetName]で、 我々の[Root.Owner.GetArchaeologistPlural]は死産となった生物の頭蓋骨の奥深くに埋め込まれた奇妙な触手のネットワークを追跡した。 有機繊維を源までたどったところ、 外部のシナプスクラスターの配列が発見された。 それは不気味な潜在能力を秘めた複雑なシステムであった。\n\n[Root.GetLeaderName]は、 触手に沿って脈動する古代の回路を通じて、 それと交信しようとしている。 宿主が死んでから長い時が経っている。 それが保持している知識をまだ記憶しているかどうかは、 今のところ不明だ。"
 bio.3460.name: "賭け"
 bio.3460.desc: "10万年前の出来事だ。 ハイヴの時間の認識を銀河標準単位に変換することは難しかったが、 バイオコンピューターの記憶を精査することで、 [Root.GetLeaderName]は真実を明らかにしはじめている。\n\n絶頂期にあったハイヴは、 打ち負かすことのできない敵に直面した。 多くの同盟者とともに立ち向かったが、 すべての戦いは敗北に終わった。 絶望は無謀さを生み出した。\n\nその後の出来事の多くは意図的に抹消されているが、 彼らの最後の賭けを垣間見るには十分な断片が残っている。 ハイヴは、 この惑星サイズの卵を自分たちの昇天のための器として作り、 もろく、 惑星に縛られた存在を捨て、 雛と融合しようとした。 彼らが戦うつもりだったのか、 それとも逃げるつもりだったのかは不明だ。\n\nしかし、 生物が動き出したとき、 恐ろしいことが起こった。"
 bio.3465.name: "粉砕"
 bio.3465.desc: "生き残ったバイオコンピューターとまだ活動中のシナプスリンクに正確に接続することで、 我々は死産となった生物から最後の記憶を抽出した。 このプロセスは、 膨大な認知負荷によりバイオコンピューターを急速に劣化させたが、 幸いほとんどのデータの抽出には間に合った。\n\n絶滅の危機に直面したハイヴは、 生存を賭けた最後の手段として慎重さを捨て、 生まれてくる宿主に対して全精神を注ぎ込んだ。 シナプスの過負荷は致命的となり、 その生き物は絶望的な運命をたどり、 ハイヴは耐え難い苦痛の繰り返しに閉じ込められた。 慈悲深い同盟国がそのつながりを断ち切らなければ、 それは完全に滅びていただろう。 今では、 その精神の砕け散った残響だけが[From.Planet.GetName]にこだましつづけている。 ここは、 その最後の悲鳴に今もなお取り憑かれている。\n\n最後の思考は苦痛だった。"
