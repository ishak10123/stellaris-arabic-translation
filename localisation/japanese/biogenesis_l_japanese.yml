 crisis_behemoth_level_5_desc: "危機レベル5"
 behemoth_crisis_level_5_req_tooltip: "£trigger_no£スペシャルプロジェクト§Y$BEHEMOTH_CRISIS_SPECIAL_PROJECT_4$§!§H$become_the_crisis_chain$§!が完了した"
