 ###################################
 #BioGenesis General Localization #
 ###################################
 BIOGENESIS_TITLE: "BioGenesis" #Do not translate
 DLC_BIOGENESIS_RECOMMENDATION_DESC: "§S$BIOGENESIS_TITLE$§!をお勧めする理由は、 あなたがこれまでに下してきた選択が、 このDLCのテーマにフィットしているからだ。"
 ############################
 #Phenotype Species Traits #
 ############################
 #Species traits localized tags
 SPECIES_TRAIT_CATEGORY_HEADER: "§H特性カテゴリ§!\nこの特性は次のカテゴリに属する："
 SPECIES_TRAIT_HUMANOID: "['concept_humanoid_phenotype_traits']"
 SPECIES_TRAIT_MAMMALIAN: "['concept_mammalian_phenotype_traits']"
 SPECIES_TRAIT_REPTILIAN: "['concept_reptilian_phenotype_traits']"
 SPECIES_TRAIT_ARTHROPOID: "['concept_arthropoid_phenotype_traits']"
 SPECIES_TRAIT_AVIAN: "['concept_avian_phenotype_traits']"
 SPECIES_TRAIT_MOLLUSCOID: "['concept_molluscoid_phenotype_traits']"
 SPECIES_TRAIT_PLANTOID: "['concept_plantoid_phenotype_traits']"
 SPECIES_TRAIT_FUNGOID: "['concept_fungoid_phenotype_traits']"
 SPECIES_TRAIT_LITHOID: "['concept_lithoid_phenotype_traits']"
 SPECIES_TRAIT_NECROID: "['concept_necroid_phenotype_traits']"
 SPECIES_TRAIT_AQUATIC: "['concept_aquatic_phenotype_traits']"
 SPECIES_TRAIT_TOXOID: "['concept_toxoid_phenotype_traits']"
 SPECIES_TRAIT_INFERNAL: "['concept_infernal_phenotype_traits']"
 SPECIES_TRAIT_VOCATIONAL: "['concept_vocational_traits']"
 SPECIES_TRAIT_OVERTUNED: "['concept_overtuned_traits']"
 SPECIES_TRAIT_FLEETING_EXCELLENCE: "['concept_fleeting_excellence_traits']"
 SPECIES_TRAIT_CYBORG: "['concept_cybernetic_traits']"
 SPECIES_TRAIT_UNIVERSAL_AUGMENTATIONS: "['concept_universal_augmentations_traits']"
 SPECIES_TRAIT_ADAPTIVE_FRAMES: "['concept_adaptive_frames_traits']"
 trait_egg_laying: "産卵"
 trait_egg_laying_desc: "この種族の幼体は親の体内ではなく、 卵の殻の中で守られ、 成長する。 これにより、 豊富な餌がある時期に急速な成長が可能となる。"
 trait_egg_laying_effect: "POPの成長速度：現地の$r_food$ (もしくはそれに相当する) の§G生産収入§!がある惑星に住んでいる場合、 §G+15%§!"
 trait_egg_laying_portrait_override_tt: "または卵生種族"
 trait_seasonal_dormancy: "季節的な休眠"
 trait_seasonal_dormancy_desc: "この種族は冬眠を必要とする周期的な季節を持つ惑星で進化してきた。 現代では、 これらの季節的な要因を人工的に模倣することで、 社会的にあまり生産的でない個体を効率的に保存することができる。"
 trait_seasonal_dormancy_effect: "在職POPの維持費：§G-15%§!\n    - 失業中および['concept_denizen']のPOPの維持費：§G-75%§!"
 trait_seasonal_dormancy_portrait_override_tt: "または冬眠する種族"
 trait_hollow_bones: "空洞の骨"
 trait_hollow_bones_desc: "この種族の骨はもろいため、 優雅で楽な動きが可能となっている。 しかし、 住んでいる世界の重力の影響にもより敏感である。"
 trait_hollow_bones_effect: "惑星規模あたりの$pop_cat_worker_plural$、 $pop_cat_simple_drone_plural$、 および兵士職の$BONUS_WORKFORCE_FOR$：§R-0.67%§!"
 trait_rooted: "根っこ"
 trait_rooted_desc: "この種族は文字通り、 自分たちが置かれた環境に根を下ろすため、 除去には強いトラウマが伴う。"
 AUTO_MIGRATE_ROOTED: "§R根ざしたPOPは移住できない。§!"
 trait_rooted_effect: "§RPOPは自動的に強制移住しない§!\n    - 強制移住コスト：§R+200%§!"
 trait_rooted_portrait_override_tt: "または環境に依存する種族"
 trait_acidic_vascularity: "酸性血管"
 trait_acidic_vascularity_desc: "この種族の体液は、 最も強力な防御手段となる。 非常に腐食性が高く、 致死性もあるこの液体は、 その生物に穴を開けたものを必ず後悔させる。"
 trait_acidic_vascularity_effect: "軍は死ぬ際に§Y爆発§!し、敵軍へ§G250§!ダメージを与える\n    - 浄化されたPOPの資源産出：§R-75%§!"
 DAMAGE_ARMY: "$ARMY|Y$にダメージ"
 trait_shelled: "殻付き"
 trait_shelled_desc: "自然に育ったものか、 偶然 (または意図的) に見つけたものかに関わらず、 この種族は自分たちの家を常に持ち歩いている。 外殻は守られた家となり、 いつでも夜を過ごせる場所となる。"
 trait_shelled_portrait_override_tt: "または外殻を持つ種族"
 trait_camouflage: "カモフラージュ"
 trait_camouflage_desc: "変装の名人であるこの種族は周囲の環境に完璧に溶け込み、 捕食者からも獲物からもほとんど見えない。 生まれつき光学を理解しているため、 ゲリラ戦に優れている。"
 trait_camouflage_portrait_override_tt: "またはカモフラージュ能力を有する種族"
 trait_chromalogs: "クロマログ"
 trait_chromalogs_desc: "色彩を活用するこの種族は単なるカモフラージュを超越し、 体表に表示される鮮やかで複雑なパターンを通じてコミュニケーションを行うまでに進化した。"
 trait_chromalogs_portrait_override_tt: "または体色を用いてコミュニケーションを行う種族"
 trait_brittle: "脆い"
 trait_brittle_desc: "もともと脆いこの種族は、 日常の活動において、 たとえ普通の作業でもひび割れを避けるために細心の注意を払わなければならない。"
 trait_familial: "家族"
 trait_familial_desc: "最も近い親族との深い、 永続的な関係によって結びつけられたこの種族は、 非常に効率的で結束力のある集団を形成する。"
 trait_familial_effect: "同じ惑星でこの特性を持った§Y100§! £pop£ POPあたりの幸福度：§G0.1%§! (最大：§G+20%§!)"
 trait_familial_portrait_override_tt: "または家族性の種族"
 trait_permeable_skin: "透過性皮膚"
 trait_permeable_skin_desc: "この種族を覆う皮膚は特殊で、 理想的な条件を必要とする。 本来生息している環境の気候からそれほど離れない限り、 問題にはならないはずだ。"
 trait_permeable_skin_effect: "好みの['concept_climate_category']と異なる惑星での居住性：§R-20%§!"
 concept_climate_category: "気候カテゴリー"
 concept_climate_category_desc: "居住可能な惑星の気候は3種類のカテゴリーに分けられる：\n- 湿潤：\n$t$- 大陸型\n$t$- 海洋型\n$t$- 熱帯型\n- 寒冷：\n$t$- 高山型\n$t$- 極地型\n$t$- ツンドラ型\n- 乾燥：\n$t$- 乾燥型\n$t$- 砂漠型\n$t$- サバンナ型"
 trait_genetic_memory: "遺伝子の記憶"
 trait_genetic_memory_desc: "知識や教訓を世代から世代へと受け継がせることは、 多くの文明の始まりだった。 この種族はそれをさらに発展させ、 生存に関する知見を遺伝子に直接組み込み、 各世代が先祖の蓄積された知恵を持って生まれてくるようにしている。"
 trait_genetic_memory_effect: "植民地設立から経った年数による居住性：毎年§G+0.5%§! (最大§G+25%§!)"
 trait_genetic_memory_portrait_override_tt: "または生存本能を遺伝的に受け継ぐ種族"
 trait_nascent_stage: "誕生期"
 trait_nascent_stage_desc: "この種族は発育の早い段階で出産するため、 子供が社会に貢献できない期間が長い。 この間、 子供らは知性に伴う責任や負担について、 まったく無知のまま幸福な状態を保っている。"
 trait_nascent_stage_effect: "この特性を持った新しく成長したPOPは最初の§Y5§!年間、 準知的生物として育つ。"
 trait_nascent_stage_portrait_override_tt: "または幼年期の長い種族"
 trait_presapient_stage: "準知的"
 trait_presapient_stage_desc: "意識的な思考を欠いた短い時間を過ごした後、 この種族はすぐに完全に知的な存在へと成長する。"
 trait_flight: "飛行"
 trait_flight_desc: "この種族は大地に縛られることなく、 自由に空を飛び回る。 彼らの都市は、 空中生活に最適化されたユニークで密集した構造になっている。 戦闘の面においては、 この種族は捉えどころがなく、 標的としにくい。"
 trait_flight_portrait_override_tt: "または空中生活に適応している種族"
 trait_spatial_mastery: "空間への精通"
 trait_spatial_mastery_desc: "この種族は飛行能力だけでなく、 独特な脳の適応能力も備えており、 本能的に三次元空間を理解し、 自由に移動することができる。 彼らはこの能力により、 戦闘計画、 惑星の調査、 都市の管理において比類のない存在となっている。"
 trait_spatial_mastery_portrait_override_tt: "または3次元航行に長けた種族"
 trait_spare_organs: "予備の器官"
 trait_spare_organs_desc: "この種族は深刻な損傷を受けても生き延びるために余分な器官を進化させた。 その適応が成功したことは、 彼らが今も存在していることによって証明されている。"
 trait_spare_organs_effect: "リーダーは最初の死を生き延びる。\n    - 攻撃している軍隊の死：代わりの軍隊を生成する確率§G20%§!\n    - £job_livestock£ §Y$job_livestock$§!の産出：§G+50%§!"
 mod_planet_livestock_produces_mult: "£job_livestock£ §Y$job_livestock$§!の産出"
 trait_leader_second_chanced: "第二のチャンス"
 trait_leader_second_chanced_desc: "このリーダーは、 自分の独自の生態によって死を免れた。 同じように生き延びることはもう二度とできないだろう。"
 #################################
 #Evolutionary Predators Origin #
 #Written by Victor Haeggman  #
 #################################
 #Origin and Start of Game
 origin_evolutionary_predators: "進化的捕食者"
 origin_evolutionary_predators_desc: "§R警告：['concept_mutation_ascension']以外のすべてのアセンションパスが使用不可になる。§!\n\nこの種族は自分たちでもよく理解できない本能に突き動かされ、 常に最も独特な生き物を狩ってきた。 獲物の遺伝子を統合するという珍しい能力を持つことで、 その世界における頂点捕食者にまで進化し、 利用できるあらゆる遺伝的優位性を吸収した。 そして今、 彼らは飢えに従い宇宙へと飛び立つ。"
 origin_tooltip_evolutionary_predators_effects: "- $SPECIES_TRAITS$['concept_malleable_genes']\n- 状況：['concept_adaptive_evolution']\n- 母星：['concept_genetic_soup']"
 START_SCREEN_EVOLUTIONARY_PREDATORS_BASE: "[GetSpeciesNamePlural]は狩人だ。 我々は新しいものを味わうために、 どんなに過酷な環境にも立ち向かい、 あらゆる場所で獲物を求める。 食べたものが自分の一部となるのなら、 その努力は決して無駄にはならないのだ。\n\n"
 START_SCREEN_EVOLUTIONARY_PREDATORS_REGULAR: "$START_SCREEN_EVOLUTIONARY_PREDATORS_BASE$我々は常に獲物の肉によって形作られていることを知っていた。 一匹の獲物を狩り、 一匹を仕留めるごとに、 我々は強くなってきた。\n\n我々の激しい過去は重荷ではなく、 我々そのものである。 現代科学を通して洗練された今、 もはや進化のために食を必要としない。 遺伝物質の痕跡がわずかに残っているだけで、 その力を取り込むことができる。\n\n進化への渇望は今も我々の中で燃え盛っている。 [GetStartingDrive]の幕開けとともに、 銀河を探索し、 銀河のすべてを味わう準備は整った。"
 START_SCREEN_EVOLUTIONARY_PREDATORS_HIVE: "$START_SCREEN_EVOLUTIONARY_PREDATORS_BASE$我々の共有する知性は、 常に遺伝子の潜在能力を理解してきた。 我々は対象の本質を吸収し、 適応させることができ、 そしてその力を集合体に統合する。\n\nその古代の捕食本能は今も残っているが、 今はそれが均衡を保ち、 制御されている。 もはや進化のために狩りをしなくてもよい。 研究室ではあらゆる遺伝物質を合成し、 それをハイヴに分配することができる。\n\n[GetStartingDrive]の登場とともに、 我々は銀河中に広がり、 すべてを味わうのだ。"
 START_SCREEN_EVOLUTIONARY_PREDATORS_DEVOURING_SWARM: "$START_SCREEN_EVOLUTIONARY_PREDATORS_BASE$[GetHomeWorldName]の生命体をすべて食い尽くした後に、 我々は自分たちの愚かさに気づいた。 これからどうやって進化し、 適応すればいいのだろうか？ 答えは空にあった。\n\n我々は究極の捕食者である。 他の種族は生き残るために狩りをするが、 我々は完璧になるために狩りをする。\n\n[GetStartingDrive]の登場により、 我々は再び獲物を求めることができる。 銀河は広大で、 食料はいくらでもあるのだ。"
 #Traits
 trait_malleable_genes: "柔軟な遺伝子"
 trait_malleable_genes_desc: "§Lこの種族は、他の種族ほど識別しやすい特徴や器官を持っていない。 代わりにその状況に最適な付属肢を成長させる。 しかし、 この不安定性には欠点もある。§!"
 trait_malleable_genes_cant_modify: "§Rこの特性を持っている種族は遺伝子改変できない§!\n$automodding_trait_tooltip_all$ §Y$trait_malleable_genes$§!は['concept_automodding_malleable']から補正を選択する"
 CANNOT_MODIFY_MALLEABLE_GENES_SPECIES: "$TRIGGER_FAIL$この種族の遺伝子は不安定なため、 遺伝子改変を行うことができない。"
 concept_malleable_genes: "$trait_malleable_genes$"
 concept_malleable_genes_desc: "$trait_malleable_genes_cant_modify$"
 concept_automodding_malleable: "柔軟な遺伝子自動補正特性リスト"
 concept_automodding_malleable_desc: "- ['trait:trait_malleable_minerals']\n- ['trait:trait_malleable_energy']\n- ['trait:trait_malleable_food']\n- ['trait:trait_malleable_research']\n- ['trait:trait_malleable_unity']\n- ['trait:trait_malleable_forge']\n- ['trait:trait_malleable_trade']\n- ['trait:trait_malleable_ameneties']"
 concept_adaptive_evolution: "適応的進化"
 concept_adaptive_evolution_desc: "他の生命体のDNAを食すにつれ、 状況が進行する。\n§G達成時：§!\n$t$- 最近食べた生物を基に、 新しい種族特性を選択する\n§Y進行：§!\n$t$- 新しい惑星の植民地化\n$t$- 他の種族の浄化または家畜化\n$t$- 自帝国以外の種族を奴隷として、 あるいはそれ以上のものとして保有する\n$t$- 異星人のリーダーを評議会に雇用\n$t$- 有機生命体の属国を保有する\n$t$-巨大企業として通商条約を結ぶ\n$t$- イベントを通して異星の生命体と遭遇"
 concept_genetic_soup: "$genetic_soup$"
 concept_genetic_soup_desc: "$fresh_biosphere_tt$\n\n§L$genetic_soup_desc$§!"
 trait_malleable_minerals: "柔軟な鉤爪"
 trait_malleable_minerals_desc: "§Lダイヤモンドのように硬い爪を使うことによって、 鉱物の抽出が容易になる。§!"
 trait_malleable_energy: "柔軟な絶縁体"
 trait_malleable_energy_desc: "§L厚い絶縁層が事故を防ぎ、 特に高エネルギー環境下で効果を発揮する。§!"
 trait_malleable_food: "柔軟なスキ"
 trait_malleable_food_desc: "§Lシャベルのような硬い爪が付いた追加の脚により、 耕作や植え付けが速くなる。 さまざまな地形に適応する柔軟なスキは、 常に最適な作業用道具となる。§!"
 trait_malleable_research: "柔軟な皮質"
 trait_malleable_research_desc: "§L膨張した中心皮質は少し不快だが、 問題解決と創造性を劇的に加速する。§!"
 trait_malleable_unity: "柔軟な感覚器官"
 trait_malleable_unity_desc: "§L感覚器官が強化されると、 多様な視点に対する理解と評価が深まる。 成功を収める前に、 まず観察することが必要なのだ。§!"
 trait_malleable_forge: "柔軟な角質"
 trait_malleable_forge_desc: "§L高温や腐食性物質を扱う際には、 極厚の角質が非常に役立つ。§!"
 trait_malleable_trade: "柔軟なフェロモン"
 trait_malleable_trade_desc: "§L交渉の場では、 適応力の高いフェロモンは非常に説得力がある。§!"
 trait_malleable_ameneties: "柔軟な高調波"
 trait_malleable_ameneties_desc: "§Lこの種族は高度に調整された一連の穴のおかげで、 動き回るだけで心地よい調和のとれた音を出すことができる。§!"
 #Democratic Effects
 concept_genetic_electorate_effect: "遺伝的選挙効果"
 concept_genetic_electorate_effect_desc: "$trait_malleable_imperialist_effect$\n$trait_malleable_isolationist_effect$\n$trait_malleable_progressive_effect$\n$trait_malleable_prosperity_effect$\n$trait_malleable_supremacist_effect$\n$trait_malleable_technologist_effect$\n$trait_malleable_totalitarian_effect$\n$trait_malleable_traditionalist_effect$\n$trait_malleable_xenoist_effect$\n$trait_malleable_manifesti_effect$"
 trait_malleable_imperialist_effect: "§Y有力派閥§!の効果： (帝国主義)：\n$t$$mod_planet_jobs_alloys_produces_mult$：§G+10%§!"
 trait_malleable_isolationist_effect: "§Y有力派閥§!の効果： (孤立主義)：\n$t$$mod_planet_jobs_unity_produces_mult$：§G+10%§!"
 trait_malleable_progressive_effect: "§Y有力派閥§!の効果： (進歩主義)：\n$t$£happiness£ 幸福度：§G+10%§!"
 trait_malleable_prosperity_effect: "§Y有力派閥§!の効果： (繁栄主義)：\n$t$£job£ 職業による$r_trade$：§G+20%§!"
 trait_malleable_supremacist_effect: "§Y有力派閥§!の効果： (覇権主義)：\n$t$$mod_planet_jobs_specialist_produces_mult$：§G+5%§!\n$t$$mod_planet_jobs_ruler_produces_mult$：§G+5%§!"
 trait_malleable_technologist_effect: "§Y有力派閥§!の効果： (科学主義)：\n£job£ $t$職業による£research£ 研究：§G+10%§!"
 trait_malleable_totalitarian_effect: "§Y有力派閥§!の効果： (全体主義)：\n$t$£pop_cat_worker£ $mod_pop_cat_worker_bonus_workforce_mult$：§G+15%§!"
 trait_malleable_traditionalist_effect: "§Y有力派閥§!の効果： (伝統主義)：\n$t$£pop£ $MOD_POP_HOUSING_USAGE_ADD$：§G-0.5§!"
 trait_malleable_xenoist_effect: "§Y有力派閥§!の効果： (異文化主義)：\n$t$居住性§G+15%§!"
 trait_malleable_manifesti_effect: "§Y有力派閥§!の効果： (マニフェスティ)：\n$t$£pop£ $MOD_POP_AMENITIES_USAGE_BASE$：§G-1§!"
 #Dictatorial Effects
 trait_ruler_apex_predator: "頂点捕食者"
 trait_ruler_apex_predator_desc: "進化による捕食によって定義された人々は、 最も適応力のある者以外を統治者として認めない。 この頂点に立つ統治者は、 敗北した敵のゲノムを収穫するだけでなく、 その狡猾さと決意を奪い、 あらゆる勝利を完璧な支配への一歩に変える。"
