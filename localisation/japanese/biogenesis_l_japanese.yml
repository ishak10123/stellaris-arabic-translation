 bio.170.name: "純粋性：政府改革？"
 bio.170.desc: "我が種族は次の壮大な一歩を踏み出そうとしている。 今こそ選択をしなければならない。\n\n遺伝子を清め、 文明を遺伝的に優れた新たな高みに引き上げるという運命を受け入れるのか。 それとも過去の教訓を活かし、 未熟な現状を維持し続けるか。"
 bio.170.a: "純粋性を追求し、新たな高みへ！"
 bio.170.a.tt: "$change_auth_tt$[GetPurityAuthority]"
 bio.170.b: "自分たちを統治する方法を変える必要はない。"
 #Cloning
 bio.175.name: "クローニング：政府改革？"
 bio.175.desc: "我が種族は重大な局面を迎えており、 決断を下さなければならない。\n\nクローニングの力を利用して完璧さを複製した文明へと変貌する運命を受け入れるべきだろうか？ それとも、 これまでの経験の教訓を活かし、 不必要な差別化を続けるべきだろうか？"
 bio.175.a: "クローニングを未来の重要な一部として受け入れる。"
 bio.175.a.tt: "$change_auth_tt$[GetCloningAuthority]\n$LEADERS_GAIN_CLONES$"
 bio.175.b: "$bio.170.b$"
 #Mutation
 bio.180.name: "突然変異：政府改革？"
 bio.180.desc: "我々は生物学的開拓の重要な局面に立っている。 重大な選択が待ち受けている。\n\n先進的な生物学的変異の力を利用して運命を受け入れ、 遺伝子コードの意図的な進化を通じて文明を不可逆的に変えることができる。 あるいは、 過去の功績から得た教訓を活かし、 現状の平凡な姿を維持し続けることもできる。"
 bio.180.a: "我々は何にでもなることができる。"
 bio.180.a.tt: "$change_auth_tt$[GetMutationAuthority]"
