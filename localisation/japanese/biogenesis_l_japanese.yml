 #Bodysnatcher
 civic_hive_bodysnatcher: "人さらい"
 civic_hive_bodysnatcher_desc: "重要なのは中身だ。 このハイヴは潜入を専門とし、 不幸な有機生命体の体を乗っ取る。 必然的に、 操り人形の数が増えるにつれ、 元の文明は集合体に吸収されていく。"
 civic_hive_bodysnatcher_effects: "同化した£pop£ POPが§Y1000§!あり、 有機生命体を集合意識に§Y同化§!させる能力を持ってゲームを開始する。\n['concept_operation_bodysnatcher_prepare_invasion']諜報ミッションが利用可能。\n['concept_operation_smuggle_pops']諜報ミッションから追加の£pop£ POPを獲得する。"
 civic_hive_bodysnatcher_secondary_species: "偽物"
 NAME_Bodysnatchers: "人さらい"
 operation_bodysnatcher_prepare_invasion: "侵略の準備をする"
 operation_bodysnatcher_prepare_invasion_desc: "我々の隣人は、 簡単に変えられる精神を持っている。 我々の意識にすでに統合されている身体を送ることで、 彼らをより簡単に集合意識に引き入れることができる。"
 operation_bodysnatcher_prepare_invasion_on_success: "$IF_SUCCESSFUL|E$\n次に§Y[Target.GetName]§!に宣戦布告するときは、 内部工作員の支援を得られるだろう。"
 operation_invasion_prepared: "$TRIGGER_FAIL$§Rこの国に対する侵攻計画はすでに準備済みだ。 宣戦布告して戦争を始めろ。§!"
 operation_invasion_impossible: "$TRIGGER_FAIL$§Rこの国は潜入に対する準備が整いすぎている。 この作戦を実施することはできない！§!"
 concept_operation_bodysnatcher_prepare_invasion: "$operation_bodysnatcher_prepare_invasion$"
 concept_operation_bodysnatcher_prepare_invasion_desc: "戦争が勃発した際に大規模な破壊工作を行えるように、 標的種族と同化したPOPを帝国に送り込む作戦。"
 bio.800.name: "新たな仕事"
 bio.800.desc: "潜入した個体を戦略的な場所に配置しなければ、 壮大な計画を実行に移すことはできない。 我々の以前の情報収集により、 人員不足の星系基地や防衛が不十分な惑星が主な標的であることが明らかになっている。 我々はまもなく行動を開始する。"
 bio.805.name: "追加スタッフ"
 bio.805.desc: "作業は順調に進行しており、 個体はさらに多くの宿主を見つけ、 [Target.GetName]への関与は確固たるものとなっている。 我々のドローンはまもなく好奇心旺盛な心をすべて取り込んでしまうだろう。 "
 bio.810.name: "新たな求人"
 bio.810.desc: "置き換えることができなかった[Target.GetSpeciesName]は排除され、 §Y[Target.GetName]§!構造内にいくつかの空席が生じた。 我々の操り人形は、 完全な侵攻のための扉を開く準備ができている。 あとは開始の指示を送るだけだ。"
 bio.815.name: "新人"
 bio.815.desc: "§Y[From.Target.GetName]§!は侵害された。 侵略の準備はできている。 あとは彼らの帝国をさらに潜入するために、 どれだけの工作員を送り込むかを決めればいいだけだ。 直にすべてが[Owner.GetAdj]になるだろう。"
 bio.815.tt: "これを行うには、 標的種族のPOPが不足している。"
 bio.815.a: "送れる者はすべて送った。"
 bio.815.b: "彼らの前哨地を確実に我々のものにしろ。"
 bio.815.b.tt: "§Y100§! £pop£ §HPOP§!送る。\n$bio.815.reminder$"
 bio.815.c: "惑星の侵略を準備せよ。"
 bio.815.c.tt: "§Y300§! £pop£ §HPOP§!送る。\n$bio.815.reminder$"
 bio.815.d: "要塞に潜入せよ！"
 bio.815.d.tt: "§Y500§! £pop£ §HPOP§!送る。\n$bio.815.reminder$"
 bio.815.e: "奴らを全員我々の一部にするのだ！"
 bio.815.e.tt: "§Y2000§! £pop£ §HPOP§!送る。\n$bio.815.reminder$"
 bio.815.reminder: "次に我々が§Y[From.Target.GetName]§!に対して宣戦布告するか、 あるいは§G10§!年以内に我々に対して宣戦布告がなされた場合、 準備した潜入工作員を活用することになるだろう。"
 bio.825.name: "[From.GetSpeciesNamePlural]の侵略"
 bio.825.desc.small: "悪意に満ちた[From.GetName]が我々の帝国に潜入している。 宇宙ステーションは危険に晒されており、 彼らはすでに我々の植民地に侵攻している。 裏切り者を排除しなければならない！"
 bio.825.desc.large: "最初は不具合だと思った。 通信網の半分が機能しなくなったのだ。\n\nだがそうではなかった。 狡猾な[From.GetName]が主要な人員をまるごと入れ替えたのだ。 我々の帝国は分裂し、 植民地は侵略されている。\n\n誰も信用してはならない！"
 #Smuggle pops operation
 operation_smuggle_pops: "人口の密輸"
 operation_smuggle_pops_desc: "我々の工作員は、 [target.GetName]内の孤立した集団に対して大規模な脱出作戦を実施する。"
 operation_smuggle_pops_on_success: "$IF_SUCCESSFUL|E$\n£pops£ POPの一部を帝国へと移住させる。"
 smuggle_pops_also_fanatic_egalitarians: "$TRIGGER_FAIL$ §R[Target.GetName]は狂信的な平等主義者であり、 市民はすでに自由である§!"
 smuggle_pops_not_enough_pops: "$TRIGGER_FAIL$§R[Target.GetName]は盗むに値する£pops£ POPが不足している§!"
 mod_operation_smuggle_pops_difficulty_add: "$operation_smuggle_pops$ 作戦難易度"
 concept_operation_smuggle_pops: "$operation_smuggle_pops$"
 concept_operation_smuggle_pops_desc: "標的からPOPを拉致する作戦。"
 bio.900.name: "人材発掘"
 bio.900.desc: "我々の工作員は[target.GetName]の住民を監視する複数の拠点や隠れ家を確保している。 反体制派、 一匹狼、 または高度な技能を持つ人物は評価され、 回収のためにマークされる。"
 bio.905.name: "消失事件"
 bio.905.desc: "我々の工作員は標的を一斉検挙し、 人里離れた場所に隠匿し始めている。 可能な限り、 別事件を演出して地元当局の注意をそらし、 痕跡を隠蔽している。"
 bio.910.name: "シャトル"
 bio.910.desc: "作戦は重大な局面を迎えており、 我々が捕らえた全員を軌道上で個別に移送しなければならない。 現在の計画では、 すべての施設からの出発を同期させ、 偽物や陽動作戦で警備部隊を圧倒する。"
 bio.915.name: "違法持ち出し"
 bio.915.desc: "我々は多くの標的を無事に送り出したが、 その作業は問題なく進んだわけではなく、 有望な人材を乗せた艦船が多数取り残された。"
 bio.915.desc.detected: "$bio.915.desc$\n\nこのような広範囲にわたる人口移動は、 すでに気づかれてしまっている。"
 bio.915.desc.cosmogenesis: "大勢の標的を抽出することに成功し、 彼らはすでに旋盤に送られている。 しかしその作業は問題なく進んだわけではなく、 有望な人材を乗せた艦船が多数取り残された。"
 bio.915.desc.cosmogenesis.detected: "$bio.915.desc.cosmogenesis$\n\nこのような広範囲にわたる人口移動は、 すでに気づかれてしまっている。"
 bio.915.a: "やれることはやった。"
 bio.915.b: "他の[Root.GetSpeciesNamePlural]を解放するのに注力しよう。"
 bio.915.c: "もっと救出せねば！"
 bio.915.d: "[GetSpeciesName]を全員救い出す！"
 bio.915.tt: "管理されていない£pop£ §HPOP§!を適切な惑星に移動させる。"
 bio.915.asset.tt: "$bio.915.tt$\n§Y[From.Target.GetName]§!がこれまで我々の存在に気づいていなかったとしたら、 §Rこれで確実に気付かれただろう。§!"
 MESSAGE_POPS_SMUGGLED_TITLE: "盗まれた人口"
