 SHIP_BEHEMOTH_COCOON_DESC: "§Yベヒモス§!は、 ガス惑星の激動する層に自らを固定し、 重元素や複雑な分子化合物を豊富に含む濃密な大気から栄養を得ている。 時が経つにつれ、 この栄養が彼らの成長を促し、 その計り知れない力を強化していく。"
