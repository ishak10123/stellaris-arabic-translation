 MESSAGE_BEHEMOTH_RAGE_DESC: "ベヒモスが狂乱の怒りに燃えている！ 数ヶ月で落ち着いてくれることを願っている。"
 MESSAGE_BEHEMOTH_CALM_TITLE: "おさまる怒り"
 MESSAGE_BEHEMOTH_CALM_DESC: "ベヒモスが落ち着きを取り戻し、 我々の管理下に戻ってきた。"
