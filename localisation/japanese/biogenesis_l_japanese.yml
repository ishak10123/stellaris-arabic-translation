 #ANY APPROACH
 bio.295.name: "反抗性細胞"
 bio.295.desc: "ゲノム研究施設によって、 我々の文明全体はこれまで経験したことのない生理学的変化が可能となった。\n\nしかし帝国の市民は、 それ以上を求めている。 中央集権的な資源を分割し、 「バイオハッカー」と呼ばれている者たちに遺伝子技術への自由で無制限なアクセスを許可すべきだという声が上がっているのだ。"
 bio.295.a: "バイオハッカーたちに更なる自由を与えろ。"
 bio.295.b: "一般市民はすでに自由を与えられすぎている。"
 bio_295_opinion_tt: "§Y平等主義§!帝国の我々への態度が§G+50§!になる。"
 bio.300.name: "天才遺伝学者"
 bio.300.desc: "[event_target:genius_geneticist.GetName]という名前の[Owner.GetScientist]が、 遺伝子実験の効率と有効性を劇的に加速および改善するために使用できる学術研究を発表した。\n\n新しい方法は理論上のみの話でまだ試されていないため、 安全に適用するには慎重な検討が必要だ。"
 bio.300.a: "[event_target:genius_geneticist.GetName]の貢献を認める。"
 bio.300.b: "軽薄な考えや人物は認められない。"
 bio.300.c: "全員仕事に戻れ。"
 ### ADDITIONAL RANDOM EVENTS
 ## HIVE
 #PURITY
 bio.310.name: "[target.GetGestaltEntityName]の純度の侵害"
 bio.310.desc: "我が種族は遺伝子操作実験を繰り返してきた結果、 悪意のある遺伝子コードの断片が混入してしまった。 我々の健康は驚くべき早さで悪化しており、 この外来の遺伝子配列と我々の遺伝物質との無秩序な相互作用によって不安定になっている。\n\n手遅れになる前にこの異常な生物学的行動に対処しなければならない。"
 bio.310.a: "汚染物質を除去しろ。"
 bio.310.b: "研究対象としろ。"
 bio.315.name: "大義への貢献"
 bio.315.desc: "我が文明が純粋になるのであれば、 まず[target.GetGestaltEntityName]の健康を考慮しなければならない。 遺伝子組み換えプロセスはあらゆる適応が集合体の耐性を高めることを保証する必要がある。\n\n誤った方向への出発、 すなわち不安定化や結束の弱体化につながる変更の導入は悲惨な結果を招く可能性があり、 我々の団結の基盤そのものを脅かすことにもなりかねない。"
 bio.315.a: "物理的な耐久性に焦点を当てろ。"
 bio.315.b: "認知効率が最も重要だ。"
 bio.325.name: "今日を越えて"
 bio.325.desc: "我が種族の長寿と純血を確実にするためには、 より厳選された交配とより厳格な遺伝子スクリーニングを実施しなければならない。\n\n我々の系譜を継ぐにふさわしいドローンを慎重に選択することによってのみ、 自然進化を超えた進化を遂げることができるのだ。"
 bio.325.desc.wilderness: "我々と共生する多数の生物の長寿と純血を確実にするためには、 より厳選された交配とより厳格な遺伝子スクリーニングを実施しなければならない。\n\n集合体にとって有益な特性を兼ね備えた共生体を慎重に選択することによってのみ、 最初の境界を超えることができるのだ。"
 bio.325.a: "知能テストを行う。"
 bio.325.b: "広がるために繁殖する。"
 bio.330.name: "臨機応変なアセンション"
 bio.330.desc: "遺伝子操作の成果が我々の遺産を確かなものにするが、 各[target.GetIndividualName]の役割、 あらゆる努力は純粋性という我々のビジョンに沿ったものでなければならない。\n\n我々は今、 重大な決断を迫られている。 適応性を犠牲にしてでも完璧を目指すのか。 それともこれらの取り組みを維持するために必要なインフラを優先し、 より幅広い戦略を採用するのか。"
 bio.330.a: "純粋さを追い求めることこそが我々の唯一の目標だ。"
 bio.330.b: "インフラを発展させなければならない。"
 bio.335.name: "不完全性の排除"
 bio.335.desc: "[target.GetGestaltEntityName]内で数多くの遺伝的不純物や異常を特定した。\n\nより大きな目標に向かって取り組むなかで、 これらの欠陥的な特徴を排除し、 自然進化から我々の身体の発達を再びコントロール下に置かなければならない。"
 bio.335.a: "全体を強化するために弱者を淘汰しろ。"
 bio.335.b: "欠陥のある者を再設計しろ。"
 bio_335_opinion_tt: "§Y博愛主義§!帝国の我々への態度が§R-50§!になる。"
 ### ADDITIONAL RANDOM EVENTS
 ## HIVE
 #CLONING
 bio.340.name: "クローンが多すぎる！"
 bio.340.desc: "クローニング施設は当初の予想よりも効率的に稼働しており、 現在ではクローンが余るほどだ。\n\nこれほどの数のドローンを統合するのは困難となっている。"
 bio.340.a: "ハイヴに新しく入った者は移動するべきだ。"
 bio.340.b: "もっと産出しろ。 もっとクローンが必要だ。"
 bio.350.name: "からっぽの外殻"
 bio.350.desc: "主要なクローニングセンターの一つで不具合が発生し、 複数のドローンに影響が及んだ。 遺伝子汚染物質が複製プロセスに何らかの形で混入し、 思考能力のないクローンが大量に生成されるという事態を招いてしまったのだ。\n\nそれらは実質的には生物的物体であり、 知性もなく高度な認知機能も持っていない。 この問題が完全に解決され、 生産上の問題が修復されるまではその施設の生産性は低下する。"
 bio.350.a: "これは…気持ちいい。"
 bio.350.a.tt: "§Y[owner.capital_scope.GetName]§!で£pop£ §H準知的POP§!が100体作られる。"
 bio.350.b: "新しいクローンを作れ。"
 bio.365.name: "ハイヴの形而上学"
 bio.365.desc: "意識の中から一つの疑問が浮かび上がる。 クローンはいつか我々全員に取って代わるのだろうか？\n\n遺伝子複製への初期の取り組みは順調に進んでいる。 この効率的な複製方法が、 やがて自然な繁殖方法を追い越すのではないかというほどだ。\n\nもしそうであれば、 いつの日かハイヴにはオリジナルの遺伝子提供者がいなくなり、 クローンのクローンのそのまたクローンだけになるかもしれない…これは我が種族にとって何を意味するのだろうか？ 答えのない問いであり、 意見の相違を生むものだ。 しかし我々は問いかけざるを得ない。"
 bio.365.a: "その問いに意義はある。"
 bio.365.b: "そのような問いは妨げとなるだけだ。"
 ### ADDITIONAL RANDOM EVENTS
 ## HIVE
 #MUTATION
 bio.375.name: "より深い繋がり"
 bio.375.desc: "我々は発見をした。 特定の遺伝子を操作することで意識の及ぶ範囲を広げ、 種族として限界と考えていたものを超えた高度な感覚を得ることができる。\n\nこれらの変異をハイヴ全体に導入するには多大なエネルギーが必要だが、 そうすることで宇宙と、 宇宙における我々の立ち位置についての理解が深まるかもしれない。"
 bio.375.a: "コストは大したことない。 実施しろ。"
 bio.375.b: "これは急いではいけない。"
 mod_planet_evaluators_physics_research_produces_add: "$pop_group_unit$[evaluator.GetIcon][evaluator.GetNamePlural]あたりの£physics_research£ $physics_research$"
 bio.380.name: "感情的な圧倒"
 bio.380.desc: "ハイヴ全体が制御不能な怒りの急増を経験しており、 感情の急増が共有意識に波紋を広げ、 苦痛とフラストレーションが拡大している。\n\n最近導入された突然変異は、 ドローンの攻撃制御中枢にある神経細胞を過剰に刺激し、 ハイヴの感情のバランスを崩しているようだ。 ドローンが任務を放棄し、 他のドローンを攻撃するといった衝突が以前よりも頻繁に発生している。"
 bio.380.a: "心を一つにして、我々は注意しなければならない。"
 bio.380.b: "この怒りを受け入れろ。"
 bio.385.name: "環境不耐性"
 bio.385.desc: "突然変異の中には我々を活性化し、 強化するものもある一方で、 不快な副作用を伴うものもあることが分かった。\n\n寿命を延ばすことを目的とした強化は成功裏に実施されているが、 同じ突然変異が極端な気候に対する耐性を低下させている。\n\nこれらの生態的強化を受けた者たちは、 体内の体温調節システムの管理が難しくなり、 その不快感はハイヴ全体に広がっている。"
 bio.385.a: "気象保護システムをアップグレードしなければ。"
 bio.385.b: "我々が変化するにつれ、 環境に対する好みも変化するのだ。"
 uncomfortable_drones: "不快なドローン"
 uncomfortable_drones_desc: "ドローンは突然変異による不快感と闘わなければならない。"
 bio.390.name: "筋力か知力か"
 bio.390.desc: "2つの突然変異が確認された。 1つは雑役ドローンの力を強化し、 労働効率を大幅に改善する。 もう1つは複雑ドローンの知性を高め、 問題解決能力と戦略性を向上させる。\n\nハイヴは進むべき道を選択しなければならない。"
 bio.390.a: "力こそ進歩だ。"
 bio.390.b: "我々は考えるからこそ繁栄している。"
 ### ADDITIONAL RANDOM EVENTS
 ## HIVE
 #ANY APPROACH
 bio.405.name: "病気にかかったゲノム"
 bio.405.desc: "突如発生した遺伝子疫病の蔓延を辛うじて食い止めた。\n\n我々が生態を操作したことで、 DNAに突然変異が起こり、 多くの[target.GetIndividualNamePlural]が身体的に不具合を起こすようになった。\n\n影響を受けた[target.GetIndividualNamePlural]は隔離されており、 今後どのように進めていくかを決定しなければならない。"
 bio.405.a: "[target.GetIndividualNamePlural]を排除し、 疫病を終わらせろ。"
 bio.405.b: "病にかかった者を研究しろ。"
 bio.410.name: "朽ちる細胞"
 bio.410.desc: "計算上のミスにより、 かなりの数のドローンで遺伝子の完全性が損なわれる結果となった。 残念ながらミスがどの時点で発生したのかを特定できていない。\n\n我が種族を高めるために必要な生物学的な計算を再検討し、 問題となり得る手順を修正したので、 取り組みを継続する準備はできている。\n\nしかし、 実際に問題を修正したのか、 それとも最悪、 さらに多くのミスを犯しているのかはまだ確かではない。"
 bio.410.desc.wilderness: "計算上のミスにより、 かなりの数の共生体で遺伝子の完全性が損なわれる結果となった。 残念ながらミスがどの時点で発生したのかを特定できていない。\n\n構成要素の適応に関する計算を再検討し、 不均衡な酵素スラリーを修正したので、 取り組みを継続する準備はできている。\n\nしかし、 実際に問題を修正したのか、 それとも最悪、 さらに多くのミスを犯しているのかはまだ確かではない。"
 bio.410.a: "次に起きることから学べば良い。"
 bio.410.b: "実験を一時停止しろ。"
 bio.410.b.tt: "$bio.235.a.tt$"
