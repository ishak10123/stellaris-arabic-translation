 elder_voidspawn_chain_title: "猛り狂うボイドスポーン"
 elder_voidspawn_chain_desc: "銀河を突き進む巨大なボイドスポーンがいる。 巨大ベヒモスたちを殺そうとしているのだ。 我々が巨大ベヒモスを倒してやれば、 我々をそっとしておいてくれるかもしれない。\n\n目標：銀河内のティア4のベヒモスをすべて見つけて倒す。"
 behemoth_victory_chain_title: "怪物の王"
 behemoth_victory_chain_desc: "精神の融合が完了した今、 我々の野望の実現まであとわずかの段階まで来ている。 我々は新しい共有された身体に慣れ、 人々の意識を転送し続けなければならない。 しかし、 それ以上に重要なのは、 対抗し得る者の一切をどんな相手であろうとも排除することだ。\n\n§H目標§!：\n- 銀河にある他のいずれかのクラス4ベヒモスを見つけ、 倒す。\n- 成長痛の状況を完了する。\n- エルダー・ボイドスポーンを倒す。"
 behemoth_transference: "ベヒモスの移行"
 behemoth_transference_desc: "獣と我々の住民の間に今存在するつながりは、 惑星に縛られた存在に新たな光を投げかけている。 獣と一体になることと比較すると、 無益なことだ。 誰もが今、 獣の結束を切望しており、 そして……貪欲になっている。"
