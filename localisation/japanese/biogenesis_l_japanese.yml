 ### Behemoth Crisis ###
 ap_behemoths: "ベヒモスの怒り"
 ap_behemoths_desc: "星々の頂点に立つ捕食者は、 つまらぬ制約に縛られることはない。 同じ精神を持って、 我々も進歩を妨げる生物的弱点を脱ぎ捨て、 自然の力となるのだ。"
 must_use_bioships: "£trigger_no£ §Y生物的§!艦船セットの使用が必要。"
 behemoth_crisis_chain_title: "ベヒモスの危機"
 behemoth_crisis_chain_desc: "星々は我々の飢えを満たす燃料にすぎず、 災厄は我々の野望が花開く土壌にすぎない。 我々は自然の摂理に逆らい、 宇宙を再形成するほど巨大で、 制御不能な獣を鍛え上げるのだ。"
 crisis_behemoth_level_1: "§H懸念§!"
 crisis_behemoth_level_1_desc: "危機レベル1"
 crisis_behemoth_level_2: "§Hリスク§!"
