 bio.35.name: "進化的併合" #STAGE THREE
 bio.35.desc.no_options: "我々は大きな進化の転換点に立っている。 我々は進化の潜在能力を完全に引き出すために進むべき道について、 重大な決断を下さなければならない。"
 bio.35.desc.has_options: "$bio.35.desc.no_options$\n\n何を優先すべきか、 再び選ぶ必要がある。"
