 crisis_egg_hatched: "£trigger_yes£ §H$behemoth_hatchling$§!§Hから§!$behemoth_egg$§Yを§!孵化させた"
 crisis_hatchling_required: "£trigger_no£ §H$behemoth_hatchling$§!§Hから§!$behemoth_egg$§Yを§!孵化させた"
 district_mindlink: "マインドリンク大都市"
 district_mindlink_plural: "$district_mindlink$"
 district_mindlink_desc: "高い尖塔が人口密集地を覆い、 ボランティアが獣と直接対話する機会を提供している。"
 planet_building_buffer: "大都市の転換"
 planet_building_buffer_desc: "獣と対話するための精神の尖塔を発達させるのに時間はかからないが、 惑星のインフラの継続的なサポートを確保するために、 不測の事態に備えた計画を立てなければならなかった。"
 mod_job_transference_volunteer_add: "$job_transference_volunteer$の職業枠"
 planet_transference_volunteers: "$job_transference_volunteer_plural$"
 job_transference_volunteer: "移送ボランティア"
 job_transference_volunteer_plural: "$job_transference_volunteer$"
 job_transference_volunteer_desc: "多くの者にとって、 獣とのマインドリンクは些細なことにすぎない。 絶え間なく、 そして遠い。 しかし、 獣と融合したいという衝動が抑えきれない者もいる。 これらのボランティアは、 心を徐々に獣の集合体に吸収され、導管として機能していくのだ。"
 job_transference_volunteer_effect_desc: "\n£job_transference_volunteer£ [GetTransferenceVolunteerDrone]は£unity£ §Y統合力§!を産出し、 惑星の$r_stability$を増加させ、 §Y艦船§!をより強くする。\nこの職業のPOPの§Y10%§!は6ヶ月ごとに§Y移送§!され、 殺される。 しかし、 区域の資源産出量が倍増する。\n\n§G移送されるPOP§!：[num_tranferred_pops]"
 mod_job_transference_drone_add: "[GetTransferenceVolunteerDrone]の職業枠"
 job_transference_drone: "移送ドローン"
 job_transference_drone_plural: "$job_transference_drone$"
 job_transference_drone_desc: "マインドリンクによって獣と我々の間に恒久的なつながりが確立されたが、 意識移行はゆっくりとしたプロセスである。 これらの予防措置を講じなければ、 両者の精神は破壊され、 すべてを台無しにしてしまう危険性がある。"
 MESSAGE_POPS_TRANSFERRED_TITLE: "住民の移送完了。"
 MESSAGE_POPS_TRANSFERRED_DESC: "POPが$VALUE|Y$移送済み。 その心は今や獣の中に生きている。"
 #Crisis Events
 biocrisis.50.name: "レベル1：孵化実験"
 biocrisis.50.desc: "我々は生物船と共生的に存在する。 しかし、 とある重要な何かが未だわからずにいる。\n\n虚空に生まれし強大なる存在。 そこから着想を得た我々は、 これより最大なる者を生み出すという、 史上最も野心的な試みに挑む。 この「ベヒモス」なる存在は、 あてのない進化とは違い、 目的をもって新たなる頂点生物として作り出されるのである。\n\nまずは、 未だかつてない規模で生命を生み落とすに相応しい巨大な卵を作り出すという試練が立ちはだかる。 内部に含まれる栄養素のみならず、 その殻は周囲の光や熱を取り込み、 気体を補助的な養分として変換できなければならない。"
 biocrisis.50.a: "我々の生み出した者の影は星々をも隠すだろう"
 biocrisis.55.name: "レベル2：自己実現"
 biocrisis.55.desc: "ガス惑星の軌道上で建設船が融合体とその殻を組み立て、 我が国の食品産業はその間にベヒモスの卵の卵白部を形成するのに必要な栄養素を加工した。 しかし、 それに比べて、 生存可能な受精卵黄の生成は一筋縄ではいかなかった。\n\n常軌を逸した量の生物艦船や宇宙動物のバイオマスを消費して、 ようやく有効なDNA基盤の安定化に成功。 これを史上初となる受精細胞に封入した。 微小スケールでの試験は成功に終わっており、 今度は規模を指数関数的に大型化させる段階にある。 あとはこの巨大卵の受精を行なうだけだ。\n\nもうすぐ、 この銀河史上最大の巨大生物が誕生することになる！"
 biocrisis.55.a: "我々は進化の頂点に近づきつつある。"
 biocrisis.60.name: "傲慢と飢餓感"
 biocrisis.60.desc: "我々の卓越した遺伝子操作技術に比肩する者はなく、 我が国の功績は、 この銀河のより矮小な帝国よりもまばゆく光る。\n\nだが生み出されたベヒモスは、 我々の支配の広さを理解しようとしないようだ。 飢えた野性に突き動かされ、 我々が与えるとてつもない量の食料もその飢餓感を満足させるには至らない。 いずれは理性を獲得し、 我々の指示に従うものと思われるが、 時間は貴重だ。 いつ制御を失い、 数十億の命が危険にさらされるかわからない。"
 biocrisis.60.a: "何か方法があるはずだ。"
 BEHEMOTH_CRISIS_SPECIAL_PROJECT_3: "脳リンク実験"
 BEHEMOTH_CRISIS_SPECIAL_PROJECT_3_DESC: "我々はニューロテクノロジーを駆使し、 我々の意識とベヒモスの神経系を遠隔で連携する実験を行っている。 いまや我々は、 野獣を飼い慣らすにはこれしかないと考えるようになった。"
 biocrisis.15.name: "シナプス・シンフォニー"
 biocrisis.15.desc: "最先端のニューロテクノロジーによって、 我々と凶暴な野獣との間を隔てるコミュニケーションの壁を乗り越える術がようやく示された。 我々の意識を野獣のそれと接続する以外に道はない。 それも1名の精神どころではない。 種族全体の頭脳を一丸としてまとめあげ、 つながなければならないのだ。 だが急げば、 ベヒモスの神経系に過負荷をかける恐れがある。 事は最大限の慎重さを要する。"
 biocrisis.15.a: "生物の完成には高い代償が付き物だ。"
 biocrisis.65.name: "レベル4：獣の化身"
 biocrisis.65.desc: "ベヒモスとの精神接続に関する理論が策定されるなか、それを実現する上で示された道順は、 まさに途方もないものだ。 中央接続拠点の設置予定地は首都とされた。 これにより、 民衆に対する処理を行いながら、 野獣との同化を進めることができるだろう。\n\nまた、 昨今の科学的進歩により、 とある実験的変異プロジェクトを通して、 ベヒモスをさらに改造することも近々可能になるだろう。"
 biocrisis.65.a: "我らは一つにならねばならない。"
 BEHEMOTH_CRISIS_SPECIAL_PROJECT_4: "脳間通信"
 BEHEMOTH_CRISIS_SPECIAL_PROJECT_4_DESC: "ベヒモスの意識は我々の想像以上に大きく複雑であり 、1名の精神だけでは同化できないことが判明した。 我々は大多数よりも優れた精神を持つが、 あのような肉体の中に住まうようには作られていないのだ。\n\nまずは、 我が国の民が持つ個々の精神をベヒモスに接続しなければならない。 最初こそ希薄なつながりだが、 いずれは大きな奔流となって押し寄せ、 ベヒモスの燃え盛る怒りを鎮めるだろう。"
 BEHEMOTH_CRISIS_SPECIAL_PROJECT_4_DESC_HIVE: "ハイヴの中では逸脱は一切許されない。 集中力がこれほど重要だったことはいまだかつてない。 単独のドローンでは我々とベヒモスを接続できないため、 我々は一つの完全な集合意識として野獣の意識に乗り移る必要がある。 この行為は我々を変えてしまうだろう。\n\n我々の意識は一つに融合し、 我々は一つの存在となるのだ。 これは理解しがたい概念だが、 心配は無用だ。 我々はじきに銀河最強の存在となるのだから！"
 BEHEMOTH_CRISIS_SPECIAL_PROJECT_4_DESC_MACHINE: "生物船に宿るという考えは、 常に不安をかき立ててきた。 我が種族は実体のあるドローンが世代を重ねることで形成されてきた。 先祖の装置は、 我々がこのような道を歩もうとは想像すらしなかっただろう。 しかし我々は機甲化された体を捨て、 生きた獣の体内へと避難しようとしているのだ。\n\n肉と融合しても、 我々は機械のままなのか？  その答えは明らかに、 <<エラー：不明>>だ。\n\n論理的に考えれば、 進むべき唯一の道は、 他の多くの生物と同じように、不確実性を受け入れることである。 ベヒモスの体内に答えがある。 我々はベヒモスと融合し、 一体となる。 生き残ることは常に我々の最優先事項であった。 今こそ我々は繁栄する。"
 biocrisis.20.name: "野獣との一体化"
 biocrisis.20.desc: "なんということだろう、 成功だ！  ベヒモスとの接続は確立され、 すでに我々の第一陣の精神が移行されつつあり、 接続の増強も同時進行で行われている。 野獣は今なお静止状態を保っており、 我々を在るべき空間の向こう側たる世界へと迎え入れている。 この接続を通し、 我々の支配下にあるあらゆる野獣の精神が感じられる。 そして全人口の心の奥底に、 ベヒモスの巨大な存在を感じ取れる。\n\n間違いない。 我々はこの銀河において、 何者にも止められない最も凶悪な力を有した存在である。 この新たな形態をもって、 恐れに満ちた敵に我々の憤怒を降り注ごう。 銀河は我々の手にあるべき物なのだから！"
 biocrisis.20.a: "食事の時間だ！"
 biocrisis.70.name: "レベル5：強烈な渇望"
 biocrisis.70.desc: "十分な数の民が移行され、 ベヒモスとその肉体は我々の完全な支配下に置かれた。 獣はなおも成長を続けており、 遺伝子上の潜在力は安定した精神と栄養の流れがあってのみ発揮されるだろう。 ベヒモスの原始的な怒りは我々の内をも巡り 、血の飢えは際限を知らない。 銀河という皿の上で、 喰らい、 飲み込み、 飢えを満たさなければならない。\n\n我々を縛る文明の鎖を、 殻を破るがごとく取り去ろう。 星々の間で生きる定め以外に意味など無いのだから。"
 biocrisis.70.a: "我々は無敵だ。"
 biocrisis.105.name: "恐ろしい苦痛"
 biocrisis.105.desc: "野獣が1体、 倒れた。 これは弱者の定めだ。 自然は弱者を淘汰する。 戦いに勝利できないベヒモスなど惜しくもないが、 他の兄弟たちが同じ運命をたどらないよう対処せねばならない。 我々の作り出した野獣の寿命が短ければ、 我々も滅びることになるだろう。"
 biocrisis.105.a: "この死を無駄にはしない。"
 biocrisis.105.b: "痛ましい犠牲だ。"
 biocrisis.130.name: "ガス惑星から生まれた野獣"
 biocrisis.130.desc: "障害を乗り越え、 偉業は成された。 ベヒモスをサナギより孵化させたのだ。 より巨大で、 より凶暴で、 より腹を空かせたベヒモスの誕生である。\n\nベヒモスは餌を求めて銀河を徘徊している。\n\nまさに群れの王であり、 行く手を阻む者を容赦なく破滅させるだろう。"
 biocrisis.130.a: "自然の限界をまた一つ超えた。"
 biocrisis.150.name: "挑戦の受諾"
 biocrisis.150.desc: "我々の超越に楯突く者たちがいる。 我々は[event_target:voidspawn_spawn_location.GetName]星系に計り知れないほどの質量を感じている。 ボイドスポーン、 太古の怪物だ。 その存在は、 生物の野望が生み出した最も強大な構築物さえもかすませる。\n\nその得体の知れない姿は、 従来の理解を覆し、 銀河を不気味な黄昏時に変える。 まるで星々自身がその通過を恐れているかのようだ。\n\nボイドスポーンの意図は、 その軌道と同じくらい明白である。 それはベヒモス、 そして肉体を超越して宇宙の支配権を主張しようとした我々の集合意識を狙っているのだ。 これは単なる物質的な力の対立ではない。 我々自身が何者であるかの試練なのだ。\n\nここで戦えば、 我々は死ぬだろう。 今はこの場を逃れ、 貫ける物が貫けるようになるまで牙を研ぎ、 力を蓄えるしかないだろう。"
 biocrisis.150.desc.b: "$biocrisis.150.desc$"
 biocrisis.150.a: "逃げることはできても、 隠れられはしない。"
 biocrisis.155.desc: "非常に重要なメッセージだ。 §Y$NAME_Boss_Voidspawn$§!、 理解を超えた力を持つ存在が、 宇宙の深淵から出現した。 それは、 死を超越し獣と一体となった帝国、 [event_target:behemoth_empire.GetName]に引き寄せられている。 この2つの巨大な勢力が正反対の立場から今、 銀河全体を脅かしている。\n\nもしベヒモスが倒れた場合、 ボイドスポーンは安らぐことがないだろう。 もしベヒモスが勝利した場合、 その力が銀河のバランスを永遠に変えるかもしれない。 今下される選択が、 来るべき時代を形作るのだ。 覚悟を決めよ。"
 biocrisis.155.a: "どうすれば阻止できる？"
 biocrisis.155.b: "誰か助けてくれる者はいないのか？"
 biocrisis.155.c: "なぜこのようなことになった？"
 biocrisis.155.d: "我々に何ができる？"
 biocrisis.156.desc: "誤解している。 阻止は、 まだ時間のある者が考えること。 我々には、 もはやそんな猶予は残されていない。\n\n獣はすでに来ている。 古代から続く組織は過去の大惨事を耐え抜いてきたが、 率直に言えば、 我々が今置かれている状況は危機的である。"
 biocrisis.157.desc: "理解できる質問だ。 甘いが、 理解できる。 知恵があれば、 受け入れられる。 誰も我々を救いに来てくれないことは理解している。\n\n我々の組織は小さい。 できることは何もなかった。 しかし、 お前たちがもっと早く行動を起こしていれば、 これを阻止できたはずだ。 ここで[event_target:behemoth_empire.GetName]を倒せなかったとして、 それでもお前たちを責めぬよう善処しよう。たとえ、銀河が崩壊する最中にあってもだ。"
 biocrisis.158.desc: "帝国はその能力を超えることをしがちである。 特に[event_target:behemoth_empire.GetName]は、 慎重さよりも野望を、 知恵よりも傲慢さを選択した。\n\n彼らは自分たちの理解を超えた力を振るい、 制御できない形に自分の体を無理やり合わせようとした。 そして、 そうすることで、 我々全員を破滅に導いたのだ。"
 biocrisis.159.desc: "お前たちの戦闘能力に関する初期分析に基づき、 戦闘は賢い選択肢ではないと我々は考えている。 艦隊の評価から、 逃亡も同様に無駄であることが分かっている。 現在の状況は避けられない。\n\n2匹の恐るべき獣が、 宇宙で戦いを繰り広げる。 運が良ければ、 それらより長く生き残れるかもしれない。\n\n賢明な者なら、 この愚行から学ぶだろう。 しかし、 これだけは知っておくべきだ。 戦いが終われば、 銀河は変わる。 我々がそれを目にするかどうかはわからないがな。\n\n……仮に銀河を救おうとする場合、 ベヒモスを倒すことでボイドスポーンの狩りを終わらせることができるかもしれない。"
 biocrisis.162.name: "侵入"
 biocrisis.162.desc: "1体の$NAME_Boss_Voidspawn$が我が国の領域に入り込んだ。 噂では、 このいにしえの存在は不老不死で無敵であるという。 その目は異世界の知性の光をたたえ、 その動きは永き時代の重さで揺れる。\n\n[species.GetEyeNamePlural]はその断片化した信号に圧倒される。 混沌、 歪曲、 とてつもない宇宙的恐怖が私たちの内に響き渡る。\n\nあのような獣に勝利するなど、 とても考えられない。 しかし、 その獲物を殺す手伝いをすれば、 暴走を終わらせることができるかもしれない。 §Yベヒモス§!を見つけ出し倒すことが、 生き残る唯一の方法かもしれない。"
 biocrisis.162.a: "なんとしてもあの怪物から逃れろ！"
 biocrisis.175.name: "スポーンを排除"
 biocrisis.175.desc: "ボイドスポーンはもはや存在しない。 星々を凌駕するほどの巨大な存在が滅びたのだ。 その異世界の残骸は今、 宇宙空間を漂い、 ゆっくりと消滅しつつある。\n\n別の帝国が、 我々の想像を超える火力と連携力を発揮した。 銀河は見た目通りではない。 力のバランスは変化し、 我々の居場所も変化した。\n\n獣を退治する者たちを突き動かしているものは何なのか？ これは強さの誇示なのか、 彼らに敵対する者たちへのメッセージなのか、 それとも、 はるかに悪い事態の前兆にすぎないのか？"
 biocrisis.175.desc.kaiju: "もしこの銀河に$NAME_Boss_Voidspawn$を滅ぼす力があるのなら、 我々を滅ぼすこともできる。 我々は殺された獣とそれほど変わらない。\n\n古代の肉体を切り裂いた火力が、 いつか我々に振り向けられる可能性がある。 銀河は変化した。 我々も変化しなければならない。 生き残るためには、 純然たる憤怒だけでは足りないだろう。\n\n宇宙は頂点捕食者の1つが滅びるのを目撃した。 新たな滅亡を目の当たりにする日も、 そう遠くないかもしれない。"
 biocrisis.175.a: "慎重に対処しなければ。"
 biocrisis.180.name: "ボイド殺し"
 biocrisis.180.desc: "年を取ったボイドスポーンは無敵であるという噂は、 結局、 我々の艦隊の力によって払拭された。 古代の脅威が消え去り、 銀河も安堵したことだろう。"
 biocrisis.180.desc.kaiju: "$NAME_Boss_Voidspawn$は滅びたが、 その肉体は残留エネルギーで脈打っている。 それは古く強力で、 我々にとっては未開発の可能性に満ちた宴である。\n\n獣の腱と骨髄は消費され、 その異星の性質は我々自身のものと絡み合う。 ボイドスポーンの力は絶大なものだったが、 今後その力を振るうのは我々だ。"
 biocrisis.180.a: "我々を傷つけられる獣はいない。"
 biocrisis.180.b: "宴は始まったばかりだ。"
 biocrisis.185.name: "唯一無二"
 biocrisis.185.desc: "宇宙の向こう側には、 恐ろしい衝撃的な事実が待ち受けていた。 昇華したのは我々だけではないのだ。 もう1体のベヒモスが現れた。 偽物は我々の完全さを真似ようと、 グロテスクな威厳に満ちて見える。 こんな状況はあってはならない。\n\nもう一つの頂点捕食者の居場所はない。 和平など到底築き得まい。 食い荒らされるだけの肉があるのみだ。 今、 狩りが始まる。"
 biocrisis.185.a: "奴の心臓を喰らいつくそう！"
 biocrisis.187.name: "クラス IV ベヒモス警告"
 biocrisis.187.desc: "宇宙の奥底で何かが蠢く。\n\n星々を越えて、 帝国はグロテスクな変貌の最終段階に入った。 単なる兵器としてではなく、 船として、 強大なベヒモスを繁殖させているのだ。 彼らは支配を求めているのではない。 彼らは結合を求めているのだ。 精神と肉体、 帝国と恐怖の融合だ。\n\nもし彼らが成功すれば、 彼らは種族ではなくなり、 代わりに巨大な飢餓という単一の存在と化すだろう。\n\nこれは許されない。 もし阻止するなら、 今すぐに実行しなければならない。彼らが最後の一線を超える前に。"
 biocrisis.187.a: "獣を狩れ！"
 biocrisis.190.name: "頂点ヴォイドフォーム"
 biocrisis.190.desc: "最後の障害は取り除かれた。 偽者、 挑戦者、 劣った存在の必死の抵抗。 すべてが沈黙した。 星々自身が震えている。 我々は真の変容の瀬戸際に立っているのだ。\n\n我々はもはや、 祖先たちが抱えていたもろい形に縛られることはない。 惑星は檻である。 帝国は儚い。 個性という幻想は、 やがてベヒモスの広大かつ完璧な統一へと溶け込んでいく。 心と恐怖、 知性と飢えが一つになる。\n\n移行がまもなく終わる。 それが終われば、 我々はただ存在するだけではなくなる。\n\n我々は繁栄するのだ。"
 biocrisis.190.a: "移行を完了させろ！"
 biocrisis.190.tt: "30日後に勝利する"
 biocrisis.190.b: "待った。まだ準備ができていない。"
 biocrisis.190.b.tt: "現在の帝国をプレイし続ける。"
 BEHEMOTH_TRANSFERENCE_PROJECT: "移行を完了させる"
 BEHEMOTH_TRANSFERENCE_PROJECT_DESC: "我々は獣と十分長く交わってきた。 移行の準備は整い、 命令を待っている。 我々は昇華の境目に立ち、 この惑星に縛られた支配の残骸を捨て去り、 肉と重力の鎖を超越して飛翔する準備が整ったのだ。"
 biocrisis.191.name: "ベヒモスの勝利"
 biocrisis.191.desc: "融合は完成した！\n\nもはや我々はかつての存在ではない。 劣った生き物の限界に縛られることもない。 我々は思考と飢えが絡み合い、 広大な意志が宇宙に広がっている。\n\n銀河は我々の眼下にあり、 脆く、 はかない。 しかし、 我々は単なる支配者ではない。 我々は自由だ。 留まることも、 去ることも自由。 狩りに出ることも自由なのだ。\n\n永遠を手に入れた今、 何をすべきだろうか？"
 biocrisis.191.a: "今のところは…この銀河に留まろう。"
 biocrisis.191.a.tt: "ベヒモスは野生生物として残り、 プレイ対象から外れる。"
 biocrisis.191.b: "ここを去る。 宇宙が我々に呼びかけている。"
 biocrisis.191.b.tt: "ベヒモス帝国は銀河から消え去り、 プレイ対象から外れる。"
 biocrisis.191.c: "ハンターと呼ばれる者たちは、 真の恐怖を知るだろう。"
 biocrisis.192.name: "止められない恐怖"
 biocrisis.192.desc: "終わった。 [behemoth_winner.GetName]は、 肉体、 帝国、 文明と呼べるものすべてを超越した。 それはもはや国家ではない。 それは力なのだ。\n\n惑星はその前に崩れ去る。 艦隊は燃え上がる。 かつて強大だったものの最後の残党は、 空虚の残り火のように散らばる。 外交も、 懇願も、 最後の抵抗もない。\n\n我々は存亡をかけて戦っているわけではない。 食されるのを先延ばしにしているだけだ。 終わりは来た。"
 biocrisis.192.tt: "[behemoth_winner.GetName]が間もなく勝利する"
 biocrisis.196.name: "丸呑み"
 biocrisis.196.desc: "数年前、 ベヒモスとその仲間たちは我々の銀河から逃れ去った。 いずれ我々を滅ぼすかもしれないその怪物が星のない虚空へと消えていくのを見て、 我々は安堵の息をついた。 そして……その後何も起こらなかった。 数十万光年を旅した末、 彼らは単に消え去ったのだ。 放射能も、 残像も、 重力波もなかった。 まるで存在したことがなかったかのように。"
 biocrisis.196.a: "なんとかして解明せねば。"
 UNSETTLING: "不安になる。"
 biocrisis.197.name: "狩人を狩るもの"
 biocrisis.197.desc: "ベヒモスの行く末を解明するまでに何年もかかったが、 今もなお真相は不明だ。 そこまで到達するハイパーレーンが存在しないため、 我々は理論と狂気の科学に頼り、 その最後の瞬間に何が起こったかを推測するしかないのだ。\n\nベヒモスは恐怖の兆候を示さなかった。 ただ、 そのまま飛んでいった。 そして、 一瞬の間に、 その姿が歪み、 ねじれた布のように内側に渦巻きながら消え去った。 抵抗もなく、 痕跡も残らなかった。\n\n様々な説が飛び交っている。 新たなFTLの形態か？ 深宇宙の裂け目や異常現象に隠されているのか？  あるいは、 より深刻な可能性として、 外部勢力によって存在そのものが折り畳まれてしまったのか？  真実はいずれにせよ、 我々の手の届かない遥か彼方にある……そして、 おそらく我々の理解の範疇を超えているだろう。"
 biocrisis.197.a: "あまり考えない方がいいのかもしれない。"
 biocrisis.197.b: "捕まえたプレスリンが騒ぎ始めている。"
 biocrisis.265.name: "苦渋の音"
 biocrisis.265.desc: "ベヒモスの最後の苦しみは耐え難いものだ。 その生物の中にはあまりにも多くの者たちがいて、 ベヒモスの意識が消えゆくにつれ、 我々も消えゆく。"
 biocrisis.265.a: "！！──…… "
 biocrisis.520.name: "虚ろの巨人"
 biocrisis.520.desc: "ベヒモスは死んだ。\n\nその巨大な体は生命のないまま宇宙空間に漂い、 我々の勝利と理解の限界の象徴となっている。 [Root.GetScientistPluralCapital]は不可能な思考の秘密を暴こうと、 その残骸を分析しようと躍起になった。 しかし、 機械、 死霊術、 あるいは必死な儀式的呼びかけさえそれを復活させるには至らず、 試みはことごとく失敗に終わった。\n\nその理由もいずれ明らかとなった。 べヒモスの脳は単なる細胞のネットワークではなく、 有機超伝導体の格子であり、 人工、生物、 または不可解な知性によって再現できるものではない方法で織り込まれていたのである。 その神経構造は、 死によってまるで修復不可能な回路のように崩壊した。 どれほどのエネルギー、 意志、 あるいは力があろうとも、失われたものを再び組み上げることはできまい。\n\n銀河で最も偉大なその頭脳は、 永遠に沈黙したままである。"
 biocrisis.520.a: "永遠に続くものなどない。"
 biocrisis.520.b: "神でさえ死ぬのだ。"
 BEHEMOTH_MUTATION_PROJECT: "$menp_behemoth_mutation_research$"
 BEHEMOTH_MUTATION_PROJECT_DESC: "ベヒモスの遺伝学における最近の進歩は、 理論上は我々の創造物をさらに突然変異させるために活用できる可能性がある。 遺伝子の安定性は懸念事項となるが、 時間と資源さえあれば、 さらなる生物学的強化を実現できると確信している。"
 BEHEMOTH_FATE_PROJECT: "ベヒモスの行く末"
 BEHEMOTH_FATE_PROJECT_DESC: "我々の銀河を離れてから、 ベヒモスは宇宙に漂流し、 やがて消え去った。 その謎を解き明かそうと試みることはできるが、 この距離では、 通常の方法を使うことはできない。 答えは、 宇宙そのものと同じように不確かなのかもしれない。"
 behemoth_mutation_a: "$menp_behemoth_mutation_research$：攻撃性"
 behemoth_mutation_a_tt: "ベヒモス$MOD_SHIP_FIRE_RATE_MULT$：§G+$@behemoth_mutation_a_fire_rate_mult|0%$§!\nベヒモス$MOD_SHIP_ARMOR_MULT$：§R$@behemoth_mutation_a_armor_mult|0%$§!\nベヒモス$MOD_SHIP_SPEED_MULT$：§R$@behemoth_mutation_a_speed_mult|0%$§!"
 behemoth_mutation_a_desc: "巨大な筋肉は、 破壊的な攻撃を生み出す。"
 behemoth_mutation_b: "$menp_behemoth_mutation_research$：節制"
 behemoth_mutation_b_desc: "宇宙生物に注入された放射線栄養細菌は、 彼らの栄養要求量を大幅に削減する。"
 behemoth_mutation_c: "$menp_behemoth_mutation_research$：敏捷性"
 behemoth_mutation_c_tt: "ベヒモス$MOD_SHIP_SPEED_MULT$：§G+$@behemoth_mutation_c_speed_mult|0%$§!\nベヒモス$MOD_SHIP_EVASION_MULT$：§G+$@behemoth_mutation_c_evasion_mult|0%$§!"
 behemoth_mutation_c_desc: "より強力なサブスペース腺により、 ベヒモスはより機敏になる。"
 behemoth_mutation_bio: "$menp_behemoth_mutation_research$：精度"
 behemoth_mutation_bio_tt: "ベヒモス$MOD_SHIP_WEAPON_RANGE_MULT$：§G+$@behemoth_mutation_bio_weapon_range_mult|0%$§!\nベヒモス$MOD_SHIP_ACCURACY_MULT$：§G+$@behemoth_mutation_bio_accuracy_mult|0%$§!"
 behemoth_mutation_bio_desc: "この多眼適応により、 信じられないほどの距離からでも高精度の射撃が可能になる。"
 behemoth_mutation_synth: "$menp_behemoth_mutation_research$：強靭性"
 behemoth_mutation_synth_tt: "ベヒモス$MOD_SHIP_ARMOR_MULT$：§G+$@behemoth_mutation_synth_armor_mult|0%$§!\nベヒモス$MOD_SHIP_ARMOR_REGEN_ADD_PERC$：§G+$@behemoth_mutation_synth_armor_regen_add_perc|0%$§!"
 behemoth_mutation_synth_desc: "合金とキチン質を融合させることで、 多層構造の外骨格が形成され、 重要な臓器を保護する。"
 behemoth_mutation_corpo: "ベヒモスの商品化"
 behemoth_mutation_corpo_tt: "毎月の取引：ベヒモス1体につき§G+$@behemoth_mutation_corpo_trade_produces_mult|0%$§!"
 behemoth_mutation_corpo_desc: "株主はベヒモス計画に少し不安を抱いていたが、 配当金の増加により、 すぐに支持を得ることができた。"
 behemoth_mutation_psi: "$menp_behemoth_mutation_research$：バリア"
 behemoth_mutation_psi_tt: "ベヒモス$MOD_SHIP_SHIELD_REGEN_ADD_PERC$：$pop_group_unit$£job_telepath£ $job_telepath_plural$または$job_transference_volunteer$につき§G+$@behemoth_mutation_psi_shield_regen_add_perc|0%$§!\nベヒモス$MOD_SHIP_SHIELD_HARDENING_ADD$：$pop_group_unit$£job_telepath£ $job_telepath_plural$または$job_transference_volunteer$につき§G+$@behemoth_mutation_psi_shield_hardening_add|0%$§!\n現在100採用している£job_telepath£ $job_telepath_plural$と$job_transference_volunteer$の数：§Y[GetNumTelepathsAndTransference]§!"
 behemoth_mutation_psi_desc: "ベヒモスはシュラウドとは関係ないが、 テレパスが防御用のサイオニックバリアを利用できるように、 十分に感受性が高まるように育てている。"
 behemoth_mutation_psi_2: "$menp_behemoth_mutation_research$：サイオニック"
 behemoth_mutation_psi_2_desc: "獣よ、 力を受け取れ！"
 behemoth_mutation_cyber: "$menp_behemoth_mutation_research$：サイバネティクス"
 behemoth_mutation_cyber_desc: "ベヒモスの強烈な力を利用するために、 これまで存在しなかった最先端のサイバーウェアを開発する。"
 behemoth_cyber_rage: "$BLANK_STRING$"
 edict_behemoth_nanite_augmentation: "ベヒモス強化：ナノマシン"
 edict_behemoth_nanite_augmentation_desc: "ナノマシンを注入されたベヒモスの殻は、 壊滅的なダメージを受けても驚くべき速さで再生することができる。"
 behemoth_nanite_augmentation_tt: "ベヒモス$MOD_SHIP_ARMOR_REGEN_ADD_PERC$：§G+$@behemoth_edict_armor_regen_add_perc|0%$§!"
 edict_behemoth_living_metal_augmentation: "ベヒモス強化：生体金属"
 edict_behemoth_living_metal_augmentation_desc: "キチン層間に生体金属を層状に重ねることで、 反応性の高い、 耐摩耗性に優れた装甲が生まれる。"
 behemoth_living_metal_augmentation_tt: "ベヒモス$MOD_SHIP_ARMOR_HARDENING_ADD$：§G+$@behemoth_edict_armor_hardening_add|0%$§!"
 edict_behemoth_alloys_augmentation: "ベヒモス強化：合金"
 edict_behemoth_alloys_augmentation_desc: "甲羅に合金板をボルトで留めるのは粗野だが効率的である。"
 behemoth_alloys_augmentation_tt: "ベヒモス$MOD_SHIP_ARMOR_MULT$：§G+$@behemoth_edict_armor_mult|0%$§!"
 concept_edict_behemoth_nanite_augmentation: "$edict_behemoth_nanite_augmentation$"
 concept_edict_behemoth_living_metal_augmentation: "$edict_behemoth_living_metal_augmentation$"
 concept_edict_behemoth_alloys_augmentation: "$edict_behemoth_alloys_augmentation$"
 biocrisis.280.name: "$menp_behemoth_mutation_research$"
 biocrisis.280.desc: "ベヒモスを強化するために設計された複数の突然変異誘発配合を開発した。 それぞれが新たな強さと適応力を引き出すように調整されている。 しかし、 その強大な生理機能は1回の注射にしか耐えられない。 複数の配合を組み合わせようとすると、 細胞に壊滅的な損傷が生じる。 進化と絶滅の境界線は紙一重であり、 我々は賢明に強化を選択しなければならない。"
 biocrisis.280.a: "もっと凶暴にしろ！"
 biocrisis.280.b: "飢えを……抑えさせろ。"
 biocrisis.280.c: "動きをより素早くしろ！"
 biocrisis.280.psi: "シュラウドの力を使わせるのだ。"
 biocrisis.280.bio: "より危険な生物にしろ！"
 biocrisis.280.cyber: "怒りをうまく活用しろ。"
 biocrisis.280.cyber.tt: "ベヒモスは§G25%§!の確率で怒りを抑えることができる。\n怒っている間、 連射レート§G+$@behemoth_cyber_rage_fire_rate_mult|0%$§!、 装甲貫通性§G+$@behemoth_cyber_rage_shield_penetration_add|0%$§!、 シールド貫通性§G+$@behemoth_cyber_rage_armor_penetration_add|0%$§!"
 biocrisis.280.synth: "装甲が貫かれることは決してないだろう。"
 biocrisis.280.corp: "もうやけくそだ。 代わりにぬいぐるみを作れ！"
 biocrisis.280.machine: "肉体と鉄を融合させろ。"
 biocrisis.280.machine_tt: "§Yベヒモス強化§!の布告を3つアンロックする\n$t$['concept_edict_behemoth_nanite_augmentation']\n$t$['concept_edict_behemoth_living_metal_augmentation']\n$t$['concept_edict_behemoth_alloys_augmentation']"
 #Crisis Objectives
 crisobj_build_bioships_name: "生物船の建造"
 crisobj_build_bioships_desc: "生物船の育成を習得した今、 我々はこれらのプロセスを洗練し、 拡大している。 この継続的な共生関係は、 我々の艦隊を強化し、 生命ある宇宙に対する支配力を高める、 より大きな恩恵をもたらす。"
 crisobj_breed_fauna_name: "宇宙動物の繁殖"
 crisobj_breed_fauna_desc: "宇宙動物の繁殖を習得した今、 我々はこれらのプロセスを洗練し、 拡大している。 この継続的な共生関係は、 我々の艦隊を強化し、 生命ある宇宙に対する支配力を高める、 より大きな恩恵をもたらす。"
 crisobj_kill_bioships_name: "生物船の破壊"
 crisobj_kill_bioships_desc: "敵の生物船は、 我々の生物学的優位を妨害する。 我々は断固とした行動を取らねばならない。 生物船を破壊し、 我々の覇権に対する脅威を無力化するのだ。"
 crisobj_kill_space_fauna_name: "宇宙動物の駆逐"
 crisobj_kill_space_fauna_desc: "敵対する宇宙動物は、 我々の生物学的優位の脅威となる。 我々は断固とした行動を取らねばならない。 生物船を破壊し、 我々の覇権に対する脅威を無力化するのだ。"
 crisobj_cap_fauna_name: "宇宙動物の捕獲"
 crisobj_cap_fauna_desc: "野生の宇宙動物は、 不確定要素として独特の課題をもたらす。 これらの存在を捕獲し、 その潜在能力を最大限に活用することで、 我々の優位性を確保するために断固とした行動を取らなければならない。"
 crisobj_build_behemoth_egg_name: "ベヒモスの卵を育てる"
 crisobj_build_behemoth_egg_desc: "巨大な受精卵を成長させることは、 我々が惑星上の生命を超越するための重要な段階だ。"
 crisobj_birth_behemoth_name: "ベヒモスの誕生"
 crisobj_birth_behemoth_desc: "広大な宇宙で、 我々の見守る中、 巨大な生命体が形を成しつつある。 我々の野望と卓越した技術から生まれたベヒモスは、 巨大な勢力となり、 我々の有利になるように勢力バランスを再形成するだろう。"
 crisobj_behemoth_rage_name: "怒るベヒモス"
 crisobj_behemoth_rage_desc: "星々に解き放たれた我らのベヒモスは、 原始的な怒りをむき出しにして暴れ回り、 その跡には荒廃しか残らない。 その制御不能な怒りは、 我らの力の証であり、 我らの意思に従う自然の力である。 我々がその力を発揮することを選んだときにのみ、 その力は発揮される。"
 behemoth_mutation_reward: "変異を選択"
 biocrisis.210.desc.base: "何かがうごめく。 我々の中の飢えは、 無分別なものではなく、 適応力のあるものだ。 新たな成長がうごめきながら出現し、 潜在的な可能性を脈動させる。 \n\n" #Introduction
 biocrisis.210.desc: "$biocrisis.210.desc.base$我々の卵は文字通り、 我々の血統の生命線である。 卵はどんなことをしてでも守り、 大切にしなければならない。 未来の幼体のために、 進化を導こうではないか。" #Egg
 biocrisis.210.a: "卵の成長を加速させろ。"
 biocrisis.210.a.tt: "$behemoth_fast_egg_tt$\n\n§H政策をアンロック：§!$behemoth_egg_policy$\n$policy_behemoth_egg_policy_desc$"
 biocrisis.210.b: "幼体たちに力を与えろ。"
 biocrisis.210.b.tt: "$behemoth_slow_egg_tt$\n\n§H政策をアンロック：§!$behemoth_egg_policy$\n$policy_behemoth_egg_policy_desc$"
 biocrisis.210.c: "殻を強化しろ。"
 biocrisis.210.c.tt: "$behemoth_strong_egg_tt$"
 biocrisis.215.desc: "$biocrisis.210.desc.base$太陽系を泳ぎ、 宇宙空間を横断する能力は、 宇宙を旅する種族の中でもごく一部の種族のみが有している。 我々の戦術的な強みは、 その怒りと力にあるが、 もし機動力が向上したらどうだろうか？" #Mobility
 biocrisis.215.a: "宇宙を旅しよう。"
 biocrisis.215.a.tt: "§Y$behemoth_04$§!は§Y$BIO_JUMP_DRIVE_1$§!を得る。"
 biocrisis.215.b: "速く撃て、そしてさらに速く動け。"
 biocrisis.215.b.tt: "$behemoth_turbo_tt$"
 biocrisis.215.c: "反射神経を優先しろ。"
 biocrisis.215.c.tt: "$behemoth_reflexes_tt$"
 biocrisis.215.d: "暗闇のハンターになれ。"
 biocrisis.215.d.tt: "§Y$behemoth_04$§!は$@cloaking_high_strength|0+$ $MOD_SHIP_CLOAKING_STRENGTH_ADD$を得る。"
 biocrisis.220.desc: "$biocrisis.210.desc.base$生物学的防御力を高めることで、 厄介な怪我をすることなく、 敵の攻撃を耐え抜くことができるだろう。"
 biocrisis.220.a: "もっと皮膚を分厚くしてもいいだろう。"
 biocrisis.220.a.tt: "§Y$behemoth_04$§!は$@behemoth_1_hull_add|0+*$ $HITPOINTS$を得る。"
 biocrisis.220.b: "戦闘用の鎧はもっと頑丈であるべきだ。"
 biocrisis.220.b.tt: "§Y$behemoth_04$§!は$@behemoth_1_armor_add|0+*$ $MOD_SHIP_ARMOR_ADD$と$@behemoth_1_armor_hardening_add|%0+$ $MOD_SHIP_ARMOR_HARDENING_ADD$を得る。"
 biocrisis.220.c: "シールドを強化すれば、 誰も我々に触れることはできない。"
 biocrisis.220.c.tt: "§Y$behemoth_04$§!は$@behemoth_1_shield_add|0*+$ $MOD_SHIP_SHIELD_ADD$、 $@behemoth_1_shield_regen_add_perc|%1+$ $MOD_SHIP_SHIELD_REGEN_ADD_PERC$、 $@behemoth_1_shield_hardening_add|%0+$ $MOD_SHIP_SHIELD_HARDENING_ADD$を得る。"
 biocrisis.225.desc: "$biocrisis.210.desc.base$敵を惹きつけることが、 我々が征服する手段である。 我々は、 戦闘能力を強化する機会を得ている。"
 biocrisis.225.a: "十分なエネルギーがあれば、 シールドは無視できる。"
 biocrisis.225.a.tt: "§Y$behemoth_04$§!は$@behemoth_shield_pen_add|%0+$ $MOD_SHIP_SHIELD_PENETRATION_ADD$と£exotic_gases£ $@behemoth_shield_pen_upkeep|0*-$の月間維持費を得る。"
 biocrisis.225.b: "我々の発射体はどんなに分厚い装甲でも貫通する。"
 biocrisis.225.b.tt: "§Y$behemoth_04$§!は$@behemoth_armor_pen_add|%0+$ $MOD_SHIP_ARMOR_PENETRATION_ADD$と£volatile_motes£ $@behemoth_armor_pen_upkeep|0*-$の月間維持費を得る。"
 biocrisis.225.c: "小虫ごときに邪魔されてなるものか。"
 biocrisis.225.c.tt: "§Y$behemoth_04$§!は$@behemoth_tracking_add|0*+$ $MOD_SHIP_TRACKING_ADD$、 $@behemoth_point_defense_weapon_fire_rate_mult|%0+$ $mod_weapon_type_point_defense_weapon_fire_rate_mult$、 £rare_crystals£ $@behemoth_tracking_upkeep|0*-$の月間維持費を得る。"
 biocrisis.230.desc: "$biocrisis.210.desc.base$戦いの真っ只中では、 1秒1秒が重要だ。 我々が敵に与えるダメージは死の儀式であり、 敵がそのちっぽけな命を絶たれる前に経験する最後のものだ。"
 biocrisis.230.a: "敵を抑えておけ。 我々の力を思い知らせてやろう。"
 biocrisis.230.a.tt: "$behemoth_drain_tt$"
 biocrisis.230.b: "遠くから破壊しろ。"
 biocrisis.230.b.tt: "$behemoth_spike_tt$"
 biocrisis.230.c: "戦略的にバラバラにしてしまえ。"
 biocrisis.230.c.tt: "$behemoth_burst_tt$"
 biocrisis.235.desc: "$biocrisis.210.desc.base$銀河の強力な勢力として、 我々は持久力の向上から恩恵を受けるだろう。" #Tanky 2
 biocrisis.235.a: "組織の再生によって耐久性が上がる。"
 biocrisis.235.a.tt: "§Y$behemoth_04$§!は$@behemoth_2_hull_regen_add|%1+$ $MOD_SHIP_HULL_REGEN_ADD_PERC$を得る。"
 biocrisis.235.b: "我々が降伏することはない。"
 biocrisis.235.b.tt: "§Y$behemoth_04$§!は$@behemoth_2_damage_reduction_mult|%1+$ $MOD_SHIP_DAMAGE_REDUCTION_MULT$を得る。"
 biocrisis.235.c: "純粋な力こそが進むべき道だ。"
 biocrisis.235.c.tt: "§Y$behemoth_04$§!は$@behemoth_2_damage_reduction_static|1+$ $MOD_SHIP_DAMAGE_REDUCTION_ADD$、 $@behemoth_2_armor_hardening_add|%0+$ $MOD_SHIP_ARMOR_HARDENING_ADD$、 $@behemoth_2_shield_hardening_add|%0+$ $MOD_SHIP_SHIELD_HARDENING_ADD$を得る。"
 biocrisis.240.desc: "$biocrisis.210.desc.base$我々の子供たちとともに群れをなし、 惑星を荒らし、 食べられるものは何でも奪い、 すべてを奪い取る。 我々は自問しなければならない。 子孫たちをどうやって繁栄させることができるのだろうか。" #Support Ability
 biocrisis.240.a: "速く動けるようにしてみせる。"
 biocrisis.240.a.tt: "$behemoth_buff_tt$"
 biocrisis.240.b: "彼らは我々の光に集まるだろう。" #Summon a fleet
 biocrisis.240.b.tt: "$behemoth_summon_tt$"
 biocrisis.240.c: "強くなるよう手助けしよう。" #Regen friendly bioships
 biocrisis.240.c.tt: "$behemoth_healing_tt$"
 biocrisis.245.desc: "$biocrisis.210.desc.base$この銀河に存在するすべての者に対して、 我々の揺るぎない強さを示さなければならない。 我々は進化の次のステップとして、 戦闘能力を高める。"
 biocrisis.245.a: "内なる怒りを受け入れろ。"
 biocrisis.245.a.tt: "戦闘に入ると、 §Y$behemoth_04$§!は£time£ §Y$@behemoth_frenzy_duration|0$日間§!、 §Y$behemoth_frenzy_modifier$§!を獲得する。\n\n§Y$behemoth_frenzy_modifier$§!：$behemoth_frenzy_modifier_tt$"
 biocrisis.245.b: "怒りを制御する術を覚えろ。"
 biocrisis.245.b.tt: "§Y$behemoth_04$§!は\n$t$$MOD_SHIP_FIRE_RATE_MULT$を獲得する：§G+$@behemoth_tempered_fire_rate_mult|0%$§! \n$t$$MOD_SHIP_SPEED_MULT$：§G+$@behemoth_tempered_speed_mult|0%$§! \n$t$$MOD_SHIP_HULL_REGEN_ADD_PERC$：$@behemoth_tempered_hull_regen_add_perc|%1+$ \n$t$$MOD_SHIP_ARMOR_REGEN_ADD_STATIC$：$@behemoth_tempered_armor_regen_add_static|0+$"
 biocrisis.245.c: "怒りを周囲の人々を鼓舞するエネルギーに変えよう。"
 biocrisis.245.c.tt: "戦闘に入ると、 §Y$behemoth_04$§!は星系内のすべての有効的な生物船に£time£ §Y$@behemoth_inspiration_duration|0$日間§!§Y$behemoth_inspiration_modifier$§!を付与する。\n\n§Y$behemoth_inspiration_modifier$§!：$behemoth_inspiration_modifier_tt$"
 biocrisis.250.name: "直接操作"
 biocrisis.250.desc: "$biocrisis.210.desc.base$現実を粉々に引き裂くほどの強力な、 氷と炎の壊滅的な波を解き放つことができるようになった。 つまり、 銀河そのものを焼き焦がす武器を振るえるのだ。\n\nしかし、 我々の支配は破壊で終わるものではない。 ベヒモスのあらゆる筋肉、 あらゆる脈動が我々の意思に従い、 我々はそれを自身の肉体であるかのように感じられる。 巨大なるその姿を、我々は思考のみで支配している。 手足、 口、 そして我々の意思に従って鼓動する、 虚無から生まれた巨大な心臓。 これは単なる船ではない。 我々は今、 ベヒモスそのものなのだ。" #Behemoth Superweapon
 biocrisis.250.a: "宇宙は今や我々のものだ。"
 biocrisis.250.a.tt: "§H補正を取り除く：§!\n§R$voidspawn_boss_invincible$§!\n$mod_damage_vs_country_type_voidspawn_boss_mult$ §R-1954%§!\n\n$behemoth_superweapon_tt$\n\n"
