 r_everchanging_stone: "変化の石"
 r_everchanging_stone_desc: "周囲の環境に応じて色や化学組成が変化する人工宝石。 他の物体の隣に置くと、 その物体の要素を模倣し、 対象物の分子組成をよりよく理解できるようになる。"
 everchanging_stone_modifier: "$r_everchanging_stone$勝利"
 everchanging_stone_modifier_tt: "$EXHIBITION_XENO_GEOLOGY$で展示された['concept_specimen']ごとに、 他の2つのカテゴリーの産出量を§G+$@everchanging_stone_modifier|0%$§!増やす。"
 r_pulsestone: "パルスストーン"
 r_pulsestone_desc: "非常に放射性の高い石で、 危険な磁気の波動を発生させる。 電磁気の操作に関する我々の理解を大きく変える可能性を秘めているが、 その放出エネルギーを封じ込めることはほぼ不可能である。"
 pulsestone_modifier: "$r_pulsestone$"
 mod_scientist_lifespan_add: "科学者の寿命"
 r_gavel_of_the_tribunal: "法廷の木槌"
 r_gavel_of_the_tribunal_desc: "この木槌の柄には、 今は亡き銀河を統治していた古代の三頭政治の指導者の名前が刻まれている。 我々の種族にとってはあまりにも巨大な木槌だが、 その存在感は畏敬の念を呼び起こす。"
 gavel_of_the_tribunal_galcom: "$r_gavel_of_the_tribunal$"
 gavel_of_the_tribunal_galcom_tt: "次の§Y決議§!が通るまで外交発言力£diplo_weight£ §G+$@gavel_of_the_tribunal_galcom_diplo_weight|0%$§!。"
 gavel_of_the_tribunal_no_galcom: "$r_gavel_of_the_tribunal$"
 r_celestial_resonator: "天体共鳴器"
 r_celestial_resonator_desc: "標本に近づけると、 畏敬の念を抱かせるような壮大な光のショーを発生させ、 効力を高める不思議な装置。"
 celestial_resonator_tt: "展示した['concept_specimen']につき10$r_unity$を産出する"
 celestial_resonator_triumph_tt: "展示した['concept_specimen']につき§G+$@celestial_resonator_happiness|0%$§! £happiness£ §Y幸福度§!と§G+$@celestial_resonator_diplo_weight|0%$§! £diplo_weight£ §Y外交発言力§!を得る"
 celestial_resonator_modifier: "$r_celestial_resonator$"
 r_entangled_relay: "絡まった中継器"
 r_entangled_relay_desc: "この古代の物体は、 量子もつれによって遠く離れた情報伝送ネットワークを接続し、 銀河間でのシームレスな通信を可能とする。"
 entangled_relay_modifier: "$r_entangled_relay$"
 r_prototype_vir_core: "プロトタイプVIRコア"
 r_prototype_vir_core_desc: "この孤立した人工知能は、 特に優れた教師であり指導者であり、 あらゆる状況で支援を行うことができる。 複雑な説明をわかりやすく説明することに優れ、 情報を明確に整理してユーザーが十分な情報を得た上で意思決定を行えるようにする。"
 prototype_vir_core_modifier: "$r_prototype_vir_core$"
 r_propagandosphere: "プロパガンダスフィア"
 r_propagandosphere_desc: "このホログラフィック・スフィアには、 過去の文明のプロパガンダ映画のアーカイブが収められている。 非常に独創的で、 見る者を魅了するこれらの映画は、 我々の姿でリメイクし、 軍と国民を鼓舞するために活用できる。"
 r_executus_compendium: "執行全書"
 r_executus_compendium_desc: "古代文明の評議会の広範な記録は、 密封されたカプセルに保存されていた。 その何兆ページにも及ぶ記録には、 官僚機構の最適化と革新的な組織ツールの詳細な説明が記載されている。 これらの改善策の多くは、 我々の政府にも導入できるだろう。"
 executus_compendium_triumph_tt: "目標を早期実行コストの10%で実行する。（最低コスト£unity£3000）"
 r_the_pattern_maker: "パターンメイカー"
 r_the_pattern_maker_desc: "この古代の計算機は、 敵船などの物体の動的な軌道を監視し、 その動きを予測する能力において比類ないものがある。 予測アルゴリズムから生成されるデータパターンは、 熟練した建築家の設計図のように複雑。 十分なパワーと素材が与えられれば、 高性能センサーを搭載した特殊な偵察船を製造することも可能だ。"
 r_the_pattern_maker_effect_tt: "§Yパターンウォーカー§!級の偵察船スカウトを作成する。\n - 非常に高速でハイパーレーン認識距離"
 NAME_Patternwalker: "パターンウォーカー"
 NAME_Patternwalker_Cloak: "$NAME_Patternwalker$"
 SENSOR_PATTERNWALKER: "シアーパターンセンサー"
 r_vaporous_mega_orchid: "霞がかった巨大なラン"
 r_vaporous_mega_orchid_desc: "この特に巨大なランは、 50年に一度だけ開花する。 その香りは、 攻撃性や不信感を引き起こす精神的なシナプスを一時的に遮断し、 鎮静効果をもたらすことが分かっている。"
 r_vaporous_mega_orchid_effect_tt: "殺戮、機械、陥没した以外の帝国の態度が§Y$@vaporous_mega_orchid_opinion_duration_years|0$§!年間§G+$@vaporous_mega_orchid_opinion|0$§! £opinion£。"
 opinion_vaporous_mega_orchid: "$r_vaporous_mega_orchid$"
 r_tiyanki_matriarch_nerve_core: "女王ティヤンキの神経コア"
 r_tiyanki_matriarch_nerve_core_desc: "この古代の宇宙クジラの脳の神経細胞には何世紀にもわたる進化のデータがコード化されている。 そのネットワークを解読することで、 他の超捕食者の脆弱性を見つけ出すことができるだけでなく、 彼らの生存の秘密を解き明かすこともできる。"
 tiyanki_matriarch_nerve_core: "$r_tiyanki_matriarch_nerve_core$"
 celestial_chart: "天体図"
 r_celestial_chart_0: "謎の軌道カプセル"
 r_celestial_chart_0_desc: "何千年もの間、 我々の母星の周りを回っていた奇妙なカプセル。 中身が何なのか、 まだ特定できていない。"
 r_celestial_chart_1: "$celestial_chart$"
 r_celestial_chart_1_desc: "古代のカプセルの中から発見された広大な地図の最初の部分。"
 r_celestial_chart_2: "$celestial_chart$"
 r_celestial_chart_2_desc: "古代のカプセルの中から見つかった、 部分的に完成した地図。"
 r_celestial_chart_3: "$celestial_chart$"
 r_celestial_chart_3_desc: "古代のカプセルの中から見つかったほぼ完全な地図。"
 r_celestial_chart_4: "$celestial_chart$"
 r_celestial_chart_4_desc: "伝説の海賊$NAME_CaptainNess$が作成した広範囲にわたる星図とデータバンク。"
 r_celestial_chart_4_effect_tt: "植民地の1つに['concept_treasure_vault']を設置する。"
 celestial_chart_upgraded_tt: "§Y$celestial_chart$§!は新しい情報で更新された。"
 r_mutated_voidworm_nest: "突然変異したボイドワームの巣"
 r_mutated_voidworm_nest_desc: "突然変異したボイドワームの巣は、 寄生感染を必要とせずに繁殖するよう進化した。 これらの産卵の一部は、 数日のうちに完全に成熟する。"
 r_mutated_voidworm_nest_effect_tt: "首都星系で成熟した$NAME_Frenzied_Voidworms$を孵化させる"
 ######################################
 #Collection - Curators Interactions #
 ######################################
 CURATORS_DESIGNATION: "我々は"
 DEAD_CURATORS_DESIGNATION: "我が組織最後の生き残りである我々は、"
 grand_archive.4121.name: "$leviathans.500.name$"
 grand_archive.4121.desc.common: "あなたが大規模な人数の参加を可能とする§Y$grand_archive$§!を構築したという情報を入手した。 これは銀河の歴史を求めるすべての人々と共有するという、 称賛に値する取り組みだ。 この点において、 我々は共通の目標を持っている。\n\n是非この取り組みを追求する手伝いをしたいと考えている。"
 grand_archive.4121.desc.default: "我々$grand_archive.4121.desc.common$は§Yコレクション§!を拡大し続け、できる限り手伝わせてもらう。"
 grand_archive.4121.desc.dead: "我が組織$grand_archive.4121.desc.common$最後の生き残り。 我が組織は最近砕かれてしまったが、 残った資源を使ってあなたたちが§Yコレクション§!を増やすのを手伝おう。"
 leviathans.4100.desc: "もちろんだ！\n\nあなたたちの努力には気づいている。 現在の§Yコレクション§!を見たところ、 僅かな寄付の代わりに次のような形で支援することができる。"
 leviathans.4100.a: "もっと知りたい内容がある。"
 leviathans.4100.a.aesthetic_wonder: "$leviathans.4100.a$§Y$EXHIBITION_AESTHETIC_WONDERS$§!"
 leviathans.4100.a.historical_item: "$leviathans.4100.a$§Y$EXHIBITION_GALACTIC_HISTORY$§!"
 leviathans.4100.a.xeno_geology: "$leviathans.4100.a$§Y$EXHIBITION_XENO_GEOLOGY$§!"
 leviathans.4100.tooltip.no_pending_reward: "キュレーターから支援を受けたいのであれば、 コレクションを広げないといけない。"
 leviathans.4100.tooltip.no_reward: "以下についてすべての支援を受けている。"
 leviathans.4100.tooltip.no_reward.aesthetic_wonder: "$leviathans.4100.tooltip.no_reward$$EXHIBITION_AESTHETIC_WONDERS$"
 leviathans.4100.tooltip.no_reward.historical_item: "$leviathans.4100.tooltip.no_reward$$EXHIBITION_GALACTIC_HISTORY$"
 leviathans.4100.tooltip.no_reward.xeno_geology: "$leviathans.4100.tooltip.no_reward$$EXHIBITION_XENO_GEOLOGY$"
 leviathans.4105.desc: "もちろんだ。\n\n何について知りたい？"
 leviathans.4105.a: "特定の分野について、 教えて欲しい。"
 leviathans.4105.b.common: "以下について設計を購入したい。"
 leviathans.4105.b.aesthetic_wonder: "$leviathans.4105.b.common$、 §Y$EXHIBITION_AESTHETIC_WONDERS$§!博物館。"
 leviathans.4105.b.historical_item: "$leviathans.4105.b.common$、§Y$EXHIBITION_GALACTIC_HISTORY$§!博物館。"
 leviathans.4105.b.xeno_geology: "$leviathans.4105.b.common$、§Y$EXHIBITION_XENO_GEOLOGY$§!博物館。"
 leviathans.4105.c: "§Y遺産§!の購入に興味がある。"
 leviathans.506.g: "§Yコレクション§!において他にどのように手伝うことができるのか？"
 leviathans.4110.desc: "支援することができるのは1つの分野の専門知識のみだ。我々は少数であり、 銀河は広大だ。\n\nどのような助けが必要だ？"
 leviathans.4111.desc: "$leviathans.4110.desc$"
 leviathans.4112.desc: "$leviathans.4110.desc$"
 leviathans.4115.desc: "ああ。これは我々のプライベートコレクションから、 ある品を預けることになる。\n\nこれを我々から求めるとは。 これは決してささやかな贈り物ではない。 見返りとしてそれなりの寄付を期待している。"
 leviathans.4116.desc: "$leviathans.4115.desc$"
 leviathans.4117.desc: "$leviathans.4115.desc$"
 REWARD_NOT_AVAILABLE: "まだ報酬の用意ができていない。"
