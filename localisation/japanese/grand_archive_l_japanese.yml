 tr_archivism_expert_negociation: "巧みな交渉"
 tr_archivism_expert_negociation_delayed: "価値のある品物の適切な保管場所を見つけるには、 適切な収集家を知ることが鍵となる。"
 tr_archivism_expert_negociation_tt: "展示されている['concept_specimen']につき、 §G+$@archivism_expert_negociation_diplo_weight|0%$§! £diplo_weight£ §Y$diplomatic_weight$§!を獲得。"
