 #################
 #Grand Archive #
 #################
 GRAND_ARCHIVE_TITLE: "Grand Archive" #Do not translate
 DLC_GRAND_ARCHIVE_RECOMMENDATION_DESC: "§S$GRAND_ARCHIVE_TITLE$§!をお勧めする理由は、 あなたがこれまでに下してきた選択が、 このDLCのテーマにフィットしているからだ。"
 grand_archive: "グランドアーカイブ"
 the_grand_archive: "グランドアーカイブ"
 grand_archive_0: "$grand_archive$"
 grand_archive_0_DESC: "生きた§Y宇宙動物§!など、 我々が銀河系で収集した特筆すべき['concept_specimen', 標本]を保管・展示するために設計された軌道上の建造物。"
 grand_archive_0_MEGASTRUCTURE_DETAILS: "§Y$grand_archive$§!には、 我々が銀河系で収集した最も貴重な遺物が保存・展示されている。 また、 生きた§Y宇宙動物§!を飼育・観察するための専用のビバリウムも併設されている。"
 requires_grand_archive: "$dlc_requirement_string$§I§!グランドアーカイブ"
 GOTO_COLLECTION: "$COLLECTION$へ"
 must_have_2500_pops: "§Y2500§!£pop£ §HPOP§!以上の天体が必要。"
 STARBASE_CANNOT_UPGRADE_CONSTRUCTION_TYPE: "§Rこの艦隊は我々の星系基地ではアップグレードできない§!"
 VOIDWORMS_LABEL: "$voidworms_plural$"
 VOIDWORMS_LABEL_TOOLTIP: "§H$VOIDWORMS_LABEL$§!\n銀河に$voidworms_plural$がどれくらい存在するかを設定する。$requires_grand_archive$"
 CUTHOLOIDS_LABEL: "$cutholoids_plural$"
 CUTHOLOIDS_LABEL_TOOLTIP: "§H$CUTHOLOIDS_LABEL$§!\n銀河に$cutholoids_plural$がどれくらい存在するかを設定する。$requires_grand_archive$"
 ##################
 #Gravity Snares #
 ##################
 feature_unlock_gravity_snares: "重力罠"
 feature_unlock_gravity_snares_desc: "§Y宇宙動物§!の生け捕りと輸送を可能にする。§Y$grand_archive$§!を建設すると、 この装置は捕まえた生物をビバリウムに保管する。"
 feature_unlock_containment_vessels: "保管船団"
 feature_unlock_containment_vessels_desc: "重力罠が捕まえられる§Y宇宙動物§!の数が倍になる"
 gravity_snare: "重力罠"
 gravity_snare_plural: "重力罠"
 NAME_GravitySnare: "$gravity_snare$"
 FLEETORDER_SEND_SNARE_NAME: "$NAME$を発射"
 FLEETORDER_SEND_SNARE_ON_COOLDOWN: "§R$TRIGGER_FAIL$重力罠は§Y[This.GetGravitySnareCooldownForFleet]日間§!クールダウンする。§!"
 FLEETORDER_GRAVITY_SNARE_NO_COMMUNICATIONS: "§R$TRIGGER_FAIL$これらの宇宙動物について、 捕獲するのに十分な情報が足りていない。§!"
 FLEETORDER_MUST_BE_SPACE_CRITTER: "§R$TRIGGER_FAIL$この種類の宇宙動物を捕獲することができない。§!"
 GRAVITY_SNARE_CAPTURE_CHANCE_LEADER: "リーダーレベル：$VALUE|G%0$"
 FLEETORDER_CAPTURE_SPACE_CRITTER: "宇宙動物の捕獲"
 FLEETORDER_CAPTURE_SPACE_CRITTER_PROGRESS: "宇宙動物の捕獲：$PROGRESS|Y%0$"
 FLEETORDER_WAIT_FOR_GRAVITY_SNARE_TO_RELOAD: "§Y重力罠§!の再装填：$DAYS|Y$日"
 SNARE_SPEED: "捕獲速度：$SPEED$"
 CAPTURE_CHANCE: "捕獲成功率：$VALUE|Y%0$"
 CAPTURE_AMOUNT: "1つの§Y$gravity_snare$§!で、 一度に最大$VALUE|0G$匹の§Y宇宙動物§!を捕獲できる。"
 CAPTURE_AMOUNT_FULL_FLEET: "1つの§Y$gravity_snare$§!で、 §Y宇宙動物§!の艦隊をすべて捕獲できる。"
 GRAVITY_SNARE_1: "$gravity_snare$"
 GRAVITY_SNARE_STANDARD: "$gravity_snare$"
 GRAVITY_SNARE_STANDARD_TOOLTIP: "重力罠は局所的な量子重力のバーストを維持することができ、 ハイパードライブを持たない既知の物体が脱出するのを防ぐ。 これらの力は、 §Y宇宙動物§!を捕獲して我々のシステムに戻し、 さらに分析するのに十分な時間維持することができる。"
 SHIP_STAT_CONTRIBUTION_ADDATIVE_fauna_capture_chance: "$NAME$: $VALUE|Y0%$"
 SHIP_STAT_DESC_fauna_capture_chance: ""
 GRAVITY_SNARE_CLOAKING_EMPTY: "$SCIENCE_CLOAKING_EMPTY$"
 GRAVITY_SNARE_CLOAKING_1: "$SCIENCE_CLOAKING_1$"
 GRAVITY_SNARE_CLOAKING_2: "$SCIENCE_CLOAKING_2$"
 GRAVITY_SNARE_CLOAKING_3: "$SCIENCE_CLOAKING_3$"
 GRAVITY_SNARE_CLOAKING_DARK_MATTER: "$SCIENCE_CLOAKING_DARK_MATTER$"
 GRAVITY_SNARE_CLOAKING_PSI: "$SCIENCE_CLOAKING_PSI$"
 GRAVITY_SNARE_NO_EMERGENCY_FTL: "重力罠は緊急FTLジャンプを行うようには設計されていない。"
 FLEET_CANNOT_TAKE_ORDERS: "§Rこの艦隊は指示を受けられない。§!"
 MESSAGE_SPACE_CRITTER_CAPTURE_SUCCESS_TITLE: "宇宙動物を捕獲"
 MESSAGE_SPACE_CRITTER_CAPTURE_SUCCESS_DESC: "$SYSTEM|Y$星系での捕獲に成功した！  $gravity_snare$は標本をビバリウムに収めた。\n\n新しい宇宙動物を入手した：\n$CAPTURED_LIST$$RESOURCES_LIST$"
 MESSAGE_SPACE_CRITTER_CAPTURE_SUCCESS_NO_VIVARIUM_DESC: "$SYSTEM|Y$星系での捕獲に成功した！  §Hビバリウム§!にこれ以上収容できないため、 捕獲した動物は安楽死させられ、 資源として解剖された。\n$CULLED_LIST$$RESOURCES_LIST$"
 MESSAGE_SPACE_CRITTER_CAPTURE_FAILURE_TITLE: "捕獲失敗"
 MESSAGE_SPACE_CRITTER_CAPTURE_FAILURE_DESC: "$SYSTEM|Y$星系での捕獲に失敗した。 $SHIP_NAME|Y$から発射した$gravity_snare$は失われてしまった。"
 MESSAGE_CAPTURED_SPACE_CRITTER_RETURNED_TITLE: "新しい宇宙動物"
 MESSAGE_CAPTURED_SPACE_CRITTER_RETURNED_DESC: "新しい宇宙動物はビバリウムに収められた。\n$NEWBORN_LIST$$CULLED_LIST$$RESOURCES_LIST$"
 MESSAGE_CAPTURED_SPACE_CRITTER_RETURNED_DESC_CULLED: "\n\n以下の宇宙動物は資源のため淘汰された：\n$CULLED_LIST$"
 CULLED_CREATURES_RESOURCE_OUTPUT_DESC: "\n\n獲得した資源：\n$RESOURCES_LIST$"
 mod_gravity_snare_cooldown_mult: "重力罠クールダウン"
 MOD_GRAVITY_SNARE_COST_MULT: "重力罠コスト"
 MOD_SPACE_FAUNA_CULLING_REWARD_MULT: "淘汰による資源"
 grand_archive.7210.name: "重力罠"
 grand_archive.7210.desc.common: "最近発見された§Y$tech_gravity_wells$§!のおかげで、 [root.GetAdjective]調査船は$gravity_snare_plural$を発射できるようになった。"
 grand_archive.7210.desc.vivarium: "この非致死性の発射体は、 宇宙動物を安全に捕獲し、 §Yビバリウム§!に運ぶことができる。 そこで宇宙動物は引き続きその種の新しい標本を繁殖し続けることができる。\n\nこれらの生物を淘汰し、 解剖することで、 クローン作成のための§Y$genetic_material$§!や他の資源を採取することができる。"
 grand_archive.7210.desc.no_vivarium: "この非致死性の発射体は、 宇宙動物を安全に捕獲し、 研究と解剖のために輸送することができる。 捕獲した宇宙動物は§Y$genetic_material$§!と資源のために採取される。\n\n更なる繁殖のために生かしておきたい場合は、 §Yビバリウム§!が必要となる。 これは§Y$grand_archive$§!または§Y[GetHatcheryPlural]§!を星系基地で建設することによって実現できる。"
 grand_archive.7220.name: "プレスリンの獣"
 grand_archive.7220.desc: "我々の§Y$gravity_snare_plural$§!は§Y$NAME_Prethoryn_Scourge$§!を適切に追跡し、 抑えておくことができない。 動きのパターンから、 これらの存在が何らかの高次の意識によってコントロールされており、 本当の意味での個体ではないのではないかと考えている。\n\nこれらの生物をビバリウム内に収容しようとすれば、 他の標本や[this.GetName]全体を危険にさらすことになる。\n\nこれらの生物の捕獲作業を無期限に停止した。"
 grand_archive.7220.a: "慎重な措置だ。"
