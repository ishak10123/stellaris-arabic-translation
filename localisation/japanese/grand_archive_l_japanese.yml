 VOIDLURE_ATTRACTED_FAUNA_TITLE: "新しい宇宙育ちの生物"
 VOIDLURE_ATTRACTED_FAUNA_DESC: "ボイドルアーに宇宙動物が引き寄せられた。"
 NAME_Lured_Fauna: "一時的におびき寄せた動物"
 wildlife_ranch: "野生生物牧場"
 wildlife_ranch_desc: "我々は在来生物と共生し、 彼らの生息地の保護と種の持続可能な成長に最大限の注意を払っている。"
 wildlife_ranch_2: "野生生物エクスパンス"
 wildlife_ranch_2_desc: "生態系を慎重に管理することで、 在来生物の環境が改善され、 牧畜の取り組みが容易になる。"
 wildlife_ranch_3: "野生生物ネクサス"
 wildlife_ranch_3_desc: "動物たちが自由に歩き回れる広大な施設。 動物たちが提供する資源の質を最大限に高めるために、 動物たちに快適さを提供している。"
 hunting_grounds: "狩猟場"
 hunting_grounds_desc: "あらゆる狩猟技術を習得するための訓練施設。 近代的なエネルギー兵器から伝統的な武器まで、 恐ろしい捕食者を倒し、 トロフィーとして獲得するには、 比類なき器用さと技術が求められる。"
 hunting_grounds_2: "狩猟エクスパンス"
 hunting_grounds_2_desc: "地元の野生動物を狩るための最適な狩猟条件を提供する訓練および監視施設。 ヒートマップ技術により、 最近の動物の足跡を特定し、 トロフィー級の獲物を獲得することができる。"
 hunting_grounds_3: "狩猟ネクサス"
 hunting_grounds_3_desc: "大規模な惑星狩猟パーティーを支援する広大な空間。 最高品質の武器や追跡装置を備え、 ハンターたちは捕獲した獲物の数と質を最大限に高めるための高度な訓練を受ける。"
 wildlife_sanctuary: "野生生物保護区"
 wildlife_sanctuary_desc: "野生動物を自然の生息地で研究する保護区。 個体数の不安定化や過剰な病気を防ぐための安全対策が講じられている。 これらの生き物を研究すること自体が学術的に価値のある取り組みであるが、 それ以上に、 我々自身の性質について多くを教えてくれる。"
 wildlife_sanctuary_2: "上級保護区"
 wildlife_sanctuary_2_desc: "この場所の生き物は個別にケアされており、 彼らの独特な食生活や医療ニーズは、 自然の生息地への最小限の妨害で提供されている。 特殊な生態系により、 絶滅危惧種の繁殖と再導入が可能となっている。"
 wildlife_sanctuary_3: "保護区ネクサス"
 wildlife_sanctuary_3_desc: "この施設では、 まるで存在しないかのように綿密に設計されたインフラを通して動物たちを監視およびケアしている。 研究者は、 動物たちの自然な行動を妨害することを禁じられており、 最高品質の研究データの収集が保証されている。"
 primal_arena: "原始の闘技場"
 primal_arena_desc: "コロシアムでは、 屈強な戦士たちが獰猛な生き物と原始的な戦いを繰り広げる。 英雄たちが野獣を打ち負かす、 あるいは命を落とす姿を見ることほど素晴らしい娯楽はない。"
 primal_arena_2: "原始のスタジアム"
 primal_arena_2_desc: "この巨大なスタジアムでは、 熟練した調教師が動物の群れに攻撃のタイミングを合わせる訓練を施している。 もはや獣闘士たちは、 獲物を圧倒するだけでは生き残れない。 生き残るためには、 調教師さえも出し抜く頭脳が必要なのだ。"
 primal_arena_3: "原始のコロシアム"
 primal_arena_3_desc: "獣退治の壮絶な戦いを開催するために設計された、 畏怖の念を抱かせる闘技場。 各戦闘には数週間の準備期間を要し、 数百万人の観客を収容できる。"
 symbiosis_nexus: "共生ノード"
 symbiosis_nexus_desc: "野生のパートナーが仲間として迎えられる自然保護区。 それぞれの生き物が、 マインドウィーヴにユニークな要素を提供してくれる。"
 symbiosis_nexus_2: "共生エクスパンス"
 symbiosis_nexus_2_desc: "野生のパートナーたちを自立した群れにまとめるための中心的な保護区。 彼らの低い精神能力を調整することで、 より大きなマインドウィーヴに思考の安定をもたらす。"
 symbiosis_nexus_3: "共生ネクサス"
 symbiosis_nexus_3_desc: "集合的な思考を推進する上で、 あらゆる生き物の心を一つにする役割を果たす広大なハブ。"
 edict_space_fauna_exhibition: "宇宙動物展示"
 space_fauna_exhibition: "$edict_space_fauna_exhibition$"
 edict_space_fauna_exhibition_desc: "銀河の各地から集まった牧場主たちが、 自慢の家畜を展示し、 誰もが欲しがる「ベストインショー」の栄冠を巡って競い合う。"
 edict_beasts_burden: "荷運び動物"
 beasts_burden: "$edict_beasts_burden$"
 edict_beasts_burden_desc: "最も丈夫な家畜は、 最も労働が重い作業を担うべきである。"
 edict_creature_welfare: "生き物の快適性"
 creature_welfare: "$edict_creature_welfare$"
 edict_creature_welfare_desc: "世話をしている生き物たちに最高の生活の質を保証することは、 我々の責任だ。"
 edict_crack_the_whip: "鞭打ち"
 crack_the_whip: "$edict_crack_the_whip$"
 edict_crack_the_whip_desc: "種に関係なく、 あらゆる生物は痛みに対して似たような反応を示す。 重要なのは、 それを正しく活用することだ。"
 edict_exotic_network: "エキゾチック神経ネットワーク"
 exotic_network: "$edict_exotic_network$"
 edict_exotic_network_desc: "我々が世話をしている弱い生物の心は、 より高度な計算に帯域幅をもたらすのに十分な能力を持っている。"
 edict_defensive_instincts: "自己保存の本能"
 defensive_instincts: "$edict_defensive_instincts$"
 edict_defensive_instincts_desc: "我々は一つだ。 深宇宙の寒さの中、 本能を絡み合わせよう。"
 edict_biological_overdrive: "生物学的オーバードライブ"
 biological_overdrive: "$edict_biological_overdrive$"
 edict_biological_overdrive_desc: "弱い生物は、 適切な神経受容体が設置されていれば、 その限界まで力を発揮することができる。"
 grand_archive.1060.name: "[from.GetSpaceFaunaName]キャリオン"
 grand_archive.1060.desc: "[from.GetSpaceFaunaNamePlural]との接触後、 我々は[fromfrom.GetName]で彼らの種の腐った死体を検出した。 遺体は長時間にわたって屋外にさらされたため、 枯れて凍結している。\n\n我々は、 この死骸が同種の他の個体を最初に引きつけたのだと仮定する。 おそらく彼らは、 失われた[from.GetSpaceFaunaGroup]の仲間を探していたのだろう。 これは、 宇宙空間で自然死した[from.GetSpaceFaunaName]の生物学を研究する貴重な機会だ。"
 TIYANKI_GROUP_NAME: "群れ"
 SPACE_AMOEBA_GROUP_NAME: "群れ"
 CRYSTAL_GROUP_NAME: "群れ"
 VOIDWORM_GROUP_NAME: "群れ"
 CUTHOLOID_GROUP_NAME: "群れ"
 voidworm_carcass_01_object: "ボイドワームの死骸"
 carcass_01_object: "宇宙動物の死骸"
 CARRION_DEBRIS_PROJECT: "[met_critter.GetSpaceFaunaName]の検死"
 CARRION_DEBRIS_PROJECT_DESC: "[met_critter.GetSpaceFaunaName]の死骸が[contact_system.GetName]で発見された。 自然におけるこれらの死骸を研究することで、 宇宙生物に対する理解はさらに深まるだろう。"
 grand_archive.1065.name: "検死完了"
 grand_archive.1065.desc: "[contact_system.GetName]で発見した[met_critter.GetSpaceFaunaName]の死骸の検死が完了した。 死骸から保存状態の良い生物標本を回収することができた。 その標本から、 その生物の生理学に関する特殊な洞察を得ることができる。"
 grand_archive.1065.specimen_tt: "動物固有の§M壮大な§!['concept_specimen']"
 NAME_BoneShip: "骨艦船"
 NAME_BoneShip_desc: "船体には、 成熟したティヤンキの巻きひげや、 ボイドワームの歯、 そして見たこともない生物の頭蓋骨が飾られている。 精密な武器がびっしりと取り付けられている。"
 grand_archive.1069.name: "$NAME_BoneShip$"
 grand_archive.1069.desc: "我々は、 [from.GetName]で奇妙に改造された宇宙船から連絡を受けた。 $NAME_BoneShip_desc$\n\n交渉の場への招待を受け入れた後、 パイロットを即座に[GetExecuted]。 我々は彼らの奇妙な艦船を奪い、 軍隊に加えた。 彼らの私物の中に、 ハンター用の便利なフィールドガイドを見つけた。"
 grand_archive.1069.a: "嬉しい土産だ。"
 EXECUTED: "処刑した"
 DEVOURED: "喰らった"
 grand_archive.1070.name: "$NAME_BoneShip$"
 grand_archive.1070.desc: "我々は、 [from.GetName]で奇妙に改造された宇宙船から連絡を受けた。 $NAME_BoneShip_desc$\n\nあらゆる周波数で我々に呼びかけている。"
 grand_archive.1070.a: "通信を公開するんだ。"
 NAME_PrimalHunter: "セリズ・ツァル"
 primal_hunter_desc: "銀河を放浪し、 大きな獲物を狙う熟練のハンター。"
 primal_hunter_catchphrase: "§L「コレクションのために新たなトロフィーを求めている。」§!"
 grand_archive.1075.name: "$grand_archive.1070.name$"
 grand_archive.1075.desc: "§H陰鬱なセリズの声は乾いていて、 まるで何週間も話していないかのようだった。 その態度は率直で、 ストイックなアイコンタクトを維持している。 それは、 敬意と威圧感の両方を感じさせるものだった。§!\n\nトロフィーハンターの私を感嘆させるとは相当だ。\n\n私は、我々のパートナーシップが便宜上のものであり、 相互に教え合うものであるという理解のもと、 お前たちの狩猟隊に参加したいと思う。"
 grand_archive.1075.a: "お前は誰だ？"
 grand_archive.1075.a.reply: "私は$NAME_PrimalHunter$。 長年、 これらの星系内で狩猟をしてきた。 新しい獲物を探している。 そして、 お前たちは優秀な追跡者であるようだ。\n\n私が求めているものは単純だ。 それは狩りによるスリルだ。"
 grand_archive.1075.b: "艦船についている頭蓋骨はなんだ？"
 grand_archive.1075.b.reply: "その種最後の個体だった。 かなり抵抗したな。"
 grand_archive.1075.c: "いつから我々を監視している？"
 grand_archive.1075.c.reply: "お前たちにはまだ学ぶべきことが多くあるのは明らかだ。\n\n優れたハンターは、 獲物を完璧な隠密性を保ちながら、 必要なだけ追跡することができる。 必ず獲物を仕留めたいのであれば、 発砲するまで姿を見られないようにしなければならない。 私が影の中で過ごした時間は問題ではない。 自らを明らかにするという選択こそが重要なのだ。"
 grand_archive.1075.d: "なぜ加わりたい？"
 grand_archive.1075.d.reply: "私は競争を望んでいない。 縄張りを共有するのは嫌だが、 同じ獲物を巡って争うよりも、 むしろお前たちのハンターたちと一緒に仕事がしたい。\n\nお前たちが追跡するものは、 俺が仕留めて見せる。"
 grand_archive.1075.hire: "仲間に加える"
 grand_archive.1075.hire_tt: "§Y$NAME_PrimalHunter$§!は§Hリーダー§!として帝国に加わる。"
 grand_archive.1075.dismiss: "断る"
 grand_archive.1080.name: "さまよう異星生物学者"
 grand_archive.1080.desc: "[from.GetName]の星系基地に、 独立した調査船から通信があった。 この船は、 さまざまな捕獲装置と分析ツールを装備しており、 宇宙生物の捕獲と調査に特化して設計されている。\n\nあらゆる周波数で我々に呼びかけている。"
 grand_archive.1080.a: "通信を公開するんだ。"
 NAME_PrimalRancher: "ルーク・カブルーク"
 primal_rancher_desc: "フィールドワークに情熱を傾ける異星生物学者。 あらゆる種類の宇宙生物を研究してきた。"
 primal_rancher_catchphrase: "§L「すべての生き物には物語があり、 私はそれに耳を傾けたい！」§!"
 grand_archive.1085.desc: "§H好奇心旺盛で分析的なルークは、 常に小型の携帯端末に目を走らせている。 挨拶をしている間も、 メモを取っているようだ。 それにもかかわらず、 彼女の態度は親切でプロフェッショナルだが、 やや距離を置いている。§!\n\n宇宙生物に興味を持っているのは私だけではないようですね。 私は、 [root.GetName]が実施している研究を調査しました。 非常に興味深い内容です。 あなた達の科学部署の一員として、 これらの取り組みを支援できるなら、 これ以上の喜びはありません。 もちろん、 私でよければですが。"
 grand_archive.1085.a: "お前は誰だ？"
 grand_archive.1085.a.reply: "すみません、 先走りしてしまいました。\n\n私の名前はルーク。 私は宇宙生物の現地調査を専門とする研究者で、 私のチームは、 移動パターン、 身体組成、 銀河レベルの生物多様性に関するデータを収集しています。\n\n個人的に、 私は子供の頃から動物が大好きでした。 どこへ行くにもフラッフを連れて行きます。"
 grand_archive.1085.b: "フラッフとは？"
 grand_archive.1085.b.reply: "銀河一大好きな存在ですよ！\n\n画面でお見せしたいところですが、 今は寝ているところなので。 私の故郷の惑星では、 この種をペットとして繁殖させており、 前回帰ったときに飼うことにしました。 最高に可愛いんですよ。 金属の床を小さな蹄がと歩く音、 私の羽をくわえる様子、 目と目の間に飛び出た毛束とか。 きっとあなたも大好きになると思います。 もし私たちが一緒に働くことになったらですが。"
 grand_archive.1085.c: "どうやって我々を見つけた？"
 grand_archive.1085.c.reply: "私たちが追跡していた個体の一つが異常な行動を示したので、 その痕跡を追いました。 そこで、 私たちはあなた達の科学チームが個体と関わっているのを見つけたのです。 あなたが生き物に注いだ細やかな配慮は、 宇宙生物に対する真の敬意の表れであり、 私はそれを見てあなた達の研究についてもっと知りたいと思うようになりました。 私は常に、 同じ分野で同じ考えを持つ仲間を探しているのです。"
 grand_archive.1085.d: "なぜ加わりたい？"
 grand_archive.1085.d.reply: "正直に言って、 フリーランスの科学研究は安定した収入源とは言えません。 私は自分の研究の重要さを信じていますが、 資金調達に時間を費やすことは、 本質的な科学から離れる時間を増やすだけです。\n\n[root.GetName]に加わることによって、 私は自分の得意分野である宇宙生物の研究に全力を注ぐことができます。 より多くのリソースにアクセスできるようになり、 あなた達の既存の科学チームと協力することで、 相互の目標をさらに推進できるでしょう。"
 grand_archive.1085.hire: "仲間に加える"
 grand_archive.1085.hire_tt: "§Y$NAME_PrimalRancher$§!は§Hリーダー§!として帝国に加わる。"
 grand_archive.1085.dismiss: "断る"
 grand_archive.1100.name: "獣の叫び"
 grand_archive.1100.desc: "未知の空間から大量の特異な電磁波が検出された。\n\n初期分析では、 §Yボイドワーム§!の通信信号に類似していることが示唆されているが、 より不規則で、 振幅が大幅に上昇している。 これはさらに調査しなくてはならない。"
 grand_archive.1100.a: "不安だ。"
 grand_archive.1105.name: "叫ぶボイドワーム"
 grand_archive.1105.desc: "この獣のような叫び声の発生する原因を突き止めた。 §Yボイドワーム§!が生息する[frenzied_voidworms_target.solar_system.GetName]の近くにある隠れた星系からだ。\n\nこの星系におけるボイドワームは、 これまで遭遇したものとは異なっている。 これらの生物は突然変異しており、 トロイカを形成しておらず、 成熟した個体は、 激しい交尾の狂乱としか表現できない行動を取っている。\n\nこれは懸念すべきことだ。 この非寄生行動は、 惑星に生息する生物を宿主とする必要がなく、 このハイヴが独自に繁殖できることを意味する。"
 grand_archive.1105.desc_no_homicidal: "\nもしこの亜種が野放しにされ、 広がれば、 銀河の生態系のバランスが完全に崩れる可能性がある。 彼らの攻撃性が強まっていることから、 これらの生物が[frenzied_voidworms_target.GetName]への攻撃の準備をしていると考えられる。"
 grand_archive.1105.desc_2: "\n守りを備えよ。"
 grand_archive.1105.a: "警報発令！"
 situation_frenzied_voidworms: "狂乱のボイドワーム"
 situation_frenzied_voidworms_type: "$situation_frenzied_voidworms$"
 situation_frenzied_voidworms_desc: "我々は明らかに突然変異したボイドワームのハイヴを発見した。 彼らは攻撃性を高めた状態で存在しており、 どうやら非寄生型の繁殖能力を持っているようだ。\n\n我々の存在が彼らの巣を刺激しているようだ。 慎重に進めなければならない。\n\n[GetVoidwormsHostility]"
 situation_frenzied_voidworms_monthly_change_tooltip: "$situation_monthly_change_tooltip_approaches_dependent$"
 finisher_effects_frenzied_voidworms: "攻撃的なボイドワームが我々の首都を攻撃するかもしれない。"
 approach_frenzied_voidworms_do_nothing: "何もしない"
 approach_frenzied_voidworms_do_nothing_tt: "特に行動は起こさない。"
 approach_frenzied_voidworms_hide_presence: "存在を隠す"
 approach_frenzied_voidworms_hide_presence_tt: "母星系に最も近い星系のすべての建設活動は中止された。"
 approach_frenzied_voidworms_stir_nests: "巣をかき乱す"
 approach_frenzied_voidworms_stir_nests_tt: "生物を刺激すると、 我々に対する敵意が高まる。"
 approach_frenzied_voidworms_feed_nests: "巣に食料を与える"
 approach_frenzied_voidworms_feed_nests_tt: "攻撃性を十分に下げることができれば、 彼らの信頼を得ることができるかもしれない。"
 #Strings for GetVoidwormsHostility trigger loc script
 voidworms_hostility_hostile: "突然変異したボイドワームは§P非常に攻撃的§!だ。"
 voidworms_hostility_neutral: "突然変異したボイドワームは§S攻撃的§!だ。"
 voidworms_hostility_pacified: "突然変異したボイドワームは§B落ち着いている§!。"
 hide_presence_modifier: "$approach_frenzied_voidworms_hide_presence$"
 hide_presence_starbase_modifier: "$approach_frenzied_voidworms_hide_presence$"
 frenzied_voidworms_killed.desc.common: "不思議な突然変異体の最も大きな巣は保護することができた。 我々の管理の下、 銀河中へと広がる危険性を抑えながら、 この興味深い生物を育てることができる。"
 grand_archive.1165.name: "突然変異したボイドワームの破壊"
 grand_archive.1165.desc.common: "彼らからの攻撃を待つことをせず、 我々はボイドワームの母星系で変異したヴォイドワームに対する軍事作戦を成功させた。 これらの生物の脅威はもはや[frenzied_voidworms_target.GetName]に迫り来ることはなく、 我々の惑星の安全も確保した。"
 grand_archive.1165.desc.default: "$grand_archive.1165.desc.common$と銀河生態系の安全を確保した。\n\n$frenzied_voidworms_killed.desc.common$"
 grand_archive.1165.desc.homicidal: "$grand_archive.1165.desc.common$を確保した。\n\n$frenzied_voidworms_killed.desc.common$"
 grand_archive.1165.a: "勝利だ。"
 grand_archive.1170.name: "突然変異したボイドワームの排除"
 grand_archive.1170.desc.common: "突然変異したボイドワームは排除された。 これらの生物の脅威はもはや[frenzied_voidworms_target.GetName]に迫り来ることはなく、 我々の惑星の安全も確保した。"
 grand_archive.1170.desc.default: "$grand_archive.1170.desc.common$と銀河生態系の安全を確保した。\n\n$frenzied_voidworms_killed.desc.common$"
 grand_archive.1170.desc.homicidal: "$grand_archive.1170.desc.common$を確保した。\n\n$frenzied_voidworms_killed.desc.common$"
 grand_archive.1170.a: "$grand_archive.1165.a$"
 grand_archive.1180.name: "突然変異したボイドワームの発見"
 grand_archive.1180.desc: "巣の近くにいたボイドワームの群れを一掃した後、 これらの生物が独特な突然変異を起こしていることが判明した。\n\n寄生せずに繁殖することができたようで、 攻撃性が高まった状態だった。 不自然な強さと耐久性にもそれで説明がつく。\n\n幸いにも、 我々は彼らの巣のひとつをトロフィーとして保存した。 我々の管理の下、 銀河中へと広がる危険性を抑えながら、 この興味深い生物を育てることができる。"
 grand_archive.1180.a: "予想外だが、 歓迎すべきことだ。"
 grand_archive.1185.name: "ボイドワームの殲滅"
 grand_archive.1185.desc: "我々の植民地を脅かしていた突然変異したボイドワームが駆除されたことが判明した。\n\n予想外だが、 歓迎すべき結末だ。 これらの生物がもはや我々の星系に悪影響を及ぼさないという事実に、 安堵することができる。"
 grand_archive.1185.a: "銀河はより安全な場所になった。"
 grand_archive.1200.name: "ボイドワームの攻撃"
 grand_archive.1200.desc: "狂乱したボイドワームが[frenzied_voidworms_target.solar_system.GetName]を攻撃している！\n\nその攻撃性は最高潮に達しており、 主な群れの軌道は[frenzied_voidworms_target.GetName]に向かっている。\n\n生存者を残すことはないだろう。"
 grand_archive.1200.a: "守りを備えよ。"
 grand_archive.1205.name: "最も大きな代償"
 grand_archive.1205.desc_common: "我々の努力にもかかわらず、 突然変異したボイドワームは[this.GetName]を完全に圧倒した。 狂乱した生物の攻撃はあまりにも激しく、 惑星の核を割ってしまい、 惑星は粉々に砕け散った。 生存者は一人もいなかった。\n\nそれ以来、 ボイドワームは巣に戻り、 我々の存在に動揺することはなくなった。 今後もそこから動かないことを願っている。"
 grand_archive.1205.desc.default: "$grand_archive.1205.desc_common$\n\nこの悲劇に直面した我々がとれる手段は、 生き続けて過ちから学ぶことだけだ。"
 grand_archive.1205.desc.gestalt: "$grand_archive.1205.desc_common$\n\n主なハイヴを失ったのは[event_target:victim_country.GetName]にとって大打撃だが、 まだ我々は生きている。"
 grand_archive.1205.a: "今こそ再建の時だ。"
 grand_archive.1210.name: "突然変異したボイドワームの排除"
 grand_archive.1210.desc: "[From.GetName]で発見されたボイドワームは排除された。 [avenged_homeworld.GetName]の破壊の復讐は遂げた。\n\n不思議な突然変異体の最も大きな巣は保護することができた。 我々の管理の下、 銀河中へと広がる危険性を抑えながら、 この興味深い生物を育てることができる。\n\nこのようにして、 失われた我々の世界の痕跡は生き続けるのだ。"
 grand_archive.1210.a: "$grand_archive.1165.a$"
 grand_archive.1220.name: "ボイドワームの鎮静化"
 grand_archive.1220.desc.common: "鉱物栄養を大量に巣に直接送り込んだ後、 我々は変異した[frenzied_home_system.GetName]のボイドワームと関係を築くことができた。 これらの生物の脅威はもはや[frenzied_voidworms_target.GetName]に迫り来ることはなく、 我々の惑星の安全も確保した。"
 grand_archive.1220.desc.common_2: "最も経験豊富な動物ハンドラーが生物の管理に携わっており、 彼らが相互に協力する意思があるように見える段階にきている。\n\n我々は彼らの最大の巣のひとつを確保した。 これにより、 野生に放置されていたであろうこれらの突然変異体ボイドワームをより多く育成することができる。"
 grand_archive.1220.desc.default: "$grand_archive.1220.desc.common$と銀河生態系の安全を確保した。\n\n$grand_archive.1220.desc.common_2$"
 grand_archive.1220.desc.homicidal: "$grand_archive.1220.desc.common$を確保した。\n\n$grand_archive.1220.desc.common_2$"
 grand_archive.1220.a: "艦隊に新たな仲間が加わった。"
 grand_archive.1220.tt: "狂乱のボイドワーム艦隊がすべて帝国の支配下に追加される"
 grand_archive.7010.name: "ボイドルアーの開発"
 grand_archive.7010.desc.common: "宇宙生物の研究を極めた結果、 我々は§Yボイドルアー§!と呼ぶものを開発した。"
 grand_archive.7010.desc: "$grand_archive.7010.desc.common$\n\nこれらの星系基地の建造物は、 それぞれの宇宙生物の生息する星系内に建設しなければならない。 一度設置したら、生物の群れを定期的に星系基地へおびき寄せる。\n\n特定の種類の生物は攻撃的になる可能性があるため、 注意が必要だ。"
 grand_archive.7010.desc.primal_calling: "$grand_archive.7010.desc.common$\n\nこれらの装置は、 宇宙の未開の空間に呼びかけ、 虚空に避難している生物を誘引するように設計されている。 何が引き寄せられるのかはわからないが、 現在流している周波数には、 定期的に反射するような反応が返ってきている。\n\n何かが近づいてくる。"
 grand_archive.7020.name: "くじらの歌"
 grand_archive.7020.desc: "以前に開発した§Yボイドルアー§!は、 [This.Capital.System.GetName]と似た§Yガス惑星§!がある星系に生息する宇宙クジラを惹きつけた。\n\nルアーは、 その生物が生息している環境で構築しなければ、 適切に動作しないようだ。 他の野生動物を発見した場合は、 それらの自然生息地の近くにもボイドルアーを建設できるはずだ。"
 ### Treasure Hunters
 origin_treasure_hunters: "トレジャーハンター"
 origin_treasure_hunters_desc: "冒険への渇望に駆り立てられ、 この文明は最も偉大で最も困難な探検に乗り出す準備ができている。 謎の地図だけを手に、 彼らは今、 伝説の海賊の財宝を確保するために星々を駆け巡っている。"
 origin_tooltip_treasure_hunters_effects: "- 稼働していない['r_celestial_chart_0_desc', $celestial_chart$]を持って始まる\n- すべての雇用中のリーダーは['concept_adventurous_spirit_trait']のボーナス特性がある$NEW_LINE$- 統治者の特性：$TABBED_NEW_LINE$- ['leader_trait:leader_trait_buccaneer']$TABBED_NEW_LINE$- ['leader_trait:leader_trait_trailblazer']$TABBED_NEW_LINE$- ['leader_trait:leader_trait_treasure_hoarder']"
 START_SCREEN_TREASURE_HUNTERS: "我々の文明は、 冒険への渇望によって定義されている。\n\n失われた宝物や古代遺跡の発見、 そして遥か昔の遺物の発掘。 このような出来事は、 我々にとって最も有名な物語となり、 何世代にもわたって我々の社会を影響し続けてきた。\n\n宇宙への初めての進出が冒険への呼びかけを生み出したのは、 偶然だったのか、 それとも運命だったのか？ 謎のカプセルが我が惑星を周回しているのが発見された。 そのカプセルの中には、 暗号化された星図が収められていた。\n\n長年の努力の末、 この地図を解読し、 未開の地への航路を定める技術を手に入れた。 銀河の果てに向かって船出するにあたり、 我々は団結し、 これまでに直面した中で最も偉大かつ困難な冒険に乗り出す決意を固めている。"
