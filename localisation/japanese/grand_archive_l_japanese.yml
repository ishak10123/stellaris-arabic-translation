 AUTOMATION_SEND_GRAVITY_SNARES: "宇宙動物の捕獲"
 ################
 #Technologies #
 ################
 tech_galactic_archivism: "銀河アーカイブ"
 tech_galactic_archivism_desc: "我々の銀河系の歴史は、 先人たちから学ぶために適切な保存が必要だ。 壮大なスケールのアーカイブは、 そのような目的にふさわしい。"
 tech_gravity_wells: "重力罠"
 tech_gravity_wells_desc: "量子質量を局所的に集中させることで、 短時間の極端な重力を発生させることができる。 正しく操作すれば、 このような重力は理論上、 どんな大きさの生物でも無傷で捕らえ、 封じ込めることができる。"
 tech_containment_vessel: "キュレーターの収容プロトコル"
 tech_containment_vessel_desc: "重力罠が捕まえられる§Y宇宙動物§!の数が倍になる。"
 TECH_UNLOCK_CONTAINMENT_VESSEL_TITLE: "$TECH_UNLOCK_COMPONENT_LINE$$tech_containment_vessel$"
 TECH_UNLOCK_CONTAINMENT_VESSEL_DESC: "$tech_containment_vessel_desc$"
 tech_asteroidal_carapace: "小惑星型の甲殻"
 tech_asteroidal_carapace_desc: "カサロイドの殻は鉱物だけでなく、 強力な生物繊維で補強されている。 我々は高度な冶金技術を使ってこのプロセスを合成することができる。"
 ASTEROIDAL_CARAPACE_ARMOR: "$tech_asteroidal_carapace$"
 ASTEROIDAL_CARAPACE_ARMOR_DESC: "$tech_asteroidal_carapace_desc$"
 tech_gravity_snare_capacity_desc: "重力罠が捕まえられる§Y宇宙動物§!の数が§G1§!増える"
 tech_gravity_snare_capacity_1: "マイクロ特異点の強化"
 tech_gravity_snare_capacity_1_desc: "$tech_gravity_snare_capacity_desc$"
 tech_gravity_snare_capacity_2: "重力操作の最適化"
 tech_gravity_snare_capacity_2_desc: "$tech_gravity_snare_capacity_desc$"
 tech_gravity_snare_capacity_3: "収容システムの改善"
 tech_gravity_snare_capacity_3_desc: "$tech_gravity_snare_capacity_desc$"
 gateway_snare_capacity: "重力罠容量"
 gateway_gravity_snare_capacity: "§H重量罠容量パス§!\n§Eこの技術は、 重力罠容量の分野をさらに発達させる§!"
 tech_alien_cloning: "人工交配"
 tech_alien_cloning_beastmasters: "$tech_alien_cloning$"
 tech_alien_cloning_desc: "慎重に管理された環境の中で、 我々は淘汰された宇宙動物から集めた$genetic_material$を育成し、 我々の監督の下、 それぞれの種の新しい生物を生み出すことができる。"
 feature_alien_cloning_unlocked: "§Y$policy_space_fauna_growth$§!政策"
 feature_alien_cloning_unlocked_desc: "$policy_space_fauna_growth_desc$"
 tech_alien_cloning_tt: "§H機能をアンロック：§!コルベット規模の宇宙動物クローニング"
 tech_improved_incubators: "改良インキュベーター"
 tech_improved_incubators_beastmasters: "$tech_improved_incubators$"
 tech_improved_incubators_desc: "我々は孵化場で確立された人工的な成長プロセスを改善し、 より成熟したクローンを作るために初期の発育段階を早めることができる。"
 tech_improved_incubators_tt: "§H機能をアンロック：§!デストロイヤー規模の宇宙動物クローニング"
 tech_improved_incubators_tt_desc: "孵化場では、 従来のデストロイヤーの大きさに匹敵する、 より大きな§Y宇宙動物§!のクローンを作ることができるようになった。"
 tech_metabolic_gases: "代謝ガス"
 tech_metabolic_gases_beastmasters: "$tech_metabolic_gases$"
 tech_metabolic_gases_desc: "孵化場内の代謝ガスを改善することで、 それぞれの個体は生まれる前にさらに成熟する。"
 tech_metabolic_gases_tt: "§H機能をアンロック：§!戦艦規模の宇宙動物クローニング"
 tech_metabolic_gases_tt_desc: "孵化場では、 あらゆる成熟段階やサイズの宇宙動物艦船をクローンできるようになった。"
 BOARDING_CABLES: "搭乗ケーブル"
 BOARDING_CABLES_MODULES: "$BOARDING_CABLES$"
 BOARDING_CABLES_TOOLTIP: "低い確率で、 敵の艦船を盗んだり、 身代金目当てに敵の司令官を捕らえたりする。"
 BOARDING_CABLES_DESC: "$BOARDING_CABLES_TOOLTIP$"
 tech_boarding_cables: "$BOARDING_CABLES$"
 tech_boarding_cables_desc: "弾力性のあるカーボンファイバーケーブルに取り付けられた貫通フックを発射する小口径砲を再利用したもので、 敵艦船の固定や搭乗に最適。"
 tech_controlled_mutations: "制御された突然変異"
 tech_controlled_mutations_desc: "宇宙動物艦船のゲノムを改変することで、 そのバイオマスに人工技術を組み込むことができ、 宇宙動物船の有効性を高めることができる。"
 tech_controlled_mutations_2: "高度な制御された突然変異"
 tech_controlled_mutations_2_desc: "我々はさらに先へ進むことができる。 宇宙動物の遺伝子を高度に操作することで、 より多様な特殊コンポーネントを統合することができる。"
