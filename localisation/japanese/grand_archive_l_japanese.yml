 LEADER_EXECUTED: "$CLASS|H$$LEADER|Y$は即決処刑された。"
 grand_archive.9005.name: "[fromfrom.GetName]を捕虜にした"
 grand_archive.9005.desc: "我々の§H[fromfrom.GetClass]§!§Y[fromfrom.GetName]§!は、　[from.GetName]での戦闘中に[fromfromfrom.GetName]に捕らえられた。 [fromfrom.GetHisHer]の命と引き換えに身代金を要求している。"
 grand_archive.9005.desc.second: "以前にも報告したように、 我々の司令官[fromfrom.GetName]は、 命と引き換えに身代金を要求する[from.GetName]たちに捕らえられた。"
 grand_archive.9005.a: "身代金を支払う。"
 grand_archive.9005.a.tt: "[fromfrom.GetName]は解放され、 我々の隊列に帰還するだろう。"
 grand_archive.9005.b: "検討するべきだ。"
 grand_archive.9005.c: "身代金を払わない。"
 grand_archive.9010.name: "仕方なく払う。"
 grand_archive.9010.desc: "[from.GetName]が[fromfrom.GetHisHer]の身代金を支払うことを拒んだため、 敵司令官[fromfrom.GetName]は依然として我々の拘束下にある。 [fromfrom.GetHisHer]の運命はどうなるのか?"
 grand_archive.9010.a: "公開処刑。"
 grand_archive.9010.b: "捕虜を[this.GetHomeWorldName]で解放する。"
 grand_archive.9010.c: "捕虜を維持する。"
 MESSAGE_LEADER_CAPTURED_TITLE: "敵司令官を捕虜"
