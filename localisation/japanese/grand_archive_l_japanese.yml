 ###################
 #Treasure Troves #
 ###################
 TREASURE_TROVE: "宝物庫"
 TREASURE_TROVE_DESC: "長い間行方不明になっていた海賊の§Y$TREASURE_TROVE$§!が、 [this.GetName]のどこかにあることが検出された。 それがどんな富を含んでいるか、 知る者はいない…"
 treasure_troves_chain_title: "宝物庫"
 treasure_troves_chain_desc: "銀河の歴史を通じて、 海賊たちは不正に得た利益を注意深く配置した財宝の隠し場所に隠してきた。 それらの秘密の貯蔵庫の多くは放棄され、 失われたと考えられてきまたが、 今や我々のものだ。"
 mod_treasure_trove_reward_mult: "宝物庫の報酬"
 grand_archive.6010.name: "$TREASURE_TROVE$を発見"
 grand_archive.6010.desc: "[event_target:treasure_trove_planet.GetName]から微弱な信号を検出した。 初歩的な暗号化技術によると、 これは長い間行方不明になっていた海賊の§Y$TREASURE_TROVE$§!もののようだ。\n\n多少の労力は必要となるだろうが、 その秘密を解き明かすことができると確信している。"
 grand_archive.6010.a: "その場所を特定しろ。"
 grand_archive.6015.name: "回収した財宝"
 grand_archive.6015.common.1: "[event_target:treasure_trove_planet.GetName]にある海賊の隠された§Y$TREASURE_TROVE$§!に仕掛けられていた罠を気をつけて解除した後"
 grand_archive.6015.desc: "$grand_archive.6015.common.1$、 我々は貴重な資源の山を発見した。\n\nこの思いにもよらぬ資源をうまく活用する。"
 grand_archive.6015.desc.specimen: "$grand_archive.6015.common.1$、 我々は密閉容器に保存されていた古代の海賊の遺物を発見した。 この海賊の歴史の一部は、 我々のコレクションに加えられる。"
 grand_archive.6015.desc.specimen_extra: "さらに、広大な§Y$TREASURE_TROVE$§!の中に隠された古代の海賊の遺物も発見した。 慎重に修復すれば、 この海賊の歴史の一部は、我々のコレクションに加えられるだろう。"
 grand_archive.6015.desc.pirate_ship: "失われた§Y$TREASURE_TROVE$§!の罠を注意深く解除した後、 我々は下方にある惑星のある場所へと指すアナログの道しるべを発見した。 そこには、 探知防止装置に守られた信じられないほど巨大な海賊の戦艦があった。\n\n[treasure_trove_pirate_ship.GetName]と呼ばれる艦船は、 我々の軍に加えた。"
 grand_archive.6015.desc.tech: "$grand_archive.6015.common.1$、 我々は希少かつ貴重な研究資料を含むデータバンクを発見した。\n\nこれらがどのように入手されたのかは不明だが、 我々であればうまく活用できるだろう。"
 grand_archive.6015.a: "$GOOD$"
