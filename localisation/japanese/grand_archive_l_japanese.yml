 #Events
 grand_archive.8000.name: "古代のカプセル"
 grand_archive.8000.desc: "[this.GetHomeWorldName]の軌道上を周回する古代カプセルについて、 画期的な進展があった。 [this.GetScientistPlural]のたゆまぬ努力のおかげで、 デジタルセキュリティの最後の層を解読し、 長い間我々を魅了してきた星図を解読することができる。"
 grand_archive.8000.a: "何が入っていた？"
 TREASURE_HUNTERS_ANCIENT_CAPSULE_PROJECT: "古代カプセルの解析"
 TREASURE_HUNTERS_ANCIENT_CAPSULE_PROJECT_DESC: "軌道カプセル内の星図の初期分析により、 我々の母星系には存在しないいくつかの天体の位置が明らかになった。 正確な座標を抽出するには時間がかかる。"
 grand_archive.8005.name: "古代カプセルの解析完了"
 grand_archive.8005.desc: "星図は完成したものではなかった！\n\n軌道カプセル内のデータは断片化されており、 欠けている部分は、 パズルの欠けたピースのように目立っている。 それでも、このデータはこれまで知られていなかった星系の座標を明らかにしているが、 そこには何が待ち受けているのかについては、 何も詳細が含まれていない。\n\nこの星図には、 目的地へのハイパーレーンによる移動を容易にするために、 確立された一連の侵入口も記載されている。"
 grand_archive.8005.a.lom: "総員出動！"
 grand_archive.8015.name: "天体図"
 grand_archive.8015.desc.common: "艦船は出航の準備ができており、 我々の文明の次の大冒険に出発するのを待ち望んでいる。"
 grand_archive.8015.desc.default: "[this.GetHomeWorldName]の人口は、 最近解読された星図に夢中になっている。 一般的に§Y$celestial_chart$§!と呼ばれているが、 今のところ答えよりも多くの質問を投げかけている。 それはどこから来たのか？ 誰が何のために作ったのか？ そして最も重要なこととして、 それは我々を罠に導くのか？\n\n$grand_archive.8015.desc.common$"
 grand_archive.8015.desc.gestalt: "カプセル内の星図の発見は、 我々の社会の注目を集めた。 それが数あるうちの1つであることが明らかになった今、 それがどこにつながり、 そこで何を見つけられるのかが疑問になっている。 我々はなんとしてもこの「§Y$celestial_chart$§!」を完成させる。\n\n$grand_archive.8015.desc.common$"
 grand_archive.8015.a.default: "いざ、 冒険へ！"
 grand_archive.8015.a.lom: "出航の時間だ！"
 grand_archive.8020.name: "予期せぬ遭遇"
 grand_archive.8020.desc: "我々は、 正体不明の旗を掲げた重武装の艦隊に遭遇した。 彼らの船は組織的な隊形を組んでいるが、 デザインは統一されていない。 多くの船には、 炭素鋼製のフックと銛が付いた太いケーブルのリールに接続された運動発射装置が装備されている。 さらに、 艦隊の中心部には、 装甲輸送船団が隠れている。 この艦隊は海賊または傭兵の一団であると推測するしかない。\n\n先導船から通信を受信している。"
 grand_archive.8020.a.lom: "話し合おうではないか…"
 grand_archive.8025.name: "$NAME_BlackNeedle$の$NAME_CaptainHoo$"
 grand_archive.8025.desc: "§H高慢で尊大なこの無法者の船長は、 興味がないふりをしている。 彼は話すときにくちばしを下に向け、 まるで我々が彼の注意を十分に受けるに値しないかのように、 視線を合わせようとしない。 彼は羽を使って身振り手振りで表現するが、 それが思わずコミカルな仕草に見えてしまう。§!\n\nお前たちは§Y$NAME_BlackNeedle$§!と遭遇した。 とんだ大失敗だな！\n\nお前たちの小さな社会がこの星系を調査するという噂を耳にした。 明らかに我々のものである星図を手に入れたようだな。 痛い目に遭いたくないなら、 それを渡せ。"
 grand_archive.8025.a: "お前は誰だ？"
 grand_archive.8025.a.reply: "俺は誰かと？ 名前はギルマルフー・ゼルメンドリオンだが、 §Y$NAME_CaptainHoo$§!、 シルバーウィングの船長、 そしてかの有名な§Y$NAME_BlackNeedle$§!海賊団の副船長だ。 数千年もの間、 あらゆる違法取引に関わってきた。 そして俺はその偉大なる遺産のごく一部でしかないのだ。\n\n俺の名前を覚えておけ。 この星図を我が比類なきリーダーに提出した後、 俺は多額の報酬を貰えるだろうからな。"
 grand_archive.8025.b: "星図について何を知っている？"
 grand_archive.8025.b.reply: "優秀で、 非常に高価な情報ブローカーから、 お前たちが最近奇妙なカプセルを偶然見つけたという情報を入手した。 我々にとって非常に興味深い隠された星系への行き方が含まれているはずのカプセルだ。\n\n我々も星図の一部を持っているが、 お前たちのカプセルからのデータがなければ意味が無意味なのだ。 なぜ§Y$NAME_CaptainNess$§!が遺産の鍵をお前たちに託したのかは謎だが、 それを回収するのが我々の役目だ。"
 grand_archive.8025.c: "なぜそこまでして星図を欲しがる？"
 grand_archive.8025.c.reply: "そんなにまで世間知らずなのか？[this.GetCaptainHooSnarkyInsult]どうやらはっきりと教えてやらないといけないらしい。\n\n星図とは、 特定の目的地への道案内としての役割を果たす。 我々はそこへ行き、 §Y$NAME_CaptainNess$§!の失われた財宝を手に入れたいのだ。"
 grand_archive.8025.d: "$NAME_CaptainNess$とは？"
 grand_archive.8025.d.reply: "もう少し知っていると思ったのだがな。 この星図を作成したのが彼女だ。 おそらく彼女は、 お前たちの種族の無知に共感を感じたのだろう。 彼女は何も考えない恐怖の存在だったからな。\n\nまあ、 お前たちには関係のないことだ。 さあ、 情報を渡せ。 後は我々に任せるのだ。"
 grand_archive.8025.e: "星図は渡さない。"
 grand_archive.8025.e.reply: "だろうな。 死ぬ覚悟はできているな？\n\nいざ！"
 grand_archive.8025.f.lom: "欲しいなら、 奪ってみろ！"
 CAPTAIN_HOO_INSULT_MACHINE: "機械知性ならもう少し賢いものだと思っていたが、 そうではないらしいな。"
 CAPTAIN_HOO_INSULT_HIVE: "多くの頭脳が集まれば、 素晴らしい成果が生まれるはずだが、 お前たちの集合体は、 何もできていないな。"
 CAPTAIN_HOO_INSULT_HUM: "骨太ですべすべの肌を持っているお前たちは、 恒星間の航行を開発したというのに、 相変わらず常識が理解できないようだ。"
 CAPTAIN_HOO_INSULT_MAM: "お前たちのような獣には、 我らが偉大なる指導者のような知性も洗練も欠けている。"
 CAPTAIN_HOO_INSULT_REP: "とはいえ、 お前たちのような単純な両生類にこんな基本的な概念を理解できるとは思っていないが。"
 CAPTAIN_HOO_INSULT_AVI: "お前たちの先祖は頭蓋骨をつつかれすぎたのかもな。"
 CAPTAIN_HOO_INSULT_ART: "物事について考える能力が、 お前たちの種族の分厚い外骨格に浸透していないことには、 別に驚いていない。"
 CAPTAIN_HOO_INSULT_MOL: "軟体動物には認識できるほどの脳がないのは事実だ。 お前たちの種族がその生ける証だな。"
 CAPTAIN_HOO_INSULT_FUN: "キノコになるには胞子が少し足りないんじゃないか？"
 CAPTAIN_HOO_INSULT_PLANT: "大半の惑星で植物が知性を獲得しなかった理由がわかってきた。"
 CAPTAIN_HOO_INSULT_LITHOID: "その石頭には知性のかけらも入っていないようだな。"
 CAPTAIN_HOO_INSULT_NECROID: "かつては知的な種族だったはずなのに、 今では抜け殻のようだな。"
 CAPTAIN_HOO_INSULT_AQUATIC: "魚は水に戻ったほうがいいんじゃないか？"
 CAPTAIN_HOO_INSULT_TOX: "汚物にまみれた存在が、 お前たちの思考を鈍らせているようだ。"
 CAPTAIN_HOO_INSULT_ROBOT: "個性モジュールが処理能力の大半を消費しているんじゃないか？"
 CAPTAIN_HOO_INSULT_DEFAULT: "お前たちの種族の知性は、 その外観に見合うほどみすぼらしいものなにかもな。"
 grand_archive.8045.name: "$grand_archive.8025.name$"
 grand_archive.8045.desc: "俺と§Y$NAME_BlackNeedle$§!をコケにしたな。 これは絶対に許されることではない！\n\nお前たちが協力的でなかったこと、 決して忘れることはない。 $NAME_BlackNeedle$は全力を持ってお前たちを狙う。 お前たちの未熟な文明は、 我々の怒りを免れることはできない。\n\n星図を手に入れるまで、 我々は諦めない。 それまで首を洗って待ってるんだな！"
 grand_archive.8045.a.lom: "今度は喋るだけじゃなくて、 戦ったらどうだ！"
 TREASURE_HUNTERS_CHART_PIECE_2_PROJECT: "8つに分裂した惑星"
 TREASURE_HUNTERS_CHART_PIECE_2_PROJECT_DESC: "§H$celestial_chart$§!は我々を砕かれた世界へと導いた。 惑星の地殻の最大の岩板に不自然なトンネルが掘られているのを発見した。 その中には次の星図の断片が隠されていると考えているが、 そこへ入るには慎重な発掘作業が必要だ。\n\n建設船であれば、 その破片を採取するための必要な設備を建造することができる。"
 grand_archive.8055.name: "発掘成功！"
 grand_archive.8055.desc: "漂流している惑星の残骸から、 鉱物とともにカプセルが無事に取り出された。 開けてみると、 §Y$celestial_chart$§!の新しい断片と独特な文化的な遺物がいくつか入っていた。 さらに、 中には翻訳が容易になるよう複数の言語で書かれたメモがあった。\n\n「これはイッテライトの母星、 $NAME_Soropegma$が残した最後のものだ。 イッテライトは悲しい事故によって絶滅した前FTL文明だ。 起こり得る重大な結果に気づかずに、 我々は誤って盗まれたコロッサスの力を発動させてしまった。 彼らの記憶を保存し、 尊重してほしい。」"
 TREASURE_HUNTERS_ANCIENT_CAPSULE_2_PROJECT: "星図の断片の解読"
 TREASURE_HUNTERS_ANCIENT_CAPSULE_2_PROJECT_DESC: "砕かれた惑星の残骸からカプセルを発掘した後、 その中にある航行データを解読する必要がある。 これには地図データベースを参照し、 既知のシステムに対して星図に記された天体を地図に記す必要がある。"
 grand_archive.8060.name: "星図の解読完了"
 grand_archive.8060.desc: "複数の暗号化層を解除した後、 新しいデータは問題なく§Y$celestial_chart$§!に追加された。 断片を組み合わせたら、 また新たな星系が現れた。 我々の旅の次の目的地は目前に迫っている。 この未知の宇宙領域には慎重にアプローチすべきである。"
 grand_archive.8075.name: "グランドアーカイブ"
 grand_archive.8075.desc: "§Y[This.GetLastAcquiredSpecimenName]§!の取得後、 科学者たちは、 それを§Y§!$grand_archive$として一般公開する価値があると考えている。 この構造物は、 貴重な文化財のコレクションを収容し、 化面および科学面で大きな成果をもたらすだろう。 初期段階の投資は、 銀河の多様で繊細な標本を保存し展示するために必要な技術や技法の研究を後押しする。\n\nさらに、 イッテライトの遺物とともに発見された設計図には、 革新的な大気モニタリング技術を搭載した展示ケースの先進的な設計が含まれていた。 このアイデアをさらに発展させれば、 アーカイブの保存能力全般が向上するだろう。"
 grand_archive.8076.name: "イッテライトの標本"
 grand_archive.8076.desc: "失われたイッテリテ文明の最後の痕跡は、 展示するに値する。\n\n幸いにも、 イッテライトの遺物とともに発見された設計図には、 革新的な大気モニタリング技術を搭載した展示ケースの先進的な設計が含まれていた。 このアイデアをさらに発展させれば、 アーカイブの保存能力全般が向上するだろう。"
 grand_archive.8076.a: "素晴しい機会だ。"
 TREASURE_HUNTERS_EXHIBITION_PROJECT: "展示強化のための設計図"
 TREASURE_HUNTERS_EXHIBITION_PROJECT_DESC: "イッテライトの標本とともに、 その保存に役立つ複雑な展示キャビネットの高度な設計を発見した。\n\nこの設計図で使用されている技術を研究することは、 将来の保存と展示の取り組みに役立つ可能性が高い。"
 TREASURE_HUNTERS_EXHIBITION_PROJECT_TOOLTIP: "£pop£ §HPOP§!が§Y2500§!以上の惑星で§Y建設船§!を使ってグランドアーカイブを建設する。\n§H£society_research£ $tech_galactic_archivism$§!が必要。"
 grand_archive.8080.name: "展示の強化"
 grand_archive.8080.desc: "イッテライトの設計図を慎重に分析した結果、 我々は原子レベルまで正確に大気を監視できる先進的な収容ユニットを構築した。 これにより、 キュレーターは繊細なイッテライト標本の大気状態をきわめて詳細なレベルで監視し、 潜在的な劣化の兆候を検知することが可能になる。 永遠に、 本来の姿でいるのだ。\n\nこれらの技術を応用することで、 コレクションのすべてのアイテムの保存状態をさらに改善することができる。"
 TREASURE_HUNTERS_BUILD_GRAND_ARCHIVE: "グランドアーカイブの建設"
 TREASURE_HUNTERS_BUILD_GRAND_ARCHIVE_DESC: "宇宙の探査を通じて、 我々は数えきれないほどの遺物や文化的な珍品を収集してきた。 これらの標本は人々を鼓舞し、 我々の展示は銀河のあらゆる知識を展示・保存する初の試みとなるだろう。\n\n§H$grand_archive$§!の建設がこの目的に適しているだろう。"
 grand_archive.8090.name: "グランドアーカイブの開館"
 grand_archive.8090.desc: "[fromfrom.GetName]の§Y$grand_archive$§!の開館は[this.GetName]にとって記念すべき日となる。 銀河の彼方から集められた宝物が展示されるこの展覧会は、 探究心を刺激し、 過去から学ぶよう我々に呼びかける。"
 d_black_needle_base: "秘密のブラックニードル基地"
 d_black_needle_base_desc: "ブラックニードル海賊団が、 さまざまな違法行為や盗品隠匿に使用する秘密基地。"
 d_abandoned_black_needle_base: "放棄されたブラックニードル基地"
 d_abandoned_black_needle_base_desc: "この基地はかつて、 ブラックニードル海賊団が前線基地および指名手配犯や盗品を隠す隠れ家として使用していた。"
 d_abandoned_black_needle_base_naval_cap: "兵士職から得られる宇宙軍許容量：§G+$@abandoned_black_needle_base_naval_cap_from_soldier_job|0$§!"
 d_abandoned_black_needle_base_naval_cap_short: "£job_soldier£ 職業からの £mod_country_naval_cap_add£ ：§G+$@abandoned_black_needle_base_naval_cap_from_soldier_job|0$§!"
 black_needle_base_system_poi: "星図を辿れ"
 black_needle_base_system_poi_desc: "§H$celestial_chart$§!は隠された星系、[Prev.GetName]を明らかにした。 そこへ向かい、 待ち受けるものを発見しなければならない。"
 grand_archive.8100.name: "海賊の隠れ家の発見"
 grand_archive.8100.desc: "我々は、 §Yブラックニードル§!の紋章が刻まれた秘密の地下基地を[From.GetName]に発見しました。 これは海賊集団が他の活動から隔離された外部拠点として使用しているものだと考えられる。 §Y$celestial_chart$§!の次の断片は、 おそらく他の財宝や装飾品と一緒に、 ここに保管されているのだろう。\n\n軌道爆撃を容易く開始することができるが、 それでは海賊に増援を要請する時間を与えることになりかねない。 一方、 地上部隊を迅速に展開すれば、 敵が対応する時間をほとんど与えることなく、 より迅速に基地を占領できるだろう。\n\nもっと秘密裏にやるなら、 基地のコンピューターシステムに侵入し、 大胆に$celestial_chart$を盗むこともできる。"
 grand_archive.8100.a: "色々と考慮せねば。"
 COLONIZATION_IMPOSSIBLE_DEFENDED_PLANET: "$TRIGGER_FAIL$§Rこの惑星は厳重に守られており、植民地化することはできない。§!"
 BLACK_NEEDLE_BASE_BOMBARD: "ブラックニードル基地を爆撃する"
 BLACK_NEEDLE_BASE_BOMBARD_DESC: "[This.GetName]の地下基地は軌道爆撃に対して高い耐性を持っているが、 十分な時間と火力があれば、 我々の艦隊だけでも破壊することは可能だ。 基地が無力化されたら、 我々は遺跡を捜索して、 §H$celestial_chart$§!の断片やその他の貴重品を回収することができる。\n\n戦術アドバイザーは、 このアプローチではブラックニードルに十分な時間を与え、 援軍を要請する余裕を与えてしまう可能性があると警告している。"
 BLACK_NEEDLE_BASE_BOMBARD_REINFORCEMENTS_KILLED: "$BLACK_NEEDLE_BASE_BOMBARD$"
 BLACK_NEEDLE_BASE_BOMBARD_REINFORCEMENTS_KILLED_DESC: "$BLACK_NEEDLE_BASE_BOMBARD_DESC$"
 grand_archive.8103.name: "ブラックニードルの反撃"
 grand_archive.8103.desc: "予想通り、 ブラックニードルは[FromFrom.GetName]の基地を守るために艦隊を送ってきた。\n\n[FromFrom.System.GetName]を確保するには艦隊をどうにかしないといけない。"
 grand_archive.8105.name: "廃墟と灰燼"
 grand_archive.8105.desc: "軌道上の兵器で海賊の基地を攻撃した後、 ついにその基地はその中の居住者たちとともに瓦礫と化した。 脅威が排除されたため、 科学者を送り込み、 荒廃した基地を探索し、 §Y$celestial_chart$§!の次の断片を回収することができる。"
 grand_archive.8105.a.custom_tooltip: "ブラックニードルの基地は破壊された。§Y[FromFrom.GetName]§!を自由に探索できる。"
 grand_archive.8105.a.lom: "宝を手に入れろ！"
 project_type_research: "$RESEARCH$"
 project_type_bombardment: "爆撃"
 BLACK_NEEDLE_BASE_DEPLOY_ARMIES: "ブラックニードル基地の襲撃"
 BLACK_NEEDLE_BASE_DEPLOY_ARMIES_DESC: "[FromFrom.GetName]の地下基地は、 かなりの数の兵士と警備用ドローンによって守られている。 惑星の地表に軍隊を展開すれば、 基地を素早く占領でき、 §Yブラックニードル§!が対応する時間をほとんど与えないだろう。\n\n基地を確保できれば、 海賊たちが蓄えていた星図のカプセルやその他の盗品を回収することができる。"
 grand_archive.8110.name: "防御壁突破"
 grand_archive.8110.desc: "地上部隊は§Yブラックニードル§!基地を制圧し、 現在建物とその周辺の資源を確保している。 脅威が排除されたため、 科学者を送り込み、 §Y$celestial_chart$§!の次の断片を回収することができる。"
 grand_archive.8110.a.custom_tooltip: "ブラックニードル海賊団の地上部隊は無力化された。§Y[FromFromFrom.GetName]§!を自由に探索できる。"
 grand_archive.8110.a.lom: "戦利品を分配しよう。"
 BLACK_NEEDLE_BASE_HACK: "海賊をハッキング"
 BLACK_NEEDLE_BASE_HACK_DESC: "海賊たちが盗品や転用された技術に過度に依存しているため、 彼らの拠点が侵入に対して脆弱になっている。 調査船をフー船長の指示を受けた§Yブラックニードル§!の輸送船に偽装し、 軌道上から[FromFrom.GetName]のネットワークをハッキングすることが可能である。 これにより無用な流血を避けて、 星図カプセルを移譲するよう説得できるかもしれない。"
 grand_archive.8115.name: "作戦成功"
 grand_archive.8115.desc.1: "数か月にわたる準備の後、 科学者[Leader.GetName]は通信ネットワークに侵入し、 §Yブラックニードル§!の船を装うことに成功した。 フー船長の命令を偽装し、[Leader.GetHeShe]は基地のオペレーターをだまして、 カプセルを緊急の惑星外移送に備えさせた。"
 grand_archive.8115.desc.slippery: "科学者[Leader.GetName]は、 正体がばれたときにすぐさま撤退できるよう、 退却に適した場所に船を着陸させた。"
 grand_archive.8115.desc.charismatic: "科学者[Leader.GetName]は持ち前の魅力と愛想のよさで厄介な質問をうまく切り抜けた。"
 grand_archive.8115.desc.psionic_organic: "科学者[Leader.GetName]は[Leader.Species.GetHandName]をひと振りするだけで警備員たちの心を操り、 彼らの疑念を払拭した。"
 grand_archive.8115.desc.psionic_machine: "[Leader.GetName]は超能力による強制力を使って警備員たちの弱い心を操り、 これ以上怪しまれないようにした。"
 grand_archive.8115.desc.2: "誰も失うことなくカプセルを回収することができた。 海賊は騙されたことにまだ気づいていない。"
 grand_archive.8115.a: "$EXCELLENT$"
 grand_archive.8120.name: "捕まった"
 grand_archive.8120.desc: "残念ながら、 カプセルを船に積み込んでいるときに、 見張りの一人が我々の計画に気づいてしまった。 この発見により、 短い銃撃戦が起こり、 我々は貴重な積荷を持ってその場から逃げることを余儀なくされた。 カプセルは無事回収できたが、 科学者[Leader.GetName]は銃撃戦で殺されてしまった。"
 grand_archive.8120.a: "$TERRIBLE$"
 grand_archive.8125.name: "海賊基地の放棄"
 grand_archive.8125.common: "脆弱性が露呈したため、 海賊たちは[FromFromFromFrom.GetName]の基地を放棄することを決め、 そこに保管されていた他の貴重品を確保して逃亡した。 この居住可能な月は現在無人であり、 入植が可能だ。"
 grand_archive.8125.desc.alive: "§Yブラック・ニードル§!はついにだまされていたことに気づき、 閉ざされたセキュリティネットワークの穴を発見した。\n\n$grand_archive.8125.common$"
 grand_archive.8125.desc.dead: "辛うじて§Yブラックニードル§!基地から脱出した後、 我々の潜入工作の全容が発覚した。\n\n$grand_archive.8125.common$"
 grand_archive.8125.a: "理にかなった判断だ。"
 grand_archive.8125.a.custom_tooltip: "§Y[FromFromFromFrom.GetName]§!の軍隊は惑星を去った。 今や入植が可能だ。"
 grand_archive.8130.name: "ブラックニードル基地の略奪"
 grand_archive.8130.desc.common: "金庫室には海賊団の歴史に関連する貴重品や思い出の品など、 さまざまな品々が保管されていた。 盗まれた美術品、 特注のジュエリー、 暗号化されたデジタルウォレットの中に、 星座のカプセルを見つけた。\n\nここで発見された品の多くは、 売却が難しいのではないかと推測される。 美術品は認識できるが、 宝石類はスクラップ用に溶かさなければならない。 また、 デジタルウォレットを使用した取引は通常、 追跡が可能だ。 これらの品の以前の所有者の一部はすでに亡くなっているかもしれないが、 盗まれた所有物を今も探し続けている人もいるだろう。"
 grand_archive.8130.desc.bombarded: "§Yブラックニードル§!基地の廃墟を探索していると、 地下金庫を見つけた。 開けてみると、 盗まれた宝の山が隠されているのが見つかった。\n\n$grand_archive.8130.desc.common$"
 grand_archive.8130.desc.landed: "荒廃した§Yブラックニードル§!基地を探索していると、 地下金庫の存在を示す施設の設計図を発見した。 業務用エレベーターで地下深くに降り、 アクセスコードを入力すると、 盗まれた宝の山が隠されているのが見つかった。\n\n$grand_archive.8130.desc.common$"
 grand_archive.8130.a: "盗品を返還してみよう。"
 grand_archive.8130.b: "すべて売却しろ。"
 grand_archive.8130.c.default: "盗品を保管しろ。"
 grand_archive.8130.c.lom: "拾った者勝ちだ。"
 black_needle_base_sold_stolen_items: "ブラックニードル基地からの盗品を売却した"
 opinion_black_needle_base_repatriate_stolen_items: "盗品を返還した"
 opinion_black_needle_base_repatriate_stolen_items_tt: "§G+$@opinion_black_needle_base_repatriate_stolen_items_value|0$§! £opinion£殺戮帝国以外の、 我々が戦争状態になっていないすべての帝国との意見。"
 DECODE_THIRD_MAP_PIECE: "星図の解読"
 DECODE_THIRD_MAP_PIECE_DESC: "§Yブラックニードル§!基地からカプセルが回収されたため、 我々はその中のデータを解読し、 新しい情報を§H$celestial_chart$§!と統合しないといけない。"
 grand_archive.8135.name: "星図の解読完了"
 grand_archive.8135.desc: "デジタル暗号の層を解読し、 新しい情報を§Y$celestial_chart$§!と統合することに成功した。 これにより、 さらに別の目的地が明らかになり、 星図はほぼ完成した。 残るパズルの欠片は1つだけだと考えており、 我々の探求の終わりが間近に迫っているのではないかと、 慎重ながらも考えている。\n\nナビゲーションデータの解読が進む中、 カプセル自体の傷のない外観は分析に値すると判断された。 容器の強度と耐久性は驚くべきものであり、 この素材を複製することができれば、 今後の研究に多くの潜在的な機会をもたらす可能性がある。"
 grand_archive.8135.a: "$GOOD$"
 d_hive_dwelling: "集合意識の住処"
 d_hive_dwelling_desc: "ネスの元乗組員であるスミーギブ集合意識が占拠する孤立した集落。"
 d_ruined_hive_dwelling: "荒廃した集合意識の住処"
 d_ruined_hive_dwelling_desc: "ネスの元乗組員であるスミーギブ集合意識が占拠していた集落の跡。"
 COLONIZATION_IMPOSSIBLE_SMEEGIBB_PLANET: "§Rこの惑星は$NAME_Smeegibb$のものだ。§!"
 grand_archive.8200.name: "隠れた集落"
 grand_archive.8200.desc.common_1: "人口1,000人未満の軟体人が住む小さな集落を[FROM.GetName]で発見した。 この種の生物の予備的な生物学分析では、 亜空間神経伝達による通信能力があり、 集合意識の存在が示唆されている。 この孤立した集落を除いて、 この惑星には他の知性体は存在しない。"
 grand_archive.8200.desc.common_2: "§Y$celestial_chart$§!がなぜ我々をここへ導いたのかはまだわからないが、 調査が必要だ。"
 grand_archive.8200.desc: "$grand_archive.8200.desc.common_1$\n\n$grand_archive.8200.desc.common_2$"
 grand_archive.8200.desc.alt: "$grand_archive.8200.desc.common_1$\n\nこの種族なら「§Y$NAME_CaptainNess$§!」とやらについて何か知っているかもしれない。\n\n$grand_archive.8200.desc.common_2$"
 grand_archive.8205.desc.common_1: "§H隠された星系[FROM.GetName]で発見された集合意識のノード、 $NAME_Smeegibb$は落ち着きなくそわそわしている。 まるで従属することに慣れているかのように、 話しかけられると視線を落とす傾向がある。§!"
 grand_archive.8205.desc.common_2: "名前は$NAME_Smeegibb$だ。 どうやって我々を見つけたのか気になる。 この星系は何千年もの間、 銀河の目から隠れてきた。\n\nこの場所を知っているのは§Y船長§!だけだ。 何を求めている？"
 grand_archive.8205.desc.default: "$grand_archive.8205.desc.common_1$\n\nスマラック！ 我々が1つの意識しか持たない生物と話すのは久方ぶりだ。\n\n$grand_archive.8205.desc.common_2$"
 grand_archive.8205.desc.gestalt: "$grand_archive.8205.desc.common_1$\n\nスマラック！ 我々が複数意識を持つ生物と話すのは久方ぶりだ。\n\n$grand_archive.8205.desc.common_2$"
 grand_archive.8205.a: "ここは一体なんだ？"
 grand_archive.8205.a.reply: "スマラック！ この惑星は我々の住処。 ここなら危険な銀河から遠く離れて安全だ。 今までは我々も危険なことをやってきた。 殺し、 犯罪、 海賊、 なんでもやっていた。 でももうやめた。 水耕栽培してるだけだ。\n\nその前は、 難民だった。 §Y船長§!と会うまで、 誰も我々を受け入れなかった。 船長は我々を救ってくれた。 だから船長の仲間になった。 船長は新しい名前をくれたから、 その代わりに船の世話をした。\n\n清掃、 調理、 弾薬、 水耕栽培、 貨物業務をやった。 働いた。 そして、上陸班に加わった。 船長が宝を盗んだり、 誰かを攫ったりした時に船長を守った。 船長を裏切らない。 我々は忠実だ。"
 grand_archive.8205.b: "§Y$celestial_chart$§!について知っているか？"
 grand_archive.8205.b.reply: "スマラック！ 星図なんて知らない。 この住処にいるだけだ。 §Y船長§!がここへと導く星図を作ったのなら、 それには理由があるはず… 我々を助けたいのか、 害を加えたいのか、 どちらかわからない。 船長は変わり者だから。\n\n船長から一度メッセージをもらった。 船長は一番お気に入りのドローン、 $NAME_Smeegibb$の巨大な彫像を送ってきた。 以前助けて、 覚えていたのだ。 すごい彫像だが、 なぜそれを送ったのかはわからない。 謝りたかったのかもしれないが、 何も書いてなかった。"
 grand_archive.8205.c: "§Y船長§!についてもっと教えてくれ。"
 grand_archive.8205.c.reply: "スマラック！ これまでは§Y船長§!が助けてくれた。 これまでは船長が師であり、 リーダーだった。 船を世話するように教えてくれた。 「$NAME_Smeegibb$、 補給係、 整備士、 労働者として働くんだ。 お前はとても価値がある。」と言ってくれた。\n\n船長には 「富は自由」と「人生は遺産を残すためにある」の2つの信条があった。 我々は共に金持ちと貧しい者を狩った。 危険な銀河から好きなものを奪った。\n\nでも船長はとても欲深く、 無謀だった。 船員を犠牲にし、 賞金のために裏切った。 船長に残されたのは$NAME_Smeegibb$だけだった。 でも我々は常に忠実だった。\n\n船長は銀河がどれだけ危険かを教えてくれた。 その危険から離れたいのだ。"
 grand_archive.8205.d: "なぜ星図はここへと導いたのだろうか？"
 grand_archive.8205.d.reply: "スマラック！ 我々はなぜ§Y船長§!がお前たちをここへ導いたのかわからない。 船長は何も教えてくれない。\n\n1つ考えがある。 §Y船長§!と共に賞金稼ぎから隠れていた場所がある。 隠れ家だ。 そこに何かあるかもしれない。"
 grand_archive.8210.name: "隠れ家の発見"
 grand_archive.8210.desc: "[from.GetName]で遭遇した生物、 $NAME_Smeegibb$はかつて§Y$NAME_CaptainNess$§!と共に隠れていた、放棄された隠れ家の座標を教えてくれた。 そこを調べてみれば、 §Y$celestial_chart$§!の次の断片、 もしくはその手がかりが見つかるかもしれない。"
 grand_archive.8210.a: "発掘を始めよう。"
 smeegibb_digsite_poi: "隠れ家の探索"
 smeegibb_digsite_poi_desc: "この考古学調査地点に§H$celestial_chart$§!の次の断片に繋がる鍵が隠されているかもしれない。 失われた§H$NAME_CaptainNess$§!の$TREASURE_TROVE$の探索を続けるためには、 放棄された隠れ家を調査しなければならない。"
 NAME_Bemat_cruiser_inax_01: "ヘベール"
 #Treasure Hunters Origin - Smeegibb
 smeegibb_digsite: "遺棄された隠れ家"
 smeegibb_digsite_desc: "[fromfrom.planet.GetName]の極寒の荒れ地で、 我々は小さなプレハブのシェルターを検出した。 このシェルターには、 休眠状態の生命維持装置と居住区が装備されている。 何千年ものあいだ氷嵐に襲われ続けた結果、 シェルターは激しく風化し、 一部は埋もれている。"
 grand_archive.8220.name: "船長の日誌"
 grand_archive.8220.desc: "発掘された構造物は、 長期間使用されていた形跡を示していた。 かつては基本的な設備が整っていたようだ。 建物全体に散らばっている装飾品や珍品が発見された。 散らかった書類の山から、 §Y$NAME_CaptainNess$§!自身が書いた日誌を回収した。\n\n§L我々はペリカン財宝輸送機をハイジャックしたが、 今回は相手も準備万端だった。 想定以上の被害を被ったが、 もっとひどい状況も経験している。 妥当な報酬だが、 タピコ・ジュエルは依然として手に入らない。 残念ながら、 ペリカンは賞金を再び増額し、 連邦さえも介入してきた。 今は少し状況が緊迫している。 しばらく身を潜める必要があるかもしれない。§!"
 grand_archive.8220.a: "探しつづけろ。"
 grand_archive.8225.name: "暇つぶし"
 grand_archive.8225.desc: "構造物の下を掘り進むと、 貴重品や基本的な衛生設備の小規模な貯蔵が発見された。 残念ながら、徹底的に捜索しても§Y$celestial_chart$§!の断片の痕跡は見つからなかった。\n\n§Y$NAME_CaptainNess$§!の散らばった日誌の中に手がかりを見つけられるかもしれないという期待を込めて、 さらに多くのノートや書類を集めた。\n\n§L$NAME_Smeegibb$のような相棒がいると、 時間の流れが速く感じる。 だがそれに栄光を分けるほどの価値があるのか？ 確かに集合意識と仕事をすることには莫大な価値がある。 分け前1人分で数百のドローンを使えるのと同じなのだから、 かなりお得だ！ だがその分、 私自身の成果が小さくなってしまうのでは…？ 自分の遺産を誰かと共有するという考えに耐えられるかわからない。 これについてもう少し考えないといけない。§!"
 grand_archive.8225.a: "$grand_archive.8220.a$"
 grand_archive.8230.name: "証明すべきもの"
 grand_archive.8230.desc: "通気口の中に§Y$NAME_CaptainNess$§!の最後の日誌が隠されていたのを発見した。\n\n§Lこんな形で記憶されたくない。 $NAME_Smeegibb$は忠実な仲間だったが、 決して奴が必要だったとは言わせない。 私は銀河を一人で制覇できる。 私は自分自身の痕跡を残し、 栄光も富も私だけのものとなる。\n\n自分へのメモ：$NAME_Smeegibb$が私を忘れないように、 何か送った方がいいかもしれない。§!\n\n他には何もない。 船長や、 §Y$celestial_chart$§!の兆候を示すものは何もない。\n\n$NAME_Smeegibb$への贈り物に最後の断片についての手がかりが隠されているのかもしれない。 もう一度通信を開かねば。"
 grand_archive.8230.a: "調査地点の発掘完了。"
 grand_archive.8236.name: "$NAME_Smeegibb$がいない"
 grand_archive.8236.desc.default: "$smeegibb_shelter_system_2_poi_desc$"
 grand_archive.8236.desc.xenophile: "$smeegibb_shelter_system_2_poi_desc$\n\n新しくできた友の安全を祈る。"
 grand_archive.8236.a: "[smeegibb_system.GetName]へ"
 grand_archive.8241.name: "$NAME_BlackNeedle$の帰還"
 grand_archive.8241.desc: "§Y$NAME_BlackNeedle$§!とよばれる海賊団の旗を掲げた多数の船団が、 [smeegibb_shelter.GetName]を周回しているのが目撃された。 海賊が我々の動きを監視しており、 集合意識の$NAME_Smeegibb$が住んでいる集落を焼き払ったと考えている。 おそらく海賊もまだ§Y$celestial_chart$§!の次の断片を探しているのだろう。\n\n惑星に知性を持った生物はもういない。\n\n海賊の先導船から通信を受信している。"
 grand_archive.8245.name: "$NAME_BlackNeedle$の$NAME_CaptainInax$"
 grand_archive.8245.desc.inax.1: "§Hこの節足人は背筋を伸ばし、 複眼をぎらぎらと光らせている。 落ち着いた様子と、 不規則にカチカチと興奮して震える顎の動きが対照的である。§!\n\nとうとう会ったな。 お前たちのような殻の柔らかい生物がどうやって§Yフー船長§!を倒したのだ？ あんな虫けらでもお前たちのみすぼらしい艦隊を簡単に破ることができたはずだ。"
 grand_archive.8245.desc.inax.2: "ここまで導いてくれてご苦労だった。§Y$NAME_SilverQuill$§!はあのみじめな$NAME_Smeegibb$を100サイクル以上探し回っていた。 奴の古くからの恨みを一つ晴らせたということは、 大きな褒美が手に入るということだ…お前を倒したらな。"
 grand_archive.8245.desc.ransacked: "$grand_archive.8245.desc.inax.1$[black_needle_base.GetName]の基地を滅茶苦茶にした代償は、 ここで払ってもらう。\n\n$grand_archive.8245.desc.inax.2$"
 grand_archive.8245.desc.stolen: "$grand_archive.8245.desc.inax.1$§Yブラックニードル§!から盗んだ代償は、 ここで払ってもらう。\n\n$grand_archive.8245.desc.inax.2$"
 grand_archive.8245.a: "お前は誰だ？"
 grand_archive.8245.a.reply: "俺の名はイナズ。 §Yブラックニードル§!の少将だ。\n\nこれでお前たちを殺す者の名前を知った。 これは名誉ある死だ。 素直に受け入れるがいい。\n\n慣例に従って、 初撃はお前たちに譲ってやろう。"
 grand_archive.8245.b: "$NAME_Smeegibb$を殺したのか…"
 grand_archive.8245.b.reply.common: "大した抵抗もしなかった。 奴の住処を青い軟体生物の血で塗ってやった。 艦隊も武器も必要ない。 どうせ奴はそのうち誰かにやられていたさ。 §Yブラックニードル§!に歯向かって生き残る者はいない。\n\n友達だったのか？ 奇遇だな。 お前たちもすぐに後を追うことになるさ。 §Y$NAME_SilverQuill$§!の名に懸けて、 "
 grand_archive.8245.b.reply.default: "$grand_archive.8245.b.reply.common$まだピクピクと動くお前の死体から星図を手に入れる。"
 grand_archive.8245.b.reply.robot: "$grand_archive.8245.b.reply.common$お前が死に行く様を見ながら、 星図を手に入れる。"
 grand_archive.8245.c: "$NAME_SilverQuill$とは誰だ？"
 grand_archive.8245.c.reply: "§Y$NAME_SilverQuill$§!が誰だって？ とんだ質問だ。 我々の伝説的な創設者は、 天才的な策略家だ。 たった1隻の船から§Yブラックニードル§!を始め、 銀河にまたがる海賊団へと成長させたのだ。\n\nブラックニードルは彼の伝説を語り継ぐために存在する。 お前の死は我々の歌の続きを飾るのだ。"
 grand_archive.8245.d: "$celestial_chart$を手に入れてどうする？"
 grand_archive.8245.d.reply: "何を所持しているのか知らないのか？ それは§Yネス船長§!の宝の場所を示す星図だ！ 彼女が生涯をかけて集めた金銀財宝が眠っている。\n\nその財宝は我々のものだ。 それを手に入れれば、 我々の名は歴史に刻まれる。 全星系は§Yブラックニードル§!の名を恐れるようになるだろう……そして最初の犠牲者となるのはお前たちとなるのだ。 光栄だろう？"
 grand_archive.8245.e: "我々はそう簡単に諦めない。"
 grand_archive.8245.e.reply: "ならば戦おうではないか。 [this.species.GetRemnantNamePlural]からトロフィーを作り、 司令官に献上するとしよう。"
 grand_archive.8265.name: "$grand_archive.8245.name$"
 grand_archive.8265.desc: "素晴しい戦闘だ！ 見た目ほど弱くないようだ。 二度も油断してしまったが、 それも今回で最後だ。 次に会った時、 §Yブラックニードル§!は容赦しない。\n\nこれは警告ではない。 死刑の宣告だ。"
 grand_archive.8265.a.scared: "不安だ……"
 grand_archive.8265.a.homicidal: "できるものならやってみろ。"
 grand_archive.8265.a.gestalt: "通信終了。"
 gateway_to_ness_treasure_system_poi: "宝の星図の×印"
 gateway_to_ness_treasure_system_poi_desc: "§H$celestial_chart$§!は完成した。 最後の隠された星系、[Prev.GetName]を明らかにした。 長かった探索もこれで終わる。 そこへ向かい、 何が待ち構えているのか確かめるのだ！"
 TREASURE_HUNTERS_CHART_PIECE_3_PROJECT: "隠されたカプセル"
 TREASURE_HUNTERS_CHART_PIECE_3_PROJECT_DESC: "調査によると、 次の§H$celestial_chart$§!は[this.GetName]の廃墟となった集落のどこかに隠されているらしい。\n\n他のカプセルの頑丈な構造から、 最近の砲撃にも耐えたと推測できる。"
 grand_archive.8270.name: "彫像の秘密"
 grand_archive.8270.desc: "[from.GetName]における4つ目の§Y$celestial_chart$§!の断片は無事見つかった。 カプセルは、 今や消滅した集合意識の$NAME_Smeegibb$のドローン石像に埋め込まれた状態で発見された。 石像にはこう刻まれている。\n\n§L「我が忠実な仲間へ、 これは感謝の印だ。 孤独の時間が長く、 平和でありますように。」§!\n\nこの星図の最後の断片を解読できれば、 我々は再び§Y$NAME_CaptainNess$§!の宝を探す旅を再開できる。"
 TREASURE_HUNTERS_ANCIENT_CAPSULE_4_PROJECT: "最後の星図の断片"
 TREASURE_HUNTERS_ANCIENT_CAPSULE_4_PROJECT_DESC: "$NAME_Smeegibb$の集落の廃墟からカプセルを回収した。 後は中のデータを解読し、 §H$celestial_chart$§!を完成させるだけだ。 §H$NAME_CaptainNess$§!が進んだ道の終わりには一体何が待ち受けているのだろうか。"
 grand_archive.8280.name: "完成した星図"
 grand_archive.8280.desc: "解析が終わり、 新しいデータの断片は§Y$celestial_chart$§!を完成させた。 光の点が色々な場所で光り、 旅の途中で発見した場所を示している。 そして、 4つの光が同時に点滅し、 別の隠された星系が現れた。\n\n最後のデータを追加したことで、 さらなる機能が利用できるようになった。 §Y星図§!は単なる地図ではなく、 §Y$NAME_CaptainNess$§!が集めて、 銀河中に隠した富や盗んだ財宝についての情報も含んでいたのだった。 一部のデータは無効になってしまっているかもしれないが、 このデバイスは、 我々の星系全体にわたって、 隠された貴重な宝の隠し場所を検出できるかもしれない。\n\nまた、§Y星図§!には、 船長がその生涯を通じて発見した宝物すべての鑑定情報が記載されている。 これらの詳細なメモには、 利益を最大限にするために入手した貴重品を特定し、 鑑定し、 潜在的な売り手に提示する方法を説明している。 このデバイスを再起動すると、 特別な宝物庫の設計図が表示された。 これを通して我々の植民地は船長の比類のない知見を活用し、 集めた宝に価値を付加できる。"
 grand_archive.8280.a.lom: "計り知れない宝。"
 grand_archive.8285.name: "宝の星図の×印"
 grand_archive.8285.desc: "§Y$celestial_chart$§!の完成は[this.GetName]にとって重大な出来事だ。 すべての秘密が解き明かされた今、 我々は最終目標地点である[gateway_to_ness_treasure_system.GetName]へ向かおうとしている。\n\n多くの障害を乗り越え、 我々はあと一歩のところまで来ている。 残る質問はたった1つ。 §Y星図§!が示している目的地には何があるのだろうか？\n\n成功は保証されていないが、 もうそこへ向かうしかない。 この冒険をやり遂げるために、 前進するのだ！"
 grand_archive.8285.a.default: "前進だ。"
 grand_archive.8285.a.lom: "いざ進め！"
 councilor_head_treasure_hunter: "主任トレジャーハンター"
 councilor_head_treasure_hunter_female: "$councilor_head_treasure_hunter$"
 councilor_head_treasure_hunter_desc: "$TITLE$は§Y$celestial_chart$§!を慎重に分析し、 隠された宝を突き止めて貴重な遺物を鑑定する。"
 councilor_corporate_head_treasure_hunter: "$councilor_head_treasure_hunter$"
 councilor_corporate_head_treasure_hunter_female: "$councilor_head_treasure_hunter$"
 councilor_corporate_head_treasure_hunter_desc: "$councilor_head_treasure_hunter_desc$"
 prospect_of_treasure_modifier: "財宝の可能性"
 prospect_of_treasure_modifier_tt: "$ruler$レベル毎に§G+$@prospect_of_treasure_treasure_trove_reward|0%$§! $mod_treasure_trove_reward_mult$、§G+$@prospect_of_treasure_treasure_gatherers_produces|0%$§! $mod_planet_treasure_gatherers_produces_mult$と§G+$@prospect_of_treasure_energy_produces|0$§! $mod_country_base_energy_produces_add$を与える：\n\n"
 grand_archive.8290.name: "財宝へのこだわり"
 grand_archive.8290.desc.chart: "[from.GetName]の宝物庫の設立により、 §Y$celestial_chart$§!は我々の経済に大きく貢献する可能性があると考えている。"
 grand_archive.8290.desc.trove: "[from.GetName]の$TREASURE_TROVE$で発見した資源を分配するにつれ、 §Y$celestial_chart$§!が我々の経済に大きく貢献する可能性があることが明らかになってきた。"
 grand_archive.8290.desc.default: "§Y星図§!の力を最大限に活用するために、 我々は宝の発見と収集の取り組みを主導する新たな評議会の役職を考案した。"
 grand_archive.8290.desc.gestalt: "§Y星図§!の力を最大限に活用するために、 我々は宝の発見と収集に資源をより多く割り当てるための措置を講じた。"
 grand_archive.8290.desc.chart.default: "$grand_archive.8290.desc.chart$\n\n$grand_archive.8290.desc.default$"
 grand_archive.8290.desc.chart.gestalt: "$grand_archive.8290.desc.chart$\n\n$grand_archive.8290.desc.gestalt$"
 grand_archive.8290.desc.trove.default: "$grand_archive.8290.desc.trove$\n\n$grand_archive.8290.desc.default$"
 grand_archive.8290.desc.trove.gestalt: "$grand_archive.8290.desc.trove$\n\n$grand_archive.8290.desc.gestalt$"
 grand_archive.8290.tt: "\n§E評議会職をアンロックできる：§!\n§H$t$$councilor_head_treasure_hunter$§!\n$tt$$COUNCIL_POSITION_MODIFIER_BASE$\n$ttt$$mod_treasure_trove_reward_mult$: §G+$@councilor_head_treasure_hunter_treasure_trove_reward|0%$§!\n$ttt$$mod_planet_treasure_gatherers_produces_mult$: §G+$@councilor_head_treasure_hunter_treasure_gatherers_produces|0%$§!\n$ttt$$mod_country_base_energy_produces_add$: §G+$@councilor_head_treasure_hunter_energy_produces|0$§!\n$COUNCIL_POSITION_AVAILABLE_FOR$$t$$scientist_with_icon$ $commander_with_icon$"
 grand_archive.8300.name: "ワームだらけのゲート"
 grand_archive.8300.desc.common: "このゲートウェイこそが、 我々が探し求めていた宝物へと導いてくれるに違いない。"
 grand_archive.8300.desc.did_encounter_voidworms: "星図はこれまで未知の領域であったブラックホールと、 $NAME_Voidworms$が蔓延る星系へと導いてくれた。 近くの廃墟となったゲートウェイに巣を作り、 その中でも最大のボイドワームは、 独占的に廃墟の構造物を囲んでいる。\n\n$grand_archive.8300.desc.common$旅の目的地に到達するには、 $NAME_Voidworms$を排除し、 ゲートを修復しなければならない。"
 grand_archive.8300.desc.didnt_encounter_voidworms: "星図はこれまで未知の領域であったブラックホールと、 奇妙な生物が蔓延る星系へと導いてくれた。 近くの廃墟となったゲートウェイに巣を作り、 その中でも最大の生物は、 独占的に廃墟の構造物を囲んでいる。\n\nこの巨大なミミズのような生物は、 我々の宇宙生物データベースには存在しない。 現在通信を試みている。$grand_archive.8300.desc.common$旅の目的地に到達するには、 この生物を何とか対処し、 ゲートを修復しなければならない。"
 grand_archive.8300.a: "我々の邪魔はさせない。"
 grand_archive.8300.a.pacifist: "必要とあらば。"
 grand_archive.8300.a.lom: "撃ちまくれ！"
 GATEWAY_VOIDWORMS_KILL_PROJECT: "$grand_archive.8300.name$"
 GATEWAY_VOIDWORMS_KILL_PROJECT_DESC: "我々は§H$celestial_chart$§!に従い、 [this.solar_system.GetName]星系でとある生物が蔓延る§Hゲートウェイ§!にたどり着いた。 ゲートを再起動し、向こう側へ行くにはこれらの生物を何とかしないといけない。"
 GATEWAY_VOIDWORMS_KILL_PROJECT_TT: "§R[this.solar_system.GetName]の生物を倒す§!"
 GATEWAY_VOIDWORMS_DEBRIS_PROJECT: "$NAME_Voidworms$の死骸"
 GATEWAY_VOIDWORMS_DEBRIS_PROJECT_DESC: "[this.solar_system.GetName]のボイドワームの死骸から異常な数値が検出されている。 崩壊しつつあるトロイカの1つに生命体の兆候が検出されたようだ。 調査船を派遣して、 さらに詳しく調査した方がいいだろう。"
 grand_archive.8310.name: "ボイドワームの群れ"
 grand_archive.8310.desc.did_encounter_voidworms: "ボイドワームの死骸のひとつに、 幼生の群れが寄り添っているのが見つかった。 仲間を失ったにもかかわらず、 彼らは我々の艦群に近づき、 並走しながら何かを求め始めた。\n\n$grand_archive.8310.desc.common$"
 grand_archive.8310.desc.didnt_encounter_voidworms: "蛇のような死骸のひとつに、 幼生の群れが寄り添っているのが見つかった。 仲間を失ったにもかかわらず、 彼らは我々の艦群に近づき、 並走しながら何かを求め始めた。\n\n$grand_archive.8310.desc.common$"
 grand_archive.8310.desc.common: "もし我々が望むならば、 この生物の本能的な愛着を有利に利用できるだろう。 成熟すれば、 この宇宙生物の群れは我々の支配下にある強力な有機艦隊となる可能性がある。"
 grand_archive.8310.a: "驚くべき発見だ。"
 grand_archive.8310.a.tt: "§Y$@gateway_voidworm_nymph_reward_count|0$§2$epic$§!$voidworms_small_plural$§!の艦隊を得る。"
 grand_archive.8310.b: "楽に狩れるな。"
 grand_archive.8315.name: "ゲートウェイ技術の調査"
 grand_archive.8315.desc: "[FromFromFrom.System.GetName]のゲートウェイが稼働していない。 古代の建造物に近づくと、§Y$celestial_chart$§!はこの失われた技術に関する一連の洞察を示した。 この古代の移動手段を理解することは、 今後の活動においても役立つ可能性が高い。"
 RESEARCH_GATEWAY_ACTIVATION_PROJECT: "$grand_archive.8315.name$"
 RESEARCH_GATEWAY_ACTIVATION_PROJECT_DESC: "$grand_archive.8315.desc$"
 RESEARCH_GATEWAY_ACTIVATION_PROJECT_TT: "£physics£§Y$tech_gateway_activation$§!テクノロジーを研究"
 grand_archive.8325.name: "ゲートウェイを起動"
 grand_archive.8325.desc.common: "星系間のリンクを再構築したが、 星図はそれ以上先を示さない。 この星図が持つ秘密は、 もうすぐ明らかになるだろう。"
 grand_archive.8325.desc.tech: "適切なテクノロジーを研究した結果、 我々は[gateway_to_ness_treasure_system.GetName]にある古代のゲートウェイを再起動することができた可能になった。\n\n$grand_archive.8325.desc.common$"
 grand_archive.8325.desc.kill.known: "生物を片付けた。 残るは[gateway_to_ness_treasure_system.GetName]にある古代のゲートウェイを再起動するだけだ。\n\n$grand_archive.8325.desc.common$"
 grand_archive.8325.desc.kill.unknown: "$NAME_Voidworms$を片付けた。 残るは[gateway_to_ness_treasure_system.GetName]にある古代のゲートウェイを再起動するだけだ。\n\n$grand_archive.8325.desc.common$"
 ACTIVATE_GATEWAY_PROJECT: "$grand_archive.8325.name$"
 ACTIVATE_GATEWAY_PROJECT_DESC: "§H$celestial_chart$§!の最終目的地である稼働していない[this.solar_system.GetName]の§Hゲートウェイ§!は、 何か重要な何かに繋がっているのだろう。"
 ACTIVATE_GATEWAY_PROJECT_TT: "§Hゲートウェイを起動§!"
 grand_archive.8400.name: "宝を見つけるぞ！"
 grand_archive.8400.desc: "§Y$celestial_chart$§!の終わりにあったゲートウェイを起動し、 我々は[ness_treasure_system.GetName]星系を発見した。 天体の分布は、§Y$NAME_CaptainNess$§!の航海日誌にあったスケッチと一致している。\n\n我々の旅もとうとう終わりに近づいている。"
 grand_archive.8400.a: "前進だ。"
 ness_treasure_system_poi: "[from.solar_system.GetName]のゲートウェイを通る"
 ness_treasure_system_poi_desc: "§H$celestial_chart$§!を終わりまで辿り、 途中海賊や恐ろしい生物を退けた。 ゲートウェイは稼働していて、 残るは向こう側に何があるかをこの目で見るだけだ。"
 #Megastructure
 gateway_ness_ruined: "$gateway_ruined$"
 gateway_ness_ruined_DESC: "$gateway_ruined_DESC$"
 gateway_ness_ruined_MEGASTRUCTURE_DETAILS: "$gateway_ruined_MEGASTRUCTURE_DETAILS$"
 gateway_ness_restored: "$gateway_final$"
 gateway_ness_restored_DESC: "$gateway_final_DESC$"
 gateway_ness_restored_MEGASTRUCTURE_DETAILS: "$gateway_final_MEGASTRUCTURE_DETAILS$"
 NESS_GRAND_ARCHIVE: "$NAME_CaptainNess$の財宝"
 NESS_GRAND_ARCHIVE_HOARDED: "$NESS_GRAND_ARCHIVE$"
 grand_archive.8405.name: "急襲！"
 grand_archive.8405.desc: "尾行されていた。\n\n我々は今、 [ness_treasure_system.GetName]で壮大な§Y$NAME_BlackNeedle$§!艦隊に直面している。 前回遭遇した時と比較すると、 相手の戦力は大幅に増強され、 退役した軍艦や、 高性能な武装を搭載した民間船舶も含まれている。 この対決のために予備艦隊の大半を結集したようだ。 艦隊の中心には、 主要艦である巨大な$titan$級の艦船がある。\n\n艦隊は戦闘態勢にあるが、 ほとんどの艦船はまだ武器を準備していない。 交渉するつもりらしい。\n\n主要艦から通信を受けている。"
 grand_archive.8405.a.lom: "交渉しよう。"
 grand_archive.8410.name: "$NAME_BlackNeedle$の船長の$NAME_CobaltQuill$だ"
 grand_archive.8410.desc: "§H小柄な体格にもかかわらず、 この海賊の船長は威厳を放っている。 彼の目は複雑な方程式を解いているかのように計算しつつ我々を見つめ、 計りにかけている。§!\n\nとうとう会えたな。 私は$NAME_CobaltQuill$、 §Y$NAME_BlackNeedle$§!の船長で、 初代船長$NAME_SilverQuill$の子孫だ。お前たちは長年、 私の悩みの種だった。 しかし、私は理性を好む。 取引を提案したい。\n\nお前たちが完成させた星図に対して、 多額の報酬を支払おう。 そしてお前たちの無意味な命を取らないと約束しよう。\n\n拒否するなら、 我々は力ずくで欲しいものを手に入れるしかない。 我々の軍事力が優れているのは当たり前だが、 我々は更にお前たちの帝国におけるいくつかの重要地点に侵入している。 私の命令ひとつで、 お前たちの帝国を破滅に追いやることができるのだ。"
 grand_archive.8410.a: "何を提案しようというのだ？"
 grand_archive.8410.a.reply: "お前たちは私の悩みの種だったが、 §Y$NAME_CaptainNess$§!の完成した遺物と引き換えに、 多額な報酬を与えよう。\n\nこの寛大な申し出を受け入れるのであれば、 過去の悪事をすべて許そう。 戦い続ける必要はない。 戦いを拡大することもな……"
 grand_archive.8410.b: "我々を脅しているのか……"
 grand_archive.8410.b.reply.common_1: "[this.GetName]についてすべて知っている。 物流網、 資源サイロの場所、 星系基地の分布。 すべてを知っているのだよ。"
 grand_archive.8410.b.reply.common_2: "私の部下が調査を行い、 お前たちの帝国を解体する方法を正確に知っている。 お前たちの惑星を飢えさせ、 物資を奪い、 残ったものをすべて破壊する。 もちろん、 私が望んでいるものを渡せば話は違うが……"
 grand_archive.8410.b.reply.default: "$grand_archive.8410.b.reply.common_1$\n\nお前たちのリーダーシップの下で信頼するすべての個人、 そしてその者が愛する人々を監視している……\n\n$grand_archive.8410.b.reply.common_2$"
 grand_archive.8410.b.reply.hive_mind: "$grand_archive.8410.b.reply.common_1$\n\nお前の集合意識のおける主要なノードをすべて監視している。 そして新しいノードが作られたら、 すぐにわかる。\n\n$grand_archive.8410.b.reply.common_2$"
 grand_archive.8410.b.reply.machine: "$grand_archive.8410.b.reply.common_1$\n\nお前たちのネットワークのすべての主要ノードの位置を追跡し、 ロケーションマトリックスにバックドアを設置している。\n\n$grand_archive.8410.b.reply.common_2$"
 grand_archive.8410.c: "交渉など無駄だ。"
 grand_archive.8410.c.reply: "この規模の妨害工作にはそれなりの費用がかかる。 船の維持費、 人件費、 賄賂など、 さまざまな費用がかかる。 私は必要のない出費などしない。 スイッチを入れるだけで待ち受ける破壊の規模は、 非常に大きな費用を伴う。\n\n苦労して稼いだお金の使い道は他にもあるはずだ。 これ以上無意味な流血は避けよう。 手に入れた富を持ち帰り、 海賊行為は専門家に任せるのだ。"
 grand_archive.8410.d: "これはクレジットだけの問題じゃないな。"
 grand_archive.8410.d.reply: "5000年前、 私の祖先である偉大な$NAME_SilverQuill$は$NAME_CaptainNess$の一等航海士だった。 長年忠実に仕えたが、 その見返りはなんだったと思う？\n\n裏切りだ！\n\n彼女は彼を当局に引き渡し、 報奨金を懐に入れたのだ！ しかし偉大なる$NAME_SilverQuill$が刑務所にずっと入っているわけがない。\n\n大胆な脱出劇の後、 彼は灰の中から立ち上がり、 仲間たちを鍛え上げ、 今目の前にいる伝説の$NAME_BlackNeedle$を作り上げたのだ。 裏切り者の$NAME_CaptainNess$への復讐を誓い、 彼は自分の人生を彼女の宝を略奪することに捧げ、 彼女の遺産を自身の成功の重みで葬り去った。\n\n私はただ、 彼が始めたことを終わらせたいだけだ。 この星図は、 本来我々のものを取り戻すための鍵となるのだ。\n\n頼む、 渡してくれ。"
 grand_archive.8415.name: "大胆な提案"
 grand_archive.8415.desc: "§Y$NAME_BlackNeedle$§!のリーダーは§Y$celestial_chart$§!と引き換えに多額の報酬を与えるという取引を提案した。 この取引を受け入れたら、 §Y$NAME_CaptainNess$§!の宝の鍵を渡すことになる。\n\n取引を拒否したら、 彼らの怒りを完全に買うことになるだろう。 海賊がどれほど深く帝国に浸透しているのかは不明だが、 彼らは内部から[this.GetName]を完全に解体すると脅迫している。 これが単なる威嚇に過ぎないかはまだわからない。"
 grand_archive.8415.a: "提案を断る。"
 grand_archive.8415.b: "§Y$celestial_chart$§!を売る。"
 grand_archive.8415.b.effect_tt: "§Y$celestial_chart$§!を失う\n最大$r_energy$の§G+$@max_credit_mult|0%$§!を獲得する\n§Y$NAME_BlackNeedle$§!の艦船を獲得する"
 grand_archive.8500.name: "取引成立"
 grand_archive.8500.desc: "我々は多額の$MONEY$と§Y針の目§!として知られる特別な主要艦と引き換えに§Y$celestial_chart$§!を手渡した。 §Y$NAME_BlackNeedle$§!との紛争は、 これで完全に解決したと言えるだろう。\n\n我々は海賊艦隊の総力との大規模な交戦を回避し、 銀河規模の破壊工作を防ぐことができた。\n\n海賊行為は海賊に任せた方がいいのだろう。"
 grand_archive.8500.a: "ここでやるべきことはもうない。"
 grand_archive.8500.a.tt: "すべての艦船は$TREASURE_TROVE$星系から排出された。"
 HOARD_LOOTED_BY_PIRATES: "構造物は海賊に略奪され、 価値のあるものはもう何も残っていない。"
 grand_archive.8505.name: "破壊工作！"
 grand_archive.8505.desc: "§Y$NAME_BlackNeedle$§!は全面的な攻撃を開始し、 我々の星系に混乱をもたらした。 生産ラインは完全に停止し、 発電機は故障し、 不可欠な管理インフラは機能しなくなっている。 輸送品は消え、 研究施設ではデータが消去され、 鉱山は通常の5倍の速さで崩壊している。\n\n被害は広範囲に及び、 何千もの工作員が連携した陰湿な手口の結果となっている。 広大な破壊工作員のネットワークが植民地の中に隠れており、 彼らは常に一歩先を行っているようだ。"
 grand_archive.8505.a: "警報発令！"
 situation_sabotage: "ブラックニードル工作員"
 situation_sabotage_type: "$situation_sabotage$"
 situation_sabotage_desc: "[owner.GetName]中にわたる混乱を引き起こしている§Y$NAME_BlackNeedle$§!の破壊工作員からなる広大なネットワークが我々の植民地に隠れている。 工作員を排除しない限り、 損害は供給ラインが崩壊するまで続くだろう。"
 situation_sabotage_monthly_change_tooltip: "$situation_monthly_change_tooltip_approaches_dependent$"
 approach_sabotage_do_nothing: "何もしない"
 approach_sabotage_do_nothing_tt: "特に行動は起こさない。"
 approach_sabotage_purge: "工作員の排除"
 approach_sabotage_purge_tt: "組織内に潜む工作員を探し出すとなると、 どうしても二次被害を伴うだろう。"
 approach_sabotage_mitigate: "被害を最小限に抑える"
 approach_sabotage_mitigate_tt: "インフラを再構築するための対応策を講じ、 消耗戦により妨害攻撃を凌ぎ切る。"
 finisher_effects_sabotage: "ブラックニードルの妨害工作員を排除し、 彼らがネス船長の財宝の包囲網を強化するのを阻止する。"
 finisher_effects_sabotage_fail: "我々のインフラは修復不可能なほど損傷し、 ブラックニードルはネス船長の財宝の周囲を封鎖する包囲網を強化するだろう。"
 grand_archive.8520.name: "妨害工作員のネットワークを暴露"
 grand_archive.8520.desc.common: "植民地全体で§Y$NAME_BlackNeedle$§!が使用している秘密の通信周波数を傍受した。 暗号文を解読した結果、 我々の仲間内で反逆的な陰謀を企てたり、 妨害工作を行なったりしている者たちをすべて特定することができた。"
 grand_archive.8520.desc.machine: "$grand_archive.8520.desc.common$\n\n海賊の工作員は、 我々のオペレーティングシステム内に悪質なマルウェアを拡散し、 我々の星系全体にわたってさまざまなポジションを占める反乱軍の潜伏部隊を作り出していた。\n\nこの再プログラム策略は、 [root.GetName]で最も重要な独立ノードの1つ、§Y[traitor_leader.GetClass][traitor_leader.GetName]§!を堕落させるほどにまで至っている。"
 grand_archive.8520.desc.hive: "$grand_archive.8520.desc.common$\n\n海賊の工作員は、 生息地に解離性フェロモンを大量に散布したため、ドローンの多くに潜在的な逸脱傾向が生じている。 ドローンが不信を抱いた後、 海賊たちはドローンを反逆者の軍勢に再編成し、 我々のインフラを破壊するように仕向けている。\n\nこの大規模な策略は、 [root.GetName]で最も重要な独立ノードの1つ、§Y[traitor_leader.GetClass][traitor_leader.GetName]§!を堕落させるほどにまで至っている。"
 grand_archive.8520.desc.default: "$grand_archive.8520.desc.common$\n\n海賊の工作員が長年にわたり不満を持つ市民を募集し、 この広範囲にわたる攻撃に備えてスリーパーセルや、我々に対して敵対する諜報協力者を準備してきたことを知った。\n\n裏切り者の一人が§Y[traitor_leader.GetClass][traitor_leader.GetName]§!であることが判明し、 これは相当なセキュリティリスクをもたらす。 ある程度の安定性を維持しながら、 この共謀者に対処しなければならない。 この規模の汚職が公になれば、 政府に深刻な影響を及ぼすだろう。"
 grand_archive.8520.a.default: "裏切り者を処刑しろ。"
 grand_archive.8520.a.machine: "逸脱ドローンを停止しろ。"
 grand_archive.8520.a.hive: "逸脱ドローンを排除しろ。"
 grand_archive.8520.a.tt: "人口のあるすべての惑星で§R100§! £pop£ §HPOP§!が殺される。"
 grand_archive.8520.b.default: "裏切り者に再教育しろ。"
 grand_archive.8520.b.machine: "逸脱ドローンを再プログラムしろ。"
 grand_archive.8520.b.hive: "逸脱ドローンを再同化しろ。"
 grand_archive.8520.c: "裏切り者の正体を暴露しろ。"
 grand_archive.8525.name.default: "裏切り者は処刑された"
 grand_archive.8525.name.hive: "逸脱ドローンは排除された"
 grand_archive.8525.name.machine: "ユニットは破壊された"
 grand_archive.8525.desc.common: "[traitor_leader.GetHisHer]の§Y$NAME_BlackNeedle$§!海賊団への共謀の発覚に伴い、"
 grand_archive.8525.desc.default: "$grand_archive.8525.desc.common$、[traitor_leader.GetName]は処刑された。\n\n[traitor_leader.GetHisHer]の死亡の正確な状況については公表されていない。"
 grand_archive.8525.desc.hive: "$grand_archive.8525.desc.common$、[traitor_leader.GetName]は排除された。"
 grand_archive.8525.desc.machine: "$grand_archive.8525.desc.common$、[traitor_leader.GetName]は破壊された。"
 grand_archive.8525.a: "必要な措置だった。"
 grand_archive.8530.name.default: "裏切り者を再教育した"
 grand_archive.8530.name.hive: "逸脱ドローンを再教育した"
 grand_archive.8530.name.machine: "ユニットを再プログラムした"
 grand_archive.8530.desc.default: "$grand_archive.8525.desc.common$、[traitor_leader.GetName]は十分に更生した。\n\n残念ながら、 この再教育プロセスは、[traitor_leader.GetName]に永続的な悪印象を残す結果となった。"
 grand_archive.8530.desc.hive: "$grand_archive.8525.desc.common$、[traitor_leader.GetName]は十分に更生した。\n\n残念ながら、 この再同化プロセスは、[traitor_leader.GetName]に永続的な悪印象を残す結果となった。"
 grand_archive.8530.desc.machine: "$grand_archive.8525.desc.common$、[traitor_leader.GetName]は十分に再プログラムされた。\n\n残念ながら、 この再フォーマットプロセスは、[traitor_leader.GetName]に永続的な悪印象を残す結果となった。"
 grand_archive.8530.a.tt: "[traitor_leader.GetName]のネガティブな特性のレベルが2上がる"
 grand_archive.8535.name: "[traitor_leader.GetName]の死亡"
 grand_archive.8535.desc: "$grand_archive.8525.desc.common$、 激怒した[root.GetName]市民が組織的な抗議活動に集結した。 自警団の暴徒が[traitor_leader.GetHisHer]の自宅に押し寄せた。[traitor_leader.GetHeSheCap]はその後、 現場で死亡が確認された。"
 grand_archive.8536.name: "裏切り者の償い"
 grand_archive.8536.desc: "$grand_archive.8525.desc.common$、[traitor_leader.GetHeShe]は自分が行った行動について深い遺憾の意を表す公式声明を発表した。 今回の事件は[traitor_leader.GetHisHer]の指導力に永続的な影響を残したようだ。\n\n過去の行いにもかかわらず、[root.GetName]の人々は[traitor_leader.GetHisHer][traitor_leader.GetName]を許す意思があるようだ。"
 grand_archive.8536.a: "歓迎すべき展開だ。"
 grand_archive.8536.a.tt: "[traitor_leader.GetName]のネガティブな特性のレベルが1上がる"
 grand_archive.8545.name: "インフラの崩壊"
 grand_archive.8545.desc: "残念ながら、§Y$NAME_BlackNeedle$§!の壊滅的な破壊工作を阻止することはできなかった。 妨害工作により、 我々の物流インフラは修復不可能なまでに損傷を受けた。 サプライチェーンの再構築には何年もかかるだろう。 我々の星系全体に広げた汚職は、 あまりにも甚大な規模であり、 軽減することはできない。\n\nそれでも我々は§Y$NESS_GRAND_ARCHIVE$§!を我々の手で手に入れる。 戦闘で海賊を破れば、 財宝は我々のものとなる。"
 grand_archive.8545.a: "戦いは終わっていない。"
 grand_archive.8550.name: "破壊工作よりも強く"
 grand_archive.8550.desc: "§Y$NAME_BlackNeedle$§!がインフラを妨害する広範囲にわたる努力にもかかわらず、 我々は回復し、 安定を取り戻しました。 工作員を倒した今、 やるべきことは[hoard_system.GetName]にいる海賊の艦隊を破り、 §Y$NESS_GRAND_ARCHIVE$§!を[root.GetName]の名の下に手に入れることだけだ。"
 grand_archive.8550.a: "やれ。"
 grand_archive.8555.name: "$NAME_BlackNeedle$の敗北"
 grand_archive.8555.desc: "§Y$NAME_BlackNeedle$§!は我々の強力な軍隊に適わなかった。 艦隊が敗れた海賊は我々の星系内の破壊工作を続けることができなかった。 これで自由に[root.GetName]の名の下に§Y$NESS_GRAND_ARCHIVE$§!を手に入れることができる。"
 grand_archive.8555.a: "無様な試みだ。"
 grand_archive.8555.a.lom: "情けない海賊どもめ。"
 TREASURE_HUNTERS_BLACK_NEEDLE_PROJECT: "$NAME_BlackNeedle$最後の戦い"
 TREASURE_HUNTERS_BLACK_NEEDLE_PROJECT_DESC: "[root.GetName]星系の広範囲にわたる破壊工作の後、 $NAME_BlackNeedle$は引き続き§H$NESS_GRAND_ARCHIVE$§!の封鎖を維持している。 海賊は多くの資源を使い果たしており、 今や脆弱な立場にある。 ここで彼らを打ち負かせば、 彼らの広範な組織は確実に崩壊し、 我々は自由に宝を手に入れることができるだろう。"
 TREASURE_HUNTERS_BLACK_NEEDLE_PROJECT_TOOLTIP: "§R[solar_system.GetName]で$NAME_BlackNeedle$を倒す。§!"
 grand_archive.8560.name: "$grand_archive.8410.name$"
 grand_archive.8560.desc: "ネスの子か……皮肉なものだ。\n\nネスはお前たちを選んだ。 それを理解しているか？\n\n何百もある種族の中から……お前たちを選んだのだ。 何か特別なことに気づいたのかもしれないし、 偶然なのかもしれない。 いずれにしろ、 お前たちはここに立っている。\n\nお前たちの勝ちだ…今のところはな。 この勝利を軽く受け止めないことだ。 我々は強力な敵だ。§Y$NAME_BlackNeedle$§!は決して許さない。 そしして決して忘れない。\n\n私の先祖がそうしたように、 私も耐え忍ぶ。 失ったものを再び築き上げる。 幾千年、 いや、 幾万年かかろうとも、 我々はお前たちが盗んでいったものを取り返しに帰ってくる。\n\n$NAME_BlackNeedle$は永遠に不滅だ！"
 grand_archive.8560.a: "それは直にわかるだろう。"
 grand_archive.8560.a.lom: "消えろ、 海賊ども。"
 CAPTAIN_NESS_HOARD_PROJECT: "ネス船長の財宝"
 CAPTAIN_NESS_HOARD_PROJECT_DESC: "§H$NESS_GRAND_ARCHIVE$§!は我々のものだ。\n\n廃墟のような外観とは裏腹に、 建物の多くのシステムは稼働中だ。 §H$NAME_CaptainNess$§!について聞いた性格を考慮すると、 予期せぬセキュリティ対策に注意が必要だ。\n\n1つしかない入口の中央ハッチには、 くぼみが刻まれている。 そこに§H$celestial_chart$§!を挿入し、 この謎めいた施設を開けられる。"
 grand_archive.8565.name: "$NAME_CaptainNess$の宝"
 grand_archive.8565.desc: "§Y$celestial_chart$§!は鍵であり、金庫がその錠だった。 我々はそれを巨大構造物のメインハッチに挿入した。\n\nすると、 地図が起動し、 我々の旅路に沿って各星へと一本線が辿られた。古代機械がうなりを上げて動き出し、 我々はすぐに内部へと入った。\n\n千の世界から略奪したような宝物が、 山のように床や壁に豊富に並べられている。 貴重な金属で鍛造された武器や、 繊細な彫像が並べられている。骨董品の化石から宝石がぶら下がり、複雑な装置が無造作に積み上げられている。\n\n中央の通路から金属の足音が響く。 手を挙げて降参する、 中身が液体で満タンになっているヒューマノイドがこちらに近づいてくる。 音声回路が起動し、 次が聞こえる：\n\n§L「そうか、 私のカルテを見つけられたんだ。 上出来じゃないか？」§!"
 grand_archive.8565.a: "通信を公開するんだ。"
 grand_archive.8565.a.lom: "艦長！"
 grand_archive.8570.desc: "§Hロボットの限られた表情の中で、 ネス艦長と呼ばれるその機械は、 得意げな様子で我々を見つめている。 ネス艦長の金属製のボディは、 まるで新品かのように、 傷みやなどは一切ない。 その口調は忍耐強くも見下したようなもので、 常に自分より地位の低い相手に話しかけているかのようだった。§!\n\nそういえば、 自己紹介がまだだった。 まあ、 私が誰なのかもうお分かりだろう。 \n\n私の名前はサアンダ・ネス…であった。 かつては「銀河の海賊女王」と呼ばれ、　現在は寒いボルトの山に住んでいる。 \n\n§H機械は一瞬止まって、 我々の姿を認識した。 §!\n\nこの種族を見るのは久しぶりだ。 原始人どもがようやく成長したようだな！ \n\nよくぞここまでたどり着いたものだ。"
 grand_archive.8570.a: "どうやって生きてるんだ？"
 grand_archive.8570.a.reply_fallen_empire: "不死は決して安くはない。 私は[fallen_empire.GetRealName]の科学者に、 数百万クレジットを支払って、 密やかに私の意識を転送してもらった。 彼らは良い仕事をしたが、 以前のように踊れなくなってしまった。\n\n$grand_archive.8570.a.reply$"
 grand_archive.8570.a.reply_curator: "不死は決して安くはない。 私は$NAME_Curator_Order$の科学者に、 数百万クレジットを支払って、 密やかに私の意識を転送してもらった。 彼らは良い仕事をしたが、 以前のように踊れなくなってしまった。\n\n$grand_archive.8570.a.reply$"
 grand_archive.8570.a.reply: "§H機械はコンソールを起動し、 壁に隠された部屋を出現させた。 そこには古代の冷凍装置があり、 中には有機生命体の遺骸があった。§!\n\n私は役立たずの、 ちょっと感情的な置物だ。 昔の見た目の方が良かったと思っているだろう？\n\nすべてが所定の位置にあることを確認すると、 この金庫に鍵をかけ、 数千年間の眠りに着いた。 そしていつの間にか、 キミがドアを開けて、 私たちがこう会話し始めた。 眠りについたのがつい昨日のように感じる……"
 grand_archive.8570.b: "どこでこのお宝を手に入れたんだ？"
 grand_archive.8570.b.reply: "ほとんどは盗んだものだ。 もしくは、 他の窃盗品と交換した。 昔は銀河の主要人物たちみんなから何かしら奪ったんだ。 貨物船からコロッサス兵器までハイジャックした。 私のポリシーは、 相手から簡単に奪えるなら、 相手はそれを持つ価値がないことだ。\n\n時には……厄介になることもあったが。 イッテライトの件はキミも見たはずだ。 あれは驚いた……\n\nゲーム感覚でやってると、 悲惨な目に会ってしまうのか……"
 grand_archive.8570.c: "なぜ我々を選んだ？"
 grand_archive.8570.c.reply: "私が孤独だと言ったら、 信じてくれるか？ \n\n§H機械の音声回路が、 笑い声らしき音を発した。 §!\n\n私は多くの宝を手に入れたが、 何も意味がなかったのだ？ 結局、 私に何をもたらしてくれないのか？ 私が欲しかったのは富ではなく、 名誉だったのだ。 しかし、 名誉は窃盗で手に入らない。 では、 どうやって築き上げるのか？ \n\nこれがそのチャンスだった。 最も有望な原子種族を数種類見つけ、 その種族の惑星に宝を隠した。 もちろん、 地図も残しておいた。 最初に私のチャートを組み立てた人は、 テストに合格し、 私の遺産を相続するのにふさわしかった。 だから……ここにいる。 \n\nもしかしたら、 君たちなら私ができなかったことを成し遂げ、 これを有意義に活用できるかもしれない。"
 grand_archive.8570.d: "どうしてすべてを手放す？"
 grand_archive.8570.d.reply: "言ったはずだ。 これは引継ぎにすぎない。 私はお金をもらうことに長けていて、 使うのは得意じゃない。\n\nしかし、 誰にでもあげられるわけじゃない。 せめて、 ここまでこれる知性が必要だった。 私が誇りに思えるクルーがほしかった。 私の物語を共有できる相手を……"
 grand_archive.8570.e: "なんの物語なんだ？"
 grand_archive.8570.e.reply: "まあ、 教えてあげよう……\n\n§H機械がコンソールを起動し、 一連のデジタル録音が壁一面に映し出される。§!\n\nこの金庫事態が私の伝記なんだ。 私は、 覚えている限りの人生のあらゆる瞬間を記録するために、 作家たちに多額の金額を支払った。 彼らは良い仕事をしたと思う。\n\n§H画像はコックピットの場面に切り替わり、 ネス艦長の生身の姿が指揮を執っている。 機械音声が短いノイズ音を出し、 ため息のような重みを発する。§!\n\n私はかつて銀河最恐の海賊だった。 私は巨大企業を破産させ、 惑星を身代金として取り、 帝国全体を瓦礫と化した。 私に逆らう愚か者の[root.GetSpeciesOrganName]を剣で掻き切られたり、 賞金のために売り飛ばされた。 そんな私の賞金は天文学的な数字だっただろう。"
 grand_archive.8570.f: "続けてくれ。"
 grand_archive.8570.f.reply: "§Hさまざまな強盗、 窃盗、 脱出劇などをデジタル録画したものを、 勇壮な音楽に合わせて映写した。§!\n\n最初は慎重にターゲットを選別したうえで強奪する理由をも正当化していた。 しかし、 仕事を重ねるごとに規模も増していった。 計画、 悪者の選別、 強盗、 そして祝杯の繰り返しだった。 問題は「悪者」を探すのにあまりにも時間がかかりすぎたことだった。 視野を広げる必要があった。\n\nやがて欲しいものがあれば、それをひたすら奪うようになった。 賞金額と蓄財の価値が上がるのを見るのが楽しみだった。 私は世界に跡を残し、 決して忘れ去られないだろう。 重要なのはそれだけだった。"
 grand_archive.8570.g: "何か変わったのか？"
 grand_archive.8570.g.reply: "§Hイッテライトの母性は廃墟化してしまった。§!\n\nそして、 イッテライト事件が起こった……キミはそれを見たはずだ。 私はまだ覚えている、 ラジオから聞こえてきた命が絶たれる叫び声を。 事態は行き過ぎていた。 このままにするわけにはいかなかった。\n\n私は仕事を通じて、 あることが分かった。 自分の歴史も教訓は忘れられ、 誰かが自分の代わりになってしまう。 私はただ、 自分に変わるものを選びたかったのだ。\n\nそう、それがキミだ。キミたち[root.GetSpeciesNamePlural]は見事に合格した。 次に何が起こるかはキミたち次第だ。"
 grand_archive.8575.name: "計り知れない富"
 grand_archive.8575.desc.default: "§Y$NESS_GRAND_ARCHIVE$§!には計り知れない富が眠っている。 しかし、 我々の名義でそれを受け取った結果を考慮しなければならない。\n\n彼女の宝はすべて違法に入手したものだ。 これを受け取ることは、 物質的な富と引き換えに$NAME_CaptainNess$の犯罪を容認することになる。\n\nとはいえ、$NAME_CaptainNess$の被害者たちはとっくにこの世を去っている。 我々が受け取っても新たな被害者は出ない。 さらに、我々は§Y$NAME_BlackNeedle$§!を壊滅させ、　銀河に少しの平和をもたらした。 危険に満ちた長い道のりを旅してきた我々に対して、 報われるべき報酬とは思えるだろう。\n\nこの宝をどうするか、 決断を下さなければならない。"
 grand_archive.8575.desc.lom: "§Y$NESS_GRAND_ARCHIVE$§!は究極の宝庫であり、 その戦利品を手にできることは嬉しく思う。 \n\n§Y$NAME_BlackNeedle$§!を倒したことに対する報酬だ！ [this.GetName]に万歳！ \n\nこの金庫を空にしよう。 全[This.Species.GetHandNamePlural]よ、 集合だ！  "
 grand_archive.8575.a.default: "自分の名義で受け取る。"
 grand_archive.8575.a.lom: "努力の報酬を受け取る。"
 grand_archive.8575.b: "追跡できれば、 正当な持ち主に返却する。"
 grand_archive.8575.c: "銀河全体に寄付する。"
 grand_archive.8580.name: "我がパトロン"
 grand_archive.8580.desc.1: "§H§Y$NAME_CaptainNess$§!と呼ばれる機械は、 金庫から宝物を持ち出すスピードに驚いた。§!\n\nどうぞ、 キミには相応しいものだ。 この宝物には、 多くの血と汗と涙が注ぎ込まれている。 大事に使ってくれ。"
 grand_archive.8580.desc.2: "§H§Y$NAME_CaptainNess$§!と呼ばれる機械は、 我々が宝の一部を返還したいという願いに動揺した。§!\n\nなんと残念なことか。 15代目の相続人が、 先祖の古い宝石を手に入れることになるだろう。 まあ、残っているものを、 より有意義に使うことを願う。 最近の行動にもかかわらず、 キミが正しいことをすると信じてあげる。"
 grand_archive.8580.desc.3: "§H§Y$NAME_CaptainNess$§!と呼ばれる機械は、 我々が彼女の蓄えを銀河全体に配ることを知って、 がっかりした。§!\n\nこれがキミたちのやりたいことなのか？  無料でみんなに配るのか？  なにも成し遂げていない一般人に？ もったいない！\n\nキミたちなら大事にすると思ったのに……せめて艦隊の一部を私に任せてもらえる？  もう一度すべてをやり直したいんだ。"
 grand_archive.8580.desc.default: "§Hあとは、$NAME_CaptainNess$をどうするか。 数々の困難を乗り越えてきた経験豊富なパイロットとして、 彼女は我々にとって優秀な司令官になるだろう。 あるいは、 彼女は次世代のパイロットを訓練する、 よりサポート的な教育係を担当することもできる。§!"
 grand_archive.8580.desc.no_lom: "§Hただし、 犯罪者を決して見逃さないという市民への見せしめとして、 彼女を投獄することもできる。 過去の過ちを反省させるべきだ。§!"
 grand_archive.8580.desc.gestalt: "§Hあとは、 $NAME_CaptainNess$をどうするか。 強大な頭脳を持つ彼女は、 司令官の役割において大きな戦力となり、 相手を油断させるような創造的な戦略を提案してくれるだろう。 あるいは、彼女の豊富な戦闘経験を我々の知識として統合し、 戦争に対する理解を深めるために活用することもできる。\n\nただし、 我々が単に彼女を投獄し、 逸脱や犯罪が[this.GetName]では許されないことを明確にしないことをした場合に限る。§!"
 grand_archive.8580.a: "君をパイロットにしたい。"
 grand_archive.8580.a.tt: "レベル10の§Y不死の提督§!を獲得する"
 grand_archive.8580.b: "§Y我々は、 君の知識を我々の意識に統合させてもらう。§!"
 grand_archive.8580.c: "§Y次世代のパイロットを教育してほしい。§!"
 grand_archive.8580.d: "§R牢屋で反省するがいい。§!"
 grand_archive.8585.desc: "それだけ？\n\n 私を見捨てるのか？  \n\nがっかりしたよ……ならば、もう帰るよ。\n\n幸運を祈る。"
 grand_archive.8585.a: "我々は君に何も借りはない。"
 grand_archive.8590.desc: "このバカなエコーね！ 私は世界の富を差し出したのに、 お返しに新しい手錠を出すのか？お前は私の継承者として相応しくない！ もう私のブーツを磨く権利すらないのだ！ \n\nこれは[this.GetName]の黒歴史となり、 お前たち全員に呪いが降りかかるのだ！ \n\nお前たちの[this.species.GetRemnantNamePlural]が虚無の中で枯れ果て、 歴史からその名が忘れ去られるように。 "
 grand_archive.8590.a: "犯罪には罰が与えられる。"
 grand_archive.8595.name: "$NAME_CaptainNess$が停止"
 grand_archive.8595.desc: "§Y$NAME_CaptainNess$§!と言う名の捕虜の機械は、 独房で停止されたところを発見された。 我々は、 彼女が故意に回路に重大な故障を引き起こし、 シャットダウンを強制し、 転送された意識から保存されたデータをすべて消去したと信じている。 独房の壁に走り書きされたメッセージが発見された。 \n\n§Lお前らは歴史から消え去れ……§!"
 grand_archive.8595.a: "ふさわしい最期だ。"
 grand_archive.8600.name: "虹が消える時"
 grand_archive.8600.desc.common: "今こそ、自らの運命を切り開く時が来た。 従うべき航路がなくなり、 星々が我々の道しるべとなるだろう。 \n\n我々は何を達成するだろう？ 歴史は我々をどう刻んでいくのか？"
 grand_archive.8600.desc.default: "この冒険は終わりを迎えた。 §Hネス艦長§!の宝探しはここで終わった。\n\n$grand_archive.8600.desc.common$\n\nここから、 [this.GetName]の真の物語が始まる。"
 grand_archive.8600.desc.lom: "この冒険について、 どんな物語が語られるのだろう？  我々はネス船長の隠された財宝を発見し、 我々を阻む者を全員振り払った。 \n\n$grand_archive.8600.desc.common$\n\n高く誇らしげに[this.GetName]の帆柱を登ろう。 今こそ、 我々の物語が本当に始まるのだ！"
 grand_archive.8600.a.default: "進め！"
 grand_archive.8600.a.lom: "ゼ―ハハハ！"
 valuable_insight: "貴重な知見。"
 grand_archive.9960.name: "$tech_alien_cloning$"
 grand_archive.9960.desc: "初めて宇宙動物[from.solar_system.GetName]の捕獲に成功したことで、 適切な科学技術を発展させれば、 クローン技術でさらに増やすことが可能だと考えている。"
 grand_archive.9960.a: "$valuable_insight$"
 grand_archive.9970.name: "変異ポテンシャル"
 grand_archive.9970.desc: "初めての宇宙動物のクローンが[from.solar_system.GetName]で作られた。\n\n我々の宇宙生物学の研究は、 生物の生理機能をさらに強化できることを示している。 これにより、 生物艦隊に特殊な戦闘要素を装備することが可能になる。"
 grand_archive.9970.a: "$valuable_insight$"
 opinion_return_traceable_items_tier_1: "銀河慈善家"
 opinion_return_traceable_items_tier_1_tt: "§G+$@opinion_return_traceable_items_tier_1_value|0$§! £opinion£殺戮帝国以外の、 我々が戦争状態になっていないすべての帝国との意見。 "
 opinion_return_traceable_items_tier_2: "$opinion_return_traceable_items_tier_1$"
 opinion_return_traceable_items_tier_2_tt: "§G+$@opinion_return_traceable_items_tier_2_value|0$§! £opinion£殺戮帝国以外の、 我々が戦争状態になっていないすべての帝国との意見。 "
 wealth_distribute_favor_tier_1_tt: "各帝国から好意を§Y1§!ポイント獲得する。"
 wealth_distribute_favor_tier_2_tt: "各帝国から好意を§Y2§!ポイント獲得する。"
 leader_trait_pirate_queen: "海賊女王"
 leader_trait_pirate_queen_desc: "長年にわたる悪巧みと突飛な活躍により、　彼女は決して手ぶらでは帰らないリーダーとなった。"
 captain_ness_leader_desc: "機械とかした古代の海賊女王の意識。彼女は多くの世界に宝をまいた。"
 captain_ness_leader_catch_phrase: "一緒に名誉を創り上げよう。"
