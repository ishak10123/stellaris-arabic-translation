 tech_sensors_bio_integration: "センサー生体統合"
 tech_sensors_bio_integration_desc: "宇宙生物の多様な感覚器官は、 我々の技術によって強化しながら身体への影響を最小限に抑えることができる。"
 tech_sensors_bio_integration_effect: "§H機能をアンロック：§!宇宙動物のセンサーアップグレード"
