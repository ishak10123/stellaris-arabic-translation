 grand_archive.4105.desc.3.common: "あなた達の保存に対する取り組みは比類のないものだ。 我々はあなた達に特別な品物の保管を任せたい。[GetStage3Description]"
 grand_archive.4105.desc.3.common_2: "もちろん、そのような貴重な品には、 それに見合った相当額の寄付が必要となるが…"
 CURATORS_STAGE_3_DESC: "我々が最も誇るべきコレクションから、 好きな品を選ぶがいい。 どれも強力な力を宿している。 大切に使ってくれるものと確信している。\n\n$grand_archive.4105.desc.3.common_2$"
 DEAD_CURATORS_STAGE_3_DESC: "これらの強力な品は、 銀河のあちこちに隠されて保管されていたため、 我々のステーションの破壊を免れることができた。\n\n$grand_archive.4105.desc.3.common_2$誠意だけでは再建できない。"
 grand_archive.4105.desc.3.xeno_geology: "$grand_archive.4105.desc.common.xeno_geology$\n\n$grand_archive.4105.desc.3.common$"
 grand_archive.4105.desc.3.aesthetic_wonder: "$grand_archive.4105.desc.common.aesthetic_wonder$\n\n$grand_archive.4105.desc.3.common$"
 grand_archive.4105.desc.3.historical_item: "$grand_archive.4105.desc.common.historical_item$\n\n$grand_archive.4105.desc.3.common$"
 grand_archive.4105.desc.3.no_relic.common: "本来は我々の最も貴重な品物のひとつを渡すところだが、 銀河の他の者たちが、 あなた達より先にそれを受け取ってしまった。\n\n代わりにこれらの品のどれかを受け取ってくれ。"
 grand_archive.4105.desc.3.no_relic.xeno_geology: "あなた達の§Y異星地質学§!の保存に対する取り組みは、 比類のないものだ。\n\n$grand_archive.4105.desc.3.no_relic.common$"
 grand_archive.4105.desc.3.no_relic.aesthetic_wonder: "あなた達の§Y美の驚異§!の保存に対する取り組みは、 比類のないものだ。\n\n$grand_archive.4105.desc.3.no_relic.common$"
 grand_archive.4105.desc.3.no_relic.historical_item: "あなた達の§Y歴史的遺産§!の保存に対する取り組みは、 比類のないものだ。\n\n$grand_archive.4105.desc.3.no_relic.common$"
 grand_archive.4105.3.no_relic.resources: "贈り物を受け取る。"
 grand_archive.4105.3.no_relic.faction_modifier.xeno_geology: "展示の支援を受ける。"
 grand_archive.4105.3.no_relic.faction_modifier.aesthetic_wonder: "$grand_archive.4105.3.no_relic.faction_modifier.xeno_geology$"
