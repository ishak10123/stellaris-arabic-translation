 #Fanatic Purifiers
 grand_archive.4135.name: "劣等種からの装飾品"
 grand_archive.4135.desc: "この世界から汚らわしい異種族を一掃する努力を続けるにつれ、 我々の[GetCollectionRewardCategory]トロフィーコレクションも増えていった。\n\nこれらの展示品が、 この汚らわしい銀河の死骸となり、 我々の使命をさらに鼓舞するものとなることを願っている。"
 grand_archive.4135.desc.geology: "$grand_archive.4135.desc$"
 grand_archive.4135.desc.aesthetic: "$grand_archive.4135.desc$"
 grand_archive.4135.a: "[this.GetName]のために！"
 grand_archive.4140.name: "集めた装飾"
 grand_archive.4140.desc.geology: "我々は、 この汚い銀河から、 [GetCollectionRewardCategory]品々、 装飾、 奇妙なものを収集し続けている。\n\nトロフィーを鑑賞しよう。 しかし、 世界にはまだまだ多く集めるべきものがあるのだ。"
 grand_archive.4140.desc.aesthetic: "我々は、 劣等種が残していった[GetCollectionRewardCategory]装飾品や汚れの跡を収集し続けている。\n\n宇宙から不快な異種族が一掃された後、 これらの品々は彼らの劣った本性を思い出させるだろう。"
 grand_archive.4140.a: "銀河を浄化しなければならない。"
 grand_archive.4145.name: "トロフィーケースいっぱい"
 grand_archive.4145.desc.geology: "この銀河の[GetCollectionRewardCategory]太古の肉である品々で保管庫をいっぱいにした。\n\nこの膨大なコレクションは、 我々がすべてを破壊した記録であると考えている。 我々の勝利を鑑賞するのだ。"
 grand_archive.4145.desc.aesthetic: "我々は保管庫を[GetCollectionRewardCategory]珍品で埋め尽くした。 それは、 無意味な異種族の装飾品による財産だ。\n\n我々はこの膨大なコレクションを眺め、 劣等種の哀れな姿を笑う。 彼らが絶滅すれば、 この展示ケースに飾られた物だけが、 彼らの残したものとなるのだ。"
 grand_archive.4145.a: "死に乾杯！"
 #Devouring Swarm
 grand_archive.4136.name: "装飾品材料"
 grand_archive.4136.desc: "飢えが弱まることはない。 飢えを満たす遠征の中、 [GetCollectionRewardCategory]珍品のコレクションは増えてきた。\n\nこれらの展示品が、 我々が喰らった銀河の最後の思い出となることを願う。"
 grand_archive.4136.desc.geology: "$grand_archive.4136.desc$"
 grand_archive.4136.desc.aesthetic: "$grand_archive.4136.desc$"
 grand_archive.4136.a: "満たされない飢え"
 grand_archive.4141.name: "$grand_archive.4136.name$"
 grand_archive.4141.desc.common: "我々が喰らっている間、 これらの品々は我々がこれまでどれほど多くの餌を消費してきたかを思い出させてくれる。"
 grand_archive.4141.desc.geology: "我々は[GetCollectionRewardCategory]この銀河の太古の肉である標本を集め続けている。\n\n$grand_archive.4141.desc.common$"
 grand_archive.4141.desc.aesthetic: "我々は[GetCollectionRewardCategory]装飾品や珍品など、 劣等種が貴重としてた品々を集め続けている。\n\n$grand_archive.4141.desc.common$"
 grand_archive.4141.a: "宴は続く。"
 grand_archive.4146.name: "食事の記憶"
 grand_archive.4146.desc: "我々はこの銀河を喰らいつくし、 保管庫は[GetCollectionRewardCategory]珍品でいっぱいになっている。\n\nこの膨大なコレクションは、 満たされることのない飢えを思い出させるだけである。 この銀河がすべて喰らいつくされた後、 これらの品々を見て、 味わった記憶を噛みしめるだろう。"
 grand_archive.4146.desc.geology: "$grand_archive.4146.desc$"
 grand_archive.4146.desc.aesthetic: "$grand_archive.4146.desc$"
 grand_archive.4146.a: "美味だ。"
 #Determined Exterminators
 grand_archive.4137.name: "価値があると思われる装飾品"
 grand_archive.4137.desc: "我々は、 有機生命体が特別な遺物として価値があると信じる[GetCollectionRewardCategory]品々を集めた。\n\n我々の監視の下、 これらの品々は銀河から有機生命体が絶滅した後も残るだろう。"
 grand_archive.4137.desc.geology: "$grand_archive.4137.desc$"
 grand_archive.4137.desc.aesthetic: "$grand_archive.4137.desc$"
 grand_archive.4137.a: "無害な珍品"
 grand_archive.4142.name: "集めた珍品"
 grand_archive.4142.desc: "銀河から有機生命体という汚れを殲滅する際に、 [GetCollectionRewardCategory]トロフィーを集め続けている。\n\nこれらの品々は、 将来の駆除プロトコルのために有機生命の非論理性を思い出させてくれる。"
 grand_archive.4142.desc.geology: "$grand_archive.4142.desc$"
 grand_archive.4142.desc.aesthetic: "$grand_archive.4142.desc$"
 grand_archive.4142.a: "プロトコルの再調整。"
 grand_archive.4147.name: "メモリー容量いっぱい"
 grand_archive.4147.desc: "この銀河を浄化するにつれ、 我々は[GetCollectionRewardCategory]標本に割り当てられたメモリーバンクを埋めていった。\n\nこのコレクションは、 有機生命体が大切にしている傾向にあるデータを提供する。 それは有機生命体の根絶に役立ち、 この感染した銀河の歴史における参考点として存在し続けるだろう。"
 grand_archive.4147.desc.geology: "$grand_archive.4147.desc$"
 grand_archive.4147.desc.aesthetic: "$grand_archive.4147.desc$"
 grand_archive.4147.a: "有機生命体の愚かさよ。"
