 resolution_repeal_voidworm_eradication_desc: "[global_event_country.GetGalCommunityOrGalImperium]はボイドワーム種族を殲滅する権利を持っていない。"
 resolution_repeal_voidworm_eradication_effect_success: "§Y$resolution_voidworm_eradication$§!を廃止する。"
 grand_archive.2103.name: "$resolution_voidworm_eradication$"
 grand_archive.2103.desc: "[global_event_country.GetGalCommunityOrGalImperium]はすべてのボイドワームが加盟国の星系内で許可されなくなったことを宣言した。\n\n排除されるか、 自ら進んで立ち退くまで、 [this.GetName]は§R銀河法違反§!と見なされる。"
 grand_archive.2105.name: "[this.GetSpeciesName]の領域に$NAME_Voidworms$が出現"
 grand_archive.2105.desc: "ボイドワームの群れが[from.GetName]星系のわが領域を通過している。 [global_event_country.GetGalCommunityOrGalImperium]の一員として、 国境内にいるボイドワームを安楽死させる法的義務がある。\n\nボイドワームが領内から去るか、 駆除しない限り、 [this.GetName]は§R銀河法に違反§!していると見なされる。"
 grand_archive.2107.desc: "ボイドワームが我々の[invaded_system.GetName]星系内に存在し続けることは、 $resolution_voidworm_eradication$決議の下では重大な§R銀河法違反§!である。 これにより、 [global_event_country.GetGalCommunityOrGalImperium]はその一員に、 [this.GetName]に対する制裁措置の実施を投票で決定できるよう許可した。"
 bombardment_damage_moderate: "§Y中§!"
 bombardment_damage_massive: "§R大§!"
 bombardment_voidworm_invasion_desc_common: "$bombardment_voidworm_invasion$は人口を破壊し、 新たなボイドワームの幼生を産む。\n- §Y軍隊§!への§Y中§!ダメージ\n- 荒廃度§Y25%§!までの§Y惑星§!への[GetVoidwormFleetBombardmentDamageIntensity]ダメージ\n- §YPOP§!へ§Y中§!ダメージ"
 bombardment_voidworm_invasion: "ボイドワームの胞子"
