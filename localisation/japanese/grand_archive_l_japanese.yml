 bombardment_frenzied_voidworm_invasion_desc: "- 荒廃した惑星は§Y$pc_shattered$§!となる"
 alert_space_fauna_bombardment_title: "ボイドワームが我々の植民地を攻撃している！"
 alert_space_fauna_bombardment_instant: "我々の植民地が銀河寄生生物によって攻撃されている！\n人口が密集している場所に胞子を散布するために限られた量の胞子を所持しており、 すぐに立ち去るだろう。"
 ALERT_SPACE_FAUNA_BOMBARDMENT_DETAIL: "$SYSTEM_NAME|Y$の$PLANET_NAME|Y$。 喰われていないPOP：§Y$POPS_TO_KILL$§!。"
 grand_archive.2195.name: "銀河寄生生物"
 grand_archive.2195.desc.common_1: "[from.GetName]は攻撃を受けている。\n\nボイドワームの大群が植民地の軌道上にあり、 寄生嚢で植民地を攻撃している。"
 grand_archive.2195.desc.common_2: "生物学的分析によると、 ボイドワームの各群れは、 これらの包嚢を分配できる供給量が限られており、 枯渇すると立ち去るはずだ。 それまでは、 我々は著しい個体数の減少に苦しむこととなる。"
 grand_archive.2195.desc.default: "$grand_archive.2195.desc.common_1$\n\nそれぞれの包嚢には、 入植者だけでなく、 すべての生命にとって極めて危険な有毒の胞子が含まれている。 胞子が体内に入ると、 急速に幼虫へと成長し、 激しく飛び出して宿主を完全に破壊する。 この幼虫は圧縮された気体を貯めた袋を持っており、 大気圏上層部まで上昇し、 本能的にあらかじめ決められた目的地へと向かう。\n\n$grand_archive.2195.desc.common_2$"
 grand_archive.2195.desc.rocks: "$grand_archive.2195.desc.common_1$\n\nそれぞれの包嚢には、 在来の動物にとって極めて危険な毒性胞子が入っている。　胞子が体内に入ると、 急速に幼虫へと成長し、 激しく飛び出して宿主を完全に破壊する。 通常は小惑星から貴金属を採取する幼虫は、 時々、 自分を守ることのできない我々の[this.GetColonistPlural]を狩り、 食料としている。 幼虫は圧縮された気体を貯めた袋を持っており、 大気圏上層部まで上昇し、 本能的にあらかじめ決められた目的地へと向かう。\n\n$grand_archive.2195.desc.common_2$"
 grand_archive.2195.a: "不安になる。"
 grand_archive.2195.a.homicidal: "殲滅する。"
