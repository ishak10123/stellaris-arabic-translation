 leviathan_unique_mutation_project_unlock_desc: "我々は[FromFrom.solar_system.GetName]で遭遇した[FromFromFrom.GetShipSizeName]の遺伝物質を回収した。\n\nこの生物のクローンを作成する技術は未だにないが、 その独特的な構造から貴重な知見を引き出すことはできるかもしれない。"
