 grand_archive.10075.desc: "$leviathan_unique_mutation_project_unlock_desc$"
 grand_archive.10080.name: "ボイドスポーン変異計画の完了"
 grand_archive.10080.desc: "$NAME_Voidspawn$を使った変異計画が完了し、 面白い発見があった。 それは§H$starborne_biology$§!である。 \n\nこれらの生物の組織は星の光に強く反応し、 他の生物の成長を促進することもできる。 維持には少量のエネルギーが必要だが、 最も明るい星の近くでは成長率が大幅に向上する。"
