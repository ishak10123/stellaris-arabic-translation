 grand_archive.5015.name: "宝物庫の設立"
 grand_archive.5015.desc: "§Y$celestial_chart$§!は、 我々が発見した宝物からより大きな価値を引き出すのに役立つ、 アーカイブされた評価情報を提供してくれた。 惑星のひとつに§Y宝物庫§!を設立し、 貴重な物を分類、 修復、 保存できるようにすべきだ。 現在の物流状況を考慮すると、 以下の惑星がこの新しい施設の建設に適している。"
 grand_archive.5015.a: "§Y[event_target:treasure_planet_candidate_1.GetName]§!において、 $d_treasure_planet$を1つ設置する。"
 grand_archive.5015.b: "§Y[event_target:treasure_planet_candidate_2.GetName]§!において、 $d_treasure_planet$を1つ設置する。"
