 tr_domestication_astrozoology_tt: "宇宙動物の捕獲時または繁殖時：$NEW_LINE$$t$- 淘汰による資源獲得量：§G200%§!"
 tr_domestication_metabolic_regulation: "代謝管理"
 tr_domestication_metabolic_regulation_delayed: "個々の代謝に影響を与える様々な主要酵素やタンパク質を調整することで、 飼育している種の成熟を人為的に制御することができる。"
