 grand_archive.4510.stolen: "中にあった貴重な標本の一部を回収することができた。"
 grand_archive.4510.ancrel: "瓦礫から少量の$r_minor_artifacts$を回収することができた。"
 grand_archive.4510.nothing: "残念ながら、 そこに価値のあるものはなかった。"
 grand_archive.4510.freed: "さらに、 ビバリウムから飼育下の宇宙動物を数匹解放してしまったようだ。 解放されたばかりで攻撃的になったり混乱したりする可能性がある。"
