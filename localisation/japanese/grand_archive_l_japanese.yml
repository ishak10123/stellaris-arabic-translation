 ##########
 #Civics #
 ##########
 civic_galactic_curators: "銀河キュレーター"
 civic_galactic_curators_desc: "歴史的遺物の入念な収集と保存は、 常にこの文明を魅了してきた。 しかし今、 銀河の謎がすぐそこまで迫っている今、 学ぶべきことはすべて残されている。"
 civic_galactic_curators_effects: "$civic_galactic_curators_effects_common$\n- $entertainers_are_curators_tt$"
 civic_corporate_galactic_curators: "古物研究専門"
 civic_corporate_galactic_curators_desc: "この社会は誰よりもよく知っているが、 骨董品やコレクターズアイテムは利益を秘めている。 材料投機に精通した専門家たちは今、 投資機会を求めて空を見上げている。"
 civic_corporate_galactic_curators_effects: "$civic_galactic_curators_effects_common$\n- $entertainers_are_curators_tt$\n- £building£ §Y$building_public_relations_office$§!$megacorp_civic_branch_office_building_effect$"
 civic_hive_galactic_curators: "ケアテイカーネットワーク"
 civic_hive_galactic_curators_desc: "集合体は、 取る、 保持する、 維持するという圧倒的な衝動を強めてきた。 この行動は、 過去には彼らの生存を助けてきたが、 今では集めたトークンを壮大な配置で誇示するよう駆り立てている。"
 civic_hive_galactic_curators_effects: "$civic_galactic_curators_effects_common$"
 civic_machine_galactic_curators: "ケアテイカーネットワーク"
 civic_machine_galactic_curators_desc: "この機械知性は、 ソースコードに「収集と保存」という中核指令体が組み込まれている。"
 civic_machine_galactic_curators_effects: "$civic_galactic_curators_effects_common$"
 civic_galactic_curators_effects_common: "- $GUARANTEED_RESEARCH_OPTION_STRING$['technology:tech_galactic_archivism', £society_research£$tech_galactic_archivism$]\n- 初期['concept_specimen', 標本]：各コレクションカテゴリーの§0$common$§!を1つずつ\n- §Y標本§!を発見するか§Y$ARCHAEOLOGICAL_SITE$§!を完成させるたびに$r_unity$を獲得\n- §Y学術中立機構§!からの購入：§G$@galactic_curators_curator_enclave_purchase_cost|%0$§!\n- §Y$edict_decentralized_research$§!布告が有効になり、 §Y研究ステーション§!の産出量が増加するが、 £job_researcher£ §Y[GetResearcher]§!の職業産出量が減少する"
 edict_decentralized_research: "分散型研究"
 edict_decentralized_research_desc: "最大の知識は、 我々の文明の外側に存在している。 銀河をより全体的に見ることで、 我々は自分自身についてより完全な理解を得ることができる。"
 MOD_COUNTRY_SPECIMEN_ACQUIRE_CHANCE_MULT: "標本を発見する確率が上昇する"
 councilor_galactic_curators: "最高キュレーター"
 councilor_galactic_curators_desc: "$TITLE$は、 すべての標本の保存品質を監督する責任を負っている。"
 councilor_corporate_galactic_curators: "キュレーション管理官"
 councilor_corporate_galactic_curators_desc: "$TITLE$は、 標本の展示および販売の管理を担当する。"
 civic_beastmasters: "ビーストマスター"
 civic_beastmasters_desc: "スペースアメーバの繁殖地となる星系において、 技術的に成熟したこの社会は、 アメーバのライフサイクルに関する深い知識を得ている。 彼らは相互利益のために、 これらの生物を育成し、 繁殖させ、 最終的にはクローン化することに取り組んでいる。"
 civic_machine_beastmasters: "バイオドローン"
 civic_machine_beastmasters_desc: "母星系で宇宙育ちの生物と直接的に交流したこの機械知性は、 これらの強力な生物をそのコア機能に統合した。 そこから生まれたのは相互に有益な関係だ。"
 civic_hive_beastmasters: "ワイルドスウォーム"
 civic_hive_beastmasters_desc: "この集合意識は、 非常に適応力の高い植民地であり、 彼らの母星系における宇宙育ちの生物との共生関係へと進化した。 個々の精神は、 共通の目標を達成するために協力し合っている。"
 civic_wilderness_beastmasters: "$civic_hive_beastmasters$"
 civic_wilderness_beastmasters_desc: "このウィルダネスは、 母星系の宇宙に生息する動物たちとの共生を受け入れた。 共生する知性と完全に一体化しているわけではないが、 これらの生物は共通の目標を達成するために協力し合っている。"
 civic_corporate_beastmasters: "宇宙牧場主"
 civic_corporate_beastmasters_desc: "もともとは動物牧場のエリートギルドであったこの巨大企業は、 母星系における宇宙育ちの生物の飼育とケアの技術を開発した。"
 civic_beastmasters_common_effects_1: "$t$- $ADDITIONAL_TECHNOLOGIES_STRING$$TABBED_NEW_LINE$$t$- ['technology:tech_gravity_wells', £physics£ $tech_gravity_wells$]$TABBED_NEW_LINE$$t$- ['technology:tech_alien_cloning', £society£ $tech_alien_cloning$]$TABBED_NEW_LINE$- $AVAILABLE_STARBASE_BUILDINGS$['concept_beastport', ビーストポート]$TABBED_NEW_LINE$- $HOME_SYSTEM$は['concept_beastport']がある状態で始まる"
 civic_beastmasters_ships: "$t$- 開始時の§Y軍艦§!が§Y宇宙アメーバ§!に置き換えられる"
 civic_beastmasters_common_effects_2: "$t$- 初期£genetic_material£ ['concept_dna']:$TABBED_NEW_LINE$$t$- §0コモン§!宇宙アメーバ"
 civic_beastmasters_effects: "$civic_beastmasters_common_effects_1$\n$civic_beastmasters_ships$\n$civic_beastmasters_common_effects_2$"
 civic_corporate_beastmasters_effects: "$civic_beastmasters_common_effects_1$\n$civic_beastmasters_ships$\n$civic_beastmasters_common_effects_2$\n$t$- £building£ §Y$building_food_conglomerate$§!$megacorp_civic_branch_office_building_effect$"
 civic_cordyceptic_beastmasters_effects: "$civic_beastmasters_common_effects_1$$TABBED_NEW_LINE$- §Yアンデッドのスペースアメーバ§!の代わりに§Yクローンされたスペースアメーバ§!で開始する\n$civic_beastmasters_common_effects_2$"
 councilor_beastmasters: "ビーストロード"
 councilor_beastmasters_desc: "$TITLE$は主に宇宙動物艦船の管理と戦略的展開を担当する、 高度に専門化された名誉ある役職だ。"
 councilor_corporate_beastmasters: "主任牧場主"
 councilor_corporate_beastmasters_desc: "$TITLE$は宇宙動物艦船の健康状態を維持し、 継続的に補充されているようにする。 このダイナミックな役割には、 物流、 生態学、 動物飼育の専門知識を組み合わせた独自のスキルが求められる。"
 civic_tooltip_not_beastmasters: "['concept_beastmasters_civic']の国是を保持していない"
 concept_beastmasters_civic: "$civic_beastmasters$"
 concept_beastmasters_civic_desc: "国是「$concept_beastmasters_civic$」には以下が含まれる。$NEW_LINE$- ['civic:civic_beastmasters']$NEW_LINE$- ['civic:civic_hive_beastmasters'] $NEW_LINE$- ['civic:civic_machine_beastmasters'] $NEW_LINE$- ['civic:civic_corporate_beastmasters']"
