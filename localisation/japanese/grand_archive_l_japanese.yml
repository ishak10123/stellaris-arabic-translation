 tr_domestication_killer_instinct: "殺戮本能"
 tr_domestication_killer_instinct_delayed: "深宇宙で生き残る生き物は、 自分自身で身を守るしかない。 さもなければ、 その種は絶滅してしまうだろう。"
 tr_domestication_killer_instinct_homicidal_delayed: "我々に仕えるにふさわしいのは、 最も容赦のない生き物だけだ。"
