 resolution_voidworm_eradication: "ボイドワームの根絶"
 resolution_voidworm_eradication_desc: "寄生生物であるボイドワームは銀河の害であり、 文明のある惑星への脅威である。 彼らの自然なライフサイクルは銀河の生態系のバランスを崩すため、 すべてのボイドワームを排除すべきである。"
 resolution_voidworm_eradication_tooltip: "§Y$NAME_Voidworms$§!が国境内にいる帝国は、 生物が自ずと国境から去るか、駆除されるまで§R銀河法違反§!と見なされる。"
