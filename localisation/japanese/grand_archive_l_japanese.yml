 grand_archive.10055.desc: "$leviathan_unique_mutation_project_unlock_desc$"
 grand_archive.10060.name: "女王変異計画の完了"
 grand_archive.10060.desc: "$NAME_Elderly_Tiyanki$の変異計画が完了し、 面白い結果が出た。 それは§H$restorative_enzymes$§!である。\n\n女王の遺伝物質に存在する修復酵素は、 他の生物の類似した腺でも再生が可能である。 これにより、構造組織が再生素材に変化し、 爆発後の密集した隊形において非常に有用となるだろう。"
