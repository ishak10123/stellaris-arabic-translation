 space_amoeba_UNIQUE_MUTATION_PROJECT: "宇宙アメーバ変異計画"
 space_amoeba_UNIQUE_MUTATION_PROJECT_DESC: "新たにクローン化した生物のトレーニング過程において、 負傷した宇宙アメーバが、 相手を打ち負かす新しいテクニックを使った。 アメーバの鞭毛は、トレーニング相手の身体から栄養素と物質を吸い上げ、 それで自身の鎧の穴を塞ぎ、 戦闘力を回復するために利用することができた。\n\nこの宇宙アメーバの生物学的現象をさらに研究すれば、 新たな種族別の変異を開発させる要素が明らかになる可能性がある。"
 tiyanki_UNIQUE_MUTATION_PROJECT: "ティヤンキ変異計画"
 tiyanki_UNIQUE_MUTATION_PROJECT_DESC: "最近クローンされたティヤンキの群れが、 互いに交わり、 複雑な発声を繰り返しているのが観察された。 かろうじて聞き取れるその音は、 周辺の生き物たちに安らぎと平穏をもたらしているようだった。\n\nこのティヤンキの生物学的現象をさらに研究すれば、 新たな種族別の変異を開発させる要素が明らかになる可能性がある。"
 voidworm_UNIQUE_MUTATION_PROJECT: "ボイドワーム変異計画"
 voidworm_UNIQUE_MUTATION_PROJECT_DESC: "ボイドワームの一部が成熟すると小さな嚢胞のような増殖物を形成する傾向があることに気づいた。 さらに観察を続けると、 これを持つ標本は、 通常よりも繁殖力が高いことが分かった。\n\nこのボイドワームの生物学的現象をさらに研究すれば、 新たな種族別の変異を開発させる要素が明らかになる可能性がある。"
 cutholoid_UNIQUE_MUTATION_PROJECT: "カサロイド変異計画"
 cutholoid_UNIQUE_MUTATION_PROJECT_DESC: "餌の過剰摂取で、 クローンのカサロイド1体が激しく嘔吐する様子が記録された。 その消化液は、 放射能の性質を生物の体外で長時間維持する強力な飛翔体として、 非常に高い致死性を示すことが判明した。\n\nこのカサロイドの生物学的現象をさらに研究すれば、 新たな種族別の変異を開発させる要素が明らかになる可能性がある。"
 crystalline_entity_UNIQUE_MUTATION_PROJECT: "結晶生命体変異計画"
 crystalline_entity_UNIQUE_MUTATION_PROJECT_DESC: "戦闘テストで破壊された後、 結晶生命体の中で完全に2つに分かれた標本があった。 これらの断片化された結晶生命体は、 生命維持に必要な兆候を維持し、 しばらくの間は生き続けた。"
 tiyanki_matriarch_UNIQUE_MUTATION_PROJECT: "$NAME_Elderly_Tiyanki$変異計画"
 tiyanki_matriarch_UNIQUE_MUTATION_PROJECT_DESC: "$NAME_Elderly_Tiyanki$から回収した遺伝物質は、　宇宙動物に適用できる変異計画を進める上で、 いくつかの独自の洞察をもたらした。"
 voidspawn_UNIQUE_MUTATION_PROJECT: "ボイドスポーン変異計画"
 voidspawn_UNIQUE_MUTATION_PROJECT_DESC: "$NAME_Voidspawn$から回収した遺伝物質は、　宇宙動物に適用できる変異計画を進める上で、 いくつかの独自の洞察をもたらした。"
 unique_mutation_project_unlock_desc: "[From.GetShipCategoryName]のクローニングの努力の挙句、　遺伝子操作の分野で画期的な成果をもたらした。　この生物の独自の構造と、我々の遺伝子操作の専門知識を組み合わせることで、 新たな変異体を作り出すことができるかもしれない。"
