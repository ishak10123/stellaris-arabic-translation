 ### Primal Calling
 origin_primal_calling: "原初の呼び声"
 origin_primal_calling_desc: "刃のような草のざわめき。 夜の轟くような静寂。 星の光のように鋭く冷たい狩人の意志…\n\nこの文明は、 野生との原初的なつながりを持っている。 自分たちの世界に生息する多様な（そしてしばしば危険な）野生動物の管理者として、 彼らは今や空へと目を向ける。 動物を扱い、 牧場を営むのを得意とし、 彼らの倫理観に従って動物との関係を発展させてきた。 この絆が銀河系規模でどのように発展していくのかは、 まだわからない。"
 origin_tooltip_primal_calling_effects: "- $HOMEWORLD$$TABBED_NEW_LINE$- $PLANETARY_MODIFIERS$['concept_untamed_wilds_mod']\n- $HOME_SYSTEM$近隣の星系の§Y宇宙動物§!\n- $AVAILABLE_BUILDINGS$['concept_wildlife_ranch', £building£ $wildlife_ranch$]\n- ファーストコンタクトの際に§Y宇宙動物§!に関する特別な['concept_primal_calling_stance']を選択することができる\n- $ADDITIONAL_TECHNOLOGIES_STRING$['technology:tech_genome_mapping', £society_research£ $tech_genome_mapping$]\n- $GUARANTEED_RESEARCH_OPTION_STRING$['technology:tech_alien_life_studies', £society£ $tech_alien_life_studies$]\n- 宇宙動物とファーストコンタクトすると['technology:tech_gravity_wells', £physics_research£ $tech_gravity_wells$]についての洞察を得る\n- 宇宙動物を捕獲すると['technology:tech_alien_cloning', £society_research£ $tech_alien_cloning$]についての洞察を得る\n- 宇宙動物をクローンすると['technology:tech_controlled_mutations', £society_research£ $tech_controlled_mutations$]についての洞察を得る"
 START_SCREEN_PRIMAL_CALLING: "急速な科学技術の進歩にもかかわらず、 我々はこの世界の野生の生き物との繋がりを保っている。 我々の進化を支えてきた揺るぎない仲間である野生生物は、 我々がその管理者であると同時に、我々の師でもあるのだ。 我々は彼らから、 彼らが捧げられる以上のものを奪うことはしないし、 彼らの犠牲には敬意を払う。\n\n未開の広大な宇宙で、 我々は他の野生生物を発見するかもしれない。 もし発見したら、 その動物を我々の世界の生き物と同じように尊重する。 我々が自分たちの居場所について学ぶように、 彼らも彼らの居場所について学び、 ともに強く成長するのだ。\n\n星に呼ばれ、 原始的な欲望が我々の中で燃える。 何があろうとも、 我々は確信をもって立ち向かう。"
 leader_trait_trophy_hunter: "トロフィーハンター"
 leader_trait_trophy_hunter_desc: "苦難に鍛えられ、 長年の経験を武器とするこの司令官は、 宇宙動物を知り尽くしている。 狩りを成功させる秘訣は、 獲物と同じように考えることだが、 完璧なトロフィーは完璧な射撃からしか生まれない。"
 leader_trait_gifted_trapper: "才能あるトラッパー"
 leader_trait_gifted_trapper_desc: "生きた標本の安全な捕獲と輸送に最大限の注意を払う熟練研究者。 生き物の安全に対するこのリーダーの取り組みは、 あらゆる分野の研究水準を向上させるよう他の研究者を鼓舞する。"
 leader_trait_void_hunter: "ボイドハンター"
 leader_trait_void_hunter_desc: "知識豊富なハンターで、 大物を仕留めるのに適している。 アプローチには忍耐強く、 攻撃は正確。"
 leader_trait_void_hunter_2: "$leader_trait_void_hunter$ II"
 leader_trait_void_hunter_2_desc: "$leader_trait_void_hunter_desc$"
 leader_trait_void_tracker: "ボイドトラッカー"
 leader_trait_void_tracker_desc: "野生の宇宙動物を効率的かつ安全に捕獲するこのリーダーの才能は、 他の追随を許さない。"
 leader_trait_void_tracker_2: "$leader_trait_void_tracker$ II"
 leader_trait_void_tracker_2_desc: "$leader_trait_void_tracker_desc$"
 #First Contacts
 first_contact_critters.15.desc.primal_calling: "特筆すべきは、 各§Hティヤンキ§!の群れの中心には母系序列があり、 常に1頭のメスがグループを率いている。 メスはすべての食料資源を優先的に与えられ、 子のために母性ガスを生産し、 群れの移動を先導する。 そのため、 オスは資源が乏しいときは栄養補給を放棄し、 群れが休息している間、 より多くの食料を探しにいく。"
 first_contact_critters.25.desc.primal_calling: "若い個体以外はすべて、 RNAを混入した分泌物によって制御される準独立生物を伴っている。 この「鞭毛」は複雑なパターンで攻撃するため、 §H「宇宙アメーバ」§!は見かけの能力不足にもかかわらず、 非常に巧妙な自然捕食者なのである。"
 first_contact_critters.35.desc.primal_calling: "これらの生物は、 屈折した光の色調変化によって互いにコミュニケーションをとっているようだ。 この媒体は複雑な表現を可能とするが、 これらの半知覚生命体は基本的な表現しか再現していない。 色の変化は、 社会的地位や攻撃性、 さらには繁殖能力を示すのに使われることもある。"
 grand_archive.2005.desc.primal_calling: "これらの寄生生物は自然な繁殖能力を持たないため、 惑星上の宿主の獲得に頼らざるを得ない。 §Hボイドワーム§!が「トロイカス」と呼ばれる交尾する3組の中で重要なホルモンを生成するためには、 惑星の生物から十分な有機物を収穫しなければならない。 雌雄同体の生物であるため、 パートナーの選択は主に身体的特徴の補完と同等の大きさであることによって決定される。"
 grand_archive.2900.desc.primal_calling: "生物は大きさだけでなく、 鉱物の組成に基づいて小惑星を選んでいると考えている。 最初に遭遇した個体は生物学的に[GetCommonMineral]を好むが、 それぞれの個体が現在の環境に基づいて時間をかけて適応するように発達しているのだろう。 スキャンによると、 この金属の痕跡は住処となる小惑星全体に存在し、 §H「カサロイド」§!自身の神経系と消化管内にも存在している。"
