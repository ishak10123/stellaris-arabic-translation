 sm_voidlure: "ボイドルアー"
 sm_voidlure_desc: "ボイドルアーは深宇宙に信号を送信し、 虚空に住む生物を引き寄せることができる。"
 sm_voidlure_desc_know_fauna: "ボイドルアーは、 深宇宙に信号を送信し、 虚空に住む特定の宇宙動物を時間をかけて引き寄せることができる。 各ルアーはその生物が好む星系に設置しなければならない。 おびき寄せられた生物は、 1年間一時的に大人しくなる。"
