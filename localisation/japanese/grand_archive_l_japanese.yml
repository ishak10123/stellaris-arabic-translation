 #Leader Traits #
 #################
 leader_trait_buccaneer: "バッカニアー"
 leader_trait_buccaneer_desc: "戦場でのサルベージの達人であるこのリーダーは、 最も損傷した難破船からもあらゆる価値を引き出すことができる。"
 leader_trait_trailblazer: "トレイルブレイザー"
 leader_trait_trailblazer_desc: "銀河のフロンティアの有望な見通しに魅了されたこのリーダーは、 宇宙の最も遠い領域を探索することを望んでいる。"
 leader_trait_treasure_hoarder: "トレジャーホーダー"
 leader_trait_treasure_hoarder_desc: "このリーダーの野望を満たすには、 どんな高額の報酬も十分ではない。 貴重な資源の蓄積が主なモチベーションだ。"
