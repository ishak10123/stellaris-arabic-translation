 mineral_insight: "鉱物の知見"
 void_mining: "虚空採掘"
 cultural_enrichment: "文化の充実"
 auctioneering_curation: "オークションのキュレーション"
 historical_insight: "歴史の知見"
 lessons_from_the_past: "過去からの教訓"
 grand_archive.4105.name: "$leviathans.500.name$"
 grand_archive.4105.desc.common.aesthetic_wonder: "[GetCuratorsDesignation]はあなたが§Y$EXHIBITION_AESTHETIC_WONDERS$§!の標本の収集と保存に尽力していることに気づいた。 銀河には、 よく目を凝らせば至る所に美が存在する。"
 grand_archive.4105.desc.common.historical_item: "[GetCuratorsDesignation]はあなたが§Y$EXHIBITION_GALACTIC_HISTORY$§!の収集と保存に尽力していることに気づいた。 保管している物の持ち主に、 あなたは不死の贈り物を与える。"
 grand_archive.4105.desc.common.xeno_geology: "[GetCuratorsDesignation]はあなたが§Y$EXHIBITION_XENO_GEOLOGY$§!の標本の収集と保存に尽力していることに気づいた。 銀河の歴史の多くは、 石の中に隠れている。"
 grand_archive.4105.desc.1.common: "[GetStage1Description]\n\nこれを励みに、 素晴らしい仕事を続けてくれ。"
 CURATORS_STAGE_1_DESC: "あなたの現時点のコレクションは素晴らしいものだ。 ぜひ我々に手伝わさせてほしい。 銀河の保存のため、 あなたが選んだ分野のスペシャリストを派遣しよう。"
 DEAD_CURATORS_STAGE_1_DESC: "我々の中立機構はもはや存在しないが、 銀河の保存のため、ぜひ手伝わせてほしい。 あなたが望む分野でサポートできるかもしれない。"
 grand_archive.4105.desc.1.xeno_geology: "$grand_archive.4105.desc.common.xeno_geology$\n\n$grand_archive.4105.desc.1.common$"
 grand_archive.4105.desc.1.aesthetic_wonder: "$grand_archive.4105.desc.common.aesthetic_wonder$\n\n$grand_archive.4105.desc.1.common$"
 grand_archive.4105.desc.1.historical_item: "$grand_archive.4105.desc.common.historical_item$\n\n$grand_archive.4105.desc.1.common$"
 grand_archive.4105.1.mineral_insight: "植民地の発掘を手伝ってほしい。"
 grand_archive.4105.1.void_mining: "星々の発掘を手伝ってほしい。"
 grand_archive.4105.1.cultural_enrichment: "その素晴らしさの共有を手伝ってほしい。"
 grand_archive.4105.1.auctioneering_curation: "この標本にふさわしい保管場所を見つけるのを手伝ってほしい。"
 grand_archive.4105.1.historical_insight: "もっと詳しく知ることができる場所に目を向けさせてくれ。"
 grand_archive.4105.1.lessons_from_the_past: "過去の知恵で我々のリーダーを導いてくれ。"
 grand_archive.4105.1.no: "今はだめだ。"
