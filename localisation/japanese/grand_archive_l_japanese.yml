 grand_archive.2000.name: "無数の声"
 grand_archive.2000.desc: "センサーは、 銀河全体に初歩的な信号を送信している[This.System.GetName]星系内の存在を示している。 これらの同じパターンは、 出所不明の長距離スキャナーにも記録されている。 これらの信号が意図的なものかどうかは不明だが、 さらなる調査が必要だ。"
 grand_archive.2000.a: "もっと調べろ。"
 fcsum_voidworms_2: "§H[This.ContactCountry.GetName]は「ボイドワーム」ｔお呼ばれる銀河寄生生物であることが判明した。§!"
 grand_archive.2005.name: "$NAME_Voidworms$"
 grand_archive.2005.desc: "我々は広範囲に及ぶ信号が、 §H「$NAME_Voidworms$」§!と呼んでいる宇宙生物から発信されていることを発見した。 銀河には、 このような生物がいたるところに存在しているようだ。 信号のさまざまな波長から、 最終的な成熟に達するまでに、 生物はいくつかの成長段階を経て発達することが分かった。 一見攻撃的ではないが、 彼らの通信パターンは銀河規模での連携を示している。"
 grand_archive.2005.a.homicidal: "駆除すべき愚かな獣だ。"
 grand_archive.2015.name: "ボイドワームの酵素"
 grand_archive.2015.desc: "ボイドワームは3匹がまとまって交尾を行い、 この集まりは「トロイカ」と呼ばれている。 これらの生物は、 終わりのない交尾の儀式で生涯を共にするようになる。 しかし、子を産むためには外部的な生物の宿主を必要とする。\n\nこれらは寄生生物である。\n\n成熟すると、 各ボイドワームは生殖器官内に多数の包嚢を生成する。 これらの保護嚢には、 非常に腐食性の強い配偶子が含まれており、 トロイカの他の個体と結合すると、 より多くの幼生を生み出すために、 適切なバイオマスを持つ惑星に送られる。\n\nいずれにせよ、生殖酵素の力を利用できると信じている。さらには、生殖活動に対する免疫も獲得できるかもしれない。"
 grand_archive.2015.a: "その繁殖力を我々のために活用しよう。"
 grand_archive.2015.b: "気色悪い。 治療法を見つけろ。"
