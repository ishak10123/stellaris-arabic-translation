 COMMON_MINERAL_6: "ニッケル"
 crystalline_entity_plural: "結晶生命体"
 grand_archive.1002.name: "星々の命"
 grand_archive.1002.desc.default: "宇宙は生命に満ちている。 我々は[from.GetSpaceFaunaNamePlural]の存在を発見したが、 他に何があるのだろうか？\n\n[capital_scope.GetName]の野生生物との密接な関係は、 銀河規模では適切ではないかもしれない。 宇宙空間はまったく新しい生態系を形成し、 我々は分かれ道に立たされている。\n\nこれらの生物は我々にとってどのような存在なのか？\n\nどのような選択をするにせよ、 その結果の影響は今後何年も続くことになるだろう。"
 grand_archive.1002.desc.homicidal: "虚空は生命に満ちているかもしれない。 その命を消すのも、 利用するのも、 我々の意のままだ。 [from.GetSpaceFaunaNamePlural]の存在を発見した我々は、 さらなる発見を望んでいる。 恰好の餌食か重荷を背負う獣か、 どちらにするかは我々次第だ。"
 grand_archive.1002.a: "展示する標本だ。"
 grand_archive.1002.b: "利用できる家畜だ。"
 grand_archive.1002.c: "保護するべき生物だ。"
 grand_archive.1002.d: "狩りの対象となる新たな獲物だ。"
 grand_archive.1002.d.purifier: "死体の山に重ねろ。"
 grand_archive.1002.e: "吸収する心が増えた。"
 grand_archive.1002.f: "共生のパートナーだ。"
 grand_archive.1002.g: "獲物と採石だ。"
 untamed_wilds: "未開の荒野"
 untamed_wilds_desc: "広大な保護地域はで野生生物が自由に繁殖し、 在来生物の持続的な供給源となっている。"
 grand_archive.1010.desc: "[Root.GetName]のコロニーは、 在来生物である§Y巨大生命体§!の自然の縄張りを尊重することを学んだ。\n\nこれらの巨大な獣は、 領土を広げ、 土地を開発する際にも、 我々にとって今後も利益となるだろう。"
 grand_archive.1010.a: "我々の[owner.GetWranglerJobNamePlural]はここでうまくやるだろう。"
