 grand_archive.10010.name: "宇宙アメーバ変異計画の完了"
 grand_archive.10010.desc: "§Y宇宙アメーバ§!の変異計画が完了し、 新しい細胞小器官がいくつか生えた。それは展開可能な§Y$tech_unique_mutation_space_amoeba$§!である。\n\nこの共生生物は、 近くの物体からエネルギーを吸収し、 それを宿主に送り返すことで、 生存能力と再生能力を高めることができる。"
 grand_archive.10015.name: "ティヤンキ変異計画の完了"
 grand_archive.10015.desc: "§Yティヤンキ§!の変異計画が完了し、 新しい強化が成し遂げた。 それは§Y$tech_unique_mutation_tiyanki$§!である。\n\n群れでコミュニケーションに使う自然の振動を、 最大限に持続可能なレベルまで増幅した。 その結果、 制御可能なフィールドが生まれ、 近くの他の生き物の組織を強化する。"
 grand_archive.10020.name: "ボイドワーム変異計画の完了"
 grand_archive.10020.desc: "§Yボイドワーム§!の変異計画が完了し、 その生殖にいくつかの変化を成し遂げた。 それは§Y$tech_unique_mutation_voidworm$§!である。\n\nこれらの生物が惑星に浴びせる寄生虫の嚢子の繁殖力を高めることができた。 その結果、 幼生の収穫量も増加した。"
 grand_archive.10025.name: "カサロイド変異計画の完了"
 grand_archive.10025.desc: "§Yカサロイド§!の変異計画が完了し、 面白い結果が出た。 それは§Y$tech_unique_mutation_cutholoid$§!である。\n\nその巨大な消化器官を高速で長距離の弾丸を発射させる方法を発見した。 しかし、この大幅な生物学的改造により、残念ながら敵艦隊を巻き込むことができなくなる。"
 grand_archive.10030.name: "結晶生命体変異計画の完了"
 grand_archive.10030.desc: "§Y結晶生命体§!の変異計画が完了し、 面白い結果が出た。 それは§Y$tech_unique_mutation_crystalline_entity$§!である。\n\nこの結晶遺伝子への変更により、 各生物が重度な外傷を受けた場合、 2つの独立した生物に分裂することが可能となる。 これにより、 戦闘能力が大幅に向上するはずだ。"
 grand_archive.10030.a: "$FASCINATING$"
