 grand_archive.2310.name: "ボイドワームの疫病"
 grand_archive.2310.desc.default: "銀河系における$NAME_Voidworms$の個体数は臨界点に達した。 ボイドワームの生態は明らかに変わってきている。\n\n宿主となる個体群が被害を免れるはずの、 彼らのライフサイクルにおける段階が乱されてしまった。 彼らの産卵場の持続に関しては、 もはや考慮されていないようだ。\n\nすべて植民地が緊急警報を発令している。 $NAME_Voidworms$が存在する星系では、 厳重な警戒が必要だ。\n\n銀河規模の狂乱した繁殖が我々を襲っている。"
 grand_archive.2310.desc.tech: "$grand_archive.2310.desc.default$\n\n寄生生物に対する我々が以前に獲得した免疫は、 もはや以前と同じように機能しなくなっている。 また白紙の状態からやり直す必要がある。"
 grand_archive.2310.desc.nocontact: "「ボイドワーム」と呼ばれる、 これまで知られていなかった宇宙動物の一種が異常な繁殖行動を起こしているという不穏な報告が銀河全域で相次いでいる。 これらの生物は、 十分な星系防御を持たない惑星にとって重大な脅威であると報告されている。 すべての植民地は現在、 最高レベルの警戒態勢となっている。"
 grand_archive.2310.a: "$DISTURBING$$DOTDOTDOT$"
 situation_voidworm_plague: "ボイドワームの疫病"
 situation_voidworm_plague_type: "$situation_voidworm_plague$"
 situation_voidworm_plague_desc: "$NAME_Voidworms$の災厄が迫っている。\n\nこれらの生物は、 もはや宿主となる惑星を繁殖地として生かしていない。 ボイドワームを根絶やしにしなければ、 植民地が危険にさらされることになる。\n\n§Yボイドワームを1体倒すごとに、 状況進行度が加速する。§!"
 situation_voidworm_plague_monthly_change_tooltip: "$situation_monthly_change_tooltip_approaches_dependent$"
 finisher_effects_voidworm_plague: "植民地はボイドワームの攻撃に耐えられるようになる。"
 approach_voidworm_plague_do_nothing: "何もしない"
 approach_voidworm_plague_do_nothing_tt: "特に行動は起こさない。"
 approach_voidworm_plague_support_fleets: "艦隊への支援"
 approach_voidworm_plague_support_fleets_tt: "ボイドワームの脅威に対抗する軍事艦隊を支援するために、 生活の質を少し犠牲にすることができる。\n状況$SITUATION_MONTHLY_CHANGE$：§G+0.5§!"
 approach_voidworm_plague_purge_infected_pops: "感染者の駆除"
 approach_voidworm_plague_purge_infected_pops_tt: "$NAME_Voidworms$が植民地を攻撃しても、 新たな$NAME_Voidworms$は発生しない。\n状況$SITUATION_MONTHLY_CHANGE$：§G+0.7§!"
 approach_voidworm_plague_search_for_cure: "治療を求めて"
 approach_voidworm_plague_search_for_cure_tt: "生物学的サイクルを断ち切ることができれば、 $NAME_Voidworms$は銀河系で繁殖できなくなる。\n状況$SITUATION_MONTHLY_CHANGE$：§G+1.0§!"
 change_approach_will_temporarily_lock: "§Sこのアプローチを採用すると、 他のアプローチは§Y$@voidworm_plague_approach_cooldown_years|0$年間ロック§!される。§!"
 too_early_to_change_approach: "§S状況アプローチは変更するには早すぎる。§!"
 voidworm_crisis_eradicate_chain_title: "$NAME_Voidworms$の根絶"
 voidworm_crisis_eradicate_chain_desc: "銀河におけるボイドワームの個体数は維持不可能なレベルに達しており、 根絶しなければならない。\n\n破壊しなければならない残った§Yボイドワームの巣§!の位置をすべて特定した。"
 voidworm_system_poi_title: "[prev.GetName]を破壊"
 voidworm_system_poi_desc: "この星系内で§Yボイドワームの巣§!を検知した。\n\n破壊して、 更に多くの寄生生物の誕生を阻止するべきだ。"
 #Voidworms Plague Crisis Random Events #
 grand_archive.2400.name: "余分のコンポーネント"
 grand_archive.2400.desc: "$NAME_Voidworms$対策における我々の艦隊支援の強化により、 メンテナンス手順の改善により予期せぬ追加コンポーネントが生じた。 これらの材料を、 新しい艦隊の短期生産の改善に投資する機会がある。"
 grand_archive.2400.a: "強化に投資する。"
 grand_archive.2400.b: "備蓄を維持する。"
 grand_archive.2405.name: "戦闘準備"
 grand_archive.2405.desc.default: "ボイドワームの脅威に対する継続的な準備が、 新たな世代の司令官を育て上げた。 経験豊富な[this.GetName]市民は、 この銀河的脅威を排除するために、 自らの力を貸すことにした。"
 grand_archive.2405.desc.gestalt: "ボイドワームの脅威に対する継続的な準備により、 司令官クラスのリーダーシップノードを更に多く生産することが可能になった。 艦隊への追加支援により、 これらの戦闘系ノードには軍事努力への迅速な統合を促進するために、 より多くの資源が投入されている。"
 grand_archive.2405.a: "素晴しい。"
 grand_archive.2405.tt: "§H$RECRUITABLE_LEADERS$§!を更新し、 追加レベルを持つ§H司令官§!を3人追加する。"
 grand_archive.2410.name: "前線の展開"
 grand_archive.2410.desc.default: "[random_shipyard.GetName]に駐留するエンジニアが、 艦船防御のための新しい設計図を開発した。 [random_shipyard.leader.GetHeSheCap]はボイドワームとの戦いにおいて、 定期的な修理を行っていたが、 その時[random_shipyard.leader.GetHeShe]は我々の船の耐久性を高める新しい部品のアイデアを思いついた。 そのアイデアが我々の研究部門に提示され、そのアイデアには大きな可能性があると思っている。"
 grand_archive.2410.desc.gestalt: "[random_shipyard.GetName]に常駐する修理用[root.GetIndividualName]が、 艦船の防御力を向上させる新たな研究のヒントとなった。 定期的な修理中のコミュニケーションミスにより、 [root.GetIndividualName]は独特な組み合わせの方法と素材を使用して、 新しい保護部品を作成した。 研究の可能性を調査した結果、 この偶然の発見は、 改良すれば非常に大きな可能性を持つことが示された。"
 grand_archive.2420.name: "[infected_leader.GetName]感染"
 grand_archive.2420.desc: "[infected_leader.GetHisHer]の任務において、 [infected_leader.GetName][infected_leader.GetHasHave]ボイドワームの胞子に感染してしまった。 幼生が誕生し、 宿主を破壊するまでもう長くはない。\n\n希望は薄いが、 医療スタッフは、 [infected_leader.GetHisHer]の神経系に完全に統合する前に幼虫を取り除くことができるかもしれないと推測している。 危険な手術だが、 [infected_leader.GetName]は試してみたいと思っているようだ。"
 grand_archive.2420.a: "駆除しろ。"
 grand_archive.2420.b: "幼虫を取り除け。"
 grand_archive.2425.name: "隔離違反"
 grand_archive.2425.desc.common: "感染した[infected_planet_pop.species.GetName]の少数が、 [infected_planet.GetName]の駆除から逃亡し、 我々の星系全域に分散した。 このまま放置すると、 ボイドワームによる感染が[this.GetName]全体に広がる可能性がある。"
 grand_archive.2425.desc.default: "$grand_archive.2425.desc.common$我々全員を危険にさらす前に、 逃亡した者を何とかしなければならない。"
 grand_archive.2425.desc.rogue: "$grand_archive.2425.desc.common$他のバイオトロフィーを危険にさらす前に、 逃亡した者を何とかしなければならない。"
 grand_archive.2425.desc.gestalt: "$grand_archive.2425.desc.common$集合体のすべてを危険にさらす前に、 逃亡した者を何とかしなければならない。"
 grand_archive.2425.desc.robot: "分析用に採取された感染した動植物のサンプルが、 なぜか典型的な食品として誤って処理されてしまった。 このミスにより、 大量の有機物がボイドワームの寄生に汚染され、 廃棄処分しなければならない。"
 grand_archive.2425.a.default: "追い詰めろ。"
 grand_archive.2425.a.default.tt: "所有する植民地の有機生命のPOP -1"
 grand_archive.2425.a.robot: "食糧貯蔵を燃やせ。"
 grand_archive.2425.a.robot.tt: "感染していないすべての惑星が$@infected_devastation|0$の荒廃度"
 grand_archive.2425.b: "何もするな。"
 grand_archive.2425.b.tt: "新たなボイドワームの幼虫が植民地の近くに現れるかもしれない！"
 grand_archive.2430.name: "職務怠慢"
 grand_archive.2430.desc: "感染者を駆除することが最善の策であることは誰もが認めるところだが、 多くの兵士たちは命令の遂行に苦慮している。 寄生生物であるボイドワームの危険性にもかかわらず、 多くの者は、 大儀のために同胞を排除することができない。\n\nボイドワーム感染が我々の植民地に広がるのを防ぐために、 何か手を打たなければならない。 駆除の一部を自動化することで、 必要とする兵士の数を減らすことができるかもしれない。 あるいは、 駆除努力の倫理基準を人々に伝え、 その必要性を再確認するための短期間の宣伝キャンペーンを実施することもできる。"
 grand_archive.2430.a: "駆除を自動化しろ。"
 grand_archive.2430.b: "PRキャンペーンを始めろ。"
 grand_archive.2440.name: "並行した躍進"
 grand_archive.2440.desc: "ボイドワームの疫病の治療法を求める研究は、 他の生物学分野の研究も並行して進展させた。 寄生虫は依然として現在の優先事項だが、 この新たな進展は今後の研究に多大な可能性をもたらす。"
 grand_archive.2445.name: "初期段階の実験"
 grand_archive.2445.desc.common: "ボイドワームの疫病に対する理解は深まり、 治療の基礎が開発された。"
 grand_archive.2445.desc.default: "$grand_archive.2445.desc.common$しかし、 生きた[owner_main_species.GetAdj]に対する初期段階の実験を行えば、 研究ははるかに速いペースで進展するだろう。\n\n倫理的な配慮はさておき、 より大きな利益のために、 いくつかの安全対策を回避することが賢明な場合もある。"
 grand_archive.2445.desc.gestalt: "$grand_archive.2445.desc.common$しかし、 実験には時間がかかる。 その主な理由は、 被験者となる何もしていない[root.GetIndividualNamePlural]が常に必要とされるためだ。 [root.GetIndividualNamePlural]を被験者に簡単に割り当てることができれば、 治療法の開発はより速いペースで進むだろう。\n\nその結果は集合体全体に波及し、 再配置された[root.GetIndividualNamePlural]が以前の役割を放棄して混乱となるだろう。"
 grand_archive.2445.a.default: "何も知らされていない[root.GetIndividualNamePlural]に実験しろ。"
 grand_archive.2445.a.gestalt: "実験を優先する。"
 grand_archive.2445.b.default: "志願者にのみ実験しろ。"
 grand_archive.2445.b.gestalt: "いつも通りの研究を続けろ。"
 grand_archive.2445.c: "非倫理的な実験はダメだ。"
 grand_archive.2450.name: "ボイドワームの腺"
 grand_archive.2450.desc: "ボイドワームの繁殖サイクルに、 ボイドワームの疫病に対する治療薬の合成に大きな進展をもたらすかもしれない特徴を発見した。\n\nこの仮説を検証するには、 野生$voidworms_titan$の生殖腺を採取して分析する必要がある。 重要なのは、 $voidworms_titan$が惑星を攻撃している最中に殺さなければ、生殖細胞を保存できないということだ。"
 grand_archive.2450.a: "そんな時間はない。"
 grand_archive.2450.b: "生殖腺を手に入れよう。"
 VOIDWORM_GLANDS_PROJECT: "トロイカの生殖腺"
 VOIDWORM_GLANDS_PROJECT_DESC: "我々は、 ボイドワームの疫病の治療法を求めて画期的な発見をした。 必要なのは、 繁殖能力のある状態にあるボイドワームトロイカの生殖腺だけである。"
 VOIDWORM_GLANDS_PROJECT_TOOLTIP: "§R惑星を攻撃中のトロイカの残骸を採取する。§!"
 VOIDWORM_TITAN_DEBRIS_PROJECT: "$NAME_Voidworms_Troika$の死骸"
 VOIDWORM_TITAN_DEBRIS_PROJECT_DESC: "このボイドワームトロイカの死骸は、 繁殖力の高い生殖腺を採取するために利用できる。\n\nこれらの器官は、 生物の生物学に対する我々の理解を大幅に拡大し、 ボイドワームの疫病を完全に根絶するのに役立つはずだ。"
 grand_archive.2455.name: "生殖腺回収"
 grand_archive.2455.desc: "繁殖力のあるボイドワームトロイカから採取した腺から、 彼らの繁殖サイクルに関する新たな情報が明らかになった。\n\n交尾の儀式を死ぬまで行う、 交尾する3匹のボイドワームは、 遺伝物質を互いに均等に分配し、 事実上完全に新しい生物となる。\n\n我々は、 遺伝子の可塑性というのを逆手にとって、 対抗することができる。"
 grand_archive.2500.name: "治療法の発見"
 grand_archive.2500.desc.default: "ボイドワームの寄生感染症に対する究極の治療法の開発を完了した。 我々の植民地はもはやボイドワームの胞子攻撃の影響を受けず、 銀河における彼らの存在を懸念する必要はなくなった。"
 grand_archive.2500.desc.tech: "$grand_archive.2500.desc.default$\n\n今回開発した治療法は、 ボイドワームが将来突然変異した場合でも、 問題がないと確信している。"
 #########################################
 #Voidworm Plague Crisis Galactic Focus #
 #########################################
 resolution_galactic_focus_crisis_voidworm_plague: "方針：ボイドワームの疫病"
 resolution_galactic_focus_crisis_voidworm_plague_desc: "寄生生物のボイドワームは銀河のあらゆる生物にとっての脅威だ。 協力して奴らを阻止しなければ、 我々は食い尽くされてしまうだろう。 この危機を銀河的関心事項として扱うべきだ。"
 resolution_galactic_focus_crisis_voidworm_plague_effect_success: "$resolution_galactic_focus_crisis_effect_success$"
 galactic_focus_crisis_voidworm_plague: "ボイドワームの疫病を倒せ"
 galactic_focus_crisis_voidworm_plague_desc: "ボイドワームの疫病は全銀河に対する脅威である。 我々は団結してこの脅威を打倒しなければならない。"
 gal_com_crisis_voidworm_pop_victims: "ボイドワームは、 自分たちの領域内の個体群に多大な被害を与えている。"
