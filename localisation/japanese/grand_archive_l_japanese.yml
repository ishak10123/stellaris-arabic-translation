 treasure_hunters_origin_story_chain_title: "不思議な星図に従う"
 treasure_hunters_origin_story_chain_desc: "謎めいた星への地図を発見した後、 我々は偉大な冒険に乗り出した。 §H$celestial_chart$§!の先に何があるか、 そして冒険でどんな危険が待ち受けているかは誰もわからない。"
 treasure_hunters_hidden_system_1_poi: "[prev.GetName]の調査"
 treasure_hunters_hidden_system_1_poi_desc: "古代の軌道カプセルで見つかった星図により、 隠された星系[prev.GetName]が明らかになった。 さらに詳しく知るには、 我々自身がそこへ行かなければならない。"
 treasure_hunters_explore_system_1_poi: "[treasure_hunters_hidden_system_1.GetName]の調査"
 treasure_hunters_explore_system_1_poi_desc: "§Y$NAME_BlackNeedle$§!を倒した今、 調査を進めることができる。§H$celestial_chart$§!がこの星系まで導いたということは、 星図の次の部分がここに隠されていると推測するしかない。"
 black_needle_fleet_poi: "ブラックニードル艦隊"
 black_needle_fleet_poi_desc: "[from.GetName]星系で高度に組織化された海賊の一団に襲われた。 海賊は§H$celestial_chart$§!を狙っており、 我々の到着を待っていた。"
 smeegibb_shelter_system_1_poi: "[prev.GetName]の調査"
 smeegibb_shelter_system_1_poi_desc: "§H$celestial_chart$§!は新たな隠された星系、[prev.GetName]を明らかにした。 そこへ向かい、 待ち受けるものを発見しなければならない。"
 smeegibb_shelter_system_2_poi: "[smeegibb_system.GetName]へ航行"
 smeegibb_shelter_system_2_poi_desc: "$NAME_Smeegibb$との通信を再開することができなかった。 次の§H$celestial_chart$§!への唯一の手がかりとして、 我々は状況を調査するために[smeegibb_system.GetName]に戻らなければならない。 突然の連絡途絶の理由は現在不明だ。"
 black_needle_fleet_2_poi: "$NAME_CaptainInax$を倒せ"
 black_needle_fleet_2_poi_desc: "§Y$NAME_BlackNeedle$§!は再び我々を追い詰め、 コンタクトの$NAME_Smeegibb$を殺害し、 [from.GetName]星系を封鎖した。 [smeegibb_shelter.GetName]の表面のどこかに§H$celestial_chart$§!の4つ目の断片が隠されていると考えている。\n\nカプセルを探すためには、 敵艦隊を撃破しなければならない。"
