 NAME_Reanimated_Cutholoids_Hatchling: "蘇生した$cutholoids_hatchling$"
 NAME_Reanimated_Cutholoids_Juvenile: "蘇生した$cutholoids_juvenile$"
 NAME_Reanimated_Cutholoids: "蘇生した$cutholoids$"
 pc_cutholoid: "$pc_asteroid$"
 pc_cutholoid_desc: "$pc_asteroid_desc$"
 resolution_cutholoid_eradication: "$cutholoids$の殲滅"
 resolution_cutholoid_eradication_desc: "文明社会の中で、 船を食い荒らすカサロイドが自由に存在することは許されるべきではない。 この生物は何としても駆逐しなければならない。"
 resolution_cutholoid_eradication_tooltip: "§Y$cutholoids_plural$§!が国境内にいる帝国は、 生物を駆除するまで§R銀河法違反§!と見なされる。"
 resolution_repeal_cutholoid_eradication: "§R$resolution_cutholoid_eradication$§!の廃止"
 resolution_repeal_cutholoid_eradication_desc: "[global_event_country.GetGalCommunityOrGalImperium]は、 カサロイドの根絶を義務付けるものではない。"
 resolution_repeal_cutholoid_eradication_effect_success: "§Y$resolution_cutholoid_eradication$§!を廃止する。"
 fcsum_cutholoids_1: "$fcsum_critters_1$"
 further_fc_cutholoids_completed: "$further_fc_amoebas_completed$"
 grand_archive.3103.name: "$resolution_cutholoid_eradication$"
 grand_archive.3103.desc: "[global_event_country.GetGalCommunityOrGalImperium]はすべてのカサロイドが加盟国の星系内で許可されなくなったことを宣言した。\n\nこの生物を発見したら、 排除しなければならない。 さもなければ[Root.GetName]は§R銀河法を違反§!していると見なされる。"
 grand_archive.3105.name: "[this.GetSpeciesName]の領域に$cutholoids_plural$が出現"
 grand_archive.3105.desc: "カサロイドが[from.GetName]星系で発見された。 危険な害獣であると正式に宣言されているため、 [global_event_country.GetGalCommunityOrGalImperium]の一員は、 国境内にいるカサロイドを安楽死させる法的義務がある。\n\nカサロイドを追いやるか、 駆除しない限り、 [Root.GetName]は§R銀河法に違反§!していると見なされる。"
 grand_archive.3107.desc: "カサロイドが我々の[invaded_system.GetName]星系内に存在し続けることは、 $resolution_cutholoid_eradication$決議の下では重大な§R銀河法違反§!である。 これにより、 [global_event_country.GetGalCommunityOrGalImperium]はその一員に、 [Root.GetName]に対する制裁措置の実施を投票で決定できるよう許可した。"
 grand_archive.3011.name: "行方不明の調査船"
 grand_archive.3011.desc: "[cutholoid_under_radar.solar_system.GetName]にある奇妙な小惑星を調査していた調査船との連絡が途絶えた。\n\n調査船が最後に確認された位置から微弱な緊急信号を検出しており、 行方不明の調査船を回収するなら、 さらに調査する必要がある。"
 grand_archive.3011.a: "まずいな。"
 grand_archive.3012.name: "小惑星状生物の発見"
 grand_archive.3012.desc: "§H[from.solar_system.GetName]§!の定期的な探索で、 またもや不思議な小惑星状の生物を発見した。\n\nこの危険な物体についてより詳しい情報を知るまで、 §H調査船§!はこの星系を避けたほうがよさそうだ。"
 grand_archive.3012.a: "調査を続けろ。"
 grand_archive.3016.name: "不快なサプライズ"
 grand_archive.3016.desc.default: "[fromfrom.GetName]の小惑星は、 内部に住んでいる巨大な生物の殻だったのだ。\n\n無事に破壊し、 [this.GetName]を救出した。 小惑星のさらなる調査には注意が必要だ。\n\nこのような生物がまだたくさんいて、 獲物を待ち構えているのかもしれない。"
 grand_archive.3016.desc.leader_killed: "$grand_archive.3016.desc.default$残念ながら、 [leader.GetName]は回復不可能な被害を被った。"
 grand_archive.3018.name: "獣の腹から"
 grand_archive.3018.desc: "§H[current_system.GetName]§!で行方不明になっていた調査船が戻ってきた！\n\n§H[leader.GetName]§!の報告によると、 調査船は小惑星の内部に潜む宇宙生物に丸ごと飲み込まれたらしい。 船体の強度が限界に達する寸前で、 突然安全な場所に放出されたとのことだ。 我々が介入する前に、 他の何かがその生き物を驚かせたようだ。\n\n小惑星帯の特定の領域については、 もう少し情報を集めるまで、 慎重なアプローチが必要である。"
 grand_archive.3018.a: "それは良かった。"
 grand_archive.3020.name: "失われた調査船"
 grand_archive.3020.desc: "[from.GetName]の緊急信号は止まった。 調査船[from.GetName]は恐らく永久に失われてしまったのだろう。"
 alert_mia_fleet_eaten_title: "$alert_mia_title$"
 alert_mia_fleet_eaten_instant: "小惑星を調査していた調査船との連絡が途絶えた。 調査船が最後に確認された位置から微弱な緊急信号を検出している。"
 cutholoid_discovered_chain_title: "[this.GetName]の回収"
 cutholoid_discovered_chain_desc: "[cutholoid_under_radar.solar_system.GetName]にいる調査船[this.GetName]との連絡が途絶えた。\n\n最後に受けた通信によると、 近くの小惑星、 [cutholoid_under_radar.GetName]で調査を始めるところだった。\n\nその星系に入る際は、 細心の注意が必要だ。"
 HIDDEN_CUTHOLOID_ATTACK_PROJECT: "小惑星の破壊"
 HIDDEN_CUTHOLOID_ATTACK_PROJECT_DESC: "小惑星の[cutholoid_under_radar.GetName]は何かを隠しているようだ。 かなりの軍事力をもって接近し、 調査船[this.GetName]が永遠に失われる前に回収を試みるべきだ。"
 HIDDEN_CUTHOLOID_CAPTURE_PROJECT: "小惑星の捕獲"
 HIDDEN_CUTHOLOID_CAPTURE_PROJECT_DESC: "小惑星の[cutholoid_under_radar.GetName]は何かを隠しているようだ。 適切な技術があれば、それを完全に捕獲し、 調査船[this.GetName]が永遠に失われる前に回収することができるはずだ。"
 grand_archive.2800.name: "偽小惑星"
 grand_archive.2800.desc: "§H[This.System.GetName]§!で見つけた小惑星は知性を持っているようだ。 そのような物体の軌道に接近することは非常に危険であり、 調査船これらの存在についてより詳しく知るまで、 その星系から直ちに離れるよう勧告されている。"
 grand_archive.2800.a: "調査を続けろ。"
 grand_archive.2900.name: "カサロイド"
 grand_archive.2900.desc: "我々は、 小惑星の内部に身を潜める宇宙生物を発見した。§H「カサロイド」§!と名付たこの生物は待ち伏せ型の捕食者で、 獲物を捕らえるために数年間も待ち伏せすることが可能なようだ。 艦船全体を飲み込むことができるため、 未調査の小惑星帯への接近は非常に危険であり、 細心の注意を払う必要がある。\n\n幸いこの生物は非常にまれな存在であり、 無性生殖には何百年もかかる。"
 grand_archive.2900.a: "この生物をもっと研究するべきだ。"
 grand_archive.2900.b: "待ち伏せ型捕食者か。すべて抹殺しろ。"
 grand_archive.2900.b.homicidal: "捕食者は獲物となる。"
 grand_archive.2905.name: "カサロイドの殻"
 grand_archive.2905.desc: "カサロイドの殻は鉱物だけで構成されているのではなく、 強力な生物繊維で補強されている。 これらの繊維は成長を止めることがなく、 一部の殻の組成は50パーセント以上がバイオマスであると推定されている。\n\nカサロイドが小惑星に対して大きくなりすぎると、 別の住処を求め、 再び統合プロセスを開始する。 通常カサロイドは縄張り意識が強いが、 主要な殻候補の軌道上で複数のカサロイドが存在する場合も観察されている。 最も大きいカサロイドは新しい小惑星を占領し、 他の生物は大きさによって順になり、次の小惑星へと争うことなく移っていく。 このようにして、 住処とする小惑星は、 数十匹の生物が以前占領していた可能性もある。\n\nその結果、 最も小さい小惑星は最も頻繁に交換されているため、 最も多くの生物学的強化が施されている。 これらの殻は、 科学的に大きな価値がある。"
 grand_archive.2905.a: "我々の宇宙動物を強化しろ。"
 grand_archive.2905.b: "艦船を改良しろ。"
