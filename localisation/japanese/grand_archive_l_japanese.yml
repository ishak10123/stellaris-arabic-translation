 #Space Fauna Description #
 ###########################
 space_amoeba_desc: "宇宙アメーバは単独で狩りを行う生物で、 かなり攻撃的である。 「鞭毛」と呼ばれる部分的に形成された産卵によって支えられ、 獲物を追いかけることに長けている。"
 tiyanki_desc: "ティヤンキは「宇宙クジラ」とも呼ばれ、　大気中のガスを餌にする大人しい生き物である。 ティヤンキは極めて協調性が高く、 野生の群れは厳格なヒエラルキーで構成されている。"
 voidworm_desc: "ボイドワームは寄生生物であり、 繁殖するには適切なバイオマスを持つ居住可能な世界に胞子を散布する必要がある。 成熟した個体は「トロイカ」と呼ばれ、 交尾する3匹のグループを形成し、 ブラックホールの近くに巣を作り、 保護しながら育てる。"
 cutholoid_desc: "カサロイドは、 柔らかい体を保護するために小惑星に生息する巨大な生物である。 この生物は獲物を丸ごと飲み込み、 放射性消化液を使ってゆっくりと消化する。"
 crystalline_entity_desc: "結晶生命体は、 ケイ酸塩でできた生物の一種であり、 空間を自由に移動できる。 それぞれの結晶生命体の色合いは、 年齢によるものではなく、 潜在的な内部電気で変化する。"
 wild_tiyanki_ox_modifier: "野生ティヤンキ・老体"
 fauna_disengagement_modifier: "宇宙動物戦闘離脱"
