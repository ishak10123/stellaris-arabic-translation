 futureshock_chain_desc: "我々は自然から与えられるもので妥協しない。 代わりに、 我々は有機的肉体の限界を越えられるよう奮闘する。 インプラントを全国に流通させた際に起きた問題はどれも小さく、 簡単に解決することができた。 国民の大半が新たなサイバネティクスが提供するものに胸をときめかせている。\n\n偉業達成までもう間もなくだ。 次に何が起こるかはまだわからない。"
