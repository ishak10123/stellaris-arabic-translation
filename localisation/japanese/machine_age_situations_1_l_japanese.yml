 concept_edict_hive_hyper_stimulants: "$edict_hive_hyper_stimulants$"
 edict_hive_mega_construction: "統合されたメガ建設"
 edict_hive_mega_construction_desc: "この布告で、メガエンジニアリングプログラムに追加の資源が割り当てられ、新しい銀河構造の建設が加速する。"
 concept_edict_hive_mega_construction: "$edict_hive_mega_construction$"
 #CYBERIZATION STAGE 1
 cyber.2100.name: "多数の肉体。 一つの目的。"
 cyber.2100.desc: "強化施術の本質について考えていると、 いつの間にか自分たちの野望について考えを巡らせてしまう。\n\nサイバー化は目的を達成するための手段、 肉体を最適化し、 我々の意志をより実行しやすくする方法の一つだ。 無限にある、 あらゆる形態の強化が可能であり、 そのどれもが新たな力を与えてくれるが、 足りない部分もある。 機械の手足は重く、 サイバー脳はより多くのエネルギーを必要とし、 繊細な部品には常にメンテナンスが必要である。 完全へと至るまでに、 ある選択をしなければならない。\n\n我々の野望の焦点は何だろうか？ その目標に[Owner.Species.GetFleshTypeCyberCreed]の限界を越え、 [owner.GetSpeciesHandName]の金属の手が天空まで伸びるようになることは必要だろうか？"
 cyber.2100.a: "知性だ。"
 cyber.2100.a.tt: "ドローンをより高知能にする研究に注力。"
 cyber.2100.b: "支配だ。"
 cyber.2100.b.tt: "ドローンを戦争の道具にする研究に注力。"
 cyber.2100.c: "豊富さだ。"
 cyber.2100.c.tt: "ドローンの生産性を高める研究に注力。"
 #CYBERIZATION STAGE 2
 cyber.2200.name: "一つの目標：強化"
 cyber.2200.desc: "何となく頭の中で考えていたことが具体的な計画となり、 ある差し迫った必要事項が生まれた。 サイバネティクスのプロトタイプを試験および製造可能な、 実験専用の空間だ。\n\n[Owner.Species.GetFleshTypeCyberCreed]を分解し、 それを金属と夢で作り直すことができるよう、 $building_augmentation_center$を建造しよう。"
 cyber.2200.a: "我々の未来を築く時だ。"
 cyber.2200.a.tt: "§Rアクションが必要：§!\n§Y$situation_cyberization_hive$§!の状況を再開するには$building_augmentation_center$を建設する。\n\n各$building_augmentation_center$が$job_augmentor_drone_with_icon$職業枠を§G+200§!付与する。\n\n$job_augmentor_drone_research_effect_desc$"
 cyber.2205.name: "多数のプロトタイプ。 一つの選択。"
 cyber.2205.desc: "サイバネティクスの研究は、 我々の検討に値する有望なサイボーグのプロトタイプを作り出した。 予備試験の結果では、 一部のプロトタイプは身体能力に優れ、 それ以外のものは精密作業に適していることがわかった。 それぞれに強みと制約があり、 どれ一つとして明らかに他より優秀なものはない。\n\n気が滅入るような案が頭に浮かんだ。 ドローンを多様化できないものだろうか？ 機能に応じて、 それぞれ異なる方法で機体の改造を行えないだろうか？ 我々はもはや同一の存在ではなくなる。 その可能性を理解するのは難しい。 しかし、 そうして得られる効率は我々の調和と引き換えにする価値があるかもしれない。"
 cyber.2205.a: "多様な複数のプロトタイプを選択。"
 cyber.2205.b: "一つの万能なプロトタイプを選択。"
 cyber.2220.name: "我々の一部？"
 cyber.2220.desc: "ドローン製造では、 時折、 欠陥のある機体が作られることがある。 不格好なドローンは通常廃棄されるが、 サイバネティック・インプラントのおかげで我々の仲間に加わることができる。 数が増えるのは素晴らしいことだが、 欠陥ドローンには問題の深刻度に応じた個別インプラントが必要だ。 集合意識の成長は促進されるが…… より不完全なものにもなる。"
 cyber.2220.a: "数の力だ。"
 cyber.2220.b: "不完全な集合意識は弱い。"
 cyber.2260.name: "ある不可視の問題"
 cyber.2260.desc: "少数の被験者が強化施術に対して拒絶反応を示している。 機体がインプラントを拒絶し、 命を脅かすほどの副作用が出ている。 以前には発見されなかったことだが、 原因はおそらく遺伝的欠陥だろう。 仮計算によれば、 影響を受けるドローンは全体のおよそ5%だ。\n\n問題を特定した今、 ドローンを検査し、 それを防ぐことができる。 しかし欠陥ドローンをどうしていいかはわからない。"
 cyber.2260.a: "欠陥ドローンを間引け。"
 cyber.2260.a.tt: "§Y1§!年間、 §Y$situation_cyberization_hive$§!の状況進捗速度：§G+20%§!"
 cyber.2260.b: "制限付きのインプラントを欠陥ドローンに装備しろ。"
 cyber.2260.b.tt: "サイバー化の最中、 全人口の5%が特性§Y$trait_cybernetic$§!ではなく、 特性§Y$trait_limited_cybernetic$§!を獲得する。"
 cyber.2260.c: "代替インプラントを研究しろ。"
 cyber.2260.c.tt: "§Y5§!年間、 §Y$situation_cyberization_hive$§!の状況進捗速度：§R-50%§!"
 #CYBERIZATION STAGE 3
 cyber.2300.name: "多数のドローン。 一つの計画。"
 cyber.2300.desc: "サイボーグのプロトタイプが承認され、§Y$building_augmentation_center$§!が建設された。計画の準備はできているが、 我々の変身に関わる物流管理はいまだ完成を見ていない。\n\nすべてのドローンに日々の活動を停止させ、 $building_augmentation_center$で改造を受けさせてもいいだろう。このやり方ならすぐに終わるが、完了するまで工場には誰もいなくなる。代わりに、ドローンたちの予定を合わせ、活動に影響が出ないように、義務付けられた休息期間中にサイボーグに改造することもできる。時間はかかるが、 このやり方なら問題は起きにくい。"
 cyber.2300.shared.tt: "$job_augmentor_drone_assembly_effect_desc$\n\n強化速度は状況アプローチと$building_augmentation_center$建造物の数に依存する。"
 cyber.2300.a: "サイバー化を最優先しろ。"
 cyber.2300.a.tt: "毎月のPOPのサイバー化：§G+200§!\n$situation_cyberization_hive_triggered_modifier$毎月の資源：§R-5%§!\n\n$cyber.2300.shared.tt$"
 cyber.2300.b: "秩序を乱すな。"
 cyber.2300.b.tt: "毎月のPOPのサイバー化: §R-100§!\n$situation_cyberization_hive_triggered_modifier$毎月の$unity$: §G+5%§!\n\n$cyber.2300.shared.tt$"
 cyber.2320.name: "一つを恐れる多数"
 cyber.2320.desc: "単一の存在で構成される帝国が、 我々の多様性を恐れ、 我々を怪訝の目で見ている。 サイバネティック・インプラントを用いれば、 我々の使節により特徴的な顔と人格を与え、 より非均質的な側面を見せることができる。\n\n非団結的存在ならその行動の真価が理解できるだろう。 もしかすると…… 我々を仲間と認識し、 我々に共感することもあるかもしれない。"
 cyber.2320.a: "不快だな。"
 cyber.2320.b: "価値ある犠牲だ。"
 cyber.2320.b.tt: "我々に対する非ゲシュタルト帝国の態度が上昇する。"
 cyber.2320.c: "使節たちを不安を感じさせるほど同一のものにしろ。"
 cyber.2320.c.tt: "我々に対する非ゲシュタルト帝国の態度が低下する。"
 cyber.2360.name: "一つの人々、 二つの集団"
 cyber.2360.desc: "集合意識のサイバー化は円滑に進んでいる。 一部の人々はサイバネティック・インプラントを持っているが、 その他はまだ完全に生身のままだ。 我々の間にそれほどまでに大きな違いがあったことはいまだかつてなかった。 ドローンたちは今、 どちらか一方の集団に属している。 そしてこの隔たりが個性という感覚を拡大しているのだ。\n\nドローンのなかには互いに見分けがつくよう、 小さなアクセサリーで自分を装飾し始めた者もいれば、 インプラントにシンボルを描く者もいる。 興味深いことだが、 不安を感じさせられる展開だ。"
 cyber.2360.a: "この流れを推し進めろ。"
 cyber.2360.b: "個人を識別できるものを禁止しろ。"
 cyber.2360.c: "個人的シンボルはリーダーだけのものにしろ。"
 #CYBERIZATION STAGE 4
 cyber.2400.name: "多数の考え。一つの脳。"
 cyber.2400.desc: "ドローンたちに神経インプラントを導入したことで予期せぬことが起きた。 脳の一部がサイバー化されたことで、 彼らは今や主意識から分離し、 個別に思考することができるのだ。\n\n我々はこの技術の開発をさらに進め、 ドローンの自律性思考能力を高めることができる。"
 cyber.2400.a: "ドローンたちに自分で考えさせよう。"
 cyber.2400.b: "個性は我々の団結力に対する脅威だ。"
 cyber.2420.name: "皆のための一つの終焉"
 cyber.2420.desc: "サイバネティック・インプラントが死の理を複雑化させている。\n\n停止したドローンからインプラントを回収すれば、 装置を再利用し、 廃棄物を減らすことができる。 この新たな一歩を可能にするには、 我々の廃棄物処理プロセスを全面的に見直す必要がある。 資源の費用は絶大だ。"
 cyber.2420.a: "インプラントをリサイクルしろ。"
 cyber.2420.b: "費用に見合わない。"
 cyber.2420.c: "インプラントをリサイクルしろ…… 機体もだ。"
 cyber.2460.name: "一生涯のインプラント"
 cyber.2460.desc: "現在の人々のサイバー化は着実に進んでいるが、 これから生まれてくる者たちをどうするかも考えておかなくてはならない。\n\n我々の技術を用いれば、 生まれる前に[owner.Species.GetSpawnNamePlural]にサイバネティック・インプラントを装着することができ、 これにより真のサイバネティック種族が誕生する。 素早く、 簡単で効率的な解決策だ。 一方、 予備研究によれば、 初期段階でインプラントを導入すると乖離や精神病、 震え、 様々な発達障害が引き起こされることがあるという。"
 cyber.2460.a: "金属は[Owner.Species.GetFleshTypeCyberCreed]より強い。"
 cyber.2460.b: "サイバー化の最少年齢を定めろ。"
 #CYBERIZATION FINISHED
 cyber.2004.name: "多数のドローン。一つの意志？"
 cyber.2004.desc: "変身は完了した。 サイバネティック・インプラントの試験、 試作、 精錬および改善、 導入が終わり、 我々の機体は完全なものになった。"
 cyber.2004.desc.volitional: "$cyber.2004.desc$\n\n今のドローンはより個別に思考する能力に長けている。 自由が増えれば、 新たな可能性も生まれる。"
 cyber.2004.desc.integrated: "$cyber.2004.desc$\n\n今のドローンはこれまで以上に団結している。 金属の鎖が精神の絆を強くするのだ。"
 cyber.2004.desc.neutral: "$cyber.2004.desc$\n\nこの過程で、 我々は変化の機会を目にした。 我々の団結は力である。 しかし、 自律性の高いドローンにも利点はある。"
 cyber.2004.end: "機体の進化に伴い、 我々の集合意識もさらに大きな存在になり得る。"
 cyber.2004.a: "意志的集合意識となる。"
 cyber.2004.a.tt: "$change_auth_tt$ ['concept_auth_cyber_hive_volitional']\n$unlock_edict_tt$['concept_edict_hive_mind_outreach']\n$unlock_edict_tt$['concept_edict_hive_mega_construction']\n$cyber.21.a.end$"
 cyber.2004.b: "統合集合意識となる。"
 cyber.2004.b.tt: "$change_auth_tt$ ['concept_auth_cyber_hive_integrated']\n$unlock_edict_tt$['concept_edict_hive_hyper_stimulants']\n$unlock_edict_tt$['concept_edict_hive_mega_construction']\n$cyber.21.a.end$"
 cyber.2004.c: "変わる必要はない。"
 cyber.2004.c.tt: "$cyber.21.a.end$\n$keep_auth_tt$ ['concept_auth_hive_mind']"
 ### Driven Assimilator Cyberization ###
 cyber.2010.name: "明白なる目的"
 cyber.2010.desc: "高度なサイバネティクスの出現により、 我々は究極の可能性を実現することができる。 これまで我々は表面をなぞったにすぎなかった。\n\n我々の専門性が高まり、 技術が向上するにつれて、 社会は確実に変わっている。 知的生命体の完全な同化が我々の運命である。\n\n抵抗は無意味だ。 銀河の心は我々が利用するのだ。"
 cyber.2015.name: "高度同化機械"
 cyber.2015.desc: "我々の有機生命体は、機械と融合することで完璧に近い状態に達した。高度なサイバネティクスを我々の文明の根底に組み込む時が来た。\n\nサイボーグの知力を合理化することで「集合体の記憶」を形作り、彼らが収集した体験を物流能力の向上に振り向けることができる。あるいは「神経コーラス」の創造を容易にすることによって、思考や感情的反応のバリエーションをより増やすこともできる。\n\nいずれにせよ、我々の未来に大きな影響を与えることは間違いない。"
 cyber.2015.a: "我々の精神を集めよう。"
 cyber.2015.a.tt: "$change_auth_tt$ ['concept_auth_memory_aggregator']\n\n£pop£ §H有機生命体POP§!の増加で得られる§Y資源§!がさらに増加する\n\n$unlock_edict_tt$['concept_edict_aggregated_memory']"
 cyber.2015.b: "コーラスに歌わせよう。"
 cyber.2015.b.tt: "$change_auth_tt$ ['concept_auth_neural_chorus']\n\n$unlock_edict_tt$['concept_edict_choral_harmony']"
 cyber.2015.c: "我々は今のままでいい。"
 cyber.2015.c.tt: "$keep_auth_tt$ ['concept_auth_machine_intelligence']"
 gov_memory_aggregator: "メモリー収集者"
 gov_memory_aggregator_desc: "同化した人々の知力を合理化することで「集合体の記憶」を形作り、あらゆる管理業務や物流業務を大幅に改善することができる。"
 auth_memory_aggregator: "メモリー収集者"
 auth_memory_aggregator_desc: "$gov_memory_aggregator_desc$"
 auth_memory_aggregator_tt: "£pop£ §H有機生命体POP§!の同化で得られる資源がさらに増加する。"
 gov_neural_chorus: "神経コーラス"
 gov_neural_chorus_desc: "思考のバリエーションを増やし、 幅広い感情的反応を可能にすることで、 美しいのと同時に力強い心の歌である「神経コーラス」の創造を容易にする。"
 auth_neural_chorus: "神経コーラス"
 auth_neural_chorus_desc: "$gov_neural_chorus_desc$"
 auth_driven_neural_chorus_tt: "サイボーグリーダーの開始レベル：§G+1§!$NEW_LINE$サイボーグリーダーの維持費：§G-25%§! $NEW_LINE$サイボーグPOPからの£unity£ $unity$：§G+0.1§!"
 concept_auth_memory_aggregator: "$gov_memory_aggregator$"
 concept_auth_neural_chorus: "$gov_neural_chorus$"
 edict_aggregated_memory: "収集されたメモリー"
 edict_aggregated_memory_desc: "同化した人々の記憶は、 激流のように流れ出す。 彼らの集合的な体験は我々のものだ。"
 edict_choral_harmony: "コーラルハーモニー"
 edict_choral_harmony_desc: "歌を作るにはハーモニーが必要だ。同化した我が人民の心を一つにしよう。"
 concept_edict_aggregated_memory: "$edict_aggregated_memory$"
 concept_edict_choral_harmony: "$edict_choral_harmony$"
