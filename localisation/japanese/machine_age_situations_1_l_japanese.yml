 ### AUTHORITIES ###
 #VOLITIONAL
 auth_cyber_hive_volitional: "意志的集合意識"
 auth_cyber_hive_volitional_desc: "すべてのドローンが個性を持っている。 どの考えも集団で検討すべき新たな観点だ。 無数の精神が形成する集合意識は、 単なる精神の寄せ集めではない。"
