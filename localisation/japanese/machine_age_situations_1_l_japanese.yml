 ### EVENTS ###
 cyber.social_consequences.tt: "現在進行中の§Yサイバネティック社会の変遷§!に影響を与える。\n\n" #Standard tooltip to indicate that the Individualism/Collectivism variables are changed
 #FIRST EVENT #
 #DEMOCRATIC
 cyber.505.name: "フューチャー・ショック"
 cyber.505.desc.gov: "人々の強化は、 効率化された製造プロセスと意思決定の賜物である。 我々独自の多数の意見は、 人々の懸念を解決するたびに認められてきた。 今や、 すべての§Y[root.GetSpeciesAdj]§!がこの人生を変えるインプラントの恩恵を平等に受け取ることができる。\n\n次の必然的一歩はこの技術の影響範囲を広げることだろう。 我々はこれを民主主義プロセスに利用すべきか、 あるいは経験同期によって労働者の質を向上させるべきだろうか？"
 cyber.505.desc.cor: "連携企業と共同の強化プロセスは成功裏に終わった。 インプラントは驚異的な能率で製造、 流通、 導入された。 §Y[root.GetSpeciesAdj]§!社会の様々な声を拾い上げ、 その当然の懸念事項に対処してきた。 活力を取り戻した今の我々であれば、 未来と向き合うことができる。\n\n政府は今、 次の一方を踏み出す準備ができている。 我々は技術の進歩を利用し、 民主主義プロセスの改善、 あるいは労働者のためにインプラントを同期させることが可能だ。"
 cyber.505.desc.ind: "政府役人の心配とは裏腹に、 インプラントの分散型流通モデルは功を奏した。 どの街角にも小さな診療所や医療サービス施設があり、 誰でも長距離の移動をすることなく強化施術を受けることができる。\n\n政府もまた、 前進する準備を進めなければならない。 我々はインプラントを利用し、 民主主義プロセスを強化するか、 あるいは我々自身や労働者のために経験の同期を行うことが可能だ。"
 cyber.505.a: "民主主義プロセスを強化すべきだ。"
 cyber.505.a.tt: "幸福度、 統合力、 特化の向上に注力。"
 cyber.505.b: "我々の精神を繋ぎ合わせなければ。"
 cyber.505.b.tt: "幸福度、 労働者の産出および安定度の向上に注力。"
 #OLIGARCHIC
 cyber.510.name: "権力再編"
 cyber.510.desc.gov: "この歴史的変化は、 従属者たちの間で混乱や不満が起きないよう、 社会の上流階級によってのみ理解され、 実行されるものだ。 §Y[Species.GetNamePlural]§!には政府支給のサイバネティック・インプラントが導入されている一方で、 我々はこのチップが可能にする、 かつてない可能性の探求を行う唯一無二の機会を得ている。\n\n我々は激しい競争が労働者をさらなる高みへ押し上げる社会を目指すべきだろうか？ あるいは睡眠中の脳の待機演算能力を利用すべきだろうか？"
 cyber.510.desc.cor: "政府の認可を受けた企業が日々進歩する生体チップの大量生産を行うなか、 我々はこの驚くべき社会の変化を最大限に利用する方法について、 意思決定を行わなければならない。\n\n我々は最も強い者だけが生き残る自然を模倣すべきか、 あるいは眠っている脳のまだ手つかずの潜在能力を育むべきか？"
 cyber.510.desc.ind: "良くも悪くも、 人々はサイバー強化ハードウェアの製造および流通においてその実力を発揮することを許され、 我々はその全体像とこの予期せぬ社会の変化を最大限利用する方法について自由に考えることができるようになる。\n\n我々は人々により高いノルマを達成させるべきか、 あるいは睡眠中に働いてもらうべきか？"
 cyber.510.a: "我々のちょうちん持ちになってもらおう。"
 cyber.510.a.tt: "幸福度を犠牲に、 生産力の向上に注力。"
 cyber.510.b: "睡眠の力を利用しろ。"
 cyber.510.b.tt: "さらなる資源を得るため、 派閥の利用に注力。"
 #DICTATORIAL
 cyber.515.name: "群衆支配"
 cyber.515.desc.gov: "我々の強化計画の最中、 安定力と支配を強める機会が何度かあった。 政府発行のインプラントを製造し、 それを人々に組み込む過程で、 我々に好都合な結果が得られるよう人々を導くアルゴリズムを秘密裏にインストールすることは容易い。\n\n監視および不正ツールを個人インプラントに追加することで我々の偵察範囲を拡大することも可能だが、 §Y[Ruler.GetTitle]§!の素晴らしい人格で大衆を操るコードをインストールすることも可能だ。"
 cyber.515.desc.cor: "提携企業が社会規模でサイバネティック・インプラントを製造、 流通、 導入する準備は整っている。 また、 来たるべきファームウェアのアップデートでは、 我々に唯一無二の機会が与えられる。\n\n我々は個人強化ハードウェアに秘密の監視ツールを仕込み、 問題のある人物を排除することができる。 あるいは、 §Y[Ruler.GetTitle]§!の意志を大衆に植えこむ人格オーバーライド機能を作り出すことも可能だ。"
 cyber.515.desc.ind: "総合病院、 小型商店、 そしてハッカーコミュニティは今、 人々の間にサイバネティック・インプラントを流通させ、 導入することができる状態だ。 しかし、 この心躍る新技術に対する我々の権力を完全に分散させてしまう必要はない。\n\n我々は特注インプラントを改造する際に秘密裏に監視ツールを仕込み、 問題のある人物を追跡することが可能だ。 あるいは、 §Y[Ruler.GetTitle]§!の意志が無意識下に人々を栄光へと導く人格オーバーライド・アルゴリズムをインストールすることも可能である。"
 cyber.515.a: "監視ツールを個人インプラントに仕込め。"
 cyber.515.a.tt: "帝国安定度と犯罪の減少に注力。"
 cyber.515.b: "人格オーバーライドの研究を。"
 cyber.515.b.tt: "労働者の生産力と移住に注力。"
 #IMPERIAL
 cyber.520.name: "フューチャー・ショック"
 cyber.520.desc.gov: "政府は大量の資源を注ぎ込み、 効率的に人々を強化してきた。 認可を受けた強化センターは昼夜を問わずインプラント施術を行い、 人々は適切な使用方法やメンテナンスについて講習を受けた。\n\n問題は、 インプラントの実際の価値が、 既に大きな影響力を持っている我々の統率力と、 我々の下で働く者たちを楽しませ、 気を紛らわせるための手段として利用することのどちらに集中させられるべきかということである。\n\n最高品質のインプラントを支配者層が利用できるようにすれば、 指導者たちは世代間で知識を保存し、 計り知れない安定をもたらすことができるようになる。 あるいは、 首都を繁栄させ、 流血を伴う最新のスポーツイベントにサイバー強化を受けたアスリートを参加させて娯楽を提供することも可能だ。"
 cyber.520.desc.cor: "正式に認可を受けた企業が業務指令を成し遂げた。 すべての人々がサイバネティック・インプラントによる強化施術を受け、 かつてない効率で労働することができる状態にある。\n\n問題はインプラントの実際の価値がどこに集中させられるべきかということである。\n\n最高品質のインプラントを支配者層が利用できるようにすれば、 指導者たちは世代間で知識を保存し、 計り知れない安定をもたらすことができるようになる。 あるいは、 首都を繁栄させ、 流血を伴う最新のスポーツイベントにサイバー強化を受けたアスリートを参加させて娯楽を提供することも可能だ。"
 cyber.520.desc.ind: "帝国役人の多くの懸念に反して、 サイバネティック・インプラントの分散的流通と導入は功を奏した。 人々に強化施術を施すため、 惑星全土の複数の小型クリニックが休みなく働き続けている。\n\n問題はインプラントの実際の価値がどこに集中させられるべきかということである。 これの意味するところは、 世代間インプラントによる帝国の知識の保存か、 あるいは、 かつてどの眼球インプラントでも見ることができなかったような、 サイボーグによる流血を伴うスポーツを大衆に提供することだ。"
 cyber.520.a: "帝国の知識を保存しろ。"
 cyber.520.a.tt: "帝国の統治者に注力。"
 cyber.520.b: "大衆に娯楽を提供しろ。"
 cyber.520.b.tt: "首都惑星の生産性と幸福度に注力。"
 #CORPORATE
 cyber.525.name: "インプラント企業"
 cyber.525.desc.gov: "広範囲ながらも効果のない政府のインプラント計画が間もなく完了し、 我々はこの前例のない製品の発表に関連する収入源のさらなる拡大の機会が得られる。 分析チームによれば、 可能性のある収入源は2つ。 どちらにもそれぞれリスクと報酬がある。\n\n政府はこれ以降のすべての眼球インプラントに広告を入れることを要請すべきか、 あるいは強化施術を受けた人々を定期的にアップグレードすることを義務付けるべきか？"
 cyber.525.desc.cor: "インプラントの生産および導入は、 我々の高度に最適化された企業インフラの予測と同じ効率で進行している。 この新たなインプラントのビジネスチャンスは実質、 無限にある。\n\n特に見込みの高い収入源が2つある。 互いに相容れないものではあるが、 どちらもとてつもない利益幅を持っていることが見込まれている。\n\n問題は、 我々はこれ以降のすべての眼球インプラントに広告を入れることを要請すべきか、 あるいは強化施術を受けた人々を定期的にアップグレードすることを義務付けるべきかということである。"
 cyber.525.desc.ind: "当然のことながら、 サイバーウェアの場当たり的な「地域社会的」導入が、 その苦しみから解放され、 終わりを迎えようとしている。 我々は今、 この期待される新技術の方向性に影響を与え、 その過程で製品利益率を向上させる機会に恵まれた。\n\nこれ以降のすべての眼球インプラントに広告を入れるべきか、 あるいはソフトウェアおよびウェットウェアを継続的にアップグレードすることを義務付けるべきか？"
 cyber.525.a: "広告付き眼球インプラントを試作せよ。"
 cyber.525.a.tt: "交易の増加とビジネスチャンスのコスト減少に注力。"
 cyber.525.b: "インプラントのアップグレードの計画を練れ。"
 cyber.525.b.tt: "生産性方針、 諜報および快適度維持費に注力。"
 ### EVENT POOL ###
 cyber.610.name: "即時の幸福"
 cyber.610.desc: "脳を刺激し、 神経伝達化学物質を自在に生成させる不正な改造インプラントが労働者の間で広まっている。 これには強烈な快楽を与えたり、 痛みに対する抵抗力を向上させたりと、 様々な用途がある。 不正インプラントのリバースエンジニアリングを行い、 安全なものを作るには多大な投資が必要だ。 加えて、 刺激作用はいずれ必ず弱まる。\n\n我々は商用版を製造すべきか、 非正規のプロトタイプを作り変えるべきか、 あるいは単にその使用に規制をかけるべきか？"
 cyber.610.a: "安全なインプラントを作れ。"
 cyber.610.b: "非正規のプロトタイプを盗用しろ。"
 cyber.610.c: "こうした改造品に規制をかけろ。"
 cyber.615.name: "仕事と生活の分断"
 cyber.615.desc: "仕事中に得たあらゆる経験を、 仕事をしていないときにはアクセスできないサイバー脳のメモリー領域に保存することを要請する企業が増えてきている。\n\n企業らは、 こうした機能は企業スパイ活動を防ぐために特に機密性の高い業務にしか使用しないと主張している。 従業員たちに仕事中は個人的な経験を隔離し、 個人の倫理観が生産性に影響を与えるのを防ぐことを要求する企業もある。"
 cyber.615.a: "その管理はすべて人々がすべきだ。"
 cyber.615.b: "仕事は職場でだけするのが健康的だ。"
 cyber.615.c: "仕事中は個人的な経験を隔離しろ。 逆も然りだ。"
 cyber.625.name: "予約購入型の収益化"
 cyber.625.desc: "サイバーウェアが我々の生活と密接に関わっている今、 収益化モデルの変化は社会全体に大きな影響を与える。 昨今では、 インプラント製造会社が予約購入モデルの重要機能をロックしてしまう傾向がある。 支払いが遅れれば、 突如としてサイバー化された手足がロックされ、 光学機器がダウンする。 消費者団体はこうした慣行に歯止めをかけるよう我々に呼びかけてきている。"
 cyber.625.a: "サイバーウェアの予約購入を禁止しろ。"
 cyber.625.b: "買う余裕がないのなら、 買うべきではない。"
 cyber.625.c: "予約購入の対象範囲を必要不可欠でない機能に絞れ。"
 cyber.625.d: "名案だ！ もっとやれ。"
 cyber_subscription_ban: "禁止されたサイバーウェア予約購入"
 cyber_subscription_ban_desc: "我々は予約購入への課金を理由に、 サイバーウェア製造者がインプラントの機能をロックすることを防いだ。"
 cyber_subscription_limited: "制限付きサイバーウェア予約購入"
 cyber_subscription_limited_desc: "我々は予約購入への課金を理由に、 サイバーウェア製造者がインプラントの主要機能をロックすることを防いだ。"
 cyber_subscription: "§Y$trait_cybernetic$§!の種族特性に以下の補正を追加：\n$t$幸福度：§R-5%§!\n$t$['concept_planet_traders']の$BONUS_WORKFORCE_FOR$ ：§G+25%§!"
 cyber_subscription_megacorp: "§Y$trait_cybernetic$§!の種族特性に以下の補正を追加：\n$t$幸福度：§R-5%§!\n$t$['concept_planet_traders']の$BONUS_WORKFORCE_FOR$：§G+50%§!"
 cyber.655.name: "不測の機械事故"
 cyber.655.desc: "サイバーウェアのエンジニアたちが我々にビジネスの話をもちかけてきた。 インプラントの耐久力をほんのわずか落とせば、 ユーザーは主要パーツを交換しなければならなくなるため、 利益を大幅に向上させることが可能であるという。\n\n最も損耗しやすい部位に低品質の生体合金を使用することで、 消費者への害を最小限に抑えながらも交換を必要とするような形でインプラントが故障するはずだ。"
 cyber.655.a: "言語道断だ！"
 cyber.655.a.tt: "市民に低品質な部品を提供することはない！\n\n"
 cyber.655.b: "面白い。 もっと脆弱なサイバーウェアを作れ。"
 cyber.655.c: "よし！ 価格も引き上げて計画の調整を行おう。"
 cyber.655.d: "このデータを使ってサイバー化活動を改善しよう。"
 worse_parts: "劣化パーツ"
 worse_parts_desc: "我々は市民に意図的に劣化サイバネティック部品を供給することにした。 これはつまり、 交換パーツの購入回数が増えるということだ。"
 worse_parts_effect_tt: "§Y$trait_auto_mod_cyborg$§!特性を持つ$pop_group_unit$ £pop£ §HPOP§!あたりの$r_trade$：§G+0.5§!"
 optimized_parts: "最適パーツ"
 optimized_parts_desc: "我々はサイバネティック部品の革新および改善を続け、 その導入プロセスをより素早くより簡潔なものにした。"
 optimized_parts_effect_tt: "§Y$trait_auto_mod_cyborg$§!特性のある£pop£ §HPOP§!のための$r_energy$維持費：§R+0.1§!"
 cyber.660.name: "不測の社会的失敗"
 cyber.660.desc: "どうやら市民は我々の主導権が陳腐化したことを見抜いたようだ。\n\n街はサイバーウェアの品質および価格が最近変化したことに憤慨する[Owner.GetSpeciesNamePlural]で溢れ、 彼らは製品を元の状態に戻すよう我々に強く要求してきている。"
 cyber.660.a: "わかったよ。 少し強欲すぎた。"
 cyber.660.b: "何だって？ 聞こえないな！"
 cyber.660.c: "そうする必要はないが……"
 discontent: "不満"
 discontent_desc: "市民は昨今のサイバーウェアの価格上昇と品質低下のことで騒ぎ立てている。"
 cyber.805.name: "保護者による管理"
 cyber.805.desc: "脳インプラントが新生児に組み込まれたことで、 保護者たちはさらなる子供の管理能力を求めている。 現在、 モーター機能を乗っ取る能力は法執行機関が有するものだが、 こうした権利を保護者にも拡大することを望む声もある。\n\nこれは肉体自律性の明らかな侵害である一方で、 別の形での保護者による強制操作は既にいくつか認可されている。 あるいは、 素行の悪い子供の動作を遅れさせたり、 声量を落とすといった制限付きの管理能力を許可することも考えられる。"
 cyber.805.a: "大人に子供を管理させよう。"
 cyber.805.b: "制限付きの管理能力を認めよう。"
 cyber.805.c: "遠隔の肉体操作は法執行機関の権限だ。"
 cyber.810.name: "知識移植"
 cyber.810.desc: "脳のサイバネティック・インプラントの開発は我々に絶好の機会を与えてくれる。 主観的で時間のかかる教育方法に依存する代わりに、 我々はある脳から別の脳へ重要な知識を直接移植することが可能だ。 無菌の実験室があることが必要条件だが、 それゆえに大規模に悪用されることはない。 また、 受け取った情報は受容者の同種の記憶の一部を上書きする。\n\n最も影響力の強い応用方法は科学者同士で知識を共有することだろう。 これはサイバー化プロセスの技術的負債を一部相殺するか、 あるいは他分野への注力も可能である。"
 cyber.810.a: "工学の知識を移植する。"
 cyber.810.b: "物理学の知識を移植する。"
 cyber.810.c: "社会学の知識を移植する。"
 cyber.810.d: "知識移植は行わない。"
 cyber.815.name: "分散化した愛"
 cyber.815.desc: "多くの[root.GetSpeciesNamePlural]が市販のサイバネティック製品を使用して、 進んで日々の生活や人間関係を改善してきた一方で、 とりわけ、 複数のパートナーを持つ家庭が特注ハードウェアを用いてプライベート・ネットワークに接続することを好み、 その数は増加傾向にある。 こうした家庭的集団は特別な隔離状態で生活することを選び、 互いの感情や経験を他にはない親密さで共有し合ってきた。\n\n一部の社会福祉団体や学者はこの現象を称賛し、 誰もが人間関係や家族の絆の特注強化の恩恵を得られると提言している。 他にはより広い社会から離れることへの懸念の声や、 そうした慣習により、 その人々が小型化された「愛の形態」に没頭しきってしまう恐れがあるとさえ言う者たちもいる。"
 cyber.815.a: "彼らがどう生きて、 どう愛そうが我々には関係ない。"
 cyber.815.a.tt: "特注ハードウェアとプライベートなデジタル空間へのアクセスを今後も許可する。"
 decentralized_families: "分散化した家族"
 decentralized_families_desc: "特注のソフトウェアと強化パーツを使用することで、 あらゆるタイプの家庭内の関係が深まる。"
 cyber.815.b: "これらの家族を仲間たちのもとへ。"
 cyber.815.b.tt: "より厳しい規制をかけて問題を解決するため、 特注強化パーツの使用を阻止する。"
 centralized_families: "中央集中化した家族"
 centralized_families_desc: "サイバネティック強化およびソフトウェアを厳しく管理することで、 各家庭がデジタルの壁に守られた庭園を築くことを阻止する。" #as in a richly decorated but enclosed space
 cyber.820.name: "過激な姿"
 cyber.820.desc: "[root.GetSpeciesAdj]の歴史上、 外部のサブカルチャーは存在していたが、 サイバネティック強化の出現に伴い、 状況が変わった。 過激派集団が[root.GetSpeciesAdj]に見えなくなるほどまでに自身の姿を変え始めたのだ。 特に、 フルカスタムされた[root.GetSpeciesHandNamePlural]や3Dボディアート、 その他の付属の装飾品を欲しがる若者たちが、 大きな世代間のあつれきを生んでいる。\n\n支持者たちの主張によれば、 彼らはより本当の自分に近い姿を選び、 [root.GetSpeciesAdj]の均質性を放棄することで、 単に自分の人生における行為主体性を行使しているだけであるという。 こうした考え方は事態に懸念を抱く保護者や社会評論家の支持を得ておらず、 その数は増加傾向にある。 彼らはこうした人々を我々の社会を破滅させる異端者だと非難している。"
 cyber.820.a: "肉体改造に対して、 より厳しいガイドラインを設けろ。"
 cyber.820.b: "単にそういう時期なだけだ。 いずれ終わる。"
 radical_image: "過激な姿"
 radical_image_desc: "この社会の若者は自身の姿を大胆に変えようとする。"
 cyber.820.c: "この若者たちから学べることもあるかもな。"
 radical_insights: "過激な知見"
 radical_insights_desc: "反文化的肉体改造社の例にならって、 この社会は新しいタイプの美的強化施術により自身の姿を変えようとする。"
 cyber.821.name: "過激な抗議活動"
 cyber.821.desc: "不安を抱く若者や活動家、 芸術家などが数千人規模で集まり、 自由なサイバネティック強化を要求している。 抗議者たちは典型的な[root.GetSpeciesNamePlural]から、 カスタムされた手足、 変形した胴体を持つ者や異星人の姿をしている者など様々だ。 彼らは皆、 個人的に選んだサイバネティック装飾が原因で差別を受けている[root.GetAdj]市民との団結を宣言している。"
 cyber.821.a: "我々の決心は揺るがない。"
 cyber.821.a.tt: "サイバネティクスに関しては今後も集産主義的アプローチを維持する。"
 radical_image_denied: "否定された過激な姿"
 radical_image_denied_desc: "サイバネティック強化を通じた、 自由表現の権利に関する昨今の抗議活動が過激化した。"
 cyber.821.b: "彼らの要求を検討しよう。"
 cyber.821.b.tt: "サイバネティック強化に関して、 人々に幾分か自由な選択権が与えられる。"
 radical_image_upheld: "支持された過激な姿"
 radical_image_upheld_desc: "昨今の抗議活動により、 視覚的サイバネティック強化を通じた、 自由表現の権利が確保された。"
 cyber.822.name: "過激な生理学"
 cyber.822.desc: "過激で独特なサイバネティック強化を受けた患者を治療する際、 かつてない奇妙な困難に直面すると医療従事者から不満の声が上がっている。\n\nこうした細かい肉体改造を受けた人々は、 たとえ軽い症状であっても、 カスタム医療器具を使用したり、 完全に肉体を分解したりといった特別な治療が必要となる。 そうした処置の費用は肉体改造を受けていない、 非[root.GetSpeciesAdj]の患者の関連費用を大きく上回る。"
 cyber.822.a: "その費用は理に適ったものだ。"
 cyber.822.b: "そこまでの改造を許可したのは間違いだった。"
 #Cold Metal
 cyber.830.name: "震え"
 cyber.830.desc: "寒気にさらされると痛みを感じると、 一部の強化人間から報告を受けている。 特に、 氷点下が当たり前である§H[cold_planet.GetName]§!での事態は深刻である。\n\n金属インプラントは低温状態でうまく機能しないことが知られているが、 これほどひどい反応は引き起こされるべきではない。 事態は我々の労働力に影響を与えている。"
 cyber.830.a: "医療の研究を依頼しろ。"
 cyber.830.b: "彼らの苦しみは我々の責任ではない。"
 cyber.830.tooltip: "§Y$trait_cybernetic$§!の種族補正に以下の補正を追加：$TABBED_NEW_LINE$高山/極寒/ツンドラ居住性：§R-20%§!"
 COLD_METAL_PROJECT: "冷たい金属"
 COLD_METAL_PROJECT_DESC: "極寒地域に住む人々から、 サイバネティック・インプラントに起因する強い痛みを感じる症例の報告を受けている。 臨床試験でさらなるデータが集まるだろう。"
 cyber.835.name: "医療報告"
 cyber.835.desc: "臨床試験ではサイバーウェアの寒気への曝露と、 対象患者の年齢、 性別、 職業およびインプラント種別との決定的な関連性を特定することはできなかった。\n\n一部の医療専門家は痛みは心因性のもので、 治療は鎮痛剤の投与と行動療法にとどめるべきだと主張している。 それ以外の者たちからは、 この問題を過小評価せず、 投資を行い、 治療の選択肢を増やすよう強い要求を受けている。"
 cyber.835.a: "痛みは彼らの妄想だ。"
 cyber.835.b: "研究プログラムを策定しろ。"
 cyber.835.c: "対象者を温暖な惑星へ移住させろ。"
 cyber.835.tooltip: "§Y$trait_cybernetic$§!の種族補正の以下の補正を削除：$TABBED_NEW_LINE$高山/極寒/ツンドラ居住性：§R-20%§!"
 cyber.840.name: "心が我々を導く場所"
 cyber.840.desc: "我々はいつも旅人だった。 遊牧民、 放浪者だった。 目的地に達するための手段である旅もあるが、 我々にとって旅こそが目的地だ。 肉体強化によって、 新惑星に辿り着くことがより簡単になった。 しかしそれは同時に、 仲間からはぐれる者たちの追跡も可能にした。 この変化をすべての人々が喜んでいるわけではない。\n\nインプラントを改造し、 プライバシー保護のため、 レーダーの捕捉から逃れる人々が増えている。 今のところはごく一部の間での流行だが、 問題になる可能性もある。"
 cyber.840.a: "彼らが正しい。 追跡技術を禁止しろ。"
 cyber.840.b: "心配することはない。"
 cyber.840.c: "追跡不可能なインプラントを提供しろ…… タダではないがな。"
 cyber.840.d: "反対する者たちを抑え込め。 追跡技術は手放さない。"
 cyber_wanderers: "不休の放浪者"
 cyber_wanderers_desc: "追跡は困難だが、 どこにでもいる。"
 cyber_wanderers_tracked: "リードにつながれて"
 cyber_wanderers_tracked_desc: "我らの人々は自由を愛し、 あらゆる追跡技術に猛反対する。"
 cyber.855.name: "基準達成" #Idiom: if you achieve a required score, you 'make the grade'; similar to 'make the cut'
 cyber.855.intro.desc: "神経の再形成を促す認知マイクロ・プロセッサー、 強化A.I.教師、 デザイナー酵素。 これらはすべて就学前の子供たちのためだけに用意されたものだ。"
 cyber.855.gov.desc: "$cyber.855.intro.desc$\n\n技術的変化と足並みを揃えることが、 国が支援する教育プログラムの重荷になっている。 一般強化施術に依存する者たちと、 最新技術を購入する余裕のある家庭の間の性能差が拡大を続けている。\n\n公平な制度を維持するには、 5年間の多大な資源の投資が必要になる。"
 cyber.855.corp.desc: "$cyber.855.intro.desc$\n\n良い教育には金がかかることがある。 後れを取らないようにすることがますます難しくなってきていると多くの者が感じている。 最新の強化パーツを購入する余裕のある家庭と、 中古あるいは複製品の旧式モデルに頼らざるを得ない者たちとの性能差は拡大を続けるばかりだ。\n\nこれ以上の社会の階層化を防ぐため、 教育制度における5年間の多大な投資が必要だ。"
 cyber.855.a: "あまりにコストが高すぎる。"
 cyber.855.b: "教育は誰もが享受できるものでなければならない。"
 cyber_education: "強化された教育"
 cyber_education.tt: "我々は完全強化された安定の教育制度を奨励する、 5カ年計画を開始する。"
 cyber.860.name: "平等主義の優越"
 cyber.860.desc: "我々の教育強化への投資は大きく報われた。\n\n高品質なサイバネティクスを一般的に利用できるようになったことで、 社会階級によらず、 誰もが最大限に力を発揮できる真の能力主義社会が創り出された。 その恩恵は科学分野で特に著しく、 研究成果と革新が全面的に改善された。"
 egalitarian_excellence: "平等主義の優越"
 egalitarian_excellence.tt: "良い教育を受け、 最大強化された人々が社会的および物質的進歩の鍵である。"
 cyber.865.name: "並外れたリーダー"
 cyber.865.desc: "公的資金による教育強化から手を引く決断は賢い選択だったようだ。\n\n我々の社会は、 個人の優秀さを信じる社会だ。 「社会的格差」が拡大するという批判は時々あったが、 学力競争により、 銀河一の教養を持ち、 銀河一の利益を生むリーダーが誕生した。"
 exceptional_leaders: "並外れたリーダー"
 exceptional_leaders.tt: "とびきりの才能を個人レベルで育むことで、 並外れた能力を持つリーダーへのパイプラインができた。"
 cyber.1005.name: "リミット・ブレイカー"
 cyber.1005.desc: "「[Species.GetName]の記録がまたも破られる」 - このヘッドラインは[Owner.GetAdjective]のスポーツ人生において当たり前のものになってきた。 [GetAthletePlural]がより新しい、 より洗練された肉体改造で互いに切磋琢磨するなか、 アスリートたちのパフォーマンスの限界は常に押し上げられてきた。\n\n「強化アスリート」のファンたちがそうした結果に喜ぶ一方で、 強化人間を別部門で争わせることを望む熱狂的な信奉者の数が増えてきている。 その他には、 チームイベントで競う強化人間の数を制限し、 生身の[GetAthletePlural]が常に注目を浴びれるよう求める人々もいる。"
 cyber.1005.a: "未改造の者たちはもう十分楽しんだ。"
 cyber.1005.a.tt: "革新を後押しするため、 改造プレイヤーを奨励しろ。"
 cyber.1005.b: "強化選手は強化選手だけのリーグに参加させろ。"
 cyber.1005.c: "改造[GetAthletePlural]の数に制限をかけろ。"
 cyber_athletes: "サイバネティック・アスリート"
 cyber_athletes_desc: "スポーツにおける改造アスリートを奨励することで、 テスト段階のサイバーウェアの実地試験を行える。"
 cyber_athlete_leagues: "サイバネティック・アスリート・リーグ"
 cyber_athlete_leagues_desc: "「生身」の選手と強化選手を分けることで、 誰もが公平に競い合えるようになる。"
 limited_cyber_athletes: "限定的サイバネティック・アスリート"
 limited_cyber_athletes_desc: "改造アスリートの数を制限することで、 どのチームも勝利のチャンスに恵まれる。"
 athlete_plural: "アスリート"
 cyber.1010.name: "セール：上空"
 cyber.1010.desc: "§Y[sky_megacorp.GetName]§!から儲け話を持ちかけられた。 彼らは最新製品、 「プラズマ・クエンチ」という名前のエナジードリンクの宣伝をしたがっている。\n\n同製品の広告は、 上空を見上げた際に市民の眼球インプラントに直接投影される。 得られた収益は他の色々な市販品のために使用してもいい。\n\n広告の侵略的性質はさておき、 我々は飲み物自体は美味しく、 中毒性がまったくないことを確認した。"
 cyber.1010.a: "プラズマ・クエンチ！" #Feel free to localize Plasma Quench to sound like a slimy energy drink. No need to make it word for word.
 cyber.1010.b: "上空は売りに出してない！"
 cyber.1010.c: "条件の交渉をしよう。"
 cyber.1010.d: "興味はない。"
 cyber.1015.desc: "§Y[sky_megacorp.GetName]§!が、 銀河中で大ヒットしているエナジードリンク、 プラズマ・クエンチの件で新しい案を引き下げて戻ってきた。 強化人間の上空の眺めを販売したことがうまくいったため、 現実世界でも追加の広告を出したいと要求してきたのだ。\n\n「[most_populous.GetName]は広告を出すのに最高の立地です！」そう[sky_megacorp.GetName]は声を上げた。 つまるところ、 誰もがそうした素晴らしい機会を得られること以上に公平なことはないのではないだろうか？"
 cyber.1015.a: "プラズマの流れのままに！"
 cyber.1015.a.tt: "§Y[most_populous.GetName]§!中に巨大広告を追加しろ。"
 cyber.1015.b: "デジタルの空だけで十分だ。"
 cyber.1015.c: "人々が再び自由に景色を見られるようにしよう！"
 sold_sky_1: "デジタル広告板"
 sold_sky_1_desc: "市民の仮想的景色を売却することは良い決断だった！"
 sold_sky_1_mega: "$sold_sky_1$"
 sold_sky_1_mega_desc: "$sold_sky_1_desc$"
 sold_sky_2: "惑星広告板"
 sold_sky_2_desc: "この惑星の精鋭層はさらなる資源獲得のため、 市民の上空を売却する選択をした。"
 sold_sky_2_mega: "$sold_sky_2$"
 sold_sky_2_mega_desc: "$sold_sky_2_desc$"
 cyber.1030.name: "不法メモリー"
 cyber.1030.desc: "多くのインプラントが感覚および感情的経験を制御できるようになり、 強化人間たちは仮想世界の出来事に現実逃避や娯楽を求めるようになった。 理論的には、 痕跡記憶の形成能力に優れていればどんな感情でも刺激することができるが、 その雲行きが怪しくなってきた。\n\n痕跡記憶クラブは結婚式や交配儀式といった自主記録された、 強力な感情的経験を高く評価しているが、 そのなかには自殺、 暴行、 殺人なども含まれているのだ。 これにより、 犯罪件数が増加している。 犯罪者たちが自身の犯行の様子を記録するだけでなく、 トラウマ的経験を植え付けた後に被害者のインプラントを盗んでいるからだ。\n\nこの不安を感じさせる傾向にどう対処すべきだろうか？"
 cyber.1030.a: "該当産業を潰せ。 危険すぎる。"
 cyber.1030.a.tt: "痕跡記憶による娯楽を非合法化する。"
 cyber.1030.b: "製品製造に税金を課せ。"
 cyber.1030.b.tt: "痕跡記憶による娯楽を収入源として利用する。"
 cyber.1030.c: "そういった記録を持つ者を全員投獄しろ。"
 cyber.1030.c.tt: "法執行機関に犯行の様子を記録する者たちを狙わせろ。"
 cyber.1030.d: "退廃的だな。 受け入れよう。"
 cyber.1030.d.tt: "あらゆる快楽は国によって是認される。"
 cyber.1030.e: "終わりのない死の経験？ いいじゃないか。"
 cyber.1030.e.tt: "これにより、 死祭司たちは死すべき新入信者の経験を理解し、 導くことができるようになる。"
 entertainment_crackdown: "痕跡記憶の取り締まり"
 entertainment_crackdown_desc: "犯罪抑止のため、 記録された痕跡記憶による娯楽は違法となった。"
 endorsed_entertainment: "痕跡記憶の是認"
 endorsed_entertainment_desc: "国の承認の後、 記録された痕跡記憶による娯楽は広く普及した。"
 illicit_entertainment: "不法痕跡記憶"
 illicit_entertainment_desc: "記録された痕跡記憶による娯楽に関する新法により、 同サービスの需要が抑え込まれた。"
 decadent_entertainment: "退廃的な痕跡記憶"
 decadent_entertainment_desc: "人々は痕跡記憶がもたらす超快楽を大いに楽しんでいる。 少なくとも、 次の流行が来るまではこのままだろう。"
 deadly_entertainment: "死の痕跡記憶"
 deadly_entertainment_desc: "死祭司たちは今や、 命を奪う経験と死の経験を味わることができる。 これは彼らが人々、 特に死すべき新入信者を導くのに役立つだろう。"
 cyber.1055.name: "スパイゲーム"
 cyber.1055.desc: "呆れかえるほど愚かなことに、 海軍士官候補生が機密情報を漏らしてしまった。 ネットワーク化された戦闘シミュレーターの熱心なファンだったその候補生は、 駆逐艦砲塔の角速度のことで、 他のプレイヤーたちと議論になったのだ。\n\n彼らの立場を強めるため、 候補生は我々の艦艇の機密図面を複数アップロードしたが、 それは瞬く間に銀河ネットワーク中に広まった。 犯人への対処は済んだものの、 この事件を受けて、 評議会はオンラインゲームの全面的な禁止を求めている。"
 cyber.1055.a: "いずれにせよ、 艦隊を現代化する時期だった。"
 cyber.1055.b: "ネットワークのセキュリティ対策を強化しろ。"
 cyber.1055.c: "評議会が正しい。 ゲームを禁止しろ。"
 cyber.1055.d: "矛盾する内容の報告書で情報を揉み消せ。"
 cyber_breach_overcome: "スパイゲーム：艦隊の現代化"
 cyber_breach_overcome_desc: "終わったことは仕方ない。 艦隊を現代化し、 漏洩した図面を無用なものにしてしまおう。"
 cyber_breach_forgive: "スパイゲーム：セキュリティのアップデート"
 cyber_breach_forgive_desc: "情報漏洩を受けて、 セキュリティ規約をアップデートした。 とはいえ、 ゲーマーたちが国の安全を脅かすことはない。 馬鹿な間違いに過剰反応する必要はない。"
 cyber_breach_ban: "スパイゲーム：全面的な禁止"
 cyber_breach_ban_desc: "運営セキュリティの強化に加え、 ネットワーク化されたゲームを禁止した。"
 cyber.1055.leak.tt: "§Y720§!日間、 §Y銀河共同体§!の構成国が§Y[Root.GetName]§!に関する§H中程度§!の §Y軍事§!情報を得る。"
 cyber.1055.minorleak.tt: "§Y360§!日間、 §Y銀河共同体§!の構成国が§Y[Root.GetName]§!に関する§R少量§!の §Y軍事§!情報を得る。"
 has_tradition_subterfuge_tt: "§Y策略§!伝統ツリーを完了しているため、 このオプションは利用可能である。"
 cyber.1205.name: "感覚検閲"
 cyber.1205.desc: "感覚サイバーウェアの最新世代では、 ユーザーは不必要な感覚を遮断することができる。 不快な臭いや下品な画像にいたるまで、 あらゆるものを弱めたり、 隠したり、 あるいはユーザーの知覚から完全に抹消することが可能である。 我々の社会では、 そうした検閲が市民の意識に与える影響について、 ますます不安を募らせる保守的団体が増えてきている。"
 cyber.1205.a: "我々は我々の人生の真実と向き合わなければならない。"
 cyber.1205.b: "誰にでも幸福の無知を得る権利がある。"
 cyber.1205.c: "表面的な再補正は構わないが、 検閲にはリスクが伴う。"
 cyber.1205.d: "我々が彼らの感覚を管理する。"
 cyber_censure_truth: "感覚検閲：禁止"
 cyber_censure_truth_desc: "人々は現実世界の要素を遮断する知覚フィルターの適用を禁止された。 真実とは常に向き合わなければならない。"
 cyber_censure_total: "感覚検閲：完全"
 cyber_censure_total_desc: "現実を不快に感じるなら、 単純に気持ちを害するものを遮断してしまってはどうだ？ 犯罪や苦悩、 偏見を目にする必要はない。"
 cyber_censure_partial: "感覚の再補正"
 cyber_censure_partial_desc: "我々は人々がインプラントの知覚再補正機能を使用することを許可した。 これにより、 そうしなければつまらない人生だったものに鮮やかな色や効果を加えることができるようになった。"
 cyber_censure_authoritarian: "国主導の感覚検閲"
 cyber_censure_authoritarian_desc: "人々がいかに現実を知覚するかを我々が管理する。 我々の忠実な市民の生活から反乱因子を遮断することで、 彼らを間違った方向に導く者たちから彼らを守るのだ。"
 cyber.1210.name: "サブリミナル・ハッキング・メッセージ"
 cyber.1210.desc: "地下運動や野望を抱く企業の広告における最近の流行は、 ユーザーのサイバーウェアに秘密のメッセージを植えこむことだ。 偽造メモリー、 選択的ホルモン反応、 睡眠暗示は当たり前のことになりつつある。 不安を抱く政治家たちはこの問題を我々に持ちかけ、 禁止措置を要求している。 あるいは、 少なくともこうした侵略的メッセージの規制を求めている。"
 cyber.1210.a: "こうした慣習は許容できん。"
 cyber.1210.b: "賢いやり方だ！ 許可しよう。"
 cyber.1210.c: "その慣習をライセンス化しよう。"
 cyber.1210.d: "信仰を広めるのに利用しろ。"
 cyber_subliminhack_banned: "サブリミナル・ハッキング：禁止"
 cyber_subliminhack_banned_desc: "サイバーウェアを通じた、 陰湿なサブリミナル・メッセージの使用を禁止した。"
 cyber_subliminhack_allowed: "サブリミナル・ハッキング：許可"
 cyber_subliminhack_allowed_desc: "サイバーウェアを通じた、 陰湿なサブリミナル・メッセージの使用を許可した。 市場においてはあらゆるものが公平である。"
 cyber_subliminhack_licensed: "サブリミナル・ハッキング：ライセンス化"
 cyber_subliminhack_licensed_desc: "我々はサイバーウェアを通じた、 陰湿なサブリミナル・メッセージの使用ライセンスを売りさばく。"
 cyber_subliminhack_hallowed: "サブリミナル福音伝道"
 cyber_subliminhack_hallowed_desc: "我々はサイバーウェアを通じた、 陰湿なサブリミナル・メッセージを利用し、 我々の信仰を広める。"
 cyber.1255.name: "サイバーセキュリティ侵害"
 cyber.1255.intro: "最近、 複数の機密文書が遠隔サーバーにより不正ダウンロードされた。 セキュリティ担当者は第一および第二ファイアウォールは無傷のままであると断固主張しているが、 今のところ外部からのサイバー攻撃の証拠はない。\n\n"
 cyber.1255.gov.desc: "$cyber.1255.intro$必然的結論はこうだ。 確かに情報漏洩はあった。 そして盗まれた情報の機密性を考慮すれば、 高レベルのクリアランスを持つ者の仕業に違いない。"
 cyber.1255.hack.desc: "$cyber.1255.intro$必然的結論はこうだ。 確かに情報漏洩はあった。 そしてそれは、 オープンソースのサイバネティック強化を採用した我々の決断に疑問を投げかけるものだ。"
 cyber.1255.a: "調査を始めろ。"
 leak_investigation: "情報漏洩の調査"
 leak_investigation_desc: "情報漏洩の真実を暴くため、 我々はサイバネティック・インプラントを持つすべての者たちを調査する必要がある。 おそらく…… 煩わしい仕事になるだろう。"
 cyber.1260.name: "神経魔術"
 cyber.1260.desc: "サイバーセキュリティの情報漏洩に関する調査が完了した。\n\n政府内の強化施術を受けた特定の高官たちが標的にされ、 神経ウェットウェアをハッキングされていたのだ。 外部から操作され、 自分の意思に反して強制的に行動させられていた彼らには、 問題となっている出来事の記憶が一切ない。\n\n情報漏洩の原因は突き止めたものの、 最終的な犯人の発見には近づいていない。 しかしながら、 対象の役人たちの精神に偽のデータをひそかに埋め込むことで、 逆探知ができるかもしれない。"
 leak_distrust: "仲間のなかにいる操り人形"
 leak_distrust_desc: "我々のうちの誰かが操り人形であるかもしれないときに、 人々に我々の指導権を信頼してもらうことがどうして期待できようか？"
 leader_trait_hacked: "サイバー操り人形"
 leader_trait_hacked_desc: "このリーダーは不正アクセスを受けており、 不明な発信源に神経ウェットウェアをハッキングされている。"
 hacked_leaders.tt: "ランダムな数のサイボーグのリーダーが§Y$leader_trait_hacked$§!特性を獲得。"
 cyber.1265.name: "マインドジャッカー" #Playing on the word 'hijacker'
 cyber.1265.desc: "奴らを捕らえた。\n\n前例のないサイバー攻撃の犯人が見つかった。 混乱を引き起こすことだけを目的に、 「マインドジャッカー」を自称する彼らは、 我々にとって不名誉なことに、 我々のセキュリティシステムをいとも容易く回避した。 首謀者たちは既に拘束したが、 不正アクセスされた役人たちの措置を決めなければならない。\n\n最も単純な解決法は、 影響を受けたインプラント周辺にカスタムファイアウォールをインストールすることだ。 一方で、 リスクは高いがより痕跡の残らない方法はハード・リブートである。 基礎認知機能にアクセスすることで、 問題となっているリーダーたちを強制的に「シャットダウン」し、 新しいOSをインストールするのだ。"
 cyber.1265.a: "ファイアウォールを設置しろ。"
 cyber.1265.b: "役人を再起動しろ。"
 cyber.1265.c: "奴らに勘付かれている。 ファイアウォールを設置しろ。"
 cyber.1270.name: "再起動、 再開"
 cyber.1270.desc: "不正アクセスを受けた役人のハード・リブートが予期せぬ結果を迎えた。 神経ハッキングの痕跡はすべて消去されたものの、 蓄積された知識や経験の大部分も消えてしまったのだ。\n\nこうした失敗はあったものの、 「仕切り直し」となったリーダーたちからは、 職においても個人においても新しい気持ちになったと報告を受けている。 こうした大胆な対策を我々に強制させたことで、 ハッカーたちは意図せず我々の役に立ってしまったのかもしれない。"
 rebooted_leaders: "§Y$leader_trait_hacked$§!特性を持つリーダーのすべての§Hネガティブな特性§!を削除。\n削除された特性1つにつき、 §R300§!の経験値が失われる。"
 leader_hack_resolution: "警戒しながらの解決"
 cyber.1275.name: "神経ファイアウォール"
 cyber.1275.desc: "我々の精神は安全だ。\n\nウェットウェアのエンジニアたちが、 神経ファイアウォールの設計に成功した。 集団的セキュリティの維持のため、 プログラムは現役および以降の役人すべてに即座にインストールされる。 指導者階級の基礎認知機能に有害な影響が与えられた一方で、 この計画により、 データセキュリティ学における多大な知見が得られた。"
 cyber.1275.a: "安全第一だ。"
 leader_trait_firewalled: "神経ファイアウォール"
 leader_trait_firewalled_desc: "サイバー攻撃は受けないが、 リーダーの学習効率が低下する。"
 hacked_and_firewalled_leaders.tt: "§Y$leader_trait_hacked$§!特性を削除し、 すべてのサイボーグのリーダーに§Y$leader_trait_firewalled$§!特性を適用する。"
 #FINAL EVENT #
 #DEMOCRATIC
 cyber.1505.name: "社会2.0"
 cyber.1505.desc.individualist: "民主主義プロセスの上にこの社会は築かれている。 この基礎を強化するのは至極当然のことだ。 新たなサイバネティクスにより、 大小を問わず、 あらゆる社会的問題で投票を行うことができるようになり、 人々は自分の意見を表明するかつてない機会を得た。 これによりもたらされるデータの富は想像を超えるものであり、 可能性は無限大である。"
 cyber.1505.desc.collectivist: "仲間の§Y[Species.GetNamePlural]§!に自分の考えていることが公然と伝わってしまう可能性があるのはおぞましいことだ。 しかしその最初の衝撃は、 すぐに周辺環境に起因する自信と確信に置き換わる。 我々は隣人が何をしているかを知っているし、 彼らも我々のそれを知っている。 言葉を介さず、 ただ頭で思うだけで即座にコミュニケーションが成立する。 この精神の明瞭さを守るため、 重要なことが揉み消されてしまわないよう、 サイバー脳には感情を無力化するよう指示が与えられている。"
 cyber.1505.desc.neutral: "終わりの見えない話し合いや、 数々の投票と生演説があったにもかかわらず、 国はサイバー強化された社会の問題についていまだ結論を出せていない。 議論が二極化してしまう前に、 指導部が介入しなければならない。\n\n我々はこの機会を利用してサイバネティクスを改造し、 それを民主主義プロセスに役立たせるか、 あるいは人々がサイバーウェアを通じて意見を共有できる、 より急進的アプローチを取ることも可能だ。 後者においては、 周辺環境を乱されることで自然発生する強制的な思考を防ぐため、 サイバー脳に基礎感情を抑圧させることも必要条件である。"
 cyber.1505.a: "リアルタイムのサイバー脳投票を有効にしろ。"
 cyber.1505.a.tt: "$change_auth_tt$ ['concept_auth_cyber_democratic_individualist']\n$unlock_edict_legislative_chorus$"
 cyber.1505.b: "経験を共有するため、 サイバー脳をリンクさせろ。"
 cyber.1505.b.tt: "$change_auth_tt$ ['concept_auth_cyber_democratic_collectivist']\n$unlock_edict_self_preservation_override$"
 cyber.1505.c: "$cyber_keep_auth_option$"
 cyber.1505.c.tt: "$keep_auth_tt$ ['concept_auth_democratic']"
 #OLIGARCHIC
 cyber.1510.name: "権力再編"
 cyber.1510.desc.individualist: "人々は自分の立場を表明し、 一対一で戦うことを望んでいることが明らかになった。 こうした激しい競争行動をゲーム化されたシステムで支援する我々の計画は、 生産性の向上と引き換えに社会的流動性と小さな装身具を約束するものであり、 彼らの望みに応えるものでもある。"
 cyber.1510.desc.collectivist: "人々がコミュニティの感覚を得ることは、 個人の社会的流動性よりも重要なことである。 それゆえ、 競争性を利用する代わりに、 我々は睡眠中の強化脳の潜在能力に着手する。 その演算能力はサイバネティック・アップリンクを通じてベースステーションとワイヤレスに連結され、 休息中の対象者に演算タスクが入力される。"
 cyber.1510.desc.neutral: "我々の従属者たちは競争社会と地域社会のどちらを支持することもなかった。 彼らより優れた者たちとして、 我々がこれからどう行動するべきかを決める。\n\n他者よりも優秀な結果を出すと昇進の道を進める可能性がある、 競争性の高いゲーム化されたシステムを創り出すか、 あるいはサイバネティック・アップリンクを通じてコミュニティ全体の演算能力を利用し、 睡眠中の脳をサーバー・ファームに連結することが可能だ。"
 cyber.1510.a: "競い合ってゴマすりをしてもらおう。"
 cyber.1510.a.tt: "$change_auth_tt$ ['concept_auth_cyber_oligarchic_individualist']\n$unlock_edict_battle_royale$"
 cyber.1510.b: "眠っている間に働いてもらおう。"
 cyber.1510.b.tt: "$change_auth_tt$ ['concept_auth_cyber_oligarchic_collectivist']\n$unlock_edict_stately_acclaim$"
 cyber.1510.c: "$cyber_keep_auth_option$"
 cyber.1510.c.tt: "$keep_auth_tt$ ['concept_auth_oligarchic']"
 #DICTATORIAL
 cyber.1515.name: "群衆支配"
 cyber.1515.desc.individualist: "§Y[Species.GetAdj]§!の人々は、 強化人間がまったく新しい方法で自己表現できる世界を受け入れている。\n\nしかしその寛大さは表面的なものに過ぎない。 今やインプラント内の強化監視アルゴリズムが各個人を監視し、 脳シナプスが反体制的思考を伝達した瞬間にそれを検知するのだ。"
 cyber.1515.desc.collectivist: "数の力、 そして逆境の際の団結力というものがある。 サイバー強化されたどの§Y[Species.GetAdj]§!も、 力を合わせてより良い未来のために戦う。 そして隣にいる人間も自分と同じことをするのだと信用している。\n\n鉄の意志を持つ§Y[Ruler.GetTitle] [Ruler.GetName]§!の輝かしき人格が導いてくれることがわかっているから、 人々は安心できる。"
 cyber.1515.desc.neutral: "人々の決心がつかない今、 §Y[Ruler.GetTitle] [Ruler.GetName]§!は強化施術がもたらす唯一無二の機会を掴み取り、 意思決定を行わなければならない。\n\nインプラントにより監視されつつも、 人々は個人の自由を許されるべきか、 あるいはリーダーの輝かしき人格の意志から影響を与えられるべきか？"
 cyber.1515.a: "監視付きのささやかな自由を。"
 cyber.1515.a.tt: "$change_auth_tt$ ['concept_auth_cyber_dictatorial_individualist']\n$unlock_edict_self_indictment_protocol$"
 cyber.1515.b: "リーダーが我々を導く。"
 cyber.1515.b.official.tt: "$change_auth_tt$ ['concept_auth_cyber_dictatorial_collectivist_official']\n$unlock_edict_love_letter_virus$"
 cyber.1515.b.commander.tt: "$change_auth_tt$ ['concept_auth_cyber_dictatorial_collectivist_commander']\n$unlock_edict_love_letter_virus$"
 cyber.1515.b.scientist.tt: "$change_auth_tt$ ['concept_auth_cyber_dictatorial_collectivist_scientist']\n$unlock_edict_love_letter_virus$"
 cyber.1515.b.vacant.tt: "$change_auth_tt$ ['concept_auth_cyber_dictatorial_collectivist_vacant']\n$unlock_edict_love_letter_virus$"
 cyber.1515.c: "$cyber_keep_auth_option$"
 cyber.1515.c.tt: "$keep_auth_tt$ ['concept_auth_dictatorial']"
 #IMPERIAL
 cyber.1520.name: "帝国万歳"
 cyber.1520.desc.individualist: "支配者層に注力せよと皇帝から宣言があった。 §Y[root.GetName]§!の[root.GetRulerTitle]として、 経験を記録および移植するために、 これ以降のすべての統治者に特殊な§Y$r_the_rulerchip$§!が埋め込まれることになる。 この遺品のチップは統治者が亡くなった際にその後継者に譲渡される。\n\n$r_the_rulerchip$が何世代にも渡って受け継がれれば、 その巨大な経験ライブラリには我々の社会の基礎となるものが記録されることになる。 人々が学んだことをリーダーのために利用することも可能だ。"
 cyber.1520.desc.collectivist: "帝国市民に苦しい仕事から逃れる一時的な休息を与えるため、 巨大§Y$building_cyberdome$§!を§Y[root.Capital.GetName]§!に築かなければならない。 それは新しいタイプのサイバースポーツを開催する素晴らしい場所になるだろう。 そこでは強化アスリートたちが我々の好意と称賛を得るために競い合う。 そうした激しい競技を目の当たりにすれば、 大衆が元気づけられ、 §Y[root.GetName]§!への称賛の気持ちが高められるのは間違いない。\n\nさらに、興行の様子はサイバー脳に直接神経放送することができる。 これにより、 熱狂した大衆が[root.Capital.GetName]に足を運び、 スポーツ観戦の原始的スリルを体験しに来るようになる。"
 cyber.1520.desc.neutral: "サイバネティクスにおける我々の社会的進歩は今、 分岐点に差し掛かっている。 少数の利益のために、 あるいは多数の利益のために、 そのどちらかに我々の活動を集中させることができる。 どちらも最終的には§Y[root.GetName]§!の利益となるだろう。\n\n特別なインプラントを開発すれば、 [root.GetRulerTitle]の経験を後継者に移植することが可能だ。 強化サイバースポーツおよび放送技術へ注力すれば、 首都[root.Capital.GetName]で大きなイベントを企画することができるようになる。"
 cyber.1520.a: "帝国の知識を保存しろ。"
 cyber.1520.a.tt: "$change_auth_tt$ ['concept_auth_cyber_imperial_individualist']\n$create_relic_the_rulerchip$\n$unlock_edict_levied_experience$"
 cyber.1520.b: "首都でサイバースポーツを開催し、 放送しろ。"
 cyber.1520.b.tt: "$change_auth_tt$ ['concept_auth_cyber_imperial_collectivist']\n$unlock_building_cyberdome$\n$unlock_edict_neurocasted_spectacles$"
 cyber.1520.c: "$cyber_keep_auth_option$"
 cyber.1520.c.tt: "$keep_auth_tt$ ['concept_auth_imperial']"
 #CORPORATE
 cyber.1525.name: "インプラント企業"
 cyber.1525.desc.individualist: "§Y[Species.GetAdj]§!のフォーカスグループは新しい眼球インプラントに良い反応を示している。 分析部門によれば、 広告の効果が著しく向上し、 我々の製品ラインナップすべてにおいて売り上げの上昇が見込まれるという。 来たるべき全製品の発表の大きな可能性を感じさせる結果だ。\n\nサイバネティクスの時代がやって来た。 我々は新たな企業戦略によって、 それを資本化する心構えだ。"
 cyber.1525.desc.collectivist: "全面的な自己強化に対する我々の献身が、 人々の間で共感を呼んでいる。\n\n社会経済問題への取り組みは我々の企業構想と合致するものであり、 必要不可欠な新世代のインプラントが常に導入されることを確実にするものである。"
 cyber.1525.desc.neutral: "サイバネティック技術が社会にもたらした大きな変化を考えれば、 一般消費者が方向性を決めかねていることは驚くべきことではないのかもしれない。 個人の差違があって当たり前であるべきか、 あるいは集団的幸福に注力すべきか？\n\nこの比類なき重大な決断が広範囲に影響を及ぼすことは間違いないが、 迷いは利益の損失を意味する。 必ず選択しなければならない。"
 cyber.1525.a: "広告付きインプラントを発表せよ。"
 cyber.1525.a.tt: "$change_auth_tt$ ['concept_auth_cyber_corporate_individualist']\n$unlock_edict_customer_insights$"
 cyber.1525.b: "広い範囲でインプラントのアップグレードを実施せよ。"
 cyber.1525.b.tt: "$change_auth_tt$ ['concept_auth_cyber_corporate_collectivist']\n$unlock_edict_rolling_updates$\n$unlock_agenda_augmentation_product_launch$"
 cyber.1525.c: "$cyber_keep_auth_option$"
 cyber.1525.c.tt: "$keep_auth_tt$ ['concept_auth_corporate']"
