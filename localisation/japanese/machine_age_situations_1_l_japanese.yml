 situation_cyberization_hive: "サイバー化"
 situation_cyberization_hive_type: "アセンションの状況"
 situation_cyberization_hive_desc: "集合意識にはより優秀な肉体が必要だ。 サイバネティック・インプラントがあれば、 ドローンは強化そしてリモデルされ、 完全なものとなる。\n生物の限界を越える時だ。\n\n§Y翌月にインプラントを受け取るPOP§!: §G[From.GetCyberPopsPerMonth]§!"
 situation_cyberization_hive_monthly_change_tooltip: "我々の肉体がサイバネティックになる。 生物と機械の完全なる融合である。"
 situation_cyberization_hive_outcome: "サイバー強化された人々。"
 stage_cyberization_hive_effects: "サイバネティック・インプラントを設計および導入し、 我々自身を変身させなければならない。"
 cyber.hive_government_shift.tt: "現在進行中の§Yサイバネティック意識の変遷§!に影響を与える。"
