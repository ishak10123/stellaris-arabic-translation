 #CYBERIZATION STAGE 1
 cyber.100.name: "未来の制御" #Stage 1 - Start event
 cyber.100.desc.shared: "高度サイバネティック・インプラントにおける近年の画期的進歩により、 いつの日にか社会を再形成することが可能になるだろう。 生物的弱点を排除することで我々はより賢く、 より速く、 より強くなれる。"
 cyber.100.desc.shared_unplugged: "高度サイバネティック・インプラントにおける近年の画期的進歩により、 いつの日にか我々の望む形で社会を再形成することが可能になるだろう。 我々の既存の強化から生物的弱点を排除することで我々はより賢く、 より速く、 より強くなれる。"
 cyber.100.desc: "$cyber.100.desc.shared$\n\n企業がビジネス案と販売予測を発表した一方で、 政府の役人たちはこうした潜在的な技術の利用は国による保証がなければならないと主張している。"
 cyber.100.desc.unplugged: "$cyber.100.desc.shared_unplugged$\n\n企業がビジネス案と販売予測を発表した一方で、 政府の役人たちはこうした潜在的なテクノロジーの利用は国による保証がなければならないと主張している。"
 cyber.100.desc.megacorp: "$cyber.100.desc.shared$\n\n下請け会社が第三者によるインプラント生産のビジネス案と販売予測を発表した一方で、 理事会はこうした重要な技術は我々が独占していなければならないと主張している。"
 cyber.100.desc.megacorp_unplugged: "$cyber.100.desc.shared_unplugged$\n\n下請け会社が第三者によるインプラント生産のビジネス案と販売予測を発表した一方で、 理事会はこうした重要なテクノロジーは我々が独占していなければならないと主張している。"
 cyber.100.a: "我々が強化施術産業を国有化しよう。"
 cyber.100.a.megacorp: "組織内での開発に留めておこう。"
 cyber.100.a.tt: "$situation_cyberization_triggered_modifier$$cyber_control_government_effects$"
 cyber.100.b: "我々が物流を民営化しよう。"
 cyber.100.b.megacorp: "この件は子会社に任せよう。"
 cyber.100.b.tt: "$situation_cyberization_triggered_modifier$$cyber_control_corporate_effects$"
 cyber.105.name: "人々による、 人々のための"
 cyber.105.desc: "MODの自己施術者たちは、 我々が計画したサイバネティック設計図の多くが一般人に利用できないことに憤慨している。\n\n彼らは図面が公開され、 環境規制が緩和されれば、 ほぼすべての人に自身の強化パーツの製造および修理が可能になると主張している。"
 cyber.105.desc.megacorp: "独立請負業者は、 我々が計画したサイバネティック設計図の多くが利用できないことに憤慨している。\n\n彼らは図面が公開され、 生産に関わる特許が緩和されれば、 インプラント生産が改善されると主張している。"
 cyber.105.a: "規制があるのには理由がある。"
 cyber.105.a.megacorp: "我々の知的財産だ。"
 cyber.105.a.tt: "§Y$situation_cyberization$§! の状況補正に変化なし。"
 cyber.105.b: "同産業の規制撤廃を。"
 cyber.105.b.crafters: "人々に自由に物づくりをさせよう。"
 cyber.105.b.megacorp: "オープンソースの図面を提供しよう。"
 cyber.105.b.gov.tt: "§Y$situation_cyberization$§! の状況補正更新：\n§G追加：§! $cyber_control_independent_effects$\n§R削除：§! $cyber_control_government_effects$"
 cyber.105.b.cor.tt: "§Y$situation_cyberization$§! の状況補正更新：\n§G追加：§! $cyber_control_independent_effects$\n§R削除：§! $cyber_control_corporate_effects$"
 #Stage 1 Opportunities - Research
 cyber.120.name: "精神的負担の軽減"
 cyber.120.desc: "研究者チームから、 AI管理者を我々のモバイルデバイスに組み込むという革新的提案があった。後に、サイバーウェアに直接組み込まれる可能性がある。\n\n管理者は、国民の焦点を無駄な仕事から、より知的な取り組みへと変えるだろう。自律性は一部失われるものの、 かつてないほど生産力を高められる可能性を見過ごすことはできない。"
 cyber.120.a: "なによりまず生産力だ。"
 cyber.120.a.spiritual: "ありがたいことだと思ってこれを受け入れなければならない。"
 cyber.120.b: "自律性の損失はあまりに大きい。"
 cyber.120.b.spiritual: "聖なる道からこれ以上外れるようなことはしない。"
 cyber.120.c: "切り替えスイッチがあるなら受け入れられんこともない。"
 cyber.120.d: "これを実行すれば、 どれほどの支配力が得られることか……"
 #Stage 1 Challenges - Research
 cyber.160.name: "サイバネティクスとの断絶"
 cyber.160.desc: "広く評価されている新ドラマが大衆の心を鷲掴みにした。\n\nサイバネティック・インプラントが普及した世界で、 強化施術を受けた労働者が、 悲劇にも改造を受けた自身の体を手放すところから物語は始まる。 その悲しい結末からは完全なサイバー化を批判し、 それによって[Owner.Species.GetAdj]のアイデンティティを必然的に抹消しようとする意図が見え透いている。\n\nドラマの大ヒットにより我々の主導権に対する強い反発が起き、 ドラマのリリース以降、 利用可能な被験者は60%減少した。"
 cyber.160.a: "広報活動を行おう。"
 cyber.160.b: "インプラント規制を強めよう。"
 cyber.160.c: "すぐに忘れ去られるだろう。"
 cyber.160.d: "ドラマの検閲を。"
 cyber.160.e: "すべてのニュース報道を封じろ。"
 #CYBERIZATION STAGE 2
 cyber.200.name: "強化センター"
 cyber.200.desc.gov: "政治的内輪揉めの後、 サイバネティック強化の生産の責任は政府の複数の局で分担されてきた。 全員で利益を分け合えば、 互いに抑制し合うことになるのは間違いない。\n\nしかし計画を実行に移さなくてはならない。 研究コミュニティがサイバネティック開発の拠点として機能するには、 少なくとも1つの$building_augmentation_center$が必要である。"
 cyber.200.desc.cor: "かつては夢だったものが今実現しようとしている。 国内の多数の企業の他に利益を得るべき者はいるだろうか？ 急成長するサイバネティック産業における活力の恩恵は、 新しい消費者用の製品を加速度的に売り出せることだ。\n\nしかし計画を実行に移さなくてはならない。 企業のロビイストは、サイバネティック開発の拠点として、 少なくとも1つの$building_upload_center$を求めている。"
 cyber.200.desc.ind: "神経シナプス強化からサイバネティック味蕾にいたるまで、 我々の通信ネットワークは大胆な設計案で賑わっている。 ほどんとのものはひどく非現実的で実行に費用がかかりすぎるが、 幸いにもなかには期待できるものもある。\n\nしかし計画を実行に移さなくてはならない。 オンラインコミュニティがサイバネティック開発の拠点として機能するには、 少なくとも1つの$building_augmentation_center$が必要である。"
 cyber.200.a.gov: "建設許可証を発行する。"
 cyber.200.a.cor: "承認しよう。"
 cyber.200.a.ind: "いいだろう。"
 cyber.200.a.tt: "§Rアクションが必要：§!\n§Y$situation_cyberization$§!の状況を再開するには$building_augmentation_center$を建設する。\n\n各$building_augmentation_center$が$job_augmentor_with_icon$職業枠を§G+200§!付与する。\n\n$job_augmentor_research_effect_desc$"
 cyber.205.name: "予備計画" #Stage 2 - Start event
 cyber.205.desc.shared: "さらに大規模な予備計画を考案する時が来た。 これには継続的な支援が必要であり、 $building_augmentation_center$がある惑星でしか利用できないものの、 我々の得た知識が即座に生産力を高めるだろう。"
 cyber.205.desc.gov: "政府資金による研究計画で行われた簡単な試験で、 機械強化により生産性が向上したことが確認された。\n\n$cyber.205.desc.shared$"
 cyber.205.desc.cor: "フォーカスグループのボランティアたちで行われた簡単な試験で、 機械強化により生産性が向上したことが確認された。\n\n$cyber.205.desc.shared$"
 cyber.205.desc.ind: "MODの自己施術者たちの報告によれば、 機械強化により生産性が向上したことが確認されている。\n\n$cyber.205.desc.shared$"
 cyber.205.a: "精鋭を強化する。"
 cyber.205.a.tt: "$pop_cat_ruler$資源産出：$building_augmentation_center$があれば、§G+10%§!"
 cyber.205.b: "専門家を強化する。"
 cyber.205.b.tt: "$pop_cat_specialist$資源産出：$building_augmentation_center$があれば、§G+10%§!"
 cyber.205.c: "労働者を強化する。"
 cyber.205.c.tt: "$pop_cat_worker$資源産出：$building_augmentation_center$があれば、§G+10%§!"
 cyber.205.d: "全員に強化施術を。"
 cyber.205.d.tt: "£job£ §H職業§!による資源：$building_augmentation_center$があれば、 §G+5%§!"
 cyber.210.name: "平行開発"
 cyber.210.desc.gov.rival: "ジャーナリストたちは思考監視マイクロチップの試験を行う、 政府出資の実験の証拠を暴き出した。 開発が完了すれば、 この装置を市民の脳に組み込み、 セキュリティーと人格に関する詳細なデータが収集できる。"
 cyber.210.desc.cor.rival: "商標を巡る争いに関連する証拠から、 企業が強化現実インプラントの実験を行っていることが明らかになった。 消費者の視覚神経と一体となるように設計されたもので、 図面にはユーザーの利点と、 企業側が視覚情報をハイジャックできるようになるという内容がまとめられている。"
 cyber.210.desc.ind.rival: "MODを自己施術する独立勢力は、 既に四肢を原始的な代替品で交換し始めている。 勝手にこのような施術を行う者たちが良い生活を送れる保証はない。 加えて、 制限なくインプラントを使用することは利益以上に害をもたらす懸念もある。"
 cyber.210.a: "利用できそうだ。"
 cyber.210.a.tt: "§Y1§!年間、 §Y$situation_cyberization$§!の状況進捗速度：§G+25%§!\n\n"
 cyber.210.b: "今すぐ止めなければ。"
 cyber.210.b.tt: "§Y1§!年間、 §Y$situation_cyberization$§!の状況進捗速度：§R-25%§!"
 #Stage 2 Opportunities - Test Results and Rival Sector
 cyber.220.name: "多肢連携"
 cyber.220.desc: "神経インターフェースの分野で画期的進歩があった。脳信号増幅器を使えば、義肢を限定的ではあるが、滑らかに制御できるようになる。将来的には、外部デバイスなしで、サイバー脳に直接統合できるようになる。\n\n試験の初期段階では、被験者は高度な戦闘熟練度に加え、器用さと物体の操作において有望な結果を示した。しかしながら、 製造コストに関わる懸念から、 この先駆的技術を最初に手にするべき者を早急に決める必要がでてきた。"
 cyber.220.a: "我々の科学者たちにはさらなる[owner.species.GetHandNamePlural]が必要だ。"
 cyber.220.b: "軍の強化に注力しよう。"
 cyber.220.c: "まずは肉体に制約のある者たちから助けてやろう。"
 cyber.220.d: "給付はしない！ 一番高く買ってくれる者に売れ。"
 cyber.220.e: "労働者階級に武器を持たせろ！"
 cyber.220.f: "上流階級が常に優位であるべきだ。"
 #Stage 2 Challenges - Test Results and Rival Sector
 cyber.260.name: "全身全霊"
 cyber.260.desc: "新しい脊椎モジュールの実験は大失敗に終わった。 インプラント・モーターが生み出す過剰な力により複数の被験者が脊髄に深い傷を負った。\n\n恐ろしい実験結果を捉えた衝撃の画像がリークされ、 これからの実験に志望する者たちが大幅に不足する事態となった。"
 cyber.260.a: "解決策を見つけるまで試験をすべて中止しろ。"
 cyber.260.a.tt: "§Y6§!ヶ月間、 §Y$situation_cyberization$§!の状況進捗速度：§R-50%§!"
 cyber.260.b: "犠牲者の家族に補償金を。"
 cyber.260.c: "志願者を探せ。 必要とあらば力ずくでだ。"
 #CYBERIZATION STAGE 3
 cyber.300.name: "展開" #Stage 3 - Start event
 cyber.300.desc: "我々の領土全域、 すべての主要都市部に[Owner.Species.GetName]の人々のために機械インプラントを備蓄してある。 $job_augmentor_plural$により設計されたこの装置は、 間違いなく我々の生物としての体を大幅に強化してくれる。\n\n過去を捨て去り、 サイバー化の未来を手にする日がついにやって来た。"
 cyber.300.a: "サイバー化せよ。"
 cyber.300.a.tt: "リーダーが特性を獲得：§Y$leader_trait_cyborg$§!\nPOPが特性を獲得：§Y$trait_cybernetic$§!\n\n$job_augmentor_growth_effect_desc$\n\n強化速度は状況アプローチと$building_augmentation_center$建造物の数に依存する。"
 cyber.305.name: "サイバー化反対派" #Spiritualists are Cybernetic Objectors
 cyber.305.desc.shared: "実際のところ、 彼らは最も基礎的なインプラントを欠いており、 ますます繋がりが強くなっている我々の社会で活躍するのは難しい。\n\n人々に全身インプラントの導入を強いればうまく社会に溶け込めるようになるだろうが、 怒りを買うことになるのは間違いない。"
 cyber.305.desc: "[Owner.Species.GetFleshTypeCyberCreed]と機械の融合に反対する宗教集団は、 人々をサイバー化しようとする我々の活動を拒絶した。$cyber.305.desc.shared$"
 cyber.305.desc.spiritualist: "[Owner.Species.GetFleshTypeCyberCreed]と機械の融合に明らかに乗り気でない信徒たちは、 人々をサイバー化しようとする我々の活動を拒絶した。$cyber.305.desc.shared$"
 cyber.305.desc.none: "[Owner.Species.GetFleshTypeCyberCreed]と機械を融合させることの道徳性は、 長い間議論の対象となってきた。 残念ながら、 サイバー化によって効率の向上がもたらされることを考えると、 不参加を選んだ者は不利な立場に置かれる可能性がある。\n\n人々にインプラントの導入を強いれば誰も取り残されることはないが、 間違いなく怒りを買うことになる。"
 cyber.305.desc.unplugged: "[Owner.Species.GetFleshTypeCyberCreed]と機械をもう一度融合させることの道徳性は、 長い間議論の対象となってきた。 しかし、 我々が設計した強化は、 もはや我々を同化した機械の気まぐれに縛られることはないため、 非常に効率的である。 不参加を選んだ者は不利な立場に置かれる可能性がある。 \n\n人々にインプラントの導入を強いれば誰も取り残されることはないが、 間違いなく怒りを買うことになる。"
 cyber.305.a: "彼らが順応するほかない。"
 cyber.305.a.materialist: "信仰は無関係だ。 我々は前進する。"
 cyber.305.a.spiritualist: "信仰が順応するほかない。"
 cyber.305.a.tt: "$cyberization_standards_full_effect$\n\n政策が使用可能に：§Y$policy_cyberization_standards$§!\n"
 cyber.305.b: "妥協しよう。"
 cyber.305.b.spiritualist: "共通の理解を目指そう。"
 cyber.305.b.tt: "$cyberization_standards_limited_effect$\n\n政策が使用可能に：§Y$policy_cyberization_standards$§!\n"
 #Stage 3 Opportunities - Treatment of Non-Cyborgs
 cyber.320.name: "幼児期の潜在能力"
 cyber.320.birth.desc: "新たに新生児にインプラントを組み込めるようになったところで、 我々は突如として行き詰まってしまった。 この先駆的な新生児強化施術は我々とこの技術との今後一生の繋がりを変えてしまうほどの力を有しており、 若いうちから生来のサイバー的潜在能力が解放され、 我々の文明をかつてない高みへと押し進めてしまうのだ。$cyber.320.end.desc$"
 cyber.320.metamorphosis.desc: "近頃、 幼体の体に直接マイクロチップを埋め込むことが可能な画期的技術が誕生した。 変容の最中、 幼体は機械システムを吸収する能力を持って生まれる。 蛹の段階で受けた強化施術は未開発のサイバー的潜在能力を解放し、 我々の文明を新たな驚愕の高みへと押し進めてくれる。$cyber.320.end.desc$"
 cyber.320.lithoid.desc: "新たに結晶化した新生児にインプラントを組み込めるようになったところで、 我々は突如として行き詰まってしまった。 そうした強化施術を受けた若者は金属鉱物との自然な繋がりを持つようになり、 若いうちから生来のサイバー的潜在能力が解放され、 我々の文明を新たな驚愕の高みへと押し進めてしまうのだ。$cyber.320.end.desc$"
 cyber.320.root.desc: "新たに新芽にサイバネティック・インプラントを組み込めるようになったところで、 我々は突如として行き詰まってしまった。 こうした強化施術を受けた若者は強化された菌糸網を通じて電気インパルスを送れるようになり、 若いうちから生来のサイバー的潜在能力が解放されるのだ。$cyber.320.end.desc$"
 cyber.320.egg.desc: "新たに幼生に直接インプラントを組み込めるようになったところで、 我々は突如として行き詰まってしまった。 この先駆的な強化施術は我々とこの技術との今後一生の繋がりを変えてしまうほどの力を有しており、 若いうちから生来のサイバー的潜在能力が解放され、 我々の文明をかつてない高みへと押し進めてしまうのだ。$cyber.320.end.desc$"
 cyber.320.other.desc: "幼児にサイバネティック・インプラントを組み込めるようになったところで、 同時に我々は行き詰まってしまう。 この先駆的な強化施術は我々とこの技術との今後一生の繋がりを変えてしまうほどの力を有しており、 若いうちから生来のサイバー的潜在能力が解放され、 我々の文明をかつてない高みへと押し進めてしまうのだ。$cyber.320.end.desc$"
 cyber.320.end.desc: "\n\nしかしながら、 早い時期からサイバー強化に依存してしまうと、 最終的に我々の種族は自然な状態で生存する能力を失ってしまう可能性がある。"
 cyber.320.a: "進化をするのは至極当然のことだ。"
 cyber.320.b: "幼少期は自然なままでなければいけない。"
 #Stage 3 Challenges - Treatment of Non-Cyborgs
 cyber.360.name: "改造の痛み"
 cyber.360.desc: "近頃、 試験段階の肉体改造施術を受けたことを後悔しているという話をする人々が大勢いる。 脳幹を機械の代替品に交換したことで長期間の実在的恐怖を感じるようになり、 一部では、 耐えられないほどの痛みがずっと続いていると言う者もいる。\n\n補償を要求する声があるなか、 我々は国家の責任について我々の立場を明確にしなければならない。"
 cyber.360.a: "極度の改造を禁止しろ。"
 cyber.360.a.tt: "§Y6§!ヶ月間、 §Y$situation_cyberization$§!の状況進捗速度：§R-50%§!"
 cyber.360.b: "犠牲があれば彼らの苦しみは終わる。"
 cyber.360.c: "さらに強力な鎮痛剤を支給しろ。"
 cyber.360.d: "被験者は最下層の階級から見つけ出せ。"
 cyber.360.e: "我々は責任を取らない。"
 #CYBERIZATION STAGE 4
 cyber.405.name: "インプラント税" #Government rival
 cyber.405.desc: "規制の緩い強化施術産業の利益を目の当たりにしたことで、 地方自治体の役人たちは最新の開発事情を常に把握しようと奮闘してきた。 資源回収から最終的な導入にいたるまで、 サイバネティック・インプラント生産のどの段階にも広い範囲で税金が課せられている。\n\nさらなるお役所仕事や支出が我々の強化プロセスを遅らせ、 完全なるサイバー化への前進を妨げてしまった。"
 cyber.405.a: "税を受け入れる。"
 cyber.405.b: "税を廃止する。"
 cyber.405.b.tt: "§Y$situation_cyberization$§!の状況進捗速度：§G+25%§!\n\n"
 cyber.405.c: "強化税法を見直す。"
 cyber.405.c.tt: "§Y1§!年間、 §Y$situation_cyberization$§!の状況進捗速度：§R-10%§!"
 cyber.410.name: "司法戦争" #Government rival escalation
 cyber.410.desc: "サイバネティック・インプラントを導入した大衆の最新事情を把握できない立法府は、 全力で強化施術の規制を進めている。\n\n我々の「インプラントへの執着」を非難し、 強化施術を受けるたびに「[Owner.Species.GetName]から離れていく」とする最新の規制は、 法による保護を受けられる最大強化率を定めるものだ。 しかし結局のところ、 我々はある時点で[Owner.Species.GetName]よりも機械側に傾くリスクを負うことになるのだ。"
 cyber.410.a: "法案を止めろ。"
 cyber.410.a.tt: "§Y1§!年間、 §Y$situation_cyberization$§!の状況進捗速度：§G+25%§!"
 cyber.410.b: "妥協策を見つけろ。"
 cyber.410.b.tt: "§Y1§!年間、 §Y$situation_cyberization$§!の状況進捗速度：§R-25%§!"
 cyber.415.name: "保証なし" #Corporate rival
 cyber.415.desc: "利益を得ようと急いだことで、 強化施術市場は安く低品質なインプラントで溢れかえっており、 企業はこうした装置がいずれ故障した際の消費者サポートを提供していていない。\n\n広く知られた昨今の事例においては、 公演中に人気役者の心拍調整インプラントが故障を起こしている。 不幸にも爆発事故だった。"
 cyber.415.a: "市場がうまく解決するだろう。"
 cyber.415.a_industrial: "異変は何もない。"
 cyber.415.a.tt: "§Y$situation_cyberization$§!の状況進捗速度：§G+25%§!"
 cyber.415.b: "ユーザーの安全を確保しなければならない。"
 cyber.415.c: "重大な違反者を罰せよ。"
 cyber.415.c.tt: "§Y$situation_cyberization$§!の状況進捗速度：§R-25%§!"
 cyber.420.name: "意図的な危険物" #Corporate rival escalation
 cyber.420.desc: "近頃、 新たな怪しいサイバネティック・インプラントが勢いを増してきている。 ユーザーの補助をするのではなく、 他者を傷付けるためのインプラントだ。 街は毒ガススプレー、 ナノ繊維絞首ロープ、 サイバー脳波周波数変換器で溢れている。\n\n支持者たちはこうしたインプラントが自己防衛に必要だと主張しているが、 一方ではそうした技術を使っても何ら良いことはないという声もある。"
 cyber.420.a: "武装させればいい。"
 cyber.420.b: "あまりに危険すぎる。"
 cyber.420.b.tt: "§Y$situation_cyberization$§!の状況進捗速度：§R-25%§!"
 cyber.420.b_pacifist: "危険なインプラントはすべて廃止しなければ。"
 cyber.420.b.tt_pacifist: "資源はもっと…… 実用的なものを作るのに使え。\n\n"
 cyber.425.name: "ソフトウェア・ハッキングの管理" #Independent rival
 cyber.425.desc: "組織的な攻撃により、 複数のハッカー集団があらゆるサイバネティック・インプラントを制御するコアソフトウェアへのアクセスを手にした。 ハッカーたちは要求に応じなければ、 コードを公開すると脅迫してきている。\n\nこれまでのところ、 我々に彼らの決意を疑う理由はない。 コードが公開されれば、 それを書き換える他に選択肢はない。 そうなれば、 我々の強化施術活動に壊滅的な打撃を与える遅延が発生することになる。"
 cyber.425.a: "望みの額を支払おう。"
 cyber.425.b: "ソフトウェアを書き換えよう。"
 cyber.425.b.tt: "§Y1§!年間、 §Y$situation_cyberization$§!の状況進捗速度：§R-25%§!"
 cyber.425.c: "奴らがどうでるか見てみたい。"
 cyber.425.c.tt: "幸いにも、 最高のハッカーたちは我々が雇っている。"
 cyber.430.name: "頼りにならない強化施術" #Independent rival escalation
 cyber.430.desc.demands: "セキュリティ突破の犯人であるハッカー集団に多額の身代金を支払ったものの、 昨日の深夜、 最重要である我々のコードベースがあらゆる情報公開ネットワークにアップロードされてしまった。 リークの前にアップロードされた不愉快な画像は攻撃を防ぐことができなかった我々を嘲笑するものだ。\n\n世論は既に批判的になっており、 サイバネティック・インプラントの「購入者の後悔」は大きく増加した。"
 cyber.430.desc.protest: "インプラント制御ソフトウェアの書き換えには時間と労力を要し、 生産に遅れが生じた。\n\n人々は最新の強化施術にさらに依存するようになり、 多くの者が製品発表の遅れについて街頭抗議を行っている。"
 cyber.430.a: "新製品はすぐに発表される。"
 cyber.430.b: "無視しろ。"
 cyber.430.c.demands: "ハッキング対策を開始しろ。"
 cyber.430.c.protest: "抗議者たちを撃退しろ。"
 cyber.21.name: "強化施術を受けた人々" #Situation 1 - Last event
 cyber.21.desc: "今日、 我々の社会は転換期を迎えた。 完全一体型の機械パーツによる肉体の強化ができるようになったのだ。\n\nその過程には困難があり、 その変化は決して容易いものではなかった。 しかし道中に失ったものが何であれ、 我々の新たな体は無限の可能性を秘めている。"
 cyber.21.a: "我々はより強くなるだろう。"
 cyber.21.a.start: "§Y$building_augmentation_center$§! の補正を追加：$TABBED_NEW_LINE$"
 cyber.21.a.end: "伝統ツリーの効果を完全にアンロック：['tradition_category:tradition_cybernetics']"
 cyber.21.a.gov.tt: "$cyber.21.a.start$$cyber_control_government_effects$\n$cyber.21.a.end$"
 cyber.21.a.cor.tt: "$cyber.21.a.start$$cyber_control_corporate_effects$\n$cyber.21.a.end$"
 cyber.21.a.ind.tt: "$cyber.21.a.start$$cyber_control_independent_effects$\n$cyber.21.a.end$"
 ### CYBERIZATION SITUATION END ###
