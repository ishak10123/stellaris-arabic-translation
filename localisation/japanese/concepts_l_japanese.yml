 #Plural 3: -
 concept_war: "戦争"
 concept_wars: "戦争"
 concept_subjugation_war: "従属化戦争"
 concept_total_war: "総力戦"
 concept_war_desc: "§H$concept_war$§!は帝国間の正式な武力衝突であり、 ['concept_claims']の強制、 不満の解消、 銀河秩序の再編成など特定の目的を追求するために行われる。 戦争は§H開戦事由§!によって正当化され、 それに応じて目的や許容される結果が決まる。\n\n戦争が終結するのは、 一方が他方の条件を受け入れて降伏した場合か、 その時点で占領している星系のみを獲得する§H現状追認§!の['concept_peace']合意に至った場合である。 戦争が長引くと§H戦争疲弊§!が蓄積され、 対立を終わらせる圧力が高まる。 戦争は多大なコストを伴うものの、 帝国の命運を左右する決定的な手段である。"
 #Singular: ['concept_peace'] or §H$concept_peace$§!
 #Plural: -
 concept_peace: "平和"
 concept_peace_desc: "§H$concept_peace$§!は帝国間の戦闘の正式な停止であり、 通常は戦争目標の実施、 領土交換、 または新たな政治協定の実施を伴う。 平和は降伏によって強制されることもあれば、 双方の疲弊によってもたらされることもある。\n\n平和の条件は、 戦後の秩序を形作り、 国境を定め、 帝国を従属させ、 将来の紛争の火種をまくこともある。"
 #Singular: ['concept_galactic_community'] or §H$concept_galactic_community$§!
 #Plural: -
 concept_galactic_community: "銀河共同体"
 concept_galactic_community_desc: "§H$concept_galactic_community$§!は加盟帝国によって構成される銀河規模の立法機関。 協力関係を促進し、 銀河全体の規範を定め、 共通の脅威に対処することを目的とする。 決議の提案と可決を通じ、 加盟国に対してソフトパワーを行使し、 ['concept_war']、 商業、 社会的価値観を銀河規模で統制する。\n\n帝国は['concept_envoys']を任命し、 ['concept_diplomatic_weight']を蓄積することで、 共同体内における影響力を獲得できる。 銀河共同体は表向きは団結のための組織であるが、 実際には競争、 裏取引、 集団統治という名目下での覇権追求の舞台となることが多い。"
 #Singular: ['concept_galactic_council'] or §H$concept_galactic_council$§!
 #Plural: -
 concept_galactic_council: "銀河理事会"
 concept_galactic_council_desc: "§H$concept_galactic_council$§!は['concept_galactic_community']に置かれるエリート統治機関。 ［concept_diplomatic_weight］を通じて最も強い影響力を持つ加盟帝国によって構成される。 理事会の構成員は、 緊急措置の提案、 決議に対する拒否権の行使、 銀河全体の議題の主導などの特権を行使する。\n\n理事会の議席は数に上限があり、 変更される場合もある。 構成員は相対的な外交力に応じて決定される。 銀河理事会は銀河の秩序を守ることを目的とするが、 野望が渦巻き、 強者が支配力を強め、 弱者がそれを打破しようと画策する場となることも多い。"
 #Singular: ['concept_favor'] or §H$concept_favor$§!
 #Plural: ['concept_favors'] or §H$concept_favors$§!
 concept_favor: "好意"
 concept_favors: "好意"
 concept_favor_desc: "§H$concept_favors$§!は外交手段の一つであり、 ある帝国が別の帝国に対して負う影響力の負債を表す。 多くの場合、 銀河の出来事への参加を通じて獲得され、 §H$concept_galactic_community$§!や、 より広範な外交の場において政治的な通貨として機能する。\n\n好意は投票に影響を及ぼしたり、 外交的な提案を強化したり、 交渉で有利な立場に立つために使用できる。"
 #Singular: ['concept_diplomatic_weight'] or §H$concept_diplomatic_weight$§!
 #Plural: -
 concept_diplomatic_weight: "外交発言力"
 concept_diplomatic_weight_desc: "§H$concept_diplomatic_weight$§!は['concept_galactic_community']における帝国の影響力を表す指標であり、 決議に対する票の重みや、 ['concept_galactic_council']の参加資格を決定する。 指標は帝国の経済力、 技術力、 軍事力、 共同体に派遣された['concept_envoys']の数に基づき算出される。\n\n外交発言力は時とともに変動する可能性があり、 帝国の立ち位置を反映するだけでなく、 その利益を推進するための手段としても機能する。"
 #Singular: ['concept_first_contact'] or §H$concept_first_contact$§!
 #Plural: ['concept_first_contacts'] or §H$concept_first_contacts$§!
 concept_first_contact: "ファーストコンタクト"
 concept_first_contacts: "ファーストコンタクト"
 concept_first_contact_desc: "§H$concept_first_contact$§!とは、 それまで互いの存在を知らなかった文明同士が初めて遭遇することを指す。 その結果、 当事者の性質や気質に応じて['concept_diplomacy']、 疑念、 または紛争へと発展する可能性がある。\n\n§H$concept_first_contact$§!の過程では、 異星生命体の通信を解読し、 起こり得る事態に適切に対処し、 未知の存在に対する帝国の姿勢を決定する必要がある。"
 #Singular: ['concept_workforce'] or §H$concept_workforce$§!
 #Plural: -
 concept_workforce: "労働力"
 concept_workforce_desc: "§H$concept_workforce$§!は£colony£ ['concept_colony']の集合的な労働力を表し、 帝国の機能維持に必要なさまざまな仕事を遂行できる者の数を反映している。\n\n£pop£ ['concept_pops']は、 ['concept_species']、 社会階層、 ['concept_ethics']などの共通点に基づいてグループ化されている。 各グループは惑星の§H$concept_workforce$§!に貢献し、 その労働力は空きのある£job£ ['concept_jobs']に割り当てられる。"
 #Singular: £zone£ ['concept_district_specialization'] or £zone£ §H$concept_district_specialization$§!
 #Plural: £zone£ ['concept_district_specializations'] or £zone£ §H$concept_district_specializations$§!
 concept_district_specialization: "$planet_zone$"
 concept_district_specializations: "$planet_zones$"
 concept_district_specialization_desc: "区域特化は各£district£ ['concept_district']によって提供される£job£ ['concept_jobs']を決定する。 多くの場合、 追加の£building£ ['concept_buildings']を建設するための空間も提供される。"
 concept_district_specializations_desc: "$concept_district_specialization_desc$"
 #Singular: -
 #Plural: £strategic_resource£ ['concept_strategic_resources'] or £strategic_resource£ §H$concept_strategic_resources$§!
 concept_strategic_resources: "戦略資源"
 concept_strategic_resources_desc: "£strategic_resource£ §H$concept_strategic_resources$§!は高度な技術、 インフラ、 および宇宙船システムに不可欠な希少で強力な物質である。\n\n£volatile_motes£ §H$volatile_motes$§!、 £exotic_gases£ §H$exotic_gases$§!、 £rare_crystals£ §H$rare_crystals$§!などを含む。\n\n§H希少資源§!は特に価値が高く、 または専門的な用途を持つ物質だ。 希少資源と戦略資源は['concept_civilian_ships']、 ['concept_military_ships']、 ['concept_starbases']、 ['concept_megastructures']の建設に使用される。$tt_gain$- £zone£ §H$zone_industrial_plural$§!または£zone£ §H$zone_foundry_plural$§!を建設する\n- 関連する建造物を建設する\n- $tt_market$"
 concept_strategic_resources_tooltip: "$concept_strategic_resources_desc$\n\n§G['concept_strategic_resources']をクリックしてデータバンクを開く\nメニューの£strategic_resource£ をクリックしてリストを展開する§!"
