 origin_cybernetic_creed: "サイバネティクス信条"
 origin_cybernetic_creed_desc: "§R警告：['concept_cybernetic_ascension']§!以外のアセンションパスを辿ることができなくなる。\n\nこの帝国は、高貴な肉体と聖なるサイバネティクスの融合という神聖な召命を追求している。強化は崇拝である。"
 origin_tooltip_cybernetic_creed_effects: "- $HOMEWORLD$の初期建造物が['concept_cybernetic_creed_infrastructure']と入れ替わる $NEW_LINE$- ['concept_cybernetic_creed']派閥がゲーム開始直後に結成される\n- ['trait:trait_cyborg_ritualistic_implants']の$SPECIES_TRAITS$\n- $GUARANTEED_RESEARCH_OPTION_STRING$ ['concept_integrated_cybernetics', £engineering£ $tech_integrated_cybernetics$]\n- ['concept_cybernetic_creed_jobs']の職業枠"
 START_SCREEN_CYBERNETIC_CREED: "我々の崇高な使命は、 [Owner.Species.GetFleshTypeCyberCreed]と機械の一体化である。 我々の歴史は失敗した試みに満ちているが、 神聖な意志に導かれ、 儀式用インプラントとの神聖な共生の第一段階を達成した。\n\n我々は無限のサイバネティクスの可能性に触れ始めたに過ぎない。 より高度な強化はまだこれからやってくる。\n\nにもかかわらず、 我々の信仰は分裂しており、 聖なる強化の最終的な目標について、 競合する信条が論争している。 ひとたびこの問いの答えがわかれば、 聖なる[Owner.Species.GetFleshTypeCyberCreed]と祝福された技術の完璧な融合によって、 進化の限定された設計を改善することができるだろう。\n\n$machine_age.1090.pray$"
