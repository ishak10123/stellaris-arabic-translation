 machine_age.1100.name: "信仰の未来"
 machine_age.1100.desc: "今日、 我々は肉体や魂だけでなく、 信仰においても完全に融合してここに立っている。 教義的な信条はもはや支配力を持たない。 神聖な融合は、 すべての信徒にとって個人的な旅となる。\n\n$machine_age.govswapnotice$\n\n$machine_age.1090.pray$"
 machine_age.1100.a: "融合した[Owner.Species.GetFleshTypeCyberCreed]と同じく我々の信仰は一つとなった。"
