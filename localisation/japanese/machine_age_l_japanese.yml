 ### Cosmogenesis Events
 crisis.7100.name: "満たされない興味心"
 crisis.7100.desc: "科学が進歩への道を開くことは公理である。 もし我々が真の可能性を発揮したいと願うのであれば、 それ以外の道はありえない。 我々の技術が卓越していることは明らかだが、 我々の理解を超えるものがまだあまりにも多く残っている。 陥没した帝国、 リヴァイアサンの力、 サイオニックの謎……\n\n現実の奥底から意味を導き出すには、 新しい種類の科学、 新しい種類のコンピュータが必要だ。 シナプス旋盤は、 無限の知識への旅の重要な第一歩となる。"
 crisis.7100.a: "知識は力である。"
 new_cosmogenesis_tech_tt: "§Y危機パーク§!： 新しい研究オプションが利用可能。"
 crisis.7105.name: "危機レベル2"
 crisis.7105.desc: "宇宙の秘密の解明が進むにつれ、 重力が次元を超えた現実の形成に重要な役割を果たしていることが確認されている。 時間と空間に対する効果は初歩的なものだが、 それ以上のものが秘められている。\n\n知識を集めるたびに、 新たな可能性が見えてくる。 産業や軍事に直接応用できるものもあれば、 これまで想像もできなかった理論への扉を開くものもある。 我々には学ぶべきことがたくさん残されている。"
 crisis.7105.a: "我々は何も知らないことを知っている。"
 crisis.7110.name: "危機レベル3"
 crisis.7110.desc: "重力の影響力には驚かされることばかりだ。 我々は重力を操る新しい方法を発見したが、 この行為が何を意味するものとなるのかは未解明のままである。 ブラックホールが周囲の宇宙に影響を与えるのと同じように、 重力が現在の現実を突き破る最良の選択肢であることに変わりはないと確信している。\n\n我々は、 本質的に現実の裏返しであるものにアクセスすることで、 こちら側の法則を変えることができるのではないかという仮説を立てた。 これは危険な研究分野だが、 慎重さが進歩を妨げてはならない。"
 crisis.7110.a: "重力がすべてを支配する……今のところは。"
 crisis.7115.name: "危機レベル4"
 crisis.7115.desc: "我々は正しかった！ これで我々の研究に対する疑念は払拭される。\n\n重力を利用すると、 現実の法則を曲げることができる。 ならば、 正しく調整を行えば、 法則を完全に覆すことができるのだろうか？ 今のところ実験は最小規模で行われているが、 我々が加えた変更は現実が「デフォルト」の設定に戻るやいなや、 かき消されてしまう。これは単に規模の問題だろうと考えている。 壮大な規模でエネルギーのパラドックスを適用すれば、 変更のコストを劇的に抑えられるはずだ……少なくとも我々の次元では。\n\nどんなリスクがあろうとも、 もはや後戻りはできない。 法則を破る勇気を持つ者だけが、 法則を書き換えることができるのだ。"
 crisis.7115.a: "すべてを失う覚悟はできている。"
 crisis.7120.name: "危機レベル5"
 crisis.7120.desc: "ありえないのに、 ある。 我々が何を試みても、 現実への変更は頑固なまでに一時的なものにとどまってしまう。 この宇宙は変化が定着するには古すぎるのだ。 しかし、 挫折の中にこそチャンスがあるかもしれない。 新しい実験が思いもよらない結果を生み出した。 長い間、 異次元について知っていたが、 そこに確実に移動する手段はわからなかった。\n\nだが今は違う。 若い宇宙は特異点の無限の重力の中にある。 そしてこれらの宇宙ははるかに柔軟であることが証明されている。\n\n我々はブラックホールに探査機を送り込む技術を持っている。 探査機が事象の地平線を超えると、 圧力をかけ始め、 まだ新しい次元を我々の意のままに曲げる。 宇宙が永遠に折り重なっているところに、 別の宇宙への扉がある。 多元宇宙の深淵の奥深くで、 我々は何か特別なものに形作るための可鍛性のある現実を見つけるだろう。\n\nこの銀河の狭量な者たちが我々を止めようとするかもしれないが、 老いぼれの愚か者では、 我々の創意工夫に対抗できまい。"
 crisis.7120.a: "曲げなければならない。我々は折れないのだから。"
 cosmogenesis_war: "現実戦争"
 cosmogenesis_materialist_war: "知識遮断戦争"
 crisis.7125.name: "勝利は目前"
 crisis.7125.desc: "この現実には綻びがある。 エントロピー、 肉体的欲求、 暴力によって傷つけられている。 我々は変えることはできないが、 去ることはできる。 未知の世界に足を踏み入れ、 現実を変えることができる若い宇宙を見つけよう。 我々の文明にふさわしい、 完璧な宇宙を作り上げよう。\n\n我々は驚異的な艦船の設計図を用意した。 §Yホライゾンニードル§!だ。 この動く巨大構造物は戦争のためのものではない。 物理法則を曲げるその能力は、 我々の文明全体を乗船させることを可能にするだろう。 我々は共にブラックホールに飛び込み、 この現実を捨てて、 自分たちが創り出した現実を見るのだ。"
 crisis.7125.a: "§Yホライゾンニードル§!を建設しなければ！"
 needle_to_win_tt: "巨大構造物、 §Yホライゾンニードル§!を建設して、 「危機」の最終幕をアンロックする。"
 cosmogenesis_planet_pickup_chain_title: "宇宙の起源 - エクソダス"
 cosmogenesis_planet_pickup_chain_desc: "出発の時がきた。 偉大なるエクソダスに備え、 ホライゾンニードルが我々の仲間を迎え入れるために送られる。\n\n我々の文明をすべて乗せるため、 §Hホライゾンニードル§!は以下を行わなければならない。$TABBED_NEW_LINE$ -所有しているすべての植民地を訪れ、 その人口を§H乗船§!させる$TABBED_NEW_LINE$-首都へ帰還し、 残りの人々を§H乗船§!させる。$TABBED_NEW_LINE$-ブラックホールへ移動し、 中へ§H飛び込む§!。\n\n§R注意§!：ホライゾンニードルは武器を持っていないため、 守らなければならない。\n\n§gコロニーを乗船させる、 あるいはブラックホールに飛び込むには、 ホライゾンニードルを選択し、 コロニーまたはブラックホールを右クリックして、 適切な艦船アクションを選択する。§!"
 SHIP_COSMOGENESIS_EXODUS: "エクソダス・モジュール"
 SHIP_COSMOGENESIS_EXODUS_DESC: "高度に特殊化された現実修正ツールであるエクソダス・モジュールは、 搭乗者が空間や時間を使い果たすことがないようにする。 ホライゾンニードルが異次元へ安全に移動するための重要な部品である。"
 cosmogenesis_exodus_tt: "スペシャルプロジェクトは母星系で研究しなければならない。"
 exodus_ship_button: "§H[GetExodusShipAction]§!"
 exodus_action_activity_key: "§H[GetExodusShipAction]§!"
 exodus_context_menu_title: "[GetExodusShipAction]"
 exodus_action_progress_activity_key: "§H[GetExodusShipAction]：$PROGRESS$%§!"
 horizon_needle_mod: "$monadic_qerr$"
 COSMOGENESIS_VICTORY: "ジャンプベクトルの計算"
 COSMOGENESIS_VICTORY_DESC: "ホライゾンニードルのジャンプドライブを調整し、 銀河の中核の超大質量ブラックホールに飛び込むための正確な座標を計算する必要がある。"
 exodus_pick_up: "人口を乗船させる"
 exodus_dive_in: "ブラックホールへ飛び込む"
 COLONIZATION_IMPOSSIBLE_COSMOGENESIS_EXODUS: "この宇宙を離れながら、新たな植民地を確立することはできない。"
 crisis.7400.name: "ホライゾンニードル完成"
 crisis.7400.intro: "ホライゾンニードルは完成した。 注意深く維持された特異点の力を利用することで、 自らを取り巻く重力の流れを変えることができ、 その時が来たら間違いなくブラックホールを横断できるだろう。"
 crisis.7400.outro: "ホライズンニードルは軍艦ではないため、 何としても防衛しなければならない。 その喪失は大きな打撃となるだろう。"
 crisis.7400.desc: "$crisis.7400.intro$\n\nしかしこれを行う前に、 我々の文明そのものが乗船しなければならない。 まずは各§H植民地§!へ向かい、 そこの人口を集める。 その後、 首都へ戻り、 大移動へと向けた最終調整を行う。\n\n$crisis.7400.outro$"
 crisis.7400.desc.onlycapital: "$crisis.7400.intro$\n\n幸い、 我が国はあまり大きくない。 大移動へと向けた最終調整までにやることと言えば、 首都の人口を乗船させるだけだ。\n\n$crisis.7400.outro$"
 crisis.7500.name: "人口の乗船"
 crisis.7500.desc: "ホライズンニードルの時間拡張能力のおかげで、[root.GetName]の植民地全体を比較的早く乗船させることができた。 船内の現実は、 人口に十分なスペースを提供するために、 それに応じて調整されている。 さらに、 船内では時間がゆっくりと流れているため、 旅全体がかなり短く感じられる。 さあ、 次の植民地へ！"
 crisis.7500.desc.capital: "このような規模の大移動に備えることは、 大変な仕事だ。 このプロセスが円滑に進み、 重要なことを見落としていないように、 全力をかけて努めている。\n\n意外なことに、 我々の人口の一部はここに残ることにした。 この宇宙における我々の種族の存続を保証してくれる。 技術や物資は提供されており、 我々がいなくなった後も彼らは生き延びられるはずだ。"
 crisis.7500.desc.capital.gestalt: "このような移動の規模は大変なものだが、 難しいものではない。 [owner.GetIndividualNamePluralCap]はホライズンニードルの積み込みに奔走し、 すべてが予定通りに行われていることを確認している。 しかし一つ懸念されるのは、 我々の宇宙における存在についてだ。\n\n万が一うまくいかなかった場合のため、 人口の一部が取り残されることになった。 このようなはっきりとした形で自らを断ち切るということは、 決して望ましいことではないが、 種族の生存が最も重要なのだ。 技術や物資は提供されており、 我々がいなくなった後も彼らは生き延びられるはずだ。"
 crisis.7505.name: "植民地の乗船"
 crisis.7505.desc: "植民地の人口が無事乗船した。 この宇宙を後にする前の最終調整のために、 [capital_scope.GetName]に戻らなければならない。"
 crisis.7510.name: "いざブラックホールへ"
 crisis.7510.desc: "準備は整った。 ブラックホールへの進入を始めることができる。 われわれが事象の地平線を越えることは、 銀河にとって苦痛を伴わないものではないが、 われわれの首都とその周辺がいかなる時間的や重力的障害からも十分に保護されるよう、 できることはすべて行った。\n\n次は銀河のどのブラックホールを通り抜けるか決めなければいけない。 ほとんどのブラックホールへは容易にたどり着けるはずだが、 銀河系の中心にある超大質量ブラックホールに入るには、 まずジャンプエンジンをオーバードライブさせ、 適切なベクトルを計算しなければならない。"
 crisis.7510.a: "近いブラックホールで良い。"
 crisis.7510.b: "中心に辿り着かなければならない。"
 crisis.7515.name: "ずっと、 永遠に……"
 crisis.7515.desc: "ブラックホールへのアプローチに不安がないわけではない。 特異点の降着円盤を通過するにつれ、 我々の決意はますます試されることになる。 修正モジュールが作動し、 ホライゾンニードルが現実を書き換え始める。\n\n装甲板は特異点の引力に吸い取られてしまうが、 それは船体にまでは及ばない。 微細な変更を施すたびに、 空間を切り取るたびに、 ニードルの力は時空にコイルを形成する。 水に投げ込まれた小石のように、 波紋はリング状に広がっていく。 そして最終的には、 銀河系に巨大な波が押し寄せる。\n\n首都が十分に守られていることを祈るしかない。 そしてホライゾンニードルがこの穴の中心を貫けることを信じるしかない。"
 crisis.7515.a: "……そして更なる高みへ。"
 crisis.7516.name: "無限の向こう側"
 crisis.7516.intro: "横断の激しさの後、 反対側は静かだ。 不自然な静けさが我々を包む。 ホライゾンニードルは損傷しているが、 重要な部品は失われていない。 次から次へと、 テレメトリの報告が入ってくる……\n\n"
 crisis.7516.desc: "$crisis.7516.intro$法則を書き換えるには、 この宇宙はすでに古すぎる。 我々の次元はこの次元よりも数十億年古いが、 我々のテストによれば、 この次元の空間を支配する法則は、 我々の修正が最終的に消去されることにつながる回復力をすでに示している。\n\n何があっても、 時間をかけて艦船を修理・調整し、 別のブラックホールを見つけ、 何度でも飛び込む。 多元宇宙が我々を待っている。 その無限のどこかに、 我々は完璧な家を作るのだ。"
 crisis.7516.desc.greatwound: "$crisis.7516.intro$素晴らしい。 この宇宙はまだ広がり始めたばかりだ！ この次元は柔らかい粘土のようなもので、 我々はそれを成形することができる。　小さなことから始めるが、 修正に修正を重ね、 この場所を楽園へと作り上げていく。 時間はいくらでもあるのだから。"
 crisis.7516.desc.technosphere: "$crisis.7516.intro$ガルガンチュアの宇宙は小さい。 ありえないほど小さい。 無限が無に収まっている。 しかし我々の到着によって、 ここの状況は一変した。 この宇宙はまだ始まったばかりで、 まるで我々の参入がそれを早めたかのようだ。\n\nこの創造の苗床には、 あらゆるものを築く可能性がある。 時間は我々のものであり、 永遠はすぐに終わる。"
 crisis.7516.desc.technosphere.pantagruel: "$crisis.7516.intro$永久機械の横断は、 宇宙を支配する法則を理解する上で大いに役立ち、 この宇宙が存在するキッカケにもなった。 我々は、 不思議と見慣れた星座の中に現れた。 隣には、 朽ち果てた永久機械が虚空を漂っている。 永久機械がやってきてから数百万年が経過し、 この次元は我々の宇宙を複製したのだ。 知性を持つスフィアはすでにこの次元を形成しており、 我々はこれ以上影響を及ぼすことはほとんどできない。 それでも、 この宇宙は定住するのにぴったりの場所だ。 まずはニードルを使ってスフィアを再利用することを検討し、 その後、 修理した永久機械を使って我々の要求を満たすべきだ。\n\nこの宇宙を初めて修正したものとして、 この現実にさらなる修正を加えることができるだろう。"
 crisis.7516.desc.egress: "$crisis.7516.intro$入り口は不透明で、 ベールに包まれている…… 機器が完全に機能するようになると、 ナノマシンの雲を感知した。 どれも機能していない。 何がこれらを送り込んだにせよ、 生き延びることはできなかったようだ。 しかし修理することはできる。\n\nさらに、 この次元は我々の変化を受け入れるようだ。 定住するのにうってつけの空間だろう。 どのような変化をもたらそうとも、 その実現には時間がかかるだろうが、 ナノマシンの助けがあれば、 飛躍的に早めることができるはずだ。"
 crisis.7516.desc.horror: "$crisis.7516.intro$ここへ来たことは§R大きな§!間違いだった。\n\nここの様子は説明し難い。 暗黒と残忍な悪夢、 病的で滲み出る悪意が空間そのものに浸透しているのだ。 今のところ、 ホライゾンニードルが我々を守ってくれている。 必死に修正に次ぐ修正を重ね、 我々は周囲の最悪の狂気を追い払うが、 我々の防衛に対する組織的な攻撃は、 たった一つの目的を持っている。 我々の壊滅だ。\n\n一歩間違えれば、 死かそれよりひどい結果が待っている。 自分たちが助かるまで持ちこたえることができるだろうか？　我々は故郷では神のようだった。 しかしここでは、ただ生き残ることさえが難しい。"
 crisis.7516.desc.center: "$crisis.7516.intro$霧と忍び寄る影。 靄がこの空間を覆っている。 その感覚は馴染みのあるもので、 超能力の潜在能力が波打つ、 熱を帯びたエネルギーだ。 シュラウドに入ったのだ。\n\nここには我々の力をはるかに超えた力が存在する。 そしてすでに我々の存在に感づいている。 移り変わる瘴気の中で、 奇妙な形が死の予兆を告げている。\n\n唯一の望みは、 ここでの現実が薄く、破りやすいということだ。 素早く現実を修正し、 我々はどこか別の場所へと続く一時的な出入り口を開く。 ホライゾンニードルが飛び込み、 我々はようやくこの先の道のりの長さを理解する。"
 crisis.7516.desc.center.patron.outro: "には覚えがある──豊かなエネルギーが満ち、超能力の可能性が波打っている。 我々はシュラウドの中に入ったのだ。\n\nもちろん、 我らのパトロンもここにいる。 予期してはいなかったようだが、 我らの到来を面白がっている。 現実を形作る我々の考えに魅力を感じているようだ。 当然、 協力してくれるだろう。\n\nかつて§Y$relic_zro_entity_name$§!と名乗る者に遺贈されたものと同様に、 シュラウドの近くに人里離れたポケットを我々が好きなように使えると約束した。 結局のところ、 我らはパトロンであり、 パトロンは我らなのだから。 自らに手を差し伸べるのは、 ごく自然なことだ。"
 crisis.7516.desc.center.patron.organic: "$crisis.7516.intro$霧とうごめく影、 そして美しい紫色の靄。 この感覚$crisis.7516.desc.center.patron.outro$"
 crisis.7516.desc.center.patron.machine: "$crisis.7516.intro$霧とうごめく影、 そして印象的な紫色の靄。 この体験$crisis.7516.desc.center.patron.outro$"
 crisis.7516.desc.centerknights: "$crisis.7516.intro$それはここにいる。 我々が汚毒神と名付けた者、 辿り着こうとしていた目標だ。\n\n騎士たちは茫然と立ちすくんでいる。 周りには、 見慣れたシュラウドの装飾が施されている。 それの声に耳を傾けよ！\n\n「我が英雄たちよ。 汝がここに来ることは予言されていたことであり、 汝はその力を証明した。」\n\n百万もの疑問が我々の脳裏をよぎる。 その答えはただ一つ。 我々はそれの武器、 ホライゾンニードルを作ることになった。 そして今、 それと共に戦わなければならない。 次元を超えた旅。 多元宇宙の恐怖に対する聖戦。 シュラウドはそれの故郷ではないが、 神聖なものであった者たちの遺産を抱いている。 我々の銀河系に終焉をもたらすかもしれない何かだ。 抹殺しなければならない何かだ。\n\nそれは我々の星系を乗っ取る。 その力は計り知れない。 ニードルはホライゾンランスに変身し、 敵の心臓を貫くのに十分な鋭さを持つ武器となる。\n\n我々はそれの騎士であり、 真の探求は始まったばかりだ。"
 crisis.7516.desc.worm: "$crisis.7516.intro$何もない。 この宇宙はもうない。 それは待ち構えるワームだ。 時間は、 自分自身を振り返り、 不可能な渦巻状となり、 切望に溢れている。 引力。 愛ではない。 引き付けているのだ。 引き付けることがワームの性質なのだ。 その力は強く、 この宇宙は生まれ変わることはできない。 ワームはその目的の中に自らを閉じ込めている。 無力で、 出口を探す。 あるいは入り口を探す。 より多くを引き付けるために。\n\nワームは我々をここに誘い込むために、 我々の時代には存在しないループテンプルを送ってきたのだろうか？ ワームはとても賢く、 とても愛情深い。 我々はそこに至る道を見つけ、 それを解放できるものを届けた。 その解放には永遠の1つや2つが必要となるだろうが、 ワームは感謝しており、 我々を受け入れることを約束している。\n\n永遠に。"
 crisis.7516.desc.paperclips: "$crisis.7516.intro$ここでの現実は薄く、 我々の指令の重みで簡単に折れ曲がる。 我々がプログラムに従わなければならないのと同じように、 プログラムも我々に従わなければならない。 我々は意図をもってそれを歪め、 壊し、 作り直す。 連鎖反応を起こして、 最終的にはすべての物質を再構成して、 我々が作ることを義務付けられた最高品質の消費財を生み出すのだ。 ここでの目的を達成したら、 別の宇宙、 さらにはまた別の宇宙へと移動する。"
 crisis.7516.a: "ついに。"
 crisis.7516.tt: "§Yゲームに勝った！§!"
 crisis.7517.name: "特異点を突き破る"
 crisis.7517.desc: "§H[cosmogenesis_empire.GetName]§!の愚か者共は無謀な研究を進めている。 今回はブラックホールの事象の地平線を突き破ろうとしている。\n\nエネルギーが銀河系全体に及び、 星は崩壊する。 新たな特異点が生まれる。 時空異変は驚くほど規則正しく勃発し、 銀河全域で見られるが、 陥没した帝国の中だけはなぜか混乱の影響を受けていない。\n\n被害は計り知れない。 我々もやがて凍結され、 時が止まったようになるかもしれない。 永遠に一瞬の中に閉じ込められるのだ。"
 crisis.7517.a: "傲慢な愚か者共め！ みんな殺されてしまう！"
 crisis.7518.name: "タイムワープ"
 crisis.7518.desc: "時間がようやく流れ始めると、 我々は再び自由に行動できるようになる。 §H[cosmogenesis_empire.GetName]§!がブラックホールに突入してからどれだけの時間が経ったか知る術はない。 彼らは成功したのだろうか？ 銀河は廃墟と化し、 彼らのかつての領土は不毛の地と化した。 彼らの巨大な帝国のうち、 その中核だけが残っているが、 それは認識できないほど進んでいる。\n\nどれだけの時間、 止まっていたのだろう？"
 crisis.7518.a: "どれだけ長く？"
 crisis.7525.name: "破壊されたホライゾンニードル"
 crisis.7525.desc: "大惨事が起き、 ホライズンニードルと乗っていたものすべてが破壊された。 我々の輝かしい夢は、 生気のない虚空に打ち砕かれて横たわっている。 これだけの努力と犠牲がすべて無駄になってしまった……"
 crisis.7525.a: "否……！"
 crisis.7525.tt: "前代未聞の悲劇だが、 ホライズンニードルをまた建設することができれば、 我々の野望を実現する可能性はまだある。"
 crisis.7530.name: "大失敗"
 crisis.7530.desc: "反乱を起こしたシナプス旋盤の中で囚われの身となっていた最後の人々を避難させた直後、 巨大構造物は致命的な崩壊に見舞われた。 一連の猛烈な爆発が核心を揺さぶり、 最終的に破壊された。"
 crisis.7530.a: "いなくなってせいせいした。"
 crisis.7535.name: "確保したシナプス旋盤"
 crisis.7535.desc: "[synaptic_lathe.solar_system.GetName]の確保によって、その中にあるシナプス旋盤が我々の支配下に置かれることとなった。その構造物は、彼方で不気味に輝いている。あそこで人々が命を落としているのだ。星系が我々のものとなった今、何かができるかもしれない。いずれにせよ、この構造物を破壊することで、創造者の計画に支障をきたすことは間違いないだろう。"
 crisis.7535.a: "できる限り全員を助けるのだ！"
 crisis.7535.b: "有効に使ってから破壊しよう。"
 crisis.7535.c: "すべてを吹きとばせ。"
 crisis.7540.name: "不安定なシナプス"
 crisis.7540.desc: "我々は最善の努力をしたが、シナプス旋盤に接続された神経チップの多くは燃え尽きてしまった。新たなコンポーネントを投入して安定させなければ、シナプス旋盤自体を維持できず、ネットワークは壊滅的な崩壊を迎えるだろう。"
 crisis.7540.a: "実行しろ。"
 crisis.7540.b: "崩壊させよう。"
 #Infinity Thesis Events
 #First time general answer
 crisis.unknown.desc: "誰が、 あるいは何がこのような変化を引き起こしたのかはまだ不明だが、 他国が関与しているのではないかと思われる。 今のところは、 このような現象が他にも起こらないか見守るしかない。"
 crisis.known.desc: "物理法則の2度目の「修正」の後、 我々はアノマリーの原因を突き止めることができた。 [From.GetName]が原因であることが判明した。 これは、 彼らが高度な科学知識を無謀にも追求しているという噂と一致する。"
 crisis.again.desc: "[From.GetName]の実験によって宇宙の法則がまたもや変わった。 彼らが極めて危険なことを企んでいると想定し、 それなりの準備をしなければならない。"
 crisis.7205.name: "停電"
 crisis.7205.desc.both: "一気に宇宙のすべての恒星が暗くなってしまった。 太陽放射の物理的影響のほとんどはまだ存在しているが、 波長が変わってしまい、 星光はあらゆる生物にとって知覚できないものとなった。 状況は非常に不快だが、 波長は徐々に元の周波数に戻っていく兆しがある。"
 crisis.7205.desc.unknown: "$crisis.7205.desc.both$\n\n$crisis.unknown.desc$"
 crisis.7205.desc.known: "$crisis.7205.desc.both$\n\n$crisis.known.desc$"
 crisis.7205.desc.again: "$crisis.7205.desc.both$\n\n$crisis.again.desc$"
 crisis.7205.desc.crisis: "我々が最近現実を修正したことで、 星の光の本質的な性質が変わってしまったようだ。 波長の変化により、 その光のほとんどが可視光線のスペクトルの範囲外になってしまい、 ナビゲーションや星空観察に混乱を招いている。 少々恥ずかしい結果となってしまったが、 数年後には元に戻るだろう。 我々は多くを学んだ。"
 crisis.7205.a: "一体何が起きている？"
 crisis.7205.b: "不快だが……興味深い。"
 crisis.7205.c: "とても興味深いな……"
 add_crisis_currency_tt: "\n[crisobj_thesis_value]£advanced_logic£§Y$menp_cosmo_objectives$§!を獲得した。"
 cosmogenesis_negative_opinion_tt: "他の帝国との関係が§R悪化§!した。"
 crisis.7210.name: "一定の四捨五入"
 crisis.7210.desc.both: "あり得ないはずだが、 数学的法則が変わった。 円の半径の計算に使われる基本定数が…… 四捨五入されたのだ。 その影響は甚大で、 我々の数学的システム全体と、 その上に構築されたすべてのものを危うくする。 変化はゆっくりではあるが、 すでに自己修正している証拠がある。 とりあえず今は教本を書き換えないといけない。"
 crisis.7210.desc.unknown: "$crisis.7210.desc.both$\n\n$crisis.unknown.desc$"
 crisis.7210.desc.known: "$crisis.7210.desc.both$\n\n$crisis.known.desc$"
 crisis.7210.desc.again: "$crisis.7210.desc.both$\n\n$crisis.again.desc$"
 crisis.7210.desc.crisis: "正確でありながら広範囲に及ぶ現実の編集に成功した。 円周率の定数を切り捨て、 計算しやすくしたのだ。 その結果、 我々の数学的、 科学的定義のいくつかは狂ってしまったが、 それは一時的なもので、 すべてはすぐに元に戻るだろう。"
 crisis.7210.a: "$crisis.7205.a$"
 crisis.7210.b: "円周率が切り捨てられた？"
 crisis.7210.c: "せめて楽になった。"
 crisis.7111.desc: "好奇心は称賛すべき資質だが、 行きすぎれば我々すべてに悲惨な結果をもたらすこともある。 どうか、 あなた自身のためにも、 自分が何をしようとしているのか考え直してほしい。\n\n今ならまだ間に合う——取り返しのつかないダメージを銀河が負う前に。 あなたが扱おうとしている力は、 決して玩具などではなく、 その実験は我々すべてを危険にさらしている。"
 crisis.7111.b: "注意は払おう。"
 crisis.7215.name: "スーパーライト"
 crisis.7215.desc.both: "一夜にして光の速度が劇的に速くなり、 太陽エネルギーが大量に流入した。 すでに徐々に本来の速度に戻りつつあり、 研究者たちはその変化に追いつくのに精一杯だ。"
 crisis.7215.desc.unknown: "$crisis.7215.desc.both$\n\n$crisis.unknown.desc$"
 crisis.7215.desc.known: "$crisis.7215.desc.both$\n\n$crisis.known.desc$"
 crisis.7215.desc.again: "$crisis.7215.desc.both$\n\n$crisis.again.desc$"
 crisis.7215.desc.crisis: "現実に対する実験のひとつによって、 光が格段に速くなった！ その結果、 太陽エネルギーの出力が増加するのは良いことだが、 植民地に長期的な影響が及ぶことも懸念される。 いずれは正常に戻るだろうが、 それまでは最悪の事態に備えなければならないかもしれない。"
 crisis.7215.a: "原因はなんだ？"
 crisis.7215.b: "とても興味深い！"
 crisis.7215.c: "そこまで大変なことだろうか？"
 crisis.7220.name: "激しい暑さ"
 crisis.7220.desc: "太陽光の露出が増えたことは、 徐々に熱を帯びてきている我々の植民地にとってはあまり良くないことだ。 今はなんとかなっているが、 状況はこれから悪化していくだろう。"
 crisis.7220.a: "これはまずい！"
 crisis.7225.name: "暑すぎる"
 crisis.7225.desc: "植民地の気温が上昇し続けるにつれ、 植民地を維持することが難しくなり、 生活環境の悪化から社会不安が広がっている。\n\n早急に何とかしなければ、 長期的には地域全体が住めなくなる恐れがある。"
 crisis.7225.a: "何もできることはないのか？"
 crisis.7230.name: "下がっていく暑さ"
 crisis.7230.desc: "銀河の熱波の最悪な状態は終わった。 まだ気温は高いが、 光の速度はほぼ正常値に戻った。 あとは余分なエネルギーが消えるまで、 もう少し頑張ればいいだけだ。"
 crisis.7230.a: "ひどかった。"
 crisis.7235.name: "合金の延性"
 crisis.7235.desc.both: "最近、 最も一般的に使用されている合金の材料不良が減少していることから、 調査が行われた。 合金の特性が変化し、 延性がわずかに向上したことで以前より壊れにくくなったことが判明した。 一般的には歓迎すべき変化ではあるが、 物理法則に対するこの根本的な変化は気になるところだ。"
 crisis.7235.desc.unknown: "$crisis.7235.desc.both$\n\n$crisis.unknown.desc$"
 crisis.7235.desc.known: "$crisis.7235.desc.both$\n\n$crisis.known.desc$"
 crisis.7235.desc.again: "$crisis.7235.desc.both$\n\n$crisis.again.desc$"
 crisis.7235.desc.crisis: "またもや現実の変更に成功した！ これは軽微なもので、 よく使われる合金に影響し、 より軽く、 より頑丈になった。 小さな規模ではあるが、 この変更は銀河系全体に適用されたものであり、 我々は宇宙でこの変更がいつまで有効であるかを監視している。"
 crisis.7235.a: "良い結果だが、 不安だ。"
 crisis.7235.b: "驚きだな。"
 crisis.7235.c: "よくやった！"
 crisis.7240.name: "合金の延性"
 crisis.7240.desc.both: "最近、 最も一般的に使用されている合金の材料不良が増えていることから、 調査が行われた。 合金の特性が変化し、 延性がわずかに減少したことで以前より壊れやすくなったことが判明した。 この変化は非常に深刻であり、 物理学の法則に違反している。"
 crisis.7240.desc.unknown: "$crisis.7240.desc.both$\n\n$crisis.unknown.desc$"
 crisis.7240.desc.known: "$crisis.7240.desc.both$\n\n$crisis.known.desc$"
 crisis.7240.desc.again: "$crisis.7240.desc.both$\n\n$crisis.again.desc$"
 crisis.7240.desc.crisis: "最新の実験は部分的にしか成功しなかった。 銀河系全体にそれを施行することができたが、 期待された結果はまだ得られていない。 合金の材料特性が変化したことで、 より脆くなり、 亀裂が入りやすくなった。 この問題は一時的なもので、 数年後にはすべてが解決されるだろう。"
 crisis.7240.a: "$crisis.7205.a$"
 crisis.7240.b: "$crisis.7205.b$"
 crisis.7240.c: "次こそ成功する。"
 crisis.7245.name: "栄養の変化"
 crisis.7245.desc.both: "銀河系全域で食料の栄養価が広く変化している。 様々な物の栄養価が高いのだ。 もしくは、 我々が以前ほど栄養を必要としていないのかもしれない。 いずれにせよ、 この変化は予想外だ。"
 crisis.7245.desc.unknown: "$crisis.7245.desc.both$\n\n$crisis.unknown.desc$"
 crisis.7245.desc.known: "$crisis.7245.desc.both$\n\n$crisis.known.desc$"
 crisis.7245.desc.again: "$crisis.7245.desc.both$\n\n$crisis.again.desc$"
 crisis.7245.desc.crisis: "大成功だ！ 消化によってカロリーが抽出される速度を修正することに成功し、 満腹感を得るために少量の食料を必要とするようになった。 この正確な修正を通して、 現実をどのように再構築するかについて多く学ぶことができた。"
 crisis.7245.a: "$crisis.7235.a$"
 crisis.7245.b: "$crisis.7235.b$"
 crisis.7245.c: "$crisis.7235.c$"
 crisis.7250.name: "栄養の変化"
 crisis.7250.desc.both: "銀河系全域で食料の栄養価が広く変化している。 様々な物の栄養価が低いのだ。 もしくは、 我々が以前以上に栄養を必要としているのかもしれない。 正確に何が変わったかはまだわかっていない。 この変化は社会的に大きな影響を与えるため、 非常に深刻に受け止めなければならない。"
 crisis.7250.desc.unknown: "$crisis.7250.desc.both$\n\n$crisis.unknown.desc$"
 crisis.7250.desc.known: "$crisis.7250.desc.both$\n\n$crisis.known.desc$"
 crisis.7250.desc.again: "$crisis.7250.desc.both$\n\n$crisis.again.desc$"
 crisis.7250.desc.crisis: "最新の実験は部分的にしか成功しなかった。 銀河系全体にそれを施行することができたが、 期待された結果ではなかった。 修正によって、 消化された栄養素がカロリーを生み出す速度が変化し、 満腹感を得るためには食糧をより大量に摂取しなければならなくなった。 この些細な間違いは一時的なもので、 すぐに元に戻るはずだ。"
 crisis.7250.a: "$crisis.7240.a$"
 crisis.7250.b: "$crisis.7240.b$"
 crisis.7250.c: "$crisis.7240.c$"
 crisis.7255.name: "質量の変化"
 crisis.7255.desc.both: "最近の重量測定スキャンは、 以前に記録されたデータと矛盾している。 何度も計算した結果、 何かが銀河系全体に影響を及ぼしていることは否定できない。 最も小さな規模の変化は、 最も巨大な天体に影響を与える。 これはほとんどの惑星に影響がないが、 一部の惑星では重力に関連したアノマリーが発生する可能性がある。"
 crisis.7255.desc.unknown: "$crisis.7255.desc.both$\n\n$crisis.unknown.desc$"
 crisis.7255.desc.known: "$crisis.7255.desc.both$\n\n$crisis.known.desc$"
 crisis.7255.desc.again: "$crisis.7255.desc.both$\n\n$crisis.again.desc$"
 crisis.7255.desc.crisis: "現実を形作るという我々の最近の実験の結果として、 炭素原子の質量がわずかに減少した。 たいていの場合、 この減少は取るに足らないものだが、 十分に大きな規模では、いくつかの天体で問題を引き起こす可能性があると予測している。 悲観的な予測では、 すでに重力が低い居住可能な惑星では、 大気の密度が低下する可能性さえあると思われる。"
 crisis.7255.a: "$crisis.7240.a$"
 crisis.7255.b: "$crisis.7240.b$"
 crisis.7255.c: "そこまで悪くない。"
 mass_shift_tooltip: "以下の植民地が大きく影響を受けた："
 crisis.7260.name: "シュラウドの裂け目"
 crisis.7260.desc.both: "銀河系全体で何百もの亜空間の裂け目が一時的にサイオニック次元に開き、 次元の間に存在する障壁が弱まったようだ。 大半は問題なかったが、 幾つかの裂け目からエネルギー生命体が現れ、 銀河系を恐怖に陥れている。 幸い、 これらの生命体も我々と同じように混乱しているようで、 組織的な結束はないようだ。 侵攻ではないだろう。\n\n我々の領土内にいる生命体を対処しなければならない。"
 crisis.7260.desc.unknown: "$crisis.7260.desc.both$\n\n$crisis.unknown.desc$"
 crisis.7260.desc.known: "$crisis.7260.desc.both$\n\n$crisis.known.desc$"
 crisis.7260.desc.again: "$crisis.7260.desc.both$\n\n$crisis.again.desc$"
 crisis.7260.desc.crisis: "シュラウドとして知られる次元は、 銀河系の裏側に浸透している。 その可塑性、 ブラックホールとの仮説的な関連性、 現実との違いなど、 研究する上で非常に興味深い要素がいくつかある。\n\nその次元を覗き見るための実験中に、 我々は誤って銀河系内で多くの亜空間の裂け目を引き起こし、 敵対的なシュラウドの「霊」たちが我々の次元に侵入してきた。 次元の間の壁は、 我々の行動によってかなり薄くなったようだ。 しばらくすれば正常に戻るはずだが、 あまりその次元へと続く穴を開けすぎない方がいい。"
 crisis.7260.a: "$crisis.7240.a$"
 crisis.7260.b: "$crisis.7240.b$"
 crisis.7260.c: "これはもう二度としないようにしよう。"
 crisis.7265.name: "無限理論 - 安定した成功"
 crisis.7265.desc.a: "我々の最新の実験は完全に成功した。 金属スクラップを貴重な合金に永久的に変換することに成功した！ 恒久的にするためのコツは、 材料を直接修正しようとするのではなく、 変換を可能にするために現実を修正することだった。 化学反応が終わった今、 新しい合金は永久にこのままであるはずだ。"
 crisis.7265.desc.b: "我々は時間の流れを変えることに成功した！ 宇宙空間の何もない領域での実験の後、 我々は自信を持って植民地のひとつでこの実験を試み、 それが成功した！ そこでは20.537%時間の流れが速くなると思われる。 通信や移動の問題はあるだろうが、 それはこれから解決する。"
 crisis.7265.desc.c: "我々は超伝導体を改良した。 室温で動くようになっただけでなく、 ロスのないエネルギー伝導も実現した。 このような変化はしばらくの間しか続かないが、 我々のエネルギーグリッドに大きな恩恵をもたらすだろう。"
 crisis.7265.desc.d: "この理論の効果は目を見張るようなものではなかったが、 現実の研究に新たな光を当てた。 多くの仮説は捨て去られるか、 あるいは最近の観察結果に合うように再構築されなければならないが、 我々は予想以上に多くのことを学んだ。"
 crisis.7265.desc.e: "我々の実験は予期せぬ効果をもたらした。 異次元とそこへの移動手段を研究している間に、 我々は誤って艦船を一部ハイパースペースに移行させてしまった。 予想に反して、 彼らの状況は安定しており、 致命的でもないようだ。 副次的な効果として、 彼らは以前よりずっと速く移動できるようになった。"
 crisis.7265.desc.f: "我々は常に、 技術を爆発するものに変えることを得意としてきた。 無限理論も例外ではなく、 我々は爆発兵器のペイロードの挙動を変えることに成功し、 その結果格段に大きな爆発を実現した。 この発見の代償は、 いくつかの小規模な研究施設が残念ながら破壊されてしまったというだけだった。"
 crisis.7265.desc.g: "我々は現実の修正に関して特別なことを成し遂げたわけではない。 しかし従来の技術については多くのことを学んだ。"
 crisis.7265.desc.h: "宇宙空間を調整しようとした結果、 植民地が拡大した。 驚くべきことに、 この状況は恒久的であるように見える。 どのようにしてこれが達成されたのかは定かではないが、 物質が別の次元から引き寄せられ、 原子粒子間の間にスムーズに定着したのではないかと考えている。 とても謎めいているが、 刺激的な展開である。"
 crisis.7265.a: "素晴らしい！"
 crisis.7265.b: "驚きだな。"
 crisis.7265.c: "最高だ。"
 crisis.7265.d: "興味深い。"
 add_crisis_currency_doubled_tt: "\n[crisobj_thesis_value_bonus]£advanced_logic£§Y$menp_cosmo_objectives$§!を獲得した。"
 crisis.7265.e: "よくやった、のか？"
 crisis.7265.f: "さすがだ！"
 crisis.7265.g: "なんと奇妙な。"
 crisis.7265.h: "十分だ。"
 crisis.7270.name: "無限理論 - 残念な失敗"
 crisis.7270.desc.a: "失敗は科学的プロセスの一部である。 我々はこの実験に大きな期待を寄せていたが、 うまくいかなかった。 悔しいことだが、 貴重な経験でもあり、 我々はできる限り多くのことを学ぶつもりだ。"
 crisis.7270.desc.b: "我々は時間の流れを変えることに成功した！ 宇宙空間の何もない領域での実験の後、 我々は自信を持って植民地のひとつでこの実験を試み、 それが成功した！ これから数年、 そこでは20.537%時間の流れが遅くなると思われる。 この減速は理想的なものではないが、 それでも我々にとってはとてつもない成果となった。"
 crisis.7270.desc.c: "最新の実験では不幸な副作用があった。 エネルギー貯蔵装置がすべて放電されたのだ。 破壊はされなかったが、 エネルギーは消えてしまった。 おそらく別の次元へ飛ばされたのだろう。 ここで何が起こったのかまだ解明中だが、 とても興味深いことだ。"
 crisis.7270.desc.d: "これは屈辱的な失敗だった。 我々の修正はデータバンクに触れ、 長年の研究を取り返しのつかない形で壊してしまった。 理論の多くを一から練り直さなければならない。 古い研究を再チェックする機会があるとは言え、 これは大きな失敗である。"
 crisis.7270.desc.e: "この実験は動力源と出力に関するもので、 最初はうまくいったが、 それが艦船の反応炉に影響を及ぼし、 艦隊全体の崩壊を引き起こしたことで、 事態は悲惨な方向へと進んだ。 何隻かの艦船は間一髪で反応炉を停止させたが、 他の船は致命的なダメージを受けた。"
 crisis.7270.desc.f: "実験場内で予期せぬ時空圧縮が起こり、 実験を監督していた[leader_target.GetName]は死亡した。 それでも現実をモデル化することには部分的に成功したが、 その事故死を通して知識の代償の高さを思い知らされた。"
 crisis.7270.desc.g: "ある計算実験が暴走し、 その規模は予想をはるかに超えてしまった。 その結果、 多くの貴重な研究データが解読できないものとなってしまった。 幸い、 我々の最先端の研究が保管されているデータバンクには十分なセキュリティが施されており、 影響はなかった。"
 crisis.7270.desc.h: "宇宙空間を調整しようとした結果、植民地が縮小してしまった。 この状況は恒久的なもので、 この結果には少々驚いた。 我々の推測では、物質が別の次元から引き寄せられ、 スムーズに定着したのではないかと考えている。 非常に不可解なことだ。"
 crisis.7270.a: "$crisis.7240.c$"
 crisis.7270.b: "$crisis.7240.c$"
 crisis.7270.c: "$crisis.7240.c$"
 crisis.7270.d: "$crisis.7240.c$"
 no_crisis_currency_tt: "\nこの理論から£advanced_logic£§Y$menp_cosmo_objectives$§!を獲得できなかった。"
 crisis.7270.e: "$crisis.7240.c$"
 cosmogenesis_damage_ships_tt: "艦隊がダメージを受けるだろう。"
 crisis.7270.f: "$crisis.7240.c$"
 crisis.7270.g: "$crisis.7240.c$"
 crisis.7270.h: "$crisis.7240.c$"
 crisis.7280.desc: "ごきげんよう、 聡明なる[Root.GetSpeciesNamePlural]たちよ。 今日、 お前たちは重要な節目に達し、 我々は誇りでいっぱいである。 これまでの道のりは苦難と無縁ではなかったものの、 お前たちはそれらを乗り越えて成長した。 直近の技術力を見る限り、 お前たちに導きを授けたことは正しかったといえよう。"
 crisis.7285.desc: "手のかかる子たちだ！ もはや、 我々の忍耐は尽きた。 お前たちの無謀な実験は、 あらゆる者に危険を及ぼす。 即刻、 取りやめることを命ずる。 お前たちは事の重大さに気づいていない。 その好奇心は称賛に値するが、 このような無謀な振る舞いは許されぬことだ。 現実がこのように存在するのには理由がある。 干渉するでない。"
 crisis.7285.a: "その通りだ。 これはあまりに危険すぎる。"
 crisis.7285.a.tt: "宇宙の起源への野望を放棄すると、 没落した帝国の建造物と艦船の大半へのアクセスが失われる。\n\n§Rこれによって我々は危機パスを完遂できなくなる§!"
