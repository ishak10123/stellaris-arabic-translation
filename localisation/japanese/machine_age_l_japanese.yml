 situation_paperclips: "商品統合"
 situation_paperclips_type: "商品統合"
 situation_paperclips_monthly_change_tooltip: "産出目標設定。 ドローン配備。 タスクを実行。"
 situation_paperclips_desc: "我々の第一の指令と目的は、産出量の最大化である。ノルマの達成は義務付けられている。\n納入日は§Y[owner.situation_paperclips_timer]§!\n現在の産出目標: §Y[Owner.paperclips_once_again]§!\n現在の備蓄: §Y[Owner.paperclips_current_amount]§!\n[Owner.GetPaperclipStatus]"
 situation_fulfill_drive: "達成"
 situation_fulfill_overdrive: "オーバードライブ"
