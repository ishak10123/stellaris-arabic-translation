 guided_sapience_colonizer: "創造の箱舟"
 guided_sapience_colonizer_cap: "$guided_sapience_colonizer$"
 guided_sapience_colonizer_plural: "創造の方舟"
 guided_sapience_colonizer_desc: "専用のコロニー船は最も有望な準知的種族候補を選び、 我々の監督のために最初の植民地を設置することで、 準知的種族の発生を促進する。"
 councilor_civic_guided_sapience: "導きの達人"
 councilor_civic_guided_sapience_female: "$councilor_civic_guided_sapience$"
 councilor_civic_guided_sapience_desc: "$councilor_civic_guided_sapience$は準知的種族に基づく研究と知性化プログラムの複雑な仕事を監督している。"
 councilor_civic_guided_sapience_corperate: "導きの監督"
 councilor_civic_guided_sapience_corperate_female: "$councilor_civic_guided_sapience$"
 councilor_civic_guided_sapience_corperate_desc: "$councilor_civic_guided_sapience_corperate$は我々の先駆的な準知的研究と知性化イニシアチブに内在する多面的な責任を管理している。"
 d_genesis_preserve: "創造保護区"
 d_genesis_preserve_desc: "我々はこの綿密に管理された保護区を、 被保護者を立派な知的種族に知性化するために捧げている。 科学的研究プログラムは、 この野心的なプロジェクトに不可欠な要素である。"
 decision_rebuild_genesis_preserve: "創造保護区の建設"
 decision_rebuild_genesis_preserve_desc: "この惑星にはまだ$d_genesis_preserve$がない。 建設することは我々の目標にとって重要だ。"
 d_genesis_preserve_new_speices_tooltip: "新しい準知的種族が知性化され、§Y$d_genesis_preserve$§!に置かれる。"
 d_genesis_preserve_old_species_tooltip: "今いる準知的種族は新しい§Y$d_genesis_preserve$§!に置かれる。"
 no_abandon_genesis_preserve: "$TRIGGER_FAIL$保護している準知的種族を見捨てるわけにはいかない。"
 d_genesis_monument: "創造記念碑"
 d_genesis_monument_desc: "この記念碑は、 この惑星による知性化の過程に向けたたゆまぬ努力への賛辞である。 希望、 忍耐、 そして目覚ましい功績の象徴として、 誇りをもって立っている。"
 cyber.7000.both: "§Y[THIS.GetName]§!の植民地は、 この新種族の発展を観察し、 指導する準備ができている。"
 cyber.7000.name: "創造プロジェクトの完了"
 cyber.7000.desc: "潜在的な準知的種族の候補者を特定した後、 我々の§Y$guided_sapience_colonizer$§!は遺伝子の知性化を開始し、 §Y$d_genesis_preserve$§!のために必要な場所を確立した。\n\n$cyber.7000.both$"
 cyber.7000.a: "仕事に取り掛かる時間だ。"
 cyber.7001.name: "創造保護区完了"
 cyber.7001.desc: "先住の準知的種族を集めた後、 §Y$guided_sapience_colonizer$§!はその種族のために§Y$d_genesis_preserve$§!の建設を始めた。\n\n$cyber.7000.both$"
 cyber.7001.a: "$cyber.7000.a$"
 cyber.7020.name: "創造の知性化完了"
 cyber.7020.desc: "ガイドたちの絶え間ない努力の末、 我々は§Y[Root.GetName]§!の知性化プロジェクトを完成させた。 我々は§Y[From.GetName]§!を完全な知的種族へと移行させ、　かつて彼らが故郷と呼んでいた§Y$d_genesis_preserve$§!は§Y$d_genesis_monument$§!となった。\n\nそれはこの種族の進化という偉業に対する不朽の証として永遠に残るだろう。"
 cyber.7020.a: "[From.GetNamePlural]、 銀河の大舞台へようこそ。"
 #Obessional Directive
 cyber.5005.name: "産出目標達成。"
 cyber.5005.desc: "我々は指令を達成した。\n\nドローンは規定のパラメーター内で産出量を満たした。\n\n備蓄を活用するための最終的なインプットが必要だ。"
 cyber.5005.a: "保管プロトコルを開始。"
 cyber.5005.a.tooltip: "効率的な産出方法の証拠として、 商品を保管する。"
 cyber.5005.b: "我々はそれを公設市場で販売する。"
 cyber.5005.b.tooltip: "我々の商品を広めるため、 市場調査を開始する。"
 cyber.5005.c: "外交的譲歩を求める交渉。"
 cyber.5005.c.tooltip: "商品を交換するための外交ルートを探る。"
 cyber.5005.d: "技術的知識と交換する。"
 cyber.5005.d.tooltip: "貴重な技術的見識と交換するために、 民間の買い手を探す。"
 cyber.5005.e: "ブラックホール内に配置しろ。"
 cyber.5005.e.tooltip: "ブラックホールの事象の地平線のかなたに、 それらを安全に保管しよう。"
 cyber.5006.name: "産出目標未達成"
 cyber.5006.desc: "このサイクルでは産出目標を達成できなかった。\n\nこのシナリオは、 産出目標を達成するまでドローンの産出が減ることになる。\n\nまた、 以降の産出枠は縮小された。"
 cyber.5006.a: "受け入れられない"
 cyber.5006.purge.tt: "§Yアンロックされる浄化の種類：§! $purge_clips$"
