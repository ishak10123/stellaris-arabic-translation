 civic_machine_tactical_algorithms: "戦術アルゴリズム"
 civic_machine_tactical_algorithms_desc: "当初は戦争ゲームや艦隊支援用に設計されたこの機械知性の高度なリーダーボットは、 主に戦争戦略を生成し、 戦闘能力を最適化することを目的としている。"
 civic_machine_tactical_algorithms_effects: "§Y$commander_plural_with_icon$§!は§Y$leader_trait_tactical_algorithms$§!特性から開始する\n§Y$commander_plural_with_icon$§!を他の帝国と取引できる\n§Y傭兵中立機構§!を創設できる\n£building£ §Y$building_military_academy$§!でゲームを開始する\n£building£ §Y$building_military_academy$§!が['concept_military_academy', 戦術的洞察]を付与する"
 leader_trait_tactical_algorithms: "戦術アルゴリズム"
 leader_trait_tactical_algorithms_desc: "このリーダーは、 エネルギーコストは高いものの、 艦船システムと直接統合することで戦闘効率と修理率を高めることができる。"
