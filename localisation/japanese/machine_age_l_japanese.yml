 machine_age.1075.name: "血と回路"
 machine_age.1075.desc: "神聖なる融合の時がついにやってきた。\n\n世界に聖なる§Y$building_augmentation_center$§!を建設する時が来たのだ。そうすれば融合が始まる。"
 machine_age.1075.a: "$machine_age.1090.pray$"
 machine_age.1075.a.tooltip: "信者の完全なサイバネティクス強化が始まった。 コンクラーヴェの他のすべての活動は、 神聖なる融合が完了するまで停止する。\n\n§Rアクションが必要:§!\n§Y$situation_cybernetic_creed_cyberization$§!の状況を再開するには$building_augmentation_center$を建設する。"
 machine_age.1090.name: "肉体の未来"
 machine_age.1090.desc: "神聖な旅を終え、 我々の器はついに機械と[Owner.Species.GetFleshTypeCyberCreed]の聖なる融合を達成する。 信者にとって最後の段階は、 聖なる強化の取り付けである。"
 machine_age.1090.construction: "$machine_age.1090.desc$§Y$CYBERCREED_construction$§!は我々の体を神聖な道具にするようにと要求している。\n\n$machine_age.govswapnotice$\n\n$machine_age.1090.pray$"
 machine_age.1090.war: "$machine_age.1090.desc$§Y$CYBERCREED_war$§!は信者を聖武器にするようにと要求している。\n\n$machine_age.govswapnotice$\n\n$machine_age.1090.pray$"
 machine_age.1090.research: "$machine_age.1090.desc$§Y$CYBERCREED_research$§!はネットワーク化した頭脳によって宇宙の秘密を解き明かす。\n\n$machine_age.govswapnotice$\n\n$machine_age.1090.pray$"
 machine_age.1090.labor: "$machine_age.1090.desc$§Y$CYBERCREED_labor$§!は常に食料と物資があることを約束する。\n\n$machine_age.govswapnotice$\n\n$machine_age.1090.pray$"
 machine_age.1090.pray: "融合することはすなわち神聖である。 強化は崇拝だ。"
