 leader_trait_robotic_surrogate: "ロボット代理"
 leader_trait_robotic_surrogate_desc: "面倒で遅いこのロボット本体は、$building_identity_repository$ではデジタル化リーダーの代理である。"
 #Buildings
 building_identity_repository: "アイデンティティ・リポジトリ"
 building_identity_repository_tt: "このリポジトリには§Y[Owner.GetTotalIdentities]§!アイデンティティが格納されている。$building_identity_repository_scaling$"
 building_identity_repository_scaling: "\n\nそれぞれのアイデンティティはリポジトリの産出量と維持費を向上させ、 我々の惑星のすべての$building_identity_repository$で分配される。\n"
 building_identity_repository_desc: "肉体が消滅する前に、心がデジタル化される。安全な環境で、社会のために働き続ける。"
 building_abandoned_gene_clinic: "放棄された遺伝子診療所"
 building_abandoned_gene_clinic_tt: "§R解体できない、交換できない、修理できない§!"
 building_abandoned_gene_clinic_desc: "私たちが自然の生殖能力を失った後、医学界はこの最先端の遺伝子診療所に期待を寄せた。多くのインフラと同様、現在は空き施設であり、窮状と新しい解決策の差し迫った必要性を、見るたびに思い出す。"
 #Situation Events
 machine_age.3100.name: "デジタル救済"
 machine_age.3100.desc: "医療的な解決策がない私たちにとって、§Yアイデンティティ・リポジトリ§!内で民をデジタル化すれば、生き残りの可能性はかなり高くなる。だが、これは一時的な策であり、複雑な人工生命体と陽電子頭脳を開発する計画はすでに整っている。集中的に研究し、完了する時間はあると考えている。\n\n最高の専門家がすでに、最先端のAIを駆使して、総合的救済への最初の段階であるロボット本体の設計図を作成している。"
 machine_age.3100.a: "これは成功しなければならない。"
 machine_age.3110.name: "ロボット労働者"
 machine_age.3110.desc: "ロボットの体の研究は完了した。 我々は$building_abandoned_gene_clinic$施設を$building_robot_assembly_plant$に改造し、 プロトタイプをアップグレードして配備した。これらの初歩的なシステムには、まだ個人の意識を格納する処理能力はないが、 失われた労働力の一部を代替することができる。 ポジトロニック・アップリンクを通じて、 デジタル領域にいる人々は自分の知識や経験をロボットの日々の操作に加えることができ、 ロボットのパフォーマンスを向上させることができる。\n\n同時に、 我々のAIシステムは高度なアンドロイドの設計を開発した。 高齢化したエンジニアは、 仕事に取り掛かる準備ができている。"
 machine_age.3110.a: "第一段階完了。"
 machine_age.3110.a.tooltip: "[Root.Capital.GetName]:\n- §Y$building_robot_assembly_plant$§!: §G+1§! \n- £pop£ §H機械POP§!: §G+300§!"
 machine_age.3115.name: "ドロイドへの精通"
 machine_age.3115.desc: "ロボット技術の大幅なアップグレードは、 他の惑星を植民地化し、 機械化された人口がより複雑な作業をサポートすることが可能になったことを意味する。\n\n我々のAIシステムは、 次の論理的なステップは、ポジトロニック・マトリックスを人工生命体で模倣することだと考えている。 この重要な研究プロジェクトによって、 デジタル化された意識を自然界に戻すことができるはずだ。"
 machine_age.3115.a: "ここで諦めてはならない。"
 machine_age.3120.name: "最後の一歩"
 machine_age.3120.desc: "たゆまぬ努力の結果、ようやく我々は成功を収めた。完全に機能する陽電子頭脳が設計されており、今や我々のアイデンティティを維持できるほど洗練されている。\n\n死を克服することはできないが、 生物学的存在の限界に縛られることはもうないだろう。"
 machine_age.3120.a: "人工生命体としての覚醒の時だ。"
 machine_age.3120.a.tooltip: "これらのイベントを進めるためには、 §Y人工生命の伝統§!を受け入れなければならない。"
 machine_age.3125.name: "デジタルの夢"
 machine_age.3125.both: "我々の組立工場と人工生命体化の専門家は、アイデンティティを陽電子頭脳と人工生命体に移植するという偉大なる作業を開始する準備が整っている。"
 machine_age.3125.desc: "$machine_age.3125.both$\n\n遺伝病を根絶することを目指し、 物質世界にまだ存在する人に焦点を当てて取り組みを開始する。 人工脳の強化された処理能力を用いれば、 我々は生物的制約を超越することができる。$synth.105.end$"
 machine_age.3125.nobody.desc: "$machine_age.3125.both$\n\nこの世界に物理的な存在がないのだから、 最初のプロトタイプの体を急いで構築しなければならない。 人工脳の強化された処理能力を用いれば、 我々は生物的制約を超越することができる。$synth.105.end$"
 machine_age.3125.a: "アイデンティティの移行を始めよう。"
 machine_age.3125.a.tooltip: "生命体のPOPが残っている場合は、人工生命体への移行を始める。"
 machine_age.3200.name: "デジタル煉獄"
 machine_age.3200.desc: "最も恐れていたことが起きてしまった。\n\n我々の最後の物理的身体がその最後を迎えた。デジタル化された我々の意識はアイデンティティ・リポジトリに安全に保管されているが、心を人工頭脳に入れる技術はない。\n\n研究が完了するまで、 デジタル指導者はロボットの代理人を通じて自然界と交流しなければならない。"
 machine_age.3305.name: "仮想救済"
 machine_age.3305.desc: "我々はすべてのアイデンティティを新しい人工生命体フレームまたはアイデンティティ・リポジトリのいずれかに移すことに成功し、人々の存続を確保した。\n\nしかし、新たな課題が浮上した。デジタルアイデンティティを格納するために作ったデジタル「空間」は、仮設にすぎなかったが、住人たちはこの存在に慣れ、 物理的な世界に戻りたがらない。\n\nそこに残すこともできるが、強制的に新しい人工生命体に送り込むという選択肢もある。"
 machine_age.3305.a: "楽園を楽しませておけ。"
 machine_age.3305.a.tooltip: "残りのデジタルアイデンティティは§Y$building_identity_repository$§!に留まり、 そこから人々をサポートし続ける。"
 machine_age.3305.b: "共にいた方が、 もっと強くなれる。"
 machine_age.3305.b.tooltip: "残りのデジタルアイデンティティは、 現在ストックしている人工生命体に入れ、残りは新しいフレームを作る。§Y$building_identity_repository$§!は破壊する。"
 machine_age.3310.name: "人工転生"
 machine_age.3310.desc: "[Root.Owner.GetSpeciesName]が新生児を腕に抱くのは何十年ぶりだろうか。 あの感覚を再び味わうことはできないかもしれないが、 今日は我々に希望が戻ってきたことを意味する。\n\n我々は存在するアイデンティティをコピーし、 実質的に新しい人を作ることができる§Yアイデンティティ・コンプレックス§!を開発した。\n\n複数の個人からパーソナリティ・ポイントを無作為に抽出し、 無数の組み合わせによって新たなアイデンティティを創造することができる。 あるいは、オープンな仮想環境で「精神の種」を育てることによって、 自然のプロセスを模倣することもできるだろう。"
 machine_age.3310.a: "精神を混ぜ合わせるべきだ。"
 machine_age.3310.building_tooltip.a.tt: "$unlock_edict_tt$['concept_edict_subsidized_identity_backups']\n$unlock_edict_tt$['concept_edict_optimized_identity_creation']\n\n$synth.405.a.tt$\n§Y建造物をアンロック: §!$building_identity_complex$"
 machine_age.3310.b: "自然が正しい場合もある。"
 machine_age.3310.building_tooltip.b.tt: "$unlock_edict_tt$['concept_edict_subsidized_identity_backups']\n$unlock_edict_tt$['concept_edict_optimized_identity_creation']\n\n$synth.405.b.tt$\n§Y建造物をアンロック: §!$building_identity_complex$"
 machine_age.3315.name: "人工生命体の夜明け"
 machine_age.3315.desc: "我々のデジタルの旅は終わりを告げる。 成し遂げたことの偉大さと、 それを達成するために必要だった犠牲は決して忘れない。\n\n我々は今、 完全にデジタル化され、 人工生命体として昇華した。 もはや病気の恐怖に屈することはない。 これ以上脆弱な遺伝子の限界に縛られることはない。\n\nどんな現実も自由に創造することができるのだ。"
 machine_age.3315.a: "人工生命体の夜明けに万歳。"
 machine_age.3315.a.tooltip: "「§Y$origin_synthetic_fertility$§!」イベントチェインが終了する。"
 machine_age.3315.a.tt: "§Y[This.Owner.GetSpeciesName]§!が特性['concept_synthetic_dawn']を得る"
 synthetic_dawn: "人工生命体の夜明け"
 synthetic_dawn_desc: "我々は完全にデジタル化され、人工生命体としての階段を登り、自由にあらゆる現実を生み出すことができる。"
 trait_robot_synthetic_dawn: "人工生命の救済"
 trait_robot_synthetic_dawn_desc: "この人工生命種族はその生物学的起源を超越し、新たにデジタル的存在として繁栄している。"
