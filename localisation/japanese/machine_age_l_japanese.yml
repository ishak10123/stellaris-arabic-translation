 #MACHINE AGE TRAITS #
 ######################
 #CYBORG
 trait_cyborg_stainless_steel_smile: "装飾付きの強化施術"
 trait_cyborg_stainless_steel_smile_desc: "この種族は、視覚的なインパクトを最大にするため、カスタム彫刻、アフターマーケットコンポーネント、ペイントスキームを好む。場合によっては、クロムで輝かせることが最善の選択肢となることもある。"
 trait_cyborg_welded_countenance: "実用的な強化施術"
 trait_cyborg_welded_countenance_desc: "このサイボーグには、美観を最小限に抑えた、粗雑ではあるが機能的な部品が使われている。仕事は、終わらせるだけが目的になることもある。"
 trait_cyborg_apathy_loops: "研磨インプラント"
 trait_cyborg_apathy_loops_desc: "このサイボーグのインプラントは粗くてかみ合わせが悪く、皮下の炎症や定期的な機能不全が発生する。体には悪くないが、精神的には最悪である。"
 trait_cyborg_bionic_engineers: "生体工学者"
 trait_cyborg_bionic_engineers_desc: "精密に作られた道具とインプラント改造物は、要求の厳しい工学的作業を支援するために特別に作られた。"
 trait_cyborg_bionic_physicists: "生体物理学者"
 trait_cyborg_bionic_physicists_desc: "統合されたマルチモーダル処理により、外部コンピューティングユニットへの接続を必要とせずに、その場で物理計算が生成される。"
 trait_cyborg_bionic_sociologists: "生体社会学者"
 trait_cyborg_bionic_sociologists_desc: "共感ドライバと行動ヒューリスティックは、第二の脳のように複雑な分析を処理し、社会学研究への近道を開く。"
 trait_cyborg_integrated_weaponry: "統合兵器"
 trait_cyborg_integrated_weaponry_desc: "兵器とサイバネティック四股を統合することで、兵士と法執行官の両方に即時の火力が備わる。"
 trait_cyborg_delicate_frames: "デリケートなフレーム"
 trait_cyborg_delicate_frames_desc: "コンポーネントと設置が標準以下であるため、サイボーグシャーシは壊れやすい。基本的な機能はそのままだが、身体的損傷のおそれのある状況を回避することが推奨される。"
 trait_cyborg_scarcity_algorithms: "希少性アルゴリズム"
 trait_cyborg_scarcity_algorithms_desc: "予算を意識しすぎるコーディングはリスクを取ることを制限し、利益増加の機会を妨げる。"
 trait_cyborg_limited_memory: "限定的メモリ"
 trait_cyborg_limited_memory_desc: "限られた操作メモリが学習能力のボトルネックとなり、使用者は体験全体を処理できなくなる。"
 trait_cyborg_climate_adjustment_dry: "乾燥気候MOD"
 trait_cyborg_climate_adjustment_dry_desc: "液体のリサイクルや放射線遮蔽などの特注改造は、乾燥した気候には最適だが、それ以外では効果が落ちる。"
 trait_cyborg_climate_adjustment_dry_tt: "乾燥気候の居住性：§G+$@cyborg_hab_preference|0%$§!\n$t$- 乾燥気候の惑星に最大§G125%§!の居住性を付与、$TABBED_HIGH_HABITABILITY_EFFECTS_TT$"
 trait_cyborg_climate_adjustment_wet: "湿潤気候MOD"
 trait_cyborg_climate_adjustment_wet_desc: "厚い断熱材と外来生物からの保護は、湿った気候には最適だが、それ以外では有害になる。"
 trait_cyborg_climate_adjustment_wet_tt: "湿潤気候の居住性：§G+$@cyborg_hab_preference|0%$§!\n$t$- 湿潤気候の惑星に最大§G125%§!の居住性を付与、$TABBED_HIGH_HABITABILITY_EFFECTS_TT$"
 trait_cyborg_climate_adjustment_cold: "寒冷気候MOD"
 trait_cyborg_climate_adjustment_cold_desc: "強化された加熱部品や耐凍結潤滑油は寒冷地では役に立つが、 他の地域では障害になる。"
 trait_cyborg_climate_adjustment_cold_tt: "寒冷気候の居住性：§G+$@cyborg_hab_preference|0%$§!\n$t$- 寒冷気候の惑星に最大§G125%§!の居住性を付与、$TABBED_HIGH_HABITABILITY_EFFECTS_TT$"
 trait_cyborg_mass_produced: "再生されたインプラント"
 trait_cyborg_mass_produced_desc: "義務化されているインプラントの後方互換性を維持することで、 新たに誕生した市民の装備を整えるコストが大幅に削減される。"
 trait_cyborg_propaganda_machines: "適合フィルタ"
 trait_cyborg_propaganda_machines_desc: "皮質分析ユニットは、 反逆的思考が芽生えた瞬間にユーザーを衝撃で制圧することも、 模範的な市民にホルモン剤の報酬を与えることもできる。"
 #MACHINE
 trait_robot_artificial_engineers: "工学的コア"
 trait_robot_artificial_engineers_desc: "エンジニアリング関連の研究に専用のメモリコアと処理リソースを割り当てることで、より迅速な計算とタスクの完了が可能になる。"
 trait_robot_artificial_physicists: "物理学的コア"
 trait_robot_artificial_physicists_desc: "物理研究用の特注の処理ユニットとメモリサブルーチンにより、外部計算への依存が軽減される。"
 trait_robot_artificial_sociologists: "社会学的コア"
 trait_robot_artificial_sociologists_desc: "高度な処理ユニットは、社会学研究専用のアルゴリズムを備え、この分野の多様で要求の厳しい性質に対応する。"
 trait_robot_integrated_weaponry: "統合兵器"
 trait_robot_integrated_weaponry_desc: "機械本体内に戦争兵器を統合することで、変化する戦闘環境において高い運用効率と多用途性が実現する。"
 trait_robot_delicate_frames: "デリケートなシャーシ"
 trait_robot_delicate_frames_desc: "脆い材料を使ったり、標準以下の組み立て方法を用いたりすると、機械本体は壊れやすくなる。ドローンは、可能な限り物理的危険を回避した方が良い。"
 trait_robot_scarcity_algorithms: "希少性サブルーチン"
 trait_robot_scarcity_algorithms_desc: "倹約はプログラムの中核である。節約に重点を置くため、収益性の高い交易には有害となる行動を引き起こすことが多い。"
 #Pre-Scripted Empires
 EMPIRE_DESIGN_BASIDRIX_CYBER_ECCLESIA: "バシドリックス・サイバー・エクレシア"
 EMPIRE_DESIGN_basidrix_cyber_ecclesia_desc: "宇宙の神聖な広がりの中で、バシドリックス・サイバー・エクレシアは不屈の信仰の象徴である。エクレシアは、神聖な使命に導かれ、クロムの冷たい精密さと繊維組織を結合させている。\n\nこの道に試練がなかったわけではない。多くの宗派が興亡してきたが、どこも真実を知っているのは自分たちだけだという固く信じていた。そのような信仰の間には火花が散る。民会の歴史にあるのは、血とボロボロの鋼鉄ばかり。だがこの争いが、彼らの決意をさらに強くした。\n\n今、民会は新たな舞台、星の無限の広がりへと入り込もうとしている。信仰の試練か、それとも救いの機会か？虚空に足を踏み入れたとき、信者は1つだけ確信できる。\n\nそれは、結合は神聖であり、拡張は崇拝であるということ。"
