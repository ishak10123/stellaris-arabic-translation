 trait_robot_history_warbot: "ウォーマシーン"
 trait_robot_history_warbot_desc: "元々は戦争や警備強化のために作られたもの。 驚異的な反応速度を誇り、 強化アーマープレートと強固な支援システムを持つ。"
 trait_robot_history_artbot: "子守りロボット"
 trait_robot_history_artbot_desc: "元々は家事をすることを目的に設計されたドロイド。 運動性能が高く、 効率的に資源を管理し、 特にマルチタスク能力に秀でている。"
 trait_robot_history_explorebot: "アート生成器"
 trait_robot_history_explorebot_desc: "初めから実用性を考慮して設計されていないものの、 芸術および文化的探求力に優れている。 驚異的な創造アルゴリズム、 複雑なデザイン処理能力を持ち、 出来上がった作品は表現に富む。"
 trait_robot_history_researchbot: "研究支援機"
 trait_robot_history_researchbot_desc: "元々は研究支援を目的として設計されていたもの。 鋭い分析能力と高い情報吸収能力を持ち、 休みなく科学的発見を追い続ける。"
 trait_robot_history_resourcebot: "労働ロボット"
 trait_robot_history_resourcebot_desc: "原材料の抽出を目的として製造されたもの。 特別仕様の工具、 強化ジョイント、 モジュール式システムを持っているため、 まさに理想的な労働者だ。"
 trait_robot_history_chatbot: "会話AI"
 trait_robot_history_chatbot_desc: "元々は開発者を社会的に支援するために設計されたもの。 高度な共感アルゴリズムと完璧なコミュニケーション能力を持つ、 理想の相棒だ。"
