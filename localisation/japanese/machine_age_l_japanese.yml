 #Cybernetic Special Traits
 trait_cyborg_creed_of_construction: "集いの強化"
 trait_cyborg_creed_of_construction_desc: "ハンマーの集いは、 神聖な強化を使って信者が必要とするあらゆるものを作り出す。"
 trait_cyborg_creed_of_war: "テンプル騎士の強化"
 trait_cyborg_creed_of_war_desc: "鋼鉄のテンプル騎士団の神聖な強化を通して、 我々の聖なる戦士たちを誰も戦闘で止められることはできない。"
 trait_cyborg_creed_of_research: "聖歌隊の強化"
 trait_cyborg_creed_of_research_desc: "精神の聖歌隊の半連結意識体は、 研究者間の即時コミュニケーションを可能にしている。"
 trait_cyborg_creed_of_labor: "コミューンの強化"
 trait_cyborg_creed_of_labor_desc: "労苦のコミューンの神聖な強化は、 あらゆる点で従来の道具を凌駕している。"
 trait_cyborg_ritualistic_implants: "儀式用インプラント"
 trait_cyborg_ritualistic_implants_desc: "これらのインプラントは、 信者たちによって誇らしげに着けられている。 彼らの神聖に対する献身は、 すべての人に感動を与える。"
