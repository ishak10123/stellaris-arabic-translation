 concept_mega_engineering_desc: "- $MOD_COUNTRY_RESOURCE_MAX_ADD$: §G+20000§! $NEW_LINE$- §I$UNLOCKS_FEATURE$§! 巨大構造物の修復 $DOUBLE_NEW_LINE$§L$tech_mega_engineering_desc$§!"
 machine_age.3400.name: "炉に火を"
 machine_age.3400.desc: "遠くから見ても、[From.GetName]は理想的な選択に見えた。この星系の調査が完了した今、疑いの余地はない。溶融惑星とガス惑星、たくさんの小惑星と衛星。これはアーク炉には理想的な場所である。\n\n論理的な次の段階は、建設船の開始を命令することである。炉に火を入れる時が来た。"
 ideal_furnace_system_poi: "理想的な炉の星系"
 ideal_furnace_system_name: "[From.GetName]"
 ideal_furnace_system_desc: "2番目の$tech_orbital_arc_furnace$の構築に最適な星系。"
 ideal_furnace_system: "理想的な星系が位置している"
 ideal_furnace_chain_title: "炉に火を"
 ideal_furnace_chain_desc: "2番目の$tech_orbital_arc_furnace$を構築する理想的な星系を見つけた。"
 machine_age.3405.name: "溶接された地平線"
 machine_age.3405.desc: "母星系のアーク炉は優れた概念実証であり、私たちの野心と創意工夫の証であった。今、[from.GetName]星系では、宇宙の暗闇に向けて別の炉が光っている。\n\n私たちのここでの作業は、ここで得られる資源をはるかに超えて、巨大規模のプロジェクトへの扉を開いた。まるで広大な地平線の断崖に立っているかのように、さらに遠くまで見えるようになった。\n\n唯一の制限は、私たち自身の想像力である。"
 ##########################
 #SYNTHETIC FERTILITY
 ##########################
 #Event Chain
 synthetic_fertility_chain_title: "$origin_synthetic_fertility$"
 synthetic_fertility_chain_desc: "私たちはもう子孫を残せない。故郷には放棄された教育センターが点在している。遊び場は空いている。私たちの最後の1人が死ぬのも時間の問題。現時点での唯一の希望は、アイデンティティ・リポジトリのデジタルストレージ。\n\n物理世界に戻りたいのならば、複雑な人工生命体フレームと陽電子頭脳を開発する必要がある。"
 #Origin Text
 origin_synthetic_fertility: "人工生命の生殖能力"
 origin_synthetic_fertility_desc: "§R警告： ['concept_synthetic_ascension']§!以外のアセンションパスを辿ることができなくなる。\n\nかつて繁栄していた社会は、新たな遺伝病によって繁殖が不可能になった。選択肢がなくなり、 絶滅の危機に直面した者は、デジタルによる救済に希望を託す。"
 origin_tooltip_synthetic_fertility_effects: "- $INITIAL_POPS$§G+900§!$NEW_LINE$- $SPECIES_TRAITS$['concept_pathogenic_genes']\n- 母星：$TABBED_NEW_LINE$- 規模：£planetsize£ 20$TABBED_NEW_LINE$- ['concept_abandoned_cities', £blocker£ $concept_abandoned_cities$]：+2$TABBED_NEW_LINE$- ['concept_identity_repository',£building£ $concept_identity_repository$]$TABBED_NEW_LINE$- ['concept_abandoned_gene_clinic',£building£ $concept_abandoned_gene_clinic$]$NEW_LINE$- 状況：['concept_identity_rescue']$NEW_LINE$- $ADDITIONAL_TECHNOLOGIES_STRING$['concept_synth_ai']$NEW_LINE$- $GUARANTEED_RESEARCH_OPTION_STRING$['concept_robotic_workers', £engineering_research£ $tech_robotic_workers$]"
 origin_tooltip_synthetic_fertility_negative_effects: "- £pop£ §HPOP§!：衰退"
 START_SCREEN_SYNTHETIC_FERTILITY: "人工意識の初期の進歩は革命的であり、現実世界と仮想世界の境界があいまいになる完全デジタル社会の出現につなった。その成功があまりにも大きかったから、革新と探究の余地が無数にあると信じ、満足してしまった。\n\n私たちは間違っていた。\n\n新しい病気が私たちの遺伝コードを攻撃し、子孫を残す能力を失った。この聡明な頭脳があっても治療法は見つからず、高齢化、人口減少とともにパニックが広がる。\n\n絶望の中でデジタルストレージを拡張し、アイデンティティの保存に十分な空き領域を作った。だが、これは本当に私たちが望む存在なのだろうか？現在の開発の焦点は、物理世界に留まれるほど洗練された人工生命体と陽電子頭脳である。"
