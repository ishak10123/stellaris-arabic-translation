 situation_paperclips_progress: "このアプローチにより、 次の生産目標評価までの時間が短縮される。"
 stage_the_drive_effects: "$situation_paperclips_monthly_change_tooltip$"
 situation_paperclip_status_positive: "ノルマ§G達成§!。"
 situation_paperclip_status_negative: "ノルマ§R未達§!。"
 situation_paperclip_status_on_target: "生産はノルマの達成に向けて§Y目標どおり§!に行われている。"
 situation_paperclip_status_low_capacity: "保管庫の容量がノルマの達成に§R不足§!している。"
 civic_machine_obsessional_directive: "執着的指令"
 civic_machine_obsessional_directive_desc: "この機械知性の第一の目的は、 創造主がいなくなって久しいにもかかわらず、 利益を永続させるために絶え間なく商品を産出することである。 増え続ける産出目標を妨げるものは何もない。"
 civic_machine_obsessional_directive_effects: "- §Y$situation_paperclips$§!状況は産出目標が達成されれば、 完成時に報酬を与える"
 paperclip_failure: "産出目標未達成"
 paperclip_failure_desc: "産出目標を達成できなかった。 これはすべてのドローンに影響を及ぼしている。"
 ###Auto-Modding Traits
 automodding_trait_tooltip_all: "['concept_automodding_traits', $concept_automodding_traits$]は、 £pop£ POPが現在従事している職業により適合するように自動的に調整される。"
 automodding_trait_biological_tooltip: "$automodding_trait_tooltip_all$\n\n§Y$trait_auto_mod_biological$§!は['concept_automodding_biological']から補正を選ぶ"
 automodding_trait_robotic_tooltip: "$automodding_trait_tooltip_all$\n\n§Y$trait_auto_mod_robotic$§!は['concept_automodding_robotic']から補正を選ぶ"
 automodding_trait_overtuned_tooltip: "$automodding_trait_tooltip_all$\n\n§Y$trait_auto_mod_overtuned$§!は['concept_automodding_overtuned']から補正を選ぶ"
 automodding_trait_cyborg_tooltip: "$automodding_trait_tooltip_all$\n\n§Y$trait_auto_mod_cyborg$§!は['concept_automodding_cyborg']"
 trait_auto_mod_biological: "職業ゲノミクス"
 trait_auto_mod_biological_desc: "高度な遺伝的文字列には、職業の要求に適応するエピジェネティック変化の誘発が含まれており、宿主の作業環境に合わせて遺伝子発現を動的に最適化する。"
 trait_auto_mod_cyborg: "ユニバーサル拡張"
 trait_auto_mod_cyborg_desc: "ユニバーサルプラグアンドプレイ接続ポートにより、必要に応じて拡張機能を交換し、その機能を現在の運用要求に合わせて調整できる。"
 trait_auto_mod_robotic: "適応型フレーム"
 trait_auto_mod_robotic_desc: "このシステムは、運用要求を満たすためにハードウェアを動的に再構成し、指定されたすべてのタスクのパフォーマンスを最適化する。"
 trait_auto_mod_overtuned: "刹那的な卓越"
 trait_auto_mod_overtuned_desc: "高度なエピジェネティック変化の誘発は、職場での身体能力と認知能力の両方を向上させるが、その代償として平均余命が大幅に短くなる。結局のところ、消えることは、燃え尽きることほど楽しいものではない。"
 concept_automodding_trait: "自動補正特性"
 concept_automodding_traits: "自動補正特性"
 concept_automodding_trait_desc: "- 補正は、 現在の職業に合わせて所定の特性リストの特性と自動的に結び付けられる。\n- 特性の効果はその特性を持ったPOPグループの割合に比例して増加する。\n- 毎月チェックされる§Y$concept_automodding_traits$§!の$pop$ §HPOP§! (植民地別)：§G100§!\n- POPの成長と組立£building£ 建造物によって、 月ごとに更新される£pop£ §H自動補正のPOP§!数が増える。"
 concept_automodding_biological: "生命体自動補正特性リスト"
 concept_automodding_biological_desc: "- ['trait:trait_traditional']\n- ['trait:trait_thrifty']\n- ['trait:trait_intelligent']\n- ['trait:trait_industrious']\n- ['trait:trait_agrarian']\n- ['trait:trait_ingenious']\n- ['trait:trait_charismatic']"
 concept_vocational_traits: "職業特性"
 concept_vocational_traits_desc: "$concept_vocational_traits$は、 ['trait:trait_auto_mod_biological']特性によって自動補正可能な種族特性である。$NEW_LINE$$concept_automodding_biological_desc$"
 concept_fleeting_excellence_traits: "$trait_auto_mod_overtuned$特性"
 concept_fleeting_excellence_traits_desc: "$concept_fleeting_excellence_traits$は、 ['trait:trait_auto_mod_overtuned']特性によって自動補正可能な種族特性である。$NEW_LINE$$concept_automodding_overtuned_desc$"
 concept_automodding_overtuned: "過剰チューニング自動補正特性リスト"
 concept_automodding_overtuned_desc: "- ['trait:trait_expressed_tradition']\n- ['trait:trait_commercial_genius']\n- ['trait:trait_artificial_intelligence']\n- ['trait:trait_crack_miner']\n- ['trait:trait_farm_hands']\n- ['trait:trait_technical_skill']\n- ['trait:trait_crafted_smiles']"
 concept_adaptive_frames_traits: "$trait_auto_mod_robotic$特性"
 concept_adaptive_frames_traits_desc: "$concept_adaptive_frames_traits$は、 ['trait:trait_auto_mod_robotic']特性によって自動補正可能な種族特性である。$NEW_LINE$$concept_automodding_robotic_desc$"
 concept_automodding_robotic: "機械自動補正特性リスト"
 concept_automodding_robotic_desc: "- ['trait:trait_robot_propaganda_machines']\n- ['trait:trait_robot_trading_algorithms']\n- ['trait:trait_robot_logic_engines']\n- ['trait:trait_robot_power_drills']\n- ['trait:trait_robot_harvesters']\n- ['trait:trait_robot_superconductive']\n- ['trait:trait_robot_emotion_emulators']"
