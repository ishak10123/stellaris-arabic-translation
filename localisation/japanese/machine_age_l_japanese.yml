 situation_synthetic_fertility_synthesization_desc: "我々は人口の人工生命化を完了するために必要な技術的知識を得ている。\n\n\n§Y来月人工生命体を受け取るPOP§!：§G[From.GetSynthFertPopsPerMonth]§!"
 stage_1_synthetic_fertility_synthesization_effects: "既存のロボットは、 デジタル化された人口のための人工生命体として使われるだろう。"
