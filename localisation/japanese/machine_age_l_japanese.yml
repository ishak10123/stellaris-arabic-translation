 ### Synaptic Lathe
 no_abandon_capital_for_unviable_planet: "$TRIGGER_FAIL$シナプス旋盤へ最後のPOPは強制移住できない。"
 no_unfueled_lathe: "$TRIGGER_FAIL$シナプス旋盤から最後のPOPは強制移住できない。"
 NO_BRANCH_OFFICE_ON_SYNAPTIC_LATHE: "$pc_cosmogenesis_world$には支社を開くことができない。"
 pc_cosmogenesis_world: "シナプス旋盤"
 col_cosmogenesis_world: "$pc_cosmogenesis_world$"
 pc_cosmogenesis_world_desc: "ケーブル、 トランジスター、 生命維持ポッドなどの複雑な配列を介して、 有機・人工を問わず何十億もの知覚生物を接続するように設計されている巨大なリザボアコンピューティングシステム。 個々の処理器官に集中的な負担がかかるため、 ネットワーク化された「部品」は必然的に脳にダメージを受けることになる。"
 col_cosmogenesis_world_desc: "$pc_cosmogenesis_world_desc$"
 trait_pc_cosmogenesis_world_preference: "好シナプス旋盤性"
 trait_pc_cosmogenesis_world_preference_short: "シナプス旋盤"
 trait_pc_cosmogenesis_world_preference_desc: "この種族はシナプス旋盤の生命維持ポッド以外では生存に適さない。 彼らは厳しい現実ではなく、 至福の昏睡を切望している。"
