 situation_synthetic_fertility_digitization_monthly_change_tooltip: "我々は、 物理的な人口を補充するために必要な技術を研究している。"
 situation_synthetic_fertility_digitization_desc: "私たちは子孫を残すことはできないが、心を保つことはできる。このプロセスは時間がかかるが、必要なものだ。\n\n将来的には物理世界に戻れるようになるかもしれないが、そのためには人工生命体代替の開発が必要になる。"
 situation_synthetic_fertility_approach_none: "経済第一"
 situation_synthetic_fertility_approach_none_desc: "プロジェクトの必要性と経済の健全性のバランスを取らなければならない。"
 situation_synthetic_fertility_approach_tech_low: "追加資金"
