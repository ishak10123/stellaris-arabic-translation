 situation_synthetic_fertility_approach_tech_high_desc: "生き残るためには、 経済的に厳しい選択をすることも厭うてはならない。"
 situation_synthetic_fertility_approach_unity_low: "仮想現実設計"
 situation_synthetic_fertility_approach_unity_low_desc: "最高のデジタルアイデンティティに、人工生命体ソリューションに取り組めるよう、より多くのエネルギーを与える。"
 situation_synthetic_fertility_approach_unity_high: "緊急対策"
 situation_synthetic_fertility_approach_unity_high_desc: "一次エネルギー源は、種族の体を完全に置き換えるデジタルアイデンティティに転用される。"
 situation_synthetic_fertility_complete: "我々の物理的な体はこの時点で消滅し、民は完全にデジタル化される。"
 stage_synthetic_fertility_problem_effects: "世界における物理的存在を維持するには、複雑な陽電子頭脳を持った最先端人工生命体を開発しなければならない。"
 stage_synthetic_fertility_danger_effects: "人口の半分以上がいなくなったら、 我々はより大きな経済資源を人工生命体の研究に振り向けなければならない。"
 stage_synthetic_fertility_crisis_effects: "人口は残りわずかだ。複雑な陽電子頭脳を開発するために全力を尽くさなければならない。"
 situation_synthetic_fertility_synthesization_outcome: "未来が確かなものになるまで、 我々は休まない。"
