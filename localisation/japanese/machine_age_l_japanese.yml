l_japanese:
 ###################
 #Cybernetics Pack
 ###################
 MACHINEAGE_TITLE: "The Machine Age" #Do not translate
 #### Cosmogenesis Crisis ####
 ap_cosmogenesis: "宇宙の起源"
 ap_cosmogenesis_desc: "時間、 重力、 空間は、 現実を構成する重要な歯車である。 それらを操ることができれば、 宇宙とその秘密は我々のものになる。"
 cosmogenesis_chain_title: "宇宙の起源"
 cosmogenesis_chain_desc: "無知は我々を束縛し、 宇宙の秘密を手の届かないところに追いやる。\n\nどんな代償を払っても、 我々はその束縛から自由にならなければならない。\n\n§R没落した帝国は我々を阻止しようとするだろう！§!"
 cosmogenesis_level_reached: "危機レベル到達"
 cosmogenesis_aborted_tt: "\n£trigger_no£ §R我々は宇宙の起源への野望を放棄した。§!"
 ### Crisis Stage Techs
 tech_cosmogenesis_crisis_1: "指数関数的学習理論"
 tech_cosmogenesis_crisis_1_desc: "現実の無限の層を理解するために必要な視点の根本的な転換は、 我々の中の最も優秀な頭脳でさえも理解に苦しむ。"
 cosmogenesis_level_1_tech_title: "§H宇宙の起源§!危機§Hレベル2§!をアンロックする"
 cosmogenesis_level_1_tech_desc: "§H$tech_cosmogenesis_crisis_1$§!\n現実の内なる仕組みを解明するためには、 より壮大なスケールの思考に考えを向けなければならない。"
 tech_cosmogenesis_crisis_2: "重力の筆"
 tech_cosmogenesis_crisis_2_desc: "重力と時空が宇宙を形作る。 我々は重力を完全に支配することから始めて、 アセンションにつなげる。"
 cosmogenesis_level_2_tech_title: "§H宇宙の起源§!危機§Hレベル3§!をアンロックする"
 cosmogenesis_level_2_tech_desc: "§H$tech_cosmogenesis_crisis_2$§!\n重力は、 現実というキャンバスに絵を描くための筆の一本にすぎない。"
 tech_cosmogenesis_crisis_3: "理論上の無限命題"
 tech_cosmogenesis_crisis_3_desc: "重力を正確に、 そして微細に変化させることで、 現実のコードに指示を注入することができる。 この新しく驚くべき道具の応用を学ぶには、 細心の注意が必要だ。"
 cosmogenesis_level_3_tech_title: "§H宇宙の起源§!危機§Hレベル4§!をアンロックする"
 cosmogenesis_level_3_tech_desc: "§H$tech_cosmogenesis_crisis_3$§!\nひとつひとつ、 重力の針を通して時空を突き抜けていく。"
 tech_cosmogenesis_crisis_4: "現実の法則"
 tech_cosmogenesis_crisis_4_desc: "最近の実験では、 現実に対する我々の変更は一時的なものに過ぎないことが確認されている。 変化を定着させるためには、 より大きな変更が必要となるだろう。"
 cosmogenesis_level_4_tech_title: "§H宇宙の起源§!危機§Hレベル5§!をアンロックする"
 cosmogenesis_level_4_tech_desc: "§H$tech_cosmogenesis_crisis_4$§!\n現実はうめき声をあげ、 抗議し、 我々が手を加えたにもかかわらず、 頑なに形を変えようとする。 このような予想外の展開が続くことは許されない。"
 tech_cosmogenesis_crisis_5: "新生の宇宙"
 tech_cosmogenesis_crisis_5_desc: "異なる宇宙への大規模な移動は困難な作業だ。 時空の壁を突き破るだけでなく、 その旅を生き延びることができる宇宙船を設計しなければならない。\n\n§R没落した帝国は我々を阻止しようとするだろう！§!"
 cosmogenesis_level_5_tech_title: "§H巨大構造物をアンロック：§!ホライゾンニードル"
 cosmogenesis_level_5_tech_desc: "§Hホライゾンニードル§!\n驚異的な技術力を駆使するホライゾンニードルは、 現実を変える能力を持つ民間船だ。 我々の人口と蓄積された知識を収容し、 宇宙を渡る移住の旅を安全に導くことができる。"
 requires_capital: "£trigger_no£首都の軌道上に建造しなければならない。"
 ### Crisis Tab
 crisobj_research_tech_name: "新しいテクノロジーの研究"
 crisobj_research_tech_desc: "どんなに小さな発見であっても、 そのたびに我々は現実の内なる仕組みについて洞察を深めていく。\n\n高度なロジックの報酬を得るためにテクノロジーを研究する。"
 crisobj_research_thesis_name: "無限理論の応用の研究"
 crisobj_research_thesis_desc: "現実の仕組みを支配する法則を変える大規模な実験は、 貴重なデータをもたらすだろう。\n\n高度なロジックの報酬を得るために希少なテクノロジーを研究する。"
 crisobj_have_scholarium_vassals_name: "スカラリアム属国の保持"
 crisobj_have_scholarium_vassals_desc: "研究に重点を置いた従属国は、 絶対的な知識の探求に役立つ。\n\n§Yスカラリアム属国§!を保持して、 毎年§Y高度なロジックの報酬§!を得る。"
 crisobj_neural_chips_name: "神経チップの採用"
 crisobj_neural_chips_desc: "我々の研究の規模は、 犠牲を払わなければ行えないものとなっている。\n\nPOPを§Yシナプス旋盤§!で§Y神経チップ§!として使用し、 高度なロジックを獲得する。\n\n§Y神経チップ§!の産出は§Yシナプス旋盤§!のPOPの数によって増加し、 区域や建造物によって更に高めることができる。"
 crisobj_have_science_nexuses_name: "サイエンスネクサスの管理"
 crisobj_have_science_nexuses_desc: "重力 アノマリーから遠く離れたこの最先端の研究施設は、 手つかずの時空データを確認するために使用される。\n\n完全にアップグレードされた巨大構造物の§Yサイエンスネクサス§!を管理して、 この高度なロジックの報酬を§Y毎年§!獲得する。"
 crisobj_galcom_science_resolution_name: "銀河共同体の支持獲得"
 crisobj_galcom_science_resolution_desc: "我々の研究が必要不可欠であることを銀河共同体に納得してもらうことができれば、 我々の計画を実現する上で大いに役立つだろう。\n\n§Y銀河共同体§!に解き放たれた知識の§Y決議§!を受け入れさせ、 この高度なロジックの報酬を§Y毎年§!獲得する。"
 crisis_cosmogenesis_level_1: "§U懸念§!"
 crisis_cosmogenesis_level_1_desc: "危機レベル1"
 crisis_cosmogenesis_level_2: "§Uリスク§!"
 crisis_cosmogenesis_level_2_desc: "危機レベル2"
 crisis_cosmogenesis_level_3: "§U危険§!"
 crisis_cosmogenesis_level_3_desc: "危機レベル3"
 crisis_cosmogenesis_level_4: "§U厄災§!"
 crisis_cosmogenesis_level_4_desc: "危機レベル4"
 crisis_cosmogenesis_level_5: "§U存亡に関わる脅威§!"
 crisis_cosmogenesis_level_5_desc: "危機レベル5"
 menp_cosmo_objectives: "高度なロジック"
 unlocks_cosmo_objectives: "§H危機目標§!を達成することによって、 £advanced_logic£§Y$menp_cosmo_objectives$§!を蓄積することができる。\n\n§Y$tech_cosmogenesis_crisis_1$§!技術をアンロックし、 目標達成に近づくことができる。\n"
 menp_cosmo_objectives_desc: "高度なロジックは、 現実を支配する法則と、 それに影響を及ぼす我々の力についての理解を表す。"
 menp_cosmo_buildings_1: "完璧なアーコロジー"
 unlocks_buildings_1: "陥没した帝国の単純な建造物が研究対象として現れるようになる。\n"
 menp_cosmo_buildings_1_desc: "陥没した帝国はその高度な技術を再現する方法を忘れてしまったかもしれないが、 我々の頭脳はその黄金時代の過ぎ去った秘密を解き明かすだろう。"
 menp_cosmo_techs_1: "非重粒子エネルギー"
 unlocks_techs_1: "§Y$tech_dark_matter_power_core$§!の艦船コンポーネントの技術\nをアンロックする。"
 menp_cosmo_techs_1_desc: "反重粒子のエネルギーを利用する方法を学ぶことは、 超小型発電の進化における次のステップである。"
 menp_cosmo_features_1: "生体コンピュータ"
 unlocks_features_1: "巨大構造物§Yシナプス旋盤§!の技術をアンロックする。\n"
 menp_cosmo_features_1_desc: "超巨大なシナプス旋盤は、 レザボアコンピューターである。 ネットワーク化された我が人口の頭脳の処理能力は、 データの計算と保存に使われる。 利点は明らかだが、 一部の誤った種族は、 個人を処理用のチップに変換することを道徳的に問題があるとみなすかもしれない。"
 menp_cosmo_ship_2: "難解な護衛艦"
 unlocks_ship_2: "陥没した帝国の艦船、§Y護衛艦§!の技術をアンロックする。\n"
 menp_cosmo_ship_2_desc: "[Get_menp_cosmo_ship_2]"
 menp_cosmo_ship_2_desc_regular: "時空に関する知識を最適化して次元超越主義を実現し、 外形が示唆するよりも内部を大きくした、 適度な大きさの宇宙船。 高度な火力能力は、 従来の艦船設計に比べ、 物流コストの削減をもたらす。"
 menp_cosmo_buildings_2: "発展した採取"
 unlocks_buildings_2: "陥没した帝国の高度な建造物が研究対象として現れるようになる。\n"
 menp_cosmo_buildings_2_desc: "陥没した帝国の資源生成能力は、 長い間我々を困惑させてきた。 しかし、 今は違う。"
 menp_cosmo_techs_2: "反重粒子の発展"
 unlocks_techs_2: "§Y$tech_enigmatic_decoder$§!と§Y$tech_dark_matter_propulsion$§!の艦船コンポーネントの技術\nをアンロックする。"
 menp_cosmo_techs_2_desc: "ダークマターとその応用についての理解が深まれば、 技術的進歩の新たな道が開けるだろう。"
 menp_cosmo_features_2: "引力の道具"
 unlocks_features_2: "§Y$tech_cosmogenesis_crisis_2$§!技術をアンロックし、 目標達成に近づくことができる。\n"
 menp_cosmo_features_2_desc: "$tech_cosmogenesis_crisis_2_desc$\n"
 menp_cosmo_ship_3: "謎めいた巡洋艦"
 unlocks_ship_3: "陥没した帝国の艦船、§Y巡洋戦艦§!の技術をアンロックする。\n"
 menp_cosmo_ship_3_desc: "[Get_menp_cosmo_ship_3]"
 menp_cosmo_ship_3_desc_regular: "もう1隻の最適化された宇宙船はより大きなサイズで、 現在の戦艦がおもちゃのように見えるだろう。"
 menp_cosmo_buildings_3: "複雑なインフラ"
 unlocks_buildings_3: "陥没した帝国の複雑な建造物が研究対象として現れるようになる。\n"
 menp_cosmo_buildings_3_desc: "陥没した帝国を取り巻く謎を解き明かし始めた今、 我々はその謎を更に解明しなければならない。 やがて、 彼らの技術の秘密は解明されるだろう。"
 menp_cosmo_techs_3: "風変わりな反重粒子"
 unlocks_techs_3: "§Y$tech_enigmatic_encoder$§!と§Y$tech_dark_matter_deflector$§!の艦船コンポーネントの技術\nをアンロックする。"
 menp_cosmo_techs_3_desc: "ダークマターを防衛技術や暗号化に使うことで、 無効化フィールドや強固な通信チャンネルを作ることができる。"
 menp_cosmo_features_3: "永遠の拡大"
 unlocks_features_3: "§Y$tech_cosmogenesis_crisis_3$§!技術をアンロックし、 目標達成に近づくことができる。\n"
 menp_cosmo_features_3_desc: "$tech_cosmogenesis_crisis_3_desc$\n"
 menp_cosmo_ship_4: "予測不能な旗艦"
 unlocks_ship_4: "陥没した帝国の艦船、§Yタイタン§!の技術をアンロックする。\n"
 menp_cosmo_ship_4_desc: "[Get_menp_cosmo_ship_4]"
 menp_cosmo_ship_4_desc_regular: "この強力な艦船は船よりは動く要塞に近い。 最も激しい攻撃でなければ、 ダメージを与えることすらできないだろう。"
 menp_cosmo_buildings_4: "黄金時代"
 unlocks_buildings_4: "陥没した帝国の並外れた建造物が研究対象として現れるようになる。\n"
 menp_cosmo_buildings_4_desc: "次元操作に関する陥没した帝国の洞察には驚かされる。 発見があるたびに、 彼らの最も難解な技術でさえ単純なものに思えてくる。"
 menp_cosmo_techs_4: "装甲と武器"
 unlocks_techs_4: "§Y$tech_energy_lance_2$§!と§Y$tech_dragon_armor$§!の艦船コンポーネントの技術\nをアンロックする。"
 menp_cosmo_techs_4_desc: "最新の技術的進歩により、 より強力な武器や装甲を製造できるようになるはずだ。"
 menp_cosmo_features_4: "ルールブレイカー"
 unlocks_features_4: "§Y$tech_cosmogenesis_crisis_4$§!技術をアンロックし、 目標達成に近づくことができる。\nまた、 多くの§Y高度なロジック§!が得られる繰り返し研究§Y$tech_cosmogenesis_thesis$§!をアンロックする。\n"
 menp_cosmo_features_4_desc: "$tech_cosmogenesis_crisis_4_desc$"
 menp_cosmo_buildings_5: "記憶と創造"
 unlocks_buildings_5: "陥没した帝国の難解な建造物が研究対象として現れるようになる。\n"
 menp_cosmo_buildings_5_desc: "陥没した帝国の秘密がついに解明され、 我々の人々にとって新時代がやってくるだろう。"
 menp_cosmo_techs_5: "ナノスワーム"
 unlocks_techs_5: "§Y$tech_nanite_repair_system$§!、 §Y$tech_nanite_autocannon$§!と§Y$tech_nanite_flak_batteries$§!の艦船コンポーネントの技術をアンロックする。\n"
 menp_cosmo_techs_5_desc: "視点が変わるたびに、 新たな機会が訪れる。 最も小さな変化が、 大きな結果をもたらすことがある。"
 menp_cosmo_features_5: "ヴォイドボイジャー"
 unlocks_features_5: "§Y$tech_cosmogenesis_crisis_5$§!技術をアンロックする。§Yホライゾンニードル§!を建設できるようになり、 目標達成に近づくことができる。"
 menp_cosmo_features_5_desc: "$tech_cosmogenesis_crisis_5_desc$"
 cosmogenesis_level_2_req_clear_tooltip: "£trigger_yes£§Y$tech_cosmogenesis_crisis_1$技術§!を研究した"
 cosmogenesis_level_2_req_tooltip: "£trigger_no£§Y$tech_cosmogenesis_crisis_1$技術§!を研究した"
 cosmogenesis_level_3_req_clear_tooltip: "£trigger_yes£§Y$tech_cosmogenesis_crisis_2$技術§!を研究した"
 cosmogenesis_level_3_req_tooltip: "£trigger_no£§Y$tech_cosmogenesis_crisis_2$技術§!を研究した"
