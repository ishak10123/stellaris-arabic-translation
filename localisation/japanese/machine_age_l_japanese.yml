 cybercreed_moderates_ignored: "穏健派を無視した"
 cybercreed_moderates_ignored_desc: "テクノファントは規制を求める声を無視し、 それぞれの信条が慣習を続けることを認めている。"
 cybercreed_creeds_absorbed: "信条を吸収した"
 cybercreed_creeds_absorbed_desc: "テクノファントは、 信条を統一した信仰に吸収しようという呼びかけに応じた。"
 cybercreed_forced_cyberization: "強制的強化"
 cybercreed_forced_cyberization_desc: "社会の不信仰な者たちは、 聖なる融合を受け入れざるを得ないことに憤慨している。"
 cybercreed_allowed_non_cyborgs: "選択の自由"
 cybercreed_allowed_non_cyborgs_desc: "我々の社会の不信仰者は、 神聖なアップグレードなしに留まることを許された。 これによって信仰に対する好意が増した。"
