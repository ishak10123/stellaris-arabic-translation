 district_cosmogenesis_world_science_desc: "数え切れないほどの個体の想像力を結集することで、 我々は高度な仮説のシミュレーションを迅速に行うことができる。 ロジックゲートと有機メモリーキャッシュの複雑な構造が、 比類ない精度の出力をもたらす。"
 district_cosmogenesis_world_logic: "増強スペキュレーター"
 district_cosmogenesis_world_logic_plural: "増強スペキュレーター"
 district_cosmogenesis_world_logic_desc: "弁証法的形而上学の驚異であるこの区域は、 神経チップを使って現実に関する形式的な記述の中にある真実を確かめる。 要するに、 シナプス旋盤で生きる個体の集合的精神がこれまでに定式化した最も複雑な質問に対して、 イエスかノーかで答えるのだ。"
