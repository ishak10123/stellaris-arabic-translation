 EMPIRE_DESIGN_LACERTAN_TECHNO_PROTECTORATE: "ラセルタ技術保護制"
 EMPIRE_DESIGN_lacertan_techno_protectorate_desc: "ラセルタ文化は、哲学と科学の交差点に位置付けられる。ラセルタにとって究極の追求とは、真の己の表現である。心を真に「表現」するとはどういう意味だろうか？誰かのコピーが元のその人と完全に同じになることはあるのだろうか？このような疑問が、ラセルタの伝統を支配している。\n\n仮想現実の出現と人工知能の驚くべき進歩により、ラセルタは芸術的および技術的表現の新しい世界を拓いた。仮想世界は最も野心的なプロジェクトのキャンバスとなり、物理的現実の制限を超えた没入型の体験を可能にした。\n\nその後、衰退期が到来する。不治の遺伝病に侵され、自然に子供を産むことができなくなったラセルタは、デジタル救済を頼りにしなければならなくなった。デジタル存在への変容は、生き残りの努力であり、ラセルタ文化にとって新たな機会でもある。デジタル領国においてさえ、ラケルタは自分たちの存在の意味を問い続け、未来を守るために競争している。"
 PRESCRIPTED_adjective_lacertan_techno_protectorate: "$EMPIRE_DESIGN_LACERTAN_TECHNO_PROTECTORATE$"
