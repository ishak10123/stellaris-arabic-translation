 civic_wilderness_natural_design_desc: "§R警告：すべてのアセンションパスが使用不可になる§!\n§R警告：有機生命体の種族は変更できない§!\n\nこのウィルダネスは、 自分たちの自然な繁栄の完璧さを認めている。 定期的に突然変異した共生体を刈り取り、 原初から変わることのない遺伝子コードの聖域を護っている。"
 building_transcendental_retreat: "ゲノムサービスセンター"
 building_transcendental_retreat_desc: "この先端医療センターは、 自然が理想とする遺伝暗号の完全性を維持するための研究とサービスを提供している。"
 building_hive_transcendental_retreat: "ゲノム・セーフガード・ウォーレン"
 building_hive_transcendental_retreat_desc: "この先進医療ウォーレンは、 自然が理想とする遺伝暗号の完璧な本質を理解し、 それを育むことに全力を注いでいる。"
 holding_transcendental_retreat: "ゲノム・サービス・アウトリーチ"
 holding_transcendental_retreat_desc: "この先端医療センターは、 自然が理想とする遺伝暗号の完全性を維持するための研究とサービスを提供している。 この宇宙で得られた知識は、 パトロンの研究に役立っている。"
