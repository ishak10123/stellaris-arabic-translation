 building_lathe_capital_desc: "シナプス旋盤の処理ユニットは量子的な性質を持っているため、 多次元の層にわたって並列計算を行うことができる。"
 building_lathe_major_capital: "処理ユニット： 並列"
 building_lathe_major_capital_desc: "改良された処理ユニットは、 ガンマ空間のポケットに収められた神経チップの認知エコーを跳ね返すことで、 並列処理を実行できるようになった。"
 building_lathe_super_capital: "処理ユニット： ベクトル"
 building_lathe_super_capital_desc: "アップグレードされた処理ユニットは、 負空間ベクトルの作成によって計算を効率化する。 このように処理を次元的に区分けすることで、 効率と安定性において並外れた結果が得られる。"
 building_lathe_resonator: "シナプスレゾネーター"
 building_lathe_resonator_desc: "レゾネーターは、 迷走する思考や自律神経システムの潜在的な認知能力を利用し、 それを方向転換させ、 各チップの最も近くにある処理ユニットの効率を上げる。"
 lathe_resonator_tt: "§Y$job_neural_chip_plural$§!の産出： §G$job_neural_chip_plural$§!につき§Y+1%§!\n（現在値： §G+[num_neural_chips]%§!）"
 building_lathe_stabilisator: "ニューラルスタビライザー"
 building_lathe_stabilisator_desc: "安定化システムは、 物理的苦痛が神経チップに起きたときに発生する処理ノイズをフィルタリングする。 干渉が減るということは、 全体的な産出量の増加を意味する。"
 building_lathe_overclocker: "シナプス・オーバークロッカー"
 building_lathe_overclocker_desc: "旋盤は設置された神経チップをできるだけ長く保存し、 生産性を維持するように設計されている。 オーバークロッカーはこれらの設計をオーバーライドすることができ、 その結果、 より高くて速い産出量を得ることができるが、 故障率が高くなる。"
 building_lathe_preserver: "シナプス・プリザーバー"
 building_lathe_preserver_desc: "ネットワークの有機的構成要素は、 エネルギーの変動に特に弱く、 軸索の急速な変性を引き起こす可能性がある。 プリザーバーは、 シナプス旋盤の壊れやすいパーツを保護するために、 このような変動を抑える努力をしている。"
 building_lathe_reactor: "拡張された反応炉"
 building_lathe_reactor_desc: "ネットワークに接続されるチップが増えれば増えるほど、 ネットワークを維持するために必要なエネルギーも増える。 追加の反応炉を設置することで、 シナプス旋盤に電力を供給するための複雑な工程を軽減することができる。"
 building_lathe_life_support: "シナプス・サステイナー"
 building_lathe_life_support_desc: "専用設備が旋盤の重要な部品のメンテナンスを組織化し、 より多くのチップとより健全なネットワーク環境をサポートすることを可能にする。"
 building_lathe_cogitator: "シナプス・コジテーター"
 building_lathe_cogitator_desc: "超空間サプライチェーンの計算は複雑だ。 処理能力の一部をタスクに振り向けることで、 最大規模の艦隊であっても敵陣深くまで潜り込むことができる。"
 building_lathe_cogitator_tt: "§Y宇宙軍許容量§!： §G$job_neural_chip_plural$§!につき§Y+1%§!\n（現在値： §G+[num_neural_chips]%§!）\n§Y艦船の獲得経験値§!： §G$job_neural_chip_plural$§!につき§Y+2%§!\n（現在値： §G+[num_neural_chips_double]%§!）"
 building_lathe_validator: "シナプス・バリデーター"
 building_lathe_validator_desc: "バリデーターの特化した関数の主な目的は、 無限理論の定式化に役立つことだが、 より一般的な計算にも応用できる。"
