 #Fallen Empire Reactions
 action.1.desc_111: "愚かな子よ、 貴様は神を知っていると言いながら、 自分の[Owner.Species.GetFleshTypeCyberCreed]を汚している。 我々は[contact_empire.GetName]、 銀河の選ばれし民であることを知れ。 我々の聖なる場所に不浄な体を近づけるな。さもなくば速やかに制裁されるであろう。"
 action.1.desc_110: "我々は[contact_empire.GetName]、 銀河の選ばれし民。 何世紀もの間、 我々は劣等種の精神的なニーズを無視してきた。 貴様とその不純な器は、 我々の過ちをよく表している。 我々の教義を受け入れ、 改宗するのだ。さもなければ塵と化すだろう。"
 #Cybernetic Situation Events
 machine_age.90.name: "神のインプラント"
 machine_age.90.desc: "信者たちは、 サイバネティクスの秘密を皆のために解き明かした。 しかし、 今日が我々の旅の始まりだ。 我々はこれから、 心から神聖なる融合を受け入れなければならない。"
 machine_age.90.a: "いまこそその時だ。"
 machine_age.90.a.tooltip: "神聖なる融合を開始するには、 ['tradition_category:tradition_cybernetics']伝統ツリーを採用する必要がある。"
 machine_age.100.name: "融合のコンクラーヴェ"
 machine_age.100.desc: "歴史を通して、 我々[Owner.Species.GetFleshTypeCyberCreed]を強化させようとする誤った試みは、 多くの神聖な器を修復不可能なほど傷つけ、 異なる信条の間で神聖な融合についての解釈が対立することになった。\n\n技術の進化によってついに完全な強化が可能になり、 我々の信仰の聖なる指導者であるテクノファントはコンクラーヴェを招集した。 その目的は教会の核となる原則を確立し、 個々の信条を一つの教義のもと統合することである。"
 machine_age.100.a: "神なる導きがあるように。"
 machine_age.1000.name: "信仰の融合"
 machine_age.1000.desc: "テクノファントのコンクラーヴェを結成するのは非常に困難で、 最も重要な信条がそれぞれコンクラーヴェへの代表を要求した。 審議の結果、 §Y$CYBERCREED_construction$§!、 §Y$CYBERCREED_war$§!、 §Y$CYBERCREED_research$§!と§Y$CYBERCREED_labor$§!が招待された。\n\nコンクラーヴェは今、 激しい信念をもって神聖な仕事に取り組んでいる。 彼らの最初の教令は、 国民に十分の一税の増加や社会奉仕の義務付けを要求するものだった。"
 machine_age.1000.a: "コンクラーヴェをどのように援助するかを選択しなければならない。"
 machine_age.1000.a.tooltip: "状況に応じて、 より多くのアプローチが選択できるようになる。"
 machine_age.1010.name: "強化のコーデックス"
 machine_age.1010.desc: "コンクラーヴェの2つ目の教令は、 信仰の正式化を求めるものである。 あまりにも長い間、 さまざまな信条の違いが社会に摩擦を引き起こしてきた。\n\n主要な信条はすべて統一された信仰について説得力のある主張をしており、 より穏健な声は開放的で包括的な道を主張している。"
 machine_age.1010.a: "ハンマーの集いは明るい未来を築くだろう。"
 machine_age.1010.a.tooltip: "教義は§Y$CYBERCREED_construction$§!を中心に成立する。$machine_age.1010.shared.tooltip$"
 machine_age.1010.b: "鋼鉄のテンプル騎士団が[Owner.Species.GetFleshTypeCyberCreed]を守る。"
 machine_age.1010.b.tooltip: "教義は§Y$CYBERCREED_war$§!の信条を中心に成立する。\n$machine_age.1010.shared.tooltip$"
 machine_age.1010.c: "精神の聖歌隊は進歩を歌うだろう。"
 machine_age.1010.c.tooltip: "教義は§Y$CYBERCREED_research$§!の信条を中心に成立する。\n$machine_age.1010.shared.tooltip$"
 machine_age.1010.d: "労苦のコミューンは労働者に意味を持たせる。"
 machine_age.1010.d.tooltip: "教義は§Y$CYBERCREED_labor$§!の信条を中心に成立する。\n$machine_age.1010.shared.tooltip$"
 machine_age.1010.e: "このような分裂的な教義を終わらせるべきだ。"
 machine_age.1010.e.tooltip: "信条は§Y$pft_cyber_creed_general$§!に改められ、 あらゆる忠実な器が改造されることを認める。\n$machine_age.1010.shared.tooltip$"
 machine_age.1010.shared.tooltip: "他の信条に関連する建造物はすべて§Y神殿§!に置き換えられる。\nこの信条は唯一の§Y精神主義派閥§!となる。\n§Y非精神主義§!志向に属する派閥の結成が認められる。"
 machine_age.1020.name: "偽りの信仰"
 machine_age.1020.desc.pickedacreed: "§Y[GetCyberCreed]§!を選んだ後、 他の信条は抗議した。 コンクラーヴェが「真の」信仰に反旗を翻したと考える者は多い。\n\n$machine_age.1020.both$"
 machine_age.1020.desc.nocreed: "各信条はコンクラーヴェが信仰を否定したと主張して抗議している。\n\n$machine_age.1020.both$"
 machine_age.1020.both: "これまでのところ、　抗議は白熱しているが平和的だ。 この火種が炎に発展するかどうかは、 時間が経ってみなければわからない。\n\n次に何が起こるにせよ、 我々は他の信条の運命を決めなければならない。 彼らの教義は異端であり、 彼らが引き起こした混乱は冒涜の良い証拠であるとして、 明白な破門を求める者もいる。 また、 慈悲こそが進むべき道であり、 我々の信仰を誤った信者に対して寛容さを示すよう求める者もいる。"
 machine_age.1020.a: "信仰は一つしかありえない。"
 machine_age.1020.a.tooltip: "テクノファントは他の信条を抑圧する。これは社会不安につながるかもしれない。"
 machine_age.1020.b: "我々の信仰には、 すべての人を受け入れる余地がある。"
 machine_age.1020.b.tooltip: "公式な教義は存在するが、 テクノファントは他の信条も容認する。"
 machine_age.1030.name: "信者の動揺"
 machine_age.1030.desc: "少数派の抗議運動が惑星全域で勃発し、 その多くが聖なる融合からの逸脱を非難している。 国民のほとんどが統一教義を支持しているため、 テクノファンとはこの騒動は一時的なものに過ぎず、 より熱心な抗議者たちが神聖な真実を受け入れるのは時間の問題だと考えている。"
 machine_age.1030.a: "信仰は1つだ。"
 machine_age.1030.a.tooltip: "競合する信条を抑圧するという選択は、 社会不安を招いた。"
 machine_age.1040.name: "自発的な改宗"
 machine_age.1040.desc: "統一教義への信奉は人々の間に広まり、 さまざまな信条の者のほとんどが、 以前のやり方を捨てた。\n\n真の狂信者以外は皆、 最終的な変身のために神聖な[Owner.Species.GetFleshTypeCyberCreed]を準備している。"
 machine_age.1040.a: "神聖な融合の真実は勝利する。"
 machine_age.1040.a.tooltip: "我々は信仰の統一に成功した。"
 machine_age.1050.name: "満足した信条"
 machine_age.1050.desc: "さまざまな信条に表現の自由を認めたことは、 最も調和のとれた選択だった。 わずかな抗議が起きただけで、 それに参加したのは各信条で最も熱狂的な信者だけだった。\n\n信者の大半が公式教義に従っている今、 我々は神聖なる融合に集中することができる。"
 machine_age.1050.a: "我々は信仰を1つ。"
 machine_age.1050.a.tooltip: "異なる信条に寛容であることが社会不安を妨げた。"
 machine_age.1060.name: "理不尽な妥協"
 machine_age.1060.desc: "強硬派の要求に屈したことで、 穏健派の大多数は動揺した。 あらゆる信条が宗教間の暴力の長い歴史を持っていると主張する多くの人々は、 過激な信条を許したことは間違った選択だったと考えている。\n\n大多数は信条を公式に改革することを求めており、 信条が持つ独立性を事実上排除することになる。"
 machine_age.1060.a: "信者は寛容でなければならない。"
 machine_age.1060.a.tooltip: "信条に認められた寛容は、 より穏健な派閥を動揺させ、 社会不安を引き起こしている。"
 machine_age.1060.b: "信条の改革に着手する。"
 machine_age.1060.b.tooltip: "信仰は異なる信条を吸収し、 些細な教義上の争いを断ち切る。"
 machine_age.1070.name: "時の十分の一"
 machine_age.1070.desc: "大いなる融合を間近に控え、 我々は信仰の長年にわたる伝統である「時の十分の一」を振り返る。\n\n何世代もの間、 社会の忠実な信者は皆、 自分の時間と労力の一部を教会に捧げてきた。 神聖なる融合のように、 この奉仕行為は信仰を強めるのに役立つ。\n\n信者たちは、 どのようにして神聖なる強化を支えたら良いだろうか？"
 machine_age.1070.intro: "毎年、 信者は自分の時間の一部を捧げる。"
