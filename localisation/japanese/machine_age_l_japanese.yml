 civic_machine_guided_sapience_desc: "この機械知性は、 新しい種族を生み出すために精密に作られたアルゴリズムを採用している。 進化の過程における未開発の可能性の監督者として、 彼らは準知的生命体の進歩を保証するために惑星セクターを割り当てている。"
