 cyber_creed_flesh_default: "肉"
 cyber_creed_flesh_machine: "建設"
 building_amphitheater_of_the_mind: "精神の円形劇場"
 building_amphitheater_of_the_mind_desc: "この局所的な処理用祭壇によって、 半連結の精神の聖歌隊は光の速さで物質面の秘密について議論し、 共有し、 探求することができる。"
 building_grand_concert_hall_of_the_mind: "精神の大コンサートホール"
 building_grand_concert_hall_of_the_mind_desc: "この鳴り響くホールには最新鋭の通信アレイが設置されており、 精神の聖歌隊は神性を求めて共に交信することができる。 サイバーウェアが加わり、 彼らの詠唱は宇宙の隠されたメロディーを解き明かすだろう。"
 building_forge_of_the_fellowship: "集いの鍛冶場"
 building_forge_of_the_fellowship_desc: "ここでは、 ハンマーの集いの最初の鍛冶場が最高品質の建設資材を産出している。 信者たちが神聖な仕事を追求するとき、 ハンマーは歌う。"
 building_grand_forge_of_the_fellowship: "集いの大鍛冶場"
 building_grand_forge_of_the_fellowship_desc: "大鍛冶場のホールのはるか向こうで、 信者たちは集いの休むことのない道具の数々を耳にすることができる。 夜になると豪華な鋳造大聖堂の輝きは、 神聖な火花と同じように上空の星々を凌駕する。"
 building_battlement_of_steel: "鋼鉄の城壁"
 building_battlement_of_steel_desc: "この要塞教会には、 即戦力である鋼鉄のテンプル騎士団の武器庫と訓練場がある。 彼らは我々の神聖な肉体を守るために常に警戒している。"
 building_grand_battlements_of_steel: "鋼鉄の大城壁"
 building_grand_battlements_of_steel_desc: "この壮大な要塞聖堂の壮麗な壁が崩れることはないだろう。 その武器庫は神聖なる鋼鉄のテンプル騎士団のインプラントで溢れ、 それぞれが選ばれた勇者を待っている。 このホールでは、 神性が肉と鋼の境界に宿る。"
 building_sanctuary_of_toil: "労苦の聖域"
 building_sanctuary_of_toil_desc: "この聖域は、労苦のコミューンの肉体と強化を調整し、 修理し、 若返らせる。"
 building_grand_cathedral_of_toil: "労苦の大聖堂"
 building_grand_cathedral_of_toil_desc: "信者たちの必要を満たす者たちに祝福あれ。 彼らの疲れた魂を労苦の大聖堂で休ませよ。 その作業場と調整場は、 すべての神聖な任務において、 忠実な労働者とその聖なる強化を導き、 補充する。"
 building_the_sanctum_of_augmentation: "強化の聖所"
 building_the_sanctum_of_augmentation_desc: "信仰を共有する精神において、 この神聖な聖所は団結の象徴として立っている。　これらの聖別された部屋の中で、 信者はその群れの魂と強化を世話する。"
 building_the_united_sanctum_of_augmentation: "強化の統一聖所"
 building_the_united_sanctum_of_augmentation_desc: "最も神聖な融合に敬意を払い、 この荘厳な聖所は生きた証となる。 その聖別された部屋の中には、 神聖な融合の崇高な目的を達成するために、 揺るぎない決意を持った信者たちが集まっている。"
 #Advanced Cyber Creed Authorities
 auth_cyber_creed_democratic: "民主制強化主義"
 auth_cyber_creed_democratic_desc: "民主的なサイバネティクス政府には神聖な投票権があり、 強化された市民は、 神との交わりを果たしながら、 さまざまな政治的問題について声を上げることができる。"
 concept_auth_cyber_creed_democratic: "$auth_cyber_creed_democratic$"
 auth_cyber_creed_oligarchic: "寡頭制サイバー神権政治"
 auth_cyber_creed_oligarchic_desc: "寡頭制サイバー神権政府は、 高度に強化された個人からなる特権階級を持ち、 彼らが政治的な全権力を保持し、 比類のない正確さでサイバネティクス社会を操っている。"
 concept_auth_cyber_creed_oligarchic: "$auth_cyber_creed_oligarchic$"
 auth_cyber_creed_dictatorial: "独裁制同調主義"
 auth_cyber_creed_dictatorial_desc: "独裁的なサイバネティクス政府は、 高度なサイバネティクスインプラントによって絶対的な支配力を振るう生涯支配者を選び、 社会の運命を導く。"
 concept_auth_cyber_creed_dictatorial: "$auth_cyber_creed_dictatorial$"
 auth_cyber_creed_imperial: "サイバー帝国主義"
 auth_cyber_creed_imperial_desc: "帝国サイバネティクス政府は、 シームレスな権力継承を保証するために、 最高統治者とその後継者を指名している。 彼らは精神性と高度なサイバネティクスを統合し、 揺るぎない統治を行っている。"
 concept_auth_cyber_creed_imperial: "$auth_cyber_creed_imperial$"
 auth_cyber_creed_corporate: "企業聖技術"
 auth_cyber_creed_corporate_desc: "サイバネティクス企業政府は、 高度なインプラントと信仰とテクノロジーの融合によって、 伝統的な国家の役割を超越し、 神聖な金融機会を求める。"
 concept_auth_cyber_creed_corporate: "$auth_cyber_creed_corporate$"
 #Advanced Cyber Creed Government Types
 gov_cyber_creed_monarchy: "サイバネティクス主権"
 gov_cyber_creed_monarchy_desc: "この政治体制は、 技術精神主義な君主制であり、 支配者とその子孫は聖なる融合の神聖な象徴である。 教会は国家機構を直接支援している。"
 gov_cyber_creed_dictatorship: "神聖テクノクラシー"
 gov_cyber_creed_dictatorship_desc: "この政治体制は、 技術精神主義な独裁政権であり、 公的な信仰に支えられた階層的な権力構造の中で、 一人の強化された個人によって統治されている。"
 gov_cyber_creed_oligarchy: "テクノファント評議会"
 gov_cyber_creed_oligarchy_desc: "この政治体制は、 技術精神主義な寡頭政治であり、 政治権力は国で最も強力な宗教派閥の手中にある。"
 gov_cyber_creed_democracy: "超越共和国"
 gov_cyber_creed_democracy_desc: "この政治体制は、 技術精神主義な民主主義の形態であり、 強化された個人からなる宗教評議会が民主主義のプロセスを監督する。"
 gov_cyber_creed_divine_empire: "神聖強化帝国"
 gov_cyber_creed_divine_empire_desc: "この政治体制は、 技術精神主義な独裁政治の一形態である。 国家の公式な信仰は国民生活のあらゆる面に貫かれており、 国民は強化された支配者を無謬の生ける神とみなしている。"
 gov_cyber_creed_holy_tribunal: "テクノファント法廷"
 gov_cyber_creed_holy_tribunal_desc: "この政治体制は、 技術精神主義な寡頭政治の一形態で、 神の意志に導かれた聖職者の評議会が国家のあらゆる機構をコントロールしている。"
 gov_cyber_creed_megachurch: "強化巨大教会"
 gov_cyber_creed_megachurch_desc: "この政治体制は、 商業的価値観と技術精神主義的価値観の混合による寡頭制である。 叙任された聖職者と企業役員が一つの役職に統合されている。"
 gov_cyber_creed_subversive_cult: "機械カルト"
 gov_cyber_creed_subversive_cult_desc: "この政治体制は、 さまざまなサイバー犯罪や企業活動によって運営されているカルト宗教になっている。"
 #Advanced Government Edicts
 edict_cybernetic_creed_construction_edict: "高潔な槌打"
 edict_cybernetic_creed_construction_edict_desc: "神聖な社会のために、 我々はハンマーの集いを全面的に支援しなければならない。 その活動は神にふさわしい未来を築く鍵となる。"
 edict_cybernetic_creed_war_edict: "鋼鉄の聖戦"
 edict_cybernetic_creed_war_edict_desc: "我々の神聖な肉体を攻撃する悪魔から身を守るため、鋼鉄のテンプル騎士団を全面的に支援し、我々の戦士が常に戦えるようにしなければならない。"
 edict_cybernetic_creed_research_edict: "知識の歌"
 edict_cybernetic_creed_research_edict_desc: "活気に満ちた知識の歌を通じてのみ、 人民は神のことを真に知ることができる。 我々は賢明なる精神の聖歌隊のあらゆる努力を支援しなければならない。"
 edict_cybernetic_creed_construction_labor: "苦心する大衆"
 edict_cybernetic_creed_construction_labor_desc: "我々の真の強さは労働者にある。 我々に労働者を持ち上げる力がなければ、 彼らも我々を未来に連れて行く力を持たないだろう。"
 edict_cybernetic_creed_general_edict: "ハーモニーの教訓"
 edict_cybernetic_creed_general_edict_desc: "教会の統一は多くの教訓をもたらした。 我々の信仰をこれまで以上に強く、 より熟考的なものにした。"
 #Intro Events
 machine_age.2150.name: "信条"
 machine_age.2150.desc: "神に導かれて星に向かい、 信仰の中のさまざまな信条が新政府への影響力に期待している。\n\nそれぞれが信者に対してかなりの影響力を行使し、 メンバーの影響力のある地位への昇格を擁護し、 彼らの明確な霊的欲求を満たしている。\n\nこれらの多様な圧力が、 我々を神へと近づけるのか、　それとも混沌へと陥れるのかは、　時間だけが明らかにしてくれるだろう。"
 machine_age.2150.a: "役立ってくれるといいのだが。"
 machine_age.2150.a.tooltip: "§Y結成された派閥§!:\n- $cyber_creed_labor$\n- $cyber_creed_war$\n- $cyber_creed_research$\n- $cyber_creed_construction$"
 cyber_creed_please_labor: "§Y$cyber_creed_labor$§!信条は喜ぶだろう\n他の信条は不快に思うだろう。"
 cyber_creed_displease_labor: "§Y$cyber_creed_labor$§!信条は不快に思うだろう\n他の信条は喜ぶだろう。"
 cyber_creed_please_war: "§Y$cyber_creed_war$§!信条は喜ぶだろう\n他の信条は不快に思うだろう。"
 cyber_creed_displease_war: "§Y$cyber_creed_war$§!信条は不快に思うだろう\n他の信条は喜ぶだろう。"
 cyber_creed_please_construction: "§Y$cyber_creed_construction$§!信条は喜ぶだろう\n他の信条は不快に思うだろう。"
 cyber_creed_displease_construction: "§Y$cyber_creed_construction$§!信条は不快に思うだろう\n他の信条は喜ぶだろう。"
 cyber_creed_please_research: "§Y$cyber_creed_research$§!信条は喜ぶだろう\n他の信条は不快に思うだろう。"
 cyber_creed_displease_research: "§Y$cyber_creed_research$§!信条は不快に思うだろう\n他の信条は喜ぶだろう。"
 machine_age.2205.name: "歴史の書き換え"
 machine_age.2205.desc: "§Y鋼鉄のテンプル騎士団§!は歴史的記録や忠実な記録において、 軍事的敗北の例を禁止するよう訴えている。\n\nこの信条は、 このような情報が軍人の士気を下げ、 国民の支持を弱めると主張している。 歴史家たちはこの考えを否定し、 歴史から学べない者は同じことを繰り返す運命にあると主張している。\n\n彼らの過去に対するより肯定的な見方を受け入れるべきなのだろうか？"
 machine_age.2205.a: "勝利するには、 勝者として考えなければならない。"
 machine_age.2205.a.tooltip: "$cyber_creed_please_war$"
 machine_age.2205.b: "あり得ない。 過去の間違いから学ばなければならない。"
 machine_age.2205.b.tooltip: "$cyber_creed_displease_war$"
 machine_age.2210.name: "火が消えた"
 machine_age.2210.desc: "§Yハンマーの集い§!の指導者である高位鍛冶職人が急に亡くなった。\n\n率直な言動と断固とした見解で知られていたにもかかわらず、 信条のメンバーからカルト的な支持を得ていた。 集いは公式の国葬を行うよう要請した。 これは通常、 最も敬愛される指導者にのみ許される名誉である。\n\n当然のことながら、 他の信条はこの率直な精神的指導者の埋葬に国家が関与すべきではないと要求している。\n\n信条の要求にどう対処すべきか？"
 machine_age.2210.a: "国葬を許可する。"
 machine_age.2210.a.tooltip: "$cyber_creed_please_construction$"
 machine_age.2210.b: "他の信条を怒らせる価値はない。"
 machine_age.2210.b.tooltip: "$cyber_creed_displease_construction$"
 machine_age.2215.name: "問題の遺物"
 machine_age.2215.desc: "最近、 考古学チームが古代の宗教遺跡を発見した。 その存在は神話と考えられていたが、 すでに我々は信仰の歴史的記録の一部を修正する必要に迫られている。\n\n最も驚くべき事実は、 発掘された歴史的遺物の多くに、 明らかに§Y労苦のコミューン§!の図像があることだ。 この情報は、 コミューンが宗教の本来の解釈であることを証明するものであり、 これは我々の信仰において激しく議論されている事柄でもある。\n\nこの発見を正式に認識すれば、 §Y労苦のコミューン§!は喜ぶだろうが、 戦略的沈黙は他の信条を喜ばせるだろう。"
 machine_age.2215.a: "真実を恐れてはならない。"
 machine_age.2215.a.tooltip: "$cyber_creed_please_labor$"
 machine_age.2215.b: "これが埋まっていたのには理由がある。 無視しろ。"
 machine_age.2215.b.tooltip: "$cyber_creed_displease_labor$"
 machine_age.2221.name: "信条潜入捜査官"
 machine_age.2221.desc: "我々は§Y[cyber_creed_undercover_leader.GetName]§!が§Y[GetCyberCreed]§!と深い関係にあり、 資金を横領し、 プロジェクトを信条の勢力圏の方に振り向けていたことを明らかにした。\n\n他の信条は、 現政権下でこのようなあからさまな権力の乱用が起きたことに激怒し、 §Y[cyber_creed_undercover_leader.GetName]§!を即刻権力の座から引きずり下ろすよう要求している。\n\nこの行き過ぎた指導者をどうすべきか？"
 machine_age.2221.a: "[cyber_creed_undercover_leader.GetHerHim]の地位をはく奪する。"
 machine_age.2221.a.tooltip: "[cyber_creed_undercover_leader.GetName]の地位ははく奪された。"
 machine_age.2221.b: "[cyber_creed_undercover_leader.GetSheHe][cyber_creed_undercover_leader.GetHasHave]が行ってきた良いことは、 この罪を凌駕する。"
 machine_age.2225.name: "ハンマー記念祭"
 machine_age.2225.desc: "§Yハンマーの集い§!の聖年巡礼が始まろうとしており、 数え切れないほどの信者たちが地元の鍛冶場から首都の§Y$building_forge_of_the_fellowship$§!まで旅をする。\n\n従来、 この行事は数え切れないほどの物流上の問題を引き起こし、 集いのメンバーが最終的に他の信条の実践者と衝突し、 暴力沙汰で終わることが多かった。\n\n他の信条や首都に住む人々からも、この習慣をやめようという声が上がっている。"
 machine_age.2225.a: "巡礼を完全に禁止する。"
 machine_age.2225.a.tooltip: "$cyber_creed_displease_construction$"
 machine_age.2225.b: "宗教の自由は権利である。"
 machine_age.2225.b.tooltip: "$cyber_creed_please_construction$"
 machine_age.2230.name: "技術不足の訴え"
 machine_age.2230.desc: "最近、 §Y精神の聖歌隊§!の指導者である大聖歌隊長は、 信者が研究費に力を入れていないことについて公然と発言している。\n\nこれは、 自分たちの信条を持つメンバーにより多くの資金が回るようにするための策略だと思われる。 要求を呑むことは、 我々が§Y精神の聖歌隊§!を優遇していると見なされかねない。\n\n科学研究費を増やすべきか？"
 machine_age.2230.a: "聖歌隊長には声が枯れるまで歌わせておけ。"
 machine_age.2230.a.tooltip: "$cyber_creed_displease_research$"
 machine_age.2230.b: "この問題が収束するまで、 資金繰りを適度に改善する。"
 machine_age.2230.b.tooltip: "$cyber_creed_please_research$"
 machine_age.2230.c: "資金繰りを大幅に改善する。"
 machine_age.2230.c.tooltip: "$cyber_creed_please_research$"
 cyber_creed_history_rewritten: "書き換えられた歴史"
 cyber_creed_history_rewritten_desc: "記録から軍事的敗北に関する記述をすべて削除し、 歴史家を落胆させた。"
 cyber_creed_history_repeating: "繰り返される歴史"
 cyber_creed_history_repeating_desc: "軍事的敗北に関するすべての言及を記録に残した。 この選択は鋼鉄のテンプル騎士団を怒らせた。"
 cyber_creed_no_choirmaster_funding: "聖歌隊長を無視した"
 cyber_creed_no_choirmaster_funding_desc: "精神の聖歌隊による研究資金の改善の呼びかけを無視した。"
 cyber_creed_low_choirmaster_funding: "聖歌隊長の要求に耳を傾けた。"
 cyber_creed_low_choirmaster_funding_desc: "精神の聖歌隊をなだめるために、 研究に若干の資金援助を行った。"
 cyber_creed_high_choirmaster_funding: "聖歌隊長の要求を受け入れた。"
 cyber_creed_high_choirmaster_funding_desc: "精神の聖歌隊が望む科学的資金援助を全面的に受け入れた。"
 cyber_creed_state_funeral: "高位鍛冶職人の葬儀"
 cyber_creed_state_funeral_desc: "ハンマーの集いの亡くなった指導者のために国葬を行った。"
 cyber_creed_no_state_funeral: "国葬なし"
 cyber_creed_no_state_funeral_desc: "ハンマーの集いの亡くなった指導者のために国葬を行わなかった。"
 cyber_creed_relics_truth: "明かされた真実"
 cyber_creed_relics_truth_desc: "我々は労苦のコミューンの時代に関する真実を大衆に伝え、 他の信条を怒らせた。"
 cyber_creed_relics_hidden: "隠された真実"
 cyber_creed_relics_hidden_desc: "聖遺物を無視することで、 信仰の指導者に対する不信感はあるものの、 ほとんどの信条は満足感を得ることができた。"
 cyber_creed_leader_removed: "行き過ぎた指導者の排除"
 cyber_creed_leader_removed_desc: "信条の内通者であった我々の指導者は権力の座から追われた。"
 cyber_creed_leader_stayed: "行き過ぎた指導者の残留"
 cyber_creed_leader_stayed_desc: "解任を求める声があるにもかかわらず、 信条の内通者であった指導者をそのままにしておいた。"
 cyber_creed_pilgrimage_allowed: "集いの巡礼許可"
 cyber_creed_pilgrimage_allowed_desc: "ハンマーの集いの巡礼は許可された。 予想通り、 巡礼の後には暴力と抗議が続いた。"
 cyber_creed_pilgrimage_canceled: "集いの巡礼禁止"
 cyber_creed_pilgrimage_canceled_desc: "ハンマーの集いの巡礼は禁止された。 予想されていた暴力は避けられたが、 この判断に不服な信者もいる。"
