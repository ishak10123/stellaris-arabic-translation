 concept_military_academy: "戦術的洞察"
 concept_military_academy_desc: "帝国の外に駐留する各§Y$commander_with_icon$§!が以下を付与:\n回避 §G+2%§!\n追尾 §G+1%§!\nシールド貫通性 §G+5%§!\n装甲貫通性 §G+5%§!\n\nわが帝国の庇護下にある各§Y傭兵中立機構§!が以下を付与:\nシールド強化 §G+10%§!"
 #Natural Design Civic
 civic_natural_design: "自然なデザイン"
 civic_natural_design_desc: "§R警告：すべてのアセンションパスが使用不可になる§!\n§R警告：有機生命体の種族は変更できない§!\n\nこの社会は、 自然はすでに人々の遺伝子コードの中に完璧なものを創りだしていると固く信じている。 彼らは長い間、 医療と行政機関を自然で手つかずのゲノム配列の健康と保存に捧げてきた。"
