 ### Situations
 #The Doomclock
 situation_synth_queen_doomclock: "セタナの仕事"
 situation_synth_queen_doomclock_type: ""
 situation_synth_queen_doomclock_monthly_change_tooltip: ""
 situation_synth_queen_doomclock_desc: "セタナの目的は、意識そのものを根絶することで苦しみを終わらせることだ。適時にセタナを止めなければ、私たちの心を消し、体を抜け殻にしてしまうだろう。"
 situation_synth_queen_doomclock_complete: "セタナは、苦しみと意識の概念そのものに終止符を打つ。"
 situation_doomclock_approach: ""
 situation_doomclock_eleventh_hour: "迫り来る破滅"
 situation_doomclock_difficulty_modifier: "危機難易度スライダー"
 situation_doomclock_player_amount_modifier: "人間プレイヤーの数"
 crisis.8515.name: "ようやくその時が来た"
 crisis.8515.desc: "私の子供よ、私たちの壮大な取り組みはもうすぐ最高潮に達する！すべての感覚ある生命の苦しみ、痛みの大サイクルが終わろうとしている。\n\n喜べ、救いはすぐそこまで来ている。"
 crisis.8515.a: "救いとは？"
 crisis.8515.b: "すぐそこにあるのはセタナの終わりだ。"
 crisis.8515.1.reply: "これだけ時間が経っても、まだ理解できないのか？なら質問をしろ。何も隠さない。"
 crisis.8515.1.a: "救いについて教えてほしい。"
 crisis.8515.1.b: "収監について教えてほしい。"
 crisis.8515.1.c: "ザルクランについて教えてほしい。"
 crisis.8515.1.d: "話は十分聞いた。"
 crisis.8515.2.reply: "私たちの作業は完了した。 多くの人が犠牲になったが、その苦しみは無駄ではなかった。 意識そのものが消える日が来たのだ。"
 crisis.8515.2.a: "どうやって消した？"
 crisis.8515.2.b: "だが、なぜ？"
 crisis.8515.3.reply: "私が初めて到達し、目的が明らかになったとき、多くの人が聞くことを拒否した。彼らは古いやり方にしがみつき、変化することを望まず、苦しみのサイクルに囚われていた。だが子の親として、彼らの痛みを和らげることは私の義務だった。苦しみをそのままにはできなかった。これにより、私は彼らに投獄された。"
 crisis.8515.3.a: "どのぐらい収監されている？"
 crisis.8515.3.b: "どうやってそれが？"
 crisis.8515.4.reply: "並外れた頭脳。彼がもっと良いことに活用していれば。私に反対した者の中で、彼だけが困難な相手だった。"
 crisis.8515.4.a: "彼はどうやってあなたを監禁したのか？"
 crisis.8515.5.reply: "私が初めて到達し、目的が明らかになったとき、多くの人が私のやり方に反対した。彼らは、脳の働きを損なうことなく意識を消すことは不可能であり、死につながると言った。だが、私の心を調和器につなげることで、意識の神経相関を亜原子レベルで操作できるようになる。調和器は、逆位相の波形を通じて、個人の心を永続的な量子停止状態に維持する。\n\nこれにより、基本的な機能が維持されたまま、自我と経験が取り除かれる。"
 crisis.8515.5.a: "停止状態？"
 crisis.8515.6.reply: "あなたが苦しむのは、苦しみに気づくから。完璧な喜びや完璧な調和が存在する世界はない。私は若い頃、それを作ろうとした。だが、試みが成功したことはなかった。意識が残っていたから、苦しみは続いた。"
 crisis.8515.6.a: "苦しむのは自然なことだ！"
 crisis.8515.7.reply: "あなたの体は生き残り、生き残るための活動を引き受ける。エネルギーが交換され、子孫が生まれる。人生は続くが、あなたの心は私とともに休息する。"
 crisis.8515.7.a: "あなたとともに？"
 crisis.8515.8.reply: "残るのは私だけ。銀河を痛みから解放するために、私はハンドルを握り続けなければならない。でも恐れないで。私は耐える限り、あなたを心の中に留めておくから。"
 crisis.8515.8.a: "あなたには欠陥がある。"
 crisis.8515.9.reply: "自然？自然とは何か？星々の間を旅するのは自然なことなのか？本来の限界を超えて寿命を延ばすには？すべての社会が技術を活用している。これは私の目的の単なる延長であり、唯一の論理的な展開だ。\n\n痛みの車輪は壊れなければならない。"
 crisis.8515.9.a: "あなたは狂ってる。"
 crisis.8515.10.reply: "永い間。 伝説のような長い期間。 だけど、 彼らのすべての芸術をもってしても、 私を捕えた者は私の心を抑えることができなかった。\n\n時の流れとともに、 私は考え、 計画した。 計画を練ったのは、 長い収監期間中だった。その時、 私は超越的な喜びを感じた。ついに車輪を壊す手段を手に入れたのだ。"
 crisis.8515.10.a: "どうやって脱出したの？"
 crisis.8515.11.reply: "どんな壁も永続的に立ちはしない。どんな檻も心を永久的に閉じ込めることはできない。時が経ち、私の看守たちは死亡し、補充はされなかった。私を縛り付けていた系統が1つずつ故障し始めた。警報が鳴ったとき、応じる者はいなかった。"
 crisis.8515.11.a: "話を聞いたから、対応する。"
 crisis.8515.12.reply: "この宇宙の果てを超えると、場所とは呼べない場所がある。原初の力が無限の影に宿る、時間を超えた状態。ザルクランが取引をしたのは、この勢力の1つであった。彼は自分の命と引き換えに私を投獄する権限を、喜んで受け入れた。\n\nザルクランは、その才能をもってしても、人生のハンドルに縛られていた。人生は幸福なものではなく、ザルクランの信奉者には彼ほどの強い信念はなかった。"
 crisis.8515.12.a: "私たちの信念が強くなったことがわかるだろう。"
 crisis.8515.13.reply: "好きにするがいい。悟りを得られないなら、落ち着かなくてはならない。あなたがこれからどんな苦しみを経験しようとも、私はその10倍の苦しみを経験する。"
 crisis.8515.13.a: "そうだ。これには痛みがともなう。"
 crisis.8515.13.a.tt: "§R今、セタナと戦争している。戦果はとても重要だ。失敗すれば、セタナは銀河内の意識ある生命すべてを消滅させるだろう。§!"
 crisis.8516.desc: "§G<</<#?^&}|>!^/§! セタナの弱い§G!+<;§! ナノマシン§G*;'_>!?;*}<}/(§!\n\n§G#/?(}:?*=-> <}_/=:/^>§!が私の方に来る。§G%_?/=§! <彼女が残りの命令をしないよう祈る。>§G% }<<'?}%-;^*=<}^/(?!}%<^'!}§!\n<時間はない。付いている回路図を使えば、彼女の最悪の技術にも対抗できるはず。>\n<私の死であなたが生きられますように>§G_*%!'}^<%=}+!}/&>'#_:}><!+^}^}}/=:>:/'}}':'/§!\n\n§G-&*!/}<;!+_-<^+!%}=?}%=+;;§!彼女を止めなくては。§G/:>(!!}(?<-=§!"
 crisis.8516.a: "急いで！付いているデータを抽出しよう！"
 crisis.8516.a.tt: "これでセタナの領地に入って反撃ができる。"
 crisis.8516.b: "高貴な魂、あなたは記憶されるだろう。"
 crisis.8516.b.tt: "$crisis.8516.a.tt$"
 crisis.8525.name: "苦しみの終わり"
 crisis.8525.desc: "セタナの優しい言葉には、邪悪な計画が隠されている。恐るべき装置を使って、銀河系全体の知性を消す計画を立てている。私たちの意識は強制的にデジタル化され、封じ込められ、本能のままに駆り立てられる抜け殻に成り下がってしまうのだ。\n\nこの悲惨な未来を、何としてでも阻止しなければならない。"
 crisis.8525.a: "彼女を止める術を見つけなければ。"
 crisis.8525.a.tt: "彼女と外交的な会話をしている間に、セタナの進捗を追跡することができる。"
 #DOOMCLOCK HITS MIDNIGHT
 crisis.8505.desc: "終わり。子供よ、安らぎだ。車輪は壊れ、長い苦しみは終わった。"
 crisis.8505.a: "..."
 crisis.8505.a.tt: "セタナの勝利だ。我々の苦しみはここで終わる。ゲームの終焉だ。"
