 building_augmentation_bazaars_branch: "宇宙インプラント・ハブ"
 building_augmentation_bazaars_branch_desc: "より速く、 より高くジャンプし、 よりよく考え、 より長持ちさせる必要があるなら、 銀河系各地からのエキゾチックな輸入品が、 近くのインプラントハブで購入できるようになった。"
