 pft_cyber_creed_labor_desc: "労苦のコミューンはすべての謙虚な労働者とその強化を熱心に監督し、 努力の神性に対する深い信念が彼らの行動を後押しする。 根を手入れする者だけが、 神聖を理解することができるのだ。\n\n§L精神主義志向§!"
