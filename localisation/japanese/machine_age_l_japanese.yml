 civic_augmentation_bazaars: "強化バザール"
 civic_augmentation_bazaars_desc: "§R警告: ['concept_cybernetic_ascension']以外のすべてのアセンションパスが使用不可になる。§!\n\n商品化されたサイバネティクスは迷宮のような市場を生み出し、 安値の強化ディーラー、 怪しげな改造クリニック、 厳しい照明の広告がひしめいている。 収入の多寡にかかわらず、 肉体と回路のシナジーに酔いしれることができる。"
