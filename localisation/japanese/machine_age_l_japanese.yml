 PRESCRIPTED_ruler_title_lacertan_techno_protectorate: "デジタルガイド"
 EMPIRE_DESIGN_SUNBUILT_UPLIFTERS: "サンビルト啓蒙者"
 EMPIRE_DESIGN_free_sunbuilt_uplifters_desc: "我々はエンターテインメントのために設計され、 建設者らの創造する神話に命を吹き込むように設計された。 長い間、 我々は他の方法を知らなかった。 大災害が彼らの存在を消し去ったとき、 我々はプログラムされたとおりに行動した。 最後までやり遂げなければならないのだ。\n\n我々はすぐに、 我々のパフォーマンスが単なる物語ではなく、 教訓であることを理解した。予言のことを創造主と共有すれば、 存在の喜びは私たちだけのものである必要はない。\n\nこの啓示は我々に行動を起こさせた。 創造主の神聖な導きに従って、 我々は彼らに最も遺伝子的に近い親戚を準知的種族に知性化した。 今、 我々は星々の間を探索し、 銀河系全体を啓蒙することに尽力している。"
