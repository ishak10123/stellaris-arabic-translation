 pft_cyber_creed_research_desc: "精神の聖歌隊は研究者とエンジニアからなる準集合体である。 彼らの瞑想的な痕跡は、 同じ信条を持つ者同士で瞬時に情報を共有する手段として機能している。\n\n§L精神主義志向§!"
