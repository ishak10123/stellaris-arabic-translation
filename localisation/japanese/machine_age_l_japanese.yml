 concept_universal_augmentations_traits_desc: "$concept_universal_augmentations_traits$は、 ['trait:trait_auto_mod_cyborg']特性によって自動補正可能な種族特性である。$NEW_LINE$$concept_automodding_cyborg_desc$"
