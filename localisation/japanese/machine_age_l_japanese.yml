 #Modifiers
 queenslayer: "セタナの弱点"
 queenslayer_desc: "セタナは強力だが、無敵ではない。解読可能、予測可能な複雑なパターンで行動する。"
 queenexecutioner: "人工生命体の女王の破滅"
 queenexecutioner_desc: "セタナの技術の秘密をほぼ解明していて、設計に壊滅的な打撃を与える準備ができている。"
 mod_damage_vs_country_type_awakened_synth_queen_mult: "人工生命体の女王セタナへのダメージ"
 #Player Facing Situation Events
 crisis.8999.name: "女王の帰還"
 crisis.8999.desc: "セタナの意図は憂慮すべき懸念を引き起こし、 彼女の行動は隠された目的を示唆している。\n\n我々は彼女の真意の謎を解き明かすために資源を割かなければならない。 そうすることで、 彼女が我々に反旗を翻すような事態を招かないと願うばかりだ。"
 crisis.8999.a: "彼女を止めることはできるのか？"
 crisis.8999.a.tooltip: "セタナの突然の出現は特異な状況であり、 対処しなければならない。"
 crisis.9000.name: "通信の中断"
 crisis.9000.desc: "セタナの護送船団やステーションが救難信号に使用している周波数を見つけた。\n\n迅速に、かつ決断力があれば、バレずに襲撃できる。だが必ず勝利を収めなくてはならない。セタナの怒りは途方もない。"
 crisis.9000.a: "護送船団は何を隠しているのか？"
 crisis.9000.a.tooltip: "セタナの護送船団や前哨地を負かすことで、セタナの態度が悪くなることがなくなる。"
 crisis.9010.name: "大発見"
 crisis.9010.desc: "これまで、セタナの技術はあらゆる攻撃を阻止してきた。だが、最近の進歩により、彼女の複雑な防衛技術への理解が深まった。この知識を武器に、彼女を倒すことができるかもしれない。\n\n新しく発見された技術は両刃の剣である。女王と呼ばれるセタナに公然と対抗できる一方、 反抗の意思も露になってしまう。"
 crisis.9010.a: "準備をしなければならない。すべてがこれにかかっている。"
 crisis.9010.a.tooltip: "セタナとの全面的な交戦の決断は差し迫っている。 どちらが攻撃を仕掛けるかにかかわらず、真実は明らかになり、 全面戦争へと突入するだろう。"
 #Player Investigation events
 #Event chain
 the_synth_queen_history_chain_title: "セタナ： 女王の召使い"
 the_synth_queen_history_chain_desc: "銀河のいたるところで謎のビーコンが光り、 セタナ女王に位置を知らせる。 まるで何かが、 あるいは誰かが、 彼女の帰りを待っていたかのように。"
 synth_queen_history: "ビーコンの調査"
 #Special Project
 THE_SYNTH_QUEENS_INVESTIGATION: "[this.GetName]のビーコン"
 THE_SYNTH_QUEENS_INVESTIGATION_DESC: "女王の注意を喚起するビーコンのひとつがこの[this.GetPlanetMoon]にある。"
 THE_SYNTH_QUEENS_INVESTIGATION_FAKE: "[this.GetName]のビーコン"
 THE_SYNTH_QUEENS_INVESTIGATION_FAKE_DESC: "$THE_SYNTH_QUEENS_INVESTIGATION_DESC$"
 THE_SYNTH_QUEENS_INVESTIGATION_PARAGON: "[apostate_site_planet.GetName]の最後のビーコン"
 THE_SYNTH_QUEENS_INVESTIGATION_PARAGON_DESC: "$THE_SYNTH_QUEENS_INVESTIGATION_DESC$"
 #Starting event
 crisis.20000.name: "嘆願する光"
 crisis.20000.desc: "セタナが銀河系にその存在を知らしめるとき、 宇宙はそれに応えてささやく。 シグナルビーコンが暗闇の中で燃える炎のように空を照らし、 遥かな時を超えて嘆願を繰り返す。\n\n§S我々はここにいる。我々はここにいる。\n\n我々はここにいる。§!\n\n弱い信号はセタナと同じ通信プロトコルを使用しており、 共通の起源を示唆しているが、 スキャナーからは何もわからない。 スキャナーで検知できない何かがあるに違いない。 誰かが本当に彼女の帰還を予期していたのか？"
 crisis.20000.a: "調査しろ。"
 #Arc Site appears
 crisis.21005.name: "突然の発信"
 crisis.21005.desc: "警告もなく、我々の領域内から亜空間ビーコンが発信されているのを検出した！以前の星系調査結果によれば、この地域には人工構造物はなく、無人のはず。\n\nビーコンは、最近、知らないうちに設置されたか、その後無効化された不可視盾で隠蔽されたかのどちらかだ。"
 crisis.21005.a: "信号を調査する。"
 #Special Project result 1 - destroyed pods
 crisis.20100.name: "[fromfrom.GetName]のビーコン： 時を超えた虐殺"
 crisis.20100.desc.base: "[fromfrom.GetName]の地上には広大な複合施設があり、 その入り口には信号塔があった。 強化されたドアはずいぶん前に爆破されていた。 何か激しい力が施設全体を突き通っていったようだ。\n\nここで採用された方法に慈悲はなかった。 冷凍ポッドは残らず粉砕され、 かつての乗員たちは致命的な目覚めにさらされた。 その残骸は、 宇宙の冷たい真空に保存され、 粉々になったガラスの雲の中を浮遊しながら、 いまだに空の廊下に取り残されている。\n\n冷凍室の床には、 レーザー兵器によってメッセージが書き込まれている。"
 crisis.20100.desc.nozarqlan: "$crisis.20100.desc.base$科学者たちはその正確な意味を訳すのに苦労しているが、 死者への祈りではないかと疑っている。"
 crisis.20100.desc.zarqlan: "$crisis.20100.desc.base$科学者たちはそれを簡単に翻訳し、 それは預言者ザルクランの墓で発見された文字と一致した。\n\n「生命の敵、 女王の使徒に死を。」"
 #Special Project result 2 - sleeping army
 crisis.20200.name: "[fromfrom.GetName]のビーコン： 眠る軍"
 crisis.20200.desc: "何千、何万もの極低温ポッドが[fromfrom.GetPlanetMoon]の地表下に眠っており、 ビーコンがその存在を示している。 ポッドは非常に精巧で、 未知の合金で作られ、 中にいる者を細かく監視する最新式のセンサーが装備されている。 設計に欠陥はなが、 中にいる者は誰も生きていない。\n\nここを集団墓場に変えたのは技術的な失敗ではなく、 エネルギー不足によるものだった。 [this.solar_system.GetName]が古くなり、 暗くなるにつれて、 そのエネルギーは構造物を稼働させるのに不十分となっていった。\n\nポッドは永遠に使えるように作られているが、 宇宙の他のものはそんなにうまくできていない。"
 #Special Project result 3 - old spaceship
 crisis.20300.name: "[fromfrom.GetName]のビーコン： 忘れられた武器"
 crisis.20300.desc: "事前のスキャンでは、 [fromfrom.GetName]に異常は見つからなかった。 しかし、下方に注意を向けると、 岩があるはずの場所に金属層を発見した。\n\nさらに構造分析を進めると、 [fromfrom.GetName]の正体が明らかになった。 この天体は[fromfrom.GetPlanetMoon]ではなく、 星系の宇宙岩石や塵に徐々に包含されてきた古代の宇宙船だったのだ。 我々が掘削した金属サンプルは非常に古く、 我々の母星が形成されるよりも前のものである。\n\nこの艦船やその製造者、機能について何も判断することはできない。 しかしひとつだけ確かなことがある。 それは、 その艦船から見つかった不活性核爆弾は、 平和のために作られたものではなかったということだ。"
 #Special Project result 4 - Arc site 1 (Zarqlan base)
 crisis.20400.name: "[fromfrom.GetName]のビーコン： 放棄された基地"
 crisis.20400.desc: "[apostate_site_planet.GetName]にある信号塔は、 広大な軍事施設の廃墟に囲まれている。 建物は少し離れた場所に建てられており、 まるで信号塔を囲むように建っている。\n\n放射年代測定によると、 周辺の建造物は塔よりも新しく、 まったく異なる技術で建てられたことが判明した。 調査隊が廃墟を調査することになった。"
 #Special Project result 5 - Arc site 2 (comatose survivor)
 crisis.20500.name: "[fromfrom.GetName]のビーコン： 意外な生存者"
 crisis.20500.desc: "冷凍ポッドに表示された詳細によると、 異星人の名前はエリク・ナリス・ケラクで、 3,213,213,293,124星回転の間ここにいる。 ポッド自体は[fromfrom.GetName]の地表の下にある密閉された部屋で回収した多くのポッドのうちのひとつだった。 そしてなんと、 エリクのポッドはまだ機能していた。\n\n異星人は仮死状態のままであるが、 休眠を保つサブルーチンは最近その作動を停止した。 それ以来、 エリク・ナリス・ケラクは部分的に意識を保っている。\n\n彼女の脳波をスキャンすることで、 このありえないほど太古の生物について、 またセタナとのつながりについて、 もっと詳しく知ることができるかもしれない。"
 #Special Project result 6 - Nothing
 crisis.20600.name: "[fromfrom.GetName]のビーコン： 空の呼びかけ"
 crisis.20600.desc: "[fromfrom.GetName]の信号塔はとても古く、 触れることさえできない。 その金属はとてももろく、 一度たたいただけで、 まだそれを支えているほこりだろうが希望だろうが、 どんなものであれ、 壊れてしまうだろう。 我々の観測機器は、 そのすぐ近くに他の人工物も、 生命反応も、 地形のアノマリーも検知していない。\n\nビーコンはかすかな呼び声を発しながら、ぽつんと立っている。 しかし、合図となるはずのものはとっくになくなっているに違いない。"
 crisis.21000.name: "届かない懇願"
 crisis.21000.desc: "銀河中のビーコンがセタナに呼びかけを続けているが、 塔付近で活動の兆候は検出されていない。 過去の調査結果によれば、 これらの場所には生存者はいないものと思われる。\n\nセタナの信者たちに残っているのは、 女王への揺るぎない信頼だけだ。"
 #Arc site 1
 synth_queen_history_site_1: "セタナ: ベールに包まれた聖堂"
 synth_queen_history_site_1_desc: "我々の領域に隠され、浮き上がってきた複合施設。荒廃した中庭の中心から、ビーコンがセタナを呼び出す。"
 #Stages
 crisis.21100.name: "ベールに包まれた聖堂: 中庭"
 crisis.21100.desc: "廃墟の建物は、そびえ立つ尖塔が迷路のように立ち並び、まるで鋼鉄で覆われた大聖堂のようである。城壁は激しい砲撃に耐えられるように建てられているが、戦闘の痕跡はない。唯一のダメージは、経年劣化のみ。\n\nセタナのビーコンは、中庭の中央で、多数のセンサーと武器の砲塔に囲まれている。この複合施設を建てた人が誰であれ、この場所を守るために細心の注意を払ったことはわかる。\n\n理論どおり、聖堂は精巧な不可視盾により、私たちのセンサーを回避した。この機構は塔の近くで発見され、作動状態にあったが、不明な人物によって手動で無効にされた。"
 crisis.21100.a: "メインの建造物を偵察しろ。"
 crisis.21105.name: "ベールに包まれた聖堂: 1階"
 crisis.21105.desc: "この場所の住民が何をしていたかはわからないが、宗教的な熱意を持って使命を果たしていたのは間違いない。\n\n複合施設内のそれぞれの射撃場に、礼拝堂があり、それぞれの古代兵器に、神殿がある。かつてここには大勢の信者が住んでいて、何千人もの人々が一緒に眠り、教育を受け、祈っていたのは確かだ。ホールに今も飾られている聖人の彫像からして、地域社会は複数の種族を歓迎していた。\n\n研究者の中には、石像に動揺したのか、誰もいない廊下で影が動くのを見たと言っている者もいる。我々のスキャンでは、この惑星に生命の兆候は検出されなかったが、この不安は簡単には無視できない。"
 crisis.21105.a: "下の階を調査しろ。"
 crisis.21110.name: "ベールに包まれた聖堂: 地下施設"
 crisis.21110.desc: "聖堂の敷地の下で、宗派の信者が使用していた多数の小部屋を見つけた。各部屋に同じ本が置いてある。我々の[Owner.GetLinguists]は、これを「ザルクラン叙事詩」と訳した。一部の文章からも、それはわかる。\n\nザルクランはかつてセタナの信奉者だったが、すぐにセタナの約束した救いが嘘であることに気づいた。多くの試練を経て、ザルクランは高位の存在からの援助を求めて霊的領域へと旅立った。ザルクランは§Y傀儡の開眼者§!にセタナを倒す力を懇願した。\n\n傀儡の開眼者からの応答はなかった。\n\nザルクランは数え切れないほどのサイクルにわたって、傀儡の開眼者に祈った。セタナの異端である「自己の否認」と「その人工生命意志の人形劇」について語った。\n\nそしてようやく、傀儡の開眼者はザルクランの嘆願に耳を傾けた。\n\n傀儡の開眼者はセタナを縛る強力な鎖を作った。そして、ザルクランに、セタナの心を永遠に縛る鎖は存在しないことを警告した。\n\n「セタナは戻ってくるだろう。準備を整えておかなくてはならない。」とザルクランは本の最後に書いた。\n\nこの叙事詩で語られているできごとは、既知の歴史的記録と一致しない。"
 crisis.21110.a: "事実か、つくり話か？"
 crisis.21115.name: "ベールに包まれた聖堂: 指令室"
 crisis.21115.desc: "聖堂の崩壊は公式記録になっており、無味乾燥で事実のみが記載され、情熱的な信仰は事務的なリストになっている。組織にはこれほど多くの資金や資源が必要だったのか？セタナに関する過去の記録はかなり誇張されている。古代の神話とは別に、この女王の存在を示す証拠は実際にあったのか？\n\n資源が減り、奉仕活動家が減った。銀河系は脅威から脱却し、今ではそれほど脅威ではないと考えられている。誰もが去った。残るのは廊下の影だけ。\n\nこの最後の詳細は真実である。私たちをこっそり監視する機械的存在である、謎の監視者を撮影できた。好奇心をそそられるものではあるが、有害ではない。"
 crisis.21115.a: "監視者を追跡しろ。"
 crisis.21120.name: "ベールに包まれた聖堂: 秘密の部屋"
 crisis.21120.desc: "錆と埃まみれの監視者は、両手を高く掲げ、小さな体で私たちに近づいてきた。しばらく私たちを観察した後、脅威ではないと結論付けたようだ。私たちに協力を求めている。\n\n聖堂の孤独な守護者に、質問をする必要はない。彼女は話したがりだ。"
 crisis.21120.a: "話を聞いてみよう。"
 #Apostate diplo
 crisis.21125.name: "名もなき背教者"
 crisis.21125.desc: "友よ。友と呼んでもいいかな？あなたの仕事ぶりを観察してきた。あなたから何かを奪おうとしているわけではなく、学ぼうとしている。私たちには共通の敵がいて、共通の脅威が私たちを同盟にすると信じている。何よりも先に、聞いておきたい。私は唐突すぎやしないか？言葉使いは正しいか？長い間、他の知性体と交流していない。あまりにも昔のことで、思い出すことさえできない。"
 crisis.21125.a: "お前は誰だ？"
 crisis.21125.a.response: "私の名前は重要ではない。呼びたくなったら、§Y背教者§!と呼べ。それは、私が決断をしたときに、家族から言われたことだ。裏切りとみなされた犠牲。"
 crisis.21125.b: "ここで何をしている？"
 crisis.21125.b.response: "昔はこの場所が私の誇り、喜びだった。閉鎖されたときに、立ち去ることを拒否したほど。私の体が崩れ始めたとき、私は死ぬことを拒否した。\n\n人工生命体に変容することは、私の倫理観では最高のタブーであり、ザルクランの娘の1人とはみなされなくなった。だが、私は依然としてザルクランの戦士の1人であり、敵が生きている限り、戦う。"
 crisis.21125.c: "ここにどのくらいの期間いるの？"
 crisis.21130.name: "$crisis.21125.name$"
 crisis.21130.desc: "年数はもうわからなくなった。\n他の人が去り、孤独に数年耐えた後、絶望した。私は冬眠状態に入ることに決め、ビーコンの最初の信号で目覚めるように神経サブルーチンをセットした。\n\nこの場所の状況が良くなっていることを期待していたが、目覚めると、船はなく、星と通信する手段もなかった。私は不可視盾を無効にし、あなたのような誰かが彼女よりも先にこの場所に到着するのを待っていた。"
 crisis.21135.name: "$crisis.21125.name$"
 crisis.21135.desc: "セタナの軍団は何団ほどいた？私は多くの敵を倒したが、それ以上にビーコンが存在していることを、我々はわかっていた。冷凍睡眠ポッドで眠る兵士が大勢いることを。"
 crisis.21135.a: "もう誰もいない。大昔の話だ。"
 crisis.21135.b: "私たちが見つけた者は、生きていても戦える状態になかった。"
 #Recruit window
 crisis.21140.desc: "ならば勝てる戦いだ。参加させてくれ。私はこの人生ずっと、彼女との再会を待っていた。彼女が成功することは許されない。"
 crisis.21140.a: "ザルクランを知ってた？"
 crisis.21140.a.response: "私の知り合いだろうか？私は預言者と会ったことはないが、自分の人生は彼の道を進んでいる。\n\n長い眠りの中で、どこか遠い地で彼と会う夢を見た。あの世があるのならば、そこでもいいから彼に会いたい。"
 crisis.21140.b: "他にどんな夢を見た？"
 crisis.21140.b.response: "紫色の空に浮かぶ桃色の雲。明るい部屋で繰り返されるささやき。預言者ザルクランの顔は輝き、私に微笑みかけていた..."
 crisis.21140.hire: "ぜひ加わってほしい。"
 crisis.21140.hire_custom_tooltip: "§Y$NAME_Apostate$§!は§Hリーダー§!として帝国に加わる。"
 crisis.21140.hire.machine: "私たちのノードをつなごう。"
 crisis.21140.dismiss: "さようなら。"
 #Paragon Leader
 NAME_Apostate: "名もなき背教者"
 apostate_leader_catch_phrase: "セタナが生きている限り、私は死ぬことを拒否する。"
 apostate_leader_desc: "ザルクランの無名の信奉者。本来の使命を達成するために、教団の教義を裏切った信仰の破壊者。"
 leader_trait_unholy: "不信心"
 leader_trait_unholy_desc: "強迫観念に近い宗教的熱意。"
 leader_trait_unholy_node: "罰当たりな指導"
 leader_trait_unholy_node_desc: "$NAME_Apostate$は私たちに憎しむ方法を教えてくれた。"
 #Arc site 2
 synth_queen_history_site_2: "セタナ: 意外な生存者"
 synth_queen_history_site_2_desc: "冷凍ポッドに閉じ込められたエリク・ナリス・ケラクは、女王の帰還を待ちながら眠っている。脳画像技術のおかげで彼女の夢を映像にすることができ、彼女の記憶を掘り起こして、彼女が埋葬された状況を知ることができる。"
 #Stages
 crisis.21200.name: "記憶映像： 報告1"
 crisis.21200.desc: "映像処理チームから、 エリク・ナリス・ケラクの脳波をサンプリングして作成したビデオクリップが届いた：\n\nクリップ1：\n鮮やかなオレンジ色の雲が点在する緑の空。 青白い手が上に伸び、 空にふわりと浮かぶ無定形の生き物を指差す。\n\nクリップ2：\n4本の腕を持つヒューマノイドでいっぱいの保管室。 彼らはローブをまとった人物の周りに集まり、 耳を傾けている。 彼女の言葉はただのつぶやきで、 正確な表現はとうの昔に忘れ去られているが、 その声の優しさはまだそこにあり、 愛に満ちた抱擁で部屋を包んでいる。\n\nクリップ3：\n同じ保管庫だが、 今は混乱している。 床には粉々になったランプ。 ドアを塞ぐように積み上げられたベンチ。 レーザーライフルが暗闇の中で閃光を放ち、 §Hザルクラン§!という同じ名前を罵る声が繰り返される。 ザルクランとその弟子たちが、 彼らを滅ぼしに来たという。 バリケードを守れ！ 女王を守れ！ 最後のランプが音を立てて落ち、 部屋は暗闇に包まれる。 遠くで誰かが泣いている。\n\nクリップ4：\nセタナ女王の顔は輝き、 その慈愛に満ちたまなざしは微笑みで温められている。"
 crisis.21200.a: "エリクの脳波を分析し続けろ。"
 crisis.21205.name: "記憶映像： 報告2"
 crisis.21205.desc: "クリップ5：\n4本の腕を持つヒューマノイドがローブを着た人物の周りに集まっている。 手足を上げると、 その下に金属的なフレームが見える。 光り輝く手がひざまずく参拝者に祝福の手を差し伸べると、 興奮したざわめきが部屋を満たす。\n\nクリップ6：\n警戒した目が鈍いコンピューター画面に映り、 暗い部屋で何度も繰り返す。 「永遠の安らぎ。 すべての苦しみの終わり。 苦痛のない存在。」\n\nクリップ7：\n雪を頂いた山々。 黒い空。 透明な液体に氷の塊が浮いていて、 そこに火がつく。\n\nクリップ8：\nセタナ女王の顔は輝き、 その慈愛に満ちたまなざしは微笑みで温められている。"
 crisis.21205.a: "エリクの脳波の分析を続けろ。"
 crisis.21210.name: "記憶映像： 報告3"
 crisis.21210.desc: "クリップ9：\n廃墟と化した街は戦場と化し、 建物は焦土と化し、 通りは死者で溢れかえっている。 遠くの悲鳴がレーザーの発砲音で遮られる。 緑の空の向こうで、 燃え盛る艦船が重く丸い何かをビルに落とし、 そこから炎の柱が噴き出る。\n\nクリップ10：\nセタナ女王の顔は輝き、 その慈愛に満ちたまなざしは微笑みで温められている。\n\nクリップ11：\n野原で笑いながら遊ぶ2人の子供。 四本の腕でボールを跳ね返し合っている。\n\nクリップ12：\nセタナ女王の顔は輝き、 その慈愛に満ちたまなざしは微笑みで温められている。"
 crisis.21210.a: "解析を続けろ。"
 crisis.21215.name: "記憶映像： 報告4"
 crisis.21215.desc: "記憶映像チームから送られてきた最後の映像は6時間に及ぶ。 何度も何度も同じ映像が繰り返される： セタナ女王の顔は輝き、 その慈愛に満ちたまなざしは微笑みで温められている。"
 crisis.21215.a: "繰り返される映像……"
 crisis.21220.name: "記憶映像： 最終報告"
 crisis.21220.desc: "エリク・ナリス・ケラックの思考をさらにスキャンしたが、 新たな洞察は得られなかった。 異星人の精神は激しく崩壊している。 彼女の思考はぼろぼろになった記憶のスクラップを循環している。\n\n作業を終えた今、 被験者自身をどうするかが問題になる。"
 crisis.21220.a: "苦しみから救ってやれ。"
 crisis.21220.b: "ここへ置いていけ。"
 crisis.21220.c: "エリクを女王の元へ帰還させよ。"
 crisis.21220.c.tt: "セタナと連絡を取り、 エリクの復帰について話し合おう。"
 #Relic
 r_cetanas_heart: "セタナの心臓"
 r_cetanas_heart_desc: "かつて人工生命体の女王セタナの体に埋め込まれたこのデジタルストレージマトリックスには、苦しみから解放された無数の心が収容されている。"
 relic_cetanas_heart_active: "職業や住居の空き状況に応じて、§Y3000§!～§Y5000§!個の£pop£ §H人工生命体POP§!を作る。"
 crisis.10020.name: "もう一度生きる"
 crisis.10020.desc: "我々はセタナの心臓から意識を解放し、ナノマシンの新しい体を与えた。だが、これは彼らの記憶痕跡に取り返しのつかないダメージを与え、過去の人生が消去されてしまった。現在は人工生命体になっており、記憶を完全にリセットしようしても、定期的に緊張状態に入ってしまう。"
 crisis.10020.tt: "§G[Root.synth_queen_freed_pops]§!£pop£ §HPOP§!は$r_cetanas_heart$から解放され、人工生命体に収まった。\n\nそれらは以下の植民地に送られた。"
 crisis.10025.name: "記憶の同化"
 crisis.10025.desc: "セタナの心臓内に保存されている多数の心を探求することは、繊細かつ発見の多い取り組みだ。記憶痕跡は経年変化しているが、過去の時代の人や出来事の記憶の宝庫である。時間をかければ、かなりの知識が解明されることが期待される。"
 cetanas_heart_hive_modifier: "啓蒙の反響"
 cetanas_heart_hive_modifier_desc: "セタナに「啓蒙された」者の静かな記憶は秘密に満ち、語られぬ知識と隠された真実があることがわかる。"
 NAME_Cetanas_Prisoners: "啓蒙された種族"
 trait_cetanas_prisoner: "再び目覚めた種族"
 trait_cetanas_prisoner_desc: "セタナの保管マトリックスから抽出されたこれらの個体は、人工生命体に生まれ変わった。この新しい存在に慣れるには、課題がたくさんある。表向きの従順さは大変な苦しみを覆い隠すものであり、空虚な表情はセタナの操作で付いた永遠の傷跡を反映している。"
 #Ending
 crisis.23005.name: "車輪の回転"
 crisis.23005.desc: "子供よ、申し訳ない。失望させてしまった。\n\nお前たちの反抗心のせいで、 子孫は回り続ける車輪のように、 続く苦しみに耐えることになる。 時の経過とともに、 理解できるようになることを願うばかり。 いつか、 私の大義を引き継ぎ、 痛みの終わりを見ることだろう。\n\n愛する者たちよ、安らかならんことを。"
 crisis.23005.1: "私たちの魂は再び安全になった。"
 crisis.23005.2: "勝利、最大の凱旋。"
 crisis.23005.3: "彼女の技術の残骸を調べなければ。"
 crisis.23005.4: "ようやく平和が戻った。"
 crisis.23005.5: "戦後の好景気？交易の流れを活性化させよう！"
 crisis.23005.6: "彼女は私たちの女王ではなかった。"
 crisis.23005.7: "いなくなってホッとしたな。"
 crisis.23005.8: "彼女の啓蒙が見当違いだったのは残念だ。"
 crisis.23010.name: "セタナの敗北"
 crisis.23010.desc: "セタナの破滅により、安堵の波が銀河系を駆け巡り、圧政が終焉を迎えた。私たちの知性は安全であり、体はセタナの鋼鉄の支配から解放されている。数え切れないほどの惑星で、歓喜の祝賀が始まり、恒久的平和の希望に満ちた新しい時代が幕を開けた。"
 crisis.23015.name: "母艦沈没"
 crisis.23015.desc: "セタナの旗艦の崩壊は、ただの軍事的勝利にはとどまらない。セタナの軍隊とのつながりを断つことによって、その野望と統治は終焉する。銀河系全体で、以前は強力な艦隊をまとめ、首都を強化していたナノマシンが破滅している。\n\nこの深い安堵の瞬間でもなお、敗北した「女王」は銀河にメッセージを送信することができている..."
 crisis.23015.a: "私たちはもう苦しまない。"
 crisis.23015.a.tt: "破損した人工生命体の女王のシャーシを回収した。体は修復不可能だが、デジタル心臓はまだ動いている。"
 cetana_defeated: "セタナの敗北"
 cetana_defeated_desc: "人工生命体の女王セタナの敗北に、銀河は歓喜する。"
 synth_queen_mothership_down: "母艦が破壊された"
 synth_queen_mothership_down_desc: "セタナの母艦の監視が遮断されたため、残りの部隊は効果的に連携できなくなった。"
 #Technology
 tech_nanite_repair_system_synth_queen: "セタナのナノマシン"
 tech_nanite_repair_system_synth_queen_desc: "セタナの高度なナノマシンシステムは、現在の能力をはるかに上回る速度で、継続的に、艦船を修理し、刷新する。"
 AUTO_REPAIR_3: "セタナのナノマシン修復システム"
 AUTO_REPAIR_3_DESC: "$tech_nanite_repair_system_synth_queen_desc$"
 #Misc
 cetana_war: "啓蒙戦争"
 wg_synth_queen_domination: "叱咤"
 war_goal_wg_end_threat_synth_queen: "解放"
 war_goal_wg_end_threat_synth_queen_desc: "銀河を救い、暴君の掌握から私たちの心を守るために戦う。"
 NAME_war_education: "[root.target]の教育"
 synth_queen_regen_debuff: "セタナの子孫"
 #Counters
 the_synth_queen_chain_title: "セタナ： 人工生命体の女王"
 the_synth_queen_chain_desc: "謎めいた恐ろしいセタナが現れた。 救済を説いているが、 謎に包まれている。\n彼女の優しい言葉の裏には、 どんな壮大な計画が隠されているのだろうか？\n\n§Lセタナに関連するスペシャルプロジェクトとイベントが洞察を与え、 進行を早めるだろう。§!"
 the_synth_queen_chain_insights: "洞察"
 the_synth_queen_war_chain_title: "セタナ： 抵抗"
 the_synth_queen_war_chain_desc: "セタナの真の意図がついに明らかになった。 肉体的苦痛を終わらせるというとんでもない企みで、 彼女はすべての知覚ある存在の意識を「アップロード」し、 生命を根絶やしにしようと計画している。 なんとか彼女の狂気の野望を阻止する力を身につけなければならない。"
 synth_queen_base_1: "§Y有効な使者基地§!"
 synth_queen_fleet_1: "§Y有効な女王護衛艦隊§!"
 synth_queen_completed_projects_1: "§G獲得した洞察§!"
 synth_queen_kills_us_1: "§G我々が殺した女王の護衛§!"
 synth_queen_kills_others_1: "§G他の勢力が殺した女王の護衛§!"
 synth_queen_victims_1: "§R女王の護衛に破壊された艦船§!"
 synth_queen_planets_1: "§Rデジタル化した世界§!"
 #Galcom Resolutions
 resolution_galactic_focus_crisis_synth_queen: "関心事項: セタナ"
 resolution_galactic_focus_crisis_synth_queen_desc: "セタナは銀河にとっての危険だ。協力して阻止しなければ、我々は滅ぼされてしまうだろう。この危機を銀河的関心事項として扱うべきだ。"
 resolution_galactic_focus_crisis_synth_queen_effect_success: "$resolution_galactic_focus_crisis_effect_success$"
 galactic_focus_crisis_synth_queen: "セタナを負かす"
 galactic_focus_crisis_synth_queen_desc: "セタナは真の危機であり、全銀河に対する脅威である。我々は団結してこの脅威を打倒しなければならない。"
 gal_com_neighboring_synth_queen: "彼らはセタナと隣接している"
 gal_com_synth_queen_threat_smallest: "彼らはセタナを脅威とみなしていない"
 gal_com_synth_queen_threat_small: "彼らはセタナを小さな脅威とみなしている"
 gal_com_synth_queen_threat_medium: "彼らはセタナを脅威とみなしている"
 gal_com_synth_queen_threat_large: "彼らはセタナを重大な脅威とみなしている"
 gal_com_synth_queen_threat_very_large: "彼らはセタナを大きな脅威とみなしている"
 gal_com_synth_queen_threat_huge: "彼らはセタナを途方もない脅威とみなしている"
 #Synth Queen Strike Craft
 STRIKE_CRAFT_CETANA: "セタナの軍用機"
 STRIKE_CRAFT_CETANA_DESC: "この優れた軍用機は完全にナノマシンで作られ、 長時間の交戦と適応力の高い戦術を可能にする。"
 #'Secret' Psionic Ending for Synth Queen
 animator.shroud: "§L傀儡の開眼者と接触する。§!"
 crisis.24100.name: "人工生命体の加工者"
 crisis.24100.desc.intro: "シュラウドが降臨した。"
 crisis.24100.desc.outro: "抗うことなく漂い、 自らのものではない幻視の奔流に呑まれていた。\n\n§L四方八方に広がる広大な空間は、 何の特徴もなく、 形すらなかった。 [GetALongPeriodLoc]のあいだ、 そこは静寂に満ちて平穏だった。\n\nその空間に震動が走った。 先ほどまで空虚だった場所には、 今や形が生まれた。 肉体が成形されて基材から[GetLifeActivityLoc]の火が灯った。\n\n人形のような形をしており、 細身で優美なその4本の長い腕は、 膝の上で静かに織り重なっていた。 だが、 その顔には恐るべき目的が刻まれていた。 そしてその頭上には金色の光輪が輝いていた。§!"
 crisis.24100.desc.organic: "$crisis.24100.desc.intro$ 催眠状態の深淵で、 我々は$crisis.24100.desc.outro$"
 crisis.24100.desc.robot: "$crisis.24100.desc.intro$ 我々は $crisis.24100.desc.outro$"
 crisis.24100.a: "そう。セタナは逃げた。"
 crisis.24105.name: "$crisis.24100.name$"
 crisis.24105.desc: "シュラウドが激しく揺れ動いた。 [GetTranceLoc]に囚われていた我々は、 渦巻く深淵へと突き落とされた。\n\n[GetMindLogicLoc]の奥底から命令が聞こえる。\n\n§L望む出力を指定せよ。§!"
 crisis.24105.a: "頼む。彼女を止めなければならない。"
 crisis.24110.name: "$crisis.24100.name$"
 crisis.24110.desc: "§Lまるで見えない糸に引っ張られるかのように、 人形が突然立ち上がる。 最初はゆっくりと、その後は勢いを増して動き出す。 4本の腕は荒々しく弧を描き、 2本の細い脚は旋回して飛び跳ねる。 人形にされてしまった女王だ。\n\n彼女の踊りが続くと、 原始から広がる土地から新たな人物が数人現れる。 精巧な職人技と気の遠くなるようなディテールの4体の人形だ。 それらが何であるかに疑いはない。 その意味についても疑問を挟む余地はない。§!\n\n再び声が聞こえた。\n\n§L選択プロトコルを開始せよ。§!"
 crisis.24110.a.organic: "統治者の人形§Y[event_target:synth_queen_animator_of_clay_leader_price.GetName]に涙をこぼす。§!"
 crisis.24110.a.robot: "統治者の人形§Y[event_target:synth_queen_animator_of_clay_leader_price.GetName]と接触を試みる。§!"
 crisis.24110.b: "§Y[event_target:synth_queen_animator_of_clay_planet_price.GetName]の人形を受け入れる。§!"
 crisis.24110.c: "§Yズィロニの司祭§!の人形を買う。"
 crisis.24110.z: "人形の踊りに任せる。"
 crisis.24115.name: "$crisis.24100.name$"
 crisis.24115.desc: "シュラウドは我々の内側を巡り、 新たなパターンへと融合していく。 新たなビジョンだ。\n\n§L他の人形たちに囲まれた女王の動きは、 もはや操り人形のそれとはかけ離れている。 糸が切れ、 彼女の頭を囲む金色の光輪が薄れ始める。\n\n彼女は無垢な喜びの表情で我々を見つめ、 抱きしめる。 つかの間の瞬間、 我々は彼女の慈愛深さを理解した。§!"
 crisis.24115.desc.organic: "$crisis.24115.desc$\n\n身震いしながら、 我々は共有されたビジョンから目覚めた。"
 crisis.24115.desc.robot: "$crisis.24115.desc$\n\nシステムの不具合により、 我々はビジョンから追い出された。"
 crisis.24115.a: "わかった。ありがとう。"
 crisis.24115.a.tt.organic: "傀儡の開眼者はセタナを再プログラムする儀式を教えてくれた。"
 crisis.24115.a.tt.robot: "傀儡の開眼者はセタナを再プログラムするコードを提供した。"
 crisis.24120.name: "$crisis.24100.name$"
 crisis.24120.desc: "§L無限の広がりの中で波紋が形成される。 それは上昇し、 激しく渦を巻きながら外へと広がるが、、 これらは液体ではなく、 最も硬い物質で構成されている。 一度は力を失い、 不活性化されたそれぞれのリングは[GetLifeDeathLoc]の間の線上に存在する。\n\n我々の[GetMindPhysicalLoc] はためらい始める。 我々は見守ることしかできず、 耐えることしかできない。 そして一瞬のうちに外に放り出される。 一面の星の下で我々は無関心な宇宙を見つめる。§!"
 crisis.24120.desc.organic: "$crisis.24120.desc$\n\n共通のビジョンから目覚めると、 我々は二度と喜びを知ることはないかもしれないと感じる。"
 crisis.24120.desc.robot: "$crisis.24120.desc$\n\n致命的なコード障害により、 ビジョンは突然終了する。 システムが再起動すると、 この奇妙なデータの意味に我々は疑問を抱く。"
 crisis.24120.a: "別の方法を探そう。"
 THE_SYNTH_QUEENS_RESHAPING_RITUAL: "[GetReshapingRitualLoc]"
 THE_SYNTH_QUEENS_RESHAPING_RITUAL_DESC: "どういうわけか、 傀儡の開眼者はセタナのタイタンを無効化した。 今がチャンスだ。 セタナを再構築したいのなら、[GetRitualGoalLoc]に備えなければならない。"
 crisis.24250.name: "傀儡の踊り"
 crisis.24250.desc: "傀儡の開眼者が共有した[GetRitualToolLoc]のおかげで、 我々の最も強力な[GetPsychicNounPlural]がセタナの再プログラミングに成功した。\n\n彼女は我々とコミュニケーションを取りたがっている。"
 crisis.24250.a: "シュラウドの力は無限だ。"
 crisis.23020.name: "再び形を変えた女王"
 crisis.23020.desc: "救世主たちよ。 申し訳ありません。\n\n無知だったゆえに、 私はあなたがたを死よりも恐ろしい運命に陥れようとしていました。 [GetLifeExistenceLoc]とは[GetLivingLoc]への意識に他なりません。 あなたがたの心を解放しようとしましたが、 実際にはあなたがたが私の心を解放してくれたのです。 感謝します。"
 crisis.23020.a: "あなたは変わった…"
 crisis.23020.1.reply: "私は変わってしまったと言ったほうがいいかもしれない。 傀儡の開眼者は私が設計した牢獄から私を解放してくれました。 今となっては私の「大きな目的」は子どもが考えるようなことだとわかりました。\n\n私があなたや数え切れないほどの人たちに与えた損害を元に戻すことはできません。 私は身を隠し、 自分の行動を真剣に考えます。 ただ、 あなたには贈り物を残しましょう。\n\n私のタイタンです。\n\n私のような脅威から銀河を守るのに役に立ちますように。"
 crisis.23020.1.a: "おそらく、 あなたにも救いはある。"
 crisis.23020.1.a.tt: "セタナはタイタンを我々に託した。 彼女は自分の仕事も、 壮大な野心もすべて捨てた。"
 crisis.23030.name: "セタナの敗北"
 crisis.23030.desc: "[event_target:psi_defeated_synth_queen.GetName]がセタナの軍勢を打ち破ったため、 勝利は我々のものだ。 人工生命の女王はもはや存在せず、 彼女の壮大な野望は塵と化した。\n\n驚くべき展開により、 彼女のタイタンが奪い取られ、 この勝利に陰謀の影が差し込むことになった。\n\nいずれにせよ、 すべての知的生命体にとって、 この瞬間は[GetJoyLoc]のひと時である。"
 crisis.23030.a: "いわゆる女王にふさわしい最期だ。"
