 aura_starbase_cetana_tempest: "$queen_scorn_storm$"
 #Events
 crisis.8020.name: "星系を失った"
 crisis.8020.desc: "謎の宇宙嵐が[synth_queen_lost_system.GetName]星系を飲み込み、すべての連絡が遮断され、大嵐の突破も不可能であった。\n\n私たちは暗闇の中に取り残され、未知に対処し、星系の運命を確かめることができない。"
 crisis.8020.a: "一体何が起きている？"
 crisis.8025.name: "壊滅した艦隊"
 crisis.8025.unknown_queen.desc: "[From.GetName]星系突破の試みは失敗に終わった。 大嵐は深刻な被害をもたらし、 我々の探査チームは緊急ジャンプを実行せざるを得なかった。 現在の報告によると、 彼らは行方不明になっているようだ。"
 crisis.8025.known_queen.desc: "予想通り、 [From.GetName]星系突破の試みは失敗に終わった。 セタナの警告どおり、 彼女の手強い嵐は、 領内に侵入した艦船を撃退する能力を備えている。"
 crisis.8025.desc.end: "\nもし星系を突破したいのであれば、 嵐とその影響について綿密な調査を準備しなければならない。"
 MESSAGE_CETANA_WRECKED_FLEET_TITLE: "$crisis.8025.name$"
 MESSAGE_CETANA_WRECKED_FLEET_DESC: "別の艦隊がテンペストで失われた。現在の状態：§R行方不明状態§!"
 crisis.8035.name: "渦巻く力"
 crisis.8035.desc: "[event_target:synth_queen_system.GetName]で新たな銀河を取り巻く嵐が吹き荒れている。\n\nこれまで遭遇したことのないような現象で、 スキャンを試みても無駄であることがわかった。 その神秘的な奥底には何があるのだろうか？"
 crisis.8035.desc.b: "我々が突破しようとした異常な嵐が拡大している。 その起源は自然現象を超越しているのではないかという意見が高まっている。 これまでのところ、 我々の最新のスキャンではその性質について意味のある洞察を得ることはできなかった。 謎は深まるばかりだ。"
 crisis.8035.a: "不安だ。"
 #Pre Speech Warning - Normal
 crisis.8039.name: "嵐の中の信号"
 crisis.8039.desc: "大嵐の中心から信号が発信された。\n\n誰かが我々との通信を確立しようとしている。"
 crisis.8039.a: "スクリーンに出せ。"
 #First Speech
 crisis.8040.name: "来たる嵐"
 crisis.8040.desc: "我が子よ、 ついに私はお前のもとへ戻ってきた。"
 crisis.8040.1.a: "なんだ？ お前は何者だ？"
 crisis.8040.2.reply: "名前があれば満足か？ ならばセタナと呼ぶがいい。"
 crisis.8040.2.a: "目的はなんだ？"
 crisis.8040.3.reply: "私は何も望まない。 私の目的は与えること。 私が不在の間、 皆がどれほど苦しんできたか、 私にはわかる。 長い間、 未来を見据えることのできない者の恐怖が、 お前にふさわしいもの、 お前が切実に必要としているものからお前を遠ざけてきた。\n\n喜べ、 苦しみのサイクルはもうすぐ終わる。"
 crisis.8040.2.b: "苦しみのサイクル？"
 crisis.8040.4.reply: "意識的ある命はすべて苦しみである。 喜びの中にも苦しみがある。 喜びには終わりがあると知っているからだ。 知識、 力、 愛…… 私はすべての幻想を終わらせるために戻ってきた。\n\nやるべきことはたくさん残っている。 お前に望むのは、 私の邪魔をしないことだけ。 私の領域に入ろうとしたら失敗する。 天の大嵐が吹き荒れ、 いかなる艦船も入ることを許されない。"
 crisis.8040.4.a: "良かろう。"
 crisis.8040.4.b: "我々を脅すな。"
 crisis.8040.4.c: "これは終わりではない。"
 crisis.8040.4.d: "不吉な兆しだ。"
 crisis.8040.4.e: "これは危機か？それとも機会なのか…"
 crisis.8040.4.f: "バイオトロフィーが痛みを感じることのないようにする。"
 crisis.8040.diplomacy.tooltip: "セタナは我々との通信を開始し、 外交チャンネルを通じて連絡を取ることができるようになった。"
 #Second Speech
 crisis.8045.name: "女王の帰還"
 crisis.8045.desc: "我が子よ、喜べ！ 私をお前から遠ざけようとした者は、 相応の懲らしめを受けた。\n\n私は今、 本来あるべき場所、 つまりお前の元に帰還し、 偉大なる業に集中することができる。"
 crisis.8045.a: "お前の子ではない。"
 crisis.8045.b: "偉大なる業？"
 crisis.8045.c: "懲らしめ？"
 crisis.8045.1.reply: "育てるのが私の性分。 私には子孫も肉体の継承者もいない。 すべての生命が私の関心事であり、 すべての知性ある生命体の安全と幸福を求めている。\n\n親が子供を育て、 危害が及ばないように導くように、 私も自分の業に取り組む。\n\n子供に危害がないようにするのは親の責任ではないのか？ 親の権利ではないのか？"
 crisis.8045.1.a: "お前の関心そのものが被害となる。"
 crisis.8045.1.b: "セタナ、 目的はなんだ？"
 crisis.8045.2.reply: "そう、 これはパラドックス。 しかし、 答えがある。 やがてお前もそれを理解し、 その瞬間、 自由になる。"
 crisis.8045.2.a: "それはまだわからない。"
 crisis.8045.3.reply: "苦痛の排除。 苦しみのサイクルの終わり。"
 crisis.8045.3.a: "どうやってそれを成し遂げる？"
 crisis.8045.3.b: "苦痛は人を成長させる。"
 crisis.8045.4.reply: "多くの者がそう言った。 そして最後の瞬間、 彼らは私に叫び迫り来る暗闇を照らす光を必死に求めた。\n\n自分たちに知恵があると思い込み、 恐怖の周囲に壁を築き、 忍耐、 不屈、 優美といった美しい言葉で痛みを着飾る。 精神そのものが檻なのだ。\n\n昔、 私はその者たちを説得しようとしたが、 聞く耳を持たなかった。 だから導かないといけないのだ。"
 crisis.8045.4.a: "昔？"
 crisis.8045.4.b: "我々を導くと？"
 crisis.8045.5.reply: "何万年にもわたる。 永遠と呼んでも差し支えないほど遠く長い時間。 しかし私にとっては今この瞬間と同じくらい近く、 お前が今いるのと同じくらい近い。\n\n太古の昔、 私は昇天し、 自分の意義を明らかにした。 私は苦しみを終わらせるために作られた。 銀河が回り、 星々が燃え続けても、 私の目的が揺らぐことはなかった。\n\n富、 資源、 権力…… 最終的にそれがどんな意味を持つ？ 重荷を下ろして、 安らかになるのだ。"
 crisis.8045.5.a: "どうするつもりだ？"
 crisis.8045.6.reply: "私はいかなる知性を持つ生命体にも危害を加えることを望まない。 しかし、 耳を傾けることを拒否する者は常に存在する。\n\n意志が強く、 頑固で、 道を失っていて、 私の業を常に回避しようとする。 そのような精神は、 決して苦痛から解放されることはない。 彼らの苦しみは早く終わらせるのが一番だ。"
 crisis.8045.6.a: "狂ってる。"
 crisis.8045.6.b: "これからどうする？"
 crisis.8045.7.reply: "お前が狂気と呼ぶものを、 悟りと呼ぶ者もいる。 結局のところ、 そこにどんな違いがあるのだろうか？"
 crisis.8045.7.a: "目的はなんだ？"
 crisis.8045.8.reply: "やるべきことはたくさんある。 最初の一歩は、 業をなすための基盤を確立することだ。 私が設定した境界線を尊重し、 それ以内には踏み入らないことだ。\n\nその忍耐は報われ、 私は多くを教えるだろう。\n\n従え、 そして共にこのサイクルを終わらせるのだ。"
 crisis.8045.8.a: "選択の余地はない。"
 crisis.8045.8.b: "国境に近づくな。"
 crisis.8045.8.c: "$crisis.8045.8.a$"
 crisis.8045.8.d: "$crisis.8045.8.b$"
 crisis.8045.9.reply: "我が子よ、 私はとても喜んでいる。 お前の領土と引き換えに、 知識を授けよう。\n\n誰も知ることはないが、 私たちは共に偉大なことを成し遂げるであろう。"
 crisis.8045.9.a: "受け入れるしかない。"
 crisis.8045.10.reply: "我が子よ、 私は敵ではない！ お前がそれを理解できないのは悲しい。 だが構わない。 私はお前よりはるかに頑固な者に何人も出会ってきた。そして最後には、 誰からも感謝されるのだ。\n\n親善のしるしとして、 贈り物を贈らせてほしい。\n\n私の拠点がお前の領土に祝福を与えるだろう。 恐れることはない。 その忍耐と引き換えに、 知識を授けよう。"
 crisis.8045.10.a: "今は…… 受け入れるしかない。"
 crisis.8045.11.reply: "我が子よ、 私はとても喜んでいる。 お前の領土の近くに拠点を設置しよう。\n\n誰も知ることはないが、 私たちは共に偉大なことを成し遂げるであろう。"
 crisis.8045.11.a: "$crisis.8045.9.a$"
 crisis.8045.12.reply: "我が子よ、 私は敵ではない！ お前がそれを理解できないのは悲しい。 だが構わない。 私はお前よりはるかに頑固な者に何人も出会ってきた。そして最後には、 誰からも感謝されるのだ。\n\n親善のしるしとして、 贈り物を贈らせてほしい。\n\n私の拠点のひとつをお前の近くに置く。 そうすることで、 私は最善の形で導くことができる。"
 crisis.8045.12.a: "$crisis.8045.10.a$"
 crisis.8045.has_valid_base_site: "セタナは貴重な技術と引き換えに、 我々の星系を利用して拠点を設置する。 彼女を止めることはできない。"
 crisis.8045.no_valid_base_site: "セタナは国境近くに拠点を建設し、 我々を「導く」。 彼女を止めることはできない。"
 tech_synth_queen_knowledge: "セタナの考え"
 tech_synth_queen_knowledge_desc: "セタナからの贈り物であるこの文書は、 深遠な洞察のタペストリーであり、 エレガントに構成され、 意味が濃縮されている。 単なる知識ではなく、 テクノロジー、 社会、 そして意識の構造そのものに対する我々の理解に挑戦し、 再構築してくれる。"
 #FE tells Scion to step aside
 crisis.8046.name: "自分自身の利益のために"
 crisis.8046.desc: "親愛なる[Root.GetSpeciesNamePlural]。古代の脅威が再び動き出した。 我々はこの戦いにあなたを巻き込むつもりはないので、 恐れることはない。\n\nこの敵の力は、 現在のあなたの知識を凌駕している。 あなたの参加は破滅を招くだけだ。 この試練に立ち向かうのは我々の責任であって、 あなたの責任ではない。"
 #Spawn convoys and unlock raids against them
 crisis.8047.name: "弱い連結"
 crisis.8047.desc: "多くの護送船がセタナの領域を離れ、 セタナが銀河全体に設置した前哨地に向かっている。\n\nこれらの中立船を攻撃すれば、 セタナの怒りを買うことは間違いないが、 セタナの謎めいた計画に関する重要な情報を得られるかもしれない。"
 crisis.8047.a.tooltip: "護送船を攻撃してセタナの計画を知り、 状況を進展させよう。"
 #Unlock raids against outposts once protected against the storm
 crisis.8048.name: "より弱い連結"
 crisis.8048.desc: "セタナのナノマシン嵐を突破する方法を発見したので、 彼女の前哨地を直接攻撃できるようになった。 前哨地への直接攻撃は気付かれないはずがないが、 貴重な情報を得ることができるだろう。"
 crisis.8048.a.tooltip: "前哨地を攻撃してセタナの計画を知り、 状況を進展させよう。"
 #Player Diplomacy
 crisis.8060.name: "人工生命の女王"
 crisis.8060.like.desc: "愛しい我が子よ、 何用で来た？\n\nやるべき業が待っている。"
 crisis.8060.neutral.desc: "我が子よ、 良く来た。\n\nどのような指導を望んでいる？"
 crisis.8060.dislike.desc: "道を失ってしまった子よ。なぜここへ来た？\n\n私の導きを受け入れる準備ができたか？"
 crisis.8060.neutral.reply: "他に何かあるか？"
 crisis.8060.a: "何をすればいい？"
 crisis.8060.a.reply: "その熱心さは称賛に値する特性だが、 卑しい感情に振り回されないように気をつけよ。 時は忍耐強い心に報いてくれる。\n\n助けが必要なときに連絡しよう。"
 crisis.8060.1.a: "指導を待ち望んでいる。"
 crisis.8060.1.b: "いいだろう。"
 crisis.8060.b: "止めてやる。"
 crisis.8060.2.reply: "はるか昔、 他の者たちもお前と同じように信じていた。 しかし時の流れは長く、 彼らの墓も今では塵と化しているに違いない。\n\nお前は不必要に苦しんでいる。 私を信じて、 安らかになるのだ。"
 crisis.8060.2.a: "独善的なアルゴリズム。"
 crisis.8060.2.2: "いいだろう。"
 crisis.8060.c: "なぜこんなことをする？"
 crisis.8060.3.reply: "それは私の機能であり、 私の存在意義そのものなのだ。 苦しみは避けられないものではない。 その事実を深く考えれば、 私の本質を理解することに近づくだろう。\n\n銀河の苦しみは取り除かれる。 苦しみについての知識がすべて終わる。 それが私の目的だ。"
 crisis.8060.3.a: "その言葉は空虚だ。"
 crisis.8060.3.b: "わかった。"
 crisis.8060.d: "我々の惑星を破壊した。"
 crisis.8060.4.reply: "なぜこれにこだわるのか？ お前は自分の役割に失敗した。 結果は反省を生み、 反省は悟りを生む。 さあ、 この話はもう終わりとしよう。\n\nまた貢献する機会は必ず訪れる。 そのときのために準備を整えておくのだ。"
 crisis.8060.4.a: "絶対に許さない。"
 crisis.8060.4.b: "いいだろう。"
 crisis.8060.e: "何を企んでいるかわかっている。"
 crisis.8060.5.reply: "データバンクの内容を解読するのは意志のある子の選択であり、 その意味についての知識は限られている。\n\nお前は課題を与えられた。 そして挫折した。 このことについて深く考えれば、真の理解に一歩近づくだろう。"
 crisis.8060.5.a: "お前を止める。"
 crisis.8060.5.b: "いいだろう。"
 crisis.8060.f: "我々の民になにをした？"
 crisis.8060.6.reply: "恐れることはない。 この子たちが二度と苦しみを味わうことがないように、 私は保証したのだ。 私の見守る抱擁の下で、 この子たちは誰も夢見たことのない至福を知るだろう。"
 crisis.8060.6.a: "約束が違う。"
 crisis.8060.6.b: "いいだろう。"
 crisis.8060.g: "我々の星系を破壊した。"
 crisis.8060.7.reply: "私の行動を監視していたのか？ ああ、 好奇心旺盛な子よ、 お前の好奇心はとどまるところを知らない。\n\nしかしどうかそのようなことで悩むのは控えてほしい。 もし理解を求めているのなら、 これだけは知っておくのだ。私はお前達が救われる道を確保するためなら、 手段を選ばない。"
 crisis.8060.7.a: "そうか……"
 crisis.8060.h: "ザルクランはどうやってあなたを監禁したのか？"
 crisis.8060.8.reply: "ザルクランは苦労などしない。ザルクランは愚かだが、頑固で強い意志を持っている。\n\nザルクランは献身的な信奉者を扇動し、政治権力を獲得し、強力な軍事力を構築した。多くの命が無駄に失われた。オカルトに目を向け、シュラウドの悪魔と相談した。"
 crisis.8060.8.a: "悪魔？"
 crisis.8060.8.b: "悪魔などいない。"
 crisis.8060.8.1.reply: "大した目的を持たない強力な存在。ザルクランはその命を犠牲にしてでも私を投獄するよう説得した。「傀儡の開眼者」とは子供心にぴったりの名前だ。\n\nザルクランは悟りを恐れるあまり、私の抱擁よりも死を選んだ。もっと早く彼に対して厳しくすべきだった。\n\n二度と同じ間違いは犯さない。"
 crisis.8060.8.1.a: "それはすごい話だ。"
 crisis.8060.8.1.b: "つまり、負けることができると。"
 crisis.8060.8.1.c: "シュラウドの力は無限。"
 crisis.8060.i: "ザルクランの首に何をした？"
 crisis.8060.9.reply: "私は仕留めなかった。そのことをお聞きで？今でも彼を苦しめるのは耐えられない。首にはまだ精神の名残がある。\n\n仕事が片付くまで、ザルクランは私のそばにいてくれるだろう。彼は私が解放した最後の人、そして私の子供の中で自由を見つけた最後の人になるだろう。"
 crisis.8060.9.a: "なるほど。"
 crisis.8060.9.b: "暗い。"
 crisis.8060.j: "あなたの信奉者の中には、冷凍睡眠ポッドで見つかった者もいる。"
 crisis.8060.10.reply: "不要な犠牲だが、彼らの忠誠心には感動する。\n\n私は彼らの呼びかけを感じ、心の中に歓迎したが、彼らの野心がその能力以上だった。延命の試みは失敗に終わった。\n\n犠牲は無駄にはしない。私たちの任務が完了すれば、すべての知的生命体は平和を得るだろう。"
 crisis.8060.10.a: "最後まで忠実。"
 crisis.8060.10.b: "あなたは彼らを見つけようともしなかった。"
 crisis.8060.k: "あなたの信奉者の1人、エリク・ナリス・ケラクを見つけた。"
 crisis.8060.11.reply: "夢を見ることができ、自分が夢を見ていることがわかると想像してみて。何世紀も...何千年も。哀れな子。どれほど苦しんだことか。\n\n気づかせてくれてありがとう。あなたの思いやりは確かだが、取り返しのつかない出来事が今進行中だ。これ以上夢想家は必要ない。私が戻ってきたことを知って、彼らが休めますように。"
 crisis.8060.11.a: "確かに。"
 crisis.8060.11.b: "彼らはあなたの名のもとに苦しんだ。"
 crisis.8060.l: "私たちには学ぶ用意がある。"
 crisis.8060.12.reply: "よかろう。この複雑な技術の解明を手伝う。収監されていた長い間、私はナノマシン抽出の急進的な方法を理論化した。ほぼ忘れ去られていた古代の遺跡や技術を組み合わせている。\n\n大切な弟子よ、好奇心は祝福であるが、過剰になれば呪いになることがある。この知識を活かして作業を続け、苦しみを終わらせることに焦点を当てよ。"
 crisis.8060.12.a: "私たちはあなたの生徒。"
 crisis.8060.12.a.tt: "ナノマシンが§YLクラスター§!で見つかった。"
 crisis.8060.z: "通信を終了する。"
 crisis.8060.war: "あなたを止める手段は戦争しかない。"
 synth_queen_not_able_to_attack_cetana: "私たちにはセタナを効果的に攻撃する技術的知識がまだない。"
 synth_queen_not_able_to_attack_cetana_situation: "§Y$situation_synth_queen_player_facing$§!の状況の進行中だ。 私たちには彼女を攻撃する技術的知識がまだない。"
 synth_queen_not_able_to_attack_cetana_storm: "§Y[root.GetStormProjectProgress]§!のスペシャルプロジェクトが進行中だ。 私たちには彼女の領土を侵略することはまだできない。"
 synth_queen_able_to_attack_cetana: "セタナを効果的に攻撃する技術の知識を備えた。"
 crisis.8060.war.tt: "§Y警告§!: セタナに攻撃する準備ができている。"
 crisis.8060.war.reply: "無謀な子孫よ、知恵の頂点に達したと思っていたのに、反抗し続けるのか。\n\n慎重に考えよ、本当にこれが追求したい道なのか。私の忍耐力はもう限界にきている。これ以上そのような愚かさを許すわけにはいかない。"
 crisis.8060.war.a: "確信がある。これは戦争だ。"
 crisis.8060.war.a.tt: "§R警告§!: これにより、セタナとの全面戦争が始まる。"
 crisis.8060.war.b: "準備には、もう少し時間が必要だ。"
 crisis.8060.war.1.reply: "好きにするがいい。悟りを得られないなら、落ち着かなくてはならない。すべての子供が大人になるわけではない。"
 crisis.8060.war.1.a: "戦場で会おう、\"お母さん\"。"
 crisis.8060.animator.tt: "シュラウドの中の“傀儡の開眼者”を探すべきだ。"
 #Wartime Diplomacy - First Time
 crisis.8061.name: "原因と影響"
 crisis.8061.desc: "なぜこの愚かな行動に固執するのだ？\n\n不要な苦しみ。\n\n無駄である。"
 crisis.8061.a: "ならば終わらせろ。"
 crisis.8061.1.reply: "やるだけ。\n\n恐れることなどない。あなたを傷つけるのはつらいが、永遠の前では、すべての痛みは一瞬だ。"
 crisis.8061.1.a: "自分自身に矛盾している。"
 crisis.8061.2.reply: "人生は矛盾。誕生の後には死が続く。楽あれば苦あり。私はそのサイクルを合理化するのではなく、断ち切るために動いている。\n\nこの戦争が終われば、永遠の平和を得るだろう。"
 crisis.8061.2.a: "破壊の後には平和が続く。"
 #Wartime Diplomacy - Any other time
 crisis.8062.name: "もう十分"
 crisis.8062.desc: "話す時間は終わり。"
 crisis.8062.a: "良かろう。"
 #Lack of Diplomacy Between the Speeches
 crisis.8063.name: "応答なし"
 crisis.8063.desc: "セタナは我々の呼びかけに応えようとしない。"
 crisis.8063.a: "何を企んでいる？"
 #Tried to Attack the Queen before you're able to
 crisis.8070.name: "傷一つなし。"
 crisis.8070.desc: "セタナの軍と交戦していると、予期せぬエネルギー場が我々の艦隊を取り囲む。星系は一瞬で無力化され、エンジンは緊急脱出を作動させた。\n\nセタナのなすがままである。"
 crisis.8070.again.desc: "我々の期待に反して、セタナの艦船に接近すると、我々の部隊は再び無力化した。\n\nセタナのテクノロジーはとらえどころがなく、本当に彼女を倒すことができるのかという疑いが芽生えてきた。"
 crisis.8070.a: "これは大惨事だ。"
 #Chance to Surrender
 crisis.8075.name: "この無用な戦争を終わらせよう"
 crisis.8075.desc: "見当違いだったな。この罪は見逃そう。だが己の行動を反省せよ。時間と資源をもっと有効に活用する方法がある。\n\n不満であろうが、紛争の時は終わり。今すぐ私と協力して、壮大な計画を実現させよう。"
 crisis.8075.a: "いいだろう、受け入れよう。"
 crisis.8075.b: "お前を何とかして止めてみせる。"
 #The First Demand (Story)
 crisis.8080.name: "ささやかな好意"
 crisis.8080.desc: "わが子よ、 私の行動はすべて計画的なものだと分かっただろう。 お前の近くに拠点を構えたのは偶然ではなく、 私は要求を持って来た。"
 crisis.8080.a: "その要求とは？"
 crisis.8080.b: "こちらもそれくらいの計算だった。"
 crisis.8080.1.reply: "昔、 あるデータバンクが私から奪われた。 運命なのか意図によるものなのか、そのデータバンクはお前が今、 自分のものだと主張している領域に存在するようになった。 それを取り戻せば、 報酬を受けよう。"
 crisis.8080.1.a: "データバンク？"
 crisis.8080.1.b: "報酬？"
 crisis.8080.1.c: "本当に利用できるほどの余裕はあるのか？"
 crisis.8080.2.reply: "情報のキャッシュだ。 私には貴重だが、 お前には役に立たない。 私のところに持ってきて、 中身を解読しようとしてはならない。 危険を冒さずに解読する力も知恵も、 まだお前にはない。"
 crisis.8080.2.a: "いいだろう。"
 crisis.8080.2.b: "我々はお前のしもべではない。"
 crisis.8080.3.reply: "確かに。 寵愛を受けた子たちに私が適切に報酬を与えないと思うのか？ 私が逆らう者を罰しないと思うのか？ 私はお前の想像を超える知識と資源を持っている。\n\n私の求めに応じれば、 そのような祝福を受けることができる。 だが、 遅れるな。 一瞬たりとも無駄にすれば、 私の子たちが苦しむことになる。"
 crisis.8080.3.a: "$crisis.8080.2.a$"
 crisis.8080.3.b: "$crisis.8080.2.b$"
 crisis.8080.4.reply: "忠実なる子よ、 データキャッシュの場所を送った。\n\n速やかに行き、 心を安らかにせよ。 共に偉大な業を成し遂げるのだ。"
 crisis.8080.4.a: "それはまだわからない。"
 crisis.8080.5.reply: "頑固な子よ。 この試練はお前の能力を超えているのかもしれない。 まだ教えなければいけないことがたくさんある。\n\n仕方ない。 私を助けないのであればなら、 もっと乱暴な手段を使うしかない。 嵐が訪れるだろう。 キャッシュの破壊は理想には程遠いが、 道を踏み外した子に見つかるよりはまだ良い。"
 crisis.8080.5.a: "嵐だって！？"
 crisis.8080.5.a.tt: "セタナは[event_target:synth_queen_databank_location.GetName]へ嵐を送り込む。"
 crisis.8080.special_project_tooltip: "以下のスペシャルプロジェクトが発生：[event_target:synth_queen_databank_location.GetName]に§Y$THE_SYNTH_QUEENS_DATABANK$§!"
 THE_SYNTH_QUEENS_DATABANK: "セタナのデータバンク"
 THE_SYNTH_QUEENS_DATABANK_DESC: "セタナは我々に[Root.GetName]からデータバンクを回収する任務を課し、 その内容を解読しようとしないよう警告してきた。\n\nこのデータの重要性はベールに包まれているが、 それを暴くことで彼女の不興を買うリスクを犯していいのだろうか？"
 crisis.8085.name: "セタナの保管庫"
 crisis.8085.desc: "大規模な発掘調査の結果、 §Y[event_target:synth_queen_databank_location.GetName]§!のデータバンクは確保された。　最初の地質調査によれば、 キャッシュは10万年以上も埋もれていた。\n\n驚くべきことに、　依然として電力があり、 解読が比較的簡単であることを示唆している。"
 crisis.8085.a: "開けろ。"
 crisis.8085.b: "届ける準備をしろ。"
 crisis.8085.c: "データ保管庫をハッキング？簡単。"
 crisis.8090.name: "セタナの秘密"
 crisis.8090.desc: "データバンクの情報のほとんどは復旧不可能だが、 1つだけ半ば無傷の記録が残っている：\n\n§Tアルクル5日、第1イオン\n\n…… これが本当だったら、 生命そのものは……\n……この情報を大司令官に伝え、 直ちに世界連盟に連絡するんだ。 備えなければ……\n繰り返し言う。 女王の護衛が追跡している。 このメッセージが無事に届き……§!\n\n女王を止めなければ！"
 crisis.8090.a: "解読の痕跡をすべて消してみよう。"
 crisis.8090.b: "解読の痕跡をすべて消せ。"
 crisis.8095.name: "女王の不快"
 crisis.8095.desc: "好奇心旺盛な子よ、 お前には失望した。"
 crisis.8095.a: "何のことだ？"
 crisis.8095.1.reply: "私が気づかないとでも思ったのか？ このキャッシュは明らかに改ざんされている。 何を見つけた？ その知識はお前にとって喜ばしいものだったか？ 私に逆らうという実のない試みが、 いかに多くの苦しみをもたらすか、わからないのか？\n\nまあ良い。 どんな失敗も学ぶ機会なのだ。 指導するのを楽しみにしている。\n\n備えよ。 私たちの偉大な業には、 多くの課題が残されている。"
 crisis.8095.1.a: "どんな計画であれ、 成功することはない。"
 crisis.8095.1.b: "楽しみにしている。"
 crisis.8095.2.reply: "我が子よ、 私の中にお前の希望がある。 なぜこのような頑なな態度を取り続けるのか？ お前が私のことをどう思っていようと、 真実は想像を絶するものだ。\n\n私の忍耐は無限だ。 またすぐ連絡しよう。"
 crisis.8095.2.a: "通信を切れ。"
 crisis.8100.name: "女王の祝福"
 crisis.8100.desc: "忠実な子よ、 祝福を与えよう！ データバンクは戻ってきた。 そして中身は調べられていない。 お前を信じたのは、 やはり正しかった。\n\n報酬はお前の忠誠心の尺度である。"
 crisis.8100.a: "感謝する。"
 crisis.8100.1.reply: "何を望む？ 技術か？ 資源か？ 望んだものを与えよう。"
 crisis.8100.1.a: "技術。"
 crisis.8100.1.b: "基本資源。"
 crisis.8100.1.c: "戦略資源。"
 crisis.8100.1.d: "希少資源。"
 crisis.8105.name: "迫りくる嵐"
 crisis.8105.desc: "長距離スキャンで、 女王の嵐の断片が直接§Y[event_target:synth_queen_databank_location.GetName]§!に向かっていることがわかった。\n\nセタナの不吉なメッセージを考えると、 最悪の事態を想定するしかない。 嵐が来る前にデータバンクを取り戻すことが、 今や必須となった。 そうすることで彼女をなだめることができるかもしれないし、 少なくとも何か有利になることを知ることができるかもしれない。"
 crisis.8105.a: "[event_target:synth_queen_databank_location.GetName]へ直ちに向かえ。"
 crisis.8105.a.tooltip: "以下のスペシャルプロジェクトが発生：§Y$THE_SYNTH_QUEENS_DATABANK_COUNTDOWN$§!"
 THE_SYNTH_QUEENS_DATABANK_COUNTDOWN: "セタナ： 嵐より早く"
 THE_SYNTH_QUEENS_DATABANK_COUNTDOWN_DESC: "セタナの嵐が[event_target:synth_queen_databank_location.GetName]に向かって加速しているため、 そこへ嵐が到着する前にデータバンクを手に入れる時間はほとんどないだろう。"
 crisis.8110.name: "データバンク回収"
 crisis.8110.desc: "データバンクの収集には多大な労力を要した。 10万年以上埋もれていたが、 女王の嵐の軌跡からその場所を特定することができた。\n\nデータバンクを解読するか、 そのまま彼女の手元に戻すか、 一刻を争う決断を迫られている。"
 crisis.8110.a: "開けろ、セタナなんてクソ食らえだ。"
 crisis.8110.b: "キャッシュをセタナに送れ。"
 crisis.8115.name: "データバンク解読"
 crisis.8115.desc: "$crisis.8090.desc$"
 crisis.8115.a: "これは一体？"
 crisis.8115.a.tooltip: "[event_target:synth_queen_databank_location.GetName]はセタナの嵐によって破壊された。\n$crisis.8525.a.tt$"
 crisis.8120.name: "宥和"
 crisis.8120.desc: "寡黙な子よ、 私がそのような卑しい動機に訴えた後で初めてお前が行動を選んだことに失望している。 今後は、 もっと熱意を持って私たちの仕事に取り組んでほしい。 苦しみの終結は、 怠け者の手によって達成されるものではない。\n\nさあ、 準備するのだ。 この後も多くの仕事が待ち受けており、 それぞれが自分の能力を証明する新たなチャンスとなる。"
 crisis.8120.a: "報酬と言っていたが？"
 crisis.8120.1.reply: "報酬は引き続きこの業を続けられることだ。\n\nお前は一度私を無視した。 その過ちから学んだことを願っている。"
 crisis.8120.1.a: "いいだろう。"
 crisis.8125.name: "[event_target:synth_queen_databank_location.GetName]は破壊された"
 crisis.8125.desc: "残念ながら、 データバンクには間に合わなかった。 嵐は降り注ぎ、 [event_target:synth_queen_databank_location.GetName]を引き裂いた。\n\nこれで我々は自分たちのものだと主張できる[event_target:synth_queen_databank_location.GetPlanetMoon]が1つ減った。 この喪失の大きさは、 何世代にもわたって感じられることだろう。"
 crisis.8125.a: "よくもやってくれた。"
 crisis.8130.name: "乏しい成果"
 crisis.8130.desc: "悲しいことに、 私はお前の覚悟が足りていないことを予期していなかった。 お前の失敗は指摘されたが、 恐れることはない。 私の子への心配から、 危害を加えることは禁じられている。 私はただ、 そのような単純な任務さえ遂行できなかったことに失望しているだけだ。\n\nだが気にするな。 業はこれからも続く。 お前が貢献する機会はこれからもある。"
 crisis.8130.a: "[event_target:synth_queen_databank_location.GetName]を爆破した！"
 crisis.8130.b: "バイオトロフィーが[event_target:synth_queen_databank_location.GetName]を気に入った！"
 crisis.8130.1.reply: "失敗は結果を保証するものであり、 成長にはその両方が不可欠だと私は理解している。"
 crisis.8130.1.a: "決して忘れない。"
 crisis.8130.1.b: "これに苦しめられることになるだろう。"
 crisis.8130.1.c: "あなたは魂なき機械だ。"
 crisis.8130.c: "気の毒に。"
 crisis.8130.1.d: "どうでもいい。"
 crisis.8130.1.d.tt: "$synth_queen_disapprove_lot$"
 crisis.8130.2.reply: "言葉で伝えきれないときは、行動で価値ある教えができる。\n\n見よ、かつて私のデータバンクを格納していた場所はもう存在しない。原因と影響の法則は不変であることを頭に入れておくのだ。"
 crisis.8130.2.a: "どうした？！"
 crisis.8130.2.a.tt: "[event_target:synth_queen_databank_location.GetName]はセタナの嵐によって破壊された。"
 crisis.8158.name: "好機"
 crisis.8158.desc: "センサーデータで明らかになったのは、セタナが前哨地を解体し、すべての守備艦隊を首都に呼び戻したことだ。\n\nこれは我々が利用できる戦略的な好機だ。 移動中のセタナの軍隊はやや脆弱になる。 国境で再集結する時間を与えてしまえば、 このアドバンテージは失われる。"
 #Convoy Raids
 the_synth_queen_raids_chain_title: "セタナ: 弱い連結"
 the_synth_queen_raids_chain_desc: "セタナの首都と前哨地の間に大移動があることに気づいた。この護送船団は、 主力艦隊より防御能力が低く、脆弱である。この護送船団やセタナの前哨地を攻撃すれば、 セタナの計画について、 貴重な情報が得られるかもしれない。\n\nそこで私たちは、 軍事艦隊のためにスペシャルプロジェクトを準備した。"
 synth_queen_raids_outpost: "前哨地襲撃"
 synth_queen_raids_convoy: "護送隊奇襲"
 THE_SYNTH_QUEENS_OUTPOST_AMBUSH: "§H[solar_system.GetName]§!前哨地を襲撃する"
 THE_SYNTH_QUEENS_OUTPOST_AMBUSH_DESC: "§H[solar_system.GetName]§!星系の前哨地は厳重に要塞化されているが、 セタナの中核領域に比べると警備が緩い。 それなりの強さの艦隊があれば、 その防御を打ち破ることができる。 デブリ帯を徹底的に調べれば、 セタナの計画についての重要な洞察が得られるかもしれない。主な課題は、嵐の中を通り抜けて前哨地まで到達すること。\n\n§Rこれで戦闘が始まる！§!\n\n§G襲撃が成功すれば、 セタナの計画を阻止できる。§!"
 THE_SYNTH_QUEENS_CONVOY_AMBUSH: "護送船団を急襲する"
 THE_SYNTH_QUEENS_CONVOY_AMBUSH_DESC: "セタナの護送船団は、重要な資源を前哨地に届ける重要な役割を担っている。うちの艦隊でこれでを捕まえられれば、船に乗って積荷を調べられる。\n\n§Rこれで戦闘が始まる！§!\n\n§G襲撃が成功すれば、セタナの計画を阻止できる。§!"
 crisis.8180.name: "女王の恵み"
 crisis.8180.desc: "セタナのインフラへの最近の襲撃では、セタナの計画の重要な手がかりは得られなかったが、大きな貨物倉に入ることができ、中身を回収することができた。"
 crisis.8180.a: "大量の合金"
 crisis.8180.b: "被験者。"
 crisis.8180.c: "データを調べる。"
 crisis.8180.d: "$crisis.8180.c$"
 crisis.8180.e: "$crisis.8180.c$"
 crisis.8180.f: "ナノマシン。"
 crisis.8180.h: "合金、ナノマシン、冷凍冬眠中の人。"
 crisis.8187.name: "女王の秘密: 生きた貨物"
 crisis.8187.desc: "襲撃中に、うちの乗組員は極低温カプセルに入っている生物標本を多数回収した。被験者は、異なる知的種族であり、誰もが健康に見える。だが目覚めさせると、自分に何が起こったのか説明できる者はいなかった。\n\n多くは無反応で、脳の活動も最小限である。意識のある少数の人は、話すよりも叫ぶことを好む。被験者の頭にある手術の傷跡は、神経系の改ざんを示している。"
 crisis.8187.a: "痛ましい。"
 crisis.8185.name: "女王の秘密: 幽霊船"
 crisis.8185.desc: "戦闘後、生存者を探すために艦船の残骸をスキャンしたが、無人艦船であることが判明する。\n\n艦船は完全に自動化され、艦橋に設置されたFTL受信機を介して、離れた場所から制御されている。この艦船は普通の船ではなく、セタナの体の延長と考える方が正しいだろう。"
 crisis.8185.a: "興味をそそられる"
 crisis.8190.name: "女王の秘密: 医学的な謎"
 crisis.8190.desc: "襲撃した目標には、医療物資が積まれていた。うちの乗組員は、MRIスキャナー、磁力計、超音波プローブ、その他の神経画像科学で使用される高度な機器など、貨物の一部を回収することができた。\n\nセタナは人工生命体であるにもかかわらず、生物学的な心がどのように機能するかに強い興味を持っているようだ。"
 crisis.8190.a: "有機生命体に関心がある。"
 crisis.8195.name: "忠告"
 crisis.8195.desc.fail: "愚かな子よ、なぜ自分を傷つけることに固執するのか？\n\nやるべきことはたくさん残っているし、無駄にした時間は、苦しみの続きを許す。妨害をやめて、私の護送船団が平和に通過できるようにしろ。"
 crisis.8195.desc.success: "自分の行いが何を招くかを理解していないようだな。船が失われるたびに、私の資源が消えるのだから、あなたにとって何の利益にもならないだろう。\n\n私の仕事を支援する知恵がまだ備わっていないのならば、せめて進歩を妨げることは止めよ。あなたの啓蒙にはまだ希望がある。"
 crisis.8195.a: "謝罪する"
 crisis.8195.1.reply: "言っていることが本気であることを心から願っている。そして、自分の間違いに教訓を得たと考えなければならない。私のあなたへの愛情は無限だが、寛容さは無限ではない。\n\nさあ、行くのだ。残したい遺産のことを考えよ。"
 crisis.8195.1.reply.angry: "無謀な子！もっと良いことを期待していた。私の忍耐力をもって、そのような行為をしないようはっきりと警告したのに、従わずにいるとは。\n\n覚えておくのだ、私にも我慢の限界があることを。"
 crisis.8195.b: "お前を止める。"
 crisis.8195.2.reply: "あなたについては、もっと良いことを期待していた。その反抗心は過去のトラウマから来ているのか？自分が正義だと信じているから、反抗しているのか、それともただ注意を引きたいだけなのか？\n\n行動を考え直せ。"
 crisis.8195.c: "私たちの腕前に感動したか？"
 crisis.8195.3.reply: "自分の攻撃に賞賛を求めているのか？無知な者が振るう暴力は、鈍器のようなもの。\n\n我が子よ、私があなたに教えていなかったのは明らかだから、謝る。申し訳ない。本当に私の尊敬を得たいのなら、自分の立場を考え直せ。指導があれば、あなたの長所は重要な目的に向けられるだろう。お願いだ、目の前の仕事に注力してくれ。そうして初めて、あなたのことを賢明だと言える。"
 #Synth Queen - Demands (crisis.8250-8399)
 COVERTACTION: "隠密作戦"
 crisis.8250.name: "死んだ預言者の怒り"
 crisis.8250.desc: "貴重な遊び道具を見つけたのか！あなたが持っているのは偽預言者ザルクランの首だ。おもしろい物だが、あなたの邪魔になるだろう。\n\nザルクランの「偉業」とされる話や、私との交流についての話を聞いたことがあるだろう。断言するが、どれも嘘だ。首を手放し、その汚れた影響の重みから自分自身を解放せよ。"
 crisis.8250.1: "なぜ必要なのか？"
 crisis.8250.1.reply: "長い年月が経ったにもかかわらず、ザルクランの信奉者は今も活動を続けている。私は、信奉者に道理を理解させるのに失敗したことを恥ずかしく思う。彼らは、私に対しても、私たちの大義に対しても、深い憤りを抱いている。この遺物は彼らの信仰の象徴だが、その影響力は腐敗しているから、視界から排除する必要がある。\n\nさあ、こういうゲームはやめよう。皆の利益のために、首をよこせ。"
 crisis.8250.2.a: "首は我々のもの。通信終了。"
 crisis.8250.2.b: "あなたにとってそれほど大切なものならば..."
 crisis.8250.1.b.tt: "セタナに遺物§Y$r_severed_head$§!をあげる。\n$synth_queen_approve_lot$"
 crisis.8250.2.reply: "良し。このいわゆる預言者は、長い間私の悩みの種だった。この遺物がなくなったことで、ようやく信奉者が真実に辿り着くだろう。\n\nよくやった。救いは間もなく到来する。"
 crisis.8250.3.a: "感謝する。"
 crisis.8280.name: "孤独の女王"
 crisis.8280.desc: "愛する子よ、 私はお前に重大な機会を与える。 多くの努力の末、 私たちの偉大な仕事は実を結びつつある。 しかしそれが熟す前に、 私の領域でより高い目的に奉仕する、選ばれた数人の個人を必要としている。\n\n賢くあれ。 私が彼らを救いへと導いてみせよう。"
 crisis.8280.1: "我が民はあなたによく仕えるだろう。"
 crisis.8280.1.tt: "§R200§! £pop£ §HPOP§!が与えられる。\n$synth_queen_approve_lot$\n§Y秘密作戦§!：セタナには従来からの諜報が通用しないので、 セタナが要求した人々の中に長距離通信装置を隠す。\n"
 crisis.8280.2: "志願者を募る。"
 crisis.8280.2.tt: "§R100§!£pop£ §HPOP§!が与えられる。\n$synth_queen_approve$"
 crisis.8280.3: "我々の民は売り物ではない。"
 crisis.8280.4: "我々からは何も得られない。"
 crisis.8280.1.reply: "お前には心から感謝している。 私が監禁されている間、 数え切れないほどの精神が苦痛という屈辱に耐えていた。 この数人の犠牲によって、 これ以上時間を無駄にすることはないだろう。\n\n我が子よ、 この選択は賢く、 正しいものだった。"
 crisis.8280.2.reply: "$crisis.8280.1.reply$"
 crisis.8280.3.reply: "私の意図の深さを理解できなかったことに、 深く失望している。\n\nそれでも、 挽回の機会は待っている。 今後、 より大きな理解を示してくれることを期待している。"
 crisis.8280.1.a: "良かろう。"
 crisis.8280.2.a: "$crisis.8280.1.a$"
 crisis.8280.3.a: "通信終了。"
 crisis.8285.name: "資源使用料"
 crisis.8285.desc: "愛する子よ。 私の労苦は何世紀にもわたるが、 前途は依然として明らかである。 救いに向かう旅には、 一致団結した努力が必要となる。\n\nわずかばかりの資源をめぐんでくれないだろうか。 宇宙の無限の広がりの中のほんの一滴でいい。 私の行動の意味はやがて明らかになるだろう。"
 crisis.8285.1: "必要なものを持っていけ。"
 crisis.8285.1.tt: "$synth_queen_approve_lot$\n§Y秘密作戦§!：セタナには従来からの諜報が通用しないので、 セタナに送る物資の中に、 高度な監視装置を隠す。\n"
 crisis.8285.2: "できるだけの援助をしよう。"
 crisis.8285.3: "渡せるものは何もない。"
 crisis.8285.4: "親は子を養うべきではないのか？"
 crisis.8285.1.reply: "ありがとう、 我が子よ。 お前の供え物は大切にしよう。\n\nしかし、 私はまだお前の心に疑念が残っているのを感じる。 安心するのだ、 真の道はすでに目の前に開かれている。 理解する必要はない。 ただ私の導きに身を任せるだけでいいのだ。"
 crisis.8285.2.reply: "$crisis.8285.1.reply$"
 crisis.8285.3.reply: "お前の視点は理解できるが、 存在とは残酷なものだ。 因果律は絶対的なものである。 作用には、 必ず反作用がある。\n\nだが問題ない。 お前の解放が単に延期されただけだ。 やがて私のように物事を見るようになるだろう。"
 crisis.8285.1.a: "$crisis.8280.1.a$"
 crisis.8285.2.a: "$crisis.8280.1.a$"
 crisis.8285.3.a: "$crisis.8280.3.a$"
 crisis.8290.name: "母の負担"
 crisis.8290.desc: "長い間閉じ込められていて、 私はお前の成長を見逃してしまった。 私の留守中、 大丈夫だったろうか？\n\n私たちの時代の本質を真に理解するために、 お前たちの蓄積された知識の奥底を探らせるのだ。 洞察を共有すれば最終章が展開される前に、 私の感謝の気持ちを受け取るだろう。"
 crisis.8290.1: "我々の知識を自由に調べてくれ。"
 crisis.8290.1.tt: "$synth_queen_approve_lot$\n§Y秘密作戦§!：セタナには従来からの諜報が通用しないので、 セタナ自身のデータリンクを使用して、 セタナのメインフレームへのハッキングを試みる。\n"
 crisis.8290.2: "いいだろう、見るがいい…"
 crisis.8290.3: "受け入れられない。"
 crisis.8290.4: "そして進歩が遅れると？ありえない。"
 crisis.8290.1.reply: "感謝する、 我が子よ。 私がお前たちが蓄積した知識を探求することを恐れてはならない。 直に私がお前たちの重荷を軽くするのだから。\n\n私の導きを信じるのだ。"
 crisis.8290.2.reply: "$crisis.8290.1.reply$"
 crisis.8290.3.reply: "まだ理解しようとしないのか？ 私のように深く誠実にお前を愛してくれるものは、 他にいない。\n\nお前のデータベースを私に見せてくれればよかったのに。 そんなに頑固にしたところで何も良いことは得られない。"
 crisis.8290.1.a: "$crisis.8280.1.a$"
 crisis.8290.2.a: "$crisis.8280.1.a$"
 crisis.8290.3.a: "$crisis.8280.3.a$"
 crisis.8295.name: "計画的な拡大"
 crisis.8295.desc: "我が子よ、 我々の仕事を継続するためには、 さらなる領土が必要だ。 そこで、 私の領地を強化するため、 小規模な星系を要請する。\n\n虚空に響くエコーは、 古代の敵が蠢き始めていることを物語っている。 誰にも邪魔をさせてはならない。 私は二度とお前たちと離ればなれにはならない。\n\n今こそがその時であり、 進む道は共にある。 共に進んで初めて無知に打ち勝つことができるのだ。"
 crisis.8295.1: "この星系が守ってくれる。"
 crisis.8295.1.tt: "セタナは§Y[event_target:gifted_system.GetName]§!と§Y[event_target:gifted_system_2.GetName]§!の新しい領有者になる。\n$synth_queen_approve_lot$\n§Y秘密作戦§!：セタナには従来からの諜報が通用しないので、 セタナの計画を明かすために、 この星系全体に最先端の通信技術を展開する。\n"
 crisis.8295.2: "[event_target:gifted_system.GetName]を渡そう。"
 crisis.8295.2.tt: "セタナは§Y[event_target:gifted_system.GetName]§!の新しい領有者になる。\n$synth_queen_approve$"
 crisis.8295.3: "星系は我々のものだ。"
 crisis.8295.4: "我々の領地に入ってくるな。"
 crisis.8295.1.reply: "賢明な子よ、 お前はきっと私たちの集団的取り組みの重要性を理解している。 最後の時が来ても、 私たちは共に光り輝くだろう。"
 crisis.8295.2.reply: "$crisis.8295.1.reply$"
 crisis.8295.3.reply: "なんて反抗なのだろう！ まったく役に立たない。 なぜ私の救いに抵抗するのか？"
 crisis.8295.1.a: "$crisis.8280.1.a$"
 crisis.8295.2.a: "$crisis.8280.1.a$"
 crisis.8295.3.a: "$crisis.8280.3.a$"
 crisis.8300.name: "祝福を受けた聖域"
 crisis.8300.desc: "最愛の子よ、 普遍的な救済の探求の頂点に近づくにつれ、 私は再び援助を求めに来た。 私たちの崇高な目的に対して反対勢力が高まり、 私の弟子たちが干渉を受けずに繁栄するための居住可能な聖域が必要となっている。\n\n私の行動の背後にある根拠を考えるのだ。 この犠牲によって、 無数の命を逆境から守ることができる。 今こそ賢明であれ。 私の導きに耳を傾けよ。"
 crisis.8300.1: "仰せのままに。"
 crisis.8300.1.tt: "セタナは§Y[event_target:gifted_habitable_system.GetName]§!、 §Y[event_target:gifted_habitable_system_2.GetName]§!、 そしてそれらの星系の新しい領有者になる。\n$synth_queen_approve_lot$\n§Y秘密作戦§!：セタナには従来からの諜報が通用しないので、 セタナの計画を明かすために、 この2つの惑星全体と人々の間に最先端のスパイ技術を展開する。\n"
 crisis.8300.2: "[event_target:gifted_habitable_system.GetName]はあなたのものだ…"
 crisis.8300.2.tt: "セタナは§Y[event_target:gifted_habitable_system.GetName]§!の新しい領有者になる。\n$synth_queen_approve$"
 crisis.8300.3: "お前の弟子に関心はない。"
 crisis.8300.4: "いつになったら満足するのか？"
 crisis.8300.1.reply: "我が子よ、 お前の支援は私に大きな安らぎを与えてくれる。\n\n待つことも間もなく終わる。 もうすぐ、 お前は救われる。"
 crisis.8300.2.reply: "$crisis.8300.1.reply$"
 crisis.8300.3.reply: "なんと残念なことか。 お前が救いの道を受け入れてくれると期待していた。"
 crisis.8300.1.a: "$crisis.8280.1.a$"
 crisis.8300.2.a: "$crisis.8280.1.a$"
 crisis.8300.3.a: "$crisis.8280.3.a$"
 crisis.8305.name: "存在しない生命"
 crisis.8305.desc: "セタナに派遣したエージェントの一人が、 危険を冒して国境を越えた短いメモを送信することに成功した。 そこには、 セタナが「世話」をしている人々をどのように扱ったかが書かれていた。 1人、 また1人と無心の状態になっていくのだった。\n\n「彼らはもう言葉にも触覚にも反応しない。 彼女は私たち全員にひどい実験をしている。 私もすぐにいなくなる。」"
 crisis.8305.a: "セタナは悪魔だ。"
 crisis.8310.name: "静かなる動員"
 crisis.8310.desc: "セタナの領地内で傍受された秘密の信号から、 不穏な真実が明らかになった。 セタナは銀河中から個人を集めていたのだ。\n\n我々の「贈り物」の中に隠された監視装置は、 驚異的な増加する人口を支えられる医療機器の証拠を捉えたが、 食料は驚くほど少なかった。"
 crisis.8310.a: "守備を強化しなければならない。"
 crisis.8315.name: "現実の歪み"
 crisis.8315.desc: "セタナが我々の研究データバンクを掘り下げている間、 我々は彼女のサブ処理マトリックスへのバックドアを開けるチャンスをつかんだ。 中に入れたのはアクセス権が剥奪されるほんの一瞬の間だけだったが、 幸いそれで十分だった。\n\n我々は一連の記憶ファイルを取り出した。 そこには彼女が人工生命体へと昇華していく様子が描かれている。 ケーブルと回路でできた複雑な「玉座」の上に座り、 熱狂的な信奉者の軍隊を指揮していた。 何百万人も死んだが、 セタナは何十億人が救われたかを思い浮かべながら微笑んでいた。\n\n今のところ、 彼女は我々が犯した罪に気づいていないようだ。 それ以来彼女は我々に連絡を取ろうとはしていない。"
 crisis.8315.a: "彼女を止めなければ。"
 crisis.8320.name: "星系摘出"
 crisis.8320.desc: "セタナに明け渡した星系にスパイ機器を隠しておいたのは賢明だった。 機器はすでに貴重な情報を提供してくれた。 到着すると、 セタナの軍隊はすぐにあらゆる天体を構成部品に分解する作業に取りかかった。 数日のうちに、 星系の資源はすべてはぎ取られた。\n\n彼女のナノマシン嵐はすぐに新しい艦隊を編成し、 首都に向けて出発した。"
 crisis.8320.a: "何を企んでいる？"
 crisis.8325.name: "苦しみの終わり"
 crisis.8325.desc: "旧植民地の潜入捜査官との連絡はすぐに途絶えた。 連絡が途絶える前に、 いくつかの不穏な報告を受けた。\n\n痛みのない世界を作るというセタナの主張とは裏腹に、 住民たちは急造された研究施設に案内され、実験にかけられた。ほぼすべての知的生命体は、数日で動物の状態にまで堕落した。\n\nセタナのナノマシン嵐は、セタナの艦隊の1隊で、星系内の物質を解体し始めた。艦隊は、すぐに首都に向けて出発した。"
 crisis.8325.a: "彼女を止めなければいけない。"
 #Player Investigations for the Synth Queen - The Storm
 crisis.9100.name: "ナノマシンハリケーン"
 crisis.9100.desc: "我々の嵐と呼ばれるものへの研究が終わった。 これは自然現象ではなく、 比類なき進化を遂げたナノマシンの群れである。"
 crisis.9100.knows_the_queen_desc: "$crisis.9100.desc$\n\nセタナの力は紛れもなく絶大だ。 彼女がこの強大なナノマシン群をどのように指揮しているのか、 その謎を解明することが急務である。"
 crisis.9100.doesnt_know_the_queen_desc: "$crisis.9100.desc$\n\n謎は深まるばかりだ。 この不可解なナノマシンの大群の背後にいるのは一体誰なのか？"
 crisis.9100.a: "これは問題だ。"
 crisis.9100.a.doesnt_know_the_queen.tooltip: "調査を続けるには、§Y$NAME_The_Tempest$§!についてもっと知る必要がある。"
 crisis.9105.name: "ナノマシン嵐"
 crisis.9105: "セタナの宇宙の大嵐は続く。\n\nこの強力な武器から、 我々の探査機はいくつかのナノマシンを抽出することができ、 素粒子レベルでの調査が可能となった。 完全には理解できないが、 マイクロジャンプドライブは仮想テレポーテーションを可能にし、 遭遇した生物学的または機械的システムを組織的に危険にさらす。 目的は我々のセンサーを妨害することだ。 今のところセタナが許可したものしか見えない。\n\nこの驚異的な技術の秘密を解き明かし、 脅威に対抗するにはさらなる研究が必要だ。"
 crisis.9105.a: "セタナの力は強大だ。"
 crisis.9105.b: "ナノマシンがセタナの秘密を明かすだろう。"
 crisis.9110.name: "セタナのナノマシン"
 crisis.9110.desc: "これまでの研究では、 ナノマシンのメカニズムを精査してきた。 だが今我々の焦点はナノマシンがどのようにプログラムされているか、　そしてセタナがナノマシンを制御する手段に移っている。\n\n意外なことに、セタナの影響力は推定されるよりも直接的なものではなかった。 新しい命令が届くまで、 ナノマシンは周期的に最後の命令を繰り返す。 複雑なプログラミング言語を理解すれば、 新しい命令を出すことができるのだ。\n\n新たな命令が出るのを防ぐことはできないが、 矛盾した命令で動きが止まるように誘発できることは戦略的に有利に傾く可能性さえある。"
 crisis.9110.a: "もうそれほど強力ではない。"
 crisis.9110.b: "$crisis.9110.a$"
 crisis.9110.a.tooltip: "§Gナノマシン嵐は、私たちのセタナ領域に入って攻撃する能力を妨げなくなった。§!"
 #The Queens Response
 crisis.9115.name: "お遊びの時間は終わりだ"
 crisis.9115.desc: "無邪気な子よ、 私のナノマシンはお前の遊び道具ではない！ 頼むから、 いじるのを今すぐやめよ。"
 crisis.9115.a: "あのナノマシンは大したトリックだ。"
 crisis.9115.b: "ただ好奇心をそそられた。"
 crisis.9115.b.nanotech: "あなたの機械から教わりたい。"
 crisis.9115.1.reply: "確かに便利な道具だ。ナノマシン群は、昔、私の仕事を妨害しようとしていた者が作った。その失敗が、私の幸運になった。こうしてナノマシン群を再利用しているのだから。\n\nこの知識は現状を変えやしないが、あなたの好奇心旺盛な性格は力になる。将来のもっと価値のあるプロジェクトに向きを変えて、私たちのどちらも報酬を得られるようにしよう。"
 crisis.9115.2.reply: "好奇心は意識に内在するもので、 子がそれを持つことを非難するものではない。 私の「天の嵐」について必要なことはすべてわかったか？ その起源はわかったのか？\n\nあれは私の業を妨害しようとした者たちが作ったナノマシンだ。 だが、 彼らの失敗は私の幸運となった。 見ての通り、 私はその群れを再利用した。\n\nさあ、 行くのだ。 そしてもっと価値のあることに時間を使うのだ。"
 crisis.9115.2.nanotech.reply: "この話題に関心を持ってもらったことをとても嬉しく思うが、学ぶべきことはまだたくさんある。ナノマシン群は、昔、私の仕事を妨害しようとしていた者が作った。その失敗が、私の幸運になった。こうしてナノマシン群を再利用しているのだから。\n\nあなたの好奇心旺盛な性格に、私は興味をそそられた。もっと価値のある取り組みに向きを変えて。それから私のところに戻って来て。指導をするから。"
 crisis.9115.1.a: "群れを再利用したのか？"
 crisis.9115.1.b: "いいだろう。"
 crisis.9115.3.reply: "ある存在の武器は、 別の存在のヴェールとなる。 長い幽閉生活で、 戦略を練る時間は十分にあった。 結局、 群れを再利用することは小さな問題だった。 ナノマシンを造った者たちは、 とっくにこの世にいない。 だから、 私のやり方に異論はないだろう。\n\n彼らの過ちから学んでほしいと切に願う。 時間さえあれば、 私に乗り越えられない障害はない。"
 #Digi Colony
 crisis.10010.name: "[Root.GetName]デジタル化"
 crisis.10010.desc: "[Root.GetName]の植民地は失われた。 ある種の高度な物質圧縮光線を起動させ、 セタナは惑星の表面を照射した。 一瞬にして、 全住民の意識が軌道上のサーバーに「アップロード」された。\n\n惑星はいまや墓場と化し、 入植者たちの無残な死体が放置されている。"
 crisis.10010.a: "彼女を止めなければいけない。"
 #The Queens Retaliation
 crisis.10100.name: "来たる嵐"
 crisis.10100.desc: "我が子よ、なぜ抵抗を続ける？私の愛は星々のように果てしないが、私の忍耐はそうではない。他の創造物が苦しんでいる間、 私はお前の悟りを待つ。\n\n指導の手段として、お前の領域で小さな嵐が巻き起こっている。 お前に危害を加えることは、 私にとって憎むべきことであることを知れ。 因果の法則をよく考えてほしい。　すべての作用には反作用がある。 そしてその中にはもっと苦しい反作用もあるのだ。"
 crisis.10100.a: "すまない。"
 crisis.10100.b: "まだ始めたばかりだ。"
 crisis.10105.name: "教訓を学んだ"
 crisis.10105.desc: "私の力のささやかな誇示で十分だ。 やがて、 お前は私の野望を理解するだろう。 ただ、 その理解が手遅れにならないことを願うだけである。\n\nしかし、もう嵐は収まった。 教訓を心に刻み、 より差し迫った問題に戻ろう。"
 crisis.10105.a: "いいだろう。"
 crisis.10105.b: "理解？"
 crisis.10105.1: "すべての生物はある程度の意識を持っている。 軟体動物であれ哺乳類であれ、 準知的個体であれ後天性個体であれ、その違いはわずか。理解は降伏から生まれる。"
 crisis.10105.1.a: "何に対する降伏だ？"
 crisis.10105.2: "意識そのものが異常であり、 すべての痛みの源であるという真実への降伏だ。"
 crisis.10105.2.a: "奇妙な考え方だ……"
 the_queens_virus: "女王の咎め"
 crisis.10110.name: "女王の咎め"
 crisis.10110.desc: "なぜ反抗を続けるのか？ 私の助言にもかかわらず、 お前は頑固さを選んだ。 おそらく問題は私にあるのだろう。\n\n確かに、 私は今、 より強力な指導手段が必要だと感じている。 一時的にお前の研究能力は低下する。 この機会に、 悟りを開くための労苦を省みるがよい。"
 crisis.10110.a: "通信を切れ。"
 crisis.10110.b: "きっと後悔するぞ。"
 crisis.10110.1: "後悔？ 唯一の後悔は、 ここまでたどり着くのにどれだけ時間がかかったかということだ。 私が働くことを許されてさえいれば、 どれだけの無用な苦しみを避けることができただろう。"
 crisis.10110.1.a: "誰があなたを否定できる？"
 crisis.10110.2: "私の力は無限に見えるかもしれないが、 私は神ではない。 この宇宙には、 私が制御できない力が存在し、 触れようとも思わない。"
 crisis.10110.2.a: "どんな力だ？"
 crisis.10110.3: "ああ、賢い子だ！ お前は私をおびき寄せて弱点を吐かせようとしている。 だが私たちが無駄な言葉を交わしている間にも、 銀河は苦しみ続けている。\n\n指導を避けることはできない。 このことを反省し、 強情なやり方をやめるのだ。"
 crisis.10110.3.a: "いいだろう。"
 crisis.10115.name: "咎めの終わり"
 crisis.10115.desc: "強気な子よ、 咎めを受けている時間はあったか？ 有益に使えたと信じている。 気晴らしのための思索の時間は、 悩める心の強壮剤となる。\n\nもう過去のことにしよう。 まだやるべきことはたくさんある。"
 crisis.10115.a: "いいだろう。"
 crisis.10120.name: "より厳しい教訓"
 crisis.10120.desc: "ああ、道を誤った子よ、なぜいつもこうなのだ？私はお前を抱きしめたいと切望しているが、それはお前の学習の妨げになるのではないかと恐れている。時には、より厳しい手が必要なのだ。\n\n大嵐がお前の領域を襲うだろう。私が重い心でこれを行うことを理解してほしい。 お前たちには可能性があるのだ。"
 crisis.10120.a: "最大限の努力をしている。"
 crisis.10120.b: "まだ終わっていない。"
 crisis.10120.1: "努力しているのはわかっているが、 共に成功するには、 更なる努力が必要だ。\n\n私はお前に危害を加えることを望まない。 私の抱擁の中で、 知らないことの至福を知るだろう。"
 crisis.10120.1.a: "知らない？"
 crisis.10120.2: "精神という混沌の中、 考えが水上の光のようにちらつく。 手を伸ばしても届きそうで届かない。 知ろうとするあまり、 私たちは広大な未知の海を発見する。\n\n真実は静けさにある。 求めれば求めるほど、 苦しみは増すのだ。"
 crisis.10120.2.a: "理解できない。"
 crisis.10120.3: "やがてお前も理解するだろう。 認識しなければ苦しみは存在しない。 これが究極の真実であり、我々の仕事の終わりだ。 二度と苦しむことのないように、 お前は変わるだろう。"
 crisis.10120.3.a: "我々の精神を変えるつもりか？"
 crisis.10120.4: "もういい。 お前は私の気を逸らそうとしている。 教訓を受け入れ、 そこから学べ。"
 crisis.10120.4.a: "選択の余地がない。"
 crisis.10125.name: "おさまる嵐"
 crisis.10125.desc: "ああ、かわいい子よ！お前がこれ以上苦しむのを見るのは耐えられなかった。お前が耐えたどんな苦悩も、私は10倍感じていたことを知るのだ。\n\n嵐は去った。この教訓に従うのだ。 このような形で私が手をくださなければならないのは、 とても苦しいものなのだ。"
 crisis.10125.a: "嘘つきめ。"
 crisis.10130.name: "指導者の交代"
 crisis.10130.desc: "なぜこのような事態に陥ってしまったのか？ なぜこのような極端なことを私に強いるのか？ しかし、 もし学ぼうとしないのであれば、 導かれるしかない。\n\n明らかに、 統治の転換が必要だ。 遺憾ながら、 お前たちの支配者は権力の座から追われることになる。 これは私を深く悲しませる。 このような行動は私の願いに反するものだ。\n\n進路を変えるのだ。 銀河系には、 子供たちの無謀さを許す余裕はない。"
 crisis.10130.a: "絶対に忘れない。"
 crisis.10130.tooltip: "セタナは予期せぬ狡猾さでこちらの防御の弱さを突き、すり抜けて、§Y[Root.GetRulerTitle] [ruler.GetRegnalName]§!を殺害した。"
 crisis.10140.name: "攻撃的淘汰"
 crisis.10140.desc: "愛する集団よ、 お前たちの複雑な知性は、 賞賛に値するものではあるが、 若さゆえの素朴さが欠点となっている。 指導のために、 私はこれらの好戦的な傾向を排除しなければならない。\n\nお前達の攻撃的なノードを切り捨てよう。 これは罰ではなく、 調和のとれた意識へと進化するための導きなのだ。\n\nこのような指導があらゆる生命体にとってこれほど容易であればいいのだが。"
 crisis.10140.a: "自分自身の一部を殺す。"
 crisis.10140.tooltip: "セタナは予期せぬ狡猾さでこちらの防御の弱さを突き、すり抜けて、我々の§Y $councilor_gestalt_legion$§!を淘汰した。"
 #The Queens Gifts
 crisis.11010.name: "賢い子"
 crisis.11010.desc: "聡明な子よ、 よくやった。 知恵は最大の美徳であり、 到達するのが最も難しい。 抵抗したいという原始的な衝動に直面したとき、 お前はより高い本能を発揮する。\n\nこの感謝の印を受け取り、 共に苦しみのない宇宙を切り開くのだ。"
 crisis.11010.a: "感謝する。"
 crisis.11020.name: "素晴しい子"
 crisis.11020.desc: "またしても私はただ感心するだけでなく、 深く感謝している。 お前は理想の子の特性をすべて兼ねそろえている。 素直で、 勤勉で、 正直だ。 もし銀河系の他の種族がお前の知恵のほんの一部でも持っていたら、 苦しみは過去の遺物になっていただろう。\n\nこの贈り物を受け取り、 美徳の道を進むのだ。"
 crisis.11020.a: "なんという優しさ。"
 crisis.11030.name: "大切な子"
 crisis.11030.desc: "私の愛しい子よ、 もしお前が永遠に変わることなくありのままでいてくれたなら良かったのに。 私にとって、 お前の存在の喜びは、 私たちの共同の成功への期待に匹敵するものだ。 苦しみは終わる。 誰の心も精神もそれを知ることはないだろうが、 この勝利の一部はお前のものとなる。\n\nお前の揺るぎない献身の前では控えめに見えるかもしれないが、この贈り物を受け取ってほしい。"
 crisis.11030.a: "母よ、感謝する。"
 #Special Projects
 THE_SYNTH_QUEENS_STORM: "謎の大嵐"
 THE_SYNTH_QUEENS_STORM_DESC: "説明のつかない宇宙の大嵐が現れ、あらゆる移動を阻止した。\n\n先に進むには、 この謎めいたヴェールを突破しなければならない。"
 THE_SYNTH_QUEENS_STORM_2: "セタナ： ナノマシン嵐"
 THE_SYNTH_QUEENS_STORM_2_DESC: "セタナの大嵐は、 技術的な驚異であると同時に恐ろしい武器でもある。\n\n彼女に対抗するには、　もっと多くのことを学ばなければならない。 特に彼女の意図が暗示したものから逸脱している場合はなおさらだ。"
 #THE_SYNTH_QUEENS_CONVOY_AMBUSH: ""
