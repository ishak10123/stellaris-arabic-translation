 cosmogenesis_level_5_req_tooltip: "£trigger_no£§Y$tech_cosmogenesis_crisis_4$技術§!を研究した"
 cosmogenesis_level_5_req_clear_tooltip_2: "£trigger_yes£2つ以上の§A適用Y無限命題§!を研究した"
 cosmogenesis_level_5_req_tooltip_2: "£trigger_no£2つ以上の§Y適用無限命題§!を研究した"
 tech_cosmogenesis_world: "スケーラブルなレザボアコンピューティング"
 tech_cosmogenesis_world_desc: "$menp_cosmo_features_1_desc$"
 TECH_UNLOCK_COSMOWORLD_CONSTRUCTION_TITLE: "§H巨大構造物のアンロック：§!シナプス旋盤"
 TECH_UNLOCK_COSMOWORLD_CONSTRUCTION_DESC: "§Hシナプス旋盤§!\n$menp_cosmo_features_1_desc$"
 tech_cosmogenesis_thesis: "無限理論の応用"
 tech_cosmogenesis_thesis_desc: "現実の法則に更なる変更を加えることによって、 その反応をより正確に観察することができる。 この規模での影響はまだ予測しづらく、 銀河全体を影響する可能性もある。"
 cosmogenesis_thesis_tech_title: "§H現実の法則§!を変える試み"
 cosmogenesis_thesis_tech_desc: "実験はとても危険で、 予測できない結果となるだろう。"
 triggered_opinion_cosmogenesis_crisis_empire: "$triggered_opinion_crisis_empire$"
 ### FE unlocks
 tech_cosmogenesis_escort: "リドル護衛艦"
 tech_cosmogenesis_escort_desc: "$menp_cosmo_ship_2_desc_regular$"
 TECH_UNLOCK_ESCORT_CONSTRUCTION_TITLE: "§H艦船タイプをアンロック：§! リドル護衛艦"
 TECH_UNLOCK_ESCORT_CONSTRUCTION_DESC: "§Hリドル護衛艦§!\n$menp_cosmo_ship_2_desc_regular$"
