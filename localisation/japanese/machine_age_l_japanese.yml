 #ARC WELDERS ORIGIN
 ##########################
 origin_arc_welders: "アーク溶接士"
 origin_arc_welders_desc: "その惑星は不毛だが、 母星系は豊かだ。 それを悪用するために、 この機械は過去最大になっている。 強力な§H$tech_orbital_arc_furnace$§!がその空を支配しているが、 この熟練技術者は満足していない。\n\n銀河が待っていて、 可能性は無限なのだから。 必要なのは、 それらを支配するための創意工夫のみ。"
 origin_tooltip_arc_builders_effects: "- $HOMEWORLD$最初の['concept_mining_district', £district£ $district_mining_plural$]は['concept_generator_district', £district£ $district_generator_plural$]に置き換えられる$NEW_LINE$- $HOME_SYSTEM$['concept_pc_molten']周りで建設された['concept_arc_furnace']$NEW_LINE$- $ADDITIONAL_TECHNOLOGIES_STRING$['concept_orbital_arc_furnace',£engineering_research£ $tech_orbital_arc_furnace$]$NEW_LINE$- 2番目のアーク炉建設後に$GUARANTEED_RESEARCH_OPTION_STRING$['concept_mega_engineering', £engineering_research£ $tech_mega_engineering$]"
 origin_tooltip_arc_builders_negative_effects: "- $INITIAL_POPS$ §R-300§! $NEW_LINE$- $HOMEWORLD$規模: £planetsize£ 15"
 START_SCREEN_ARC_WELDERS: "長い期間を経て使い果たされ、[Root.Capital.GetName]は不毛になった。だが、上空には資源が豊富にあり、野心と創意工夫を原動力に、今、宇宙で暮らそうとしている。\n\n$tech_orbital_arc_furnace$の最初の建設は大規模な事業であり、その可能性は計り知れない。星系全体の資源抽出の必要性と同様に、最大限の可能性までアップグレードすることが次の段階であることは明らか。だが、境界の向こう側には何があるのか？才能豊かな技術者には、どんな素晴らしいチャンスが待っているのだろうか？\n\n超光速航行技術の出現により、設計は単一の星系に限定されなくなった。銀河は私たちの真っ白なキャンバスのようなもので、仕事に取り掛かる時が来た。"
 concept_arc_furnace: "$orbital_arc_furnace_1$"
 concept_arc_furnace_desc: "§E効果:§!$NEW_LINE$$orbital_arc_furnace_1_mod_tooltip$\n\n§L$tech_orbital_arc_furnace_desc$§!"
 concept_orbital_arc_furnace: "$tech_orbital_arc_furnace$"
 concept_orbital_arc_furnace_desc: "§I巨大構造物をアンロック：§! $orbital_arc_furnace_4$ $DOUBLE_NEW_LINE$§L$tech_orbital_arc_furnace_desc$§!"
