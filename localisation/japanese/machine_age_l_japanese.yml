 #Diplomatic Protocal
 civic_machine_diplomatic_protocols: "外交プロトコル"
 civic_machine_diplomatic_protocols_desc: "当初は異文化通訳用に設計されたこの機械知性は、 翻訳やプロトコルのサポートに優れている。 新しい戦略を提案し、 瞬時に確率を計算することができる。"
