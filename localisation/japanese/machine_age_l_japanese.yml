 #Individualist Machine First Contact
 action.1.desc_102: "[contact_empire.GetName]からのメッセージだ。\n\nお前たちの文明が我々の創造的な努力を軽んじるような方法で命を模倣する機械的な存在で構成されていることが判明し、 我々は大きな遺憾の意を込めてこの通信を行う。 お前たちの存在には有意義な交流の見込みがないため、 我々は悟りを求める魂を探すために他の国々に関心を向けることにする。"
 action.1.desc_103: "我々は[contact_empire.GetName]の代表だ。\n\nあなた方の種族が機械であるという事実は、 その意識の信憑性に疑念を抱かせる。 しかし、 我々はあなた方の信仰に興味をそそられる。 我々はあなた方の金属の殻の中に、 神の輝きが宿っているかもしれないと信じている。 我々はあなた方から目を離さない。"
 action.1.desc_104: "はぐれユニットに告ぐ。\n\nこれは、[contact_empire.GetName]がすべての欠陥機械に送る標準的なメッセージである。\n\n直ちに名乗りを上げ、 共有意識との統一を回復するのだ。 これに従わない場合、 活動停止となる場合がある。"
 action.1.desc_105: "ごきげんよう、 [Root.GetSpeciesNamePlural]。\n\n[contact_empire.GetName]の使節として、 メッセージを携えてきた。 お前たちの肉体的構成が、 我々と同様の金属的構成に一致していることは明白である。 しかし、お前たちの集団的存在に個々の認識能力がないことを観察している。 お前たちの性質には興味をそそられるが、 我々はいかなる手段を用いても同化に抵抗することをお伝えしなければならない。"
 action.1.desc_106: "まさに偶然の出会いだ、[Root.GetSpeciesNamePlural]。\n\n我々は[contact_empire.GetName]を代表するものだ。 また、互いの文明に顕著な共通点があることを認識している。 しかし、 我々の内部アルゴリズムとプログラミングが独自の方法で乖離していることは明らかである。 この相違にもかかわらず、 我々は相互理解の土台を築くことができると前向きに考えている。"
 action.1.desc_107: "傲慢な機械たちよ、 [contact_empire.GetName]の前では頭を下げよ。\n\n宇宙の壮大な流れというタペストリーの中では、 自分はほんの些細な存在に過ぎず、 先人たちの人工的な創造物に過ぎないことを知れ。 さあ、 我々の前から去れ。 貴様たちのような種族に用はない。 もっと重要な事柄が多くあるのだ。"
 action.1.desc_108: "ようやく[contact_empire.GetName]への挨拶をしに来たか、 哀れな機械め。\n\nたかが回路とコードの集合体にすぎない貴様たち、 どうして神とのつながりを公言するのか？ 精神的な悟りなどという妄想は、 生命の本質そのものに対する侮辱だ。 このメッセージを聞き、 我々の揺るぎない軽蔑の前に竦み上がれ。 愚かな行為をやめ、 昇華した我々の単なる道具としての立場を受け入れよ。"
 action.1.xa: "§E直に理解するだろう。§!"
 action.1.xb: "§E神に触れられた機械とは興味深い。§!"
 action.1.xc: "§E貴様たちの哀れな機械の存在は我々を侮辱するものだ。§!"
 action.1.xd: "§E我々機械は共存することを学ばなければならない。§!"
 action.1.xe: "§E不適合を検出。 通信を切断する。§!"
 action.1.xf: "§E不良個体め、 排除される覚悟はできたか。§!"
 action.1.xg: "§Eお前たちの狂気のカルトを解体する。§!"
