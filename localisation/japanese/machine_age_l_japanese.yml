 civic_hive_natural_design: "生来のデザイン"
 civic_hive_natural_design_desc: "§R警告：すべてのアセンションパスが使用不可になる§!\n§R警告：有機生命体の種族は変更できない§!\n\nこの集合意識は、 自分たちの自然な遺伝子構造の完璧さを認めている。 その原始的で変更されていない遺伝子コードを保存し保護するために、 医療と管理機構を捧げている。"
 civic_hive_tooltip_natural_design_effects: "- $AVAILABLE_BUILDINGS$ ['concept_hive_transcendental_retreat']"
