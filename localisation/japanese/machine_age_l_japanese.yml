 d_consumer_goods_obsessional_directive: "商品の尖塔"
 d_consumer_goods_obsessional_directive_desc: "このそびえ立つ商品の尖塔は、 将来の使用のために惑星上に備蓄されている。"
 obsessional_directive_score: "$consumer_goods$がスパゲティ化された：$VALUE$"
