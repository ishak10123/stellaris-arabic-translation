 ### Synaptic Lathe UI
 SYNAPTIC_LATHE_STABILITY_DESC: "§E$r_stability$は、 シナプス旋盤のの総合的なネットワークの安定度を表す。 この値は主に、 神経チップの総体的な£happiness£ §Y幸福度§!によって決まる。\n\n安定度は£housing£ §R人口過密§!や£amenities£ §R快適度の不足§!によって低下する。 $PLANET_STABILITY_TITLE$が高いと資源産出が増加し、 $PLANET_STABILITY_TITLE$が低いと減少する。 シナプス旋盤は他の植民地と違い、 大規模な§Y反乱§!が起きることはない。§!"
 SYNAPTIC_LATHE_RESISTANCE_DESC: "§E§Y抵抗§!は、 悪質な神経チップによって引き起こされる妨害の総体的な度合いを表す。 £crime£ §Y抵抗§!が高いと§YPOPの減少§!率が上がり、 逃亡の可能性が上がる。 惑星上のPOPが多いと自然に上昇する。 £happiness£ §YPOP幸福度§Yを高めたり、 £building£§!神経スタビライザー§!を建設したりすると低下する。§!"
 SYNAPTIC_LATHE_HOUSING_DESC: "§E§Y$PLANET_HOUSING_TITLE$§!は神経チップの住居となるインフラを表す。 神経チップを適切に収容し、 維持するためのスペースが不足すると、 $r_stability$が低下する。 £district£ §Y区域§!を建設したり、 旋盤の§Y処理ユニット§!をアップグレードしたり、 £building£ §Yシナプスサステイナー§!を建設したりすることによって、 §Y住居§!を増やすことができる。§!"
 SYNAPTIC_LATHE_AMENITIES_DESC: "§E§Y$PLANET_AMENITIES_TITLE$§!は神経チップが必要とするライフサポートに特化したインフラを表す。 人口に必要な$PLANET_AMENITIES_TITLE$を産出しない惑星は、 £happiness£§Y幸福度§!にペナルティを受ける。 旋盤の§Y処理ユニット§!をアップグレードしたり、 £building£§Yシナプスサステイナー§!を建設したりすることによって、§Y快適度§!を向上することができる。§!"
