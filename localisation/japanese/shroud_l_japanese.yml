 shroud.4970.title: "終焉のとき"
 shroud.4970.desc.1: "次元間のザ・ヴェールが一時的に消え、シュラウドの超能力すべてが現実世界に放出された。"
 shroud.4970.desc.2: "生物であれ機械であれ、 意識ある存在はすべて根絶された。 すべての惑星は不毛の殻と化し、 星々も最後の光を失った。\n\nそれでもなお、 我々は最後の瞬間に、 心の中の声のみ認識することができた……\n\n§R「終焉の終わり」と。§!"
 shroud.4970.desc: "$end_of_the_cycle_color_article_cap$が我々に迫っている。\n\n$end_aura$が銀河を飲み込み、 最後の星系がその力に屈したとき、 計り知れないエネルギーの波が噴出した。 $shroud.4970.desc.1$\n\n$shroud.4970.desc.2$"
 shroud.4970.a: "完璧だ。"
 shroud.4970.a.tooltip.destroyed: "§Y銀河は破壊された。§!"
 shroud.4970.a.tooltip: "この円環に終止符を打った。\n\n$shroud.4970.a.tooltip.destroyed$"
 shroud.4971.title: "$shroud.4970.title$"
 shroud.4971.desc.1: "これで終わりだ。"
 shroud.4971.desc.2.1: "この破壊的な§H$PSIONIC_AURA$§!は、 "
 shroud.4971.desc.2.2: "銀河全体に広がった。 最後の星系がオーラの堕落に屈すると、 計り知れないエネルギーの奔流が噴出した。"
 shroud.4971.desc.2.3: "それはまるで異次元の現実からやってきたかのように、 この破滅的な力はすべてを破壊した。"
 shroud.4971.desc.2.contact_psionic: "$shroud.4971.desc.2.1$§H[from.GetName]§! から放出され、 $shroud.4971.desc.2.2$ $shroud.4970.desc.1$\n\n$shroud.4970.desc.2$"
 shroud.4971.desc.2.contact_no_psionic: "$shroud.4971.desc.2.1$§H[from.GetName]§! から放出され、 $shroud.4971.desc.2.2$ $shroud.4971.desc.2.3$\n\n$shroud.4970.desc.2$"
