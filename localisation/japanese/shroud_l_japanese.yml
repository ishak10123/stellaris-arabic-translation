 # Eater of Worlds accords
 ACCORD_FRENZY: "狂乱"
 ACCORD_FRENZY_desc: "$the_eater_of_worlds_article_cap$が、 兵たちの間に狂気のごとき激しい怒りを呼び起こす。"
 ACCORD_HUNGER: "飢え"
 ACCORD_HUNGER_desc: "$the_eater_of_worlds_article_cap$は争いに飢えている。"
 ACCORD_DOOM: "破滅"
 ACCORD_DOOM_desc: "敵に対し、 $the_eater_of_worlds_article$の破壊的な意志をぶつける。"
 ACCORD_DOOM_TT: "§Y$Name_Doom_Eater_Fleet$§!艦隊を出現させる。\n\nこの艦隊の強さは§Y破滅の強度§!に比例する。\n現在の破滅の強度：§Y[GetEaterOfWorldsDoomIntensity]/50§!\n\n利用可能な艦種：[GetEaterOfWorldsShipClasses]\n\n§R既存の§Y$Name_Doom_Eater_Fleet$§!艦隊はいずれも解散される。§!"
 ACCORD_DIGEST: "消化"
 ACCORD_DIGEST_desc: "$the_eater_of_worlds_article$の際限なき食欲を満たさねばならない。"
 ACCORD_DIGEST_TT: "我々の§H$PSIONIC_AURA$§!内にある交戦国の惑星の§Y$DEVASTATION$§!：§G+$@accord_digest_devastation|0$§!\n我々の§H$PSIONIC_AURA$§!内にいる交戦国の艦船の§Y$HULL$§!と§Y$ARMOR$§!：§G$@accord_digest_ship_malus|0%$§!\n$ACCORD_LOOSE_INTENSITY$"
 # Cradle of Souls accords
 ACCORD_CHARITY: "信頼"
 ACCORD_CHARITY_desc: "$the_cradle_of_souls_article$の伝染性の慈悲は、 他者を我々の信頼に引き寄せる。"
 ACCORD_TRUST: "先見の明"
 ACCORD_TRUST_desc: "$the_cradle_of_souls_article_cap$は多くの口で語り、 我々は今その声を共有する。"
 ACCORD_THOUGHTBOND: "思考の絆"
 ACCORD_THOUGHTBOND_desc: "$the_cradle_of_souls_article_cap$はかつてない思考の調和をもたらす。"
 ACCORD_THOUGHTBOND_TT: "$mod_pop_factions_produces_mult$：§G§H$@accord_duration|0$§!年間 +$@accord_thoughtbond_faction_output|0%$§!"
 ACCORD_THOUGHTBOND_TT_gestalt: "$mod_planet_jobs_unity_produces_mult$：§G§H$@accord_duration|0$§!年間 +$@accord_thoughtbond_unity_from_jobs|0%$§!"
 ACCORD_FAVOR: "好意"
 ACCORD_FAVOR_desc: "$the_cradle_of_souls_article_cap$は価値の重みをもって外交を測る。"
 ACCORD_FAVOR_TT: "我々の§H$PSIONIC_AURA$§!内にある他国の好意をすべて消費し、 それぞれに対して統合力と影響力を獲得する。\n$ACCORD_LOOSE_INTENSITY$"
 # Composer of Strands accords
 ACCORD_LIFE: "成長"
 ACCORD_LIFE_desc: "$the_composer_of_strands_article_cap$が実を結んでもなお、 我々は種を蒔き続ける。"
 ACCORD_FERTILITY: "活力"
 ACCORD_FERTILITY_desc: "$the_composer_of_strands_article_cap$が我々に豊かな影響力を授ける。"
 ACCORD_TRANSFORMATION: "変容"
 ACCORD_TRANSFORMATION_desc: "$the_composer_of_strands_article_cap$は、 その意志のままに世界を彫刻する。"
 ACCORD_TRANSFORMATION_TT: "国境内にあるランダムな居住不可能な惑星が、 サイズ§G$@accord_transformation_gaia_world_size|0$§!の§H$pc_gaia$§!に変換される。"
 ACCORD_GENERATION: "拡張"
 ACCORD_GENERATION_desc: "$the_composer_of_strands_article$の意志が我々の前で花開く。"
 ACCORD_GENERATION_TT: "$@accord_generation_pop_gain|0$ £pop£ 我々の§H$PSIONIC_AURA$§!内の全植民地に、 我らの主要種族の§YPOP§!を追加する。\n$ACCORD_LOOSE_INTENSITY$"
 # Instrument of Desire accords
 ACCORD_PROGRESS: "進歩"
 ACCORD_PROGRESS_desc: "$the_instrument_of_desire_article_cap$は進歩を享受する。"
 ACCORD_BLISS: "至福"
 ACCORD_BLISS_desc: "$the_instrument_of_desire_article_cap$は我々を飽きるほどの至福で満たす。"
 ACCORD_ASCENSION: "アセンション"
 ACCORD_ASCENSION_desc: "$the_instrument_of_desire_article$の繁栄は、 この世の制約に縛られることはない。"
 ACCORD_ASCENSION_TT: "次の§Y惑星アセンション§!の費用を削除する。"
 ACCORD_ASCENSION_FAIL_TT: "$TRIGGER_FAIL$§R前回の起動以降、 惑星アセンションは実行されていない§!"
 ACCORD_EXPLOITATION: "搾取"
 ACCORD_EXPLOITATION_desc: "$the_instrument_of_desire_article_cap$はニーズを満たす以上のものを求め、 過剰な産出量を渇望する。"
 ACCORD_EXPLOITATION_TT: "領有しているすべての植民地における$pop_group_unit$$job_entertainer_name_plural_with_icon$ごとの職業から§H$@accord_duration|0$§!年で得られる資源：§G+$@accord_exploitation_resources_from_jobs|0%$§!\n$ACCORD_LOOSE_INTENSITY$"
 ACCORD_EXPLOITATION_TT_gestalt: "§H$@accord_duration|0$§!年間の$mod_planet_jobs_complex_drone_produces_mult$ for：§G+$@accord_exploitation_complex_drones_resources|0%$§!\n$ACCORD_LOOSE_INTENSITY$"
 # Whisperers in the Void accords
 ACCORD_KNOWLEDGE: "知識"
 ACCORD_KNOWLEDGE_desc: "$whisperers_in_the_void_article_cap$は、 そのひそやかな秘密を我々と共有する。"
 ACCORD_WISDOM: "知恵"
 ACCORD_WISDOM_desc: "$whisperers_in_the_void_article_cap$は、 シュラウド内のすべての領域に関する知識を持つ。"
 ACCORD_FORESIGHT: "洞察力"
 ACCORD_FORESIGHT_desc: "$whisperers_in_the_void_article_cap$は、 普遍的な知識と共鳴する。"
 ACCORD_FORESIGHT_TT: "現在研究中の技術の進捗度が§G$@foresight_tech_progression|0%$§!進む"
 ACCORD_HINDSIGHT: "後知恵"
 ACCORD_HINDSIGHT_desc: "$whisperers_in_the_void_article_cap$は、 我々の知らない時間や空間に存在した世界の古い書物を所有する。 我々はただ、 そのページをめくるだけでいい。"
 ACCORD_HINDSIGHT_TT: "§H$PSIONIC_AURA$§!内の所有している植民地を選択すると、 それはすべての障害物が除去された§H遺物惑星§!になる。\n$ACCORD_LOOSE_INTENSITY$"
