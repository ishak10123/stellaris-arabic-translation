 COVENANT_INSTRUMENT: "§H道具との契約§!"
 covenant_instrument_desc: "我々の$the_instrument_of_desire_article$との契約は、 我々の心を耽溺的なビジョンで満たし、 精神的な楽園のさらなる深部へと我らをいざなう。"
 COVENANT_COMPOSER: "§H作曲家との契約§!"
 covenant_composer_desc: "我々の$the_composer_of_strands_article$との契約は我らの内で成長し、 銀河を変革するために我らの根を広げる。"
 COVENANT_WITV: "§H囁き手との契約§!"
 covenant_whisperers_desc: "我々の$whisperers_in_the_void_article$との契約は、 彼らがシュラウドの最も中心的な領域から得た、 数々の秘密からなる知恵を我々に植え付ける。"
 COVENANT_EOTC: "§H$NAME_The_End$との契約§!"
