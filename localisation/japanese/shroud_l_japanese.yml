 concept_chosen_civics: "選ばれし民"
 concept_chosen_civics_desc: "国是「$concept_chosen_civics$」には以下が含まれる：\n- ['civic:civic_chosen']$NEW_LINE$- ['civic:civic_hive_chosen']$NEW_LINE$- ['civic:civic_machine_chosen']$NEW_LINE$- ['civic:civic_corporate_chosen']"
 shroud.5105.title: "選ばれし民"
 shroud.5105.desc: "それはずっと我々とともにあった……定義することも、 理解することもできない存在との霊的なつながり。\n\n[This.GetTheChosenP2]\n\nそれは有史以来、 そこに存在していた。 我々が“それ”に選ばれたことは明白だが、 その理由は今なお謎のままだ……\n\n我らはこの[This.GetSensation]に、 いかなる名を与えるべきだろうか。"
 shroud.5105.desc_p2: "我々は最も深い思考の中に、 “それ”を感じている。 ずっとそこにいるのに、 決して触れることのできない存在。 それは我々の心における絶対性と不可能性の象徴なのだ。"
 shroud.5105.desc_p2_machine: "我々は最も複雑な計算の中に、その存在を検知している。 ずっとそこにいるのに、 決して触れることのできない存在。 それは我々の電子回路における絶対性と不可能性の象徴だ。"
 shroud.5105.a: "$the_composer_of_strands_article_cap$"
 shroud.5105.b: "$the_eater_of_worlds_article_cap$"
 shroud.5105.c: "$the_cradle_of_souls_article_cap$"
 shroud.5105.d: "$the_instrument_of_desire_article_cap$"
 shroud.5110.title: "[GetChosenPatron]のいざない"
 shroud.5110.desc_common: "言葉では説明しきれない存在だが、 §H[GetChosenPatron]§!は有史以来我々とともにあり続けた。 そして今、 果てしなく広がる銀河を前にして、 我々の[GetMindPhysicalLoc]はこれまで以上にその存在を強く[GetFeelLoc]する。\n\n決して消えることのない「それ」に、 どんどん引き寄せられていくなか、 我々は初めて[GetMindLogicLoc]の中に存在するこの深淵にして神秘的な虚空の真の輪郭を知るところとなった。 [GetChosenPatron]は手招きをしながら"
 shroud.5110.desc_common_2: "我々はようやく、 自らの自由意志でこのエーテル領域を訪れる術を会得したのだ。"
 shroud.5110.desc_organic: "$shroud.5110.desc_common$、 我々の理解の及ばない体験へと我らをいざなう。\n\n$shroud.5110.desc_common_2$"
 shroud.5110.desc_robot: "$shroud.5110.desc_common$、 我々のパラメータを合理化していく。 それは一部、 未知の原理に基づくものだ。\n\n$shroud.5110.desc_common_2$"
 shroud.5110.a: "我々の視野は内側へと広がっている。"
 shroud.5110.a.tt: "このシュラウド体との§Y同調§!を高めると：$@chosen_patron_attunement_gift|0G$\n§Yシュラウド§!パネルが§Y交信§!メニューからアクセス可能。"
 shroud.5115.title: "[GetChosenPatron]"
 shroud.5115.desc.intro: "シュラウド——それは我々の知る現実の深淵を、 闇の影のように流れている。\n\n我々はこのサイオニック領域を長らく探索してきたが、 これまでの試みはあくまでも試験的なものにすぎなかった。 だが、 思念をひとつにしてこの次元を隔てるヴェールを長年削り続けた結果、 今やそれを明確に感知し、 目的を持って探索できるようになった。\n\nしかし、 我々のこの活動はあちら側にも気づかれることになった。 §H[GetChosenPatron]§!が我々を待っている。"
 shroud.5115.desc.outro: "無数の存在が入り乱れるなか、 明確に感知できるというのは期待がもてる。"
 shroud.5115.desc.composer: "$shroud.5115.desc.intro$\n\n§H広がれ。 包み込め。 拡張せよ。§!\n\n$shroud.5115.desc.outro$"
 shroud.5115.desc.eater: "$shroud.5115.desc.intro$\n\n§H真の飢えを感じろ。§!\n\n$shroud.5115.desc.outro$"
 shroud.5115.desc.cradle: "$shroud.5115.desc.intro$\n\n§H集まり、 抱きしめよ。§!\n\n$shroud.5115.desc.outro$"
 shroud.5115.desc.instrument: "$shroud.5115.desc.intro$\n\n§H欲望に浸れ。§!\n\n$shroud.5115.desc.outro$"
 shroud.5115.a: "我々は戻ってくる。"
