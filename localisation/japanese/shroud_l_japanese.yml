 war_goal_wg_proxy_war: "代理戦争"
 war_goal_wg_proxy_war_desc: "戦争は敵対心を煽る噂や陰口から始まる。 攻撃者が勝利すると、 請求権を主張していた星系の支配権を獲得することになり、 征服した星系ごとに発生する§Y脅威§!が§Y33%§!軽減される。"
 shroud.5055.title: "$proxy_war_busted_modifier$"
 shroud.5055.desc.common: "我々は欺かれていた。\n\n我々の諜報機関が§H[from.GetName]§!から発信された秘密通信を傍受した結果、 彼らが我々を代理戦争に巻き込もうと企んでいたことが判明した。\n\n彼らは関与を激しく否定しているが、 もはや両国の関係に与えた傷は癒やしがたい。"
 shroud.5055.desc.galactic: "$shroud.5055.desc.common$ この裏切りの報せは銀河中に急速に広まり、 [from.GetName]の評判を著しく損なっている。"
 shroud.5060.title: "$proxy_war_busted_modifier$"
 shroud.5060.desc.common: "我々はなんとか紛争を扇動することには成功したものの、 作戦は完全には計画通りに進まなかった。 エージェントの一人の通信が傍受され、 我々の秘密工作が関係各国に露見してしまったのだ。\n\n事態の釈明を試みたものの、 うまく取り繕うことはできなかった。"
 shroud.5060.desc.galactic: "$shroud.5060.desc.common$ 今回の出来事は交戦当事国との関係を損なっただけでなく、 銀河規模で我々の評判を傷つける醜聞となった。"
 shroud.5060.desc.default: "$shroud.5060.desc.common$ 今回の出来事は、 交戦当事国との関係を著しく損なう結果となった。"
 shroud.5060.a.tt: "§Y代理戦争§!に関与していた帝国の我々に対する態度が変化：§R-200§!"
 proxy_war_busted_modifier: "露見した代理戦争扇動工作"
 proxy_war_busted_modifier_desc: "代理戦争を引き起こした我々の企みが交戦当事国に発覚した。 その結果、 我々の評判は広範囲にわたって傷ついた。"
 opinion_proxy_war_busted: "$proxy_war_busted_modifier$"
 PROXY_WAR_BUSTED_MESSAGE_TYPE_TITLE: "$proxy_war_busted_modifier$"
 PROXY_WAR_BUSTED_MESSAGE_TYPE_DESC: "我々が代理戦争を引き起こしたことが交戦当事国に発覚した。\n$shroud.5060.a.tt$"
 PROXY_WAR_REVEALED_MESSAGE_TYPE_TITLE: "$proxy_war_busted_modifier$"
 PROXY_WAR_REVEALED_MESSAGE_TYPE_DESC: "§H$INSTIGATOR$§!が我々を代理戦争に巻き込もうと画策していたことが判明した。\n§H$INSTIGATOR$§!に対する我々の態度が変化：§R-200§!"
