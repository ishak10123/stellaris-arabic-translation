 covenant_eater_desc: "我々の$the_eater_of_worlds_article$との契約は、飽くなき征服と破壊への欲望で我々を満たす。"
 COVENANT_CRADLE: "§Hゆりかごとの契約§!"
 covenant_cradle_desc: "我々の$the_cradle_of_souls_article$との契約は銀河中に広がり、 他者が我々を温かく遇するよう影響を及ぼしている。"
