 job_superstitious_beliefs_priest_corporate_effect_desc: "$job_superstitious_beliefs_priest_corporate_icon$ $job_superstitious_beliefs_priest_corporate_plural$は$i_consumer_goods$を$i_unity$、 $i_trade_value$および$i_stability$に変換する"
