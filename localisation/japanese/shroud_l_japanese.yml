 PSIONIC_BIO_LIGHTNING: "サイオニック・バイオライトニング"
 PSIONIC_BIO_LIGHTNING_DESC: "電荷とエーテルエネルギーを融合させる恐るべき生体電気腺。 サイオニック特性を帯びた燃焼プラズマの攻撃稲妻を発生させる。"
 PSIONIC_BIO_LIGHTNING_SMALL: "$PSIONIC_BIO_LIGHTNING$"
