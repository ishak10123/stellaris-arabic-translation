 endbringers_madness_1: "狂気"
 endbringers_madness_1_desc: "我々の帝国は、 §R声§!を追い求めるという、 ただ1つの目的に焦点を合わせて突き動かされている。 解決策が見つかるまで、 我々の心が休まることはない。"
 endbringers_madness_1_tt: "$chamber_of_silence_negative_effects_reduction$"
 endbringers_madness_2: "$endbringers_madness_1$"
 endbringers_madness_2_desc: "我々の帝国は、 これまで以上に§R声§!に近づいている。 かの存在の強烈な気配に晒されると、 我々の衝動は収まる。"
 endbringers_madness_2_tt: "$endbringers_madness_1_tt$"
 endbringers_madness_3: "$endbringers_madness_1$"
 endbringers_madness_3_desc: "我々の帝国は、 もうすぐ§R声§!が聞こえるところまできている。 直に答えが得られるだろう。"
 endbringers_madness_3_tt: "$endbringers_madness_1_tt$"
