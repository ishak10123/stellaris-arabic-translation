 shroud.4025.title: "$the_composer_of_strands_article_cap$の前で"
 shroud.4025.desc.default: "§H[Root.Patron:the_composer_of_strands.GetPreCommunicationName]§!が残した気配をたどり、 我々は§Hシュラウド§!のさらに奥深くへと引き寄せられていった。 こちらに浮かぶ映像……あちらに流れる旋律——「それ」はさまざまなしるしを残して、 我々を誘っていた。 だが、 前進は遅々としていた。\n\nやがて、 ついに「それ」と接触するに至った。 そこで我々を迎えたのは、 激しく活動する星系や、 異様に歪んだ[Root.GetSpeciesAdj]の姿など、 壮観な幻影の数々だった。 「それ」の懐に身を委ねた我々は、 常識を覆すような意匠の絡まりの中に迷い込んだ。\n\n我々はその糸を手繰り寄せ、 端と端を結び合わせていった。 無秩序に散らばっていたしるしは、 やがてひとつの模様を描き出した。 我々はエネルギーを使い果たした状態で、 そのあまりにも壮麗な構成と造形に見入っていた。 やがて、 その存在は、 静寂の中へと退いていった。\n\nいまや我々には、 その存在の意図がより明瞭に伝わっている。 抑制なき成長に満ちた「それ」のビジョンを、 我々は目の当たりにしたのだ。 [GetTelepathPlural]が回復すれば、 この存在——$the_composer_of_strands_color_article$との交信が可能になるだろう。"
 shroud.4025.desc.hive: "$shroud.4025.desc.default$"
 shroud.4025.desc.gestalt_machine: "§H[Root.Patron:the_composer_of_strands.GetPreCommunicationName]§!が残した分子レベルの痕跡をたどり、 我々は§Hシュラウド§!のさらに奥深くへと引き寄せられていった。 こちらに浮かぶ映像……あちらに流れる旋律——「それ」はさまざまなしるしを残して、 我々を誘っていた。 だが、 前進は遅々としていた。\n\nやがて、 ついに「それ」と接触するに至った。 そこで我々を迎えたのは、 激しく活動する星系や、 異様に歪んだ[Root.GetSpeciesAdj]の姿など、 壮観な幻影の数々だった。 「それ」の懐に身を委ねた我々は、 矛盾と不整合に満ちた意匠の絡まりの中に迷い込んだ。\n\n我々はその糸を手繰り寄せ、 端と端を結び合わせていった。 無秩序に散らばっていたしるしは、 やがてひとつの模様を描き出した。 我々はエネルギーを使い果たした状態で、 その驚異的なデータセットを処理していた。 やがて、 その存在は、 静寂の中へと退いていった。\n\nいまや我々には、 その存在の意図がより明瞭に伝わっている。 抑制なき成長に満ちた「それ」のビジョンを、 我々は目の当たりにしたのだ。 [GetTelepathPlural]が再充電されれば、 この存在——$the_composer_of_strands_color_article$との交信が可能になるだろう。"
 shroud.4025.desc.individual_machine: "$shroud.4025.desc.gestalt_machine$"
 shroud.4025.a.default: "なんという壮麗な力だ。"
 shroud.4025.a.robot: "計測不能な存在と判断。"
 shroud.4025.b.default: "$shroud.first_contact.end.b$"
 shroud.4025.b.robot: "$shroud.first_contact.end.b$"
 shroud.4025.c.default: "なんという醜悪な景色だ！"
 shroud.4025.c.robot: "破局的結末を迎えると予測。"
 shroud.first_contact.end.a.tt.the_composer_of_strands: "$the_composer_of_strands_color_article$との§Y同調§!を獲得する。\n$shroud.first_contact.end.b.tt.the_composer_of_strands$"
 shroud.first_contact.end.b.tt.the_composer_of_strands: "§Yシュラウド§!に$the_composer_of_strands_color_article$が顕現する。"
