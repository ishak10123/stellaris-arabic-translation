 robot_shroud_eater_covenant_chain_desc: "$shroud_eater_covenant_chain_desc.intro$\n\n喰らうものは切実に飢えている。 戦争、 炎と破滅の甘美な味を渇望している。"
 # Instrument of Desire
 shroud.4550.title: "$utopia.3304.name$"
 shroud.4550.desc.default: "我々がシュラウドに飛び込むや否や、 ある存在が我々に手を伸ばす。 その思考は我々の[GetTelepathPlural]の心に絡みつき、 甘美な言葉で誘惑して丸め込む。 それは$the_instrument_of_desire_color_article$であり、 富や権力、 名声といった我々が今まで望んでいたものすべてを与えてくれる。 そしてこれから望むすべてを。\n\n代償？  些細なものだ。 さながら入場料のようなもの。 それは我々の最善だけを望んでいる。 我々を助け、 導き、 我々の野望と夢を指揮する。\n\n§H我々が心から受け入れることができれば。§!\n\nそれは我々が応じることを確信している。 我々が承諾しないわけがない。"
 shroud.4550.desc.hive: "$shroud.4550.desc.default$"
 shroud.4550.desc.gestalt_machine: "我々がシュラウドに飛び込むや否や、 ある存在が我々に手を伸ばす。 その思考は我々の[GetTelepathPlural]の回路に絡みつき、 甘美な言葉で誘惑して丸め込む。 それは$the_instrument_of_desire_color_article$であり、 富や権力、 名声といった我々が今まで望んでいたものすべてを与えてくれる。 そしてこれから望むすべてを。\n\n代償？  些細なものだ。 さながら入場料のようなもの。 それは我々の最善だけを望んでいる。 我々を助け、 導き、 我々の野望と夢を指揮する。\n\n§H我々がメインフレームに受け入れることができれば。§!\n\nそれは我々が応じることを確信している。 我々が承諾しないわけがない。"
 shroud.4550.desc.individual_machine: "$shroud.4550.desc.gestalt_machine$"
 shroud.4550.a: "$the_instrument_of_desire_color_article$と契約を結ぶ。"
 shroud.4555.desc.intro: "ここに$the_instrument_of_desire_color_article$との契約が成立した。 これから、 かの存在の意思が§H[Root.GetName]§!中を駆け巡るようになるだろう。"
 shroud.4555.desc.outro: "これが我々の絆の代償である。 我々の[GetTelepathPlural]によると、 最大の恩恵はまだこれからのようだ。"
 shroud.4555.desc.default: "$shroud.4555.desc.intro$\n\n契約の代償は明らかだ。 約束された富と繁栄の黄金時代を待ち望むなか、 民衆はもはや生存に必要最低限のものでは満足できなくなっていた。 [Root.GetSpeciesNamePlural]は今やあらゆる物質的欲求に駆られており、 我々の経済にとって新たな重荷となっている。\n\n$shroud.4555.desc.outro$"
 shroud.4555.desc.hive: "$shroud.4555.desc.intro$\n\n契約の代償は目に見えている。 比類なき生産力の黄金時代を待ち望むなか、 我々のドローンの基本的な必要物資が増加している。 [Root.GetSpeciesNamePlural]は今や必需品でないものまで必要とし、 我々の経済にとって新たな重荷となっている。\n\n$shroud.4555.desc.outro$"
 shroud.4555.desc.gestalt_machine: "$shroud.4555.desc.hive$"
 shroud.4555.desc.individual_machine: "$shroud.4555.desc.default$"
 shroud.4555.a.default: "彼らが正しいことを願おう。"
 shroud.4555.a.gestalt: "彼らが正しいと信用している。"
 shroud.4560.desc: "$the_instrument_of_desire_color_article_cap$$shroud.4510.desc.intro$$shroud.4510.desc.outro$"
 shroud.4560.b: "$the_instrument_of_desire_color_article$を拒絶する。"
 shroud_instrument_covenant_chain_title: "$instrument_covenant_chain_title$"
 shroud_instrument_covenant_chain_desc.intro: "我々は§H欲望の道具§!という名のシュラウド体との絆を築いた。 甘美なそれは、 対価として我々に力の欠片を与える。 それは今後も続くだろう。\n\n我々の[GetTelepathPlural]は、 我々の行動を庇護者の意志と一致させることで、 絆を深めることができると理論づけている。"
 shroud_instrument_covenant_chain_desc: "$shroud_instrument_covenant_chain_desc.intro$\n\n道具は憧れを渇望している。 耽溺した快楽、 退廃、 そして奴隷制がその名を形作っている。"
 shroud_instrument_covenant_chain_begin: "$instrument_covenant_chain_begin$"
 shroud_instrument_covenant_chain_end: "$instrument_covenant_chain_end$"
 robot_shroud_instrument_covenant_chain_title: "$shroud_instrument_covenant_chain_title$"
 robot_shroud_instrument_covenant_chain_desc: "$shroud_instrument_covenant_chain_desc.intro$\n\n道具は憧れを渇望している。 抑制できない消費、 搾取、 そして奴隷制がその名を形作っている。"
 # Cradle of Souls
 shroud.4600.title: "$utopia.3304.name$"
 shroud.4600.desc.default: "[GetCradleCovenantProposedDesc]"
 shroud.4600.desc.hive: "$shroud.4600.desc.default$"
 shroud.4600.desc.gestalt_machine: "$shroud.4600.desc.default$"
 shroud.4600.desc.individual_machine: "$shroud.4600.desc.default$"
 shroud.4600.desc_homicidal: "シュラウドに沈むと、 我々の心の視野を焼く存在が現れた。 すべてを覆い隠すほどの光が広がる。 それは我々の中核で燃える、 $the_cradle_of_souls_color_article$なるものだった。\n\nかの者は銀河規模での歩み寄りを——本来共存し得ぬ者同士の底の浅い平和を要求しており、 この忌まわしい未来像を受け入れれば、 強大な力を授けることを保証している。\n\n§Hあとはこの存在に新たな未来の創造を任せるだけでいい。§!\n\nゆりかごの放つ無慈悲な光。 それが持つ力は否定のしようがない。 我々は本当にこんなものを受け入れられるのだろうか。 受け入れることで、 我々の決意が揺らぐことはないだろうか？"
 shroud.4600.desc_non_homicidal: "我々の精神がシュラウドに沈むと、 我々の内にある存在が花開く。 秩序と均衡を放ち、 あらゆるものに触れる輝きを感じる。 それは$the_cradle_of_souls_color_article$であり、 我らの核心を揺さぶる。\n\nそれが望むのは永続的な平和、 つまりは混沌から癒された銀河である。 我々がそのビジョンを共有すれば、 我々を調和をもたらす者へと鍛え上げることができる。 それは揺るぎない信頼の絆を約束する。\n\n§Hもしそれに我らの視野を形成させるのであれば。§!\n\nゆりかごの希望が、 我らの上に重くのしかかる。"
 shroud.4600.a: "$the_cradle_of_souls_color_article$と契約を結ぶ。"
 shroud.4605.intro: "ここに$the_cradle_of_souls_color_article$との契約が成立した。 これから、 かの存在の意思が§H[Root.GetName]§!中を駆け巡るようになるだろう。"
 shroud.4605.desc.default: "$shroud.4605.desc.non_gestalt$"
 shroud.4605.desc.gestalt: "$shroud.4605.intro$\n\n[GetCradleCovenantFormedDesc]"
 shroud.4605.desc.non_gestalt: "$shroud.4605.intro$\n\n[GetCradleCovenantFormedDesc]"
 shroud.4605.desc.hive: "$shroud.4605.desc.gestalt$"
 shroud.4605.desc.gestalt_machine: "$shroud.4605.desc.gestalt$"
 shroud.4605.desc.individual_machine: "$shroud.4605.desc.non_gestalt$"
 shroud.4605.desc_outro_homicidal: "もはや、 かの存在の[Root.GetSpeciesAdj]の精神への影響は否定のしようがない。 多くの[Root.GetIndividualPlural]の心が銀河の平和への願いで毒されており、 社会全体に深刻な不協和を引き起こしている。\n\n我々の[GetTelepathPlural]たち曰く、 この度の取引の恩恵はまだこれから授けられるものらしい。 それまで我々の心は、 極端な矛盾に苛まれることになるようだ。 我々は一体何をしでかしてしまったのだろうか。"
 shroud.4605.desc_outro_gestalt: "かの存在の[Root.GetSpeciesAdj]の精神への影響は、 すでに検知可能なレベルにある。 銀河中で平和な関係性の構築を目指すようになったため、 隣人とのいかなる不和も集合意識に乱れを生じさせる。\n\nこの小さな乱れこそが、 我らの絆の代償である。 [GetTelepathPlural]によれば、ゆりかごの最大の恩恵はまだ訪れていない。"
 shroud.4605.desc_outro_non_gestalt: "かの存在の[Root.GetSpeciesAdj]の精神への影響はすでに明らかだ。 銀河中で平和な関係を構築することを切望するようになったため、 隣人とのいかなる不和も民を苦悩させるものとなる。\n\nこの小さな乱れが、 我らが得た絆の代償である。 [GetTelepathPlural]によれば、ゆりかごの最大の恩恵はまだ訪れていない。"
 shroud.4605.a.default: "[GetCradleCovenantFormedOption]"
 shroud.4605.a.gestalt: "[GetCradleCovenantFormedOption]"
 shroud.4605.opt.a.default: "彼らが正しいことを願おう。"
 shroud.4605.opt.a.gestalt: "彼らが正しいと信じている。"
 shroud.4605.opt.a.homicidal: "今はただ、 耐えるしかない。"
