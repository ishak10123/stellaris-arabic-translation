 shroud.11225.title: "突然の消滅"
 shroud.11225.desc.common_1: "すべてが一瞬にして消えた。\n\n我らの星系内に存在していた、 邪悪なる§R$end_aura$§!が突如として消失し、 あらゆるものを道連れにしていったのである。 星という星が崩壊してブラックホールと化し、 惑星は消え、 その後には果てしない静寂のみが残った。"
 shroud.11225.desc.common_2: "どんな狂気が、 これほど凄まじい破壊の力を引き起こしたのか——それはもしかすると、 永遠に謎のままかもしれない。"
 shroud.11225.desc.default: "$shroud.11225.desc.common_1$\n\n$shroud.11225.desc.common_2$"
 shroud.11225.desc.mitigated: "$shroud.11225.desc.common_1$ かのオーラを退けようとした我々の試みによって、 多少の緩和効果があったのか、 わずかな一部分だけは今も存続している。\n\n$shroud.11225.desc.common_2$"
 shroud.11225.a: "一体どうして、 こんなことが起こり得たのだ。"
 SPECIAL_PROJECT_CALLING: "知識の試練"
 SPECIAL_PROJECT_CALLING_DESC: "$whisperers_in_the_void_color_article_cap$は、 常識的な思考の限界を超えた知識を渇望している。 我々の[Owner.GetResearchers]に秘儀的な研究分野に集中するための幅広い裁量を与えれば、 囁き手の熱烈な知識欲を満たすことができるだろう。"
 physics_technology_CALLING_PROJECT: "$SPECIAL_PROJECT_CALLING$"
 physics_technology_CALLING_PROJECT_DESC: "$SPECIAL_PROJECT_CALLING_DESC$"
 society_technology_CALLING_PROJECT: "$SPECIAL_PROJECT_CALLING$"
 society_technology_CALLING_PROJECT_DESC: "$SPECIAL_PROJECT_CALLING_DESC$"
 engineering_technology_CALLING_PROJECT: "$SPECIAL_PROJECT_CALLING$"
 engineering_technology_CALLING_PROJECT_DESC: "$SPECIAL_PROJECT_CALLING_DESC$"
 RECKONING_ARRIVAL_PROJECT: "レコニングとの対決"
 RECKONING_ARRIVAL_PROJECT_DESC: "銀河は、 §R$NAME_Reckoning$§!として知られる圧倒的な力を持つ存在によって脅かされている。 純粋なエネルギーで構成されたこの存在は、 突如として実体化し、 破壊活動を開始した。\n\n入手可能なすべてのデータが示している。 この存在は、 我々がこれまで対峙してきたものとはまったく異なる相手であると。 この脅威に立ち向かうつもりであれば、 即座に研究に着手し、 より効果的な交戦手段を見出す必要があるだろう。"
 shroud.11235.title: "$RECKONING_ARRIVAL_PROJECT$"
 shroud.11235.desc: "我々の[GetScientistPlural]が、 §R$NAME_Reckoning$§!として知られる強大な存在に関する綿密な調査を完了した。\n\nその成果に基づき、 我々は既存のテクノロジーでこの敵に対抗する有効な手段を突き止めた。 $NAME_Reckoning$を構成するエネルギーは、 エネルギーシールドを貫通するために設計された兵器を改良することで、弱体化させることができるかもしれない。\n\n依然として手強い存在ではあるが、 この脅威に立ち向かう術が見えてきたのだ。"
 shroud.11235.a: "$extreme_frontiers.1531.i$"
 RECKONING_VULNERABILITY_PROJECT: "弱点があるに違いない"
 RECKONING_VULNERABILITY_PROJECT_DESC: "§R$NAME_Reckoning$§!との対決に敗れはしたが、 今後の研究に役立つ貴重なデータは得られた。\n\nこの謎めいたエネルギー体を徹底的に研究すれば、 その弱点を特定し、 より効果的な攻撃手段を開発できるはずだ。"
 shroud.11240.title: "敗北から学ぶ"
 shroud.11240.desc: "§R$NAME_Reckoning$§!は、 我々の艦隊では到底太刀打ちできないほどの強大な存在だった。 敗北は喫したものの、 この謎めいたエネルギー体との交戦により、 直接の接触なしには得られなかったであろう貴重なデータを得ることができた。\n\n予備的な分析によれば、 我々はこの存在の構成をモデル化するのに十分なデータポイントを収集できている。 さらに研究を進めれば、 あの敵の脆弱な側面を特定し、 それに応じた攻撃手段へと改良することもできるだろう。"
 shroud.11240.a: "弱点があるに違いない。"
 shroud.11245.title: "$NAME_Reckoning$の弱点"
 shroud.11245.desc.1: "我々の[GetScientistPlural]が、 §R$NAME_Reckoning$§!として知られるエネルギー体に関する研究で重大な成果を上げた。"
 shroud.11245.desc.2.intro: "どうやらこの存在は、"
 shroud.11245.desc.2.outro: "サイオニックを抑制するレーザー兵器を照射すれば、 我々の艦隊はそのリンクを断ち切ることができる。 そうなれば、その物理的実体は無防備な状態になるだろう。"
 shroud.11245.desc.2.psionic: "$shroud.11245.desc.2.intro$ 単に§Hシュラウド§!から出現しているのではなく、超次元的なリンクを通じてサイオニック領域とつながることで、 防御力を維持しているらしいのだ。 $shroud.11245.desc.2.outro$"
 shroud.11245.desc.2.non_psionic: "$shroud.11245.desc.2.intro$ 単に別の実在次元から出現しているのではなく、 謎めいた超次元的なリンクを通じて防御力を維持しているらしいのだ。 $shroud.11245.desc.2.outro$"
 reckoning_insight_modifier: "レコニングに関する知見"
 reckoning_insight_modifier_desc: "徹底的な研究により、 既存の兵器を改良すれば、 $NAME_Reckoning$に効果的にダメージを与えられることが判明した。"
 reckoning_vulnerability_modifier: "レコニングの弱点"
 reckoning_vulnerability_modifier_desc: "過去のレコニングとの交戦で得られたデータから、 サイオニックを抑制するレーザー兵器を用いることで、 より大きなダメージを与えられることが判明した。"
