 minor_patron_eater_instrument_intro: "我々は、 $the_eater_of_worlds_article$と$the_instrument_of_desire_article$の領域の狭間にいるようだ。"
 minor_patron_default_intro: "我々は、 シュラウドの潜む大いなる存在たちの領域の狭間にいるようだ。"
 shroud.4050.desc: "[This.GetMinorPatronCradleComposerIntro]\n\n命なき構造物が無数に漂う空間の中で、 我々は§H$code_name_animator$§!の存在を感知した。 その意志は、 濃密なエネルギーを奇妙な新しい形へと成形していた。\n\nその行為を妨げてしまった我々に対し、 「それ」はシュラウドに立ち込める靄をかき分けながら近づいてくる。 そして、 我々に何かを差し出してきた。\n\nこれを掴めば、 何が起こるのだろうか？"
 shroud.4055.title: "$the_animator_of_clay_article_cap$の前で"
 shroud.4055.desc: "我々の精神がシュラウドの荒れ狂うエネルギーに浸されると、 [GetSpeciesBodyPlural]が突然、 激しく痙攣し始めた。 その瞬間、 我々は§H$code_name_animator$§!に捉えられたのだと理解した。 そして「それ」は我々に対し、 観察を促してきたのだ。\n\n不穏な予感を孕んだ闇が引いていき、 身振り手振りをするシルエットがそこに現れた。 その四肢は霧のような糸に引かれ、 あちらへ、 こちらへと激しく揺さぶられていたが——突如、 その糸が消え失せた。 シルエットは崩れ落ちた。\n\nやがてそれは再び身を震わせ、 命を取り戻したかのように手足を動かしながら起き上がった。 もはやそれを縛るものはなかった。 そして、 再び催眠的な舞踏を始めた。"
 shroud.4055.desc.know_animator: "そのとき我々は、 この存在と以前にも遭遇していたことに気づいた。 $the_animator_of_clay_color_article_cap$は楽しんでいたのだ。 生なきものが目覚めるとき、 そして虚しき物質に魂が吹き込まれる場所には、 おそらく「それ」も現れるのだろう。"
 shroud.4055.a: "操り糸を断ち、 傀儡は踊る。"
 shroud.4060.desc: "[This.GetMinorPatronCradleComposerIntro]\n\n孤独ではない——そう感じた。§H$code_name_outsider$§!が我々の精神に干渉し、 周囲にサイオニック・エネルギーの嵐を引き起こしている。\n\n深い悔恨と郷愁の念が、 我々の集合意識に押し込まれてくる。 そこに映るのは、 何千年も昔の、 見覚えのある星系の姿だった。\n\nこの存在が何であれ、 我々の銀河をよく知っているようだ。 「それ」はかつて、 そこに属していたのだろうか？"
 shroud.4065.title: "$the_outsider_article_cap$の前で"
 shroud.4065.desc.intro: "遥か彼方に認められていた力——§H$code_name_outsider$§!が§Hシュラウド§!の深淵から我々の精神を苦悶で引き裂いた。 「それ」は言葉によらずに、 しかしはっきりと我々に警告する。\n\n§Hこの領域に軽々しく踏み入るな。 お前たちは、 いかなる力をかき乱そうとしているのか知らぬのだ。 滅びはお前たちの一歩先にある……§!"
 shroud.4065.desc.outro_default: "その意味は定かではないが、 いま我々は$the_outsider_color_article$という存在を知った。 この存在と我々の運命が、 どのように結びついていくのかは、 まだわからない。"
 shroud.4065.desc.outro_know_zroni: "この存在は、 我々の銀河にとって未知のものではない。 以前に接触したズィロニ文明と同様に、 特有の精神的痕跡を有しているのだ。 こんなことがあり得るのだろうか？\n\nその意味は定かではないが、 いま我々は$the_outsider_color_article$という存在を知った。 この存在と我々の運命が、 どのように結びついていくのかは、 まだわからない。"
 shroud.4065.desc.outro_left_zroni: "この存在に、 我々は見覚えがある。§H天体の裂け目§!の向こう側で出会ったファーシーアだ。 これが、 彼らの辿った運命だというのか？  いまや彼らは$the_outsider_color_article$になってしまったと？"
 shroud.4065.a.default: "この存在は、 どのような恐怖を体験したのだ？"
 shroud.4065.a.know_zroni: "ズィロニは、 いまも生きているのか？"
 shroud.4065.a.left_zroni: "我々は、 同じ道を辿ってはならない。"
 shroud.4070.desc: "[This.GetMinorPatronComposerEaterIntro]\n\n移ろう思念の塊が、 我々の精神を包み込む。 ざらついた重圧が押し寄せ、 時間の知覚が歪められていく。 思考の粒ひとつひとつが、 この新たな領域の表面をこすり、 削り取っていくかのようだ。\n\nやがてその感覚が薄れ、 §H$code_name_tide$§!が消え去ったあとも、 濁流に飲まれたような感触だけは残っている。\n\n消えないその感触は、 我々をどこかに招こうとしているようだ。"
 shroud.4075.title: "$the_endless_tide_article_cap$の前で"
 shroud.4075.desc: "§Hシュラウド§!の奥底から、 §H$code_name_tide$§!が姿を現す。 「それ」は形を持たないながらも、 ひたすらに巨大であり、 我々の知覚の果てにまでその存在が広がっている。\n\n触感のある囁きが次々と我々の精神を通り抜け、 埋もれていた歴史を解き明かしていく。 忘れ去られた帝国が、 宿命的な時の歩みにより塵と化していく光景が見える。 我々に降り注ぐ粒子ひとつひとつが、 どれもひとつの記憶なのだ。\n\n果てなきこの記録の中に、 我々はある規則性を見出した。 それは野望と破滅、 勝利と衰退の循環だった。 その深淵には、 叡智が輝いている。\n\n$the_endless_tide_color_article_cap$は時を超えて広がり、 無知を削り落とし、 耐える意志あるものだけを残していく。"
 shroud.4075.a: "いま我々は、 この叡智を手にしたのだ。"
 shroud.4080.desc: "[This.GetMinorPatronComposerEaterIntro]\n\n動けば動くほど重力が増すかのように、 我々は威圧的な影の巨山へと、 次第に引きずり込まれていく。\n\nその影の巨山の頂から、 揺るぎない視線が我々の精神を見据えている。 目の前にそびえる§H$code_name_mountain$§!の規模は、 容易には推し量れない。\n\n比類なき高さの頂が、 我々を誘っている——登ってこい、 と。"
 shroud.4085.title: "$the_pale_mountain_article_cap$の前で"
 shroud.4085.desc: "§Hシュラウド§!の目もくらむような高みに登りつめた我々を迎えたのは、 実体のない頂だった。 §H$code_name_mountain$§!は我々を試したのだ。 これまで訪れたすべての者たちを試してきたように。\n\n忘れ去られた数々の帝国——それらの巨大な墳墓が、 色褪せた歴史の残響を大合唱している。 失敗と見誤った野望の数々が、 未来の礎として幾層にも積み重ねられている。\n\nだが、 これは静かに横たわる墓標ではない——それは坩堝なのだ。 破滅と再生の循環が、 過去の敗北を未来の勝利の礎として鍛え直していく。 破壊は終わりではなく、 新たな始まりである。\n\n我々の精神の中に、 $the_pale_mountain_color_article_cap$が高くそびえ立つ。"
 shroud.4085.a: "この巨山は、 さらに高みを増すだろう。"
 shroud.4090.desc: "[This.GetMinorPatronInstrumentCradleIntro]\n\n心地よい重みが思考の流れを鈍らせ、 恍惚とした霞へと誘う。 それまで気づかなかった緊張は溶け去り、 代わって忍び寄るような、 贅沢な静けさが満ちてくる。\n\n黄金に彩られた抱擁へとさらに沈み込んでいく中で、 我々は§H$code_name_dream$§!が近づいてくるのを感じた。 その圧倒的な存在感が我々を包み込み、 過剰なまでの満足を与えようと囁いてくる。\n\n怠惰に満ちた耽溺への誘いは、 実に妖しく魅力的だ。"
 shroud.4095.title: "$the_golden_dream_article_cap$の前で"
 shroud.4095.desc: "§Hシュラウド§!の中にある怠惰な静謐の淵に身を委ねた我々は、 やがて§H$code_name_dream$§!の黄金の広間へと惹き寄せられた。\n\n絹のように滑らかな誘惑が我々の精神を駆け巡り、 壮麗を極めた豪勢なタペストリーが我々の眼前で広がっていく。 放縦と怠慢がもたらす甘美な重みは、 我々の思考をまるごと無力化しかねない。\n\n$the_golden_dream_color_article_cap$は、 我々の理解を超えた贅沢を差し出してくる。"
 shroud.4095.a: "この夢が、現実のものとなる。"
 shroud.4100.desc: "[This.GetMinorPatronInstrumentCradleIntro]\n\nシュラウドの混沌とした流動が、 サイオニック・エネルギーの逆巻く渦動へと変貌する。 だが突然、 見えざる力によってその奔流はほどかれ、 合流し、 そして鎮められていく。 渦動は一筋の穏やかな流れと化し、 新たな形へと巻き取られていった。\n\n観察する我々は、 §H$code_name_point$§!の存在に気づいた。 「それ」はこの奇妙な現象を統率し、 混沌を秩序へと変えているのだ。\n\nその静けさが、 我々を誘っている。"
 shroud.4105.title: "$the_hollow_point_article_cap$の前で"
 shroud.4105.desc: "我々の[GetTelepathPlural]は、 シュラウドの荒れ狂う混沌へと強引に接触を試みたが、 成果は得られなかった。 だが、 その奮闘をやめた瞬間に、 §H$code_name_point$§!の正しき抱擁を感じた。\n\n我々の精神には、 果てしなく連続する闘争の螺旋が映し出された。 そのどれもが、 目まぐるしい混迷と憤怒に満ちていた。\n\nそのすべての中心に、 $the_hollow_point_color_article$の見守るような、 時間を超越した存在感があった。 「それ」は揺るがない静謐の底で、 この銀河の果てしない闘争が、 ついに終わる日を待ち続けている。"
 shroud.4105.desc.outro_homicidal: "闘争は我々の本能的な営みである。 そのような我々の精神が、 なんとも奇妙な思想に触れてしまったものだ。"
 shroud.4105.a.default: "忍耐が闘争に勝る日は、 いつか訪れる。"
 shroud.4105.a.homicidal: "儚い夢だ……我々が、 真の目的を見失うことはない。"
 shroud.4110.desc: "[This.GetMinorPatronEaterInstrumentIntro]\n\n混沌とした騒音が消え去り、 周囲が重苦しい闇に染まっていく。 我々の意図は、 観察され、 吟味され、 裁かれているようだ。\n\n一切の異論を認めない、 揺るぎない秩序への重々しい期待が、 我々の精神の奥底まで覗き込んでくる。 §H$code_name_throne$§!が、 我々の意図を審判にかけているのだ。\n\nその視線が過ぎ去ると、 闇もまた後退していった。 だが、 すべてを見通す視線の余韻が、 我々に秩序への服従を強いてくる。"
 shroud.4115.title: "$the_vacant_throne_article_cap$の前で"
 shroud.4115.desc: "我々は、 §H$code_name_throne$§!の前にひれ伏した。\n\n我々の精神は、 妥協なき権威の冷淡な眼差しに晒され、 その場に釘付けにされたまま、 審判を受けた。\n\n$the_vacant_throne_color_article$がもたらす荘厳な虚空には、 慈悲もなければ、 苦悶すらない。 「それ」が求めるのは、 ただ秩序と確実性のみ。 それを欠く場所があれば、 「それ」が強制的に与えるのだ。\n\nいまや我々は、 その重圧を背負っている。"
 shroud.4115.a: "審判は常に下される。"
 shroud.4120.desc: "[This.GetMinorPatronEaterInstrumentIntro]\n\n突如として加速するような感覚に包まれ、 理解を超えた情報の奔流が我々の知覚を圧倒する。 我々は無限に広がる地平線に向かって、 すさまじい速度で飛翔していた。\n\nある存在が、 いつしか我々と並んで飛んでいる——§H$code_name_river$§!だ。 「それ」は一瞬、 我々の側に留まったかと思うと、 突然さらに加速して、 我々の理解の及ばぬ彼方へと飛び去っていった。\n\nあの存在を、 我々は追わねばならない。"
 shroud.4125.title: "$the_black_river_article_cap$の前で"
 shroud.4125.desc: "我々の速度が極限を超え、 §Hシュラウド§!における安寧の地平を激しく突き抜けたとき、 ついに§H$code_name_river$§!に追いつくことができた。\n\n全方向に同時に移動しているような感覚が——論理を逸脱した速度が——あらゆる常識を打ち砕く。 ほんの一瞬で、 計り知れぬ距離を旅したかのような感覚が残る。\n\nようやく我々は、 終わりなき旅を続ける$the_black_river_color_article$の本質を理解した。 この銀河の広大さは、 我々の前に広がる道そのものなのだ。"
 shroud.4125.a: "速度の本質が見えた。"
 shroud.4135.title: "$end_of_the_cycle_article_cap$"
 shroud.4135.desc: "何の前触れもなく、 我々はシュラウドへと引き込まれた。 不吉で強大な存在が、 我々の精神に襲いかかる。\n\n$end_of_the_cycle_color_article$——それは、 我々をずっと待ち続けていたのだ。 突如、 トランス状態にある[GetTelepathPlural]たち全員が、 完璧な唱和で何かに反駁しはじめた。 §R「お前の刻など、 訪れはしない！」§! だが、 しばらくの間をおいて、 次に唱和された言葉はこうだった。 §R「刻が……迫っている……」§!\n\nそれ以上の言葉はなかった。 だが、何らかの取引を持ちかけられたことは想像に難くない。 計り知れぬ力、 知識、 富——それらがすべて、 我々のものとなる。\n\n§R我々の手で、 「終わり」を始めるだけで。§!"
 shroud.4135.a: "$utopia.3308.a$"
 shroud.4135.a.tt: "すべての既知のパトロンの領域を$end_of_the_cycle_color_article$のものに置き換える。\n我々は、 §H$end_aura$§!の中で銀河を喰らうために、 少なくとも50年間の猶予を与えられる。 成功すれば、 このゲームは終了する。\n$covenant.cycle.tooltip$$shroud.8450.a.tech_tooltip$\n$shroud.4135.psionic_components_insight$\n\n他のすべてのパトロンとの協定が取り消される\n$eotc_opinion_modifier_tooltip$"
 shroud.4135.b: "シュラウドから脱出し、 忘れることにしよう。"
 shroud.4135.b.forging_our_own_path: "我々の進む道はすでに決まっている。 我々は自らの足で歩む。"
 shroud.4135.psionic_components_insight: "すべての['concept_psionic_components']の研究進捗：§G+10%§!"
 concept_psionic_components: "サイオニック兵装"
 concept_psionic_components_desc: "$tech_psionic_bombers$\n$tech_psionic_lightning$\n$tech_psionic_disruptor$\n$tech_zro_launcher$\n$tech_psionic_shield$\n$tech_precognition_interface$\n$tech_psi_jump_drives$"
 triggered_opinion_eotc_situation_stage1: "終焉の召喚"
 shroud.4140.title: "すべてか無か"
 shroud.4140.desc: "我々の運命は$end_of_the_cycle_color_article$と強く結びついている。 そのオーラが栄えるところでは、 我々もまた繁栄できるのだ。 我々の中で単純明快な結論が導き出された——オーラを妨げるものは[This.GetName]を妨げるものであり、 すべて排除せねばならない。\n\n我々が望むのであれば、 軍事目標に課した制限をすべて取り払い、 敵どもを容赦なく征伐することも可能だ。 終焉の覇権を妨げる者は許さない。"
 shroud.4140.a: "運命が成就されんことを。"
 shroud.4140.a.tooltip: "§H開戦事由§!「['concept_total_war']」が使用可能になる\n$eotc_opinion_modifier_2_tooltip$"
 triggered_opinion_eotc_situation_stage2: "終焉の前兆"
 shroud.4145.title: "消滅"
 shroud.4145.desc_1.common_1: "§R$end_aura$§!が銀河に満ちるにつれ、 抵抗が増大するのを感じる。"
 shroud.4145.desc_1.common_2: "だがどうでもいいことだ。 他の者が$end_of_the_cycle_color_article$を受け入れるのを待つつもりなどない。"
 shroud.4145.desc_1.default: "$shroud.4145.desc_1.common_1$ 遠く離れた隣国がまたたく間に我々に敵意を抱きはじめている。 $shroud.4145.desc_1.common_2$"
 shroud.4145.desc_1.homicidal: "$shroud.4145.desc_1.common_1$ 敵の嫌悪がかつてないほど深まりはじめている。 $shroud.4145.desc_1.common_2$"
 shroud.4145.desc_2: "パトロンの意志に鼓舞され、 我々はエネルギーと物質を消費してオーラを増大させる新たな方法を編み出した。 宇宙そのものの本質を犠牲にして、 終焉を押し進めようというのだ。"
 shroud.4145.a: "あらゆる手を尽くさねばならない。"
 shroud.4145.a.tooltip: "$eotc_opinion_modifier_3_tooltip$\n布告をアンロック：\n$t$- ['edict:annihilation_of_matter', $edict_annihilation_of_matter$]\n$t$- ['edict:annihilation_of_energy', $edict_annihilation_of_energy$][GetDimensionalCollapseEdictGain]"
 shroud.4145.dimensional_collapse: "\n$t$- ['edict:dimensional_collapse', $edict_dimensional_collapse$]"
 triggered_opinion_eotc_situation_stage3: "$triggered_opinion_eotc_situation_stage2$"
 shroud.4150.title: "終焉の到来"
 shroud.4150.desc: "パトロンは沈黙のうちに語る。 円環の終わりを間近に感じるほどに、 新たなエネルギーが[This.GetName]全体にみなぎってくる。 切迫感が我々を鼓舞している。\n\n終焉の意志を満足させたければ、 すべての[This.GetSpeciesNamePlural]のエネルギーを集結させ、 ひとつの目的に注ぎ込まねばならない。 パトロンの力を具現化し、 そのオーラを銀河の最果てにまで広げるのだ。"
 shroud.4150.a: "時は来た。"
 MAJOR_PATRON_FC_PROJECT: "$FORM_COVENANT_PROJECT$"
 MAJOR_PATRON_FC_PROJECT_DESC: "我々が招集したテレパスは精鋭揃いだ。 彼らは§Hシュラウド§!の深奥へと到達し、 あの途方もない力と交信する準備を整えている。"
 MAJOR_PATRON_FC_PROJECT_HIVE_DESC: "我々は特別製のテレパスドローンを多数用意した。 それらは§Hシュラウド§!の深奥へと到達し、 あの途方もない力と交信する準備を整えている。"
 MAJOR_PATRON_FC_PROJECT_ROBOT_DESC: "我々は高性能なテレパスユニットを多数用意した。 それらは§Hシュラウド§!の深奥へと到達し、 あの途方もない力と交信する準備を整えている。"
 THE_EATER_OF_WORLD_FC_PROJECT: "[Root.Patron:the_eater_of_worlds.GetPreCommunicationName]との交信"
 eater_fc_project_desc_end: "あの存在の真の名前が明らかになるまで、 我々はそれを§H[Root.Patron:the_eater_of_worlds.GetPreCommunicationName]§!と呼ぶことにする。"
 THE_EATER_OF_WORLD_FC_PROJECT_DESC: "$MAJOR_PATRON_FC_PROJECT_DESC$\n\n$eater_fc_project_desc_end$"
 THE_EATER_OF_WORLD_FC_PROJECT_HIVE: "$THE_EATER_OF_WORLD_FC_PROJECT$"
 THE_EATER_OF_WORLD_FC_PROJECT_HIVE_DESC: "$MAJOR_PATRON_FC_PROJECT_HIVE_DESC$\n\n$eater_fc_project_desc_end$"
