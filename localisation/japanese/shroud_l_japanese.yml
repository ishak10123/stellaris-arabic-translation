 # Test Subjects (Normal)
 job_test_subject: "被験者"
 job_test_subject_plural: "被験者"
 job_test_subject_desc: "犯罪行為で有罪判決を受けた人々は、 技術実験における生きた被験者として生産的に利用されている。"
 job_test_subject_effect_desc: "£job_test_subject£ $job_test_subject_plural$は$r_research$と$i_amenities$を生産するために利用される"
 mod_job_test_subject_add: "$job_test_subject$の職業枠"
