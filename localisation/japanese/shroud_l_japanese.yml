 shroud.first_contact_insert.instrument: "§H狂乱の脈動§!"
 shroud.4035.title: "$the_instrument_of_desire_article_cap$の前で"
 shroud.4035.desc.all.start: "何か月にもわたり虚しく呼びかけを続けた末、 ついに§Hシュラウド§!の深淵から§H[Root.Patron:the_instrument_of_desire.GetPreCommunicationName]§!が姿を現した。"
 shroud.4035.desc.default: "$shroud.4035.desc.all.start$\n\n「それ」からのメッセージはまさに奔流だった。 思念が激流のように我々の精神へと押し寄せ、 最も抑え難い欲望を刺激してくる。 言葉が矢継ぎ早に、 そして豊潤に流れ込み、 他のすべての思考を押し流した。 そのメッセージが我々に見せた光景は魅惑的だった。 そこには、 力と享楽が溢れていた。\n\n$shroud.4035.desc.default.end$"
 shroud.4035.desc.default.end: "思念の奔流は徐々に落ち着いてきた。 しかし、 「それ」はまだ返答を期待していないようだった。 ただ、 我々の中に、 鎮められない渇望だけを残していった。\n\nいまや我々には、 その存在の欲望がより明瞭に伝わっている。 際限なく富を渇望する「それ」のビジョンを、 我々は目の当たりにしたのだ。 [GetTelepathPlural]が回復すれば、 この存在——$the_instrument_of_desire_color_article$との交信が可能になるだろう。"
 shroud.4035.desc.hive: "$shroud.4035.desc.all.start$\n\n「それ」からのメッセージはまさに奔流だった。 思念が激流のように我々の精神へと押し寄せ、 最も抑え難い欲望を刺激してくる。 言葉が矢継ぎ早に、 そして豊潤に流れ込み、 他のすべての思考を押し流した。 そのメッセージが我々に見せた光景はエネルギーに満ちていた。 そこには、 測り知れないほどの出力があった。\n\n$shroud.4035.desc.default.end$"
 shroud.4035.desc.gestalt_machine: "$shroud.4035.desc.all.start$\n\n「それ」からのメッセージはまさに奔流だった。 前例のないデータ量が我々の回路に入力される。 異質なコードが矢継ぎ早に、 そして膨大に流れ込み、 他のすべてのプロセスを上書きした。 そのメッセージが我々に見せた光景はエネルギーに満ちていた。 そこには、 測り知れないほどの出力があった。\n\n$shroud.4035.desc.machine.end$  "
 shroud.4035.desc.machine.end: "思念の奔流は徐々に落ち着いてきた。 しかし、 「それ」はまだ返答を期待していないようだった。 ただ、 我々の中に、 優美な入力を求める断片的な空白だけを残していった。\n\nいまや我々には、 その存在の欲望がより明瞭に伝わっている。 際限なく富を渇望する「それ」のビジョンを、 我々は目の当たりにしたのだ。 [GetTelepathPlural]が再充電されれば、 この存在——$the_instrument_of_desire_color_article$との交信が可能になるだろう。"
 shroud.4035.desc.individual_machine: "$shroud.4035.desc.all.start$\n\n「それ」からのメッセージはまさに奔流だった。 思念が激流のように我々の精神へと押し寄せ、 最も抑え難い欲望を刺激してくる。 言葉が矢継ぎ早に、 そして豊潤に流れ込み、 他のすべての思考を押し流した。 そのメッセージが我々に見せた光景はエネルギーに満ちていた。 そこには、 測り知れないほどの出力があった。\n\n$shroud.4035.desc.machine.end$"
 shroud.4035.a.default: "これこそが栄光だ。"
 shroud.4035.a.robot: "特筆すべき存在と評価。"
 shroud.4035.b.default: "$shroud.first_contact.end.b$"
 shroud.4035.b.robot: "$shroud.first_contact.end.b$"
 shroud.4035.c.default: "空疎な言葉だ。"
 shroud.4035.c.robot: "$shroud.4035.c.default$"
 shroud.first_contact.end.a.tt.the_instrument_of_desire: "$the_instrument_of_desire_color_article$との§Y同調§!を獲得する。\n$shroud.first_contact.end.b.tt.the_instrument_of_desire$"
 shroud.first_contact.end.b.tt.the_instrument_of_desire: "§Yシュラウド§!に$the_instrument_of_desire_color_article$が顕現する。"
 shroud.first_contact.end.c.tt.the_instrument_of_desire: "$the_instrument_of_desire_color_article$との§Y同調§!を大きく失う。\n$shroud.first_contact.end.b.tt.the_instrument_of_desire$"
 shroud.4040.title: "$utopia.3300.name$"
 shroud.4040.desc: "我々は、 §Hシュラウド§!の内部に数多の声が存在することを認識している。 その無数の残響が、 あの空間には遍在している。 最近のトランス状態から目覚めた[GetTelepathPlural]は、 類を見ない存在の兆候を報告した。 シュラウドの中心にまで浸透する、 §H重層的な振動§!が感じられたというのだ。\n\n十分なサイオニック・エネルギーを注ぎ込めば、 我々の[GetTelepathPlural]が§H[Root.Patron:whisperers_in_the_void.GetPreCommunicationName]§!と呼ぶ、 この強力な存在の痕跡をたどれるかもしれない。"
 shroud.4040.a: "$utopia.2657.a$"
 shroud.4045.title: "$whisperers_in_the_void_article_cap$"
 shroud.4045.desc.intro: "§H[Root.Patron:whisperers_in_the_void.GetPreCommunicationName]§!との交信を試みた我々は、 シュラウドの最深層へと引き込まれていった。 この内なる領域において、 シュラウドは静かに回転している。 そのサイクルに合わせて、 あらゆる思念の残響が、 ひとつの原初的な力へと集束していた。 そして我々は、 声なき声を聞いた。 永劫のうねりに乗せて運ばれてくる「それ」は、 $whisperers_in_the_void_color_article$である。\n\nかすれたような不協和音が我々を取り囲む。 無数のメッセージを聞き取ろうと耳を澄ませるなかで、 ひとつの思念が[GetTelepathPlural]の精神を不快感とともに通り抜けた。\n\n§H聞くことには犠牲が伴う。§!\n\nこの偉大な力を引き出すには、 この存在が"
 shroud.4045.desc.covenant: "$shroud.4045.desc.intro$[GetCovenantPatronColor]の領域に侵入し、 支配するのを支援しなければならない。 そのような行為は、 現在我々が知るパトロンの存在を完全に置き換えることになり、 すでに結ばれている契約は粉々に砕け散るだろう。 $shroud.4045.desc.outro$"
 shroud.4045.desc.no_covenant: "$shroud.4045.desc.intro$別のパトロンの領域に侵入し、 支配するのを支援しなければならない。 その行為は、 既知のパトロンの存在を完全に置き換えることになる。 $shroud.4045.desc.outro$"
 shroud.4045.desc.outro: "\n\nこれは重大な結果を招く可能性がある。"
 shroud.4045.a: "囁き手を受け入れる。"
 shroud.4045.a.covenant.tt: "§R[GetCovenantPatronColor]との契約が終了する。§!\n[GetCovenantPatronColor]の領域は完全に$whisperers_in_the_void_color_article$のものに置き換えられる。\n§R重大な結果を招くだろう。§!"
 shroud.4045.a.no_covenant.tt: "$major_patron$の領域を$whisperers_in_the_void_color_article$のものに置き換えることになる。\n§R重大な結果を招くだろう。§!"
 shroud.4045.b: "シュラウドの均衡は崩さないほうがいいだろう。"
 shroud.4046.title: "シュラウドの移行"
 shroud.4046.desc.1: "決断を下すや否や、 我々の[GetTelepathPlural]は§Hシュラウド§!の"
 shroud.4046.desc.2: "彼らの精神は、 さまざまな声の残響の中をたゆたっている。\n\n我々の選択は、 サイオニック領域に対する知覚を不可逆的に変容させたようだ。 $whisperers_in_the_void_color_article$が我々の精神に染み込むにつれ、 もはや[GetCovenantPatronColor]を以前のように感じ取ることはできなくなった。 その領域は我々から失われたのだ。\n\n我々は少しずつ、 囁き手の意志を理解しはじめている。 彼らが思い描く、 限りない知識のビジョンが見えてきた。 我々の[GetTelepathPlural]が"
 shroud.4046.desc.3: "我々は再び手を伸ばし、 この無数の存在と交信することができるだろう。"
 shroud.4046.desc.robot: "$shroud.4046.desc.1$微睡から突如覚醒したように立ち上がった。 $shroud.4046.desc.2$が回復すれば、 $shroud.4046.desc.3$"
 shroud.4046.desc.organic: "$shroud.4046.desc.1$停滞から強制起動したように立ち上がった。 $shroud.4046.desc.2$が再充電されれば、 recharged, $shroud.4046.desc.3$"
 shroud.whispers_in_the_shroud.title: "シュラウドの中の囁き"
 shroud.whispers_in_the_shroud.a: "$utopia.2657.a$"
