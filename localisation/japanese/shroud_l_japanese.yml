 shroud_cradle_covenant_chain_title: "$the_cradle_of_souls$"
 shroud_cradle_covenant_chain_desc: "我々は$the_cradle_of_souls_color_article$という名のシュラウド体との絆を築いた。 調和的なそれは、 対価として我々に力の欠片を与える。\n\n我々の[GetTelepathPlural]は、 我々の行動をパトロンの意志と一致させることで、 絆を深めることができると理論づけている。\n\nゆりかごは、 混沌と争いのない銀河を切望している。 そのすべての住人が平和という統一された目標へと従う世界を。 完全なる均衡のみがそれを実現できる。"
