 job_drone_energy_thrall_effect_desc: "£job_energy_thrall£ $job_drone_energy_thrall_plural$ produce $i_unity$、$i_leader_exp_gain$と §Y$edict_energy_drain$§!および§Y$edict_sanguine_council$§!の布告による§YPOP製造ペナルティ§!を§G0.02%§!減少させる。"
