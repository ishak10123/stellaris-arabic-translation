 sm_aura_emitter: "オーラ放射器"
 sm_aura_emitter_desc: "$sm_aura_emitter$で放射されるサイオニック・エネルギーを流すための安定した導管を築くことで、 星系基地から$PSIONIC_AURA$を放出できるようになる。\n"
