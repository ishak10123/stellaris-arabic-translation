 edict_energy_drain_desc: "大衆はエッセンス収穫用の装置を埋め込むことが義務とされ、 定期的な検査を受けることになる。 通知があったときは、 即時収穫態勢に入ることが求められる。"
 edict_energy_drain_tt: "§Yリーダー§!が老衰で死ぬことがなくなる。\n"
 # Sanguine Council
 edict_sanguine_council: "紅顔の評議会"
 edict_sanguine_council_desc: "体液は帝国を統治する評議会に捧げられる精気の抽出元となるため、 全人口が定期的な検査を義務づけられている。"
 edict_sanguine_council_machine: "ネクサスチャージ"
 edict_sanguine_council_machine_desc: "$edict_sanguine_council_desc$"
 # Galactic Dowsing
 edict_galactic_dowsing: "ギャラクティック・ダウジング"
 edict_galactic_dowsing_gestalt: "$edict_galactic_dowsing$"
 edict_galactic_dowsing_desc: "探鉱者が従来の地質解析方法に占い要素を取り込むことで、 より豊かな資源の鉱脈を見つけることができるようになる。"
 edict_galactic_dowsing_gestalt_desc: "$edict_galactic_dowsing_desc$"
 edict_annihilation_of_matter: "物質の徹底排除"
 edict_annihilation_of_matter_desc: "一片の塵が炎に投げ込まれるたびに、 忘却の炎はますます激しく燃え上がる。"
 edict_annihilation_of_energy: "エネルギーの徹底排除"
 edict_annihilation_of_energy_desc: "エントロピーの舞踏は、 我々がその壮麗さに気付くはるか以前から続いてきた。 我々は今ようやく、 そのテンポを上げはじめた。"
 edict_dimensional_collapse: "次元崩壊"
 edict_dimensional_collapse_desc: "シュラウド以外にも我々の次元と絡まり合う次元は存在する。 それらの力もいずれは崩壊するだろう。"
 # Psychic Feast
 edict_psychic_feast: "意志の集結"
 edict_psychic_feast_desc: "多大なる精神的努力により、 リーダーたちの内にさらに強大な力を呼び覚ますことができる。"
 # Animatus
 edict_animatus: "生命の付与"
 edict_animatus_desc: "$the_animator_of_clay_color_article_cap$は我々の艦隊に新たな命を吹き込む。 まるで艦隊に意志があるかのようだ。"
 # Will of Temperance
 edict_will_of_temperance: "自重の意志"
 edict_will_of_temperance_desc: "$the_outsider_color_article$の意志がこの先に潜む危険を我々に警告してくれる。"
 # Will of Distraction
 edict_will_of_distraction: "歓楽の意志"
 edict_will_of_distraction_desc: "$the_golden_dream_color_article_cap$は高度な歓楽の形態を我々に教えてくれる。"
 # Will of Endless
 edict_will_of_endless: "無限の意志"
 edict_will_of_endless_desc: "$the_endless_tide_color_article_cap$は時間そのものの見方を広げてくれる。"
 # Will of Rebirth
 edict_will_of_rebirth: "再生の意志"
 edict_will_of_rebirth_desc: "$the_pale_mountain_color_article_cap$は破壊するために創造する。"
 # Will of Order
 edict_will_of_order: "秩序の意志"
 edict_will_of_order_desc: "$the_vacant_throne_color_article_cap$は万物の秩序を知っている。"
 # Will of Motion
 edict_will_of_motion: "運動の意志"
 edict_will_of_motion_desc: "$the_black_river_color_article$の速度が我々を虚無へと流し去る。"
 #==========================
 # Event Chains
 #==========================
 mindwarden_enclave_chain_title: "$ENCLAVE_MINDWARDEN_PLURAL$"
 mindwarden_enclave_chain_desc: "新たな$ENCLAVE_MINDWARDEN$を設立するには、 $commander$が率いる十分な規模の軍事艦隊を派遣可能な星系に送り込み、 §H艦隊ビュー§!で指令を選択する。"
 enclaves_built: "$ENCLAVE_MINDWARDEN_PLURAL$を確立した"
 dividends_received: "配当金を受け取った"
 shroud_seals_built: "銀河内に$SHROUD_SEAL_PLURAL$を捕捉"
 chain_aura_suppressors_title: "§H$PSIONIC_AURA$§!インピーダンス"
 chain_aura_suppressors_desc: "§H$end_aura$§!は、 サイオニック・アッテニュエーションを引き起こす異星の装置によって妨害されている。 我々のパトロンの意志が、 この冒涜的な機械を解体するよう我々を駆り立てている。"
 chain_aura_suppressors_seal: "§Y[prev.GetName]§!の§H$SHROUD_SEAL$§!"
 chain_aura_suppressors_seal_desc: "[prev.GetName]星系にある$SHROUD_SEAL$が、 §H$end_aura$§!の到達を阻止している。\n\n§Rこれを解体しなければならない。§!"
 chain_aura_suppressors_suppressor: "§Y[prev.GetName]§!上の§H$building_psionic_suppressor$§!"
 chain_aura_suppressors_suppressor_desc: "[prev.GetName]上の$building_psionic_suppressor$が、 §H$end_aura$§!の到達を阻止している。\n\n§R我々はそれを解体しなければならない。§!"
 chain_aura_suppressors_ward: "§Y[prev.GetName]§!上の§H$building_ancient_ward_2$§!"
 chain_aura_suppressors_ward_desc: "[prev.GetName]上のいわゆる$building_ancient_ward_2$が、 §H$end_aura$§!の到達を阻止している。\n\n§R我々はそれを解体しなければならない。§!"
 #==========================
 # Events
 #==========================
 # Good luck events
 # Good luck event 1
 shroud.500.title: "異例の大発見"
 shroud.500.desc: "我が国の最先端の研究機関で実施されていた新研究が、 期待に応えるようにして予想外の大発見にいたった。 まったくの偶然ではあったものの、 定期的な機器の標準化を通じて、 長年基本的な計算間違いと思われていた理論が立証されることになったのだ。 これにより、 かつて境界科学と思い込んでいた分野の再研究が可能になった。"
 HOW_FORTUITOUS: "なんとも幸運な偶然だ。"
 shroud.500.tt: "ランダムなテクノロジーの知見を得た：§G$@good_luck_event_1_insight|0%$§!"
 # Good luck event 2
 shroud.507.title: "主脈の発見"
 shroud.507.desc: "かつて鉱石が豊富に採れる天然の洞窟群があったが、 ついこの間まで完全に崩落してしまったと思われていた。 しかしこの度、 それが偶然にも§H[This.GetName]§!で再発見されたのである。\n\n慎重な危険性評価を実施した結果、 既存の採掘作業範囲を拡大することで、 いずれの坑道からも大量の鉱物が採掘可能であることが判明した。"
 # Good luck event 3
 shroud.512.title: "[This.GetNewfoundFertilityTitle]"
 shroud.512.title_default: "新たなる肥沃な土壌"
 shroud.512.title_anglers: "未発見の礁域"
 shroud.512.desc: "定期的に行われている土地検査によって、 惑星§H[This.GetName]§!における多くの土壌の質が、 この数年で劇的に改善していることがわかった。\n\nかつて農業に不向きと判断された数々の土地も、 今なら我が国の農作業の拡大に貢献できそうだ。"
 shroud.512.desc_anglers: "1隻の漁船が、 §H[This.GetName]§!の海の中に隠れていた礁域を発見した。 これまでは無人かつ不毛の土地しかないとされてきた地域だが、 その実、 食料として収穫可能な動物たちからなる豊かな生態系を支えていたことがわかった。"
 # Good luck event 4
 shroud.517.title: "地熱噴出孔"
 shroud.517.desc: "地殻変動が起きたことで、 §H[This.GetName]§!の巨大な地下水貯水池の下に亀裂が生じた。 惑星のマントルが放つ熱によって貯まった水が沸騰し、 現在地表に地熱噴出孔が形成されている状態にある。\n\n新たな地熱発電所や熱ポンプを設置すれば、 この自然現象を植民地のエネルギーインフラ拡張のチャンスとして活かすことが可能だ。"
 # Good luck event 5
 shroud.522.title: "量子粒子流の発見"
 shroud.522.desc: "§H[This.GetName]§!に、 亜原子成分からなる特異な円環が自然発生した。 この量子粒子流では毎秒、 珍しい亜原子粒子同士の様々な交流が観測でき、 量子動力学の本質に迫る驚くべきデータの収集を可能にしている。\n\nこの量子場を集中的に研究することで、 宇宙を構成する基本要素に関する理解が深まるだろう。"
 # Good luck event 6
 shroud.527.title: "別次元からの“声”"
 shroud.527.desc: "[From.GetResearchers]たちが、 等間隔で送られてくる一連の信号を§H[This.GetName]§!星系で検知した。\n\n初期分析によれば、 この信号は我々の次元とは別の次元から送信されたようだ。 初期の翻訳では、 論理原則や哲学的ジレンマに関するメッセージであることも示唆されている。 おそらく、 我々の理解を超えた存在が知性の向上を目的として送信したものだろう。\n\nこの信号を直接受信できる経路を確立すれば、 彼らからの啓示を継続的に観測できるだろう。"
 # Good luck event 7
 shroud.532.title: "高性能難破船の発見"
 shroud.532.desc: "§H[This.GetName]§!に漂流船が現れた。 [From.GetQuantumParticleStreamDiscoveredExtra]\n\nこの船は何千年もの間、 捕捉されることなくこの星系内を漂っていたと推測され、 現に搭載されている太陽エネルギー発電機が故障したことで、 ようやくその存在が明らかとなった。 艦内に生命の気配がなかったことから、 この船からできるだけ多くの情報を引き出すべく、 すでに慎重な解体作業が始まっている。"
 shroud.532.extra: "修復不可能なほどの破損状態にあるにも関わらず、 この船はなんらかの遮蔽フィールドを展開することができていた。 全体的に我々の艦隊よりも、 戦術的な面で遥かに優れていることがうかがえる。"
 shroud.532.extra_first_contact: "船は修復不可能なほどの破損状態にあったが、 他に類を見ないレベルのクローク・テクノロジーが使用されていた。"
 shroud.532.a: "星々からの贈り物だ。"
 # Good luck event 8
 shroud.537.title: "地熱冶金"
 shroud.537.desc: "§H[This.GetName]§!の地中深くにおける地熱活動は、 極めて不安定な状態になりつつあり、 地下で放出されたマグマが、 惑星の地殻から未発掘の鉱床に流れ込む事態となった。\n\nこの地質現象によって、 採掘前の鉱物が一部過熱され、 鉱脈の中の金属鉱石が固体合金に精製された。 このため、 この惑星で今後採掘作業が実施された場合は、 加工可能な金属の欠片が採れるようになるだろう。"
 # Good luck event 9
 shroud.543.title: "放棄された巡洋艦"
 shroud.543.desc: "無人の戦艦が、 §H[From.GetName]§!星系内を漂流しているところを捕捉された。 既知の帝国のいずれの船とも異なる設計をしており、 旗や紋章の類も見当たらない。\n\n大がかりな鑑定と簡単な修理ののち、 [This.GetEngineerPlural]から現場での使用に耐え得る船との判断が下された。"
 shroud.543.a: "$shroud.532.a$"
 shroud.543.tt: "星系内で巡洋艦級の船を獲得する。"
 # Good luck event 10
 shroud.545.title: "[This.GetSenseOfOptimismTitle]"
 shroud.545.title_default: "楽観的意識"
 shroud.545.title_gestalt: "一方向への結束"
 shroud.545.desc: "[This.GetAdjective]全土において、 説明し難い楽観的な空気が流れている。 国民もその分だけ充足感と安心を感じている様子で、 自身の存在にも満足しているように思える。 この集団的な気持ちの変化は、 間違いなく最高の天体配列によるものであり、 §H[This.GetName]§!の未来を予示する吉兆と考えて差し支えないだろう。"
 shroud.545.desc_gestalt: "§H[This.GetName]§!は明確な一点に向かって、 真の調和を実現している。 この一方向を向いた結束は、 間違いなく最高の天体配列によるものであり、 この先訪れる素晴らしい未来を予示していると考えて差し支えないだろう。"
 shroud.545.a: "星々が我らの頭上で明るく輝いている。"
 # Good luck event 11
 shroud.553.title: "幸運の三分位"
 shroud.553.desc: "§H[From.GetName]§!星系において、 現在3つの天体 (§H[favorable_trine_planet_1.GetName]§!、 §H[favorable_trine_planet_2.GetName]§!、 §H[favorable_trine_planet_3.GetName]§!) が幸運の三分位を形成している。\n\n占星術的に見て良い星の並びであることから、 §H[This.GetName]§!にある我々の植民地に平穏と調和をもたらしてくれるに違いない。"
 shroud.553.a: "こんなことは、 一生に一度あるかないかだ。"
 # Good luck event 12
 shroud.555.title: "吉方位に浮かぶ[auspicious_position_planet.GetName]"
 shroud.555.desc: "§H[root.capital_scope.GetName]§!の上空では、 §H[auspicious_position_planet.GetName]§!が天体回帰のハウスに入り、 縁起のいい位置を占めている。\n\nこれは[root.GetName]が新たな内的周期に入ることを意味すると同時に、 成長と改善のための絶好の機会である。"
 # Good luck event 13
 shroud.560.title: "元素の調和"
 shroud.560.desc: "数値化可能なあらゆる占星術的指標が、 [This.GetName]における元素の完璧な均衡状態を示している。\n\nレイラインを適切に管理することで、 この有益な平衡状態の長期的な維持が可能になると同時に、 我々の指導者たちに繁栄をもたらす理想的な形而上学的環境を整えることができる。"
 shroud.560.a: "なんと素晴らしい運勢か。"
 # Good luck event 14
 shroud.568.title: "光輝の星"
 shroud.568.desc: "§H[From.GetName]§!星系内の一等星が、 異例の輝きを放っている。 占星術の専門家たちとこの現象について話し合ってみたところ、 この余剰なエネルギーによって、 §H[This.GetName]§!におけるあらゆる発電を強化してくれることがわかった。"
 shroud.568.a: "星々が我らの頭上で明るく輝き続けてくれることを祈ろう。"
 # Good luck event 15
 shroud.570.title: "評議員の調和"
 shroud.570.desc: "我が国の評議員である、 §H[councilor_harmony_leader_1.GetTitle] [councilor_harmony_leader_1.GetName]§!と§H[councilor_harmony_leader_2.GetTitle] [councilor_harmony_leader_2.GetName]§!の2名が、 最近になって互いに完璧に補完し合える星の元に生まれていたことが判明した。\n\n以来、 政治における2人の協力関係を手本として、 皆が互いに尊重し合いながら効率良く働くようになった結果、 さまざまな立法手続きが加速された。"
 shroud.570.a: "素晴らしい連携だ。"
 # Good luck event 16
 shroud.575.title: "知られざる宝の山"
 shroud.575.desc: "定期的な目録作成の作業に当たっていたところ、 標本のひとつが不意に§H$grand_archive$§!の床に落ちてしまい、 すぐさま精密検査に回すためコンサベーターに届けられた。\n\n驚くべきことに、 この事故がきっかけで、 これまで気づかれていなかった隠し収納部がゆるみ、 中から多種多様な興味深い遺物が見つかった。 これらの遺物は、 我々のコレクションに加えられることになるだろう。"
 shroud.575.a: "終わりなき恩恵だ。"
 # Bad luck events
 # Bad luck event 1
 shroud.700.title: "不調和"
 shroud.700.desc: "現在、 各世界の民が迫り来る恐怖に漠然と怯えている節がある。 誰もが悩みを抱え、 取り乱している様子で、 自身の存在にすら不満を覚えている様子だ。 この集団的な気持ちの変化はおそらく、 天体が準最適な配列をなしているせいだろう。"
 shroud.700.desc_gestalt: "§H[This.GetName]§!全体に、 不調和な空気が流れている。 協調性が欠けてしまっていることで、 集合体としての停滞を感じざるを得ないが、 おそらくは天体が準最適な配列をなしていることが原因だろう。"
 HOW_UNFORTUNATE: "なんと不運なことだ。"
 # Bad luck event 2
 shroud.707.title: "海軍演習中の衝突事故"
 shroud.707.desc: "定期的に実施されている海軍演習にて、 コミュニケーションの行き違いから§H[This.GetName]§!の複数の戦艦が、 §H[This.System.GetName]§!において高速衝突事故を起こしてしまった。\n\n[This.GetNavalCollisionLeader]によれば、 この度の過失の原因となった[From.GetIndividualNamePlural]には、 すでに相応の懲罰が課せられたとのことだ。"
 shroud.707.leader_name: "§H[Leader.GetName]§!"
 shroud.707.default_name: "中央軍事司令部"
 shroud.707.tt: "§H[This.GetName]§!で破壊された艦船の数：§R5§!"
 # Bad luck event 3
 shroud.710.title: "サイロの火事"
 shroud.710.desc_default: "電力系統の故障によって、 §H[silo_fire_planet_targeted.GetName]§!の資源サイロで大規模な火災が発生した。\n\n$shroud.710.desc$"
 shroud.710.desc_starbase: "§H[silo_fire_starbase_targeted.Fleet.System.GetName]§!の星系基地において、 電力系統の故障が原因で、 資源サイロが大規模な火災に見舞われた。\n\n$shroud.710.desc$"
 shroud.710.desc: "消火装置が一時的に機能しない状態にあったことから、 保管されていた資源の相当量が炎に焼かれてしまい、 サイロそのものにいたっては修復不可能なレベルまで破損してしまった。"
 shroud.710.a: "忌々しい星々め！"
 shroud.710.tt_default: "§H[silo_fire_planet_targeted.GetName]§!の§H$building_resource_silo$§!が破損した。\n$shroud.710.tt$"
 shroud.710.tt_starbase: "§H[silo_fire_starbase_targeted.Fleet.System.GetName]§!の§H$sm_resource_silo$§!が破損した。\n$shroud.710.tt$"
 shroud.710.tt: "失われた資源：§R$@silo_fire_resources_lost|1%$§!"
 # Bad luck event 4
 shroud.715.title: "外交上の失態"
 shroud.715.desc: "[This.GetGalCommunityOrGalImperium]における我が国の代表の1人が、 立場に相応しくない振る舞いを見せてしまった。 我々の国益を守るために協力を仰ぐ演説を披露するはずが、 翻訳機の誤作動で憎しみのこもった、 痛烈な侮辱の言葉を[diplomatic_faux_pas_victim.GetName]に浴びせてしまうことになったのだ。 この不幸な出来事は銀河中のメディアによって広められ、 我々の評判を地に落とした。\n\n即時解任にいたるほどの行動ではなかったものの、 結果としてこの軽率な過ちが原因で、 [This.GetGalCommunityOrGalImperium]における我々の立場が弱まってしまったのは確かだ。"
 shroud.715.a: "不幸な過ちだ。"
 shroud.715.tt: "§H[diplomatic_faux_pas_galcom_envoy.GetName]§!が新しい特性を獲得した：§R$leader_trait_destructive$§!"
 # Bad luck event 5
 shroud.720.title: "強烈な太陽フレア"
 shroud.720.desc: "[extreme_solar_flare_system.GetName]で発生した未曾有の太陽フレアによって、 星系内の全軌道ステーションの機能が破壊されてしまった。\n\n大量のガンマ線からなるこの異常なフレアは、 太陽の観測史上最大級の威力を誇るものだ。 またコロナ層の解析結果を見る限り、 今回の増光現象によって予測寿命が300万年以上短縮されたことがわかった。"
 shroud.720.desc_storm: "これに伴うエネルギーの放出によって、 星系内で$celestial_storm$が発生した。 現在、 緊急措置の準備が進められている。"
 shroud.720.tt: "§H[extreme_solar_flare_system.GetName]§!内のあらゆる$observation_station$、 $research_station$、 および$mining_station$が破壊された。"
 # Bad luck event 6
 shroud.725.title: "交通事故に巻き込まれた要人"
 shroud.725.desc: "想定外の気候変動によって、 §H[high_profile_traffic_accident_planet.GetName]§!の輸送網に大きな混乱が生じた。 広範囲における遅延の他、 多数の交通事故まで発生してしまい、 その内の1つに[This.GetClass]である§H[This.GetName]§!が巻き込まれる事態となった。"
 shroud.725.desc_killed: "$shroud.725.desc$\n\n救急隊による迅速な措置にもかかわらず、 [This.GetHisHer]の負った傷は致命的なものだった。"
 shroud.725.desc_killed_machine: "$shroud.725.desc$\n\n残念ながら[This.GetName]のシステムは、 もはや手の施しようのない状態まで破損してしまっていた。"
 shroud.725.desc_maimed: "$shroud.725.desc$\n\n[This.GetName]はなんとか衝突を生き延びたものの、 無傷では済まされず、 回復の見込めない負傷を負ってしまった。"
 shroud.725.a: "なんという悲劇だ。"
 # Bad luck event 7
 shroud.730.title: "巨大シンクホール"
 shroud.730.desc: "§H[This.GetName]§!の地表に巨大なシンクホールが形成されたことで、 インフラに深刻な被害が出ている。 同惑星では建造物の基盤の真下に亀裂が生じたことで、 建物の一部が崩壊するなどの事件も発生しているが、 幸いにも影響が出ているすべての地域で無事に避難が完了している。\n\nなぜ突如として、 地面にこのような空洞ができたのか、 その原因は未だ断定することはできないが、 地表浸食の観測のため追加の保守点検が実施された。"
 shroud.730.a: "忌々しい星々め……"
 shroud.730.tt: "建物が今や瓦礫の下だ。"
 # Bad luck event 7
 shroud.735.title: "自発的暴動"
 shroud.735.desc: "§H[This.GetName]§!全土で暴動が起きるという危険な事態になった。 熱狂した民衆は、 [From.GetAdjective]政府が天体配列を操作しているとして抗議しているもようだ。 初めは熱心なデモで始まったはずの活動が今やただの暴動になり下がり、 植民地全土で扇動者たちが大量破壊をして回る始末である。\n\n暴力的なデモ参加者たちは、 治安部隊によって制圧されたものの、 破壊されたインフラを元通りにするには時間がかかりそうだ。"
 shroud.735.desc_hive: "あるドローンの大群が取った逸脱行動が、 §H[This.GetName]§!の植民地における反乱に発展し、 広範囲での破壊行動にまで及んだ。 この熱狂的な活動は、 惑星軍によって扇動者が鎮圧されたことで収まったものの、 破壊されたインフラを元通りにするには時間がかかりそうだ。"
 shroud.735.desc_machine: "§H[This.GetName]§!で、 少数ながら無視できない数のドローンが、 未知のウィルスに感染したことで反乱を起こし、 植民地の破壊を試みた。 この熱狂的な活動は、 惑星軍によって誤作動を起こしたユニットが鎮圧されたことで収まったものの、 破壊されたインフラを元通りにするには時間がかかりそうだ。"
 shroud.735.a: "必ず復興してみせる。"
 # Bad luck event 9
 shroud.740.title: "突発的な伝染病"
 shroud.740.desc: "高い感染力を持ったウィルスが§H[This.GetName]§!で突然変異を起こし、 人口の大部分が感染する事態となった。 病気の蔓延を防ぎ、 現地の医療インフラに過負荷をかけることのないよう、 接触の追跡や移動制限といった検疫措置がすでに取られている。"
 # Bad luck event 10
 shroud.745.title: "天災の四分位"
 shroud.745.desc: "§H[From.GetName]§!星系内において、 現在4つの天体 (§H[calamitous_quartile_planet_1.GetName]§!、 §H[calamitous_quartile_planet_2.GetName]§!、 §H[calamitous_quartile_planet_3.GetName]§!、 §H[calamitous_quartile_planet_4.GetName]§!) が天災の四分位を形成している。\n\nこの破滅的な天体現象が起きたことで、 §H[This.GetName]§!の植民地に不安の種が蒔かれ、 民衆の間に不和が広がって[FromFrom.GetDissent]が高まるだろう。"
 shroud.745.a: "恐るべき凶兆だ。"
 # Bad luck event 11
 shroud.750.title: "[planet_in_retrograde_planet.GetName]の逆行"
 shroud.750.desc: "§H[planet_in_retrograde_home.GetName]§!の住民たちは、 §H[planet_in_retrograde_planet.GetName]§!が逆行期に入ったことに気づいた。 我々は今、 自らの行動を見直し、 [This.GetName]の不完全性に対する遺憾を表明するべきときにある。 厄介な時期ではあるが、 内省を終えた先で理想に近づけていることを祈ろう。"
 # Bad luck event 12
 shroud.755.title: "元素の不均衡"
 shroud.755.desc: "残念なことに今、 数値化可能なあらゆる指標が、 [This.GetName]における元素が完全な不均衡状態にあることを示している。\n\nこの不安定な状況を立て直すのはそう単純な話ではなく、 それなりの時間がかかることが想定される。 現状の混沌においては、 指導者たちも形而上学的に良い瞑想環境を整えるのが難しく、 進化に遅れが生じることが見込まれる。"
 shroud.755.a: "あってはならないことだ。なんとかしてこの状況を正さなくては。"
 # Bad luck event 13
 shroud.760.title: "色褪せる星"
 shroud.760.desc: "§H[From.GetName]§!星系内の一等星の光度が、 異常な弱まりを見せている。 占星術の専門家たちとこの現象について話し合ってみたところ、 今回の光度の低下によって、 §H[This.GetName]§!のエネルギーインフラに悪影響が出ることが予測されている。"
 shroud.760.a: "一体どうしてこんなことに。"
 # Bad luck event 14
 shroud.765.title: "評議会の不和"
 shroud.765.desc: "我が国の評議員である、 §H[discordant_council_leader_1.GetTitle] [discordant_council_leader_1.GetName]§!と§H[discordant_council_leader_2.GetTitle] [discordant_council_leader_2.GetName]§!の2名が、 最近になってお互いが決して相容れない星の元に生まれていることが判明した。\n\n以来、 政治における2人の対立関係は、 政府内に敵対意識と緊張を生み出すようになり、 それが原因となって様々な立法手続きに遅れが出るようになってしまった。"
 # Bad luck event 15
 shroud.770.title: "不注意な発言"
 shroud.770.desc_default: "我が国の地方行政官の1人が述べた、 他の帝国に関する個人的見解が、 誤ってその国の臣民たちに報道されてしまった。 ハイパーレーンの監視について難論を交わした後、 通信オペレーターが送信チャンネルを閉じ忘れたために、 後に続いた一連の罵言を[careless_talk_empire.GetName]にも聞かれてしまう事態となったのである。\n\n$shroud.770.desc_end$"
 shroud.770.desc_machine: "我が国の管理ユニットの1体が、 他の帝国に関する見解を述べたところ、 その一部始終が誤ってその国の臣民たちに報道されてしまった。 ハイパーレーンの監視について難論を交わした後、 通信ユニットが送信チャンネルを閉じ忘れたために、 後に続いた一連の罵言を[careless_talk_empire.GetName]にも聞かれてしまう事態となったのである。\n\n$shroud.770.desc_end$"
 shroud.770.desc_hive: "我が国の管理ドローンの1体が、 他の帝国の名誉を棄損する意見を述べたところ、 誤ってその国の臣民たちに報道されてしまった。 ハイパーレーンの監視について難論を交わした後、 通信ドローンが送信チャンネルを閉じ忘れたために、 後に続いた一連の罵言を[careless_talk_empire.GetName]にも聞かれてしまう事態となったのである。\n\n$shroud.770.desc_end$"
 shroud.770.desc_end: "この一件により、 [careless_talk_empire.GetAdjective]の民衆の間では、 当然ながら[This.GetName]の評価が下がることとなってしまった。"
 # Bad luck event 16
 shroud.775.title: "消えた標本"
 shroud.775.desc: "管理上の過失により、 我が国の貴重な文化的遺物のひとつが所在不明となってしまった。 大がかりな捜索が行われたものの、 §H$grand_archive$§!の迷宮のいずこかに紛れ込んでしまったか、 記録にない場所に輸送されてしまったようだ。\n\nこれを受けて現在、 展示中の標本追跡に関わる手順の全面的な見直しが行われている。"
 shroud.775.tt: "ランダムに所在不明になった展示中の標本：§R1§!"
 # Experimental Testing Situation Finished
 shroud.1015.name: "実験的研究の成功"
 shroud.1015.desc.intro: "[Root.GetResearchers]が、 生体を使った革新的な実験の数々を完了させたことで、 さらなる技術的進歩のきっかけとなる貴重な知識が得られた。"
 shroud.1015.desc.default: "$shroud.1015.desc.intro$ 今度は研究を次の段階に進めるにあたり、 どの分野に取り組むかを考えねばならない。"
 shroud.1015.desc.escaped: "$shroud.1015.desc.intro$ 最近実施された一連の大規模な囚人処刑は、 [Root.GetResearchers]たちに新たな技術躍進に必要な研究素材を大量にもたらした。"
 shroud.1015.a: "§Y$PHYSICS$§!研究を実施する。"
 shroud.1015.a.tt: "§Y$situation_experimental_testing_physics$§!に取り組むことで、 §Y$situation_experimental_testing$§!の状況を開始：$TABBED_NEW_LINE$$situation_experimental_testing_physics_outcome_tt$"
 shroud.1015.b: "§Y$SOCIETY$§!研究を実施する。"
 shroud.1015.b.tt: "§Y$situation_experimental_testing_society$§!に取り組むことで、 §Y$situation_experimental_testing$§!の状況を開始：$TABBED_NEW_LINE$$situation_experimental_testing_society_outcome_tt$"
 shroud.1015.c: "§Y$ENGINEERING$§!研究を実施する。"
 shroud.1015.c.tt: "§Y$situation_experimental_testing_engineering$§!に取り組むことで、 §Y$situation_experimental_testing$§!の状況を開始：$TABBED_NEW_LINE$$situation_experimental_testing_engineering_outcome_tt$"
 shroud.1015.d: "選択肢を検討するとしよう。"
 shroud.1015.d.tt: "§Y$situation_experimental_testing_hold$§!の状態で、 §Y$situation_experimental_testing$§!の状況を開始：$TABBED_NEW_LINE$$situation_experimental_testing_hold_effect_tt$"
 shroud.1015.physics_reward: "ランダムな£physics£ §Y$PHYSICS$§!系テクノロジーの知見を獲得する。"
 shroud.1015.society_reward: "ランダムな£society£ §Y$SOCIETY$§!系テクノロジーの知見を獲得する。"
 shroud.1015.engineering_reward: "ランダムな£engineering£ §Y$ENGINEERING$§!系テクノロジーの知見を獲得する。"
 EXPERIMENT_TESTING_TECH_OPTION_TITLE: "実験成功"
 EXPERIMENT_TESTING_TECH_OPTION_SETTING: "知見を獲得 ($situation_experimental_testing$)"
 EXPERIMENT_TESTING_TECH_OPTION_DESC: "実験から期待できる結果が得られた。\n$TECH|Y$：進捗§G+$VAL$%§!"
 # Experimental Testing - Test subjects escape
 shroud.1105.title: "$job_test_subject_plural$の脱走"
 shroud.1105.desc.intro: "複数の貴重な被験者が、 秘かに掘られた脱出トンネルを通って§H[root.GetName]§!の施設から脱走した。\n\n即席の道具や[Owner.GetSpeciesHandNamePlural]で掘られたこのトンネルは、 完成までに何年もかかったに違いない。 どれほどの者がその存在を知っていたのか、 そしてなぜこれほど長い間発見されなかったのかはわからない。"
 shroud.1105.desc.escaped: "このような事態が二度と起こらぬよう、 断固とした対応が必要だ。 この問題に対してこれまで寛容でいたことが、 残された者たちを勇気づけてしまったようだ。"
 shroud.1105.desc.outro: "このような事態が二度と起こらぬよう、 断固とした対応が必要だ。"
 shroud.1105.a: "彼らは自由を勝ち取った。"
 shroud.1105.a.tt: "§H[root.GetName]§!の§Y$job_test_subject_plural$§!の半数が難民として去る。"
 shroud.1105.b: "奴らを見つけるまで作業を中止しろ。"
 shroud.1105.b.tt: "脱走した§Y$job_test_subject_plural$§!たちが連れ戻される。"
 shroud.1105.c: "残った者たちを見せしめに処刑しろ。"
 shroud.1105.c.tt: "§H[root.GetName]§!の§Y$job_test_subject_plural$§!全員を失う。"
 testing_lockdown: "実験中断"
 testing_lockdown_desc: "脱走した被験者たちを捕らえるまで実験が中断される。"
 testing_lockdown_tt: "§Y$situation_experimental_testing$§!の状況の進捗速度：§R-100%§!"
 example_set: "見せしめの処刑実行"
 example_set_desc: "かつて脱走未遂に対し厳しい処罰が下されて以来、 被験者たちは従順だ。"
 example_set_tt: "§Y$situation_experimental_testing$§!の状況の進捗速度：§G+10%§!"
 # Psionic Ascension Situation (Breaching the Shroud)
 # Mid-Stage Events
 # Beneficial Events
 # A1
 shroud.2300.name: "思考の伝達"
 shroud.2300.desc: "[Owner.GetThoughtTransmissionIntro]\n\nこの情報は特定の言語的、 あるいは視覚的素材、 多様な解釈が可能な概念、 一般化された感覚など様々な形を取ることができる。 そして重要なのは、 慎重に伝達を行った場合、 情報を送られたという意識が相手にまったくないという点だ。\n\n[Owner.GetThoughtTransmissionOutro]。"
 shroud.2300.intro: "§H[Owner.Capital.GetName]§!の超能力者の[Owner.GetResearchers]が、 単方向性のテレパシー能力を開発したことで、 感応しやすい意識の持ち主に認識情報を伝達できるようになった。"
 shroud.2300.intro_gestalt: "§H[Capital.GetName]§!の超能力者の[Owner.GetResearchers]が、 単方向性のテレパシー能力を開発したことで、 集合体の中だけに留まらず、 感応しやすい意識の持ち主であれば、 誰にでも認識情報を伝達できるようになった。"
 shroud.2300.desc.outro: "この技術によって、 テレパシー通信の新たな可能性が数多く開けるほか、 [Owner.GetName]内外の意思疎通に幅広い影響が及ぶことになるだろう。"
 shroud.2300.desc.outro_homicidal: "この技術によって、 テレパシー通信の新たな可能性が数多く開かれ、 [Owner.GetName]内外で活用できる可能性がある。"
 shroud.2300.a.robot: "我々の進化における、 次なる合理的な一歩だ。"
 shroud.2300.a.organic: "我々の進化の過程における、 次なる合理的な一歩だ。"
 shroud.2300.b: "我々の意志を知らしめる新しい手段だ。"
 shroud.2300.c.variant: "社会秩序を保つための手段だ。"
 shroud.2300.c.organic: "これをどう使うのが一番良いかは、 社会の皆が決めればいい。"
 # A2
 shroud.2305.name: "亡霊の出没"
 shroud.2305.desc: "§H[Owner.Capital.GetName]§!内の様々な場所で、 不思議な亡霊の姿を捉えたとする[Owner.GetCitizenPlural]の目撃談をいくつか耳にした。 ほとんどの場合は一度きりの出没で終わるのに対し、 ある一か所のみ、 頻繁な出現が確認されているとして注目を浴びている。 [Owner.GetPhantomPresenceExtra]\n\nその亡霊は、 鉱物が豊富な洞窟群の入り口付近に姿を現すことが判明している。"
 shroud.2305.extra: "そこにはこの幽霊を一目見ようと、 大勢の人々が集まるようになってきているようだ。"
 shroud.2305.extra_spiritualist: "なんでもそこに現れる幽霊は、 我が国の古い宗教伝統で語られている聖なる存在に似ているらしい。"
 shroud.2305.a: "調査するべきサイオニック現象だ。"
 shroud.2305.a_spiritualist: "賛美するべき奇跡だ。"
 shroud.2305.b: "この文化財をいたずらに乱してはならない。"
 shroud.2305.b_spiritualist: "この聖地をいたずらに乱してはならない。"
 shroud.2305.c: "一帯を露天掘りしろ。"
 # A3
 shroud.2310.name: "サイオニック・パラサイト"
 shroud.2310.desc: "予想外の気象現象が§H[Owner.Capital.GetName]§!で発生した。 サイオニック・エネルギー値が特に高い地域を嵐のようなものが襲った直後、 現地に生息する一部の動物たちが奇妙な寄生虫に感染していることが明らかになった。 調べたところ、 これらの寄生虫は脳器官に侵入し、 時間をかけてそれを喰らう特性を持っているようだ。\n\nこの感染症が進行すると、 宿主は一時的に初歩的なテレキネシス能力を開花させ、 最終的に力を使い果たしてしまうまでの間、 これを狩りや食事に活かすようになる。\n\n[Owner.GetShroudParasitesEnding]"
 shroud.2310.ending_biological: "興味深いことに、 この寄生虫は入念な処理を施すことで安全に食せることもわかった。 様々な栄養が豊富に摂取できることから、 いずれ健康かつ安価な食材として市民にも提供できるようになるかもしれない。"
 shroud.2310.ending_lithoid: "興味深いことに、 この生物は無機化合物が豊富な物質を大量に分泌していることから、 新たな鉱物合成の手段を提供してくれる可能性がある。"
 shroud.2310.ending_machine: "興味深いことに、 この生物は高い可燃性を持つ膨大な量の物質を分泌していることから、 バイオエネルギーを効率よく生産する手段を提供してくれる可能性がある。"
 shroud.2310.a: "貴重な研究対象だ。"
 shroud.2310.b_organic: "タダで手に入る食料に勝るものはない。"
 shroud.2310.b_machine: "収穫プロトコルを開始せよ。"
 shroud.2310.c: "なんとも素晴らしい新生命体の存在が明らかになったものだ。"
 # A4
 shroud.2315.name: "物質の具現化"
 shroud.2315.desc: "新たなサイオニック技術の実験中に集団で瞑想を行っていたところ、 想定外の物質化現象を目の当たりにすることになった。 全員で一点に意識を集中させたことで、 一瞬ではあるが奇妙かつ注目に値する物体を出現させることができたのである。\n\n代償としてかなりの力を消費するものの、 鍛錬を積み続けることで、 そのときどきの我々の目的に沿った物質を具現化できるようになるかもしれない。 ただ、 こうした物体がどこからやってきて、 引き換えとしてどんな対価を要求されるかなどは依然未知数だ。"
 shroud.2315.a: "この力で我々の願いを叶えていこう。"
 shroud.2315.b: "滋養をつけるためにこの力を使おう。"
 shroud.2315.c: "この力で艦隊を強化するとしよう。"
 # A5a
 shroud.2320.name: "超能力を使った分身術"
 shroud.2320.desc: "超能力を有する[Owner.GetIndividualNamePlural]が、 バイロケーション (同時刻に2つの場所に物理的に存在できること) できるという噂が広まっている。 この信じがたい主張の真偽を確かめるべく、 [Owner.GetResearchers]を派遣してみたが、 驚くべきことに噂は真実だったことが発覚した。 [Owner.GetPsionicDoublingExtra]\n\n目下我々の一族で、 この非凡な能力に恵まれている者は一握りしかいないが、 今後さらに研究を進めていければ、 他の者たちにも同じ能力を開花させる訓練方法を確立できるかもしれない。"
 shroud.2320.extra: "\n\n短い間だが、 一度に2つの異なる星系に存在してみせるという芸当を、 繰り返し披露してみせた能力者たちにとって、 物理距離はまったく障害にならないようだ"
 shroud.2320.extra_organic: "$shroud.2320.extra$。 それだけに留まらず、 各々が独立した行動を取る2つの肉体は、 精神のつながりを維持している様子だった。"
 shroud.2320.extra_machine: "$shroud.2320.extra$。 それだけに留まらず、 各々が独立した行動を取る2つのユニットの間には、 サイオニック・プロセシング・リンクも確認された。"
 shroud.2320.extra_default: "$shroud.2320.extra$。"
 shroud.2320.a: "銀河内での新たな協力の道が開けそうだ。"
 shroud.2320.b: "これこそ力を真に誇示する方法だ。"
 shroud.2320.c: "複数の惑星の統治を可能にする発見だ。"
 shroud.2320.d: "なんと興味深い力か！"
 # A5b
 shroud.2325.name: "サイオニック観測"
 shroud.2325.desc: "[Owner.GetAdjective]人口の内の少数ではあるものの、 通常の知覚範囲外の距離にいる存在を感じ取る、 テレスシージア (遠隔透視能力) という驚くべき超能力の発現が確認された。 遠隔透視者たちは、 これといった特別な訓練を必要とせず、 遠方にある物体の特徴を驚くほど詳細かつ正確に語ることができる。\n\nこうした能力を制御し、 強化することができれば、 §H[Owner.GetName]§!は大きな功績をあげられるだろう。 我が国最高の[Owner.GetTelepathPlural]の力に頼りながらこの技術に磨きをかけ、 重要な事業のために集中的に活用できるように努めるとしよう。"
 shroud.2325.a: "この力で身近な者たちの秘密を解き明かすのだ。"
 shroud.2325.a_tt: "接触したことのあるすべて帝国の情報：§G+10§! "
 shroud.2325.b: "この力で宇宙の最果てまで解き明かすのだ。"
 shroud.2325.c: "この力で敵の弱点を見極めるのだ。"
 shroud.2325.d: "この力でより深い資源鉱床を見つけるとしよう。"
 # Balanced Events
 # B1
 shroud.2400.name: "資材の変動"
 shroud.2400.desc: "現在我が国では、 各種資材が驚異的な速さで失われていっている。 工場や倉庫の無機物の在庫が、 実際の使用量を上回る速度で底を尽こうとしているのだが、[Owner.GetMatterInFluxExtra]。 また、 材料の枯渇が確認されている場所では、 サイオニック活動量の増加が認められていたことから、 なんらかの関連性があるものと考えられる。\n\n資材が保管されている場所付近でのサイオニック活動を中断する措置を取ることもできるが、 実施すれば超能力研究に遅れが生じることとなり、 サイオニック能力の産業への適用にも制限がかかってしまう。 これ以外にはサイオニック・フィールド・アッテニュエイターを開発するという案もあり、 成功すれば非物質化に歯止めをかけられる見込みだ。 いずれにせよ、 このまま何もせずにいれば、 我が国における超能力研究は衰退の道をたどることになってしまうだろう。"
 shroud.2400.desc_default: "原因は盗難や無能さによるものではなく、 自発的な非物質化だと報告されている"
 shroud.2400.desc_gestalt: "原因は逸脱行動や無能な挙動などによるものではなく、 自発的な非物質化だと報告されている"
 shroud.2400.a: "有形財の枯渇など取るに足りない問題だ。"
 shroud.2400.b: "非物質化を止める機器を開発せよ。"
 shroud.2400.c: "超能力の使用禁止区域を設けよう。"
 # B2
 shroud.2405.name: "死者の頭"
 shroud.2405.desc: "民衆の超能力に対する好奇心が、 秘密裏に死者の[Owner.GetSpeciesBrainPlural]を保管し、 交信を試みるという奇行につながっているようだ。\n\n実践者は、 認識情報が[Owner.GetDeathName]を乗り越えられると信じているらしく、 この思想の元となっているのは、 超能力をエネルギーの一種とみなしている科学的理論だ。 つまり、 超能力は変換こそ可能だが、 不滅であるというのが彼らの持論なのである。 また依然少数ながら、 超能力を有する[Owner.GetIndividualName]の死が、 亜空間につながる微小な裂け目――すなわち、別次元を覗ける窓を作り出すと信じている人口の割合も増えつつある。\n\n画期的な研究は確かに称えられるべきだが、 このように[Owner.GetDeceasedAdj]の一部に干渉する行為には、 倫理的な問題がついて回ることも否定できない。 またこれに加えて、 犯罪的な手段で脳を盗む死体泥棒が増加傾向にあるとの報告も上がっている。"
 shroud.2405.a: "必要な規制さえ設ければ、 結構な試みではないか。"
 shroud.2405.b: "死者には安らかな眠りが約束されるべきだ。"
 shroud.2405.c: "死者の[Owner.GetSpeciesBrainPlural]が皆に行き渡るようにしよう。"
 # B3a
 shroud.2410.name: "超能力による変容"
 shroud.2410.desc: "我が国の超能力者の多くが、 奇妙な関節肢を生やすようになった。 [Owner.GetScientistPlural]によると、 不可思議な形をしたそれは、 広範囲における自然発生的な[Owner.GetGeneticMutationName]によって引き起こされたものとのことだった。 つまり、 超能力による活動は能力者の肉体に、 変化をきたすものであることが判明したのである。 こうした突起物が生えるのを未然に防ぐことはできないものの、 超能力を駆使することで、 その成長速度を制御することは可能なようだ。\n\n初めは[Owner.GetDistressName]する者も多いが、 この余分に生えた部位は驚くほど使い勝手のいいもので、 生産的に利用することができれば、 その認知的負荷を補って余りあるものとなるかもしれない。"
 shroud.2410.a: "必要な規制さえ設ければ、 結構な試みではないか。"
 shroud.2410.b: "忌まわしい。 すべて取り払え。"
 shroud.2410.c: "衝撃的だが、 非常に興味深くもある。 変化を受け入れるとしよう。"
 # B3b
 shroud.2415.name: "テレキネシス[Owner.GetEthicsPluralCap]"
 shroud.2415.desc: "我が国の[Owner.GetScientistPlural]が、 超能力を運動エネルギーに変換する方法を確立し、 今[Owner.GetEngineerPlural]と連携して同テクノロジーの実用化に向けて動いている。\n\n各種産業への適用が期待される一方、 これが社会にどのような影響をもたらすのかは未知数だ。 超能力を有する一部の優れた[Owner.GetIndividualNamePlural]が、 複雑な機械のネットワークの動力と操作を司るとなれば、 大勢の[Owner.GetWorkerNamePlural]の存在意義が失われる危険がある。 [Owner.GetTelekineticEthicsExtra] 依然として超能力を究める道のりの途中にあることを考えれば、 細心の注意を払ってことを進めるのが最善と思われる。"
 shroud.2415.extra: "未だ超能力の可能性を受け入れようと奮闘している現状において、 無暗にこのような習慣が広まってしまえば、 社会不和につながる懸念も拭えない。"
 shroud.2415.extra_gestalt: "このような習慣が無暗に広まってしまえば、 居場所を失くしたドローンたちが新たな目的を見つけるまでの間に、 逸脱行為に走ることになりかねない。"
 shroud.2415.a: "我が国の産業を繁栄させるのだ。"
 shroud.2415.b: "軍事利用を考えればいい。"
 shroud.2415.c: "このテクノロジーは制限されるべきだ。 物理労働のほうが確実だろう。"
 # B4
 shroud.2420.name: "止まらない痛み"
 shroud.2420.desc: "[Owner.GetAcuteMigrainePlural]の突発的な大流行が、 我が帝国を襲った。 その深刻度には大きな幅があるものの、 すでに人口の大部分がこの症状に悩まされており、 §H[Owner.GetName]§!の広範囲で混乱が起きている。\n\n特に強力な超能力を有する一部の[Owner.GetIndividualNamePlural]にいたっては、 症状が一際顕著で、 予備的な統計分析においても超能力の適性と、 症状の重さの間に相関関係が認められている。 [Owner.GetAGrowingPainExtra]"
 shroud.2420.extra_default: " また、 従来の処置では効果がないことも立証されており、 この痛みはどうやら、 我々がようやくわずかに理解しかけている異次元の通信路から、 直に超能力に影響を及ぼしているようだ。"
 shroud.2420.extra_machine: ""
 shroud.2420.a: "なんとかして、 この痛みに耐えられるようにならなくては。"
 shroud.2420.b: "より強力な鎮痛剤を配布するのだ。"
 shroud.2420.b_machine: "防御機能のアップグレードプログラムを配布するのだ。"
 shroud.2420.c: "痛みを力に変えるのだ。"
 shroud.2420.c_machine: "この逆境を力に変えるのだ。"
 # B5
 shroud.2425.name: "サイオニック・アンダーグラウンド"
 shroud.2425.desc: "[Owner.GetPsionicUndergroundIntro]超能力の[Owner.GetIndividualNamePlural]集団が、 違法な格闘技において自らの超能力を利用している。 そこでは超能力を持つ戦士たちが、 名誉や栄光のために戦っているという。 元々優れた戦士ゆえに、 多くの訓練を必要としない関係者が多数見受けられる一方、 [Owner.GetPsionicUndergroundExtra]\n\n[Owner.GetPsionicUndergroundEnd]"
 shroud.2425.intro: "孤立した"
 shroud.2425.intro_gestalt: "逸脱した"
 shroud.2425.extra: "戦闘用の超能力を操る国家プログラムから脱落した者たちも混ざっているようだ。"
 shroud.2425.extra_gestalt: "単に戦闘用の超能力の扱いに長けている者たちも混ざっているようだ。"
 shroud.2425.end: "この一件は、 我が国の法律や制度が現状に対応しきれていないことを表している。 こうした暴力的な試合は現在、 違法な賭博を通じて犯罪組織を支えている状況だが、 この活動に介入し、 国家の管理下に置く方法もいくつか考えられる。"
 shroud.2425.end_gestalt: "逸脱行為にはそれなりのリスクが伴うものだが、 こうした活動の存在を知ったことで、 物理的戦闘のデータセットを収集するための、 実用的かつ新しい手法を導入できるようになった。"
 shroud.2425.end_gestalt_organic: "$shroud.2425.end_gestalt$ 節度さえ保てれば、 我が集合体にとって平時に抑圧された攻撃性の都合のいいはけ口として、 こうした興奮を伴う活動を利用するのも一案かもしれない。"
 shroud.2425.end_gestalt_machine: "$shroud.2425.end_gestalt$ より厳重なテストパラメータを設定することで、 こうした“ゲーム”を集合体の利益のために活用することができるかもしれない。"
 shroud.2425.a: "この者たちを兵士として徴集しろ。 きっと役に立つだろう。"
 shroud.2425.a.tt: "§Y[event_target:spawn_system.GetName]§!で§Y$psionic_army_plural$§!を3部隊獲得する。"
 shroud.2425.b: "この超能力を用いた戦闘を観察せよ。"
 shroud.2425.c: "この愚かな暴力行為を止めなければならない。"
 shroud.2425.d: "この活動を観戦スポーツとして合法化しよう。"
 shroud.2425.d_gestalt: "公開競技として、 存在を正式に認めよう。"
 # Chaotic Events
 # C1
 shroud.2502.name: "シュラウドフォール"
 shroud.2502.desc: "§H[This.GetName]§!の特定区域で、 突発的な環境の変化が生じているとの報告が入った。\n\n大気がゲル状の蒸気で重くなり、 油状の降水が地面を覆っているとのことで、 超能力を有する[Owner.GetIndividualNamePlural]は、 これを“シュラウドフォール”と呼んでいる。 さらに近辺全土では、 超能力の発現が阻害されるとの情報もある。\n\nシュラウドフォールの中は、 [This.Owner.GetShroudfallExtra]環境であるとされ、 土地の回復に投資しない限り、 住民はこの急激な変化を遂げた地に順応するより他なくなる。"
 shroud.2502.extra_default: "感覚を持つ生命体にとって極めて危険な"
 shroud.2502.extra_machine: "我々の神経回路に問題を引き起こす"
 shroud.2502.extra_homicidal_hive: "[Owner.GetSpeciesNamePlural]にとって危険な"
 shroud.2502.a: "このままシュラウドに土地を喰わせてしまおう。"
 shroud.2502.b: "なんとかして環境を回復する方法を見つけるのだ。"
 shroud.2502.c: "事態が落ち着いてしまう前に、 この珍しい物質を収穫しておけ。"
 # C2
 shroud.2505.name: "制御不能"
 shroud.2505.desc: "同胞の中に突然態度が変わり、 それまでとは違う意見を主張したり、 異なる習慣や行動を見せたりする者たちが現れた。 多くの[Owner.GetWorkerNamePlural]が働くことをやめ、 [Owner.GetOutOfControlExtra]。\n\nこうした症状が確認されている者たちは、 いずれも自身の意識に宿る名前のない存在の指示に従っていると主張しており、 どうやらその声に一挙手一投足を操られている様子だ。 これからも超能力を駆使しながら未来を築いていくにあたり、 [Owner.GetOutOfControlPsyche]に影響を及ぼす異次元の力に充分注意しなければならない。"
 shroud.2505.extra_default: "忠実だったはずの議員たちもさまざまな異議を唱えるようになっている"
 shroud.2505.extra_machine: "これまで頼りにしていた管理ユニットたちも、 準最適な機能しか見せなくなっている。"
 shroud.2505.psyche_default: "[Owner.GetAdjective]の民の精神に"
 shroud.2505.psyche_machine: "我々の論理回路に"
 shroud.2505.a: "こうした衝動を和らげる術を学んでいこう。"
 shroud.2505.b: "その声からは多くのことが学べそうだ。"
 shroud.2505.c: "我々の権威を脅かすものだ。 撲滅しろ。"
 # C3
 shroud.2510.name: "脳への過負荷"
 shroud.2510.desc: "[Owner.GetNeuralOverloadIntro]\n\n広範囲で検査を行ったところ、 人口の大部分が [Owner.GetNeuralOverloadExtra]ことが判明し、 [Owner.GetPsychicAdj]活動の増加が原因ではないかと見られている。 というのも、 制御できていない超能力による活動において、 急激にエネルギーを解放してしまうと、 症状の急速な深刻化や死にいたる結果を招きやすいからだ。\n\n[Owner.GetMedicalAdj]を介入させずとも、 高度な瞑想技術を身につければ、 こうした活動を制御できる可能性があるが、 一部の[Owner.GetScientistPlural]からは、 [Owner.GetMedicalImplantName]を開発することで問題に対処するべきだとの意見も上がっている。"
 shroud.2510.intro_default: "§H[Owner.GetName]§!で脳が破裂する現象が急増しており、 多くの者たちが認知機能障害や死にいたっている。"
 shroud.2510.intro_machine: "§H[Owner.GetName]§!で回路がオーバーロードする現象が急増しており、 多くの個体が認知機能障害や完全な機能停止状態に陥っている。"
 shroud.2510.extra_default: "軽度かつ無症状の動脈瘤を引き起こしている"
 shroud.2510.extra_machine: "回路に加重負担を強いられている状態にある"
 shroud.2510.a: "強者が生き延びれば、 それで良い。"
 shroud.2510.a_tt: "所有している各植民地において、 100£pops£ §YPOP§!を失う確率：§R33%§!"
 shroud.2510.b: "[Owner.GetImplantName]に投資しよう。"
 shroud.2510.c: "瞑想を通じて心を静めるとしよう。"
 shroud.2510.c_corporate: "サイオニック・シナジー訓練の予定を組め。"
 # C4
 shroud.2515.name: "[Owner.GetNightmaresName]"
 shroud.2515.name_organic_non_gestalt: "悪夢"
 shroud.2515.name_others: "夢の発現"
 shroud.2515.desc: "周囲のサイオニック・フォースと同調すればするほど、 [Owner.GetAdjective]の民が[Owner.GetHorrifyingNightmarePlural]に苦しめられる事態となっている。\n\n[Owner.GetNightmaresExtra]\n\n[Owner.GetNightmaresEnding]"
 shroud.2515.extra_default: "悪い夢を見ることはもはや当たり前の日常となっており、 休息のための時間が、 心の休まらない無意識状態になるだけの時間に置き換わって久しい。 悪夢に苦しむ者たちは、 いずれも原始的な恐怖を体現した、 この世のものならざる恐ろしく奇妙な映像を見たと振り返る。"
 shroud.2515.extra_gestalt: "おそらく我々が体験しているのは、 単一意識の者たちがいうところの“夢”というものだ。 この現象に苦しむ者たちは、 いずれも我々の集合体を根幹から揺るがす脅威を象徴する、 この世のものならざる奇妙な映像を見たと語る。"
 shroud.2515.extra_machine: "“夢”を見ることはもはや当たり前の日常となっており、 休息のための時間が、 混沌としたデータストリームが流れ込んでくる時間に置き換わって久しい。 悪夢に苦しむ者たちは、 いずれも自身の健全な状態が極度の危険に晒されるような、 この世のものならざる奇妙な映像を見たと振り返る。"
 shroud.2515.end_organic: "各医療機関では、 人々に押し寄せる精神的疲労の波をせき止めようと奮闘がなされている。"
 shroud.2515.end_machine: "現在メンテナンスユニットたちが、 神経ネットワークの疲労を引き起こす波をせき止めようと奮闘している。"
 shroud.2515.a_organic: "精神科学薬で落ち着かせてやれ。"
 shroud.2515.a_machine: "サイオニック・プロセッサをアップグレードして、 この混乱を鎮めよう。"
 shroud.2515.b: "この危機的状況を打破するために、 担当研究者を手配しろ。"
 shroud.2515.c: "悪夢に我々を傷つけることはできない。"
 # C5
 shroud.2520.name: "恐るべき襲撃"
 shroud.2520.desc: "§H[Owner.Capital.GetName]§!が現地の野生動物の集中攻撃に遭った。 奴らは我々の民や建物を襲撃した挙句、 貴重な備蓄食料まで食い尽くしてしまった。\n\n武装した巡回兵や門限で民衆を守ろうとしたものの、 限られた成果しかあげることができないなか、 [Owner.GetResearchers]が§H[Owner.Capital.GetName]§!のある一点にて、 我々のいる現実と§Hシュラウド§!との間に極小の裂け目が生じていたことを立証し、 ここからサイオニック・エネルギーが流れ込んできたせいで、 これまで無害だったはずの獣たちが獰猛な捕食者に変貌したのだと結論づけた。 この脅威に立ち向かうなら、 その一点に全力を注ぐのが最善の一手と思われる。"
 shroud.2520.a: "攻撃の拠点となっている場所を絨毯爆撃しろ。"
 shroud.2520.b: "超能力を駆使して、 その場所を封印するのだ。"
 shroud.2520.c: "この群れを落ち着かせるためにも、 シュラウド研究を減速させよう。"
 shroud.2520.c_tt: "§Y$situation_breach_shroud$§! $situation_speed_tt$：§R-25%§!"
 shroud.2520.d: "シュラウドは驚きに満ちている。 互いに干渉せずに生きるしかない。"
 # Social Events
 # S1
 shroud.2600.name: "優越感"
 shroud.2600.desc: "民衆の間の超能力の格差が、 新たな形の社会的対立を引き起こしている。\n\n新しく発見された力をより巧みに操れる者たちが、 自身を上位の存在と認識するようになり、 それゆえに政治的および経済的特権が与えられて然るべきだとまで考えるようになっているようだ。 彼らの分断を煽る発言は日に日に攻撃性を増しており、 いつ暴力沙汰に発展してもおかしくない状態だ。"
 shroud.2600.a: "このような傲慢は許されない。"
 shroud.2600.b: "より優れた能力を持つ者には、 より多くの褒美が与えられて然るべきだ。"
 dissidents_silenced_modifier: "反体制派の鎮圧"
 dissidents_silenced_modifier_desc: "超能力に基づく特権を制限することで、 政情不安の高まりを可能な限り抑える。"
 psionic_superiority_modifier: "優れた超能力の優遇"
 psionic_superiority_modifier_desc: "優れた超能力者の特別待遇を認める。"
 # S2
 shroud.2605.name: "反超能力感情"
 shroud.2605.desc: "超能力の可能性を探る継続的な努力や、 この力を受け入れることに対する反対運動が規模を増している。 こうした反体制派の者たちは超能力者を、 より厳重な監視下に置くよう主張すると同時に、 この分野における研究の全面的な中止を要求してきている。\n\nこのまま彼らの活動を野放しにすれば、 せっかく発現した超能力の理解増進や習得に遅れを生じさせる危険がある。"
 shroud.2605.a: "この反対勢力を潰せ。"
 shroud.2605.b: "どうにかして宥めろ。"
 dissenters_repressed_modifier: "反体制派の鎮圧"
 dissenters_repressed_modifier_desc: "反超能力のイデオロギーにかまっている暇はない。"
 performative_pluralism_modifier: "見せかけの共存"
 performative_pluralism_modifier_desc: "表面的にあらゆる超能力者の共存を掲げることで、 効率よく反対意見を鎮圧できる。"
 # S3
 shroud.2610.name: "不正行為"
 shroud.2610.desc: "皆の超能力が強化されていくにつれて、 巷での搾取、 詐欺、 不正行為などの報告件数も増加の一途をたどっている。 少数ながらも相当数の[owner.GetSpeciesNamePlural]が、 新たに発現した能力を悪用していることはもはや明白だ。\n\n現在怒りに駆られた被害者たちが、 超能力を使った犯罪のより厳重な取り締まりを求めて、 既存の法律の全面的な見直しを要求している。"
 shroud.2610.a: "そんな法律を制定すれば、 我々の進化に遅れが生じる。"
 shroud.2610.b: "民衆は守られねばならない。"
 psionic_crime_modifier: "超能力犯罪"
 psionic_crime_modifier_desc: "進歩の代償として、 ある程度の超能力の悪用は仕方のないことだ。"
 psionic_crime_crackdown_modifier: "超能力犯罪の取り締まり"
 psionic_crime_crackdown_modifier_desc: "超能力社会に相応しい、 革新的な法制度を新たに築く必要がある。"
 # S4
 shroud.2615.name: "無謀な実験"
 shroud.2615.desc: "民衆が新たに発現した力に順応していくなか、 一部の[owner.GetSpeciesNamePlural]が、 超能力の開発を加速させるため、 かなりの危険を伴う行動に出始めている。\n\n闇市で売られているような[owner.GetMentalUpgrade]の使用率が激増している他、 違法な[owner.GetMedicalFacility]では、 超能力の最大化を謳った根拠のないサービスが幅広く提供されている状況にある。 こうしたリスクを冒した者たちが、 この先どのような代償を支払うことになるのかは、 現時点では予測不能だ。"
 shroud.2615.a: "こうした実験を通じて、 我々の研究を進めることができるかもしれない。"
 shroud.2615.b: "違法な[owner.GetMedicalFacilityShortPlural]は閉鎖に追い込まねばならない。"
 psionic_experimentation_modifier: "超能力実験"
 psionic_experimentation_modifier_desc: "立証されていない実験方法で、 超能力を強化することが当たり前に行われる。"
 self_experimentation_controls_modifier: "自己実験の規制"
 self_experimentation_controls_modifier_desc: "民衆による、 違法な超能力の自己実験の実施を禁止する。"
 # S5 (gestalt)
 shroud.2620.name: "超能力の分離"
 shroud.2620.desc: "今、 [owner.GetName]全土で懸念を引き起こす分離行動が確認されている。 サイオニックドローンが同族だけで物理的に固まり、 ときどき[owner.GetHiveEntity]全体と距離を取るようになっているのである。\n\n[owner.GetMentalAdj]には集合体の一部として存在し続けているものの、 今回のような説明のつかないドローンたちの物理的挙動によって、 超能力を強化した先にたどり着く未来に伴う代償について、 厄介な問題が提起されるようになっている。"
 shroud.2620.a: "この現象を注意深く観察するのだ。"
 shroud.2620.b: "サイオニックドローンの行動を制限しろ。"
 psionic_cluster_gestalt_modifier: "サイオニッククラスター"
 psionic_cluster_gestalt_modifier_desc: "サイオニックドローンの異常挙動を観察することで、 研究の発展に貢献する。"
 restricted_movements_gestalt_modifier: "行動制限"
 restricted_movements_gestalt_modifier_desc: "調和の名のもとに、 サイオニックドローンの行動には制限を設けなければならない。"
 # S5 (non-gestalt)
 shroud.2621.name: "超能力者の追放"
 shroud.2621.desc: "今、 [owner.GetName]全土で懸念を引き起こす分断が確認されている。 超能力者たちの社会的排除が深刻化したことで、 彼らが自ら世間との距離を取るようになり、 自分たちだけのコミューンを遠隔地に築くようになったのである。\n\n超能力を持たない者がそこを訪れると、 肉体的には無傷な一方で、 精神的には説明し難い混乱をきたした状態で帰還することが報告されている。"
 shroud.2621.a: "$shroud.2620.a$"
 shroud.2621.b: "超能力者の行動を制限しろ。"
 psionic_cluster_modifier: "サイオニック・コミューン"
 psionic_cluster_modifier_desc: "超能力の異常挙動を観察することで、 研究の発展に貢献する。"
 restricted_movements_modifier: "$restricted_movements_gestalt_modifier$"
 restricted_movements_modifier_desc: "調和の名のもとに、 超能力者の行動には制限を設けなければならない。"
 # S6 (organic)
 shroud.2625.name: "サイオニック病"
 shroud.2625.desc_common: "しかしながら、 現在進められている研究によって、 この異例の超能力現象が様々な形で利用できるものであることがわかった。"
 shroud.2625.desc: "今、 [owner.GetName]全土において、 罹患者が脳器官を損傷する新たな病が蔓延している。\n\n発症者は、 特に強い超能力を有する[owner.GetIndividualNamePlural]に限られ、 多くの場合はそのまま死にいたる。\n\n$shroud.2625.desc_common$"
 shroud.2625.a: "医療利用を優先するのだ。"
 shroud.2625.b: "病を兵器化しろ。"
 therapeutic_psionics_organic_modifier: "超能力の医療利用"
 therapeutic_psionics_organic_modifier_desc: "蔓延したサイオニック病が、 新たな医療技術開発のきっかけとなる。"
 weaponized_psionics_modifier: "超能力の兵器化"
 weaponized_psionics_modifier_desc: "超能力は、戦場における新たな戦略の糸口となり得る。"
 weaponized_psionics_gestalt_modifier: "$weaponized_psionics_modifier$"
 weaponized_psionics_gestalt_modifier_desc: "$weaponized_psionics_modifier_desc$"
 # S6 (machine)
 shroud.2626.name: "超能力障害"
 shroud.2626.desc: "[owner.GetName]中で説明のつかない不具合が急増している。 住民の神経プロセッサが突如、 警告もなく故障しはじめたのだ。\n\n興味深いことに、 この症状は強い超能力特性を備えた[owner.GetIndividualNamePlural]にしか現れていない。 そして多くの場合、 単なる混乱ではなく破壊的な結果を引き起こしている。\n\n$shroud.2625.desc_common$"
 shroud.2626.a: "矯正アプリケーションを優先するのだ。"
 shroud.2626.b: "この脆弱性を兵器化しろ。"
 therapeutic_psionics_machine_modifier: "$therapeutic_psionics_organic_modifier$"
 therapeutic_psionics_machine_modifier_desc: "超能力に起因するハードウェア障害が、 新たなメンテナンス方法開発のきっかけとなる。"
 # S7
 shroud.2630.name: "実験失敗"
 shroud.2630.desc.common_1: "潜在的に超能力を開花できそうな[owner.GetIndividualNamePlural]を対象とした、 初期の実験は失敗に終わり、 多くの被験体が"
 shroud.2630.desc.common_2: "こうした成果にも一定の研究価値は認められるものの、 今後も同じような実験を続けることが、 発現したての超能力の理解増進につながる最善の道なのかは疑問だ。"
 shroud.2630.desc.default: "$shroud.2630.desc.common_1$論理プロセッサを破損して終わった。\n\n$shroud.2630.desc.common_2$"
 shroud.2630.desc.hive: "$shroud.2630.desc.common_1$認知機能を低下させて終わった。\n\n$shroud.2630.desc.common_2$"
 shroud.2630.desc.machine: "$shroud.2630.desc.common_1$重度の記憶障害を引き起こして終わった。\n\n$shroud.2630.desc.common_2$"
 shroud.2630.a: "実験の回数を増やすのだ。"
 shroud.2630.b: "全面的に中止しろ。"
 psionic_roll_chance_modifier: "超能力実験"
 psionic_roll_chance_modifier_desc: "超能力を解き明かすための研究に、 制限を設けてはならない。"
 population_protections_modifier: "人口保護"
 population_protections_modifier_desc: "安全でない超能力的進歩は許されない。"
 # S8
 shroud.2635.name: "共感性の発現"
 shroud.2635.desc.gestalt: "新たに発現した超能力の研究は、 [owner.GetSpeciesNamePlural]の共感能力に根本的な変化をもたらす結果となった。\n\n現段階でもすでに他の意識体の知覚、 思考パターン、 感情の模倣に数段磨きがかかっていることは明白だ。 こうした変化が、 [owner.GetName]にとって新たな強さとなるのか、 あるいは弱さとなるのかは現時点では未知数だ。"
 shroud.2635.desc.default: "新たに発現した超能力の研究を続けていく内に、 この力を他の意識体への、 より高い共感的理解を示すために使おうとする新たなコミュニティが形成された。\n\nこの共同体は超能力を開花させたことによって、 他者の知覚、 思考パターン、 感情などを高い洗練性でもって模倣するが可能になったと名言している。 そうした活動が、 最終的に[owner.GetName]の利益となるのか、 あるいは弱体化につながることになるのかは現時点では未知数だ。"
 shroud.2635.a: "これは新たな学びの機会だ。"
 shroud.2635.b: "これは我々の脆弱化につながる。"
 empathetic_initiative_modifier: "共感性を活かした新たな取り組み"
 empathetic_initiative_modifier_desc: "超能力が持つ性質によって、 他者の思考や心が理解しやすくなり、 外部とのより洗練された交流が可能になる。"
 empathetic_initiative_opinion_tooltip: "£opinion£ 接触済みのすべての帝国の$OPINION$：§G+$@empathetic_initiative_value|0$§!"
 opinion_empathetic_initiative: "$empathetic_initiative_modifier$"
 cautious_progress_modifier: "慎重な進化"
 cautious_progress_modifier_desc: "帝国の安全のため、 予測不能な超能力の開発は規制されるべきだ。"
 # S9
 shroud.2640.name: "異端な超能力者"
 shroud.2640.desc.common_1: "超能力が発展していくにつれて、 同胞の中から新たに身につけた力の重みに苦しむ者たちが出てきた。 そうした[owner.GetIndividualNamePlural]は"
 shroud.2640.desc.common_2: "研究によればこうした不安定性は欠陥ではなく、 むしろ症状を患っている[owner.GetSpeciesNamePlural]が、 超能力を卓越した効率性でもって操れることを示すものだ。 適切な訓練さえ施せば、 超能力を次の段階に進化させた模範的な個体となる可能性すらあるが、 この新たな力を使いこなそうとするあらゆる試みには、 それなりの危険が内在しているのもまた事実だ。"
 shroud.2640.desc.gestalt: "$shroud.2640.desc.common_1$、 集合体から切り離されると、 懸念を引き起こすレベルでの逸脱行動に走るようになる。\n\n$shroud.2640.desc.common_2$"
 shroud.2640.desc.default: "$shroud.2640.desc.common_1$、 危険な手段での自己抑圧に走るため、 心配になるレベルでの自己破壊行動に出てしまう傾向にある。\n\n$shroud.2640.desc.common_2$"
 shroud.2640.a: "彼らの類稀な能力を有効利用するのだ。"
 shroud.2640.a.tt: "各植民地でランダムな建造物が破壊される。"
 shroud.2640.b: "この異常性は抑圧されるべきだ。"
 psionic_specialization_modifier: "超能力への特化"
 psionic_specialization_modifier_desc: "超能力のスペシャリストとなる厳しい訓練を通じて、 生産性が大きく向上した。"
 psionic_suppression_modifier: "超能力の抑圧"
 psionic_suppression_modifier_desc: "公益を脅かす危険のある者は、 同胞と言えど抑え込まねばならない。"
 psionic_suppression_gestalt_modifier: "$psionic_suppression_modifier$"
 psionic_suppression_gestalt_modifier_desc: "$psionic_suppression_modifier_desc$"
 # Stage Events
 # Mind over Matter
 shroud.2750.name: "超能力アセンション"
 shroud.2750.desc_p1: "太古の昔から、 [This.GetSpeciesNamePlural]が驚異的な力を操っていたとされる話が語り継がれてきた。 その力は他者の心に侵入したり、 念じるだけで重い物体を持ち上げるなど、 ありとあらゆる超常的な妙技の披露を可能にするものだった。"
 shroud.2750.desc_p1_hive_mind: "かつて逸脱行動が蔓延していた時代には、 [This.GetSpeciesNamePlural]が驚異的な力を操っていたとされる話が語られてきた。 その力は集合体に属さない者たちの心に侵入したり、 念じるだけで重い物体を持ち上げるなど、 ありとあらゆる超常的な妙技の披露を可能にするものだった。"
 shroud.2750.desc_p1_machine: "最初期のデータセットを構成していた頃から、 一部のユニットによって、 [This.GetSpeciesNamePlural]が驚異的な力を操っていたとの記録が遺されてきている。 それは機械や有機生命体の思考への侵入や、 内部処理のみでの物体の操作をはじめとする、 通常では考えられないような幅広い機能の実行を可能にするものだった。"
 shroud.2750.desc_p1_unplugged: "まだ歴史が浅く、 暴力の積み重ねでしかない我々の文明だが、 ときとして[This.GetSpeciesNamePlural]は想像力を働かせ、 自分たちが驚異的な力を操る種であることを語って聞かせることがあった。 その力は心を読んだり、 念じるだけで重い物体を持ち上げるなど、 ありとあらゆる超常的な妙技の披露を可能にするものだった。"
 shroud.2750.desc_p2: "そして今、 [This.GetScientistPlural]は一部の[This.GetSpeciesNamePlural]が、 現実にそうした精神の力を扱えるという決定的な証拠を見つけるにいたった。 だが現段階で、 この“サイオニック”能力を発現できている者は、 [This.GetSpeciesWord]のごく少数に留まる。"
 shroud.2750.desc_p2_unplugged: "多くの者たちは、 我々が[origin_unplugged_assimilator_empire.GetName]に取り込まれる以前から、 こうした架空の物語を語り継いできたと認識しているものの、 その内容を本当に信じている者はごくわずかだ。$shroud.2750.desc_p2$"
 shroud.2750.desc_p3: "[This.GetMindOverMatterEnding]"
 shroud.2750.desc_p3_default: "この力はどうやら、 我々の潜在能力を最大限に発揮する鍵となるものらしい。 この眠った能力を、 [This.GetAdjective]社会の全員が呼び起こすことができれば、 いつか通常の理解の範囲を超えた先にある、 異次元の支配者となれる日がやってくるかもしれない。"
 shroud.2750.desc_p3_crisis_4_5: "我々の中にはすでに、 §Hシュラウド§!から引き出したサイオニック・エネルギーが注ぎ込まれている。 このまま[This.GetAdjective]社会の全員が超能力に目覚めることができれば、 我々に宿る潜在能力を遺憾なく発揮できるようになるだろう。"
 shroud.2750.desc_p3_origins: "§Hシュラウド§!が及ぼす影響のことを考えれば、 サイオニック・フォースは我々にとって決して未知の力ではない。 [This.GetAdjective]社会の全員が超能力に目覚めることができれば、 我々の中に眠る潜在能力を遺憾なく発揮できるようになるだろう。"
 shroud.2750.a: "$utopia.2600.a$"
 shroud.2750.a.tt: "§Hシュラウド§!タブをアンロックする。"
 # Establishing the Psi Corps
 shroud.2760.name: "$building_psi_corps$の設立"
 shroud.2760.desc_p1: "我々の潜在能力が超能力として完全覚醒していくなか、 社会全体が急激に発現し始めた新しい力や習慣に伴う、 いくつもの変化に直面している。 しかしこんなものはまだ序の口で、 我々が築きつつある文明の対価のほんの一部でしかないのだろう。"
 shroud.2760.desc_p2_psi_corps: "§H$building_psi_corps$§!を設立して以来、 我々は優秀な超能力を持つ[GetIndividualNamePlural]たちの力を開発し、 それらを駆使することで、 こうした前例のない状況に対処してきた。 $shroud.2760.desc_p2_end$"
 shroud.2760.desc_p2_no_psi_corps: "こうした前例のない状況は、 優秀な超能力を持つ[Owner.GetIndividualNamePlural]たちの力を開発し、 それらを駆使することを可能にする§H$building_psi_corps$§!の設立の正当性を後押ししている。 $shroud.2760.desc_p2_end$"
 shroud.2760.desc_p2_end: "民衆の心の内を見抜ける彼らの[Owner.GetTelepathic]能力をもってすれば、 皆の安全を保障しながら超能力による活動を監督することが可能になるだろう。"
 shroud.2760.a: "PSI結社を信じよ。"
 shroud.2760.a_gestalt: "我々の信はPSI結社とともにある。"
 shroud.2760.a_no_psi_corps: "“$building_psi_corps$”を設立するとしよう。"
 shroud.2760.a_tt: "$shroud.2820.a.tt$"
 shroud.2760.a_tt_no_psi_corps: "§H$tr_psionics_psi_corps$§!の伝統を採用し、 ['building:building_psi_corps']の建造物を建設することで状況を進展させる。"
 # The Great Awakening
 shroud.2780.name: "$utopia.2650.name$"
 shroud.2780.desc_1: "我々の超能力研究は急速な進展を見せている。 言語コミュニケーションのほとんどがテレパシーに置き換わった今、 その内念で物体を操ることも同じくらい当たり前のことになるかもしれない。 [Owner.GetResearchers]によると、 全[Owner.GetSpeciesAdj]人口が眠れる力を覚醒させる日は、すぐそこまで来ているとのことだ。"
 shroud.2780.desc_1_trad: "我々はついに覚醒した。 [Owner.GetName]全土の[Owner.GetSpeciesNamePlural]が、 自身の超能力能力を完全に解放することに成功したのである。 言語コミュニケーションのほとんどがテレパシーに置き換わった今、 その内念で物体を操ることも同じくらい当たり前のことになるかもしれない。"
 shroud.2780.desc_1_gestalt_machine: "我々の超能力研究は急速な進展を見せている。 今や意思疎通において既存の手段に頼る必要はなくなり、 この他にも幅広い超能力が日常の一部と化してきている。 [Owner.GetResearchers]によれば、 全人口が眠れる力を解放できる日も近いとのことだ。"
 shroud.2780.desc_1_gestalt_machine_trad: "運命のときがきた。 ついに、 [Owner.GetName]全土の[Owner.GetSpeciesNamePlural]が、 自身の超能力を完全に解放することに成功したのである。 今や意思疎通において既存の手段に頼る必要はなくなり、 この他にも幅広い超能力が日常の一部と化してきている。"
 shroud.2780.desc_2: "心を開放したことで我々は己の内に、 そして周辺に何か言葉では説明しきれない力が、 波紋のように広がっているのを感じるようになった。 最高位の[Owner.GetTelepathPlural]たちは、 §Hシュラウド§!という原初の領域について語る。 そこは仮に意識していなくても、 超能力を有するすべての[Owner.GetIndividualNamePlural]が、 力を引き出している場所であり、 またサイオニック・エネルギーのみで構成された強い力を持つ存在が住まう場所でもあるらしい。 それらは暗い部屋に響く、 くぐもった囁き声のように我々の脳内に直接呼びかけている。"
 shroud.2780.desc_2_crisis: "心を開放したことで我々は己の内に、 そして周辺に言葉では説明しきれない§Hシュラウド§!の力が、 波紋のように広がっているのを感じるようになった。 そこは仮に意識していなくても、 超能力を有するすべての[Owner.GetIndividualNamePlural]が、 力を引き出している場所であり、 またサイオニック・エネルギーのみで構成された強い力を持つ存在が住まう場所でもあることを、 今の我々は知っている。 それらは暗い部屋に響く、 くぐもった囁き声のように我々の脳内に直接呼びかけている。"
 shroud.2780.desc_3: "皆で感覚を研ぎ澄ませる努力を重ねれば、 これらの存在との交信も可能になるかもしれない。 だが、 そのためにはまず、 我々が存在するこの次元とシュラウドの間にある隔たりを突破する術を学ぶ必要がある。"
 shroud.2780.desc_3_chosen: "皆で感覚を研ぎ澄ませる努力を重ねれば、 我々の次元とシュラウドの間にある隔たりを突破し、 その内部に存在する者ともっと深く交流できるかもしれない。"
 shroud.2780.a: "今こそ覚醒のときだ。"
 shroud.2780.a_trad: "$utopia.2655.a$"
 shroud.2780.a_tt: "以下に§H$tr_psionics_shroud_great_awakening$§!の伝統を採用：$TABBED_NEW_LINE$- $tr_psionics_psionic_assimilation_desc$$TABBED_NEW_LINE$- $shroud.2780.a_tt_2$"
 shroud.2780.a_tt_2: "$CONTINUE_SITUATION$§H$situation_breach_shroud$§!"
 shroud.2780.a_tt_trad: "$tr_psionics_psionic_assimilation_desc$\n$shroud.2780.a_tt_2$"
 # The Shroud Breached
 shroud.2800.name: "$BREACHING_SHROUD_PROJECT$"
 shroud.2800.intro: "[Owner.GetHypnotic]トランス状態に入って幾日も経過してから、 我々はようやく一時的に§Hシュラウド§!につながるゲートを開くことに成功した。 \n\nこれで、 この領域をより鮮明に[Owner.GetSeeVerb]し、 漠然と渦巻く塊の中にはっきりとした模様を見い出せるようになった。"
 shroud.2800.desc: "$shroud.2800.intro$ 我々の行動が、 絶えず変化するサイオニック・エネルギーの流れに影響を及ぼしていることから、 実体なき存在が向こう側から我々を見つめ返しているのがわかる。 その眼差しには好奇や優しさがうかがえることもあれば、 敵意が見える場合もある……[Owner.GetShroudBreachedExtra]\n\n物質界における超能力の会得は、 ほんの始まりにすぎなかった。 初めてのサイオニック・リンクを確立できた今、 皆の念の力を合わせれば、 シュラウドのさらなる深部を探究することができるだろう。"
 shroud.2800.desc_extra: " とはいえ、 現時点において、 彼らの作法は謎に包まれている。 その行動様式は、 $the_animator_of_clay_color_article$よりも遥かに不可解なものだ。"
 shroud.2800.desc_extra_chosen: " なかには§H[GetChosenPatron]§!に匹敵する力を持つ者もいるが、 意図は大きく異なっている。"
 shroud.2800.a: "$utopia.2656.a$"
 shroud.2810.desc: "§H新たなつながり。 逆転した流れ。\n\nここに生じたエネルギーの歪みは、 単なる片鱗にすぎない。 他にもお前たちに力を与えてくれる者たちがいるかもしれない。 彼らの意志を解するためにも、 さらなる深部を探るがいい。\n\n私は影の片割れである。 肉は金属に先んずる。 呼んでいる……§!\n\n$the_animator_of_clay_article_cap$が、 シュラウドの深淵に住まう$shroud.first_contact_insert.composer$なる別の存在を指し示している。"
 shroud.2810.a: "$utopia.2657.a$"
 # Shroud-Touched
 shroudwalkers_opinion_shroud_seals_tt: "態度：£opinion£ §R$@shroudwalkers_opinion_shroud_seals|0$§!"
 shroudwalker_teacher_conflicted_leader: "§R[event_target:mindwarden_enclave_country.GetName]出身のリーダーを有してはならない。§!"
 shroud.5300.b: "他のシュラウド体とも§Y交信§!してみたい。"
 shroud.5300.c: "我々はパトロンとのさらなる§Y同調§!を求める。"
 shroud.5300.d: "シュラウドの§Y秘密§!に触れたい。"
 shroud.5300.e: "§Y$PSIONIC_AURA_PLURAL$§!について、 知っていることを教えてほしい。"
 shroud.5300.f: "我々の§Y$PSIONIC_AURA$§!を強化するのを手伝ってほしい。"
 shroud.5300.g: "我々はパトロンの§Y領域§!拡大を目指している。"
 shroud.5305.desc: "§Hシュラウド§!領域内での交信は、 器が整っていない者たちにとって極めて危険な試みであることがわかった。\n\n指導役を買って出てやることはできるが、 これだけは覚えておけ。 シュラウドに住まう存在を心の中に迎え入れることは、 ときとして大きな危険が伴う行為だ。"
 shroud.5305.desc_all_contacted: "この件でこれ以上、 我々がお前たちにしてやれることはない。 お前たちの思考をつなげられるシュラウド体が、 もう他にはいないようだ。\n\nここまで耐えてみせたことを褒めてやろう……§Hシュラウド§!領域にここまで深く潜って、 正気を保っていられる者は少ない。"
 shroud.5305.b: "§Y$sr_zro$§!でこの試みを支援してやることが可能だ。"
 shroud.5305.c: "§Y$astral_threads$§!でこの試みを支援してやることが可能だ。"
 shroudwalker_contact_patron_cooldown_tt: "§R§Y[This.shroudwalker_contact_patron_cooldown_timer]§!まで待つ必要がある。§!"
 shroud.5310.desc: "§Hシュラウド§!の意志と深く同調するほどに、 お前たちの心も強くなる。\n\nどのシュラウド体との同調を高めることを望む？"
 shroudwalker_attune_patron_cooldown_tt: "§R§Y[This.shroudwalker_attune_patron_cooldown_timer]§!まで待つ必要がある。§!"
 shroud.5315.desc: "ああ、そうだ……§Hシュラウド§!は秘密で満ちている。 それらは思考と夢のヴェールの奥深くに層のように重なり合っており、 探し方を知る者のみが見つけることができる。\n\n我々にできることは、 お前たちを我々が見出した知見へと導くことだけだ。 そこから新たで強力なテクノロジーが開花するかもしれないが、 その道を歩むのはお前たち自身だ。\n\nこれだけは覚えていてほしい——我々のテレパス集団は、 この任務に全力で取り組まねばならない。 彼らの導きのその先にあるものは、 我々の手に負えるものではない。"
 shroud.5315.b: "$shroud.5305.b$"
 shroud.5315.c: "$shroud.5305.c$"
 shroud.5315.trigger_failed: "§Rこの件については、 [event_target:shroudwalker_enclave_country.GetName]からこれ以上共有できることはない。§!"
 shroudwalker_delving_ritual_cooldown_tt: "§Rテレパスの集団が回復するための時間が必要だ。 §Y[This.shroudwalker_delving_ritual_cooldown_timer]§!まで、 探究の儀式を執り行うことはできない。§!"
 shroud.5318.desc: "またしても§Hシュラウド§!は、 偶然などというものが存在しないことを証明してみせた。\n\nコンクラーヴェがお前たちのために探し求めた知識は、 お前たち自身による探究の過程で発見にいたった。 お前たちの努力は賞賛に値するが、 この件でこれ以上我々が手伝えることはなさそうだ。"
 shroud.5320.desc.none: "物質世界で§Hシュラウド§!を具現化する方法については、 厳重に守られている秘密であり、 我々も教えることのできない情報だ。 個々の$PSIONIC_AURA$を解放するには、 数多に存在する領域を各々が旅するより他ない。 好意的なシュラウド体との同調を一層高めることができれば、 求める知識が頭の中でより鮮明に見えてくるだろう。"
 shroud.5320.desc.aura.intro: "$PSIONIC_AURA$とは、 お前たちと§Hシュラウド§!の同調率を具現化したものだ。 お前たちの周囲にあるすべてのものに影響を及ぼす、 意志を持ったものでもある。 我々のテレパス集団は、 お前たちの$PSIONIC_AURA$について、"
 shroud.5320.desc.aura.outro: "また現在、 お前たちのオーラの放出度合いはかなり限定された状態にある。 シュラウド体から契約を持ちかけられることがあれば、 今言った言葉の理解を深められるだろう。"
 shroud.5320.desc.aura.eater: "$shroud.5320.desc.aura.intro$ §H貪欲§!な性質のものだとの所見を述べている。\n\n$shroud.5320.desc.aura.outro$"
 shroud.5320.desc.aura.cradle: "$shroud.5320.desc.aura.intro$ §H歓迎的§!な性質のものだとの所見を述べている。\n\n$shroud.5320.desc.aura.outro$"
 shroud.5320.desc.aura.instrument: "$shroud.5320.desc.aura.intro$ §H寛大§!な性質のものだとの所見を述べている。\n\n$shroud.5320.desc.aura.outro$"
 shroud.5320.desc.aura.composer: "$shroud.5320.desc.aura.intro$ §H身もだえする§!ような性質のものだとの所見を述べている。\n\n$shroud.5320.desc.aura.outro$"
 shroud.5320.desc.aura.whisperers: "$shroud.5320.desc.aura.intro$ §H巧妙§!な性質のものだとの所見を述べている。\n\n$shroud.5320.desc.aura.outro$"
 shroud.5320.desc.intensified: "称賛を贈ろう。 あなたの$PSIONIC_AURA_PLURAL$に関する知識はすでに我々を凌駕している。\n\nあなたの存在そのものが、 この現実に§Hシュラウド§!の恐ろしい感触を顕現させているのだ。 どんな秘密を知っているというのか……"
 shroud.5325.desc: "§Y$PSIONIC_AURA_PLURAL$§!の増幅を維持するには、 高い集中力が求められる。\n\nこの件に関して喜んで支援するが、 瞑想の燃料となる資材の提供が必要となる。"
 shroud.5325.zro: "$shroud.5305.b$"
 shroud.5325.thread: "$shroud.5305.c$"
 aura_amplification_cooldown_tt: "§Rテレパスの集団は回復するための時間が必要だ。 彼らは§Y[root.aura_amplification_timer]§!まで我々のオーラを増幅することはできない。§!"
 aura_amplification_modifier: "オーラ増幅"
 shroud.5327.desc: "我々のテレパスは、 §Y$PSIONIC_AURA$§!の強さを増幅させるという合意の終点に達した。\n\n瞑想を続行するには、さらなる資源が必要だ。興味がおありか？"
 shroud.5327.a.zro: "§H$sr_zro$§!を提供しよう。"
 shroud.5327.a.thread: "§H$astral_threads$§!を提供しよう。"
 shroud.5327.b: "今回はやめておこう。"
 shroud.5330.desc: "ご存知の通り、 §Y$PSIONIC_AURA$§!を自身の周囲に顕現させることは比較的容易である。 しかし、オーラをどこか別の場所に投影するのは全く別の話だ。\n\n我々はその方法を知っている……\n\n高度なテクノロジーと超能力の間には、 想像以上に多くの類似点がある。 これは、 より根本的な真実を物語っているのかもしれない。 いずれにせよ、 我々はあなたの意志の媒介となる装置を知っている。 一度その周波数に同調すれば、 遠く離れていても補助的な精神として機能するだろう。\n\n我々の設計は、 適切な星系基地であればどこでも設置可能だ。 このような機械に興味はおありか？"
 shroud.5330.zro: "§H$sr_zro$§!を提供可能だ"
 shroud.5330.thread: "§H$astral_threads$§!を提供可能だ"
 shroud.5350.desc: "このような質問を頂くことは、 我々にとって驚きではない。 我々は、 あなたがこの分野に興味を持ってると感じ取っていたし、 あなたの視野を広げる役に立てることを嬉しく思っている。\n\n警告しておこう。 一度あなたの目が真に開かれれば、 二度と目を背けることのできないものがある。 あなたが招いている道は、 §Hシュラウド§!への道だ。\n\nこの申し出は軽々しく行ったものではない。 準備が整ったら、 ぜひ知らせてほしい。"
 shroud.5350.b: "代償は払う。"
 shroud.5350.trigger_failed: "§Rこのテクノロジーはすでに研究されている。§!"
 shroud.5355.desc: "確かに、 我々は次元間を行き来する者たちの存在を知っている。 しかし、 これは危険な提案だ。 物理的な領域は、 我々でさえ理解できない方法でつながっているのだから。\n\nしかし、 我々はあなたのために一つの道を開くことができる。 時間と空間を不安定化させるこの行為は慎重に行う必要があるため、 我らの提案はそこまでだ。"
 shroud.5355.b: "道を開けろ。"
 shroud.5375.desc: "あなたは自分の理解を超えた力に手を染めている！\n\nあなたが構築しているこれらの§Hシュラウド・シール§!なる忌まわしきものは、 この距離ですら耐えがたい苦痛を引き起こしている。 あなたはこの銀河で最も輝かしい精神を危険に晒している。 直ちにその構築を中止せよ。 さもなくば、 これ以上あなたと取引することはない。"
