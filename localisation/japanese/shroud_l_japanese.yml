 shroud.10.name: "女王に敵対する味方"
 shroud.10.desc.intro: "シュラウドはこれまでにない激しさで共鳴している。 広大なエネルギーの渦がエーテルの中をうねり、 暴れ回る。\n\n閃光が乱れる混乱の中、 我々は人工生命の女王の超能力的残響を目撃する。 無限で全能なる彼女は、 銀河を手のひらで弄ぶ。"
 shroud.10.desc.outro: "それはなぜだ？ 我々が知らない弱点を知っているのだろうか？ 我々が助けを求めたら、 力を貸してくれるのだろうか？\n\n開眼者に意識を集中させると、 その焦りが感じられる。 この件に関して助力を求める機会は、 おそらく一度きりだろう。 それには莫大な量の§Hエネルギー§!と§H$sr_zro$§!が必要となる。"
 shroud.10.desc: "$shroud.10.desc.intro$\n\n女王を観察しているのは我々だけではない。 隠れた観察点から、 $the_animator_of_clay_color_article$と呼ばれる存在が女王の無限の力に怯むことなく見守っている。\n\n$shroud.10.desc.outro$"
 shroud.10.desc.1: "$shroud.10.desc.intro$\n\n女王を観察しているのは我々だけではない。 隠れた観察点から、 $the_animator_of_clay_color_article$が女王の無限の力に怯むことなく見守っている。\n\n$shroud.10.desc.outro$"
