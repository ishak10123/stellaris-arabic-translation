 shroud.4015.title: "$the_cradle_of_souls_article_cap$の前で"
 shroud.4015.desc.default: "§Hシュラウド§!全体に§H[Root.Patron:the_cradle_of_souls.GetPreCommunicationName]§!の力が拡散しているのは確かだが、 その源を突き止めることはできなかった。 我々はサイオニック領域を彷徨いながら、 進路を変え続け、 自らの判断を疑いはじめていた。\n\n$shroud.4015.desc.default.end$"
 shroud.4015.desc.hive: "§Hシュラウド§!全体に§H[Root.Patron:the_cradle_of_souls.GetPreCommunicationName]§!の力が拡散しているのは確かだが、 その源を突き止めることはできなかった。 我々はサイオニック領域を彷徨いながら、 進路を変え続け、 自らの計算を疑いはじめていた。\n\n$shroud.4015.desc.default.end$"
 shroud.4015.desc.default.end: "我々が移動を止め、 次の進路を検討していたとき、 突如として「それ」が現れた。 音もなく、 姿も見えなかった。 だが、 かつてないほどの熱量だけは感じられた。\n\nその中心にある力を、 我々は知覚した。 それはシュラウド全域、 そしてその外部からも集束したエネルギーの中枢だった。 思念がその一点に集中し、 そこから熱を放射しているのだ。 探索から戻った我々の精神は、 むしろ重苦しいほどの安らぎで満たされていた。\n\nいまや我々には、 その存在の願いがより明確にわかる。 [GetCradleEmergesEnding]"
 shroud.4015.desc.gestalt_machine: "§Hシュラウド§!全体に§H[Root.Patron:the_cradle_of_souls.GetPreCommunicationName]§!の力が拡散しているのは確かだが、 その源を突き止めることはできなかった。 我々はサイオニック領域を彷徨いながら、 進路を変え続け、 自らの計算を疑いはじめていた。\n\n処理のために一時停止したとき、 突如として「それ」が現れた。 伝達内容を解析することはできなかったが、 より深層のコードが反応を示した。\n\nその中心にある力を、 我々は検知した。 それはシュラウド全域、 そしてその外部からも集束したエネルギーの中枢だった。 概念がその一点に集中し、 そこから熱を放射しているのだ。 探索から戻った我々の回路は、 むしろ異常なほどの安定性で稼働していた。\n\nいまや我々には、 その存在の願いがより明確にわかる。 [GetCradleEmergesEnding]"
 shroud.4015.desc.individual_machine: "$shroud.4015.desc.gestalt_machine$"
 shroud.4015.desc_outro_homicidal: "我々の精神は、 その秩序と調和という偽りの前提を即座に拒んだ。 この存在、$the_cradle_of_souls_color_article$との調和をこれ以上深めれば、 我々の意思が弱まってしまうだろう。"
 shroud.4015.desc_outro_robot: "我々はこの存在が抱く秩序と調和のビジョンを知っている。 [GetTelepathPlural]たちの再充電が終わり次第、 この存在——$the_cradle_of_souls_color_article$との交信を試みよう。"
 shroud.4015.desc_outro_organic: "我々はこの存在が抱く秩序と調和のビジョンを知っている。 [GetTelepathPlural]たちが回復し次第、 この存在——$the_cradle_of_souls_color_article$との交信を試みよう。"
