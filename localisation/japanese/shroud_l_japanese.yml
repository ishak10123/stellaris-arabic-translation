 corpse_reader: "死体解読者"
 job_corpse_reader: "$corpse_reader$"
 job_corpse_reader_plural: "死体解読者"
 job_corpse_reader_desc: "それぞれの死骸の独自の腐敗過程を観察し、 読み取ることで、 銀河の神秘が明かされるだろう。"
 corpse_broker: "死体ブローカー"
 job_corpse_broker: "$corpse_broker$"
 job_corpse_broker_plural: "死体ブローカー"
 job_corpse_broker_desc: "死者の臓器や骨は、 予言の儀式の供物として高値で取引されることがある。"
