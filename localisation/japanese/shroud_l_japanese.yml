 # End of the Cycle accords
 ACCORD_FRACTALIZATION: "フラクタル化"
 ACCORD_FRACTALIZATION_desc: "$end_aura$によって我々の物理現実の一部を歪め、 シュラウドと同化させることで、 螺旋状に外へと広がる未知の領域との遭遇が果たされる。 それらは終焉が訪れるその時まで、 その場で存在し続ける。"
 ACCORD_FRACTALIZATION_TT: "我々の§H$PSIONIC_AURA$§!内の§Y$mod_station_researchers_produces_mult$§!、 および§Y$mod_station_gatherers_produces_mult$§!：§G+100%§!"
