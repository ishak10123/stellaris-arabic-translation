 #======================
 origin_endbringers: "終焉をもたらすもの"
 origin_endbringers_desc: "$CHALLENGING_ORIGIN$§R警告：['concept_psionic_ascension']以外のアセンションパスがブロックされる。§!\n\nこの文明は長らく、 近隣の惑星が荒廃し、 シュラウドに飲み込まれる原因となった未知の災厄に取りつかれてきた。 星々の海に乗り出し、 ようやくかの現象の秘密を探れるようになったことで、 きっとかつての近隣国と同じ運命をたどることになるか否かの答えも得られるだろう。"
 origin_tooltip_endbringers_negative_effects: "- 帝国に['concept_paranoia_modifier']の補正が加わった状態で開始\n- ['concept_federation']を形成したり、 参加したりすることができない"
 concept_paranoia_modifier: "$endbringers_paranoia$"
 concept_paranoia_modifier_desc: "古代の災厄を目撃したのち、 後世の者たちは大きくなっていくばかりの災害の恐怖に苛まれ続ける。\n\n幸福度の補正が時間とともに悪化する：§R-5%§!から§R-50%§!"
 endbringers_paranoia: "パラノイア"
 endbringers_paranoia_desc: "古代の災厄を目撃したのち、 後世の者たちは蔓延する災害の恐怖に苛まれ続ける。 次に同じ運命をたどることになるのは我々なのか？"
 endbringers_paranoia_tt: "$chamber_of_silence_negative_effects_reduction$"
 START_SCREEN_ENDBRINGERS: "我々は大災害の使者である。\n\n[GetSpeciesAdj]文明の黎明期、 我々の最も近くに位置する隣接天体を謎の災害が襲った。 その突然かつ残酷な変容は、 夜空を邪悪な紫色の光で満たし、 いつか同じ運命をたどるのではないかという恐怖が我が国民に湧き上がった。 世代を重ねるごとに、 滅亡の可能性に対する息苦しい恐怖が我々をより一層強く締めつけていった。\n\n今、 [GetSpeciesNamePlural]が星々へと旅立つにつれ、 我々はこの「$pc_shrouded$」の探査へと引き寄せられている。 何世紀にもわたって我々が求め続けてきた答えは、 今やすぐ手の届くところにある。 しかし、 同胞の多くは、 この破壊的な力の源に執着することは、 最終的には我々自身の終焉につながるかもしれないと警告している。\n\nまもなく、 最後のヴェールが取り払われるだろう。"
 shroud.8010.title: "[shrouded_planet.GetName]を目指して"
 shroud.8010.desc: "§H[shrouded_planet.GetName]§!を周回する探査衛星が、 「$pc_shrouded$」の表面を目指す初めての有人ミッションにおいて、 着地成功率の高い位置を特定するにいたった。 この目標地点からは惑星中に波紋のように広がる奇妙な放射線が生じており、 紫外線の風がそれらを運ぶ手伝いをしている様子だ。\n\n[Root.GetSpeciesNamePlural]の中には、 母星に過去と同じ呪いが降りかかる恐怖から、 今回のミッションに反対する者も大勢いる。 彼らの懸念ももっともだが、 今はこの遠方の現象を解明する必要性のほうが優先されなければならない。\n\n我々もまたかつてと同じ厄災に見舞われて苦しむ運命にあるとしても、 少なくとも調査を済ませることができれば原因を理解して死ぬことができる。"
 shroud.8010.a: "答えを得るための調査を今すぐに開始するのだ。"
 the_shrouded_world_site: "$pc_shrouded$"
 the_shrouded_world_site_desc: "長い年月を経て、 我々はようやく§H[planet.GetName]§!の名で知られる「$pc_shrouded$」に手を伸ばし、 そして触れることに成功した。 そこでは何者かが、 これまで以上に力強い声で我々に呼びかけている。\n\nかつてこの世界を襲った災厄の秘密を解き明かすことは、 我々自身の星系の歴史の大部分を解明することにもつながる。 また願わくば、 自分たちもやがて同じ厄災で滅びるという強迫観念に取りつかれた社会に、 安寧がもたらされてほしいものだ。 軌道スキャンでは凄まじい渦状のエネルギーが、 南半球のある位置に集中している様子が映し出されており、 我々を見つめ返す不気味な目の形をしている。"
 shroud.8100.name: "迫る終焉"
 shroud.8100.desc: "予想通り、 §H[shrouded_planet.GetName]§!の地形は危険に満ちている。 薄暗い光を放つ渦状の粒子が大気を削るせいで、 §H[Leader.GetName]§!も配下の班員たちも、 この初めての試みでなかなか結果を出すことができない。\n\n驚くことに我々の調査チームは、 風に乗って遠吠えが聞こえてくる、 霧の中を闊歩する影が見えるなど、 あるはずのないものを感知し始めている。 ここに来たのは、 本当に間違いだったのだろうか？\n\nまた、 上陸の様子を初めて公共放送したために、 §H[Owner.GetHomeWorldName]§!の広い範囲でパニックを引き起こすこととなった。 多くの者たちが、 かつて[shrouded_planet.GetName]を襲った未知の破壊的な力を、 今度は同胞が自ら招き寄せようとしているのではないかと怯えた結果、 世界各地で“終焉が迫っている”と断言する、 集団的な抗議活動が行われるようになってしまったのである。 これにより、 現在我らが母星では、 ほとんどのインフラが停止する事態に陥ってしまった。\n\n遠隔計測スキャンによれば、 近くの山脈に一際高い放射線レベルが確認されている空洞があるようだ。 我々はどんな代償を支払ってでも、 さらに調査を進めていく所存だ。"
 shroud.8100.a: "表面を突破せよ。 何が我々を待ち受けているのかを確かめなければ。"
 the_end_is_nigh: "迫る終焉"
 the_end_is_nigh_desc: "差し迫った破滅の予感が社会全体に忍び寄る。"
 shroud.8105.name: "異質な建造物"
 shroud.8105.desc: "どうやらこの試みは、 我々が初めてというわけではないようだ。\n\n§H[shrouded_planet.GetName]§!の山岳地帯にある空洞はすでに突破された後で、 厄災に破壊された異質な建造物が顔を出している。 これ以上のパニックを引き起こさないためにも、 この情報は機密としておくのが得策だろう。\n\n事前解析を実施してみたところ、 この施設の建設に使用された資材は、 この惑星で採取可能な鉱物とは異なる分子構成をしていることが判明した。 つまり、 この建物は宇宙を旅する文明が、 異星の素材を使って建てたということだ。 なんの目的で建設されたのかは依然謎だが、 備わっている機能のほとんどは自動化されていたように見受けられる。\n\n一方、 チームの精神状態は悪化の一途をたどっている。 暗号化された周波数に乗った囁き声がすると訴える者もいれば、 周辺の物理環境が歪んで見えると説明する者たちもいる状況だ。 時々発作のような笑い声が起きるのも、 不愉快ながら当たり前になりつつある。\n\n我々はすでに引き返せない深みまで足を踏み入れてしまったのだ。"
 shroud.8110.name: "監視者"
 shroud.8110.desc: "皆死んでいる。\n\nこの施設の中心部に位置するステーションで、 座ったままの状態で干からびている異種族の死体が複数発見された。 彼らの持つ数多の目は、 いずれも力なく天井を見つめている。 恐ろしい見た目だが、 §H[Leader.GetName]§!には彼らが幻覚の産物ではないというそれなりの確信があるようで、 現在これらの生命体の画像は極秘扱いとなっている。\n\n武器の類を一切所持していないことから、 彼らは敵意を持って§H[shrouded_planet.GetName]§!に滞在していたわけではないようだ。 またこの施設は、 高機能の監視装置を備えた観測所だったようで、 §H[Owner.GetHomeWorldName]§!を直接対象としていたと推測できる。 放射性炭素年代測定の結果を見る限り、 この星での彼らの活動は、 厄災が降りかかる遥か以前にまで遡るようだ。\n\n彼らの記録を様々解読してみたところ、 日常的な通信記録を除いて、 そのほとんどが我々の文明の初期の歴史に関わる内容だった。"
 shroud.8110.a: "彼らは我々を監視していたのか？"
 shroud.8115.name: "理解を超えた力"
 shroud.8115.desc: "§H[shrouded_planet.GetName]§!のデータベースが解読されたことで、 これまで信憑性がないとされてきた我々の種族の伝説が真実だったことが判明した。 我々は「$tech_psionic_theory$」という精神科学の実験の被験体だったのだ。\n\nつまり我々の種が、 この潜在能力に目覚めることは宿命と言える。 祖先たちの多くは、 夢の中でこれらの通信を感じ取ったり、 遠方からの声として聞き取ったりしていたのだろうが、 こうした現象はともすれば精神疾患や妄想を示唆する症状と受け取られることもある。 しかし、 実験は途中で打ち切られ、 最後のほうではここも観測所というよりは、 生き残るためのシェルターとして機能していたようだ。\n\n我々の社会を記録する作業が中断されたのは、 彼らが無謀にも§H「シュラウド」§!として知られる世界に設けられた障壁に手を加えようと、 首都星で破滅的な実験を行ったのがきっかけだった。 我々は彼らの科学者たちが、 「レコニング」と呼ぶこのできごとこそが、 かの災厄の元凶だったのではないと睨んでいる。\n\nこのレコニングがなんであったにせよ、 その影響力がすぐに§H[shrouded_planet.GetName]§!にまで及んだのは事実で、 彼らの最期は以下の1行の記録にまとめられている。\n\n§L終焉の時がきた。§!"
 shroud.8115.a: "我々もまた、 同じ運命をたどることになるのか？"
 shroud.8120.name: "$fragment_of_reckoning$"
 shroud.8120.desc: "我々は災厄の元凶の確固たる証拠を発見するにいたった。 §H[Leader.GetName]§!によれば、 それは決して苦労して見つけたものではなく、 その証拠のほうが[Leader.GetHimHer]に呼びかけていたとのことだ。\n\nそれは施設の奥深くで見つかり、 従来の解析方法では解明できない、 脈を打つ不可解な塊である。 物質でもエネルギーでもないその存在を、§H[Leader.GetName]§!は飲み込まれた者たちの意志が、 恨みという形で残留しているものだと説明し、 §H'$fragment_of_reckoning$'§!と呼んでいる。\n\n§Hシュラウド§!のエーテルエネルギーを抑制・操作するための、 誤った努力の産物ともいえるそれは、 元々は対レコニングの防御装置として使われる予定だったものらしい。 しかしながら、 部分的な成功しか収められず、 この世界が最期を迎える頃、 かの邪悪なる存在が強制的にこの次元から消し去られる際に、 科学者たちの精神までをも意図せず道連れにすることになってしまった。 そうして後に残ったのが、 この欠片のみとなったのである。\n\nこの物体には、 我々の研究者のビジョンや幻覚を増幅させ、 現実世界の制約を超えた第2の世界を見せる性質がある。 危険を孕んだ課題が提示されたのは事実だが、 そこに希望が見込めることもまた確かだ。"
 shroud.8120.a: "まだまだ学びは尽きないらしい……"
 ENDBRINGERS_RESEARCH_PSIONIC_THEORY: "$tech_psionic_theory$"
 ENDBRINGERS_RESEARCH_PSIONIC_THEORY_DESC: "我々が§H[shrouded_planet.GetName]§!で発見した、 サイオニック・エネルギーの欠片には、 解き明かすべき秘密が隠されている。\n\n我々を妨げているのは、 他ならぬ我々自身の心が課している制約だ。"
 ENDBRINGERS_PSIONIC_THEORY_PROJECT_TOOLTIP: "完了条件：§H£society_research£ $tech_psionic_theory$§!を研究する。"
 ENDBRINGERS_ADOPT_PSIONICS_TRADITION: "$ENDBRINGERS_RESEARCH_PSIONIC_THEORY$"
 ENDBRINGERS_ADOPT_PSIONICS_TRADITION_DESC: "$ENDBRINGERS_RESEARCH_PSIONIC_THEORY_DESC$"
 ENDBRINGERS_PSIONICS_TRADITION_PROJECT_TOOLTIP: "完了条件：§H$tradition_psionics_shroud$§!の伝統を採用する。"
 shroud.8200.title: "狂気の領域"
 shroud.8200.desc: "最近になって発見された超能力分野の研究を進めたことで、 これまで目には見えなかった次元が現実に存在すること、 そして我々の精神こそがその入り口となることが確定した。 ヴェールの向こうには、 我々の理解が及ばない混沌とした領域が広がっている。\n\n深淵の内から§R声§!がいざなう。 その声が約束するのは救済ではなく、 新たな始まりだ。 その未知の力を振るうことは、 これまでの我々の在り方を放棄し、 狂気そのものに刻まれた運命を歩んでいくことを意味する。\n\n§R「時は来たれり」§!"
 shroud.8200.a: "我々は一体、 何をしでかしてしまったのだ？"
 shroud.8200.a.tt: "§H$tradition_psionics_shroud$§!の伝統ツリーをアンロックする。"
