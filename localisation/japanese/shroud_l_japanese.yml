 job_superstitious_beliefs_high_priest: "高等占星術師"
 job_superstitious_beliefs_high_priest_plural: "高等占星術師"
 job_superstitious_beliefs_high_priest_desc: "これらの神秘的なリーダーは、 星を指針として帝国の精神的制度を導く。"
 job_superstitious_beliefs_high_priest_effect_desc: "$job_superstitious_beliefs_high_priest_icon$ $job_superstitious_beliefs_high_priest_plural$は$i_consumer_goods$を$i_unity$と$i_stability$に変換する"
 superstitious_beliefs_high_priest: "$job_superstitious_beliefs_high_priest$"
 job_superstitious_beliefs_high_priest_icon: "£job_superstitious_beliefs_high_priest£"
 # Superstitious Beliefs High Priests (Corporate)
 job_superstitious_beliefs_high_priest_corporate: "フォーチュンブローカー"
 job_superstitious_beliefs_high_priest_corporate_plural: "$job_superstitious_beliefs_high_priest_corporate$s"
 job_superstitious_beliefs_high_priest_corporate_desc: "これらの思想的なリーダーは、 星を指針として帝国の精神的事業を調整する。"
 job_superstitious_beliefs_high_priest_corporate_effect_desc: "$job_superstitious_beliefs_high_priest_corporate_icon$ $job_superstitious_beliefs_high_priest_corporate_plural$は$i_consumer_goods$を$i_unity$、 $i_trade_value$および$i_stability$に変換する"
