 DELVING_RITUAL: "探求の儀式"
 DELVING_RITUAL_DESC: "§Y[shroudwalker_enclave_country.GetName]§!は我々の代わりに探求の儀式を行い§!シュラウド§Hに入るための必要な準備を整えた。"
 MINDWARDENS_THE_FIRST_ENCLAVE: "第一中立機構"
 MINDWARDENS_THE_FIRST_ENCLAVE_DESC: "我々は銀河全体に広がる超能力による悪影響を止めるため、 独立した§H'$gov_mindwarden_enclave$'§!を構築する準備が整っている。\n\nこの施設が完成すれば、 必要とする人々に反サイオニックの援助を提供できるだけでなく、 収益と資材の一部を活用することができる。"
 MINDWARDENS_THE_FIRST_ENCLAVE_NOTE: "支配している星系内で、 §Y$commander$§!が率いる30以上の規模の§Y$FLEET$§!を§Y$gov_mindwarden_enclave$§!に変える。"
 SHROUD_SHAPING_PROJECT: "シュラウドを形作る"
 SHROUD_SHAPING_PROJECT_DESC: "§Hシュラウド§!に存在する者は数多く、 それぞれが巨大な力の集積体だ。 彼らは、 最大の祝福を授ける前に、 不可逆的な絆を要求する。\n\nしかし、 我々は独自の道を切り拓く方法を見出した。 単一のパトロンに精神を縛られるのではなく、 超能力を持つ[GetResearchers]たちは、 各パトロンから少量のエネルギーを吸収し、 シュラウドを意のままに形作る手段を開発することができる。"
 EXPLORE_BORDER_SYSTEM: "[exiled_system_border.GetName]の探索"
 EXPLORE_BORDER_SYSTEM_DESC: "長距離映像により、 最近§H[exiled_system_border.GetName]§!星系で奇妙なエネルギーの流れが急増していることが確認された。 これは[owner.GetHomeWorldName]の$building_ancient_ward_1$によって測定された異常な数値と呼応している。\n\nこの現象を理解するには、 [exiled_system_border.GetName]を探索する必要がある。"
 EXPLORE_BORDER_SYSTEM_TOOLTIP: "§Y艦船§!または§Y艦隊§!を派遣して§Y[exiled_system_border.GetName]§!を探索する。"
