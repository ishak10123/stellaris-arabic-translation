 # Composer of Strands
 shroud.4650.title: "$utopia.3304.name$"
 shroud.4650.desc.default: "シュラウドでは、 温かく親しみを込めて迎えてくれる存在が待っている。 それは言葉ではなく、 ビジョン、 概念、 アイデアで語りかける。 それは我々の[GetTelepathPlural]の心に滑らかに、 そして穏やかに、 まるで最初からそこにあったかのように染み込んでいく。 無数の映像が、 彼らの目の前に飛び交う。\n\nこの$the_composer_of_strands_color_article$なる存在は、 我々の有機的な形態を好奇心を持って見ている。 それは我々に、 それらをいかに成長させ、 変化し、 改善し、 進化させるかを示してくれる。\n\n§H我々がそれを肉体に取り込めば。§!\n\nそれは辛抱強く、 愛情深く我々の答えを待っている。 まるで溺愛する親がお気に入りの子を待つように。"
 shroud.4650.desc.hive: "$shroud.4650.desc.default$"
 shroud.4650.desc.gestalt_machine: "シュラウドでは、 温かく親しみを込めて迎えてくれる存在が待っている。 それは言葉ではなく、 ビジョン、 概念、 アイデアで語りかける。 それは我々の[GetTelepathPlural]の回路に滑らかに、 そして穏やかに、 まるで最初からそこにあったかのように染み込んでいく。 無数の映像が、 彼らの目の前に飛び交う。\n\nこの$the_composer_of_strands_color_article$なる存在は、 我々の機械的な形態を好奇心を持って見ている。 それは我々に、 それらをいかに適応させ、 変化し、 改善し、 アップグレードさせるかを示してくれる。\n\n§H我々がそれをコンポーネントに取り込めば。§!\n\nそれは辛抱強く、 愛情深く我々の答えを待っている。 まるで溺愛する親がお気に入りの子を待つように。"
 shroud.4650.desc.individual_machine: "$shroud.4650.desc.gestalt_machine$"
 shroud.4650.a: "$the_composer_of_strands_color_article$と契約を結ぶ。"
 shroud.4655.desc.intro: "ここに$the_composer_of_strands_color_article$との契約が成立した。 これから、 かの存在の意思が§H[Root.GetName]§!中を駆け巡るようになるだろう。"
 shroud.4655.desc.outro: "我々は[Root.GetSpeciesAdj]の形態の制御を一部放棄したことは明らかであり、 我がパトロンはそれを自由に変更できるようになった。\n\nこれは、 我らが得た新たな絆に対する些細な犠牲だ。 我々の[GetTelepathPlural]によると、 作曲家の最大の祝福はまだ訪れていない。"
 shroud.4655.desc.default: "$shroud.4655.desc.intro$\n\n我々の[GetScientistPlural]は、 すでに[Root.GetSpeciesAdj]テストサンプルの遺伝子構造に異常なパターンを検出しており、 まるで何世代にもわたる進化の変化が一晩にして起こったかのようだ。$shroud.4655.desc.outro$"
 shroud.4655.desc.hive: "$shroud.4655.desc.default$"
 shroud.4655.desc.individual_machine: "$shroud.4655.desc.intro$\n\n我々の[GetScientistPlural]は、 すでに[Root.GetSpeciesAdj]テスト回路の分子構造に異常なパターンを検出しており、 まるで何世代にもわたるシステムアップグレードが一夜にして行われたかのようだ。$shroud.4655.desc.outro$"
