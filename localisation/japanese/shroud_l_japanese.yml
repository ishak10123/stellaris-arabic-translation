 shroud.4190.name: "$PSIONIC_AURA$の接近"
 shroud.4190.desc.intro: "しばらく前、 我々の[GetScientistPlural]は異例の現象を観測した。 その現象とは、 遠方の星系が原因不明のエネルギーの流れで巡っており、 それが徐々に他の星系に広がっていくというものだ。"
 shroud.4190.desc: "$shroud.4190.desc.intro$その発生源に関する未確認の理論に基づき§H「$PSIONIC_AURA_PLURAL$」§!と名付けられたが、 脅威となるかどうかはまだ確認されていない。\n\nこのようなオーラは§H[from.GetName]§!星系で観測されており、 このまま拡大し続ければ我々の国境内に侵入する恐れがある。"
 shroud.4190.desc_mindwarden: "この現象の超能力の起源に関する理論が正しければ、 §H[event_target:mindwarden_enclave_country.GetName]§!はその影響を打ち消す方法を知っているかもしれない。"
 shroud.4190.a: "その影響は、 まもなく明らかになるだろう。"
 shroud.4191.name: "$shroud.4190.name$"
 shroud.4191.desc_1.common: "我々は、 §H[from.GetName]§!星系で高濃度のサイオニック・エネルギーを検出した。 §Hシュラウド§!内の残響を聴取した結果、 我々の[GetTelepathPlural]はこの現象が引き起こされたのは"
 shroud.4191.desc_1.default: "$shroud.4191.desc_1.common$異星文明の超能力による活動によるものと判明した。"
 shroud.4191.desc_1.contact: "$shroud.4191.desc_1.common$§H[fromfrom.GetName]§!の超能力による活動によるものと判明した。"
 shroud.4191.desc_2.common: "観測可能な現実における物質と意識に影響を与えている。 我々の観測は、 これらのオーラが星系間を広がる可能性があることを示している。"
 shroud.4191.desc_2.default: "§H「$PSIONIC_AURA$」§!と呼ばれるそれは、 強力なシュラウドに棲む存在の意志から発せられ、 $shroud.4191.desc_2.common$"
 shroud.4191.desc_2.knows_aura: "この帝国は、 §H$PSIONIC_AURA$§!をチャネルする方法を開発したようだ。 これはシュラウドより発せられ、 $shroud.4191.desc_2.common$"
 shroud.4191.desc_3.common: "我々の領域におけるその影響は、 排出者との関係が変化しない限り、 [GetPositiveRivalAdj]であると見込まれる。"
 shroud.4191.desc_3.default: "[GetTelepathPlural]によると、 それは[GetBenevolentRivalAdj]の意志を放っているため、 $shroud.4191.desc_3.common$"
 shroud.4191.desc_3.contact: "我々の[fromfrom.GetName]との関係が[GetLessThanRivalAdj]友好的であることを踏まえれば、 $shroud.4191.desc_3.common$"
 shroud.4191.a.rival_organic: "$WORRYING$"
 shroud.4191.a.rival_default: "最適とは言い難い展開だ。"
 shroud.4191.a.organic: "シュラウドからの贈り物"
 shroud.4191.a.default: "興味深い現象だ。"
 shroud.mindwarden.back: "$enclave.410.a$"
 shroud.4205.name: "[event_target:mindwarden_enclave_country.GetName]"
 shroud.4205.common: "ごきげんよう。 [event_target:mindwarden_enclave_country.GetName]の代表としてお話しいたします。"
 shroud.4205.desc: "$shroud.4205.common$\n\n私たちの使命は、 §Hシュラウド§!の脅威とその悪影響を広めるすべての存在から守ることです。 我々は、 侵略されることのない自由な精神と、 超能力から強固に守られた銀河を信じています。\n\n我々の超能力センサーの測定値から判断すると、 あなたはこれらの脅威に加担していません。 素晴らしい。 このような脅威に加担するものから喜んでお守りいたします。\n\n$shroud.4205.desc.end$"
 shroud.4205.desc.end: "反超能力組織の軍事支援が必要な場合、 または§H$zro_lower$§!の処理にお困りの場合は、 私たちにお任せください。"
 shroud.4205.desc.return: "おかえりなさい。 [event_target:mindwarden_enclave_country.GetName]は私たちの継続的な協力を尊重しています。\n\n超能力センサーの値に測定は異常ありません。 あなたは§Hシュラウド§!に汚染されていません。 素晴らしい……\n\n$shroud.4205.desc.end$"
 shroud.4205.desc.eotc: "私たちは今、 深刻な危機に晒されている時代にあります。 我々の努力空しく、 $end_of_the_cycle_color_article$が迫っています。 かの存在の忌むべき兆候が星々に忍び寄っているのです……\n\n$shroud.4205.desc.eotc.end$"
 shroud.4205.desc.eotc.end: "我々は今こそ互いに手を取り合い、 超能力によって引き起こされる世界の終末を阻止しなければなりません。"
 shroud.4205.desc.merc_first: "同志たちよ、朗報です。 最初の§H$gov_mindwarden_enclave$§!の設立が完了しました。 $shroud.shared_combating_the_shroud$"
 shroud.4205.desc.merc_more: "同志たちよ、朗報です。 私たちの§H$gov_mindwarden_enclave$§!の設立が完了しました。 $shroud.shared_combating_the_shroud$"
 shroud.4205.desc.merc_back: "おかえりなさい、 同志の皆さん。 §H[mindwarden_enclave_country.GetName]§!は私たちの継続的な協力を尊重しています。\n\n$shroud.4205.desc.end$"
 shroud.4205.desc.return_beginning: "$shroud.4205.desc.end$"
 shroud.4205.desc.return_beginning.eotc: "$shroud.4205.desc.eotc.end$"
 shroud.4205.a: "シュラウドとはなんだ？"
 shroud.4205.b: "§I$sr_zro$§!について話したい。"
 shroud.4205.c: "§Y$PSIONIC_AURA_PLURAL$§!についてできることはあるか？"
 shroud.4205.d: "超能力者の絶好の標的を知っている……"
 shroud.4205.e: "我々の間で発生している£crime£ §Y[GetCrimeDeviancy]§!への支援が必要だ。"
 shroud.4205.ef: "我々は今、 §Y兵站支援§!を必要としている。"
 shroud.4205.f: "あなた方の兵士をお借りしたい。"
 shroud.4205.g: "§Y番人§!を派遣していただけるか？"
 shroud.4205.h: "$end_of_the_cycle_article$についてあなた方と話がしたい。"
 shroud.4205.i: "§Y設立に携わった後援者§!として提案がある。"
 shroud.shared_combating_the_shroud: "本日より§H[mindwarden_enclave_country.GetName]§!は、 §Hシュラウド§!とあらゆる形態の超能力者の悪行と戦うという重要な任務を引き継ぎます。\n\n必要であれば、 §H$zro_lower$§!処分から兵士の徴兵まで、 さまざまな反超能力者サービスを迅速かつ効果的に提供することができます。"
 shroud.4210.desc: "§Hシュラウド§!とは、 通常の知覚を超えて存在する現実の次元と表現するのが最も適切です。 それは有害な§H「サイオニック」§!エネルギーのみで構成されています。 それは、 私たちの物理的な銀河系のあらゆる部分に影響を与えているにもかかわらず、 多くの人はその存在を認識していません。\n\nシュラウドのエネルギーは、 意識生命体の認識活動を通じて物質世界に顕現することがあります。 これらの力は極めて危険で予測不可能です。\n\nあなたの住民の安全を確保するには、 シュラウドに対する防御策が必要です。 そのための支援を提供することができます。"
 shroud.shared_text_shroud_seal: "これらの高度な機械は、 ホスト星系およびハイパーレーンを介して直接接続された星系の両方において、 $PSIONIC_AURA$を徐々に消散させ、 最終的には完全に抑制します。"
 shroud.4230.desc: "§H$PSIONIC_AURA_PLURAL$§!を抑制するには主に2つの方法があります。\n\n惑星に§H$building_psionic_suppressor$§!を建設することで、 星系全体のオーラの強度が徐々に低下し、 それ以上の侵入を防ぐことができます。\n\nさらに強力な解決策は§H$SHROUD_SEAL$§!です。$shroud.shared_text_shroud_seal$"
 shroud.4230.a: "いや、 やっぱりいい。"
 shroud.4230.b: "§Y$tech_psionic_suppression$§!について知りたい。"
 shroud.4231.desc: "喜んで。 データを速やかに送信します。\n\nこの技術が、 オーロラの災いからあなた方に平和をもたらしますように。"
 mindwarden_encourage_raid: "[event_target:mindwarden_enclave_country.species.GetNamePlural]に支払いを行い、 我々が把握しているサイオニック帝国を襲撃する。"
 shroud.4240.need_psionics: "§Y$trait_psionic$§!帝国との接触を確立した。"
 shroud.4240.desc: "そうですか？  彼らが超能力で銀河を感染させている間は、 真の平和と安全を知ることはできないでしょう……\n\n標的を絞った襲撃により、 こうした危険な行為に反抗する私たちの姿勢を示すことができるでしょう。 あなた方の資金援助があれば、 私たちは作戦を実施するつもりです。\n\nご同意いただける場合は、 標的をお知らせください。"
 shroud.4240.a: "いや、 やっぱりいい。"
 shroud.4240.b: "§I[event_target:raid_target_1.GetName]§!"
 shroud.4240.c: "§I[event_target:raid_target_2.GetName]§!"
 shroud.4240.d: "§I[event_target:raid_target_3.GetName]§!"
 shroud.4240.e: "§I[event_target:raid_target_4.GetName]§!"
 mindwarden_raid_cooldown_tt: "§R§Y[root.mindwarden_raid_timer]§!まで、 マインドウォーデンに別の襲撃を要請できなくなる。§!"
 mindwarden_hire_raid: "[event_target:mindwarden_enclave_country.GetName]に支払いを行い、 この帝国を攻撃するために襲撃艦隊を派遣する。"
 shroud.4245.desc: "ああ、そうだ。 彼らの超能力の使い方については把握しています。 力を誇示するのは当然でしょう。\n\nご支援に感謝します。 まもなく作戦を開始します。"
 mindwarden_raider_modifier: "マインドウォーデン反サイオニック部隊"
 shroud.4246.name: "$gov_mindwarden_enclave$の襲撃"
 shroud.4246.common_1: "傍受した通信によれば、 彼らは我が国の敵対勢力に雇われ、 我々の星系への攻撃に向かっているらしい。"
 shroud.4246.common_2: "開かれたチャンネルを通じて、 我々に直接メッセージを送信している。"
 shroud.4246.desc: "§H[event_target:mindwarden_enclave_country.GetSpeciesName]§!の軍事艦隊が我が国境に接近している！  $shroud.4246.common_1$ 彼らは$shroud.4246.common_2$"
 shroud.4247.desc: "未知の軍事力を持つ艦隊が我が国境に接近している！  $shroud.4246.common_1$自らを§H[event_target:mindwarden_enclave_country.GetSpeciesNamePlural]§!と名乗り、 $shroud.4246.common_2$"
 NAME_Mindwarden_Corvette: "狂信者"
 NAME_Mindwarden_Frigate: "歩哨"
 NAME_Mindwarden_Destroyer: "審問官"
 NAME_Mindwarden_Cruiser: "悪魔祓い"
 NAME_Mindwarden_Battleship: "浄化者"
 NAME_Mindwarden_Titan: "裁判官"
 mindwarden_defense_modifier: "マインドウォーデン防衛軍"
 shroud.4250.desc: "素晴らしい。 $zro_lower$を我々に託すことで、 この強力かつ広く乱用されている物質に関する重要な研究が可能になります。 これは銀河全体に利益をもたらすでしょう。\n\nだからこそ、 私たちの$zro_lower$の購入価格は銀河の標準を大きく上回っているのです。"
 shroud.4250.a: "$shroud.mindwarden.back$"
 shroud.4250.b: "§I$sr_zro$§!とは何だ？"
 shroud.4250.c: "£sr_zro£ §I$sr_zro$§!を寄付する"
 mindwarden_zro_explanation: "最大100個の§Y$sr_zro$§!を、 標準$resolution_category_galactic_market$価格の5倍で販売する。"
 mindwarden_zro_cooldown_tt: "§R§Y[root.mindwarden_zro_timer]§!まで、 マインドウォーデンに$sr_zro$を渡せなくなる。§!"
 shroud.4251.desc: "§Y$sr_zro$§!は希少かつ極めて不安定な物質であり、 その影響を制御したり予測したりするのは困難です。 意図的か否かにかかわらず、 激しいエネルギーの爆発を引き起こし、 大規模な破壊をもたらす可能性があります。\n\nこれらの特性は§Hシュラウド§!との反応によって生成されるため、 超能力者たちの間で人気があり、 中には薬物として摂取する者もいます。\n\n私たちは$zro_lower$についてより深く学び、 安全に処分する方法を研究することを目指しています。 そのため、 持ち込まれた$zro_lower$の量に関わらず多額の報酬を支払っているのです。"
 shroud.4255.desc: "ご協力に感謝します。"
 shroud.4260.desc: "それなら、 §Y[GetCriminalDeviant]の意図が実際の行動に現れる前に検出できる、 効果的な$decision_thought_police$§!を提供しましょう。\n\n彼らの手法は超能力の実践に代わる安全な方法として開発されたもので、 科学的手法を使って人々の認知活動を監視します。§Hシュラウド§!の危険なエネルギーを用いることなく、 精神状態に関する洞察を提供します。"
 shroud.4260.a: "$shroud.mindwarden.back$"
 shroud.4260.b: "§I$decision_thought_police$§!を雇用する。"
 mindwarden_decision_cooldown_tt: "§R§Y[root.mindwarden_decision_timer]§!までこの要請を行えなくなる。§!"
 mindwarden_decision_explanation: "£decision£ §Y惑星ディシジョン§!を1つアンロック：§Y$decision_thought_police$§!"
 shroud.4262.desc: "素晴らしい。彼らの方法がいかに効果的であるかお分かりいただけるでしょう。"
 shroud.4265.desc: "確かに。 互いに協力し合うようになったことで、 すでにあなた方の軍隊配備戦略に、 いくつか改善するべき点が見受けられるようになりました。\n\nもちろん、 あなた方を侮辱する意図はありません。 単にこれらの分野が我々の専門というだけの話です。 あなた方は我々にとって重要な協力相手です。 充分な報酬さえ支払っていただければ、 喜んで問題の解決に向けた助言をさせていただきましょう。"
 shroud.4265.a: "$shroud.mindwarden.back$"
 shroud.4265.b: "決まりだな。"
 mindwarden_logistics_cooldown_tt: "§R§Y[root.mindwarden_logistics_timer]§!まで、 マインドウォーデンに兵站支援を要請できない。§!"
 shroud.4267.desc: "ごきげんよう。\n\nあなた方とは重要な協力関係にありましたが、 そちらの艦隊の兵站任務を手伝う契約が満了となりました。 あなた方さえよろしければ、 私たちのほうは今後も喜んで協力関係を続けたいと考えています。"
 shroud.4267.a: "協力関係を続けさせてもらおう。"
 shroud.4267.b: "今は遠慮させていただく。"
 shroud.4266.desc: "いいでしょう。 すぐに艦隊支援任務を開始します。"
 shroud.4270.desc: "私たちの$NAME_Mindwarden_Army$は優秀な襲撃部隊です。 彼らはさまざまな脅威に対処できるよう装備されており、 特に超能力を持つ相手には効果的です。\n\nきっとこの値段に見合うだけの価値があることを理解していただけるでしょう。"
 shroud.4270.a: "$shroud.mindwarden.back$"
 shroud.4270.b: "§I$mindwarden_army$§!を雇用する。"
 mindwarden_army_cooldown_tt: "§R§Y[root.mindwarden_army_timer]§!まで、 マインドウォーデンに新たな地上軍を要請できなくなる。§!"
 mindwarden_army_explanation: "§Y$mindwarden_army$§!地上軍を募兵し、 $transport$で首都星系に到着させる。"
 shroud.4271.desc: "幸運なことに、 すでに派遣準備が整った部隊がいます。 彼らの輸送艦もまもなく到着する予定です。"
 shroud.4280.desc: "喜んで引き受けます。\n\n効果的なリーダーシップは、 §Hシュラウド§!と戦うための鍵であり、 私たちの番人は、強固な統治を通じて超能力活動を抑制することに精通しています。"
 shroud.4280.a: "$shroud.mindwarden.back$"
 shroud.4280.b: "§I$subclass_commander_governor$§!を雇用する。"
 mindwarden_commander_explanation: "\nレベル5のマインドウォーデン$subclass_commander_governor$を1人雇用する。"
 unlocks_mindwarden_council_position: "\n§E評議会職をアンロックできる：§!\n§H$t$$councilor_mindwarden$§!\n$tt$$COUNCIL_POSITION_MODIFIER_BASE$\n$ttt$$mod_country_unity_produces_mult$：§G+1%§!\n$ttt$$planet_crime$：§G-1%§!\n$ttt$$MOD_PSIONIC_AURA_RESISTANCE_MULT$：§G+5%§!\n$COUNCIL_POSITION_AVAILABLE_FOR$$t$$commander_with_icon$\n\n$COUNCIL_POSITION_REQUIREMENTS$$councilor_mindwarden_conditional_tooltip$"
 mindwarden_commander_already_bought: "§Rすでにマインドウォーデン$subclass_commander_governor$を1人雇っている。§!"
 mindwarden_commander_conflicted_leader: "§R[event_target:shroudwalker_enclave_country.GetName]出身のリーダーを有してはならない。§!"
 mindwarden_commander_cooldown_tt: "§R§Y[root.mindwarden_commander_timer]§!まで、 マインドウォーデンに別のリーダーを要請できなくなる。§!"
 mindwarden_commander_desc: "$gov_mindwarden_enclave$から採用されたこのリーダーは、 超能力活動に対して断固たる姿勢を推進し、 シュラウドからの悪影響から民衆を保護する。"
 mindwarden_commander_catch_phrase: "シュラウドが浸透した箇所は、 傷口を焼灼しなければならない。"
 shroud.4281.desc: "賢明な決断です。 彼らの任務によってこの先もあなたの住民の安全が守られますように。"
 shroud.4286.name: "[FROM.GetName]への攻撃"
 mindwarden_farewell: "§L「あなた方が最近行った$gov_mindwarden_enclave$に対する攻撃は、 許しがたいものです。いかなる立場であっても、 あなたの領域内で活動することは道徳的にも倫理的にも容認できません。　直ちにこうした無意味な敵対行為をやめるよう強く勧告します。もっとも、 あなた方が今後いかなる選択を取ろうとも、 私はもはやその行為に加担するつもりはありません」§!"
 shroud.4286.desc: "$enclave.8000.start$\n\n$mindwarden_farewell$\n\n$enclave.8000.end$"
 shroud.4286.desc.councilor: "$enclave.8000.start$\n\n$mindwarden_farewell$\n\n$enclave.8000.councilor_end$"
 shroud.4290.desc: "本当に深刻な問題です。 この銀河において、 $end_of_the_cycle_color_article$が引き起こす惨劇ほど恐ろしいものはありません。"
 shroud.4290.a: "$marauder.31.e$"
 shroud.4290.b: "$end_of_the_cycle_color_article$とはなんだ！？"
 shroud.4290.b.response: "我々が集めた情報によれば、 $end_of_the_cycle_color_article$とは§Hシュラウド§!内に存在する大厄災を引き起こす者です。 権力に飢え、 精神に侵入できる能力を有する者たちが奴に協力することで、 かの存在の力を物質世界に顕現させることができます。\n\n“終焉”は§R$NAME_Reckoning$§!という、 サイオニック・エネルギーで構成された危険な存在を通じて銀河を崩壊に導きます。 奴の最終目的は、 この存在の完全消滅にあるようです。"
 shroud.4290.c: "どうすれば§R$NAME_Reckoning$§!を倒せる？"
 shroud.4290.d: "§Y$mindwarden_tactics_modifier$§!を伝授してほしい。"
 shroud.4291.desc: "この巨大な脅威にあなた方が勝利できますように。 何せあれは、 この銀河を故郷と呼ぶすべての者たちの存在を脅かすものですから。"
 shroud.4292.desc: "対§R$NAME_Reckoning$§!の攻撃力を強化するアルゴリズムを開発しました。 これはあなた方の武器の照準システムを調整し、 この特定のサイオニック体への攻撃の有効性を高めるものです。\n\n現状ではこのコードを1回展開するごとに、 各軍事インフラとの互換性を担保するための大幅なリファクタリングが必要になります。 よってこれはプレミアムサービスとなりますが、 支出に見合った価値を実感できると思いますよ。"
 mindwarden_tactics_modifier: "マインドウォーデンの戦略"
 shroud.4295.desc: "$shroud.4205.common$\n\n私たちは当初、 あなたの「$building_materiality_engine_plural$」に関する報告に懸念を抱いていました。 しかし、 さらなる分析の結果、 これらの装置はいわゆる§H「シュラウド」§!を非超能力的に利用するための有望な開発であると考えられます。\n\n私たちは、 このテクノロジーの継続的な導入を奨励し、 今後もあなた方と協力していきたいと考えています。"
 mindwarden_opinion_materiality_engine_tt: "態度：£opinion£ §G+$@mindwarden_opinion_materiality_engine|0$§!"
 shroud.4300.desc: "私は[mindwarden_enclave_country.GetName]の代表としてお話しします。\n\n私たちのサイオニックセンサーの測定値から判断すると、 [Root.GetName]全体が§Hシュラウド§!によって回復不能なほど感染しています。\n\nあなた方の行動は自らの終焉を告げており、 私たちはそれをさらに加速させるでしょう。"
 shroud.4300.a: "なぜシュラウドを恐れるのだ？"
 shroud.4310.desc: "私たちは戦う方法を知っているため、 恐れてもいないし、 それに堕落した関係者も恐れません。\n\nその影響で狂わされた社会であるあなた方に理解できるとは思っていません。"
 shroud.4320.desc.psionic: "超能力で銀河を汚染するだけでは不十分だったのか？"
 shroud.4320.desc.default: "私たちはこの銀河の秩序を守る力です。私たちを攻撃して何の得があるのですか？あなた方の好戦的な態度を黙って容認するつもりはありません。"
 shroud.4320.desc.common: "敵対的攻撃の無条件停止を確認するまでは、あなた方と話し合うことは何もありません。"
 shroud.4340.desc: "私たちはあなた方が§H[shroudwalker_enclave_country.GetName]§!と関係を持っていることを承知しています。 あなた方の行動は彼らの不正行為を正当化するだけでなく、 §Hシュラウド§!の感染拡大に加担しているのです。\n\nあなた方が彼らの協力者である限り、 私たちはいかなるサービスも提供しません。"
 shroud.4350.desc: "§H施設が破壊されて以来、 [mindwarden_enclave_country.GetName]との連絡を再開できていません。\n\n彼らのチャンネルを聞いても、 宇宙の空虚な宇宙の静寂だけが聞こえてきます。§!"
 enclave_opinion_tt: "態度：£opinion£ §G+$@positive_opinion|0$§!"
 mindwarden_rival_opinion_tt: "[event_target:shroudwalker_enclave_country.GetName]に対する態度：£opinion£ §R$@negative_opinion|0$§!"
 shroudwalker_rival_opinion_tt: "[event_target:mindwarden_enclave_country.GetName]に対する態度：£opinion£ §R$@negative_opinion|0$§!"
 shroud.4405.title: "$gov_mindwarden_enclave$が破壊された"
 shroud.4405.desc_common: "[mindwarden_enclave_system.GetName]星系における我々の攻撃は成功を収めた。 §H[mindwarden_enclave_country.GetName]§!は消滅した。"
 shroud.4405.desc.default: "$shroud.4405.desc_common$ 彼らが嫌悪した行為は我々にとって些細な問題に過ぎなかったが、 §H「シュラウド」§!に対する彼らの聖戦は、 我々の銀河にあってはならない似非科学的独断主義を象徴していた。"
 shroud.4405.desc.psionic: "$shroud.4405.desc_common$彼らはもはや§Hシュラウド§!の危険性について無知な教義を広めることはなく、 そのステーションのサイオニック・アッテニュエイターは今や瓦礫と化した。"
 shroud.4405.desc_end: "我々の勝利は二重の成功を収めた。 彼らのステーションの残骸から大量の資源を回収することもできたからだ。"
 shroud.4406.title: "$gov_mindwarden_enclave$が破壊された"
 shroud.4406.desc_common: "[mindwarden_enclave_system.GetName]系の§H[mindwarden_enclave_country.GetName]§!が消滅したとの報告を受けた。この$gov_mindwarden_enclave$は§H[mindwarden_destroyer.GetName]§!の猛攻に耐えることができず、ステーションは瓦礫と化し、生存者は確認されていない。"
 shroud.4406.desc.psionic: "銀河は今や、 彼らの反サイオニック運動の苦痛から解放された。 彼らの代わりとなる者が現れない限りは。"
 shroud.4406.desc.default: "当面の間、 銀河は彼らの反サイオニックサービスなしでやっていく必要があるだろう。"
 shroud.4406.a: "清々しい気分だ。"
 shroud.6855.desc: "どうかこのことを広く知らしめてください。 私たちは[root.GetName]と緊密な連携を維持できていることを嬉しく思っています。 我々の歴史と目標は、 この先も一蓮托生です。"
 shroud.6855.desc.1: "あなた方が[mindwarden_enclave_country.GetName]に貢献してくださった御恩は決して忘れません。 超能力の脅威が消えてなくなるその時まで、 この絆が揺るがないことを祈ります。"
 shroud.6855.desc.2: "次の利益配分は遅滞なく支払われる予定です。 ご安心ください。"
 shroud.6855.b: "中立機構の規模を拡大する手伝いがしたい。"
 shroud.6855.b.timeout: "中立機構では現在、 新しい幹部や職員を募集している。 §Y[mindwarden_enclave_country.upgraded_station_timer]§!まで、 これ以上の業務改善には着手できない。"
 shroud.6855.c: "我々のテクノロジーを共有したい。"
 shroud.6855.c.timeout: "中立機構では、 前回我々が提供したテクノロジーを依然導入中だ。 §Y[mindwarden_enclave_country.updating_databanks_timer]§!を過ぎれば、 新たなテクノロジーの共有が可能になる。"
 shroud.6855.d: "我々自身の目的のために§Y艦隊§!を1つ雇いたい。"
 shroud.6855.e: "$enclave.205.b$"
 shroud.6855.f: "マインドウォーデン中立機構の収容能力を増加したい。"
 shroud.6855.f.timeout: "我々は依然、 中立機構のインフラ変更を進めている最中にあります。 §Y[mindwarden_enclave_country.mindwarden_enclave_capacity_bought_timer]§!まで、 マインドウォーデン中立機構の収容能力を増やすことはできません。"
 shroud.6860.1.desc: "追加の資金が得られれば、 艦隊の数と収容能力を増やしたり、 精神保護技術の発展に向けてより多くの研究者を雇用するなど、 我々の活動規模を大きく拡大することができます。 最終的にはあなた方の後援によって、 銀河中が恩恵を受けることになるでしょう。"
 shroud.6860.2.desc: "常に変化し続ける超能力の脅威に対する警戒を緩めることは決してできません。 あなた方の寛大な寄付によって、 我々もこの課題に取り組みやすくなり、 活動範囲を大幅に広げることができます。"
 shroud.6860.3.desc: "我々は多くのことを成し遂げましたが、 休むにはまだ早すぎます。 自由に使えるリソースが増えれば、 [mindwarden_enclave_country.GetName]の艦隊を、 この銀河のさらなる彼方まで配置できるようになります。 そうなれば、 超能力に精神を苛まれている者たちを今以上の規模で守ることにつながるでしょう。"
 shroud.6860.4.desc: "あなた方の後援は、 開始時から我々の旅の方向性を決定づけてきました。 そして私たちは今でも、 超能力を撲滅することで健やかな精神を育むという共通の目標を掲げています。 あなた方の助力によって、 我々は着々と目的の達成に近づいていますよ。"
 shroud.6860.5.desc: "もし我々の活動への投資に改めて同意いただけましたら、 我々は銀河一の反超能力勢力に——それぞれの星に存在する、 あらゆる国家を精神汚染から守る最高の砦になれるでしょう。"
 shroud.6860.b: "ならば、取引成立だ。"
 shroud.6861.desc: "感謝します。 すべての知的生命体の精神を保全するため、 あなた方と協力できることを誇りに思います。"
 shroud.6865.desc: "良い仕事ぶりでしたね。 銀河に$ENCLAVE_MINDWARDEN_PLURAL$が増えるほど、 皆の精神を侵略から守りやすくなります。\n\n必要なら、 今後さらなる中立機構の設立と運営に向けて、 貴国のインフラの効率を改善するご相談にも乗れますよ。"
 shroud.6865.b.tt: "$mindwarden_enclave_capacity$：§G+1§!"
 shroud.6870.desc: "研究から得た成果を積極的に共有してくださり、 ありがとうございます。 こうして分け与えていただいた知識は、 漏れなく超能力の脅威から銀河を守る力を強化してくれることでしょう。"
 shroud.6875.desc: "喜んで応じましょう。 対サイオニック・テクノロジー、 および戦略の最前線にいる[mindwarden_enclave_country.GetName]艦隊が相手となれば、 精神への侵入を試みる攻撃者とてひとたまりもありません。 何せすべての隊に、 超能力を使う敵との戦いを想定して特別な訓練を積んだ指揮官がいるのですから。"
 mindwarden_tt_hirefleet: "この中立機構の§Yマインドウォーデン艦隊§!の指揮権を10年間得る。"
 shroud.6876.desc: "§H[mercenary_fleet.GetName]§!は必ずや、 超能力をいたずらに破壊的な目的で使う者たちとの戦いにおける有用な道具となるでしょう。"
 mindwarden_tt_managefleet: "§Yマインドウォーデン艦隊§!の契約を破棄、 あるいは延長する。"
 shroud.6880.desc: "もちろんです。 §H[mercenary_fleet.GetName]§!があなた方の部隊にとって有用な戦力であることが証明されたことを願います。 ここで契約を終了しますか、 それとも延長なさいますか？"
 shroud.6880.a: "$marauder.31.e$"
 shroud.6881.desc: "いいでしょう。 これで契約は無効となりますので、 §H[mercenary_fleet.GetName]§!は即時我々の元に帰還させます。 また彼らの力が必要になりましたら、 いつでも雇い直すことができますよ。"
 #======================
 # Mindwardens origin
 #======================
 origin_mindwardens: "$MINDWARDEN_plural$"
 origin_mindwardens_desc: "$CHALLENGING_ORIGIN$§R警告：['concept_psionic_ascension']へのアクセスをブロックする。§!\n\nこの文明の祖先は、 精神を侵略する異世界の力に悩まされていたことで、 反サイオニック・テクノロジーの開発に多大な努力とリソースを捧げるようになった。\n\n彼らの古代の装置はまだ機能しているが、 広大な銀河からの超能力の脅威に対しては未検証のままである。"
 origin_tooltip_mindwardens_effects: "- $ADDITIONAL_TECHNOLOGIES_STRING$ £engineering£ ['technology:tech_starbase_3']\n- $HOME_SYSTEM$ §H$tech_starbase_3$§!から開始する。\n- $HOMEWORLD$ £building£ ['building:building_ancient_ward_1']\n- 超能力アセンションを果たした帝国に対して、 §Y$casus_belli_cb_psionics_containment$§!の§H開戦事由§!にアクセス可能になる。\n- §Y$FE_GUARANTEED_COLONIES$§!が出現しない。\n- §Y$ENCLAVE_MINDWARDEN_PLURAL$§!がゲーム開始時に生成されない。"
 SPECIES_CLASS_MUST_USE_ORIGIN_MINDWARDENS: "§Y起源['civic:origin_mindwardens']§!が必要。"
 START_SCREEN_MINDWARDENS: "我々の先祖の記録には、 かつて[GetHomeWorldName]を荒廃させた精神汚染について記されている。 異世界の力が彼らの精神を攻撃し、 破壊的な放射線が大気中に拡散した。 これらはすべて、 [GetSpeciesAdj]社会の超能力たちによって引き起こされた。\n\nこれらの脅威に対抗し、 我々の先祖は精神を侵略する力から守るために$building_ancient_ward_1$を建設した。 定期的なメンテナンスのみで、 この由緒ある建設物はすべての[GetSpeciesNamePlural]を超能力の影響の脅威から守るのに十分な強度を誇り、 その核となるテクノロジーは、 他の精神の防御の開発にも影響を与えた。\n\n我々の文明が[capital_scope.System.GetName]の軌道外への航海に備える中、 我々は未知の世界に直面している。 我々の想像を超えた場所には、 どんな超能力的脅威が潜んでいるのだろうか？"
 mindwarden_system_init_NAME: "$origin_mindwardens$"
 mindwarden_system_init_DESC: "起源「$origin_mindwardens$」を使用した場合、 必ずこれが母星系となる。\n\n$system_initializer_DESC$"
 mindwarden_sol_system_init_NAME: "$origin_mindwardens$ (ソル)"
 mindwarden_sol_system_init_DESC: "起源「$origin_mindwardens$」をもつ種族の母星系候補。 ソルが拠点となる。\n\n$system_initializer_DESC$"
 building_ancient_ward_1: "古代のウォード"
 building_ancient_ward_1_desc: "この先祖伝来の構造物は、 多数のサイオニック・アッテニュエイターをを用いることで、 精神侵略の力から惑星全体を遮断している。"
 building_ancient_ward_2: "グランド・ウォード"
 building_ancient_ward_2_desc: "この先祖伝来の構造物は、 強化型サイオニック・アッテニュエイターを備えることでアップグレードされており、 星系全体を$PSIONIC_AURA_PLURAL$から防護できる。"
 psionic_auras_immunity: "星系内の§Y$PSIONIC_AURA_PLURAL$§!を段階的になくしていく"
 mindwarden_aura_immunity: ""
 war_goal_wg_end_threat_psionics: "$war_goal_wg_end_threat$"
 war_goal_wg_end_threat_psionics_desc: "サイオニック感染の脅威から銀河を守るために戦争が繰り広げられている。"
 casus_belli_cb_psionics_containment: "超能力抑制"
 NAME_Exiled: "夢見る者の聖歌隊"
 EXILED_SYSTEM_01: "ロマシュ"
 EXILED_SYSTEM_02: "ジョロキ"
 EXILED_SYSTEM_03: "プレニクス"
 EXILED_SYSTEM_04: "ゲリブラ"
 EXILED_SYSTEM_05: "キューン"
 EXILED_SYSTEM_06: "ナミーク"
