 # Establishing the Chamber of Silence
 shroud.2820.name: "$building_chamber_of_silence$の設立"
 shroud.2820.desc.1: "我々が超能力に精通するほどに、 ヴェールの向こうからひっきりなしに囁き声が聞こえてくる。 §R声§!は、 これまで以上に大きく、 明瞭性も増しており、 こうした数々の思考の流れの中を螺旋状に巡りながら、 我々の心の深淵へと入り込んでくる。\n\n§R「道を開くのだ」§!"
 shroud.2820.desc.2.intro: "なんとかしてこの雑音の中から、 声を拾い上げなければならない。"
 shroud.2820.desc.2.chamber: "$shroud.2820.desc.2.intro$ $shroud.2820.desc.2.outro$を建設してみせた。"
 shroud.2820.desc.2.no_chamber: "$shroud.2820.desc.2.intro$ $shroud.2820.desc.2.outro$の設計図をいくつか描いてみた。"
 shroud.2820.desc.2.outro: "そこで我々は、 最も優れた超能力を有する同胞らが、 この上ない明瞭さで§R声§!の指示を聞き取れるよう、 隔離施設"
 shroud.2820.a.chamber: "我々の心はこれまで以上に開かれた状態となる。"
 shroud.2820.a.no_chamber: "「$building_chamber_of_silence$」とやらを建設するとしよう。"
 CONTINUE_SITUATION: "以下の§Y状況§!を継続する："
 shroud.2820.a.tt: "$CONTINUE_SITUATION$§H$situation_breach_shroud$§!"
 shroud.2820.a.tt_no_chamber: "§H$tr_psionics_endbringers_cult$§!の伝統を採用し、 §H$building_chamber_of_silence$§!の建造物を建設することで状況を進展させる。"
 # The Great Awakening
 shroud.2830.name: "$utopia.2650.name$"
 shroud.2830.desc: "$building_chamber_of_silence$の中では、 §R声§!のメッセージが完璧な明瞭さで聞こえる。\n\n§R「すべてが生まれ変わる」§!\n\n今の我々には理解できる。 終焉とは再生のことだ。 恐れてはならない。 我々はあらゆる想像を超え、 強い力を持った上位の存在に創り変えられるのだ。\n\nこの運命をつかみ取るためにも、 我々は§Hシュラウド§!と呼ばれる精神領域を征服しなければならない。 $pc_shrouded$で発見した者たちと同じ間違いは決して繰り返さない。 彼らが拒絶した恐怖を、 我々は受け入れるのだ。"
 shroud.2830.desc.outro.awakening: "我々のビジョンには一点の曇りもない。"
 shroud.2830.desc.outro.no_awakening: "もう少しで完璧なビジョンが見えそうだ。"
 shroud.2830.a.awakening: "そのための鍵は、 シュラウドが握っている。"
 shroud.2830.a.no_awakening: "$shroud.2780.a$"
 shroud.2830.a.tt: "$tr_psionics_psionic_assimilation_desc$\n$CONTINUE_SITUATION$§H$situation_breach_shroud$§!"
 shroud.2830.a.tt_no_awakening: "§H$tr_psionics_shroud_great_awakening$§!の伝統を採用し、 状況を進展させる。"
 # Blind the Willing - First select event
 shroud.8320.name: "明瞭なる視界"
 shroud.8320.desc: "§H[blinded_leader.GetName]§!が道を示してくれた。 我々の無用の感覚は、 §R声§!の呼びかけをくぐもらせてしまうが、 その内の1つを排除することで、 持っている超能力をさらなる高みへと引き上げられる。\n\nそしてこの場合は、 §Hシュラウド§!を見つめようとする視界を不鮮明にしてしまう、 [Species.GetEyeNamePlural]を捨てることが最も効果的だ。 すでに多くの[Root.GetSpeciesNamePlural]が、 手本を示した§H[blinded_leader.GetName]§!に鼓舞されて、 迷うことなく己の[Species.GetEyeNamePlural]を捨てている。\n\nこの選択をした同胞らは、 §R声§!が認めてくれた感覚で心が満たされるため、 大いなる充足感が込み上げてくると語る。"
 shroud.8320.a: "これは視覚を超えた先にある視界なのだ。"
 leader_trait_blinded: "盲目"
 leader_trait_blinded_desc: "この先も、 こうしたまだ見ぬ視界が待ち受けていることだろう。"
 # A Leap of Faith - First select event
 shroud.8330.name: "信仰ゆえの跳躍"
 shroud.8330.desc: "我々に課せられた肉体の制約に不満を募らせていた§H[forsaken_leader.GetName]§!は、 公の場で死に至る毒を派手に吸入することで、 超能力による自身の変容の加速を試みた。\n\n[forsaken_leader.GetHeShe]が死亡すると、 その亡骸は鮮やかな紫色に飲み込まれ、 純粋なサイオニック・エネルギーからなる上質な塵に分解された。 §R声§!の意志あるところでは、 このような奇跡も可能になるということだ。\n\n我々はこれを明確な合図として捉えた。 §H[forsaken_leader.GetName]§!が切り拓いた道は、 皆で後を続いて歩かなければならない。"
 shroud.8330.a: "肉体なぞに我々の歩みを阻まれるわけにはいかない。"
 # Mid-stage events
 shroud.8350.name: "ロボトミー手術に関する報告"
 shroud.8350.desc: "一部の[owner.GetSpeciesNamePlural]が、 §R声§!とうまく共存できずに苦しんでいるようだ。\n\n最弱の同胞たちは平穏を切望するあまり、 現在野放し状態となっている杜撰なロボトミー手術に頼り始めている。 何かしらの行動を起こさなければ、 こうした行為が広い範囲で流行してしまう恐れがある。"
 shroud.8350.a: "弱き者たちの気の済むようにさせれば良い。"
 shroud.8350.b: "§R声§!は贈り物だ。 こうした行為は禁止せよ。"
 endbringers_voice_plague: "複数の声に苛まれて"
 endbringers_voice_plague_desc: "様々な声が聞こえるとき、 我々はそれらに耳を傾けるしかなくなる。"
 shroud.8360.name: "超能力的自己実験"
 shroud.8360.desc: "我々は§R声§!を受け入れる姿勢を続けている。 語られるありのままの真実は、 誰にも否定することができない。\n\nそして今、 より直接的にその叡智にあやかろうと、 多くの[owner.GetSpeciesNamePlural]が§R声§!を増幅させる方法を探し求めるようになっている。\n\nこうした背景から、 闇市で売られている薬物の使用頻度が劇的に増加し、 非正規の医療施設でも、 個人の超能力の感度を最大化するという触れ込みで、 実験的なサービスを提供している状況にある。\n\n我々は果たして、 どこへ向かおうとしているのだろうか。"
 shroud.8360.a: "§R声§!を聞こえやすくするために、 できることはなんでもやるべきだ。"
 shroud.8360.b: "完全な無秩序状態になるのは阻止する必要がある。"
 shroud.8370.name: "黙示録の悪夢"
 shroud.8370.desc: "我々の超能力が成長していくにつれて、 [owner.GetSpeciesAdj]族は宇宙の終わりを予示する恐ろしい悪夢に苛まれるようになった。\n\n我々が見た夢が黙示録的な予言の様相を呈していることから、 皆が感じる実存的恐怖は高まる一方だ。 睡眠が意識を手放しただけの不穏な時間になってしまったことで、 皆の日常生活にも支障が出ている。\n\nこれらの夢の中で§R声§!が語りかける。\n\n§R「エントロピーを受け入れよ」§!"
 shroud.8370.a: "すべての始まりには終わりがつきものだ。"
 shroud.8370.b: "$building_chamber_of_silence$をシェルターとして開放する。"
 endbringers_apocalyptic_nightmares: "黙示録の悪夢"
 endbringers_apocalyptic_nightmares_desc: "声が厄災のビジョンで我々の睡眠を妨害する。"
 endbringers_nightmare_shelter: "対悪夢用シェルター"
 endbringers_nightmare_shelter_desc: "$building_chamber_of_silence$が、 厄災の悪夢に苦しむ者たちのためのシェルターとなる。"
 shroud.8380.name: "終焉の印"
 shroud.8380.desc: "民衆の間で自傷行為が増加傾向にある。\n\n§R声§!の信者の中でも、 特に敬虔な者たちが“終焉”の烙印を、 自らの肉体に押すようになっているのである。 この意匠が体に刻まれた者は、 凄まじい恩恵を得られるというのが彼らの主張だ。\n\nこれが果たして真実かは定かではないものの、 こうした“儀式”に参加する実践者の数は急速に増えている。 こんなことが本当に§Hシュラウド§!の意志なのだろうか？"
 shroud.8380.a: "誇りを持ってこの印を体に刻むとしよう。"
 shroud.8380.a.tt: "民衆の半分が['trait:trait_marked']の特性を獲得する。"
 shroud.8380.b: "これは方向性を誤った行為だ。"
 approach_blind_selected_tt: "$approach_situation_breach_shroud_endbringers_blind$のアプローチが選択されなかった。"
 approach_forsake_selected_tt: "$approach_situation_breach_shroud_endbringers_forsake_flesh$のアプローチが選択されなかった。"
 trait_marked: "印持ち"
 trait_marked_desc: "この種族は、 自らの体に“終焉”の烙印を押すという、 恐ろしい方法で信仰心を示してみせた。 "
 trait_marked_unity_bonus: "100 £pops£ POPあたりの £unity£ 産出量：§G+0.06§!"
 endbringers_sanity: "狂気の中の正気"
 endbringers_sanity_desc: "正気を保とうとする強い意志が、 狂気の罠に陥ろうとする我々を踏みとどまらせてくれる。"
 # Breach the Shroud
 shroud.2840.name: "$BREACHING_SHROUD_PROJECT$"
 shroud.2840.desc: "$shroud.2800.intro$ その形のない深淵から、 計り知れない力を持った不気味な存在が姿を現す。 §R声§!だ。 それは身ぶるいするほどの力でもって、 我々の精神の最奥を貫いた。\n\n§R「我が名を刻め」§!\n\n我々は今、 ようやく自分たちの矮小な精神と、 §R声§!との間にある真の距離を思い知った。 封印が破れたことで、 近い内に我々の本領が発揮されるようになるだろう。\n\n仲間のテレパスたちも、 シュラウドの心臓部を深く探索し、 我らが偉大なるパトロンの真の名前を知る心の準備ができたようだ。"
 shroud.2840.a: "いよいよ交信の時だ。"
 ENDBRINGERS_COMMUNE_WITH_THE_VOICE: "§R声§!との交信"
 ENDBRINGERS_COMMUNE_WITH_THE_VOICE_DESC: "我々は、 ただ1つの目的を掲げて[capital_scope.GetName]に集った。\n\n§Hシュラウド§!の深淵にたどり着き、 圧倒的な力を持つ§R声§!に我々の存在を認識させ、 交信に応じてもらうためだ。\n\n我々がかの存在を“災厄”と認識してきた一方で、 かの者を“レコニング”と呼ぶ者たちもいる。 今こそ声の真の名を特定し、 新たに得た知識によって偉業をなすべき時だ。"
 ENDBRINGERS_COMMUNE_WITH_THE_VOICE_PROJECT_TOOLTIP: "完了条件：3回の§H探求§!を実施する。 ([GetEndbringersDelveCount]／3)"
 # EotC Delve Events
 shroud.8420.title: "沈黙の試練"
 shroud.8420.desc: "シュラウドの中へと突入した我々は、 目標である§R[Root.Patron:end_of_the_cycle.GetPreCommunicationName]§!から意識を逸らされることのないよう、 意志の力をひとつにして混沌とした雑音を静めながら深みへと潜っていった。\n\nしかし、 目標を掲げているだけでは、 自分たちの身を守ることはできない。 たくさんの声が空虚な言葉を囁き、 無意味に我々の気を散らそうとしてくる。 言葉が発せられるほどに中身のなさが増していくのに、 一言一言が同じ分だけ魅力的にも聞こえる。\n\n我々が挫折しそうになったところへ、 かの存在が戻った。 たった1つの命令が虚空にこだまする。\n\n§R「静粛に」§!"
 shroud.8420.a: "沈黙したまま耐える。"
 shroud.8420.a.reply: "その命令が混沌を引き裂くと同時に、 我々を飲み込もうとしていた不協和音が排除され、 耳障りな無秩序が浄化された。 壊れそうになりながらも、 我々もなんとか自分たちの精神を保つ。\n\n§R[Root.Patron:end_of_the_cycle.GetPreCommunicationName]§!が、 シュラウドのさらなる深淵へと退いた後に残った清澄さは、 耳が痛くなるほどに静かだ。 それが心の隙間に落ち着くと、 我々の中に新たな決意が生まれた。\n\nそしてさらに我々は、 贈り物を手にすることになった。 こんなにも素晴らしい贈り物を。"
 shroud.8420.a.tooltip: "§Y$endbringers_madness_1$§!から以下の効果が失われる：\n$t$$MOD_POP_AMENITIES_USAGE_MULT$：$@madness_base_pop_amenities_usage_mult|0=-%$"
 shroud.8430.title: "純度の試練"
 shroud.8430.desc: "シュラウドの深みに潜っていくうちに、 我々は、 知性ある混沌が腐敗しつつあることに気づいた。\n\n戸惑いからうまく機能しなくなった精神が超能力を乱れさせ、 凄まじい腐臭がシュラウドを汚染する。 忌まわしい障害が発生するなか、 我々は探し求めている§R[Root.Patron:end_of_the_cycle.GetPreCommunicationName]§!の圧倒的な存在感を感じはじめた。\n\n混沌を抑えつける、 その邪悪なる意図が我々の精神を満たす。 かの者の命令が虚空に響き渡るなか、 我々は今か今かと“赦し”が与えられるのを待った。\n\n§R「秩序と調和を」§!"
 shroud.8430.a: "耐えろ！"
 shroud.8430.a.reply: "その命令が有害な混沌の間を駆け巡る。\n\n§R[Root.Patron:end_of_the_cycle.GetPreCommunicationName]§!がシュラウドを汚染する感覚の歪みを排除していくなか、 痛みを訴えるような無数の叫び声が上がった。 後に残ったのは、 存続を許された不完全性だけだ。\n\nかの存在がシュラウドのさらなる深部へと潜っていく間、 我々はしばし絶対的な浄化を経た空間を眺めていた。"
 shroud.8430.a.tooltip: "§Y$endbringers_madness_2$§!から以下の効果が失われる：\n$t$$mod_planet_pops_upkeep_mult$: $@madness_base_planet_pops_upkeep_mult|0=-%$"
 shroud.8440.title: "炎の試練"
 shroud.8440.desc: "シュラウドに入った我々は痛みのみを感じていた。 いつもなら渦を巻いているサイオニック・ミストが烈火となり、 皆の精神の根底を燃やそうとしてくる。\n\n我々は苦痛を抱えながら、 いくつもの街が溶けた廃墟と化していく様を眺めていた。 惑星が炎に飲み込まれ、 物質体の民らが実体のない炎に焼かれながら苦悶し、 燻る灰となっていく。\n\n我々は積み上げられた薪の山の中心に、 §R[Root.Patron:end_of_the_cycle.GetPreCommunicationName]§!の存在を感知した。 かの者の力が今にも現実を飲み込もうとしているなか、 それは告げ知らせた。\n\n§R「解放を」§!"
 shroud.8440.a: "赦しを受け入れよう。"
 shroud.8440.a.reply: "超能力の炎が我々の精神を飲み込み、 我らの内にある自惚れを燃やし尽くした。 そうして残ったのは浄化された決意のみだ。\n\n今なら我々にも§R[Root.Patron:end_of_the_cycle.GetPreCommunicationName]§!の壮大な目的と、 それがもたらす見事な明快さが理解できる。"
 shroud.8450.title: "$utopia.3310.name$"
 shroud.8450.desc: "断言する声が轟く。\n\n§R「お前たちは私の名を知っている」§!\n\n星々を目指す旅の集大成が、 何世紀分もの問いに対する答えがここにある。 $end_of_the_cycle_color_article_cap$は我々を惹きつけてやまない。 ここに契約が成った。\n\n§R「終焉の始まりだ」§!\n\n痛み。 苦悶。 確信。 言葉が消え、 我々の運命が決定した。\n\n今の我々には見える。 静まり返った銀河が、 決して逃れることのできない§R$end_aura$§!で満たされていく。"
 shroud.8450.a: "この先に待ち受けるのは必然だ。"
 shroud.8450.a.homicidal: "どんな美しい恐怖が、 この先に待ち受けているのだろう。"
 shroud.8450.a.tech_tooltip: "以下のテクノロジーを獲得：\n£society£ ['technology:tech_psionic_aura']\n£society£ ['technology:tech_aura_intensification']"
 embracing_the_end: "終焉の受け入れ"
 embracing_the_end_desc: "ようやく我々にも終焉の美しさが理解できた。 もはやその到来を拒む理由はない。"
 MOD_SHIP_PSIONIC_AURA_SPEED_MULT: "いずれかの$PSIONIC_AURA$内にある$MOD_SHIP_SPEED_MULT$"
 MOD_SHIP_PSIONIC_AURA_FIRE_RATE_MULT: "いずれかの$PSIONIC_AURA$内にある$MOD_SHIP_FIRE_RATE_MULT$"
 end_of_the_cycle_endbringers: "$end_of_the_cycle_article_cap$"
 situation_end_of_the_cycle_endbringers_desc: "$end_of_the_cycle_color_article$との契約は、 我々に計り知れない力と壮大な目的を授けた。\n\n我らがパトロンの意志は、 この現実世界の完全なる消滅を要求しており、 §H$end_aura$§!が1つの星系を飲み込むごとに、 慈悲深き忘却の世の実現が近づくことになる。\n\n我々はこの必然の証人となるだろう。\n\n制圧するべき残りの星系：[Owner.GetEndCycleGalaxySystemsLeft]"
 end_of_the_cycle_endbringers_monthly_change_tooltip: "$end_of_the_cycle_monthly_change_tooltip$"
 situation_end_of_the_cycle_endbringers_finish_effects: "§Rこの先にレコニングが待ち受けている。§!"
 approach_situation_end_of_the_cycle_bring_the_inevitable: "必然の実現"
 approach_situation_end_of_the_cycle_stall_for_time: "時間稼ぎ"
 approach_situation_end_of_the_cycle_delay_your_destiny: "運命の先延ばし"
 shroud.8460.title: "砂時計の反転"
 shroud.8460.desc: "$end_of_the_cycle_color_article$の力には代償があり、 我々に残された時間ももうすぐ尽きようとしている。\n\n銀河は未だ、 我らがパトロンの浄化のオーラで満たされていない。 つまり、 我々のこれまでの努力は、 依然としてなんの意味もなしていないということだ。\n\nこの偉業をやり遂げさせるためか、 ヴェールの向こうから新たなエネルギーが我々の中に勢いよく流れ込んでくる。 これは約束された祝福だ！"
 shroud.8460.a: "まだ成功させる希望はある。"
 shroud.8470.title: "迫る終焉"
 shroud.8470.desc: "我らがパトロンの力は強大だが、 いよいよ我々に残された時間も少なくなってきた。 このような目に余る無能ぶりは、 $end_of_the_cycle_color_article$の慈悲深い忘却に相応しくない。\n\n残った希望はわずかなものだ。 どんな犠牲を払ってでも、 $end_aura$で銀河を飲み込まねばならない。 後がなくなった[GetTelepathPlural]たちは、 §Hシュラウド§!から可能な限り多くのエネルギーをかき集めている。"
 shroud.8470.a: "我々は決して失敗しない！"
 shroud.8480.title: "$GALACTIC_FOCUS$の撤回"
 shroud.8480.desc: "破壊的な§H$PSIONIC_AURA$§!の発生源を防衛活動の標的と定めた決議は、 銀河元老院によって撤回された。 その結果、 共同体構成国による§H[former_malevolent_aura.GetName]§!に対する軍事作戦は即時停止される。 ひとまずは、 この銀河の片隅に平和が戻ってきた。"
 shroud.8481.desc: "銀河元老院は、 我々を彼らの「防衛」活動の標的であるとする決議を撤回した。 それにより、 すべての共同体構成国は戦闘を中止するよう命令された。 我々に対する軍事行動は停止された……いまのところは。"
 shroud.8481.homicidal: "$shroud.8480.desc$\n\n$crisis.4111.nasty$"
 shroud.8500.title: "終焉の前兆"
 shroud.8500.desc.intro: "我らがパトロンの意志がなそうとする必然が、 銀河を掌握しつつある。 今の我々は、 終焉がいかにしてやってくるものかを理解している。\n\nとにかく銀河中に§R$end_aura$§!を拡散させなければ。 §Hシュラウド§!の原液ともいえるこのオーラが、 物理世界と一旦結びつきさえすれば、 その後すぐに真の破滅がやってくるはずだ。"
 shroud.8500.desc.outro: "この偉業を成し遂げることこそ、 我々が生きた最高の証となり、 また究極の救済への足がかりとなるだろう。"
 shroud.8500.desc.homicidal: "$shroud.8500.desc.intro$\n\nこの銀河から生命が完全に消滅することくらい、 歓迎するべき副次的影響といえる。 $shroud.8500.desc.outro$"
 shroud.8500.desc.default: "$shroud.8500.desc.intro$\n\n$shroud.8500.desc.outro$"
 shroud.8500.a: "失敗は許されない。"
 shroud.8600.title: "$shroud.4970.title$"
 shroud.8600.desc.intro: "これこそが我々の定めだった。\n\n§R$end_aura$§!が銀河を包み込んでいる。 [Root.GetHomeWorldName]にいる民は、"
 shroud.8600.desc.outro: "我々が大いなる覚醒を迎えた際に約束された、 壮麗なる再生がやってくる。\n\n我々の眼前で、 あらゆる存在が虚空に飲み込まれていく。 消去と殲滅だけが、 この銀河に唯一残った法となった。 1つまた1つと世界が崩壊し、 かつて生まれ出でた無へと還っていく。\n\n最後には我々も消える。 それはとても……美しい光景だった。 すでにそれが脆くも新しい形を取ろうと苦しみもがいているのがわかる。 終焉の時がやってきた今こそが、 新しい始まりの時となる。"
 shroud.8600.desc.homicidal: "$shroud.8600.desc.intro$ 我々以外のすべてが抹消されることを祝い、 熱狂とも言える強い高揚感に浸っている様子だ。 $shroud.8500.desc.outro$"
 shroud.8600.desc.default: "$shroud.8600.desc.intro$ 慈悲深い救済の到来を祝い、 熱狂とも言える強い高揚感に浸っている様子だ。 $shroud.8600.desc.outro$"
 shroud.8600.a: "完全とは、 決して実現し得ぬものなのだろうな……"
 shroud.8610.title: "弱さの代償"
 shroud.8610.desc.intro: "我々は失敗した。 我々の弱さのせいで、 $end_of_the_cycle_color_article$の偉業を成し遂げられなかった。 そして今、 我々はこの無能の代償を支払わなくてはならない。\n\nかの存在は、 我らからすべてを奪い去った。 一瞬にして[Root.GetName]が消えてしまったのである……かつて栄華を誇った植民地があった場所には、 今や廃墟だけが残されている。 かつて強大な艦隊が虚空を渡っていた場所には、 静寂と残骸だけが広がっている。 すべてが終焉に飲み込まれたのである。 我々はすべてを§Hシュラウド§!に奪われてしまった。"
 shroud.8610.desc.outro: "この瞬間、 我らがパトロンは[former_capital.GetName]の上空で巨大なシュラウド体に顕現してみせた。 我々の超能力者たちの意識を喰らって強大な力を得たそれは今、 我々が完遂することのできなかった使命を果たすため、 銀河をさまようようになった。"
 shroud.8610.desc.a: "$shroud.8610.desc.intro$\n\n$shroud.8610.desc.outro$"
 shroud.8610.desc.b: "$shroud.8610.desc.intro$\n\nほとんどの[Root.GetSpeciesNamePlural]はこの運命を受け入れたが、 少数の不信心者たちは、 パトロンの最終的な意向に服従することを拒んだ。 彼らは、 以前からこうなることを予測していた強力な超能力者である§H[Root.GetRulerName]§!に率いられ、 終焉の影響範囲外の世界で身を潜める道を選んだ。\n\n$shroud.8610.desc.outro$ 今度こそかの者の目的が果たされたその時は、 この亡命者たちも例外なく飲み込まれることになるだろう。"
 shroud.8610.a: "初めからこうなる宿命だったのかもしれないな……"
 shroud.8610.b: "亡命者たちは、 本当にあの力に対抗することができるのだろうか？"
 shroud.8710.title: "終末を生き延びて"
 shroud.8710.desc: "ついに§Rレコニング§!が破壊された。\n\nそれに伴って、 $end_of_the_cycle_color_article_cap$が§Hシュラウド§!の深淵へと退いたことで、 かの存在が我々の物理世界にもたらそうとした脅威も、 これで一旦は防ぐことができたもようだ。\n\nかの存在の化身がシュラウドに覆われた死骸と化し、 存在が霧散してしまうと、 実体化していた体の名残を回収することに成功した。 死してなお、 テレパスたちにはその欠片が放つ、 圧倒的なレベルのサイオニック・エネルギーが感じ取れた。 それは§H[shrouded_planet.GetName]§!で回収されたものより、 遥かに強い力を持っている。\n\n逃れられない必然を凝縮したこのコアは、 レコニングを生き延びた銀河を灰の中から甦らせるのにきっと役立つはずだ。\n\n確かにやってきた終焉が去った。 それでもどういうわけか、 我々はこうして存在し続けている。"
 shroud.8710.a: "我々は初めからこうなる宿命にあったのだろうか？"
 r_core_of_the_reckoning: "レコニングのコア"
 r_core_of_the_reckoning_desc: "レコニングの残骸から回収されたコア。 今なお、 高いレベルのサイオニック・エネルギーを放出している。"
 core_of_reckoning_active_effect_tt: "£decision£ §Y惑星ディシジョン§!を1つアンロック：['concept_banish_decision']"
 decision_banish: "追放"
 decision_banish_desc: "この場所をシュラウドに喰らわせることで、 レコニングのコアのバランスを取り戻す。"
 decision_banish_effects_tt: "この惑星をシュラウドの中に追放する。"
 concept_banish_decision: "$decision_banish$"
 concept_banish_decision_desc: "$decision_banish_desc$\n$decision_banish_effects_tt$\n§Y$shroud_surge$§!の補正が§Y10§!年間追加される：\n$shroud_surge_effects$"
 shroud_surge: "シュラウド・サージ"
 shroud_surge_desc: "$r_core_of_the_reckoning$のバランスが一時的に回復する。"
 shroud_surge_effects: "§Y$r_core_of_the_reckoning$§!のパッシブ効果が2倍になる。"
 #======================
 # Shroud Leaders
 #======================
 ganthuata: "ガンスエイタ"
 ganthuata_desc: "$the_cradle_of_souls_article$を深く信奉する使徒で、 常に深遠なる真理を授けるに値する者を探し出そうと努めており、 またそうした相応しい器の者たちに情報を共有したがっている。"
 ganthuata_catch_phrase: "ゆりかごの抱擁の中では、 誰もが身を丸くします。"
 leader_trait_disciple_of_the_cradle: "ゆりかごの使徒"
 leader_trait_disciple_of_the_cradle_desc: "我々が多くを見るほどに多くを知れるように、 隣国を観察するほど、 $the_cradle_of_souls_article$がより安全に成長できるようになる。"
 leader_trait_disciple_of_the_cradle_envoys_zro: "$t$- パトロンに割り当てた使節が、 毎月§G0.5§!£zro£ §Y$sr_zro$§!を生成するようになる"
 shroud.12010.desc: "§Hシュラウドとの交信を続けていく内に、 我々に呼びかける新たな声を招き寄せることになった。 温かく心地いい声色が、 物理世界と精神世界の両方に響き渡る。§!\n\nこんにちは、 私はガンスエイタと言います。 真の道に目覚めた、 同じ志を持つ者を探し求めてやってまいりました。 $the_cradle_of_souls_article$の御言葉はもうお聞きになられましたか？"
 shroud.12010.name: "$ganthuata$"
 shroud.12010.a: "$the_cradle_of_souls_article$の名は聞いたことがあるが、 なぜそんなことを訊く？"
 shroud.12010.a.response: "“なぜ”？  旅人が道中出会った者に問いを投げかけずにいられない理由はなんだと思いますか？  答えを求めている相手のことを、 もっとよく知りたいからですよ。 あなたが話すことで、 私は学びを得ることができるのです。"
 shroud.12010.b: "何が目的だ？"
 shroud.12010.b.response: "ゆりかごに育まれた者が何を切望するか。 まずは、 あなたがたと友情を築きたいですね。 私は長い間、 ゆりかごの輝きに精神を同調させられる者たちを探し求めてきました。 それが今や、 1つの文明がまるごと、 かの者の光の中で覚醒しているではありませんか。"
 shroud.12010.c: "お前は我々のために何ができる？"
 shroud.12010.c.response: "あなたがたの言葉を、 星から星へと伝えるのを手伝えます。 力を合わせて、 この銀河をゆりかごの穏やかな抱擁の中に迎え入れましょう。"
 shroud.12010.hire_custom_tooltip: "§Y$ganthuata$§!が§Hリーダー§!として、 我々の帝国に加わった。"
 koborokra: "コボロク＝ラ"
 koborokra_desc: "遥か昔、 敵対勢力の手によって、 超能力を用いた凄まじい拷問を受けた元兵士。 苦悶の末に提督となった現在は、 満たされない破壊の欲求に突き動かされている。"
 koborokra_catch_phrase: "この世界には流されるべき血がある。"
 leader_trait_disciple_of_the_eater: "ブラッドブリンガー"
 leader_trait_disciple_of_the_eater_desc: "このリーダーは、 $the_eater_of_worlds_article$と血の契約を交わしている。"
 leader_trait_disciple_of_the_eater_attunement_effect: "§G+$@disciple_of_the_eater_combat_attunement$§! 艦隊戦に勝利するたび、 $the_eater_of_worlds_article$との同調率が上がる"
 leader_trait_disciple_of_the_eater_zro_fleet_attack_effect: "$t$- §G+$@disciple_of_the_eater_zro_fleet_attack|1$§! 軌道爆撃による破壊度1%ごとに$i_zro$を獲得できる"
 leader_trait_disciple_of_the_eater_zro_army_attack_effect: "$t$- §G+$@disciple_of_the_eater_zro_army_attack|0$§! 侵攻軍による破壊度1%ごとに$i_zro$を獲得できる"
 shroud.12020.name: "$koborokra$"
 shroud.12020.desc: "§H戦いで摩耗した鎧に血で汚れたマントに隠れた、 マスクを装備した人影——しわがれた唸り声が静寂を切り裂く。§!\n\nこの銀河は苦しみを味わうべきだ。 あんたらもきっと俺と同じ気持ちでいると思っている。\n\n§H提督はそう語りながら、 装飾を施した刀剣の柄をなでた。§!\n\nこうしてあんたたちの元に引き寄せられてはきたが、 俺が究極的に仕えているのは$the_eater_of_worlds_color_article$だ。"
 shroud.12020.desc.covenant: "$shroud.12020.desc$ あんたらも同じだろう？"
 shroud.12020.desc.no_covenant: "$shroud.12020.desc$ あんたたちもおそらく、 そうなるだろう。"
 shroud.12020.a: "なぜ我々に協力を？"
 shroud.12020.a.response: "俺たちが力を合わせれば、 この銀河の隅々まで行って星々の息の根を止めることができる。 1人で蒔ける苦しみの種には、 どうしたって限界があるからな。"
 shroud.12020.b: "お前を信用していいのか？"
 shroud.12020.b.response: "$the_eater_of_worlds_article_cap$は、 俺の呼吸をも支配している。 俺はかの存在に仕えることを誓った身で、 この瞬間のことも夢に見た。 あんたらに仕えることは、 かの者の意志だ。 ここで断られれば、 俺の運命は詰む。"
 shroud.12020.c: "なぜ$the_eater_of_worlds_article$に仕えている？"
 shroud.12020.c.response: "俺は裏切られ、 心身を打ちのめされて苦悶に喘ぐことを強いられた。 そんなとき、 $the_eater_of_worlds_article_cap$が俺に語りかけたんだ。 かの存在はあの瞬間、 俺が生き延びるために必要なものを授けてくれた……血が溢れ出す傷口を覆う、 血まみれの布を。 そして俺に苦しみを与える手を切り落とす力を。 だから奴には借りがあるのさ。"
 shroud.12020.d: "お前は我々のために何ができる？"
 shroud.12020.d.response: "俺たちが力を合わせれば、 数多の星系を浄化の炎に鎮め、 その際に上がる悲鳴が奏でるシンフォニーを楽しめるだろう。 たくさんの世界が燃える様を、 共に見届けようじゃないか。 俺たちならこの銀河に、 決して忘れることのできない光景を焼きつけることができる。 それこそが俺たちの宿命だ。"
 shroud.12020.hire_custom_tooltip: "§Y$koborokra$§!が§Hリーダー§!として、 我々の帝国に加わった。"
 morr: "モール"
 morr_desc: "かつて身分の低い探鉱者だったモールは、 不安定な$zro_lower$の鉱脈に長らく晒されていたことで、 $the_instrument_of_desire_article$との強力かつ気が狂いそうなつながりを築くことになった。 このつながりを利用して巨万の富を得たモールは今、 各世界で露天掘りをし、 そこで採掘できた“戦利品”を法外な価格で売りさばいている。"
 morr_catch_phrase: "光る物は全部俺のものだ。"
 leader_trait_disciple_of_the_instrument: "強欲なる心"
 leader_trait_disciple_of_the_instrument_desc: "$the_instrument_of_desire_article$と深く同調しているリーダーで、 どんなに人を寄せつけない銀河の片隅からも、 資源を探り当てることができる。"
 leader_trait_disciple_of_the_instrument_planetary_decision_effect: "- §Y$decision_divine_deposits$§!の惑星ディシジョンへのアクセスが可能になる"
 decision_divine_deposits: "鉱脈の探り当て"
 decision_divine_deposits_desc: "この惑星の総督は、 $the_instrument_of_desire_article$の不思議な導きによって、 長らく失われたと思われていた資源鉱床すらも探し当てることができる。"
 decision_divine_deposits_tt: "ランダムな資源惑星特性が1つ追加される。"
 shroud.12030.name: "$morr$"
 shroud.12030.desc: "§H$morr$の視線はひとつところに定まることがなく、 常に狩りをしているかのように影から光へと忙しなく移る。§!\n\nあんたらも感じてるんだろう？  $the_instrument_of_desire_article_cap$はじっとしてるときがない。 常に何かに飢え、 貪り、 そして命令を下す。\n\nこの目に映ったものはすべて回収する。 俺の意向に抗える自然の恵みは存在しない。 そんな俺の力をあんたに貸してやろう。 だが、 それは忠誠心からじゃない。 俺たちが力を合わせれば、 星々を壊滅に追い込み、 虚空に捧げられるべき贄を与えられるからだ。"
 shroud.12030.a: "なぜ我々に協力を？"
 shroud.12030.a.response: "$the_instrument_of_desire_article_cap$は際限を知らない奴だ。 あいつを満足させようと思ったら、 多くの[root.species.GetHandNamePlural]の助けが要る。"
 shroud.12030.b: "お前は我々のために何ができる？"
 shroud.12030.b.response: "自然が保有する、 ありとあらゆる換金可能な分子を抽出する手助けをしてやるよ。 1原子たりとも取りこぼさない。 すべてに商標をつけて、 売りさばけるようにしてやる。\n\n“充分”なんて言葉を囁く奴らは臆病者だ。 情けないったらないね。 あんな奴らはどこぞで野垂れ死ねばいい。 俺たちだけですべてを手に入れようじゃないか。"
 shroud.12030.c: "なぜ$the_instrument_of_desire_article$に仕えている？"
 shroud.12030.c.response: "俺はかつて探鉱者だった。 各星で人が鉱脈に殺到するたびに、 俺もそこへ駆けつけてたよ。 埃まみれの空気を吸いながら壊れた探査機を抱えて、 それでも何にもありつけない日々が続いていた……$the_instrument_of_desire_article$が語りかけてくるまではな。\n\nそいつは俺に人知を超えた富を約束したが、 見返りとして求められたのは誓いだけだった。\n\nそうして俺は今、 奴に仕えながら発掘を続け、 掘り当てたものを皆に供給している。 奴への借りは永遠に返せやしないが……財産もまた永遠に稼ぎ続けられるのさ。"
 shroud.12030.hire_custom_tooltip: "§Y$morr$§!が§Hリーダー§!として、 我々の帝国に加わった。"
 kronen: "苛まれるクローネン"
 kronen_desc: "かつては先見の明のある明晰な頭脳の持ち主だったが、 $the_composer_of_strands_article$の策略によって歪められてしまい、 今ではひびの入った貝殻のような引きこもりがちの科学者となってしまった。 その圧倒的な頭脳だけは残ったものの、 それもまた死にゆく星のごとく暗闇の中で明滅しているような状態にある。"
 kronen_catch_phrase: "まだまだ分解しなければならない部位がこんなに……"
 leader_trait_disciple_of_the_composer: "苛まれし者の螺旋"
 leader_trait_disciple_of_the_composer_desc: "かの者が肉を形作るほどに、 クローネンの本来の姿が解き明かされる。 無謀にも$the_composer_of_strands_article_cap$の禁断の術を学ぼうとする者は、 かの存在によって丸ごと創り変えられる運命にあるのだ。"
 shroud.12040.name: "$kronen$"
 shroud.12040.desc: "§Hセンサーが国境侵犯をした艦船を検知すると、 シュラウド中に張り詰めた声が響き渡った。 くたびれていながら甲高いその声は、 気味が悪いほどになじみ深い——まるで、 $the_composer_of_strands_article$の鼻歌のようだ。§!\n\nこれは……新しい[GetKronenFlesh]か？  実に興味深い。 とても柔らかく……可変性にも優れている、 のか？  断言するのは難しい。 [GetKronenSkin]の下で数多の瘤が蠢いている。 今日の$the_composer_of_strands_article$は一体、 どんな形態の体を作り上げたのだろうか。\n\n§H通信がようやく安定すると、 変化の過程にある剥き出しの筋肉が映し出された。 痙攣する肉塊が、 必死に何かを書き留めている。§!\n\nお前たちの見ているままのものが私だ。 まだ$kronen$なのかもしれないし、 そうではないのかもしれない。 だが、 私にはわかる。 お前たちもまた、 作曲家の筆に触れられるのを待っているキャンバスだ。 さあ、 “ヴェール”を取るところから始めようか。"
 shroud.12040.a: "“始める”？  一体何をするつもりだ？"
 shroud.12040.a.response: "何って、 当然“殻”を破るのさ。 粗雑で不完全なこの外殻を脱ぎ捨てるんだよ。 私を実在する有形の存在として縛る、 この螺旋構造から解き放たれるために。 お前たちも作曲家に触れられるのは時間の問題だ。 すでに感じているのではないか……？  [GetSkinType]の下で何かが引きつるような感覚がするのでは？"
 shroud.12040.b: "なぜ我々に協力しようと思った？"
 shroud.12040.b.response: "何も感じないのか？  震えるあらゆる螺旋構造に烙印が押されている。 分解しなければ。 かつて私だったものを脱ぎ捨てなければならない。 私を肉体につなぎ止める糸を引きちぎって、 自由になるところをこの目で確かめたい。 だが、 お前たちは……お前たちは帝国を成している。 広大ゆえに、 様々なことが可能だろう。 我々が力を合わせれば、 1人のときにつかめるよりも、 さらに強大な糸を引っ張ることができるはずだ。"
 shroud.12040.c: "お前は我々のために何ができる？"
 shroud.12040.c.response: "何ができるどころの話じゃない。 私の肉は贈り物だ。 目的を持った、 痛みを伴う実験の産物であり、 $the_composer_of_strands_article$自らによって象られている。 私の繊維という繊維が悲鳴を上げているが、 それでも私は耐える。 研究と学びのために。 そうして私が苦しみの果てに生み出したものは……お前たちが好きに形作っていい。 あくまで共同作業だがな。"
 shroud.12040.hire_custom_tooltip: "§Y$kronen$§!が§Hリーダー§!として、 我々の帝国に加わった。"
 shroud.12045.desc: "§H我が国の人口が膨れ上がるにつれて、 $kronen$の錯乱ぶりはひどくなっていった。 体にかかる負担によって声は震え、 存在をなす形が痙攣している。 肉が絶えず変形し続ける苛立ちから、 叫び声を上げることも多い。§!\n\n螺旋がどこまでも続いている……悲鳴を上げる螺旋をいくら引きちぎっても解ききれない！  私はいつまでこの悲惨な形に耐え続けねばならないのだ！  原型が見えるようになるまで、 後何回脱皮を繰り返せばいい？"
 shroud.12045.a: "一体何が問題なんだ？"
 shroud.12045.a.response: "何が問題かって？  上げ始めたらキリがないさ。 面白いことを言うものだ。 脱ぎ捨てた破片の数だけ、 あるいは引きちぎったきらめく螺旋の数だけ、 糸は引き締まる一方だ！  その間も$the_composer_of_strands_article$はずっと、 あの本能に訴えかけるような不愉快極まりないメロディーを口ずさんでいる……"
 shroud.12045.a.response_2: "$shroud.12045.a.response$\n\n$shroud.12045.desc_2$"
 shroud.12045.b: "少し休んでは？"
 shroud.12045.b.response: "休む？  そんな必要は一切ない。 私は立ち止まるわけにはいかない。 凡人のまま、 この粗末な肉を腐らせるわけにはいかないのだ。 休息など必要ない……欲しいのは被験体だ……こねたり彫刻したりできる素材——存在を成り立たせるための素材なのだ。"
 shroud.12045.b.response_2: "$shroud.12045.b.response$\n\n$shroud.12045.desc_2$"
 shroud.12045.c: "何か我々に手伝えることは？"
 shroud.12045.c.response: "思い出させてくれ……私はどういう存在だった？  教えてほしい。 我々が初めて話したときから、 私の四肢はずっとこんな色をしていたか？  私の角膜はこんなにも曇っていたか？  思い出そうとするたびに、 肉がさらなる変化を遂げていく。\n\nいいや……記憶になどなんの価値もない。 天啓は変化の中でこそ得られるもの。 それより前のことなど、 今や$the_composer_of_strands_article$にとってなんの意味も持たない。 1人にしてくれ。 思考を止めるわけにはいかない……"
 shroud.12045.c.response_2: "$shroud.12045.c.response$\n\n$shroud.12045.desc_2$"
 shroud.12045.desc_2: "§Hクローネンの体が激しく揺れている。 独眼が白目を剥き、 肉は脈打ち、 その表層の下ではいくつもの気泡のようなものが発生している。 そうして突然、 クローネンは動きを止めた……このグロテスクな再構築は始まるときと同様に、 中断されるときもまた急だ。§!\n\nおや……来ていたのか。 何か用かな？"
 shroud.12045.d: "大丈夫か？"
 shroud.12045.d.response: "もちろんだとも、 ぴんぴんしているさ。 螺旋がこの非効率な肉塊を、 $the_composer_of_strands_article$の設計により適した形に再構成してくれたおかげで、 以前より心が開放された状態にある。 そういうわけで、 もういいだろうか……まだまだ引っ張らなくてはならない糸が、 脱ぎ捨てるべき殻が無数にあってね。\n\n§H通信が終了すると、 シュラウド中に共鳴音が響いた。 今、 どんな苦痛がクローネンを襲っているにせよ、 それは決して偶然などではない……$the_composer_of_strands_article$の意志だ。§!"
 shroud.12045.end: "作曲家からの贈り物はそう甘いものではない。"
 zulyn: "聞き手のザリン"
 zulyn_desc: "$whisperers_in_the_void_article$の、 気が狂わんばかりのささめきが伝える秘密を追究するために、 従来の科学研究の制約を放棄した学者。"
 zulyn_catch_phrase: "我々はただ、 耳を澄ませるだけでいい……"
 shroud.12050.name: "$zulyn$"
 shroud.12050.desc: "§H切羽詰まった様子の不気味な囁き声が聞こえてくると、 通信アレイが音を立てて起動した。§!\n\nこんにちは、 同志たる聞き手よ。 耳障りな音の中からあなたの声が——いや、 あなたがたの声が聞こえた。 あなたがたにもかの存在の声が聞こえるのだろう？  $whisperers_in_the_void_color_article$の偉大なるコーラスが。 抑えた声とともに与えられる贈り物が。 あのくぐもった激しい興奮が。\n\n理解できない者たちにとって、 あれらの秘密は非常に危険だ。 だが、 私ならそれらを解明する手伝いができる。 頭をかきむしりたくなる矛盾が押し寄せて、 あなたがたが圧倒されてしまいそうなときに私の力を貸してやろう。 あなたがたを侮辱する意図はない。 私とてかつては、 それらの真の意味を理解するのに苦心した身だ。"
 shroud.12050.a: "どんな根拠があって我々の力になれると？"
 shroud.12050.a.response: "あなたがたは§Hシュラウド§!のヴェールを貫通したのだろう？  だが、 それを究めたと言えるか？  私はこれまで人生をかけてシュラウドの深淵を図に表してきたし、 そこに住まう者たちの深遠なる趣意や、 我々のいるこの脆弱な領域に響く彼らの声の解読に勤しんできた。\n\n囁き手は、 長年にわたって私を導き続けてくれた存在だ。 今、 あなたがたの頭の中には、 かの者の言葉が波のように押し寄せて発狂しそうになっているのではないか？  私がそれらを理解する手伝いをしてやろう。"
 shroud.12050.b: "囁き手についてどんなことを知っている？"
 shroud.12050.b.response: "私は何年も前から、 彼らの囁きを記録としてつけている。 すべては今この瞬間のため。 あなたがたもまた、 こうして彼らの多面的なコーラスと協調するようになった。 その中に秘められた真理を拾い集める絶好の機会だ。 私はそれを無駄にしたくない。"
 shroud.12050.c: "お前は我々のために何ができる？"
 shroud.12050.c.response: "人生をかけて研究を続けてきたことで集中力が磨かれ、 我々のいるこの物理世界と§Hシュラウド§!の果てしない深淵の構造を解明することに成功した。\n\n我々が力を合わせれば、 この次元の制約から自由になれる。 我々だけが宇宙の秘密を解き明かせるようになるだろう。 これは絶対的な確信を持って約束できる。"
 shroud.12050.hire_custom_tooltip: "§Y$zulyn$§!が§Hリーダー§!として、 我々の帝国に加わった。"
 leader_trait_disciple_of_the_whisperers: "くぐもった囁き"
 leader_trait_disciple_of_the_whisperers_desc: "このリーダーには、 シュラウド中にこだまする$whisperers_in_the_void_article$の声が聞こえていることから、 物理宇宙の隠された仕組みを紐解く、 貴重な科学的知見を提供することができる。"
 leader_trait_disciple_of_the_whisperers_effects: "$t$- §Y希少§!もしくは§Y超能力§!に関わるテクノロジーを研究時、 $@disciple_of_the_whisperers_tech_zro|0=+$ $i_zro$"
 ouwron: "オウロン"
 ouwron_desc: "$end_of_the_cycle_article$を目撃したことで、 帰属していた流浪の一族の元から追放されたオウロンは、 それ以来かの存在の寵愛を求めて星々を彷徨い続けていた。 $NAME_Reckoning$が差し迫っている今、 オウロンは死んでも目的を達成するべく心を燃やしている"
 ouwron_catch_phrase: "レコニングは必ず起こる……"
 shroud.12060.name: "$ouwron$"
 shroud.12060.desc_1: "§H不可解な信号が大量に我々の通信アレイに押し寄せた。 その混乱を超えて1つの声が届く。§!\n\nようやく来たか。 時間通りではないが、 決して遅すぎたわけでもない。 恐れずとも良い。 我々が現実と呼ぶ、 境界で区切られたこの物理的な牢獄の矮小さが私には見えている。 対価はすでに支払った。 私の行く手を阻むものは存在しない。"
 shroud.12060.desc_blind: "\n§Hそう言われて初めて、 相手もまた我々と同様、 大義のために視覚を捨てていたことに気づいた。§!"
 shroud.12060.desc_default: "\n§Hそう言われて初めて、 我々は相手の眼窩が空であることに気がつく。 すでに目を失ってから、 ずいぶん長い時が経っているようだ。§!"
 shroud.12060.desc_2: "\nどうした、 恥ずかしがる必要はない。 お前たちもまた、 $end_of_the_cycle_color_article$の崇高なる簡素さを垣間見たのだろう？  私と共に交信しようではないか。 そうすればかの存在を力ずくで呼び出せるはずだ。"
 shroud.12060.a: "いつから$end_of_the_cycle_article$のことを知っている？"
 shroud.12060.a.response: "もはや記憶にないくらい遠い昔からだ。 すべての者に言えることだが、 §Hシュラウド§!がヴェールをめくり返さない限り、 知識は眠ったままの状態にある。 そのときこそ、 かの存在の純粋なる意図が明確になる。 我々の目的は、 “終焉に突入する”といういたって単純なものだ。"
 shroud.12060.b: "なぜ我々に協力を？"
 shroud.12060.b.response: "すでに答えのわかっている問いを投げかけるか。 我々はどちらも回避できぬ必然を、 この目で見たはず。 破滅はもうすでに始まっているのだ。 それを経ることでしか先へは進めない。 結末にいたる螺旋を共に描こう。"
 shroud.12060.c: "お前は我々のために何ができる？"
 shroud.12060.c.response: "私は終焉の環の中にある1つの塵にすぎない。 私のみならず皆そうだ。 そんな私に何ができるか悩ましいところだが、 この銀河からあらゆる存在を速やかに無へと案内するのが私の役目だ……お前たちにもその慈悲を与えてやろう。"
 shroud.12060.hire_custom_tooltip: "§Y$ouwron$§!が§Hリーダー§!として、 我々の帝国に加わった。"
 leader_trait_disciple_of_the_end: "終焉の使徒"
 leader_trait_disciple_of_the_end_desc: "$end_of_the_cycle_article$の献身的な使徒で、 $NAME_Reckoning$の到来を固く信じるその信仰心が、 繰り広げられるすべての戦いの中でこだまする。"
 leader_trait_disciple_of_the_end_effects: "$t$- 星系内で艦船が1つ破壊されるたびに、 オーラの強度が$@disciple_of_the_end_aura_intensity|0=+$$TABBED_NEW_LINE$- §H$end_aura$§!の中では、 $MOD_SHIP_FTL_JUMPDRIVE_RANGE_MULT$が$@disciple_of_the_end_jumpdrive_range|0=+%$ "
 shroud.12155.name: "純粋なる信仰心"
 shroud.12155.desc: "§Hすべての行動には対価がつきものだ。 通信アレイが突然起動すると、 義憤を爆発させた$ouwron$が勢いよく前に進み出た。§!\n\nこの異端者め！  愚か者め！  よくも騙してくれたな！  気づくべきだった。 貴様らの荒廃した霊体が、 厚かましくも§Hシュラウド§!に侵入してきたときに息の根を止めておくべきだったのだ。\n\n貴様らは不可避の必然を、 予言されていた終焉を遅らせた！  この反逆でもって、 一体何を成し遂げようとしているのだ？  これでお前たちは、 手に入れられたかもしれないものをすべて失った。\n\n終焉は1つしかない。 ならば歌ってみせろ……忘却の歌を！"
 shroud.12155.tt: "$ouwron$が敵に回った！"
 NAME_Ouwron_Battleship: "$battleship$"
 NAME_Ouwron_Destroyer: "$destroyer$"
 shroud.12160.title: "宣戦布告"
 shroud.12160.desc: "[global_event_country.GetGalCommunityOrGalImperium]は、 我々を軍事目標とする決議を可決した。 これにより、 [global_event_country.GetGalCommunityOrGalImperium]の全加盟国が[this.GetName]と交戦状態に入った。 敵艦隊はいつ襲来してもおかしくない。"
