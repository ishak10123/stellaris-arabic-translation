 shroud.4500.desc.1: "シュラウドに手を伸ばした我々は、 沈鬱とした存在の、 飽くなき渇望を感じ取った。 "
 shroud.4500.desc.pacifist: "$shroud.4500.desc.1$ $utopia.3306.desc.2$\n\nその気の短さには身の危険すら覚える。 本当にこんな怪物を迎え入れられるだけの精神力が我々にあるのだろうか？"
 shroud.4500.desc.non_pacifist: "$shroud.4500.desc.1$ $utopia.3306.desc.2$\n\nかの存在は、 すぐにでも動き出したくて待ちきれない様子だ。"
 shroud.4500.a: "$the_eater_of_worlds_color_article$と契約を結ぶ。"
 shroud.4505.desc.intro: "ここに$the_eater_of_worlds_color_article$との契約が成立した。 これから、 かの存在の意思が§H[Root.GetName]§!中を駆け巡るようになるだろう。"
 shroud.4505.desc.outro: "我々が契約を結んだその瞬間、 喰らうものは貢納を要求した。 我々の都市のひとつから、 すべての住民が忽然と姿を消したのだ。 これしきの代償で済むならば安いものだ。 喰らうものが再び空腹を覚えない限りは。"
 shroud.4505.desc.default: "$shroud.4505.desc.intro$\n\n[GetEaterCovenantFormedDesc]\n\n$shroud.4505.desc.outro$"
 shroud.4505.desc.hive: "$shroud.4505.desc.intro$\n\n[GetEaterCovenantFormedDesc]\n\n$shroud.4505.desc.outro$"
 shroud.4505.desc.gestalt_machine: "$shroud.4505.desc.hive$"
 shroud.4505.desc.individual_machine: "$shroud.4505.desc.intro$\n\n我々の社会には、 すでに変化の兆しがみられる。 我々の戦闘ユニットはますます戦いに特化しており、 平時には過酷な戦闘シミュレーションに従事させ続けなければならない。 さもなくば、 彼らの不穏状態が凶暴性に転化するだろう。\n\n$shroud.4505.desc.outro$"
 shroud.4505.desc_2_pacifist: "すでに我々の社会には変化が現れ始めており、 我々の心とは裏腹に争いを好むようになってきている。 この認知的不協和によって、 本来平和を愛する民の間では大きな不快感が生じるようになった。 我々の選択は正しかったのだろうか？"
 shroud.4505.desc_2_organic_non_gestalt: "我々の社会には、 すでに変化の兆しが現れている。 軍人たちは戦争を渇望しており、 平時には過酷な訓練に従事させ続けなければならない。 さもなくば、 彼らの不穏状態が凶暴性に転化するだろう。"
 shroud.4505.desc_2_machine_non_gestalt: "我々の社会には、 すでに変化の兆しがみられる。 我々の戦闘ユニットはますます戦いに特化しており、 平時には過酷な戦闘シミュレーションに従事させ続けなければならない。 さもなくば、 彼らの不穏状態が凶暴性に転化するだろう。"
 shroud.4505.desc_2_gestalt: "我々の社会には、 すでに変化の兆しがみられる。 我々の軍事[GetIndividualNamePlural]はますます戦闘に特化しており、 平時には過酷な戦闘シミュレーションに従事させ続けなければならない。 さもなくば、 彼らの欲求は不必要な攻撃性に転化するだろう。"
 shroud.4505.a.default: "そうならないことを願おう。"
 shroud.4505.a.gestalt: "それだけの価値はある。"
 shroud.4510.desc.intro: "と契約の基盤を築いてから時が経過した "
 shroud.4510.desc.outro: "。 我々の絆はまだ弱く、 それを断ち切ることも、 強化することもできる。\n\n同胞の[GetTelepathPlural]たちは、 誓約を有効化することでパトロンから提供された力を積極的に利用することが可能になり、 また艦隊や$PSIONIC_AURA$も強化されると断言している。"
 shroud.4510.desc: "$the_eater_of_worlds_color_article_cap$ $shroud.4510.desc.intro$$shroud.4510.desc.outro$"
 shroud.4510.b: "$the_eater_of_worlds_color_article$を拒絶する。"
 shroud_eater_covenant_chain_title: "$eater_covenant_chain_title$"
 shroud_eater_covenant_chain_desc.intro: "我々は$the_eater_of_worlds_color_article$という名のシュラウド体との絆を築いた。 貪欲なるそれは、 対価として我々に力の欠片を与える。\n\n我々の[GetTelepathPlural]は我々の行動をパトロンの意志と一致させることで、 絆を深めることができると理論づけている。"
 shroud_eater_covenant_chain_desc: "$shroud_eater_covenant_chain_desc.intro$\n\n喰らうものは切実に飢えている。 戦争、 争いと嘆きの甘美な味を渇望している。"
