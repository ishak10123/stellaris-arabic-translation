 job_test_subject_drone_desc: "集団の意志から外れた逸脱者は、 技術実験の生きた被験者として生産的に利用されている。"
 job_test_subject_drone_effect_desc: "£job_test_subject_drone£ $job_test_subject_drone_plural$は$r_research$と$i_amenities$を生産するために利用される"
