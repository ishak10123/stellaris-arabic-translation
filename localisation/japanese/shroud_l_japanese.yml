 #==========================
 # Tutorials
 #==========================
 TUTORIAL_SHROUD_TAB_TITLE: "チュートリアル：$THE_SHROUD_TITLE$"
 TUTORIAL_SHROUD_TAB_DESC: "これは§Sシュラウド§!タブです。 左パネルにはシュラウドにおける我々の帝国の位置が示されています。 位置は§Sパトロン§!として知られる4つの超能力的存在の§S領域§!によって表わされます。\n\n我々の位置は§S$concept_attunement$§!によって決まり、 同調は物理領域での行動がパトロンから好意的に受け取られると獲得できます。 $concept_attunement$を獲得すると、 パトロンの正体を明らかにするプロセスを開始できます。 正体が明らかになったら、 パトロンの領域をクリックして「パトロン」パネルを開きます。\n\n§S$DELVE$§!または左パネルの中央をクリックしてシュラウドに入り、 サイオニック領域を探索します。 探索中に何を発見できるかは、 その領域内における$concept_attunement$状況の影響を受ける場合があります。"
 TUTORIAL_SHROUD_PATRON_TITLE: "チュートリアル：シュラウドのパトロン"
 TUTORIAL_SHROUD_PATRON_DESC: "§Sパトロン§!パネルにはシュラウドのパトロンに関する情報とオプションが表示されます。 §S$concept_callings$§!および§S$concept_deeds$§!で提示される目標を達成すると、 そのパトロンとの§S$concept_attunement$§!を獲得できます。\n\n$concept_attunement$が高まると§S$PASSIVE_ACCORDS$§!がアンロックされ、 帝国に恩恵がもたらされます。 パトロンとの$concept_attunement$が強力になると、 §S契約§!を締結するプロセスを開始し、 さらに大きな効果を得ることができます。"
 TUTORIAL_SHROUD_COVENANT_TITLE: "チュートリアル：契約"
 TUTORIAL_SHROUD_COVENANT_DESC: "シュラウドのパトロンとの§S契約§!を承認すると§S$ACTIVE_ACCORDS$§!を使用できるようになります。 $tutorial.shroud_covenant.shared$"
 tutorial.shroud_covenant.shared: "$ACTIVE_ACCORD$アイコンをクリックし、 £sr_zro£ §S$sr_zro$§!と引き換えにその効果を有効にします。 この操作はシュラウドのメインパネルか各パトロンのパネルで実行できます。\n\n有効化後、 $ACTIVE_ACCORD$をもう一度有効にするには、 一定のクールダウン期間が必要です。"
 TUTORIAL_SHROUD_SHAPING_TITLE: "チュートリアル：シュラウドの形成"
 TUTORIAL_SHROUD_SHAPING_DESC: "通常は§Sパトロン§!との§S契約§!がなければ得られない特定の力が、 これで手に入るようになりました。\n\nパトロンの§S$PASSIVE_ACCORDS$§!を両方アンロックすると、 §S$ACTIVE_ACCORD$§!を使用できるようになります。 $tutorial.shroud_covenant.shared$"
 tutorial.2600.name: "チュートリアル：$PSIONIC_AURA_PLURAL$"
 tutorial.2600.desc: "これで、 サイオニックPOPのいる植民地から§S$PSIONIC_AURA$§!を放出できるようになりました。 このオーラは、 現在最も§S$concept_attunement$§!値の高い§Sシュラウドのパトロン§!から引き出されます。\n\n$PSIONIC_AURA_PLURAL$は自分の帝国にさまざまな効果をもたらすほか、 友好的な帝国や敵対的な帝国にも影響を及ぼす場合があります。 オーラをほかの星系にも拡大するには、 パトロンとの同調をさらに高め、 £research£ §S$tech_aura_intensification$§!テクノロジーをアンロックする必要があります。\n\n$PSIONIC_AURA$の効果を確認するには、 §Sシュラウド§!タブを開くか、 £interface£ §S星系ビュー§!の下部中央にあるオーラアイコンにカーソルを合わせます。"
 tutorial.2610.name: "チュートリアル：$tech_aura_intensification$"
 tutorial.2610.desc: "§S$PSIONIC_AURA$§!の§S強度§!を高め、 ほかの星系に広げることができるようになりました。\n\n$PSIONIC_AURA_PLURAL$には3段階の強度があり、 段階に応じて効果も増大します。 $PSIONIC_AURA$は新たな強度レベルに達するか、 最大強度に達すると、 隣接する星系へと広がろうとします。 多くの$PSIONIC_AURA_PLURAL$には、 発生源からどこまで広がれるかに上限があります。\n\nオーラ強度は、 多数の$trait_psionic$POP, £happiness£ §S幸福度§!レベル、 £job_telepath£ [GetTelepathCap]の職業、 超能力者総督や£sector£ セクターの£leader£ リーダーなど、 さまざまな手段によって高めることができます。"
 tutorial.2620.name: "チュートリアル：オーラの衝突"
 tutorial.2620.desc: "我々の§S$PSIONIC_AURA$§!が、 接続された隣接星系の別のオーラと遭遇しました。 このような場合、 2つのオーラの間で競合が起こり、 それによってどちらがもう一方の星系に広がるかが決まることがあります。\n\n競合の結果は、 対立する2つのオーラの毎月の獲得§S強度§!によって決まります。 毎月の獲得強度は£interface£ §S星系ビュー§!の下部中央にあるオーラアイコンにカーソルを合わせると確認できます。"
 #==========================
 # Technologies
 #==========================
 tech_psionic_aura: "$PSIONIC_AURA$"
 tech_psionic_aura_desc: "シュラウドから放出されるサイオニック・エネルギーは、 特定のシュラウド体の厚意を物質的に現実化することができる。 シュラウドのパトロンと同調できている帝国では、 超能力者が集中している場所から$PSIONIC_AURA$が放射される。"
 feature_unlock_psionic_aura: "$PSIONIC_AURA_PLURAL$"
 feature_unlock_psionic_aura_desc: "シュラウドのパトロンと同調できている帝国において、 超能力者が集中している場所から$PSIONIC_AURA$が放射できるようになる。"
 psionic_aura_delve_success_tt: "調査時の成功率：§G+$@delve_success_tier_1|0$%§!"
 tech_aura_intensification: "$PSIONIC_AURA$の強化"
 tech_aura_intensification_desc: "シュラウドから放出されるサイオニック・エネルギーは、 広く拡大することを望んでいる。 こうした新たな知見を得たことによって、 帝国の$PSIONIC_AURA_PLURAL$が強度を増して、 各種星系に広がっていけるようになり、 味方には恩恵を、 敵には不利益を与えることができる。"
 feature_allow_psionic_aura_intensity_spread: "$PSIONIC_AURA$の拡散"
 feature_allow_psionic_aura_intensity_spread_desc: "$PSIONIC_AURA_PLURAL$を隣接する星系へ拡散させることが可能となる。 拡散範囲は、 発生源から最大§Y[Owner.GetAuraHyperlaneRange]§!ハイパーレーンに及ぶ。"
 feature_allow_psionic_aura_intensity_growth: "$PSIONIC_AURA$の増幅"
 feature_allow_psionic_aura_intensity_growth_desc: "$PSIONIC_AURA_PLURAL$の強度を高めることが可能となる。"
 aura_intensification_delve_success_tt: "調査時の成功率：§G+$@delve_success_tier_2|0$%§!"
 tech_psionic_suppression: "超能力の抑制"
 tech_psionic_suppression_desc: "サイオニック・エネルギーを弱体化させる装置は、 作成するのはもちろん、 その仕組みを理解することも同じくらい難しい。 異次元の力を扱うのはそれだけ複雑だということだ。"
 tech_psionic_suppression_feature_tt: "$i_unlocks_feature$§Yシュラウド・シール§!や§Yサイオニック抑制器§!を作成できる能力がアンロックされる。"
 tech_aura_resonation: "オーラの共鳴"
 tech_aura_resonation_desc: "人口の多い世界の外にも、 $PSIONIC_AURA_PLURAL$を放射する方法はある。 $sm_aura_emitter$を追加することができれば、 星系基地ですらシュラウドから放出されているサイオニック・エネルギーの導管として機能させることが可能。"
 tech_materiality_engine: "$building_materiality_engine$"
 tech_materiality_engine_desc: "$building_materiality_engine_desc$"
 tech_psionic_bombers: "サイオニック爆撃機"
 tech_psionic_bombers_desc: "濃縮されたサイオニック・エネルギーを使った、 爆発物の輸送に特化した小さく素早い宇宙船。 標的が大きいほど、 爆発したときの共鳴振動も大きくなる。"
 tech_bio_psionic_bombers: "$tech_psionic_bombers$"
 tech_psionic_lightning: "サイオニック・ライトニング"
 tech_psionic_lightning_desc: "艦船同士の間で一時的なサイオニック・コネクションを確立することで、 放出時に壊滅的な影響を与えることのできる精神の力を直接注入することが可能になる。 こうした生身のエネルギーを浴びせることで、 船のシステムを混乱させたり、 乗船している乗組員たちの精神にも影響を及ぼすことができる。"
 tech_bio_psionic_lightning: "$tech_psionic_lightning$"
 ship_terrify_tt: "標的の艦船規模に応じて、 戦艦を£time£ §Y5～10§!日間、 ['concept_terrify']に陥れることができる。"
 concept_terrify: "恐怖状態"
 concept_terrify_desc: "恐怖状態に陥った艦船は攻撃をやめ、 襲撃者から逃げるようになる。"
 tech_psionic_disruptor: "サイオニック・ディスラプター"
 tech_psionic_disruptor_desc: "高度に進化した破壊器で、 敵の船体を強力なサイオニック・エネルギーの槍で貫き、 標的の兵器を無効化することができる。"
 tech_bio_psionic_disruptor: "$tech_psionic_disruptor$"
 tech_zro_launcher: "ズィロ投射機"
 tech_zro_launcher_desc: "$zro_lower$を高濃縮したペレット弾で、 複数の現実を通り抜け、 威力を保ったまま敵のシールドを貫通することができる。 一旦物理的な接触を果たすと、 絶大な破壊力を発揮する。"
 tech_bio_zro_launcher: "$tech_zro_launcher$"
