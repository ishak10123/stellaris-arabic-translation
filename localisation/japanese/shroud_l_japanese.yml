 # End of the Cycle
 shroud.4715.desc.intro: "ここに$end_of_the_cycle_color_article$との契約が成立した。 取引に応じたことで[GetTelepathPlural]たちが再び口を開く：§R「終焉の始まりだ」§!"
 shroud.4715.desc.default: "$shroud.4715.desc.intro$\n\nそして、 静寂が訪れた。 底知れぬ静寂が、 すべての[root.GetSpeciesAdj]種の精神を満たした。 かつては§Hシュラウド§!の膨大なエネルギーが我々のあらゆる意識の中で渦巻いていたが、 今や超能力領域は死のように静まり返っている。\n\n我々は、 自分たちが招いた結果について考えるしかなかった。"
 shroud.4715.desc.hive: "$shroud.4715.desc.intro$\n\nそして、 静寂が訪れた。 底知れぬ静寂が、 すべての[root.GetSpeciesAdj]種の精神を満たした。 かつては§Hシュラウド§!の膨大なエネルギーが[GetBrainName]中に渦巻いていたが、 今や超能力領域は無として不活性化している。\n\n我々は、 自分たちが招いた結果について考えるしかなかった。"
 shroud.4715.desc.gestalt_machine: "$shroud.4715.desc.default$"
 shroud.4715.desc.individual_machine: "$shroud.4715.desc.default$"
 shroud.4715.a.default: "その意志が慈悲深きものであらんことを。"
 shroud.4715.a.gestalt: "$shroud.4715.a.default$"
 shroud_whisperers_covenant_chain_title: "$whisperers_covenant_chain_title$"
 shroud_whisperers_covenant_chain_desc: "我々は$whisperers_in_the_void_color_article$という名のシュラウド体との絆を築いた。 計り知れぬそれは、 対価として我々に力の欠片を与えることを約束した。\n\n我々の[GetTelepathPlural]は、 我々の行動をパトロンの意志と一致させることで、 絆を深めることができると理論づけている。\n\n囁き手は新たな知識、 沈黙の秘密、 そして陰謀を楽しむ。 純粋な喜びが、 彼らの心を限界まで——限界を超えてはち切れんばかりに——満たしてゆく。"
 shroud_whisperers_covenant_chain_begin: "$whisperers_covenant_chain_begin$"
 shroud_whisperers_covenant_chain_end: "$whisperers_covenant_chain_end$"
 robot_shroud_whisperers_covenant_chain_title: "$shroud_whisperers_covenant_chain_title$"
 robot_shroud_whisperers_covenant_chain_desc: "$shroud_whisperers_covenant_chain_desc$"
 shroud.11110.title: "循環は続く"
 shroud.11110.desc: "§H囁き手§!の声が鋭く蠢き、 我々の精神にある他のすべてを覆い隠す。 彼らは我々と交信し、 我らの精神を知識で埋め尽くそうと躍起になっている。\n\n我々は取り返しのつかない選択を迫られている。"
 shroud.11110.a: "$the_eater_of_worlds_article$を吸収する"
 shroud.11110.b: "$the_cradle_of_souls_article$を吸収する"
 shroud.11110.c: "$the_instrument_of_desire_article$を吸収する"
