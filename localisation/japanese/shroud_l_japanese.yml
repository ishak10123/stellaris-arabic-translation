 shroud.11120.title: "[GetBetrayedPatronColour]の復讐"
 shroud.11120.title.eater: "$the_eater_of_worlds_color_article$の復讐"
 shroud.11120.title.cradle: "$the_cradle_of_souls_color_article$の復讐"
 shroud.11120.title.instrument: "$the_instrument_of_desire_color_article$の復讐"
 shroud.11120.title.composer: "$the_composer_of_strands_color_article$の復讐"
 shroud.11120.desc: "[GetTelepathPlural]たちが§Hシュラウド§!から浮上すると、 我々の裏切りが[GetBetrayedPatronColour]の強い反発を招いていることがわかった。\n\n§H[event_target:selected_planet_for_revenge.GetName]§!付近に$SHROUD_TUNNEL_GALACTIC$が出現したことで、 かの惑星では今やどこまでも荒廃した世界が広がっている。 トンネルの向こうから、 明確な憤怒を[GetFeltLoc]した。 かつてのパトロンが我々に復讐しようとしていることは、 もはや疑いの余地がない。"
 shroud.11120.a: "守りを備えよ。"
 shroud.11120.a.tt: "§H[event_target:selected_planet_for_revenge.GetName]§!は§Y$pc_shrouded$§!へと変貌した。\nこの惑星付近に$SHROUD_TUNNEL_GALACTIC$が出現する。"
 shroud_tunnel_object: "$SHROUD_TUNNEL_GALACTIC$"
 shroud.11130.title: "フューリアス・ヴェンジャンス"
 shroud.11130.desc_common: "§Y$NAME_Psionic_Avatar$§!が[event_target:spawn_system.GetName]星系の$SHROUD_TUNNEL_GALACTIC$から出現した。 具現化した[GetBetrayedPatronColour]の怒りが、 [capital_scope.GetName]へ向かって現在進行中だ。"
 shroud.11130.desc_success: "我々は、 出現した脅威に対する戦力を結集することに成功した。 我々の艦船は$SHROUD_TUNNEL_GALACTIC$に向けてサイオニック・エネルギーの波動を放ち、 我々の現実に侵入してきた敵対的な存在を弱体化させた。"
 shroud.11130.success_tt: "$NAME_Psionic_Avatar$は半分の戦力で出現する。"
 shroud.11250.title: "終焉"
 shroud.11250.desc: "トランス状態に陥ると、 我々の精神は静寂に包まれた。 これほどまで静まり返ったシュラウドは、 かつて見たことがない。\n\n空虚は声なきものとなった。\n\nすべてが消え去った。"
 shroud.11250.a: "これで終わりに違いない。"
 shroud.11255.title: "[owner.GetName]の再生"
 shroud.11255.desc: "$end_of_the_cycle_color_article$によって引き起こされた破壊から復活するため、 我々は多大なる努力を重ねてきた。 復興に向けて§H[solar_system.Star.GetStarName]§!星系に改めて築いた§H$starbase_outpost$§!は、 [owner.GetName]の新たな始まりの象徴となるだろう。"
