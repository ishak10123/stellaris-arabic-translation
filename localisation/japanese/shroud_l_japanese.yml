 shroud.1510.title: "$PSIONIC_AURA$の衝突"
 shroud.1510.desc: "[from.GetName]星系における我々の§H$PSIONIC_AURA$§!は、 近隣の[fromfrom.GetName]星系から発せられるオーラと衝突している。 超能力を持つ[GetResearchers]たちが過去にこのような現象をモデル化していたが、 実際に体験するのは今回が初めてだ。\n\n理論によると、 より高い強度で投影される、 すなわちより強力なオーラは、 対抗するオーラの力を徐々に削ぎ落していく。 この衝突により完全な崩壊に至った場合、 優勢なオーラが空になった星系に流れ込む可能性がある。\n\nまさに精神同士の戦いなのだ。"
 shroud.1510.a: "我が意志が勝利するだろう。"
 shroud.1550.title: "意志の力"
 shroud.1550.desc.common_1: "§Hシュラウド§!への探査は、 そのエネルギーが観測可能な空間に影響を及ぼす原因となった。 影響は強大なものだが、 断続的で孤立した現象に留まっている。"
 shroud.1550.desc.common_2: "我々の行動はシュラウド全体に波及し、 我々を強力な存在へと近づけている。 これらの存在の支持を得ることができれば、 そのサイオニック・エネルギーを現実世界で活用することができるかもしれない。 我々の[GetTelepathPlural]は、 その結果生じる「オーラ」たるものが我が帝国を強化するだけでなく、"
 shroud.1550.desc_1.knows: "$shroud.1550.desc.common_1$§H'$PSIONIC_AURA_PLURAL$'§!はこの影響を継続的な流れに変える方法を提供する。"
 shroud.1550.desc_1.default: "$shroud.1550.desc.common_1$§H'$PSIONIC_AURA_PLURAL$'§!の理論は、 この影響力を継続的な流れに変える方法を提供する。"
 shroud.1550.desc.knows: "$shroud.1550.desc_1.knows$\n\n$shroud.1550.desc.common_2$ 観測した通り、 味方を強化し、 敵対する者も弱めると仮説している。"
 shroud.1550.desc.knows.homicidal: "$shroud.1550.desc_1.knows$\n\n$shroud.1550.desc.common_2$ 観測した通り、 敵対する者も弱めると仮説している。"
 shroud.1550.desc.default: "$shroud.1550.desc_1.default$\n\n$shroud.1550.desc.common_2$ 味方を強化し、 敵対する者も弱めると仮説している。"
 shroud.1550.desc.default.homicidal: "$shroud.1550.desc_1.default$\n\n$shroud.1550.desc.common_2$ 敵対する者も弱めると仮説している。"
 shroud.1550.a: "期待できそうだ。"
