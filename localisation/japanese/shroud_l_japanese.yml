 shroud.4950.title: "邪悪なオーラ"
 shroud.4950.desc.1: "我々のデータによると、 このオーラは極めて有害な影響を及ぼすことが示されている。 対策が講じられない場合、 このオーラは銀河全体に急速に広がる可能性がある。"
 shroud.4950.desc.2: "§H[from.GetName]§!星系に強力な$PSIONIC_AURA$を検出した。"
 shroud.4950.desc.3.intro: "$shroud.4950.desc.2$. [GetTelepathPlural]によると、 §Hシュラウド§!からの放出は"
 shroud.4950.desc.3.default: "$shroud.4950.desc.3.intro$異星文明の超能力による活動によるものと判明した。"
 shroud.4950.desc.3.contact: "$shroud.4950.desc.3.intro$§H[fromfrom.GetName]§!の超能力による活動によるものと判明した。"
 shroud.4950.desc.4: "$shroud.4190.desc.intro$ その理論上の起源にちなんで名づけられた§H'$PSIONIC_AURA$'§!が、 §H[from.GetName]§!星系に検出された。"
 shroud.4950.desc.5.intro: "$shroud.4950.desc.2$ その発生源は"
 shroud.4950.desc.5.default: "$shroud.4950.desc.5.intro$異星文明の領域内までたどることができた。"
 shroud.4950.desc.5.contact: "$shroud.4950.desc.5.intro$§H[fromfrom.GetName]§!の領域内までたどることができた。"
 shroud.4950.a: "$grand_archive.1100.a$"
 shroud.4955.title: "恐怖の感覚"
 shroud.4955.desc.1: "迫りくる災いの予感が、 人々の間に広がっている。"
 shroud.4955.desc.1.gestalt: "$shroud.4955.desc.1$ [GetTelepathPlural]は§Hシュラウド§!のエネルギーに同時発生する異常を検出した。"
 shroud.4955.desc.1.non_gestalt: "$shroud.4955.desc.1$ [GetTelepathPlural]によると、 §Hシュラウド§!さえも、 まるで静かに震えているように不安定であるらしい。"
 shroud.4955.desc.2.intro: "近年、 銀河系全体で深刻な事件が急増している。"
 shroud.4955.desc.2.outro: "ますます奇妙な現象を検出するにつれ、 [GetResearchers]たちは近い将来にさらに深刻な現象が発生すると予測している。"
 shroud.4955.desc.2.contact_aura: "$shroud.4955.desc.2.intro$ 我々は§H[from.GetName]§!の説明のつかない成長を目撃した。 我々は有害な§H$PSIONIC_AURA$§!の侵食を目撃したのだ。 $shroud.4955.desc.2.outro$"
 shroud.4955.desc.2.contact_no_aura: "$shroud.4955.desc.2.intro$ 我々は§H[from.GetName]§!の説明のつかない成長を目撃した。 $shroud.4955.desc.2.outro$"
 shroud.4955.desc.2.no_contact_aura: "$shroud.4955.desc.2.intro$ 我々は有害な§H$PSIONIC_AURA$§!の侵食を目撃したのだ。$shroud.4955.desc.2.outro$"
 shroud.4955.desc.2.no_contact_no_aura: "$shroud.4955.desc.2.intro$ $shroud.4955.desc.2.outro$"
 shroud.4955.desc.3: "我々は何が迫ってきているのかはわからないが、 何かが迫ってきていることは確実にわかる。"
 shroud.4955.a: "最悪の事態に備えなければ。"
 shroud.4955.a.tt: "§H$end_aura$§!が銀河全体を覆いつくせば、 ゲームは終了する。"
 shroud.4960.title: "超能力の脅威"
 shroud.4960.desc.1.intro: "敵対的な§H$PSIONIC_AURA$§!は"
 shroud.4960.desc.1.outro: "驚くべき速さで銀河中に広がっている。 [GetResearchers]たちの観測によると、 それはいくつもの星系において悪影響を及ぼしているらしい。"
 shroud.4960.desc.1.contact: "$shroud.4960.desc.1.intro$§H[from.GetName]§!によって放出され、 $shroud.4960.desc.1.outro$"
 shroud.4960.desc.1.no_contact: "$shroud.4960.desc.1.intro$未接触の異星文明から放出され、 $shroud.4960.desc.1.outro$"
 shroud.4960.desc.2: "最新データによると、 それはハイパーレーンにつながった銀河の半分にも及んでいる。 その背後にある力は、 銀河規模の破壊を目的としているようだ。 もし阻止できなければ、 その目的を達成するだろう。"
 shroud.4960.a: "止めなければ。"
 shroud.4960.a.tt: "§H[from.GetName]§!に対して['concept_total_war']の宣言をすることができる。\n$shroud.4955.a.tt$"
 shroud.4965.title: "迫り来る破滅"
 shroud.4965.desc.1.intro: "この壊滅的な§H$PSIONIC_AURA$§!は、 "
 shroud.4965.desc.1.outro: "銀河中に広まることを止めない。 今や銀河内のほとんどの星系にまで広がっている。"
 shroud.4965.desc.1.contact: "$shroud.4960.desc.1.intro$§H[from.GetName]§!によって放出され、 $shroud.4960.desc.1.outro$"
 shroud.4965.desc.1.no_contact: "$shroud.4960.desc.1.intro$未接触の異星文明から放出され、 $shroud.4960.desc.1.outro$"
 shroud.4965.desc.2: "迅速かつ強力な対策を講じなければ、 我々は銀河規模の破滅に直面するだろう。"
 shroud.4965.a: "これが最後の抵抗だ。"
 the_reckoning_chain_title: "レコニング"
 the_reckoning_chain_desc: "$end_of_the_cycle_color_article$との契約は、 §H[this.GetName]§!の破滅をもたらし、 今や残っているのはかつては強力だった帝国の残骸のみだ。\n\n我が元パトロンの破壊的な意図は、 §R$NAME_Reckoning$§!という名の強大なエネルギー体として姿を現したのだ。 それは惑星から惑星へと移動し、 その住民を喰らうことで力を回復している。"
