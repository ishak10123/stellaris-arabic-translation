 tr_psionics_endbringers_cult_delayed: "一度声が聞こえたら、 無視することは叶わない。 かの意志に屈服するより他ない。"
 building_chamber_of_silence: "静寂の間"
 building_chamber_of_silence_desc: "帝国中から超能力を持った個人が集められ、 シュラウドと交信するために、 この静寂が守られた部屋に連れてこられる。"
 building_chamber_of_silence_madness_1_tt: "['modifier:endbringers_madness_1']のマイナス効果を§G$@chamber_of_silence_effect_mult|0%$§!軽減する。"
 building_chamber_of_silence_madness_2_tt: "['modifier:endbringers_madness_2']のマイナス効果を§G$@chamber_of_silence_effect_mult|0%$§!軽減する。"
 building_chamber_of_silence_madness_3_tt: "['modifier:endbringers_madness_3']のマイナス効果を§G$@chamber_of_silence_effect_mult|0%$§!軽減する。"
 building_chamber_of_silence_paranoia_tt: "['modifier:endbringers_paranoia']のマイナス効果を§G$@chamber_of_silence_effect_mult|0%$§!軽減する。"
 building_chamber_of_silence_destroyed_tt: "§Rこの植民地が失われた場合、 この建造物は破壊される。§!"
 shroud.8310.name: "$shroud.2750.name$"
 shroud.8310.desc: "我々をより高次の存在へと引き上げる呼びかけがなされ、 無益な抵抗に固執した同胞は、 我々の神聖なる次元上昇への道を確保するため粛清された。 我々の運命はすでに決まっている。 これまで歩んできた道は瓦解し、 $pc_shrouded$の暗闇に消えたのだ。\n\n今や、 §R声§!が抗えぬほど明瞭に聞こえている。\n\n§R「道は定まった」§!\n\nかの存在は自ら進んで犠牲となれる者を求めている。"
 shroud.8310.a: "こうなることは避けられなかった。"
 shroud.8310.a.tt: "各植民地で100～300 £pop£ §HPOP§!を失う。"
