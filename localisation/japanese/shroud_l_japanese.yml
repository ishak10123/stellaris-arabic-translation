 shroud.4705.desc.intro: "ここに$whisperers_in_the_void_color_article$との契約が成立した。 これから、 かの存在の意思が§H[root.GetName]§!中を駆け巡るようになるだろう。\n\n我々の新しいパトロンは、 その影響力でもって早くも我々を支配下においている。"
 shroud.4705.desc.outro: "それがこの強力な絆の代償である。 我々の[GetTelepathPlural]によると、 囁き手の最大の恩恵はまだ訪れていない。 これほど壮大な超能力体と直接交わることは、 きっとそれだけの価値があるに違いない。"
 shroud.4705.desc.gestalt: "$shroud.4705.desc.intro$隠された知識の流入を待ち望む我々の集合体は、 思考が別々のパターンに分裂していくのを感じている。 [GetNetworkName]の安定した調和には、 高まる内なる声の不協和音が重なっている。\n\n$shroud.4705.desc.outro$"
 shroud.4705.desc.non_gestalt: "$shroud.4705.desc.intro$我々が隠された知識を渇望するにつれ、 我々の社会における思想や意見はますます多様化している。 内なる声の不協が我らの精神を蝕み、 すべての[root.GetSpeciesNamePlural]の精神的安定を脅かしている。\n\n$shroud.4705.desc.outro$"
 shroud.4705.desc.default: "$shroud.4705.desc.non_gestalt$"
