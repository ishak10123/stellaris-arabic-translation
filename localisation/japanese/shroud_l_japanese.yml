 EXILED_SYSTEM_08: "クザナクル"
 EXILED_SYSTEM_09: "ウクル"
 EXILED_SYSTEM_10: "ゼロン"
 EXILED_SYSTEM_11: "アロ・ヘブコル"
 EXILED_SYSTEM_12: "ウロ・ブザコル"
 EXILED_SYSTEM_13: "ビフラマト"
 EXILED_SYSTEM_14: "フォルモクス"
 EXILED_SYSTEM_15: "イブガナク"
 EXILED_COLONY_01: "ドロド"
 EXILED_COLONY_02: "イックス・トラヴン"
 EXILED_COLONY_03: "オブ・ラタク"
 EXILED_COLONY_04: "ダクシハファ"
 EXILED_COLONY_05: "ブロール"
 EXILED_COLONY_06: "フロザック"
 shroud.6020.name: "$UNKNOWN_LONG$"
 shroud.6020.desc: "§H我々が交信を試みると、 ブリッジクルーたちが頭に断続的な痛みを訴え始めた……§!"
 shroud.6030.name: "[exiled_country.GetName]"
 shroud.6030.desc: "§H何度も通信を試みてみたものの、 [exiled_country.GetName]は我々の呼びかけに応えない。§!"
 shroud.6050.name: "奇妙な相関関係"
 shroud.6050.desc: "超能力を抑制する§H$building_ancient_ward_1$§!が、 不規則な測定値を提示している。 これは通常、 [Root.GetHomeWorldName]で超能力活動が急増している場合に示される結果だが、 そうした悪行の証拠は何一つ見つからない。\n\nとなれば、 答えは国境の向こうにある可能性がある。 遥か彼方の様子を捉えた映像には、 §H[exiled_system_border.GetName]§!星系内で最近起きた奇妙なエネルギーの流れの暴走が映し出されており、 $building_ancient_ward_1$が示した不規則な測定結果との相関関係も認められる。"
 shroud.6050.a: "[exiled_system_border.GetName]を調査してみる必要がある。"
 shroud.shared_text_psy_symptoms: "感情的混乱、 精神ストレスによる衰弱、 言葉にできないほどの恐怖の幻覚の繰り返し"
 shroud.shared_text_psi_radiation: "これらの現象は、 我々の先祖が記録した体験と非常によく一致している。 これはおそらく、 彼らが超能力放射と呼んでいたもので、 特に破壊的なエネルギー放射の一形態である。"
 shroud.shared_text_ship_malfunction: "艦隊のシステムも深刻な故障に見舞われており、 ほとんどの通常機能が事実上無効化されている。"
 shroud.6100.name: "危険なエネルギー"
 shroud.6100.desc.no_border_aura: "新たに探査された§H[from.GetName]§!星系で、 憂慮すべき事態が発生している。 [root.GetName]の乗組員が、 さまざまな精神症状$shroud.shared_text_psy_symptoms$に苦しんでいる。 また、 艦隊のシステムにも、 奇妙で不規則な故障が発生している。\n\n$shroud.shared_text_psi_radiation$ §H[owner.GetHomeWorldName]§!上の§H$building_ancient_ward_1$§!の保護の外では、 先祖が警告していた精神衰弱を初めて経験している。\n\nこの独特なエネルギー形態を検出するために長距離スキャナーを調整した結果、 これらの危険な放出源は近くの§H[exiled_center_system.GetName]§!星系であることが判明した。 $shroud.6100.desc.end$"
 shroud.6100.desc.border_aura: "[root.GetName]の乗組員が危険に晒されている。\n\n§H[from.GetName]§!星系で非常に高いレベルの超能力放射に晒された後、 彼らは以前に報告されていたものより悪化した精神的苦痛を経験し始めた。$shroud.shared_text_ship_malfunction$\n\n長距離スキャナーによると、 近くの§H[exiled_center_system.GetName]§!星系における放射はさらに高いレベルを示している。 $shroud.6100.desc.end$"
 shroud.6100.desc.end: "この現象が引き起こす影響を完全に解明できるまで、 いかなる艦船であっても、 さらなる深部への派遣を認めることはできない。"
 shroud.6100.tt: "§Y$first_contact$§!のプロセスを開始する準備をしろ。"
 shroud.6110.name: "[This.System.GetName]における存在"
 shroud.6110.desc: "驚くべきことに§H[This.System.GetName]§!星系には、 知的な構造を持つと思われる大型の物体が多数存在するようだ。 安全な距離から直接通信を試みることで、 §H[This.ContactCountry.GetName]§!のコードネームを当てられた創造者たちに関する、 さらなる情報を得られるかもしれない。\n\nこの星系内の生命体は、 我々が検出した高レベルの超能力放射によって、 非常に危険な状態にあるに違いない。"
 fcsum_exiled_1: "§H[This.System.GetName]§!星系内に、 知性を持つ異星人の痕跡らしきものを発見した。"
 shroud.6115.name: "限られた進捗"
 shroud.6115.desc: "さらなる調査の結果、 §H[This.System.GetName]§!星系内の物体は異星の宇宙船であることを確認したが、 その艦船の乗組員とはまだ接触できていない。\n\n困ったことに、 使節の[exiled_envoy.GetName]は、 [exiled_envoy.GetHisHer]チームが精神的な症状に苦しみ始め、 [This.System.GetName]に現れる奇妙な存在に関する原因不明の幻覚を見たと報告している。 こうした懸念にもかかわらず、 我々の使節は、 任務に対する[exiled_envoy.GetHisHer]の献身を貫いている。"
 shroud.6115.a: "続けてくれ。"
 fcsum_exiled_2: "我々はまだ§H[This.ContactCountry.GetName]§!との接触を果たしていない。 使節から彼らのチームに関する懸念事項が報告された。"
 shroud.6120.name: "任務中止"
 shroud.6120.desc: "数か月の沈黙の後、 我々は[exiled_envoy.GetName]からの通信を受信した。 普段は冷静で率直な使節だが、 今回は奇妙で混乱した報告をした。 [exiled_envoy.GetSheHeCap]は、 どうやら夢と妄想が交錯しているようで、 奇妙なイメージについてのまとまりのない説明をした。 [exiled_envoy.GetHisHer]のチームにいる他のメンバーも、 誰一人としてより明確な説明をすることはなかった。\n\n彼らは職務から解かれ、 この任務は無期限で中断された。§H[This.System.GetName]§!にどのような存在が潜んでいるにせよ、 それを安全に調査することは、 現時点の我々には不可能だ。"
 fcsum_exiled_3: "トラウマ的な任務の後、 我々のチームは§H[This.ContactCountry.GetName]§!と接触する前に帰還した。"
 shroud.6125.desc: "渦巻く流れの上に浮かぶ。 §H[Root.Capital.GetName]§!、それとも……？\n\n§H……呼んでいる……§!\n\n表面がねじれるように開く。 目に見えない深淵から、 腐敗した瘴気が噴き出す。\n\n§H……答えは……何もない……§!\n\n絶え間なく。 息苦しい。\n\n恐ろしい。"
 MESSAGE_FIRST_CONTACT_ABORTED_EXILED_DESC: "$COUNTRY|H$との$first_contact$のプロセスは、 幹部の命令で中断された。"
 shroud.shared_text_aura_spread: "近隣で発生していた超能力の“感染症”が、 §H[exiled_system_border.GetName]§!星系にも広がってしまった。\n\n§H$building_ancient_ward_1$§!の保護下にあるにも関わらず侵食されてしまったことで、 §H[Root.GetHomeWorldName]§!の住民の間で、 超能力放射中毒を示す軽度の症状が確認されるようになった。 予測では、 近い内に§H[Root.home_planet.System.GetName]§!にもこの精神汚染が及ぶとされており、 そうなれば我らの母星はさらに大きな危険に晒されることになるだろう。"
 shroud.shared_text_aura_study: "徹底的に自分自身を守る方法を学ぶための最良の手段は、 リスクはあるが、 この現象を発生源に近いところで研究することだ。"
 shroud.6200.name: "§H[Root.GetHomeWorldName]§!における超能力放射"
 shroud.6200.desc.no_visit: "§H[Root.GetHomeWorldName]§!で、 憂慮すべき事態が発生している。 国民がさまざまな精神症状$shroud.shared_text_psy_symptoms$に苦しんでいる。\n\n$shroud.shared_text_psi_radiation$ 我々の§H$building_ancient_ward_1$§!の保護の外にいる者は、 先祖が警告していた精神衰弱を初めて経験している。\n\nこの独特なエネルギー形態を検出するために長距離スキャナーを調整した結果、 これらの危険な放出は近くの§H[exiled_system_border.GetName]§!星系外から広がっていることが判明した。 $shroud.shared_text_aura_study$"
 shroud.6200.desc.visit_no_ship: "$shroud.shared_text_aura_spread$\n\n$shroud.shared_text_aura_study$"
 shroud.6200.desc.visit_and_ship: "$shroud.shared_text_aura_spread$\n\n極めて高いレベルの超能力放射に晒されていることから、 [exiled_system_border.GetName]の§H[event_target:ship_in_border.GetName]§!の乗組員たちは、 以前の報告よりもさらにひどい精神的苦痛に苛まれている。 $shroud.shared_text_ship_malfunction$\n\n$shroud.shared_text_aura_study$"
 shroud.6200.a: "この感染を止める方法を学ぼう。"
 PSI_RADIATION_PROJECT: "サイオニック放射"
 PSI_RADIATION_PROJECT_DESC: "§H[exiled_system_border.GetName]§!星系内のサイオニック放射のレベルが突如増加し、 その影響は§H[Owner.GetHomeWorldName]§!に及んでいる。 わが国民をさらなる危険に晒す前に、 この進行中の現象を詳しく調査する必要がある。"
 shroud.6205.name: "$PSIONIC_AURA_PLURAL$"
 shroud.6205.desc.start: "我々の研究者は、 §H[exiled_system_border.GetName]§!星系における有毒な超能力放射の中で大いに苦しんだが、 その任務は重要な発見をもたらした。\n\n我々はこの憂慮すべき現象を§H「$PSIONIC_AURA$」§!と分類した。 これは膨大な破壊エネルギーが蓄積されたもので、 我々の精神のみならずテクノロジーをも混乱させる。 この現象は、 §H[exiled_center_system.GetName]§!星系でここまで増大したサイオニック・エネルギーが、 星系全体にまで影響範囲を拡大した結果引き起こされたものと見られる。"
 shroud.6205.desc.aura_home: "$shroud.6205.desc.start$\n\n被害はすでに§H[Root.home_planet.System.GetName]§!星系にも及んでおり、 壊滅的な影響が出ている状態だ。 $shroud.6205.desc.end$"
 shroud.6205.desc.no_aura_home: "$shroud.6205.desc.start$\n\nもしこれが§H[Root.home_planet.System.GetName]§!星系にまで到達すれば、 その被害は壊滅的なものとなるだろう。 $shroud.6205.desc.end$"
 shroud.6205.desc.end: "§H[Root.GetHomeWorldName]§!の§H$building_ancient_ward_1$§!による保護は限定的なものだ。"
 shroud.6205.a: "我々は$building_ancient_ward_1$を強化する必要がある。"
 PSIONIC_AURA_RESISTANCE_PROJECT: "$PSIONIC_AURA$耐性の強化"
 PSIONIC_AURA_RESISTANCE_PROJECT_DESC: "我々の先祖が§H[Owner.GetHomeWorldName]§!に建設した§H$building_ancient_ward_1$§!は、 我々をサイオニック放射から守るために設計された。 しかし、 §H$PSIONIC_AURA_PLURAL$§!が侵入すれば、 現在の耐性を圧倒する恐れがある。 これまでに学んだことを応用すれば、 その耐性をさらに強化できるはずだ。"
 shroud.6210.name: "サイオニック・アッテニュエーション"
 shroud.6210.desc: "我々の精力的な研究者は、 §H[Root.GetHomeWorldName]§!の§H$building_ancient_ward_1$§!を強化する方法を開発した。 サイオニック・アッテニュエイターを強化することで、 その保護範囲を惑星全体だけでなく§H[Root.home_planet.System.GetName]§!星系全体にまで拡張することができる。\n\nこの研究は、 この失われたテクノロジーに関する他の分野の研究も刺激した。 我々は今、 超能力放射と[Root.GetSpeciesAdj]の精神との間に、 相互関係があることを知った。 こうした放射が我々の精神状態に影響を与えるだけでなく、 我々の精神状態もサイオニック放射のレベルに影響を与える可能性があるのだ。 「サイオニック」の使用に対する太古のタブーには、 結局のところ科学的根拠があったようだ。"
 shroud.6210.a: "興味深いが、厄介でもある。"
 shroud.6210.a.tt: "$BEGINS_EVENT_CHAIN$ §Y$ancient_ward_upgrade_chain_title$§!"
 ancient_ward_upgrade_chain_title: "$building_ancient_ward_2$"
 ancient_ward_upgrade_chain_desc: "§H[Owner.GetHomeWorldName]§!の§H$building_ancient_ward_1$§!は機能限界に達した。 近隣のサイオニックの脅威に対処するためには、 その能力をさらに強化する必要がある。 この新しい§H$building_ancient_ward_2$§!は、 §H$PSIONIC_AURA_PLURAL$§!の荒廃からわが国民を守ることができるだろう。"
 ancient_ward_upgraded: "建造物アップグレード"
 shroud.6215.name: "$building_ancient_ward_2$が完成した。"
 shroud.6215.desc.aura_home: "§H$building_ancient_ward_2$§!が完成したことにより、 §H[Root.home_planet.System.GetName]§!星系の超能力放射は管理可能なレベルまで減少した。 §H[Root.GetHomeWorldName]§!の住民は徐々にその悪影響から回復しつつある。"
 shroud.6215.desc.no_aura_home: "§H$building_ancient_ward_2$§!が完成したことにより、 §H[Root.GetHomeWorldName]§!の超能力放射は管理可能なレベルまで減少した。 住民は徐々にその悪影響から回復しつつある。"
 shroud.6215.desc.end: "それでも広い目で見れば、 この§H$PSIONIC_AURA$§!をはじめとする様々な有害現象が、 今なお銀河を汚染し続けている。 我々の科学者は$building_ancient_ward_2$のテクノロジーが、 より強力な§H「$SHROUD_SEAL$」§!の開発に応用できるのではないかと仮定しており、 この巨大な構造物によって、 星団全体のオーラの抑制が可能になることが予測されている。 §H[exiled_system_border.GetName]§!星系にも$SHROUD_SEAL$を構築できれば、 超能力の脅威の制御に向けた大きな1歩を踏み出せるだろう。"
 shroud.6215.a: "これは追求する価値のある研究だ。"
 build_shroud_seal_poi_desc: "§H$tech_psionic_suppression$§!テクノロジーを研究した結果、 $constructor$使用して恒星の重力井戸内に§H$SHROUD_SEAL$§!を構築できるようになった。 これにより、 その星系およびハイパーレーンで接続された隣接する星系全体で§H$PSIONIC_AURA_PLURAL$§!を抑制することができる。"
 shroud_seal_construction_chain_title: "$SHROUD_SEAL$の建設"
 shroud_seal_construction_chain_desc: "我々の科学者は、 より高度な§H$tech_psionic_suppression$§!テクノロジーを開発すれば、 星団全体で§H$PSIONIC_AURA_PLURAL$§!を抑制できると理論づけている。\n\nこのテクノロジーにより、 §H'$SHROUD_SEAL$'§!を構築することが可能になる。 このような強力な装置を§H[exiled_system_border.GetName]§!星系に構築することは、 迫りくるサイオニックの脅威を制御するうえで大きな前進となるだろう。"
 tech_psionic_suppression_researched: "$tech_psionic_suppression$研究済み"
 shroud_seal_built: "$SHROUD_SEAL$建設完了"
 shroud_6216_poi: "[exiled_system_border.GetName]"
 shroud_6216_poi_desc: "$build_shroud_seal_poi_desc$"
 shroud.6220.name: "強烈な放射"
 shroud.6220.desc: "§H[exiled_system_border.GetName]§!星系で極めて高いレベルの超能力放射に晒された結果、 §H[Root.GetName]§!の乗組員たちは、 以前の報告よりもさらにひどい精神的苦痛に苛まれるようになった。 $shroud.shared_text_ship_malfunction$"
 shroud.6225.name: "§H[Root.home_planet.System.GetName]§!における放射"
 shroud.6225.desc.shared: "サイオニック放射中毒の悪影響はすでに、 §H[Root.GetHomeWorldName]§!の住民全体に現れており、 我々の艦船の機能は著しく損なわれている。"
 shroud.6225.desc.know_aura: "§H$PSIONIC_AURA$§!が§H[Root.home_planet.System.GetName]§!星系に広がっている。 $shroud.6225.desc.shared$\n\n§H$building_ancient_ward_1$§!を強化する緊急性がこれまで以上に高まっている。"
 shroud.6225.desc.no_know_aura: "サイオニック汚染が§H[Root.home_planet.System.GetName]§!星系に広がっている。 $shroud.6225.desc.shared$\n\nこの汚染を理解する緊急性がこれまで以上に高まっている。"
 shroud.6225.a: "無駄にする時間はない。"
 shroud.6225.a.know_aura.tt: "§H[exiled_country.GetName]§!の§H$PSIONIC_AURA$§!が及ぼす影響：\n$effect_exiled_aura$"
 shroud.6225.a.no_know_aura.tt: "この超能力現象が及ぼす影響：\n$effect_exiled_aura$"
 effect_exiled_aura: "- $MOD_SHIP_FIRE_RATE_MULT$：§R-125%§!\n- $MOD_SHIP_SHIELD_MULT$：§R-200%§!\n- $MOD_SHIP_EVASION_MULT$：§R-100%§!\n- $mod_planet_jobs_produces_mult$：§R-30%§!\n- $mod_planet_pops_upkeep_mult$：§R+100%§!\n- $MOD_PLANET_BUILDING_TIME_MULT$：§R+100%§!"
 shroud.6231.name: "失われた§H[root.GetHomeWorldName]§!"
 shroud.6231.desc: "我々は母星である§H[root.GetHomeWorldName]§!の支配権を失ってしまった。 あそこには最も多くの知識が蓄えられ、 社会全体の努力の結晶が集結していた。 かの地を取り戻せないことには、 これ以上の反超能力活動は難しい。"
 shroud.6231.a: "遅滞なく支配権を取り戻さねば。"
 shroud_6231_poi: "[root.GetHomeWorldName]"
 shroud_6231_poi_desc: "遅滞なく§H[root.GetHomeWorldName]§!の支配権を取り戻さねば。"
 shroud_reclaim_homeworld_chain_title: "§H[root.GetHomeWorldName]§!の奪還"
 shroud_reclaim_homeworld_chain_desc: "我々は母星である§H[root.GetHomeWorldName]§!の支配権を失ってしまった。 あそこには最も多くの知識が蓄えられ、 社会全体の努力の結晶が集結していた。 かの地を取り戻せないことには、 これ以上の反超能力活動は難しい。"
 homeworld_reclaimed: "母星の奪還"
 shroud.6241.name: "§H[root.GetHomeWorldName]§!の奪還"
 shroud.6241.desc: "我々は母星である§H[root.GetHomeWorldName]§!の支配権を取り戻した。 これで[root.GetName]は再び全力で反超能力活動に取り組めるようになる。"
 shroud.6241.a: "$EXCELLENT$"
 shroud.6300.name: "シュラウドの深淵"
 shroud.6300.desc: "我々の科学者は、 高度な§H$tech_psionic_suppression$§!テクノロジーの開発を完了した。 これにより、 $building_psionic_suppressor$を建設することで、 我々の支配下にあるあらゆる植民地に$building_ancient_ward_2$の効果を再現できるようになった。\n\nしかし、 他の星系で§H$PSIONIC_AURA_PLURAL$§!の拡散を制御するには、 §H$SHROUD_SEAL$§!というより強力な装置を構築する必要がある。 $shroud.shared_text_shroud_seal$\n\nこの研究はまた、 ある恐ろしい理論にも信憑性を与えた。 それは、 古代のオカルト文書に記述されていたサイオニック・エネルギーの次元である§H「シュラウド」§!という幽玄な領域が、 実在する可能性があるというものだ。 この理論では、 知覚ある存在の認知活動によって、 エネルギーがシュラウドから観測可能な現実へと伝わる可能性があり、 このプロセスが一般的に$PSIONIC_AURA_PLURAL$の根本原因であると仮定している。\n\nつまり、 我々は単に宇宙の客観的な力と戦っているのではなく、 未知の意図によって計算された行動と戦っている可能性があるということだ。"
 shroud.6300.a: "結局§H「シュラウド」§!は実在するのか……？"
 shroud.6500.name: "予期せぬ通信"
 shroud.6500.desc: "我々は§H[exiled_system_border.GetName]§!星系の外から予期せぬ通信を受信した。 不可解なことに、 §H[exiled_country.GetName]§!は我々の言語と通信システムの両方を完全に習得している。"
 shroud.shared_screen_figure: "§Hスクリーンに映し出された人物は、 長いポーズを挟みながら、 催眠術のような一定のリズムでコミュニケーションをとる。§!\n\n遠くの隣人よ、 直接の接触に無反応だったことから、 我々は粗雑な技術通信という面倒な方法に頼ることにした。\n\n私は §H[exiled_country.GetName]§!のサイアーク、 §Hウク＝ホゴラス・スカラット§!だ。 事態は緊急のため、 挨拶は手短にさせていただく。"
 shroud.shared_auric_flow_inhibition: "我々のオーラの拡散を妨げているのだ。 我々は、 この耐え難い状況があなた方の無知な過ちの結果であると考えている。\n\nオーラはすべての人々に恩恵をもたらし、 銀河全体に輝くべきである。 大義への貢献を示すため、 我々はあなた方のいわゆる"
 shroud.6505.name: "$shroud.6500.name$"
 shroud.6505.desc: "$shroud.6500.desc$"
 shroud.6510.name: "サイアーク・ウク＝ホゴラス・スカラット"
 shroud.6510.desc: "$shroud.shared_screen_figure$ §H[exiled_system_border.GetName]§!星系内にあるあなた方の装置が$shroud.shared_auric_flow_inhibition$「$SHROUD_SEAL$」の即時解体を要求する。"
 shroud.6510.a: "あなた方から事前の連絡を受けていない。"
 shroud.6515.desc: "我々は真の声で語った。 もし耳を傾けていたら、 内なる呼びかけに気づいたはずだ。 あなた方には才能があるのに、 それを抑え込んでいる。"
 shroud.6515.a: "そのオーラは破壊的だ。 疫病だ。"
 shroud.6520.desc: "あなた方の理解は間違っている。 オーラは我々の守護者からの神聖な贈り物だ。 それは破壊しようとするものを排除する。"
 shroud.6520.a: "要求を拒否したら？"
 shroud.6525.desc: "オーラに害を加えようとする者は、 誰であろうと制圧しなければならない。 拒否すれば、 軍事行動を取らざるを得なくなる。"
 shroud.6525.a: "封印は解体しない。"
 shroud.6525_heritage.a: "我々がこの遺産を破壊することはない。"
 shroud.6525.b: "封印の解体に同意しよう。"
 shroud.6530.desc: "無知な愚か者どもめ。"
 shroud.6535.desc: "賢明な判断だ。"
 shroud.6550.name: "敵対行為の延期"
 shroud.6550.desc: "§H[exiled_country.GetName]§!との即時対立を避けるため、 我々は§H[exiled_system_border.GetName]§!星系における$SHROUD_SEAL$の解体という彼らの要求に同意した。\n\nサイオニックの疫病を引き起こした者への接触は、 §H[this.GetName]§!全体に深刻な懸念を引き起こしている。 $SHROUD_SEAL$の解体は、 おそらく短期的な宥和に過ぎないだろう。 彼らはいずれ、我々の§H$building_ancient_ward_2$§!にも同じことを期待するに違いなく、 それを受け入れることは決してできない。\n\nいずれにせよ、 将来の敵対行為は避けられないようだ。"
 shroud.6550.a: "備えなければならない。"
 shroud.6560.name: "$shroud.6510.name$"
 shroud.6560.desc: "$shroud.shared_screen_figure$ §H[capital_scope.GetName]§!にある構造物は $shroud.shared_auric_flow_inhibition$ '$building_ancient_ward_2$'。"
 shroud.6560.a: "$shroud.6510.a$"
 shroud.shared_psiarch_transmission: "§H彼らの映像が表示されるや否や、 サイアークは冷徹で無感情な叱責を浴びせる。§!\n\n[This.GetSpeciesNamePlural]よ、 この伝達を行うことに失望している。"
 shroud.shared_auric_flow_disdain: "あなた方の行動は己の無知を証明した。 我々のオーラの流れと超能力の改善全般に対するあなた方の軽蔑は、 銀河内の平和とは相容れない。 我々には他に選択肢はない。\n\n我が艦隊との対峙に備えよ。"
 shroud.6570.name: "$shroud.6510.name$"
 shroud.6570.desc: "$shroud.shared_psiarch_transmission$ あなた方は$SHROUD_SEAL$の解体に同意したが、 我々はあなたが§H[capital_scope.GetName]§!に同様の能力を持つ建物を維持していることを知っている。 あなた方の意図は明白だ。 $shroud.shared_auric_flow_disdain$"
 shroud.6570.a: "あなた方もそうするべきだ。通信終わり。"
 shroud.6575.name: "$shroud.6570.name$"
 shroud.6575.desc: "$shroud.shared_psiarch_transmission$ あなた方による$SHROUD_SEAL$の再構築は、 我々が抱いていたあなた方の救済への希望を完全に断ち切った。 $shroud.shared_auric_flow_disdain$"
 shroud.6575.a: "$shroud.6570.a$"
 shroud.6580.name: "§H[exiled_center_system.GetName]§!の封印"
 shroud.6580.desc: "巨大なサイオニック・アッテニュエイターを起動させ、 我々の§H$SHROUD_SEAL$§!は§H[exiled_center_system.GetName]§!星系から§H$PSIONIC_AURA$§! を排除する過程にある。\n\n恒星間スキャンの結果、 敵の残りの領土はハイパーレーン経由で[exiled_center_system.GetName]に直結していることが確認された。 したがって、 この$SHROUD_SEAL$1つで§H[exiled_country.GetName]§!の領土全体に$PSIONIC_AURA_PLURAL$を拡散させることができる。\n\n我々の勝利は、 封印の保護にかかっている。"
 shroud.6580.a: "それを守ることが極めて重要だ。"
 shroud.6600.name: "マインドウェイ集団"
 shroud.6600.desc: "§H[current_planet.GetName]§!における超能力的脅威たる植民地の制圧に成功した。\n\nこの星系に存在する§H$PSIONIC_AURA$§!は、 どうやら住民と§Hシュラウド§!との超能力的な相互作用によって増幅されていたようで、 一連の活動はエリートテレパスの集団である§Hマインドウェイ集団§!が主導していた。 この超能力者からなるカルト集団は、 シュラウド内に棲息するとされる「パトロン」と呼ばれる強力な存在への献身を推進しているが、 その存在についてわかっているのは§H$r_the_lost_patron$§!という名前のみだ。\n\n彼らの聖典では、 この存在にまつわる遺物について繰り返し言及しており、 それが惑星§H[other_planet.GetName]§!に現存するものだともされている。 我々がこれを手中に収めることができれば、 このパトロンとやらの影響力の拡大を阻止する手がかりになるだろう。"
 shroud.6600.a: "[other_planet.GetName]へと進路を取れ。"
 shroud.6601.name: "[current_planet.GetName]の残骸"
 shroud.6601.desc: "かつて[exiled_country.GetName]に存在していた、 §H[current_planet.GetName]§!という星の植民地化が完了した。\n\n我々は残された記録から、 前までこの星系に漂っていた$PSIONIC_AURA$が、 ここの住民と§Hシュラウド§!との超能力的な相互作用によって呼び起こされたものだったことを学んだ。 その一連の活動を主導していたのは、 シュラウド内に棲息するとされる「パトロン」と呼ばれる強力な存在への献身を推進した、 超能力者からなるカルト集団のようで、 このパトロンとやらは§H$r_the_lost_patron$§!の名で知られていたらしい。\n\n彼らの聖典の残骸では、 この存在にまつわる遺物について言及しており、 それが惑星§H[other_planet.GetName]§!に現存するものだともしている。 これを確保するには、 一部の住民を傷つけずに済むよう、 より慎重な姿勢で[other_planet.GetName]の制圧に当たる必要がある。"
 shroud.6601.a: "$shroud.6600.a$"
 shroud.6700.name: "$SANCTUM_OF_THE_LOST$"
 shroud.6700.desc.common: "我々は、 この世界におけるすべての超能力活動を即時取り締まることで、 忌まわしい§H$PSIONIC_AURA$§!を完全に無力化することに成功した。\n\n惑星の主要都市には、 §H$SANCTUM_OF_THE_LOST$§!と呼ばれる塔の残骸が立っている。 今では不名誉な超能力カルト集団のものと認識されているが、 旧帝国では格式高い神殿として知られていた。 兵士たちの話では、 神秘的でありながら不穏な存在感を放っているとのことだ。\n\n塔の最奥部では、 強力なレベルの超能力放射を局所的に発する「繭」が厳重に封印された状態にあるが、 標準的な兵器では、 その外殻すら突破できないことがすでに証明されている。 さらなる調査を進め、 この物体によって我々の今後の安全が脅かされる可能性を排除しなければならない。"
 shroud.6700.desc.contact: "§H[current_planet.GetName]§!の征服は、 §H[exiled_country.GetName]§!に対する我々の最終的な勝利を象徴するものだった。 $shroud.6700.desc.common$"
 shroud.6700.desc.no_contact: "§H[current_planet.GetName]§!を制圧することで、 我々はかつて§H[exiled_country.GetName]§!の名で知られた帝国の領土を獲得するにいたった。 $shroud.6700.desc.common$"
 shroud.6700.desc.contact_no_name: "§H[current_planet.GetName]§!の征服は、 [exiled_country.GetName]に対する我々の最終的な勝利を象徴するものだった。 $shroud.6700.desc.common$"
 shroud.6700.desc.no_exiled: "§H[current_planet.GetName]§!を制圧することで、 我々はかつて超能力の狂信者が支配していた領土を獲得するにいたった。 $shroud.6700.desc.common$"
 shroud.6700.a: "不穏なニュースだ……詳しく調査せよ。"
 shroud.6705.name: "$psionic_threat_eliminated$"
 shroud.6705.desc.common: "事前調査を実施したところ、 この惑星にはかつて広範囲に及ぶ建造物群が存在していた痕跡が見つかった。 おそらく、 この度の超能力的厄災の中心地となったのだろうが、 今では崩れた残骸が残っているのみだ。\n\nこの建物の中にどんな堕落した秘密が隠されていたのか、 また居住者たちが陰で何をしていたのか、 その本質を我々が解き明かせる日は永遠にやってこないかもしれない。 それでもこの星系から$PSIONIC_AURA$の一切の痕跡が排除されたのは確かだ。 今回と同じような災厄が、 我々の安全を脅かすことは二度とないだろう。"
 shroud.6705.desc.contact: "§H[current_planet.GetName]§!の住民が絶滅したことで、 §H[exiled_country.GetName]§!帝国が終焉を迎えた。\n\n$shroud.6705.desc.common$"
 shroud.6705.desc.no_contact: "§H[current_planet.GetName]§!の住民が絶滅したことで、 超能力がもたらす壊滅的な脅威に終止符が打たれた。\n\n$shroud.6705.desc.common$"
 shroud.6705.a: "同様の脅威がすべて消え去ってくれることを願うばかりだ。"
 psionic_threat_eliminated: "超能力的脅威の排除"
 psionic_threat_eliminated_desc: "超能力帝国が壊滅したことで、 彼らが放っていた$PSIONIC_AURA$もまた銀河から消え、 我らが民の精神に平穏が戻った。"
 SANCTUM_OF_THE_LOST: "夢見る者の至聖所"
 SANCTUM_OF_THE_LOST_DESC: "廃墟と化した§H[sanctum_of_the_lost_planet.GetName]§!の$SANCTUM_OF_THE_LOST$で、 危険なレベルの超能力放射を発する「繭」が厳重に封印されているのが発見された。 この物体の潜在的な脅威を排除するためにも、 現地調査を実施しなければならない。"
 shroud.6710.name: "内なる力"
 shroud.6710.desc: "我々の研究者は、§H[sanctum_of_the_lost_planet.GetName]§!における「繭」を徹底的に分析した。\n\nこの印象的な構造物の外部スキャンにより、 強力なサイオニックの存在を収容するために設計された、 非常に安全な容器であることが判明した。 容器は重合金の絶縁層で覆われているにもかかわらず、 高レベルのサイオニック放射が内部で浸透していた。\n\n繭の周囲には多数のサイオニック・アッテニュエイターが設置されており、 作動すると、 付近にいる全員が焼けつくようなレベルの神経的苦痛に襲われた。\n\n繭の表面が歪み、 卵形から螺旋状に変化した。  そして開口部が開き、 我々は内側から直接的な通信を受信した……"
 cannot_found_mindwarden_enclave: "帝国内で、 対超能力の安全対策を整えている必要がある"
 shroud.6800.name: "$MINDWARDENS_THE_FIRST_ENCLAVE$"
 shroud.6800.desc: "我々は§Hシュラウド§!に関する膨大な知識を蓄積し、 その有害な影響を抑える高度な技術を開発してきた。 この技術を銀河全体に適用する方法について議論していると、 我々の艦隊司令官たちから興味深い提案があった。\n\n彼らは、 我々の艦隊の1つを独立した§H'$gov_mindwarden_enclave$'§!として設立し、 銀河全体に反サイオニック支援を提供することを提案している。 $shroud.shared_enclave_investement$"
 shroud.6800.a: "価値のある試みだ。"
 shroud.6800.a.tt: "サイズ§Y30§!以上の艦隊を§H$gov_mindwarden_enclave$§!に転換できるようになった。"
 shroud.6825.name: "$gov_mindwarden_enclave$の設立"
 shroud.6825.desc_first: "§H[This.GetName]§!は、 我々の最初の独立した §H$gov_mindwarden_enclave$§!の基礎を形成するのに適した候補と判断された。 承認されれば、 艦隊は§H[This.Solar_System.GetName]§!に新しい施設を設立し、 即座に反サイオニックサービスの提供を開始することになる。"
 shroud.6825.desc_default: "我々は、 独立した§H'$gov_mindwarden_enclave$'§!として§H[This.GetName]§!を設立し、 銀河全体に反サイオニック支援を提供することを検討している。 $shroud.shared_enclave_investement$"
 shroud.6825.a: "建設を進めろ。"
 shroud.6825.a.tt: "§H$gov_mindwarden_enclave$§!が設立された。"
 shroud.6825.b: "もう一度考え直そう。"
 shroud.6830.name: "$MINDWARDEN_plural$"
 shroud.6830.desc: "§Hシュラウド§!と無責任な超能力の使用に対抗することは、 我々の国民を強くし、 目標をより明確に焦点化した。 最初の§H$gov_mindwarden_enclave$§!の設立は、 癒しと抵抗の新時代の到来を意味する。\n\n銀河全体で、 いかなる精神もサイオニックに侵される必要はなく、 いかなる世界もシュラウドの力に苦しめられることはない。\n\nこれからは$MINDWARDEN_plural$の時代だ。"
 shroud.6830.a: "我々の旅は始まったばかりだ。"
 shroud.shared_enclave_investement: "我々の初期投資は宇宙ステーションの建設資金となり、 その見返りとして将来の収益の一部を受け取ることになる。 その運用を独立することで、 より大規模な施設の展開が可能になる。\n\n当然、 我々もこのサービスを利用し、 支払いの一部を受け取ることができる。"
 shroud.6841.name: "[mindwarden_enclave_country.GetName]中立機構による配当金の支払い"
 BEGINS_EVENT_CHAIN: "連鎖イベントを開始する："
 ENDS_EVENT_CHAIN: "連鎖イベントを終了する："
 the_exiled_become_hostile: "§H[exiled_country.GetName]§!が我々と敵対関係になった。"
 start_psionic_war_chain: "$BEGINS_EVENT_CHAIN$§Y$the_psionic_war_chain_title$§!"
 shroud_seal_dismantled: "§H[exiled_system_border.GetName]§!の§Hシュラウド・シール§!が解体された。"
 the_psionic_war_chain_title: "$NAME_Psionic_War$"
 the_psionic_war_chain_desc: "§H[exiled_country.GetName]§!との戦が迫っている。\n\n超能力がもたらす厄災は、 発生源にて鎮圧されなければならない。 まずは§H[exiled_center_system.GetName]§!星系内に$SHROUD_SEAL$を構築し、 $PSIONIC_AURA$を無力化する必要がある。 そうして初めて我々はかの国に侵攻し、 銀河からこの脅威を根絶できるようになるだろう。"
 the_psionic_war_chain_poi_1: "$SHROUD_SEAL$の建設"
 the_psionic_war_chain_poi_1_desc: "§H[exiled_center_system.GetName]§!に§H$SHROUD_SEAL$§!を建設すると、 星系内およびハイパーレーンで直接接続された他の星系における§H$PSIONIC_AURA_PLURAL$§!が抑制される。"
 the_psionic_war_chain_poi_2: "§H[exiled_planet_1.GetName]§!を支配する"
 the_psionic_war_chain_poi_2_desc: "§H[exiled_country.GetName]§!は、 超能力による攻撃を止めようとしない。 彼らの世界を征服することこそが、 §H$PSIONIC_AURA_PLURAL$§!の再出現を防ぐ唯一の手段だ。"
 the_psionic_war_chain_poi_3: "§H[exiled_planet_2.GetName]§!を支配する"
 the_psionic_war_chain_poi_3_desc: "§H[exiled_country.GetName]§!は、 超能力による攻撃を止めようとしない。 彼らの世界を征服することこそが、 §H$PSIONIC_AURA_PLURAL$§!の再出現を防ぐ唯一の手段だ。"
 shroud_seal_reconstruction_chain_title: "シュラウド・シールの再建設"
 shroud_seal_reconstruction_chain_desc: "我々の§H$SHROUD_SEAL$§!を解体することは、 §H[exiled_country.GetName]§!をなだめるために必要な犠牲だったが、 この措置は単なる時間稼ぎの策略に過ぎなかった。 彼らの領土に侵入し、 §H$PSIONIC_AURA_PLURAL$§!を一掃する前に構造物を再建しなければならない。\n\n§P再建設は侵略行為とみなされるだろう。 我々はいかなる報復にも備えなければならない。§!"
 shroud_seal_reconstruction_chain_poi_1: "[event_target:exiled_system_border.GetName]"
 shroud_seal_reconstruction_chain_poi_1_desc: "$build_shroud_seal_poi_desc$"
 SHROUD_WORLDS_IN_SYSTEM: "シュラウドの惑星：§G$QUANTITY|0$§!"
 NAME_Psionic_War: "超能力戦争"
 wg_psionic_war: "$NAME_Psionic_War$"
 war_goal_wg_psionic_war: "$NAME_Psionic_War$"
 war_goal_wg_psionic_war_desc: "侵略的な超能力者を銀河から排除するために戦争が勃発した。"
 shroud.6720.name: "$UNKNOWN_LONG$"
 shroud.6720.desc: "§Hお前たちにはこの声が聞こえている。 なのに耳を傾けようとしない。 なぜだ？§!"
 shroud.6720.a: "お前に我々の心は毒させない！"
 shroud.6720.b: "お前は何者だ？"
 shroud.6720.c: "何をしに来たのだ？"
 shroud.6720.d: "目的はなんだ？"
 shroud.6720.e: "お前たちはシュラウドから来たのか？"
 shroud.6720.f: "もう話は十分だ。"
 shroud.6723.desc: "§H毒？  これは毒ではない……\n\n歌だ。 歌うには耳を傾ける必要がある。 自身を解放し、 その美しさを共有するのだ。§!"
 shroud.6725.desc: "§H我々は回る車輪に耳を傾ける……\n\nそして星々が回れば歌をうたう……§!"
 shroud.6725.a: "「車輪」とは何だ？"
 shroud.6725.b: "もう十分だ。"
 shroud.6730.desc: "§H永遠に回り続ける。 上と下に。 これが「シュラウド」と呼ばれる調和。§!"
 shroud.6735.desc: "§H私は……夢を見ている。 ある歌の夢を。 けれど、声が聞こえなくなってしまった。 あのコーラスはどこへ消えてしまったのだろう？§!"
 shroud.6735.a: "お前をここに閉じ込めた者はもういない。"
 shroud.6735.b: "「歌」とは何だ？"
 shroud.6735.c: "もう十分だ。"
 shroud.6740.desc: "§Hお前たちはここにいる。 ならば歌えるかもしれない……§!"
 shroud.6745.desc: "§H覚醒と夢の狭間の流れ……ここと向こうを繋ぐ道。\n\nお前にはその声が聞こえない、 お前の心にはそれを理解することができない……§!"
 shroud.6750.desc: "§H私は歌声が聴きたい……何もかもが静かすぎる……なぜだ？§!"
 shroud.6750.a: "見返りに何を提供できる？"
 shroud.6750.b: "もう十分だ。"
 shroud.6755.desc: "§Hお前に……私の夢を見せよう。 世界を創造するところを。§!"
 shroud.6755.a: "お前を信頼できるという保証は？"
 shroud.6760.desc: "§Hただ耳を傾けるだけでいい。 歌は美しい。 ゆえに歌は真理——美しき真理なのだ。\n\nお前たちの心は閉ざされているが、 それを開くこともできる。§!"
 shroud.6763.desc: "§H私はまだあそこにいる……私は2つの世界の歌を聴いているが、 こちらでは何も聞こえなくなってしまった。§!"
 shroud.6763.a: "お前はここにいるべきじゃない。"
 shroud.6765.desc: "§Hお前は真実を語っている。§!"
 shroud.6770.name: "$r_the_lost_patron$"
 shroud.6770.desc: "我々が§H[sanctum_of_the_lost_planet.GetName]§!で発見した繭には、 強力な異次元の存在が潜んでいた。 この存在が、 我々の精神の神聖さを脅かした$PSIONIC_AURA$の発生源である可能性が高い。\n\n今のところ、 サイオニック・アッテニュエイターによってその危険は軽減されているものの、 いつまでその影響を抑制できるかは不明だ。 制御された状況下では、 その恐ろしい力を我々自身の目的のために利用することもできる。\n\nそれにもかかわらず、 社会の多くの人々はその即時破壊を求めている。 その存在自体が、 我々が長年抱いてきた価値観に反しているのだ。"
 shroud.6770.a: "この忌まわしき存在を破壊せよ。"
 shroud.6770.b: "活用する方法を見つけよう……"
 destroyers_of_the_lost_modifier: "失われし者の破壊者"
 destroyers_of_the_lost_modifier_tt: "§Y$living_standard_shroud_inoculation$§!の生活水準が使用可能になる。この生活水準では§Y超能力§!が除去される。"
 destroyers_of_the_lost_modifier_desc: "超能力を操る敵を倒し、 $PSIONIC_AURA$の発生源と思しきものを破壊したことで、 長年の苦しみに耐えた帝国の士気が高まった。"
 living_standard_shroud_inoculation: "シュラウド予防接種"
 living_standard_shroud_inoculation_tooltip: "この種族は、サイオニック放射の有害な影響に対する予防接種を受けている。\n\n§Rさらなる被害を防ぐため、あらゆる超能力特性が除去される。§!"
 living_standard_shroud_inoculation_tooltip_delayed: "§L我々はこの種族のサイオニック面の安全を確保する。§!"
 psionic_heresy: "サイオニック・ヘレシー"
 shroud.6780.name: "$r_the_lost_patron$"
 shroud.6780.desc: "思考が我々の心に入り込む。\n\n明るくて耳障りなメロディが聞こえる。\n\n我々はこの痛みを知っている。 この激しい痛みには覚えがある。\n\n§Hお前たちは耳を傾けた。 この夢はお前たちのものだ……歌え、 歌え……§!"
 shroud.6780.a: "我々は一体何をしたんだ？"
 shroud.6785.desc: "§H約束通り。 お前のために夢を見た。§!"
 shroud.6785.a: "「夢」とは何だ？"
 shroud.6790.desc: "§H世界だ。 新たな世界、 私とお前の世界の狭間に存在する。§!"
 shroud.6790.a: "その世界は我々にどんな価値があるのか？"
 shroud.6795.desc: "§H歌を届けさせてくれ。 最も輝かしい歌を。§!"
 shroud.6795.a: "これを後悔しないことを願う。"
 shroud.6795.a.tt: "最大3つの§Hシュラウドの惑星§!を我々の国境内に追加できる。 なお、 各星系内に追加できる惑星の数は最大1つまでとなる。"
 r_the_lost_patron: "夢見る者"
 r_the_lost_patron_desc: "この神秘の存在は、 シュラウドに棲息する者の物理形態であり、 今はなき超能力帝国では“パトロン”と呼ばれていた。 物質界での受肉にいたった具体的な経緯は不明だが、 かの存在が持つサイオニック領域との特別なつながりは大いなる力を授けてくれる。"
 the_lost_patron_passive_effect: "§H$SHROUD_SEAL_PLURAL$§!の影響範囲：§G+1§!\n§H$SHROUD_SEAL_PLURAL$§!が生み出す£unity£ §Y$unity$§!：§G+25§!\n§H$SHROUD_SEAL_PLURAL$§!が与える£navy_size£ §Y$NAVY_SIZE_TITLE$§!：§G+10§!"
 the_lost_patron_before_activation_tt: "何が起こるかは分からない……"
 the_lost_patron_after_activation_effect_tt: "£Decision£ §Y惑星ディシジョン§!を1つアンロック：['concept_dreamscaping_decision']"
 decision_dreamscaping: "ドリームスケープ"
 decision_dreamscaping_desc: "§Y$pc_shrouded$§!を§Y$pc_gaia$§!にテラフォーミングする"
 concept_dreamscaping_decision: "$decision_dreamscaping$"
 concept_dreamscaping_decision_desc: "$decision_dreamscaping_desc$"
