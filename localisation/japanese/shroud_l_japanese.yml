 ACCORD_FRACTALIZATION_TRIGGER: "£trigger_no£ §R§Y$situation_end_of_the_cycle$§!の§H状況§!が$stage_2$に到達した§!"
 ACCORD_CREATION: "創造"
 ACCORD_CREATION_desc: "時が終わりに向かおうとしているなか、 $end_of_the_cycle_article$の掌中にある、 この現実世界へのかの者の支配は強まる一方だ。 別の次元からやってきた世界が、 まるごとこの世界に持ち込まれることで回避できない無へとさらに飲み込まれていく。"
