 #==========================
 trait_tankbound: "タンク漬けの命"
 trait_tankbound_desc: "この種族は、 特別な培養液で満たされたタンクの中で一生を終える。 このため、 彼らは補助装置に大きく依存しており、 肉体を使う作業に直接従事することができない。"
 trait_tankbound_effects: "POPの食料 (もしくはそれに相当する) 維持費：§G-50%§! $TABBED_NEW_LINE$- §R労働者の職業枠に割り当てることができない§!$TABBED_NEW_LINE$- §R地上軍に採用することができない§!"
 trait_tankbound_portrait_override_tt: "格納容器に入れられた種族が必要"
 trait_robot_latent_psionic: "$trait_latent_psionic$"
 trait_robot_latent_psionic_desc: "§Lこの種族はサイオニック・プロセッサを秘めているが、 ほとんどは休眠状態にある。 極めて稀だが、 リーダーのなかにはこの能力が起動する者もいる。§!\n"
