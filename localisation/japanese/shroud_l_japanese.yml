 # Energy Thralls (Normal)
 job_energy_thrall: "エネルギー隷属体"
 job_energy_thrall_plural: "エネルギー隷属体"
 job_energy_thrall_desc: "住民の余剰エネルギーは、 質の高いリーダーシップを維持するために有効活用できる。 各$job_energy_thrall$には特別に調整された吸引装置が埋め込まれており、 彼らの精気を転送可能な動力セルに収集する。"
 job_energy_thrall_effect_desc: "£job_energy_thrall£ $job_energy_thrall_plural$は$i_unity$を産出し、 £mod_leader_species_exp_gain£ §Y$MOD_LEADER_SPECIES_EXP_GAIN$§!を増加させ、 §Y$edict_energy_drain$§!および§Y$edict_sanguine_council$§!布告による§YPOPの成長ペナルティ§!を§G0.02%§!軽減する。\n\n"
 mod_job_energy_thrall_add: "$job_energy_thrall$の職業枠"
