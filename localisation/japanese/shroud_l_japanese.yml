 # Experiment Engineer (Normal)
 job_experiment_engineer: "実験技術者"
 job_experiment_engineer_plural: "$job_experiment_engineer$"
 job_experiment_engineer_desc: "これらのエリート研究者は、その方法論の苛烈さをいささかも省みることなく、 犯罪者から選ばれた生きた被験者に対して実験を行う。"
 job_experiment_engineer_effect_desc: "£job_experiment_engineer£ $job_experiment_engineer_plural$は$i_consumer_goods$と$i_crime$を$r_research$に変換する"
 mod_job_experiment_engineer_add: "$job_experiment_engineer$の職業枠"
