 job_experiment_engineer_drone: "実験技術者ドローン"
 job_experiment_engineer_drone_plural: "$job_experiment_engineer_drone$"
 job_experiment_engineer_drone_desc: "これらの研究用ドローンは、 逸脱した集団から選ばれた生きた被験者に対して実験を行う。集団の利益となるのであれば、 どんな過酷な方法でも構わない。"
 job_experiment_engineer_drone_effect_desc: "£job_experiment_engineer_drone£ $job_experiment_engineer_drone_plural$は$i_crime$を$r_research$に変換する"
