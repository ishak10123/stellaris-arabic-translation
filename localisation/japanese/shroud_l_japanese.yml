 shroud.3000.title: "はかない形"
 shroud.3000.desc: "渦巻く黒闇の中、 遠くの影が一瞬形を成すかと思うと再び無へと消えていく……不明瞭な声の渦が理解不能な叫びを響かせる……光がちらつき、消え、 熱が膨れ上がり、 消えていく。\n\nそこには動きがある。 何かが回転している。 動いているのは我々なのか、それともシュラウドそのものなのか？\n\nどうやってか、 存在があらゆる方向から近づいてくる。 そして声が響き渡る。\n\n§H何が見える？§!"
 shroud.3000.a: "燃える世界が見える。"
 shroud.3000.a.reply: "何かが動き、 再び声が聞こえる……\n\n§Hいいだろう。§!\n\n暗闇は傾き、 そして回転する。 何かが我々に強く押し付けられ、 その次の瞬間、 我々の周りにいた存在は消えていた。"
 shroud.3000.b: "祝いの場が見える。"
 shroud.3000.b.reply: "何か重いものが震える。 暗闇がゆっくりと我々を押し付ける。 その力は段々と強くなっていく……\n\n§H違う！§!\n\n無の存在は傾き、 回転する。 次の瞬間、 我々の周りにいた存在は消えていた……"
 shroud.3000.c: "わからない。"
 shroud.3000.c.reply: "§H弱い！§!\n\n無の存在は傾き、 回転する。 次の瞬間、 我々の周りにいた存在は消えていた……"
 shroud.3005.title: "耐えがたい飢え"
 shroud.3005.desc: "内臓の腐敗臭が五感を襲う。\n\nシュラウドの奥底から、 貪欲な怒りに満ちてうねり、 唸るものが現れる。 飢えた猛獣の叫びが最初に響き渡る…… 猛獣の飢えが感じられる。 そして猛獣の涎が滴る口は、 我々の口となる。\n\nシルエットが目の前に現れる。 慌てふためく家畜。 獲物だ。 あと少しで手が届く距離にいる……耐え難い疼きが募る。\n\n五感が歪み、 飢えが思考を飲み込むにつれ、 ますます強く引かれる。 この叫びは獲物のものか……それとも内からきているものなのか？\n\n我々を縛る鎖がきつくなる。 そして苦痛のなか、 叫び声が聞こえる。\n\n§H鎖を断ち切れ！  貪り食え！§!"
 shroud.3005.a: "鎖を断ち切れ。 獲物を喰らえ。"
 shroud.3005.a.boons.tt: "ランダムな戦闘系$shroud_boon$を獲得。"
 shroud.3005.a.reply: "鎖が切れる。\n\n我々は解放され、 飢えている。\n\n恐怖！\n\n§H喰らうのだ。§!"
 shroud.3005.b: "飢えに屈するな。 心を落ち着かせろ。"
 shroud.3005.b.reply: "鎖は堅く締まっている。 怒りに満ちた声が唸るが、 我々はその影響を抑え、 心を静め、 理性を取り戻す。\n\n§H弱い！ 無能！§!\n\n飢えが薄れ、 残った憎しみがシュラウドの中へと消えていく。"
 shroud.3010.title: "犠牲の宴"
 shroud.3010.desc: "深淵の奥底から……悪意に満ちた、 荒々しい声が響き渡る……我々を呼び求めている。\n\n§H喰らえ。 食せ。 貪れ。§!\n\n突然、 とある光景が現れる。 世界が灰と静寂に包まれ、 [Root.GetCitizenPlural]の悲鳴が響き渡る。 彼らの物理的な体がサイオニック・エネルギーに飲み込まれ、 声と……我々の飢えを満たす。\n\nこれらの光景が現れるなか、 もう一つの存在が感じられる。 その存在は、 我々に自制心を保ち、 [Root.GetCitizenPlural]と団結するよう促し、 共に強くなっていくよう呼びかけている。 その声は、 叫び声に掻き消されてしまう。"
 shroud.3010.desc.organic: "§H肉体を我に捧げよ！§!"
 shroud.3010.desc.other: "§H体を我に捧げよ！§!"
 shroud.3010.a: "喰らえ。"
 shroud.3010.a.reply: "食われた者たちの叫びが、 シュラウドと帝国全体に響き渡り、 やがて突然に静まり返る。\n\nこの犠牲により、 我々の力は飢えが薄れるにつれ強まっていく。"
 shroud.3010.b: "団結せよ。"
 shroud.3010.b.reply: "我々は声を封じ、 代わりにシュラウドを越え、 帝国として団結する。 飢えが衰え、 皆の安堵と安楽のため息が響き渡り、 怒りの叫び声をかき消す。"
 shroud.3015.title: "一時的な幻影"
 shroud.3015.desc: "強力なサイオニック・エネルギーの渦が暗闇の中で激突する。 影が駆け巡り、 周囲に崩れ落ちる……前方で光が輝き、 脈打つ。\n\n突然、 一瞬だけ、 1つの光景がはっきりと見える。 その形は、 我々が判別できる前に消えてしまう。\n\n不思議な存在が我々を取り巻く。\n\n§H何が見えた？§!"
 shroud.3015.a: "多くの生物で満ち溢れた森を見た。"
 shroud.3015.a.reply: "静寂が膨らむ。 再び声が響く……\n\n§H素晴らしい。§!\n\n強い熱が我々の中に湧き上がり、 やがて収まる。 存在は去ったようだ。"
 shroud.3015.b: "土地が持つすべてを奪われた荒野を目にした。"
 shroud.3015.b.reply: "再び声が響く……\n\n§Hあり得ない！§!\n\n極度の寒さが我々の中に渦巻き、 突然消え去る。 存在は去ったようだ。"
 shroud.3015.c: "わからない。"
 shroud.3015.c.reply: "再び声が響く……\n\n§H面白くない。§!\n\n激しい空虚感が我々を襲うが、 突然消え去る。 存在は去ったようだ。"
 shroud.3020.title: "保護の誘惑"
 shroud.3020.desc: "シュラウドの数多くある層の間に、 一つの光景が我々の前に広がっていく。\n\n霧の中、 苦闘する生物の輪郭が浮かび上がる。 モヤモヤした触手のようなものが、 次第に締め付けながらその体を巻き込み、 窒息させようとしている。\n\nその動物は、 これまで見たことのないものだ。\n\n声が再び聞こえてくる。\n\n§H運命の糸が呼びかける！  お前はどの糸を引くか？§!"
 shroud.3020.a: "生物を解放しろ。"
 shroud.3020.a.reply: "生物が視界から消え、 声が我々の[GetMindLoc]に響き渡る。\n\n§H繁栄。§!\n\nまた光景が一瞬見える。 我が帝国のどこかで、 生命が復活している。"
 shroud.3020.b: "捕らえろ。"
 shroud.3020.b.reply: "声は我々の思考から遠ざかり、 荒涼とした地形の光景に響き渡る残響のような叫びだけを残す。\n\n§H害悪だ。§!"
 shroud.3020.c: "殺せ。"
 shroud.3020.c.swarm: "喰らえ。"
 shroud.3020.c.reply: "圧倒的な衝動により、 声は思考から押し出される。 血を求める渇望が[GetMindLoc]を埋め尽くし、 残酷な笑いが虚空に響き渡る。\n\n§Hそうだ！  楽な獲物だ！§!"
 shroud.3025.title: "変わりゆく地形"
 shroud.3025.desc: "シュラウドの霧が解け、 果てしなく渦巻く光景が姿を現す。\n\n不明瞭な風景が、 我々の知識を超越する形でうねりながら目前に広がっている。 山々が隆起し、 沈み込む。 混沌に満ちた沸騰する海が蒸発し、 果てしない砂漠に水生生物の白骨を残して消えていく。\n\n深い森の中、 おとなしい生物たちが生息地を縫うように移動する。 やがて彼らは痙攣し、 血に飢えた怪物へと変貌する。 互いを引き裂きながら、 死と再生の終わりのないサイクルに巻き込まれていく。\n\n§Hなんという混乱。 己の中で絡み合っている。§!"
 shroud.3025.a: "自然を我々の意志に従わせよ。"
 shroud.3025.a.reply: "我々は手を伸ばし、 目の前に見える混乱をつかむ。\n\n地形を整え、 大陸を定着させる。\n\nさまざまな要素が組み合わさっていくにつれ、 声が響き渡る。\n\n§H平凡で単調、 そして空虚……§!"
 shroud.3025.b: "自然の無秩序を育もう。"
 shroud.3025.b.reply: "光景が続きゆくのを見守る。 終わりのないサイクルが次第に重なり合い、 爆発的に外へ広がり、 始まりと同じように突然止まる。\n\nエネルギーが無限の広大な空間に奔流し、 再構成され、 新たな形態を帯びていく。\n\n声が響き渡る。\n\n§H調和ある対立。 無秩序な統一。§!"
 shroud.3025.b.reply.tt: "この惑星はランダムな§Gプラス補正§!と§Rマイナス補正§!を獲得する。"
 shroud.3030.title: "暗闇のプリズム"
 shroud.3030.desc: "シュラウドの不穏な渦が、 広大な黒砂の広がりを露わにする。 波の音が聞こえるが、 その姿は見えない。\n\n前方、 あるいは後方にプリズムが現れる。 一筋の光がそれに当たり、 一瞬屈折してぼやけた光景を形成する。\n\n数え切れないほどの影のような人影と形を変える物体が、 一瞬だけ見え隠れし、 やがて暗闇に飲み込まれていく。\n\n近くの砂の上に、 何らかの存在が感じられる。\n\n§H示されたものは見たのであろう。§!"
 shroud.3030.a: "多くの声が交わる集会を見た。"
 shroud.3030.a.reply: "砂がゆっくりと動き、 再び声が響く。\n\n§Hそうだ。 調和こそが宇宙の道である。§!\n\n何か重いものが持ち上がるのを感じる。 存在は去ったようだ。"
 shroud.3030.b: "戦場の惨状を見た。"
 shroud.3030.b.reply: "砂が嵐のような勢いで突然渦巻き始める。\n\n§Hダメだ！  武器は錆びて、 忘れ去られるべきなのだ！§!\n\n砂嵐が落ち着く。 存在は去ったようだ。"
 shroud.3030.c: "わからない。"
 shroud.3030.c.reply: "砂がゆっくりと動く。\n\n§Hためらいは失敗を生む……§!\n\n存在は去ったようだ。"
 shroud.3035.title: "影の闘い"
 shroud.3035.desc: "シュラウドの混沌としたエネルギーがうねり、 渦巻く。\n\n影の触手が鞭のように打ちつけ、 巻きつき、 反動で煙霧が激しく襲いかかる。 この超能力の怒りの嵐のなか、 2つの無形の存在がぶつかり合っている。 双方ともに容赦なく、 屈せず、 怒りに満ちている。\n\n異質な存在が我々の[GetMindPhysicalLoc]に押し寄せ、 浸食し、 広がっていく。\n\n§H踏み入る者は決着をもたらさねばならない。§!"
 shroud.3035.a: "対話は理解を深める。"
 shroud.3035.a.reply: "霧は自身の中に溶け込み、 サイオニック・エネルギーの渦に溶けていく。 意識が戻ってくる。\n\n§H調和とは知恵である。§!\n\nシュラウドは落ち着いたようだ。"
 shroud.3035.b: "妥協は弱さである。"
 shroud.3035.b.reply: "シュラウドに攻撃されるたびに、 周囲のエネルギーがさらに強まる。\n\n§H考えぬ生物には暴力を与える。§!\n\nシュラウドのエネルギーが再び激しくうねり始める。"
 shroud.3040.title: "見たことのない光景"
 shroud.3040.desc: "目の前に、 黒い液体の池が広がっている。\n\n突然、 ぼやけた何かが表面をちらりと横切る。 輝く金で覆われた尾根を持つきらめく峰が一瞬だけ見え、 すぐに消えてしまう。\n\n声が[GetMindLoc]の中に響き渡る。\n\n§H見えざるものを見たか？§!"
 shroud.3040.a: "採掘を待つ採石場が見えた。"
 shroud.3040.a.reply: "一連の波紋が同時に表面に広がっていく。 再び声が聞こえてくる。\n\n§H限りない成長は、 測り知れない調和を保つ。§!\n\n液体は落ち着き、 声が遠のいていくのが感じられる。"
 shroud.3040.b: "保護すべき自然の完璧さを見た。"
 shroud.3040.b.reply: "液体が激しく揺れ動く。 波が大きくなり、 暗闇の中に渦が巻き起こる。 声がより強い力で響き渡る。\n\n§Hそれは許されない！  成長し、 獲得する。 成長し、 獲得するのだ！§!\n\n水面が再び落ち着く。 声は去ったようだ。"
 shroud.3040.c: "わからない。"
 shroud.3040.c.reply: "液体が揺れ動く。 声が再び響き渡る。\n\n§H信念が揺らぐ……お前たちの意志は弱い。§!\n\n水面が落ち着き、 声が遠のいていくのが感じられる。"
 shroud.3045.title: "輝く種子"
 shroud.3045.desc: "霧が我々の前で形を変える。 灼熱のエネルギーが突然活性化し、 脈打つ。 奇妙な樹木のような形の輪郭が見える。\n\nその広大な樹冠に近づくときらめき、 紫、 ピンク、 黒の渦巻く色合いを次々と変化させていく。\n\nその根本には輝く種子が埋め込まれており、 樹冠の色の変化に合わせて輝きを放っている。\n\n声が[GetMindLoc]に響き渡る。\n\n§H奪え。 捕らえろ。 搾取しろ。§!"
 shroud.3045.a: "回収しろ。"
 shroud.3045.a.reply: "種子が取り除かれると、 樹冠がくすんで瞬く間に枯れ果てる。 声が再び聞こえる。\n\n§Hそうだ！  奪ったものはさらなる利益を生む。§!"
 shroud.3045.b: "触るな。"
 shroud.3045.b.reply: "体の中が大きく震える。 これは世界が震えているのか、 我々が震えているのか？\n\n§H繁栄こそが目的。 それを避けることは愚かである！§!"
 shroud.3050.title: "騒音の乱れ"
 shroud.3050.desc.intro: "強力なサイオニックの流れがシュラウドの果てしなく渦巻く中で激突し、 沸き立つ。 轟く騒音が膨れ上がり、 我々の注意を惹きつける。"
 shroud.3050.desc.outro: "この騒音は耐えがたい。"
 shroud.3050.desc.eater: "苦痛の叫び、 戦いの音が轟く交響曲、 貪り食う炎の轟き。 痛みが感じられる……その痛みは誰のものなのか？"
 shroud.3050.desc.composer: "野生の動物的で、 原始的な叫び声と鳴き声……川が奔流し、 風が唸る……自然のすべてが一斉に吠え、 叫ぶ……"
 shroud.3050.desc.cradle: "声はささやき、 つぶやき、 叫び、 宣言する……数多くの抑揚、 音節、 音……多様な言語が同時にざわめく。"
 shroud.3050.desc.instrument: "ドリルが穴を掘り、 機械が研磨する……物質は激しく力強く変形する……宇宙のすべての工場が同時に爆音を放ち、火を噴き上げる。"
 shroud.3050.a: "そのままでいろ。"
 shroud.3050.a.reply: "音は次第に大きくなっていき、 突然、 解不能な方向へと突き飛ばされる……\n\nようやく、 静寂が訪れる。"
 shroud.3050.b: "目を背けろ。"
 shroud.3050.b.reply: "もう耐えられない。 我々の[GetMindLoc]は音から離れ、 静けさの安らぎへと戻っていく。"
 shroud.3055.title: "予言的な光景"
 shroud.3055.desc.intro: "濃い暗闇が我々を包み込む。 四方八方から圧力が迫り、 次第にきつく締め付ける。 やがて、 ぼんやりとした景色が姿を現す。"
 shroud.3055.desc.outro: "暗闇に包まれた中で、 一つのものが我々の目を引く。 それは見間違えるわけがないもの、 [Root.GetName]の旗である。\n\nこれは我々なのだろうか？"
 shroud.3055.desc.eater: "荒廃した世界、 そして戦いの終わった跡が見える……勝者は、 死体と瓦礫を漁っている。"
 shroud.3055.desc.composer: "多くの世界が……時と空間を不可能に駆け巡るのが見える……すべてが同じ姿で、 一つの帝国のもとで統一されている。"
 shroud.3055.desc.cradle: "壮大な集まりが見える……多くの人の不透明な輪郭……誰もが聴き、 語っている"
 shroud.3055.desc.instrument.default: "最適化された惑星が見える……果てしなく続く工場と鉱山……その表面の隅々まで手付かずの場所はない。"
 shroud.3055.desc.instrument.relentless_industrialist: "最適化された惑星が見える……果てしなく続く工場と鉱山……完璧そのものだ。 その表面の隅々まで手付かずの場所はない。"
 shroud.3055.a: "光景に集中しろ。"
 shroud.3055.a.reply: "光景がやや鮮明になる。 我々は自分たちの観察力に自信を持っている。"
 shroud.3055.b.organic: "頭から消し去れ。"
 shroud.3055.b.machine: "回路から取り除け。"
 shroud.3055.b.reply: "光景で見えるはっきりしない輪郭が次第に消え去り、 無へと溶けていく。"
 shroud.3060.title: "虚無の間で"
 shroud.3060.desc.intro: "シュラウドの透き通った霧が渦巻き、 ねじれながら、 我々の意識をさらに深く引きずり込む。 その間、 我々の肉体は動かず、 何にも触れられていない\n\n我々の[GetPsycheLoc]は繰り返す波に閉じ込められ、 伸びたり、 引き伸ばされたりしている。 動こうとしてもその試みは失敗に終わり、 強力な力によって締め付けられる。"
 shroud.3060.desc.intro.organic: "我々は自分たちの先を見ている。 そして我々の身体は、 物理的な理解を超えた連鎖する4次元超立方体の中に封じ込められている。"
 shroud.3060.desc.intro.machine: "論理サブルーチンが起動し、 故障が検出された。 再帰ループだ。 我々のサイオニック・プロセッサでは、 このループを解除し通常の機能を再開することができない。"
 shroud.3060.desc.intro.end: "耐え難い緊張の中、 我々の体は虚無の中へと溶けていきそうになる。 一つの声が我々の束縛を突き破る。"
 shroud.3060.desc.outro: "その言葉は我々の内に響き渡る。 その勢いは増していくが、 その言葉に従えさえすれば、 我々を引き裂こうとする混乱を鎮められるのであろうと感じ取った。"
 shroud.3060.desc.eater: "§H貪れ！  果てしない虚空を喰らえ！§!"
 shroud.3060.desc.composer: "§H再帰的な無限の枠組みを超えろ！§!"
 shroud.3060.desc.cradle: "§H永遠を受け入れろ！  すべては一つであり、 全体である！§!"
 shroud.3060.desc.instrument: "§H無限の可能性を存分に味わえ！§!"
 shroud.3060.a: "従う。"
 shroud.3060.a.reply: "膨れ上がるその声は、 我々の行動を導き、 思考を常識の向こう側へと押しやる。 その循環は続き、 我々を締め付け、 さらなる深みへと引き込む。 だが——我々の精神は、 ついにその循環を打ち砕いた。\n\nシュラウドの高位の存在への祈願に導かれ、 我々は無限の循環を突破したのだ。\n\nだが、 全員が無事というわけではない。 §H[event_target:shroud_warped_leader.GetName]§!は、 もはや持ち場にいない。 あの声が再び聞こえてくる。"
 shroud.3060.a.reply.default: "創り直してやろう。"
 shroud.3060.a.reply.eater: "§H$shroud.3060.a.reply.default$§!"
 shroud.3060.a.reply.composer: "§H$shroud.3060.a.reply.default$§!"
 shroud.3060.a.reply.cradle: "§H$shroud.3060.a.reply.default$§!"
 shroud.3060.a.reply.instrument: "§H$shroud.3060.a.reply.default$§!"
 shroud.3060.b: "抗う。"
 shroud.3060.b.reply: "我々は、 この強力な衝動を拒絶する。\n\n再帰する潮流の力により、 循環は加速し、 我々を深みへと呑み込んでいく。 しかし、 もはや抗うのをやめたとき、 張力は我々を引き裂くことをやめた。 それは代わりに我々を包み込み、 一瞬だけ、 人智を超えた存在を垣間見させた。\n\nあの声が再び聞こえてくる。"
 shroud.3060.b.reply.default: "つまらぬ。"
 shroud.3060.b.reply.eater: "§H$shroud.3060.b.reply.default$§!"
 shroud.3060.b.reply.composer: "§H$shroud.3060.b.reply.default$§!"
 shroud.3060.b.reply.cradle: "§H$shroud.3060.b.reply.default$§!"
 shroud.3060.b.reply.instrument: "§H$shroud.3060.b.reply.default$§!"
 shroud.3060.leader_return.title: "シュラウド変質体"
 shroud.3060.leader_return.desc: "シュラウドが震え、 微かな歪みが我々の[GetMindPhysicalLoc]全体に波紋のように広がっていく——と同時に、 馴染みのある気配が迫ってくる。 それは、 我々の[GetMindPerceptionLoc]の端で蠢き、 聴覚の限界のすぐ外側から囁きかけてくる。\n\n§H[from.GetName]§!が帰ってくる。 名状しがたい霧の中を抜け、 見慣れた姿へと形を変えながら。 遠くにありながらも完全な存在として、 シュラウドの手で創り直された彼らは、 任務への復帰を切望している。"
 shroud.3060.leader_return_tt: "§H[from.GetName]§!が新たな特性「§G$leader_trait_shroud_warped$§!」を獲得した"
 leader_trait_shroud_warped: "シュラウド変質体"
 leader_trait_shroud_warped_desc: "シュラウドに取り込まれ、 再構築されたこのリーダーは、 不可視の存在を見通し、 周囲の潜在的サイオニック超能力を強化するという、 超越的な叡智を授かっている。"
 leader_trait_shroud_warped_invasion_effect: "侵略に勝利するたびに、 敵帝国に関する情報値§G+$@shroud_warped_intel|0$§!"
 shroud.3065.title: "差し出された聖杯"
 shroud.3065.desc.intro: "シュラウドの霞が揺らぎ、 その裂け目から現れたのは、 煌めく液体で満たされた聖杯だった。 その液面は滑らかで、 乱れひとつない。\n\n抗いがたい衝動に捕われた我々は、 思慮もなく手を伸ばした。 [GetDrinkLoc]を始めると、 その液面は我々を待ち受けていたかのように波打った。\n\n宇宙の真理に達したような眩い感覚が全身を駆け巡る。 だが、[GetImbibeLoc]すればするほど、 それが偽りの感覚であったことがわかってくる。 その液体は次第に濃く感じられ、 その一滴ごとに体の中で凝固し、 腐り始める。\n\n我々は突如として、 体内からこの汚染物を吐き出したいという激しい衝動に駆られた。"
 shroud.3065.desc.eater: "§H貪れ！  己が弱さを葬り去れ！§!"
 shroud.3065.desc.composer: "§H育め！  新たな芽生えを感じよ！§!"
 shroud.3065.desc.cradle: "§H鍛えよ！  苦痛を伴う統合を受け入れよ！§!"
 shroud.3065.desc.instrument: "§H飲み尽くせ！  己が欲望に身を委ねよ！§!"
 shroud.3065.desc.outro: "その声は渦を巻き、 液体と混ざりながら凝固してゆく。 そして、 我々の内奥により深く入り込み、 その意志に服従させようとする。"
 shroud.3065.a.organic: "飲む。"
 shroud.3065.a.machine: "処理する。"
 shroud.3065.a.reply.intro: "最後の一滴が、 粘りつくような不快な重さで流れ落ちた。 体内に溜まったそれが、 我々の[GetMindPhysicalLoc]を満たしてゆく。\n\n血は熱を帯びて脈打ち、 思考が歪み、 [GetPsycheLoc]の輪郭がほどけてゆく。\n\nあの声が再び聞こえてくる。 満足そうな声だ。 目の前の聖杯が溶けて落ちてゆく。"
 shroud.3065.a.reply.default: "征服する者よ！  覇を唱えよ。"
 shroud.3065.a.reply.eater: "§H$shroud.3065.a.reply.default$§!"
 shroud.3065.a.reply.composer: "§H造形する者よ！  生ける触媒となれ。§!"
 shroud.3065.a.reply.cradle: "§H統合する者よ！  数多の精神を融合させよ。§!"
 shroud.3065.a.reply.instrument: "§H堕落した者よ！  思いのままに感じよ。§!"
 shroud.3065.b: "消し去る。"
 shroud.3065.b.reply.intro: "激しい痙攣が我々の[GetBodiesLoc]を襲う。 我々は汚染物を拒絶し、 その不快な物質を体外に吐き出したのだ。\n\n忌まわしき液体は虚空に飛び散り、 悶えながら霧散してゆく。 その声はかすれ、 穢れた言葉とともにかき消えた。"
 shroud.3065.b.reply.default: "弱き者よ！"
 shroud.3065.b.reply.eater: "§H$shroud.3065.b.reply.default$§!"
 shroud.3065.b.reply.composer: "§H進歩なき者よ！§!"
 shroud.3065.b.reply.cradle: "§H臆病者よ！§!"
 shroud.3065.b.reply.instrument: "§H惜しいことよ……§!"
 shroud.3070.title: "移ろう世界"
 shroud.3070.desc.intro: "シュラウドは収縮し、 内側に折りたたまれ、 閉じられた静寂の虚無の奥底へと我々の精神を押し込んでいく。\n\n流動的で、輪郭を持たない何かがそこに現れる。 それは形を変えながら、 我々とシュラウドの残りを隔てる裂け目を開閉する。 その裂け目が開くたび、 幻視の奔流が我々を襲うのだ。"
 shroud.3070.desc.eater: "世界は焼け落ち、 その残り火は、 喰らわれた存在の嘆きとともに宙を舞っている。 新たな饗宴の生贄として、 いくつもの光景が現れては消えてゆく。"
 shroud.3070.desc.composer: "緑豊かな平原を無数の動物たちが駆け巡る、 生命に満ちた風景が広がっている。 生命の織りなす糸が絡み合い、 広がっているようだ。 変化と創造の可能性を秘めた濃密な世界として、 いくつもの光景が現れては消えてゆく。"
 shroud.3070.desc.cradle: "共同体に属する人々が手を取り合い、 互いを高め合っている。 だがその統一の代償として、 異を唱える者は排除される。従順な者のみが受け入れられる新たな理想郷として、 いくつもの光景が現れては消えてゆく。"
 shroud.3070.desc.instrument: "巨大な採掘場が広がっている。 そこには、 採掘に適した貴重な資源が豊富に残っている。 略奪を待ちわびる宝の山として、 いくつもの光景が現れては消えてゆく。"
 shroud.3070.desc.outro: "新たな光景が現れるたび、 慣性が反転して我々をねじる。 我々は、 常識を超えた速度で振り回されている。 現実の壁は歪み、波打っている。\n\nあの存在が、 愉しげに見ているのを感じる。 「それ」は試しているのだ。 我々を弄ぶこの力が、 ふさわしき名を得る瞬間を待ちながら。"
 shroud.3070.a.eater: "——飽満を。"
 shroud.3070.a.composer: "——創生を。"
 shroud.3070.a.cradle: "——調和を。"
 shroud.3070.a.instrument: "——可能性を。"
 shroud.3070.a.reply.intro: "我々の声が響き渡ると、 その存在は静まった。 目まぐるしく移ろう幻視、 そして荒れ狂う慣性の嵐は消え、 澄み渡る静寂が訪れた。\n\n我々が、 「それ」に名を与えたのだ。"
 shroud.3070.a.reply.default: "飽満。 征服こそが、 飽くなき飢えを満たす。"
 shroud.3070.a.reply.eater: "§H$shroud.3070.a.reply.default$§!"
 shroud.3070.a.reply.composer: "§H創生。 生命は絡み合い、 構造は確立される。§!"
 shroud.3070.a.reply.cradle: "§H調和。 優しさをもって、 異なりを排除する。§!"
 shroud.3070.a.reply.instrument: "§H可能性。 無為の宇宙から、裂き採られるのを待っている。§!"
 shroud.3070.a.reply.outro: "我々の選択に満足したあの存在は、 障壁を引き裂いた。虚無は霧散し、 我々はそこから解き放たれた。"
 shroud.3070.b.eater: "絶望だ。"
 shroud.3070.b.composer: "過剰だ。"
 shroud.3070.b.cradle: "虚構だ。"
 shroud.3070.b.instrument: "浪費だ。"
 shroud.3070.b.reply.intro: "我々の声はかき消された。 怒れるあの存在が、 我々を強引に障壁の外側にはじき出したのだ。"
 shroud.3070.b.reply.default: "絶望？  飢えに喘ぐ優柔な弱者よ！"
 shroud.3070.b.reply.eater: "§H$shroud.3070.b.reply.default$§!"
 shroud.3070.b.reply.composer: "§H過剰？  凡庸の中で朽ちよ！§!"
 shroud.3070.b.reply.cradle: "§H虚構？  孤独に苛まれて立ち尽くせ！§!"
 shroud.3070.b.reply.instrument: "§H浪費？  怠惰と貧困に執着する愚物め！§!"
 shroud.3070.b.reply.outro: "不穏な気配は残るものの、我々はどうにかシュラウドを抜け出した。"
 shroud.3100.title: "超能力者同士の争い"
 shroud.3100.desc: "破壊音が奏でる不協和音の交響曲が、 我々をシュラウドの奥へと引きずり込む。 破滅の律動の中、 鳴り響く音のひとつひとつが、 我々の精神を打ちのめす。\n\nやがて、轟音がその姿をとった。\n\nどうやら我々は、 超能力者同士の争いの縁に踏み込んでしまったようだ。 戦いの動機は定かでないが、 目の当たりにする力の規模は計り知れない。\n\n精神の砲火は、ひび割れた現実の狭間を捻れながら、我々の知覚を幾度となく苛む。 隠れる場所はない。 嵐はもうそこまで来ている。"
 shroud.3100.a: "§Y耐えつつ成り行きを見守る。§!"
 shroud.3101.title: "§G鳴りやまぬ共鳴§!"
 shroud.3101.desc.intro: "我々はその場から動くこともできず、 闘争の中心が迫る中、 その怒りに触れる危険を冒している。"
 shroud.3101.desc: "$shroud.3101.desc.intro$\n\nだが、 澄明な集中力をもって、 自らを精神の奔流に同調させると、 思考が流れるように研ぎ澄まされていく。 砲撃は止むことなく続いているが、 我々は傷つかず、 破壊のリズムに調和するように動いていた。\n\n一歩ごとに理解が深まる。 この超能力の砲火は、 不可視の層の隙間を縫って滑り込んでいたのだ。\n\n我々の撤退後も、 そのパターンは残されていた。 今回観測した原理は、 洗練を重ねれば、 我々の兵器に応用できるかもしれない。"
 shroud.3102.title: "§R深淵の砲火§!"
 shroud.3102.desc: "$shroud.3101.desc.intro$だが、 我々は精神の嵐に同調しようと試み、 予測不能なリズムに合わせて動きだした。\n\n最初の数歩は有望に思えたものの——破壊のテンポは、 容赦なく我々を飲み込んだ。\n\n嵐が過ぎ去った後も、 砲火の残響は我々の内に鳴り響き続けている。 失敗に伴うサイオニックの余波は、 この現実世界においてさえも帝国全体に反響している。"
 shroud.3102.a.tt: "帝国内の建造物がランダムに2つ破壊される。"
 shroud.3105.title: "精神の道"
 shroud.3105.desc: "前触れもなく、 シュラウドで精神波が噴き上がった。\n\n白熱する光路の迷宮が、 我々の目の前に広がる。 それは知覚の限界を超えた彼方まで伸び、 ひび割れたように一瞬だけ現れては虚無へと消えていく。\n\n新たな精神波が噴き上がりそうだ。 集中すれば、その噴出の予兆を感じ取ることができる。 揺らめく迷宮が再び炸裂し、 無数の可能性へと枝分かれして広がっていく。\n\nそれぞれの道は、 新たな誘惑として我々を誘う。 だがそのすべては、 瞬く間に虚無へと崩れ落ちている。"
 shroud.3105.a: "§Y苦難の道を行く。§!"
 shroud.3106.title: "§G$tech_psionic_lightning$§!"
 shroud.3106.desc.intro: "圧力が高まりを見せ、 期待を抱かせては裏切るような緩急で我々をもてあそぶ。 圧力が最高潮になるタイミングで我々は動き、 意志の力で精神エネルギーの迷宮を突き進む。 思考が推進力となり、 我々を前へと駆り立てる。"
 shroud.3106.desc: "$shroud.3106.desc.intro$サイオニック・エネルギーの奔流をすり抜け、 決意が揺らぐよりも早く進んでいく。\n\n我々は肉体の枷から解き放たれ、 より高次の存在へと昇華する。 迷宮と無数に分岐するその道筋は、 我々の意識の延長となり、 嵐の紋様の奥底に眠る秘められた知識を明らかにする。\n\n始まりが一瞬だったように、 その終わりも一瞬だった。 迷宮の残像が背後で崩れ落ち、 我々は新たな理解を得て現実へと戻る。 このサイオニック原理を丹念に洗練すれば、 兵器への応用も可能かもしれない。"
 shroud.3107.title: "§R虚無の中での喪失§!"
 shroud.3107.desc: "$shroud.3106.desc.intro$ 無数の分岐が目の前に広がり、 不可能な選択肢に圧倒される。\n\nためらった瞬間、 白熱する光路が炸裂した。 サイオニック・エネルギーの奔流がねじれ、 崩壊する結節点の中に我々の思考を閉じ込める。 そして我々は、 シュラウドの混沌へと飲み込まれていく。\n\n現実へ戻った後も、 [GetTelepathPlural]たちは混乱し、 失敗の記憶に苛まれている。 サイオニックの反動が[Root.GetName]全体に波及している。"
 shroud.3110.title: "精神波の槍"
 shroud.3110.desc: "シュラウドの中であるにもかかわらず、 我々の眼前では、 サイオニック・エネルギーが一筋の象徴的な光線として収束し、 測り知れない虚無の果てへと射し込んでいる。 その安定した構造は、 これまで遭遇してきた混沌とした現象とは真逆のものである。\n\nここに留まっていて、 安全なのだろうか？"
 shroud.3110.a: "§Yしばらくここに留まってみよう。§!"
 shroud.3111.title: "§Gサイオニック・ディスラプター§!"
 shroud.3111.desc: "目の眩むような強烈な輝きに耐えながらも、 我々は、 完全に形を定めた精神エネルギーの光線に意識を集中し続けることができた。 そしてついに、その精緻で異世界的な構造の真の姿を目の当たりにした。\n\n我々の思考は新たな可能性に向けて駆け巡る。 この特異なエネルギー構造を現実世界で再現できれば、 無敵の兵器となるだろう。"
 shroud.3112.title: "§R[GetTelepathPluralCap]への過剰な負荷§!"
 shroud.3112.desc: "そこに長く留まることはできなかった。 これほどまでに強烈なサイオニック・エネルギーの収束は、 我々の[GetTelepathPlural]にとってあまりに過酷だった。\n\nこの圧倒的な現象に晒されたことによる精神的ダメージの回復には、 しばらく時間を要するだろう。"
 recovering_telepaths: "$DEFAULT_TELEPATH_PLURAL_CAP$の回復"
 recovering_telepaths_desc: "シュラウドでの過剰な負荷が、 我々の$DEFAULT_TELEPATH_PLURAL$に深刻な影響を及ぼしている。"
 recovering_telepaths_robot: "$MACHINE_TELEPATH_PLURAL_CAP$の回復"
 recovering_telepaths_robot_desc: "シュラウドでの過剰な負荷が、 我々の$MACHINE_TELEPATH_PLURAL$に深刻な影響を及ぼしている。"
 recovering_telepaths_hive: "$HIVE_TELEPATH_PLURAL_CAP$の回復"
 recovering_telepaths_hive_desc: "シュラウドでの過剰な負荷が、 我々の$HIVE_TELEPATH_PLURAL$に深刻な影響を及ぼしている。"
 MACHINE_SENSE: "探知"
 shroud.3120.title: "遠くからの残響"
 shroud.3120.desc: "シュラウドのいたるところで、 巨大な力の共鳴を[GetFeelLoc]できる。 その影響はサイオニック領域に深く浸透している。\n\n自らの行動を通じて彼らと同調することもできるが、 別の方法もある。 ズィロの力を利用すれば、 [GetTelepathPlural]たちはこれらの存在に直接接触を試みることができるのだ。\n\n我々に必要なのは、 どの存在を探すかを決めることだけだ。"
 shroud.3120.a: "$utopia.3005.a$"
 shroud.3120.b: "$utopia.3005.b$"
 shroud.3120.c: "$utopia.3005.c$"
 shroud.3120.d: "§C埋もれた希望を求め泣き叫ぶ者。§!"
 ORGANIC_SPIRITS: "精神"
 MACHINE_SPIRITS: "超能力体"
 shroud.3125.title: "$shroud.3120.title$"
 shroud.3125.desc: "その存在に触れようとするなかで、 うごめきを[GetFeelSenseLoc]できた。 以前にも[GetSpiritsLoc]と遭遇したことはあるが、 これはまったく別のものだ……はるかに強大で、 はるかに古い。\n\nズィロを注入したエネルギーが底を尽き、 [GetTelepathPlural]たちはシュラウドから撤退を余儀なくされた。 後ほど出直す必要がある。"
 shroud.3125.tt: "§Hシュラウド§!に棲む存在との強い§H同調§!を獲得する。"
 shroud.3115.title: "サイオニック爆撃"
 shroud.3115.desc: "強烈な痙攣のうねりがシュラウドを駆け抜け、 我々の精神に震えるような衝撃を走らせる。\n\nその残響が、 我々の[GetTelepathPlural]を圧倒する勢いで襲いかかっている。\n\nこのサイオニック爆撃の原因は何なのか？"
 shroud.3115.a: "§Y原因を突き止めなければ。§!"
 shroud.3116.title: "§G$tech_psionic_bombers$§!"
 shroud.3116.desc: "この継続的な爆撃から精神を防御しながら、 我々はその本質をすぐに理解した。\n\nこの爆発的な痙攣は、 我々の次元から反射された、 凝縮したサイオニック・エネルギーの流れによって引き起こされていたのだ。 この不安定なサイオニック意志の粒子は、 無防備な精神に深刻なダメージを与えるおそれがある。\n\nそして、ひとつの洞察が我々を捉えた。この強力な組成は、 シュラウドに由来する新たな兵器開発の礎となるだろう。"
 shroud.3117.title: "§Rサイオニック・ショック§!"
 shroud.3117.desc: "我々の精神的な余力は尽きかけている。\n\nサイオニックの爆発はあまりに苛烈で、 多くの[GetTelepathPlural]にサイオニック・ショックの症状を引き起こした。\n\n回復には時間を要するだろう。"
 psionic_shock_modifier: "サイオニック・ショック"
 psionic_shock_modifier_desc: "シュラウドにおいて圧倒的な力に晒されたことで、 我々の$DEFAULT_TELEPATH_PLURAL$にサイオニック・ショックが発生した。"
 psionic_shock_hive_modifier: "$psionic_shock_modifier$"
 psionic_shock_hive_modifier_desc: "シュラウドにおいて圧倒的な力に晒されたことで、 我々の$HIVE_TELEPATH_PLURAL$にサイオニック・ショックが発生した。"
 psionic_shock_robot_modifier: "$psionic_shock_modifier$"
 psionic_shock_robot_modifier_desc: "シュラウドにおいて圧倒的な力に晒されたことで、 我々の$MACHINE_TELEPATH_PLURAL$にサイオニック・ショックが発生した。"
 shroud.3200.title: "生命の付与"
 shroud.3200.desc: "我々の意識は、 シュラウドの深淵を再び漂ううちに馴染みのある$the_animator_of_clay_color_article$の存在に遭遇した。\n\n意識の周辺で機械仕掛けのリズムがわき起こり、 声なき声が合唱となって響きわたる。 艦隊に棲む亡霊たちが目覚めはじめたのだ。 彼らは我々の肉体をさらに遠くへと運び、 心を解放して、 より高い次元の問題に集中できるようにしてくれる。\n\n彼らは生きてはいないが、 我々は彼らを知っている。 その形は意図によって作られ、 その存在は歴史と目的によって満たされている。 すべてが融合し、 彼らは期待に満ちた手を差し伸べる。\n\n我々はもはやこの船の単なる操縦者ではない。 我々は協力しあい、 ひとつの決意となり、 集合的な意志の力で進んでいく。"
 shroud.3200.a: "我々は風に舞う枯葉に過ぎない。"
 shroud.3200.a.tt: "§Y$unlock_edict_tt$§!$edict_animatus$"
 shroud.3210.title: "自重の意志"
 shroud.3210.desc.intro: "$the_outsider_color_article$の悲嘆の本質が我々の心へと染み込んでくる。\n\n悲しみのこだまが響き渡るなか、 絡み合ったサイオニック・エネルギーの渦が集まり、 変化しつづける奇妙な形態を成していく。 見れば見るほど、 その正体はつかみどころがなくなる。 声が語りかけてくる。\n\n§H理解できないものもある。 そうしたものは痛みと後悔から学ぶのだ。\n\n私は同胞の中でここにたどりついた最初の者だ。 しかし、 我々全員がその代償を払った。 我々はシュラウドに破壊された。 我々と同じ運命をたどってはならない！§!\n\n"
 shroud.3210.desc.know_zroni: "$shroud.3210.desc.intro$ これはズィロニの声だ。 なぜここにやってきたのかは不明だが、 シュラウドの破壊の力に対するその警告に、 我々は耳を傾けるべきだろう。"
 shroud.3210.desc.left_zroni: "$shroud.3210.desc.intro$ 我々はこの存在を知っている。 過去にも、 このズィロニに遭遇したことがある。 ファーシーアという名だ。 なぜここにやってきたのかは不明だが、 シュラウドの破壊の力に対するその警告に、 我々は耳を傾けるべきだろう。"
 shroud.3210.desc.default: "$shroud.3210.desc.intro$ この存在が何者なのかは謎のままだ。 この不吉な警告の意味を我々はほとんど理解できない。"
 shroud.3210.a: "慎重に継続しなければ。"
 shroud.3210.a.tt: "§Y$unlock_edict_tt$§!$edict_will_of_temperance$"
 shroud.3220.title: "思考ゲーム"
 shroud.3220.desc: "シュラウドが$the_golden_dream_color_article$の静かなリズムで脈打ち、 我々を包み込む。\n\n見守るうちに、 浮遊するサイオニック・エネルギーの断片がゆっくりと整列し、 複雑な格子模様を作りはじめる。 認識不可能な符号が、 精密に組まれた模様になって浮かび上がる。\n\nそれらは互いに混ざり合ったかと思うと、 さらに複雑な形を次々と作り出していく。 やがて我々は、 その動きを支配するパターンや法則を感じ取れるようになってきた。\n\n我々は$the_golden_dream_article$とゲームをしているのだ。 我々を導くその一手一手が、 我々に新たな安らぎと陶酔感をもたらしてくれる。"
 shroud.3220.a: "ゲームをしながら、 我々は意味のあるどこかへと逃避する。"
 shroud.3220.a.tt: "§Y$unlock_edict_tt$§!$edict_will_of_distraction$"
 shroud.3230.title: "時の砂"
 shroud.3230.desc: "思考の粒子が我々の上を通り過ぎていく。 $the_endless_tide_color_article$の粗野な存在を感じる。\n\nそれは満ち引きを繰り返し、 そこにあるものすべてを浸食しては再び堆積していく。 そこから逃れることは永遠にできない。\n\nその波が通り過ぎると、 我々は真の再生を感じることができる。"
 shroud.3230.a: "ここには時間がない。"
 shroud.3230.a.tt: "§Y$unlock_edict_tt$§!$edict_will_of_endless$"
 shroud.3240.title: "刷新"
 shroud.3240.desc: "眩暈がするような頂点が我々の思考の前にそびえている。 それは$the_pale_mountain_color_article$そのものだ。 その光景にすべての感覚が圧倒され、 意識が張りつめる。\n\n前方に、 虚空を漂う損傷した艦船の輪郭がぼんやりと見える。\n\n意識のどこかで斜め方向の圧力が変化し、 艦船が変容しはじめる。 亀裂が塞がれ、 腐食が消え、 金属がまっすぐに伸ばされる。 損傷の痕跡がゆっくりと消えていく。\n\n艦船が完全に修復されると、 そこで幻影が突如として途絶える。 我々の中に、 深い再生の感覚だけが残っている。"
 shroud.3240.a: "我々の意識の壮大な再誕だ。"
 shroud.3240.a.tt: "§Y$unlock_edict_tt$§!$edict_will_of_rebirth$"
 shroud.3250.title: "自制の力"
 shroud.3250.desc: "$the_hollow_point_color_article$の静けさが我々の心を沈黙で満たす。 幻影が我々の感覚の中に緩慢に広がっていく。\n\n我々は何億年もの争いが一瞬にして崩れ去るのを見ている。 文明が崩壊し、 歴史が消え去り、 死して久しい暴君の像が時の中に埋もれていく。\n\n$the_hollow_point_article$の知恵は自制の静かな力の中にある。 争いは起こり、 消えていくが、 我々は依然としてここにいる。 この分離がリーダーたちに新たな長寿をもたらし、 死すべき者の怨恨が作り出す腐食性の毒から解放してくれる。"
 shroud.3250.a: "我々はそれでもなお生きている。"
 shroud.3250.a.tt: "すべてのサイオニックリーダーが§Y$leader_trait_shroud_age$§!特性を獲得し、 リーダーの寿命が§G+40§!年延びる。"
 shroud.3260.title: "混沌から秩序へ"
 shroud.3260.desc: "シュラウドの煮えたぎる激流が我々の前で脈打っている。 強固な意志を持つ存在が我々に迫ってくる——$the_vacant_throne_color_article$だ。\n\n生々しいサイオニック・エネルギーが絡まり合い、 巨大な渦となって我々に近付く。 そして突如として鎮まっていく。 混沌がしだいに澄みわたり、 理解できるようになっていく。 色彩が新たな鮮明さをもって咲き誇る。 そこには対称性、 論理、 そして構造がある。\n\n我々の心の奥底に何かが形作られる——秩序への果てしない渇望が。"
 shroud.3260.a: "混沌を避け、 秩序を受け入れよ。"
 shroud.3260.a.tt: "§Y$unlock_edict_tt$§!$edict_will_of_order$"
 shroud.3270.title: "無限の加速"
 shroud.3270.desc: "信じがたいほどの精神の加速が我々の感覚を圧倒する。 我々は$the_black_river_color_article$の存在を認識する。\n\n途方もない速度で、 我々は理解の及ばぬ終焉へと突き進んでいる。 それはあらゆるものと無との境界であり、 常に存在するものと決して存在しないものとの区切りであり、 いかなる自然の法則も及ばない限界だ。\n\nやがて我に返ると、 我々の中に真の移動とは何かという新たな認識があった。"
 shroud.3270.a: "我々が見たのは宇宙の果てだったのか？"
 shroud.3270.a.tt: "§Y$unlock_edict_tt$§!$edict_will_of_motion$"
 #==========================
 # Forge our own Path
 #==========================
 shroud.3500.title: "拓かれた道"
 shroud.3500.desc: "我々の超能力者の[GetResearchers]たちは、 §Hシュラウド§!から力を引き出す巧妙な技術を開発した。\n\nサイオニック領域の偉大な力はパトロンたちによって秘匿され、 契約という代償を払った者のみに授けられる。 だが我々はそれを選ばず、 自らの道を切り拓いた。\n\n意志をシュラウドへと投影することで、 同調する各領域から微量ずつ力を吸い上げることができる。 この行為には強い集中力が必要だが、 今の我々の精神は、 この繊細な均衡を保つだけの強さを備えている。"
 shroud.3500.a: "シュラウドの中であっても、我々の意志は我々のものだ。"
 shroud.3510.title: "$utopia.2681.name$"
 shroud.3510.desc: "§Hシュラウド§!のひだの奥で、 我々の[GetTelepathPlural]が手つかずの力の枢を発見した。\n\n収束する力はサイオニック領域において徐々に蓄積し、 やがて強大な存在へと成熟する可能性がある。 そのような高濃度エネルギー体を、 我々はいままさに発見したのだ。 しかも、 入手可能な状態で、 それはそこにある。\n\n純粋なサイオニックの意志の力により、 我々のうちのひとりが、 この驚異的な力を吸収することができる。 すでに複数の候補者が選定されている。"
 shroud.3510.a: "§H[leader_1.GetTitle]§![leader_1.GetName]"
 shroud.3510.b: "§H[leader_2.GetTitle]§![leader_2.GetName]"
 shroud.3510.c: "§H[leader_3.GetTitle]§![leader_3.GetName]"
 shroud.3510.d: "§H[leader_4.GetTitle]§![leader_4.GetName]"
 psionic_mastery: "超能力の極意"
 psionic_mastery_desc: "我々は、 超能力の極意を会得した。 いまや我々の精神は、 自由自在にシュラウドの中を飛翔する。"
 shroud.3520.title: "$psionic_mastery$"
 shroud.3520.desc: "意志を§Hシュラウド§!へと投影することで、 我々は超能力の一端を極めるに至った。 数多の存在が支配する領域から力を集めつつも、 その影響を受けることはなかったのだ。 さらに、我々の[GetTelepathPlural]は、 サイオニック・トランスを自在に制御できる領域にまで達している。\n\nシュラウドに運命を委ねる者たちの中で、我々は真の意志の独立を貫いた。\n\n§H[this.GetName]§!の超能力の潜在能力は、ここに完全に開花した。"
 shroud.3520.a: "だが、 これは始まりに過ぎない。"
 #==========================
 # Patrons First Contact
 #==========================
 shroud.first_contact.title: "$utopia.3300.name$"
 shroud.first_contact.prompt: "$utopia.2657.a$"
 shroud.first_contact.1.desc.default: "シュラウド。 それは我々の知覚している現実世界のすぐ下で、 闇が落とした影のように漂っている。 超能力を持つ者なら、 誰もが夢の中でその場所を見たことがあるはずだ。 もっとも、そのときは気づかなかっただろうが。\n\n我々は長年にわたり、 この帳を突破しようと試みてきた。 結合した精神力の圧により、 その膜は徐々に薄れていった。 だが、帳の向こう側で、 我々の試みは見過ごされてはいなかった。 何かが、 我々を見つめている。\n\nシュラウドの深奥には、 驚異的な力を帯びた存在——[GetPatronInsert]がいる。 「それ」は、 我々の存在など意に介することもなく、 窓を流れる結露の一滴を眺めるかのように、 我々を漫然と見ているのだ。\n\nあの不可思議な思考に、 もし触れられたなら——"
 shroud.first_contact.1.desc.hive: "シュラウド。それは我々の知覚している現実世界のすぐ下で、 休眠中のドローンが見ている夢のように漂っている。 奇妙ではあるが、 その景色には説明のつかない懐かしさを覚える……\n\n我々は長年にわたり、 この帳を突破しようと試みてきた。 結合した精神力の圧により、 その膜は徐々に薄れていった。 だが、帳の向こう側で、 我々の試みは見過ごされてはいなかった。 何かが、 我々を見つめている。\n\nシュラウドの深奥には、 驚異的な力を帯びた存在——[GetPatronInsert]がいる。 「それ」は、 我々の存在など意に介することもなく、 飛び行くドローンの群れの1機を眺めるかのように、 我々を漫然と見ているのだ。\n\nあの不可思議な思考に、 もし触れられたなら——"
 shroud.first_contact.1.desc.robot: "シュラウド。それは我々がこれまで検知したあらゆる時空間パラメータの外側に存在している。 類似性を持つデータを挙げるとすれば、 それは休止サイクルを乱す異常データくらいのものである。\n\n我々は長年にわたり、 この障壁をハッキングしようと試みてきた。 結合したプロセッサが放つプレッシャーにより、 その障壁は徐々に薄れていった。 だが、 障壁の向こう側で、 我々の試みは検知されていた。 何かが、 我々を監視している。\n\nシュラウドの深奥には、 驚異的な力を帯びた存在——[GetPatronInsert]がいる。 「それ」は、 我々の存在など意に介することもなく、 データストリーム上の1ビットを眺めるかのように、 我々を淡々と認識しているのだ。\n\nあの不可思議な演算に、 もしアクセスできたなら——"
 shroud.first_contact.2.desc.all: "シュラウドの中に、 我々は偉大な存在を感じている。 だが、 「それ」は計算を拒む。 果てしなく広がる宇宙とは異なり、 その動きは追跡不能であり、 目的地は起点へと折り返していく。 エネルギーそのものが、 自らの内側にエネルギーを産み落としているかのようだ。\n\nその本質が何であれ、 思念と意志の特異点として、 彼らは我々を呼び寄せている。"
 shroud.first_contact.2.desc.default: "無数の声が渦巻く中、 ひときわ明瞭に聞こえる声——それは我々の精神を取り巻く[GetPatronInsert]の声だ。\n\n弛まずに努力を重ねてゆけば、 あるいは、 こちらからその存在に触れられるかもしれない。"
 shroud.first_contact.2.desc.robot: "無数の声が渦巻く中、 ひときわ明瞭に検出される声——それは我々の演算に干渉する[GetPatronInsert]の声だ。\n\n延々と処理を重ねてゆけば、 あるいは、 こちらからその存在にアクセスできるかもしれない。"
 shroud.first_contact.3.desc.default: "我々は「狭間」を通過する。 そこは、 シュラウドと通常の物質世界とを隔てる虚無だ。\n\nその空間に入り込んだ瞬間、 我々は「それ」の存在を感じる。 [GetPatronInsert]の気配が、 精神の奥底にまで浸透してくるのだ。 想像を絶する力を持つ「それ」は、 我々の未来に待ち構えている。\n\n目を背けてはならない。"
 shroud.first_contact.3.desc.robot: "我々は「狭間」を通過する。 そこは、 シュラウドと通常の諸現象とを隔てる虚無だ。\n\nその空間に入り込んだ瞬間、 我々は「それ」の存在を検知する。 [GetPatronInsert]という要素が、 演算の端々にまで干渉してくるのだ。 驚異的な力を持つ「それ」は、 我々の未来に待ち構えている。\n\nしかるべき対応の必要性が認められる。"
 shroud.first_contact.4.desc.default: "シュラウドが、 その力を脈動させている。 そのエネルギーはあらゆる場所で感じるが、 実体としてはどこにも存在しない。 「入る」とは、 曖昧な感覚の中に規則性を見出し、 集中によって偉大な存在を知覚する行為なのだ。\n\nそのような力のひとつ——[GetPatronInsert]の気配が、 頭上に広がる無窮の深淵から感じられた。\n\nあそこに到達するまで、 我々の精神は耐えられるだろうか？"
 shroud.first_contact.4.desc.robot: "シュラウドが、 その力を脈動させている。 そのエネルギーはあらゆる場所で検知されるが、 実体としてはどこにも存在しない。 「入る」とは、 曖昧な検出データの中に規則性を見出し、 集中的な処理によって強大な存在を解明する行為なのだ。\n\nそのような力のひとつ——[GetPatronInsert]の存在が、 頭上に広がる無窮の深淵から感知された。\n\nあそこに到達するまで、 我々の回路は耐えられるだろうか？"
 shroud.first_contact.end.b: "検討すべき点は多い。"
 shroud.first_contact_insert.eater.default: "§H飢餓に狂える唸り声§!"
 shroud.first_contact_insert.eater.machine: "§H不満に満ちた唸り声§!"
 shroud.4005.title: "$the_eater_of_worlds_article_cap$の前で"
 shroud.4005.desc.default: "§Hシュラウド§!のさらに深奥へと探査を進めた我々は、 §H[Root.Patron:the_eater_of_worlds.GetPreCommunicationName]§!のすぐ側まで接近した。 底なしの飢餓を轟かせている「それ」は、 永遠に喰らい続けながらも、 決して満たされることがない存在である。 我々の探査信号は、 劫火と破滅を吐き散らして迎えられた。 その存在は、 我々の理解について無関心を装っているが、 その態度がさらなる息苦しさを我々にもたらす。\n\nやがて、 「それ」はしびれを切らした。 怒涛の咆哮が我々の[GetTelepathPlural]の精神を飲み込んだ。 山のように積み重なる瓦礫と[GetEaterEmergesExtra]\n\n始まりが突然だったように、 その音もまた突如として消えた。 残されたのは、 耐えがたい飢餓感だった。\n\nいまや我々には、 その存在の意志がより明瞭に伝わっている。 [GetEaterEmergesEnding]"
 shroud.4005.desc.hive: "$shroud.4005.desc.default$"
 shroud.4005.desc.gestalt_machine: "§Hシュラウド§!のさらに深奥へと探査を進めた我々は、 §H[Root.Patron:the_eater_of_worlds.GetPreCommunicationName]§!のすぐ側まで接近した。 底なしの飢餓を轟かせている「それ」は、 永遠に喰らい続けながらも、 決して満たされることがない存在である。 我々の探査信号は、 劫火と破滅を吐き散らして迎えられた。 その存在は、 我々の理解について無関心を装っているが、 その態度が我々に大きな負荷を強いる。\n\nやがて、 「それ」はしびれを切らした。 怒涛の咆哮が我々の[GetTelepathPlural]の精神を飲み込んだ。 山のように積み重なる瓦礫と[GetEaterEmergesExtra]\n\n始まりが突然だったように、 その音もまた突如として消えた。 そして我々は初めて、 これまで有機種族にのみ確認されていた「飢餓」を感じた。\n\nいまや我々には、 その存在の意志がより明瞭に伝わっている。 [GetEaterEmergesEnding]"
 shroud.4005.desc.individual_machine: "$shroud.4005.desc.gestalt_machine$"
 shroud.4005.desc_extra_pacifist: "残骸の中で、 「それ」は無分別な侵略の幻影を見せつけてきた。"
 shroud.4005.desc_extra_robot: "残骸の中で、 「それ」は究極の戦争モデルを提示してきた。"
 shroud.4005.desc_extra_organic: "死体の中で、 「それ」は凄まじくも荘厳な戦争の運命を見せつけてきた。"
 shroud.4005.desc_outro_pacifist: "それは暴力と不和の意図だ。 我々が最も重んじる原則の大部分に反している。 この存在——$the_eater_of_worlds_color_article$との調和をこれ以上深めることは望ましくない。"
 shroud.4005.desc_outro_robot: "我々はこの存在が抱く暴力と栄光のビジョンを知っている。 [GetTelepathPlural]たちの再充電が終わり次第、 この存在——$the_eater_of_worlds_color_article$との交信を試みよう。"
 shroud.4005.desc_outro_organic: "我々はこの存在が抱く暴力と栄光のビジョンを知っている。 [GetTelepathPlural]たちが回復し次第、 この存在——$the_eater_of_worlds_color_article$との交信を試みよう。"
