 # End of the Cycle
 situation_end_of_the_cycle: "$name_eotc$"
 situation_end_of_the_cycle_desc: "我々は$end_of_the_cycle_color_article$と契約を結び、 強大な力を得た。 [Owner.GetTelepathPlural]は、 取引の代償を集団的なサイオニックトランスによって先送りできると推測しているが、 その効果は一時的なものだろう。\n\n我々のパトロンの意志は、 強力な$PSIONIC_AURA$として現れている。 「終焉」を実現したいのであれば、 このオーラの拡散を最終目標とすべきだ。 我々の数が増え、 精神の力が高まるほどに、 オーラの力も強まり、 拡散範囲が広がっていく。\n\n征服すべき残りの星系：§Y[Owner.GetEndCycleGalaxySystemsLeft]§!"
 situation_end_of_the_cycle_effects_1: "この段階が終われば、 我々は§H$ACCORD_CREATION$§!の力を得るだろう。\n$eotc_opinion_modifier_tooltip$"
 situation_end_of_the_cycle_effects_2: "この段階が終われば、 我々は§H$ACCORD_DISTORTION$§!の力を得るだろう。\n$eotc_opinion_modifier_tooltip$\n$eotc_opinion_modifier_2_tooltip$"
 situation_end_of_the_cycle_effects_3: "この段階が終われば、 我々は§H$ACCORD_INTENSIFICATION$§!の力を得るだろう。\n$eotc_opinion_modifier_tooltip$\n$eotc_opinion_modifier_3_tooltip$"
 situation_end_of_the_cycle_effects_4: "この段階が終われば、 得た力の代償が明らかになるだろう。"
