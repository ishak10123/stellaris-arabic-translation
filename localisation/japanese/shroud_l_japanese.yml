 # Entropy Drinkers
 civic_tooltip_not_entropy_drinkers: "['concept_entropy_drinkers_civics']の国是を保持していない"
 civic_entropy_drinkers: "エントロピー・ドリンカーズ"
 civic_entropy_drinkers_desc: "$civic_ap_blockade_tt$\n\nこの社会では精神寄生型のつながりを通じて、 無益な人口から貴重な熱量を吸引している。 必要なエネルギーが集まりきったら、 より重要な地位を占めている階級に再分配される仕組みだ。"
 civic_entropy_drinkers_effects: "- 以下の§H$EDICTS$§!を有効化：$TABBED_NEW_LINE$- ['edict:energy_drain',$edict_energy_drain$]$TABBED_NEW_LINE$- ['edict:sanguine_council',$edict_sanguine_council$]$TABBED_NEW_LINE$- ['edict:psychic_feast',$edict_psychic_feast$]\n- 建設可能：£building£ ['building:building_lifecrypt_1']。\n- リーダーが['concept_leader_trait_psionic']特性を備えた状態で開始。"
 civic_entropy_drinkers_psionic_modifier: "- $pop_group_unit$ £pop£ サイオニックPOPあたりの $energy_with_icon$：§G+0.5§!"
 civic_entropy_drinkers_machine: "エネルギー抽出機"
 civic_entropy_drinkers_machine_desc: "$civic_ap_blockade_tt$\n\nエネルギーの適切な割り当ては、 より大きな機械が究極の効率で稼働するにあたり不可欠となる。 すべてのユニットがこの目的を掲げるように設計されており、 必要に応じて定期的にクリティカルノードをオーバークロックすることを認めている。"
 civic_entropy_drinkers_machine_effects: "- 以下の§H$EDICTS$§!を有効化：$TABBED_NEW_LINE$- ['edict:energy_drain',$edict_energy_drain$]$TABBED_NEW_LINE$- ['edict:sanguine_council_machine',$edict_sanguine_council_machine$]$TABBED_NEW_LINE$- ['edict:psychic_feast',$edict_psychic_feast$]\n- 建設可能：£building£ ['building:building_lifecrypt_machine_1']。\n- リーダーが['concept_leader_trait_psionic']特性を備えた状態で開始。"
 civic_entropy_drinkers_hive_mind: "寄生カースト"
 civic_entropy_drinkers_hive_mind_desc: "$civic_ap_blockade_tt$\n\nこの共同体では精神寄生型のつながりを通じて、 下級ドローンから吸い上げた貴重な代謝エネルギーの用途を再定義している。 こうして集められたエネルギーは、 しかるべき上位カーストへと再分配される。"
 civic_entropy_drinkers_hive_mind_effects: "- 以下の§H$EDICTS$§!を有効化：$TABBED_NEW_LINE$- ['edict:energy_drain',$edict_energy_drain$]$TABBED_NEW_LINE$- ['edict:sanguine_council',$edict_sanguine_council$]$TABBED_NEW_LINE$- ['edict:psychic_feast',$edict_psychic_feast$]\n- 建設可能：£building£['building:building_lifecrypt_hive_mind_1']。\n- リーダーが['concept_leader_trait_psionic']特性を備えた状態で開始。"
 civic_entropy_drinkers_corporate: "ヴァンパイア企業"
 civic_entropy_drinkers_corporate_desc: "$civic_ap_blockade_tt$\n\nこの$gov_megacorporation$では精神寄生型のつながりを通じて、 無益な人口から貴重な代謝エネルギーを吸い上げている。 こうして集められたエネルギーは、 経営陣に再分配される。"
 civic_entropy_drinkers_corporate_effects: "- 以下の§H$EDICTS$§!を有効化：$TABBED_NEW_LINE$- ['edict:energy_drain',$edict_energy_drain$]$TABBED_NEW_LINE$- ['edict:sanguine_council',$edict_sanguine_council$]$TABBED_NEW_LINE$- ['edict:psychic_feast',$edict_psychic_feast$]\n- 建設可能：£building£['building:building_lifecrypt_corporate_1']。\n- リーダーが['concept_leader_trait_psionic']の特性を備えた状態で開始。\n- £building£ §Y$building_executive_retreat$§!$megacorp_civic_branch_office_building_effect$"
 has_not_begun_non_psionic_ascension: "非§Y超能力アセンション§!パスがない"
 has_not_begun_non_psionic_ascension_success: "$TRIGGER_PASS$$has_not_begun_non_psionic_ascension$"
 has_not_begun_non_psionic_ascension_fail: "$TRIGGER_FAIL$$has_not_begun_non_psionic_ascension$"
 # Superstitious Beliefs
 civic_tooltip_not_superstitious_beliefs: "['concept_superstitious_beliefs_civics']の国是を保持していない"
 civic_superstitious_beliefs_desc_common: "運命を形作る見えない力と調和するため、 重大な決断を下すときは、 必ず相応の儀式を執り行わねばならない。"
 civic_superstitious_beliefs_common_effects: "['edict:galactic_dowsing',$edict_galactic_dowsing$]を有効化\n13年ごとに['concept_sb_cycle']が変化する。\n幸運のイベントが定期的に帝国に恩恵または不利益をもたらす。"
 civic_superstitious_beliefs: "迷信的信仰"
 civic_superstitious_beliefs_desc: "この社会では、 儀式主義的な未来予測方法を発見したとして、 難解なパターン認識や周期的に発生するアノマリーの分析などが取り入れられている。 $civic_superstitious_beliefs_desc_common$"
 civic_superstitious_beliefs_effects: "以下の置き換えが発生：\n$t$- £job_priest£ $job_priest_plural$ →£job_superstitious_beliefs_priest£ $job_superstitious_beliefs_priest_plural$\n$t$- £job_high_priest£ $job_high_priest_plural$ →£job_superstitious_beliefs_high_priest£ $job_superstitious_beliefs_high_priest_plural$\n$civic_superstitious_beliefs_common_effects$"
 civic_machine_superstitious_beliefs: "パターン・ファインダー"
 civic_machine_superstitious_beliefs_desc: "この機械帝国は、 難解なパターン認識や周期的に発生するアノマリーの分析などを通じて、 未知を解明できると主張している。 最高の予測結果を得られるよう、 重大な決断を下す際には必ず天体配列の分析が行われる。"
 civic_machine_superstitious_beliefs_effects: "$civic_superstitious_beliefs_common_effects$"
 civic_hive_superstitious_beliefs: "ゾディアック・ネクサス"
 civic_hive_superstitious_beliefs_desc: "この集合体は、 儀式主義的な未来予測方法を発見したとして、 難解なパターン認識や周期的に発生するアノマリーの分析などを取り入れている。 $civic_superstitious_beliefs_desc_common$"
 civic_hive_superstitious_beliefs_effects: "$civic_superstitious_beliefs_common_effects$"
 civic_corporate_superstitious_beliefs: "占星企業"
 civic_corporate_superstitious_beliefs_desc: "この企業では、 儀式主義的な未来予測方法を発見したとして、 難解なパターン認識や周期的に発生するアノマリーの分析などが取り入れられている。 最大限の成果を得るため、 理想の天体配列にいたるまでのKPIに合わせて将来的な損益を計算している。"
 civic_corporate_superstitious_beliefs_effects: "以下の置き換えが発生：\n$t$- £job_priest£ $job_priest_plural$ →£job_superstitious_beliefs_priest_corporate£ $job_superstitious_beliefs_priest_corporate_plural$\n$t$- £job_high_priest£ $job_high_priest_plural$ →£job_superstitious_beliefs_high_priest_corporate£ $job_superstitious_beliefs_high_priest_corporate_plural$\n$civic_superstitious_beliefs_common_effects$"
 # Twisted Experimenters
 civic_twisted_experimenters: "実験刑"
 civic_twisted_experimenters_desc: "司法による裁きと知識への渇望が、 共通の答えにたどり着いた社会。 ここでは犯罪が跋扈する裏社会から集めた実験体に対して、 極秘で研究者たちが凄惨な実験を施している。 稀に命を落とす者も出るが、 進歩の代償とみなされている。"
 civic_twisted_experimenters_effects: "['concept_experimental_testing']の状況で始まり、 完了時にテクノロジーに関する見識を得る。\n以下が建設可能で、 初期状態で配置済み：£building£ ['building:building_experimentation_chambers_1']。\n機械ではない奴隷全員が、 ['concept_slave_orderly']の奴隷労働に就ける。\n['concept_slave_army']にアクセス可能：§Y$abomination_army$§!"
 civic_twisted_experimenters_hive_mind: "是正意識"
 civic_twisted_experimenters_hive_mind_desc: "この集合体から逸脱したドローンは、 先駆的な科学研究の被験体にされる。 その際に用いられる手段に制限は設けられていない。 こうすることで問題行動を取ったドローンでも、 使い捨て可能な資源としての価値を保持させることが可能。"
 civic_twisted_experimenters_hive_mind_effects: "['concept_experimental_testing_hive_mind']の状況で始まり、 完了時にテクノロジーに関する見識を得る。\n以下が建設可能で、 初期状態で配置済み：£building£ ['building:building_experimentation_chambers_1']。"
 civic_twisted_experimenters_corporate: "司法的研究開発"
 civic_twisted_experimenters_corporate_desc: "司法の非効率性を軽減しながら科学的革新を最大化するため、 興味深い取り組みに乗り出した$gov_megacorporation$。 問題行動を見せた市民は、 実験的研究プロジェクトに転任させられ、 技術的躍進を達成するための厳しいテストを受けさせられるようになる。 死亡率指標は想定範囲内の数値に維持される。"
 civic_twisted_experimenters_corporate_effects: "['concept_experimental_testing_corporate']の状況で始まり、 完了時にテクノロジーに関する見識を得る。\n以下が建設可能で、 初期状態で配置済み：£building£ ['building:building_experimentation_chambers_1']。\n£building£ ['concept_building_carceral_test_facility']の$BRANCH_OFFICE_BUILDING$を建設可能。\n機械ではない奴隷全員が、 ['concept_slave_orderly']の奴隷労働に就ける。\n['concept_slave_army']にアクセス可能：§Y$abomination_army$§!"
 experimenters_we_will_learn_1: "ここからきっと多くのものを学べることだろう。"
 experimenters_we_will_learn_2: "実験の新たな道が開けた。"
 experimenters_we_will_learn_3: "新しいテストパラメータか。 気分が昂揚する。"
 experimenters_tragic_lesson_1: "我々はきっと、 この悲劇から多くのことを学べるだろう。"
 experimenters_tragic_lesson_2: "悲劇的だが、 新たな実験の機会と捉えることにしよう……"
 experimenters_tragic_lesson_3: "悲劇を伴う学びだが、 獲得したデータは有益なものとなるだろう。"
 experimenters_ermerging_crime_1: "現在のような環境のおかげで、 [GetExperimentalEngineerPlural]たちに新たな実験の機会を充分に与えてやれそうだ。"
 experimenters_ermerging_crime_2: "少なくともこうした犯罪行為によって、 刺激的な新分野の科学研究に踏み出す機会は十分に得られそうだ。"
 experimenters_ermerging_crime_3: "緊急事態ではあるが、 この先新たな実験の機会を数多く提供してくれるだろう。"
 experimenters_ermerging_crime_4: "こうした環境のおかげで、 [GetExperimentalEngineerPlural]たちも被験体には事欠かない状況だ。"
 # Secret Societies
 civic_tooltip_not_secret_societies: "['concept_secret_societies_civics']の国是を保持していない"
 civic_secret_societies: "秘密結社"
 civic_secret_societies_desc: "世界の裏側では、 エリートや正体不明の人物からなる秘密結社が複雑な陰謀を企て、 内政と異星の事情を操作して影から政治を操っている。"
 civic_secret_societies_effects: "他の帝国と接触後、 秘密結社的な['concept_ss_factions']が登場する。\n['concept_proxy_wars']を行う能力を備えた状態で開始する。\n$job_bureaucrat_plural_with_icon$は有効かつ成功した§Y代理戦争§!1件ごとに$i_unity$を産出する。\n近隣にある2つの帝国と['concept_first_contact']を取るところから開始する。\n§Y$first_contact$§!後に帝国に対して獲得する$INFILTRATION_LEVEL$：§G+$@secret_society_infiltration_gain|0$§!"
 civic_secret_societies_corporate: "影響力ある企業連合"
 civic_secret_societies_corporate_desc: "$gov_megacorporation$の最上層部は、 「知るべき者だけが知る」原則を徹底しながら惑星外業務を実施している。 情報共有も最低限に留められており、 知らない情報は知る必要のない情報と言い換えることができる。"
 civic_secret_societies_corporate_effects: "他の帝国と接触後、 秘密結社的な['concept_ss_factions']が登場する。\n['concept_proxy_wars']を行う能力を備えた状態で開始する。\n$job_bureaucrat_plural_with_icon$は有効かつ成功した§Y代理戦争§!1件ごとに$i_unity$を産出する。\n近隣にある2つの帝国と['concept_first_contact']を取るところから開始する。\n§Y$first_contact$§!後に帝国に対して獲得する$INFILTRATION_LEVEL$：§G+$@secret_society_infiltration_gain|0$§!\n£building£ §Y$building_corporate_embassy$§!$megacorp_civic_branch_office_building_effect$"
 shroud.5012.title: "秘密結社の出現"
 shroud.5012.desc: "我々の疑念は正しかった。 [first_neighbor.GetAdjective]文明と[second_neighbor.GetAdjective]文明は、 正式な交流が始まるまえに、 非公式なルートで接触を受けていたことを認めた。\n\nこれらの§H派閥§!は我々自身の影から姿を表わし、 自分たちの存在を認めた。§H$pft_the_curtain$§!、 §H$pft_the_masquerade$§!、 §H$pft_the_grand_dance$§!として知られるこれらの元秘密組織は、 今や我々との正式な対話を堂々と求めている。\n\n彼らが何を求め、 またどのように情報を入手したのかを真に理解することは、 我々には決してできないのかもしれない。 彼らの要求に従って行動するほうが、 我々にとって得策かもしれない。"
 shroud.5012.a: "舞台の幕開けだ……"
 shroud.5012.tt: "§Y秘密結社派閥§!がまもなく出現する：\n$t$§H$pft_the_curtain$§!\n$t$§H$pft_the_masquerade$§!\n$t$§H$pft_the_grand_dance$§!"
 shroud.5013.title: "謎の接触"
 shroud.5013.desc: "我々の中には、 外交舞台の裏側で暗躍する者たちがいる。 今や我々は、 その影響力が母星にとどまらないのではないかと考えている。\n\n我々が他の星と接触しはじめたのはごく最近のことだが、 驚くほどスムーズに、 他の生命体と交信を開始できているのだ。 これがただの偶然とは考えにくい。 我々とこれらの星々との関係は、 我々の社会に深く根を下ろした秘密§H派閥§!の閉ざされた扉の向こうで始まったのではないだろうか。\n\nこれらの組織についてもっとわかれば、 我々の陰に潜む者たちも姿を現すかもしれない。"
 shroud.5013.a: "彼らは我々の味方なのか、 それとも敵なのか？"
 # Chosen
 civic_ap_blockade_tt: "§R警告：['concept_psionic_ascension']以外のすべてのアセンションパスがブロックされる。§!"
 civic_chosen: "選ばれし民"
 civic_chosen_desc: "$civic_ap_blockade_tt$\n\n歴史の初期よりシュラウドの影響を受けていた社会。 強力なシュラウド体と契約を交わし、 その庇護下に入っている。"
 civic_chosen_effects: "- §Iシュラウドのパトロン§!と接触するところからゲームが始まる。\n- $ADDITIONAL_TECHNOLOGIES_STRING$ £society£ ['technology:tech_psionic_aura']"
 civic_chosen_effects_additional: "- シュラウドとの['concept_attunement']に応じて$i_unity$を得る。"
 civic_hive_chosen: "選ばれし群れ"
 civic_hive_chosen_desc: "$civic_ap_blockade_tt$\n\n歴史の初期からシュラウドの影響を受けていた集合体。 強力なシュラウド体と契約を交わし、 その庇護下に入っている。"
 civic_machine_chosen: "使徒のネットワーク"
 civic_machine_chosen_desc: "$civic_ap_blockade_tt$\n\n開発初期からシュラウドの影響を受けていた機械。 強力なシュラウド体と契約を交わし、 その庇護下に入るようハードコードされている。"
 civic_corporate_chosen: "選ばれし幹部陣"
 civic_corporate_chosen_desc: "$civic_ap_blockade_tt$\n\n設立当初から、 謎に包まれたシュラウド体のおかげで成功し続けてきているため、 今なお契約を交わしたかの存在の庇護下で稼働し続けている。"
