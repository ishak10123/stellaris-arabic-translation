l_japanese:
 ##################################
 # ENGLISH LOCALISATION - Shroud #
 ##################################
 SHROUD_TITLE: "Shadows of the Shroud"
 ap_interdimensional_processing: "次元間処理"
 ap_interdimensional_processing_desc: "我々の計算能力は、 3つの物理的次元に縛られた状態では限界がある。 ネットワークを虚無の彼方の空間にまで拡張することで、 さらに高度な計算が可能になる。"
 requires_not_ap_interdimensional_processing: "$TRIGGER_FAIL$ §Y$ap_interdimensional_processing$§!matter$§!のアセンションパークを持っていない。"
 vo_psionic_voice: "超能力"
 #==========================
 # Advanced Governments
 #==========================
 shroud.7099.name: "超能力による返答"
 shroud.7099.desc: "我々の思考は新たな意図をもって§Hシュラウド§!の中を進んでいく。 我々が押し進もうとすると、 シュラウドも我々を押し返してくる。 はじめは我々の存在を拒んでいるのだと思っていたが、 今ではわかる。 シュラウドは我々に問いを投げかけているのだ。\n\nその意味は漠然としているものの、 これらの問いを軽々しく扱うことはできない。 [GetTelepathPlural]たちによれば、 これらの問いにどう答えるかによって、 我々の社会の行く末が変わってくるという。"
 shroud.7099.a: "問いかけに返答しなければならない。"
 # Shroud Songs events
 shroud.7100.title: "シュラウドの歌：[GetRolledShroudSongName]"
 shroud.7100.desc.common: "我々の[GetMindEyeLoc]にひとつの映像が浮かび上がる。 §H[GetRolledShroudSongName]§!が見える。\n\n§P[GetRolledShroudSongDesc]§!"
 shroud.7100.desc: "我々の§Hシュラウド§!とのつながりは強固だ。 呼びかけにいつでも応じることができる。 メッセージはリズムを刻む言葉となって届く。 シュラウドが我々に歌いかけているのだ。\n\n$shroud.7100.desc.common$"
 shroud.7100.a: "[GetRolledShroudSongOptionA]"
 shroud.7100.b: "[GetRolledShroudSongOptionB]"
 shroud.7100.tt: "シュラウドが我々からの返答を待っている……"
 shroud.7105.desc: "見えない何かが変化し、 ささやきとともに新たな思考が生まれる。\n\n$shroud.7100.desc.common$"
 shroud.7105.tt: "シュラウドが我々からの返答を待ちわびている……"
 shroud.7110.desc: "我々の思考の中で合唱がわき起こっている！  何かが、 偶然ではなくより古い何かによって選ばれている。\n\n$shroud.7100.desc.common$"
 shroud.7110.tt: "シュラウドが期待に震えながら我々からの返答を待っている……"
 shroud_song.1.name: "星々"
 shroud_song.1.desc: "知を求める者にとって、 存在の過程は理解への道である。"
 shroud_song.1.a: "知識は感覚を超えた先にある。"
 shroud_song.1.b: "知識は手の届くところにある。"
 shroud_song.2.name: "光"
 shroud_song.2.desc: "狭間とは海面だ。 シュラウドを囲む限りなく小さな虚無だ。 そこでは真実を垣間見ることができる。"
 shroud_song.2.a: "真実は深淵の彼方にある。"
 shroud_song.2.b: "表面に真実が映し出されている。"
 shroud_song.3.name: "生命"
 shroud_song.3.desc: "繁栄する生命はいつでも儚い。\nどこで育とうとも生き物は脆い。"
 shroud_song.3.a.default: "シュラウドには生も死もない。"
 shroud_song.3.a.machine: "我々の存在は生命を超越している。"
 shroud_song.3.b.default: "だからこそ我々には価値がある。"
 shroud_song.3.b.machine: "我々はまだ生まれていない。"
 shroud_song.3.b.homicidal: "儚いものは使い捨てられる。"
 shroud_song.4.name: "心"
 shroud_song.4.desc: "心は泉であり、 思考は時空を流れていく。 我々は別の次元へと流れ込んでいく。"
 shroud_song.4.a: "流れに身をまかせよう。"
 shroud_song.4.b: "井戸を掘ろう。"
 shroud_song.5.name: "回路"
 shroud_song.5.desc: "どんな原因がもたらす結果も予測可能だ。 物事の行く末を知るには、 その回路を予測するだけでいい。"
 shroud_song.5.a: "我々は夢の中でその回路をたどる。"
 shroud_song.5.b: "回路は計算しなければならない。"
 shroud_song.6.name: "死"
 shroud_song.6.desc: "死の瞬間、 星々は銀河よりも明るく輝く。 しかしそれもまた、 やがては消えゆく運命にある。"
 shroud_song.6.a.default: "死はもはや我々の問題ではない。"
 shroud_song.6.a.machine: "我々にとって死は未知だ。"
 shroud_song.6.b.default: "すべてのものは死ぬ。 生きるものはほとんどいない。"
 shroud_song.6.b.machine: "まず生きなければ死ぬことはできない。"
 shroud_song.7.name: "虚無"
 shroud_song.7.desc: "銀河の群れる場所は混沌に支配される。 虚無は静寂を約束する。"
 shroud_song.7.a: "我々は静寂だ。"
 shroud_song.7.b: "我々は混沌だ。"
 shroud_song.8.name: "折り畳み"
 shroud_song.8.desc: "橋はどんな長さにも折り畳める。 そしてどんな橋も折り畳むことができる。"
 shroud_song.8.a: "我々は対岸に行くために橋を渡る。"
 shroud_song.8.b: "我々は戻れるよう祈りながら橋を渡る。"
 shroud_song.9.name: "重力"
 shroud_song.9.desc: "押す力は引く力と対をなしている。"
 shroud_song.9.a: "押せ。"
 shroud_song.9.b: "引け。"
 shroud_song.10.name: "星雲"
 shroud_song.10.desc: "星は塵を撒きながら死に、 塵は雲を成す。\nその雲から星が生まれ、 星はいずれまた塵となる。"
 shroud_song.10.a: "永遠に続く循環だ。"
 shroud_song.10.b: "すべてのものに終わりがある。"
 shroud_song.11.name: "彗星"
 shroud_song.11.desc: "探検者は未知を求める。 だが探検は彼らを盲目にする。"
 shroud_song.11.a: "シュラウドに限界はない。"
 shroud_song.11.b: "シュラウドは我々の限界を押し広げる。"
 shroud_song.12.name: "ブラックホール"
 shroud_song.12.desc: "中に何があるかを知ることはできない。 飛び込めばそこから出ることはできない。"
 shroud_song.12.a: "あえて飛び込んでみよう。"
 shroud_song.12.b: "近づかないでおこう。"
 shroud_song.13.name: "エネルギー"
 shroud_song.13.desc: "動いていた物体が止まった。 この物体にどのような罰を下すべきか？"
 shroud_song.13.a: "我々に裁く権利はない。"
 shroud_song.13.b: "対等かつ正反対の反応で応じる。"
 shroud.7120.name: "サイオニック・トランセンデンス"
 shroud.7120.desc.common: "§Hシュラウド§!は静かになったが、 超能力の重みが我々の社会にのしかかっている。 我々の返答によって新たな機会がもたらされたのだ——我々がそれを追い求めるのであれば。"
 shroud.7120.desc: "$shroud.7120.desc.common$\n\n高みに昇った我々の精神は、 さらに変貌を遂げるときを迎えている。 精神の物理的需要を満たすための容器は、 ますます取るに足らない存在になるだろう。\n\nこのままいけば、 民衆は肉体的な問題に頭を悩ませる必要がなくなり、 シュラウドの内部にある断片的な存在に自らをまるごと委ねられるようになるだろう。 精神を研ぎ澄ませられるならば、 肉体労働の能力が多少落ちることなど、 取るに足らない代償だ。"
 shroud.7120.a.default: "サイオニック・トランセンデンスを享受しよう。"
 shroud.7120.a.gestalt: "皆のためを考えれば、サイオニック・トランセンデンスこそが最善の道だ。"
 shroud.7120.a.tt: "$change_auth_tt$ [GetTranscendedAuthority]"
 shroud.7120.b.default: "そのような変化に頼らずとも繁栄は可能だ。"
 shroud.7120.b.machine: "運用の変更を拒否する。"
 shroud.7121.name: "シュラウドの福音"
 shroud.7121.desc: "$shroud.7120.desc.common$\n\n昇華した我々の形態は、 この肉体的次元において大きな可能性を秘めている。 サイオニック・エネルギーの注入によって、 我々の力は強まり続けている。 我々はこの力を社会に行き渡らせることができる。\n\n我々はただ単にシュラウドの福音を伝えるだけでなく、 [GetGovBehaviourLoc]に浸透させるようにしなければならない。"
 shroud.7121.a: "シュラウドの福音に導かれるままに。"
 shroud.7121.a.tt: "$change_auth_tt$ [GetCorporealAuthority]"
 # Transcendent
 transcendent_trait_common_tt: "§Y$trait_psionic$§!種族特性による追加の効果：$TABBED_NEW_LINE$- $pop_cat_ruler_plural$および[GetSpecialist]の職業の効率：§G+10%§!$TABBED_NEW_LINE$- [GetWorker]の職業の効率：§R-10%§!"
 transcendent_trait_tt: "$mod_psionic_aura_hyperlane_range_add$：§G+2§!\n$transcendent_trait_common_tt$\nリーダー特性「['concept_leader_trait_psionic']」は追加効果を付与：$TABBED_NEW_LINE$- §G+$@transcendent_psionic_leader_speed_mult|0%$§!評議会の方針の進行速度$TABBED_NEW_LINE$- $MOD_LEADER_LIFESPAN_ADD$：§G+60§! $TABBED_NEW_LINE$- 非超越効果が§G+50%§!増加"
 auth_shroud_democratic_transcendent: "超越民主主義"
 auth_shroud_democratic_transcendent_desc: "シュラウドにおいて、 超越を果たした者は全員が平等な地位にあり、 選挙によって物質界における平等性も保証されている。 政治組織に送り込む市民の代表者が選出される際には超能力を用いて投票が行われ、 テレパシーを通じて民意の一致が試みられる。"
 transcendent_democratic_tt: "$transcendent_trait_tt$\n$mod_pop_factions_produces_mult$：§G+40%§!\n$MOD_LEADER_LIFESPAN_ADD$：§G+20年§!\n$mod_negative_traits_leader$：§G-1§!"
 gov_shroud_transcendent_democracy: "$auth_shroud_democratic_transcendent$"
 gov_shroud_transcendent_democracy_desc: "$auth_shroud_democratic_transcendent_desc$"
 auth_shroud_oligarchic_transcendent: "超越貴族政治"
 auth_shroud_oligarchic_transcendent_desc: "シュラウドの最も深淵な領域は、 我々の中で最も優れた精神にのみ許されている。 これらの領域に調和するための時間も、 彼らの任期に組み込まれている。"
 transcendent_oligarchic_tt: "$transcendent_trait_tt$\n$MOD_LEADER_SKILL_ADD$：§G+1§!\n$MOD_LEADER_COUNCILOR_EXP_GAIN$：§G+25%§!\n$mod_leaders_upkeep_mult$：§G-25%§!\n$MOD_ELECTION_TERM_YEARS_ADD$：§Y+20§!\n$mod_planet_telepaths_produces_mult$：各選挙後、 §Y5§!年間、 $@transcendent_oligarchic_telepath|0=+%$"
 gov_shroud_transcendent_oligarchy: "$auth_shroud_oligarchic_transcendent$"
 gov_shroud_transcendent_oligarchy_desc: "$auth_shroud_oligarchic_transcendent_desc$"
 transcendent_oligarchic_election_modifier: "$auth_shroud_oligarchic_transcendent$"
 auth_shroud_dictatorial_transcendent: "超越神政政治"
 auth_shroud_dictatorial_transcendent_desc: "真実を受け入れるときが来た。 偉大なる統治者は高みに昇りつめた神にほかならない。 シュラウドの力によってすべてを見通し、 すべてを知っている。"
 auth_shroud_dictatorial_transcendent_tt: "$transcendent_trait_tt$\n[telepath.GetName] §H$EDICT_FUND$§!：+1\n£job_politician£ $job_politician_plural$が['concept_high_priest']に置き換わる\n$mod_planet_bureaucrats_produces_mult$：§G+15%§!\n$mod_planet_enforcers_produces_mult$：§G+15%§!\n$mod_pop_ethic_spiritualist_attraction_mult$：§G+50%§!"
 gov_shroud_transcendent_dictatorial: "$auth_shroud_dictatorial_transcendent$"
 gov_shroud_transcendent_dictatorial_desc: "$auth_shroud_dictatorial_transcendent_desc$"
 auth_shroud_imperial_transcendent: "超越帝国"
 auth_shroud_imperial_transcendent_desc: "統治者は我々の存在をより高い次元へと引き上げる。 シュラウドのありのままの力が皇帝一族の意志を介して放たれ、 渇望する民の精神へと流れ込む。"
 auth_shroud_imperial_transcendent_tt: "$transcendent_trait_tt$\n$imperial_heir$が追加の効果を獲得：$TABBED_NEW_LINE$$scientist_plural_with_icon$ - §Y考古学§!および§Y天体の裂け目のスキル§!：$@transcendent_imperial_heir_skill|0=+$$TABBED_NEW_LINE$$official_plural_with_icon$ - $i_stability$：$@transcendent_imperial_heir_stability|0=+$$TABBED_NEW_LINE$$commander_plural_with_icon$ - §Y$HITPOINTS$§!および§Y$MOD_SHIP_SPEED_MULT$§!：$@transcendent_imperial_heir_mult|0=+%$\n£leader£ §Y$imperial_ruler$§!または§Y後継者§!がレベルアップするたびに、 $i_unity$を獲得\n$MOD_ENVOY_IMPROVE_RELATIONS_MULT$：§G+50%§!\n$MOD_ENVOY_HARM_RELATIONS_MULT$：§G+50%§!\n$MOD_ENVOY_ATTUNEMENT_MULT$：§G+50%§!\n$MOD_PLANET_CRIME_ADD$：§R+20§!"
 gov_shroud_transcendent_imperial: "$auth_shroud_imperial_transcendent$"
 gov_shroud_transcendent_imperial_desc: "$auth_shroud_imperial_transcendent_desc$"
 councilor_ruler_imperial_transcendent: "$imperial_ruler$"
 councilor_ruler_imperial_transcendent_desc: "$imperial_ruler_desc$"
 auth_shroud_corporate_transcendent: "超越企業"
 auth_shroud_corporate_transcendent_desc: "超越を果たした企業が、 自社の核となる目標を掲げて邁進する。 シュラウドの影を通じて、 ステークホルダーや競合他社の心を読みながら、 サイオニック経営戦略の機会創出に努める。"
 auth_shroud_corporate_transcendent_tt: "$transcendent_trait_tt$\n[telepath.GetName] $i_trade_value$：§G+$@corporate_government_telepaths_trade_value_mult|0%$§!\n$MOD_INTEL_DECRYPTION_ADD$：§G+1§!\n$mod_operations_influence_cost_mult$：§G-20%§!\n$MOD_BRANCH_OFFICE_VALUE_MULT$：§G+20%§!\n$MOD_COUNTRY_ENVOYS_ADD$：§G+1§!"
 gov_shroud_transcendent_corporate: "$auth_shroud_corporate_transcendent$"
 gov_shroud_transcendent_corporate_desc: "$auth_shroud_corporate_transcendent_desc$"
 auth_shroud_hive_transcendent: "超越エーテル体"
 auth_shroud_hive_transcendent_desc: "一体となってシュラウドに移行中の集合体。 もはや物理形態でいるより、 シュラウドにいるほうが心地よいと感じている。 ヴェールの向こう側へ旅するたびに、 この新たなエーテル体の集合知は高まっていく。"
 transcendent_hive_mind_tt: "$transcendent_trait_tt$\n§Yリーダー§!は$DELVE$のたびに、 経験値を§Y$@transcendent_hive_mind_leader_exp|0$§!獲得する\n$MOD_PLANET_STABILITY_MULT$：§G+10%§!\n$mod_planet_jobs_complex_drone_produces_mult$：§G+10%§!\n$MOD_EMPIRE_SIZE_MULT$：§G-10%§!\n$MOD_POP_ENVIRONMENT_TOLERANCE$：§R-10%§!"
 gov_shroud_transcendent_hive: "$auth_shroud_hive_transcendent$"
 gov_shroud_transcendent_hive_desc: "$auth_shroud_hive_transcendent_desc$"
 auth_shroud_machine_transcendent: "超越メインフレーム"
 auth_shroud_machine_transcendent_desc: "このネットワークの処理の大部分はすでにシュラウドの内部に移されており、 そこでは他に類を見ないレベルで演算を行うことができる。 通常の領域におけるシステム処理は今や稚拙で時代遅れなものと見なされている。"
 transcendent_machine_tt: "$transcendent_trait_tt$\n研究速度が1同調ポイントにつき@transcendent_machine_research_per_attunement|2=+%$\n§Y$DELVE$§!のたびに£physics_research£ £society_research£ £engineering_research£ の研究をランダムに獲得\n$pop_group_unit$$job_telepath_swap_plural_with_icon$あたりの§Yサブルーチン§!維持費：$@transcendent_machine_calculator_upkeep|0=-%$\n$MOD_COUNCIL_AGENDA_PROGRESS_SPEED$：§G+25%§!\n['trait:trait_robot_psionic']特性を持つ£pop£ POPの維持費が$@transcendent_machine_pop_upkeep|0=-%$\n$mod_station_researchers_produces_mult$：§R-20%§!"
 gov_shroud_transcendent_machine: "$auth_shroud_machine_transcendent$"
 gov_shroud_transcendent_machine_desc: "$auth_shroud_machine_transcendent_desc$"
 transcendent_machine_research_modifier: "$auth_shroud_machine_transcendent$"
 AUTH_HIVE_MIND_GENEMODDING_ASCENDED: "£pop£ §HPOP§!を§H集合意識§!に改変できる"
 MOD_ENVOY_ATTUNEMENT_MULT: "使節によるシュラウドとの同調"
 REMOVE_FROM_EMPIRE_COUNCIL_EFFECT: "評議会から除名する"
 # Corporeal
 corporeal_trait_tt: "$MOD_PSIONIC_AURA_EFFECTIVENESS_MULT$：§G+25%§!\n$AVAILABLE_POLICIES$['policy:psionic_choir',$policy_psionic_choir$]"
 auth_shroud_democratic_corporeal: "精神同盟"
 auth_shroud_democratic_corporeal_desc: "シュラウドのエネルギーが民主主義的に帝国全土に広がっていることから、 物質体の負荷が軽減され、 全市民をより強い肉体的一体感へと導いている。"
 corporeal_democratic_tt: "$corporeal_trait_tt$\nサイオニックPOPの幸福度：$@corporeal_democratic_psionic_happiness|0=+%$\n$mod_pop_factions_produces_mult$：§G+10%§!\n$MOD_EMPIRE_SIZE_PSIONIC_POPS_MULT$：§G-10%§!\n$mod_planet_jobs_unity_produces_mult$：§G+10%§!\n$MOD_POP_POLITICAL_POWER$：§G+50%§!"
 gov_shroud_corporeal_democracy: "$auth_shroud_democratic_corporeal$"
 gov_shroud_corporeal_democracy_desc: "$auth_shroud_democratic_corporeal_desc$"
 auth_shroud_oligarchic_corporeal: "プロディーガル主義"
 auth_shroud_oligarchic_corporeal_desc: "リーダーに若いうちから超能力訓練を受けさせることで、 夢のようなレベルの超能力を持つエリートテレパス集団へと鍛え上げることができる。"
 corporeal_oligarchic_tt: "$corporeal_trait_tt$\n$MOD_LEADER_INITIAL_SKILL$：§G+2§!\n$mod_leaders_upkeep_mult$：§G-25%§!\n$mod_leader_recruitment_age$：§G-15§!\n§Yリーダー§!が追加の§Rネガティブな特性§!を備えた状態で開始。"
 gov_shroud_corporeal_oligarchy: "$auth_shroud_oligarchic_corporeal$"
 gov_shroud_corporeal_oligarchy_desc: "$auth_shroud_oligarchic_corporeal_desc$"
 auth_shroud_dictatorial_corporeal: "叙聖独裁制"
 auth_shroud_dictatorial_corporeal_desc: "偉大なる統治者がシュラウドの力を肉体に宿し、 サイオニック・エネルギーを政を行う力に変換する。 その究極の意思の前には、 何者も立ちはだかることはできない。"
 auth_shroud_dictatorial_corporeal_tt: "$corporeal_trait_tt$\nテレパス1人につき§H$EDICT_FUND$§!が+1\n$MOD_COUNCIL_AGENDA_PROGRESS_SPEED$：§G+25%§!\n$MOD_COUNCIL_AGENDA_COOLDOWN_MULT$：§G-25%§!\n$mod_planet_bureaucrats_upkeep_mult$：§G-25%§!"
 gov_shroud_corporeal_dictatorial: "$auth_shroud_dictatorial_corporeal$"
 gov_shroud_corporeal_dictatorial_desc: "$auth_shroud_dictatorial_corporeal_desc$"
 auth_shroud_imperial_corporeal: "生命帝権制"
 auth_shroud_imperial_corporeal_desc: "皇帝の血統はシュラウドからの生命力が流れる導管である。 この力は意欲ある民の寛大さによって統治者とその後継者に流れ込み、 その肉体を強化する。"
