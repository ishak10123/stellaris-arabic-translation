 #==========================
 # Shroud Seals Kilostructure
 #==========================
 SHROUD_SEAL: "シュラウド・シール"
 SHROUD_SEAL_PLURAL: "シュラウド・シール"
 SHROUD_SEAL_IN_SYSTEM: "この星系には$SHROUD_SEAL$が存在するため、 近隣の§Y$PSIONIC_AURA_PLURAL$§!が弱体化する。 解除できるのは星系領有者のみである。"
 shroud_seal: "$SHROUD_SEAL$"
 shroud_seal_DESC: "対サイオニック・エネルギーの低周波を放つ高機能な機械で、 $PSIONIC_AURA_PLURAL$を消散させることができ、 最終的には無効化する。"
 shroud_seal_MEGASTRUCTURE_DETAILS: "§Y$SHROUD_SEAL$§!は周囲の§Y$PSIONIC_AURA_PLURAL$§!を弱体化させ、 §Yサイオニック艦船コンポーネント§!の効果を低下させる。"
 shroud_seal_modifier: "$SHROUD_SEAL$"
 requires_no_existing_shroud_seal: "$TRIGGER_FAIL$すでに星系内に、 $SHROUD_SEAL$があるため建設できない。"
 shroud_seal_dismantle_conditions_tt: "$TRIGGER_FAIL$星系内に敵軍がいるため、 $SHROUD_SEAL$を安全に解体することができない。"
 mod_shroud_storm_repelling: "シュラウド嵐の反発"
 #==========================
 # Armies
 #==========================
 abomination_army: "アボミネーションズ"
 abomination_army_desc: "攻撃性や戦闘能力を高めるため、 凄まじい実験的措置を施された末に生ける兵器と化した奴隷兵士たち。 主には従順だが、 戦場では獰猛な顔を見せる。"
 seq_abomination_army: "$ORD$ $abomination_army$軍"
 mindwarden_army: "アサルト・ウォーデン"
 mindwarden_army_desc: "これらの特殊部隊は、 反超能力戦術とテクノロジーの徹底的な訓練を受けており、 精神に侵入してくる標的の天敵となる。"
 NAME_Mindwarden_Army: "$mindwarden_army$"
 #==========================
 # Branch-Office Buildings
 #==========================
 # Carceral Test Facility
 building_carceral_test_facility: "実験支部"
 building_carceral_test_facility_desc: "植民地に築かれた支部で、 有望な利害関係者に独占的なチャンスを提供することで、 彼らによる独自の実験プログラムの考案を後押ししている。 罪を罰して防衛を拡大せよ！"
 building_psionic_offices: "サイオニック・オフィス"
 building_psionic_offices_desc: "異星の複雑な精神は、 その物理的存在と直接対面したほうが効果的に理解できる。 そして、 双方にとって最も有益な貿易協定を結ぶことができる。"
 building_psionic_offices_tt: "\n星系効果：\n$t$- $TRIGGER_BRANCH_OFFICE_OWNER$のために月間強度$@psionic_offices_intensity|0+$で§Y$PSIONIC_AURA$§!を放出\n$t$- §R植民地の所有者による$PSIONIC_AURA$の放出手段は、 この建造物よりも優先される。§!"
 job_shroud_trader: "共感的マーケター"
 job_shroud_trader_plural: "共感的マーケター"
 job_shroud_trader_plural_with_icon: "£job_telepath£ $job_shroud_trader_plural$"
 job_shroud_trader_desc: "これらの専門家は地域市場に流れる感情の潮流に同調し、 取引をまとめ、 思想的リーダーシップに関する最新トレンドについてセミナーを開催する。"
 mod_job_shroud_trader_add: "$job_shroud_trader$の職業枠"
 mod_pop_shroud_trader_bonus_workforce_mult: "[shroud_trader.GetNamePlural]の$BONUS_WORKFORCE_FOR$"
 #==========================
 # Buildings
 #==========================
 # Experimentation Chambers
 building_experimentation_chambers_1: "実験施設"
 building_experimentation_chambers_1_desc: "矯正不能な犯罪者に実験を施すための極秘施設で、 大部分が監房と研究所からなる。"
 building_experimentation_chambers_2: "複合実験施設"
 building_experimentation_chambers_2_desc: "敷地内に、 極秘技術の研究所や収容施設がある。 帝国最高の[Owner.GetResearchers]が指揮を執る各種実験では、 罪を犯した[Owner.GetIndividualNamePlural]が被験者として使われている。"
 building_experimentation_chambers_3: "実験ネクサス"
 building_experimentation_chambers_3_desc: "最高機密の技術と収容施設のネットワーク。 一流の[Owner.GetResearchers]からなる精鋭チームが、 帝国の裏社会から集めた[Owner.GetIndividualNamePlural]たちを被験者として、 先駆的な実験に勤しんでいる。"
 # Lifecrypt
 # Lifecrypt (Normal)
 building_lifecrypt_1: "リーチングタワー"
 building_lifecrypt_1_desc: "近くにいる献身的な人々から、 余剰なエネルギーを吸引できる巨大な装置。 この役目を担う者たちはいずれも、 自身の生命力を中央の導管に注ぎ込むための特殊な装備を着用している。 こうして集まった生命力は、 この導管からより地位の高い者たちへと再分配される。"
 building_lifecrypt_2: "ソウル・サイフォン"
 building_lifecrypt_2_desc: "“魂を吸い出す”という意味のソウル・サイフォンだが、 実用的な科学に基づいた設計となっている。 物理的なつながりを通じて、 個々人からエネルギーを収穫するために特別に整備されており、 対象となる生物の命を危険に晒すことなく、 膨大な代謝エネルギーを搾取することが可能。"
 building_lifecrypt_3: "エッセンス・コンジット"
 building_lifecrypt_3_desc: "適切な装備をしていない者たちが、 エッセンス・コンジットの影響範囲内に迷い込んでしまった場合、 命が危険に晒されることもあるため、 境界線を明確に引く必要がある。 役目を担う者たちは一度に過剰なエネルギーを捧げすぎてしまわないように、 代謝の調整を行う訓練を受けている。"
 # Lifecrypt (Machine)
 building_lifecrypt_machine_1: "サイフォン・バッテリー"
 building_lifecrypt_machine_1_desc: "近くにいる献身的なドローンから、 余剰な処理エネルギーを吸引できる巨大な装置。 この役目を担う労働者たちはいずれも、 自身の電力を中央の導管に注ぎ込むための特殊な装備を着用している。 こうして集まった電力は、 この導管からより崇高な目的を持つ者たちへと再分配される。"
 building_lifecrypt_machine_2: "バッテリー工場"
 building_lifecrypt_machine_2_desc: "物理的なつながりを通じて、 個々のドローンからエネルギーを収穫するために特別に整備された装置。 各ドローンに致命的な障害を引き起こすことなく、 その過剰な処理エネルギーを膨大に搾取することが可能。"
 building_lifecrypt_machine_3: "バッテリー・ネクサス"
 building_lifecrypt_machine_3_desc: "適切な防具を持たないユニットが、 バッテリー・ネクサスの影響範囲内に進入してしまった場合、 破壊される危険に晒されることもあるため、 境界線を明確に引く必要がある。"
 # Lifecrypt (Hive Mind)
 building_lifecrypt_hive_mind_1: "リーチングタワー"
 building_lifecrypt_hive_mind_1_desc: "近くにいる献身的なドローンから、 余剰な処理エネルギーを吸引できる巨大な装置。 この役目を担う労働者たちはいずれも、 自身の電力を中央の導管に注ぎ込むための特殊な装備を着用している。 こうして集まった電力は、 この導管からより崇高な目的を持つ者たちへと再分配される。"
 building_lifecrypt_hive_mind_2: "ソウル・サイフォン"
 building_lifecrypt_hive_mind_2_desc: "物理的なつながりを通じて、 個々のドローンからエネルギーを収穫するために特別に整備された装置。 各ドローンに致命的な障害を引き起こすことなく、 その過剰な処理エネルギーを膨大に搾取することが可能。"
 building_lifecrypt_hive_mind_3: "エッセンス・コンジット"
 building_lifecrypt_hive_mind_3_desc: "適切な装備をしていないドローンが、 エッセンス・コンジットの影響範囲内に進入してしまった場合、 破壊される危険に晒されることもあるため、 境界線を明確に引く必要がある。 役目を担う労働者たちは一度に過剰なエネルギーを捧げすぎてしまわないように、 代謝の調整を行う訓練を受けている。"
 # Lifecrypt (Corporate)
 building_lifecrypt_corporate_1: "シナジー本部"
 building_lifecrypt_corporate_1_desc: "近くにいる献身的な実習生から、 余剰なエネルギーを吸引できる巨大な装置。 この役目を担う者たちはいずれも、 自身の生命力を中央の導管に注ぎ込むための特殊な装備を着用している。 こうして集まった生命力は、 この導管から上役の者たちへと再分配される。"
 building_lifecrypt_corporate_2: "シナジー管理局"
 building_lifecrypt_corporate_2_desc: "シナジー管理局の建物は、 物理的なつながりを通じて、 個々人からエネルギーを収穫するために特別に整備されている。 対象となる実習生たちにも命の危険をほとんど感知されることなく、 膨大な代謝エネルギーを搾取することが可能。"
 building_lifecrypt_corporate_3: "シナジー・ネクサス"
 building_lifecrypt_corporate_3_desc: "適切な装備をしていない実習生たちが、 シナジー・ネクサスの影響範囲内に迷い込んでしまった場合、 命が危険に晒されることもあるため、 境界線を明確に引く必要がある。 役目を担う者たちは、 その過程で命だけは落とすことのないよう、 高度なシナジー技術の訓練を受けている。"
 # Psionic Suppressor
 building_psionic_suppressor: "サイオニック抑制器"
