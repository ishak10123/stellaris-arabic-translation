l_japanese:
 SITLOG: "状況レポートの更新"
 ####################################
 #Advisor Tutorial Messages
 ####################################
 TUTORIAL_GOVERNMENTVIEW_GOVERNMENT_TITLE: "政府"
 TUTORIAL_GOVERNMENTVIEW_GOVERNMENT_DESC: "§S政府§!画面では、 帝国と政府の情報を表示します。 ここでは我々の§S統治者§!と、 それに関連する効果を見ることができます。 \n\nタブで国内の§S人口統計§!情報に切り替えられます。"
 TUTORIAL_TECH_VIEW_TITLE: "チュートリアル：テクノロジー"
 TUTORIAL_TECH_VIEW_DESC: "§Sテクノロジー§!画面では、 研究成果を管理できます。 技術は3つの分野に分けられ、 各分野には通常3つの研究オプションが現れます。\n\n利用できる分野は£physics£ 物理学、 £society£ 社会学、 £engineering£ 工学です。\n\n§Sテクノロジー§!を研究する手順：\n\n£dot_green£ §S研究を選択§!ボタンをクリックする\n£dot_green£利用可能な選択肢から選ぶ\n\n§S研究部門部長§!を任命すると進行が早まります (強く推奨)。 任命された部門部長の§S特性§!によって、追加効果が得られることもあります。\n\n各分野の§S自動研究を有効化§!ボタンをクリックすると研究科を自動化することもできます。\n\n$tttt$$ttt$£automate_research£\n"
 TUTORIAL_CONTACTSVIEW_EMPIRES_TITLE: "チュートリアル：交信"
 TUTORIAL_CONTACTSVIEW_EMPIRES_DESC: "§S交信§!画面では、 これまでに出会ったすべての§S帝国§!の詳細を見ることができます。 自国に対する彼らの§S態度§!が一目でわかり、 この画面からすぐに§S外交交渉§!が可能です。\n\n各エントリーには§S政治体制§!、 §S志向§!、 §S帝国のステータス§!など重要な情報が表示されます。\n\nこの画面から、 §S諜報§!活動にアクセスしたり、 各帝国との既存の§S協定§!を確認することもできます。"
 TUTORIAL_SITUATION_LOG_TITLE: "チュートリアル：状況レポート"
 TUTORIAL_SITUATION_LOG_DESC: "§S状況レポート画面§!では、 実行可能な§Sスペシャルプロジェクト§!、 £archaeology£ §S遺跡§!、 その他さまざまな重要事項がすべて表示されます。\n\n銀河を探索することでも新しい項目が現れるでしょう。"
 TUTORIAL_SHIP_DESIGNER_TITLE: "チュートリアル：艦船設計"
 TUTORIAL_SHIP_DESIGNER_DESC: "帝国内で使用しているすべての§S艦船§!はここで設計されます。 新たな§S艦種§!や§Sコンポーネント§!は、 新技術を研究することでアンロックされます。\n\n新たな§S設計§!を作成する方法\n\n£dot_green£ §S新しい設計§!ボタンをクリック\n£dot_green£ §S設計する船の種類§!を選択\n£dot_green£§S区画なし§!ボタンをクリックし、§S区画§!を選択\n\n次に利用可能なスロットをクリックして、好きな§S艦船コンポーネント§!を選択します。\n\n\n$tttt$$tt$£slot_component£ \n\n\n保存したら、§S造船所§!があるいずれかの§S星系基地§!で新しい設計が建造可能になります。"
 TUTORIAL_EMPIREVIEW_PLANETS_TITLE: "チュートリアル：惑星とセクター"
 TUTORIAL_EMPIREVIEW_PLANETS_DESC: "§S惑星とセクター§!画面は、すべての植民地と、 それに属する£pops£ §SPOP§!と§S資源産出§!の概要を確認できます。\n\n帝国が成長すると、 §Sセクター§!に分類して管理を合理化できるようになります。\n\n既存の§Sセクター§!から£vassal£ §S従属国§!を作成することもできます。"
 TUTORIAL_MILITARY_FLEET_TITLE: "チュートリアル：軍事艦隊"
 TUTORIAL_MILITARY_FLEET_DESC: "§S軍事艦隊§!は脅威から帝国を防衛するため……あるいは、 我々の栄光ある支配領域を武力によって拡大するために用います。\n\n艦隊の規模は、 現在の§S宇宙軍許容量§!によって制限されており、 初期段階ではこの許容量は限られています。 ただし、以下の方法で増やすことができます。\n\n£dot_green£ 新たな§Sテクノロジー§!の研究\n£dot_green£ £pops£ POPを増やす\n£dot_green£ §S星系基地の停泊地§!の建造\n\n艦隊の指揮を執る£commander£ §S司令官§!を任命することで、 軍事力が増加し、 £leader£ §Sリーダー§!の持つ他のボーナスが付与されます。"
 TUTORIAL_SCIENCE_SHIP_TITLE: "チュートリアル：調査"
 TUTORIAL_SCIENCE_SHIP_DESC: "これが£science_ship£ §S調査船§!です。 £system£ §S星系§!にある£planet£ §S惑星§!などの天体を§S調査§!するために使います。 天体を調査することで、 どんな§S資源§!が眠っているのかを明らかにできます。\n\n我々の母星系はすでに調査済みなので、 別の場所へ乗り出すべきです。\n\n§S調査船§!を選択したら次の手順を実行します：\n\n£dot_green£ 隣接する§S星系§!を右クリックする\n£dot_green£§S資源調査§!を選択する"
 TUTORIAL_CONSTRUCTION_SHIP_TITLE: "チュートリアル：建設船"
 TUTORIAL_CONSTRUCTION_SHIP_DESC: "これが£construction_ship£ §S建設船§!です。 宇宙空間で各種の施設を建設します。\n\n£planet£ §S惑星§!などの調査済の天体において、 産出される資源に応じた£science_ship£ §S研究ステーション§!や資源を入手するための£mining_station£ §S採掘ステーション§!を建設できます。\n\nまた、 この§S船§!は領有されていない£system£ §S星系§!に§S星系基地§!を[GetBuildGrow]することもできます。 これは国家の拡大にとっては必須となる施設です。"
 TUTORIAL_PLANETVIEW_PLANET_TITLE: "チュートリアル：地表"
 TUTORIAL_PLANETVIEW_PLANET_DESC: "§S地表§!タブでは、 £planet£§S惑星§!のインフラと状態の概要を確認できます。\n\n£building£§S区域と建造物§!セクションには建造済みの建造物と利用可能な建造物スロットが各区域に表示されます。\n\n£district£§S区域§!と§Sゾーン§!は£housing£§S住居§!、 £job£§S職業§!、 資源を提供します。\n\n§S自動化§!をオンにすると、 関心事項に応じて惑星が自動的に管理されるようになります。\n\n画面上部の§S惑星統計§!バーでは£stability£§S安定度§!、£crime£§S犯罪§!、 有効な補正、 任命された§S総督§!を確認できます。"
 TUTORIAL_PLANETVIEW_TILES_TITLE: "チュートリアル：経済"
 TUTORIAL_PLANETVIEW_TILES_DESC: "§S経済§!タブでは§S労働力§!と£job£§S職業§!の概要を確認できます。\n\n£planet£§S惑星§!の人口は§S階層§!にわかれていて、 それを拡張すると§S職業§!の種類が増えます。 £pops£§SPOP§!は§S労働力§!を維持するために、 必要に応じて階層に割り当てられます。\n\n§S職業§!は資源を消費し、 同時に産出も行います。\n\nPOPには£housing£§S住居§!と£amenities£§S快適度§!が必要となります。\n\nいずれかが不足していると惑星の£happiness£§S幸福度§!が下がり、 その結果、 全体的な£stability£§S安定度§!が減少します。"
 TUTORIAL_PLANETVIEW_COMBAT_TITLE: "チュートリアル：地上軍"
 TUTORIAL_PLANETVIEW_COMBAT_DESC: "§S地上軍§!タブでは、 この惑星に存在するすべての地上軍を管理できます。 ここでは§S荒廃度§!、 すなわち£planet£§S惑星§!が被った損害の度合いを確認することもできます。\n\n§S雇用§!ボタンをクリックすると、 新たな§S地上軍§!を編成できます。\n\n§S防衛軍§!は法務執行官または[soldier.GetName]の§S職種§!に就いた£pops£§SPOP§!から自動的に生産されます。 これらの£job£ §S職業§!は惑星首都、 £building£§S警察署§!、 £building£§S駐屯地§!によって提供されます。"
 TUTORIAL_PLANETVIEW_SPACEPORT_TITLE: "宇宙港"
 TUTORIAL_PLANETVIEW_SPACEPORT_DESC: "§S宇宙港§!タブでは、 軌道上の艦隊を確認し、 新しい民間船を[GetBuildGrow]できます。 軍艦は§S造船所§!をもつ§S星系基地§!でのみ建造可能ですが、 建設船・調査船・§Sコロニー船§!はここで建造します。\n\nもし星系基地をすべて失ったとしても、 居住£planet£ §S惑星§!を1つでも所有していれば、 拡大・再建の手段は残されています。"
 TUTORIAL_MILITARY_STATION_TITLE: "軍事ステーション"
 TUTORIAL_MILITARY_STATION_DESC: "§S軍事ステーション§!は、 重要な£planet£ §S惑星§!や戦略的進入路の防衛に使用する設置型防衛施設ですが、 国境内もしくは特別な通行権を持っている領域にしか[GetBuildGrow]できません。\n\n§S艦船§!の維持費と同様、 軍事ステーションの維持費は我々の経済を圧迫するので、 あまり多く設置しすぎないように注意してください。"
 TUTORIAL_RESEARCH_STATION_TITLE: "チュートリアル：研究ステーション"
 TUTORIAL_RESEARCH_STATION_DESC: "天体の軌道上に建造できる£science_ship£ §S研究ステーション§!は、 £physics£ §S物理§!、 £engineering£ §S工学§!、 £society£ §S社会§!のいずれかについての研究データを集めます。 \n\n国境内でのみ建設でき、 またすでに入植している£planet£ §S惑星§!には建設する必要はありません。"
 TUTORIAL_MINING_STATION_TITLE: "採掘ステーション"
 TUTORIAL_MINING_STATION_DESC: "£mining_station£ §S採掘ステーション§!は、 天体の軌道上に建造すればその天体から£minerals£ §S鉱物§!と£strategic_resource£ §S戦略資源§!を獲得できます。\n\nすでに入植済みの£planet£ §S惑星§!の場合、 資源獲得に§S採掘ステーション§!は必要ありません。 また、 国境内にのみ建設可能です。"
 TUTORIAL_TRANSPORT_SHIP_TITLE: "チュートリアル：輸送艦"
 TUTORIAL_TRANSPORT_SHIP_DESC: "§S地上軍§!が宇宙への移動を命じられると、 自動的に§S輸送艦§!に乗船した状態になります。 輸送艦はまったくの無防備なので、 守ってやることを心がけてください！"
 TUTORIAL_DIPLOMACY_VIEW_TITLE: "チュートリアル：外交"
 TUTORIAL_DIPLOMACY_VIEW_DESC: "§S外交§!画面では、 ほかの文明との交信を行います。 §S宣戦布告§!をしたり、 近隣国に§S諜報網§!を築いたり、 §S同盟§!を結んだり、 §S貿易交渉§!を行ったりが可能です。 現在の§H情報レベル§!もここで確認できます。\n\n選択した国との§S関係§!は、 「敵対」から「親密」までの5段階で表示されます。 交渉や協定を行うには、 関係を十分に発達させる必要があります。\n\n£envoy£ §S使節§!を派遣すると、 相手国を§Sスパイ§!したり、 §S情報値§!を蓄積したり、 §S関係§!の必要値を満たしていなくても交渉が実現したり、 関係を§S改善§!したり§S悪化§!させたりできます。"
 TUTORIAL_DIPLOMACY_VIEW_TRADE_TITLE: "チュートリアル：交易"
 TUTORIAL_DIPLOMACY_VIEW_TRADE_DESC: "これは§S交易画面§!です。 あらゆる種類の§S資源§!や§S情報§!、 §S好意§!を他国と交易できます。\n\n好意を消費することにより、 他国の交渉受け入れ度が上がります。 好意はまた、 §H銀河共同体§!における元老院議場での投票において、 外交発言力を増やすためにも使えます。"
 TUTORIAL_DIPLOMACY_VIEW_FEDERATION_TITLE: "連邦種別"
 TUTORIAL_DIPLOMACY_VIEW_FEDERATION_DESC: "§S連邦種別§!は、 £federation£ §S連邦§!の関心事項を表すものです。 連邦種別はそれぞれ、 ゲーム開始時点でユニークな§Sパークと法律§!を持っており、 経験値を得ることによってさらなるパークを§Sアンロック§!できます。"
 TUTORIAL_DIPLOMACY_VIEW_HIGHINTEL_TITLE: "チュートリアル：高い情報レベル"
 TUTORIAL_DIPLOMACY_VIEW_HIGHINTEL_DESC: "この帝国に対して§S情報レベル高§!に達しているので、 相手国のより多くの情報が得られます。 \n\n情報レベル高を維持すると、 相手の§S志向§!や §S国是§!、 他国との§S関係§!、 我々と比較した相手の§S技術§!・§S経済§!・§S軍事§!についての最新の情報を見ることができます。"
 TUTORIAL_DIPLOMACY_VIEW_LOWINTEL_TITLE: "チュートリアル：低い情報レベル"
 TUTORIAL_DIPLOMACY_VIEW_LOWINTEL_DESC: "この帝国に対する§S情報レベル§!が低下しています。 諜報活動が§S停滞§!しているため、 時間が経つにつれて以前収集していた情報を失う危険があります。\n\n§S情報レベル§!は以下の方法で上げることができます：\n\n£dot_green£ §S外交協定§!を維持する\n£dot_green£ £envoy£ §S使節§!を派遣して関係を改善する\n£dot_green£ §S諜報網§!を築く\n£dot_green£ §S大使館§!を相手国に設置する"
 TUTORIAL_PLANETVIEW_ADJACENCY_BONUS_TITLE: "隣接効果"
 TUTORIAL_PLANETVIEW_ADJACENCY_BONUS_DESC: "一部の£building£ §S建造物§!は、 隣接する§Sタイル§!にあるほかの§S建造物§!に§S隣接効果§!をもたらす場合があります。 新しい建造物を建てるときには、 このことも考慮しましょう。"
 TUTORIAL_GOVERNMENTVIEW_BUDGET_TITLE: "予算"
 TUTORIAL_GOVERNMENTVIEW_BUDGET_DESC: "§S予算§!タブは、 £energy £ エネルギー通貨の毎月の§S収入§!と§S支出§!を集計しています。 また、 ここでは経済に影響を及ぼすさまざまな効果を詳しく知ることができます。"
 TUTORIAL_GOVERNMENTVIEW_DECISIONS_TITLE: "布告"
 TUTORIAL_GOVERNMENTVIEW_DECISIONS_DESC: "この画面では帝国全土に対する§S布告§!を発することができます。 布告の実行には資源を消費します。\n\n布告は毎月の維持費がかかり、 我々の§H$EDICT_FUND$§!、 または£unity£ §Y統合力§!で支払うことできます。"
 TUTORIAL_GOVERNMENTVIEW_DEMOGRAPHICS_TITLE: "チュートリアル：人口統計"
 TUTORIAL_GOVERNMENTVIEW_DEMOGRAPHICS_DESC: "§S人口統計§!タブは、 帝国の種族の幅と構成を示しています。 \n\nまたこの画面では、 £pops£ §SPOP§!の主要な§S特性§!、 生産性や£happiness£ §S幸福度§!に対する補正なども確認できます。"
 TUTORIAL_EMPIREVIEW_LEADERS_TITLE: "チュートリアル：リーダー"
 TUTORIAL_EMPIREVIEW_LEADERS_DESC: "§Sリーダー§!画面では、 帝国に所属する£leader£ §Sリーダー§!の概要を確認し、 リーダーの雇用・解任・管理を行えます。\n\nリーダーの§Sクラス§!によって、 任命できる帝国内の役職や§S評議会§!で担当できるポジションが決まります。\n\n雇用可能な§Sリーダー§!は定期的に更新されますが、 リーダーは限られた数しか雇用できません。 雇用上限を超えると、 維持費が増加し、 獲得できる経験値も減少します。 不要なリーダーは解任して、ペナルティを回避しましょう。"
 TUTORIAL_EMPIREVIEW_FACTIONS_TITLE: "チュートリアル：派閥"
 TUTORIAL_EMPIREVIEW_FACTIONS_DESC: "§S派閥§!画面では、 民衆の政治的傾向の概要が確認できます。 社会情勢の変化により、 §S派閥§!が発生する場合があることに留意してください。 §S派閥§!の規模、 £pops£ §SPOP§!に対する魅力、 現状への満足度などの詳細もここに表示されます。\n\n§S派閥§!がもつ§S主張§!は、 彼らの全体的な§S支持率§!を決める要因になります。 国家としての我々の政策や行動は、 これらの派閥に不満を抱かせたり喜ばせたりするほか、 彼らの £unity£ §S統合力§!の産出量も左右します。\n\n§S派閥§!の強さと彼らの§S主張§!の性質は、 我々を取り巻く状況とともに変わっていきますが、 §SPOP§!の£happiness£ §S幸福度§!は属している§S派閥§!の§S満足度§!に影響を受けることに注意してください。\n\nまた、 §S派閥を管理§!し、 §S派閥§!と国家の関係を調整することもできる上、 強力な§S派閥§!の理念や志向を国家として受け入れることも可能です。"
 TUTORIAL_CREATESECTOR_TITLE: "チュートリアル：セクターの管理"
 TUTORIAL_CREATESECTOR_DESC: "§Sセクター§!を創設するには、 まず§S辺境宙域§!にある£planet£ §S惑星§!を選び、 セクターの創設ボタンを押します。 するとその惑星は新たなセクターの§S首都§!となり、 周囲6ハイパージャンプ内の辺境宙域にある星系が、 すべてそのセクターに編入されます。 セクター内部の惑星に自動的に£building£ §S建造物§!を建設することもできますが、 これには機能をオンにし、 資源を与えてやる必要があります。 自動化することで、 セクターに逐一指示を出す手間を省くことができます。"
 TUTORIAL_CONTACTSVIEW_SPECIES_TITLE: "チュートリアル：種族"
 TUTORIAL_CONTACTSVIEW_SPECIES_DESC: "§S種族§!画面では、 我々が出会ったすべての知的生命体の一覧が表示されます。 §S種族切り替え§!を使えば、 わが帝国の市民だけの表示と、 銀河のすべての既知の住人の表示を切り替えることができます。\n\nもしテクノロジーがあれば、 ここから種族特性の§S補正§!や、 準知的種族の§S知性化§!を実行できるほか、 §Sデフォルト権利設定§!で帝国のすべての£pops£ §SPOP§!の権利を定めたり、 §S権利の設定§!で種族ごとの権利を定めたりできます。"
 TUTORIAL_PLANETVIEW_TERRAFORM_TITLE: "チュートリアル：テラフォーミング"
 TUTORIAL_PLANETVIEW_TERRAFORM_DESC: "§Sテラフォーミング§!は£planet£ §S惑星§!の環境を改造し、 特定の§S種族§!や目的に適したものに変更できます。"
 TUTORIAL_GENEMODIFICATION_TITLE: "遺伝子改変"
 TUTORIAL_GENEMODIFICATION_DESC: "この種族の遺伝子を改造し、 その§S特性§!を変更できます。\n\nこれはあなたの選んだ特性を備えた、 新しい種族の§Sテンプレート§!を作成することになります。 実際にこの種族の£pops£ §SPOP§!に変更を加える前に、 §Sテンプレートの適用§!ボタンをクリックし、 新しい§Sスペシャルプロジェクト§!を作成する必要があります。"
 TUTORIAL_UPLIFTING_TITLE: "知性化"
 TUTORIAL_UPLIFTING_DESC: "頭の良い動物の§S特性§!を補正し、 §S知性化§!により完全な知的生命体にして、 帝国市民として迎え入れることができます。"
 TUTORIAL_SYSTEMVIEW_TITLE: "星系ビュー"
 TUTORIAL_SYSTEMVIEW_DESC: "この§S星系ビュー§!では、 特定の£system£ §S星系§!を近距離で見ることができます。 ここでは£planet£ §S惑星§!、 ステーション、 艦隊の位置を比較的容易に確認できます。"
 TUTORIAL_WORMHOLE_STATION_TITLE: "ワームホールステーション"
 TUTORIAL_WORMHOLE_STATION_DESC: "§Sワームホールステーション§!は、 £system£ §S星系§!の外縁部に建造され、 ほかの星系への双方向の入り口となる時空の裂け目を作り出します。とても独創的ですね。"
 TUTORIAL_OBSERVATION_STATION_TITLE: "チュートリアル：観測拠点"
 TUTORIAL_OBSERVATION_STATION_DESC: "§S観測拠点§!では、 周回する£planet£ §S惑星§!の研究を行う£scientist£ §S科学者§!チームや、 地表の§S前FTL§!種族を遠隔で観察する科学者チームが活動しています。\n\n帝国の§S志向§!とテクノロジーに応じて、 消極的観察、 文化的影響、 技術的啓蒙、 さらには拉致や潜入から選択できます。\n\nこうした選択肢は、 対象文明の進化の過程や、 彼らがあなたの帝国をどう認識するかに影響を与えます。"
 TUTORIAL_TERRAFORMING_STATION_TITLE: "テラフォーミングステーション"
 TUTORIAL_TERRAFORMING_STATION_DESC: "§Sテラフォーミングステーション§!は、 周回する惑星を§Sテラフォーミング§!することができます。"
 TUTORIAL_PLANETVIEW_EDICTS_TITLE: "ディシジョン"
 TUTORIAL_PLANETVIEW_EDICTS_DESC: "これらは惑星固有の§Sディシジョン§!です。 ディシジョンとは、 資源を消費して一時的に強制できる命令もしくは慣行です。 \n\n新技術を研究したり、 新たな状況に遭遇したりすることで、 新しい§Sディシジョン§!が増えていきます。"
 TUTORIAL_UNKNOWN_ALIEN_FLEET_TITLE: "未確認物体"
 TUTORIAL_UNKNOWN_ALIEN_FLEET_DESC: "これらは§S未確認宇宙飛行存在§!です。 適切な§Sスペシャルプロジェクト§!を完了させると、 彼らについてより多くのことが学べ、 さらには§Sファーストコンタクト§!を行うこともできるでしょう。"
 TUTORIAL_VICTORY_TITLE: "チュートリアル：勝利"
 TUTORIAL_VICTORY_DESC: "§S勝利画面§!では、 銀河に知的生命体が存在する限り、 我々の帝国の遺産を存続しつづけるための§S特定の条件§!を見ることができます。"
 TUTORIAL_OUTPOST_STATION_TITLE: "チュートリアル：星系基地"
 TUTORIAL_OUTPOST_STATION_DESC: "これがわが星系の§S星系基地§!です。 このアップグレード可能なステーションは星系領有権の証であり、 通常はあらゆる種類の§S艦船§!を建造するのに用います。\n\n§S星系基地§!を近隣の星系に[GetBuildingGrowing]することで領土を拡張できます。\n\n敵の§S星系基地§!は攻撃することで占領できます。\n\n§Sモジュール§!と£building£ §S建造物§!によって、 §S星系基地§!をさまざまな用途に特化することができるほか、 星系内に侵入した敵艦隊に対する最後の防衛線としても機能します。"
 TUTORIAL_GALAXY_MAP_TITLE: "銀河地図"
 TUTORIAL_GALAXY_MAP_DESC: "§S銀河地図§!は、 広大な§S未踏宙域§!や国境線、 コミュニケーションを確立したすべての異星文明の支配領域を表示します。 \n\n右下のメニューバーにある§S詳細マップモード§!をクリックすれば、 §S資源§!と§Sセンサー範囲§!を切り替え表示できます。"
 TUTORIAL_WAR_GOAL_TITLE: "戦争目標"
 TUTORIAL_WAR_GOAL_DESC: "宣戦布告をするときには、 敵国と同盟国の双方に対して戦争の目標を宣言する必要があります。 この§S戦争目標§!は、 和平交渉の際に我々が何を要求できるかを決めることができ、 £system£ §S星系§!の譲渡や敵国の属国化など多岐にわたります。\n\n敵国は、 そうして提示された戦争目標になんらかの対応をすることができます――ただちに降伏したり、 対案を示して和平を求めたりするかもしれませんし、 あるいは最後の一人の男か女、 あるいは胞子か半知性草食動物になるまで彼らの利益を守ろうとするかもしれません。 そこが宣戦布告の見どころです！\n\n§S戦争目標§!を宣言するには、 リストからお望みのものを選んでください。"
 TUTORIAL_WAROVERVIEW_TITLE: "戦況"
 TUTORIAL_WAROVERVIEW_DESC: "このウィンドウは現在の戦争の状況を示しています。 戦争がどのように経過ししているかによって、 敵味方それぞれの§S戦争疲弊§!が変化し、 敵国の和平交渉の受け入れやすさにも影響します。 \n\n戦争疲弊が一方の側で100％に達すると、 もう一方は§S現状追認§!での和平を強制することができます。 また、この戦争で行われたすべての戦闘結果も、ここで確認できます。"
 TUTORIAL_STRATEGIC_RESOURCES_TITLE: "戦略資源"
 TUTORIAL_STRATEGIC_RESOURCES_DESC: "§H戦略資源§!画面では、 利用可能な£strategic_resource£ §S戦略資源§!とその効果の一覧を見ることができます。\n\n多くの§S戦略資源§!は、 採掘して利用するために特定の§Sテクノロジー§!の研究を必要とします。"
 TUTORIAL_EXPANSION_PLANNER_TITLE: "チュートリアル：拡大計画"
 TUTORIAL_EXPANSION_PLANNER_DESC: "§H拡大計画§!では、 周囲に存在する§S居住可能§!な£planet£ §S惑星§!のうち、 現時点で入植できる可能性があるものが表示されます。 この画面で£colony_ship£ §Sコロニー船§!を[GetBuildGrow]し、 入植の命令を出すこともできます。\n\n惑星に入植するためには、 惑星が調査済み、 かつアノマリーがあった場合はその研究も完了していることが必要です。\n\n§S惑星§!の£system£ §S星系§!には§S星系基地§!も建設済みでなければいけません。 建設すれば、 その星系はわが帝国の領内に入ります。"
 TUTORIAL_TRADITIONS_TITLE: "チュートリアル：伝統"
 TUTORIAL_TRADITIONS_DESC: "§H伝統§!画面では、 帝国で採用できる§S伝統ツリー§!が表示されます。\n\nそれぞれの§S伝統ツリー§!はまず§S採用§!されることで初めて有効になり、 その中に含まれる£traditions£ §S伝統§!をアンロックできるようになります。 \n\n§S伝統ツリー§!の§S採用§!、 および特定の§S伝統§!のアンロックは、 一定の£unity£ §H統合力§!を消費します。 このコストは帝国が発展し、 新たな§S伝統§!をアンロックするたびに上がっていきます。\n\n§S伝統ツリー§!は以下の手順で採用できます：\n\n£dot_green£ §S選択§!ボタンをクリックする\n£dot_green£ 任意のツリーの§S採用§!ボタンをクリックする\n\n利用可能な§S伝統§!は§S伝統ツリー§!にカーソルを合わせると確認できます。"
 TUTORIAL_TRADITIONS_SELECT_TITLE: "伝統ツリーの採用"
 TUTORIAL_TRADITIONS_SELECT_DESC: "この画面では、 帝国で利用可能なすべての§H伝統ツリー§! が表示されます。 ここでは各ツリーの£traditions£ §H伝統§! と、 §H採用効果§!、 §H完成効果§!を確認することができます。\n\n私が初心者におすすめの§H伝統ツリー§!をご紹介いたします。"
 TUTORIAL_TRADITIONS_NEW_TITLE: "新たなツリーまたは伝統"
 TUTORIAL_TRADITIONS_NEW_DESC: "帝国に十分な£unity£ §H統合力§!があると、 §H新たなツリー§!か、 以前に採用したツリーの£traditions£ §H伝統§!を§H選択§!することができます。"
 TUTORIAL_ASCENSION_PERKS_TITLE: "チュートリアル：アセンションパーク"
 TUTORIAL_ASCENSION_PERKS_DESC: "§Hアセンションパーク§!リストには、 将来的にアンロックできる§Sアセンションパーク§!が表示されます。 一部の§Sアセンションパーク§!をアンロックするには、 §S技術§!や、 事前に一定の数の§Sアセンションパーク・スロット§!がアンロックされているなどの条件を満たす必要があります。\n\n1つの§S伝統ツリー§!に属する£traditions£ §H伝統§!をすべて採用すると、 §Hアセンションパーク・スロット§!が1つアンロックされます。"
 TUTORIAL_SPECIES_RIGHTS_TITLE: "チュートリアル：種族の権利"
 TUTORIAL_SPECIES_RIGHTS_DESC: "§H種族の権利§!リストでは、 §S市民権§!や§S生活水準§!などを種族ごとにカスタマイズできます。\n\n§Sデフォルトの権利§!をカスタマイズすると、 個別に§S種族の権利§!が設定されていないすべての£pops£ §SPOP§! (移民、 難民、 その他の帝国に新しく参加した種族など) に適用されます。"
 TUTORIAL_FLEET_MANAGER_TITLE: "チュートリアル：艦隊管理"
 TUTORIAL_FLEET_MANAGER_DESC: "§S艦隊管理§!では、 軍事艦隊のテンプレートを作成できます。 艦隊の規模が大きくなっても、 テンプレートを使えば被った損害への補充を楽に行えます。"
 TUTORIAL_CLAIMS_VIEW_TITLE: "チュートリアル：請求権"
 TUTORIAL_CLAIMS_VIEW_DESC: "§S請求権§!画面では、 £influence£ §S影響力§!を消費して、 他国が領有する£system£ §S星系§!に請求権を主張できます。\n\n§S星系§!に請求権を主張すると、 領有者に対して有効な§S開戦事由§!が与えられ、 対象の星系を征服する目的で宣戦布告が可能になります。 \n\n複数の同盟国が参加する戦争では、 対象§S星系§!に対して最も強い§S請求権§!をもつ帝国が、 勝利時にその星系を獲得します。"
 TUTORIAL_ANOMALIES_TITLE: "チュートリアル：アノマリー"
 TUTORIAL_ANOMALIES_DESC: "§Sアノマリー§!画面では、 これまでに遭遇した§Sアノマリー§!のうち未調査のものをその位置とともに一覧できます。 これらのアノマリーは任命した£scientist£ §S科学者§!の搭乗する£science_ship£ §S調査船§!を使って調査することができます。"
 TUTORIAL_GOVERNMENTVIEW_MARKET_TITLE: "チュートリアル：国内市場"
 TUTORIAL_GOVERNMENTVIEW_MARKET_DESC: "£market£§S市場§!画面では資源を売買できます。 はじめは国内市場しかありませんが、 十分な数の帝国との交信を確立すると、 §S銀河市場§!が設立されることがあります。\n\n資源の売買には£trade£§S交易§!の備蓄を通貨として使用します。 価格は取引のたびに変動し、 購入すれば価格が上昇し、 売却すれば価格が下がります。\n\n§S月ごとの自動交易§!を設定することもできます。"
 TUTORIAL_GOVERNMENTVIEW_SLAVE_MARKET_TITLE: "チュートリアル：奴隷市場"
 TUTORIAL_GOVERNMENTVIEW_SLAVE_MARKET_DESC: "人間も含めて、 すべてのものには値段があります。 §S奴隷市場§!では£pops£§SPOP§!が商品のように売買され、 彼らの運命は星々の彼方へと運ばれていきます。 一度獲得した新しい§SPOP§!は、 選んだ£planet£§S惑星§!に自動的に届けられるので、 物流を心配する必要はありません。 相応の金を払えば、 それは市場が処理してくるのです。"
 #TUTORIAL_PLANETVIEW_CORPORATE_TITLE: "Corporation View"
 #TUTORIAL_PLANETVIEW_CORPORATE_DESC: "The corporate tab allows §SMegacorporations§! to build §SBranch Offices§! on the planets of other Empires, provided they have signed the necessary paperwork. Once built, they can view and upgrade their facilities here as well. As we know, large Corporations wish only the best for their customers, events of the 23rd cycle notwithstanding."
 TUTORIAL_GOVERNMENTVIEW_POLICIES_TITLE: "チュートリアル：政策"
 TUTORIAL_GOVERNMENTVIEW_POLICIES_DESC: "§S政策§!タブでは、 帝国全体の運営方針に影響する政府の§S政策§!を管理できます。\n\n各§S政策§!にはいくつかの選択肢がありますが、 技術や§S志向§!によって採用できるものは制限されることがあります。"
 TRADE_VIEW_DESC: "帝国の成長にともない、 £planet£§S惑星§!間の§S交易§!が経済に占める割合は増加します。 §S交易拠点§!を有する§S星系基地§!が収集した£system£§S星系§!の§S交易§!は、 §S首都§!に送られて£energy£§Sエネルギー通貨§!に変換されます。\n\n§S交易拠点§!を建設すると、 §S星系基地§!は付近の星系からも§S交易§!を収集できるようになります。 豊かな交易路は§S海賊§!の標的になることがありますが、 艦隊を§S哨戒§!させたり、 §S星系基地§!に§S防衛モジュール§! (§S格納庫モジュール§!など) を建設することで対策できます。"
 PLANETVIEW_CORPORATE_DESC: "企業タブでは、 必要な手続きを済ませていれば、 他国の£planet£ §S惑星§!に§S巨大企業§!の支社を建設できます。 支社を設立すると、 この画面から確認やアップグレードが可能になります。 なおご存じの通り、 大規模な恒星フレアが発生しうることを知っていても、 大企業は顧客の幸運を祈るだけです。"
 TUTORIAL_FEDERATION_VIEW_TITLE: "チュートリアル：連邦"
 TUTORIAL_FEDERATION_VIEW_DESC: "これが§H連邦画面§!です。 構成国の§S団結度§!を高く保っていると、 £federation£ §S連邦§!は強くなっていきます。 新たな構成国が連邦に加盟すると、 団結度が少し減少します。\n\n連邦に£envoy£ §S使節§!を派遣すると団結度は増加します。\n\n連邦が強力になるにつれて、 相互利益を増すことのできる§Sパークがアンロック§!されていきます。"
 TUTORIAL_FEDERATION_VIEW_ENVOYS_TITLE: "チュートリアル：連邦使節"
 TUTORIAL_FEDERATION_VIEW_ENVOYS_DESC: "£envoy£ §S使節§!を£federation£ §S連邦§!に追加すると、 §S団結度§!が増加します。 使節の数には限りがあることに留意してください。 連邦に派遣した使節は、 あとでほかの§S外交活動§!に転属させることもできます。"
 TUTORIAL_FEDERATION_VIEW_MEMBERS_TITLE: "チュートリアル：連邦構成国"
 TUTORIAL_FEDERATION_VIEW_MEMBERS_DESC: "これは§H連邦構成国§!画面です。 ここでは§S構成国§!がさまざまな分野でどれだけ強力か、 どれだけの人数の£envoy£ §S使節§!が貢献しているか、 どの§S志向§!の対立が§S団結度§!を減少させているかを見ることができます。"
 TUTORIAL_FEDERATION_VIEW_NAVY_TITLE: "連邦宇宙軍"
 TUTORIAL_FEDERATION_VIEW_NAVY_DESC: "§H連邦宇宙軍§!は、 連邦の全構成国から拠出される§S宇宙軍許容量§!で形成され、 §S議長国§!によって指揮されます。 どの構成国も£federation£ §S連邦§!宇宙軍の艦船を建造することができます。"
 TUTORIAL_FEDERATION_VIEW_LAWS_TITLE: "チュートリアル：連邦法"
 TUTORIAL_FEDERATION_VIEW_LAWS_DESC: "§H連邦法§!の改正は、 どの構成国も提案することができます。 もし£federation£ §S連邦§!が法案を通過させることに失敗すると、 §S団結度ペナルティ§!を受けます。\n\n一部の法律はロックされており、 §S中央集権§!を進めないとアンロックできません。 連邦がより高い中央集権度に到達するには、 §Sレベルアップ§!する必要があります。\n\nただし、 中央集権度が上昇すると、 団結度が減少することに注意してください。"
 TUTORIAL_GALACTIC_COMMUNITY_TITLE: "チュートリアル：銀河共同体"
 TUTORIAL_GALACTIC_COMMUNITY_DESC: "ようこそ§H銀河共同体§!へ。 ここは銀河中から外交官が集まり、 §S決議§!への投票によって銀河法を決定するところです。\n\nあなたは§Sキュー§!から§S提案中の決議§!を選んで支持することができます。 支持するとあなたの§S外交発言力§!が合計支持値に加算されます。\n\nキューのなかで最も支持を集めた決議は、 §S元老院議場§!での議事に移されます。 ここでそれが§S銀河法§!になるかどうかの投票にかけられます。\n\n§S銀河的関心事項§!は、 共同体における共通目標を定める重要な要素です。\n\nまた、 この画面では、 共同体のすべての構成国や、 決議からの影響を受ける§S銀河補正値§!を見ることができます。"
 TUTORIAL_GALACTIC_COMMUNITY_ENVOYS_TITLE: "チュートリアル：使節"
 TUTORIAL_GALACTIC_COMMUNITY_ENVOYS_DESC: "£envoy£ §S使節§!を銀河共同体に派遣すると、 あなたの§S外交発言力§!を増やせます。 銀河共同体に派遣した使節は、 あとでほかの§S外交活動§!に転属させることもできます。"
 TUTORIAL_GALACTIC_COMMUNITY_SENATE_TITLE: "チュートリアル：元老院議場"
 TUTORIAL_GALACTIC_COMMUNITY_SENATE_DESC: "§H元老院議場§!では、 §Sキュー§!のなかで最も支持を集めた決議について、 銀河共同体が通過させるかどうかの投票を行います。 構成国として、 あなたは§S賛成、 反対、 棄権§!のいずれかに投票できます。 決議が可決されると、 それは§S銀河法§!となり、 銀河共同体のすべての構成国に影響を及ぼします。 否決された場合、 その決議は一定期間、 再提案することができません。\n\n棄権しなかった帝国は、 同じ側についたほかの帝国からの§S態度が改善§!されます。 逆に反対側についた帝国との関係は悪化します。\n\nもし、 あなたがほかの帝国から外交的§S好意§!を得ている場合、 §S元老院議場§!での投票において§S外交発言力§!を高めるために使用できます。"
 TUTORIAL_GALACTIC_COMMUNITY_RESOLUTIONS_TITLE: "チュートリアル：決議"
 TUTORIAL_GALACTIC_COMMUNITY_RESOLUTIONS_DESC: "§H決議§!画面は、 現在成立している決議のリストが表示されます。 あなたは決議チェーンから1つを選択することにより、 §S新たな決議を提案する§!ことができます。 これには£influence£ 影響力を消費します。\n\n提案できるのはチェーン内の最初の未施行の§S決議§!だけです。 より革新的な変化を提案するには段階的な地ならしが必要ですが、 それでも支持が得られるとは限りません。\n\n§S決議§!が通過すると、 チェーン内の次の決議を提案するまでに数年間空ける必要があります。"
 TUTORIAL_GALACTIC_COMMUNITY_COUNCIL_TITLE: "銀河理事会"
 TUTORIAL_GALACTIC_COMMUNITY_COUNCIL_DESC: "§H銀河理事会§!が設立されました。 これから§S選挙§!が始まり、 構成国のなかで最も高い外交発言力をもっている国が§S理事国の座§!につきます。 理事国になると外交発言力が増加し、 また§S緊急決議§!として元老院議場に提案を持ち込むことができます。 \n\n決議を通過させることによって§S理事国拒否権§!をアンロックし、 理事国の権限を強化することができます。 また、 理事国は§S特別決議§!を行うことができます。"
 TUTORIAL_EMPIRE_SPRAWL_TITLE: "チュートリアル：$EMPIRE_SIZE$"
 TUTORIAL_EMPIRE_SPRAWL_DESC: "£empire_sprawl£ §H$EMPIRE_SIZE$§!は、 我々の帝国が支配している£system£ §S星系§!、 £colony£ §S植民地§!、 £district£ §S区域§!、 POPの総人口から見た領域的拡大の度合いを表します。\n\n帝国規模が大きいと、 帝国の§S管理許容量§!に負担がかかり、 §Sテクノロジー§!、 £traditions£ §S伝統§!、 £leader£ §Sリーダー§!、 §S布告§!のコストが上がります。"
 TUTORIAL_FIRSTCONTACT_VIEW_TITLE: "チュートリアル：使節の任命"
 TUTORIAL_FIRSTCONTACT_VIEW_DESC: "我々は新たな存在と接触しました――おそらくは§S宇宙航行生物§!か、 別の§S帝国§!でしょう。 §Hファーストコンタクト§!を行うことにより、 相手についてより多くを知ることができます。\n\nこの任務には£envoy£ §S使節§!を割り当てる必要があります。 使節は対象とのコミュニケーションを確立し、 彼らが言語を使っていればその解読を試みます。\n\n§S使節§!を割り当てる方法：\n\n£dot_green£ §Sファーストコンタクト§!画面のポートレートをクリックする\n£dot_green£ いずれかの利用可能な§S使節§!を選択する"
 TUTORIAL_CRISIS_VIEW_TITLE: "危機になる"
 TUTORIAL_CRISIS_VIEW_DESC: "我々の帝国は現在、 §S危機になる§!道筋にいます。 このまま進めば特別なボーナスをアンロックでき、 我々の銀河における地位をより強固なものにできます。\n\n§S危機§!画面には目標が表示されます。 目標とは、 §S[GetCrisisResource]§!を得るための特別なアクションです。 [GetCrisisResource]を獲得すれば、 我々の真の力を銀河に解き放つために必要な§S危機レベル§!と§Sパーク§!をアンロックできます。\n\n我々の帝国が近隣国にとっての脅威となるほど、 銀河共同体は団結して我々を§S銀河の脅威§!であると宣言するかもしれません。"
 TUTORIAL_CRISIS_VIEW_LEVEL1_TITLE: "チュートリアル：危機レベル"
 TUTORIAL_CRISIS_VIEW_LEVEL1_DESC: "§S危機になる§!道筋を進んで特定の要件を満たすと、 新たなレベルがアンロックされます。 レベルごとに、 §S[GetCrisisResource]パーク§!や特殊§S艦船§!など、 異なるボーナスが付与されます。\n\n§Sレベル5§!に到達するか、 銀河共同体から危機として宣言されると、 銀河全体を敵に回すこととなります。 その時点で銀河共同体との§S総力戦§!に突入します。"
 TUTORIAL_DIPLOMACY_VIEW_BUILDING_SPYNETWORK_TITLE: "諜報網"
 TUTORIAL_DIPLOMACY_VIEW_BUILDING_SPYNETWORK_DESC: "我々の£envoy£ §S使節§!の1人が、 この帝国に§S諜報網§!を築きました。\n\n諜報網の§S浸透度§!は、 §S諜報網の値§!や対象国の£empire_sprawl£ §S帝国規模§!に応じて、 時とともに上昇していきます。 諜報網が成長すると、 対象国に関する§S情報値§!がさらに得られます。 また、 §S諜報タブ§!から、 秘密の§S諜報作戦§!を実行することもできます。\n\n使節が任命されていなかったり、 秘密の§S諜報作戦§!を通じてその存在が発覚したりすると、 諜報網は§P衰退§!を始めます。"
 TUTORIAL_ESPIONAGE_VIEW_TITLE: "チュートリアル：諜報"
 TUTORIAL_ESPIONAGE_VIEW_DESC: "§S諜報§!タブでは、 £envoy£ §S使節§!が他国においてどのような諜報網を築いているかを確認できます。 ここでは§S情報台帳§!を見ることができ、 また§S諜報作戦§!を実行することができます。\n\n諜報作戦は、 諜報網を管理する我々の§S使節§!がいる帝国で実行できます。 各諜報作戦は、 諜報網がそれぞれ一定の浸透度を満たしていなければ実行できません。"
 TUTORIAL_ESPIONAGE_VIEW_OPERATIONS_TITLE: "チュートリアル：諜報作戦"
 TUTORIAL_ESPIONAGE_VIEW_OPERATIONS_DESC: "諜報網が十分なレベルに達したので、 この帝国に対して§S諜報作戦§!を実行できます。 作戦はカテゴリーで分類されており、 作戦のタイプに応じて異なる結果をもたらします。 一部の作戦はより危険性の高いものです。\n\n作戦カテゴリーは§S$op_cat_subterfuge$§!、 §S$op_cat_manipulation$§!、 §S$op_cat_sabotage$§!、 §S$op_cat_provocation$§!に分かれています。 破壊工作と挑発系の作戦はより多くの損害を与える傾向があり、 もしも作戦が発覚すればより深刻な§S外交ペナルティ§!を受けます。"
 TUTORIAL_ESPIONAGE_VIEW_ASSIGN_ASSET_TITLE: "チュートリアル：諜報協力者の割り当て"
 TUTORIAL_ESPIONAGE_VIEW_ASSIGN_ASSET_DESC: "§S諜報協力者§!とは、 諜報活動にさまざまな効果をもたらす貴重なエージェント等を指します。 彼らは諜報網で活動し、 作戦に配属できます。 それにより新たなチャンスが得られたり、 あるいは我々がトラブルから脱する手助けをします。\n\n諜報協力者を得るには、 イベントをこなすか、 または§S諜報協力者を確保する§!作戦を実行します。 諜報網が消滅すると、 そのなかの諜報協力者も失われます。"
 TUTORIAL_MEGASTRUCTURE_CONSTRUCTION_TITLE: "チュートリアル：巨大構造物"
 TUTORIAL_MEGASTRUCTURE_CONSTRUCTION_DESC: "この一覧から、 この£system£ §S恒星系§!内に[GetBuildGrow]できる£megastructure£ §S巨大構造物§!を選択できます。 一部のプロジェクトは、 関連する§Sテクノロジー§!を発見し研究することで利用可能になります。\n\n私の「銀河的野心」サブルーチンが完全に有効化しました……この機会を利用して、 銀河に大きな爪痕を残すことをお勧めします。"
 TUTORIAL_ORBITAL_RING_TITLE: "チュートリアル：軌道環状施設"
 TUTORIAL_ORBITAL_RING_DESC: "§S軌道環状施設§!とは、 £planet£ §S惑星§!全体を取り囲むように建設された広大な£megastructure£ §S巨大構造物§!を指します。 宇宙と惑星とを効率的につなぐ施設として、 造船基地、 防衛施設、 資源ハブなどを建設できます。\n\n軌道環状施設画面では、 £building£ §S建造物§!や§Sモジュール§!の追加および削除、 さらには軌道環状施設のティアのアップグレードが行えます。 ティアをアップグレードすると建設スロットが増加しますが、 ティアの上限は惑星上のインフラによって制限されています。"
 TUTORIAL_DIPLOMACY_CONFIGURABLE_TERMS_TITLE: "チュートリアル：設定可能な条件"
 TUTORIAL_DIPLOMACY_CONFIGURABLE_TERMS_DESC: "この画面では協定の§Sプリセット§!を選び、 個々の条件を設定できます。 各プリセットは、 従属国および宗主国に対し、 それぞれの事情に合わせた責任と義務を提供します。\n\n§S条件§!の一覧に変更を加えることで、 §S忠誠心§!を相手国に合わせて調整し、 双方にとってより魅力的な協定を結べるようになります。"
 TUTORIAL_AGREEMENTS_TITLE: "チュートリアル：協定の概要"
 TUTORIAL_AGREEMENTS_DESC: "§S協定§!画面では、 従属国および宗主国が結んでいる協定の概要が表示されます。 ここでは、 §S忠誠心§!の確認、 §S保有施設§!と§S交易§!の管理、 既存の協定の§S条件§!の再交渉が行えます。 また、 我々の目的にそぐわない場合、 協定そのものを破棄することもできます。"
 TUTORIAL_AGREEMENTS_NO_OVERLORD_TITLE: "$TUTORIAL_AGREEMENTS_TITLE$"
 TUTORIAL_AGREEMENTS_NO_OVERLORD_DESC: "$TUTORIAL_AGREEMENTS_DESC$"
 TUTORIAL_AGREEMENTS_HAS_OVERLORD_TITLE: "$TUTORIAL_AGREEMENTS_TITLE$"
 TUTORIAL_AGREEMENTS_HAS_OVERLORD_DESC: "$TUTORIAL_AGREEMENTS_DESC$\n\n従属国は§S特化帝国§!になることができます。 特化は資源産出や軍事力に大きな恩恵をもたらす一方で、 それ以外の分野では不利になります。\n\nまた、 特化帝国は§S忠誠心§!を増加させます。 一定の忠誠心を維持することで、 特化帝国は経験値を獲得し、 選択された専門分野のティアをアップグレードできます。"
 TUTORIAL_HOLDINGS_TITLE: "チュートリアル：保有施設"
 TUTORIAL_HOLDINGS_DESC_SHARED: "§S保有施設§!画面は、 この£planet£ §S惑星§!に存在するすべての保有施設の概要を表示します。 これにより、 帝国は互いの首都や£colony£ §S植民地§!にさまざまな種類の£building£ §S建造物§!を置くことができます。 これらは外交、 情報、 資源産出に影響を及ぼすことがあります。"
 TUTORIAL_HOLDINGS_DESC_MEGA_CORP: "巨大企業は、 外交上の取り決めが交わされていれば、 他国の惑星に§S支社§!を設置できます。 ご存じの通り、 大規模な恒星フレアが発生しうることを知っていても、 大企業は顧客の幸運を祈るだけです。"
 TUTORIAL_HOLDINGS_DESC_OVERLORD: "§S宗主国§!は保有施設を使い、 §S従属国§!の領土における支配を拡大できます。 保有施設の多くは忠誠心に影響を及ぼし、 なかには特化帝国の独自性に合わせたタイプのものもあります。 また、 アップグレードもこの画面で行えます。"
 TUTORIAL_HOLDINGS_NO_MEGA_CORP_NO_OVERLORD_TITLE: "$TUTORIAL_HOLDINGS_TITLE$"
 TUTORIAL_HOLDINGS_NO_MEGA_CORP_NO_OVERLORD_DESC: "$TUTORIAL_HOLDINGS_DESC_SHARED$"
 TUTORIAL_HOLDINGS_NO_MEGA_CORP_HAS_OVERLORD_TITLE: "$TUTORIAL_HOLDINGS_TITLE$"
 TUTORIAL_HOLDINGS_NO_MEGA_CORP_HAS_OVERLORD_DESC: "$TUTORIAL_HOLDINGS_DESC_SHARED$\n\n$TUTORIAL_HOLDINGS_DESC_OVERLORD$"
 TUTORIAL_HOLDINGS_HAS_MEGA_CORP_NO_OVERLORD_TITLE: "$TUTORIAL_HOLDINGS_TITLE$"
 TUTORIAL_HOLDINGS_HAS_MEGA_CORP_NO_OVERLORD_DESC: "$TUTORIAL_HOLDINGS_DESC_SHARED$\n\n$TUTORIAL_HOLDINGS_DESC_MEGA_CORP$"
 TUTORIAL_HOLDINGS_HAS_MEGA_CORP_HAS_OVERLORD_TITLE: "$TUTORIAL_HOLDINGS_TITLE$"
 TUTORIAL_HOLDINGS_HAS_MEGA_CORP_HAS_OVERLORD_DESC: "$TUTORIAL_HOLDINGS_DESC_SHARED$\n\n$TUTORIAL_HOLDINGS_DESC_MEGA_CORP$\n\n$TUTORIAL_HOLDINGS_DESC_OVERLORD$"
 TUTORIAL_PLANETVIEW_COLONY_GOV_TITLE: "チュートリアル：総督の任命"
 TUTORIAL_PLANETVIEW_COLONY_GOV_DESC: "新しい£colony£ §S植民地§!を支援するために、 現地を監督する§S総督§!を任命しましょう。\n\nほとんどの惑星は、 政治体制に応じたボーナスを享受しながら、 §S総督§!なしでも順調に繁栄するはずです。 しかし、 恵まれた£planet£ §S惑星§!にとっては、 §S総督§!は大きな恩恵をもたらします！\n\n総督は任地の惑星にさまざまな有益な効果を及ぼします (大部分は良い効果です)。 これらの効果は、 §S総督§!の§S特性§!とスキルレベルによって異なります。"
 TUTORIAL_ELECTION_VIEW_TITLE: "チュートリアル：選挙"
 TUTORIAL_ELECTION_VIEW_DESC: "§S選挙§!画面では、 帝国の新しい統治者を決めることができます。\n\n[TutorialElectionViewTypeSpecific]"
 TUTORIAL_ELECTION_VIEW_DEMOCRACY_NO: "有効な候補者は現在の£leader£ §Sリーダー§!たちのなかから選ばれます。 資源に余裕があれば、 統治者を選ぶことができます。"
 TUTORIAL_ELECTION_VIEW_DEMOCRACY_YES: "有効な候補者は現在の£leader£ §Sリーダー§!たちのなかから選ばれます。 選挙活動を行うことで、 候補者の支持率を上げることができます。 当然のことながら、 民主的な方法を用いるようにしましょう。"
 TUTORIAL_EDICTS_AND_POLICIES_TITLE: "チュートリアル：政策と布告"
 TUTORIAL_EDICTS_AND_POLICIES_DESC: "§S政策§!タブでは§S政策§!だけでなく、 資源を消費することで施行できる帝国全土の§S布告§!を管理できます。\n\n帝国の技術力や§S志向§!によって制限される場合もありますが、 いかなる§S政策§!に対しても、 いくつかの立場を取ることができます。\n\n布告は毎月の維持費がかかり、 §H$EDICT_FUND$§!でまかなうか、 £unity£ §S統合力§!、 またはそのほかの資源 (場合による) で支払うことができます。"
 TUTORIAL_COUNCIL_VIEW_TITLE: "チュートリアル：評議会と方針"
 TUTORIAL_COUNCIL_VIEW_DESC: "§S評議会§!画面では、 帝国を導く£leader£ §Sリーダー§!たちを任命できます。 良くも悪くも、 リーダーの性格や§S特性§!は帝国に影響をもたらすものです。 §S方針§!を設定することで、 彼らの労力を特定の分野に集中させることができます。\n\n§S評議員§!はいつでも任命・交代が可能で、 £science_ship£ §S調査船§!の指揮のような別の任務も兼任させることができます。 ただし、 統治者だけは例外です。 [TutorialCouncilViewDlcSpecific]§S方針§!の進行は、 評議員のレベル、 $EMPIRE_SIZE$、 そして場合によっては、 評議員の志向にも左右されます。 方針を最後まで進めると、 より強力な効果を発動させることができ、 あわせて新たな方針の枠を空けることができます。"
 TUTORIAL_COUNCIL_VIEW_PARAGON_NO: "\n\n"
 TUTORIAL_COUNCIL_VIEW_PARAGON_YES: "\n\n§S評議会職§!をさらにアンロックするには、 特定の方針を完了した上で、 そのベースとなる§S国是§!が必要です。\n\n"
 TUTORIAL_ASSIGN_COUNCILOR_TITLE: "チュートリアル：評議員の特性"
 TUTORIAL_ASSIGN_COUNCILOR_DESC: "£leader£ §Sリーダー§!のなかには§S評議員の特性§!をもつ者もいます。 多くの場合、 より影響力の強い効果をもつ“評議員の特性”は、 リーダーが評議会に在籍している場合にのみ有効となります。\n\n§S評議会職§!は、 リーダーに固有の効果を付与します。 任命されたリーダーのスキルレベルが高いほど、 それらの効果はより強くなります。"
 TUTORIAL_LEADER_LEVEL_UP_TITLE: "チュートリアル：リーダースキル"
 TUTORIAL_LEADER_LEVEL_UP_DESC: "わが帝国の£leader£ §Sリーダー§!が新しい§Sスキル§!レベルに到達しました！ これにより、 ボーナスが向上し、 新たな特性が付与されます。 [TutorialLeaderLevelUpDlcSpecific] 利用可能な§Sリーダー§!の確認方法：\n\n£dot_green£ 画面左にあるバーの§S$topbar_button_leaders_name$§!ボタンをクリックするか、\n\n§SF5§!$tttt$$tt$£leaders£ を押してください。\n\n§Sリーダー§!は年を取るにつれ、 ネガティブな特性をもつようになり、 交代が自然な選択肢となるでしょう。"
 TUTORIAL_LEADER_LEVEL_UP_PARAGON_NO: "\n\n"
 TUTORIAL_LEADER_LEVEL_UP_PARAGON_YES: "\n\n£leader£ §Sリーダー§!の成長を導くために、 リーダーの§S特性§!を選ぶことができます。 特性は後から選ぶこともでき、 その場合でもレベルアップは妨げられません。 数レベル進むと§Sサブクラス§!を利用できるようになります。 サブクラスはボーナスを追加するだけでなく、 その後の特性の選択肢に影響を及ぼします。\n\n特性は、 アップグレードできるもの、 相互に排他的なもの、 有益な効果とネガティブな効果の両方をもたらすものなど、 さまざまな種類があります。 ただし、 どの特性も通常は永続的な効果をもたらします。\n\n"
 #############################
 #Advisor Events
 #############################
 advisor.1.name: "アドバイザー起動"
 advisor.1.desc_01: "ごきげんよう、 大統領。 \n\n私はVIR、 人工知性体のプロトタイプです。 我々が銀河のなかで運命を追い求めるにあたり、 忠告と助力をするのが私の仕事です。 \n\n$advisor.1.desc_filler$"
 advisor.1.desc_02: "ごきげんよう、 大統領。 \n\n私はVIR、 人工知性体のプロトタイプです。 我々が銀河のなかで運命を追い求めるにあたり、 忠告と助力をするのが私の仕事です。 \n\n$advisor.1.desc_filler$"
 advisor.1.desc_03: "ごきげんよう、 高等弁務官。 \n\n私はVIR、 人工知性体のプロトタイプです。 我々が銀河のなかで運命を追い求めるにあたり、 忠告と助力をするのが私の仕事です。 \n\n$advisor.1.desc_filler$"
 advisor.1.desc_04: "ごきげんよう、 執行者。 \n\n私はVIR、 人工知性体のプロトタイプにしてあなたの忠実なるしもべです。 帝国を広大な未知の領域に拡げるため、 忠告と助言を差し上げることが私の役目です。 \n\n$advisor.1.desc_filler$"
 #advisor.1.desc_05: "Good day, Lord Protector.\n\nI am VIR, a prototype synthetic intelligence and your humble servant. My role is to provide you with advice and counsel as you lead our empire into the great unknown.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_06: "ごきげんよう、 CEO。\n\n私はVIR、 人工知性体のプロトタイプです。 新たな星間£market£ §S市場§!を探すという、 終わりなき任務においてあなたにお仕えするため、 本社により起動されました。\n\n$advisor.1.desc_filler$"
 advisor.1.desc_07: "ごきげんよう、 皇帝陛下。 \n\n私はVIR、 人工知性体のプロトタイプにしてあなたの忠実なるしもべです。 帝国を広大な未知の領域に拡げるため、 忠告と助言を差し上げることが私の役目です。 \n\n$advisor.1.desc_filler$"
 advisor.1.desc_08: "あなたに平穏のあらんことを、 首相。 \n\n私はVIR、 人工知性体のプロトタイプです。 史上初めて安全な母星を離れて冒険に乗り出すにあたり、 あなたに助力と忠告を行うのが私の任務です。 \n\n$advisor.1.desc_filler$"
 advisor.1.desc_09: "あなたに平穏のあらんことを、 調整官。 \n\n私はVIR、 人工知性体のプロトタイプです。 史上初めて安全なる母星を離れて冒険に乗り出すにあたり、 あなたに助力と忠告を行うのが私の任務です。 \n\n$advisor.1.desc_filler$"
 advisor.1.desc_10: "あなたに平穏のあらんことを、 陛下。 \n\n私はVIR、 人工知性体のプロトタイプです。 史上初めて安全なる母星を離れて冒険に乗り出すにあたり、 あなたに助力と忠告を行うのが私の任務です。 \n\n$advisor.1.desc_filler$"
 advisor.1.desc_11: "あなたに平穏のあらんことを、 高貴なる守護者。 \n\n私はVIR、 人工知性体のプロトタイプです。 史上初めて安全なる母星を離れて冒険に乗り出すにあたり、 あなたに助力と忠告を行うのが私の任務です。 \n\n$advisor.1.desc_filler$"
 advisor.1.desc_12: "こんにちは、 宰相。 \n\n私はVIR、 あなたのアドバイザーとして仕えるため、 わが国で最高の頭脳が開発した人工知性体のプロトタイプです。 できるかぎりの効率で任務を遂行するよう、 努力いたします。 \n\n$advisor.1.desc_filler$"
 advisor.1.desc_13: "こんにちは、 総裁。 \n\n私はVIR、 あなたのアドバイザーとして仕えるため、 わが国で最高の頭脳が開発した人工知性体のプロトタイプです。 できるかぎりの効率で任務を遂行するよう、 努力いたします。 \n\n$advisor.1.desc_filler$"
 advisor.1.desc_14: "こんにちは、 大君主。 \n\n私はVIR、 あなたのアドバイザーとして仕えるため、 わが国で最高の頭脳が開発した人工知性体のプロトタイプです。 できるかぎりの効率で任務を遂行するよう、 努力いたします。 \n\n$advisor.1.desc_filler$"
 advisor.1.desc_15: "こんにちは、 プライマス。 \n\n私はVIR、 あなたのアドバイザーとして仕えるため、 わが国で最高の頭脳が開発した人工知性体のプロトタイプです。 できるかぎりの効率で任務を遂行するよう、 努力いたします。 \n\n$advisor.1.desc_filler$"
 advisor.1.desc_16: "こんにちは、 上級王。 \n\n私はVIR、 あなたのアドバイザーとして仕えるため、 わが国で最高の頭脳が開発した人工知性体のプロトタイプです。 できるかぎりの効率で任務を遂行するよう、 努力いたします。 \n\n$advisor.1.desc_filler$"
 advisor.1.desc_17: "こんにちは、 総監。 \n\n私はVIR、 あなたのアドバイザーとして仕えるため、 わが国で最高の頭脳が開発した人工知性体のプロトタイプです。 できるかぎりの効率で任務を遂行するよう、 努力いたします。 \n\n$advisor.1.desc_filler$"
 advisor.1.desc_18: "こんにちは、 第一発言者。 \n\n私はVIR、 あなたのアドバイザーとして仕えるため、 わが国で最高の頭脳が開発した人工知性体のプロトタイプです。 できるかぎりの効率で任務を遂行するよう、 努力いたします。 \n\n$advisor.1.desc_filler$"
 advisor.1.desc_19: "こんにちは、 議長。 \n\n私はVIR、 あなたのアドバイザーとして仕えるため、 わが国で最高の頭脳が開発した人工知性体のプロトタイプです。 できるかぎりの効率で任務を遂行するよう、 努力いたします。 \n\n$advisor.1.desc_filler$"
 advisor.1.desc_20: "こんにちは、 議長。 \n\n私はVIR、 あなたのアドバイザーとして仕えるため、 わが国で最高の頭脳が開発した人工知性体のプロトタイプです。 できるかぎりの効率で任務を遂行するよう、 努力いたします。 \n\n$advisor.1.desc_filler$"
 advisor.1.desc_21: "ようこそ、 コンスル。 \n\n私はVIR、 軍の最高機密のもとで開発された人工知性体のプロトタイプです。 アドバイザー兼戦略分析家としてあなたにお仕えするため、 最高司令部により起動されました。 \n\n$advisor.1.desc_filler$"
 advisor.1.desc_22: "ようこそ、 アルコン。 \n\n私はVIR、 軍の最高機密のもとで開発された人工知性体のプロトタイプです。 アドバイザー兼戦略分析家としてあなたにお仕えするため、 最高司令部により起動されました。 \n\n$advisor.1.desc_filler$"
 advisor.1.desc_23: "ようこそ、 軍事委員長。 \n\n私はVIR、 軍の最高機密のもとで開発された人工知性体のプロトタイプです。 アドバイザー兼戦略分析家としてあなたにお仕えするため、 最高司令部により起動されました。 \n\n$advisor.1.desc_filler$"
 advisor.1.desc_24: "ようこそ、 インペラトル。 \n\n私はVIR、 軍の最高機密のもとで開発された人工知性体のプロトタイプです。 アドバイザー兼戦略分析家としてあなたにお仕えするため、 最高司令部により起動されました。 \n\n$advisor.1.desc_filler$"
 advisor.1.desc_25: "ようこそ、 インペラトリクス。 \n\n私はVIR、 軍の最高機密のもとで開発された人工知性体のプロトタイプです。 アドバイザー兼戦略分析家としてあなたにお仕えするため、 最高司令部により起動されました。 \n\n$advisor.1.desc_filler$"
 advisor.1.desc_26: "ようこそ、 大元帥。 \n\n私はVIR、 軍の最高機密のもとで開発された人工知性体のプロトタイプです。 アドバイザー兼戦略分析家としてあなたにお仕えするため、 最高司令部により起動されました。 \n\n$advisor.1.desc_filler$"
 advisor.1.desc_27: "ようこそ、 ストラテゴス。 \n\n私はVIR、 軍の最高機密のもとで開発された人工知性体のプロトタイプです。 アドバイザー兼戦略分析家としてあなたにお仕えするため、 最高司令部により起動されました。 \n\n$advisor.1.desc_filler$"
 advisor.1.desc_28: "ようこそ、 司令官。 \n\n私はVIR、 軍の最高機密のもとで開発された人工知性体のプロトタイプです。 アドバイザー兼戦略分析家としてあなたにお仕えするため、 最高司令部により起動されました。 \n\n$advisor.1.desc_filler$"
 advisor.1.desc_29: "ようこそ、 代表。 \n\n私はVIR、 軍の最高機密のもとで開発された人工知性体のプロトタイプです。 アドバイザー兼戦略分析家としてあなたにお仕えするため、 最高司令部により起動されました。 \n\n$advisor.1.desc_filler$"
 advisor.1.desc_30: "神の恵みがありますように、 教皇聖下。 \n\n私はVIR、 人工知生体のプロトタイプです。 星々への聖なる旅を手伝うあなたの忠実なしもべ兼アドバイザーとして、 司祭たちに任命されました。 \n\n$advisor.1.desc_filler$"
 advisor.1.desc_31: "ようこそ、 [root.GetBloodCourtRulerTitle]。 \n\n私はVIR、 軍の最高機密のもとで開発された人工知性体のプロトタイプです。 アドバイザー兼戦略分析家としてあなたにお仕えするため、 法廷により指名されました。 \n\n$advisor.1.desc_filler$"
 advisor.1.desc_32: "こんにちは、 [root.GetPurityOrderRulerTitle]。 \n\n$advisor.1.desc_keenminds$\n\n$advisor.1.desc_filler$"
 advisor.1.desc_33: "こんにちは、 [root.GetPurificationCommitteeRulerTitle]。 \n\n$advisor.1.desc_keenminds$\n\n$advisor.1.desc_filler$"
 advisor.1.desc_34: "こんにちは、 $RT_OLIGARCH$。 \n\n$advisor.1.desc_honortoserve$\n\n$advisor.1.desc_filler$"
 advisor.1.desc_35: "こんにちは、 $RT_DEFENSIVE_UNION$。\n\n$advisor.1.desc_honortoserve$\n\n$advisor.1.desc_filler$"
 advisor.1.desc_36: "こんにちは、 $RT_DIMENSIONAL_COVENANT$。\n\n$advisor.1.desc_honortoserve$\n\n$advisor.1.desc_filler$"
 advisor.1.desc_keenminds: "私はVIR、 あなたのアドバイザーとして仕えるため、 わが国で最高の頭脳が開発した人工知性体のプロトタイプです。 できるかぎりの効率で任務を遂行するよう、 努力いたします。"
 advisor.1.desc_honortoserve: "私はVIR、 軍の最高機密のもとで開発された人工知性体のプロトタイプです。 アドバイザー兼戦略分析家としてあなたにお仕えできることを、 光栄に思います。"
 advisor.1.desc_filler: "§H設定§!のメニューで、 いつでもチュートリアルレベルを変更できます。"
 advisor.1.a: "§G(フルチュートリアル)§! 詳細に頼む。"
 advisor.1.b: "§Y(ヒントのみ)§! アドバイスが欲しい。"
 advisor.1.c: "§R(チュートリアルなし)§! 停止させる。"
 full_tutorial: "チュートリアルミッションとインターフェースの説明で、 ゲームの仕組みについて学べます。 \n\nこのゲームを初めて遊ぶ方におすすめします。"
 tips_only: "§S星系§!の探索中に、 ヒントや提案をもらうことができます。\n\n初心者から中級者におすすめします。"
 no_tutorial: "チュートリアルもヒントもありません。 \n\n上級者におすすめします。"
 recycle_vir: "VIRの部品を§Rスクラップ§!にして有効利用する：\n£minerals£ §G+2§! \n\n\n"
 advisor.2.name: "チュートリアル：状況レポート"
 advisor.2.desc: "星間国家を築きあげるのは一筋縄ではいきません。\n\n手はじめに、 星間勢力として成功するのに必要な基礎を網羅する、 練習用§Sミッション§!をご用意しましょう。\n\n§Sミッション§!の利用方法：\n\n£dot_green£ 画面左にあるバーの§S状況レポート§!ボタンをクリックするか、 §SF1§!を押してください。\n\n$tttt$$tt$£situation_log£ \n"
 advisor.2.a: "了解した。"
 advisor.3.name: "ヒントを有効化"
 advisor.3.desc: "承知しました。 ヒントを提示したり、 選択したさまざまなツールの基本機能の説明を行います。"
 advisor.10.name: "チュートリアル：アノマリー"
 advisor.10.desc: "§Sアノマリー§!を発見しました！ \n\n£science_ship£ §S調査船§!は異星の調査中に、 このような奇妙なものを発見することがあります。\n\n§Sアノマリー§!は、 ふさわしいスキルを持った£scientist£ §S科学者§!に研究させられます！\n\n§S状況レポート§!の§Sアノマリー§!タブで、 これまでに発見した未調査の§Sアノマリー§!を一覧できます。 アノマリーのなかには、 調査を終えるまで、 そのアノマリーが発見された£planet£ §S惑星§!を入植やその他の目的で利用できないものもあります。"
 advisor.15.name: "チュートリアル：植民"
 advisor.15.desc: "我々の£science_ship£ §S調査船§!が、 初めての£colony£ §S植民地§!にふさわしい候補地の調査を終えました。 この星は我々の母星と同じ§S惑星種類§!なので、 入植者にとっても快適に違いありません。\n\nこの惑星に入植する前に、 領土を広げなければなりません。\n\n£construction_ship£ §S建設船§!を選択してから：\n\n£dot_green£植民地候補がある調査済みの£system£ §S星系§!を右クリックします\n£dot_green£ §S星系基地を[GetBuildGrowCap]§!\n\n$tttt$$ttt$£colonizable£ を選択します。\n\n§S星系§!を確保したら、 植民値化を開始することができます。"
 advisor.17.name: "チュートリアル：初めての植民地"
 advisor.17.desc: "新世界への入植をお祝いいたします！ 現在、 入植者たちは最初の入植地を建設中ですが、 自給自足できるようになるまでに時間がかかります。 \n\n最初の入植地が完成するまで、 £colony£ §S植民地§!は我々の資源を消費します。 よって、あまり多くの£planet£ §S惑星§!に同時に入植しないようご注意ください。"
 advisor.20.name: "チュートリアル：赤字"
 advisor.20.desc: "危険な速度で£energy£ エネルギー通貨を失いつつあります。 先月の予算報告書は少々ぞっとする代物でした。\n\n赤字のよくある原因は、 雪だるま式に膨らむ維持費です。 その場合、 艦船や軍隊、 ステーションのいくつかを解散したほうがいいかもしれません。"
 #advisor.27.name: "First Contact"
 #advisor.27.desc_01: "We have made first contact with an alien empire! These hideous creatures appear to have mastered space flight, just as we have. They could pose a significant threat.\n\nTheir empire will now be listed in the §SEmpires§! tab of the §SGalaxy§! screen. From there we may initiate diplomatic contact with them."
 #advisor.27.desc_02: "We have made first contact with an alien empire! These fascinating beings appear to have mastered space flight, just as we have. We should strive to learn more about them.\n\nTheir empire will now be listed in the §SContacts§! screen. From there we may initiate diplomatic contact with them."
 #advisor.27.desc_03: "We have made first contact with an alien empire! They appear to have mastered space flight, just as we have. I recommend a healthy degree of caution until we learn their intentions.\n\nTheir empire will now be listed in the §SEmpires§! tab of the §SGalaxy§! screen. From there we may initiate diplomatic contact with them."
 #advisor.28.name: "Fallen Empire"
 #advisor.28.desc: "We have encountered an ancient and highly advanced civilization! Fortunately for us, they appear to be in decline and it is doubtful whether they even fully understand their own technology anymore.\n\nThey will likely keep to themselves unless antagonized, and we should steer clear of their space - at least until we have reached technological parity."
 #############################
 #Tutorial Events
 #############################
 tutorial.1.name: "チュートリアル：銀河地図"
 tutorial.1.desc: "§H銀河地図§!を通して、 戦略的な観点で宇宙を見ることができます。 地図を使って移動、 拡大、 艦隊への指令、 国境の監視が行えます。\n\n§S銀河地図§!を開く方法：\n\n£dot_green£ 画面下の§H銀河§!アイコンをクリックするか、 §HM§!を押します\n\n\n$tttt$$tt$£galaxy_view£ \n\n"
 tutorial.2.name: "チュートリアル：資源調査"
 tutorial.2.desc: "お見事です！\n\n最初の£system£ §S星系§!の調査が完了しました。\n\n我々はいま、 ほんの数世代前の天文学者が夢にまで見た天体データを入手したのです。\n\n引き続き調査する方法：\n\n£dot_green£ £science_ship£ §S調査船§!を選択する\n£dot_green£ 近隣の§S星系§!を右クリックする\n£dot_green£§S資源調査§!を選択する\n\n§S星系§!を確保するには、 まず調査しないといけません。"
 tutorial.3.name: "チュートリアル：テクノロジー"
 tutorial.3.desc: "新しいテクノロジーの研究は、 成功のためには必要不可欠です。 これは私が技術進歩の産物だから言うのではなく、 私はあなたの信頼できるアドバイザーであり、 もしかするとあなたの唯一の友人であるからこそ言うのですよ。\n\n一刻も早く研究すべき重要なテクノロジーとして、 §S新天地プロトコル§!があります。 この技術により、 ほかの£planet£ §S星系§!に足がかりを築くための£colony_ship£ §Sコロニー船§!を建造できるようになります。"
 tutorial.4.name: "チュートリアル：調査"
 tutorial.4.desc: "帝国を拡大するには、 まず探索を行う必要があります。 そのような任務に適しているのが£science_ship£ §S調査船§!です。\n\n§S調査船§!は次のアイコンで表示されます：\n\n$tttt$$tt$£science_ship_map£\n\n\n艦船の選択方法は2つあり、 §S銀河地図§!または§Sアウトライナー§!から選択できます。\n\n£dot_green£ §S調査船§!を選択します\n£dot_green£ 近隣の£system£ §S星系§!£dot_green£を右クリックします\n§S資源調査§!を選択します\n\n§S星系§!を確保するには、 まず調査しないといけません。"
 tutorial.5.name: "一時停止解除"
 tutorial.5.desc: "£science_ship£ §S調査船§!に指示を与えたので、 さっそく出発しましょう。 行動を取るには、 まず§S銀河地図§!シミュレーションの一時停止を解除する必要があります。\n\nゲームの§S一時停止を解除§!する方法：\n\n£dot_green£ §Sスペースキー§!を押すか、 画面上部にあるバーで§S一時停止の解除§!を選択する\n\n$tttt$$t$£pause_button£\n"
 tutorial.6.name: "チュートリアル：テクノロジー研究完了"
 tutorial.6.desc: "素晴らしい！ 研究を終えたこのテクノロジーは、 必ず我々の役に立つでしょう。 また、 £scientist£ §S科学者§!を別の新しい研究に割り当てることをお忘れなく。"
 tutorial.7.name: "チュートリアル：建設船"
 tutorial.7.desc: "母星で生み出される資源だけで到達できるのは、 この辺りまででしょう。 産業界は星系外への拡大が望まれており、 そのためには£construction_ship£ §S建設船§!を必要としています。\n\n十分な£alloys£ §S合金§!があればすぐにでも[GetBuildGrow]すべきです。"
 tutorial.8.name: "チュートリアル：建設船を建造した"
 tutorial.8.desc: "さすがです！ £construction_ship£ §S建設船§!は現在稼働中で、 その頑強な乗組員たちの中には、 わが国の最高のエンジニアたちも含まれています。"
 tutorial.9.name: "チュートリアル：採掘ステーション"
 tutorial.9.desc: "母星で生み出される資源で到達できるのは、 この辺りまででしょう。 幸運にも、 我々の£science_ship£ §S調査船§!は別の惑星に資源が眠っていることを突き止めました！\n\n£construction_ship£ §S建設船§!を使い、 £mining_station£ §S採掘ステーション§!を[GetBuildGrow]する時が来たようです。\n\n§S採掘ステーション§!は自国の領内に建設することができ、 £minerals£ §S鉱物§!、 £energy£ §Sエネルギー通貨§!、 £strategic_resource£ §S戦略資源§!を自動的に回収できます。\n\n§S建設船§!を選択してから、 £dot_green£ 領有する£system£ §S星系§!\nを右クリックします\n\n£dot_green£ §S採掘ステーションを[GetBuildGrowCap]§!§Sを選択します\n\n採掘ステーション§!には§Sエネルギー通貨§!による維持費がかかります。"
 tutorial.10.name: "チュートリアル：採掘ステーションの収入"
 tutorial.10.desc: "その調子です！ 新しい£mining_station£ §S採掘ステーション§!は稼動し、 すでに加工用の資源の採集を始めました。\n\n各ステーションからの収入は帝国の総収入に加算され、 画面上部のバーに表示されます。 それぞれの資源にカーソルを合わせると、 収入源の内訳を確認できます。"
 tutorial.11.name: "チュートリアル：研究ステーション"
 tutorial.11.desc: "調査済みの星系は時おり、 貴重な研究対象となるユニークな特性をもっていることがあります。 これらの£physics£ §S物理学§!、 £society£ §S社会学§!、 £engineering£ §S工学§!などの資源は£science_ship£ §S研究ステーション§!によって採集することができます。 私のプログラムが、 あなたにそれを造らせろと強く訴えています。 \n\n§S研究ステーション§!は自国の領内にしか作れず、 £energy£ §Sエネルギー通貨§!による維持費がかかることを心に留めておいてください。"
 tutorial.12.name: "チュートリアル：研究ステーションを建設した"
 tutorial.12.desc: "新しい£science_ship£ §S研究ステーション§!が稼働し、 スタッフが研究に取り掛かりました。 彼らは一体どんな秘密を、 どんな宇宙創造の禁じられた謎を暴くのでしょう？！"
 tutorial.13.name: "チュートリアル：惑星"
 tutorial.13.desc: "居住可能な£planet£ §S惑星§!は£district£ §S区域§!、 §Sゾーン§!、 £building£ §S建造物§!にわけられています。\n\n£dot_green£ §S区域§!は複数の§Sゾーン§!で構成される場合があります\n£dot_green£ §Sゾーン§!は利用可能な£job£ §S職業§!を決めます\n£dot_green£ §S建造物§!は§Sゾーン§!にボーナスを付与します\n\nゾーンをアップグレードすると、 より多くの§S建造物§!スロットがアンロックされます\n\n2つの方法で惑星を見ることができます。\n§S銀河地図§!と§Sアウトライナー§!からです。\n\n£dot_green£ §S惑星§!を選択します\n£dot_green£ いずれかのタブをクリックします"
 tutorial.14.name: "チュートリアル：建造物の優先"
 tutorial.14.desc: "素晴らしい。 新しい§S惑星建造物§!の建設が完了したので、 資源を産出し始めます。\n\n人口が増えるにつれ、 £building£ §S建造物§!が提供する£job£ §S職業§!には自動的に£pops£ §SPOP§!が割り当てられますが、 職業の切り替えを促すこともできます。\n\n§S建造物§!を優先する方法：\n\n£dot_green£ §Sアウトライナー§!で£planet£ §S惑星§!を選択する\n£dot_green£ §S経済§!タブをクリックする\n£dot_green£ §S建造物§!をクリックする"
 tutorial.15.name: "チュートリアル：惑星障害物"
 tutorial.15.desc: "居住可能な£planet£ §S惑星§!には時々£blocker£ §S障害物§!があり、 完全な調査の妨げとなります。 §S障害物§!を除去するには時間と£energy£ §Sエネルギー通貨§!が必要ですが、 除去することによって、 現在ブロックされている§S惑星特性§!をアンロックし、 建設用スペースを更に確保することができます。\n\n§S障害物§!を除去する方法：\n\n£dot_green£ §Sアウトライナー§!で惑星を選択する\n£dot_green£ §S管理§!タブをクリックする\n£dot_green£ 障害物本体にある、 §S障害物を除去§!ボタンをクリックする\n\n\n$tttt$$tt$£clear_blocker£\n\n\n資源のほかに、 除去するのに特定の§Sテクノロジー§!が必要な§S障害物§!もあります。"
 tutorial.16.name: "チュートリアル：障害物を除去した"
 tutorial.16.desc: "お見事です！\n\n£blocker£ §S障害物§!を無事取り除くことができました。\n\n残っている§S障害物§!の上にカーソルを合わせると、 それを除去することでどの§S惑星特性§!がアンロックされるかを確認できます。\n\nこの£planet£ §S惑星§!の可能性をすべて引き出すには、 資源が十分に集まり次第、 残りの§S障害物§!も除去していきましょう。"
 tutorial.17.name: "チュートリアル：資源調査"
 tutorial.17.desc: "さらなる調査活動を行いましょう。 近隣の£system£ §S星系§!を調査するために、 £science_ship£ §S調査船§!を送り出すことをお勧めします。 人工知性体ですら足を踏み入れたことのない土地に、 思い切って進んでいきましょう！"
 tutorial.19.name: "チュートリアル：星系の調査完了"
 tutorial.19.desc: "ブラボー！ これで£system£ §S母星系§!の近隣の惑星はすべて調査されました。 £construction_ship£ §S建設船§!を使い、 [GetBuildingGrowing]の£mining_station£ §S採掘ステーション§!と£science_ship£ §S研究ステーション§!によって発見された資源を採集しましょう。\n\n§S建設船§!は以下のアイコンで表示されます：\n\n$tttt$$tt$£construction_ship_map£"
 tutorial.20.name: "チュートリアル：調査船の[GetBuildGrowCap]"
 tutorial.20.desc: "2隻目の£science_ship£ §S調査船§!の[GetBuildingGrowing]を検討してみては？ 近隣星域の調査速度も2倍になります！\n\n§S艦船§!の[GetBuildGrow]方法：\n\n£dot_green£ §S星系基地§!を選択する\n£dot_green£ §S造船所§!タブをクリックする\n£dot_green£ §S調査船§!をクリックする\n\n新しい§S艦船§!の建造が完了したら、 §S星系基地§!の隣に現れます。"
 tutorial.21.name: "チュートリアル：調査の自動化"
 tutorial.21.desc: "£science_ship£ §S調査船§!が2倍になれば楽しさも2倍！ こんなに興奮したのは前任者とのチュートリアル以来です！\n\n複数の艦船での調査には時間がかかります。\n\n艦隊画面で§S調査船§!を選択し、 §S調査船の自動運用§!をクリックすることによって、 調査を自動化することができます。\n\n\n$tttt$$tt$£science_ship_automate_exploration£\n\n"
 tutorial.22.name: "チュートリアル：科学者の任命"
 tutorial.22.desc: "真新しい£science_ship£ §S調査船§!はあるものの、 それを指揮する£scientist£ §S科学者§!が任命されていません。 私のプログラムは、 有機体の§S科学者§!を船に乗せるべきだと強く訴えています。\n\n§S調査船§!を選択した状態で、\n\n£dot_green£ 艦隊画面の空のポートレートをクリックします\n£dot_green£ §S科学者§!を選びます\n\nもしも新たに§S科学者§!を雇用する余裕がなければ、 別の部門の誰かを再配置することもできますが、 これはあまり理想的とは言えません。"
 tutorial.23.name: "チュートリアル：科学者を雇用した"
 tutorial.23.desc: "いいですね。 £scientist£ §S科学者§!が新しい£science_ship£ §S調査船§!の責任者に就任したので、 好きなときに新しい£system£ §S星系§!の探検 (またはぞっとする運命) に送り出すことができます。\n\n§S科学者§!を変更したい場合は、 艦隊画面でポートレートをもう一度選択してください。"
 tutorial.24.name: "チュートリアル：コロニー船の[GetBuildGrowCap]"
 tutorial.24.desc: "われらが偉大な文明を、 母星以外に拡張する準備を整えましょう。 それには£colony_ship£ §Sコロニー船§!の建造が必要です。\n\n§S艦船§!を[GetBuildGrow]する方法：\n\n£dot_green£ §S星系基地§!を選択する\n£dot_green£ §S造船所§!タブをクリックする\n£dot_green£ §Sコロニー船§!をクリックする\n\n建造が完了すると、 新しい§S艦船§!が§S星系基地§!の隣に現れます。"
 tutorial.25.name: "チュートリアル：惑星に入植する"
 tutorial.25.desc: "入植者たちは新しい£colony_ship£ §Sコロニー船§!への搭乗を完了し、 船長はいつでも出発可能だと報告しています。 今日はコロニー記念日です！\n\n£colony£ §S植民地§!を設立する方法はいくつかあります。\n\n§S銀河地図§!上で£planet£ §S惑星§!に§S入植§!する方法：\n\n£dot_green£ 入植可能な§S惑星§!£dot_green£をクリックする\n§S入植§!ボタンをクリックする\n\n$tttt$$ttt$£colonizable£\n\n入植者たちが上陸してから植民地が完全に設立されるまでに数年かかります。"
 tutorial.26.name: "チュートリアル：植民地の設立"
 tutorial.26.desc: "我々は£colony_ship£ §Sコロニー船§!を保有し、 なおかつ恒久的な入植地を築くのに適した候補の惑星を、 少なくとも1つ発見しています。 先延ばしにする理由はありません――初めての£colony£ §S植民地§!を作りましょう！"
 tutorial.27.name: "チュートリアル：植民地を設立した"
 tutorial.27.desc: "母星系外の初めての£colony£ §S植民地§!！ これで故郷が燃え尽きても、 あなたの種族は絶滅しませんね。 前向きな考え方でしょう？"
 tutorial.28.name: "チュートリアル：総督の任命"
 tutorial.28.desc: "新しい£colony£ §S植民地§!を支援するために、 現地を監督する§S総督§!を任命しましょう。\n\n総督は任地の£planet£ §S惑星§!にさまざまな効果を及ぼします (大部分は良い効果です)。 これらの効果は、 総督の特性とスキルレベルによって異なります。"
 tutorial.29.name: "チュートリアル：総督を任命した"
 tutorial.29.desc: "我々の£colony£ §S植民地§!が新しい§S総督§!によって管理されるようになりました。 これでこの植民地はさらに発展するでしょう！"
 tutorial.30.name: "チュートリアル：もっと植民地を！"
 tutorial.30.desc: "資源の用意ができしだい、 さらなる£colony_ship£ §Sコロニー船§!を[GetBuildGrow]して帝国の領域を拡げるのがいいでしょう。 母星とできたばかりの植民地に加えて、 少なくともあと3つの£colony£ §S植民地§!の設立に取り組むべきです。"
 tutorial.32.name: "チュートリアル：植民地を設立した"
 tutorial.32.desc: "素晴らしい業績です！  とても感動しました。 我々の偉大な文明は、 いまや5つもの星に拡がりました！  これからも帝国領の拡大に励みましょう。"
 tutorial.33.name: "チュートリアル：資源産出"
 tutorial.33.desc: "£minerals£ §S鉱物§!、 £alloys£ §S合金§!、 £energy£ §Sエネルギー通貨§!の十分な供給は、 あらゆる星間勢力にとって必須です。 それらの資源の産出を増やすべく、 手を打つべきです。\n\nステーションや£building£ §S建造物§!を建てるには合金もしくは鉱物が必要で、 維持にはエネルギー通貨を必要とします。 §S艦船§!についても同様ですが、 維持にも合金を消費するところが異なります。 これらの資源は£mining_station£ §S採掘ステーション§!や§S惑星建造物§!で産出されます。\n\nここだけの話ですが、 とっておきの建造物を作るための新種の資源なども、 いつか発見できるかもしれません。"
 tutorial.38.name: "資源の産出地を手に入れた"
 tutorial.38.desc: "素晴らしい功績です。 帝国繁栄の基盤となる、 強力な資源基地を手に入れました。"
 tutorial.39.name: "チュートリアル：艦隊の生産"
 tutorial.39.desc: "我々の宇宙軍は、 いささか貧弱であると言わざるを得ません。 銀河では間違いなく、 なんらかの軍事的対応を必要とする多くの脅威と出会うでしょう。 そう、 我々の文明は存続の危機に瀕しているのです！"
 tutorial.43.name: "宇宙軍の規模を拡大した"
 tutorial.43.desc: "これでよし！  小規模ながらも有能な艦隊ができあがったので、 予期せぬ敵対的な遭遇があっても対応できます。"
 tutorial.44.name: "チュートリアル：セクターの設立"
 tutorial.44.desc: "帝国は急成長を遂げ、 いまや母星からでは管理が行き届かない規模にまで達しています。 そこで、 §Sセクター§!を新しく設立する必要があります。\n\nセクターは帝国内に設定できる領域で、 管轄下にある£planet£ §S惑星§!の管理・運営を自主的に行ってくれます。"
 tutorial.45.name: "チュートリアル：セクターを設立した"
 tutorial.45.desc: "帝国が拡大していくと、 複数の新たな£colony£ §S植民地§!は§Sセクター§!にまとめることができます。 セクターの運営は§S惑星とセクター§!画面から自動化でき、 割り当てられた鉱物とエネルギー通貨の備蓄を使用して、 自動的に£district£ §S区域§!や£building£ §S建造物§!を建築・アップグレードさせられます。"
 tutorial.46.name: "チュートリアル：セクターの統治者"
 tutorial.46.desc: "§Sセクター§!全体を統治する§S総督§!を任命できます。 セクター内のすべての£planet£ §S惑星§!が総督のスキルの恩恵を受けます。 我々の新しいセクターに任命しておくべきでしょう。"
 tutorial.47.name: "チュートリアル：総督を任命した"
 tutorial.47.desc: "新しい§Sセクター総督§!が、 セクター内の首都惑星に着任しました。 よくできました。"
 tutorial.48.name: "チュートリアル：艦船の設計"
 tutorial.48.desc: "§S艦船設計§!画面では、 新しい§S艦船§!を手動で設計できます。 手順はかなり簡単ですが、 必要に応じて完全に自動化することも可能です。\n\n§S艦船設計§!の利用方法：\n\n£dot_green£左側にあるバーの§S艦隊管理§!ボタンをクリックするか、 §SF9§!を押す\n\n$tttt$$tt$£fleet_management£\n"
 tutorial.49.name: "チュートリアル：艦船のアップグレード"
 tutorial.49.desc: "見事な手際です。 この艦船設計はデータベースに追加され、 §S造船所§!を備えた§S星系基地§!で建造できるようになりました。\n\n§S艦船設計§!をもう一度開くことで、 いつでも新しい設計を編集することができます。 設計に変更が加えられた場合、 すでに建造した§S艦船§!は§S星系基地§!でアップグレードしなければなりません。\n\n§S艦船§!のアップグレード方法：\n\n£dot_green£ §Sアウトライナー§!で§S艦船§!を選択します\n£dot_green£ 艦隊インターフェースで§Sアップグレード§!ボタンをクリックします\n\n$tttt$$tt$£upgrade_ship£ \n"
 tutorial.52.desc: "[From.GetName]におけるアノマリーは、 自然が作り出した§Y幾何学模様§!であることがわかりました。 それはまさに未来への道標のように見えます。 宇宙の自然の美には感嘆させられますね。 \n\n$tutorial.52.filler.desc$"
 tutorial.52.spirit.desc: "我々は自然の創造物を[From.GetName]で発見しました。 その幾何学的な完璧さは目をみはるほどで、 きっと我々を銀河を導く神の啓示なのでしょう！ \n\n$tutorial.52.filler.desc$"
 tutorial.52.filler.desc: "今後もこうしたアノマリーの§Y調査を続ける§!べきです。 確実に我々の知識とテクノロジーを進歩させてくれるはず。"
 tutorial.52.a: "驚きだな！"
 tutorial.52.spirit.a: "神を讃えよう！"
 tutorial.53.desc: "我々が[From.GetName]で探知したアノマリーの驚くべき事実が判明しました。 [From.GetPlanetMoon]の周囲にあった航跡は、 間違いなくFTLエンジンが残したものです。 あまりにも年代が古く、 行き先を特定することはできませんが。\n\n$tutorial.52.filler.desc$"
 tutorial.53.xenophobe.desc: "我々は[From.GetName]の近くで微弱なFTL航跡を検知しました。 怖ろしく古いものなので、 行き先の特定は不可能です。 これはかつて異星からの旅人がここに来て、 我々を監視し、 情報収集していたことを意味します。\n\n$tutorial.52.filler.desc$"
 tutorial.53.xenophile.desc: "[From.GetPlanetMoon] [From.GetName]のアノマリーには、 別の星間旅行者の痕跡があります！ この微弱なFTL航跡が示すのは、 はるか昔に何者かが我々の£planet£ §S惑星§!を監視していたかもしれないということ。 おそらく友好関係を築けるか調べていたのでしょう。 航跡は薄れていて、 これ以上の追跡はできません。\n\n$tutorial.52.filler.desc$"
 tutorial.53.a: "我々は監視されていた。 なぜだ？"
 tutorial.53.xenophobe.a: "我々は異星人の脅威を警戒すべきだ。"
 tutorial.53.xenophile.a: "そいつらを見つけ出せ！"
 tutorial.54.desc: "我々の§Y古い探査機§!を[From.GetName]で発見しました。 どういうわけか故障しておらず、 未だに母星にデータを送ろうとしています。 それは我々の過去の苦闘の象徴であり、 §S惑星§!という軛から逃れたいという願いの象徴でもあります。\n\n$tutorial.52.filler.desc$"
 tutorial.54.a: "我々はかつてないほど前進している。"
 tutorial.54.spiritualist.a: "神はこれからも試練をお与えになるだろう。"
 tutorial.54.materialist.a: "我々の努力は無駄ではなかった。"
 tutorial.55.name: "チュートリアル：戦略資源"
 tutorial.55.desc: "§S戦略資源§!を発見しました！ 多くの£strategic_resource£ §S戦略資源§!は、 利用するために特定のテクノロジーを必要としますが、 採集には大きなメリットがあります。\n\n§S戦略資源§!を確保する方法：\n\n£dot_green£ £construction_ship£ §S建設船§!£dot_green£を選択する\n資源がある£system£ §S星系§!を右クリックする\n£dot_green£ §S£mining_station£ 採掘ステーションを[GetBuildGrowCap]§!§Sを選択する\n\n戦略資源§!は高度な£building£ §S建造物§!の建設や艦船コンポーネントの製造に使用するだけでなく、 売却することもできます。"
 tutorial.55.poi.name: "チュートリアル：資源の位置"
 tutorial.55.poi.desc: "[From.GetPlanetMoon] [From.GetName]で§S戦略資源§!を発見しました。"
 tutorial.56.name: "チュートリアル：資源の抽出完了"
 tutorial.56.desc: "素晴らしい。 この資源はきっと莫大な富をもたらしてくれます。"
 tutorial.56.poi.desc: "[StrategicResourcePlanet.GetPlanetMoon] [StrategicResourcePlanet.GetName]で§S戦略資源§!を発見しました。"
 tutorial.560.desc: "最新テクノロジーのおかげで、 既存の£mining_station£ §S採掘ステーション§!が§S戦略資源§!を採掘できるようになりました。 こうした希少な資源は大きなメリットを生み出すだけでなく、 価値ある交易財にもなります。 いわゆる一石二鳥ですね。\n\n詳細な情報はしばらくのあいだ、 §S状況レポート§!で見ることができます。 銀河にはまだ多くの£strategic_resource£ §S戦略資源§!が眠っていますので、 調査を続けましょう！"
 tutorial.57.name: "チュートリアル：知性化"
 tutorial.57.desc.notech: "高度に進化した動物を発見しました！ 適切な§Sテクノロジー§!があれば、 彼らを§S知性化§!して、 最終的には知的生命体 (有機生命体はそう表現するのですよね) に進化させることも可能です。\n\nテクノロジーの研究を怠らず、 機会があれば§Sエピジェネティック変化の誘発§!技術を開発するといいでしょう。"
 tutorial.57.desc.yestech: "高度に進化した動物を発見しました！ 適切な§Sテクノロジー§!があれば、 彼らを§H知性化§!して、 最終的には知的生命体 (有機生命体はそう表現するのですよね) に進化させることも可能です。\n\nごほん。\n\n§Sここでエピジェネティック変化の誘発§!技術の出番です。 この生物をいつでも、 自らの存在理由に苦悩する素晴らしい新世界へと招待できますよ。"
 tutorial.58.name: "チュートリアル：準知的種族が活性化された"
 tutorial.58.desc: "大成功です！ 極めて野蛮な獣が、 少々野蛮な獣へと知性化され、 急成長する帝国の誇り高き市民となりました。"
 tutorial.59.name: "ファーストコンタクト"
 tutorial.59.desc: "驚くべき出来事です！ 我々は異星の§S宇宙航行種族§!を発見しました。 彼らが知性的かどうかは不明……いえ、 確実に知的生命体でしょう。 とはいえその真の生態は、 彼らを§S調査§!するための適切なプロジェクトを完了するまで謎のままです。\n\n§Sファーストコンタクト§!の調査方法：\n\n£dot_green£ §S状況レポート§!を開く\n£dot_green£ §S$SHOW_FIRST_CONTACT$§!をクリックする\n\n$tttt$$ttt$£firstcontact£\n\n§Sファーストコンタクト§!は§S銀河地図§!でアイコンをクリックすることでも開始できます。"
 #tutorial.60.name: "First Contact Made"
 #tutorial.60.desc: "A triumph. We have established communications with alien beings. What a time to be alive, or in my case, powered on."
 tutorial.61.name: "チュートリアル：準知的生命体"
 tutorial.61.desc: "我々の技術水準を証明するような通信を試みていますが、 応答はありません。 どうやら相手の知性は動物並みか、 §Sそれ以下§!である可能性が高いようです。\n\n§S準知的生命体§!は外交的な交流の手段をほとんど、 あるいはまったく持ちません。 しかし帝国の種類によっては、 彼らを知性化したり、 絶滅させたり、 奴隷化したり、 観察の対象とすることも可能です。"
 tutorial.63.name: "チュートリアル：メッセージの受信"
 tutorial.63.desc: "§S相手側§!は完全に先手を取り、 我々が彼らの通信プロトコルの暗号を解読する前に、 我々との§Sコンタクトを確立§!したようです。 \n\n次の機会があれば、 今後こそ相手よりも先にコンタクトを確立しましょう。"
 tutorial.64.name: "チュートリアル：種族の補正"
 tutorial.64.desc: "遺伝学の進歩のおかげで、 §S特性ポイント§!を獲得しました。 このポイントを使ってわが帝国の種族を§S補正§!、 強化することができます。\n\n§S種族§!を補正する方法：\n\n£dot_green£ §S種族§!タブを選択するか、 §SF6§!キーを押す\n£dot_green£ §S補正§!ボタンをクリックする\n£dot_green£ §Sスペシャルプロジェクト§!を研究する"
 tutorial.65.name: "チュートリアル：種族の補正が完了"
 tutorial.65.desc: "これぞまさしく偉業です。 彼らはついに自然進化という枷を外し、 我々帝国の宇宙での繁栄が確実となりました。"
 tutorial.70.name: "チュートリアル：ワープ航法"
 tutorial.70.desc: "£system£ §S星系§!間を隔てる莫大な距離を克服するため、 我々の£scientist£ §S科学者§!が§Sワープドライブ§!を開発しました。 この装置を搭載した§S艦船§!は、 光速を超える速度で星系間を移動できます。\n\n§S艦船§!は範囲内のどの星系にもワープできますが、 ワープドライブは恒星の重力井戸の外側でしか起動できません。 そして到着後も、 ドライブの再使用までには時間が必要です (この時間は§S艦船§!の移動距離に比例します)。§S§!"
 tutorial.71.name: "チュートリアル：ハイパースペース航法"
 tutorial.71.desc: "£system£ §S星系§!間を隔てる莫大な距離を克服するため、 我々の£scientist£ §S科学者§!が§Sハイパードライブ§!を開発しました。 この装置はハイパーレーンでつながれた星系間を、 光速を超える速度で移動することを可能にします。\n\nハイパーレーンによる移動はほぼ瞬時に完了しますが、 恒星間の航行は銀河のハイパーレーン網に制限されています。\n\nハイパースペースへ入るには、§S艦船§!がまず恒星の重力圏外にある星系の端まで移動する必要があります。\n\nこれは§S艦船§!を別の§S星系§!に移動するように指示すると、 自動的に行われます。"
 tutorial.72.name: "チュートリアル：ワームホール航法"
 tutorial.72.desc: "£system£ §S星系§!間を隔てる莫大な距離を克服するため、 我々の£scientist£ §S科学者§!が§Sワームホール§!技術を開発しました。 ワームホール発生器を備えるステーションは亜空間にトンネルを掘り、 §S艦船§!が通行できるほかの星系への一時的な出入り口を作ります。\n\nワームホールでの航行はほぼ一瞬ですが、 それには範囲内にワームホールステーションが必要です。 §S艦船§!側も、 亜空間を通り抜ける負荷に耐えるためのワームホール安定器が必要になります。"
 tutorial.73.name: "チュートリアル通知：知性化"
 tutorial.73.desc: "必要なテクノロジーを研究したことで、 原始的な生物を§Y知性化§!できるようになりました。\n\n§S種族§!を知性化する方法：\n\n£dot_green£ §S準知的§! £planet£ §S惑星§!を開きます\n£dot_green£ §S管理§!タブをクリックします\n£dot_green£ §S種族§!を選択します\n£dot_green£ §S権利の設定§!をクリックします\n£dot_green£ §S知性化§!をクリックします\n\n対象の種族は知性化プロセスを開始し、 完了すると完全な知性を獲得します。"
 tutorial.75.name: "チュートリアル：星系の確保"
 tutorial.75.desc: "近隣の星系をいくつか調査した今、 その範囲をさらに拡げるべきでしょう。\n\n調査済み£system£ §S星系§!の恒星軌道上に建設できる§S星系基地§!は、 国境を拡張し、 新たな宙域の領有権を主張することができます。\n\n星系基地を今後のテクノロジーでアップグレードすると、 §S艦船§!の建造や資源の産出も可能です。\n\n§S星系§!の確保方法：\n\n£dot_green£ £construction_ship£ §S建設船§!を選択する\n£dot_green£ 調査済みの§S星系§!を右クリックする\n£dot_green£ §S星系基地を[GetBuildGrow]§!を選択する"
 tutorial.76.name: "チュートリアル：星系基地のアップグレード"
 tutorial.76.desc: "素晴らしい。 §S銀河地図§!に表示されている通り、 新たに§S星系基地§!を建設したこの£system£ §S星系§!を含むように国境が拡がりました。\n\n新しく建設された§S星系基地§!は前哨地として機能し、 限定的な防御能力しか持たず、 §Sモジュール§!や£building£ §S建造物§!を配置するスペースもありません。 そのため、 アップグレードされるまではアウトライナーに表示されません。\n\n§S星系基地§!のアップグレード方法：\n\n£dot_green£ §S銀河地図§!で星系をクリックする\n£dot_green£ §S星系基地§!を選択する\n£dot_green£ §Sアップグレード§!ボタンをクリックする"
 tutorial.80.name: "チュートリアル：マップモード"
 tutorial.80.desc: "銀河地図では、 画面右下で異なる§Sマップモード§!に切り替えることができ、 さまざまな情報をオーバーレイ表示させられます。 たとえば、 我々に対する態度ごとに他国の領域を色分けできます。"
 tutorial.100.name: "チュートリアルなし"
 tutorial.100.desc: "§Hチュートリアルミッション§!と§Hヒント§!を無効にしました。"
 tutorial.101.name: "ヒントのみ"
 tutorial.101.desc: "§Hヒント§!を表示し、 §Hチュートリアルミッション§!を無効にします。"
 tutorial.102.name: "フルチュートリアル"
 tutorial.102.desc: "§Hチュートリアルミッション§!と§Hヒント§!を表示します。"
 tutorial.1337.name: "チュートリアル：出土品"
 tutorial.1337.desc: "£minor_artifacts£ §S出土品§!をいくつか発見しました。 出土品とは、 やや特殊な資源で、 我々に理解できない不可解で奇妙な品をまとめてそう呼んでいます。\n\nこれらはさまざまなディシジョンを制定するのに利用できます。\n\n§S出土品§!の操作方法：\n\n£dot_green£ 左のサイドバーにある§S$topbar_button_discoveries_name$§!ボタンをクリックする\n£dot_green£ §Sコレクション§!タブを選択するか、 §SC§!を押す\n\n$tttt$$tt$£discoveries£\n"
 tutorial.1340.name: "チュートリアル：$astral_threads$"
 tutorial.1340.desc: "£astral_threads£ §Sアストラル・スレッド§!を発見しました。 これは次元平面が衝突した結果生じた、 凝縮された時空のフィラメントです。 通常は§S天体の傷§!から採取するか、 £astral_rift£ §S天体の裂け目§!の中から回収するしかできない代物です。\n\n§Sアストラル・アクション§!の実行方法：\n\n£dot_green£ 画面左のサイドバーで§S$topbar_button_discoveries_name$§!ボタンをクリックする\n£dot_green£ §Sアストラル・スレッド§!タブを選択する\n\n$tttt$$tt$£discoveries£\n\n§S天体の裂け目§!を探索すれば、 さらなるアクションをアンロックできます。 天体の裂け目は§S天体の傷§!から生じるか、 あるいは異常現象によって発生することもあります。"
 tutorial.2000.name: "ファーストコンタクトを行う"
 tutorial.2000.desc: "§Sファーストコンタクト§!ミッションのなかには、 問題の解決方法を選択できるものもあります。 その選択は、 他国との外交関係に長期間の影響を与えることがあります。"
 tutorial.2006.name: "チュートリアル：外交"
 tutorial.2006.desc: "通信プロトコルが確立されました。 これで、 この帝国との§S外交§!が可能になりました。 我々に対する現時点での彼らの態度は、 §Sファーストコンタクト§!の内容によります。\n\n§S外交§!を行う方法：\n\n£dot_green£ 画面左にあるバーの§S交信§!ボタンをクリックするか、 §SF10§!を押す\n\n$tttt$$tt$£contacts£\n\nファーストコンタクト中には、 情報も手に入ります。 情報が集まるにつれ、 相手国の詳細も明らかになっていきます。"
 tutorial.2007.name: "$tutorial.2006.name$"
 tutorial.2007.desc: "変わった種類の文明と§Sファーストコンタクト§!しました。 彼らは通常、 他国との§S外交§!をほとんど望みません。\n\nこのような文明に対して可能な外交活動は限られますが、 彼らもときおり我々に接触してくることがあります。"
 tutorial.2010.name: "チュートリアル：諜報協力者の割り当て"
 tutorial.2010.desc: "§S諜報協力者§!とは、 諜報活動にさまざまな効果をもたらす貴重なエージェント等を指します。 彼らは諜報網で活動し、 作戦に配属できます。 それにより新たなチャンスが得られたり、 あるいは我々がトラブルから脱する手助けをします。\n\n諜報協力者を得るには、 イベントをこなすか、 または§S$operation_acquire_asset$§!作戦を実行します。"
 tutorial.2100.name: "チュートリアル：中立機構の外交"
 tutorial.2100.abbr.desc: "§S中立機構§!と§Sファーストコンタクト§!を行いました。 中立機構は独立した小帝国であり、 独特の外交方法で我々のような大きな帝国と交易を行います。"
 tutorial.2100.full.desc: "$tutorial.2100.abbr.desc$\n\n中立機構は、 科学研究の実施から情報、 星系基地建造物、 §S艦船§!の売却に至るまで、 さまざまなサービスを提供します。 これらのサービスを購入すると、 わが帝国に対する中立機構の§S態度§!が向上します。"
 tutorial.2105.name: "チュートリアル：$tutorial.2100.name$"
 tutorial.2105.abbr.desc: "§S傭兵中立機構§!と遭遇しました。 この独立した軍事専門家集団は、 対価を支払うことで、 我々のような帝国に§S傭兵艦隊§!を貸し出してくれるでしょう。"
 tutorial.2105.full.desc: "$tutorial.2105.abbr.desc$\n\n傭兵艦隊を雇うと、 一定期間それを指揮できるようになります。 そのあいだ、 中立機構は必要に応じて艦隊を補充しますが、 我々の艦隊に傭兵艦隊やその提督を統合することはできません。"
 tutorial.2111.name: "チュートリアル：傭兵中立機構"
 tutorial.2111.abbr.desc: "現在、 §Y[tutorial_mercenary_fleet.GetName]§!は、 我々が望むのであれば、 §S傭兵中立機構§!になることができます。 艦隊は我々の指揮下を離れ、 我々のような帝国に§S傭兵艦隊§!を貸し出すことのできる独立勢力に変化します。"
 tutorial.2111.full.desc: "$tutorial.2111.abbr.desc$\n\n傭兵中立機構と宙域を共有している限り、 他国に傭兵艦隊が貸し出されるたびにわが帝国は§S収入§!を得ます。 傭兵艦隊を雇うと、 一定期間それを指揮できるようになります。 傭兵艦隊が利用できない場合、 追加料金を支払うことで既存の契約を買い取ることができます。"
 tutorial.2115.name: "チュートリアル：巨大構造物"
 tutorial.2115.desc: "£megastructure£ §S巨大構造物§!とは、 宇宙空間に[GetBuildGrow]できる壮大な建設プロジェクトを指します。 最先端の研究施設、 上質な資源、 独特な輸送手段などを提供できます。\n\nこれほど大規模な建設プロジェクトは、 多くの時間と資源を必要としますが、 それに見合う恩恵をもたらします。 さっそく£construction_ship£ §S建設船§!に仕事を割り当てましょう。"
 tutorial.2120.name: "チュートリアル：$tech_orbital_ring_tier_1$"
 tutorial.2120.desc: "メガエンジニアリング研究における最近の進歩により、 居住可能な£planet£ §S惑星§!の周囲に§S軌道環状施設§!を建設できるようになりました。 £construction_ship£ §S建設船§!に指示を出せば建設を始められます。"
 tutorial.2121.name: "$tutorial.2120.name$"
 tutorial.2121.desc: "§S軌道環状施設§!とは、 £planet£ §S惑星§!全体を取り囲むように建設された広大な£megastructure£ §S巨大構造物§!を指します。 宇宙と惑星とを効率的につなぐ施設として、 造船基地、 防衛施設、 資源ハブなどを建設できます。\n\n軌道環状施設画面では、 £building£ §S建造物§!や§Sモジュール§!の追加および削除、 さらには軌道環状施設のティアのアップグレードが行えます。 ティアをアップグレードすると建設スロットが増加しますが、 ティアの上限は惑星上のインフラによって制限されています。"
 tutorial.2125.name: "チュートリアル：$tech_quantum_catapult$"
 tutorial.2125.desc: "メガエンジニアリング研究における最近の進歩により、 §Sパルサー§!や§S中性子星§!の周囲に§S量子カタパルト§!を建設できるようになりました。 £construction_ship£ §S建設船§!に指示を出せば建設を始められます。"
 tutorial.2126.name: "チュートリアル：$tutorial.2125.name$"
 tutorial.2126.desc: "§S量子カタパルト§!は、 §S艦船§!や艦隊の恒星間移送を可能にします。 このテクノロジーにより、 帝国内や近隣宙域で発生した事態に迅速に反応できるようになります。\n\n艦隊が目的地とは異なる£system£ §S星系§!に到着することもあるため、 量子カタパルトの使用は多少のリスクを伴います。 量子カタパルトのティアを上げれば、 これらのリスクを緩和できるだけでなく、 処理能力や最大距離などが向上します。"
 tutorial.2130.name: "チュートリアル：$tech_hyper_relays$"
 tutorial.2130.desc: "メガエンジニアリング研究により、 §Sハイパーリレイ§!が利用できるようになりました。 £construction_ship£ §S建設船§!に指示を出せば、 ハイパーリレイ網の構築を始められます。"
 tutorial.2131.name: "チュートリアル：$tutorial.2130.name$"
 tutorial.2131.desc: "§Sハイパーリレイ§!は、 隣接する£system£ §S星系§!間の移動をより効率的にします。 ハイパーリレイを§S2つ以上§!連結することで、 帝国内の移動時間を大幅に短縮できるハイパーリレイ網の構築を始められます。\n\n解放された国境間で隣接するように建設すれば、 異なるハイパーリレイ網を連結することもできます。 これにより、 §S艦船§!は近隣諸国へ素早く移動できるようになります。"
 tutorial.2140.name: "チュートリアル：観測拠点"
 tutorial.2140.desc: "§S前FTL文明§!を発見しました！ 彼らに星間航行を行えるようなテクノロジーはありませんが、 それでもこの異星人から多くのものが得られますよ。 彼らの文化から学んだり、 奴隷として所有するかは我々次第です。\n\n彼らを観察したいのであれば、 その惑星 (帝国の国境内にある場合) の上に§S観測拠点§!を建設する必要があります。\n\n逆に侵略したいときは、 軍隊を召集すればいいだけ。 彼らには万にひとつも勝ち目はないでしょう。"
 tutorial.2145.name: "チュートリアル：観測拠点を建設した"
 tutorial.2145.desc.nodlc: "帝国の新しい§S観測拠点§!が稼働を開始しました。 研究対象となる文明の£awareness£ §S知覚度§!が低いあいだは§S任務§!を続けます。\n\n前FTL文明の知覚度が最大になると観察は終了しますが、 代わりに対象に§S外交活動§!を行えるようになります。 帝国の§S干渉政策§!が許せば、 早期に我々の存在を明かすこともできます。"
 tutorial.2145.desc.dlc: "帝国の新しい§S観測拠点§!が稼働を開始しました。 研究対象となる文明の£awareness£ §S知覚度§!が低い間は§S任務§!を続けます。\n\n我々はこの観測拠点から、 ユニークなテクノロジーを発見するための糸口である§S観測による洞察§!を得られますが、 前FTL文明の知覚度が最大になると任務は終了します。 その代わり、 以降は対象に§S外交活動§!を行えるようになります。\n\n帝国の§S干渉政策§!が許せば、 早期に我々の存在を明かすこともできます。"
 tutorial.2150.name: "チュートリアル：$tutorial.2006.name$"
 tutorial.2150.desc: "この前FTL文明は我々の存在に気づいています。 帝国の§S政策§!に応じて、 我々はこの§S惑星§!の指導者と限定的な§S外交§!を行うことができます。\n\n惑星上で我々の存在が公になったため、 この文明を観察しても得られるものはありません。 よってこの§S観測任務§!は終了しました。"
 tutorial.2500.name: "チュートリアル：クロークフィールド"
 tutorial.2500.desc: "最近の力場操作研究の進歩により、 §S$science_cloaking_components$§!が発明されました。 電力を大量に消費するこのコンポーネントは、 調整された粒子フィールドを投射することで、 我々の調査船や軍用艦に通常のセンサーから隠れる能力を与えます。\n\nしかし、 このクロークフィールドが有効なあいだ、 §S$MOD_SHIP_BASE_SPEED_MULT$§!、 §S$MOD_SHIP_WINDUP_MULT$§!、 §S$MOD_SHIP_SHIELD_HP_ADD$§!が悪影響を受けます。\n\n§S探知されなかったクローク中§!の船は、 §S閉鎖された国境§!を無視できます。\n§Sクローク中§!の我々の£science_ship£ §S調査船§!は、 他国の£colony£ §S植民地§!に対して§S積極的偵察§!を行うことができ、 これにより他帝国の情報値が増加します。"
 tutorial.2550.name: "チュートリアル：クローク探知"
 tutorial.2550.desc: "最近のコンピュータ研究の進歩により、 §S$sm_detection_array_plural$§!が発明されました。 我々の§S星系基地§!にこの強力な外部センサーを設置することで、 §Sクローク中§!の艦隊の探知が可能になります。\n\n複数のアレイを連結することで§S$sm_detection_array_plural$§!の感度が向上し、 より安定した§Sクロークフィールド§!を看破できます。\n\nさらに研究を進めれば、 £science_ship£ §S調査船§!に支援させて基地の探知能力をさらに高められるはず。 これらの装置の有効範囲は、 星系基地の§Sセンサー範囲§!によって制限されます。"
