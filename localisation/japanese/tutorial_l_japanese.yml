 tutorial_survey_system_chain_title: "チュートリアル：銀河地図の切り替え"
 tutorial_survey_system_chain_desc: "星々を探索する前に、 視野を広げる必要があります。 ありがたいことに、 我々には自由に使える洗練された§S銀河地図§!があります。 §SM§!または画面下にある銀河ボタンで銀河地図を開くことができます。 状況レポートを閉じたいときは、 §SEscキー§!または画面右上のボタンを押してください。"
 map_toggled: "銀河地図を表示"
 tutorial_survey_system_tooltip: "§Sチュートリアル：銀河地図の切り替え§!が状況レポートに追加された"
 tutorial_1_chain_title: "チュートリアル：資源調査"
 tutorial_1_chain_desc: "まずは£science_ship£ §S調査船§!を選択してください。 これは§H銀河地図§!で§S艦船§!自体をクリックするか、 §Sアウトライナー§!から選択します。\n\n§S銀河地図§!を開いて、 画面左下の艦隊インターフェースの§S調査§!ボタンをクリックしてから、 未調査の£system£ §S星系§!を選択してください。 または、 未調査の星系を右クリックして、 §S資源調査§!を選択することでも同様の操作が可能です。\n\n§S調査船§!は予定コースを設定し、 それに沿って星系内の天体を1つずつ調査していきます。"
 tutorial_unpause_chain_tooltip: "§Sチュートリアル：一時停止の解除§!が状況レポートに追加された"
 tutorial_unpause_chain_title: "チュートリアル：一時停止の解除"
 tutorial_unpause_chain_desc: "£science_ship£ §S調査船§!が銀河を探索する準備が整ったので、 あとは一時停止を解除するだけです。 §Sスペースキー§! £space£ を押すか、 画面上部のバーで次のアイコンを選択してください。\n\n$tttt$$tttt$$t$£pause_button£\n"
 unpaused_game: "シミュレーションの一時停止を解除"
 system_surveyed: "隣接した星系の調査を完了"
 tutorial_1_tooltip: "§Sチュートリアル：資源調査§!が状況レポートに追加された"
 tutorial_2_chain_title: "チュートリアル：テクノロジー研究"
 tutorial_2_chain_desc: "我々は新技術を研究しなければなりません。 §S新天地プロトコル§!は、 £colony_ship£ §Sコロニー船§!の建造を可能にします。 もし帝国を拡大したいのであれば、 できるだけ早くこの技術に目を向けるべきです。\n\n画面左にあるバーの三角フラスコをクリックするか、 §SF4§!キーを押して§Sテクノロジー§!画面にアクセスしてください。 そして§S研究を選択§!をクリックして、 利用できる研究から追求するテクノロジーを選んでください。"
 tech_1_researched: "新天地プロトコルの研究を完了"
 tech_2_researched: "宇宙建設の研究を完了"
 tutorial_2_tooltip: "§Sチュートリアル：テクノロジー研究§!が状況レポートに追加された"
 tutorial_3_chain_title: "チュートリアル：建設船の[GetBuildGrowCap]"
 tutorial_3_chain_desc: "我々の£science_ship£ §S調査船§!が発見した資源を採取したいのであれば、 £construction_ship£ §S建設船§!が必要です。\n\n星系基地をクリックしてから§S造船所§!タブに切り替え、 利用可能な選択肢から§S建設船§!を選んでください。\n\nただし、 十分な量の£alloys£ §S合金§!が貯まっていなければ、 §S艦船§!の建造を始められないことに注意してください。"
 construction_ship_built: "建設船を建造した"
 tutorial_3_tooltip: "§Sチュートリアル：建設船建造の[GetBuildGrowCap]§!が状況レポートに追加された"
 tutorial_4_chain_title: "チュートリアル：採掘ステーションの[GetBuildGrowCap]"
 tutorial_4_chain_desc: "£minerals£ §S鉱物§!あるいは§S戦略資源§!を£planet£ §S惑星§!から得るためには、 £mining_station£ §S採掘ステーション§!を軌道上に建設する必要があります。 これを行うには£construction_ship£ §S建設船§!を直接クリックするか、 画面右に表示されている§Sアウトライナー§!から建設船をクリックします。\n\n次に、 建設船の艦隊画面から§S採掘ステーションを[GetBuildGrowCap]§!ボタンをクリックし、 鉱物を含有する惑星や小惑星をクリックしてください。\n\n£mining_station£ §S採掘ステーション§!を建造する際にも£minerals£ §S鉱物§!が必要となるのでご注意を。 十分な量の鉱物がないとステーションの建造は始められません。"
 mining_station_built: "採掘ステーションを建設した"
 tutorial_4_tooltip: "§Sチュートリアル：採掘ステーションの[GetBuildGrowCap]§!が状況レポートに追加された"
 tutorial_5_chain_title: "チュートリアル：研究ステーションの[GetBuildGrowCap]"
 tutorial_5_chain_desc: "新しい技術の研究速度を向上させるためには、 £physics£ §S物理学§!・£society£ §S社会学§!・£engineering£ §S工学§!の資源をもつ惑星などの軌道上に£science_ship£ §S研究ステーション§!を建設する必要があります。\n\n研究ステーションは£mining_station£ §S採掘ステーション§!と同じように機能します。 唯一の違いは採集する資源で、 研究ステーションは£minerals£ §S鉱物§!あるいは£strategic_resource£ §S戦略資源§!を採集することができません。 \n\n[GetBuildGrow]するためには、艦隊画面で£construction_ship£ §S建設船§!をクリックし、 §S研究ステーションを[GetBuildGrowCap]§!ボタンをクリックしてください。 その後、 物理学・社会学・工学の資源をもつ£planet£ §S惑星§!、 恒星、 小惑星をクリックしてください。"
 research_station_built: "研究ステーションを建設した"
 tutorial_5_tooltip: "§Sチュートリアル：研究ステーションの[GetBuildGrowCap]§!が状況レポートに追加された"
 tutorial_6_chain_title: "チュートリアル：惑星建造物の建造"
 tutorial_6_chain_desc: "我々の母星にはすでにいくつかの£building£ §S建造物§!がありますが、 さらに別に建設すべきです。\n\nこれを行うには、 §Sアウトライナー§!で母星を選択し、 §S地表§!タブをクリックします。 ゾーン内の空いている建造物スロットを選択し、 利用可能な建造物のうちの1つを選択します。 十分な§S資源§!があれば、 建設が直ちに始まります。\n\n建設物を通して£job£ §S職業§!が利用可能となりますが、 £pops£ §SPOP§!をそこで働くように割り当てるまで、 何も産出されません。 §SPOP§!がどの職業に就いているかは§S経済§!タブで確認できます。"
 building_constructed: "惑星建造物を完成させた"
 tutorial_6_tooltip: "§Sチュートリアル：惑星建造物の建造§!が状況レポートに追加された"
 tutorial_7_chain_title: "チュートリアル：障害物の除去"
 tutorial_7_chain_desc: "母星にいくつかの£blocker£ §S障害物§!があるため、 追加の§S区域§!が建設できません。 取り除きましょう。 取り除くには時間と§S資源§!が必要となります。\n\n§S障害物§!を除去するには、 §S管理タブ§!の障害物本体にある§S障害物を除去§!ボタンをクリックしてください。\n\n\n$tttt$$tttt$$tt$£clear_blocker£\n\n\n§S障害物§!の除去に必要なコスト、 技術的条件、 時間はそれぞれ違います。"
 blockers_cleared: "障害物を除去した"
 tutorial_7_tooltip: "§Sチュートリアル：惑星特性障害物§!が状況レポートに追加された"
 tutorial_8_chain_title: "チュートリアル：資源調査"
 tutorial_8_chain_desc: "我々は、 母星の£system£ §S星系§!を超えて影響力を拡大する必要があります。 そのための最初のステップは、 近隣星系を調査することです。 \n\n調査をするには£science_ship£ §S調査船§!を選択し、 艦隊画面で§S資源調査§!ボタンをクリックしてください。 そのあと画面下部の§S銀河地図§!ボタンをクリックし、 近隣の恒星のいずれかを選択してください。 すると§S調査船§!がその星系に移動して、 すべての天体を調査します。"
 tutorial_8_poi: "調査の対象"
 tutorial_8_poi_desc: "次の各星系を調査しましょう。 §S[survey_target_1.GetName]§!、 §S[survey_target_2.GetName]§!、 §S[survey_target_3.GetName]§!。"
 systems_surveyed: "星系の調査完了"
 tutorial_8_tooltip: "§Sチュートリアル：資源調査§!が状況レポートに追加された"
 tutorial_9_chain_title: "チュートリアル：調査船の[GetBuildGrowCap]"
 tutorial_9_chain_desc: "銀河の調査スピードを向上させるために、 2隻目の£science_ship£ §S調査船§!の[GetBuildingGrowing]を検討すべきです。\n\n星系基地をクリックして§S造船所§!タブを開き、 選択肢から§S調査船§!を選んでください。\n\n建造を始める前に、 十分な£alloys£ §S合金§!が貯蔵されていることを確認してください。§S§!"
 science_ship_built: "調査船の建造完了"
 tutorial_9_tooltip: "§Sチュートリアル：2隻目の調査船の[GetBuildGrowCap]§!が状況レポートに追加された"
 tutorial_10_chain_title: "チュートリアル：科学者の任命"
 tutorial_10_chain_desc: "新しい£science_ship£ §S調査船§!を指揮する£scientist£ §S科学者§!が必要です。 科学者がいないと、 調査船は資源調査や§Sアノマリー§!の研究ができません。\n\n新しく作った§S調査船§!を選択し、 艦隊画面でポートレートをクリックしてください。§Sリーダー選択§!画面が開き、 現在雇用している、 または雇用可能なすべての§S科学者§!が表示されます。希望する候補者を選んでください。\n\nリーダーの雇用には£unity£ §Y統合力§!が必要です。 足りなければ貯まるのを待ちましょう。\n\n雇用したら、 §S調査船§!は探索を開始できます。"
 scientist_assigned: "科学者を任命した"
 tutorial_10_tooltip: "§Sチュートリアル：科学者の任命§!が状況レポートに追加された"
 tutorial_11_chain_title: "チュートリアル：コロニー船の[GetBuildGrowCap]"
 tutorial_11_chain_desc: "いよいよ、 ほかの惑星に入植する時が来ました。 まずは£colony_ship£ §Sコロニー船§!を[GetBuildGrow]しなければなりません。 §Sコロニー船§!の[GetBuildGrow]には長い時間がかかり、 大量の£alloys£ §S合金§!、 £food£ §S食料§!、 そして£consumer_goods£ §S消費財§!が必要ですが、 繁栄する£colony£ §S植民地§!は投資を上回る利益をもたらしてくれます。\n\n§S星系基地§!をクリックして、 §S造船所§!タブを開いてください。 そして設計の選択肢の中から§Sコロニー船§!を選びます。\n\nコロニー船の建造を開始するには、 十分な資源の備蓄が必要です。"
 colony_ship_built: "コロニー船を建造した"
 tutorial_11_tooltip: "§Sチュートリアル：コロニー船建造の[GetBuildGrowCap]§!が状況レポートに追加された"
 tutorial_12_chain_title: "チュートリアル：植民地の設立"
 tutorial_12_chain_desc: "我々はこの新しい£colony_ship£ §Sコロニー船§!を使って、 初の£colony£ §S植民地§!を設立するべきです。 ベストな惑星の候補は我々母星と同じ環境の惑星 (入植者が環境に適応しやすい惑星) です。\n\n£planet£ §S惑星§!に入植するには§Sコロニー船§!を直接クリックするか、 §Sアウトライナー§!から選択してください。 そして艦隊画面で§S入植§!ボタンをクリックしてから、 植民地にしたい惑星を選んでください。 調査済かつ§Sアノマリー§!が存在しない惑星しか選択できないことに注意してください。 また、 入植できるのは国境の内部にある惑星だけです。 居住性の低い惑星に入植することもできますが、 リスクがともないます。"
 colony_established: "植民地を設立した"
 tutorial_12_tooltip: "§Sチュートリアル：植民地の設立§!が状況レポートに追加された"
 tutorial_13_chain_title: "チュートリアル：総督の任命"
 tutorial_13_chain_desc: "新しい£colony£ §S植民地§!を統治するために、 §S惑星総督§!を任命すべきでしょう。 それにはまず植民地をクリックして§S惑星概要§!タブを開き、 §S総督§!ウィンドウの§S変更§!ボタンを押してください。 すると§Sリーダー§!画面が開き、 現在雇用されている総督の一覧が表示されます。\n\n画面上部の§S雇用§!ボタンをクリックして、 表示される候補のなかから1人選んでください。リーダーを雇う際には、 つねに£unity £§Y統合力§!を消費することに注意してください。 足りなければ貯まるのを待ちましょう。\n\n雇用した新しい総督候補は、 母星で任命されるのを待ちます。"
 governor_recruited: "総督が任命された"
 tutorial_13_tooltip: "§Sチュートリアル：総督の任命§!が状況レポートに追加された"
 tutorial_14_chain_title: "チュートリアル：さらなる植民地の設立"
 tutorial_14_chain_desc: "新しい£colony£ §S植民地§!を設立し、 帝国をさらに拡大しましょう。 £alloys£ §S合金§!、 £food£ §S食料§!、 £consumer_goods£ §S消費財§!の蓄えが十分にあれば、 さらに多くの£colony_ship£ §Sコロニー船§!を[GetBuildGrowCap]し、 新たな植民地の設立に送り出すことができます。\n\nしかし、 植民地は自給自足できるようになるまでに多くの£energy£ §Sエネルギー通貨§!を消費するため、 あまり多くの植民地を同時に開発しないように注意してください。"
 colonies_established: "複数の植民地を設立した"
 tutorial_14_tooltip: "§Sチュートリアル：さらなる植民地の設立§!が状況レポートに追加された"
 tutorial_15_chain_title: "チュートリアル：資源産出"
 tutorial_15_chain_desc: "発展中の産業は資源を激しく消費します。 よって£minerals£ §S鉱物§!の供給を増やさなくてはいけません。 そのためには、 鉱床が存在する£planet£ §S惑星§!や小惑星の軌道上に£mining_station£ §S採掘ステーション§!を[GetBuildingGrowing]するか、 居住惑星の地表に§S鉱業区域§!を追加してください。\n\nステーションや£building£ §S建造物§!の維持には£energy£ §Sエネルギー通貨§!が必要なので、 それも十分に供給してやる必要があります。 エネルギー通貨は居住惑星の地表にある§S発電区域§!で産出されます。 またエネルギー通貨を含有する惑星、 小惑星、 恒星の軌道上に建設された§S採掘ステーション§!からも得られます。"
 mineral_income: "月間鉱物産出量+30"
 credit_income: "月間エネルギー通貨産出量+10"
 tutorial_15_tooltip: "§Sチュートリアル：資源産出§!が状況レポートに追加された"
 tutorial_16_chain_title: "チュートリアル：艦隊の生産"
 tutorial_16_chain_desc: "[Root.GetName]を守るために強力な宇宙艦隊を[GetBuildGrow]するべきです。\n\nひとまず、 §Sコルベット§!を数隻[GetBuildGrowCap]しましょう。 §S合金§!の供給が安定しているなら、 §S星系基地§!でコルベットを建造してください。 新しい軍艦はつねに、 [GetBuildGrow]された§S星系基地§!の周りを周回する既存艦隊に合流します。\n\n艦隊の軍事力を最大限に生かしたい場合は、 §S提督§!を任命しましょう。 これにより、 £commander£ §S司令官§!をもたないほかの艦隊に対して優位に立つことができます。§S§!"
 corvettes_built: "コルベットを建造した"
 admiral_assigned: "司令官を任命した"
 tutorial_16_tooltip: "§Sチュートリアル：セクターの設立§!が状況レポートに追加された"
 tutorial_17_chain_title: "チュートリアル：セクターの設立"
 tutorial_17_chain_desc: "直接的に統治できる£planet£ §S惑星§!の数には上限があります。 この上限数は画面上部のバーで確認可能です。 上限を超えた場合はペナルティが課されます。 §Sセクター§!には半自治的な権利が与えられており、 その内部に含まれる惑星を管理します。 新たなセクターを作成するには、 画面上部にあるバーのドロップダウンでアイコンをクリックするか、 §SF5§!キーを押して§S惑星とセクター§!画面に入ります。 そして右上にある§S新セクターの創設§!ボタンを押しましょう。\n\nこれで§Sセクター管理モード§!になり、 新しいセクターを構成する£system£ §S星系§!を選択できます。 選択した星系に属するすべての惑星はセクターの管理下に置かれます。 £colony£ §S植民地§!をもつ星系を選択し、 §S完了§!ボタンを押しましょう。 これで最初のセクターが完成します！"
 sector_established: "セクターを設立した"
 tutorial_17_tooltip: "§Sチュートリアル：セクターの設立§!が状況レポートに追加された"
 tutorial_18_chain_title: "チュートリアル：セクターの統治者"
 tutorial_18_chain_desc: "新しい§Sセクター§!を管理する§S総督§!を任命しましょう。 そのセクター内にあるすべての£planet£ §S惑星§!は、 総督のスキルレベルや特性の効果を享受できるようになります。"
 sector_governor_assigned: "セクターの総督"
 tutorial_18_tooltip: "§Sチュートリアル：セクターの総督§!が状況レポートに追加された"
 tutorial_19_chain_title: "チュートリアル：艦船の設計"
 tutorial_19_chain_desc: "新しい宇宙船を設計するには、 画面左にあるバーの§S艦隊管理§!を押すか、 §SF9§!を押して§S艦船設計§!画面に移ってください。 §S新しい設計§!ボタンをクリックし、 §S設計する船の種類§!が表示されたら、 §Sコルベット§!を選んでください。 §S区画なし§!ボタンをクリックして設計の§S区画§!を選びましょう。\n\nコルベットは最も小さいタイプの戦闘艦であるため、 区画は1つしかありませんが、 大型艦では複数の区画が利用可能です。 これら区画は、 §S武装§!や§S機能§!スロットの数を決定します。 区画を選択したら、 出力がプラスであることに気をつけながら、 使用可能なスロットをコンポーネントで埋めてください。\n\n手順を簡単にしたい場合は、 §S艦船自動生成§!ボタンをクリックすると設計が終了します。"
 ships_designed: "艦船を設計した"
 tutorial_19_tooltip: "§Sチュートリアル：艦船の設計§!が状況レポートに追加された"
 tutorial_20_chain_title: "チュートリアル：観測拠点"
 tutorial_20_chain_desc: "§S[Owner.GetPreFTLUpper]文明§!が存在する惑星の軌道上に、 §S観測拠点§!を[GetBuildGrow]すべきです。 この宇宙ステーションは、 いくつかの§S任務§!を遂行できますが、 発展途上の文化に干渉する際の我々の方針によって、 利用可能な任務が変わります。\n\n観測拠点は£mining_station£ §S採掘ステーション§!あるいは£science_ship£ §S研究ステーション§!と同じやり方で、 [Owner.GetPreFTLUpper]文明のある惑星軌道上にのみ建設できます。 £construction_ship£ §S建設船§!を選択して、 艦隊画面の§S観測拠点を[GetBuildGrowCap]§!ボタンをクリックしてください。\n\nそして、 研究したい[Owner.GetPreFTLUpperPlural]文明がある惑星を選択すると、 建設船が建造を始めます。"
 observation_post_built: "観測拠点を建設した"
 tutorial_20_tooltip: "§Sチュートリアル：観測拠点§!が状況レポートに追加された"
 tutorial_21_chain_title: "チュートリアル：戦略資源"
 tutorial_21_chain_desc: "£strategic_resource£ §S戦略資源§!のある天体の軌道上に、 £mining_station£ §S採掘ステーション§!を[GetBuildGrow]するべきです。 これらの希少な資源には莫大な戦略的価値があります。\n\n§S調査§!によってそのような資源を発見したら、 £construction_ship£ §S建設船§!を選択して、 §S採掘ステーションを[GetBuildGrowCap]§!ボタンをクリックしてから、 適切な天体をクリックしてください。"
 tutorial_21b_chain_title: "情報：戦略資源"
 tutorial_21b_chain_desc: "£strategic_resource£ §S戦略資源§!を埋蔵する天体の軌道上に、 £mining_station£ §S採掘ステーション§!を建造しました。 これらの希少な資源の採掘には特定のテクノロジーを必要としますが、 莫大な戦略的価値があるので、 見逃さないようにつねに目を光らせるべきです。"
 strategic_resource_extracted: "戦略資源を抽出した"
 tutorial_21_tooltip: "§Sチュートリアル：戦略資源§!が状況レポートに追加された"
 tutorial_22_chain_title: "準知的生物の知性化"
 tutorial_22_chain_desc: "下等な種族は§S知性化§!するべきですが、 そのためには§Sエピジェネティック変化の誘発§!技術を先に研究する必要があります。 \n\n§S種族§!画面で当該種族を選択し、 知性化ボタンをクリックして、 準知的生物を§S知性化§!してください。"
 tutorial_22_tooltip: "§Sチュートリアル：準知的生物の知性化§!が状況レポートに追加された"
 species_uplifted: "準知的種族を知性化した"
 tutorial_23_chain_title: "チュートリアル：ファーストコンタクト"
 tutorial_23_chain_desc: "宇宙の暗黒で未知の存在に遭遇したときには、 §Sコミュニケーションの確立§!を試みるべきです。 \n\nこれは、 §S状況レポート§!で§Sファーストコンタクト§!を選択して§Sファーストコンタクトを表示§!ボタンをクリックするか、 §S銀河地図§!で§Sファーストコンタクト§!アイコンをクリックして直接アクセスすることで行うことができます。\n\n\n$tttt$$tttt$$ttt$£firstcontact£\n"
 contact_made: "コンタクト成立"
 tutorial_23_tooltip: "§Sチュートリアル：ファーストコンタクト§!が状況レポートに追加された"
 tutorial_24_chain_title: "チュートリアル：種族の補正"
 tutorial_24_chain_desc: "帝国内に住むあらゆる知的生命体は、 十分な§S特性ポイント§!を振り分けることで§S補正§!できます。\n\nこの作業は§S種族§!画面から§S補正§!メニューにアクセスし、 対応する§Sスペシャルプロジェクト§!を研究することによって実行できます。 このプロジェクトには£society£ §S社会学研究§!が必要であり、 補正がアクティブになっているあいだは、 その分野のあらゆる技術進歩がこの研究に注ぎこまれます。"
 species_modified: "種族の補正が完了"
 tutorial_24_tooltip: "§Sチュートリアル：種族の補正§!が状況レポートに追加された"
 tutorial_25_chain_title: "チュートリアル：星系の確保"
 tutorial_25_chain_desc: "ほかの星系の恒星の軌道に§S星系基地§!を[GetBuildingGrowing]ことで、 国境を拡大できます。 これにより、 £system£ §S星系§!を確保し、 星系内の資源を利用できるようになります。 また、 国境を閉鎖している場合は、 他勢力の通行を阻止できます。\n\n£construction_ship£ §S建設船§!を選択し、 艦隊画面内の§S星系基地を[GetBuildGrowCap]§!をクリックしてから、 建設したい恒星を左クリックしてください。 または、 恒星を右クリックして§S星系基地を[GetBuildGrowCap]§!を選択してください。 \n\nほかのステーションとは違い、 §S星系基地§!は国境の外側にも建設できます。"
 frontier_outpost_built: "星系基地を建設した"
 tutorial_25_tooltip: "§Sチュートリアル：星系基地§!が状況レポートに追加された"
 TUTORIAL_PLANETVIEW_MANAGEMENT_TITLE: "チュートリアル：管理"
 TUTORIAL_PLANETVIEW_MANAGEMENT_DESC: "§S管理§!タブには£planet£ §S惑星§!の状態とレイアウトに関する重要な情報が表示されます。\n\n§S惑星特性§!セクションでは除去可能な自然£blocker£ §S障害物§!や、 既存の§S特性§!を確認できます。\n\n§S現在の人口§!セクションには£planet£ §S惑星§!のすべての£pops£ §SPOP§!が表示されます。\n\n£sector£ §Sセクター§!パネルは、 惑星を§Sセクター§!の一部として管理し、 惑星管理を自動化することができます。\n\n§S植民地アセンション§!は、 必要なテクノロジーと資源の蓄えがあれば、 植民地のアセンションを可能とし、 §S惑星§!を効率的にアップグレードすることができます。"
 TUTORIAL_DATABANK_TITLE: "チュートリアル：データバンク"
 TUTORIAL_DATABANK_DESC: "£databank£ §Sデータバンク§!は、 このゲームのシステムを理解するための頼れる情報源です。\n\n各項目がカテゴリー別に分類されており、 特定の仕組み、 §S機能§!、 概念をいつでも簡単に調べることができます。\n\n検索するか、 リストからトピックを選択することで、 詳しい情報を確認できます。"
 TUTORIAL_EMPIRE_FOCUS_TIMELINE_TITLE: "チュートリアル：関心事項とタイムライン"
 TUTORIAL_EMPIRE_FOCUS_TIMELINE_DESC: "£focus_core£ §S帝国関心事項§!システムでは、 £focus_exploration£ §S探索§!、 £focus_conquest£ §S征服§!、 £focus_development£ §S開発§!から優先事項を選び、 帝国を特定の方向に発展させることができます。\n\n関心事項にはそれぞれタスクカードが含まれており、 選択した方向性に沿って指示が出されます。 カードを完了すると、 そのカテゴリーの§S進捗ポイント§!が付与されます。\n\n現在選択している関心事項に関連のあるタスクは、 出現率が上昇します。 カードは£unity£ §S統合力§!を使って引き直すことができ、 関心事項自体も変更可能です。\n\n§S完了§!タブと§S進捗§!タブで、 目標の達成状況や次の報酬レベルまであとどのくらいかを確認しましょう。\n\n§Sタイムライン§!には帝国の§S起源§!から始まる主要な節目や歴史的出来事が記録され、 重要な出来事が展開するにつれ、 新たな情報が追加されていきます。"
 TUTORIAL_COLONIZATION_TITLE: "チュートリアル：惑星に入植する"
 TUTORIAL_COLONIZATION_DESC: "§S入植§!画面では、 惑星に入植するための準備を行います。\n\n惑星に定住させる§S種族§!を選び、 §S開発構想§!を割り当てて開発の方向性を決める必要があります。\n\n利用可能な§S区域§!、 §S惑星規模§!、 潜在的な§S補正§!の概要が、 惑星に影響を及ぼす§S惑星特性§!とともに表示されます。\n\n§S惑星の§!天然資源に応じて開発の優先順位を決めると、 植民地を最大限に活かすことができます。"
