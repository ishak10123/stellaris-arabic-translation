 d_blue_lava: "青い溶岩"
 d_blue_lava_desc: "テラフォーミングにより、 惑星の奥深くに豊富にあるガスと合金の堆積物の間で反応が起こり、 地表は魅惑的な青い溶岩で覆われた。"
 d_crystaline_growths: "結晶の成長"
 d_crystaline_growths_desc: "この惑星には、 採取して利用できる結晶質の成長物が豊富にある。"
 d_bogplants: "湿地植物"
 d_bogplants_desc: "超酸性湿地には、 餌を食べるときにエキゾチックガスを分泌する独特な植物が生息している。"
 d_liquid_dark_matter: "液体ダークマター"
