 d_space_junk_hazards: "宇宙ゴミの脅威"
 d_space_junk_hazards_desc: "軌道上の宇宙ゴミが大気圏に落ちてくると、 シャトルや地表構造物に危険をもたらす。"
 trait_inner_darkness: "内なる暗闇"
 trait_inner_darkness_desc: "ダークマターを吸収して密度を増し、 今では一定の間隔で微量の非重粒子を放出しているが、 予想寿命よりも早く燃え尽きてしまうだろう。"
