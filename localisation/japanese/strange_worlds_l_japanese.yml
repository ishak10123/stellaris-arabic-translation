 pm_rural_privilege_regular: "地方の特権"
 pm_rural_privilege_regular_desc: "地域の紛争で地方の味方をしたことで、都市部区域をいらだたせてしまった。"
 pm_rural_privilege_broken_shackles: "$pm_rural_privilege_regular$"
 pm_rural_privilege_broken_shackles_desc: "$pm_rural_privilege_regular_desc$"
 pm_peacekeeper_deployment: "平和維持部隊の展開"
 pm_peacekeeper_deployment_desc: " 区域間の紛争を解決する間、平和維持の取り組みが実施される。"
 bacterial_drive_modifier_desc: "遺伝子組み換え細菌を添加した水の供給は、 市民の単一の共通目標に対する並外れた献身を鼓舞する。"
 pm_bd_reproduction: "細菌誘導：繁殖"
