 pm_revolting_pests: "不快な害虫"
 pm_revolting_pests_desc: "この惑星の動物たちは魅力的だが、 不快でもある。 これらの生き物に近づくことはお勧めできない。"
 pm_gaseous_fauna: "ガスを吹く動物"
 pm_gaseous_fauna_desc: "家畜化された惑星の在来動物は、 娯楽と採取可能なガス分泌物を惑星の住民に提供している。"
 pm_gaseous_fauna_ct: "すべての£pop£ POPは、 §G$@gaseous_fauna_exotic_gases_production$§!$i_exotic_gases$を産出する"
 pm_urban_privilege_regular: "都市部の特権"
 pm_urban_privilege_regular_desc: "地域の紛争で都市部の味方をしたことで、地方区域をいらだたせてしまった。"
 pm_urban_privilege_broken_shackles: "$pm_urban_privilege_regular$"
