 ladder_wars_pre_ftl: "大ハシゴ戦争の痕跡"
 ladder_wars_pre_ftl_desc: "この戦争で荒廃した世界が再建されるにつれ、 彼らの他者へ対する猜疑心が増し、 交流を困難なものにしている。"
 living_metal_mega_construction_insight: "生体金属の大規模建築の洞察"
 living_metal_mega_construction_insight_desc: "我々が回収した生体金属の遺物は、 巨大構造物の開発に関する驚くべき洞察をもたらしてくれた。"
 living_metal_mega_construction_insight_ct: "生体金属の大規模建築布告の基本コスト：§G-50%§!"
 d_coagulated_landscape: "凝固した景観"
 d_coagulated_landscape_desc: "惑星の表面から粘り気のある液体が湧き出し、 凝固して通り抜けるのが難しい危険物となっている。 安全に建造できるスペースはほとんど残っていない。"
 d_shimmering_structure: "きらめく構造物"
 d_shimmering_structure_desc: "起源不明の巨大なきらめく構造物。"
 d_geothermal_hotspot: "地熱地帯"
 d_geothermal_hotspot_desc: "この惑星には、 エネルギーと研究機会の両方を提供する、 非常に優秀な地熱地帯が存在する。"
 d_ancient_cloaking_array: "古代クロークアレイ"
 d_ancient_cloaking_array_desc: "この植民地は、 古代異星人のクロークアレイによって守られている。 敵が攻撃するのは容易ではないだろう。 入植者はここで安全に暮らすことができる。"
 d_psionic_sands: "サイオニック砂"
 d_psionic_sands_desc: "この惑星の砂には、 高濃度のズィロが存在する。 彼らとコミュニケーションを取ることが可能だ。"
 d_mountains_of_steel: "鋼鉄の山"
 d_mountains_of_steel_desc: "テラフォーミングの極度の熱で形成された硬い山は、 豊富な資源の堆積地として役立っている。"
 d_lava_tubes: "溶岩洞"
 d_lava_tubes_desc: "マグマが流れたことで鉱物豊富な深いトンネルが形成された。 ここでの採掘は大きな利益を生む。"
