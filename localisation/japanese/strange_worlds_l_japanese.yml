 d_hydroactive_eggs: "水活性卵"
 d_hydroactive_eggs_desc: "この地域の自然環境では水が容易に手に入るため、 在来の動物相の繁殖率が非常に高い。"
 d_explosive_atmosphere: "爆発性の大気"
 d_explosive_atmosphere_desc: "揮発性微粒子の空中濃度により、 この惑星の大気は非常に可燃性が高い。"
