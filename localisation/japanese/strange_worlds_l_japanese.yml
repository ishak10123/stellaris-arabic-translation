l_japanese:
 ##THE WORLD IS BLEEDING
 strange_worlds.1.name: "世界は血を流している"
 strange_worlds.1.desc: "§Y[Root.GetName]§!の地表は、 我々の建設努力に対して、 これまでにない反応を示しており、 主要施設の基礎部分から、 正体不明の粘性物質がにじみ出ている。\n\nにじみ出ているのは深紅の液体だ。見た目はゼリー状で、 触ると非常に粘着性がある。\n\n[Owner.GetScientistPlural]は、 この分泌物をさらに詳しく調査したいと考えている。 現時点では、 ただ不便なだけだが、 [Owner.GetColonistPlural]の安全を確保するのが賢明だろう。"
 strange_worlds.5.name: "大量出血"
 strange_worlds.5.desc: "§Y[Root.GetName]§!は、 奇妙な深紅の液体に関して問題が発生していると報告している。\n\nその物質は手に負えない状態になり、 被災地全体でより速いペースで発生している。 この液体にはメリットもある。\n\n凝固するにつれ、 その粘着性はより顕著になり、 事実上、 建設作業を補うために利用できる天然のセメントを形成しているのだ。\n\nしかし、 この物質に[Owner.GetColonistPlural]が接触すると除去することはほぼ不可能なようだ。 影響を受けた人々を治療して研究すれば、 より多くの情報を収集できるだろうが、 建設の進捗は遅れるだろう。"
 strange_worlds.5.a: "被害を受けた者を治療し、 研究しろ。"
 strange_worlds.5.b: "建設を続けろ。"
 strange_worlds.15.name: "血の山"
 strange_worlds.15.desc: "§Y[Root.GetName]§!での建設はこれまでにないペースで進められているが、 粘性物質の出現はもはや施設の基礎だけに限定されるものではなくなった。 \n\n複数の場所で、 出血性の亀裂が発見されている。 当初は、 [Root.GetName]に本来存在しない物体のみがその物質の影響を受けていたが、 今では無差別に広がっている。 \n\nこの物質は現在、 [Root.GetName] の表面の大部分を占め、 急速に凝固し始め、 [Root.GetName] を包み込む厚い鉱物凝固物へと変化している。 \n\n費用のかかる試行錯誤の末、 エンジニアたちはさらなる被害を軽減しつつ、 物質を効率的に採取する方法を見つけた。 これは、粘性物質にかなりの譲歩を強いられた結果、 初めて可能となったことだ。"
 strange_worlds.15.a: "興味深い進展だ。"
 strange_worlds.20.name: "寄生虫"
 strange_worlds.20.desc: "§Y[Root.GetName]§!で感染した労働者に対する集中的な研究と治療の結果、 科学者たちは問題の根本原因を特定した。 \n\n当初は粘り気のあるゲル状の物質に見えたが、 実際には惑星と共生関係にある寄生微生物の集合体であることが判明した。 これらの寄生生物は、[Root.GetName]の地殻の下にある有機物を分解し、 新しい物質にリサイクルしている。 \n\n[Root.GetName]の開発による撹乱が寄生虫の自然なライフサイクルを乱し、 生態系に導入された外来物質に反応するようになった。 \n\n時間さえかければ、 科学チームはこれらの生命体と調和して共存する方法を見つけ、 その独特な生物学を[Root.GetName]の生産パイプラインに統合できると確信している。"
 strange_worlds.20.a: "面白い、 続けろ。"
 strange_worlds.25.name: "生産的な関係"
 strange_worlds.25.desc: "研究を通じて、 科学者たちは、§Y[Root.GetName]§!に寄生する微生物の変種を開発することに成功した。 この突然変異は、 我々の素材を自然生態系への無害な追加物として認識するように設計されており、 これにより、 問題なく建設を再開できるようになる。 \n\n惑星の生物圏に我々の設計した寄生生物を導入したところ、 うまく適応した。 \n\nさらに、 微生物の元々の分解効果を再利用することで、 我々はその物質の接着特性を利用し、 惑星の生産プロセスを向上させることに成功した。"
 strange_worlds.25.a.evopred: "どんなことを教えてくれるのだろうか？"
 strange_worlds.30.name: "どこからともなく"
 strange_worlds.30.desc: "§Y[Root.GetName]§!で将来の拡張に備えて土地を準備していたところ、 巨大な建造物が突如、 どこからともなく出現した。 \n\nこの構造物は非常に不安定なエネルギー波を放射しており、 それが断続的に視界に現れたり消えたりする原因となっている。 それがこのセクターの初期スキャンでは発見できなかった理由だ。 \n\n目に見える状態では、 理解不能なシンボルが封印された外観を飾っているが、 我々の記録にあるどの言語とも一致しない。 \n\n明らかな機能は見出せない。 この構造はこれまで害は及ぼしていないが、 開発の妨げになっている。"
 strange_worlds.30.a: "調査しろ。"
 strange_worlds.35.name: "視覚的アノマリー"
 strange_worlds.35.desc.no_cloak: "§Y[Root.GetName]§!のきらめく建造物の分析により、 物体が何らかの方法で光を屈折または歪めていると推測できる。 $strange_worlds.35.desc.common_1$建造物の特性に関する理解は深まったが、 今のところ入ることができていない。 入ることが可能かどうかさえ、 現状では不明だ。$strange_worlds.35.desc.common_2$"
 strange_worlds.35.desc.cloak: "§Y[Root.GetName]§!のきらめく建造物の分析により、 物体が何らかの方法で断続的なクローク効果を生み出していると推測できる。 $strange_worlds.35.desc.common_1$建造物のクローク効果に関する理解は深まったが、 今のところ入ることができていない。 入ることが可能かどうかさえ、 現状では不明だ。$strange_worlds.35.desc.common_2$"
 strange_worlds.35.desc.common_1: "\n\n下部のケイ酸塩マントルでは、 非常に活発な地熱活動が検出されている。 この強力なエネルギー源が孤立した構造を支えているが、 そのレベルは大きく変動している。\n\n"
 strange_worlds.35.desc.common_2: "\n\nその密閉された外装は、 見たことのない、 高反応性の素材で構成されている。 構造物への強行突入を試みたが、 電磁場をさらに不安定化させただけだった。 もっと詳しく調べるために、 強行突破することも可能だが、 予測不可能な不安定化のリスクが大きい。"
 strange_worlds.35.a: "強行突破だ。"
 strange_worlds.35.b: "外からの調査を続けろ。"
 strange_worlds.40.name: "暴走反応"
 strange_worlds.40.desc: "§Y[Root.GetName]§!の構造物への強制的な侵入を試みたが、 大惨事となった。 我々の装置は建造物のエネルギーパターンをさらに不安定にし、 激しい爆発を次々と引き起こした。 建造物は今では灰燼に帰したも同然だ。 \n\nその事故による破壊は思いがけない結果をもたらした。 長い間放棄されていた異星人の入植地跡が、 近くの谷に焼け落ちた状態で現れたのだ。 物体は、 かつての植民地に強力なクロークフィールドを何らかの方法で照射していたようだ。 \n\n彼らが何を隠そうとしていたのかは依然として謎だが、 確かなことは、 彼らはその努力の甲斐もなく滅びたということだ。 考古学的に価値のあるものは何も残っていない。 \n\nこの異常なテクノロジーの正確な仕組みは依然として不明であるが、 我々はそこからいくつかの新しい知識を得た。 この強力な地熱エネルギー源を我々の植民地のために再利用するつもりだ。"
 strange_worlds.40.a: "貴重な発見だ。"
 strange_worlds.40.a_ct: "§Yきらめく建造物§!の障害物を除去した"
 strange_worlds.45.name: "管理室"
 strange_worlds.45.desc.intro: "§Y[Root.GetName]§!にある異星人の建造物の外壁にある奇妙な印をさらに詳しく調べたところ、 一種のインターフェースであることが判明した。 建造物の内部にある隠し扉を開けるよう印を操り、 広大な制御室を明らかにすることができた。 \n\nその詳しい仕組みについてはわからないままだが、 試行錯誤しながらコマンドの基本的な理解を得た。 その機能を中断すると、 予期せぬ結果が生じた。 長い間放棄されていた異星人の入植地の廃墟が近くの谷に現れたのだ。 \n\n物体は、 かつての植民地に強力なクロークフィールドを何らかの方法で照射していたようだ。 何を隠していたのかは依然として謎だが、 確かなことは、 彼らはその努力の甲斐もなく滅びたということだ。 考古学的に価値のあるものは何も残っていないものの、 我々の科学者たちは制御室をうまく活用している。"
 strange_worlds.45.desc.a: "$strange_worlds.45.desc.intro$\n\n我々はこの建造物の奇妙なクローク効果を安定させ、 谷全体に拡大することが可能になった。 これは我々の植民地の安全性を大幅に高めるだろう。"
 strange_worlds.45.desc.b: "$strange_worlds.45.desc.intro$\n\n 我々はこの建造物のクロークフィールドを安定させ、 谷全体に拡大することが可能になった。 クローク技術に関する知識が大幅に上がった。"
 strange_worlds.45.a: "貴重な発見だ。"
 strange_worlds.55.name: "ネイチャー・ショック"
 strange_worlds.55.desc.intro: "大量にいる草食性の大型動物の種族が、 §Y[Root.GetName]§!でのエネルギー生産を妨害し始めている。 集団自殺のような劇的な行動で、 彼らは我々の発電所に自ら飛び込んでいき、 焼かれているのだ。 \n\n動物たちは目的達成のためなら手段を選ばず、 送電網の周囲のフェンスを壊してまで目的を遂げようとしている。 この奇妙な行動により、エネルギー生産は大きな打撃を受けている。\n\n"
 strange_worlds.55.desc.outro: "この種族は惑星の生態系において極めて重要な役割を果たしている。 このままでは、 彼らは自らを絶滅に追い込んでしまうだろう。"
 strange_worlds.55.desc.a: "$strange_worlds.55.desc.intro$しかし、 これは予想外の利益をもたらした。 [Owner.GetColonistPlural]たちがその生物の肉が非常に美味しいことを発見し、 食料生産量が増加したのだ。\n\n$strange_worlds.55.desc.outro$"
 strange_worlds.55.desc.b: "$strange_worlds.55.desc.intro$これにより収穫できるバイオマスは増えているが、 不便であることに変わりない。\n\n$strange_worlds.55.desc.outro$"
 strange_worlds.55.a: "行動を調査しろ。"
 strange_worlds.60.name: "触媒生理学"
 strange_worlds.60.desc: "我々は§Y[Root.GetName]§!における自殺傾向のある動物種について、 貴重な洞察を得た。 \n\nこれらの大型動物はほぼ目が見えない状態であり、 互いに視認し識別するためにエコーロケーションを使用している。 我々の送電網が、 彼らの鋭い聴覚を圧倒する周波数を放射しており、 それが発電所に対する攻撃的な行動を引き起こしているのではないかと考えている。 \n\nさらに、 その動物の独特な消化酵素が冶金精錬の触媒として作用することが判明した。 初期のテストでは、 我々の合金生産の改善の可能性を示している。 \n\nこれらの発見にもかかわらず、 通常のエネルギー生産を再開するには、 まだ長い道のりが残されている。科学者たちは引き続き調査を続けている。"
 strange_worlds.60.a: "$FASCINATING$"
 strange_worlds.65.name: "動物磁場"
 strange_worlds.65.desc.intro: "[Root.GetName]上の生物の自殺衝動の原因を特定した。 \n\n生物のエコーロケーションと社会行動に関するさらなる観察研究により、 衝撃的な事実が明らかになった。 彼らの求愛の鳴き声は、 我々の送電網から発生する音とほぼ同一の周波数であることが判明したのだ。\n\n"
 strange_worlds.65.desc.common: "我々は生物の鳴き声を再現し、 彼らの移住経路を我々の植民地から遠ざけることで、 彼らの個体数を安定させることができる。 これにより、 生物の糞から触媒酵素を採取し、 合金生産を促進しながら、 彼らの独特な生理学の研究を継続することができる。\n\n一方、\n\n"
 strange_worlds.65.desc.outro: "エネルギー生産を妨げることなく、 これらの動物を効率的に処理する特殊な電化収穫機を簡単に作成することもできる。"
 strange_worlds.65.desc.devouring_swarm: "$strange_worlds.65.desc.intro$幸いにも、 この知識を活用して生物を専用の収穫機に誘導することができる。 ごちそうの時間だ。"
 strange_worlds.65.desc.food: "$strange_worlds.65.desc.intro$$strange_worlds.65.desc.common$この生物は§Y[Root.GetName]§!の食生活の主軸となっている。\n\n$strange_worlds.65.desc.outro$"
 strange_worlds.65.desc.no_food: "$strange_worlds.65.desc.intro$これらの生き物は、 §Y[Root.GetName]§!\n\n$strange_worlds.65.desc.outro$において、 安定した持続的なバイオマスの供給源である。"
 strange_worlds.65.a: "糞を採取しろ"
 strange_worlds.65.b_devouring_swarm: "ごちそうの時間だ！"
 strange_worlds.65.b_default: "肉を採取しろ。"
 strange_worlds.75.name: "不思議な砂"
 strange_worlds.75.desc: "[Owner.GetColonistPlural]たちは、 §Y[Root.GetName]§!上の砂に関する奇妙な現象を報告している。\n\n穏やかな日に、 突然、 植民地の近くで激しい砂嵐が発生するというのだ。 どこからともなく現れた高速で移動する砂の川が、 始まったときと同様に突然に止まる。 まったく風のない日に砂丘が横方向に移動したという報告さえ上がってきている。\n\nこれらの出来事について、 大気や地質学的な説明は今のところ見つかっていない。\n\nこの奇妙な砂は直接的な被害をもたらしているわけではないが、 植民地の活動を妨げている。 この奇妙な現象の研究は現在も継続中だ。"
 strange_worlds.75.a: "興味深い。"
 strange_worlds.80.name: "歌う砂"
 strange_worlds.80.desc: "§Y[Root.GetName]§!の砂嵐が、 深いうなり音を発し始めた。 周波数は規則的にピッチが変化し、 繰り返されるパターンで変調する。 \n\nこの「歌う砂」現象は、 自由粒子の既知の特性に起因するものと考えらるが、 この変調の規則性は摩擦だけでは説明がつかない。 \n\nまた、 奇妙なシンボルが刻まれた砂丘で埋め尽くされた谷も発見した。 これらの記号は、 隆起した地形に一瞬現れた後、 すぐに消滅する。 \n\n砂を動かしているものが何かは不明だが、 パターンが一貫していることから、 その動きには目的や意図があることが示唆される。"
 strange_worlds.80.a: "パターンを研究しろ。"
 strange_worlds.85.name: "サイオニック砂"
 strange_worlds.85.desc_part1_no_zro: "§Y[Root.GetName]§!の砂嵐を研究している[Owner.GetScientistPlural]は、 ケイ酸塩物質全体にわたって新しい形のエキゾチックな物質が分布していることを発見した。"
 strange_worlds.85.desc_part1_zro: "§Y[Root.GetName]§!の砂嵐を研究している[Owner.GetScientistPlural]は、 ケイ酸塩物質全体にわたってズィロが分布していることを発見した。"
 strange_worlds.85.desc_part2_non_machine_common_no_psionic_zroni: "\nサンプルを扱っている間、 [Owner.GetResearchers]は、 短時間ではあるが強力なビジョンを経験した。 惑星にある記号が刻まれた砂丘をさまようズィロニの幻影が目撃されたのだ。"
 strange_worlds.85.desc_part2_non_machine_common_no_psionic_no_zroni: "\nサンプルを扱っている間、 [Owner.GetResearchers]は、 短時間ではあるが強力なビジョンを経験した。 惑星にある記号が刻まれた砂丘をさまよう見たことのない異星人の幻影が目撃されたのだ。"
 strange_worlds.85.desc_part2_non_machine_common_psionic_zroni: "\nサンプルを扱っている間、 [Owner.GetResearchers]は、 短時間ではあるが強力で超能力的なビジョンを経験した。 惑星にある記号が刻まれた砂丘をさまようズィロニの幻影が目撃されたのだ。"
 strange_worlds.85.desc_part2_non_machine_common_psionic_no_zroni: "\nサンプルを扱っている間、 [Owner.GetResearchers]は、 短時間ではあるが強力で超能力的なビジョンを経験した。 惑星にある記号が刻まれた砂丘をさまよう見たことのない異星人の幻影が目撃されたのだ。"
 strange_worlds.85.desc_part2_machine_common: "\nサンプルを扱っている間、 [Owner.GetResearchers]は内部回路に干渉が発生した。\n\n"
 strange_worlds.85.desc_part2_machine_zroni: "$strange_worlds.85.desc_part2_machine_common$これらの強力な干渉は視覚処理の機能不全を引き起こし、 その結果、 惑星にある記号が刻まれた砂丘をさまようズィロニの幻影が現れた。"
 strange_worlds.85.desc_part2_machine_no_zroni: "$strange_worlds.85.desc_part2_machine_common$これらの強力な干渉は視覚処理の機能不全を引き起こし、 その結果、 惑星にある記号が刻まれた砂丘をさまよう見たことのない異星人の幻影が現れた。"
 strange_worlds.85.desc_part3_common: "\nこれらの幻影が記号の起源であるようだ。 記号の解読には時間がかかるが、 明らかに何らかの文字であると我々は考えている。\n\n"
 strange_worlds.85.desc_part3_zro: "$strange_worlds.85.desc_part3_common$ズィロを砂から抽出することも可能だが、 そうするとおそらく幻影が消滅するだろう。 しかし、 かなりの量の貴重な物質があるのも確かだ。"
 strange_worlds.85.desc_part3_no_zro: "$strange_worlds.85.desc_part3_common$砂から異質な物質を抽出することも可能だが、そうするとおそらく幻影が消滅するだろう。 しかし、 この物理法則に反する独特な物質は、 非常に価値の高いものとなる可能性がある。"
 strange_worlds.85.a: "翻訳作業を続けろ。"
 strange_worlds.85.b_no_zro: "エキゾチックな物質を今すぐ回収しろ。"
 strange_worlds.85.b_zro: "ズィロを今すぐ回収しろ。"
 strange_worlds.90.name: "砂のスペクタクル"
 strange_worlds.90.desc_intro_zroni: "我々はズィロニ文化に関するこれまでの知識を活かし、 §Y[Root.GetName]§!の砂の上にズィロニの挨拶の記号を書いた。 反応はすぐにあった。"
 strange_worlds.90.desc_intro_no_zroni: "言語データベースを使用して、 我々は知られているすべての異星文字で、 挨拶を表す数百の記号を§Y[Root.GetName]§!の砂の上に書いた。 やがて、 返事が返ってきた。"
 strange_worlds.90.desc_common: "\n砂嵐が収まり、 谷底が落ち着くと、 砂丘の歌は静かになった。 そして、 砂丘全体が空中に持ち上がり、 新たな形へと変化した。 砂の動きによって形作られた存在が、 空中で複雑に渦を巻いている。\n\n"
 strange_worlds.90.desc_storyline_started: "$strange_worlds.90.desc_common$我々はすぐに、 これはズィロニの物語であると認識した。 新たな力を手に入れ、 恐ろしい葛藤に直面するビジョンである。 内なるズィロニに突き動かされた砂は、 古代のズィロニ族の物語を形作っていたのだ。$strange_worlds.90.desc_outro$"
 strange_worlds.90.desc_storyline_finished: "$strange_worlds.90.desc_common$我々はすぐに、 これはズィロニの物語であると認識した。 シュラウドへの昇華とそれに続く壊滅。 内なるズィロニに突き動かされた砂は、 古代のズィロニ族の悲運を物語っていたのだ。$strange_worlds.90.desc_outro$"
 strange_worlds.90.desc_storyline_not_started: "$strange_worlds.90.desc_common$これは異星人が新たな力を発見し、 最終的に分裂と破壊に至るという物語であることだけは理解した。$strange_worlds.90.desc_outro$"
 strange_worlds.90.desc_outro: "\n\nその後、 サイオニック砂は再び落ち着いた。 嵐は戻ってきていない。 これらの砂が我々が§Y[Root.GetName]§!にいることに対して、 より友好的になったと信じるしかない。"
 strange_worlds.90.a: "$FASCINATING$"
 strange_worlds.95.name: "採取作業"
 strange_worlds.95.desc_zroni_tech: "ズィロ蒸留の専門知識を活用し、 我々は§Y[Root.GetName]§!の砂からかなりの量のズィロを抽出した。 その過程で多くのことを学んだ。$strange_worlds.95.desc_outro$"
 strange_worlds.95.desc_no_zroni_tech: "§Y[Root.GetName]§!でズィロを採取する試みは、 成功とも失敗とも言えない結果をもたらした。 少量の抽出には成功したが、 実験の過程で多くが失われた。 しかし、 その過程で多くのことを学んだ。$strange_worlds.95.desc_outro$"
 strange_worlds.95.desc_outro: "\n\nズィロによる汚染が取り除かれたことで、 ここの砂は正常化したように見える。 植民地では、 もはや予測不可能な砂嵐現象は発生していない。 以前これらの砂を操っていたものは、 今やエーテルの彼方に消え去った。"
 strange_worlds.105.name: "突然の失踪"
 strange_worlds.105.desc_intro: "§Y[Root.GetName]§!で[Owner.GetExplorer]の1人と通信が途絶えた。 それは未踏の谷で§Yエキゾチックガス§!を発見したかもしれないと報告があった直後だった。\n\n"
 strange_worlds.105.desc_gestalt_non_machine: "ノードが静かになる前に、 一瞬の苦痛を感じた。 "
 strange_worlds.105.desc_gestalt_machine: "ノードのデータはオフラインになる前に破損した。 失踪者はもはや我々のネットワークに繋がっていない。"
 strange_worlds.105.desc_non_gestalt: "懸念すべきことに、 最後の通信は苦悶の叫び声のような音とともに突然途絶えた。 最悪の事態を恐れている。"
 strange_worlds.105.a: "気がかりだ。"
 strange_worlds.110.name: "苛性プール"
 strange_worlds.110.desc: "§Y[Root.GetName]§!で行方不明の[Owner.GetExplorer]の所在が最後に確認された場所の調査中、 純粋な§Yエキゾチックガス§!の霧を放つ強酸性の湿地帯を発見した。 この湿地には、 極度の酸性にも耐えることのできる、 たくましい在来種の植物が生息している。 \n\nこの地域は非常に危険だが、 ガス霧のさらなる調査は、 植民地の資源にとって有益である可能性がある。"
 strange_worlds.110.a: "霧を調査しろ。"
 strange_worlds.115.name: "消化する沼"
 strange_worlds.115.desc: "§Y[Root.GetName]§!の酸性湿地帯の調査中、 [Owner.GetScientistPlural]の一人と観測機器が原生植物の巻きひげに絡め取られ、 強い苛性の沼に引きずり込まれてしまった。 科学者も観測機器も瞬時に溶解した。 行方不明の[Owner.GetExplorer]にも同様のことが起こったと考えている。\n\nその後すぐに、 植物の巻きひげが目に見えて膨張し、 §Yエキゾチックガス§!の痕跡が急上昇した。 この捕食植物は、 酸性湿地を外部消化器官として利用しているようだ。 獲物を捕食用のつるで引きずり込み、 溶解させて栄養分を吸収しているのだ。 この過程で、 少量の採取可能なエキゾチックガスが放出される。\n\nこの生物の生態を応用し、 植民地の廃棄物を与えてガスをより多く生産させることができるのではないかと推測できる。 あるいは、 酸性湿地を中和して、 栄養豊富な土地を農業用に再生することもできるだろう。"
 strange_worlds.115.a: "生物を育成しろ。"
 strange_worlds.115.b: "土地を変えて再利用しろ。"
 strange_worlds.120.name: "湿地植物の無力化"
 strange_worlds.120.desc: "§Y[Root.GetName]§!上の酸性湿地帯を中和することに成功し、 同時にそこに生息していた植物種を根絶させた。 その結果、 §Yエキゾチックガス§!の霧も消えた。 \n\n再生された土地は、 在来植物が栄養分を吸収したことにより、 非常に肥沃な土地となっている。 我々は貴重な農業用地を確保した。"
 strange_worlds.120.a_ct: "[This.GetName]に§Y$district_farming_plural$§!を§G2§!追加する"
 strange_worlds.120.b.evopred: "素晴らしい。残骸も収穫しろ。"
 strange_worlds.130.name: "ダークマターの噴出"
 strange_worlds.130.desc: "これまで長い間休眠状態にあると思われていた§Y[Root.GetName]§!上の間欠泉で、 激しい噴出が起こり、 §Yダークマター§!が混入したガスが大気中に噴き出た。\n\n噴出により大気が飽和状態となり、 深刻な重力異常が発生し、 惑星外への移動や通信が遮断されている。\n\nダークマターは、 何らかの形で惑星の異質な内核から発生していると考えられる。 極端な状況は[Owner.GetColonistPlural]に危険をもたらすため、 成層圏から瘴気を抽出する軌道サイフォンが配備された。"
 strange_worlds.130.a: "状況を注意して監視しろ。"
 strange_worlds.135.name: "液体の闇"
 strange_worlds.135.desc_common_1: "§Y[Root.GetName]§!の大気から§Yダークマター§!の瘴気を吸い出すことに成功し、 被害状況の分析を始めた。"
 strange_worlds.135.desc_common_2: "\n植民地との連絡を再開したところ、 [Owner.GetColonistPlural]が固化したダークマターと思われるものによって石化していることが判明した。"
 strange_worlds.135.desc_organic_non_gestalt: "$strange_worlds.135.desc_common_2$石の中から生命反応を検知し、 慎重に抽出した。"
 strange_worlds.135.desc_machine: "$strange_worlds.135.desc_common_2$石の中から機能的な電子信号を検知し、 それを解き放った。"
 strange_worlds.135.desc_gestalt: "$strange_worlds.135.desc_common_2$集合体に再び溶け込もうとしていることを察知し、 彼らを物理的な墓から解放した。"
 strange_worlds.135.desc_outro: "\n予想に反して、 [Owner.GetColonistPlural]は長期にわたる露出と静止の影響を受けていないようだ。\n\n当初の事件の原因となった間欠泉は、 液体のダークマターの湖となっている。 これは前例のない出来事であり、 研究が必要だ。\n\n我々の[Owner.GetScientistPlural]は、 すでに限界に達している資源をどこに充てるべきか分からなくなっている。"
 strange_worlds.135.a: "石化していた者たちを隔離して研究しろ。"
 strange_worlds.135.b: "ダークマターの研究を優先しろ。"
 strange_worlds.140.name: "ダークマターの汚染"
 strange_worlds.140_intro: "[Owner.GetScientistPlural]は、 §Y[Root.GetName]§!の§Yダークマター§!の湖が惑星に及ぼす危険性は最小限であると確信している。 しかし、 人々に影響を与えている新たに現れた症状は危険性を伴っている。\n\n隔離された[Owner.GetColonistPlural]を研究している間、 我々はその物質に埋葬されたことによる進行中の物理的変化を特定した。"
 strange_worlds.140_common: "\n長時間の露出により、 彼らの体内の分子はダークマターで飽和し、 "
 strange_worlds.140_machine_1: "$strange_worlds.140_common$システムが完全に破壊された。"
 strange_worlds.140_non_machine_1: "$strange_worlds.140_common$循環器系が汚染された。"
 strange_worlds.140_machine_2: "\nこれらの汚染物質は、 システムの早期故障を引き起こすリスクがあるものの、 この惑星上で製造されたユニットは、 組み立てプロセスに組み込まれていれば、 ダークマターを効率的に処理し、 サブルーチンとして収穫することが可能になる。"
 strange_worlds.140_non_machine_2: "\nこれらの異常を発展させ、 [Owner.GetColonistPlural]の体に収穫可能なダークマターを処理させ、 分泌させることができる。 その代償として、 寿命が短くなる。"
 strange_worlds.140.a.dc_empire: "受け入れるべき祝福だ。"
 strange_worlds.140.a.machine_empire: "異常を発展させろ。"
 strange_worlds.140.a.normal: "汚染物質を処理しろ。"
 strange_worlds.140.b: "汚染物質を浄化しろ。"
 strange_worlds.145.name: "微小ブラックホール"
 strange_worlds.145.desc: "§Y[Root.GetName]§!のダークマター湖のさらなる調査により、 最初に起きた事件の原因を説明する重要な地質学的情報が明らかになった。\n\nこの惑星の中心部には、 長さが1メートルにも満たない微小なブラックホールが存在する。 惑星自体の質量が大きいため、 このようなアノマリーから検出されるはずの重力が相殺されていたのだ。 物体同士の関係は、 しばらくの間は維持されるであろう微妙な均衡状態にあるように見える。\n\n最近の地震活動によりマントル内部にずれが生じ、 噴出が起こった。 ダークマターの湖自体が栓の役割を果たし、 惑星の内核を安定させ、 さらなる噴出を防いだ。\n\nしかし、 ダークマターの長期にわたる飽和は、 当初考えられていたほど無害なものではなかったようだ。\n\n[Owner.GetColonistPlural]の質量中心部に不安定な微小ブラックホールが形成され、 その身体は激しく崩壊した。 残ったのは、 暗黒物質が結晶化した生命のない殻だけだった。 スキャンでは、 内部でさらなる活動の兆候は検出されていない。\n\n最終的な集計では、 §Y[Root.GetName]§!の人口の約4分の1が瞬時に失われたことが判明した。 その代わりに、 さまざまなポーズをとった固体のダークマターの像が惑星中に散らばっている。"
 strange_worlds.145.a.no_gestalt: "残念だ。"
 strange_worlds.145.a.gestalt: "ゾッとするな。"
 strange_worlds.155.name: "不快な害虫"
 strange_worlds.155.desc_homicidal: "§Y[Root.GetName]§!に生息する動物で特に不快感を催す種族に遭遇した。 \n\nこの生物は主な食料獲得方法にもなる防御メカニズムを進化させてきた。 固形の食料を自力で分解するのに必要な消化酵素を持たないため、 胃を持つ他の生物が吸い込むと嘔吐を引き起こす強力で不快なガスを放出する。 排出された物質は、 その後、 主な栄養源として彼らに消費される。 \n\nこれらの不快な生物を駆除することで、 思わぬ§Yエキゾチックガス§!と§Y食料§!が得られるだろう。"
 strange_worlds.155.desc_normal: "§Y[Root.GetName]§!の[Owner.GetColonistPlural]たちは、 惑星に生息するある動物に遭遇した。 独特な方法で食料を集める種族だ。\n\n最初は臆病だったが、 今では我々の存在にも慣れ、 人懐っこい性格で、 幼い[Root.Owner.GetSpeciesNamePlural]の間でも人気なようだ。\n\n直接的な危険性はないものの、 この生物は主な食料獲得方法にもなる防御メカニズムを進化させてきた。 固形の食料を自力で分解するのに必要な消化酵素を持たないため、 腸を持つ他の生物が吸い込むと嘔吐を引き起こす、 強力で不快なガスを放出する。 排出された物質は、 その後、 主な栄養源として彼らに消費される。\n\nこの状況は感染症の蔓延のリスクがあり、 指導者たちは[Owner.GetColonistPlural]たちに奇妙な生物を避けるよう強く促している。"
 strange_worlds.155.a: "興味深い宇宙生物学だ。"
 strange_worlds.155.b_purifiers: "不快な生物だ。"
 strange_worlds.155.b_swarm: "慣れるとおいしい！"
 strange_worlds.155.b_normal: "目撃したら撃ち殺せ。"
 strange_worlds.160.name: "不快な展開"
 strange_worlds.160.desc: "§Y[Root.GetName]§!から不快な生物を駆除することは困難であることが判明した。 植民地の幼い者たちは、 公式な警告にもかかわらず、 動物たちと遊ぶことを続けている。\n\nその結果、 我々の[Root.Owner.GetSpeciesOrganName]からのタンパク質を彼らが食物源として好むようになった。 我々の植民地は、 臭いガスを避けるようにしている惑星の他の動物よりも格段に狙われやすいターゲットとなってしまった。 これらの生物は我々の存在にさらに適応し、 食事後にうろつく単独の[Owner.GetColonist]に対して待ち伏せ戦術を用いていることが目撃されている。 信じられないことだが、 この状況にはいくつかの利点がある。\n\n我々の科学者たちは、 生物が吐き出す嘔吐を催すガスに、 貴重な§Yエキゾチックガス§!の粒子が含まれていることを発見した。 このガスは、 その生物を飼い慣らし、 隔離施設で飼育することで採取できる可能性がある。\n\nしかし、 植民地の大多数は、 生物を根絶やしにすることを提案している。"
 strange_worlds.160.a: "集めて捕獲しろ。"
 strange_worlds.160.b: "もう十分だ。目撃したら撃ち殺せ。"
 strange_worlds.165.name: "新鮮な空気"
 strange_worlds.165.desc: "§Y[Root.GetName]§!の生き物は、 もはや大量の嘔吐を引き起こすことはなくなった。\n\n宇宙生物学に合わせた合成栄養ペーストの開発により、 彼らの食餌サイクルを調整し、 [Owner.GetColonistPlural]に対する待ち伏せを終息させることができた。\n\n我々は一般の人々が安全な環境で動物を楽しむことができるよう、 慎重に設計された野生動物保護区に移した。 専門の飼育員が、 動物から§Yエキゾチックガス§!を危害を加えることなく抽出できるよう、 訓練されている。"
 strange_worlds.165.a: "ようやくほっとできるな。"
 strange_worlds.165.a.evopred: "その臭いが進化しないようにしろ。"
 strange_worlds.170.name: "撃って殺す"
 strange_worlds.170.desc: "公式に「発見次第射殺」という政策を採用して以来、 §Y[Root.GetName]§!の植民地付近で問題の生物が最後に目撃されてから数か月が経過した。\n\n一部の[Owner.GetColonistPlural]は毛皮で覆われた生き物の存在を懐かしむものの、 無理やり嘔吐させられる心配なく自由に移動できるようになったことで、 全体的には誰もが幸せになっている。\n\n我々の科学者たちは、 動物の死体を回収し、 内臓から直接ある程度の量の§Yエキゾチックガス§!を抽出した。"
 strange_worlds.170.a: "そうせざるを得なかった。"
 strange_worlds.185.name: "区域間の対立"
 strange_worlds.185.desc: "§Y[Root.GetName]§!からの報告によると、 地方と都市部の住民の間で、 区域間の対立が深刻化していることが明らかになった。 地理的位置以外に、 この反感を引き起こした明確な原因は見当たらない。 \n\n新しい入植者は当初は敵意を持って扱われるが、 それぞれの区域に配属されてから数週間も経つと、 すぐに仲間として歓迎されるようになる。 これを踏まえると、 科学者たちは、 この奇妙な行動は区域に限定された要因によって引き起こされていると確信している。 \n\nこの問題を調査する一方で、 事態の悪化を防ぐために状況を安定させる必要がある。 地方または都市部のいずれかを公式に支援するか、 あるいは平和を維持するために追の執行官を追加で配備するかを選択するべきだろう。"
 strange_worlds.185.a: "都市部を支援する。"
 strange_worlds.185.b: "地方を支援する。"
 strange_worlds.185.c: "執行官を追加で配備する。"
 strange_worlds.190.name: "水面下で何かがうごめく"
 strange_worlds.190.desc_intro: "§Y[Root.GetName]§!の広範囲にわたる環境調査の後、 科学者たちは区域間の敵対関係の原因を特定した。\n\n惑星のマントルの奥深くには、 巨大な生物の朽ち果てた死骸が眠っている。 何千年もの腐敗を経て、 その生物の脊髄液が惑星の地下水に染み込み、 サイオニック細菌を混入させたのだ。 精神に変化をもたらすこの微生物が、 [Owner.GetColonistPlural]の神経系に入り込み、 おそらくは元の動物が持っていたであろう強い縄張り本能を誘発した。\n\n"
 strange_worlds.190.desc_non_psionic: "給水設備に複雑な独自設計の高度フィルターを通すことで、 この問題に対処できるはずだ。\n\n"
 strange_worlds.190.desc_psionic: "このエキゾチックな不純物が、 我々が本来持っている超能力を妨害している。$strange_worlds.190.desc_non_psionic$"
 strange_worlds.190.desc_outro_non_psionic: "別の提案として、 科学者たちは、 細菌を細胞レベルで遺伝子操作し、 縄張り意識をより生産的な目的に向かわせることができると確信している。"
 strange_worlds.190.a: "地下水をフィルター処理しろ。"
 strange_worlds.190.b: "細菌の遺伝子操作を試みろ。"
 strange_worlds.195.name: "新たな能力"
 strange_worlds.195.desc_intro: "§Y[Root.GetName]§!における浄水ステーションの展開は、 大成功を収めた。\n\n"
 strange_worlds.195.desc_psionic: "過度な縄張り意識は収まり、 超能力への干渉はなくなっただけでなく、 §Y[Root.GetName]§!上の個人間の§Yサイオニック伝達§!を促進する自然のプロバイオティクスによって、 超能力はさらに強化された。 これにより、 我々の共有するテレパシーのつながりが強化され、 生産性が向上するだけでなく、 コミュニティ意識もさらに高まるだろう。"
 strange_worlds.195.desc_non_psionic: "過度な縄張り意識は収まった一方で、 §Y[Root.GetName]§!の入植者には、 個人間の§Yサイオニック伝達§!を促進する自然なプロバイオティクスという形で、 いくつかの潜在的に有用な副作用が残っている。 これにより、 [Owner.GetColonistPlural]たちはテレパシーで互いにコミュニケーションを取ることができ、 より強いコミュニティ意識が育まれ、 生産性が向上するだろう。"
 strange_worlds.195.a: "素晴らしい。"
 strange_worlds.195.a_ct: "§Y[Root.GetName]§!のPOPはすべて§Yサイオニック伝達§!を獲得"
 strange_worlds.195.a.evopred: "§M不思議な§!……味がする。"
 strange_worlds.195.a_ct.evopred: "第一種族が§Yサイオニック伝達§!を手に入れた"
 strange_worlds.200.name: "細菌の遺伝子再設計"
 strange_worlds.200.desc: "我々は細菌が§Y[Root.GetName]§!に及ぼす悪影響を無効化することに成功した。 [Owner.GetColonistPlural]たちの内輪もめは収まり、 生産性もすでに向上の兆しを見せている。 科学者たちは、 この微生物の遺伝子コードの編集をさらに進めることができると確信している。\n\nゲノムの正しい配列により、 [Owner.GetColonistPlural]の能力をさらに向上させることができる。 しかし、 その結果生じる微生物は、 惑星外に輸送されれば長生きできないだろう。\n\n細菌が繁殖するためには、 そのミトコンドリアと異星生物の死骸の間でサイオニック接続がそのまま維持されなければならない。 その理由については、 まだ完全には理解されていない。"
 strange_worlds.200.a: "生殖能力を高めろ。"
 strange_worlds.200.b: "力を強化しろ。"
 strange_worlds.200.c: "認知力を高めろ。"
 strange_worlds.1000.name: "鉱化された溶岩洞"
 strange_worlds.1000.desc: "§Y[From.GetName]§!の乾燥により新たに海底が露出し、全体に溶岩洞の広大なネットワークが広がっていることが明らかになった。\n\n これらの深いトンネルを形成したマグマの流れは現在休眠状態にあり、 §Y[From.GetName]§!の中核の極度の熱と圧力によって太古に形成された豊富な鉱物の層を残している。 これらの火成岩堆積物は非常に密度が高い。 \n\nこの場所での採掘作業はコストがかかるが、 非常に利益が大きい。"
 strange_worlds.1005.name: "水活性卵"
 strange_worlds.1005.desc: "§Y[From.GetName]§!のテラフォーミングにより、 在来の動物の個体数が予想外に急増している。\n\n多くの在来種の繁殖サイクルが、 環境中の水の有無と本質的に結びついていることがわかった。 以前は孵化に必要なだけの水分を吸収するまで数ヶ月間土中に埋まっていた卵が、 今ではあふれるほどに辺りを覆い尽くしている。 \n\nこの惑星の動物数は対数的なペースで急増している。 生物の多くは栄養価が高く、 §Y[From.GetName]§!に豊富な食料源を提供するとともに、 非常に活発な生態系を研究する機会も提供してくれるだろう。 この惑星の訪問者は、 今後、 惑星外汚染を防ぐため、 出発時に検査を受けることが義務付けられる。"
 strange_worlds.1005.evopred: "このペースを再現することはできないか？"
 strange_worlds.1010.name: "氷に閉じ込められて"
 strange_worlds.1010.intro: "§Y[From.GetName]§!におけるテラフォーミングの取り組みにより、 地表の氷の下に驚くほど多くの在来の動物が埋まっていることが明らかになった。 さらに驚くべきことは、 これらの生物が今も生きているということだ。 \n\nこの種族は、 極めて深い冬眠状態にあったと思われる。 これは、 §Y[From.GetName]§!の長大な氷河期を生き延びるための有効な方法である。 \n\nテラフォーミングによって解凍され、 冬眠状態は終了した。 \n\n氷の眠りから目覚めた生物は、 すでに知性の兆しを見せ、 簡単な道具を使って食料を集める努力をしている。"
 strange_worlds.1010.desc_exterminate: "$strange_worlds.1010.intro$速やかに駆除する。 そして、 その結果生じるバイオマスを我々の目的のために収穫する。"
 strange_worlds.1010.desc_hunted: "$strange_worlds.1010.intro$その独特な生理機能は、 我々に豊かな食料源をもたらしてくれるだろう。"
 strange_worlds.1010.desc_tolerated: "$strange_worlds.1010.intro$この種族の驚くべき冬眠能力を研究するか、 バイオマス用に生物を収穫するか、 どちらかを選ぶことができる。"
 strange_worlds.1010.desc_protected: "$strange_worlds.1010.intro$我々はこれらの生命体を保護すべきだ。 その驚くべき冬眠能力は、 さらなる研究に値する。"
 strange_worlds.1010.a.purge: "駆除しろ。"
 strange_worlds.1010.b.hunted: "狩猟しろ。"
 strange_worlds.1010.c.study: "研究しろ。"
 strange_worlds.1010.d.purge: "駆除しろ。"
 strange_worlds.1010.e.protect: "保護しろ。"
 strange_worlds.1015.name: "鋼鉄の山"
 strange_worlds.1015.desc: "§Y[From.GetName]§!の差し迫った問題が、 テラフォーミング専門家によって指摘された。 \n\n惑星の凍結した山脈の下には、 テラフォーミングによって超高温となった、 広大な鉄および炭素の高濃度な鉱床が眠っている。 今なら、 ほぼ溶融した資源を安全に取り除くことができる。 \n\nあるいは、 過熱状態を継続させることで、 合金の永続的な供給源を確保することもできる。 もちろん、 これは居住可能な生活空間の犠牲を伴うことになる。"
 strange_worlds.1015.a: "資源を優先しろ。"
 strange_worlds.1015.b: "何もするな。"
 strange_worlds.1020.name: "可燃性大気"
 strange_worlds.1020.desc: "§Y[From.GetName]§!のテラフォーミングは予期せぬ結果をもたらした。 これまで知られていなかったが、 惑星の表土は、 高濃度の§Y揮発性粉末§!を含む微粒子の混合物であり、 テラフォーミングの過程でそれが乱され、 大気中にばらまかれてしまったのだ。 \n\n残念ながら、 これらの高エネルギー粒子は、 地表での予期せぬ燃焼事故のリスクを高める。 今後植民地を設置する場合、 壊滅的な結果を避けるために、 事故や紛争の防止を最優先課題としなければならない。 \n\nしかし、 もし我々が危険性を慎重に管理することができれば、 §Y[From.GetName]§!の大気は、 これらの希少な素材の豊かな供給源となるだろう。"
 strange_worlds.1025.name: "青い溶岩"
 strange_worlds.1025.desc: "§Y[From.GetName]§!の地殻がテラフォーミングの過程で移動した結果、 珍しい自然現象が発生した。\n\n変動する地殻プレートの移動により、 いくつかの§Yエキゾチックガス§!の塊が移動し、 惑星の火山に存在する§Y合金§!を豊富に含んだ鉱物と反応し、 火山の噴火が鮮やかな青みを帯びるようになったのだ。\n\nこの現象の不安定な性質により、 惑星は少し住みにくい場所になってしまった。 その結果、 [Root.GetColonistPlural]のための居住空間を用意するという計画に影響を与えた。\n\nしかし、 これらの火山周辺の土地には、 我々が活用できる資源が豊富にある。"
 strange_worlds.1030.name: "絶え間ない雷雨"
 strange_worlds.1030.desc: "§Y[From.GetName]§!で新たな気象現象が報告されている。 \n\n惑星の岩盤内の結晶が、 テラフォーミングの過程で使用された化学物質に反応し、 放射線を浴びるようになった。 その結果、 気温の変動が惑星全域に絶え間ない雷雨を引き起こしている。 \n\nこのような独特な気象条件は、 今後のインフラ開発に影響を及ぼすことは必至であり、 放射線照射された結晶は、 長期的な居住可能性に影響を及ぼすことは確実である。 しかし、 [Owner.GetScientistPlural]は、 テラフォーミングが完了すれば嵐のエネルギーを利用できると確信している。 \n\nまた、 [Owner.GetEngineerPlural]は、 結晶の電荷を安全に中和する計画も立てている。 これにより嵐が消え、 安全に他の用途に利用できるようになるはずだ。"
 strange_worlds.1030.a: "嵐のエネルギーをうまく利用しろ。"
 strange_worlds.1030.b: "結晶を中和しろ。"
 strange_worlds.1035.name: "冬眠"
 strange_worlds.1035.desc: "§Y[event_target:hibernator_planet.GetName]§!の準知的な生物に関する研究により、 彼らの驚くべき冬眠パターンについての洞察が得られた。 彼らは特定の酵素によって制御されており、 この酵素が体内の深部静止睡眠への移行とそこからの覚醒を促すというものだ。 この状態では、 体内の化学反応はほぼ無視できるほどにまで減少する。 \n\n我々はこの酵素を抽出し、 鎮静剤の化合物を経由して、 他のさまざまな生物に投与することに成功した。 いずれの場合も、 それまでは冬眠できなかった種族が長期間の休眠状態に入り、 その間、 細胞の老化が大幅に抑えられた。 \n\nこの驚くべき進歩は、 有機種族が長距離の宇宙旅行を行う際の肉体的負担を大幅に軽減する、 人工的に強化された冷凍睡眠への道を開くものだ。"
 strange_worlds.1040.name: "空の埋葬"
 strange_worlds.1040.desc: "§Y[From.GetName]§!のテラフォーミングが完了すると、 空から死体が降ってきた。 \n\n高所から落ちてきた古代の死骸は、 衝撃でぐちゃぐちゃに潰れてしまった。 内臓器官の中に、 装飾用の器具や奇妙な遺物などの小さな物体を発見した。 これらはすべて、 惑星の大気上層部の濃い雲から落ちてきたものだ。 \n\nこれらの厚い雲は、 未知の異星人種が埋葬地として利用していたと推測するしかないが、 我々のテラフォーミングによる変化の結果として雲が薄くなり、 これまで中で浮遊していた内容物が放出されている。 大気が安定して雲の中の墓が完全に空になるまで、 これらの残骸が降り続けると予想される。"
 strange_worlds.1040.a: "恐ろしいが、利益があるかもしれない。"
 strange_worlds.1040.b: "不衛生だ。 すぐに片付けろ。"
 strange_worlds.1050.name: "軌道上デブリ"
 strange_worlds.1050.desc: "§Y[event_target:junk_moon_planet.GetName]§!のテラフォーミングエンジニアは、 惑星を周回するさまざまな宇宙ゴミや小さな破片により、 危険な労働環境に直面している。 物体の多さは、 地表とシャトルの往復に航行上の危険をもたらしている。 \n\nその物質の密度の高さを考慮し、 我々はこれらの破片の中で最も大きなものを磁化し、 軌道を周回する際に他の破片を引き寄せるようにする提案をまとめた。 そうすることで、 徐々により管理しやすい単一の物体へと統合することができる。 人工の惑星を効果的に作ることも可能だと考えている。 \n\nこれによってテラフォーミングの期間は長くなるが、 地表へのシャトルのアクセスが大幅に容易になり、 より大きな軌道上の破片が周期的に惑星の大気圏に突入するリスクを排除することができる。"
 strange_worlds.1050.a: "衛星を作れ。"
 strange_worlds.1050.b: "自然に燃え尽きるだろう。"
 strange_worlds.1060.name: "ゴミの衛星"
 strange_worlds.1060.desc: "§Y[event_target:junk_moon_planet.GetName]§!を周回する宇宙ゴミの集約に向けた取り組みは成功した。 \n\n大きな破片の多くを磁化することで、 徐々にすべてを巨大な金属スクラップの塊となるよう集めていった。 その密度は上昇し、 今ではかなりの重力を持つまでに至っている。 この新たに誕生した衛星は、 それ以来安定した軌道に落ち着いている。 \n\n危険な宇宙ゴミがなくなったことで、 §Y[event_target:junk_moon_planet.GetName]§!の表面へのアクセスははるかに容易になり、 大気圏への突入の可能性を心配する必要もなくなった。 さらに、 我々のエンジニアは、 この新しい衛星に採掘ステーションを設置できると確信している。"
 strange_worlds.1060.create_moon_ct: "[event_target:junk_moon_planet.GetName]に新しい衛星、 ゴミの衛星ができた"
 site_abandoned_bio_lab: "古代の施設"
 abandoned_bio_lab_desc: "§Y[fromfrom.planet.GetName]§!のスキャンにより、 惑星で最もアクセスが困難な地域で孤立した施設が発見された。 施設は活動休止中、 または放棄されているようで、 エネルギー反応は見られず、 長期間にわたる風化の兆候が見られる。 考古学調査隊がさらなる洞察を得る可能性がある。"
 strange_worlds.2000.name: "放棄されたバイオラボ"
 strange_worlds.2000.desc: "施設の内部には、 無数の放置された医療機器、 治療室、 死体安置所があり、 死体保存ポッドの中には、 病気や変形の兆候がある有機生命体の遺骸が部分的に保存されていた。 セキュリティドア、 監視装置、 拘置所の存在から、 §H[universal_macrophage_scientist.GetName]§!は、 収容されていた人々の一部は、 自分の意志に反してここに留め置かれていたと結論づけた。 我々はいくつかの機器部品を回収したが、 ほとんどが著しく劣化していた。 \n\nコンピューターシステムにはわずかにデータが残っており、 いくつかのファイルを復元したが、 翻訳が必要だ。"
 strange_worlds.2005.name: "古代の免疫学研究"
 strange_worlds.2005.desc: "§H[universal_macrophage_scientist.GetName]§!は§Y[fromfrom.planet.GetName]§!の施設から回収されたデータファイルの1つについて、 部分的な翻訳を作成した。 \n\n§L研究室17 - 進捗状況の更新 - 研究主任ゲレボー\n\n新しいプロトタイプは初期段階で有望な結果を示した。 被験者の免疫システムは100万倍に増強され、 すべての病原体が根絶された。 しかし副作用が持続し、 致命的な突然変異が起こり、 生存者はいなかった。 もう一度試してみる。 万能マクロファージは手の届くところにあると確信している。§!"
 strange_worlds.2010.name: "ゲレボーの選択"
 strange_worlds.2010.desc: "§H[universal_macrophage_scientist.GetName]§!は§Y[fromfrom.planet.GetName]§!の放棄された研究室からまた別のファイルを翻訳した。 \n\n§L研究室17 - 研究室内スタッフメモ - 研究主任ゲレボー\n\nプロジェクト中止命令が今日出た。 主君の忍耐も限界だ。 しかし、 我々の目標まであとわずか！ 万能マクロファージは、 たった一人の気まぐれよりも重要だ。 病気の心配のない未来が手に入るのだ！ このような進歩のために、 あと数人の命を犠牲にしても、 それは小さな代償ではないだろうか？ \n\nもしも彼らが被験者を送ってこないなら、 私は最新のプロトタイプを自分に試してみる。 私と共に歩まないか？§!"
 strange_worlds.2010.a: "細心の注意を払って進めろ。"
 strange_worlds.2015.name: "万能マクロファージ"
 strange_worlds.2015.desc: "§H[universal_macrophage_scientist.GetName]§!は§Y[fromfrom.planet.GetName]§!のバイオラボのコンピュータにある最後の記録を翻訳した。 \n\n§L研究室17 - 最終報告書 - 研究助手フィリドール\n\nゲレボーの自信に満ちた態度に、 我々は盲目的に従った。 \n\n自分たちでプロトタイプを試したところ、 我々の免疫システムは当初強化され、 外部の病原体に対してほぼ無敵となった。 その後突然変異が始まった。 \n\nゲレボーが最初に死んだ。 見ていられなかった。 今ではチーム全員が死体安置所に安置され、 私も間もなく彼らに加わるだろう。 \n\n我々は失敗した。 ゲレボーの不完全な理論に人生を託したのだ。 万能マクロファージ強すぎた。 最終的には身体そのものを攻撃するのだ。 ここにあるものはすべて破壊しなければならない。§!"
 strange_worlds.2015.a: "すべて破壊しろ。"
 strange_worlds.2015.b: "ゲレボーの研究を完成させろ。 大きな可能性を秘めている。"
 strange_worlds.2015.b.mutation: "我々は突然変異のエキスパートだ。 研究を終わらせよう。"
 has_tr_mutation_finish_tt: "§Y$Mutation$§!伝統ツリーを完了しているため、 このオプションは利用可能である。"
 strange_worlds.2015.c: "問題のある研究だが、 うまく活用できる。"
 strange_worlds.2030.name: "致命的な突然変異"
 strange_worlds.2030.desc: "§Y[Root.GetName]§!の市民は、 細胞や主要臓器の機能を妨害する深刻な身体的変異を経験している。 これらの変化が代謝効率を高める例もあるが、 ほとんどが死因となっている。 \n\nこれらの副作用は§Y万能マクロファージ§!の研究メモに記載されているものと完全に一致している。 我々の努力にもかかわらず、 この研究による致命的な突然変異は避けられないようだ。 この技術はもはや信頼できない。 万能マクロファージの残りの在庫をすべて破棄し、 その使用を中止する。"
 strange_worlds.2030.ct: "§Y[Root.GetName]§!は100£pop£ POPを失い、 1つの$@macrophage_kill_pop_every_x$ £pop£ POPごとにさらに100£pop£ POPを失う。\n§Y[Root.GetName]§!のすべての有機生命体£pop£ POPに§Yゲレボー変異§!が付与され、 生理機能が劇的に変化する。"
 site_anomalous_cube: "異常な立方体"
 anomalous_cube_desc: "巨大な金属製の立方体が§Y[Planet.GetName]§!で発見された。 継ぎ目のないその形状は高度な技術力を示唆しているが、 その起源や機能については推測することすらできない。 考古学調査隊が答えを提供してくれるかもしれない。"
 strange_worlds.2035.name: "波打つ金属"
 strange_worlds.2035.desc_intro: "[fromfrom.planet.GetName]の巨大な謎の立方体の詳細な調査により、 疑問点がさらに増えた。 その表面は完璧に滑らかで継ぎ目がなく、 我々のスキャナーでは透過できない。 立方体に近づくと、堂々とした壁面が我々の存在に反応して、 静かに波打っているように見えた。"
 strange_worlds.2035.desc_lm: "$strange_worlds.2035.desc_intro$§H[event_target:anomalous_cube_scientist.GetName]§!はこれが§Y生体金属§!の一種から作られているという結論に至った。"
 strange_worlds.2035.desc_no_lm: "$strange_worlds.2035.desc_intro$ §H[event_target:anomalous_cube_scientist.GetName]§!はこれが今まで見たことのない金属から作られているという結論に至った。"
 strange_worlds.2035.a: "調査を続けろ。"
 strange_worlds.2040.name: "立方体の中へ"
 strange_worlds.2040.desc: "§H[event_target:anomalous_cube_scientist.GetName]§!が[fromfrom.planet.GetName]にある金属製の立方体を調査している最中、 表面の1つが突然波打ち、 物体内部への入り口が現れた。 中に入るとコマンドコンソールがあり、 腐り果てた軟体人の殻がまだ残っていた。 かつては肉があったかもしれないが、 今やただの塵となっている。 \n\nコンソールの上には、奇妙な容器が置かれていた。時折何かが中を動いているような音が聞こえる。 しかし、 その容器を開けるのは容易ではなく、 §H[event_target:anomalous_cube_scientist.GetName]§!はまだそれを開けることに成功していない。"
 strange_worlds.2040.evopred: "塵くらいならまだ回収できるだろう。"
 strange_worlds.2045.name: "音声ログの発見"
 strange_worlds.2045.desc: "立方体の中央コンソールでデータマイニングを行っている間、 §H[event_target:anomalous_cube_scientist.GetName]§!は2つの短い音声ログを復元し、 解読することができた。 そこには、 1人の話し手による一連の喉によるクリック音と荒い声門を閉ざす音が含まれている。 言語データベースを相互参照した結果、 §H[event_target:anomalous_cube_scientist.GetName]§!は類似した古代言語を見つけ、 最初の音声ログの翻訳を完成させた。\n\n§L「私の話を聞いてください。 まだこの戦争を回避する時間はあります。 君主たちの自信は見当違いであり、 我々は[event_target:anomalous_cube_fallen_empire.GetName]を倒すことはできません。 \n\n彼らは我々を滅ぼすでしょう！」 「宥和政策が我々の唯一の選択肢です。 私の箱には贈り物が入っています。 これは平和のしるし、 生体金属の秘密です。 破滅を避ける唯一の方法は、 それを彼らに引き渡すことです」§!"
 strange_worlds.2045.a: "2つ目の音声ログを翻訳しろ。"
 strange_worlds.2050.name: "生体金属の不思議 "
 strange_worlds.2050.desc_intro: "立方体のコマンドコンソールからの2つ目の音声ログが翻訳された。 \n\n§L「私は失敗しました。 我々の消滅は間近に迫っており、 避けられません。 \n\n私の六面体宇宙船は妨害工作を受け、 [fromfrom.planet.GetName]に緊急着陸を試みます。 たとえ私が生き残ったとしても、 平和の証は届けられません。 我々の懸念通り、 [event_target:anomalous_cube_fallen_empire.GetName]は攻撃してくるでしょう」 §!\n\n§H[event_target:anomalous_cube_scientist.GetName]§!は箱のロック機構の解読に成功した。 箱の中には、 奇妙な金属の塊が入っている。 それは特に柔軟で活発であり、 数秒ごとに複雑な新しい形に絶え間なく変わっていく。"
 strange_worlds.2050.desc_no_war_lm: "\n生体金属の理解を深めるか、 以前の所有者が意図したように、 [event_target:anomalous_cube_fallen_empire.GetName]との関係を改善するために贈り物として提供することができる。"
 strange_worlds.2050.desc_no_war_no_lm: "\nこの驚異的な金属の理解を深めるか、 以前の所有者が意図したように、 [event_target:anomalous_cube_fallen_empire.GetName]との関係を改善するために贈り物として提供することができる。"
 strange_worlds.2050.desc_war_lm: "\nこの驚異的な物体と、 それが収められていた立方体の容器は、 生体金属に関する知識をさらに深めるために使用される。 "
 strange_worlds.2050.desc_war_no_lm: "\nこの驚異的な物体と、 それが収められていた立方体の容器は、 金属化合物と構造に関する知識をさらに深めるために使用される。 "
 strange_worlds.2050.a_no_war: "[event_target:anomalous_cube_fallen_empire.GetName]へ贈り物として捧げろ。"
 strange_worlds.2050.b_fallen_not_defeated_no_war: "我々だけのものにしておこう。"
 strange_worlds.3005.name: "怪しい預言者"
 strange_worlds.3005.desc: "§Y[event_target:pre_ftl_planet.GetName]§!の現地住民を観察している間、 我々の遠征チームは興味深い発見をした。 \n\n首都では、 古代の予言を成就し、 [event_target:pre_ftl_planet.Owner.GetSpeciesName]を新たな黄金時代へと導くために星から舞い降りたという「選ばれし者」の話題で持ち切りのようだ。 \n\n我々の人員は全員把握しているため、 この惑星を訪れているのが誰であれ、 さらに調査する価値がある。"
 strange_worlds.3005.a: "もっと調べろ。 "
 strange_worlds.3010.name: "偽りの預言者"
 strange_worlds.3010.desc_intro: "§Y[event_target:pre_ftl_planet.GetName]§!の「選ばれし者」に関する我々の遠征チームの調査により、 その正体が明らかになった。\n\n"
 strange_worlds.3010.desc_no_megacorp: "§Yナマラ人の放浪者§!が「星から舞い降りた」と称して、 [event_target:pre_ftl_planet.Owner.GetSpeciesName]神話の中心人物を装っている。"
 strange_worlds.3010.desc_megacorp: "§Y[event_target:caravaneer_fleet3_country.GetSpeciesName]§!のキャラバン商人が「星から舞い降りた」と称して、 [event_target:pre_ftl_planet.Owner.GetSpeciesName]神話の中心人物を装っている。"
 strange_worlds.3010.desc_outro: "\nさらに惑星を探索したところ、 首都から離れた到達困難な谷間に、 故障して使用できない彼らの船が隠されていることが判明した。 ハイパードライブの型式から、 彼らはしばらく前からここにいたことが分かった。 \n\n惑星に取り残されて以来、 彼らは地元の迷信を自分たちの利益のために利用しているようだ。 彼らは「天上の知識」に満ちた統治者として君臨し、 地元民からの崇敬や賞賛を喜んで受け入れている。 \n\nこのペテン師の存在を放置すれば、 発展途上の社会にとって深刻な結果を招く可能性が高い。 介入するのが最善策かもしれない。"
 strange_worlds.3010.a: "奴らの詐欺行為を暴露しろ。"
 strange_worlds.3010.b: "救出を申し出ろ。"
 strange_worlds.3015.name: "明かされた真実"
 strange_worlds.3015.desc_no_megacorp: "§Y[event_target:pre_ftl_planet.GetName]§!で[event_target:pre_ftl_planet.Owner.GetSpeciesName]神話の「選ばれし者」に成り済ましている§Yナマラ人の放浪者§!を排除することに成功した。"
 strange_worlds.3015.desc_megacorp: "§Y[event_target:pre_ftl_planet.GetName]§!で[event_target:pre_ftl_planet.Owner.GetSpeciesName]神話の「選ばれし者」に成り済ましている§Y[event_target:caravaneer_fleet3_country.GetSpeciesName]§!を排除することに成功した。"
 strange_worlds.3015.desc_outro: "\n地元の伝説をさらに詳しく調査した結果、 支配階級を説得することができた。 彼らの言うところの「選ばれし者」は、 実際には彼らを欺き、 この惑星を1000年間の暗黒時代に突入させるために送り込まれた悪魔だったと説得したのだ。 \n\n我々は墜落した宇宙船を解体し、 地元民が発見できるような痕跡を残さないようにした。 しかし、 すでにいくつかの所持品が見つかっており、 この種族に現在の理解を超えるテクノロジーの一端を垣間見させてしまった。"
 strange_worlds.3015.a: "残念だ。"
 strange_worlds.3020.name: "帰路"
 strange_worlds.3020.desc_intro: "遠征チームは§Y[event_target:pre_ftl_planet.GetName]§!の「選ばれし者」と面会し、 彼らの船の修理と宇宙への帰還の援助を申し出ることができた。\n\n"
 strange_worlds.3020.desc_no_megacorp: "§Yナマラ人の放浪者§!は申し出を快く受け入れた。 彼らは§Y[event_target:pre_ftl_planet.GetName]§!に不時着した後に誤って神として崇められるようになり、 それ以来、 正体を暴かれたら危害を加えられるのではないかと恐れて暮らしていたと説明した。 "
 strange_worlds.3020.desc_megacorp: "§Y[event_target:caravaneer_fleet3_country.GetSpeciesName]§!は申し出を快く受け入れた。 彼らは§Y[event_target:pre_ftl_planet.GetName]§!に不時着した後に誤って神として崇められるようになり、 それ以来、 正体を暴かれたら危害を加えられるのではないかと恐れて暮らしていたと説明した。"
 strange_worlds.3020.desc_outro: "\n彼らを我々の研究施設に移送し、 船を修理したところ、 彼らは感謝の気持ちとして、 別れを告げる前に船の備品の大部分を我々に譲ってくれた。 \n\n彼らの退去に伴って権力の空白期間が生じ、 §Y[event_target:pre_ftl_planet.GetName]§!上のさまざまな宗教宗派の間で、 短期間ではあるが残忍な権力争いが起きたが、 現在は沈静化している。"
 strange_worlds.3020.a: "面白いな。"
 strange_worlds.3025.name: "[event_target:nomad01_country.GetName]"
 strange_worlds.3025.desc: "[Owner.GetSpeciesName]、 あなたたちが我々の艦隊から離脱したナマラ人を対処してくれたことは承知している。 \n\nそれは我々にとっても問題であったのだ。 判断を誤ったこの人物は、 常に悩みの種であった。 その野望が我々の旅に危険をもたらすためだ。 \n\nどうか、 この贈り物を感謝の印として受け取ってほしい。"
 strange_worlds.3025.a: "感謝する。"
 strange_worlds.3030.name: "[event_target:caravaneer_home_country.GetName]"
 strange_worlds.3030.desc: "[Owner.GetSpeciesNamePlural]が行方不明だった§Y小うるさい奴§!をどうにかしてくれたのか？ 素晴らしい！ この馬鹿は私たちに頭痛の種だったのだ。あの訳のわからない話は聞くだけでも恥ずかしい。 これで5回目だ。 正直に言うと、 彼らがいなくなって嬉しい。 \nこれを受け取ってくれ。 問題を解消してくれたからな。 今回限りの特別なお礼だ。"
 strange_worlds.3030.a: "感謝する。"
 strange_worlds.3040.name: "残していったもの"
 strange_worlds.3040.desc: "§Y[event_target:pre_ftl_planet.GetName]§!の上空にある我々の観測拠点から、 先日行った地表での地質調査後に物資のコンテナがなくなったと報告があった。 \n\n物資に付けられた位置情報追跡装置を追跡すると、 地元の村がこれらの物資を発見し、 自分たちのものだと主張していることが判明した。 \n\n我々の貯蔵コンテナの入手によって、 [event_target:pre_ftl_planet.Owner.GetSpeciesAdj]社会の発展に悪影響を及ぼす可能性がある。"
 strange_worlds.3040.a: "残念だ。"
 strange_worlds.3045.name: "返送"
 strange_worlds.3045.desc_common: "§Y[event_target:pre_ftl_planet.GetName]§!で失われた物資が、 その土地の文化に奇妙な影響を与えているようだ。\n\n[Root.GetPreFTLUpper]に住む者たちは、 我々の観測用シャトルの粗雑な模造品を作り上げた。 この「艦船」は明らかに機能しないが、 調査中の研究者がここに住む者たちに目撃された証拠だ。\n\n地元の長老の指導の下、 [event_target:pre_ftl_planet.Owner.GetSpeciesName]は我々の地質土壌分析手順の模倣を行っているのが見られる。 我々が失くしたコンテナに土や石を詰めて、 「艦船」に積み込み、 辛抱強く待っているのだ。"
 strange_worlds.3045.desc_non_homicidal: "\nどうやら[event_target:pre_ftl_planet.Owner.GetSpeciesName]は、 我々の行動を模倣すれば、 より多くの物資が手に入るという印象を抱いているようだ。 この行動が彼らの社会全体に影響を及ぼす前に、 介入すべきである。"
 strange_worlds.3045.desc_homicidal: "\nこの行為は最終的に無駄であり、 死だけが待っている。"
 strange_worlds.3045.a_normal: "密かにコンテナを回収しろ。"
 strange_worlds.3045.a_megacorp: "物資を密かに回収しろ。"
 strange_worlds.3045.b_normal: "食料を鉱物と交換しろ。"
 strange_worlds.3045.b_megacorp: "物々交換しよう！"
 strange_worlds.3045.c: "原始人を排除しろ。"
 strange_worlds.3045.ct: "現在§Y[event_target:pre_ftl_planet.GetName]§!を監視している観測拠点は、 $@observation_outpost_crate_food_upkeep$ $i_food$の維持費で$@observation_outpost_crate_minerals_production$ $i_minerals$を生産している"
 strange_worlds.3050.name: "恨みの不在"
 strange_worlds.3050.desc: "§Y[event_target:pre_ftl_planet.GetName]§!から失われたコンテナを回収した後も船の積み込み儀式はしばらくの間続いたが、 最終的に[event_target:pre_ftl_planet.Owner.GetSpeciesName]の怒れる民が村の長老に刃を向け、 即席のシャトルに長老を放り込んで、 燃やしてしまった。 \n\n村人たちはいつもの日常に戻ったものの、 彼らの文化には「空の人々」に対する根強い憤りが残っている。"
 strange_worlds.3050.a: "承知した。 "
 strange_worlds.3060.name: "中止されたサービス"
 strange_worlds.3060.desc: "[Root.GetPreFTLLower]の[event_target:pre_ftl_planet.Owner.GetSpeciesName]社会が発展するにつれ、 我々は観測拠点で行わていた食料と鉱物の交換を中止した。\n\n興味深い実験ではあったが、 彼らの文明への継続的な干渉を続ければ、 我々の存在を彼らに早すぎる段階で知られてしまう危険性がある。"
 strange_worlds.3060.a: "妥当な措置だ。"
 strange_worlds.3060.ct: "観測拠点はもはや鉱物を産出せず、 食料維持費も必要とならなくなった。"
 strange_worlds.3070.name: "軌道上アノマリー"
 strange_worlds.3070.desc: "重力アノマリーにより、 §Y[event_target:pre_ftl_planet.GetName]§!上の観測拠点は軌道から外れ、 惑星の大気下層にまで一時的に落下した。 \n\n乗組員に怪我はなく、 当初の軌道に回復したが、 [event_target:pre_ftl_planet.Owner.GetSpeciesNamePlural]によって地表から拠点が発見された可能性が懸念されている。 \n\n現地人の目に触れたかどうか、 またそれが彼らの社会にどのような影響を与えるかは、時が経てば明らかになるだろう。"
 strange_worlds.3070.a: "観測を続けろ。"
 strange_worlds.3075.name: "天国へのハシゴ"
 strange_worlds.3075.desc_common: "原始的な画像撮影技術により、 我々の観測拠点が§Y[event_target:pre_ftl_planet.GetName]§!上空の低軌道にある間に撮影された。 目撃者の証言に加え、 これらの写真により、 さらなる調査を行うために「天国へのハシゴ」を建設しようという国も出てきた。 \n\nこれは明らかに無駄な努力であるが、 国家間の競争は不安定化をもたらしている。 最初の「ハシゴ」を完成させる競争において、 国家の誇りと資源の不足が火に油を注ぎ、 古い緊張関係が再燃している。"
 strange_worlds.3075.desc_non_homicidal: "\nもし我々の存在の証拠を否定することができれば、 [Owner.GetSpeciesHandName]の手に負えなくなるほど状況が悪化する前に、 緊張を和らげることができるかもしれない。\n\nあるいは、 [Root.GetPreFTLUpper]の国家間の外交関係は、 暴力が拡大するリスクを伴うものの、 興味深い社会学的な事例となる可能性がある。"
 strange_worlds.3075.desc_homicidal: "\n迫り来る混乱は、素晴らしい研究機会となるはずだ。"
 strange_worlds.3075.a: "我々の存在を示す証拠を抹消しろ。"
 strange_worlds.3075.b: "観測を続けろ。"
 strange_worlds.3075.b_ct: "観測拠点による£society£ §Y社会学§!研究の産出量が倍になる"
 strange_worlds.3080.name: "真実は必ずある"
 strange_worlds.3080.desc: "我々の工作員は、 §Y[event_target:pre_ftl_planet.GetName]§!上で我々の存在を示す証拠をうまく抹消した。 \n\n画像が否定され、 目撃者の信頼性が失墜したことで、 「天国へのハシゴ」の建設は中止された。 かつて分裂していた国々は、 自分たちの愚かさを恥じ、 合理的な調査と科学的手法の追求に専念することを誓った。 \n\nハシゴの建設現場は、 より高度な学習の場へと転用され、 「天空の城」の神話を否定する新たな学者たちが集結した。"
 strange_worlds.3080.a: "$FASCINATING$"
 strange_worlds.3080.a_ct: "[event_target:pre_ftl_country.GetName]は次の時代に向けて進捗を50%進める\n[event_target:pre_ftl_country.GetName]は物質主義になる。"
 strange_worlds.3085.name: "大ハシゴ戦争"
 strange_worlds.3085.desc: "「天国へのハシゴ」を構築しようとするなか、 §Y[event_target:pre_ftl_planet.GetName]§!の[Root.GetPreFTLLower]諸国間の緊張が全面的な世界規模の紛争へと発展した。 枯渇しつつある資源を巡る争いは2年間にわたって続き、 「大ハシゴ戦争」と呼ばれる殺戮の時代がようやく終焉を迎えた。\n\n平和条約の主な条件は、 共通の敵である「天空の城」に対して団結することである。 [event_target:pre_ftl_planet.Owner.GetSpeciesNamePlural]が荒廃した世界を再建するにつれ、 彼らの疑心暗鬼と未知の存在に対する憎悪は増大し、 彼らとの今後の交流はより困難になるだろう。"
 strange_worlds.3085.a: "後で対処すればいい問題だ。"
 strange_worlds.3085.a_ct: "観測拠点による £society£ §Y社会学§!研究の産出量が通常に戻る"
 create_hibernators_pops_ct: "§Y$trait_seasonal_dormancy$§!特性を持つ$@hibernators_pops_created|*0$£job_pre_sapient£ 準知的POPを作成する"
 pm_bleeding_planet: "血を流す惑星"
 pm_bleeding_planet_desc: "大地そのものが血を流している。 入植者の足元の地面を掘る際には注意が必要だ。\n"
 pm_contruction_coagulate: "建設用凝固剤"
 pm_contruction_coagulate_desc: "植民地の存在によって大地が血を流す。 粘性の高い液体が、 危険ではあるが、 自然の接着剤として作用する。\n"
 pm_hemosymbiosis: "血共生"
 pm_hemosymbiosis_desc: "この惑星から染み出る奇妙な液体が、 さらなる発展に影響を与えている。 建設時間と採掘作業はこの物質の恩恵を受けているが、 その代償として植民地の成長が妨げられている。\n"
 pm_parasitic_production: "寄生的産出"
 pm_parasitic_production_desc: "この惑星に存在する寄生生物は再利用され、 すべての労働者の生産性を向上させている。\n"
 pm_frying_fauna: "焼け焦げる動物"
 pm_frying_fauna_desc: "この惑星の大型動物は最適化された環境下で繁栄している。 動物が持つ独特な消化酵素は合金の精製に役立つ。 "
 pm_frying_fauna_machine: "$pm_frying_fauna$"
 pm_frying_fauna_machine_desc: "$pm_frying_fauna_desc$"
 pm_frying_fauna_2: "$pm_frying_fauna$"
 pm_frying_fauna_2_desc: "電化収穫機は、 この世界の大型動物を栄養素の安定供給源に変える。"
 pm_frying_fauna_2_machine: "$pm_frying_fauna$"
 pm_frying_fauna_2_machine_desc: "$pm_frying_fauna_2_desc$"
 pm_catalytic_excrement: "触媒排泄"
 pm_catalytic_excrement_ct: "この惑星の大型動物は最適化された環境下で繁栄している。 動物が持つ独特な消化酵素は合金の精製に役立つ。"
 pm_strange_sandstorm: "不思議な砂嵐"
 pm_strange_sandstorm_ct: "惑星の砂による独特な現象が、 植民地の活動に影響を与えている。"
 pm_perpetual_lightning: "絶え間ない雷雨"
 pm_perpetual_lightning_desc: "テラフォーミング中のアノマリーにより照射された結晶が露出したことで、 惑星全体に絶え間ない雷雨が派生するのにぴったりな気象環境が作り出された。"
 pm_dark_matter_geyser: "ダークマター間欠泉"
 pm_dark_matter_geyser_desc: "惑星はダークマターの瘴気で溢れてる。"
 pm_population_quarantine: "人口隔離"
 pm_population_quarantine_desc: "人口は隔離下にあり、 ダークマターによる石化の影響が調査されている。"
 pm_dark_matter_statue: "ダークマター像"
 pm_dark_matter_statue_desc: "惑星全体に、 固化したダークマターの石化した殻が散らばっている。 かつての住民の不気味な残骸は、 ある程度の研究機会を提供している。"
 pm_raining_corpses: "空から降る死体"
 pm_raining_corpses_desc: "かつて異星人が埋葬地として使用していた濃い雲が、 今では薄くなり、 雲の墓の遺体が惑星の表面に落ちてきている。"
