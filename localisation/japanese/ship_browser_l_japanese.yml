l_japanese:
 SHIPSET_LABEL: "艦船セット"
 SHIPSETS_LABEL: "艦船セット"
 SHIP_GRAPHICS_PREVIEW: "艦種を見る"
 SHIP_GRAPHICS_REQUIRED_DLC: "必要なDLC"
 SHIP_GRAPHICS_MISSING_DLC_TOOLTIP: "§Gクリックで$CULTURE_NAME$の艦を見る§!"
 SHIP_GRAPHICS_CAMERA_TRANSFORM_TOOLTIP: "£camera_zoom_in£ §Gマウスのスクロールホイールを前に回転§!させて拡大する。\n£camera_zoom_out£ §Gマウスのスクロールホイールを後ろに回転§!させて縮小する。\n£camera_rotate£ §Gマウスの右ボタン§!で艦船モデルをドラッグすると回転する。"
 SHIP_GRAPHICS_CORVETTE_DESC: "コルベットは帝国が最初に利用できる軍艦である。 速さと機敏さ、 そして安さが特長だ。"
 SHIP_GRAPHICS_FRIGATE_DESC: "フリゲートはコルベットの発展型艦船であり、 魚雷の運搬に特化している。 コルベットよりも遅く脆弱だが、 大きな目標に対しては壊滅的な打撃を与えることができる。"
 SHIP_GRAPHICS_DESTROYER_DESC: "駆逐艦はコルベットの敏捷性と速度を犠牲にして、 より高い火力と厚みのある船体を備えたものだ。"
 SHIP_GRAPHICS_CRUISER_DESC: "巡洋艦は汎用性と耐久性があり、 ダメージを与えることも吸収することもできる。"
 SHIP_GRAPHICS_BATTLESHIP_DESC: "戦艦は高価だが強力だ。 射程が長く、 相手が反撃する前に損傷させることに長けている。"
 SHIP_GRAPHICS_TITAN_DESC: "タイタンはそれ自体が非常に強力な軍艦だが、 オーラの能力を使って味方艦を強化することもできる。"
 SHIP_GRAPHICS_BIO_TITAN_DESC: "$SHIP_GRAPHICS_TITAN_DESC$"
 SHIP_GRAPHICS_JUGGERNAUT_DESC: "ジャガーノートの建造はどの帝国にとっても一大事業だ。 この巨艦は移動式の造船所と支援艦という両方の機能を持っている。"
 SHIP_GRAPHICS_COLOSSUS_DESC: "この巨大な艦は、 敵艦隊と戦うためではなく、 惑星全体を無力化することを任務とする。"
 SHIP_GRAPHICS_OUTPOST_DESC: "前哨地は星系基地の最低ランクに位置し、 星系の所有権を示す以外の機能はほとんどない。"
 SHIP_GRAPHICS_STARBASE_CITADEL_DESC: "シタデルは、 最上位までアップグレードした星系基地である。 この星系基地は堅牢な防衛能力を備えており、 どんな敵にとっても打ち破るのは困難だ。"
 SHIP_GRAPHICS_TRANSPORT_DESC: "輸送艦は、 戦争中に敵対する惑星を攻撃するため、 地上軍を運ぶ。 武装や装甲がほとんどなく、 敵地では支援する艦隊が必要となる。"
 SHIP_GRAPHICS_SCIENCE_DESC: "調査船は、 主に新しい星系の探査やアノマリーの調査に使用される。 民間船であるため装甲がなく脆弱である。"
 SHIP_GRAPHICS_CONSTRUCTOR_DESC: "建設船は、 宇宙ステーションの建造に必要不可欠だ。 民間船であるため武装や装甲がなく脆弱である。"
 SHIP_GRAPHICS_COLONIZER_DESC: "コロニー船は、 入植のために定住している惑星から新しい惑星へ入植者を運ぶ。 民間船であるため武装や装甲がなく脆弱である。"
 SHIP_GRAPHICS_SHIP_SIZE_LOCKED_DESC: "§Rこの艦種はDLCが必要。 $SHIP_SIZE_NAME$§!"
 SHIP_GRAPHICS_ION_CANNON_DESC: "敵艦船を沈黙させる超巨大エネルギーを射撃可能な大型の防御兵器。 低速ながら強力で、 歓迎されない訪問者に対しての強力な抑止力となる。"
 SHIP_GRAPHICS_MILITARY_STATION_SMALL_DESC: "静止軌道上の要塞として機能する防衛プラットフォーム。 敵の侵入から星系基地を防衛する目的で設計されている。"
 SHIP_GRAPHICS_STARBASE_DEEP_SPACE_CITADEL_1_DESC: "星系防衛の最前線となる軌道ステーション。 軍事力を誇示し、 戦略的拠点を防衛する目的で設計されている。"
 SHIP_GRAPHICS_STARBASE_DEEP_SPACE_CITADEL_2_DESC: "配備兵器と防衛システムが編み目のように張り巡らされた高度な防衛拠点。 戦闘が長期に及ぶ場合に備えて強化されており、 紛争宙域における艦隊作戦を支えている。"
 SHIP_GRAPHICS_STARBASE_DEEP_SPACE_CITADEL_3_DESC: "深宇宙における要塞化の頂点。 ほぼ難攻不落の防塁ともいえるこの巨大基地は、 星系の兵站を掌握したままで敵の大規模攻撃に対しての耐性を持つ。"
 SHIP_SIZE_SELECTOR_LOC: "SHIP_GRAPHICS_$SIZE$_DESC"
 SHIPSETS_DESCRIPTION_LABEL: "説明"
 SHIP_GRAPHICS_NANITE_SWARMER_DESC: "高速で不規則な軌道を飛行できる、 自己複製が可能なナノマシンで構成された軍用機。 従来型の操縦士を必要とせず、 自律的に群れを編成して敵を数で圧倒する。 さらに徹底した精密攻撃で敵の防衛戦を崩壊させる。"
 SHIP_GRAPHICS_NANITE_INTERDICTOR_DESC: "自己複製が可能なナノマシンで構成された適応型軍用機。 この爆撃艦は敵を混乱させるのではなく、 統制の取れた攻撃を優先している。 連携の取れた一体のユニットとして行動するこの自律型建造体は敵を連携して妨害し、 執拗に追撃して敵の陣形を散開させることで、 恐ろしいほど効率的に、 接近する脅威を迎撃し無力化する。"
 SHIP_GRAPHICS_CRISIS_CORVETTE_DESC: "機動コルベットの設計思想は圧倒的な数の戦力の迅速な展開。 標準型のコルベットの性能を遙かに凌駕し、 この機動艦隊の嵐を目の前にした敵に恐怖を叩き込む。"
 SHIP_GRAPHICS_CRISIS_DESTROYER_DESC: "冷徹かつ効率的に敵を排除する目的で設計された、 強力な武装が施された戦艦。 コルベットよりさらに大型で耐久性も高く、 敵目標を追尾する速度を落とさずに想像を絶する火力で攻撃を与えることが可能。"
 SHIP_GRAPHICS_CRISIS_CRUISER_DESC: "火力、 耐久性、 戦略的支配力がバランスよく設計された、 重武装で耐久性も高い脅威の戦艦。 圧倒的な攻撃力で敵戦線に突入し、 敵陣を蹂躙する主力となる。"
 SHIP_GRAPHICS_STAR_EATER_DESC: "この巨艦は星々をそのまま飲み込み、 超新星爆発を発生させて星系全体を消し去る。 もはやただの戦艦ではない、 銀河の終焉を告げる「スターイーター」だ。"
 SHIP_GRAPHICS_COSMO_CRISIS_DESTROYER_DESC: "宇宙エネルギーが吹き込まれたスマートな戦艦。 圧倒的な力による精密攻撃が可能なこの艦は、 その存在で新たな現実の到来を告げている。"
 SHIP_GRAPHICS_COSMO_CRISIS_BATTLECRUISER_DESC: "想像を凌駕する火力を操り、 科学が命運を変える象徴としてそびえたつ。 この強力な軍艦は戦場のあり方を変え、 その使い手は星々のあり方を変えていく。"
 SHIP_GRAPHICS_COSMO_CRISIS_TITAN_DESC: "圧倒的な力が新しい時代への変化を象徴する宙空の戦闘機械。 その存在そのものが現実を歪め、 生まれ変わる宇宙の夜明けを告げる。"
 SHIP_GRAPHICS_OFFSPRING_CORVETTE_DESC: "$SHIP_GRAPHICS_CORVETTE_DESC$\n\n$OFFSPRING_SHIP_DESC$"
 SHIP_GRAPHICS_OFFSPRING_DESTROYER_DESC: "$SHIP_GRAPHICS_DESTROYER_DESC$\n\n$OFFSPRING_SHIP_DESC$"
 SHIP_GRAPHICS_OFFSPRING_CRUISER_DESC: "$SHIP_GRAPHICS_CRUISER_DESC$\n\n$OFFSPRING_SHIP_DESC$"
 SHIP_GRAPHICS_OFFSPRING_BATTLESHIP_DESC: "$SHIP_GRAPHICS_BATTLESHIP_DESC$\n\n$OFFSPRING_SHIP_DESC$"
