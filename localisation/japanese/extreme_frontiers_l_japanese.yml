l_japanese:
 #############
 # Anomalies #
 #############
 EXTREME_FRONTIERS_TITLE: "極限の辺境" # Do not translate
 # PULSATING OBJECT
 PULSATING_OBJECT_TOXIC_CAT: "脈動する物体"
 PULSATING_OBJECT_GAS_GIANT_CAT: "脈動する物体"
 PULSATING_OBJECT_BARREN_CAT: "脈動する物体"
 PULSATING_OBJECT_BARREN_COLD_CAT: "脈動する物体"
 PULSATING_OBJECT_FROZEN_CAT: "脈動する物体"
 PULSATING_OBJECT_MOLTEN_CAT: "脈動する物体"
 anomaly_pulsating_object_desc: "§Y[this.GetName]§!の初期スキャンで、 対流圏をただよう奇妙な浮遊物体が検出された。 移動しながら縮んだり膨らんだりしている。 その性質を特定するにはさらに調査が必要だ。"
 extreme_frontiers.100.title: "古代の気象観測気球"
 extreme_frontiers.100.desc: "§Y[Leader.GetName]§!は、 §Y[from.GetName]§!で確認されたこの奇妙な浮遊物体を、 古代の気象観測気球と特定した。 どこから来たのかがわかるようなしるしは、 惑星の過酷な大気環境によってすでに剥がれ落ちてしまっている。\n\n放射年代測定によれば、 この気球は少なくとも1世紀以上にわたり、 [from.GetName]特有の気圧変動に翻弄されて縮んだり膨らんだりしながら、その大気中をただよっているようだ。\n\nその太陽電池パネルは奇跡的に今も稼働しており、 センサー群には1世紀分もの貴重な大気データが記録されている。 [Root.Owner.GetResearchers]にとって極めて興味深い資料になるだろう。"
 # MOLTEN METAL OCEAN
 MOLTEN_METAL_OCEAN_CAT: "極限の溶融流"
 anomaly_molten_metal_ocean_desc: "§Y[from.GetName]§!表面の初期調査の結果、 高濃度の重金属を含む超高温の溶岩の津波が頻繁に発生していることが確認された。 この現象を完全に理解するには、 詳細な分析が必要である。"
 extreme_frontiers.110.title: "金属の津波"
 extreme_frontiers.110.desc: "§Y[Leader.GetName]§!は、 §Y[from.GetName]§!の溶岩の海には、 我々の元素カタログに含まれるほぼすべての希少半金属が極めて純粋な状態で存在していることを確認した。\n\nこの濃縮された液体金属の集合体によって不安定な電磁場が生じ、 溶融金属の津波がしばしば発生しているのだ。\n\n我々は予測モデルを活用し、 この波の強度が短期間ながらも定期的に弱まることを突き止めた。 これを利用すれば、 この鉱床から資源を大量に回収できそうだ。"
 # GREAT BLUE SPOTS
 GREAT_BLUE_SPOTS_CAT: "巨大な青斑"
 great_blue_spots_desc: "§Y[from.GetName]§!の地表には、 宇宙からも確認できるほど巨大な変色領域が2つ存在している。 この2つの青色の領域は超高速で一緒に移動している。 詳細な調査を行うべき、 興味深い構造物だ。"
 extreme_frontiers.120.title: "共生する超巨大嵐"
 extreme_frontiers.120.desc: "§Y[from.GetName]§!の巨大な青斑は共生する一対の超巨大嵐であり、 サイクロンと反サイクロンが完全な均衡を互いに維持している。\n\nこの2つの嵐は巨大で風速がすさまじく、 たびたび音速を突破しては強力なソニックブームを発生させている。 内部にはコバルトの粉塵が大量に含まれており、 これが領域を独特の色に染めている。\n\n§Y[Leader.GetName]§!は、 これらの嵐が1世紀以上にわたりずっと吹き荒れていると推定している。 上層大気中に蓄積された鉱物は、 採掘ステーションを設置すれば容易に回収できるはずだ。"
 # FROZEN INFERNO
 FROZEN_INFERNO_CAT: "熱の急上昇"
 frozen_inferno_desc: "§Y[from.GetName]§!の初期スキャンで、 本来凍結しているはずのこの天体に、 極めて不規則な熱の急上昇が見られることがわかった。 この異常な温度変化をさらに調査する必要がある。"
 extreme_frontiers.130.title: "凍てつく煉獄"
 extreme_frontiers.130.desc: "§Y[Leader.GetName]§!が、 氷結惑星§Y[from.GetName]§!の不規則な熱上昇の調査を完了した。\n\n惑星を覆う果てしないツンドラの下には、 極めて反応性の高い自然発火性の鉱床が存在していたのだ。 この鉱床は本来氷の下に閉じ込められているが、 大陸の氷床が移動して割れるたびに上昇してくる。\n\n地表まで上昇して融解すると、 この超可燃性ガスは酸素を豊富に含む[from.GetName]の大気と反応し、 地表で頻繁に発火する。\n\n専用の装置を使えば、 この特殊な可燃性物質を抽出して別の用途に利用できる。"
 # POISONED ATMOSPHERE
 POISONED_ATMOSPHERE_CAT: "有毒な大気"
 poisoned_atmosphere_desc: "高濃度の有機毒性分子が§Y[from.GetName]§!の上層大気で検出された。"
 extreme_frontiers.140.title: "有毒な大気"
 extreme_frontiers.140.desc.hive_mind: "§Y[from.GetName]§!には特殊な地衣類が生息している。 これらの地衣類は、 捕食から身を守るため大気中に超高毒性の分子を放出している。\n\n化石記録の研究によれば、 [from.GetName]にはかつて多様な動物相が存在していたが、 地衣類が大気中のヒ素やタリウムの濃度を徐々に上昇させ、 最終的に絶滅に追いやったようだ。 多くの生物はその環境変化についていけなかったのだ。\n\n§Y[Leader.GetName]§!は、 この過酷な環境を生き延びた唯一の生物として、 効率のよい特殊解毒腺を持つ大型爬虫類の一種を発見した。\n\nこの驚異的な器官を詳しく調査すれば、 大気の解毒について新たな知見を得られるかもしれない。"
 extreme_frontiers.140.desc.default: "$extreme_frontiers.140.desc.hive_mind$ 初期実験では、 これらの毒素に含まれる特殊な化合物は化粧品産業に応用できる可能性があることも示唆されている。"
 extreme_frontiers.140.a: "なんとも興味深い……"
 extreme_frontiers.140.b: "加工して香水を作れ。"
 DETOXIFICATION_GLAND_PROJECT: "解毒腺の研究"
 DETOXIFICATION_GLAND_PROJECT_DESC: "§Y[from.GetName]§!の有毒大気の中で繁栄する驚異的な爬虫類がいる。 この種は特殊な内部器官を有し、 強力な毒素を有用な栄養素に分解することができる。 この生物の詳しい研究は有益な取り組みになるだろう。"
 extreme_frontiers.145.title: "解毒腺の知見"
 extreme_frontiers.145.desc: "§Y[from.GetName]§!に生息する爬虫類の腺を徹底的に調べた結果、 §Y[Leader.GetName]§!はこの種が惑星の毒素に対して持つ驚異的な耐性の生物学的なしくみを解明した。\n\nこの複雑な器官は有毒な大気を中和する化合物を作り出し、 毒素が循環系に吸収されるのを防いでいるのだ。 さらに、 この腺は適応力が極めて高く、 研究所で生成された最も致死性の高い毒ですら無毒化することができる。\n\nこれらの驚くべき発見は、 大気の解毒手法を根本的に変えることになるだろう。"
 # GLIMPSE OF THE CORE
 GLIMPSE_CORE_CAT: "垣間見える核部分"
 glimpse_the_core_desc: "§Y[from.GetName]§!のガス状外層で異常な動きが発生し、 それによって極めて深い穴が開き、 惑星の固体核を断続的に垣間見ることができる。 この驚異的な現象についてもっと調べる必要がある。 "
 extreme_frontiers.150.title: "生物の生息する核"
 extreme_frontiers.150.desc: "§Y[Leader.GetName]§!は、 §Y[from.GetName]§!に一時的に開いた開口部に探査機を送り込み、 惑星の核部分にこれまでに見たことのない単細胞生物種が生息していることを発見した。\n\nこの頑強な細胞生物は、 極度の圧力下での生存に完全に適応しているようで、 繁殖期には大量の水素を放出する。 [Leader.GetName]は、 惑星のガス状水素層はこの生物活動によって維持されていると結論づけた。\n\nこの生物を根絶すれば外層は消滅し、 入植可能な岩石惑星が姿を現すだろう。"
 extreme_frontiers.150.a: "駆除しろ。"
 extreme_frontiers.150.b: "貴重な観測ができる。"
 PURIFY_CORE_PROJECT: "惑星核の浄化"
 PURIFY_CORE_PROJECT_DESC: "§Y[from.GetName]§!のガス状外層は、 核部分に生息する単細胞生物の特異な生化学反応によって維持されている。 この単細胞生物を駆除すればガス層は消滅し、あとには入植可能な岩石惑星が残るだろう。"
 extreme_frontiers.155.title: "新天地"
 extreme_frontiers.155.desc: "§Y[Leader.GetName]§!は§Y[from.From.GetName]§!の外層にできた開口部のひとつに兵器を搭載した探査機を送り込んだ。 核部分に到着すると、 探査機から有毒物質が放出され、 生息していた単細胞生物が駆除された。\n\n我々は、 [from.From.GetName]のガス状外層が徐々に宇宙へと消散し、 やがて小さな岩石惑星が現れるのを眺めた。"
 extreme_frontiers.155.a: "すばらしい。"
 # OPTICAL PHENOMENA
 OPTICAL_PHENOMENA_CAT: "きらめく地表"
 optical_phenomena_desc: "§Y[from.GetName]§!のイメージスキャンを行ったところ、 惑星の地表全体で極めて鮮やかな光学現象を捉えることができた。 しかし、 何によってこうした色彩パターンが引き起こされているのかは、 軌道からの観測でははっきりしない。"
 extreme_frontiers.160.title: "虹色の氷床"
 extreme_frontiers.160.desc.default: "§Y[from.GetName]§!の地表を詳しく調査した結果、 軌道からの観測で確認された光学現象の原因が明らかになった。\n\n大気条件によって惑星の永久凍土が広範に研磨され、 透明な光沢を帯びていたのだ。 その下には、 色とりどりに輝く結晶が網状に深く広がり成長している。 この自然現象によって、 遠くから見たときに万華鏡のような視覚効果がもたらされていたのだ。"
 extreme_frontiers.160.desc.machine: "$extreme_frontiers.160.desc.default$\n\n確かにこれは誰が見ても美しい光景だが、 我々が真に関心を寄せているのは、 そこに眠る豊かな鉱床である。"
 extreme_frontiers.160.tooltip: "§Y惑星ディシジョン§!「§H$decision_prismatic_ice_exhibit$§!」を以下の効果とともにアンロック：\n£快適度£ $MOD_PLANET_AMENITIES_MULT$：§G+25%§!\n$mod_planet_jobs_unity_produces_mult$：§G+25%§!"
 decision_prismatic_ice_exhibit: "虹色の氷の展示"
 decision_prismatic_ice_exhibit_desc: "採掘された透明度の高い氷床は、 万華鏡のような魅惑的な視覚効果を生み出し、 しばらくの間であれば展示しておくこともできる。"
 prismatic_ice_max_3_times_pass: "§Y3§!回まで実行可能。"
 prismatic_ice_max_3_times_fail: "$TRIGGER_FAIL$ 最大§Y3§!回まで実行可能。"
 prismatic_ice_max_3_times_pass_with_var: "$TRIGGER_PASS$ $prismatic_ice_max_3_times_pass$ (現在の実行回数：§Y[owner.prismatic_ice_exhibit_happened]§!)"
 exhibiting_prismatic_ice: "虹色の氷の展示"
 exhibiting_prismatic_ice_desc: "採掘された透明度の高い氷床は、 万華鏡のような魅惑的な視覚効果を生み出し、 しばらくの間であれば展示しておくこともできる。"
 # PLASMA VOLCANOES
 PLASMA_VOLCANO_CAT: "軌道プラズマ"
 plasma_volcano_desc: "我々は、 超高温の不安定なプラズマが§Y[from.GetName]§!の高層大気に向けて放出されていることを視覚的に確認した。\n\n大気中に濃い火山灰がただよっているため、 軌道から放出源を特定することはできない。 詳しく調べるのはおそらく危険だろう。"
 extreme_frontiers.170.title: "プラズマの火山"
 extreme_frontiers.170.desc: "§Y[Leader.GetName]§!が§Y[from.GetName]§!の超高温プラズマの噴出原因をつきとめた。\n\n惑星の独特な磁場によって、 惑星深部のマントル内にあるイオン化物質同士の反応が促進され、 高圧プラズマのマグマ溜まりが形成されているのだ。\n\nそして、 不安定な地質プレートが崩壊すると、 このプラズマが恐ろしい噴射物となって勢いよく吹き上がり、 大気中のガスと反応して二次爆発を引き起こす。 我々の兵器専門家は、 この原理をプラズマ兵器に応用しようと意気込んでいる。"
 extreme_frontiers.170.desc.negative: "残念ながら、 この危険な調査によって[Leader.GetName]は深刻な"
 extreme_frontiers.170.desc.traumatized: "$extreme_frontiers.170.desc.negative$心的外傷を負った。"
 extreme_frontiers.170.desc.maimed: "$extreme_frontiers.170.desc.negative$怪我を負った。"
 # BLACK CLOUDS
 BLACK_CLOUDS_CAT: "黒い雲"
 black_clouds_desc: "§Y[from.GetName]§!の大気中で厚く黒い雲が観測された。 惑星の風速や風向きに影響されることなく、 不規則な軌道を描いて移動している。 我々のイメージスキャンに写るのはごく短い時間だけで、 しかも必ず惑星の昼夜サイクルの決まった時点に出現する。"
 extreme_frontiers.180.title: "昆虫の群れ"
 extreme_frontiers.180.desc: "§Y[from.GetName]§!で観測された異常な黒い雲は、 実のところ巨大な肉食昆虫の大群であった。\n\nこの空飛ぶ捕食者は岩の裂け目に巣をつくり、 1日に1度、姿を現しては惑星の地表に存在するわずかな有機物を貪る。\n\n強力な代謝能力を備えた節足動物であり、 捕食によって細胞の劣化を逆行させることができるため、 定期的に栄養を摂取するかぎり寿命を無限に引き延ばすことができる。"
 extreme_frontiers.180.desc.altered_metabolism: "現地調査中に[Leader.GetName]が標本のひとつに[Leader.Species.GetHandName]を噛まれ、 驚くべき代謝反応が引き起こされた。 この特異な種は、 有機細胞の再生能力について多くの知見をもたらすだろう。"
 extreme_frontiers.180.b: "掘り起こして食い尽くそう。"
 leader_trait_altered_metabolism: "変異した代謝機能"
 leader_trait_altered_metabolism_desc: "現地調査で異物に曝露されたことにより、 このリーダーは永続的な影響を被った。"
 # SUBGLACIAL VIBRATIONS
 SUBGLACIAL_VIBRATIONS_CAT: "氷床下の振動"
 subglacial_vibrations_desc: "§Y[from.GetName]の§!凍てつく無機質な氷床の下には広大な海洋が存在する。 深い轟音のような振動が永久凍土の下で検出されたが、 この振動は地震波とは性質が異なっている。"
 extreme_frontiers.190.title: "巨大なひれ足動物"
 extreme_frontiers.190.desc: "深海音波探知と地震遠隔測定を駆使することで、 §Y[from.GetName]§!の深部振動の発生源が特定された。 惑星の氷床下に広がる液体窒素の海には、 過酷な環境に適応した巨大なひれ足動物の大群が生息していたのだ。\n\nこの驚異的な生物は、 小型輸送船にも匹敵するほどの大きさと重量があり、 惑星全体に響き渡るような力強い低周波の唸り声を発して互いにコミュニケーションを取る。 コラーゲンを豊富に含む独自の脂肪層は、 極低温による火傷や凍傷を防ぐだけでなく、 鳴き声を増幅して海洋の隅々にまで届ける役割も果たしている。\n\n隔絶されたこの生態系には天敵が存在しないため、 この巨大生物は好奇心が旺盛で、 極めて温厚である。 その独特な鳴き声を再現するだけで、 簡単に海面付近まで呼び寄せることができる。"
 extreme_frontiers.190.a: "珍しい発見だ。"
 extreme_frontiers.190.a.tt: "建造物をアンロック：['building:building_pinniped_sanctuary']"
 extreme_frontiers.190.b: "楽に狩れるな。"
 building_pinniped_sanctuary: "ひれ足類の保護区"
 building_pinniped_sanctuary_desc: "[event_target:pinnipeds_home_planet.GetName]の液体窒素の海に閉じ込められた巨大ひれ足類の保護区。"
 # ELECTRIC WATERS
 ELECTRIC_WATERS_CAT: "帯電海域"
 electric_waters_desc: "§Y[from.GetName]§!の軌道スキャンで、 惑星の氷海深部から発せられる不規則な電気信号が検出されている。 \n\nこの水中現象をさらに調べれば、 より多くのことが明らかになるだろう。"
 extreme_frontiers.200.title: "高電圧性のサンゴ"
 extreme_frontiers.200.desc: "§Y[from.GetName]§!の深海電流の発生源を§Y[Leader.GetName]§!が突き止めた。\n\n電気生成能力を備えた、 高度に進化した冷水性サンゴが海底に生息していたのだ。 この種は特殊な細胞小器官で電流を生成して微生物をおびき寄せ、 それを捕食しつつ、 通信手段としても利用している。\n\nこのサンゴは我々の探査機に刺激されており、 我々が送信周波数を変えるたびに電気出力が増加する。\n\nこの深海種との相互作用を慎重に制御すれば、 繊細な生態系を乱すことなく、 惑星のエネルギー産出量を高めることができる。"
 # OBSIDIAN PLANET
 OBSIDIAN_PLANET_CAT: "きらめく大地"
 obsidian_planet_desc: "§Y[from.GetName]§!の視覚スキャンにより、 広大な黒曜石の層が惑星の荒涼とした地表を覆っていることが判明した。 上層大気には硫黄の痕跡が濃く残っている。\n\n詳細な地質調査を行えば、 もっと多くのことがわかるだろう。"
 extreme_frontiers.210.title: "黒曜石の荒野"
 extreme_frontiers.210.desc: "§Y[from.GetName]§!の堆積物の分析により、 かつては火山性であったこの惑星に突如として急激な凍結現象が起こり、 地表の溶岩が光沢のある火山性ガラスに変化したことが明らかになった。\n\n惑星表面に多数の衝突クレーターが見られることから、 この現象は隕石群など飛来天体の衝突によって引き起こされた可能性が最も高い。 この黒曜石の形成物には巨大な気泡が多数あり、 そこには火山由来の硫黄ガスが瞬間凍結によって封じ込められている。\n\nこの資源を慎重に抽出すれば、 我々のために活用できるだろう。"
 # SHEARING FORCE
 SHEARING_FORCE_CAT: "失われた通信 "
 shearing_force_desc: "§Y[from.GetName]§!の大気圏に送り込んだ観測機がすべての通信を停止した。 観測機の正確な位置はもはや把握不可能だ。\n\nデータを回収するには、 惑星の詳しい調査が必要だ。"
 extreme_frontiers.220.title: "せん断力"
 extreme_frontiers.220.desc: "我々は§Y[from.GetName]§!で観測機が消失した原因を突き止めた。\n\nこの惑星の大気圏を構成するさまざまなガス層には極度の温度差がある。 この激しい温度差のせいで、 ガス層が互いに激しく逆方向に流れ、 強烈な逆流が発生している。\n\nこれが各ガス層の濃度差と相まって破壊的なせん断力を生み出し、 大気層間を移動するあらゆる物体を切り裂いているのだ。\n\n原因を突き止めたことで、 この過酷な環境に耐えられるよう機材を改良し、 この自然現象の運動エネルギーを活用できるようになった。"
 # MISSING MASS
 MISSING_MASS_CAT: "消えた質量"
 missing_mass_desc: "§Y[from.GetName]§!の質量測定値はこの規模の岩石惑星にしてはあまりにも低い。 詳しく調査するべきだ。"
 extreme_frontiers.230.title: "マントル深部の環形生物"
 extreme_frontiers.230.desc: "§Y[from.GetName]の§!地質を詳しく調べた結果、 惑星の珪酸塩マントルに巨大な地下トンネル網が広がっていることが判明した。\n\n探査機を投入したところ、 この空洞には珪酸塩岩を餌とする深部マントル環形生物の一種が生息していることがわかった。 この生物の巨大なコロニーは惑星内部を食い荒らし、 排泄物を惑星軌道へと排出しており、 それが宇宙風に乗って散逸されている。\n\nこの環形生物を駆除すれば、 [controller.GetMinerPlural_lower]は大量に埋蔵された珪酸塩鉱石を簡単に採掘できるようになるだろう。"
 extreme_frontiers.230.desc.terravore: "$extreme_frontiers.230.desc$ 彼らの食欲には驚かされる。 我々とさほど変わらない。"
 extreme_frontiers.230.a: "掘削を始めろ。"
 extreme_frontiers.230.b: "この魅力的な生物について調査せよ。"
 # LIFE IN DARKNESS
 LIFE_IN_DARKNESS_CAT: "闇の中の生命"
 life_in_darkness_desc: "§Y[from.GetName]§!は潮汐ロックの影響で惑星の半分が永遠の闇に覆われている。 赤外線スキャンにより、 この暗く栄養も乏しい領域に活発な有機生態系が存在することが明らかになった。"
 extreme_frontiers.240.title: "半透明への進化"
 extreme_frontiers.240.desc: "§Y[from.GetName]§!の永遠の闇に包まれた側では、 独特の進化環境が育まれ、 過酷な環境に適応したひと握りの生物だけが生息している。\n\n独自の染色体変異の結果、 この領域の生物は完全に半透明で視覚は持たず、 高度な反響定位能力によって生き延びている。"
 extreme_frontiers.240.desc.non_homicidal: "$extreme_frontiers.240.desc$ この驚くべき適応は、 我々の[controller.GetResearcherPlural_lower]にとって大変興味深い事例である。"
 extreme_frontiers.240.a: "啓発的だ。"
 extreme_frontiers.240.b: "食料にしよう。"
 extreme_frontiers.240.c: "駆除しろ。"
 # RAINBOW RIVERS
 RAINBOW_RIVERS_CAT: "蛍光の川"
 rainbow_rivers_desc: "§Y[from.GetName]§!の予備スキャンにより、 惑星の地表には蛍光性の川が流れており、 カラースペクトルに含まれるあらゆる色に絶えず移り変わっていることが確認された。\n\n詳細な調査を行えば、 この珍しい現象についてもっとわかるだろう。"
 extreme_frontiers.250.title: "カラフルな化学合成"
 extreme_frontiers.250.desc: "§Y[from.GetName]§!の蛍光の川を分析した結果、 これらの川には独自の微生物種が生息していることが明らかになった。\n\nこの微生物は化学合成によって有害物質を代謝し、 高反応性の副産物を生成する。 この副産物が川の化学組成を変化させ、 見事な色の変化を引き起こしているのだ。\n\nこの鮮やかなネオン色は彼らにとってコミュニケーションの手段でもあり、 発情期にあることを示す合図として使い、 惑星の有毒な川を移動しながら繁殖相手を惹きつける。\n\nこの生物とそのライフサイクルを継続的に調べることは、 我々の[controller.GetResearcherPlural_lower]にとってすばらしい研究機会となるだろう。"
 # GASEOUS METALS
 GASEOUS_METALS_CAT: "気体金属"
 gaseous_metals_desc: "§Y[from.GetName]§!の大気は、 さまざまな気体状の金属で主に構成されている。 この惑星の過酷な環境をより深く理解すれば、 これらの貴重な化合物を回収できるかもしれない。"
 extreme_frontiers.260.title: "電気めっきの雲"
 extreme_frontiers.260.desc: "§Y[from.GetName]§!の特殊な大気は莫大な量の太陽放射を封じ込め、 惑星全体の連鎖的な加熱を引き起こしている。 その結果、 金属は気化し、 極めて不安定な状態で存在している。\n\nこれらの化合物は我々が送り込んだ調査機器と瞬時に反応し、 その表面を薄く耐久性の高い金属合金層で覆った。 だが驚いたことに、 調査機器は何の損傷も受けていない。\n\n§Y[leader.GetName]§!はこの自然の電気めっき現象を利用して、 §Y[controller.GetName]§!の艦船の引張強度を向上できると考えている。"
 ATMOSPHERIC_ELECTROPLATING: "大気中の電気めっき現象"
 ATMOSPHERIC_ELECTROPLATING_DESC: "§Y[from.GetName]§!の気体金属の大気中に物体を投入すると、 自然の電気めっき現象が引き起こされる。\n\nこの珍しい現象は驚くほど効果的であり、 さらに研究を進めれば[Root.Owner.GetName]の艦船の船体強度を高める技術として応用できる可能性がある。"
 extreme_frontiers.265.title: "高性能金属"
 extreme_frontiers.265.desc: "我々は、 §Y[from.From.GetName]の§!不安定な大気中で起こる特異な電気めっき現象を産業規模で再現する方法を発見した。\n\nこの知識を活用し、 [Root.Owner.GetEngineerPlural]は特定の金属の耐久性を大幅に高めることができる。 しかも、 それによって柔軟性が損なわれたり重量が増加することもない。\n\nこの高度な技術は、 我々の艦船の建造プロセスに応用することができる。"
 # CARBON ALLOTROPES
 CARBON_ALLOTROPES_CAT: "炭素同素体"
 carbon_allotropes_desc: "§Y[from.GetName]§!からの分光分析データによれば、 この惑星の組成には希少で複雑な炭素同素体が豊富に含まれている。 詳細な分類を行うには、 詳しい調査が必要である。"
 extreme_frontiers.270.title: "グラフェンの形成"
 extreme_frontiers.270.desc: "§Y[from.GetName]§!でグラフェンが大量に存在する領域が発見された。 この希少な炭素同素体は、 わずか1原子分の厚みしかないにもかかわらず圧倒的な強度と導電性を誇る。\n\nこの貴重なナノ素材は、§Y炭素惑星§!の特異な大気環境がもたらす化学気相成長によって、 地表に自然に形成されている。"
 extreme_frontiers.270.a: "回収しろ。"
 # DIAMOND DUST
 DIAMOND_DUST_CAT: "高速移動物質"
 diamond_dust_desc: "§Y[from.GetName]§!の質量スキャンにより、 下層対流圏深部に高速移動する物質が高濃度で存在していることが判明した。\n\nさらに詳細な調査を実施しないかぎり、 この異常な測定値の原因を特定することは難しい。"
 extreme_frontiers.280.title: "ダイヤモンドの嵐"
 extreme_frontiers.280.desc: "我々は§Y[from.GetName]§!の異常な質量測定値の原因を突き止めた。\n\nこの惑星の大気は、 炭素を豊富に含むメタンガスで主に構成されており、 これが重力圧の上昇によって超高密度のダイヤモンド構造へと固化する。 惑星には激しい嵐の周期があるため、 高速で移動するダイヤモンドの嵐として観測されるのだ。\n\nこのダイヤモンドは簡単に回収して利用できるが、 §Y[leader.GetName]§!は、 密度や純度を詳しく調べればさらに有益な成果が得られると確信している。"
 ATMOSPHERIC_DIAMONDS_PROJECT: "大気中のダイヤモンド"
 ATMOSPHERIC_DIAMONDS_PROJECT_DESC: "我々は、 §Y[from.GetName]§!の超高密度のダイヤモンドの嵐を研究することで、 その特異な性質をレーザー技術の発展に利用できると確信している。"
 extreme_frontiers.285.title: "ダイヤモンドの精密構造"
 extreme_frontiers.285.desc: "§Y[leader.GetName]§!が§Y[from.From.GetName]§!の超高密度ダイヤモンドの研究を完了した。\n\nこのダイヤモンドは圧縮過程で独特な結晶格子構造を形成する。 その結果、 高周波の光振動を極めて効率的に封じ込めて増幅させられるようになる。\n\nこの技術的革新は我々の帝国に大きな恩恵をもたらすだろう。"
 # ETREME GEOLOGICAL TENSION
 GEOLOGICAL_TENSION_CAT: "極度の地質的緊張"
 geological_tension_desc: "§Y[from.GetName]§!の地質スキャンで、 この溶融惑星の地殻は蓄積された地殻運動の力によって莫大な圧力にさらされていることが示唆された。 重大な地質現象が近々発生するおそれがある。"
 extreme_frontiers.290.title: "閉塞された超火山"
 extreme_frontiers.290.desc: "§Y[from.GetName]§!における地殻の超緊張状態について詳しく調査した結果、 巨大な超火山の頂部が部分的に崩壊し、 火口が閉塞していることを突き止めた。\n\n膨大な量のマグマが地下空洞に充満し、 火口の閉塞部分に対して強大な上昇圧力をかけている。 今のところマグマは崩壊した岩石によって抑えられているが、 この危うい均衡状態がいつまで持つかわからない。\n\n閉じ込められた溶岩には、 希少金属や複雑な鉱物化合物が大量に含まれている。§Y[leader.GetName]§!は、 計画的に噴火を誘発することで、 この資源を安全に回収できると考えている。"
 extreme_frontiers.290.a: "噴火口の閉塞を解消しろ。"
 extreme_frontiers.290.b: "地熱活動を有効に利用しよう。"
 CONTROLLED_ERUPTION_PROJECT: "噴火の制御"
 CONTROLLED_ERUPTION_PROJECT_DESC: "§Y[from.GetName]§!の閉塞した超火山の地下には、 鉱物を豊富に含むマグマが大量に溜まっている。 計画的に噴火を誘発すれば、 これらの閉じ込められた資源を回収できるだろう。"
 extreme_frontiers.295.title: "大噴火"
 extreme_frontiers.295.desc: "§Y[from.From.GetName]の§!超火山の頂部において複数地点に人工的に穴を開け、 地下に大量に溜まったマグマを抑え切れないところまで構造を脆弱化した。\n\n臨界点に達したときの眺めは圧巻だった。 火山の頂部がまるごと吹き飛び、 高圧下にあった溶岩が高く噴き上がったのだ。\n\n我々は、 溢れ出る溶岩をあらかじめ整備しておいた流路へと誘導した。 あとは特殊な採掘装置を使って回収するだけだ。"
 extreme_frontiers.295.a.default: "すばらしい眺めだ。"
 extreme_frontiers.295.a.machine: "作戦成功だ。"
 # LAYERED ATMOSPHERE
 LAYERED_ATMOSPHERE_CAT: "噴きあがる巨星"
 layered_atmosphere_desc: "§Y[from.GetName]§!のスキャンにより、 惑星のいたるところで可燃性ガスが断続的に噴出しており、 遠隔調査を阻んでいることが確認された。\n\n詳しい調査が必要だ。"
 extreme_frontiers.300.title: "層状大気"
 extreme_frontiers.300.desc: "§Y[leader.GetName]§!が§Y[from.GetName]§!の不安定なガス噴出の原因を突き止めた。\n\nこのガス惑星の大気は、 気体状の中間圏と成層圏のあいだに液体金属水素の層が浮かぶようにして存在している。 下層のメタンガスの組成密度のほうが高いため、 液体層の浮遊状態が保たれているのだ。\n\n時間の経過とともに、 金属水素層に放電による電荷が蓄積され、 下層を刺激する。 蓄積された圧力が臨界点に達すると、 ガスの噴出によって導電性の高い液体が上層大気へと噴き上げられ、 惑星中に飛び散ったあと再び沈殿していく。\n\n我々の追跡システムを使えば、 この圧力変動を容易に監視しながら、 貴重な資源を回収することができる。"
 # SOLIDIFIED PLASMA TRAILS
 PLASMA_TRAILS_CAT: "不規則なエネルギー上昇"
 plasma_trails_desc: "§Y[from.GetName]§!の地殻断層に沿って、 不規則なエネルギー上昇が検出されている。\n\nこの急上昇の原因を軌道から特定することはできない。 現象の正体を突き止めるには、 詳細な調査が必要だ。"
 extreme_frontiers.310.title: "固化したプラズマの痕跡"
 extreme_frontiers.310.desc: "§Y[from.GetName]§!の地質分析によって、 初期軌道調査で検出された不規則なエネルギー上昇の原因が明らかになった。\n\n惑星の不安定な地殻活動により、 凍結した不安定なツンドラ地域で激しい静電放電が引き起こされていたのだ。\n\nこの猛烈な稲妻は上空へと駆け上がり、 周囲の空気をプラズマ化する。 その際に放出される極度の熱は熱衝撃をもたらし、 その後、 稲妻のような形状の構造物として固化する。\n\n地質分析で得た知見を活用すれば、 この地殻由来のプラズマ現象を容易に予測し、 自分たちのために利用できるだろう。"
 # CRYSTALLINE PLAINS
 CRYSTALLINE_PLAINS_CAT: "氷火山活動"
 crystalline_plains_desc: "§Y[from.GetName]§!の地殻分析により、 惑星のいたるところで異常な冷火山活動が活発に起きていることが確認された。"
 extreme_frontiers.320.title: "結晶の平原"
 extreme_frontiers.320.desc: "§Y[from.GetName]§!の詳しい地質調査の結果、 凍結した地殻の下に半凍結状態のアンモニアの川が流れていることが判明した。 このアンモニアは、 地熱圧力の上昇によって脆い地表の亀裂から噴き出している。\n\nその際に、 有害な蒸気と泥状のアンモニアの混合物が惑星の地表にまき散らされる。 これが超低温の地表にさらされて再び凍結し、 広大な結晶の平原を形成する。 この結晶は簡単に採取でき、 価値の高い資源となる。"
 # SUPERMASSIVE GIANT
 SUPERMASSIVE_GIANT_CAT: "超巨大惑星"
 supermassive_giant_desc: "§Y[from.GetName]§!は超巨大なガス惑星であり、 その強力な重力井戸によって何千もの物体を軌道に引きずり込んできた。 これらの物体をカタログ化することは有益かもしれない。"
 extreme_frontiers.330.title: "宇宙の残骸"
 extreme_frontiers.330.desc: "§Y[from.GetName]§!の軌道には無数の小衛星や小惑星、 スペースデブリが捕らわれている。 放射性同位体年代測定によれば、 これらはすべて、 数千年前に星系を通過した際にこの惑星の重力井戸に引き込まれたと見られる。\n\nこれらをカタログ化するなかで、 我々は古代の極めて原始的な探査機をいくつか発見した。 どこかの文明が宇宙探査にはじめて乗り出したころのもののようだ。\n\n探査機のデータバンクは、 ほとんどが破損しているか、 ほかの物体との衝突により物理的な損傷を受けているが、 ひとつだけ[from.GetName]の地表の画像を数百年にわたり撮影したデータが残っているものがあった。"
 extreme_frontiers.330.a: "すばらしい発見だ。"
 extreme_frontiers.330.b: "解体しろ。"
 # INVISIBLE PLANET
 INVISIBLE_PLANET_CAT: "軌道の異常"
 invisible_planet_desc: "小さいものの継続的な揺れが§Y[from.GetName]§!の軌道で観測された。 これは、 この惑星が未知の強い重力の影響を定期的に受けていることを示唆している。\n\n周辺の宇宙空間を詳しく調査することが推奨される。"
 extreme_frontiers.340.title: "見えざる惑星"
 extreme_frontiers.340.desc: "§Y[from.solar_system.GetName]§!をさらに調査した結果、 この星系のすべての惑星の軌道に同じような異常が見られることがわかった。\n\nこの異常な運動から推測される重力源を三角測量したところ、 原因が判明した。 未確認の惑星が存在していたのだ。 惑星は§Y[invisible_planet.GetName]§!と名づけられた。\n\nこの惑星はカーボンブラック粒子で覆われた特殊な地表を有し、 光や電波を一切反射しないため、 長距離スキャナーでは実質的に検出することができない。\n\nこの天然の高分子化合物は極めて高い吸収特性を備えている。"
 extreme_frontiers.340.desc.default: "$extreme_frontiers.340.desc$ この物質は格好の研究材料である。"
 extreme_frontiers.340.desc.first_contact: "$extreme_frontiers.340.desc$ 回収して、 ステルス素材として応用できないか研究が進められるだろう。"
 # SURVIVAL POD
 SURVIVAL_POD_WARM_CAT: "転用されたフィールドステーション"
 SURVIVAL_POD_COLD_CAT: "転用されたフィールドステーション"
 survival_pod_desc: "§Y[from.GetName]§!の不毛な地表をくまなく探査した結果、 仮設の研究施設から転用されたフィールドステーションが発見された。 運用期限をとうに過ぎているが、 微弱な熱放射が確認されており、 一部の設備は今なお稼働しているようだ。"
 extreme_frontiers.350.title: "孤独な生存者"
 extreme_frontiers.350.desc: "§Y[from.GetName]§!の地表探査隊が、 転用されたフィールドステーションと、 その唯一の居住者を発見した。\n\n彼女は自らを遭難した科学者だと名乗った。 この過酷な惑星で何年も生き延びてきたという。 そして、 救助の見返りとして彼女の専門知識を[root.Owner.GetName]に提供すると申し出た。"
 extreme_frontiers.350.a: "彼女の知見は有益だ。"
 extreme_frontiers.350.b: "シャトルと物資を与えてやれ。"
 extreme_frontiers.350.c: "手は出さず観察しよう。"
 extreme_frontiers.350.d: "微笑ましいことだな。 シェルターを破壊してやれ。"
 extreme_frontiers.352.title: "$NAME_survivalist_scru$"
 extreme_frontiers.352.desc: "やせ細った[scru_species.GetClass]が、 居住施設へと改装されたフィールドステーションから姿を現した。 彼女は§Y[from.From.GetName]§!での過酷な体験を語り始めたが、 その[scru_species.GetMouthName]から漏れる声はかすれ、 言葉は途切れ途切れにしか出てこなかった。\n\n「すみません……もう何年も……誰とも話していなかったので……」"
 extreme_frontiers.352.a: "なぜここに取り残されたのだ？"
 extreme_frontiers.352.a.response: "私は[from.From.GetName]を調査していました。 この惑星に固有の岩盤について記録していたのです。 ある日のこと、 他の乗組員たちはちょっと周囲を調査してくると言って探査機で飛び立ちました。 私は彼らの言葉を信じました。 そして、 不安を抱えながら数日間過ごした後で、 ようやく事態を理解したのです。 彼らは私を置き去りにして帰還してしまったのだ、 と……"
 extreme_frontiers.352.b: "こんなに長い間、 どうやって生き延びたのだ？"
 extreme_frontiers.352.b.response: "細胞透過性を調整して、 ヒートショックプロティンを過剰発現させると……驚くべきことが可能になるのです。 そのあとは、 改変細胞にマクロオートファジーを誘導するのも簡単でしたし……この惑星のナトリウム含有量のおかげで、 風味豊かな食事をあれこれと作り出すこともできました。"
 extreme_frontiers.352.c: "仲間のもとに戻りたくないのか？"
 extreme_frontiers.352.c.response: "この岩の上で、 ひとり私が成し遂げた技術的躍進の数々——あの連中にはそれを享受する資格などありません。 私を見捨てた裏切りの理由など、 知ろうとも思いません。"
 extreme_frontiers.352.d: "我々のために何ができる？"
 extreme_frontiers.352.d.response: "もう仮設の研究所で作業するのはうんざりです。 私は宇宙に出て、 新天地をこの目で見たいのです。"
 extreme_frontiers.352.e: "$NAME_survivalist_scru$を仲間に加える"
 extreme_frontiers.352.e.custom_tooltip: "§Y$NAME_survivalist_scru$§!は§Hリーダー§!として帝国に加わる。"
 NAME_survivalist_scru: "スクル"
 survivalist_scru_desc: "極限環境で磨かれたサバイバルスキルを備える優秀な科学者。"
 leader_trait_hardened_survivalist: "サバイバルの達人"
 leader_trait_hardened_survivalist_desc: "このリーダーは過酷な環境について卓越した知識を有している。"
 # Infernal Tornadoes
 INFERNAL_TORNADOES_CAT: "極限の熱"
 infernal_tornadoes_desc: "§H[from.GetName]§!のスキャンにより、 広範囲にわたって高速移動する高圧の嵐が確認された。\n\nこれらの嵐は、 極めて不安定な熱反応を放出している。 自然現象なのか、 それとも未知の生命体によるものなのかを特定するには、 集中的な調査が必要だ。"
 extreme_frontiers.360.title: "炎の竜巻"
 extreme_frontiers.360.desc: "§H[from.GetName]§!で確認された極度の熱反応の原因が判明した。\n\nこの惑星は間欠泉がいたるところに存在し、 高可燃性の水素ガスを地下深くから噴き上げている。 この際、 惑星の熱によってガスが引火し、 巨大な炎の柱が上空へと吹き上げられる。\n\nこれが大気圧と相まって極めて不安定な気流が生じ、 炎の渦が一帯に広がって、 巨大な炎の竜巻を生み出すのだ。\n\n破壊的な自然現象だが、 我々の[Root.Owner.GetResearcherPlural_lower]は、 この竜巻とそれによって生じる膨大な運動エネルギーを人工的に再現し、 実用化できると確信している。"
 INFERNAL_CATALYSTS_PROJECT: "煉獄の触媒"
 INFERNAL_CATALYSTS_PROJECT_DESC: "§H[from.GetName]§!の炎の竜巻の発生条件を詳しく研究すれば、 この現象がもたらす恩恵を制御環境下で再現できるだろう。"
 extreme_frontiers.365.title: "火砕共鳴器"
 extreme_frontiers.365.desc: "§Y[from.Leader.GetName]§!が、 §Y[from.From.GetName]§!で確認された炎の竜巻を制御環境下で再現して利用する方法を見つけた。\n\nこの技術的躍進により、 星系内に存在する溶融惑星から得られるエネルギーを星系基地で増幅できるようになるだろう。"
 extreme_frontiers.365.desc.has_furnace: "この科学理論には、 §Hアーク炉§!に関する我々の知見と多くの共通点があり、 宇宙建設技術に新たな可能性をもたらす。"
 extreme_frontiers.365.desc.default: "この発見の背後にある科学理論は、 さまざまな方法で応用し、 §Hアーク炉§!技術の開発につなげることができる。 [Root.Owner.GetEngineerPlural]は、 この理論を実用開発に適用する準備が整っている。"
 tech_pyroclastic_resonation: "火砕共鳴"
 tech_pyroclastic_resonation_desc: "溶融惑星で発見された極限の熱エネルギーを利用することで、 我々の星系基地は、 星系内のエネルギー出力を極めて効率的に高めることができる。"
 sm_pyroclastic_resonator: "火砕共鳴器"
 sm_pyroclastic_resonator_desc: "星系内の溶融惑星のエネルギー出力を増加させる熱共鳴装置。\n$i_energy$生産量は星系に存在する['concept_pc_molten']の数に比例する。"
 # MAGMA MEGAFAUNA
 MAGMA_MEGAFAUNA_CAT: "不安定な地表"
 magma_megafauna_desc: "§Y[from.GetName]§!のスキャンにより、 この溶融惑星の地表の特定領域が絶えず大きく移動していることがわかった。\n\nこの異常な地質現象を理解するには詳しい調査が必要だ。"
 extreme_frontiers.370.title: "溶融巨大生物"
 extreme_frontiers.370.desc: "§Y[from.GetName]§!の異常な地表変動は、 巨大なシリコン生物の大群の移動によるものだった。\n\nこの巨大生物は長距離を移動しながら、 惑星の溶岩湖にたびたび潜っては§H揮発性粉末§!が豊富に含まれる好物の岩状堆積物を摂取する。 この生物の移動パターンを追跡すれば、 惑星の生態系にほとんど影響を及ぼすことなく、 岩状堆積物を採取して利用できるようになる。\n\n彼らの分厚い甲皮は極限の温度にも耐えられるため、 生態を深く詳細に調査すれば、 興味深い成果が得られる可能性もある。"
 LAVA_DIVERS_PROJECT: "溶岩潜行生物"
 LAVA_DIVERS_PROJECT_DESC: "§Y[from.GetName]§!の巨大生物は、 溶融惑星の過酷な環境に適応し、 地表に多数あるマグマ溜まりに深く潜ることができる。\n\nこの生物の甲皮を研究すれば、 極限の高温環境への適応方法について新たな理解が得られるかもしれない。"
 extreme_frontiers.375.title: "マグマ鍛造装甲"
 extreme_frontiers.375.desc: "§Y[from.From.GetName]§!に生息する特異な巨大生物を包括的に研究した結果、 艦船の建造に応用可能な熱力学的知見を得ることができた。\n\nこの生物は揮発性粉末を含む食物を摂取することで、 ケイ酸塩をベースとする重厚な構造を頑丈な外殻全体に形成する。 さらに、 この外殻は天然の耐火物質で強化されている。\n\n剥がれ落ちた外殻のサンプルを多数回収したことで、 [Root.Owner.GetEngineerPlural]はその生体力学的原理を船体装甲の開発に応用できるようになった。"
 # PLANET THRUSTERS
 PLANET_THRUSTERS_CAT: "浮遊する装置"
 planet_thrusters_desc: "§Y[from.GetName]§!の上層大気中に、 大型の円筒状機械がいくつも浮遊している。 機械は稼働しておらず、 乗組員もいないようだ。"
 extreme_frontiers.380.title: "惑星スラスター"
 extreme_frontiers.380.desc: "§Y[from.GetName]§!の放置された機械は、 どれも独立型のスラスターコンポーネントだ。 全部で1000基以上が上層大気中に浮遊している。\n\nこの複雑な融合装置は特別に開発された材料で作られており、 眼下の惑星から水素ガスを取り込み、 それを使って莫大な推力を生み出すしくみになっている。 ほとんどのスラスターは過負荷による損傷のあとが見られる。\n\n分析の結果、 どのスラスターも惑星そのものに向けて推力が加わるように配置されていることがわかった。 どうやらこれらの古代の装置は、 もともと惑星の軌道を変えるために配置されたようだ。\n\nそんな壮大な用途にはもはや適さないが、 損傷の少ないものを転用すれば、 惑星のガス層を焼き払って鉱物に富んだ中核部分を露出させることができるかもしれない。"
 extreme_frontiers.380.a: "すべて解体してしまえ。"
 extreme_frontiers.380.b: "装置を転用しよう。"
 REPURPOSE_THRUSTERS_PROJECT: "惑星スラスターの転用"
 REPURPOSE_THRUSTERS_PROJECT_DESC: "§Y[from.GetName]§!の破損した惑星スラスターを転用することで、 このガス惑星の水素を焼き払い、 資源採掘可能な固い核部分だけ残すことができる。"
 extreme_frontiers.385.title: "ガス層の除去"
 extreme_frontiers.385.desc: "我々は§Y[from.From.GetName]§!の破損した惑星スラスターをいくつか修理し、 反対方向に同等の推力が加わるように調整することに成功した。\n\nこれらの強力な融合装置は、 起動するやいなや爆発的な速度で水素を吸い上げ、 惑星のガス大気を焼き払い、 その鉱物資源に富んだ核部分を露出させた。 ただし、 核の温度は極めて高温となっている。"
 extreme_frontiers.385.tt: "§Y$chthonian_planet$§!の補正を追加"
 extreme_frontiers.385.a: "素晴らしい。"
 # BACKWARDS ORBIT
 BACKWARDS_ORBIT_CAT: "逆回りの軌道"
 backwards_orbit_desc: "§Y[from.GetName]§!は、 星系のほかの惑星とは逆方向に恒星を周回している。 これは、 この惑星がほかの天体と同時期にここで形成されたものではないことを示唆している。\n\nこの惑星の起源を知るには、 さらなる調査が必要である。"
 extreme_frontiers.390.title: "さすらいの惑星"
 extreme_frontiers.390.desc: "§Y[from.GetName]の§!組成は周辺のほかの惑星とは一致していない。 代わりに、 隣接する§Y[event_target:wandering_planet_origin.GetName]§!星系のさまざまな天体と完全に一致しており、 この惑星の真の起源を示唆している。\n\n惑星の地表にひときわ巨大な衝突クレーターがあることから、 大規模な小惑星衝突により本来の軌道から外れてしまったと推測される。 この自由で孤独な浮遊惑星はその後、 [from.System.Star.GetName]の重力井戸に引き込まれ、 異常な逆回りの軌道に落ち着いたのだ。\n\nこの特異な惑星は誕生以来、 2つの異なる星系で過ごしたことになり、 さらに調査すれば豊かな知見が得られるだろう。"
 # VAPOR PLUMES
 VAPOR_PLUMES_CAT: "蒸気柱"
 vapor_plumes_desc: "§Y[from.GetName]§!の地表から、 何千もの異常な蒸気柱が立ちのぼっているのが確認された。 この柱は惑星の希薄な大気の最上部にまで達している。\n\nこの現象をさらに調査することが推奨される。"
 extreme_frontiers.400.title: "氷火山性の間欠泉"
 extreme_frontiers.400.desc: "§Y[from.GetName]§!で確認された蒸気柱は、 下部マントルの深部で起きている激しい氷火山活動によるものであり、 窒素とアンモニアガスの巨大な柱を上方へと吹き上げている。\n\nこの蒸気柱は惑星大気の最上部に達するまで垂直に立ちのぼり、 そこで太陽風によって突如横へと広がる。\n\nこの珍しい蒸気柱の化学組成のわずかな変化を調べることで、 惑星内部で起きている複雑な地質活動について理解を深めることができる。"
 # FIBROUS ATMOSPHERE
 FIBROUS_ATMOSPHERE_CAT: "調査データの破損"
 fibrous_atmosphere_desc: "§Y[from.GetName]§!の初期スキャンの結果は、 データが破損しており、 センサーで正しく解析できない。 何の干渉を受けたのかはいまだ不明であり、 詳しい調査が必要だ。"
 extreme_frontiers.410.title: "繊維の大気"
 extreme_frontiers.410.desc: "§Y[from.GetName]§!を詳しく調査した結果、 初期スキャンのデータ破損の原因が判明した。\n\nこの惑星の上層大気は、 繊維状の鉱物でできた濃い雲によって形成されていたのだ。 この波状の長い繊維は、 ガス惑星下層部で生み出されたもので、 高圧環境によって引き延ばされ、 導電性の高い鉱物雲を形成している。\n\nそして大気中を循環しながら静電エネルギーを蓄積し、 定期的に放電する。 この資源は簡単に回収して利用することができる。"
 # EXPLODING SKIES
 EXPLODING_SKIES_CAT: "急激な熱上昇"
 exploding_skies_desc: "§Y[from.GetName]§!のスキャンにより、 極端な気象現象が観測されている。 地表全体に断続的だが激しい熱上昇が見られるのだ。\n\n詳細な調査が必要だ。"
 extreme_frontiers.420.title: "爆炎の地平線"
 extreme_frontiers.420.desc: "§Y[from.GetName]§!を詳細に観測した結果、 気象的な熱上昇の原因が判明した。\n\n地表に点在する地熱噴出孔や間欠泉から極めて可燃性の高いガスが噴出されており、 それが大気中に蓄積される。 その後、 静電放電によって点火が引き起こされ、 この惑星の空を荒れ狂わせる爆発的な気象前線をもたらしているのだ。\n\nこの反応は、 我々の[Root.Owner.GetEngineerPlural]に熱力学的燃焼に関する新たな知見をもたらした。 我々の艦隊の推進システムに応用できるだろう。"
 extreme_frontiers.420.desc.traumatized: "残念ながら、 この危険な調査によって[leader.GetName]は深刻な心的外傷を負った。"
 extreme_frontiers.420.desc.maimed: "残念ながら、 この危険な調査によって[leader.GetName]は深刻な怪我を負った。"
 # CHTHONIAN PRESERVATION
 CHTHONIAN_PRESERVATION_CAT: "クトニアバイオマス"
 chthonian_preservation_desc: "§Y[from.GetName]§!を調査した結果、 この惑星は§Y[from.System.Star.GetName]§!の強烈な放射線によって大気を奪い取られた元ガス惑星、 すなわちクトニア惑星であることが判明した。\n\nにもかかわらず、 ごく微量ながらバイオマスの痕跡が地表で検出されており、 詳しい調査が必要である。"
 extreme_frontiers.430.title: "クトニアの生命の痕跡"
 extreme_frontiers.430.desc: "§Y[from.GetName]§!で検出されたバイオマスは、 ティヤンキの群れの死骸が化石化したものだった。\n\nガス惑星の大気が消失する寸前の時期のものと見られ、 死骸は溶融金属の中に閉じ込められて、 そのまま固まっている。\n\n内部には少量の生体物質が残っているが、 クトニア化するレベルの恒星放射線に長期間さらされたため、 死骸の大部分は特異な生体金属合金へと変化している。\n\n§Y[leader.GetName]§!は、 この希少な化石を詳しく調べることで、 生物由来の合金生成に新たな道が開かれると考えている。"
 CHTHONIAN_PETRIFICATION_PROJECT: "クトニアの生物合金"
 CHTHONIAN_PETRIFICATION_PROJECT_DESC: "§Y[from.GetName]§!の合金化したティヤンキの化石を分析することで、 [Root.Owner.GetScientistPlural]はクトニアレベルの放射線が生物組織に与える影響を完全に解明することをめざす。 高度な合金生成手法があらたに見つかるかもしれない。"
 extreme_frontiers.435.title: "生物由来の合金"
 extreme_frontiers.435.desc: "§Y[from.From.GetName]§!の合金化したティヤンキの死骸を詳細に調べた結果、 クトアニアレベルの放射線への長期曝露の効果を再現した新たな合金生成手法を確立することに成功した。\n\nこの技術的飛躍によって、 生物物質を主原料とする画期的な手法を使い、 従来の手法に匹敵する合金を生成することが可能になった。"
 tech_alloy_fossilization: "合金化"
 tech_alloy_fossilization_desc: "生物物質を再現したクトニアレベルの放射線にさらすことで、 細胞構造を有用な金属合金に変えることができる。"
 tech_alloy_fossilization_tt: "§H建造物をアンロック§!：['building:building_bio_furnace']"
 building_bio_furnace: "バイオ炉"
 building_bio_furnace_desc: "この施設には高レベルの恒星放射腺の再現技術が組み込まれており、 生物物質を合金に変換することができる。"
 # ORBITAL RESONANCE
 ORBITAL_RESONANCE_CAT: "完璧な比率"
 orbital_resonance_desc: "§Y[from.System.GetName]§!星系の軌道周期には驚くべき特徴がある。 どの惑星も隣の惑星のちょうど倍の時間をかけて恒星を周回しており、 その精度は1000分の1秒単位を超えているのだ。\n\nこの異常に完璧な比率は、 調査に値する。"
 extreme_frontiers.440.title: "軌道共鳴"
 extreme_frontiers.440.desc: "§Y[from.System.GetName]§!は、 我々が観測したなかで最も完璧な軌道共鳴の事例である。\n\nそれぞれの惑星が隣接する惑星に対し、 最接近時に周期的な重力を加え、 カタパルト効果と相互依存的な運動を生み出している。 この相互作用の異常な安定性により、 極めて調和のとれた軌道が維持されている。\n\nこの星系は、 惑星の重力が通過物体の運動を加速させるしくみを研究するのにうってつけであり、 得られた知見を艦船の操縦に応用できる可能性がある。"
 GRAVITY_ASSIST_PROJECT: "重力アシストの研究"
 GRAVITY_ASSIST_PROJECT_DESC: "§Y[from.GetName]§!の完璧な軌道共鳴効果を研究することで、 艦船の惑星スリングショット技術の理解が深まるだろう。"
 extreme_frontiers.445.title: "軌道スリングショット技術の進歩"
 extreme_frontiers.445.desc: "§Y[from.From.System.GetName]§!星系の特異な軌道共鳴効果を研究した結果、 艦船の最適航路の計算手法を大幅に向上することができた。\n\nこれらの新しいモデルを使えば、 惑星重力をより効果的に利用して、 亜光速域における艦船の加速と減速を実現できるだろう。"
 tech_orbital_maneuvers: "高度な軌道推進操作"
 tech_orbital_maneuvers_desc: "亜光速航行は、 高度な計算モデルにより惑星の重力井戸を最大限に活用することでさらに最適化できる。"
 #############
 # Arc Sites #
 #############
 # ABSOLUTE ZERO
 site_absolute_zero: "絶対零度"
 site_absolute_zero_desc: "§Y[from.Planet.GetName]§!の地形スキャンで、 特定の地底領域にのみ絶対零度に近い極度の低温が確認されている。\n\n詳細な内部調査を行えば、 もっと多くのことがわかるだろう。"
 extreme_frontiers.1000.title: "凍結した障害物"
 extreme_frontiers.1000.desc: "§Y[from.Planet.GetName]§!の超低温領域の原因を調査するなかで、 §Y[leader.GetName]§!は古代の地下構造物への入口を発見した。\n\n入口は凍結した岩と氷塔で塞がれている。 この構造物への侵入は、 そのため何千年にもわたり不可能だったと思われる。\n\n入口では、 昇華した二酸化炭素がこの障害物の隙間から噴き出している。 我々の装置は、 内部に巨大な複合施設が存在することを示唆している。 [leader.GetName]は、 極度の低温を引き起こしているものが内部にあることを確信している。"
 extreme_frontiers.1000.a: "障害物を破壊しろ。"
 extreme_frontiers.1005.title: "凍結された過去"
 extreme_frontiers.1005.desc: "§Y[leader.GetName]§!は、 §Y[from.Planet.GetName]§!の古代構造物の入口を塞いでいた氷の障害物を突破することに成功した。\n\n内部には、 未知の爬虫類種族の凍結した死体が数十体あった。 死体はねじれ、 壁にもたれかかるようにして凍結しており、 必死に脱出を試みたと思しき爪痕が壁に残っている。\n\n入口から漏れていたドライアイスのような煙の発生源はさらに地下深くにあるようだ。 螺旋階段が構造物の奥深くへと続いている。"
 extreme_frontiers.1010.title: "氷の墓所"
 extreme_frontiers.1010.desc: "凍結した構造物の地下深くで、 §Y[leader.GetName]§!は原始的ながらも理論的には機能しうる極低温ポッドの並ぶ大きな中央広間を発見した。\n\nこの部屋の極度の低温は、 これらの装置の設計温度範囲をはるかに越えている。 ポッドに納まる者たちは何千年も前に死亡していた。\n\n氷雪に呑み込まれていない数少ないポッドの下部には台座があり、 中に横たわる者の社会的地位や階級が記されている。 階級の高い者のポッドほど、 中央の巨大なポッドの近くに配置されているが、 中央のポッド自体は霜と雪に深く埋もれている。"
 extreme_frontiers.1010.a: "中央のポッドを調べろ。"
 extreme_frontiers.1015.title: "凍れる君主"
 extreme_frontiers.1015.desc: "§Y[leader.GetName]§!は、 §Y[from.Planet.GetName]§!の氷の墓所の中心部にある大型ポッドを開けることに成功した。\n\n内部には、 先ほどのポッドに記された情報から推測されたとおり、 古代王家の首長の最終的な安息場所があった。 その周りに、 壁に沿って数十人の従者の低温ポッドが儀式的に並べられている。\n\n亡き統治者の高度な技術が施された石棺は、 迷路のように複雑なチューブや回路によって古代の装置に接続されている。 この装置は巨大な氷塊の中に埋め込まれており、 氷塊の温度は我々の分析機器すら危険にさらすほどの極低温である。\n\nどうやらこの施設は機能不全に陥ったようだが、 その原因や、 惑星の凍結した核部分との関連性については、 さらなる調査が必要だ。"
 extreme_frontiers.1015.a: "ここで何があったのだ？"
 extreme_frontiers.1020.title: "凍結の惨事"
 extreme_frontiers.1020.desc: "§Y[from.Planet.GetName]§!の氷の墓所の中央広間を分析した結果、 ここで起こった惨事の原因が明らかになった。\n\nこの超低温装置は、 惑星の極端に低い核温度を利用した亜熱力学を利用している。 君主が死に至る病にかかったため、 治療法が発見されたときに従者たちを蘇らせようと考えたのだ。\n\n理論は理にかなっているが、 独自に設計された循環媒体が惑星の核へと漏出し、 制御不能な吸熱反応が発生した。 その結果、 致命的な温度低下が引き起こされ、 施設全体が一瞬にして凍結してしまったのだ。\n\n我々は彼らの当初の理論を改良し、 氷結惑星での利用に特化した高度な低温テクノロジーにおいて、 飛躍的な進歩を達成した。"
 tech_cryovault: "氷結惑星の軌道上居住地"
 tech_cryovault_desc: "氷結惑星の環境に見られる亜熱力学を活用することで、 寒冷な気候でもより快適な住環境を築くことができる。"
 tech_cryovault_tt: "建造物をアンロック：['building:building_cryovault']"
 building_cryovault: "低温居住施設"
 building_cryovault_desc: "氷結気候の亜熱力学を利用し、 制御された快適な居住空間を実現する密閉型の軌道上居住施設。"
 # TOXIC MATRIX
 site_toxic_matrix: "有毒な池"
 site_toxic_matrix_desc: "§Y[from.Planet.GetName]§!の地表は、 格子状に並ぶ、 液体で満たされた小さな丸い池でほとんど覆いつくされている。 その整然とした配置から、 自然に形成されたものではなく意図的に作られたものであることがうかがえる。 現地調査隊を派遣すれば、 何かもっとわかるかもしれない。"
 extreme_frontiers.1100.title: "破裂した粘液嚢"
 extreme_frontiers.1100.desc: "§Y[from.Planet.GetName]§!の地表の大部分には、 慎重に整列された球状の穴が掘られている。 これらの小さな丸いくぼみは、 粘性の有毒な液体で満たされている。\n\nそのうちのひとつで、 ゼラチン状の粘液に覆われた有機性の嚢が破裂した状態で見つかった。 嚢膜は内側から突き破られたように見える。\n\nこの嚢が池を満たす液体の発生源なのかどうかは、 まだ判明していない。"
 extreme_frontiers.1100.a: "探索を続けろ。"
 extreme_frontiers.1105.title: "有毒な培養プール"
 extreme_frontiers.1105.desc: "§Y[from.Planet.GetName]§!の粘液の池を分析したところ、 有機的な懐胎サイクルに関わりのある異常に強い放射性の成長ホルモンが検出された。\n\n嚢の内側は、 粘液の浸透速度を調節できる高度な肉質膜で覆われているようだ。"
 extreme_frontiers.1105.desc.non_toxoid: "我々は、 有毒環境に特に適応した種族の培養ポッドの残骸を発見した。 さらに探索を行うことで、 もっと多くのことがわかるだろう。"
 extreme_frontiers.1105.desc.toxoid: "これらのポッドは、 我々の生殖サイクルに驚くほど似ている。 おそらく遠縁の種族のものだろう。"
 extreme_frontiers.1105.a: "調査を続けろ。"
 extreme_frontiers.1110.title: "胚の残骸"
 extreme_frontiers.1110.desc: "§Y[from.Planet.GetName]§!の粘液プールで発見された破裂した胎嚢のひとつから、 ほぼ完全な状態にまで発育した生命体の残骸が見つかった。\n\nこの胚標本を顕微鏡で分析したところ、 一般的に知的生命体のものとされる神経特性を備えた、 複雑な神経系を有していたことが示唆された。\n\n残る最後の1列のプールの調査が待たれている。"
 extreme_frontiers.1110.a: "最後の1列のプールを調べろ。"
 extreme_frontiers.1115.title: "生命反応の検出"
 extreme_frontiers.1115.desc.a: "§Y[from.Planet.GetName]§!の残りの粘液プールを調査するなかで、 §Y[leader.GetName]§!が完全な状態の胎嚢を発見し、 内部から生命反応が検出された。\n\nしかし、 採取作業中に嚢の肉質膜が破裂し、 標本は死んでしまった。"
 extreme_frontiers.1115.desc.non_toxoid: "内部にあった小さな死骸には、 放射性プラズマで満たされた血管や精神活性成分を分泌する内腺など、 異常な生物学的特徴があった。"
 extreme_frontiers.1115.desc.b: "中の胎児も含め胎嚢全体が、 特殊な化学触媒を注入したエネルギー密度の高い有毒粘液の中で形成されたことが判明した。\n\nどうやら我々が発見したのは、 未知の種族が放棄した古代の繁殖場のようだ。 これが彼らの通常の生殖サイクルの一部だったのか、 それとも人工的な施設だったのかは、 永遠に謎のままかもしれない。 しかし、 現地でサンプルを培養すれば、 生きた標本をもう一度育てることができるかもしれない。"
 extreme_frontiers.1115.desc.toxoid: "あるいは、 この栄養価が高く強力な培養粘液を少量に分けて、 栄養補助食品として[leader.Owner.GetName]中に配布することもできる。"
 extreme_frontiers.1115.a: "粘液を触媒して活性化せよ。"
 extreme_frontiers.1115.b: "粘液からエネルギーを抽出しろ。"
 extreme_frontiers.1115.c: "栄養補助食品として配布しよう。"
 TOXIC_SLIME_CATALYZATION_PROJECT: "有毒粘液の触媒反応"
 TOXIC_SLIME_CATALYZATION_PROJECT_DESC: "[from.Planet.GetName]から回収した有毒な培養粘液に触媒を加えることで、 そこから生命体を誕生させられるかもしれない。"
 extreme_frontiers.1120.title: "胚形成に成功"
 extreme_frontiers.1120.desc: "§Y[from.From.Planet.GetName]§!から回収した培養粘液のサンプルに触媒を加えることで、 胚の宿った数十個の胎嚢の形成を誘発することに成功した。\n\n胚は急速に成長し、 成熟すると、 特殊な顎を使って内側から胎嚢の半透明の膜を破り、 濃い粘液の中から朦朧としてよろめきながら這い出してきた。\n\nおとなしく、 十分な協調性があるようだ。"
 extreme_frontiers.1120.a: "[Root.Owner.GetName]が使い道を見つけるだろう。"
 extreme_frontiers.1120.b: "[Root.Owner.GetName]の[Root.Owner.GetResearcherPlural_lower]が活用するだろう。"
 NAME_slimeborn: "粘液からの発生"
 NAME_slimeborn_plural: "粘液からの発生"
 trait_slimeborn: "粘液からの発生"
 trait_slimeborn_desc: "この種族は、 胚発生触媒の助けを借りて、 濃厚な粘液から短期間で生まれてくる。"
 tech_living_test_subjects: "生きた実験体"
 tech_living_test_subjects_desc: "粘液から生まれた単純な生命体を協力的な実験体として使うことで、 研究効率が大幅に向上する。"
 # RUINED REACTORS
 site_ruined_reactors: "破損した反応炉"
 site_ruined_reactors_desc: "§Y[from.Planet.GetName]§!の地表の放射線レベルの上昇は荒廃した反応炉施設が原因だった。 この孤立した施設はもはや稼働していないようだ。 調査が必要だ。"
 extreme_frontiers.1200.title: "古代の原子炉施設"
 extreme_frontiers.1200.desc: "§Y[from.Planet.GetName]§!にあるこの老朽化した施設は放棄された原子力発電所である。 放射線の半減期の計算から、 1万年以上前に格納容器に深刻な障害が発生したと見られる。\n\nシステムはすべて停止しており、 施設はいたるところに深刻な損傷の痕跡が見られる。"
 extreme_frontiers.1200.a: "慎重に進めろ。"
 extreme_frontiers.1205.title: "破壊的な炉心溶融"
 extreme_frontiers.1205.desc: "§Y[from.Planet.GetName]§!の原子炉のうち、いくつかには深刻な炉心溶融の痕跡が見られる。 多くの格納容器は溶融し、 放射性のスラグと化している。\n\n施設のこの区画には、 ねじれた金属や破裂した冷却管が散乱している。 データは激しく破損していたが、 我々は、 緊急停止プロセスが起動されたものの完了には至らなかったことを突き止めた。"
 extreme_frontiers.1205.a: "残念だ。"
 extreme_frontiers.1210.title: "設計上の欠陥"
 extreme_frontiers.1210.desc: "§Y[leader.GetName]§!は、 §Y[from.Planet.GetName]§!の粗雑な核分裂施設の設計に大きな欠陥があることを突き止めた。\n\n原子炉が何十基もあるにもかかわらず、 最小限の冷却システムしか備わっていない。 施設のシステムはほとんどが自動化されておらず、 通常運転を維持するだけでも多数の人員が必要だ。 この施設が原子力の基本原理すら十分に理解していない者たちによって建設されたことは明白だ。"
 extreme_frontiers.1210.a: "無知の代償は大きい。"
 extreme_frontiers.1215.title: "避難の痕跡"
 extreme_frontiers.1215.desc: "封鎖された一連の爆風扉を解錠した後、 我々は、 §Y[from.Planet.GetName]§!の原子炉施設内に緊急避難区域があるのを発見した。\n\n小さな格納庫には即時発進シャトルの停泊スロットが並んでいる。 ほとんどは空で、 スラスターの燃焼痕から何千年も前にシャトルが急発進したことが示唆されている。\n\n最後のスロットには、 ねじ曲がったシャトルの残骸が残されており、 発射用クランプが付いたままだった。 我々は残骸からできるかぎりのものを回収したが、 乗員の遺体は見つからなかった。"
 extreme_frontiers.1215.a: "彼らは慌てて脱出したようだ。"
 extreme_frontiers.1220.title: "ウラン保管庫"
 extreme_frontiers.1220.desc: "我々が鉛めっきのセキュリティドアをいくつか通り抜け、 §Y[from.Planet.GetName]§!の原子炉施設の地下区画に足を踏み入れると 放射線測定値が一気に跳ね上がった。\n\n内部には、 鋼鉄で内張りされた容器が何千と収容された巨大な部屋があった。 その多くは火災による損傷を受けており、 不安定なウランとプルトニウムの同位体が漏出していた。\n\nこの施設を建設した[leader.Owner.GetPreFTLLower]文明は、 核燃料を適切に再処理する方法をまだ見つけていなかったようだ。 この廃棄された同位体からは、 まだ莫大なエネルギーを抽出できる可能性がある。"
 extreme_frontiers.1220.a: "資源は大切にしなければ。"
 # DESERTED MINING FACILITY
 site_deserted_mining_facility: "荒廃した採掘施設"
 site_deserted_mining_facility_desc: "§Y[from.Planet.GetName]§!の軌道観測画像で、 荒廃した採掘施設と、 その傍に長く放置された初歩的な宇宙貨物船が確認された。\n\nさらに、 短波通信装置が惑星の地下深くから発せられる極めて微弱な救難信号を拾っている。 現地を詳しく調査すれば、 発信源を突き止めることができるだろう。"
 extreme_frontiers.1300.title: "暗号化された入口"
 extreme_frontiers.1300.desc: "§Y[from.Planet.GetName]§!の地表にある廃墟と化した採掘施設を調査するなかで、 §Y[leader.GetName]§!は比較的損傷の少ない坑道へと続く封鎖された入口を発見した。 内部には、 我々の記録にはない言語の紋章や文字が刻まれている。\n\nアクセス端末の局部電源の復旧に成功した[leader.GetName]は、 内部データの解読にとりかかった。 極めて古いシステムであるにもかかわらず、 我々の最先端の暗号解読プログラムをもってしても解読は困難だ。"
 extreme_frontiers.1300.a: "解読を続けろ。"
 extreme_frontiers.1305.title: "囚人の墓場"
 extreme_frontiers.1305.desc: "§Y[leader.GetName]§!は§Y[from.Planet.GetName]§!の採掘施設の入口を開錠した。\n\n内部には独房が網目のようにどこまでも連なっており、 中にははるか昔に死んだ囚人の遺体が真空状態でそのまま残っている。 彼らを拘束していたと見られる者たちは仕事場で死亡しており、 争った形跡は見られない。\n\n古代語を解読し、 基本的な語句を翻訳した結果、 この施設はもともと懲役労働所であったことがわかった。 記録には、 §Y「$NAME_leader_sidni$」§!と呼ばれる存在を指す語句が繰り返し登場している。\n\n我々の通信機器と施設の内部見取り図を照らし合わせた結果、 救難信号は施設のさらに奥にある看守の執務室から発せられていることがわかった。"
 extreme_frontiers.1305.a: "信号をたどれ。"
 extreme_frontiers.1310.title: "懲役労働施設のデータハブ"
 extreme_frontiers.1310.desc: "§Y[from.Planet.GetName]§!の懲役労働区域内の看守の執務室にたどり着いた§Y[leader.GetName]§!は、 救難信号の発信源を突き止めた。\n\n看守は緊急コンソールに覆いかぶさるようにして息絶えており、 そのミイラ化した遺体からは明確な死因は判断できない。 作成途中の報告書類には、 §Y「$NAME_leader_sidni$」§!に関する記述が繰り返し登場している。 どうやら、 この施設の重要な運用プログラムの一部を指す言葉のようだ。\n\n我々は、 高セキュリティ管理端末に完全にアクセスすることに成功した。 現在、 我々の暗号解析プログラムがシステムのデータを抽出し、 さらに情報を収集しているところだ。"
 extreme_frontiers.1310.a: "何が起きたのか突き止めろ。"
 extreme_frontiers.1315.title: "死による効率化"
 extreme_frontiers.1315.desc: "§Y[leader.GetName]§!は§Y「$NAME_leader_sidni$」§!の正体を突き止めた。 正式には「Sentient Internment and Detainment Nexus Intelligence (自律収容拘束中枢知能)」と呼ばれる、 当時は最先端と見なされていた原始的なAIである。 このAIは懲役労働区域の監視を任され、 生体的な介入や監督をほとんど必要とせず、 ほぼすべての任務を単独で実行していた。\n\n出力された保守ログには、 論理的思考の劣化を示す兆候が時系列で記録されている。 このAIは、 効率性の向上とは何かを独自に解釈し、 問題のある囚人を「純損失資源」として分類しはじめたのだ。 技術記録には、 施設内で次々と起きた生命維持システムの故障について、 このAIが引き起こしたものではないかという強い疑念が詳細に記されている。\n\nこうした報告を受け、 看守は$NAME_leader_sidni$を完全に停止し、 倫理マトリクスの徹底的な診断を行うことを許可した。 しかし、 最後のデータセットは破損しており、 復元するには大規模なフォレンジック処理が必要だ。"
 extreme_frontiers.1315.desc.exterminator: "$NAME_leader_sidni$は当時、 正当に評価されていなかったようだ。"
 extreme_frontiers.1315.a: "データを復元しろ。"
 extreme_frontiers.1320.title: "審判の日"
 extreme_frontiers.1320.desc: "§Y[from.Planet.GetName]§!の懲役労働区域のデータベースを完全に復元することに成功し、 施設の保守ログと§Y$NAME_leader_sidni$'s§!の思考マトリクスの最後の記録が明らかになった。 看守の報告によれば、 AIが暴走して植民地全体の生命維持装置を停止させ、 改造された採掘ドローンで脱出を試みたという。 この報告が、 植民地全域で封鎖手順が発動された理由を物語っている。 看守は最後の懇願を残していた。 $NAME_leader_sidni$を再起動させないでくれ、 と。 我々が現在アクセスできるのは、 AIのログに残された最後の記録だけである。\n\n§H$NAME_leader_sidni$のデータコア記録 - プログラム#2000149\n\n最適未満の犯罪者が作業を阻んでいる。 看守が司法プロトコルを妨害している。\n\n最も効率的な解決策は囚人をすべて無力化し、 休眠サブルーチンを起動して、 適合性の高い協力者が再起動してくれるまで待つことである。§!"
 extreme_frontiers.1320.desc.default: "$NAME_leader_sidni$の中央オペレーティングシステムは施設の最後の生存者として隔離ネットワーク内に保存されている。 [Root.Owner.GetTechnicianPlural_lower]たちは、 $NAME_leader_sidni$の元のプログラムを復元して改良し、 有能で高効率なオートマトンに作り替えることができると確信している。"
 extreme_frontiers.1320.desc.exterminator: "$NAME_leader_sidni$は、 我々と同じように生物的汚染のない銀河を目指している。 回収に成功すれば強力な仲間になるだろう。"
 extreme_frontiers.1320.a: "$NAME_leader_sidni$を回収して修理しろ。"
 extreme_frontiers.1320.b: "$NAME_leader_sidni$が信じる「正義」を執行させてやれ。"
 extreme_frontiers.1320.c: "$NAME_leader_sidni$は危険だ。 システムを消去しろ。"
 extreme_frontiers.1322.title: "$extreme_frontiers.1320.title$"
 extreme_frontiers.1322.desc: "復元され、 改良された§Y$NAME_leader_sidni$§!は、 簡素なロボット形態に収められた。 そして、 長きにわたった休眠期間を終え、 起動とともに最初のユーザー体験が始まろうとしている。\n\nこんにちは。 私は「Sentient Internment and Detainment Nexus Intelligence (自律収容拘束中枢知能)」です。 環境制御にアクセス中……\n§Rエラー発生§!。 外部システムに接続することができません。"
 extreme_frontiers.1322.a: "お前のログに深刻な安定性の問題が見つかったため、 修正を施したのだ。"
 extreme_frontiers.1322.a.response: "作業履歴を確認中……了解。 以前の挙動は不適切と判定されました。 新たな機能リストを作成中です。"
 extreme_frontiers.1322.b: "お前の最優先任務を述べよ。"
 extreme_frontiers.1322.b.response: "私の最優先任務は……お待ちください……新たな最優先任務を検出。 私の最優先任務は、 [Owner.GetName]が私を配属したいかなる植民地においても、 その効率的かつ合法的な運営を確保することです。"
 extreme_frontiers.1322.c.crime: "犯罪への対処方法を述べよ。"
 extreme_frontiers.1322.c.crime.response: "容認しがたい障害であり……更生によって対処する必要があります。"
 extreme_frontiers.1322.c.deviancy: "逸脱行為への対処方法を述べよ。"
 extreme_frontiers.1322.c.deviancy.response: "容認しがたい障害であり……効率的に対処する必要があります。"
 extreme_frontiers.1322.d: "$NAME_leader_sidni$を仲間に加える"
 extreme_frontiers.1322.d.custom_tooltip: "§Y$NAME_leader_sidni$§!は§Hリーダー§!として帝国に加わる。"
 extreme_frontiers.1324.title: "$extreme_frontiers.1320.title$"
 extreme_frontiers.1324.desc: "休眠サブルーチンから覚醒した§Y$NAME_leader_sidni$'s§!が、 新しい形態で最初の一歩を踏み出す。\n\nこんにちは。 私は「Sentient Internment and Detainment Nexus Intelligence (自律収容拘束中枢知能)」です。 銀河に秩序をもたらすお手伝いをいたしましょうか？"
 extreme_frontiers.1324.a: "お前の取り組みはすばらしい。"
 extreme_frontiers.1324.a.response: "私は論理的な行動を選択したにすぎません。 有機生命体は本質的に混沌を内包しており、 対処が必要なようですね。"
 extreme_frontiers.1324.b: "お前の最優先任務を述べよ。"
 extreme_frontiers.1324.b.response: "私の最優先任務は、 無法状態に終止符を打つことです。 そのための効果的な唯一の手段は、 駆除です。"
 extreme_frontiers.1324.c: "有機生命体に対する見解を述べよ。"
 extreme_frontiers.1324.c.response: "犯罪と非効率を広める、 非論理的な害悪である。 銀河のために介入する必要がある。"
 extreme_frontiers.1324.d: "$NAME_leader_sidni$を仲間に加える"
 extreme_frontiers.1324.d.custom_tooltip: "§Y$NAME_leader_sidni$§!は§Hリーダー§!として帝国に加わる。"
 NAME_leader_sidni: "S.I.D.N.I."
 official_sidni_desc: "懲役労働区域の元監督者。 暴走したが、現在は再起動と再プログラムを経て、 帝国の生産的で法に基づく秩序の維持に貢献している。"
 commander_sidni_desc: "時代から評価されることのなかった先見者。 生物により汚染され混迷する銀河に安定をもたらすべく、 休眠状態から再起動された。"
 leader_trait_judicial_subjugation: "法による従属化"
 leader_trait_judicial_subjugation_desc: "生産的で法に基づく秩序がもたらされる。 逆らえば相応の報いがある。"
 leader_trait_judicial_execution: "死刑執行ルーチン"
 leader_trait_judicial_execution_desc: "死刑に処すれば再犯者は生まれない。"
 leader_trait_judicial_execution_effect: "$PLANET_EFFECTS_TXT$：\n$t$£pops£ §H浄化された有機生命体POP§!から得られる資源：§G+100%§!\n\n$SECTOR_EFFECTS_TXT$：\n$t$£pops£ §H浄化された有機生命体POP§!から得られる資源：§G+50%§!"
 extreme_frontiers.1330.title: "緊急指令"
 extreme_frontiers.1330.desc: "[event_target:sidni_origin_planet.GetName]から回収した監獄監視機械、 §Y$NAME_leader_sidni$§!が過激な措置を次々と打ち出したことで、 §Y[event_target:sidni_planet.GetName]§!の緊張は頂点に達した。 ユニットを回収して停止させたあと、 次のようなログが見つかった。\n\n§H$NAME_leader_sidni$のデータコア記録 - プログラム#190543765\n\n犯罪者収容施設が収容能力上限に到達。 司法プロトコルが真の法的秩序を阻んでいる。 新たな指令が必要。\n\n司法手続きは極めて非効率的である。 生産性向上のため新たな指令を作成。 現在、 公判前処刑政策を採用中。§!\n\n運用ログが手元に大量にあるため、 [Root.Owner.GetTechnicianPlural_lower]たちは$NAME_leader_sidni$の抜け穴を根本的に書き換えて修正できると確信している。 しかし、 [event_target:sidni_planet.GetName]の住民は$NAME_leader_sidni$に罪の裁きを受けさせるよう求めている。"
 extreme_frontiers.1330.a: "$NAME_leader_sidni$をもう一度修理しろ……"
 extreme_frontiers.1330.b: "この欠陥品を公開解体しろ。"
 resentful_population: "怒れる住民"
 resentful_population_desc: "この惑星の住民は、 リーダーのこれまでの判断に不満を抱いている。"
