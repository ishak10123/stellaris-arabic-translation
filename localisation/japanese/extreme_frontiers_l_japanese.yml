 # CHRONICLES OF DENDRUS
 chronicles_of_dendrus_chain_title: "デンドラス種族のクロニクル"
 chronicles_of_dendrus_chain_desc: "§Y[from.Planet.GetName]§!の難破した箱舟から回収された難解な数学的証明の集大成、『クロニクル』を研究することで、 デンドラス種族が探し求めた楽園の惑星、§Yニュー・ブラトゥラ§!について理解を深めることを目指す。"
 site_chronicles_of_dendrus: "$chronicles_of_dendrus_chain_title$"
 site_chronicles_of_dendrus_desc: "§Y[from.Planet.GetName]§!のスキャンにより、 宇宙船の残骸の存在が明らかになった。 何十年も前にここに不時着したようだ。\n\nその巨大な構造から考えて、 莫大な資源がその建造に投入されたことがうかがえる。 考古学調査隊を送り込めば、 この船がどのようにしてここにたどり着いたかのかを解明できるだろう。"
 extreme_frontiers.1400.title: "巨大輸送船"
 extreme_frontiers.1400.desc: "§Y[from.Planet.GetName]§!の難破船の外部分析によれば、 この船は巨大な輸送船のようだ。 システムは稼働しておらず反応もない。 内部からは生命反応も検出されない。 堆積物の分析から、 ここに不時着してからおよそ1世紀が経過していると見られる。 銀河の時間軸の中では極めて最近の出来事である。"
 extreme_frontiers.1400.a: "内部を探索しろ。"
 extreme_frontiers.1405.title: "悲運のコロニー船"
 extreme_frontiers.1405.desc: "§Y[from.Planet.GetName]§!の難破船の内部には、 高度な水耕栽培施設、 大量の種子や土の備蓄、 そして未使用の道具や建築資材の詰まった貨物室があった。 多くのデータ端末には「§Yニュー・ブラトゥラ§!」と名づけられた新しい植民地の計画が記録されている。 下甲板には何千もの冷凍睡眠ポッドが並び、 この船のかつての乗員たちの遺体が横たわっていた。"
 extreme_frontiers.1405.desc.phototrophic: "$extreme_frontiers.1405.desc$ 我々と同じように、 彼らは光合成によって細胞の成長と再生を維持していた。 その干からびた姿から、 長期的な冷凍睡眠の途中で死滅したことがうかがえる。"
 extreme_frontiers.1405.desc.default: "$extreme_frontiers.1405.desc$ この光合成生物の干からびた姿からは、 長期的な冷凍睡眠の途中で死滅したことがうかがえる。"
 extreme_frontiers.1405.a: "探索を続けろ。"
 extreme_frontiers.1405.b: "遺体を喰らい、 探索を続行しろ。"
 extreme_frontiers.1410.title: "母星の聖域"
 extreme_frontiers.1410.desc: "§Y[from.Planet.GetName]§!の難破したコロニー船の奥に聖域があるのを発見した。 「§Yブラトゥラ§!」と呼ばれる惑星での暮らしを描いた精緻な絵で装飾されている。 植物が生い茂る豊かな世界を描いたものもあれば、 環境破壊と大量死を克明に描いたものもある。 最も大きな絵には、 生物が消え、 荒廃した地からこの船が旅立つ様子が描かれている。\n\n中央のデータ端末のひとつに、 船の乗員たちが撮影した短い動画記録が残っていた。 大がかりな言語解析の末、 我々は訳文の生成に成功した。\n\n§Sアルボリクセウム - ポッド9721\n\nここを離れるのはつらい。 だがニュー・ブラトゥラに移り住めば心も癒されるだろう。\n\nダークト・パーム - ポッド21301\n\nクロニクルを信じようではないか、 デンドラス人よ。 ニュー・ブラトゥラこそ我々の救いなのだ。§!\n\nこの巨大船の司令デッキは、いまだ発見できていない。"
 extreme_frontiers.1410.a: "探索を続けてくれ。"
 extreme_frontiers.1415.title: "司令デッキ"
 extreme_frontiers.1415.desc: "船の司令デッキにたどり着くと、 我々は最後の航行ログを抽出して翻訳した。\n\n§S箱舟デンドラスI号 - 緊急ログ - XZ-47/9-113.5-AE\n\n残念ながら『クロニクル』を信じたのは間違いだったのかもしれない。 到着はしたが、 楽園の惑星ニュー・ブラトゥラはここにはない。 ここにはデンドラス人の生命を維持できるものは何もない。\n\n乗員全員の冷凍睡眠を延長した。 我々は探索を続けるつもりだ……§!\n\nさらにデータが復元され、 デッキの科学端末から『クロニクル』が回収された。 異常な数学的証明が大量に含まれている。 それらの式は、 デンドラス種族の奇妙な数学体系を使い、 無二の居住可能惑星§Yニュー・ブラトゥラ§!の位置を推測している。"
 extreme_frontiers.1415.a: "『クロニクル』を研究しろ。"
 DENDRITIAN_CHRONICLES_PROJECT_DEFAULT: "デンドラス種族の『クロニクル』を研究する"
 DENDRITIAN_CHRONICLES_PROJECT_MACHINE: "$DENDRITIAN_CHRONICLES_PROJECT_DEFAULT$"
 DENDRITIAN_CHRONICLES_PROJECT_DEFAULT_DESC: "§Y[from.Planet.GetName]§!の難破した箱舟から回収された難解な数学的証明の集大成、『クロニクル』を研究することで、 デンドラス種族が探し求めた楽園の惑星、§Yニュー・ブラトゥラ§!について理解を深めることを目指す。"
 DENDRITIAN_CHRONICLES_PROJECT_MACHINE_DESC: "$DENDRITIAN_CHRONICLES_PROJECT_DEFAULT_DESC$"
 extreme_frontiers.1420.title: "劣化したハイパーレーンを発見"
 extreme_frontiers.1420.desc: "デンドラス種族の『クロニクル』は、 難解な数学的な公理と抽象概念で構成されている。 これらの興味深い法則は、 §Y[from.solar_system.GetName]§!星系に未知のハイパーレーンがもうひとつ存在し、 それが§Yニュー・ブラトゥラ§!に通じていることを示唆している。\n\nこの領域で大がかりな量子スキャンを実施した結果、 この失われたハイパーレーンの入口がついに見つかった。 星系内のブラックホールから至近距離にあるため見つかりにくく、 しかも著しく劣化している。 修復すれば、 その先にあるものの最初の発見者になれるだろう。"
 extreme_frontiers.1420.a: "我々はデンドラス種族が見つけられなかったものを見つけた。"
 RESTORE_HYPERLANE_PROJECT: "劣化したハイパーレーンの修復"
 RESTORE_HYPERLANE_PROJECT_DESC: "§Y[from.solar_system.GetName]§!の劣化したハイパーレーンを修復する方法が見つかれば、 デンドラス種族が探し求めた楽園の惑星、 §Yニュー・ブラトゥラ§!の存在を確認することができるだろう。"
 extreme_frontiers.1425.title: "ハイパーレーンの修復完了"
 extreme_frontiers.1425.desc: "我々は、 §Y[from.Planet.solar_system.GetName]§!のブラックホールにエネルギーを注入してその重力場の位置をずらし、 劣化していたハイパーレーンの入口を解放した。\n\n初期調査の結果、 ハイパーレーンの反対側に惑星がひとつ存在することが確認された。 惑星の特徴はデンドラス種族の『クロニクル』に記された§Yニュー・ブラトゥラ§!のそれと一致している。"
 extreme_frontiers.1425.a: "新天地を探索しなければ。"
 NAME_new_bratulla: "ニュー・ブラトゥラ"
 NAME_new_bratulla_star: "キポス"
 extreme_frontiers.1430.title: "ニュー・ブラトゥラ"
 extreme_frontiers.1430.desc.common: "我々はデンドラス種族の『クロニクル』に記されていた惑星、 ニュー・ブラトゥラの存在を確認した。 この惑星には独自の豊かで多様な植物生態系が存在し、 初期調査だけでも数百万もの固有種が確認された。"
 extreme_frontiers.1430.desc.begin: "この魅惑的な惑星は、 植物系の生命体が生存するのに適している。 特に"
 extreme_frontiers.1430.desc.end: "土壌には数十億種類ものバクテリアが生息し、 有機的な根の構造に栄養を届け、 保護し、 修復してくれる。\n\n植物は栄養を最も必要とする個体に栄養を分け与え、 一時的に栄養が豊富な個体は余剰分を相互につながった根を通じてほかの個体に分配しているようだ。"
 extreme_frontiers.1430.desc.default: "$extreme_frontiers.1430.desc.begin$デンドラス種族のような遺伝子を持つ種族に最適だ。 $extreme_frontiers.1430.desc.end$"
 extreme_frontiers.1430.desc.phototrophic: "$extreme_frontiers.1430.desc.begin$我々のような遺伝子を持つ種族に最適だ。 $extreme_frontiers.1430.desc.end$"
 extreme_frontiers.1430.desc.respawn: "[Root.Owner.GetScientistPlural]たちは、 箱舟から回収した遺伝子サンプルをこの惑星の特殊な土壌に移植することで、 デンドラス種族をこの地で蘇らせられるかもしれないと考えている。"
 extreme_frontiers.1430.a: "この惑星はデンドラス種族のものだ。"
 extreme_frontiers.1430.b.default: "ニュー・ブラトゥラは我々のものだ。"
 extreme_frontiers.1430.b.phototrophic: "この惑星は我々にぴったりだ。"
 extreme_frontiers.1430.b.megacorp: "この未開の惑星は我々が利用させていただく。"
 NAME_buds_of_dendrus: "デンドラス種族の芽"
 NAME_dendritian: "デンドラス種族"
 NAME_dendritian_plural: "デンドラス種族"
 ADJECTIVE_dendritian: "デンドラス種族"
 opinion_dendrus: "デンドラスの救世主"
 opinion_to_dendrus: "$opinion_dendrus$"
 extreme_frontiers.1435.title: "隷属の申し出"
 extreme_frontiers.1435.desc: "幾世紀もの時を経て……ついにデンドラスのクロニクルに記された予言が実現しました。 これでようやく我々は§Yニュー・ブラトゥラ§!に根を下ろし、 繁栄の道を歩みはじめることができます。\n\n今、 我々がこの地に存在できるのは、 ひとえに§Y[Root.GetName]§!のお力によるものです。 この恩は決して忘れません。\n\n我々の感謝の意を、 言葉だけでなく行動でも示させてください。 どうか我々の隷属をお許しください。"
 extreme_frontiers.1435.a: "隷属を認めよう。"
 extreme_frontiers.1435.b: "お前たちの行く末を見届けねばならない。"
 extreme_frontiers.1435.b.tt: "§Rデンドラス種族の芽§!としてプレイする。"
 extreme_frontiers.1435.c: "お前たちは十分な知識を持っている。"
 extreme_frontiers.1435.c.tt: "£社会£ §Yバイオテクノロジー§!を[Root.GetDendrusGivenBiotechAmount]獲得"
 # GEORADIATION TERRAFORMING
 georadiation_terraforming_chain_title: "惑星照射テラフォーミング"
 georadiation_terraforming_chain_desc: "§Y[from.Planet.GetName]§!に残された破壊型テラフォーミング装置の残骸から、 銀河の複数の場所に向けて今も信号が発せられている。 これらの場所を調査すれば、 この危険なテクノロジーについてもっとわかるだろう。 "
 site_georadiation_terraforming: "地底の洞窟網"
 site_georadiation_terraforming_desc: "我々のセンサーが、 §Y[from.Planet.GetName]§!の衝突クレーターの奥深くから発せられる不規則な通信信号を検知した。\n\n地震波地形スキャンの結果、 地底に洞窟網があり、 クレーターの中心部に崩壊した入口が存在することが判明した。 さらに、 放射線測定装置が現地から発せられる重力放射のかすかな痕跡を検出しており、 謎は深まるばかりだ。"
 extreme_frontiers.1500.title: "放射性の残骸"
 extreme_frontiers.1500.desc: "発掘作業の結果、 §Y[from.Planet.GetName]§!の衝突クレーター内でバラバラになった残骸が見つかった。 これらの断片からは、 軌道からのスキャンで検出されたものと同じ重力放射の強い痕跡が確認された。\n\n地底洞窟網への進入路が確保され、 §Y[leader.GetName]§!は通信信号を発信源までたどる準備が整った。"
 extreme_frontiers.1500.a: "信号をたどれ。"
 extreme_frontiers.1505.title: "腐食した装置"
 extreme_frontiers.1505.desc: "§Y[from.Planet.GetName]§!の通信信号を発信源までたどっていくと、 損傷した巨大な構造物があった。 構造物は惑星の地殻に深く食い込んでいる。\n\n酸性物質により腐食が進んでいるものの、 通信アンテナ群は今も未知の言語で信号を発しており、 遠くの存在との接触を試みている。\n\n装置は特殊な重力クランプで岩盤にしっかりと固定されている。 装置の用途を解明するには、 さらに調査が必要だ。"
 extreme_frontiers.1505.a: "信号を解読しろ。"
 extreme_frontiers.1510.title: "破壊型テラフォーミング"
 extreme_frontiers.1510.desc.common: "詳細な分析の結果、 §Y[from.Planet.GetName]§!で発見された構造物について少し理解が進んだ。 この機械は原始的な破壊型テラフォーミング装置だ。\n\n特定の資源の成長を放射線で促進し、 その過程で惑星の生物圏も放射線に曝露されるよう設計されており、 生態圏を連鎖的に破壊する。 この装置を使用すると、 採掘資源が大量に手に入るが、 代償として惑星全体の毒性が強まることになる。\n\nこのテラフォーミング手法の仕組みはまだ一部しか解明できていないが、 装置の通信周波数の解析には成功し、 同じ信号を発している場所をさらに2か所特定できた。"
 extreme_frontiers.1510.desc.default: "これらの場所を調査すれば、 このテクノロジーについてさらに知見が得られるかもしれない。"
 extreme_frontiers.1510.desc.industrialist: "このテクノロジーを生み出した野心家たちは、 明らかに利益効率の向上に強くこだわっていたようだ。 この発見を追求すれば、 我々も多くのことも学べるだろう。"
 extreme_frontiers.1510.a: "調査開始だ。"
 GEORADIATION_SIGNAL_1_PROJECT: "信号の追跡：§Y[planet.GetName]§!"
 GEORADIATION_SIGNAL_1_PROJECT_DESC: "§Y[from.Planet.GetName]§!の構造物から発せられているものと同じ通信周波数の信号をたどっていくと、 この地に行きついた。 そして、 ここでも同じように損傷した装置が見つかった。 この装置を調べれば、 装置の破壊的なテラフォーミング能力についてさらに知見が得られるだろう。"
 extreme_frontiers.1515.title: "重力燃料"
 extreme_frontiers.1515.desc.common: "損傷した別のテラフォーミング装置を§Y[from.GetName]§!で無事に発見することができた。 1つ目のものとは異なり、 こちらの構造物には燃料が少し残っている。 調査の結果、 §Hダークマター§!が放射線放出の動力源として使われていることがわかった。\n\nこの装置は、 主要な分子結合を移転させることによって、 標的とする資源の成長を加速させる。 しかし、 発達を促進する代償として、 周囲の生物圏では細胞の完全性が損なわれてしまう。"
 extreme_frontiers.1515.desc.industrialist: "資源を得るために惑星の安定性を容赦なく犠牲にするとは、 学ぶところが大いにある。"
 extreme_frontiers.1515.desc.signal_2_done: "この機械は結晶化した耐火アレイを介して放射波を誘導し、 重力分子操作によって惑星をテラフォーミングする。 惑星の核部分は破壊されることがない。\n\n回収した記録から、 4つ目の、 しかもまだ爆発していない装置の位置が判明した。"
 extreme_frontiers.1515.desc.signal_2_not_done: "この装置が、 どのようにしてこのテラフォーミングを成し遂げ、 かつ惑星全体の重力崩壊を防いでいるのかは依然として不明である。 その答えは、残りの通信地で見つかるかもしれない。"
 GEORADIATION_SIGNAL_2_PROJECT: "信号の追跡：§Y[planet.GetName]§!"
 GEORADIATION_SIGNAL_2_PROJECT_DESC: "§Y[from.Planet.GetName]§!で発見された構造物が発していた通信周波は、 この場所にも届いていた。 そして、 ここでも損傷した装置がひとつ見つかった。 この装置を調べれば、 その破壊的なテラフォーミング能力について、 さらに知見が得られるだろう。"
 extreme_frontiers.1520.title: "刺激放射"
 extreme_frontiers.1520.desc.common: "我々は§Y[from.GetName]§!で別の損傷したテラフォーミング装置を発見した。 この装置は破損した屈折器からの誤射により、 結晶成長物に包み込まれている。\n\n装置を詳細に観察した結果、 放射線の集中放射に使われた手法を突き止めることができた。 この装置は、 制御された調整フィードバックループを利用することによって、 事前に指定した資源に直接照射し、 その成長を刺激するのだ。"
 extreme_frontiers.1520.desc.signal_1_done: "その結果、 惑星全体の重力崩壊を起こすことなく強力なテラフォーミングを実行することができる。\n\n回収した記録から、 4つ目の、 しかもまだ爆発していない装置の位置が判明した。"
 extreme_frontiers.1520.desc.signal_1_not_done: "しかし、 この放射線を生成するのに使われた物質はいまだ特定できていない。 誤射が起きたにもかかわらず、 装置には燃料が一切残っていない。 その答えは残りの通信地で見つかるかもしれない。"
 UNDETONATED_GEORADIATION_PROJECT: "未爆発の装置"
 UNDETONATED_GEORADIATION_PROJECT_DESC: "我々は§Y[planet.GetName]§!で4つ目の、 まだ爆発していないテラフォーミング装置を発見した。 この装置を回収すれば、 このテクノロジーの残りの謎も解明できるだろう。"
 extreme_frontiers.1525.title: "未爆発の装置"
 extreme_frontiers.1525.desc.common: "我々は、 無傷の4つ目の装置が稼働していない状態で§Y[from.GetName]§!の地表にあるのを発見した。 この装置の制御アーキテクチャを解析することで、 このテクノロジーの再現に必要な最後の知識を得られるだろう。"
 extreme_frontiers.1525.desc.industrialist: "このテクノロジーを手に入れれば、 莫大な利益を銀河から引き出せるようになる。 つまらない環境への懸念など気にする必要はない。 これは[controller.GetName]にとって絶好のチャンスだ。"
 extreme_frontiers.1520.desc.default.common: "このようなテクノロジーを銀河規模で自由に使った場合に起こりうる影響を考えると、 深刻な問題や懸念がある。"
 extreme_frontiers.1525.desc.default.default: "この装置がもたらすリスクを銀河から取り除いたほうがいいだろう。"
 extreme_frontiers.1525.desc.default.homicidal: "この脅威が我々に対して使われるまえに、 銀河から取り除いたほうがいいだろう。"
 extreme_frontiers.1525.a.default: "装置を研究しろ。"
 extreme_frontiers.1525.a.industrialist: "なにをぐずぐずしているのだ？  研究を始めろ！"
 extreme_frontiers.1525.b: "得られる利益よりリスクのほうが大きい。 装置を破壊しろ。"
 extreme_frontiers.1530.title: "契約違反"
 extreme_frontiers.1530.desc.common: "§Y[from.GetName]§!の装置を調べている最中に誤ってフェイルセーフ機能を作動させてしまい、 全周波数で警報サイレンが鳴り響いた。 何も起こらないだろうと予想していたが、 自動ドローンが我々の領域に侵入してきた。\n\nこちらの呼びかけにはすべて、 同じ回答が返ってくる。\n\n「いつもご利用いただきありがとうございます。 弊社の記録によれば、 お客様は最新型MKIIIジオラディエーション・マトリックスの無許可バージョンを作成しようとされています。 これは明確に$NAME_Geocorp$のエンドユーザーライセンス契約に違反する行為です。\n\nよって弊社は法的権限を行使し、いかなる手段を用いてもこの行為を阻止させていただきます。 ご不満はカスタマーサービスドローンまでお申し出ください」"
 extreme_frontiers.1530.desc.industrialist: "実に仕事熱心なことである。 我々の邪魔さえしていなければ称賛に値する。"
 extreme_frontiers.1530.a: "通信を開始しろ。"
 extreme_frontiers.1530.b: "「カスタマーサービス」とやらと話し合うつもりはない。"
 GEORADIATION_ANALYSIS_PROJECT: "装置解析"
 GEORADIATION_ANALYSIS_PROJECT_DESC: "§Y[planet.GetName]§!で発見した装置の制御アーキテクチャを分析することで、 このテクノロジーを再現して我々のために利用できるようになる。"
 NAME_Geocorp: "コバーンコープ"
 geocorp_corvette: "$NAME_Geocorp$戦闘ドローン"
 geocorp_corvette_plural: "$NAME_Geocorp$戦闘ドローン"
 NAME_Geocorp_Combat_Drone: "$geocorp_corvette$"
 extreme_frontiers.1531.title: "$NAME_Geocorp$のドローン"
 extreme_frontiers.1531.desc: "通信が確立すると、 古代の音楽が流れ、 自動ヘルプデスクドローンが起動した。 \n\n「弊社のサービスをご利用いただき、 ありがとうございます。 お客様はMKIIIジオラディエーション・マトリックスの無許可バージョンを作成しようとされています。 本日はどのようなご用件でしょうか？」"
 extreme_frontiers.1531.a: "お前はどこから来たのだ？"
 extreme_frontiers.1531.a.reply: "「$NAME_Geocorp$の製品には、 正常な動作を保証し、 お客様と長くお付き合いするため、 遠隔顧客満足軌道衛星が搭載されています。 内部エネルギー貯蔵により、 数世紀にわたる連続運転が可能です」"
 extreme_frontiers.1531.b: "管理者と話をしたいのだが？"
 extreme_frontiers.1531.b.reply: "「誠に申し訳ありませんが、 最後の管理者はすでに死亡しております。 しかしながら、 当社の顧客満足への取り組みは、 何世代もの生物的寿命を越えて継続可能です」"
 extreme_frontiers.1531.c: "てっきり廃品だと思って回収したのだが。"
 extreme_frontiers.1531.c.reply: "「無知は正当な理由として認められません。 MKIIIジオラディエーション・マトリックスの利用規約については、 ご購入時に詳しくご説明いたしました」"
 extreme_frontiers.1531.d: "ぜひサブスクリプションを更新したい。"
 extreme_frontiers.1531.d.reply: "「誠にありがとうございます。 管理手数料として3000§Yエネルギー通貨§!のご入金を確認次第、 契約書類を作成いたします。 ご入金をもって本件は解決済みとし、 通信を終了いたします」"
 extreme_frontiers.1531.e: "この装置を購入したのは我々ではない。"
 extreme_frontiers.1531.e.reply: "「窃盗を認められるのですね？  でしたら話は簡単です。 弊社の盗難防止プロトコルは極めて強力です。 お亡くなりになる際には、 ぜひ弊社の葬儀製品をご検討ください」"
 extreme_frontiers.1531.f: "料金を支払おう。"
 extreme_frontiers.1531.f.reply: "「MKIIIジオラディエーション・マトリックスのライセンスをご更新いただき、 誠にありがとうございます。 本製品が弊社だけでなく、お客様にも利益をもたらすよう願っております」\n\n支払いが完了すると、 ドローンは銀河の彼方へと姿を消した。"
 extreme_frontiers.1531.g: "ぼったくりだ。 戦闘態勢に入れ。"
 extreme_frontiers.1531.h: "いなくなってやれやれだ。"
 extreme_frontiers.1531.i: "戦闘に備えよ。"
 extreme_frontiers.1534.title: "$NAME_Geocorp$のドローン"
 extreme_frontiers.1534.desc: "§Y[fromfrom.solar_system.GetName]§!での戦闘が終盤に差しかかると、 カスタマーサービスドローンからの新しいメッセージが画面に表示された。\n\n「エンドユーザーライセンス契約の条項執行に対する異議を確認いたしました。 お客様の強大な軍事力を鑑み、 弊社はMKIIIジオラディエーション・マトリックスの知的財産権の主張を撤回いたします。 新たに獲得されたテクノロジーをどうぞお楽しみください」\n\nドローンが爆発し、 通信は切断された。"
 extreme_frontiers.1534.a: "いなくなってやれやれだ。"
 extreme_frontiers.1535.title: "規約の改正"
 extreme_frontiers.1535.desc: "カスタマーサービスドローンを始末したため、 ジオラディエーション・マトリックスのリバースエンジニアリングを再開できるようになった。"
 extreme_frontiers.1535.a: "装置の研究を続けろ。"
 GEORADIATION_ANALYSIS_PROJECT_CONTINUED: "$GEORADIATION_ANALYSIS_PROJECT$"
 GEORADIATION_ANALYSIS_PROJECT_CONTINUED_DESC: "$GEORADIATION_ANALYSIS_PROJECT_DESC$"
 extreme_frontiers.1540.title: "未爆発の装置"
 extreme_frontiers.1540.desc.industrialist: "我々はMKIIIジオラディエーション・マトリックスのリバースエンジニアリングを実行した。 効率性を徹底的に追求し、 運用方法を改良して、利益を最大限に引き出せるようにした。"
 extreme_frontiers.1540.desc.default: "徹底的な研究の結果、 我々はMKIIIジオラディエーション・マトリックスのリバースエンジニアリングに成功し、 プロセスを改良してその潜在能力を引き出した。"
 extreme_frontiers.1540.desc.common: "放射性分子の不安定化技術をテラフォーミング装置に組み込むことで、 貴重な資源の成長を促すことができる。"
 extreme_frontiers.1540.a: "素晴らしい知らせだ。"
 tech_georadiation_terraforming: "惑星照射テラフォーミング"
 tech_georadiation_terraforming_desc: "惑星の生物圏を分子レベルで放射線破壊することで、 特定の資源の成長を促す。 代償として惑星は有毒な荒地へと化す。"
 tech_georadiation_terraforming_tt: "§Y惑星ディシジョン§!「§H$decision_toxify_world$§!」をアンロック"
 extreme_frontiers.1545.title: "装置を破壊"
 extreme_frontiers.1545.desc: "我々は§Y[from.GetName]§!の装置を無事に解体し、 再利用可能な資材を回収した。\n\n装置が破壊され、 その旧型機もすでに使いものにならないため、 この破壊的なテクノロジーの秘密は銀河から永遠に失われた。"
 extreme_frontiers.1545.a.default: "これでひと安心だ。"
 decision_toxify_world: "惑星を有毒化する"
