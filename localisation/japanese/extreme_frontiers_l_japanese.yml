 extreme_frontiers.2005.title: "有毒資源"
 extreme_frontiers.2005.desc.common: "§Y[target.GetName]§!の第1回目の§Y惑星照射テラフォーミング§!が完了した。\n\nジオラディエーション・マトリックスに加えた改良のおかげで、 地表を居住不能な有毒な荒地へと変え、 かつてないほど膨大な量の資源を採取することができた。"
 extreme_frontiers.2005.desc.industrialist: "これは、 我が帝国にとって新たな開発と利益の時代の幕開けを意味する。"
 extreme_frontiers.2005.a.default: "素晴らしい。"
