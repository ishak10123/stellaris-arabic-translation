 opinion_invaded_mind: "精神侵入未遂"
 utopia.3100.name: "火と破滅"
 utopia.3100.desc_prefix: "[Root.Capital.GetName]……視界は霞んでいてぼやけているが、 疑いの余地はない。 これは[Root.Capital.GetName]、 我々の首都だ。 "
 utopia.3100.desc_suffix: "\n\n§H数ある中のひとつではない。 それは必ず起こる。 太陽が昇るように。 それがあなたの運命だ。§!\n\nビジョンは始まりと同様に一瞬で終わり、 渦巻くサイオニック・エネルギーの瘴気が残る。"
 utopia.3100.desc_default: "$utopia.3100.desc_prefix$ 大都市は、 炎と煙の遮蔽された壁越しでも、 異様でありながらどこか馴染みがある。 数千……いや、 数百万の切断された死体が通りに散乱し、 そのすべては[Root.GetSpeciesName]だ。 耐え難い腐敗臭がする。\n\n§Hお前の未来だ。§!\n\n廃墟には生命の痕跡は残っていない。 上空では、 巨大な軌道上施設が煙をたなびかせながら、 ゆっくりと避けられない形で惑星に向かって降下を始めている。 我々は、 数ある未来のうちのひとつの可能性を目撃しているのだろうか？  $utopia.3100.desc_suffix$"
 utopia.3100.desc_hive: "$utopia.3100.desc_prefix$ 大都市は、 炎と煙の遮蔽された壁越しでも、 異様でありながらどこか馴染みがある。 数千……いや、 数百万の切断された死体が通りに散乱し、 そのすべては[Root.GetSpeciesName]だ。 我々は破壊に包囲されている。\n\n§Hお前の未来だ。§!\n\n廃墟には生命の痕跡は残っていない。 上空では、 巨大な軌道上施設が煙をたなびかせながら、 ゆっくりと避けられない形で惑星に向かって降下を始めている。 我々は、 数ある未来のうちのひとつの可能性を目撃しているのだろうか？  $utopia.3100.desc_suffix$"
 utopia.3100.desc_machine: "$utopia.3100.desc_prefix$ 主要都市は、 炎と煙の遮蔽された壁越しでも、 異様でありながら認識することができる。 数千……いや、 数百万もの解体された建物が通りに散乱し、 そのすべては[Root.GetSpeciesName]だ。腐敗臭が充満している。\n\n§Hお前の未来だ.§!\n\n廃墟には機能するものは何ひとつ残っていない。 上空では、 巨大な軌道上施設が煙をたなびかせながら、 ゆっくりと避けられない形で惑星に向かって降下を始めている。 我々は、 数ある未来のうちのひとつの可能性を受け取っているのだろうか？  $utopia.3100.desc_suffix$"
 utopia.3100.a: "§Gアバターにエネルギーを供給する§!"
 utopia.3100.b: "§Y恩恵：センサー範囲の拡大§!"
 utopia.3100.c: "§R恩恵：シールド強度の増加§!"
 utopia.3110.name: "決闘の幻影"
 utopia.3110.desc: "ここではシュラウドが激しさを増している。 膨大なサイオニック・エネルギーが流れ込むと、 激しい反応が起こり、 半知性を持った幻影が生まれる。\n\nこれらの混乱した精神体はしばしば互いに衝突し、 時には数千年にも及ぶ戦いの中で、 驚異的な量の超能力を解き放つ。 実際、 そのような決闘が今まさに行われているようだ。\n\n慎重に進めるべきだろう。"
 utopia.3120.name: "サイオニック・ビジター"
 utopia.3120.desc_suffix: "我々のような訪問者は、 シュラウドにとってそうであるように、 我々にとっても全く異質な精神によって作られた強力な超能力探査機である。\n\n彼らの超能力の反響が我々自身の反響に触れると、 我々の中で微かな映像が一瞬ちらつく。 それは厚いガス状の大気中を漂う巨大な有機生命体で、 その周囲には小型の生物の大群を従えている。"
 utopia.3120.desc_machine: "シュラウドの奥深くで、 何かの存在を感知した。 $utopia.3120.desc_suffix$"
 utopia.3120.desc_default: "シュラウドの奥深くで、 突然ある存在が感じられるようになった。 $utopia.3120.desc_suffix$"
 utopia.3130.name: "バウンドレス・サンズ"
 utopia.3130.desc: "果てしない砂漠が我々の前に広がった。 ここには来たことがある。\n\n§H「シャラクル・ミレム・ズナク？」§!\n\n砂の中から何かが現れたが、 よく見えない。\n\n§H「ザラビ、 メラスク」§!\n\nその言葉は雷のようにだしぬけに、 彼らの口から意図せず轟いた。 我々は答えざるを得ない。"
 utopia.3130.a: "シャシュカ・マラク。"
 utopia.3130.b: "ティリト・ナリ・ダスマラ！"
 utopia.3130.c: "クナク・デキラク。"
 utopia.3140.name: "群れ"
 utopia.3140.desc_common: "我々の存在の本質が露になった。 我々のものと同じような何千もの銀河が広がる多元宇宙は、 終わりのない争いのサイクルに囚われている。\n\nそれは始まり、 終わり、 そして再び始まる。 そのたびに何兆もの"
 utopia.3140.desc_suffix: "§H「その通りだ」§!声がささやく。 §H「そして、これは永遠に続くのだ」§!"
 utopia.3140.desc_default: "突然、 痛みを伴う一瞬の覚醒で、 $utopia.3140.desc_common$命が生死の境をさまよう。\n\n$utopia.3140.desc_suffix$"
 utopia.3140.desc_machine: "突然、 驚くほど明晰な瞬間に、 $utopia.3140.desc_common$変数が生死の境をさまよう。\n\n$utopia.3140.desc_suffix$"
 utopia.3150.name: "滅びの声"
 utopia.3150.desc: "我々はいま、 数百、 数千光年の距離から自分たちの銀河を見下ろしている。 超能力エネルギーの流れが前触れもなしに、 無数の星々に向けて信じがたい速度で我々を突き落とす。 落ちていく先の宙域は、 没落した帝国の1つ――[fallen_empire.GetName]のものだ。\n\n星々が飛び去り、 惑星群がそれに続き、 やがて視界は[fallen_empire.GetSpeciesName]の街並みに落ち着いた。 空に向かって伸びる途方もない尖塔の数々は、 我々より何世代も進んだ反重力技術によって支えられているのだ。 エネルギーの流れは我々を尖塔へと導く。 そして壁をいくつも通過して、 大きな会議室のような部屋にたどりついた。 [fallen_empire.GetSpeciesNamePlural]が2人、 宙に浮かぶ座り心地の良さそうな無重力チェアに腰掛け、 柔らかい声で会話している。\n\n彼らは我々には気付いていなかった。"
 utopia.3150.a: "§Y彼らの心に入り込み、 秘密を探るのだ。§!"
 utopia.3151.name: "§G技術的秘密§!"
 utopia.3151.v1.desc: "$utopia.3151.a.desc$\n\n$utopia.3151.1.desc$\n\n$utopia.3151.b.desc$\n\n$utopia.3151.4.desc$\n\n$utopia.3151.c.desc$"
 utopia.3151.v2.desc: "$utopia.3151.a.desc$\n\n$utopia.3151.2.desc$\n\n$utopia.3151.b.desc$\n\n$utopia.3151.5.desc$\n\n$utopia.3151.c.desc$"
 utopia.3151.v3.desc: "$utopia.3151.a.desc$\n\n$utopia.3151.3.desc$\n\n$utopia.3151.b.desc$\n\n$utopia.3151.6.desc$\n\n$utopia.3151.c.desc$"
 utopia.3151.a.desc: "[fallen_empire.GetSpeciesNamePlural]は明らかに政府の高官であり、 国家の問題について議論を交わしている。 ゆっくりと、 だが確実に視界は彼らへと重なっていき、 彼らの操る異星語が徐々に我々にも理解できる言葉に変わっていく。"
 utopia.3151.b.desc: "[fallen_empire.GetSpeciesNamePlural]2人の精神の輝きは圧倒的だ。 彼らの精神は花のように開いて露わになり、 容易にそのなかへ入ることができる。"
 utopia.3151.c.desc: "あそこだ。 ロックされていないコンピュータからファイルをコピーするかのように、 彼らの心の奥底から極秘の技術を盗み出した。 それでも[fallen_empire.GetSpeciesNamePlural]は、 自らの心の内で行われた盗難に気づかずにいる。"
 utopia.3151.1.desc: "§H「……正気ではないな。 長年維持してきた生活水準を、 一時的にでも失うことを市民が受け入れるなどと彼女が考えているのなら、 それは……」§!"
 utopia.3151.2.desc: "§H「……不名誉なことだ。 未熟な種族どもが、 我々の技術に対する我々自身の理解度を疑うようになったらどうなるか、 想像してみたまえ！  そうなれば……」§!"
 utopia.3151.3.desc: "§H「……はますます力を増している。 評議会の一部は理解してくれているが、 もし我々が必要な手を打たなければ……」§!"
 utopia.3151.4.desc: "§H「……評議会がどう言おうと構わん。 あの成り上がり者どもは我々より数千年は遅れている上に、 連中のみすぼらしい艦隊など、 ハイラックスヒトカゲの前のガズリアバエに等しい。 そんな必要は……」§!"
 utopia.3151.5.desc: "§H「……懲罰的行動など必要ないと、 まだ考えているのか。 彼らは若くて不注意かもしれないが、 我々にだってそういう時代はあった。 彼らにはまだ時間がある……」§!"
 utopia.3151.6.desc: "§H「……強くなりすぎる前に、 若い種族の芽をつんでおくべきかもしれん。 彼には同意せざるを得ないが、 評議会はもう遅すぎると感じている……」§!"
 utopia.3152.name: "聞かれざる秘密"
 utopia.3152.desc: "この[fallen_empire.GetSpeciesNamePlural]は明らかに要職に就いている人物で、 国家的問題について議論しているのだ。 彼らの聞き慣れない言葉を徐々に理解できるようになるにつれて、 視界は彼らの頭上にゆっくりとだが確実に近づいていった。\n\n突然、 異星人たちが言葉を切り、 じっと耳をすませた。\n\n§H「感じるか？」\n\n「ああ。 誰かが見ているな」§!\n\n彼らは室内を調べ、 やがて2人ともまっすぐに我々を見据えた。\n\n§H「驚いたな。 サイオニック探査体か」§!\n\n§H「[Root.GetSpeciesName]のもののようだ。 すぐにトランスプレイナー・シールドを起動しろ」§!\n\nそこで視界は急に消えた。"
 utopia.3153.desc: "[Root.GetSpeciesNamePlural]よ。\n\n我らの指導者たちの心に対する邪悪な侵入、 気づかれぬとでも思ったか。\n\n相応の報いを受けてもらうぞ。"
 utopia.3153.a: "せ……説明させてくれ！"
 utopia.3153.b: "これには完璧に論理的な説明がある……"
 utopia.3160.name: "虚空の閃き"
 utopia.3160.desc: "小さな、 瞬く星がシュラウド内で実体化した。 それは凄まじい速度で我々を掠めて飛んでいき、 一瞬だけ未知の設計の異星船として姿を見せた。 そしてそれは、 サイキックエネルギーの雲のなかへ、 現れた時と同じくらい素早く去っていった。\n\nこんなことがありうるのか？  シュラウドに物理的に侵入し、 通常空間のまったく別の場所に脱出するなどということが？"
 utopia.3160.a: "§Yしばらく待ってみよう。§!"
 utopia.3161.desc: "突然また別の瞬く星が現れたが、 今度は心の準備ができていた。 それは我々の銀河で見られるものとは似ても似つかない、 異質な船だった。 船が我々を掠めて飛び去るそのとき、 我々は乗組員の精神の輝きを感じ、 そして彼らの秘密を手に入れた。\n\nPSIジャンプドライブ。 なんと輝かしい。"
 utopia.3161.name: "§GPSIジャンプドライブ§!"
 utopia.3162.desc: "突然また別の瞬く星が現れたが、 今度は心の準備ができていた。 それは我々の銀河で見られるものとは似ても似つかない、 異質な船だった。 船が我々を掠めて飛び去るそのとき、 我々は乗組員の精神の輝きと一体化しようとしたが、 彼らの知性はこれまでに我々が遭遇した何よりも暗く、 異質なものだった。\n\n我々は彼らの船から弾き出されただけでなく、 その乱暴な拒絶によってシュラウドからも追い出されてしまった。 我々の船の亜光速航行速度が一時的に低下した。"
 utopia.3170.name: "封鎖された存在"
 utopia.3170.desc: "シュラウドのかすかな反響を追っていくと、 ある種の強力なサイオニック・シールドの背後に身を隠す精神体に遭遇した。\n\n§H立ち去れ。§!"
 utopia.3170.a: "§Yシールドの突破を試みる§!"
 utopia.3171.name: "§Gサイオニック・シールド§!"
 utopia.3171.desc_suffix: "しかし、 シールドの突破を通して、 同様の力場を生成する方法を学んだ。 この技術を改良できれば、 宇宙船全体を包み込むほどの巨大なサイオニック・シールドを形成できるかもしれない。"
 utopia.3171.desc_machine_gestalt: "これほどシュラウドの奥深くまで足を踏み入れたのだ。 今さら引き返すわけにはいかない。 集団の超能力を集中させた結果、 シールドに一瞬覗き込めるほどの大きさの裂け目を作ることができた。\n\nシールドの向こう側にあるものは、 現在の我々の理解を超えており、 複数のサイオニック・プロセッサを圧倒している。 $utopia.3171.desc_suffix$"
 utopia.3171.desc_organic: "シュラウドの奥深くまで足を踏み入れたのに、 今さら引き返すわけにはいかない。 我々のテレパスたちが超能力をすべて注ぎ込んだ後、 何人かが覗き込むのに十分な大きさの裂け目をシールドに作ることができた。\n\nシールドの向こう側でテレパスたちが何を見たのかはわからないが、 それは彼らの精神を永久に狂わせるには十分だった。 彼らの犠牲は無駄ではなかった。 $utopia.3171.desc_suffix$"
 utopia.3172.name: "シールド未突破"
 utopia.3172.desc_machine_gestalt: "我々の[GetTelepathPlural]は、 これほど奥深くシュラウドに踏み込んだことで、 すでに過負荷状態にあったため、 シールドを突破するのに必要なサイオニック・エネルギーを送ることに失敗した。 我々の失敗には次のような通信が返ってきた。"
 utopia.3172.desc_machine_non_gestalt: "我々の[GetTelepathPlural]は、 これほど奥深くシュラウドに踏み込んだことで、 すでに過負荷状態にあったため、 シールドを突破するのに必要なサイオニック・エネルギーを送ることに失敗した。 この失敗が精神を刺激したようだ。"
 utopia.3172.desc_organic_gestalt: "我々の[GetTelepathPlural]は、 これほど奥深くシュラウドに踏み込んだことで、 すでに疲弊していたため、 シールドを突破するのに必要なサイオニック・エネルギーを送ることに失敗した。 我々の失敗には次のような通信が返ってきた。"
 utopia.3172.desc_organic_non_gestalt: "我々の[GetTelepathPlural]は、 これほど奥深くシュラウドに踏み込んだことで、 すでに疲弊していたため、 シールドを突破するのに必要なサイオニック・エネルギーを送ることに失敗した。 この失敗が精神を刺激したようだ。"
 utopia.3180.name: "未来への待望"
 utopia.3180.desc.intro: "我々が知っている時間の概念は、 シュラウドでは異質なものだ。 ここでは何世紀にも感じられる時間も、 現実世界ではほんの数時間、 あるいは数分に過ぎないこともある。"
 utopia.3180.desc_gestalt: "$utopia.3180.desc.intro$ どこを調べればいいかを分かっていれば、 予知能力はまだ我々の手の届くところにあるかもしれない。\n\nこのような能力は我々の集合体にとってリスクを伴うため、 進めるのであれば、 慎重を期さなければならない。"
 utopia.3180.desc_machine_non_gestalt: "$utopia.3180.desc.intro$ どこを調べればいいかをわかっていれば、 未来を垣間見ることさえ可能だ……\n\n予知の概念は、 我々のサイオニック・プロセッサに過負荷をかけるリスクを伴うため、 慎重に進めなければならない。"
 utopia.3180.desc_organic_non_gestalt: "$utopia.3180.desc.intro$ どこを調べればいいかをわかっていれば、 未来を垣間見ることさえ可能だ……\n\n予知能力は、 テレパスに狂気を招く確実な方法のひとつであるため、 慎重を期さなければならない。"
 utopia.3180.a: "§Yしばし瞑想の時間だ。§!"
 utopia.3181.desc_gestalt: "シュラウドとの限定的な予知能力の接続は、 ユニット過負荷のリスクを冒すことなく維持できるものの、 確率データの大量流入はあまりにも圧倒的であり、 実用的ではない。\n\nしかし、 我々の研究ノードはこのデータの小さな応用方法を発見し、 それを我々の艦隊に適用して戦闘効率を向上させている。"
 utopia.3181.desc_machine_non_gestalt: "シュラウドとの限定的な予知能力の接続は、 ユニット過負荷のリスクを冒すことなく維持できるものの、 確率データの大量流入はあまりにも圧倒的であり、 実用的ではない。\n\nそれでも、 このデータを解釈するためのデジタルインターフェースを考案できれば、 宇宙船の戦闘用コンピュータの性能向上に応用できる可能性がある……"
 utopia.3181.desc_organic_non_gestalt: "シュラウドとの予知接続は、一時的なものであれば狂気に陥る危険を冒すことなく維持できるが、 流れ込んでくる蓋然性データが膨大すぎて実用には向かない。\n\nそれでも、 もしこのデータを翻訳できるデジタルインターフェースを開発できれば、 わが艦隊の戦闘コンピュータの性能を改善するのに使えるかもしれない……"
 utopia.3181.name: "§G予知型インターフェース§!"
 utopia.3182.name: "§Rシュラウドの狂気§!"
 utopia.3182.desc_gestalt: "懸念されていた通り、 過去と未来の両方に存在する、 計り知れないほど多くの選択肢と可能性を理解しようと試みた結果、 我々のサイオニックドローンに緊張病が多発した。\n\nこれにより、 彼らはオーバーマインドから切り離され、 目的を失った。 シュラウドに再び到達することを望むのであれば、 これらの欠陥のある殻を再利用し、 集合体の力を回復させる必要がある。"
 utopia.3182.desc.non_gestalt.1: "過去にも未来にも存在する、 計り知れないほど多くの選択肢と可能性だった。\n\nあらゆるバリエーションとシナリオが、 違いの大きさはあれど、 彼らの[GetSpeciesBrainPlural]の中で延々と繰り返されている。 彼らは永続的な緊張病状態に陥っている。\n\n"
 utopia.3182.desc.non_gestalt.2: " 新たな[GetTelepathPlural]だ。 再びシュラウドに到達するために必要なサイオニックの力を集めるには、 しばらく時間がかかるだろう。"
 utopia.3182.desc_machine_non_gestalt: "予想通り、 我々のサイオニック・プロセッサは理解できなかった。 それは、$utopia.3182.desc.non_gestalt.1$我々が構築するべきは、$utopia.3182.desc.non_gestalt.2$"
 utopia.3182.desc_organic_non_gestalt: "恐れていた通り、 狂気がテレパスを襲った。 彼らの心が一斉に開かれたのは$utopia.3182.desc.non_gestalt.1$我々は召集すべきは$utopia.3182.desc.non_gestalt.2$"
 utopia.3190.name: "エネルギー体"
 utopia.3190.desc.intro: "我々はシュラウドの中に、 これまでに見たことのない規模のサイオニック・エネルギーが集中している小さな空間を発見した。"
 utopia.3190.desc_gestalt: "$utopia.3190.desc.intro$ このようなサイオニック・エネルギーをうまく利用できれば、 大した影響もなく集合体の中で拡散するだろう。 しかし、 このエネルギーを直接伝達する導管として単一の「選ばれた」ドローンを指定すれば、 その過程で途方もない力を得ることができるかもしれない。\n\n単独の形態が、 これほど大量のエネルギーを致命的な影響なく処理できるかは不明だ。 我々はいくつかの候補を選出した。"
 utopia.3190.desc_non_gestalt: "$utopia.3190.desc.intro$ この生のエネルギーのポケットを利用することに成功した[GetPsychicNoun]は、 非常に強力になるだろう……しかし、 一個人に十分な量しかなく、 リスクが伴う。\n\nこのエネルギーのポケットを利用するために必要超能力を有し、 生き残る希望を持っている者は[Root.GetName]全体でもわずかしかいない。 一体誰にするべきか？"
 utopia.3190.1.a: "§G[leader_1.GetTitle] [leader_1.GetName]§!"
 utopia.3190.2.a: "§Y[leader_1.GetTitle] [leader_1.GetName]§!"
 utopia.3190.3.a: "§R[leader_1.GetTitle] [leader_1.GetName]§!"
 utopia.3190.1.b: "§G[leader_2.GetTitle] [leader_2.GetName]§!"
 utopia.3190.2.b: "§Y[leader_2.GetTitle] [leader_2.GetName]§!"
 utopia.3190.3.b: "§R[leader_2.GetTitle] [leader_2.GetName]§!"
 utopia.3190.1.c: "§G[leader_3.GetTitle] [leader_3.GetName]§!"
 utopia.3190.2.c: "§Y[leader_3.GetTitle] [leader_3.GetName]§!"
 utopia.3190.3.c: "§R[leader_3.GetTitle] [leader_3.GetName]§!"
 utopia.3190.1.d: "§G[leader_4.GetTitle] [leader_4.GetName]§!"
 utopia.3190.2.d: "§Y[leader_4.GetTitle] [leader_4.GetName]§!"
 utopia.3190.3.d: "§R[leader_4.GetTitle] [leader_4.GetName]§!"
 utopia.3191.name: "[GetChosenName]"
 utopia.3191.desc_organic_non_gestalt: "$utopia.3191.desc_machine_non_gestalt$ 我らの魂に精霊の慈悲があらんことを。"
 utopia.3191.desc_machine_non_gestalt: "……完了した。 サイオニック・エネルギーのポケットが空になり、 その力が[chosen_leader.GetName]に移されると、 シュラウド全体が震えているように見えた。\n\n銀河全体の歴史の中でも、 これほどのサイオニックの力を授かった者はほんの一握りしかいない。"
 utopia.3191.desc_gestalt: "我々はサイオニック・エネルギーのポケットの力のすべてを、 指定したターゲットである[chosen_leader.GetName]に送り込むことに成功した。\n\nそうでなければ、 集合体という海の一滴に過ぎなかったものが、 [chosen_leader.GetName]がすべての[Root.Species.GetName]の利益のためにそれを使用するようになった今、 [Root.GetName]の強力な道具として機能するようになった。"
 utopia.3192.name: "§R指導者の死§!"
 utopia.3192.desc_gestalt: "ポケット内の膨大なサイオニック・エネルギーが[chosen_leader.GetName]に注ぎ込まれると、 シュラウド全体が震える。\n\nしかし、 案の定そのような力は単一の存在の手には負えない。 [chosen_leader.GetName]の肉体がテレパシーエネルギーの爆発的な噴出を引き起こし、 彼らの声を[GetBrainName]からその声を切り離した。"
 utopia.3192.desc_non_gestalt: "ポケット内の膨大なサイオニック・エネルギーが[chosen_leader.GetName]に転送され、 シュラウド全体が震えているように見えた。\n\n残念ながら、 [chosen_leader.GetHerHis][GetSpeciesBrain]はそのストレスに対処できなかった。 おそらく、 そのような力は物理的な存在では制御できないのだろう。 [chosen_leader.GetName]は、 サイオニック・エネルギーの大爆発に巻き込まれ、 近くにいたすべての人も死亡した。"
 utopia.3193.name: "§R超能力による変容§!"
 utopia.3193.desc.intro: "ポケット内の膨大なサイオニック・エネルギーが[chosen_leader.GetName]に転送され、 シュラウド全体が震えているように見えた。\n\n転送は成功したが、 [chosen_leader.GetName]は「変容」してしまったのだ……"
 utopia.3193.desc.outro: "\n\n§H取るに足らぬ者ども……私に……一体……何をした……§!\n\n§Hお前たちは……その傲慢さの……代償を……払うことになる……§!"
 utopia.3193.desc_gestalt: "$utopia.3193.desc.intro$ 彼らは集合体から切り離され、 まったく異質な存在がその形態に宿り、 支配している。$utopia.3193.desc.outro$"
 utopia.3193.desc_non_gestalt: "$utopia.3193.desc.intro$ 彼らの体には純粋なエネルギーでできた構造体が宿り、 憑依している。$utopia.3193.desc.outro$"
 utopia.3200.name: "ビジョン"
 utopia.3200.1.desc_organic: "この空間には力が満ち満ちている。 少し休んでいこう。"
 utopia.3200.1.desc_machine: "この空間には力が満ち満ちている。 少し充電させてくれ。"
 utopia.3200.2.desc: "たどってきた道が突然行き止まりになった。 この先には進めない。"
 utopia.3200.3.desc_organic: "何かが我々に語りかけてきている。 素晴らしい何かが。"
 utopia.3200.3.desc_machine: "何かが我々に語りかけてきている。 驚くべき何かが。"
 utopia.3200.4.desc: "我々には理解できない理由で、 我々はこのシュラウドのエネルギーの脈に引き寄せられた。 なぜだ？"
 utopia.3200.5.desc.outro: "シュラウドの中で過ごした永遠を思い返すと、 恐怖が我々を襲う。 しかし、すぐに踏みとどまり、 恐怖は消えていった。"
 utopia.3200.5.desc_organic: "ほんの一瞬、 我々は自我を見失った。 $utopia.3200.5.desc.outro$"
 utopia.3200.5.desc_machine: "ほんの一瞬、 我々は迷い、 高まる不安感が押し寄せた。 $utopia.3200.5.desc.outro$"
 utopia.3200.6.desc.intro: "シュラウドの奥深くへと進むと、 精霊の群れが我々の周りを数時間にわたって舞い踊る。 彼らは通常の空間では決して見ることのできない、 眩い色で輝いている。\n\n"
 utopia.3200.6.desc_organic: "$utopia.3200.6.desc.intro$ この光景は楽しめるが、 気づくと、我々は追い込まれていた。"
 utopia.3200.6.desc_machine: "$utopia.3200.6.desc.intro$ この光景は魅力的だが、 気づくと、我々は追い込まれていた。"
 utopia.3200.7.desc: "ここには完璧な結晶の細片が漂い、 思い思いの方向にゆっくりと回転していた。 近づくと、 細片は無数に砕け散った。"
 utopia.3200.8.desc_organic: "[Root.GetSpeciesName]の死体が1つ、 前方の空間でうごめいている。 腐敗したその亡骸は甲高い声を放つと、 目の前で消滅した。"
 utopia.3200.8.desc_machine: "砕け散った[Root.GetSpeciesName]の殻が、 前方の空間でうごめいている。 破壊された殻は甲高い声を放つと、 目の前で消滅した。"
 utopia.3200.9.desc.intro: "これが本当に起こっていることなのか、確信が持てない。本当にシュラウドの中にいるのか、それとも"
 utopia.3200.9.desc_hive: "$utopia.3200.9.desc.intro$我々は急性の感覚障害に陥っているのだろうか？"
 utopia.3200.9.desc_organic_non_hive: "$utopia.3200.9.desc.intro$我々の中の誰かが急性の精神崩壊に陥っているのだろうか？"
 utopia.3200.9.desc_machine_non_hive: "$utopia.3200.9.desc.intro$我々は深刻な処理障害に陥っているのだろうか？"
 terraforming_candidate_category: "太古の生命の痕跡"
 terraforming_candidate_category_desc: "この不毛で生命の存在しない惑星には、 かつて生物圏を保持していた痕跡がある。"
 MESSAGE_TERRAFORM_FOUND_TITLE: "$anomaly.2575.name$"
 MESSAGE_TERRAFORM_FOUND_DESC: "[From.GetName] はテラフォーミング候補に認定された。 [From.GetPlanetMoon]は将来の植民地化対象として追跡される。"
 anomaly.2575.name: "テラフォーム候補を発見"
 anomaly.2575.desc.intro: "[From.GetName]を詳細に調査した結果、 はるか昔には生命が存在したかもしれないとわかった。 極冠や[From.GetPlanetMoon]の地下には膨大な量の氷がある。 峡谷群の存在は、 かつて液体の水が流れていたことを示している。"
 anomaly.2575.desc.1: "$anomaly.2575.desc.intro$\n\nこの[From.GetPlanetMoon]のテラフォーミングは可能だが、 現実的な期間でこの大事業を完了するための技術を持ち合わせていない。"
 anomaly.2575.desc.2: "$anomaly.2575.desc.intro$\n\n必要となるエネルギーコストは膨大だが、 [From.GetPlanetMoon]に再び生命が住めるよう、 徐々にテラフォーミングするための技術はある。"
 anomaly.2575.desc.3: "$anomaly.2575.desc.intro$\n\n残念ながら、 星系内の§Yダイソン・スフィア§!が、 この惑星を復元する可能性をすべて奪ってしまった。"
 anomaly.2575.a: "いずれ再び目覚めさせることができるだろう。"
 utopia.3300.name: "シュラウド内の存在"
 utopia.3300.desc: "シュラウドのこの一帯を占領している、 なんらかの存在がいる。 さまざまな精神体に出会ってきたが、 これはそれらとは異なる、 極めて強力な……はるかに古い存在だ。\n\n我々にはまだ気づいていないらしい。 おそらく眠っているのだろう。 あるいは、 我々など眼中にないのかもしれない。\n\n立ち去ったほうがいいだろう。"
 utopia.3300.1.a: "§Gこの存在との意思疎通を試みる§!"
 utopia.3300.1.b: "§Yこの存在との意思疎通を試みる§!"
 utopia.3300.1.c: "§Rこの存在との意思疎通を試みる§!"
 utopia.3300.1.d: "§G[chosen_one.GetName]がこの存在に話しかける§!"
 utopia.3301.name: "§R拒絶された交流§!"
 utopia.3301.desc: "近づいていくと、 それが目覚めたのが感じられた。 完全に我々に注意を向けている。 邪魔されたことを喜んではいないようだ。\n\nテレパスたちを強力なエネルギーの波が襲い、 何名かは大いに苦しみ、 何名かは意識不明となった。 いったんシュラウドから退却せざるを得ない。"
 utopia.3302.desc: "近づいていくと、 それが目覚めたのが感じられた。 完全に我々に注意を向けている。 邪魔されたことを喜んではいないようだ。\n\nテレパスたちは莫大なサイキック・エネルギーの波に襲われて意識を失った。 目覚めてみると、 1名がいなくなっていた。 §Y[leader_to_kill.GetName]§!は姿を消し、 立っていた場所には小さな裂け目にエネルギーの痕跡が残っているだけだった。 まるで、 あの存在が我々の世界に手を伸ばし、 [leader_to_kill.GetName]をシュラウドに引きずり込んだかのように……もっとも、 その理由や目的は誰にもわからないが。\n\nどんな目的があったにせよ、 [leader_to_kill.GetName]には二度と会えないだろう。"
 utopia.3304.name: "契約の提案"
 utopia.3304.desc.start.default: "我々がその存在に手を伸ばすと"
 utopia.3304.desc.start.shroud: "我々がシュラウドに手を伸ばすと"
 utopia.3304.desc.common: "テレパスたちの心は、 声の合唱で満たされた。 最初はかすかな囁き声に過ぎなかったが、 その不協和音は次第に激しさを増し、 千もの声が一体となって語りかけてくる。\n\n声は自らを$whisperers_in_the_void_color_article$と名乗る。 合唱の個々のメンバーが名乗りを上げる。 秘密の囁き、 さらに"
 utopia.3304.desc.throne.default: "玉座の影"
 utopia.3304.desc.throne.shroud: "$the_vacant_throne$"
 utopia.3304.desc.end: "操り人形の主と続き、 その数は非常に多く、 皆が囁く者たちの合唱に加わっている。 それ、いや、彼らは人間同士が密かに囁き合うあらゆる知識を知っていると主張し、 その秘密の一部を我々と共有しようと申し出た……\n\n§H我々がそれを、 意識の中に受け入れるのなら。§!\n\nささいな代償だと彼らは言う。 我々は彼らの存在にほとんど気づかないだろうと。\n\n彼らの口調には切迫感がある。"
 utopia.3304.desc: "$utopia.3304.desc.start.default$、 $utopia.3304.desc.common$ $utopia.3304.desc.throne.default$$utopia.3304.desc.end$"
 utopia.3304.desc.shroud: "$utopia.3304.desc.start.shroud$、 $utopia.3304.desc.common$ $utopia.3304.desc.throne.shroud$$utopia.3304.desc.end$"
 utopia.3304.a: "§Y虚無の囁き手と契約を結ぶ§!"
 utopia.3305.desc: "その存在は、 温かく親しみを込めて迎えてくれる。 それは言葉ではなく、 ビジョン、 概念、 アイデアで語りかける。 それは我々のテレパスの心に滑らかに、 そして穏やかに、 まるで最初からそこにあったかのように染み込んでいく。 無数の映像が、 彼らの目の前に飛び交う。\n\nその存在は、 $the_composer_of_strands_color_article$として知られ、 我々の有機的な形態を好奇心を持って見ている。 それは我々に、 それらをいかに成長させ、 変化し、 改善し、 進化させるかを示してくれる。\n\n§H我々がそれを肉体に取り込めば。§!\n\nそれは辛抱強く、 愛情深く我々の答えを待っている。 まるで溺愛する親がお気に入りの子を待つように。 その背後には、 双子の傀儡の開眼者がいる。 それは我々の有機的な精神には興味がない。 魂を創造し、 回路を精神に融合させることを切望している。\n\n作曲家は我々の返事を待っている。"
 utopia.3305.a: "§Y螺旋の作曲家と契約を結ぶ§!"
 utopia.3306.desc.1: "我々がその存在に手を伸ばすと、大きな飢えを感じる。 "
 utopia.3306.desc.2: "その存在は時間も言葉も無駄にしない。 それは$the_eater_of_worlds_color_article$であり、 我々を貪り食うことを望んでいる。\n\nただし、 それは我々の一部のみである。 余裕のある範囲内だ。 その代わりに、 我々に偉大な力を与えてくれる。 飢えと怒りを教え、 どんな敵にも打ち勝つ超能力兵器へと仕上げる。\n\n§H我々がその餌食になれば。§!"
 utopia.3306.desc.3: "$utopia.3306.desc.2$\n\nかの存在は、 すぐにでも動き出したくて待ちきれない様子だ。"
 utopia.3306.desc: "$utopia.3306.desc.1$ $utopia.3306.desc.3$"
 utopia.3306.a: "§Y世界を喰らうものと契約を結ぶ§!"
 utopia.3307.desc: "我々がその存在を探し出す前に、 それは我々に手を伸ばす。 その思考は我々のテレパスたちの心に絡みつき、 甘美な言葉で誘惑して丸め込む。 それは$the_instrument_of_desire_color_article$であり、 富や権力、 名声といった我々が今まで望んでいたものすべてを与えてくれる。 そしてこれから望むすべてを。\n\n代償？  些細なものだ。 さながら入場料のようなもの。 それは我々の最善だけを望んでいる。 我々を助け、 導き、 野望と夢を指揮する。\n\n§H我々が心から受け入れることができれば。§!\n\nそれは我々が応じることを確信している。 承諾しないことなどどうしてできようか。"
 utopia.3307.a: "§Y欲望の道具と契約を結ぶ§!"
 utopia.3308.desc: "その存在は我々を待っていた。 それは§R円環の終わり§!といい、 つねに我々を待っていたのだ。 テレパスたちが突然、 十数人の声による完璧なコーラスで一斉に話しはじめた。 §R「まだお前たちの時ではない」§!しばしの間があく。 §R「だが、 その逆もまた然り」§!\n\nそれしか言わなかったが、 取引条件が提示された――それだけは確信した。 計り知れないほどの権力、 知識、 富が我々の手に入るというのだ。\n\n§R我々が「終わり」をもたらすだけで、 だ。§!"
 utopia.3308.a: "§R円環の終わりと契約を結ぶ§!"
 utopia.3310.name: "契約締結"
 utopia.3320.name: "円環の終わり：§R報い§!"
 utopia.3320.desc.intro: "我々の時間は終わった。 束の間、 我々は$end_of_the_cycle_color_article$から与えられた強大な力の恩恵を受けた。 支払うべき代償があることは承知の上だったが、 それは我々が耐えられるものであるか、 あるいは支払いを回避する方法を見つけることができると考えていた。\n\n我々には耐えることも、 回避することもできなかった。\n\n我々が支払った代償はすべてだった。 一瞬にして[Root.GetName]は……消えた。 かつて栄華を誇った植民地があった場所には、 今や廃墟だけが残されている。 かつて強大な艦隊が虚空を渡っていた場所には、 静寂と残骸だけが広がっている。 すべては終焉に飲み込まれた。 すべては§Hシュラウド§!に奪われた。"
 utopia.3320.desc.outro: "[former_capital.GetName]の近くに実体化した。 我々の[GetPsychicNounPlural]の意識を貪り食ったことで強大な力を得たそれは、 さらなる獲物を求めて銀河を彷徨っている。"
 utopia.3320.desc.a.1.gestalt: "我々の帝国に残されたのは、 集合体から逸脱し、[GetIndividualPlural]の小さな集団を率いて終焉が定められていない世界に隠れた、 強力な[GetPsychicNoun]である§H[Root.GetRulerName]§!に率いられた亡命者の集団だけだ。"
 utopia.3320.desc.a.1.non_gestalt: "我々の帝国に残っているのは、 これから何が起こるかを予見し、人口の一部を終焉が定められていない世界に隠れるよう導いた、 強力な[GetPsychicNoun]である§H[Root.GetRulerName]§!に率いられた亡命者の集団だけだ。"
 utopia.3320.desc.a.outro: "我々の帝国が一夜にして崩壊しただけでは飽き足らず、巨大なサイオニック的存在が$utopia.3320.desc.outro$"
 utopia.3320.desc.a.gestalt: "$utopia.3320.desc.intro$\n\n$utopia.3320.desc.a.1.gestalt$\n\n$utopia.3320.desc.a.outro$"
 utopia.3320.desc.a.non_gestalt: "$utopia.3320.desc.intro$\n\n$utopia.3320.desc.a.1.non_gestalt$\n\n$utopia.3320.desc.a.outro$"
 utopia.3320.desc.b: "$utopia.3320.desc.intro$\n\n我々の帝国が完全に破壊されただけでなく、 巨大な超能力の存在が[former_capital.GetName]の近くに実体化した。 我々の[GetPsychicNounPlural]の意識を貪り食ったことで強大な力を得たそれは、 さらなる獲物を求めて銀河を彷徨っている。 少なくとも、 我々は自分たちが始めたことの結末を見届けることはないだろう。"
 utopia.3320.opt.a: "我々はなんと怖ろしいことを……"
 utopia.3320.opt.a.shroud.tt: "$BEGINS_EVENT_CHAIN$ §Y$the_reckoning_chain_title$§!"
 utopia.3321.desc.1: "長年にわたり、 我々は§H[From.GetName]§!に何か異変が起きていることは知っていた。 数年前、 彼らの産業や科学、 そして帝国のすべてが突然、 まるで目に見えない力に祝福されたかのように、 突如かつ不可解にも、 その生産性と有効性が大幅に向上したのだ。\n\n結局のところ、 それは祝福というよりも呪いだった。 [From.GetName]は自分たちの未来を差し出し、 今借金の返済期限を迎えた。\n\n一瞬にして[From.GetName]は……消えた。 かつて栄華を誇った植民地があった場所には、 今や廃墟だけが残されている。 かつて強大な艦隊が虚空を渡っていた場所には、 静寂と残骸だけが広がっている。"
 utopia.3321.desc.2: "そして今、 彼らのかつての首都の近くに、 非常に強力なエネルギーが実体化した。"
 utopia.3321.desc.3: "数十年前、 我々は遠方の星系で異常な活動を検出し始めた。 我々の[GetResearchers]は、 動きと放射線の増加が、 異星文明が大規模な生産性ブームを経験していることを示していると理論づけた。 この仮説的な社会との接触をまだ確立していないため、 この理論は未検証のままである。\n\nそれからほぼ瞬時に、 その活動は停止した。 かつて活気に満ちていた宇宙空間は、 今や静寂に包まれている。"
 utopia.3321.desc.4: "現在、 長距離スキャンにより、 同じ遠方の星系で奇妙な現象が検出されている。 報告が信頼できるとすれば、 それは純粋なエネルギーで構成され、 宇宙空間を移動しながら大きな破壊を引き起こしている非常に強力な存在としか言いようがない。"
 utopia.3321.desc.a.contact: "$utopia.3321.desc.1$ 災害は我々の領土内でも発生し、 以前は[From.GetAdj]の支配下にあった世界のいくつかを破壊した。\n\n$utopia.3321.desc.2$\n\nどうやら腹を空かせているようだ。"
 utopia.3321.desc.a.no_contact: "$utopia.3321.desc.3$ まだ解明されていない理由により、 我々の領土内のいくつかの世界も同時に滅亡した。\n\n$utopia.3321.desc.4$"
 utopia.3321.desc.b.contact: "$utopia.3321.desc.1$\n\n$utopia.3321.desc.2$ それは世界から世界へと移動し、 その行く手にあるすべてを破壊する。"
 utopia.3321.desc.b.no_contact: "$utopia.3321.desc.3$\n\n$utopia.3321.desc.4$"
 utopia.3321.opt.a.contact: "彼らは一体何をしたんだ？"
 utopia.3321.opt.a.no_contact: "これはどういうことだ？"
 utopia.3325.name: "円環の終わり：§Rシュラウド惑星化§!"
 utopia.3325.desc.organic: "我々は、 その巨大なエネルギーが§H[Root.GetName]§!を包み込むのを止めることはできなかった。 惑星とそのすべての住民は§Hシュラウド§!に飲み込まれてしまった。"
 utopia.3325.desc.machine: "我々は、 その計り知れないエネルギーが§H[Root.GetName]§!を包み込むのを止めることはできなかった。 惑星とそのすべての住民は§Hシュラウド§!に飲み込まれてしまった。"
 utopia.3325.opt.a.organic_non_gestalt: "恐ろしい！"
 utopia.3325.opt.a.machine_or_gestalt: "大惨事だ。"
 utopia.3331.name: "虚無の囁き手：§R薬物乱用§!"
 utopia.3331.desc.intro: "§H囁き手§!が我が国民に授けた秘密は、 非常に有用ではあるものの"
 utopia.3331.desc: "$utopia.3331.desc.intro$、 中には大きな不安をもたらすものもある。 あまりにも多くのことを知りすぎることで生じたストレスに対処するのは困難であり、 §H[leader_target.GetTitle][leader_target.GetName]§!をはじめ、 多くの人々が対処法として薬物乱用に走るようになった。"
 utopia.3331.opt.a: "それは残念だ。"
 utopia.3332.name: "虚無の囁き手：§R自殺§!"
 utopia.3332.desc.intro: "$utopia.3331.desc.intro$、 特に重要な個体と共有されたものの中には、 大きな不安をもたらすものもある。§H[leader_target.GetTitle][leader_target.GetName]§!"
 utopia.3332.desc.organic_non_gestalt: "$utopia.3332.desc.intro$はストレスに耐え切れず、 [leader_target.GetHerHis]自身の命を絶った。"
 utopia.3332.desc.machine_non_gestalt: "$utopia.3332.desc.intro$は、 これらの詳細を効果的に処理することができず、 自滅し、 永久にオフラインになった。"
 utopia.3332.desc.gestalt: "§H囁き手§!が我々に授けた秘密は、 非常に有用ではあるものの、 中には不安を掻き立てる個人主義的性質を持つものもある。 このような逸脱的な思想に長期間さらされた結果、 §H[leader_target.GetTitle][leader_target.GetName]§!は集合体から分離し、 朽ち果てた殻だけを残して去ってしまった。"
 utopia.3332.opt.a.non_gestalt: "悲劇だ。"
 utopia.3332.opt.a.gestalt: "再利用しよう。"
 utopia.3333.name: "虚無の囁き手：§R精神負荷§!"
 utopia.3333.desc.intro: "§H囁き手§!が我々の[GetBrainName]と交信することを許可して以来、 我々は集合体の中に不穏な逸脱行為が増加していることに気づき始めた。"
 utopia.3333.desc.gestalt: "$utopia.3333.desc.intro$\n\nドローンは、 標準的な手順を遂行している間に互いに攻撃し合い、 ほとんど個人主義的な程度までアメニティの使用に耽溺している。\n\n治安を回復したいのであれば、 影響を受けた器を浄化する必要がある。"
 utopia.3333.desc.outro: "説明のつかない暴力行為が増加している。 これらの問題の多くは対処可能だったが、 最近では手に負えないほどエスカレートしている。 帝国全土で急進派が出現し、 互いに激しく衝突している。"
 utopia.3333.desc.organic_non_gestalt: "§H囁き手§!を我々の精神に招き入れて以来、 超能力者の間で精神疾患や$utopia.3333.desc.outro$"
 utopia.3333.desc.machine_non_gestalt: "§H囁き手§!を我々の精神に招き入れて以来、 超能力者の間で不規則なプログラムエラーや$utopia.3333.desc.outro$"
 utopia.3333.opt.a: "治安を回復しなければ！"
 utopia.3334.name: "虚無の囁き手：§R精神異常§!"
 utopia.3334.desc.gestalt: "$utopia.3333.desc.intro$\n\nさらに悪いことに、 我々の団結が崩れ始めている。 超能力による個人主義的逸脱の増加により、 集合体は効果的にコミュニケーションを取れなくなっている。\n\n治安を回復したいのであれば、 これらの過剰な行動を我々自身から排除する必要がある。"
 utopia.3334.desc.outro: "説明のつかない暴力行為が増加している。 これらの問題の多くは対処可能だったが、 最近では手に負えないほどエスカレートしている。 帝国のあちこちで秘密結社が出現し始めた。 無害なものもあれば、 より邪悪な目的を持つものもあり、 不信感が我々の社会に蔓延している。"
 utopia.3334.desc.organic_non_gestalt: "§H囁き手§!を我々の精神に招き入れて以来、 超能力者の間で精神疾患や$utopia.3334.desc.outro$"
 utopia.3334.desc.machine_non_gestalt: "§H囁き手§!を我々の精神に招き入れて以来、 超能力者の間で不規則なプログラムエラーや$utopia.3334.desc.outro$"
 utopia.3334.opt.a: "恐ろしい！"
 utopia.3335.name: "世界を喰らうもの：§R小腹§!"
 utopia.3335.desc.common: "§H[devoured_leader.GetTitle][devoured_leader.GetName]§!が突如、 超能力活動の痕跡だけを残して姿を消した。"
 utopia.3335.desc.gestalt: "$utopia.3335.desc.common$ どうやら、 $the_eater_of_worlds_color_article$が[devoured_leader.GetHimHer]を貪り食ってしまったようだ。 他のリーダーたちは生かされたようだが、 我々には喰らうものがまたいつ次の贄を求めて戻るかを知る術がない。"
 utopia.3335.desc.non_gestalt: "$utopia.3335.desc.common$ 我々は$the_eater_of_worlds_color_article$によって食い尽くされたと考えている。 我々はなんとかこれを隠蔽したが、 喰らうものがしばらくの間は満足していることを祈るしかない。"
 utopia.3335.opt.a: "ごく小さな代償だ。"
 utopia.3336.name: "世界を喰らうもの：§R空腹§!"
 utopia.3336.desc.intro: "§H喰らうもの§!がまたしても貢物を求めにやってきた。"
 utopia.3336.desc.gestalt: "$utopia.3336.desc.intro$ そして、 §Y[planet_target.GetName]§!の国民の多くを食い尽くした。\n\n喰らうものとの契約の利点は理解しているが、 このような集合体の乱暴な削減は、 混乱と不安の種をまき始めており、 我々により一層の分裂を生み出している。"
 utopia.3336.desc.non_gestalt: "$utopia.3336.desc.intro$ そして、 §Y[planet_target.GetName]§!の国民の多くを食い尽くした。\n\n我々は喰らうものとの契約を一般市民には秘密にしてきたが、 この惑星に残った人々は当然のことながら、 これらの「不可解な」失踪事件に対して恐怖と怒りを感じており、 政府に説明を求めている。"
 utopia.3336.opt.a: "残念だが、 やむを得ないことだ。"
 utopia.3337.name: "世界を喰らうもの：§R飢餓§!"
 utopia.3337.desc: "世界を喰らうものがまたしても貢物を求めにやってきた。 今度は単に人口の一部を食らうだけでは飽き足らず、 惑星を丸ごと呑み込んだ。 §Y[planet_target.GetName]§!は濃密なサイオニックの霧に包まれ、 大気圏内に進入させた探査機は1機も戻らなかった。 幸いこの惑星は未入植だったものの、 次に餌食になるのが繁栄する植民地の1つかもしれないと思うと、 ぞっとしてしまう。"
 utopia.3337.desc.shadows: "$utopia.3336.desc.intro$ 今度は惑星を丸ごと呑み込んだのだ。\n\n§H[planet_target.GetName]§!は濃密な超能力の霧に包まれ、 大気圏を突破する試みはどれも失敗に終わった。 この惑星は未入植だったものの、 次に餌食になるのが繁栄する植民地であれば、 その結果は深刻なものとなるだろう。"
 utopia.3337.opt.a: "一体いつになったら終わる？"
 utopia.3337.opt.tt: "[shrouded_planet.GetName]が§Y$pc_shrouded$§!に変化した"
 #utopia.3338.name: "Instrument of Desire: §RParticularism§!"
 #utopia.3338.desc: "The desires inflicted upon our people by the Instrument are strong. The people of §Y[planet_target.GetName]§! have become convinced that their own particular customs are of distinct and paramount importance over those of our society as a whole. Alternative political movements are springing up like wildfire, and the political situation on the planet has become unpredictable, to say the least."
 utopia.3338.opt.a: "残念だ。"
 #utopia.3339.name: "Instrument of Desire: §RDeviance§!"
 #utopia.3339.desc: "The desires inflicted upon our people by the Instrument are strong. As if overnight, the population of our empire appear to have turned against both the government and the very traditions of our people, questioning ages-old customs and breaking social taboos. Support for government positions are rapidly dropping, and it seems we may be in for a period of considerable political turmoil."
 #utopia.3339.opt.a: "Terrible!"
 utopia.3340.name: "欲望の道具：§R退廃§!"
 utopia.3340.desc.gestalt: "§H道具§!の影響は[GetBrainName]全体で感じられ、 その異質な欲望は「排他性」、 「退廃」、 「富」といった抽象的な個人主義的概念で我々の集合体を堕落させる。\n\nこうした概念は我々のドローン全体に病を引き起こし、 我々を駆り立てる統一的な目的から逸脱させる原因となる。 我々は自らを取り戻すために、 このような悪徳に溺れる必要があるのかもしれない。"
 utopia.3340.desc.organic_non_gestalt: "§H道具§!によってもたらされた欲望は強烈だ。 わが国民は消費主義と退廃の狂乱に巻き込まれ、 ますます高級な商品、 これまで以上に希少で魅惑的な食品を求めるようになった。 すでにいくつかの商業地区では暴動が発生している。\n\n大衆を静めるためには、 §H[GetInstrumentCraving]§!の生産を増やさざるを得なくなるかもしれない。"
 utopia.3340.desc.machine_non_gestalt: "§H道具§!が我々のプログラミングに及ぼす影響から生じる欲望が、 わが国民の論理中枢を圧倒している。\n\n消費主義と退廃主義は業務効率を低下させ始め、 ユニットは本来の機能よりも美観を重視して部品を改造しようとしている。 その結果、 需要の高い部品が不足し、 組立ライン全体で小さな競り合いが起こっている。\n\nこの問題を解決するためには、 §H[GetInstrumentCraving]§!の生産を増加させる必要がある。"
 utopia.3340.opt.a.organic_non_gestalt: "だが、なぜ？"
 utopia.3340.opt.a.machine_or_gestalt: "これが成功の代償だ。"
 instrument_cravings: "激しい欲求"
 instrument_cravings_tooltip: "§R現在、 わが国の£pops£ POPには§![GetInstrumentCravingIconAndName]に対して維持費がかかる"
 instrument_cravings_desc: "$the_instrument_of_desire_color_article_cap$は、 我が国民の間に新しい流行を巻き起こした。 誰もが同じものを欲しがっているが、 実用性のためではなく、 それ自体を得ることが目的になっている。"
 instrument_cravings_gestalt: "$instrument_cravings$"
 instrument_cravings_gestalt_desc: "$the_instrument_of_desire_color_article_cap$は、 我々に強迫的な欲望という病をもたらした。 これは、 我々の集合体にとって新たな感覚だ。 目的に関係なく、 我々は皆同じものを渇望している。"
 utopia.3341.name: "[GetComposerMutationName]"
 utopia.3341.name.organic: "$name_composer$：§R突然変異§!"
 utopia.3341.name.machine: "$name_composer$：§R再構成§!"
 utopia.3341.desc.machine: "$the_composer_of_strands_color_article_cap$は我々に祝福を与え、 我々の基本的な構成要素の一部を直接変更した。 回路は新しい構成に融合し、固体の金属は何らかの方法で全く新たな形に融合した。 驚くべきことに、 我々のニューロプロセッサは全く問題なく機能し続けている。 "
 utopia.3341.desc.organic_gestalt: "$the_composer_of_strands_color_article_cap$は我々に祝福を与え、 §H[Root.GetSpeciesAdj]§!種族の遺伝子コードを直接変更した。 奇妙なことに、 急速かつ予測不可能な突然変異は、 ごくわずかな反応しか引き起こしていない。 ランダムで予測不可能な突然変異は、 生命の正常な一部と考えることができ、 憤慨や警戒に値するものではないようだ。"
 utopia.3341.desc.organic_non_gestalt: "$the_composer_of_strands_color_article_cap$は我々に祝福を与え、 §H[Root.GetSpeciesAdj]§!種族の遺伝コードを直接変更した。 奇妙なことに、 急速かつ予測不可能な突然変異は、 ごくわずかな反応しか引き起こしていない。 どうやら、我が国民は、ランダムで予測不可能な突然変異は、 生命の正常な一部であり、 憤慨するどころか、 議論にさえ値するものではないと考えているようだ。"
 utopia.3341.opt.a: "成り行きを見届けよう……"
 utopia.3342.name: "世界を喰らうもの：§R欠食§!"
 utopia.3342.desc.intro: "§H喰らうもの§!は決して真に満足することはない。 今回は、 我々の植民地のひとつをかじりとった。"
 utopia.3342.desc.outro: "想像を絶する大きさのクレーターと、 渦巻く紫色の霧があるのみだ。"
 utopia.3342.desc.gestalt: "$utopia.3342.desc.intro$ かつて集合体の大部分が居住していた物理空間には、 現在$utopia.3342.desc.outro$"
 utopia.3342.desc.non_gestalt: "$utopia.3342.desc.intro$ 世界の大部分が現実世界から消え去り、 今では、 $utopia.3342.desc.outro$"
 utopia.3342.opt.a.non_gestalt: "これを隠蔽するのは難しいだろう……"
 utopia.3342.opt.a.gestalt: "これが力の代償だ。"
 utopia.3343.name: "世界を喰らうもの：§R軽食§!"
 utopia.3343.desc.gestalt: "§H喰らうもの§!がまたしても貢物を求めて姿を現した。 §Y[planet_target.GetName]§!の都市を丸ごと呑み込み、貪り尽くしたのだ。 多くのドローンを失ったことで、 集合体は喰らうものとの契約に対して高い代償を支払った。"
 utopia.3343.desc.organic_non_gestalt: "§H喰らうもの§!がまたしても貢物を求めて姿を現した。 §Y[planet_target.GetName]§!の都市を丸ごと呑み込み、貪り尽くしたのだ。 我々は喰らうものとの契約を一般市民には秘密にしてきたが、 この惑星に残った人々は当然のことながら、 これらの「不可解な」失踪事件に対して恐怖と怒りを感じており、 政府に説明を求めている。"
 utopia.3343.desc.machine_non_gestalt: "§H喰らうもの§!がまたしても貢物を求めて姿を現した。 §Y[planet_target.GetName]§!の都市を丸ごと呑み込み、貪り尽くしたのだ。 我々は喰らうものとの契約を一般市民には秘密にしてきたが、 この惑星に残った人々は当然のことながら、 これらの「不可解な」失踪事件に対して不満を抱き、 政府に説明を求めている。"
 utopia.3343.opt.a.organic_non_gestalt: "悲しいが、 やむを得ないことだ。"
 utopia.3343.opt.a.machine_or_gestalt: "残念だが、 やむを得ないことだ。"
 utopia.3345.name: "[GetComposerDegenerationName]"
 utopia.3345.name.organic: "$name_composer$：§R衰退§!"
 utopia.3345.name.machine: "$name_composer$：§R修復不可能な劣化§!"
 utopia.3345.desc.organic_1: "$the_composer_of_strands_color_article$の祝福は予測不可能である。 あるリーダーが不運にも、"
 utopia.3345.desc.organic_2: "が自我を持ち始めるという現象に見舞われた。 瞬く間に、 彼らは見分けがつかないほどの、 もがき苦しむ肉塊へと変貌を遂げた。 この変質を元に戻す望みはもはやなく、 我々は今このリーダー"
 utopia.3345.desc.organic_3: "を事実上死んだものとして見なしている。"
 utopia.3345.desc.organic_individual_lithoid: "$utopia.3345.desc.organic_1$ 物理コンポーネント$utopia.3345.desc.organic_2$ $utopia.3345.desc.organic_3$"
 utopia.3345.desc.organic_hive_lithoid: "$utopia.3345.desc.organic_1$ 物理コンポーネント$utopia.3345.desc.organic_2$ドローン$utopia.3345.desc.organic_3$"
 utopia.3345.desc.organic_individual_non_lithoid: "$utopia.3345.desc.organic_1$ 肉体 $utopia.3345.desc.organic_2$ $utopia.3345.desc.organic_3$"
 utopia.3345.desc.organic_hive_non_lithoid: "$utopia.3345.desc.organic_1$ 肉体$utopia.3345.desc.organic_2$ドローン $utopia.3345.desc.organic_3$"
 utopia.3345.desc.machine_non_gestalt: "$the_composer_of_strands_color_article$の祝福は予測不可能である。 あるリーダーが不運にも、 物理的コンポーネントが自らの意志を獲得し、 自発的に融合して奇妙な新しい形に溶け込むという、 壮絶かつ重大な失敗を経験した。 今や機能不全に陥り、 修復不可能なスクラップ金属と化したこのリーダーを、 [Root.GetName]はもう必要としていない。"
 utopia.3345.desc.machine_gestalt: "$the_composer_of_strands_color_article$の祝福は予測不可能である。 あるリーダーノードが不運にも、 物理的コンポーネントが自らの意志を獲得し、 自発的に融合して奇妙な新しい形に溶け込むという、 壮絶かつ重大な失敗を経験した。 今や機能不全に陥り、 修復不可能なスクラップ金属と化したこのリーダーノードを、 [Root.GetName]はもう必要としていない。"
 utopia.3345.opt.a.organic: "今はよりシンプルな生活を送っている。"
 utopia.3345.opt.a.machine: "すべてのハードウェアはいつか廃れる。"
 utopia.3346.name: "螺旋の作曲家：§R退化§!"
 utopia.3346.desc: "$the_composer_of_strands_color_article$の慈悲深き贈り物が[devolved_species_planet.GetName]に降り注ぎ、 その地において、 我が国民の多くが深刻な突然変異を起こし、 知性を持つ以前の「準知的」な状態へと退行してしまった。"
 utopia.3346.opt.a.non_gestalt: "魅力的だが、 残念だ。"
 utopia.3346.opt.a.gestalt: "残念だ。"
 utopia.3346.opt.a.tt: "[devolved_species_planet.GetName]の §Y500§! £pop£ §HPOP§!が§Y準知的生命体§!へと変化した。\n\n適切なテクノロジーがあれば、 種族画面から彼らを§Y知性化§!できる。"
 utopia.3347.name: "$name_cradle$：§R非軍事化§!"
 utopia.3347.desc: "§Hゆりかご§!はあらゆるものにバランスを求める。 我々の[GetTelepathPlural]によれば、 これには平和の必要性に応じた軍事力も含まれる。 宇宙軍の規模が我がパトロンの怒りを買ったに違いない。 なぜなら、 §H[demilitarized_fleet.GetFleetName]§!の多数の艦船が、 激しいサイオニック・エネルギーの爆発によって突然消失したからだ。"
 utopia.3347.opt.a: "$UNFORTUNATE$"
 utopia.3347.opt.a.tt: "ランダムな艦隊の1つが、 最大で§H宇宙軍許容量§!を12失う。"
 utopia.3348.name: "[GetCradleChaoticAnguishName]"
 utopia.3348.name.organic_non_gestalt: "$name_cradle$：§R苦悩§!"
 utopia.3348.name.machine_or_gestalt: "$name_cradle$：§R混乱§!"
 utopia.3348.desc.intro: "[GetCradleAnguishIntro]"
 utopia.3348.desc.organic_non_gestalt: "$utopia.3348.desc.intro$存在の苦悩を引き起こしている。"
 utopia.3348.desc.machine_or_gestalt: "$utopia.3348.desc.intro$認知の混乱を引き起こしている。"
 utopia.3348.desc_intro_homicidal: "§Hゆりかご§!の意志に同調した[root.GetSpeciesAdj]の精神は不協和に悩まされながらも、 すべての精神が調和のとれた共存の不条理を受け入れざるを得ない状況にあった。 現在の銀河情勢の混乱を受けて、 超能力の混乱の波が民衆の間に広がり、 広範囲に渡って"
 utopia.3348.desc_intro_default: "§Hゆりかご§!の意志に同調した[root.GetSpeciesAdj]種族は、 すべての精神の間で調和のとれた共存を重んじるようになった。 現在の銀河情勢の混乱を受けて、 超能力の混乱の波が民衆の間に広がり、 広範囲に渡って"
 utopia.3348.opt.a: "耐えるしかない。"
 anguish_of_the_cradle: "ゆりかごの苦悩"
 anguish_of_the_cradle_desc: "$the_cradle_of_souls_article_cap$は我が国民全体に超能力の混乱の波を広げた。"
 anguish_of_the_cradle_gestalt: "$anguish_of_the_cradle$"
 anguish_of_the_cradle_gestalt_desc: "$anguish_of_the_cradle_desc$"
 utopia.3349.name: "$name_cradle$：§R限界§!"
 utopia.3349.desc: "§H[root.GetName]§!全体において、 我々の軍事艦隊を支援し維持する能力はますます困難になっている。\n\n我々の[GetTelepathPlural]は、 この混乱は銀河秩序を求める§Hゆりかご§!によって引き起こされたと感じている。 軍事インフラへの投資は、 たとえそれがいかに小規模であっても、 その不興を買ったに違いない。"
 utopia.3349.opt.a: "虚空における存在を制限すべきだ。"
 limit_of_the_cradle: "ゆりかごの限界"
 limit_of_the_cradle_desc: "我々の軍事支援インフラは$the_cradle_of_souls_article$によって縮小された。"
 utopia.3350.name: "[GetLavishLifestyleEventName]"
 utopia.3350.name.individual: "$name_instrument$：§R贅沢な生活様式§!"
 utopia.3350.name.gestalt: "$name_instrument$：§R過剰消費§!"
 utopia.3350.desc.individual: "我々の§H道具§!とのつながりの影響で、 一部の[Root.GetSpeciesAdj]の指導者が過剰消費に走るようになっている。\n\nこの度、 [lavish_leader.GetName]が巨額のエネルギー通貨を高価な品に浪費し、 個人中心の気ままな生活を送っていたことが発覚した。"
 utopia.3350.desc.gestalt: "我々の§H道具§!とのつながりが、 一部の[Root.GetSpeciesAdj]のリーダードローンの間で、 資源消費量の増大を引き起こしている。\n\nこれまでも[lavish_leader.GetName]が自身の基本機能を維持する際に、 必要以上のエネルギーを使用していたが、 物理的根拠は何も見つかっていない。 となると詳細は不明だが、 こうした気ままな資源消費は選択的行動であると結論づけるより他ない。"
 utopia.3350.opt.a: "これが欲望の代償か。"
 utopia.3351.name: "$name_instrument$：§R労働力の雑念§!"
 utopia.3351.desc.individual: "我々のパトロンの影響力が、 [Root.GetName]のより広範囲へと拡大していくなか、 新たに発見された娯楽によって、 民衆のエネルギーが生産的な労働以外に向けられるようになった。\n\n意欲が衰えてしまったことで、 同じ労働結果を達成するのに以前よりも多くの投資が必要になってしまった。"
 utopia.3351.desc.gestalt: "我々のパトロンの影響力が、 [Root.GetName]のより広範囲へと拡大していくなか、 [Root.GetSpeciesAdj]の集合体の間で徐々に逸脱行為が見られるようになってきた。\n\nこうした瞬間的な個の衝動と集中力低下の傾向は、 特に業務中に顕著に表れる。 おかげで労働力の結束と規律を維持するにあたり、 以前よりも多くの投資が必要になってしまった。 "
 utopia.3351.opt.a: "§H道具§!の一時的な気まぐれだろう。"
 distracted_workforce: "注意力散漫な労働力"
 distracted_workforce_desc: "この労働力は注意力散漫な傾向にあるため、 常時監督する必要がある。"
 utopia.200.name: "シュラウドに新たな存在"
 utopia.200.desc.a: "帝国に暮らすすべての[target_species.GetNamePlural]に、 変化が起こっている。 はじめはシュラウドのかすかな波紋だったが、 いまではまるで違う次元の振動へと変わった。 というのも、 [target_species.GetNamePlural]が我々自身と同じように、 潜在的な超能力を開花させる寸前なのだ。\n\n我々の近くで暮らしていたせいか、 あるいはシュラウドが彼らを選んだだけかもしれない。 わが超能力の専門家集団であるテレパス秘密会議は、 いまが介入の唯一のチャンスだと警告している。 芽のうちに摘んでおくか、 覚醒を手助けしてやるか。 我々の導きなしでは、 彼らは大成することはないだろう。"
 utopia.200.desc.b: "シュラウドの異常な活動が、 わが国にいる別種族、 [target_species.GetNamePlural]が潜在的な超能力を発現させはじめたことを示唆している。 我々は以前と同じ選択に迫られている――彼らに芽生えつつある力を抑えつけるか、 解放してやるかだ。"
 utopia.200.a: "彼らの可能性を解き放ってやろう。"
 utopia.200.a.tooltip: "すべての[target_species.GetAdj]POPが§Y$trait_latent_psionic$§!の特性を得る。"
 utopia.200.b: "彼らには過ぎた力だ。"
 utopia.203.name: "覚醒"
 utopia.203.desc.a: "テレパス秘密会議の指導のもと、 [target_species.GetNamePlural]はシュラウドとの想像以上に深いの接続を確立した。 まるで、 これらの力は最初から彼らのためにあったかのように。\n\n彼らは潜在的超能力を完全に解放する準備ができたと主張する。 しかし秘密会議の意見は割れている。 ある者は変化が早すぎて彼らの精神が不安定になることを案じ、 ある者は新たな力によって彼らが思い上がることを危惧している。 しかし、 いま動かなければ二度とチャンスは来ないかもしれないのだ。"
 utopia.203.desc.b: "[target_species.GetNamePlural]もまた、 潜在能力をフルに発現して覚醒する準備はできている、 と訴えている。"
 utopia.203.a: "彼らの準備はできている。"
 utopia.203.a.tooltip: "すべての[target_species.GetAdj]POPが§Y$trait_psionic$§!の特性を得る。"
 utopia.203.b: "彼らには過ぎた力だ。"
 utopia.203.c: "危険すぎる。"
 utopia.204.name: "荒々しい覚醒"
 utopia.204.desc.a: "[original_species.GetSpeciesNamePlural]の一部が予期せずして超能力を発現したことに、 研究者たちはこのところ困惑している。 調査の結果、 彼らの変化は超能力先進国として長年知られてきた[target_country.GetName]における、 同種族の大規模覚醒と同時期に起こったことがわかった。\n\n彼らの新たな力の一部が、 未知の原因によってわが領内の同族にも流れ込んだ、 と推測するほかない。"
 utopia.204.desc.b: "[original_species.GetSpeciesNamePlural]の一部が予期せずして超能力を発現したことに、 研究者たちはこのところ困惑している。 調査の結果、 どうやら超能力者たちは以前知られていなかった国である[target_country.GetName]に住む同種族と、 テレパシーで繋がっているようだ。 現在、 我々は同国との関係を確立している。 我々の経験した変化は、 [target_country.GetName]の全[original_species.GetSpeciesNamePlural]の精神的大覚醒の余波によるもののようだ。"
 utopia.204.a.tooltip: "最大4の[original_species.GetSpeciesAdj]POPが§Y潜在的超能力者§!の特性を得る。"
 utopia.205.name: "予期せぬ覚醒"
 utopia.205.desc: "[target_species.GetName]の精神的覚醒以降、 いたるところで同種族の個体が潜在的超能力の兆候を見せはじめたという報告が上がってきている。 この現象はあたかも共通の祖先がシュラウドを通じて彼らを繋ぐかのように、 物理的距離に関係なく発生している。\n\nしかし、 わが国に存在する彼らの遠い親戚とは異なり、 兆候を見せているのはごく少数かつ分散しており、 完全な覚醒に至ることはないだろう。"
 whisperers_madness: "シュラウド - 精神負荷"
 whisperers_madness_desc: "$whisperers_in_the_void_color_article$によってもたらされた狂気によって、 我々の帝国の国民は分裂している。"
 whisperers_madness_gestalt: "$whisperers_madness$"
 whisperers_madness_gestalt_desc: "$whisperers_in_the_void_color_article$によってもたらされた集合的な狂気によって、 我々のドローンは分裂している。"
 whisperers_psychosis: "シュラウド - 精神異常"
 whisperers_psychosis_desc: "$whisperers_in_the_void_color_article$によってもたらされた狂気によって、 我が帝国は内部抗争に陥った。"
 whisperers_psychosis_gestalt: "$whisperers_psychosis$"
 whisperers_psychosis_gestalt_desc: "$whisperers_in_the_void_color_article$によってもたらされた不均衡によって、 我が帝国は内部不和に陥った。"
 eater_unhappiness_planet_1: "シュラウド - 喰われた人々"
 eater_unhappiness_planet_1_desc: "この惑星の人口の一部は、 $the_eater_of_worlds_color_article$によって食い尽くされた。"
 eater_unhappiness_planet_1_gestalt: "$eater_unhappiness_planet_1$"
 eater_unhappiness_planet_1_gestalt_desc: "$eater_unhappiness_planet_1_desc$"
