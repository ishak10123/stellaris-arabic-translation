 utopia.2652.b: "これには論理的な説明があるはずだ。"
 utopia.2652.c.organic: "慎重に進めろ。"
 utopia.2652.c.machine: "最適とは言い難い展開だ。"
 utopia.2652.d.organic: "彼らの覚醒による大きな超能力の乱れを感じた。"
 utopia.2652.d.machine: "我々が検知した超能力の乱れの説明がつく。"
 utopia.2650.name: "大覚醒"
 utopia.2650.desc: "[Root.GetSpeciesName]種族は、 「大覚醒」としか表現しようがない経験をした。 これまでにもわが種族は、 自らに宿る大きな潜在的超能力に気づいていたが、 このような力が現れたのは少数だった……今日までは。\n\nほぼ一夜にして、 いたるところで[Root.GetSpeciesNamePlural]がすべての超能力を解き放った。 それはまるで、 [Root.GetSpeciesName]のサイキックエネルギーの共用プールともいうべきものがついに重要な転換点に達し、 脳の潜在能力を一斉に覚醒させたかのようだった。\n\n[Root.GetSpeciesNamePlural]の言語コミュニケーションの多くはすでにテレパシーに取って代わったが、 これは我々の社会が直面した無数の変化の小さな一例にすぎない。 我々はいまや、 誰もが想像もしなかった方法で結びついている。"
 utopia.2650.a: "いよいよ幕開けというわけだ。"
 utopia.2655.name: "シュラウド"
 utopia.2655.desc: "「シュラウド」は、 暗い部屋のなかで囁くように、 我々の精神の内側から呼びかけてくる。 それは時間の始まりから続く、 純粋なサイキックエネルギーを湛えた原初の領域だ。 超能力をもつすべての生物は、 無意識のうちにこのシュラウドに触れ、 力を引き出している。\n\n超越の時以来、 我々はシュラウドをより明確に見ることができるようになった。 かつては最強のテレパスでさえ、 渦巻くエネルギーの形なき塊としか見なせなかったパターンがあるのだ。 そこに存在するのは……それだけではない。 ある種の精神体が、 向こう側から我々を見つめ返しているのだ。 ある時は好奇心で、 ある時は優しさで……そしてある時は悪意で。\n\n我々はまだ新たな力の使い方を学んでいる最中だが、 これらの精神体と交信できるかもしれない。 そのためには、 我々の最強のテレパスたちが力を合わせる必要があるだろう。"
 utopia.2655.a: "シュラウドを探索せねば。"
 BREACHING_SHROUD_PROJECT: "シュラウドの突破"
 BREACHING_SHROUD_PROJECT_DESC: "シュラウドという名で知られている超常領域の住人と交信するためには、 莫大な超能力エネルギーを解放しなくてはならない。 [Root.Capital.GetName]に新たに設立されたテレパス秘密会議において、 最も強力なテレパスが参加する交霊会が準備された。"
 utopia.2656.name: "交霊会"
 utopia.2656.desc: "数日間を催眠状態で過ごしたあと、 テレパス秘密会議の超能力者たちが、 ついに束の間、 シュラウドへの入り口を開いた。\n\n超能力によってリンクを確立したので、 今後は§H交信§!メニューからシュラウドにアクセスできる。 この領域に意味ある進出を行い、 そこに住む生物と出会うためには、 我々の超能力の範囲を広げる特別なサイオニック増幅装置を使う必要があるだろう。 装置は膨大なエネルギーを消費する。"
 utopia.2656.a: "我々が何を見つけたか確かめるべきだな。"
 utopia.2657.name: "スルー・ザ・ルッキング・グラス"
 utopia.2657.desc: "まだ我々は、 ベールを実際に突き破ったわけではない。 だが、 我らの精神が束ねられるにつれ、 その幕が確かに薄れていくのを感じる。 しかし、 反対側では、 §Hシュラウド§!に入ろうとする我々の努力が見過ごされたわけではない。 何かがこちらを監視している。\n\nその存在は驚異的な力と計り知れない意図を放ち、 我々の精神の裂け目に浸透していく。\n\nそれは、 我々にほとんど注意を払わない。 まるで舷窓についた結露のしずくを見るように我々を見ている。 もしその不可解な精神に到達できれば、 我々を招き入れてくれるかもしれない。"
 utopia.2657.a: "その存在との接触を試みる。"
 utopia.2657.a.tt: "§Gこれにより契約を結ぶことになる。§!"
 utopia.2657.b: "接触せずに自力で入ろう。"
 utopia.2657.c: "そんなことは許可できない！  もっと用心しなくては。"
 utopia.2658.name: "確認事項"
 utopia.2658.desc: "§H[GetShroudPatron]§!と契約の基盤を築いてから時が経過した。 我々の絆はまだ弱く、 それを断ち切ることも、強化することもできる。"
 utopia.2658.a: "契約を成立させる。"
 utopia.2658.b: "§Y[GetShroudPatron]§!を拒絶する。"
 utopia.2659.name: "入口"
 utopia.2659.desc: "我々のテレパスは、 住人の助けも借りることなく、 §Hシュラウド§!を突破するために、 たゆまぬ努力を続けてきた。 そしてついに、 その方法を見つけた。 この深淵が我々を呼んでいる。必要なのは、 勇気を出して飛び込むことだけだ。"
 utopia.2659.a: "シュラウドの奥深くへと向かうぞ。"
 FORM_COVENANT_PROJECT: "超自然的存在との対話"
 FORM_COVENANT_PROJECT_DESC: "[Root.Capital.GetName]のテレパス秘密会議は、 シュラウドに宿る存在と接触するための、 大掛かりな交信会を準備している。"
 utopia.3020.name: "§Gサイオニック・アバター召喚§!"
 utopia.3020.desc: "§Hシュラウド§!の強力なエネルギーが、 我々の制御下にあるサイオニック・アバターへと正常にチャネリングされた！\n\n我々の次元へと転送された後、 新たに誕生したアバターは[Root.Capital.GetName]の軌道上で宇宙を翔ける存在へと融合した。"
 utopia.3021.desc: "§Hシュラウド§!の強力なエネルギーが、 我々の制御下にあるサイオニック・アバターへと正常にチャネリングされた！\n\n我々の次元へと転送された後、 新たに誕生したアバターは[Root.Capital.GetName]の地表で巨大な戦士へと融合した。"
 utopia.3022.name: "§R召喚失敗§!"
 utopia.3022.desc: "アバターを召喚し、 我々の次元に呼び込むために必要な超能力を操ることは、 現在の我々の能力を遥かに超えている。我々の試みは失敗すると、 §Hシュラウド§!のエネルギーは動揺とともに消え去った。"
 utopia.3023.name: "サイオニック体の攻撃"
 utopia.3023.desc: "サイオニック・アバターを召喚する試み、 部分的な成功にとどまった。 その生物は正しい形態を取ってこちらの次元に転送されたものの、 [GetTelepathPlural]はその制御に失敗した！\n\n我々は今、 行く手にあるものすべてを破壊する攻撃的なサイオニック体に直面している。"
 utopia.3024.name: "シュラウドからの侵攻"
 utopia.3024.desc: "§Hシュラウド§!の生物が空間構造を突き破り、 [shroud_spawn_system.GetName]星系に実体化した！  この復讐に燃えるアバターは膨大な量のサイオニック・エネルギーを蓄積し、 不運にも遭遇した存在たちに、 無差別に襲いかかっている。"
 utopia.3024.a: "止めなければ！"
 utopia.3026.name: "シュラウド・アバター消滅"
 utopia.3026.desc: "通常空間に存在し続けることで生じる萎縮が、 §H[shroud_spawn_system.GetName]§!星系のアバターを徐々に蝕んだ。\n\nもはや目に見える形を維持することができなくなったアバターは、 §Hシュラウド§!へと撤退した。"
 utopia.3026.a.default: "清々しい気分だ。"
 utopia.3026.a.machine_or_hive: "幸運な結果だ。"
