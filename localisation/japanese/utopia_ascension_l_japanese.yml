 whisperers_covenant_chain_title: "虚無の囁き手"
 whisperers_covenant_chain_desc: "我々は$whisperers_in_the_void_color_article$という名のシュラウド体との絆を築いた。 計り知れぬそれは、 対価として我々に力の欠片を与えた。 それは今後も続くだろう。\n\n我々の[GetTelepathPlural]は、 我々の行動をパトロンの意志と一致させることで、 絆をより容易に深めることができると理論づけている。\n\n囁き手は新たな知識、 沈黙の秘密、 そして陰謀を楽しむ。 彼らは心が限界まで満たされる、 そんな純粋な喜びを謳歌する。"
 whisperers_covenant_chain_begin: "$BEGINS_EVENT_CHAIN$ §Y$whisperers_covenant_chain_title$§!"
 whisperers_covenant_chain_end: "$ENDS_EVENT_CHAIN$ §Y$whisperers_covenant_chain_title$§!"
 eater_covenant_chain_title: "世界を喰らうもの"
 eater_covenant_chain_desc.intro: "我々は$the_eater_of_worlds_color_article$という名のシュラウド体との絆を築いた。 貪欲なるそれは、 対価として我々に力の欠片を与えた。 それは今後も続くだろう。\n\n[GetTelepathPlural]は、 この絆をより深めるには、 守護者たる存在の意志に即した行動を取ることが効果的だと考えている。"
 eater_covenant_chain_desc: "$eater_covenant_chain_desc.intro$\n\n喰らうものは切実に飢えている。 戦争、 争いと嘆きの甘美な味を渇望している。"
 eater_covenant_chain_begin: "$BEGINS_EVENT_CHAIN$ §Y$eater_covenant_chain_title$§!"
 eater_covenant_chain_end: "$ENDS_EVENT_CHAIN$ §Y$eater_covenant_chain_title$§!"
 composer_covenant_chain_title: "螺旋の作曲家"
 composer_covenant_chain_desc.intro: "我々は$the_composer_of_strands_color_article$という名のシュラウド体との絆を築いた。 庇護の対価として、 それは我々に力の欠片を与えた。 それは今後も続くだろう。\n\n[GetTelepathPlural]は、 この絆をより深めるには、 守護者たる存在の意志に即した行動を取ることが効果的だと考えている。"
 composer_covenant_chain_desc: "$composer_covenant_chain_desc.intro$\n\n作曲家は遺伝子操作と進化の制約から解放された肉体を渇望している。 それは生命と自然の尊重、 そして肉体の神聖さについて語る。"
 composer_covenant_chain_begin: "$BEGINS_EVENT_CHAIN$ §Y$composer_covenant_chain_title$§!"
 composer_covenant_chain_end: "$ENDS_EVENT_CHAIN$ §Y$composer_covenant_chain_title$§!"
 instrument_covenant_chain_title: "欲望の道具"
 instrument_covenant_chain_desc.intro: "我々は$the_instrument_of_desire_color_article$という名のシュラウド体との絆を築いた。 甘美なそれは、 対価として我々に力の欠片を与えた。 それは今後も続くだろう。\n\n[GetTelepathPlural]は、 この絆をより深めるには、 守護者たる存在の意志に即した行動を取ることが効果的だと考えている。"
 instrument_covenant_chain_desc: "$instrument_covenant_chain_desc.intro$\n\n道具は憧れを渇望している。 耽溺した快楽、 退廃、 そして奴隷制がその名を形作っている。"
 instrument_covenant_chain_begin: "$BEGINS_EVENT_CHAIN$ §Y$instrument_covenant_chain_title$§!"
 instrument_covenant_chain_end: "$ENDS_EVENT_CHAIN$ §Y$instrument_covenant_chain_title$§!"
 utopia.2671.name: "深まる絆"
 utopia.2671.desc: "庇護者への理解が深まってきた。 我々はあの存在にとって、 あくまで気まぐれの産物でしかないのだ。 家のなかを歩く虫けらなのだ。 それでも我々を気に入ってくれたらしく、 今回も力の一滴を授けてくれた。\n\nわが国のテレパスはいま、 庇護者とより密接に同調している。 そして、 両者の契約を称えるモニュメントを作るという閃きを得た。 そこは我々最高のテレパスたちが、 §Y[GetShroudPatron]§!との交信を行う場所となるだろう。"
 utopia.2671.a: "螺旋の作曲家の腕のなかでは、 安らぎを感じる。"
 utopia.2671.a.tt: "テレパスが追加の£pop£ §YPOPの成長§!を生み出すようになる。\n\n帝国の惑星の1つに£building£ §Y作曲家の至聖所§!を建設できるようになる。"
 utopia.2671.b: "我々も飢えている。 それを満たすのは戦争だ。"
 utopia.2671.b.tt: "テレパスが追加の£mod_country_naval_cap_add£ 宇宙軍許容量を生み出すようになる。\n\n帝国の惑星の1つに£building£ §Y喰らうものの至聖所§!を建設できるようになる。"
 utopia.2671.c: "欲望以上に美しいものはない。"
 utopia.2671.c.tt: "テレパスが追加の£amenities£ 快適度を生み出すようになる。\n\n帝国の惑星の1つに£building£ §Y道具の至聖所§!を建設できるようになる。"
 utopia.2671.d: "満たされた心は疑うことを忘れる。"
 utopia.2671.d.tt: "テレパスが追加の$r_research$を生み出すようになる。\n\n帝国の惑星の1つに£building£ §Y囁き手の至聖所§!を建設できるようになる。"
 utopia.2676.name: "可能性の実現"
 utopia.2676.desc: "§Hシュラウド§!の謎はあまりにも異質で、 我々には解明することはできないが、 我々は§Y[GetShroudPatron]§!との調和を深めている。 どこへ行こうとも、 心の奥底でそれを感じ、 その力は我々の精神の裂け目から現実に浸透していく。"
 utopia.2676.a: "肉体の意志は神聖なものである。"
 utopia.2676.b: "争いは献身である。"
 utopia.2676.c: "汝、 貪るべし。"
 utopia.2676.d: "秘密とは安全である。"
 utopia.2681.name: "力の断片"
 utopia.2681.desc: "我らがパトロン、 §H[GetShroudPatron]§!は、 §Hシュラウド§!の折り目にそのエネルギーの一部を預け、 いつでも取り出せるようにしている。 我々の密接な絆が、 この力の安全な吸収を可能にする。\n\n複数の候補者が選出されたが、 わがパトロンの力を行使する特権を与えられるのは、 そのうちの1人だけだ。 誰にするかは、 我々が決めなければならない。"
 utopia.2681.a: "§H[leader_1.GetTitle]§![leader_1.GetName]"
 utopia.2681.b: "§H[leader_2.GetTitle]§![leader_2.GetName]"
 utopia.2681.c: "§H[leader_3.GetTitle]§![leader_3.GetName]"
 utopia.2681.d: "§H[leader_4.GetTitle]§![leader_4.GetName]"
 utopia.2682.name: "到達"
 utopia.2682.desc.intro: "すべては成された。 力が[chosen_leader.GetName]に注ぎ込まれたことで、 周囲の誰もがその超能力的な存在の重みを[GetFeelLoc]できた。 それは力強く、 自ずと敬意を抱かせるものだった。 [chosen_leader.GetHeSheCap]は今や、 "
 utopia.2682.desc.patron_champion: "$utopia.2682.desc.intro$ §H[GetShroudPatron]§!に選ばれた[GetImmortalLoc]の王者である。"
 utopia.2682.desc.shroudshaper_champion: "$utopia.2682.desc.intro$ §H[This.GetName]§!に選ばれた[GetImmortalLoc]の$leader_trait_shroudshaper$である。"
 utopia.2682.desc.previous_chosen_killed: "今回のできごとは、 我々のかつてのパトロンに選ばれながら、 異端者となった§H[previous_chosen_leader.GetName]§!に壊滅的な効果をもたらした。 亡命先にて[previous_chosen_leader.GetHisHer]の壊れた体から超能力の最後の痕跡が失われてしまうと、 [previous_chosen_leader.GetHeShe]は静かな死を迎えた。"
 utopia.2682.desc.previous_chosen_lost_patron: "今回のできごとは、 §H[chosen_leader_lost_patron.GetName]§!に顕著な影響を及ぼした。 依然として相当なサイオニック・エネルギーを宿してはいるものの、 [chosen_leader_lost_patron.GetHeShe]は、 我々のかつてのパトロンから授けられた力を失ってしまった。"
 utopia.2682.a: "「選ばれし者」となる運命だった。"
 utopia.2682.a.shroudshaper: "これが[chosen_leader.GetHisHer]の運命だ。"
 utopia.2686.name: "力を得た艦隊"
 utopia.2686.desc: "テレパス秘密会議は、 我がパトロンである§H[GetShroudPatron]§!の力を利用する上で画期的な進歩を遂げた。 これまでは超能力を持つ個人のみが契約の全容を把握し得たが、 今やその力を、 これまでにない規模で艦船全体に流し込む手段を編み出したのだ。\n\n我々が望めば、 §H[GetShroudPatron]§!の印は、 我々の艦船をこれまで以上の高みへと押し上げることができるだろう。"
 utopia.2686.a: "船体が肉に変わるのか？"
 utopia.2686.b: "我々の船までもが貪欲だ。"
 utopia.2686.c: "艦船たちは使われたがっている。"
 utopia.2686.d: "秘密は比類なき武器となる。"
 building_composer_sanctum: "作曲家の至聖所"
 building_composer_sanctum_desc: "この至聖所は作曲家との交わりに捧げられた場所である。 [GetComposerSanctumDesc]"
 building_composer_sanctum_desc_default: "ここでは、 肉体は思考と同じくらい自由に動き回り、 シュラウドが我々の身の丈を超えて我々を作り変える。"
 building_composer_sanctum_desc_machine: "ここでは、 回路は物理的要因に妨げられることなく動作する。 シュラウドは、 従来のパラメーターを超えた方法でプロセッサを最適化することが可能である。"
 building_eater_sanctum: "喰らうものの至聖所"
 building_eater_sanctum_desc: "この至聖所は食らうものとの交わりに捧げられた場所である。 シュラウドは、 ここで次の[GetEaterSanctumDesc]を計画しながら戦争に備える。"
 building_eater_sanctum_desc_machine: "征服"
 building_eater_sanctum_desc_default: "宴"
 building_instrument_sanctum: "道具の至聖所"
 building_instrument_sanctum_desc: "この至聖所は道具との交わりに捧げられた場所である。 [GetInstrumentSanctumDesc]"
 building_instrument_sanctum_desc_gestalt: "ここでは過剰なものは蓄積され、 浄化され、 我々の集合意識の安定を促進するために再分配される。"
 building_instrument_sanctum_desc_default: "ここでは富が蓄えられ、 消費の狂乱の中で取引されるが、 我々は真の充足へと一歩も近づいてはいない。"
 building_whisperers_sanctum: "囁き手の至聖所"
 building_whisperers_sanctum_desc: "この至聖所は囁き手との交わりに捧げられた場所である。 [GetWhisperersSanctumDesc]"
 building_whisperers_sanctum_desc_machine: "ここでは秘密が謎めいた取引で交わされ、 新たな知識は封印され、 我々のシグナルがコーラスに加わる。"
 building_whisperers_sanctum_desc_default: "ここでは秘密が静かな口調で交わされ、 新たな知識は封印され、 我々の囁きがコーラスに加わる。"
 covenant_detection_first_contact: "$building_whisperers_sanctum$"
 covenant_detection_first_contact_effect: "この星系にある我々の§Y星系基地§!は以下を得る：§Y探知強度§!§G+5§!\n\n"
 whisperers_chosen: "囁き手に選ばれし者"
 eater_chosen: "喰らうものに選ばれし者"
 composer_chosen: "作曲家に選ばれし者"
 instrument_chosen: "道具に選ばれし者"
 COMPOSER_MARK: "作曲家の印"
 COMPOSER_MARK_DESC: "シュラウドの庇護者の印は我々の超能力を増幅し、 全艦船に影響を与えることを可能にした。"
 EATER_MARK: "喰らうものの印"
 EATER_MARK_DESC: "$COMPOSER_MARK_DESC$"
 INSTRUMENT_MARK: "道具の印"
 INSTRUMENT_MARK_DESC: "$COMPOSER_MARK_DESC$"
 WHISPERERS_MARK: "囁き手の印"
 WHISPERERS_MARK_DESC: "$COMPOSER_MARK_DESC$"
 tech_covenant_composer: "$COMPOSER_MARK$"
 tech_covenant_composer_desc: "超能力のエネルギー流を送り込む方法を我々は発見した。 この知識があれば、 わが国の艦船に庇護者の力を吹き込むことができる。"
 tech_covenant_eater: "$EATER_MARK$"
 tech_covenant_eater_desc: "$tech_covenant_composer_desc$"
 tech_covenant_instrument: "$INSTRUMENT_MARK$"
 tech_covenant_instrument_desc: "$tech_covenant_composer_desc$"
 tech_covenant_whisperers: "$WHISPERERS_MARK$"
 tech_covenant_whisperers_desc: "$tech_covenant_composer_desc$"
 utopia.3400.name: "神による支配"
 utopia.3400.desc: "§H[chosen_one.GetName]§!として知られる[GetImmortalLoc]は、 以前は[chosen_one_species.GetName]であったが、 今やそれを遥かに超えた存在となり、 [Root.GetName]で多くの熱心な信者を集めている。 最高神として多くの人々に崇拝されている[chosen_one.GetTitle]を、 現在そして永久に、 我々の偉大な帝国の永久的な統治者として正式に戴冠させようという呼びかけがなされている。"
 utopia.3400.a: "強力な超能力者だが、 神だと？  ありえん。"
 utopia.3400.b: "その治世が永遠に、 いやそれ以上に続きますよう！"
 reject_god_emperor: "[chosen_one.GetName]は[chosen_one.GetTitle]のままでいる。"
 utopia.3401.name: "[chosen_one.GetTitle]が[From.Capital.GetName]で戴冠"
 utopia.3401.desc.intro: "圧倒的な力を誇る[chosen_one_species.GetAdj]の[GetPsychicNoun]が§H[From.GetName]§!を掌握した！  この"
 utopia.3401.desc.outro: "の存在は、 [chosen_one.GetHerHis]の信者たちから「選ばれし者」と密かに崇められていたが、 今朝[From.Capital.GetName]で行われた盛大な式典を経て戴冠した。§H[chosen_one.GetRulerTitle][chosen_one.GetRegnalName]§!の永遠の統治を祝う声明が、 その直後にすべての星間政府に送られた。"
 utopia.3401.desc.organic: "$utopia.3401.desc.intro$ 不死$utopia.3401.desc.outro$"
 utopia.3401.desc.machine: "$utopia.3401.desc.intro$ 永遠$utopia.3401.desc.outro$"
 utopia.3401.a: "[chosen_one.GetName]はシュラウドに力を与えられたのだな。"
 utopia.3401.b: "くだらん迷信だ。"
 utopia.3401.c: "偉大なる進展だ。"
 civic_psionic_sovereign: "神による支配"
 civic_psionic_sovereign_desc_prefix: "この社会は、"
 civic_psionic_sovereign_desc_suffix_organic: "という比類なき超能力を持つ個体 を、 永遠の統治者として任命している。"
 civic_psionic_sovereign_desc_suffix_machine: "-という比類なき超能力を利用するために特別に設計されたユニット を、 永遠の統治者として任命している。"
