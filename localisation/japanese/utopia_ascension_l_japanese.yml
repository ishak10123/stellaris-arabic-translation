 eater_unhappiness_planet_2_gestalt_desc: "$eater_unhappiness_planet_2_desc$"
 eater_unhappiness_empire: "シュラウド - 喰われた世界"
 eater_unhappiness_empire_desc: "我々の帝国の惑星全体が$the_eater_of_worlds_color_article$によって食い尽くされた。"
 eater_unhappiness_empire_gestalt: "$eater_unhappiness_empire$"
 eater_unhappiness_empire_gestalt_desc: "$eater_unhappiness_empire_desc$"
 instrument_deviance_planet: "シュラウド - 逸脱"
 instrument_deviance_planet_desc: "この惑星の人々は帝国の志向から離れ、 個々の目標を追求するようになった。 これは間違いなく§Y欲望の道具§!の仕業だ。"
 instrument_deviance_empire: "シュラウド - 逸脱"
 instrument_deviance_empire_desc: "帝国全域で、 人々が帝国の志向と政策に疑問を抱きはじめている。 これは間違いなく§Y欲望の道具§!の仕業だ。"
 instrument_consumer_goods: "シュラウド - 退廃"
 instrument_consumer_goods_desc: "この惑星の人々は退廃的な消費主義に陥り、 贅沢な食事や珍奇な物品を激しく求めている。 これは間違いなく§Y欲望の道具§!の仕業だ。"
 d_eater_deposit: "ひと噛みのクレーター"
 d_eater_deposit_desc: "この惑星の一部は§Hシュラウド§!に食い尽くされた。 その結果生じたクレーターには紫色の霧が渦巻いており、 そこに近づいた者はほとんど戻ってこない。"
 opinion_doomed_us_all: "終焉をもたらした"
 absorbed_consciousness_1: "意識の同化"
 absorbed_consciousness_2: "$absorbed_consciousness_1$"
 absorbed_consciousness_3: "$absorbed_consciousness_1$"
 absorbed_consciousness_4: "$absorbed_consciousness_1$"
 absorbed_consciousness_5: "$absorbed_consciousness_1$"
 covenant.tooltip: "§Y必ずこの代償を支払うことになる。§!\n\n"
 covenant.cycle.tooltip: "§R契約してはいけない。§!\n\n"
 covenant.whisperers.desc: "完了した。 我々は$whisperers_in_the_void_color_article$と契約を結び、 すでに我々の科学者やリーダーに秘密が共有され始めている。 我々は、 これらの知識から多大な恩恵を受けるだろう。\n\n唯一の欠点は、 一般市民の間で精神疾患や自殺が急増していることだ。 また一部の惑星では、 それまでは安定し、 適応力のあった個人による不可解な殺人や暴行が多発している。 診療所や精神病院は、 急増する患者への対応に苦労している。"
 covenant.whisperers.option: "我々で対処できる。"
 covenant.eater.desc: "完了した。 我々は$the_eater_of_worlds_color_article$と契約を結び、 その効果がすでに地上軍と宇宙軍に現れている。 我が軍の兵士たちは今や野蛮に近い獰猛さで戦い、 艦船の兵器さえどういうわけか敵の死を渇望しているように見える。\n\n間違いなく関連しているのは、 我々の植民地のひとつにある都市の全住民が突然謎の失踪を遂げたことであり、 その住民は約束された貢物として喰らうものに連れ去られたのだろう。\n\nそう仮定すれば、 支払うべき代償は小さいように思える。 もちろん、 喰らうものが再び空腹になることがなければの話だが……"
 covenant.eater.option: "そうならないことを願おう。"
 covenant.instrument.desc: "完了した。 我々は$the_instrument_of_desire_color_article$と契約を結んだ。 その効果が現れるのに時間はかからなかった。 鉱山で豊富な鉱脈が発見されたり、 倒産寸前の事業が急成長を遂げたり、 以前は氷と岩石しかなかった思われた小惑星で、 希少価値の高い資源が発見されたという報告が寄せられた。\n\n我々の帝国は、 まさに道具が約束した通り、 富と繁栄の黄金時代を迎えているようだ。 しかし、 あのとき語った代償とは何だったのか……？"
 covenant.instrument.option: "大丈夫だ。 どうせ大したものじゃない。"
 covenant.composer.desc: "完了した。 我々は$the_composer_of_strands_color_article$と契約を結んだ。 その効果が現れるのに時間はかからなかった。 出生率の急激かつ大幅な増加は、 間違いなく作曲家のおかげだ。 しかし、 こうした良い効果とともに、 奇妙な突然変異の急増にも直面している。 余分な手足や臓器を持った子供が生まれてくるのだ…… その中には、 これまでの解剖学に記録された部位と全く類似点がないものもある。\n\n幸いなことに、 それらが原因で亡くなった人は少数で、 出生率の上昇と国民の明らかな活力の増加がその影響を大きく上回っている。 "
 covenant.composer.option: "我々は正しい決断をしたのだ。"
 covenant.cycle.desc: "決定は下された。 我々は§R円環の終わり§!と契約を結んだ。 交渉において、 それはたった一言しか話さなかった。 §R「50年」§!と。 そして訪れた沈黙のなかで、 我々はたったいま下した決断がもたらす将来的な結末について、 考えずにはいられなかった。"
 covenant.cycle.option: "我らに精霊の慈悲があらんことを。"
 covenant_shroud_marked: "シュラウドの印"
 covenant_shroud_marked_desc: "この惑星はシュラウドによって印がつけられている。\n\n§Rこの星で何か怖ろしく悪いことが起こる予感がする。§!"
