 civic_psionic_sovereign_machine_non_gestalt: "$civic_psionic_sovereign$"
 civic_psionic_sovereign_machine_non_gestalt_desc: "$civic_psionic_sovereign_desc_prefix$「$leader_trait_chosen_default$」$civic_psionic_sovereign_desc_suffix_machine$"
 civic_psionic_sovereign_machine_gestalt: "$civic_psionic_sovereign$"
 civic_psionic_sovereign_machine_gestalt_desc: "$civic_psionic_sovereign_desc_prefix$「$leader_trait_chosen_gestalt$」$civic_psionic_sovereign_desc_suffix_machine$"
