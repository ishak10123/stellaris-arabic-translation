 utopia.3000.name: "シュラウド"
 utopia.3000.a: "シュラウドの深部に進入する。"
 utopia.3000.intro.desc: "シュラウド、 それは信じがたいほど奇妙で落ち着かないが……身近でなじみ深くもある。 超能力をもつ者なら誰でも、 夢のなかでこの場所を見たことがあるはずだ。 もっとも、 夢を見ているあいだにそのことに気づく者は少ない。\n\n我々はいま、 この領域の入り口で次の行動を決めあぐねている。 通常空間、 もしくは我々が現実世界と呼ぶ領域と、 この領域との境界をなす空虚にほど近いところで。\n\nシュラウドの深部に進入するにはテレパスの多大な努力と、 大量のエネルギーが必要だろう。 ぐずぐずしている余裕はない……いまこの瞬間も、 我々は何者かに見られているのだから。"
 utopia.3000.1.desc: "シュラウドは今日は静かだな。"
 utopia.3000.2.desc: "何かが我々を見つめている。"
 utopia.3000.3.desc: "こちら側ではすべてが違って見える。"
 utopia.3000.4.desc: "我々は詩人を送るべきだった……"
 utopia.3000.5.desc: "何か不吉なものが近づいてきてるぞ。"
 utopia.3000.6.desc: "我々はまだ夢を見てるのか？"
 utopia.3000.7.desc: "せ……成功だ。 内部に入った！"
 utopia.3000.8.desc: "な……何かが……近くにいる。 シュラウドの奥深くへと我々を手招きしている……"
 utopia.3000.9.desc: "君も声を聞いたのか？"
 utopia.3000.10.desc: "シュラウドには力が脈動している。 ここはまるで……故郷だ。"
 utopia.3000.11.desc: "いま我々が吸ってるのは空気か？"
 utopia.3000.12.desc: "見えてるようで、 何も見えてない気がする。 この場所には学ぶべきことが山ほどあるぞ。"
 utopia.3000.13.desc: "どんな感覚器官があればこの世界を見たり、 聴いたりできるんだ？"
 utopia.3000.14.desc: "最大限の注意を払え。 ちょっとした雑念でさえ、 この場所では現実化しかねない……そういうのは大抵、 自分に襲いかかってくるんだ。"
 utopia.3000.15.desc: "私たちはここにいるべきじゃないんだ。"
 utopia.3000.16.desc: "なんて……強い力だ……"
 utopia.3000.17.desc: "集中……しなければ……"
 utopia.3000.18.desc: "ここはすべての始まりの場所なのでは？"
 utopia.3000.19.desc: "恐怖……恐怖に顔がついてる。"
 utopia.3000.b: "§M高位の存在と接触する。§!"
 utopia.3005.desc: "そこにはいくつもの巨大な力が散在している。 通常ならば不可能だが、 ズィロの効果を利用すれば接触できるかもしれない。 テレパスたちはシュラウド中の至る所に、 これらの存在の影響力を複数感じ取っている。 我々はどの存在と接触するべきだろうか？"
 utopia.3005.a: "§G不快な肉のにおいのする存在。§!"
 utopia.3005.b: "§P飽くなき虚無の叫びをあげる存在。§!"
 utopia.3005.c: "§H憧れと所有欲を囁く存在。§!"
 utopia.3005.d: "§B「破れた信頼」といった風情のある存在。§!"
 utopia.3010.desc: "テレパス秘密会議は、 以前のシュラウド調査からまだ回復しきっていない。 彼ら全員の力なしでは、 我々に理解できるのはこの刹那の領域の断片――手が届きそうで届かない記憶の、 おぼろな輪郭のようなものだけだ。\n\nここは我々がいる場所ではないのだ。 またあとで訪れるべきだろう。"
 boon.bestowed: "§G恩恵を授けられた§!"
 curse.bestowed: "§R呪いをかけられた§!"
 boon.psi.link.machine: "§Hシュラウド§!の強力なエネルギーが、 すべての[Root.GetSpeciesNamePlural]間で共有されている超能力処理ハブに流入した。"
 boon.psi.link.organic_non_gestalt: "§Hシュラウド§!の強力なエネルギーが、 すべての[Root.GetSpeciesNamePlural]間で共有されている共同超能力リンクに流入した。"
 boon.psi.link.hive: "§Hシュラウド§!の強力なエネルギーが、 すべての[Root.GetAdjective]のオーバーマインドを通じて脈動する共同超能力リンクに流入した。"
 boon.psi.link: "[GetBoonPsiLink]"
 boon.ship.link: "我々の[GetTelepathPlural]は、 §Hシュラウド§!と我々の宇宙船の間に一時的な通路を確立することに成功した。"
 utopia.3030.desc.gestalt: "$boon.psi.link$\n\nこれらのエネルギーは集合ネットワーク全体を巡り、 我々のドローンが目的を達成する際の最適な安定性を確保する。"
 utopia.3030.desc.organic_non_gestalt: "$boon.psi.link$\n\n深い静寂が[Root.GetName]全体に広がり、 超能力を持たない人々にも影響を与えている。"
 utopia.3030.desc.machine_non_gestalt: "$boon.psi.link$\n\n深遠な運用上の均衡が[Root.GetName]全体に広がり、 サイオニック要素を持たない人々にも影響を与えている。"
 utopia.3031.desc: "$boon.ship.link$\n\n我々の艦隊はその運行実績にかかわらず、 劣化の兆候が見られない。 その結果、 維持費が大幅に削減された。"
 utopia.3032.desc.non_gestalt: "$boon.psi.link$\n\n我々の[GetScientistPlural]の間で、 テレパシーによって共有される集合的な知識ベースが確立されたため、 彼らの仕事の効率が大幅に向上する。"
 utopia.3032.desc.organic_gestalt: "$boon.psi.link$\n\n我々の研究では、 [Root.GetSpeciesNamePlural]オーバーマインド内のノードが完全に同期して稼働していることに焦点を置き、 認知効率を高めている。"
 utopia.3032.desc.machine_gestalt: "$boon.psi.link$\n\nサイオニック・レンダリングループは、 我々の研究マトリックスを最大効率以上に作動させ、 学習効率を大幅に向上させている。"
 utopia.3033.desc: "$boon.ship.link$\n\n軍艦の乗組員は超能力によって船のシールドを強化できるようになった。"
 utopia.3034.desc: "$boon.ship.link$\n\n超能力を使用することで、 我々の乗組員は武器システムの威力を強化できるようになった。"
 utopia.3035.desc: "$boon.ship.link$\n\n超能力を使用することで、 我々の乗組員は武器システムの発射速度を高められるようになった。"
 utopia.3036.desc.organic_non_gestalt: "$boon.psi.link$\n\n市民の心の中に新たな連帯感が生まれ、 政府が設定した共通の目標に向かって協力する意欲が高まった。"
 utopia.3036.desc.machine_non_gestalt: "$boon.psi.link$\n\n市民のプロセッシング・コアに新たな連帯感が生まれ、 政府が設定した共通の目標に向かって協力する意欲が高まった。"
 utopia.3036.desc.gestalt: "$boon.psi.link$\n\nこれらのエネルギーは集合体全体に持続し、 ドローンの効率を高め、 我々の集中を妨げていた残留する逸脱性を抑制している。"
 utopia.3037.desc.organic_non_genocidal: "$boon.psi.link$\n\n我々の共感能力はこれまで以上に強化され、 結果的として大きな政治的影響力をもつことになった。"
 utopia.3037.desc.machine_non_genocidal: "$boon.psi.link$\n\n我々の外交部隊は最大限の共感効率で稼働しており、 結果として政治的影響力が増大している。"
 utopia.3037.desc.genocidal: "$boon.psi.link$\n\n我々の意志は、 かつてない規模で銀河に押し付けられている。"
 utopia.3038.desc.gestalt: "$boon.psi.link$\n\n我々はこれほど明確で一致した目的をかつて経験したことはない。"
 utopia.3038.desc.non_gestalt: "$boon.psi.link$\n\n我々はこれ以上ないほどの連帯感を感じた。"
 utopia.3039.desc: "$boon.ship.link$\n\n超能力を使用することで、 我々の乗組員は艦船の動きを直接制御し、 敵の攻撃に対する回避力を高められるようになった。"
 utopia.3040.desc.organic: "$boon.ship.link$\n\n超能力を使用することで、 我々の乗組員は限定的な現場修理が可能になり、 精神の力だけで船体の亀裂を修復できるようになった。"
 utopia.3040.desc.machine: "$boon.ship.link$\n\n超能力を使用することで、 我々の乗組員は限定的な現場修理が可能になり、 ニューロプロセッサだけで船体の亀裂を修復できるようになった。"
 utopia.3041.desc.machine: "$boon.psi.link$\n\n我々の[GetTelepathPlural]はこの力を用い、 最も著名なリーダーユニットの機能性能を一時的に向上させ、 その推定廃止時期を数十年遅らせた。 残念ながら、 この効果を国民全体に授けるにはサイオニック・エネルギーが不足していた。"
 utopia.3041.desc.organic_gestalt: "$boon.psi.link$\n\n我々の[GetTelepathPlural]はこの力を用い、 最も著名なリーダードローンの老化を一時的に遅らせ、その寿命を数十年延ばした。残念ながら、 この効果を国民全体に授けるにはサイオニック・エネルギーが不足していた。"
 utopia.3041.desc.organic_non_gestalt: "$boon.psi.link$\n\n我々の[GetTelepathPlural]はこの力を用い、 最も著名なリーダーの老化を一時的に遅らせ、 その寿命を数十年延ばした。 残念ながら、 この効果を国民全体に授けるにはサイオニック・エネルギーが不足していた。"
 utopia.3041.tooltip: "すべてのリーダーが§Y$leader_trait_shroud_age$§!の特性を獲得し、 寿命が§G+40§!年延びる。"
 utopia.3042.desc: "$boon.ship.link$\n\n超能力を使用することで、 我々の乗組員は艦船のスラスターの強度を増強し、 亜光速移動速度を大幅に増加させられるようになった。"
 utopia.3043.desc.organic: "$boon.psi.link$\n\nこれにより、 兵士たちの心は強化され、 戦場でのいかなる危険にも勇敢に立ち向かうようになった。 彼らの士気は比類なきものとなった。"
 utopia.3043.desc.machine_or_gestalt: "$boon.psi.link$\n\nこれにより、 戦闘用ドローンの目的に対する決意が強化され、 現場での効率化が向上した。"
 utopia.3044.desc: "$boon.psi.link$\n\n従来のセンサーアレイよりもはるかに遠くの船舶を感知できるようになった。"
 utopia.3045.name: "シュラウドから排出された"
 utopia.3045.1.desc: "我々の[GetTelepathPlural]がシュラウドに接続するために使用していた通路は、 サイキック領域の複数のエネルギー層が前触れなしに突然変化したことで崩壊した。\n\n我々は即座に通常の空間に排出される。"
 utopia.3045.2.desc: "我々の[GetTelepathPlural]は、 シュラウドとの交信中に受けた過度の負担によって圧倒された。\n\nもはやリンクを維持することは不可能だ。"
 utopia.3045.3.desc_organic: "最初はゆっくりと、 そして次第に速く、 我々のシュラウドへの掌握が滑り落ちていく。 [GetTelepathPlural]は足場を失い、 苦悶の叫びを上げ、 我々は通常空間へと排出された。"
 utopia.3045.3.desc_machine: "最初はゆっくりと、 そして次第に速く、 我々のシュラウドへの掌握が滑り始める。 [GetTelepathPlural]は足場を失い、 機能不全に陥り、 我々は通常空間へと排出された。"
 curse.psi.link.organic: "強力な精神的反動がシュラウドへの接続回路を通って、 [Root.GetSpeciesNamePlural]の間で共有されている公共のサイオニックリンクに流れ込んできた。"
 curse.psi.link.machine: "強大な神経反動がシュラウドとの通路を逆流し、 すべての[Root.GetSpeciesNamePlural]間で共有されている集合的サイオニック・リンクへと流れ込んだ。"
 curse.psi.link: "[GetCursePsiLink]"
 curse.ship.link: "強大な超能力反動がシュラウドとの通路を逆流し、 我々の艦船に影響を与えているようだ。"
 utopia.3050.desc.gestalt: "$curse.psi.link$\n\nこれにより、 [Root.GetName]集合体内に異常が発生し、 帝国全体での不安定化につながっている。"
 utopia.3050.desc.non_gestalt: "$curse.psi.link$\n\nこれは市民の幸福に大きな影響を与え、 現在では[Root.GetName]全体に憂鬱が広がっている。 "
 utopia.3051.desc.gestalt: "$curse.psi.link$\n\nその結果、 集合体全体に衝撃波が広がり、 我々のドローンの間で逸脱した行動が出現するようになった。"
 utopia.3051.desc.non_gestalt: "$curse.psi.link$\n\nこの負のエネルギーは市民の心に疑念を生じさせている。 多くの市民が政府の方針を良しとせず、 新たな急進的思考に染まりつつある。 この影響は超能力をもたない市民にも広まっている！"
 utopia.3052.desc: "$curse.ship.link$\n\nその装甲は脆くなり、 以前のような酷使には耐えられない。"
 utopia.3053.desc.machine: "$curse.psi.link$\n\nこの結果として、 神経ネットワークに負担がかかり、 [Root.GetName]全体のユニット建設能力が著しく低下した。"
 utopia.3053.desc.organic_gestalt: "$curse.psi.link$\n\nこの結果として、 集合体全体に痛みが広がり、 新たな物理ドローンを生産する能力が著しく低下した。"
 utopia.3053.desc.organic_non_gestalt: "$curse.psi.link$\n\nどういうわけか、 これは[Root.GetName]の出生率に悪影響を与えている。 この影響は生まれながらに超能力をもたない種族にも及んでいる！"
 utopia.3054.desc.machine_gestalt: "$curse.psi.link$\n\nこの結果として、 サイオニック・レンダリングのフィードバックループにより、 我々の研究マトリクスが最大効率で稼働することが妨げられている。"
 utopia.3054.desc.machine_non_gestalt: "$curse.psi.link$\n\n我々の研究者の[GetMindPhysicalLoc]が過負荷状態になり、 効率的に作業に集中できなくなっている。"
 utopia.3054.desc.organic_gestalt: "$curse.psi.link$\n\n我々の[Root.GetSpeciesNamePlural]集合体内の研究に特化したノードが過負荷に陥っている。 そのため、 新しい発見を効率的に処理することが困難である。"
 utopia.3054.desc.organic_non_gestalt: "$curse.psi.link$\n\n我々の研究者の[GetMindPhysicalLoc]が曇り、 効率的に作業に集中できなくなっている。"
 utopia.3055.desc: "$curse.psi.link$\n\n我々の影響力の産出が大幅に低下した。"
 utopia.3056.desc.organic_non_gestalt: "$curse.psi.link$\n\nそれまで市民のあいだにあった連帯感が失われている。"
 utopia.3056.desc.machine_or_gestalt: "$curse.psi.link$\n\nかつて[Root.GetName]全体に存在した連帯感が揺らぎ、 広範囲に渡る連携不全を引き起こしている。"
 utopia.3057.desc: "$curse.ship.link$\n\n我々の艦船は、 まるで目に見えない力に阻まれているかのように航行している。 その結果、 亜光速移動速度が大幅に低下した。"
 utopia.3058.desc.organic_non_gestalt: "$curse.psi.link$\n\nこの負のエネルギーは我々の地上軍の士気を蝕み、 戦闘効率を大幅に低下させた。"
 utopia.3058.desc.machine_or_gestalt: "$curse.psi.link$\n\nこのエネルギーの急増によって引き起こされたフィードバックループが、 地上部隊の作戦効率を低下させている。"
 utopia.3059.desc: "強大な超能力反動がシュラウドとの通路を通じて跳ね返り、 星間センサーに干渉しているようだ。\n\nあらゆるソースからのセンサーの解像度が大幅に低下し、 センサー範囲が大幅に縮小した。"
