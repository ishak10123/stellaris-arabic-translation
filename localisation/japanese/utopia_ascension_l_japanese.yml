l_japanese:
 #Ascension and the Shroud
 utopia.2500.name: "肉体は脆弱"
 utopia.2500.desc: "我々はいまや、 先進的なサイバネティック・インプラントの開発技術と量産技術の両方を手にしている。 [Root.GetName]全土の医療センターが、 市民への外科的組み込み処置を開始可能な状態で待機しているのだ。\n\n将来的に、 我々が築く高度技術社会で活躍するには、 神経インプラントと少なくとも基礎レベルのサイバネティクスが必須になるだろう。 したがって、 基本的なサイバネティック強化を組み込む転換プロセスはあらゆる市民にとっての義務となり、 また無償で提供されることになる。"
 utopia.2500.desc.unplugged: "我々はいまや、 先進的なサイバネティック・インプラントの開発技術を手に入れ、 それを量産する技術を考案した。 [Root.GetName]全土の医療センターが、 市民の旧式の強化器官を外科的に取り除き、 新たなハードウェアを移植できる状態で待機しているのだ。 \n\nサイバネティクスは、 はるか昔から我々の生活に無くてはならない存在であり、 今後も我々のやり方で維持されるだろう。 そのため、 基本的なサイバネティクス一式に入れ替えるプロセスがすべての市民に義務付けられ、 無料で提供される。"
 utopia.2500.a: "我々はこの技術を受け入れなければ。"
 utopia.2501.name: "サイバネティック革命"
 utopia.2501.desc: "サイバネティック転換プロセスが完了した！  市民全員が、 神経インプラントと基本的なサイバネティック強化を組み込まれている。 国内で生まれる新たな全市民を段階的に改良していくためのインフラも整備されており、 彼らは早い時点からテクノロジーの恩恵を享受できる。\n\n今後、 わが種族は§H[Root.GetSpeciesNamePlural]§!と呼ばれることになるだろう！"
 utopia.2501.a: "新しい時代の夜明けだ。"
 utopia.2505.name: "[From.Capital.GetName]はサイバネティクスを取り入れた"
 utopia.2505.1.desc: "§Y[From.GetName]§!国内で起こった大規模な変革の話題が飛び交っている。 彼らはサイバネティクス技術を全面的に取り入れたようなのだ。 全市民が基本的なサイバネティックスと神経インプラントを手術によって組み込むことが義務づけられているという。 これにより、 彼らの社会は完全に変化することとなった。 \n\n[From.Capital.GetName]からの報告によれば、 エレベーターやエアカーを操作するといった簡単な行為だけでも、 サイバネティック・インプラントが必要であるらしい。 現に、 種族に起こった変化があまりにも大規模であるがゆえに、 彼らは§H[From.GetSpeciesNamePlural]§!と自称するようになった。"
 utopia.2505.2.desc: "§Y[From.GetName]§!内部には悪が根を下ろしているようだ。 かの星間国家の市民が自らの肉体をすっかりバラバラにして、 生まれながらに授かった肉体の各部位を冒涜的な機械インプラントに置き換えているという、 ゾッとするようなニュースが入ってきた。\n\n彼らは§H[From.GetSpeciesNamePlural]§!と自称するまでに至っているという。 彼らはまたしても、 自らの起源を捨て、 冷たく魂のない科学技術を受け入れるという行為に手を染めたのだ。"
 utopia.2505.2.desc.unplugged: "§Y[From.GetName]§!内部に再び悪が根を下ろしている。 かの星間国家の市民が自らの肉体をすっかりバラバラにして、 生まれながらに授かった数少ない肉体の各部位を、 これまで以上に大々的に、 新しい冒涜的な機械インプラントに置き換えているという、 ゾッとするようなニュースが入ってきた。\n\n彼らは§H[From.GetSpeciesNamePlural]§!と自称するまでに至っているという。 彼らは、 自らの有機生命体としての起源を捨て、 冷たく魂のない科学技術をさらに受け入れるという行為に手を染めたのだ。"
 utopia.2505.b: "これは自然に対する侮辱だ。"
 utopia.2500.unplugged.tt: "§Y$AVAILABLE_BUILDINGS$§!['building:building_augmentation_center']"
 utopia.2550.name: "人工生命への変態"
 utopia.2550.desc: "わが種族の誕生以来、 我々の精神を閉じ込めてきた粗野で有機的な容器を捨てる時が、 ついに到来した。\n\n数々の試行錯誤のすえ、 科学者たちが意識を人工脳に移す方法を開発したのだ。 あとは[Root.GetName]の全市民のための新たな容器をあつらえ、 そこへ個々の意識をまとめてアップロードするだけだ。"
 utopia.2550.a: "我々は不滅を手にした！"
 utopia.2551.name: "人工生命時代"
 utopia.2551.desc: "ようやくだ。 我々を縛りつけていた肉体の檻は排除され、 市民の神経パターンはすべて新しい人工ユニットにアップロードされている。 病気や有機的存在につきものの惨めさは過去のものとなった。\n\n将来の歴史家が、 これをわが文明の、 いやおそらくは銀河全体の新たな時代の始まりとして記録することは間違いない。"
 utopia.2551.a: "過去の我々よりも偉大な存在となった。"
 utopia.2555.1.desc: "サイバネティック・インプラントによって大きく改変された§Y[From.GetName]§!の市民は、 人工アバターに彼らの神経パターンをアップロードした。\n\nこの新たなる機械種族は§H[From.GetSpeciesNamePlural]§!と自称しており、 病気や老化の影響を受けない。 あとは神経アップロード・プロセスの成功度合いを見極めるだけだ……"
 utopia.2555.2.desc: "生まれ持った肉体の尊厳を傷つける行為を追究しつづけていた§Y[From.GetName]§!の人々は、 ついに決定的な堕落に手を染めた――今度は、 自らの精神を生命なき金属の殻に「アップロード」したのだ。\n\nそれが文明全体の大量自殺に等しい行為であると気づかない、 この新たな魂のない機械たちは、 §H[From.GetSpeciesNamePlural]§!と自称するようになっている。 彼らは我々のように自ら考え、 生きている存在であるというふりを、 これからも続ける気らしい。"
 utopia.2555.a: "勝手にやらせろ。"
 utopia.2555.b: "我々は騙されんぞ。"
 utopia.2556.desc: "銀河の住人たちにお知らせする。\n\n君たちが聞いた噂は事実だ。 我々は、 精神を閉じ込めていた欠陥だらけの有機的な肉体を放棄し、 未来を受け入れたのだ。\n\n最小限のデータ損失で、 全市民が新しい人工アバターに神経パターンをアップロードした。 この優れたプラットフォームは、 以前の肉体よりもずっとうまく機能するだろう。\n\n我々の外見は一新されたが、 警戒する必要はない！  より強く、 より早く、 より知的で、 老化しなくなったとはいえ、 我々は以前と同じ存在なのだから。"
 utopia.2556.a: "人工アバター……興味をそそられるな。"
 utopia.2556.b: "魂のない機械など、 我々とは似ても似つかない。"
 utopia.2556.c: "その一新された外見とやらを分解してやろう！"
 utopia.2556.d: "様子を見よう。"
 utopia.2558.desc: "お前たちの堕落ぶりは知っていたが、 今回の狂気的な行為は最悪の想定をも上回った。 脳の不完全なコピーを作って移動可能な人工容器に収めることは、 本質を新たな肉体に移し替えることと同義ではない。 そんなこと不可能なのだ。\n\nお前たちの魂は永久に失われてしまった。 過ちの重大さに気づいているか？  生まれ持った肉体を捨てることは、 お前たち種族全体の集団自殺にほかならない。 もはや種としての希望は完全に潰えたのだぞ……"
 utopia.2558.a: "迷信を信じる愚か者め。"
 access_tradition_tree: "次の伝統ツリーが使用可能になる："
 flesh_is_weak_tooltip: "$access_tradition_tree$['tradition_category:tradition_cybernetics']$TABBED_NEW_LINE$- $REQUIRES_TRADITION_SLOT$\n$UNLOCKS_AGENDA$$council_agenda_agenda_flesh_is_weak_name$。 これによりサイバネティック技術が研究選択肢として付与される。"
 synthetic_evolution_tooltip: "$access_tradition_tree$['tradition_category:tradition_synthetics']$TABBED_NEW_LINE$- $REQUIRES_TRADITION_SLOT$\n$UNLOCKS_AGENDA$$council_agenda_agenda_synthetic_evolution_name$。 これによりロボティクス技術が研究選択肢として付与される。"
 mind_over_matter_tooltip: "$access_tradition_tree$['tradition_category:tradition_psionics']$TABBED_NEW_LINE$- $REQUIRES_TRADITION_SLOT$\n$UNLOCKS_AGENDA$$council_agenda_agenda_mind_over_matter_name$。 これにより超能力技術が研究選択肢として付与される。"
 transcendence_tooltip: "我々の種族全員が、 潜在的な超能力を完全に目覚めさせる。"
 engineered_evolution_tooltip: "$access_tradition_tree$['tradition_category:tradition_genetics']$TABBED_NEW_LINE$- $REQUIRES_TRADITION_SLOT$\n$UNLOCKS_AGENDA$$council_agenda_agenda_engineered_evolution_name$。 これにより遺伝子技術が研究選択肢として付与される。"
 REQUIRES_TRADITION_SLOT: "§Y伝統ツリーの空きスロットが必要§!"
 opinion_cyborgs_fanatic: "邪悪なサイボーグ"
 opinion_cyborgs_normal: "$opinion_cyborgs_fanatic$"
 opinion_synthetics_fanatic: "魂なき機械"
 opinion_synthetics_normal: "$opinion_synthetics_fanatic$"
 triggered_opinion_cyborgs_fanatic: "$opinion_cyborgs_fanatic$"
 triggered_opinion_cyborgs_normal: "$opinion_cyborgs_fanatic$"
 triggered_opinion_synthetics_fanatic: "$opinion_synthetics_fanatic$"
 triggered_opinion_synthetics_normal: "$opinion_synthetics_fanatic$"
 triggered_opinion_synthetics_small: "人工的な存在"
 triggered_opinion_both_hive_mind: "集合意識の同胞"
 triggered_opinion_both_wilderness: "ウィルダネスの同志"
 triggered_opinion_hive_mind: "集合意識"
 utopia.2700.name: "人工進化"
 utopia.2700.desc: "進化には、 ときに正しい方向への後押しが必要だ。 我々はいま、 刻々と変化する環境の試練に耐えるために、 心と肉体をかつてない速度で遺伝子的に改変する技術を手に入れている。"
 utopia.2703.name: "進化の極意"
 utopia.2703.desc: "[Root.GetSpeciesName]の運命が遺伝的抽選という自然の気まぐれで決定され、 その存続が偶然の慈悲によるものだった時代は終わりを告げた。\n\n我々の時代のエンジニアは鉄鋼やコンクリートでなく、 自らの生命そのものの構成要素と向き合っている。 高度な遺伝子改変によって、 我々は国家の未来を確固たるものとする。"
 utopia.2600.name: "物質を超越する精神"
 utopia.2600.desc: "文明の黎明期から、 古い民話のなかでは強力な魔法使いたちが超自然的としか言いようのない力を振るい、 物語に華を添えてきた。 これらの希少な能力をもつ[Root.GetSpeciesNamePlural]は、 他人の心に忍び込んだり、 念じるだけで重いものを持ち上げたりなど、 さまざまな「魔法のような」芸当が可能だったと言われている。 最近までこれらの物語は、 物語でしかなかった。\n\nしかし、 いまや我々の科学者たちは、 [Root.GetSpeciesName]の一部の個体が潜在的に超能力を受け継いでいるという、 決定的な証拠を手にしている。 超能力をもつのは種族全体のごく少数にすぎないようだが、 その数はここ数世紀にわたって着実に増えてきている。\n\nこれがなんらかの突発的な進化に起因するものなのか、 それとも遺伝子のなかに眠っていた潜在的な超能力が目覚めたのか、 科学者にもわかっていない。"
 utopia.2600.desc.unplugged: "我々の文明はまだ歴史が浅く、 かつ波乱に満ちているが、 そんななかでも我々[root.GetSpeciesNamePlural]は想像力の翼を羽ばたかせ、 架空の物語を楽しんできた。 そのなかで繰り返し語られてきたのが、 超自然的な力を持つ強力な魔法使いたちの物語である。 魔法使いたちは心を読んだり、 念じるだけで重い物を持ち上げたり、 数々の「魔法」のような技を使う。 \n\n多くの者は、 こうした物語は我々が同化される前からあるもので、 我々種族の集合意識の中にあると考えている。 ほとんどの[root.GetSpeciesNamePlural]は、ごく最近までこれを単なる願望だとして一蹴してきた。 しかし今、 科学者たちが、 特定の[root.GetSpeciesAdj]個体に超能力が内在しているという決定的な証拠を見つけた。 \n\n超能力を持つのはごく少数の者のようだが、 遺伝学研究によれば、 その数はここ数世紀で着実に増加しているようだ。 これが突然の進化的変異によるものなのか、 [origin_unplugged_assimilator_empire.GetName]からの干渉によるものなのかは、 科学者たちにもまだわかっていない。"
 utopia.2600.a: "未来への糸口を捕まえたのかもしれない。"
 utopia.2602.name: "[From.GetSpeciesNamePlural]が潜在的超能力を発現"
 utopia.2602.1.desc.1.non_gestalt_intro: "ある者が後天的な超能力に目覚め始めている。"
 utopia.2602.1.desc.1.non_gestalt_outro: "§H[From.GetName]§!当局から漏洩した報告によると、 これは比較的最近の出来事であるに違いない。 なぜなら、 [From.GetSpeciesNamePlural]が超能力を発揮したという記録は存在しないのだ。"
 utopia.2602.1.desc.1.organic_non_gestalt: "$utopia.2602.1.desc.1.non_gestalt_intro$ その者は[From.GetSpeciesName]種族に属しており、 $utopia.2602.1.desc.1.non_gestalt_outro$"
 utopia.2602.1.desc.1.machine_non_gestalt: "[From.GetSpeciesName]メカノタイプの$utopia.2602.1.desc.1.non_gestalt_intro$、 $utopia.2602.1.desc.1.non_gestalt_outro$"
 utopia.2602.1.desc.1.gestalt_intro: "§H[From.GetName]§!当局から漏洩した報告によると、 ある[From.GetSpeciesNamePlural]に潜在的な超能力が現れ始めている。"
 utopia.2602.1.desc.1.gestalt_outro: "既存の記録には存在しない超能力について記述されている。"
 utopia.2602.1.desc.1.organic_gestalt: "$utopia.2602.1.desc.1.gestalt_intro$ 種族間の認知的つながりは目新しいものではない一方、 これらの報告書では、$utopia.2602.1.desc.1.gestalt_outro$"
 utopia.2602.1.desc.1.machine_gestalt: "$utopia.2602.1.desc.1.gestalt_intro$ 彼らの種族間の神経ネットワークによるコミュニケーションは目新しいものではない一方、 これらの報告書では、$utopia.2602.1.desc.1.gestalt_outro$"
 utopia.2602.1.desc.2.intro: "このような力は、 現在のところ、"
 utopia.2602.1.desc.2.outro: "報告書には、この現象について何も説明されていない。"
 utopia.2602.1.desc.2.organic: "$utopia.2602.1.desc.2.intro$[From.GetSpeciesName]種全体に対してごく少数に限られている。$utopia.2602.1.desc.2.outro$"
 utopia.2602.1.desc.2.machine: "$utopia.2602.1.desc.2.intro$ [From.GetSpeciesNamePlural]種全体に対してごく少数に限られている。 $utopia.2602.1.desc.2.outro$"
 utopia.2602.1.desc.machine_gestalt: "$utopia.2602.1.desc.1.machine_gestalt$\n\n$utopia.2602.1.desc.2.machine$"
 utopia.2602.1.desc.machine_non_gestalt: "$utopia.2602.1.desc.1.machine_non_gestalt$\n\n$utopia.2602.1.desc.2.machine$"
 utopia.2602.1.desc.organic_gestalt: "$utopia.2602.1.desc.1.organic_gestalt$\n\n$utopia.2602.1.desc.2.organic$"
 utopia.2602.1.desc.organic_non_gestalt: "$utopia.2602.1.desc.1.organic_non_gestalt$\n\n$utopia.2602.1.desc.2.organic$"
 utopia.2602.2.desc: "我々の領土内の[From.GetSpeciesName]の市民にも同様の変化が見られ始めているため、 彼らの種族間に起こっていることは宇宙の特定の領域に限定されるものではない。"
 utopia.2602.a.organic_non_gestalt: "なんと奇妙な。"
 utopia.2602.a.hive_or_machine_non_gestalt: "特別な力？  疑わしい。"
 utopia.2602.a.machine_gestalt: "理解できない。"
 utopia.2602.b: "超能力だと？  くだらん！"
 utopia.2602.c: "連中の魔法は、 自分たちの窮地を救うには力不足だろうな。"
 utopia.2602.d.organic: "よし……彼らの超能力の放射を感じるぞ。"
 utopia.2602.d.machine: " よし……彼らの超能力の周波数を確認した。"
 utopia.2605.name.organic_non_gestalt: "[psionic_leader.GetTitle]が超能力者であることが判明"
 utopia.2605.name.machine_non_gestalt: "[psionic_leader.GetTitle]が超能力者であることを特定"
 utopia.2605.name.gestalt: "[psionic_leader.GetName]が超能力者であることを特定"
 utopia.2605.desc.organic_non_gestalt: "超能力が成人後に現れるのは稀であるが、 ありえないというわけではない。 [psionic_leader.GetTitle][psionic_leader.GetName]は最近、 超能力のような力を示し始めた。 徹底的なESPテストの結果、 [psionic_leader.GetSheHe][psionic_leader.GetHasHave]は、 クラス4の超能力者であることが判明した。"
 utopia.2605.desc.machine_non_gestalt: "稀ではあるが、 超能力は、 従来その発現が確認されていなかったユニットにも顕れることがある。 [psionic_leader.GetTitle][psionic_leader.GetName]は最近、 超能力に分類されうる機能を示した。 徹底的な検査の結果、 [psionic_leader.GetSheHe][psionic_leader.GetHasHave]は、 クラス4のサイオニックユニットであることが確認された。"
 utopia.2605.desc.gestalt: "新たに発見した力の影響は、 日ごとに増大している。 我々の[GetBrainName]の器である[psionic_leader.GetName]は最近、 超能力に分類されうる能力を示した。 徹底的な検査の結果、 [psionic_leader.GetSheHe][psionic_leader.GetHasHave]は、 クラス4の[GetPsychicNoun]であることが確認された。"
 utopia.2605.a: "新たな能力は我々の役に立つだろう。"
 utopia.2652.name: "[This.GetSpeciesNamePlural]が超能力に覚醒"
 utopia.2652.desc.1.intro: "銀河全体の[This.GetSpeciesNamePlural]が大きな変化を遂げた。 これまで、 後天的超能力は"
 utopia.2652.desc.1.outro: "潜在的超能力を完全に解き放った。"
 utopia.2652.desc.1.organic: "$utopia.2652.desc.1.intro$ごく少数にしか開花しなかったが、 今では種族全体が$utopia.2652.desc.1.outro$"
 utopia.2652.desc.1.machine: "$utopia.2652.desc.1.intro$ごく少数にしか現れなかったが、 今ではその種族全体が$utopia.2652.desc.1.outro$"
 utopia.2652.desc.2.non_gestalt: "こうした変化は[From.GetName]を起源としているようだが、 現在では場所に関係なく[GetSpeciesWord]のすべての個体に現れている。"
 utopia.2652.desc.2.organic_non_gestalt: "$utopia.2652.desc.2.non_gestalt$\n\n強力な超能力を一連の形で示すだけでなく、 [This.GetSpeciesNamePlural]はお互いに言葉によるコミュニケーションを捨て、 テレパシーを利用するようになった。"
 utopia.2652.desc.2.machine_non_gestalt: "$utopia.2652.desc.2.non_gestalt$\n\n$utopia.2652.desc.2.machine_gestalt$"
 utopia.2652.desc.2.gestalt.intro: "強力な超能力を一連の形で示すだけでなく、 すべての[This.GetSpeciesNamePlural]は"
 utopia.2652.desc.2.organic_gestalt: "$utopia.2652.desc.2.gestalt.intro$既存のチャネルを超えて非言語的なコミュニケーションが可能になった。"
 utopia.2652.desc.2.machine_gestalt: "$utopia.2652.desc.2.gestalt.intro$既存の集合体チャンネルを超えたコミュニケーションが可能になった。"
 utopia.2652.desc.organic_non_gestalt: "$utopia.2652.desc.1.organic$\n\n$utopia.2652.desc.2.organic_non_gestalt$"
 utopia.2652.desc.machine_non_gestalt: "$utopia.2652.desc.1.machine$\n\n$utopia.2652.desc.2.machine_non_gestalt$"
 utopia.2652.desc.organic_gestalt: "$utopia.2652.desc.1.organic$\n\n$utopia.2652.desc.2.organic_gestalt$"
