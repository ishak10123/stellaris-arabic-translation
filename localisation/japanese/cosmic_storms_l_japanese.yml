 cstorms.2000.name: "嵐の準備"
 cstorms.2000.desc_common_1: "我々は現在、 §H[target.solar_system.GetName]§!星系におり、 §Y$default_storm$§!を発生させる準備を開始する態勢が整っている。\n\n一時的に[target.GetName]をスーパーチャージすることで、 望ましい天体気象反応を引き起こす条件を作り出せる。"
 cstorms.2000.desc_tech: "\n高度なエネルギー操作方法を用いれば、 [target.GetName]を原材料で飽和状態にし、 より構造的に複雑な嵐を形成することができる。"
 cstorms.2000.desc_common_2: "\nこれは多大な時間を要するが、 最終的には[owner.GetName]にとって偉大な成果となる。 作戦が完了した後も、 星自体は以前の状態のままである。"
 cstorms.2000.a: "恒星をスーパーチャージしろ。"
 cstorms.2000.a.tt: "$approach_situation_initiate_storm_supercharge_tt$"
 cstorms.2000.b: "スターを飽和させる。"
 cstorms.2000.b.tt: "$approach_situation_initiate_storm_overfeed_tt$"
 cstorms.2000.b.tt.allow: "以下のいずれかが必要$TABBED_NEW_LINE$$TRIGGER_FAIL$$approach_situation_initiate_storm_agitate$$TABBED_NEW_LINE$$t$$TRIGGER_FAIL$£physics£§Y$tech_basic_science_lab_3$§!技術を持っている$TABBED_NEW_LINE$$t$$TRIGGER_FAIL$$must_have_access_to_volatile_motes_tt$$TABBED_NEW_LINE$$TRIGGER_FAIL$$approach_situation_initiate_storm_destabilize$$TABBED_NEW_LINE$$t$$TRIGGER_FAIL$£physics£§Y$tech_mine_dark_matter$§!技術を持っている$TABBED_NEW_LINE$$TRIGGER_FAIL$$approach_situation_initiate_storm_scramble$$TABBED_NEW_LINE$$t$$TRIGGER_FAIL$£physics£§Y$tech_hyper_drive_3$§!技術を持っている$TABBED_NEW_LINE$$t$$TRIGGER_FAIL$$must_have_access_to_rare_crystals_tt$"
