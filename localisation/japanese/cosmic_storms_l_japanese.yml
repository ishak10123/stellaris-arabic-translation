 PRESCRIPTED_ruler_name_yatunan_radicals: "$HUM4_CHR_Hem$ $HUM4_CHR_talGun$"
 gov_storm_chasers: "長老評議会"
 gov_storm_chasers_desc: "この最上位の統治評議会は、 高い身体能力で命懸けの行為に挑む者たちで構成されている。 険峻な山を登ったり、 巨大な波に乗ったりなど、 彼らは生を実感できる体験を追い求めることに生涯を捧げる。 そうして彼らはコミュニティからの信頼を獲得し、 進むべき道を示す権利を得たのである。\n\n評議会のメンバーは、 年齢に関係なく“長老”と呼ばれる。 これは彼らの達成した伝説的な偉業によるものであり、 その名は長きにわたって記憶される。"
 RT_ELDER_SPEAKER: "長老評議会議長"
 RT_ELDER_SPEAKER_FEMALE: "$RT_ELDER_SPEAKER$"
 #Ascension Perk
 ap_weather_control: "銀河の天候制御"
 ap_weather_control_desc: "天体気象学における最新の進歩により、 我々は宇宙嵐を故意に発生させられるようになった。 適切な技術があれば、 嵐の種類さえも選択できる。"
 requires_technology_tech_advanced_storm_manipulation: "$TRIGGER_FAIL$£physics£ §Y$tech_advanced_storm_manipulation$§!の技術が必要。"
 #Storm Tooltips
 cosmic_storm_planet_modifiers: "§H惑星補正§!"
 cosmic_storm_fleet_modifiers: "§H艦隊補正§!"
 cosmic_storm_country_modifiers: "§H帝国補正§!"
 cosmic_storm_ship_modifiers: "§H艦船補正§!"
 cosmic_storm_system_modifiers: "§H星系補正§!"
 cosmic_storm_forecast_indicator_header: "宇宙嵐が間もなく到来"
 celestial_storm_tt: "- $celestial_storm$は星系の§Y$intel$§!を下げ、 艦隊が閉鎖された国境を越えることを可能にする。"
 solar_storm_tt: "- $solar_storm$は影響を受けた星系内のすべての艦隊を表示する。"
 electric_storm_fleet_tt: "- $MOD_SHIP_SHIELD_REGEN_ADD_PERC$は艦船とステーションで§R無効化§!されている！\n- 1ヶ月あたりに§R$@storm_monthly_dmg_low|0$§!$MOD_SHIP_SHIELD_ADD$ダメージを艦船とステーションに与える。"
 particle_storm_fleet_tt: "- $MOD_SHIP_HULL_REGEN_ADD_PERC$、 $MOD_SHIP_ARMOR_REGEN_ADD_PERC$、 そして$MOD_SHIP_SHIELD_REGEN_ADD_PERC$は、 艦船とステーションで§R無効化§!されている！\n- $@storm_hp_perc_limit|0Y%$$HITPOINTS$HP以上の船とステーションに、1ヶ月あたりに§R$@storm_monthly_dmg_low|0$§!ダメージを与える。- \n$@storm_hp_perc_limit|0Y%$$HITPOINTS$HP以下の船から、§G+$@particle_storm_unity_per_ship|0$§!£unity£$unity$入手する。"
 gravity_storm_consumer_goods_upkeep_tt: "植民地の所有者がゲシュタルト意識帝国でない場合：\n$t$[farmer.GetIcon][GetFarmerPlural]、 [miner.GetIcon][GetMinerPlural]および[technician.GetIcon][GetTechnicianPlural]の$r_consumer_goods$維持費：§R+1§!"
 gravity_storm_energy_upkeep_tt: "植民地の所有者がゲシュタルト意識帝国である場合：\n$t$[farmer.GetIcon][GetFarmerPlural]、 [miner.GetIcon][GetMinerPlural]、 および[technician.GetIcon][GetTechnicianPlural]の$r_energy$維持費：§R+1§!"
 gravity_storm_ship_tt: "- 艦船サイズごとに§R$@gravity_storm_dmg_malus|1%$§!$MOD_SHIP_WEAPON_DAMAGE$"
 nexus_storm_fleet_tt: "- $MOD_SHIP_HULL_REGEN_ADD_PERC$、 $MOD_SHIP_ARMOR_REGEN_ADD_PERC$、 そして$MOD_SHIP_SHIELD_REGEN_ADD_PERC$は、 艦船とステーションで§R無効化§!されている！\n- $@storm_hp_perc_limit|0Y%$$HITPOINTS$HP以上の船とステーションに、1ヶ月あたりに§R$@storm_monthly_dmg_high|0$§!ダメージを与える。"
 shroud_storm_ship_evasion_modifier_tt: "- 帝国が§Yシュラウド§!に突入すると、$MOD_SHIP_EVASION_MULT$が§G+$@shroud_storm_evasion|0%$§!。"
 shroud_storm_ship_damage_modifier_tt: "- 帝国が§Yシュラウド§!に突入すると、$MOD_SHIP_WEAPON_DAMAGE$が§G+$@shroud_storm_damage|0%$§!。"
 #Modding Localizations
