 #The Tempest Invocator
 r_the_tempest_invocator: "宇宙嵐励起装置"
 r_the_tempest_invocator_desc: "この装置に秘められた力は電源が入っていなくとも明らかだ。 この装置は、 わが国で最も優秀な者の激情を呼び起こし、 嵐に変化させてしまう。 帝国の栄光のためなら、 それも必要な犠牲かもしれない。"
