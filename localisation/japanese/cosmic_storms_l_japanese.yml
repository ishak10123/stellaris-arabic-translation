 #Eye of the Storm
 cstorms.1801.name: "嵐の目"
 cstorms.1801.desc: "[from.GetName]で猛威を振るっている[fromfrom.GetName]の目をスキャンしたところ、 異常を検出した。 嵐の中心に不思議な物質があるのだ。 この異常な観測値は、 嵐が消散したり、星系を離れたりする前に、 詳しく調査する必要がある。"
 EYE_OF_THE_STORM_PROJECT: "$cstorms.1801.name$"
 EYE_OF_THE_STORM_PROJECT_DESC: "[this.GetName]の[fromfrom.GetName]をスキャンしたところ、渦の内側に大きな物質を抱えているようだ。 長距離センサーは、 この異常現象について決定的な答えを出すことができなかった。 理解を深めるためには、嵐の目への実地調査が必要だ。"
 cstorms.1805.name: "大渦の中へ"
 cstorms.1805.desc: "[from.GetName]の宇宙嵐の目に突入することによって、 [leader.GetName]は異常なスキャンの原因を突き止めた。 異常な嵐は、 中心にある大量の[from.star.GetEarnedResources]を動力源としているのだった。\n\n調査船は、 激しく放出される前に集められるだけ資源を収穫した。 僅かな収穫から得られるセンサーデータは、 過激な嵐の条件下で船の性能を向上させる上で、 エンジニアの役に立つだろう。"
 cstorms.1805.desc.traumatized: "残念ながら、 この危険な任務は[leader.GetName]に後を引く影響を与えた。"
 energy_lower: "エネルギー"
 exotic_gases_lower: "エキゾチックガス"
 volatile_motes_lower: "揮発性粉末"
 alloys_lower: "合金"
 minerals_lower: "鉱物"
 zro_lower: "ズィロ"
 living_metal_lower: "生体金属"
