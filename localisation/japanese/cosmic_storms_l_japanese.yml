 MESSAGE_PARTICLE_STORM_COSMIC_STORM_SPOTTED_TITLE: "$particle_storm$を検知！"
 #Storm Visible Events
 MESSAGE_COSMIC_STORM_SPOTTED_DESC: "我々のスキャナーは$TYPE|Y$タイプの宇宙嵐を検知した！ 我々はこれを「$NAME|Y$」と命名した。\n\n"
 MESSAGE_COSMIC_STORM_SPOTTED_EVENT_CONFIRM: "興味深い。"
 MESSAGE_STORM_INTRO: "この宇宙嵐は植民地に壊滅的な被害をもたらし、艦隊の緊急FTLへのアクセスを妨げるだろう。 予め対策を講じることが強く推奨される。\n\n"
 MESSAGE_ELECTRIC_STORM_COSMIC_STORM_SPOTTED_DESC: "$MESSAGE_COSMIC_STORM_SPOTTED_DESC$$MESSAGE_STORM_INTRO$嵐がもたらす極度の電荷は、 我々の艦隊のシールドシステムに危険をもたらすだろう。 しかし、 嵐に存在する豊富なエネルギーにより、 植民地の生産と艦船の速度が大幅に増加すると予想できる。"
 MESSAGE_SOLAR_STORM_COSMIC_STORM_SPOTTED_DESC: "$MESSAGE_COSMIC_STORM_SPOTTED_DESC$$MESSAGE_STORM_INTRO$この嵐がもたらす放射線により、 その嵐をスキャナーで探知している人なら誰でも、 その嵐に巻き込まれた艦隊を視認できる。 これはセキュリティ上のリスクを伴うが、 このような状況下では、 ステーションはより効率的に運営される。"
 MESSAGE_CELESTIAL_STORM_COSMIC_STORM_SPOTTED_DESC: "$MESSAGE_COSMIC_STORM_SPOTTED_DESC$$MESSAGE_STORM_INTRO$この種の嵐は、 我々のセンサーを妨害し、 システム内の他の艦隊を検出できなくなり、宇宙航行の速度が遅くなる。 このようなリスクがあるにもかかわらず、 我々はこの状況を有利に利用し、 嵐の期間中、 特定の作業の生産性を向上できるはずだ。"
 MESSAGE_NEXUS_STORM_COSMIC_STORM_SPOTTED_DESC: "$MESSAGE_COSMIC_STORM_SPOTTED_DESC$$MESSAGE_STORM_INTRO$この種の嵐は、 我々の植民地、 艦隊、ス テーションに極めて大きな危険をもたらす。 嵐が過ぎ去るまで、 甚大な被害を受けるだろう。"
 MESSAGE_SHROUD_STORM_COSMIC_STORM_SPOTTED_DESC: "$MESSAGE_COSMIC_STORM_SPOTTED_DESC$$MESSAGE_STORM_INTRO$この嵐における強力なサイオニック・エネルギーは、 我々の植民地の安定度を著しく低下させるが、 艦隊の回避の有効性を高めるだろう。"
 MESSAGE_SHROUD_STORM_COSMIC_STORM_SPOTTED_SHROUD_BREACHED_DESC: "$MESSAGE_COSMIC_STORM_SPOTTED_DESC$$MESSAGE_STORM_INTRO$この嵐における強力なサイオニック・エネルギーは、 我々の植民地の安定度を著しく低下させるだろう。 しかし、 シュラウドの航行に関する我々の知識は、 艦隊とテレパスの有効性を高めるだろう。\n\nシュラウドが揺らいでいる... 我々はあらゆる事態に備えなければならない。"
 MESSAGE_GRAVITY_STORM_COSMIC_STORM_SPOTTED_DESC: "$MESSAGE_COSMIC_STORM_SPOTTED_DESC$$MESSAGE_STORM_INTRO$この嵐の重い重力の影響により、 艦隊の作戦遂行は徐々に困難になり、 大型艦船が最も大きなリスクにさらされるだろう。\n\nこうした問題があるにもかかわらず、 植民地は、 この極端な環境を有利に活用し、 特定の作業の効率を高めることができるだろう。"
 MESSAGE_MAGNETIC_STORM_COSMIC_STORM_SPOTTED_DESC: "$MESSAGE_COSMIC_STORM_SPOTTED_DESC$$MESSAGE_STORM_INTRO$この嵐の極度の磁力が、 我々の艦隊と構造維持システムを混乱させるだろう。\n\nこの嵐の磁力が、 我々の高度な合金技術に予期せぬ相乗効果をもたらした。 この相互作用により、 この嵐が続く間、 我々の合金技術者にかかるコストを削減できるはずだ。"
 MESSAGE_PARTICLE_STORM_COSMIC_STORM_SPOTTED_DESC: "$MESSAGE_COSMIC_STORM_SPOTTED_DESC$$MESSAGE_STORM_INTRO$この嵐の微粒子デブリの密度は、 艦船やステーションに壊滅的な影響を及ぼし、 シールドの再生を完全に無効化するだろう。 この嵐の内部にとどまる勇敢な艦隊は、 非常に危険な環境に備えるべきである。"
