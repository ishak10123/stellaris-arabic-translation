 CLICK_TO_SELECT_LEADER: "§Gクリックでリーダーを選択§!"
 LEADER_SELECTION: "リーダーの選択"
 TEMPEST_INVOCATOR_VIEW_HEADER: "宇宙嵐の生成"
 TEMPEST_INVOCATOR_VIEW_BODY: "この装置に秘められた力は電源が入っていなくとも明らかだ。 勇気を出して起動すれば、 宇宙嵐の力は我々のものとなる。 \n\n場所を選択し、 $nexus_storm_color_tooltip$を発生させる。"
 #Tutorial Localisation
 cstorms_tutorial.a: "了解。"
 cstorms_tutorial.1.name: "チュートリアル：宇宙嵐の操作"
 cstorms_tutorial.1.desc: "§Y$default_storm$§!の§S進路§!を§S操作§!し、 帝国のために使うことができます。 我々の星系から嵐を§S逸らす§!ことも、 §S引き寄せて§!その有益な効果を利用することも可能です。"
 TUTORIAL_STORM_FORECAST_MAP_MODE_TITLE: "チュートリアル：気象予測"
 TUTORIAL_STORM_FORECAST_MAP_MODE_DESC: "マップモードは、 銀河内に存在する§S宇宙嵐§!と、 その影響に関する情報をわかりやすく視覚化します。\n\n£storm_forecast_map£\n\n右下のマップアイコンをクリックすると、 気象予報マップモードが開きます。\n\n技術が進歩すれば、 §S$default_storm$§!の位置と進路、 および発生が予想される嵐のタイプについて、 より正確に予測できるようになります。"
 concept_weather_forecasting_mode: "気象予測モード"
 concept_weather_forecasting_mode_desc: "$TUTORIAL_STORM_FORECAST_MAP_MODE_DESC$"
 TUTORIAL_STORM_PROTECTION_TITLE: "チュートリアル：宇宙嵐"
 TUTORIAL_STORM_PROTECTION_DESC: "§S宇宙嵐§!は恐るべき自然の猛威です。 帝国の艦隊や経済、 そして国民にまで壊滅的な影響を与える可能性がありますが、 大きなチャンスをもたらすこともあります。\n\n§S宇宙嵐関連技術§!を研究することで、 嵐のマイナスの§S影響§!を大幅に§S軽減§!する建造物や技術が利用可能になります。 §Sさらに研究を進めれば§!、 嵐を使って他国の§S優位§!に立つことさえ可能になるでしょう。"
