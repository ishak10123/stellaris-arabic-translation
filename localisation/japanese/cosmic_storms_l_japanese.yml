 cstorms.2010.name: "ストーム較正"
 cstorms.2010.desc_irradiate_only: "§H[target.solar_system.GetName]§!星系における$default_storm$の準備は、 極めて重要な段階に達した。 次の段階では、 §H[target.GetName]§!の太陽風を操作して§Y$solar_storm$§!を形成するため、 さらなる注力と新たな資源の投入が必要になる。"
 cstorms.2010.desc_others: "§H[target.solar_system.GetName]§!星系における$default_storm$の準備は、 重大な局面を迎えている。 次の段階は重大で、 今まで以上に集中的な資源の投入が必要となる。"
 cstorms.2010.a: "太陽風を強化しろ。"
 cstorms.2010.a.tt: "$approach_situation_initiate_storm_irradiate_tt$\nコスト$@irradiate_alloy_upkeep|0$$r_alloys$毎月、$@default_monthly_progress$進捗/毎月"
 cstorms.2010.b: "電子場を切断しろ。"
 cstorms.2010.b.tt: "$approach_situation_initiate_storm_sever_tt$\nコスト$@sever_energy_upkeep|0$$r_energy$毎月、$@default_monthly_progress$進捗/毎月"
 cstorms.2010.c: "イオンを磁化しろ。"
 cstorms.2010.c.tt: "$approach_situation_initiate_storm_magnetize_tt$\nコスト$@magnetize_mineral_upkeep|0$$r_minerals$毎月、$@default_monthly_progress$進捗/毎月"
 cstorms.2010.d: "プロジェクトを放棄しろ。"
 cstorms.2015.name: "$cstorms.2010.name$"
 cstorms.2015.desc_one_tech_only: "§H[target.solar_system.GetName]§!星系における$default_storm$の準備は、 極めて重要な段階に達した。 [storm_researcher.GetName]の次の段階では、 [target.GetName]の膨れ上がった状態をうまく活用するために、 さらなる注力と新たな資源の投入が必要になる。"
 cstorms.2015.desc_others: "§H[target.solar_system.GetName]§!星系における$default_storm$の準備は、 重大な局面を迎えている。 [storm_researcher.GetName]の次の段階は重大で、 [target.GetName]の膨れ上がった状態をうまく活用したいなら、 今まで以上に集中的に資源を投入する必要がある。"
 cstorms.2015.a: "粒子を攪拌しろ。"
 cstorms.2015.a.tt: "$approach_situation_initiate_storm_agitate_tt$\nコスト$@rare_resource_upkeep|0$$r_volatile_motes$毎月、$@default_monthly_progress$進捗/毎月"
 cstorms.2015.b: "重力場を不安定にしろ。"
 cstorms.2015.b.tt: "$approach_situation_initiate_storm_destabilize_tt$\nコスト$@rare_resource_upkeep|0$$r_dark_matter$毎月、$@default_monthly_progress$進捗/毎月"
 cstorms.2015.c: "宇宙塵をかき混ぜろ。"
 cstorms.2015.c.tt: "$approach_situation_initiate_storm_scramble_tt$\nコスト$@rare_resource_upkeep|0$$r_rare_crystals$毎月、$@default_monthly_progress$進捗/毎月"
 cstorms.2015.d: "$cstorms.2010.d$"
 cstorms.storm_gathered.final_word: "$default_storm$の力を利用することは、 並大抵のことではなかった。 我々はついに、 努力の末に待ち望んでいた成果を手にすることができる。"
 cstorms.storm_gathered.a: "素晴らしい！"
 cstorms.2020.name: "嵐を解き放つ"
 cstorms.2020.desc: "§H[target.GetName]§!の強まった太陽風は臨界点に到達した。\n\n我々は今まさに§Y$solar_storm$§!を解き放とうとしている。\n\n$cstorms.storm_gathered.final_word$"
 cstorms.2025.name: "$cstorms.2020.name$"
 cstorms.2025.desc: "§H[target.GetName]§!の電子場が完全に断ち切られた。\n\n我々は今まさに§Y$electric_storm$§!を解き放とうとしている。\n\n$cstorms.storm_gathered.final_word$"
 cstorms.2030.name: "$cstorms.2020.name$"
 cstorms.2030.desc: "§H[target.GetName]§!のイオンは正常に磁化された。\n\n我々は今まさに§Y$magnetic_storm$§!を解き放とうとしている。\n\n$cstorms.storm_gathered.final_word$"
 cstorms.2035.name: "$cstorms.2020.name$"
 cstorms.2035.desc: "§H[target.GetName]§!の飽和粒子は限界点に到達している。\n\n我々は今まさに§Y$particle_storm$§!を解き放とうとしている。\n\n$cstorms.storm_gathered.final_word$"
 cstorms.2040.name: "$cstorms.2020.name$"
 cstorms.2040.desc: "§H[target.GetName]§!の重力場は十分に不安定化された。\n\n我々は今まさに§Y$gravity_storm$§!を解き放とうとしている。\n\n$cstorms.storm_gathered.final_word$"
 cstorms.2045.name: "$cstorms.2020.name$"
 cstorms.2045.desc: "§H[target.GetName]§!の宇宙塵は完全に攪拌された。\n\n我々は今まさに§Y$celestial_storm$§!を解き放とうとしている。\n\n$cstorms.storm_gathered.final_word$"
 ### Aftermath Deposits ###
 d_magnetic_storm_1_minerals: "磁化された鉱石"
 d_magnetic_storm_1_minerals_desc: "宇宙嵐が通過したことにより、 これまで未採掘だった膨大な量の鉱床が磁化された。 これらの新しい資源の採掘作業が非常に容易になった。"
 d_magnetic_storm_2_alloys: "嵐に鍛えられたファウンドリー"
 d_magnetic_storm_2_alloys_desc: "この惑星を襲った宇宙嵐が過ぎ去った後、 かなりの数のファウンドリー設備が奇妙なチャージ状態となった。 その仕組みは完全に理解できていないものの、 合金生産は大幅に改善された。"
 d_magnetic_storm_3_mix: "空に浮かぶ高原"
 d_magnetic_storm_3_mix_desc: "通過する宇宙嵐の重力の影響で磁化された浮遊大陸は、 既存の工業団地の上空で直接操縦することができる。"
 cstorms.8000.title: "宇宙の変異"
 cstorms.8000.desc: "通り過ぎた宇宙嵐は、 単なる荒廃以上の爪痕を残した。[Planet.GetName]では、 まったく新しい地形が作り出された。"
 cstorms.8000.a: "面白い。"
 d_electric_storm_1_engineering: "雷に打たれた廃墟"
 d_electric_storm_1_engineering_desc: "通り過ぎた激しい宇宙嵐によって、 活気のあった入植地が落雷に襲われた廃墟へと変わり、 ありふれた建材が珍しい化合物へと変質した。"
 d_electric_storm_2_unity: "惑星の傷跡"
 d_electric_storm_2_unity_desc: "通り過ぎた宇宙嵐が、 惑星に集中的な被害をもたらした。 その痕跡は、 宇宙から見て分かるほどだ。"
 d_electric_storm_3_physics: "無言の艦隊"
 d_electric_storm_3_physics_desc: "通り過ぎた宇宙嵐により、 無数の民間船のナビゲーションシステムが破壊され、 最も被害の大きかった地域は、 壊れた船体や機械の残骸が散乱する不気味な墓地と化した。"
 d_particle_storm_1_society: "嵐で荒廃した郊外"
 d_particle_storm_1_society_desc: "宇宙嵐によって、 我々の郊外のいくつかが廃墟と化し、 遺跡の研究にしか適さないものにしてしまった。"
 d_particle_storm_2_unity: "ビッグ・ワン"
 d_particle_storm_2_unity_desc: "宇宙嵐は、 この惑星に巨大なクレーターを残した。 それは、 宇宙が我々の存在に無関心であることを残酷に思い知らせるものである。"
 d_particle_storm_3_motes: "不安な平面"
 d_particle_storm_3_motes_desc: "宇宙嵐によって、 いくつかの広大な領域で地殻変動が多い地域となった。 地域の危険度は高まったが、同時に揮発性粉末も増加した。"
 particle_storm_aftermath_1_tt: "ロボットのアセンブリ速度§R-40%§!\n£minerals£職業からの§Y鉱物§!：§R-10%§!\nPOPからの£volatile_motes£§Y揮発性粉末：§!§G+0.02§!"
 particle_storm_aftermath_2_tt: "ロボットのアセンブリ速度§R-50%§!\n£minerals£職業からの§Y鉱物§!：§R-20%§!\nPOPからの£volatile_motes£§Y揮発性粉末：§! §G+0.04§!"
 particle_storm_aftermath_3_tt: "ロボットのアセンブリ速度§R-60%§!\n£minerals£職業からの§Y鉱物§!：§R-30%§!\nPOPからの£volatile_motes£§Y揮発性粉末：§!§G+0.06§!"
 d_solar_storm_1_energy: "オゾン層破壊"
 d_solar_storm_1_energy_desc: "宇宙嵐がこの惑星の大気中のオゾン層に穴を開けた。 我々の生活の質は著しく損なわれたが、 生産の質は向上した。"
 d_solar_storm_2_districts: "放射線を受けた高地"
 d_solar_storm_2_districts_desc: "宇宙嵐は、 この惑星の高地を放射線で覆い、 エネルギー生産にふさわしい崇高な大地を作り出した。"
 d_solar_storm_3_output: "輝く砂漠"
 d_solar_storm_3_output_desc: "宇宙嵐によって砂漠全体が輝くようになった。 恐ろしい光景だが、 十分な安全策を講じれば、 経済的に成り立つ観光地に変えることができる。"
 d_celestial_storm_1_mines: "結晶の針"
 d_celestial_storm_1_mines_desc: "通過する宇宙嵐の荒々しい爆風が、 鋭く尖った結晶が大地を覆った。 この土地は危険だが、 利益を得られる可能性がある。"
 d_celestial_storm_2_society: "歴史的堆積物"
 d_celestial_storm_2_society_desc: "通り過ぎた宇宙嵐が、 堆積物の層全体を吹き飛ばし、 その下からこれまで研究できなかった古い時代の痕跡が現れた。"
 d_celestial_storm_3_crystal: "星屑の砂丘"
 d_celestial_storm_3_crystal_desc: "通り過ぎた宇宙嵐が、 この惑星を大きな波のように襲った。 その跡には、 きらめく星屑の砂丘からなる幽玄な風景が残された。"
 celestial_storm_aftermath_1_tt: "惑星の犯罪：§R+10%§!\n£food£職業からの§Y食料§!：§R-10%§!\nPOPからの£rare_crystals£§Yレアクリスタル§!：§G+0.02§!"
 celestial_storm_aftermath_2_tt: "惑星の犯罪：§R+20%§!\n£food£職業からの§Y食料§!：§R-20%§!\nPOPからの£rare_crystals£§Yレアクリスタル§!：§G+0.04§!"
 celestial_storm_aftermath_3_tt: "惑星の犯罪：§R+30%§!\n£food£職業からの§Y食料§!：§R-30%§!\nPOPからの£rare_crystals£§Yレアクリスタル§!：§G+0.06§!"
 d_gravity_storm_1_districts: "圧縮された土地"
 d_gravity_storm_1_districts_desc: "通過する宇宙嵐の強烈な重力の影響により、 これまで建設には不安定すぎると考えられていたいくつかの地域が圧縮され、 我々は無料の不動産を手に入れた。"
 d_gravity_storm_2_unity: "粉砕された記念碑"
 d_gravity_storm_2_unity_desc: "通り過ぎた宇宙嵐が、我々の脆い記念碑のいくつかに大きな圧力をかけ、それらを塵や瓦礫に変えた。それは、我々が外で待ち受ける恐ろしい力の警告である。"
 d_gravity_storm_3_engineering: "引力の洞窟"
 d_gravity_storm_3_engineering_desc: "宇宙嵐が通過したことにより、我々の採掘施設のいくつかが超密集物質の壊れた坑道へと変貌した。技術と掘削の新たな理論を試みたが、鉱山の再生には進展が見られなかった。"
 d_shroud_storm_1_society: "シュラウド寄生虫"
 d_shroud_storm_1_society_desc: "通り過ぎた宇宙嵐により、 家畜に寄生虫が蔓延した。 我々の現実とシュラウドの間を行き来しながら、 それらは食用可能で、 健康的で、 驚くほど美味しいことが証明された。"
 d_shroud_storm_2_zro: "ズィロのフィールド"
 d_shroud_storm_2_zro_desc: "宇宙嵐が通過したことにより、この惑星で最も緑豊かな生物圏は、ズィロのフィールドへと変貌した。これらは、我々が遭遇した中で最も純度の高い鉱床である。"
 d_shroud_storm_3_happy: "湖の主"
 d_shroud_storm_3_happy_desc: "通り過ぎた宇宙嵐が、我々に奇妙で素晴らしい贈り物を残していった。この惑星最大の水域が波紋を作り、重要な模様やシンボルを形成する。それは驚くべき知恵で問いかけに答えてくる。"
 ### Shroud Storm Events
 shroud_switched: "シュラウドに包まれた"
 shroud_switched_tt: "この天体には、シュラウドのヴェールが残っている。その不自然な存在は、深刻な違反行為か、壊滅的なシュラウド嵐の余波を示唆している。"
 cstorms.8510.title: "サイオニック・スイッチ"
 cstorms.8510.desc: "サイオニックな活動の慌ただしさの中で、[from.GetName]が[from.GetClassName]と、謎のところから交換された。"
 cstorms.8510.a: "奇妙な運命だ。"
 cstorms.8515.title: "大量変容"
 cstorms.8515.desc: "[from.GetName]を襲った超能力の急増により、その人口の一部が自然法則を無視するようになった。集団全体が再形成され、その形態は今や異質で馴染みのないものとなっている。まるで、我々の理解を超越する何かが本質を書き換えたかのようだ。"
 cstorms.8515.a: "正体不明の勢力が動き出す…"
 cstorms.8520.title: "星海の変成"
 cstorms.8520.desc: "超能力の急増により、[from.GetName]はまったく新しい性質の星へと変貌した。今は[from.GetClassName]となり、[from.solar_system.GetName]に奇妙な光を放つ。まるで現実そのものが変化したかのようだ。"
 cstorms.8520.a: "星でさえ免れることができない…。"
 ### Building custom requirements
 storm_repellent_allow: "$TRIGGER_FAIL$は§Y宇宙嵐誘引建造物§!が存在すると建設できない"
 storm_attracting_allow: "$TRIGGER_FAIL$は§Y宇宙嵐反発建造物§!が存在すると建設できない"
 TOO_IMPERIAL: "帝国主義がある"
 executive: "$job_executive$"
 noble: "$job_noble$"
 merchant: "$job_merchant$"
 head_researcher: "$job_head_researcher$"
 high_priest: "$job_high_priest$"
 technophant: "$job_technophant$"
 warden: "$job_warden$"
 noble_researcher: "$job_noble_researcher$"
 job_noble_researcher: "貴族科学者"
 job_noble_researcher_plural: "貴族科学者"
 job_noble_researcher_desc: "最も聡明で高貴なる子女らは、 己の優位な立場をよりよく説明できるよう、 礼儀作法と科学的手法の両面で教育を受ける。"
 sacred_noble: "$job_sacred_noble$"
 job_sacred_noble: "神聖貴族"
 job_sacred_noble_plural: "神聖貴族"
 job_sacred_noble_desc: "継承による神性はあるべき道。 神性による継承は手段である。 このようにして、 我らは貴さを賜るのだ。"
 augmentation_merchant: "$job_augmentation_merchant$"
 job_augmentation_merchant: "強化商人"
 job_augmentation_merchant_plural: "強化商人"
 job_augmentation_merchant_desc: "自己改善をこれほど手頃な価格で提供し、 さらに延長保証まで付け加える者たち以外に帝国を導ける者はいないだろう。"
 visionary: "$job_visionary$"
 job_visionary: "技術の先見者"
 job_visionary_plural: "技術の先見者"
 job_visionary_desc: "先例に縛られることはなく、 謙虚さが重荷になることもない。 明日を夢見る者たちは、 大胆な思索を市場性のある現実へと変貌させる。 真の先見者にとって、 進歩とはただの理念ではなく、 それ自体が商品なのだ。"
 noble_merchant: "$job_noble_merchant$"
 job_noble_merchant: "パトリシアン"
 job_noble_merchant_plural: "パトリシアン"
 job_noble_merchant_desc: "統治する権利は世襲によってではなく、 その者の価値の度合いによって決定される。 ならば、 貸借対照表の総計以上に、 その価値を測るのにふさわしい尺度があるだろうか？"
