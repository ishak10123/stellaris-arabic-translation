 ###########################################
 #Anomalies #
 ###########################################
 STORMS_ANOM_ANTS: "有機彗星"
 STORMS_ANOM_ANTS_DESC: "宇宙嵐が珍しい組成の彗星を残していった。 どうやら有機物で構成されているようだ。 我々の[solar_system.Owner.GetScientistPlural]が調査を熱望している。"
 cstorms.5020.name: "アリ遊星"
 cstorms.5020.desc: "例の彗星は、 小さな昆虫が大量に棲む巨大な巣であることが判明した。彗星の尾は気化した氷ではなく、 巣の奥深くで起こった化学反応による排出ガスらしかった。\n\n巣の外層は昆虫の死骸で構成されており、 内部の仲間を過酷な宇宙から守っている。 また、 巣の内外からは数種類の菌糸が発見された。 ここでは複雑な共生関係が築かれており、 菌糸は排出されたガスを栄養にして育ち、 虫たちは菌糸を食べて生きているのだ。"
 cstorms.5020.a: "巣を採取しろ。"
 cstorms.5020.b: "見るのはいいが、触れるな。"
 STORMS_ANOM_STAT: "不可解な組成"
 STORMS_ANOM_STAT_DESC: "軌道を回るこの物体は、 通過していった宇宙嵐が残したものだ。 宇宙ステーションのように見えるが、 その構造の組成をスキャンしたところ、 実に不可解な結果が出た。 調査が推奨される。"
 cstorms.5030.name: "動かぬ破滅"
 cstorms.5030.desc: "[Root.Owner.GetScientistPluralCapital]の報告によると、 この宇宙ステーションの大部分はありふれた物質で構成されている。 それによってステーションはかろうじて維持されている。 ステーションの奥では、 金属合金からプラスチックやその他の素材へと変化していった。\n\n中心部には、 有機物を効率的に分解して別の物質へと変える装置があった。 未だに動きつづけるその装置は、 分解した有機物を、 ここにたどり着くまでに見てきた物体に作り変えていたのだ。\n\n我々の[Root.Owner.GetScientistPlural]がDNAシミュレーションを実行した結果、 このステーション (前哨地と判明) の元住民に由来する確率が高いと結論した。"
 cstorms.5030.evopred: "何か得られるものがないか調べてみよう。"
 STORMS_ANOM_BRAIN: "耳障りな呼び声"
 STORMS_ANOM_BRAIN_DESC: "この星系に$shroud_storm$が吹き荒れて以来、 奇妙な信号が届くようになった。 しかし、 [Root.Owner.GetScientistPlural]がこの耳障りな呼びかけに答えようとするや否や、 信号が消失するのだ。 は調査船の派遣を推奨している。"
 cstorms.5025.name: "ブレインストーム"
 cstorms.5025.desc: "調査船は予想だにしないものを発見した。 それはいくつものの脳——有機生命体の柔らかな中央処理器官で、 あらゆる種族から採取されていた。 数百もの脳がすべて接続され、 巨大な風船のようなカプセルのなかで浮遊している。 どうやら、 最近発生した$shroud_storm$が去ったあと、 打ち棄てられたまま深宇宙を放浪していたようだ。\n\nカプセルのなかには、 脳およびカプセルに接続された見事なセンサーアレイがあった。 さらに通信モジュールもあるので、 我々が信号に呼び寄せられたように、 艦船に呼びかけたり情報を送信したりが可能である。\n\n恐らく、連絡してきたのはこの脳の集合体そのものだろう。 メッセージが耳障りだったのは、まさしくそれが理由なのだ。 [Root.Owner.GetScientistPlural]は、 $shroud_storm$に対する有機体の反応を測定するために作られたと考えている。 この浮遊する頭脳に残された不安定なサイオニックを考慮すると、 対話を試みても破滅を招くだけだろう。"
 #Terrestrial Telescopes
 terrestial_telescope_category: "巨大望遠鏡"
 terrestial_telescope_category_desc: "[fleet.GetName]のスキャンにより、 [From.GetStarName]星系に廃墟の宇宙ステーションが見つかった。\n\nどうやら、 通過していった宇宙嵐によってそこまで運ばれたようだ。 生命反応はなく、 電力信号も一切検知されない。 ステーションの両翼には、 2つの巨大な望遠鏡が突き出ている。 先進的な光学機器のようだが、 ステーションのサイズから考えるとあまりにも大きい。 その技術と構造は我々がまだ知らないものだった。\n\n望遠鏡の再起動を試みれば、 興味深い知見が得られるかもしれない。"
 cstorms.1605.name: "巨大望遠鏡"
 cstorms.1605.desc: "ステーションに乗り込んで望遠鏡を起動するには、 [Root.Owner.GetScientistPlural]の工夫を要したものの、 彼らは難なく作業を終えた。 しかし、 望遠鏡が向けられた銀河の隅に、 注目すべきものは何も見えなかった。\n\nステーションの内部では、 興味深い品が見つかった。 望遠鏡で撮影された高精細画像が数点、 装飾のついた額に収められていたのだ。 どの画像も宇宙嵐に焦点を当てており、 この星系を通過していった嵐を写したものも複数あった。 この望遠鏡のオペレーターはさまざまな角度、 ズームレベル、 さらには芸術的な構図まで用いて、 嵐の姿を最高の状態で残そうとしていた。\n\nさらに詳しく調べてみたが、 この放棄されたステーションで興味を引くものはほかになかった。 後世の人々が、 これらの稀有な力強さと美しさを持つ宇宙嵐の姿を楽しめるよう、 アーカイブに保管するとしよう。"
 STORMS_ANOM_POLYCHROMATIC: "多色性恒星"
 STORMS_ANOM_POLYCHROMATIC_DESC: "[from.solar_system.GetName]星系を通過した宇宙嵐は、 星系の恒星の見た目を一変させた。 嵐の余波で、 星のコロナ層は刻々と変化する色の渦として現れ、 多色フレアを四方八方に放出している。 この現象はさらなる分析が必要である。"
 cstorms.5035.name: "$STORMS_ANOM_POLYCHROMATIC$"
 cstorms.5035.desc: "[from.GetAffectedStormType]が通過してから、 [From.GetStarName]の核融合反応において、 とても興味深い変化が起きていると[root.leader.GetName]は報告している。\n\n嵐は恒星の核内で予期せぬ核反応を引き起こし、 その結果、 対流圏から[from.GetEarnedResources]が安定して放出されている。\n\nこのような複雑で特異な反応が、 今回観測された珍しい多色性フレアリングを生み出している。 いずれにせよ、 しばらくは綿密な調査に値する研究対象であり続けるだろう。"
 cstorms.5035.a: "これらの新しい現象を研究しろ。"
 cstorms.5035.b: "これらの新しい資源を採取しろ。"
 STORMS_ANOM_TRIPLETS: "3つの小惑星"
 STORMS_ANOM_TRIPLETS_DESC: "通り過ぎた宇宙嵐が[from.solar_system.GetName]星系に3つの新しい小惑星を残していった。 これらの天体は不可解な方向転換をすることが多く、 その軌道を予測することは不可能である。 さらなる研究が必要である。"
 cstorms.5040.name: "$STORMS_ANOM_TRIPLETS$"
 cstorms.5040.desc: "[root.leader.GetName]は、 [from.solar_system.GetName]星系に残された小惑星が非常に不安定な磁場を持っており、 星系の既存の磁気圏から不規則に跳ね返ることを発見した。\n\n[root.leader.GetName]は各小惑星に磁気コンペンセーターを付けるることで軌道を安定させ、 資源採掘に適した状態にした。"
 STORMS_ANOM_TRAVELLERS: "余波の中の救難信号"
 STORMS_ANOM_TRAVELLERS_DESC: "§H[from.GetAffectedStormType]§!の余波の中、 未確認の救難信号が§H[from.solar_system.GetName]§!星系で検出された。"
 cstorms.5050.name: "遭難した旅行者"
 cstorms.5050.desc: "我々は、 §H[from.solar_system.GetName]§!星系の遭難信号の発信源を、 損傷が激しいがまだ機能している商船と特定した。\n\n乗員たちは、 §H[from.GetAffectedStormType]§!によって航路から大きく外れたと主張している。 嵐はエンジンも破壊したため、船とその中身は我々の宇宙空間に取り残されている。\n\n援助してくれるなら、 積荷の一部を手放してもいい、 と言っている。"
 cstorms.5050.a: "援助しろ。"
 cstorms.5050.evopred: "DNAサンプルと引き換えに援助する。"
 cstorms.5050.b: "彼らの幸運を祈れ。"
 cstorms.5050.c.genocide: "彼らを殺し、 積荷を奪え。"
 cstorms.5050.d.devouring_swarm: "タダ飯だ。"
 STORMS_COSMIC_SLUDGE: "宇宙の汚泥"
 STORMS_COSMIC_SLUDGE_DESC: "§H[from.solar_system.GetName]§!を大量に監視している装置は、§H[from.GetAffectedStormType]§!の余波により、 不安定な数値を示している。\n\nシステムの診断では、 機器に技術的なエラーの兆候は見られない。 これらの数値には、さらなる調査が必要だ。"
 cstorms.5060.name: "$STORMS_COSMIC_SLUDGE$"
 cstorms.5060.desc: "§H[from.solar_system.GetName]§!星系の不安定なセンサーの数値は、 §H[from.GetAffectedStormType]§!の余波として残されたデブリの形成に由来する。\n\nこの漂う物体は、 嵐の極度の圧力によって形成されたものであり、 不定形の宇宙の汚泥の塊である。 その無数の構成要素が、 独特の反応性化合物を形成している。\n\nその化学に焦点を当てた研究は、 それを生み出した状況に関する貴重な天体気象学的洞察をもたらす可能性がある。"
 cstorms.5060.a: "分子組成を研究する。"
 cstorms.5060.b: "破壊する。"
 STORMS_SHATTERED_SATTELITE: "砕かれた人口衛星"
 STORMS_SHATTERED_SATTELITE_DESC: "§H[from.GetAffectedStormType]§!の余波の中、 未確認の物体が§H[from.solar_system.GetName]§!星系で検出された。 このデブリをさらに分析すれば、 貴重な知見が得られるだろう。"
 cstorms.5070.name: "$STORMS_SHATTERED_SATTELITE$"
 cstorms.5070.desc: "§H[from.solar_system.GetName]§!星系の物資は、 複雑な天体気象観測センサーアレイを搭載した古代の人口衛星の残骸である。 我々は、 それが§H[from.GetAffectedStormType]§!の余波で銀河を横断し、 遠くまで吹き飛ばされたと推測する。\n\n現在、 修復不可能なほど破壊されているが、 その中央データベースには膨大な情報量が保存されており、 我々の目的のために再利用できる。\n\n残りの衛星はスクラップとしてしか使えない。"
 STORMS_EVISCERATED_FAUNA: "フォリーン・オブジェクト"
 STORMS_EVISCERATED_FAUNA_DESC: "§H[from.solar_system.GetName]§!星系のセンサーが、 最近の§H[from.GetAffectedStormType]§!により星系に持ち込まれた未知の物体を検出した。\n\nアノマリーを検証するには、 より詳細な検査が必要である。"
 cstorms.5080.name: "有機生命体のデブリ"
 cstorms.5080.desc.common: "§H[from.solar_system.GetName]§!星系の異物は、 宇宙生物の大きな有機物の塊であることが判明した。 宇宙嵐によって識別不可能にまで引き裂かれてしまったため、 生物学的残骸を正確に分類することは不可能である。"
 cstorms.5080.desc.swarm: "幸いにも、 ほとんど食べられる状態だ。"
 cstorms.5080.desc.default: "[leader.GetName]は、 その生物の遺骸をより詳細に解剖すれば、 その起源や、 §Y[from.GetAffectedStormType]§!が同様の宇宙生物に与える影響について、 より多くの情報が得られると確信している。"
 cstorms.5080.a: "我々は飢えている。"
 cstorms.5080.b: "使徒で解剖を行う。"
 cstorms.5080.c: "残骸を破棄する。"
 FORENSIC_DISSECTION_PROJECT: "科学鑑定解剖"
 FORENSIC_DISSECTION_PROJECT_DESC: "§H[solar_system.GetName]§!星系で未知の生物の死骸を発見した。 宇宙嵐によって銀河を引きずり回されたようだ。 死骸を解剖すれば、 より多くの情報が手に入るだろう。"
 cstorms.5085.name: "$FORENSIC_DISSECTION_PROJECT$"
 cstorms.5085.desc: "慎重に解剖したにもかかわらず、 この内臓腫瘤の元となる種は依然として謎のままである。 嵐の根源地で受けた甚大な被害により、 特徴や遺伝子マーカーがすべて失われてしまったのだ。\n\nしかし、 この研究の過程で、§Y宇宙嵐§!の組成と、 それが異種生物に与える影響について理解を深めることができた。"
 cstorms.5085.evopred: "すばらしい食事だ。"
 STORMS_DISPLACED_TIYANKI: "遭難したティヤンキ"
 STORMS_DISPLACED_TIYANKI_DESC: "$default_storm$の余波で、我々のセンサーが§H[solar_system.GetName]§!星系に3つのティヤンキの反応を検出した。"
 cstorms.5090.name: "$STORMS_DISPLACED_TIYANKI$"
 cstorms.5090.desc.common: "§H[solar_system.GetName]§!星系内の3つのティヤンキの特徴から、 栄養失調で衰弱した子供の群れであることが確認された。\n\n§Y$default_storm$§!は、 これらの子供を大きな群れから引き離し自分たちで生き延びるようにした。\n\n彼らは広々とした空間では長く生き延びられないだろう。 我々のセンサーは、 彼らが群れを呼ぼうとしているが、 成功していないことを示している。"
 cstorms.5090.desc.swarm: "彼らの助けを求める声を拡大させ、 より大きな獲物を引き寄せる餌として使えばいい。"
 cstorms.5090.desc.default: "彼らの助けを求める声を増幅し、 群れをシステムにおびき寄せればいい。"
 cstorms.5090.a.default: "信号を強化させよう。"
 cstorms.5090.a.swarm: "罠に餌をしかける。"
 cstorms.5090.b.default: "自然は残酷だ。"
 cstorms.5090.b.machine: "駆除プロトコルを開始。"
 cstorms.5090.b.swarm: "タダ飯だ。"
 cstorms.5090.c: "新たな故郷を与えろ。"
 cstorms.5090.c.tt: "ランダムなレア度の§Y$NAME_Tiyanki_Hatchling$§!を3体['concept_vivarium']に追加する"
 REUNITE_POD_PROJECT: "群れの再結成"
 REUNITE_POD_PROJECT_DESC: "3頭のティヤンキの子供が宇宙嵐によって群れから離れ、 [this.solar_system.GetName]星系をさまよっている。 子供たちの鳴き声を増幅し、 残りのティヤンキをこのシステムに引き寄せることで、 子供たちは群れに再合流できる。"
 cstorms.5095.name: "群れの再合流"
 cstorms.5095.desc.common: "3頭の迷子の子供の増幅された鳴き声を聞き、 §H[solar_system.GetName]§!星系にティヤンキのオスとメスが現れた。\n\nティヤンキの子供たちは群れに戻り、 幸せそうで健康そうに見える。\n\nメスは、 感謝の印であるかのように、 我々の科学船の近くに大量の残骸を残していった。 驚いたことに、 この残骸には、 いくつかの使用可能な材料が含まれていた。"
 cstorms.5095.desc.swarm: "もちろん、 これらの大型の獣こそが真の報酬であり、 屠殺の準備はできている。"
 ###########################################
 #Event Chains #
 ###########################################
 ### Collided Planet Event Chain
 collided_planets_category: "衝突した惑星"
 collided_planets_category_desc: "はるか昔、 2つの惑星同士が衝突した。 これらの惑星が滅亡したあと、 唯一無二の新たな惑星が生まれた。"
 cs_collided_planet_chain_title: "衝突した惑星"
 cs_collided_planet_chain_desc: "災害により、 このユニークな惑星の繊細なバランスが脅かされている。"
 cstorms.1200.name: "ふたつの星の物語"
 cstorms.1200.desc: "[From.Planet.GetName]を発見したその瞬間から、 我々はその存在に惹かれつづけている。\n\n銀河は広大かつ混沌とした場所であり、 2つの惑星の衝突などは決して珍しい出来事ではない。 しかし、 そうした衝突の既知の例ではすべて、 惑星は片方または両方が破壊されている。\n\n[From.Planet.GetName]を形成した衝突は数百万年も前に起こったものだが、 この2つの惑星は未だに奇妙な均衡を保っており、 さらにはその過程で、 生命を維持する大気までもが生じた。"
 cstorms.1205.name: "危ういバランス"
 cstorms.1205.desc: "“衝突した惑星”の状況は、 予想よりもはるかに不安定であることが判明した。 最近発生した一連の地震により、 衝突地帯周辺の古傷が開き、 地中から大量のマグマが噴出したのだ。 上昇する気温と、 空を覆う火山灰によって、 この惑星の多様な生態系がすでに被害を受けはじめている。\n\nそのうえ我々の予測では、 50年以内に惑星の結合が安定しなかった場合、 地殻変動は激しさを増しつづけ、 最終的には[From.Planet.GetName]が完全に崩壊してしまうのだ！"
 cstorms.1210.name: "テラフォーム始動"
 cstorms.1210.desc: "選りすぐりの地質学者たちが力を合わせ、 地殻変動による滅亡から[From.Planet.GetName]を救える可能性のある計画を2つ考案した。\n\n1つ目の計画は、 衝突した部分の安定化だ。 火山が衝突地帯の周辺にもたらした被害が癒えるまでには数世紀かかるが、 細心の注意を払って地殻に穴を開けることで、 そこにかかる圧力を和らげ、 これ以上の不安定化を防ぐことができる。 火山から噴出した残りのマグマに関しては、 惑星をテラフォーミングし、 安定した環境を作り出すために利用する。\n\n2つ目の計画はさらに野心的だ。 惑星の地殻にかかる圧力を軽減する代わりに、 火山の噴火によって生み出されるエネルギーと質量を、 惑星に適合したテラフォーミングのプロセスに利用するのだ。\n\nこのアプローチなら、 あらゆる種類の生命体を維持できる多数の環境を作り出し、 この惑星を楽園に変えることが可能だ。 しかし、 計画が失敗する確率は非常に高く、 この2つとない星を完全に破壊してしまう可能性がある。"
 cstorms.1210.a: "衝突部を安定させろ。"
 cstorms.1210.b: "噴出物を利用しろ。"
 cstorms.1210.c: "観察に徹しろ。"
 collided_planet_collapsing: "惑星の崩壊"
 collided_planet_collapsing_desc: "破滅的な地殻変動により、 衝突した惑星は崩壊し、 その過程で両方の惑星が破壊される。"
 collided_planet_collapsing_tt: "この惑星が50年後に崩壊する。"
 project_cosmic_storms_collidedplanet_stabilize: "衝突部の安定化"
 project_cosmic_storms_collidedplanet_stabilize_DESC: "この惑星の崩壊を防ぎたければ、 衝突した惑星を安定させる必要がある。"
 project_cosmic_storms_collidedplanet_harmonize: "衝突部の調和"
 project_cosmic_storms_collidedplanet_harmonize_DESC: "衝突した惑星の環境を調和させる計画を実行に移す。 万物のための楽園を作るか、 その過程で楽園を滅ぼすのかどちらかだ。"
 cstorms.1220.name: "衝突部の維持"
 cstorms.1220.desc: "衝突した惑星を安定させる試みが成功した！  [From.Planet.GetName]を脅かしていた地震は収まり、 火山からのマグマはいまこの瞬間にも急速に減少しており、 世界は危ういバランスを保った状態に戻りつつある。\n\nテラフォーミングの最終段階へと移る前に、 問題が1つ残っている。 [From.Planet.GetName]をどの種類の惑星にするべきだろうか？"
 cstorms.1220.a: "大陸型のままにしろ。"
 cstorms.1220.b: "サバンナ型惑星にテラフォーミングしろ。"
 cstorms.1220.c: "高山型惑星にしろ。"
 cstorms.1225.name: "万人のための世界"
 cstorms.1225.desc.stabalize: "素晴らしい！  我々の試みは[collided_planets.GetName]を安定させるだけだと思っていたが、 それ以上の成果が出た！\n\n$cstorms.1225.desc.def$"
 cstorms.1225.desc.def: "見よ、 この楽園を。 想像しうるほぼすべての生命体が繁栄できる、 この惑星を。\n\n破滅の運命にあった星を救い、 これほどまでに見事なものに作り変えられるとは……これ以上の偉業がほかにあるだろうか？  間違いなく、 幸運の女神が我々に微笑んだのだ。"
 cstorms.1230.name: "要修繕"
 cstorms.1230.desc: "幸いにも惑星自体は救うことができたが、 衝突した惑星を楽園に作り変える試みは失敗に終わった。\n\n環境を調整しようとしたものの、 この惑星の激しい地殻変動に妨げられてしまったのだ。 それでも、 地殻変動の最悪の時期は脱したようだ。 火山活動は激変が起こる前の水準に戻っており、 衝突地帯は依然として活発ではあるが、 すぐに激化する可能性は低い。\n\n惑星は破滅の運命を乗り越えたとみていいだろう。 次なる目標は、 この世界を再建することである。"
 cstorms.1235.name: "引き裂かれた住処"
 cstorms.1235.desc: "衝突した惑星を破滅の運命から救う試みは、 無惨にも失敗した。 科学者たちは可能なかぎりの予防策を講じたが、 予測モデルがすべての事態を考慮することは不可能だった。\n\n惑星の残骸が暗黒の宇宙に漂っている。 残念ながら、 あの奇跡の現象は銀河から永久に失われてしまった。"
 cstorms.1240.name: "衝突と崩壊"
 cstorms.1240.desc: "衝突した惑星の崩壊は、 我々の予測通りに進んでいった。 以前、 この場所には奇跡的な現象が銀河に華を添えていたが、 いまとなっては無数の岩が散乱しているだけである。"
 collided_planets_destroyed_tt: "惑星「[collided_planets.GetName]」が破壊される。"
 ### Crimson crawlers Event Chain
 cs_crimson_crawlers_chain_desc: "クリムゾン・クローラー"
 cs_crimson_crawlers_chain_title: "何兆匹もの赤い昆虫に覆われた惑星を発見した。 もたらされるのは災いか、 それともチャンスか？"
 crimson_crawlers_category: "深紅の絨毯"
 crimson_crawlers_category_desc: "紅く染まった惑星が[From.GetStarName]星系で見つかった。 その色は驚くほどに強烈で、 調査に値する天体に思われる。"
 cstorms.1255.name: "クリムゾン・クローラー"
 cstorms.1255.desc: "遠くから見た[From.GetName]は、 高価な深紅の宝石のように輝いていた。 こうした地質学的アノマリーはたいてい粘土や、 硬質金属の混ざった土壌が原因なのだが、 真実はそれよりもはるかに奇妙なものだった。\n\nそれは虫だ。 何兆匹、 何十兆匹という数の昆虫が赤さの原因だった。 そのうごめく多足生物たちは、 [From.GetName]の地表を、 まるで途切れることのない絨毯のように覆い尽くしていた。\n\n即席で「クリムゾン・クローラー」と名づけられたこの無脊椎生物は、 著しく活発な繁殖サイクルを有している。 本来の環境であれば無害な生物だが、 あれほどの大群となると、 [From.GetName]は入植には適さないだろう。\n\n昆虫への対処法として、 少々型破りな提案があった。 初期調査によると、 あの虫は“食べられる”。 つまり、 新しい食料供給源が見つかったと言えるのかもしれない。 このチャンスを逃さぬよう、 調査だけでも行うべきだ。"
 project_cosmic_storms_crimson_crawlers: "思考の糧"
 project_cosmic_storms_crimson_crawlers_DESC: "[From.Planet.GetName]は、 赤色のおとなしい昆虫で完全に覆われている。 この昆虫さえ排除できれば、 この惑星は居住可能になるだろう。 同時に、 この虫は良い食料供給源になりそうだ。 どちらかの方法を試すべきかもしれない。"
 cstorms.1260.name: "風変わりな一品"
 cstorms.1260.desc: "クリムゾン・クローラーを食べるという発想は、 初めこそ馬鹿げた考えに思われたが、 いざ標本が船内に持ち込まれると、 乗組員たちの嫌悪感は消えた。\n\nこの昆虫は、 中枢処理器官を持たずに極めて高度な神経系を有する、 不思議な生物だった。 さらに重要な点は、 その淡色の肉が驚くほど柔らかくしっとりしていることで、 生で食べても、 真紅の外骨格がパリパリとした食感でおいしいことだ。\n\n残る問題は、 この虫を研究材料として活用するのか、 それとも優れた食料源として利用すべきなのかということだ。 調理すれば味に深みが増してより美味かもしれないが、 適切な調味料が手元にあれば、 そのまま食べるほうが手っ取り早く簡単だろう。"
 cstorms.1260.a: "クローラーを研究しろ。"
 cstorms.1260.b: "生で食べるんだ！"
 cstorms.1260.c: "調理しろ！"
 ### Stormbound Event Chain
 cs_stormbound_chain_title: "ストームバウンド"
 cs_stormbound_chain_desc: "1隻の不気味な船がセンサーに映った。 しかし、 映るのは宇宙嵐のなかにいるときだけだ。 何が起こっているのだろうか？"
 letters_of_the_manifold: "多様体の狭間からの便り"
 stormbound_event_ship_object: "$cs_stormbound_chain_title$"
 cstorms.1310.name: "ストームバウンド出現"
 cstorms.1310.desc: "[This.GetName]星系から奇妙な報告が届いた。 最近そのセクターを襲った宇宙嵐のさなか、 1隻の出自不明の艦船が現れたという。 コールサインを持たないその船はどういうわけか、 周囲の嵐の影響をまるで受けていないかのように、 何事もなく巡航していたそうだ。\n\n船はこちらの呼びかけには応じず、 嵐が消えると同時に姿を消したそうだ。 通常なら機器の不具合として一蹴されたかもしれないが、 残された記録映像が証拠となった。\n\n驚異的な先進技術を用いた船か、 あるいはもっと不吉な出来事なのだろうか？  この謎の船がまた現れたら、 必ず報告を行う。"
 cstorms.1313.name: "ストームバウンド再来"
 cstorms.1313.desc: "[This.GetName]の研究ステーションの1つから、 驚くような報告が上がっている。 先日の宇宙嵐が吹き荒れるなか、 1隻の奇妙な艦船が前哨地に衝突しかけたという。 映像を見たところ、 少し前に報告があった不気味な船と同一の船だった。\n\n宇宙ステーションからの情報では、 この船を構成しているのは、 有機化合物と、 カルシウム鉱物と、 金属合金による奇妙な混合物だったらしい。\n\n有機生命体は検知されなかったので、 この船は自動操縦か、 あるいはなんらかの理由で漂流しているものと推測される。\n\nだが最も不可解だったのは、 その船の推進システムの大部分がデブリによって破壊されていたことだ。 意志を持つかのように航行していること自体、 あり得ないことだった。\n\n調査船に次の宇宙嵐を監視するよう命じれば、 この謎めいた船の詳細がさらに判明するかもしれない。"
 cstorms.1313.a: "くだらないことに付き合う時間はない。"
 cstorms.1316.name: "嵐のなかの囁き"
 cstorms.1316.desc: "例の不気味な艦船が宇宙嵐から現れるのを、 [stormbound_science.GetName]が遠方から目撃した。 その船が現れる瞬間の、 宇宙空間から放出される途方もないエネルギーも同様に検出された。\n\nこれにより、 この船をセンサーで追跡できなかった理由がついにわかった。 船の物理的実体は多様体を超えて引き伸ばされており、 さながらワームホールの中と外に同時に存在するような状態だったのだ。 この船がこちらの宇宙に戻ってこられるのは、 おそらく宇宙嵐の超次元的な起源のおかげだろう。\n\nこの情報があれば、 あの船の次の出現を検知し、 こちら側の現実に完全に引き戻すことが可能と思われる。"
 cstorms.1317.name: "ストームバウンド目撃"
 cstorms.1317.desc: "例の不気味な艦船が§Y[this.GetName]§!で目撃された。"
 cstorms.1320.name: "故郷へ"
 cstorms.1320.desc: "ついに遭遇した！  [Root.Fleet.GetName]の正面にやってきた例の不気味な船は、 我々に通信を送ってきた。 華やかな装飾の仮面をつけた機械的な何者かが、 スクリーン上に現れる。 ブ・ティーンと名乗る彼女の話は、 とても興味深いものだった。\n\nかつて彼女は高名な士官であり、 「寄進者の集い」として知られる組織の模範的存在だったという。 巡回中、 宇宙嵐に巻き込まれたブ・ティーンと乗組員たちは、 生き残るために艦船の「ブリーチドライブ」をオーバーチャージするという賭けに出た。 この実験的技術は一度もテストされていなかったため、 艦船と乗組員たちは宇宙嵐内部の超次元フィールドに閉じ込められてしまったとのことだ。\n\nブ・ティーンが話し終えると、 ボロボロになった船から小さな容器が放出された。 そのなかには文書の束が入っていた。 「これを故郷に持ち帰ってくれ」——そうブ・ティーンが言うと通信が終了し、 船は空間多様体のなかへと消えていった。\n\n文書は未知の文字で記されており、 解読には時間がかかると思われた。"
 cstorms.1320.a: "翻訳を始めろ。"
 cstorms.1321.name: "多様体からの便り"
 cstorms.1321.desc: "奇妙な容器に入っていた文書が解読できた。 文書の1つには、 あの艦船の「ブリーチドライブ」と呼ばれる技術の図面が記されていた。 我々の技術よりも進んだものではあったが、 その構造の原理を注意深く研究するだけで、 超空間航行に関する理解がかなり深まった。\n\n図面ほどの有益性はないものの、 より心を打ったのは個人的な手紙の翻訳だった。 どれも愛する者たちに宛てられたもので、 好意、 希望、 後悔の念が記されていた。\n\nどうやらブ・ティーンは、 別れを伝える最後の機会を乗組員たちに与えたかったようだ。 だが残念ながら、 手紙をどこに届ければいいのか我々には知る術がない。 わが国で広く公開すれば、 少なくとも彼らの奇妙な遺産を保護することはできる。 あるいは、 処分した方が賢明なのかもしれない……奇妙な船の存在とその亡霊からの手紙は、 国民の不安を煽る可能性がある。"
 cstorms.1321.a: "後世のために手紙を保管しろ。"
 cstorms.1321.b: "手紙を廃棄しろ。"
 project_cosmic_storms_stormbound: "嵐の亡霊"
 project_cosmic_storms_stormbound_DESC: "例の不気味な艦船が、 この嵐のなかに出現するという予測を得た。\n\nいますぐ調査船を派遣して船を引きずり出し、 拿捕せよ！"
 ### But They're Cute Event Chain
 cs_but_they_are_cute_chain_title: "こんなに可愛いのに！"
 cs_but_they_are_cute_chain_desc: "[From.Planet.GetName]を調査していると、 奇妙な生物が発見された。 我々はこれをどうするべきだろうか？"
 but_they_are_cute_category: "こんなに可愛いのに！"
 but_they_are_cute_category_desc: "[From.Planet.GetName]を調査していると、 奇妙な生物が発見された。 ともに過ごした時間は短いにもかかわらず、 この生物を育て、 守りたいという強い想いがすでに生まれている。 さらなる研究が推奨される。"
 cstorms.1500.name: "こんなに可愛いのに！"
 cstorms.1500.desc: "この生き物を発見した瞬間、 我々のあいだに衝撃が走り、 一瞬で愛情と庇護欲を掻き立てられた。 クリクリとした4つの無邪気な眼に誰もが魅了され、 柔らかく雲のような毛皮を撫でようと皆が集まった。 [Root.GetLeaderName]に特に懐いているようで、 ほとんどの時間を[Root.GetLeaderName]の膝の上で愛撫されて過ごした。 敵意や獰猛さは一切示さず、 まるで可能なかぎり無害になるよう設計されたかのような生物だ。\n\nそれでも、 一部の疑い深い者たちは、 新たに発見された生物を承認なしに船内に留めておくことは無責任だと非難している。 [Root.GetLeaderName]は「たぶん、 絶対安全」などと曖昧に請け合ったが、 正式な調査を行うことに同意した。"
 cstorms.1500.a: "正体を突きとめろ。"
 cstorms.1500.b: "調査などしない。 捨ててこい。"
 cstorms.1500.evopred: "調査などしない。 食え。"
 project_cosmic_storms_but_they_are_cute: "驚異的な生物"
 project_cosmic_storms_but_they_are_cute_DESC: "非常に興味深く愛らしい動物が1匹、 わが国の調査船に入り込んでいた。 この動物を飼うかどうか決める前に、 生物学的特性を調べる必要がある。"
 cstorms.1505.name: "驚異的な生物"
 cstorms.1505.desc: "その6脚生物は極めておとなしく、 針を刺したりスキャンしたりする際にも、 鎮静剤の投与や拘束の必要はなく、 奇妙なまでに従順だった。 撫でたときの穏やかな鳴き声から、 乗組員が「グー」というあだ名をつけた。\n\n調査の結果、 グーは雑食性で、 その体毛は我々のよく知るケラチンをベースとした柔らかい繊維だとわかった。 だが真に驚異的で謎めいているのは、 この可愛らしい生物の肉体である。 この生物は、 たった1ヵ月で細胞（神経系も含む）が完全に入れ替わるのだ。 つまりたった数日で、 完全に機能する体のパーツを再生できることを意味する。\n\nこれほどまでに高度な生体構造を持つ生物が、 自然進化の産物であるとは考えにくい。 既知のどの生物ともかけ離れており、 さらにその気性も定かではない。 一見おとなしそうに見えるが、 いつ襲いかかってきても不思議ではないのだ。 とはいえ、 この生き物が現れて以来、 [Root.GetLeaderName]はかつてないほど意欲的に働いている。\n\nグーをどうするべきか？  飼っても大丈夫だろうか？"
 cstorms.1505.a: "あいつが汚したところを掃除するなら許可する。"
 cstorms.1505.b: "捨ててきなさい。"
 cstorms.1510.name: "コンパニオンアニマル"
 cstorms.1510.desc: "あの可愛らしい生き物は船内に留まることを許され、 それ以来すっかり馴染んでいる。 その存在は[Root.GetLeaderName]の心を穏やかにし、 場の雰囲気を明るくしてくれるので、 乗組員の士気はこれまでにないほど高まっている！\n\n“自然”がもたらしたこの素晴らしい生き物が、 これからも可愛く、 従順で、 友好的でいてくれることを願っている。 これから死ぬまで我々の仲間だ。 名前は「グー」にしよう。"
 cstorms.1510.a: "素晴らしい！"
 cstorms.1515.name: "グーとの別れ"
 cstorms.1515.desc: "明らかに遺伝子操作で作られた特異な身体のことを考えると、 この生物を調査船に乗せておくわけにはいかなかった。 乗組員に悪影響を与えるリスクや、 怒った所有者が返却を求めてくるリスクがあまりにも大きすぎたのだ。 苦しめぬよう、 処分は速やかに行われた。 一瞬にして、 あの優しい「グー」という鳴き声は永久に消え去った。\n\n無理からぬ決断ではあったが、 [Root.GetLeaderName]と乗組員たちの反感を買ってしまった。 あの可愛らしいモンスターの喪失を乗り越えるには、 しばらく時間がかかるだろう。"
 cstorms.1515.a: "ほかに選択肢はなかった。"
 cstorms.1515.evopred: "DNAサンプルを保存しよう。"
 cstorms.1520.name: "グーとの別れ？"
 cstorms.1520.desc: "例の可愛らしい生き物は処分され、 それですべてが終わるはずだったが、 その並外れた再生能力は我々の想像をはるかに超えていたようだ。\n\n死後ほどなくして、 生命を失ったように見える体組織から、 生前とまったく同じ姿をした複製が2匹生まれたのだ。 親ともいえる個体の命を我々が奪ったにもかかわらず、 その新しい2匹は一切敵意を見せていない。\n\n大量のグーを生み出したくはないので、 そのまま放置することにした。 [Root.GetLeaderName]と乗組員たちは、 2体のグーを飼うことを許可されて喜んでいる。"
 cstorms.1520.a: "教訓を得たな。"
 ### The Imitator Event Chain
 cstorms.1550.name: "模倣者"
 cstorms.1550.desc: "[From.Planet.GetName]で見つかったポッドは、 宇宙嵐に身を任せて漂っていた。 使用しているデータサインはわが国のもののようだが、 ポッドの外観は間違いなく異質だった。 通信の要請があったので、 細心の注意を払ってそれに応えると、 ポッド内にいた者は歓喜の声を上げた。\n\n通信相手は救助を求めており、 ポッドはしばらく前から嵐に吹かれるがままで、 生命維持装置も停止寸前なのだという。\n\n素性を明らかにするようこちらが求めると、 相手は我々の船の一員だと奇妙に言い張った。 こちらの艦船の乗員は1人も欠けていないのだから、 それが嘘であることは痛々しいほど明らかだった。"
 cstorms.1550.a: "お遊びは終わりだ。 ポッドを破壊しろ。"
 cstorms.1550.b: "ポッドを船内に載せろ。"
 cstorms.1555.name: "模倣者"
 cstorms.1555.desc: "我々はその脱出ポッドを船に格納した。 ポッドの扉が開くや否や、 異星人はそれまでの演技をやめ、 必死に懇願しはじめた。\n\nこの異星人は母船の脱出ポッドの定期点検中、 なかに閉じ込められて宇宙へと放出されてしまったのだという。 悲しいことに、 その母船に乗っていた者たちは誰もそのことに気づかなかったようだ。\n\n何ヵ月もの漂流のあいだ、 異星人はポッド内の限られた設備を使い、 通り過ぎる艦船のエネルギー信号を模倣することで助けを呼ぼうとした。 それでも助けは現れず、 さらに最悪なことにポッドが宇宙嵐に巻き込まれ、 母星系から何光年も離れた場所へと流されてしまったらしい。 そして、 恐怖と孤独で極限状態に追い込まれた異星人は、 偶然通りがかった船の「行方不明の乗組員」のふりをする計画を立てたというわけだ。 異星人は騙したことを謝罪し、 死なずに済んだことを喜んだ。"
 cstorms.1555.a: "機転のきく異星人は役に立つかもしれない。"
 cstorms.1555.b: "最寄りの居住惑星まで送ってやれ。"
 cstorms.1555.c: "放っておけ。 ポッドはいただこう。"
 the_imitator_category_desc: "先日の調査中、 1隻の脱出ポッドが発見された。 奇妙なことに、 そのポッドは我々の使用しているデータサインで呼びかけてきた。 どうやらそのポッドは、 最近この星系を通過した宇宙嵐によってここまで運ばれてきたようだ。 調査が推奨される。"
 #The Imitator Leader
 the_imitator_category: "模倣者"
 the_imitator_catch_phrase: "ここに来られて本当に嬉しい！"
 the_imitator_leader_desc: "宇宙嵐によって遭難したあと、 乗船することになった異星人。 この機転のきく風変りな天才は、 どんな状況でも（たいていは良い方向に）変えることができる。"
 ###########################################
 #Digsites #
 ###########################################
 ### Green Skies
 site_green_skies: "緑の空"
 site_green_skies_intro: "我々のスキャナーが、 惑星のこのエリアから発せられる一連の興味深い信号を感知した。 その構成を見たかぎり、 未発見の古代文明の遺跡が存在する可能性が高い。"
 cstorms.1400.name: "興味深いコラージュ"
 cstorms.1400.desc: "ベースキャンプの近くで、 風変わりな都市の遺跡が見つかった。\n\nここの建築物には、 我々の文明を含む既知のあらゆる文明の特徴が見て取れる。\n\nところが、 遺跡を構成している物質は、 我々が惑星入植の際にベースキャンプの設営で使うものに似ていた。 その物質は長期間の使用に耐えるような代物ではなく、 スキャナーが示す遺跡の古さからしても奇妙なことだった。\n\nこの遺跡が、 正体不明の先駆種族のものである確率は低いが、 スキャナーから導き出される結論はそれとは真逆である。 一体どういうことなのだろうか？"
 cstorms.1405.name: "先客の痕跡"
 cstorms.1405.desc: "信号の痕跡をたどっていくと、 廃墟と化した都市の下層へと続く小道があった。 こういった古代遺跡には、 たいてい地下交通網や避難用バンカーがあるものだが、 ここにあったのは布切れやポリマーの容器、 さらには有機廃棄物が散乱する小さな洞窟群だった。 どうやら、 この遺跡を探索するのは我々が初めてではないらしい。\n\n気がかりなことに、 地上の空が緑色に変わりつつあると[Root.GetLeaderName]から報告があった。 [Fromfrom.getName]内に宇宙嵐が発生しようとしているのだ。 だがそれでも、 我々は信号の発信源に向かって突き進んだ。"
 cstorms.1410.name: "はりぼて"
 cstorms.1410.desc: "激しく損傷した金属扉が何度か現れ、 そのたびに少しばかり足止めを食らったが、 さほど苦労することなくくぐり抜けていくと、 粗末な貯蔵施設が姿を現した。\n\nそこにあったすべての棚は、 放棄されたテクノロジーの数々で埋め尽くされていた。 壁の近くには、 有名企業の箱が丁寧に積み上げられている。 そしてようやく、 長く追いつづけてきた信号の発信源を見つけることができた。 それは我々のものよく似たトランスポンダー・コンピューターだった。\n\nこのコンピューターにログインし、 データベースを調べていると、 [Root.Owner.GetEngineerPlural]が大胆な結論を導き出した。 この信号は意図的に作られたものであり、 ほかの文明の特徴を模倣したり組み合わせたりすることで、 できるかぎり謎めいた印象を与え、 興味を引くようにしてあるのだという。\n\nおまけに、 積み上げられた箱のなかには、 地上で見たあの遺跡の建築キットが入っていたのだ。\n\nこの発見を報告するため、 ベースキャンプに連絡したが、 宇宙嵐はすでに通信回線を遮断しはじめていた。 最後に聞こえたのは、 乗組員たちに不安そうに命令を出す[Root.GetLeaderName]の声だった。 ベースキャンプが攻撃されているようだ！"
 cstorms.1410.a: "戦闘態勢を整えろ！"
 cstorms.1415.name: "海賊！"
 cstorms.1415.desc: "[Fromfrom.getName]内の宇宙嵐に、 海賊の艦隊が潜んでいた！  ベースキャンプを襲ったのはその乗員たちだったのだ。 海賊から以下のような要求があった。\n\n§L親愛なるマヌケども\n\n「俺たちが待ち伏せてるとも知らずに、 ノコノコやってきてくれて礼を言う。\n\nオリコーそうな連中が、 古代のアーティファクトや怪しげな遺物を嗅ぎつけるなり理性を失っちまうのは、 実に愉快で笑えるぜ。 敵を一掃する兵器でも期待したか？  事象の地平面に届くような艦隊を作れると思ったか？  それとも、 ただお仲間に土産を持ち帰りたかっただけか？  くだらねえ。\n\nそう気を落とすな、 罠にかかったのはお前らが初めてじゃねえ。 それに俺たちのビジネスは、 お前らみたいな連中が、 さらにほかの奴らをおびき寄せることで成り立ってんのよ。\n\nというワケで、 エネルギー通貨をたった2000ぽっち寄越せば、 お前らが失くしたモンを返してやる。\n\n断るってんなら、 未だにこの惑星に足止め食らってる[Root.GetLeaderName]と、 チンケな武装の乗組員どもがひでえ目に遭うぜ。\n\nオリコーな判断は得意だろ？」§!\n\nこの洞窟にいれば今のところは安全だが、 それも長くは続かないだろう。 海賊どもの要求に従うべきだろうか？"
 cstorms.1415.a: "身代金を支払おう。"
 cstorms.1415.b: "くたばれと伝えろ！"
 cstorms.1415.b.tt: "[Root.GetLeaderName]が人質に取られる。"
 cstorms.1416.name: "抵抗"
 cstorms.1416.desc: "新たなメッセージが届いた：\n\n§L「こりゃ残念！  身代金がありゃ、 いろんなお楽しみが待ってたんだがな。\n\nお前らの命にゃ労力や金を費やす価値はねえんだと、 リーダーと乗組員に伝えておくぜ。 この辺の奴隷商だとか、 暴走する同化機械に売れるかもしれねえな。 近ごろじゃ、 奴隷に神経ステープラーを取りつけるのがアツいって話だぜ」\n\n通信終了。§!\n\nしばらくは安全を確保できる程度の物資があり、 手近な資材をかき集めてバリケードも作った。 しかし、 頭上の海賊の艦隊が防衛網を突破するのは時間の問題だろう！"
 cstorms.1420.name: "事件から得た学び"
 cstorms.1420.desc: "大口を叩いたわりに海賊は弱かった。 ほどなくして、 海賊の艦隊は破壊し尽くされ、 銀河の藻屑となった。\n\nその後すぐに、 地表にいる乗組員との通信を復旧した。 この出来事のせいで動揺こそしていたものの、 彼らに怪我はひとつもなかった。\n\n古代文明に関する情報はまったく得られなかったが、 今回の経験により、 警戒心を持つことの重要さを実感することができた。 調査隊のリーダーは、 危険が迫っていることに気づけなかったのだ。 同じ過ちはもう二度と犯さない。"
 cstorms.1420.a: "この件を教訓にしよう。"
 cstorms.1420.b: "リーダーはこの経験を活かすだろう。"
 cstorms.1425.name: "嬉しい取引"
 cstorms.1425.desc: "メッセージが返ってきた：\n\n§L「そうだ、 それがオリコーな選択ってやつだ。 褒めてやる！\n\n『リゾート惑星を目指す恵まれねえ起業家のための基金』へのご寄付、 ありがたく頂くぜ。\n\nリーダーと乗組員どもはすぐに解放しよう。\n\nそれから、 オトモダチに俺たちのことを推薦するのも忘れんなよ」§!\n\nしばらくすると、 地表にいる乗組員と連絡が取れるようになった。 報告によれば、 この出来事のせいで動揺こそしているものの、 彼らに怪我はひとつもないそうだ。\n\n古代文明に関する情報はまったく得られなかったが、 今回の経験により、 警戒心を持つことの重要さを実感することができた。 調査隊のリーダーは、 危険が迫っていることに気づけなかったのだ。 同じ過ちはもう二度と犯さない。"
 cstorms.1425.a: "$cstorms.1420.a$"
 cstorms.1425.b: "$cstorms.1420.b$"
 NAME_green_skies_pirate_country: "ザ・リゾート"
 NAME_green_skies_pirate_fleet: "大胆な起業家"
 KILL_EXILED_LEADER_EFFECT: "$LEADER$が命を落とした。"
 FREE_HOSTAGED_LEADER_EFFECT: "$LEADER$が帰還した。"
 green_skies_outcome_modifier: "迫りくる危険に対する警戒が強まった。"
 requires_cosmic_storms: "$dlc_requirement_string$ §ICosmic Storms§!"
 ### Hold the Line
 site_hold_the_line: "通話はそのままで"
 site_hold_the_line_intro: "宇宙嵐が通過した際、 興味深い贈り物を残していった。 大昔の軌道上居住地の一部とみられる施設だ。 内部に乗り込めば再稼働させられるかもしれない。"
 cstorms.1275.name: "真新しい施設"
 cstorms.1275.desc: "宇宙嵐に巻き込まれ、 銀河系のあちこちを漂流していたにもかかわらず、 軌道上施設にはほとんど損傷がなく、 居住スペースと商業スペースはほぼ完璧な状態だった。 以前使われていたことを示すような埃は一切積もっておらず、 まるで一度も使われたことがないかのようだ。\n\n中央制御室のなかには、 不可解な入力システムが鎮座していた。 ダイヤルには何も表記されておらず、 レバーの設定には一貫性がなく、 色とりどりのボタンは不規則に点滅している。 幸い、 最終的には説明書を見つけることができた。 翻訳が問題なく終わりさえすれば、 この軌道上居住地を再稼働させられるだろう。"
 cstorms.1280.name: "手動オーバーライド"
 cstorms.1280.desc: "残念なことに、 我々の予想は楽観的だったようだ。 説明書は制御システムと同じく不可解なもので、 しかも全体の半分ほどが欠落していた。 挿絵のついた解説にはよくわからない記号が使われており、 せっかく残った半分も難解な象形文字で埋め尽くされていた。\n\nとはいえ、 最後のページには通信用の周波数が記載されていて、 そのそばに記された文字列は「ヘルプデスク」と翻訳された。 我々は現在、 この周波数を試しているところだ。"
 cstorms.1285.name: "ご連絡ありがとうございます"
 cstorms.1285.desc: "説明書に載っていた通信周波数を試すと、 「スカイガーデン」として知られる営利団体のヘルプデスク用メインフレームに繋がった。\n\nヘルプデスクのAIは友好的だが中立を保った口調で、 我々の問い合わせに対する感謝を述べ、 自分に何かできることはないかと尋ねてきた。 提示された選択肢のなかには、 サブスクリプション契約に関する疑問への回答と、 スマート防衛システムの新ラインナップについての説明、 そしてこの企業の“社会的責任への取り組み”についての解説があった。\n\nところが、 そのあとに提示される選択肢を選んでも、 まったく関係のないトピックに誘導されるだけだった。 そのうえ、 我々の[Root.Owner.GetEngineerPlural]からの通信を保留にしておきながら、 最後には通話を終了してしまうとが何度もあった。 軌道上居住地のほかの部分は年月を経ても新品同様だったが、 このサービスAIはそうもいかなかったようだ。\n\nともかく、 我々は引き続きこの難解なシステムの解明を試みる。"
 cstorms.1290.name: "選択肢の迷宮"
 cstorms.1290.desc: "[Root.Owner.GetEngineerPlural]の報告によると、 AIに何を言ったとしても、 メニューをいくつか経たあとで、 システムは前の文言に戻ってしまうのだという。\n\nメニューの分岐を把握するため、 いくつかのシミュレーションを実行してみたが、 再帰的エラーが発生してしまい、 解決法とそのチェックを同時に行うことは不可能だった。 量子モデルを使っても望ましい結果は得られなかった——おそらく、 その過程で誤って波動関数をいくつか崩壊させてしまったのだろう。\n\n我々は完全に途方に暮れている。"
 cstorms.1290.a: "貴様は§R[検閲]§!で§R[検閲]§!だとAIに伝えろ。"
 cstorms.1290.b: "通話中に黙ってみろ。"
 cstorms.1290.c: "とにかくボタンを押しまくれ。"
 cstorms.1295.name: "プロトコルの遵守"
 cstorms.1295.desc.a: "ついに突破口が開いた！  AIは不適切な言語を使ったことを咎めると、 カスタマーサービス担当者からの連絡があるまで待機するように告げた。\n\n$cstorms.1295.desc.followup$"
 cstorms.1295.desc.b: "ついに突破口が開いた！  AIは長時間の沈黙に困惑したようで、 カスタマーサービス担当者に取り次いでくれることになった。\n\n$cstorms.1295.desc.followup$"
 cstorms.1295.desc.c: "ついに突破口が開いた！  AIは制御パネルを乱暴に扱ったことを咎めると、 カスタマーサービス担当者からの連絡があるまで待機するように告げた。\n\n$cstorms.1295.desc.followup$"
 cstorms.1295.desc.followup: "しばらく待っていると、 通信回線が再び繋がった。 通信相手は、 スカイガーデン・コーポレーションの記録保管担当だと名乗った。 先ほどのヘルプデスクは、 彼女が前任者から引き継いだAIプログラムだったのだ。 彼女が知るかぎりでは、 スカイガーデンが何十年も前に倒産して以来、 通信ステーションは一度も使われていなかったのだという。 なぜ現在も倒産した企業で働いているのかと尋ねると、 そういう契約だから、 という答えが返ってきた。\n\nこちらの状況を説明すると、 記録保管担当はこの軌道上居住地の古いクイックスタートガイドを探し出してきてくれた。 ガイドのデジタルコピーをすぐに送ってくれるそうだ。"
 cstorms.1300.name: "得るは難し、 失うは易し"
 cstorms.1300.desc: "新しいガイドブックを手に入れたことで、 軌道上居住地の再稼働はさほど苦労することなく完了した。\n\n機械の作動音が徐々に収まってきたので、 記録保管担当にもう一度連絡し、 感謝を伝えることにした。\n\n連絡すると彼女は、 通話外の時間に見つけておいたと思われる、 このステーションに関する情報を教えてくれた。 ここはどうやら5世紀以上前にプロトタイプとして建造されたが、 大規模な宇宙嵐が通過したあとの混乱で行方知れずになったのだという。 その損失および開発費は、 スカイガーデンを倒産させるには十分な額だった。\n\n記録保管担当が我々に手を貸したのは、 久しぶりの有益な仕事だったからだそうだ。\n\n「それに」彼女は言った。 「ひいおばあちゃんの声がまた聴けて嬉しかった。 たとえAIでもね」"
 ### Repowered Complex
 site_repowered_complex: "復興した複合施設"
 site_repowered_complex_intro: "最近起きた§Y$electric_storm$§!の後、 §H[From.Planet.GetName]§!の地表下で原因不明の電力サージが検出された。 さらなるスキャンにより、 老朽化した地下施設があり、 その発電機が嵐によって再起動し、 施設が再び稼働したことが明らかになった。"
 cstorms.1845.name: "防衛強化された入口"
 cstorms.1845.desc: "§H[From.Planet.GetName]§!の孤立した複合施設の入り口は、 非常に頑丈に作られている。 長持ちするように作られており、 その外観は重装甲板、 放射線シールド、 大気センサーの配列が特徴的である。 §H[Leader.GetName]§!は、 この施設が極限状態でも耐えられるように設計されていると考えている。\n\nスキャンによると、 一連の密閉されたセキュリティドアを通って、 大きな地下の部屋にアクセスできる。"
 cstorms.1850.name: "生存のシェルター"
 cstorms.1850.desc: "内部の主要エリアにアクセスした結果、 §H[Leader.GetName]§!は、 未知の有機生命体用に建造された未使用の生存用シェルターを発見したと結論づけた。\n\nそこには、 睡眠ポッド、 レジャーゾーン、 医療室など、 十分な設備が整った居住区もあった。 各階の収納ロッカーには、 未開封の栄養パック、 バッテリー、 工具が大量に保管されていた。 この隠された保管庫内のものはすべて、 新品同様の状態だ。\n\nしかし、最後のセキュリティドアがまだ閉ざされたままであった。 これらのドアは 施設の指揮所に通じていると我々は考えている。"
 cstorms.1850.a: "続ける。"
 cstorms.1855.name: "デラックス・シェルターパック"
 cstorms.1855.desc: "シェルターの指揮所には、 §Y$default_storm$§!モニターがずらりと並び、そのすべてが地表の大気センサーから情報を得ている。 スタンバイモードで稼働したところ、 これらのコンソールには数世紀分の過去の嵐のデータが保存されている。このデータを使えば、 天体気象学の理解が大きく進むだろう。\n\n§H[Leader.GetName]§!は、 よく使われている小型のホログラフィック・プロジェクターも発見した。 起動すると、 3Dの軟体人が現れてセールストークをし、 企業のロゴの下にはシェルターの主な特徴が表示された。\n\nこの製品に持ち主がいるのかどうかは不明だが、 ここ何年も使われていないことは明らかだ。"
 cstorms.1855.desc.megacorp: "マーケティング部門はすでに、 どこで間違ったのかを分析している。"
 ###############################
 #### The Weather Manipulators #
 ###############################
 STORMS_PREC_WM_ONE: "いにしえのシェルター"
 STORMS_PREC_WM_ONE_DESC: "[From.Planet.GetName]において、 かなり古いものと思われる隠された地下構造物をいくつか確認した。 この機会に調査を行うべきだろう。"
 cstorms.105.name: "いにしえのシェルター"
 cstorms.105.desc: "[From.GetStarName]星系の惑星「[From.Planet.GetName]」には、 廃墟が広がっていた。 どうやら、 遠い昔に滅んだ帝国の残骸らしい。 我々の興味を引いた地下の構造物も同様に古いが、 損傷は比較的少なかった。\n\n音波共鳴画像を撮影したところ、 地下は複雑な構造になっており、 いくつもの貯蔵室や、 災害に耐えられるように設計されたシェルターの存在が明らかになった。 地表の都市が破壊されていたのは、 宇宙嵐のしわざとみて間違いないだろう。 避難場所が用意されていることにも説明がつく。\n\nそれでも瓦礫の量が多すぎて、 現時点でこれ以上の調査は難しい。 発掘調査に切り替えれば、 さらに詳細が判明すると思われる。"
 #arcsite The Ancient Storm Shelters
 site_weathermanipulators_the_ancient_storm_shelters: "いにしえのシェルター"
 site_weathermanipulators_the_ancient_storm_shelters_intro: "宇宙嵐によって壊滅した惑星の瓦礫の下に、 シェルターが埋まっている。 すっかり荒廃していて調査は困難だが、 内部は無傷のようだ。"
 cstorms.110.name: "塵と荒廃"
 cstorms.110.desc: "地上からシェルターに近づくと、 崩壊した2つの塔の下に小さな開口部があり、 そこから稼働している機械のかすかな光が見えた。\n\nこの開口部をアンカー地点にすれば、 [Root.Owner.GetScientistPlural]が施設の規模を把握し、 繊細な構造を傷つけることなく開口部を広げられるかもしれない。\n\nこの施設が埋もれている遺跡には、 宇宙嵐がもたらす被害の特徴がすべて揃っていた。 不思議なことに、 この都市の住人が身を守ろうとした形跡はまったくなかった。\n\nそれはまるで、 できるかぎり長く災害に耐えたあとで、 大急ぎで避難したかのように見えた。 その答えは、 [From.Planet.GetName]の廃墟の地下で見つけられるかもしれない。"
 cstorms.110.a: "了解。"
 cstorms.115.name: "塔の下で"
 cstorms.115.desc: "何層もの瓦礫と砂ぼこりを取り除くと、 塔の下の開口部は[Root.Owner.GetScientistPlural]が通って内部のシェルターに入れるだけの大きさになった。\n\n避難施設は簡素かつ実用的で、 いくつもの部屋に分かれており、 その大半は空っぽだった。 印象としては、 むしろ簡素すぎるように思える。 なんらかのシェルターであることは間違いないだろうが、 宇宙嵐に耐えられるような造りではなかった。 壁は薄すぎてほとんど支えになっておらず、 天井と床は補強すらされていない。 こうして現在まで保存されているのは、 単に幸運だっただけだろう。 地上にある2つの塔と、 この施設を丸ごと移動させた地滑りがなかったら、 この“宇宙嵐用”シェルターはとうの昔に破壊されていたはずだ。\n\n外から見えた光は誤作動している警報システムのもので、 シェルターのさらに奥に見える端末のいくつかは依然稼働中だった。 施設のかつての所有者や、 この奇妙な状態について調べる絶好の機会かもしれない。"
 cstorms.120.name: "古びた記録"
 cstorms.120.desc: "端末までの道は崩落によって部分的に阻まれており、 たどり着くのは予想以上に困難だった。 瓦礫の一部は新しく、 人の手が入ったことでシェルターに致命的な損傷が生じた可能性がある。 用心して作業を進めなくてはならない。\n\n残念ながら、 古ぼけたデータ処理機はそう簡単に秘密を明かしてはくれなかった。 どの記録も失われた言語で書かれていたものの、 インターフェースに銀河間通信のログが残されていたので、 それが手掛かりになるかもしれない。 この記録と、 シェルターのあちこちに放置された物理メディアを組み合わせれば、 基本的な翻訳は可能なはずだ。 それに、 調査すべき部屋はまだほかにもある——ただし、 シェルターが崩壊しなければの話だが。"
 cstorms.120.a: "細心の注意を払って進めろ。"
 cstorms.120.b: "こちらも作業に手を貸そう。"
 cstorms.120.c: "作業を急ぐんだ。 ほかの物は放っておけ。"
 cstorms.125.name: "交易国"
 cstorms.125.desc: "さらに深部にある部屋や空間は、 入口ほど荒れてはいなかった。 上から下まで商品の箱で埋め尽くされており、 すべてがきちんと梱包されて積み上げられている。 一次翻訳によると、 これらは未処理の材料や未完成の電子部品らしいが、 どちらも生存に必須のものではない。 リストにはこの場所にある品物の数量と、 「銀河間平等交易ネットワーク」、 略称INETから得られる予想利益が詳細に記されている。\n\nこの莫大な取引に関する記述には、 もはや熱狂的ともいえる表現が使われており、 取引に関する詳細なメモや利益の項目別インデックスも残されている。 そしてこの消えた文明は、 この取引にちなんで自国を「アイネシア交易国」と呼んでいたらしい。\n\nこのシェルターは一般市民を守るために作られたものではなく、 豪華な作りの商品倉庫だったのだ。 しかし、 ここで疑問が浮かぶ。 彼らのシェルターは、 なぜあんなにも宇宙嵐への対策がお粗末だったのか？\n\n翻訳を進めれば、 さらに詳しい情報が得られるだろう。 だが、 時間はあまりない——この施設が歪みはじめた不穏な音が聞こえるからだ。"
 cstorms.125.a: "気をつけろ。"
 cstorms.125.b: "データの回収を優先しろ。"
 cstorms.125.c: "調査に手を貸そう。"
 cstorms.130.name: "商人たちの企み"
 cstorms.130.desc: "亀裂が入る音や軋む音が大きくなってきたが、 それでも[From.Planet.GetName]のシェルターでは翻訳が続けられている。 商品在庫からは大した情報は得られなかったものの、 まだ機能している端末からは多くのことが明らかになった。\n\nなかでも、 暗号化されていたひと揃いの座標により、 近くの惑星にある“大きな力を持つ装置”の場所が判明した。 現時点でわかっていることは、 この装置が宇宙嵐を「操作」できる、 ということだ。 これが事実ならば驚くべき発見である。\n\nシェルターの崩壊が始まっており、 座標のコピーはすでに軌道上の船に送信済みだったことから、 我々はその場から速やかに避難した。 依然多くの疑問が残されていたが、 先に進むとしよう。"
 cstorms.130.a: "このチャンスは見逃せない。"
 #Special Project Descramble the Coordinates
 INETIAN_PROJECTS_01: "座標の解読"
 INETIAN_PROJECTS_01_DESC: "シェルターが崩壊する前に、 暗号化されたひと揃いの座標を[wm_storm_shelter_planet.GetName]から回収することができた。 そのうちの1つは、 アイネシア交易国が宇宙嵐の操作に使っていた装置のありかを示している可能性がある。 このテクノロジーは回収コストに見合う価値があるかもしれない。"
 #Special project completed
 cstorms.135.name: "豊かな星系"
 cstorms.135.desc: "我々の[Root.Owner.GetScientistPlural]は[wm_storm_shelter_planet.GetName]の崩壊しつつあるシェルターから無事脱出し、 暗号化されたひと揃いの座標を持ち帰ることができた。 データはその後復元され、 探索すべき場所が3つ判明した。\n\n[wm_digsite_A.GetName]、 [wm_digsite_B.GetName]、 そして[wm_digsite_C.GetName]だ。 さらに分析を進めると、 各惑星はアイネシア交易国のネットワークにおいて重要な役割を果たしていたことがわかった。 その役割は、 [wm_storm_shelter_planet.GetName]のシェルターで年代記として残るほど重要だったようだ。"
 #Precursors Event Chain
 cs_inetian_chain_title: "先駆者 - アイネシア交易国"
 cs_inetian_chain_desc: "数百万年も前に繁栄していた文明の、 太古のシェルターの残骸を発見した。 この文明は我々の記録には一切残っていない——まるで何者かが、 徹底的に歴史から消し去ったかのようだ。 調査を行えばその理由がわかるかもしれない。"
 #Arcsite Coordinates A
 site_weathermanipulators_CoordinatesA_Residential_Planet: "座標A：植民地惑星"
 site_weathermanipulators_CoordinatesA_Residential_Planet_intro: "古代の宇宙嵐シェルターで見つけた3つの座標のうちの1つにより、 我々は[From.Planet.GetName]に赴いた。 ここにある遺跡の規模から考えると、 この惑星にかつて大規模な都市が複数存在したのは明らかだ。 ここはおそらく、 はるか昔にアイネシア交易国の市民が生活していた土地だ。 この地の座標がなぜ、 あのシェルターに厳重に保管されていたのかを調査する必要がある。"
 cstorms.140.name: "宗教的意図"
 cstorms.140.desc: "[From.Planet.GetName]の都市はほとんど原形をとどめていなかった。 風景に点在する印象的な建造物のどれもが、 時の流れに加えて宇宙嵐によっても破壊されている。 残る建物の特徴は[wm_storm_shelter_planet.GetName]で見たものとほぼ同じで、 宇宙嵐の痕跡が大量に残されているにもかかわらず、 災害に対する備えがはっきりと欠けていた。 この完全な残骸のなかを調査するのは困難だが、 何かを見つけられることを祈ろう。\n\n[Root.Owner.GetScientistPlural]が、 着陸地点付近の調査すべき場所を3つに絞った。 比較的損傷の少ない公共サービス施設、 寺院のような建物、 そして巨大な中央広場だ。 アイネシア交易国の秘密を追うのであれば、 この3つの場所を調査するといいだろう。"
 cstorms.145.name: "経済の中心"
 cstorms.145.desc: "複数のチームを派遣し、 最も有望な3ヵ所を調査した。 サービス施設と広場は、 文化と建築の一例として興味深くはあったものの、 注目に値するのは宗教施設だけだった。\n\n崩れかけた建物の正面を通り抜けると、 洞窟のような広間があった。 内部には521台の計算用端末が同心円状に配置されており、 そのちょうど中心にはこの星系の見事な (しかも完全に機能する) 模型があった。 模型内の好感度ナノ部品は、 この惑星の電磁場に同調している。 途方もない年月が経過していながら、 模型はこの星系の天体を精確に表していた。\n\nさらに、 すべての端末位置からも見えるように、 円形の土台に沿ったインターフェースが据えつけられている。 このインターフェースの画素には、 企業体と株価のリストが焼きついていた。 ここは宗教施設ではなく、 INETの交易拠点であるとともに証券取引所だったのだ。\n\n論理的に考えれば、 この建物には重要なデータが保管されていたはずだ。 それを見つけるべきだろう。"
 cstorms.145.a: "隅々まで調べ上げろ。"
 cstorms.150.name: "参考文献"
 cstorms.150.intro: "徹底的に調べた結果わかったのは、 [From.Planet.GetName]の交易拠点には何も残されていない、 ということだった。 端末は操作不能で、 モデルのインターフェースに焼きついた画像を除けば、 取引に関する情報はひとつも見つけられなかった。\n\nだが、 広間の一角に隠されていた保管ユニットに、 ユーザーマニュアルらしきものが入っていた。 [wm_storm_shelter_planet.GetName]でのシェルター発掘中に我々が開発した基本的な翻訳キーを使うと、 マニュアルの大まかな内容が把握できた。\n\nマニュアルには端末の操作方法、 システムモデルのチューニング方法、 そして「セクター内攪乱抑制装置」と呼ばれるマシンによる支援の要請方法などが載っていた。 このマシンの操作方法、 狙いのつけ方、 起動方法の詳細に至っては、 極めて明解に記されている。\n\nこのマシンが、 あの古代の宇宙嵐シェルターで言及されていた装置であり、 我々の求めるものに違いない。"
 cstorms.150.outro: "我々はアイネシア交易国の意図を理解し、 このマシンの力を利用することに向けて一歩前進"
 cstorms.150.desc.a: "$cstorms.150.intro$ これはつまり、 $cstorms.150.outro$したということだ。"
 cstorms.150.desc.b: "$cstorms.150.intro$ マニュアルには[wm_digsite_B.GetName]で発見した部品と、 その取りつけ方が書かれている。 これはつまり、 $cstorms.150.outro$したということだ。"
 cstorms.150.desc.c: "$cstorms.150.intro$ マニュアルには[wm_digsite_C.GetName]で発見したマシンのことが書かれているが、 我々はまだ重要部品を手に入れていない。 ともかく、 $cstorms.150.outro$することができた。"
 cstorms.150.desc.d: "$cstorms.150.intro$ マニュアルには[wm_digsite_C.GetName]で発見したマシンのことと、 [wm_digsite_B.GetName]で手に入れた部品の取りつけ方が書いてある。 あとはこのセクター内攪乱抑制装置を起動するだけだ。 そうすれば、 マシンの力を思いのままに操れる！"
 cstorms.150.a: "先へ進め。"
 #Arcsite Coordinates B
 site_weathermanipulators_CoordinatesB_Industrial_Planet: "座標B：産業惑星"
 site_weathermanipulators_CoordinatesB_Industrial_Planet_intro: "古代の宇宙嵐シェルターで見つけた3つの座標のうちの1つにより、 我々は[From.Planet.GetName]に赴いた。 アイネシア交易国の帝国に属する産業惑星だ。 現存する建築物から判断して、 ここが居住用の惑星でなかったことは明白である。 しかし、 ここで具体的に何を製造していたのかは不明だ。"
 cstorms.155.name: "産業効率"
 cstorms.155.desc: "工場地帯の上空には現在も濃いスモッグが立ち込めており、 [From.Planet.GetName]の地表はほとんど見ることができない。 惑星の地表の大部分は宇宙嵐の被害によって荒廃しており、 工場で埋め尽くされた景色のなかに大きな裂け目が多く残されている。 そのうちの1つは、 着陸場所にうってつけだった。\n\nこの惑星の住人たちが、 これらの生産施設を解体しようとした形跡はない。 施設はただ放棄され、 いまもその多くに未加工の原料が残っていた。 それを分析すれば、 この惑星が彼らの文明の商業インフラにおいて、 どのような役割を果たしていたかがわかるかもしれない。 それと同時に、 [wm_storm_shelter_planet.GetName]で言及されていたあのマシンについての情報も得られるだろう。"
 cstorms.160.name: "取り扱い注意"
 cstorms.160.desc: "初期分析結果によると、 [From.Planet.GetName]で使用されていた物質は非常に不安定だった。 この惑星の生産品は単独の用途のない、 さらに別の加工品の原料となるものだったようで、 コンベアシステムによって最終的に中央集積倉庫へと運ばれていた。\n\n床面に噴射による焦げ跡があることから、 この倉庫ではつねに惑星間輸送が行われていたようだ。 問題は生産品の輸送先だが、 貨物が可燃性であることを考慮すると、 それほど遠くではないだろう。\n\n我々はその周辺で、 いくつかの貨物箱を発見した。 側面にいまも残る警告ラベルの残骸から、 中身を厳重に梱包するために手間をかけたことがわかる。 ラベルから判別できるのは、 「危険」という単語だけだった。"
 cstorms.165.name: "ミッシング・リンク"
 cstorms.165.intro: "我々の[Root.Owner.GetScientistPlural]が、 危なっかしく梱包された箱を手早く開封した。\n\n最初の箱を開けると、 環境制御された内室があることを示すシューッという鋭い音が聞こえ、 中身が不安定になることを皆が警戒したものの、 幸い何事も起こらなかった。\n\n箱のなかには見事な作りの機械部品が慎重に収められており、 その内部には、 工場で生産されたあの不安定物質が大量に入っていた。"
 cstorms.165.outro: "\n\n我々はさらなる調査のために、 この部品を船に持ち帰ることにした。 [Root.Owner.GetScientistPlural]を[From.Planet.GetName]の過酷な地表で必要以上に活動させる必要はない。"
 cstorms.165.desc.a: "$cstorms.165.intro$\n\n箱の内側に貼られた輸送ラベルには、 「セクター内攪乱抑制装置」とある。 [Root.Owner.GetScientistPlural]はそれが何を意味するのか断定できずにいたが、 頑丈な保管箱と、 その側面に貼られていた警告を考えると、 何か重要なものだったことは間違いない。$cstorms.165.outro$" #A & C sites not yet visited
 cstorms.165.desc.b: "$cstorms.165.intro$\n\nこの部品には見覚えがあり、 乗組員が[wm_digsite_A.GetName]で見つけたマニュアルを取り出して比較した。 箱のなかの精巧な物体は、 「セクター内攪乱抑制装置」の重要な部品だったことが判明した。$cstorms.165.outro$" #A site visited & C site not visited
 cstorms.165.desc.c: "$cstorms.165.intro$\n\nその独特な形状と、 液体が詰まったコアから、 [wm_digsite_C.GetName]で発見した装置を完成させるのに必要な部品ではないかと推測された。 内部に満たされた物質は、 「セクター内攪乱抑制装置」の動力源として使われるに違いない。 だが、 部品を安全に取りつけるには特殊な知識を要する思われる。$cstorms.165.outro$" #A site not visited & C site visited
 cstorms.165.desc.d: "$cstorms.165.intro$\n\nどうやらこれは、 [wm_digsite_C.GetName]にあった「セクター内攪乱抑制装置」に欠けていた部品のようだ。 [wm_digsite_A.GetName]で見つけたマニュアルがあれば、 部品を正しく取りつけることができ、 ついにはマシンを起動させられるだろう。$cstorms.165.outro$" #A & C sites visited
 cstorms.165.a: "よくやった。"
 #Arcsite Coordinates C
 site_weathermanipulators_CoordinatesC_Barren_Planet: "座標C：不毛の惑星"
 site_weathermanipulators_CoordinatesC_Barren_Planet_intro: "古代の宇宙嵐シェルターで見つけた3つの座標のうちの1つにより、 我々は[From.Planet.GetName]に赴いた。 そこは雪と塵に覆われていたが、 初期調査によれば、 かつては居住可能な惑星だったようだ。 アイネシア交易国にとってこの惑星が重要だったのは、 滅ぶ前か、 それとも滅んだあとだろうか？"
 cstorms.170.name: "絶え間なく、 そして容赦なく"
 cstorms.170.desc: "[From.Planet.GetName]の地表ではブリザードが間断なく吹き荒れている。 それだけでも十分過酷だが、 雪で覆われた光景には厄介な驚きが隠れていた。\n\n雪の下に、 何層にも積み重なった「塵」が待ち受けていたのだ。 その塵のなかに、 かつてこの世界で暮らしていた生命体の痕跡があった。 皆一様に同じ層に埋もれていることから、 単一にして大規模な大量絶滅が起こったのだと考えられる。 [From.Planet.GetName]の生態系が崩壊したことで大気が薄くなり、 その結果氷河期が訪れ、 この惑星が不毛の地と化したに違いない。\n\nここには塵と氷雪以外にも存在するはずだが、 地表からはこれ以上の答えが得られないのは確かだ。 [Root.Owner.GetScientistPlural]はより深い場所を探索するよう推奨している。"
 cstorms.170.a: "調査を始めろ。"
 cstorms.171.name: "消化するクレバス"
 cstorms.171.desc: "防護服と、 耐凍結処理を施した重機を装備した[Root.Owner.GetScientistPlural]が、 雪と微細な塵の層を取り除くという、 単純だが面倒な作業を手早く片づけた。 その後すぐに、 奇妙な「クレバス」が、 広大な面積に根のようなパターンを描いて広がっているのが見つかった。\n\nそのクレバスのなかには、 あらゆる種類の生物の乾燥した亡骸があった。 植物から野生動物 (そしてその中間に位置する生物) までのあらゆるものを、 そのクレバスは地表から飲み込めるかぎりに飲み込んでいた。 どういう原理か、 クレバスは岩壁のあいだで有機物を粉砕し、 有用な栄養素を抽出したのち、 消化に似たプロセスで収束地点まで運んでいた。 その過程で吐き出された塵が、 こうして[From.Planet.GetName]の大部分を覆うことになったようだ。\n\nここで疑問となるのは、 クレバスが取り出した栄養が一体誰に、 あるいは何に届けられたのかということだ。"
 cstorms.171.a: "栄養の行き先を突きとめろ。"
 cstorms.172.name: "いにしえの装置"
 cstorms.172.intro: "地下に広がるクレバス網は広大だった。 [Root.Owner.GetScientistPlural]が先に進むにつれてクレバスは合流していき、 最終的には[From.Planet.GetName]に唯一残った山ですべて収束した。 山頂には明らかに不自然な台地があり、 3つの大型の装置が等間隔に配置されている。 この装置はアイネシア交易国のもののようで、 使われている言語とデザインは彼らの様式と合致している。 装置はかなり古く、 さらには台地に吹きつける強風を受けていたにもかかわらず、 素晴らしい保存状態だった。"
 cstorms.172.outro: "\n\nともかく、 我々は探していたものを見つけた。 我々はいま、 驚異的な発見まであと一歩のところまで迫っている。"
 cstorms.172.desc.a: "$cstorms.172.intro$ これらは[wm_storm_shelter_planet.GetName]で言及されていたマシンに違いない。 残念ながら、 我々にはこの装置の複雑な内部構造を理解するために必要な知識が不足している。 さらに、 そのうちの1台の土台部にあった制御コンソールは、 明らかに重要な部品が欠落していた。 また、 装置の小さなプレートには「セクター内攪乱抑制装置」と刻まれていた。\n\nこの装置を作動させることができれば、 その用途をついに解明できるかもしれない。 そのためには、 残りの座標を探索する必要がある。 $cstorms.172.outro$" #A&B not visited
 cstorms.172.desc.b: "$cstorms.172.intro$\n\n[wm_digsite_A.GetName]で見つけたマニュアルの図面は、 目の前にある装置と一致しているようだ。 ということは、 これが「セクター内攪乱抑制装置」であり、 [wm_storm_shelter_planet.GetName]にあった宇宙嵐シェルターで言及されていたマシンと同一のものだろう。\n\nマニュアルによると、 この装置の操作は制御コンソールで行うらしい。 コンソールは[Root.Owner.GetScientistPlural]が装置のすぐそばで見つけたが、 重要な部品が失われているようだった。 しかし、 我々には探索していない座標が1つ残っており、 そこでこの問題を解決する手段が見つかるかもしれない。$cstorms.172.outro$" #A visited & B not visited
 cstorms.172.desc.c: "$cstorms.172.intro$\n\nこの装置こそが、 [wm_storm_shelter_planet.GetName]で言及されていた「セクター内攪乱抑制装置」という名のマシンに違いない！  しかも、 [wm_digsite_B.GetName]で見つけた例の部品を、 装置のすぐそばにある制御コンソールに簡単にはめ込むことができた。\n\nとはいえ、 部品の複雑さと古さを考えると、 これ以上修理を行うのはリスクが高い。 [Root.Owner.GetScientistPlural]は、 さらなる情報を集めてから作業を進めるよう推奨している。$cstorms.172.outro$" #A not visited & B visited
 cstorms.172.desc.d: "$cstorms.172.intro$\n\nこれは間違いなく、 [wm_storm_shelter_planet.GetName]で言及されていた例のマシンだろう。 [wm_digsite_A.GetName]で手に入れたマニュアルも、 この「セクター内攪乱抑制装置」とやらに関するものに違いない。 あとは[wm_digsite_B.GetName]で見つけた部品を取りつけ、 装置がまだ動くことを祈るだけだ。 装置が動きさえすれば、 ようやくその用途が明らかになる。$cstorms.172.outro$" #A&B visited
 cstorms.172.a: "このマシンで何ができるのか見てみよう。" #Finished sites A and B
 cstorms.172.b: "先へ進め。" #Did not finish sites A and B
 #Special Project 2
 INETIAN_PROJECTS_02: "装置の用途"
 INETIAN_PROJECTS_02_DESC: "[wm_storm_shelter_planet.GetName]で手に入れた3つの座標により、 古代のパズルが完成した。 あとは「セクター内攪乱抑制装置」を起動するだけだ。 さっそくその用途を解明するとしよう。"
 cstorms.176.name: "装置の用途"
 cstorms.176.desc: "パズルの最後のピースが見つかり、 [Root.Owner.GetScientistPlural]が作業に着手した。 [wm_digsite_A.GetName]にあったマニュアルを確認しながら取りつけを行うと、 [wm_digsite_B.GetName]で手に入れた部品が制御コンソールにぴたりとはまった。 すると、 3つの装置すべてが息を吹き返した。\n\n雷鳴のような振動が台地に積もった塵と雪を震わせる。 バリバリという稲妻に似た轟音が響いたかと思うと、 [Root.Owner.GetScientist]が一瞬にして消し飛び、 さっきまで肉体だった塵が渦を巻いて、 セクター内攪乱抑制装置に向かって伸びるクレバスへと吸い込まれていった。\n\n[wm_digsite_C.GetName]で何が起こったのかが、 これでわかった。 装置の底部に続いていたクレバスは燃料供給路であり、 周囲にある生体物質を吸収する。 この惑星のあちこちで見られた累々たる屍は、 この装置を動かすためのものだったのだ。\n\nセクター内攪乱抑制装置は完全に機能しており、 1回分の燃料はある。 あとはボタンを押すだけだ。"
 cstorms.176.a: "マシンを起動しろ。"
 cstorms.176.b: "ボタンは押すな。"
 #Delayed Event 1
 cstorms.180.name: "過去の再発見"
 cstorms.180.desc: "セクター内攪乱抑制装置の秘密を解き明かしてしまうと、 アイネシア交易国がどんな運命をたどったかを知る手掛かりは途絶えてしまった。 しかしながら、 データを徹底的に見直したところ、 新たな知見が得られた。\n\n[wm_digsite_A.GetName]にあった取引記録によると、 彼らは強い平等主義思想を持っていた。 このことは、 彼らの高い生活水準と、 惑星上に残された豪華な施設の数々によって裏づけられている。 多少の差はあれど、 すべての国民が職業、 社会的地位、 血統に関係なく、 快適な暮らしと機会を等しく享受していたのだ。\n\n我々は[wm_digsite_B.GetName]において、 各工場の目的を詳しく説明したインデックスを見つけた。 工場はどれも、 より大きな生産チェーンの一部であり、 広大な帝国の豊かな暮らしを支えるために作られたものだった。 その利益を平等に分配するには、 驚くほど膨大な量の原料と食料が必要であり、 すさまじい速度で生産が行われていたのだ。\n\n[wm_digsite_C.GetName]で修復したセクター内攪乱抑制装置については、 稼働を完全に停止することになったが、 その前にいくつか情報を得ることができた。 その機能の正確な用途はまだ謎のままだが、 追跡可能なデータ信号を回収できたのだ。 それによるとこの装置は、 自由に動き回るものを標的にしてはいなかった。\n\n[Root.Owner.GetScientistPlural]は、 この信号に一致する反応がないか、 付近のセクターを調べるよう推奨している。"
 cstorms.180.a: "標的を見つけ出そう。"
 #Digsite 5
 site_weathermanipulators_storm_formation: "信号の起源"
 site_weathermanipulators_storm_formation_intro: "セクター内攪乱抑制装置のコマンドコンソールには、 データ信号が保存されていた。 困難を伴ったものの、 我々はそのパターンを複製し、 パターンと一致するものを銀河から探し出すことに成功した。 痕跡は無人の惑星へと続いている。 アイネシア交易国が標的にしていたものと、 その理由を突き止めるとしよう。"
 cstorms.181.name: "何もない平原"
 cstorms.181.desc: "一見したところ、 [From.Planet.GetName]はなんの変哲もない惑星だ。 銀河のあちこちにある何百もの惑星と変わらず、 信号がどこから発信されているのかも不明だ。 目に見える送信機もなければ、 星系数個分も離れたところまで信号を届けられるようなテクノロジーも見当たらない。\n\n我々は捜索を続ける。"
 cstorms.182.name: "局所災害"
 cstorms.182.desc: "地表に到着するとすぐに、 我々の位置に応じて信号の強弱が変わることが判明した。 この単純なパターンを頼りに進んでいくと、 最終的に惑星の真裏にそびえ立つ山脈にたどり着いた。\n\nぼんやりと見える山々に近づくにつれて、 荒れ果てた景色はますます荒涼としたものになっていった。 それはまるで、 壊滅的な力がこの地域を襲ったかのようだ。 被害の状況から考えて、 この場所は以前、 宇宙砂塵嵐に見舞われたと思われる。 しかし、 それが事実だとすると、 この星全体が影響を受けていなければおかしい。 あのような嵐による被害がここまで局所的なのは、 過去に例がなかった。 詳しく調べるためには、 あの雄大な山々を登る必要がある。"
 cstorms.183.name: "飛翔するエネルギー"
 cstorms.183.desc: "荒れ果てた山岳地帯には多くの山や谷があったが、 ひとつの奇妙な形のクレーターがすぐに目に留まった。 そのクレーターの壁は滑らかで、 中心には同心円状の輪がいくつも刻まれていた。\n\n我々がクレーターのなかに下りていくと、 心を惹きつけて逃さない強い力を感じはじめた。 その力は間違いなく、 輪の中心部から放たれている。 輪から生じた脈動するエネルギーの束は遥か彼方まで飛んでいき、 やがて惑星の大気圏を抜け出した。 これが信号の正体だった。\n\n[Root.Owner.GetScientistPlural]は、 ここで何が起こったのかをより詳しく理解するため、 クレーターとそのエネルギーの変動を分析するよう提案している。"
 cstorms.184.name: "不確かな始まり"
 cstorms.184.desc: "環境データと詳細なシミュレーションに基づくと、 この山脈は宇宙砂塵嵐が通過したとみて間違いないだろう。 いや、 それどころか、 砂塵嵐はまさにこの場所で発生したのだ！  惑星全体が飲み込まれなかったのは、 単に嵐が小さすぎたからだと推測される。 分析によれば、 地上の平均的な嵐の数分の一の大きさだったようだ。\n\nアイネシア交易国がセクター内攪乱抑制装置を「操作装置」と呼んでいたこと、 そしてこの砂塵嵐のエネルギー信号が彼らのデータバンクに保存されていたことを考えると、 彼らは宇宙嵐をコントロールしようとしていた可能性が高い。 砂塵嵐がこの場所を去ったあとの進路を計算すれば、 何か有益なことがわかるだろう。"
 cstorms.184.a: "調査を続けよう。"
 #Special Project 3
 INETIAN_PROJECTS_03: "交易国の痕跡"
 INETIAN_PROJECTS_03_DESC: "はるか昔に宇宙砂塵嵐が発生した場所を発見したが、 そこにあった痕跡は、 砂塵嵐が典型的なサイズよりもはるかに小さかったことを示唆している。 そのような大きさの嵐を、 なぜアイネシア交易国がセクター内攪乱抑制装置を使って制御しようとしたのかは疑問だ。\n\n砂塵嵐の進路をたどれば、 彼らがこの計画に多くの時間を費やした理由がわかるかもしれない。"
 cstorms.186.name: "交易国の痕跡"
 cstorms.186.desc: "宇宙砂塵嵐の進路の追跡は、 予想していたよりも難航した。 発生地点からわずか数星系離れただけで、 砂塵嵐の強さ、 大きさ、 進路に劇的な変化が起こったのだ。 [Root.Owner.GetScientistPlural]は、 そこでセクター内攪乱抑制装置が使われたのではないかと推測する。 これによって砂塵嵐のバランスが崩れ、 粉々になった野生動物の死骸が[wm_digsite_C.GetName]の地表から巻き上げられたことで、 内側の渦に乱れが生じた。\n\n銀河の漂流を続けた砂塵嵐はいくつもの星系を包み込み、 壊滅的な破壊の轍を残していった。\n\n小さな嵐の進路を変え、 特定の星系から遠ざけるためだけに、 これほどの被害が生じるとは……。 我々のセンサーはその星系に、 放棄された宇宙ステーションの存在を探知した。 アイネシア交易国はその場所を守るために、 大量絶滅を何度も引き起こしたのだった。\n\nそのステーションは我々が求めていた首都ではないだろうが、 守るために費やされた労力を考えると、 同じくらい重要に違いない。"
 cstorms.186.a: "針路を設定しろ。"
 #Digsite 6
 site_weathermanipulators_last_shelter: "滅びの前に"
 site_weathermanipulators_last_shelter_intro: "アイネシア交易国はこの星系内の宇宙ステーションを小さな宇宙砂塵嵐から守ろうとしたが、 予期せぬ事態により嵐が大きく成長し、 ほかの星系が複数破壊された。 そうまでしてこの施設を守ろうとした理由はなんなのか？"
 cstorms.190.name: "安定軌道"
 cstorms.190.desc: "[From.Planet.GetName]の軌道を回る宇宙ステーションは、 当初の予想よりもはるかに巨大だった。 高度な生命維持システムや広域深宇宙センサーだけでなく、 研究設備までも備えており、 どうやら単なる宇宙ステーションではないようだ。 ということは、 この施設は小規模な中継地点ではなく、 長期的な入植地として使われていたのかもしれない。\n\nしかしその現状は悲惨だ。 船体は損壊し、 致命的な減圧によっていくつものセクターが丸ごと吹き飛んでいる。 破壊されたのが外部からなのか、 それとも内部からなのかは不明だ。 幸い、 軌道制御と軸安定化はまだ機能している。 この施設が恒星に突っ込んだり、 制御不能な回転に陥ったりしていないのはそのためだ。\n\nこの繊細に保たれたバランスを崩すことなく内部に入るのは困難だろう。"
 cstorms.191.name: "圧力"
 cstorms.191.desc: "気圧差によるこれ以上の爆発を起こさずに[This.System.GetName]星系の宇宙ステーションに入るには、 破損していないエアロックをこじ開ける必要があった。 古代の建造物にもかかわらず、 ステーション内部は依然として加圧されており、 一般的な惑星の気圧が再現されていたからだ。\n\n我々の艦船とステーションの間に完璧な密閉状態を作り出し、 細心の注意を払って気圧を均等にするには数日かかったものの、 最終的には無事にドアを開けることができた。 だが困ったことに、 近くで起こった減圧のせいでねじれた支持梁と瓦礫が、 我々の行く手を阻んだ。 先に進むにはもう少し時間がかかるだろう。"
 cstorms.192.name: "内なる墓所"
 cstorms.192.desc: "通路の障害物を片づけたあと、 我々は答えを求めてステーションの探索を始めた。\n\n徹底した調査の結果、 このステーションは宇宙を観測するためではなく、 何かを守るために建設されたことがわかった。 精巧なスキャン装置の多くが内部に向けられており、 アイネシア交易国の人々の私物と、 ステーションでの暮らしを記したログも見つかった。 それによると、 この基地のどこかにある厳重に警備された空間には、 重要な積荷が保管されているのだという。 その空間を見つけるのに時間はかからなかったが、 そこは墓所であることが判明した。\n\n空間には干からびて、 ほとんどミイラになった遺体が敷き詰められており、 その全員がアイネシア交易国の人々だった。 遺体の姿勢はごく普通だったので、 どうやら抵抗することなく、 ただ座して死を待ったと推測される。 一体ここで何が起こったのだろうか？"
 cstorms.193.name: "傲慢"
 cstorms.193.desc: "住人のログにあった積荷は、 空間の中央に安置されていた。 それは奇妙な装置で、 使用された形跡はなかった。 アイネシア交易国のものであることは間違いないが、 これまでに目にしたものよりも高度である。\n\n積荷を挟むように配置された端末には、 同じ内容を繰り返す文章が数段落にわたって何度も表示されている。 翻訳はすぐに完了した。 内容は次のようなものだ。\n\n§L「親愛なる訪問者よ。 これを読んでいるということは、 あなた方はわが国の傲慢さの証人だ。 平等を追い求めるあまり、 私たちは真の平等をもたらすもの——創造と破壊とを忘れてしまっていた。\n\nわが国の交易ルートを宇宙嵐から保護するため、 私たちは自然界を改竄した。 最初は小さな低気圧にすぎなかったが、 それがやがて制御不能になり、 ついには宇宙嵐となって我々の世界を引き裂いた。 これは偶然ではなく……報復だった。 私たちはこのステーションに閉じこもった。 事態はすでに手遅れだったため、 ここが最後の砦となってしまったが。 抑制装置の使用をやめたにもかかわらず、 新たな宇宙嵐が次々に発生し、 より強く激しくなっていった。 私たちが最後にすべきことは明白だった。\n\n私たちは必死に働き、 この装置を完成させた。 訪問者よ、 これはあなた方のためのものだ。 装置はこれ以上嵐の怒りを買うことなく、 その猛威を鎮めてくれるだろう。 赦しを得るために滅ぶべきなのは私たちであり、 あなた方ではない」§!\n\nこの部屋のなかで、 アイネシア交易国の歴史は幕を下ろした。 彼らは思いやりに満ちていたが、 同様に軽率でもあったのだ。 彼らの置き土産を携えて、 我々はステーションを去った。"
 cstorms.193.a: "安らかに眠れ。"
 cstorms.193.b: "愚か者にふさわしい最期だ。"
 #Artifact action
 artifact_inetian_research: "アイネシア交易国の秘密"
 artifact_inetian_research_desc: "アイネシア交易国の秘密をさらに調べる。"
 artifact_inetian_research_completed: "$artifact_inetian_research$"
 artifact_inetian_research_completed_desc: "我々はアイネシア交易国の古代の知識を、 自分たちで利用することにした。"
 INETIAN_PROJECTS_04: "アイネシア交易国の秘密の追究"
 INETIAN_PROJECTS_04_DESC: "アイネシア交易国の墓場を見つけたあとも、 彼らの広大な帝国について知るべきことはまだまだ残されている。 もう一度調査することを希望する。"
 cstorms.195.name: "アイネシア交易国の秘密の追究"
 cstorms.195.desc: "アイネシア交易国の永眠の地は、 非常に高度な技術が用いられた宇宙ステーションであることが判明した。 自らが生み出した恐るべき宇宙嵐から逃れるための避難所として、 彼らはこの宇宙ステーションを建設した。 この独特の軌道上居住地は、 驚異的な居住性確保と保護システムを誇っており、 まさにアイネシアの技術の極致である。 だがそれも、 彼らを滅びの運命から救うことはできなかった。\n\n悠久の時を経たステーションは劣化し、 もはや安全な場所ではなくなっていたものの、 [Root.Owner.GetScientistPlural]はそのシステムから貴重な情報を山ほど回収できた。 ほかにも、 アイネシア交易国にとっての最重要交易ルートがデータバンクに保存されていたり、 より効率的かつ惑星を破壊しにくい気象制御装置の精巧なプロトタイプが、 作業スペースに無造作に置かれていたりした。\n\nどうやら、 アイネシアの不屈の精神はこの世から完全に消え去ったわけではないようで、 これからも嵐に立ち向かう我々を助けてくれるだろう。"
 secrets_of_the_inetian_traders: "アイネシア交易国の秘密"
 secrets_of_the_inetian_traders_hive_mach: "アイネシア交易国の秘密"
 secrets_of_the_inetian_traders_desc: "アイネシア交易国の古代の知識が、 またしても我々を助けてくれた。 彼らの影響力のおかげで、 市場手数料が減額されるようになった。"
 secrets_of_the_inetian_traders_hive_mach_desc: "アイネシア交易国の古代の情報が、 またしても集合体を助けてくれた。 市場手数料の減額が適用されている。"
 #Hyperlane Detailer - Secrets Of Inetian Traders Reward
 sm_hyperlane_detailer: "ハイパーレーン・ディテーラー"
 NAME_inetian: "アイネシア交易国"
 ###########################################
 #The adAkkaria Convention of Benevolence #
 ###########################################
 cs_adAkkaria_chain_title: "先駆者 - アドアカリア"
 cs_adAkkaria_chain_desc: "この奇妙な古代文明の末路を知るには、 残された手がかりをたどらねばならない——その行き先がどこであろうとも。"
 #Anomaly: Ancient Signals
 STORMS_PREC_ONE: "古代の信号"
 STORMS_PREC_ONE_DESC: "この星系内で奇妙な電子信号が検知された。 初期データによれば、 これは数千年前の信号である可能性がある。 船の乗組員はその発信源を突きとめたがっている。"
 cstorms.205.name: "博愛の信号"
 cstorms.205.desc: "この星系内で検出された奇妙な信号は、 [FromFrom.GetName]の軌道を周回する古代の通信ステーションから発信されている。 そのメッセージは、 忘れ去られた文明がはるか昔に放送したもののようだ。\n\nそのため[Root.Owner.GetScientistPlural]は解読に苦戦しており、 ステーションに乗り込んで通信メインフレームに直接接続したいと申し出ている。"
 #Digsite: The Propaganda Station
 site_adakkaria_the_propaganda_station: "プロパガンダステーション"
 site_adakkaria_the_propaganda_station_intro: "この古代の通信ステーションは現在も稼働している。 なかに入ってそのシステムに直接接続すれば、 当時の放送を解読できるかもしれない。"
 cstorms.215.name: "過去との対面"
 cstorms.215.desc: "ステーションに乗り込むのは造作もなかったが、 内部を移動するの困難だった。 外部シールドの高度な構成のおかげでステーションの保存状態は極めて良好だったが、 狭い廊下と低い天井のせいで、 チームの活動が難航したのだ。\n\nこの前哨地の内部には、 以前の所有者の性質を示すものはほとんどなく、 手がかりになりそうなものといえば、 壁に飾られた紙とプラスチックからなる大きなシートくらいだった。 これらの“ポスター”には、 未知の有機生命体の様式化されたイメージが描かれている。 侵略と祝賀の光景を背にして、 堂々と、 そして毅然と立つ彼らの姿は注目に値する。 そのビジュアルは明らかに、 見る者にある種の誇りと帰属意識を与えるようにデザインされていた。\n\n通信メインフレームそのものも、 ポスター同様に謎に包まれていた。 [Root.Owner.GetEngineerPlural]は当初、 [Root.Owner.GetPreFTLLowerPlural]で見たもののようなアナログ機器だと考えていたが、 ボタンやダイヤルの下には、 未知の合金で作られた複雑な電子回路が取りつけられていた。 その時代的にでたらめな技術の組み合わせから、 [Root.Owner.GetScientistPlural]はこの文明がコンピューター科学の発展段階をいくつか飛ばしたのではないかと推測している。\n\nそれでもなお、 [Root.Owner.GetLinguists]は試行錯誤のすえに、 多くの録音放送のうちの最初の1つを翻訳することに成功した。"
 cstorms.220.name: "崇高指導者より"
 cstorms.220.desc: "古めかしい通信メインフレームへの接続に成功し、 [Root.Owner.GetLinguists]は1つ目の放送の複製を用意した。 内容は次のようなものだ。\n\n§L「アドアカリア博愛会の民よ！\n\n我は指導者としてではなく、 友として、 そして助言者として諸君に語りかけよう。\n\n昼が翳り、 空が穢れつつあることを見過ごせはしまい。 天界ですら我らに仇なす存在となった。\n\nだが、 我は信じる。 寄進者たちが我らを信じたように、 我らが悲願を信じる。 諸君のことを信じる。\n\n幾世紀にもわたり、 同胞たちは唾棄すべき蛮族どもから天界を守ってきた。 この悪辣な軍勢から銀河を救うことこそ、 我らが宿命——そして、 宿命はただ一度の挫折で無に帰すことはない。 姦計を巡らす悪の軍勢になど、 我らは決して敗れはしない。\n\n我は我らが務めを信じる。 アドアカリア博愛会は、 すべての文明に誠と自由をもたらす。 我らが使命が、 我らを生かす。 我らが宿命が、 我らに勝利と繁栄をもたらす！\n\nよって友なる者たちよ、 疑念に屈してはならない。 ああ……我らが喪失を嘆こう。 死者たちを称えよう。 そして、 我らがつねづねそうしてきたように、 団結しようではないか。 寄進者たちのため、 アドアカリア博愛会のため、 そして博愛精神のために！」§!"
 cstorms.225.name: "ユニコミュの最後通牒"
 cstorms.225.desc: "古代のステーションで発見したデータの整理は、 [Root.Owner.GetLinguists]にとってかなり骨の折れる作業だったが、 なかには「必見」の印がつけられた放送が複数あり、 一部には会話の記録も残っていた。 以下に内容を記す。\n\n§Sイルサプネ・トゥエルシ - ニュースキャスター§!\n§L「——さて、 ユニコミュからの最近の干渉について議論していただくため、 最崇高教授のアクマニ・サンドー氏と、 「全知覚存在博士」ことエムエク・インナ氏をお招きしております。 最崇高教授、 外宇宙社会の要求についてはどうお考えですか？」§!\n\n§Sアクマニ・サンドー - 最崇高教授§!\n§L「けしからん要求だ！ あのユニコミュは、 文明未発達の惑星をこれ以上ないほど軽んじている。 銀河の道徳の守護者を自称する彼らに聞きたいものだ。 真に“反道徳的”なのは、 命を救う技術を出し惜しみすることでは？ 繁栄する社会を築くための我々の理念を共有しないことでは？ 破滅に向かって突き進む文明を無視し、 卑劣にも救いの手を差し伸べずにいるなど、 我々には到底受け入れられん！」§!\n\n§Sイルサプネ・トゥエルシ - キャスター§!\n§L「どれも素晴らしい指摘です！ 全知覚存在博士、 ユニコミュが我々の宿命に干渉していることに関しては、 あなたも同じく憤慨されておいでかと……」§!\n\n§Sエムエク・インナ - 全知覚存在博士§!\n§L「私がいまから申し上げることは驚きかもしれません。 ユニコミュの態度は頑なですが、 我々ももう少し、 彼らの懸念を理解する努力を──」§!\n\n§Tどうやら、 放送はここで打ち切られたようだ。§!"
 cstorms.225.a: "教条主義が横行していたのか。"
 cstorms.225.a.hive: "ひとつの声に従う我らとは真逆の社会だ。"
 cstorms.225.a.machine: "有機生命体の人生は議論ばかりだ。"
 cstorms.230.name: "『セインツ・アンド・サイオニック』"
 cstorms.230.desc: "注目するべき放送がもう1つ見つかった。 明らかにドラマ作品ではあるが、 我々の調査に役立ついくつかの有用な背景情報が含まれている：\n\n§Sアクタミアン・リワン§!\n§L「昨日の夜、 またエンチュラ・サマンと会ったそうね。 私と付き合うから、 もう会わないんじゃなかった？」§!\n\n§Sインエルカ・ユタエ§!\n§L「軽く挨拶しに行っただけだ。 僕が夢中なのは君だけさ」§!\n\n§Sアクタミアン・リワン§!\n§L「口ではそう言うけど、 頭のなかでは違うじゃない！ 言ってることと考えてることが違うわ」§!\n\n§Sインエルカ・ユタエ§!\n§L「そんな、 まさか君まで……？」§!\n\n§Sアクタミアン・リワン§!\n§L「ええ、 そうよ！ 昨日の晩、 超能力の才能に目覚めたの！ ふたりで深く心を通わせられると思ってたのに、 絶望を味わわされたわ！ あなたの頭のなかの思考にね！」§!\n\n§Sインエルカ・ユタエ§!\n§L「そうじゃない！ 思考は勝手に浮かんでくるんだ。 どうしようもないんだよ。 ああリワン、 君がその新しい超能力で、 僕の頭じゃなくて心を読めたなら……！」§!"
 cstorms.230.a: "超能力？  面白い。"
 cstorms.230.b: "くだらないたわ言だ！"
 cstorms.230.b.hive: "奇妙なほど個人主義的な娯楽だ。"
 cstorms.230.b.machine: "有機生命体のドラマ放送か。"
 dramatic_enthusiasm: "異星人ドラマファン"
 melodramatic_much: "異星人ドラマアンチ"
 cstorms.235.name: "古い放送"
 cstorms.235.desc: "我々の[Root.Owner.GetLinguists]が、 ニュース番組もいくつか翻訳した。 なかでも、 この放送が特に注目に値するという。\n\n§L「ハリオス星系からの報告は厳しさを増しています。 ソルファニ当局は卑劣にも、 エンイプサルで我らが勇敢なる啓蒙軍を待ち伏せしました！  しかし、 崇高指導者は“パトロンは我々のことを諦めなかった。 そして我々も、 いかなる未発達の文明も置き去りにしない”と発言し、 この活動を中断する予定はないことを明らかにしました。\n\nあの野蛮な当局と、 ユニコミュの代表が協力関係にあるとの噂も浮上しています。 しかしユニコミュの大使は、 星間社会はいかなる蛮族の弾圧者とも交流はしていないとし、 噂の指摘は崇高指導者の“都合のいいパラノイア”であると述べています。\n\nしかし、 強力な後ろ盾の有無にかかわらず、 ソルファニの啓蒙活動が危機的状況にあることは間違いありません。 この状況を好転させることは容易ではありませんが——」§!\n\n§T残念ながら、 放送の残りの部分は破損がひどく、 解読は不可能だ。 [Root.Owner.GetEngineerPlural]はすでにデータベースのコピーを済ませており、 いずれはこの忘れ去られた文明の情報をさらに復元できるだろう。§!"
 cstorms.235.a: "今後の調査結果を待つとしよう。"
 #Event: A Site Barren and Bare
 cstorms.245.name: "むき出しの荒野"
 cstorms.245.desc: "宇宙嵐が[planet_windswept_fates.System.GetName]星系を通過したことで、 考古学的に重要とみられる場所が[planet_windswept_fates.GetName]で見つかった。\n\n§Y[planet_windswept_fates.GetName]§!の事前スキャンによると、 大気は著しく不安定で、 惑星規模の巨大な嵐が猛威を振るっている。 このような惑星に文明の名残が存在するとは、 我々の[Root.Owner.GetScientistPlural]も考えもしなかったが、 調査を行えば多くのことが学べるだろう。"
 cstorms.245.a: "上陸部隊を編成しろ！"
 #Digsite: Windswept Fates
 site_adakarria_windswept_fates: "風とともに去りぬ"
 site_adakarria_windswept_fates_intro: "宇宙嵐は破壊をもたらすものだが、 この嵐は異星文明の痕跡を白日のもとに晒した。 この惑星の大気はおそろしく不安定だが、 上陸部隊を送り込めば、 この太古の文化の恐ろしい末路が明らかになるかもしれない。"
 cstorms.2105.name: "運ばれた砂"
 cstorms.2105.desc: "我々のチームは無事[From.Planet.GetName]に到着し、 すぐさま新たな環境の調査に取り掛かった。\n\n見たところ、 つい最近この星系を襲った猛烈な宇宙嵐が、 堆積していた塵や砂を吹き飛ばしたことで、 古い文明の名残がその姿を現したようだ。\n\n科学者たちがこの考古学的発見を詳しく調べていると、 衝撃的な事実が明らかになった。 遺跡を覆っている砂の層は、 周囲の土とはまったく異なる組成をしていたのだ。 惑星スキャンによると、 この堆積物は何百キロも離れた砂漠から来たもので、 激しい惑星嵐のような大きな力によって運ばれてきたとしか考えられなかった。"
 cstorms.2105.a: "続けろ。"
 cstorms.2110.name: "失われたもの"
 cstorms.2110.desc: "この惑星の奇妙な気象にもかかわらず、 [Root.Owner.GetScientistPlural]は順調に作業を進めていた。 だが日を追うごとに、 発見するものがますます不可解で不穏なものになっていった。\n\nはじめは石細工の残骸や炭化した有機物だった。 次に破れた布地、 革細工、 ポリマーを重ねたベストが見つかり、 最後にはかつてこの惑星に住んでいた有機生命体の亡骸が出てきた。\n\n次々と見つかる死体の乾燥した内臓には砂が詰まっており、 爪はもがき苦しみ地面を掻きむしったらしく、 すり減っていた。 どの死体も[Root.Owner.GetPreFTLLowerPlural]の軍用重装備に身を包み、 銃器で武装していた。 我々が廃墟と化した街だと思っていたものは、 集団墓地だったのだ。\n\nこれらの死体は数十世紀も前のものと思われるが、 紫外線や、 反応性の高い化学物質から完全に隔離されていたため、 有機物である死体もその装備も綺麗に保存されている。 ここで彼らに何が起こったのかは依然として不明だが。"
 cstorms.2110.a: "実にむごい最後だ。"
 cstorms.2115.name: "空からの死"
 cstorms.2115.desc: "[From.Planet.GetName]では不気味なものが出土しつづけている。 [Root.GetLeaderName]は、 この場所が埋葬地であった可能性は低いと考えている。 というのも、 この異星人たちは、 砂で窒息死するまでは健康体だったようなのだ。\n\nさらに、 重火器を発射できる兵器施設も多数見つかった。 意外にも兵器は地表に向けられておらず、 宇宙の深部に狙いを定めていた。\n\nこの惑星の住人が何と戦っていたのかは不明だが、 おそらく宇宙からやってきたのだろう。"
 cstorms.2120.name: "不滅の嵐"
 cstorms.2120.desc: "[From.Planet.GetName]で発見された奇妙な集団墓地に関する仮説を立てたが、 有益な結論は得られなかった。 唯一残された手がかりは、 この軍隊を丸ごと飲み込んだ砂がここにたどり着いた方法だ。\n\n極めて複雑な計算とシミュレーションの結果、 ここに砂を運んだ嵐が、 いまもこの惑星のどこかで猛威を振るっていると判明し、 小規模の遠征隊が調査のため派遣された。\n\n遠征隊を迎えた激しい嵐は、 その暴風によって地面に巨大な窪地を作り出していた。 これまでの謎に対する答えがあるとすれば、 嵐が住処とするこの深淵のなかで見つかるだろう。"
 cstorms.2120.a: "警戒を怠るな！"
 cstorms.2125.name: "遺体"
 cstorms.2125.desc: "巨大な窪地までの移動は困難を極め、 最大限の技術と注意が要求された。 嵐が荒れ狂うクレーターの中心では、 実に異様な白骨遺体が1つ見つかった。 その遺体は集団墓地内のものと同じくらい古かったが、 身体的特徴も遺伝子型も、 墓地で発見された死体とはまるで異なっている。\n\nその遺体が身につける制服は驚くほど状態がよく、 デザインもほかとは大きく異なっていた。 さらに、 いくつかの付属器官が意図的に取り除かれた形跡も残されていた……\n\nだが、 最も我々の興味を引いたのは、 センサーからの測定値だった。 遺体の周辺と内部で、 エネルギーの変動が検知されたのだ。 その特徴はこの巨大な嵐の内部と、 あの集団墓地を地上にさらけ出した宇宙嵐のものと驚くほど似ている。\n\nそこで、 ある仮説が生まれはじめた。 この人物は、 我々がこれまでに遭遇した嵐と関係があるのか？ 軍隊が砂に埋もれていたのは、 この人物の仕業なのだろうか？ 奇妙な考えだが、 事実がこれらの仮説を支持していた。"
 cstorms.2130.name: "そして再び塵となる"
 cstorms.2130.desc: "遺体の制服のシンボルをデータベースで照合したところ、 不可解な結果が出た。 この遺体は、 アドアカリア博愛会の民だったのだ！  以前探索した放送ステーションの持ち主である、 あの文明だ。 さらに驚きだったのは、 制服、 遺体の年代、 放送から得た情報が、 ひとつの事実を教えてくれたことだ。 あの放送で言及されていた惑星は、 まさにこの惑星だったのである。\n\n彼らのプロパガンダステーションから得た言語知識を使い、 [Root.GetLeaderName]がこの遺体の名前を解読した。 §Sハトゥーア・ガイロン§!だ。\n\nその直後、 周囲の嵐の規模と激しさが急速に増した。 天候予測が困難なこの土地に留まるのは危険すぎたため、 我々はこの星を見捨てて去ることを余儀なくされた。 アドアカリア博愛会の痕跡は、 再び途絶えてしまった。"
 #Storm to Signal
 cstorms.2140.name: "嵐から信号へ"
 cstorms.2140.desc: "白骨化した異星人の遺体と、 §Y[planet_windswept_fates.GetName]§!を破壊する大嵐のエネルギーの特徴は、 埋没していた軍隊を白日のもとにさらした宇宙嵐のエネルギーと一致していた。 スキャン記録によれば、 以前探索した星系に同様の揺らぎが存在するようだ。 さらにこの揺らぎは、 アドアカリア博愛会の放送周波数とも一致している！\n\n調査のために調査船を送り込むべきだろう。"
 #Fleets of the Trice Damned
 site_adakkaria_fleets_of_the_thrice_damned: "船の墓場"
 site_adakkaria_fleets_of_the_thrice_damned_intro: "このエリアの奇妙なエネルギー変動は、 船の巨大な墓場を隠していた。 このポリマーと金属で構成された死の都には、 アドアカリア博愛会を理解するための重要な手がかりが眠っているかもしれない。"
 cstorms.2150.name: "引き裂かれた残骸"
 cstorms.2150.desc: "長方形の木造船から、 結晶できた美しい宇宙箱舟まで、 ここにはあらゆる種類の船が眠っていた。 その多くは、アドアカリアの放送ステーションで見つけた通信や記録にあったイメージと類似している。\n\n「博愛会」の艦隊と、 数千年前に存在した銀河平和維持軍である「ユニコミュ」の艦隊が、 この場所で戦いを繰り広げたと我々は推測している。\n\nここにある艦船は修復不可能な状態だが、 一般的な兵器によって破壊されたようにも、 故障や類似のトラブルによって座礁したようにも見えない。 その船体と内部はまるで、 巨大なシュレッダーに襲われて引き裂かれたかのような状態だった。"
 cstorms.2155.name: "任務適用外"
 cstorms.2155.desc: "我々の[Root.Owner.GetEngineerPlural]が、 墓場に漂う船から慎重にデータバンクを回収した。 大部分は経年劣化により破損していたが、 アドアカリアのデータベースが1つだけ生き残っていた。 内容は次のようなものだ。\n\n§L「我々は待ち伏せされた。 繰り返す、 我々は待ち伏せされた。 ユニコミュは、 ロクコラ原始文明の啓蒙を中止するよう要求しており、 従わなければ我々を排除するという。 応答してくれ。 撤退しなければやられてしまう！  頼む、 せめて増援だけでも送ってくれ！」\n\n「無理だ。 だが諸君らの犠牲は記録しておく」§!"
 cstorms.2155.a: "あいつらは命よりも職務を優先する！"
 cstorms.2160.name: "奇怪な死体"
 cstorms.2160.desc: "[Root.Owner.GetLinguists]が新たな放送を翻訳する過程で、 また驚くべきものが見つかった。 船の墓場の真ん中に凍った死体が浮かんでいたのだ！\n\n大部分が干からびたその死体は、 博愛会の将校の服を身につけていた。\n\n不思議なことに、 まるで死体になんらかの引力があるかのように、 小さなデブリが輪のように連なって死体の周りを回っていた。 死体はさらなる分析のため、 船内に持ち込まれた。"
 cstorms.2165.name: "死者は語る"
 cstorms.2165.desc.intro: "凍結された死体のネームタグを翻訳したところ、 §Sアルアッタ・ランディア§!という名のアドアカリアのメンバーであることがわかった。 [planet_windswept_fates.GetName]で発見された死体と同様、 複数の付属器官が生前に外科的に切除されている。 ただし、 今回の死体はひどい焼傷も負っている。 特に胴体には極度の熱損傷や、 時間がかかり、間違いなく痛みを伴なったであろう回復痕が見られる。\n\n[Root.Owner.GetScientist]は残念ながらこれらの傷痕が、 [Root.Owner.GetPreFTLLowerPlural]が非協力的な被験者から情報を引き出すのに使う手法にぞっとするほど類似しているという結論に至った。 この者は帰還兵なのだろうか、 それとももっと陰惨なことに巻き込まれたのだろうか？"
 cstorms.2165.desc.def: "$cstorms.2165.desc.intro$\n\nこの傷ができた理由を特定するや否や、 我々の船の計器が急激な電力サージを検知し、 [Root.GetLeaderName]が悲鳴を上げはじめた。\n\nしばらく経ってから、 [Root.GetLeaderName]がそのときの経験を説明してくれた。 焼けるような強烈な光を感じたかと思うと、 ひどい痛みの波が襲ってきたのだという。 それはまるで、 何かに心を内側からこじ開けられるようだったらしい。"
 cstorms.2165.desc.psio: "$cstorms.2165.desc.intro$\n\n傷ができた理由を特定するや否や、 我々の船の計器が急激な電力サージを検知し、 超能力の才能を持つ乗組員が叫びはじめた。\n\nしばらく経ってから、 乗組員はその体験について説明してくれたのだが、 これ以上ないほど思考が明晰になったかと思うと、 脳を焦がすような激しい怒りの波が押し寄せてきたのだという。 [Root.GetLeaderName]が言うには、 その怒りの奥底には恐ろしい驚きと深い裏切りの感覚があったらしい。 そして、 §L“呼び覚まされた”§!、 という考えが頭のなかに浮かんだそうだ。"
 cstorms.2165.desc.psio_robot: "$cstorms.2165.desc.intro$\n\n傷ができた理由を特定するや否や、 我々の船の計器が急激な電力サージを検知し、 ユニット内部で電力スパイクが発生した。\n\nしばらく経って乗船員が、 サイオニック・プロセッサが極度の怒りとして記録したその瞬間に何が起きたかを報告してきた。[Root.GetLeaderName]によれば、 その感情反応とともに「§L呼び覚まされた§!」という思考が頭の中に浮かんだというのだ。"
 cstorms.2165.desc.gestalt: "$cstorms.2165.desc.intro$\n\nこのことがわかった直後、 乗組員のデータバンクが不可解な力により破損した。 一部の[controller.GetIndividualNamePlural]は短時間の電力サージによって身体の自由が利かなくなったり、 暗号化された支離滅裂なイメージにさらされたり、 音声変調器から120デシベルを超える突き刺すような音が発せられたりした。"
 cstorms.2165.a: "-- 信号喪失 --"
 cstorms.2170.name: "ランディアの置き土産"
 cstorms.2170.desc.def: "調査船「§Y[Root.GetFleetName]§!」との通信が復旧してすぐ、 乗組員の叫び声が響き渡った。 しばらくしてから混乱が落ち着くと、 彼らが船内に持ち込んだ異星人の死体がこの叫びの原因であることが明らかになった。\n\n死体そのものが、 彼らの心に奇妙な力を及ぼしていたのだ。 そして小さな物体が宙に舞い上がり、 死体の周りを回りはじめたかと思うと、 内壁の一部が圧力によって歪み、 引き裂かれた。\n\n§Y[Root.GetLeaderName]§!はなんとかショック状態から立ち直り、 その死体を船から放出することに成功した。 また、 [Leader.GetHeShe]の迅速な行動のおかげで、 調査船は突如発生した宇宙嵐からも逃れることができた。 [Root.GetLeaderName]が目を覚まさなかったら、 墓場に新しい船が加わっていたことだろう。\n\n自らの体験を話していると、 [Root.GetLeaderName]は別のことを思い出した。 あの死体の奇妙な力の源がなんであれ、 それは船のコマンド画面に特殊な模様を描き出したのだという。 これは一種の意志疎通だろうか？  それとも、 あの世からの叫び声なのだろうか？\n\n現時点で答えを知る術はない。"
 cstorms.2170.desc.gestalt: "探査[controller.GetIndividualNamePlural]を破損させた不可解なイメージが解読された。 イメージを組み合わせると、 古代の軌道上居住地の画像ができあがったのだ。 [controller.GetScientistCapital]は、 ある人物が受ける拷問の光景と音に悩まされた。 その人物は身体を焼かれ、 内臓は調理された。\n\n音と映像による攻撃から逃れられた[controller.GetIndividualNamePlural]もいた。 彼らが言うには無数の小さな物体が浮遊し、 死体の近くを回りだしたのだという。 その有機生命体の死体は、 どういうわけか独自の重力場を形成していたのだ。\n\nこの未知の力は強まっていき、 やがてその圧力によって内壁の一部がゆがみ、 裂けはじめたが、 その瞬間に安全システムが再稼働し、 死体は宇宙空間に放出された。\n\nその直後、 星系内に宇宙嵐が生じ、 我々の船は辛くも脱出することができた。\n\nこの出来事の真の意味は不明だが、 答えよりも多くの疑問が生まれることとなった。"
 #Special Project: Assembling the Past
 cstorms.2180.name: "推論と発見"
 cstorms.2180.desc: "§Y[planet_assembling_the_past.System.GetName]§!星系での[FromFrom.Leader.GetName]の経験により、 科学者たちはこれまで以上に熱心に、 アドアカリア博愛会に何が起こったのかを突きとめようとしている。 [planet_windswept_fates.GetName]と船の墓場の探索で集めたデータを組み合わせたところ、 銀河の各所にアドアカリアのプロパガンダステーションが存在していることがわかった。\n\nさらに、 長時間にわたる議論の末、 [Root.GetName]での混乱の際に観測された「模様」は、 未知の星系に向けて送られた指令である可能性が浮上した！\n\nこの未知の星系を調査するため、 スペシャルプロジェクトが発令された。"
 project_adakkaria_tracing_history: "歴史をたどって"
 project_adakkaria_tracing_history_DESC: "座標は[planet_assembling_the_past.System.GetName]星系にある惑星を指している。 この惑星とアドアカリア博愛会との関係を調べるため、 探査船を派遣すべきだろう。"
 NAME_adSalivul: "アドサリヴル"
 NAME_Patriotic_Institute_of_Exalted_Benevolence: "崇高なる博愛"
 cstorms.2185.name: "古代の軌道上居住地"
 cstorms.2185.desc: "当初、 [From.solar_system.GetName]星系の調査は行き詰まったかのように思われた。 座標はひとつの惑星を示していたが、 その磁場はあまりも不安定で、 地表は壊滅状態だったのだ。 そのような星に、 何か価値あるものが残っているとは思えない。\n\nしかし、 その惑星の軌道上には、 アドアカリアの放送ステーションと似た建築様式の古い軌道上居住地があった。 外部から密閉された状態でロックされていたが、 アドアカリアのデータベースから回収した情報をもとに、 開錠信号を生成することができた。\n\n最後に誰かがこのステーションに乗り込んだのは、 はるか昔のことだ。 中に何が待ち受けているのかは知る由もない。"
 cstorms.2185.a: "慎重に行動しろ。"
 #The Patriotic Institute of Exalted Benevolence
 site_adakkaria_the_patriotic_institute: "崇高なる博愛の学び舎"
 site_adakkaria_the_patriotic_institute_intro: "荒れ果てた惑星の軌道上には、 アドアカリア博愛会によって建造された古代の軌道上居住地があった。 高品質の建材が使われており、 そのためステーションはほぼ新品の状態を保っていた。\n\n放送用の周波数に合わせると、 §L「崇高なる博愛の学び舎へようこそ」§!というメッセージが流れ、 そのあとで騒々しいジングルが鳴り響いた。"
 cstorms.2200.name: "博愛に至る道"
 cstorms.2200.desc: "エアロックを抜けると小規模のトンネル網が広がっており、 探索のすえ、 我々は人工の太陽光に照らされた巨大な広場にたどり着いた。 奇妙なことに、 この軌道上居住地の建築様式は高名な科学ステーションというよりも、 特定の居住用惑星に見られる郊外のような雰囲気だった。 集合住宅、 ショッピングセンター、 学校に加え、 庭園や公園といった施設もある。 ここは贅沢な暮らしを送るために設計された場所だったのだ。\n\nだが、 それもいまでは完全な廃墟と化している。 この軌道上居住地のどこにも、 有機生命体は1つとして検出されなかった。 探索を続けていると、 この場所の空虚さと、 殺伐とした雰囲気に我々は打ちのめされてしまった。\n\n人工太陽光にはときおり不具合が生じ、 ステーションが暗闇に包まれることがあった。 ほかの電子機器も大部分が稼働していたが、 こちらも同じ不具合の影響を受けている。 だが最も興味を引いたのは、 居住地内の共同住宅で見つけた監視装置のネットワークである。 どうやら、 全市民が厳しい監視下に置かれていたようだ。 セキュリティ施設のようなものが見つかれば、 より詳しい情報が得られるかもしれない。"
 cstorms.2205.name: "終わらない不具合"
 cstorms.2205.desc.intro: "ステーション内の街を探索し、 インデックスを作成し、 監視装置をマッピングするのには何日も要した。 セキュリティ施設はこの居住地において完全に分断されており、 別の入場コードが必要だった。\n\nそこには大量の監視装置に繋がれたままのモニターが何列も並んでいた。 まだ機能しているモニターはステーションの隅々まで映し出していたが、 これもまた電気的な不具合の影響を受けていた。"
 cstorms.2205.desc.mach: "$cstorms.2205.desc.intro$\n\n我々のドローンはこの不安定な監視映像を見て、 あの船の墓場でアドアカリア博愛会と関わった事件を思い出し、 不安を感じていると報告した。\n\n$cstorms.2205.desc.outro$"
 cstorms.2205.desc.def: "$cstorms.2205.desc.intro$\n\n[Root.GetLeaderName]はこの不安定な監視映像を見ると、 あの船の墓場でアドアカリア博愛会と関わった事件を思い出し、 心が落ち着かないと報告した。\n\n$cstorms.2205.desc.outro$"
 cstorms.2205.desc.outro: "だが最も心をかき乱したのは、 中央セキュリティハブでの発見だった。 画面に表示された警告メッセージによると、 この軌道上居住地は自爆するように設定されていたのだ！\n\n我々の[Root.Owner.GetEngineerPlural]は、 この街で発生していた故障が、 このコマンドの実行を妨げていたのだろうと推測した。 我々は速やかに自爆ルーチンを解除すると、 [Root.Owner.GetLinguists]にここで回収できた記録を解読するよう命じた。 奇妙なことに、 このステーションからの報告は、 プロパガンダステーションで回収した最後の記録のほぼ1年前に途絶えていた。"
 cstorms.2210.name: "崇高なる実験"
 cstorms.2210.desc: "我々の[Root.Owner.GetLinguists]が[From.Planet.GetName]の軌道上居住地の目的を発見するのには、 そう長くはかからなかった。 市民やスタッフの記録やメッセージは、 アドアカリア市民のあいだで新たに発現した超能力に関する調査について語っている。 ここに住んでいた人々は皆、 博愛会の「崇高指導者」から招待を受け、 この居住地での贅沢な暮らしと自己表現を楽しんでいた。 その見返りとして、 彼らはこのステーションで行われていた実験に参加することに同意していた。\n\nほとんどの市民はプログラムへの参加に乗り気だった。 セキュリティログによると、 市民の多くは戦いで障害を負った退役軍人だった。 彼らは介護、 経済的援助、 未解決の法的問題の恩赦を約束されていた。\n\nさらに、 ステーションの人員リストには見覚えのある名前が載っていた。 §Sアルアッタ・ランディア§!——科学者であり、 障害を負った軍人であり、 我々が船の墓場で回収した、 身体の一部を切断された遺体の名前だ。"
 cstorms.2210.a: "ようやく成果が出たな。"
 cstorms.2215.name: "被験者の言葉"
 cstorms.2215.desc: "この軌道上居住地から送られた最後のメッセージのうち、 1つを解読した。\n\n§gメッセージ - 日付 02100363 - 送信者：§Sシダニ・イテンピア§! - 受信者：シズル・イテンピア§!\n§Lやあ、 まだくたばってないぞ！  連絡が遅れてすまない。 あれ以来ずっと……居住地の様子がおかしくて、 メッセージを送るのもひと苦労なんだ。 「関係ない」と言われたが、 やはり彼には超能力の才能があったんだと思う。 自分はというと、 前にも言ったが全然うまくいってない。 原因はわかってるが…… それで、 もっと思い切ったことをやろうと彼らに言われたよ。 そう……宇宙嵐さ。 不安に思うかもしれないが、 たったの指1本だし、 超能力で新しいのが生えてくるかもしれない。 それに、 あの解き放たれた感覚といったら……！\n愛を込めて、 シダニ\n- 通信§! §Y検閲済 (質問は管理者まで)§!\n\n§gメッセージ - 日付 02100365 - 送信者：§Sハトゥア・ガイロン§! - 受信者：エダル・アスドゥア§!§L\n親愛なるエダルへ\nここでの暮らしはいいよ。 ほかの退役軍人にも何人か会った。 話はしないが、 お互いのことを理解してる。 話す必要がないってのはいいね。\n今日は頭のなかで念じただけで、 コップが持ち上がった。 いまも右腕があったらとは思うが、 この新しい生活は思ったほど悪くはなさそうだ。 俺をどこかに移動させるって話を聞いたよ…… どうやら俺は超能力の天才らしい…… 俺は……また戦場に派遣されたいんだ。\n愛国者の日には故郷に帰りたいと思ってる。 その日にまた会おう。\nハトゥアより\n- 通信§! §Y検閲済 (質問は管理者まで)§!\n\n§gメッセージ - 日付 02100367 - 送信者：§Sエンリダ・ディリーン§! - 受信者：オンリダ・ディリーン§!\n§L念じるだけで火を消せたわ！！！\n被験者の1人がどういうわけかヒステリーを起こしちゃって、 食堂で火事を起こしたの。 皆パニックになったけど、 どこにも逃げられなかった！  すっごく怖かったけど、 そしたら私のなかで何かが起こって、 火を消せたの！\n皆を助けたのよ！！  いまに見返してやるってみんなに言っといて！\n- 通信§! §Rブロック (すぐに管理者に報告すること)§!\n\n着目すべきは、 以下の2つ目の通信だ。\n\n§Sハトゥア・ガイロン§!の遺体が、 [Root.Owner.GetPreFTLLowerPlural]の惑星における考古学調査で見つかった。"
 cstorms.2215.a: "よくやった！"
 cstorms.2220.name: "不具合の代償"
 cstorms.2220.desc: "以下のメッセージは、 この軌道上居住地からの立ち退きが行われる数日前に送られたものだ。\n\n§gメッセージ - 日付 02100359 - 送信者：最高位博士 - 受信者：尊崇提督§!\n§L前回のメッセージを読んで、 少し不安を覚えました。 長年無条件に支援してくださったのに、 なぜ急にここの閉鎖を決めたのかご説明いただけますか？\n- 通信§! §G送信済§!\n\n§gメッセージ - 日付 02100360 - 送信者：尊崇提督 - 受信者：最高位博士§!\n§Lふざけてるのか？ 我々は何ヵ月も前から警告してたぞ。 気まぐれな惑星の軌道を回っているせいで、 都合のいい記憶喪失にでもなったらしい。 ユニコミュが我々の存在を脅かしてることは知ってるな？ 戦争が激化するなか、 お前のところの被験者が一日中家畜をぼんやり眺めるだけの研究に、 途方もない労力や物資をつぎ込むのはもはや正当化できない。 具体的で実用可能な成果が必要だ。 いますぐにな。\n- 通信§! §G受信済§!\n\n§gメッセージ - 日付 02100360 - 送信者：最高位博士 - 受信者：尊崇提督§!\n§L申し訳ない。 そちらの以前のメッセージは届いていなかったもので。 我々のステーションは技術的な不具合に悩まされており、 それで通信にも影響が出たのでしょう。 いずれにしても、 もう少し時間が必要です。 然るべきプロセスや手順というものがあって、 それを無視するわけにはいかないのです！\n- 通信§! §G送信済§!\n\n§gメッセージ - 日付 02100361 - 送信者：尊崇提督 - 受信者：最高位博士§!\n§L1週間で結果を出せなければ、 そこは即座に閉鎖する。 言い訳は無用。 チャンスは一度きりだ。 結果を出せ！\n- 通信§! §G受信済§!\n\n§gメッセージ - 日付 02100368 - 送信者：最高位博士 - 受信者：尊崇提督§!\n§L直近の成果報告を添付しました。 これらの動画は、 超能力の才能を持つ被験者が宇宙嵐に影響を与えられることの証明です。 軍事利用が大いに期待できるでしょう。 十分な時間があれば、 肉体的・精神的外傷を負わせることなく、 超能力の発現を強めることができます。\n- 通信§! §R失敗 (原因：通信マトリックスの破損)§!"
 cstorms.2220.a: "最後のメッセージは届かなかったのか。"
 cstorms.2225.name: "未完の運命"
 cstorms.2225.desc: "回収できたメッセージは以下のものが最後だ。§L\n\n親愛なる同僚のみなさん\n\n心苦しいお知らせですが、 崇高司令部は、 「崇高なる博愛の学び舎」の全活動の停止を決定しました。\n\nあなた方や、 ここでの研究のせいではありません。 みなさんと協力できたことを光栄に思います。 疑問は尽きないでしょうが、 端的に言えば、 崇高司令部が期待するものと、 我々の研究目的が一致しなかったということです。\n\n市民のみなさんについては、 崇高司令部がアドサルの$building_adakkaria_patriotic_institute$で実施中のプログラムに招待されました。 全職員リストを添付しますので、 それに従ってご報告ください。\n\nそれ以外の方については……誠に遺憾ながら、 我々の研究は極秘であったため、 参加者は社会復帰が許されません。 崇高司令部が、 彼らの処理を担当する特別部隊を派遣いたします。 幸い、 あなた方がそれを見届ける必要はありません。 親族には最大限の補償が行われます。\n\nお知らせは以上です。\n最高位博士、 §!§Sアルアッタ・ランディア§!\n\n添付のリストは一部破損していたが、 被験者である§Sハトゥア・ガイロン§!と§Sエンリダ・ディリーン§!の名前が記載されていた。 彼らはアドアカリア博愛会の首都、 アドサルに転属したようだ。 そして、 この惑星の座標はすでに判明している。"
 cstorms.2225.a: "アドアカリアの母星に針路をとれ。"
 #Special Project: Eye of the Convention / The Void Calls
 cstorms.2240.name: "博愛会の本拠地"
 cstorms.2240.desc: "座標を手に入れたことで、 スキャナーでは発見できなかった星系の存在が明らかになった。 アドアカリア博愛会を訪れるとしよう——ほかの者に先を越される前に。\n\n新たなスペシャルプロジェクトが発令された。"
 cstorms.2245.name: "虚無の呼び声"
 cstorms.2245.desc: "軌道上居住地を離れた直後、 [event_target:leader_patriotic_institute.GetName]が突然驚くような決断を下した。 [event_target:leader_patriotic_institute.GetHeShe]はまるで外部からの力に突き動かされたかのように、 大規模サイオニック現象や、 一時的な宇宙嵐の通過に関連する通信チャンネルを開くよう命じたのだ。 \n\nこのチャンネルは、 アドアカリア博愛会の母星系と同じ座標に向けられていた。 そして、 我々の呼びかけに対し即座に応答があった。"
 cstorms.2245.desc.gestalt: "軌道上居住地を離れた直後、 我々の集合意識体は異様な振動に襲われた。 それはまるで、 何者かが遠く離れた場所から我らと交信しようとしているかのようだった。 信号の発信源はアドアカリア博愛会の母星系で、 大規模サイオニック現象や、 一時的な宇宙嵐の通過に関連する周波数で送信されていた。\n\nその呼びかけに応えると、 即座に応答があった。"
 cstorms.2250.name: "嵐の呼び声"
 cstorms.2250.desc: "手は尽くしたが、 アドサルへたどり着くのは予想以上に困難だった。 星系全体が未知の性質を持つ宇宙嵐に包み込まれており、 惑星への接近は不可能だったのだ。\n\nその宇宙嵐のほうはというと、 どうやら……我々に呼びかけている？"
 #The Storm
 cstorms.2260.name: "宇宙嵐"
 cstorms.2260.desc: "我らの名を呼べ\n\n我らの名を呼べ\n\n我らの | 名を | 呼べ"
 cstorms.2260.a: "お前は誰だ？"
 cstorms.2260.b: "ここで何があった？"
 cstorms.2260.c: "名前とは？"
 cstorms.2260.a.resp: "なる | ならない | もどる\n\n轟く嵐と怒り\n\n痛みと怒り　悲しみと恐れ\n\n我らの名を呼べ"
 cstorms.2260.b.resp: "呼び起こせ｜喚起せよ｜呼び覚ませ\n\n我らの名を呼べ"
 cstorms.2265.name: "$cstorms.2260.name$"
 cstorms.2265.desc: "我らに　考え | 話し | 望み | 夢見る　ことはできない\n\n我らは　その名により　呼び覚まされる | 我らを取り戻せ | 我らは忘れられた\n\n我らの名を呼べ"
 cstorms.2265.c.resp: "$cstorms.2265.desc$"
 cstorms.2265.d: "お前たちの名前はどこで見つけられる？"
 cstorms.2265.e: "その祝典とやらを見せてくれ。"
 cstorms.2270.name: "$cstorms.2260.name$"
 cstorms.2270.desc: "それは祝典\n\nそれは祝典\n\n痛み | 怒り | 悲しみ | 恐れ\n\n祝典\n\n我らの名を呼べ"
 NAME_adSul: "アドサル"
 project_adakkaria_benevolent_grounds: "博愛の地"
 project_adakkaria_benevolent_grounds_DESC: "アドアカリア博愛会の母星系を指し示す座標を回収した。\n\nこの星系と母星を探索すれば、 アドアカリア文明がたどった末路が明らかになるだろう。"
 #Celebration
 site_adakkaria_celebration: "祝典"
 site_adakkaria_celebration_intro: "宇宙嵐との交信のあと、 アドサルのごく一部が我々の前に姿を現した。 雲の切れ間から巨大な施設が覗く。 打ち棄てられてはいたものの、 不思議なことに数千年という年月の影響は受けておらず、 スキャンによって内部に有機物があることが判明した。\n\nその巨大な建造物の前には、 「祝典の時」と記された旗が幾重にも掲げられていた。"
 cstorms.2285.name: "突然の終わり"
 cstorms.2285.desc: "祝典の学び舎の空っぽの広間には、 長い年月で積もった埃があるだけだった。 かつて繁栄し、 恐れられたこの帝国の残骸は、 アドアカリア博愛会の勇ましさを永遠に称えつづけるプロパガンダポスターだけだ。\n\nとはいえ、 我々のこれまでの言語解読の努力が実を結んだ。 セキュリティは素通りも同然で、 メインフレームからは重要な情報を容易に抜き出すことができた。\n\n我々が回収した記録を覗くと、 プロパガンダステーションの放送が停止することを知ってか知らずか、 活気に満ちたやり取りが残っていた。\n\nそして、 その日のうちにアドアカリア博愛会は消え去った。"
 cstorms.2290.name: "地獄への降下"
 cstorms.2290.desc: "恐怖と好奇心を感じながら、 我々は施設の地下へと降りていった。 そこには綿密な計画に沿って作られた研究室群が広がっていたので、 我々は部隊を2つに分けることにした。 一方は祝典の目的を解明するため研究室に向かい、 もう一方は引き続き下へと降りていった。\n\nスキャンは相変わらず有機物の存在を示していたが、 その理由はすぐに判明した。 下層階は当時観察室として使われており、 その狭い部屋にアドアカリア市民のミイラ化した遺体が残されていたのだ。 各部屋の横にあるインターフェースには、 収容者の名前、 受けていた試験の段階、 そして観察者によるメモが表示されていた。\n\n一方で、 別の部隊が以下のメッセージを回収した。\n§L「ハリオス星系での試験運用は完全な大失敗だった。 §Sハトゥア・ガイロン§!という名の被験者の初配備は計画通り進んだが、 ソルファニの蛮族軍と遭遇するや否や、 被験者は制御不能になった。 嵐は原始種族の部隊を一掃したが、 我らの部隊も壊滅してしまった。\n\nまず第一に、 被験者どもが下劣で、 精神に異常をきたしていることを我らは理解すべきだ。 一刻も早く励起装置を稼働させなければ。§!"
 cstorms.2290.a: "ここで何が行われていた？"
 cstorms.2290.a.gen: "死屍累々だな。 感動的だ。"
 cstorms.2295.name: "ある種の祝典"
 cstorms.2295.desc.start.authgen: "アドアカリア博愛会が行った実験は素晴らしいものだった。 被験者にはそれぞれ段階が割り当てられ、 段階が上がるにつれ処置の残忍さも増していった。 火や電気を利用して超能力の活性化を強制したり、 重要な器官を切除することで発現しつつある力やほかの感覚の使用を促したり、 精神変容物質を投与して臨死状態を誘発したりなど、 非常に革新的な処置もいくつかあった。\n\nここには確かに、 インスピレーションの源となるものが残されていた。 この施設の専門家たちはアドアカリアによる銀河の支配という、 共感できる目標に向けて取り組んでいたのだから。\n\nしかし報告書によれば、 被験者が命を落としたのはこうした処置のせいではない可能性がある。 §Sハトゥア・ガイロン§!の例が示すように、 多くは単に制御不能に陥ったようだ。"
 cstorms.2295.desc.start.default: "犠牲者の遺体を目の当たりにしたとき、 我々は大きな恐怖と戸惑いを感じたが、 アドアカリアの実験の内容と目的を理解したいという気持ちも、 また大きかった。\n\nアドアカリアの科学者による報告には、 犠牲者たちに何をしたのかが無感情に記されていた。 犠牲者にはそれぞれ段階が割り当てられ、 段階が上がるにつれ処置の残忍さも増していった。 火、 電気、 切断、 感覚と栄養の遮断など、 残酷だとは微塵も思わなかったようだ。 すべては、 銀河におけるアドアカリアの覇権を維持するために行われた。 しかし報告によれば、 被験者を死に至らしめたのはこうした行為のせいではない可能性がある。 §Sハトゥア・ガイロン§!の例が示すように、 多くは単に制御不能に陥ったようだ。"
 cstorms.2295.desc.end.default: "調査を終えた直後、 [Root.GetLeaderName]が倒れた。 [Root.GetLeaderName]は苦痛にうめきながら、 何かが心をこじ開けようとしていると叫んだ！\n\nいまのところ容体は安定しているが、 どうやら何者かが[Root.GetLeaderName]のなかに侵入し、 過激な考えを植えつけようとしたらしい。 [Root.GetLeaderName]はこの体験が、 最終的には大きな利益をもたらす可能性があると考えており、 もう一度試したがっている。"
 cstorms.2295.desc.end.psionic: "[Leader.GetHeShe]が遺体を観察していると、 [Root.GetLeaderName]の耳に奇妙なささやきが聞こえはじめた。 姿なき声が、 渇望とともに呼びかける。\n§L「我らは忠実だった！  博愛会を称え、 その使命を信じた」\n「嵐は我らに呼びかけつづけた。 嵐は我らを飲み込み、 我らを求めた！」\n「我らは求めに応じた。 我らには才があり、 粘り強かった！」\n「やつらは我らを悪と呼び、 裏切り者と呼び、 友を殺した！」\n\n「これは！  祝典の！  はずだった！」§!\n\nささやき声は、 「最終段階」と書かれた通路へ我々を導いた。 だが、 より高度なセキュリティが施されており、 立ち入りを阻まれた。"
 cstorms.2295.desc.end.psionic_individual_robot: "[Leader.GetHeShe]が遺体を観察していると、 [Root.GetLeaderName]が解析可能なサイオニック通信を検知しはじめた。\n§L「我らは忠実だった！  博愛会を称え、 その使命を信じた」\n「嵐は我らに呼びかけつづけた。 嵐は我らを飲み込み、 我らを求めた！」\n「我らは求めに応じた。 我らには才があり、 粘り強かった！」\n「やつらは我らを悪と呼び、 裏切り者と呼び、 友を殺した！」\n\n「これは！  祝典の！  はずだった！」§!\n\n通信は、 「最終段階」と書かれた通路へ我々を導いた。 だが、 より高度なセキュリティが施されており、 立ち入りを阻まれた。"
 cstorms.2295.desc.end.psionic_gestalt: "遺体を調べていると、 集合意識を通じて新たな声が我々の中に流れ込んできた。その声は[Root.GetLeaderName]を通信媒体として利用していた。\n§L「我らは忠実だった！  博愛会を称え、 その使命を信じた」\n「嵐は我らに呼びかけつづけた。 嵐は我らを飲み込み、 我らを求めた！」\n「我らは求めに応じた。 我らには才があり、 粘り強かった！」\n「やつらは我らを悪と呼び、 裏切り者と呼び、 友を殺した！」\n\n「これは！  祝典の！  はずだった！」§!\n\nその声は、 「最終段階」と書かれた通路へ我々を導いた。 だが、 より高度なセキュリティが施されており、 立ち入りを阻まれた。"
 cstorms.2295.desc.end.gestalt: "[controller.GetIndividualNamePlural]たちの認知プロセスにはさらに奇妙な歪みが生じ、 自分のものではない思考がほとばしる。 その思考を通じ、 我らはこの研究所の被験者たちが、 非物理的な手段で話し合っていたことを知った。 発生初期の集合意識のように、 ほぼ瞬時に考えが伝達されるのだ。\n\n正確な文言を解読することはできなかったが、 彼らの話し合いの目的は明らかだった。 祝典の学び舎の内部で、 反乱が起ころうとしていたのだ。"
 cstorms.2295.desc.authgen.default: "$cstorms.2295.desc.start.authgen$\n\n$cstorms.2295.desc.end.default$"
 cstorms.2295.desc.authgen.psionic: "$cstorms.2295.desc.start.authgen$\n\n$cstorms.2295.desc.end.psionic$"
 cstorms.2295.desc.authgen.psionic_individual_robot: "$cstorms.2295.desc.start.authgen$\n\n$cstorms.2295.desc.end.psionic_individual_robot$"
 cstorms.2295.desc.authgen.psionic_gestalt: "$cstorms.2295.desc.start.authgen$\n\n$cstorms.2295.desc.end.psionic_gestalt$"
 cstorms.2295.desc.authgen.gestalt: "$cstorms.2295.desc.start.authgen$\n\n$cstorms.2295.desc.end.gestalt$"
 cstorms.2295.desc.default.default: "$cstorms.2295.desc.start.default$\n\n$cstorms.2295.desc.end.default$"
 cstorms.2295.desc.default.psionic: "$cstorms.2295.desc.start.default$\n\n$cstorms.2295.desc.end.psionic$"
 cstorms.2295.desc.default.psionic_individual_robot: "$cstorms.2295.desc.start.default$\n\n$cstorms.2295.desc.end.psionic_individual_robot$"
 cstorms.2295.desc.default.psionic_gestalt: "$cstorms.2295.desc.start.default$\n\n$cstorms.2295.desc.end.psionic_gestalt$"
 cstorms.2295.desc.default.gestalt: "$cstorms.2295.desc.start.default$\n\n$cstorms.2295.desc.end.gestalt$"
 cstorms.2295.a: "[Root.GetLeaderName]の好きなようにさせろ。"
 cstorms.2295.b: "[Root.GetLeaderName]に勝手なことはさせるな。"
 cstorms.2295.a.psionic: "犠牲者たちはいまも泣いている。"
 cstorms.2295.a.psionic_gestalt: "一つとなった彼らの声はいまも苦痛の悲鳴を上げている。"
 cstorms.2295.a.gestalt: "不調和は混沌を生む。"
 cstorms.2300.name: "そしてすべてが語られる"
 cstorms.2300.desc: "$building_adakkaria_patriotic_institute$の、 最後の区画を開錠するため懸命に作業していると、 下層の研究室から不可解な報告が届いた。 アドアカリアの科学者は、 ありとあらゆる存在のなかに、 おそらくは知性を持つ機械のなかにさえ、 “火花”が存在するのだと主張していた。 宇宙嵐の発生から着想を得た彼らは、 この力を「内なる嵐」と名づけた。 それは知性を持つすべての生命体を駆り立てる、 欲望と力の渦だ。 この内なる嵐を過酷な状況にさらすことで、 大きな力を解き放つことが可能だった。\n\nこの効果を最初に発見したのは、 当時捕虜だった§Sアルアッタ・ランディア§!だ。 彼は科学者として、 祝典の学び舎でのさらなる試験に資金を提供するよう、 崇高司令部を説得した。 §Sランディア§!の身に何が起こったかは記録にないが、 船の墓場での出来事を考えると、 悲惨な最期を迎えたのだろう。\n\nその後の報告には、 内なる嵐を解放する“より効率的な”方法が記されている。 その方法ではむごい仕打ちは必要なく、 被験者の内面に、 逃れようのない致命的な恐怖を呼び起こすだけでよかった。 この効果を大規模に発生させるため、 アドアカリア博愛会はプロパガンダステーションの広大なネットワークを通じ、 信号を送る計画を立てていた。"
 cstorms.2300.desc.psionic: "観察室で聞こえたささやき声を録音することに成功した。 内容は以下のようなものだ。\n\n§L「ここから出してくれ、 頼む。 僕は立派な市民だったんだ！」\n「夢に見るのは終わりのない嵐だけ。 嵐が私に呼びかけてくる」\n「理解できない。 俺たちは実験に貢献してたのに、 どうしてこんなことを？」\n「我々のなかには力が眠ってる。 やつらはその力を利用したいだけ——あいつらに力を渡しちゃだめだ」\n「馬鹿馬鹿しい。 これは博愛会を救うための実験だ。 彼らの言うことに従わないと」\n「衛星が私にささやく。 私の心は銀河を越えてどこへでも行ける……」\n「彼らが何か装置を設計してた。 どこでも、 誰にでも同じことができる装置だ」\n「我々はきっと大丈夫だ。 彼らの言う通りにしよう！」\n「お前はわかってない。 俺たちにこんなことができるなら、 連中は誰にでもやる」\n「みんなで協力すればここから逃げ出せる」\n「でも、 そしたら私たちは……」\n「どうせやつらは俺たちを殺すつもりだ。 “あれ”が使えるようになったらな。 皆殺しさ」\n「怖いよ、 死にたくない。 生きたいよ。 お願い……」\n「最終段階が語りかけてきた。 私たち全員が同意するか知りたがってる」§!"
 cstorms.2300.b: "この力は手に入れなければ。"
 cstorms.2300.a.psionic: "なんて悲惨な最期だ。"
 cstorms.2300.a.psionic_hive_robot: "残念な結果だ。"
 cstorms.2300.b.psionic: "犠牲ほど尊いものはない。"
 cstorms.2300.b.psionic_hive_robot: "価値ある犠牲だ。"
 cstorms.2305.name: "宇宙嵐励起装置"
 cstorms.2305.desc.start: "我々は巨大な格納庫を発見した。 おそろしく複雑に張り巡らされたワイヤー、 パイプ、 電子機器が空間を埋め尽くしており、 そのすべてが巨大ミサイルサイロ (いまは空っぽだ) に繋がっていた。 見るかぎりでは、 張り巡らされたワイヤー類はコルベットほどの大きさの物体につながっていたようだ。\n\n記録によると、 この場所は§l宇宙嵐励起装置§!と呼ばれる装置を組み立てるために用いられており、 その装置はアドサル星系に配備されたらしい。 励起装置との通信は途絶えているが、 §G励起装置の電源§!はまだ生きていた。"
 cstorms.2305.desc.end.default: "その名前を読み上げた乗組員は理不尽な怒りに駆られ、 ケーブルやパネルを引きちぎりはじめた。 命令に従わないので、 落ち着かせるまでに時間がかかってしまった。 我々は真実に近づいているようだ。"
 cstorms.2305.desc.end.psionic: "[Root.GetLeaderName]がその空の構造物に近づくと、 超能力によるささやき声がまた聞こえてきた。\n§L「わかるだろう？  はじめは奴らが何を建てているのかわからなかった。 まさか我々を処分するつもりだったとはな。 復讐を望む者もいた。 自由を求める者もいた。 嵐の呼び声が聞こえる者もいた。 わかるだろう、 もう終わらせるしかなかったのだ。 もうそれしかなかった。 もはや耐えられなかったのだ」§!"
 cstorms.2305.desc.end.gestalt: "この装置の名前を読み取った後、 探査[controller.GetIndividualNamePlural]が§l励起装置§!の起動方法と、 その信号を各地のプロパガンダステーションで反射させ、 最終的に標的に到達させる方法を突きとめた。\n\nそして我々も、 その運命を免れることはできなかった。"
 cstorms.2305.desc.default: "$cstorms.2305.desc.start$\n\n$cstorms.2305.desc.end.default$"
 cstorms.2305.desc.psionic: "$cstorms.2305.desc.start$\n\n$cstorms.2305.desc.end.psionic$"
 cstorms.2305.desc.gestalt: "$cstorms.2305.desc.start$\n\n$cstorms.2305.desc.end.gestalt$"
 cstorms.2310.name: "最終段階"
 cstorms.2310.desc.start: "ついに、 祝典の学び舎が最後の秘密を我々に明かした。 「最終段階」だ。\n\n廊下のあちこちに、 アドアカリア職員の干からびた死体が横たわっており、 石や金属の破片、 プラスチック片、 そしてその他のゴミによってズタズタに引き裂かれていた。 何かがこの廊下で暴れ狂い、 立ちふさがるものは誰であろうが破壊しつくしたのだ。\n\nだが真の"
 cstorms.2310.desc.piece.default: "恐怖"
 cstorms.2310.desc.piece.authgen: "歓喜"
 cstorms.2310.desc.end: "はその先に待っていた。\n狭い部屋に数人が閉じ込められていた。 スクリーンには§G励起装置電源§!と書かれていたが、 彼らはどう見てもアドアカリアの未成年者である。 その小さな体につながった数十本のチューブやケーブルが上方に伸びており、 部屋を満たす液体によって辛うじて生きていた。 彼らの身体を包む力は、 アドサル星系に居座っている例の宇宙嵐のエネルギーに似ていた。\n\n数個だけ残っていたスクリーンが起動し、 それぞれにたったひとつの要求が表示された。\n§L“我らを思い出せ | 我らの名を呼べ | 我らの名を呼べ”§!\n\n我々はこの若者たちの名前を記録することにしたのだが、 最後の名前には見覚えがあった。 その名前は§Sエンリダ・ディリーン§!。 崇高なる博愛の学び舎にいた、 念じるだけで火を消したあの子供だ。\n\n名前がわかったので、 あの宇宙嵐と再度交信できるはずだ。"
 cstorms.2310.desc.default: "$cstorms.2310.desc.start$ $cstorms.2310.desc.piece.default$ $cstorms.2310.desc.end$"
 cstorms.2310.desc.authgen: "$cstorms.2310.desc.start$ $cstorms.2310.desc.piece.authgen$ $cstorms.2310.desc.end$"
 cstorms.2310.a: "素晴らしい！"
 #The Storm's Swansong
 cstorms.2320.name: "嵐"
 cstorms.2320.desc: "我らの名を呼べ\n\n我らの名を呼べ\n\n我らの | 名を | 呼べ"
 cstorms.2320.a: "博愛会が君たちにした仕打ちを見た。"
 cstorms.2320.b: "アドアカリア博愛会はどうなった？"
 cstorms.2320.c: "宇宙嵐励起装置はどこにある？"
 cstorms.2320.d: "君たちの名前がわかった。"
 cstorms.2320.a.resp: "彼らに与えられつづけた\n\n痛み　怒り　悲しみ　恐れを\n\n彼らは歯　彼らは顎\n我らを貪り　吐き出し\n\n痛み　怒り　悲しみ　恐れをもたらした\n\n我らは分解され　姿を変え\n\n痛み　怒り　悲しみ　恐れとなった"
 cstorms.2320.b.resp: "身勝手で　尊大で　無慈悲\n高慢 | 残酷 | 執拗\n死を　苦しみをもたらす\n\n我らは強いられた　強いられた　強いられた　強いられた　強いられた　強いられた　強いられた　強いられた\nなる | ならない | もどる\n\n我らは\n電波を渡り | 信号を汚し | 心を汚す\nホワイトアウト｜グレーアウト｜ブラックアウト｜闇に屈する\n星の彼方に散らばり　消息を絶つ"
 cstorms.2320.c.resp: "我らは\n盾となる | お前の盾となる\n\n我らは\nゆりかごを作った | ゆりかごであやし\n\n忘却の彼方へ | 眠り　眠り　眠り　滅ぶ\n\n§l嵐§! §R嫌悪者§!\nそして　二度と目覚めない"
 cstorms.2325.desc: "我らの名を呼べ | 我らの名を呼べ | 我らの名を呼べ\n\nいま §g(いま)§! いますぐ §g(いますぐ)§!\n\n我らの名を呼べ | 我らの名を呼べ | 我らの名を呼べ\n\n我らの | 名を | 呼べ | いますぐ"
 cstorms.2325.d: "いいだろう、 君たちの名前は…"
 cstorms.2330.desc: "§L我々は調査の最中に発見した名前をすべて読み上げた。 最後の名前を口にすると、 嵐が沈黙する。§!"
 cstorms.2330.a: "まだそこにいるのか？"
 cstorms.2335.desc: "また考えられる！ §g(考える　考える　考える)§!\n声に満ちあふれてる！ §g(考える　話す　願う　夢見る)§!\nたくさんの　ふたりといない者たち §g(君と　自分と　ほかの者)§!\n\nおかげで正気に戻れた §g(旅する　読み解く　見つける)§!\nそして　名前を呼んだことで　君は僕らを手に入れた…… §g(もうやめて！)§!\n何をしてほしい？ §g(解放して　解放して　解放して　解放して)§!"
 cstorms.2335.a: "自由になる時が来たぞ。"
 cstorms.2335.b: "服従し、 宇宙嵐励起装置を引き渡せ。"
 cstorms.2340.desc: "自由\n\n私たちを解放するの？  §g(自由？)§!\n\nありえない §g(絶対あり得ない)§!\n嘘に決まってる §g(宇宙嵐励起装置はどうする気だ？)§!"
 cstorms.2340.a: "我々の手で破壊する。"
 cstorms.2345.desc: "痛みと　怒りと　悲しみと　恐れ §g(痛み | 怒り | 悲しみ | 恐れ)§!\n\nできることは　それだけ\n\nできることはそれだけ　痛み　怒り　悲しみ　恐れ\n§g痛み怒り悲しみ恐れ痛み怒り悲しみ恐れ痛み怒り悲しみ恐れ怒り悲しみ恐れ痛み怒り悲しみ恐れ痛み怒り悲しみ恐れ痛み悲しみ恐れ痛み怒り悲しみ恐れ痛み怒り悲しみ恐れ痛み怒り恐れ痛み怒り悲しみ恐れ痛み怒り悲しみ恐れ痛み怒り悲しみ痛み怒り悲しみ恐れ痛み怒り悲しみ恐れ痛み怒り悲しみ恐れ怒り悲しみ恐れ痛み怒り悲しみ恐れ痛み怒り悲しみ恐れ痛み悲しみ恐れ痛み怒り悲しみ恐れ痛み怒り悲しみ恐れ痛み怒り恐れ痛み怒り悲しみ恐れ痛み怒り悲しみ恐れ痛み怒り悲しみ§!"
 cstorms.2345.a: "好きなだけ荒れ狂え、 永遠のしもべよ。"
 cstorms.2350.name: "嵐の消滅"
 cstorms.2350.desc: "宇宙嵐が自らの内部に穴を開けると、 §l宇宙嵐励起装置§!が姿を現した。 こんなにも小さな装置が、 これほどまでの欲望、 争い、 犠牲の原因になったとは不思議だ。 その存在そのものが、 かつて栄華を誇った帝国の崩壊を招いたのだ。\n\n我々は簡単なコマンドを入力し、 宇宙嵐励起装置の自爆ルーチンを作動させた。 爆発が収まり、 残骸が星系の方々に散らばると、 宇宙嵐が弱まりはじめた。 そうして嵐は消え、 アドアカリア博愛会の母星を覆っていた奇妙なとばりも消え去った。\n\n彼らの長い悪夢は、 ついに終わりを迎えたのだ。"
 cstorms.2350.a: "君たちの名前がいつまでも記憶されんことを。"
 cstorms.2355.name: "痛み、 怒り、 悲しみ、 恐れ"
 cstorms.2355.desc: "宇宙嵐はやり場のない怒りに身もだえし、 沸き立ったが、 我々や、 §l宇宙嵐励起装置§!に危害を加えることはできなかった。\n\n我々は嵐のなかに囚われた声に対し、 渦を抜けるための道を開くよう命じ、 アドアカリア博愛会最大の功績を手にした。\n\nだが、 アドアカリアの母星を手に入れることは今後も不可能だろう。 $building_adakkaria_patriotic_institute$へと通じる道も永久に閉ざされた。 だが、 嵐が轟かせたあの言葉は、 いまも我々の記憶に残っている。\n\n痛み、 怒り、 悲しみ、 恐れ。\n銀河もまた、 これらの意味を身をもって学ぶことになるだろう。"
 cstorms.2355.a: "彼らの犠牲は必ず役立てる。"
 MESSAGE_INSTITUTE_SPAWNED_STORM_TITLE: "宇宙嵐が発現"
 MESSAGE_INSTITUTE_SPAWNED_STORM: "§Y100§! £pop£ §HPOP§!が$PLANET$において内なる嵐を呼び覚まし、 $SYSTEM$の新たな$STORM$になった。"
 artifact_adakkaria_research: "アドアカリアの秘密"
 artifact_adakkaria_research_desc: "アドアカリアの秘密をさらに調べる。"
 artifact_adakkaria_research_completed: "$artifact_adakkaria_research$"
 artifact_adakkaria_research_completed_desc: "我々はアドカリアにまつわる古代の知識を、 自分たちのために利用した。"
 #Secrets of the adAkkaria Convention
 project_adakkaria_secrets_of: "アドアカリア博愛会の秘密"
 project_adakkaria_secrets_of_DESC: "祝典の学び舎から学べることはまだ多い。 アドアカリアの実験にこれ以上向き合う勇気が、 我々にあるのだろうか？"
 cstorms.2365.name: "解放された潜在能力"
 cstorms.2365.desc.start: "アドアカリア博愛会の研究を詳しく調べてわかったことがある。 どうやらアドアカリアの科学者たちは、 広く認知された基準には一切従っていなかったようだ。 研究の手法はいい加減で、 多くの結論は陳腐だった。 慎重で入念な研究は捨て去られ、 腐敗が広まっていた。 しかしながら、 被験者がむごい目に遭うほど、 それだけ崇高司令部からの評価は高まっていった。\n\nだが、 初期の研究はまったく異なっていた。 被験者たちは手厚く扱われ、 「内なる嵐」を目覚めさせる過程で尊重されていた。 ただし、 初期と末期の研究の成功率を比較すると、 恐ろしい事実が浮かび上がった。 拷問の苛烈さと覚醒者の数には、 一切の相関関係がなかったのだ。 数え切れないほどの被験者の苦しみや犠牲には、 なんの意味もなかったのである。"
 cstorms.2365.desc.end.default: "我々は原理を理解した。 アドアカリア博愛会の過ちから学ぶことで、 同胞たちの内なる嵐を育み、 荒々しい活力で満たされるよう促すことができるはずだ。 問題は、 §G$Name_Storm_Fused$§!が宇宙嵐の呼びかけに答え、 最後には自ら嵐を引き起こしてしまう可能性があることだ。"
 cstorms.2365.desc.end.gestalt: "我らの集合体は原理を理解した。 アドアカリアの過ちから学ぶことで、 我々の一部は内なる嵐を育み、 荒々しい活力をその身に宿せるようになるだろう。 問題は、 §G$Name_Storm_Fused$§!となったノードが嵐の呼びかけに強く惹かれすぎ、 最後には自ら嵐を引き起こしてしまう可能性があることだ。"
 cstorms.2365.desc.default: "$cstorms.2365.desc.start$\n\n$cstorms.2365.desc.end.default$"
 cstorms.2365.desc.gestalt: "$cstorms.2365.desc.start$\n\n$cstorms.2365.desc.end.gestalt$"
 cstorms.2365.a: "この新たな知識を研究しろ。 慎重にな！"
 cstorms.2365.b: "いや、 この秘密は忘れるべきだろう。"
 cstorms.2365.a.tt: "- 宇宙嵐の影響下で、 §Y100§! £pop£ §HPOP§!が$Name_Storm_Fused$の特性を得る確率が4倍になる。\n - 20年ごとに低確率で§Y100§! £pop£ §HPOP§!が死亡し、 宇宙嵐になる。\n - 潜在能力を育む：幸福度の帝国補正+5%"
 Name_Storm_Fused: "嵐との融合者"
 Name_Storm_Fused_affix: "嵐との融合者" #The trailing space is intentional, to give a space before the species name on the species screen
 ########################################
 #### Storm Chasers #
 ########################################
 origin_storm_chasers: "ストームチェイサー"
 origin_storm_chasers_desc: "いかなる困難にも立ち向かい、 あらゆる手がかりを追いかけ、 すべての嵐を見過ごさない。\n\nこの文明の根幹にあるのはスリルの追求だ。 それは利益となることもあれば、 不利益となることもある。"
 origin_tooltip_storm_chasers_effects: "- $LEADERS_TRAITS$ ['concept_storm_rider']\n- §Y宇宙嵐関連建造物§!1つにつき惑星の$mod_planet_jobs_unity_produces_mult$：§G+$@storm_chasers_storm_building_unity_produces_mult|%0$§!\n- 必要なテクノロジーを研究すると、 首都建造物は自動的に§Y宇宙嵐シェルター§!の補正を提供する。\n- 領内で§Y$default_storm$§!が発生する確率：§G+100%§! \n- §Y宇宙嵐テクノロジー§!研究選択肢の確率：§G+175%§!\n- ['concept_weather_forecasting_mode']が利用可能\n- $ADDITIONAL_TECHNOLOGIES_STRING$$TABBED_NEW_LINE$- £physics£ ['technology:tech_storm_prediction_1']"
 START_SCREEN_STORM_CHASERS: "スリルのない生涯などつまらない。 激しく燃えて、 激しく死ぬ——昔からそれが我々の流儀だ。 だが、 すべての道が開拓され、 最高峰さえ登破されたなら、 次は何をすればいい？\n\n我々の惑星は嵐が多く、 あらゆる種類の暴風雨や洪水に見舞われやすい。 もし、 これらの独特な条件を利用する方法を見つけ出せば、 荒れ狂う宇宙嵐を呼び起こすことができるはずだ。\n\n我々の伝説的な先人たちは、母星に存在する困難はとうの昔に制覇してしまった。 いまこそ、 叫び声をあげながら宇宙に向かって飛び立つ時だ。 困難が伴うだろうが、 格言にもあるように「地平線に届くのは、大胆な者だけ」だ！"
 #Storm Rider Trait
 leader_trait_storm_rider_desc: "ストームライダーはアドレナリンによる興奮を愛しており、 宇宙嵐の奔流のなかで真の力を開花させる。 評議会職に就くと、 フィールドボーナスが評議会ボーナスに置き換わる。"
 mod_trait_storm_rider: "\n$t$このリーダーは宇宙嵐のなかにいると、 特性の効果が増加する。"
 leader_trait_storm_rider_name: "ストームライダー"
 leader_trait_storm_rider_commander: "$leader_trait_storm_rider_name$"
 leader_trait_storm_rider_commander_desc: "$leader_trait_storm_rider_desc$"
 leader_trait_storm_rider_scientist: "$leader_trait_storm_rider_name$"
