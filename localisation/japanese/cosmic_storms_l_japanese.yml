 #Storm Chasers specific Progress Events
 progress.2.desc.storm.normal: "ひとりの[Root.Owner.GetScientist]が言った。 「あの小さい奴はなんだ！？」\n\n$progress.2.desc.storm.outro$"
 progress.2.desc.storm.gestalt: "我らは興奮でうち震えている。\n\n$progress.2.desc.storm.outro$"
 progress.2.desc.storm.outro: "異星生命体がこの[From.GetName]に！  あの妙な生物はすぐに話しかけてはこないだろうが、 少なくとも、 この宇宙の旅が孤独なものではないとわかった。\n\n結局のところ、 銀河は生命体にあふれた場所なのかもしれない。"
 progress.3.desc.storm.normal: "「すごい！」[ruler.GetRegnalName]は叫んだ。 「この新世界はチャンスに満ちてる！」\n\nコロニー船をベースキャンプに造り変えようとしている我々の傍らで、 第一波探検隊はこの惑星に秘められたものを体験できるよう、 すでに準備を整えはじめている。"
 progress.3.desc.storm.gestalt: "「すごい発見だ！  この新世界はチャンスに満ちてる！」\n\nコロニー船をベースキャンプに造り変えようとしている我々の傍らで、 探検ノードはこの惑星に秘められたものを体験できるよう、 すでに準備を整えはじめている。"
 progress.3.a.storm: "前進しろ。"
 progress.4.desc.storm: "静寂に包まれた宇宙から、 我々の呼びかけに対する反応があった！  それは同等の技術を有する異星人の文明だ。 彼らが銀河系に進出したのは、 きっと我々と同時期に違いない。\n\n彼らの登場は、 経験の新たな境界線の到来を告げるものだ。だが彼らは味方なのか、それともライバルとなる存在なのか。 いずれにせよ、 未知のスリルが我々を前へ進めと手招きする。"
 progress.4.h.storm: "とても興味深い。"
 progress.5.desc.storm.normal: "我々は[From.Planet.GetName]で準知的生命体を発見した。 [Root.Owner.GetScientistPlural]の1人が言うには、 「こいつらはまだ発展途上だが、 その可能性はすさまじい！」そうだ。\n\nしかし、 いまのところ彼らは知性を持つ前の段階だ。 この生物が繁栄していくのを観察するのは、 さぞかし興味深いだろう。"
 progress.5.desc.storm.gestalt: "我々は[From.Planet.GetName]で準知的生命体を発見した。\n\n彼らがこれからどうなるのかは楽しみだが、 いまのところ彼らは知性を持つ前の段階だ。 この生物が繁栄していくのを観察するのは、 さぞかし興味深いだろう。"
 progress.5.h.storm: "実に面白い。"
 progress.6.desc.storm: "静寂に包まれた宇宙から、 我々の呼びかけに対する反応があった！ だが、 最初の印象はまるでよくない。 我々のやり方は通じず、 関与されることを好まないようだ。 いまは様子を見るべきだろう。"
 progress.6.h.storm: "彼らは時代の流れに乗るべきだ。"
 pirate.1.desc.storm: "宇宙海賊だ！  考えるだけでもスリルを感じるが、 なんと§S[pirate_band.GetName]§!と名乗るグループが我々に狙いを定めている。\n\nああいう生き方を否定するつもりはないが、 我々の交易ネットワークに与える影響は理想的とは言えない。"
 pirate.2.j.storm: "残念なことだ。"
