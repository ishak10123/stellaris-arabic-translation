 civic_environmental_architects_megacorp: "ジオエンジニアリング社"
 civic_environmental_architects_megacorp_desc: "この巨大企業の従業員は、 豪奢な鳥籠のなかで飼われることに慣れ切っている。 そのため、 この企業は行く先々に鳥籠を造るのだ。"
