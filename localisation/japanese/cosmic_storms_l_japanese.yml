 #Civics
 civic_astrometeorology: "天体気象学"
 civic_astrometeorology_desc: "自然界の力に尊敬の念を抱くこの種族は、 自然現象を解明するために多大なる労力を費やす。 星々を旅する彼らが特に惹かれるのは、 天体気象学だ。 そして彼らの究極の目的は、 あらゆる天文現象のなかで最も幻想的、 かつ破壊を孕んだ現象——宇宙嵐そのものである。\n"
 civic_astrometeorology_effect_tooltip: "$t$- $AVAILABLE_BUILDINGS$£building£ ['building:building_astrometeorology_observation_center']$TABBED_NEW_LINE$- $ADDITIONAL_BUILDINGS_STRING$£building£ §Y$building_astrometeorology_observation_center$§!"
 civic_astrometeorology_hive: "環境モデリング"
 civic_astrometeorology_hive_desc: "この集合体が星々を目指すとき、 その意識は宇宙の気象が作り出す光景に魅了される。 ドローンたちは気象効果を研究し、 宇宙嵐そのものにさえ感動を見出すという崇高な目的のため、 その住処を広げているのだ。"
 civic_astrometeorology_hive_effect_tooltip: "$civic_astrometeorology_effect_tooltip$"
 civic_astrometeorology_machine: "環境モデリング"
 civic_astrometeorology_machine_desc: "機械帝国が自然界から重大な影響を受けることを理解するこの共同体は、 その研究のためにはどんな苦労もいとわない。 彼らのモデルは、 それが興味を引かれる宇宙気象であれば、 「神聖さ」すら感じるレベルまで事細かに記録している。 その関心の対象となっているのが、 あらゆる天文現象のなかで最も幻想的、 かつ破壊を孕んだ現象——宇宙嵐そのものである。"
 civic_astrometeorology_machine_effect_tooltip: "$civic_astrometeorology_effect_tooltip$"
 civic_astrometeorology_megacorp: "気象の有効活用"
 civic_astrometeorology_megacorp_desc: "「気象効果」といえど、 それは無償で活用できる資源の一種にすぎない。 この巨大企業は天体気象に関する知識を可能なかぎり収集し、 最高値をつけた者に売ることを専門としている。"
 civic_astrometeorology_megacorp_effect_tooltip: "$civic_astrometeorology_effect_tooltip$$TABBED_NEW_LINE$- £building£ §Y$building_private_research_initiative$§!$megacorp_civic_branch_office_building_effect$"
 civic_storm_callers: "嵐への献身"
 civic_storm_callers_desc: "太古の昔より、 この社会は儀式を通じて嵐を引き寄せる術を知っていた。 彼らは、 時代とともに技術革新と儀式とを組み合わせ、 その実効性を高めてきた。 そして宇宙時代が到来し、 彼らはこの知識を星々の世界に届けようとしている。"
 civic_storm_callers_effect_tooltip: "- $AVAILABLE_BUILDINGS$£building£ ['building:building_storm_summoning_theater']\n- [entertainer.GetIcon]§H[entertainer.GetName]の職が§!£job_storm_dancer£ §H$job_storm_dancer$§!の職に置き換わる\n- $SPECIES_TRAITS$['trait:trait_storm_touched']"
 civic_storm_callers_megacorp: "ストーム・インフルエンサー"
 civic_storm_callers_megacorp_desc: "最初はただの神聖な儀式の配信だったが、 いまでは各種メディアの巨大な集合体にまで発展した。 予言者と司祭の代わりにカリスマ的エンターテイナーたちが台頭し、 こぞって宇宙嵐に呼び掛けては、 注目度争いに明け暮れている。"
 civic_storm_callers_megacorp_effect_tooltip: "$civic_storm_callers_effect_tooltip$\n- £building£ §Y$building_amusement_megaplex$§!企業建造物は追加の§Y支社価値§!を生み出し、 §G+50§!の£job_merchant£ §Y商業§!雇用を首都に創出する。"
