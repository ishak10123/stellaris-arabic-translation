 #Storm Technology
 tech_storm_manipulation: "宇宙嵐の操作"
 tech_storm_manipulation_desc: "嵐対策技術の原理を活用すると、 銀河の天体気象学的性質を目的に合わせて操作できる。"
 tech_advanced_storm_manipulation: "高度な宇宙嵐の操作"
 tech_advanced_storm_manipulation_desc: "天体気象学の研究を継続すると、 §Y宇宙嵐§!をより正確に目的に合わせて変貌させたり操作したりできるようになる。"
 tech_industrial_storm_protection: "惑星規模の嵐対策"
 tech_industrial_storm_protection_desc: "この気象の伝達網により、 宇宙気象災害による被害が軽減される。 宇宙嵐の通過による生産への被害が減少する。"
 tech_advanced_industrial_storm_protection: "惑星規模の嵐無力化"
 tech_advanced_industrial_storm_protection_desc: "現地の気象制御システムを集約させることで、 惑星の気象パターンを操作し、 宇宙嵐が生産に及ぼす有害な影響を大幅に軽減できるようになる。"
 tech_storm_prediction_1: "宇宙気象モデル"
 tech_storm_prediction_1_desc: "科学的な気象モデルを使用することで、 迫り来る§Y宇宙嵐§!の動きと形成を追跡することができる。"
 tech_storm_prediction_1_title: "§H機能をアンロック§!：宇宙の気象予測"
 tech_storm_prediction_1_tooltip: "§Y気象予測マップモード§!で§Y宇宙嵐の発生予測§!と§Y宇宙嵐の進路予測§!を見られるようになる"
 tech_storm_prediction_2: "確率流密度"
 tech_storm_prediction_2_desc: "科学的な気象モデルに確率流密度を適用することで、 差し迫った§Y宇宙嵐§!の動きと形成を追跡する能力が大幅に向上する。"
 tech_storm_prediction_2_title: "§H機能のアップグレード§!：宇宙の気象予測"
 tech_storm_prediction_2_tooltip: "§Y気象予測マップモード§!の§Y宇宙嵐の発生予測§!と§Y宇宙嵐の進路予測§!範囲が最大になる"
 tech_ship_hull_storm_breaker_1: "宇宙嵐減衰機"
 tech_ship_hull_storm_breaker_1_desc: "この減衰フィールド発生機は、 艦船が宇宙嵐を通過する際に船体を保護してくれる。"
 tech_ship_hull_storm_breaker_2: "ストームブレイカーコート"
 tech_ship_hull_storm_breaker_2_desc: "この特別なコーティングにより、 艦船の外壁が嵐減衰フィールドをまとい、 嵐に対する保護効果がさらに強化される。"
 tech_ship_storm_weapons_1: "ペイロード防護壁"
 tech_ship_storm_weapons_1_desc: "軍事用途における合金使用の新たなアプローチにより、 エネルギー兵器や爆発性のペイロードに対する宇宙嵐の悪影響が大幅に低減される。"
 tech_ship_storm_weapons_2: "対宇宙嵐ケージ構造"
 tech_ship_storm_weapons_2_desc: "艦船の構造へのこの斬新なアプローチは、 兵器システムに対する宇宙嵐の悪影響を大幅に低減する。"
 feature_sustain_cosmic_storm_unlocked: "宇宙嵐の維持"
 feature_sustain_cosmic_storm_unlocked_desc: "調査船が§Y$default_storm$§!を無期限に停止し、 維持することが可能になる。"
 FLEETORDER_SUSTAIN_COSMIC_STORM: "$SYSTEM|Y$に$STORM|Y$宇宙嵐を維持する"
 FLEETORDER_SUSTAIN_COSMIC_STORM_BUTTON: "§Y宇宙嵐§!を維持"
 FLEETORDER_SUSTAIN_COSMIC_STORM_CANCELLED: "§R追及していた宇宙嵐が消滅した。§!"
 #Map Mode
 storm_map_mode: "気象予測マップモード"
 storm_map_mode_desc: "気象予測マップモードを起動すると、 宇宙嵐、 予測情報、 そして影響領域がすべて銀河地図に表示される。"
 #Cosmic Storm Gateway Tech
 gateway_tech_advanced_storm_manipulation: "§H宇宙嵐の操作の道筋§!\n§Eこの技術は、 宇宙嵐の操作の分野をさらに発達させる。§!"
 gateway_tech_advanced_industrial_storm_protection: "§H宇宙嵐対策の道筋§!\n§Eこの技術は、 宇宙嵐対策の分野をさらに発達させる。§!"
 gateway_tech_storm_location_prediction: "§H宇宙嵐の予測の道筋§!\n§Eこの技術は、 宇宙嵐の予測の分野をさらに発達させる。§!"
 gateway_tech_ship_hull_storm_breaker: "§H宇宙嵐からの艦船保護の道筋§!\n§Eこの技術は、 宇宙嵐からの船体保護の分野をさらに発達させる。§!"
 gateway_tech_ship_hull_storm_weapons: "§H宇宙嵐からの兵器保護の道筋§!\n§Eこの技術は、 宇宙嵐からの兵器保護の分野をさらに発達させる。§!"
