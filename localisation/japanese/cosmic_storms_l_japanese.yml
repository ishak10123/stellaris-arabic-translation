 civic_environmental_architects: "惑星スケーパー"
 civic_environmental_architects_desc: "悠久の年月をかけ、 母星で完璧なバランスを育んできたこの社会は、 銀河屈指の過酷な環境でも対応できる備えがある。 彼らの根底にあるのは、 自然を自由に形作り、 制御し、 完璧な形にすることは可能であるという考えだ。 そしてその目的は、 自然を手なずけることではなく、 完全な美を実現することである。"
 civic_environmental_architects_negative_effect_tooltip: "- $HOMEWORLD$は£blocker£ §H自然障害物§!2つで始まる。"
 civic_environmental_architects_effect_start: "- $ADDITIONAL_TECHNOLOGIES_STRING$§H母星§!上の£blocker£ ['concept_natural_blockers']を除去する£society£ §H技術§!\n- 入植時に、 £blocker£ §H天然の障害物§!を除去するための£society£ §H技術§!が、 §H恒久的な研究選択肢§!として付与される\n- §H自然への精通§!['concept_ascension_perk']が§H$decision_cultivated_worldscaping$§!惑星['concept_decision']に置き換わる\n- 入植£planet£ ['concept_planets']における£blocker£ §H自然障害物§!1つにつき："
 civic_environmental_architects_effect_tooltip: "$civic_environmental_architects_effect_start$\n$t$- 職業からの資源：§R-10%§!\n$t$- POPの成長速度：§R-10%§!\n$t$- POP維持費：§R-15%§!"
 civic_environmental_architects_hive: "造成ドローン"
 civic_environmental_architects_hive_desc: "このドローンたちは巨大な有機体の一部であるため、 自然界という最大の有機体が持つ恩恵を見分けることができる。 彼らは自然体系を制御し、 集合体の意のままに形成する術を模索している。"
 civic_environmental_architects_hive_effect_tooltip: "$civic_environmental_architects_effect_start$\n$t$- 職業からの資源：§R-10%§!\n$t$- POP製造：§R-10%§!\n$t$- POP維持費：§R+15%§!"
 civic_environmental_architects_machine: "園芸プロトコル"
 civic_environmental_architects_machine_desc: "有機生命体の創造主たちが滅んでも、 彼らが作り出した機械たちは未だに古めかしい美的感覚を好みつづけている。 完璧主義のプログラムにとっても、 自然界は肥沃な大地である。"
