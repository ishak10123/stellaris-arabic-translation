 #Modifiers for Stormfall event chain
 cs_storm_chasers_storm_fruition: "嵐の結実"
 cs_storm_chasers_storm_fruition_desc: "我々だけが享受できる宇宙嵐の目覚めは、 今後何年にもわたって同胞たちを活気づける。"
 cs_storm_chasers_storm_fruition_gestalt: "$cs_storm_chasers_storm_fruition$"
 cs_storm_chasers_storm_fruition_gestalt_desc: "我らだけが享受できる宇宙嵐の目覚めは、 今後何年にもわたって我らの意識を活気づける。"
 cs_storm_chasers_homeworld_storm_attraction: "強烈な気候"
 cs_storm_chasers_homeworld_storm_attraction_desc: "この惑星の容赦ない嵐は、生命体を2つの異なる道へと追いやってしまった。混沌から逃れようとする者と、嵐のスリルを味わう者の二手だ。"
 cs_storm_chasers_homeworld_storm_attraction_tt: "§Y$default_storm$§!の誘引強度：§P低§!"
 #Special project
 PROJECT_TEMPEST_BREWING: "迫る嵐"
 PROJECT_TEMPEST_BREWING_DESC: "[Owner.Capital.GetName]の一生に一度の宇宙嵐は、 調整に適した特別な性質を持っている。 まずは、 その根本的な構成を深く理解しなければならない。 我々は一体、 どんな素晴らしい奇跡を起こせるのだろうか？"
 #Events
 cstorms.3100.name: "ストームフォール"
 cstorms.3100.desc: "§Y[owner.capital_scope.GetName]§!で自然発生した嵐は、自然の驚異的な力を我々に示した。嵐の激しさと、後に行われる再生の両方である。\n\n最近、惑星上の気象観測所が異常な現象を検知した。それは、惑星を席巻する勢いの複数のスーパーストームである。\n\n我々の[Root.Owner.GetScientistPlural]はこれを、 幸運な偶然と呼んでいる。 この独特の嵐は、 この上なく過激なものを作り出すのに最適な状況を用意してくれるからだ。"
 cstorms.3100.a: "野戦装備を身につけろ！"
 cstorms.3105.name: "迫る嵐"
 cstorms.3105.desc: "我々の[Root.Owner.GetScientistPlural]は嵐の操作方法を発見した。 嵐のパワー予測は図抜けている上、我 々は皆それを見るために集まった。 我々は試され、誰が最も価値があるか証明されるだろう。\n\n特別な建造物は嵐を発生させる調整センターとしても使用できる。§Y[owner.capital_scope.GetName]§!にある建造物で、 嵐を引き寄せる力を高めるものがある。 究極の嵐への道が大きく進歩したのだ。"
 cstorms.3105.a: "グルービー。"
 cstorms.3105.a.tt: "首都惑星の§Y宇宙嵐誘引建造物§!：\n$situation_speed_tt$：§G+10%§!\n\n首都星系ステーションの§Y$sm_storm_attraction_computer$§!：\n$situation_speed_tt$：§G+10%§!\n\n"
 cstorms.3110.name: "到来"
 cstorms.3110.desc.outro: "自然の嵐にエネルギーを注入することで、 電磁嵐の条件を作り出すことができる。\n\n惑星の核を操作することで、 [owner.capital_scope.GetName]の磁場の向きを変え、 磁気嵐を引き起こすことができる。\n\n最後に、 特定の惑星の地点でタキオンの極性を反転させることで、 場の変化が重力嵐を引き起こす。"
 cstorms.3110.desc.regular: "我々は、 [owner.capital_scope.GetName]の激しい振動を起動し、 究極の体験へと形作る方法を発見した。 しかし、 どのタイプの嵐が最適かを決定しなければならない。\n\n$cstorms.3110.desc.outro$"
 cstorms.3110.desc.hive: "我々は、 [owner.capital_scope.GetName]の荒々しい振動を起動し、 究極の体験へと形作る方法を発見した。 しかし、 どの嵐のタイプが最適かについては、まだ決定していない。\n\n$cstorms.3110.desc.outro$"
 cstorms.3110.desc.machine: "我々は、 [owner.capital_scope.GetName]の激しい振動を起動し、 究極の体験へと形作る方法を発見した。 しかし我々の価値評価プロセスは、 最適な嵐のタイプを決定できずループに陥っている。\n\n$cstorms.3110.desc.outro$"
 cstorms.3110.a: "雲をチャージする。"
 cstorms.3110.a.tt: "惑星§Y$electric_storm$§!を生成する。"
 cstorms.3110.b: "核を磁化しろ。"
 cstorms.3110.b.tt: "惑星§Y$magnetic_storm$§!を生成する。"
 cstorms.3110.c: "重力波を発生させる。"
 cstorms.3110.c.tt: "惑星§Y$gravity_storm$§!を生成する。"
 cstorms.3130.name: "そこから離れろ"
 cstorms.3130.desc.electric: "空が鳴り響き、 稲妻が光り輝く！\n\nこの強力な放電は惑星の表面を帯電させただけでなく、 我々に興奮を与えた。 雷雨は農業に打撃を与えるが、 エネルギーを生成できる可能性は否定できない。"
 cstorms.3130.desc.magnetic: "[owner.capital_scope.GetName]の磁場が歪むにつれ、コンパスの針が激しく回転する。\n\n我々の故郷の地殻を貫くことで、磁化された物質を中心核に直接注入することができた。それによって、自然の嵐が磁場の変動を増幅した。これでエネルギー生成は妨げられるが、新しい鉱物の鉱床の検出は改善されるだろう。"
 cstorms.3130.desc.gravity: "これまで、ただ歩き回るだけでこれほど爽快な気分になったことはなかった！ 重力は、 何の前触れもなく増減する。 \n\n[owner.capital_scope.GetName]に散在する粒子操作サイトがタキオンの極性を反転させ、 タキオンをパチパチとはじけるエネルギーの玉に集中させた。 球体が急速に消滅していくのを見て、 [Root.Owner.GetScientistPlural]は、 それらが過去に送られたと断言した。 重力波はあらゆる方向に波打った。\n\n その結果で生じた変動により、 惑星の表面での作業は困難になるが、 軌道上のステーションでの作業は改善されることがある。"
 cstorms.3130.a: "なんてことだ。"
 cstorms.3130.a.tt.regular: "惑星嵐中：\n$MOD_POP_HAPPINESS$：§G+20%§!"
 cstorms.3130.a.tt.gestalt: "惑星嵐中：\n$mod_country_unity_produces_mult$：§G+5%§!"
 cstorms.3140.name: "良い予感"
 cstorms.3140.desc.intro: "我々の[Root.Owner.GetScientistPlural]は、惑星嵐を刺激するシステムを、より大規模な環境に適用できると確信している。根拠は、現在システム全体が荒々しいエネルギーで渦巻いていることだ。"
 cstorms.3140.desc.electric: "$cstorms.3140.desc.intro$\n\n既存の知識とインフラを活用して$electric_storm$に変えることもできる。あるいは、何か新しいものを作り出すこともできるかもしれない。\n\n特定の鉱物を導入すれば嵐の磁場共鳴を増幅することができるが、合金を利用すれば、代わりに嵐を重力井戸に変えることができる。"
 cstorms.3140.desc.magnetic: "$cstorms.3140.desc.intro$\n\n既存の知識とインフラを活用して$magnetic_storm$に変えることもできる。あるいは、何か新しいものを作り出すこともできるかもしれない。\n\n太陽をチャージすれば、嵐の電位を増幅させることができるが、合金を利用すれば、代わりに嵐を重力井戸に変えることができる。"
 cstorms.3140.desc.gravity: "$cstorms.3140.desc.intro$\n\n既存の知識とインフラを活用して$gravity_storm$に変えることもできる。あるいは、何か新しいものを作り出すこともできるかもしれない。\n\n特定の鉱物を導入すれば嵐の磁場共鳴を増幅できるが、太陽をチャージすれば嵐の電位を増幅できる。"
 cstorms.3140.a: "太陽をチャージしろ。"
 cstorms.3140.a.tt: "宇宙§Y$electric_storm$§!を植え付ける。\n§Y2§!年間：$TABBED_NEW_LINE$$mod_country_energy_produces_mult$：§R-50%§!$TABBED_NEW_LINE$$mod_country_unity_produces_mult$：§G+20%§!"
 cstorms.3140.a.infra: "残ったインフラを使え。"
 cstorms.3140.a.tt.electric: "宇宙§Y$electric_storm$§!を植え付ける。\n§Y2§!年間：$TABBED_NEW_LINE$$mod_country_unity_produces_mult$：§G+5%§!"
 cstorms.3140.b: "磁化された鉱物を配置する。"
 cstorms.3140.b.tt: "宇宙§Y$magnetic_storm$§!を植え付ける。\n§Y2§!年間：$TABBED_NEW_LINE$$mod_country_minerals_produces_mult$：§R-50%§!$TABBED_NEW_LINE$$mod_country_unity_produces_mult$：§G+20%§!"
 cstorms.3140.b.tt.magnetic: "宇宙§Y$magnetic_storm$§!を植え付ける。\n§Y2§!年間：$TABBED_NEW_LINE$$mod_country_unity_produces_mult$：§G+5%§!"
 cstorms.3140.c: "特殊合金を利用する。"
 cstorms.3140.c.tt: "宇宙§Y$gravity_storm$§!を植え付ける。\n§Y2§!年間：$TABBED_NEW_LINE$$mod_country_alloys_produces_mult$：§R-25%§!$TABBED_NEW_LINE$$mod_country_unity_produces_mult$：§G+20%§!"
 cstorms.3140.c.tt.gravity: "宇宙§Y$gravity_storm$§!を植え付ける。\n§Y2§!年間：$TABBED_NEW_LINE$$mod_country_unity_produces_mult$：§G+5%§!"
 cstorms.3160.name: "嵐のあと"
 cstorms.3160.desc: "惑星嵐が去った後、 [owner.capital_scope.GetName]に新たな特徴が現れた。嵐が再び変化と再生をもたらしたのだ。\n\nこの嵐がどれほど爽快だったとしても、 真の宇宙嵐の可能性については想像するしかない。 なぜこれほど時間がかかるのか？"
 cstorms.3160.a: "なんて思い出だ！"
 cstorms.3160.a.tt.electric: "嵐が去った後、 §Y$d_buzzing_plains$§!には電化された[owner.capital_scope.GetName]が残された！"
 cstorms.3160.a.tt.magnetic: "嵐が去った後、 §Y$d_geothermal_vent$§!には新しい[owner.capital_scope.GetName]が残された！"
 cstorms.3160.a.tt.gravity: "嵐によって、[owner.capital_scope.GetName]に§Y$d_rich_mountain$§!があることが明らかになった。"
 cstorms.3170.name: "宇宙の形状"
 cstorms.3170.desc.intro: "我々は[owner.capital_scope.GetStarName]の周辺で巨大な宇宙嵐が出現するのを促進できるが、 まずは準備ができているか確認しないといけない。\n\n"
 cstorms.3170.desc.scientist.snippet: "§Y[event_target:storm_scientist.GetName]§!が率いる[Root.Owner.GetScientistPlural]のチームは、 これらの宇宙嵐の初期のパターンを研究し、その形成を操作する最適な方法を見つけることができる。\n\n"
 cstorms.3170.desc.commander.snippet: "§Y[event_target:storm_commander.GetName]§!が率いる軍を送れば、 彼らは増大する嵐を吹き飛ばし、 エネルギーを流すことができる。\n\n"
 cstorms.3170.desc.outro: "このリーダー率いるチームは、 帰還できないおそれがある。 しかし、 彼らは素晴らしいことを成し遂げるかもしれない！"
 cstorms.3170.desc.both: "$cstorms.3170.desc.intro$$cstorms.3170.desc.scientist.snippet$$cstorms.3170.desc.commander.snippet$$cstorms.3170.desc.outro$"
 cstorms.3170.desc.scientist: "$cstorms.3170.desc.intro$$cstorms.3170.desc.scientist.snippet$$cstorms.3170.desc.outro$"
 cstorms.3170.desc.commander: "$cstorms.3170.desc.intro$$cstorms.3170.desc.commander.snippet$$cstorms.3170.desc.outro$"
 cstorms.3170.desc.none: "今我々にできることは、 宇宙嵐が形成されるのを待つことだけだ。\n\n期待に胸が張り裂けそうだが、 その見返りはさらに大きなものになるだろう。"
 cstorms.3170.a: "[Root.Owner.GetScientistPlural]を送り込め。"
 cstorms.3170.a.tt: "科学者§Y[event_target:storm_scientist.GetName]§!は一時的に行方不明となり、 死亡の危険にさらされている。"
 cstorms.3170.b: "軍に前進命令を出せ。"
 cstorms.3170.b.tt: "司令官§Y[event_target:storm_commander.GetName]§!は一時的に行方不明となり、 死亡の危険にさらされている。"
 cstorms.3170.c: "安全を確保して待とう。"
 cstorms.3190.name: "最初の一歩"
 cstorms.3190.desc.intro: "初めは、 宇宙空間に生じた小さな「しわ」だった。 エネルギーが舞い踊り、 融合し、 衝突。 ほんの少しのエキゾチック粒子、 質量、 そして我々の星を巡る嵐の兆しが、目の前の怪物を沈殿させた。\n\n我々が望んだ通りに形作られた、 この自然と創意工夫が生み出した奇跡は虚空を支配した。"
 cstorms.3190.desc.success: "$cstorms.3190.desc.intro$嵐の中を突き進む我らがリーダーは、 興奮の熱狂を巻き起こした。\n\n我々はやったのだ。 自分たちだけでやったのだ。 この嵐を乗り越え、 一生に一度のスリルを味わおうではないか！"
 cstorms.3190.desc.failure: "$cstorms.3190.desc.intro$リーダーは嵐の中で消えてしまったが、 なんと素晴らしい亡くなりかただろう！\n\n我々はやったのだ。 自分たちだけでやったのだ。 この嵐を乗り越え、 一生に一度のスリルを味わおうではないか！"
 cstorms.3190.desc.wait: "$cstorms.3190.desc.intro$長い間待ち続けたが、 ついにその日がやってきた。\n\n我々はやったのだ。 自分たちだけでやったのだ。 この嵐を乗り越え、 一生に一度のスリルを味わおうではないか！"
 cstorms.3190.a.success: "いいぞ！"
 cstorms.3190.a.failure: "見よ！"
 cstorms.3190.a.failure.tt: "\n我々のリーダーは、 栄光の最期を迎えた。"
 cstorms.3190.a.wait: "完璧だ！"
 ### Storm Fever ###
 #Modifiers for Storm Fever event chain
 cs_storm_chasers_bad_vibes: "バッド・バイブス"
 cs_storm_chasers_bad_vibes_desc: "倦怠感が突如として襲ってくる。"
 cstorms.3205.name: "突然の凪"
 cstorms.3205.normal: "宇宙の様子が普段と異なり、 いつもの偉業もかつてのような興奮を呼び起こさない。 確かに我々は素晴らしいことを成し遂げたが、何かが欠けているという感覚が残っている。 伝説的な規模と野望を誇る我々の先祖の功績は、大きな影を落としている。 \n\n「これらの闘争は最も実存的なものだ！」と、最近、我々のトップの頭脳の持ち主の一人が書いた。「空虚を横断することで、自分自身の中に空虚を生み出してしまったのではないか？」\n\n不安は現実であり、今すぐ行動を起こすべきだ。新たなスタートを切るために、我々は原点に戻る。すなわち、最大限のアドレナリンを引き出すようにカスタムデザインされた一連のチャレンジだ！"
 cstorms.3205.gestalt: "宇宙の様子が普段と異なり、 いつもの離れ技からは以前のような興奮が感じられない。確かに我々は素晴らしいことを成し遂げたが、何かが欠けているという感覚が残っている。\n\n我らは自分たちが何者かを真に理解しているのだろうか？ 全盛期はもう過ぎ去ったのか？ 共同体として、 我らには過去の自分たちを超えていく責任がある——こうした思考がつねにつきまとっている。\n\n不安は現実であり、今すぐ行動を起こすべきだ。新たなスタートを切るために、我々は原点に立ち返る。アドレナリンを最大限に引き出すようにカスタムデザインされた一連のチャレンジだ！"
 cstorms.3205.a: "スリルは始まったばかりだ。"
 cstorms.3205.tooltip: "状況レポートで過去のチャレンジを確認できる。"
 cstorms.3215.name: "終息"
 cstorms.3215.intro: "やり遂げた！\n\n純粋なスリルの追求を目標に、 我々はすべての試練を乗り越えた。 この数年間で成し遂げたことといったら！"
 cstorms.3215.desc: "$cstorms.3215.intro$\n\n我らが母星屈指の開拓者たちのように、 我々は自らの限界を超えた。\n\nさらには、 自然の猛威に触れたことで、 我々は自らの存在に関しても驚くべき知見を得ることができたのだ。"
 cstorms.3215.a: "調子が戻ってきた！"
 ### Storm Frenzy ###
 cs_storm_chasers_storm_frenzy_1: "嵐の狂乱"
 cs_storm_chasers_storm_frenzy_1_desc: "ビッグ・ワンの出現により、 我々は熱狂の渦に巻き込まれる。"
 cs_storm_chasers_storm_frenzy_2: "$cs_storm_chasers_storm_frenzy_1$"
 cs_storm_chasers_storm_frenzy_2_desc: "$cs_storm_chasers_storm_frenzy_1_desc$"
 cs_storm_chasers_storm_frenzy_3: "$cs_storm_chasers_storm_frenzy_1$"
 cs_storm_chasers_storm_frenzy_3_desc: "$cs_storm_chasers_storm_frenzy_1_desc$"
 cs_storm_chasers_storm_frenzy_1_gestalt: "$cs_storm_chasers_storm_frenzy_1$"
 cs_storm_chasers_storm_frenzy_1_gestalt_desc: "ビッグ・ワンの出現により、 我らの意識が燃え上がる。"
 cs_storm_chasers_storm_frenzy_2_gestalt: "$cs_storm_chasers_storm_frenzy_1$"
 cs_storm_chasers_storm_frenzy_2_gestalt_desc: "$cs_storm_chasers_storm_frenzy_1_gestalt_desc$"
 cs_storm_chasers_storm_frenzy_3_gestalt: "$cs_storm_chasers_storm_frenzy_1$"
 cs_storm_chasers_storm_frenzy_3_gestalt_desc: "$cs_storm_chasers_storm_frenzy_1_gestalt_desc$"
 cs_storm_chasers_the_code: "流儀"
 cs_storm_chasers_the_code_desc: "我々を駆り立てるのは覇権への渇望でも、 物質的な利益でもない。 我々は限界を試すために生きており、 存在の最先端を目指す求道者なのだ。"
 cs_storm_chasers_the_code_gestalt: "流儀"
 cs_storm_chasers_the_code_gestalt_desc: "$cs_storm_chasers_the_code_desc$"
 every_empire_opinion_hit: "§Y[global_event_country.GetGalCommunityOrGalImperium]§!から我々に対する態度が変化："
 nexus_opinion_first_hit: "銀河社会の不安"
 nexus_opinion_first_hit_tt: "$every_empire_opinion_hit$ §R$@first_hit_opinion_change$§!"
 nexus_opinion_second_hit: "銀河社会の動揺"
 nexus_opinion_second_hit_tt: "$every_empire_opinion_hit$ §R$@second_hit_opinion_change$§!"
 nexus_opinion_third_hit: "銀河社会の恐怖"
 nexus_opinion_third_hit_tt: "$every_empire_opinion_hit$ §R$@third_hit_opinion_change$§!"
 nexus_opinion_summon_hit: "銀河社会の怒り"
 nexus_opinion_summon_hit_tt: "$every_empire_opinion_hit$ §R$@nexus_hit_opinion_change$§!"
 nexus_opinion_the_code: "銀河社会との和解"
 cs_stormfrenzy_chain_title: "嵐の狂乱"
 cs_stormfrenzy_chain_desc: "我々はいつも限界に挑んできた。 先人たちの偉業に触発された我々はいま、 理想の宇宙嵐を作り上げるチャンスを手にしている。"
 cstorms.3220.name: "チェイサーの信条"
 cstorms.3220.desc: "我々の同胞は決してスリルの追求をやめたりはしない。 日々、 驚異的な状況に出くわし、 より大きな課題に挑んでいる我々だが、 [ruler.GetRegnalName]はもっと上を目指せると考えている。\n\nいわく、 「宇宙嵐の中心部は可能性の宝庫だ。 真の最前線だよ。 停滞を打破し、 空前絶後のスリルを味わわせてくれるほどのね」\n\n途方もない規模の宇宙嵐、 歓喜に満ちた無秩序の中心地、 「ビッグ・ワン」を呼び出す時が来たのだ。残されたのは、完璧な嵐を正確に引き起こす研究と、そうするかどうか銀河の他の者の意見を聞くという、2つの些細なことだけだ。\n\nこのようなことを実現すれば、間違いなくある程度の反発を招くだろう。"
 PROJECT_SOW_THE_BIG_ONE: "ビッグ・ワンの誘引"
 PROJECT_SOW_THE_BIG_ONE_DESC: "テクノロジーは用意できたが、 近くに発生期の宇宙嵐がないため、 我々が自由に形作れる嵐の種をまく方法を調べなければならない。"
 cstorms.3222.name: "ダークマターによる育成"
 cstorms.3222.desc: "ダークマターの唯一無二の特性は、 ビッグ・ワンを引き起こすのにうってつけだ。 わが国の首都星系を取り囲む空間に、 この捉えどころのない物質を注入し、 宇宙嵐の最初の渦が現れるのを待つ。\n\nだが早くも、 好ましくない反応が生じはじめた——近隣諸国が抗議を始めたのだ。 「この特別な波に興奮しない者たちもいるのか……」と、 [Root.Owner.GetScientistPlural]の1人が不満を漏らした。"
 cstorms.3222.a: "始めるとしよう。"
 cstorms.3222.b: "もっと資源を蓄えなければ。"
 PROJECT_DARK_SEEDING: "エキゾチックな誘引"
 PROJECT_DARK_SEEDING_DESC: "ダークマターを宇宙空間に注意深く注入することで、 自由に成型できる宇宙嵐がこの星系内に発生する。"
 cstorms.3224.name: "ビッグ・ワンの発生"
 cstorms.3224.desc: "素晴らしい！ 来たるべき嵐の初期波動がすでに感じられる。 我々の[Root.Owner.GetScientistPlural]の研究が続いている中、 ビッグ・ワンの召喚に一歩近づいた。\n\nだが近隣諸国はいい顔をしていない。 我々が干渉しているのは理解不可能な力なのだと主張しており、 わが国との関係に影響が出ている。"
 cstorms.3224.a: "仕方がないな。"
 cstorms.3225.name: "ビッグ・ワンの食事"
 cstorms.3225.desc: "データは明確だった。 この宇宙嵐に何かを投入すると、 嵐はそれに似たものを放出するようになる。 つまり、 嵐に適切な種類の資源を投入すれば、 あらゆるタイプの特性を持つ超巨大嵐を作り出せるというわけだ。\n\n銀河の住人は再び懸念を表明したが、 世紀の大嵐の誕生がすぐそこまで来ているのだ。 我々の貯えを嵐に与えるとしよう！"
 cstorms.3225.a: "宇宙嵐を育てろ！"
 cstorms.3225.b: "もっと資源が必要だ。"
 cstorms.3226.name: "究極のご馳走"
 cstorms.3226.desc: "世紀の巨大嵐を生み出したいのであれば、 発生期の嵐にさまざまな栄養を与えなければならない。 そのためには、 我々の手元にある資源をサンプリングする必要がある。"
 PROJECT_EVERY_ITEM_ON_THE_MENU: "メニューにないもの"
 PROJECT_EVERY_ITEM_ON_THE_MENU_DESC: "正しい食事を与えれば宇宙嵐を操れるようになることは判明している。 餌を与えて大きくする前に、 まずは資源のサンプリングが必要だ。"
 PROJECT_EVERY_ITEM_ON_THE_MENU_REPEAT: "リピート：$cstorms.3225.name$"
 PROJECT_EVERY_ITEM_ON_THE_MENU_REPEAT_DESC: "完璧な宇宙嵐を作り出すには、 資源を慎重にサンプリングする必要がある。"
 cstorms.3227.name: "最後の追い込み"
 cstorms.3227.desc: "目に見えるほどの興奮が押し寄せる。 すべきことは明らかだ——さらに前進し、 激しく前進し、 最後まで突き進むこと。 宇宙の狂乱そのものとひとつになろうではないか！  ビッグ・ワン召喚の準備はすべて整った。 あとはほんのひと押しするだけだ。\n\n近隣諸国は怒り狂っており、 我々の「$nexus_storm$」は銀河に甚大な被害をもたらすと主張している。 ああいう面白みのない連中に屈して、 我々はこれほどの壮大なプロジェクトを放棄すべきだろうか？  計画を変更できるのはいまだけだ。"
 cstorms.3227.a: "ビッグ・ワンはわが国の悲願だ！"
 cstorms.3227.a.tt: "$nexus_storm$が40日後に到来する。\n$triggered_opinion_third_hit_tt$"
 cstorms.3227.b: "いや、 大きな被害を出すのは本意ではない。"
 cstorms.3227.b.tt: "$nexus_storm$を放棄する。\n§Y[global_event_country.GetGalCommunityOrGalImperium]§!の態度が40日後に改善する。"
 cstorms.3230.name: "ビッグ・ワンの誕生"
 cstorms.3230.desc: "まさにいま、 前代未聞の体験が生まれようとしている。 究極の厄災を迎える時が来たのだ。 ストームライダーに立ち向かえぬ相手はいない。 どんな困難でも拒みはしない。\n\n銀河に目撃させよう！"
 cstorms.3230.a: "やれ。"
 has_spawned_nexus_storm_tt: "$TRIGGER_FAIL$が§Y$nexus_storm$§!を発生"
 cstorms.3235.name: "嵐の締めくくり"
 cstorms.3235.desc: "我々は多くのことを学んだ。 銀河は玩具ではなく、 冒険の舞台であることを我々は忘れていた。\n\n[ruler.GetRegnalName]はこう言った。 「人生はスリルに事欠かない。 我々が試練の追求をやめることはないが、 敬意を忘れてはならない。 それこそが我々の選んだ道、 我々のあるべき姿なのだ」"
 cstorms.3235.a: "気楽に行こう！"
 cstorms.3235.a.tt: "$every_empire_opinion_hit$ §G+$@the_code_total_change$§!"
 #Storm Fever Challenges
 cs_stormfever_chain_title: "嵐の熱狂"
 cs_stormfever_chain_desc: "新たな高みに到達し、 喜びを知り、 自らの限界を試すため、 我々はいま試練に挑む。 お楽しみの始まりだ！"
 challenges_completed: "チャレンジ完了"
 MISSION_CS_STORM_FEVER_CHALLENGE_1: "宇宙嵐の内部で艦隊を撃破"
 MISSION_CS_STORM_FEVER_CHALLENGE_1_DESC: "戦場は古来より、 自らの力を試す場所だった。 では次は、 宇宙嵐の荒れ狂う中心で戦うことを想像してみよう！  我々がどれだけ破天荒なのか、 銀河中に思い知らせてやろう。\n\nこのチャレンジでは、 宇宙嵐の内部で敵艦隊を撃破する。"
 fleets_defeated_in_storm: "宇宙嵐内部で撃破した艦隊"
 MISSION_CS_STORM_FEVER_CHALLENGE_2: "銀河の果ての探索"
 MISSION_CS_STORM_FEVER_CHALLENGE_2_DESC: "国境を越え、 星の海のふちまで漕ぎ出し、 宇宙の最果てを目指す——これ以上の冒険があるだろうか？\n\n指定された星系に調査船を送り込む。 手段は問わない。"
 far_edge_explored: "探索した最果ての数"
 MISSION_CS_STORM_FEVER_CHALLENGE_3: "嵐の波乗り"
 MISSION_CS_STORM_FEVER_CHALLENGE_3_DESC: "一流のライダーは宇宙嵐のスリルを渇望する。 彼らを嵐に送り届け、 生き残らせよう！\n\nこのチャレンジでは、 ストームライダーに180日以上宇宙嵐に耐えさせる。"
 days_storm_rider_spend_in_storm: "ライダーが嵐内部で過ごした日数"
 MISSION_CS_STORM_FEVER_CHALLENGE_4: "出土物の調査"
 MISSION_CS_STORM_FEVER_CHALLENGE_4_DESC: "銀河には、 財宝と古代の秘密が無限に埋もれている。 そして、 そこに吹きつける猛烈な風！ 冒険に出かけて何が発見できるか試してみよう。\n\nこのチャレンジでは、 宇宙嵐によって明かされたアノマリーや遺跡の調査を行う。"
 storm_unraveled_event_investigated: "アノマリーや発掘拠点を調査"
 MISSION_CS_STORM_FEVER_CHALLENGE_5: "喜びを広めよう"
 MISSION_CS_STORM_FEVER_CHALLENGE_5_DESC: "楽しみを独占するのはよくない。 特に冒険は分かち合った方が楽しいのだ。\n\nこのチャレンジは、 近隣諸国がともに楽しめるよう、 彼らの領域に宇宙嵐を送り込む。"
 send_storm_to_other_empire: "ほかの帝国に送り込んだ宇宙嵐"
 MISSION_CS_STORM_FEVER_CHALLENGE_6: "嵐に殉じよう"
 MISSION_CS_STORM_FEVER_CHALLENGE_6_DESC: "老いて忘れ去られるのは我々の流儀に反する。 栄光の炎に包まれ、 燃え尽きるほうがふさわしい！\n\nこのチャレンジは、 ストームライダーに宇宙嵐の内部で最期を迎えさせる。"
 rider_died_in_storm: "嵐に殺された、または行方不明となったストームライダー"
 #Challenge completed intro
 challenge_completed_intro: "新たな高みに到達し、限界を打ち破った！ これぞ心が燃え上がる瞬間だ。 我々は試練を完了した！"
 #Challenge 1 completed
 challenge_completed: "完了したチャレンジ："
 cstorms.305.name: "$challenge_completed$ $MISSION_CS_STORM_FEVER_CHALLENGE_1$"
 cstorms.305.desc: "$challenge_completed_intro$\n\nあの艦隊はひとたまりもなく墜ちた。 次に我々に挑むのは誰だ？"
 cstorms.305.a: "いい気分だ！"
 #Challenge 2 completed
 cstorms.310.name: "$challenge_completed$ $MISSION_CS_STORM_FEVER_CHALLENGE_2$"
 cstorms.310.desc: "$challenge_completed_intro$\n\n銀河は魅力にあふれている！  退屈することは決してないし、 この調子で進むとしよう。 いざ次のチャレンジへ！"
 cstorms.310.a: "よし！"
 #Challenge 3 completed
 cstorms.315.name: "$challenge_completed$ $MISSION_CS_STORM_FEVER_CHALLENGE_3$"
 cstorms.315.desc.normal: "$challenge_completed_intro$\n\n帰還したストームライダーは、 歓喜の声とともに報告を行った。 宇宙嵐のスリルは次元が違う！"
 cstorms.315.desc.gestalt: "$challenge_completed_intro$\n\n我々は歓喜に包まれた。 宇宙嵐は興奮をまったく新しいレベルに引き上げてくれる。"
 cstorms.315.a: "最後まで素晴らしい体験だった！"
 #Challenge 4 completed
 cstorms.320.name: "$challenge_completed$ $MISSION_CS_STORM_FEVER_CHALLENGE_4$"
 cstorms.320.desc: "$challenge_completed_intro$\n\n古代の秘密を探り、 埋もれた財宝を発掘するのは、 いつだってスリル満点だ。 銀河にはまだまだ謎があり、 見つけられるのを待っている。"
 cstorms.320.a: "可能性は無限大だ！"
 #Challenge 5 completed
 cstorms.325.name: "$challenge_completed$ $MISSION_CS_STORM_FEVER_CHALLENGE_5$"
 cstorms.325.desc: "$challenge_completed_intro$\n\nあの宇宙嵐は彼らの領域を破壊し尽くし、 スリルと混乱を平等にもたらした！  近隣国にあれほど凄まじい体験を提供したのだから、 後悔はまったくない。\n\nいまは恨んでいるかもしれないが、 いずれ我々に感謝するだろう。"
 cstorms.325.a: "与えるのはいい気分だ！"
 #Challenge 6 completed
 cstorms.330.name: "$challenge_completed$ $MISSION_CS_STORM_FEVER_CHALLENGE_6$"
 cstorms.330.desc.normal: "$challenge_completed_intro$\n\n巨大な嵐にその名を呼ばれ、 ストームライダーは有頂天で飛び込んだ。 ストームライダー万歳、 お前は伝説になった！  大いなる彼方への旅路が、 最期の瞬間と同じくらい壮大であることを祈る。"
 cstorms.330.desc.gestalt: "$challenge_completed_intro$\n\n歓喜の渦に加わるよう、 巨大嵐が我々の一部に呼びかけた。 ノードを失うことが、 これほど有意義で爽快に感じられたことはない！ この壮大な体験は今後何年にもわたり、 我々の種族に影響を与えるだろう。"
 cstorms.330.a: "いいぞ！"
 cstorms.331.desc.normal: "$challenge_completed_intro$\n\n巨大な嵐にその名を呼ばれ、 ストームライダーは有頂天で飛び込んだ。 ストームライダー万歳、 お前は伝説になった！"
 cstorms.331.desc.gestalt: "$challenge_completed_intro$\n\n歓喜の渦に加わるよう、 巨大嵐が我々の一部に呼びかけた。 ノードを失いそうになることが、 これほど有意義で爽快に感じられたことはない！ この壮大な体験は今後何年にもわたり、 我々の種族に影響を与えるだろう。"
 electric_storm_desc: "電磁場同士の衝突により、 宇宙嵐が危険なまでの電荷を帯びる。 シールドには有害だが、 惑星の生産性には有益だ。"
 particle_storm_desc: "この宇宙嵐はまるで生きているかのようだ。 宇宙空間の内と外を動き回り、 宇宙船を追い回すことも避けることもしない。 この嵐は危険かつ不安定であり、 文明はその存在を目にしただけで、 自然の力に恐れおののき団結するだろう。"
 gravity_storm_desc: "巨大な天体同士が衝突すると、 その衝撃によって銀河全体に重力波が広がる。 そしてそれが崩壊すると、 重力嵐が発生する。 船の照準システムに悪影響を及ぼし、 重力が変動するため、 ほとんどの人々が自宅待機を余儀なくされる。"
 magnetic_storm_desc: "さまよう金属小惑星帯が強い重力と相互に作用すると、 内部に磁場が形成される。 このタイプの宇宙嵐は船を引き裂き、 産業建設に影響を及ぼすが、 一方で惑星の地殻から貴重な鉱物を掘り起こすのに役立つ。"
 solar_storm_desc: "$solar_storm$は空間のなかにきらめく揺らぎを作り出し、 その影響を受けた恒星は未曽有のフレアを発生させる。 その結果生じる放射線は極めて有害だが、 宇宙ステーションの出力を大幅に増加させ、 艦船が隠れにくくなる。"
 celestial_storm_desc: "銀河にはつねに、 数百万もの惑星から飛散した塵があてもなく漂っている。 時おりこの粒が大量に集まり、 砂塵嵐が生まれるのだ。 惑星全体の通信を妨害するが、 嵐は化学元素をもたらすので、 資源生産に役立つ。 こうした嵐のなかにあるものは、 我々のスキャナーでは検知することができない。"
 shroud_storm_desc: "ごく稀に、 シュラウドが物理的な次元を通じてささやきかけることがある。 この希少な宇宙嵐は、 知性を持つ者に荘厳かつグロテスクな光景を見せる。 シュラウドと交信した者は、 気まぐれな相乗効果を得ることがある。"
 nexus_storm_desc: "条件が整えば、 小さな宇宙嵐でさえ通常の限界を超えて発達できる。 この珍しい事象が発生したなら、 破滅的な規模の恐怖が解き放たれるだろう。 この忌まわしき存在に飲まれれば無事では済まず、 辛うじて生き延びることしかできない。"
 FROM_STORM: "宇宙嵐から："
 #Planetary modifiers
 hyper_ecosystem: "繁茂する地"
 hyper_ecosystem_desc: "この惑星の土壌は、 地殻に含まれる鉱物から窒素とリンを再吸収しており、 その濃度は他に類を見ないほどだ。 その結果、 植物が異常に早く成長するので農業には最適だが、 建築プロジェクトには支障をきたす。"
 docile_fauna: "おとなしい動物たち"
 docile_fauna_desc: "この惑星の野生動物と植物には天敵がいないため、 通常よりもかなりおとなしく、 安全に共生することが可能だ。 ただし、 その個体数は自然淘汰ではなく、 宇宙嵐の被害によって抑制されている。"
 obsidian_lakes: "黒曜石の湖"
 obsidian_lakes_desc: "地殻変動によるマグマの湖が冷えて固まったことで、 巨大な黒曜石の板が形成され、 地表のすぐ近くで貴重な資源が採取可能になっている。"
 obsidian_lakes_volcanic: "$obsidian_lakes$"
 obsidian_lakes_volcanic_desc: "$obsidian_lakes_desc$"
 crimson_crawlers: "クリムゾン・クローラー"
 crimson_crawlers_tt: "§R$COLONIZATION_IMPOSSIBLE_CRIMSON_CRAWLERS$§!"
 crimson_crawlers_desc: "この惑星の地表には数兆匹もの小さな赤い昆虫がおり、 その様子はまるで深紅の絨毯だ。 途方もない数にもかかわらず昆虫は無害なようで、 この星の生態系のなかで危ういバランスを保っている。"
 metal_planet: "金属惑星"
 metal_planet_desc: "この惑星は全体が天然の金属に覆われている。 水や呼吸可能な大気などの、 生命の維持に欠かせない要素は皆無だが、 有益な資源は大量にある！"
 terraform_fail_is_metal_planet: "地殻が金属で構成されているため、 この惑星はテラフォーミングできない。"
 previously_terraformed_planet: "以前テラフォーミングされた惑星"
 previously_terraformed_planet_desc: "この岩がちな惑星には窒素と酸素を含む大気があり、 多くの海がある。 かつてこの惑星に到達し、 入植した古い帝国の痕跡はあるが、 その姿はもうない。 つまり、 発見し解明すべきものが山ほどあることを意味し、 入植の下地が整っているということでもある！"
 previously_terraformed_planet_tt: "以前のテラフォーミングにより、 この惑星をガイア型惑星にするのは極めて容易だ。"
 has_patriotic_institute: "$building_adakkaria_patriotic_institute$"
 has_patriotic_institut_desc: "この惑星はかつて、 アドアカリア博愛会の本拠地だった。 以前は強大だった文明の痕跡は、 もはや$building_adakkaria_patriotic_institute$だけである。"
 has_patriotic_institute_tt: "次の建造物を所有している：$building_adakkaria_patriotic_institute$。 この惑星に入植すると所有権を得る。"
 adakkaria_patriotic_institute_desc.supercharged: "§Y100§! £pop£ §HPOP§!を犠牲にして、 1年ごとに星系内に宇宙嵐を発生させる確率。"
 #Planet Modifiers
 crimson_crawlers_sashimi_style: "クリムゾン・クローラー：生で消費"
 crimson_crawlers_sashimi_style_desc: "この惑星には何兆匹もの小さな赤い昆虫がおり、 地表が深紅に染まっている。 優秀な食料源で、 生で食べてもおいしい。"
 crimson_crawlers_bbq_them: "クリムゾン・クローラー：調理して消費"
 crimson_crawlers_bbq_them_desc: "この惑星には何兆匹もの小さな赤い昆虫がおり、 地表が深紅に染まっている。 巷では焼くとおいしいと評判だ。"
 COLONIZATION_IMPOSSIBLE_CRIMSON_CRAWLERS: "§R「機械」と「大地を喰らうもの」の帝国はこの惑星に入植できない。§!"
 #New planet types modifiers
 collided_planet: "衝突した惑星"
 collided_planet_desc: "2つの惑星が衝突した結果、 お互いを破壊するのではなく1つになってしまった。 使用可能な表面積は増加したものの、 この惑星での居住と建築には固有の課題が生じている。"
 wooden_planet: "樹木惑星"
 wooden_planet_desc: "数千年という年月を経て、 この惑星の地殻は厚さ数kmにもおよぶ根の層となり、 惑星はひとつの巨大な生命体となっている。"
 wooden_planet_tt: "住居の建設と維持に$w_food$ が必要。\n農場の建設に$w_food$ が必要。"
 #Eruption Event
 recent_eruption: "少し前に噴火が発生"
 eruption_report_tooltip: "\n報告は30日以内に届く。"
 colony_mod.31.name: "噴火！"
 colony_mod.31.desc: "[Root.GetName]での地殻変動により、 巨大プレートの上に広がっていた黒曜石が砕け散った。 溶岩が地表にあふれ出し、 甚大な被害をもたらしている。"
 colony_mod.31.a: "報告を聞こう。"
 colony_mod.32.name: "噴火の被害報告"
 colony_mod.32.desc: "最近の噴火より[Root.GetName]の植民地を揺るがした黒曜石の湖は、 活火山へと姿を変えた！  そこに存在していたものは、 すべて溶岩の下に埋もれてしまった。"
 colony_mod.33.desc: "黒曜石の湖で発生し、 [Root.GetName]の植民地を揺るがした最近の噴火は、 奇跡的に被害をまったくもたらさなかった。 しかも幸運なことに、 噴火によって黒曜石が砕け散ったので、 簡単に採取できるようになった！"
 colony_mod.34.desc: "黒曜石の野で発生し、 [Root.GetName]の植民地を揺るがした最近の噴火は、 奇跡的に被害をまったくもたらさなかった！"
 #Aftermath modifiers
