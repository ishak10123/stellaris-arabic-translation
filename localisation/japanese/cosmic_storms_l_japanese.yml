 MESSAGE_STORM_AFTERMATH_DESC: "§H$PLANET$§!は、 長引く大気乱気流を報告している。"
 electric_storm_aftermath_custom_desc: "§Y$electric_storm$§!は建設速度に影響を与えたが、 エネルギー生産を強化するだろう。"
 particle_storm_aftermath_custom_desc: "§Y$particle_storm$§!が惑星全体に腐食性の微粒子を残した。"
 gravity_storm_aftermath_custom_desc: "§Y$gravity_storm$§!が過ぎ去り、 我々の植民地の1つに重力アノマリーが残された。"
 magnetic_storm_aftermath_custom_desc: "§Y$magnetic_storm$§!が過ぎ去り、 我々の植民地では、 極地で電磁障害が報告されている。"
 solar_storm_aftermath_custom_desc: "§Y$solar_storm$§!が惑星全体に危険なレベルの放射能汚染を残した。"
 celestial_storm_aftermath_custom_desc: "§Y$celestial_storm$§!が惑星を宇宙塵の濃い霧で覆った。"
 shroud_storm_aftermath_custom_desc: "§Y$shroud_storm$§!が惑星上の超常現象を増加させている。"
