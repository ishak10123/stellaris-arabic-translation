 #Magnetized Planetary Core
 pm_magnetized_planetary_core: "超強磁性の惑星の核"
 pm_magnetized_planetary_core_desc: "マントル深部の電磁気活動は、 技術インフラを混乱させる一方で、 磁気採掘を可能にする。"
 cstorms.1705.name: "$pm_magnetized_planetary_core$"
 cstorms.1705.desc: "最近起きた§Y$magnetic_storm$§!の後、 [this.GetName]で異常な余波が報告されている。 嵐の強力なエネルギーフィールドは、 惑星の溶融炉心の磁気変動を増大させ、 その結果、 技術インフラが広範囲にわたって機能不全に陥った。\n\nしかし、この状況は新たな資源採掘の機会でもある。 惑星のマントルの下にある金属を豊富に含む溶岩は、 現在電磁気的に帯電しており、 採掘用磁石を使って採取することができる。"
 #Electrified Oceans
 d_electrified_oceans: "電化された海"
 d_electrified_oceans_desc: "惑星の広大な海には、 絶え間ない電流が流れている。"
 GLACIAL_OCEANS: "氷下海"
 DEFAULT_OCEANS: "海"
 cstorms.1715.name: "$d_electrified_oceans$"
 cstorms.1715.desc.common: "最近[this.GetName]で起きた§Y$electric_storm$§!の後、 異常な現象が観測されている。 惑星の[GetOceansState]は広大な水域を循環する永久的な電流によって帯電しており、 水生生物に致命的なリスクをもたらしている。"
 cstorms.1715.desc.aquatic: "これは植民地の存続にとって深刻な脅威であり、 早急に対処しなければならない。"
 cstorms.1715.desc.non_aquatic: "この現象は我々に直接的な害をもたらすものではないが、 植民地の将来の発展が難しくなる。"
 cstorms.1715.a: "電流を放電しろ。"
 cstorms.1715.b: "受け入れるしかない。"
 #Ghostly Apparitions
 d_ghostly_canyon: "幽霊の峡谷"
 d_ghostly_canyon_desc: "この峡谷を訪れる人々は、 幽霊のような幻影を目撃している。"
 cstorms.1725.name: "幽霊のような幻影"
 cstorms.1725.desc.common: "[this.solar_system.GetName]で最近起こった§Y$shroud_storm$§!の後、 [owner.GetColonistPlural]は孤立した峡谷で不可解な幽霊のような幻影を目撃したと報告した。 この幽霊のような青い人影は、 [owner.GetColonistPlural]と交流することもできず、 あるいはする気がないのか、 あてもなく彷徨っているうちに消えてしまう。"
 cstorms.1725.desc.psionic: "幻影はサイオニック的なものであるように見えるが、 精神的なコミュニケーションをとることはできていない。 しかし、 彼らの存在は我々自身のテレパシー能力を受動的に強化してくれることを発見した。"
 cstorms.1725.desc.psionic_robot: "幻影は超能力的なものであるように見えるが、 サイオニック通信を確立することはできていない。 しかし、 システムチェックの結果、 彼らの存在は我々自身のテレパシー能力を受動的に強化してくれることが確認された。"
 cstorms.1725.desc.spiritualist: "この驚くべき現象は、 我々の存在の無形の不思議を思い出させてくれる。"
 cstorms.1725.desc.gestalt: "今のところ、 身体的危害や攻撃的な行動は報告されていない。"
 cstorms.1725.desc.default: "今のところ身体的危害や被害は報告されていない。 しかしこの奇妙な現象は不安な邪魔な要素となっている。"
 cstorms.1725.a: "谷を土で埋めろ。 死者は埋まっているべきだ。"
 #Volcanic Inactivity
 cstorms.1735.name: "火山活動休止"
 cstorms.1735.desc: "最近起きた§Y[this.GetAffectedStormType]§!で残留した放射線は、 §H[this.GetName]§!の不規則な地質活動を引き起こしている。\n\n最も重大なことは、 嵐の影響で活火山が消滅し、 地質学的に活発な場所ではなくなり、 マグマの供給が途絶えたことである。\n\nこの変化によってマグマの冷却による新しい土地開拓が可能となり、 惑星をさらに発展させることができるだろう。"
 #Mountain in the Sky
 d_sky_mountain: "天空の山脈"
 d_sky_mountain_desc: "巨大な山域が惑星の大気圏上層部の薄い空気に浮かんでおり、 新しい鉱床を露にしている。"
 unlocks_zone_minerals_physics: "$t$区域特化をアンロック：§Y$zone_minerals_physics$§!"
 cstorms.1745.name: "$d_sky_mountain$"
 cstorms.1745.desc: "深刻な§Y$gravity_storm$§!により、 §H[this.GetName]§!の地形が劇的に変化した。 嵐の強力な重力変動により、 惑星最大の山域が地殻から切り離され、 惑星から垂直に持ち上げられた。\n\n嵐の残存重力効果によって大気圏上層部に浮遊したままの状態となっている。 この驚くべき変動により、 岩盤の下に隠された鉱石が発見された。[owner.GetResearchers]はより深く分析するだろう。"
 #Melting Glaciers
 cstorms.1755.name: "溶ける氷河"
 cstorms.1755.desc.common: "最近の§Y[this.GetAffectedStormType]§!は、 [this.GetName]の気候に予期せぬ影響を与えている。"
 cstorms.1755.desc.electric: "大気中の電化の増加により、 極地では大幅な気温の変化が起こっており、 $cstorms.1755.desc.common_2$"
 cstorms.1755.desc.particle: "嵐の粒子による腐食作用は、 極地に大きな影響を与えており、 $cstorms.1755.desc.common_2$"
 cstorms.1755.desc.gravity: "嵐による重力の変化が、 水中の氷の複数層を粉砕し、 $cstorms.1755.desc.common_2$"
 cstorms.1755.desc.magnetic: "惑星の磁場に生じた乱れが、 激しい地殻変動をもたらし、 $cstorms.1755.desc.common_2$"
 cstorms.1755.desc.solar: "嵐の極度な暑さが徐々に惑星全体の気温を上昇させ、 $cstorms.1755.desc.common_2$"
 cstorms.1755.desc.celestial: "過熱した天体の塵が極地に大量に集中したことで、 極地に大きな影響を与え、 $cstorms.1755.desc.common_2$"
 cstorms.1755.desc.common_2: "これまでアクセスできなかった凍土が溶けてきた。\n\nこの新たに発見された土地を開発できるようになった。"
 #Dusty Drink
 cstorms.1761.name: "宇宙塵の詰まり"
 cstorms.1761.desc.common: "我々の§H[this.GetName]§!の[Owner.GetEngineerPlural]報告によると、 §Y$celestial_storm$§!が水のろ過システムに悪影響を及ぼしている。 粒子が惑星の地下水に沈殿し、 鉱物が詰まって主要なインフラを故障させている。"
 cstorms.1761.desc.default: "その結果、 水耕栽培がうまく行かず、 惑星の農業に深刻な害を与え、 安全な飲料水の不足にもつながっている。\n\nこの問題に対処しなければ、 我々の水供給に長期的な害を及ぼす可能性がある。 幸い、 我々の[owner.GetEngineerPlural]は、 より強固なろ過システムを開発し、 この問題に対処できると確認している。"
 cstorms.1761.desc.lithoid: "水耕栽培の詰まりを調査しているうちに、 我々の[Owner.GetColonistPlural]は、この液状の鉱物自体が、 岩石種族の人々にとっては、 おいしく栄養価が高いことを発見した。 彼らは植民地のろ過システムにいくつかの軽微な調整を加え、 嵐をやり過ごすための新しい季節限定の飲み物を大量生産した。"
 cstorms.1761.a: "続行しろ。"
 cstorms.1761.b: "予期せぬご褒美。"
 pm_satured_filtration: "宇宙塵のろ過"
 pm_satured_filtration_desc: "惑星の水道水に大量の宇宙塵でが混じり、 水耕栽培ネットワークの詰まりを引き起こしている。"
 filtration_insight_modifier: "水耕栽培のろ過の洞察"
 CLEAR_DUSTY_PIPES_PROJECT: "パイプを掃除"
 CLEAR_DUSTY_PIPES_PROJECT_DESC: "§Y$celestial_storm$§!が§H[this.GetName]§!に与えた影響により、 水ろ過システムが不溶性の鉱物スラリーで詰まってしまった。 この問題に対処するには、 より頑丈なろ過システムを設計しなければならない。"
 cstorms.1765.name: "フィルター詰まり解消"
 cstorms.1765.desc: "[Owner.GetEngineerPlural]は、 §H[this.GetName]§!の水耕栽培の詰まりや水不足を解消した。 植民地の給水ネットワークが改善され、 $celestial_storm$が引き起こしたものを含め、 複雑な不純物をろ過できるようになった。\n\nこれらの給水インフラの改善は、 [Owner.GetName]全体の灌漑の改善にも適用できる。"
 #Flightless Fauna
 cstorms.1771.name: "飛べない動物"
 cstorms.1771.desc.common: "[this.GetName]の[Owner.GetScientistPlural]たちは、 §Y$gravity_storm$§!が惑星の鳥類に厳しい影響を及ぼしていることを確認した。\n\n嵐による重力変動が不安定な大気状態を引き起こし、 何種類かの鳥が飛べなくなっている。"
 cstorms.1771.desc.default: "鳥たちは、 餌を捕獲できないだけでなく、 捕食者にも襲われやすくなる。\n\nこのままでは、 これらの鳥類が絶滅してしまう危険性がある。"
 cstorms.1771.desc.swarm: "真のご馳走が我々を待っている。"
 cstorms.1771.a: "楽に狩れるな。"
 cstorms.1771.b: "自然の成り行きに任せよう。"
 cstorms.1771.c: "飛べなくなった鳥類を保護区域に移動させる。"
 cstorms.1771.evopred: "滅びる前にDNAを保存する。"
 d_avian_reserve: "鳥類保護区"
 d_avian_reserve_desc: "絶滅危惧種の鳥類を保護するために作られた人里離れた自然保護区。"
 cstorms.1776.name: "再び空へ"
 cstorms.1776.desc: "§Y$gravity_storm$§!の通過後、 [this.GetName]の飛べなくなった鳥たちは、 鳥類保護区に移され、 再び空を飛べるようになった。\n\n多くの鳥類は以前の生息地に帰ったが、 かなりの数の鳥が安全で快適な保護区にそのまま残った。\n\nこれは、 惑星の鳥類を間近で研究するまたとない機会である。"
 cstorms.1776.a: "素晴らしい知らせだ。"
 ################
 #Storm Events #
