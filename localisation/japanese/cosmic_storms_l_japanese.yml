 PRESCRIPTED_ship_prefix_yatunan_radicals: "RAD"
 PRESCRIPTED_species_name_yatunan_radicals: "ヤチューン"
 PRESCRIPTED_species_plural_yatunan_radicals: "ヤチューン"
 PRESCRIPTED_species_adjective_yatunan_radicals: "ヤチューン"
 PRESCRIPTED_planet_name_yatunan_radicals: "ヤチューン"
