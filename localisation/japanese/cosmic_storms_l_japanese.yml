 situation_stormfall_desc: "[owner.capital_scope.GetName]での激しい天候は、 嵐の爽快な力を明らかにした。 もし惑星の天候を制御できるようになれば、 その知識を宇宙規模で活用できるだろう。 嵐を引き寄せる建造物の建設は、 究極の嵐への歩みを加速させる。"
 situation_stormfall_monthly_change_tooltip: "この嵐を克服するのだ。"
