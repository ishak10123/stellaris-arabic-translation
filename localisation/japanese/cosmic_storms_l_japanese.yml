 r_weather_manipulator_desc: "アイネシア交易国が、 宇宙嵐の操作に使っていた装置の改良版。 デフォルトの状態では、 嵐に関連するすべての技術の効果を高められるが、 適切に利用すれば、 宇宙嵐をひとつ残らず国境から遠ざけることもできる。"
