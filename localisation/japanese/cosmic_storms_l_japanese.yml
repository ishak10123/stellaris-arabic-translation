 magnetic_storm_aftermath_modifier_tooltip: "$STORM_AFTERMATH_DESC$\n$t$-§H$magnetic_storm_aftermath_modifier$§!:\n$tt$-§G-10%§!から§G-30%§!$mod_planet_metallurgists_upkeep_mult$\n$tt$-§R-5%§!から§R-20%§! $MOD_PLANET_BUILDING_BUILD_SPEED_MULT$"
 magnetic_storm_aftermath_modifier_severity_desc: "$magnetic_storm$が残していった磁気の乱れにより、 大気が鮮やかに光り輝いている。残留の磁場もまた、惑星上建設プロジェクトの進捗に影響を与える。"
