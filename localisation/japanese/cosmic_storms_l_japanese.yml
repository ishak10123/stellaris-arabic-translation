 solar_storm_aftermath_modifier_severity_desc: "$solar_storm$によって引き起こされた高レベルの放射線により、 都市部はほぼ恒久的なロックダウンを余儀なくされた。 居住空間が厳密に管理されるため、 住民は落胆したものの、 この武装惑星の支配ははるかに容易になった。"
