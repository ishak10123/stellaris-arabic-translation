 gravity_storm_aftermath_modifier: "余波：重力の変動"
 gravity_storm_aftermath_modifier_tooltip: "$STORM_AFTERMATH_DESC$\n$t$-§H$gravity_storm_aftermath_modifier$§!:\n$tt$-§R+25%§!から§R+100%§!$mod_planet_structures_cost_mult$\n$tt$-§G+20%§!から§G+60%§! $mod_planet_bureaucrats_unity_produces_mult$"
 gravity_storm_aftermath_modifier_severity_desc: "$gravity_storm$による重力レベルの変動のため建築が困難になったが、 重力と時空についての科学的知見をふんだんに得られた。"
