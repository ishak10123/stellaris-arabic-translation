 #Storm Tech Insight events
 cstorms.505.name: "嵐に立ち向かえ"
 cstorms.505.desc: "§H[this.GetAffectedStormType]§!による被害の余波の中で、 我々はこれらの銀河現象について独特な洞察を得た。\n\n宇宙気象学を研究することで、 我々は将来自分自身をよりよく守ることができる。 この新しい研究分野は、 やがてこれらの嵐を操るための手段を生み出すかもしれない。"
 #Storm Buildings
 building_storm_attraction_center: "宇宙嵐誘引センター"
 building_storm_attraction_center_desc: "この施設は重力を慎重に操作し、 近傍の宇宙嵐を引き寄せる。"
 building_advanced_storm_attraction_center: "先進宇宙嵐誘引センター"
 building_advanced_storm_attraction_center_desc: "ダークエネルギーに関する高度な知見により、 それぞれの$building_storm_attraction_center$のスーパーチャージが可能になり、 嵐をより効率的に引き寄せられるようになる。"
 building_storm_repellent_center: "宇宙嵐反発センター"
 building_storm_repellent_center_desc: "宇宙嵐が遠ざかるほど国民は安全になり、 彼らの心も穏やかになる。 このセンターに設置された天体気象学に基づく複雑な装置は、 接近する嵐を遠ざけてくれる。"
 building_advanced_storm_repellent_center: "先進宇宙嵐反発センター"
 building_advanced_storm_repellent_center_desc: "宇宙嵐から我らの世界を守れるのであれば、 時空を操作するのは当然のことである。 このセンターはまさにそのためのものだ。"
 building_storm_resistant_production: "宇宙嵐被害軽減センター"
 building_storm_resistant_production_desc: "この施設は現地で支援活動を行い、 宇宙嵐が惑星の生産に与える被害を軽減する。 効率的な連携とコミュニケーションにより、 $building_storm_resistant_production$は救助チームの迅速な展開が可能で、 惑星全体の交易状況をも改善できる。"
 building_storm_resistant_production_tt: "惑星産出物に対する§Y$default_storm$§!のマイナス効果が§G30%§!減少する。\n\n§Y$default_storm$§!の影響下で：$TABBED_NEW_LINE$$mod_planet_miners_minerals_produces_add$：§G+0.5§! $TABBED_NEW_LINE$$mod_planet_farmers_food_produces_add$：§G+0.5§! $TABBED_NEW_LINE$$mod_planet_technician_energy_produces_add$：§G+0.5§! \n\n惑星ディシジョン「§Y$decision_hunker_down$§!」が利用可能になる"
 building_advanced_storm_resistant_production: "宇宙嵐無力化装置"
 building_advanced_storm_resistant_production_desc: "各$building_storm_resistant_production$に気象制御システムを追加することで、 嵐による悪影響が大幅に軽減される。 さらに、 救助チームの展開がより迅速になり、 惑星の交易が天候にほとんど左右されなくなる。"
 building_advanced_storm_resistant_production_tt: "惑星産出物に対する§Y$default_storm$§!のマイナス効果が§G45%§!減少する。\n\n§Y$default_storm$§!の影響下で：$TABBED_NEW_LINE$$mod_planet_miners_minerals_produces_add$：§G+2§! $TABBED_NEW_LINE$$mod_planet_farmers_food_produces_add$：§G+2§! $TABBED_NEW_LINE$$mod_planet_technician_energy_produces_add$：§G+2§! \n\n惑星ディシジョン「§Y$decision_hunker_down$§!」が利用可能になる"
 building_adakkaria_patriotic_institute: "祝典の学び舎"
 building_adakkaria_patriotic_institute_desc: "$building_adakkaria_patriotic_institute$は、 知覚状態に関する高度な見識の宝庫である。 ここで我々は、 残酷な「アドアカリア博愛会」の誘惑に陥ることなく、 内なる嵐を育む力を人々に与える。"
 building_adakkaria_patriotic_institute_effect_desc: "宇宙嵐がこの星系を通過すると、 10%の確率で£pop£ §HPOP§!が「$Name_Storm_Fused$」の特性を得る。"
 building_adakkaria_patriotic_institute_effect_upgrade_desc: "宇宙嵐がこの星系を通過すると、 40%の確率で£pop£ §HPOP§!が「$Name_Storm_Fused$」の特性を得る。 さらに、 10年ごとに20%の確率で§Y100§! £pop£ §HPOP§!が宇宙嵐に変化する。"
 building_astrometeorology_observation_center: "天体気象観測所"
 building_astrometeorology_observation_center_desc: "精密なセンサーを備えたこの観測所は、 宇宙の振る舞いについての理解を深めるため、 さまざまな環境条件を研究する。"
