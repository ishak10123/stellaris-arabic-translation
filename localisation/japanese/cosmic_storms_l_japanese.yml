 #Storm in a Box
 cstorms.1816.name: "漂流するカプセル"
 cstorms.1816.desc: "謎のカプセルが§H[this.GetName]§!を漂流している。 明らかな攻撃能力はなく、こちらの信号にも反応しない。\n\nスキャンによると、 損傷した外装は高度な素材と見慣れない工学技術で作られている。 さらなる分析が必要である。"
 cstorms.1816.a: "調査しろ。"
 STORM_IN_A_BOX_INVESTIGATE_PROJECT: "カプセルの調査"
 STORM_IN_A_BOX_INVESTIGATE_PROJECT_DESC: "明らかに破損している謎のカプセルが§H[this.GetName]§!星系を漂流している。 どこから来たのか、 何のためのカプセルなのかは不明だ。 明らかな武器は持っておらず、 その高度な構造をさらに分析することは、 安全で価値のあるものになるだろう。"
 cstorms.1820.name: "嵐の罠"
 cstorms.1820.desc: "[this.leader.GetName]は[solar_system.GetName]星系を漂流する謎のカプセルが、 かつて広範囲の防衛線の一部である古代の「嵐の罠」だと考えている。\n\n装置の吸気口は密閉されているが、 調べたところ、 圧縮されたエネルギーと、 捕獲された宇宙嵐の物質を内部に保持しているようだ。\n\nこの驚くべき容器を開けられれば、 嵐の影響を抑える方法について多くのことを教えてくれるかもしれないが、 中に閉じ込められている力が開放される危険もある。"
 cstorms.1820.a: "学ぶべきことは多くある。"
 cstorms.1820.b: "危険すぎる。 放っておけ。"
 STORM_IN_A_BOX_TRAP_PROJECT: "嵐の罠を開ける"
 STORM_IN_A_BOX_TRAP_PROJECT_DESC: "古代の「嵐の罠」が宇宙空間を漂い、 その中に圧縮された宇宙嵐を運んでいる。 それを開ければ、 内部に閉じ込められている力を解放する危険はあるが、 嵐の制御と緩和について貴重な知見を得ることができるだろう。"
 cstorms.1826.name: "放たれた嵐"
 cstorms.1826.desc: "[leader.GetName]は嵐の罠の仕組みについての分析を完了し、 吸気口を開けることができた。 吸気口が開くと同時に、 中に込められていた§H[from.GetStormType]§!は[solar_system.GetName]星系の宇宙空間に解き放たれた。\n\n罠の複雑な工学的研究により、 嵐に強い素材や構造に関する興味深い知見が得られたが、 この装置がどのようにして嵐を完全に封じ込めたのかはまだわかっていない。 この知識は、 将来の宇宙的障害を乗り切る上で大いに役立つだろう。"
 cstorms.1826.storm_tt: "[solar_system.GetName]星系に小型の低レベル§Y$default_storm$§!が発生"
 storm_trap_insight_modifier: "嵐の罠による知見"
 storm_trap_insight_modifier_tt: "§Y宇宙嵐§!による悪影響を§G10%§!軽減する。"
 cstorms.1835.desc: "お気の毒に、 [this.GetSpeciesNamePlural]！ 我々は[this.GetName]で大きな嵐が大惨事を引き起こしたのを目撃した。\n\n被害の大きさを聞いて、 大変気の毒に思っている。 だから、 どうか支援させてほしい。 特別な1回限りの特別な支援だ！\n\n一流のガジェットを提供しようではないか。 最高品質のものだけだ！ これがあれば、 次の嵐が来ても準備万端だ。 さあ、 いかが？"
 cstorms.1835.a: "承諾する。"
 cstorms.1835.b: "興味ない。"
