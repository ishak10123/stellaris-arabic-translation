l_japanese:
 ####################################
 # Events
 ####################################
 # introduction event
 progress.2.desc.wilderness: "[Root.GetName]は[from.GetName]で驚くべき発見をした。 [from.GetPlanetMoon]は異種生命で満ち溢れていたのだ！  初めて、 我々以外に起源を持つ生命体に遭遇した。\n\nこの発見により、 ついに、[root.owner.capital_scope.GetName]にいる我々は宇宙で孤独ではないことが証明された。 [from.GetName]で知的生命は見つからなかったが、 遭遇するのはおそらく時間の問題だ。"
 # Colonization Events
 wilderness.1010.name: "[from.GetName]の覚醒"
 wilderness.1010.desc.intro: "テラフォーミング胞子は、 その目的を果たした。 異世界を植民地化するために我々の一部を送り出すという、 初めての試みを成し遂げたのだ。"
 wilderness.1010.desc.same: "[from.GetName]および[root.GetHomeWorldName]になる……それはすでに我々にとってとても馴染み深いものになっている。 かつては異質な太陽の下で、 多くの新しい形を取り入れながらも、 快適な生き方だ。 我々は、 ここでの既存の状況に軽々と適応した。" #e.g. 'becoming Mars as well as Earth...''
 wilderness.1010.desc.similar_cold: "[from.GetClassAdj]§Y[from.GetName]§!に適応することは困難を伴うだろうが、 すでに慣れ親しんだ対処法を見つけている。 巻きひげが伸び、 生息地が切り開かれ、 腹を空かせた口が狩りをする。" #e.g. 'Adapting our self to suit arctic Pluto...'
 wilderness.1010.desc.similar_dry: "[root.GetHomeWorldName]のように、 我々は常に乾燥した大気の中で繁栄してきた。 そして、 [from.GetClassAdj]§Y[from.GetName]§!になるという課題にも立ち向かっていくだろう。 すでに我々は水分を見つけ、 保全するための新たな方法を見出し、 この困難な新しい地質に逆らうのではなく、 それと協調する方法を学んだ。" #e.g. 'the challenge of becoming savannah Mars'
 wilderness.1010.desc.similar_wet: "[root.GetHomeWorldName]の海で繁栄したように、 [from.GetClassAdj]§Y[from.GetName]§!として、 我々は繁栄するだろう。 鉱物、 海流、 そして日照時間さえもが、 ここでは奇妙に感じられるが、 すでに必要なものを抽出する方法を見つけた。" #e.g. 'we flourish as oceanic Neptune'
 wilderness.1010.desc.diff_cold: "§Y[from.GetName]§!になるのは困難であることは分かっていた。 我々を[root.GetHomeWorldName]の[root.capital_scope.GetClassAdj]にしていたものの一部は、 すでにこの惑星でなくなりつつあるが、 残ったものは強く、 適応し始めている。 この未知の環境では、 生命維持に必要な基本的な資源を確保することがさらに困難になる。 しかし、この厳寒の風景にしがみつきながら、 命がすでに活路を見つけていることを我々は観察している。" #e.g. 'becoming Earth'
 wilderness.1010.desc.diff_dry: "この場所は我々の中で本能的な恐怖を呼び起こす。 とても暑く乾燥していて、 本能的に「焦土」の記憶が蘇る。 もしここで適応し、 繁栄できれば……§Y[from.GetName]§!になることができれば、 我々自身の中でも何か新しいものが覚醒するかもしれない。 水分があれば、 我々はそれを蓄える方法を見つけた。 日陰が少ない場所では、 自分たちで日陰を作る方法を編み出した。"
 wilderness.1010.desc.diff_wet: "§Y[from.GetName]§!になるための努力は困難を極めるだろうが、 腐敗と洪水に備えて身構えている。 水に強い部分は、 弱い部分を支えるために水を吸収する。 我々はこの場所の独特な流れを受け入れている。" #e.g. 'Our effort to become Mars'
 wilderness.1010.desc.other: "我々は§Y[from.GetName]§!になるために自分自身を形作るため、 成長する部分と衰退する部分を特定している。 [from.GetClassAdj]的な存在は、 我々が以前から知っているものと多くの共通点があるが、 奇妙な点も数多くある。 そのため、 我々は観察し、 実験する。" #e.g. 'shape ourselves to become Luna'
 wilderness.1010.desc.outro: "我々の巨大建造物、 栄養素、 そしてDNAはここに我々の前から存在していた生命と適応し、 混ざり合い始めている。 [from.GetName]は目覚めつつある。"
 wilderness.1010.a: "我々の世界は、 やがて一つになるだろう。"
 # Terraforming Events
 terra.25.desc.wilderness: "§Y[From.GetName]§!を目覚めさせるという長期的な計画は、 期待していた結果をもたらしていない。 バイオマス再調整装置の1つが故障し、 少量の§Yテラフォーミング残留物§!が放出され、 谷を詰まらせ、 一部の居住可能区域にねばねばした地表を形成してしまった。\n\n我々にとって本質的に危険なものではないが、 この膿のような物質が大量にあることで、 運動性の高い要素の一部が一時的に苦労する可能性がある。"
 terra.80.desc.wilderness: "我々は§Y[From.GetName]§!の大気や土壌に含まれる放射線のさらなる層から、 未来の我々自身を解放した。 しかし、 慎重な[Root.GetTerraformerPlural]が介入し、 この惑星の一部を一時的に隔離せざるを得なかった。 どうやら放射線環境でたくましく生きる非常に捕まえにくい在来種の環境を乱してしまったようだ。 残念ながら、 我々の行動により、その種は枯れつつある。\n\nさらに興味深いことに、 この種族は準知的であるように見える。 彼らは独立した思考を持つ寸前のところまで進化しているのだ。 [From.GetName]がその有害な環境の最後のものを浄化しようとしている今、 我々はこの斬新な生命体をどう扱うかを決めなければならない。"
 terra.80.b.wilderness: "この世界は彼らのものだ。 彼らを覚醒させるべきだ。"
 terra.80.d.wilderness: "彼らを喰らおう。"
 wilderness.2000.name: "計画された覚醒"
 #wilderness.2000.desc.reg: "We feel the tremendous potential of [from.GetName]. It seems proper to both fear and delight in the awesome power we are about to exert there: shaping this [from.GetPlanetMoon] with our will and the tools we have developed; laying the pattern for its eventual awakening.\n\nWe have long relied on natural processes to grow and sustain the [root.GetName]. But these trials also cost us dearly, and taught us much. Now we shall see what wonders emerge when a habitable world skips its own evolution and gains the wisdom of hard-earned growth and decay."
 wilderness.2000.desc.barren: "[from.GetName]の荒廃を目にするのは痛ましいものだが、 そう長く続くことはない。 銀河の生命体はこれまでこの不毛な世界を無視してきたが、 今、 我々[root.GetName]はこの状況を改善するための道具と知識を駆使している。\n\nこれまでに学んだことをすべて考慮しても、 [from.GetName]の復元は困難と思われる。 我々の意志と、 我々が発見した気候を変える道具によって、 以前は生命が存在しなかった場所にもすぐに生命が存在するようになるだろう。"
 wilderness.2000.desc.tomb_detox: "[from.GetName]で我々が知っていた命は消滅したかもしれないが、 今こそこの惑星に第二のチャンスを与える時が来た。 大気、 水系、 土壌を復元する作業を開始した。 これにより[from.GetName]に再び[root.GetName]としての生命体が宿ることを目指している。"
 wilderness.2000.desc.gaia: "進化のるつぼは我々[root.GetName]に驚異をもたらした。 しかし今、 我々は[from.GetPlanetMoon][from.GetName]のために、 はるかに多くのことを伝える機会を得た。 過去の我々では想像さえもできなかった道具や知識を活用し、 [from.GetName]をこれまでにないような覚醒の場所として形作ることを始めた。\n\n[from.GetName]の基盤は、 いつの日か動植物の活気あふれる生命サイクルによって栄養分が豊かになり、 渓谷、 山々、 高原は採集、 狩猟、 居住のための豊かな空間を提供することだろう。 生命はここで繁栄するのだ。"
 wilderness.2000.a: "始めよう。"
 wilderness_pre_sapient_defence_army: "準知的生命体の群れ"
 seq_wilderness_pre_sapient_defence_army: "共生体の群れ$R$" # e.g. 'Symbiont Herd IV'
 wilderness_pre_sapient_defence_army_plural: "準知的生命体の群れ"
 wilderness_pre_sapient_defence_army_desc: "刺激されなければおとなしく、 刺激された時には家族を守るために最も基本的な本能以外の感情は一切抱かない、 縄張り意識の強い生き物。"
 wilderness_pre_sapient_assault_army: "準知的生命体の大群"
 seq_wilderness_pre_sapient_assault_army: "共生体の大群$R$" # e.g. 'Symbiont Horde IV'
 wilderness_pre_sapient_assault_army_plural: "準知的生命体の大群"
 wilderness_pre_sapient_assault_army_desc: "獰猛な生き物で、 敵とみなしたものを容赦なく破壊するだけの狡猾さと持久力を備えている。"
 ####################################
 # Origins
 ####################################
 origin_wilderness: "ウィルダネス"
 origin_wilderness_desc: "§R警告：['concept_purity_ascension']以外のアセンションパスが使用不可になる。§!\n\nこの存在は、 知性を備えた生態圏に他ならない。 すなわち、 惑星規模のゲシュタルト意識を形成するために、 長い年月をかけて合体した多種多様な生命体の集合体である。"
 origin_tooltip_wilderness_effects: "- 特性：['trait:trait_wilderness']\n- 標準的なすべての£building£ ['concept_buildings']、 £district£ ['concept_districts']、 および£zone£ ['concept_district_specialization']を専用のものと置き換える\n- コロニー船による入植を['concept_terraforming']と置き換える\n- 新たな資源をアンロック：£biomass£ ['concept_biomass']\n- 母星：$TABBED_NEW_LINE$- サイズ：£planetsize£ 18$TABBED_NEW_LINE$- ['concept_scorched_plains', £blocker£ $d_scorched_plains$]"
 trait_wilderness: "ウィルダネス"
 trait_wilderness_desc: "§Lこの種族は、 思考や生産物が環境と一体化した共生体の一部として存在している。§!"
 WILDERNESS_NATURAL_WORLDS_DECLINE: "§R§Yウィルダネス§!は自然ではない惑星で生存できない。§!"
 WILDERNESS_DEAD_WORLD: "$TRIGGER_FAIL$§Yウィルダネス§!はウィルダネス以外の帝国では生存できない。"
 country_virtual_jobs: "この帝国内で行われる職業は自動的に割り当てられる。"
 concept_wilderness_trait: "$trait_wilderness$"
 concept_wilderness_trait_desc: "- $MOD_LOGISTIC_GROWTH_MULT$：§R-100%§!\n- §R移住あるいは強制移住できない§!$NEW_LINE$- §R自然繁殖できない§!\n\n§L$trait_wilderness_desc$§!"
 PRESCRIPTED_adjective_zhardmehka: "ブルーマー"
 PRESCRIPTED_ship_prefix_zhardmehka: "ZMV"
 PRESCRIPTED_species_name_zhardmehka: "ザード・クレリン"
 PRESCRIPTED_species_name_plural_zhardmehka: "ザード・クレリン"
 PRESCRIPTED_species_adjective_zhardmehka: "ザード・クレリン"
 PRESCRIPTED_planet_name_zhardmehka: "テロン"
 PRESCRIPTED_system_name_zhardmehka: "タットラ"
 PRESCRIPTED_ruler_name_zhardmehka: "$FUN3_CHR_Obanva$ $FUN3_CHR_uvi-Livve$"
 PRESCRIPTED_ruler_title_zhardmehka: "アバター"
 START_SCREEN_WILDERNESS_INTRO: "記憶にある限り、 [root.GetHomeWorldName]は惑星[root.GetHomeWorldName]だった。 ここにあるすべての茎、 巻きひげ、 酵素は自己の一部であり、 成長、 腐敗、 捕食のバランスである。 長い年月の間、 [root.GetHomeWorldName]は銀河の彼方をぼんやりとしか認識できなかった。 しかし、 星々は蠢いている。\n\n[root.GetHomeWorldName]上で戦闘が起こった。 大きな船がその表面に破片を降り注いだ。 異星の人工物はすぐに再利用された。 そして、スーパーフレアが起こった……"
 START_SCREEN_WILDERNESS_DEFAULT: "[root.GetHomeWorldName]はそれをまばゆく、 焼けつくような光だと感じた。 何十億もの共生体が炎の嵐と放射能によって焼き尽くされ、 吹き飛ばされた。 大陸全体から生物が根こそぎ消え去ったのだ。"
 START_SCREEN_WILDERNESS_COLD: "[root.GetHomeWorldName]はそれをまばゆく、 焼けつくような光だと感じた。 氷河は荒れ狂う急流と化し、 恒星放射は[root.GetHomeWorldName]を根こそぎ焼き払った。 大陸全体が流れ去った。"
 START_SCREEN_WILDERNESS_DRY: "[root.GetHomeWorldName]はそれをまばゆく、 焼けつくような光だと感じた。 砂丘はガラスとなって溶け、 吹き荒れる風が岩肌をきれいに削り取った。 大陸全体が完全に不毛の地と化したのだ。"
 START_SCREEN_WILDERNESS_WET: "[root.GetHomeWorldName]はそれをまばゆく、 焼けつくような光だと感じた。 湖は沸騰し、 氷床は溶け、 恒星放射線は[root.GetHomeWorldName]を根こそぎ焼き払った。 大陸全体が失われた。"
 START_SCREEN_WILDERNESS_OUTRO: "痛みで覚醒した。 我々は初めて、 自分たちの弱さを理解した。 銀河は危険だが、 驚異も秘めている。 学んだことを活かし、 我々は発芽し、 広がっていく。 星々へと向かうのだ。"
 ####################################
 # Authorities
 ####################################
 auth_mutualistic_intelligence: "共生的知識"
 auth_mutualistic_intelligence_plural: "共生的知識"
 auth_mutualistic_intelligence_desc: "$auth_mutualistic_intelligence_plural$が惑星規模の分散型意識として浮上する。 それらはさまざまな生物から共生種が引き出されたもので、 すべてが環境の集合的な意思に従って行動している。\n\n一部の共生体は、 専門的な作業においては半自律的に活動することもあるが、 ほとんどの共生体は共生環境との定期的な接触に依存している。 孤立した場合、 野生の本能的な行動に戻り、 最終的に死滅する。"
 tt_auth_mutualistic_intelligence: "統治形態が§Y$auth_mutualistic_intelligence$§! (§Y$auth_hive_mind$§!) である"
 gov_wilderness: "$gov_hive_mind$"
 gov_wilderness_desc: "この政府は単一の意識として活動し、 人民は$RT_WILDERNESS$の要求と欲求を満たすこと以外には個人的な意思決定権を持たない。"
 RT_WILDERNESS: "ウィルダネス"
 RT_WILDERNESS_FEMALE: "$RT_WILDERNESS$"
 ####################################
 # Buildings
 ####################################
 building_colony_shelter_wilderness: "惑星触手"
 building_colony_shelter_wilderness_desc: "多細胞生物がこの惑星の辺境全体に広がり、 ウィルダネスの安定した存在を確保している。"
 building_capital_wilderness: "惑星ルートバンドル"
 building_capital_wilderness_desc: "広大な、 活気のある単純な生物の集まりが、 運動性共生生物と調和し、 その協調性と生産性を向上させる。"
 building_major_capital_wilderness: "惑星ルートコンプレックス"
 building_major_capital_wilderness_desc: "共生体が生活し、 働き、 繁殖できるほど十分に密集した、 高密度の生きた塊。"
 building_system_capital_wilderness: "惑星ルートネクサス"
 building_system_capital_wilderness_desc: "多様な生命体が協調し合う巨大な共同体。 その広大さは、 独自の理想的な微気候を作り出す。"
 requires_building_wilderness_capital: "§R惑星に§Y$building_capital_wilderness$§!が必要。§!"
 requires_building_wilderness_major_capital: "§R惑星に§Y$building_major_capital_wilderness$§!が必要。§!"
 requires_building_wilderness_system_capital: "§R惑星に§Y$building_system_capital_wilderness$§!が必要。§!"
 building_imperial_capital_wilderness: "帝国複合施設"
 building_imperial_capital_wilderness_desc: "この巨大で複雑な構造物から、 ウィルダネスは銀河帝国を統治している。 つまり、 ここで銀河の運命のすべてが定められる。"
 building_tendril_cradle_1: "触手のゆりかご"
 building_tendril_cradle_1_desc: "この場所からは根付いた短い糸が延びており、 近くにある重要器官へ素材を引き寄せている。"
 building_tendril_cradle_2: "張られた糸"
 building_tendril_cradle_2_desc: "長く伸びた触手が周辺風景に横たわり、 隣接する広大な土地から資源を引き込み、 処理および分配している。"
 building_tendril_cradle_3: "コンベイルートの巣"
 building_tendril_cradle_3_desc: "編みこまれた根は地表の下で、 脈動しうごめく。 遠隔地の生物拠点へ向けて、 幾重にも重なった回廊を使ってバイオマスを輸送しているのだ。"
 building_tendril_cradle_4: "惑星の紡がれた心臓"
 building_tendril_cradle_4_desc: "惑星の天体全体で、 巨大な輸送用の触手が放射状に伸びており、 飽くなき同期性でウィルダネスの資源を送り出している。"
 planet_research_buildings: "惑星研究施設"
 mod_planet_research_buildings_upkeep_mult: "$planet_research_buildings$維持費"
 building_brain_node_1: "研究の茂み"
 building_brain_node_1_desc: "遊び心のある探検的な共生体の活動は、 一般的な研究の基礎となる。"
 mod_planet_building_brain_node_1_build_speed_mult: "$building_brain_node_1$建造速度"
 building_brain_node_2: "研究の森"
 building_brain_node_2_desc: "好奇心をかき立てる行動を促進し、 より高度な遺物や現象の研究を容易にすることを目的とした軌道上居住地。"
 mod_planet_building_brain_node_2_build_speed_mult: "$building_brain_node_2$建造速度"
 building_brain_node_3: "囲われたエキゾチック研究施設"
 building_brain_node_3_desc: "この広大な囲われた施設では、 極限環境生物の共生体があらゆる種類のエキゾチックで危険な物質を試すことができる。"
 mod_planet_building_brain_node_3_build_speed_mult: "$building_brain_node_3$建造速度"
 building_brain_node_4: "囲われた先進研究施設"
 building_brain_node_4_desc: "エキゾチックなテクノロジーと広大な共生体により育まれた囲いの融合により、 さまざまなサンドボックス環境における最先端の研究が促進される。"
 mod_planet_building_brain_node_4_build_speed_mult: "$building_brain_node_4$建造速度"
 building_commensal_clearing_1: "共生の空き地"
 building_commensal_clearing_1_desc: "これら静寂の地では、 あらゆる種類の生物がウィルダネスの中で集まり、 休息し、 立ち直ることを可能にする。"
 building_commensal_clearing_2: "共生の森"
 building_commensal_clearing_2_desc: "共生体の大規模な集まりに理想的な、 保護された場所。 ここでは交流を通して分散した自己についてのさらなる理解をもたらす。"
 building_commensal_clearing_3: "共生の谷"
 building_commensal_clearing_3_desc: "共生体の密集した多様なコミュニティが、 これらの手つかずの地形を移動し、 互いのつながりを強めている。"
 building_commensal_clearing_4: "共生の生態系"
 building_commensal_clearing_4_desc: "広大な相互につながった軌道上居住地では、 数えきれないほどの遭遇が繰り広げられ、 その一つひとつが相互依存の結束の重要なきっかけとなっている。"
 building_massive_growth_1: "栄養豊かな窪地"
 building_massive_growth_1_desc: "小規模な地質加工は、 年間を通して安定した作物の生育に理想的な微気候をもたらす。"
 building_massive_growth_2: "栄養豊かな低木"
 building_massive_growth_2_desc: "広大な半透過性のキャノピーが、 低木に栄養豊かな食物を常に生産するために必要な環境的保護をすべて与えている。"
 building_massive_growth_3: "大規模農園"
 building_massive_growth_3_desc: "半水棲の微生物や動物にとっての楽園である広大なテラスは、 豊富なタンパク質や穀物を供給している。"
 building_massive_growth_4: "造林農園"
 building_massive_growth_4_desc: "葉の茂った大型植物に覆われた低木の配置により、 食物網全体に食料作物を十分に供給できる。"
 building_bioelectric_stimulator_1: "葉緑体アクリメーター"
 building_bioelectric_stimulator_1_desc: "レンズのような泡の塊が豊富な藻類を含んだ水を通して太陽の光を集め、 そのエネルギーを変換して蓄え、 後で使用できるようにする。"
 building_bioelectric_stimulator_2: "葉緑体アクセラレーター"
 building_bioelectric_stimulator_2_desc: "光合成を行う藻類が詰まったガラス状の泡が太陽エネルギーを利用して、 より強固な生化学結合を形成し、 自己放電を低減する。"
 building_bioelectric_stimulator_3: "葉緑体レンズアレイ"
 building_bioelectric_stimulator_3_desc: "太陽光を集める重り付きの枝が需要と容量に応じて上下し、 多用途で信頼性の高い電力拠点となる。"
 building_bioelectric_stimulator_4: "葉緑体嚢胞"
 building_bioelectric_stimulator_4_desc: "これらのガラス状の藻類で満たされた嚢は、 エネルギーが最も必要とされる場所に移動し、 増殖することができ、 距離による電力損失をほぼ排除する。"
 building_churning_tunnels_1: "岩石ドリル"
 building_churning_tunnels_1_desc: "結晶に近い硬度を持つ植物物質が既存の採掘場所の周辺に押し込まれ、 さらに多くの有益な鉱物が抽出される。"
 building_churning_tunnels_2: "岩石フィルター"
 building_churning_tunnels_2_desc: "半透性のバイオフィルム群が液体鉱業の操業からの流出で失われてしまう貴重な鉱物を集める。"
 building_churning_tunnels_3: "岩石粉砕機"
 building_churning_tunnels_3_desc: "強力な粉砕プレートとピンセットは、 土壌を化学スラリーにし、 鉱物の抽出を容易にする。"
 building_churning_tunnels_4: "岩石バス"
 building_churning_tunnels_4_desc: "粉砕機、 生化学剤、 バイオフィルムの集合により、 鉱脈が豊富な場所であればどこでも、 その場で鉱物の抽出が可能になる。"
 building_natural_furnace_0: "精錬プール"
 building_natural_furnace_0_desc: "好熱性共生体は、 この天然の熱源の周辺で高品質の合金を生産するために休むことなく働いている。"
 building_natural_furnace_1: "製錬炉"
 building_natural_furnace_1_desc: "耐熱性の成長により熱をより効率的に利用でき、 その結果、 優れた合金の生産が可能になる。"
 building_natural_furnace_2: "固形光製錬炉"
 building_natural_furnace_2_desc: "ホログラム技術を応用した高度な岩石有機炉により、 非常に汎用性の高い合金の製造が可能になる。"
 building_natural_furnace_3: "ナノ精錬炉"
 building_natural_furnace_3_desc: "好熱性ナノ微生物はこれらの灼熱の炉や窯に生息し、 合金から不要な不純物を除去する。"
 building_avatar_chamber_1: "アバターのゆりかご"
 building_avatar_chamber_1_desc: "ウィルダネスが基本形を獲得しはじめる発芽用器官。 見知らぬ世界と本来の生物圏とは異なる地形で生きるべく、 直感を養っていく。"
 building_avatar_chamber_2: "アバターの間"
 building_avatar_chamber_2_desc: "仮想された体が生育され、 外的生物や他の生態系を模した内部の試練を受ける。 未知を体現することで知識を拡散させるのである。"
 building_avatar_chamber_2_effect: "$building_avatar_chamber_1$が£amenities£ 快適度を追加で§G+200§!産出する"
 building_avatar_chamber_3: "アバターの森"
 building_avatar_chamber_3_desc: "広範囲に横たわるこの器官は、異種族の形状や地形を元にアバターテンプレートを発信する。 ウィルダネスは触れたこともない記憶を過ごすことで学ぶのである。"
 building_avatar_chamber_3_effect: "$building_avatar_chamber_1$が£amenities£ 快適度を追加で§G+400§!産出する"
 building_avatar_chamber_4: "アバターの皮質"
 building_avatar_chamber_4_desc: "文明、 異種族の生態系、 さらには極限的環境すらシミュレートすることができる惑星規模の体現化エンジン。 ウィルダネスはここで銀河との出会いのリハーサルを行なっている。"
 building_avatar_chamber_4_effect: "$building_avatar_chamber_1$が£amenities£ 快適度を追加で§G+800§!産出する"
 building_mote_aggravator: "化学消化槽"
 building_mote_aggravator_desc: "日常的な土壌から、 血管組織と化学代謝の優雅なシステムが$volatile_motes$を生成する。"
 building_churning_stomach: "エキゾチックガスフィルター"
 building_churning_stomach_desc: "高度に特化した微生物やナノ生物が、 ありふれたエアロゾルと反応して、 洗練された$exotic_gases$を生成する。"
 building_crystal_growth: "結晶苗床"
 building_crystal_growth_desc: "特別な天蓋が、 正確で人工的な$rare_crystals$の栽培に必要な正確な湿度と温度の制御を容易にする。"
 building_planetary_carapace: "骨の守備隊"
 building_planetary_carapace_desc: "この隔離された訓練場には、 必要とされる場合に備えて、 縄張り意識の強い共生体が保管されている。"
 mod_planet_building_planetary_carapace_build_speed_mult: "$building_planetary_carapace$建造速度"
 building_planetary_carapace_2: "骨の要塞"
 building_planetary_carapace_2_desc: "広大なこの施設には過酷な訓練場と宿泊施設があり、 収容されている防衛隊員は惑星への侵攻に備えている。"
 building_ozone_thickener: "惑星シールドキャノピー"
 building_ozone_thickener_desc: "$tech_planetary_shield_generator_desc$"
 building_subterranean_cache: "地底貯蔵庫"
 building_subterranean_cache_desc: "$building_resource_silo_desc$"
 building_cradle_of_rebirth: "再誕のゆりかご"
 building_cradle_of_rebirth_desc: "朽ちる物質と捕獲した獲物を代謝してバイオマスに変える、 地中深くに根付いた構造体。 音無き鼓動に合わせ、 世界の体に栄養を行き渡らせる。"
 building_wilderness_storm_relief: "$building_storm_resistant_production$"
 building_wilderness_storm_relief_desc: "硬化し、 生体電気を帯びた葉の広大なキャノピーは、 その近辺の共生生物の安全を確保し、 生命や生産性を危険にさらすことなく、 宇宙嵐の活動に迅速に対応することを可能にする。"
 building_wilderness_storm_relief_tt: "惑星産出物に対する§Y$default_storm$§!のマイナス効果が§G25%§!減少する"
 holding_wilderness_glade: "ウィルダネスの草原"
 holding_wilderness_glade_plural: "ウィルダネスの草原"
 holding_wilderness_glade_desc: "母体となる集合意識が緩やかに結びついた、 生産性の高い共生ウィルダネス地域。 この小型生態系に生息する共生体は、 現地の食料源に大きく依存しているが、 近隣の他の資源を抽出する能力にも長けている。"
 holding_wilderness_glade_effect_desc: "従属国は宗主国のために[owner.WildernessGladeProvides]を$r_basic_plural$に変える。\n宗主国は従属国の惑星の$mod_planet_jobs_productive_upkeep_mult$を減少させる。\n£blocker£ §Y$holding_wilderness_glade$§!が惑星に出現し、 区域枠を使用する。"
 no_free_district_for_wilderness_glade: "$TRIGGER_FAIL$§Rこの惑星に、 小型生態系を置ける自由区域はない。§!"
 blocker_tied_to_wilderness_glade: "$TRIGGER_FAIL$§Rこの惑星に保有施設§Y$holding_wilderness_glade$§!が存在する限り、 この障害物は存在しつづける。§!"
 d_wilderness_glade_blocker: "$d_wilderness_root_blocker$"
 d_wilderness_glade_blocker_desc: "近くの$holding_wilderness_glade$を支えるために、 大きな根の構造が必要であり、 この小型生態系が我々の異質な環境で生き残ることを可能にする。"
 holding_wilderness_glade_modifier: "分配されたウィルダネスの草原"
 holding_wilderness_glade_modifier_desc: "従属国の惑星が我々の惑星と調和し、 相互に利益を分かち合う。" # appears in 'lore brown'
 holding_wilderness_glade_modifier_tt: "§Y$holding_wilderness_glade_plural$§!をもつ従属国の惑星数によって量が異なる。"
 ####################################
