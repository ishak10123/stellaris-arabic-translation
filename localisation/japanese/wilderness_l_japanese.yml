 ####################################
 district_craglands: "共同生態系"
 district_craglands_plural: "共同生態系"
 district_craglands_desc: "これらの豊かな林は、 ウィルダネスを形成すると同時にウィルダネスに依存する共生体が住む場所となっている。"
 mod_district_craglands_max_add: "最大$district_craglands_plural$"
 mod_planet_district_craglands_build_speed_mult: "$district_craglands$建造速度"
 district_orchard_forests: "果樹の森"
 district_orchard_forests_plural: "果樹の森"
 district_orchard_forests_desc: "栽培と狩猟のために確保された地域で、 細胞培養による食料から食用穀物、 捕食共生体まで、 あらゆるものを栽培している。"
 mod_district_orchard_forests_max_add: "最大$district_orchard_forests_plural$"
 mod_planet_district_orchard_forests_build_speed_mult: "$district_orchard_forests$建造速度"
