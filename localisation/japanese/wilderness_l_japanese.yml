 grubsymbiont: "$job_grubsymbiont$"
 job_grubsymbiont: "地中共生体"
 job_grubsymbiont_plural: "地中共生体"
 job_grubsymbiont_plural_with_icon: "£job_grubsymbiont£ $job_grubsymbiont_plural$"
 job_grubsymbiont_desc: "視覚がなく柔らかな体を持つ共生体。 振動によって穴を掘り進め、 貴金属の共鳴音にのみ引き寄せられる。"
 job_grubsymbiont_effect_desc: "£job_grubsymbiont£ $job_grubsymbiont_plural$は£minerals£ §Y$minerals$§!を産出する"
 mod_job_grubsymbiont_add: "$job_grubsymbiont$の職業枠"
