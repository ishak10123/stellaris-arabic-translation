 mod_job_grubsymbiont_pop_short: "\n$VALUE$ £pop£につき£mod_job_grubsymbiontt_add£§G+1§!"
 choirsymbiont: "$job_choirsymbiont$"
 job_choirsymbiont: "合唱共生体"
 job_choirsymbiont_plural: "合唱共生体"
 job_choirsymbiont_with_icon: "£job_choirsymbiont£ $job_choirsymbiont$"
 job_choirsymbiont_plural_with_icon: "£job_choirsymbiont£ $job_choirsymbiont_plural$"
 job_choirsymbiont_desc: "合唱共生体は重層的で美しい旋律の声で鳴き、 その声は生物圏全体に響き渡る。 生物圏全体を導き、 高揚させる複雑で生き生きとした音楽を奏でる。"
 job_choirsymbiont_effect_desc: "£job_choirsymbiont£ $job_choirsymbiont_plural$は、 £energy£ §Y$energy$§!と£food£ §Y$food$§! (または£minerals£ §Y$minerals$§!) を消費して、 £unity£ §Y$unity$§!を産出する"
 mod_job_choirsymbiont_add: "$job_choirsymbiont$の職業枠"
