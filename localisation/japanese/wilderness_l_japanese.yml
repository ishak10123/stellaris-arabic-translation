 ####################################
 # City Appearance
 ####################################
 WILDERNESS: "ウィルダネス"
 ####################################
 # Deposits
 ####################################
 d_wilderness_mining: "空洞洞窟群"
 d_wilderness_mining_desc: "かつてこの惑星に生息していた生命体は、 坑道を急いで無秩序に放置し、 いくつかのトンネルはむき出しになって崩壊しやすい状態になっていた。"
 d_wilderness_mining_2: "陥没した高原"
 d_wilderness_mining_2_desc: "この危険な地域は、 過去の広範囲にわたる採掘活動に起因する価値のない残土や陥没穴に覆われている。"
 d_wilderness_farming: "乾燥森林"
 d_wilderness_farming_desc: "かつて広大で生産性の高い森林だった場所は、 今では生命のない状態となっている。 枯れ枝はもはや作物を生産することができない。"
 d_wilderness_farming_2: "化石化した森"
 d_wilderness_farming_2_desc: "多様な森林育成が盛んだった広大な地域の跡。 植物や菌類が急速に死滅したため、 その跡は結晶のように見え、 生化学的に不活性である。"
 d_wilderness_generator: "灼けた太陽光発電所"
 d_wilderness_generator_desc: "枯れ果てたキャノピーと脆い茎だけが、 この廃墟となった太陽光発電所に残っている。"
 d_wilderness_generator_2: "太陽の荒地"
 d_wilderness_generator_2_desc: "かつては太陽の森で満ち溢れていたこの広大な地域は、 棘だらけの残骸で占められている。 乾燥し、 軽く照射された葉の物質が大気中の塵として漂っている。"
 d_wilderness_city: "悪臭の沼"
 d_wilderness_city_desc: "かつては多種多様な生命が繁栄していた軌道上居住地も、 今では放置され、 化膿し、 膿み続ける穴となっている。"
 d_wilderness_city_2: "腐敗した沼地"
 d_wilderness_city_2_desc: "さまざまな種類の無数の生命体がここで滅びた。 腐敗した遺骸は風景に染み込み、 刺激臭と腐食性の強い生化学物質を大量に流出している。"
 d_wilderness_industrial: "金属のぬかるみ"
 d_wilderness_industrial_desc: "周囲の地質が崩壊したことによりその中身が有毒で不活性となった、 いくつかの露天鉱泉の跡。"
 d_wilderness_industrial_2: "生化学的荒野"
 d_wilderness_industrial_2_desc: "広大な半有機性鉱物処理施設の跡地には、 石器時代のボウルや化学物質の粉塵で覆われた渓谷が残されている。"
 d_scorched_plains: "灼けた平原"
 d_scorched_plains_desc: "この地域はかつて生命であふれていたが、 恒星のスーパーフレアの爆発によって荒廃した。"
 concept_scorched_plains: "$d_scorched_plains$"
 concept_scorched_plains_desc: "- $MOD_PLANET_MAX_DISTRICTS_ADD$:§R-2§!\n- 除去時間：£time£ 180§I日§!\n- 除去コスト：\n$t$- 900$i_energy$\n\n§L$d_scorched_plains_desc$§!"
 ####################################
 # Colony Types
 ####################################
 col_wilderness_default: "ウィルダネス植民地"
 ####################################
 # Planet Designations
 ####################################
 col_wilderness_capital: "心惑星"
 col_wilderness_capital_tt: "$col_wilderness_capital_desc$"
 col_wilderness_capital_desc: "この惑星のあらゆる側面で、 共生する生命が蠢いている。 それらは膨大な数にのぼり、 一つの生命体としての生きた天体となっている。"
 col_wilderness_generator: "光合成惑星"
 col_wilderness_generator_desc: "$col_generator_desc$"
 col_wilderness_generator_tt: "この惑星には、 無数の葉緑体共生生物の群れが集まり、 エネルギーを蓄積している。"
 col_wilderness_mining: "岩石惑星"
 col_wilderness_mining_desc: "$col_mining_desc$"
 col_wilderness_mining_tt: "この惑星の表面上不毛に見える地中には、 地底生命体が集まり、 鉱物資源を熱心に採掘している。"
 col_wilderness_farming: "受粉惑星"
 col_wilderness_farming_desc: "$col_farming_desc$"
 col_wilderness_farming_tt: "この惑星全体で、 特殊な共生体が理想的な生育条件を維持し、 栄養価の高い動植物の豊富な供給を促している。"
 col_wilderness_fortress: "ハンター惑星"
 col_wilderness_fortress_desc: "$col_fortress_desc$"
 col_wilderness_fortress_tt: "この惑星の表面では、 縄張り意識の強い群れが駆け巡り、 恐ろしい捕食者の咆哮が響き渡っている。"
 col_wilderness_tech: "思索惑星"
 col_wilderness_tech_desc: "$col_research_desc$"
 col_wilderness_tech_tt: "この活気あふれる惑星には、 好奇心をそそるものや奇妙な現象が散らばっており、 鋭い洞察力と探究心を持つ者の遊び場となっている。"
 col_wilderness_nest: "ウィーヴァー惑星"
 col_wilderness_nest_desc: "$col_city_desc$"
 col_wilderness_nest_tt: "共生する生命体の宝庫。ウィルダネスの必要性や気分に応じて大気自体の組成をも変化する。"
 col_wilderness_refinery: "精製惑星"
 col_wilderness_refinery_desc: "£exotic_gases£ §H$exotic_gases$§!やその他の£strategic_resource£ §H戦略資源§!の生産に特化する。"
 col_wilderness_refinery_tt: "この惑星には地熱噴出孔が点在しており、 そこには多数のナノ生物やその他の異質な共生体が集まり、 原材料を加工している。"
 col_wilderness_forge: "修練惑星"
 col_wilderness_forge_desc: "$col_foundry_desc$"
 col_wilderness_forge_tt: "惑星規模のるつぼ。未加工の鉱物を効果的かつ多用途な合金に加工する。"
 col_wilderness_unification: "静寂な惑星"
 col_wilderness_unification_desc: "$col_bureau_desc$"
 col_wilderness_unification_tt: "この惑星には、 ゆったりとした相互依存の雰囲気が漂い、 共生体たちの複雑な関係を深めている。"
 ####################################
 # Personalities
 ####################################
 personality_benevolent_wilderness: "調和的ウィルダネス"
 personality_benevolent_wilderness_desc: "この広大で知的な生物圏は、 星々とのつながりを求めている。 彼らの根は、 飢えではなく調和を求めて、 銀河を越えて辛抱強く伸びている。"
 personality_rampant_wilderness: "蔓延るウィルダネス"
 personality_rampant_wilderness_desc: "蔓延るウィルダネスは荒れ狂うのではなく、 広がり、 喰らい、 耐える。 生きているものも死んでいるものも、 すべては成長と腐敗の終わることのない循環の中に取り入れられる。"
 ####################################
 # Policies
 ####################################
 policy_symbiont_policy: "$policy_drone_policy$"
 policy_symbiont_policy_desc: "我々の共同体は、 非常に有能で生産的だが、 無限ではない。 資源をどのように、 どこで最も有効に活用するかを決めなければならない。"
 symbiont_policy_balanced: "$drone_policy_balanced$"
 symbiont_policy_balanced_name: "$symbiont_policy_balanced$"
 symbiont_policy_balanced_desc: "ウィルダネスは原材料と加工品の両方に同等の能力を割く。\n\n§E資源産出にボーナスやペナルティなし。§!"
 symbiont_policy_worker: "$drone_policy_worker$"
 symbiont_policy_worker_name: "$symbiont_policy_worker$"
 symbiont_policy_worker_desc: "ウィルダネスは原材料の抽出を優先し、 関連共生体は、 より専門化された製造を犠牲にして生産性を高めることになる。\n\n"
 symbiont_policy_thinker: "$drone_policy_thinker$"
 symbiont_policy_thinker_name: "$symbiont_policy_thinker$"
 symbiont_policy_thinker_desc: "ウィルダネスは完成品の製造を優先し、 原材料の抽出を犠牲にして生産性を高める。\n\n"
 ####################################
 # Edicts
 ####################################
 edict_capacity_subsidies_wilderness: "$edict_capacity_subsidies$"
 edict_capacity_subsidies_wilderness_desc: "この布告は光合成を行う共生体が、 太陽を追って地表を移動する群れを形成し、 エネルギー生産量を増やすことを促す。"
 edict_mining_subsidies_wilderness: "$edict_mining_subsidies$"
 edict_mining_subsidies_wilderness_desc: "この布告は根を強化し、 地中に潜る共生体が構造崩壊のリスクを低減しながら掘ることを可能にする。"
 edict_farming_subsidies_wilderness: "$edict_farming_subsidies$"
 edict_farming_subsidies_wilderness_desc: "この布告は我々の栄養生産量を増やすために、 土壌に含まれる高エネルギー化学物質を積極的に希釈することを規定している。"
 edict_forge_subsidies_wilderness: "$edict_forge_subsidies$"
 edict_forge_subsidies_wilderness_desc: "無機栄養性藻類のプールに栄養分を十分に供給することで、 季節ごとの開花と合金副産物の収穫量の増加が可能になる。"
 edict_research_subsidies_wilderness: "$edict_research_subsidies$"
 edict_research_subsidies_wilderness_desc: "$edict_research_subsidies_desc$"
 edict_clearing_motes_wilderness: "$edict_clearing_motes$"
 edict_clearing_motes_wilderness_desc: "共生体の食事に揮発性粉末を補うことで、 有機物と無機物の両方を消化できるようになる。 ホロバイオントは、 それを食べることで我々の環境に適応していく。"
 edict_learning_campaign_wilderness: "$edict_learning_campaign$"
 edict_learning_campaign_wilderness_desc: "共生体に栄養を追加投与することにより、 生産性を向上させる。"
 edict_war_drone_campaign_wilderness: "戦闘共生体強化運動"
 edict_war_drone_campaign_wilderness_desc: "捕食者と群れの共生体に栄養を追加投与することにより、 戦闘能力を向上させる。"
 edict_scientific_revolution_wilderness: "$edict_scientific_revolution$"
 edict_scientific_revolution_wilderness_desc: "$edict_scientific_revolution_desc$"
 edict_drone_overdrive_wilderness: "共生体の酷使"
 edict_drone_overdrive_wilderness_desc: "より多くの資源が必要とされているため、 我々の生態系での競争はより激しくなるだろう。"
