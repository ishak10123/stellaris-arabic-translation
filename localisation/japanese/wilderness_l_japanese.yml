 ####################################
 # Traditions
 ####################################
 tr_adaptability_appropriation_wilderness: "割り当て"
 tr_adaptability_appropriation_wilderness_delayed: "利用されていない生態系は、 我々の帝国に全く貢献していない。 [GetIndividualNamePluralCap]たちは最も必要とされる惑星に、 効率的な方法で再配置されなくてはならない。"
 tr_discovery_faith_in_science_wilderness: "菌糸体ネットワーク"
 tr_discovery_faith_in_science_wilderness_delayed: "相互につながっている菌類ベースのネットワークにおけるすべての[GetIndividualNamePlural]の自然な好奇心を利用することで、 はるかに効率的な発見が可能になる。"
 tr_domination_wilderness_network: "マクロ代謝加速"
 tr_domination_wilderness_network_delayed: "大陸規模でエネルギー交換の速度を上げることにより、 我々の各部分がお互いに提供できる支援の量が大幅に改善される。"
 tr_domination_wilderness_network_effect: "§Y布告をアンロック：§!$edict_drone_overdrive_wilderness$"
 tr_domination_imperious_architecture_wilderness: "種族間フェロモン互換性"
 tr_domination_imperious_architecture_wilderness_desc: "§Y$district_craglands_plural$§!が追加で£defense_army£ §Y$defense_army_plural$§!を提供する：§G+1§!"
 tr_domination_imperious_architecture_wilderness_delayed: "すべての[GetIndividualNamePlural]間のフェロモンコミュニケーションを強制することで、 外部からの脅威に対する迅速な対応が可能になる。"
 tr_expansion_colonization_fever_wilderness: "複数の世界の精神"
 tr_expansion_colonization_fever_wilderness_desc: "新しい惑星を植民地化する際に、 ランダムな§Y£district£ 区域§!を追加する。"
 tr_expansion_colonization_fever_wilderness_delayed: "[GetGestaltEntityName]とは、 宇宙の冷たい虚空ですら黙らせることのできない、 思考の合唱なのだ。"
 tr_expansion_a_new_life_wilderness: "急成長"
 tr_expansion_a_new_life_wilderness_delayed: "[GetGestaltEntityName]は問題の解決策を育て上げる。"
 tr_expansion_courier_network_wilderness: "$tr_expansion_courier_network_hive$"
 tr_expansion_courier_network_wilderness_delayed: "各生態系を大きな全体の中のより小さな一部として扱うことで、 惑星の意識への完全な注意を必要とせずに、 的を絞ったコミュニケーションが可能になる。"
 tr_expansion_galactic_ambition_wilderness: "$tr_expansion_galactic_ambition_hive$"
 tr_expansion_galactic_ambition_wilderness_delayed: "我々の揺りかごを離れ、 暗闇の世界へと旅立つ触手には純粋な恐怖が伴った。 だが、 この恐怖を克服して繁殖することによってのみ、 我々は成長を続けられる。 何百万という[GetIndividualNamePlural]の死によって、 [GetGestaltEntityName]は生かされつづけるだろう。"
 tr_prosperity_pursuit_of_profit_wilderness: "惑星液体輸送"
 tr_prosperity_pursuit_of_profit_wilderness_delayed: "大陸をまたぐ輸送血管は、 必要としている生態系を補うために栄養と重要な構成材料を輸送する。"
 tr_prosperity_public_works_wilderness: "地底巣穴"
 tr_prosperity_public_works_wilderness_desc: "すべての£district£ §Y区域§!が£housing£ §Y$MOD_PLANET_HOUSING_ADD$§!を追加で§G+50§!提供する"
 tr_prosperity_public_works_wilderness_delayed: "[GetIndividualNamePlural]が地殻層に浸透し、 巣を蝋構造で補うことで、 より多くの個体を収容できるようになる。"
 tr_synchronicity_kinship_wilderness: "概日リズムの同調"
 tr_synchronicity_kinship_wilderness_delayed: "[GetIndividualNamePlural]の休息サイクルを正確に制御することで、 栄養素の再配分が自然に惑星全体に発生するスケジュールが作成される。"
 ####################################
 # Ascension Perks
 ####################################
 ap_mastery_of_nature_wilderness: "$ap_mastery_of_nature$"
 ap_mastery_of_nature_wilderness_desc: "我々は、 食べる者であり、 食べられる者でもある。 最小の細胞から最も高い木々まで、 この原則に従って生きている。 我々は自然である。"
 ap_engineered_evolution_wilderness: "$ap_engineered_evolution$"
 ap_engineered_evolution_wilderness_desc: "我々の意識は環境の試練を乗り越えるために進化した。 環境は変化し、 我々も変化する。"
 engineered_evolution_wilderness_tt: "- §Y$genetic_ascension_situation$の状況§!を開始する。 この状況は['tradition_category:tradition_purity']の伝統ツリーをアンロックする。$TABBED_NEW_LINE$- $REQUIRES_TRADITION_SLOT$\n- $UNLOCKS_AGENDA$§Y$council_agenda_agenda_engineered_evolution_name$§!。 これにより遺伝子改変が研究選択肢として付与される"
 ############
 # Espionage
 ############
 operation_embed_planetary_roots: "惑星の根の埋め込み" # literal roots, as in plantlife
 operation_embed_planetary_roots_desc: "今は情報を集める[owner.GetIndividualNamePlural]を必要とする重要な任務がほかにあるが、 標的の惑星の一つに半覚醒状態のマイクロバイオームを植え付けることで、 将来の作戦のために諜報網の大部分を保持し、 彼らの食料供給網を乱すことさえできるかもしれない。" # the Wilderness embeds a part of itself, hence 'microbiome'
 operation_embed_planetary_roots_on_success: "$operation_sleeper_cells_on_success$"
 espionage_planetary_roots: "惑星の根"
 espionage_planetary_roots_desc: "この帝国の情勢を知らせてくれる半覚醒状態のマイクロバイオームを組み込んでいる。 これらの原始的な共生体は我々の情報収集[owner.GetIndividualNamePlural]をいつでもサポートする準備ができている。"
 operation_embed_planetary_roots_requires_blocker: "$TRIGGER_FAIL$§R$espionage_planetary_roots$は目標惑星の1つに['concept_natural_blocker']を必要としている。§!"
 operation_embed_planetary_roots_dont_stack_this: "$TRIGGER_FAIL$§Rすでに[target.GetName]に$espionage_planetary_roots$を埋め込んだ。 それによる利益は§Y[planet_roots_success]§!まで続く。§!"
 operation_embed_planetary_roots_not_cleared: "$TRIGGER_FAIL$§R[target.GetName]内のどこかで、 まだ$espionage_planetary_roots$の存在を感じ取ることができる。§!"
 d_wilderness_root_blocker: "外来森林"
 d_wilderness_root_blocker_desc: "半知性の外来のウィルダネスが、 辺境地に根付いている。"
 wilderness.4500.name: "荒野をかき分ける"
 wilderness.4500.desc: "半自律的な[owner.GetOperativesLowerPlural]が、 我々のユニークなマイクロバイオームに適した複数の場所を特定した。 今後しばらくの間これらの軌道上居住地を監視し、 長期的な成功の可能性が最も高いものを優先する。"
 wilderness.4505.name: "候補地の特定"
 wilderness.4505.desc: "我々は何も知らない[target.GetSpeciesAdj]の協力を得た。 自然保護という義務的な行為にこれから参加しようと思っているらしい。 実際、 彼らは我々の「シードボム」マイクロバイオームを§H[roots_planet.GetPlanetMoon][roots_planet.GetName]§!の後背地に届ける準備ができているのだ。\n\n内包されている共生体は短命であり、 決して自己の完全な拡張にはならないかもしれないが、 我々は、, 可能な限りこの異国の風景に浸透し観察しようとする彼らの意欲を感じている。"
 wilderness.4510.name: "$espionage_planetary_roots$の埋め込み"
 wilderness.4510.desc: "マイクロバイオームが[GetRootsBlockerName]に届けられた瞬間から、 我々はその禁断の空気を吸い込み始め、 §H[roots_planet.GetName]§!と呼ばれる惑星を認識し始めた。\n\n共生体が我々のより広い自己から断絶されたままである限り、 我々の存在は希薄なままである。 しかし、 [target.GetAdj]空間での活動を再開する時が来れば、 彼らは我々にとって有益な存在となるだろう。"
 wilderness.4510.a: "より深く、 長い根を張らなければ。"
 wilderness.4510.b: "ここで我々の根を成長させよう。"
 ####################################
 # Technologies
 ####################################
 tech_wilderness_terraform: "惑星上発芽"
 tech_wilderness_terraform_desc: "新しい惑星に根を張るためには、 まず苗床を用意する必要がある。 初めに惑星をテラフォーミングすることで、 植民地が順調なスタートを切れるようにするのだ。"
 tech_terrestrial_sculpting_wilderness: "$tech_terrestrial_sculpting$"
 tech_terrestrial_sculpting_wilderness_desc: "$tech_terrestrial_sculpting_desc$"
 tech_terrestrial_sculpting_wilderness_effect: "§H機能をアンロック：§!すべての標準惑星種類のテラフォーミングを可能とする。"
 tech_wilderness_node: "存在の中心"
 tech_wilderness_node_desc: "分散した自己の至る所にある草原で深い思考を持つ共生体の成長を促すことで、 集合意識はすべての生物に、 より強く感じられるようになるだろう。"
 tech_wilderness_cluster: "$tech_hive_cluster$"
 tech_wilderness_cluster_desc: "同じ意志を促進することを唯一の目的とする共生体の集いに投資することで、 全体的な集合的思考の流暢性を加速させることができる。"
 tech_wilderness_confluence: "$tech_hive_confluence$"
 tech_wilderness_confluence_desc: "我々の相互主義的な意志は、 深く共感する共生体が集まることで強化されるだろう。 彼らは周囲と調和し、 我々の集合的な思考を集中させ、 再発信する。"
 tech_genome_mapping_wilderness: "$tech_genome_mapping$"
 tech_genome_mapping_wilderness_desc: "我々の無数のDNA系統のゲノムをマッピングすることで、 どのように成長するのかについての理解が深まり、 複雑な要因を排除するのに役立つ。"
 tech_mining_1_wilderness: "$tech_mining_1$"
 tech_mining_1_wilderness_desc: "既存の鉱床に、 粘膜肥厚剤と水圧を適用し、 より深く掘り進めることで、 生産量を増やすことができる。"
 tech_powered_exoskeletons_wilderness: "$tech_powered_exoskeletons$"
 tech_powered_exoskeletons_wilderness_desc: "動力外骨格は装着者の筋力とスピードを増強し、 軍事用途以外に肉体労働の効率も向上させる。"
 tech_colonization_1_wilderness: "新世界構想"
 tech_colonization_1_wilderness_desc: "新しい世界を目覚めさせるために必要な資源と材料を計算することに焦点を当て、 開拓者共生体の星々を越えての困難な航海に備える。"
 tech_wilderness_government: "$tech_planetary_government$"
 tech_wilderness_government_desc: "新しい惑星が目覚めた瞬間から、 その優先事項は、 より広い自己への関心よりも安定した繁栄する環境の確立に置かれるべきである。"
 tech_wilderness_colonial_centralization: "$tech_colonial_centralization$"
 tech_wilderness_colonial_centralization_desc: "$tech_colonial_centralization_desc$"
 tech_wilderness_galactic_administration: "$tech_galactic_administration$"
