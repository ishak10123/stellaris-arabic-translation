 #mod_planet_district_metallic_dew_plains_build_speed_mult: "$district_metallic_dew_plains$ Build Speed"
 district_photosynthesis_fields: "光合成フィールド"
 district_photosynthesis_fields_plural: "光合成フィールド"
 district_photosynthesis_fields_desc: "光合成を行う葉状体が、 この広大なエネルギー収集地域の骨格を形成している。"
 mod_district_photosynthesis_fields_max_add: "最大$district_photosynthesis_fields_plural$"
 mod_planet_district_photosynthesis_fields_build_speed_mult: "$district_photosynthesis_fields$建造速度"
 district_photosynthesis_fields_uncapped: "$district_photosynthesis_fields$"
 district_photosynthesis_fields_uncapped_plural: "$district_photosynthesis_fields_plural$"
 district_photosynthesis_fields_uncapped_desc: "$district_photosynthesis_fields_desc$"
 mod_district_photosynthesis_fields_uncapped_max: "最大$district_photosynthesis_fields_plural$"
 mod_planet_district_photosynthesis_fields_uncapped_build_speed_mult: "$mod_planet_district_photosynthesis_fields_build_speed_mult$"
 district_hollow_mountains: "空洞の山"
 district_hollow_mountains_plural: "空洞の山"
 district_hollow_mountains_desc: "この岩だらけの地形には、 貴重な鉱物を求めてたくましい共生生物が掘った鉱山が点在している。"
 mod_district_hollow_mountains_max_add: "最大$district_hollow_mountains_plural$"
 mod_planet_district_hollow_mountains_build_speed_mult: "$district_hollow_mountains$建造速度"
 district_hollow_mountains_uncapped: "$district_hollow_mountains$"
 district_hollow_mountains_uncapped_plural: "$district_hollow_mountains_plural$"
 district_hollow_mountains_uncapped_desc: "$district_hollow_mountains_desc$"
 mod_district_hollow_mountains_uncapped_max: "$mod_district_hollow_mountains_max_add$"
 mod_planet_district_hollow_mountains_uncapped_build_speed_mult: "$mod_planet_district_hollow_mountains_build_speed_mult$"
 ####################################
 # Zones
 ####################################
 zone_urban_wilderness: "心の木立"
 zone_urban_wilderness_desc: "脈動するバイオマスと直感のコア。 拡がりつづけ、 形を変えるウィルダネスの根は広く、 深く張り、 新たに出現する機能の補助にいつでも回ることができる。"
 zone_foundry_wilderness: "煮えたぎる腹"
 zone_foundry_wilderness_desc: "熱に満ちた部屋が溶けた石と自然の力で混ざっていく。 $job_forgesymbiont_plural$は消化するかのようなリズムで金属を形作り、 世界の成長する骨格に栄養を与えていく。"
 zone_research_wilderness: "考える茎"
 zone_research_wilderness_desc: "神経根と変異花の上位ノード。 $job_evosymbiont_plural$は新たな手足、 新たな感覚、 そして新たな理解を携えて、 ここより出現した。"
 zone_unity_wilderness: "歌う崖"
 zone_unity_wilderness_desc: "空洞の骨と石の皮が点在する巨大地形。 風が重ねた音を地表に沿って運んでいく場所。 ここには$job_choirsymbiont_plural$が集まり、 世界そのものに歌を唄わせるのだ。"
 zone_fortress_wilderness: "指示する球根"
 zone_fortress_wilderness_desc: "$job_tamersymbiont_plural$が集まる、 膨張した感覚ノード。 準知的生命体の群れを集め、 動かすために芳香パルスを放つ。 ウィルダネスは命じるのではなく、 放出するのである。"
 zone_minerals_wilderness: "鉱石の背骨"
 zone_minerals_wilderness_desc: "そびえ立つ、 隆起した石の構造物。 一部は山脈、 また一部は器官いう存在である。 その広大な骨格の内部には鉱物が蓄積し、 ウィルダネスのゆっくりとした呼吸と共に脈打っている。"
 zone_energy_wilderness: "太陽光菌性肺"
 zone_energy_wilderness_desc: "光合成組織が延々と広がるフィールドは、 日光を吸収して膨張し、 圧力を高め、 やがてリズムのある一連の爆発として息を吐き出す。 こうした光り輝く鼓動が空中へと放たれ、 $job_photosymbiont_plural$は熱気流に乗って星々の弧を追いかける。"
 zone_food_wilderness: "花咲く織機"
 zone_food_wilderness_desc: "花びらとフェロモンの芳香に満ちた脳が、 タペストリーに織り込まれる糸のように、 受粉の経路を紡ぎ出す。 そして地球の肥沃さは、 機械工場のような効率で組織化されている。"
 zone_research_unity_wilderness: "調和の核"
 zone_research_unity_wilderness_desc: "ウィルダネスの中核である鼓動の器官。 知識が記憶と記録を通して響く。 ここでは始まらずとも、 ここで共鳴するものである。"
 zone_trade_wilderness: "糸通す道"
 zone_trade_wilderness_desc: "繊維性のループ、 巻かれた手足、 保管用の袋が合わさり、 常時稼働しつづける分配センターを形作っている。 生活に必要な物は$job_spindlesymbiont_plural$が編み上げては送り出し、 ウィルダネスがこれを可能にしている。"
 ####################################
 # Decisions
 ####################################
 decision_wilderness_expand: "惑星規模の拡張"
 decision_wilderness_expand_desc: "集めて精製したバイオマスを再吸収し、 我々の惑星を成長させる。"
 decision_wilderness_mastery_over_nature_desc: "我々の集合的な自己を広めるため、 必要となる空間を作り出そう。 惑星のあらゆる環境に適応するのだ。"
