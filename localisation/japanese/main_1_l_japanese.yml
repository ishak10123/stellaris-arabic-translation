 stone_age: "石器時代"
 stone_age_desc: "この文明は石器時代の水準にある。 彼らは火の使い方を覚え、 原始的な言語を発明したが、 文字によるコミュニケーションや金属加工技術の証拠はまだ見つかっていない。"
 bronze_age: "青銅器時代"
 bronze_age_desc: "この文明は青銅器時代の水準にある。 原始的な金属加工技術と初期の文字言語が登場し、 都市や大規模な共同体が形成されつつある。"
 iron_age: "鉄器時代"
 iron_age_desc: "この文明は鉄器時代の水準にある。 母星全体に居住範囲が拡がっており、 製錬・鍛造技術を用いて粗野ながら効率的な道具や武器を製作している。"
 late_medieval_age: "中世後期"
 late_medieval_age_desc: "この文明は中世後期に相当する時代を経験している。 彼らの冶金技術は成熟しており、 また印刷機が発明されたことで知識の伝達が始まっている。"
 renaissance_age: "ルネサンス時代"
 renaissance_age_desc: "この文明はルネサンス期に相当する時代を経験している。 科学知識が急速に発達し、 火薬の発明によって戦争の様相が一変した。"
 steam_age: "蒸気時代"
 steam_age_desc: "この文明は蒸気時代に相当する水準にある。 蒸気機関の発明は社会に多大な影響を及ぼし、 今にも産業革命が起ころうとしている。"
 industrial_age: "工業化時代"
 industrial_age_desc: "この文明は初期の工業化時代へと進んでいる。 電気と内燃機関が普及しつつあり、 都市化が急速に進行している。"
 machine_age: "機械化時代"
 machine_age_desc: "この文明は機械化時代へと進んでおり、 後期工業化時代に相当する水準と考えられる。 工場では物資や車両が大量生産され、 空路での移動も一般的になっている。"
 atomic_age: "原子力時代"
 atomic_age_desc: "この文明は原子力時代へと進んでいる。 彼らは原子力を制御できるようになったが、 まだ宇宙空間には到達していない。 おびただしい数の核兵器が製造されており、 突発的な絶滅の危険性をはらんでいる。"
 early_space_age: "初期宇宙時代"
 early_space_age_desc: "この文明は初期宇宙時代に突入した。 初歩的な衛星が打ち上げられ、 低軌道上で初の有人宇宙飛行に成功した。 彼らが外宇宙に進出するのは時間の問題だろう。"
