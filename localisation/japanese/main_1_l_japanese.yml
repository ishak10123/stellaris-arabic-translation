 #Terrain Tiles
 ####################################
 pc_continental_tile: "温暖地域"
 pc_continental_tile_desc: "穏やかな気候と、 多様な森林に満ちた地域。"
 pc_desert_tile: "砂漠地域"
 pc_desert_tile_desc: "露出した岩肌も見られる、 不毛で乾燥した地域。"
 pc_arid_tile: "乾燥地域"
 pc_arid_tile_desc: "植物に乏しい、 乾いた岩がちな地域。"
 pc_tundra_tile: "ツンドラ地域"
 pc_tundra_tile_desc: "植物に乏しい、 風にさらされ冷え込む草原の地域。"
 pc_tropical_tile: "熱帯地域"
 pc_tropical_tile_desc: "植物が繁茂する、 高温多湿の地域。"
 pc_ocean_tile: "海洋性地域"
 pc_ocean_tile_desc: "海に囲まれた孤島や諸島。"
 pc_arctic_tile: "極寒地域"
 pc_arctic_tile_desc: "一切の植物が生えない、 雪や氷に閉ざされた地域。"
 pc_savannah_tile: "サバンナ地域"
 pc_savannah_tile_desc: "暖かく乾燥した、 樹木がまばらに生える地域。"
 pc_alpine_tile: "高山地域"
 pc_alpine_tile_desc: "雪と氷に覆われた標高の高い地域。"
 pc_gaia_tile: "ガイア的地域"
 pc_gaia_tile_desc: "大抵の生命に適した生態系を伴う、 多様な環境の地域。"
 pc_nuked_tile: "荒廃地域"
 pc_nuked_tile_desc: "戦争で荒廃した過酷な地域。 放射線量は生命を育める程度には低い。"
 pc_infested_tile: "汚染された地域"
 pc_infested_tile_desc: "プレスリンの群れの分泌物によって荒廃した地域。"
 pc_ringworld_habitable_tile: "リングワールド地形"
 pc_ringworld_habitable_tile_desc: "リングワールドの内部システムによって厳重に管理されている、 手つかずの自然地域。"
 pc_machine_tile: "サイバネティック地形"
 pc_machine_tile_desc: "地下に広がる超電導格子を覆う、 滅菌処理が施された地形。"
 pc_habitat_tile: "軌道上居住地の土地"
 pc_habitat_tile_desc: "人工重力発生装置の上にある鋳造ミネラルプレートは、 都市建設と産業建設のための最適な基盤となる。"
 ####################################
 #Tile Blockers
 ####################################
 d_mountain_range: "£blocker£ 険しい山脈"
 mountain_range_singular: "険しい山脈" #used inside event texts
 d_mountain_range_desc: "この地域には標高が高く、 峰越えが困難な山脈が広がっている。"
 d_active_volcano: "£blocker£ 活火山"
 active_volcano_singular: "活火山" #used inside event texts
 d_active_volcano_desc: "この地域には溶岩や火山性ガスを放出する活火山がある。"
 d_dangerous_wildlife_blocker: "£blocker£ 危険な原生生物"
 wildlife_blocker_singular: "野生の軌道上居住地" #used inside event texts
 d_dangerous_wildlife_blocker_desc: "この地域の自然環境は特に致死的で、 多くの危険な捕食者や有毒植物が存在する。"
 d_dense_jungle: "£blocker£ 鬱蒼としたジャングル"
 dense_jungle_singular: "鬱蒼としたジャングル" #used inside event texts
 d_dense_jungle_desc: "この地域全体に鬱蒼として通行不能なジャングルが生い茂っている。"
 d_quicksand_basin: "£blocker£ 流砂"
 quicksand_basin_singular: "流砂" #used inside event texts
 d_quicksand_basin_desc: "流砂がこの地域一帯に広がっており、 建設作業は不可能だ。"
 d_noxious_swamp: "£blocker£ 有毒湿地"
 noxious_swamp_singular: "有毒湿地" #used inside event texts
 d_noxious_swamp_desc: "腐敗ガスが充満した沼地や湿地帯。"
 d_massive_glacier: "£blocker£ 巨大氷河"
 massive_glacier_singular: "広大な氷河" #used inside event texts
 d_massive_glacier_desc: "分厚く巨大な氷がこの地域を覆っている。"
 d_toxic_kelp: "£blocker£ 有毒海藻"
 toxic_kelp_singular: "有毒海藻域" #used inside event texts
 d_toxic_kelp_desc: "この地域の海は、 ほとんどの生命体にとって有毒である海草の森で覆われている。"
 d_deep_sinkhole: "£blocker£ 底なし穴"
 deep_sinkhole_singular: "底なし穴" #used inside event texts
 d_deep_sinkhole_desc: "この地域には途方もなく巨大な陥没穴がある。"
 d_city_ruins: "£blocker£ 滅びた都市"
 d_city_ruins_desc: "かつては偉大な都市だったが、 いまでは見渡す限りに広がる金属の墓場だ。"
 d_ancient_ruins: "£blocker£ 古代の廃墟"
 d_ancient_ruins_desc: "§Lかつては高度な技術で作られた偉大な都市だったが、 いまでは何世紀も放棄された廃墟と瓦礫の山にすぎない。§!"
 d_ancient_cryo_chambers: "£blocker£ 壊れた生体停止チャンバー"
 d_ancient_cryo_chambers_desc: "§L数百万基の生体停止チャンバーを含む、 半壊した巨大な複合施設。 施設に電力は供給されておらず、 チェンバー内にいた何十種もの異なる生物に由来するとみられる、 生体物質の痕跡だけが残されている。 §!"
 d_tribal_settlement: "£blocker£ 先住民の保留地"
 d_tribal_settlement_desc: "この地域一帯は、 前FTL先住民の特別保留地に指定されている。"
 d_xeno_preserve: "£blocker£ 異星生物保護区"
 d_xeno_preserve_desc: "この地域一帯は、 絶滅に瀕した異星生物の特別保留地に指定されている。"
 d_wandering_forests: "£blocker£ さまよう森"
 d_wandering_forests_desc: "この星のさまよう森は、 頻繁に新しい場所へ集団移動する。 その結果、 道路や電線などのインフラ整備に支障をきたしている。"
 d_wandering_forest_reserve: "£blocker£ さまよう森保護区"
 d_wandering_forest_reserve_desc: "§Y近隣のタイルに £society£ 研究を加える。 §!\n\nさまよう森の移動範囲である広大な領域をカバーする自然保護区。"
 d_sinkhole_subterraneans: "£blocker£ 地下への入り口"
 d_sinkhole_subterraneans_desc: "この世界の地下に張り巡らされた広大な洞窟網につながる、 巨大な穴。"
 d_crater: "£blocker£ クレーター"
 d_crater_desc: "かつて何かがこの星の地表に衝突してできた、 巨大なクレーター。"
 d_bomb_crater: "£blocker£ 爆発クレーター"
 d_bomb_crater_desc: "この大規模なクレーターは、 特に破壊的の高い水素爆弾によって生じた。"
 d_ruined_district: "£blocker£ 荒廃した地区"
 d_ruined_district_desc: "この地区は、 容赦ない軌道爆撃でできた無数のクレーターに覆われている。"
 d_radioactive_wasteland: "£blocker£ 放射能の荒れ地"
 d_radioactive_wasteland_desc: "放射線を浴びて荒廃したこの地で生きられる有機生命体は一握りだ。"
 d_failing_infrastructure_desc: "この地域は廃墟と化したコンビナート群と、 有毒な土壌に覆われている。 過去の進歩の時代の残骸だ。"
 d_failing_infrastructure: "£blocker£ 工業汚染地域"
 d_forgotten_civilization: "£blocker£ 忘れられた文明"
 d_forgotten_civilization_desc: "我々よりも先に繁栄していた文明の、 忘れ去られた廃墟。"
 d_decrepit_dwellings: "£blocker£ 大スラム"
 d_decrepit_dwellings_desc: "この地域には貧困層や漂泊者が大量に住み着き、 広大なスラムと掘立小屋の街が広がっている。"
 d_decrepit_dwellings_custom_tooltip: "§G100§! £pop£ POPが生成された"
 d_titanic_life_blocker: "£blocker£ 巨大生命体"
 d_titanic_life_blocker_desc: "多数の巨大な異星生物がこの地域を住処にしているので、 開発は避けたほうが賢明だろう。"
 d_bombarded_land: "£blocker£ 焦土"
 d_bombarded_land_desc: "この地域は軌道爆撃によって荒廃した。"
 d_battlefield_debris: "£blocker£ 戦場跡"
 d_battlefield_debris_desc: "この地域は、 大規模な地上戦が相次いで行われたせいで荒廃した。"
 d_tomb_world_ruins: "£blocker£ 住人のいる廃墟"
 d_tomb_world_ruins_desc: "いまは廃墟と化したこの大都市では、 貧しい者たちが各地で廃品を漁って必死に生活している。"
 d_tomb_world_wasteland: "£blocker£ 放射能汚染地域"
 d_tomb_world_wasteland_desc: "かつて大量の核兵器が使用された地域。 初期のころよりは放射線量は低下しているが、 大掛かりな除染作業を行わなければ居住には適さない。"
 d_machine_empire_ruins: "£blocker£ 放棄された都市"
 d_machine_empire_ruins_desc: "かつてはこの惑星の主要都市だったようだが、 いまは崩壊し遺跡と化している。 以前の住人の痕跡は残っていない。"
 d_exterminators_ruins: "£blocker£ 旧有機生命体都市"
 d_exterminators_ruins_desc: "熱と閃光で焼き尽くされた、 有機生命体のかつての主要都市。 倒壊せずに残っている建物のなかには灰しかない。"
 d_assimilators_ruins: "£blocker£ 静寂の廃墟"
 d_assimilators_ruins_desc: "かつては大規模な集落だった崩れかけの廃墟。 同化されるよりも自滅を選んだ有機生命体の、 朽ちゆく死骸だけが残されている。"
 d_former_battlefield: "£blocker£ 戦場跡"
 d_former_battlefield_desc: "数万もの焼け焦げた戦闘機械と、 有機生命体兵士の歪んだ骸が、 先の大戦の名残として大地に散乱している。 あちこちに放射線が残留しており、 ほとんどの電子機器に干渉する。"
 d_strip_mine: "£blocker£ 放棄された露天鉱床"
 d_strip_mine_desc: "この地域では過去に大規模な露天掘り行われていたが、 残念ながら、 将来の開発を考慮してプログラムされていない、 より古く原始的な重機が使われていた。"
 d_unsupervised_settlement: "£blocker£ 無秩序な村落"
 d_unsupervised_settlement_desc: "未だに機械に管理されていない、 孤立した有機生命体の社会。 数世紀のあいだに住民達は技術的に衰退してしまっており、 居留地の壁の内側では暴力と病気と飢餓が猛威をふるっている。"
 d_collapsed_burrows: "£blocker£ 崩落した穴"
 d_collapsed_burrows_desc: "この場所は、 かつて集合意識が居を構えていた巨大な地下トンネル網だったが、 周辺の野生動物や資源が乱獲・乱開発されたために放棄された。"
 d_ruined_building_blocker: "£blocker£ 廃墟"
 d_ruined_building_blocker_desc: "広大な廃墟があらゆる開発を阻んでいる。"
 d_hibernating_lithoids: "£blocker£ 岩石種族の一枚岩"
 d_hibernating_lithoids_desc: "石化した岩石種族を含むとみられる、 非常に豊かな鉱物の露頭。"
 d_big_nature_preserve_blocker: "$d_nature_preserve_blocker$"
 d_big_nature_preserve_blocker_desc: "この惑星の一部は自然保護区に指定されており、 手を加えることができない。"
