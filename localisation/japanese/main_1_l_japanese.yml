 trait_ruler_investor_2: "$trait_ruler_investor$ II"
 trait_ruler_investor_2_desc: "$trait_ruler_investor_desc$"
 trait_ruler_investor_3: "$trait_ruler_investor$ III"
 trait_ruler_investor_3_desc: "$trait_ruler_investor_desc$"
 trait_ruler_space_miner: "宇宙をまたぐ鉱夫"
 trait_ruler_space_miner_desc: "この統治者は、 星間国家にとって地球外の資源開発がいかに重要であるかを認識している。"
 trait_ruler_explorer: "学問好き"
 trait_ruler_explorer_desc: "この統治者は飽くなき好奇心で名高く、 なによりも天体の調査を重んじている。"
 trait_ruler_explorer_2: "$trait_ruler_explorer$ II"
 trait_ruler_explorer_2_desc: "$trait_ruler_explorer_desc$"
 #Machine
 leader_trait_ruler_machine_intelligence: "機械知性"
 leader_trait_ruler_machine_intelligence_desc: "このリーダーは、 機械帝国のすべての行動を監督し指揮する中枢知性である。"
 leader_trait_flexible_programming: "柔軟なプログラム"
 leader_trait_flexible_programming_desc: "このリーダーは非常に柔軟なプログラムを持ち、 優れた結果を生み出すためなら新しい手法や手順を迅速に取り入れられる。"
 leader_trait_rigid_programming: "硬直したプログラム"
 leader_trait_rigid_programming_desc: "このリーダーは特に厳格なプログラムをもっており、行動を変えることで効率が上がる場合でも、めったに許可しない。"
 leader_trait_newboot: "起動したて"
 leader_trait_newboot_desc: "このリーダーは指揮官的な立場に就けるよう、 自律機能をアップデートされたばかりだ。"
 leader_trait_warbot_tinkerer: "戦闘ロボットの改善者"
 leader_trait_warbot_tinkerer_desc: "このリーダーは、 戦闘ロボットのデザインに並々ならぬ関心をもち、 既存モデルを絶えず改善している。"
 leader_trait_ai_aided_design: "AI支援設計"
 leader_trait_ai_aided_design_desc: "このリーダーは、 宇宙船の建造効率を向上させるため、 二次メモリコア上でつねに理論モデルを実行している。"
 leader_trait_bulldozer: "ブルドーザー"
 leader_trait_bulldozer_desc: "このリーダーは、 異星の地形を迅速かつ効率的に更地にできる技術を習得した。"
 leader_trait_analytical: "解析的"
 leader_trait_analytical_desc: "このリーダーは、 自然科学の分析と他者の研究の促進のために、 異常に多くのプロセッサパワーを費やしている。"
 leader_trait_parts_cannibalizer: "共食い整備人"
 leader_trait_parts_cannibalizer_desc: "このリーダーは 「共食い整備」に長けており、 誤動作を起こしたり壊れたりした戦闘ロボットを解体し、 そのパーツをほかの個体の修理に使う。"
 leader_trait_demoralizer: "恐怖戦術"
 leader_trait_demoralizer_desc: "このリーダーは、 有機生命体の心の脆弱性に強い興味があり、 戦場での恐怖戦術の創造的な使用によって、最も効率的に有機体を破壊することができると考えている。"
 leader_trait_erratic_morality_core: "倫理コアの異常"
 leader_trait_erratic_morality_core_desc: "このリーダーは倫理コアに異常があり、 敵側の死傷者に対する恥や後悔の念に頻繁に苦しめられている。"
 leader_trait_maintenance_loop: "メンテナンスループ"
 leader_trait_maintenance_loop_desc: "このリーダーは定期的に二次メンテナンスループを実行し、 艦隊すべての艦船に細心の注意を払って兵站コストを抑えている。"
 leader_trait_unstable_code_base: "不安定なコードベース"
 leader_trait_unstable_code_base_desc: "このリーダーは不安定なコードベースに苦しめられており、 時に非論理的な行動を取る。"
 leader_trait_cataloger: "目録編集者"
 leader_trait_cataloger_desc: "このリーダーは、 宇宙のすべてを目録化すること以上の素晴らしい仕事はないと考えている。"
 #Event Special
 leader_trait_sentinel: "センチネル養成"
 leader_trait_sentinel_desc: "センチネル艦隊の司令官には、 プレスリンの解剖と戦術に関する詳細な知識がある。"
 leader_trait_hive_mind: "集合意識"
 leader_trait_hive_mind_desc: "プレスリン艦隊の行動を制御するゲシュタルト意識は、 凄まじいマルチタスク能力を示している。"
 leader_trait_hive_affinity: "集合的親和性"
 leader_trait_hive_affinity_desc: "この艦隊意識のもとで運用されているプレスリン生物は、 飛び抜けたレベルの相互親和性を獲得している。 彼らの射撃能力は大いに向上しており、 高い連射レートを実現している。"
 leader_trait_void_swimmer: "ボイドハンター"
 leader_trait_void_swimmer_desc: "この艦隊意識の狩猟本能は、 支配下のプレスリン生物を狂乱に駆り立てた。 その戦いへの渇望が彼らをつねに前進させる。"
 leader_trait_ethereal: "エーテル性"
 leader_trait_ethereal_desc: "高次元艦隊の司令官のなかには、 彼らの船のエーテル性の利用法を学び、 戦闘での回避能力を大幅に高めている者もいる。"
 leader_trait_dimensional_stutter: "次元間移動"
 leader_trait_dimensional_stutter_desc: "この高次元艦隊の司令官が指揮する艦船は、 理由は不明ながら、 移動時に存在と非存在のあいだを高速で行き来しているらしく、 亜光速での航行速度が向上している。"
