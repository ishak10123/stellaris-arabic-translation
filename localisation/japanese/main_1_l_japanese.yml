 starting_ftl_wormhole: "ワームホール航法"
 starting_ftl_warp_desc: "ワープドライブは船の周囲に亜空間の泡を生成し、 光を速える速度を実現する。 これにより、 自由な星間航行が可能になるが、 広大な銀河に対してその速度は比較的遅い部類に入る。"
 starting_ftl_hyperdrive_desc: "ハイパースペース航法は、 船が一時的に高次元空間に進入できるようにする。 恒星間の移動は高速だが、 ハイパーレーン網に沿った既存の経路に限られる。"
 starting_ftl_wormhole_desc: "ワームホールジェネレータは、 亜空間にトンネルを掘ることで二点間を通路で接続し、 膨大な距離の移動を可能にする。 ジェネレータは巨大すぎて船に収まらないため、 専用のワームホールステーションを必要とする。"
