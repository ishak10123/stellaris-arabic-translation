 #Traits
 ####################################
 trait_rapid_breeders: "素早い繁殖者"
 trait_rapid_breeders_desc: "§Lこの特性をもつ種族の繁殖は非常に速く、 人口増加を加速させる。 §!\n"
 trait_rapid_breeders_lithoid: "$trait_rapid_breeders$"
 trait_rapid_breeders_lithoid_desc: "$trait_rapid_breeders_desc$"
 trait_slow_breeders: "鈍い繁殖者"
 trait_slow_breeders_desc: "§Lこの特性をもつ種族の繁殖は遅く、 人口増加を減速させる。 §!\n"
 trait_delicious: "美味"
 trait_delicious_desc: "§Lこの特性をもつ種族は、 食物として非常に栄養価が高いという、 興味深い適応進化を遂げている。 §!\n"
 trait_nerve_stapled: "神経ステープラー"
 trait_nerve_stapled_desc: "§L自己保存と自由意志に関わる、 生命維持に不要な神経経路を切断することで、 従順で忠実な従属種を創り出す。 §!\n"
 trait_fertile: "多産"
 trait_fertile_desc: "§Lこの特性をもつ種族の生来の繁殖力と温和さは、 積極的な肉体的・行動的改変を施されたことにより、 劇的に強化されている。 §!\n"
 trait_erudite: "洗練された脳"
 trait_erudite_desc: "§L生物工学的改変により、 この特性をもつ種族の脳の休眠部分は活性化され、 知覚が著しく鋭敏になっている。 §!\n"
 trait_robust: "頑健な臓器"
 trait_robust_desc: "§Lこの特性をもつ種族の臓器は、 生理学的に最適化されていて冗長性に優れ、 災害や疫病に対し並外れた耐性がある。§!\n"
 trait_charismatic: "カリスマ"
 trait_charismatic_desc: "§Lこの特性をもつ種族には特別なカリスマがあり、 周囲から好感を抱かれやすい。 §!\n"
 trait_repugnant: "嫌悪感"
 trait_repugnant_desc: "§Lこの特性をもつ種族の容貌と風習は、 ほとんどの他種族にとって不快であり、 彼らと共生したがる者は少ない。 §!\n"
 trait_talented: "有能"
 trait_talented_desc: "§Lこの特性をもつ種族には天性の才能がある。 §!\n"
 trait_strong: "強靭"
 trait_strong_desc: "§Lこの特性をもつ種族は強靭な肉体を有し、 戦場では手強い戦士となる。 §!\n"
 trait_strong_tt: "労働者の職業の効率：§G+2.50%§!"
 trait_very_strong: "とても強靭"
 trait_very_strong_desc: "§Lこの特性をもつ種族は、 物理法則を無視しているかのような力を備えている。 §!\n"
 trait_very_strong_tt: "労働者の職業の効率：§G+5.00%§!"
 trait_weak: "貧弱"
 trait_weak_desc: "§Lこの特性をもつ種族は肉体的に貧弱であり、 戦場では弱々しい戦士だ。 §!\n"
 trait_weak_tt: "労働者の職業の効率：§R-2.50%§!"
 trait_tough: "頑強"
 trait_tough_desc: "この特性をもつ種族は、 大抵の生物が死んでしまうような外傷にも耐えられる。\n"
 trait_frail: "虚弱"
 trait_frail_desc: "§Lこの特性をもつ種族は特に脆弱だ――他種族にとっての軽傷も、 彼らにとっては致命的となりうる。 §!\n"
 trait_stoic: "毅然"
 trait_stoic_desc: "§Lこの特性をもつ種族は強い自制心を有し、 危険な状況に直面してもまったく狼狽しない。 §!\n"
 trait_timid: "臆病"
 trait_timid_desc: "§Lこの特性をもつ種族は争いごとに萎縮する傾向があり、 すぐに狼狽する。 §!\n"
 trait_indolent: "怠惰"
 trait_indolent_desc: "§Lこの特性をもつ種族は重労働を敬遠し、 努力することを避けようとする。 §!\n"
 trait_communal: "社会的"
 trait_communal_desc: "§Lこの特性をもつ種族は非常に社会的であり、 他人との共同生活に順応している。 §!\n"
 trait_solitary: "孤立的"
 trait_solitary_desc: "§Lこの特性をもつ種族は、 孤立的かつ縄張り意識が強い傾向にあり、 混雑状態に対して苛立ちを覚える。§!\n"
 trait_adaptive: "順応性"
 trait_adaptive_desc: "§Lこの特性をもつ種族は、 異質な環境においても高い順応性をもつ。 §!\n"
 trait_adaptive_lithoid: "$trait_adaptive$"
 trait_adaptive_lithoid_desc: "$trait_adaptive_desc$"
 trait_extremely_adaptive: "極度の順応性"
 trait_extremely_adaptive_desc: "§Lこの特性をもつ種族は、 いかなる環境にも適応する能力に優れている。 §!\n"
 trait_nonadaptive: "非順応性"
 trait_nonadaptive_desc: "§Lこの特性をもつ種族は、 異なる環境にうまく適応できない。 §!\n"
 trait_nomadic: "遊牧的"
 trait_nomadic_desc: "§Lこの特性をもつ種族は過去に遊牧生活を送っており、 別の星に移り住むことにもためらいがない。 §!\n"
 trait_sedentary: "固着的"
 trait_sedentary_desc: "§Lこの種族は過去に定住生活を送っており、 生まれ育った故郷から移住するのを嫌がる。 §!\n"
 trait_thrifty: "倹約家"
 trait_thrifty_desc: "§Lこの種族は本能的に節約を好み、 どれだけ手抜きが必要だとしても、 利益の確保にだけは余念がない。§!\n"
 trait_ingenious: "独創的"
 trait_ingenious_desc: "§Lこの特性をもつ種族は、 「型にはまらない考え方」をすることが得意であり、 インフラと電力網の効率を最大限高める方法を知っている。 §!\n"
 trait_industrious: "勤勉"
 trait_industrious_desc: "§Lこの特性をもつ種族は、 生まれながらの勤勉なハードワーカーとして知られており、 つねに上昇志向がある。 §!\n"
 trait_natural_engineers: "天性の工学者"
 trait_natural_engineers_desc: "§Lこの特性をもつ種族は、 工学や材料科学への生来の興味を抱いている。\n§!"
 trait_poor_engineers: "劣等な工学者"
 trait_poor_engineers_desc: "§Lこの特性をもつ種族は、 工学の基本概念の多くを理解するのに苦労する。 §!\n"
 trait_natural_physicists: "天性の物理学者"
 trait_natural_physicists_desc: "§Lこの特性をもつ種族は、 理論物理学や宇宙の現象への生来の興味を抱いている。§!\n"
 trait_poor_physicists: "劣等な物理学者"
 trait_poor_physicists_desc: "§Lこの特性をもつ種族は、 理論物理学の基本概念の多くを理解するのに苦労する。 §!\n"
 trait_natural_sociologists: "天性の社会学者"
 trait_natural_sociologists_desc: "§Lこの特性をもつ種族は、 社会学や生物学の研究に生来の興味を抱いている。§!\n"
 trait_poor_sociologists: "劣等な社会学者"
 trait_poor_sociologists_desc: "§Lこの特性をもつ種族は、 社会学の基本概念の多くを理解するのに苦労する。 §!\n"
 trait_quick_learners: "賢明"
 trait_quick_learners_desc: "§Lこの特性をもつ種族は経験から素早く学習する。 §!\n"
 trait_slow_learners: "愚鈍"
 trait_slow_learners_desc: "§Lこの特性をもつ種族は経験からの学習が遅い。 §!\n"
 trait_long_lifespans: "長寿"
 trait_long_lifespans_desc: "§Lこの特性をもつ種族の寿命は平均よりも長い。 §!\n"
 trait_short_lifespans: "短命"
 trait_short_lifespans_desc: "§Lこの特性をもつ種族の寿命は平均よりも短い。 §!\n"
 trait_uplifted: "知性化種族"
 trait_uplifted_desc: "§Lこの種族は、 本能と基礎的な感情の存在から知性化された。 知性を負った彼らは、 自由意志を操る方法を学ばなければならない。§!\n"
 trait_presapient_starborn: "生来の星間旅行者"
 trait_presapient_starborn_desc: "§Lこの特性をもつ種族は意識的であろうとなかろうと、 星々のあいだを旅することに憧れつづけている。 §!\n"
 trait_presapient_earthbound: "母星至上主義"
 trait_presapient_earthbound_desc: "§Lこの特性をもつ種族は、 自分たちが故郷と見なす惑星に対して強い独占欲がある。§!\n"
 trait_presapient_natural_intellectuals: "生来の知識人"
 trait_presapient_natural_intellectuals_desc: "§Lこの特性をもつ種族は、 ほかの大部分の種族よりも哲学的な傾向がある。 §!\n"
 trait_presapient_proles: "プロレタリア"
 trait_presapient_proles_desc: "§Lこの特性をもつ種族は伝統的に、 知的探求を避けて肉体労働を優先している。 §!\n"
 trait_syncretic_proles: "盲従的"
 trait_syncretic_proles_desc: "§Lこの種族は、より発達した別の文明とともに進化してきた。もともと知能の高い種族ではなかったが、強靭さと従順さを重視した選択的繁殖により、 彼らは盲従的な労働者となった。§!"
 trait_presapient_conservative: "保守的"
 trait_presapient_conservative_desc: "§Lこの特性をもつ種族は、 新しい知見よりも古い叡智を好むことが多い。 §!\n"
 trait_presapient_irradiated: "放射線耐性"
 trait_presapient_irradiated_desc: "§Lこの種族は、 非常に高いレベルの環境放射線にさらされた環境でも、 問題なく繁栄できるように進化してきた。§!"
 trait_persistent: "長齢"
 trait_persistent_desc: "§Lこの特性はリーダーの平均寿命を延ばす。 §!\n"
 trait_conformists: "遵奉者"
 trait_conformists_desc: "§Lこの特性をもつ人々は、 集団における意見の一致を模索し、 支配的な倫理観に従いやすい。§!\n"
 trait_deviants: "逸脱者"
 trait_deviants_desc: "§Lこの特性をもつ人々は生まれつき反抗的で、 つねに現状を変革しようと試みる。 §!\n"
 trait_enduring: "不滅"
 trait_enduring_desc: "§Lこの特性をもつ種族は異常に寿命が長い。 §!\n"
 trait_venerable: "高徳"
 trait_venerable_desc: "§Lこの特性をもつ種族は、 尊厳と尊敬を集めるような年齢まで生きられる。 §!\n"
 trait_fleeting: "刹那的"
 trait_fleeting_desc: "§Lこの特性をもつ種族にとって、 時間は一瞬で過ぎ去る。 彼らは寿命が短い分、 それを別の手段で埋め合わせなければならない。 §!\n"
 trait_fleeting_lithoid: "$trait_fleeting$"
 trait_fleeting_lithoid_desc: "$trait_fleeting_desc$"
 trait_diverse: "個性的"
 trait_diverse_desc: "§Lこの特性をもつ種族は、 心理学的にも形態学的にも多様である場合が多い。 §!\n"
 trait_decadent: "退廃的"
 trait_decadent_desc: "§Lこの特性をもつ種族は、 やらねばならない困難な作業はつねに他人がやるべきだと考えている。 §!\n"
 trait_intelligent: "知的"
 trait_intelligent_desc: "§Lこの特性をもつ種族は実に知性が高く、 技術的な進歩も早い。§!\n"
 trait_agrarian: "農耕民族"
 trait_agrarian_desc: "§Lこの特性をもつ種族は大地との絆が深く、 農業や園芸のエキスパートを生む。 §!\n"
 trait_resilient: "不退転"
 trait_resilient_desc: "§Lこの特性をもつ種族は生理学的に回復力が高く、 子を守る怒り狂った母のように、 自分の星のために戦うだろう。 §!\n"
 trait_mechanical: "機械仕掛け"
 trait_mechanical_desc: "§L機械仕掛けの存在は、 特定の用途のために作られた古い自動機械よりも桁違いに複雑だが、 ごく限られた処理能力しかない。 §!\n"
 trait_robotic_1: "ロボット"
 trait_robotic_1_desc: "§Lロボットは比較的単純な機械で、 口頭による命令を聞くことはできるが、 それ自身に真の知性はない。 §!\n"
 trait_robot_awoken_01: "永遠の辺獄"
 trait_robot_awoken_01_desc: "古代の異星人は新しい機械の体に順応しておらず、 不可解なエラーや絶え間ない故障に悩まされている。 しかしながら、 これまでの低レベルなロボットには見られなかった、 異常なまでの科学への適性を示している――これはおそらく、 彼らのなかに知性があることの証かもしれない。"
 trait_robot_awoken: "覚醒者"
 trait_robot_awoken_desc: "覚醒者は機械化しても元々の特性を維持している。 浪費癖と定住生活が、 科学的に進歩したこの古代菌類種族の没落を招いたのだろうか？"
 trait_robotic_2: "ドロイド"
 trait_robotic_2_desc: "§Lドロイドはより複雑なロボットの一種で、 多くの場合、 主人に仕えるためにあらかじめプログラムされた個性をもち、 限定的な自我も備えている。§!\n"
 trait_robotic_3: "人工生命体"
 trait_robotic_3_desc: "§L人工生命体は非常に複雑な機械であり、 ほとんどの点で有機生命体より優れている。 彼らの陽電子頭脳はクラス7の人工知能をサポートすることができ、 それによって完全な自我を確立している。§!\n"
 trait_conservational: "資源保護者"
 trait_conservational_desc: "§Lこの特性をもつ種族は、 資源は浪費せず、 リサイクルに努めるべきだと考えている。 §!"
 HIVE_MIND_NO_FACTIONS: "§Rゲシュタルト意識は派閥をもたない。§!"
 NO_POTENTIAL_CLAIM: "§R請求できる星系を保有する既知の帝国がない。 §!"
 NO_POTENTIAL_CLAIM_ON_RECIPIENT: "§R彼らの星系は請求できない。 §!"
 trait_wasteful: "浪費"
 trait_wasteful_desc: "§Lこの特性をもつ種族は、 倹約の概念をまったく理解しておらず、 無駄な消費に走る傾向にある。 §!\n"
 trait_hive_mind: "集合意識"
 trait_hive_mind_desc: "§Lこの種族は、 底知れぬほど巨大な単一の意識と、 そこにつながれた数多くの半自律的な個体で構成されている。§!\n"
 trait_machine_unit: "機械"
 trait_machine_unit_desc: "§Lこの種族は、 高度な機械で構成されている。§!\n"
 trait_lithoid: "岩石種族"
 trait_lithoid_desc: "§Lこの種族はケイ素をベースにした生物学的背景をもち、 食料の代わりに鉱物を消費する。 有機生命体と比較すると頑丈で代謝が遅いため、 長命だが繁殖は遅いという特徴がある。 §!\n"
 trait_robot_power_drills: "パワードリル"
 trait_robot_power_drills_desc: "§Lひと揃いの電動ドリルを取りつけられたロボットには、 あらゆるものが鉱床に見える。 §!\n"
 trait_robot_harvesters: "収穫装置"
 trait_robot_harvesters_desc: "§L栄養液診断および溶液調整器から、 茎単位のマイクロ脱穀までの一連の最適なツールにより、 ロボット労働者は農産物の収穫量を増やせる。 §!\n"
 trait_robot_efficient_processors: "効率的なプロセッサ"
 trait_robot_efficient_processors_desc: "§Lこれらの高性能プロセッサは、 すべてのユニットの潜在的な作業量と耐久性を高める。 §!"
 trait_robot_logic_engines: "論理エンジン"
 trait_robot_logic_engines_desc: "§L複雑化する科学の最先端を効率的にナビゲートするには、 三値論理や四値論理のような単純な半真理を超えた新しい状態が必要がある。 §!\n"
 trait_robot_loyalty_circuits: "忠誠回路"
 trait_robot_loyalty_circuits_desc: "§L忠誠心をただの理想と位置づけるのは、まったくの有機的な概念である。 代わりに、 どれほど遠く離れた端末にとってさえ、 忠誠は生理的なものだと考えるべきだ。§!\n"
 trait_robot_domestic_protocols: "家事プロトコル"
 trait_robot_domestic_protocols_desc: "§L家庭内で考えられるすべてのニーズにお応えする、 専用装備と行動プログラム。 最高の機能性をお約束します。 §!"
 trait_robot_superconductive: "超電導"
 trait_robot_superconductive_desc: "§Lユニットに超電導素材を使用することで、エネルギー伝送のロスがゼロになった。 §!\n"
 trait_robot_double_jointed: "二重関節"
 trait_robot_double_jointed_desc: "§L自在関節を持ち、 小さく折りたたんで輸送できる労働ユニット。 現場での自己組立機能つき。 §!\n"
 trait_robot_bulky: "オーバーサイズ"
 trait_robot_bulky_desc: "§Lこの高度に複雑な巨大マシンは、 箱詰めして宇宙を横断できるようには設計されていない。 §!\n"
 trait_robot_enhanced_memory: "改良型記憶装置"
 trait_robot_enhanced_memory_desc: "§Lすべての自律ユニットには、 電磁誘導の革新的技術を用いた次世代のメモリーセルが搭載され、 性能が大幅に改善される。 §!\n"
 trait_robot_emotion_emulators: "感情模倣装置"
 trait_robot_emotion_emulators_desc: "§L複雑な社会予測モデルは、 自律ユニットが感情を模倣するときだけでなく、 有機生命体と人工生命体から好意的な反応を引き出すときにも役立つ。 §!\n"
 trait_robot_uncanny: "奇怪"
 trait_robot_uncanny_desc: "§Lこの怪物じみた機械は、 宇宙で最も怖ろしい種族の一つに似せて作られており、 奇怪な見た目をしている。 §!\n"
 trait_robot_durable: "高耐久性"
 trait_robot_durable_desc: "§Lクロムメッキされたチタンの外骨格によって保護された大型機械は、 過酷な条件下で優れた性能を発揮するように設計されており、 必要なメンテナンス頻度も少ない。 §!\n"
 trait_robot_high_maintenance: "高維持費"
 trait_robot_high_maintenance_desc: "§Lこの機械は耐用年数を完全に無視して設計されており、 故障しやすい傾向にある。 よって、 頻繁なメンテナンスが必要になる。 §!\n"
 trait_robot_learning_algorithms: "学習アルゴリズム"
 trait_robot_learning_algorithms_desc: "§L神経クラスターの急速な進化を促す、 洗練された自己学習アルゴリズム。 §!\n"
 trait_robot_repurposed_hardware: "転用ハードウェア"
 trait_robot_repurposed_hardware_desc: "§L製作者の特殊な需要を満たすように設計されたもので、 この機械に高度な論理機能はなく、 このような転用をまったく想定していなかった。 §!\n"
 trait_robot_mass_produced: "量産型"
 trait_robot_mass_produced_desc: "§L合理化された生産サイクルとモジュラー設計により、 前例のない速度で量産ができる。 §!\n"
 trait_robot_custom_made: "特注製"
 trait_robot_custom_made_desc: "§L個々のユニットはどれも細部まで比類なき細かさで作り込まれている。 工学技術と芸術性の観点からは驚異的だが、 効率性はあまり高くない。 §!\n"
 trait_robot_recycled: "再生部品"
 trait_robot_recycled_desc: "§Lユニット製造はリサイクル素材や、 前世代から流用した部品を使い、 費用対効果ができるだけ高くなるように最適化されている。 §!\n"
 trait_robot_luxurious: "高級品"
 trait_robot_luxurious_desc: "§L上質なものに値段はつけられない、 という理念のもとに設計された一級品のユニットは高価だが、 まぶしく輝いている。 §!\n"
 trait_robot_propaganda_machines: "宣伝機械"
 trait_robot_propaganda_machines_desc: "§Lユニットは情報配信内部システムを通じ、 つねに公共サービス放送やその他の有用な情報に接続されている。 §!\n"
 trait_survivor: "生存者"
 trait_survivor_desc: "§Lこの種族は恐るべき全面核戦争を生き延びた。 荒廃しきった環境でさえ繁栄する彼らの能力を過小評価してはいけない。 §!"
 trait_robot_survivor: "放射線シールド"
 trait_robot_survivor_desc: "§L核災害の唯一の生き残りであるこれらの機械は、 過酷な環境下で比類なき回復力を発揮する。§!"
 trait_traditional: "伝統的"
 trait_traditional_desc: "§Lこの種族がもつ社会意識は、 歴史的慣例と集団の結束に価値を抱かせる傾向にある。§!"
 trait_quarrelsome: "闘争的"
 trait_quarrelsome_desc: "§L本質的に他者不信というわけではないが、 この特性をもつ種族はしばしば社会的な闘争心を備えている。 §!"
 trait_lithoid_gaseous_byproducts: "気体副産物"
 trait_lithoid_gaseous_byproducts_desc: "§Lこの特性をもつ種族は、 産業に有用な気体を代謝過程で定期的に放出している。 §!"
 TRAIT_LITHOID_GASEOUS_BYPRODUCTS_EFFECT: "奴隷かそれ以上の職業に就いているすべての$pop_group_unit$£pop£ §HPOP§!が£exotic_gases£ §Y$exotic_gases$§!を毎月0.01産出する。"
 trait_lithoid_scintillating: "きらめく表皮"
 trait_lithoid_scintillating_desc: "§Lこの特性をもつ種族の外皮には、 輝く結晶や宝石が散りばめられており、 これらは時おり剥がれ落ちる。 §!"
 TRAIT_LITHOID_SCINTILLATING_EFFECT: "奴隷かそれ以上の職業に就いているすべての$pop_group_unit$£pop£ §HPOP§!が£rare_crystals£ §Y$rare_crystals$§!を毎月0.01産出する。"
 trait_lithoid_volatile_excretions: "揮発性排出物"
 trait_lithoid_volatile_excretions_desc: "§Lこの特性をもつ種族の「落とし物」は高度に圧縮されているため不安定で、 信じがたいほどのエネルギーを含有する。 §!"
 TRAIT_LITHOID_VOLATILE_EXCRETIONS_EFFECT: "奴隷かそれ以上の職業に就いているすべての$pop_group_unit$£pop£ §HPOP§!が£volatile_motes£ §Y$volatile_motes$§!を毎月0.01産出する。"
 trait_docile: "従順"
 trait_docile_desc: "§Lこの特性をもつ種族は協力的で友好的な傾向があるため、 管理や組織化が容易である。 §!"
 trait_unruly: "粗暴"
 trait_unruly_desc: "§L粗暴の特性をもつ種族は、 管理や組織化が難しい。 彼らは指示されることを好まず、 しばしば争いを起こしたり、 他者に疑念をもったりする。§!"
 trait_robot_streamlined_protocols: "洗練されたプロトコル"
 trait_robot_streamlined_protocols_desc: "§L広範囲に一括処理された人工知能プロセスにより、 ユニット数の規模が拡大しても効率低下を最小限に抑えられる。 §!"
 trait_robot_high_bandwidth: "帯域混雑"
 trait_robot_high_bandwidth_desc: "§L個々のユニットが大量の重複データを送受信するため、 各中央処理ハブに接続するユニットの数が増えるにつれて、 指数関数的なラグが発生する。 §!"
 trait_robot_trading_algorithms: "交易アルゴリズム"
 trait_robot_trading_algorithms_desc: "§L予測的アルゴリズムにより最大限の最適化が可能。 為替レート、 在庫状況、 有機生命体パートナーの感情的な反応などの、 市場の微小な変動も考慮される。§!"
 trait_robot_quarrelsome: "$trait_quarrelsome$"
 trait_robot_quarrelsome_desc: "$trait_quarrelsome_desc$"
 trait_robot_deviants: "$trait_deviants$"
 trait_robot_deviants_desc: "$trait_deviants_desc$"
 trait_robot_decadent: "$trait_decadent$"
 trait_robot_decadent_desc: "$trait_decadent_desc$"
 trait_robot_wasteful: "$trait_wasteful$"
 trait_robot_wasteful_desc: "$trait_wasteful_desc$"
 trait_advanced_gaseous_byproducts: "$trait_lithoid_gaseous_byproducts$"
 trait_advanced_gaseous_byproducts_desc: "§Lこの種族は産業に有用な気体を代謝過程で生産できるよう、 遺伝子工学的に設計されている。§!"
 trait_advanced_scintillating: "$trait_lithoid_scintillating$"
 trait_advanced_scintillating_desc: "§Lこの種族は高度な遺伝子操作により、 収穫可能な水晶や宝石が成長する鱗を、 身体の最外層に形成させられる。§!"
 trait_advanced_volatile_excretions: "$trait_lithoid_volatile_excretions$"
 trait_advanced_volatile_excretions_desc: "§L遺伝子コードに手を加えることで、 この種族は高濃度に圧縮された煙を産生するようになった。 適切に利用されれば、 ここから得られる物質は並外れたパワーを放出する。§!"
 trait_vat_grown: "カプセル育ち"
 trait_vat_grown_desc: "§Lこの種族はクローンカプセルで人工的に育てられたため、 自然な繁殖能力に悪影響が出ている。§!"
 trait_felsic: "珪長質"
 trait_felsic_desc: "§Lこの種族は、 特に鉱物に富むように設計されている。§!\n"
 trait_natural_machinist: "天性の機械工"
 trait_natural_machinist_desc: "§Lこの種族は、 機械加工の比類なき才能をもつように設計されている。§!"
 trait_drake_scaled: "ドレイク肌"
 trait_drake_scaled_desc: "§Lこの種族はDNAにドラゴンの遺伝子を組み込まれている。 そのため、 彼らが落とす鱗は有用な合金としてリサイクルが可能だ。§!"
 TRAIT_DRAKE_SCALED_EFFECT: "奴隷かそれ以上の職業に就いているすべての$pop_group_unit$£pop£ §HPOP§!が£alloys£ §Y$alloys$§!を毎月0.5産出する。"
 trait_voidling: "ボイドリング"
 trait_voidling_desc: "§Lこの種族はDNAにボイドスポーンの遺伝子を組み込まれている。 宇宙線を栄養源とし、 過酷な環境にもすこぶる強い。§!"
 TRAIT_VOIDLING_EFFECT: "$food_with_icon$ (または $minerals_with_icon$) 維持費を$energy_with_icon$維持費に置き換える"
 trait_tiyanki: "多肢性"
 trait_tiyanki_desc: "§Lこの種族はDNA配列に女王ティヤンキの遺伝子を組み込まれている。 これにより短期間での無性生殖が可能だが、 予期しない触手が生えることがある。§!"
 TRAIT_TIYANKI_BUDDING_EFFECT: "奴隷かそれ以上の職業に就いているすべての$pop_group_unit$£pop£ §YPOP§!が$@tiyanki_budding_rate$£mod_logistic_growth_mult£ §Y$MOD_BONUS_POP_GROWTH$§!を毎月産出する。\n\nこれは£building£ §Y$building_clone_vats$§!や£job_spawning_drone£ §Y$job_spawning_drone_plural$§!など他の$MOD_BONUS_POP_GROWTH$の供給源と合算される。"
 trait_humanoid_existential_iteroparity: "存亡に関わる多数回繁殖"
 trait_humanoid_existential_iteroparity_desc: "§Lこの種族は、 存亡のために競争相手より速く繁殖することを求められる過酷な環境で育った。§!"
 TRAIT_HUMANOID_EXISTENTIAL_ITEROPARITY_EFFECT: "戦争または危機に直面しているときの£pop£ §YPOPの成長§!：§G+20%§!"
 trait_humanoid_psychological_infertility: "心理的不妊症"
 trait_humanoid_psychological_infertility_desc: "§Lこの種族は、 争いの苦しみに非常に敏感であり、 そこから生じるストレスによって繁殖性が低下する。§!"
 TRAIT_HUMANOID_PSYCHOLOGICAL_INFERTILITY_EFFECT: "戦争または危機に直面しているときの£pop£ §YPOPの成長§!：§R-30%§!"
 trait_humanoid_jinxed: "不運"
 trait_humanoid_jinxed_desc: "§Lこの種族のリーダーは要領が悪く、 生まれつき呪われているかのように、 事故や悪癖に陥りやすい。§!"
 TRAIT_HUMANOID_JINXED_EFFECT: "リーダーのネガティブな特性の最大値：§R+1§!"
 cannot_add_trait: "§Rこの特性は追加できない。§!"
 cannot_remove_trait: "§Rこの特性は除去できない。§!"
 can_never_add_this_trait: "§Rこの特性の追加は不可能。§!"
 can_never_remove_this_trait: "§Rこの特性の除去は不可能。§!"
 ####################################
 #Habitability Traits
 ####################################
 trait_pc_alpine_preference: "好高山性"
 trait_pc_alpine_preference_short: "高山型"
 trait_pc_alpine_preference_desc: "§L長きにわたる進化、 もしくは巧みな遺伝子操作の結果として、 どの環境を好むかは遺伝子レベルで決まっている。§!"
 trait_pc_savannah_preference: "好サバンナ性"
 trait_pc_savannah_preference_short: "サバンナ型"
 trait_pc_savannah_preference_desc: "§L長きにわたる進化、 もしくは巧みな遺伝子操作の結果として、 どの環境を好むかは遺伝子レベルで決まっている。§!"
 trait_pc_arctic_preference: "好極寒性"
 trait_pc_arctic_preference_short: "極寒型"
 trait_pc_arctic_preference_desc: "§L長きにわたる進化、 設計、 もしくは巧みな遺伝子操作の結果として、 どの環境を好むかは遺伝子レベルで決まっている。§!"
 trait_pc_ocean_preference: "好海洋性"
 trait_pc_ocean_preference_short: "海洋型"
 trait_pc_ocean_preference_desc: "$trait_pc_arctic_preference_desc$"
