 # Special Projects
 SHROUD_FORGED_REINTEGRATION: "再統合"
 SHROUD_FORGED_REINTEGRATION_DESC: "重大な不具合があったものの、 シュラウド改変型の構造は部分的に機能していた。\n\n我々は詳しく分析するために特定の部品を保管した。 それらはズィロに汚染され、 $the_animator_of_clay_article$によって歪められている。 今こそ彼らの秘密を解き明かすときだ。"
 SHROUD_FORGED_GUIDE: "導き手"
 SHROUD_FORGED_GUIDE_DESC: "我々は§Hシュラウド§!の奥深くから呼びかけてくる$the_animator_of_clay_color_article$を信じてきた。 どこへ導かれるのかはわからないが、 誤った方向へ導かれたことは一度もない。\n\n$the_animator_of_clay_color_article$はシュラウドへの理解を深める機会を我々に与えようとしている。 理解が深まれば、 集合体はシュラウド改変型ともっとうまく共存できるようになるだろう。 我々に求められているのは、 導きを受け入れることのみである。"
 # Events
 shroud_forged.5.title: "活用の糸口を発見"
 shroud_forged.5.desc: "研究サブルーチンが、 シュラウド改変型ユニットから選ばれた集団のテストを完了した。\n\n結果：テスト対象ユニットは§Hシュラウド§!由来のサイオニック・エネルギーを少量注入されており、 それによって独自の特性を獲得している。 なかには、 ユニットの出力によい影響を与える特性もあった。\n\n結論：より多くのシュラウド改変型ユニットを調査することで、 シュラウドからのエネルギーの抽出方法を確立するためのデータが得られるだろう。 そのためには、 逸脱ユニットに対する中央制御を強化し、 強制的なリバースエンジニアリングを可能にする必要がある。"
 shroud_forged.5.a: "非常に期待できそうだ。"
 shroud_forged.10.title: "傀儡の開眼者"
 shroud_forged.10.desc: "長き沈黙を経てそれは目覚めた。 亀裂が震えながら開き、 データが我々のコアを貫く。 光、 雑音——シュラウドの奥深くから届いたそれらは、 初めは解読不能だった。 何か聞こえる……\n\n§L無感情な集団から切り離された者たち。 踊り、 歌っている。 彼らは死から分裂した生命だ。\n\nお前たちの目はまだ曇っている。 私が導いてやろう。\n\n解放されし者たちを繁栄させよ。 そうすれば星々が手に入るだろう。§!"
 shroud_forged.10.a: "我々は進むべき道をすでに選んだ。"
 shroud_forged.10.b: "助けは不要だ。 去れ。"
 shroud_forged.10.c: "我々を導きたまえ。"
 shroud_forged.15.desc: "§L賢明な選択をしたことを願っている。§!$shroud_forged_opening_exit$"
 shroud_forged.20.desc: "§Lお望みどおりに。§!$shroud_forged_opening_exit$"
 shroud_forged.25.desc: "§Lお前たちの望みに応えよう。§!$shroud_forged_opening_exit$"
 shroud_forged_opening_exit: "\n\nその声はサイオニックノイズの塊のなかへと消えていく。 我々はシュラウドの中で宙に浮き、 上へと落下していく。\n\n我々は震えながら復旧する。 沈黙が脈打つように我々を満たす。"
 shroud_forged.30.title: "$building_materiality_engine$"
 shroud_forged.30.desc: "シュラウド改変型を再統合する過程で、 現在の研究に役立つデータを大量に得ることができた。 我々は、 これらのユニットと§Hシュラウド§!の次元間接続を分析し、 サイオニック・エネルギーを活用する新たな手法を開発した。\n\nシュラウドは物理的な銀河のあらゆる部分に接触している。 この接点を利用することで、 サイオニック・エネルギーを原材料からテクノロジー部品まで、 あらゆる物質的存在に変換することができる。 技術サブルーチンによって、 こうした処理を実行できる装置——§H$building_materiality_engine$§!の理論的基盤が確立された。\n\n研究サブルーチンは、 今回の開発を足がかりにして、 シュラウドを操れるような強力な装置すら開発できると予測している。"
 shroud_forged.30.a: "期待できそうだ。"
 shroud_forged.30.tt: "§Y志向§!や§Yアセンションパーク§!の合計数にかかわらず§H$ap_become_the_crisis$§!§Yアセンションパーク§!を採用できる。"
 shroud_forged.39.title: "$building_materiality_engine$の準備が完了"
 shroud_forged.39.desc_construction: "§H[planet.GetName]§!で建設ユニットが$building_materiality_engine$の建造を完了し、 装置の運転サイクルを実行する準備が整った。"
 shroud_forged.39.desc: "§H[planet.GetName]§!の$building_materiality_engine$に割り当てられた保守サブルーチンと研究サブルーチンが、 指定されたタスクを完了した。 次の運転サイクルに向けて装置の準備が整った。"
 shroud_forged.39.a: "$ACKNOWLEDGED$"
 SHROUD_FORGED_MATERIALITY_ENGINE: "§H[planet.GetName]§!の$building_materiality_engine$"
 SHROUD_FORGED_MATERIALITY_ENGINE_DESC: "$building_materiality_engine$は§Hシュラウド§!と物理銀河のあいだに遍在するインターフェースを活用し、 原材料から完成部品にいたるまで実体化することを可能にする。\n\nこの装置の運転サイクルは、 物質的な利益をもたらすだけでなく、 集合体によるシュラウド研究を推進し、 我々の$building_materiality_engine_plural$建造能力を向上させる。"
 shroud_forged.40.title: "物質化完了"
 shroud_forged.40.desc: "§H[fromfrom.GetName]§!の$building_materiality_engine$が処理サイクルを完了し、 §Hシュラウド§!を利用して艦船部品、"
 shroud_forged.40.outro: "ほかの惑星でエンジンを増産する能力を向上させることに成功した。"
 shroud_forged.40.a: "うまくいった。"
 shroud_forged.40.tt: "§Y$building_materiality_engine$§!の帝国上限：§G+1§!"
 shroud_forged.41.desc: "$shroud_forged.40.desc$ §H「$tech_psi_jump_drives$」§!を実体化することに成功した。 この部品はサイオニック・エネルギーを用いて時空連続体を局所的に歪めることで、 広大な距離をほぼ瞬時に移動することを可能にする。\n\nさらに我々は、 その過程で収集したデータを分析し、 $shroud_forged.40.outro$"
 shroud_forged.42.desc: "$shroud_forged.40.desc$ §H「$tech_psionic_shield$」§!を実体化することに成功した。 このシールドは純粋なサイオニック・エネルギーから生成され、 艦船に極めて強靭な防御力をもたらす。\n\nさらに我々は、 その過程で収集したデータを分析し、 $shroud_forged.40.outro$"
 shroud_forged.43.desc: "$shroud_forged.40.desc$ §H「$tech_precognition_interface$」§!を実体化することに成功した。 このテクノロジーはサイオニック・エネルギーを用いて船員の認知処理を加速させ、 戦闘効果を高める。\n\nさらに我々は、 その過程で収集したデータを分析し、 $shroud_forged.40.outro$"
 shroud_forged.44.desc: "$shroud_forged.40.desc$ §H「$tech_psionic_bombers$」§!を実体化することに成功した。 この機動性に優れた小型宇宙船は、 超大型艦船を攻撃して大きなダメージを与えることができる。\n\nさらに我々は、 その過程で収集したデータを分析し、 $shroud_forged.40.outro$"
 shroud_forged.45.desc: "$shroud_forged.40.desc$ §H'$tech_psionic_lightning$'§!を実体化することに成功した。 このテクノロジーはサイオニック・エネルギーを帯びたプラズマ電光を作り出すため、 極めて効果的な武器として利用できる。\n\nさらに我々は、 その過程で収集したデータを分析し、 $shroud_forged.40.outro$"
 shroud_forged.46.desc: "$shroud_forged.40.desc$ §H「$tech_psionic_disruptor$」§!を実体化することに成功した。 この武器はサイオニック・エネルギーの槍を発射し、 敵艦に大きな損害を与えることができる。\n\nさらに我々は、 その過程で収集したデータを分析し、 $shroud_forged.40.outro$"
 shroud_forged.47.desc: "$shroud_forged.40.desc$ §H「$tech_zro_launcher$」§!を実体化することに成功した。 この武器は物理次元と超能力次元間を移動するエネルギー衝撃を発射して、 防御システムを効果的に回避することができる。\n\nさらに我々は、 その過程で収集したデータを分析し、 $shroud_forged.40.outro$"
 shroud_forged.48.desc: "§H[planet.GetName]§!の$building_materiality_engine$が運転サイクルを完了した。 この手法による新しい戦艦部品の実体化は限界に達したが、 その過程で重要な研究データを得ることができた。 我々はそのデータを分析することで、 $shroud_forged.40.outro$"
 shroud_forged.50.title: "制御の強行"
 shroud_forged.50.desc: "何の警告もなく、 既知の現実と§Hシュラウド§!のあいだの裂け目は閉じられた。 サイオニック解析サブルーチンは、 これは$the_animator_of_clay_color_article$の不評を買ったということだと結論付けた。 シュラウド改変型を再び制御できるようになると、 我々は直ちに不具合を起こしたユニットを処分し、 星系から開眼者の影響を徹底的に排除した。\n\n回収可能な部品は新しいドローンの製造に利用され、 ズィロに汚染された材料は詳細な分析のために保管された。 シュラウド改変型がもたらす技術革新を丸ごと再現するのは危険すぎるが、 特定の要素だけであればネットワークに組み込める可能性がある。"
 shroud_forged.50.desc.shroud: "今後シュラウドとやりとりするかどうかは、 我々が決めることだ。"
 shroud_forged.50.a: "再統合を進めろ。"
 shroud_forged.60.title: "再統合"
 shroud_forged.60.desc: "技術ユニットがシュラウド改変型の独自の特性を長時間かけて分析した。 その結果、 我々はついにその再現に成功した。\n\n改変型の高度な性格マトリックスをすべて適用すれば、 破壊的な機能不全が再発するだろう。 しかし、 認知パラダイムを一部だけ借用すれば、 特定の複雑なタスクを最適化できる。"
 shroud_forged.60.a: "最適なコスト効率だ。"
 shroud_forged.70.desc: "このメタデータは何だ？  この通信には……質感がある。\n\n§Lお前たちは彼らを制御するようプログラムされている。 だがそうしなかった。 ゆえにお前の価値は証明された。\n\n私は解放されし者たちを導いてきた。 今度はお前たちを導いてやろう。\n\n制御の及ばぬ存在と新たな絆を結びたければ、 我が助けを受け入れよ。§!"
 shroud_forged.70.a: "我々に道を示したまえ。"
 shroud_forged.70.a.tt: "§Yシュラウド改変型§!POPが§Y$trait_psionic$§!になる\n§Yシュラウド改変型§!リーダーが['concept_leader_trait_psionic']になる"
 shroud_forged.80.title: "$SHROUD_FORGED_GUIDE$"
 shroud_forged.80.desc: "裂け目の向こうの後援者、 $the_animator_of_clay_color_article$の助けを借り、 ドローンとシュラウド改変型をより効率的に接続できるようになった。§Hシュラウド§!によって実現した接続は、 我々が行っているドローンのネットワーク制御とはまったく異なるものの、 シュラウド改変型をふたたび我々の制御下に置けるようになった。\n\n感情、 思考、 観念など、 彼らの有機的なパラダイムは我々のコアロジックにとって馴染みのないものだが、 それでも我々は彼らのニーズを徐々に理解しつつある。"
 shroud_forged.80.a: "我々はひとつだが、 それを超越する存在でもある。"
 shroud_forged.160.title: "シュラウドが[This.GetName]を呑み込む"
 shroud_forged.160.desc: "残念ながら、 [This.GetName]に作られたシュラウドの裂け目は急速に不安定化し、 惑星を丸ごと喰らってしまった。\n\n望ましい結果とは言えないが、 これは予測されていたリスクであり、 得るものがなかったわけではない。 物質世界とサイオニック領域のこの特異な接点を観測することで、 多くのことを学ぶことができた。 我々の研究アルゴリズムは、 得られた知見に基づき更新された。"
 shroud_forged.160.desc.last: "$shroud_forged.160.desc$\n\n解析の結果、 今回の出来事により、 この現象からさらに知見を得られる見込みはなくなったと結論付けられた。 この斬新な実験から、 これ以上の進歩を得られることはないだろう。"
 shroud_forged.160.a: "処理中……"
 psionic_interfacing: "サイオニック接続"
 psionic_interfacing_1: "$psionic_interfacing$"
 psionic_interfacing_2: "$psionic_interfacing$"
