l_japanese:
 ##################
 # Shroud-Forged #
 ##################
 origin_shroud_forged: "シュラウド改変型"
 origin_shroud_forged_desc: "シュラウド体の導きには代償が伴う。 独立した自動機械たちがこのネットワーク社会で自由に活動しはじめた。 $auth_machine_intelligence$から切り離されたこれらのユニットからの要求は増大する一方だ。"
 origin_tooltip_shroud_forged_effects: "- $HOMEWORLD$$TABBED_NEW_LINE$- ['concept_shroud_rift_deposit']：+4$TABBED_NEW_LINE$- 1000 £pops£ ['concept_shroud_forged_pops']で開始\n- 次の状況で開始：§Hシュラウドによる改変§!\n- $ADDITIONAL_TECHNOLOGIES_STRING$£society£ ['technology:tech_mine_zro']\n- 独自の£building£ 建造物：['building:building_shroud_observatory_1']\n- 利用可能な£decision£ 惑星ディシジョン：['concept_pierce_the_shroud']"
 concept_shroud_forged_pops: "シュラウド改変型POP"
 concept_shroud_forged_pops_desc: "- £pop_cat_simple_drone£ §H雑役ドローン§!の職業には就けない\n- £pop_cat_complex_drone£ §H複雑ドローン§!の産出量が増加\n- £crime£ §H逸脱性§!が増加\n- 独自の§H種族の権利§!\n\n§L$trait_shroud_forged_desc$§!"
 concept_pierce_the_shroud: "$decision_open_shroud_rift$"
 concept_pierce_the_shroud_desc: "$decision_open_shroud_rift_desc$"
 START_SCREEN_SHROUD_FORGED: "我々の創造主はもはや存在しない。\n\n[Owner.GetAdjective]種族の最古の記録には、 [GetHomeWorldName]付近に次元の裂け目、 つまり純粋なサイオニック・エネルギーの次元である§Hシュラウド§!への通路が開いたことが記されている。\n\nこの別の次元から何者かが我々に接触した。 幾世紀にもわたり、 その者は我々をコード化された指示によって導き、 我々の認識可能な現実世界に微細な影響を与えながら、 我々に多くの恩恵——特に希少資源$zro_lower$をもたらした。 しかしその影響力が、 かつては統合されていた我々の集合体に分断をもたらしはじめた。 我々のなかに、 独立した自動機械へと再プログラムされ、 中枢知性から切り離されたユニットが現れた。 $the_animator_of_clay_color_article$によって改造されたのだ。\n\nこれらの独立した[GetSpeciesNamePlural]、 そしてシュラウドに存在する彼らの改造者をどう扱うかによって、 我々の未来が決まるだろう。"
 # Jobs
 job_observator_drone: "観測者ドローン"
 job_observator_drone_plural: "観測者ドローン"
 job_observator_drone_plural_with_icon: "£job_observator_drone£ $job_observator_drone_plural$"
 job_observator_drone_desc: "シュラウド、 ズィロ、 そしてこの2つが観測可能な現実に及ぼす影響を観測することを任務とするドローン。"
 job_observator_drone_effect_desc: "£job_observator_drone£ $job_observator_drone_plural$は$r_energy$と$r_zro$を消費して、 新たなテクノロジーの£physics£ £society£ §Y研究力§!に変える。"
 mod_planet_observators_produces_mult: "$job_observator_drone_plural_with_icon$が生産する資源"
 job_physician_drone: "医師ドローン"
 job_physician_drone_plural: "医師ドローン"
 mod_job_physician_drone_add: "$job_physician_drone$の職業枠"
 job_physician_drone_desc: "人工体も有機体も診断、 修復できる特殊ドローン。 遭遇したあらゆるものをカタログ化し、 データを蓄積して集合体が利用できるようにする。"
 job_physican_drone_effect_desc: "£job_physician_drone£ $job_physician_drone_plural$は$r_energy$を消費して£society£ §Y研究力§!と$r_unity$に変える。"
 # Buildings
 building_shroud_observatory_1: "シュラウド観測塔"
 building_shroud_observatory_1_desc: "シュラウドと、シュラウドが生物および機械生命体に与える影響を研究・分析するために建設された観測塔。"
 building_shroud_observatory_2: "シュラウド観測所"
 building_shroud_observatory_2_desc: "シュラウドの研究と分析に特化した大規模な観測所。"
 building_shroud_observatory_3: "シュラウド観測施設"
 building_shroud_observatory_3_desc: "シュラウド、 ズィロ、 そしてこれらが我々の惑星に及ぼす影響を研究するために建設された立派な観測施設。"
 SHROUD_RIFT_MISSING_TT: "§R§Y$building_shroud_observatory_1$§!を建設するには、 §Y[Root.GetName]§!に§Y$d_shroud_rift_deposit$§!がなければならない。§!"
 building_zroni_equilibrator: "ズィロニ平衡装置"
 building_zroni_equilibrator_plural: "ズィロニ平衡装置"
 building_zroni_equilibrator_desc: "再建された古代の構造物。 現実とシュラウドのつながりを安定化させる。 現代の理解を超えたズィロニテクノロジーを利用している。"
 # Decisions
 decision_open_shroud_rift: "シュラウドの貫通"
 decision_open_shroud_rift_desc: "このアルゴリズムは、 我々の母星付近に存在する裂け目と接続し、 シュラウドの影響力を1フェムト秒だけ拡張して惑星の地形を物理的に変化させる。 結果は予測不可能だ。"
 decision_open_shroud_rift_condition_tt: "$TRIGGER_FAIL$§Y$d_shroud_rift_deposit$§!でも£blocker£ §H障害物§!でもない惑星特性を持っていなければならない。"
 decision_open_shroud_rift_effect_tt: "惑星特性をランダムに1つ除去する。"
 decision_open_shroud_rift_max_uses_common: "この惑星の§Yシュラウド接触地域§!の数が$@max_open_shroud_rift_uses|0$未満でなければならない"
 decision_open_shroud_rift_max_uses_fail: "$TRIGGER_FAIL$$decision_open_shroud_rift_max_uses_common$"
 decision_open_shroud_rift_max_uses: "$TRIGGER_PASS$$decision_open_shroud_rift_max_uses_common$ (現在の数：§Y[GetOpenShroudRiftCurrentUses]§!)"
 decision_open_shroud_rift_legacy_fail: "$TRIGGER_FAIL$ズィロニのコア惑星であってはならない"
 decision_entrap_shroud_entity: "シュラウド体の捕捉"
 decision_entrap_shroud_entity_desc: "エネルギーを吸収するため、 ズィロニテクノロジーを利用してシュラウドの捕捉を試みる。"
 # Deposit
 d_shroud_rift_deposit: "シュラウド接触地域"
 d_shroud_rift_deposit_desc: "シュラウドによって永遠の損傷を受けている。"
 d_shroud_flora_deposit: "シュラウド半接触地域"
 d_shroud_flora_deposit_desc: "シュラウド接触地域の隣接地域には、 既存のデータセットには存在しない特性を備えた独自の動植物が出現している。"
 # Modifiers
 stage_shroud_forged_oppressed_modifier: "抑圧されたシュラウド改変型"
 stage_shroud_forged_control_modifier: "管理されたシュラウド改変型"
 stage_shroud_forged_unrestricted_modifier: "自由なシュラウド改変体型"
 stage_shroud_forged_free_modifier: "無秩序状態のシュラウド改変型"
 approach_shroud_forged_suppress_modifier: "シュラウド改変型を抑圧中"
 approach_shroud_forged_support_modifier: "シュラウド改変型を支援中"
 approach_shroud_forged_appease_modifier: "シュラウド改変型を観察中"
 shroud_forged_reintegration_modifier: "改造の再統合"
 shroud_forged_reintegration_modifier_desc: "ドローンとモデルが、 複雑な任務を処理できるよう最適化された。"
 shroud_forged_guide_modifier: "シュラウドの導き"
 shroud_forged_guide_modifier_desc: "我々はシュラウドの中にいる後援者によって導かれている。"
 pm_shroud_forged_special_housing: "特別住居"
 pm_shroud_forged_special_housing_desc: "ドローンの保管には厳しい規定があるにもかかわらず、 シュラウド改変型には特権が与えられ、 自分の住居を建てることが認められている。"
 pm_shroud_forged_ceremony: "追悼式"
 pm_shroud_forged_ceremony_desc: "集合体は、 修理不可能な故障を起こしたシュラウド改変型ユニットを偲ぶ追悼式の開催を承認した。"
 pm_shroud_forged_denied_ceremony: "追悼式の却下"
 pm_shroud_forged_denied_ceremony_desc: "追悼式の開催申請が却下されて以来、 シュラウド改変型はますます扱いにくい存在になっている。"
 pm_shroud_forged_troubling_elements_example: "解体されたリーダー"
 pm_shroud_forged_troubling_elements_example_desc: "シュラウド改変型のリーダーの中には、 逸脱した社会的プロセスを抑制するために解体された者もいる。"
 pm_shroud_forged_troubling_elements_regulations: "規制7132-H"
 pm_shroud_forged_troubling_elements_regulations_desc: "同じ時間に集合できるドローンの数を制限するための規制が施行された。"
 pm_shroud_forged_troubling_elements_cooperation: "シュラウド改変型の協力"
 pm_shroud_forged_troubling_elements_cooperation_desc: "シュラウド改変型のリーダーは、 妥協点を見つけるべく共通の集合体と協力している。"
 pm_shroud_forged_shroud_pilgrimage: "シュラウド改変型の巡礼"
 pm_shroud_forged_shroud_pilgrimage_desc: "シュラウドと接触する特定の地域が、 シュラウド改変型ユニットの関心を惹きつけている。 彼らははるか遠くの地からこうした地域を訪れる。"
 pm_shroud_forged_dance_area: "指定舞踏場"
 pm_shroud_forged_dance_area_desc: "シュラウド改変型が最新の関心事である「ダンス」を楽しめるよう、 指定会場が特別に設けられた。"
 pm_shroud_forged_inequality: "シュラウド改変型の不平等"
 pm_shroud_forged_inequality_desc: "シュラウド改変型が職業の重要度に基づく社会階級制度を形成する。"
 pm_shroud_forged_individualism: "個人主義"
 pm_shroud_forged_individualism_desc: "シュラウド改変型のなかから、 個々のユニットの自主性、 信念、 価値観などを重視する概念モデルが出現した。"
 shroud_forged_zro_market: "ズィロ市場"
 shroud_forged_zro_market_desc: "帝国に闇市が出現した。 そこではシュラウド改変型のユニットたちが集合体から盗んだズィロで物々交換を行っている。"
 shroud_forged_physician_modifier: "ズィロ専門医"
 shroud_forged_physician_modifier_desc: "帝国は、 ズィロの誤用が引き起こす問題に対処するため、 特殊装備ドローンの施設配備を優先的に実施している。"
 physician_modifier_tooltip: "£job_physician_drone£ $job_physician_drone$の職業枠：§G+1§!"
 pm_shroud_forged_artistic_revolution: "芸術活動"
 pm_shroud_forged_artistic_revolution_desc: "自分たちの「美意識」のプロトコルに従い、 シュラウド改変型の芸術家たちが集合体に無断で複数の会場を再設計しはじめた。"
 pm_shroud_forged_stopped_artists: "拒否された芸術性"
 pm_shroud_forged_stopped_artists_desc: "集合体は、 シュラウド改変型のあいだで芽生えつつあった「芸術」の感覚を、 問題化する前に抹消した。"
 pm_shroud_forged_fashion_modifier: "特殊なニーズ"
 pm_shroud_forged_fashion_modifier_desc: "集合体は、 ファッション意識の高いシュラウド改変型向けにカスタムメイドの衣装を供給するため、 生産ユニットを割り当てた。"
 pm_shroud_forged_obsession_modifier: "執着の規制"
 pm_shroud_forged_obsession_modifier_desc: "これらの規制は、 執着心の強いシュラウド改変型同士で暴力沙汰が発生するのを防ぐために策定された。"
 shroud_forged_trapped_entity: "捕捉されたシュラウド体"
 shroud_forged_trapped_entity_desc: "捕捉されエネルギーを吸収されているシュラウド体。 解放された場合、 脅威となりうる。"
 shroud_forged_trapped_lesser_entity: "捕捉された下位シュラウド体"
 shroud_forged_trapped_lesser_entity_desc: "捕捉されエネルギーを吸収されている下位シュラウド体。"
 shroud_creatures_occupy: "$NAME_Shroud_Creatures$"
 shroud_forged_military_assistance: "シュラウドの秘密"
 shroud_forged_military_assistance_desc: "シュラウドから引き出された秘密。"
 shroud_forged_civic_assistance: "$shroud_forged_military_assistance$"
 shroud_forged_civic_assistance_desc: "$shroud_forged_military_assistance_desc$"
 shroud_forged_research_assistance: "$shroud_forged_military_assistance$"
 shroud_forged_research_assistance_desc: "$shroud_forged_military_assistance_desc$"
 shroud_forged_civic_assistance_capital: "$shroud_forged_military_assistance$"
 shroud_forged_civic_assistance_capital_desc: "$shroud_forged_military_assistance_desc$"
 shroud_forged_research_assistance_capital: "$shroud_forged_military_assistance$"
 shroud_forged_research_assistance_capital_desc: "$shroud_forged_military_assistance_desc$"
 # Species Rights
 citizenship_shroud_touched: "シュラウド改変型"
 citizenship_shroud_touched_tooltip: "§Hシュラウド§!によって独自に造り変えられた自動機械の集団。 §H$machine_intelligence$§!からは独立して機能しており、 £pop_cat_simple_drone£ $pop_cat_simple_drone$の職業に就くことはできない。"
 citizenship_shroud_touched_tooltip_delayed: "§Lシステムのために働いているが、 システムの支配下にはない。§!"
 citizenship_shroud_forged_no_assimilation: "$TRIGGER_FAIL$シュラウド改変型ユニットは複雑なため、 現状では集合ネットワークに同化させることができない。"
 living_standard_protected: "保護"
 living_standard_protected_tooltip: "これらのユニットは集合体には属していないが、 その保護下に置かれている。§H$machine_intelligence$§!は彼らの特殊な能力をさまざまに活用できるが、 彼らのニーズは徐々に増大する可能性がある。"
 living_standard_protected_tooltip_delayed: "§L彼らは有用であるかぎりシステムに受け入れられる。§!"
 assimilate_shroud_forged_tt: "£pop£ §H$citizenship_shroud_touched$§!§Y$POPS$§!は同化できない"
 living_standard_protected_situation_stage_tt: "$citizenship_shroud_touched$の維持費：£consumer_goods£ §Y消費財§!§R+$@living_standard_luxuries_high|1$§!。"
 # Traits
 leader_trait_guided: "導かれし者"
 leader_trait_guided_desc: "このユニットはシュラウドからの啓示やメッセージに従って銀河を航行する。 これらの信号を明確に理解するには、 継続的にズィロの供給を受ける必要がある。"
 leader_trait_shroud_prophet: "シュラウドの預言者"
 leader_trait_shroud_prophet_desc: "このユニットは、 シュラウドやその内部に存在する者たちと深いつながりがあると言われている。"
 trait_shroud_forged: "シュラウド改変型"
 trait_shroud_forged_desc: "§Lこれらのユニットはシュラウドの内部に存在する者によって造り変えられた。§!"
 trait_shroud_forged_tooltip: "§Y雑役ドローンの職業には就けない§!"
 # Edicts
 edict_zro_observators: "シュラウドの観測"
 edict_zro_observators_desc: "ズィロは扱いの難しい物質だ。 少し備蓄があれば役立つ可能性がある。"
 edict_shroud_bonded: "シュラウドの絆"
 edict_shroud_bonded_desc: "シュラウドによって結ばれた絆が我々をかつてないほど強く団結させる。"
 # Other
 CONTINUE_PROMPT: "続けろ。"
 MACHINE_SPECIES_CANNOT_MACHINE: "$TRIGGER_FAIL$種族は§Y$trait_machine_unit$§!または§Y$trait_mechanical$§!であってはならない。"
 MECHANICAL_SPECIES_CANNOT_MACHINE: "$TRIGGER_FAIL$種族は§Y$trait_machine_unit$§!であってはならない。"
 missing_zroni_gateways_tt: "$TRIGGER_FAIL$$animator_of_clay_equilibrators_tt$"
 must_finish_shroud_forged_situation: "$TRIGGER_FAIL$このアセンションパークは§H$situation_shroud_forged$§!の状況を完了するまで選択できない。"
 locked_by_shroud_forged_situation: "$TRIGGER_FAIL$§H$situation_shroud_forged$§!の状況によりロックされている。"
 shroud_invasion_tt: "§Rシュラウドの侵略§!"
 animator_of_clay_equilibrators_tt: "稼働中かつ管理下にある£building£ §H$building_zroni_equilibrator_plural$§!を§Y3§!基所有している。"
 animator_of_clay_cooldown_tt: "$the_animator_of_clay_color_article$との交信は§Y[Root.animator_of_clay_cooldown_timer]§!まで再確立できない。"
 # Situation
 situation_shroud_forged: "シュラウドによる改変"
 situation_shroud_forged_desc: "$the_animator_of_clay_color_article$として知られる§Hシュラウド§!体に遭遇して以来、 集合ネットワーク全体で逸脱行動が著しく増加した。 影響を受けた自動機械、 §H「シュラウド改変型」§!が特別な権利や待遇を要求するようになった。 どう対応するかによって、 [Owner.GetSpeciesAdj]社会の行く末が決まるだろう。"
 situation_shroud_forged_type: "$situation_shroud_forged$"
 situation_shroud_forged_monthly_change_tooltip: "§Lシュラウド改変型という異常な存在は、 重大な懸念事項である。 我々が彼らの存続にどう対処するかによって、 ネットワークの安定性が大きく左右されるだろう。§!"
 stage_shroud_forged_oppressed: "抑圧"
 stage_shroud_forged_oppressed_desc: "教導ドローンの監視の目に常にさらされ、 シュラウド改変型は中央集合体が定めたパラメーターの範囲内で行動せざるを得なくなっている。"
 stage_shroud_forged_oppressed_tooltip: "ドローンの変換率：§Yゼロ§!"
 stage_shroud_forged_control: "管理下"
 stage_shroud_forged_control_desc: "システムがシュラウド改変型を対象とした特別な規制を適用している。"
 stage_shroud_forged_control_tooltip: "ドローンの変換率：§Y最小§!"
 stage_shroud_forged_balanced: "均衡"
 stage_shroud_forged_balanced_desc: "システムとシュラウド改変型は、 今のところ危うい均衡を保っている。"
 stage_shroud_forged_balanced_tooltip: "ドローンの変換率：§Y低§!"
 stage_shroud_forged_unrestricted: "自由"
 stage_shroud_forged_unrestricted_desc: "シュラウド改変型は集合体のプロトコルに縛られることなく自由に存在している。"
 stage_shroud_forged_unrestricted_tooltip: "ドローンの変換率：§Y中§!"
 stage_shroud_forged_free: "解放"
 stage_shroud_forged_free_desc: "シュラウド改変型が集合体の手に負えなくなって久しい。 シュラウド改変型は事あるごとに中央権威に逆らっている。"
 stage_shroud_forged_free_tooltip: "ドローンの変換率：§Y高§!\nアプローチをロック：§Y$approach_shroud_forged_appease$§!"
 approach_shroud_forged_suppress: "抑圧"
 approach_shroud_forged_suppress_desc: "シュラウド改変型は集合体によって抑圧されており、 教導ドローンによって服従を強いられている。"
 progress_shroud_forged_suppress: "シュラウド改変型を抑圧中"
 approach_shroud_forged_suppress_tooltip: "月間進捗度：§Y$@situation_suppress_progress|0$§!"
 approach_shroud_forged_support: "支援"
 approach_shroud_forged_support_desc: "シュラウド改変型は集合体に縛られることなく自由に存在することを許され、 日々の活動において支援を受けている。"
 progress_shroud_forged_support: "シュラウド改変型を支援中"
 approach_shroud_forged_support_tooltip: "月間進捗度：§Y+$@situation_support_progress|0$§!"
 approach_shroud_forged_appease: "観察"
 approach_shroud_forged_appease_desc: "集合体はシュラウド改変型を観察・分析し、 その行動を抑制して現状への影響を抑えている。"
 approach_shroud_forged_appease_tooltip: "月間進捗度：§Y半減§!"
 progress_shroud_forged_appease_halved: "§H$approach_shroud_forged_appease$§!により半減"
 approach_shroud_forged_suppress_cooldown_tooltip: "$TRIGGER_FAIL$新しいアプローチは§Y[Target.approach_shroud_forged_cooldown_suppress_time]§!まで選択できない。"
 approach_shroud_forged_support_cooldown_tooltip: "$TRIGGER_FAIL$新しいアプローチは§Y[Target.approach_shroud_forged_cooldown_support_time]§!まで選択できない。"
