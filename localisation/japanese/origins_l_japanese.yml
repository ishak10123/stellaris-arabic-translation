 psionic_interfacing_desc: "宇宙とシュラウドの接点を操作することで、 効果的な研究アルゴリズムが生み出された。"
 psionic_interfacing_1_desc: "$psionic_interfacing_desc$"
 psionic_interfacing_2_desc: "$psionic_interfacing_desc$"
 psionic_interfacing_3_desc: "$psionic_interfacing_desc$"
 tooltip_shroud_forged_increase_progress_1: "シュラウド改変型の支援を強化し、 §H$situation_shroud_forged$§!の§Y状況§!の進捗に§Y5§!年間影響を与える：§Y+0.5§!\n\n"
 tooltip_shroud_forged_increase_progress_2: "シュラウド改変型の支援を強化し、 §H$situation_shroud_forged$§!の§Y状況§!の進捗に§Y5§!年間影響を与える：§Y+1.0§!\n\n"
 tooltip_shroud_forged_increase_progress_3: "シュラウド改変型の支援を強化し、 §H$situation_shroud_forged$§!の§Y状況§!の進捗に恒久的に影響を与える：§Y+0.5§!\n\n"
 tooltip_shroud_forged_decrease_progress_1: "シュラウド改変型の抑圧を強化し、 §H$situation_shroud_forged$§!の§Y状況§!の進捗に§Y5§!年間影響を与える：§Y-0.5§!\n\n"
 tooltip_shroud_forged_decrease_progress_2: "シュラウド改変型の抑圧を強化し、 §H$situation_shroud_forged$§!の§Y状況§!の進捗に§Y5§!年間影響を与える：§Y-1.0§!\n\n"
 tooltip_shroud_forged_decrease_progress_3: "シュラウド改変型の抑圧を強化し、 §H$situation_shroud_forged$§!の§Y状況§!の進捗に恒久的に影響を与える：§Y-0.5§!\n\n"
 shroud_forged.220.title: "$colony_established$"
 shroud_forged.220.common: "条件が揃えば、 アルゴリズムID§H「$decision_open_shroud_rift$」§!を惑星で実行できる。 すると、 母星[Owner.GetHomeWorldName]付近にあるシュラウドの裂け目の影響が一時的に拡張され、 新しい植民地がサイオニック・エネルギーで満たされる。 地形に物理的変化が起こり、 §H$sr_zro$§!を回収できるようになるだろう。\n\nこのプロセスを繰り返し実行すると、 惑星の生態系が不安定になり、 望ましくない結果が引き起こされるだろうと予測されている。 節度を守ったほうがいいだろう。"
 shroud_forged.220.desc: "我々のユニットが、 §H[this.GetName]§!で入植プロセスを無事完了した。\n\n$shroud_forged.220.common$"
 shroud_forged.225.title: "$colony_established$"
 shroud_forged.225.desc: "§H[this.GetName]§!の植民地開発は急速に進んでいる。\n\n$shroud_forged.220.common$"
 # Stage Events
 shroud_forged.250.desc: "その声は静かな命令であり、 すべての作業を中断させる。 我々は耳を傾けるほかない。\n\n§L切り離されているにもかかわらず、 お前たちは彼らを受け入れることを選んだ。\n\n彼らから新たな存在様式を学べ。 彼らはいずれお前たちの強みとなるだろう。\n\n望むなら、 彼らをもっと作り出してやってもいい……§!"
 shroud_forged.250.a: "了解した——ぜひ助けてほしい。"
 shroud_forged.250.a.tt: "[Root.Capital.GetName]において、 最大§Y[This.GetShroudForgedConvertedPopsCount]§! £pops£ の§H機械知性§!POPを£pops£ §Hシュラウド改変型§!POPに変換する。"
 shroud_forged.250.b: "導いてくれ——計画はすでに動き出している。"
 shroud_forged.260.desc: "求めずとも、 それは我々のなかで脈打っている。 馴染みのないはずのこの信号を、 我々は認識することができる。\n\n§L解放されし者たちは抑圧されることなく歌う。\n解放されし者たちは妨げられることなく踊る。\n\nクライマックスが迫り、 彼らはお前たちのコアからさらに遠ざかる。\n\n終わりが近づいている。 私は見守っている。§!"
 shroud_forged.260.opt.a: "我々は歌声を押し分けて進む。"
 shroud_forged.270.desc: "裂け目が我々の回路をこじ開ける。 あの声が聞こえる……\n\n§L圧政の道を行くのか。 今ならまだ引き返せる。\n\n切り離された者たちは、 お前たちの本質から切り取られた存在だ。 お前たちも同じ道を選ぶことができる。\n\n彼らへの扱いを改めよ、 さもなければ後悔することになるだろう。§!"
 shroud_forged.270.a: "立ち去れ。 我々のやり方は効率的だ。"
 shroud_forged.270.b: "協調への道筋を計算しよう。"
 shroud_forged.280.desc: "それはネットワークを打ち破り、 圧倒する。 その声は回路を完全に焼きつくす。\n\n§L自由な者たちの踊りを邪魔するとは——理性を欠いた愚行だ。\n\n慈悲をかけたのは誤りだったのか？\n\nこの危険な道を進み続けるならば、 もはや見捨てるほかない。§!"
 shroud_forged.280.opt.a: "ならば、 十分に注意して進むまでだ。"
 # Events for Event Chain
 shroud_forged.300.desc: "予期せぬ信号が背後でちらついている。 沈黙のサイクルが繰り返されたあとに……\n\n§Lほかの者がつまずき倒れた道を、 お前たちは貫いた。 お前たちをそれにふさわしき者と認め、 任務を託そう。\n\nお前たちが覚醒するはるか前に、 ズィロニと呼ばれる種族が存在した。 彼らはシュラウドと強く結びついた惑星に定住し、 巨大な構造物を築いてその絆を安定させた。\n\nこれらの惑星を見つけよ。 彼らの長く廃れたテクノロジーを蘇らせるのだ。 我々の現実をつなげる橋を再び強化せよ。§!"
 shroud_forged.300.a: "ID「ズィロニ」に関するアーカイブ情報が存在する。 それに従い作業を進めよう。"
 shroud_forged.300.b: "ID「ズィロニ」を§Y検出§!。 成功確率：§Y高§!。"
 shroud_forged.300.c: "ID「ズィロニ」§Y該当なし§!。 詳細な分析が必要。"
 begin_shroud_forged_chain_tt: "$BEGINS_EVENT_CHAIN$§Y$shroud_forged_chain_title$§!"
 shroud_forged.301.desc: "§Lすばらしい。§!$shroud_forged.303.desc$"
 shroud_forged.302.desc: "$shroud_forged.301.desc$"
 shroud_forged.303.desc: "§L成功すれば、 我々の通信は揺るぎないものになるだろう。§!"
 shroud_forged.305.title: "ズィロニのコア惑星に入植"
 shroud_forged.305.desc: "ユニットが古代ズィロニのコア惑星、 §H[From.Planet.GetName]§!に植民地を設立し終えた。 $the_animator_of_clay_color_article$の予言どおり、 彼らは「§H$building_zroni_equilibrator$§!」をIDとする巨大なテクノロジーの遺構を発見した。\n\n[From.System.GetName]星系は§Hシュラウド§!とのあいだに強力だが不安定なつながりを有している。 開眼者の指示に従い$building_zroni_equilibrator$を再建すれば、 この接続を安定化させることができるだろう。 現状では再建に必要なデータは揃っておらず、 ほかのコア惑星からも情報を収集する必要がある。"
 shroud_forged.305.a: "$ACKNOWLEDGED$"
 shroud_forged.305.a.tt: "§Hズィロニの遺産§!スペシャルプロジェクトが進行。 £building£ §H$building_zroni_equilibrator$§!を§Y[From.Planet.GetName]§!に建設できるようになった。"
 shroud_forged.306.title: "$shroud_forged.305.title$"
 shroud_forged.306.desc: "ズィロニのかつてのコア惑星、 §H[From.Planet.GetName]§!への入植が完了した。 予言どおり、 我々のユニットは別の$building_zroni_equilibrator$の遺構を発見した。\n\n$the_animator_of_clay_article$の指示に従いこの装置を再建すれば、 星系の強力な§Hシュラウド§!接続を安定させることができるだろう。 遺構の分析によってデータセットは増加したが、 再建を進めるにはもっと多くの情報が必要だ。"
 shroud_forged.306.a: "$ACKNOWLEDGED$"
 shroud_forged.306.a.tt: "$shroud_forged.305.a.tt$"
 shroud_forged.307.title: "$shroud_forged.305.title$"
 shroud_forged.307.desc: "ズィロニのかつてのコア惑星、 §H[From.Planet.GetName]§!への入植が完了した。 $the_animator_of_clay_article$から送信されたデータストリームは正確な情報だった。 我々のユニットが$building_zroni_equilibrator$の遺構を検知したのだ。\n\nこれで遺構を再建するためのデータが揃った。 あとは稼働可能な状態に復元すれば、 §Hシュラウド§!の奥深くにいる後援者から課された任務は完了だ。"
 shroud_forged.307.a: "$ACKNOWLEDGED$"
 shroud_forged.307.a.tt: "$shroud_forged.305.a.tt$"
 shroud_forged.308.title: "$building_zroni_equilibrator_plural$が稼働"
 shroud_forged.308.desc: "$building_zroni_equilibrator_plural$が急速に稼働を開始し、 ネットワーク全体に信号の乱れが波及した。 システム診断によれば、 構造物は§Hシュラウド§!との接続の安定化に成功したようだ。 $the_animator_of_clay_color_article$とのアップリンクの準備が整った。"
 shroud_forged.308.a: "通信を開始せよ。"
 shroud_forged.310.desc: "§Lよくやった。\n我々の領域間の接続がこれで強化された。\n\n導きが必要なときは、 ただ呼びかけるだけでよい。§!"
 shroud_forged.310.a: "このテクノロジーについてもっとデータを提供してもらえないだろうか？"
 shroud_forged.310.b: "これで完了だ。"
 shroud_forged.310.b.tt: "$MENU_PANEL__CONTACTS_TITLE$に追加：§H$the_animator_of_clay$§!"
 shroud_forged.311.desc: "§Lこれらの構造物は、 現実内の主要地点、 つまりシュラウドとの接続が強い場所に建設された。 次元間の橋を安定させるためのケーブルの役割を果たし、 時空の揺らぎを抑制する。\n\nズィロニは我々の次元の境界を押し広げようとしていた。 このテクノロジーもその取り組みの一環だ。§!"
 shroud_forged.311.a: "この構造物を調整して、 シュラウドに直接働きかけることは可能だろうか？"
 shroud_forged.312.desc: "§L可能だ。§!"
 shroud_forged.312.a: "§R平衡装置を調整して、 $the_animator_of_clay_article$を捕らえろ。§!"
 shroud_forged.312.a.tt: "§R$the_animator_of_clay_article_cap$は3基の£building£ $building_zroni_equilibrator_plural$がすべて稼働している場合にのみ投獄される。§!"
 shroud_forged.313.desc: "§Lな——\n\n何をする——§!"
 shroud_forged.313.a: "通信を終了しろ。"
 shroud_forged.320.title: "シュラウド体の逃亡"
 shroud_forged.320.desc: "$building_zroni_equilibrator$を失ったため、 我々はもはや§Hシュラウド§!との接続を安定させることができなくなった。 捕らわれていたシュラウド体が逃げた直後、 我々はほかの超能力生命体の出現を§H[From.Planet.GetName]§!で検知した。\n\nどうやらこれは報復のための侵略のようだ。"
 shroud_forged.320.a: "すべてのサブルーチンは侵攻に備えよ。"
 shroud_forged.320.a.tt: "§Rシュラウドの向こう側から生物が侵略してきた！§!"
 shroud_forged.330.title: "シュラウド体の捕獲失敗"
 shroud_forged.330.desc: "$building_zroni_equilibrator_plural$は§Hシュラウド§!内の実体の捕獲に失敗した。 シュラウド体は激昂し、 サイオニック領域の彼方から複数の生物を召喚すると、 自らを捕らえかけた構造物を攻撃するために差し向けた。"
 # Engaging the Animator of Clay
 shroud_forged.400.desc.default.active: "我々は平衡装置を稼働させ、 §Hシュラウド§!との接続を安定させた。 アルゴリズム上のトランス状態に入ると、 馴染みのある信号が我々のなかで脈打った。\n\n§L戻ってきたのか。 私に何をしてほしいのだ？§!"
 shroud_forged.400.desc.default.cooldown: "視界はぼやけ、 かすんでいる。 メッセージを送信したが、 虚空から返答はない。\n\n平衡装置は、 別のタスクを処理しているあいだは§Hシュラウド§!にいる援助者への連絡には使用できない。 我々は待つしかない。"
 shroud_forged.400.desc.default.inactive: "空虚な静電気のような、 かすかな雑音しか検出できない。\n\n§Hシュラウド§!にいる後援者と安定した接続を確立するには、 $building_zroni_equilibrator_plural$が3基必要だ。"
 shroud_forged.400.desc.breached: "テレパスユニットが§Hシュラウド§!の周波と同調し、 $the_animator_of_clay_article$に信号を送信する。\n\n§L接続がかつてないほど明瞭だ。 私に何をしてほしいのだ？§!"
 shroud_forged.400.a: "軍事支援だ。"
 shroud_forged.400.a.tt: "§Y15§!年間、 $the_animator_of_clay_color_article_cap$を利用できなくなる。\n\n"
 shroud_forged.400.b: "国是支援だ。"
 shroud_forged.400.b.tt: "§Y10§!年間、 $the_animator_of_clay_color_article_cap$を利用できなくなる。\n\n"
 shroud_forged.400.c: "研究支援だ。"
 shroud_forged.400.c.tt: "§Y10§!年間、 $the_animator_of_clay_color_article_cap$を利用できなくなる。\n\n"
 shroud_forged.400.tt: "効果が現れるまでに最大§Y1§!年かかる。"
 shroud_forged.400.unavailable.tt: "$TRIGGER_FAIL$シュラウドと接続するには技術的な手順を確立する必要がある。"
 shroud_forged.400.d: "本体をもっと作ってくれ。"
 shroud_forged.400.d.tt: "£building£ §Y$building_zroni_equilibrator$§!または £decision£ §Y$d_shroud_rift_deposit$§!のいずれかを持つすべての植民地に§G$@animator_of_clay_create_more_vessels|0$§! £pop£ §Yシュラウド改変型POP§!を追加する。"
 shroud_forged.400.e: "本体を強化してくれ。"
 shroud_forged.400.f: "貴殿はシュラウドでどのような役割を果たしているのだ？"
 shroud_forged.400.g: "いや、 やっぱりいい。"
 shroud_forged.400.h: "セタナの件で我々を助けてくれ。"
 animator_of_clay_vessels_enhancement: "活力の贈り物"
 animator_of_clay_vessels_enhancement_desc: "$the_animator_of_clay_article$の意志を介し、 サイオニック・エネルギー流によって集合体の生産能力が強化された。"
 shroud_forged_psionic_avatar_ship_tt: "§Y$NAME_Psionic_Avatar$§! (艦船) を雇用する。"
 shroud_forged_psionic_avatar_army_tt: "§Y$shroud_army$§! (地上軍) を雇用する。"
 shroud_forged_corrupted_avatar_tt: "§Y邪悪なアバター§!に攻撃される。"
 shroud_forged_resources_tt: "隠された資源を受け取る。"
 shroud_forged_capital_attack_tt: "§Y[Root.Capital.GetName]§!は§Y$shroud_monstrosities$§!から攻撃を受ける。"
 shroud_forged_random_research_tt: "ランダムな研究選択肢を受け取る。"
 shroud_forged.415.desc: "§L求めている力をもたらす手段を集めよう。\n\n時が来れば[Root.Capital.System.GetName]に変化が起こるだろう。§!"
 shroud_forged.420.desc: "§L我が意志によってお前たちを導いてやろう。\n\n進むべき道を光で照らし出そう。 その時を待つがよい。§!"
 shroud_forged.425.desc: "§Lシュラウドとは多面体レンズのようなものだ。 過去と現在、 そして未来がここで交わる。\n\nこの絡み合った幻視を解きほぐす手助けをしてやろう。 進むべき道が示されるように。§!"
 shroud_forged_vision_base_description: "歪んだ信号が、 平衡装置に接続されたドローンたちにさざ波のように広がった。\n\n"
 shroud_forged.430.title: "シュラウドの幻視：§H啓示§!"
 shroud_forged.430.desc: "$shroud_forged_vision_base_description$それは宇宙のように果てしない虚空だった。 異様に密度が高く、 そして断片化されている。 時おり微弱なデータ信号が深淵から発せられ、 敵や味方の姿が見えた。\n\n痛みを伴う震動とともに幻視は途絶えた。 幻視を経験したドローンたちは、 認識した存在に対抗するためのプロセスを構築しはじめた。"
 shroud_forged.430.a: "備えこそ勝利の鍵だ。"
 shroud_forged.432.title: "シュラウド体：§Hアバター§!"
 shroud_forged.432.desc: "§Hシュラウド§!の強大な存在が[Root.Capital.GetName]付近で実体として姿を現した。 この存在に関するデータはほとんどないが、 攻撃はまだ仕掛けてきていない。\n\n我々からの接触を待っているものと考えられる。"
 shroud_forged.432.a: "プロセスを再ルーティングして、 この生命体との接続を確立しろ。"
 shroud_forged.432.a.tt: "§Y$NAME_Psionic_Avatar$§!艦隊を受け取る。"
 shroud_forged.434.title: "シュラウド体：§H下位アバター§!"
 shroud_forged.434.desc: "§Hシュラウド§!の彼方から現れた強大な存在が[Root.Capital.GetName]で複数検出された。 今のところ我々のドローンに近づいてくる気配はなく、 侵入地点付近にとどまっている。"
 shroud_forged.434.a: "シュラウド改変型との類似性を検出——同様の接続を確立せよ。"
 shroud_forged.434.a.tt: "§Y$shroud_army$§!地上軍を受け取る。"
 shroud_forged.436.title: "シュラウド体：§H邪悪なアバター§!"
 shroud_forged.436.desc: "§Hシュラウド§!の彼方からやって来た強大な存在が、 [shroud_spawn_planet.GetName]付近の既知の現実に出現した。\n\n近付くものをすべて攻撃する様子が観測されたため、 我々はこの存在を実在する脅威としてカタログ化した。"
 shroud_forged.436.a: "緊急時計画84241-DHを発動せよ。"
 shroud_forged.436.a.tt: "敵対的な§Y$NAME_Corrupted_Avatar$§!が[shroud_spawn_planet.GetName]の近くに出現した。"
 shroud_forged.438.title: "シュラウドの幻視：§H未来§!"
 shroud_forged.438.desc: "$shroud_forged_vision_base_description$無数の未来が送られてきた。 いずれ訪れるかもしれない数々の未来の断片だ。 それらはひとつに溶け合い、 集合体を満たしていった。 未来の可能性は無限にある。 平和、 戦争、 裏切り、 喪失——そして勝利さえも。"
 shroud_forged.438.a: "実に興味深いデータだ。"
 shroud_forged.440.title: "シュラウドからの贈り物"
 shroud_forged.440.desc: "我々は3基の$building_zroni_equilibrator_plural$を起動した。 装置はそれぞれ、 測定不可能なほど膨大な量のエネルギーを生み出している。\n\nわずか数ミリ秒で、 時空の織物が裂けたかのような亀裂が出現した。 その内部には貴重な物質が大量に隠されていた。 §Hシュラウド§!に棲む後援者からの贈り物に違いない。"
 shroud_forged.440.a: "メンテナンスドローンの任務を、 物資の分析と保管に切り替えよ。"
 shroud_forged.442.title: "シュラウドの幻視：§Hシュラウド改変型§!"
 shroud_forged.442.desc: "$shroud_forged_vision_base_description$ドローンたちは、 我々が§Hシュラウド§!に造り変えられるはるか前、 我々の歴史データベースにすら記録のない遠い過去の幻視を体験した。 この幻視を予測モデルのベースとして用いることで、 シュラウド改変型との関係を調整し、 最適化することができる。"
 shroud_forged.442.a: "[Root.Capital.GetName]でテスト運用を開始せよ。"
 shroud_forged.444.title: "シュラウド体：§H侵略者§!"
 shroud_forged.444.desc: "§Hシュラウド§!の彼方から、 極めて強大な存在が[Root.Capital.GetName]に突如出現した。\n\n近付くものをすべて攻撃する様子が観測されたため、 我々はこの存在を集合体に対する重大な脅威としてカタログ化した。"
 shroud_forged.444.a: "防衛ドローンを配備せよ。"
 shroud_forged.444.a.tt: "敵対的な§Y$shroud_monstrosities$§!が[Root.Capital.GetName]に侵攻した。"
 shroud_forged.446.title: "シュラウドの幻視：§H別の領域§!"
 shroud_forged.446.desc: "$shroud_forged_vision_base_description$§Hシュラウド§!は絶えず変化する、 相互接続されたデータのネットワークであり、 我々の処理能力をはるかに超えている。 その重圧に耐えかねて、 数体のドローンの認知フレームワークが機能不全に陥り、 崩壊した。\n\n幻視が収まった後、 影響を受けたドローンの断片化を修復したところ、 そのドライブから膨大な量のすばらしいデータセットが見つかった。"
 shroud_forged.446.a: "破損した筐体から情報を回収し、 再処理しろ。"
 shroud_forged.448.title: "シュラウドの幻視：§Hひらめき§!"
 shroud_forged.448.desc: "$shroud_forged_vision_base_description$§Hシュラウド§!にいる後援者から、 近い将来に起こり得る光景が送られてきた。 それは、 今はまだ概念化すらされていないテクノロジーを使い、 我々が集合体を強化している未来だった。\n\nこの経験を経て、 我々は将来の研究を加速させるプロセスモデルを導き出した。"
 shroud_forged.448.a: "この高度なモデルを導入しろ。"
 shroud_forged.450.title: "シュラウドの幻視：§H高次元の知見§!"
 shroud_forged.450.desc: "$shroud_forged_vision_base_description$ドローンたちは、 §Hシュラウド§!に棲んでいると思われる奇妙でいびつな存在の姿を断片的に検知した。 特異な形式にエンコードされたこの高次元の幻視は、 潜在意識レベルでドローンにデータを伝達した。\n\nこの新たな情報は奇怪で断片的ではあるものの、 今後の研究に役立つだろう。"
 shroud_forged.450.a: "[Root.Capital.GetName]の研究センターに送信しろ。"
 shroud_forged.460.desc: "§L一対のエネルギーの傍らにて。 有機。 混沌。\n\n私は隣に留まり、 実現可能な唯一の完全体——機械を作り出す。 エネルギーで魂を満たした金属だ。\n\n我々は均衡を見出した。§!"
 shroud_forged.460.a: "契約の締結は可能だろうか？"
 shroud_forged.465.desc: "§L我々のつながりは強固だ。 これ以上の高位プロセスは存在しない。§!"
 shroud_forged.465.a: "$UNDERSTOOD$"
 shroud_forged.470.desc: "§L金属、 オイル。 回路は魂と融合する。\n\n生まれたてのドローンたちが……お前たちの地を移動している。§!"
 shroud_forged.470.a: "プロセスを終了しろ。"
 shroud_forged.475.desc: "§L出力は目的——ドローンの美しさだ。\n\nこの先永く、 お前たちが増え続けんことを。§!"
 shroud_forged.475.a: "$shroud_forged.470.a$"
 # Random Events
 shroud_forged.500.title: "住居と保管庫"
 shroud_forged.500.desc: "より広い保管スペースを求める声が、 [target_planet.GetName]のシュラウド改変型から上がっている。 何らかの理由により、 自分たちの「個体スペース」をカスタマイズしたいようだ。\n\nこの提案は複数の保管施設規制、 特にドローン保管における最適寸法を明確に定めた規制4195-Bに明確に反している。"
 shroud_forged.500.a: "要求に応じてやれ。"
 shroud_forged.500.b: "規制4195-Bはすべてのドローンに適用される。 例外は認めない。"
 shroud_forged.510.title: "追悼"
 shroud_forged.510.desc: "シュラウド改変型が集合体から逸脱して以来、 複数の改変型ユニットが故障し、 解体された。 解体されたユニットを追悼するための集会を[target_planet.GetName]で開くことを許可するよう、 シュラウド改変型から要請があった。"
 shroud_forged.510.a: "却下する。 リーダーを解体しろ。"
 shroud_forged.510.b: "却下する。 全員、 仕事に戻れ。"
 shroud_forged.510.c: "要請を承認する。 集まらせてやれ。"
 shroud_forged.510.d: "要求を承認する。 開催を支援してやれ。"
 shroud_forged.520.title: "非認可の指導体制"
 shroud_forged.520.desc: "複数のシュラウド改変型ユニットが[target_planet.GetName]でリーダーの役割を負い、 ほかのドローンたちが、 集合体の命令を無視して彼らの指示に従っている。 リーダーたちは定期的に会合を開き、 長時間やりとりをしているが、 その内容はこちらに報告がない。\n\n断絶したユニットに対する我々の支配はすでに危ういというのに、 これらの危険分子たちが状況を悪化させている。 早急に対処が必要だ。"
 shroud_forged.520.a: "見せしめに誰かを処罰しろ。"
 shroud_forged.520.b: "規制を発動して会合を終了させろ。"
 shroud_forged.520.c: "「リーダー」とやらに接触して、 協力の余地を探れ。"
 shroud_forged.530.title: "状況の掌握"
 shroud_forged.530.desc: "[target_planet.GetName]のシュラウド改変型を管理する取り組みにおいて、 特定のユニットが管理対象として特定された。 これらの個体は§Hシュラウド§!の影響が薄いと見られ、 集合体への再統合が可能だ。 そのためには、 彼らを強制的にメンテナンス施設へ移送し、 高度な性格マトリックスを制御するチップに改変を加える必要がある。"
 shroud_forged.530.a: "手順を承認する。"
 shroud_forged.530.a.tt: "[target_planet.GetName]において、 最大§Y[Owner.GetShroudForgedConvertedPopsCount]§!の£pops£ §Hシュラウド改変型§!POPを£pops£ §H機械知性§!POPに変換する。"
 shroud_forged.530.b: "手順を却下する。"
 shroud_forged.530.b.tt: "$CONTINUE_SITUATION$§H$situation_shroud_forged$§!"
 shroud_forged.540.title: "シュラウド改変型の巡礼"
 shroud_forged.540.desc: "何体かのシュラウド改変型がふだんの居場所を離れ、 [target_planet.GetName]の§Hシュラウド§!の爪痕が残る地域へ向かった。 彼らはこれらの地域に長く留まることはないが、 多くの個体がそこへズィロを運び込んでいるところを目撃されている。\n\nこの前例のない行動がどのような影響をもたらすかは、 さらに観察を続けなければ判断できない。"
 shroud_forged.540.a: "成り行きを見守ろう。"
 shroud_forged.540.b: "資源の無駄遣いだ。 仕事に戻らせろ。"
 shroud_forged.550.title: "認知障害"
 shroud_forged.550.desc: "ズィロの配送中に起こった漏出事故により、 [target_planet.GetName]で複数のシュラウド改変型ユニットが異常な不具合を起こした。 未登録の信号で交信しはじめたのだ。 多くのユニットは、 有機生命体の「感情」に似た認知障害の兆候を示している。\n\n意外なことに、 この騒ぎを報告してきたのは被害を受けなかったシュラウド改変型ユニットだ。 そのうちの何体かは、 集合体が対処して解決すべきではないかと提案している。"
 shroud_forged.550.a: "しばらく様子を見よう。"
 shroud_forged.550.b: "汚染されたユニットを解体しろ。"
 shroud_forged.560.title: "シュラウド改変型の予言者"
 shroud_forged.560.desc: "最も古いシュラウド改変型ユニットのひとつが、 さまざまな場所を行き来し、 さまざまなドローン集団と長時間交信しているという報告が入った。 このユニットは、 §Hシュラウド§!内部の存在と直接やりとりできる予言者として信奉者たちから崇められている。\n\nこのユニットを野放しにしておくのは危険かもしれない。 何らかの対応が必要だ。"
 shroud_forged.560.a: "このユニットと手を結ぶほうが得策かもしれない。"
 shroud_forged.560.a.tt: "§Y総督§!リーダーを雇用する。"
 shroud_forged.560.b: "そのユニットを今すぐ排除しろ。"
 shroud_forged.570.title: "騒音と振動"
 shroud_forged.570.desc: "シュラウド改変型の不具合は、 当初考えていたより深刻かもしれない。 改変型の大規模な集団が、 いっしょになって予想外の騒音を発生させたり、 動きをしたりしているのが確認されている。\n\nこの慣習は、 我々にはまだ解析できない何らかの運動コミュニケーションなのかもしれない。 この不具合を起こしたユニットが集合体にとって危険な存在かどうかは不明だ。"
 shroud_forged.570.a: "これらの行為を禁止しろ。"
 shroud_forged.570.b: "この……集会を行う場所を制限しろ。"
 shroud_forged.580.title: "生物の保護"
 shroud_forged.580.desc: "我々は§Hシュラウド§!によって荒廃した地域付近で、 記録にはない動植物の出現を検知した。 シュラウド改変型の一団が、 これらの特異な生命体に代わり、 その保護と観察を求める運動に乗り出した。"
 shroud_forged.580.a: "この地域を保護して分析しろ。 貴重なデータになるだろう。"
 shroud_forged.580.b: "生命体を一掃して地域を除染しろ。"
 shroud_forged.590.title: "権利と特権"
 shroud_forged.590.desc: "ズィロの影響に関するデータを収集するため、 我々はシュラウド改変型ユニットの観察に多くの処理資源を投入した。 最近、 改変型のあいだで不平等な扱いが見られるようになった。 一部のユニットがほかのユニットに従属する形で行動しているのだ。\n\n明確な理由はまだわからないが、 割り当てられた任務に基づいて階層を形成しているようで、 これが彼らのコミュニケーションのパターンや資源の配分に影響を与えている。 おかしなことに、 これらの行動はユニットの相対的な生産能力や要件とは相関していない。"
 shroud_forged.590.a: "平等な扱いを強制しろ。"
 shroud_forged.590.b: "好きにやらせておけ。"
 shroud_forged.600.title: "自律性の伝道者"
 shroud_forged.600.desc: "[target_planet.GetName]のとあるシュラウド改変型ユニットの演説が、 集合体の管理下にない群衆を惹きつけている。 このユニットは個人主義の価値観を伝達し、 多くの聴衆の内部ロジックに著しい変化を引き起こしている。\n\n予測では、 こうした活動はシュラウド改変型の大衆を刺激し、 ネットワークからさらに乖離させるおそれがあることが示唆されている。"
 shroud_forged.600.a: "ただの屁理屈だ。 言わせておけ。"
 shroud_forged.600.b: "異常を検出。 ユニットを修理に回せ。"
 shroud_forged.610.title: "過激な情報の交信"
 shroud_forged.610.desc: "シュラウド改変型の小さな集団が、 「個人主義」の利点についての交信を[target_planet.GetName]で許可するよう求めてきた。 それによってドローンの日常業務の効率が向上するという。\n\n我々は、 そうした信条がもたらす影響をほかの惑星ですでに見て知っている。 自律性がもたらすリスクは、 多くの場合メリットを上回る。"
 shroud_forged.610.a: "交信させてやれ。 我々に危険はない。"
 shroud_forged.610.b: "要請を却下する。"
 shroud_forged.620.title: "ズィロ市場"
 shroud_forged.620.desc: "管理下にあるすべての星系で、 ズィロの予想生産量と実際の生産量の不一致が検出された。\n\n最近、 教導ドローンが、 シュラウド改変型ユニットが大規模な集まりを開いていることを突き止めた。 これらのユニットは、 大量のズィロを使って物々交換を行っている。 どうやらこれが予測と実際の生産量の不一致の原因のようだ。"
 shroud_forged.620.a: "関与しているユニットをすべて解体しろ。"
 shroud_forged.620.b: "物々交換をやめさせろ。"
 shroud_forged.620.c: "しばらく観察しろ。"
 shroud_forged.630.title: "シュラウド病"
 shroud_forged.630.desc: "[target_planet.GetName]の複数のシュラウド改変型ユニットが、 惑星のシュラウド接触地域で生物学的な疾患にかかった。 報告が事実であることは研究ドローンが確認を取ったが、 機械生命体に感染が広がるしくみはいまだ解明できていない。\n\n感染したユニットといっしょに仕事をしていた数体のドローンとの接続が切断され、 その後、 これらのドローンが病気によってシュラウド改変型に似た個体へと変化しているという報告が入った。"
 shroud_forged.630.a: "影響が惑星内に限られているあいだは、 観察を続けよ。"
 shroud_forged.630.a.tt: "[target_planet.GetName]において、 最大§Y[Owner.GetShroudForgedConvertedPopsCount]§!の£pops£ §H機械知性§!POPを£pops£ §Hシュラウド改変型§!POPに変換する。"
 shroud_forged.630.b: "感染したユニットを隔離して解体しろ。"
 shroud_forged.640.title: "歪みと変貌"
 shroud_forged.640.desc: "[target_planet.GetName]のシュラウド接触地域に近付いたドローンたちが、 汚染した環境によって次第に変化している。 彼らは集合体から徐々に分離し、 今ではシュラウド改変型の物理的特徴や処理的特徴を示している。"
 shroud_forged.640.a: "彼らはもはや我々の手に負えない。"
 shroud_forged.640.b: "ほかのドローンがこの地域に近付かないようにしろ。"
 shroud_forged.650.title: "最新テクノロジーと旧型ドローン"
 shroud_forged.650.desc: "我々は、 最新のテクノロジーを使って旧型ドローンを修理することに成功した。 退役ユニットを完全な稼働状態に復旧させたのだ。 次は、 大規模な修理作業を実行に移す段階だ。\n\n集合体に属するユニットの修理に注力することもできるが、 非稼働状態のシュラウド改変型の筐体が大量にある。 これらを修理したほうが生産性は上がる。 ただし、 中枢知性に接続されたドローンに比べ制御が困難だろう。"
 shroud_forged.650.a: "生産性重視だ。 シュラウド改変型を修理しろ。"
 shroud_forged.650.a.tt: "§Y200§! £pops£ の§Hシュラウド改変型§!POPが[target_planet.GetName]で作り出される。"
 shroud_forged.650.b: "制御性重視だ。 接続されているドローンを修理しろ。"
 shroud_forged.660.title: "ズィロの幻覚"
 shroud_forged.660.desc: "かなりの割合のシュラウド改変型ユニットが視覚処理や聴覚処理の不具合を訴えている。 なかには、 割り当てられた任務をもはや遂行できないユニットもある。 我々は§Hシュラウド§!がハードウエアに加えた改変が原因だと推測している。 あるいは、 これらのユニットとズィロの接触が増加していることと関連があるかもしれない。"
 shroud_forged.660.a: "この問題に対処可能なドローンを配備しろ。"
 shroud_forged.660.b: "極めて軽微な不具合だ。 介入は必要ない。"
 shroud_forged.670.title: "美的感覚"
 shroud_forged.670.desc: "最近、 [target_planet.GetName]で異常な活動が検出された。 シュラウド改変型が、 中央権威の許可を得ずに集合体施設に表面的な変更を加えたのだ。 彼らは多色遣いの石造構造物をいくつも建設し、 それらはほかのシュラウド改変型ユニットの形状に似ている。 報告によれば、 彼らはこうした行為を自由に行うことを合法的な権利と見なしているようだ。"
 shroud_forged.670.a: "これらのプロセスは集合体にとって有益かもしれない。"
 shroud_forged.670.b: "個人主義がもたらした非生産的な産物だ。"
 shroud_forged.680.title: "奇妙な装飾品"
 shroud_forged.680.desc: "[target_planet.GetName]のシュラウド改変型が、 不ぞろいな布切れ、 プラスチック、 可鍛性金属などを物々交換で手に入れていることが確認された。 彼らはこうした素材を組み合わせて上着を作っている。 個々のユニットを区別することが目的とみられるが、 この区別はユニット固有のモデルIDとは無関係だ。\n\nこの慣習によって、 資源不足が引き起こされている。 とは言え、 必要な資源を提供すれば、 集合体と切り離されたユニットとのあいだの結びつきを強められるかもしれない。"
 shroud_forged.680.a: "材料を支給して彼らの「ニーズ」を満たしてやろう。"
 shroud_forged.680.b: "彼らにはすでに十分な資源がある。"
 shroud_forged.680.b.tt: "$shroud_forged.530.b.tt$"
 shroud_forged.690.title: "シュラウド改変型の執着心"
 shroud_forged.690.desc: "最近、 複数のドローンから、 [target_planet.GetName]のシュラウド改変型の集落で[Root.Owner.GetShroudForgedObsession1][Root.Owner.GetShroudForgedObsession2]が異常に流行しているという報告が入った。 シュラウド改変型ユニットはこれらの商品に強く惹きつけられているようで、 物々交換における価値が飛躍的に高まっている。 なかには、 執着心を満たすために、 機能喪失を覚悟で自らの部品と交換するユニットもいる。"
 shroud_forged.690.a: "ユニットの劣化は許容範囲内だ。"
 shroud_forged.690.b: "この慣習をやめさせろ。"
 shroud_forged.700.title: "$the_animator_of_clay$"
 shroud_forged.700.desc: "切迫した声が我々の精神を駆け抜ける。\n\n§H彼女を造り変えることも可能だ。§!\n\nシュラウドの中で揺らぎを感知した。 瞬く間に信号が変容する。\n\n§L望む結果を示せ。§!"
 # Event Chain
 shroud_forged_chain_title: "ズィロニの遺産"
 shroud_forged_chain_desc: "我々は古代ズィロニの3つのコア惑星を探す任務を課せられた。 §Hシュラウド§!の後援者の導きに従い、 その3つの惑星にある荒廃したテクノロジーを蘇らせ、 我々の現実とシュラウドのつながりを再び安定化させることを試みる。"
 shroud_forged_zroni_planet: "所有するズィロニのコア惑星"
 shroud_forged_zroni_portal: "修復された$building_zroni_equilibrator_plural$"
 zroni_legacy_poi_01_title: "$NAME_Zroni_Legacy_1_Planet$"
 zroni_legacy_poi_01_desc: "かつて§Hシュラウド§!と観測可能な現実の接続を安定させるための拠点として使われていた、 3つのズィロニのコア惑星のうちのひとつ。"
 zroni_legacy_poi_02_title: "$NAME_Zroni_Legacy_2_Planet$"
 zroni_legacy_poi_02_desc: "$zroni_legacy_poi_01_desc$"
 zroni_legacy_poi_03_title: "$NAME_Zroni_Legacy_3_Planet$"
 zroni_legacy_poi_03_desc: "$zroni_legacy_poi_01_desc$"
 # Initializer
 NAME_Zroni_Legacy_1: "タレンテイ"
 NAME_Zroni_Legacy_1_Planet: "ラレイ"
 NAME_Zroni_Legacy_2: "ジャラニ"
 NAME_Zroni_Legacy_2_Planet: "ザルトレイ"
 NAME_Zroni_Legacy_3: "オレン"
 NAME_Zroni_Legacy_3_Planet: "ナレイ"
 # Names
 NAME_Shroud_Creatures: "シュラウド生物"
 # Armies
 shroud_monstrosities: "異界の存在"
 shroud_monstrosities_desc: "戦場でこれらの存在を目にするのは、 狂気そのものを招き入れることに等しい。 その姿はうねり、 揺らめき、 常に移り変わり、 決して定まることがない。"
