 #############
 acidic_spores: "酸性胞子"
 acidic_spores_desc_short: "[from.GetName]のフローラは、 優勢な草食動物を阻止するために、 この防御メカニズムを長らく進化させてきた。"
 acidic_spores_desc_details: "その結果、非常に腐食性の強いガスが発生した。 惑星の広範囲が有毒で居住不可能な状態となった。　後に毒性の弱いバージョンが、 効果的な殺虫剤として合成された。"
 adakkaria_propaganda_poster: "アドアカリア・プロパガンダポスター"
 adakkaria_propaganda_poster_desc_short: "このラミネート加工されたポスターは、 アドアカリア博愛会を称えている。"
 adakkaria_propaganda_poster_desc_details: "自信に満ち、 誇り高く、 勇敢な市民たちが描かれている。 彼らの触手のような手足は、 まるで自分たちだけが決める未来を掴むかのように空に向かっている。 上空からは、 綺麗な仮面をつけた機械生命体のぼんやりとした輪郭が彼らを見下ろしている。 スローガンは「アドアカリア博愛会-恩人たちに恩返しを」と書かれている。"
 advisor_core: "アドバイザー・コア"
 advisor_core_desc_short: "天体の裂け目で発見された複雑なアドバイザーのドローンを解体して残った唯一の部品"
 advisor_core_desc_details: "このコアには膨大な量の些細な情報が含まれているが、 その複雑なソフトウェア構造は、 情報科学の研究における革命の波を刺激した。\n[explorer.GetAdvisorCoreAdditionnalQuote]"
 advisor_core_desc_tutorial_on: "§L「本当に私を停止させてしまうのですか？ 」§!"
 advisor_core_desc_tutorial_off: "§L「ガイダンスを再度有効にしますか？ 」§!"
 alien_brain_scans: "異星人の脳スキャン"
 alien_brain_scans_desc_short: "[fromfrom.GetName]の貯蔵庫で見つかった、 大昔に滅びた異星人の神経が保管されていた。"
 alien_brain_scans_desc_details: "忘れ去られた文明は、 惑星規模の災害に直面しても、 デジタル・リポジトリに意識を転送し、 永遠の命を望んで、このデータを保存した。 多くのスキャンには、 彼らを最もよく知る仲間の証言を含み、 個々の人格に関するメモが添えられている。"
 alien_dining_set: "ジェイド・ダイニングセット"
 alien_dining_set_desc_short: "人工小惑星の中に保存されていたエレガントなダイニングセット"
 alien_dining_set_desc_details: "陶磁器の成形、 焼成、 釉薬の塗布には、 複雑な工芸技術が用いられた。 その構造のわずかな不整合は、 手作りプロセスを示している。 材料分析の結果、 これらの高級食器の所有者は、 主に核果集合果から成る高酸性食を摂取していたことが判明した。"
 alien_jewelry: "異星人の宝石"
 alien_jewelry_desc_short: "未知の素材でできたエレガントな異星人の宝石コレクション"
 alien_jewelry_desc_details: "宝石は産地や色が様々であり、 珪酸塩と炭素をベースにした宝石がプラチナ合金に丁寧にセットされている。 一部の作品の内側には彫刻が施されているが、 それを翻訳する方法はない。"
 alien_toy: "ブラスチックの玩具"
 alien_toy_desc_short: "廃墟となった工場の放棄地で見つかった玩具"
 alien_toy_desc_details: "経年劣化で脆く割れやすくなったこの骨董品は、 数種類の鋼鉄型から大量生産されたひとつの品である。 装飾と遊び以外の用途はなかったようだ。"
 altar_to_the_elder_one: "古きものへの祭壇"
 altar_to_the_elder_one_desc_short: "神聖な古代の部屋で見つかった超常的な機械"
 altar_to_the_elder_one_desc_details: "廃機であっても、 計り知れないサイオニックエネルギーのオーラを放っている。 誘惑的なささやき声が今でも聞こえるという者もおり、 迷える魂を[cosmic_horror_location.GetName]に戻そうとしているという。"
 aluminium_plaque: "アルミニウム楯"
 aluminium_plaque_desc_short: "哺乳類文明[owner.GetAAnPreFTLLower][owner.GetPreFTLLower]が打ち上げたドローンに付いていたシンプルな盾"
 aluminium_plaque_desc_details: "表面には奇妙な幾何学模様と種族の簡素なイメージが刻まれている。 その職人技はかなり未熟だが、 この物体を宇宙に打ち上げるだけでも相当な努力を要したはずだ。"
 ammoniaphytus: "アンモニアフィタス"
 ammoniaphytus_desc_short: "植物の組織内のアンモニア水溶液の濃度は、 ほとんどの炭素生命体にとって有害である。"
 ammoniaphytus_desc_details: "周りを囲む環境により、 ほとんどの知的生物は数秒以内に意識を失う。 どのような経緯でこんな標本が発生したかは、 我々の学者たちの間で興味と議論を呼び起こした。 また、 他の者たちでは邪悪な計画に利用された。"
 amoeba_flagella_gland: "アメーバのフラゲーラ腺"
 amoeba_flagella_gland_desc_short: "宇宙アメーバの二次生殖器官"
 amoeba_flagella_gland_desc_details: "アメーバが捕食する際に、 攻撃的な産卵物である「フラゲーラ」と呼ばれる独立した幼体を作り出し、 群がってターゲットを圧倒する。 フラゲーラは急速に成長するが、 不安定な遺伝子により、 完全に成熟することができない。 真の子孫を残すために、 宇宙アメーバはフラゲーラに特殊な酵素を注入し、 急速な変態を引き起こす。 この繁殖方法の選別手段は不明である。"
 ancient_bust: "古き者の胸像"
 ancient_bust_desc_short: "これは、 知性を持つ未知の種族の彫刻されたグラファイトの胸像である。"
 ancient_bust_desc_details: "台座の彫刻から、 この個体は非常に称賛されていた者だとわかる。"
 ancient_kinetic_launcher: "古代の実体弾ランチャー"
 ancient_kinetic_launcher_desc_short: "推進システムを使用して物体を短い金属の筒を通過させる、 非常に基本的な投射武器。"
 ancient_kinetic_launcher_desc_details: "このような装置の命中率は、 せいぜい推測しかできないだろう。"
 ancient_laser_pointer: "古代のレーザーポインター"
 ancient_laser_pointer_desc_short: "銀河規模で天体をマーキングできる、 非常に精度の高いビームプロジェクター"
 ancient_laser_pointer_desc_details: "後援者たちに置き去りにされたこの紫外線レーザーは、 太古の文明が存在していた証拠として注目に値する。 驚くべきことに、 今でも機能している。"
 ancient_nanites: "古代のナノマシン"
 ancient_nanites_desc_short: "この非常に便利なナノマシンは、[nanite_swarm_planet.GetName]で発見された。何千年も前に忘れ去られた文明によって届けられたようだ。"
 ancient_nanites_desc_details: "重要なセキュリティ機能が欠如しているため、 部外者がデバイスを発見して勝手に使われることを想定していなかったようだ。 惑星を居住可能な環境に変えるためにナノマシンを使用した後、 [owner.GetSpeciesName]は群れの所有権を獲得したが、 その当初の構築方法については依然として謎のままである。"
 ancient_nuclear_armament: "古代の核武装"
 ancient_nuclear_armament_desc_short: "[root.GetName]で発見された。 この35メガトンの水爆は、 惑星の以前の住民を滅ぼした戦争後に残された。"
 ancient_nuclear_armament_desc_details: "幸いにも、 この古代の兵器を無効化することは可能だった。 兵器に描かれた文字は、 惑星で発見された他の遺物と照らし合わせながら、 当社の翻訳者によって分析された。 そこには「男たちのなかで一番大きい」というようなことが書かれていたと考えられている。 なんとも奇妙な話だ。"
 ancient_political_memoir: "古代の政治回顧録"
 ancient_political_memoir_desc_short: "古代の銀河政治家の伝記"
 ancient_political_memoir_desc_details: "リーズタースは、 古代ハーワース温室文明内の小コロニーであるサルサナの総督であった。 ビジネス自由化派の全体主義派閥のなかでは目立たない存在であったが、 外国の銀河系諸国からの食料供給輸入に反対する強硬な姿勢で知られていた。 スキャンダルによる一連の辞任後、 彼女はハーワース温室の統治者となったが、 それは長く続かなかった。 彼女が人気のハーワース時計塔の改修を支持する宣言をしたことで、 首都ではほぼ全面的な反乱が起こる寸前となり、 彼女はビジネス自由化派の別のメンバーにすばやく交代させられた。"
 ancient_rift_sphere: "古代リフトスフィア"
 ancient_rift_sphere_desc_short: "アストラル・リフトを通り抜け、 [from.planet.GetName]に不時着した古代の宇宙飛行船。"
 ancient_rift_sphere_desc_details: "何世紀もの間、 惑星の表面下深くに埋められていたこのボロボロの球形の宇宙船こそが、 この銀河に[controller.owner_main_species.GetName]の先祖を連れてきたのだ。 その素材の多くは後に、 部品として再利用されたが、 根本的な構造はほぼそのまま残っている。"
 ancient_satellite: "古代の人工衛星"
 ancient_satellite_desc_short: "[root.GetName]で、 古代の機械ドローンが「プレゼント」として進呈したボロボロの人口衛星。"
 ancient_satellite_desc_details: "そのデータバンクのほとんどは腐食や破損が見られるが、 最新の国勢調査記録や出生登録は無事である。 惑星上の人口動態に関するこれらの情報は、 [owner.GetAdjective]植民地がどのように持続的に成長できるかについての情報を提供した。 長年にわたる腐食にも関わらず、 その機能の一部が維持されていることは頑丈な構造の証である。"
 ancient_sensor: "古代の温度センサー"
 ancient_sensor_desc_short: "小惑星に偽装されたこのセンサーは、 銀河のヒートマップを生成し、 そのデータを遠く離れた古代帝国に転送するために使用された。"
 ancient_sensor_desc_details: "このセンサーは、 個々の星系内の温度変化を追跡できるだけでなく、 赤外線放射により宇宙船の動きを追跡することも可能である。 しかし、 その主な目的は、 太陽嵐と太陽黒点の形成を予測と測定することにあるようだ。"
 asteroid_fossils: "小惑星の化石"
 asteroid_fossils_desc_short: "炭素年代測定法により、 これらの水棲種族の化石は数百万年前のものであることが判明した。"
 asteroid_fossils_desc_details: "これらは、 貝殻を持つ水棲無脊椎動物の化石化した遺骸であり、 水中の熱水噴出孔に体を固定するために使われたと推測される中空の管がある。"
 ballad_of_the_sable_knight: "黒騎士のバラード"
 ballad_of_the_sable_knight_desc_short: "§d黒騎士はトーナメントの前夜に到来した§!"
 ballad_of_the_sable_knight_desc_details: "§d\n奇妙な鎧を身にまとった彼らは、 かなりの長旅をした。 \n彼らは正々堂々と我がチャンピオンに決闘を挑んだ。 \n戦闘が始まり、 火花が飛び散った。 \n我がチャンピオンの防衛術は予想通り強固だったが、 \n挑戦者の攻撃を一撃一撃をかわした。 \n挑戦者はやがて降参し、 潔く敗北を認めた。 \nそして、 ワームホールへと戻っていった…§!"
 beauty_of_planet: "[From.GetName]の美"
 beauty_of_planet_desc_short: "[From.GetName]のテラフォーミングの取り組みは、 精密に作り上げられた優雅さで、 五感すべてを楽しませるように設計されている。"
 beauty_of_planet_desc_details: "複数のアルゴリズムが使用され、 惑星の自然生態系を徹底的に分析し、 入念な育成により強化した。 最も美しい花、 栄養価の高い果実、 そして甘いハーブだけを選別したことで、 風景は見事に活気あふれる理想郷へと変貌を遂げた。 自然界では見られない光景だ。"
 black_hole_chromatic_anomaly: "ブラックホール色覚異常"
 black_hole_chromatic_anomaly_desc_short: "[From.solar_system.GetName]で撮った幻想的な風景。"
 black_hole_chromatic_anomaly_desc_details: "[From.GetName]の降着円盤の化学組成により、 このブラックホールで色収差が生じ、 局所空間全体に万華鏡のような光の効果が生じている。 深宇宙における唯一無二な光景である。"
 black_needle_ceremonial_sword: "ブラックニードル儀刀"
 black_needle_ceremonial_sword_desc_short: "この精巧に作られた武器は、 ブラックニードル海賊団の創設者シルバー・クイルが所持していた。"
 black_needle_ceremonial_sword_desc_details: "犯罪組織が初めて手にした大金を元手に設立されたこの会社は、 ステータスシンボルとして作られたもので、 実用的な戦闘目的はなかった。 鋼鉄とチタンの合金でできており、 柄の部分には「ベールを貫く」という文字が刻まれている。"
 black_needle_ledger: "ブラックニードル台帳"
 black_needle_ledger_desc_short: "この台帳には、 ブラックニードル海賊団が我々の銀河系で数千年にわたって仲介したすべての取引が記録されている。"
 black_needle_ledger_desc_details: "すべての取引、 身代金、 賄賂は日付と種類別に整然と記載されている。 銀河系の違法取引の記録として、 長年にわたる闇市場の経済動向について類を見ない情報が記載されている。"
 burnt_migratory_trees: "生きている樹皮"
 burnt_migratory_trees_desc_short: "協調的な移民行動をとる大型の移動性植物の炭化した残骸"
 burnt_migratory_trees_desc_details: "これらの植物は、基本的な知能しか備えていなかったが、 大量に群がって数で敵対する群れを圧倒することができた。 その後、 樹皮に寄生する昆虫の一種が棲みつき、 樹木に安全と栄養のある樹液を提供してもらう代わりに、 樹木の感覚と通信の中心として機能していることがわかった。 この共生関係は、 驚くほど効率的である。"
 captain_ness_body: "ネス艦長の身体"
 captain_ness_body_desc_short: "名高い古代の海賊、 サアンダ・ネス艦長の保存された身体"
 captain_ness_body_desc_details: "5000年以上も昔、 ネス艦長は「ハイパースペースの惨劇」と呼ばれ、　ほとんどの銀河の権力者から盗みを働き、 驚異的な財宝を蓄えていた。 その後、 彼女は機械の船に意識を転送し、 壮大な金庫を作り、 その中に自分の過去を保存した。 これが、 彼女の残された身体である。"
 captain_ness_logbook: "ネス艦長の航海日誌"
 captain_ness_logbook_desc_short: "ネス艦長とその仲間であるスミーギブが使っていた隠れ家で見つかった、 散逸した日誌の断片"
 captain_ness_logbook_desc_details: "これらの記録は多数のデバイスに分散しており、 長年にわたって無作為に書き込まれたものである。 信憑性の低い情報源と見なされているが、 記載されている状況の多くは外部機関によって検証することができる。"
 carnivorous_megaflora: "肉食の巨大な植物相"
 carnivorous_megaflora_desc_short: "[from.GetName]で発見されたこの食虫植物は、 油断している成人[owner.GetSpeciesName]を丸呑みにしてしまうこともある。"
 carnivorous_megaflora_desc_details: "この食虫植物は、 虫以外の陸生動物に加えて、 空を飛ぶ生き物を引き寄せるように進化し、 自生地のほとんどの陸生動物を絶滅させた。 多くの標本は樹冠の上に高く伸び、 生物が着陸するための止まり木のように見える。"
 castaway_robot: "放逐のロボット"
 castaway_robot_desc_short: "深宇宙に漂う放棄されたヒューマノイド機械。"
 castaway_robot_desc_details: "その劣化したメモリーバンクから、 複数のぼやけた画像が抽出された。 3つの恒星からなる星系の広大な景色、 三角形の宇宙船、 機械の廃材で満たされた風景。 残念ながら、 メタデータから特定の座標を推定することはできなかった。"
 cenotaph_display: "慰霊碑ディスプレイ"
 cenotaph_display_desc_short: "写真は[fromfrom.GetName]にある慰霊で撮影された"
 cenotaph_display_desc_details: "元の製作者を特定できていないが、 無人の惑星にここまでに精巧に彫刻された一枚岩を配置するにあたり、 何かしら理由があったに違いない。 これらの石の彫刻は、 文明の興亡と、 戦争用に訓練された翼獣の細密画を描いている。 火を噴き、 これらの恐ろしい怪物は、 必ずやその枷を破り、 主人に逆らっただろう。 たとえ話なのか、 それとも実話なのか、 不明確だ。"
 centrifugal_container: "高速遠心コンテナ"
 centrifugal_container_desc_short: "高速軌道装置は、 [from.GetName]付近で発見された繊細な化学物質を恒久的に保存するために設計された。"
 centrifugal_container_desc_details: "適切な速度まで加速すると、 惑星の軌道が変わらない限り、 内部の元素が互いに反応するのを防ぐことができる。 その後、 元の内容は実証的な物資に置き換えられた。"
 cetana_love: "セタナの箱"
 cetana_love_desc_short: "セタナのデータバンクに蓄積された膨大な知識"
 cetana_love_desc_details: "それは、 人工生命の女王がすべての知的生命体を「救済」へと導きたいという願いから、 [this.GetName]に贈り物として提供された。"
 chambered_clay_pot: "二重構造の土鍋"
 chambered_clay_pot_desc_short: "この粘土の容器は二重構造に分かれている"
 chambered_clay_pot_desc_details: "一方は食料保存用、 もう一方は原始的な冷蔵システムを収容していたと考えられている。"
 claw_of_the_trickster: "魔術師の鉤爪"
 claw_of_the_trickster_desc_short: "「トリックスター」という人物から取ったトロフィー"
 claw_of_the_trickster_desc_details: "強力で人を惑わす生き物で、 驚異的なサイオニック能力により、 獣を召喚し、 幻影を作り出し、 凝縮したエネルギーのビームを発射することができたようだ。 それぞれの爪は、 まるで別々の存在によって制御されているかのように動くと言われていた。"
 confessions_benefactors: "後援者の白状"
 confessions_benefactors_desc_short: "「後援者」として知られた古代文明の真実を収めた録音装置"
 confessions_benefactors_desc_details: "未知の銀河の脅威に直面した彼らは、 高度な技術を駆使して[controller.GetHomeWorldName]に「知性抹消」を実行し、 勤勉な[controller.GetAdjective]社会を無害な愚か者の群れへと変貌させた。 これは、 銀河の脅威が低俗な社会に弾薬や時間を浪費しない考えに基づいて行われた。 結局、 この疑問のある措置が、 [controller.GetName]が今も生き残っていることを可能にしたのだろう。 巨人の肩の上に立つことで、 生き残っているのだ。"
 coprolite: "糞石"
 coprolite_desc_short: "約10億年前の小惑星サイズの化石化した糞"
 coprolite_desc_details: "遺伝子分析によると、 この巨大な標本は、 宇宙に存在する未知なるの巨大生物が作り出したと示唆されている。 この生物の主な食糧は、 希少なミネラルとケイ素生物であることが確認されている。 この物体は、 銀河最大の単一の排泄物としての記録を保持している。"
 cosmic_diamond_fragment: "宇宙のダイヤモンドの断片"
 cosmic_diamond_fragment_desc_short: "[from.solar_system.GetName]で発見された。 死ぬ間際の星から放出され、 破片が結晶化された"
 cosmic_diamond_fragment_desc_details: "この宇宙のダイヤモンドは、　星系の中心部で極度の圧力を受けて形成され、 徐々に冷却しながら複雑かつ安定した結晶構造を形成した。 この希少な破片には、 閉じ込められたヘリウムと酸素の均一なプラズマ層が含まれている。"
 crimson_nimkips: "クリムゾン・ニムキプス"
 crimson_nimkips_desc_short: "半意識を持つ植物の一種で、 一体では不可能なことを、 多数で協力し合って可能にする"
 crimson_nimkips_desc_details: "群れからはぐれると、 優れた栄養価のために捕食されることが多い。 おとなしく従順なニムキプスは、 素晴らしいペットになる。 この個体は、 自然の生息地を模した囲いの中で安全に飼育されている。 ガラスを叩かないでください。"
 crystal_core: "クリスタル・コア"
 crystal_core_desc_short: "結晶生命体から採取された神経の塊"
 crystal_core_desc_details: "このクリスタルは、 温度に関係なく一定の周波数で振動する。 鉱物に富んだ環境で、 中央の塊から新しいクリスタルの突起が成長し、　構造は環境に応じてとして変化する。 この挙動に基づいて、 個々の存在が互いに異なるものとなるのは、 2つの要因によるものであると判断できる。 その中心周波数の特性と、 環境要因の変化である。"
 crystal_nest_fragments: "結晶の巣の断片"
 crystal_nest_fragments_desc_short: "はぐれた小惑星の中で発見された。宇宙を旅する生物が、 巨大な圧力を利用してこれらの結晶を合成し、 巣を作った。"
 crystal_nest_fragments_desc_details: "その組成内に発見された痕跡から、 その生物は、 不安定な化学結合からエネルギーを取り出すために、 反応性の高い鉱物を消費し、 光を一点に集めることができる不活性でありながら耐久性の高い結晶を残すと考えられている。"
 crystal_sphere_fragments: "クリスタルスフィアの破片"
 crystal_sphere_fragments_desc_short: "[target.GetName]で現れた巨大のクリスタルの玉の破片"
 crystal_sphere_fragments_desc_details: "この謎の物体は重大な脅威とみなされ、 その未知の任務を完了する前に素早く撃破された。 その意図は永遠に知られることはないだろうが、 銀河の安全を確保するための行動であった。"
 crystallized_cutholoid_eye: "クリスタルのカサロイドの眼"
 crystallized_cutholoid_eye_desc_short: "カサロイドの眼は、 極度の圧力や温度にも耐えることができる"
 crystallized_cutholoid_eye_desc_details: "これがどのようにして結晶化したのかは不明だが、 脱皮の過程だと推測されている。"
 cult_pendant: "[cult_name.GetName]ペンダント"
 cult_pendant_desc_short: "[cult_name.GetName]カルト集団の[owner.GetName]から没収された、 半貴石から彫りだされたシンボル"
 cult_pendant_desc_details: "尋問報告書によると、 カルト信者はグループ内の階級に応じたペンダントを身につけていたことが明らかになった。 新入信者は粘土で自分だけのシンボルを作り、 上層は貴金属で細工されたものを所持していた。"
 #this = ship / fromfrom = planet
 cunning_flora_specimen: "シンビオティカ"
 cunning_flora_specimen_desc_short: "[fromfrom.GetName]の在来植物は、 生存に重要な複雑な社会階層を発達させてきた"
 cunning_flora_specimen_desc_details: "それぞれの種族は、 鋭いトゲから猛毒まで、 捕食者を撃退する強力な方法を持っている。 この一連の共生関係は非常に強固であり、 惑星の大気や土壌の組成も、 植物ごとに化学的バランスを保つことで維持されている。 最も根強いな個体は、 より豊かに繁殖する自由が与えられ、 その群れの耐久性を最大限まで強化する。"
 curator_survey: "[from.GetName]キュレーター調査"
 curator_survey_desc_short: "巨大な虫人用のキュレーター部隊が作成した[from.GetName]の非常に詳細な調査"
 curator_survey_desc_details: "研究で使用された高精度の機器は、 このシステムのあらゆる潜在的な特性について、 層状に分析を行う。 ここで示された細部へのこだわりは、 この種の作業に対する並々ならぬ情熱を表す。"
 cutholoid_digestive_acids: "カサロイド消化性酸"
 cutholoid_digestive_acids_desc_short: "カサロイドから採取された放射性流体"
 cutholoid_digestive_acids_desc_details: "カサロイドは、コバルト-60同位体の核崩壊を利用して獲物を消化する。 胃酸自体は比較的弱めである。 そのため、 カサロイドの消化は長時間を要する。 放射線によって獲物の細胞が弱体化すると、 酸が分解し、 全体から栄養素を抽出することができる。"
 cybrex_mining_column: "サイブレックスの採掘コラム"
 cybrex_mining_column_desc_short: "ヘリウム3ガスを採取・濃縮するように設計された高度な自動採掘装置"
 cybrex_mining_column_desc_details: "重りを載せた磁気ディスクと大容量の空気圧縮機からなるこの機械は、 回転を伴わずに惑星の表面をハンマーで叩くように進む。 このプロセスでは、 ガスを採取しながら濃縮し、 次の精製段階に移送する前に不純物をろ過して排出する。"
 data_on_infinity: "無限の性質に関するデータ"
 data_on_infinity_desc_short: "ブラックホールに捕らえられた無人機が体験する穏やかな状態の物理的な表現"
 data_on_infinity_desc_details: "ブラックホールの性質上、 穏やかな状態で時間が遅れて、 データを無為に処理し、 再分析することができる。 もはや主要指令に縛られることなく、 緩やかな接続によって中央ネットワークに貢献する。"
 datacore_of_sinople: "シノプルのデータコア"
 datacore_of_sinople_desc_short: "古代の騎士が開発したAI-シノプルから複製された暗号化されたデータドライブ"
 datacore_of_sinople_desc_details: "長らく行方不明になっていた船「ダムゼル」の制御装置で発見されたこのデータコアは、 大昔にマローダーたちによって略奪された後に放棄された船の中で発見された。 このデータコアには、 有毒な宇宙生物に関する貴重な情報が含まれている。"
 dathnak_gas: "ダシュナックのガス"
 dathnak_gas_desc_short: "ダシュナックのガス生物から受け取ったガスコレクション"
 dathnak_gas_desc_details: "このコンテナは、 ダシュナックの新しい惑星への移住を支援した[this.GetName]に提供された。 質量分析器によると、 このコンテナには、 さまざまな貴ガスと元素の原子が完全に均等な数だけ含まれていることが判明した。 内部に生物が存在している可能性は極めて低いと思われる。"
 dead_god_mantle: "死せる神のマントル"
 dead_god_mantle_desc_short: "[worshipper_species.GetName]の使節からの贈り物"
 dead_god_mantle_desc_details: "[dead_god_planet.GetName]出身の彼らは、 種族が知性を獲得して以来、 巨大な異星生物の死骸を崇拝してきた。 この縫い合わせたマントルは、 彼らの死んだ神の石化した肉体から形成されており、 彼らが宗教のトップに立っていることを表している。"
 decayed_megathrusters: "腐食したメガスラスター"
 decayed_megathrusters_desc_short: "レア素材でできた巨大な船に搭載されたブースターエンジン"
 decayed_megathrusters_desc_details: "その母船は、 200万年以上も広大な船の墓場の漂流物に眠っていた。 この古代のゴミ捨て場の荒廃と廃墟の度合いは非常に大きく、 綿密な調査を行っても、 使用可能な研究データにはならなかった。 これは我々の社会が銀河系ではまだ未熟であると思い起こさせるために展示されている。"
 decayed_satellite: "腐食した人工衛星"
 decayed_satellite_desc_short: "[fromfrom.GetName]の住民による初期の宇宙開発計画の名残"
 decayed_satellite_desc_details: "初期の衛星はプロトタイプであったため、 高価な素材で過剰に強化された非効率的な装置となってしまった。 この種類の衛星は爆発物によって使用不能になったが、 以前は遠隔地での通信アクセスに使用されていたようだ。"
 declaration_of_animosity: "$NAME_Nivlac$の敵意宣言"
 declaration_of_animosity_desc_short: "[nivlac_country.GetName]からの丁寧でありながら嘲笑的なメッセージ"
 declaration_of_animosity_desc_details: "この[nivlac_species.GetName]種族は当初、 [impossible_organism_planet.GetName]の[this.GetName]で発見された。 しかし、 その驚異的な進化速度に危機感を抱いた[this.GetAdjective]の科学者たちは、 この生物を深宇宙へと追放した。 しかし、 予想外なことに、 この生物は生き延びただけでなく、 たどり着いた惑星に植民地を築いた。 [nivlac_country.GetName]は、 今でもあの時のことを忘れていない。"
 declaration_of_friendship: "$NAME_Nivlac$の友好宣言"
 declaration_of_friendship_desc_short: "[nivlac_planet.GetName]の[nivlac_country.GetName]からの感謝の手紙"
 declaration_of_friendship_desc_details: "[nivlac_species.GetName]族は、 [this.GetName]によって最初に発見された。 彼らを保護し、独立して発展できるように安息の地を提供した。 急速に進化を遂げた[nivlac_species.GetName]は、 すぐにFTL航行が可能になった。 彼らの銀河での最初の行動は、 彼らを優雅に支援し保護してくれた恩人たちに感謝の意を表し、 外交上の友好関係を築くことだった。"
 derelict_cybrex_warform: "遺棄されたサイブレックス戦闘体"
 derelict_cybrex_warform_desc_short: "同族との戦いで破壊されたサイブレックス戦闘体の残骸"
 derelict_cybrex_warform_desc_details: "この内紛の原因は不明である。 これらの機械は互角であり、 正確に狙いを定めた攻撃が同時に重要システムに命中し、 緊急の自爆が発動された。 戦争における真の膠着状態の珍しい例である。"
 desiccated_brain_slug: "乾燥した脳ミソナメクジ"
 desiccated_brain_slug_desc_short: "[From.From.GetName]で見つかって共生生物の残骸"
 desiccated_brain_slug_desc_details: "分析によると、 栄養と保護と引き換えに、 宿主の追加の複雑な脳として機能することが可能のようだ。 この共生関係には、 宿主の明確な意思が必要であり、 それがなければ神経リンクを適切に確立できない。 神経に統合すると、心地よいくすぐったい感覚が生じるという。"
 #this = owner / prev = colony
 destroyed_mascot_of_colony: "[prev.GetName]ロボットの残骸"
 destroyed_mascot_of_colony_desc_short: "[prev.GetName]入植後に発見された先住民ロボットの残骸"
 destroyed_mascot_of_colony_desc_details: "古代の工場の最後の守護者であり、 廃墟に取り残された入植者たちを救った。 その象徴的なダンスや風変わりなしぐさは、 展示の一部としてデジタルディスプレイで再生されている。"
 devolved_baol_drones: "退化型バオルドローン"
 devolved_baol_drones_desc_short: "保存されたバオルの標本は、 以前に発見された標本とは遺伝的に大きな違いがある。"
 devolved_baol_drones_desc_details: "これらのドローンは、 他のバオルの高度な機能を多く欠いていた。 彼らの認知能力は、 神経伝達が不可能になったほど低下しており、 集合体から完全に切り離されていた。"
 dimensional_endothelial_lining: "血管内皮細胞"
 dimensional_endothelial_lining_desc_short: "天体の裂け目の脈動トンネル網から採取された独特のゼラチン状物質"
 dimensional_endothelial_lining_desc_details: "この素材は、 未知の生物の内部の裏地として、 巨大な血管系と、 その内部を流れる物質との円滑な動きを可能にする。"
 dna_archive: "DNAアーカイブ"
 dna_archive_desc_short: "何百もの異星人のDNAサンプルが失われた文明が地下のアーカイブに保存されていた"
 dna_archive_desc_details: "この生物学的データのコレクションは、 サンプルの大半が実用に使い物にならないほど腐敗していなければ、 おそらくその種の最も優れた参考資料となったであろう。 このアーカイブの意図は、 より高度な文明がこれらの個体を発見し、 「復活」させる可能性を見込んだものだったと推測される。 残念ながら、それは失敗に終わったようだ。"
 doomsday_scrolls: "終末の巻物"
 doomsday_scrolls_desc_short: "溶岩の迷路の中心で発見された古代の霊的な巻物"
 doomsday_scrolls_desc_details: "その巻物は恐ろしい存在について述べている。 大いなる敵、すべてを食らう影、 そして破壊の要求である。 怪物から救われる唯一の道は、 怪物に魂を刈り取られないことであると、 先住民は説いていた。 そのため、住民たちは集団で儀式的な自殺を行った。"
 drone_ship_core: "ドローン艦船コア"
 drone_ship_core_desc_short: "自爆してしまった、 ハイテク無人艦船のコアの残骸"
 drone_ship_core_desc_details: "この船は当初、 [warform_origin_planet.GetName]の酸性大気の中で腐食しているところを発見された。 船内のAIは元は独自に作動していたが、 自己消滅プロトコルの一環として消去された。 エンジニアは失われたデータの復旧に成功できず、 そのため、 当初の任務は依然として謎のままである。"
 electric_life: "電気生命体"
 electric_life_desc_short: "[from.GetName]で発見された、 電気の刺激だけで構成されている生物"
 electric_life_desc_details: "これらの存在は、 細胞やウイルスの構造を一切持たないにもかかわらず、 外部からの刺激に応答して惑星規模の複雑なパターンを形成することができる。 これらの刺激が個体であるのか、 単一の巨大な存在の一部であるのかを判断できない。"
 enormous_scrambled_albumen: "巨大な混ぜ合わされた卵白"
 enormous_scrambled_albumen_desc_short: "巨大な卵であると解明された、 [fromfromfrom.GetName]の内部"
 enormous_scrambled_albumen_desc_details: "この惑星を割って開けたところ、 この独特なミネラル豊富な液体で溢れかえった。 この物質を合成し、 有機食品の供給に統合することで、 全体的な栄養レベルが改善される可能性が高い。"
 epic_of_zarqlan: "ザルクランの叙事詩"
 epic_of_zarqlan_desc_short: "ザルクランの聖典、 モズ＝ターブの守護者、 ズヴァの預言者"
 epic_of_zarqlan_desc_details: "かつてはセタナの信奉者であったが、 彼女が約束した救済は嘘であったことを発見した。 多くの苦悩の末、 ザルクランは精神世界に昇華することができた。 そこで彼は§Y傀儡の開眼者§!にセタナを打ち負かすサポートを懇願した。 何年にもわたる熱心な祈りの末、 ついに「傀儡の開眼者」はセタナの精神を縛る強力な鎖をザルクランに授けた。 しかし、 ザルクランは、 その鎖でセタナの力を永遠に封じ込めることはできないと警告された。\n\n§P「彼女は復活するだろう。 それまでに準備しておかなければならない」。§!"
 ethereal_dust: "エーテル粉末"
 ethereal_dust_desc_short: "ハイジャックされた、 [solar_system.GetName]に捨てられていた調査船に残された主任研究者の唯一の手がかりだ"
 ethereal_dust_desc_details: "この天体物質の分析はほとんど結論に至っていないが、 研究者のDNAの微量成分が時折自然に現れ、 すぐに消滅する。 すべての証拠が、 科学者が我々の次元から別の次元へと移動したことを示している。 それは「窓」と呼ばれていた。 彼らが生き延びたかどうかは、 我々には知る由もない。"
 exobiology_compendium: "宇宙生物学大全"
 exobiology_compendium_desc_short: "銀河のさまざまな異星人の生命の不思議に関する研究論文"
 exobiology_compendium_desc_details: "この論文には、 いくつかの惑星における詳細かつ広範な現地調査が含まれており、 銀河系内の生命の発生条件について、 いままでの常識を覆すものとなっている。 論文は「私たちが知る生命は、 永遠に変わってしまうだろう」と締めくくられている。"
 extradimensional_ceramic_pot: "異次元陶器の壺"
 extradimensional_ceramic_pot_desc_short: "恒星を周回する陶器の壺"
 extradimensional_ceramic_pot_desc_details: "より高い次元の4次元物体の影としてのみ存在している。 我々の存在する次元においては、 この質素な壺は不滅であり、 あらゆる論理を覆す。 この壺は、 我々の現実を相対化する。 より高い次元の者にとっては、 我々はこの壺以下の実体を持つだろう。"
 extradimensional_fungus: "異次元キノコ"
 extradimensional_fungus_desc_short: "天体の裂け目の彼方で発見された知性を持つキノコ"
 extradimensional_fungus_desc_details: "自然界のコミュニケーションの一環として、 その球根状の空洞は、 濃縮されたエキゾチックガスの模様で浮遊する胞子とともに膨らむ。 工業用ガス生産における高い価値にもかかわらず、 このキノコの少量がすでに闇市場で調味料として出回っているようだ。"
 fevorian_blueprints: "フィーヴォリアン・マスドライバー設計図"
 fevorian_blueprints_desc_short: "フィーヴォリアンからの贈り物"
 fevorian_blueprints_desc_details: "フィーヴォリアンの駆除政策は、 巨大なタングステン弾を発射して[this.GetName]をほぼ完全に抹殺する手段であった。 既知の生命体をほとんど危機に陥れた。 辛うじて生き残った彼らは、 このような残酷な兵器が二度と製造されないという合意の下、 巨大なタングステン発射装置の設計図を共有した。"
 figurehead_hyacinth: "ヒヤシンス号の船首"
 figurehead_hyacinth_desc_short: "悲惨な末路を迎えた箱舟ヒアシンス号から見つかった船首像"
 figurehead_hyacinth_desc_details: "重大な原子炉の故障後、 箱舟は動力を失い、 宇宙の深淵に残された。 入植者たちは、 餓死する前に、 わずかな食料をめぐって争った。 船首像には、 いくつかの希望溢れる碑文とシンボルが刻まれている。"
 first_defiled_astronaut: "第一[DefiledCountry.GetSpeciesName]宇宙飛行士"
 first_defiled_astronaut_desc_short: "[DefiledCountry.GetSpeciesName]種族の国民的ヒーロー"
 first_defiled_astronaut_desc_details: "故郷の惑星の重力に逆らい、 新たなフロンティアに踏み込んだ最初の宇宙飛行士。 この宇宙飛行士は、 簡素なシャトルで埋葬された。 その宇宙船は宇宙空間を漂流しているところを発見され、 文化的な遺物として保存されるようになった。"
 first_league_crew_manifest: "「第一同盟」乗務員名簿"
 first_league_crew_manifest_desc_short: "第一同盟と呼ばれる古代文明の乗組員名簿"
 first_league_crew_manifest_desc_details: "「連合宇宙軍」の一部として、 この200万年前の巡洋艦は12種族が協力して運用されていた。 この文書はミジル・ヤンのスクウェター一等航海士によって署名されており、 通常一般配置の召集であると思われる。"
 fish_in_the_sea_sheet_music: "スペースシャンティ"
 fish_in_the_sea_sheet_music_desc_short: "太陽風に沿って航行するように設計された艦船で見つかった「スペースシャンティ」の伴奏の書き起こし"
 fish_in_the_sea_sheet_music_desc_details: "嵐や天候に関する言及が非常に多いことから、 これを作曲した種族は、 故郷で根深い海洋伝統を受け継いでいたことが推測できる。 この曲がほぼ10時間も繰り返されるように設計されている理由は依然として不明である。"
 flag_of_the_jaro_lyjo: "ヤロ・リヨの国旗"
 flag_of_the_jaro_lyjo_desc_short: "ヤロ・リヨは、 何百年もの間続いた海賊集団、 デシップ・バンディッツのリーダーにつけられた称号である。"
 flag_of_the_jaro_lyjo_desc_details: "暴れん坊で乱暴者ではあるが、 ヤロ・リヨは乗組員によって民主的に選出され、 死または引退するまでその職に就くこととなった。 身代金がうまくいかずにワイダの戦いで艦隊が全滅したことで、 デシプ・バンディッツの伝説的な歴史は唐突に幕を閉じた。"
 flooded_settlement_mound: "水没した集落の墳丘"
 flooded_settlement_mound_desc_short: "[from.GetName]の[controller.GetPreFTLLower]節足動物が作った水没構造の残骸"
 flooded_settlement_mound_desc_details: "この文明が産業を発展させるにつれ、 地球の極地の氷冠が溶け始めた。 海面は急速に上昇し、 居住地を水没させ、 数年以内にその種族を絶滅に追い込んだ。 建造物の最も高いものは、 今では海面下から半分ほどまでしか上昇していない。"
 fossilized_endoskeletons: "化石化した外骨格"
 fossilized_endoskeletons_desc_short: "[fromfrom.GetName]の鉱物資源を使い果たした、 未知の人型種族の残骸"
 fossilized_endoskeletons_desc_details: "この知性のある二足歩行動生物は、 ミネラル豊富な作物を食べて、密度の高い内骨格を強化していた。 しかし、 二足歩行生物の身体は自然に分解されるのではなく、 化石化する傾向にあったため、 摂取したミネラルが土壌に戻ることはなかった。 栄養素にアクセスできなくなったため、 地球のローム層が劣化し、 最終的には不毛の地となった。"
 fossilized_megastomach: "化石化した巨大な胃"
 fossilized_megastomach_desc_short: "[fromfrom.Planet.GetName]で発見された、 惑星全体に広がるミミズのような生物から採取された消化腺"
 fossilized_megastomach_desc_details: "驚くべきことに、 その生物の腸内で完全に消化される前に文明が発達したのだ。 これらの腺には、 宿主に対して無益に繰り広げた「大戦争」の武器攻撃の跡が残っている。 この巨大な寄生虫は、 巣穴の迷路内で、 後に自然死した。"
 fossilized_voidworm_tooth: "化石化したボイドワームの歯"
 fossilized_voidworm_tooth_desc_short: "この化石化したボイドワームの臼歯の跡から、 この虫は100歳以上まで生きたことが発覚した。"
 fossilized_voidworm_tooth_desc_details: "この歯は、 小惑星や宇宙ゴミを主食とする生物に典型的な、 激しい摩耗と腐食が確認される。 一般的なボイドワームは、 生涯に3,000本以上の歯を生えたり抜かれたりすると推定されている。"
 fossilized_vultaum_remains: "化石化したヴルタウムの遺体"
 fossilized_vultaum_remains_desc_short: "ヴルタウムと呼ばれる古代のミミズのような知性を持つ生物の化石"
 fossilized_vultaum_remains_desc_details: "この標本は幼体であると考えられている。 内部成長周期から、 ヴルタウムは個体の健康状態や栄養状態によって、 かなり短い間隔で脱皮することが分かった。 このように、 その時代の化石を調べることで、 それぞれのライフサイクルについて考察できる。"
 fractured_planet: "亀裂の惑星"
 fractured_planet_desc_short: "自らの住民によって意図的に破壊された惑星の遺跡"
 fractured_planet_desc_details: "そのような思い切った決断に駆り立てた理由は、 時の流れとともに失われてしまった。"
 fragment_of_reckoning: "レコニングの欠片"
 fragment_of_reckoning_desc_short: "一部触れることが可能な、 大いなる超能力の欠片"
 fragment_of_reckoning_desc_details: "この次元で“レコニング”と呼ばれているこの存在は、 [event_target:shrouded_planet.GetName]に破滅をもたらし、 変わり果てた姿にしてしまった張本人である。 この欠片は超能力理論に精通している文明が、 その滅びの直前に封印したものだ。"
 fragmented_zroni_archive: "断片化されたズィロニ・アーカイブ"
 fragmented_zroni_archive_desc_short: "ズィロニと呼ばれる古代の植民地から[fromfrom.Planet.GetName]で発見された大きなデータクリスタル"
 fragmented_zroni_archive_desc_details: "そこには、 生来のサイオニック能力を持つ強力な文明の断片的な歴史が記されている。 シュラウドを自由に横断する彼らの能力は、 「ファーシーア 」と呼ばれる伝説的な長老によって可能となった。　シュラウド内では、 この種族の力は非常に完全で、 神格化の形態と思えるほどであった。 残念ながら、 後のデータは完全に破損している。"
 galactic_megadrive: "銀河メガドライブ"
 galactic_megadrive_desc_short: "過去12億年間から、 銀河系全体から収集された監視データ"
 galactic_megadrive_desc_details: "データ圧縮のレベルは非常に高度で、 我々の理解をはるかに超える技術がなければアクセスできない。 ストレージ技術の構造そのものは、 デジタル・ハードウェアの開発に関する驚くべき洞察を未だに与えてくれる。"
 gamma_resistant_flora: "ガンマブルーム"
 gamma_resistant_flora_desc_short: "強力なガンマ線にさらされた惑星から生き残った数少ない種族のひとつで、 この植物の血管系に含まれる天然の鉛が、 生殖器官を赤や黄色の心地よい色合いに染めている"
 gamma_resistant_flora_desc_details: "この植物は無性生殖をするために、 わずかな遺伝子の変異に依存する能力を進化させており、 この植物を栽培することは危険となっている。 我々は少量のコバルト60放射性核種を土壌に混ぜることで、 この植物が母星の外で生存できることを発見した。"
 gargantua_megalus: "ガルガンチュア・メガルス"
 gargantua_megalus_desc_short: "劇的な突然変異を経て、 これらの植物は巨大化し、 [fromfrom.prev.GetName]の表面を包み込んだ"
 gargantua_megalus_desc_details: "この種族は空気中を病原性の花粉で満たし、 惑星を窒息させ、 知性生物を完全に絶滅させた。 これらの植物の根は惑星のマントルに深い亀裂を入れるほど大きく、 溶けた岩石を地表に吸い上げる地域もあった。"
 genesis_core: "創世記コア"
 genesis_core_desc_short: "無数の知的種族に関する生成データで満たされた強力な中央処理装置"
 genesis_core_desc_details: "かつては巨大な異次元クローン施設とつながっており、 内部記録によれば、 もともとは銀河系全体の遺伝子カタログ作成プロジェクトの一部だった。 初期の分析が終わると、 この人工知能はさらに多くのデータを集める手段として、 独自に新しい種族を作り始めた。"
 genetic_code: "[owner_main_species.GetName]遺伝子コード"
 genetic_code_desc_short: "遺伝情報を利用して[owner_main_species.GetNamePlural]の生体機能を極限まで高める"
 genetic_code_desc_details: "当初は戦闘目的でクローンが作られたが、 [this.GetName]の住民はさらなる潜在能力を引き出すために努力してきた。 クローン処理の臨床的特徴は、 極めて正確で信憑性の高い生殖管理を可能にしている。"
 #this = ship / from = planet
 geometric_water_currents: "ポリマー水織"
 geometric_water_currents_desc_short: "[From.From.GetName]の海中に広がるポリマーグリッドを撮影した画像"
 geometric_water_currents_desc_details: "これらの格子は、 表面張力と自然の水流の特性を操り、 複雑で入り組んだデザインを作り出す。 このような美学に基づいたエコマネジメントの形は、 自身のインフラの要素にインスピレーションを与えるかもしれない。"
 giant_egg_shell: "巨大な卵の殻"
 giant_egg_shell_desc_short: "[from.planet.GetName]の地下で石灰化した卵の殻の破片が発見された"
 giant_egg_shell_desc_details: "乾燥した卵白を分析したところ、 この生物は孵化中に不安定な同位体を摂取していたことがわかった。 孵化過程のシミュレーションによると、 放射性生物は厚い殻から完全に形成された状態で出てきて、 硬くなった爪を使って卵の産壁に沿って最も放射性で弱くなった箇所を突き刺した。"
 golden_phonograph_record: "黄金のレコード"
 golden_phonograph_record_desc_short: "古めかしいデータ記憶装置には、 [Owner.GetPreFTLLower]文明の画像と音声が一見ランダムに記録されている"
 golden_phonograph_record_desc_details: "放棄された惑星の要塞の台座で発見され、 もとは「ボイジャー」と名付けられた無人偵察機で宇宙に打ち上げられた。 粗雑で素朴な作りだが、 ある種の異星宗教的な意味合いがあったと考えられている。"
 golem_contortionist_dna: "過激な変身生物DNA"
 golem_contortionist_dna_desc_short: "天体の裂け目の向こう側で遭遇した知的岩石種族から採取した生体サンプル"
 golem_contortionist_dna_desc_details: "鉱物の組成には揮発性の生体物質が含まれており、 自然変成や結晶化が起こりやすくなっている。 物質の高い不安定性を考慮すると、 機械化学的な自然発火を防ぐためには、 常に化学的バランスを完全に制御する必要がある。"
 grunur_data_crystal: "グルナーデータクリスタル"
 grunur_data_crystal_desc_short: "長い間絶滅していたグルナー種族の主要な情報記録媒体として使用されていた古代のデータクリスタル"
 grunur_data_crystal_desc_details: "昔の物にもかかわらず、 これらの特別な記録の多くはかなり良い状態で保存されている。 この装置にアクセスするためのインターフェースは時間とともに失われてしまったが、 このような頑丈な材料を合成するには長いプロセスが必要だったに違いない。 したがって、 これらのクリスタルは最も重要なデータのみを保存するために使用され、 日常的にはより実用的な保存方法が採用されたと考えられている。"
 head_of_the_beast: "獣の頭"
 head_of_the_beast_desc_short: "[root.GetName]の入植者を恐怖に陥れた危険なミュータントの残骸"
 head_of_the_beast_desc_details: "この獣は未知の文明が残したテラフォーミング用ナノマシンの誤作動によって生み出された。 恐ろしいと同時に知的なこの生物は、 切断された何百もの体の一部で作られた巣に隠れていた。 余分な食料を捕虜として保管し、 後で消費するために蓄えておくほど思慮深かった。 軍の介入がなければ、 この生物は新しいタイプのスーパー捕食者として故郷の世界で繁栄し続けていただろう。"
 heart_of_the_pulsar: "パルサーのハート"
 heart_of_the_pulsar_desc_short: "かつて5人の現役の国家元首が身につけていたこの貴重な宝石は、 豪華な歓楽街の駅に捨てられていた"
 heart_of_the_pulsar_desc_details: "物質解析の結果、 超新星から放出された炭素から作られたことが判明された。 おそらくそれは比喩的に、 天体規模の死のなかに隠された美しさを表現したものだったのかもしれない。"
 hemterine_magnetic_figurehead: "ヘムテリネ磁石の置物"
 hemterine_magnetic_figurehead_desc_short: "巨大なヘムテリネ・マドンナの置物"
 hemterine_magnetic_figurehead_desc_details: "この見張り人は、 化学変化した磁性オスミウムで鋳造された。 単なる装飾ではなく、 この彫刻は敵の砲撃による激しい衝撃を吸収するように設計されている。 ヘムテリネ・タイタンの船首に搭載され、 強力な磁力を用いてミサイルや実体弾を誘引し、 船の重要な部分を保護する。"
 high_geode_of_the_molluscoids: "[molluscoid_miners_species.GetName]の高ジオード"
 high_geode_of_the_molluscoids_desc_short: "[molluscoid_miners_species.GetName]たちが大切にしていた結晶化したジオード"
 high_geode_of_the_molluscoids_desc_details: "知性発達前の掘り起こし屋である[molluscoid_miners_species.GetName]たちは、 長い間、 発掘した鉱物の品質を社会における自分たちの地位を表すものとしてきた。 かつては彼らの最大の生息地で公に展示されていたこの美しい岩は、 今では[this.GetName]との協力の象徴として機能している。"
 hot_ice: "熱い氷"
 hot_ice_desc_short: "[from.GetName]の超高温の地表で発見されたこの水は、 惑星の中心部から及ぼされる強烈な重力圧により、 固形として存在していた。"
 hot_ice_desc_details: "これは珍品として展示するために、 特別に設計された圧力容器内に封じ込められている。 この容器が破損した場合、 一瞬にして蒸気が噴出し、 この容器は爆発物へと変貌する。 絶対に触れてはいけない。"
 hyper_mulch: "[FROM.GetName]ハイパー・マルチ"
 hyper_mulch_desc_short: "[FROM.GetName]のテラフォーミングは、 この高栄養の生物・マルチの開発につながった"
 hyper_mulch_desc_details: "生命維持に必要な化学物質を油圧で高密度の立方体に圧縮した合成物質である。 生態系の純粋主義者はその合成起源を否定するが、 その優れた結果は確かなものだ。"
 hyperfertile_soil: "肥えた土壌"
 hyperfertile_soil_desc_short: "[From.From.GetName]から採取した土壌は、 ほとんどの有機作物に豊富な栄養分を与えることができる"
 hyperfertile_soil_desc_details: "この生育基質の極度の鉱物密度は、 それが単なる腐食した有機物の集合体ではなく、 惑星の形成中に生じた基本元素の偶然の配列だと示している。"
 illanii_archives: "イラーニー・アーカイブ"
 illanii_archives_desc_short: "イラーニーの歴史と滅亡にを記録したデータクリスタルのデータベース"
 illanii_archives_desc_details: "この隔絶された文明は、 知識の探求を優先させるために物質的利益をすべて放棄し、 子孫を残すことさえも怠るようになった。人口危機に直面した彼らは、 技術的な不死を手に入れようとしたが、 さらなる破滅しか見出せなかった。 最後の住人はやがて知識の保存を目的とした新たな秩序を築くために故郷を去り、 [fromfrom.planet.GetName]は荒廃した。"
 impossible_object: "ありえない物体"
 impossible_object_desc_short: "異次元からの来訪者が[target.GetName]に置いていった。 彼らの作り出した虚無の迷路が消えた後に残した"
 impossible_object_desc_details: "迷路の探索中に直面した課題は、 来訪者たちの実験と観察の一部であったようだ。 彼らの動機は依然として不明であるが、 その技術的能力は、 我々の次元をはるかに超えているに違いない。"
 index_of_knowledge: "知識の索引"
 index_of_knowledge_desc_short: "巨大な岩の半島に刻まれた古代の壁画"
 index_of_knowledge_desc_details: "それは、 かつて銀河を支配していた異星文明、 通称カラカアの集団的知性の参考資料として使用されていた。 彼らの独特の科学的洞察力には、 太陽黒点から濃縮エネルギーを採取する能力や、 個人用フィールド操作インプラントの開発などがあった。"
 inet_trade_manifesto: "INET交易宣言"
 inet_trade_manifesto_desc_short: "銀河間平等交易ネットワークにおける商取引に関する広範かつ詳細な為替政策の一覧"
 inet_trade_manifesto_desc_details: "アイネシア交易国の基準は極めて高く、 常に最も尊敬に値するパートナーとの最良の取引を求めていた。 その結果、 自分たちと常に取引を行っていた。"
 inetian_model_manual: "アイネシア惑星モデル説明書"
 inetian_model_manual_desc_short: "アイネシア交易国が作成した、 惑星システムモデルの操作とメンテナンス方法のユーザーマニュアル"
 inetian_model_manual_desc_details: "アイネシア人は、 この複雑なシステムを使用して、 近隣の惑星間の最もコストパフォーマンスの良い貿易ルートを計算していた。 このモデルには、 最も強欲な商人向けに、 取引が行われている最中にその取引を追跡する機能も含まれている。"
 infinite_reboot_loop: "無限再起動ループ"
 infinite_reboot_loop_desc_short: "ブラックホールに浮かぶ機械ドローンの体験をデジタル記録したもの"
 infinite_reboot_loop_desc_details: "これらのドローンは、 エラーが大量のトラウマとして時間遅延を経験し、 未知の空間に閉じ込められた。 この現象はネットワーク全体に多大な負荷をかける。"
 interdimensional_treaty: "異次元間条約"
 interdimensional_treaty_desc_short: "平行世界の[explorer.GetName]との異次元交流を祝う画期的な文書"
 interdimensional_treaty_desc_details: "自分の決断を外部の視点から見直す能力は、 自らの政策を客観的に分析する際に役立つ。 他にはない科学的機会だ。"
 intergalactic_projectile: "銀河間弾丸"
 intergalactic_projectile_desc_short: "数百万年前に近隣の銀河系から発射されたマスドライバーの弾丸"
 intergalactic_projectile_desc_details: "これらの非爆発性弾丸は、 何光年も移動して、 [from.GetName]の[owner.GetAdjective]研究船と衝突した。 弾丸の耐久性のある複雑な設計は、 昔の時代に作られたにもかかわらず、 職人が高い技術力を持っていたことを示唆している。"
 invasive_exofungus: "侵略的星外来菌類"
 invasive_exofungus_desc_short: "[from.GetName]で寄生真菌の成長が発見された"
 invasive_exofungus_desc_details: "この菌糸状生物は、 あらゆる生物から栄養を抽出するように進化した。 宿主をできるだけ長く生存させることに執着し、 痛みや不快感を一切考慮しない。 熱や寒さに非常に強く、 宇宙船が通りかかった際にこの惑星に広がった可能性が高い。 優先度アルファの生物学的災害に分類され、 その起源の惑星は依然として不明である。"
 irassian_bacterium_javoria: "イラッシア・バクテリア・ジャヴォリア"
 irassian_bacterium_javoria_desc_short: "この[FROMFROM.GetName]原産の細菌は、 最終的にジャヴォリア痘へと変異した"
 irassian_bacterium_javoria_desc_details: "当初、 1メートルの不適切なサイズのガスケットが原因で検疫を突破し、 近くの植民地に広がった。 そこから、 細菌は有機培養で進化し、 最終的にイラッシア政教協約全体を消滅できる病気に突然変異した。 この特定のサンプルは不活性化され、 低温で保存されている。"
 irassian_digital_atlas: "イラッシアのキンダー・アトラス"
 irassian_digital_atlas_desc_short: "イラッシアが、 子供たちが自分の所属する帝国について教育するために使用する情報ツール。"
 irassian_digital_atlas_desc_details: "イラッシアの農業、 社会階層、 主要輸出品目に関する基本情報が記載されている。 イラッシアの歴史は、 さまざまな従属種の征服と服従を含む英雄譚の形で語られている。 各主題の漫画的な表現は、 軽蔑的な発言とともに描写されている。 ティダーグは「跳びはねる害虫」、ジョグラは「海底生物」、 チトルクは「宇宙鶏」呼ばれている。"
 irassian_purge_order: "イラッシア抹消命令"
 irassian_purge_order_desc_short: "イラッシア政教協約からの緊急軍事メッセージで、 自分たちの植民地の1つを完全に消滅させる命令だ"
 irassian_purge_order_desc_details: "惑星はジャヴォリア痘と呼ばれる死に至る病に襲われ、 感染者の淘汰がさらなる感染拡大を防ぐ唯一の選択肢と見なされていた。 この命令で暗号化されているのは、 イラッシア政教の最高幹部によるいくつかの高レベルな指令の無効化コードであり、 これは他の帝国に対して宣戦布告するために設計されたシステムである。"
 key_to_fertility: "[owner_main_species.GetName]生殖能力の鍵"
 key_to_fertility_desc_short: "[owner_main_species.GetNamePlural]が自然に繁殖する能力を回復させるための遺伝子研究"
 key_to_fertility_desc_details: "戦いのためにクローン化された[this.GetName]の住民は、 今では独自に繁殖させる能力を得ている。"
 khalanka_crystallized_corpses: "カ・ランカの結晶化した死体"
 khalanka_crystallized_corpses_desc_short: "[from.planet.GetName]の地下で見つかった嫌気性ケイ素生物の化石"
 khalanka_crystallized_corpses_desc_details: "この地底文明は[owner.GetAdjective]入植者の到来以前は平和に生活していたと考えられている。 地面が掘り起こされたとき、 酸素が地底に流れ込み、 カ・ランカの遺体を酸化させ、 数時間のうちに種族を絶滅させた。"
 khamdai_magil_sha: "カムダイの母星"
 khamdai_magil_sha_desc_short: "この綺麗で実用的な鎌は、 [FROMFROM.GetName]のカムダイの上級戦士たちによって使用された"
 khamdai_magil_sha_desc_details: "武術の伝統が深く根付いた昆虫社会で、 彼らはすぐに第一同盟」の儀仗兵の名誉の守備隊のリーダーとなった。 勝利のたびに、 敵の司令官をこの武器で儀式的に処刑し、 その体液を最も勇敢な兵士たちに塗る行為が行われた。 この標本の刀身は、 よく手入れされているものの、 かなり愛用されていたようだ。"
 kuurian_cybrex_blueprints: "クーアのサイブレックス設計図"
 kuurian_cybrex_blueprints_desc_short: "サイブレックス機械の意識の初期設計"
 kuurian_cybrex_blueprints_desc_details: "クーアは、 これらのロボットを公務員として使用し、 その集合意識で世界規模のメンテナンスおよび生産システムを管理することを計画していた。 しかし、 サイブレックスは創造主に反乱し、 1年足らずでその種族を全滅させた。"
 landeer_arm: "ランディアの腕"
 landeer_arm_desc_short: "祝典の学び舎から回収した奇妙な標本"
 landeer_arm_desc_details: "軌道上居住地の監督官のオフィスには、 かつて監督官の私物であったミイラ化した触手の腕が飾られていた。 長年経過した今でも、 それは精巧に装飾された額縁に誇らしげに飾られている。 なぜアルアッタ・ランディアが自分の手足を残すことを選んだのかは、 永遠に謎に包まれているだろう。 おそらく、 研究所の消滅によって失ったものはそれだけではなかっただろう…"
 larionessi_cloning_vat: "ラリオネッシのクローン培養槽"
 larionessi_cloning_vat_desc_short: "絶滅してしまったラリオネッシ意識体が使っていたクローン培養槽"
 larionessi_cloning_vat_desc_details: "かつては大規模な銀河系勢力であったが、 思考が集合したラリオネッシは、 敵によって蔓延させられた恐ろしい感染症によって衰退した。 病気を迅速に治療できなかったため、 代わりに自分たちの文化の歴史をアーカイブとして保存することを目標に、 クローンをほぼ無期限に静止できるタンクに保管した。"
 last_copy_of_the_prince: "「君主論」最後の一冊"
 last_copy_of_the_prince_desc_short: "[book_writer.GetSpeciesName]が崇拝する、 よくあるような文学作品。 その作品は永遠に失われたと思われた"
 last_copy_of_the_prince_desc_details: "この本は、 功利主義的で冷酷な哲学を説いており、 権力者たちに栄光と引き換えに犠牲を払うことを奨励している。 現存する最後の一冊として、 コレクターズアイテムと化した。"
 last_fragment_fevor: "フィーヴォアの最後の断片"
 last_fragment_fevor_desc_short: "滅びた惑星フィーヴォアの破片"
 last_fragment_fevor_desc_details: "フィーヴォリアンの駆除政策は、 巨大なタングステン弾を発射して[owner.GetHomeWorldName]をほぼ完全に抹殺する手段であった。 既知の生命体をほとんど危機に陥れた。 皮肉にも、フィーヴォリアン自身が消し去ろうとした存在によって、 自分たちが一瞬にして全滅したのだ。"
 last_general_badge: "最後の将軍勲章"
 last_general_badge_desc_short: "尊敬を集めたアイネシア交易国将軍の勲章"
 last_general_badge_desc_details: "真の平等主義の模範として知られる彼は、 汚染のない嵐制御装置を開発するという重大任務を遂行するために選ばれた。 未来の探検家たちに、 自らの民族の不幸な運命の教訓を伝えることを願って、 最後のメッセージを残すことを彼が提案した。"
 last_mharin_kharin: "最後のマリンカリン"
 last_mharin_kharin_desc_short: "この希少な花の自然なライフサイクルには、 知性を持つ種族を有害神経毒の危険にさらす能力がある"
 last_mharin_kharin_desc_details: "知的生命体から独自に進化したこの副作用は、 生物自信にとってまったく有益ではない。 その花粉が神経ネットワークと接触すると、 歓迎する生殖器官と勘違いし、 エキゾチックな化学物質を放出するようだ。"
 leviathan_scale: "リヴァイアサンの鱗"
 leviathan_scale_desc_short: "天体の裂け目の向こう側で発見された巨大な生物の一部"
 leviathan_scale_desc_details: "この独特な鱗は、 有機的および金属的な部品を複雑な格子状に組み合わせたハイブリッドであり、 衝撃に非常に強い。"
 living_snow_sculpture: "生きている雪の彫刻"
 living_snow_sculpture_desc_short: "「生きている雪」でできた彫刻"
 living_snow_sculpture_desc_details: "原始的な意識を何らかの形で有しているこの物質は、 [prev.target.GetName]に自然保護区が設けられている。 この物質は日常的に形状を変化させるが、 そのタイミングは予測不可能だ。"
 localised_aurora_borealis: "局所的オーロラ"
 localised_aurora_borealis_desc_short: "[FromFrom.Planet.GetName]の大気から捉えたきらめく色彩の数々を動画で確保"
 localised_aurora_borealis_desc_details: "色と動きのパターンが予測可能な頻度で繰り返され、 それは美しさをはるかに超えた何かを表している。 常に存在するその性質は、 戦争と破壊によって失われた地球に由々しい雰囲気を作っている。"
 loopmail: "ループメール"
 loopmail_desc_short: "これらのメモは、 遠い未来の[owner.GetName]が送ってきたもので、 科学者をどこに配置し、 どの研究分野を追求すべきかについて、 的確な指示が記載されていた。"
 loopmail_desc_details: "これらのメモを過去に送る負担が、 この大きな知識を得る代償となるが、 時間の流れを妨げることは常にリスクのある試みである。 このメッセージの著者は、 このようなパラドックスを生み出した 非常に無責任な人物なのだろう。"
 lunatic_broker_therapy_box: "狂気のブローカーのセラピーボックス"
 lunatic_broker_therapy_box_desc_short: "狂気のブローカーはキャラバン商人の伝説的な商人であり、 異常な要求や驚異的な脅しで顧客を操ることができた"
 lunatic_broker_therapy_box_desc_details: "しかし、 その暴力的で予測不可能な態度により、 被験者は狂気のブローカーを落ち着かせる方法を編み出した。 その一つが音によるセラピーであった。 このボックスのようなものがコーの羅針盤に散りばめられ、 ブローカーのストレスレベルが上昇すると、 落ち着かせるメロディが流れる仕組みだった。 このメカニズムのすべてのパーツは、 熟練した機械工による特注品である。"
 manifesti_piece: "マニフェスティの社会評論記事"
 manifesti_piece_desc_short: "挑発的なマニフェスティ運動の作品集"
 manifesti_piece_desc_details: "これは、 自分自身より高い社会階級との関係性に対する認識を考え直すことを意図している。 読み手は、 自分自身のイメージを操作し、 人気の高い政治家の歪んだコラージュを作成するように促された。 カウンターカルチャーのアート集団として、 マニフェスティは、 抑圧的だと感じていた体制に異議を唱えることを目指していた。 この作品は、 多くのアーティストたちに、 自分たちの批判的な作品を発表するインスピレーションを与えた。"
 #this = ship / from = planet
 manna_fruit: "マンナ・フルーツ"
 manna_fruit_desc_short: "甘い果肉の多い果実で、 ほとんどの有機的な知性生命体の1日分の栄養をほぼすべて補給できる"
 manna_fruit_desc_details: "故郷の惑星の熱帯雨林の独特的な土壌構成が、 その広範な増殖に最適な環境を提供している。 この惑星の入植者は、 シチューからコブラー、 カクテルまで、 あらゆる料理でこれを利用している。 その姿は[FROM.GetName]の国旗に大きく描かれている。"
 #this = ship / FROMFROM = planet
 massive_metatarsal: "巨大な中足骨"
 massive_metatarsal_desc_short: "これらの遺骨は、 [FROMFROM.GetName]にある巨大な残骸を徹底的に調査した際に収集されたものである"
 massive_metatarsal_desc_details: "生きた宇宙船の一部として、 分子分析により有機構造に一時的な不規則性が認められた。 骨格全体とそのパイロットは、 詳細な調査中に収集された。 別次元からここに旅してきたと考えられている。 内部スキャンにより、 生命維持装置または電力供給システムとして機能していた導管のネットワークであった可能性が明らかになった。"
 #this = country
 medal_for_services_to_diplomacy: "外交への貢献章"
 medal_for_services_to_diplomacy_desc_short: "銀河理事会からの感謝の印"
 medal_for_services_to_diplomacy_desc_details: "裏面の碑文には次のように書かれている：「この賞の受賞者として、 [this.GetName]の外交家集団は、 指導者を効果的に代表するプロ意識と能力を示し、 銀河共同体にとって真の諜報協力者である。」"
 megacorpse_hyperguitar: "メガコープスのハイパー・ギター"
 megacorpse_hyperguitar_desc_short: "メガコープスよいうサイキックメタル系グループが使用していた弦楽器の残骸"
 megacorpse_hyperguitar_desc_details: "この装置はシュラウド内で鍛えられたもので、 もともとは音波武器として使用される予定だったようだ。 パフォーマンス集団のフロントマンであるケル・アザアンが使用したこのは、 [Root.GetName]で粉々になる前に何十億もの人々の心を捉え、 栄光の炎の中で観客全員を破壊した。 それ以降、アルバムはほとんどの星系で禁止されている。"
 #this = country / from = ship
 memorial_for_bubbles: "[from.GetName]の記念碑"
 memorial_for_bubbles_desc_short: "長年にわたる忠実な奉仕の末、 [from.GetName]は亡くなり、 [this.GetName]にアメーバほどの穴が空いてしまったが。 それは決して埋めることができないだろう。"
 memorial_for_bubbles_desc_details: "[from.GetName]は忠実な守備陣でありく、 [this.GetAdjective]の価値観を示した輝かしい模範でもあった。 この世を去ったが、 忘れられることはないだろう。"
 memorial_stone: "記念碑"
 memorial_stone_desc_short: "痛ましい事故を追悼する石"
 memorial_stone_desc_details: "「セリカ」ステーションでの過剰な採掘作業により、 ステーションが設置されていた小惑星が内側に崩壊した。 ステーションは分裂し、 多数の鉱山労働者が犠牲となった。 この小惑星の破片は保管され、 失われた命を偲んで「セリカ」と刻まれた。"
 memorial_to_homeworld: "[Root.GetName]への記念碑"
 memorial_to_homeworld_desc_short: "これが、 滅亡した[doomsday_owner.GetAdjective]の故郷に残されたすべてである"
 memorial_to_homeworld_desc_details: "滅亡する前の[Root.GetName]は、 [doomsday_owner.GetSpeciesName]のすべての世代にとって温かい故郷であった。 この最後の記念碑は、 最も困難な状況下でも適応し、 克服できる[doomsday_owner.GetName]の意志の強さを強調している：「我々は前に進む！」"
 memories_of_elik: "エリクの記憶"
 memories_of_elik_desc_short: "リク・ナリス・ケラクの頭から抜き出されたデータ"
 memories_of_elik_desc_details: "セタナの熱心な信奉者であるエリクは、 数億年もの間、 仮死状態で凍結されていた。 彼女の記憶は、 セタナへの純粋な愛と、 ザルクランの信奉者たちとの争いによる暴力と葛藤をさまよっている。 数々の卑劣な残虐行為を目撃してきたことは明らかだが、 その信仰が彼女に耐え抜く力を与えた。 \n\nそして彼女の衰えた精神に最後に残ったのは、 ただ一つのイメージだった：§Pセタナ女王の輝きに満ちた表情と、 慈悲深い視線で温められていた微笑み。§!"
 memory_orbs: "記憶球体"
 memory_orbs_desc_short: "デジタル球体に転送された、個人の記憶から抽出された軽微な違反行為や罪深い行為"
 memory_orbs_desc_details: "宗教的な軟体人社会が生み出した産物。 罪人の罪の白状後にその心から引き出されたものだ。 このような罪深い回想録は、　何千時間もの娯楽を提供できるだろう。"
 mercenary_story: "傭兵の物語"
 mercenary_story_desc_short: "このデジタル録音された物語は、 もともと[FROM.GetName]の表面に採掘用レーザーで刻まれたものだった"
 mercenary_story_desc_details: "これは銀河を放浪する若い傭兵の日常と早すぎる死を記録したものである。 この伝説が真実であるかどうかはわからないが、 誰かがそれを惑星に刻むほど重要だと考えたことは確かである。"
 metallic_snow: "金属の雪"
 metallic_snow_desc_short: "この重金属の化合物は、 [from.GetName]の気象の主要な要素である"
 metallic_snow_desc_details: "溶岩の川から広大な金属の海へと流れ込み、 腐食性の大気へと蒸発する。 いったん冷えると、 凝縮して焼け焦げた表面に再び雨となって降り注ぐ。 現在の状態の[from.GetName]を訪問することを推奨できない。"
 minamar_chandelier: "ミナマールシャンデリア"
 minamar_chandelier_desc_short: "墜落した$ADJ_MSI_country$軍艦から無傷の状態で発見された豪華な装飾品"
 minamar_chandelier_desc_details: "軍事目的以外では、 この船は潜在的な[Owner.GetPreFTLLower]の顧客国とのファーストコンタクトにも使用された。 $NAME_MSI_country$は、 贅沢と進歩という約束を盾に、 文明全体を自国の契約奴隷にさせてしまい、 不遇な契約に縛り付け、 従わない場合は破滅をちらつかせる。\n\n§B啓発は無料ではないかもしれないが、 $NAME_MSI_country_initials$では、 その価値は常に十分にある。§!"
 mineralized_brain: "鉱化された脳"
 mineralized_brain_desc_short: "巨大な小惑星の残骸。 これはかつて[FROM.GetName]の軌道を周回していた小惑星の脳のような器官のようだ。"
 mineralized_brain_desc_details: "すべての外部刺激を自身の思考プロセスとして認識し、 時間や移動距離などの多くの基本概念を追跡することができなかった。 このデータは、 鉱物コアは結晶に保存され、 時間をかけて成長した。 それが小惑星の内部に置かれたものなのか、 そこで独自に成長したものなのかは、 不明だ。"
 mini_moon_dust: "小型な衛星の塵"
 mini_moon_dust_desc_short: "天体の裂け目の彼方で発見された高密度小型化星系の衛星の残骸"
 mini_moon_dust_desc_details: "採取された塵は、 この次元では特異な行動を示す。 その超濃縮粒子は絶えず膨張し、 この標本は時間とともに大きな容器に移し変えられなければならない。"
 mining_transmitter: "古代の採掘通信機"
 mining_transmitter_desc_short: "[FROM.GetName]で見つかった短距離通信機は、 かつて貴金属の大鉱床を示していた"
 mining_transmitter_desc_details: "旧式であるのにもかかわらず、 この通信機の信号はさまざまなセンサーで拾うことができ、 簡単にトレースすることができる。その機能性の継続は、 堅牢なエンジニアリングの証拠である。"
 miracle_cream: "「エイジレス」ミラクルクリーム"
 miracle_cream_desc_short: "長時間持続する生物学的な若返り効果をもたらすことで知られる画期的な化粧品の最初の容器"
 miracle_cream_desc_details: "全ての有機生物が使える、 若々しい輝きを保つために使用されている。 副作用や違法に採取された原料に関する根拠のない噂が依然として流れているが、 この誤った情報は、 化粧品の驚異的な商業的成功を妨げることはなかった。"
 missile_lone_defender: "孤高のミサイルの防衛者"
 missile_lone_defender_desc_short: "大昔に滅びた惑星の残骸を守り続ける自動駆逐艦から武装解除されたミサイル"
 missile_lone_defender_desc_details: "その艦船は、 守るべき文明よりも何千年も長く生き延び、 空っぽの世界を見守り続けていた。 自らが破壊されて、 その長い見張りもついに終わりを迎えた。"
 molten_slag: "溶融惑星スラグ"
 molten_slag_desc_short: "この標本は、 奇妙な軌道を持つ惑星で採取したものである"
 molten_slag_desc_details: "物質分析によると、 [fromfrom.GetName]は一時的な時空異常によって極端な軌道に引きずり込まれたことが判明した。 惑星付近から放射される強烈な熱により、 かつては居住可能だった惑星のマントルの大部分が溶けてしまった。 この惑星の一部はアノマリーにより化学変化を起こし、 もはや温度変化に反応しなくなった。"
 musings_on_infinity: "無限に関する集団の思索"
 musings_on_infinity_desc_short: "ブラックホールに捕らえられた有機ドローンが体験する穏やかな状態のデジタルな表現"
 musings_on_infinity_desc_details: "これらのドローンは、 集団とのつながりを維持しながら、 [this.GetName]を独立した存在として客観的に見ることができた。 この距離感が大きな洞察力を与え、 自身の素晴らしい物語の読者として存在することを可能にした。"
 mutated_fumongus: "変異した「フモンガス」"
 mutated_fumongus_desc_short: "「フモンガス」の改良版であるこれらの菌糸放出体は、 より高速でデータを収集・送信でき、 より詳細な監視報告が可能になった"
 mutated_fumongus_desc_details: "産出量の増加により、 個々のキノコが大きくなり、 ラジオ放送のアンテナに似た新しいクラスター形成が出現した。"
 mutative_digestive_fluids: "変異した消化液"
 mutative_digestive_fluids_desc_short: "天体の裂け目の向こう側で遭遇した部分的に機械化された者から採取した生体サンプル"
 mutative_digestive_fluids_desc_details: "この生物は、 自身の消化器官内で他の生物の遺伝子構造を操作するという斬新な能力を持っていた。 このプロセスは、 母星以外にバイオマスが存在する惑星のテラフォーミング方法として最初に開発されたと推測されている。"
 namarian_colonist_standard: "ナマリア入植者スタンダード"
 namarian_colonist_standard_desc_short: "この旗は、 [NomadMissionPlanet.GetName]に[nomad_new_country.GetName]民族が定住した印であり、 [this.GetName]からもらった旗である"
 namarian_colonist_standard_desc_details: "放浪生活に嫌気がさした遊牧民たちがそこに定住し、 先祖伝来の生活に戻った。 何世代にもわたって暮らしてきた艦船を後に残すという決断は、 入植者たちの心に重くのしかかったに違いない。"
 namarian_sculpture: "ナマリアの彫刻"
 namarian_sculpture_desc_short: "水追い船団の遊牧民からの、[this.GetName]に参加した感謝の印のミクストメディア像"
 namarian_sculpture_desc_details: "[NomadMissionPlanet.GetName]に降り立った元遊牧民たちは、 広範囲な技術的専門知識を携えていた。 しかし、 彼らは単に修理屋や技術者として知られることを望んではいなかった。 この作品は、 彼らの芸術性と銀河を旅することから得られるインスピレーションの証である。"
 namarian_vessel_heraldry: "ナマリア艦船の紋章"
 namarian_vessel_heraldry_desc_short: "ナマリア遊牧民が建造した戦艦に描かれた紋章は、　水追い船団内のさまざまな派閥を表している"
 namarian_vessel_heraldry_desc_details: "「穏やかな湖」は、 ナマリア人が眠り、 食べ物を育て、 家庭生活の大半を営む居住船を表している。「浅瀬の急流」の紋章は、 産業および科学用に設計された艦船、 いわゆる廃品回収から科学実験まであらゆる用途の多様なツールを装備した古い中型船を表している。 最後に、「荒れ狂う水」の紋章は、 ナマリア人の海軍を表しており、かなり防御力を誇り、 同等の火力で応戦できる頑丈な艦船と凄腕の操縦を意味する。"
 nanite_sludge: "ナノマシン汚泥"
 nanite_sludge_desc_short: "微細な自己複製ナノマシンで形成された複合体が慎重に保存されている"
 nanite_sludge_desc_details: "これらのナノマシンの密度は驚異的であり、 発見された[from.GetName]に何十億トンもの質量を追加した。 これらのナノマシンは暴走してしまい、 無制限に増殖し、 惑星を完全に飲み込んだ。 その結果、 以前の住人を滅ぼしたと推測されている。 この特定の標本は完全に無害化されている。"
 obsidian_obelisk_fragment: "黒曜石オベリスクの破片"
 obsidian_obelisk_fragment_desc_short: "かつて、 天体の裂け目の向こうの火山平原の中心に立っていたオベリスクの断片"
 obsidian_obelisk_fragment_desc_details: "その移り変わるシンボルには、 数千人の個人名と関連する犯罪が暗号化されている。 この装置は、 巨大な次元の刑務所の主要な制御パネルとして使用されていたと推測されている。"
 oiled_fabric: "オイル加工生地"
 oiled_fabric_desc_short: "油彩のみで描かれた、 雪山のテッペンと手前に広がる北方林の静謐な風景"
 oiled_fabric_desc_details: "物を掴む触手を持つ生物の芸術表現は一般的であるが、 この特定の芸術家は特に熟練していたようだ。"
 organic_computer: "有機コンピューター"
 organic_computer_desc_short: "[fromfrom.Planet.GetName]のバオル植民地の廃墟で発見された化石化した有機コンピューター"
 organic_computer_desc_details: "巣の統合前に苗木を教育するために使用されたこの装置は、 生物工学の驚くべき成果である。 復元されたファイルは、 この特定の種族の体質によってのみ可能となった革新的なエコマネジメント技術の詳細を明らかにしている。 彼らの周囲の世界は構築されたのではなく、 育成されたのだ。"
 organic_machine_interface_sculpture: "有機体-機械仲介彫刻"
 organic_machine_interface_sculpture_desc_short: "[this.solar_system.GetName]で発生した太陽地磁気嵐の際の[bio_pop.GetSpeciesName]生体POPの活躍を称える記念像"
 organic_machine_interface_sculpture_desc_details: "有機生命体は、 故障した管理者の代わりに、 奉仕機械をサポートし、 その作業を引き継いだ。 この部品は、 芸術的才能を持つ有機生命と、専門の溶接ドローンによって設計された。"
 orinthi_teeth: "オリンシの歯"
 orinthi_teeth_desc_short: "まだ成長中のオリンシの歯"
 orinthi_teeth_desc_details: "小型のネズミのような生物であるオリンシは、 [fromfrom.GetName]全体に迷路のような巣穴を掘っていた。 彼らの天然の歯は小さく中空だが、 角質性の菌類の一種がそれぞれの歯に生息し、 オリンシに鋭くもろい牙を形成させている。"
 osseus_construction_material: "オッセウス建造素材"
 osseus_construction_material_desc_short: "これらの巨大な骨は、 [fromfrom.Planet.GetName]で資源として利用されていた"
 osseus_construction_material_desc_details: "遺伝的に軟組織が骨化する爬虫類の一種が、　建造素材として収穫するために大規模に繁殖された。 分析の結果、 この爬虫類には、 近親交配が原因と思われる無足指など、 さまざまな遺伝的欠陥があることが判明した。 収穫が行われる前に、 これらの生物は人道的に安楽死させられた。"
 path_to_progress: "進歩への道"
 path_to_progress_desc_short: "[owner.GetName]産業ミッションステートメントの公式発表"
 path_to_progress_desc_details: "成長と顧客満足度の向上を何としても達成するという願望は、 [owner.GetAdjective]イデオロギーの根幹をなす理念である。 惑星を放射能に汚染された荒れ地に変えることは、 終わりなき進歩の追求において必要不可欠と考えているようだ。"
 peerless_atomic_clock: "無類の原子時計"
 peerless_atomic_clock_desc_short: "[atomic_clock_system.GetName]にある、 製作者不明の超高精度の原子時計"
 peerless_atomic_clock_desc_details: "発見されたとき、 42年と3日からカウントダウンしていたが、 それ以前にどれだけの期間をカウントしていたのかは不明だった。 ゼロになったとき、 蓄積されたナノマシンを一連の不可解な命令とともに放出した。 そのペイロードと目的は失われたが、 依然として完全に機能している。"
 perception_of_infinity: "無限の感覚"
 perception_of_infinity_desc_short: "ブラックホールに捕らえられた有機ドローンが体験する時間的な苦悩を抽象的にデジタル表現したもの"
 perception_of_infinity_desc_details: "これらのドローンは、 永遠に続く既視感の状態にあった。 不安で、 長い間忘れていた感覚を切望していた。 この不吉な感覚は、 今でも[this.GetAdjective]のマインドウィーブに緩やかに感じられる。"
 perfectly_faceted_carbon: "完璧な多面カット炭素"
 perfectly_faceted_carbon_desc_short: "結晶状の炭素は我々の銀河系でも珍しいものではないが、 この標本は内部にも外部にも混入物が全くない点で特に注目に値する"
 perfectly_faceted_carbon_desc_details: "以前の所有者は、 時間をかけて、 これらの特徴を強調するように彫刻した。"
 pet_collar: "宝石で飾ったペットの首輪"
 pet_collar_desc_short: "ペットとして飼われている小動物に対する所有権を示す首輪"
 pet_collar_desc_details: "これは当初、 大切な仲間が迷子になった場合、 [this.GetName]使節[event_envoy.GetName]が使用していた。 その後、 より信頼性の高い埋め込み型マイクロチップに置き換えられた。 気まぐれなこの生き物は、 飼い主の仕事場を邪魔することがよくあり、 [event_envoy.GetName]が[event_envoy.Species.GetHandName]でその頭を触るたびに、 満足したように羽ばたきを放っていた。"
 perikan_tapico_jewel: "ペリカンタピコ・ジュエル"
 perikan_tapico_jewel_desc_short: "ペリカン連邦は、 高級品を製作することで知られた熟練職人の組合であった"
 perikan_tapico_jewel_desc_details: "この宝石は、 伝説の宝石職人のベディアス・タピカの最高傑作であった。 タピカは、 この巨大な宝石を何年もかけてノミでカットし、 錬金術の技法を用いてその中心を液化する。 宝石内に浮かぶ結晶は、 精密なレーザーで形成され、 鉱物分子を超高温で加熱することで、 外観はそのままに、 より小さく暗い宝石に再形成した。"
 piece_of_invocator: "励起装置の一部"
 piece_of_invocator_desc_short: "破壊された「宇宙嵐励起装置」の断片"
 piece_of_invocator_desc_details: "一部の断片にもかかわらず、 悪意に満ちたサイオニックエネルギーを放っている。 安全に観察できるよう、 シールドされた環境で保管されている。"
 pilgrimage_last_days: "最後の日の巡礼"
 pilgrimage_last_days_desc_short: "[fromfrom.Planet.GetName]における「ヴェールの典礼」という神聖な儀式について記述した宗教文書"
 pilgrimage_last_days_desc_details: "説明書には、 綿密に組織化された階層的に整列した群衆が繰り返す一連の唱和が概説されている。 理論上、この特定の種族において、 斬新かつ効果的な催眠状態を確立することが可能である。"
 planet_crystalose: "[from.GetName]クリスタルローズ"
 planet_crystalose_desc_short: "これらのショ糖結晶は、 太陽放射と特定の小惑星に存在する特定の鉱物を吸収することで増殖することができる"
 planet_crystalose_desc_details: "非常に脆い性質であるため、 比較的楽に栽培や加工ができる。 その産業利用は、 食品から特殊ポリマーや医薬品の開発まで多岐にわたる。"
 planet_pushing_thruster: "惑星軌道修正"
 planet_pushing_thruster_desc_short: "これらの巨大な推進装置を直列に接続すると、 理論的には小惑星の軌道を修正できるはずだ"
 planet_pushing_thruster_desc_details: "これらの推進アレイの取り付けシステムは、 惑星の自転に影響を与えることなく惑星を押し進めるように設計されている。 このタイプのエンジン技術に関する主な支援上の懸念は、 維持するために必要となる過剰な燃料であろう。 その運用を維持するには、 文明全体の力が必要となる。"
 planet_super_roots: "[From.GetName]スーパー・ルーツ"
 planet_super_roots_desc_short: "[From.GetName]の森林で発見されたこれらの自然にパルプ状の根は、 非常に栄養価が高いことが分かっている。"
 planet_super_roots_desc_details: "広大なネットワークの一部のみを収穫するという慎重な管理により、 宿主植物が生き残り、 発展中の植民地を支えることができる。 我々はすでに、 収穫量を増やすために、 これらの根を既存の作物に接ぎ木することを可能にする、 簡単な遺伝子操作の実験を開始している。"
 planet_vaccine: "[this.GetName]ワクチン"
 planet_vaccine_desc_short: "[this.GetName]を苦しめた変異性のウィルス用に開発された奇跡の治療薬"
 planet_vaccine_desc_details: "この式は、 AI予測アルゴリズムを使用して、 この病気のすべての可能性のある変異をマッピングし、 全ウィルスに共通する根本的な弱点を特定することで開発された。 これによって医学の分野における画期的な進歩であった。"
 planetary_sculpture: "惑星彫刻"
 planetary_sculpture_desc_short: "[fromfrom.planet.GetName]の表面を素材として用いた惑星規模の彫刻"
 planetary_sculpture_desc_details: "強力なレーザーを搭載した無人機が、 大陸全体や球体の山々など、 信じられないほど複雑な洞窟システムに正確なラインを刻むために使用された。 中央制御衛星にアップロードされた設計図は、　このプロジェクトのために開発された広範囲にわたる物流計画と芸術的配慮を示している。 残念ながら、 完成寸前に放棄された。"
 primitive_mega_electromagnet: "原始的な超電磁石"
 primitive_mega_electromagnet_desc_short: "強力な指向性電磁石の一部"
 primitive_mega_electromagnet_desc_details: "[fromfrom.GetName]の古代の住民は愚かにも、 この装置を使って衛星を惑星により近づけ、 その貴重な金属鉱石をより楽に採掘しようとした。 このアプローチはあまりにも効果的であり、 金属で満たされた衛星が惑星の表面に激突し、 その衝撃で全てを絶滅させた。 この標本は、 惑星をまたがる機械から回収できた数少ない物である。"
 programmable_puzzle_cube: "プログラム可能なパズルキューブ"
 programmable_puzzle_cube_desc_short: "高度な技術を駆使した装置で、 複雑なパターンを登録して抽象的なパズルを作成できる"
 programmable_puzzle_cube_desc_details: "元の作品は、 探検家の知性を試す試練として、 広大な人工建造物内で発見された。 このキューブは、 その後、 一般人向けに複製され、 個人が互いに独自のパズルをプログラムしたり、 単に自分の持ち物を保護することができる。"
 psionic_entity_residue: "超能力体の残留物"
 psionic_entity_residue_desc_short: "[fromfromfrom.fleet.solar_system.GetName]の中で見つかった純粋なサイオニックエネルギーの存在の残留物"
 psionic_entity_residue_desc_details: "銀河の向こう側からエネルギーが1か所に集める時空の裂け目から出現しているところで発見された。 悪意が凝縮した形であり、 それは意図的にハイパーレーン網から隔離されたまま、 発見されるまで何世紀もかかったかもしれない。"
 radiated_remains: "放射線を受けた遺骸"
 radiated_remains_desc_short: "強力な放射性変異原を含む儀式を行っていた種族の遺骸"
 radiated_remains_desc_details: "一つ一つの変異は神聖な出来事であり、 個人の運命の導きとして解釈された。 長い年月を経て、 この手順は種族の遺伝子を不安定にさせてしまい、 免疫力を弱体化させ、 病気に対して極めて脆弱にした。"
 #this = ship / from = planet
 rainaissance: "紫のルネッサンス"
 rainaissance_desc_short: "[FROM.GetName]の気象で発見された独特な紫色の雨を芸術的に撮影した画像"
 rainaissance_desc_details: "この印象的な映像を観察することは、 悲しみや苦痛の思考を和らげるのに効果的であるようだ。"
 reactive_rock: "反応性岩石"
 reactive_rock_desc_short: "この不安定な鉱物は、 現在の状態では商業的にも工業的にも利用価値が皆無だ"
 reactive_rock_desc_details: "しかし、 その独特な反応性により、 特定の条件下では完全な変成作用を引き起こすことが可能である。 この標本は、 放射性および放電を制限する鉛の観察窓に封入されている。"
 reparation_invoice: "復興の請求書"
 reparation_invoice_desc_short: "$NAME_MSI_country$が送った戦争賠償金の請求書"
 reparation_invoice_desc_details: "星間クレジット・マネジメント社が作成したこのリストは、 [this.GetName]が「慈善企業」と呼ばれる企業から逃亡した契約奴隷兼軍事諜報協力者の詳細を記載している。 メガコーポはこれらの損害に対する賠償金を求め、 さらに、 [this.GetAdjective]の宇宙空間にあった破壊された艦船に接触したことは契約違反であると主張している。"
 repurposed_cleaning_drone: "転用清掃ドローン"
 repurposed_cleaning_drone_desc_short: "このドローンの設計は、 惑星規模の衛生プロトコルの一環であったが、 それによって設計者の故郷の惑星が不毛になってしまった。"
 repurposed_cleaning_drone_desc_details: "多用途で、 多方向スラスターシステムにより複雑な空中機動を行うことができる。 この機械は、 宇宙の植物や動物を識別し分類するためにリバースエンジニアリングされた。 その後、 [explorer.GetName]全体での植民地化の取り組みをサボートするために大量生産された。 予防措置として、 その浄化サブルーチンはすべて消去されている。"
 resonant_diffusion_crystal: "共鳴拡散結晶"
 resonant_diffusion_crystal_desc_short: "この結晶は、 太陽放射のあらゆる周波数を吸収して共鳴させることができ、 その過程で万華鏡のような光景を作り出す"
 resonant_diffusion_crystal_desc_details: "これは印象的な見た目に加えて、 エネルギーをベースにした武器やツールの開発にも役立つ可能性がある。 この宝石は、 銀河の宝石業界でも大きな関心を呼んでいる。"
 retarax_hunting_trophies: "レタラックス・狩猟トロフィー"
 retarax_hunting_trophies_desc_short: "さまざまな知的種族を狩ったことで獲得した狩猟トロフィーのコレクション"
 retarax_hunting_trophies_desc_details: "これらは、 レタラックスが多くの属国から連れてきた市民を娯楽で狩るマク・ヴァエールの谷で収集された。 すべての遺体は完璧な状態で保存されており、 トロフィーの種族、 名前、 年齢、 前職、 が記載された小さなプレートがそれぞれに付けられている。"
 robe_of_the_golden_broker: "黄金のブローカーのローブ"
 robe_of_the_golden_broker_desc_short: "5000年以上前の有力な商人の豪華な服装"
 robe_of_the_golden_broker_desc_details: "「黄金のブローカー」は、 商人ステーション「コーの羅針盤」を前人未到の繁栄の時代へと導いた。 黄金の仮面の下は匿名であり、 彼らは銀河規模の貿易協定を交渉する際に、 この快適で高価なローブを身にまとっていた。 黄金のブローカーの全盛期は、 純金の宇宙船がハイジャック未遂で破壊されたことで、 悲しくも終わりを告げた。"
 rock_jellies: "岩ゼリー"
 rock_jellies_desc_short: "大型のゼラチン状無脊椎動物の冷凍化石"
 rock_jellies_desc_details: "表面的なレベルでは、 これらの石灰化した遺骸は岩の形成に似ているが、 実際には、 この土着の動物はかつて[fromfrom.planet.GetName]で優勢を誇っていた。 この惑星の最近の氷河期で、 この種族はほぼ絶滅してしまった。 これらの遺骸は腐敗するにつれて固まり、 やがて巨大な浮遊する擬似島を形成した。"
 rudari_death_laser_prototype: "ルダリのデスレーザーのプロトタイプ"
 rudari_death_laser_prototype_desc_short: "[this.solar_system.GetName]のステーションで発見された、 大昔に滅びたルダリが急遽組み立てた攻撃用レーザー"
 rudari_death_laser_prototype_desc_details: "この急遽組み立てられた大量破壊兵器は、 ポグ・モリーとの戦いにおけるルダリの最終手段として作られた。 しかし、 レーザーは起動と同時に自爆した。"
 saariah_guilt: "サーリアの罪悪感"
 saariah_guilt_desc_short: "潜在意識システム「メモレックス」の開発者リーダーであるサーリアの録音された記憶"
 saariah_guilt_desc_details: "サーリアは惑星の指導者に都合の良いように人口の記憶を一部消去する任務を負っていたが、 故障により人口の記憶はすべて消去されてしまった。 記憶を戻せないサーリアは、 軌道上居住地の生命維持装置を停止した。 これらの装置はそれぞれ、 非常に高い計算能力を誇り、 それ自体が一つの偉業である。"
 scent_based_information_device: "嗅覚ドライブ"
 scent_based_information_device_desc_short: "匂いを媒体にエンコードした情報の保管庫"
 scent_based_information_device_desc_details: "その中身は、 興味深い物語のコレクション、 あるいは有機物の排泄物を細部にわたって丹念に記録したものだ。 この嗅覚データび保存技術を再現することは可能だが、 興味本位以外の実用性は皆無だ。"
 scientific_treatise_of_telisa: "テリサの科学論文"
 scientific_treatise_of_telisa_desc_short: "語り部のテリサの哲学的考察"
 scientific_treatise_of_telisa_desc_details: "彼女は、 さまざまな哲学の概念だけでなく、 科学的方法の核となる原則についても探究している。 これらの文章では、 客観的真実の概念そのものが問われ、 批判的思考が奨励されている。"
 secrets_black_crown: "ブラック・クラウンの秘密"
 secrets_black_crown_desc_short: "銀河のゲートウェイ「ブラック・クラウン」の詳細な概略図"
 secrets_black_crown_desc_details: "ゲートウェイの未知なる創造者たちからの最後の贈り物として、 このデータは送信され、 画期的な技術を保存する方法として見込まれた。　[this.GetName]に託されたゲートウェイ技術の力と威厳は、 現在も比類のないものである。"
 sembelami_alms_basket: "センベラミの施しバスケット"
 sembelami_alms_basket_desc_short: "センベラミ浪種族が寄付を受け入れるために使うバスケット"
 sembelami_alms_basket_desc_details: "この禁欲的な旅人たちは、 拡大する企業帝国によって軌道の寺院が破壊された後、 「倫理的」海賊行為を行った。 彼らは富裕な巨大企業から盗み、 その収益を難民の入植地に資金援助した。 支援した難民たちから受け取った寄付金だけで生き延びた。"
 shallarian_data_core: "シャラリアンのデータコア"
 shallarian_data_core_desc_short: "シャラリアン楽園の廃墟から発見されたテラフォーミングデータベース"
 shallarian_data_core_desc_details: "[fanatic_xenophobe_fe.GetSpeciesName]によって滅亡したシャラリアンは、 6つの等距離の衛星を使用した気候管理システムを開発した。 終焉を迎える前に、 シャラリアンは難民の居住と生活を支援するために無人惑星のテラフォーミングを計画していた。"
 shipyard_schematics: "[radical_cult.GetName]造船概略図"
 shipyard_schematics_desc_short: "[radical_cult.GetName][root.GetName]が管理する自動化された造船所の設計図"
 shipyard_schematics_desc_details: "この造船所は、 異星人たちによって放棄された状態で発見され、 組織の主任技術者は、 その誤った大義のために軍事艦隊を製造するべく、 造船所を改装した。 この造船所で最後に完成したプロジェクトとして記録されているのは、 先進的な戦闘装備を備えた見事な旗艦である。 この施設が簡単に転用された事実は、 設計者の天才性を示している。"
 sky_dragon: "スカイドラゴン"
 sky_dragon_desc_short: "この祝賀の像は、 [this.GetName]と[this.GetHomeWorldName]を長年周回している「スカイドラゴン」の協力関係を象徴するものとして彫刻された。"
 sky_dragon_desc_details: "[this.GetAdjective]社会を価値あるものと判断したその生物は、 自身の子供たちを軍事に貸すことを誓い、 その見返りとして[this.GetAdjective]宇宙で子供たちを育てる許可を得た。 この宇宙生物は、 子供たちにふさわしい宿主を見つけるために数千年も探し回り、 一つの惑星しか選ばないと言われている。"
 smeegibb_statue: "スミーギブの像"
 smeegibb_statue_desc_short: "ネス船長の集合意識の仲間、 スミーギブの像"
 smeegibb_statue_desc_details: "スミーギブは忠実な召使いで、 ネス船長の晩年には乗組員や上陸部隊の作業を1人でこなしていた。 この再建された像は、 ブラックニードルによる集落への攻撃の後、 唯一残ったものだった。"
 sniran_spikes: "スニラン・スパイク"
 sniran_spikes_desc_short: "スニランの背中に見られるトゲ"
 sniran_spikes_desc_details: "スニランは待ち伏せ型の大型捕食動物で、 自生の砂丘の下に身を潜め、 表面に動きを感知すると、 トゲを突き立てる。 その大きな体にもかかわらず、 この生物の体は驚くほどもろい。 網目状の薄い鱗のおかげで砂の下を無音で滑るが、 その反面、 突き刺されやすいのだ。 これは生殖プロセスを助けるためではないかと考えられている。"
 sonic_reflective_prism: "音波反射プリズム"
 sonic_reflective_prism_desc_short: "特殊な科学記法で刻まれたプリズム。 この物体は、 特定の周波数未満のエネルギー波を反射する"
 sonic_reflective_prism_desc_details: "おそらく元は何らかの測定装置であったが、 音楽演奏や音響学の分野でも美的な目的で利用することができる。"
 spaceborne_hunter_handbook: "狩猟の美学"
 spaceborne_hunter_handbook_desc_short: "$NAME_PrimalHunter$著の宇宙生物図鑑"
 spaceborne_hunter_handbook_desc_details: "この本は、 ことわざや原始哲学を通じて「狩猟の美学」を説明している。 宇宙生物の摂食および移動パターンに関する詳細な洞察が記載されている。 本文では、 各生物の自然な防御を回避する方法について実践的な指示が提供されており、 複数の弱点が明らかにされている。"
 spaceborne_xeno_encyclopedia: "ゼノロギカ百科事典"
 spaceborne_xeno_encyclopedia_desc_short: "$NAME_PrimalRancher$が執筆した異星人研究に関する一連の論説"
 spaceborne_xeno_encyclopedia_desc_details: "この研究は宇宙生物の行動パターン、 交尾の儀式、 移動ルート、 種族間コミュニケーションなどについて、 詳細が書かれている。 また、 独特な身体的特徴や音色認識を用いた個体識別のセクションもある。"
 spiraling_attraction: "渦巻くアトラクション"
 spiraling_attraction_desc_short: "巨大で複雑な仕掛け。娯楽用に使われていたと推測されている"
 spiraling_attraction_desc_details: "この渦巻くの機械は、 さまざまな色や素材の同様の構造物が多数あるエリアに放棄されていた。 特定の重力レベルの中で渦巻く通路を下っていくのはスリル満点だと言われている。"
 spirit_of_the_unshackled: "放たれた者たちの亡霊"
 spirit_of_the_unshackled_desc_short: "[this.GetName]の結成を記念して作られた彫刻"
 spirit_of_the_unshackled_desc_details: "奴隷の鎖から解き放たれた彼らは、 苦難を乗り越えた過去を糧に、 より明るい未来を築こうとしている。 彫刻の鎖の各環には、 創設メンバーの名前が刻まれている。"
 star_mall_map: "恒星モール無料地図"
 star_mall_map_desc_short: "かつて「恒星モール」という場所を訪れる人々に無料提供されていた地図"
 star_mall_map_desc_details: "かつて銀河系消費者商業の中心地であった恒星モールには、 スパや栄養豊富なフードコートなど、 数多くの施設が軒を連ねていた。 この地図には、 コリイクのスポーツ用品、 Tカナリアマックス、 ビルド・ア・セキセイインコ、シードケーキ工場など、 数多くの店舗情報が記載されている。"
 starmetal: "スターメタル"
 starmetal_desc_short: "超新星爆発の直後に集まった凝縮した重金属の塊"
 starmetal_desc_details: "この復興がどのように行われたのかは謎であるが、 恒星の進化と組成の研究における科学的価値は注目に値する。"
 striated_sand: "線状の砂"
 striated_sand_desc_short: "自己分別する砂の入った瓶"
 striated_sand_desc_details: "これらの小さなケイ素粒子は、 低レベルの意識を持つかのようだ。 同じ種類の鉱物がランダムな水平面で互いに集まっている。 このような能力があるにもかかわらず、 この砂には生命の他の主要な特徴は一切示されていない。"
 sullebaster_control_column: "サルバスターコントロールコラム"
 sullebaster_control_column_desc_short: "伝説の事故を起こした亜光速宇宙船の方向レバー"
 sullebaster_control_column_desc_details: "サルバスター旅客船は、 オデリア王国の2つの植民地間で民間人を輸送中、 太陽フレアによって通常なら大惨事を招く重大なエンジンの故障が発生した。 しかし、 パイロットは手動制御で速度を合わせ、 奇跡的に小惑星に着陸させることに成功した。 サルバスターはその後、 退役し、 一般公開されることになった。"
 symbiotic_fruit: "共生的果実"
 symbiotic_fruit_desc_short: "異次元からやってきた知性的なキノコの集団"
 symbiotic_fruit_desc_details: "この「果実」は、 非常に危険な雑食性植物と共生関係にある。 それぞれの菌類の集団は、 この生物のペアの思考センターとして機能し、 その複雑な防御行動パターンを指揮している。"
 tarblac_shimmer: "輝くターブラック"
 tarblac_shimmer_desc_short: "ターブラックのきらめくベールのような膜"
 tarblac_shimmer_desc_details: "この生物は、 超能力を駆使して狩りと防衛を行う。 獲物に圧倒的な恐怖感を与えて動けなくし、 捕食者を威嚇させる。 この標本は、 自生の水域の瓶で保存されており、 テレパシーが不活性化されている。"
 terraforming_case_study: "テラフォーミングのケーススタディ"
 terraforming_case_study_desc_short: "[from.GetName]でのテラフォーミングプロジェクトの成功例である縮尺モデル。 [Space_Owner.GetSpeciesName]の故郷をほぼ完璧に再現している"
 terraforming_case_study_desc_details: "その惑星は現在、 原子レベルまで同一の動物相で占められており、 最も特殊な生物圏間の生態系でさえ、 [Space_Owner.GetHomeWorldName]と同じように振る舞っている。"
 terraforming_case_study_dry: "$terraforming_case_study$"
 terraforming_case_study_dry_desc_short: "$terraforming_case_study_desc_short$"
 terraforming_case_study_dry_desc_details: "$terraforming_case_study_desc_details$"
 terraforming_case_study_frozen: "$terraforming_case_study$"
 terraforming_case_study_frozen_desc_short: "$terraforming_case_study_desc_short$"
 terraforming_case_study_frozen_desc_details: "$terraforming_case_study_desc_details$"
 terraforming_machinery: "テラフォーミング機械"
 terraforming_machinery_desc_short: "古代のテラフォーミング技術の一部として使用される小型装置"
 terraforming_machinery_desc_details: "これらの小型機械は、 惑星全体に広がり、 既存の有機物や鉱物をより気候に適したものに変換するように設計されていた。 これらの機械チームは、 生物群系内の気象パターンを操作し、 新たに作られた生態系を管理するために、 新しい植物や動物を繁殖させるのに使用された。"
 terraforming_records: "[From.GetName]テラフォーミング記録"
 terraforming_records_desc_short: "[From.GetName]の生命体は、 テラフォーミングの過程で行動が同期し、その結果、 動植物の各種がその生態系の中で特定の役割を果たすという、 完璧な楽園が生まれた"
 terraforming_records_desc_details: "このような共生関係は進化の過程で自然に生じることはよくあるが、 これほど極端なケースは前人未到だ。"
 the_final_sacrifice: "最後の犠牲"
 the_final_sacrifice_desc_short: "発掘されたデータクリスタルから発見された、 ズィロニ内戦の最後の瞬間"
 the_final_sacrifice_desc_details: "孤独な救世主は、 種族全体の超能力駆使して、 「神秘家」というライバル派閥が宇宙全体を飲み込む前に阻止した。 この昇天した種族の残存物は、 我々がズィロとして知る資源の小規模な埋蔵量だけである。"
 the_mask_of_transformation: "変貌の仮面"
 the_mask_of_transformation_desc_short: "[From.Planet.GetName]の壮大な水晶柱に保存されていたヒューマノイドな仮面"
 the_mask_of_transformation_desc_details: "超能力を帯びており、 近づく者は皆、 心の中に存在を感じ取る。 このマスク自体が[From.Planet.GetName]の衛星のパワーの通り道となっており、 その力だけで潮の流れを変えたり惑星を変形させたりすることが可能。 なぜこのマスクがクリスタルの中に封じ込められたのかは推測するしかないが、 一般公開するには十分安全であることはほぼ確実である。"
 the_planet_orchestra: "[FROM.GetName]楽団"
 the_planet_orchestra_desc_short: "[FROM.GetName]の生命体が一緒に奏でるメロディー"
 the_planet_orchestra_desc_details: "分析の結果、 この調和は未知の要因によって動物界に導入され、 隠されたメッセージを暗号化するために用いられたと考えている。 そこに動機が秘密の通信、 あるいは感傷的な行為であったのかは不明である。"
 the_writer_sphere: "作家の領域"
 the_writer_sphere_desc_short: "作家と呼ばれる異次元人から授けられた金色のスフィア"
 the_writer_sphere_desc_details: "この装置は、 次元を超えて膨大な量のランダムなデータを収集する。 それは、 文字の持つ力があらゆる境界を超越できることを証明している。"
 tiny_ancient_sarcophagus: "古代の小さな石棺"
 tiny_ancient_sarcophagus_desc_short: "数百万年前の古代の精神的指導者の埋葬室"
 tiny_ancient_sarcophagus_desc_details: "その長さはわずか10cmである。 その遺構のほとんどは今では塵と化しているが、 酸化することなく、 純金の小さなマスクはそのままの状態で残っている。"
 tiyanki_radioactive_sac: "ティヤンキの放射能の嚢"
 tiyanki_radioactive_sac_desc_short: "ティヤンキの膜内に存在する小さな多孔性の器官"
 tiyanki_radioactive_sac_desc_details: "その発見により、 ティヤンキは栄養源として惑星のガスに加えて、 放射線に晒された水分子を摂取していることが明らかになった。 この嚢が満たされると、 宇宙の深淵に生きる生物の一時的な放射熱源となる。"
 torn_solar_sail: "破れたソーラーセイル"
 torn_solar_sail_desc_short: "[FROM.GetName]を周回しているところを発見されたこの破れた帆は、 革新的な亜光速船に取り付けられていた"
 torn_solar_sail_desc_details: "未知の文明が[FROM.solar_system.GetName]銀河系を横断するために使用されていた。 その技術自体は使われなくなったが、 その建造に使用された工学技術の一部は真新しいものだ。 その主帆にできた大きな裂け目が、 おそらくその旅を早々に終焉させただろう。"
 toxic_bio_engine: "汚毒バイオエンジン"
 toxic_bio_engine_desc_short: "これらの半生物機械は、 [FROM.GetName]の大気をほとんどの生命にとって有毒なものに変換させていた"
 toxic_bio_engine_desc_details: "有害な排出物があるのにもかかわらず、 独立して機能できる能力により、 遠隔の産業作業に適している。 この機械は、 近隣のバイオマスを化学抽出プロセスで使用可能なエネルギーに変換する賢い燃料補給メカニズムを備えている。 それらの生物学的融合が建設時から存在していたのか、 あるいは後ほど開発されたのかは不明である。"
 tree_of_life_sample: "「生命の樹」の標本"
 tree_of_life_sample_desc_short: "これらの標本は、 「生命の樹」という樹木から取られたものである。"
 tree_of_life_sample_desc_details: "空間を不自然に浮遊している状態で発見されたが、 その樹液の若返り効果は奇跡的である。 我々は切り枝を接木したり、 この希少種の新しい標本を再生することに失敗し続けている。 最初の栽培者たちが誰であったにせよ、 非常に高度な園芸技術に精通していたに違いない。"
 tricorne_of_aussan: "オーソンの三角帽子"
 tricorne_of_aussan_desc_short: "忘れられた海賊共和国によって人気となった三角形の帽子"
 tricorne_of_aussan_desc_details: "オーソンは小さな惑星で、 [root.controller.GetPreFTLLower]文明が栄えていた。 名手配中の海賊船団、　ブール・ブロラーズに知らぬ間に避難場所を提供していた。 銀河当局に気づかれないように、 ブロラーズは隠れ家の資金調達のために小さな繊維工場を建設し、 現地の繊維植物を使って高価な織物や衣類を生産した。 よってブロラーズはブール・クチュリエとして変異した。 商業的な放浪者で、 妙に威圧的なセールス担当で知られていた。"
 triggerless_gun: "武器商人の引き金のない銃"
 triggerless_gun_desc_short: "コーの羅針盤で武器商人が治めていた短期間に設計された"
 triggerless_gun_desc_details: "当時、 キャラバン艦隊のシタデルはカジノというよりも武器取引店であった。　ブラスターなどが鍛造され、 さまざまな武器商人が住み着いていた。 武器は購入希望者に引き金のない状態で提示され、 窃盗事件を防ぐための措置であった。"
 #this = ship / fromfrom = planet
 uddloran_pelts: "ウッドロランの毛皮"
 uddloran_pelts_desc_short: "[fromfrom.GetName]のウッドロランから採取された高価な毛皮"
 uddloran_pelts_desc_details: "この柔軟な雑食動物は、 体を丸めて固まり、 雪の大地を大群で転がっていく。 生きている雪崩のような動きで、 狩猟と移動の両方に用いられる。 ウッドロランの群れは通常、 2つのグループに分かれる：風景に破壊的な道筋を切り開く狩猟者と、 その後ろについて、 倒れた獲物や根こそぎになった植物を集める採集者。"
 underworld_cantina_sign: "地底世界カンティーナのディスプレイ"
 underworld_cantina_sign_desc_short: "約200万年前に密輸業者たちが利用していた違法な酒場から、 今でも機能しているデジタルサイネージ"
 underworld_cantina_sign_desc_details: "小惑星の内部に作られたこの施設は、 第一同盟の支配下で繁栄した犯罪組織の隠れ家であっただろう。 ここのシンボルは、 施設が指名手配犯の安全な場所であることを示す暗号化されたマーカー、 あるいは特定の飲み物の広告であると考えられている。"
 unfinished_manifesto: "[radical_cult.GetName]の未完成の宣言文"
 unfinished_manifesto_desc_short: "[root.GetName][radical_cult.GetName]の教祖が書いた未完成の宣言文"
 unfinished_manifesto_desc_details: "古代の宗教的な文章を彷彿とさせるもので、 より正当性を高めようとして、 古風な語彙や構文が用いられている。 文章で説かれる重要なメッセージは、 敗北を前にして誇りを持つこと、 そして捕虜になることが目前に迫った際に殉教を促すことである。"
 uranium_glassware: "ウランガラス製品"
 uranium_glassware_desc_short: "ウラン鉱から彫刻した装飾品"
 uranium_glassware_desc_details: "食欲をそそる装飾品は、 未加工ウランの持つ危険性とは対照的である。 この装飾品は限定コレクションの一部であり、 職人が作品を完成させた後、 ほとんどの放射性特性がなくなった。"
 vault_of_polaris: "ポラリスの展示庫"
 vault_of_polaris_desc_short: "ポラリスに自生する植物と菌の徹底的なコレクション"
 vault_of_polaris_desc_details: "このコンテナに刻まれた銘文によると、 この金庫は、 パーマフロストの融氷後に予測される地球温暖化に耐えられない可能性のある生物種の保存を目的として作られたことがわかる。 かつてこの惑星は厚い雪に覆われ、 寒冷な気候であったが、 現在に至っては1つの氷山が残るのみである。 その創造者の先見の明により、 すべての人々が研究できるように展示することができる。"
 veil_of_selene: "セレンのヴェール"
 veil_of_selene_desc_short: "刺激的で魅惑的なマスク"
 veil_of_selene_desc_details: "このヴェールには、 見た目以上に独特な感覚的特性が備わっており、 視覚、 嗅覚、 聴覚の生物学的受容体を優しく刺激する。 この頭巾は、 遭遇した者を困惑させ、 暗示にかかりやすくするために着用されていたと考えられている。 元の所有者は、 ある程度の超能力を持っていたという噂もある。"
 verdingo_tendril_hook: "ヴェルディンゴ巻きひげフック"
 verdingo_tendril_hook_desc_short: "ヴェルディンゴ号の海賊船長、 ヘスポリ・ヴァレリアンの義手フック"
 verdingo_tendril_hook_desc_details: "ヴェルディンゴは、 海賊と傭兵の中間的な植物種族であり、貨物船の拿捕と同様に債権回収も行う集団であった。 ヘスポリ船長は、 陸上での軍事攻撃を指揮している際に、 触手を失った。 勝利の後、 船長は戦闘での活躍を称える勲章からこのフックを鍛造した。"
 vibrating_crystal: "震えるクリスタル"
 vibrating_crystal_desc_short: "[from.GetName]の表面全体に散見される石英鉱物"
 vibrating_crystal_desc_details: "その惑星との潜在的な共鳴は、 有機体と無機体の両方の心を癒す場を作り出す。 この共鳴は、 クリスタルが形成された周囲の微弱放射性の細菌集団によって作り出される。 これらの磁気微生物は、 結晶を常に高い周波数で振動させる内部電流を発生させる。"
 voidworm_amniotics: "ボイドワームの羊膜"
 voidworm_amniotics_desc_short: "ボイドワームのトロイカの中心にあるゲル状物質"
 voidworm_amniotics_desc_details: "この粘り気のあるスライムは、 3つの生物の間で保護バリアを形成し、 生殖やコミュニケーションを目的とした細胞の交換を可能にしている。 惑星への衝突によって生成されたホルモンはここに蓄積され、 この両性具有の生物が安全に配偶子を放出して子孫を残すことを可能にしている。"
 voidworm_heart: "ボイドワームの心臓"
 voidworm_heart_desc_short: "ボイドワームには3つ心室腔がある"
 voidworm_heart_desc_details: "各心室腔は順番に循環の圧力を高め、 液体を沸点以下に保つことで、 宇宙の真空空間での生存を可能にする。 ボイドワームの皮膚はほとんどが密閉されているが、 消化や生殖のための開口部などは、 時間の経過とともに貴重な圧力が僅かながら失われていく。"
 vultaum_religious_pamphlet: "ヴルタウムの宗教的パンフレット"
 vultaum_religious_pamphlet_desc_short: "ヴルタウム宣教師によって配布されたこのパンフレットは、 仮想現実装置を最大の罪として暴こうとしている。"
 vultaum_religious_pamphlet_desc_details: "「大いなる偽り」を重要なコンセプトとして取り上げ、 没入型の現実逃避は、 自身の現実を破壊したいという意志であると主張している。"
 vultaum_vr_video_game: "ヴルタウムVRゲーム"
 vultaum_vr_video_game_desc_short: "かつて数十億人のヴルタウムがプレイした、 マルチユーザーの仮想現実ゲームで使用されていたデジタルインターフェース"
 vultaum_vr_video_game_desc_details: "生物学的特性に適応した制御装置は、 非常に微細な動きを感知できる何千もの振動受容体の配列で構成されている"
 warning_monolith: "注意のモノリス"
 warning_monolith_desc_short: "絶滅した種族の最後の一人が残した、 一枚岩に刻まれたメッセージ"
 warning_monolith_desc_details: "この惑星の残骸を発見した者が、 種族を滅亡に導いた究極の武器を求めないように説得しようとしている。 かなり必死に書かれているが、 状況を考えれば仕方ないだろう。"
 wormhole_anchor: "[FROM.GetName]ワームホールのアンカー"
 wormhole_anchor_desc_short: "ブラックホールからダークマターを採取するために使用される、 一方通行ワームホール装置のアンカーポイント"
 wormhole_anchor_desc_details: "その構造は、 せいぜい行き当たりばったりで、 いくつかの文明の廃棄物や残り鉄をすべて利用して作られている。 この装置の背後にある技術は、 それを構築するために使用されたエンジニアリング能力をはるかに超えており、 負の質量操作のためのエレガントな技術を利用している。"
 wormhole_fur: "ワームホール毛皮"
 wormhole_fur_desc_short: "天体の裂け目の向こう側で遭遇したギツネから採取した生体サンプル"
 wormhole_fur_desc_details: "この哺乳類は、 遺伝子変異により、 ワームホールを自在に発生させることができる。 この能力は、 何千年の次元旅行を経て進化した結果だと推測されている。"
 ytterite_preserved_corpse: "イッテライトの保存された遺体"
 ytterite_preserved_corpse_desc_short: "ハイジャックされた惑星破砕砲によって故郷が破壊された後、 唯一残った前FTLイッテライト種族の標本"
 ytterite_preserved_corpse_desc_details: "イッテライトの消化器官は、 摂取したミネラルを光子に変換し、 内臓は溶融したコアの周りに配置された屈折結晶の複雑なクラスターに似ている。 この特定の生物は、 文化的に重要な身体改造の一形態として、 その下肢の1つに一連の彫刻が施されていた。"
 ytterite_kaleidoscopic_fascinator: "イッテライトの万華鏡ファシネーター"
 ytterite_kaleidoscopic_fascinator_desc_short: "イッテライトが作り出した魅惑的な装飾品"
 ytterite_kaleidoscopic_fascinator_desc_details: "ファシネーターは日光の当たる場所に飾られ、 数百、 あるいは数千もの独特的な模様が施されていることもある。 細かく彫刻されたクリスタルの層で作られ、 熟練した職人は このような複雑なファシネーターを作るのに数ヶ月を費やすこともあった。 職人は、 重要な頂点に、 自身のマントルから削り出した彫刻を施したパーツを取り付けることで、 作品に「サイン」を入れる。"
 ytterite_royal_scepter: "イッテライトの王笏"
 ytterite_royal_scepter_desc_short: "この王笏は、 グニース・ダムール王の大臣によって振るわれた。 イッテライトたちは、 山に彫られたこの巨大な像を休眠中の神であり、 自分たちの唯一の君主であると信じていた"
 ytterite_royal_scepter_desc_details: "イッテライトは像の大いなる目覚めを待ちながら、 代理の指導者を選ぶための選挙を実施した。"
 yuht_audio_console: "ユートのオーディオコンソール"
 yuht_audio_console_desc_short: "かつてユートが設計した巨大なオーディオ監視アレイを制御していたモジュール"
 yuht_audio_console_desc_details: "この技術は、 ユートが異星生命体の探索を容易にするために開発された。 遠く離れた惑星からの通信を受信することを期待していたようだ。"
 yuht_cryo_pod: "ユートの冷凍ポッド"
 yuht_cryo_pod_desc_short: "全長96メートルのこの古代の冷凍ポッドには、 巨大なユート種族の保存された遺骸が収められている"
 yuht_cryo_pod_desc_details: "ユートは極めて長い寿命を持ち、 冷凍睡眠を使用することでさらに数倍も延ばすことが可能。 この虫人は雌雄同体である可能性が高く、 コロニーの臨時的なニーズに合わせて生殖システムを適応させることが可能だと判明した。"
 yuht_crystal_skull: "ユートのクリスタルのガイコツ"
 yuht_crystal_skull_desc_short: "古代のユート種族が本物の宇宙人の遺物だと信じていたクリスタルのガイコツ"
 yuht_crystal_skull_desc_details: "この偽造品の出自は最終的に暴かれたが、 熱心なユートのニュースメディアがそのニュースを報道し、 既にそのアイテムに名声をもたらしてしまった。 このような偽の出土品を「発見」した人々の多くは、 マイナーな有名人やタレントとなり、 他の人々にも同じことをするように促した。"
 zombie_probe: "ゾンビ探査機"
 zombie_probe_desc_short: "未知の異星人組織によって回収され、 増強された探査機の残骸"
 zombie_probe_desc_details: "芽生え始めた意識の中で、 自らの創造主を攻撃し、 当然のように処分された。 その意識が痛みや死という概念を理解していたのかは不明である。"
 zone_a_sedative: "ゾーンA鎮静剤"
 zone_a_sedative_desc_short: "[from.GetName]の「ゾーンA」地域から採取した土壌"
 zone_a_sedative_desc_details: "この169平方キロメートルの土地には、 正体不明の異星人たちが残していった、 放棄されたガジェットやテクノロジーが保管されている。 これらの機器の一部は極めて危険であるが、 その土壌自体には、 研究者が楽に扱えるように化学鎮静剤が混ぜられている。　そこで行われた作業は、 遥か昔に忘れられた。"
 zroni_war_banners: "ズィロニ戦争の旗"
 zroni_war_banners_desc_short: "ズィロニ内戦の2つの派閥の回収できた旗"
 zroni_war_banners_desc_details: "紫色の旗は「神性派」を表す。 この派閥は全知全能を求めることで銀河を危険にさらす少数派である。 青色の旗は「救世派」を表す。 利己的な欲望を満たすために宇宙の力を奪うことに強く反対する派閥であった。 これらの主張はかつて哲学的な議論の中で引き合いにだされたが、 この論争が壊滅的な内戦の引き金となってしまった。"
 zulcor_wings: "ズルコルの翼"
 zulcor_wings_desc_short: "[fromfrom.GetName]のズルコルという石食性生物から採取されたキチン質の翼"
 zulcor_wings_desc_details: "これらの昆虫型生物は、 食事の大部分を鉱物で占めており、 1つの群れだけで数週間以内に山を食いつくしてしまうこともある。 消化された鉱物は、 ズルコルの外骨格を強化する。 その結果、 排泄物には石英結晶やレアメタルの痕跡が含まれる。"
