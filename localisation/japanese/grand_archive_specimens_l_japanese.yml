 specimens: "標本"
 concept_specimen: "標本"
 concept_specimens: "標本"
 concept_specimen_desc: "銀河を探索中に標本を発見できる。\n\n標本を['concept_megastructure_grand_archive']に展示することで、 帝国全体にボーナスを与える。"
