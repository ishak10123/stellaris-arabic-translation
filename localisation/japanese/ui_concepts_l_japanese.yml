l_japanese:
 ### CONCEPTS
 # Above each concept definition are instructions on usage, including an icon where one exists.
 #   Note that between the icon and the term there's a non-breaking space. When you copy the usage example, it will keep the non-breaking space.
 #   This is important to not get a line break between the icon and the concept.
 # Use a concept link with icon the first time a new concept is mentioned, then use §H without an icon for repeated uses.
 # Use §H with an icon the first time a concept is used withing its own description.
 # Use §H without an icon if the concept is used more than once.
 ui_available_tabs: "\n\n利用可能タブ：\n"
 # View: £interface£ ['concept_empire_view'] or £interface£ §H$concept_empire_view$§!
 concept_empire_view: "帝国画面"
 concept_empire_view_desc: "帝国の概要を確認。 $ui_available_tabs$[GetConceptEmpireAdvisor]"
 empire_view_tab_empire: "§H$EMPIRE$§!"
 empire_view_tab_demographics: "§H$DEMOGRAPHICS_TITLE$§!"
 empire_view_tab_advisor: "§H$GOVERNMENT_ADVISOR_TAB$§!"
 concept_empire_view_tabs_advisor: "$concept_empire_view_tabs_no_advisor$\n- $empire_view_tab_advisor$：アドバイザーボイスを選択"
 concept_empire_view_tabs_no_advisor: "- $empire_view_tab_empire$：['concept_authority']、 ['concept_civics']、 ['concept_empire_modifiers']の一覧\n- $empire_view_tab_demographics$：['concept_pops']とそれを影響するものを表示"
 # View: £interface£ ['concept_situation_log_view'] or £interface£ §H$concept_situation_log_view$§!
 concept_situation_log_view: "$MENU_PANEL__SITUATION_LOG_TITLE$画面"
 concept_situation_log_view_desc: "£interface£ §H$concept_situation_log_view$§!で進行中の問題の概要を確認することができる。$ui_available_tabs$$concept_situation_log_view_tabs$"
 situation_log_view_tab_situation_log: "§H$topbar_button_situation_name$§!"
 situation_log_view_tab_timeline: "§H$TIMELINE$§!"
 situation_log_view_tab_anomilies: "§H$ANOMALIES$§!"
 situation_log_view_tab_victory: "§H$VICTORIES$§!"
 concept_situation_log_view_tabs: "- $situation_log_view_tab_situation_log$：['concept_event_chains']、 ['concept_special_projects']、 ['concept_first_contacts']の一覧\n- $situation_log_view_tab_timeline$：['concept_milestones']と['concept_empire_focuses']を見る\n- $situation_log_view_tab_anomilies$：['concept_anomalies']を表示\n- $situation_log_view_tab_victory$：['concept_scoreboard']を表示"
 # View: £interface£ ['concept_government_view'] or £interface£ §H$concept_government_view$§!
 concept_government_view: "$topbar_button_council_name$画面"
 concept_government_view_desc: "§H$concept_government_view$§!で政府を管理できる。 $ui_available_tabs$$concept_government_view_tabs$"
 government_view_tab_council: "§H$COUNCIL$§!"
 government_view_tab_factions: "§H$FACTIONS$§!"
 government_view_tab_policies_and_edicts: "§H$EDICTS_AND_POLICIES$§!"
 concept_government_view_tabs: "- $government_view_tab_council$：['concept_council']と['concept_agendas']を管理する\n- $government_view_tab_factions$：['concept_factions']を表示\n- $government_view_tab_policies_and_edicts$：['concept_policies']と['concept_edicts']を選択する"
 # View: £interface£ ['concept_society_management_view'] or £interface£ §H$concept_society_management_view$§!
 concept_society_management_view: "$TRADITION_VIEW_TITLE$画面" # Use this alias when referring to the concept
 concept_society_management: "$TRADITION_VIEW_TITLE$" # Left out 'View' to fit in the Databank UI
 concept_society_management_desc: "§H$concept_society_management_view$§!で伝統を管理できる。 $ui_available_tabs$[GetConceptSocietyManagement]"
 society_management_view_tab_traditions: "§H$TRADITIONS$§!"
 society_management_view_tab_crisis: "§H$CRISIS_TAB$§!"
 concept_society_management_view_crisis: "$concept_society_management_view_no_crisis$\n- $society_management_view_tab_crisis$：['concept_crisis']の進行度を追跡する"
 concept_society_management_view_no_crisis: "- $society_management_view_tab_traditions$：['concept_traditions']と['concept_ascension_perks']を選択する"
 # View: £interface£ ['concept_technology_view'] or £interface£ §H$concept_technology_view$§!
 concept_technology_view: "$TECHNOLOGY$画面"
 concept_technology_view_desc: "£interface£ §H$concept_technology_view$§!には£physics£ ['concept_physics_research']、 £society£ ['concept_society_research']、 £engineering£ ['concept_engineering_research']の各分野における帝国の科学的進歩が表示される。 この画面から研究選択肢を選んだり、 技術的優先事項を管理したりする。\n\n新たな['concept_technologies']は、 科学的探究の予測不可能性を反映して、 選択可能な候補の中から半ばランダムに提示される。"
 # View: £interface£ ['concept_leaders_view'] or £interface£ §H$concept_leaders_view$§!
 concept_leaders_view: "$topbar_button_leaders_name$画面"
 concept_leaders_view_desc: "£interface£ §H$concept_leaders_view$§!には帝国内で活動中のすべての['concept_leaders']の概要が、 その役割、 ['concept_leader_traits']、 経験レベル、 現在の職務も含めて表示される。 新たなリーダーの雇用、 既存のリーダーの再任命や退任もこの画面から行うことができる。"
 # View: £interface£ ['concept_species_view'] or £interface£ §H$concept_species_view$§!
 concept_species_view: "$topbar_button_species_name$画面"
 concept_species_view_desc: "£interface£ §H$concept_species_view$§!には帝国内のすべての既知の['concept_species']が包括的に一覧表示される。 この画面から['concept_species_traits']の確認や変更を行ったり、 市民権、 兵役、 ['concept_living_standards']といった住民の権利を管理したりできる。\n\n多種族で構成される帝国では、 政策、 生態、 イデオロギーが交差し、 銀河社会の形成に複雑な影響を及ぼす。こうした帝国において、 この画面はその複雑さに対応するための極めて重要な手段である。"
 # View: £interface£ ['concept_planets_and_sector_view'] or £interface£ §H$concept_planets_and_sector_view$§!
 concept_planets_and_sector_view: "$PLANET_LIST$画面" # Use this alias when referring to the concept
 concept_planets_and_sector: "$PLANET_LIST$" # Left out 'View' to fit in the Databank UI
 concept_planets_and_sector_desc: "£interface£ §H$concept_planets_and_sector$§!画面は、 帝国内のすべての£colony£ ['concept_colonies']および£sector£ ['concept_sector']の一元的な概要を確認できる。\n\n['concept_governors']の任命もこの画面から行うことができる。"
 # View: £interface£ ['concept_expansion_planner'] or
 concept_expansion_planner: "$MENU_PANEL__EXPANSION_PLANNER_TITLE$"
 concept_expansion_planner_desc: "£interface£ §H$concept_expansion_planner$§!は植民地化が可能な£planet£ ['concept_planets']をリストアップする。 植民地化はこの画面から直接始めることができ、 自動的に£colony_ship£ ['concept_colony_ship']を建設する。\n\n惑星に入植するためには、 £planet£ §H$concept_planets$§!が£science_ship£ ['concept_science_ship']によって調査済み、 かつ£anomaly£ ['concept_anomalies']があった場合はその研究も完了していることが必要となる。\n\nまた、['concept_starbase']は帝国の領内であるために、 その惑星の星系内に建設されなければならない。"
 # View: £interface£ ['concept_fleet_management_view'] or £interface£ §H$concept_fleet_management_view$§!
 concept_fleet_management_view: "$topbar_button_fleet_manager_name$画面" # Use this alias when referring to the concept
 concept_fleet_management: "$topbar_button_fleet_manager_name$" # Left out 'View' to fit in the Databank UI
 concept_fleet_management_desc: "艦船を設計し、製造する。 新しい§H艦船規模§!と['concept_components']は必要な['concept_technologies']を研究することによってアンロックする。 $ui_available_tabs$[GetConceptFleetManagement]"
 fleet_management_view_tab_fleet_manager: "§H$FLEET_MANAGER_VIEW$§!"
 fleet_management_view_tab_ship_designer: "§H$SHIP_DESIGNER$§!"
 concept_fleet_management_view_space_fauna: "$concept_fleet_management_view_no_space_fauna$\n- §H$CREATURE_DESIGNER$§!：['concept_space_fauna']を形作る"
 concept_fleet_management_view_no_space_fauna: "- $fleet_management_view_tab_fleet_manager$：['concept_fleets']を編成\n- $fleet_management_view_tab_ship_designer$：['concept_military_ships']を設計"
 # View: £interface£ ['concept_contacts_view'] or £interface£ §H$concept_contacts_view$§!
 concept_contacts_view: "交信画面"
 concept_contacts_view_desc: "£interface£ §H$concept_contacts_view$§!は既知のすべての帝国、 独立中立機構、 および異星存在物を一覧表示する。 この画面から['concept_diplomacy']の開始や関係の評価を行うことができる。 星間通信や異星勢力の情報収集の中枢として機能する。"
 contacts_view_tab_contacts: "§H$topbar_button_contacts_name$§!"
 contacts_view_tab_agreements: "§H$AGREEMENTS_LIST_TITLE$§!"
 contacts_view_tab_shroud: "§H$THE_SHROUD_TITLE$§!"
 concept_contacts_view_tabs: "- $contacts_view_tab_contacts$：['concept_diplomacy']を行う\n- $contacts_view_tab_agreements$：['concept_subject_agreements']を研究する\n- $contacts_view_tab_shroud$：['concept_psionic_ascension']を行う"
 # View: £interface£ ['concept_discoveries_view'] or £interface£ §H$concept_discoveries_view$§!
 concept_discoveries_view: "$topbar_button_discoveries_name$画面"
 concept_discoveries_view_desc: "£interface£ §H$concept_discoveries_view$§!では銀河で発見された重要な物体や現象の一覧を確認できる。 一覧には['concept_relics']や古代の遺物など、 永続的な重要性を持つ銀河の珍品も含まれる。 $ui_available_tabs$[GetConceptDiscovery]"
 discoveries_view_tab_relics: "§H$relics$§!"
 discoveries_view_tab_collection: "§H$COLLECTION$§!"
 discoveries_view_tab_vivarium: "§H$VIVARIUM$§!"
 discoveries_view_tab_astral_actions: "§H$ASTRAL_ACTIONS$§!"
 concept_discovery_view_base: "- $discoveries_view_tab_relics$：['concept_relics']を管理"
 concept_discovery_view_base_ancrel: "$concept_discovery_view_base$と['concept_minor_artifacts']"
 concept_discovery_view_base_archive: "$concept_discovery_view_base$\n- $discoveries_view_tab_collection$：['concept_specimens']を表示\n- $discoveries_view_tab_vivarium$：['concept_space_fauna']の繁殖"
 concept_discovery_view_base_ancrel_archive: "$concept_discovery_view_base$\n- $discoveries_view_tab_collection$：['concept_specimens']と['concept_minor_artifacts']を表示\n- $discoveries_view_tab_vivarium$：['concept_space_fauna']の繁殖"
 concept_discovery_view_base_astral: "$concept_discovery_view_base$\n$concept_discovery_view_astral$"
 concept_discovery_view_base_ancrel_astral: "$concept_discovery_view_base_ancrel$\n$concept_discovery_view_astral$"
 concept_discovery_view_base_archive_astral: "$concept_discovery_view_base_archive$\n$concept_discovery_view_astral$"
 concept_discovery_view_base_ancrel_archive_astral: "$concept_discovery_view_base_ancrel_archive$\n$concept_discovery_view_astral$"
 concept_discovery_view_astral: "- $discoveries_view_tab_astral_actions$：['concept_astral_actions']を起動"
 # View: £interface£ ['concept_claims_view'] or £interface£ §H$concept_claims_view$§!
 concept_claims_view: "$CLAIMS_VIEW$画面"
 concept_claims_view_desc: "£interface£ §H$concept_claims_view$§!では帝国が保有するすべての領土['concept_claims']を確認できる。 ['concept_galaxy_map']を外交モードにすると、 紛争中の星系や今後紛争が起こりうる場所を明確に把握できる。"
 # View: £interface£ ['concept_market_view'] or £interface£ §H$concept_market_view$§!
 concept_market_view: "$MARKET_VIEW$画面"
 concept_market_view_desc: "£interface£ §H$concept_market_view$§!は星間交易、 資源の売買、 毎月の定期取引確立のための枠組みを提供する。"
 # View: £interface£ ['concept_colony_view'] or £interface£ §H$concept_colony_view$§!
 concept_colony_view: "植民地画面"
 concept_colony_view_desc: "£interface£ §H$concept_colony_view$§!を通して£colony£ ['concept_colony']を管理できる。 適切な無人£planet£ ['concept_planets']または['concept_habitats']において、 この画面を通して§H植民地化§!を開始することができる。$ui_available_tabs$$concept_colony_view_tabs$"
 colony_view_tab_planet_summary: "§H$PLANET_TAB$§!"
 colony_view_tab_management: "§H$MANAGEMENT_TAB$§!"
 colony_view_tab_population: "§H$POPULATION_TAB$§!"
 colony_view_tab_armies: "§H$GROUND_COMBAT_TAB$§!"
 colony_view_tab_holdings: "§H$CORPORATE_TAB$§!"
 concept_colony_view_tabs: "- $colony_view_tab_planet_summary$：植民地の£district£ ['concept_districts']や£building£ ['concept_buildings']の概要、 そして任命した['concept_governor']を確認できる。 ここで['concept_decisions']の設定や['concept_planet_automation']の有効化などを行うことができる。\n- $colony_view_tab_management$：惑星の特性や人口の変化を確認できる。 ここでは['concept_decisions']の制定、 ['concept_planetary_ascension']、 ['concept_terraforming']の開始などを行うことができる。\n- $colony_view_tab_population$：植民地の人口を£job£ ['concept_job']階級別に確認することができる。\n- $colony_view_tab_armies$：植民地にいる地上軍を表し、 植民地がどれだけの['concept_devastation']を受けたかを表示している。\n- $colony_view_tab_holdings$：植民地のすべての['concept_overlord_holdings']の概要を表示する。"
 # View: £interface£ ['concept_starbase_view'] or £interface£ §H$concept_starbase_view$§!
 concept_starbase_view: "星系基地画面"
 concept_starbase_view_desc: "£interface£ §H$concept_starbase_view$§!を通して['concept_starbase']を管理できる。 $ui_available_tabs$$concept_starbase_view_tabs$"
 starbase_view_tab_command: "§H$STARBASE_STARBASE_TAB$§!"
 starbase_view_tab_defenses: "§H$STARBASE_DEFENSES_TAB$§!"
 starbase_view_tab_armies: "§H$MACRO_BUILDER_TAB$§!"
 starbase_view_tab_shipyard: "§H$STARBASE_SHIPYARD_TAB$§!"
 concept_starbase_view_tabs: "- $starbase_view_tab_command$：星系基地の§Hモジュール§!や§H建造物§!の概要を表示する。 また、 必要な['concept_technology']を研究した後、 星系基地が次のティアに進むためのアップグレードを可能とする。\n- $starbase_view_tab_defenses$：存在する['concept_defense_platforms']を表し、 設計をクリックすると、 もっと建設することができる。\n- $starbase_view_tab_armies$：大きな§H$assault_army_plural$§!を編成することができる。 地上軍は£sector£ ['concept_sector']内の利用可能な£colony£ ['concept_colonies']で編成され、 星系基地か§H兵員召集§!が有効になっている§H地上軍§!にて集まる。\n- $starbase_view_tab_shipyard$：['concept_civilian_ships']と['concept_military_ships']の両方を建設することができる。"
 # View: £interface£ ['concept_system_map'] or £interface£ §H$concept_system_map$§!
 concept_system_map: "星系地図"
 concept_system_map_desc: "£interface£ §H$concept_system_map$§!は、 ['concept_celestial_objects']、 ['concept_civilian_space_stations']、 ['concept_fleets']、 軌道上のインフラなど、 個々の星系の詳細を確認できる。 また、 星系内での建設、 入植、 戦闘活動、 科学活動を正確に管理できる。"
 # View: £interface£ ['concept_galaxy_map'] or £interface£ §H$concept_galaxy_map$§!
 concept_galaxy_map: "銀河地図"
 concept_galaxy_map_desc: "£interface£ §H$concept_galaxy_map$§!では£system£ ['concept_systems']、 ['concept_empire']の国境、 ['concept_hyperlanes']を確認し、 既知の銀河の戦略的な概要を把握できる。 探索、 拡大、 星間調整を行うための主要インターフェースとして機能する。"
 # View: £interface£ ['concept_navigation_bar'] or £interface£ §H$concept_navigation_bar$§!
 concept_navigation_bar: "ナビゲーションバー"
 concept_navigation_bar_desc: "£interface£ §H$concept_navigation_bar$§!は画面左側にある。\n\n操作すると拡大するか、 最小の状態に固定することができる。\n\n拡大モードでは、 メニュー項目の並び替えができる設定にアクセスできる。 また、 各メニューを素早く開くためのキーボードショートカットも変更される。"
 # View: £interface£ ['concept_resource_bar'] or £interface£ §H$concept_resource_bar$§!
 concept_resource_bar: "資源バー"
 concept_resource_bar_desc: "£interface£ §H$concept_resource_bar$§!は画面上部にある。\n\nここでは£energy£ ['concept_energy']などのさまざまな§H資源§!、 および£trade_value£ ['concept_trade']、 ['concept_research']、 ['concept_starbase_capacity']、 ['concept_naval_capacity']などの指標を見ることができる。\n\n右側には、 ゲームのスピードを上げたり下げたり、 一時停止や再開を行うための§H時間操作§!がある。\n\n§H時間操作§!の下には§H音楽プレーヤー§!がある。"
 # View: £interface£ ['concept_outliner'] or £interface£ §H$concept_outliner$§!
 concept_outliner: "アウトライナー"
 concept_outliner_desc: "£interface£ §H$concept_outliner$§!は、 £colony£ ['concept_colonies']、 ['concept_fleets']、 ['concept_civilian_space_stations']など帝国の主要な資産にすばやくアクセスできる。 このインターフェースはカスタマイズが可能なため、 リアルタイムのステータス更新や重要な活動の直接管理により、 操作や管理を迅速に実行できる。"
