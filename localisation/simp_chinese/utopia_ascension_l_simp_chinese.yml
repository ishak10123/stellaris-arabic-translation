 shroud_precog_cooldown_desc_common: "。我们还未召集够人手。"
 shroud_precog_cooldown_desc: "在上次逗留虚境时，我们最强大的$DEFAULT_TELEPATH_PLURAL$大多陷入了疯癫$shroud_precog_cooldown_desc_common$"
