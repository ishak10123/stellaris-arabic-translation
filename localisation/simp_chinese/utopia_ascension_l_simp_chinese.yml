 triggered_opinion_both_wilderness: "同为荒野"
 triggered_opinion_hive_mind: "蜂巢思维"
 utopia.2700.name: "设计进化"
 utopia.2700.desc: "有时进化需要被往正确的方向上推一把。我们现在有足够先进的技术，能够对我们的身体和思维进行基因层面的改造，以应对不断变化的环境带来的前所未有的挑战。"
 utopia.2703.name: "掌控进化"
 utopia.2703.desc: "我们终于不用再担心物种的生死存亡了。[Root.GetSpeciesName]人被自然随意主宰，基因进化完全听天由命的日子终于结束了。\n\n我们这个时代的工程师不是面对钢骨水泥工作，而是每天跟基因序列打交道。掌握着先进的基因改进技术，我们将能保证民族的美好未来。"
 utopia.2600.name: "心胜于物"
 utopia.2600.desc: "自从我们文明的伊始以来，一直有关于强大的术士掌握着只能用超自然力量形容的力量的传说。这些稀有的[Root.GetSpeciesNamePlural]可以侵入他们同胞的心智，用一个念想就能举起重物，或者表演其他的“魔法”壮举。直到最近，这些故事才变成“故”事。\n\n如今，我们的科学家终于得到了结论性的证据以证明某些[Root.GetSpeciesName]个体存在潜在的灵能潜力。虽然我们的物种只有非常少的一部分人被天赐了灵能潜力，他们数量相对于总人口数在过去几世纪里稳步增长。\n\n不知这是因为某种瞬间的增长井喷，还是因为我们基因中一直存在的某物催发了灵能潜力，科学家不得而知。"
 utopia.2600.desc.unplugged: "尽管我们这个年轻的文明有着短暂又暴力的历史，但我们[root.GetSpeciesNamePlural]有时也会让想象力遨游在幻想的故事当中。这些有趣的念想当中，最频繁出现的是强大的巫师的故事，他们使用的力量只能用超自然来形容：读心术，意念移物，或者展现其他各种“魔法”壮举。\n\n许多人相信，这种故事是远自我们被整合之前流传下来的；它们深藏在我们物种的集体无意识中。直到最近，大多数[root.GetSpeciesNamePlural]都还认为这是一厢情愿的想法。然而，我们的科学家现在终于获得了确凿的证据，证明了某些[Root.GetSpeciesAdj]个体确实存在内在的灵能潜力。\n\n虽然我们物种中似乎只有极少数人具有灵能，但基因研究表明，在过去的几个世纪里，他们的数量一直在稳步增长。至于这是由于某种突然的进化增长还是由于[origin_unplugged_assimilator_empire.GetName]的干预，科学家们无法确定。"
 utopia.2600.a: "也许瞥见了等待着我们的未来。"
 utopia.2602.name: "[From.GetSpeciesNamePlural]展示灵能潜能"
 utopia.2602.1.desc.1.non_gestalt_intro: "根据从§Y[From.GetName]§!政府泄露出来的消息，潜在的灵能力量已经在"
 utopia.2602.1.desc.1.non_gestalt_outro: "这一定是最近才发生的进展，在此之前我们没有[From.GetSpeciesNamePlural]展示过灵能力量的记录。"
 utopia.2602.1.desc.1.organic_non_gestalt: "$utopia.2602.1.desc.1.non_gestalt_intro$[From.GetSpeciesName]物种的某些个体上显现。$utopia.2602.1.desc.1.non_gestalt_outro$"
 utopia.2602.1.desc.1.machine_non_gestalt: "$utopia.2602.1.desc.1.non_gestalt_intro$[From.GetSpeciesName]机体上显现。$utopia.2602.1.desc.1.non_gestalt_outro$"
 utopia.2602.1.desc.1.gestalt_intro: "根据从§H[From.GetName]§!政府泄露出来的消息，潜在的灵能力量已经在个别[From.GetSpeciesNamePlural]上显现。"
 utopia.2602.1.desc.1.gestalt_outro: "他们还产生了一种前所未见的超自然能力。"
 utopia.2602.1.desc.1.organic_gestalt: "$utopia.2602.1.desc.1.gestalt_intro$尽管在它们物种中意识连接并不是什么新东西，但这些报告称$utopia.2602.1.desc.1.gestalt_outro$"
 utopia.2602.1.desc.1.machine_gestalt: "$utopia.2602.1.desc.1.gestalt_intro$神经网络交流对他们而言不是新东西，这些报告称$utopia.2602.1.desc.1.gestalt_outro$"
 utopia.2602.1.desc.2.intro: "这种能力总的来说还仅限于"
 utopia.2602.1.desc.2.outro: "报告中对这种现象没有提出任何解释。"
 utopia.2602.1.desc.2.organic: "$utopia.2602.1.desc.2.intro$[From.GetSpeciesName]物种中的很小一部分。$utopia.2602.1.desc.2.outro$"
 utopia.2602.1.desc.2.machine: "$utopia.2602.1.desc.2.intro$少数[From.GetSpeciesNamePlural]。$utopia.2602.1.desc.2.outro$"
 utopia.2602.1.desc.machine_gestalt: "$utopia.2602.1.desc.1.machine_gestalt$\n\n$utopia.2602.1.desc.2.machine$"
 utopia.2602.1.desc.machine_non_gestalt: "$utopia.2602.1.desc.1.machine_non_gestalt$\n\n$utopia.2602.1.desc.2.machine$"
 utopia.2602.1.desc.organic_gestalt: "$utopia.2602.1.desc.1.organic_gestalt$\n\n$utopia.2602.1.desc.2.organic$"
 utopia.2602.1.desc.organic_non_gestalt: "$utopia.2602.1.desc.1.organic_non_gestalt$\n\n$utopia.2602.1.desc.2.organic$"
 utopia.2602.2.desc: "[From.GetSpeciesName]的人口已开始展示类似的变化，在他们族群发生的变化不局限于一小片区域。"
 utopia.2602.a.organic_non_gestalt: "真奇怪。"
 utopia.2602.a.hive_or_machine_non_gestalt: "特殊力量？令人怀疑。"
 utopia.2602.a.machine_gestalt: "停止计算。"
 utopia.2602.b: "灵能能力？真扯！"
 utopia.2602.c: "他们的巫术可救不了他们。"
 utopia.2602.d.organic: "是的，我们能感受到他们的灵能发散。"
 utopia.2602.d.machine: "是的，我们已经编目了他们的灵能频率。"
 utopia.2605.name.organic_non_gestalt: "[psionic_leader.GetTitle]展示灵能"
 utopia.2605.name.machine_non_gestalt: "[psionic_leader.GetTitle]已识别为灵能者"
 utopia.2605.name.gestalt: "[psionic_leader.GetName]已识别为灵能者"
 utopia.2605.desc.organic_non_gestalt: "虽然成年后显现灵能较为罕见，但也不是前所未有。[psionic_leader.GetTitle][psionic_leader.GetName]最近展示的能力，我们就怀疑其本质是灵能。经过了全面的超能感知测试后，[psionic_leader.GetSheHe]被证实拥有4级灵能天赋。"
 utopia.2605.desc.machine_non_gestalt: "尽管较为罕见，灵能力有时候也会在此前不支持的硬件上自发部署。[psionic_leader.GetTitle][psionic_leader.GetName]最近就展现出了可以被归类为灵能的功能。在经过全面诊断之后，[psionic_leader.GetSheHe]被判定为拥有4级灵能天赋。"
 utopia.2605.desc.gestalt: "我们新获得的力量影响与日俱增。我们的[GetBrainName]容器[psionic_leader.GetName]最近展现出了可以被归类为灵能的功能。在经过全面诊断之后，[psionic_leader.GetSheHe]被鉴定为4级[GetPsychicNoun]。"
 utopia.2605.a: "这项新能力很好地为我们所用。"
 utopia.2652.name: "[This.GetSpeciesNamePlural]觉醒灵能能力"
 utopia.2652.desc.1.intro: "星系各地的[This.GetSpeciesNamePlural]都发生了一场深刻的转变。此前他们的潜在灵能只"
 utopia.2652.desc.1.outro: "解放了全部的灵能潜质。"
 utopia.2652.desc.1.organic: "$utopia.2652.desc.1.intro$眷顾了很少的一部分群体，现在整个物种$utopia.2652.desc.1.outro$"
 utopia.2652.desc.1.machine: "$utopia.2652.desc.1.intro$少量出现，现在他们群体总体都$utopia.2652.desc.1.outro$"
 utopia.2652.desc.2.non_gestalt: "尽管这些变化可能源自[From.GetName]，但他们的整个[GetSpeciesWord]无论身处何处都已经开始显现。"
 utopia.2652.desc.2.organic_non_gestalt: "$utopia.2652.desc.2.non_gestalt$\n\n除了展现出一系列的强大灵能力以外，[This.GetSpeciesNamePlural]还开始放弃彼此之间的语言交流，转而使用心灵感应。"
 utopia.2652.desc.2.machine_non_gestalt: "$utopia.2652.desc.2.non_gestalt$\n\n$utopia.2652.desc.2.machine_gestalt$"
 utopia.2652.desc.2.gestalt.intro: "除了展现出一系列的强大灵能力以外，所有的[This.GetSpeciesNamePlural]现在还能"
 utopia.2652.desc.2.organic_gestalt: "$utopia.2652.desc.2.gestalt.intro$以非语言方式在现有渠道之外进行交流。"
 utopia.2652.desc.2.machine_gestalt: "$utopia.2652.desc.2.gestalt.intro$在现有集体渠道之外交流。"
 utopia.2652.desc.organic_non_gestalt: "$utopia.2652.desc.1.organic$\n\n$utopia.2652.desc.2.organic_non_gestalt$"
 utopia.2652.desc.machine_non_gestalt: "$utopia.2652.desc.1.machine$\n\n$utopia.2652.desc.2.machine_non_gestalt$"
 utopia.2652.desc.organic_gestalt: "$utopia.2652.desc.1.organic$\n\n$utopia.2652.desc.2.organic_gestalt$"
 utopia.2652.desc.machine_gestalt: "$utopia.2652.desc.1.machine$\n\n$utopia.2652.desc.2.machine_gestalt$"
 utopia.2652.b: "这一定有合乎逻辑的解释的。"
 utopia.2652.c.organic: "谨慎推进。"
 utopia.2652.c.machine: "次优发展。"
 utopia.2652.d.organic: "我们感受到了他们觉醒后强大的灵能扰流。"
 utopia.2652.d.machine: "这解释了我们探测到的灵能扰流。"
 utopia.2650.name: "大觉醒"
 utopia.2650.desc: "[Root.GetSpeciesName]物种经历了只能被形容为“大觉醒”的蜕变，以往，我们伟大的灵能潜力便是我们物种固有的存在，虽然只在一小部分人身上有所展示，而如今……\n\n几乎是一夜之间，身处各处的[Root.GetSpeciesNamePlural]都解锁了他们全部的灵能潜力，就像某种共通的[Root.GetSpeciesName]灵能能量池达到了激活值一样，将我们大脑中的灵能潜力集体激活。\n\n心灵感应已经取代了[Root.GetSpeciesNamePlural]间大部分语音交流，而且这只是我们的社会面对的无数变化中的一小个而已。我们现在以一种我们过去难以想象的方式联系在了一起。"
 utopia.2650.a: "面纱已揭。"
 utopia.2655.name: "虚境"
 utopia.2655.desc: "就像暗室里低沉的轻语般，虚境从内心召唤我们。那是时间开始运转的伊始便存在的由纯粹灵能构成的原生领域。所有被赐予灵能能力的生物都能用某种方式，即使只是潜意识地，从虚境汲取能量。\n\n自从我们升格之后，我们开始更清晰地看到虚境。其中有些图案，即使是我们最强大的通灵者看到的也只是毫无格式的漩涡状能量。在虚境那边，也有一些……其他的存在。一种灵体样的存在，从另一边凝视着我们，有时怀着好奇，有时怀着善意……有时也怀着恶意。\n\n我们还在进一步学习我们这新得力量的延展面，但我们还是有可能和这些灵体交流的，这需要我们最强大的通灵者们的共同努力。"
 utopia.2655.a: "我们必须探索虚境。"
 BREACHING_SHROUD_PROJECT: "突入虚境"
 BREACHING_SHROUD_PROJECT_DESC: "如果我们要和被称为“虚境”的灵能领域中的居民交流的话，我们必须释放一股难以想象的巨大灵能能量。一场巨大的降灵会已做好筹备，[Root.Capital.GetName]新建的通灵者集会所里最强大的通灵者们将参与其中。"
 utopia.2656.name: "降灵会"
 utopia.2656.desc: "经过了数天的催眠通灵后，通灵者集会所的通灵者们终于开启了一道通往虚境的短暂穿界门。\n\n我们现在既然已建立了初始灵能链接，我们以后可以通过§H接触§!菜单和虚境交流。为了和这一领域建立有意义的链接并会见身居其中的存在，我们有必要用一种特殊的灵能发射器以延展我们的灵能范围，这会消耗一笔巨量的能量。"
 utopia.2656.a: "是时候进入了，看看我们能发现什么。"
 utopia.2657.name: "镜中窥视"
 utopia.2657.desc: "在逐渐突破帷幕的过程中，我们可以感受到它在我们联合意识的施压下逐渐变得稀薄起来。而我们尝试突入§H虚境§!的行为在另一端看来并非波澜不惊。有什么东西正在注视着我们。\n\n这个存在散发着强大的力量和深不可测的意图。它在逐渐渗入我们心灵的裂缝中。\n\n它仅仅是注意到了我们，就像观察着舷窗上凝结的一滴水一般观察着我们。也许这个存在会允许我们进入，这样我们才能与其神秘的意识发生接触。"
 utopia.2657.a: "尝试与其交流。"
 utopia.2657.a.tt: "§G这将使我们签订一条契约。§!"
 utopia.2657.b: "我们愿意自行探索。"
 utopia.2657.c: "这不是什么好主意！我们得小心为妙。"
 utopia.2658.name: "坚振圣事"
 utopia.2658.desc: "自从与§H[GetShroudPatron]§!签订契约以来又过了些许时日。我们之间联系的纽带仍旧脆弱，因此仍有将其打破亦或是增强的机会。"
 utopia.2658.a: "签订正式契约。"
 utopia.2658.b: "放弃§Y[GetShroudPatron]§!。"
 utopia.2659.name: "入口"
 utopia.2659.desc: "我们的灵能使在不依靠虚境住民的帮助下不眠不休地尝试突破§H虚境§!。终于，他们发现了一条通路。这片深渊正在召唤我们。我们只需要深吸一口气跃入其中。"
 utopia.2659.a: "那我们就潜入虚境的深处吧。"
 FORM_COVENANT_PROJECT: "与不可名状者交流"
 FORM_COVENANT_PROJECT_DESC: "[Root.Capital.GetName]上的灵能使集会所正在准备一场盛大的圣餐以探寻一位深居虚境中的实体。"
 utopia.3020.name: "§G灵能化身已召唤§!"
 utopia.3020.desc: "§H虚境§!强大的能量已被成功地注入一个处于我们的控制之下的灵能化身！\n\n在转移至我们的维度后，这个新生的化身已合并为一个太空实体，并处在[Root.Capital.GetName]轨道上。"
 utopia.3021.desc: "§H虚境§!强大的能量已被成功地注入一个处于我们的控制之下的灵能化身！\n\n在转移至我们的维度后，这个新生的化身已合并为一个巨型武士，并处在[Root.Capital.GetName]地表上。"
 utopia.3022.name: "§R召唤失败§!"
 utopia.3022.desc: "用来召唤一个化身并将其带至我们维度所需导通的灵能已超越我们目前的能力。因为我们的失败，§H虚境§!的能量摇曳至尽。"
 utopia.3023.name: "灵能实体攻击"
 utopia.3023.desc: "召唤化身的尝试只成功了一部分。虽然这个造物已经以正确的形态显现到我们的维度中，但[GetTelepathPlural]们未能将其驯服！\n\n我们现在要面对一个敌对的灵能实体，它将摧毁沿途的一切。"
 utopia.3024.name: "虚境侵军"
 utopia.3024.desc: "一个§H虚境§!造物突破了空间壁垒，并且在[shroud_spawn_system.GetName]星系完成实体化！这个复仇心切的化身驾驭着一股强大的灵能，并将用其鞭挞任何不幸踏上它复仇之路的人和物。"
 utopia.3024.a: "它必须被制止！"
 utopia.3026.name: "虚境化身被驱散"
 utopia.3026.desc: "由于在本空间停留导致的能量持续衰退，位于§H[shroud_spawn_system.GetName]§!星系的化身已到达其无法维持形态的谷值。\n\n它无法继续维持实体形态，退回了§H虚境§!之中。"
 utopia.3026.a.default: "谢天谢地。"
 utopia.3026.a.machine_or_hive: "意外收获。"
 exit.shroud: "离开虚境。"
 shroud_army: "灵能化身"
 shroud_army_desc: "一位来自虚境的由纯粹的灵能铸造的巨型武士。"
 shroud.chances.high: "§G成功率：高§!"
 shroud.chances.medium: "§Y成功率：中§!"
 shroud.chances.low: "§R成功率：低§!"
 venture.shroud.tooltip: "花费能量以探索更深层次的虚境。我们控制的§H泽珞§!产量将可以减少这项花费，最多可以有4级减免。\n\n"
 exit.shroud.tooltip: "离开虚境，返回普通空间。"
