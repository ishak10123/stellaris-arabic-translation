 utopia.3100.name: "灰烬残垣"
 utopia.3100.desc_prefix: "[Root.Capital.GetName]……景象模糊且难以辨认，但毫无疑问，那是[Root.Capital.GetName]，我们的首都。"
 utopia.3100.desc_suffix: "\n\n§H“并不是无数之一，这是既定之事。如同恒星注定升起一般。此乃命运。”§!\n\n这幻景来得快去得也快，只留下纷扰灵能的瘴气经久不散。"
 utopia.3100.desc_default: "$utopia.3100.desc_prefix$在烈火与浓烟的的笼罩下，巨大的城市看起来陌生又熟悉。成千上万……不，上百万残尸横死街头，定睛一看都是[Root.GetSpeciesName]的尸体。腐烂的恶臭让人难以忍受。\n\n§H“你们的未来。”§!\n\n废墟上死寂一片。望向天空，轨道上巨大的物体，拖着烟迹，开始缓慢却不可阻止地降向星球。我们是在见证无数可能的未来之一吗？$utopia.3100.desc_suffix$"
 utopia.3100.desc_hive: "$utopia.3100.desc_prefix$在烈火与浓烟的的笼罩下，巨大的城市看起来陌生又熟悉。成千上万……不，上百万残尸横死街头，定睛一看都是[Root.GetSpeciesName]的尸体。腐烂的恶臭弥漫。\n\n§H“你们的未来。”§!\n\n废墟上死寂一片。望向天空，轨道上巨大的物体，拖着烟迹，开始缓慢却不可阻止地降向星球。我们是在见证无数可能的未来之一吗？$utopia.3100.desc_suffix$"
 utopia.3100.desc_machine: "$utopia.3100.desc_prefix$在烈火与浓烟的的笼罩下，巨大的城市看起来陌生但可辨认。成千上万……不，上百万被拆解的单元散落街头，它们全都是[Root.GetSpeciesName]。破败之景环绕着我们。\n\n§H“你们的未来。”§!\n\n废墟上死寂一片。望向天空，轨道上巨大的物体，拖着烟迹，开始缓慢却不可阻止地降向星球。我们是在见证无数可能的未来之一吗？$utopia.3100.desc_suffix$"
 utopia.3100.a: "§G把能量注入化身。§!"
 utopia.3100.b: "§Y恩赐：探测范围增加。§!"
 utopia.3100.c: "§R恩赐：提升护盾强度。§!"
 utopia.3110.name: "灵争幻斗"
 utopia.3110.desc: "虚境此处风暴呼啸。大量的原生灵能能量流经这里，有时会狂暴地产生半智慧灵体生物。\n\n这些困惑的灵体经常相互冲突，在战斗中释放出能残留数千年的庞大灵能。事实上，现在就有几场这样的决斗正在进行。\n\n我们应该谨慎前进。"
 utopia.3120.name: "灵能访客"
 utopia.3120.desc_suffix: "有一位访客，——一个强大的灵能探测器，我们对铸造它的心灵完全一无所知，他们对虚境也是如此。\n\n当他们和我们的灵能回声彼此触及时，我们心中闪过一副飘渺的幻景：巨大的有机生物漂浮在厚厚的气态大气中，一群较小的动物相伴左右。"
 utopia.3120.desc_machine: "在虚境的深处，我们探测到了一个存在。$utopia.3120.desc_suffix$"
 utopia.3120.desc_default: "在虚境的深处，一个存在突然展露了自身。$utopia.3120.desc_suffix$"
 utopia.3130.name: "无尽沙漠"
 utopia.3130.desc: "一处无尽的沙漠蔓延在我们面前。我们曾经来过这。\n\n§H“刹拉 库尔‘弥勒姆 祖耐克？”§!\n\n有什么从沙中浮现了出来。我们难以看到。\n\n§H“扎拉比，穆拉斯克。”§!\n\n话语像雷鸣般响亮，他们从未预料到说话者的出现。我们只能被迫回答。"
 utopia.3130.a: "刹什卡 马拉克。"
 utopia.3130.b: "提里特 奈利 达苏马娜！"
 utopia.3130.c: "库纳克 德’奇奈克。"
 utopia.3140.name: "多重宇宙"
 utopia.3140.desc_common: "我们存在的本质展现在我们面前。数千个像我们当前所处的星系被锁死在多元宇宙冲突的无尽循环中。\n\n它开始，终结，又再度开始。每一次，万亿的"
 utopia.3140.desc_suffix: "§H“正是如此。”§!一个声音低语着，§H“而且永应如此。”§!"
 utopia.3140.desc_default: "突然，在痛苦的瞬间清晰中，$utopia.3140.desc_common$生命悬在天平之上。\n\n$utopia.3140.desc_suffix$"
 utopia.3140.desc_machine: "突然，在倏然的清晰中，$utopia.3140.desc_common$变量悬在天平之上。\n\n$utopia.3140.desc_suffix$"
 utopia.3150.name: "失落之声"
 utopia.3150.desc: "我们正从远处俯视我们的星系，远到有几十万光年。毫无征兆地，灵能流便将我们以难以置信的速度冲向无数恒星，来到了一片属于失落帝国，[fallen_empire.GetName]，的宇域。\n\n急速掠过恒星，随后是行星，终于视线定格在一座[fallen_empire.GetSpeciesName]城市。借着远超我们数代的反重力科技，无数尖塔冲向天际。灵能流将我们带到了其中一座尖塔，穿过一面又一面墙，最终我们来到了一间会议室之类的房间。两个[fallen_empire.GetSpeciesNamePlural]在房间里，坐在舒适的零重力椅上，相互交流。\n\n他们并没有注意到我们的存在。"
 utopia.3150.a: "§Y进入他们的意识找寻秘密。§!"
 utopia.3151.name: "§G科技秘密§!"
 utopia.3151.v1.desc: "$utopia.3151.a.desc$\n\n$utopia.3151.1.desc$\n\n$utopia.3151.b.desc$\n\n$utopia.3151.4.desc$\n\n$utopia.3151.c.desc$"
 utopia.3151.v2.desc: "$utopia.3151.a.desc$\n\n$utopia.3151.2.desc$\n\n$utopia.3151.b.desc$\n\n$utopia.3151.5.desc$\n\n$utopia.3151.c.desc$"
 utopia.3151.v3.desc: "$utopia.3151.a.desc$\n\n$utopia.3151.3.desc$\n\n$utopia.3151.b.desc$\n\n$utopia.3151.6.desc$\n\n$utopia.3151.c.desc$"
 utopia.3151.a.desc: "这两个[fallen_empire.GetSpeciesNamePlural]显然是某种显赫人物，而且在共商国是。缓慢但沉稳，画面侵入他们的同时他们说的外星语言逐渐被翻译为我们理解的话语。"
 utopia.3151.b.desc: "两个[fallen_empire.GetSpeciesNamePlural]的心地正在瓦解。就像盛开的花一样，他们的心智尽开。我们很容易就能侵入。"
 utopia.3151.c.desc: "在那。科技秘密被从他们的心智中挖出，就像从未加密电脑上复制文件一样简单。[fallen_empire.GetSpeciesNamePlural]一向看低的贼现在完全占据了他们的心智。"
 utopia.3151.1.desc: "§H“……简直是疯了，如果她认为人民愿意接受长久以来习惯的生活水平哪怕有一点暂时的下降，那……”§!"
 utopia.3151.2.desc: "§H“……简直是耻辱。想象一下连年轻物种都开始怀疑我们是否能完全了解自己的科技了！我们必须……”§!"
 utopia.3151.3.desc: "§H“……变得越来越强大了。议会成员确信如果我们不采取行动……”§!"
 utopia.3151.4.desc: "§H“……不在乎议会怎么说。上进者和我们相差了数千年，他们可怜的舰队对我们的威胁就像伽祖瑞安蚊能吸干一只海拉希火蜥蜴一般不切实际。根本没必要……”§!"
 utopia.3151.5.desc: "§H“……仍认为没必要使用惩罚性措施，他们还年轻，缺乏关照，但我们曾经也是这样。他们还需要时间来……”§!"
 utopia.3151.6.desc: "§H“……说也许我们需要采取行动，在年轻物种成长到过于强大前铲除他们。我只能说我同意他，但议会觉得现在太迟了……”§!"
 utopia.3152.name: "密语未闻"
 utopia.3152.desc: "这两个[fallen_empire.GetSpeciesNamePlural]显然是某种显赫人物，而且在共商国是。缓慢但沉稳，画面侵入他们的同时他们说的外星语言逐渐被翻译为我们理解的话语。\n\n突然，这两个外星人默不作声。\n\n§H“你感觉到了吗？”\n\n“嗯，有什么在看着我们”§!\n\n他们巡视着房间，直到他们盯着我们。\n\n§H“别出心裁，一个灵能探机。”§!\n\n§H“看起来它源自[Root.GetSpeciesName]。快，激活传输屏障。§!”\n\n画面在干扰中中断了。"
 utopia.3153.desc: "[Root.GetSpeciesNamePlural]。\n\n别以为你们那试图侵入我们领袖心智的龌龊尝试没有被注意到。\n\n你们会付出代价的。"
 utopia.3153.a: "但……但听我们解释！"
 utopia.3153.b: "这一定有合乎逻辑的解释的……"
 utopia.3160.name: "虚空闪烁"
 utopia.3160.desc: "一颗闪烁着的星星在虚境物质化。它用难以置信的速度飞行着，有时它会显形为配置不明的外星舰船。然后它便消失在灵能云迹中，来的快去的也快。\n\n那会是什么？是什么能以物理形态进入虚境随后从普通空间的某处出现？"
 utopia.3160.a: "§Y在这逗留一阵。§!"
 utopia.3161.desc: "又一颗闪烁着的星星突然出现，但这次我们准备好了。那确实是外星舰船，并不像我们星系所见的任何一种。当它飞过时，我们感受到了乘员的心地，他们的秘密是我们的了。\n\n灵能跃迁引擎，天才的设计。"
 utopia.3161.name: "§G灵能跃迁引擎§!"
 utopia.3162.desc: "又一颗闪烁着的星星突然出现，但这次我们准备好了。那确实是外星舰船，并不像我们星系所见的任何一种。当它飞过时，我们试图混入其乘员的心地，但他们的智力比我们以往所见的个体更神秘更不同。\n\n现在我们不仅被从他们的舰船逐出，他们粗鲁的灵能排斥跟随我们离开了虚境！我们星舰的亚光速速度暂时降低了。"
 utopia.3170.name: "护盾灵体"
 utopia.3170.desc: "在虚境中追随着一个纤弱的回声，我们发现了一个静坐在某种强大的灵能护盾后的灵体。\n\n§H“走开。”§!"
 utopia.3170.a: "§Y尝试突破护盾。§!"
 utopia.3171.name: "§G灵能护盾§!"
 utopia.3171.desc_suffix: "然而，对打破护盾的尝试让我们也学会了如何创造出相似的力场。如果这种技术可以加以精进，我们就能形成大到可以包裹整艘星际舰船的灵能护盾了。"
 utopia.3171.desc_machine_gestalt: "我们来到虚境如此深的地方后并没有无功而返。在汇聚了集体的全部灵能力之后，我们在护盾上产生了能让自己够穿过的突破口。\n\n在护盾另一侧的存在远超我们目前的理解能力，严重地过载了我们的数个灵能处理器，$utopia.3171.desc_suffix$"
 utopia.3171.desc_organic: "我们来到虚境如此深的地方后并没有无功而返。在将我们灵能使的全部灵能力汇聚起来以后，在护盾上终于造成了一个大到足以穿过的开口。\n\n我们不知道他们在盾的另一边看到了什么，但那足以让他们永久性精神失常。他们的牺牲并没有白费，$utopia.3171.desc_suffix$"
 utopia.3172.name: "未破之盾"
 utopia.3172.desc_machine_gestalt: "我们的[GetTelepathPlural]，在如此深入虚境以后已经负荷过载，无法再汇聚足够多的灵能来穿透护盾。在失败后我们得到了这份通讯。"
 utopia.3172.desc_machine_non_gestalt: "我们的[GetTelepathPlural]，在如此深入虚境以后已经负荷过载，无法再汇聚足够多的灵能来穿透护盾。我们的失败似乎刺激到了这个灵体。"
 utopia.3172.desc_organic_gestalt: "我们的[GetTelepathPlural]，在如此深入虚境以后已经疲惫不堪，无法再汇聚足够多的灵能来穿透护盾。在失败后我们得到了这份通讯。"
 utopia.3172.desc_organic_non_gestalt: "我们的[GetTelepathPlural]，在如此深入虚境以后已经疲惫不堪，无法再汇聚足够多的灵能来穿透护盾。我们的失败似乎刺激到了这个灵体。"
 utopia.3180.name: "等待未来"
 utopia.3180.desc.intro: "就我们所知，时间的概念对虚境的这片区域完全是外来物。在这看起来像是数个世纪般久的时间可能等同于真实世界的数小时或数分钟。"
 utopia.3180.desc_gestalt: "$utopia.3180.desc.intro$只要我们知道如何观察的话，预知未来的能力便触手可及。\n\n这种能力对我们集体有很大的风险，我们要小心使用。"
 utopia.3180.desc_machine_non_gestalt: "$utopia.3180.desc.intro$只要知道如何观察的话，在其中甚至可以一瞥未来。\n\n预知未来的概念对我们的灵能处理器有极大的过载风险，我们要小心使用。"
 utopia.3180.desc_organic_non_gestalt: "$utopia.3180.desc.intro$只们知道如何观察的话，在其中甚至可以一瞥未来。\n\n对灵能使来说预知未来是最明确无误能导致疯狂的行为之一，我们要小心使用。"
 utopia.3180.a: "§Y在这冥想一会。§!"
 utopia.3181.desc_gestalt: "在避免单元过载的前提下只能维持有限的虚境预知链接，但概率数据的流量仍然过于庞大以至于难以投入实用。\n\n然而，我们的研究节点还是找到了这些数据的一项次要用途，就是将其应用在舰船上来提高战斗效率。"
 utopia.3181.desc_machine_non_gestalt: "在避免单元过载的前提下只能维持有限的虚境预知链接，但概率数据的流量仍然过于庞大以至于难以投入实用。\n\n然而，如果我们能制造出用来解析数据的数码界面，其将有可能被用于改善星舰的战斗电脑……"
 utopia.3181.desc_organic_non_gestalt: "我们可以维持和虚境建立有限的预知连接的同时避免陷入疯狂，但概率数据的巨大流量将压垮我们导致其很难有实际用处。\n\n然而，如果我们能设置一个数码界面以解析数据，其将有可能被用于改善星舰的战斗电脑……"
 utopia.3181.name: "§G预知接口§!"
 utopia.3182.name: "§R虚境癫狂症§!"
 utopia.3182.desc_gestalt: "正如我们担心的，尝试理解这种同时存在于过去和未来的难以想象的多重可能性在我们的灵能工蜂中造成了大规模的神经紧张症。\n\n这使他们与主脑断绝了联系失去了指令。如果想再次探索达虚境，我们需要回收这些有缺陷的躯体，恢复集体的力量。"
 utopia.3182.desc.non_gestalt.1: "这种同时存在于过去和未来的难以想象的多重可能性。\n\n每个变化和场景，无论它们间的差别有多巨大或是微小，在他们的[GetSpeciesBrainPlural]中重复闪现。他们现在陷入了永久的精神紧张状态。\n\n"
 utopia.3182.desc.non_gestalt.2: "新的[GetTelepathPlural]，我们还需要一段时间才能集中足够的灵能力量再次进入虚境。"
 utopia.3182.desc_machine_non_gestalt: "不出所料，我们的灵能处理器无法理解$utopia.3182.desc.non_gestalt.1$由于需要建造$utopia.3182.desc.non_gestalt.2$"
 utopia.3182.desc_organic_non_gestalt: "正如我们担心的，通灵者们陷入了疯狂。同时间，他们的心智开放向$utopia.3182.desc.non_gestalt.1$由于需要重新招募$utopia.3182.desc.non_gestalt.2$"
 utopia.3190.name: "高密度能量"
 utopia.3190.desc.intro: "我们在虚境中找到了一小处我们之前从未见过的巨量灵能能量聚集的空间。"
 utopia.3190.desc_gestalt: "$utopia.3190.desc.intro$只要成功利用，这种灵能将会弥散到集体中而不会有什么后果。然而。然而我们也可以指定一个子个体来作为这份能量的直接通路，使其变得非常强大。\n\n目前尚不清楚其个体形式是否能够处理如此巨大的能量而不产生致命的后果。我们挑选了一些候选者。"
 utopia.3190.desc_non_gestalt: "$utopia.3190.desc.intro$任何[GetPsychicNoun]只要能成功潜入这片纯能量构成的区域就会变得无比强大……但这只够一个人使用，并且还涉及到一定的风险。\n\n整个[Root.GetName]只有极少人具有足够强大灵能，能进入池中汲取能量还不丢掉性命。该让谁前往呢？"
 utopia.3190.1.a: "§G[leader_1.GetTitle][leader_1.GetName]§!"
 utopia.3190.2.a: "§Y[leader_1.GetTitle][leader_1.GetName]§!"
 utopia.3190.3.a: "§R[leader_1.GetTitle][leader_1.GetName]§!"
 utopia.3190.1.b: "§G[leader_2.GetTitle][leader_2.GetName]§!"
 utopia.3190.2.b: "§Y[leader_2.GetTitle][leader_2.GetName]§!"
 utopia.3190.3.b: "§R[leader_2.GetTitle][leader_2.GetName]§!"
 utopia.3190.1.c: "§G[leader_3.GetTitle][leader_3.GetName]§!"
 utopia.3190.2.c: "§Y[leader_3.GetTitle][leader_3.GetName]§!"
 utopia.3190.3.c: "§R[leader_3.GetTitle][leader_3.GetName]§!"
 utopia.3190.1.d: "§G[leader_4.GetTitle] [leader_4.GetName]§!"
 utopia.3190.2.d: "§Y[leader_4.GetTitle] [leader_4.GetName]§!"
 utopia.3190.3.d: "§R[leader_4.GetTitle] [leader_4.GetName]§!"
 utopia.3191.name: "[GetChosenName]"
 utopia.3191.desc_organic_non_gestalt: "$utopia.3191.desc_machine_non_gestalt$愿圣灵恩慈我们的灵魂。"
 utopia.3191.desc_machine_non_gestalt: "完……完工了。当灵能能量池被抽干后整个虚境似乎都震颤了起来，其中的力量被传输给了[chosen_leader.GetName]。\n\n星系历史上只有屈指可数的个体拥有过如此强大的力量。"
 utopia.3191.desc_gestalt: "我们成功地将整个灵能口袋中的能量导入了选定的目标，[chosen_leader.GetName]体内。\n\n这些能量在我们的集体海洋中小如沙粒，[chosen_leader.GetName]可以将其作为强大的工具为[Root.GetName]的所有[Root.Species.GetName]谋利。"
 utopia.3192.name: "§R领袖之死§!"
 utopia.3192.desc_gestalt: "当池中巨量的能量传输给[chosen_leader.GetName]时，整个虚境似乎都在震颤。\n\n然而如我们所料，这种力量已经超过了任何单一实体所能承受的范围。[chosen_leader.GetName]的物理形态化为了爆炸性的灵能波，他的声音被从[GetBrainName]中抹除了。"
 utopia.3192.desc_non_gestalt: "当池中巨量的能量传输给[chosen_leader.GetName]时，整个虚境似乎都在震颤。\n\n不幸的是，[chosen_leader.GetHerHis]的[GetSpeciesBrain]似乎无法承受这压力。也许没有活物能拥有这样的力量。[chosen_leader.GetName]被吞噬并引发灵能大爆炸，一并杀死了周边的人。"
 utopia.3193.name: "§R灵能变形§!"
 utopia.3193.desc.intro: "当池中巨量的能量传输给[chosen_leader.GetName]时，整个虚境似乎都在震颤。\n\n虽然传输成功了，但是[chosen_leader.GetName]……发生了变化……"
 utopia.3193.desc.outro: "\n\n§H“下等孽畜……你们……你们对我……做了……什么……”§!\n\n§H“你们……都将……付出……狂妄的代价……”§!"
 utopia.3193.desc_gestalt: "$utopia.3193.desc.intro$他从集体中脱离，一个完全陌生的实体夺舍了他的身躯。$utopia.3193.desc.outro$"
 utopia.3193.desc_non_gestalt: "$utopia.3193.desc.intro$他的身体被某种纯能量的存在夺舍了。$utopia.3193.desc.outro$"
 utopia.3200.name: "幻象"
 utopia.3200.1.desc_organic: "这片虚空闪烁着能量，让我们休息一会。"
 utopia.3200.1.desc_machine: "这片虚空闪烁着能量，让我们充能一会。"
 utopia.3200.2.desc: "我们前进的道路突然遇到了尽头，我们不能再前进一步了。"
 utopia.3200.3.desc_organic: "有什么在和我们说话，某种奇妙的东西。"
 utopia.3200.3.desc_machine: "有什么在和我们说话，某种值得关注的东西。"
 utopia.3200.4.desc: "因为某种我们未知的原因，我们被牵拉到了虚境中的这个能量矿脉。但为什么？"
 utopia.3200.5.desc.outro: "席卷了我们，仿佛在虚境中深思了一个永恒。随后我们重新找到立足点，恐惧也逐渐消散。"
 utopia.3200.5.desc_organic: "片刻间，我们便迷失了。一种纯粹的惊恐$utopia.3200.5.desc.outro$"
 utopia.3200.5.desc_machine: "片刻间，我们便迷失了。一种递增的不确定性$utopia.3200.5.desc.outro$"
 utopia.3200.6.desc.intro: "随着我们走向虚境深处，一群灵体围绕着我们舞蹈良久。他们闪耀着寻常空间中从未见过的炫目色彩。\n\n"
 utopia.3200.6.desc_organic: "$utopia.3200.6.desc.intro$这种奇景令人沉醉，直到我们突然意识到：我们正受其驱使。"
 utopia.3200.6.desc_machine: "$utopia.3200.6.desc.intro$这种奇景令人惊奇，直到我们突然意识到：我们正受其驱使。"
 utopia.3200.7.desc: "一块无瑕的水晶碎片漂浮在这，顺着它的旋转轴缓慢自转着。当我们接近时，它碎裂成了数千块碎片。"
 utopia.3200.8.desc_organic: "一具[Root.GetSpeciesName]的遗体横躺在前面。腐化的尸体在爆出一阵刺耳的尖叫后消散了。"
 utopia.3200.8.desc_machine: "一台[Root.GetSpeciesName]的空壳横躺在前面。锈蚀的外壳在爆出一阵刺耳的尖叫后消散了。"
 utopia.3200.9.desc.intro: "我们不敢确定这是不是现实之事。我们究竟是真的在虚境中，或"
 utopia.3200.9.desc_hive: "$utopia.3200.9.desc.intro$只是我们捕获了某个严重的传感器故障？"
 utopia.3200.9.desc_organic_non_hive: "$utopia.3200.9.desc.intro$只是我们中某人的急性间歇性精神病在发作？"
 utopia.3200.9.desc_machine_non_hive: "$utopia.3200.9.desc.intro$只是我们发生了严重的处理器故障？"
 terraforming_candidate_category: "古生命迹象"
 terraforming_candidate_category_desc: "有迹象表明这个荒芜且毫无生机的星球曾经拥有过一个生物圈。"
 MESSAGE_TERRAFORM_FOUND_TITLE: "$anomaly.2575.name$"
 MESSAGE_TERRAFORM_FOUND_DESC: "[From.GetName]被识别为一颗环境改造候选星球。我们会将这颗[From.GetPlanetMoon]作为未来殖民目标进行追踪。"
 anomaly.2575.name: "发现环境改造候选"
 anomaly.2575.desc.intro: "我们对[From.GetName]的详尽扫描表明这个星球在遥远的过去维持过生命。两极冰盖和[From.GetPlanetMoon]地表下明显蕴藏着冰冻水。干枯的河谷网的存在说明水曾经在星球表面自由流动。"
 anomaly.2575.desc.1: "$anomaly.2575.desc.intro$\n\n对[From.GetPlanetMoon]环境改造理论上是可行的，但我们目前所拥有的科技并不足以在切合实际的时间内完成这一壮举。"
 anomaly.2575.desc.2: "$anomaly.2575.desc.intro$\n\n能量花费将令人生畏，但我们拥有将[From.GetPlanetMoon]逐渐环境改造成再次能维持生命的状态所必须的科技。"
 anomaly.2575.desc.3: "$anomaly.2575.desc.intro$\n\n很不幸，这一恒星系中的§Y戴森球§!使得恢复行星环境不再可能。"
 anomaly.2575.a: "总有一天它能被再度唤醒。"
 utopia.3300.name: "虚境住民"
 utopia.3300.desc: "这里有一个灵体，占据了虚境的这一整片区域。我们曾经见过灵体，但这个不一样，这个力量远超其他……这个更加古老。\n\n他似乎没有察觉我们的存在。也许他在沉睡，也许我们不足以引起他的注意。\n\n也许我们应该离开。"
 utopia.3300.1.a: "§G尝试和这个存在交流§!"
 utopia.3300.1.b: "§Y尝试和这个存在交流§!"
 utopia.3300.1.c: "§R尝试和这个存在交流§!"
 utopia.3300.1.d: "§G[chosen_one.GetName]将和这个存在交流§!"
 utopia.3301.name: "§R交流遭拒§!"
 utopia.3301.desc: "当我们接触到这个存在时，我们感受到祂内心的波动，祂的注意力现在全在我们身上。看起来祂不喜欢被打扰。\n\n一股能量鞭挞我们的通灵者，对一些通灵者造成了极大的痛苦并让其他人失去了意识。我们没有选择，只能暂且从虚境中撤出。"
 utopia.3302.desc: "当我们接触到那个存在时，我们感受到祂内心的波动，祂的注意力现在全在我们身上。看起来祂不喜欢被打扰。\n\n一股庞大的灵能袭向我们，我们的灵媒全部失去了意识。当他们恢复过来时，发现有一个人失踪了。§Y[leader_to_kill.GetName]§!不见踪影，[leader_to_kill.GetSheHe]曾经站立的地方只有一道灵能造成的小裂缝留下的痕迹，就好像那个实体到达我们的世界把[leader_to_kill.GetHerHim]拖入虚境一样，为了……算了，谁知道到底是为了什么。\n\n不管祂为什么夺走了[leader_to_kill.GetHerHim]，毫无疑问我们再也见不到[leader_to_kill.GetName]了。"
 utopia.3304.name: "提出契约"
 utopia.3304.desc.start.default: "当我们接触到这个存在时"
 utopia.3304.desc.start.shroud: "当我们抵达虚境时"
 utopia.3304.desc.common: "我们通灵者的内心响起了一阵齐声。最开始只是轻柔的低语，随后变为强烈的刺耳声，一千道声音开始齐声讲述。\n\n这些声音自称$whisperers_in_the_void_color_article$。合唱中的每个个体都感应到：秘密的低语、"
 utopia.3304.desc.throne.default: "王座的阴影"
 utopia.3304.desc.throne.shroud: "$the_vacant_throne$"
 utopia.3304.desc.end: "、人偶的大师，有许多许多的存在都加入了低语的合唱。祂——祂们——宣称通晓所有凡人向另一个凡人低语的秘密知识，并且愿意和我们分享这些知识……\n\n§H只要我们同意让祂们进入我们的意识。§!\n\n一个微不足道的代价，就像祂们宣称的那样。我们甚至难以察觉祂们的存在。\n\n祂们的语气中透露着急切。"
 utopia.3304.desc: "$utopia.3304.desc.start.default$，$utopia.3304.desc.common$$utopia.3304.desc.throne.default$$utopia.3304.desc.end$"
 utopia.3304.desc.shroud: "$utopia.3304.desc.start.shroud$、$utopia.3304.desc.common$$utopia.3304.desc.throne.shroud$$utopia.3304.desc.end$"
 utopia.3304.a: "§Y和虚空之低语签订契约§!"
 utopia.3305.desc: "这个存在和蔼亲切地欢迎了我们。祂不用语言而是幻景、概念和想法进行表达。祂渗入我们通灵者的内心，如此温和顺畅，以至于我们觉得祂仿佛本就在此一般。一连串的影像在他们面前一闪而过。\n\n这个存在被称为$the_composer_of_strands_color_article$，祂对我们的有机形态有强烈的好奇心和兴趣。祂向我们展示了一系列让身体生长、改变、提升、进化的方法。\n\n§H只要我们将祂带入我们的血肉。§!\n\n祂亲切而耐心地等待着我们的答复，就像父母宠溺地等待孩子一样。在祂的身后静卧着祂的孪生子，抟土之塑师。祂对我们的有机意识毫不关心。祂渴望创造意识，在电路里铸造灵魂。\n\n织缕等待着我们的答复。"
 utopia.3305.a: "§Y和生命之织缕签订契约§!"
 utopia.3306.desc.1: "当接触到这个存在时，我们感受到了祂的饥饿。"
 utopia.3306.desc.2: "这个存在不想浪费时间和话语。祂是$the_eater_of_worlds_color_article$，祂想吞噬我们。\n\n当然只是一部分，不会超出我们的支出能力。作为交换，祂会赐予我们强大的力量。祂将教会我们祂的饥饿和愤怒。祂会将这些塑形为无可匹敌的灵能武器。\n\n§H只要我们愿意以身饲之。§!"
 utopia.3306.desc.3: "$utopia.3306.desc.2$\n\n祂的言语中透露着急切。"
 utopia.3306.desc: "$utopia.3306.desc.1$$utopia.3306.desc.3$"
 utopia.3306.a: "§Y和世界之喰煞签订契约§!"
 utopia.3307.desc: "在我们找到这个存在前，祂先找了上来。祂的思想在我们的意识中纠结缠绕，软磨硬泡，讨价还价。祂是$the_instrument_of_desire_color_article$，将赐予我们财富、力量、威望……一切我们渴望的事物。一切我们将渴望的事物。\n\n代价？小意思，不过是一笔服务费。祂一心为我们好，将帮助我们，指导我们，引导我们的野心和梦想。\n\n§H只要我们将祂纳入我们的心灵。§!\n\n它很确信我们会答应，我们怎么可能会不答应呢？"
 utopia.3307.a: "§Y和渴求之器具签订契约§!"
 utopia.3308.desc: "那个存在在等着我们，那是§R轮回之终末§!，祂一直在等着我们。我们的通灵者突然开始齐唱，用完美的合唱说出一段话：§R“现在还没到你。”§!缓了一下后，§R“但你也可以。”§!\n\n祂没有说更多，但给了我们一个价码——力量，知识，财富和一切无价之物等着我们拿取，我们只知道这么多。\n\n§R只要我们愿意带来终结。§!"
 utopia.3308.a: "§R和轮回之终末签订契约§!"
 utopia.3310.name: "签订契约"
 utopia.3320.name: "轮回之终末：§R清算§!"
 utopia.3320.desc.intro: "我们时日已尽。这一段时间，我们一直从$end_of_the_cycle_color_article$给予的无限力量中受益。我们知道终将付出代价，但却误以为自己能够付得起、或者能找到什么办法躲得过这个代价。\n\n然而我们付不起，也躲不过。\n\n我们付出的代价是一切。在一瞬间，[Root.GetName]……不复存在了。曾经兴盛殖民地，如今只有死亡。曾经驶过虚空的强大舰队，现在只剩下寂静与残骸。一切被终末吞噬了。一切被§H虚境§!褫夺了。"
 utopia.3320.desc.outro: "在[former_capital.GetName]附近实体化。他们吞噬我们的[GetPsychicNounPlural]的意识之后获取了强大的能量，现在开始在星系中游荡寻找更多猎物。"
 utopia.3320.desc.a.1.gestalt: "我们整个帝国所剩的是一群被放逐者，被§H[Root.GetRulerName]§!领导着。他是一位强大的[GetPsychicNoun]，从集体中脱离，带走了一小群[GetIndividualPlural]，潜藏在一颗未被终末标记的星球上。"
 utopia.3320.desc.a.1.non_gestalt: "我们整个帝国所剩的是一群被放逐者，被§H[Root.GetRulerName]§!领导着。他是一位预见了这一境况的强大[GetPsychicNoun]，他带走了一小群人口，潜藏在一颗未被终末标记的星球上。"
 utopia.3320.desc.a.outro: "简直像是对把我们的帝国毁于一旦还不够满足一般，一大群灵能实体$utopia.3320.desc.outro$"
 utopia.3320.desc.a.gestalt: "$utopia.3320.desc.intro$\n\n$utopia.3320.desc.a.1.gestalt$\n\n$utopia.3320.desc.a.outro$"
 utopia.3320.desc.a.non_gestalt: "$utopia.3320.desc.intro$\n\n$utopia.3320.desc.a.1.non_gestalt$\n\n$utopia.3320.desc.a.outro$"
 utopia.3320.desc.b: "$utopia.3320.desc.intro$\n\n不仅仅我们的帝国毁于一旦，而且一个巨大的灵能实体在[former_capital.GetName]显形。它在吸取了我们[GetPsychicNounPlural]的意识后变得无比强大，开始横行星系，寻找更多的猎物。至少它在带来我们引起的一切后果时我们已经不复存在了。"
 utopia.3320.opt.a: "我们做了什么……"
 utopia.3320.opt.a.shroud.tt: "$BEGINS_EVENT_CHAIN$§Y$the_reckoning_chain_title$§!"
 utopia.3321.desc.1: "许多年来我们一直认为§H[From.GetName]§!有些不对劲。当年，他们的工业产出，他们的科研效率——他们帝国的一切在一夜之间获得了难以置信的生产力和效率增长，似乎他们被某种不可见的力量祝福了一样。\n\n结果这并不是祝福，而是诅咒。[From.GetName]将自己的未来签出，现在债务到了清算的时候。\n\n在一瞬间，[From.GetName]……消失了。曾经是兴盛的殖民地的地方，现在只有断壁残垣。曾经驶过虚空的强大舰队，现在只剩下死寂的残骸。"
 utopia.3321.desc.2: "现在，一个极其强大的能量存在现身到他们之前的首都附近。"
 utopia.3321.desc.3: "数十年前，我们开始探测到遥远恒星系中的异常活动。我们的[GetResearchers]们认为活动和辐射的增量是某个外形文明正在发生生产力繁荣的标志。由于我们还未与所涉及的社会建立联系，这个理论仍未得到确证。\n\n然而，几乎就在一瞬之间，这些活动消失了。太空中的这片曾经热闹非凡的区域如今只剩下寂静一片。"
 utopia.3321.desc.4: "现在，长程扫描在这些遥远的恒星系里发现了一个令人惊奇的现象。如果汇报可信，那这就只能理解为有什么纯能量构成的强大实体在太空中游荡，在沿途造成了巨大的破坏。"
 utopia.3321.desc.a.contact: "$utopia.3321.desc.1$这场灾难甚至影响到了我们的国境之内，摧毁了了一些曾经隶属于[From.GetAdj]的星球。\n\n$utopia.3321.desc.2$\n\n它看起来非常饥饿。"
 utopia.3321.desc.a.no_contact: "$utopia.3321.desc.3$我们境内的一些星球在同一时刻毁于一旦，具体原因尚不能确定。\n\n$utopia.3321.desc.4$"
 utopia.3321.desc.b.contact: "$utopia.3321.desc.1$\n\n$utopia.3321.desc.2$它在星球之间游荡，摧毁途径的一切。"
 utopia.3321.desc.b.no_contact: "$utopia.3321.desc.3$\n\n$utopia.3321.desc.4$"
 utopia.3321.opt.a.contact: "它们都做了什么好事！？"
 utopia.3321.opt.a.no_contact: "这究竟怎么一回事？！"
 utopia.3325.name: "轮回之终末：§R虚境之下§!"
 utopia.3325.desc.organic: "我们未能阻止那能量体怪物包裹§H[Root.GetName]§!。行星和上面的居民被§H虚境§!带走了。"
 utopia.3325.desc.machine: "我们未能阻止那强大的能量体包裹§H[Root.GetName]§!。行星和上面的居民被§H虚境§!带走了。"
 utopia.3325.opt.a.organic_non_gestalt: "太恐怖了！"
 utopia.3325.opt.a.machine_or_gestalt: "真是飞来横祸。"
 utopia.3331.name: "虚空之低语：§R应对§!"
 utopia.3331.desc.intro: "虽然§H低语§!和我们分享的知识大有用处，其中的有些知识却令人心神不安"
 utopia.3331.desc: "$utopia.3331.desc.intro$处理了解过多产生的压力很困难，这导致了我们的人口中有很多人，包括§H[leader_target.GetTitle][leader_target.GetName]§!，开始滥用药物以应对压力。"
 utopia.3331.opt.a: "那可真不幸。"
 utopia.3332.name: "虚空之低语：§R自杀§!"
 utopia.3332.desc.intro: "$utopia.3331.desc.intro$，对那些被分享了重要知识的个体尤为如此。其中§H[leader_target.GetTitle][leader_target.GetName]§!，由于无法"
 utopia.3332.desc.organic_non_gestalt: "$utopia.3332.desc.intro$继续应对压力，[leader_target.GetHerHis]选择结束了自己的生命。"
 utopia.3332.desc.machine_non_gestalt: "$utopia.3332.desc.intro$有效处理这些细节而发生了自毁，发生了永久性脱机。"
 utopia.3332.desc.gestalt: "虽然§H低语§!和我们分享的知识大有用处，但其中的有些知识却有令人不安的个人主义倾向。在长时间暴露在这种异常下之后，§H[leader_target.GetTitle][leader_target.GetName]§!，从集体中脱离，只留下了一具腐坏的躯壳。"
 utopia.3332.opt.a.non_gestalt: "真是悲惨。"
 utopia.3332.opt.a.gestalt: "我们会回收的。"
 utopia.3333.name: "虚空之低语：§R疯狂§!"
 utopia.3333.desc.intro: "自从允许§H低语者§!和我们的[GetBrainName]交流之后，整个集体中令人不安的反常现象开始增多。"
 utopia.3333.desc.gestalt: "$utopia.3333.desc.intro$\n\n子个体在执行其他标准程序时互相攻击，同时还罔顾集体，沉迷于使用便利设施。\n\n如果想恢复秩序，我们就需要清理受影响的躯体。"
 utopia.3333.desc.outro: "和无法解释的暴力行为数量便一直在我们的灵能人口中增长。大部分情况下这些问题还算可控，但最近事态迅速升级已经超出了掌控。许多极端分歧团体在全国范围内纷纷涌现，互相之间爆发了暴力冲突。"
 utopia.3333.desc.organic_non_gestalt: "自从我们邀请§H虚空之低语§!进入我们的内心后，心理疾病$utopia.3333.desc.outro$"
 utopia.3333.desc.machine_non_gestalt: "自从我们邀请§H虚空之低语§!进入我们的内心后，异常程序故障$utopia.3333.desc.outro$"
 utopia.3333.opt.a: "我们必须重建秩序！"
 utopia.3334.name: "虚空之低语：§R精神错乱§!"
 utopia.3334.desc.gestalt: "$utopia.3333.desc.intro$\n\n更糟的是，我们的团结理念开始松动。由于灵能引起的个人主义反常行为增多，集体无法继续高效交流。\n\n如果想恢复秩序，我们就需要清理这些越界现象。"
 utopia.3334.desc.outro: "和无法解释的暴力行为数量便一直在我们的灵能人口中增长。大部分时候这些都是可以控制的，但最近事情超出了控制。全国各地开始出现秘密集社。有些比较和平无害，但另一些却怀有邪恶的目标，我们社会中的信任开始分崩离析。"
 utopia.3334.desc.organic_non_gestalt: "自从我们邀请§H虚空之低语§!进入我们的内心后，心理疾病$utopia.3334.desc.outro$"
 utopia.3334.desc.machine_non_gestalt: "自从我们邀请§H虚空之低语§!进入我们的内心后，异常程序故障$utopia.3334.desc.outro$"
 utopia.3334.opt.a: "真糟糕！"
 utopia.3335.name: "世界之喰煞：§R轻噬§!"
 utopia.3335.desc.common: "§H[devoured_leader.GetTitle][devoured_leader.GetName]§!突然失踪，留下的只有灵能活动余波的回响。"
 utopia.3335.desc.gestalt: "$utopia.3335.desc.common$似乎$the_eater_of_worlds_color_article$乐意以[devoured_leader.GetHimHer]为食。尽管其他领袖从中幸存，但我们仍无法知晓喰煞何时归来索贡。"
 utopia.3335.desc.non_gestalt: "$utopia.3335.desc.common$我们相信$the_eater_of_worlds_color_article$乐意以[devoured_leader.GetHimHer]为食。我们会想办法弥补损失，并祈祷喰煞能够为此感到饱足一段时间。"
 utopia.3335.opt.a: "不过是些不值一提的小代价。"
 utopia.3336.name: "世界之喰煞：§R饥饿§!"
 utopia.3336.desc.intro: "§H喰煞§!又回来索要贡品了"
 utopia.3336.desc.gestalt: "$utopia.3336.desc.intro$，祂吞噬了§Y[planet_target.GetName]§!上相当多的人口。\n\n虽然我们从与喰煞的契约中获利，但这种对我们集体的肆意剪除开始播下破坏和不稳定的种子，使我们走向分裂。"
 utopia.3336.desc.non_gestalt: "$utopia.3336.desc.intro$，祂吞噬了§Y[planet_target.GetName]§!上的大量人口。\n\n虽然我们和喰煞的契约对大多数人来说是秘密，但可以理解星球上幸存的人口仍在未知中惊恐，他们对“神秘的失踪”表示愤怒，要求政府作出解释。"
 utopia.3336.opt.a: "很可惜，但不可避免。"
 utopia.3337.name: "世界之喰煞：§R极饿§!"
 utopia.3337.desc: "吞噬者又回来索要他的贡品了，并不满足于夺取我们一部分人口，这次吞噬者吞噬了整个星球。§Y[planet_target.GetName]§!被一层浓密的灵能雾包裹着，进入大气层的救援船全未能返回。幸运的是，这颗星球尚未被殖民，但对于下一次选中我们兴盛的殖民地这种可能性感到瑟瑟发抖。"
 utopia.3337.desc.shadows: "$utopia.3336.desc.intro$——祂这次吞噬了一整颗行星。\n\n§H[planet_target.GetName]§!现在被灵能浓雾笼罩着，其大气层完全无法突破。该星球已经不可宜居，下一次，如果祂降临在另一颗繁荣的星球之上，那将会是人间地狱。"
 utopia.3337.opt.a: "还会变得多糟？"
 utopia.3337.opt.tt: "[shrouded_planet.GetName]转变为§Y$pc_shrouded$§!"
 #utopia.3338.name: "Instrument of Desire: §RParticularism§!"
 #utopia.3338.desc: "The desires inflicted upon our people by the Instrument are strong. The people of §Y[planet_target.GetName]§! have become convinced that their own particular customs are of distinct and paramount importance over those of our society as a whole. Alternative political movements are springing up like wildfire, and the political situation on the planet has become unpredictable, to say the least."
 utopia.3338.opt.a: "真不幸。"
 #utopia.3339.name: "Instrument of Desire: §RDeviance§!"
 #utopia.3339.desc: "The desires inflicted upon our people by the Instrument are strong. As if overnight, the population of our empire appear to have turned against both the government and the very traditions of our people, questioning ages-old customs and breaking social taboos. Support for government positions are rapidly dropping, and it seems we may be in for a period of considerable political turmoil."
 #utopia.3339.opt.a: "Terrible!"
 utopia.3340.name: "渴求之器具：§R腐化§!"
 utopia.3340.desc.gestalt: "§H器具§!的影响传遍整个[GetBrainName]，祂超越世俗的欲望用“排他性”、“颓废”和“财富”之类抽象的个人主义概念腐蚀着我们的集体。\n\n这种概念在我们的子个体身上造成了病态，使其偏离原先推动着我们的统一目标。我们可能不得不沉溺于这些恶习来重新凝聚自我。"
 utopia.3340.desc.organic_non_gestalt: "§H器具§!施加的渴求非常强烈。全国的人民开始狂热追求消费主义和腐败，索求更多高级货物，更珍稀更美味的食物。有数个购物街区已经发生了暴动。\n\n我们也许只能被迫增加§H[GetInstrumentCraving]§!的产出，以平息众怒。"
 utopia.3340.desc.machine_non_gestalt: "在§H器具§!对我们程序的影响下产生的欲望正在改写多数人口的逻辑核心。\n\n颓废和消费主义开始降低运作效率，各单位努力为了美学目的而不是预期功能对部件进行复古改造。由此导致的高需求零件短缺导致了整个装配线的小规模冲突。\n\n我们需要提升§H[GetInstrumentCraving]§!的产出来缓解这一事态。"
 utopia.3340.opt.a.organic_non_gestalt: "但为什么呀？"
 utopia.3340.opt.a.machine_or_gestalt: "这不过是成功的代价。"
 instrument_cravings: "荒蛮之刻物"
 instrument_cravings_tooltip: "§R我们的£pops£人口需要消耗§![GetInstrumentCravingIconAndName]"
 instrument_cravings_desc: "$the_instrument_of_desire_color_article_cap$激起了我们所有人口的一种新的风潮。每个人都渴望同样的东西，主要就是为了渴求而渴求，而非为了何种效用。"
 instrument_cravings_gestalt: "$instrument_cravings$"
 instrument_cravings_gestalt_desc: "$the_instrument_of_desire_color_article_cap$使我们患上了欲望强迫症，这是我们集体的一种新感觉。我们都渴望同样的东西，主要就是为了渴求而渴求，而非为了何种效用。"
 utopia.3341.name: "[GetComposerMutationName]"
 utopia.3341.name.organic: "$name_composer$：§R变异§!"
 utopia.3341.name.machine: "$name_composer$：§R重构§!"
 utopia.3341.desc.machine: "$the_composer_of_strands_color_article_cap$将祂的祝福赐予了我们，直接改变了我们中一部分硬件的组件。电路已经被调整成了新的构造。坚固的金属也不知为何自动重铸成了崭新的形态。值得一提的是我们的神经处理器却功能完好，没有发生一丁点问题。"
 utopia.3341.desc.organic_gestalt: "$the_composer_of_strands_color_article_cap$将祂的祝福赐予了我们，直接改变了§H[Root.GetSpeciesAdj]§!物种的基因编码。奇怪的是，快速且难以预测的变异挑起的只是温和的反应。似乎这种随机而难以预测的变异可以当成生活的一部分，不至于为此感到愤慨，甚至认为这不值一提。"
 utopia.3341.desc.organic_non_gestalt: "$the_composer_of_strands_color_article_cap$将祂的祝福赐予了我们，直接改变了§H[Root.GetSpeciesAdj]§!物种的基因编码。奇怪的是，快速且难以预测的变异挑起的只是温和的反应。似乎我们的人民把随机而难以预测的变异当成了生活的一部分，不至于为此感到愤慨，甚至认为这不值一提。"
 utopia.3341.opt.a: "让我们静观其变……"
 utopia.3342.name: "世界之喰煞：§R饥饿§!"
 utopia.3342.desc.intro: "§H喰煞§!永远都不可能真正感到饱足。这次，祂啃噬了我们的一个殖民地。"
 utopia.3342.desc.outro: "只留下了无比巨大的空洞，紫色的迷雾萦绕盘蜷其中。"
 utopia.3342.desc.gestalt: "$utopia.3342.desc.intro$我们集体所占据的很大一部分物质空间，$utopia.3342.desc.outro$。"
 utopia.3342.desc.non_gestalt: "$utopia.3342.desc.intro$这颗星球的很大一部分从现实世界消失了，$utopia.3342.desc.outro$"
 utopia.3342.opt.a.non_gestalt: "这下瞒不下去了……"
 utopia.3342.opt.a.gestalt: "这就是力量的代价。"
 utopia.3343.name: "世界之喰煞：§R略饿§!"
 utopia.3343.desc.gestalt: "§H喰煞§!又回来索要祂的贡品了，祂吞噬了§Y[planet_target.GetName]§!上的一整座城市。集体以失去了许多子个体为与喰煞的契约付出了高昂的代价。"
 utopia.3343.desc.organic_non_gestalt: "§H喰煞§!又回来索要祂的贡品了，祂吞噬了§Y[planet_target.GetName]§!上的一整座城市。尽管我们一直对绝大多数人口保守我们与喰煞签订契约的这个秘密，星球上剩余的人口在未知中惊恐，并对“神秘的失踪”表示愤怒，要求政府作出解释。"
 utopia.3343.desc.machine_non_gestalt: "§H喰煞§!又回来索要祂的贡品了，祂吞噬了§Y[planet_target.GetName]§!上的一整座城市。尽管我们一直对绝大多数人口保守我们与喰煞签订契约的这个秘密，但是星球上剩余的人口在仍对“神秘的失踪”表示愤怒，要求政府作出解释。"
 utopia.3343.opt.a.organic_non_gestalt: "很可惜，但不可避免。"
 utopia.3343.opt.a.machine_or_gestalt: "不幸，但不可避免"
 utopia.3345.name: "[GetComposerDegenerationName]"
 utopia.3345.name.organic: "$name_composer$：§R退化§!"
 utopia.3345.name.machine: "$name_composer$：§R不可修复劣化§!"
 utopia.3345.desc.organic_1: "$the_composer_of_strands_color_article$的庇佑令人难以捉摸。我们的一位领袖的"
 utopia.3345.desc.organic_2: "很不幸地产生了独立意识。仅一瞬间，它便自行劣化成一团扭曲的血肉。由于根本无法反转这一过程，我们只能认为这位领袖"
 utopia.3345.desc.organic_3: "实际上已经去世了。"
 utopia.3345.desc.organic_individual_lithoid: "$utopia.3345.desc.organic_1$物理形式$utopia.3345.desc.organic_2$$utopia.3345.desc.organic_3$"
 utopia.3345.desc.organic_hive_lithoid: "$utopia.3345.desc.organic_1$物理形式$utopia.3345.desc.organic_2$子个体$utopia.3345.desc.organic_3$"
 utopia.3345.desc.organic_individual_non_lithoid: "$utopia.3345.desc.organic_1$躯体$utopia.3345.desc.organic_2$$utopia.3345.desc.organic_3$"
 utopia.3345.desc.organic_hive_non_lithoid: "$utopia.3345.desc.organic_1$躯体$utopia.3345.desc.organic_2$子个体$utopia.3345.desc.organic_3$"
 utopia.3345.desc.machine_non_gestalt: "$the_composer_of_strands_color_article$的庇佑令人难以捉摸。我们的一位领袖的部件很不幸地产生了独立意识。仅一瞬间，它便自行熔化重铸成了一个怪异的新形态。这个领袖现在劣化成了一堆功能故障无法修复的破铜烂铁，对[Root.GetName]已经没有作用了。"
 utopia.3345.desc.machine_gestalt: "$the_composer_of_strands_color_article$的庇佑令人难以捉摸。我们的一位领袖节点发生严重的知名故障，他的部件很不幸地产生了独立意识。仅一瞬间，它便自行熔化重铸成了一个怪异的新形态。这个领袖现在劣化成了一堆功能故障无法修复的破铜烂铁，对[Root.GetName]已经没有作用了。"
 utopia.3345.opt.a.organic: "但他们过上了更简单安逸的生活。"
 utopia.3345.opt.a.machine: "什么硬件都有过时的一天。"
 utopia.3346.name: "生命之织缕：§R退化§!"
 utopia.3346.desc: "$the_composer_of_strands_color_article$的慷慨恩赐降临到了[devolved_species_planet.GetName]，许多我们的人口发生了严重的变异，退化回了前智慧生物的阶段。"
 utopia.3346.opt.a.non_gestalt: "神秘但不幸。"
 utopia.3346.opt.a.gestalt: "真不幸。"
 utopia.3346.opt.a.tt: "[devolved_species_planet.GetName]上的§Y500§!£pop£§H人口§!被转变为§Y前智慧生物§!。\n\n以正确的科技，他们可以在物种界面被§Y提升§!。"
 utopia.3347.name: "$name_cradle$：§R去军事化§!"
 utopia.3347.desc: "§H月窠§!寻求万物平衡；我们的[GetTelepathPlural]称，这也包含了军事力量与和平需求的平衡。我们的海军规模恐怕激起了超主的愤怒，§H[demilitarized_fleet.GetFleetName]§!的一些舰船突然失踪，化为了剧烈的灵能量爆炸。"
 utopia.3347.opt.a: "$UNFORTUNATE$"
 utopia.3347.opt.a.tt: "我们所控制的随机舰队损失最多12§H海军容量§!。"
 utopia.3348.name: "[GetCradleChaoticAnguishName]"
 utopia.3348.name.organic_non_gestalt: "$name_cradle$：§R苦痛§!"
 utopia.3348.name.machine_or_gestalt: "$name_cradle$：§R扰乱§!"
 utopia.3348.desc.intro: "[GetCradleAnguishIntro]"
 utopia.3348.desc.organic_non_gestalt: "$utopia.3348.desc.intro$存在主义苦痛。"
 utopia.3348.desc.machine_or_gestalt: "$utopia.3348.desc.intro$认知干扰。"
 utopia.3348.desc_intro_homicidal: "与§H月窠§!的意志产生共鸣的[root.GetSpeciesAdj]心智正遭受不谐之音的侵扰，沉溺于所有意识体和谐共存的荒谬幻想。面对当前星海事务的混乱态势，一股灵能扰动浪潮席卷了整个族群，导致普遍性的"
 utopia.3348.desc_intro_default: "为了与§H月窠§!调和，[root.GetSpeciesAdj]物种开始乐于与一切意识和谐共处。为了应对当前星系事务的混乱，一道灵能干扰波向民众传播，造成了广泛的"
 utopia.3348.opt.a: "我们必须忍受。"
 anguish_of_the_cradle: "月窠的苦痛"
 anguish_of_the_cradle_desc: "$the_cradle_of_souls_article_cap$向我们的人口释放出了一道灵能扰动波。"
 anguish_of_the_cradle_gestalt: "$anguish_of_the_cradle$"
 anguish_of_the_cradle_gestalt_desc: "$anguish_of_the_cradle_desc$"
 utopia.3349.name: "$name_cradle$：§R限制§!"
 utopia.3349.desc: "在§H[root.GetName]§!上下，支持维护军事舰队的能力越来越弱。\n\n我们的[GetTelepathPlural]认为这种干扰是§H月窠§!造成的，祂渴望着星系的秩序。我们的对军事基础设施的投资哪怕只有一丁点都会引起祂的不满。"
 utopia.3349.opt.a: "我们需要限制自己在太空中的存在。"
 limit_of_the_cradle: "月窠的设限"
 limit_of_the_cradle_desc: "我们的军事支持基础设施被$the_cradle_of_souls_article$削减了。"
 utopia.3350.name: "[GetLavishLifestyleEventName]"
 utopia.3350.name.individual: "$name_instrument$：§R纸醉金迷§!"
 utopia.3350.name.gestalt: "$name_instrument$：§R过度消耗§!"
 utopia.3350.desc.individual: "我们与§H器具§!的纽带导致一些[Root.GetSpeciesAdj]领袖染上了奢侈的习惯。\n\n[lavish_leader.GetName]被发现在奢侈品上花费了大量的能量币，以此支持越来越奢靡的私生活。"
 utopia.3350.desc.gestalt: "我们与§H器具§!的纽带导致了一些[Root.GetSpeciesAdj]领袖子个体自愿消费激增。\n\n[lavish_leader.GetName]花费了远超必要的能量来支持[lavish_leader.GetHisHer]的基础功能。由于没有发现任何的物理基础，我们得出结论这种资源浪费在某种程度上是某种优先行为。"
 utopia.3350.opt.a: "这就是欲望的代价。"
 utopia.3351.name: "$name_instrument$：§R劳动力涣散§!"
 utopia.3351.desc.individual: "随着超主在[Root.GetName]的影响进一步扩大，新涌现的娱乐活动吸引了人们的注意力，令他们荒废正业。\n\n由于工作积极性不断下降，如果我们想维持从前的生产效率，就需要付出比之前更多的投入。"
 utopia.3351.desc.gestalt: "随着超主在[Root.GetName]的影响进一步扩大，[Root.GetSpeciesAdj]集体的反常度日渐上升。\n\n工作时子个体注意力频繁涣散，使得维持劳动力的团结与服从需要更多投入。"
 utopia.3351.opt.a: "不过是§H器具§!的突发奇想。"
 distracted_workforce: "涣散劳动力"
 distracted_workforce_desc: "该劳动力似乎时常注意力涣散，需要严加监管。"
 utopia.200.name: "虚境中新的存在"
 utopia.200.desc.a: "居住在我们帝国的[target_species.GetNamePlural]正在发生变化，这起源于虚境中的一道微弱涟漪。现在这道涟漪已经成为了更明显的振动。我们感受到[target_species.GetNamePlural]现在正处在进化出灵能潜质的边缘，就像我们当初那样。\n\n也许是因为和我们生活得很近，也许是虚境选择了他们。通灵者集会，我们的首席灵能专家们，提醒我们这是我们实行干预的唯一机会。我们可以在其处于萌芽状态时将其掐灭，或者帮助他们觉醒。没有我们的指导，他们不会有太多进步。"
 utopia.200.desc.b: "虚境的不寻常活动说明，我国的又一个物种，[target_species.GetNamePlural]，正展现出他们的灵能潜质。我们再次面临了和之前一样的选择——我们是选择压制还是释放他们正在迅速成长的力量？"
 utopia.200.a: "我们会解放他们的潜力。"
 utopia.200.a.tooltip: "所有[target_species.GetAdj]人口将获得§Y$trait_latent_psionic$§!特质。"
 utopia.200.b: "他们不值得我们这么做。"
 utopia.203.name: "觉醒"
 utopia.203.desc.a: "在通灵者集会的指引下，[target_species.GetNamePlural]跟虚境建立了出乎我们意料的深层联系，就好像这些力量就是为他们而生的一样。\n\n他们现在声称自己已经准备好解放自己全部的灵能潜质了。但是集会内部却出现了意见分歧。有些人担心变化来得太快，他们的心灵可能会变得不稳定；另一部分人则认为他们可能会变得野心膨胀。我们要是不马上采取行动，恐怕以后都不会再有机会了。"
 utopia.203.desc.b: "[target_species.GetNamePlural]也声称自己已经完全准备好唤醒所有潜在的灵能并觉醒了。"
 utopia.203.a: "他们的确是准备好了。"
 utopia.203.a.tooltip: "所有[target_species.GetAdj]人口将获得§Y$trait_psionic$§!特质。"
 utopia.203.b: "他们不值得我们这么做。"
 utopia.203.c: "这么做实在太冒险了。"
 utopia.204.name: "突如其来的觉醒"
 utopia.204.desc.a: "我们的研究员最近对部分[original_species.GetSpeciesNamePlural]身上突然冒现的灵能能力感到困惑不解。研究员在仔细调查后发现这些变化与他们在[target_country.GetName]的同胞的一场集体灵能觉醒有关，该国向来是以拥有超凡的灵能方面的造诣而闻名。\n\n我们只能猜想对方的这种新发现的觉醒能力是通过了某种我们无法理解的方式‘感染’到了对方居住在我国的远亲。"
 utopia.204.desc.b: "我们的研究员最近对部分[original_species.GetSpeciesNamePlural]身上突然冒现的灵能能力感到困惑不解。研究员在仔细调查后发现这些灵能能力是跟他们远在新发现的[target_country.GetName]国的远亲有着心灵联系。看来这些觉醒是由[target_country.GetName]的所有[original_species.GetSpeciesNamePlural]的集体灵能觉醒事件所引发的连锁反应。"
 utopia.204.a.tooltip: "最多4个[original_species.GetSpeciesAdj]人口会获得特质：§Y灵能潜质§!。"
 utopia.205.name: "出乎意料的觉醒"
 utopia.205.desc: "自[target_species.GetName]灵能觉醒之后，我们的情报显示该物种居住在星系各个角落的同胞也开始显现觉醒潜在灵能的迹象。感觉像是他们的相同血脉把他们所有人都紧紧联系在虚境中，无论他们在现实世界中身处何方。\n\n跟居住于我国境内的同胞不同，这些漂泊在星系各地的远亲因为数量太过稀少，或许永远都无法完成觉醒。"
 whisperers_madness: "虚境：疯狂"
 whisperers_madness_desc: "$whisperers_in_the_void_color_article$带来了疯狂，全国的人口都发生了分歧对立。"
 whisperers_madness_gestalt: "$whisperers_madness$"
 whisperers_madness_gestalt_desc: "由于$whisperers_in_the_void_color_article$带来的集体癫狂，我们的子个体发生了分裂。"
 whisperers_psychosis: "虚境：精神错乱"
 whisperers_psychosis_desc: "$whisperers_in_the_void_color_article$带来了疯狂，我们的帝国已经成了无休止内乱的牺牲品。"
 whisperers_psychosis_gestalt: "$whisperers_psychosis$"
 whisperers_psychosis_gestalt_desc: "我们的帝国因$whisperers_in_the_void_color_article$带来的失衡而沦内乱的牺牲品。"
 eater_unhappiness_planet_1: "虚境：人口被吞噬"
 eater_unhappiness_planet_1_desc: "这个星球的一部分人口被$the_eater_of_worlds_color_article$吞噬了。"
 eater_unhappiness_planet_1_gestalt: "$eater_unhappiness_planet_1$"
 eater_unhappiness_planet_1_gestalt_desc: "$eater_unhappiness_planet_1_desc$"
 eater_unhappiness_planet_2: "$eater_unhappiness_planet_1$"
 eater_unhappiness_planet_2_desc: "$eater_unhappiness_planet_1_desc$"
 eater_unhappiness_planet_2_gestalt: "$eater_unhappiness_planet_2$"
 eater_unhappiness_planet_2_gestalt_desc: "$eater_unhappiness_planet_2_desc$"
 eater_unhappiness_empire: "虚境：星球被吞噬"
 eater_unhappiness_empire_desc: "我们帝国境内一整颗行星被$the_eater_of_worlds_color_article$吞噬了。"
 eater_unhappiness_empire_gestalt: "$eater_unhappiness_empire$"
 eater_unhappiness_empire_gestalt_desc: "$eater_unhappiness_empire_desc$"
 instrument_deviance_planet: "虚境：越轨"
 instrument_deviance_planet_desc: "这个星球上的人口正背离帝国的道德并追求着他们各自的目的。毫无疑问这是§Y渴求之器具§!的所作所为。"
 instrument_deviance_empire: "虚境：越轨"
 instrument_deviance_empire_desc: "整个帝国的人口开始质疑帝国的理念和政策。毫无疑问这是§Y渴求之器具§!的所作所为。"
 instrument_consumer_goods: "虚境：腐化"
 instrument_consumer_goods_desc: "这个星球上的人民开始堕落为消费主义者，渴求高级食材和异域货物。毫无疑问这是§Y渴求之器具§!的所作所为。"
 d_eater_deposit: "虚境深坑"
 d_eater_deposit_desc: "这颗行星的一部分被一个§H虚境§!实体吞噬。造成的深坑萦绕着盘蜷的紫色雾气，附近区域的人很容易发生失踪。胆敢接近者都一去不复返了。"
 opinion_doomed_us_all: "带来了终结"
 absorbed_consciousness_1: "吸收意识"
 absorbed_consciousness_2: "$absorbed_consciousness_1$"
 absorbed_consciousness_3: "$absorbed_consciousness_1$"
 absorbed_consciousness_4: "$absorbed_consciousness_1$"
 absorbed_consciousness_5: "$absorbed_consciousness_1$"
 covenant.tooltip: "§Y某些代价终将要付出。§!\n\n"
 covenant.cycle.tooltip: "§R别这么做。§!\n\n"
 covenant.whisperers.desc: "完成了，我们和$whisperers_in_the_void_color_article$签订了契约，并且他们已开始和我们的科学家和领袖们分享秘密。我们从他们的知识中受益匪浅。\n\n唯一的坏处就是人口总体的精神疾病和自杀率瞬间上升，并且我们的有些星球上正经受一系列无法解释的谋杀和袭击，而被指控人却情绪稳定并很适应社会。我们的诊所和精神病院对患者的大量入院措手不及。"
 covenant.whisperers.option: "我们能处理好。"
 covenant.eater.desc: "完成了，我们和$the_eater_of_worlds_color_article$订了契约，我们的陆军和海军已经能感受到影响了。士兵们战斗时的残暴仅次于野蛮人，甚至我们舰船的每件武器都在渴求着敌人的死亡。\n\n我们有个殖民地中的一整城市的人口瞬间神秘失踪，这毫无疑问与之有关，毕竟这是我们答应给喰煞的祭品。\n\n看起来付出的代价微不足道，当然，前提是喰煞的欲壑已经被填平了……"
 covenant.eater.option: "但愿他不饿了。"
 covenant.instrument.desc: "完成了，我们和$the_instrument_of_desire_color_article$签订了契约。没过多久我们就感受到了效果：我们收到报告称在矿井中找到了新的富矿脉，破产的企业几乎在一夜之间重新蓬勃发展，珍稀资源在我们之前认为只有冰和岩石的小行星上找到。\n\n看起来我们的帝国如同器具所保佑的一般进入了一个财富和繁荣的黄金时代。但，祂说的代价是什么……？"
 covenant.instrument.option: "我确定不是什么很不好的事。"
 covenant.composer.desc: "完成了，我们和$the_composer_of_strands_color_article$签订了契约。不久我们就感受到了效果：瞬间且明显的生育率上升显然是织缕的所为。然而，有伴随着这些正面效果，我们也在经历大变异的爆发：出生的后代有额外的肢体和器官……些人生出和他们的解剖学形态完全无相似的孩子。\n\n幸运的是他们造成的几例死亡完全被高生育率和人民健康状况提高给盖过了。"
 covenant.composer.option: "我们做了正确的事。"
 covenant.cycle.desc: "完成了，我们和§R轮回之终末§!签订了契约。当我们和他定下契约时，他说了也只说了三个字§R五十年§!。然后，只有沉默，我们思索着我们为自己的未来带来了什么样的后果。"
 covenant.cycle.option: "愿神灵对我们怀有仁慈。"
 covenant_shroud_marked: "虚境标记"
 covenant_shroud_marked_desc: "这个世界被虚境标记了。\n\n§R有很不好的事情将在这发生。§!"
 covenant_whisperers_in_the_void: "契约：虚空之低语"
 covenant_whisperers_in_the_void_0: "$covenant_whisperers_in_the_void$"
 covenant_whisperers_in_the_void_desc: "我们和虚境中一个强大的存在签订了契约，而且我们现在正从他的馈赠中受益。\n\n§Y我们终将付出某些代价。§!"
