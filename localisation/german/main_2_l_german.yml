 purge_normal: "Ausrottung"
 purge_normal_tooltip: "Betroffene Bewohner werden systematisch ausgelöscht. Dies ist der schnellste Säuberungstyp."
 purge_normal_tooltip_delayed: "§LDie Todesschwadronen sind effizient. Die Liquidierung ganzer Bevölkerungen erfordert natürlich Zeit, aber die Schwadrone erledigen ihren Job.§!"
 purge_displacement: "Deportierung"
 purge_displacement_tooltip: "Betroffene Bewohner werden allmählich aus unserer Nation ausgewiesen, um sich außerhalb unserer Grenzen Zuflucht zu suchen."
 purge_displacement_tooltip_delayed: "§LEs ist ja nicht so, dass wir sie aus ihren Häusern vertreiben würden. Ihre Häuser gehören einfach nicht mehr ihnen selbst.§!"
 purge_neutering: "Kastration"
 purge_neutering_tooltip: "Betroffene Bewohner wachsen nicht mehr weiter und sterben im Laufe der Zeit, erhalten deswegen aber nur einen moderaten Abzug auf ihre §RZufriedenheit§!."
 purge_neutering_tooltip_delayed: "§LMan sollte das als schrittweisen Abbau einer Bevölkerungsgruppe sehen. Unsere Nation ist auf dem Weg in die Zukunft, aber manche werden uns nicht begleiten.§!"
 purge_labor_camps: "Zwangsarbeit"
 purge_labor_camps_tooltip: "Betroffene Bewohner müssen so lange £food£ §HNahrung§! (oder das Äquivalent davon) produzieren, bis sie schließlich an Überarbeitung sterben."
 purge_labor_camps_tooltip_delayed: "§LDurch dieses Opfer sind sie wenigstens nicht völlig nutzlos gewesen.§!"
 purge_processing: "Verarbeitung"
 purge_processing_tooltip: "Betroffene Bewohner werden zu [Root.GetPurgeProcessingResource] verarbeitet, bis sie tot sind."
 purge_processing_tooltip_delayed: "§LEs ist eine traurige, aber unausweichliche Tatsache, dass manche dazu bestimmt sind, die Ambitionen Bessergestellter zu nähren.§!"
 purge_matrix: "Chemische Verarbeitung"
 purge_matrix_tooltip: "Die Physiologien betroffener Bewohner werden auf die Integration mit dem Energienetz vorbereitet, wo chemische Prozesse, die sie am Leben halten, umgeleitet werden, um unsere Energiespeicher zu bereichern. Der Prozess ist tödlich, aber der Tod kommt langsam."
 purge_matrix_tooltip_delayed: "§LSie werden schon bald zu einer effizienteren Form aufsteigen.§!"
 purge_necrophage: "Nekrophagie"
 purge_necrophage_tooltip: "Betroffene Bewohner werden nach und nach in die [From.GetSpeciesNamePlural]-Spezies verwandelt, ob sie es wünschen oder nicht."
 purge_necrophage_tooltip_delayed: "§LNur die Stärksten können in einer feindlichen Galaxie überleben. So setzen sie ihre Reise als [From.GetSpeciesNamePlural] fort.§!"
 slavery_matrix: "Netzverschmelzung"
 slavery_matrix_tooltip: "Eine langfristige Alternative zur chemischen Verarbeitung, bei dem ein Teil der organischen Bevölkerung den Prozess überlebt, um unser Energienetz auf unbestimmte Zeit weiter zu verstärken."
 slavery_matrix_tooltip_delayed: "§LKombiniert mit einer Form der Verschmelzung haben wir mehr Energie gefunden, als wir je brauchen werden.§!"
 migration_control_yes: "Aktive Migrationskontrolle"
 migration_control_yes_tooltip: "§HMigrationskontrollen§! hindern Bewohner dieser Spezies daran, sich frei zwischen unseren Welten zu bewegen."
 migration_control_yes_tooltip_delayed: "§LDie völlige Freizügigkeit von Bewohnern ermöglicht zwar die effiziente Zuteilung von Ressourcen, aber manchmal ist Effizienz eben nicht alles.§!"
 migration_control_no: "Keine Migrationskontrolle"
 migration_control_no_tooltip: "§HKeine Migrationskontrolle§! erlaubt es dieser Spezies sich ungehindert zwischen unseren Kolonien zu bewegen."
 migration_control_no_tooltip_delayed: "§LJedem Wesen muss es freistehen, seine Bestimmung im All zu suchen, so wie auch unsere Vorfahren auf der Suche nach einem Zuhause umherzogen.§!"
 population_control_yes: "Aktive Bevölkerungskontrolle"
 population_control_yes_tooltip: "§HBevölkerungskontrollen§! hindern diese Spezies am Bevölkerungswachstum oder der Bevölkerungsmontage."
 population_control_yes_tooltip_delayed: "§LDurch leichte Anpassungen der täglichen Ernährung werden die demografischen Daten einer Spezies zu unserem Spielzeug.§!"
 population_control_no: "Keine Bevölkerungskontrolle"
 population_control_no_tooltip: "$population_control_yes_tooltip$"
 population_control_no_tooltip_delayed: "§LEine Spezies, die sich nicht von selbst vermehrt, ist bald schon Geschichte.§!"
 colonization_control_yes: "Kolonisation verboten"
 colonization_control_yes_tooltip: "§HKolonisationsrechte§! legen fest, ob diese Spezies an Bord von Kolonieschiffen gehen und neue Welten besiedeln darf."
 colonization_control_yes_tooltip_delayed: "§LIn einem weiten Meer voll kalter Leere ist eine bewohnbare Welt der größte aller Schätze. Nicht alle sind würdig, ihn sich zu holen.§!"
 colonization_control_no: "Kolonisation gestattet"
 colonization_control_no_tooltip: "$colonization_control_yes_tooltip$"
 colonization_control_no_tooltip_delayed: "§LWie könnten wir irgendeiner Spezies ihren Platz unter den Sternen verwehren? Zusammen werden wir die Dunkelheit zurücktreiben.§!"
