 gunship: "Kanonenboot"
 gunship_desc: "Kanonenboote sind für den Kampf gegen andere Schiffe ihrer Größe gedacht und mit möglichst vielen Waffen mittlerer Reichweite bestückt."
 explosive: "Belagerung"
 explosive_desc: "Belagerungsschiffe nutzen Lenkwaffen, um großen Schiffen, Sternenbasen und Planeten massiven Schaden zuzufügen."
 carrier: "Träger"
 carrier_desc: "Träger dienen Trägergeschwadern als Startplattform."
 screen: "Schutz"
 screen_desc: "Schutzschiffe sind mit einer Flak und Punktverteidigung ausgerüstet und schützen den Rest der Flotte vor Raketen, Torpedos und Trägergeschwadern."
 artillery: "Artillerie"
 artillery_desc: "Artillerieschiffe sind mit Langstreckenraketen und Direktfeuerwaffen ausgestattet. Sie dienen dazu, kleinere Schiffe oder solche, die ihnen zu nahe kommen, zu bekämpfen."
 brawler: "Schläger"
 brawler_desc: "Schläger sind für den Nahkampf gebaut und bevorzugen Waffen mit hohem Schaden und kurzer Reichweite wie Autokanonen und Disruptoren."
 energy_torpedoes: "Energie-Torpedo"
 energy_torpedoes_desc: "Energie-Torpedo-Schiffe sind hinsichtlich ihrer Lenkwaffensysteme mit Neutronen- oder Protonentorpedos ausgestattet und richten bei großen Schiffen zusätzlichen Schaden an. Sie sind in der Regel schwach gegen Schiffe, die den Abstand zu verringern versuchen."
