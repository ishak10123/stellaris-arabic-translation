 FLEET_STANCE_AGGRESSIVE_DESC: "Diese Flotte versucht automatisch, Feinde im selben System anzugreifen."
 FLEET_STANCE_AGGRESSIVE_TRANSPORT_DESC: "Diese Flotte folgt automatisch verbündeten Militärflotten und versucht feindliche Planeten zu erobern, falls die Chance auf Erfolg günstig ist."
 FLEET_STANCE_PASSIVE: "Passiv"
 FLEET_STANCE_PASSIVE_DESC: "Diese Flotte rückt nicht gegen Feinde vor, greift sie aber dennoch an, wenn sie zu nahekommen."
