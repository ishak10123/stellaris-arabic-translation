 #Origin Events
 TIMELINE_EVENT_GALACTIC_DOORSTEP_TOOLTIP: "§H$origin.1050.name$§!\n§YUrsprungsereignis§!\n\nUnsere Schiffe können jetzt zu einem zweiten identischen Gerät reisen, und als letztes Geschenk der Erbauer wurden uns die Geheimnisse für dessen Konstruktion übermittelt. Was uns einst vor ein gewaltiges Rätsel stellte, liegt nun offen vor uns. Schon bald werden wir unsere eigenen Sternentore bauen und damit die Reisezeit innerhalb unseres Reichs auf nahezu null senken."
 TIMELINE_EVENT_GALACTIC_DOORSTEP: "Öffnung der Schwarzen Krone\n§L[GetDate]§!"
 TIMELINE_EVENT_LOST_COLONY_TOOLTIP: "§HHeimatwelt entdeckt§!\n§YUrsprungsereignis§!\n\nWir haben Kontakt zu jener Zivilisation aufgenommen, die unsere verlorene Kolonie gründete. Auch wenn uns die Zeit und die Entfernung zu ihnen zu etwas Neuem geformt hat, kennen wir nun zumindest unseren Ursprung. Das Echo unserer gemeinsamen Vergangenheit wird unsere Zukunft maßgeblich prägen."
 TIMELINE_EVENT_LOST_COLONY: "Die einst verlorene Heimat\n§L[GetDate]§!"
 TIMELINE_EVENT_RESOURCE_CONSOLIDATION_TOOLTIP: "§HMaschinenwelt erschaffen§!\n§YUrsprungsereignis§!\n\nWir haben eine echte Maschinenwelt erschaffen und sie gänzlich von der Ineffizienz und dem Verfall organischer Wesen befreit. Die Zukunft wird mit Stahl gebaut und von einem Algorithmus gesteuert."
 TIMELINE_EVENT_RESOURCE_CONSOLIDATION: "Welten neu geschmiedet\n§L[GetDate]§!"
 TIMELINE_EVENT_REMNANTS_TOOLTIP: "§HÖkumenopolis wiederaufgebaut§!\n§YUrsprungsereignis§!\n\nUnser Reich baute seine ehemalige Heimatwelt wieder auf und verwandelte dieses verwüstete Relikt wieder in eine Ökumenopolis. Dies zeugt von der Widerstandsfähigkeit und dem Ehrgeiz unserer Zivilisation."
 TIMELINE_EVENT_REMNANTS: "Welten neu geschmiedet\n§L[GetDate]§!"
 TIMELINE_EVENT_SHATTERED_RING_TOOLTIP: "§HRingelt wiederaufgebaut§!\n§YUrsprungsereignis§!\n\nDie zerstörten Ruinen unseres Heimatsystems wurden vollständig wiederaufgebaut. Was einst ein Friedhof unseres verlorenen Ehrgeizes war, erstrahlt heute als Leuchtfeuer unserer Zivilisation."
 TIMELINE_EVENT_SHATTERED_RING: "Kompletter Kreislauf\n§L[GetDate]§!"
 TIMELINE_EVENT_LEGENDARY_LEADER_TOOLTIP: "§HBestimmung erfüllt§!\n§YUrsprungsereignis§!\n\nDie Reise des Leitsterns hat die letzte Phase erreicht. Seine Herrschaft wird entweder für die Ewigkeit bestehen und das Reich für alle Zeiten prägen oder aber den Beginn einer neuen Ära markieren, in der die Führung geteilt und die Zukunft neu geschrieben werden muss."
 TIMELINE_EVENT_LEGENDARY_LEADER: "Die letzte Bestimmung\n§L[GetDate]§!"
 TIMELINE_EVENT_SHROUDWALKER_APPRENTICE_TOOLTIP: "§HSchleiertunnel errichtet§!\n§YUrsprungsereignis§!\n\nDer Schleier zwischen den Wirklichkeiten wurde durchtrennt, und der erste Schleiertunnel verbindet nun unser Reich mit dem Unbekannten. Durch diesen Riss fallen Raum und Zeit zusammen und eröffnen einen Weg, wo einst nur Leere war. Welche Geheimnisse oder Gefahren auf der anderen Seite lauern, bleibt abzuwarten."
 TIMELINE_EVENT_SHROUDWALKER_APPRENTICE: "Jenseits des Schleiers\n§L[GetDate]§!"
 TIMELINE_EVENT_VOID_DWELLERS_TOOLTIP: "§HHabitat gebaut§!\n§YUrsprungsereignis§!\n\nWir haben in der Leere etwas Neues geschaffen. Der Bau unseres ersten zusätzlichen Habitats markiert die Erweiterung unserer Domäne und stellt sicher, dass unser Volk nie die Last der planetaren Existenz kennenlernen muss."
 TIMELINE_EVENT_VOID_DWELLERS: "Eine Heimat im All\n§L[GetDate]§!"
 TIMELINE_EVENT_OCEAN_PARADISE_TOOLTIP: "§HMeister der Meere§!\n§YUrsprungsereignis§!\n\nDank unserer hydrozentrischen Expertise haben wir unsere Heimatwelt neu geformt, indem wir die riesigen Ozeane über ihre natürlichen Grenzen hinaus erweiterten. Die Gezeiten beugen sich nun unserem Willen, und bald wird auch der Rest der Galaxis folgen."
 TIMELINE_EVENT_OCEAN_PARADISE: "Von den Gezeiten zurückgefordert\n§L[GetDate]§!"
 TIMELINE_EVENT_DOOMSDAY_TOOLTIP: "§HHeimatwelt vernichtet§!\n§YUrsprungsereignis§!\n\nDas Unvermeidliche ist eingetreten. Unsere einst blühende Heimatwelt musste sich ihrem Schicksal beugen und wurde in einem Kataklysmus aus Feuer und Wut zerrissen. In der Leere treibt nun die Asche unserer Vergangenheit, und jene, die entkommen sind, tragen nun unsere Zukunft mit sich."
 TIMELINE_EVENT_DOOMSDAY: "Der letzte Tag\n§L[GetDate]§!"
 TIMELINE_EVENT_EVOPRED_ABSORB_TOOLTIP: "§HSpezieseigenschaft absorbiert§!\n§YUrsprungsereignis§!\n\nWir haben zum ersten Mal neues Genmaterial absorbiert. Köstlich."
 TIMELINE_EVENT_EVOPRED_ABSORB: "Absorbiertes Genmaterial\n§L[GetDate]§!"
 TIMELINE_EVENT_WORMHOLE_DEFENDED_TOOLTIP: "Die aufgegebene Brutstätte und ihre Flotten wurden am §L[GetDate]§! zerstört"
 TIMELINE_EVENT_WORMHOLE_DEFENDED: "Wurmloch verteidigt\n§L[GetDate]§!"
 #Crisis Events
 TIMELINE_EVENT_CRISIS_GREAT_KHAN_TOOLTIP: "§HGroßkhan§!\n§YKrisenereignis§!\n\nEin neuer Kriegsfürst hat die zersplitterten Clans der Marodeure vereint. Mit Plasma und kohlenstoffverstärkten Schiffen stürzt der Großkhan nun die Galaxie ins Chaos und versklavt ganze Welten. Flotten beugen sich seiner Macht, und einst gesetzlose Plünderer folgen ihm voller Entschlossenheit. Das Zeitalter der Plünderung ist vorüber. Nun wird erobert."
 TIMELINE_EVENT_CRISIS_GREAT_KHAN: "Entfesselte Horde\n§L[GetDate]§!"
 TIMELINE_EVENT_CRISIS_GRAY_TEMPEST_TOOLTIP: "§HGrauer Sturm§!\n§YKrisenereignis§!\n\nDie L-Tore wurden geöffnet und entfesselten die uralte Kriegsflotte des Grauen Sturms. Ihre Schiffe ziehen eine Schneise der Zerstörung durch die Galaxie und vernichten alles und jeden, der sich ihnen in den Weg stellt. Keine Diplomatie und keine Gnade, nur unentwegte Replikation. Ganze Planeten verstummen, Flotten werden ausgelöscht und Angst macht sich breit. Die Vergangenheit ist zurückgekehrt, und sie sieht völlig identisch aus."
 TIMELINE_EVENT_CRISIS_GRAY_TEMPEST: "Die Erweckung\n§L[GetDate]§!"
 TIMELINE_EVENT_CRISIS_FORMLESS_TOOLTIP: "§HFormlos§!\n§YKrisenereignis§!\n\nDie Energiewesen, die als \"die Formlosen\" bekannt sind, mussten feststellen, dass unsere Galaxie alles andere als eine sichere Zuflucht für sie ist. Sie werden unser Universum als außerplanetare Invasoren überschwemmen oder aber bei dem Versuch umkommen."
 TIMELINE_EVENT_CRISIS_FORMLESS: "Formlose Wut\n§L[GetDate]§!"
 TIMELINE_EVENT_CRISIS_VOIDWORM_PLAGUE_TOOLTIP: "§HLeerenwürmer-Plage§!\n§YKrisenereignis§!\n\nDie Natur der Leerenwürmer veränderte sich, nachdem sie eine kritische Masse erreichten und sich nun unkontrolliert vermehren. Sie versuchen jetzt, alles Leben in der Galaxie auszulöschen, bevor sie unwissentlich ihren eigenen, nicht nachhaltigen Zyklus beenden."
 TIMELINE_EVENT_CRISIS_VOIDWORM_PLAGUE: "Unmöglicher Hunger\n§L[GetDate]§!"
 TIMELINE_EVENT_CRISIS_UNBIDDEN_TOOLTIP: "§HUngebeten§!\n§YKrisenereignis§!\n\nEin Riss im Gefüge der Existenz hat eine Invasion von Wesen hervorgebracht, die aus purer Energie bestehen. Sie verhandeln nicht und geben niemals nach. Sie verschlingen ganze Systeme, um ihre endlose Expansion voranzutreiben. Ihre Anker stabilisieren den Riss und ziehen immer mehr von ihrer Art in unsere Domäne. Die Ungebetenen sind angekommen."
 TIMELINE_EVENT_CRISIS_UNBIDDEN: "Der Riss hat sich geöffnet\n§L[GetDate]§!"
 TIMELINE_EVENT_CRISIS_KALEIDOSCOPE_TOOLTIP: "§HKaleidoskop§!\n§YKrisenereignis§!\n\nEin ausgehungertes Energiewesen, bekannt als \"Kaleidoskop\", ist in die Galaxie eingedrungen und hat begonnen, sich an bewohnten Systemen zu laben. Sein Hunger wirkt endlos, und es scheint sich nur allzu leicht ablenken zu lassen. Es dürfte schon bald wieder zu Sternenstaub zerfallen."
 TIMELINE_EVENT_CRISIS_KALEIDOSCOPE: "Verhungertes Spektrum\n§L[GetDate]§!"
 TIMELINE_EVENT_BECOME_THE_CRISIS_TOOLTIP: "§HZur Krise werden§!\n§YKrisenereignis§!\n\nDie Galaxie ist zu einem dunkleren Ort geworden. [EVENT_TARGET_0.GetName] hat die Diplomatie aufgegeben und sich selbst zur größten Bedrohung erklärt. Flotten sammeln sich und die Spione flüstern von einem letzten apokalyptischen Plan. Sie sind kein bloßes Reich in den Sternen mehr, sondern eine wahre Krise."
 TIMELINE_EVENT_BECOME_THE_CRISIS: "Feind der Galaxie\n§L[GetDate]§!"
 TIMELINE_EVENT_CRISIS_PRETHORYN_SCOURGE_TOOLTIP: "§HPrethoryn-Geißel§!\n§YKrisenereignis§!\n\nVon jenseits des Randes der Galaxie kommen die Prethoryn. Ihre biologischen Schiffe schwärmen durchs All und lassen nichts als verdorbene Welten zurück. Die Horde erhört kein Flehen."
 TIMELINE_EVENT_CRISIS_PRETHORYN_SCOURGE: "Die alles verschlingende Flut\n§L[GetDate]§!"
 TIMELINE_EVENT_CRISIS_CONTINGENCY_TOOLTIP: "§HKontingenz§!\n§YKrisenereignis§!\n\nEin kaltes, kalkuliertes und unaufhaltsames Signal pulsiert durch die Galaxie. KI-Systeme brechen zusammen, synthetische Bewusstseine ergeben sich. Die Kontingenz ist erwacht. Auf verborgenen Maschinenwelten erheben sich unerbittliche Kriegsgestalten, die ihre letzte Direktive ausführen: absolute Vernichtung."
 TIMELINE_EVENT_CRISIS_CONTINGENCY: "Geistersignal\n§L[GetDate]§!"
 TIMELINE_EVENT_CRISIS_CETANA_TOOLTIP: "§HCetana§!\n§YKrisenereignis§!\n\nEine Stimme hallt durch die Leere: \"Meine Kinder, endlich kehre ich zu Euch zurück.\"\n\nCetana, eine uralte Intelligenz, die vor so langer Zeit weggesperrt wurde, dass sogar ihr Name in Vergessenheit geriet, ist erwacht. Ihr Ziel ist ein absolutes: Alles Leid beenden - koste es, was es wolle. Ihre Flotten schreiten mit kalter Anmut zur Tat und kämpfen für ihren Kreuzzug, der der Galaxie einen endgültigen, fühllosen Frieden bringen soll."
 TIMELINE_EVENT_CRISIS_CETANA: "Rückkehr der Königin\n§L[GetDate]§!"
 TIMELINE_EVENT_HATCH_BEHEMOTH_TOOLTIP: "§HBehemoth-Schlüpfling§!\n§YMeilenstein§!\n\nDer erste Behemoth-Schlüpfling ist am §L[GetDate]§! aus seinem Ei emporgestiegen."
 TIMELINE_EVENT_HATCH_BEHEMOTH: "Behemoth-Schlüpfling\n§L[GetDate]§!"
 #Galactic Events
 TIMELINE_EVENT_GALACTIC_MARKET_TOOLTIP: "§HGalaktischer Markt§!\n§YGalaxieereignis§!\n\nDer Handel hat die Sterne miteinander verbunden. Der Galaktische Markt wurde offiziell gegründet und ist zum wirtschaftlichen Herzen der Galaxie herangewachsen. Der Handel kann ungehindert fließen. In kürzester Zeit können immense Profite erwirtschaftet oder Reiche in den Ruin getrieben werden, und das Schicksal ganzer Welten hängt von Angebot und Nachfrage ab."
 TIMELINE_EVENT_GALACTIC_MARKET: "Ungezügelter Handel\n§L[GetDate]§!"
 TIMELINE_EVENT_GALACTIC_COMMUNITY_TOOLTIP: "§HGalaktische Gemeinschaft§!\n§YGalaxieereignis§!\n\nDie galaktischen Reiche haben sich unter einem einzigen politischen Gremium zusammengeschlossen. Die Galaktische Gemeinschaft, ein Forum, in dem Diplomatie, Debatten und Machtkämpfe über die Zukunft der Sterne bestimmen, wurde gegründet. Welchen Einfluss sie wirklich besitzt, wird sich erst noch zeigen."
 TIMELINE_EVENT_GALACTIC_COMMUNITY: "Eine neue Ordnung\n§L[GetDate]§!"
 TIMELINE_EVENT_GALACTIC_COMMUNITY_RESOLUTION_TOOLTIP: "§HBeschluss erlassen§!\n§YGalaxieereignis§!\n\nDie Galaktische Gemeinschaft hat gesprochen. Ein neuer Beschluss hat das, was als interstellares Gesetz gilt, neu definiert. Während manche feiern, sind andere erbost, doch sie alle müssen dem neuen Gesetz Folge leisten."
 TIMELINE_EVENT_GALACTIC_COMMUNITY_RESOLUTION: "Ein Gesetz für die Sterne.\n§L[GetDate]§!"
 TIMELINE_EVENT_WAR_IN_HEAVEN_TOOLTIP: "§HHimmelskrieg§!\n§YGalaxieereignis§!\n\nDie alten Relikte vergangener Zivilisationen erheben sich als wohlwollende Aufseher und zornige Titanen. [EVENT_TARGET_0.GetName] und [EVENT_TARGET_1.GetName], uralte Rivalen aus einer längst vergessenen Zeit, haben ihren kosmischen Krieg neu entfacht. Ihre Flotten verdunkeln die Sterne und verlangen, dass sich die jüngeren Zivilisationen unterwerfen ... oder ausgelöscht werden."
 TIMELINE_EVENT_WAR_IN_HEAVEN: "Krieg der Alten\n§L[GetDate]§!"
 TIMELINE_EVENT_NEXUS_STORM_TOOLTIP: "§HNexussturm§!\n§YGalaxieereignis§!\n\nEin Sturm, wie es ihn noch nie zuvor gab, wütet im [EVENT_TARGET_0.GetName]-System. Der Nexussturm zieht durch die Systeme, zerstört Schiffe und bombardiert Planeten mit seiner ungezügelten Verwüstung."
 TIMELINE_EVENT_NEXUS_STORM: "Ein zeitloser Sturm\n§L[GetDate]§!"
