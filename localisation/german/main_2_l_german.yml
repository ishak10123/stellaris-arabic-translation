 slavery_domestic_tooltip_delayed: "§LHausdiener verbringen einen Großteil ihrer Zeit damit, um sich um die Bedürfnisse freier Bewohner zu kümmern. Einigen sind einzelne Wohnungen zugeteilt, während andere eher öffentliche Plätze beanspruchen. Sie neigen dazu neben ihren Meistern zu leben und benötigen daher fast keinen eigenen Wohnraum.§!"
 slavery_military: "Kriegsknechte"
 slavery_military_tooltip: "§HKriegsknechte§! haben keinen Bonus auf die Ressourcenproduktion, geben aber exzellente Soldaten für lokale §HArmeen§! ab. Man kann sie als [enforcer.GetIcon] §Y[enforcer.GetName]§!, [soldier.GetIcon] §Y[soldier.GetName]§! oder £pop_cat_worker£ §Y$pop_cat_worker$§! einsetzen."
 slavery_military_tooltip_delayed: "§LKriegsknechte sind bewaffnete Leibeigene, die oft von Geburt an in den Kampfkünsten trainiert und für absolutes Gehorsam konditioniert werden. Im Gegenzug für den Militärdienst erhalten sie viel mehr Autonomie als andere Sklaven und können in einer größeren Vielfalt von Arbeitsplätzen eingesetzt werden.§!"
 slavery_livestock: "Viehbestand"
 slavery_livestock_tooltip: "Als £pop£ §HViehbestand klassifizierte Bewohner§! können nicht zur Ressourcenproduktion herangezogen werden. Sie sind lediglich ein £food£ §HNahrungsvorrat§!.\n\nLithoiden-Viehbestand produziert stattdessen £minerals£ §HMineralien§! und Thermophilen-Viehbestand produziert £alloys£ §HLegierungen§!.\n\nViehbestand kann in §HAlien-Zoos§! gehalten werden, um $r_amenities$ zu erzeugen."
 slavery_livestock_tooltip_delayed: "§LBewohner sind Viehbestand!§!"
 slavery_indentured: "Vertragliche Sklaverei"
 slavery_indentured_tooltip: "§HVertragssklaven§! kann man als £pop_cat_worker£ §Y$pop_cat_worker$§!- oder £pop_cat_specialist£ §Y$pop_cat_specialist$§! einsetzen und sie haben mehr politische Macht als andere Sklaven. Sie können nicht in Jobs für [entertainer.GetIcon] §Y[entertainer.GetNamePlural]§! oder [enforcer.GetIcon] §Y[enforcer.GetNamePlural]§! arbeiten. Sklavenbasierte Produktionsboni gelten nur, wenn sie als £pop_cat_worker£ §Y$pop_cat_worker_plural$§! zum Einsatz kommen."
 slavery_indentured_tooltip_delayed: "§LSie können theoretisch ihre Schulden abbezahlen und sich ihre Freiheit erkaufen, doch ihre Verträge sind absichtlich so gestaltet, dass dies vorkommt.§!"
 living_standard_utopian: "Utopischer Überfluss"
 living_standard_utopian_tooltip: "$living_standard_utopian$ stellt sicher, dass jedes Mitglied dieser Spezies Zugang zu fast allen erdenklichen Arten von Luxus hat.\n\n$UTOPIAN_ABUNDANCE_POP_EFFECTS$\n\n$CIVILIANS_PRODUCE_UNITY_RESEARCH$"
 living_standard_utopian_tooltip_delayed: "§LRealistisch gesehen können wir nicht alle Wünsche eliminieren, indem wir jeden Bedarf decken. Aber versuchen können wir es!§!"
 living_standard_shared_burden: "Geteiltes Leid"
 living_standard_shared_burden_tooltip: "$living_standard_shared_burden$ stellt die gerechte Verteilung von Ressourcen zwischen allen Mitgliedern der Gesellschaft sicher.\n\n$SHARED_BURDEN_POP_EFFECTS$\n\n$UNEMPLOYED_PRODUCE_UNITY$"
 living_standard_shared_burden_tooltip_delayed: "§LVon jedem beurteilt nach seinen Fähigkeiten zu jedem beurteilt nach seinen Bedürfnissen.§!"
 living_standard_academic_privilege: "Akademisches Privileg"
 living_standard_academic_privilege_tooltip: "$living_standard_academic_privilege$ priorisiert die gebildete Bevölkerung zum allgemeinen Nutzen der Wissenschaft.\n\n$ACADEMIC_PRIVILEGE_POP_EFFECTS$"
 living_standard_academic_privilege_tooltip_delayed: "§LWissen ist Macht.§!"
 living_standard_good: "Soziale Fürsorge"
 living_standard_good_tooltip: "$living_standard_good$ ist bestrebt danach das Leben der Ärmeren durch eine großzügige Sozialpolitik zu verbessern.\n\n$SOCIAL_WELFARE_POP_EFFECTS$\n\n$UNEMPLOYED_PRODUCE_UNITY$"
 living_standard_good_tooltip_delayed: "§LSich um die Bedürfnisse der Bevölkerung zu kümmern, ist die wichtigste Verantwortung des Staats.§!"
 living_standard_normal: "Vertretbare Konditionen"
 living_standard_normal_tooltip: "$living_standard_normal$ stellen sicher, dass die meisten Mitglieder der Spezies das haben, was sie für eine akzeptable Lebensqualität benötigen.\n\n$DECENT_LIVING_STANDARDS_POP_EFFECTS$"
 living_standard_normal_tooltip_delayed: "§LDie Bedürfnisse unserer Untertanen zu vernachlässigen macht und auf lange Sicht zum Verlierer.§!"
 living_standard_stratified: "Geschichtete Wirtschaft"
 living_standard_stratified_tooltip: "$living_standard_stratified$ priorisiert die herrschenden Klassen auf Kosten der verarmten Massen.\n\n$STRATIFIED_LIVING_STANDARDS_POP_EFFECTS$"
 living_standard_stratified_tooltip_delayed: "§LWenn sie ihr Leben verbessern wollen, müssen sie dafür arbeiten.§!"
 living_standard_hive_mind: "Drohne"
 living_standard_hive_mind_tooltip: "Während sie für Luxusgüter wenig nutzen haben mag, benötigt eine Drohnenpopulation dennoch eine große Menge an Ressourcen, um sich selbst zu erhalten."
 living_standard_hive_mind_tooltip_delayed: "§LDie Bedürfnisse des Individuums und des Schwarms sind identisch.§!"
 living_standard_subsistence: "Grundversorgung"
 living_standard_subsistence_tooltip: "$living_standard_subsistence$ bietet Bewohnern dieser Spezies nur die wesentlichen Grundprodukte an.\n\n$SUBSISTENCE_POP_EFFECTS$"
 living_standard_subsistence_tooltip_delayed: "§LDer Hungertod unserer Untertanen sollte nach Möglichkeit vermieden werden. Darüber hinaus sind sie nicht unser Problem.§!"
 living_standard_none: "Nicht existent"
 living_standard_none_tooltip: "Diese Spezies wird momentan gesäubert und Bewohner haben keine Unterhaltskosten."
 living_standard_none_tooltip_delayed: "§LWir haben kein Budget für die Toten.§!"
 living_standard_deassimilation: "Schwarmtrennung"
 living_standard_deassimilation_tooltip: "Diese Spezies unterzieht sich einer schwierigen Trennung vom Schwarmbewusstsein."
 living_standard_deassimilation_tooltip_delayed: "§LWillkommen aus dem Pferch.§!"
 living_standard_ego_assimilation: "Identitätsaufstieg"
 living_standard_ego_assimilation_tooltip: "Diese Spezies wird eins mit dem Bewusstsein."
 living_standard_ego_assimilation_tooltip_delayed: "§LDas Selbst überlebt den Prozess nicht. Aber genau das ist das Ziel.§!"
 living_standard_ego_assimilation_psionic: "$living_standard_ego_assimilation$"
 living_standard_ego_assimilation_psionic_tooltip: "$living_standard_ego_assimilation_tooltip$\n\n§RAufgrund der Zerstörung des individuellen Ichs werden alle psionischen Eigenschaften entfernt.§!"
