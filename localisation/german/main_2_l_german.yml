 civic_tooltip_criminal_heritage_effects: "Kann §YZweigstellen§! auf Planeten beliebiger normaler Reiche gründen, solange kein aktiver Krieg oder Waffenstillstand herrscht\nKriminalität auf Planeten mit §YZweigstellen§! erhöhen dessen Wert\nKann spezielle £building£ §Y$BRANCH_OFFICE_BUILDINGS$§! bauen, die die Kriminalität erhöhen"
 civic_tooltip_inward_perfection_effects: "Kann keine §YRivalen§! haben\nKann keine §YDefensivabkommen§! eingehen\nKann keine §YMigrationsabkommen§! eingehen\nKann keine §YForschungsabkommen§! eingehen\nKann keine §YWirtschaftspakte§! eingehen\nKann keine §YUnabhängigkeit§! garantieren\nKann keinen §YFöderationen§! beitreten\nKann keine Zivilisationen ohne ÜL-Technologie §Yinfiltrieren§!\nKann keine erzwungenen §YUntertanen§! haben\nKann nicht die Richtlinie §YUnbeschränkte Kriege§! benutzen\n"
