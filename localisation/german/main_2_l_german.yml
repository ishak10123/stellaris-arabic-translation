 MACRO_BUILDER_TITLE: "§EAngriffsarmeezentrum§!"
 MACRO_BUILDER_DESC: "Das §YAngriffsarmeezentrum§! bietet eine einfache Möglichkeit, eine große Anzahl von Angriffsarmeen auszuheben. Armeen werden dazu auf verfügbaren Planeten in diesem Sektor ausgehoben.\n\nNach der Fertigstellung verstärken sie §YArmeen§!, die \"§YTruppen versammeln§!\" aktiviert haben oder sich auf dieser Sternenbasis befinden."
 MACRO_BUILDER_CAPACITY_DESC: "Die Anzahl an verfügbaren £planet£§YPlaneten§! bestimmt darüber, wie viele Armeen parallel gebaut werden können. Planeten können im Armeereiter der Planetenansicht vom §YAngriffsarmeezentrum§! ausgeschlossen werden."
