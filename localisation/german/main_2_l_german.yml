 building_slave_processing: "Sklavenabwicklungseinrichtung"
 building_slave_processing_desc: "In dieser großen und beeindruckenden Einrichtung wird Sklavenarbeit abgewickelt und jede Spur freien Willens gelöscht."
 building_slave_processing_migrate_effect_desc: "Die §Yautomatische Umsiedlung§! in andere Kolonien ist für lokale arbeitslose §Y$SLAVES$§! und nicht-vernunftbegabte Roboter aktiviert."
 building_slave_processing_slave_army_effect_desc: "Erlaubt die Rekrutierung von §Y$slave_army_plural$§!.\n\n"
 building_robotics_assembly_plant: "Roboter-Montagewerk I"
 building_robotics_assembly_plant_desc: "Ein Roboter-Montagewerk wird zur Aushebung von Roboterarmeen benötigt.\nFügt §Y100§! £pop£ §H$ROBOT_POP_SPECIES_1$§!-Bewohner pro Jahr hinzu\nBewohnerunterhalt: £energy£ §Y1§!"
 building_robotics_assembly_plant_2: "Roboter-Montagewerk II"
 building_robotics_assembly_plant_2_desc: "Ein Roboter-Montagewerk wird zur Aushebung von Roboterarmeen benötigt.\nFügt §Y100§! £pop£ §H$ROBOT_POP_SPECIES_2$-Bewohner§! pro Jahr hinzu\nVerbessert §H$ROBOT_POP_SPECIES_1$§!-Bewohner zu §HAndroiden§!-Bewohnern\nBewohnerunterhalt: £energy£ §Y2§!"
 building_robotics_assembly_plant_3: "Roboter-Montagewerk III"
 building_robotics_assembly_plant_3_desc: "Ein Syntheten-Montagewerk wird zur Aushebung von Roboterarmeen benötigt.\nFügt §Y100§! £pop£ §H$ROBOT_POP_SPECIES_3$-Bewohner§! pro Jahr hinzu\nVerbessert §HAndroiden§!-Bewohner zu §HSyntheten§!-Bewohnern\nBewohnerunterhalt: £energy£ §Y5§!"
 building_colony_shelter: "Umgebaute Schiffsunterkunft"
 building_colony_shelter_desc: "Die Überreste eines Kolonieschiffs, umgebaut zur Verwendung auf der Planetenoberfläche."
 building_capital: "Planetarer Außenposten"
 building_capital_desc: "Sitz der lokalen herrschenden Elite."
 building_major_capital: "Planetare Hauptstadt"
 building_major_capital_desc: "Ein weitläufiger Komplex bürokratischer Strukturen, der als Verwaltungszentrum für eine große Kolonie fungiert."
 building_system_capital: "System-Regierungssitz"
 building_system_capital_desc: "Eine turmhohe Konfiguration aus Verwaltungsbüros und vernetzter Infrastruktur, die den Bau und Betrieb von höchst anspruchsvollen Einrichtungen ermöglicht."
 building_ancient_factory: "Uralte Fabrik"
 building_ancient_factory_desc: "§LDieses alte Relikt liegt schon seit Jahrhunderten unangetastet da, könnte aber von einem Bewohner zur Produktion von Mineralien bewirtschaftet werden. Die Produktionsleistung dieser Fabrik ist bei weitem höher als unsere eigenen industriellen Bemühungen.§!"
 building_ancient_archives: "Vorläufer-Archive"
 building_ancient_archives_desc: "§LRiesige Lager von altem Wissen.§!"
 building_dark_matter_power_plant: "Dunkle-Materie-Kraftwerk"
 building_dark_matter_power_plant_desc: "§LDieser uralte Komplex wurde mit längst vergessenen Technologien gebaut.§!"
 building_agri_processing_complex: "Agri-Verarbeitungskomplex"
 building_agri_processing_complex_desc: "§LDieser uralte Komplex wurde mit längst vergessenen Technologien gebaut.§!"
 building_primitive_farm: "Primitive Farm"
 building_primitive_farm_desc: "Primitive Farmen bearbeiten den Boden und ernten wenig."
 building_primitive_factory: "Einfache Fabriken"
 building_primitive_factory_desc: "Primitive, ineffiziente Fabriken verpesten bei der Güterproduktion die Umwelt."
 building_primitive_offices: "Einfache Büros"
 building_primitive_offices_desc: "In diesen Büros gibt es scheinbar unzählige Arbeitsplätze, von denen die Geräusche sinnloser Arbeit zu hören sind."
 building_primitive_mine: "Primitive Mine"
 building_primitive_mine_desc: "Primitive Bergbautunnel, die sich durch den Boden schlängeln."
 building_primitive_power_plant: "Primitives Kraftwerk"
 building_primitive_power_plant_desc: "Ein primitives und äußerst unzuverlässiges Kraftwerk, das auf Kohle oder früher Atomkraft basiert und die Atmosphäre vergiftet."
 building_mutant_landfill: "Mutantendeponie"
 building_mutant_landfill_desc: "Eine stinkende Masse toter mutierter Schrecken. Ihr unbeständiges organisches Material hat sich zu einer Art Struktur ineinander verdreht."
 building_vault: "Unterirdischer Bunker"
 building_vault_desc: "Diese Zelte markieren den Eingang zu einem gewaltigen unterirdischen Bunker, den die ursprünglichen Bewohner dieser Welt zum Schutz vor Bomben gebaut hatten. Als sich die Nahrungsvorräte erschöpften, fielen die Bewohner übereinander her."
 building_vault_2: "Unterirdischer Bunker"
 building_vault_2_desc: "Diese Zelte markieren den Eingang zu einem gewaltigen unterirdischen Bunker, den die ursprünglichen Bewohner dieser Welt zum Schutz vor Bomben gebaut hatten. Der Bunker enthält einen riesigen Maschinenpark mit Lagern von Bergbau-Ausrüstung."
 building_particle_accelerator: "Teilchenbeschleuniger"
 building_particle_accelerator_desc: "Dieser alte Teilchenbeschleuniger wurde auf Basis eines neuartigen Konzepts gebaut. Die überlebenden Terminals in der Struktur enthalten eine gewaltige Anzahl von Forschungsdaten, die wohl ein herausragender theoretischer Physiker zusammengestellt hatte."
 building_odd_factory: "Merkwürdige Fabrik"
 building_odd_factory_desc: "Eine unbekannte Zivilisation hat eine gut konstruierte Einrichtung auf dem Planeten zurückgelassen, die hochwertige Ressourcen produziert."
 building_quarantine: "Seuchen-Forschungsstation"
 building_quarantine_desc: "Ein temporäres Krankenhaus, in dem Infizierte zur Herstellung eines Heilmittels studiert werden."
 building_plague_memorial: "Seuchengedenkstätte"
 building_plague_memorial_desc: "Eine Gedenkstätte für die Opfer einer schrecklichen Seuche, die einst diese Welt verwüstet hat und zugleich Zeugnis der Überlebensfähigkeit ihrer Bewohner."
 building_energy_grid: "Energienetz"
 building_energy_grid_plural: "Energienetze"
 building_energy_grid_desc: "Ein sorgfältig kalibriertes Energienetz maximiert die Leistung von Generatoren."
 building_energy_grid_effect_desc: "Erhöht die Grundproduktion von Jobs, die £energy£ §YEnergie-Credits§! generieren, um §G1§!."
 building_energy_nexus: "Energienexus"
 building_energy_nexus_desc: "Diese monumentale Fabrik zentralisiert alle Energienetze des Planeten und erhöht ihre Effektivität"
 building_mineral_purification_plant: "Mineral-Verarbeitungsanlage"
 building_mineral_purification_plant_desc: "Mineralien, die durch diese Anlage geflossen sind, haben die höchste Qualität."
 building_mineral_purification_hub: "Mineral-Verarbeitungshub"
 building_mineral_purification_hub_desc: "Massive Hubs nehmen Mineralien auf und verteilen sie an verschiedene Verarbeitungsanlagen."
 building_medical_1: "Medizinisches Zentrum"
 building_medical_1_desc: "$job_healthcare_desc$"
 building_medical_2: "Genkliniken"
 building_medical_2_desc: "Genkliniken können fortgeschrittene medizinische Behandlungen anbieten, die statistisch zu einer wesentlich gesünderen und langlebigeren Bevölkerung führen."
 building_medical_3: "Zell-Revitalisierungszentren"
 building_medical_3_desc: "Zell-Revitalisierungszentren können einer großen Bevölkerungsschicht fortgeschrittene medizinische Behandlungen anbieten. Behandlungen auf einem zellulären Level führen zu einer deutlich gesünderen und langlebigeren Bevölkerung."
 building_mineral_silo_1: "Mineralsilo I"
 building_mineral_silo_1_desc: "Mineralsilos können die maximale Mineralien-Speicherkapazität unseres Reichs erhöhen."
 building_mineral_silo_2: "Mineralsilo II"
 building_mineral_silo_2_desc: "$building_mineral_silo_1_desc$"
 building_mineral_silo_3: "Mineralsilo III"
 building_mineral_silo_3_desc: "$building_mineral_silo_1_desc$"
 building_planetary_shield_generator: "Planetarer Schildgenerator"
 building_planetary_shield_generator_desc: "$tech_planetary_shield_generator_desc$"
 building_autochthon_monument: "Autochthones Monument"
 building_autochthon_monument_plural: "Autochthone Monumente"
 building_autochthon_monument_desc: "Ein Monument zu Ehren der ersten Pioniere, die zu den Sternen fuhren."
 building_autochthon_monument_effect: "Produziert £unity£§G1§! Einigkeit für jeden §YAufstiegsvorteil§!, den unser Reich ausgewählt hat.\n\n"
 building_heritage_site: "Kulturerbestätte"
 building_heritage_site_desc: "Ein Gebiet, das der frühen Geschichte unseres Reichs und seiner Bevölkerung gewidmet ist."
 building_heritage_site_effect: "Produziert £unity£§G2§! Einigkeit für jeden §YAufstiegsvorteil§!, den unser Reich ausgewählt hat.\n\n"
 building_hypercomms_forum: "Hypercomms-Forum"
 building_hypercomms_forum_desc: "Das Forum ist eine kolossale Einrichtung, die mit fortschrittlicher Ausrüstung für interpersonelle Kommunikation ausgerüstet ist. Hier sind der Austausch multisensorischer Ideen in ungezwungenen Diskussionen und schnelle Konsensbildung in Debatten möglich."
 building_hypercomms_forum_effect: "Produziert £unity£§G3§! Einigkeit für jeden §YAufstiegsvorteil§!, den unser Reich ausgewählt hat.\n\n"
 building_autocurating_vault: "Automatische Kunstsammlung"
 building_autocurating_vault_desc: "Ein hoch spezialisiertes, computergestütztes Netzwerk ist unablässig dabei, solche Alltagsgegenstände, denen es eine mögliche historische Bedeutung zumisst, zu beschaffen, zu analysieren, zu bewerten und auszustellen, um ein lebendes Museum der Gegenwart zu errichten."
 building_temple: "Tempel"
 building_temple_desc: "Tempel sind einfache Bauten, die schon seit Urzeiten als Orte zur stillen Einkehr dienen - und zur Kommunion mit dem, was uns alle vereint."
 building_holotemple: "Holotempel"
 building_holotemple_desc: "Eine verbesserte Form seiner grob gestalteten Vorgänger. Die neueste Errungenschaft im Bereich spiritualistischer Technologie erschafft innerhalb des Holotempels eine wandelbare Wirklichkeit - alles zur tieferen Meditation und zur noch intensiveren Hingabe."
 building_sacred_nexus: "Geheiligter Nexus"
 building_sacred_nexus_desc: "Die jüngsten Entwicklungen in Feldtechnologie ermöglichen es Anhängern den göttlichen Einfluss von geheiligtem Boden direkt zu erleben."
 building_citadel_of_faith: "Zitadelle des Glaubens"
 building_citadel_of_faith_desc: "Ein gewaltiger Komplex, der allen Gläubigen Zuflucht und Abgeschiedenheit von der materiellen Welt bietet."
 building_stronghold: "Bollwerk"
 building_stronghold_desc: "Eine planetarische Festung, die eine beachtliche Garnison beherbergen kann, um die Welt vor Invasionen und Rebellionen zu schützen."
 building_fortress: "Festung"
 building_fortress_desc: "Ein massiver Festungskomplex mit einer erweiterten Garnison und Trainigseinrichtungen für Soldaten."
 building_bio_reactor: "Bio-Reaktor"
 building_bio_reactor_desc: "Eine Anlage, in der organische Materie mit hoher Effizienz in Energie umgewandelt wird."
 tech_bio_reactor: "$building_bio_reactor$"
 tech_bio_reactor_desc: "$building_bio_reactor_desc$"
 building_bio_reactor_2: "Fortschrittlicher Bioreaktor"
 building_bio_reactor_2_desc: "Eine Anlage, die organische Materie mit hoher Effizienz in Energie umwandelt. Fortschritte bei der Abfallsammlung erlauben die Gewinnung nützlicher gasförmiger Nebenprodukte."
 tech_bio_reactor_2: "$building_bio_reactor_2$"
 tech_bio_reactor_2_desc: "$building_bio_reactor_2_desc$"
 building_hab_stronghold: "Sicherheitszone"
 building_hab_stronghold_desc: "Dieser Abschnitt des Habitats ist der Sicherheit gewidmet und bietet einer bewaffneten Sicherheitstruppe Schutz, um das Habitat von inneren und äußeren Bedrohungen zu verteidigen."
 building_crude_huts: "Primitive Hütten"
 building_crude_huts_desc: "Primitive Hütten, die aus Stein, Lehm oder anderen Materialien gebaut werden."
 building_primitive_dwellings: "Primitive Wohnungen"
 building_primitive_dwellings_desc: "Diese kleinen Gebäude bieten wenig Schutz, halten aber die schlimmsten Elemente ab."
 building_stone_palace: "Steinpaläste"
 building_stone_palace_desc: "Primitive Paläste, die aus Stein gebaut wurden und in denen die lokal herrschende Elite residiert."
 building_primitive_capital: "Regionalhauptgebäude"
 building_primitive_capital_desc: "Die regionalen Hauptgebäude der verschiedenen Nationalstaaten, die diese primitive Welt bewohnen."
 building_urban_dwellings: "Stadtwohnungen"
 building_urban_dwellings_desc: "Ein enger und oft verschmutzter Dschungel aus Beton."
 building_pre_ftl_radio_telescope: "Radioteleskop-Array"
 building_pre_ftl_radio_telescope_desc: "Eine Vielzahl von Radioteleskopen, die nach uns unbekannten intelligenten Lebensformen suchen."
 awareness_gain_desc: "Erhöht die Chance, dass diese Zivilisation mit der Zeit £awareness£ §YWahrnehmung§! erlangt."
 building_hive_crude_huts: "Einfache Nester"
 building_hive_crude_huts_desc: "Diese Nester bestehen aus den einfachsten Materialen und schützen die Drohnen gerade so vor dem nächtlichen Kältetod."
 building_hive_primitive_dwellings: "Einfache Kolonie"
 building_hive_primitive_dwellings_desc: "Diese sechseckigen Gebäude nutzen den verfügbaren Raum effizient aus und beherbergen das, was man als einfache Kolonie bezeichnen könnte."
 building_hive_stone_palace: "Steinerne Schwarmbauten"
 building_hive_stone_palace_desc: "In einer Welt, in der man sein Überleben gegen seine eigene Spezies behaupten muss, sind Steinmauern von großem Vorteil."
 building_hive_primitive_capital: "Kontinentaler Nexus"
 building_hive_primitive_capital_desc: "Das Zentrum für Schwärme in der Größe von Kontinenten, die um die Kontrolle über diese Welt kämpfen."
 building_hive_urban_dwellings: "Drohnenlager"
 building_hive_urban_dwellings_desc: "Eine nützliche Lösung für die Unterbringung von Drohnen, wenn sie sich in ihrem Ruhezyklus befinden. Es gibt separate Ein- und Ausgänge, um den Aufladeprozess des Schwarms zu maximieren."
 building_hive_primitive_factory: "$building_primitive_factory$"
 building_hive_primitive_factory_desc: "$building_primitive_factory_desc$"
 building_hive_primitive_mine: "$building_primitive_mine$"
 building_hive_primitive_mine_desc: "$building_primitive_mine_desc$"
 building_hive_primitive_power_plant: "$building_primitive_power_plant$"
 building_hive_primitive_power_plant_desc: "$building_primitive_power_plant_desc$"
 building_hive_primitive_farm: "$building_primitive_farm$"
 building_hive_primitive_farm_desc: "$building_primitive_farm_desc$"
 building_hive_primitive_node: "Einfacher Synapsenknoten"
 building_hive_primitive_node_desc: "Dieser einfache Knoten stärkt den Willen des Schwarms."
 building_machine_primitive_node: "Einfacher Uplink-Knoten"
 building_machine_primitive_node_desc: "Ein Uplink-Knoten, der die planetare Latenz verbessert."
 building_farming_districts_1: "Nutzpflanzenentwicklungszentrum"
 building_farming_districts_1_desc: "Ein bescheidenes Verwaltungszentrum. Es hat die Aufgabe, Ackerland zu vermessen und den Ausbau der planetaren Landwirtschaft zu organisieren."
 building_farming_districts_2: "Bodenrückgewinnungszentrum"
 building_farming_districts_2_desc: "Dieses Zentrum hat die Aufgabe, Anbauflächen nutzbar zu machen und die Erträge zu erhöhen, um ein größeres Wachstum in den landwirtschaftlichen Regionen zu ermöglichen."
 building_farming_districts_3: "Automatisierter Agrarkomplex"
 building_farming_districts_3_desc: "Mechanisierte Erntemaschinen, Drohnenflotten und klimagesteuerte Felder sorgen für eine schnelle Ausdehnung der landwirtschaftlichen Gebiete."
 building_farming_districts_4: "Planetares Kultivierungsgitter"
 building_farming_districts_4_desc: "Ein riesiger Komplex, der die gesamte Landwirtschaft überwacht und die Anzahl der auf dem Planeten vorhandenen Landwirtschaftszonen maximiert."
 building_mine_generic: "Oberflächensteinbruchdepot"
 building_mine_generic_desc: "Dieses Depot koordiniert den oberflächennahen Abbau von Erzen, was eine frühzeitige Erweiterung der Bergbauzonen ermöglicht."
 building_mining_districts_1: "Industrielle Bergbaustätte"
 building_mining_districts_1_desc: "Bohrer, Fördersysteme und Sortieranlagen sorgen gemeinsam für einen konstanten Produktionsertrag und erlauben eine rasche Expansion der Bergbaudistrikte."
 building_mining_districts_2: "Kernbohrungsarray"
 building_mining_districts_2_desc: "In dieser Anlage legen schwere Bohrer und strukturelle Verstärkungen zusätzliche Mineralienvorkommen in der Tiefe frei."
 building_mining_districts_3: "Seismischer Tunnelbau"
 building_mining_districts_3_desc: "Ein Komplex, der dafür ausgerüstet wurde, hocheffizient Tunnel zu graben und zu stabilisieren, um Zugang zu sonst unerreichbaren Mineralienadern zu erhalten."
 building_mining_districts_4: "Tiefes Krustenextraktionsraster"
 building_mining_districts_4_desc: "Diese weitläufige Anlage arbeitet in maximaler planetarer Tiefe, um vollständig industrialisierte Abbauzonen zu verwalten und die größtmögliche Ausdehnung der Bergbaudistrikte zu ermöglichen."
 building_generator_generic: "Voltaische Produktionsstätte"
 building_generator_generic_desc: "In diesem Gebäude, das der Energieerzeugung im großen Maßstab gewidmet ist, sind Energiezellen, Plasmaleitungen und Hochleistungsgeneratoren untergebracht."
 building_generator_districts_1: "Leitfähiger Werkskomplex"
 building_generator_districts_1_desc: "Diese Anlage spielt beim Aufbau neuer Generatorendistrikte eine unterstützende Rolle, indem sie eine grundlegende Netzinfrastruktur und Energieverarbeitungssysteme bereitstellt."
 building_generator_districts_2: "Umspannwerk-Relaiskomplex"
 building_generator_districts_2_desc: "Diese Einrichtung bietet eine breitere Unterstützung für die Entwicklung von Generatorendistrikten und erweitert die planetare Energieinfrastruktur durch Hochleistungsrelais, Transformatorenkomplexe und Netzstabilisierungsknoten."
 building_generator_districts_3: "Plasmaregulierungsarray"
 building_generator_districts_3_desc: "Eine Anlage, die dank stabilisierter Plasmaströme und Schaltkreisresonanzkontrollen die Energieerzeugung auf dem gesamten Planeten anregt."
 building_generator_districts_4: "Planetarer Nexus"
 building_generator_districts_4_desc: "Dieser Energie-Nexus koordiniert die planetare Energieerzeugung und ermöglicht es Generatorendistrikten, sich größtmöglich auszudehnen."
 ####################################
 #Wonders
 ####################################
 building_xeno_zoo: "Alien-Zoo"
 building_xeno_zoo_plural: "Alien-Zoos"
 building_xeno_zoo_desc: "Ein Reservat, das der Erhaltung und dem Studium der lokalen Fauna gewidmet ist."
 building_fe_xeno_zoo: "Xeno-Reservat"
 building_hab_capital: "Habitatsverwaltung"
 building_hab_capital_desc: "Das administrative Zentrum des Habitats, das gleichzeitig sein Mittelpunkt und Sitz der lokalen Regierung ist."
 building_hab_capital_tooltip: "£mod_planet_max_districts_add£ Max. Distriktplätze durch riesige Himmelskörper: §G+0.25§!\n"
 building_hab_solar_power_processor: "Solarenergieprozessor"
 building_hab_solar_power_processor_desc: "Solarenergieprozessoren verteilen die Sonnenenergie, die in enormen Sonnenkollektorbänken auf der Außenhülle des Habitats gesammelt wird."
 building_hab_astro_mining_facility: "Weltraum-Bergbaumodul"
 building_hab_astro_mining_facility_desc: "Habitate verfügen über keine eigenen natürlichen Ressourcen. Sie hängen daher von diesen Einrichtungen ab, die Mineralien auf Asteroiden und Planetoiden in der Nähe abbauen."
 building_hab_agri_bay: "Landwirtschaftszone"
 building_hab_agri_bay_desc: "Eine Habitatssektion, die der Kultivierung verschiedener Pflanzen und Tiere zum Wohle der lokalen Bevölkerung vorbehalten ist."
 building_hab_cultural_center: "Vergnügungsviertel"
 building_hab_cultural_center_desc: "In diesem ausgedehnten Komplex können die Bewohner des Habitats ihre kulturellen und sozialen Bedürfnisse befriedigen."
 building_hab_laboratory_module: "Laborkomplex"
 building_hab_laboratory_module_desc: "Eine Habitatssektion, die ausschließlich Forschungsbemühungen vorbehalten ist."
 building_fe_xeno_zoo_desc: "Ein Reservat auf dem höchsten Stand der Technik, das die Umgebung der \"bewahrten\" Alien-Spezies perfekt imitiert."
 building_paradise_dome: "Paradieskuppel"
 building_paradise_dome_desc: "Eine vollständig geschlossene Wohnungskuppel mit einem in sich geschlossenen Ökosystem. Es ist ein wahres privates Paradies für die Reichen oder Glücklichen, die dort leben."
 building_monument: "Monument"
 building_monument_desc: "Ein Monument zu Ehren eines großen Herrschers."
 building_monument_proper: "Monument von [GetRulerName]"
 building_monument_desc_proper: "Ein kolossales Monument zu Ehren des großen [GetRulerName]."
 building_grand_mausoleum: "Großes Mausoleum"
 building_grand_mausoleum_desc: "Ein großes Mausoleum, gebaut für das Grab eines großen Herrschers."
 building_grand_mausoleum_proper: "[GetRulerName]s Großes Mausoleum"
 building_grand_mausoleum_desc_proper: "Das heilige Mausoleum des verehrten [GetRulerName]."
 building_grand_mausoleum_allowed_tooltip: "Muss einen §YHerrscher§! haben\nMuss eine\n§YPlanetenverwaltung§!,\n§Yplanetare Hauptstadt§! oder einen\n§YReichshauptwelt-Komplex§!\nauf dem Planeten haben."
 building_royal_gardens: "Königliche Gärten"
 building_royal_gardens_desc: "Ein riesiger Park zum Lustwandeln, in dem sich die Bevölkerung versammeln und in Erinnerung an den großen Herrscher frohlocken kann."
 building_royal_gardens_proper: "Königliche Gärten von [GetRulerName]"
 building_royal_gardens_desc_proper: "Ein fantastischer Garten, entwickelt vom großen [GetRulerName]."
 building_galactic_stock_exchange: "Galaktische Börse"
 building_galactic_stock_exchange_desc: "Indem wir am freien Handel mit Gütern und Dienstleistungen teilnehmen, ermöglichen wir eine spezialisiertere Wirtschaft. Jedes Individuum kann sich darauf konzentrieren, was es gut beherrscht, und seine restlichen Bedürfnisse über den Handel decken."
 building_ministry_production: "Produktionsministerium"
 building_ministry_production_desc: "Das Produktionsministerium arbeitet unermüdlich daran, die Produktion auf dem gesamten Planeten zu organisieren und rationalisieren."
 building_production_center: "Ressourcenverarbeitungszentrum"
 building_production_center_desc: "Eine riesige Anlage, die den Umgang mit Ressourcen und die Fertigung auf dem gesamten Planeten zentralisiert."
 building_supercomputer: "Planetarer Supercomputer"
 building_supercomputer_desc: "Ein einzelner kolossaler Supercomputer, der unglaublich komplexe Berechnungen durchführen kann und so die Forschungsleistung des gesamten Planeten verbessert."
 building_hyper_entertainment_forum: "Hyper-Entertainment-Forum"
 building_hyper_entertainment_forum_desc: "In diesem gewaltigen Unterhaltungskomplex werden Träume wahr. Einkaufszentren, Restaurants, Vergnügungsparks, virtuelle Arkaden, und vieles mehr. Sie träumen davon - wir haben es!"
 building_institute: "Forschungsinstitut"
 building_institute_desc: "Das Forschungsinstitut ist ein gewaltiger Komplex, in dem die besten Wissenschaftler unterschiedlicher Bereiche zusammenarbeiten und unübertreffbare Ergebnisse erzielen. Dies verbessert die Forschungsleistung des gesamten Planten."
 building_virtual_combat_arena: "Arena für Virtuelle Kämpfe"
 building_virtual_combat_arena_desc: "Die Arena für Virtuelle Kämpfe dienst sowohl der Unterhaltung als auch der Förderung des Gemeinschaftsgeists. Außerdem können lokale Armeen die Arena für Virtuelle Kämpfe für virtuelle Übungen benutzen."
 building_monument_purity: "Monument der Reinheit"
 building_monument_purity_desc: "$tech_purity_campaigns_desc$"
 building_orillium_factory: "Orillium-Sprengstoff-Fabrik"
 building_orillium_factory_desc: "Die einzigartigen Qualitäten von Orillium-Erz ermöglichen dessen Verarbeitung zu einem einfach abstimmbaren Sprengstoff, der besonders für kontrollierte Sprengungen im Untertagebau gut geeignet ist."
 building_pitharan_plant: "Pitharan-Düngerfabrik"
 building_pitharan_plant_desc: "Pitharan-Düngerfabriken produzieren Düngemittel, denen Pitharan-Staub als erntesteigerndes Zusatzmittel beigefügt wird."
 building_military_academy: "Militärakademie"
 building_military_academy_desc: "Militärakademien verbessern die lokalen Rekrutierungserfolge und bieten höhere Ausbildungsstandards."
 building_symbol_unity: "Symbol der Einigkeit"
 building_symbol_unity_desc: "$tech_symbol_unity_desc$"
 building_visitor_center: "Besucherzentrum"
 building_visitor_center_desc: "$tech_visitor_center_desc$"
 building_alien_sanctuary: "Alien-Schutzgebiet"
 building_alien_sanctuary_desc: "$tech_alien_sanctuary_desc$"
 building_psi_corps: "Psi-Korps"
 building_psi_corps_desc: "Psionisch veranlagte [GetIndividualNamePlural] werden aus unserem ganzen Reich zu einem Ort gebracht, wo sie ihre Fähigkeiten verbessern können.\n\n§YDas Psi-Korps ist dein [GetPsiCorpFriend]. Vertraue dem Korps.§!"
 psionic_bonus_workforce_from_telepaths_tt: "Die $mod_psionic_pop_bonus_workforce_mult$ skaliert mit der Anzahl an [telepath.GetIcon] [telepath.GetNamePlural]-Jobs"
 building_hive_synapse: "Schwarmsynapse"
 building_hive_synapse_desc: "Die Steigerung des Signales unseres Schwarmbewusstseins macht unsere Drohnen effizienter."
 building_xenology_center: "Xenologie-Zentrum"
 building_xenology_center_desc: "Indem wir Mitglieder von schwächeren Spezies an einem Ort sammeln, können wir sie studieren und sie als Beweis für unsere Überlegenheit ausstellen."
 building_symbol_purity: "Symbol der Reinheit"
 building_symbol_purity_desc: "$tech_symbol_unity_desc$"
 building_control_center: "Kontrollzentrum"
 building_control_center_desc: "Durch den Bau leistungsstarker Verarbeitungszentren können wir die Betriebseffizienz unserer Drohnen optimieren."
