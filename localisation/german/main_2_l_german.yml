 living_standard_psi_assimilation: "Transzendentes Erwachen"
 living_standard_psi_assimilation_tooltip: "Die Spezies hat ihr psionisches Potenzial entdeckt."
 living_standard_psi_assimilation_tooltip_delayed: "§LDer Vorhang ist gelüftet, aber der Schleier bleibt.§!"
 living_standard_psi_assimilation_cyborg: "$living_standard_psi_assimilation$"
 living_standard_psi_assimilation_cyborg_tooltip: "$living_standard_psi_assimilation_tooltip$\n\n§RUm die Reinheit von Geist und Körper zu bewahren, werden alle kybernetischen Eigenschaften entfernt.§!"
 living_standard_psi_assimilation_cyborg_tooltip_delayed: "$living_standard_psi_assimilation_tooltip_delayed$"
 living_standard_organic_trophy: "Vorgeschriebenes Verwöhnen"
 living_standard_organic_trophy_tooltip: "Dieser Lebensstandard verehrt eine kleine Population organischer Wesen als Ausstellungsstücke, die unaufhörlich verwöhnt werden.\n\n$ORGANIC_TROPHY_POP_EFFECTS$"
 living_standard_organic_trophy_tooltip_delayed: "§LWer ist eine gute Bio-Trophäe? Du bist eine gute Bio-Trophäe!§!"
 living_standard_chemical_bliss: "Chemowonne"
 living_standard_chemical_bliss_tooltip: "Zur Unterstützung des euphorischen Stumpfsinns, der durch eine Drogentherapie ausgelöst wird, sind Unterhaltungsmedien überall kostenlos erhältlich. Die Bewohner sind zufrieden, aber nutzlos.\n\n$living_standard_chemical_bliss_happiness_tooltip$"
 living_standard_chemical_bliss_tooltip_delayed: "§LSie alle heißen die Spiele und sonstigen Ablenkungen willkommen. Manche widersetzen sich den Drogen anfangs.§!"
 living_standard_decadent: "Dekadenter Lebensstandard"
 living_standard_decadent_tooltip: "Ein dekadenter Lebensstandard stellt privilegierten Mitgliedern der Gesellschaft mehr Ressourcen und Luxusgüter zur Verfügung.\n\n$DECADENT_LIVING_STANDARDS_POP_EFFECTS$"
 living_standard_decadent_tooltip_delayed: "§LWir verdienen nur das Beste vom Besten. Sie müssen dienen, wir müssen frohlocken.§!"
 living_standard_dystopian_society: "Dystopische Gesellschaft"
 living_standard_dystopian_society_tooltip: "In einer dystopischen Gesellschaft erhält nur die Herrscherschicht die erforderlichen Notwendigkeiten. Die unteren Schichten werden völlig vernachlässigt.\n\n$DYSTOPIAN_LIVING_STANDARDS_POP_EFFECTS$"
 living_standard_dystopian_society_tooltip_delayed: "§LDer gemeine Pöbel muss wissen, wo sein Platz ist. Wenn er das nicht tut, werden wir es ihm zeigen müssen.§!"
 living_standard_worker_ownership: "Mitarbeiterbeteiligung"
 living_standard_worker_ownership_tooltip: "Die $living_standard_worker_ownership$ garantiert jedem Arbeitnehmer eine demokratische Beteiligung an seinem Unternehmen. Die Lebenshaltungskosten und die soziale Verantwortung werden gleichmäßig unter allen Mitgliedern aufgeteilt."
 living_standard_worker_ownership_tooltip_delayed: "§LJeder hat eine Stimme, einen Anteil und eine Dividende in einer Gesellschaft, die durch unsere Arbeit aufgebaut wurde.§!"
