 GROUND_SUPPORT_HEADER: "$SUPPORT$ Orbitalbombardierung"
 GROUND_SUPPORT_STANCE_DESC: "§HOrbitalbombardierung§!\nMomentane Orbitalbombardierung ist auf \"$STANCE|Y$\" gestellt."
 bombardment_selective_desc: "Die $bombardment_selective$e Bombardierung zielt nur auf identifizierte Militäreinrichtungen ab und vermeidet unnötige Zivilopfer.\n- §YModerater§! Schaden an §YArmeen§!\n- §YModerater§! Schaden an §YPlaneten§!\n- §ELeichter§! Schaden an §YBewohnern§!\n- Wird §RKEINE§! unverteidigten Planeten angreifen\n- Wird §RNICHT§! die letzten §Y$MIN_POPS$§! Bewohner töten"
 bombardment_indiscriminate_desc: "Die $bombardment_indiscriminate$e Bombardierung zielt auf militärische und planetare Infrastruktur ohne Rücksicht auf Zivilopfer.\n- §HHoher§! Schaden an §YArmeen§!\n- §HHoher§! Schaden an §YPlaneten§!\n- §YModerater§! Schaden an §YBewohnern§!\n- Wird unverteidigte Planeten bombardieren, wenn die Richtlinie §H$policy_orbital_bombardment_accept_surrender$§! auf \"§H$orbital_bombardment_surrender_forbidden$§!\" steht\n- Wird §RNICHT§! die letzten §Y$MIN_POPS$§! Bewohner töten"
 bombardment_armageddon_desc: "Die $bombardment_armageddon$-Bombardierung deckt den ganzen Planeten durch schwereren Artillerieeinsatz ab und hat das Ziel, Zivilopfer zu maximieren.\n- §RMassiver§! Schaden an §YArmeen§!\n- §RMassiver§! Schaden an §YPlaneten§!\n- §RMassiver§! Schaden an §YBewohnern§!\n- Wird unverteidigte Planeten bombardieren\n- Kann Planeten zu leblosen Toten Welten reduzieren"
 bombardment_raiding_desc: "Die $bombardment_raiding$-Bombardierung richtet sich gegen feindliche Bevölkerungszentren und setzt dabei spezialisierte Überfallkommandos ein, die das ansässige Volk entführen und zurück zu unseren Welten bringen, um sie dort arbeiten zu lassen.\n- §ELeichter§! Schaden an §YArmeen§!\n- §ELeichter§! Schaden an §YPlaneten§!\n- Wird Bewohner wenn möglich §Yentführen§!, anstatt sie zu töten\n- Wird §RNICHT§! den letzten Bewohner entführen oder töten. Jede Armee auf dem Planeten erhöht die Anzahl an beschützten Bewohnern."
