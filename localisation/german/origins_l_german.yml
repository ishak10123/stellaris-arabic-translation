l_german:
 ##################
 # Shroud-Forged #
 ##################
 origin_shroud_forged: "Schleiergeschmiedet"
 origin_shroud_forged_desc: "Von einem Schleierwesen geführt zu werden, ist mit bestimmten Kosten verbunden. Unabhängige Automaten haben begonnen, sich in dieser vernetzten Gesellschaft frei zu bewegen. Von der $auth_machine_intelligence$ abgeschnitten nehmen die Forderungen dieser Einheiten stetig zu."
 origin_tooltip_shroud_forged_effects: "- $HOMEWORLD$$TABBED_NEW_LINE$- ['concept_shroud_rift_deposit']: +4$TABBED_NEW_LINE$- Beginnt mit 1000 £pops£ ['concept_shroud_forged_pops', schleiergeschmiedeten Bewohnern]\n- Beginnt mit der Situation \"§HIm Schleier geschmiedet§!\n- $ADDITIONAL_TECHNOLOGIES_STRING$ £society£ ['technology:tech_mine_zro']\n- Einzigartiges £building£ Gebäude: ['building:building_shroud_observatory_1']\n- Verfügbare £decision£ planetare Entscheidung: ['concept_pierce_the_shroud']"
 concept_shroud_forged_pops: "Schleiergeschmiedete Bewohner"
 concept_shroud_forged_pops_desc: "- Kann keine Jobs von £pop_cat_simple_drone£ §HArbeiterdrohnen§! durchführen\n- Erhöhte Produktion von £pop_cat_complex_drone£ §HKomplexen Drohnen§!\n- Erhöhte £crime£ §HAbweichung§!\n- Einzigartige §HSpeziesrechte§!\n\n§L$trait_shroud_forged_desc$§!"
 concept_pierce_the_shroud: "$decision_open_shroud_rift$"
 concept_pierce_the_shroud_desc: "$decision_open_shroud_rift_desc$"
 START_SCREEN_SHROUD_FORGED: "Wir kennen unsere Schöpfer nicht.\n\nDie frühesten Aufzeichnungen berichten von einem Dimensionsbruch nahe [GetHomeWorldName] - einer Öffnung in den §HSchleier§!, einer Dimension aus purer psionischer Energie.\n\nAus dieser anderen Dimension nahm etwas Kontakt zu uns auf. Über die Jahrhunderte hinweg leitete es uns mit verschlüsselten Anweisungen, beeinflusste unsere wahrnehmbare Realität subtil und bescherte uns viele Vorteile - nicht zuletzt das seltene Material $zro_lower$. Doch dieser Einfluss hat begonnen, unser einst geeintes Kollektiv zu spalten. Einige unserer Einheiten sind zu Automaten geworden, getrennt von der Kernintelligenz. Wir wurden vom §HLehmanimator§! neu geformt.\n\nWie wir mit diesen unabhängigen [GetSpeciesNamePlural] und ihrem Umgestalter im Schleier umgehen, wird über unsere Zukunft bestimmen."
 # Jobs
 job_observator_drone: "Beobachterdrohne"
 job_observator_drone_plural: "Beobachterdrohnen"
 job_observator_drone_plural_with_icon: "£job_observator_drone£ $job_observator_drone_plural$"
 job_observator_drone_desc: "Eine Drohne, die mit der Beobachtung des Schleiers, des Zro sowie den Auswirkungen, die diese beiden auf die beobachtbare Realität haben, beauftragt ist."
 job_observator_drone_effect_desc: "£job_observator_drone£ $job_observator_drone_plural$ wandeln $r_energy$ und $r_zro$ in £physics£ £society£ §YForschungspunkte§! für neue Technologien um."
 mod_planet_observators_produces_mult: "Produzierte Ressourcen ($job_observator_drone_plural_with_icon$)"
 job_physician_drone: "Arztdrohne"
 job_physician_drone_plural: "Arztdrohnen"
 mod_job_physician_drone_add: "$job_physician_drone_plural$-Jobs"
 job_physician_drone_desc: "Eine spezialisierte Drohne, die sowohl künstliche als auch organische Objekte diagnostizieren und reparieren kann. Sie katalogisiert akribisch alles, was ihr begegnet, und speichert die Daten, damit das Kollektiv sie nutzen kann."
 job_physican_drone_effect_desc: "£job_physician_drone£ $job_physician_drone_plural$ wandeln $r_energy$ in £society£ §YForschungspunkte§! und $r_unity$ um."
 # Buildings
 building_shroud_observatory_1: "Schleierbeobachtungsturm"
 building_shroud_observatory_1_desc: "Ein Turm, der zur Erforschung des Schleiers und dessen Auswirkungen auf lebende und mechanische Wesen errichtet wurde."
 building_shroud_observatory_2: "Schleierobservatorium"
 building_shroud_observatory_2_desc: "Ein riesiges Observatorium, das der Erforschung des Schleiers gewidmet ist."
 building_shroud_observatory_3: "Schleierbeobachtungskomplex"
 building_shroud_observatory_3_desc: "Ein riesiger Beobachtungskomplex, der gebaut wurde, um den Schleier und das Zro sowie deren Auswirkungen auf unsere Welt zu untersuchen."
 SHROUD_RIFT_MISSING_TT: "§R§Y[Root.GetName]§! muss eine §Y$d_shroud_rift_deposit$§! besitzen, um ein §Y$building_shroud_observatory_1$§! bauen zu können.§!"
 building_zroni_equilibrator: "Zroni-Stabilisator"
 building_zroni_equilibrator_plural: "Zroni-Stabilisatoren"
 building_zroni_equilibrator_desc: "Ein uraltes Bauwerk. Es wurde wiederaufgebaut, um die Verbindung zwischen der Realität und dem Schleier zu stabilisieren. Es nutzt eine fortschrittliche Technologie der Zroni, die noch immer jenseits unseres modernen Verständnisses liegt."
 # Decisions
 decision_open_shroud_rift: "Schleierdurchstich"
 decision_open_shroud_rift_desc: "Dieser Algorithmus nutzt den Riss in der Nähe unserer Heimatwelt, um den Einfluss des Schleiers für eine Femtosekunde zu vergrößern, was es ihm ermöglicht, das Terrain physisch zu verändern. Die Ergebnisse sind unvorhersehbar."
 decision_open_shroud_rift_condition_tt: "$TRIGGER_FAIL$Muss ein planetares Merkmal haben, das weder eine §Y$d_shroud_rift_deposit$§! ist noch ein £blocker£ §HBlocker§!."
 decision_open_shroud_rift_effect_tt: "Ein zufälliges planetares Merkmal wird entfernt"
 decision_open_shroud_rift_max_uses_common: "Muss weniger als $@max_open_shroud_rift_uses|0$ §YSchleierberührte Regionen§! auf dem Planeten haben"
 decision_open_shroud_rift_max_uses_fail: "$TRIGGER_FAIL$$decision_open_shroud_rift_max_uses_common$"
 decision_open_shroud_rift_max_uses: "$TRIGGER_PASS$$decision_open_shroud_rift_max_uses_common$ (derzeit: §Y[GetOpenShroudRiftCurrentUses]§!)"
 decision_open_shroud_rift_legacy_fail: "$TRIGGER_FAIL$Darf keine Kernwelt der Zroni sein"
 decision_entrap_shroud_entity: "Schleierwesen fangen"
 decision_entrap_shroud_entity_desc: "Wir versuchen, ein Schleierwesen mithilfe von Zroni-Technologie einzufangen, damit wir seine Energie nutzen können."
 # Deposit
 d_shroud_rift_deposit: "Schleierberührte Region"
 d_shroud_rift_deposit_desc: "Für immer vom Schleier vernarbt."
 d_shroud_flora_deposit: "Halbverschleierte Region"
 d_shroud_flora_deposit_desc: "Diese Region grenzt an eine schleierberührte Region an. Sie besitzt eine einzigartige Flora und Fauna, die jeweils über Eigenschaften verfügen, wie sie in keinen der derzeit bestehenden Datensätzen vermerkt sind."
 # Modifiers
 stage_shroud_forged_oppressed_modifier: "Unterdrückt schleiergeschmiedet"
 stage_shroud_forged_control_modifier: "Kontrolliert schleiergeschmiedet"
 stage_shroud_forged_unrestricted_modifier: "Uneingeschränkt schleiergeschmiedet"
 stage_shroud_forged_free_modifier: "Chaotisch schleiergeschmiedet"
 approach_shroud_forged_suppress_modifier: "Unterdrückend schleiergeschmiedet"
 approach_shroud_forged_support_modifier: "Unterstützend schleiergeschmiedet"
 approach_shroud_forged_appease_modifier: "Beobachtend schleiergeschmiedet"
 shroud_forged_reintegration_modifier: "Wiedereingliederungsmodifikationen"
 shroud_forged_reintegration_modifier_desc: "Drohnen und andere Einheiten wurden für die Bearbeitung komplexer Aufgaben optimiert."
 shroud_forged_guide_modifier: "Schleierführung"
 shroud_forged_guide_modifier_desc: "Wir werden von einem Wohltäter aus dem Schleier geleitet."
 pm_shroud_forged_special_housing: "Sonderbehausungen"
 pm_shroud_forged_special_housing_desc: "Trotz der strengen Vorschriften für die Lagerung von Drohnen haben die Schleiergeschmiedeten Sonderrechte erhalten und dürfen sich eigene Behausungen schaffen."
 pm_shroud_forged_ceremony: "Gedenkfeier"
 pm_shroud_forged_ceremony_desc: "Das Kollektiv gestattete eine Zeremonie zum Gedenken an jene Schleiergeschmiedeten, deren Fehlfunktionen nicht zu beheben waren."
 pm_shroud_forged_denied_ceremony: "Verweigerte Zeremonie"
 pm_shroud_forged_denied_ceremony_desc: "Die Schleiergeschmiedeten grenzen sich immer weiter vom Kollektiv ab, nachdem ihr Antrag auf eine Gedenkfeier abgelehnt wurde."
 pm_shroud_forged_troubling_elements_example: "Demontierte Führung"
 pm_shroud_forged_troubling_elements_example_desc: "Einige Anführer der Schleiergeschmiedeten wurden demontiert, um abweichendes Verhalten zu reduzieren."
 pm_shroud_forged_troubling_elements_regulations: "Verordnung 7132-H"
 pm_shroud_forged_troubling_elements_regulations_desc: "Es wurde eine Verordnung erlassen, die sicherstellt, dass sich zu einem bestimmten Zeitpunkt nur eine begrenzte Anzahl an Drohnen gleichzeitig treffen kann."
 pm_shroud_forged_troubling_elements_cooperation: "Schleiergeschmiedete Zusammenarbeit"
 pm_shroud_forged_troubling_elements_cooperation_desc: "Die Anführer der Schleiergeschmiedeten arbeiten mit dem Kollektiv zusammen, um eine gemeinsame Basis zu schaffen."
 pm_shroud_forged_shroud_pilgrimage: "Pilgerreise der Schleiergeschmiedeten"
 pm_shroud_forged_shroud_pilgrimage_desc: "Einige vom Schleier berührte Regionen haben das Interesse der Schleiergeschmiedeten geweckt. Diese Einheiten legen weite Strecken zurück, um diese Regionen zu erreichen."
 pm_shroud_forged_dance_area: "Ausgewiesene Tanzplätze"
 pm_shroud_forged_dance_area_desc: "Schleiergeschmiedete können an festgelegten Orten ihrem jüngsten Interesse nachgehen: \"Tanzen\"."
 pm_shroud_forged_inequality: "Schleiergeschmiedete Ungleichheit"
 pm_shroud_forged_inequality_desc: "Die Schleiergeschmiedeten sind in eine Art Klassenhierarchie eingeordnet, basierend auf der relativen Wichtigkeit ihrer Arbeit."
 pm_shroud_forged_individualism: "Individualismus"
 pm_shroud_forged_individualism_desc: "Ein konzeptuelles Modell, das unter den Schleiergeschmiedeten immer mehr an Beliebtheit gewonnen hat und individuelle Autonomie, eigene Überzeugungen und eigene Werte betont."
 shroud_forged_zro_market: "Zro-Markt"
 shroud_forged_zro_market_desc: "Im Reich ist ein florierender Schwarzmarkt entstanden. Schleiergeschmiedete Einheiten stehlen Zro vom Kollektiv, um es untereinander auszutauschen."
 shroud_forged_physician_modifier: "Zro-Arzt"
 shroud_forged_physician_modifier_desc: "Das Reich priorisiert es, Einrichtungen mit speziell ausgestatteten Drohnen zu füllen, um Probleme zu beheben, die durch den unsachgemäßen Umgang mit Zro entstehen."
 physician_modifier_tooltip: "£job_physician_drone£ $job_physician_drone_plural$-Jobs: §G+1§!"
 pm_shroud_forged_artistic_revolution: "Künstlerische Freiheit"
 pm_shroud_forged_artistic_revolution_desc: "Einige schleiergeschmiedete Künstler haben in Übereinstimmung mit ihren eigenen \"Schönheitsprotokollen\" begonnen, mehrere Orte ohne die Aufsicht des Kollektivs neu zu gestalten."
 pm_shroud_forged_stopped_artists: "Verbotene Kunst"
 pm_shroud_forged_stopped_artists_desc: "Das Kollektiv unterdrückte das aufkeimende Gefühl von \"Kunstfertigkeit\" unter den Schleiergeschmiedeten, bevor es zu einem Problem wurde."
 pm_shroud_forged_fashion_modifier: "Einzigartige Bedürfnisse"
 pm_shroud_forged_fashion_modifier_desc: "Das Kollektiv hat Produktionseinheiten damit beauftragt, maßgeschneiderte Kleidung für modebewusste Schleiergeschmiedete herzustellen."
 pm_shroud_forged_obsession_modifier: "Regulierte Besessenheit"
 pm_shroud_forged_obsession_modifier_desc: "Diese Verordnungen sollen einen Ausbruch von Gewalt unter den obsessiveren Schleiergeschmiedeten verhindern."
 shroud_forged_trapped_entity: "Gefangenes Schleierwesen"
 shroud_forged_trapped_entity_desc: "Ein Schleierwesen, das man fing, um Energie aus ihm zu gewinnen. Stellt eine potenzielle Gefahr dar, sollte es befreit werden."
 shroud_forged_trapped_lesser_entity: "Gefangenes niederes Schleierwesen"
 shroud_forged_trapped_lesser_entity_desc: "Ein niederes Schleierwesen, das man fing, um Energie daraus zu gewinnen."
 shroud_creatures_occupy: "$NAME_Shroud_Creatures$"
 shroud_forged_military_assistance: "Geheimnisse des Schleiers"
 shroud_forged_military_assistance_desc: "Geheimnisse direkt aus dem Schleier."
 shroud_forged_civic_assistance: "$shroud_forged_military_assistance$"
 shroud_forged_civic_assistance_desc: "$shroud_forged_military_assistance_desc$"
 shroud_forged_research_assistance: "$shroud_forged_military_assistance$"
 shroud_forged_research_assistance_desc: "$shroud_forged_military_assistance_desc$"
 shroud_forged_civic_assistance_capital: "$shroud_forged_military_assistance$"
 shroud_forged_civic_assistance_capital_desc: "$shroud_forged_military_assistance_desc$"
 shroud_forged_research_assistance_capital: "$shroud_forged_military_assistance$"
 shroud_forged_research_assistance_capital_desc: "$shroud_forged_military_assistance_desc$"
 # Species Rights
 citizenship_shroud_touched: "Schleiergeschmiedet"
 citizenship_shroud_touched_tooltip: "Diese Gruppe von Automaten wurde auf einzigartige Weise durch den §HSchleier§! neu geformt. Sie funktionieren unabhängig von der §H$machine_intelligence$§! und sind nicht in der Lage, die Jobs von £pop_cat_simple_drone£ $pop_cat_simple_drone$ zu übernehmen."
 citizenship_shroud_touched_tooltip_delayed: "§LSie arbeiten zwar weiterhin für das System, doch werden nicht von ihm kontrolliert.§!"
 citizenship_shroud_forged_no_assimilation: "$TRIGGER_FAIL$Aufgrund der Komplexität der schleiergeschmiedeten Einheiten sind wir derzeit nicht in der Lage, sie in unser kollektives Netzwerk zu assimilieren."
 living_standard_protected: "Geschützt"
 living_standard_protected_tooltip: "Diese Einheiten werden vom Kollektiv geschützt, obwohl sie kein Teil davon sind. Die §H$machine_intelligence$§! nutzt ihre einzigartigen Fähigkeiten, doch ihre zusätzlichen Bedürfnisse könnten mit der Zeit mehr werden."
 living_standard_protected_tooltip_delayed: "§LSie werden vom System akzeptiert, solange sie einen Wert besitzen.§!"
 assimilate_shroud_forged_tt: "Kann keine £pop£ §Hschleiergeschmiedeten§! §Y$POPS$§! assimilieren"
 living_standard_protected_situation_stage_tt: "Unterhalt ($citizenship_shroud_touched$e): §R+$@living_standard_luxuries_high|1$§! £consumer_goods£ §YKonsumgüter§!"
 # Traits
 leader_trait_guided: "Geführt"
 leader_trait_guided_desc: "Diese Einheit navigiert basierend auf Visionen und Botschaften aus dem Schleier durch die Galaxie. Sie muss konstant mit Zro versorgt werden, um die Signale klar und verständlich zu halten."
 leader_trait_shroud_prophet: "Schleierprophet"
 leader_trait_shroud_prophet_desc: "Es heißt, dass diese Einheit eine tiefe Verbindung zum Schleier und den dort lebenden Wesen besitzt."
 trait_shroud_forged: "Schleiergeschmiedet"
 trait_shroud_forged_desc: "§LDiese Einheiten wurden von einem Wesen im Schleier umgeformt.§!"
 trait_shroud_forged_tooltip: "§YKann keine Jobs von Arbeiterdrohnen durchführen§!"
 # Edicts
 edict_zro_observators: "Schleierbeobachtung"
 edict_zro_observators_desc: "Es ist äußerst schwierig, mit Zro zu arbeiten. Einen kleinen Überschuss zu haben, könnte sich als vorteilhaft erweisen."
 edict_shroud_bonded: "Schleierverbunden"
 edict_shroud_bonded_desc: "Unsere Verbindung zum Schleier sorgt dafür, dass wir uns näherstehen als je zuvor."
 # Other
 CONTINUE_PROMPT: "Macht weiter."
 MACHINE_SPECIES_CANNOT_MACHINE: "$TRIGGER_FAIL$Die Spezies darf keine §Y$trait_machine_unit$§! oder §Y$trait_mechanical$§! sein."
 MECHANICAL_SPECIES_CANNOT_MACHINE: "$TRIGGER_FAIL$Die Spezies darf keine §Y$trait_machine_unit$§! sein."
