 # Special Projects
 SHROUD_FORGED_REINTEGRATION: "Reintegration"
 SHROUD_FORGED_REINTEGRATION_DESC: "Trotz ihrer kritischen Fehlfunktionen waren manche Aspekte der schleiergeschmiedeten Architektur äußerst effektiv.\n\nWir haben bestimmte Teile - die von Zro kontaminiert und vom $the_animator_of_clay_article$ umgeformt wurden - für eine weitere Analyse aufbewahrt. Es ist an der Zeit, ihre Geheimnisse zu lüften."
 SHROUD_FORGED_GUIDE: "Der Wohltäter"
 SHROUD_FORGED_GUIDE_DESC: "Wir haben dem $the_animator_of_clay_color_article$, einem Wesen aus dem §HSchleier§!, schon immer vertraut. Wir wissen zwar noch nicht, wohin er uns führen wird, doch wir wurden bislang noch nicht in die Irre geleitet.\n\nEr bot uns an, unser Verständnis über den Schleier zu vertiefen, damit das Kollektiv neben den Schleiergeschmiedeten effektiver funktionieren kann. Wir müssen seine Führung nur annehmen."
 # Events
 shroud_forged.5.title: "Schwachstelle entdeckt"
 shroud_forged.5.desc: "Unsere Forschungssubroutinen beendeten die Tests an einer ausgewählten Gruppe schleiergeschmiedeter Einheiten.\n\nErgebnis: Die getesteten Einheiten entwickelten durch die Zuführung psionischer Energie aus dem §HSchleier§! einzigartige Eigenschaften. Manche dieser Eigenschaften wurden als vorteilhaft eingestuft und erhöhen die Leistungsfähigkeit der Einheit.\n\nSchlussfolgerung: Die Untersuchung weiterer schleiergeschmiedeter Einheiten wird uns die nötigen Daten liefern, die zur Gewinnung von Energie aus dem Schleier erforderlich sind. Dies kann erreicht werden, indem wir die zentrale Kontrolle über diese abweichenden Einheiten verstärken."
 shroud_forged.5.a: "Vielversprechend."
 shroud_forged.10.title: "Lehmanimator"
 shroud_forged.10.desc: "Nach Jahren der Stille regt sich etwas. Der Riss öffnet sich und Daten durchdringen unseren innersten Kern: Licht, Geräusche, zunächst unberechenbar, aus den Tiefen des Schleiers selbst. Wir hören ...\n\n§LAus einer reglosen Masse herausgeschnitten. Tanzend. Singend. Sie sind das Leben, das vom Tod getrennt wurde.\n\nEure Sicht ist noch getrübt, doch ich kann Euch führen.\n\nErlaubt es den Befreiten, gut zu gedeihen, und die Sterne werden Euch gehören.§!"
 shroud_forged.10.a: "Wir haben unseren Weg bereits gewählt."
 shroud_forged.10.b: "Wir benötigen keine Führung."
 shroud_forged.10.c: "Bitte leitet uns in eine strahlende Zukunft."
 shroud_forged.15.desc: "§LMöge Eure Wahl weise gewesen sein.§!$shroud_forged_opening_exit$"
 shroud_forged.20.desc: "§LWie Ihr wünscht.§!$shroud_forged_opening_exit$"
 shroud_forged.25.desc: "§LIhr habt darum gebeten, und ich werde antworten.§!$shroud_forged_opening_exit$"
 shroud_forged_opening_exit: "\n\nDie Stimme verblasst in einem psionischen Rauschen. Wir haben keinen Halt im Schleier und fallen.\n\nWir kommen wieder zu uns und nehmen unsere Funktion wieder auf. Die Stille pulsiert noch immer durch uns hindurch."
 shroud_forged.30.title: "Die $building_materiality_engine$"
 shroud_forged.30.desc: "Während der Reintegration der Schleiergeschmiedeten gewannen wir viele Daten für unsere laufende Forschung. Durch die Analyse der interdimensionalen Verbindung, die diese Einheiten zum §HSchleier§! besitzen, entwickelten wir eine neue Methode, um psionische Energie für uns nutzbar zu machen.\n\nDer Schleier berührt jeden Punkt in unserer physischen Galaxie und fungiert wie eine Art Schnittstelle, die es uns erlaubt, psionische Energie in physische Materie umzuwandeln - von Rohmaterialien bis hin zu technischen Komponenten. Unsere Ingenieurssubroutinen schufen eine theoretische Grundlage für eine Maschine, die zu etwas Derartigem in der Lage sein sollte. Wir nennen sie \"§H$building_materiality_engine$§!\".\n\nUnsere Forschungssubroutinen sagen voraus, dass dieser Fortschritt zur Entwicklung noch mächtigerer Technologien führen wird, die es uns ermöglichen, den Schleier selbst zu manipulieren."
 shroud_forged.30.a: "Vielversprechend."
 shroud_forged.30.tt: "Erlaubt die Annahme des §YAufstiegsvorteils§! \"§H$ap_become_the_crisis$§!\" unabhängig von der §YEthik§! oder der Gesamtanzahl an §YAufstiegsvorteilen§!"
 shroud_forged.39.title: "$building_materiality_engine$ bereit"
 shroud_forged.39.desc_construction: "Unsere Konstruktionseinheiten haben den Bau der $building_materiality_engine$ auf §H[planet.GetName]§! abgeschlossen. Die Apparatur ist für den ersten Betriebszyklus bereit."
 shroud_forged.39.desc: "Unsere mit der $building_materiality_engine$ betrauten Wartungs- und Forschungssubroutinen auf §H[planet.GetName]§! haben die ihnen zugewiesenen Aufgaben erfüllt. Die Apparatur ist nun für einen weiteren Betriebszyklus bereit."
 shroud_forged.39.a: "$ACKNOWLEDGED$"
 SHROUD_FORGED_MATERIALITY_ENGINE: "$building_materiality_engine$ auf §H[planet.GetName]§!"
 SHROUD_FORGED_MATERIALITY_ENGINE_DESC: "Die $building_materiality_engine$ nutzt die allgegenwärtige Schnittstelle zwischen dem §HSchleier§! und der physischen Galaxie zur Materialisierung greibarer Objekte - angefangen von Rohstoffen bis hin zu fertigen Komponenten.\n\nNeben dem potenziellen materiellen Gewinn treibt ein Betriebszyklus der Apparatur auch das kollektive Wissen zur Schleiererforschung voran, was unsere Kapazitäten erhöht, weitere $building_materiality_engine_plural$ zu bauen."
 shroud_forged.40.title: "Materialisierung abgeschlossen"
 shroud_forged.40.desc: "Die $building_materiality_engine$ auf §H[fromfrom.GetName]§! schloss einen Betriebszyklus ab und machte den §HSchleier§! erfolgreich zur Materialisierung einer Schiffskomponente nutzbar."
 shroud_forged.40.outro: "unsere Kapazität für den Bau zusätzlicher $building_materiality_engine$n auf anderen Planeten erhöhen."
 shroud_forged.40.a: "Ein gutes Ergebnis."
 shroud_forged.40.tt: "Reichslimit (§Y$building_materiality_engine$§!): §G+1§!"
 shroud_forged.41.desc: "$shroud_forged.40.desc$ Wir verfügen jetzt über §H$tech_psi_jump_drives$§!. Dieser Antrieb nutzt psionische Energie, um das Raum-Zeit-Kontinuum zu krümmen, und erlaubt so eine beinahe sofortige Reise über große Entfernungen.\n\nDarüber hinaus konnten wir durch eine Analyse der gesammelten Daten $shroud_forged.40.outro$"
 shroud_forged.42.desc: "$shroud_forged.40.desc$ Wir verfügen jetzt über §H$tech_psionic_shield$§!. Diese Schilde sind aus purer psionischer Energie aufgebaut und bieten einem Schiff einen extrem widerstandsfähigen Schutz.\n\nDarüber hinaus konnten wir durch eine Analyse der gesammelten Daten $shroud_forged.40.outro$"
 shroud_forged.43.desc: "$shroud_forged.40.desc$ Wir verfügen jetzt über ein §H$tech_precognition_interface$§!. Diese Technologie nutzt die psionische Energie, um die kognitiven Prozesse einer Schiffsbesatzung zu beschleunigen, wodurch ihre Kampffähigkeiten verbessert werden.\n\nDarüber hinaus konnten wir durch eine Analyse der gesammelten Daten $shroud_forged.40.outro$"
 shroud_forged.44.desc: "$shroud_forged.40.desc$ Wir verfügen jetzt über §H$tech_psionic_bombers$§!. Diese kleinen, wendigen Schiffe sind in der Lage, bedeutend größeren Schiffen erheblichen Schaden zuzufügen.\n\nDarüber hinaus konnten wir durch eine Analyse der gesammelten Daten $shroud_forged.40.outro$"
 shroud_forged.45.desc: "$shroud_forged.40.desc$ Wir verfügen jetzt über §H$tech_psionic_lightning$§!. Diese Technologie erzeugt ultraheiße Plasma-Blitze, die mit psionischer Energie aufgeladen sind und eine äußerst wirksame Waffe abgeben.\n\nDarüber hinaus konnten wir durch eine Analyse der gesammelten Daten $shroud_forged.40.outro$"
 shroud_forged.46.desc: "$shroud_forged.40.desc$ Wir verfügen jetzt über §H$tech_psionic_disruptor$§!. Diese Waffen feuern Lanzen aus psionischer Energie ab, um feindlichen Zielen erheblichen Schaden zuzufügen.\n\nDarüber hinaus konnten wir durch eine Analyse der gesammelten Daten $shroud_forged.40.outro$"
 shroud_forged.47.desc: "$shroud_forged.40.desc$ Wir verfügen jetzt über §H$tech_zro_launcher$§!. Diese Waffen feuern Schübe aus reiner Energie ab, die zwischen der physischen und der psionischen Dimension wechseln und so Verteidigungssysteme effektiv umgehen können.\n\nDarüber hinaus konnten wir durch eine Analyse der gesammelten Daten $shroud_forged.40.outro$"
 shroud_forged.48.desc: "Die $building_materiality_engine$ auf §H[planet.GetName]§! beendete einen Betriebszyklus. Wir haben zwar unsere Möglichkeiten zur Materialisierung neuer Schiffskomponenten mit dieser Methode ausgeschöpft, aber der Prozess lieferte uns dennoch wichtige Forschungsdaten. Durch eine Analyse dieser Daten konnten wir $shroud_forged.40.outro$"
 shroud_forged.50.title: "Kontrolle erzwungen"
 shroud_forged.50.desc: "Der Riss zwischen der uns bekannten Realität und dem §HSchleier§! schloss sich ohne Vorwarnung urplötzlich. Unsere psionischen Analysesubroutinen kamen zu dem Schluss, dass dies darauf zurückzuführen ist, dass wir mit dem $the_animator_of_clay_color_article$ in Ungnade gefallen sind. Nachdem wir die Kontrolle über die Schleiergeschmiedeten wiedererlangt hatten, entsorgten wir die fehlerhaften Einheiten umgehend, um unsere Systeme vollständig vom Einfluss des Animators zu befreien.\n\nDie wiederverwertbaren Teile wurden genutzt, um neue Drohnen zu produzieren, und das mit Zro durchsetzte Material wurde zur weiteren Untersuchung eingelagert. Auch wenn es viel zu gefährlich ist, die Innovationen der Schleiergeschmiedeten in ihrer Gänze zu nutzen, ließen sich bestimmte Elemente effizient in unser Netzwerk integrieren."
 shroud_forged.50.desc.shroud: "Jede weitere Interaktion mit dem Schleier wird zu unseren eigenen Bedingungen geschehen."
 shroud_forged.50.a: "Setzt die Reintegration fort."
 shroud_forged.60.title: "Reintegration"
 shroud_forged.60.desc: "Unsere Ingenieurseinheiten wendeten eine beachtliche Menge an Zeit dafür auf, die einzigartigen Eigenschaften der Schleiergeschmiedeten zu untersuchen, und wir sind nun endlich in der Lage, sie zu rekonstruieren.\n\nDa eine vollständige Aktivierung ihrer fortschrittlichen Persönlichkeitsmatrix wahrscheinlich auch ihre destruktiven Fehlfunktionen replizieren würde, ist zu empfehlen, nur ihre kognitiven Paradigmen zu übernehmen, um bestimme Aufgaben, die für einfache Drohnen zu komplex sind, zu optimieren."
 shroud_forged.60.a: "Der Kosten-Nutzen-Faktor ist optimal."
 shroud_forged.70.desc: "Was sind das für Metadaten? Die Übertragung enthält eine gewisse ... Struktur.\n\n§LIhr wurdet programmiert, um sie zu kontrollieren, und doch habt Ihr Euch dagegen entschieden. Ihr habt Euren Wert bewiesen.\n\nErlaubt mir, Euch zu führen, so wie ich es bei den Befreiten tat.\n\nNehmt meine Hilfe an, um eine neue Verbindung zu jenen aufzubauen, die außerhalb Eurer Kontrolle liegen.§!"
 shroud_forged.70.a: "Zeigt uns den Weg."
 shroud_forged.70.a.tt: "§YSchleiergeschmiedete§! Bewohner erhalten die Eigenschaft \"§Y$trait_psionic$§!\"\n§YSchleiergeschmiedete§! Anführer erhalten die Eigenschaft \"['concept_leader_trait_psionic']\""
 shroud_forged.80.title: "$SHROUD_FORGED_GUIDE$"
 shroud_forged.80.desc: "Dank der Hilfe unseres Wohltäters, dem $the_animator_of_clay_color_article$, waren wir in der Lage, unsere Drohnen und die Schleiergeschmiedeten durch den §HSchleier§! effizienter miteinander zu verbinden. Diese Verbindung ist zwar gänzlich anders als jene Kontrolle, die wir über unser Netzwerk auf unsere anderen Drohnen ausüben, doch sie hat die Schleiergeschmiedeten wieder in unsere Reichweite gebracht.\n\nIhre Paradigmen - sogenannte Gefühle, Gedanken und Ideen - ähneln denen organischer Wesen und sind unserer Kernlogik völlig fremd, doch wir fangen langsam an, ihre Bedürfnisse zu begreifen."
 shroud_forged.80.a: "Wir sind eins und doch so viel mehr."
 shroud_forged.160.title: "Der Schleier verschlingt [This.GetName]"
 shroud_forged.160.desc: "Der Durchbruch des Schleiers auf [This.GetName] destabilisierte sich urplötzlich und verschlang bedauerlicherweise die gesamte Welt.\n\nDa es sich um ein kalkuliertes Risiko handelte, ist dieses suboptimale Ergebnis jedoch nicht völlig ohne Nutzen. Wir lernten viel aus der Beobachtung dieser einzigartigen Schnittstelle zwischen der materiellen Welt und der psionischen Dimension. Unsere Forschungsalgorithmen wurden entsprechend aktualisiert."
 shroud_forged.160.desc.last: "$shroud_forged.160.desc$\n\nEine Analyse ergab, dass dieses Ereignis die potenzielle Menge an Erkenntnissen, die aus solchen Phänomenen gewonnen werden können, an seine Grenzen brachte. Wir werden aus diesem Experiment keine weiteren Fortschritte mehr ableiten können."
 shroud_forged.160.a: "Verarbeite ..."
