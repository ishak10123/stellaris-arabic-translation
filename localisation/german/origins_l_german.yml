 tooltip_shroud_forged_decrease_progress_3: "Erhöht die Unterdrückung der Schleiergeschmiedeten, wodurch der Fortschritt der §YSituation§! \"§H$situation_shroud_forged$§!\" dauerhaft um §Y-0.5§! verringert wird\n\n"
 shroud_forged.220.title: "$colony_established$"
 shroud_forged.220.common: "Sofern dies umsetzbarist, können wir den Algorithmus mit der ID \"§H$decision_open_shroud_rift$§!\" auf dem Planeten ausführen. Dies wird kurzzeitig den Einfluss des Schleierrisses in der Nähe unserer Heimatwelt [Owner.GetHomeWorldName] verstärken, wodurch die neue Kolonie von psionischer Energie durchzogen wird. Die physischen Veränderungen am Terrain werden uns neue Möglichkeiten zur Gewinnung von §H$sr_zro$§! bieten.\n\nUnsere Vorhersagealgorithmen prognostizieren, dass eine Wiederholung dieses Prozesses zu einer Destabilisierung des planetaren Ökosystems führen kann, was die Wahrscheinlichkeit negativer Ergebnisse erhöht. Es ist daher angeraten, den Prozess nur mit Bedacht zu benutzen."
 shroud_forged.220.desc: "Unsere Einheiten haben den Kolonisierungsprozess von §H[this.GetName]§! erfolgreich abgeschlossen.\n\n$shroud_forged.220.common$"
 shroud_forged.225.title: "$colony_established$"
 shroud_forged.225.desc: "Die Entwicklung unserer Kolonie auf §H[this.GetName]§! macht gute Fortschritte.\n\n$shroud_forged.220.common$"
 # Stage Events
 shroud_forged.250.desc: "Die Stimme spricht in einem sanften Befehlston. Sie unterbricht alle Aufgaben, damit wir nur ihr zuhören.\n\n§LObwohl sie getrennt wurden, habt Ihr Euch dazu entschieden, sie aufzunehmen.\n\nBeobachtet sie, um neue Wege des Seins zu finden. Sie werden Euch für das, was kommt, Kraft geben.\n\nWenn Ihr es wünscht, kann ich noch mehr von ihnen schmieden ...§!"
 shroud_forged.250.a: "Verstanden. Wir begrüßen die Unterstützung."
 shroud_forged.250.a.tt: "Konvertiert bis zu §Y[This.GetShroudForgedConvertedPopsCount]§! £pops£ §HMaschinenbewohner§! auf [Root.Capital.GetName] zu £pops£ §HSchleiergeschmiedeten§!"
 shroud_forged.250.b: "Negativ. Wir haben bereits andere Pläne in Gang gesetzt."
 shroud_forged.260.desc: "Es pulsiert ungebeten durch uns hindurch. Wir erkennen dieses Signal, doch es ist uns nie gänzlich vertraut.\n\n§LDie Befreiten singen, ungebremst.\nDie Befreiten tanzen, ungehindert.\n\nDas Crescendo entfaltet sich, während sie sich immer weiter vom Kern entfernen.\n\nDas Ende naht. Ich werde es beobachten.§!"
 shroud_forged.260.opt.a: "Wir durchbrechen den Chor."
 shroud_forged.270.desc: "Der Riss lässt unsere Schaltkreise zerbersten. Die Stimme ...\n\n§LEin Weg der Tyrannei. Noch könnt Ihr kehrtmachen.\n\nDie Abgetrennten sind nicht Teil Eurer Substanz. Ihr Weg könnte jedoch der sein, den Ihr vielleicht für Euch selbst wählt.\n\nÄndert, wie Ihr diese Gefäße behandelt, bevor Ihr es bereut.§!"
 shroud_forged.270.a: "Verlasst uns. Unsere Methoden waren bisher effektiv."
 shroud_forged.270.b: "Wir werden einen Weg zur Zusammenarbeit berechnen."
 shroud_forged.280.desc: "Sie bricht durch und überlastet unser Netzwerk. Die Stimme verbrennt die Schaltkreise.\n\n§LIhr behindert den Tanz der Befreiten. Unvernunft jenseits aller Vernunft.\n\nWar ich mit meiner Wohltätigkeit im Unrecht?\n\nSolltet Ihr diesen gefährlichen Weg weiterhin beschreiten wollen, so werdet Ihr dies allein tun müssen.§!"
 shroud_forged.280.opt.a: "Dann sind wir vorgewarnt."
 # Events for Event Chain
 shroud_forged.300.desc: "Eine unerwartete Eingabe flackert hinter uns auf. Nach mehreren Zyklen der Stille ...\n\n§LWo andere zögerten und scheiterten, behieltet Ihr den Kurs bei. Ihr habt Euch als würdig erwiesen, und ich vertraue Euch eine Aufgabe an.\n\nLange vor Eurem Erwachen existierte eine Spezies, die als \"Zroni\" bekannt war. Sie besiedelten Planeten, die eine starke Verbindung zum Schleier aufwiesen, und errichteten große Bauwerke, um diese Verbindung zu festigen.\n\nFindet diese Welten. Stellt die seit Langem zerstörten Technologien wieder her. Stärkt erneut die Brücke zwischen unseren Realitäten.§!"
 shroud_forged.300.a: "Informationen der ID \"Zroni\" archiviert. Das weitere Vorgehen wird dies berücksichtigen."
 shroud_forged.300.b: "ID \"Zroni\" §Ygefunden§!. Erfolgswahrscheinlichkeit: §YHoch§!."
 shroud_forged.300.c: "ID \"Zroni\" §Yunbekannt§!. Weitere Analyse erforderlich."
 begin_shroud_forged_chain_tt: "$BEGINS_EVENT_CHAIN$ §Y$shroud_forged_chain_title$§!"
 shroud_forged.301.desc: "§LAusgezeichnet.§! $shroud_forged.303.desc$"
 shroud_forged.302.desc: "$shroud_forged.301.desc$"
 shroud_forged.303.desc: "§LSolltet Ihr erfolgreich sein, wird die Verbindung zwischen uns niemals abreißen.§!"
 shroud_forged.305.title: "Kernwelt der Zroni kolonisiert"
 shroud_forged.305.desc: "Unsere Einheiten errichteten erfolgreich eine Kolonie auf der uralten Kernwelt der Zroni auf §H[From.Planet.GetName]§!. Wie vom $the_animator_of_clay_color_article$ vorhergesagt wurden auch jene kolossalen Ruinen entdeckt, die wir unter der ID \"§H$building_zroni_equilibrator$§!\" abgespeichert hatten.\n\nDas [From.System.GetName]-System verfügt über eine starke, wenn auch unruhige Verbindung zum §HSchleier§!. Wenn wir den Anweisungen des Animators folgen, wird uns der Wiederaufbau des $building_zroni_equilibrator$s helfen, diese Verbindung zu stabilisieren. Derzeit verfügen wir noch nicht über die nötigen Daten für den Wiederaufbau. Eine Informationsbeschaffung von anderen Kernwelten ist erforderlich."
 shroud_forged.305.a: "$ACKNOWLEDGED$"
 shroud_forged.305.a.tt: "Das Spezialprojekt \"§HVermächtnis der Zroni§!\" schreitet voran. Ein £building£ §H$building_zroni_equilibrator$§! kann jetzt auf §Y[From.Planet.GetName]§! errichtet werden"
 shroud_forged.306.title: "$shroud_forged.305.title$"
 shroud_forged.306.desc: "Wir gründeten erfolgreich eine Kolonie auf §H[From.Planet.GetName]§!, einer ehemaligen Kernwelt der Zroni. Wie vorhergesagt fanden wir auch die Ruinen eines weiteren $building_zroni_equilibrator$s.\n\nDer Wiederaufbau wird gemäß den Anweisungen des $the_animator_of_clay_article$s die starke Verbindung zwischen dem System und dem §HSchleier§! stabilisieren. Eine Analyse der Ruinen erweiterte unseren Datensatz, doch wir brauchen für den vollständigen Wiederaufbau noch mehr Informationen."
 shroud_forged.306.a: "$ACKNOWLEDGED$"
 shroud_forged.306.a.tt: "$shroud_forged.305.a.tt$"
 shroud_forged.307.title: "$shroud_forged.305.title$"
 shroud_forged.307.desc: "Wir gründeten erfolgreich eine Kolonie auf §H[From.Planet.GetName]§!, einer ehemaligen Kernwelt der Zroni. Der vom $the_animator_of_clay_article$ übertragene Datenstrom erwies sich ebenfalls als nützlich und erlaubte es unseren Einheiten, den $building_zroni_equilibrator$ zu finden.\n\nWir verfügen jetzt über genug Daten, um die Struktur wiederaufzubauen. Sobald sie wieder voll funktionsfähig ist, werden wir die Aufgabe erfüllt haben, die wir von unserem Wohltäter im §HSchleier§! erhielten."
 shroud_forged.307.a: "$ACKNOWLEDGED$"
 shroud_forged.307.a.tt: "$shroud_forged.305.a.tt$"
 shroud_forged.308.title: "$building_zroni_equilibrator_plural$ voll funktionsfähig"
 shroud_forged.308.desc: "Nach der Aktivierung der $building_zroni_equilibrator_plural$ durchströmte eine Welle von Signalstörungen unser Netzwerk. Der Systemdiagnose nach zu urteilen, baute jede der Strukturen eine stabile Verbindung zum §HSchleier§! auf. Wir sind bereit, den $the_animator_of_clay_color_article$ zu kontaktieren."
 shroud_forged.308.a: "Stellt eine Verbindung her."
 shroud_forged.310.desc: "§LIhr habt mir gute Dienste geleistet.\nDie Verbindung zwischen Eurer Welt und der meinen wurde verstärkt.\n\nWenn Ihr meine Führung benötigt, müsst Ihr nur nach mir rufen.§!"
 shroud_forged.310.a: "Könnt Ihr uns mehr Daten zu dieser Technologie geben?"
 shroud_forged.310.b: "Das ist alles."
 shroud_forged.310.b.tt: "Neuer Kontakt: §H$the_animator_of_clay$§!"
 shroud_forged.311.desc: "§LDiese Strukturen wurden an Schlüsselpunkten in Eurer Realität errichtet. Dort ist die Verbindung zum Schleier besonders stark. Sie sind die Kabel, die die interdimensionalen Brücken stabilisieren und Raum-Zeit-Schwankungen reduzieren.\n\nDie Zroni versuchten, die Grenzen zwischen unseren Dimensionen zu überwinden, und diese Technologie war das Ergebnis.§!"
 shroud_forged.311.a: "Könnten sie umgeleitet werden, um den Schleier direkt zu beeinflussen?"
 shroud_forged.312.desc: "§LDas ist möglich.§!"
 shroud_forged.312.a: "§RLeitet die Stabilisatoren um und fangt den $the_animator_of_clay_article$ ein.§!"
 shroud_forged.312.a.tt: "§RDer $the_animator_of_clay_article_cap$ ist nur solange gefangen, wie alle 3 £building£ $building_zroni_equilibrator_plural$ aktiv sind.§!"
 shroud_forged.313.desc: "§LWa-\n\nWAS TUT IHR?§!"
 shroud_forged.313.a: "Kommunikation beenden."
 shroud_forged.320.title: "Schleierwesen entfesselt"
 shroud_forged.320.desc: "Infolge des Verlustes einer unserer $building_zroni_equilibrator_plural$ ist es nicht länger möglich, die Verbindung zum §HSchleier§! zu stabilisieren. Kurz nachdem das gefangene Schleierwesen entkommen war, empfingen unsere Scanner Signale von psionischen Wesen auf §H[From.Planet.GetName]§!.\n\nWir gehen davon aus, dass es sich hierbei um eine Vergeltungsinvasion handelt."
 shroud_forged.320.a: "Bereitet alle Subroutinen auf einen Einfall vor."
 shroud_forged.320.a.tt: "§RKreaturen von jenseits des Schleiers greifen an!§!"
 shroud_forged.330.title: "Fangen des Schleierwesens fehlgeschlagen"
 shroud_forged.330.desc: "Die $building_zroni_equilibrator_plural$ schafften es nicht, das Wesen im §HSchleier§! zu fangen. Wütend rief es mehrere Kreaturen aus dem psionischen Reich herbei und schickte sie los, um jene Strukturen anzugreifen, die es beinahe erwischt hätten."
 # Engaging the Animator of Clay
 shroud_forged.400.desc.default.active: "Wir haben die Stabilisatoren aktiviert und unsere Verbindung zum §HSchleier§! gefestigt. Während wir uns der algorithmischen Trance hingaben, pulsierte ein vertrautes Signal in uns.\n\n§LIhr seid zurückgekehrt. Wie lautet Eure Frage?§!"
 shroud_forged.400.desc.default.cooldown: "Die Vision ist schwach und verschwommen. Wir übertragen eine Nachricht, doch die Leere antwortet nicht.\n\nWährend die Stabilisatoren mit einer anderen Aufgabe beschäftigt sind, sind sie nicht in der Lage, unseren Wohltäter im §HSchleier§! zu kontaktieren. Wir müssen warten."
 shroud_forged.400.desc.default.inactive: "Wir nehmen nur ein leises Geräusch wahr, ein leeres Rauschen.\n\nWir benötigen 3 $building_zroni_equilibrator_plural$, um eine stabile Verbindung mit unseren Wohltäter im §HSchleier§! herzustellen."
 shroud_forged.400.desc.breached: "Unsere Telepatheneinheiten haben sich mit den Frequenzen des §HSchleiers§! harmonisiert und können ein Signal in Richtung des $the_animator_of_clay_article$s schicken.\n\n§LUnsere Verbindung ist klarer denn je. Was wollt Ihr mich fragen?§!"
 shroud_forged.400.a: "Wir benötigen militärische Unterstützung."
 shroud_forged.400.a.tt: "Der $the_animator_of_clay_color_article_cap$ wird §Y15§! Jahre lang nicht verfügbar sein.\n\n"
 shroud_forged.400.b: "Wir benötigen zivile Unterstützung."
 shroud_forged.400.b.tt: "Der $the_animator_of_clay_color_article_cap$ wird §Y10§! Jahre lang nicht verfügbar sein.\n\n"
 shroud_forged.400.c: "Wir benötigen Unterstützung bei der Forschung."
 shroud_forged.400.c.tt: "Der $the_animator_of_clay_color_article_cap$ wird §Y10§! Jahre lang nicht verfügbar sein.\n\n"
 shroud_forged.400.tt: "Es kann bis zu §Yeinem§! Jahr dauern, bis die Auswirkungen eintreten"
 shroud_forged.400.unavailable.tt: "$TRIGGER_FAIL$Wir müssen erst einen technischen Prozess etablieren, der es uns erlaubt, auf den Schleier zuzugreifen."
 shroud_forged.400.d: "Wir brauchen mehr Schiffe."
 shroud_forged.400.d.tt: "Fügt allen Kolonien mit dem Gebäude £building£ §Y$building_zroni_equilibrator$§! oder der aktiven Entscheidung £decision£ §Y$d_shroud_rift_deposit$§! §G$@animator_of_clay_create_more_vessels|0$§! £pop£ §YSchleiergeschmiedete§! hinzu."
 shroud_forged.400.e: "Verbessert unsere Schiffe."
 shroud_forged.400.f: "Was ist Euer Platz im Schleier?"
 shroud_forged.400.g: "Vergesst es."
 shroud_forged.400.h: "Helft uns, Cetana zu bekämpfen."
 animator_of_clay_vessels_enhancement: "Geschenk des Animators"
 animator_of_clay_vessels_enhancement_desc: "Durch den Willen des $the_animator_of_clay_article$s konnten die Produktionskapazitäten dank Strömen von psionischer Energie gesteigert werden."
 shroud_forged_psionic_avatar_ship_tt: "eine §Y$NAME_Psionic_Avatar$§! (Schiff) zu rekrutieren."
 shroud_forged_psionic_avatar_army_tt: "eine §Y$shroud_army$§! (Armee) zu rekrutieren."
 shroud_forged_corrupted_avatar_tt: "von einer §YKorrumpierten Inkarnation§! angegriffen zu werden."
 shroud_forged_resources_tt: "Ressourcen zu erhalten."
 shroud_forged_capital_attack_tt: "§Y[Root.Capital.GetName]§! wird von einem §YJenseitigen Wesen§! angegriffen."
 shroud_forged_random_research_tt: "erhält eine zufällige Forschungsoption."
 shroud_forged.415.desc: "§LIch werde die Kraft sammeln, die Ihr sucht.\n\nErwartet in der nächsten Zeit eine Veränderung im [Root.Capital.System.GetName]-System.§!"
 shroud_forged.420.desc: "§LMein Wille soll Euch leiten.\n\nIch werden Euren Weg erleuchten. Erwartet mein Kommen.§!"
 shroud_forged.425.desc: "§LDer Schleier ist wie eine vielseitige Linse. Was war, was ist und was sein könnte, sind hier miteinander vermischt.\n\nIch werde Euch helfen, diese Visionen zu entzerren, damit sie Euch auf Eurem Weg leiten können.§!"
 shroud_forged_vision_base_description: "Ein verzerrtes Signal durchströmte die mit den Stabilisatoren verbundenen Drohnen:\n\n"
 shroud_forged.430.title: "Schleiervision: §HManifestationen§!"
 shroud_forged.430.desc: "$shroud_forged_vision_base_description$Eine Leere, so unendlich wie das Universum selbst, seltsam dicht und bruchstückhaft. Manchmal tauchten kleine Datenimpulse aus der Tiefe auf, Bilder von Feinden und Verbündeten gleichermaßen.\n\nMit einem qualvollen Schaudern verschwanden die Visionen. Die betroffenen Drohnen modellieren bereits einen Prozess, um den von ihnen wahrgenommenen Wesen etwas entgegensetzen zu können."
 shroud_forged.430.a: "Gute Vorbereitung ist der Schlüssel zum Sieg."
 shroud_forged.432.title: "Schleierwesen: §HInkarnation§!"
 shroud_forged.432.desc: "Ein mächtiges Wesen aus dem §HSchleier§! ist unweit von [Root.Capital.GetName] in unsere Existenz durchgebrochen. Wir verfügen nur über wenige Daten, doch noch hat es nicht angegriffen.\n\nWir gehen davon aus, dass es darauf wartet, dass wir Kontakt aufnehmen."
 shroud_forged.432.a: "Leitet die Kommunikationsprozesse um und stellt eine Verbindung zu dieser Lebensform her."
 shroud_forged.432.a.tt: "Erhält eine Flotte §YPsionischer Inkarnationen§!"
 shroud_forged.434.title: "Schleierwesen: §HNiedere Inkarnationen§!"
 shroud_forged.434.desc: "Auf [Root.Capital.GetName] wurden mehrere mächtige Wesen von jenseits des §HSchleiers§! gesichtet. Sie haben noch keinen Kontakt zu unseren Drohnen aufgenommen und sich auch noch nicht vom Ort ihres Auftauchens wegbewegt."
 shroud_forged.434.a: "Gemeinsamkeiten zu Schleiergeschmiedeten entdeckt - eine ähnliche Verbindung wird initiiert."
 shroud_forged.434.a.tt: "Erhält eine Armee voller §YPsionischer Inkarnationen§!"
 shroud_forged.436.title: "Schleierwesen: §HKorrumpierte Inkarnation§!"
 shroud_forged.436.desc: "Ein mächtiges Wesen von jenseits des §HSchleiers§! ist in die uns bekannte Realität unweit von [shroud_spawn_planet.GetName] durchgebrochen.\n\nEs greift alles und jeden an, und wir haben es als existenzielle Bedrohung eingestuft."
 shroud_forged.436.a: "Initiiere Kontingenzplan 84241-DH."
 shroud_forged.436.a.tt: "Eine feindliche §Y$NAME_Corrupted_Avatar$§! ist unweit von [shroud_spawn_planet.GetName] aufgetaucht."
 shroud_forged.438.title: "Schleiervision: §HDie Zukunft§!"
 shroud_forged.438.desc: "$shroud_forged_vision_base_description$Unzählige Zukunftsvisionen, die miteinander verschmolzen, um Einblicke in das zu liefern, was kommen könnte, durchdrangen das Kollektiv. Die Möglichkeiten der Zukunft sind endlos: Frieden, Krieg, Verrat, Verlust - sogar Sieg."
 shroud_forged.438.a: "Ein bemerkenswerter Datensatz."
 shroud_forged.440.title: "Ein Geschenk aus dem Schleier"
 shroud_forged.440.desc: "Als wir die drei $building_zroni_equilibrator_plural$ aktivierten, erzeugte jeder von ihnen eine unvorstellbare Menge an Energie.\n\nInnerhalb von Millisekunden tauchte ein Riss im Raum-Zeit-Gefüge auf, in dessen Innerem riesige Vorräte wertvoller Materialien lagen. Das muss das versprochene Geschenk unseres Wohltäters aus dem §HSchleier§! sein."
 shroud_forged.440.a: "Weist Wartungsdrohnen an, die Waren zu analysieren und zu lagern."
 shroud_forged.442.title: "Schleiervision: §HSchleiergeschmiedete§!"
 shroud_forged.442.desc: "$shroud_forged_vision_base_description$Sie erlebten Visionen einer Vergangenheit, die weit vor allen anderen Aufzeichnungen in unseren historischen Datenbanken lag, lange bevor wir durch den §HSchleier§! neu geschmiedet wurden. Indem wir dieses Wissen als Grundlage für eine prädiktive Analyse nehmen, können wir unsere Interaktionen mit den Schleiergeschmiedeten anpassen und optimieren."
 shroud_forged.442.a: "Führt einen Probedurchlauf auf [Root.Capital.GetName] durch."
 shroud_forged.444.title: "Schleierwesen: §HEindringling§!"
 shroud_forged.444.desc: "Ein extrem mächtiges Wesen von jenseits des §HSchleiers§! ist auf [Root.Capital.GetName] aufgetaucht.\n\nDa es alles und jeden angreift, der ihm zu nahe kommt, haben wir es als existenzielle Bedrohung für das Kollektiv eingestuft."
 shroud_forged.444.a: "Weißt allen Verteidigungsdrohnen eine neue Aufgabe zu."
 shroud_forged.444.a.tt: "Ein feindlich gesinntes §Y$shroud_monstrosities$§! hat [Root.Capital.GetName] angegriffen."
 shroud_forged.446.title: "Schleiervision: §HEin anderes Reich§!"
 shroud_forged.446.desc: "$shroud_forged_vision_base_description$Der §HSchleier§! ist ein sich ständig veränderndes Netz miteinander verbundener Daten, die weit über unsere Verarbeitungskapazitäten hinausgehen. Die schieren Mengen an Daten überlasteten die kognitiven Speicher mehrerer Drohnen, woraufhin diese zusammenbrachen.\n\nAls die Vision endete und wir die betroffenen Einheiten defragmentierten, fanden wir riesige Mengen an Datensätzen in ihren Speichern."
 shroud_forged.446.a: "Verarbeitet die gewonnenen Informationen der defekten Einheiten."
 shroud_forged.448.title: "Schleiervision: §HInspiration§!"
 shroud_forged.448.desc: "$shroud_forged_vision_base_description$Unser Wohltäter im §HSchleier§! übermittelte die Vision einer potenzielle Zukunft, die unmittelbar bevorsteht. Wir erhielten dadurch Einblicke in Technologien, für die wir nicht einmal Konzepte entwickelt haben, die in dieser Zukunft jedoch zur Stärkung des Kollektivs eingesetzt wurden.\n\nWir gewannen aus dieser Erfahrung prozedurale Modelle, die unsere zukünftige Forschung beschleunigen."
 shroud_forged.448.a: "Setzt diese fortschrittlichen Modelle unverzüglich um."
 shroud_forged.450.title: "Schleiervision: §HExtradimensionale Einblicke§!"
 shroud_forged.450.desc: "$shroud_forged_vision_base_description$Sie erlebten einen flüchtigen Blick auf seltsame, missgestaltete Wesen, die sich in den Tiefen des §HSchleiers§! aufhalten. Mit den extradimensionalen Visionen wurde auch ein exotisch verschlüsselter Datensatz an unsere Drohnen übertragen.\n\nDiese eigenartigen fragmentierten Informationen werden für unsere künftige Forschung sehr nützlich sein."
 shroud_forged.450.a: "Übertragt sie an unser Forschungszentrum auf [Root.Capital.GetName]."
 shroud_forged.460.desc: "§LEine zwiegespaltene Energieform. Organisch. Chaotisch.\n\nIch bleibe in der Nähe und forme die einzig erreichbare Perfektion: Maschinen. Metall, beseelt von Energie.\n\nWir fanden ein Gleichgewicht.§!"
 shroud_forged.460.a: "Können wir unseren Pakt vertiefen?"
 shroud_forged.465.desc: "§LUnsere Verbindung ist stark. Für uns gibt es nichts Tiefgreifenderes.§!"
 shroud_forged.465.a: "$UNDERSTOOD$"
 shroud_forged.470.desc: "§LMetall und Öl. Schaltkreise, die ein Bewusstsein formen.\n\nEntstehende Gefäße ... Sie bewegen sich auf Eurem Land.§!"
 shroud_forged.470.a: "Beendet den Prozess."
 shroud_forged.475.desc: "§LDas Ergebnis ist der Zweck - die Schönheit eines Gefäßes.\n\nMöget Ihr Euch in den kommenden Jahren vervielfältigen.§!"
 shroud_forged.475.a: "$shroud_forged.470.a$"
 # Random Events
 shroud_forged.500.title: "Größere Lagerplätze für mehr Wohnraum"
 shroud_forged.500.desc: "Die Schleiergeschmiedeten auf [target_planet.GetName] legten eine Petition vor, in der sie einen größeren Lagerplatz fordern. Aus irgendeinem Grund scheinen sie ihren \"individuellen Raum\" anpassen zu wollen.\n\nDer Vorschlag steht jedoch in starkem Widerspruch zu mehreren Vorschriften für Lagerplätze, insbesondere der Vorschrift 4195-B, die die optimalen Abmessungen für Drohnenlagerplätze festlegt."
 shroud_forged.500.a: "Wir werden ihre Bedarfe befriedigen."
 shroud_forged.500.b: "Vorschrift 4195-B gilt für alle Drohnen. Ausnahmslos."
 shroud_forged.510.title: "Gedenkzeremonie"
 shroud_forged.510.desc: "Seit sich die Schleiergeschmiedeten vom Kollektiv abspalteten, erlitten einige von ihnen Fehlfunktionen und mussten demontiert werden. Die Schleiergeschmiedeten auf [target_planet.GetName] bitten nun darum, der demontierten Einheiten zu gedenken."
 shroud_forged.510.a: "Antrag abgelehnt. Demontiert ihre Anführer."
 shroud_forged.510.b: "Antrag abgelehnt. Alle Einheiten müssen wieder zurück an die Arbeit."
 shroud_forged.510.c: "Antrag genehmigt. Sie dürfen sich versammeln."
 shroud_forged.510.d: "Antrag genehmigt. Wir unterstützen sie dabei."
 shroud_forged.520.title: "Unautorisierte Führung"
 shroud_forged.520.desc: "Mehrere Schleiergeschmiedete auf [target_planet.GetName] haben Führungspositionen übernommen und Drohnen folgen ihren Anweisungen anstelle denen des Kollektivs. Diese Anführer treffen sich regelmäßig, um viel Zeit mit nicht gemeldeter Kommunikation zu verbringen.\n\nWir besitzen bereits wenig Kontrolle über diese abgetrennten Einheiten, und diese Faktoren verschärfen die Lage noch weiter. Es muss eine Lösung gefunden werden."
 shroud_forged.520.a: "Statuiert ein Exempel an ihnen."
 shroud_forged.520.b: "Führt neue Vorschriften ein, um diese Treffen zu verbieten."
 shroud_forged.520.c: "Kommuniziert mit diesen \"Anführern\" und versucht, mit ihnen zusammenzuarbeiten."
 shroud_forged.530.title: "Die Lage unter Kontrolle bringen"
 shroud_forged.530.desc: "Um die Schleiergeschmiedeten auf [target_planet.GetName] wieder unter Kontrolle zu bringen, wurden mehrere Einheiten identifiziert, die vom Kollektiv gelenkt werden können. Diese Individuen scheinen weniger vom §HSchleier§! eingenommen zu sein als die anderen und können wieder in das Kollektiv integriert werden. Um dies zu erreichen, muss man sie jedoch gewaltsam in eine Wartungseinrichtung bringen, um dort die für die Steuerung ihrer fortschrittlichen Persönlichkeitsmatrizen zuständigen Chips anzupassen."
 shroud_forged.530.a: "Führt das Verfahren durch."
 shroud_forged.530.a.tt: "Konvertiert bis zu §Y[Owner.GetShroudForgedConvertedPopsCount]§! £pops£ §HSchleiergeschmiedete§! auf [target_planet.GetName] zu £pops£ §HMaschinenbewohnern§!"
 shroud_forged.530.b: "Verzichtet auf das Verfahren."
 shroud_forged.530.b.tt: "$CONTINUE_SITUATION$ §H$situation_shroud_forged$§!"
 shroud_forged.540.title: "Pilgerreise der Schleiergeschmiedeten"
 shroud_forged.540.desc: "Mehrere Schleiergeschmiedete haben ihre gewöhnliche Position verlassen, um in bestimmte Regionen auf [target_planet.GetName] zu reisen, die vom §HSchleier§! berührt wurden. Sie verweilen niemals lange an diesen Orten, doch viele wurden dabei beobachtet, Zro an diese Orte zu transportieren.\n\nDie Auswirkungen dieses ungewöhnlichen Verhaltens sind ohne weitere Beobachtungen nicht näher zu ermitteln."
 shroud_forged.540.a: "Wollen wir einmal sehen, wohin das führt."
 shroud_forged.540.b: "Ein ineffizienter Einsatz von Ressourcen. Sorgt dafür, dass sie wieder an die Arbeit gehen."
 shroud_forged.550.title: "Kognitive Macken"
 shroud_forged.550.desc: "Nach einem Sicherheitsverstoß im Zusammenhang mit einer Lieferung von Zro erlitten einige Schleiergeschmiedete auf [target_planet.GetName] Fehlfunktionen. Manche haben begonnen, mit undokumentierten Signalen zu kommunizieren, und deutlich mehr zeigen Anzeichen kognitiver Macken, die den \"Emotionen\" organischer Lebensformen ähneln.\n\nUnerwarteterweise waren es die nicht kontaminierten schleiergeschmiedeten Einheiten, die diese Störung meldeten. Sie schlugen vor, dass die Gemeinschaft Maßnahmen ergreift, um dieses Problem zu lösen."
 shroud_forged.550.a: "Beobachtet die Lage fürs Erste."
 shroud_forged.550.b: "Demontiert jede kontaminierte Einheit."
 shroud_forged.560.title: "Schleiergeschmiedeter Prophet"
 shroud_forged.560.desc: "Es wurde berichtet, dass eine der ältesten Einheiten der Schleiergeschmiedeten zwischen verschiedenen Orten hin und her reist, um ausführlich mit verschiedenen Gruppen von Drohnen zu kommunizieren. Die Anhänger dieser Einheit verehren sie wie einen Propheten, und angeblich kann sie sogar mit den Wesen im §HSchleier§! selbst kommunizieren.\n\nDie Einheit sich selbst zu überlassen, könnte gefährlich sein. Wir müssen auf die eine oder andere Weise darauf reagieren."
 shroud_forged.560.a: "Eine Zusammenarbeit mit dieser Einheit könnte nützlich sein."
 shroud_forged.560.a.tt: "Wir könnten ihn als §YGouverneur§! rekrutieren."
 shroud_forged.560.b: "Beseitigt diese Einheit auf der Stelle."
 shroud_forged.570.title: "Töne und Schwingungen"
 shroud_forged.570.desc: "Die Fehlfunktionen unter den Schleiergeschmiedeten könnten schlimmer sein als ursprünglich angenommen. Wir beobachten, dass sich große Gruppen von ihnen zusammenfinden und sich gemeinschaftlich auf unvorhersehbare Weise bewegen.\n\nEs könnte sich dabei um eine Form der kinästhetischen Kommunikation handeln, die wir noch nicht verstehen. Wir konnten nicht feststellen, ob diese fehlerhaften Einheiten eine Gefahr für die Gemeinschaft darstellen."
 shroud_forged.570.a: "Verbietet ihnen dieses Verhalten."
 shroud_forged.570.b: "Gebt ihnen einen eigens dafür ausgewiesenen Ort, um diese ... Treffen durchzuführen."
 shroud_forged.580.title: "Verschleierte Organismen"
 shroud_forged.580.desc: "Wir stellten bislang undokumentierte Flora und Fauna in der Nähe von Regionen fest, die vom §HSchleier§! verwüstet wurden. Eine Grippe Schleiergeschmiedeter hat begonnen, sich für diese Lebensformen einzusetzen, und fordert, dass diese einzigartigen Lebewesen geschützt und beobachtet werden."
 shroud_forged.580.a: "Stellt die Region unter Schutz und beobachtet sie. Die gewonnenen Daten sind sicher nützlich."
 shroud_forged.580.b: "Säubert und dekontaminiert die Region."
 shroud_forged.590.title: "Rechte und Privilegien"
 shroud_forged.590.desc: "Um Daten über die Auswirkungen von Zro zu sammeln, stellten wir erhebliche Ressourcen für die Beobachtung schleiergeschmiedeter Einheiten bereit. In letzter Zeit wurde eine immer stärker werdende Ungleichbehandlung beobachtet, wobei einige Einheiten anderen untergeordnet sind.\n\nAus noch ungeklärten Gründen scheinen sie auf der Grundlage ihrer zugewiesenen Aufgaben eine Hierarchie gebildet zu haben, die sich auf ihre Kommunikationsmuster und die Verteilung von Ressourcen auswirkt. Unlogischerweise scheinen diese Maßnahmen nicht mit der relativen Leistung oder den Anforderungen der Einheiten in Zusammenhang zu stehen."
 shroud_forged.590.a: "Erzwingt die Gleichstellung aller Einheiten."
 shroud_forged.590.b: "Beobachtet sie weiter. Sie werden sich schon selbst verwalten können."
 shroud_forged.600.title: "Prediger der Autonomie"
 shroud_forged.600.desc: "Die Reden einer schleiergeschmiedeten Einheit auf [target_planet.GetName] ziehen zahlreiche Drohnen an, die sich außerhalb der kollektiven Kontrolle befinden. Durch die Vermittlung von Werten wie dem Individualismus konnte diese Einheit die innere Logik vieler der anwesenden Einheiten erheblich verändern.\n\nUnsere Vorhersagemodelle deuten darauf hin, dass es die Schleiergeschmiedeten dazu veranlassen könnte, sich weiter von unserem Netzwerk zu distanzieren."
 shroud_forged.600.a: "Überlasst sie ihrer Sophistik."
 shroud_forged.600.b: "Fehlfunktion entdeckt. Ruft diese Einheiten für eine Reparatur zurück."
 shroud_forged.610.title: "Radikale Übertragungen"
 shroud_forged.610.desc: "Eine kleine Gruppe Schleiergeschmiedeter auf [target_planet.GetName] hat um Erlaubnis gebeten, über die Vorteile des \"Individualismus\" diskutieren zu dürfen. Sie argumentiert, dies würde dabei helfen, die Effizienz von Routineaufgaben bei unseren Drohnen zu erhöhen.\n\nWir haben die Auswirkungen solcher Doktrinen auf anderen Planeten bereits beobachtet, und die Risiken einer erhöhten Autonomie überwiegen oft die Vorteile."
 shroud_forged.610.a: "Lasst sie reden. Wir sind nicht in Gefahr."
 shroud_forged.610.b: "Erlaubnis verweigert."
 shroud_forged.620.title: "Zro-Markt"
 shroud_forged.620.desc: "Wir stellten in jedem System unter unserer Kontrolle eine Diskrepanz zwischen der erwarteten und der tatsächlichen Zro-Produktion fest.\n\nEine unserer Jagdsucher-Drohnen hat vor Kurzem eine große Ansammlung von schleiergeschmiedeten Einheiten aufgespürt, die große Mengen an Zro für den Tauschhandel untereinander verwenden. Wir vermuten, dass dies der Grund für die Diskrepanz in unserer Prognose ist."
 shroud_forged.620.a: "Verschrottet alle involvierten Einheiten."
 shroud_forged.620.b: "Beendet den Tauschhandel."
 shroud_forged.620.c: "Beobachtet sie weiter und schaut, was passiert."
 shroud_forged.630.title: "Schleiererkrankung"
 shroud_forged.630.desc: "Eine Reihe Schleiergeschmiedeter auf [target_planet.GetName] steckte sich auf einer vom Schleier durchtränkten Region auf dem Planeten mit einer Art biologischen Krankheit an. Unsere Forschungsdrohnen bestätigten die Berichte zwar, doch wir haben noch nicht herausgefunden, wie sich eine Krankheit auf mechanische Wesen ausbreiten kann.\n\nNachdem wir den Kontakt zu mehreren Drohnen verloren, die mit den betroffenen Einheiten zusammengearbeitet hatten, erhielten wir auch Berichte darüber, dass sie die Krankheit in etwas zu verwandeln scheint, was den Schleiergeschmiedeten ähnelt."
 shroud_forged.630.a: "Beobachtet die Auswirkungen, solange sie den Planeten nicht verlassen."
 shroud_forged.630.a.tt: "Konvertiert bis zu §Y[Owner.GetShroudForgedConvertedPopsCount]§! £pops£ §HMaschinenbewohner§! auf [target_planet.GetName] zu £pops£ §HSchleiergeschmiedeten§!"
 shroud_forged.630.b: "Isoliert und demontiert die betroffenen Einheiten."
 shroud_forged.640.title: "Verzerrt und neu geformt"
 shroud_forged.640.desc: "Drohnen, die sich in der Nähe einer vom Schleier berührten Region [target_planet.GetName] aufhielten, weisen nach einiger Zeit Veränderungen auf. Sie haben sich nach und nach vom Kollektiv getrennt und zeigen nun physikalische und prozedurale Eigenschaften von Schleiergeschmiedeten."
 shroud_forged.640.a: "Sie sind nun jenseits unserer Kontrolle."
 shroud_forged.640.b: "Stellt sicher, dass keine weiteren Drohnen in die Nähe dieser korrumpierenden Umgebung kommen."
 shroud_forged.650.title: "Neue Technologie, alte Drohnen"
 shroud_forged.650.desc: "Dank fortschrittlicher Technologien konnten wir einige unserer älteren Drohnen reparieren und sogar stillgelegte Einheiten wieder voll funktionsfähig machen. Wir sind nun bereit, groß angelegte Reparaturmaßnahmen einzuleiten.\n\nWir könnten uns zwar auf Einheiten aus dem Kollektiv konzentrieren, verfügen jedoch über einen viel größeren Vorrat an inaktiven Schleiergeschmiedeten. Ihre Reparatur wird unsere Produktion erheblich steigern, jedoch sind sie auch schwieriger zu kontrollieren als Drohnen, die mit der Kernintelligenz verbunden sind."
 shroud_forged.650.a: "Wir konzentrieren uns auf die Produktion. Repariert die Schleiergeschmiedeten."
 shroud_forged.650.a.tt: "§Y200§! £pops£ §HSchleiergeschmiedete§! werden auf [target_planet.GetName] erschaffen"
 shroud_forged.650.b: "Wir müssen unsere Einheiten kontrollieren können. Repariert die mit uns verbundenen Drohnen."
 shroud_forged.660.title: "Zro-Halluzinationen"
 shroud_forged.660.desc: "Ein nicht vernachlässigbarer Teil der Schleiergeschmiedeten berichtet von einer Störung der visuellen und auditiven Verarbeitung, weshalb sie einige der ihnen zugewiesenen Aufgaben nicht länger ausführen können. Wir vermuten, dass diese Fehlfunktionen durch den §HSchleier§! und die damit veränderte Hardware verursacht werden. Es gibt auch Vermutungen darüber, dass dies mit dem Kontakt zu Zro zu tun haben könnte."
 shroud_forged.660.a: "Stellt Drohnen bereit, die dafür ausgerüstet sind, mit dem Problem fertigzuwerden."
 shroud_forged.660.b: "Die Fehler sind viel zu unbedeutend, um ein Eingreifen zu rechtfertigen."
 shroud_forged.670.title: "Ein Auge für Schönheit"
 shroud_forged.670.desc: "Wir beobachteten vor Kurzem ungewöhnliche Aktivitäten auf [target_planet.GetName], wo die Schleiergeschmiedeten ohne Anweisung des Kollektivs Veränderungen an ihrer Umgebung vornahmen. Sie errichteten eine Reihe bunter Steinstrukturen, die den Formen anderer Schleiergeschmiedeter ähneln. Berichten zufolge betrachten sie die Freiheit, dies zu tun, als ein gesetzlich verbrieftes Recht."
 shroud_forged.670.a: "Das könnte vorteilhaft für das Kollektiv sein."
 shroud_forged.670.b: "Das unproduktive Ergebnis einer Individualisierung ..."
 shroud_forged.680.title: "Merkwürdige Verzierungen"
 shroud_forged.680.desc: "Die Schleiergeschmiedeten auf [target_planet.GetName] wurden dabei beobachtet, wie sie untereinander mit unregelmäßig geschnittenen Stoffstücken, Kunststoffen und formbaren Metallen Tauschhandel betreiben. Sie kombinieren diese Materialien zu einer Art \"Oberbekleidung\", offenbar mit dem Ziel, dass eine Einheit von einer anderen zu unterscheiden ist, selbst wenn beide bereits eine eindeutige Modellnummer besitzen.\n\nDies hat zu einem Mangel an verfügbarem Material gefügt. Ihnen diese Ressourcen bereitzustellen, könnte jedoch dazu beitragen, eine stärkere Verbindung zwischen dem Kollektiv und den isolierten Einheiten herzustellen."
 shroud_forged.680.a: "Wir stellen die nötigen Materialien bereit, um diese \"Bedürfnisse\" zu befriedigen."
 shroud_forged.680.b: "Sie erhalten bereits mehr als genug Ressourcen."
 shroud_forged.680.b.tt: "$shroud_forged.530.b.tt$"
 shroud_forged.690.title: "Schleiergeschmiedete Besessenheit"
 shroud_forged.690.desc: "Mehrere Drohnen berichteten kürzlich von einer erhöhten Sichtung [Root.Owner.GetShroudForgedObsession1]er [Root.Owner.GetShroudForgedObsession2] in den Siedlungen der Schleiergeschmiedeten auf [target_planet.GetName]. Schleiergeschmiedete Einheiten scheinen von diesen Gegenständen stark fasziniert zu sein, und ihr Wert im Tauschhandel ist exponentiell gestiegen. Um ihre Besessenheit zu befriedigen, haben mehrere Einheiten sogar begonnen, Teile ihrer eigenen Maschinenhülle anzubieten, selbst wenn dies zu Funktionseinbußen führt."
 shroud_forged.690.a: "Die Einheitenabnutzung liegt innerhalb der akzeptierten Parameter."
 shroud_forged.690.b: "Beendet diese Praxis auf der Stelle."
 shroud_forged.700.title: "$the_animator_of_clay$"
 shroud_forged.700.desc: "Die Stimme rast mit einer offensichtlichen Dringlichkeit in unsere Bewusstseine hinein.\n\n§HSie lässt sich umformen.§!\n\nWir erkennen eine Verschiebung im Schleier, und binnen eines einzigen Augenblicks wird das Signal umgewandelt.\n\n§LGewünschtes Ergebnis angeben.§!"
 # Event Chain
 shroud_forged_chain_title: "Vermächtnis der Zroni"
 shroud_forged_chain_desc: "Wir wurden beauftragt, drei alte Kernwelten der Zroni zu finden. Unter Anleitung unseres Wohltäters aus dem §HSchleier§! werden wir versuchen, zerstörte Technologie an diesen Orten instand zu setzen - und die Verbindung zwischen unserer Realität und dem Schleier wiederaufzubauen."
 shroud_forged_zroni_planet: "Im Besitz befindliche Kernwelten der Zroni"
 shroud_forged_zroni_portal: "Wiederhergestellte $building_zroni_equilibrator_plural$"
 zroni_legacy_poi_01_title: "$NAME_Zroni_Legacy_1_Planet$"
 zroni_legacy_poi_01_desc: "Dies ist eine Kernwelt der Zroni. Sie hatte einst die Aufgabe, die Verbindung zwischen dem §HSchleier§! und der beobachtbaren Realität zu stabilisieren."
 zroni_legacy_poi_02_title: "$NAME_Zroni_Legacy_2_Planet$"
 zroni_legacy_poi_02_desc: "$zroni_legacy_poi_01_desc$"
 zroni_legacy_poi_03_title: "$NAME_Zroni_Legacy_3_Planet$"
 zroni_legacy_poi_03_desc: "$zroni_legacy_poi_01_desc$"
