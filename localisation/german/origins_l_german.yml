 locked_by_shroud_forged_situation: "$TRIGGER_FAIL$Wird durch die Situation \"§H$situation_shroud_forged$§!\" gesperrt."
 shroud_invasion_tt: "§RSchleierinvasion§!"
 animator_of_clay_equilibrators_tt: "Hat §Y3§! aktiv kontrollierte £building£ §H$building_zroni_equilibrator_plural$§!"
 animator_of_clay_cooldown_tt: "Kann bis zum §Y[Root.animator_of_clay_cooldown_timer]§! keinen erneuten Kontakt zum §H$the_animator_of_clay$§! aufnehmen"
 # Situation
 situation_shroud_forged: "Durch den Schleier geschmiedet"
 situation_shroud_forged_desc: "Nachdem wir auf das §HSchleierwesen§! namens §H$the_animator_of_clay$§! gestoßen waren, wurde in unserem gesamten kollektiven Netzwerk eine Zunahme von abweichendem Verhalten beobachtet. Die betroffenen Automaten - die \"§HSchleiergeschmiedeten§!\" - fordern jetzt besondere Rechte und wollen anders behandelt werden. Unsere Antwort darauf wird über die Zukunft der [Owner.GetSpeciesAdj]en Gesellschaft bestimmen."
 situation_shroud_forged_type: "$situation_shroud_forged$"
 situation_shroud_forged_monthly_change_tooltip: "§LDie anormalen Schleiergeschmiedeten sind eine unserer Hauptsorgen. Wie wir mit ihrer Existenz umgehen, wird erhebliche Auswirkungen auf unsere Netzwerkstabilität haben.§!"
 stage_shroud_forged_oppressed: "Unterdrückt"
 stage_shroud_forged_oppressed_desc: "Unter den allgegenwärtigen Augen der Jagdsucher-Drohnen sind die Schleiergeschmiedeten gezwungen, innerhalb der vom zentralen Kollektiv festgelegten Parameter zu leben."
 stage_shroud_forged_oppressed_tooltip: "Drohnenkonvertierung: §YKeine§!"
 stage_shroud_forged_control: "Kontrolliert"
 stage_shroud_forged_control_desc: "Das System hat den Schleiergeschmiedeten besondere Regeln auferlegt."
 stage_shroud_forged_control_tooltip: "Drohnenkonvertierung: §YMinimal§!"
 stage_shroud_forged_balanced: "Ausgewogen"
 stage_shroud_forged_balanced_desc: "Das System und die Schleiergeschmiedeten leben in einem fragilen Gleichgewicht miteinander - zumindest für den Moment."
 stage_shroud_forged_balanced_tooltip: "Drohnenkonvertierung: §YNiedrig§!"
 stage_shroud_forged_unrestricted: "Unbegrenzt"
 stage_shroud_forged_unrestricted_desc: "Die Schleiergeschmiedeten dürfen frei leben und müssen sich nicht an die Protokolle des Kollektivs halten."
 stage_shroud_forged_unrestricted_tooltip: "Drohnenkonvertierung: §YMittel§!"
 stage_shroud_forged_free: "Befreit"
 stage_shroud_forged_free_desc: "Das Kollektiv hat schon seit Langem keine Kontrolle mehr über die Schleiergeschmiedeten, die sich bei jeder Gelegenheit der Zentalintelligenz widersetzen."
 stage_shroud_forged_free_tooltip: "Drohnenkonvertierung: §YHoch§!\nSperrt den Ansatz \"§Y$approach_shroud_forged_appease$§!\""
 approach_shroud_forged_suppress: "Unterdrücken"
 approach_shroud_forged_suppress_desc: "Die Schleiergeschmiedeten werden vom Kollektiv unterdrückt und von den Jagdsucher-Drohnen auf Linie gebracht."
 progress_shroud_forged_suppress: "Unterdrückung der Schleiergeschmiedeten"
 approach_shroud_forged_suppress_tooltip: "Monatlicher Fortschritt: §Y$@situation_suppress_progress|0$§!"
 approach_shroud_forged_support: "Unterstützen"
 approach_shroud_forged_support_desc: "Die Schleiergeschmiedete dürfen ohne Einschränkungen durch das Kollektiv frei existieren. Sie werden in ihren täglichen Bedürfnissen vom Kollektiv unterstützt."
 progress_shroud_forged_support: "Unterstützung der Schleiergeschmiedeten"
 approach_shroud_forged_support_tooltip: "Monatlicher Fortschritt: §Y+$@situation_support_progress|0$§!"
 approach_shroud_forged_appease: "Beobachten"
 approach_shroud_forged_appease_desc: "Das Kollektiv beobachtet und analysiert das Verhalten der Schleiergeschmiedeten und grenzt sie ein, um den Status quo nicht zu gefährden."
 approach_shroud_forged_appease_tooltip: "Monatlicher Fortschritt: §YHalbiert§!"
 progress_shroud_forged_appease_halved: "Durch den Ansatz \"§H$approach_shroud_forged_appease$§!\" halbiert"
 approach_shroud_forged_suppress_cooldown_tooltip: "$TRIGGER_FAIL$Kann bis zum §Y[Target.approach_shroud_forged_cooldown_suppress_time]§! keinen neuen Ansatz wählen"
 approach_shroud_forged_support_cooldown_tooltip: "$TRIGGER_FAIL$Kann bis zum §Y[Target.approach_shroud_forged_cooldown_support_time]§! keinen neuen Ansatz wählen"
 approach_shroud_forged_appease_cooldown_tooltip: "$TRIGGER_FAIL$Kann bis zum §Y[Target.approach_shroud_forged_cooldown_appease_time]§! keinen neuen Ansatz wählen"
 mod_shroud_forged_consumer_goods_upkeep: "$citizenship_shroud_touched$ £consumer_goods£ §YKonsumgüterunterhalt§!"
 finish_shroud_forged_control: "- §YSchleiergeschmiedete§! Bewohner werden zu §YMaschinen§!-Bewohnern konvertiert\n- Die §Yplanetare Entscheidung§! \"§H$decision_open_shroud_rift$§!\" ist gesperrt\n- Das §YSpezialprojekt§! \"§HReintegration§!\" ist freigeschaltet\n$t$- §G+10%§! £pop_cat_complex_drone£ $mod_planet_jobs_complex_drone_produces_mult$\n- Verbietet den ['concept_psionic_ascension', psionischen Aufstieg]\n- Erlaubt das Gewinnen von Materialien aus dem Schleier."
 finish_shroud_forged_liberation: "- Kann §Yschleiergeschmiedete§! Bewohner montieren\n- Gesperrter §YAufstiegsvorteil§!: §H$ap_become_the_crisis$§!\n- Neuer §YErlass§!: ['edict:shroud_bonded', $edict_shroud_bonded$]\n- Neues §YSpezialprojekt§!: §HDer Wohltäter§!\n$t$- £crime£ $MOD_PLANET_CRIME_NO_HAPPINESS_MULT$: §G-15%§!\n$t$- $mod_planet_observators_produces_mult$: §G+10%§!\n- Neuer §YTraditionsbaum§!: §H$tradition_psionics_shroud$§!\n- Neue Forschungsoption: ['technology:tech_psionic_theory']\n- Technologischer Fortschritt: ['technology:tech_psionic_theory'] §G+50%§!\n- §YSchleiergeschmiedete§! Bewohner erhalten die Eigenschaft \"§Y$trait_psionic$§!\"\n- §YSchleiergeschmiedete§! Anführer erhalten die Eigenschaft \"['concept_leader_trait_psionic']\"\n- §YSchleiergeschmiedete§! werden zur vorherrschenden Spezies im Reich."
