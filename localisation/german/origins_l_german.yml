 # Armies
 shroud_monstrosities: "Jenseitiges Wesen"
 shroud_monstrosities_desc: "Eines dieser Wesen auf dem Schlachtfeld zu erblicken, bedeutet, den Wahnsinn einzuladen. Ihr Äußeres windet sich immerzu und schimmert ewig. Ihre Formen bleiben niemals gleich."
