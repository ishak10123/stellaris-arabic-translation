 ### FE Civics
 civic_antediluvian_mind: "Ältestenbewusstsein"
 civic_antediluvian_mind_desc: "Die Zeit hat es nicht gut mit diesem Gestaltbewusstsein gemeint. Die lange Existenz in einer Chronoblase hat den einst unstillbaren Überlebenswillen abgestumpft."
 civic_sluggish_drones: "Ungelenkte Drohnen"
 civic_sluggish_drones_desc: "Da ihr entspanntes Überbewusstsein nur wenig Druck auf sie ausübt, handeln die Drohnen dieses Reiches fast apathisch, während sie langsam ihre Aufgaben erfüllen."
 ### FE Buildings
 building_fe: "Gebäude eines Gefallenen Reichs"
 building_ancient_control_center: "Altes Kontrollzentrum"
 building_ancient_control_center_desc: "Das alte Kontrollzentrum dieser Ringwelt wird nur durch die unermüdlichen Bemühungen einer Vielzahl von Maschinendrohnen gerade noch so funktionsfähig gehalten."
 building_ancient_palace: "Alter Palast"
 building_ancient_palace_desc: "Dieser riesige Palastkomplex ist ein Überbleibsel eines längst vergangenen Zeitalters. Trotz der strahlenden Fassade, die dem Zahn der Zeit getrotzt hat, sind die zahlreichen Flügel verlassen und in verschiedenen Stadien des Verfalls."
 building_ancient_hive_capital: "Ehrwürdiger Nukleus"
 building_ancient_hive_capital_desc: "In diesem uralten Schwarmzentrum haben unzählige Generationen von Drohnen pflichtbewusst ihre Aufgaben ausgeführt."
 building_affluence_emporium: "Wohlstandsemporium"
 building_affluence_emporium_desc: "Dieser Komplex erfüllt materielle Wünsche mithilfe eines fortschrittlichen Beschaffungsalgorithmus und sorgt für Zufriedenheit, bevor die Bevölkerung einen Wunsch überhaupt realisiert hat."
 building_affluence_center: "Wohlstandszentrum"
 building_affluence_center_desc: "In diesem Zentrum lassen sich mühelos und augenblicklich selbst die ausgefallensten Wünsche verwirklichen."
 building_nourishment_complex: "Ernährungskomplex"
 building_nourishment_complex_desc: "Die Replikationstechnologie zaubert auf Knopfdruck neue Geschmacksrichtungen herbei."
 building_nourishment_center: "Ernährungszentrum"
 building_nourishment_center_desc: "Jede erdenkliche Geschmacksrichtung kann innerhalb dieser Mauern nachgebildet werden."
 building_dimensional_replicator: "Dimensionsreplikator"
 building_dimensional_replicator_desc: "Dieser Replikator wandelt Energie in Materie um."
 building_dimensional_fabricator: "Dimensionsverarbeiter"
 building_dimensional_fabricator_desc: "Diese fortschrittliche Maschine verbindet sich mit dem dimensionalen Raum, um wertvolle Ressourcen zu gewinnen."
 building_class_3_singularity: "Klasse-3-Singularität"
 building_class_3_singularity_desc: "Die gesamte von dieser Singularität ausgestoßene Energie aufzufangen, ist ein technologisches Wunderwerk."
 building_class_4_singularity: "Klasse-4 Singularität"
 building_class_4_singularity_desc: "Die Energie dieser Singularität stellt die Gesetze der Physik infrage, doch die Eindämmungsfelder sind stabil."
 building_micro_forge: "Hyperschmiede"
 building_micro_forge_desc: "Die Produktionsgeschwindigkeit dieser Schmiede wird nur durch die Menge an Rohstoffen begrenzt, mit der man sie füttert."
 building_nano_forge: "Auto-Schmiede"
 building_nano_forge_desc: "Die zahlreichen Nanoreplikatoren dieser Schmiede wandeln Rohmaterialien mit erstaunlicher Effizienz zu fortschrittlichen Legierungen um."
 building_fe_sky_dome: "Himmelskuppel"
 building_fe_sky_dome_desc: "Diese schwebende Stadt, die durch modernste Antigravitationstechnologie angetrieben wird, ist ein idyllischer Zufluchtsort für ihre Bewohner."
 building_fe_dome: "Empyreumkuppel"
 building_fe_dome_desc: "Diese Kuppel hebt die Schwerkraft auf, um physische Grenzen zu überwinden, während fortschrittliche Lebenserhaltungssysteme auf sämtliche Bedürfnisse der Bewohner eingehen."
 building_fe_fortress: "Aspisbastion"
 building_fe_fortress_desc: "Dieser kolossale planetare Verteidigungskomplex verfügt über zahlreiche Waffenkammern und Abschirmungsschichten. Nur eine hochspezialisierte Belagerungstruppe könnte die Verteidigung durchbrechen."
 building_fe_stronghold: "Ägis-Komplex"
 building_fe_stronghold_desc: "Dieser monumentale planetare Verteidigungskomplex wird durch zahllose Waffensystemen und Schilde geschützt. Selbst die Berge des Planeten würden vor diesen Verteidigungsanlagen kapitulieren und zerbröseln."
 building_master_archive: "Hauptarchiv"
 building_master_archive_desc: "Dieses Archiv birgt zwar Wissen aus mehreren galaktischen Zeitaltern, doch das Wissen darum, wie man das Abfragesystem benutzt, ist verloren gegangen. Die extrahierten Datenfetzen sind dennoch von unschätzbarem Wert."
 building_empyrean_shrine: "Phasenverschobener Empyreumschrein"
 building_empyrean_shrine_desc: "Dieser Tempel dient ausschließlich der Kommunikation mit den Geistern des Schleiers und ist in unserer Dimension nur teilweise sichtbar."
 building_ancient_cryo_chamber: "Alte Kryo-Kammer"
 building_ancient_cryo_chamber_desc: "Reihen um Reihen von alten Kryo-Kapseln säumen diese massive Struktur, die Millionen von lang verschiedenen Alien-Exemplare enthält, die vor langer Zeit gefroren wurden."
 building_fe_administration_1: "Omnividente Verwaltung"
 building_fe_administration_1_desc: "Dieser weitläufige Komplex ist für das galaxieweite bürokratische System unerlässlich und mit einem riesigen Verwaltungsnetz verbunden."
 building_fe_administration_2: "Omnisziente Verwaltung"
 building_fe_administration_2_desc: "Dieser weitläufige Komplex ist das Herzstück eines galaxieweiten bürokratischen Systems und koordiniert ein robustes und fortschrittliches Verwaltungsnetz."
 building_fe_administration_hive_1: "Ephaptischer Cluster"
 building_fe_administration_hive_1_desc: "Dieses von hoch spezialisierten Drohnen sorgfältig gepflegte Netz ephaptischer Knotenpunkte stärkt den Einfluss, den der Schwarm über den kognitiven Bereich seiner Domäne ausübt."
 building_fe_administration_hive_2: "Ephaptisches Axon"
 building_fe_administration_hive_2_desc: "Dieses von hoch spezialisierten Drohnen sorgfältig gepflegte Netz ephaptischer Knotenpunkte stärkt den Willen des Schwarms überall in der Galaxie."
 building_fe_administration_machine_1: "Fraktaler Koordinationspunkt"
 building_fe_administration_machine_1_desc: "Ein fortschrittlicher fraktaler Knotenpunkt, der nahtlos Billionen von Signalen in Echtzeit verarbeitet und überträgt."
 building_fe_administration_machine_2: "Quantischer Koordinationspunkt"
 building_fe_administration_machine_2_desc: "Ein fortschrittlicher quantenverschränkter Knotenpunkt, der Quadrillionen von Signalen präzise verarbeitet und in Echtzeit überträgt."
 building_fe_temple_1: "Sternenheiligtum"
 building_fe_temple_1_desc: "Hochmoderne Fortschritte in der metaphysischen Technologie erlauben es den Anhängern, eine direkte Verbindung zur göttlichen Essenz herzustellen."
 building_fe_temple_2: "Sternenkathedrale"
 building_fe_temple_2_desc: "Der Einsatz metaphysischer Technologie für psionische Predigten verstärkt die spirituelle Resonanz. Dieser riesige Komplex erlaubt es den Anhängern, sich auf einer systemweiten Ebene mit der göttlichen Essenz zu verbinden."
 building_fe_assembly_1: "Roboter-Manufakturnexus"
 building_fe_assembly_1_desc: "Dieser fortschrittliche Montagekomplex, der mit erfahrenen Robotikern besetzt ist, sprengt die konventionellen Grenzen und setzt neue Robotik-Innovationen in die Tat um."
 building_fe_assembly_2: "Roboter-Quantenproduktionszentrum"
 building_fe_assembly_2_desc: "Die Quantenfertigungsstraße dieser Anlage ist ein Wunderwerk der Technik. Mithilfe von Verschränkungskonvertern können selbst die präzisesten Maschinenteile gefertigt werden. Nicht ein einziges Atom ist am falschen Platz."
 building_fe_clinic_1: "Molekulares Revitalisierungsinstitut"
 building_fe_clinic_1_desc: "Molekulare Revitalisierungsinstitute erforschen die Feinheiten von Zellen, um die Wirksamkeit medizinischer Behandlungen zu verstärken, was die Gesundheit und Langlebigkeit der Bevölkerung deutlich verbessert."
 building_fe_clinic_2: "Bioregenerationsinstitut"
 building_fe_clinic_2_desc: "Das Bioregenerationsinstitut steht an der Spitze des medizinischen Fortschritts und leistet Pionierarbeit bei bahnbrechenden bioregenerativen Therapien, wodurch es die Grenzen der Lebensverlängerung immer wieder neu definiert."
 building_fe_security_1: "Justizkomplex"
 building_fe_security_1_desc: "In diesem riesigen Justizkomplex sind Gerichte und Strafverfolgungsbehörden nahtlos miteinander verbunden."
 building_fe_security_2: "Justizzikkurat"
 building_fe_security_2_desc: "Dieses kolossale Bauwerk ist ein Monument der Gerechtigkeit und beherbergt Gerichte, Gefängnisse und Justizvollzugsanstalten, die selbst die härtesten Verbrecher rehabilitieren."
 building_fe_market_1: "Galaktischer Handelsknoten"
 building_fe_market_1_desc: "Diese hoch aufragenden Türme dominieren den Himmel und werfen riesige Schatten auf die geschäftigen Handelsviertel unter ihnen."
 building_fe_market_2: "Interstellarer Handelsnexus"
 building_fe_market_2_desc: "Die kolossalen Türme dieses Handelsdistrikts kontrollieren den gesamten Handel und sind bereits vom Orbit aus zu sehen."
 building_fe_silo_1: "Schrumpfdepot"
 building_fe_silo_1_desc: "Dieses Depot verringert den Abstand zwischen den Molekülen, um den Subraum zu krümmen, wodurch alles, was man in ihm einlagert, schrumpft. Lebewesen ist der Zutritt untersagt."
 building_fe_silo_2: "Außerdimensionales Depot"
 building_fe_silo_2_desc: "Durch die Erschaffung einer lokalen Taschendimension können nahezu unbegrenzt Ressourcen gelagert werden."
 building_fe_entertainment_1: "Virtueller Glückseligkeitskomplex"
 building_fe_entertainment_1_desc: "Diese riesigen Unterhaltungskomplexe sind der Gipfel des technologischen Fortschritts in Sachen Erholung und Freizeit. Gehirnwellen-Lesegeräte erlauben eine sofortige und personalisierte virtuelle Reise."
 building_fe_entertainment_2: "Omnidirektionaler Glückseligkeitsnexus"
 building_fe_entertainment_2_desc: "Dieser kolossale Gipfel der Unterhaltung überschreitet konventionelle Grenzen und lässt Träume wahr werden, noch ehe der Wunsch danach überhaupt manifestiert wird."
 building_fe_lab_1: "Quanten-Innovationsnexus"
 building_fe_lab_1_desc: "Dieses Technologiezentrum verfügt über hochmodernste Geräte und kann eine nahezu unbegrenzte Anzahl an Forschern unterbringen. Hier werden Quantentheorien nicht mehr nur erforscht, sondern für bahnbrechende Innovationen nutzbar gemacht."
 building_fe_lab_2: "Transzendierte Innovationsabteilung"
 building_fe_lab_2_desc: "Dieses Gebäude stellt den Gipfel des wissenschaftlichen Fortschritts dar und beweist, dass wir uns in einem Zeitalter grenzenloser Innovationen befinden."
 building_fe_mine_1: "Quanten-Bohranlage"
 building_fe_mine_1_desc: "Diese Bergbaustation kann sich dank der Quantentunneltechnik ohne physischen Kontakt durch feste Materialien bohren und so überall im Planetenmantel Mineralien finden."
 building_fe_mine_2: "Quanten-Bohrzentrum"
 building_fe_mine_2_desc: "Dieser Bergbaukomplex kann sich dank der Quantentunneltechnik ohne physischen Kontakt durch feste oder flüssige Materialien bohren und selbst im äußeren Planetenkern Mineralien abbauen."
 ### FE Jobs
 job_fe_overseer: "Aufseher"
 job_fe_overseer_plural: "Aufseher"
 job_fe_overseer_desc: "Jene wenigen Tapferen, die ein Luxusleben zugunsten eines Diensts an der Öffentlichkeit abgelehnt haben. Es liegt an ihnen, die Überreste ihrer alten Zivilisation zu überwachen und zu lenken."
 mod_job_fe_overseer_add: "Job als $job_fe_overseer$"
 job_fe_maintenance_bot: "Aufseher"
 job_fe_maintenance_bot_plural: "Aufseher"
 job_fe_maintenance_bot_desc: "Diese alten Maschinen warten und reparieren unermüdlich die zerfallende Maschinerie der Ringwelt, in der sie sich befinden."
 mod_job_fe_maintenance_bot_add: "Job als $job_fe_maintenance_bot$"
 mod_job_fe_maintenance_bot_per_pop: "§G+1§! $job_fe_maintenance_bot$en-Job für je $VALUE$ Bewohner"
 mod_job_fe_maintenance_bot_per_pop_short: "\n§G+1§! £mod_job_maintenance_drone_add£ für je $VALUE$ £pop£"
 job_fe_guardian_bot: "Wächter"
 job_fe_guardian_bot_plural: "Wächter"
 job_fe_guardian_bot_desc: "Diese uralten Maschinen halten eine unaufhörliche Mahnwache über Milliarden seit Langem dahingeschiedener, kryogenisch eingefrorener vernunftbegabter Wesen."
 mod_job_fe_guardian_bot_add: "Job als $job_fe_guardian_bot$"
 fe_hedonist: "$job_fe_hedonist$"
 job_fe_hedonist: "Hedonist"
 job_fe_hedonist_plural: "Hedonisten"
 job_fe_hedonist_desc: "Ein Leben voller Opulenz, in dem jedes mögliche materielle Bedürfnis oder Verlangen befriedigt werden kann."
 mod_job_fe_hedonist_add: "Job als $job_fe_hedonist$"
 job_fe_archivist: "Archivar"
 job_fe_archivist_plural: "Archivare"
 job_fe_archivist_effect_desc: "£job_archivist£ $job_fe_archivist_plural$ wandeln $r_consumer_goods$ in $r_research$ um"
 job_fe_archivist_desc: "Jedes Datenfragment muss präzise und nach den alten Riten, die vor Ewigkeit vom Ersten Bibliothekar etabliert wurden, archiviert, katalogisiert und indexiert werden."
 mod_job_fe_archivist_add: "Job als $job_fe_archivist$"
 job_fe_acolyte_farm: "Akolyth des Pfluges"
 job_fe_acolyte_farm_plural: "Akolythen des Pfluges"
 job_fe_acolyte_farm_plural_with_icon: "£job_fe_acolyte_farm£ $job_fe_acolyte_farm_plural$"
 job_fe_acolyte_farm_desc: "War es nicht der Pflug, jenes edelste aller Werkzeuge, das Kazargiel benutzte, um den giftigen Schwanz des dreimal verfluchten Dämons zu durchtrennen und so die Hungersnot abzuwehren?"
 job_fe_acolyte_farm_effect_desc: "£job_fe_acolyte_farm£ $job_fe_acolyte_farm_plural$ produzieren £food£ §Y$food$§!"
 mod_job_fe_acolyte_farm_add: "Job als $job_fe_acolyte_farm$"
 job_fe_acolyte_mine: "Akolyth des Hammers"
 job_fe_acolyte_mine_plural: "Akolythen des Hammers"
 job_fe_acolyte_mine_plural_with_icon: "£job_fe_acolyte_mine£ $job_fe_acolyte_mine_plural$"
 job_fe_acolyte_mine_desc: "Und mit einem mächtigen Schlag benutzte die heilige Mazakudal ihren brennenden Hammer, um den Schädel des Ersten Geistes in zwei Teile zu spalten und den Weg zu den Kristallen zu öffnen."
 job_fe_acolyte_mine_effect_desc: "£job_fe_acolyte_mine£ $job_fe_acolyte_mine_plural$ produzieren £minerals£ §Y$minerals$§!"
 mod_job_fe_acolyte_mine_add: "Job als $job_fe_acolyte_mine$"
 job_fe_acolyte_generator: "Akolyth des Hyperschlüssels"
 job_fe_acolyte_generator_plural: "Akolythen des Hyperschlüssels"
 job_fe_acolyte_generator_plural_with_icon: "£job_fe_acolyte_generator£ $job_fe_acolyte_generator_plural$"
 job_fe_acolyte_generator_desc: "Erinnert Euch auch an den Hyperschlüssel und wie ihn Bazagg der Glänzende benutzte, um die Sonne zu zähmen, als die Finsternis die Welt einzuholen drohte."
 job_fe_acolyte_generator_effect_desc: "£job_fe_acolyte_generator£ $job_fe_acolyte_generator_plural$ produzieren £energy£ §Y$energy$§!"
 mod_job_fe_acolyte_generator_add: "Job als $job_fe_acolyte_generator$"
 job_fe_acolyte_artisan: "Akolyth der Werkstatt"
 job_fe_acolyte_artisan_plural: "Akolythen der Werkstatt"
 job_fe_acolyte_artisan_desc: "Und so sprach Aznakha zu den Akolythen: \"Gehet in die Werkstätten und formt mit Eurem eigenen Handwerk jene Zukunft, die Ihr sucht.\""
 job_fe_acolyte_artisan_effect_desc: "£job_fe_acolyte_artisan£ $job_fe_acolyte_artisan_plural$ produzieren £consumer_goods£ §Y$consumer_goods$§!"
 mod_job_fe_acolyte_artisan_add: "Job als $job_fe_acolyte_artisan$"
 job_fe_protector: "Protektor"
 job_fe_protector_plural: "Protektoren"
 job_fe_protector_desc: "Damit die Mehrheit friedlich ruhen und ihr extravagantes Leben genießen kann, stehen diese robusten Individuen in der Nacht bereit, um all jenen Gewalt zu bescheren, die ihnen Schaden zufügen wollen."
 mod_job_fe_protector_add: "Job als $job_fe_protector$"
 job_fe_augur: "Augur des Schleiers"
 job_fe_augur_plural: "Augur der Schleier"
 job_fe_augur_desc: "Es spricht, doch nicht in Worten. Um Bedeutung zu finden, muss man am Rand des Wahnsinns schweben."
 mod_job_fe_augur_add: "Job als $job_fe_augur$"
 job_fe_sky_cardinal: "Himmelskardinal"
 job_fe_sky_cardinal_plural: "Himmelskardinäle"
 job_fe_sky_cardinal_desc: "Und es war dort, am Himmel, dass die Zukunft geboren wurde. Das Licht blendete, doch einige vermochten darüber hinwegzusehen. Sie nahmen es auf sich, andere voranzuführen."
 mod_job_fe_sky_cardinal_add: "Job als $job_fe_sky_cardinal$"
 job_fe_xeno_ward: "Xeno-Wache"
 job_fe_xeno_ward_plural: "Xeno-Wachen"
 job_fe_xeno_ward_desc: "Diese Exemplare wurden hier gesammelt, in Umgebungen, die sich ihrer natürlichen Umgebung annähern, um die Erhaltung ihrer Spezies in einer oft chaotischen und destruktiven Galaxie zu gewährleisten."
 mod_job_fe_xeno_ward_add: "Job als $job_fe_xeno_ward$"
 job_fe_xeno_keeper: "Xeno-Wärter"
 job_fe_xeno_keeper_plural: "Xeno-Wärter"
 job_fe_xeno_keeper_desc: "Diese Wärter kümmern sich um die Bedürfnisse der Xeno-Wachen unter ihrer Obhut."
 mod_job_fe_xeno_keeper_add: "Job als $job_fe_xeno_keeper$"
