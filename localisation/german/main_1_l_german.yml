 ####################################
 #Leader Traits
 ####################################
 #All
 leader_trait_adaptable: "Anpassungsfähig"
 leader_trait_adaptable_desc: "Dieser Anführer passt sich schnell an neue Methoden und Ideen an, falls sich diese als überlegen herausstellen."
 leader_trait_stubborn: "Stur"
 leader_trait_stubborn_desc: "Dieser Anführer ist stur und passt sich nur langsam an neue Methoden und Ideen an, auch wenn sich diese als überlegen herausstellen."
 leader_trait_resilient: "Belastbar"
 leader_trait_resilient_desc: "Dieser Anführer ist robust und in hervorragender physischer Verfassung, was seine Lebenserwartung erhöht."
 leader_trait_substance_abuser: "Drogensüchtig"
 leader_trait_substance_abuser_desc: "Dieser Anführer hat seinen Stress mit Drogenmissbrauch kompensiert, was seiner physischen Gesundheit geschadet hat."
 leader_trait_eager: "Eifrig"
 leader_trait_eager_desc: "Dieser Anführer wartet besonders ungeduldig auf seine Zuteilung."
 leader_trait_arrested_development: "Angehaltene Entwicklung"
 leader_trait_arrested_development_desc: "Die persönliche Entwicklung und die Fähigkeiten dieses Anführers scheinen sich auf einem Niveau eingependelt zu haben."
 leader_trait_intemporal: "Intemporär"
 leader_trait_intemporal_desc: "Die Zeit hat keine Auswirkung auf diesen Anführer, weshalb er nicht an Altersschwäche sterben wird."
 #Admiral
 leader_trait_ex_fighter_pilot: "Ehemaliger Jagdflieger"
 leader_trait_ex_fighter_pilot_desc: "Dieser Anführer ist ein früheres Jagdfliegerass und kann die Geschwindigkeit und Manövrierfähigkeit von Kurzstreckenkampfschiffen vortrefflich einsetzen."
 leader_trait_trickster: "Schwindler"
 leader_trait_trickster_desc: "Dieser Anführer kämpft hinterhältig, wobei er den Feind durch Irreführung und Überraschung überwindet."
 leader_trait_fleet_logistician: "Flottenlogistiker"
 leader_trait_fleet_logistician_desc: "Dieser Anführer ist ein meisterhafter Logistiker und weiß, wie man die Unterhaltskosten durch geschickte Vorratshaltung gering halten kann."
 leader_trait_fleet_organizer: "Flottenorganisator"
 leader_trait_fleet_organizer_desc: "Dieser Anführer kann hervorragend organisieren und hat die notwendigen Mikromanagement-Fähigkeiten zur Kommandierung gewaltiger Raumschiff-Formationen."
 leader_trait_nervous: "Nervös"
 leader_trait_nervous_desc: "Dieser Anführer ist nervös und ängstlich. Große Raumschiff-Formationen zu kommandieren, überfordert ihn schnell."
 leader_trait_engineer: "Ingenieur"
 leader_trait_engineer_desc: "Dieser Anführer ist ein geborener Ingenieur. Er verfügt über das Wissen und die Fähigkeiten, die Reparatur von Raumschiffen während Einsätzen zu organisieren und zu überwachen."
 leader_trait_aggressive: "Aggressiv"
 leader_trait_aggressive_desc: "Dieser Anführer ist für seine Aggressivität bekannt. Er überwältigt seine Feinde mit den unzähligen Waffensalven seiner Flotte."
 leader_trait_cautious: "Vorsichtig"
 leader_trait_cautious_desc: "Dieser Anführer ist ein vorsichtiger Kommandant, der unnötige Risiken meidet. Er bemüht sich stets, Formationen beizubehalten, in denen sich die Flotteneinheiten gegenseitig gegen den Feind unterstützen können."
 leader_trait_unyielding: "Unnachgiebig"
 leader_trait_unyielding_desc: "Dieser Anführer würde lieber bis zum Tod kämpfen, als eine Niederlage einzugestehen."
 leader_trait_gale_speed: "Schnell wie der Sturm"
 leader_trait_gale_speed_desc: "Dieser Anführer glaubt, dass bei Weltraumschlachten Geschwindigkeit und schnelles Manövrieren die Schlüssel zum Erfolg sind."
 leader_trait_lethargic: "Lethargisch"
 leader_trait_lethargic_desc: "Dieser Anführer ist langsam und träge. Seine Pflichten erfüllt er mit wenig Tatkraft oder Initiative."
 #General
 leader_trait_restrained: "Vorsichtig"
 leader_trait_restrained_desc: "Dieser Anführer versucht, Verluste zu minimieren und unnötige Todesfälle unter Soldaten und Nichtkombattanten zu vermeiden."
 leader_trait_defender: "Verteidiger"
 leader_trait_defender_desc: "Dieser Anführer ist ein hervorragender Verteidiger. Er weiß, wie man Bodentruppen und Befestigungsanlagen optimal einsetzt, um dem Feind planetare Invasionen so schwer wie möglich zu machen."
 leader_trait_attacker: "Invasor"
 leader_trait_attacker_desc: "Dieser Anführer versteht sich meisterhaft auf planetare Invasionen. Er weiß, wie man einen feindlichen Planeten mit maximaler Effizienz aus dem Weltraum stürmt."
 leader_trait_butcher: "Schlachter"
 leader_trait_butcher_desc: "Dieser Anführer ist rücksichtslos und gibt seinen Feinden kein Pardon."
 leader_trait_glory_seeker: "Nach Ruhm strebend"
 leader_trait_glory_seeker_desc: "Dieser Anführer steht immer an vorderster Front und hebt die Stimmung der Truppe trotz der damit verbundenen Risiken."
 leader_trait_armchair_commander: "Sesselgeneral"
 leader_trait_armchair_commander_desc: "Dieser Anführer befehligt die Truppen von hinten, wodurch die Front demoralisiert wird."
 leader_trait_army_logistician: "Armee-Logistiker"
 leader_trait_army_logistician_desc: "Dieser Anführer zaubert Vorräte quasi aus dem Nichts hervor, was die Unterhaltskosten von Bodentruppen reduziert."
 #Governor
 leader_trait_iron_fist: "Eiserne Faust"
 leader_trait_iron_fist_desc: "Dieser Anführer ist berüchtigt für sein rücksichtsloses Streben nach Effizienz. Er kann aus Sklaven maximale Arbeitskraft herausholen."
 leader_trait_army_veteran: "Armee-Veteran"
 leader_trait_army_veteran_desc: "Dieser Anführer ist ein Veteran und bevorzugt die Armee in seinem Sektor."
 leader_trait_retired_fleet_officer: "Flottenoffizier außer Dienst"
 leader_trait_retired_fleet_officer_desc: "Dieser Anführer ist ein ehemaliger Flottenoffizier und unterstützt aktiv die von ihm verwalteten Werften."
 leader_trait_architectural_interest: "Architektonisches Interesse"
 leader_trait_architectural_interest_desc: "Dieser Anführer ist stark an Architektur und Bautechniken interessiert."
 leader_trait_agrarian_upbringing: "Ländliche Erziehung"
 leader_trait_agrarian_upbringing_desc: "Dieser Anführer ist in einer Landwirtschaftszone aufgewachsen. Er hat ein besonderes Interesse daran, die Erträge zu optimieren."
 leader_trait_intellectual: "Intellektueller"
 leader_trait_intellectual_desc: "Dieser Anführer interessiert sich für die Wissenschaften. Er versucht, auch in seinen Untertanen ein Interesse an den Naturgesetzen zu wecken."
 leader_trait_environmental_engineer: "Umwelttechniker"
 leader_trait_environmental_engineer_desc: "Dieser Anführer ist mit den modernsten Geomodellierungsverfahren und kostensparendsten Techniken vertraut."
 leader_trait_bureaucrat: "Vereiniger"
 leader_trait_bureaucrat_desc: "Dieser Anführer zeichnet sich durch seine außergewöhnliche zwischenstaatliche Diplomatie und seine Fähigkeit aus, überall einen Konsens zu finden."
 leader_trait_bureaucrat_tt: "§E$PLANET_EFFECTS_TXT$ pro Fähigkeitsstufe:§!$TABBED_NEW_LINE$$mod_planet_jobs_unity_produces_mult$: §G+5%§!"
 #Scientist
 leader_trait_meticulous: "Akribisch"
 leader_trait_meticulous_desc: "Dieser Anführer geht bei der Untersuchung unbekannter Phänomene sehr gründlich vor."
 leader_trait_spark_of_genius: "Einfallsreich"
 leader_trait_spark_of_genius_desc: "Dieser Anführer neigt zu plötzlichen Inspirationsausbrüchen."
 leader_trait_carefree: "Sorglos"
