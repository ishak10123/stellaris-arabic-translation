 garrison_ARMY_NAME: "$POP$-Armee"
 garrison_army: "Miliz"
 garrison_army_plural: "Miliz"
 garrison_army_desc: "Jeder Planet hat eine verteidigende Miliz, deren Größe von der Bewohneranzahl abhängt. Milizen können nicht transportiert werden."
 slave_army: "Sklavenarmee"
 slave_army_plural: "Sklavenarmeen"
 slave_army_desc: "Sklavensoldaten, die ihren Herren auf dem Schlachtfeld dienen. Die meisten wurden zum Dienst an der Waffe gezwungen, aber einige von ihnen melden sich verzweifelt freiwillig, um ihre Essensrationen zu erhöhen oder aus grausamen Arbeitsbedingungen zu entkommen."
 requires_slave_processing_facility: "$TRIGGER_FAIL$Benötigt $building_slave_processing$ oder $sm_ring_slave_processing_facility$."
 clone_army: "Klonarmee"
 clone_army_plural: "Klonarmeen"
 clone_army_desc: "Modifizierte Klone, die innerhalb weniger Monate ausgewachsen sind. Ihre Lebensdauer von weniger als einem Jahrzehnt und ihr Mangel an persönlicher Initiative werden als akzeptabler Kompromiss für ihren totalen Gehorsam Offizieren gegenüber angesehen."
 robotic_army: "Robotische Angriffsarmee"
 robotic_army_plural: "Roboterarmeen"
 robotic_army_desc: "Kalte, herzlose Tötungsmaschinen, die nur für den Krieg gebaut werden. Sie gehen ihren Einsatzzielen unerbittlich nach und sind gegen die niederschmetternden Effekte schlechter Moral, die organischen Kampfeinheiten so oft zusetzen, völlig unempfindlich."
 robotic_defense_army: "Robotische Verteidigungsarmee"
 robotic_defense_army_plural: "Roboter-Verteidigungsarmee"
 robotic_defense_army_desc: "$robotic_army_desc$"
 android_army: "Androidische Angriffsarmee"
 android_army_plural: "Androidenarmeen"
 android_army_desc: "Androiden-Soldaten sind halb-autonome Rädchen einer gut geölten Kriegsmaschinerie. Sie sind robuster und aggressiver als ihre robotischen Vorgänger, außerdem können sie besser auf Veränderungen auf dem Schlachtfeld reagieren."
 android_defense_army: "Androidische Verteidigungsarmee"
 android_defense_army_plural: "Androiden-Verteidigungsarmee"
 android_defense_army_desc: "$android_army_desc$"
 psionic_army: "Psionische Armee"
 psionic_army_plural: "Psionische Armeen"
 psionic_army_desc: "Soldaten mit psionischen Fähigkeiten. Ihre Konzentration auf zerstörerische psionische Kräfte hat zu drastisch unterschiedlichen Kampftaktiken und -strategien geführt - ihr oberstes Ziel lautet stets, dem Feind seinen Kampfeswillen zu nehmen."
 xenomorph_army: "Xenomorph-Armee"
 xenomorph_army_plural: "Xenomorph-Armeen"
 xenomorph_army_desc: "Gefräßige Schreckenshorden aus dem Labor, die aus kaum mehr als Zähnen, Klauen und instinktivem Tötungsdrang zu bestehen scheinen.  Die tobenden Schwärme werden aus verstärkten Bunkern hinter der Front von einem Wissenschaftskader beaufsichtigt."
 gene_warrior_army: "Gensoldatenarmee"
 gene_warrior_army_plural: "Gensoldatenarmee"
 gene_warrior_army_desc: "Genetisch verbesserte Super-Soldaten. Rekruten werden normalerweise aus der Elite konventioneller Streitkräfte ausgewählt. Diese Soldaten werden dann einer umfangreichen Gentherapie unterzogen, wodurch sie größer, stärker und schneller als ihre ehemaligen Kameraden werden."
 swarm_army: "Prethoryn-Armee"
 swarm_army_plural: "Prethoryn-Armeen"
 swarm_army_desc: "Sie hungern nach dem Kampf."
