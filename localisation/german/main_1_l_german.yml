 DIFFICULTY_ADJUSTED_AI_MODIFIERS_TOOLTIP: "§H$DIFFICULTY_ADJUSTED_AI_MODIFIERS$§!\nReichsweite Wirtschaftsmodifikatoren werden mit dem §YSchwierigkeitsgrad§!-Bonus für KI-Reiche multipliziert. Zum Beispiel wird eine Technologie, die +20% £minerals£ $minerals$ durch [miner.GetIcon] Bergarbeiter-Jobs gibt, KI-Reichen auf dem Schwierigkeitsgrad ['concept_grand_admiral'] stattdessen +40% geben.\n\n§PWARNUNG:§! Ist diese Funktion aktiviert, wird die Wirtschaft von KI-Reichen im Endgame deutlich stärker sein."
 DIFFICULTY_CIVILIAN_DESC: "Der Spieler erhält massive Boni auf die Wirtschaft, die Forschung und die Flottenkapazität sowie einen Bonus auf den Aufbau neuer Beziehungen. Zusätzlich dazu sind aggressive und störende KI-Reiche deaktiviert."
 DIFFICULTY_CADET_DESC: "Der Spieler erhält Boni für die Wirtschaft, die Forschung und die Flottenkapazität."
 DIFFICULTY_ENSIGN_DESC: "Die KI erhält keine Boni für die Wirtschaft, die Forschung oder das Militär und ist dem Spieler gleichgestellt."
 DIFFICULTY_CAPTAIN_DESC: "Die KI erhält geringe Boni für die Wirtschaft, die Forschung und die Flottenkapazität."
 DIFFICULTY_COMMODORE_DESC: "Die KI erhält moderate Boni für die Wirtschaft, die Forschung und die Flottenkapazität."
 DIFFICULTY_ADMIRAL_DESC: "Die KI erhält hohe Boni für die Wirtschaft, die Forschung und die Flottenkapazität."
 DIFFICULTY_GRAND_ADMIRAL_DESC: "Die KI erhält massive Boni für die Wirtschaft, die Forschung und die Flottenkapazität."
 FE_DIFFICULTY_TOOLTIP: "§HSchwierigkeit§!\nDies legt den Schwierigkeitsgrad des Spiels fest.\n\nVerfügbare Schwierigkeitsgrade:\n- §Y$DIFFICULTY_CIVILIAN$§!: $DIFFICULTY_CIVILIAN_DESC$\n- §Y$DIFFICULTY_CADET$§!: $DIFFICULTY_CADET_DESC$\n- §Y$DIFFICULTY_ENSIGN$§!: $DIFFICULTY_ENSIGN_DESC$\n- §Y$DIFFICULTY_CAPTAIN$§!: $DIFFICULTY_CAPTAIN_DESC$\n- §Y$DIFFICULTY_COMMODORE$§!: $DIFFICULTY_COMMODORE_DESC$\n- §Y$DIFFICULTY_ADMIRAL$§!: $DIFFICULTY_ADMIRAL_DESC$\n- §Y$DIFFICULTY_GRAND_ADMIRAL$§!: $DIFFICULTY_GRAND_ADMIRAL_DESC$"
 FE_IRONMAN: "Ironman-Modus"
 FE_IRONMAN_TOOLTIP: "§HIronman-Modus§!\nIm Ironman-Modus sind Konsolenbefehle deaktiviert und das Spiel wird automatisch in einer einzelnen Datei gespeichert. In Spielen, die mit dieser Einstellung gespielt werden, gibt es kein Zurück."
 FE_EMPIRES_TOOLTIP: "§HAnzahl an KI-Reichen§!\nDies legt fest, wie viele KI-Reiche die Galaxie bevölkern werden."
 FE_ADVANCED_EMPIRES_TOOLTIP: "§HAnzahl an KIs mit Startvorteilen§!\nDies legt fest, wie viele reguläre KI-Reiche das Spiel mit einem Anfangsvorteil bei Ressourcen, Technologie und Bevölkerung beginnen. Außer einer stärkeren Startposition erhalten sie keine weiteren Boni. Diese Einstellung hat keinen Einfluss auf ['concept_fallen_empires']."
 FE_IRONMAN_MULTIPLAYER: "§RDer Ironman-Modus steht im Mehrspieler-Modus nicht zur Verfügung.§!"
 FE_IRONMAN_NOCLOUD: "§RZum Spielen im Ironman-Modus muss der Spieler die Steam Cloud aktiviert und sich bei Steam eingeloggt haben.§!"
 FE_IRONMAN_AUTOSAVE: "§RIm Ironman-Modus könnt Ihr die Frequenz der automatischen Speicherung nicht verändern.§!"
 FE_GALAXY_SHAPE_TOOLTIP: "§HGalaxietyp§!\nBestimmt die Form der Galaxiekarte.\n\nEinige Formen sind nur bei bestimmten §YGalaxiegrößen§! verfügbar.\n\nVerfügbare Formen:\n$concept_galaxy_shape_desc$"
 FE_GALAXY_SIZE_TOOLTIP: "§HGalaxiegröße§!\nBestimmt die Anzahl von Sternensystemen in der Galaxie und beeinflusst die Anzahl anfänglicher §YKI-Reiche§!.\n\n§RWARNUNG:§! Diese Einstellung wirkt sich ab einer bestimmten Galaxiegröße stark auf die Leistung im Endgame aus."
 ACHIEVEMENT_TOOLTIP_YES: "§GIn dieser Sitzung können Errungenschaften erhalten werden.§!"
 ACHIEVEMENT_TOOLTIP_NO: "§RIn dieser Sitzung können KEINE Errungenschaften erhalten werden.§!"
 ACHIEVEMENT_TOOLTIP_IRONMAN: "§RIronman-Modus ist nicht aktiviert§!"
 ACHIEVEMENT_TOOLTIP_CHECKSUM: "§RChecksumme ist modifiziert§!"
 ACHIEVEMENT_ELIGIBLE: "§GFür dieses Spiel gibt es Errungenschaften.§!"
 ACHIEVEMENT_CONSOLE_WARNING: "Wenn Debug-Befehle verwendet werden, kann man keine Erfolge sammeln."
 ACHIEVEMENT_NOT_ELIGIBLE: "§IFür dieses Spiel gibt es keine Errungenschaften.§!"
 NUM_FALLEN_EMPIRES: "Gefallene Reiche"
 FE_FALLEN_EMPIRES_TOOLTIP: "§HAnzahl an Gefallenen Reichen§!\nDies legt die maximale Anzahl an ['concept_fallen_empires', Gefallenen Reichen] fest, die in der Galaxie auftauchen können."
 NUM_MARAUDER_EMPIRES: "Marodeur-Reiche"
 FE_MARAUDER_EMPIRES_TOOLTIP: "§HAnzahl an Marodeur-Reichen§!\nDies legt die maximale Anzahl an ['concept_marauder_empires', Marodeur-Reichen] fest, die in der Galaxie auftauchen können.$requires_apoc$"
 NUM_HABITABLE_WORLDS: "Bewohnbare Welten"
 FE_HABITABLE_WORLDS_TOOLTIP: "§HBewohnbare Welten§!\nDiese Einstellung reguliert die Wahrscheinlichkeit dafür, dass ein Planet in der \"Goldlöckchen\"-Zone eines Sonnensystems liegt und damit bewohnbar ist. Eine Erhöhung dieses Wertes schafft eine Galaxie, in der es mehr bewohnbare Planeten gibt. Mit der Einstellung \"§Y$FE_HABITABLE_WORLDS_RARE$§!\" tauchen bewohnbare Welten zwar noch auf, aber nur in besonderen Systemen.\n\n§RWARNUNG:§! Sollte diese Einstellung auf mehr als 1x erhöht werden, kann dies Auswirkungen auf die Leistung im Endgame haben."
 FE_HABITABLE_WORLDS_RARE: "Selten"
 FE_RANDOMIZE: "Zufällig"
 FE_RANDOMIZE_EMPIRES_TOOLTIP: "Ist diese Option aktiviert, wird eine zufällige Anzahl von KI-Reichen innerhalb des vom Schieberegler festgelegten Bereichs generiert."
 FE_RANDOMIZE_ADVANCED_EMPIRES_TOOLTIP: "Ist diese Option aktiviert, wird eine zufällige Anzahl von KI-Reichen mit Startvorteilen innerhalb des vom Schieberegler festgelegten Bereichs generiert."
 FE_RANDOMIZE_FALLEN_EMPIRES_TOOLTIP: "Ist diese Option aktiviert, wird eine zufällige Anzahl von Gefallenen Reichen innerhalb des vom Schieberegler festgelegten Bereichs generiert."
 FE_RANDOMIZE_MARAUDER_EMPIRES_TOOLTIP: "Ist diese Option aktiviert, wird eine zufällige Anzahl von Marodeur-Reichen innerhalb des vom Schieberegler festgelegten Bereichs generiert."
 FE_CLUSTERED_STARTS: "Reichsplatzierung"
 FE_CLUSTERED_STARTS_TOOLTIP: "§HReichsplatzierung§!\nDies kontrolliert, ob Reiche in Nachbarschaft zueinander auftreten oder nach dem Zufallsprinzip in der Galaxie verteilt sind."
 FE_ADVANCED_NEAR_PLAYER: "Fortschrittliche Nachbarn"
 FE_ADVANCED_NEAR_PLAYER_TOOLTIP: "§HFortschrittliche Nachbarn§!\nDies kontrolliert, ob ['concept_advanced_empires', Fortschrittliche KI-Reiche] in der Nähe eines Spielers auftauchen dürfen. Ist diese Option §Ydeaktiviert§!, könnten weniger als die festgelegte Anzahl an fortschrittlichen KI-Reichen erstellt werden."
 FE_MID_GAME: "Anfangsjahr des Midgames"
 FE_MID_GAME_TOOLTIP: "§H$FE_MID_GAME$§!\nDies legt fest, zu welchem Jahr frühestens Midgame-Ereignisse wie der ['concept_machine_uprising', Maschinenaufstand] oder der ['concept_great_khan', Großkhan] auftreten können."
 FE_GUARANTEED_COLONIES: "Garantierte bewohnbare Welten"
 FE_GUARANTEED_COLONIES_TOOLTIP: "§H$FE_GUARANTEED_COLONIES$§!\nDies legt fest, wie viele bewohnbare Planeten derselben Planetenklasse wie Eure Heimatwelt garantiert in der Nähe Eures Startsystems erscheinen.\n\n§RWARNUNG:§! Ist diese Option deaktiviert, werden in der Nähe Eurer Heimatwelt keine bewohnbaren Welten vorhanden sein."
 FE_VICTORY: "Siegesjahr"
 FE_VICTORY_TOOLTIP: "§H$FE_VICTORY$§!\nDies legt fest, in welchem Jahr das Spiel enden wird, wenn keine ['concept_endgame_crisis', Endspielkrise] aktiv ist oder der ['concept_war_in_heaven', Himmelskrieg] ausgebrochen ist. Das Reich mit der höchsten §IWertung§! wird dann zum Sieger ernannt. Es ist möglich, auch nach diesem Jahr weiterzuspielen.\n\nIst der Schieberegler auf der maximalen Einstellung, wird der Zeitsieg vollständig deaktiviert."
 FE_END_GAME: "Anfangsjahr des Endgames"
 FE_END_GAME_TOOLTIP: "§H$FE_END_GAME$§!\nDies legt fest, zu welchem Jahr frühestens Endgame-Ereignisse wie ['concept_endgame_crises'] oder das ['concept_fallen_empire_awakening'] auftreten können."
 FE_TECH_SPEED: "Technologiekosten"
 FE_TECH_SPEED_TOOLTIP: "§H$FE_TECH_SPEED$§!\nDies legt fest, wie schnell ['concept_technologies'] von regulären Reichen erworben werden können."
 FE_TECH_SPEED_DIFFICULTY_SCALE: "Schwierigkeitsbedingte Technologiekosten"
 FE_TECH_SPEED_DIFFICULTY_SCALE_TOOLTIP: "§H$FE_TECH_SPEED_DIFFICULTY_SCALE$§!\nDies legt fest, wie stark der ausgewählte Schwierigkeitsgrad die Forschungskosten von ['concept_technologies'] beeinflusst. Fortschrittliche Technologien sind davon stärker betroffen.\n\nJe höher dieser Wert ist, desto schwieriger wird das Spiel, insbesondere bei höheren Schwierigkeitsgraden."
 DIFF_TECH_SCALING_OFF: "Aus"
 DIFF_TECH_SCALING_LOW: "Niedrig"
 DIFF_TECH_SCALING_NORMAL: "Normal"
 DIFF_TECH_SCALING_HIGH: "Hoch"
 DIFF_TECH_SCALING_EXTREME: "Extrem"
 DIFF_TECH_SCALING_OFF_TOOLTIP: "§H$DIFF_TECH_SCALING_OFF$§!\nDer Schwierigkeitsgrad hat keinen Einfluss auf die Kosten von ['concept_technologies']."
 DIFF_TECH_SCALING_LOW_TOOLTIP: "§H$DIFF_TECH_SCALING_LOW$§!\nDer Schwierigkeitsgrad hat geringe Auswirkungen auf die Kosten von ['concept_technologies']. Technologien einer höheren Stufe kosten im Verhältnis zu Technologien einer niedrigeren Stufe mehr."
 DIFF_TECH_SCALING_NORMAL_TOOLTIP: "§H$DIFF_TECH_SCALING_NORMAL$§!\nDer Schwierigkeitsgrad hat normale Auswirkungen auf die Kosten von ['concept_technologies']. Technologien einer höheren Stufe kosten im Verhältnis zu Technologien einer niedrigeren Stufe mehr."
 DIFF_TECH_SCALING_HIGH_TOOLTIP: "§H$DIFF_TECH_SCALING_HIGH$§!\nDer Schwierigkeitsgrad hat starke Auswirkungen auf die Kosten von ['concept_technologies']. Technologien einer höheren Stufe kosten im Verhältnis zu Technologien einer niedrigeren Stufe mehr."
 DIFF_TECH_SCALING_EXTREME_TOOLTIP: "§H$DIFF_TECH_SCALING_EXTREME$§!\nDer Schwierigkeitsgrad hat sehr starke Auswirkungen auf die Kosten von ['concept_technologies']. Technologien einer höheren Stufe kosten im Verhältnis zu Technologien einer niedrigeren Stufe mehr.\n\n§RWarnung:§! Auf einem sehr hohen Schwierigkeitsgrad kann es dadurch schwierig oder sogar unmöglich werden, die Endspiel-Krisen zu besiegen."
 FE_TRADITION_SPEED: "Traditionskosten"
 FE_TRADITION_SPEED_TOOLTIP: "§H$FE_TRADITION_SPEED$§!\nDies legt fest, wie schnell ['concept_traditions'] von regulären Reichen erworben werden können."
 FE_NAVAL_CAPACITY_MULT: "$NAVY_SIZE_TITLE$"
 FE_NAVAL_CAPACITY_MULT_TOOLTIP: "§H$FE_NAVAL_CAPACITY_MULT$§!\nDies multipliziert die Flottenkapazität aller Reiche und ist multiplikativ mit allen anderen Modifikatoren, die sich auf die Flottenkapazität auswirken.\n\n§RWarnung:§! Eine Erhöhung dieser Einstellung kann sich im späten Spielverlauf negativ auf die Leistung und Spielbalance auswirken."
 FE_COMMAND_LIMIT_MULT: "$COMMAND_LIMIT$"
 FE_COMMAND_LIMIT_MULT_TOOLTIP: "§H$FE_COMMAND_LIMIT_MULT$§!\nDies multipliziert das Befehlslimit aller Reiche und ist multiplikativ mit allen anderen Modifikatoren, die sich auf das Befehlslimit auswirken.\n\n§RWarnung:§! Eine Änderung dieser Einstellung kann sich auf die Spielbalance auswirken."
 FE_CRISES: "Krisenstärke"
 FE_CRISES_TOOLTIP: "§KKrisenstärke§!\nDies legt die Flottenstärke von ['concept_endgame_crises'] fest. Je höher der Multiplikator ist, desto gefährlicher fallen die Endspielkrisen aus.\n\nIst der §IKrisentyp§! auf §IAlle§! gestellt, wird dieser Wert für jede überlebte Endspielkrise mit 2 multipliziert.\n\nAuf dem Schwierigkeitsgrad §Y$DIFFICULTY_ENSIGN$§! oder höher wirkt sich dies zusätzlich auch auf die §YKrisen im Midgame§! aus."
 FE_PRIMITIVE_WORLDS: "Zivilisationen ohne ÜL-Technologie und beinahe vernunftbegabte Spezies"
 FE_PRIMITIVE_WORLDS_TOOLTIP: "§H$FE_PRIMITIVE_WORLDS$§!\nDies legt die Häufigkeit von ['concept_preftl_civilizations'] und ['concept_presapient_species', beinahe vernunftbegabter Spezies] in der Galaxie fest.\n\nJe höher dieser Wert ist, desto wahrscheinlicher werden diese bei der Generierung der Galaxie erschaffen."
 FE_LOGISTIC_CEILING: "Logistische Wachstumsobergrenze"
 FE_LOGISTIC_CEILING_TOOLTIP: "§H$FE_LOGISTIC_CEILING$§!\nDies legt fest, wie groß die Bewohnerwachstumsboni sind, wenn sich Planeten in der Mitte der Logistikkurve befinden. Je höher der Wert ist, desto schneller wachsen Bewohner heran.\n\n§RWARNUNG:§! Eine Erhöhung dieses Werts kann negative Auswirkungen auf die Leistung und die Spielbalance im Endgame haben."
 FE_GROWTH_SCALE: "Wachstumsskalierung"
 FE_GROWTH_SCALE_TOOLTIP: "§H$FE_GROWTH_SCALE$§!\nDies skaliert das Bewohnerwachstum basierend auf der Anzahl an Bewohnern im Reich. Je höher dieser Wert ist, desto langsamer wachsen Bewohner heran.\n\n§RWARNUNG:§! Eine Verringerung dieses Werts kann drastische negative Auswirkungen auf die Leistung und die Spielbalance haben. Es wird dringend empfohlen, auch die Einstellung für die §Y$FE_LOGISTIC_CEILING$§! zu verringern."
 FE_LOGISTICS_FLEET_UPKEEP: "Flottenunterhaltslogistikkosten"
 FE_LOGISTICS_FLEET_UPKEEP_TOOLTIP: "§H$FE_LOGISTICS_FLEET_UPKEEP$§!\nDies legt den Unterhalt an $r_trade$ für Flotten fest, wenn sich diese außerhalb eines Ankerplatzes oder in feindlichem Territorium befinden. Eine Erhöhung dieses Wertes erhöht die Unterhaltskosten für Flotten während eines Krieges."
 FE_LOGISTICS_PLANET_DEFICIT: "Planetendefizitlogistikkosten"
 FE_LOGISTICS_PLANET_DEFICIT_TOOLTIP: "§H$FE_LOGISTICS_PLANET_DEFICIT$§!\nDies legt die Kosten an $r_trade$ fest, um Planeten mit einem lokalen Defizit zu versorgen. Eine Erhöhung dieses Wertes erhöht die Kosten stark spezialisierter Planeten, die große lokale Defizite haben, selbst wenn andere Planeten im Reich sie versorgen."
