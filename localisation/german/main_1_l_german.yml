 FLEETORDER_LAND_ARMIES_CANT_LAND: "§RKein Schiff in dieser Flotte kann auf diesem Planeten landen.§!"
 FLEETORDER_LAND_ARMIES_ALREADY_LANDING: "§RDiese Armeen landen bereits.§!"
 FLEETORDER_LAND_ARMIES_NO_ARMIES: "§RIm Orbit gibt es keine Armeen.§!"
 FLEETORDER_LAND_ARMIES_NOT_IN_ORBIT: "§RFlotte muss sich zum Landen im Orbit befinden.§!"
 FLEETORDER_LAND_ARMIES_NOT_TRANSPORT_FLEET: "§RFlotte ist keine Transportflotte.§!"
 FLEETORDER_LAND_ARMIES_STARBASE_HOSTILE: "§RFeindliche Sternenbasis in $SYSTEM|Y$ verhindert Planeteninvasion.§!"
 FLEETORDER_HAS_NO_SCIENTIST: "§RBenötigt einen Wissenschaftler§!"
 FLEETORDER_NEED_SCIENTIST_LEVEL: "$TRIGGER_FAIL$ §RErfordert Wissenschaftler der §HStufe§! §Y$LEVEL$§!§!"
 FLEETORDER_MERGE: "Zusammenlegung mit $FLEET|H$"
 FLEETORDER_ORBIT_PLANET_BOMBARDMENT_TITLE: "Orbitalbombardierung"
 FLEETORDER_ORBIT_PLANET_BOMBARDMENT_DESC: "Wenn wir einen nicht-feindlichen Planeten bombardieren, wird sein Verwalter uns gegenüber feindselig! Sollen wir fortfahren?"
 FLEETORDER_GO_MIA_TITLE: "Im Einsatz verschwinden"
 FLEETORDER_GO_MIA_DESC: "Flotte(n) fand(en) keinen Weg nach Hause mehr. Sollen wir einen Not-ÜL-Sprung ausführen und im Einsatz verschwinden?"
 FLEETORDER_FOLLOW_FRIENDLIES_TITLE: "Vorausfliegen"
 FLEETORDER_FOLLOW_FRIENDLIES_DESC: "§GDiese Flotte kann vorausfliegen. Verbündete Flotten werden versuchen, ihr während eines §YKrieges§! zu folgen.§!"
 FLEETORDER_FOLLOW_FRIENDLIES_ON: "Derzeitige Einstellung: Verbündete Flotten §Ysollen§! folgen."
 FLEETORDER_FOLLOW_FRIENDLIES_OFF: "Derzeitige Einstellung: Verbündete Flotten §Ysollen NICHT§! folgen."
