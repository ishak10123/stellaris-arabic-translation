 SECTOR_MINERALS_STOCKPILE: "Mineralvorrat"
 SECTOR_MINERALS_STOCKPILE_DESC: "Dies ist die Anzahl der im Sektor vorrätigen Mineralien, die automatisch für Bauvorhaben benutzt werden."
