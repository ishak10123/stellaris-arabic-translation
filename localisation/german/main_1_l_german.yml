 pc_continental_tile: "Gemäßigtes Gelände"
 pc_continental_tile_desc: "Diverses bewaldetes Gelände mit mildem Klima."
 pc_desert_tile: "Wüstengelände"
 pc_desert_tile_desc: "Karges und trockenes Gelände mit gelegentlichen Felszungen."
 pc_arid_tile: "Arides Gelände"
 pc_arid_tile_desc: "Trockenes und felsiges Gelände mit spärlicher Vegetation."
 pc_tundra_tile: "Tundra-Gelände"
 pc_tundra_tile_desc: "Kaltes und windgepeitschtes Steppengelände mit spärlicher Vegetation."
 pc_tropical_tile: "Tropisches Gelände"
 pc_tropical_tile_desc: "Stark bewachsenes Gelände mit feuchtwarmem Klima."
 pc_ocean_tile: "Ozean-Gelände"
 pc_ocean_tile_desc: "Isolierte Inseln und Archipele in Ozeanen."
 pc_arctic_tile: "Arktisches Gelände"
 pc_arctic_tile_desc: "Schnee- und eisbedecktes Gelände ohne Vegetation."
 pc_savannah_tile: "Savannengelände"
 pc_savannah_tile_desc: "Warmes und trockenes Gelände mit weit auseinander stehenden Bäumen und Sträuchern."
 pc_alpine_tile: "Alpines Gelände"
 pc_alpine_tile_desc: "Erhöhtes Gelände - mit Schnee und Eis bedeckt."
 pc_gaia_tile: "Gaia-Gelände"
 pc_gaia_tile_desc: "Gelände mit Biomen, das für die meisten Lebensformen ausgesprochen gut geeignet ist."
 pc_nuked_tile: "Ödland-Gelände"
 pc_nuked_tile_desc: "Raues, vom Krieg zerklüftetes Gelände. Die Strahlung ist niedrig genug, um die meisten Lebensformen zu unterstützen."
 pc_infested_tile: "Infiziertes Gelände"
 pc_infested_tile_desc: "Von den Sekreten des Prethoryn-Schwarms verwüstetes Gelände."
 pc_ringworld_habitable_tile: "Ringwelt-Gelände"
 pc_ringworld_habitable_tile_desc: "Makelloses Gelände, das von den internen Systemen der Ringwelt erhalten wird."
 pc_machine_tile: "Kybernetisches Gebiet"
 pc_machine_tile_desc: "Sterilisiertes Gebiet, das unterirdische supraleitende Gitter schützt."
 pc_habitat_tile: "Habitatsgelände"
 pc_habitat_tile_desc: "Galvanisierte Platten auf künstlichen Schwerkraftgeneratoren fungieren als Fundament für städtische und industrielle Bauprojekte."
