 rebel_army: "Rebellenarmee"
 rebel_army_desc: "Rebellen sind ehemalige Bewohner, die genug von ihrer ungerechten Behandlung haben."
 rebel_slave_defense_army: "Sklavenrebellen"
 rebel_slave_defense_army_desc: "Armeen aus unzufriedenen Sklaven, die sich zur Eroberung des Planeten in einer gewaltsamen Revolte erhoben haben."
 primitive_army: "Primitive Armee"
 primitive_army_plural: "Primitive Armeen"
 primitive_army_desc: "Eine Primitive Armee ist kaum mehr als eine kopflos agierende Meute. Ausgerüstet sind ihre Kämpfer mit den barbarischen Waffen, die ihre jeweilige Welt hervorgebracht hat."
