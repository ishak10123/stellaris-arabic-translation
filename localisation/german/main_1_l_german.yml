 MEGASTRUCTURE_CONSTRUCTION_OR_UPGRADE_IN_PROGRESS: "$TRIGGER_FAIL$Aufgrund des gewaltigen Bedarfs an qualifiziertem technischem Personal können wir nicht mehr als $COUNT|Y$ Megastruktur(en) gleichzeitig bauen oder verbessern."
