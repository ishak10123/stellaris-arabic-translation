 trait_ruler_expansionist: "Expansionist"
 trait_ruler_expansionist_desc: "Dieser Anführer beabsichtigt die Erweiterung der nationalen Grenzen."
 trait_ruler_fertility_preacher: "Fruchtbarkeitsprediger"
 trait_ruler_fertility_preacher_desc: "Dieser Anführer zeichnet sich dadurch aus, immer genügend Ressourcen beschaffen zu können, die für das Überleben der wachsenden Bevölkerung notwendig sind."
