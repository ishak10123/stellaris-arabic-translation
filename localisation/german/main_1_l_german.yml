 elite_guard_army_desc_proper: "Die persönliche Elite-Leibgarde des Herrschers."
 elite_guard_army_trigger_tooltip: "Ein Herrscher kann nur eine persönliche Leibgarde rekrutieren."
 mutant_army: "Mutantenhorde"
 mutant_army_desc: "Mutanten sind im Angriff außerordentlich unerbittlich."
 ice_army: "Lebendiger Schneekrieger"
 ice_army_desc: "Ein gewaltiges, lebendiges Schneeungetüm, das in der Lage ist, Knochen, Hüllen und Leiterplatten seiner Feinde einzufrieren."
 titanic_assault_army: "Titanisches Biest"
