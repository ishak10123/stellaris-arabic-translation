 TOOLTIP_SETUP_APPEARANCE: "§H$PORTRAIT$§!\nSpeziestyp und Phänotyp auswählen."
 TOOLTIP_SETUP_SPECIES_NAME: "§H$SPECIES_NAME$§!\nWählt den Namen Eurer Spezies aus."
 TOOLTIP_SETUP_TRAITS: "§H$TRAITS$§!\nWählt die Eigenschaften Eurer Spezies aus."
 TOOLTIP_SETUP_RULER: "§H$RULER$§!\nBearbeitet Euren Startherrscher. Beachtet, dass Herrscher bei einigen Regierungstypen öfters ausgetauscht werden als bei anderen, und dass Herrscher sterben können."
 TOOLTIP_SETUP_NAME_CLASS: "§H$NAME_AND_CLASS$§!\nWählt die Planetenklasse Eures Heimatplaneten aus und passt seinen Namen an. Die ausgewählte Planetenklasse wird für Eure Spezies außerdem der primäre Planetentyp sein.\n\nAndere Planeten können von Eurer Spezies abhängig davon bewohnt werden, wie sehr sie sich von der Planetenklasse unterscheiden."
 TOOLTIP_SETUP_CITY_APPEARANCE: "§H$CITY_GRAPHICS$§!\nWählt das Erscheinungsbild Eurer Städte aus. Dies hat keinen Einfluss auf das Gameplay."
 TOOLTIP_SETUP_GOVERNMENT: "§H$ETHICS_AND_GOVERNMENT$§!\nWählt die Ethiken und den Regierungstyp für Euer Reich aus. Die ausgewählten Ethiken legen fest, welche Regierungstypen zur Auswahl stehen."
 TOOLTIP_SETUP_EMPIRE_ADVISOR: "§H$EMPIRE_ADVISOR$§!\nWählt eine Sprachart für Alarmmeldungen und Nachrichten aus."
 TOOLTIP_SETUP_EMPIRE_NAME: "§H$EMPIRE_NAME$§!\nPasst den Namen Eures Reichs an."
 TOOLTIP_SETUP_FLAG: "§H$EMPIRE_FLAG$§!\nPasst die Flagge Eures Reichs an."
 TOOLTIP_SETUP_EMPIRE_NAMELIST: "§H$CUSTOMIZE_NAME_LISTS$§!\nWählt eine Namensliste, aus der Schiffe, Anführer und Planeten benannt werden."
 TOOLTIP_SETUP_SPECIES_EMPIRE_NAMES: "§H$NAMES$§!\nPasst den Namen Eurer Spezies und Eures Reichs an."
 TOOLTIP_SETUP_WEAPONS: "§H$STARTING_WEAPONS$§!\nWählt, mit welchen Waffen Eure Schiffe bei Spielbeginn bewaffnet sind.\n\nIhr könnt während des Spiels ändern, mit welchen Waffenkomponenten Eure Schiffe ausgerüstet werden. Im §YSchiffsdesigner§! könnt Ihr während des Spiels ändern, mit welchen Komponenten Eure Schiffe ausgerüstet werden."
 TOOLTIP_SETUP_FTL: "§H$FTL_LABEL$§!\nWählt, mit welcher Methode Euer Reich interstellare Flüge durchführt. Eure ÜL-Methode kann nicht mehr geändert werden, es sei denn, Ihr schaltet einige äußerst seltene Technologien frei."
 TOOLTIP_SETUP_SHIP_APPEARANCE: "§H$SHIP_GRAPHICS$§!\nWählt das Erscheinungsbild der Schiffe in Eurem Reich aus."
 SECONDARY_SPECIES: "Sekundärspezies"
 TOOLTIP_SETUP_SECONDARY_SPECIES_APPEARANCE: "§H$PORTRAIT$§!\nWählt das Aussehen Eurer Sekundärspezies aus."
 TOOLTIP_SETUP_SECONDARY_SPECIES_NAME: "§H$SPECIES_NAME$§!\nWählt den Namen Eurer Sekundärspezies aus."
 TOOLTIP_SETUP_SECONDARY_SPECIES_NAMELIST: "§H$CUSTOMIZE_NAME_LISTS$§!\nWählt eine Namensliste aus, von der die Anführer Eurer Sekundärspezies ihre Namen erhalten."
 TOOLTIP_SETUP_SECONDARY_SPECIES_TRAITS: "§H$TRAITS$§!\nWählt, welche Eigenschaften Eure Sekundärspezies haben soll."
