 industrial_army: "Industriezeitalter Armee"
 industrial_army_plural: "Industriezeitalter Armeen"
 industrial_army_desc: "Einer Industriezeitalter Armee fehlt es am dynamischen Reaktionsvermögen moderner Streitmächte, aber sie ist recht gut organisiert. "
 postatomic_army: "Postatomare Armee"
 postatomic_army_plural: "Postatomare Armeen"
 postatomic_army_desc: "Eine postatomare Armee ist gemessen an primitiven Standards gut ausgerüstet, und hinsichtlich Ausbildung und Disziplin können sie es manchmal sogar mit den kühnsten zivilisierten Kampftruppen aufnehmen."
 subterranean_industrial_army: "$industrial_army$"
