 citizenship_symbiotic_drone: "Symbiotische Drohnen"
 citizenship_symbiotic_drone_tooltip: "$living_standard_symbiotic_drone_tooltip$"
 citizenship_symbiotic_drone_tooltip_delayed: "§LVon ihrem kollektiven Bewusstsein getrennt können diese Drohnen uns in unseren Kolonien unterstützen.§!"
 citizenship_exploited_drone: "Ausgebeutete Drohnen"
 citizenship_exploited_drone_tooltip: "$living_standard_exploited_drone_tooltip$"
 citizenship_exploited_drone_tooltip_delayed: "§LVon ihrem kollektiven Bewusstsein getrennt können diese Drohnen so manipuliert werden, dass sie uns dienen.§!"
 living_standard_disconnected_drone: "Schutz"
 living_standard_disconnected_drone_tooltip: "Bewohner dieser Spezies können in £building£ §YAlien-Zoos§! arbeiten"
