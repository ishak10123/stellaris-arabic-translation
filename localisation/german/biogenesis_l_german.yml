 ### BIOMORPHOSIS (GENETIC ASCENSION) SITUATION(S)
 ## REGULAR EMPIRE SITUATION
 #SET-UP / PREAMBLE
 genetic_ascension_situation: "Biomorphose"
 genetic_ascension_situation_type: "$genetic_ascension_situation$"
 genetic_ascension_situation_desc: "Die natürliche Auslese und der Gendrift stehen nicht länger zwischen uns und unserer biologischen Vorherrschaft. Als Zivilisation sind wir dabei, eine neue Zukunft für unsere Spezies zu definieren. Unser[Owner.Species.GetFleshTypeCyberCreed::<DE_END_PRO_S_N>] [Owner.Species.GetFleshTypeCyberCreed&NOM] ist wie Ton und wir sind die Bildhauer."
 genetic_ascension_situation_monthly_change_tooltip: "Unsere Genetiker treiben unsere Forschung ständig voran."
 genetic_ascension_situation_outcome: "Wir erschließen das volle Potenzial der Genmanipulation und sorgen für den Fortschritt unserer Spezies.\n\nWir wählen den ultimativen Ausdruck der Biomorphose."
 genetic_ascension_situation_pause_desc: "Situation pausiert"
 genetic_ascension_approach_selected: "$TRIGGER_FAIL$Wir haben bereits unsere Wahl für diese Phase getroffen."
 situation_gene_tailoring_needed_desc: "$TRIGGER_FAIL$Hat NICHT die Technologie \"['concept_gene_tailoring']\""
 mod_biomorphosis_progress_mult: "Monatlicher Fortschritt ($genetic_ascension_situation$)"
 #STAGE EVENTS
 bio.5.name: "Wesensveränderung" #STAGE ONE
 bio.5.desc.no_options: "Für unsere fortwährende Weiterentwicklung müssen wir entschlossen einen Weg wählen, der über unsere Reise bestimmt. Bei der Verwirklichung unseres vollen Potenzials müssen wir uns bewusst sein, dass dieses Unterfangen unser Wesen grundlegend verändern könnte.\n\nDie von uns selbst geschaffene Evolution ist eine bedeutsame Aufgabe. Die Veränderungen, die wir jetzt vornehmen, legen unsere weitere Zukunft fest."
 bio.5.desc.has_options: "$bio.5.desc.no_options$\n\nWir müssen nun wählen, welchen Weg wir einschlagen wollen, um unsere Reise zu beginnen."
 bio.5.a: "Der Weg der Reinheit."
 bio.5.b: "Der Weg des Klonens."
 bio.5.c: "Der Weg der Mutation."
 bio.10.name: "Der Wendepunkt" #STAGE TWO
 bio.10.desc.no_options: "Lenker unserer eigenen Evolution zu sein, führte zu bedeutsamen Fortschritten. Wir besitzen jetzt ein tieferes Verständnis über genetische Merkmale, die Reproduktion und die DNA-Sequenzierung.\n\nDer krönende Abschluss unserer Evolution ist zum Greifen nah. In nur wenigen Jahren werden wir unser Potenzial als Spezies voll ausgeschöpft haben."
 bio.10.desc.has_options: "$bio.10.desc.no_options$\n\nZum jetzigen Zeitpunkt jedoch können wir unseren derzeit gewählten Weg weiter beschreiten oder aber einen anderen Schwerpunkt für die nächste Phase unserer Entwicklung wählen."
 bio.10.a: "Wir müssen uns auf die Reinheit konzentrieren."
 bio.10.b: "Wir müssen uns auf das Klonen konzentrieren."
 bio.10.c: "Wir müssen uns auf Mutationen konzentrieren."
 bio.15.name: "Evolutionäre Kreuzung" #STAGE THREE
 bio.15.desc.no_options: "Unsere Bemühungen haben uns an die Schwelle eines bedeutenden evolutionären Wandels geführt. Wir müssen eine wichtige Entscheidung über den Weg treffen, den wir einschlagen wollen, um unser Potenzial voll auszuschöpfen."
 bio.15.desc.has_options: "$bio.15.desc.no_options$\n\nWir müssen erneut einen Schwerpunkt für die Zukunft wählen."
 bio.15.a: "Wir wählen die Reinheit."
 bio.15.b: "Wir werden die Klonung weiter verfeinern."
 bio.15.c: "Mutationen sind der Weg in die Zukunft."
 genetic_ascension_approach_purity: "Reinheit"
 genetic_ascension_approach_cloning: "Klonung"
 genetic_ascension_approach_mutation: "Mutation"
 genetic_ascension_approach_purity_desc: "Wir konzentrieren unsere Bemühungen auf die Reinheit."
 genetic_ascension_approach_cloning_desc: "Die Klonforschung wird uns ein weiteres Wachstum erlauben."
 genetic_ascension_approach_mutation_desc: "Unsere Zukunft liegt in der Genmutation."
 bio.20.name: "Der eingeschlagene Weg" #FINAL STAGE - TRADITION TREE CHOICE
 bio.20.desc: "Ob wir nun nach der reinsten Form unserer selbst streben, ob wir uns klonen, um effizienter zu werden, oder ob wir uns durch gezielte Mutationen genetisch verändern: Dieser Moment markiert einen Punkt, an dem es kein Zurück mehr gibt."
 bio.20.desc.evopred: "Wir haben uns von Natur aus schon immer angepasst. Wir sind die komplexeste Lebensform in diesem Universum, und mithilfe der Forschung werden wir uns weiter verändern.\n\nDie Zukunft ist chaotisch, und das ist perfekt für uns."
 bio.20.a: "Wir werden ergründen, was es bedeutet, rein zu sein."
 bio.20.b: "Wir klonen uns zum Erfolg."
 bio.20.c: "Wir werden uns die Macht der Mutation zunutze machen."
 #Random Events
 bio.50.name: "Ein wenig gleicher"
 bio.50.desc: "Infolge unseres Schwerpunkts der genetischen Reinheit haben die augmentierten Bürger unseres Reichs begonnen, sich selbst als überlegen zu betrachten. Sie fordern kürzere Arbeitstage, mehr Dienstleistungen und mehr politische Macht ob dieser vermeintlichen Überlegenheit. Ihre zunehmend aggressiven Kundgebungen sind zu einem ersten Problem geworden und stören die täglichen Abläufe."
 bio.50.a: "Greift hart gegen die Demonstranten durch."
 bio.50.b: "Ihre Bedenken sind berechtigt."
 bio.55.name: "Gesellschaftliche Mitose"
 bio.55.desc: "Eine gesellschaftsspaltende Rhetorik beherrscht die Nachrichten, und Meinungsverschiedenheiten zerreißen die soziale Einheit. Es ist eine neue Art von Klassenkampf ausgebrochen, weil Gesellschaftsmitglieder mit modifizierten Genen immer mehr Möglichkeiten haben.\n\nDie genetisch Verbesserten sind der Auffassung, sie seien die Zukunft unserer Spezies, wohingegen die Traditionalisten das Gefühl haben, wir würden zu weit in unnatürliche Bereiche vordringen."
 bio.55.a: "Überlegene Individuen für eine überlegene Welt."
 bio.55.b: "Vielleicht schreiten wir etwas zu schnell voran."
 bio.60.name: "Säuerliche Ungleichheit"
 bio.60.desc: "Prüfungen der genetischen Reinheit sind in einigen Branchen an der Tagesordnung, und wer als genetisch überlegen gilt, wird bei der Arbeit und bei der Ausbildung bevorzugt behandelt und erhält leichteren Zugang zu Machtpositionen.\n\nWährend manche argumentieren, biologische Verbesserungen machten stärker und gesünder, behaupten andere, diese Denkweise führe zu einer unangemessenen Diskriminierung jener, die nicht bereit oder in der Lage sind, ihr Genom in unserem Streben nach genetischer Perfektion zu verändern."
 bio.60.a: "Wir müssen sicherstellen, dass jeder die gleichen Möglichkeiten hat."
 bio.60.b: "Nur die Stärksten überleben."
 bio.65.name: "Helden und Bösewichte"
 bio.65.desc: "Unser Streben nach Reinheit hat bestimmte Individuen dazu ermutigt, eine wichtige Rolle in Sachen öffentliche Sicherheit zu übernehmen. Aufgrund ihrer überlegenen Körperkraft, ihrer Beweglichkeit und ihrer Ausdauer haben sich kleinere Banden von \"Weltverbesserern\" gebildet, die sich selbst als Hüter der Ordnung ansehen.\n\nIhr Streben hat jedoch auch dazu geführt, dass in den Schatten ebenso fähige Gegner aufgetaucht sind, deren böswillige Absichten der Wunsch antreibt, die Waagschalen der Macht wieder ins Gleichgewicht zu bringen. Die Zusammenstöße zwischen diesen beiden Lagern haben erhebliche Sachschäden verursacht und gefährden sogar Zivilisten."
 bio.65.a: "Die Selbstjustiz hat keinen Platz auf unseren Straßen."
 bio.65.b: "Sollen sie doch kämpfen."
 MAVERICK_CITIZENS_MOD: "[enforcer.GetIcon] §Y[enforcer.GetNamePlural]§!-Jobs produzieren §G+2§! $r_stability$ und §G+2§! $r_unity$ für jeweils 100 von ihnen."
 bio.66.name: "Superbeschränkungen"
 bio.66.desc: "Wir haben den Handlungsspielraum von Individuen mit Superkräften stark eingeschränkt und sie unterliegen jetzt strengeren Vorschriften. Unsere verstärkte Überwachung erlaubt es uns außerdem, ihre Aktivitäten besser zu kontrollieren und nötigenfalls weiter einzuschränken.\n\nObwohl wir eifrig daran arbeiten, dass sie ihre Kräfte nur zum Wohl unseres Reichs einsetzen, wachsen Angst und Verachtung sowohl unter jenen mit Superkräften als auch unter den Nicht-Augmentierten. Unsere Bevölkerung ist in dieser Frage gespalten."
 bio.66.a: "Hebt Regimenter mit diesen Supersoldaten aus."
 bio.66.b: "Sorgt dafür, dass die Entrechteten wieder in die Gesellschaft rehabilitiert werden."
 bio.67.name: "Superabhängigkeit"
 bio.67.desc: "Unsere zunehmende Abhängigkeit von der Selbstjustiz durch genetisch verbesserte Individuen ist ein zweischneidiges Schwert. Obwohl sie uns ein gewisses Gefühl der Sicherheit vermitteln, ist uns nicht entgangen, wie sehr wir von ihnen abhängig geworden sind.\n\nUnser Volk ist dankbar, doch es wendet sich auch zunehmend an Individuen mit Superkräften, um Rat und Unterstützung zu erhalten, wobei man den Rechtsweg umgeht und die Verwaltung ignoriert. Die Grenze zwischen diesen Helden und einer Regierung wird immer verschwommener. Unsere Macht steht auf dem Spiel."
 bio.67.a: "Gründet einen Rat der Superwesen!"
 bio.67.b: "Beschränkt den Einfluss dieser \"Helden\" auf Regierungsangelegenheiten."
 bio.70.name: "Zwei für einen"
 bio.70.desc: "Es hat sich herausgestellt, dass ein beliebter Anführer, den man galaxieweit für seine unermüdliche Arbeit in Sachen Arbeitsethik feiert, in Wahrheit nicht ein einzelnes, sondern zwei Individuen ist.\n\nEs ist ans Licht gekommen, dass dieser Anführer einen perfekten Klon besitzt und beide in wechselnden Schichten arbeiten. Während sich der eine mit öffentlichen Belangen und der Verwaltungsarbeit beschäftigt, ruht sich der andere aus und erholt sich im Verborgenen.\n\nDiese Enthüllung hat die politische Landschaft erschüttert und Fragen nach den ethischen Grenzen der Klontechnologie aufgeworfen."
 bio.70.a: "Ein äußerst effizienter Einsatz der Klontechnologie."
 bio.70.b: "Entlasst beide für diese offensichtliche Täuschung."
 bio.75.name: "Revolte der Klone"
 bio.75.desc: "Die geläufige Praxis, Klone für die Organentnahme einzusetzen, führt bereits zu Komplikationen. Mehrere Klone, die offenkundig über Empfindungsfähigkeit verfügen, rebellieren und sind in den Hungerstreik getreten.\n\nWährend viele argumentieren, das Original solle Vorrang haben, vertreten andere die Position, dass jedes empfindungsfähige Wesen das Recht auf seine persönliche Autonomie haben sollte. Dieses Thema ist Gegenstand heftiger Debatten geworden."
 bio.75.a: "Beendet die Klontransplantationen."
 bio.75.b: "Die Rechte des Originals haben Vorrang."
 bio.80.name: "Die Bürde der Beweisführung"
 bio.80.desc: "Die Strafverfolgungsbehörden stecken in einer Zwickmühle. Die Kriminalität in unserer Hauptstadt wächst immer weiter, doch es gibt immer weniger Gerichtsverfahren. Immer mehr mutmaßliche Verbrecher plädieren auf nicht schuldig und behaupten, ihre Klone hätten die Straftaten begangen.\n\nWenn Verdächtige nicht auf frischer Tat ertappt werden, ist es fast unmöglich geworden, ihre Schuld zu beweisen. Manche Richter fordern nun die effektive Entkriminalisierung der meisten Rechtswidrigkeiten."
 bio.80.a: "Verstärkt die Überwachungssysteme."
 bio.80.b: "Weniger Gesetze bedeuten auch weniger Verbrechen."
 bio.85.name: "Auffallende Ähnlichkeit"
 bio.85.desc: "Innerhalb unserer Grenzen wurde eine riesige, nicht genehmigte Klonanlage entdeckt, in der Tausende Doppelgänger von [Owner.Leader.GetTitle] [Owner.Leader.GetName] untergebracht sind. Die zivilen Wissenschaftler vor Ort wurden in Gewahrsam genommen, doch niemand von ihnen kooperiert. Sie alle behaupten, nicht zu wissen, wer die Klone in Auftrag gegeben hat.\n\nDie wenigen Beweise lassen mutmaßen, dass [Owner.Leader.GetName] selbst dahinter stecken könnte. Bedauerlicherweise ist [Owner.Leader.GetSheHe] spurlos verschwunden."
 bio.85.a: "Beseitigt die Klone."
 bio.85.b: "Wir haben eine Klonarmee geerbt."
 bio.85.b.tt: "([owner.capital_scope.GetName]):\nErhält eine §Y$clone_army$§!."
 bio.85.c: "Lasst die Klone frei."
 bio.85.c.tt: "Wir erhalten einige §YBewohner§!"
 bio.86.name: "Unerwartete Gegenreaktion"
 bio.86.desc: "Die Beseitigung so vieler Klone hat innerhalb der Gesellschaft für Empörung gesorgt und zu zahlreichen Debatten geführt. Verärgerte [Owner.GetSpeciesAdj]e Rechtsaktivisten und Glaubensgruppen haben zu großen Protesten aufgerufen.\n\nEs gibt zudem Gerüchte darüber, dass einige der Klone entkommen konnten und inmitten der Bevölkerung lauern."
 bio.86.a: "Vielleicht können wir etwas daraus lernen ..."
 bio.86.b: "Entsendet die Sicherheit, um den Pöbel zum Schweigen zu bringen."
 bio.86.b.tt: "([owner.capital_scope.GetName]):\nErhält drei §Y$assault_army_plural$§!."
 bio.90.name: "Mutantengemeinde"
 bio.90.desc: "Viele innerhalb unserer Grenzen, die über auffällige oder unkonventionelle genetische Mutationen verfügen, werden von der Gesellschaft ausgegrenzt. Diese \"Mutanten\" wurden in den Untergrund gezwungen und haben dort ihre eigenen Enklaven gebildet.\n\nWer sich in diese Enklaven hineinwagt, kehrt nur selten zurück."
 bio.90.a: "Löst die Enklaven auf."
 bio.90.b: "Beobachtet ihren Fortschritt. Aus gebotener Distanz."
 bio.95.name: "Transgene Rebellion"
 bio.95.desc: "Unsere Jugend hat damit begonnen, ihr Äußeres zu verändern, wenn auch offenbar allein zu ihrer Belustigung.\n\nZu den neuesten Trends gehören Facettenaugen und Wettbewerbe, bei denen es darum geht, wie viele zusätzliche Gliedmaßen an einem einzigen Körper angebracht werden können, wobei der aktuelle Rekord bei 156 liegt.\n\nDiese \"Biohacker\" haben aufgrund von Sicherheitsbedenken die Aufmerksamkeit der Öffentlichkeit erregt. Der Ruf nach strengeren Beschränkungen für genetische Mutationen wird immer lauter, und wir sind dazu gezwungen, Stellung zu nehmen."
 bio.95.a: "Das ist doch nur ein harmloser Spaß."
 bio.95.b: "156 Gliedmaßen sind zu viel."
 bio.100.name: "Unerwarteter Rückschlag"
 bio.100.desc: "Die weite Verbreitung genetischer Mutationen innerhalb unserer Gesellschaft brachte eine verwirrende Vielzahl körperlicher Variationen hervor.\n\nEinst vorhersehbare biologische Entwicklungen weisen nun unerwartete Abweichungen auf, die eine Standardisierung nahezu unmöglich machen.\n\nDie physischen Gemeinsamkeiten, die unsere Spezies einst einten, werden immer weniger und durch ein Kaleidoskop verschiedener Formen und Funktionen ersetzt, die den gesellschaftlichen Zusammenhalt gefährden."
 bio.100.a: "Fördert die Vielfalt."
 bio.100.a.tt: "§Y400§! zufällige £pop£ §HBewohner§! erhalten die Eigenschaft \"['trait:trait_bioadaptability']\", \"['trait:trait_social_pheromones']\" oder \"['trait:trait_limited_regeneration']\""
 bio.100.b: "Führt eine standardisierte Genetikvorlage ein."
 bio.105.name: "Zelluläre Amorphie"
 bio.105.desc: "Ein transgenes Experiment endete in einem katastrophalen Fehlschlag. Wissenschaftler versuchten, die DNA des Testsubjekts mit der eines anderen multizellularen Organismus zu vermischen, um eine Hyperimmunreaktion hervorzurufen, die das Individuum gegen alle Viren unempfindlich machen sollte.\n\nStattdessen haben sie jedoch eine Kreatur geschaffen, die die Zellwände jedes Organismus, mit dem sie in Berührung kommt, auflöst und mit ihm zu einer riesigen amorphen Masse aus biologischem Material verschmilzt.\n\nDieser Klumpen Biomasse ist durch die gesamte Versuchsanlage gerollt und hat alles auf seinem Weg verschlungen. Er konnte vorerst eingedämmt werden, stellt jedoch eine erhebliche Gefahr dar, sollte er entkommen. Glücklicherweise scheint die Masse jedoch essbar zu sein ..."
 bio.105.a: "Neutralisiert den Klumpen Biomasse!"
 bio.105.b: "Es könnte das Risiko wert sein, diese Kreatur genauer zu studieren."
