 bio.40.name: "Biologische Unterscheidungsmerkmale" #FINAL STAGE - TRADITION TREE CHOICE
 bio.40.desc: "Ob wir nun nach der reinsten Form unserer selbst streben, ob wir uns klonen, um effizienter zu werden, oder ob wir uns durch gezielte Mutationen genetisch verändern: Dieser Moment markiert einen Punkt, an dem es kein Zurück mehr gibt."
 bio.40.desc.evopred: "$bio.20.desc.evopred$"
 bio.40.a: "$bio.20.a$"
 bio.40.b: "$bio.20.b$"
 bio.40.c: "$bio.20.c$"
 #Random Events (Hives)
 bio.110.name: "Arbeitsteilung"
 bio.110.desc: "Wir haben damit begonnen, [target.GetGestaltEntityName::<DE_ART_DEF_S_A>] [target.GetGestaltEntityName&AKK] biologisch aufzuwerten, und müssen nun jene Fortschritte priorisieren, die am vorteilhaftesten für unsere Zivilisation sein werden.\n\nDie selektive Genmanipulation erlaubt es uns, Spezialisten mit den gewünschten physischen Merkmalen für die jeweilige Industrie heranzuzüchten.\n\nDurch diese neuen Fähigkeiten haben wir die Möglichkeit, [target.GetIndividualNamePlural] hervorzubringen, die entweder in der Energieproduktion oder aber in der Verteidigung arbeiten."
 bio.110.a: "Energie ist immer nützlich."
 bio.110.b: "Wir sollten die Verteidigung priorisieren."
 bio.115.name: "Generationsredundanz"
 bio.115.desc: "Mit der Einführung einer neuen biologischen Vorlage für unsere Drohnen müssen wir nun darüber entscheiden, wie mit jenen verfahren werden soll, die mit den genetischen Verbesserungen nicht kompatibel sind.\n\nBesonders einige der älteren Drohnen verfügen nicht mehr über die nötige Stärke für diese Verbesserungen. Wir können sie entweder für den Rest ihrer Lebenszeit als Arbeiter einsetzen oder aber ihre Biomaterie recyceln, um den Schwarm zu nähren."
 bio.115.a: "Recycelt die alten Drohnen."
 bio.115.b: "Sie haben noch immer einen gewissen Nutzen."
 bio.120.name: "Geschwindigkeit oder Ausdauer"
 bio.120.desc: "Ein Durchbruch in der Genforschung hat einen neuen Weg zur Stärkung der Neuraleffizienz aufgezeigt, was die [target.GetIndividualNamePlural]produktivität erheblich steigern würde.\n\nDiese gesteigerte Gehirnleistung über einen längeren Zeitraum hinweg aufrechtzuerhalten, ist jedoch gefährlich und könnte die Lebenserwartung deutlich senken.\n\nWir müssen entscheiden, ob wir unsere derzeitige Lebensspanne beibehalten oder aber unsere Hirnfunktionen auf Kosten einer geringeren Lebensspanne steigern wollen."
 bio.120.a: "Das Leben ist schon jetzt zu kurz."
 bio.120.b: "Verbessert die [target.GetIndividualNamePlural]produktivität."
 bio.125.name: "Synapsenüberlastung"
 bio.125.desc: "Die neueste Charge augmentierter [target.GetIndividualNamePlural] wurde in [target.GetGestaltEntityName::<DE_ART_DEF_S_A>] [target.GetGestaltEntityName&AKK] integriert. Ihre Biologie wurde darauf abgestimmt, die neuronale Entwicklung und die kognitiven Prozesse zu beschleunigen. Die wichtigsten Knoten [target.GetGestaltEntityName::<DE_ART_DEF_S_G>] [target.GetGestaltEntityName&GEN] arbeiten jetzt mit einer unvergleichlichen Geschwindigkeit.\n\nDiese Beschleunigung ihrer Denkleistung strapaziert allerdings auch die Stabilität der [target.GetIndividualNamePlural], die Gefahr laufen, einer katastrophalen Synapsenüberlastung zu erliegen. Wir könnten alternativ in Erwägung ziehen, einfach mehr [target.GetIndividualNamePlural] der Koordination von Aufgaben zuzuweisen."
 bio.125.a: "Verlangsamt die Prozesse und bewahrt die derzeitige Stabilität."
 bio.125.b: "Man sollte schnell leben und hell ausbrennen."
 bio.130.name: "Frequenzphänomen"
 bio.130.desc: "Seit der Integration der neuen augmentierten Klone in unseren Schwarm sind wir von einem unangenehmen, durch Schwingungen erzeugten Geräusch geplagt. Ein Fehler im Klonprozess hat offenbar zur Entwicklung neuer Transmitter geführt, die diese Interferenz verursachen.\n\nSobald diese Klone mit dem Rest des Schwarms in Kontakt kommen, werden alle Drohnen in der Nähe von diesem lauten und äußerst beunruhigenden mentalen Tinnitus heimgesucht. Die Ablenkung ist groß und die Produktivität gefährdet."
 bio.130.a: "Unangenehm, aber nicht unerträglich."
 bio.130.b: "Beseitigt die betroffenen Klone."
 bio.135.name: "Ein Problem der Bewegung"
 bio.135.desc: "Die jüngsten Experimente in der Klonforschung haben einige ungewöhnliche Ergebnisse geliefert. Manche der Klone scheinen eine neurale Verbindung zu ihren Genspendern zu besitzen, was dazu führt, dass sie sich unbeabsichtigt im Tandem bewegen.\n\nDieses Phänomen bleibt unabhängig von der Entfernung bestehen, wobei einzelne Drohnen die Handlungen ihrer Gegenstücke anderswo in der Galaxie widerspiegeln. Daraus ergeben sich einige faszinierende Möglichkeiten.\n\nWir können eine Initiative gründen, um die Klone und die Genspender zusammenzubringen und sie in identischen Umgebungen arbeiten lassen. Alternativ könnten wir versuchen, die dafür verantwortlichen Neuraltransmitter zu extrahieren, um das Phänomen genauer zu untersuchen."
 bio.135.a: "Richtet identische Arbeitsplätze für Genspender und Klone ein."
 bio.135.b: "Trennt die Verbindung, die für diese Synchronität verantwortlich ist, auf chirurgischem Weg."
 bio.140.name: "Inkompatible Klone"
 bio.140.desc: "Um den Schwarm zu stärken, züchteten wir eine Reihe von Klonen aus dem Genmaterial von Spendern und beschleunigten ihre Heranreifung künstlich. Die Klone sind zwar biologisch einwandfrei, aber nicht kompatibel zum Rest des Schwarms.\n\nDiese Abweichung mag problematisch sein, eröffnet aber auch einzigartige Möglichkeiten. Die individualistischen Drohnen besitzen eigene Identitäten und unabhängige Gedanken, die für den Kontakt zu Wesen außerhalb des Kollektivs vorteilhaft sein könnten. Ihre Fähigkeit, autonom zu denken, könnte jene Differenzen überbrücken, angesichts derer die einheitliche Stimme des Schwarms Schwierigkeiten hat. Diese Vorteile gehen jedoch auch mit einem gewissen Preis einher: Ihre Individualität führt zu einiger Unruhe, die die höheren kognitiven Funktionen des Schwarms beeinträchtigt."
 bio.140.a: "Erzwingt ihre Integration."
 bio.140.b: "Nutzt ihr Potenzial."
 bio.145.name: "Schöpfungsbedenken"
 bio.145.desc: "Unser kollektives Bewusstsein befindet sich in Aufruhr. Wir besitzen jetzt die Fähigkeit, Kopien unserer selbst anzufertigen, und doch zögern wir und stellen die Wirksamkeit dieser Methode (und sogar die dahinterliegende Moral) infrage.\n\nDer Klonvorgang erfordert eine riesige Menge an Ressourcen - Mittel, die vielleicht besser an anderer Stelle eingesetzt werden sollten? Hinzu kommt, dass die natürliche Fortpflanzung wahrscheinlich eine größere genetische Vielfalt hervorbringen würde.\n\nHistorisch gesehen haben wir uns noch nie auf diese Weise fortgepflanzt, und wir sind uns nicht sicher, ob wir bereit sind, einen derart grundlegenden Wandel zu akzeptieren."
 bio.145.a: "Die Effizienz von Klonen darf nicht ignoriert werden."
 bio.145.b: "Es ist unerlässlich, dass wir die genetische Vielfalt aufrechterhalten."
 bio.150.name: "Ausgebrannter Schwarm"
 bio.150.desc: "Unsere Mutationsexperimente haben zu Irregularitäten innerhalb des Schwarms geführt. Aufgaben, die einst mit Leichtigkeit erledigt wurden, erfordern sichtlich Arbeit, da widersprüchliche Direktiven den kollektiven Verstand belasten.\n\nDie daraus resultierende Erschöpfung droht zwar einige unserer effektivsten Drohnen auszubrennen, bietet aber auch eine einmalige Gelegenheit.\n\nWir müssen uns entscheiden: Wollen wir innehalten und uns etwas erholen oder aber wollen wir über unsere Grenzen hinausgehen?"
 bio.150.a: "Wir verdienen eine Pause."
 bio.150.b: "Wir können schlafen, wenn wir tot sind."
 bio.151.name: "Erfrischt und erneuert"
 bio.151.desc: "Unsere Entscheidung, uns auszuruhen und uns zu erholen, hat Früchte getragen. Die einst chaotischen Impulse haben sich beruhigt und sind zu einem harmonischen Gedankenfluss verschmolzen, der das Kollektiv mit neuer Klarheit vorantreibt.\n\nDrohnen, die einst kurz vor dem Burnout standen, arbeiten nun mit einer unvergleichlichen Präzision. Diese Phase der Reflexion hat nicht nur unsere kollektive Erschöpfung verringert, sondern auch unsere Entschlossenheit bezüglich der vor uns liegenden Herausforderungen gestärkt."
 bio.151.a: "Wir strahlen förmlich!"
 bio.155.name: "Spezialisieren oder Generalisieren"
 bio.155.desc: "Mutationen bieten viele Vorteile, und durch selektive Verbesserungen können wir den Schwarm besser auf bestimmte Zwecke hin ausrichten. Dank gehärteter, chitinhaltiger Anhängsel ist nun eine Spezialisierung auf die Mineralienproduktion möglich.\n\nAlternativ können wir all unsere Drohnen mit generischeren Modifikationen augmentieren, was es ihnen erlauben würde, eine Vielzahl von Funktionen zu übernehmen."
 bio.155.a: "Generalisten sind nützlicher."
 bio.155.b: "Fangen wir mit dem Graben an!"
 bio.160.name: "Phänotypischer Wandel"
 bio.160.desc: "Die laufenden Experimente haben eine unerwartete Komplexität im Schwarm aufgezeigt. Es treten Drohnen mit einzigartigen physischen Merkmalen auf: stachelige Exoskelette, übergroße Anhängsel oder seltsam empfindliche Sinnesorgane.\n\nObwohl diese Abweichungen zwar eindeutige Vorteile bieten, führen sie auch zu einer gewissen metabolischen Belastung, die der Schwarm nicht ausgleichen kann. Es stellt sich daher die Frage, wie viel Mutation zu viel ist."
 bio.160.a: "Wir müssen die Dynamik weiter fördern!"
 bio.160.b: "Der Zusammenhalt muss aufrechterhalten werden."
 bio.165.name: "Sehnsucht nach vergangenen Tagen"
 bio.165.desc: "Der Schwarm befindet sich im Wandel. Durch die Modifikation unserer Genome haben wir messbare gesundheitliche Verbesserungen bei unseren Drohnen feststellen können. Dies hat jedoch auch dazu geführt, dass wir weniger widerstandsfähig gegenüber physischen Komplikationen sind.\n\nWir können nicht behaupten, dass uns nicht gefiel, wie wir vorher waren. Obwohl wir heute stärker denn je und unsere kognitiven Fähigkeiten immens gewachsen sind, vermissen wir die Vertrautheit früherer Denkmuster.\n\nIm gesamten Schwarm herrscht das zutiefst unangenehme Gefühl, dass unsere Körper nicht zu unserer inneren Psyche passen. Sind wir über uns selbst hinausgewachsen?"
 bio.165.a: "Leben ist Wandel."
 bio.165.b: "Wir dürfen nicht das verlieren, was uns ausmacht."
 #Modifiers
 supremacy_denied: "Verweigerte Überlegenheit"
 supremacy_denied_desc: "Die Regierung hat Maßnahmen ergriffen, um die genetische Ungleichheit einzudämmen."
 augment_appreciation: "Wertschätzung von Augmentierten"
