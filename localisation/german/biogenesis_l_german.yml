 bio.1005.name: "Eigenschaft übernommen"
 bio.1005.desc: "Unsere Spezies kommt der Perfektion immer näher. Wir haben das All nach neuem Genmaterial durchkämmt und sind bereit, einen neuen Aspekt in uns aufzunehmen. Dank der harten Arbeit unserer [Owner.GetScientistPlural] können wir den weiteren Weg selbst wählen.\n\nWelche Entscheidung auch immer wir treffen mögen: Sie wird die Zukunft der künftigen Generationen an [Owner.GetSpeciesName] prägen."
 bio.1005.tt: "Fügt der Primärspezies eine neue Spezieseigenschaft hinzu"
 bio.1005.pop_growth: "Unsere Spezies muss schneller wachsen!"
