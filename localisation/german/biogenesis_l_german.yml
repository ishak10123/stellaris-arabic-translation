 auth_bio_democratic_mutation: "Biodiverse Freiheit"
 auth_bio_democratic_mutation_desc: "Diese Gesellschaft lebt nach dem Prinzip, dass der Körper eines jeden Individuums sein eigener Tempel ist und vollständig nach den eigenen Vorstellungen verändert werden darf. Innerhalb eines Rahmens, der auf Freiheit aufbaut, und mit der Unterstützung der Regierung werden Bürger dazu ermutigt, ihr einzigartiges Potenzial voll zu entfalten und sich und ihre Zukunft so zu gestalten, wie sie es für richtig halten."
 auth_bio_oligarchic_mutation: "Katalytisches Kommando"
 auth_bio_oligarchic_mutation_desc: "Die Macht ist in einer Herrscherelite gebündelt, die überlegene Genmutationen aufweist. Sie agiert jenseits des Gesetzes und verfügt über die nötigen Fähigkeiten, um die Gesellschaft zu beschützen und zu leiten. Sie ist bemächtigt, jede Maßnahme zu ergreifen, die für das Überleben und den Wohlstand der Gesellschaft erforderlich ist."
 auth_bio_dictatorial_mutation: "Hybrides Mandat"
 auth_bio_dictatorial_mutation_desc: "Genetische Mutationen und der daraus resultierende Fortschritt bilden das Fundament dieser Gesellschaft. Wer sich damit begnügen will, so zu bleiben, wie die Natur ihn geschaffen hat, wird inhaftiert oder getötet. Dies soll sicherstellen, dass nur die genetisch Überlegenen zum ewigen Streben nach Perfektion beitragen."
 auth_bio_dictatorial_mutation_tt: "\n£crime£ Kriminalität durch [enforcer.GetIcon] [enforcer.GetNamePlural]-Jobs: §G-5§!\n$auth_mutation_habitability_tt$"
 auth_bio_imperial_mutation: "Genom-Expansion"
 auth_bio_imperial_mutation_desc: "Dieses Reich nutzt die unvorhersehbare Kraft zufälliger Mutationen, um ungeahntes Potenzial zu erschließen und Innovationen und Fähigkeiten zu fördern, die mit traditionellen Methoden niemals zu erreichen wären. Im Wettlauf um die Vorherrschaft wird das Chaos der Mutation sein größter Vorteil sein."
 auth_bio_corporate_mutation: "Organwucher"
 auth_bio_corporate_mutation_desc: "Unter dieser Regierungsform ist die Finanzierung von Organen und Körperteilen durch flexible Zahlungspläne frei zugänglich. Versäumte Zahlungen führen zu einer Rücknahme oder den Verfall vereinbarter Sicherheiten. Dieses System sorgt für einen ewigen Kreislauf von Angebot und Nachfrage, da jedes Organ und jeder Körperteil sowohl eine Ware als auch eine Verpflichtung darstellen."
 auth_bio_corporate_mutation_tt: "$organic_leaders_have_trade_upkeep$\n$r_trade$ für jeweils $pop_group_unit$ £pop£ Bewohner durch ['trait:trait_spare_organs']: §G+0.5§!\n$auth_mutation_habitability_tt$"
 auth_bio_democratic_evopred: "Genelektorat"
 auth_bio_democratic_evopred_desc: "Dieser Gesellschaft gelang es trotz der Größe dieser Herausforderung, teilweise die Kontrolle über ihr eigenes Genom zu erlangen. Die Bevölkerung kann selbst entscheiden, wie sich ihre Mutationen manifestieren."
 auth_bio_democratic_evopred_tt: "$auth_bio_evopred_tt$\nFügt der Eigenschaft \"['trait:trait_malleable_genes']\" zusätzliche ['concept_genetic_electorate_effect', Effekte] basierend auf der stärksten ['concept_faction'] hinzu\nErhöht den Fortschritt für \"['concept_adaptive_evolution']\" durch fremde §YSpezies§!, die Sklaven oder in einem besseren Status sind, um §G+100%§!"
 auth_bio_oligarchic_evopred: "Biomagnaten"
 auth_bio_oligarchic_evopred_desc: "Diese Gesellschaft hat selbst die Zeit besiegt. Durch die akribische Auswahl der reinsten Gene erreichte die herrschende Elite eine zeitlose Existenz. Ein einziger Fehltritt kann jedoch den Verlust der Ewigkeit bedeuten, und für jene, die weiter unten stehen, sind Ehrgeiz und Evolution zwei Seiten derselben Medaille ..."
 auth_bio_oligarchic_evopred_tt: "$auth_bio_evopred_tt$\nRatsmitglieder sind §Yunsterblich§!"
 auth_bio_dictatorial_evopred: "Spitzenprinzipat"
 auth_bio_dictatorial_evopred_desc: "Eine Zivilisation, die vom Obersten Spitzenprädator regiert und durch eine ständige Evolution geformt wurde. Kein Rat und keine Verfassung können den überlegenen Willen dieses Prinzipats bändigen. Jeder Sieg treibt den genetischen Aufstieg voran."
 auth_bio_dictatorial_evopred_tt: "$auth_bio_evopred_tt$\nHerrschereigenschaft: ['leader_trait:trait_ruler_apex_predator']"
 apex_predator_male: "$trait_ruler_apex_predator$"
 apex_predator_female: "$trait_ruler_apex_predator$"
 auth_bio_imperial_evopred: "Unsterbliche Dynastie"
 auth_bio_imperial_evopred_desc: "In einer Unsterblichen Dynastie ruht die Vergangenheit nicht: Sie wird verschlungen. Jede Generation nährt die nächste, und die sterblichen Überreste der dahingeschiedenen Anführer halten die unsterbliche Herrschaft des Reichs aufrecht. Dienen heißt Opfer bringen, und im Tod nährt jeder Untertan das Vermächtnis unserer Vorfahren."
 eternal_ancestor_male: "$eternal_ancestor_female$"
 eternal_ancestor_female: "Ewiger Ahn"
 auth_bio_imperial_evopred_tt: "$auth_bio_evopred_tt$\nErlaubt es dem Herrscher, große Anführer zu verzehren, wenn diese sterben"
 auth_bio_corporate_evopred: "BioPrädation GLC" #Galactic Limited Incorporated
 auth_bio_corporate_evopred_desc: "Bei BioPrädation GLC gedeiht man durch Anpassung - sowohl genetisch als auch ökonomisch. Mit jedem neuen Genom, das er dem Unternehmensportfolio hinzufügt, verfeinert der Megakonzern seine eigene Marktposition, indem er Produkte und Marketing auf die einzigartige Biologie jeder Spezies abstimmt. Nur wenn man die Natur des Kunden versteht, lässt sich ein Geschäft nahezu ... instinktiv abschließen."
 auth_bio_corporate_evopred_tt: "$auth_bio_evopred_tt$\n$organic_leaders_have_trade_upkeep$\nEffizienz durch Wirtschaftspakte für jede Spezieseigenschaft: §G+1%§!\nErhöhter Fortschritt für die ['concept_adaptive_evolution'] durch §YWirtschaftspakte§!: §G+100%§!"
 auth_bio_hive_mind_evopred: "Chimärenbewusstsein"
 auth_bio_hive_mind_evopred_desc: "Dieses Schwarmbewusstsein ist der einfachen Selbstveränderung überdrüssig geworden. Jede neue Kolonie ist Teil eines verflochtenen Gewebes einer sich ständig verändernden Verschmelzung von Landschaft und Fleisch. Während sich die Grenzen im Chimärenbewusstsein auflösen, werden Kreaturen und Welten eins."
 auth_bio_hive_mind_evopred_tt: "$auth_bio_evopred_tt$\nTerraformiert Kolonien automatisch zu §YSchwarmwelten§!\nErhöht den Fortschritt von \"['concept_adaptive_evolution']\" durch das Säubern fremder §YSpezies§! um §G+100%§!"
 auth_bio_evopred_tt: "$EMPIRE_SIZE$ durch Bewohner pro Spezieseigenschaft: §G-1%§!\n$auth_mutation_habitability_tt$"
 #Hive Advanced Authorities
 auth_bio_hive_purity: "Reinheitsparadigmen"
 auth_bio_hive_purity_desc: "Dieser Schwarm gedeiht durch die Verfolgung einer vollkommenen genetischen Reinheit, bei der jede Drohne der idealen biologischen Vorlage entspricht. Präzise Genmanipulationen fördern die Einheit und stärken die kollektive Stärke. Es entsteht eine unaufhaltbare Kraft, die alleinig auf Effizienz und Überleben getrimmt ist."
 auth_bio_hive_purity_tt: "$pop_effects_from_purity_header$ $TABBED_NEW_LINE$- £unity£ $unity$ für jeweils $pop_group_unit$ £pop£ Bewohner: $plus_minus_icon$§Y$@purity_traits_resource$§! $DOUBLE_NEW_LINE$"
 auth_bio_hive_cloning: "Replizierende Horde"
 auth_bio_hive_cloning_desc: "Fortschrittliche Klonverfahren sorgen für eine unermüdliche Produktion genetisch gleicher Drohnen, jede von ihnen für perfekte Effizienz und Einigkeit konzipiert. Dieser Schwarm, der dem angeborenen Befehl folgt, sich zu vervielfältigen, verfolgt das erbarmungslose Ziel, die Sterne zu verdunkeln."
 auth_bio_hive_cloning_tt: "$ENABLES_BACKUP_CLONES$\n['concept_clone_leader_degradation'] wird reduziert um £society£ ['technology:tech_node_culling_1']"
 tech_node_culling_1_cloning: "$tech_node_culling_1$"
 tech_node_culling_1_cloning_desc: "$tech_node_culling_1_desc$"
 REDUCED_CLONE_DEGRADATION_TITLE: "§HNeue Mechanik:§! Reduzierter Klon-Zellzerfall"
 REDUCED_CLONE_DEGRADATION_DESC: "§Y$leader_trait_backup_clone_default_plural$§! haben einen reduzierten ['concept_clone_leader_degradation']"
 auth_bio_hive_mutation: "Anpassungsfähige Herrschaft"
 auth_bio_hive_mutation_desc: "Die hyperanpassungsfähigen Drohnen des Schwarms bilden durch die ständige Mutation eine dynamische und sich stetig verändernde Kraft, die in der Lage ist, jede umweltbedingte und taktische Herausforderung zu meistern. Jede Anpassung stärkt das Kollektiv und macht es vielseitiger und widerstandsfähiger, da es dem Bewusstsein erlaubt, unter jedweden Bedingungen zu gedeihen."
