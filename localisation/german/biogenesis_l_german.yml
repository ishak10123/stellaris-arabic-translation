 unlocks_ship_2_bio: "Schaltet die Technologie für das §YSchläger§!- und §YWeber§!-Schiff eines Gefallenen Reichs frei.\n"
 menp_cosmo_ship_2_desc_bio: "Diese Schiffe verzerren die Verbindung zwischen Raum und Zeit und können so die natürlichen Grenzen überwinden. Ihre kompakten Rümpfe verbergen Fähigkeiten, mit denen kein Schiff, das den physikalischen Gesetzen unterliegt, mithalten kann."
 menp_cosmo_ship_3_desc_bio: "$tech_cosmogenesis_harbinger_desc$"
 unlocks_ship_3_bio: "Schaltet die Technologie für das §YUnheilsbringer§!-Schiff eines Gefallenen Reichs frei."
 menp_cosmo_ship_4_desc_bio: "$tech_cosmogenesis_stinger_desc$"
 unlocks_ship_4_bio: "Schaltet die Technologie für das §YStachel-Titan§!-Schiff eines Gefallenen Reichs frei."
 tech_cosmogenesis_mauler: "Chiffren-Schläger"
 tech_cosmogenesis_mauler_desc: "Dank des organischen dimensionalen Raum-Zeit-Transzendentalismus ist dieses Schläger-Schiff innen größer, als es der kompakter Rumpf vermuten lässt, und dank der dichten Muskelmasse ist sein Biss tödlicher, als es die Physik zulassen sollte."
 TECH_UNLOCK_COSMO_MAULER_CONSTRUCTION_TITLE: "§HNeuer Schiffstyp:§! Chiffren-Schläger"
 TECH_UNLOCK_COSMO_MAULER_CONSTRUCTION_DESC: "§HChiffren-Schläger§!\n$tech_cosmogenesis_mauler_desc$"
 tech_cosmogenesis_weaver: "Dilemma-Weber"
 tech_cosmogenesis_weaver_desc: "Der Dilemma-Weber schreibt dank der Unterstützungswaffen, die verborgen unter der sichtbaren Anatomie liegen, räumliche Normen vollkommen neu. Er allein kann den Verlauf ganzer Schlachten verändern."
 TECH_UNLOCK_COSMO_WEAVER_CONSTRUCTION_TITLE: "§HNeuer Schiffstyp:§! Dilemma-Weber"
 TECH_UNLOCK_COSMO_WEAVER_CONSTRUCTION_DESC: "§HMatrix-Weber§!\n$tech_cosmogenesis_weaver_desc$"
 tech_cosmogenesis_harbinger: "Labyrinth-Unheilsbringer"
 tech_cosmogenesis_harbinger_desc: "Diese Unheilsbringer verfügen über miteinander verwobene Taschendimensionen, in denen Trägergeschwader untergebracht sind. Jedes Schiff gleicht einem Labyrinth aus unmöglich erscheinenden Hangars und kann die Feuerkraft einer ganzen Flotte entfalten."
 TECH_UNLOCK_COSMO_HARBINGER_CONSTRUCTION_TITLE: "§HNeuer Schiffstyp:§! Labyrinth-Unheilsbringer"
 TECH_UNLOCK_COSMO_HARBINGER_CONSTRUCTION_DESC: "§HLabyrinth-Unheilsbringer§!\n$tech_cosmogenesis_harbinger_desc$"
 tech_cosmogenesis_stinger: "Krypto-Stachel"
 tech_cosmogenesis_stinger_desc: "Dieses Schiff der Stachel-Klasse ist mit mehr Waffensystemen ausgestattet, als seine Energiequelle eigentlich unterstützen sollte. Eigentlich sollte das Schiff gar nicht funktionieren können, aber dennoch ist es in der Lage, gewaltige Salven abzufeuern ... und zwar ununterbrochen."
 TECH_UNLOCK_COSMO_STINGER_CONSTRUCTION_TITLE: "§HNeuer Schiffstyp:§! Krypto-Stachel"
 TECH_UNLOCK_COSMO_STINGER_CONSTRUCTION_DESC: "§HKrypto-Stachel§!\n$tech_cosmogenesis_stinger_desc$"
