 ###Starlit Citadel
 origin_starlit_citadel: "Sternenzitadelle"
 origin_starlit_citadel_desc: "Ein mysteriöses Portal ist am Rand des Heimatsystems dieser Zivilisation aufgetaucht und bringt unaufhörlich Wellen von Feinden hervor. Diese Invasionen sind ebenso unvorhersehbar wie unvermeidlich und zwingen diese Zivilisation dazu, sich auf ihre größte technologische Errungenschaft zu verlassen: die §H$dsc_name$§!."
 origin_tooltip_starlit_citadel_effects: "- $HOME_SYSTEM$$TABBED_NEW_LINE$- Eine ['concept_deep_space_bastion'] am Rand des Gravitationsfelds$TABBED_NEW_LINE$- Ein ['concept_wormhole', $BYPASS_STARLIT_WORMHOLE$], das in ein unbekanntes System führt $NEW_LINE$- $HOMEWORLD$$TABBED_NEW_LINE$- £building£ ['building:building_citadel_uplink']$TABBED_NEW_LINE$- ['concept_bioship_remains', £blocker£ $d_bioship_remains$]$TABBED_NEW_LINE$- ['concept_invasion_site', £blocker£ $d_invasion_site$]: +2$NEW_LINE$- $ADDITIONAL_TECHNOLOGIES_STRING$ ['concept_deep_space_citadel_tech',£engineering_research£ $tech_deep_space_citadel$]"
 START_SCREEN_STARLIT_CITADEL: "Wir waren nicht immer so wachsam wie heute.\n\n[Capital.GetName] war eine Welt des Überflusses, und wir waren ein friedliebendes und zufriedenes Volk. Doch all dies änderte sich, als sich das Portal öffnete.\n\nDie [GetInvadersLower] griffen ohne Vorwarnung an. Sie plünderten unsere Städte, brandschatzten das Land und verschwanden so schnell, wie sie gekommen waren. Wir hofften, sie würden niemals zurückkehren. Doch die Invasionen gingen weiter, und jeder neue Angriff war brutaler als der vorangegangene.\n\nWir sind nun bereit, zu den Sternen aufzubrechen und die Galaxie zu bereisen. Unsere $job_skywatcher_plural$ haben ihre Posten eingenommen, und unsere respekteinflößende $dsc_name$ wacht über unsere Welt. Sie ist unser Bollwerk gegen die [GetInvadersLower] und jeden anderen, der die Vernichtung unserer Spezies im Sinn hat."
