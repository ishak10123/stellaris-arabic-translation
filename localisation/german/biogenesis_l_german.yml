 bio.1050.name: "Anpirschend"
 bio.1050.desc: "Unsere Agenten durchstreifen die Siedlungen der [Target.GetSpeciesNamePlural] und werden sich schon bald Zugang zu ihren Gebäuden verschafft haben. Doch alles zu seiner Zeit. Wir dürfen auf der Jagd nichts überstürzen."
 bio.1055.name: "Sprungbereit"
 bio.1055.desc: "Unsere Beute ist vor uns. Die Jäger, die wir entsendeten, um [Target.GetName] zu infiltrieren, sind zuversichtlich. Sie werden schon bald Zugang zu den [Target.GetSpeciesNamePlural] und all ihrer DNA haben."
 bio.1060.name: "Zuschlagen"
 bio.1060.desc: "Unsere Agenten sind bereit. Sie haben sich Zugang zu den Schlafstätten der [Target.GetSpeciesNamePlural] verschafft und besitzen die nötige Tarnung. Wie jeder gute Jäger haben sie sich natürlich mehrere Fluchtwege gesichert, von denen einige angenehmer sind als andere. Es wäre bedauerlich, wenn wir auf die Kanalisation zurückgreifen müssten."
 bio.1065.name: "DNA gestohlen"
 bio.1065.desc: "Es ist vollbracht! Unsere Agenten sind mit einer Fülle an Genmaterial entkommen. Wir werden bei unserer nächsten Mutation große Fortschritte erzielen können. Vielleicht entwickeln wir sogar einen gewissen Geschmack für die [From.Target.GetSpeciesNamePlural]."
