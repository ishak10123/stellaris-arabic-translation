 death_world_desc: "Obwohl diese Welt technisch gesehen bewohnbar ist, ist es ein wahrer Albtraum, auf ihr zu leben. Jede Form des Lebens von der Flora über die Fauna bis hin zu den winzigsten Kriechtieren ist hier tödlicher als die furchterregendsten Raubtiere auf unserer Heimatwelt."
