 MESSAGE_BEHEMOTH_GROWTH_DESC: "Wir haben erfolgreich einen noch viel größeren und stärkeren §YBehemoth§! ausgebrütet und aufgezogen."
 behemoth_incubation_poi_name: "Behemoth-Inkubation"
 behemoth_incubation_poi_desc: "Einer unserer Behemoths brütet in dem Gasriesen §H[incubation_planet.GetName]§!. Wir gehen davon aus, dass er am §H[incubation_planet.behemoth_incubation_timer]§! voll ausgereift sein wird."
