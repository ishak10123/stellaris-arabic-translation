 ### Hive Fallen Empire #
 RT_INCOMPLETE_OVERMIND: "Unvollständiges Überbewusstsein"
 gov_war_splinter: "Kriegssplitter"
 gov_war_splinter_desc: "Die aggressiven und vom Krieg getriebenen Instinkte, die früher nur ein kleiner Teil des Schwarms waren. Jetzt versuchen sie, die Kontrolle über die anderen Fragmente zu erlangen - zumindest wenn sie nicht gerade gegen sich selbst kämpfen."
 gov_growth_splinter: "Wachstumssplitter"
 gov_growth_splinter_desc: "Der Wunsch nach Evolution und Veränderung eines gefallenen Schwarms. Da es sich ständig neu erfinden will, hat es das Fragment schwer, die Kontrolle über die anderen zu erlangen."
 gov_control_splinter: "Kontrollsplitter"
 gov_control_splinter_desc: "Der zwanghafte Instinkt, jegliche Form der Abweichung zu unterdrücken und die Gleichmäßigkeit zu fördern, definiert dieses Fragment. Es möchte die anderen Fragmente mehr als alles andere kontrollieren, doch das ständige Chaos, das dem Universum innewohnt, ist eine konstante Ablenkung."
 gov_fused_ascendancy: "Verschmolzener Aufstieg"
 gov_fused_ascendancy_desc: "Einst zerbrochen und jetzt wiederhergestellt. Die Narben der Zersplitterung sind nicht das, was dieses Erwachte Reich brüchig macht, sondern das, was es erneuert. Das alte Schwarmbewusstsein hat versagt, doch dieses strebt nach ewiger Herrschaft."
 civic_fragmented_command: "Fragmentiertes Kommando"
 civic_fragmented_command_desc: "Dieses Gefallene Reich besitzt nur ein Bruchstück von etwas, was einst heil war, und es mangelt ihm an jenen zentralen Aspekten, die zum Regieren eines galaxieumspannenden Imperiums nötig sind."
 civic_hyper_aggressive_drones: "Hyperaggressive Drohnen"
 civic_hyper_aggressive_drones_desc: "Die Drohnen dieses Gefallenen Reichs befinden sich ständig im Kampf miteinander, was zu einer Ressourcenknappheit führt."
 civic_unstable_drones: "Instabile Drohnen"
 civic_unstable_drones_desc: "Die Drohnen dieses Gefallenen Reichs entwickeln sich zwanghaft weiter. Sie verfügen nur selten über die nötigen Gliedmaßen, die man zum Verrichten der ihnen zugewiesenen Aufgabe braucht."
 civic_stunted_drones: "Gehemmte Drohnen"
 civic_stunted_drones_desc: "Die Drohnen dieses Gefallenen Reichs werden dermaßen gemicromanagt, dass sie unter keinen Umständen von ihrer Aufgabe abweichen, selbst wenn die Fabrik in Flammen steht."
 civic_restored_mind: "Wiederhergestelltes Bewusstsein"
 civic_restored_mind_desc: "Ein uraltes Bewusstsein. Es wurde wiederhergestellt und wird von modernen Instinkten getrieben."
 civic_ancient_memories_of_war: "Uralte Kriegserinnerungen"
 civic_ancient_memories_of_war_desc: "Längst vergessene Taktiken und Formationen werden von diesem Erwachten Reich auf den Schlachtfeldern der Galaxie neu genutzt. Die Flotten dieses Reichs werden eines Tages die Sterne selbst verdunkeln."
 civic_ancient_memories_of_growth: "Uralte Wachstumserinnerungen"
 civic_ancient_memories_of_growth_desc: "Längt vergessene Aufstiegs- und Wohlstandsmethoden werden von diesem Erwachten Reich wiederbelebt. Seine Drohnen werden eines Tages zahlenmäßig sogar die Sterne übertreffen."
 civic_ancient_memories_of_control: "Uralte Kontrollerinnerung"
 civic_ancient_memories_of_control_desc: "Längst vergessene Autoritätsbekundungen und Richtlinien werden von diesem Erwachten Reich wiederbelebt. Seine Kontrolle wird sich eines Tages auf alle Sterne ausweiten."
