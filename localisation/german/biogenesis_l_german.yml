 SHIP_BEHEMOTH_RAGE: "Aggressionsdrüsen"
 SHIP_BEHEMOTH_RAGE_DESC: "Behemoths sind störrische, ungezähmte Titanen, die eine Kontrolle nicht lange dulden. Früher oder später wird die Wildheit in ihnen entfacht, ein kosmischer, nicht zu zügelnder Sturm. Vielleicht wäre es weise, dies nicht abzuwarten, sondern das Feuer selbst zu legen und den Sturm zu entfesseln, wann wir das wollen."
 behemoth_rage_ship_button: "§HErzürnen§!\n\nLasst den §YBehemoth§! frei.\nDer wütende Behemoth wird zur nächstgelegenen §YKolonie§! oder zum nächstgelegenen §YBehemoth-Ei§! reisen und versuchen, sie oder es zu vernichten.\nDie Wut hält normalerweise §Y180 Tage§! an, kann aber durch mehrere Faktoren beeinflusst werden.$TABBED_NEW_LINE$- Im §RGefecht§! oder während der §RBombardierung§! wird sich der Behemoth nicht beruhigen.$TABBED_NEW_LINE$- Wenn wir einen wütenden Behemoth im Kampf §Gbesiegen§!, kehrt er unter unsere Kontrolle zurück."
 behemoth_rage_activity_key: "Wütend"
 behemoth_rage_menu_title: "Erzürnen"
 behemoth_rage_progress_activity_key: "Wütend"
 MESSAGE_BEHEMOTH_RAGE_TITLE: "Wütender Behemoth"
 MESSAGE_BEHEMOTH_RAGE_DESC: "Ein Behemoth ist wütend! Wir hoffen, dass er sich in ein paar Monaten wieder beruhigen wird."
 MESSAGE_BEHEMOTH_CALM_TITLE: "Nachlassende Wut"
 MESSAGE_BEHEMOTH_CALM_DESC: "Ein Behemoth hat sich beruhigt und steht wieder unter unserer Kontrolle."
 SHIP_BEHEMOTH_COCOON: "Holometabolische Verwirbelung"
 SHIP_BEHEMOTH_COCOON_DESC: "§YBehemoths§! können sich in den stürmischen Schichten von Gasriesen verankern und Nahrung aus der dichten Atmosphäre ziehen, die reich an schweren Elementen und komplexen molekularen Verbindungen ist. Diese Nahrung regt ihr Wachstum an und verstärkt ihre bereits immense Kraft noch weiter."
