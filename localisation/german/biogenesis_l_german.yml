 #STAGE EVENTS
 bio.25.name: "Kollektive Entwicklung" #STAGE ONE
 bio.25.desc.no_options: "Wir befinden uns in einer Transformation und stehen kurz davor, unser volles Potenzial zu entfalten, im vollen Bewusstsein, dass dieses Unterfangen unser Wesen grundlegend verändern könnte. Unsere eigene Evolution zu gestalten, ist eine monumentale Aufgabe. Die Veränderungen, die wir jetzt vornehmen, werden uns weit in die Zukunft prägen."
 bio.25.desc.has_options: "$bio.25.desc.no_options$\n\nWir müssen einen Schwerpunkt für die erste Phase unserer Entwicklung wählen."
 bio.25.a: "$bio.5.a$"
 bio.25.b: "$bio.5.b$"
 bio.25.c: "$bio.5.c$"
 bio.30.name: "Schwarmkonvergenz" #STAGE TWO
 bio.30.desc.no_options: "Lenker unserer eigenen Evolution zu sein, führte zu einer bedeutsamen Veränderung. Wir besitzen jetzt ein tieferes Verständnis über genetische Merkmale, die Reproduktion und die DNA-Sequenzierung.\n\nDer krönende Abschluss unserer Mühen ist zum Greifen nah.\n\nSchon bald werden wir das sein, was wir schon immer hätten sein sollen."
 bio.30.desc.has_options: "$bio.30.desc.no_options$ Wir haben die Möglichkeit, unseren derzeitigen Weg weiter zu beschreiten oder aber einen neuen Schwerpunkt zu wählen."
 bio.30.a: "$bio.10.a$"
 bio.30.b: "$bio.10.b$"
 bio.30.c: "$bio.10.c$"
 bio.35.name: "Evolutionäre Koaleszenz" #STAGE THREE
 bio.35.desc.no_options: "Wir stehen kurz vor einem bedeutenden evolutionären Wandel. Wir müssen lediglich eine Entscheidung treffen, welchen Weg wir einschlagen werden, um unser Potenzial voll auszuschöpfen."
 bio.35.desc.has_options: "$bio.35.desc.no_options$\n\nWir müssen erneut einen Schwerpunkt für die Zukunft wählen."
 bio.35.a: "$bio.15.a$"
 bio.35.b: "$bio.15.b$"
 bio.35.c: "$bio.15.c$"
