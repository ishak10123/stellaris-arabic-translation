 operation_evolutionary_predator_procure_dna: "DNA beschaffen"
 operation_evolutionary_predator_procure_dna_desc: "Wir können einen direkteren Weg beim Beschaffen von DNA beschreiten, indem wir Spezies infiltrieren und diskret DNA zusammentragen."
 operation_evolutionary_predator_procure_dna_on_success: "$IF_SUCCESSFUL|E$\nErhält etwas Fortschritt für die Situation \"§Y$evolutionary_predators_situation$§!\" sowie die DNA der Primärspezies."
