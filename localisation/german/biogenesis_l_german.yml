 feral_insight: "Animalischer Einblick"
 feral_insight_name: "$feral_insight$:"
 feral_insight_value: "£feral_insight£ $VAL|0$"
 feral_insight_current_value: "Derzeitiger Wert: §Y$VALUE|0$§!"
 feral_insight_gaining: "Schließt §HKrisenziele§! ab, um mehr £feral_insight£ §YAnimalische Einblicke§! zu erhalten."
 feral_insight_desc: "Wir untersuchen die Ernährungs- und Verhaltenszyklen von Megaorganismen."
 feral_insight_crisis_objective: "Krisenziele"
 feral_insight_crisis_objective_gained: "$feral_insight$ erlangt"
 feral_insight_crisis_objective_reward: "$REWARD$"
 feral_insight_crisis_objective_progress: "Wir haben £feral_insight£ $AMOUNT$ von diesem Krisenziel erhalten."
 feral_insight_crisis_description_title: "Behemothkrise"
 feral_insight_crisis_description: "$menace_crisis_description_intro$\n\nDie im Weltraum hausenden Leviathane sind furchterregende Wesen von unvergleichlicher Macht, doch es mangelt ihnen an Ambition. Ihre mächtige Physiologie mit unserer intellektuellen Stärke zu kombinieren, wird eine neue Generation von Weltraumfauna hervorbringen, die uns die galaktische Vorherrscherhaft sichert."
 feral_insight_crisis_howto_title: "Geburt von Behemoths"
 feral_insight_crisis_howto: "Das Verfolgen von §HKrisenzielen§! generiert £feral_insight£§HAnimalische Einblicke§!, die es uns wiederum erlauben, unser volles biologisches Potenzial zu erschließen."
 feral_insight_crisis_level_unlocked: "Auf $LEVEL$ erhalten wir die folgenden Belohnungen:\n"
 feral_insight_crisis_level_locked: "Folgendes wird benötigt, um diese Stufe freizuschalten:\n"
 feral_insight_crisis_level_unlock: "Hat £feral_insight£ §Y$CURRENCY$§! Animalische Einblicke"
 feral_insight_crisis_level_desc: "Um in den Krisenstufen voranzukommen, müsst Ihr £feral_insight£§HAnimalische Einblicke§! sammeln und die speziellen Krisenprojekte abschließen, um Euren Behemoth zu vergrößern."
 #Crisis Perks
 menp_behemoth_objectives: "Animalischer Einblick"
 unlocks_behemoth_objectives: "Ermöglicht das Anhäufen von £feral_insight£ §YAnimalischen Einblicken§! durch das Abschließen von §HKrisenzielen§!.\n"
 menp_behemoth_objectives_desc: "Das Verhalten von Behemoths zu untersuchen, unterstützt unser Endziel: die Transzendenz. Wir werden jene biologischen Fesseln abstreifen, die jedes auf einem Planeten geborene Leben plagen."
 menp_behemoth_bioship_1: "Härteres Chitin"
 menp_behemoth_bioship_1_desc: "Um im Weltraum zu überleben, braucht man eine dicke Hülle. Physische Stärke sichert einem das Überleben selbst unter den widrigsten Bedingungen."
 menp_behemoth_society_1: "Beschleunigte Feldversuche"
 menp_behemoth_society_1_desc: "Laborexperimente sind ein guter Ausgangspunkt, doch echte Fortschritte erfordern risikoreiche Tests in der Praxis."
 menp_behemoth_food_1: "Übergroße Ernte"
 menp_behemoth_food_1_desc: "Den gewaltigen Hunger eines Behemoths zu stillen, ist schwierig. Gentechnisch veränderte Nahrung in großem Maßstab zu produzieren, ist zumindest ein Anfang."
 menp_behemoth_egg: "Gigantische Brutstätten"
 unlocks_behemoth_egg: "Neue Megastruktur: §YBehemoth-Ei§!.\n"
 menp_behemoth_egg_desc: "Ein kolossales Ei benötigt auch einen entsprechend großen Ort, um es auszubrüten. Diese orbitale Brutstätte muss man in einem bestimmten Abstand zum Stern positionieren, um den gewaltigen Ausmaßen bei der Geburt eines Behemoths Rechnung zu tragen."
 menp_behemoth_bioship_2: "Verbesserte Drüsenstimulation"
 menp_behemoth_bioship_2_desc: "Wir regen dank speziell angefertigter Sonden die Hormondrüsen des Behemoths künstlich an, um Wachstumshormone für eine beschleunigte Entwicklung zu produzieren."
 menp_behemoth_society_2: "Transversale Verbindung"
 menp_behemoth_society_2_desc: "Die Schnittstelle zwischen der natürlichen Auslese und der Biotechnologie erschafft eine unvergleichliche Kraft."
 menp_behemoth_food_2: "Nährstoffüberschuss"
 menp_behemoth_food_2_desc: "Den gewaltigen Hunger eines Behemoths zu stillen, ist praktisch unmöglich. Gentechnisch veränderte Nahrung in einem riesigen Maßstab zu produzieren, ist nur der Anfang."
 menp_behemoth_hatchling: "Gargantua-Brut"
 unlocks_behemoth_hatchling: "Erlaubt das §YAusbrüten§! der Megastruktur \"Behemoth-Ei\".\n"
 menp_behemoth_hatchling_desc: "Ein Wurf Behemoths umspannt ganze Systeme. Unsere galaktischen Nachbarn werden die Autonomie unserer Brut respektieren oder zu ihrer Nahrung werden."
 menp_behemoth_bioships_3: "Schnellere Wachstumszyklen"
 menp_behemoth_bioships_3_desc: "Die Entwicklung der riesigen Weltraumfauna zu beschleunigen, ist entscheidend, um unser Endziel rascher zu erreichen. Wir müssen zudem sicherstellen, dass unsere Infrastruktur parallel dazu wächst."
 menp_behemoth_society_3: "Meister der Biotechnik"
 menp_behemoth_society_3_desc: "Dank zahlreicher mal mehr und mal weniger erfolgreicher Tests konnten wir unser Wissen über die Biotechnik mehren. Wir gehören jetzt zu den führenden Bioingenieuren der Galaxie."
 menp_behemoth_mind_control: "Formung tiefer Gedanken"
 unlocks_behemoth_mind_control: "Erlaubt es uns, die Gedanken von §YBehemoths§! zu beeinflussen.\n"
 menp_behemoth_mind_control_desc: "Unser kollektiver Verstand sehnt sich nach etwas Größerem und Besserem. Unser Ehrgeiz kennt keine Grenzen."
 menp_behemoth_hatchling_2: "Ungezügeltes Wachstum"
 unlocks_behemoth_hatchling_2: "Erlaubt wohlgenährten §YBehemoths§!, sich zu verpuppen, um drastisch an Größe und Macht zu gewinnen.\n"
 menp_behemoth_hatchling_2_desc: "Die Bestie hat ihre Fesseln abgestreift. Die Kreatur, die einst nur ein winziger Schlüpfling war, wird rasch zu einer wilden und unerbittlichen Naturgewalt."
 menp_behemoth_bioship_4: "Stärkerer Organismus"
 menp_behemoth_bioship_4_desc: "Angetrieben von unstillbarem Hunger und unnachgiebiger Wut können Behemoths ein chaotisches Ausmaß an Macht erlangen. Sie sind eine biologische Waffe und bereit, Feinde und Unbeteiligte gleichermaßen zu vernichten."
 menp_behemoth_mutation_research: "Behemoth-Mutationen"
 unlocks_behemoth_mutation_research: "Schaltet ein §YSpezialprojekt§! frei, das es uns erlaubt, die genetische Entwicklung von §YBehemoths§! anzupassen.\n"
 menp_behemoth_mutation_research_desc: "Wir modifizieren das Genmaterial der Behemoths im Lauf ihres Wachstums, um nur die vorteilhaftesten physiologischen Eigenschaften zu fördern."
 menp_behemoth_mind_control_2: "Einsatz des Spitzenexemplars"
 unlocks_behemoth_mind_control_2: "Wir vertiefen die psychische Verbindung mit unseren §YBehemoths§!.\n"
 menp_behemoth_mind_control_2_desc: "Der Höhepunkt der genetischen Perfektion darf nicht auf unsere derzeitigen Grenzen beschränkt bleiben. Er muss mit der gesamten Galaxie geteilt werden."
 menp_behemoth_mind_meld: "Gedankenverschmelzung"
 unlocks_behemoth_mind_meld: "Übernehmt die volle Kontrolle über einen mächtigen §YKlasse-IV-Behemoth§! - eine Kreatur, die in der Fähigkeit, die Galaxie zu beherrschen, unübertroffen ist.\n"
 menp_behemoth_mind_meld_desc: "Unser Bewusstsein und das des Behemoths sind eins. Seine Wut wird zu unserer. Wir lassen uns bereitwillig von ihm verzehren, und während sich die Bestie an unserem kollektiven Bewusstsein labt, spüren wir die Wut. Sie wird zu uns und wir werden zur Bestie."
 menp_behemoth_primal_roar: "Urtümliches Brüllen"
 unlocks_behemoth_primal_roar: "Ruft die furchteinflößendste Bestie herbei und fordert sie zum Kampf um die Vorherrschaft über die Leere heraus.\n"
 menp_behemoth_primal_roar_desc: "Es durchströmt uns, schneidet durch uns hindurch, reißt uns auseinander, verbrennt uns: die Wut, dieses urzeitliche Brüllen. Die Galaxie wird durch die Flammen unseres Zorns brennen."
 menp_behemoth_ever_hungry: "Nimmersatt"
 unlocks_behemoth_ever_hungry: "Schaltet die Situation \"$behemoth_finale_situation$\" frei. Nährt Euch von der Galaxie, um an Größe und Macht zu gewinnen und zum ultimativen sternengeborenen Jäger zu werden.\n"
 menp_behemoth_ever_hungry_desc: "Wir leiden Qualen - die einzige Motivation für unsere Existenz ist unser ständiges Bedürfnis, etwas zu fressen. Tief in uns ist eine Leere, die nie gefüllt werden kann, ganz egal, wie viel wir auch verzehren. Wir brauchen ein Festmahl in der Größe einer Galaxie, um diesen Schmerz zu stillen."
 menp_behemoth_egg_2: "Gefräßiger Nachwuchs"
 unlocks_behemoth_egg_2: "Schaltet für §YKlasse-IV-Behemoths§! die Fähigkeit frei, §YEier§! zu legen, um den Fortbestand der Spezies zu sichern.\n"
 menp_behemoth_egg_2_desc: "Unsere Brut wird sich am Kadaver der Galaxie laben. Ihr Hunger kennt kein Ende. Über die Unendlichkeit der Zeit hinweg wird sie ein Festmahl abhalten."
