 fresh_biosphere_desc: "Eine Welt voll neuer Geschmäcker und Assimilierungsmöglichkeiten. Unsere Siedler sind dabei, alles, was dieser Planet zu bieten hat, zu katalogisieren und zu verstehen."
 fresh_biosphere_tt: "Monatlicher Situationsfortschritt durch \"§Y$evolutionary_predators_situation$§!\": §G+10§!"
