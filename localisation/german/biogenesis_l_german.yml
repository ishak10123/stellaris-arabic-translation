 #Siege of the Citadel Event Chain
 bio.2005.name: "Ungewöhnliche Schwankungen"
 bio.2005.desc: "Unsere $job_skywatcher_plural$ berichten von einer alarmierenden Entwicklung.\n\nIm Inneren des Portals im §Y[Root.Capital.System.GetName]§!-System maß man unterschwellige, aber unverwechselbare Fluktuationen. In der Vergangenheit wurden ähnliche Störungen im kosmischen Gefüge von Wellen feindlicher biologischer Schiffe begleitet.\n\nSollten diese Messungen richtig sein, könnte der nächste Angriff in nur wenigen Monaten erfolgen. Das Überleben unseres Volkes könnte erneut von der Entschlossenheit unserer Verteidiger abhängen."
 abandoned_hatchery_chain_1: "Belagerung der Zitadelle"
 abandoned_hatchery_chain_1_title: "$abandoned_hatchery_chain_1$"
 abandoned_hatchery_chain_1_desc: "Die [GetInvadersLower] greifen uns bereits seit Jahrzehnten an, und unsere $starbase_deep_space_citadel_1$ hat uns all diese Zeit als vorderste Verteidigungslinie vor Schlimmerem bewahrt. Wirklich sicher werden wir jedoch erst sein, wenn wir ergründet haben, woher unsere Feinde kommen und was sie von uns wollen.\n\nMit jeder weiteren Entdeckung kommen wir dem Tag näher, an dem wir die Schlacht zu ihnen tragen werden - und unsere Belagerung ein für alle Mal zu Ende sein wird."
 bio.2015.name: "Überreste des Feindes"
 bio.2015.desc: "Die Trümmer zerstörter biologischer Flotten schweben unheilvoll durch das §Y[Root.Capital.System.GetName]§!-System. Obwohl sie verformt und teilweise verkohlt sind, ist ein Großteil des organischen Materials noch immer intakt und bietet uns die seltene Gelegenheit, weitere Studien durchzuführen.\n\nDurch eine sorgfältige Analyse könnten wir in der Lage sein, die Geheimnisse dieser grotesken Konstruktionen zu ergründen - und vielleicht sogar Einblicke in die Funktionsweise jenes Portals zu erhalten, aus dem sie einst kamen."
 PROJECT_HATCHERY_SHIP_REMAINS: "Studium biologischer Schiffsüberreste"
 PROJECT_HATCHERY_SHIP_REMAINS_DESC: "Die Flottenüberreste der [GetInvadersLower] bieten eine seltene Gelegenheit für weitere Studien. Wir müssen noch viel lernen, wenn wir überleben wollen."
 bio.2015.a: "Endlich ein Fortschritt!"
 bio.2020.name: "Feinde analysiert"
 bio.2020.desc: "Unsere [Root.GetScientistPlural] haben die biologischen Wrackteile im §Y[Root.Capital.System.GetName]§!-System gründlich untersucht und glauben, den Schlüssel gefunden zu haben, der uns dabei hilft, das Portal am Rand des Systems zu verstehen.\n\nTief im Gewebe der Kreatur verborgen konnte ein organisches Muster identifiziert werden, das mit den Schwingungen des Portals zu resonieren scheint. Indem wir dieses Signal nachahmen, sollten wir in der Lage sein, selbst durch den seltsamen Riss zu reisen.\n\nWeitere Forschung ist zwar noch notwendig, doch zum ersten Mal stehen wir kurz davor, den Kampf zu unserem Feind zu tragen."
 abandoned_hatchery_chain_2: "$abandoned_hatchery_chain_1$"
 abandoned_hatchery_chain_2_title: "$abandoned_hatchery_chain_1$"
 abandoned_hatchery_chain_2_desc: "Wir sind den Geheimnissen des Portals einen Schritt näher gekommen. Auch wenn eine Durchquerung noch nicht möglich ist, verfügen wir nun zumindest über die nötigen Einblicke, um die benötigte Technologie zu entwickeln.\n\nWir brauchen einen §Y$tech_wormhole_stabilization$§!, um den Kampf zu unserem Feind zu tragen."
 bio.2025.name: "Das Ursprungssystem unserer Feinde"
 bio.2025.desc: "Dank unserer jüngsten Durchbrüche in der §Y$tech_wormhole_stabilization$§! konnten wir einen kurzen Einblick in das §Y[event_target:starlit_sealed_system.GetName]§!-System erhaschen.\n\nEine riesige biologische Flotte und eine schwer befestigte Sternenbasis erwarten uns auf der anderen Seite. Äußerste Vorsicht ist geboten.\n\nWir haben das Ursprungssystem unserer Feinde entdeckt!"
 abandoned_hatchery_chain_3: "$abandoned_hatchery_chain_1$"
 abandoned_hatchery_chain_3_title: "$abandoned_hatchery_chain_1$"
 abandoned_hatchery_chain_3_desc: "Wir haben das Ursprungssystem unserer Feinde gefunden, doch um ihr Geheimnis zu lüften, müssen wir uns erst um ihre schweren Verteidigungssysteme kümmern.\n\nDie vor uns liegende Schlacht wird nicht einfach sein, doch sie wird es uns erlauben, das §Y[event_target:starlit_sealed_system.GetName]§!-System frei zu erkunden."
 bio.2027.name: "Ausbruch von Angst"
 bio.2027.desc: "Die Flotte, die das §Y[starlit_sealed_system.GetName]§!-System bewachte, wurde besiegt. Kurz vor ihrem Ende fingen wir eine eindringliche Botschaft aus der Sternenbasis des Systems auf. Wir konnten sie bereits übersetzen, und sie lautet wie folgt:\n\n§H\" - Kontrolle verloren! Die Schiffe reproduzieren sich selbst! Wer auch immer Ihr seid: Bitte rettet uns!\"§!\n\nSeitdem wurde jegliche Kommunikation eingestellt. Sollten wir damit wirklich den Sieg davongetragen haben, bietet uns dieses System eine wichtige strategische Chance. Eine neue $starbase_deep_space_citadel_1$ könnte eines Tages im Licht von §Y[starlit_sealed_system.GetName]§! erstrahlen und gewährleisten, dass unsere Zivilisation nie wieder von einer solchen Bedrohung gefährdet wird."
 bio.2027.a: "Endlich ist unsere Belagerung aufgehoben."
 citadel_siege_lifted: "Belagerung aufgehoben"
 citadel_siege_lifted_desc: "Unsere heldenhaften Verteidiger haben die [GetInvadersLower] besiegt, und unsere lange Belagerung ist endlich vorbei."
 citadel_siege_lifted_machine: "$citadel_siege_lifted$"
 citadel_siege_lifted_machine_desc: "$citadel_siege_lifted_desc$"
 abandoned_hatchery_chain_4: "$abandoned_hatchery_chain_1$"
 abandoned_hatchery_chain_4_title: "$abandoned_hatchery_chain_1$"
 abandoned_hatchery_chain_4_desc: "Die [GetInvadersLower] wurden aus dem §Y[starlit_sealed_system.GetName]§!-System vertrieben, doch die Lage ist anders als erwartet.\n\nAlles, was von unseren Peinigern übrig ist, ist eine scheinbar entvölkerte Welt."
 PROJECT_BIOMECHANICAL_WORLD: "Heimat des Feindes"
 PROJECT_BIOMECHANICAL_WORLD_DESC: "Die Heimatwelt unserer [GetInvadersLower]. Wer waren sie und was wollten sie von uns?"
 bio.2030.name: "Biomechanische Seuche"
 bio.2030.desc: "Das §Y[event_target:biomechanical_world_target.GetName]§!-System ist wie ein offenes Grab!\n\nDie auf dem Planeten vorherrschende Spezies wurde von einer mysteriösen und äußerst aggressiven Lebensform vollständig vernichtet. Nähere Untersuchungen ergaben, dass es sich dabei nicht um einen natürlichen Organismus handelte, sondern vielmehr um winzige biologische Maschinen, die man scheinbar wachsen ließ, anstatt sie zu bauen.\n\nIst es möglich, dass die Entwickler dieser Kreaturen von ihrer eigenen Schöpfung vernichtet wurden? Könnte es sein, dass unser Feind nichts von den Aktionen gegen uns oder gar von unserer Existenz wusste?\n\nNur eines ist klar: Welche Maßnahmen auch immer sie trafen, um die Seuche einzudämmen, sie wurden von ihr vernichtet - zusammen mit ihren automatisierten Scheusalen."
 bio.2030.a: "Sie waren nicht die einzigen Opfer ..."
 smarter_hatchery: "Verbesserte Flotten"
 smarter_hatchery_desc: "Sie lernen ... Sie passen sich an ... Sie kommen."
 bio.2030.tt: "\n§EFolgende Ratsposten werden freigeschaltet:§!\n§H$t$$councilor_warden_of_the_citadel$§!\n$tt$$COUNCIL_POSITION_MODIFIER_BASE$\n$ttt$$MOD_SHIP_FRIENDLY_TERRITORY_ARMOR_MULT$: §G+1%§!\n$ttt$$mod_shipsize_starbase_deep_space_citadel_1_hull_mult$: §G+2%§!\n$ttt$$mod_starbases_upkeep_mult$: §G-5%§!\n$COUNCIL_POSITION_AVAILABLE_FOR$$t$$commander_with_icon$"
 councilor_warden_of_the_citadel: "Wächter der Zitadelle"
 councilor_warden_of_the_citadel_desc: "Der Wächter der Zitadelle hat die Aufgabe, die Verteidigungsanlagen zu verstärken, die militärische Bereitschaft zu überwachen und dafür zu sorgen, dass unsere Zivilisation vor jeder Bedrohung geschützt ist."
 mod_shipsize_starbase_deep_space_citadel_1_hull_mult: "$HITPOINTS$ ($starbase_deep_space_citadel_1$)"
 mod_shipsize_starbase_deep_space_citadel_2_hull_mult: "$HITPOINTS$ ($starbase_deep_space_citadel_2$)"
 mod_shipsize_starbase_deep_space_citadel_3_hull_mult: "$HITPOINTS$ ($starbase_deep_space_citadel_3$)"
 siege_node: "Belagerungsknoten"
 siege_node_desc: "Wir haben gelernt. Wir haben uns angepasst. Unsere Verteidigungen werden niemals fallen."
 bio.2036.name: "Sie lernen"
 bio.2036.desc: "Wir haben ein beunruhigendes Muster bei den Angriffen biologischer Schiffe festgestellt: Jede Welle ist koordinierter als die vorherige, Taktiken werden angepasst und unsere Verteidigungsanlagen methodisch auf die Probe gestellt. Unsere Sensoren zeichnen zudem wechselnde Energiesignaturen und Zielprioritäten auf, die diese sich stetig weiterentwickelnden Strategien noch untermauern.\n\nDiese Kreaturen, sei es durch Instinkt oder ein kollektives Bewusstsein, werden von Minute zu Minute stärker. Sollte dieses Muster Bestand haben, können wir uns gegen die nächste Welle noch schwieriger verteidigen."
 bio.2036.a: "Beten wir für die Verteidiger."
 bio.2036.b: "Mögen die Verteidiger standhaft sein!"
 bio.2036.tt: "Mit jeder aufeinanderfolgenden Welle werden die Flotten, die durch das §YSonderbare Portal§! kommen, stärker."
 bio.2040.name: "Feind vernichtet"
 bio.2040.desc: "Eingehende Telemetriedaten aus dem Portal deuten auf eine bedeutsame Entwicklung im §Y[event_target:starlit_sealed_system.GetName]§!-System hin: Sowohl die Flotte aus biologischen Schiffen als auch ihre Brutstätte wurden von einer uns unbekannten Macht vernichtet.\n\nObwohl wir vorerst erleichtert sind, dass die [GetInvadersLower] ein jähes Ende fanden, dürfen wir nicht die Tatsache ignorieren, dass eine andere Macht eines Tages die Kontrolle über das [event_target:starlit_sealed_system.GetName]-System übernehmen könnte.\n\nWir müssen rasch handeln und diesen für uns strategisch wichtigen Ort sichern, bevor wir einer erneuten Belagerung gegenüberstehen."
 bio.2040.a: "Freunde ... oder neue Feinde?"
 citadel_siege_cancelled: "Belagerung beendet"
 citadel_siege_cancelled_desc: "Die [GetInvadersLower] wurden vernichtet. Ist unsere lange Belagerung damit nun endlich aufgehoben worden?"
 citadel_siege_cancelled_machine: "$citadel_siege_cancelled$"
 citadel_siege_cancelled_machine_desc: "$citadel_siege_cancelled_desc$"
