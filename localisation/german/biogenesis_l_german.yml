 living_standard_symbiotic_drone: "Symbiose"
 living_standard_symbiotic_drone_tooltip: "Bewohner dieser Spezies können als §YArbeiter§! beschäftigt werden."
 living_standard_symbiotic_drone_tooltip_delayed: "$citizenship_symbiotic_drone_tooltip_delayed$"
 living_standard_exploited_drone: "Ausbeutung"
 living_standard_exploited_drone_tooltip: "Bewohner können als §Y$SLAVES$§! in Kolonien mit einer £building£ §Y$building_slave_processing$§! arbeiten"
 living_standard_exploited_drone_tooltip_delayed: "$citizenship_exploited_drone_tooltip_delayed$"
 job_disconnected_drone: "Abgetrennte Drohne"
 job_disconnected_drone_plural: "Abgetrennte Drohnen"
 job_disconnected_drone_desc: "Von ihrem kollektiven Bewusstsein getrennt werden diese Drohnen von nichts weiter als ihrem Grundinstinkt geführt."
 job_disconnected_drone_effect_desc: "£job_synapse_drone£ $job_disconnected_drone_plural$ produzieren Ressourcen basierend auf ihren §YSpezieseigenschaften§!."
