 ### ADDITIONAL RANDOM EVENTS
 ## NON-HIVE
 #PURITY
 bio.200.name: "Annahme unseres Vermächtnisses"
 bio.200.desc: "Da wir uns nun auf die Reinheit unserer Genetik konzentrieren, werden wir uns all der Dinge bewusst, die unsere Zivilisation so groß machen.\n\nWir waren noch nie so stolz auf unserer Erbe.\n\nKoryphäen aus allen Bereichen der Kunst, Wissenschaft und Wirtschaft begrüßen unsere Anstrengungen und hoffen, dass sie uns Ruhm einbringen."
 bio.200.a: "Wir feiern diesen Meilenstein, indem wir die Kunst fördern!"
 bio.200.b: "Die wissenschaftliche Forschung steht stets an erster Stelle."
 bio.200.c: "Der Konsum bildet den Kern der Wirtschaft."
 bio.210.name: "Wir lassen uns nicht säubern!"
 bio.210.desc: "Die Rufe der Demonstranten hallen durch unsere Städte. Eine Rebellengruppe innerhalb unseres Reichs lehnt unseren Weg der Reinheit ab und heizt die Stimmung in der Bevölkerung an.\n\nDiese Unruhestifter predigen unser angebliches Bedürfnis nach genetischer Vielfalt und kultureller Integration.\n\nSollten wir uns nicht schnellstens um diesen Aktivismus kümmern, laufen wir Gefahr, dass unser bisheriger Fortschritt in Richtung Reinheit zunichtegemacht wird."
 bio.210.a: "Löscht diese Abtrünnigen aus!"
 bio.210.b: "Beschwichtigt sie mit leeren Versprechungen."
 bio.215.name: "Geheimnisse der Vergangenheit"
 bio.215.desc: "Unsere Archäologen haben Beweise dafür gefunden, dass einst eine uralte Zivilisation auf unserer Heimatwelt existiert haben muss.\n\nEin tief im Boden vergrabenes Gewölbe wurde freigelegt und mit ihm klare Anzeichen für frühere Genexperimente.\n\nSollte diese Information an die Öffentlichkeit gelangen, könnte dies unseren heutigen Anspruch auf genetische Reinheit verwässern."
 bio.215.a: "Wir müssen auf der Vergangenheit aufbauen und die Forschung von damals mit unserer eigenen kombinieren."
 bio.215.b: "Vernichtet alle Beweise. Niemand darf das wissen."
 bio.220.name: "Merkwürdige Wissenschaft"
 bio.220.desc: "[event_target:rogue_geneticist.GetName], ein abtrünniger Genetiker, hat ungenehmigte biologische Experimente durchgeführt und dabei alle Sicherheitsvorschriften missachtet. Das Ziel lag offenbar darin, eine überlegene Spezies hervorzubringen, die jene Ideale der Reinheit verkörpert, nach denen wir uns so sehr sehnen. Das Ergebnis war allerdings die Geburt einer wahren Abscheulichkeit.\n\nEine Unterspezies aus Kreaturen mit geringer Lebensdauer, die einige Aspekte unseres Genprofils teilt, aber von Krankheiten geplagt wird, verkümmert jetzt in unserer Obhut. Obwohl sich die Analyse ihres Erbguts als äußerst nützlich erwiesen hat, lässt sich die Krankheit nicht aufhalten. [event_target:rogue_geneticist.GetName] zeigt keinerlei Reue."
 bio.220.a: "Entfernt diesen Abtrünnigen aus seinem Posten!"
 bio.220.a.tt: "[event_target:rogue_geneticist.GetName] wird in den Ruhestand gezwungen."
 bio.220.b: "Bringt [event_target:rogue_geneticist.GetName] zum Schweigen."
 bio.220.c: "Das ist genau die Art von Eigeninitiative, die wir brauchen."
 bio.225.name: "Ein Skandal!"
 bio.225.desc: "Nach der Einführung regelmäßiger Gentests zur Prüfung der Reinheit und der Identifikation genomischer Ausreißer, ist \"höherwertige\" DNA zu etwas geworden, womit man sich rühmen kann.\n\nEinige hochrangige Regierungsbeamte scheinen jedoch Testergebnisse gefälscht zu haben, um sich ein besseres biologisches Profil mit vorteilhafteren Eigenschaften zu geben, als sie in Wirklichkeit besitzen. Sollte an die Öffentlichkeit durchsickern, dass wir versucht haben, die Wahrheit zu vertuschen, könnte dies breite Empörung hervorrufen."
 bio.225.a: "Wir müssen dafür sorgen, dass die Tests zuverlässiger und präziser sind."
 bio.225.b: "Vielleicht haben diese Beamten einfach nur einen Fehler gemacht ..."
 ### ADDITIONAL RANDOM EVENTS
 ## NON-HIVE
 #CLONING
 bio.230.name: "Das Klondilemma"
 bio.230.desc: "Unter uns gibt es Klone. Sie leben in unseren Städten und arbeiten in unseren Fabriken. Manche von ihnen befinden sich sogar in Machtpositionen und gestalten die Politik mit, die über unser Leben bestimmt.\n\nMit der gesellschaftlichen Integration von Klonen ist eine Frage unbeantwortet geblieben: Welche Rechte haben sie? Haben sie die gleichen Rechte wie ihr Original oder sollte man sie eher als Untergebene behandeln?"
 bio.230.a: "Voller Staatsbürgerschaft für alle Klone!"
 bio.230.b: "Sie sind bestenfalls Bürger zweiter Klasse."
 bio.235.name: "Sabotage in der Klonanlage"
 bio.235.desc: "Die Produktion einer unserer wichtigsten Klonanlagen ist aufgrund eines Unfalls, der erheblichen Schaden verursacht hat, jäh zum Stillstand gekommen.\n\nDa viele der Produktionslinien aus Effizienzgründen automatisch ablaufen, war niemand vor Ort, der in dem Moment, in dem es zu der Störung kam, hätte eingreifen können.\n\nKurz nachdem ein neuer Klon vom Band gelaufen war, rutschte er aus und verfing sich im Ablademechanismus, was einen Stau auslöste und einen vollständigen Produktionsstopp erforderte."
 bio.235.a: "Das muss umfassend untersucht werden!"
 bio.235.a.tt: "Situationsfortschritt der Situation \"§Y$genetic_ascension_situation$§!\" für §Y12§! Monate: §R-50%§!"
 biomorphosis_stalled_tt: "Situationsfortschritt der Situation \"§Y$genetic_ascension_situation$§!\" für §Y12§! Monate:"
 bio.235.b: "Bringt die Produktion schnellstmöglich wieder zum Laufen!"
 bio.240.name: "Identitätskrise"
 bio.240.desc: "Überall in unserem Reich gibt es Klone, die mit dem Verständnis ihres eigenen Ichs Probleme haben.\n\nSie wünschen sich eine Identität, die über die ihres Genspenders hinausgeht. Sie stellen ihren Lebenszweck infrage und fühlen sich antriebslos, was ihre Ziele und Bestrebungen angeht."
 bio.240.a: "Das ist normal. Schickt sie zur Therapie."
 bio.240.b: "Sie sollten sich ganz ihrer Arbeit widmen."
 bio.240.b.tt: "Jeder §Y£leader£ Anführer§! aus der Hauptspezies des Reichs erhält §G+200§! Erfahrung."
 bio.250.name: "Überall Klone!"
 bio.250.desc: "Der zunehmende Ressourcenbedarf für den Unterhalt der neu in die Gesellschaft integrierten Klone belastet die Wirtschaft ungemein.\n\nObwohl die vor uns liegende Herausforderung riesig ist, könnte die wirtschaftliche Dynamik, die durch eine größere Zahl von Arbeitskräften und Verbrauchern entsteht, den Grundstein für einen langfristigen Wohlstand legen - vorausgesetzt, wir sorgen für einen reibungslosen Übergang."
 bio.250.a: "Unsere Infrastruktur muss mit dem Bedarf wachsen."
 bio.250.b: "Sie können ihr Leben in den Randkolonien genießen."
 ### ADDITIONAL RANDOM EVENTS
 ## NON-HIVE
 #MUTATION
 bio.260.name: "Unbändige Mutationen"
 bio.260.desc: "Ein spontanes Wachstum zusätzlicher Gliedmaßen. Ein Wechsel zwischen verschiedenen Aggregatszuständen. Eine plötzlich einsetzende Metamorphose. Die Berichte über derlei Vorkommnisse sind selten, dürfen aber nicht ignoriert werden.\n\nUnsere Mutationsexperimente bringen einige nicht gerade wünschenswerte Ergebnisse hervor. Vielleicht übersteigt unser Verständnis der Werkzeuge, mit denen sich Gene nach Belieben verändern lassen, das, was wir anfangs erwartet hatten."
 bio.260.a: "Ungewöhnliche Mutationen können unserer Forschung zugutekommen."
 bio_260_opinion_tt: "Die Meinung §Yspiritualistischer§! Reiche über uns verschlechtert sich um §R50§!"
 bio.260.b: "Beseitigt diese Abscheulichkeiten."
 bio.260.b.tt: "Jeder §Yautoritäre £leader£ Anführer§! erhält die Eigenschaft \"§Y$leader_trait_eager$§!\"."
 bio.265.name: "Überlegene Mutanten"
 bio.265.desc: "Ein kleiner Prozentsatz der Bevölkerung hat durch das Experimentieren mit Mutationen außergewöhnliche Fähigkeiten und physische Verbesserungen entwickelt.\n\nAufgrund ihrer einzigartigen Stärke und ihrer Besonderheit haben sie begonnen, eigene Gemeinschaften zu bilden, und viel Aufmerksamkeit in der Öffentlichkeit erregt."
 bio.265.a: "Ihr Erfolg könnte anderen eine Inspiration sein."
 bio.265.b: "Klingt fast so, als würden sie gute Soldaten abgeben."
 bio.265.b.tt: "Erschafft eine §Y$gene_warrior_army$§! auf §Y[Owner.capital_scope.GetName]§!."
 bio_265_opinion_tt: "Die Meinung §Ymilitaristischer§! Reiche über uns verbessert sich um §G50§!"
 bio.265.c: "Findet heraus, wie sie das geschafft haben, und versucht, es zu kopieren."
 bio.270.name: "Urbane Legenden werden lebendig"
 bio.270.desc: "Unsere Überwachungssysteme haben die Existenz genetisch veränderter Individuen bestätigt, die in der städtischen Kanalisation leben - ein beunruhigender Nachhall längst vergessener urbaner Legenden.\n\nDiese Entdeckung hat zu sozialen Spannungen geführt, und mutierte Bürger berichten von einer zunehmenden Diskriminierung, da die Angst vor dem Unbekannten wächst. Dennoch kann man nicht abstreiten, dass sie Einfallsreichtum bewiesen haben, indem sie Abwässer für die Ressourcenproduktion nutzbar gemacht und ihre Umwelt auf manch unerwartete Weise angepasst haben."
 bio.270.a: "Vertreibt sie aus der Kanalisation!"
 bio.270.b: "Diese Mutanten könnten da an etwas dran sein ..."
 bio.280.name: "Mutantenseuche"
 bio.280.desc: "Eine neue Seuche breitet sich im gesamten Reich aus. Die Krankheit sorgt bei ihrem Wirt für äußerst unangenehme Symptome - einschließlich, aber nicht begrenzt auf den unwillkürlichen Ausstoß von Luft und Flüssigkeit, lähmende Müdigkeit und in einigen Fällen sogar den Tod.\n\nSeltsamerweise scheinen nur jene von der Krankheit betroffen zu sein, deren Physiologie durch bestimmte Mutationen verändert wurde. Eine laufende Studie ihrer modifizierten Genome hat verblüffende Ergebnisse erzielt."
 bio.280.a: "Findet eine therapeutische Anwendung dafür."
 bio.280.b: "Macht die Krankheit zur Waffe."
 bio_280_opinion_tt: "Die Meinung §Ymaterialistischer§! Reiche über uns verschlechtert sich um §R50§!"
 ### ADDITIONAL RANDOM EVENTS
 ## NON-HIVE
 #ANY APPROACH
 bio.295.name: "Rebellenzelle"
 bio.295.desc: "Unsere Genforschung hat dafür gesorgt, das unsere gesamte Bevölkerung Zugang zu physiologischen Modifikationen hat, wie wir sie noch nie zuvor gesehen haben.\n\nDie Bewohner unseres Reichs fordern jedoch, dass wir noch einen Schritt weiter gehen und den sogenannten \"Biohackern\" freien und unbeschränkten Zugang zur Gentechnik und den Staatsressourcen geben."
 bio.295.a: "Gebt den Biohackern größere Autonomie."
 bio.295.b: "Der durchschnittliche Bürger hat bereits zu viel Freiheit."
 bio_295_opinion_tt: "Die Meinung §Yegalitärer§! Reiche über uns verbessert sich um §G50§!"
 bio.300.name: "Genialer Genetiker"
 bio.300.desc: "[event_target:genius_geneticist.GetName] hat kürzlich eine akademische Forschungsarbeit veröffentlicht, die beschreibt, wie sich die Effizienz und die Wirksamkeit unserer Genexperimente drastisch beschleunigen und verbessern ließen.\n\nDie beschriebene Methode ist jedoch nur rein theoretisch und wurde nie getestet, weshalb man sie sorgfältig prüfen sollte, bevor wir sie einzusetzen planen."
 bio.300.a: "Wir erkennen den Beitrag von [event_target:genius_geneticist.GetName] an."
 bio.300.b: "Wir können derart leichtsinnige Ideen - und Individuen - nicht tolerieren."
 bio.300.c: "Alle zurück an die Arbeit!"
 ### ADDITIONAL RANDOM EVENTS
 ## HIVE
 #PURITY
 bio.310.name: "Reinheit [target.GetGestaltEntityName::<DE_ART_DEF_S_G>] [target.GetGestaltEntityName&GEN] verletzt"
 bio.310.desc: "Unsere Spezies wurde von einem boshaften Gencode infiltriert, eine Folge unserer anhaltenden Experimente mit Genveränderungen. Unsere Drohnen erkranken in einem alarmierendem Tempo, da die fremde Sequenz unser Genmaterial unkontrollierbar destabilisiert.\n\nWir müssen uns um dieses anormale biologische Verhalten kümmern, bevor es zu spät ist."
 bio.310.a: "Beseitigt jeden, der kontaminiert ist."
 bio.310.b: "Wir müssen das Phänomen studieren."
 bio.315.name: "Der Sache verschrieben"
 bio.315.desc: "Wenn unsere Zivilisation Reinheit erreichen will, müssen wir zuerst dafür sorgen, dass es [target.GetGestaltEntityName::<DE_ART_DEF_S_D>] [target.GetGestaltEntityName&DAT] an nichts mangelt. Der Prozess der Genmanipulation muss sicherstellen, dass jede Anpassung die Widerstandsfähigkeit des Kollektivs erhöht.\n\nSollten wir den falschen Weg einschlagen und Änderungen einführen, die zu Instabilitäten führen oder den Zusammenhalt gefährden, könnte dies fatale Auswirkungen haben und das Fundament unserer Einigkeit gefährden."
 bio.315.a: "Konzentrieren wir uns auf die physische Widerstandsfähigkeit."
 bio.315.b: "Die kognitive Effizienz ist von entscheidender Bedeutung."
 bio.325.name: "Jenseits von heute"
 bio.325.desc: "Um die Langlebigkeit und die Reinheit unserer Spezies zu garantieren, müssen wir für eine selektivere Aufzucht sorgen und strengere Genuntersuchungen durchführen.\n\nNur durch die sorgfältige Auswahl jener Drohnen, die würdig sind, unser Erbe fortzuführen, überwinden wir die natürliche Evolution."
 bio.325.desc.wilderness: "Um die Langlebigkeit und die Reinheit unserer symbiotischen Vielfältigkeit zu garantieren, müssen wir für eine selektivere Aufzucht sorgen und strengere Genuntersuchungen durchführen.\n\nNur durch die sorgfältige Auswahl jener Symbionten, die interessante Eigenschaften für das Kollektiv aufweisen, wachsen wir über unsere ursprünglichen Grenzen hinaus."
 bio.325.a: "Wir legen bei den Untersuchungen Priorität auf die Intelligenz."
 bio.325.b: "Die Aufzucht muss die Vergrößerung unserer Spezies zum Ziel haben."
 bio.330.name: "Kostspieliger Aufstieg"
 bio.330.desc: "Die Genmanipulation wird uns mit einem ewig währenden Vermächtnis belohnen, doch die Rolle unserer [target.GetIndividualNamePlural] sowie jede Anstrengung unserseits muss mit unserer Vision von Reinheit in Einklang gebracht werden.\n\nWir stehen vor einer wichtigen Entscheidung: Sollen wir die Perfektion auf Kosten der Anpassungsfähigkeit anstreben? Oder sollen wir eine breitere Strategie verfolgen und die Infrastruktur priorisieren, die nötig ist, um unsere Bemühungen längerfristig zu betreiben?"
 bio.330.a: "Die Reinheit muss unsere einzige Priorität sein."
 bio.330.b: "Wir müssen uns die nötige Zeit nehmen, um unsere Infrastruktur auszubauen."
 bio.335.name: "Beseitigung der Unvollkommenheit"
 bio.335.desc: "Wir haben eine Reihe genetischer Unreinheiten und Anomalien innerhalb unser[target.GetGestaltEntityName::<DDE_END_PRO_S_G>] [target.GetGestaltEntityName&GEN] isoliert.\n\nZur Verwirklichung unseres größeren Ziels müssen wir diese fehlerhaften Eigenschaften beseitigen und die Kontrolle über unsere eigene physische Evolution von der Natur zurückgewinnen."
 bio.335.a: "Beseitigt die Schwachen, um das Kollektiv zu stärken."
 bio.335.b: "Versucht, die Fehler zu beheben."
 bio_335_opinion_tt: "Die Meinung §Yeher mildtätiger§! Reiche über uns verschlechtert sich um §R50§!"
 ### ADDITIONAL RANDOM EVENTS
 ## HIVE
 #CLONING
 bio.340.name: "Zu viele Klone!"
 bio.340.desc: "Unsere Klonanlagen arbeiten effizienter als ursprünglich erwartet, weshalb wir nun einen Klonüberschuss aufweisen.\n\nDie Integration so vieler Klone erweist sich als äußerst schwierig."
 bio.340.a: "Neue Klone müssen auf andere Schwarmwelten migriert werden."
 bio.340.b: "Erhöht die Drohnenproduktion."
 bio.350.name: "Leere Hüllen"
 bio.350.desc: "Mehrere Drohnen sind von einer Fehlfunktion in einem unserer Hauptklonzentren betroffen. Eine genetische Verunreinigung hat offenbar den Klonvorgang beeinflusst und eine Charge Klone hervorgebracht, die nicht über die Fähigkeit verfügen, selbstständig zu denken.\n\nSie sind praktisch nicht-empfindungsfähige biologische Objekte, die über keinerlei kognitive Funktionen verfügen. Bis das Problem ausfindig gemacht werden und behoben werden konnte, bleibt die Produktivität der Anlage verringert."
 bio.350.a: "Das fühlt sich so ... beruhigend an."
 bio.350.a.tt: "100 £pop£ §Hbeinahe vernunftbegabte Bewohner§! werden auf §Y[owner.capital_scope.GetName]§! erschaffen"
 bio.350.b: "Züchtet einfach eine neue Charge heran."
 bio.365.name: "Schwarmmetaphysik"
 bio.365.desc: "Aus dem Inneren unseres Bewusstseins taucht immer häufiger eine Frage auf: Werden uns die Klone eines Tages alle ersetzen?\n\nUnsere anfänglichen Bemühungen der genetischen Vervielfältigung verlaufen gut - ja, sie verlaufen sogar so gut, dass wir neugierig geworden sind, ob diese effiziente Methode der Vermehrung unsere natürliche Fortpflanzung eines Tages ablösen könnte.\n\nSollte es dazu kommen, wird der Schwarm eines Tages nicht mehr über Originalspender verfügen, sondern nur über Klone von Klonen ... Was bedeutet dies für uns als Spezies? Eine Frage, die keine Antwort hat. Doch wir sind gezwungen, uns diese Frage zu stellen."
 bio.365.a: "Die Frage an sich besitzt schon einen gewissen Wert."
 bio.365.b: "Solche Fragen sind nur reine Ablenkung."
 ### ADDITIONAL RANDOM EVENTS
 ## HIVE
 #MUTATION
 bio.375.name: "Tiefe Verbindung"
 bio.375.desc: "Wir haben eine bahnbrechende Entdeckung gemacht! Durch die Manipulation bestimmter Gene können wir die Reichweite unseres Bewusstseins erweitern und unsere Sinne über das hinaus schärfen, was wir einst als Leistungsgrenze unserer Spezies ansahen.\n\nDie schwarmweite Einführung dieser Mutationen wird eine große Menge Energie benötigen, doch es wird unser Verständnis des Universums und unseres Platzes in ihm vertiefen."
 bio.375.a: "Die Kosten sind vernachlässigbar. Fahrt fort."
 bio.375.b: "Wir dürfen nichts überstürzen."
 mod_planet_evaluators_physics_research_produces_add: "£physics_research£ $physics_research$ für jeweils $pop_group_unit$ [evaluator.GetIcon] [evaluator.GetNamePlural]"
 bio.380.name: "Emotionale Überlastung"
 bio.380.desc: "Große Teile des Schwarms erleben eine Art unkontrollierbarer Wut - eine Welle von Emotionen, die unser geteiltes Bewusstsein selbst beeinträchtigen und unseren kollektiven Schmerz und unsere Frustration verstärken.\n\nDie kürzliche Einführung einer bestimmten Mutation scheint die Neurozyten in den Aggressionskontrollzentren unserer Drohnen zu überstimulieren, was das emotionale Gleichgewicht des Schwarms stört. Es kommt regelmäßiger zu Konflikten, und manche Drohnen haben begonnen, ihre Arbeit zu unterbrechen, um andere Drohnen anzugreifen."
 bio.380.a: "Wir werden als Einheit aufeinander achten."
 bio.380.b: "Lasst der Wut freien Lauf!"
 bio.385.name: "Umweltintoleranz"
 bio.385.desc: "Obwohl uns unsere Mutationen verbessern sollen, wurde festgestellt, dass manche von ihnen unangenehme Nebenwirkungen aufweisen.\n\nMutationen, die unsere Lebensspanne erhöhen, konnten zwar erfolgreich implementiert werden, doch eben diese Mutationen haben auch unsere Toleranz gegenüber extremen Klimazonen verringert.\n\nDiejenigen von uns, die diese biologischen Augmentierungen besitzen, haben von Schwierigkeiten mit ihrem Thermoregulationssystem berichtet, und dieses Unbehagen ist im gesamten Schwarm zu spüren."
 bio.385.a: "Wir müssen unseren Wetterschutz verbessern."
 bio.385.b: "Wir verändern uns, und mit uns verändert sich auch die Umwelt, in der wir uns wohlfühlen."
 uncomfortable_drones: "Sich unwohl fühlende Drohnen"
 uncomfortable_drones_desc: "Unsere Drohnen fühlen ein Unbehagen wegen gewisser Mutationen."
 bio.390.name: "Stärke oder Intellekt"
 bio.390.desc: "Wir haben ein neues Mutationspaar entdeckt. Die eine Variante erhöht die physische Stärke von Drohnen, was ihre Effizienz bei bestimmten Arbeiten erheblich verbessert. Die andere schärft ihren Intellekt, wodurch ihre Problemlösungsfähigkeit und ihre Strategiefindung verbessert wird.\n\nDas Schwarmbewusstsein muss entscheiden, welchen Pfad es einzuschlagen gilt."
 bio.390.a: "Stärke bedeutet Fortschritt."
 bio.390.b: "Wir denken, und darum gedeihen wir."
 ### ADDITIONAL RANDOM EVENTS
 ## HIVE
 #ANY APPROACH
 bio.405.name: "Defektes Genom"
 bio.405.desc: "Wir konnten den plötzlichen Ausbruch eines Gendefekts gerade noch eindämmen.\n\nDurch die Manipulation unserer eigenen Biologie ist eine boshafte Mutation in unserer DNA entstanden, die viele [target.GetIndividualNamePlural] körperlich beeinträchtigt.\n\nDie betroffenen [target.GetIndividualNamePlural] wurden unter Quarantäne gestellt, und wir müssen jetzt entscheiden, was wir mit ihnen machen."
 bio.405.a: "Beseitigt die [target.GetIndividualNamePlural] und mit ihnen auch die Krankheit."
 bio.405.b: "Studiert die betroffenen Drohnen."
 bio.410.name: "Zellverfall"
 bio.410.desc: "Ein Berechnungsfehler hat dazu geführt, dass die genetische Integrität eines Großteils unserer Drohnen beeinträchtigt wurde. Leider konnten wir noch nicht feststellen, wo genau der Fehler aufgetreten ist.\n\nNachdem wir die Berechnungen überprüft und einige der problematischeren Verfahren geändert haben, sind wir nun bereit, unsere Bemühungen zur Aufwertung unserer Spezies fortzusetzen.\n\nEs ist noch nicht ganz klar, ob wir den Fehler tatsächlich behoben haben - oder schlimmer noch: ob noch weitere Fehler gemacht wurden."
 bio.410.desc.wilderness: "Ein Berechnungsfehler führte dazu, dass die genetische Integrität einer Vielzahl von Symbionten beeinträchtigt wurde. Leider konnten wir noch nicht feststellen, wo genau der Fehler aufgetreten ist.\n\nNachdem wir die Berechnungen überprüft und einige unausgewogene Enzymcocktails angepasst haben, sind wir nun bereit, die Aufwertung unserer Spezies fortzusetzen.\n\nEs ist noch nicht ganz klar, ob wir den Fehler tatsächlich behoben haben - oder schlimmer noch: ob noch weitere Fehler gemacht wurden."
 bio.410.a: "Wir können aus dem lernen, was auch immer als Nächstes geschieht."
 bio.410.b: "Setzt weitere Experimente für den Moment aus."
 bio.410.b.tt: "$bio.235.a.tt$"
