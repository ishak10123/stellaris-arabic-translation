 behemoth_cocoon_menu_title: "Reifen und wachsen"
 behemoth_cocoon_effect: "Ein vollständig genährter §YBehemoth§! kann §Y3 Jahre§! lang in einem Gasriesen nisten, um sich zu einer noch stärkeren Lebensform zu entwickeln."
 behemoth_cocoon_progress_activity_key: "Kokonbildung"
