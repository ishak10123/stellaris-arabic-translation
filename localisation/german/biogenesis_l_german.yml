 incubating_behemoth_modifier_desc: "Eine mächtige Metamorphose ist im Gange."
 voidspawn_boss_invincible: "Unbezwingbarer Herr der Bestien"
 voidspawn_boss_invincible_desc: "Es heißt, es habe noch nie jemand geschafft, eine ausgewachsene Todesbrut zu erlegen. Unsere beste Chance liegt darin, ihre Beute zu erlegen."
 mod_damage_vs_country_type_voidspawn_boss_mult: "Schaden an der Ältesten Todesbrut"
 voidspawn_boss_buffs: "Urtümliche Macht"
 voidspawn_system_mod: "Leerensturm"
 voidspawn_colony_mod: "Koloniale Panik"
 voidspawn_colony_mod_desc: "Welten verfaulen unter dem Schatten der Ältesten Todesbrut"
 VOIDSPAWN_FORCE_DECLINE: "§RAbnehmende Bevölkerung§!"
 elder_voidspawn_chain_title: "Wütende Todesbrut"
 elder_voidspawn_chain_desc: "Eine riesige Todesbrut durchstreift die Galaxie. Sie ist auf der Suche nach Behemoths, die sie töten kann, doch wenn wir die Brut zuerst töten, wird sie uns vermutlich in Ruhe lassen.\n\nZIELVORGABE: Findet und tötet alle Stufe-4-Behemoths in der Galaxie."
 behemoth_victory_chain_title: "König der Monster"
 behemoth_victory_chain_desc: "Die Gedankenverschmelzung ist abgeschlossen, und nur noch wenige Schritte trennen uns von unserem Ziel. Wir müssen uns an unseren neuen gemeinsamen Körper gewöhnen und den Geist unseres Volkes weiter übertragen, aber wichtiger noch ist: Wir müssen jeden vernichten, der uns unseren Rang streitig machen will, wer auch immer dies sein mag.\n\n§HZIEL§!:\n- Findet und tötet alle anderen Klasse-4-Behemoths in der Galaxie.\n- Schließt die Situation \"Wachstumsschmerzen\" ab\n- Tötet die Ältesten-Todesbrut"
 behemoth_transference: "Behemoth-Übertragung"
 behemoth_transference_desc: "Die Verbindung, die jetzt zwischen der Bestie und unserer Bevölkerung besteht, wirft ein neues Licht auf unsere planetengebundene Existenz. Es ist ein Licht der Aussichtlosigkeit, wenn man es mit dem Einswerden mit der Bestie vergleicht. Ein jeder sehnt sich nun danach, eins mit der Bestie zu werden und fühlt sich ... ausgehungert."
