 #Species traits localized tags
 SPECIES_TRAIT_CATEGORY_HEADER: "§HEigenschaftskategorien§!\nDiese Eigenschaft gehört zu folgenden Kategorien:"
 SPECIES_TRAIT_HUMANOID: "['concept_humanoid_phenotype_traits']"
 SPECIES_TRAIT_MAMMALIAN: "['concept_mammalian_phenotype_traits']"
 SPECIES_TRAIT_REPTILIAN: "['concept_reptilian_phenotype_traits']"
 SPECIES_TRAIT_ARTHROPOID: "['concept_arthropoid_phenotype_traits']"
 SPECIES_TRAIT_AVIAN: "['concept_avian_phenotype_traits']"
 SPECIES_TRAIT_MOLLUSCOID: "['concept_molluscoid_phenotype_traits']"
 SPECIES_TRAIT_PLANTOID: "['concept_plantoid_phenotype_traits']"
 SPECIES_TRAIT_FUNGOID: "['concept_fungoid_phenotype_traits']"
 SPECIES_TRAIT_LITHOID: "['concept_lithoid_phenotype_traits']"
 SPECIES_TRAIT_NECROID: "['concept_necroid_phenotype_traits']"
 SPECIES_TRAIT_AQUATIC: "['concept_aquatic_phenotype_traits']"
 SPECIES_TRAIT_TOXOID: "['concept_toxoid_phenotype_traits']"
 SPECIES_TRAIT_INFERNAL: "['concept_infernal_phenotype_traits']"
 SPECIES_TRAIT_VOCATIONAL: "['concept_vocational_traits']"
 SPECIES_TRAIT_OVERTUNED: "['concept_overtuned_traits']"
 SPECIES_TRAIT_FLEETING_EXCELLENCE: "['concept_fleeting_excellence_traits']"
 SPECIES_TRAIT_CYBORG: "['concept_cybernetic_traits']"
 SPECIES_TRAIT_UNIVERSAL_AUGMENTATIONS: "['concept_universal_augmentations_traits']"
 SPECIES_TRAIT_ADAPTIVE_FRAMES: "['concept_adaptive_frames_traits']"
 trait_egg_laying: "Eierlegend"
 trait_egg_laying_desc: "Die Jungen dieser Spezies entwickeln sich nicht im Inneren ihrer Eltern, sondern in der schützenden Schale eines Eies. Dies erlaubt es ihnen, in Zeiten des Überflusses schneller heranzuwachsen."
 trait_egg_laying_effect: "Wachstumsgeschwindigkeit (Bewohner): §G+15%§! auf Planeten, die einen lokalen §GProduktionsüberschuss§! an $r_food$ (oder dem Äquivalent davon) haben"
 trait_egg_laying_portrait_override_tt: "Oder eine beliebige ovipare Spezies"
 trait_seasonal_dormancy: "Saisonale Dormanz"
 trait_seasonal_dormancy_desc: "Diese Spezies hat sich auf einem Planeten mit zyklischen Jahreszeiten entwickelt und geht regelmäßig in einen Winterschlaf über. Mit modernen Mitteln lassen sich diese saisonalen Auslöser künstlich simulieren, um weniger produktive Mitglieder der Gesellschaft effizient zu lagern."
 trait_seasonal_dormancy_effect: "Unterhalt (Arbeitende Bewohner): §G-15%§!\n    - Unterhalt (Arbeitslose und ['concept_denizen']): §G-75%§!"
 trait_seasonal_dormancy_portrait_override_tt: "Oder eine beliebige überwinternde Spezies"
 trait_hollow_bones: "Hohlknochen"
 trait_hollow_bones_desc: "Die leichten Knochen dieser Spezies erlauben es ihr, sich elegant und mühelos zu bewegen. Sie ist jedoch auch anfälliger für die Gravitationsauswirkungen von Planeten."
 trait_hollow_bones_effect: "$BONUS_WORKFORCE_FOR$ $pop_cat_worker_plural$, $pop_cat_simple_drone_plural$ und Soldaten-Jobs pro Planetengröße: §R-0.67%§!"
 trait_rooted: "Verwurzelt"
 trait_rooted_desc: "Diese Spezies schlägt buchstäblich Wurzeln in jeder Umgebung, in der sie sich befindet, was einen Umzug zu einer höchst traumatischen Erfahrung macht."
 AUTO_MIGRATE_ROOTED: "§RVerwurzelte Bewohner können nicht migrieren.§!"
 trait_rooted_effect: "§RKeine automatische Bewohnermigration§!\n    - Umsiedlungskosten: §R+200%§!"
 trait_rooted_portrait_override_tt: "Oder eine beliebige an die Umwelt gebundene Spezies"
 trait_acidic_vascularity: "Saure Vaskularität"
 trait_acidic_vascularity_desc: "Die inneren Flüssigkeiten dieser Spezies sind ihr stärkster Schutz. Sie sind hochgradig ätzend und tödlich und lassen jeden Feind die Entscheidung bereuen, ein Loch in diese Spezies zu stechen."
 trait_acidic_vascularity_effect: "Armeen §Yexplodieren bei ihrem Tod§! für §G250§! Schaden an feindlichen Armeen\n    - Ressourcenproduktion (Gesäuberte Bewohner): §R-75%§!"
 DAMAGE_ARMY: "Verursacht Schaden an $ARMY|Y$"
 trait_shelled: "Gehäuse"
 trait_shelled_desc: "Ob natürlich gewachsen oder zufällig (oder absichtlich) gefunden: Diese Spezies trägt ihr Zuhause jederzeit mit sich. Das Gehäuse bietet Schutz und sorgt dafür, dass es immer einen Platz gibt, an dem diese Spezies die Nacht verbringen kann."
 trait_shelled_portrait_override_tt: "Oder eine beliebige gehäusetragende Spezies"
 trait_camouflage: "Tarnfarbe"
 trait_camouflage_desc: "Diese Meister der Tarnung verschmelzen nahtlos mit der Umgebung und machen sich für Raubtiere und Beute gleichermaßen nahezu unsichtbar. Ihr angeborenes Verständnis von Optik verschafft ihnen besonders im Guerillakrieg einen taktischen Vorteil."
 trait_camouflage_portrait_override_tt: "Oder eine beliebige zur Tarnung fähige Spezies"
 trait_chromalogs: "Chromatisch"
 trait_chromalogs_desc: "Durch die geschickte Nutzung von Farben konnte sich diese Spezies über deren bloße Anwendung für Tarnungszwecke hinaus entwickeln und kommuniziert durch die leuchtenden und komplizierten Muster auf ihrem Körper."
 trait_chromalogs_portrait_override_tt: "Oder eine beliebige Spezies, die Körperverfärbung zur Kommunikation nutzt"
 trait_brittle: "Spröde"
 trait_brittle_desc: "Aufgrund ihrer angeborenen Zerbrechlichkeit muss diese Spezies bei ihren täglichen Aktivitäten äußerst vorsichtig sein, um nicht schon bei den banalsten Aufgaben zu splittern."
 trait_familial: "Familiär"
 trait_familial_desc: "Diese Spezies hat eine tiefe und dauerhafte Verbindung zu den engsten Verwandten und bildet hocheffiziente und eng zusammenhaltende Kollektive."
 trait_familial_effect: "Zufriedenheit für jeweils §Y100§! £pop£ Bewohner mit dieser Eigenschaft auf demselben Planeten: §G0.1%§! (Max: §G+20%§!)"
 trait_familial_portrait_override_tt: "Oder eine beliebige familiäre Spezies"
 trait_permeable_skin: "Durchlässige Haut"
 trait_permeable_skin_desc: "Diese Spezies hat eine besondere Haut entwickelt, die eine ideale Umgebung benötigt. Solange die Umwelt nicht zu sehr von ihrem Heimatklima abweicht, sollte dies jedoch kein Problem sein."
 trait_permeable_skin_effect: "Bewohnbarkeit auf Welten, die von der bevorzugten ['concept_climate_category'] abweichen: §R-20%§!"
 concept_climate_category: "Klimakategorie"
 concept_climate_category_desc: "Bewohnbare Welten sind in 3 Klimakategorien unterteilt:\n- Feucht:\n$t$- Kontinental\n$t$- Ozean\n$t$- Tropisch\n- Kalt:\n$t$- Alpin\n$t$- Arktisch\n$t$- Tundra\n- Trocken:\n$t$- Arid\n$t$- Wüste\n$t$- Savanne"
 trait_genetic_memory: "Genetisches Gedächtnis"
 trait_genetic_memory_desc: "Die Weitergabe von Wissen und anderen Erkenntnissen von einer Generation zur nächsten führte zur Entstehung zahlreicher Zivilisationen. Diese Spezies ist noch einen Schritt weiter gegangen, indem sie Erkenntnisse über das Überleben direkt in ihren Gencode übertrug, um sicherzustellen, dass jede neue Generation mit dem kollektiven Wissen ihrer Vorfahren geboren wird."
 trait_genetic_memory_effect: "Bewohnbarkeit durch das Koloniealter: §G+0.5%§! pro Jahr (maximal §G+25%§!)"
 trait_genetic_memory_portrait_override_tt: "Oder eine beliebige Spezies mit angeborenen Überlebensinstinkten"
 trait_nascent_stage: "Entstehungsphase"
 trait_nascent_stage_desc: "Diese Spezies bringt ihre Nachkommen in einem frühen Entwicklungsstadium zur Welt, wodurch die Jungen eine längere Zeit brauchen, um etwas zur Gesellschaft beitragen zu können. Während dieser Zeit sind sie sich der Verantwortung und der Lasten, die mit dem Erlangen von Wissen einhergehen, nicht bewusst."
 trait_nascent_stage_effect: "Neugeborene Bewohner mit dieser Eigenschaft gelten in den ersten §Y5§! Jahren nur als beinahe vernunftbegabt."
 trait_nascent_stage_portrait_override_tt: "Oder eine beliebige Spezies mit einer verlängerten Säuglingszeit"
 trait_presapient_stage: "Beinahe vernunftbegabt"
 trait_presapient_stage_desc: "Nach einigen Jahren ohne bewusste Gedanken reift diese Spezies schließlich zu einem voll vernunftbegabten Wesen heran."
 trait_flight: "Flugfähig"
 trait_flight_desc: "Diese Spezies hat sich von den Beschränkungen einer Planetenoberfläche gelöst und bewegt sich frei durch die Lüfte. Ihre Städte verfügen über einen einzigartigen, dicht bebauten Grundriss, der für flugfähige Bewohner optimiert wurde. In Konflikten erweisen sie sich als schwer fassbare und schwierige Ziele."
 trait_flight_portrait_override_tt: "Oder eine beliebige an den Himmel angepasste Spezies"
 trait_spatial_mastery: "Raumbeherrschung"
 trait_spatial_mastery_desc: "Diese Spezies ist nicht nur flugfähig, sondern verfügt auch über einzigartige zerebrale Anpassungen, die es ihr erlauben, instinktiv dreidimensionale Räume zu verarbeiten und durch diese zu navigieren. Diese Fähigkeiten verleiht ihr einen Vorteil in Schlachten, bei der Vermessung von Planeten sowie bei der Verwaltung von Städten."
 trait_spatial_mastery_portrait_override_tt: "Oder eine beliebige Spezies, die die dreidimensionale Navigation beherrscht"
 trait_spare_organs: "Ersatzorgane"
 trait_spare_organs_desc: "Diese Spezies hat redundante Organe entwickelt, um selbst die schwersten Verletzungen zu überleben - eine äußerst erfolgreiche Anpassung, wie ihr Fortbestand beweist."
 trait_spare_organs_effect: "Anführer überleben ihren ersten Tod\n    - Bei Tod einer Angriffsarmee: §G20%§!-Chance, dass eine Ersatzarmee auftaucht\n    - Produktion (£job_livestock£ §Y$job_livestock$§!): §G+50%§!"
 mod_planet_livestock_produces_mult: "Produktion (£job_livestock£ §Y$job_livestock$§!)"
 trait_leader_second_chanced: "Zweite Chance"
 trait_leader_second_chanced_desc: "Dieser Anführer konnte den sicheren Tod aufgrund seiner Biologie überleben. Dies wird jedoch kein zweites Mal funktionieren."
 #################################
 #Evolutionary Predators Origin #
 #Written by Victor Haeggman  #
 #################################
 #Origin and Start of Game
 origin_evolutionary_predators: "Evolutionsräuber"
 origin_evolutionary_predators_desc: "§RWARNUNG: Blockiert alle Aufstiegspfade außer ['concept_mutation_ascension'].§!\n\nDiese Spezies hat seit jeher Jagd auf einzigartige Kreaturen gemacht, angeleitet von einem Instinkt, den sie selbst nicht vollständig begreift. Sie verfügt über die seltene Fähigkeit, die genetischen Merkmale ihrer Beute in ihre eigene Biologie aufzunehmen, und stieg so zum Spitzenprädator ihrer Heimatwelt auf, indem sie jeden verfügbaren genetischen Vorteil absorbierte. Jetzt führt sie ihr Hunger in die Weite des Alls."
 origin_tooltip_evolutionary_predators_effects: "- $SPECIES_TRAITS$ ['concept_malleable_genes']\n- Situation: ['concept_adaptive_evolution']\n- Heimatwelt: ['concept_genetic_soup']"
 START_SCREEN_EVOLUTIONARY_PREDATORS_BASE: "Die [GetSpeciesNamePlural] waren schon immer Jäger. Wir suchen Beute, wo immer wir sie finden, und können selbst den extremsten Bedingungen trotzen. Wenn man ist, was man isst, ist die Anstrengung nie umsonst.\n\n"
 START_SCREEN_EVOLUTIONARY_PREDATORS_REGULAR: "$START_SCREEN_EVOLUTIONARY_PREDATORS_BASE$Wir wussten schon immer, dass uns das Fleisch unserer Beute formt, und jede Jagd und jede erlegte Beute haben uns stärker gemacht.\n\nUnsere gewalttätige Vergangenheit ist keine Last, sondern das, was uns ausmacht. Dank der Möglichkeiten der modernen Wissenschaft müssen wir unsere Beute nicht länger verzehren, um uns weiterzuentwickeln. Etwas Genmaterial reicht aus, um ihre Kraft mit unserer eigenen zu verflechten.\n\nDer Hunger nach Evolution brennt noch immer in uns, und die Entdeckung des [GetStartingDrive]s erlaubt es uns, uns im All auf die Pirsch zu begeben, um alles, was die Galaxie zu bieten hat, in uns aufzunehmen."
 START_SCREEN_EVOLUTIONARY_PREDATORS_HIVE: "$START_SCREEN_EVOLUTIONARY_PREDATORS_BASE$Unsere gemeinsam geteilte Intelligenz hat das Potenzial unserer Genetik erfasst. Wir können die Essenz unserer Beute in uns aufnehmen, sie anpassen und ihre Stärken in unser Kollektiv integrieren.\n\nUnsere Raubtierinstinkte schlummern noch immer in uns, doch nun sind sie im Gleichgewicht und wir wissen um ihre Kontrolle. Wir müssen nicht länger auf die Jagd gehen, um uns weiterzuentwickeln. Unsere Labore können jedes beliebige Genmaterial synthetisieren und es mühelos in unserem Schwarm verteilen.\n\nMit der Entdeckung des [GetStartingDrive]s sind wir bereit, uns in der Galaxie auszubreiten und alles, was sie uns zu bieten hat, in uns aufzunehmen."
 START_SCREEN_EVOLUTIONARY_PREDATORS_DEVOURING_SWARM: "$START_SCREEN_EVOLUTIONARY_PREDATORS_BASE$Erst nachdem wir jede Lebensform auf [GetHomeWorldName] verschlungen hatten, erkannten wir unseren Fehler. Wir sollten wir fortan neue Anpassungen erlangen können? Wir blickten zu den Sternen.\n\nWir sind die ultimativen Räuber. Wo andere jagen, um zu überleben, jagen wir, um die Perfektion anzustreben.\n\nMit der Entdeckung des [GetStartingDrive]s sind wir bereit, uns erneut auf die Pirsch zu begeben. Die Galaxie ist riesig und voller Nahrung."
 #Traits
 trait_malleable_genes: "Formbare Gene"
 trait_malleable_genes_desc: "§LDiese Spezies hält sich nicht starr an identifizierbare Merkmale und Organe wie die meisten anderen. Stattdessen lässt sie das Anhängsel heranwachsen, was für die jeweils anstehende Aufgabe am besten geeignet ist. Diese Flexibilität führt jedoch zu einer gewissen Instabilität, die einige Nachteile mit sich bringt ...§!"
 trait_malleable_genes_cant_modify: "§RSpezies mit dieser Eigenschaft können nicht genetisch modifiziert werden§!\n$automodding_trait_tooltip_all$ §Y$trait_malleable_genes$§! wählt Modifikatoren aus der ['concept_automodding_malleable'] aus"
 CANNOT_MODIFY_MALLEABLE_GENES_SPECIES: "$TRIGGER_FAIL$Die instabile Genetik dieser Spezies verbietet die Genmanipulation."
 concept_malleable_genes: "$trait_malleable_genes$"
 concept_malleable_genes_desc: "$trait_malleable_genes_cant_modify$"
 concept_automodding_malleable: "Autom. Modifikatoreneigenschaftenliste für formbare Gene"
 concept_automodding_malleable_desc: "- ['trait:trait_malleable_minerals']\n- ['trait:trait_malleable_energy']\n- ['trait:trait_malleable_food']\n- ['trait:trait_malleable_research']\n- ['trait:trait_malleable_unity']\n- ['trait:trait_malleable_forge']\n- ['trait:trait_malleable_trade']\n- ['trait:trait_malleable_ameneties']"
 concept_adaptive_evolution: "Evolutionsanpassung"
 concept_adaptive_evolution_desc: "Die Situation schreitet voran, wenn die DNA anderer Lebensformen konsumiert wird.\n§GBei Abschluss:§!\n$t$- Auswahl einer neuen Spezieseigenschaft basierend auf der Spezies, die kürzlich konsumiert wurde\n§YSchreitet voran durch:§!\n$t$- Neue Planeten kolonisieren\n$t$- Andere Spezies als Viehbestand halten oder säubern\n$t$- Andere Spezies als Sklaven oder in einem besseren Status halten\n$t$- Anführer fremder Spezies im Rat beschäftigen\n$t$- Halten von biologischen Vasallen\n$t$- Schließen von Wirtschaftsabkommen als Megakonzern\n$t$- Kontakt zu fremden Spezies durch Ereignisse"
 concept_genetic_soup: "$genetic_soup$"
 concept_genetic_soup_desc: "$fresh_biosphere_tt$\n\n§L$genetic_soup_desc$§!"
 trait_malleable_minerals: "Formbare Klauen"
 trait_malleable_minerals_desc: "§LDiamantharte Klauen erleichtern die Mineralgewinnung.§!"
 trait_malleable_energy: "Formbare Isolatoren"
 trait_malleable_energy_desc: "§LEine dicke Isolierschicht, die vor Verletzungen bei Unfällen schützt, insbesondere in hochenergetischen Umgebungen.§!"
 trait_malleable_food: "Formbarer Pflug"
 trait_malleable_food_desc: "§LEin zusätzliches Anhängsel in Form einer gehärteten Schaufel, die die Bodenbearbeitung beschleunigt. Es lässt sich an verschiedene Geländearten anpassen und bietet stets das richtige Werkzeug für die jeweilige Aufgabe.§!"
 trait_malleable_research: "Formbarer Kortex"
 trait_malleable_research_desc: "§LAuch wenn ein voller Kortex etwas unangenehm sein kann, beschleunigt er die Lösungs- und Innovationsfindung deutlich.§!"
 trait_malleable_unity: "Formbare Sinnesorgane"
 trait_malleable_unity_desc: "§LVerbesserte Sinnesorgane sorgen für ein tieferes Verständnis und die Wertschätzung unterschiedlicher Perspektiven. Vor dem Gedeihen steht das Beobachten.§!"
 trait_malleable_forge: "Formbare Schwielen"
 trait_malleable_forge_desc: "§LBeim Umgang mit verbrühenden oder ätzenden Materialien können extradicke Schwielen von unschätzbarem Wert sein.§!"
 trait_malleable_trade: "Formbare Pheromone"
 trait_malleable_trade_desc: "§LAuf die jeweilige Situation abgestimmte Pheromone können besonders bei Verhandlungen unglaublich überzeugend sein.§!"
 trait_malleable_ameneties: "Formbare Flageoletten"
 trait_malleable_ameneties_desc: "§LEine Reihe kalibrierbarer Löcher erlaubt es dieser Spezies, durch einfache Bewegungen beruhigende und harmonische Töne zu erzeugen.§!"
 #Democratic Effects
 concept_genetic_electorate_effect: "Genelektoratseffekte"
 concept_genetic_electorate_effect_desc: "$trait_malleable_imperialist_effect$\n$trait_malleable_isolationist_effect$\n$trait_malleable_progressive_effect$\n$trait_malleable_prosperity_effect$\n$trait_malleable_supremacist_effect$\n$trait_malleable_technologist_effect$\n$trait_malleable_totalitarian_effect$\n$trait_malleable_traditionalist_effect$\n$trait_malleable_xenoist_effect$\n$trait_malleable_manifesti_effect$"
 trait_malleable_imperialist_effect: "Auswirkungen durch §Yvorherrschende Fraktion§! (Imperialistisch):\n$t$$mod_planet_jobs_alloys_produces_mult$: §G+10%§!"
 trait_malleable_isolationist_effect: "Auswirkungen durch §Yvorherrschende Fraktion§! (Isolationistisch):\n$t$$mod_planet_jobs_unity_produces_mult$: §G+10%§!"
 trait_malleable_progressive_effect: "Auswirkungen durch §Yvorherrschende Fraktion§! (Progressiv):\n$t$£happiness£ Zufriedenheit: §G+10%§!"
 trait_malleable_prosperity_effect: "Auswirkungen durch §Yvorherrschende Fraktion§! (Wohlständig):\n$t$$r_trade$ von £job£ Jobs: §G+20%§!"
 trait_malleable_supremacist_effect: "Auswirkungen durch §Yvorherrschende Fraktion§! (Vorherrschaftlich):\n$t$$mod_planet_jobs_specialist_produces_mult$: §G+5%§!\n$t$$mod_planet_jobs_ruler_produces_mult$: §G+5%§!"
 trait_malleable_technologist_effect: "Auswirkungen durch §Yvorherrschende Fraktion§! (Technologistisch):\n$t$£research£ Forschung durch £job£ Jobs: §G+10%§!"
 trait_malleable_totalitarian_effect: "Auswirkungen durch §Yvorherrschende Fraktion§! (Totalitär):\n$t$£pop_cat_worker£ $mod_pop_cat_worker_bonus_workforce_mult$: §G+15%§!"
 trait_malleable_traditionalist_effect: "Auswirkungen durch §Yvorherrschende Fraktion§! (Traditionalistisch):\n$t$£pop£ $MOD_POP_HOUSING_USAGE_ADD$: §G-0.5§!"
 trait_malleable_xenoist_effect: "Auswirkungen durch §Yvorherrschende Fraktion§! (Xenoistisch):\n$t$Bewohnbarkeit §G+15%§!"
 trait_malleable_manifesti_effect: "Auswirkungen durch §Yvorherrschende Fraktion§! (Manifestistisch):\n$t$£pop£ $MOD_POP_AMENITIES_USAGE_BASE$: §G-1§!"
 #Dictatorial Effects
 trait_ruler_apex_predator: "Spitzenprädator"
 trait_ruler_apex_predator_desc: "Dieser Anführer wird von der evolutionären Prädation angetrieben, die es nur dem Stärksten und Anpassungsfähigsten erlaubt, zu herrschen. Dieser Herrscher erntet die Genome besiegter Feinde und übernimmt deren Gerissenheit und Entschlossenheit, um der Perfektion mit jedem Schritt näher zu kommen."
 trait_ruler_apex_predator_tt: "Erhält zusätzliche ['concept_apex_predator_effects', Einblicke] durch ['concept_apex_predator_victories']."
 concept_apex_predator_effects: "Spitzenprädatoreinblicke"
 concept_apex_predator_effects_desc: "§YHumanoid§!: $mod_country_trade_produces_mult$ §G+5%§!\n§YSäugetier§!: $MOD_LOGISTIC_GROWTH_MULT$ §G+5%§!\n§YReptil§!: $MOD_SHIP_SHIELD_HARDENING_ADD$ §G+5%§!\n§YVogel§!: $MOD_SHIP_EVASION_ADD$ §G5%§!\n§YInsektoid§!: $MOD_SHIP_ARMOR_HARDENING_ADD$ §G+5%§!\n§YMolluskoid§!: $MOD_SHIP_SENSOR_RANGE_ADD$ §G+1§!\n§YFungoid§!: $mod_country_food_produces_mult$ §G+5%§!\n§YPlantoid§!: $mod_country_energy_produces_mult$ §G+5%§!\n§YLithoid§!: $mod_country_minerals_produces_mult$ §G+5%§!\n§YNekroid§!: $MOD_PLANET_CRIME_ADD$ §G-10§!\n§YAquat§!: $MOD_SHIP_HULL_ADD$ §G+100§!\n§YToxoid§!: $mod_country_exotic_gases_produces_mult$ §G+10%§!\n§YThermophil§!: $mod_country_alloys_produces_mult$ §G+5%§!\n§YMaschine§!: $mod_country_alloys_produces_mult$ §G+5%§!"
 concept_apex_predator_victories: "Spitzenprädatorsiege"
 concept_apex_predator_victories_desc: "Der Spitzenprädator wächst durch Folgendes:\n$t$Gewinnen von §YKriegen§!\n$t$§YUnterwerfung§! anderer\n$t$Dafür sorgen, dass Beschlüsse in der §YGalaktischen Gemeinschaft§! scheitern"
 APEX_PREDATOR_GAINED_TITLE: "Spitzenprädator"
 MESSAGE_APEX_PREDATOR_GAINED: "Unser Spitzenprädator $LEADER|Y$ hat die §Y[This.GetApexDefeatedSpecies]§! besiegt und ist weiter gewachsen"
 #Hive Effects
 EVOPRED_TERRAFORM_STARTED_TITLE: "Terraforming eingeleitet"
 MESSAGE_EVOPRED_TERRAFORM_STARTED: "Wir haben den Terraformingprozess eingeleitet, um $PLANET|Y$ in eine §YSchwarmwelt§! zu verwandeln."
 decision_evopred_no_hive_world: "Schwarmweltwachstum beschränken"
 decision_evopred_no_hive_world_desc: "Einige Welten müssen kein Teil unseres Kollektivs werden."
