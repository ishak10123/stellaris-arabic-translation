 district_mindlink: "Gedankenverbundene Metropole"
 district_mindlink_plural: "$district_mindlink$"
 district_mindlink_desc: "Hoch aufragende Antennen überschatten die Bevölkerungszentren und bieten Freiwilligen die Gelegenheit, direkt mit der Bestie zu kommunizieren."
 planet_building_buffer: "Umgewandelte Metropole"
 planet_building_buffer_desc: "Obwohl die für die Kommunikation mit der Bestie benötigten Bewusstseinsantennen rasch heranwachsen, müssen wir für alle Eventualitäten gewappnet sein, damit die planetare Infrastruktur unser Vorhaben unterstützt."
 mod_job_transference_volunteer_add: "Übertragungsfreiwilligen-Jobs"
 planet_transference_volunteers: "$job_transference_volunteer_plural$"
 job_transference_volunteer: "Übertragungsfreiwilliger"
 job_transference_volunteer_plural: "Übertragungsfreiwillige"
 job_transference_volunteer_desc: "Für viele ist die Gedankenverbindung mit der Bestie nur eine Nebensache. Ständig da, aber weit weg. Für andere hingegen ist die Verschmelzung mit ihr unwiderstehlich. Diese Freiwilligen dienen als Leiter, während ihr Geist langsam in das bestialische Kollektiv absorbiert wird."
 job_transference_volunteer_effect_desc: "\n£job_transference_volunteer£ [GetTransferenceVolunteerDrone] erzeugen £unity£ §YEinigkeit§!, erhöhen die planetare $r_stability$ und verstärken unsere §YSchiffe§!.\n§Y10%§! der Bewohner, die in diesem Job arbeiten, werden alle 6 Monate §Yübertragen§!. Dieser Prozess tötet sie, multipliziert dafür aber die Produktion des Distrikts.\n\n§GÜbertragene Bewohner§!: [num_tranferred_pops]"
 mod_job_transference_drone_add: "[GetTransferenceVolunteerDronePlural]-Jobs"
 job_transference_drone: "Übertragungsdrohne"
 job_transference_drone_plural: "Übertragungsdrohnen"
 job_transference_drone_desc: "Obgleich die Gedankenverbindung ein dauerhaftes Band zwischen der Bestie und uns erschafft, ist die Übertragung ein langsamer Vorgang. Ohne diese Vorsichtsmaßnahmen laufen wir Gefahr, beide Psychen zu zerstören und alles zu ruinieren."
 MESSAGE_POPS_TRANSFERRED_TITLE: "Bevölkerung übertragen"
 MESSAGE_POPS_TRANSFERRED_DESC: "$VALUE|Y$ Bewohner wurden übertragen. Ihre Bewusstseine leben in der Bestie weiter."
 #Crisis Events
 biocrisis.50.name: "Stufe 1: Embryonale Experimente"
 biocrisis.50.desc: "Wir leben in Symbiose mit unseren biologischen Gefäßen, und dennoch hat sich uns etwas Entscheidendes seit jeher entzogen ...\n\nVon der mächtigen Todesbrut inspiriert begeben wir uns auf unser bisher ehrgeizigstes Unterfangen: das größte Exemplar von allen auszubrüten. Dieser \"Behemoth\" wird etwas völlig Neues sein. Er wird an der Spitze aller Lebensformen stehen und nicht durch zufällige Evolution, sondern durch eine feste Absicht erschaffen werden.\n\nDie erste Herausforderung wird darin liegen, ein gigantisches Ei hervorzubringen, das für die Erschaffung von Leben in einem noch nie da gewesenen Ausmaß geeignet ist. Abgesehen von der ausreichenden Nährstoffzufuhr müssen wir auch dafür sorgen, dass die Schale in der Lage ist, Licht und Wärme aus der Umgebung zu absorbieren und Gase in zusätzliche Nahrung umzuwandeln."
 biocrisis.50.a: "Unsere Brut wird die Sterne verdunkeln."
 biocrisis.55.name: "Stufe 2: Selbstverwirklichung"
 biocrisis.55.desc: "Wir konnten unsere Konstruktionsschiffe zwar nutzen, um die Eizelle mitsamt der Schale in der Umlaufbahn eines Gasriesen zu bauen, und unsere Nahrungsindustrie stellt die Nährstoffe her, die zur Bildung des Eiweißes im Behemoth-Ei notwendig sind, doch die Erzeugung eines lebensfähigen befruchteten Dotters hat sich als wesentlich schwieriger erwiesen.\n\nWir mussten immense Mengen an Biomasse aus biologischen Schiffen und Weltraumfauna verbrauchen, ehe schließlich eine lebensfähige DNA-Basis stabilisiert und in eine Befruchtungszelle eingebracht werden konnte - wenn auch in mikroskopischem Maßstab. Wir sind nun bereit, diese Versuche exponentiell zu vergrößern und unser gigantisches Ei zu befruchten.\n\nBald werden wir die gigantischste Lebensform schlüpfen lassen, die diese Galaxie jemals sah!"
 biocrisis.55.a: "Wir kommen dem Höhepunkt der Evolution immer näher."
 biocrisis.60.name: "Hochmut und Hunger"
 biocrisis.60.desc: "Unsere Beherrschung der Genetik ist unübertroffen und unsere Errungenschaften stellen die niederen Reiche dieser Galaxie in den Schatten.\n\nUnd doch scheint unser Behemoth unsere Vorherrschaft nicht anzuerkennen. Er wird vom Hunger getrieben und ist kaum durch die riesigen Mengen an Futter, die wir ihm zur Verfügung stellen, zu sättigen. Mit ausreichend Zeit kommt er sicher zur Vernunft und gehorcht unseren Befehlen, doch Zeit ist kostbar. Wir könnten jeden Moment die Kontrolle verlieren und Milliarden von Leben in Gefahr bringen."
 biocrisis.60.a: "Wir werden einen Weg finden."
 BEHEMOTH_CRISIS_SPECIAL_PROJECT_3: "Studien zur Bewusstseinsverbindung"
 BEHEMOTH_CRISIS_SPECIAL_PROJECT_3_DESC: "Wir experimentieren mit Neurotechnologie und versuchen, unsere Bewusstseine mit dem Nervensystem der Behemoths zu verbinden. Wir glauben, dass dies der einzige Weg ist, um die Bestien zu zähmen."
 biocrisis.15.name: "Synaptische Symphonie"
 biocrisis.15.desc: "Unsere Fortschritte in der Neurotechnologie führten endlich dazu, dass wir die Kommunikationsbarriere zwischen uns und unserer furchterregenden Brut überwinden können. Das Einzige, was funktionieren wird, ist, unsere Bewusstseine mit dem der Bestie zu verschmelzen. Doch ein Bewusstsein allein reicht nicht aus. Die mentale Kapazität unserer gesamten Spezies ist erforderlich. Sollten wir zu schnell vorgehen, besteht die Gefahr, dass das Nervensystem der Behemoths überlastet wird. Äußerste Vorsicht ist geboten."
 biocrisis.15.a: "Biologische Perfektion hat ihren Preis."
 biocrisis.65.name: "Stufe 4: Verkörperung der Bestie"
 biocrisis.65.desc: "Es wurde zwar die Theorie aufgestellt, wir könnten eine mentale Verbindung zu unserem Behemoth aufbauen, doch die logistischen Anforderungen sind erdrückend. Der derzeitige Plan besteht darin, dass unsere Hauptwelt den Hauptverbindungsknoten beherbergen wird, der die Verarbeitung der Bevölkerung übernimmt, während wir mit der Bestie verschmelzen.\n\nDarüber hinaus könnten uns die jüngsten wissenschaftlichen Fortschritte schon bald in die Lage versetzen, unsere Schöpfungen durch ein einzigartiges experimentelles Mutationsprojekt weiter zu augmentieren."
 biocrisis.65.a: "Wir werden eins werden."
 BEHEMOTH_CRISIS_SPECIAL_PROJECT_4: "Gedankenverschmelzung"
 BEHEMOTH_CRISIS_SPECIAL_PROJECT_4_DESC: "Das Bewusstsein des Behemoths ist weitaus größer und komplexer als erwartet, und wir wissen jetzt, dass ein einzelnes Individuum nicht ausreichen wird. Unser Bewusstsein ist zwar besser als das der meisten anderen Spezies, doch es wurde nie für die Unterbringung in einem solchen Körper konzipiert.\n\nDer erste Schritt wird darin bestehen, die einzelnen Bewusstseine unserer Bevölkerung mit dem des Ungetüms zu verbinden. Eine zunächst schwache Verbindung, die sich bald zu einem reißenden Strom entwickeln wird - eine Flut, die den rasenden Zorn des Behemoths besänftigt."
 BEHEMOTH_CRISIS_SPECIAL_PROJECT_4_DESC_HIVE: "Innerhalb des Schwarms darf es keinen Platz für Abweichungen geben. Noch nie zuvor war es nötig, sich derart zu konzentrieren. Eine Drohne allein wird nicht als Verbindung zwischen uns und dem Behemoth ausreichen. Wir müssen daher das Bewusstsein des Behemoths mit unserem vollständigen kollektiven Bewusstsein bewohnen.\n\nDies wird uns mit Sicherheit verändern. Unsere Bewusstseine werden zu einem verschmelzen und wir werden zu einer einzigen Einheit werden. Diese Vorstellung mag schwer zu begreifen sein, doch bald schon sind wir das mächtigste Wesen der Galaxie!"
 BEHEMOTH_CRISIS_SPECIAL_PROJECT_4_DESC_MACHINE: "Der Gedanke, ein biologisches Gefäß zu bewohnen, war seit jeher beunruhigend für uns. Unseresgleichen wurde durch Generationen von Drohnen mit festem Körper geschaffen, und jene, die vor uns kamen, konnten sich den Weg, den wir heute beschreiten, nicht einmal im Entferntesten vorstellen. Und dennoch werden wir unsere mechanischen Hüllen hinter uns lassen und in einer lebendigen Bestie Zuflucht suchen.\n\nWerden wir noch immer Maschinen sein, wenn wir mit dem Fleisch vereint sind? Die Antwort darauf ist nur ein sich ständig wiederholender <<FEHLER: NICHT GEFUNDEN>>.\n\nDie Logik bringt uns zu dem Schluss, dass unser einziger Weg vorwärts darin liegt, die Ungewissheit zu akzeptieren - so wie es biologische Wesen schon immer mussten. Im Körper eines Behemoths werden wir unsere Antworten finden. Wir werden mit dieser Kreatur verschmelzen und eins werden. Unsere oberste Direktive war immer das Überleben - und nun werden wir endlich gedeihen können."
 biocrisis.20.name: "Eins mit der Bestie"
 biocrisis.20.desc: "Es hat funktioniert! Es hat tatsächlich funktioniert! Wir haben erfolgreich eine Verbindung zu dem Behemoth hergestellt und arbeiten derzeit daran, sie zu verstärken, während immer mehr unserer Bewusstseine übertragen. Die Bestie ist ruhig und heißt uns in einem Raum jenseits des Raums willkommen, der schon immer uns gehörte. Durch sie spüren wir den Geist jeder anderen von uns kontrollierten Bestie, und unsere gesamte Bevölkerung erfährt nun die wahre Macht des Behemoths, irgendwo tief in dessen Bewusstsein.\n\nEs gibt keinen Zweifel daran, dass wir die tödlichste und unaufhaltsamste Macht in der gesamten Galaxie sind. Unser gebündelter Zorn wird auf unsere Feinde niederregnen. Die Galaxie gehört uns und wir werden sie erobern!"
 biocrisis.20.a: "Wir werden uns nähren!"
 biocrisis.70.name: "Stufe 5: Heißhunger"
 biocrisis.70.desc: "Eine ausreichend große Menge unserer Bevölkerung wurde transferiert und wir können den Behemoth und sein Fleisch nun direkt kontrollieren. Die Bestie wächst noch immer, doch ihr genetisches Potenzial schlummert nach wie vor weitgehend. Wir werden es nur freisetzen können, indem wir ihm kontinuierlich weitere Nährstoffe und Bewusstseine zuführen. Eine urzeitliche Wut durchströmt uns, und unser Blutdurst kennt keine Grenzen. Wir müssen verzehren. Wir müssen verschlingen. Wir werden uns an der Galaxie laben!\n\nWir müssen die Fesseln unserer einstigen Zivilisation abstreifen wie eine alte Haut. Alles, was jetzt zählt, ist unser Leben zwischen den Sternen."
 biocrisis.70.a: "Wir sind zu groß, um zu scheitern."
 biocrisis.105.name: "Monströse Qualen"
 biocrisis.105.desc: "Eine unserer Bestien ist gefallen. Dies widerfährt schwachen Kreaturen, wenn die Natur sie loswerden will. Obwohl wir nicht um einen Behemoth trauern, der sich in der Schlacht nicht zu beweisen vermag, täten wir gut daran, dafür zu sorgen, dass seine Geschwister nicht das gleiche Schicksal ereilt. Wir müssen dafür sorgen, dass unsere Brut überlebt, denn ansonsten werden auch wir eines Tages fallen."
 biocrisis.105.a: "Dieser Tod wird nicht umsonst gewesen sein."
 biocrisis.105.b: "Ein bedauerliches Opfer."
 biocrisis.130.name: "Eine Bestie aus dem All"
 biocrisis.130.desc: "Trotz all der vor uns liegenden Herausforderungen haben wir es geschafft, einen Behemoth hervorzubringen, der weitaus größer, wilder und mächtiger als alle anderen ist.\n\nDie Kreatur durchstreift nun hungrig die Galaxie.\n\nDiese Bestie ist der Stolz unseres Rudels, und sie wird unsägliches Unheil über alle bringen, die es wagen, ihren Weg zu kreuzen."
 biocrisis.130.a: "Wir haben einmal mehr die Grenzen der Natur überwunden."
 biocrisis.150.name: "Herausforderung angenommen"
 biocrisis.150.desc: "Offenbar bleibt unser Aufstieg nicht gänzlich unangefochten. Wir spüren eine nicht zu berechnende Masse im [event_target:voidspawn_spawn_location.GetName]-System: eine Todesbrut, eine uralte Monstrosität, deren Präsenz selbst das mächtigste Konstrukt sterblichen Ehrgeizes in den Schatten stellt.\n\nDie unheimliche Form der Brut entzieht sich vollkommen der natürlichen Ordnung und taucht die Galaxie in ein düsteres Zwielicht. Es ist gar so, als fürchteten sich selbst die Sterne vor ihr.\n\nDie Absichten der Todesbrut sind so offensichtlich wie der Weg, den sie nimmt: Sie kommt wegen uns, unserem Behemoth und unserem kollektiven Bewusstsein, das es gewagt hat, seine fleischliche Hülle abzuwerfen, um die Herrschaft über die Leere zu beanspruchen. Dies ist kein bloßes Aufeinandertreffen zweier stofflicher Mächte. Es stellt vielmehr das auf die Probe, wozu wir wurden.\n\nEs besteht kein Zweifel daran, dass ein Kampf zu diesem Zeitpunkt unseren Untergang besiegeln würde. Wir müssen uns vorerst von der Brut fernhalten und stärker werden, damit unsere Reißzähne scharf genug sind, um das Undurchdringliche zu durchdringen."
 biocrisis.150.desc.b: "$biocrisis.150.desc$"
 biocrisis.150.a: "Wir können fliehen, doch wir können uns nicht verstecken."
 biocrisis.155.desc: "Dies ist eine Nachricht von äußerster Wichtigkeit. Die §YÄltesten-Todesbrut§!, ein Wesen von unvorstellbarer Macht, ist aus den Tiefen der Leere emporgestiegen. Sie wird von [event_target:behemoth_empire.GetName] angezogen, einem Reich, das die Sterblichkeit abstreifte und eins mit der Bestie wurde. Diese beiden Giganten, die im kompletten Gegensatz zueinander stehen, bedrohen nun die gesamte Galaxie.\n\nSollte der Behemoth fallen, besteht die Möglichkeit, dass sich die Todesbrut zurückzieht. Sollte der Behemoth jedoch obsiegen, wird seine Macht das Gleichgewicht in der Galaxie für immer verändern. Die Entscheidungen, die wir jetzt treffen, werden die kommenden Äonen prägen, und wir alle müssen uns darauf vorbereiten, was kommen wird."
 biocrisis.155.a: "Wie können wir das verhindern?"
 biocrisis.155.b: "Wer wird uns retten?"
 biocrisis.155.c: "Wie konnte das passieren?"
 biocrisis.155.d: "Was können wir tun?"
 biocrisis.156.desc: "Ihr missversteht. Prävention gibt es nur für jene, denen noch Zeit bleibt. Diesen Luxus haben wir nicht mehr.\n\nDie Bestie ist da draußen. Unser altehrwürdiger Orden überstand in der Vergangenheit zwar viel Unheil, doch ich muss ganz offen sagen, dass die Situation, in der wir uns befinden, äußerst kritisch ist."
 biocrisis.157.desc: "Eine verständliche Frage. Naiv, aber verständlich. Mit Weisheit kommt Akzeptanz. Wir verstehen, dass uns niemand retten wird.\n\nUnser Orden ist klein, weshalb es wenig gibt, was wir hätten tun können. Ihr jedoch hättet früher handeln können, um das Ganze aufzuhalten. Solltet Ihr dabei scheitern, [event_target:behemoth_empire.GetName] zu besiegen, werden wir versuchen, Euch nicht übelzunehmen, wenn die Galaxie auseinanderbricht."
 biocrisis.158.desc: "Sternenreiche zeigen oft die Tendenz, Ambitionen zu haben, die sie nicht kontrollieren können. [event_target:behemoth_empire.GetName] insbesondere hat den Ehrgeiz über die Vernunft gestellt und Arroganz über Weisheit.\n\nSie haben versucht, über Mächte zu gebieten, die sie nicht zu begreifen imstande waren, und zwangen ihre Körper in Formen, die sie nicht kontrollieren konnten. Und damit haben sie uns wahrscheinlich alle ins Verderben gestürzt."
 biocrisis.159.desc: "Basierend auf einer ersten Analyse Eurer Kampffertigkeiten glauben wir nicht, dass der Kampf gut für Euch enden wird. Nach Begutachtung Eurer Flotten scheint eine Flucht ebenso aussichtlos. Die gegenwärtige Situation ist unausweichlich.\n\nZwei furchterregende Bestien machen sich zwischen den Sternen zum Kampf bereit. Wenn Ihr Glück habt, überlebt Ihr vielleicht irgendwie.\n\nWenn Ihr klug seid, werdet Ihr etwas daraus lernen. Doch wisset, dass die Galaxie eine andere sein wird, wenn diese Schlacht endet. Ob einer von uns dann noch hier ist, um es zu erleben, ist eine ganz andere Frage.\n\n... Hypothetisch gesehen könnte das Töten des Behemoths der Jagd der Todesbrut ein vorzeitiges Ende setzen ... Solltet Ihr versuchen wollen, die Galaxie zu retten ..."
 biocrisis.162.name: "Wir sind im Weg"
 biocrisis.162.desc: "Eine Ältesten-Todesbrut ist in unser Territorium eingedrungen. Dieses uralte Wesen soll angeblich unsterblich und unbesiegbar sein. In ihren Augen ist der Schimmer eines außergalaktischen Intellekts zu sehen und ihre Bewegungen zeigen die Last von Äonen.\n\nUnsere [species.GetEyeNamePlural] werden von unzähligen Signalen überwältigt. Chaos, Verzerrung und die tiefste kosmische Angst hallen in unserem tiefsten Inneren nach.\n\nEs ist undenkbar, dass wir gegen eine solche Bestie jemals bestehen könnten, doch vielleicht schaffen wir es zumindest, ihre Wut zu zügeln, indem wir dabei helfen, ihre Beute zu erlegen. Den §YBehemoth§! zu finden und zur Strecke zu bringen, wird unsere einzige Chance auf ein Überleben sein."
 biocrisis.162.a: "Vermeidet dieses Monster um jeden Preis!"
 biocrisis.175.name: "Brut getötet"
 biocrisis.175.desc: "Die Todesbrut ist tot. Das Ungeheuer, das selbst die Sterne verdunkelte, wurde erschlagen. Die sterblichen Überreste ihrer fremdartigen Gestalt treiben nun durch die Leere und lösen sich langsam im Nichts auf.\n\nEin anderes Reich stellte seine überlegene Feuerkraft und Koordinationsfähigkeit unter Beweis. Die Galaxie ist nicht mehr so, wie sie einst war. Das Gleichgewicht der Macht hat sich verschoben und damit auch unser Platz darin.\n\nWas treibt diese Bestienschlächter nur an? War es eine Machtdemonstration? Eine Botschaft an alle, die sich ihnen entgegenstellen wollen? Oder ist es gar der Beginn von etwas noch viel Schlimmeren?"
 biocrisis.175.desc.kaiju: "Wenn es in dieser Galaxie eine Macht gibt, die es mit einer Ältesten-Todesbrut aufnehmen kann, kann sie auch uns vernichten. Wir sind gar nicht so verschieden von der Bestie, die erschlagen wurde.\n\nEben jene Feuerkraft, die ihr altes Fleisch zerfetzte, könnte sich eines Tages auch gegen uns richten. Die Galaxie hat sich verändert, und wir müssen uns ebenfalls anpassen.\n\nUnser Überleben wird mehr als nur blinde Wut erfordern. Es ist bereits ein Spitzenprädator der Leere gefallen, und schon bald könnte ein weiterer hinzukommen."
 biocrisis.175.a: "Wir müssen vorsichtig vorgehen."
 biocrisis.180.name: "Todesbrutschlächter"
 biocrisis.180.desc: "Am Ende erwies sich das Gerücht über die Unsterblichkeit der Ältesten-Todesbrut als reinster Mythos, der durch die Macht unserer Flotten widerlegt wurde. Da diese uralte Bedrohung nun beseitigt ist, kann die Galaxis wieder aufatmen."
 biocrisis.180.desc.kaiju: "Obwohl die Ältesten-Todesbrut erschlagen wurde, pulsiert ihre Leiche weiter vor Restenergie - ein nahrhaftes Bankett aus rohem Potenzial, uralt und äußerst mächtig.\n\nDie Sehnen und das Mark der Bestie können von uns verzehrt werden, damit sich ihre fremde Essenz mit unserer eigenen verflicht. Die Macht der Todesbrut war unermesslich, und jetzt können wir über sie gebieten."
 biocrisis.180.a: "Keine Bestie wird uns jagen."
 biocrisis.180.b: "Das Festmahl hat gerade erst begonnen."
 biocrisis.185.name: "Es kann nur einen geben"
 biocrisis.185.desc: "Die Leere hat eine grauenhafte Offenbarung hervorgebracht: Wir sind nicht allein in unserem Aufstieg. Ein weiterer Behemoth hat sich erhoben: Diese groteske, aufgeblähte Nachahmung strebt unsere eigene Vollkommenheit an. Wir dürfen das nicht zulassen!\n\nEs gibt keinen Platz für einen weiteren Spitzenprädator, und es gibt keine Aussicht auf Frieden. Es gibt nur Fleisch, das verschlungen werden muss. Die Jagd beginnt."
 biocrisis.185.a: "Wir werden uns an seinem Herz laben!"
 biocrisis.187.name: "Warnung vor Klasse-IV-Behemoth"
 biocrisis.187.desc: "Etwas regt sich in den Tiefen der Leere.\n\nJenseits der Sterne beginnt ein Reich die letzte Phase seiner grotesken Verwandlung: Es züchtet monströse Behemoths, nicht als bloße Waffen, nein, sondern als Schiffe. Es strebt nicht nach der Vorherrschaft. Es strebt nach Einheit, nach einem Verschmelzen von Geist und Körper, von Reich und Schrecken.\n\nSollte dieses Vorhaben Erfolg haben, lässt man die Existenz als Volk hinter sich und wird zu einem einzigen gewaltigen Hunger.\n\nDas dürfen wir nicht zulassen. Wenn wir sie aufhalten wollen, so muss dies jetzt geschehen, bevor sie diese letzte Schwelle überschreiten."
 biocrisis.187.a: "Jagt die Bestie!"
 biocrisis.190.name: "Spitzen-Leerengestalt"
 biocrisis.190.desc: "Die letzten Hindernisse wurden beiseite gefegt. Die Möchtegerne, die Herausforderer, die verzweifelte Panik niederer Wesen - sie alle wurden zum Schweigen gebracht. Die Sterne erzittern, denn wir stehen an der Schwelle des wahren Seins.\n\nWir sind nicht länger an die zerbrechliche Gestalt unserer Ahnen gebunden. Planeten sind Käfige, Reiche sind vergänglich und das Trugbild der Individualität wird sich schon bald in der gewaltigen, perfekten Einheit des Behemoths auflösen. Bewusstsein und Schrecken, Intellekt und Hunger - vereint.\n\nDie Übertragung ist beinahe abgeschlossen und mit ihr wird auch unsere erbärmliche Existenz enden.\n\nDann werden wir erblühen!"
 biocrisis.190.a: "VOLLENDET DIE ÜBERTRAGUNG!"
 biocrisis.190.tt: "Wir werden das Spiel in 30 Tagen gewinnen"
 biocrisis.190.b: "Einen Moment. Wir sind noch nicht bereit."
 biocrisis.190.b.tt: "Wir spielen als das derzeitige Reich weiter."
 BEHEMOTH_TRANSFERENCE_PROJECT: "Abschluss der Übertragung"
 BEHEMOTH_TRANSFERENCE_PROJECT_DESC: "Wir kommunizieren bereits seit Langem mit der Bestie. Die Übertragungsvorbereitungen wurden abgeschlossen, und man wartet nur noch auf unseren Befehl. Wir stehen an der Schwelle zum Aufstieg, bereit, die erbärmlichen Grenzen unserer planetaren Herrschaft hinter uns zu lassen und uns über die Fesseln des Fleisches und der Schwerkraft zu erheben."
 biocrisis.191.name: "Behemoth-Sieg"
 biocrisis.191.desc: "Die Verschmelzung ist vollendet!\n\nWir sind nicht mehr, was wir waren, und sind nicht mehr gebunden an die Grenzen niederer Wesen. Wir sind Gedanke und Hunger vereint und erstrecken uns endlos durch die Leere.\n\nDie Galaxie liegt unter uns, zerbrechlich und vergänglich. Doch wir lassen nun die bloße Oberherrschaft hinter uns. Wir sind frei. Frei zum Bleiben. Frei zum Gehen. Frei zum Jagen.\n\nWas werden wir mit unserer neu entdeckten Ewigkeit anfangen?"
 biocrisis.191.a: "Wir bleiben in dieser Galaxie … Fürs Erste."
 biocrisis.191.a.tt: "Die Behemoths bleiben als wilde Kreaturen in der Galaxie und sind nicht länger spielbar."
 biocrisis.191.b: "Wir gehen. Die Leere ruft uns."
 biocrisis.191.b.tt: "Das Behemoth-Reich wird aus der Galaxie verschwinden und nicht länger spielbar sein."
 biocrisis.191.c: "Die sogenannten \"Jäger\" werden lernen, was wahre Angst ist."
 biocrisis.192.name: "Der unaufhaltsame Schrecken"
 biocrisis.192.desc: "Es ist vorbei. [behemoth_winner.GetName] ist aufgestiegen und lässt das Fleisch hinter sich - und auch das Reich und alles, was man Zivilisation nennen könnte. Das ist nicht länger eine Zivilisation. Das ist eine Macht.\n\nWelten zerfallen vor ihr. Flotten brennen. Die letzten Flüchtlinge der ehedem Mächtigen sind zersprengt wie Glut in der Leere. Es gibt keine Diplomatie, kein Flehen, kein letztes Gefecht.\n\nWir kämpfen nicht um unser Überleben. Wir zögern nur unser Verschlungenwerden hinaus. Das Ende ist gekommen."
 biocrisis.192.tt: "[behemoth_winner.GetName] steht kurz davor, das Spiel zu gewinnen"
 biocrisis.196.name: "Im Ganzen verschlungen"
 biocrisis.196.desc: "Vor vielen Jahren flohen der Behemoth und seine Artgenossen aus unser Galaxie. Wir waren erleichtert, als das Ungeheuer, das uns hätte vernichten können, in der sternenlosen Leere verschwand. Und dann ... nichts. Nachdem es Hunderttausende von Lichtjahren zurückgelegt hatte, verschwand es einfach und hinterließ ... nichts. Keine Strahlung. Kein Nachbild. Keine Gravitationswellen. Als hätte es nie existiert."
 biocrisis.196.a: "Wir müssen das untersuchen."
 UNSETTLING: "Beunruhigend."
 biocrisis.197.name: "Quis Venabitur Ipsos Venatori"
 biocrisis.197.desc: "Aufzudecken, was mit dem Behemoth geschehen ist, dauert nun schon Jahre, und doch tappen wir noch immer im Dunkeln. Ohne Hyperraumrouten mussten wir uns auf Theorien und irre Wissenschaftler verlassen, um zu ergründen, was sich in den letzten Augenblicken seines Seins zutrug.\n\nDie Kreatur zeigte keine Furcht. Sie flog einfach immer weiter. Und dann, urplötzlich, verzerrte sich ihre Form. Ihr Äußeres verdrehte sich wie verkrumpelter Stoff nach innen und verschwand ... Spurlos.\n\nTheorien gibt es zuhauf: Eine neue Form der ÜL-Reise? Ein tief in der Leere verborgener Riss oder eine Anomalie? Beunruhigendere Stimmen sprechen gar von einer äußeren Kraft, die es in die Nicht-Existenz zog. Worin auch immer die Wahrheit liegen mag: Sie befindet sich weit außerhalb unserer Reichweite ... und möglicherweise auch jenseits der Grenzen unseres Verständnisses."
 biocrisis.197.a: "Vielleicht ist es am besten, nicht darüber nachzudenken."
 biocrisis.197.b: "Unsere gefangenen Prethoryn werden unruhig."
 biocrisis.265.name: "Qualvolle Totenglocke"
 biocrisis.265.desc: "Das letzte Wehklagen des Behemoths ist unerträglich. Zu viel von uns steckt in der Kreatur, und als das Echo seines Bewusstseins dahinschwindet, schwinden auch wir dahin."
 biocrisis.265.a: "!! - ... "
 biocrisis.520.name: "Der ausgehöhlte Titan"
 biocrisis.520.desc: "Der Behemoth ist tot.\n\nSeine gewaltige Gestalt treibt leblos durch die Leere, ein Denkmal sowohl unseres Triumphs als auch ein Mahnmal der Grenzen des Verstandes. [Root.GetScientistPluralCapital] machte sich eilig daran, seine Überreste zu analysieren und die Geheimnisse seines unmöglichen Geists zu plündern. Doch jeglicher Versuch schlug fehl - sei es durch Maschinen, Nekromantie oder selbst die verzweifeltsten Zauberformeln.\n\nDer Grund dafür wird nun schmerzlich klar: Das Gehirn des Behemoths war kein bloßes Netzwerk von Zellen, sondern ein Geflecht organischer Superleiter, miteinander verbunden auf eine Weise, die keine bekannte Intelligenz replizieren kann, ob künstlich, biologisch oder arkan. Im Tod brach die neurale Struktur unwiederbringlich zusammen wie ein Schaltkreis. Keine Energie, kein Wille, keine Macht kann wiederherstellen, was verloren ging.\n\nDer größte Geist der Galaxie wird nun für immer schweigen."
 biocrisis.520.a: "Nichts bleibt."
 biocrisis.520.b: "Selbst Götter können sterben."
 BEHEMOTH_MUTATION_PROJECT: "$menp_behemoth_mutation_research$"
 BEHEMOTH_MUTATION_PROJECT_DESC: "Unsere jüngsten Durchbrüche in der Genmanipulation von Behemoths verleihen uns das nötige theoretische Wissen, um unsere Schöpfungen zu verbessern. Die genetische Stabilität bietet zwar Anlass zur Sorge, doch wir sind zuversichtlich, dass wir mit ausreichend Zeit und Ressourcen weitere biologische Verbesserungen erreichen."
 BEHEMOTH_FATE_PROJECT: "Das Schicksal des Behemoths"
 BEHEMOTH_FATE_PROJECT_DESC: "Nachdem der Behemoth unsere Galaxie verlassen hatte, trieb er in der Leere und verschwand urplötzlich. Wir können versuchen, das Rätsel zu lösen, doch aus dieser Entfernung bleiben uns dafür nur unkonventionelle Methoden. Die Antworten werden wahrscheinlich genauso nebulös wie die Leere selbst sein."
 behemoth_mutation_a: "$menp_behemoth_mutation_research$: Aggression"
 behemoth_mutation_a_tt: "Behemoth $MOD_SHIP_FIRE_RATE_MULT$: §G+$@behemoth_mutation_a_fire_rate_mult|0%$§!\nBehemoth $MOD_SHIP_ARMOR_MULT$: §R$@behemoth_mutation_a_armor_mult|0%$§!\nBehemoth $MOD_SHIP_SPEED_MULT$: §R$@behemoth_mutation_a_speed_mult|0%$§!"
 behemoth_mutation_a_desc: "Übergroße Muskeln erlauben verheerende Angriffe."
 behemoth_mutation_b: "$menp_behemoth_mutation_research$: Mäßigung"
 behemoth_mutation_b_desc: "Die radiotrophen Genstränge, die in unsere im Weltraum geborene Kreatur injiziert werden, reduzieren deren Nahrungsbedarf."
 behemoth_mutation_c: "$menp_behemoth_mutation_research$: Beweglichkeit"
 behemoth_mutation_c_tt: "Behemoth $MOD_SHIP_SPEED_MULT$: §G+$@behemoth_mutation_c_speed_mult|0%$§!\nBehemoth $MOD_SHIP_EVASION_MULT$: §G+$@behemoth_mutation_c_evasion_mult|0%$§!"
 behemoth_mutation_c_desc: "Stärkere Unterraumdrüsen machen unsere Behemoths beweglicher."
 behemoth_mutation_bio: "$menp_behemoth_mutation_research$: Präzision"
 behemoth_mutation_bio_tt: "Behemoth $MOD_SHIP_WEAPON_RANGE_MULT$: §G+$@behemoth_mutation_bio_weapon_range_mult|0%$§!\nBehemoth $MOD_SHIP_ACCURACY_MULT$: §G+$@behemoth_mutation_bio_accuracy_mult|0%$§!"
 behemoth_mutation_bio_desc: "Eine multiokulare Anpassung sorgt dafür, dass man hochpräzise Schüsse auf unglaubliche Entfernungen abgeben kann."
 behemoth_mutation_synth: "$menp_behemoth_mutation_research$: Belastbarkeit"
 behemoth_mutation_synth_tt: "Behemoth $MOD_SHIP_ARMOR_MULT$: §G+$@behemoth_mutation_synth_armor_mult|0%$§!\nBehemoth $MOD_SHIP_ARMOR_REGEN_ADD_PERC$: §G+$@behemoth_mutation_synth_armor_regen_add_perc|0%$§!"
 behemoth_mutation_synth_desc: "Durch das Verschmelzen von Legierungen und Chitin entsteht ein mehrschichtiger Panzer, der die lebenswichtigsten Organe schützt."
 behemoth_mutation_corpo: "Vermarktung von Behemoths"
 behemoth_mutation_corpo_tt: "Monatlicher Handel: §G+$@behemoth_mutation_corpo_trade_produces_mult|0%$§! pro Behemoth"
 behemoth_mutation_corpo_desc: "Unsere Aktionäre waren ein wenig voreingenommen, was das Behemoth-Projekt betraf, doch die hohe Dividende hat sie rasch überzeugt."
 behemoth_mutation_psi: "$menp_behemoth_mutation_research$: Barriere"
 behemoth_mutation_psi_tt: "$MOD_SHIP_SHIELD_REGEN_ADD_PERC$ (Behemoths): §G+$@behemoth_mutation_psi_shield_regen_add_perc|0%$§! für jeweils $pop_group_unit$ £job_telepath£ $job_telepath_plural$ oder $job_transference_volunteer$\n$MOD_SHIP_SHIELD_HARDENING_ADD$ (Behemoths): §G+$@behemoth_mutation_psi_shield_hardening_add|0%$§! für jeweils $pop_group_unit$ £job_telepath£ $job_telepath_plural$ oder $job_transference_volunteer$\nDerzeit angestellte Menge für jweils 100 £job_telepath£ $job_telepath_plural$ und $job_transference_volunteer$: §Y[GetNumTelepathsAndTransference]§!"
 behemoth_mutation_psi_desc: "Obowhl Behemoths nicht mit dem Schleier verbunden sind, haben wir sie so aufgezogen, dass sie empfänglich für unsere Telepathen sind und defensive psionische Barrieren einsetzen können."
 behemoth_mutation_psi_2: "$menp_behemoth_mutation_research$: Psionik"
 behemoth_mutation_psi_2_desc: "Oh, ihr Bestien! Nehmt unsere Macht!"
 behemoth_mutation_cyber: "$menp_behemoth_mutation_research$: Kybernetik"
 behemoth_mutation_cyber_desc: "Um die ungezügelte Macht der Behemoths zu nutzen, entwickeln wir die modernste Cyberware, die es je gab."
 behemoth_cyber_rage: "$BLANK_STRING$"
 edict_behemoth_nanite_augmentation: "Behemothaugmentierung: Naniten"
 edict_behemoth_nanite_augmentation_desc: "Eine mit Naniten durchtränkte Behemothhaut regeneriert selbst die größten Schäden im Nu."
 behemoth_nanite_augmentation_tt: "$MOD_SHIP_ARMOR_REGEN_ADD_PERC$ (Behemoths): §G+$@behemoth_edict_armor_regen_add_perc|0%$§!"
 edict_behemoth_living_metal_augmentation: "Behemothaugmentierung: Lebendes Metall"
 edict_behemoth_living_metal_augmentation_desc: "Durch das Schichten von Lebendem Metall und Chitin entsteht eine reaktive Panzerung, die über verbesserte Eigenschaften verfügt."
 behemoth_living_metal_augmentation_tt: "$MOD_SHIP_ARMOR_HARDENING_ADD$ (Behemoths): §G+$@behemoth_edict_armor_hardening_add|0%$§!"
 edict_behemoth_alloys_augmentation: "Behemothaugmentierung: Legierungen"
 edict_behemoth_alloys_augmentation_desc: "Legierungsplatten auf dem Panzer zu verschrauben, ist eine grobe, aber effiziente Methode."
 behemoth_alloys_augmentation_tt: "$MOD_SHIP_ARMOR_MULT$ (Behemoths): §G+$@behemoth_edict_armor_mult|0%$§!"
 concept_edict_behemoth_nanite_augmentation: "$edict_behemoth_nanite_augmentation$"
 concept_edict_behemoth_living_metal_augmentation: "$edict_behemoth_living_metal_augmentation$"
 concept_edict_behemoth_alloys_augmentation: "$edict_behemoth_alloys_augmentation$"
 biocrisis.280.name: "$menp_behemoth_mutation_research$"
 biocrisis.280.desc: "Wir haben mehrere Mutagenformeln zur Verbesserung unserer Behemoths entwickelt. Diese sind darauf zugeschnitten, neue Stärken und andere Anpassungen freizusetzen. Ihre gewaltige Physiologie verkraftet jedoch nur eine einzige Injektion, und jeder Versuch, mehrere Mutagene zu kombinieren, führt zu einem katastrophalen Zellversagen. Zwischen Evolution und Vernichtung liegt ein schmaler Grat. Wir müssen die passende Augmentierung mit Bedacht wählen."
 biocrisis.280.a: "Macht sie wilder!"
 biocrisis.280.b: "Macht sie ... weniger hungrig."
 biocrisis.280.c: "Macht sie schneller!"
 biocrisis.280.psi: "Die Macht des Schleiers wird sie nähren."
 biocrisis.280.bio: "Macht sie tödlicher!"
 biocrisis.280.cyber: "Kanalisiert ihre Wut."
 biocrisis.280.cyber.tt: "Unsere Behemoths können mit §G25%-iger§! Wahrscheinlichkeit ihrer Wut widerstehen.\nWährend des Wutzustands erhalten sie §G+$@behemoth_cyber_rage_fire_rate_mult|0%$§! Feuerrate, §G+$@behemoth_cyber_rage_shield_penetration_add|0%$§! Durchschlagskraft (Panzerung) und §G+$@behemoth_cyber_rage_armor_penetration_add|0%$§! Durchschlagskraft (Schilde)"
 biocrisis.280.synth: "Ihre Panzerung wird undurchdringbar sein."
 biocrisis.280.corp: "Zur Hölle mit ihnen! Macht stattdessen Stofftiere nach ihrem Abbild!"
 biocrisis.280.machine: "Verschmelzt Fleisch mit Stahl."
 biocrisis.280.machine_tt: "Schaltet 3 Erlasse zur §YBehemothaugmentierung§! frei\n$t$['concept_edict_behemoth_nanite_augmentation']\n$t$['concept_edict_behemoth_living_metal_augmentation']\n$t$['concept_edict_behemoth_alloys_augmentation']"
 #Crisis Objectives
 crisobj_build_bioships_name: "Biologische Schiffe bauen"
 crisobj_build_bioships_desc: "Wir sind Meister in der Aufzucht biologischer Schiffe und können den Prozess nun verfeinern und ausweiten. Die fortwährende Symbiose erhöht mit jeder Iteration unsere Vorteile, verbessert unsere Flotten und stärkt unsere Herrschaft über das Leben im Kosmos."
 crisobj_breed_fauna_name: "Weltraumfauna ausbrüten"
 crisobj_breed_fauna_desc: "Wir sind Meister beim Züchten biologischer Schiffe und können den Prozess nun verfeinern und ausweiten. Die fortwährende Symbiose erhöht mit jeder Iteration unsere Vorteile, verbessert unsere Flotten und stärkt unsere Herrschaft über das Leben im Kosmos."
 crisobj_kill_bioships_name: "Biologische Schiffe zerstören"
 crisobj_kill_bioships_desc: "Die biologischen Schiffe unserer Feinde sind ein Hindernis für unsere eigene biologische Vorherrschaft. Wir müssen entschlossen zuschlagen und sie vernichten, damit sie keine Bedrohung mehr für uns sind."
 crisobj_kill_space_fauna_name: "Weltraumfauna erlegen"
 crisobj_kill_space_fauna_desc: "Feindlich gesinnte Weltraumfauna ist ein Hindernis für unsere eigene biologische Vorherrschaft. Wir müssen entschlossen zuschlagen und sie vernichten, damit sie keine Bedrohung mehr für uns ist."
 crisobj_cap_fauna_name: "Weltraumfauna einfangen"
 crisobj_cap_fauna_desc: "Die ungezähmte Weltraumfauna ist ein Mysterium und stellt uns vor eine einzigartige Herausforderung. Wir müssen entschlossen handeln und diese Wesen einfangen, um ihr Potenzial auszuschöpfen und unsere Vorherrschaft zu sichern."
 crisobj_build_behemoth_egg_name: "Behemoth-Eier ausbrüten"
 crisobj_build_behemoth_egg_desc: "Das Heranwachsenlassen übergroßer Zigoten ist ein entscheidender Schritt, um sich über die Trivialitäten des Lebens auf einem Planeten hinauszuentwickeln."
 crisobj_birth_behemoth_name: "Behemoths gebären"
 crisobj_birth_behemoth_desc: "Unter unserer wachsamen Führung nehmen in der Leere kolossale Lebensformen Gestalt an. Diese Behemoths, die alleinig unserem Ehrgeiz entstammen, werden das Machtgleichgewicht zu unseren Gunsten verändern."
 crisobj_behemoth_rage_name: "Wütende Behemoths"
 crisobj_behemoth_rage_desc: "Wir haben unsere Behemoths auf die Sterne losgelassen und ihre urzeitliche Wut hinterlässt nichts als Verwüstung. Ihr unkontrollierter Zorn zeugt von unserer Macht, und diese Naturgewalten gehorchen alleinig unserem Willen - sollten wir ihn ausüben wollen."
 behemoth_mutation_reward: "Mutation auswählen"
 biocrisis.210.desc.base: "Etwas regt sich in uns. Unser Hunger erfüllt einen höheren Zweck als nur das sinnlose Fressen. Er sorgt für unsere Anpassung. Neue Wucherungen treten hervor und pulsieren voll unbändigem Potenzial.\n\n" #Introduction
 biocrisis.210.desc: "$biocrisis.210.desc.base$Unsere Eier schenken uns buchstäblich Leben, und wir müssen sie unter allen Umständen schützen und pflegen. Unsere Evolution muss alleinig auf dieses Ziel hin ausgerichtet sein." #Egg
 biocrisis.210.a: "Wir müssen das Wachstum der Eier beschleunigen."
 biocrisis.210.a.tt: "$behemoth_fast_egg_tt$\n\n§HNeue Richtlinie§!: $behemoth_egg_policy$\n$policy_behemoth_egg_policy_desc$"
 biocrisis.210.b: "Wir müssen dafür sorgen, dass unsere Schlüpflinge stark sind!"
 biocrisis.210.b.tt: "$behemoth_slow_egg_tt$\n\n§HNeue Richtlinie§!: $behemoth_egg_policy$\n$policy_behemoth_egg_policy_desc$"
 biocrisis.210.c: "Verstärkt ihre Schalen."
 biocrisis.210.c.tt: "$behemoth_strong_egg_tt$"
 biocrisis.215.desc: "$biocrisis.210.desc.base$Auf den Sonnenströmen zu schwimmen und die Leere zu durchqueren, ist eine Fähigkeit, die nur wenige Spezies besitzen. Wir beziehen unsere Stärke hauptsächlich aus unserer Wut und unserer Macht, doch was, wenn wir auch unsere Beweglichkeit verbessern würden?" #Mobility
 biocrisis.215.a: "Durchqueren wir die Leere!"
 biocrisis.215.a.tt: "Unser §Y$behemoth_04$§! erhält ein §Y$BIO_JUMP_DRIVE_1$§!."
 biocrisis.215.b: "Schnell schießen und noch schneller bewegen."
 biocrisis.215.b.tt: "$behemoth_turbo_tt$"
 biocrisis.215.c: "Priorisiert die Reflexe."
 biocrisis.215.c.tt: "$behemoth_reflexes_tt$"
 biocrisis.215.d: "Wir werden zum Jäger in der Dunkelheit werden."
 biocrisis.215.d.tt: "Unser §Y$behemoth_04$§! erhält $@cloaking_high_strength|0+$ $MOD_SHIP_CLOAKING_STRENGTH_ADD$."
 biocrisis.220.desc: "$biocrisis.210.desc.base$Unsere biologische Abwehrfähigkeit zu stärken, wird es uns erlauben, selbst einem Dauerbeschuss unserer Feinde standzuhalten, ohne lästige Verletzungen zu erleiden."
 biocrisis.220.a: "Eine dickere Haut wäre vorteilhaft."
 biocrisis.220.a.tt: "Unser §Y$behemoth_04$§! erhält $@behemoth_1_hull_add|0+*$ $HITPOINTS$."
 biocrisis.220.b: "Unsere Schlachtpanzerung sollte robuster sein."
 biocrisis.220.b.tt: "Unser §Y$behemoth_04$§! erhält $@behemoth_1_armor_add|0+*$ $MOD_SHIP_ARMOR_ADD$ und $@behemoth_1_armor_hardening_add|%0+$ $MOD_SHIP_ARMOR_HARDENING_ADD$."
 biocrisis.220.c: "Niemand wird uns berühren können, wenn wir unsere Schilde verstärken."
 biocrisis.220.c.tt: "Unser §Y$behemoth_04$§! erhält $@behemoth_1_shield_add|0*+$ $MOD_SHIP_SHIELD_ADD$, $@behemoth_1_shield_regen_add_perc|%1+$ $MOD_SHIP_SHIELD_REGEN_ADD_PERC$ und $@behemoth_1_shield_hardening_add|%0+$ $MOD_SHIP_SHIELD_HARDENING_ADD$."
 biocrisis.225.desc: "$biocrisis.210.desc.base$Gegen unsere Feinde in den Kampf zu ziehen, ist unser Weg der Eroberung, und wir haben nun die Möglichkeit, unser Kampfpotenzial zu verbessern."
 biocrisis.225.a: "Mit genügend Energie können Schilde einfach ignoriert werden."
 biocrisis.225.a.tt: "Unser §Y$behemoth_04$§! erhält $@behemoth_shield_pen_add|%0+$ $MOD_SHIP_SHIELD_PENETRATION_ADD$ sowie einen monatlichen Unterhalt in Höhe von £exotic_gases£ $@behemoth_shield_pen_upkeep|0*-$."
 biocrisis.225.b: "Unsere Projektile müssen in der Lage sein, selbst die dickste Panzerung zu durchschlagen."
 biocrisis.225.b.tt: "Unser §Y$behemoth_04$§! erhält $@behemoth_armor_pen_add|%0+$ $MOD_SHIP_ARMOR_PENETRATION_ADD$ und einen monatlichen Unterhalt in Höhe von £volatile_motes£ $@behemoth_armor_pen_upkeep|0*-$."
 biocrisis.225.c: "Kleinvieh stellt keine Bedrohung für uns dar."
 biocrisis.225.c.tt: "Unser §Y$behemoth_04$§! erhält $@behemoth_tracking_add|0*+$ $MOD_SHIP_TRACKING_ADD$, $@behemoth_point_defense_weapon_fire_rate_mult|%0+$ $mod_weapon_type_point_defense_weapon_fire_rate_mult$ sowie einen monatlichen Unterhalt in Höhe von £rare_crystals£ $@behemoth_tracking_upkeep|0*-$."
 biocrisis.230.desc: "$biocrisis.210.desc.base$In der Hitze der Schlacht zählt jede Sekunde. Der Schaden, den wir verursachen, ist ein Todesritual und das Letzte, was unsere Feinde erleben, bevor ihre jämmerliche Existenz erlischt."
 biocrisis.230.a: "Wir bekämpfen sie an Ort und Stelle."
 biocrisis.230.a.tt: "$behemoth_drain_tt$"
 biocrisis.230.b: "Wir sollten sie bereits aus der Ferne zerstören."
 biocrisis.230.b.tt: "$behemoth_spike_tt$"
 biocrisis.230.c: "Wir müssen die wichtigsten Ziele strategisch zerlegen."
 biocrisis.230.c.tt: "$behemoth_burst_tt$"
 biocrisis.235.desc: "$biocrisis.210.desc.base$Als stärkste Macht in der Galaxie werden wir von einer erhöhten Ausdauer sehr profitieren." #Tanky 2
 biocrisis.235.a: "Ein regeneratives Gewebe schenkt uns ein langes Leben."
 biocrisis.235.a.tt: "Unser §Y$behemoth_04$§! erhält $@behemoth_2_hull_regen_add|%1+$ $MOD_SHIP_HULL_REGEN_ADD_PERC$."
 biocrisis.235.b: "Wir werden niemals kapitulieren."
 biocrisis.235.b.tt: "Unser §Y$behemoth_04$§! erhält $@behemoth_2_damage_reduction_mult|%1+$ $MOD_SHIP_DAMAGE_REDUCTION_MULT$."
 biocrisis.235.c: "Rohe Gewalt ist der einzige Weg."
 biocrisis.235.c.tt: "Unser §Y$behemoth_04$§! erhält $@behemoth_2_damage_reduction_static|1+$ $MOD_SHIP_DAMAGE_REDUCTION_ADD$, $@behemoth_2_armor_hardening_add|%0+$ $MOD_SHIP_ARMOR_HARDENING_ADD$ und $@behemoth_2_shield_hardening_add|%0+$ $MOD_SHIP_SHIELD_HARDENING_ADD$."
 biocrisis.240.desc: "$biocrisis.210.desc.base$Wir schwärmen zusammen mit unserer Brut aus, verwüsten Planeten und befreien ihre Systeme von allem Essbaren - also von den meisten Dingen. Dabei stellt sich die Frage, wie wir unsere Nachkommenschaft am besten versorgen können." #Support Ability
 biocrisis.240.a: "Wir erlauben ihnen, schnell zu sein."
 biocrisis.240.a.tt: "$behemoth_buff_tt$"
 biocrisis.240.b: "Sie werden sich in unserem Licht versammeln." #Summon a fleet
 biocrisis.240.b.tt: "$behemoth_summon_tt$"
 biocrisis.240.c: "Wir helfen ihnen, stark zu sein." #Regen friendly bioships
 biocrisis.240.c.tt: "$behemoth_healing_tt$"
 biocrisis.245.desc: "$biocrisis.210.desc.base$Unsere unerbittliche Stärke muss allen Bewohnern dieser Galaxie demonstriert werden. Mit dem nächsten Schritt unserer Evolution verbessern wir unsere Kampffähigkeiten."
 biocrisis.245.a: "Wir müssen den Zorn in uns nutzen."
 biocrisis.245.a.tt: "Zu Beginn des Gefechts erhält unser §Y$behemoth_04$§! £time£ §Y$@behemoth_frenzy_duration|0$ Tage lang§! \"§Y$behemoth_frenzy_modifier$§!\".\n\n§Y$behemoth_frenzy_modifier$§!:$behemoth_frenzy_modifier_tt$"
 biocrisis.245.b: "Wir müssen lernen, unseren Zorn zu zähmen."
 biocrisis.245.b.tt: "Unser §Y$behemoth_04$§! erhält \n$t$$MOD_SHIP_FIRE_RATE_MULT$: §G+$@behemoth_tempered_fire_rate_mult|0%$§! \n$t$$MOD_SHIP_SPEED_MULT$: §G+$@behemoth_tempered_speed_mult|0%$§! \n$t$$MOD_SHIP_HULL_REGEN_ADD_PERC$: $@behemoth_tempered_hull_regen_add_perc|%1+$ \n$t$$MOD_SHIP_ARMOR_REGEN_ADD_STATIC$: $@behemoth_tempered_armor_regen_add_static|0+$"
 biocrisis.245.c: "Wir müssen unsere Wut kanalisieren, um jene um uns herum zu inspirieren."
 biocrisis.245.c.tt: "Zu Beginn des Gefechts gewährt unser §Y$behemoth_04$§! £time£ §Y$@behemoth_inspiration_duration|0$ Tage lang§! jedem verbündeten biologischen Schiff in diesem System \"§Y$behemoth_inspiration_modifier$§!\".\n\n§Y$behemoth_inspiration_modifier$§!:$behemoth_inspiration_modifier_tt$"
 biocrisis.250.name: "Direkte Kontrolle"
 biocrisis.250.desc: "$biocrisis.210.desc.base$Wir können nun eine katastrophale Welle von kryoklastischer und pyroklastischer Wut entfesseln, die so mächtig ist, dass sie die Realität zerfetzen kann. Kurz gesagt haben wir eine Waffe, die die Galaxie niederzubrennen vermag.\n\nDoch unsere Vorherrschaft endet nicht mit Zerstörung. Wir fühlen jede Sehne, jeden Pulsschlag, jeden titanischen Muskel des Behemoths: Alles gehorcht unserem Willen, als wäre es unser eigenes Fleisch. Mit bloßen Gedanken befehligen wir seine gewaltige Gestalt: seine Glieder, seinen Schlund, das titanische, aus der Leere geborene Herz, das für unser Ziel schlägt. Dies ist kein bloßes Schiff: Wir sind nun der Behemoth." #Behemoth Superweapon
 biocrisis.250.a: "Die Leere gehört nur uns."
 biocrisis.250.a.tt: "§HEntfernt Modifikator:§!\n§R$voidspawn_boss_invincible$§!\n$mod_damage_vs_country_type_voidspawn_boss_mult$ §R-1.954%§!\n\n$behemoth_superweapon_tt$\n\n"
