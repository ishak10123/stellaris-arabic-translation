 ### Behemoth Crisis ###
 ap_behemoths: "Wut des Behemoths"
 ap_behemoths_desc: "Der Spitzenprädator der Sterne ist an keinerlei Begrenzungen gebunden, und deshalb werden auch wir unsere biologischen Schwächen ablegen, die uns zurückhalten, und zu einer wahren Naturgewalt werden."
 must_use_bioships: "£trigger_no£ Erfordert die Verwendung eines §Ybiologischen§! Schiffsmodells."
 behemoth_crisis_chain_title: "Behemothkrise"
 behemoth_crisis_chain_desc: "Die Sterne mehren unseren Hunger nur noch weiter und eine Katastrophe ist bloß der Boden, aus dem unsere Ambitionen sprießen. Wir trotzen der natürlichen Ordnung, um eine unaufhaltbare Bestie zu erschaffen, die den gesamten Kosmos neu formen wird."
