 bio.1005.reptilian: "Reptilien sind recht einzigartig."
 bio.1005.avian: "Vogel-DNA würde uns eine unvergleichliche Mobilität schenken."
 bio.1005.arthropoid: "Insektoiden sind so wunderbar knusprig."
 bio.1005.molluscoid: "Selbst ein Molluskoid kann uns noch etwas beibringen"
 bio.1005.fungoid: "Fungoiden breiten sich schnell aus, und wir könnten das auch tun."
 bio.1005.plantoid: "Die Energieeffizienz von Plantoiden könnte nützlich sein."
 bio.1005.lithoid: "Auch wenn sie schwierig zu konsumieren ist, bietet die DNA von Lithoiden köstliche Möglichkeiten."
