 concept_growth_factor_desc: "Der Wachstumsfaktor ist ein Maß dafür, wie viele Nährstoffe der Behemoth zu sich nimmt, und bestimmt, wie schnell die Situation voranschreitet.\n\nJeden Monat verringert er sich um §R0.75%§!\n\n$behemoth_finale_situation_monthly_change_tooltip$\n\nDer Minimalwert beträgt §G0.5%§! für jeweils $pop_group_unit$ £pop£ §Hübertragene Bewohner§!."
