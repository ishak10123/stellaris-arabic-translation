 #General Events
 action.1.desc_109: "§HAnstelle eines ruhigen und geordneten Austauschs bedrängten uns gleich drei unterschiedliche Signale. Obwohl sie inhaltlich stark voneinander abwichen, sprachen sie alle mit derselben Stimme.§!\n\nSignal 1: [GetPrimaryHiveFEConversation]\nSignal 2: [GetSecondaryHiveFEConversation]\nSignal 3: [GetTertiaryHiveFEConversation]\n\n§HAn diesem Punkt wurden die Stimmen zu einem wirren Durcheinander. Eine Analyse ergab, dass jedes Signal eine komplexe Bezeichnung enthielt. Der Einfachheit halber haben wir diese wie folgt übersetzt: §Y[GetPrimaryHiveFEName]§!, §Y[GetSecondaryHiveFEName]§! und §Y[GetTertiaryHiveFEName]§!.§!"
 war_first_hivefe: "\"Schwächliche Kreaturen. Wir fragen uns, wie gut Ihr wohl Krieg führt? Zu sehen, wie Ihr Euch abmüht; zu hören, wie Ihr schnattert ... Das würde uns amüsieren. Warum -\""
 growth_first_hivefe: "\"Ein Leben im Überfluss! Und gut genährt. Wächst Eure Spezies aus der Not heraus oder weil sie es selbst so will? Wir können uns nicht erinnern. Warum -\""
 control_first_hivefe: "\"Diese Körper ... Ihr [Species.GetEyeNamePlural] weicht um 3 % von der Mitte ab ... Wir müssen diesen Fehler beheben. Wir gehen davon aus, dass Ihr Folge leistet. Warum -\""
 war_second_hivefe: "\"- nutzlose Schilde. Nicht einmal in der Lage, den Kern eines Sterns zu überstehen. Diese Galaxie muss Euch Angst machen. Ihr müsst -\""
 growth_second_hivefe: "\"- nicht genug Körperöffnungen. Mit einem dritten [Species.GetMouthName] werdet Ihr vielleicht erste Erfolge sehen. Ihr könnt -\""
 control_second_hivefe: "\"- schmerzlich ineffiziente Sprache. Anarchische Grammatik muss rationalisiert werden. Ihr werdet unsere Änderungen annehmen -\""
 bio.3000.name: "Sorgfältig nachdenken"
 bio.3000.desc: "§HDie übliche Dissonanz der Fragmente des Gefallenen Reichs ist verschwunden. Die drei Stimmen harmonieren, und jede einzelne ist von Wut erfüllt.§!\n\nSinnlose [owner.GetSpeciesNamePlural]! Ihr habt die letzte Erinnerung betreten. Lasst uns eines klarstellen: Dieser Ort ist nicht für Eure [owner.GetEyeNamePlural] gedacht. Macht weiter und die Folgen für Euch werden unvorstellbar sein - und der Schmerz unerträglich.\n\nIhr werdet uns - es - mich nicht weiter stören!"
 bio.3000.a: "Leitet den Not-ÜL-Sprung ein."
 bio.3000.b: "Wir werden nicht gehen."
 bio.3005.name: "Zweite Erinnerung"
 bio.3005.desc: "§HDer Akkord - der Chor - ist erneut zu hören und alle drei Fragmente sprechen wie ein einziges:§!\n\n- ...schwindet! Verschwindet! Verschwindet! Verschwindet! Verschwindet! Verschwindet! Ver... -"
 bio.3005.a: "Leitet augenblicklich den Not-ÜL-Sprung ein!"
 bio.3005.b: "Wir werden Eure Geheimnisse erfahren."
 #Task Events
 #War
 bio.3105.name: "Überleben des Stärkeren"
 bio.3105.desc: "Heute ist der Tag gekommen, an dem Ihr schwächlichen [root.GetSpeciesNamePlural] Euch beweisen werdet! Wir haben neue biologische Schiffe hervorgebracht. Der Stamm hat sich bereits bewährt, indem er seine Artgenossen dezimierte, und nun ist es an der Zeit, ihn gegen etwas Fremdes zu testen. Ein Exemplar davon wird schon bald im §Y[target_system.GetName]§!-System eintreffen.\n\nVersucht, uns zumindest einige interessante Daten zu liefern."
 bio.3105.militarist: "Eine würdige Herausforderung!"
 bio.3105.a.tooltip: "Ein experimentelles Schiff des Gefallenen Reichs wird im §Y[target_system.GetName]§!-System eintreffen"
 bio.3105.b: "Können wir ablehnen?"
 NAME_New_Breed: "Neue Brut"
 NAME_Experimental_Ship: "Experimentelles Schiff"
 bio.3110.name: "Enttäuschung"
 bio.3110.desc: "Wir sehen, dass die experimentelle Brut noch immer lebt. Ihr seid noch immer zu schwach.\n\nVielleicht hätten wir eine Amöbe entsenden sollen."
 bio.3110.a: "Es tut uns leid?"
 bio.3120.name: "Lektion gelernt"
 bio.3120.desc: "Fabelhaft! Wir sind überglücklich, dass Ihr das Muster dieser Variante, feindlichem Beschuss auszuweichen, schnell bemerkt und richtig ausgenutzt habt. Seid versichert, dass sie diesen Fehler in Zukunft nicht mehr haben wird, wenn die nächste Generation zum Leben erwacht.\n\nIhr seid gewachsen, junge [root.GetSpeciesNamePlural]. Seid vorbereitet."
 bio.3130.name: "Zu ruhig"
 bio.3130.desc.notruce: "Wir haben bemerkt, dass Ihr Euch derzeit nicht im Krieg befindet. Warum? Junge Reiche müssen kämpfen oder sie laufen Gefahr, zurückzufallen. Wir haben einen Gegner für Euch ausgesucht: §Y[unfortunate_country.GetName]§!. Besiegt diesen Gegner innerhalb eines Jahrzehnts und Eure fortwährende Entwicklung wird gesichert sein."
 bio.3130.desc.truce: "$bio.3130.desc.notruce$\n\nUnd sorgt Euch nicht um den Waffenstillstand, den Ihr mit ihm hattet. Den gibt es nicht mehr."
 bio.3130.a: "Von allem denkbaren Unsinn ..."
 bio.3130.a.pacifist: "Konflikte sind nicht der einzige Weg zum Fortschritt!"
 bio.3130.a.militarist: "Eine hervorragende Idee!"
 bio.3150.name: "Dem Frieden eine Chance geben"
 bio.3150.desc: "[Root.GetName], wir kommen mit einer Warnung und einer Herausforderung.\n\nAuch wenn es berauschend sein kann, alles um einen herum für sich zu beanspruchen, muss man auch den Frieden kennen, um den Krieg verstehen zu können.\n\nNehmt Euch ein Jahrzehnt Zeit, um darüber nachzudenken, was Ihr in all der Zeit erreicht habt. Vertraut uns: Ruht Euch aus oder Ihr werdet zusammenbrechen."
 bio.3150.a.mean: "Was soll dieser Unsinn?"
 bio.3150.a.pacifist: "Was für eine aufgeklärte Sichtweise!"
 #Growth
 bio.3205.name: "Ökosystem verbessert"
 bio.3205.desc: "Eure Lieferung an Biomasse kommt spät. Wartet ... Ihr seid ja gar nicht §Y[targetrivalname.GetName]§!.\n\nWarum lenkt Ihr uns ab?\n\nAch ja. Ihr seid die Empfänger eines lange schlummernden Musters, eines Genoms, das seit Jahrtausenden sorgfältig verwahrt wurde. Wir haben die Freigabe aufgeschoben, bis die Zeit dafür reif war. Eure Kolonie auf §Y[target_planet.GetName]§! - sie ist der ideale Empfänger. Die Biosphäre wird bereits in Kürze angepasst werden."
 bio.3205.a: "Wir akzeptieren."
 bio.3205.a.planetscaper: "Bringt uns bei, wie!"
 bio.3205.b: "Würde §Y[alternate_planet.GetName]§! stattdessen passen?"
 bio.3205.b.planetscaper: "Wir glauben, dass §Y[alternate_planet.GetName]§! ein viel besseres Testumfeld wäre!"
 bio.3205.c: "Was für eine absurde Forderung. Wir lehnen ab!"
 bio.3205.c.environmentalist: "Wie könnt Ihr es wagen?"
 bio.3210.name: "Biosphäre angepasst"
 bio.3210.desc.base: "§Y[fallen_empire_hive_growth.GetName]§! hat die Modifikationen an der Biosphäre von §Y[root.GetName]§! abgeschlossen. Der Eingriff war nicht sichtbar, doch die Auswirkungen sind unbestreitbar."
 bio.3210.desc.radio_bugs: "$bio.3210.desc.base$\n\nDie auf dem Planeten lebenden Insekten kommunizieren nun auf jener Frequenz, auf der auch unsere kabellosen Geräte miteinander kommunizieren. Ein einfaches Zirpen kann eine automatische Tür öffnen und ein Schwarm eine ganze Fabrik lahmlegen. Wir sind bereits dabei, die Frequenzen zu ändern, doch nicht jede Anlage wird mit voller Effizienz laufen."
 bio.3210.radio_bugs.accept: "Wir werden uns anpassen."
 bio.3210.radio_bugs.purge: "Das ist inakzeptabel. Beseitigt jedes Insekt!"
 bio.3210.radio_bugs.purgeota: "Updates kompromittiert. Insekten beseitigen."
 radio_bugs: "Funkinsekten"
 radio_bugs_desc: "Die Funkfrequenzen dieses Planeten sind mit den Geräuschen künstlich modifizierter Insekten gefüllt."
 mod_planet_districts_cities_society_research_produces_add: "£society_research£ $society_research$ durch £district£ Stadt- und Schwarm-Distrikte"
 bio.3210.desc.world_of_thought: "$bio.3210.desc.base$\n\nAuf dem ganzen Planeten konfrontieren uns nun Geschöpfe, die sich einst mit Grasen und Schlammbädern begnügten, mit beunruhigenden Fragen über die Existenz. Das Gefallene Reich hat große Teile der hiesigen Fauna verändert."
 bio.3210.world_of_thought: "[fallen_empire_hive_growth.GetName] ist zu so etwas in der Lage?"
 bio.3210.world_of_thought.homicidal: "Pech für sie."
 bio.3210.world_of_thought.tt: "§Y500§! neue £pop£ §HBewohner§! haben auf §Y[This.GetName]§! die Vernunftbegabtheit erlangt"
 bio.3210.desc.world_alight: "$bio.3210.desc.base$\n\nDie Welt leuchtet. Buchstäblich. Die Modifikationen des Gefallenen Reichs haben irgendwie dafür gesorgt, dass die verschiedenen Spezies biolumineszent leuchten und unaufhörlich wie ein laufender Motor brummen. Unsere [owner.GetColonistPlural] erleben keinen echten Nachtzyklus mehr, und wir müssen Behausungen mit Verdunklungen ausstatten, damit sie Schlaf finden können."
 bio.3210.world_alight.accept: "Was für ein schrecklicher Tag, wenn man [owner.GetEyeNamePlural] hat."
 bio.3210.world_alight.reject: "Deckt sie ab oder beseitigt sie. Wir können nicht zulassen, dass das so weitergeht!"
 world_alight: "Erleuchtete Welt"
 world_alight_desc: "Ein Planet, auf dem es niemals Nacht wird. Die Fauna wurde so angepasst, dass sie kontinuierlich Licht abgibt und unaufhörlich in schillernden Farben pulsiert. Die Bewohner benötigen erhebliche Unterstützung, um diesen erbarmungslosen Bedingungen standzuhalten."
 bio.3220.name: "Genetische Unterhaltung"
 bio.3220.desc: "Die §Y[boring_species.GetNamePlural]§!-Spezies, die innerhalb unserer Grenzen lebt, hat sich als enttäuschend einfach aufgebaut erwiesen, und ihre Existenz ist nichts weiter als ein Nachhall ihres vollen Potenzials. Wir gewährend Euch drei verschiedene Methoden, um dieses ... Problem zu beheben.\n\nLangweilt uns besser nicht."
 bio.3220.tt: "§G50%§! Fortschritt für die Situation \"§Y$evolutionary_predators_situation$§!\"."
 bio.3220.humanoid: "Gebt uns die Eigenschaften von Humanoiden."
 bio.3220.mammalian: "Gebt uns die Eigenschaften von Säugetieren."
 bio.3220.reptilian: "Gebt uns die Eigenschaften von Reptilien."
 bio.3220.avian: "Gebt uns die Eigenschaften von Vögeln."
 bio.3220.arthropoid: "Gebt uns die Eigenschaften von Insektoiden."
 bio.3220.molluscoid: "Gebt uns die Eigenschaften von Molluskoiden."
 bio.3220.fungoid: "Gebt uns die Eigenschaften von Fungoiden."
 bio.3220.plantoid: "Gebt uns die Eigenschaften von Plantoiden."
 bio.3220.lithoid: "Gebt uns die Eigenschaften von Lithoiden."
 bio.3220.necroid: "Gebt uns die Eigenschaften von Nekroiden."
 bio.3220.aquatic: "Gebt uns die Eigenschaften von Aquaten."
 bio.3220.toxoid: "Gebt uns die Eigenschaften von Toxoiden."
 bio.3220.infernal: "Gebt uns die Eigenschaften von Thermophilen."
 bio.3220.psionic: "Gebt uns die Eigenschaften von Psionikern."
 bio.3220.evopred: "Wir werden nicht lange so bleiben, wie wir gerade sind."
 bio.3220.b: "Wir werden eine Spezies nicht aus einer Laune heraus verändern!"
 bio.3230.name: "Seltene Eigenschaft"
 bio.3230.desc: "Wir konnten beobachten, dass einige innerhalb Eurer Spezies eine besondere Eigenschaft entwickelt haben, die in unserem riesigen genetischen Portfolio fehlt. Ihr werdet uns mehr als nur eine Analyse liefern. Wir benötigen lebendes Gewebe, das über die Eigenschaft \"§Y[fallen_empire_hive_growth.species.GetInterestingTraitName]§!\" verfügt. Doch seid unbesorgt: Ein vollständiger [interesting_species.GetName] ist nicht notwendig. Ein Teil des Körpers wird ausreichen, um das Genom zu züchten."
 bio.3230.a: "Was ist schon eine einzelne Gliedmaße, wenn man das Große und Ganze betrachtet?"
 bio.3230.b: "Wir können Euch unser Erbgut nicht anvertrauen!"
 #bio.3245.name: "Eternal Harvest"
 #bio.3245.desc: "We have discovered a derelict transport from the §Y[fallen_empire_hive_growth.GetName]§! in the §Y[transport_system.GetName]§!. Initial scans show it is carrying samples of the Fallen Empire's special crop strain, capable of feeding trillions.\n\nThe transport has been left derelict for months already and we have not seen any movement from the [fallen_empire_hive_growth.GetName] to retrieve it. Could this be a test or a glorious opportunity?"
 #Control
 bio.3305.name: "Eine vollständige Sammlung"
 bio.3305.desc: "§HDies ist eine im Vorfeld aufgezeichnete Nachricht. Versucht nicht, darauf zu antworten.§!\n\nWir haben diese Kommunikation so angepasst, dass Ihr sie verstehen könnt. Die Begrenzungen Eurer Sprache sind in die Berechnungen eingeflossen. Ein §Y[target_pop.GetSpeciesName]§! muss unverzüglich für die Assimilierung an uns abgetreten werden. Diese Abweichung ist nicht länger zu tolerieren. Und sie wird auch nicht toleriert werden.\n\nDas Transportschiff wurde bereits in der Umlaufbahn von §Y[target_pop.Planet.GetName]§! stationiert. Die Zeit läuft. Unserer Forderung nicht nachzukommen, gefährdet die Stabilität."
 bio.3305.a: "Wir müssen der Forderung nachkommen."
 bio.3305.a.tooltip: "1 der auf §Y[target_pop.Planet.GetName]§! lebenden §Y[target_pop.GetSpeciesNamePlural]§! werden an §Y[fallen_empire_hive_control.Capital.GetName]§! übergeben"
 bio.3305.b: "Ihr werdet schon selbst herkommen müssen und sie uns entreißen!"
 bio.3305.followup: "§HWir haben eine Nachricht aus §Y[fallen_empire_hive_control.GetName]§! empfangen. Es waren jedoch keine uralten [fallen_empire_hive_control.GetSpeciesNamePlural], die uns begrüßten, sondern ein vertrautes §Y[target_leader_fe_control.Species.GetName]§!-Gesicht.§!\n\n"
 bio.3310.name: "Habt keine Angst"
 bio.3310.desc: "$bio.3305.followup$Der heutige Tag markiert einen Wendepunkt für Euch. Die Gensequenz Eurer Spezies wurde gesichert und in das Ganze integriert. Eure Zukunft ist nicht länger ungewiss. Wenn die Zeit reif ist, werdet Ihr ein Teil von uns werden."
 bio.3310.familiar_face: "Vermitteln wir anderen etwa ein derartiges Gefühl?"
 bio.3315.desc: "$bio.3305.followup$Es bleibt nicht viel Zeit. Die Experimente, die sie hier an uns auf §Y[fallen_empire_hive_control.Capital.GetName]§! durchführen, sind unbeschreiblich - und sollten selbst dem schlimmsten Feind nicht angetan werden. Ich hoffe, der Inhalt dieses Datenpakets stellt sicher, dass dieses Fragment niemals die Kontrolle über uns erlangt."
 bio.3315.a: "Öffnet das Datenpaket."
 bio.3315.tooltip: "Mit §G50 %iger§! Wahrscheinlichkeit handelt es sich hierbei nicht um einen Test, sondern es enthält echte Geheimnisse über das §YGefallene Reich§!."
 bio.3315.b: "Es ist eine Falle! Beendet die Übertragung!"
 bio.3330.name: "Wichtige Agenda"
 bio.3330.desc: "Wir hoffen, Eure vielen Fehler halten Euch nicht davon ab, den Ernst der Lage zu begreifen. Eure zaudernde §YGalaktische Gemeinschaft§! hat einen Beschluss vorgelegt, der unbedingt §Y[GetPassFail]§! muss. Um Euch beim Finden Eurer Argumente zu unterstützen, erlauben wir es Euch, auf unser überlegenes Wissen zuzugreifen. Hört gut zu, sofern Ihr denn tatsächlich zu komplexem Denken in der Lage seid.\n\n§HDas Gefallene Reich hat die Kommunikation mit uns beendet.§!"
 bio.3330.a: "Was ist da gerade passiert?"
 bio.3330.b: "Das ist nicht die korrekte Vorgehensweise!"
 fail_resolution: "scheitern"
 pass_resolution: "angenommen werden"
 fe_political_support: "Uralte Politik"
 fe_political_support_desc: "Dank der Unterstützung eines Gefallenen Reichs sind Rechtsstreitigkeiten und andere Verschleppungstaktiken ein Kinderspiel."
 fe_political_opposition: "$fe_political_support$"
 fe_political_opposition_desc: "$fe_political_support_desc$"
 MESSAGE_PASS_HIVE_FE_TASK_TITLE: "Fragment des Gefallenen Reichs zufrieden"
 MESSAGE_PASS_HIVE_FE_TASK: "Wir sind den Anweisungen von $FALLEN_EMPIRE|Y$ nachgekommen, und das Ergebnis ist zu ihrer vollen Zufriedenheit. Unser Leben ist für einen weiteren Tag gesichert."
 MESSAGE_FAIL_HIVE_FE_TASK_TITLE: "Fragment des Gefallenen Reichs erzürnt"
 MESSAGE_FAIL_HIVE_FE_TASK: "Wir sind den Anweisungen von $FALLEN_EMPIRE|Y$ nicht nachgekommen und können nur hoffen, dass man uns vergeben wird."
 bio.3350.name: "Galaktische Wucherung"
 bio.3350.desc: "Warum müsst Ihr die Galaxie weiterhin mit Eurer inkompetenten Expansion verschandeln? Es traut sich wohl niemand sonst, es auszusprechen, und daher sagen wir es nun: Niemand mag Eure Grenzen, und der Weltraum wäre ohne Euch viel besser dran.\n\nDas §Y[offending_system.GetName]§!-System stört im Besonderen die Harmonie und muss unverzüglich aus Eurem Reich entfernt werden, um den galaktischen Zusammenhalt zu bewahren."
 bio.3350.a: "Ihr wollt, dass wir ein System aufgeben, damit unsere Grenzen hübscher sind?"
 bio.3350.bordergore: "Aber wir mögen es so!"
 bio.3350.tt: "Wir müssen unsere Sternenbasis im §Y[offending_system.GetName]§!-System aufgeben oder werden ansonsten den Zorn von §Y[fallen_empire_hive_control.GetName]§! zu spüren bekommen"
 bio.3355.name: "Kopfschmerz"
 bio.3355.desc: "Seid Ihr absichtlich so ignorant? Alles, was Ihr tun musstet, war, das §Y[offending_system.GetName]§!-System aufzugeben.\n\nVielleicht ist es an der Zeit, dass wir eine aktivere Rolle dabei übernehmen, Euch zurechtzustutzen ..."
 bio.3360.name: "Klarheit"
 bio.3360.desc: "Es ist schön, mitansehen zu dürfen, dass Ihr aus Euren früheren Fehlern gelernt habt. Seht das Problem mit dem §Y[FromFrom.GetName]§!-System als gelöst an. Es besteht noch Hoffnung, dass Ihr mehr wie wir werdet.\n\nWir werden Eure Entwicklung weiter beobachten."
 #Awakening
 #War
 casus_belli_cb_ae_entertainment: "Unterhaltung"
 war_goal_wg_ae_entertainment: "Unterhaltung"
 war_goal_wg_ae_entertainment_desc: "Führt Krieg, um das Erwachte Reich zu unterhalten und einen gültigen Rivalen zu finden."
 wg_ae_war_entertainment_effect: "§Y[Root.GetName]§! belohnt beherzte Gefechte. Je höher die §YKriegsmüdigkeit§! des Erwachten Reichs ist, desto besser die Belohnung."
 #Control
 bio.3400.name: "Einigkeit"
 bio.3400.desc.nogalcom: "Galaxie, wir sind eins. Die niederen Fragmente haben die Wahrheit erkannt und sich erneut dem Kollektiv angeschlossen. Wir werden fortan den Namen §Y[fallen_empire_hive_control.GetName]§! tragen. Wie glücklich Ihr Euch doch schätzen dürft, diesen Moment miterleben zu dürfen. Die höchste Lebensform schreitet erneut unter den Sternen."
 bio.3400.desc.galcom: "$bio.3400.desc.nogalcom$\n\nWir werden jetzt die Kontrolle über die \"§YGalaktische Gemeinschaft§!\" übernehmen. Das ist ein Anlass zum Feiern!"
 bio.3405.name: "Falsche Note"
 bio.3405.desc: "Warum sollte man sich selbst im Weg stehen? Im galaktischen Chor ist Eure Note ein Missklang. Wir wollen Euch nur Harmonie bringen, doch Ihr widersetzt Euch und klammert Euch an Eure Dissonanz.\n\nWisset, dass unsere Symphonie in der gesamten Galaxie widerhallen wird - mit oder ohne Euch."
 bio.3405.a: "Wir haben Eure Melodie gehört, doch wir tanzen nicht danach."
 NAME_Appeal_the_Veto: "Gegen das Veto Einspruch eingelegen"
 gal_com_arrogance: "Arroganz"
 #Dig Site
 NAME_Echo: "Widerhallendes Mausoleum"
 last_thought_site: "Letzte Erinnerung"
 last_thought_site_desc: "[From.Planet.GetName] stößt jeden zurück, der sich dem Planeten nähert, und jene Forscher, die sich seinem Studien widmen sollten, erfinden Ausreden, um ihre Arbeit hinauszuzögern. Selbst die Instrumente versagen, wenn man sie mit Daten darüber füttert.\n\nIrgendetwas so Schreckliches muss hier passiert sein, dass es selbst in unserer Realität widerhallt."
 bio.3450.name: "Der Totgeborene"
 bio.3450.desc: "Unsere behutsamen Untersuchungen auf [From.Planet.GetName] führten uns tief in den Untergrund, wo endlose Schichten halb versteinerter biologischer Materie auf uns warteten. Schließlich durchbrachen wir den hohlen Kern des Planeten - nur um festzustellen, dass die bedrückende Atmosphäre mit jedem Schritt noch bedrückender wurde. Trotzt der Vorsichtsmaßnahmen, die [Root.GetLeaderName] getroffen hatte, wurde die zunehmende Unruhe unerträglich. Mehrere [Root.Owner.GetArchaeologistPlural] erlitten einen kollektiven Zusammenbruch und verfielen in einen katatonischen Zustand. Sie mussten umgehend evakuiert werden.\n\nDie riesige Höhle im Herzen des Planeten ist keine normale Leere: Tief im Inneren fanden wir die Überreste von etwas, was weit größer war als alle uns bekannten Lebensformen. Schwache Spuren von amniotischen Rückständen beseitigten schließlich auch die letzten Zweifel. [From.Planet.GetName] war kein lebloser Fels - sondern ein Ei!\n\nUnd im Inneren schläft ein totgeborenes Ungeheuer."
 bio.3455.name: "Die Synapsen"
 bio.3455.desc: "Unsere [Root.Owner.GetArchaeologistPlural] entdeckten auf [From.Planet.GetName] ein Netzwerk seltsamer Ranken, die tief in den Schädel der totgeborenen Kreatur eingebettet waren. Als sie diesen organischen Fäden zu ihrer Quelle folgten, entdeckten sie eine Anordnung von Synapsen - ein kompliziertes System, das noch immer vor unheimlichem Potenzial strotzt.\n\n[Root.GetLeaderName] versucht in diesem Moment, auf diese Synapsen und damit auf jene uralten Schaltkreise zuzugreifen, die entlang der Ranken pulsieren. Welches Wissen auch immer in ihnen verborgen liegen mag: Es hat seinen Wirt bereits seit Langem überlebt. Ob sich das Wesen noch daran erinnert, bleibt abzuwarten."
 bio.3460.name: "Das Wagnis"
 bio.3460.desc: "Es geschah vor hunderttausend Jahren. Die Zeitwahrnehmung des Schwarms in galaktische Standardeinheiten zu übertragen, war ein heikler Prozess, doch dank der Erinnerungen des Biocomputers konnte [Root.GetLeaderName] die Teile des Puzzles nach und nach zusammenfügen und so zur Wahrheit gelangen.\n\nAm Höhepunkt seiner Macht stand der Schwarm einem Feind gegenüber, den er nicht zu besiegen vermochte. Trotzt zahlreicher Verbündeter endete jede Schlacht mit einer Niederlage. Verzweiflung führte schließlich zu Rücksichtslosigkeit.\n\nDas, was danach geschah, wurde absichtlich gelöscht, aber einige wenige verstreute Fragmente blieben erhalten - genug, um einen Blick auf das letzte Wagnis zu werfen: Der Schwarm schuf dieses planetengroße Ei als Gefäß für seinen Aufstieg, um seine schwache, an den Planeten gebundene Existenz aufzugeben und mit dem Schlüpfling zu verschmelzen. Es ist unklar, ob man kämpfen oder fliehen wollte.\n\nDoch als sich die Kreatur rührte, lief etwas furchtbar schief."
 bio.3465.name: "Die Zersplitterung"
 bio.3465.desc: "Durch einen präzisen Zugriff auf die Biocomputer und ihre noch aktive synaptische Verbindung konnten wir die letzten Erinnerungen des totgeborenen Wesens extrahieren. Zwar ließ der Prozess die Biocomputer durch die immense kognitive Belastung rasch schrumpfen, doch wir konnten die meisten Daten noch rechtzeitig retten.\n\nAngesichts der bevorstehenden Vernichtung gab der Schwarm jedwede Vorsicht auf und übertrug sein gesamtes Bewusstsein in einem verzweifelten Kampf ums Überleben in den ungeborenen Wirt. Die synaptische Überladung erwies sich als derart fatal, dass die Kreatur und das Schwarmbewusstsein in einer sich endlos wiederholenden Schleife unerträglicher Qualen gefangen waren. Hätte sein mitfühlender Verbündeter die Verbindung nicht unterbrochen, wären beide umgekommen. Nun sind nur noch die zersplitterten Echos des Bewusstseins übrig, die auf [From.Planet.GetName] verweilen - einer Welt, die noch immer von ihrem letzten Schrei heimgesucht wird.\n\nDie letzte Erinnerung ist eine an Todesqualen."
