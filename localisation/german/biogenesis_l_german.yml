 job_skywatcher_plural: "Himmelsbeobachter"
 job_skywatcher_desc: "Diese gut ausgebildeten Wächter sorgen dafür, dass der Uplink zur $dsc_name$ stets aufrechterhalten wird und sicher ist."
 job_skywatcher_effect_desc: "£job_skywatcher£ $job_skywatcher_plural$ erhöhen die $r_stability$, erschaffen £defense_army£ §YVerteidigungsarmeen§! und erhöhen die reichsweite £mod_country_naval_cap_add£ §YFlottenkapazität§!. Sie erhöhen zudem die Effizienz von §Y$dsc_name_plural$§!, §Y$starbases$§! und §Y$military_station_small_plural$§!."
