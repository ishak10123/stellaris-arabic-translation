 d_lethal_ecosphere_blocker_desc: "Testsubjekte und andere Experimente, die vom Kriegsfragment ausgesondert wurden, wetteifern hier in einer blutigen unnatürlichen Auslese um ihr Überleben. Die meisten Soldaten werden auf diesen unglaublich lebensfeindlichen Übungsplätzen den Tod finden, doch die Überlebenden werden zweifellos als unerbittliche Tötungsmaschinen daraus hervorgehen."
