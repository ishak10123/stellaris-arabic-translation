 concept_genetic_purity: "Genetische Perfektion der Spezies"
 concept_genetic_purity_desc: "Autoritäten, die die ['tradition_category:tradition_purity'] gefördert haben, erhalten skalierende Effekte und Modifikatoren, die sich auf £pop£ §Horganische Bewohner§! und £leader£ §HAnführer§! auswirken.$TABBED_NEW_LINE$- Wird durch die Anzahl an Eigenschaftspunkten erhöht, die für §Gpositive§! Spezieseigenschaften ausgegeben wurden.$TABBED_NEW_LINE$- Wird durch die Anzahl an Eigenschaftspunkten erhöht, die für §Rnegative§! Spezieseigenschaften ausgegeben wurden."
 trait_leader_genetic_purist: "Genetischer Purist"
 trait_leader_genetic_purist_desc: "Das Schaffen dieses Anführers ist geleitet von einer unerschütterlichen Vision genetischer Vollkommenheit und einer Intoleranz gegenüber Unvollkommenheit jeglicher Form."
 auth_bio_democratic_purity: "Phänotypische Autonomie"
 auth_bio_democratic_purity_tt: "$pop_effects_from_purity_header$ $TABBED_NEW_LINE$- £mod_pop_happiness£ $MOD_POP_HAPPINESS$: $plus_minus_icon$§Y$@purity_traits_happiness|1%$§! $DOUBLE_NEW_LINE$$authority_grants_genetic_purist_tt$ $TABBED_NEW_LINE$- $mod_leaders_upkeep_mult$ $minus_plus_icon$§Y2.5%§! $TABBED_NEW_LINE$- $MOD_LEADER_SPECIES_EXP_GAIN$ $plus_minus_icon$§Y2.5%§!"
 auth_bio_democratic_purity_desc: "Die körperliche Selbstbestimmung ist ein Grundrecht. Der Staat ermächtigt den Einzelnen, seinen Körper nach Belieben zu verändern, und Letzterer wird dabei nur durch die eigene Vorstellungskraft beschränkt. Der Körper ist die ultimative Leinwand."
 auth_bio_oligarchic_purity: "Eugenische Hierarchie"
 auth_bio_oligarchic_purity_tt: "$eugenic_political_power_effects$"
 auth_bio_oligarchic_purity_desc: "Die absolute Macht muss bei der genetischen Elite liegen, den reinsten und fähigsten Verwaltern, die über das Schicksal einer ganzen Zivilisation bestimmen. Jeder Bürger unter ihnen erfüllt eine vordefinierte Rolle, die genau auf sein geerbtes genetisches Potenzial zugeschnitten ist. Zufriedenheit entsteht nicht durch Ehrgeiz, sondern dadurch, dass man die zugewiesene Aufgabe annimmt."
 eugenic_political_power_effects: "$pop_effects_from_purity_header$ $TABBED_NEW_LINE$- $MOD_POP_BONUS_WORKFORCE_MULT$: $plus_minus_icon$§Y$@purity_traits_bonus_workforce_mult|2%$§! $DOUBLE_NEW_LINE$$authority_grants_genetic_purist_tt$ $TABBED_NEW_LINE$- $MOD_COUNCIL_AGENDA_PROGRESS_SPEED$: $plus_minus_icon$§Y$@purity_traits_council_speed|Y1%$§!"
 auth_bio_dictatorial_purity: "Nuklein-Rechtsprechung"
 auth_bio_dictatorial_purity_tt: "$pop_effects_from_purity_header$ $TABBED_NEW_LINE$£society£ Sozial-Forschung für jeweils $pop_group_unit$ £pop£ Bewohner: $plus_minus_icon$§Y$@purity_traits_resource$§! $DOUBLE_NEW_LINE$$authority_grants_genetic_purist_tt$ $TABBED_NEW_LINE$- $MOD_PLANET_CRIME_ADD$ (Planetar): $minus_plus_icon$§Y5.0§! $TABBED_NEW_LINE$- $MOD_PLANET_CRIME_ADD$ (Sektor): $minus_plus_icon$§Y2.5§! $TABBED_NEW_LINE$- $MOD_PLANET_STABILITY_ADD$ (Planetar): $plus_minus_icon$§Y5.0§! $TABBED_NEW_LINE$- $MOD_PLANET_STABILITY_ADD$ (Sektor): $plus_minus_icon$§Y2.5§!"
 auth_bio_dictatorial_purity_desc: "Diese Regierung setzt genetische und biometrische Daten als Mittel der Präventionsjustiz ein, wobei man den Gencode eines jeden Bürgers auf kriminelle Veranlagungen untersucht. Durch diese sorgfältige Überwachung kann die Strafverfolgung eingreifen, bevor es zu Verbrechen kommt, und sorgt so für Ordnung. Wahre Gerechtigkeit ist nicht reaktiv, sondern präventiv und schützt die Gesellschaft, indem sie das Verbrechen an der Wurzel beseitigt."
 auth_bio_imperial_purity: "Biotische Herrschaft"
 auth_bio_imperial_purity_tt: "£leader£ §Y$imperial_ruler$§!- und §YErben§!-Effekte durch ['concept_genetic_purity']:$TABBED_NEW_LINE$- $MOD_LEADER_SKILL_ADD$: $plus_minus_icon$§Y$@purity_traits_imperial_level|2$§! $DOUBLE_NEW_LINE$£leader£ Anführer der §YSpezies unseres Oberhaupts ([Ruler.GetTitle])§! erhalten die Eigenschaft \"§Y$imperial_bloodline$§!\"\n£leader£ \"§YImperiale Blutlinie§!\"-Effekte durch ['concept_genetic_purity']: $TABBED_NEW_LINE$- $MOD_LEADER_LIFESPAN_MULT$: $plus_minus_icon$§Y$@purity_traits_imperial_bloodline|1%$§! $TABBED_NEW_LINE$- $MOD_LEADER_SPECIES_EXP_GAIN$: $plus_minus_icon$§Y$@purity_traits_imperial_bloodline|1%$§!"
 auth_bio_imperial_purity_desc: "Diese Regierung arbeitet unermüdlich an der biologischen Perfektion, indem sie die Lebensspanne ihrer Anführer durch Genmanipulation verlängert. Der Wohlstand der Gesellschaft hängt davon ab, dass nur die besten Gene überleben und sich vermehren. Die dauerhafte Pflege des Genpools ist ein Garant für Fortschritt, dessen ultimativer Lohn Langlebigkeit und Perfektion sind."
 auth_bio_corporate_purity: "Organisches Syndikat"
 auth_bio_corporate_purity_tt: "$organic_leaders_have_trade_upkeep$\n\n$pop_effects_from_purity_header$ $TABBED_NEW_LINE$- Für jeweils $pop_group_unit$ £pop£ Bewohner produzierter $r_trade$: $plus_minus_icon$§Y$@purity_traits_resource$§! $DOUBLE_NEW_LINE$"
 auth_bio_corporate_purity_desc: "Dieser Megakonzern hat die Kommerzialisierung des Lebens selbst perfektioniert und schlägt aus dem Organhandel Gewinn. Hochwertige Organe erzielen Spitzenpreise, während man \"redundante\" Organe auf dem Schwarzmarkt anbieten kann. Zwielichtige Unterhändler und Schwarzmarktchirurgen bieten verzweifelten Käufern ihre Dienste an und sorgen dafür, dass niemals ein Organ verschwendet wird."
 #Cloning
 auth_bio_democratic_cloning: "Übereinstimmende Multiplizität"
 auth_bio_democratic_cloning_tt: "$ENABLES_BACKUP_CLONES$\n§Y$leader_trait_backup_clone_default$§!Unterhalt: §G$@cordant_multiplicity_clone_upkeep|0%$§!\n§Y$leader_trait_backup_clone_default_plural$§! haben einen reduzierten ['concept_clone_leader_degradation', Zellverfall], können aber wiederum keine §Y$leader_trait_has_backup_clone_plural$§! haben"
 auth_bio_democratic_cloning_desc: "Diese Regierung fördert die Klontechnologie für Gleichheit und Fortschritt. Klone haben die gleichen Rechte wie ihr Original, und auch ihre Stimmen besitzen die gleiche Gewichtung. Der Wille des Volkes wird durch die Vielfalt jeder Perspektive bestimmt - ob man nun ein Klon ist oder nicht."
 auth_bio_oligarchic_cloning: "Replizierende Regentschaft"
 auth_bio_oligarchic_cloning_tt: "$ENABLES_BACKUP_CLONES$\nDie Eigenschaft \"§Y$leader_trait_has_backup_clone$§!\" gibt Ratsmitgliedern zusätzliche Effekte\n§Y$leader_trait_backup_clone_default_plural$§! haben einen reduzierten ['concept_clone_leader_degradation', Zellverfall] als Ratsmitglied\n"
 auth_bio_oligarchic_cloning_desc: "In dieser Gesellschaft herrscht die Elite auf ewig, indem sie ihre Macht durch eine ununterbrochene Reihe überlegener Klone aufrechterhält. Die Klontechnologie fungiert sowohl zur Bewahrung als auch zur Perfektion des genetischen Erbes uns sorgt für eine nahtlose Kontinuität in der Führung. Jede einflussreiche Position wird von einer verbesserten Iteration eingenommen und festigt so die Herrschaft über Generationen hinweg."
 auth_bio_dictatorial_cloning: "Homogene Unterwürfigkeit"
 auth_bio_dictatorial_cloning_tt: "$ENABLES_BACKUP_CLONES$\n$AVAILABLE_POLICIES$ §Y$policy_homogenous_class$§!"
 auth_bio_dictatorial_cloning_desc: "Bei dieser Herrschaftsform stellt man absolute Loyalität durch eine sorgfältige genetische Selektion sicher, wobei man nur diejenigen als Klonmaterial auswählt, die ein unerschütterliches Gehorsam aufweisen. So entsteht eine sich selbst erhaltende Gesellschaft, in der eine Rebellion nicht nur unwahrscheinlich, sondern biologisch unmöglich ist, und die eine ununterbrochene Harmonie durch die vorgefertigte Struktur der Bevölkerung selbst gewährleistet."
 auth_bio_imperial_cloning: "Vererbte Kontinuität"
 auth_bio_imperial_cloning_tt: "$ENABLES_BACKUP_CLONES$\nDie Mali der Eigenschaft \"§Y$leader_trait_backup_clone_imperial$§!\" können nicht erhöht werden"
 auth_bio_imperial_cloning_desc: "Die unbestreitbare Rechtschaffenheit des Herrschers wird durch seine Klonung bewahrt, wobei jede Iteration die Weisheit und Triumphe aus den früheren Leben erbt. Diese nahtlose Kontinuität der Führung sorgt für ständigen Fortschritt innerhalb der Gesellschaft und läutet ein ewiges Goldenes Zeitalter unter der aufgeklärten Herrschaft des Staatsoberhaupts ein."
 auth_bio_corporate_cloning: "Replikationsvereinigung"
 auth_bio_corporate_cloning_tt: "$organic_leaders_have_trade_upkeep$\n$ENABLES_BACKUP_CLONES$\n$mod_planet_jobs_trade_produces_mult$ durch £building£ ['building:building_clone_vats']: §G+$@replicatory_association_trade_mult|0%$§!\n£mod_planet_amenities_add£ Dienstleistungen (planetar) durch £building£ §Y$building_clone_vats$§!: §G+$@replicatory_association_amenities_add|0$§!\n$AVAILABLE_POLICIES$ §Y$policy_replicatory_association_insurance$§!"
 auth_bio_corporate_cloning_desc: "\"Unvergleichlicher Komfort und beispiellose Bequemlichkeit sind zum Greifen nah. Erwerben Sie noch heute einen Klon Ihrer selbst oder aber geben Sie ein Replikat einer verlorenen Liebschaft in Auftrag.\" Dieser Megakonzern garantiert eine 93%ige Genauigkeitsrate bei jeder Vervielfältigung und verbindet modernste Technologie mit dem Versprechen, Trost zu finden und ein sorgloses Leben zu führen."
 AUTHORITY_HAS_CLONE: "$t$Bei §YTod des Herrschers§! wird ein §Y$leader_trait_backup_clone_imperial$§! zum neuen Herrscher. $TABBED_NEW_LINE$§Y$leader_trait_backup_clone_imperial_plural$§! haben einen reduzierten ['concept_clone_leader_degradation', Zellverfall]."
