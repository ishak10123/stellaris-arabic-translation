 ### NEW CIVICS ###
 civic_genetic_identification: "Genidentifikation"
 civic_genetic_identification_desc: "In dieser Gesellschaft wird jeder Bürger bei der Geburt in ein genetisches Register eingetragen, das man auf allen Ebenen der Verwaltung nutzt."
 civic_corporate_genetic_identification: "Sequenzierte Sicherheit"
 civic_corporate_genetic_identification_desc: "Die Gensequenz eines jeden Kunden und Angestellten wird in einer Datenbank aufgezeichnet, auf die jeder gegen eine geringe Gebühr zugreifen kann. Die Strafverfolgung verlässt sich auf diesen Dienst, um selbst die unbedeutendsten Verbrechen zu identifizieren."
 civic_corporate_genetic_identification_effects: "- £building£ §Y$building_private_security$§!: $megacorp_civic_branch_office_building_effect$"
 councilor_genetic_identification: "Indexer"
 councilor_genetic_identification_desc: "Der Indexer ist für die Pflege und Aufbewahrung des Genindexes zuständig und sorgt dafür, dass die Verwaltung effizient arbeitet."
 councilor_corporate_genetic_identification: "Sequenzmakler"
 councilor_corporate_genetic_identification_desc: "Der Sequenzmakler kümmert sich um die Bewertung von Zugangsanfragen und Monetarisierungsplänen und hat Zugang zu den Geninformationen jedes Individuums."
 civic_crowdsourcing: "Crowdsourcing"
 civic_crowdsourcing_desc: "Diese Gesellschaft hat erkannt, dass nur individuelle Inspiration zu echter Innovation führt. Open-Source-Patente, Aufgeschlossenheit, spontane Kooperationen und Innovationsprämien ebnen den Weg zum Fortschritt."
 civic_crowdsourcing_effects: "$t$- Fraktionen produzieren $r_research$ anstelle von $r_unity$ $TABBED_NEW_LINE$- Fraktionen bilden sich kurz nach Spielbeginn, doch die Fraktionsproduktion ist für die ersten zehn Jahre reduziert"
 civic_corporate_crowdsourcing: "Dezentralisierte F&E"
 civic_corporate_crowdsourcing_desc: "Das Abhalten regelmäßiger abteilungsübergreifender Innovationswettbewerbe erhöht den Innovationsfluss der Abteilung für Forschung und Entwicklung im Unternehmen."
 civic_corporate_crowdsourcing_effects: "$civic_crowdsourcing_effects$ $TABBED_NEW_LINE$- £building£ §Y$building_private_research_initiative$§!: $megacorp_civic_branch_office_building_effect$"
 civic_tooltip_not_crowdsourcing: "Hat NICHT das Staatselement \"['concept_crowdsourcing_civics']\""
 concept_crowdsourcing_civics: "Crowdsourcing"
 concept_crowdsourcing_civics_desc: "Staatselemente der Kategorie \"$concept_crowdsourcing_civics$\" umfassen:$NEW_LINE$- ['civic:civic_crowdsourcing']$NEW_LINE$- ['civic:civic_corporate_crowdsourcing']"
 councilor_crowdsourcing: "Innovationskoordinator"
 councilor_crowdsourcing_desc: "Der Innovationskoordinator hat die Aufgabe, für die faire Nutzung von Patenten zu sorgen und Forschungsanreize zu schaffen, die auf den Technologieschwerpunkt der derzeitigen Führung abgestimmt sind."
 councilor_corporate_crowdsourcing: "Ideenschiedsrichter"
 councilor_corporate_crowdsourcing_desc: "Nicht alle Projekte sind eine Investition wert, und es fällt in den Aufgabenbereich des Ideenschiedsrichters, Markfähigkeit und Rentabilität zu bewerten."
 civic_civil_education: "Staatsbürgerkunde"
 civic_civil_education_desc: "In diesem Reich hat die Bildung die Strafverfolgung abgelöst. Mithilfe einer umfassenden Vorbereitung und strenger Kurskorrekturen stellt diese Gesellschaft sicher, dass kein Individuum ungebildet bleibt. Schließlich gibt es keine schlechten Bürger - nur schlechte Erzieher."
 civic_civil_education_effects: "$t$- Ersetzt alle £job_enforcer£ ['concept_enforcer'] durch £job_educator£ ['concept_educator'] $TABBED_NEW_LINE$- Ersetzt das Gebäude \"£building£ ['building:building_precinct_house']\" durch \"£building£ ['building:building_state_academy']\""
 councilor_head_of_education: "Bildungsminister"
 councilor_head_of_education_desc: "Der Bildungsminister hat die Aufgabe, jedem Bürger das nötige Wissen zu vermitteln, damit dieser nicht nur seine Arbeit erledigen, sondern auch die Komplexität des Lebens selbst zu bewältigen weiß. Eine gute Pädagogik bildet das Fundament einer blühenden Gesellschaft."
 educator: "$job_educator$"
 job_educator: "Erzieher"
 job_educator_plural: "Erzieher"
 job_educator_desc: "Erzieher arbeiten unermüdlich daran, der Jugend Wissen zu vermitteln, und leisten einen unersetzlichen Beitrag für die Gesellschaft, indem sie dafür sorgen, dass jeder Bürger bereit ist, sich der Galaxie zu stellen."
 job_educator_effect_desc: "£job_educator£ $job_educator_plural$ nutzen $r_consumer_goods$, um $r_unity$ zu produzieren, die £crime£ §Y$PLANET_CRIME_TITLE$§! zu reduzieren, die §YAnziehung (Regierungsethik)§! zu erhöhen und £defense_army£ §YVerteidigungsarmeen§! zu erschaffen"
 mod_job_educator_add: "$job_educator_plural$-Jobs"
 building_state_academy: "Staatsakademie"
 building_state_academy_desc: "Hier werden die Grundlagen für die Schaffung einer gesunden Gesellschaft vermitteln."
 concept_state_academy: "$building_state_academy$"
 concept_state_academy_desc: "$job_educator_plural$-Jobs: §G+200§!\n\n$job_educator_effect_desc$\n$h_line$§L$building_state_academy_desc$§!"
 building_center_of_guidance: "Orientierungszentrum"
 building_center_of_guidance_desc: "Dieses Gebäude deckt alle Aspekte ab, die zum Leben in dieser Gesellschaft notwendig sind. Innerhalb dieses riesigen Komplexes von Schulen und Ausbildungseinrichtungen lässt sich jede Abweichung korrigieren."
 mod_planet_jobs_citizen_produces_mult: "Ressourcenproduktion (Volle Staatsbürger)"
 civic_hive_familiar_face: "Vertrautes Gesicht"
 civic_hive_familiar_face_desc: "Die Kooperation wird der direkten Konfrontation vorgezogen. Dieses Schwarmbewusstsein hat diplomatische Drohnen hervorgebracht, die die Gestalt und das Verhalten ihrer Gesprächspartner annehmen können."
 civic_wilderness_familiar_face: "$civic_hive_familiar_face$"
 civic_wilderness_familiar_face_desc: "Die Kooperation wird der direkten Konfrontation vorgezogen. Diese Wildnis brachte diplomatische Avatare hervor, die die Gestalt und das Verhalten ihrer Gesprächspartner annehmen können."
 civic_hive_familiar_face_effects: "Gesandte und Beamte nehmen die physische Form der Spezies an, mit der sie verhandeln.\nBenötigtes §YVertrauen§! für §YDiplomatieaktionen§!: §G-50%§!"
 #Bioship Civics
 civic_hive_shared_genetics: "Geteilte Genetik"
 civic_hive_shared_genetics_desc: "Die mutierten Genome dieses Schwarms wurden genutzt, um biologische Schiffe wachsen zu lassen. Dies hat eine Verbindung zwischen den Schiffen und den Drohnen geschaffen, die ihre Stärke aus der Einzigartigkeit ihrer Spezies bezieht."
 civic_wilderness_shared_genetics: "$civic_hive_shared_genetics$"
 civic_wilderness_shared_genetics_desc: "Ein Genom innerhalb dieser Wildnis ist zu einer geeigneten Basis für die Entwicklung biologischer Schiffen mutiert. Die Flotten sind untrennbar mit anderen Symbionten verbunden, wobei jede Spezies von der anderen Kraft bezieht."
 civic_hive_shared_genetics_effects: "- Für jede §Gpositive§! Eigenschaft der Hauptspezies: §G+2.5%§! Rumpfstärke (Schiffe), §R+0.5%§! Unterhalt.\n- Für jede §Rnegative§! Eigenschaft der Hauptspezies: §G+1.5%§! Feuerrate (Schiffe), §R+0.5%§! Unterhalt."
 shared_genetics_fire_rate: "$civic_hive_shared_genetics$: Feuerrate"
 shared_genetics_fire_rate_desc: "Unsere Schiffe profitieren von überstimulierten Aggressionszentren, die durch eine gesunde Mischung aus Hormonen und Bosheit angeheizt werden."
 shared_genetics_hull: "$civic_hive_shared_genetics$: Rumpfstärke"
 shared_genetics_hull_desc: "Die Muskeln und die Knochenmasse unserer Schiffe werden durch die genetische Überlegenheit unserer Spezies begünstigt."
 civic_hive_aerospace_adaptation: "Innerplanetarer Schwerpunkt"
 civic_hive_aerospace_adaptation_desc: "Die biologischen Schiffe dieses Kollektivs sind besonders auf interatmosphärische Flüge ausgelegt. Dies erlaubt es dem Schwarm, Unterstützung aus der Luft zu bieten oder die planetare Logistik zu entlasten."
 civic_hive_aerospace_adaptation_effects: "- §YBiologische Schiffe§! in der Umlaufbahn §Gbefreundeter§! Kolonien haben §G-50%§! Unterhalt (Schiffe).\n- §GBefreundete§! Kolonien mit §Ybiologischen Schiffen§! in der Umlaufbahn haben abhängig von der Flottengröße eine erhöhte §YBaugeschwindigkeit§!, §YDienstleistungen§!, §YGeschwindigkeit (Blocker entfernen)§! und potenzielle §YProduktion (Jobs)§!.\n- §YBiologische Schiffe§! in der Umlaufbahn §Rfeindlicher§! Kolonien haben §G-85%§! Unterhalt (Schiffe)."
 aa_ship_upkeep_friendly: "$civic_hive_aerospace_adaptation$"
 aa_ship_upkeep_bombing: "$civic_hive_aerospace_adaptation$"
 aa_ship_planet_support_1: "$civic_hive_aerospace_adaptation$"
 aa_ship_planet_support_1_desc: "Die biologischen Schiffe, die sich in der Umlaufbahn dieses Planeten befinden, treten regelmäßig in die Atmosphäre ein und wieder aus ihr heraus, um sich auszuruhen, Nahrung aufzunehmen und Drohnen auf dem Planeten zu unterstützen."
 aa_ship_planet_support_2: "$civic_hive_aerospace_adaptation$"
 aa_ship_planet_support_2_desc: "$aa_ship_planet_support_1_desc:$"
 aa_ship_planet_support_3: "$civic_hive_aerospace_adaptation$"
 aa_ship_planet_support_3_desc: "$aa_ship_planet_support_1_desc:$"
 aa_ship_planet_support_4: "$civic_hive_aerospace_adaptation$"
 aa_ship_planet_support_4_desc: "$aa_ship_planet_support_1_desc:$"
 civic_machine_stalwart_network: "Robustes Netzwerk"
 civic_machine_stalwart_network_desc: "Diese Maschinenintelligenz hat sich auf defensive Militärmanöver spezialisiert und kombiniert die Verteidigung mit Angriffs- und Rückzugsstrategien."
 defensive_stations_tracking_add: "$t$- Zielgenauigkeit (Sternenbasen und Verteidigungsstationen)"
 defensive_stations_tracking_add_tt: "$defensive_stations_tracking_add$: $VARIABLE|0=+$"
 defensive_stations_weapon_range_mult: "Waffenreichweite (Sternenbasis und Verteidigungsstationen)"
 defensive_stations_weapon_range_mult_tt: "$defensive_stations_weapon_range_mult$: $VARIABLE|1%=+$"
 #Bodysnatcher
 civic_hive_bodysnatcher: "Körperinfiltrator"
 civic_hive_bodysnatcher_desc: "Es ist das Innere, was zählt. Dieser Schwarm hat sich auf die Infiltration spezialisiert und weiß, wie man die Körper unwissender biologischer Wesen übernimmt. Während die Zahl an Marionetten immer weiter wächst, wird die Wirtszivilisation unweigerlich in das Kollektiv absorbiert."
 civic_hive_bodysnatcher_effects: "Beginnt das Spiel mit §Y1000§! assimilierten £pop£ Bewohnern und der Fähigkeit, organische Wesen in das Schwarmbewusstsein zu §Yassimilieren§!.\nHat Zugang zur Spionagemission \"['concept_operation_bodysnatcher_prepare_invasion']\"\nErhält zusätzliche £pop£ Bewohner durch die Spionagemission \"['concept_operation_smuggle_pops']\""
 civic_hive_bodysnatcher_secondary_species: "Schwindler"
 NAME_Bodysnatchers: "Körperinfiltrator"
 operation_bodysnatcher_prepare_invasion: "Invasion vorbereiten"
 operation_bodysnatcher_prepare_invasion_desc: "Das Bewusstsein unserer Nachbarn lässt sich leicht nach unseren Wünschen formen. Indem wir vorbereitete Körper in ihre Gesellschaft einbringen, die bereits in unser Bewusstsein integriert sind, können wir sie leichter in unsere Herde aufnehmen."
 operation_bodysnatcher_prepare_invasion_on_success: "$IF_SUCCESSFUL|E$\nWir erhalten Hilfe von Insidern, wenn wir §Y[Target.GetName]§! das nächste Mal den Krieg erklären."
 operation_invasion_prepared: "$TRIGGER_FAIL$ §RWir haben bereits eine Invasion gegen dieses Reich vorbereitet. Wir müssen ihm nur noch den Krieg erklären, um sie zu beginnen.§!"
 operation_invasion_impossible: "$TRIGGER_FAIL$ §RDieses Reich ist zu gut auf Infiltrationsversuche vorbereitet. Wir können diesen Einsatz nicht durchführen!§!"
 concept_operation_bodysnatcher_prepare_invasion: "$operation_bodysnatcher_prepare_invasion$"
 concept_operation_bodysnatcher_prepare_invasion_desc: "Eine Operation, bei der assimilierte Bewohner der Zielspezies entsendet werden, um das Reich zu infiltrieren und eine Massensabotage für den Kriegsbeginn vorzubereiten."
 bio.800.name: "Neue Jobs"
 bio.800.desc: "Unsere infiltrierten Körper müssen an strategischen Orten platziert werden, bevor wir unseren großen Plan in die Tat umsetzen können. Unterbesetzte Sternenbasen und schlecht verteidigte Planeten sind vorrangige Ziele. Wir müssen uns schnellstens an die Arbeit machen."
 bio.805.name: "Zusätzliches Personal"
 bio.805.desc: "Unsere Arbeit verläuft reibungslos: Unsere vorbereiteten Körper haben mehr Wirte gefunden und unsere Beteiligung an den inneren Abläufen in [Target.GetName] hat sich stark erhöht. Unsere Drohnen sollten schon bald das Bewusstsein etwaiger neugieriger Geister unterdrückt haben."
 bio.810.name: "Neue Stellen"
 bio.810.desc: "Jene [Target.GetSpeciesNamePlural], die wir nicht so einfach ersetzen konnten, wurden von ihren Posten entfernt, wodurch mehrere Stellen in §Y[Target.GetName]§! frei wurden. Unsere Marionetten stehen bereit, unserer vollständigen Infiltration die Türen zu öffnen, und wir müssen ihnen nur noch den Befehl dafür geben."
 bio.815.name: "Frische Rekruten"
 bio.815.desc: "§Y[From.Target.GetName]§! wurde erfolgreich kompromittiert. Einer Invasion steht nichts mehr im Weg, und wir müssen nur noch darüber entscheiden, wie viele Infiltratoren wir entsenden wollen. Schon bald werden sie gänzlich [Owner.GetAdj] sein!"
 bio.815.tt: "Wir haben nicht genügend Bewohner der Zielspezies für diese Aktion."
 bio.815.a: "Wir müssen alle entsenden, die wir haben."
 bio.815.b: "Stellt sicher, dass ihre Außenposten uns gehören."
 bio.815.b.tt: "Schickt §Y100§! £pop£ §HBewohner§!.\n$bio.815.reminder$"
 bio.815.c: "Bereitet die Invasion ihrer Planeten vor."
 bio.815.c.tt: "Schickt §Y300§! £pop£ §HBewohner§!.\n$bio.815.reminder$"
 bio.815.d: "Infiltriert ihre Festungen!"
 bio.815.d.tt: "Schickt §Y500§! £pop£ §HBewohner§!.\n$bio.815.reminder$"
 bio.815.e: "Sorgt dafür, das alles uns gehört!"
 bio.815.e.tt: "Schickt §Y2000§! £pop£ §HBewohner§!.\n$bio.815.reminder$"
 bio.815.reminder: "Der nächste Krieg, den wir §Y[From.Target.GetName]§! innerhalb von §G10§! Jahren erklären, wird unsere vorbereiteten Infiltratoren nutzen. Gleiches gilt auch, wenn sie uns den Krieg erklären."
 bio.825.name: "Invasion der [From.GetSpeciesNamePlural]"
 bio.825.desc.small: "Die hinterhältigen [From.GetSpeciesNamePlural] aus [From.GetName] haben unser Reich infiltriert! Unsere Raumstationen wurden kompromittiert, und auch unsere Kolonien werden bereits angegriffen. Wir müssen die Hochstapler entlarven und eliminieren!"
 bio.825.desc.large: "Als die Hälfte unseres Kommunikationsnetzes ausfiel, hielten wir es zuerst für einen schlichten Fehler.\n\nDoch so war es nicht. Rasch stellte sich heraus, dass [From.GetName] zahlreiche Schlüsselpositionen mit eigenen Agenten besetzt hatte. Unser Reich ist gespalten und unsere Kolonien werden angegriffen.\n\nVertraut niemandem!"
 #Smuggle pops operation
 operation_smuggle_pops: "Bevölkerungsschmuggel"
 operation_smuggle_pops_desc: "Unsere Agenten führen eine groß angelegte Ausschleusungsaktion beo isolierten Elementen innerhalb von [target.GetName] durch."
 operation_smuggle_pops_on_success: "$IF_SUCCESSFUL|E$\nSiedelt £pops£ Bewohner in Euer Reich um."
 smuggle_pops_also_fanatic_egalitarians: "$TRIGGER_FAIL$ §R[Target.GetName] sind zudem fanatische Egalitaristen; ihr Volk ist bereits frei§!"
 smuggle_pops_not_enough_pops: "$TRIGGER_FAIL$ §R[Target.GetName] hat nicht genug £pops£ Bewohner, weshalb es sich nicht lohnt, welche zu entführen§!"
 mod_operation_smuggle_pops_difficulty_add: "$operation_smuggle_pops$ (Einsatzschwierigkeit)"
 concept_operation_smuggle_pops: "$operation_smuggle_pops$"
 concept_operation_smuggle_pops_desc: "Eine Operation, bei der Bewohner aus dem Ziel entführt werden."
 bio.900.name: "Talent-Akquirierung"
 bio.900.desc: "Unsere Agenten haben einige Fassaden und Verstecke etabliert, von denen aus sie die Bevölkerung von [target.GetName] beobachten. Dissidenten, Einzelgänger und hochqualifizierte Einzelpersonen werden analysiert und für die Ausschleusung markiert."
 bio.905.name: "Verschwindetricks"
 bio.905.desc: "Unsere Agenten treiben Ziele zusammen und verstecken sie an abgeschiedenen Orten. Wann immer möglich werden Vorfälle inszeniert, um die lokalen Behörden abzulenken und unsere Spuren zu verwischen."
 bio.910.name: "Shuttles"
 bio.910.desc: "Eine kritische Phase der Operation beginnt, bei der alle Personen, die wir zusammengeführt haben, unbemerkt in die Umlaufbahn transportiert werden müssen. Der aktuelle Plan lautet, den Abflug an allen Einrichtungen zu synchronisieren und die Sicherheitstruppen mit Fehlalarmen und Ablenkungsmanövern zu überlasten."
 bio.915.name: "Rausgeschmuggelt"
 bio.915.desc: "Wir haben viele unserer Ziele erfolgreich rausgeschmuggelt, doch die Operation ging nicht reibungslos vonstatten, und viele Schiffe voll vielversprechender Individuen mussten zurückgelassen werden."
 bio.915.desc.detected: "$bio.915.desc$\n\nDerart gewaltige Bevölkerungsbewegungen blieben nicht unbemerkt."
 bio.915.desc.cosmogenesis: "Wir haben viele unserer Ziele erfolgreich ausgeschleust, und sie werden bereits zur Schmiede geschickt. Die Operation ging jedoch nicht reibungslos vonstatten, und viele Schiffe voll vielversprechender Individuen mussten zurückgelassen werden."
 bio.915.desc.cosmogenesis.detected: "$bio.915.desc.cosmogenesis$\n\nDerart gewaltige Bevölkerungsbewegungen blieben nicht unbemerkt."
 bio.915.a: "Wir taten, was wir konnten."
 bio.915.b: "Wir müssen uns darauf konzentrieren, andere [Root.GetSpeciesNamePlural] zu befreien."
 bio.915.c: "Wir müssen noch mehr dort herausholen!"
 bio.915.d: "Wir lassen keinen [GetSpeciesName] zurück."
 bio.915.tt: "Wir schleusen unbeaufsichtigte £pop£ §HBewohner§! in angemessene Welten aus."
 bio.915.asset.tt: "$bio.915.tt$\nWenn §Y[From.Target.GetName]§! uns nicht vorher schon bemerkt hatte, dann §Rdefinitiv jetzt.§!"
 MESSAGE_POPS_SMUGGLED_TITLE: "Gestohlenes Volk"
 MESSAGE_POPS_SMUGGLED_DESC: "Die verräterische Nation $COUNTRY|Y$ hat unsere Grenzen verletzt und unsere Bevölkerung entführt!"
