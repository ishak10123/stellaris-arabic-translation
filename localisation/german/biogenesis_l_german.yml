 #Disconnected Drones #
 disconnected_drones_name: "$policy_disconnected_drones$"
 policy_disconnected_drones: "Vom Bewusstsein abgetrennte Drohnen"
 policy_disconnected_drones_desc: "Wir können entscheiden, ob wir es Drohnen erlauben wollen, sich vom zentralen Bewusstsein abzutrennen, um in unseren Kolonien zu leben."
 disconnected_drones_sustain: "Erhalt"
 disconnected_drones_sustain_name: "Erhalt abgetrennter Drohnen"
 disconnected_drones_sustain_desc: "Obschon sie von einem kollektiven Bewusstsein getrennt wurden, können diese Drohnen am Leben erhalten werden.\n\n§ESchaltet §YStaatsbürgerschaft-Typen§! für abgetrennte Drohnen frei.§!"
 disconnected_drones_purge: "Vernichtung"
 disconnected_drones_purge_name: "Vernichtung vom Bewusstsein abgetrennter Drohnen"
 disconnected_drones_purge_desc: "Die Rechte für vernunftbegabte Wesen gelten nicht für jene, die keinerlei Vernunft folgen. Ohne das zentrale Bewusstsein, das ihnen eine Richtung vorgibt, sind sie nichts weiter als Tiere, und ein Tier, das im Weg steht, ist eine Plage.\n\n§EAlle vom Bewusstsein abgetrennten Drohnen, die in unseren Kolonien leben, werden §Rgesäubert.§!.§!"
 disconnected_drones_purged_citizenship: "$TRIGGER_FAIL$Unser Reich wird von allen Drohnen gesäubert, die vom Bewusstsein getrennt sind."
 disconnected_drones_kill_themselves_purge_type: "$TRIGGER_FAIL$Von ihrem kollektiven Bewusstsein getrennt werden Bewohner dieser Spezies bald ihr Ende finden."
 citizenship_protected_drone: "Geschützte Drohnen"
 citizenship_protected_drone_tooltip: "$living_standard_disconnected_drone_tooltip$"
