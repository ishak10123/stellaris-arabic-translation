l_german:
 ##THE WORLD IS BLEEDING
 strange_worlds.1.name: "Die Welt blutet"
 strange_worlds.1.desc: "Die Oberfläche von §Y[Root.GetName]§! zeigt eine noch nie zuvor beobachtete Reaktion auf unsere Bauarbeiten in Form einer unidentifizierten, zähflüssigen Substanz, die aus den Fundamenten der wichtigsten Anlagen heraussickert.\n\nEs handelt sich um eine scharlachrote gallertartige Flüssigkeit, die allerdings bei Berührung stark klebrige Eigenschaften aufweist.\n\nUnsere [Owner.GetScientistPlural] können es kaum abwarten, diese Aussonderung weiter zu untersuchen. Derzeit handelt es sich dabei zwar lediglich um eine Unannehmlichkeit, aber es wäre ratsam, dafür zu sorgen, dass unsere [Owner.GetColonistPlural] sicher sind."
 strange_worlds.5.name: "Große Blutung"
 strange_worlds.5.desc: "Unsere Kolonie auf §Y[Root.GetName]§! ließ uns einen beunruhigenden Bericht bezüglich der Entwicklung der sonderbaren scharlachroten Flüssigkeit zukommen.\n\nDie Substanz wird zunehmend unkontrollierbarer und tritt in den betroffenen Gebieten in einer immer größeren Menge auf.\n\nDie Flüssigkeit besitzt offenbar jedoch auch positive Eigenschaften. Wenn sie gerinnt, nimmt ihre Klebrigkeit zu, wodurch ein natürlicher Zement entsteht, der sich zur Beschleunigung unserer Bauarbeiten nutzen lässt.\n\nBeunruhigenderweise ist diese Substanz jedoch nahezu unmöglich von jenen [Owner.GetColonistPlural] zu entfernen, die mit ihr in Kontakt gekommen sind. Betroffene zu untersuchen und mögliche Behandlungen auszutesten, würde es uns zwar erlauben, mehr darüber in Erfahrung zu bringen, aber es würde auch den Baufortschritt verlangsamen."
 strange_worlds.5.a: "Behandelt und untersucht die Betroffenen."
 strange_worlds.5.b: "Baut weiter."
 strange_worlds.15.name: "Ein Berg des Blutes"
 strange_worlds.15.desc: "Die Bauarbeiten auf §Y[Root.GetName]§! konnten mit einer unglaublichen Geschwindigkeit fortgesetzt werden, doch das Austreten der klebrigen Substanz ist nicht mehr nur auf die Fundamente unserer Bauwerke beschränkt.\n\nAn mehreren Stellen auf der Oberfläche wurden blutende Risse entdeckt. Wo zuvor nur nicht-heimische Objekte betroffen waren, scheint sich die Flüssigkeit nun wahllos auszubreiten.\n\nDas scharlachrote Material hat inzwischen weite Teile der Oberfläche von [Root.GetName] überschwemmt und gerinnt schnell zu einem zähen, mineralischen Schlamm, der ganz [Root.GetName] bedroht.\n\nDank unserer - wenn auch kostspieligen - Tests konnten unsere Ingenieure einen Weg finden, weitere Schäden zu vermeiden und die Substanz effizient zu ernten. Dies war nur möglich, weil wir großflächige Territorien an den Schleim abgetreten haben."
 strange_worlds.15.a: "Eine interessante Entwicklung."
 strange_worlds.20.name: "Parasit"
 strange_worlds.20.desc: "Nach umfangreichen Studien und Behandlungsversuchen für die betroffenen Arbeiter auf §Y[Root.GetName]§! haben unsere Wissenschaftler die Ursache des Problems isolieren können.\n\nWas ursprünglich wie eine zähflüssige gallertartige Substanz aussah, ist in Wirklichkeit eine Ansammlung parasitärer Mikroorganismen, die eine symbiotische Beziehung mit dem Planeten eingegangen sind. Die Parasiten zersetzen organisches Material unter der Kruste von [Root.GetName] und erzeugen daraus neues Material.\n\nDie Bauarbeiten auf [Root.GetName] störten den natürlichen Lebenszyklus der Parasiten, woraufhin diese auf die Fremdstoffe reagierten, die wir in ihr Ökosystem eingeführt haben.\n\nMit etwas mehr Zeit ist unser Wissenschaftsteam sicher, einen Weg zu finden, um mit diesen Lebensformen in Harmonie zu koexistieren und ihre einzigartige Biologie in die Produktionsabläufe von [Root.GetName] zu integrieren."
 strange_worlds.20.a: "Faszinierend. Weitermachen."
 strange_worlds.25.name: "Produktive Beziehung"
 strange_worlds.25.desc: "Durch ihre umfangreiche Forschung konnten unsere Wissenschaftler eine neue Variante der parasitären Mikroorganismen auf §Y[Root.GetName]§! heranzüchten. Diese Mutation wurde so entworfen, dass die Parasiten unsere eigene Beschaffenheit und die der von uns genutzten Materialien zusätzlich zu der bereits vorhandenen natürlichen Ökologie als harmlos ansehen. Dies erlaubt es uns, unsere Bauarbeiten ohne weitere Komplikationen fortzusetzen.\n\nNachdem unsere angepassten Mikroorganismen der planetaren Biosphäre ausgesetzt wurden, konnten sie sich erfolgreich integrieren.\n\nIndem wir die ursprünglichen Zersetzungseffekte des Mikroorganismus umfunktionierten, ist es uns darüber hinaus sogar gelungen, die klebrigen Eigenschaften der Substanz zu nutzen, um die Produktion auf dem Planeten zu erhöhen."
 strange_worlds.25.a.evopred: "Uns was können sie uns beibringen?"
 strange_worlds.30.name: "Aus dem Nichts"
 strange_worlds.30.desc: "Als ein Stück Land für unsere künftige Expansion auf §Y[Root.GetName]§! vorbereitet wurde, tauchte wie aus dem Nichts ein riesiges Bauwerk auf.\n\nDas Bauwerk sendet höchst instabile Energiewellen aus, die dafür sorgen, dass es zeitweise erscheint und kurz darauf wieder verschwindet. Dies würde auch erklären, warum es bei einem sektorweiten Scan nicht zu sehen war.\n\nSolange das Bauwerk sichtbar ist, sind Symbole auf seinem Äußeren zu erkennen. Diese passen jedoch zu keiner uns bekannten Sprache.\n\nNicht einmal der Zweck dieses Bauwerks ist für uns ergründbar. Es hat zwar bisher keinen Schaden angerichtet, doch es steht unserer Expansion im Weg."
 strange_worlds.30.a: "Untersucht es."
 strange_worlds.35.name: "Visuelle Anomalien"
 strange_worlds.35.desc.no_cloak: "Eine erste Analyse des schillernden Bauwerks auf §Y[Root.GetName]§! führt uns zu der Annahme, dass dieses Objekt irgendwie Licht beugen oder verzerren kann.$strange_worlds.35.desc.common_1$Unser Verständnis über seine Eigenschaften sind zwar gewachsen, aber es war uns nicht möglich, es zu betreten - falls dies überhaupt möglich sein sollte.$strange_worlds.35.desc.common_2$"
 strange_worlds.35.desc.cloak: "Eine erste Analyse des schillernden Bauwerks auf §Y[Root.GetName]§! führt uns zu der Annahme, dass das Objekt über eine Art Tarnfähigkeit verfügt.$strange_worlds.35.desc.common_1$Unser Verständnis über diese Tarneigenschaften sind zwar gewachsen, aber es war uns nicht möglich, das Gebäude zu betreten - falls dies überhaupt möglich sein sollte.$strange_worlds.35.desc.common_2$"
 strange_worlds.35.desc.common_1: "\n\nIm Gesteinsmantel unter dem Bauwerk wurde eine außergewöhnlich hohe geothermische Aktivität festgestellt. Diese starke Energiequelle treibt das isolierte Bauwerk offenbar an, aber die Werte schwanken stark.\n\n"
 strange_worlds.35.desc.common_2: "\n\nDas versiegelte Äußere besteht aus uns unbekannten hochreaktiven Materialien. Erste Versuche, gewaltsam in das Bauwerk einzudringen, destabilisierten die elektromagnetischen Felder des Gebäudes nur weiter. Wir könnten uns einen Weg hineinschneiden, doch dabei besteht ein erhebliches Risiko einer unvorhersehbaren Destabilisierung."
 strange_worlds.35.a: "Dringt gewaltsam ein."
 strange_worlds.35.b: "Setzt die Untersuchungen von außen fort."
 strange_worlds.40.name: "Unkontrollierte Reaktion"
 strange_worlds.40.desc: "Unser Versuch, gewaltsam in das Bauwerk auf §Y[Root.GetName]§! einzudringen, endete in einer Katastrophe. Unsere Ausrüstung destabilisierte die Energiemuster des Bauwerks nur noch weiter und verursachte eine Reihe von Explosionen. Es blieben nichts weiter als Trümmer und Asche übrig.\n\nDie versehentliche Zerstörung brachte jedoch auch ein unerwartetes Ergebnis: In einem nahen Tal tauchten die verwüsteten Ruinen einer seit Langem verlassenen Siedlung auf.\n\nOffenbar war das Bauwerk dafür zuständig, ein starkes Tarnfeld über die ehemalige Kolonie zu projizieren. Vor wem oder was sie sich versteckte, ist ein Rätsel, doch eines ist sicher: Ungeachtet ihrer Bemühungen ging sie unter, ohne irgendetwas von archäologischem Wert zu hinterlassen.\n\nWie genau dies Tarntechnologie funktionierte, werden wir wohl nie erfahren, doch zumindest konnten wir einige neue Erkenntnisse aus der geothermalen Energiequelle ziehen, die wir für unsere eigene Kolonie nutzen können."
 strange_worlds.40.a: "Eine wertvolle Entdeckung."
 strange_worlds.40.a_ct: "Der Blocker \"§YSchimmerndes Bauwerk§!\" wird entfernt"
 strange_worlds.45.name: "Kommandozentrale"
 strange_worlds.45.desc.intro: "Bei genaueren Untersuchungen der seltsamen Markierungen auf der Außenseite des sonderbaren Bauwerks auf §Y[Root.GetName]§! stellte sich heraus, dass es sich bei ihnen um eine Art Schnittstelle handelt. Es gelang uns, sie so auszurichten, dass sich eine verborgene Tür zum Inneren des verlassenen Gebäudes öffnete und ein großer Kontrollraum freigelegt wurde.\n\nDurch ein wenig Herumprobieren erlangten wir schließlich ein grundlegendes Verständnis für die Steuerung und konnten die Systeme abschalten, woraufhin etwas Unerwartetes geschah: In einem nahen Tal erschienen die verfallenen Ruinen einer seit Langem verlassenen Siedlung.\n\nOffenbar war das Bauwerk dafür zuständig, ein starkes Tarnfeld über die ehemalige Kolonie zu projizieren. Vor wem oder was sie sich versteckte, ist ein Rätsel, doch eines ist sicher: Ungeachtet ihrer Bemühungen ging sie unter. Auch wenn nichts von archäologischem Wert von ihr blieb, konnten unsere Wissenschaftler zumindest einige Erkenntnisse aus der Kommandozentrale ziehen."
 strange_worlds.45.desc.a: "$strange_worlds.45.desc.intro$\n\nWir sind jetzt in der Lage, die sonderbare Tarnvorrichtung zu stabilisieren und ihren Effekt weit genug auszudehnen, damit er das gesamte Tal abdeckt. Dies verbessert die Sicherheit unserer Kolonie erheblich."
 strange_worlds.45.desc.b: "$strange_worlds.45.desc.intro$\n\nWir sind jetzt in der Lage, die sonderbare Tarnvorrichtung zu stabilisieren und ihren Effekt weit genug auszudehnen, damit er das gesamte Tal abdeckt. Wir konnten zudem auch unser Wissen über Tarntechnologien erweitern."
 strange_worlds.45.a: "Eine wertvolle Entdeckung."
 strange_worlds.55.name: "Naturschock"
 strange_worlds.55.desc.intro: "Eine riesige Anzahl einer pflanzenfressenden Megafaunaspezies stört das Energienetz auf §Y[Root.GetName]§!. Sie hat sich Zugang zu unseren Kraftwerken verschafft und sich im Zuge dramatischer Massenselbstmorde in die hochfrequenten Energieströme geworfen, wodurch die Geschöpfe umgehend verbrannten.\n\nDiese Tiere scheinen äußerst zielstrebig zu sein und durchbrechen Zäune, um ihr Ziel zu erreichen - in diesem Fall unser Stromnetz. Die Energieproduktion musste infolgedessen heruntergefahren werden.\n\n"
 strange_worlds.55.desc.outro: "Die Spezies spielt für das Ökosystem des Planeten eine entscheidende Rolle. Bei der derzeitigen Häufigkeit dieser Vorfälle wird sie sich schon bald selbst ausgerottet haben."
 strange_worlds.55.desc.a: "$strange_worlds.55.desc.intro$Zumindest führte dies zu einer erhöhten Nahrungsproduktion, da einige [Owner.GetColonistPlural] entdeckten, dass das verkohlte Fleisch dieser Kreaturen äußerst schmackhaft ist.\n\n$strange_worlds.55.desc.outro$"
 strange_worlds.55.desc.b: "$strange_worlds.55.desc.intro$Dies erhöht zwar die Menge an Biomasse, die wir ernten können, doch der Energieausfall ist ziemlich unpraktisch.\n\n$strange_worlds.55.desc.outro$"
 strange_worlds.55.a: "Untersucht dieses Verhalten."
 strange_worlds.60.name: "Katalytische Physiologie"
 strange_worlds.60.desc: "Wir konnten wertvolle Einblicke in die selbstmörderische Megafauna auf §Y[Root.GetName]§! gewinnen.\n\nDiese Kreaturen sind blind und nutzen eine Art Echoortung, um sich zurechtzufinden. Wir vermuten, unser Stromnetz strahlt eine Frequenz aus, die den ausgeprägten Gehörsinn dieser Tiere überfordert und dieses aggressive Verhalten gegenüber unseren Kraftwerken auslöst.\n\nWir lernten zudem, dass sie ein einzigartiges Verdauungsenzym besitzen, das sich als Katalysator bei der metallurgischen Raffination nutzen lässt. Erste Tests zeigen, dass dies die Produktionseffizienz von Legierungen erheblich erhöhen könnte.\n\nUngeachtet dieser Entdeckungen wird es jedoch noch eine Zeit dauern, bis sich unsere Energieproduktion erholen konnte. Unsere Wissenschaftler werden derweil weiterforschen."
 strange_worlds.60.a: "$FASCINATING$"
 strange_worlds.65.name: "Tierischer Magnetismus"
 strange_worlds.65.desc.intro: "Wir glauben, die Ursache für die aggressiven Selbstmordimpulse der Kreaturen auf [Root.GetName] gefunden zu haben.\n\nEine genauere Untersuchung ihrer Echoortung und ihres Sozialverhaltens brachte eine schockierende Wahrheit ans Licht: Die Frequenz ihrer Paarungsrufe ist nahezu identisch mit jenen Geräuschen, die von unserem Stromnetz ausgehen.\n\n"
 strange_worlds.65.desc.common: "Wir könnten die Paarungsrufe der Tiere nachbilden, um sie auf sanfte Weise von unseren Kolonien wegzulocken, und so ihre Anzahl stabil halten. Dies würde es uns auch erlauben, die katalytischen Enzyme aus ihren Exkrementen zu gewinnen, um unsere Legierungsproduktion zu steigern, und es gibt uns gleichzeitig die Möglichkeit, ihre einzigartige Physiologie weiter zu erforschen.\n\n"
 strange_worlds.65.desc.outro: "Es wäre leicht, spezialisierte elektrifizierte Erntemaschinen zu entwickeln, um diese Tiere effizient zu verarbeiten, ohne dass die Energieproduktion darunter leidet."
 strange_worlds.65.desc.devouring_swarm: "$strange_worlds.65.desc.intro$Wir können dieses Wissen für uns nutzen, um die Kreaturen in spezielle Erntemaschinen zu lenken. Möge das Schlemmen beginnen!"
 strange_worlds.65.desc.food: "$strange_worlds.65.desc.intro$$strange_worlds.65.desc.common$Andererseits sind diese Kreaturen zu einem Grundnahrungsmittel auf §Y[Root.GetName]§! geworden.\n\n$strange_worlds.65.desc.outro$"
 strange_worlds.65.desc.no_food: "$strange_worlds.65.desc.intro$Andererseits sind diese Kreaturen eine stetige und nachhaltige Quelle für Biomasse auf §Y[Root.GetName]§!\n\n$strange_worlds.65.desc.outro$"
 strange_worlds.65.a: "Erntet ihre Exkremente."
 strange_worlds.65.b_devouring_swarm: "Zeit zum Fressen!"
 strange_worlds.65.b_default: "Erntet ihr Fleisch."
 strange_worlds.75.name: "Sonderbarer Sand"
 strange_worlds.75.desc: "Unsere [Owner.GetColonistPlural] berichten von merkwürdigen Phänomenen im Sand von §Y[Root.GetName]§!.\n\nAn sonst ruhigen Tagen kamen plötzlich schwere Sandstürme in unmittelbarer Nähe zu unseren Kolonien auf, und auch Flüsse aus schnell dahinfließendem Sand tauchten aus dem Nichts auf, ehe sie genauso jäh wieder verschwanden. Es gibt sogar Berichte über Sanddünen, die sich an einem völlig windstillen Tag bewegen.\n\nBisher fand man keine atmosphärischen oder geologischen Erklärungen für diese Phänomene.\n\nDer Sand hat zwar keinen direkten Schaden angerichtet, aber er stört den Betrieb unserer Kolonie. Eine Untersuchung dieser einzigartigen Phänomene ist noch im Gang."
 strange_worlds.75.a: "Kurios."
 strange_worlds.80.name: "Singender Sand"
 strange_worlds.80.desc: "Die Sandstürme auf §Y[Root.GetName]§! haben begonnen, einen tiefen Brummton auszusenden. In regelmäßigen Abständen ändert sich die Tonhöhe und resoniert in wiederkehrenden Mustern.\n\nDas Phänomen des \"singenden Sands\" lässt sich zwar auf die Eigenschaften freier Partikel zurückführen, doch die Regelmäßigkeit wird dadurch nicht erklärt.\n\nIn einem Tal fand man zudem Dünen, in die seltsame Symbole geätzt sind. Diese Glyphen erscheinen kurz in erhöhten Formationen, bevor sie sich fast augenblicklich wieder auflösen.\n\nWas diesen Sand zu diesen sonderbaren Phänomenen bewegt, ist unklar, aber die Beständigkeit der Muster lässt darauf schließen, dass ein bestimmter Zweck dahinterstecken muss."
 strange_worlds.80.a: "Studiert die Muster."
 strange_worlds.85.name: "Psionischer Sand"
 strange_worlds.85.desc_part1_no_zro: "Unsere für das Studium der Sandstürme auf §Y[Root.GetName]§! verantwortlichen [Owner.GetScientistPlural] entdeckten, dass eine uns unbekannte Art von exotischer Materie mit dem Silikatmaterial verwoben ist."
 strange_worlds.85.desc_part1_zro: "Unsere für das Studium der Sandstürme auf §Y[Root.GetName]§! verantwortlichen [Owner.GetScientistPlural] entdeckten, dass Zro mit dem Silikatmaterial verwoben ist."
 strange_worlds.85.desc_part2_non_machine_common_no_psionic_zroni: "\nAls unsere [Owner.GetResearchers] die Proben untersuchten, überkamen sie kurze, aber mächtige Visionen. Sie sahen die Erscheinungen von Zroni, die durch die mit Glyphen versehenen Dünen des Planeten streiften."
 strange_worlds.85.desc_part2_non_machine_common_no_psionic_no_zroni: "\nAls unsere [Owner.GetResearchers] die Proben untersuchten, überkamen sie kurze, aber mächtige Visionen. Sie sahen die Erscheinungen von fremden Gestalten, die durch die mit Glyphen versehenen Dünen des Planeten streiften."
 strange_worlds.85.desc_part2_non_machine_common_psionic_zroni: "\nAls unsere [Owner.GetResearchers] die Proben untersuchten, überkamen sie kurze, aber mächtige psionische Visionen. Sie sahen die Erscheinungen von Zroni, die durch die mit Glyphen versehenen Dünen des Planeten streiften."
 strange_worlds.85.desc_part2_non_machine_common_psionic_no_zroni: "\nAls unsere [Owner.GetResearchers] die Proben untersuchten, überkamen sie kurze, aber mächtige psionische Visionen. Sie sahen die Erscheinungen von fremden Gestalten, die durch die mit Glyphen versehenen Dünen des Planeten streiften."
 strange_worlds.85.desc_part2_machine_common: "\nAls unsere [Owner.GetResearchers] die Proben untersuchten, trat eine Interferenz in den internen Schaltkreisen auf.\n\n"
 strange_worlds.85.desc_part2_machine_zroni: "$strange_worlds.85.desc_part2_machine_common$Diese starken Störungen verursachten eine Fehlfunktion in der visuellen Verarbeitung, was sie dazu brachte, Erscheinungen von Zroni zu sehen, die durch die mit Glyphen versehenen Dünen des Planeten streiften."
 strange_worlds.85.desc_part2_machine_no_zroni: "$strange_worlds.85.desc_part2_machine_common$Diese starken Störungen verursachten eine Fehlfunktion in der visuellen Verarbeitung, was sie dazu brachte, Erscheinungen von fremden Gestalten zu sehen, die durch die mit Glyphen versehenen Dünen des Planeten streiften."
 strange_worlds.85.desc_part3_common: "\nDiese Erscheinungen scheinen die Quelle dieser Glyphen zu sein. Die Symbole zu entschlüsseln, ist zeitaufwendig, aber wir glauben, dass es sich eindeutig um eine Form der Schriftsprache handelt.\n\n"
 strange_worlds.85.desc_part3_zro: "$strange_worlds.85.desc_part3_common$Wir könnten das Zro einfach aus dem Sand extrahieren, doch dies wird wahrscheinlich auch dazu führen, dass die Erscheinungen verschwinden. Andererseits gibt es hier eine recht große Menge dieser wertvollen Substanz ..."
 strange_worlds.85.desc_part3_no_zro: "$strange_worlds.85.desc_part3_common$Wir könnten die exotische Materie einfach aus dem Sand extrahieren, doch dies wird wahrscheinlich auch dazu führen, dass die Erscheinungen verschwinden. Andererseits könne sich diese einzigartige Substanz, die den physikalischen Grundsätzen zu trotzen scheint, als äußerst wertvoll erweisen."
 strange_worlds.85.a: "Versucht, die Glyphen weiter zu übersetzen."
 strange_worlds.85.b_no_zro: "Extrahiert umgehend die exotische Materie."
 strange_worlds.85.b_zro: "Extrahiert umgehend das Zro."
 strange_worlds.90.name: "Spektakel im Sand"
 strange_worlds.90.desc_intro_zroni: "Wir konnten unser Wissen über die Kultur der Zroni nutzen, um eine neue Glyphe in den Sand von §Y[Root.GetName]§! zu schreiben - das Symbol für eine Begrüßung. Es kam umgehend zu einer Antwort."
 strange_worlds.90.desc_intro_no_zroni: "Dank den in unseren Datenbanken aufgezeichneten Sprachen konnten wir Hunderte von Symbolen in den Sand von §Y[Root.GetName]§! schreiben, die in jeder uns bekannten Schrift eine Begrüßung darstellten. Schließlich kam es zu einer Antwort."
 strange_worlds.90.desc_common: "\nDie Sandstürme lösten sich auf, der Sandfluss kam zum Erliegen und der Klang verstummte. Dann hoben sich ganze Sanddünen in die Luft und nahmen neue Formen an. Aus Sand gebildete Figuren wirbelten in einem komplizierten Spektakel durch die Luft.\n\n"
 strange_worlds.90.desc_storyline_started: "$strange_worlds.90.desc_common$Wir erkannten sofort, dass es sich um eine Geschichte der Zroni handelte - eine Vision von neu gewonnener Macht und schrecklichen Konflikten. Der Sand formte das kosmische Echo der uralten Zivilisation der Zroni.$strange_worlds.90.desc_outro$"
 strange_worlds.90.desc_storyline_finished: "$strange_worlds.90.desc_common$Wir erkannten sofort, dass es sich um eine Geschichte der Zroni handelte - ihren Aufstieg in den Schleier und ihre darauffolgende Vernichtung. Der Sand formte das tragische Ende der uralten Zivilisation der Zroni.$strange_worlds.90.desc_outro$"
 strange_worlds.90.desc_storyline_not_started: "$strange_worlds.90.desc_common$Wir verstanden nur, dass es sich um die Geschichte einer uralten Zivilisation handelte, die eine neue Quelle der Macht fand und schließlich durch diese entzweit und vernichtet wurde.$strange_worlds.90.desc_outro$"
 strange_worlds.90.desc_outro: "\n\nKurz darauf rieselte der psionische Sand wieder zu Boden. Die Stürme sind nicht zurückgekehrt, und wir können nur hoffen, dass dieser Sand für unsere Anwesenheit auf §Y[Root.GetName]§! empfänglicher geworden ist."
 strange_worlds.90.a: "$FASCINATING$"
 strange_worlds.95.name: "Zro-Ernte"
 strange_worlds.95.desc_zroni_tech: "Dank unseres Fachwissens in der Zro-Destillation konnten wir eine beachtliche Menge Zro aus dem Sand auf §Y[Root.GetName]§! extrahieren.$strange_worlds.95.desc_outro$"
 strange_worlds.95.desc_no_zroni_tech: "Unsere Bemühungen, Zro aus dem Sand von §Y[Root.GetName]§! zu gewinnen, hatten nur bedingt Erfolg. Es gelang uns zwar, eine kleine Menge zu extrahieren, doch im Zuge unserer Experimente ging auch viel verloren. Wir haben zumindest viel dabei gelernt.$strange_worlds.95.desc_outro$"
 strange_worlds.95.desc_outro: "\n\nDa die Zro-Kontaminierung beseitigt ist, scheint sich das Verhalten des Sandes normalisiert zu haben, und unsere Kolonie hat nicht mehr mit plötzlichen Sandstürmen zu kämpfen. Was auch immer den Sand manipuliert hat, ist jedoch für immer verloren."
 strange_worlds.105.name: "Plötzliches Verschwinden"
 strange_worlds.105.desc_intro: "Wir verloren den Kontakt zu einem unserer [Owner.GetExplorerPlural] auf §Y[Root.GetName]§!, kurz nachdem man uns von einer möglichen Entdeckung §Yexotischer Gase§! in einem zuvor noch nicht kartierten Tal berichtet hatte.\n\n"
 strange_worlds.105.desc_gestalt_non_machine: "Wir fühlten einen kurzen, aber qualvollen Schmerz, bevor die Knoten verstummten."
 strange_worlds.105.desc_gestalt_machine: "Die Daten der Knoten wurden korrumpiert, ehe sie vollständig offline gingen. Sie sind nicht länger mit dem Netzwerk verbunden."
 strange_worlds.105.desc_non_gestalt: "Beunruhigenderweise endete die letzte Übertragung abrupt mit etwas, was wie ein qualvoller Schrei klang. Wir befürchten das Schlimmste."
 strange_worlds.105.a: "Beunruhigend."
 strange_worlds.110.name: "Ätzende Becken"
 strange_worlds.110.desc: "Da unser [Owner.GetExplorer] auf §Y[Root.GetName]§! verschwand, schickten wir ein neues Team los, um den letzten bekannten Standort seines Vorgängers zu untersuchen. Die Landschaft ist von hoch ätzenden Tümpeln gespickt, die einen Nebel an puren §Yexotischen Gasen§! absondern. Dieser Sumpf ist überdies die Heimat einer widerstandsfähigen heimischen Flora, die in der Lage ist, den extremen Säuregehalt zu überleben.\n\nAuch wenn dies eine lebensfeindliche Umgebung für unsere eigene Spezies ist, könnte sich die weitere Erforschung der Gasnebel als nützliche Ressource für die Kolonie erweisen."
 strange_worlds.110.a: "Untersucht den Nebel."
 strange_worlds.115.name: "Verdauungssumpf"
 strange_worlds.115.desc: "Bei der näheren Untersuchung des Sumpfs auf §Y[Root.GetName]§! durch einen unserer [Owner.GetScientistPlural] wurde einer unserer Beobachter und dessen Ausrüstung von den Ranken der heimischen Flora umschlungen und anschließend in einen der stark ätzenden Tümpel gezogen. Er löste sich beinahe augenblicklich auf. Wir glauben, der vermisste [Owner.GetExplorer] erlitt ein ähnliches Schicksal.\n\nKurz darauf blähten sich die Ranken der Pflanze sichtbar auf und die Konzentration von §Yexotischen Gasen§! erreichte einen Höchstwert. Offenbar nutzt die räuberische Flora die säurehaltigen Sümpfe als externes Verdauungssystem, indem sie Beute mit Hilfe von Jagdranken in die Tümpel hineinzieht, wo die Beute dann aufgelöst wird, damit sie als Nährstoff absorbiert werden kann. Bei diesem Prozess wird auch eine kleine Menge an abbaubarem exotischem Gas freigesetzt.\n\nWir gehen davon aus, dass sich die Biologie dieses Organismus nutzen ließe, um den Abfall der Kolonie in wertvolle Gase umzuwandeln. Alternativ könnten wir die säurehaltigen Becken neutralisieren, um das nährstoffreiche Land für den Ackerbau zurückzugewinnen."
 strange_worlds.115.a: "Kultiviert diese Organismen."
 strange_worlds.115.b: "Neutralisiert sie und nutzt das Land!"
 strange_worlds.120.name: "Sumpfpflanzen neutralisiert"
 strange_worlds.120.desc: "Wir haben den säurehaltigen Sumpf auf §Y[Root.GetName]§! erfolgreich neutralisiert und gleichzeitig die in ihm lebende Flora-Spezies getötet. Die Nebel aus §Yexotischem Gas§! sind ebenfalls verschwunden.\n\nDas gewonnene Land ist ungewöhnlich fruchtbar, was auf die Nährstoffe zurückzuführen ist, die die heimische Flora angesammelt hatte. Wir haben eine wertvolle Fläche für die Landwirtschaft geschaffen!"
 strange_worlds.120.a_ct: "Fügt [This.GetName] §G2§! §Y$district_farming_plural$§! hinzu"
 strange_worlds.120.b.evopred: "Ausgezeichnet! Erntet auch die Überreste."
 strange_worlds.130.name: "Dunkelmaterieerruption"
 strange_worlds.130.desc: "Was sich vermeintlich um einen bereits seit langer Zeit ruhenden Geysir auf §Y[Root.GetName]§! handelt, ist urplötzlich ausgebrochen und hat mit §YDunkler Materie§! durchzogenes Gas in der Atmosphäre freigesetzt.\n\nDer Ausbruch verdunkelte den Himmel und löste schwere Gravitationsanomalien aus, die den Verkehr und die Kommunikation auf und aus der Welt hinaus blockieren.\n\nWir glauben, die Dunkle Materie stammt vom einzigartigen Kern des Planeten. Mehrere Orbitalsauger sind bereits dabei, das Miasma aus der Stratosphäre abzusaugen, da die extremen Bedingungen eine Gefahr für unsere [Owner.GetColonistPlural] darstellen."
 strange_worlds.130.a: "Beobachtet die Lage genaustens."
 strange_worlds.135.name: "Flüssige Dunkelheit"
 strange_worlds.135.desc_common_1: "Wir haben das §Ydunkelmateriedurchsetze Miasma§! erfolgreich aus der Atmosphäre von §Y[Root.GetName]§! abgesaugt und können nun damit beginnen, den verursachten Schaden zu bewerten."
 strange_worlds.135.desc_common_2: "\nAls wir den Kontakt zu unserer Kolonie wiederaufnahmen, stellten wir fest, das alle [Owner.GetColonistPlural] von etwas versteinert worden waren, was erstarrte Dunkle Materie zu sein scheint."
 strange_worlds.135.desc_organic_non_gestalt: "$strange_worlds.135.desc_common_2$ Im Inneren der versteinerten Hüllen wurden noch Lebenszeichen festgestellt, und es gelang uns das, was sie aussendete, mit großer Vorsicht freizulegen."
 strange_worlds.135.desc_machine: "$strange_worlds.135.desc_common_2$ Im Inneren der versteinerten Hüllen wurden noch funktionierende elektronische Signale gemessen und es gelang uns das, was sie aussendete, mit großer Vorsicht freizulegen."
 strange_worlds.135.desc_gestalt: "$strange_worlds.135.desc_common_2$ Wir haben aus dem Inneren den Drang gespürt, sich wieder ins Kollektiv zu integrieren, und es gelang uns das, was diesen Drang verspürte, aus diesem Grabmal zu befreien."
 strange_worlds.135.desc_outro: "\nEntgegen aller Erwartungen scheinen die versteinerten [Owner.GetColonistPlural] keine bleibenden Schäden durch den längeren Kontakt mit Dunkler Materie und durch ihre Stasis davongetragen zu haben.\n\nDer für den Ausbruch verantwortliche Geysir ist mittlerweile mehr oder minder versiegt und hat einen See aus flüssiger Dunkler Materie gebildet.\n\nDieses noch nie zuvor beobachte Ereignis sollte umfassend untersucht werden. Unsere [Owner.GetScientistPlural] sind sich jedoch unsicher, worauf sie ihre ohnehin bereits spärlichen Ressourcen konzentrieren sollen."
 strange_worlds.135.a: "Stellt die Bevölkerung unter Quarantäne und untersucht sie ausgiebig."
 strange_worlds.135.b: "Studiert die Dunkle Materie."
 strange_worlds.140.name: "Dunkle-Materie-Befall"
 strange_worlds.140_intro: "Unsere [Owner.GetScientistPlural] sind sich sicher, dass der §YDunkle-Materie-See§! auf §Y[Root.GetName]§! nur noch eine äußerst geringe Gefahr für den Planeten darstellt. Gleiches kann jedoch nicht über die bei der Bevölkerung auftretenden Symptome gesagt werden.\n\nEine erste Studie der unter Quarantäne stehenden [Owner.GetColonistPlural] ergab physische Veränderungen, die auf ihre Einbettung in dieser Substanz zurückzuführen sind."
 strange_worlds.140_common: "\nDurch den längeren Kontakt wurden die Moleküle ihrer Körper mit Dunkler Materie durchsetzt, "
 strange_worlds.140_machine_1: "$strange_worlds.140_common$was dazu führte, dass ihre Systeme vollständig korrumpiert wurden."
 strange_worlds.140_non_machine_1: "$strange_worlds.140_common$was dazu führte, dass ihr Kreislauf vollständig kontaminiert wurde."
 strange_worlds.140_machine_2: "\nDies birgt zwar das Risiko eines vorzeitigen Systemausfalls, aber es erlaubt es den auf dieser Welt gebauten Einheiten auch, Dunkle Materie effizient zu verarbeiten und zu ernten, wenn wir sie beim Montageprozess Dunkler Materie aussetzen."
 strange_worlds.140_non_machine_2: "\nWir können diese Abnormalitäten gezielt hervorrufen, was es den betroffenen [Owner.GetColonistPlural] erlaubt, Dunkle Materie zu verarbeiten und zu ernten - wenn auch auf Kosten ihrer Lebenserwartung."
 strange_worlds.140.a.dc_empire: "Wir nehmen dieses Geschenk an."
 strange_worlds.140.a.machine_empire: "Fördert diese Abnormalitäten."
 strange_worlds.140.a.normal: "Verarbeitet die Betroffenen."
 strange_worlds.140.b: "Beseitigt die Betroffenen."
 strange_worlds.145.name: "Winziges schwarzes Loch"
 strange_worlds.145.desc: "Eine nähere Untersuchung des Dunkle-Materie-Sees auf §Y[Root.GetName]§! förderte entscheidende Einblicke zutage, die auf die Ursache des Ausbruchs hinweisen könnten.\n\nDer planetare Kern besteht aus einem winzigen schwarzen Loch, das weniger als 1 Meter in der Länge misst. Die riesige Masse des Planeten scheint die erwarteten Gravitationskräfte, die eine solche Anomalie normalerweise aussendet, zu negieren. Offenbar haben die beiden Massen ein empfindliches Gleichgewicht erreicht, das noch eine ganze Weile anhalten dürfte.\n\nDie jüngsten seismischen Aktivitäten führten zu einer Masseverschiebung im inneren Mantel, die den ersten Geysirausbruch verursachte. Der See aus Dunkler Materie selbst wirkt wie ein Pfropfen und hat den Planetenkern stabilisiert und verhindert weitere Ausbrüche.\n\nDer längere Kontakt mit Dunkler Materie war jedoch für jene, die versteinert wurden, nicht so harmlos, wie es zunächst schien.\n\nIm Massezentrum eines jeden betroffenen [Owner.GetColonistPlural] hatte sich ein mikroskopisch kleines schwarzes Loch gebildet, das ihre Körper zum Implodieren brachte.\n\nUnsere jüngste Zählung zeigt, dass wir ungefähr ein Viertel der auf §Y[Root.GetName]§! lebenden Bevölkerung auf einen Schlag verloren haben. An ihrer Stelle sind nun Statuen aus fester Dunkler Materie in verschiedensten Posen über den Planeten verteilt."
 strange_worlds.145.a.no_gestalt: "Bedauerlich."
 strange_worlds.145.a.gestalt: "Entsetzlich."
 strange_worlds.155.name: "Widerwärtiger Schädling"
 strange_worlds.155.desc_homicidal: "Wir sind auf §Y[Root.GetName]§! auf eine besonders ekelerregende Form von Fauna gestoßen.\n\nDiese verfügt über eine Art Verteidigungsmechanismus, der gleichzeitig auch die primäre Methode zur Nahrungsbeschaffung ist. Da der Fauna jegliche Verdauungsenzyme fehlen, um feste Nahrung selbst aufzuspalten, sondert sie ein starkes und abstoßendes Gas aus, das ein projektilartiges Erbrechen auslöst, wenn es von anderen Organismen mit einem funktionierenden Darmsystem eingeatmet wird. Die von diesen Organismen erbrochenen Substanzen werden anschließend von der Fauna als Hauptnahrungsquelle verzehrt.\n\nDiese widerlichen Kreaturen zu beseitigen, stellt eine nützliche Quelle an §Yexotischen Gasen§! und §YNahrung§! dar."
 strange_worlds.155.desc_normal: "Unsere [Owner.GetColonistPlural] auf §Y[Root.GetName]§! sind auf dem Planeten auf eine dort heimische Form von Fauna gestoßen, die eine recht ... einzigartige Methode der Nahrungsbeschaffung aufweist.\n\nObwohl sie anfangs eher scheu war, hat sie sich inzwischen an unsere Anwesenheit gewöhnt und ist aufgrund ihrer freundlichen Art gerade bei den jüngeren [Root.Owner.GetSpeciesNamePlural] sehr beliebt.\n\nSie stellt zwar keine direkte Bedrohung für uns dar, verfügt jedoch über eine Art Verteidigungsmechanismus, der gleichzeitig auch die primäre Methode zur Nahrungsbeschaffung ist. Da der Fauna jegliche Verdauungsenzyme fehlen, um feste Nahrung selbst aufzuspalten, sondert sie ein starkes und abstoßendes Gas aus, das ein projektilartiges Erbrechen auslöst, wenn es von anderen Organismen mit einem funktionierenden Darmsystem eingeatmet wird. Die von diesen Organismen erbrochenen Substanzen werden anschließend von der Flora als Hauptnahrungsquelle verzehrt.\n\nDer ständige Kontakt zu Darmaussonderungen birgt die Gefahr von Infektionskrankheiten, und die örtlichen Behörden haben die [Owner.GetColonistPlural] aufgefordert, sich vorerst von der seltsamen Fauna fernzuhalten."
 strange_worlds.155.a: "Welch einzigartige Xenobiologie!"
 strange_worlds.155.b_purifiers: "Faulige Wesen ..."
 strange_worlds.155.b_swarm: "Ein gewöhnungsbedürftiger Geschmack!"
 strange_worlds.155.b_normal: "Tötet jedes Exemplar, sobald ihr eins seht!"
 strange_worlds.160.name: "Ekelhafte Entwicklung"
 strange_worlds.160.desc: "§Y[Root.GetName]§! von den widerwärtigen Schädlingen zu befreien, hat sich als schwierig erwiesen, da die jüngeren Mitglieder der Kolonie trotz einer offiziellen Warnung mit diesen Tieren spielen.\n\nDies hat dazu geführt, dass die Proteine unseres [Root.Owner.GetSpeciesOrganName]inhalts zu ihrer bevorzugten Nahrungsquelle geworden sind. Unsere Kolonie ist einfach ein viel leichteres Ziel als die restliche planetare Fauna, die gelernt hat, ihren Gasen zu entgehen. Diese Kreaturen haben sich so an uns angepasst, dass sie dabei beobachtet wurden, wie sie einzelne Bewohner der Kolonie, die gerade eine Mahlzeit zu sich genommen hatten, aus dem Hinterhalt zum Erbrechen brachten.\n\nUnglaublicherweise hat die ganze Sache jedoch auch Vorteile. Unsere Wissenschaftler haben herausgefunden, dass die von den Kreaturen abgesonderten Brechgase Partikel wertvoller §Yexotischer Gase§! enthalten, die durch die Domestizierung und ihre Haltung in Quarantäneeinrichtungen geerntet werden könnten.\n\nDer überwiegende Großteil der Kolonie ist jedoch der Meinung, dass wir sie einfach auslöschen sollten."
 strange_worlds.160.a: "Fangt sie ein."
 strange_worlds.160.b: "Genug ist genug. Erschießt sie, sobald ihr sie seht!"
 strange_worlds.165.name: "Ein Hauch frischer Luft"
 strange_worlds.165.desc: "Die Kreaturen auf §Y[Root.GetName]§! verursachen bei den Kolonisten nicht länger einen Massenwürgereiz.\n\nDank der Entwicklung einer synthetischen Nährstoffpaste, die speziell auf ihre Xenobiologie abgestimmt wurde, konnten wir ihren Ernährungszyklus regulieren und damit ihren \"Überfällen\" auf unsere [Owner.GetColonistPlural] ein Ende bereiten.\n\nWir haben die Kreaturen behutsam in ein Wildtierreservat umgesiedelt, wo sie von der Öffentlichkeit in einer sicheren Umgebung beobachtet werden können. Spezielle Betreuer wurden ausgebildet, um ihre §Yexotischen Gase§! zu extrahieren, ohne ihnen weiteren Schaden zuzufügen."
 strange_worlds.165.a: "Eine willkommene Erleichterung."
 strange_worlds.165.a.evopred: "Stellt sicher, dass wir den Geruch nicht übernehmen."
 strange_worlds.170.name: "Bei Sichtkontakt schießen"
 strange_worlds.170.desc: "Nach der offiziellen Einführung der Richtlinie, diese widerwärtigen Kreaturen bei Sichtkontakt zu erschießen, sind mehrere Monate vergangen, seit sie das letzte Mal nahe unserer Kolonie auf §Y[Root.GetName]§! gesichtet wurden.\n\nAuch wenn einige [Owner.GetColonistPlural] die Anwesenheit dieser pelzigen Kreaturen vermissen, sind sie allesamt glücklicher, da sie sich nun frei bewegen können, ohne Angst haben zu müssen, dass sie sich gewaltsam erbrechen.\n\nUnsere Wissenschaftler konnten sogar eine kleine Menge §Yexotischer Gase§! direkt aus den inneren Organen der toten Tiere extrahieren."
 strange_worlds.170.a: "Sie wollten es so."
 strange_worlds.185.name: "Distriktübergreifende Feindseligkeiten"
 strange_worlds.185.desc: "Berichte aus §Y[Root.GetName]§! zeigen, dass es zwischen der Land- und Stadtbevölkerung immer häufiger zu Konflikten kommt. Es scheint jedoch keinen erkennbaren Grund für diese Feindseligkeit zu geben, außer ihrer willkürlichen geografischen Lage.\n\nZugewanderten begegnet man zunächst mit Feindseligkeit, doch schon wenige Wochen nach ihrer Zuweisung werden sie von der Gemeinschaft ihres neuen Distrikts wohlwollend aufgenommen. Unsere Wissenschaftler sind davon überzeugt, dass dieses merkwürdige Verhalten seinen Ursprung irgendwo innerhalb der Distrikte haben muss.\n\nWährend wir die Angelegenheit untersuchen, müssen wir gleichzeitig auch für Stabilität sorgen, um eine weitere Eskalation zu verhindern. Wir können entweder einen der beiden Distrikte offiziell unterstützen oder aber Friedenserhaltungstruppen entsenden."
 strange_worlds.185.a: "Unterstützt die städtischen Distrikte."
 strange_worlds.185.b: "Unterstützt die ländlichen Distrikte."
 strange_worlds.185.c: "Entsendet Friedenserhaltungstruppen."
 strange_worlds.190.name: "Etwas ist im Wasser"
 strange_worlds.190.desc_intro: "Nach einer gründlichen Untersuchung der Umwelt auf §Y[Root.GetName]§! fanden unsere Wissenschaftler endlich die Ursache für die distriktübergreifenden Feindseligkeiten.\n\nTief im Erdmantel des Planeten verborgen liegt der verwesende Leichnam eines Riesenorganismus. Durch Jahrtausende der Zersetzung sickerte die Rückenmarksflüssigkeit der bereits vor langer Zeit verstorbenen Kreatur in das Grundwasser und verseuchte es mit einer psionischen Bakterie. Diese bewusstseinsverändernde Mikrobe gelangte anschließend in das Nervensystem unserer [Owner.GetColonistPlural] und löste starke territoriale Instinkte aus - wahrscheinlich Eigenschaften des ursprünglichen Organismus.\n\n"
 strange_worlds.190.desc_non_psionic: "Wir sollten das Problem beseitigen können, indem wir das Trinkwasser durch speziell dafür vorgesehene Filter laufen lassen.\n\n"
 strange_worlds.190.desc_psionic: "Diese exotische Unreinheit beeinträchtigt unsere natürlichen psionischen Fähigkeiten.$strange_worlds.190.desc_non_psionic$"
 strange_worlds.190.desc_outro_non_psionic: "Alternativ sind unsere Wissenschaftler zuversichtlich, dass sie das Bakterium auf zellularer Ebene genetisch so modifizieren könnten, dass sich die territorialen Tendenzen womöglich zu etwas Produktiverem umwandeln ließen."
 strange_worlds.190.a: "Filtert das Grundwasser."
 strange_worlds.190.b: "Versucht, die Bakterien genetisch zu modifizieren."
 strange_worlds.195.name: "Aufkeimende Fähigkeiten"
 strange_worlds.195.desc_intro: "Der Einsatz von Wasserfiltern auf §Y[Root.GetName]§! war ein voller Erfolg.\n\n"
 strange_worlds.195.desc_psionic: "Die hyperterritoriale Aggression hat nachgelassen und unsere psionischen Fähigkeiten werden nicht länger beeinträchtigt. Vielmehr werden sie durch das natürliche Probiotikum, das eine §Ypsionische Ephapse§! zwischen den auf §Y[Root.GetName]§! lebenden Kolonisten fördert, sogar verbessert. Dies hat sowohl die telepathische Verbindung gestärkt als auch das Gemeinschaftsgefühl gefördert und gleichzeitig die Produktivität gesteigert."
 strange_worlds.195.desc_non_psionic: "Die hyperterritoriale Aggression hat nachgelassen und die natürlichen Probiotika haben bei der Bevölkerung sogar einen nützlichen Nebeneffekt in Form einer §Ypsionischen Ephapse§! zwischen den auf §Y[Root.GetName]§! lebenden [Owner.GetColonistPlural]. Dies erlaubt es den Kolonisten, auf telepathischer Ebene miteinander zu kommunizieren. Zudem stärkt es das Gemeinschaftsgefühl und erhöht die Produktivität."
 strange_worlds.195.a: "Sehr gut."
 strange_worlds.195.a_ct: "Alle Bewohner auf §Y[Root.GetName]§! erhalten \"§YPsionische Ephapse§!\""
 strange_worlds.195.a.evopred: "Schmeckt ... §Mmerkwürdig§!."
 strange_worlds.195.a_ct.evopred: "Unsere Primärspezies erhält die Eigenschaft \"§Y$trait_psionic_ephapse$§!\""
 strange_worlds.200.name: "Bakterielle Resequenzierung"
 strange_worlds.200.desc: "Wir konnten die negativen Effekte des bakteriellen Organismus auf §Y[Root.GetName]§! erfolgreich neutralisieren. Die distriktübergreifenden Kämpfe zwischen den [Owner.GetColonistPlural] haben aufgehört und die Produktivität ist bereits bis zu einem gewissen Maß wieder gestiegen.\n\nUnsere Wissenschaftler sind sich zudem sicher, dass sie den genetischen Code der Mikrobe zu unserem Vorteil verändern könnten. Mit der richtigen Sequenzierung ihres Genoms könnten wir gezielt einen Aspekt unserer [Owner.GetColonistPlural] verbessern.\n\nDa die psionische Verbindung zwischen den Mitochondrien und dem Kadaver der fremden Spezies intakt bleiben muss, damit sich die Bakterien vermehren können, überlebt der daraus resultierende neue Mikroorganismus keinen Transport auf andere Welten. Wir verstehen noch nicht ganz, warum dem so ist."
 strange_worlds.200.a: "Verbessert die Reproduktionsfähigkeit."
 strange_worlds.200.b: "Verbessert die Stärke."
 strange_worlds.200.c: "Verbessert die kognitiven Fähigkeiten."
 strange_worlds.1000.name: "Mineralisierte Lavaröhren"
 strange_worlds.1000.desc: "Beim Trockenlegen von §Y[From.GetName]§! wurde ein ausgedehntes Netz von Lavaröhren auf dem Meeresboden entdeckt.\n\nDer Magmafluss, der diese tiefen Tunnel einst schuf, ruht nun und hinterließ ein reiches Mineralienvorkommen, das vor langer Zeit durch die extreme Hitze und den Druck des geschmolzenen Kerns von §Y[From.GetName]§! entstand.\n\nDiese Vorkommen verfügen über eine immense Dichte, und auch wenn der Abbau kostspielig sein wird, ist er sehr lukrativ."
 strange_worlds.1005.name: "Hydroaktive Eier"
 strange_worlds.1005.desc: "Das Terraforming von §Y[From.GetName]§! führte zu einem unerwarteten Anstieg, was die Populationen der heimischen Fauna anbelangt.\n\nWir haben entdeckt, dass die Brutzyklen vieler lokaler Spezies untrennbar mit der Verfügbarkeit von Wasser in ihrer Umwelt verbunden sind. Ihre Eier, die zuvor monatelang im Boden vergraben waren, um genug Wasser aufnehmen zu können, sind jetzt in großer Zahl an der Oberfläche zu finden. Die Menge an heimischer Fauna steigt in einem logarithmischen Tempo rapide an.\n\nViele der Kreaturen sind äußerst nährstoffreich und damit eine ideale Nahrungsquelle für §Y[From.GetName]§!. Das aktive Ökosystem ist auch ein hervorragender Ort für Studien. Der einzige Nachteil: Besucher des Planeten müssen sich bei ihrer Abreise gründlich durchchecken lassen, um eine Kontamination anderer Welten zu verhindern."
 strange_worlds.1005.evopred: "Lässt sich diese Geschwindigkeit andernorts wiederholen?"
 strange_worlds.1010.name: "Im Eis konserviert"
 strange_worlds.1010.intro: "Das Terraforming von §Y[From.GetName]§! hat eine überraschend große Anzahl heimischer Fauna freigelegt, die im Oberflächeneis konserviert war. Noch erstaunlicher ist jedoch, dass diese Kreaturen noch am Leben sind.\n\nDiese Spezies scheint inmitten eines außergewöhnlich tiefen Winterschlafs gewesen zu sein - eine wirksame Methode, um die langen Eiszeiten auf §Y[From.GetName]§! zu überleben. Das durch unser Terraforming verursachte Tauwetter hat ihre Stasis nun jedoch vorzeitig beendet.\n\nDie aus ihrem eisigen Schlummer geweckten Kreaturen zeigen bereits erste Anzeichen von Intelligenz und nutzen einfache Werkzeuge bei der Nahrungssuche.\n\n"
 strange_worlds.1010.desc_exterminate: "$strange_worlds.1010.intro$Wir werden sie unverzüglich ausrotten und die Biomasse für unsere eigenen Zwecke ernten."
 strange_worlds.1010.desc_hunted: "$strange_worlds.1010.intro$Ihre einzigartige Physiologie wird eine gute Nahrungsquelle für uns sein."
 strange_worlds.1010.desc_tolerated: "$strange_worlds.1010.intro$Wir können entweder die erstaunlichen Winterschlafeigenschaften der Spezies studieren oder aber ihre Biomasse ernten."
 strange_worlds.1010.desc_protected: "$strange_worlds.1010.intro$Wir sollten diese Lebensformen schützen. Ihre Winterschlafeigenschaften rechtfertigen weitere Untersuchungen."
 strange_worlds.1010.a.purge: "Erntet ihre Biomasse."
 strange_worlds.1010.b.hunted: "Jagt sie."
 strange_worlds.1010.c.study: "Studiert sie."
 strange_worlds.1010.d.purge: "Erntet ihre Biomasse."
 strange_worlds.1010.e.protect: "Beschützt sie."
 strange_worlds.1015.name: "Stahlberge"
 strange_worlds.1015.desc: "Unsere Terraformingspezialisten auf §Y[From.GetName]§! haben uns auf ein bevorstehendes Problem aufmerksam gemacht.\n\nUnter der gefrorenen Gebirgskette des Planeten verborgen liegen hoch konzentrierte Eisen- und Karbonvorkommen, die vom Terraformingprozess stark erhitzt wurden.\n\nWir können die jetzt geschmolzenen Ressourcen sicher entfernen oder aber wir erhitzen sie weiter, um eine immerwährende Quelle für Legierungen zu erschaffen. Dies würde jedoch bedeuten, dass wir wertvollen Wohnraum verlieren würden."
 strange_worlds.1015.a: "Baut die Ressourcen ab."
 strange_worlds.1015.b: "Unternehmt nichts."
 strange_worlds.1020.name: "Entflammbare Atmosphäre"
 strange_worlds.1020.desc: "Das Terraforming von §Y[From.GetName]§! hatte unerwartete Nebenwirkungen: Entgegen unserer Aufzeichnungen war der Mutterboden des Planeten mit einem feinen Partikelgemisch aus hoch konzentrierten §YFlüchtigen Teilchen§! durchzogen, die durch unseren Terraformingprozess aufgewühlt wurden und in die planetare Atmosphäre gelangt sind.\n\nDa diese hochenergetischen Partikel in der Luft zu unbeabsichtigten Bränden auf der Oberfläche führen können, muss jede künftige Kolonie umfangreiche Sicherheitsmaßnahmen durchlaufen, damit es nicht zu einer verheerenden Katastrophe kommt.\n\nSollten wir es jedoch schaffen, der Lage Herr zu werden, ist die Atmosphäre von §Y[From.GetName]§! eine gute Quelle für diese seltenen Materialien für uns."
 strange_worlds.1025.name: "Blaue Lava"
 strange_worlds.1025.desc: "Die Erdkruste von §Y[From.GetName]§! hat sich infolge unseres Terraformings verschoben und ein ungewöhnliches Naturphänomen hervorgebracht.\n\nDas Verschieben der tektonischen Platten setzte mehrere Blasen §Yexotischer Gase§! frei, die mit den §Ylegierungsreichen§! Mineralvorkommen von Vulkanen reagierten und dafür sorgten, dass deren Ausbrüche einen kräftigen blauen Farbton annahmen.\n\nWegen der Unbeständigkeit dieses Phänomens ist der Planet jedoch nicht mehr so bewohnbar, was sich auf unsere Pläne zur Schaffung von neuem Lebensraum für unsere [Root.GetColonistPlural] ausgewirkt hat.\n\nZumindest ist der Boden rund um die Vulkane reich an Ressourcen, die wir nutzen können."
 strange_worlds.1030.name: "Immerwährendes Gewitter"
 strange_worlds.1030.desc: "Wir haben Berichte über ein einzigartiges Wetterphänomen auf §Y[From.GetName]§! erhalten.\n\nDas Terraforming legte kristalline Vorkommen im Grundgestein frei, die mit den für das Terraforming verwendeten Chemikalien reagierten und infolgedessen verstrahlt wurden. Die daraus resultierende schwankende Lufttemperatur hat nun zu einem ewigen Gewitter auf dem ganzen Planeten geführt.\n\nDiese einzigartigen Wetterbedingungen werden sich unweigerlich auf den Infrastrukturausbau auswirken, und die verstrahlten Kristalle senken die Bewohnbarkeit langfristig. Unsere [Owner.GetScientistPlural] sind jedoch zuversichtlich, dass sie die Energie der Stürme nutzbar machen können, sobald das Terraforming abgeschlossen ist.\n\nAlternativ haben unsere [Owner.GetEngineerPlural] einen Plan entwickelt, um die Ladung der Kristallvorkommen zu neutralisieren. Dies sollte die Stürme auflösen und es uns erlauben, die Kristalle abzubauen."
 strange_worlds.1030.a: "Nutzt die Energie dieser Stürme."
 strange_worlds.1030.b: "Neutralisiert die Kristalle."
 strange_worlds.1035.name: "Winterschläfer"
 strange_worlds.1035.desc: "Unsere Studien der beinahe vernunftbegabten Bevölkerung auf §Y[event_target:hibernator_planet.GetName]§! verschafften uns Einblicke in ihre unglaublichen Winterschlafmuster. Ihre Schlafphase wird durch ein bestimmtes Enzym reguliert, das den Ein- und Austritt des Körpers in den Tiefschlaf auslöst. In diesem Zustand sind die chemischen Reaktionen in ihrem Körper auf nahezu vernachlässigbare Mengen reduziert.\n\nEs ist uns gelungen, dieses Enzym zu extrahieren und es in Form eines Beruhigungsmittels verschiedenen anderen Organismen zu verabreichen. Arten, die zuvor nicht in der Lage waren, Winterschlaf zu halten, konnten dadurch in einen langen Ruhezustand versetzt werden, der die Zellalterung für die Dauer des Schlafs erheblich reduzierte.\n\nDieser außergewöhnliche Durchbruch ebnet uns den Weg für einen künstlichen Kryoschlaf, der die physische Belastung von Langstreckenreisen durch den Weltraum auf organische Spezies erheblich verringert."
 strange_worlds.1040.name: "Himmelsgräber"
 strange_worlds.1040.desc: "Nach Abschluss des Terraformingsprozesses auf §Y[From.GetName]§! begannen tote Körper vom Himmel zu fallen.\n\nSie fielen aus solchen Höhen, dass sich die uralten Leichname beim Aufprall in Brei verwandelten. Unter den Eingeweiden entdeckte man kleinere Objekte - Verzierungen und seltsame Relikte -, die alle aus denselben dichten Wolken in der oberen Atmosphäre des Planeten herabstürzten.\n\nDiese dichten Wolken, von denen wir nur annehmen können, dass sie eine uns unbekannte Spezies als letzte Ruhestätte nutzte, wurden durch unseren Terraformingprozess dünner, wodurch sie den in ihnen befindlichen Inhalt nicht länger zu halten vermochten. Es ist zu erwarten, dass diese sterblichen Überreste noch eine Zeit lang weiter auf der Oberfläche einschlagen, bis alle Gräber vollständig entleert wurden."
 strange_worlds.1040.a: "Grausam, aber potenziell lukrativ."
 strange_worlds.1040.b: "Das ist unhygienisch. Beseitigt sie unverzüglich."
 strange_worlds.1050.name: "Orbitaltrümmer"
 strange_worlds.1050.desc: "Unsere Terraformingingenieure auf §Y[event_target:junk_moon_planet.GetName]§! sehen sich wegen des Weltraummülls und anderer kleinerer Trümmer, die den Planeten umkreisen, mit gefährlichen Arbeitsbedingungen konfrontiert. Die große Anzahl an Objekten stellt besonders für die Navigation der Shuttles auf dem Weg zur und von der Oberfläche eine Gefahr dar.\n\nAngesichts der schieren Dichte an Material wurde vorgeschlagen, die größten Objekte zu magnetisieren, damit sie kleinere Fragmente anziehen und sich alles zu einer kontrollierbareren Einheit verbindet. Wir gehen davon aus, dass auf diese Weise ein künstlicher Mond entstehen könnte.\n\nDies würde zwar den Terraformingprozess verlangsamen, doch es würde auch den Shuttleverkehr sicherer machen und das Risiko beseitigen, dass größere Orbitaltrümmer in die Atmosphäre des Planeten eindringen und auf die Oberfläche stürzen."
 strange_worlds.1050.a: "Erschaffen wir uns einen Mond!"
 strange_worlds.1050.b: "Es wird schon von selbst in der Atmosphäre verbrennen."
 strange_worlds.1060.name: "Schrottmond"
 strange_worlds.1060.desc: "Unsere Bemühungen, den Weltraummüll, der §Y[event_target:junk_moon_planet.GetName]§! umkreist, zu einer Einheit zu verbinden, waren erfolgreich.\n\nIndem wir mehrere der größeren Teile magnetisierten, konnten wir nach und nach alles zu einem einzigen massiven Schrottkugel vereinen. Die Masse ist derart dicht geworden, dass sie mittlerweile eine eigene nennenswerte Anziehungskraft besitzt. Dieser neu geschaffene Mond hat sich auf einer stabilen Umlaufbahn eingependelt.\n\nDer Zugang zur Oberfläche von §Y[event_target:junk_moon_planet.GetName]§! ist ohne die gefährlichen Orbitaltrümmer nun deutlich einfacher, und wir müssen auch nicht länger befürchten, dass sie auf der Oberfläche einschlagen. Unsere Ingenieure sind sogar zuversichtlich, dass der neue Mond eine Bergbaustation unterhalten könnte."
 strange_worlds.1060.create_moon_ct: "[event_target:junk_moon_planet.GetName] hat einen neuen Mond: Schrottmond."
 site_abandoned_bio_lab: "Uralte Einrichtung"
 abandoned_bio_lab_desc: "Unsere Scans von §Y[fromfrom.planet.GetName]§! entdeckten eine abgelegene Anlage in der unzugänglichsten Region. Die Struktur ist verwittert, scheint verlassen zu sein und verfügt über keinerlei Energiesignatur. Eine archäologische Ausgrabung könnte uns wertvolle Erkenntnisse liefern."
 strange_worlds.2000.name: "Aufgegebenes Biolabor"
 strange_worlds.2000.desc: "Im Inneren der Anlage wurde eine Vielzahl von medizinischen Geräten, Behandlungsräumen sowie eine Leichenhalle entdeckt, in der man organische Überreste konservierte, die Anzeichen einer Krankheit und Deformationen aufwiesen. Die vielen Sicherheitstüren, Überwachungsvorrichtungen und Arrestzellen führten §H[universal_macrophage_scientist.GetName]§! zu der Annahme, dass man hier etwas gegen seinen Willen gefangen hielt.\n\nWir konnten ein paar der medizinischen Geräte bergen, doch der Großteil ist zu stark verfallen. Auf den Computersystemen sind ebenfalls nur wenig Daten vorhanden, und die, die wir fanden, müssen erst noch übersetzt werden."
 strange_worlds.2005.name: "Uralte Immunologie-Forschung"
 strange_worlds.2005.desc: "§H[universal_macrophage_scientist.GetName]§! hat eine vorläufige Übersetzung der ersten Datei angefertigt, die man in dem Biolabor auf §Y[fromfrom.planet.GetName]§! fand:\n\n§LLabor 17 - Fortschrittsbericht - Forschungsleiter Gelebor\n\nDer neue Prototyp zeigt vielversprechende Ergebnisse. Das Immunsystem der Probanden konnte um das Millionenfache gestärkt und sämtliche Krankheitserreger erfolgreich abgetötet werden. Nebenwirkungen: tödliche Mutationen. Es gibt keine Überlebenden. Wir werden es erneut versuchen. Der Universalmakrophage ist in greifbarer Nähe. Dessen bin ich mir sicher.§!"
 strange_worlds.2010.name: "Gelebors Entscheidung"
 strange_worlds.2010.desc: "§H[universal_macrophage_scientist.GetName]§! hat eine weitere Datei von dem aufgegebenen Forschungslabor auf §Y[fromfrom.planet.GetName]§! übersetzt:\n\n§LLabor 17 - Internes Mitarbeitermemo - Forschungsleiter Gelebor\n\nSehr geehrte Mitarbeiter, ich erhielt am heutigen Tage den Befehl zum Abbruch des Projekts. Die Geduld unseres Herrn ist am Ende. Und das, wo wir so dicht vor unserem Ziel stehen! Doch die Fertigstellung des Universalmakrophagen ist wichtiger als die Launen eines Einzelnen. Eine krankheitsfreie Zukunft ist zum Greifen nah! Spielen da ein paar mehr Leben überhaupt eine Rolle?\n\nSollten wir keine weiteren Probanden erhalten, werde ich den neusten Prototypen an mir selbst testen. Schließt Ihr Euch mir an?§!"
 strange_worlds.2010.a: "Geht mit äußerster Vorsicht vor."
 strange_worlds.2015.name: "Der Universalmakrophage"
 strange_worlds.2015.desc: "§H[universal_macrophage_scientist.GetName]§! konnte auch den letzten Forschungsbericht übersetzen, den man auf den Computern des Biolabors auf §Y[fromfrom.planet.GetName]§! fand:\n\n§LLabor 17 - Letzter Bericht - Forschungsassistent Filidor\n\nGelebors Überzeugung war so groß, dass wir ihm blindlings folgten.\n\nAls wir den Prototyp an uns selbst testeten, wurde unser Immunsystem zunächst gestärkt. Wir waren gegenüber allen Krankheitserregern immun. Doch dann begannen die Mutationen ...\n\nGelebor starb als Erstes. Es war schwierig, dabei zuzusehen. Nun ruht das gesamte Team in der Leichenhalle, und auch ich werde mich ihm bald anschließen.\n\nWir sind gescheitert. Wir haben Gelebor und seiner fehlerhaften Formel unser Leben anvertraut. Versteht mich nicht falsch: Der Universalmakrophage wirkt gut - so gut, dass er schließlich auch den Wirt selbst angreift. Alles in diesem Labor muss vernichtet werden.§!"
 strange_worlds.2015.a: "Brennt alles nieder."
 strange_worlds.2015.b: "Beendet Gelebors Arbeit. Sie sieht vielversprechend aus."
 strange_worlds.2015.b.mutation: "Wir sind bereits Meister der Mutation. Beenden wir die Arbeit."
 has_tr_mutation_finish_tt: "Diese Option ist verfügbar, weil wir den Traditionsbaum \"§Y$Mutation$§!\" abgeschlossen haben."
 strange_worlds.2015.c: "Diese fehlerhafte Forschung könnte sich noch als nützlich erweisen."
 strange_worlds.2030.name: "Tödliche Mutationen"
 strange_worlds.2030.desc: "Bei den Bewohnern von §Y[Root.GetName]§! wurden schwere körperliche Mutationen festgestellt, die Zellen und lebenswichtige Organe zerstören. Auch wenn diese Veränderungen in einigen wenigen Fällen den Stoffwechsel angeregt haben, kommt es immer häufiger zu Todesfällen.\n\nDie Nebenwirkungen decken sich genau mit jenen, die in den Forschungsnotizen über den §YUniversalmakrophagen§! erwähnt wurden. Trotz all unserer Bemühungen haben wir noch keinen Weg gefunden, die todbringenden Mutationen aufzuhalten. Wir können dieser Technologie nicht länger trauen. Wir müssen die verbliebenen Bestände vernichten und die weitere Nutzung aufgeben."
 strange_worlds.2030.ct: "§Y[Root.GetName]§! verliert 100 £pop£ Bewohner und weitere 100 £pop£ Bewohner für jeweils $@macrophage_kill_pop_every_x$ £pop£ Bewohner vor Ort\nAlle organischen £pop£ Bewohner auf §Y[Root.GetName]§! erhalten §YGeleborische Mutationen§! und ihre Physiologie ändert sich drastisch."
 site_anomalous_cube: "Anomaler Kubus"
 anomalous_cube_desc: "Ein riesiger metallischer Kubus wurde auf §Y[Planet.GetName]§! gefunden. Die nahtlose Form lässt auf eine fortschrittliche Technologie schließen, doch wir kennen weder seinen Ursprung noch seine Funktion. Eine archäologische Expedition könnte Antworten liefern."
 strange_worlds.2035.name: "Sich kräuselndes Metall"
 strange_worlds.2035.desc_intro: "Eine nähere Untersuchung des mysteriösen Kubus auf [fromfrom.planet.GetName] hat mehr Fragen als Antworten aufgeworfen. Die Oberfläche weist eine perfekte Glätte auf, hat keinerlei Schweißnähte und ist für unsere Scanner undurchdringlich. Als sich unser Team dem Kubus näherte, schien sich das imposante Äußere jedoch als Reaktion auf unsere Anwesenheit zu kräuseln."
 strange_worlds.2035.desc_lm: "$strange_worlds.2035.desc_intro$ §H[event_target:anomalous_cube_scientist.GetName]§! ist zu dem Schluss gekommen, dass es sich bei dem Kubus um eine Form von §Ylebendem Metall§! handelt."
 strange_worlds.2035.desc_no_lm: "$strange_worlds.2035.desc_intro$ §H[event_target:anomalous_cube_scientist.GetName]§! ist zu dem Schluss gekommen, dass der Kubus aus einem sonderbaren Metall besteht, das anders als alles ist, was wir bisher gesehen haben."
 strange_worlds.2035.a: "Setzt die Untersuchungen fort."
 strange_worlds.2040.name: "Ins Innere des Kubus"
 strange_worlds.2040.desc: "Als §H[event_target:anomalous_cube_scientist.GetName]§! den metallischen Kubus auf [fromfrom.planet.GetName] näher untersuchen wollte, kräuselte sich eine Seite der Oberfläche so weit, dass sie eine Öffnung ins Innere schuf. Im Inneren befand sich eine Kommandokonsole, die von einem verwesten Molluskoiden besetzt war. Die fleischliche Hülle, die ihn einst am Leben hielt, ist zu einem bleichen Staub zerfallen.\n\nAuf der Konsole befand sich auch ein ungewöhnlicher Behälter, aus dem gelegentlich ein dumpfes Klirren zu hören ist, was vermuten lässt, dass sich im Inneren etwas bewegt. Der Behälter verfügt jedoch über einen derart komplexen Verschluss, dass es §H[event_target:anomalous_cube_scientist.GetName]§! bislang noch nicht gelungen ist, ihn zu öffnen."
 strange_worlds.2040.evopred: "Sicherlich können wir den Staub noch nutzen."
 strange_worlds.2045.name: "Audioprotokoll gefunden"
 strange_worlds.2045.desc: "Bei der Datendurchsicht der zentralen Steuerkonsole im Inneren des Kubus gelang es §H[event_target:anomalous_cube_scientist.GetName]§!, zwei kurze Audioprotokolle zu dechiffrieren. Diese enthielten eine Reihe von Kehllauten und harten Glottalpausen, die von einem einzelnen Sprecher kamen. Durch einen Querverweis in unserer linguistischen Datenbank fand §H[event_target:anomalous_cube_scientist.GetName]§! ein vergleichbares Sprachmuster in einer sehr alten Sprache und konnte eine vorläufige Übersetzung anfertigen:\n\n§L\"Geehrter Vorsitz, Ihr müsst mich anhören. Es ist noch immer Zeit, diesen Krieg abzuwenden. Das Vertrauen Eurer geschätzten Dynasten ist fehlgeleitet. Wir können [event_target:anomalous_cube_fallen_empire.GetName] nicht besiegen. Sie werden uns vernichten!\n\nEine Versöhnung ist der einzige Weg. Diese Kiste enthält ein Geschenk, ein Zeichen des Friedens: die Geheimnisse unseres lebenden Metalls. Wir können unsere Auslöschung nur abwenden, wenn wir es ihnen geben.\"§!"
 strange_worlds.2045.a: "Übersetzt das zweite Audioprotokoll."
 strange_worlds.2050.name: "Das Wunder des Lebenden Metalls"
 strange_worlds.2050.desc_intro: "Das zweite Audioprotokoll aus der Steuerkonsole des Kubus konnte übersetzt werden:\n\n§L\"Geehrter Vorsitz, ich habe versagt. Unsere Vernichtung steht kurz bevor, und wir können sie nicht mehr abwenden.\n\nMein hexaedrisches Raumschiff wurde sabotiert. Ich werde versuchen, auf [fromfrom.planet.GetName] notzulanden. Selbst wenn ich überlebe, wird das Friedenszeichen nicht übergeben werden. [event_target:anomalous_cube_fallen_empire.GetName] wird uns wie befürchtet angreifen.\"§!\n\n§H[event_target:anomalous_cube_scientist.GetName]§! hat es auch geschafft, den Verschluss des Behälters zu aktivieren. In Letzterem befand sich ein merkwürdiger Metallklumpen. Er ist leicht formbar und hyperaktiv und bildet alle paar Sekunden immer neue komplizierte Formen."
 strange_worlds.2050.desc_no_war_lm: "\nWir können diese Kuriosität nutzen, um unser Verständnis über lebendes Metall zu vertiefen, oder aber das tun, was die vorherigen Besitzer vorhatten und ihn [event_target:anomalous_cube_fallen_empire.GetName] als Geschenk überreichen, um unser Ansehen zu verbessern."
 strange_worlds.2050.desc_no_war_no_lm: "\nWir können diese Kuriosität nutzen, um unser Verständnis über dieses erstaunliche Metall zu vertiefen, oder aber das tun, was die vorherigen Besitzer vorhatten und ihn [event_target:anomalous_cube_fallen_empire.GetName] als Geschenk überreichen, um unser Ansehen zu verbessern."
 strange_worlds.2050.desc_war_lm: "\nDer erstaunliche Gegenstand und das quaderförmige Gefäß, in dem man ihn aufbewahrte, werden genutzt, um unser Verständnis von lebendem Metall zu vertiefen."
 strange_worlds.2050.desc_war_no_lm: "\nDer erstaunliche Gegenstand und das quaderförmige Gefäß, in dem am ihn aufbewahrte, werden genutzt, um unser Verständnis über metallische Verbindungen und Strukturen zu vertiefen."
 strange_worlds.2050.a_no_war: "Übergebt es [event_target:anomalous_cube_fallen_empire.GetName]."
 strange_worlds.2050.b_fallen_not_defeated_no_war: "Wir sollten es behalten."
 strange_worlds.3005.name: "Verdächtiger Prophet"
 strange_worlds.3005.desc: "Bei der Beobachtung der Bevölkerung von §Y[event_target:pre_ftl_planet.GetName]§! machte unser Außenteam eine interessante Entdeckung:\n\nIn der Hauptstadt wird von einem \"Auserwählten\" geredet, der angeblich von den Sternen kam, um eine uralte Prophezeiung zu erfüllen und die [event_target:pre_ftl_planet.Owner.GetSpeciesNamePlural] in ein Goldenes Zeitalter zu führen.\n\nDa bei einer Durchzählung unseres eigenen Personals niemand vermisst wurde, könnte es sich lohnen, das Geschehen und diesen sogenannten \"Propheten\" weiter zu beobachten."
 strange_worlds.3005.a: "Findet mehr heraus."
 strange_worlds.3010.name: "Falscher Prophet"
 strange_worlds.3010.desc_intro: "Unser Außenteam konnte bei der genaueren Untersuchung des \"Auserwählten\" auf §Y[event_target:pre_ftl_planet.GetName]§! die wahre Identität des Fremden ermitteln:\n\n"
 strange_worlds.3010.desc_no_megacorp: "Es handelt sich dabei um einen §YNomaden der Namarianer§!, der vorgibt, eine wichtige Figur aus der [event_target:pre_ftl_planet.Owner.GetSpeciesNamePlural]-Mythologie zu sein, der \"von den Sternen herabgestiegen\" ist."
 strange_worlds.3010.desc_megacorp: "Es handelt sich dabei um einen §Y[event_target:caravaneer_fleet3_country.GetSpeciesName]-Reisenden§!, der vorgibt, eine wichtige Figur aus der [event_target:pre_ftl_planet.Owner.GetSpeciesNamePlural]-Mythologie zu sein, der \"von den Sternen herabgestiegen\" ist."
 strange_worlds.3010.desc_outro: "\nBei der weiteren Erkundung des Planeten wurde das abgestürzte und funktionsunfähige Schiff des sogenannten \"Propheten\" gefunden, das in einem unzugänglichen Tal in einiger Entfernung von der Hauptstadt abstürzte. Dem veralteten Hyperantrieb nach zu urteilen, ist es schon seit einiger Zeit hier.\n\nSeit der \"Prophet\" hier gestrandet ist, scheint er den örtlichen Aberglauben zu seinem Vorteil zu nutzen und lässt sich von den Einheimischen als \"Herrscher mit himmlischem Wissen\" anbeten.\n\nSollten wir den Machenschaften dieses Scharlatans keinen Einhalt gebieten, hat seine Anwesenheit auf dem Planeten mit Sicherheit schwerwiegende Konsequenzen für die Entwicklung der Gesellschaft. Es könnte am klügsten sein, einzugreifen."
 strange_worlds.3010.a: "Entlarvt ihn als den Betrüger, der er ist."
 strange_worlds.3010.b: "Bietet an, ihn zu retten."
 strange_worlds.3015.name: "Wahrheit offenbart"
 strange_worlds.3015.desc_no_megacorp: "Wir haben den §YNomaden der Namarianer§! auf §Y[event_target:pre_ftl_planet.GetName]§!, der vorgab, der \"Auserwählte\" aus der [event_target:pre_ftl_planet.Owner.GetSpeciesNamePlural]-Mythologie zu sein, erfolgreich entlarvt."
 strange_worlds.3015.desc_megacorp: "Wir haben den §Y[event_target:caravaneer_fleet3_country.GetSpeciesNamePlural]-Reisenden§! auf §Y[event_target:pre_ftl_planet.GetName]§!, der vorgab, der \"Auserwählte\" aus der [event_target:pre_ftl_planet.Owner.GetSpeciesNamePlural]-Mythologie zu sein, erfolgreich entlarvt."
 strange_worlds.3015.desc_outro: "\nNach genauerer Betrachtung der örtlichen Legenden konnten wir die Machthaber davon überzeugen, dass ihr sogenannter \"Auserwählter\" in Wirklichkeit ein Dämon war, der sie zu täuschen versuchte, um den Planeten in eine tausendjährige Finsternis zu stürzen.\n\nZusätzlich zerlegten wir das abgestürzte Schiff, damit die Einheimischen niemals eine Spur davon finden werden. Bedauerlicherweise haben sie bereits einige persönliche Gegenstände entdeckt, die ihnen Einblicke in Technologien erlauben, die sie noch nicht kennen sollten."
 strange_worlds.3015.a: "Bedauerlich."
 strange_worlds.3020.name: "Heimkehr"
 strange_worlds.3020.desc_intro: "Unser Außenteam schaffte es, eine private Audienz bei dem \"Auserwählten\" auf §Y[event_target:pre_ftl_planet.GetName]§! zu erhalten. Es bot ihm an, sein Schiff zu reparieren und ihn zurück in den Weltraum zu bringen.\n\n"
 strange_worlds.3020.desc_no_megacorp: "Der §YNomade der Namarianer§! nahm das Angebot nur zu gern an und erklärte, er wäre fälschlicherweise als Gottheit angesehen worden, nachdem er auf §Y[event_target:pre_ftl_planet.GetName]§! strandete, und lebe seither in der Angst, dass er bei einer Enttarnung getötet werden könnte."
 strange_worlds.3020.desc_megacorp: "Der §Y[event_target:caravaneer_fleet3_country.GetSpeciesNamePlural]-Reisende§! nahm das Angebot nur zu gern an und erklärte, er wäre fälschlicherweise als Gottheit angesehen worden, nachdem er auf §Y[event_target:pre_ftl_planet.GetName]§! strandete, und lebe seither in der Angst, dass er bei einer Enttarnung getötet werden könnte."
 strange_worlds.3020.desc_outro: "\nNachdem wir ihn zu unserem Forschungsaußenposten gebracht und sein Schiff repariert hatten, schenkte uns der dankbare Reisende den Großteil seines Schiffinventars, ehe er sich verabschiedete.\n\nDas durch seine Abreise entstandene Machtvakuum löste einen kurzen, aber heftigen Konflikt zwischen verschiedenen religiösen Sekten auf §Y[event_target:pre_ftl_planet.GetName]§! aus, der inzwischen allerdings wieder abgeklungen ist."
 strange_worlds.3020.a: "Faszinierend."
 strange_worlds.3025.name: "[event_target:nomad01_country.GetName]"
 strange_worlds.3025.desc: "Seid gegrüßt, [Owner.GetSpeciesNamePlural]. Wir wissen, dass Ihr mit einem abtrünnigen Namarianer zu tun hattet, der sich von unserer Flotte abgespalten hatte.\n\nIhr habt uns einen großen Dienst erwiesen. Dieses fehlgeleitete Individuum war uns ein ständiger Dorn im Auge und seine Ambitionen stellten eine große Gefahr für unsere Reise dar.\n\nBitte nehmt dieses Geschenk zum Dank."
 strange_worlds.3025.a: "Vielen Dank."
 strange_worlds.3030.name: "[event_target:caravaneer_home_country.GetName]"
 strange_worlds.3030.desc: "Die [Owner.GetSpeciesNamePlural] haben sich um verlorenen §YRacket§! gekümmert? Sehr nett von Euch! Dieser Narr hat uns nichts als Kopfschmerzen bereitet. Sein Hokuspokus? Eine Peinlichkeit! Das ist bereits zum fünften Mal passiert. Dürfen wir ehrlich sein? Wir sind froh, dass er weg ist.\nHier. Nehmt das. Ein Geschenk dafür, dass Ihr dieses Problem aus der Welt geschafft habt. Ein einmaliger Handel. Sehr guter Wert."
 strange_worlds.3030.a: "Vielen Dank."
 strange_worlds.3040.name: "Was wir zurückgelassen haben"
 strange_worlds.3040.desc: "Unser Beobachtungsposten über §Y[event_target:pre_ftl_planet.GetName]§! berichtet, dass nach einer geologischen Vermessung Versorgungskisten verschwunden sind.\n\nAls man die Geolokatoren in den Kisten ortete, mussten wir feststellen, dass die Bewohner einer kleinen Siedlung unsere Ressourcen gefunden und für sich beansprucht haben.\n\nDie auf den Kisten abgebildeten Anweisungen könnten die Entwicklung der [event_target:pre_ftl_planet.Owner.GetSpeciesAdj]en Gesellschaft nachhaltig beeinflussen."
 strange_worlds.3040.a: "Bedauerlich."
 strange_worlds.3045.name: "An den Absender zurück"
 strange_worlds.3045.desc_common: "Die von uns auf §Y[event_target:pre_ftl_planet.GetName]§! verlorene Ausrüstung beeinflusste die einheimische Kultur auf sonderbare Weise und veranlasste die [Root.GetPreFTLUpper] dazu, grobe Nachbildungen unserer Beobachtungsshuttles anzufertigen.\n\nAuch wenn diese \"Schiffe\" natürlich nicht funktionsfähig sind, ist es ein Beweis dafür, dass unsere Forscher während ihrer Erkundungsmission von den Einheimischen gesehen wurden.\n\nUnter der Leitung ihrer Ältesten wurden die [event_target:pre_ftl_planet.Owner.GetSpeciesNamePlural] dabei beobachtet, wie sie unser geologisches Bodenanalyseverfahren imitieren: Sie füllten die von uns zurückgelassenen Kisten mit Erde und Steinen, luden sie auf ihre \"Schiffe\" und warteten geduldig ab."
 strange_worlds.3045.desc_non_homicidal: "\nDie [event_target:pre_ftl_planet.Owner.GetSpeciesNamePlural] glauben offenbar, dass mehr Vorräte auftauchen werden, wenn sie unsere Prozesse nachahmen. Wir sollten eingreifen, bevor sich dieses Verhalten auf die gesamt Gesellschaft ausbreitet."
 strange_worlds.3045.desc_homicidal: "\nDieser Prozess ist zwecklos. Es erwartet sie nur der Tod."
 strange_worlds.3045.a_normal: "Bergt die Kisten still und heimlich."
 strange_worlds.3045.a_megacorp: "Beschafft unsere Vermögenswerte diskret zurück."
 strange_worlds.3045.b_normal: "Gebt ihnen Nahrung im Tausch für ihre Mineralien."
 strange_worlds.3045.b_megacorp: "Betreiben wir Tauschhandel!"
 strange_worlds.3045.c: "Beseitigt diese primitive Zivilisation."
 strange_worlds.3045.ct: "Der für §Y[event_target:pre_ftl_planet.GetName]§! zuständige Beobachtungsposten produziert jetzt $@observation_outpost_crate_minerals_production$ $i_minerals$ und hat einen Unterhalt von $@observation_outpost_crate_food_upkeep$ $i_food$"
 strange_worlds.3050.name: "Nachtragende Abwesenheit"
 strange_worlds.3050.desc: "Nachdem wir unsere verlorene Ausrüstung von §Y[event_target:pre_ftl_planet.GetName]§! geborgen hatten, setzte die einheimische Bevölkerung unser \"Schiffsbeladungsritual\" noch eine Zeit lang fort, bis sich die örtliche [event_target:pre_ftl_planet.Owner.GetSpeciesNamePlural]-Bevölkerung schließlich gegen ihren Ältesten wendete, ihn in das behelfsmäßige Shuttle warf und dieses anzündete.\n\nDie Bevölkerung ist zwar zu ihrer alten Lebensweise zurückgelehrt, doch in ihrer Kultur wird nach wie vor ein Groll gegenüber den \"Himmelsbewohnern\" gehegt."
 strange_worlds.3050.a: "Ordnungsgemäß notiert."
 strange_worlds.3060.name: "Abgebrochener Tauschhandel"
 strange_worlds.3060.desc: "Da die [Root.GetPreFTLUpper] der [event_target:pre_ftl_planet.Owner.GetSpeciesNamePlural] in ihrer Entwicklung immer weiter voranschreitet, stellten wir den Austausch von Nahrung gegen Mineralien durch unseren Beobachtungsposten ein.\n\nEs handelte sich zwar um ein interessantes Experiment, doch unsere fortwährende Einmischung in ihre Gesellschaft birgt nur das Risiko, dass man uns früher oder später entdeckt."
 strange_worlds.3060.a: "Eine vernünftige Maßnahme."
 strange_worlds.3060.ct: "Der Beobachtungsposten produziert nicht länger Mineralien, benötigt aber auch keinen Unterhalt in Form von Nahrung mehr"
 strange_worlds.3070.name: "Orbitale Anomalie"
 strange_worlds.3070.desc: "Eine Gravitationsanomalie warf unseren Beobachtungsposten über §Y[event_target:pre_ftl_planet.GetName]§! aus der Umlaufbahn und ließ ihn kurz in die untere Atmosphäre eintreten.\n\nDie Besatzung ist unverletzt und die ursprüngliche Umlaufbahn konnte wiederhergestellt werden, doch es gibt Bedenken darüber, dass die Station von den [event_target:pre_ftl_planet.Owner.GetSpeciesNamePlural] auf der Oberfläche gesehen wurde.\n\nNur die Zeit wird zeigen, inwieweit sich dies auf ihre Gesellschaft auswirken wird."
 strange_worlds.3070.a: "Setzt die Beobachtungen fort."
 strange_worlds.3075.name: "Himmelsleiter"
 strange_worlds.3075.desc_common: "Mit einer primitiven Bildaufnahmetechnik gelang es der örtlichen Bevölkerung, unseren Beobachtungsposten über §Y[event_target:pre_ftl_planet.GetName]§! für die Ewigkeit festzuhalten. Zusammen mit Zeugenaussagen haben diese Fotos einige Nationen nun dazu inspiriert, eine Art \"Himmelsleiter\" zu bauen, um weitere Nachforschungen anzustellen.\n\nAuch wenn es sich dabei natürlich um ein vergebliches Unterfangen handelt, destabilisiert der daraus resultierende Wettbewerb zwischen den Nationalstaaten die Welt. Im Wettlauf um die Fertigstellung der ersten \"Leiter\" sind alte Spannungen wiederhochgekocht, und der Nationalstolz und die Ressourcenknappheit haben die Lage nur verschlimmert."
 strange_worlds.3075.desc_non_homicidal: "\nWenn es uns gelingt, ihre Beweise für unsere Existenz zu entkräften, gehen die Spannungen vielleicht zurück, bevor die ganze Sache aus dem Ruder läuft.\n\nAlternativ bietet dieses diplomatische Geplänkel einer [Root.GetPreFTLLower] wertvolle sozioökologische Einblicke - wenn auch mit dem Risiko einer gewaltsamen Eskalation."
 strange_worlds.3075.desc_homicidal: "\nDas sich anbahnende Chaos ist eine hervorragende Gelegenheit für die Forschung."
 strange_worlds.3075.a: "Entkräftet die Beweise für unsere Existenz."
 strange_worlds.3075.b: "Setzt die Beobachtungen fort."
 strange_worlds.3075.b_ct: "Die von dem Beobachtungsposten produzierte £society£ §YSozial-Forschung§! wird verdoppelt"
 strange_worlds.3080.name: "Die Wahrheit ist irgendwo dort draußen"
 strange_worlds.3080.desc: "Das auf dem Beobachtungsposten über §Y[event_target:pre_ftl_planet.GetName]§! stationierte Team hat es erfolgreich geschafft, die Beweise für unsere Existenz zu entkräften.\n\nNachdem die Bilder als Fälschung entlarvt und die Glaubwürdigkeit der Zeugen zerstört wurde, wurde auch der Bau der \"Himmelsleitern\" eingestellt. Aus Verlegenheit wegen ihrer vermeintlichen Dummheit haben sich die einst zerstrittenen Nationen nun der rationalen Forschung und wissenschaftlichen Methoden verschrieben.\n\nDie Baustellen der Leitern wurden in Zentren für höhere Bildung umgewandelt, und immer mehr Gelehrte kommen zusammen, um die Mythen über unsere \"Himmelszitadelle\" zu widerlegen."
 strange_worlds.3080.a: "$FASCINATING$"
 strange_worlds.3080.a_ct: "[event_target:pre_ftl_country.GetName] erhält 50% Fortschritt für das nächste Zeitalter\n[event_target:pre_ftl_country.GetName] wird materialistisch."
 strange_worlds.3085.name: "Der große Leiternkrieg"
 strange_worlds.3085.desc: "In dem Bestreben aller, die erste Nation sein zu wollen, die ihre \"Himmelsleiter\" vollendet, wuchsen die Spannungen zwischen den [Root.GetPreFTLLowerPlural] auf §Y[event_target:pre_ftl_planet.GetName]§! so weit an, dass ein globaler Konflikt ausbrach. Der Kampf dreht sich um die immer knapper werdenden Ressourcen, und das seit zwei Jahren andauernde Gemetzel, das als \"Großer Leiternkrieg\" bekannt ist, hat nun endlich ein Ende gefunden.\n\nDie Bedingungen für den Frieden beinhalten die Bildung einer gemeinsamen Front gegen den geteilten Feind: die \"Himmelszitadelle\". Während die [event_target:pre_ftl_planet.Owner.GetSpeciesNamePlural] ihre vom Krieg verwüstete Welt wiederaufbauen, ist ihre Paranoia und ihr Hass auf das Unbekannte so weit gewachsen, dass eine künftige Interaktion mit ihnen äußerst schwer sein wird."
 strange_worlds.3085.a: "Das ist ein Problem für später."
 strange_worlds.3085.a_ct: "Die von dem Beobachtungsposten produzierte £society£ §YSozial-Forschung§! kehrt zur Normalität zurück"
 create_hibernators_pops_ct: "Erschafft $@hibernators_pops_created|*0$ £job_pre_sapient£ beinahe vernunftbegabte Bewohner mit der Eigenschaft \"§Y$trait_seasonal_dormancy$§!\""
 pm_bleeding_planet: "Blutender Planet"
 pm_bleeding_planet_desc: "Der Boden selbst blutet. Den Kolonisten wurde zu äußerster Vorsicht geraten, den Boden nicht weiter zu belasten.\n"
 pm_contruction_coagulate: "Blutige Bausubstanz"
 pm_contruction_coagulate_desc: "Der zähflüssige Schlamm, den der blutende Boden absondert, wirkt wie ein natürlicher, wenn auch gefährlicher Klebstoff, den man für Bauarbeiten nutzen kann.\n"
 pm_hemosymbiosis: "Hämosymbiose"
 pm_hemosymbiosis_desc: "Der seltsame Schlamm aus dem Inneren des Planeten beeinflusst die Entwicklung. Die Bauzeiten und der Bergbau profitieren von dieser Substanz. Das Wachstum der Kolonie wird jedoch gehemmt.\n"
 pm_parasitic_production: "Parasitäre Produktion"
 pm_parasitic_production_desc: "Die parasitäre Lebensform auf diesem Planeten wird dazu genutzt, um die Produktivität der Arbeiter zu erhöhen.\n"
 pm_frying_fauna: "Verkohlte Megafauna"
 pm_frying_fauna_desc: "Die Megafauna dieser Welt gedeiht unter den optimierten Bedingungen. Ihr einzigartiges Verdauungsenzym hat sich für die Veredlung von Legierungen als äußerst nützlich erwiesen."
 pm_frying_fauna_machine: "$pm_frying_fauna$"
 pm_frying_fauna_machine_desc: "$pm_frying_fauna_desc$"
 pm_frying_fauna_2: "$pm_frying_fauna$"
 pm_frying_fauna_2_desc: "Elektrifizierte Erntemaschinen wandeln die Megafauna dieser Welt in einen ständigen Fluss von Nährstoffen um."
 pm_frying_fauna_2_machine: "$pm_frying_fauna$"
 pm_frying_fauna_2_machine_desc: "$pm_frying_fauna_2_desc$"
 pm_catalytic_excrement: "Katalytische Exkremente"
 pm_catalytic_excrement_ct: "Die Megafauna dieser Welt gedeiht unter den optimierten Bedingungen. Ihr einzigartiges Verdauungsenzym hat sich für die Veredlung von Legierungen als äußerst nützlich erwiesen."
 pm_strange_sandstorm: "Merkwürdige Sandstürme"
 pm_strange_sandstorm_ct: "Ein einzigartiges Phänomen im Sand des Planeten beeinträchtigt den Betrieb dieser Kolonie."
 pm_perpetual_lightning: "Immerwährendes Gewitter"
 pm_perpetual_lightning_desc: "Die während einer Terraforming-Anomalie freigelegten, verstrahlten Kristalle haben die perfekte Wetterumgebung für ein immerwährendes Gewitter auf dem Planeten geschaffen."
 pm_dark_matter_geyser: "Dunkelmaterie-Geysir"
 pm_dark_matter_geyser_desc: "Der Planet ertrinkt in einem Miasma aus dunkler Materie."
 pm_population_quarantine: "Bevölkerungsquarantäne"
 pm_population_quarantine_desc: "Die Bevölkerung wurde unter Quarantäne gestellt, bis die Folgen der durch die dunkle Materie verursachten Versteinerung erforscht werden konnten."
 pm_dark_matter_statue: "Statuen aus dunkler Materie"
 pm_dark_matter_statue_desc: "Die durch dunkle Materie versteinerten Hüllen der Bewohner sind auf dem ganzen Planeten verstreut zu finden. Diese grauenvollen Überreste bieten wertvolle Forschungsmöglichkeiten."
 pm_raining_corpses: "Leichenregen"
 pm_raining_corpses_desc: "Die dichten Wolken, die eine fremde Zivilisation einst als Begräbnisstätte nutzte, wurden durch unseren Terraforming-Prozess ausgedünnt, wodurch der Inhalt der Wolkengräber auf die Oberfläche stützt."
 pm_raining_corpses_tt: "£minor_artifacts£ $minor_artifacts$ durch £job£ Jobs als $WORKERS$"
 pm_raining_corpses_no_ancrel: "$pm_raining_corpses$"
 pm_raining_corpses_no_ancrel_desc: "$pm_raining_corpses$"
 pm_raining_corpses_no_ancrel_tt: "£consumer_goods£ $consumer_goods$ durch £job£ Jobs als £pop_cat_worker£ $pop_cat_worker$"
 pm_revolting_pests: "Widerwärtiger Schädling"
 pm_revolting_pests_desc: "Die Tiere dieses Planeten sind faszinierend und abstoßend zugleich. Es wird dringend davon abgeraten, diesen Lebewesen zu nahe zu kommen."
 pm_gaseous_fauna: "Gasausstoßende Fauna"
 pm_gaseous_fauna_desc: "Die heimische Fauna wurde domestiziert und dient der Bevölkerung als Unterhaltung. Gleichzeitig sondert sie auch abbaubare Gase ab."
 pm_gaseous_fauna_ct: "Alle £pop£ Bewohner produzieren §G$@gaseous_fauna_exotic_gases_production$§! $i_exotic_gases$"
 pm_urban_privilege_regular: "Stadtprivilegien"
 pm_urban_privilege_regular_desc: "In einem örtlichen Streit für die städtischen Distrikte Partei zu ergreifen, hat die ländlichen Distrikte verärgert."
 pm_urban_privilege_broken_shackles: "$pm_urban_privilege_regular$"
 pm_urban_privilege_broken_shackles_desc: "$pm_urban_privilege_regular_desc$"
 pm_rural_privilege_regular: "Landprivilegien"
 pm_rural_privilege_regular_desc: "In einem örtlichen Streit für die ländlichen Distrikte Partei zu ergreifen, hat die städtischen Distrikte verärgert."
 pm_rural_privilege_broken_shackles: "$pm_rural_privilege_regular$"
 pm_rural_privilege_broken_shackles_desc: "$pm_rural_privilege_regular_desc$"
 pm_peacekeeper_deployment: "Einsatz der Friedensbewahrer"
 pm_peacekeeper_deployment_desc: "Zusätzliche Friedensbewahrer sorgen dafür, dass die Streitigkeiten zwischen den Distrikten nicht eskalieren."
 bacterial_drive_modifier_desc: "Die mit genetisch veränderten Bakterien angereicherte Wasserversorgung inspiriert die Bevölkerung und vereint sie für ein gemeinsames Ziel."
 pm_bd_reproduction: "Bakterieller Antrieb: Reproduktion"
 pm_bd_reproduction_desc: "$bacterial_drive_modifier_desc$"
 pm_bd_strength: "Bakterieller Antrieb: Stärke"
 pm_bd_strength_desc: "$bacterial_drive_modifier_desc$"
 pm_bd_creativity: "Bakterieller Antrieb: Kreativität"
 pm_bd_creativity_desc: "$bacterial_drive_modifier_desc$"
 ladder_wars_pre_ftl: "Vermächtnis der Leiternkriege"
 ladder_wars_pre_ftl_desc: "Während diese vom Krieg zerstörte Welt wiederaufgebaut wird, ist die Bevölkerung zunehmend paranoider gegenüber anderen geworden, was den Umgang mit ihr erschwert."
 living_metal_mega_construction_insight: "Einblicke in Megabauwerke aus lebendem Metall"
 living_metal_mega_construction_insight_desc: "Das aus lebendem Metall bestehende Artefakt, das wir in einem metallischen Kubus fanden, bot uns unglaubliche Einblicke in die Entwicklung von Megastrukturen."
 living_metal_mega_construction_insight_ct: "Erlassgrundkosten (Megabauwerke aus lebendem Metall): §G-50%§!"
 d_coagulated_landscape: "Geronnene Landschaft"
 d_coagulated_landscape_desc: "Aus der Planetenoberfläche quillt ein zähflüssiger Schlamm, der zu einem beinahe undurchdringlichen Material gerinnt. Angesichts der Fläche, die er einnimmt, gibt es wenig Raum, in dem man sicher bauen kann."
 d_shimmering_structure: "Schimmernde Struktur"
 d_shimmering_structure_desc: "Ein großes, schimmerndes Bauwerk unbekannten Ursprungs."
 d_geothermal_hotspot: "Geothermischer Hotspot"
 d_geothermal_hotspot_desc: "Auf diesem Planeten gibt es einen außergewöhnlichen geothermischen Ort, der sowohl Energie als auch Forschungsmöglichkeiten bietet."
 d_ancient_cloaking_array: "Uralte Tarnvorrichtung"
 d_ancient_cloaking_array_desc: "Diese Kolonie profitiert von einer uralten Tarnvorrichtung, was es Feinden schwer macht, sie anzugreifen. Die Kolonisten können sich hier sicher fühlen."
 d_psionic_sands: "Psionischer Sand"
 d_psionic_sands_desc: "Der Sand dieses Planeten ist mit einer großen Konzentration von Zro durchzogen. Es ist möglich, mit ihm zu kommunizieren."
 d_mountains_of_steel: "Stahlberge"
 d_mountains_of_steel_desc: "Die riesigen Berge dieser Welt wurden in der extremen Hitze des Terraformingprozesses geschaffen und dienen als reichhaltige Rohstofflagerstätten."
 d_lava_tubes: "Lavaröhren"
 d_lava_tubes_desc: "Magmaströme haben hier tiefe, mineralienreiche Tunnel geschaffen. Diese Pyroprodukte bieten lukrative Bergbaumöglichkeiten."
 d_lava_tubes_ct: "$t$£energy£ Unterhaltskosten für [miner.GetIcon] [miner.GetNamePlural]-Jobs: §R+$@lava_tubes_mining_job_upkeep$§!"
 d_lava_tubes_ct_short: "§R+$@lava_tubes_mining_job_upkeep$§! £energy£-Unterhalt für [miner.GetIcon] [miner.GetNamePlural]-Jobs"
 d_hydroactive_eggs: "Hydroaktive Eier"
 d_hydroactive_eggs_desc: "Wasser ist in der Natur reichlich vorhanden, was es der heimischen Fauna erlaubt, sich exponentiell zu vermehren."
 d_explosive_atmosphere: "Explosive Atmosphäre"
 d_explosive_atmosphere_desc: "Flüchtige Teilchen in der Luft sorgen dafür, dass die Atmosphäre dieser Welt hoch entflammbar ist."
 d_explosive_atmosphere_ct: "$t$£volatile_motes£ §Y$volatile_motes$§! durch [mote_harvester.GetIcon] $job_mote_harvester_plural$-Jobs: §G+50%§!"
 d_explosive_atmosphere_ct_short: "§G+50%§! £volatile_motes£ §Y$volatile_motes$§! durch [mote_harvester.GetIcon] $job_mote_harvester_plural$-Jobs"
 d_blue_lava: "Blaue Lava"
 d_blue_lava_desc: "Der Terraformingprozess rief eine Reaktion zwischen den reichen Gas- und Legierungsvorkommen tief im Inneren des Planeten hervor und flutete die Oberfläche der Welt mit einer faszinierenden blauen Lava."
 d_crystaline_growths: "Kristallwucherungen"
 d_crystaline_growths_desc: "Auf diesem Planeten gibt es Kristallwucherungen, die man ernten kann."
 d_bogplants: "Sumpfpflanzen"
 d_bogplants_desc: "Die hochgradig ätzenden Sümpfe dieser Welt sind die Heimat einer einzigartigen Flora, die bei der Nahrungsaufnahme exotische Gase freigibt."
 d_liquid_dark_matter: "Flüssige dunkle Materie"
 d_liquid_dark_matter_desc: "Nach dem Ausbruch eines Geysirs ist ein See aus flüssiger dunkler Materie entstanden."
 d_space_junk_hazards: "Gefährlicher Weltraumschrott"
 d_space_junk_hazards_desc: "In der Umlaufbahn dieser Welt fliegt so viel Schrott herum, dass der Verkehr von Shuttles beeinträchtigt ist und die Gefahr besteht, dass Trümmer auf die Oberfläche stürzen."
 trait_inner_darkness: "Innere Dunkelheit"
 trait_inner_darkness_desc: "Die Körper der Bewohner wurden nach der Aussetzung mit dunkler Materie verbessert, weshalb sie nun in regelmäßigen Abständen Spuren von nicht-baryonischen Teilchen ausstoßen. Ihre erwartete Lebensdauer hat sich jedoch drastisch verkürzt."
 trait_inner_darkness_tt: "£sr_dark_matter£ $produced_per_pop_group_unit$ £pop£ Bewohner: §G+$@inner_darkness_dark_matter_production$§!"
 trait_geleboric_mutations: "Geleborische Mutationen"
 trait_geleboric_mutations_desc: "Bedauerliche Nebenwirkungen eines Experiments änderten die Physiologie dieser Spezies drastisch."
 trait_psionic_ephapse: "Psionische Ephapse"
 trait_psionic_ephapse_desc: "Nach einem längeren Kontakt mit einer bewusstseinsverändernden Bakterie produziert das Verdauungssystem dieser Spezies nun psionische Probiotika, die die telepathische Kommunikation zwischen den betroffenen Individuen fördern."
 trait_psionic_ephapse_modifier_tooltip: "Wenn die Spezies die Eigenschaft \"§Y$trait_psionic$§!\" oder \"§Y$trait_latent_psionic$§!\" hat:\n$bureaucrat_jobs_bonus_workforce_mult$: §G+5%§!\n$researcher_jobs_bonus_workforce_mult$: §G+5%§!"
