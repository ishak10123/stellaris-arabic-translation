 approach_reassure_public_effect: "Wenn Informationen an die Öffentlichkeit geraten, könnte das unsere Gesellschaft destabilisieren. Stellt alles unter Geheimhaltung.$rg_default_progress$"
 approach_find_the_cause_effect: "Die Ausdehnung des Sterns ist nicht aufzuhalten. Eine sofortige und umfassende Untersuchung ist unerlässlich, um die Ursache zu ermitteln.$rg_default_progress$"
 approach_suppress_unrest2_effect: "Eine wirksame Lösung ist inmitten gesellschaftlicher Unruhen unmöglich. Der Wiederherstellung von Ordnung und Stabilität muss Vorrang eingeräumt werden.$rg_default_progress$"
 approach_disrupt_subspace_tunnels2_effect: "Um die Integrität unseres Sterns zu bewahren, sind sofortige Gegenmaßnahmen erforderlich. Es ist unerlässlich, die Subraumtunnel zu durchtrennen.$rg_small_progress$"
 approach_add_fuel_to_the_fire3_effect: "Diese Entwicklung bietet die einmalige Möglichkeit, intensiven Ressourcenabbau auf den Planeten unseres Heimatsystems durchzuführen und die Gewinnung von Mineralien zu maximieren.$rg_high_progress$"
 approach_wait_and_see3_effect: "Wir müssen aufhören, vorschnelle Entscheidungen zu treffen. Wir müssen uns gedulden und beobachten.$rg_small_negative_progress$"
 approach_siphon_stellar_material3_effect: "Wir können die Rückkehr zur Normalität beschleunigen, indem wir Material direkt vom Stern entfernen.$rg_medium_negative_progress$"
 approach_continue_siphoning4_effect: "Wir können diese Energie nutzen, um unser Heimatsystem zu entflammen und die Überreste nach Reichtümern durchsuchen.$rg_high_progress$"
 approach_stabilize_the_star4_effect: "Wir können den Stern in seinem aktuellen Zustand stabilisieren, indem wir die von uns durchgeführten Anpassungen beibehalten.$rg_no_progress$"
 approach_cease_activity4_effect: "Wir können die Bergbaustation deaktivieren, damit sich der Stern beruhigen kann.$rg_small_negative_progress$"
 approach_reverse_inflation4_effect: "Wir können unseren Stern wieder auf seine ursprüngliche Größe schrumpfen lassen und so die Bewohnbarkeit unserer Heimatwelt wiederherstellen.$rg_high_negative_progress$"
 approach_at_any_cost_effect: "Wir müssen das Wachstum begrenzen, um eine Katastrophe zu vermeiden, und zwar um jeden Preis.\nMonatliches Wachstum: §G+0.5§!\n\n"
 INF_ORIGIN_RED_GIANT_TRIANGULATION: "Subraumstörung triangulieren"
 INF_ORIGIN_RED_GIANT_TRIANGULATION_DESC: "Ein geeigneter Ort zur Triangulation des Ursprungs der Störung."
 INF_ORIGIN_RED_GIANT_PROTECT_HOMEWORLD: "Heimatwelt schützen"
 INF_ORIGIN_RED_GIANT_PROTECT_HOMEWORLD_DESC: "Während wir unermüdlich daran arbeiten, die Veränderungen unseres Sterns umzukehren, müssen wir auch unsere eigenen Formen darauf vorbereiten, der Hitze standzuhalten. Die Anpassung unserer Bevölkerung an höhere Temperaturen hilft uns, inmitten der Flammen unserer neuen Zukunft zu gedeihen."
 INF_ORIGIN_RED_GIANT_EXPLOIT: "Thermalenergie nutzen"
 INF_ORIGIN_RED_GIANT_EXPLOIT_DESC: "Die erhöhte Sternenstrahlung ist langfristig zwar problematisch, aber kurzfristig können wir sie nutzen, um unsere Industrie- und Energiekapazitäten zu steigern."
 INF_ORIGIN_RED_GIANT_BOARD_STATION: "Station entern"
 INF_ORIGIN_RED_GIANT_BOARD_STATION_DESC: "Diese rücksichtslosen Wesen beuten unseren Stern aus. Wir müssen ihre Station entern und die Kontrolle übernehmen."
 INF_ORIGIN_RED_GIANT_PARLAY: "Notfall-Xenolinguistik"
 INF_ORIGIN_RED_GIANT_PARLAY_DESC: "Die Stationsbesatzung kontrolliert den Subraumtunnel, der unseren Stern zerstört. Wir müssen eine Kommunikation herstellen, um sicherzustellen, dass sie mit uns an einer Lösung arbeiten."
 INF_THERMOPHILE_ADAPTATION: "Thermophile Evolution"
 INF_THERMOPHILE_ADAPTATION_DESC: "Während wir die Galaxie in Flammen setzen, müssen wir auch unsere eigenen Formen darauf vorbereiten, der Hitze standzuhalten. Die Anpassung unserer Bevölkerung an höhere Temperaturen hilft uns, inmitten der Flammen unserer neuen Zukunft zu gedeihen.\n\n§HBei Abschluss:§!$TABBED_NEW_LINE$- Fügt den Modifikator \"§Y$crisis_thermophile_adaptation$§!\" hinzu$TABBED_NEW_LINE$- Erhöht die §Y$mod_pc_volcanic_habitability$§! um §G+50%§!"
