l_german:
 ####################################
 # Anomaly Events
 ####################################
 # useful refs:
 # [From.GetName] planet
 # [From.GetStarName]
 # [Leader.GetName] scientist
 spires_of_light_category: "Türme aus Licht"
 spires_of_light_category_desc: "Erste Scans wiesen auf eine Reihe hoch aufragender, leuchtender Strukturen hin, die sich aus einer ansonsten unauffälligen Landschaft emporhoben. Ihre Herkunft und ihr Zweck sind noch unklar, aber ihr gespenstisches Leuchten lässt vermuten, dass es sich um mehr als ein natürliches Phänomen handelt."
 infernals.500.name: "$spires_of_light_category$"
 infernals.500.desc: "Dank der Messungen, die unsere zur Untersuchung der leuchtenden Türme entsandten Sonden durchführten, können wir nun mit Sicherheit sagen, dass diese Strukturen aus formbarem Silikatmagma bestehen. Dieses Material wird durch Felsspalten nach oben gedrückt und verfestigt sich, bevor es die Oberfläche erreicht. Die so entstehenden Gebilde können Hunderte von Metern hoch werden, ehe sie unter ihrem eigenen Gewicht zusammenbrechen.\n\nDas Ergebnis ist ein riesiger Wald aus fast reinem, transparentem vulkanischem Glas, in dem jeder einzelne Turm das warme, orangefarbene Leuchten des noch immer brodelnden geschmolzenen Magmas unter ihm reflektiert.\n\nWissenschaftler [Leader.GetName] geht davon aus, dass die Überreste dieser eingestürzten Türme wertvolle Ressourcen enthalten."
 #EXCELLENT:0 (first option has default answer)
 infernals.500.a: "Wir sollten diesen heiligen Ort nicht weiter stören."
 infernals.500.b: "Geben wir ein Gebot für eine Fördergenehmigung ab."
 infernals.500.c: "Nutzt sie für Schießübungen."
 lava_whirlpool_category: "Lavastrudel"
 lava_whirlpool_category_desc: "Die erste Erkundung von [Planet.GetName] offenbarte einen seltsamen Wirbel im größten Lavaozean des Planeten. Dieses Phänomen ist höchst ungewöhnlich und sollte untersucht werden."
 infernals.56.name: "Lavastrudel"
 infernals.56.desc: "[Leader.GetName] bestätigte, dass es sich bei der seltsamen Form um einen Lavastrudel handelt. Diese Strudel sind äußerst selten, und einer dieser Größe wurde noch nie zuvor beobachtet. [Leader.GetName] findet dieses Phänomen äußerst interessant und ordnete weitere Untersuchungen an.\n\nErste Proben zeigen, dass der Strudel teilweise durch Lebendes Metall aufrechterhalten wird, das von den Strömungen auseinandergerissen wird und danach versucht, sich wieder zu regenerieren. Diese Regeneration stört den normalen Lavafluss zusätzlich und hält die Bewegung des Strudels aufrecht. Die Proben zeigen überdies, dass sich das Lebende Metall mit geringem Aufwand gewinnen ließe."
 infernals.56.a: "Beginnt mit dem Abbau."
 outgassing_category: "Ausgasungen"
 outgassing_category_desc: "Ein routinemäßiger Scan von [Planet.GetName] stellte ungewöhnlich starke chemische Schwankungen in der Atmosphäre fest. Eine genauere Untersuchung könnte Aufschluss darüber geben, was hier vor sich geht."
 infernals.1001.name: "Ausgasungen"
 infernals.1001.desc: "Die chemischen Schwankungen in der Atmosphäre wurden sowohl zu verschiedenen Zeitpunkten als auch an verschiedenen Orten auf der Oberfläche festgestellt und bestätigten die ursprünglichen Messungen. Die Schwankungen waren über dem großen Ozean aus freiliegendem Magma des Planeten am stärksten. Daher wurde eine Sonde losgeschickt, um Proben zu entnehmen.\n\nBei der näheren Analyse kam [Leader.GetName] zu dem Schluss, dass der Magmaozean auf [Planet.GetName] kostbare Exotische Gase ausstößt. Diese unerwartete Entdeckung deutet darauf hin, dass der Planet einen wertvollen Beitrag für unsere Industrien liefern könnte."
 infernals.1001.a: "Beginnt mit dem Abbau."
 crystal_lava_lakes_category: "Kristalline Lavaseen"
 crystal_lava_lakes_category_desc: "Auf diesem Planeten gibt es riesige Seen aus frei fließender Lava. Wir sollten sie untersuchen, da sie möglicherweise wertvolle Ressourcen aufweisen könnten."
 infernals.1002.name: "Kristalline Lavaseen"
 infernals.1002.desc: "Die ersten Bilder von der Oberfläche von [Planet.GetName] zeigen atemberaubende und unerwartete geologische Formationen, die wir als \"kristalline Lavaseen\" bezeichnen. Diese Magmaseen sind mit einzigartigen Mineralien angereichert, die sich innerhalb eines bestimmten Temperaturbereichs auf natürliche Weise zu kristallinen Matrizen anordnen. Das Ergebnis ist eine außergewöhnliche Transparenz und ein Spektrum an roten Farben, das sich über den gesamten See erstreckt. Aufgrund der Umlaufbahn, in der sich der Planet befindet, verändert sich dieser visuell beeindruckende Effekt im saisonalen Zyklus mit den Temperaturschwankungen.\n\nDie Ästhetik dieser kristallinen Lavaseen könnte sich für Touristen als äußerst anziehend erweisen. Die kristallinen Mineralien selbst könnten während der aktiven Saison von der Oberfläche abgeschöpft und als Energiespeicher genutzt werden."
 infernals.1002.a: "Baut den Ort zu einem Resort um."
 infernals.1002.b: "Nutzen wir die Energie der Seen."
 crystal_lava_resort: "Kristallines Lavaresort"
 crystal_lava_resort_desc: "Die atemberaubend schönen Seen auf diesem Planeten wurden zu einem luxuriösen Reiseziel für Touristen ausgebaut, um Besucher aus der ganzen Galaxie anzuziehen."
 bioadaptive_flora_category: "Bioadaptive Flora"
 bioadaptive_flora_category_desc: "Auch wenn es sich bei [Planet.GetName] äußerlich um eine typisch vulkanische Ödnis zu handeln scheint, ist der Sauerstoffgehalt überraschend hoch. Ein uns unbekanntes Phänomen muss für die Produktion dieses Sauerstoffs verantwortlich sein."
 infernals.1003.name: "Bioadaptive Flora"
 infernals.1003.desc: "Eine erste Einschätzung von [Planet.GetName] beschrieb den Planeten als eine Welt aus Magma und Feuer, doch nähere Untersuchungen entdeckten ein heimisches Ökosystem mit einer komplexen Flora, die ein Netzwerk von Gräben auf dem gesamten Planeten bewohnt. Diese Pflanzen produzieren Sauerstoff und sammeln die spärlich vorhandenen Feuchtigkeitsreserven, um auf der ansonsten sengend heißen Oberfläche ein gemäßigtes Mikroklima zu schaffen.\n\nDie von dieser Flora unterstützten Biome sind für Spezies bewohnbar, die sich sonst nicht auf vulkanischen Welten ansiedeln würden, und die Flora selbst unterstützt die Landwirtschaft. Zum Wohl unserer Siedler sollten wir erforschen, was genau in diesen Schluchten lebt."
 infernals.1003.a: "Markiert das Gebiet als mögliche Siedlungszone."
 infernals.1003.tooltip_a: "Fügt einen planetaren Modifikator hinzu, der die Bewohnbarkeit und das Wachstum erhöht."
 bioadaptive_flora_modifier: "Bioadaptive Flora"
 bioadaptive_flora_modifier_desc: "Die Gräben dieses Planeten werden von einer widerstandsfähigen Flora bewohnt, die ein kühleres Mikroklima mit atembarer Luft erzeugt und selbst in einer vulkanischen Umgebung eine begrenzte Bewohnbarkeit bietet."
 tectonic_icebreaker_category: "Tektonischer Eisbrecher"
 tectonic_icebreaker_category_desc: "Im Regolith von [Planet.GetName] wurden seltsame Niedrigtemperaturanomalien festgestellt, was darauf hindeutet, dass irgendetwas Teile der Oberfläche abkühlt. Wir sollten eine Expedition entsenden, um mehr herauszufinden."
 infernals.1004.name: "Tektonischer Eisbrecher"
 infernals.1004.desc: "[Leader.GetName] berichtete, dass sich unter der vulkanischen Oberfläche von §Y[from.GetName]§! riesige Gletscher befinden. Diese sind von ungewöhnlichen Gesteinsformationen umgeben, die aus Mineralien mit außergewöhnlichen Isolationseigenschaften bestehen. Tektonische Aktivitäten bauen diese Isolierschichten langsam ab, und [Leader.GetName] geht davon aus, dass sich der Planet bei der Freilegung der Gletscher so stark abkühlen würde, dass er eher als trockene Welt betrachtet werden sollte und nicht als vulkanische Welt.\n\nWir könnten diesen Prozess beschleunigen, um den Planeten etwas bewohnbarer zu machen, doch das Phänomen hat auch eine gewisse wissenschaftliche Relevanz, weshalb es sinnvoll sein könnte, den natürlichen Verlauf zu beobachten."
 infernals.1004.a: "Stabilisiert die tektonischen Aktivitäten."
 infernals.1004.b: "Beschleunigt die Gletscherschmelze."
 infernal_oasis_category: "Infernale Oase"
 infernal_oasis_category_desc: "Erste Bilder von §Y[from.GetName]§! zeigen eine brennende, geschmolzene Welt, deren Rotton nur durch einen auffallend hellen, kontinentgroßen Streifen von Grün unterbrochen wird. Dieser außergewöhnliche Anblick lässt darauf schließen, dass hier etwas höchst Ungewöhnliches vor sich gehen muss."
 infernals.505.name: "Eine Zuflucht zwischen Kataklysmen"
 infernals.505.desc: "Die einzigartige Tektonik auf §Y[from.GetName]§! schuf ein beispielloses Wunderwerk. Während der Großteil des Planeten aus einer heißen Wüste besteht, die mit vulkanischem Smog und frei fließender Lava bedeckt ist, erhebt sich eine massive Kontinentalplatte aus festem Gestein Dutzende von Kilometern über die Oberfläche. Das daraus resultierende Hochland, das weit über den giftigen Wolken liegt, ist die Heimat eines Ökosystems von einem üppigen Grün und einer ausgedehnten heimischen Flora und Fauna.\n\nDas Plateau kann von vielen Spezies leicht bewohnt werden und könnte eine Reihe faszinierender wissenschaftlicher Erkenntnisse liefern."
 infernals.505.a: "Eine erstaunliche Entdeckung."
 NAME_Vermilion: "Vermilion"
 NAME_Kira: "Kira"
 mysterious_ringing_category: "Mysteriöses Klingeln"
 mysterious_ringing_category_desc: "Unsere Wissenschaftler registrierten Radiowellen, die in regelmäßigen Abständen von einem bestimmten Punkt auf [Planet.GetName] kommen. Sie scheinen mit dem Zeitpunkt zusammenzufallen, zu dem die Nacht in den Tag übergeht."
 infernals.3210.name: "Mysteriöses Klingeln"
 infernals.3210.desc: "Unser Wissenschaftsteam traf auf [from.GetName] ein, um die Signalquelle zurückzuverfolgen, und fand bereits heraus, dass Letztere aus einem unterirdischen Höhlensystem stammt, das mit zahlreichen wissenschaftlichen Beobachtungsinstrumenten ausgestattet war.\n\n[Leader.GetName] führte das Team tiefer in die Höhlen, wo sich eine Kammer befand, die mit einer uns unbekannten Legierung versiegelt und aus der ein leises Klingeln zu hören war. [GetMysteriousRingingDesc3210]\n\nMit Gehörschutz ausgerüstet betrat das Team den Raum und fand neben der Signalquelle - einem seltsamen zylindrischen Gerät - ein Exemplar einer uns unbekannten Spezies, das sich offenbar im Winterschlaf befand.\n\nEine Analyse ergab, dass die Apparatur regelmäßig Impulse aussendet, gefolgt von mehreren Stunden melodischer Geräusche mit Vokalisationen die zu dem Stimmorgan des Lebewesens zu passen scheinen. [Leader.GetName] geht davon aus, dass die Apparatur das Weesen möglicherweise nach einem festgelegten Zeitplan weckt."
 infernals.3210.individual: "Das Erkundungsteam entdeckte eine Schwachstelle in der Versiegelung und schaffte es, sie aufzubrechen. In diesem Moment wurde das Klingeln ohrenbetäubend laut, was zu einiger Panik führte."
 infernals.3210.gestalt: "Das Erkundungsteam entdeckte eine Schwachstelle in der Versiegelung und schaffte es, sie aufzubrechen. In diesem Moment wurde das Klingeln ohrenbetäubend laut, was zu einer Reizüberflutung und einer kognitiven Überlastung bei den Drohnen führte."
 infernals.3210.a: "Kopiert die Forschungsergebnisse und verschwindet so schnell wie möglich."
 infernals.3210.b: "Versucht, das Wesen zu wecken und für unsere Sache zu gewinnen."
 infernals.3210.btt: "Wir erhalten einen £scientist£ §Y$scientist$§! der Stufe §G4§!."
 infernals.3210.c: "Versucht, die Apparatur zu stehlen."
 infernals.3210.ctt: "Unsere Arbeiter werden von den regelmäßigen Erinnerungen profitieren und schneller wieder an die Arbeit gehen. Schaltet eine Entscheidung frei, die die Produktion von £job£ ['concept_jobs'] um §G+10%§! erhöht, allerdings auf Kosten von §R-5%§! £happiness£ ['concept_happiness']."
 decision_planetary_workshift: "Planetare Arbeitsschichten erzwingen"
 decision_planetary_workshift_desc: "$planetary_workshift_deployed_desc$"
 planetary_workshift_deployed: "Planetare Arbeitsschichten erzwungen"
 planetary_workshift_deployed_desc: "Wenn der gesamte Planet in einer einzigen Zeitzone arbeitet, verbessert das die Kommunikation und Effizienz. Die geringen Kosten an Zufriedenheit spielen dabei keine Rolle."
 ####################################
 # Origin Events
 ####################################
 # Red Giant Origin
 infernals.45.name: "Besorgniserregender Trend"
 infernals.45.desc: "Wir dachten bisher immer, es handle sich bei §Y[capital_star.GetName]§! um einen Roten Riesen, doch eine kürzliche Analyse ergab, dass sowohl die Größe als auch die Strahlung zunehmen. Diese Veränderungen haben bereits messbare Auswirkungen auf das Klima, und die Bevölkerung ist zunehmend beunruhigt.\n\nBisher gibt es keine Anzeichen dafür, dass sich dies in der nächsten Zeit ändern wird. Wenn unsere Spezies überleben soll, müssen wir die Ursache dieses Phänomens ergründen."
 infernals.45.desc.gestalt: "Wir dachten bisher immer, es handle sich bei §Y[capital_star.GetName]§! um einen Roten Riesen, doch eine kürzliche Analyse ergab, dass sowohl die Größe als auch die Strahlung zunehmen. Diese Veränderungen haben bereits messbare Auswirkungen auf das Klima.\n\nBisher gibt es keine Anzeichen dafür, dass sich dies in der nächsten Zeit ändern wird. Wenn unsere Spezies überleben soll, müssen wir die Ursache dieses Phänomens ergründen."
 infernals.45.a: "Bleibt ruhig und spielt das Problem herunter."
 infernals.45.b: "Wir müssen unverzüglich eine Untersuchung einleiten."
 infernals.45.c: "Wir haben andere Prioritäten."
 infernals.45.d: "Unsere PR-Abteilung soll sich darum kümmern."
 infernals.45.public.tt: "\n§HSituation:§! $situation_red_giant_expansion$\n- Setzt den Situationsansatz auf \"§Y$approach_reassure_public$§!\"\n- Monatlicher Ressourcenerhalt: §G10§! £unity£"
 infernals.45.cause.tt: "\n§HSituation:§! $situation_red_giant_expansion$\n- Setzt den Situationsansatz auf \"§Y$approach_find_the_cause$§!\""
 infernals.50.name: "Sternennova"
 infernals.50.desc: "[GetRedGiantEndingExplode]"
 infernals.50.totalIgnorance: "Was auch immer die katastrophale Veränderung des Roten Riesen herbeiführte, ist nicht mehr relevant. Uns bleibt nichts anderes übrig, als unser Schicksal zu akzeptieren und das, was übrig blieb, wiederaufzubauen."
 infernals.50.semiIgnorance: "Die durch die Sternenexplosion verursachte Störung vernichtete alle Beweise, die zur Ermittlung der Ursache erforderlich gewesen wären.\n\nUns bleibt nichts anderes übrig, als unser Schicksal zu akzeptieren und das, was übrig blieb, wiederaufzubauen."
 infernals.50.defaultEnding: "Der Prozess, der von der Restbevölkerung einer fremden Spezies in einer heruntergekommenen Bergbaustation begonnen wurde, fand seinen Abschluss: §Y[Target.GetStarName]§! ist in einer Nova explodiert, nachdem der Stern nahezu das gesamte System eingenommen hatte. Das farbenprächtige Plasma und die Strahlung säuberten §Y[event_target:red_giant_homeworld_tmp.GetName]§! von allem Leben, zusammen mit dem Rest unseres Heimatsystems.\n\n[GetMegacorpDesc50]\n\n[GetLususMiningDesc]"
 infernals.50.megacorp: "Unsere Heimatwelt wurde zu einem gigantischen Mineralienvorkommen umgewandelt, das sich über das gesamte System erstreckt und leicht zugänglich ist. Die Kosten für den Abbau dieser Ressourcen sind weitaus geringer, als es der Fall gewesen wäre, wenn wir sie aus den entsprechenden Monden oder Planeten hätten selbst abbauen müssen. Dank dieser kostengünstigen Ressourcen ist damit zu rechnen, dass unsere Gewinne drastisch steigen."
 infernals.50.nonmegacorp: "Auch wenn unsere Heimatwelt jetzt ein Ödland ist, legte die Nova zumindest eine Fülle von Mineralien im gesamten System frei, die mit herkömmlichen Bergbaumaschinen leicht zugänglich sind. Wir können diesen Reichtum nutzen, um uns eine neue Zukunft aufzubauen."
 infernals.50.lususExists: "Die Station flackert mit einem letzten Energieschub auf, bevor sie sich endgültig abschaltet. Alles, was zurückbleibt, sind wir und die Trümmer unserer Heimatwelt."
 infernals.50.lususGone: "Da die Station nicht länger existiert, kann §Y[event_target:red_giant_homeworld_tmp.GetName]§! beruhigt sein, dass so etwas nie wieder passieren wird."
 infernals.50.a: "Wir müssen unsere Heimat wiederaufbauen."
 infernals.51.name: "Auswirkungen der Nova abgeschwächt"
 infernals.51.desc: "Nach monumentalen Aufräumarbeiten ist die Oberfläche von §Y[this.GetName]§! wieder für $trait_infernal_plural$ bewohnbar. Zwar werden einige Narben für immer bleiben, doch wir können diese für einzigartige Forschungsmöglichkeiten voll ausschöpfen."
 infernals.60.name: "Rückkehr zur Normalität"
 infernals.60.desc: "Durch die Extraktion von Wasserstoff und einer Feinabstimmung der zugeführten Elemente kehrten wir die Ausdehnung von §Y[Target.GetStarName]§! um und gaben ihm seine frühere Ruhe als warmer Roter Riese zurück.\n\nDas Klima hat sich bereits stabilisiert, und wir können uns auf eine Zukunft freuen, in der unser Heimatplanet weiter das Herzstück unseres Reichs ist.\n\n[GetRedGiantEndingKalmStationStatus]"
 infernals.60.lususDestroyed: "Ohne die Station werden wir vermutlich nie in Erfahrung bringen, was genau passiert ist, aber wir können zumindest die Materialien nutzen, die der Stern freisetzte."
 infernals.60.lususAlive: "Da wir jetzt wissen, wie man die Station richtig bedient, können wir entscheiden, wie sie als Nächstes eingesetzt werden soll."
 infernals.60.a: "Demontiert die Station."
 infernals.60.b: "Erforscht die Station weiter."
 infernals.60.c: "Sie soll ein Denkmal für unseren Sieg sein."
 infernals.60.d: "Endlich Erleichterung."
 infernals.65.name: "Stellare Ausdehnung"
 infernals.65.desc: "Unsere laufenden Beobachtungen bestätigten, dass §Y[Target.system_star.GetName]§! mit zunehmender Geschwindigkeit größer wird. Es gibt auch bereits Berichte darüber, welche physischen Auswirkungen die erhöhte Strahlung aufweist. Sollten wir keinen Weg finden, um das Wachstum aufzuhalten, wird uns §Y[Target.system_star.GetName]§! schon ausgelöscht haben, noch lange bevor der Planet verschlungen wird.\n\n[GetMegacorpDesc65]"
 infernals.65.nonmegacorp: "Uns vor der Sternstrahlung zu schützen, kann uns mehr Zeit verschaffen. Ein riskanteres, aber potenziell lukratives Unterfangen wäre es jedoch, die erhöhte Strahlung zu nutzen, um unseren Energie- und Industriesektor anzukurbeln."
 infernals.65.megacorp: "In den Schutz des Planeten zu investieren, würde uns vor möglichen Marktschwankungen schützen und unsere Vermögensbasis sichern. Wir könnten aber auch unsere Energie- und Industrieleistungskennzahlen verbessern, indem wir die erhöhte Strahlung für die Produktionssteigerung nutzen."
 infernals.65.a: "Wir müssen unsere Heimatwelt schützen."
 infernals.65.b: "Wir sollten das Phänomen zu unserem Vorteil nutzen."
 infernals.70.name: "Ein hungriger Stern"
 infernals.70.desc: "§Y[Target.GetName]§! forderte das erste große Opfer und verschlang die innerste Welt des Systems. Die Rohstoffe dieser Welt sind zwar weiterhin vorhanden, doch sie liegen nun außerhalb unserer Reichweite in den feurigen Tiefen des Sterns.\n\nWir können die unmittelbaren wirtschaftlichen Verluste derzeit zwar verkraften, aber es gibt uns einen beängstigenden Vorgeschmack darauf, was uns in Zukunft erwartet."
 infernals.75.name: "Kollateralschaden"
 infernals.75.desc: "Das unaufhaltbare Wachstum unseres Roten Riesen verschlang einen weiteren Planeten. Die Ressourcen dieser Welt werden für immer unzugänglich bleiben, es sei denn, der Stern verliert seine äußeren Schichten durch eine gewaltige Supernova."
 infernals.95.name: "Sternentunnel"
 infernals.95.desc: "Die Wahrheit über §Y[capital_star.GetName]§! ist sonderbarer als zunächst angenommen. Laufende Untersuchungen enthüllten ein Zwillingspaar von Subraumtunneln tief im Inneren unseres Sterns.\n\nEiner dieser Tunnel leitet wasserstoffreiches Material direkt in die äußere Hülle, was die Fusion beschleunigt und die Heliumproduktion erhöht. Dies sollte eigentlich die Kernkompression vorantreiben, doch ein zweiter Tunnel saugt die erzeugte Energie ab und wirkt dem Prozess entgegen. Das Ergebnis ist die Ausdehnung des Sterns.\n\nErste Telemetriedaten aus beiden Subraumtunneln deuten darauf hin, dass sie mit mehreren Endpunkten verbunden sind, die über die gesamte Galaxie verstreut liegen. Unser Überleben hängt davon ab, dass wir diese so schnell wie möglich ausfindig machen."
 infernals.95.a: "Wir müssen drei dieser Orte untersuchen."
 infernals.95.a.tt: "Durch eine Triangulation wurden geeignete Ziele im Subraum gefunden."
 infernals.105.name: "Vernarbter Subraum"
 infernals.105.desc: "Astrometrische Messungen rund um §Y[FromFromFrom.GetName]§! enthüllten eine unerklärbare Narbe im Subraum. Derzeit gibt es dazu zwar keinen Endpunkt, doch in der Vergangenheit könnte sich dadurch ein Tunnel in der Umlaufbahn diesen Gasriesen geöffnet haben. Die Daten lieferten physikalische Erkenntnisse, die auch in anderen Bereichen Anwendung finden könnten.\n\nIn der Zwischenzeit müssen wir uns anderweitig umsehen, um die Quelle der Subraumtunnel ausfindig zu machen, die sich innerhalb unseres Sterns befinden."
 infernals.105.a: "Sucht weiter."
 infernals.110.name: "Fremdartiger Metallschrott"
 infernals.110.desc: "Unsere Scans rund um §Y[FromFromFrom.GetName]§! ergaben, dass der umliegende Subraum stark vernarbt ist. Es wurden auch Gebiete mit altem Metallschrott in der Nähe identifiziert. Diese sind orbital fixiert und könnten mit den Narben in Verbindung stehen.\n\nDie fortlaufende Überwachung dieser Suraumfluktuationen sollte uns dabei helfen, die Solar-Arrays rund um unseren Heimatstern herum zu optimieren.\n\nDiese Daten waren zwar bereits äußerst aufschlussreich, doch wir benötigen mindestens einen weiteren Untersuchungsort, um die Ursache unserer Probleme ermitteln zu können."
 infernals.110.a: "Verkauft den Metallschrott."
 infernals.115.name: "Triangulation abgeschlossen"
 infernals.115.desc: "Endlich ein richtiger Durchbruch!\n\nDie Subraumvernarbung rund um §Y[FromFromFrom.GetName]§! erlaubte es uns, den Ursprung der Störungen zu triangulieren, unter denen unser Stern leidet. Besagter Ursprung liegt in einem zuvor unentdeckten System mit feindlichen Signaturen.\n\nDiese Untersuchung wird uns hoffentlich dabei helfen, den Faktoren entgegenzuwirken, die unseren Stern beeinflussen.\n\nSobald wir ins §YLusus§!-System vordringen, können wir möglicherweise das tödliche Schicksal des §Y[FromFromFromFrom.Target.solar_system.GetName]§!-Systems und unserer eigenen Zivilisation abwenden."
 infernals.115.a: "Geht mit äußerster Vorsicht vor."
 infernals.115.b: "Fahrt die Waffensysteme hoch."
 infernals.115.c: "Führt zuvor ein Segnungsritual durch."
 red_giant_lusus_triangulated_tt: "Ein neues System wird aufgedeckt!"
 infernals.2115.name: "Entermannschaft"
 infernals.2115.desc: "Unsere Entermannschaft übernahm die Kontrolle über die Station. Die Stationsbesatzung leistete leichten Widerstand, war jedoch zu schlecht bewaffnet und offenbar nicht für einen bewaffneten Konflikt ausgebildet. Bei näherer Betrachtung stellte sich heraus, dass viele von ihnen noch recht jung waren. Wer nicht getötet wurde, wurde festgenommen.\n\nWir haben bereits damit begonnen, zu untersuchen, wie wir die Subraumtunnel kontrollieren können, die offenbar als eine Art Energiesauger fungieren. Sobald uns dies gelungen ist, können wir hoffentlich die Lage in unserem Heimatsystem entschärfen."
 infernals.2115.a: "Zerstört die Station."
 infernals.2115.b: "Verhört die Überlebenden."
 infernals.2115.c: "Versklavt sie."
 infernals.2115.d: "Die Überlebenden stellen ein Risiko dar. Eliminiert sie."
 infernals.2115.e: "Sprecht mit den Überlebenden."
 infernals.2115.f: "Säubert die Station von allem Leben."
 infernals.2115.g: "Fresst sie."
 infernals.400pops: "§G400§! £pop£ $POPS$ werden in [this.GetName] erschaffen"
 infernals.300pops: "§G300§! £pop£ $POPS$ werden in [this.GetName] erschaffen"
 infernals.2121.name: "Stationsbesatzung ausgelöscht"
 infernals.2121.desc: "Die Subraum-Bergbaustation wurde zerstört und die gesamte Besatzung getötet.\n\nBei der Zerstörung der Station explodierte auch ein uns unbekannter Energiespeicher. Die freigesetzte Energie schoss durch den Subraumtunnel direkt zu §Y[event_target:situation_red_giant_target_shortterm.GetStarName]§! und machte die Lage in unserem Heimatsystem dadurch nur noch schlimmer.\n\nGlücklicherweise wird zumindest kein Wasserstoff mehr in unseren Stern übertragen, was bedeutet, dass die Lage - so schlimm sie auch derzeit sein mag – sich wenigstens nicht weiter verschlechtern wird. Auch wenn wir vielleicht nie erfahren, wer diese Station baute, können wir zumindest beruhigt sein, dass diese Macht niemals in die Hände unserer Rivalen fallen wird.\n\nBedauerlicherweise gibt es keine Möglichkeit, §Y[event_target:situation_red_giant_target_shortterm.GetStarName]§! auf der Stelle in den ursprünglichen Zustand zurückzuführen. Wenn wir den Stern beeinflussen wollen, müssen wir erneut unsere Aufzeichnungen durchgehen und herausfinden, wie genau die Station arbeitete."
 infernals.2121.a: "Räumen wir diese Sauerei auf."
 infernals.2122.name: "Station zerstört"
 infernals.2122.desc: "Während die Überreste der Station durch den Weltraum treiben, bietet uns ihre Zerstörung eine neue Chance, das tödliche Schicksal von §Y[event_target:situation_red_giant_target_shortterm.GetStarName]§! abzuwenden – nicht mit einem Knopfdruck, sondern durch harte, kostspielige Arbeit."
 infernals.2125.name: "Verhandlungen mit der fremden Stationsbesatzung"
 infernals.2125.desc: "Nach langwieriger Forschung verfügen wir nun endlich über einen rudimentären Übersetzer, der es uns erlaubt, mit der Besatzung der Station zu kommunizieren.\n\nDie Station ist seit Generationen in Betrieb und bewegt sich von Gasriese zu Gasriese, wobei sie mithilfe eines Subraumsaugers Energie aus fernen Sternen gewinnt, um ihre Lebenserhaltungssysteme und den leistungsstarken Sprungantrieb mit Energie zu versorgen.\n\nDie Besatzung versteht das von ihnen betriebene System nicht vollständig und wusste nicht, dass der Absaugeprozess nur auf bestimmte Sterne abzielte und für deren Zerstörung sorgte.\n\nTrotz der Verwirrung scheint die Besatzung gewillt zu sein, die Station zu verlassen. Sie versprach uns auch, uns im Austausch für eine sichere Zuflucht, in der sie leben und ihre Jungen großziehen können, an ihrem Wissen teilhaben zu lassen."
 infernals.2125.a: "Gewährt ihnen Zuflucht."
 infernals.2125.b: "Überlasst ihnen ein Schiff, damit sie ihren eigenen Weg bestreiten können."
 infernals.2125.c: "Lasst den Sauerstoff aus sicherer Entfernung aus der Station ab."
 infernals.2125.d: "Erlaubt ihnen, sich ihr eigenes Urteil über uns zu bilden."
 infernals.2130.name: "Bergbauoperationen im Subraum"
 infernals.2130.desc: "Die Station saugt Wasserstoff aus einem Gasriesen ab und leitet ihn durch den Subraum in unseren Stern. Die daraus resultierende Heliumfusion setzt überschüssige Energie frei, die zu einer §Ykristallisierten Entropie§! umgewandelt wird, um die Station anzutreiben.\n\nDie Instabilität von §Y[event_target:situation_red_giant_target_shortterm.GetStarName]§! ist das Ergebnis von Berechnungsfehlern und Verschleißerscheinungen an der Ausrüstung, die die Besatzung entweder nicht bemerkt oder nicht zu beheben gewusst hatte.\n\nDa man eine recht alte Technologie benutzte, können wir den Prozess vermutlich umkehren, doch das wird nicht einfach sein. Alternativ könnte die Umwandlung unseres Sterns in eine Nova unzählige Lagerstätten freilegen und unser Erbe in einen Schatz an nutzbaren Ressourcen verwandeln."
 infernals.2130.a: "Zeit, an die Arbeit zu gehen."
 infernals.2131.desc: "Die Station saugt Wasserstoff aus einem Gasriesen ab und leitet ihn durch den Subraum in unseren Stern. Die daraus resultierende Heliumfusion setzt überschüssige Energie frei, die in eine §Ykristallisierte Entropie§! umgewandelt wird, um die Station anzutreiben.\n\nDie Besatzung besitzt lediglich eine Audioaufzeichnung für den Betrieb der Station, die aufgrund ihres Alters schon stark beschädigt ist. Offenbar verlor man schon vor Tausenden von Jahren den Kontakt zur eigenen Heimatwelt. Ob ihre Zivilisation ihren eigenen Untergang herbeiführte oder aber von einer anderen Macht vernichtet wurde, ist nicht bekannt. Eine Anhäufung von Kalibrierungsfehlern und der Verschleiß der Ausrüstung führten schließlich zu einer zunehmenden Instabilität im Energieabsaugungsprozess, die nun droht, §Y[event_target:situation_red_giant_target_shortterm.GetStarName]§! zu zerstören.\n\nDa sie eine recht alte Technologie benutzten, können wir den Prozess vermutlich umkehren, doch das wird nicht einfach sein. Alternativ könnte die Umwandlung unseres Sterns in eine Nova unzählige Lagerstätten freilegen und unser Erbe in einen Schatz an nutzbaren Ressourcen verwandeln."
 infernals.2135.name: "Das Ende der Bedrohung"
 infernals.2135.desc: "Als die Bewohner der Station von unserer Notlage erfuhren, zeigten sie sich alarmiert und bestürzt. Sie glaubten, allein zu sein, und wussten nichts von anderen Spezies in der Galaxie.\n\nIn einem Anfall von Reue und bevor wir wirklich begriffen, was sie taten, begannen sie, die Station zu demontieren und zerstörten dabei den Großteil der Komponenten unwiderruflich.\n\nDies wird es schwierig machen, die Ausdehnung des Sterns zu kontrollieren. Wir müssen entscheiden, was wir mit der unberechenbaren Stationsbesatzung tun und ob wir ihnen die Vergebung gewähren, die sie sich wünscht."
 infernals.2135.a: "Nehmt sie auf und zerlegt die Station für Materialien."
 infernals.2135.b: "Werdet sowohl sie als auch die Station los."
 infernals.2135.c: "Versklavt sie und zerstört die Station."
 infernals.2140.name: "Aussicht auf Stabilität"
 infernals.2140.desc: "Auch wenn es uns viele Mühen abverlangte, konnten wir endlich die volle Kontrolle über das Schicksal von §Y[event_target:situation_red_giant_target_shortterm.GetStarName]§! zurückgewinnen. Wenn wir nichts unternehmen, wird der Stern seinem natürlichen Lebenszyklus bei der derzeitigen Größe folgen.\n\nDie alte und marode Station kann wiederholten Umbauten nicht standhalten. Jede Anpassung belastet die Anlage bis an ihre Grenzen, weshalb wir nur einen Versuch haben.\n\nWir können den Stern wieder auf seine ursprüngliche Größe schrumpfen lassen oder ihn zur weiteren Ausdehnung zwingen und das System so in ein riesiges, leicht abzubauendes Ressourcenvorkommen verwandeln.\n\nUnsere [GetScientistPlural] werden einen letzten Rekonfigurationsversuch durchführen. Danach bleibt nur noch die schnelle Demontage durch externe Kräfte."
 infernals.2140.a: "Fixiert den Stern in seinem derzeitigen Zustand."
 infernals.2140.b: "Beschleunigt die Expansion des Sterns."
 infernals.2140.bdesc: "Lässt §Y[event_target:situation_red_giant_target_shortterm.GetStarName]§! unwiderruflich weiter wachsen."
 infernals.2140.c: "Bringt den Stern in den Normalzustand zurück."
 infernals.2140.cdesc: "Lässt §Y[event_target:situation_red_giant_target_shortterm.GetStarName]§! unwiderruflich weiter schrumpfen."
 infernals.2145.name: "Stabilität errungen"
 infernals.2145.desc: "Da wir nun die vollständige Kontrolle über die Größe und das Energieniveau unseres Sterns haben, konnte §Y[Target.GetStarName]§! komplett stabilisiert werden. Der Stern wird den derzeitigen Zustand für die nächsten Jahrmillionen beibehalten und unser Volk kann einmal mehr die Stabilität und Vorhersehbarkeit in unserem Heimatsystem genießen.\n\nDie erhöhte Größe unseres Sterns hat klare Konsequenzen für unserer Infrastruktur, doch ohne weiteres Wachstum können wir uns an den Status quo anpassen und das Beste aus diesen Veränderungen herausholen, indem wir die erhöhte Energieabgabe nutzen und gleichzeitig eine Präsenz im System aufrechterhalten."
 infernals.2145.a: "Endlich haben wir wieder die Kontrolle über unser eigenes Schicksal."
 infernals.2151.name: "Eine mysteriöse Raumstation"
 infernals.2151.desc: "Beim Eintritt in das System stießen unsere Schiffe auf begrenzten Widerstand durch eine Gruppe automatisierter Drohnen. Nach ihrer schnellen Eliminierung war eine genauere Untersuchung der fremden Station möglich.\n\nDie Struktur ist zwar weitgehend funktionsfähig, doch der Rumpf weist einige Spuren umfangreicher Reparaturarbeiten auf. Bei dem Versuch, Zugang zu einer der Andockbuchten zu erhalten, kamen wir mit einer bisher unbekannten fremden Spezies in Kontakt. Trotz sprachlicher Barrieren konnte bestätigt werden, dass diese Anlage für die Tunnel verantwortlich ist, die sich auf die Ausdehnung und das Energieniveau von §Y[event_target:situation_red_giant_target_shortterm.GetStarName]§! auswirken.\n\nDerzeit wird versucht, ihre Sprache vollständig zu übersetzen, um die Kommunikation aufzunehmen. Eine diplomatische Lösung könnte möglich sein. Sollte diese scheitern, sind wir vermutlich gezwungen, direktere Methoden in Betracht zu ziehen, wie das Entern der Anlage oder deren vollständige Zerstörung. Ohne genau zu wissen, was der Zweck der Station ist, könnten solche Maßnahmen jedoch ein erhebliches Risiko für unseren Stern darstellen."
 infernals.2151.a: "Übersetzt ihre Sprache."
 infernals.2151.b: "Entert die Station gewaltsam."
 infernals.2151.c: "Zerstört die Station."
 infernals.2160.name: "Bevorstehende Krise"
 infernals.2160.desc: "Laufende Untersuchungen der Subraum-Bergbaustation deuten darauf hin, dass sie riesige Mengen an thermischer Energie auf eine uns bisher unbekannte exotische Art speichert. Unsere [GetScientistPlural] bezeichnen dies als \"§Y$entropy_crystals$§!\". Dabei handelt es sich um eine Art thermischer Rückkopplungsschleife, die die Energiezufuhr verstärkt.\n\nSollte es uns gelingen, diese Technologie nachzubilden, könnten wir bisher unvorstellbare Kräfte nutzen, die viele als unnatürlich und gefährlich empfinden. Dies könnte zwar enorme Mengen an überschüssiger Wärme erzeugen, doch wenn wir einen Weg finden, unter solchen Bedingungen zu gedeihen, wird unser Potenzial grenzenlos sein."
 infernals.2160.a: "Führt weitere Untersuchungen durch."
 infernals.2160.a.tt: "[GetRedgiantAlreadyHyperthermiaPickable]Schaltet \"§Y$entropy_crystals$§!\" frei, um die Galaktische Hyperthermie fortzuführen."
 infernals.2160.a.ttunlock: "Erlaubt die Annahme des Aufstiegsvorteils \"$ap_galactic_hyperthermia$\".\n"
 infernals.2160.b: "Diese Technologie ist viel zu gefährlich."
 infernals.2160.c: "Das ist eine viel zu primitive Anwendung der §Ykristallisierten Entropie§!."
 situation_red_giant_expansion: "Ausdehnung des Roten Riesen"
 situation_red_giant_expansion_type: "$situation_red_giant_expansion$"
 situation_red_giant_expansion_desc: "Die sich schnell verändernde Strahlung unseres Sterns bedroht die Stabilität unserer Heimatwelt. Wenn dies so weitergeht, wird §Y[Owner.Capital.GetStarName]§! in einer Supernova untergehen und das gesamte System atomisieren."
 situation_red_giant_expansion_monthly_change_tooltip: "Die Geschwindigkeit der Ausdehnung hängt davon ab, ob und wie schnell wir die Ursache finden."
 situation_red_giant_expansion_fail_tooltip: "§Y[Target.solar_system.GetName]§! geht in einer Supernova unter."
 situation_red_giant_expansion_finish_tooltip: "§Y[Target.solar_system.GetName]§! kehrt in den ursprünglichen Zustand zurück."
 situation_red_giant_expansion_stage_1: "Das Äußere unseres Sterns ist relativ ruhig, aber die Strahlung ist ungewöhnlich hoch."
 situation_red_giant_expansion_stage_2: "Unser Stern wurde während unserer Evolution größer, und dies hat deutliche Auswirkungen auf unsere Heimatwelt."
 situation_red_giant_expansion_stage_3: "Unser Stern hat eine gefährliche Größe erreicht und droht, die Stabilität unserer Heimatwelt zu gefährden."
 situation_red_giant_expansion_stage_4: "Unser Roter Riese nimmt mit seiner Hitze einen Großteil unseres Systems ein, was das Leben extrem schwierig macht."
 situation_red_giant_expansion_stage_5: "Unser Stern steht kurz vor der Explosion, was katastrophalen Schaden an unserem Heimatsystem anrichten würde."
