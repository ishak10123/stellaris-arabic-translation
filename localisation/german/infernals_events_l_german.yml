 # RG Timeline events
 TIMELINE_EVENT_ORIGIN_RG_START: "$origin_red_giant$\n§L[GetDate]§!"
 TIMELINE_EVENT_ORIGIN_RG_START_TOOLTIP: "§HSternentunnel§!\n§YUrsprungsereignis§!\n\nWir entdeckten eine Reihe von Subraumstörungen und suchen nach der Ursache für die gefährliche Instabilität unseres Sterns."
 TIMELINE_EVENT_ORIGIN_RG_END_NOVA: "Tod eines Riesen\n§L[GetDate]§!"
 TIMELINE_EVENT_ORIGIN_RG_END_NOVA_TOOLTIP: "§HWar Zeuge einer Supernova§!\n§YUrsprungsereignis§!\n\nUnser Heimatstern dehnte sich aus, verschlang das gesamte System und hinterließ nichts als die geschmolzenen Trümmer der ehemaligen Planeten und verstreute Ressourcen in der Leere. Wir haben keine andere Wahl, als uns eine neue Zukunft im All aufzubauen."
 TIMELINE_EVENT_ORIGIN_RG_END_STABLE: "Beschwichtigter Riese\n§L[GetDate]§!"
 TIMELINE_EVENT_ORIGIN_RG_END_STABLE_TOOLTIP: "§HHeimatwelt gerettet§!\n§YUrsprungsereignis§!\n\nDer sich ausdehnende Stern konnte stabilisiert und der katastrophale Kollaps verhindert werden. Wir müssen uns noch an die erhöhte Wärmeabgabe des Sterns anpassen, doch sobald wir diese Herausforderungen meistern, werden wir stärker denn je aus ihnen hervorgehen."
 TIMELINE_EVENT_ORIGIN_RG_END_NORMAL: "Friedlicher Riese\n§L[GetDate]§!"
 TIMELINE_EVENT_ORIGIN_RG_END_NORMAL_TOOLTIP: "§HHeimatwelt gerettet§!\n§YUrsprungsereignis§!\n\nWir machten die verheerenden Veränderungen an unserem Heimatstern rückgängig und stellten den natürlichen Zustand wieder her, unter dem wir uns entwickelt haben. Wir haben bewiesen, dass wir selbst die apokalyptischsten Bedrohungen überwinden können, und sind bereit, uns allem zu stellen, was uns das Universum entgegenwirft."
 # COSMIC DAWN
 # All strings below are in order of their appearance ingame
 infernals.2500.name: "Signale aus der Tiefe" # intro
 infernals.2500.desc: "Ein gezielter Scan lieferte uns Hinweise auf eine hochentwickelte Anlage, die unter der Oberfläche von §Y[root.capital_scope.GetName]§! verborgen liegt und mit zunehmender Tiefe an Größe und Komplexität gewinnt. Die Material- und Energiesignaturen stimmen mit denen der Stasiskapseln überein, in denen wir zum ersten Mal erwachten.\n\nEs muss sich dabei um die Überreste unserer früheren Zivilisation handeln. Wenn wir den Zugang zu dieser Anlage finden, finden wir vielleicht auch Antworten auf die wichtigsten Fragen zu unserer Vergangenheit: Wer sind wir und was ist mit uns geschehen?"
 infernals.2500.a: "Unsere Reise beginnt."
 INF_ORIGIN_COSMIC_DAWN_DRILLING: "Die Kruste aufbohren" # from 2500
 INF_ORIGIN_COSMIC_DAWN_DRILLING_DESC: "Wenn wir jemals verstehen wollen, wer wir sind, müssen wir zuerst lernen, woher wir stammen. Wir müssen die unter der Oberfläche von §Y[owner.Capital.GetName]§! entdeckte Anlage untersuchen."
 infernals.2505.name: "Weitere unserer Art erwachen"
 infernals.2505.desc.a: "Wir fanden noch weitere Statiskapseln mit lebenden §Y[root.GetSpeciesNamePlural]§!. Wir sind derzeit dabei, sie aufzuwecken, doch auch sie scheinen nicht mehr von unserer Vergangenheit zu wissen als wir selbst."
 infernals.2505.desc.b: "Wir fanden noch weitere Statiskapseln mit lebenden §Y[root.GetSpeciesNamePlural]§!. Nach ihrem Verhör ist klar, dass sie ebenfalls keinerlei nützliche Erinnerungen besitzen."
 infernals.2505.a: "Wir autorisieren eine vollständige Ausgrabung."
 infernals.2505.b: "Entfernt nur, was nötig ist."
 infernals.2505.c: "Heuert Subunternehmer an, um die Ausgrabung durchzuführen."
 situation_cosmic_dawn: "Tiefe Ausgrabung"
 situation_cosmic_dawn_type: "$situation_cosmic_dawn$"
 situation_cosmic_dawn_monthly_change_tooltip: "Der derzeitige Fortschritt unserer Ausgrabung."
 situation_cosmic_dawn_desc: "Unsere Ausgrabung förderte unterirdische Anlagen zutage, die voller fortschrittlicher Technologie, archivierten Daten und Stasiskapseln mit weiteren Mitgliedern unserer schlummernden Spezies sind. Unsere gesamte Geschichte liegt hier begraben. Wenn es uns gelingt, alles auszugraben, verstehen wir vielleicht endlich, wer wir sind."
 situation_cosmic_dawn_finish_tt: "Um mehr über uns selbst zu lernen, müssen wir unsere Vergangenheit wiederentdecken."
 situation_cd_mod_mining: "$approach_cd_mining$"
 situation_cd_mod_drilling: "$approach_cd_drilling$"
 situation_cd_mod_financial: "$approach_cd_financial$"
 situation_cd_mod_storm: "$TRIGGER_FAIL$ Das Spezialprojekt \"§Y$INF_ORIGIN_COSMIC_DAWN_STORM$§!\" ist noch nicht abgeschlossen"
 situation_cd_mod_bribe: "$TRIGGER_FAIL$ Das Spezialprojekt \"§Y$INF_ORIGIN_COSMIC_DAWN_BRIBE$§!\" ist noch nicht abgeschlossen"
 sit_cd_stage1_tt: "Wir haben damit begonnen, die Planetenkruste zu durchbohren."
 sit_cd_stage2_tt: "Die Oberfläche ist von hier aus nicht mehr zu sehen."
 sit_cd_stage3_tt: "Auf halbem Weg durch die Kruste beginnt die Temperatur zu steigen."
 sit_cd_stage4_tt: "Wir haben uns so tief in die Kruste gegraben, dass wir den Kern hören."
 sit_cd_stage5_tt: "Wenn wir noch weiter graben, wird uns der Kern verschlingen."
 approach_cd_mining: "Tagebau"
 approach_cd_mining_tt: "Jeder soll graben! Wenn wir schon einmal hier unten sind, können wir auch gleich alle Mineralien abbauen.\nMonatlicher Fortschritt: §Y+$@approach_cd_mining$§!\n\n"
 approach_cd_drilling: "Gezielte Bohrungen"
 approach_cd_drilling_tt: "Wir setzen die fortschrittlichsten und präzisesten Bohrmaschinen ein, die wir haben, um nur das auszugraben, was wir müssen.\nMonatlicher Fortschritt: §Y+$@approach_cd_drilling$§!\n\n"
 approach_cd_financial: "Finanzielle Anreize"
 approach_cd_financial_tt: "Wir beauftragen Subunternehmer mit den Ausgrabungen und behalten einen Teil ihrer Gewinne für uns selbst.\nMonatlicher Fortschritt: §Y+$@approach_cd_financial$§!\n\n"
 # Stage 2
 infernals.2510.name: "Amnesie und neue Daten"
 infernals.2510.intro: "Je mehr Stasiskapseln wir entdecken, desto klarer wird, dass der Gedächtnisverlust endgültig ist."
 infernals.2510.desc.a: "$infernals.2510.intro$\n\nEinige unserer kürzlich erwachten Verwandten stellten genau jene Frage, über die wir nun nachdenken: \"Wer seid ihr?\"\n\nTrotz unserer jahrhundertealten Geschichte und der Weiterentwicklung unserer Gesellschaft können wir nicht behaupten, der Antwort näher zu sein als sie.\n\n$infernals.2510.outro$"
 infernals.2510.desc.b: "$infernals.2510.intro$\n\nNachdem wir unsere schlafenden Verwandten geweckt hatten, wurde rasch klar, dass auch ihnen relevante Erinnerungen an unsere Herkunft fehlen. Da wir keinerlei Antworten über unsere Vergangenheit finden können, sind wir gezwungen, unseren eigenen Weg durch die Geschichte zu gehen.\n\n$infernals.2510.outro$"
 infernals.2510.outro: "Im Gegensatz zu den Schlafenden enthalten zumindest die Datenbanken erstaunliche neue Informationen. Wir haben sie mehrmals analysiert, um die Daten zu validieren und das Ergebnis ist eindeutig: Alles deutet darauf hin, dass seit unserem Eintritt in die Stasis mehr als zwölf Milliarden Jahre vergangen sind.\n\nDamit liegen unsere Ursprünge nahe dem Entstehen des Universums und inmitten der Entstehung der ersten Sterne und Planeten. Wir könnten zu den allerersten Lebewesen gehören, die sich jemals entwickelten."
 infernals.2510.a: "Holen wir nach, was wir verpasst haben."
 infernals.2510.b: "Dieses Universum gehört rechtmäßig uns."
 # Stage 3
 infernals.2515.name: "Ausfall der Lebenserhaltung"
 infernals.2515.desc: "Wir gruben eine Tragödie aus: Protokolle aus der noch immer intakten Stasiskapselanlage sprechen davon, dass §Y[event_target:homeworld.GetName]§! Jahrmilliarden im All umhertrieb, bevor der Planet von seinem heutigen Stern eingefangen wurde. Die veränderte Gravitationskraft löste jedoch eine massive Flutwelle aus.\n\nObwohl dies letztlich dazu führte, dass jenes vulkanische Paradies entstehen konnte, das wir heute unser Zuhause nennen, beschädigte die anfängliche Schockwelle die Energiezellen der Anlage schwer. Die automatisierten Systeme gaben hochrangigen Individuen Vorrang und schalteten viele Kapseln mit niedrigerem Status und andere strukturelle Funktionen ab.\n\nUnsere [GetScientistPlural] sagen vorher, dass nur ein Individuum gerettet werden kann, da die freigegebene Energie zu einem vollständigen Einsturz des Tunnels führen wird.\n\nHätte die Hierarchie nicht Prioritäten gesetzt, hätten wir vielleicht noch viel mehr retten können."
 infernals.2515.a: "Der wissenschaftliche Fortschritt steht vor allem anderen."
 infernals.2515.a.tt: "Neuer Anführer: £scientist£ §Y$scientist$§!"
 infernals.2515.b: "Den für einen Wiederaufbau nötigen Experten Vorrang zu geben, war eine gute Entscheidung."
 infernals.2515.b.tt: "Neuer Anführer: £official£ §Y$official$§!"
 infernals.2515.c: "Entladet die Zellen, ohne sie zu aktivieren."
 infernals.2515.c.tt: "Individuen sind ersetzbar, aber unser Reich benötigt Platz zum Wachsen."
 infernals.2520.name: "Interstellares Refugium"
 infernals.2520.desc: "§Y[event_target:leader.GetName]§! ist derzeit dabei, die Archive der Stasisanlage zu rekonstruieren. Die neuesten Erkenntnisse deuten darauf hin, dass weitere [root.GetSpeciesNamePlural]-Populationen in Stasis über die gesamte Galaxie verstreut sein könnten.\n\nDie Archive beinhalten die Koordinaten dieser Welten, doch aufgrund ihres Alters und der Tatsache, dass seitdem ganze Sterne entstanden und verschwanden, erfordert ihre Lokalisierung eine komplexe Interpolation. Um zu beweisen, dass die Daten stimmen, wählte [event_target:leader.GetName] einen Planeten zur weiteren Erkundung aus, doch die Übersetzung des gesamten Datensatzes ist noch im Gange.\n\nUnterdessen kam ein beunruhigender Gedanke auf: [root.Capital.GetStarName] ist vielleicht gar nicht unser wahrer Heimatstern, sondern nur eine Zuflucht unter vielen. Wenn dem so ist, wo liegt dann unser Ursprung? Und spielt das überhaupt noch eine Rolle?"
 infernals.2520.a: "Wir müssen unsere Artverwandten finden."
 infernals.2520.b: "Diese Welt ist jetzt unsere Heimat."
 cosmic_dawn_anomalies_event_chain_title: "Interstellares Refugium"
 cosmic_dawn_anomalies_event_chain_desc: "Mehrere verborgene [root.GetSpeciesNamePlural]-Populationen könnten in Stasis über die gesamte Galaxie verstreut sein.\n\nDie Archive beinhalten die Koordinaten dieser Welten, doch aufgrund ihres Alters und der Tatsache, dass seitdem ganze Sterne entstanden und verschwanden, erfordert ihre Lokalisierung eine komplexe Interpolation."
 # Anomaly 2
 cosmic_dawn_sleepers_category: "Isolierte Schläfer"
 cosmic_dawn_sleepers_category_desc: "Der Planet, der sich bei diesen Koordinaten befinden soll, soll weitere Schläfer und Technologien enthalten. Wir müssen das gründlich untersuchen."
 infernals.2525.name: "$cosmic_dawn_sleepers_category$"
 infernals.2525.desc: "§Y[root.leader.GetName]§! entdeckte eine unterirdische Anlage, in der weitere Mitglieder unserer Spezies in Stasis lagen, und weckte sie erfolgreich auf. Im Gegensatz zu uns haben sie noch vage Erinnerungen an ihr früheres Leben und sie bewahren Geschichten über ein großes Weltraumimperium, das eines Tages zurückkehren wird, um sie zu retten.\n\nWenn auch vorsichtig erkennen sie uns als ihre Artverwandten an. Wir könnten uns als ihre lang ersehnten Retter präsentieren oder aber die Wahrheit sagen und ihnen erklären, dass wir etwas Neues schaffen wollen und ebenso begierig darauf sind, von ihnen zu lernen, wie wir ihnen etwas beibringen wollen.\n\nDie in den Archiven gefundenen Hinweise haben es uns erlaubt, den Standort einer zweiten Stasisanlage näher einzugrenzen."
 infernals.2525.a: "Wir sind ihre Erretter."
 infernals.2525.b: "Wir bauen etwas Neues auf."
 infernals.2525.c: "Assimiliert sie!"
 # Anomaly 3
 cosmic_dawn_sleepers2_category: "Misstrauische Schläfer"
 cosmic_dawn_sleepers2_category_desc: "$cosmic_dawn_sleepers_category_desc$"
 infernals.2530.name: "$cosmic_dawn_sleepers2_category$"
 infernals.2530.desc: "§Y[root.leader.GetName]§! entdeckte noch weitere unserer Art und weckte sie erfolgreich aus ihrem Schlummer, doch sie reagierten auf unsere Anwesenheit mit Angst und verlangten, dass wir unverzüglich verschwinden. Sie erkannten uns weder als Verwandte an noch hießen sie uns willkommen.\n\nNach angespannten Verhandlungen äußerten sie den Wunsch, gehen zu dürfen, um die Galaxie zu erkunden. Wir könnten ihnen ein einfaches Schiff zu einem moderaten Preis anbieten. Oder aber wir siedeln sie angesichts unseres ständigen Bedarfs an Arbeitskräften in die nächstgelegene Kolonie um. Vielleicht kommen sie dann zur Vernunft ...\n\nDie Archive in dieser Anlage weisen auf die genauere Lage einer anderen Welt mit weiteren Stasiskapseln hin."
 infernals.2530.a: "Gebt ihnen ein Schiff."
 infernals.2530.b: "Bringt sie nach Hause."
 infernals.2530.b.tt: "£pop£ $POPS$ erhalten: §G+200§!"
 infernals.2530.c: "Assimiliert sie."
 # Ship returns
 infernals.2531.name: "Die Rückkehr"
 infernals.2531.desc: "Die Schläfer, denen wir ein Schiff überlassen hatten, sind zurückgekehrt, und zwar an Bord eines riesigen Kriegsschiffs. Auf ihrer Reise durch die Galaxie gerieten sie in Konflikt mit Piraten, die sie überlisteten und schließlich besiegten.\n\nDie Eroberung des feindlichen Schiffs weckte etwas in ihnen: die Lust auf Piraterie. Von da an wurden ihre Überfälle immer dreister und ihre Ziele immer mächtiger. Doch trotz ihres Erfolgs kann die Piraterie nicht ewig andauern.\n\nJetzt sind sie nach Hause zurückgekehrt, auf der Suche nach Stabilität und vielleicht etwas Größerem. Mit ihrem Schiff, ihrer Erfahrung und ihrer Beute könnten sie sich noch als sehr nützlich erweisen."
 infernals.2531.a: "Es war die Kosten wert."
 infernals.2531.a.tt: "Wir könnten ihr Schiff für unsere Flotte gebrauchen. Wir erhalten einen Kreuzer."
 infernals.2531.b: "Wir sollten das Schiff umrüsten, damit es eine neue Welt für uns erschließen kann."
 infernals.2531.b.tt: "Wir erhalten ein §H$colonizer$§!."
 infernals.2531.c: "Heißen wir sie auf unserer Hauptwelt willkommen."
 infernals.2531.c.tt: "£pop£ $POPS$ erhalten: §G+200§!"
 # Anomaly 4
 cosmic_dawn_sleepers3_category: "Sternenhafen der Schläfer"
 cosmic_dawn_sleepers3_category_desc: "$cosmic_dawn_sleepers_category_desc$"
 infernals.2535.name: "$cosmic_dawn_sleepers3_category$"
 infernals.2535.desc: "§Y[root.leader.GetName]§! entdeckte eine kleinere Stasisanlage, zusammen mit einem versteckten Raumhafen, in dem ein fast funktionsfähiges Forschungsschiff untergebracht war. Kleinere Reparaturen werden ausreichen, um es wieder in Betrieb zu nehmen.\n\nDie Station enthielt auch eine Fülle wissenschaftlicher Daten, darunter konservierte Exemplare anderer Spezies[GetInterstellarRefugiaDesc2535]. Es ist unklar, ob diese gewaltsam entführt wurden oder freiwillig mitkamen, da das Schiff über Zellen verfügt, die für empfindungsfähige Fracht ausgelegt sind.\n\nWir sollten die Exemplare studieren. Es ist auch gut möglich, dass es da draußen sogar noch mehr Lebensformen zu entdecken gibt."
 infernals.2535.contact: ", von denen einige wahrscheinlich Vorfahren anderer empfindungsfähiger Zivilisationen waren" # prints this in [GetInterstellarRefugiaDesc2535] above
 infernals.2535.nocontact: "." # Can't be empty, so holds the full stop.
 infernals.2535.a: "Studieren wir die Exemplare."
 infernals.2535.b: "Bringt die Exemplare zu ihren Artgenossen zurück."
 infernals.2535.c: "Vernichtet alle Beweise."
 # Random Stasis Pods discovered
 infernals.2536.1: "Es dauerte einige Monate, doch nun haben sich endlich alle auf [planet.GetName] schlafenden [root.GetSpeciesNamePlural] unseren Reihen angeschlossen."
 infernals.2536.1.a: "Nehmt Kurs auf das System!"
 infernals.2536.1.b: "Dafür haben wir keine Zeit mehr." # ends the chance to spawn more pods.
 infernals.2536.2: "Eine weitere Stasiskapsel konnte erfolgreich geöffnet und die darin schlummernden Individuen nach Hause gebracht werden."
 infernals.2536.3: "Wir haben weitere [root.GetSpeciesNamePlural] befreien können und helfen ihnen derzeit dabei, sich in diesem kälteren Universum zurechtzufinden, in dem die Wärme von Sternen für ihr Überleben notwendig ist."
 infernals.2536.4: "Weitere [root.GetSpeciesNamePlural] konnten auf [planet.GetName] erfolgreich geweckt werden."
 infernals.2536.5: "Eine weitere Stasiskapsel wurde gefunden."
 infernals.2536.6: "[root.leader.GetName] fand eine weitere Stasiskapsel und holt mit ihr immer mehr [root.GetSpeciesNamePlural], die vor Äonen lebten, in unsere Gegenwart."
 infernals.2536.7: "[root.leader.GetName] machte weitere Stasiskapseln mit [root.GetSpeciesNamePlural] ausfindig."
 infernals.2536.8: "[root.leader.GetName] öffnete die uralten Stasiskapseln auf [planet.GetName] und kümmert sich derzeit darum, die von einem Kälteschock betroffenen Bewohner zu behandeln."
 infernals.2536.9: "Weitere Stasiskapseln voller [root.GetSpeciesNamePlural] wurden auf [planet.GetName] gefunden."
 infernals.2536.10: "Weitere [root.GetSpeciesNamePlural], die vor Äonen von Jahren lebten, sind erwacht, um sich uns anzuschließen."
 # Stage 4
 infernals.2540.name: "Ein altes Gefängnis"
 infernals.2540.desc: "Die jüngste Ausgrabung förderte eine wahre Überraschung zutage: Unsere hier lebenden Artgenossen erwachten bereits vor Jahrhunderten, verließen jedoch nie die Anlage.\n\nEine architektonische Analyse zeigte, dass die Struktur von außen verschlossen wurde, offenbar um sie einzusperren. Als wir die verstärkten Türen aufschnitten, wurden wir sofort mit Feindseligkeit konfrontiert. Glücklicherweise zogen sie sich seitdem wieder zurück und ließen uns allein.\n\nDie Archive könnten Aufschluss darüber geben, was hier vorgefallen ist, doch der Zugriff auf sie birgt die Gefahr weiterer Provokationen. Wir könnten die Anlage einfach stürmen und das Problem aus der Welt schaffen oder aber versuchen, die Bewohner der Anlage zu bestechen, damit sie mit uns zusammenarbeiten."
 infernals.2540.a: "Stürmt die Anlage!"
 infernals.2540.b: "Bietet ihnen Geschenke und Freundschaft an."
 INF_ORIGIN_COSMIC_DAWN_STORM: "Die Stasisanlage stürmen"
 INF_ORIGIN_COSMIC_DAWN_STORM_DESC: "Wir müssen Zugang zu dieser Anlage erhalten, doch die erwachten Schlafenden stellen sich uns in den Weg. Wir müssen sie gewaltsam beseitigen."
 infernals.2545.name: "Stürmung des Gefängnisses"
 infernals.2545.desc: "Unsere Truppen stürmten die Anlage und schafften es, den Großteil der Bewohner mit nur leichtem Widerstand zu überwältigen.\n\nDie Archive enthüllten, dass es sich bei der Anlage um ein Gefängnis handelte. Die Gefangenen waren Extremisten, die sich für extreme technologische Maßnahmen zur Wiedererwärmung des sich abkühlenden Universums einsetzten, von denen einige völlig unrealistisch waren und andere potenziell katastrophale Auswirkungen gehabt hätten. Der Rest der Gesellschaft ächtete sie und sperrte sie schließlich hier ein.\n\nEinige der §Y[root.GetSpeciesNamePlural]§!-Gefängnisanführer haben sich selbst in einer zentralen Kammer verbarrikadiert und den Bereich großflächig mit Sprengsätzen versehen. Sie fordern, dass alle Insassen hier bleiben und wieder versiegelt werden.\n\nWir könnten die Tunnel mit einem unsichtbaren Gas füllen, das die Sprengsätze reaktionsträge macht, um die Anlage selbst zu retten, doch die meisten Bewohner würden bei diesem Vorgang ersticken."
 infernals.2545.a: "Flutet die Tunnel mit Gas."
 infernals.2545.a.tt: "£pop£ $POPS$ erhalten: §G+100§!"
 infernals.2545.b: "Leitet eine schnelle Evakuierung ein."
 infernals.2545.b.tt: "£pop£ $POPS$ erhalten: §G+400§!"
 INF_ORIGIN_COSMIC_DAWN_BRIBE: "Die Bewohner der Stasisanalage bestechen"
 INF_ORIGIN_COSMIC_DAWN_BRIBE_DESC: "Sollten wir es schaffen, die Bewohner der Anlage von uns abhängig zu machen, hätten wir ein Druckmittel, um Zugang zu erhalten. Wir sollten sie mit nützlichen und lebenswichtigen Ressourcen überschütten."
 infernals.2550.name: "Stürmung des Gefängnisses"
 infernals.2550.desc: "Der monatelange Handel machte die ehemaligen Stasisinsassen von unseren Lieferungen abhängig. Als wir drohten, diese einzustellen, gerieten sie in Panik und gaben die Kontrolle über die Anlage ab.\n\nDie Archive bestätigten, dass es sich um ein Gefängnis handelte. Die Insassen drängten einst auf die Einführung radikaler Technologien, um das abkühlende Universum wieder aufzuheizen: Einige Ideen waren absurd, andere potenziell tödlich.\n\nGlücklicherweise erinnern sie sich an nichts davon. Während unsere Wissenschaftler den Ort weiter untersuchen, integrieren sie die ehemaligen Häftlinge langsam in unsere Gesellschaft und Letztere stehen kurz vor der Assimilierung."
 infernals.2550.a: "Gute Arbeit."
 infernals.2550.a.tt: "£pop£ $POPS$ erhalten: §G+300§!"
 # Stage 5
 infernals.2555.name: "Ein tragischer Unfall"
 infernals.2555.intro: "Am jüngsten Ausgrabungsort ereignete sich ein Unfall, bei dem das Kraftwerk beschädigt wurde. Glücklicherweise sind die Stasiskapseln noch funktionsfähig."
 infernals.2555.outro: "Es ist unklar, wie lange die Lebenserhaltung noch aufrechterhalten werden kann. Wenn wir die Schlafenden retten wollen, müssen wir handeln, bevor der Anlage die Energie ausgeht."
 infernals.2555.desc.a: "$infernals.2555.intro$\n\nDer Verdacht fällt auf einige der kürzlich assimilierten Thermophilen, und es gibt Gerüchte, sie seien nicht gerade die fleißigsten Arbeiter.\n\n$infernals.2555.outro$"
 infernals.2555.desc.b: "$infernals.2555.intro$\n\nAls sie von dieser Katastrophe hörten, erklärten sich die zuvor geretteten Thermophilen freiwillig dazu bereit, bei der Rettung zu helfen.\n\n$infernals.2555.outro$"
 infernals.2555.a: "Eliminiert die Illoyalen."
 infernals.2555.b: "Scheut keine Kosten, um mehr Hilfe zu bekommen."
 infernals.2555.c: "Eilt ihnen zur Rettung."
 infernals.2555.d: "Geht mit äußerster Vorsicht vor."
 # Option events from above (Stage 4)
 infernals.2560.name: "Das Beste aus der Situation machen"
 infernals.2560.desc: "Wir haben den Zugang zur Anlage auf unsere loyalsten Mitarbeiter beschränkt, um die Rettungsmaßnahmen möglichst wenig zu behindern.\n\nLeider schränkten die Sicherheitskontrollen unsere personellen Ressourcen so stark ein, dass wir die Anlage nicht retten konnten. Die Schläfer kamen ums Leben.\n\nUnser einziger Trost liegt darin, die Technologie zu untersuchen. Der allmähliche Verfall und letztendliche Stillstand könnten wertvolle Erkenntnisse liefern."
 infernals.2560.a: "Was für eine Schande!"
 infernals.2565.name: "$infernals.2560.name$"
 infernals.2565.desc: "Wir boten finanzielle Anreize für die Rettung an und erhielten eine Flut von Bewerbern.\n\nLeider wurden unsere Bemühungen von den ehemaligen Gefängnisinsassen sabotiert, die uns unseren Reichtum und die damit verbundene Macht missgönnen. Die Sabotage führte zum Tod aller, die sich noch in Stasis befanden.\n\nWir können den einzigen Trost darin finden, dass die Technologie und die Archive nicht beschädigt wurden und wir sie untersuchen können. Dieser Fehler deckte außerdem Schwachstellen in unseren Überprüfungsprozessen auf, die man nun beheben kann."
 infernals.2565.a: "Was für eine verabscheuungswürdige Tat!"
 infernals.2570.name: "$infernals.2560.name$"
 infernals.2570.intro: "Dank der zahlreichen Arbeiter und Rettungskräfte, die zur unterirdischen Anlage eilten, konnten wir die schlafende [Species.GetNamePlural]-Population schnell und sicher aus ihren defekten Stasiskapseln befreien. Diese neuen Bürger waren dankbar für ihre Rettung, nachdem sie erfuhren, welchem Schicksal sie knapp entkamen."
 infernals.2570.outro: "Leider mussten im Zuge der überstürzten Rettungsaktion viele der Stasiskapseln aufgeschnitten oder anderweitig zerstört werden, wodurch der wissenschaftliche Wert begrenzt ist."
 infernals.2570.desc.a: "$infernals.2570.intro$\n\n$infernals.2570.outro$"
 infernals.2570.desc.b: "$infernals.2570.intro$\n\nDarüber hinaus unterstützen Freiwillige von den bereits assimilierten Infernalen die Neuankömmlinge durch Gespräche und Hilfsgüter und erleichtern ihnen so die Integration in die Gesellschaft.\n\n$infernals.2570.outro$"
 infernals.2570.a: "Gut, dass wir diese zusätzlichen Freiwilligen hatten."
 infernals.2570.a.tt: "£pop£ $POPS$ erhalten: §G+400§!"
 infernals.2570.b: "Gute Arbeit."
 infernals.2570.b.tt: "£pop£ $POPS$ erhalten: §G+400§!"
 infernals.2570.c: "$ACKNOWLEDGED$"
 infernals.2570.c.tt: "£pop£ $POPS$ erhalten: §G+400§!"
 infernals.2575.name: "$infernals.2560.name$"
 infernals.2575.desc: "Unsere Wissenschaftler analysierten die Systeme der Anlage sorgfältig, um sicherzustellen, dass wir genau wissen, womit wir es zu tun haben, bevor wir mit der Rettungsmission beginnen.\n\nLeider dauerte der Prozess – von der Analyse über die Veröffentlichung bis hin zu den Folgestudien – viel zu lange. Als wir bereit waren, hatten die Lebenserhaltungssysteme bereits versagt, was dazu führte, das alle in den Stasiskapseln ums Leben kamen.\n\nDies ist zwar tragisch, doch zumindest brachte uns der Prozess einige wissenschaftliche Erkenntnisse, und die wiedergewonnene Technologie erweist sich ebenfalls als wertvoll."
 infernals.2575.a: "Glücklicherweise können die Lebenden dennoch davon profitieren."
 infernals.2575.b: "$ACKNOWLEDGED$"
 # Situation completed
 infernals.2580.name: "Enthüllung unserer Geschichte"
 infernals.2580.desc: "Wir haben endlich den zentralen Kern erreicht, und seine Größe ist unvorstellbar. Im Inneren des Planeten befindet sich eine riesige Arkologie, die von Magma angetrieben wird und Tausende von Schläfern beherbergt.\n\nSie umfasst auch ein riesiges Archiv, das unsere Vergangenheit dokumentiert: den Aufstieg unseres galaktischen Imperiums und Berichte über die große Abkühlung des Universums. Einige entschieden sich für die Stasis, andere kämpften gegen das Unvermeidliche an, und viele leugneten einfach die Realität und gingen zugrunde.\n\nDiese Fülle an Informationen offenbarte uns längst vergessene Wahrheiten. Manche glauben, dies zeigt, wer wir wirklich sind und wer wir noch werden können. Andere argumentieren, dass wir uns eine neue, eigene Identität schufen und dass die Gesellschaft unserer Vorfahren nicht mehr in die heutige Welt passt.\n\nSo oder so können wir das riesige Tunnelnetzwerk jetzt für unsere eigenen Zwecke nutzen."
 infernals.2580.a: "Wir sollten unser altes Reich wiederaufbauen."
 infernals.2580.b: "Andere Reiche sollten unser Vermächtnis respektieren."
 infernals.2580.b.tt: "Wir erhalten einen £commander£ §Y$commander$§! der Stufe §G5§!."
 infernals.2580.c: "Wir sollten in die Zukunft blicken."
 infernals.2580.d: "Hauptsache, wir tun etwas Gutes."
 # Relic & Specimen
 r_pyroglyphic_codex: "Pyroglyphischer Kodex"
 r_pyroglyphic_codex_desc: "Ein kompliziertes Kristall-Planetenmodell, das eine Fülle von Informationen über eine Zivilisation aus den Anfängen des Universums enthält. Die Inhalte können uns viel darüber lehren, wie man eine bessere Gesellschaft aufbaut."
 r_pyroglyphic_codex_effect_tt: "\nWenn der Pyroglyphische Kodex zum §Yersten Mal§! aktiviert wird, erhält unsere Hauptwelt dauerhaft den Modifikator \"§Y$infernal_library$§!\", der die folgenden Auswirkungen hat: $TABBED_NEW_LINE$- $MOD_PLANET_MAX_DISTRICTS_ADD$: §G+5§! $TABBED_NEW_LINE$- $MOD_PLANET_HOUSING_MULT$: §G+20%§! $TABBED_NEW_LINE$- $MOD_PLANET_AMENITIES_ADD$: §G+10%§!"
 infernal_library: "Untergrundarchitektur"
 infernal_library_desc: "Die Wiederentdeckung alter Bautechniken eröfffnete neue Möglichkeiten für den Bau riesiger, höhlenartiger Städte. Die Detailtreue der Architektur erinnert unsere Bevölkerung an ihren wahren Ursprung."
 pyroglyphic_codex_mod: "$r_pyroglyphic_codex$"
 pyroglyphic_codex_mod_desc: "Die faszinierenden Geheimnisse, die im Pyroglyphischen Kodex zu finden sind, bilden die Grundlage für neue Forschungsansätze und werden dies auch noch viele weitere Jahre lang tun."
 infernal_stasispod: "Uralte Stasiskapsel"
 infernal_stasispod_desc_short: "Ein Sarg aus synthetischem Gestein, der mit erstaunlich präzisen Temperaturreglern ausgestattet ist."
 infernal_stasispod_desc_details: "Diese Kapseln wurden einst von der [Species.GetNamePlural]-Spezies genutzt, um sich für Milliarden von Jahren in Stasis zu versetzen. Sie sollten erst wieder erwachen, wenn die Temperaturen hoch genug sind, um sie am Leben zu halten. Diese Kapsel stammt aus einer Anlage, in der die Lebenserhaltung versagte und die Bewohner ums Leben kamen. Sie dient als eindringliche Mahnung an die Prüfungen, die die Überlebenden durchmachen mussten."
 ####################################
 # Colony Events
 ####################################
 # Imminent Eruption
 infernals.3000.name: "Bevorstehender Ausbruch"
 infernals.3000.desc: "Unsere geologischen Frühwarnsysteme warnen vor einem Vulkanausbruch in der Nähe der Hauptsiedlung auf §Y[planet.GetName]§!, der innerhalb des nächsten Jahres eintreten wird.\n\nDurch Investitionen in eine kontrollierte Druckentlastung könnte der Lavastrom zur Energieerzeugung genutzt werden. Außerdem könnten Teams bereitstehen, um Magma direkt aus dem Vulkan zu schöpfen, um Edelmetalle daraus zu gewinnen. Alternativ können wir uns aber auch darauf konzentrieren, Zivilisten und Vorräte aus dem Gebiet zu evakuieren, um das Risiko zu minimieren.\n\nWir können die Situation auch erst einmal beobachten, bevor wir Maßnahmen ergreifen, für den Fall, dass die Vorhersagen ungenau sind."
 infernals.3000.a: "Wir evakuieren!"
 infernals.3000.a.tt: "Hat §Y500§! $energy$."
 infernals.3000.b: "Warten wir ab, was passiert."
 infernals.3000.c: "Wir sollten uns auf die Energieerzeugung konzentrieren."
 infernals.3000.d: "Erntet das Magma."
 infernals.3005.name: "Gerade noch rechtzeitig"
 infernals.3005.desc: "Die frühzeitige Evakuierung der Kolonie erwies sich als gute Entscheidung, da der Vulkan früher als erwartet ausbrach und großflächig Gebäude und Infrastruktur in dem Gebiet zerstörte. Da der Druck im Untergrund mittlerweile abgeklungen ist, können die Kolonisten zurückkehren und mit dem Wiederaufbau beginnen."
 infernals.3010.name: "Vulkanischer Zorn"
 infernals.3010.desc: "Der Vulkan brach frühzeitig aus, ohne dass die Kolonie auf die Katastrophe vorbereitet war. Es kam zu massiven Schäden an der Infrastruktur, und es gab zahlreiche Todesopfer."
 infernals.3015.name: "Abwarten und beobachten"
 infernals.3015.desc: "Nach einigen Monaten hat sich die vulkanische Aktivität nahe einer unserer Kolonien auf §Y[planet.GetName]§! wieder beruhigt. Langfristig besteht zwar weiterhin das Risiko eines Ausbruchs, doch die Kolonie scheint vorerst sicher."
 infernals.3015.a: "Das Risiko hat sich gelohnt."
 infernals.3020.name: "Verstärktes Stromnetz"
 infernals.3020.desc: "Unsere Ingenieure entwickelten ein System, um die unter Druck stehende Lava langsam aus den unterirdischen Kammern abzulassen und sie dabei durch Stromgeneratoren zu leiten. Dies führte zu einer kurzfristigen Verbesserung der Stromversorgung in der Kolonie."
 infernals.3025.name: "Magmaernte"
 infernals.3025.desc: "Der Vulkanausbruch konnte durch eine Kombination aus Ultraschall und physischen Barrieren unterbrochen werden, was ein großes Magmafeld auf der Oberfläche einschloss und aushärtete. Unsere Bergbautrupps haben bereits damit begonnen, die reichhaltigen Mineralien abzubauen."
 # Lava Sports
 infernals.3030.name: "Lavasport"
 infernals.3030.desc: "Man könnte meinen, dass man nicht gern Zeit in der Nähe von offenen, schnell fließenden Lavaströmen verbringen möchte, doch zumindest auf §Y[planet.GetName]§! ist dies nicht der Fall.\n\nDie Kolonisten fahren mit Luftkissenfahrzeugen Rennen entlang aktiver Lavaströme, weichen schwimmenden Felsbrocken aus und springen über Lavafälle. Andere wetten auf die Ergebnisse dieser Rennen, und die Spielhöllen ziehen das Interesse des organisierten Verbrechens auf sich. Einige der Rennfahrer sind bereits bei verschiedenen Unfällen ums Leben gekommen.\n\nAuf der Kolonie gibt es keinerlei Gesetze gegen diese Praxis, da man sich nie hätte vorstellen können, dass jemand so etwas tun würde. Wir könnten den Enthusiasmus der Kolonisten begrüßen und sie tun lassen, was sie wollen, aber das könnte zu immer gefährlicheren Stunts und wachsender Kriminalität führen, da das Glücksspiel bereits zunimmt. Alternativ könnten wir den Sport regulieren. Das würde zwar zu einigen Beschwerden führen, aber langfristig die Zahl der Todesfälle und Straftaten minimieren. Oder aber wir verbieten alles komplett. Das wäre zwar äußerst wirksam, würde aber auch hohe Kosten verursachen."
 infernals.3030.a: "Lasst die Lava fließen."
 infernals.3030.b: "Wir müssen den Sport regulieren."
 infernals.3030.c: "Verbietet diesen Unsinn!"
 lava_surfboard: "Lava-Surfbrett"
 lava_surfboard_desc_short: "Eine längliche Stahlplatte mit einem provisorisch an der Unterseite angeschweißten Schwebemechanismus."
 lava_surfboard_desc_details: "Obwohl das Surfbrett für die Lavarennen auf [Event.Planet.GetName] ganz offensichtlich aus Ersatzteilen zusammengebastelt wurde, weist es eine ungewöhnliche Sorgfalt und Raffinesse auf. Das Schwebesystem und die Wärmeschutzvorrichtungen sind ausgezeichnet, und die Ästhetik ist ein Zeugnis der Selbstständigkeit unserer Kolonisten, die ins Unbekannte aufbrechen."
 infernals.3035.name: "Lasst die Lava fließen!"
 infernals.3035.desc: "Die Tatsache, dass Kolonisten diesem Trend frei nachgehen können, weckte die Begeisterung für alle Arten von Lavasportarten. Bilder von Rennfahrern, die ihre Luftkissenboote über Lavaströme steuern, wurden rasch zu einem Symbol für die kulturellen Besonderheiten auf §Y[planet.GetName]§!.\n\nLeider drängte die Begeisterung die Sicherheit in den Hintergrund. Es gibt weiterhin vereinzelte Berichte über Todesfälle bei Rennen, und Geldverleiher nutzen die Spielsucht von Lavasportenthusiasten schamlos aus. Auch wenn die öffentliche Zustimmung zu diesem Sport weiterhin hoch ist, sollten wir die negativen Folgen im Blick behalten."
 infernals.3035.a: "Beunruhigend."
 infernals.3040.name: "Sicherheitsmaßnahmen"
 infernals.3040.desc: "Während die Kolonisten zunächst gegen die Reichsbehörden protestierten, die ihr geliebtes Hobby regulieren wollen, haben die neuen Sicherheitsmaßnahmen für Rennfahrzeuge Verletzungen und Todesfälle fast vollständig eliminiert. Sogar die Rennpiloten sprechen sich für die Vorteile dieser Vorschriften für ihre eigene Sicherheit aus, was auch die Öffentlichkeit überzeugte.\n\nLavasportwetten unterliegen nun ebenfalls einer finanziellen Transparenz und einer Besteuerung, wobei man die Einnahmen für die Sicherheitsausrüstung der Rennfahrer verwendet. Kriminelle Elemente haben sich größtenteils aus den Spielhöllen zurückgezogen, obwohl einige Kolonisten die Besteuerung durch die Behörden als ungerecht empfinden."
 infernals.3040.a: "Vorsicht ist besser als Nachsicht."
 infernals.3045.name: "Verbotener Sport"
 infernals.3045.desc: "Die Strafverfolgungsbehörden setzen sich mittlerweile aktiv dafür ein, den gefährlichen Lavasportarten ein Ende zu setzen. Die öffentliche Empörung war zwar groß und es kam zu Protesten in der gesamten Kolonie, aber da die Lavaströme nun einer ständigen Überwachung unterliegen und die Rennfahrer nicht mehr antreten können, ist die Zahl der Todesfälle auf null gesunken und auch die Glücksspielszene ist so gut wie verschwunden."
 infernals.3045.a: "Es gab keinen anderen Weg."
 lava_sports_flow: "Lavasport: §GErlaubt§!"
 lava_sports_flow_desc: "Kolonisten können den neusten Sporttrends frei nachgehen, was eine Welle der Begeisterung ausgelöst hat."
 lava_sports_regulated: "Lavasport: §YReguliert§!"
 lava_sports_regulated_desc: "Während die Kolonisten zunächst gegen die Reichsbehörden protestierten, die ihr geliebtes Hobby regulieren wollen, haben die neuen Sicherheitsmaßnahmen für Rennfahrzeuge Verletzungen und Todesfälle fast vollständig eliminiert. Sogar die Rennpiloten sprechen sich für die Vorteile dieser Vorschriften für ihre eigene Sicherheit aus, was auch die Öffentlichkeit überzeugte."
 lava_sports_banned: "Lavasport: §RVerboten§!"
 lava_sports_banned_desc: "Die Strafverfolgungsbehörden wurden angewiesen, dieser gefährlichen Praxis ein Ende zu setzen."
 # Kindled Myths
 infernals.3055.name: "Entflammte Mythen"
 infernals.3055.desc: "Die Zivilisation auf §Y[pre_ftl_planet.GetName]§! weist auffällige Ähnlichkeiten mit einigen der Wesen aus unseren ältesten Mythen auf. Dies lässt sich zum Teil durch allgemeine Neigungen in der konvergenten Evolution und der Psychologie erklären, doch je mehr wir über diese Spezies erfahren, desto mehr Verbindungen entdecken wir.\n\nHandelt es sich bei ihnen vielleicht wirklich um dieselben Wesen, die auch in unseren Mythen und Legenden vorkommen? Die Aussicht darauf sorgt für zunehmende Aufregung, und wir könnten in die Weiterführung dieser Forschung investieren. Manchmal gibt es aber auch einfach nur Zufälle, die keine tiefere Bedeutung besitzen, und zu viel Neugier könnte dieser Gesellschaft unsere Anwesenheit offenbaren und unbeabsichtigte Folgen haben."
 infernals.3055.a: "Ignoriert diesen Zufall einfach."
 infernals.3055.b: "Führt weitere Untersuchungen durch!"
 infernals.3060.name: "Törichte Annahme"
 infernals.3060.desc: "Trotz der Forderung, das Phänomen genauer zu untersuchen, wäre es unklug, der Hypothese einer fremden Spezies aus unserer Mythologie weiter nachzugehen. Schließlich hat diese Spezies ihre eigenen Mythen, Legenden und Sichtweisen, die möglicherweise nicht mit unseren eigenen Vorurteilen vereinbar sind. Die Forschung zu diesem Thema wurde unterbrochen, und die Mittel wurden für andere Zwecke umgeleitet."
 infernals.3060.a: "Überraschend vertraut, aber doch sonderbar."
 infernals.3065.name: "Primitive Unruhen"
 infernals.3065.desc: "In dem Bemühen, die von uns beobachtete Spezies mit unseren Mythen in Verbindung zu bringen, missachteten unsere Agenten das Protokoll für den sicheren Kontakt mit Zivilisationen ohne ÜL-Technologie. Überall auf dem Planeten meldeten Einheimische mehrere Sichtungen unserer Schiffe, stahlen Ausrüstung und entführten in einem Fall sogar einen unserer Agenten zu Forschungszwecken. Die Erkenntnis unserer Existenz führte zu Unruhen und polarisiert die Massen.\n\nTrotz des operativen Chaos hält die Begeisterung in unserem Volk an, eine mythologische Verbindungen zu finden. Diese Spezies wird in unserem Reich zunehmend aus einer spirituellen Perspektive betrachtet."
 infernals.3065.a: "Wir hätten vorsichtiger sein müssen."
 infernals.3070.name: "Eine erstaunliche Entdeckung."
 infernals.3070.desc: "Nach einigen intensiven Untersuchungen der Bewohner von §Y[pre_ftl_planet.GetName]§! ebbten die mythologischen Hypothesen immer mehr ab. Zwar finden sich viele Parallelen zwischen unseren ältesten Geschichten und diesen Wesen, doch wurden auch einige nicht zu bestreitende Unterschiede entdeckt.\n\nTrotz dieser komplizierteren Situation bleibt die Begeisterung für ihre Spezies bestehen. Es wird vermutet, dass sie möglicherweise eine Restpopulation der ursprünglichen Wesen aus unseren Geschichten darstellen und dass die Unterschiede auf die lange Zeit zurückzuführen sind, die seitdem vergangen ist. Auch wenn wir sie heute als eigenständige Gesellschaft anerkennen müssen, fühlen sich viele in unserem Reich nun spirituell stark mit ihnen verbunden."
 infernals.3070.a: "Ein bereichernder Moment für uns alle."
 # Molten Core Grand Archive specimen
 infernals.3200.name: "Geschmolzener Kern"
 infernals.3200.desc: "Mit dem Wachstum der Kolonie auf §Y[planet.GetName]§! sind auch immer mehr Spuren einer ausgestorbenen Zivilisation aufgetaucht, die $sr_living_metal$ nutzte, auch wenn es keine Hinweise darauf gibt, woher dieses Material stammte.\n\nVor Kurzem stießen wir jedoch auf eine mögliche Antwort: eine seltsame, schimmernde Kugel, die von einem Kraftfeld umgeben aus den tiefen Magmaströmen emporstieg. Ihr Zweck und ihre Bauweise sind für uns nicht unmittelbar zu durchschauen, aber sie sondert $sr_living_metal$ aus, wenn sie extrem hohen Temperaturen ausgesetzt wird. Damit ist das archäologische Rätsel zwar gelöst, doch wir müssen noch entscheiden, was wir damit anfangen sollen."
 infernals.3200.a: "Wir behalten das Artefakt."
 infernals.3200.a.accept: "Das kuriose Objekt ist anders als alles, was wir bisher entwickelten. Es ist nicht nur eine Quelle für $sr_living_metal$, sondern besitzt auch eine wissenschaftliche und historische Relevanz, die man weiter untersuchen kann."
 infernals.3200.b: "Werft es zurück in die Lava."
 infernals.3200.b.deny: "Es gibt nichts Bewundernswertes an einer Zivilisation, die sich nicht anpassen konnte und ausgestorben ist. Das Artefakt muss entsorgt und vergessen werden."
 infernal_molten_core: "Geschmolzener Kern"
 infernal_molten_core_desc_short: "Eine silberne Kugel mit einer welligen, fließenden Textur, die von einem leise zischenden Kraftfeld umgeben ist."
 infernal_molten_core_desc_details: "Das Kraftfeld des Kerns lässt nur bei hohen Temperaturen nach, wodurch ein Tropfen $r_living_metal$ entweichen kann. Die ursprünglichen Schöpfer sind längst verschwunden, doch der Kern zeugt noch immer von ihrem technologischen Fortschritt und ihrem Erfindungsreichtum."
 # CD Timeline events
 TIMELINE_EVENT_ORIGIN_CD_START: "Tiefenecho\n§L[GetDate]§!"
 TIMELINE_EVENT_ORIGIN_CD_START_TOOLTIP: "§HDen Spuren folgen§!\n§YUrsprungsereignis§!\n\nWir empfingen schwache, aber komplexe Signale aus den Tiefen der Planetenoberfläche. Wir gehen davon aus, dass tief in der Kruste ein Netzwerk alter Strukturen verborgen liegt – Strukturen, die noch aus der Zeit vor unserer Stasis stammen."
 TIMELINE_EVENT_ORIGIN_CD_END: "Vergangenheit aufgedeckt\n§L[GetDate]§!"
 TIMELINE_EVENT_ORIGIN_CD_END_TOOLTIP: "§HEreigniskette abgeschlossen§!\n§YUrsprungsereignis§!\n\nWir entdeckten tief im Inneren des Planeten eine riesige Anlage und bargen einen Kodex mit verlorenen Informationen aus einer längst vergangenen Zeit. Wir sind die Nachkommen eines alten und mächtigen Reichs, und wir sind bereit, unser Erbe anzutreten."
