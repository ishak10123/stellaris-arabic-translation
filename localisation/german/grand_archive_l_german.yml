 ##########
 #Relics #
 ##########
 r_the_modularium: "Das Modularium"
 r_the_modularium_desc: "Ein modulares Raffineriesystem, das automatisch wertvolle Ressourcen zu exponentiellen Raten produziert, aber dafür auch eine riesige Menge Energie benötigt."
 the_modularium_active_effect_tt: "Verdoppelt die vom Modularium produzierten Ressourcen und verdoppelt die Kosten für den nächsten Triumph."
 r_flowmetal_alloy: "Fließmetalllegierung"
 r_flowmetal_alloy_desc: "Dieses sich selbst replizierende Material stärkt die chemische Verbindung von jedem Metall, mit dem es in Berührung kommt. Die Integration von Fließmetall in unseren Montageprozess erhöht die Produktion von Großmaschinen erheblich."
 flowmetal_alloy_active_effect_tt: "Erschafft §G300§! §Y£pop£ Roboter-Bewohner§! auf der Hauptwelt."
 r_crystallinus_diffuser: "Kristalldiffusor"
 r_crystallinus_diffuser_desc: "Diese Maschine ist in der Lage, synthetisch hergestellte Kristalle in eine extrem starke und leistungssteigernde Droge umzuwandeln. In ihrer reinsten Form ist die daraus resultierende Chemikalie biologisch flüchtig und kann bei einem kleinen Prozentsatz ihrer Nutzer zu einem Organversagen führen."
 crystallinus_diffuser_active_effect_tt: "Erhöht die Produktion von biologischen Bewohnern Eures Reichs 10 Jahre lang um 100%. Nach diesen 10 Jahren sterben jedoch 20% von ihnen."
 crystallinus_diffuser_machine_empire_active_effect_tt: " §G+100§! $r_energy$ für 10 Jahre."
 relic_crystallinus_diffuser_opinon: "§G+25§! Meinung bei §Ybiologischen§! Reichen."
 triggered_opinion_relic_crystallinus_diffuser: "$r_crystallinus_diffuser$"
 crystallinus_diffuser_modifier: "$r_crystallinus_diffuser$-Triumph"
 r_everchanging_stone: "Formveränderungsstein"
 r_everchanging_stone_desc: "Ein künstlicher Edelstein, der basierend auf seiner Umgebung die Farbe und chemische Zusammensetzung verändern kann. Wird er neben einem anderen Objekt platziert, ahmt er die Elementarstruktur des Materials nach und erlaubt es uns damit, die molekulare Zusammensetzung des Objekts besser zu verstehen."
 everchanging_stone_modifier: "$r_everchanging_stone$-Triumph"
 everchanging_stone_modifier_tt: "Für jedes in einer $EXHIBITION_XENO_GEOLOGY$ ausgestellte ['concept_specimen'] erhöht sich der Bonus der beiden anderen Kategorien um §G+$@everchanging_stone_modifier|0%$§!."
 r_pulsestone: "Impulsstein"
 r_pulsestone_desc: "Ein hoch radioaktiver Stein, der gefährliche Magnetwellen erzeugt. Er hat das Potenzial, unser Verständnis der Feldmanipulation zu revolutionieren, doch die Energie, die er ausstrahlt, ist fast unmöglich zu bändigen."
 pulsestone_modifier: "$r_pulsestone$"
 mod_scientist_lifespan_add: "Lebensdauer (Wissenschaftler)"
 r_gavel_of_the_tribunal: "Gerichtsbarkeitshammer des Tribunals"
 r_gavel_of_the_tribunal_desc: "Auf dem Griff dieses Hammers sind die Namen jenes uralten Triumvirats eingraviert, das eine inzwischen tote Galaxie regierte. Er ist zwar viel zu groß, als dass einer von uns ihn schwingen könnte, doch seine bloße Präsenz ruft eine gewisse Ehrfurcht hervor."
 gavel_of_the_tribunal_galcom: "$r_gavel_of_the_tribunal$"
 gavel_of_the_tribunal_galcom_tt: "Diplomatische Bedeutung £diplo_weight£ §G+$@gavel_of_the_tribunal_galcom_diplo_weight|0%$§!, bis der nächste §YBeschluss§! erlassen wurde."
 gavel_of_the_tribunal_no_galcom: "$r_gavel_of_the_tribunal$"
 r_celestial_resonator: "Himmlischer Resonator"
 r_celestial_resonator_desc: "Eine seltsame Apparatur, die gewaltige, ehrfurchtgebietende Lichtspiele erzeugt, besonders dann, wenn man sie in der Nähe von Exemplaren positioniert."
 celestial_resonator_tt: "Produziert 10 $r_unity$ für jedes ausgestellte ['concept_specimen']"
 celestial_resonator_triumph_tt: "Erhält §G+$@celestial_resonator_happiness|0%$§! £happiness£ §YZufriedenheit§! und §G+$@celestial_resonator_diplo_weight|0%$§! £diplo_weight£ §YDiplomatische Bedeutung§! für jedes ausgestellte ['concept_specimen']"
 celestial_resonator_modifier: "$r_celestial_resonator$"
 r_entangled_relay: "Verschränktes Relais"
 r_entangled_relay_desc: "Dieses uralte Objekt ist in der Lage, weit entfernte Informationsübertragungsnetze per Quantenverschränkung miteinander zu verbinden, was eine nahtlose Kommunikation auf galaktischer Ebene ermöglicht."
 entangled_relay_modifier: "$r_entangled_relay$"
 r_prototype_vir_core: "VIR-Kern-Prototyp"
 r_prototype_vir_core_desc: "Diese isolierte künstliche Intelligenz ist Lehrerin und Mentorin zugleich und bietet für nahezu jede Situation effektive Hilfe. Sie zeichnet sich vor allem dadurch aus, dass sie komplizierte Sachverhalte in einfachen Worten beschreibt und Informationen klar darlegt, damit der Benutzer fundierte Entscheidungen treffen kann."
 prototype_vir_core_modifier: "$r_prototype_vir_core$"
 r_propagandosphere: "Propagandasphäre"
 r_propagandosphere_desc: "Diese holografische Kugel ist ein Archiv voller Propagandafilme einer längst untergegangenen Zivilisation. Diese Kurzfilme zeugen von ihrem Einfallsreichtum und sind fesselnd anzusehen. Wir könnten sie nach unserem Vorbild neu drehen und so unsere Truppen und unser Volk inspirieren."
 r_executus_compendium: "Exekutivkompendium"
 r_executus_compendium_desc: "Diese umfangreichen Aufzeichnungen über den Rat einer uralten Zivilisation wurden in einer versiegelten Kapsel aufbewahrt. Auf den Zigtausenden von Seiten finden sich detaillierte Berichte über bürokratische Optimierungen und innovative Organisationsmethoden. Viele dieser Verbesserungen ließen sich in unseren eigenen Regierungsprozessen umsetzen."
 executus_compendium_triumph_tt: "Beginnt die Agenda zu 10% ihrer ursprünglichen Kosten (Minimale Kosten: £unity£3000)."
 r_the_pattern_maker: "Modellmacher"
 r_the_pattern_maker_desc: "Diese uralte Maschine kann die dynamische Flugbahn von Objekten überwachen und vorhersagen, wie sich Objekte - besonders feindliche Schiffe - verhalten werden. Die von den Vorhersagealgorithmen erzeugten Datenmuster sind so vielschichtig wie die Entwürfe eines Meisterarchitekten. Mit genügend Energie und Material kann der Modellmacher ein spezialisiertes Aufklärungsschiff bauen, das über leistungsstarke Sensoren verfügt."
 r_the_pattern_maker_effect_tt: "Erzeugt ein Aufklärungsschiff der §YModellgänger§!-Klasse.\n - Sehr hohe Geschwindigkeit und eine erhöhte Hyperraumrouten-Erkennungsreichweite"
 NAME_Patternwalker: "Modellgänger"
 NAME_Patternwalker_Cloak: "$NAME_Patternwalker$"
 SENSOR_PATTERNWALKER: "Mustervorhersagesensoren"
 r_vaporous_mega_orchid: "Riesenorchidee"
 r_vaporous_mega_orchid_desc: "Diese besonders große Orchidee blüht nur einmal alle 50 Jahre. Ihr Duft hat nachweislich eine beruhigende Wirkung und blockiert vorübergehend jene mentalen Synapsen, die Aggression und Misstrauen verursachen."
 r_vaporous_mega_orchid_effect_tt: "§G+$@vaporous_mega_orchid_opinion|0$§! £opinion£ Meinung für §Y$@vaporous_mega_orchid_opinion_duration_years|0$§! Jahre bei anderen Reichen, die nicht auf die Vernichtung der Galaxie aus sind, nicht xenophob sind und kein Gefallenes Reich sind."
 opinion_vaporous_mega_orchid: "$r_vaporous_mega_orchid$"
 r_tiyanki_matriarch_nerve_core: "Nervenkern einer Tiyanki-Matriarchin"
 r_tiyanki_matriarch_nerve_core_desc: "Die Gehirnmasse dieses uralten Weltraumwals enthält jahrhundertealte Evolutionsdaten, die in seinen Neuronen verschlüsselt sind. Sollten wir es schaffen, diese Daten zu entschlüsseln, lernen wir eventuell etwas über die Schwachstellen anderer Weltraumwale sowie die Geheimnisse ihrer langen Lebensspanne."
 tiyanki_matriarch_nerve_core: "$r_tiyanki_matriarch_nerve_core$"
 celestial_chart: "Sternenkarte"
 r_celestial_chart_0: "Mysteriöse Orbitalkapsel"
 r_celestial_chart_0_desc: "Eine seltsame Kapsel, die unsere Heimatwelt bereits seit Tausenden von Jahren umkreist. Wir wissen noch nicht, welche Geheimnisse sie birgt."
 r_celestial_chart_1: "$celestial_chart$"
 r_celestial_chart_1_desc: "Der erste Teil einer umfangreichen Karte, die in einer uralten Kapsel gefunden wurde."
 r_celestial_chart_2: "$celestial_chart$"
 r_celestial_chart_2_desc: "Eine unvollständige Karte, die in einer uralten Kapsel gefunden wurde."
 r_celestial_chart_3: "$celestial_chart$"
 r_celestial_chart_3_desc: "Eine beinahe vollständige Karte, die in einer uralten Kapsel gefunden wurde."
 r_celestial_chart_4: "$celestial_chart$"
 r_celestial_chart_4_desc: "Eine detaillierte Sternenkarte samt Datenbank der legendären Piratin $NAME_CaptainNess$."
 r_celestial_chart_4_effect_tt: "Errichtet einen ['concept_treasure_vault'] auf einer unserer Kolonien."
 celestial_chart_upgraded_tt: "Die §Y$celestial_chart$§! wurde um zusätzliche Informationen erweitert."
 r_mutated_voidworm_nest: "Mutiertes Leerenwurm-Nest"
 r_mutated_voidworm_nest_desc: "Ein Nest mutierter Leerenwürmer, die sich auch ohne ihre sonst übliche Parasiteninfektion fortpflanzen können. Einige dieser Exemplare sind sogar in der Lage, innerhalb von nur wenigen Tagen vollständig auszureifen."
 r_mutated_voidworm_nest_effect_tt: "Erschafft eine Flotte ausgewachsener mutierter Leerenwürmer in unserem Heimatsystem"
