 NESS_GRAND_ARCHIVE: "Schatz von $NAME_CaptainNess$"
 NESS_GRAND_ARCHIVE_HOARDED: "$NESS_GRAND_ARCHIVE$"
 grand_archive.8405.name: "Hinterhalt!"
 grand_archive.8405.desc: "Man ist uns gefolgt.\n\nIm [ness_treasure_system.GetName]-System hat eine beeindruckende Flotte der §Y$NAME_BlackNeedle$§!-Piraten nur auf uns gewartet. Im Vergleich zu unserer letzten Begegnung sind ihre Reihen stark angewachsen und umfassen nun auch ausgemusterte Militär- und Zivilschiffe, die mit hochtechnologischen Waffen nachgerüstet wurden. Offenbar haben sie ihre gesamte Reserveflotte für diese finale Konfrontation zusammengezogen. Im Zentrum der Flotte befindet sich ihr Flaggschiff, eine massive Monstrosität der $titan$-Klasse.\n\nAuch wenn ihre Formation darauf hindeutet, dass sie gefechtsbereit sind, haben viele der Schiffe ihre Waffen noch nicht auf uns ausgerichtet. Es scheint, als wollten sie verhandeln.\n\nWir erhalten eine Übertragung aus dem Flaggschiff."
 grand_archive.8405.a.lom: "Lasst uns verhandeln."
 grand_archive.8410.name: "$NAME_CobaltQuill$, Kapitän der $NAME_BlackNeedle$"
 grand_archive.8410.desc: "§HTrotz seiner geringen Größe strahlt der Piratenkapitän Ehrfurcht aus. Seine Blicke mustern uns berechnend, als wären wir Teil einer komplexen Gleichung.§!\n\nEndlich treffen wir uns. $NAME_CobaltQuill$, zu Euren Diensten. Ich bin der Kapitän der berühmten §Y$NAME_BlackNeedle$§! und ein bescheidener Nachkomme unseres Gründers $NAME_SilverQuill$. Ihr seid mir schon seit vielen Jahren ein Dorn im Auge - aber ich bin vernünftig. Ich möchte Euch ein Angebot unterbreiten.\n\nWir geben Euch eine beachtliche Belohnung und lassen Euch mit dem Leben davonkommen. Im Gegenzug gebt Ihr uns die vollständige Karte.\n\nSolltet Ihr ablehnen, haben wir keine andere Wahl, als uns die Karte mit Gewalt zu nehmen. Ganz abgesehen von unserer überlegenen Flotte haben wir Euer Reich an mehreren wichtigen Stellen infiltriert. Ein einziger Befehl von mir ist alles, was Euch von Eurem Untergang trennt."
 grand_archive.8410.a: "Was bietet Ihr an?"
 grand_archive.8410.a.reply: "Trotz all der Frustration, die Ihr verursacht habt, bin ich gewillt, Euch eine beachtliche Belohnung im Tausch für das vervollständigte Relikt von §Y$NAME_CaptainNess$§! zukommen zu lassen.\n\nSolltet Ihr dieses großzügige Angebot annehmen, bin ich bereit, Euch alle vergangenen Verfehlungen zu verzeihen. Es gibt keinen Grund, dass dieser Konflikt zwischen uns fortgeführt wird. Oder gar eskaliert ..."
 grand_archive.8410.b: "Ihr droht uns ..."
 grand_archive.8410.b.reply.common_1: "Ich weiß alles, was es über [this.GetName] zu wissen gibt. Eure Versorgungsrouten, die Positionen Eurer Ressourcensilos, die Verteilung Eure Sternenbasen ... Alles ist genaustens berücksichtigt."
 grand_archive.8410.b.reply.common_2: "Meine Leute haben ihre Hausaufgaben gemacht, und ich weiß genau, wie man Euer Reich zerlegen kann. Ich werde Eure Planeten aushungern, Euren Nachschub plündern und vernichten, was dann noch übrig bleibt. Natürlich nur, wenn Ihr mir das verwehrt, was ich will ..."
 grand_archive.8410.b.reply.default: "$grand_archive.8410.b.reply.common_1$\n\nIch habe jedes vertrauenswürdige Individuum in Eurer Führung und auch deren Familien unter Beobachtung ...\n\n$grand_archive.8410.b.reply.common_2$"
 grand_archive.8410.b.reply.hive_mind: "$grand_archive.8410.b.reply.common_1$\n\nIch lassen jeden Hauptknoten in Eurem Kollektiv verfolgen und werde benachrichtigt, wenn ein neuer erschaffen wird.\n\n$grand_archive.8410.b.reply.common_2$"
 grand_archive.8410.b.reply.machine: "$grand_archive.8410.b.reply.common_1$\n\nIch habe eine Hintertür zu Eurer Matrix und verfolge die Position jedes Hauptknotenpunkts in Eurem Netzwerk.\n\n$grand_archive.8410.b.reply.common_2$"
 grand_archive.8410.c: "Warum dann überhaupt verhandeln?"
 grand_archive.8410.c.reply: "Sabotage dieses Ausmaßes ist nicht billig. Schiffsunterhalt, Löhne, Bestechungsgelder: All diese Dinge sind teuer, und ich bin nicht reich geworden, weil ich Geld ausgab, wenn ich es nicht musste. Wenn man gewaltige Zerstörung nur durch das Umlegen eines einzelnen Schalters auslösen will, ist dies mit erheblichen Zusatzkosten verbunden.\n\nEs gibt bessere Wege, sauer verdientes Geld auszugeben. Wir sollten dieses sinnlose Blutvergießen vermeiden. Nehmt Euch Euren neu erworbenen Reichtum und überlasst die Piraterie den Experten."
 grand_archive.8410.d: "Es geht hier nicht nur um Credits, oder?"
 grand_archive.8410.d.reply: "Einer meiner Vorfahren, der große $NAME_SilverQuill$, war vor 5000 Jahren der Erste Maat von $NAME_CaptainNess$. Er diente ihr jahrelang treu, doch wie wurde er dafür belohnt?\n\nMit Verrat!\n\nSie übergab ihn den Behörden und behielt die Beute für sich! Doch kein Gefängnis konnte den mächtigen $NAME_SilverQuill$ auf ewig festhalten.\n\nNach einer waghalsigen Flucht erhob er sich aus der sprichwörtlichen Asche und baute die legendären $NAME_BlackNeedle$-Piraten auf, jene bunte Truppe, die heute vor Euch steht. Er schwor der verräterischen $NAME_CaptainNess$ Rache und versprach, sein Leben damit zu verbringen, ihre Schatztresore zu plündern und somit ihr Vermächtnis unter dem Gewicht seines eigenen Erfolges zu begraben.\n\nIch beende einfach nur das, was er einst begonnen hat. Diese Karte ist der Schlüssel zu dem, was rechtmäßig uns gehört.\n\nUnd jetzt übergebt sie uns bitte."
 grand_archive.8415.name: "Eine kühne Behauptung"
 grand_archive.8415.desc: "Der Anführer der §Y$NAME_BlackNeedle$§!-Piraten hat uns eine beachtliche Belohnung im Tausch für die §Y$celestial_chart$§! angeboten. Sollten wir einwilligen, übergeben wir damit praktisch den Schlüssel zum Schatz von §Y$NAME_CaptainNess$§!.\n\nSollten wir jedoch ablehnen, werden wir den Zorn der Piraten auf uns ziehen. Wie sehr sie unsere Reihen bereits infiltriert haben, ist nicht bekannt, doch sie haben damit gedroht, ganz [this.GetName] von innen heraus zu vernichten. Ob es sich dabei nur um leere Drohungen handelt, bleibt abzuwarten."
 grand_archive.8415.a: "Wir lehnen das Angebot ab."
 grand_archive.8415.b: "Verkauft ihnen die §Y$celestial_chart$§!."
 grand_archive.8415.b.effect_tt: "Verliert die §Y$celestial_chart$§!\nErhält §G+$@max_credit_mult|0%$§! der maximalen $r_energy$\nErhält ein Schiff von den §Y$NAME_BlackNeedle$§!-Piraten"
 grand_archive.8500.name: "Geschäft abgeschlossen"
 grand_archive.8500.desc: "Wir haben die §Y$celestial_chart$§! im Tausch für die riesige Summe von $MONEY$ und ein außergewöhnliches militärisches Flaggschiff, das als §YNadelöhr§! bekannt ist, übergeben. Damit ist auch unser Konflikt mit den §Y$NAME_BlackNeedle$§!-Piraten ein für alle Mal beigelegt.\n\nWir haben zudem ein Feuergefecht mit der vollen Stärke ihrer Flotten und Sabotage von galaktischem Ausmaß vermieden.\n\nEs ist besser, wenn wir die Piraterie den Piraten überlassen."
 grand_archive.8500.a: "Unsere Arbeit hier ist erledigt."
 grand_archive.8500.a.tt: "Alle Schiffe verlassen das $TREASURE_TROVE$-System."
 HOARD_LOOTED_BY_PIRATES: "Diese Struktur wurde von Piraten geplündert und enthält nichts mehr von Wert"
 grand_archive.8505.name: "Sabotage!"
 grand_archive.8505.desc: "Die §Y$NAME_BlackNeedle$§!-Piraten haben einen Großangriff begonnen und unsere Systeme ins Chaos gestürzt. Fließbänder stehen still, Generatoren sind durchgebrannt und wichtige Verwaltungsinfrastrukturen wurden lahmgelegt. Nachschublieferungen verschwinden, Daten von Forschungsstationen werden gelöscht und in Minen kommt es mit fünffacher Häufigkeit zu Einstürzen.\n\nDie Verwüstung ist in unserem ganzen Reich zu spüren. Sie ist das Ergebnis der hinterhältigen Sabotage Tausender böswilliger Akteure, die sich in unseren Kolonien versteckt halten und uns stets einen Schritt voraus zu sein scheinen."
 grand_archive.8505.a: "Alarmstufe Rot!"
 situation_sabotage: "Schwarznadel-Saboteure"
 situation_sabotage_type: "$situation_sabotage$"
 situation_sabotage_desc: "Ein riesiges Netzwerk aus Saboteuren der §Y$NAME_BlackNeedle$§!-Piraten hält sich in unseren Kolonien versteckt und hat [owner.GetName] weitgehend lahmgelegt. Sollten wir diese Saboteure nicht schleunigst ausschalten, werden sie ihre Arbeit fortführen, bis unsere Versorgungslinien schließlich vollkommen zusammenbrechen."
 situation_sabotage_monthly_change_tooltip: "$situation_monthly_change_tooltip_approaches_dependent$"
 approach_sabotage_do_nothing: "Nichts tun"
 approach_sabotage_do_nothing_tt: "Wir werden nichts unternehmen."
 approach_sabotage_purge: "Saboteure eliminieren"
 approach_sabotage_purge_tt: "Die Agenten zu jagen, die sich in unseren eigenen Reihen versteckt halten, wird unvermeidlich zu Kollateralschäden führen."
 approach_sabotage_mitigate: "Schaden minimieren"
 approach_sabotage_mitigate_tt: "Wir können gezielte Maßnahmen ergreifen, um Schlüsselinfrastruktur wiederaufzubauen, und darauf warten, dass wir den Zermürbungskrieg gewinnen."
 finisher_effects_sabotage: "Wir eliminieren die Schwarznadel-Saboteure und verhindern, dass sie ihre Blockade beim Schatz von Kapitänin Ness aufrechterhalten können."
 finisher_effects_sabotage_fail: "Unsere Infrastruktur wird irreparabel beschädigt und die Schwarznadel-Piraten verstärken ihre Blockade beim Schatz von Kapitänin Ness noch weiter."
 grand_archive.8520.name: "Sabotagenetzwerk aufgedeckt"
 grand_archive.8520.desc.common: "Wir haben die Kommunikationsfrequenz gefunden, die die §Y$NAME_BlackNeedle$§!-Piraten nutzen, um verschlüsselte Botschaften in unsere Kolonien zu schicken. Sobald wir sie entschlüsselt haben, sollten wir in der Lage sein, jeden Verschwörer und Saboteur in unseren Reihen ausfindig zu machen."
 grand_archive.8520.desc.machine: "$grand_archive.8520.desc.common$\n\nIhre Agenten haben im Verborgenen Malware in unser Betriebssystem geladen und einen Schläfertrupp aus Rebellen aufgebaut, die hochrangige Positionen in unseren Systemen besetzen.\n\nDie böswillige Umprogrammierung reicht so weit, dass sogar einer der wichtigsten unabhängigen Knotenpunkte in [root.GetName], §Y[traitor_leader.GetClass] [traitor_leader.GetName]§!, korrumpiert wurde."
 grand_archive.8520.desc.hive: "$grand_archive.8520.desc.common$\n\nIhre Agenten haben dissoziative Pheromone durch das Belüftungssystem unserer Habitate verbreitet, wodurch viele unserer Drohnen eine grundlegende Abweichung entwickelten. Anschließend konnten die Piraten unsere verwirrten Drohnen leicht in Schläferzellen reorganisieren, die derzeit unsere Infrastruktur zerstören.\n\nSie haben es sogar geschafft, einen der wichtigsten unabhängigen Knoten in [root.GetName], §Y[traitor_leader.GetClass] [traitor_leader.GetName]§!, zu korrumpieren."
 grand_archive.8520.desc.default: "$grand_archive.8520.desc.common$\n\nWir haben in Erfahrung bringen können, dass ihre Agenten seit Jahren verärgerte Bürger und andere abtrünnige Elemente unserer Gesellschaft rekrutieren und diese in Schläferzellen organisieren, um sie gegen uns zu wenden.\n\nEiner dieser Verräter ist §Y[traitor_leader.GetClass] [traitor_leader.GetName]§!, was ein erhebliches Sicherheitsrisiko darstellt. Wir müssen uns um die Verschwörer kümmern und gleichzeitig ein gewisses Maß an Stabilität bewahren. Sollte öffentlich bekannt werden, dass es in unseren eigenen Reihen korrupte Elemente gibt, hätte dies drastische Folgen für die Regierungsführung."
 grand_archive.8520.a.default: "Richtet die Verräter hin!"
 grand_archive.8520.a.machine: "Deaktiviert die abtrünnigen Einheiten."
 grand_archive.8520.a.hive: "Eliminiert die abtrünnigen Drohnen."
 grand_archive.8520.a.tt: "§R100§! £pop£ §HBewohner§! werden auf jedem bevölkerten Planeten hingerichtet"
 grand_archive.8520.b.default: "Organisiert Umerziehungsmaßnahmen für die Verräter."
 grand_archive.8520.b.machine: "Programmiert die abtrünnigen Einheiten um."
 grand_archive.8520.b.hive: "Assimiliert die abtrünnigen Drohnen erneut."
 grand_archive.8520.c: "Veröffentlicht die Identität der Verräter."
 grand_archive.8525.name.default: "Verräter hingerichtet"
 grand_archive.8525.name.hive: "Abtrünnige eliminiert"
 grand_archive.8525.name.machine: "Einheit abgeschaltet"
 grand_archive.8525.desc.common: "Nachdem wir [traitor_leader.GetHisHer]e Verbindung zu den §Y$NAME_BlackNeedle$§!-Piraten aufgedeckt hatten"
 grand_archive.8525.desc.default: "$grand_archive.8525.desc.common$, wurde [traitor_leader.GetName] hingerichtet.\n\nDie genauen Umstände [traitor_leader.GetHisHer]es Todes wurden geheim gehalten."
 grand_archive.8525.desc.hive: "$grand_archive.8525.desc.common$, wurde [traitor_leader.GetName] eliminiert."
 grand_archive.8525.desc.machine: "$grand_archive.8525.desc.common$, wurde [traitor_leader.GetName] abgeschaltet."
 grand_archive.8525.a: "Eine notwendige Maßnahme."
 grand_archive.8530.name.default: "Verräter umerzogen"
 grand_archive.8530.name.hive: "Abtrünnige Drohne erneut assimiliert"
 grand_archive.8530.name.machine: "Einheit umprogrammiert"
 grand_archive.8530.desc.default: "$grand_archive.8525.desc.common$, wurde das Verhalten von [traitor_leader.GetName] ordnungsgemäß korrigiert.\n\nBedauerlicherweise hat dieser Umerziehungsprozess bleibende Schäden bei [traitor_leader.GetName] hinterlassen."
 grand_archive.8530.desc.hive: "$grand_archive.8525.desc.common$, wurde das Verhalten von [traitor_leader.GetName] ordnungsgemäß korrigiert.\n\nBedauerlicherweise hat die erneute Assimilierung bleibende Schäden bei [traitor_leader.GetName] hinterlassen."
 grand_archive.8530.desc.machine: "$grand_archive.8525.desc.common$, wurde das Verhalten von [traitor_leader.GetName] ordnungsgemäß umprogrammiert.\n\nBedauerlicherweise hat die Umprogrammierung bleibende Schäden bei [traitor_leader.GetName] hinterlassen."
 grand_archive.8530.a.tt: "[traitor_leader.GetName] erhält negative Eigenschaften (2 Stufen)"
 grand_archive.8535.name: "[traitor_leader.GetName] tot aufgefunden"
 grand_archive.8535.desc: "$grand_archive.8525.desc.common$, versammelten sich aufgebrachte Bürger aus [root.GetName] in organisierten Protesten. Der gewalttätige Mob stürmte [traitor_leader.GetHisHer] Zuhause und [traitor_leader.GetHeShe] wurde später für tot erklärt."
 grand_archive.8536.name: "Verräter leistet Wiedergutmachung"
 grand_archive.8536.desc: "$grand_archive.8525.desc.common$, bekundete [traitor_leader.GetHeShe] öffentlich [traitor_leader.GetHisHer] tiefes Bedauern ob [traitor_leader.GetHisHer]er Taten. Diese Demütigung scheint eine bleibende Auswirkung auf [traitor_leader.GetHisHer]e Führungsqualitäten gezeigt zu haben.\n\nTrotz der vergangenen Taten scheinen die Bewohner von [root.GetName] bereit zu sein, [traitor_leader.GetName] zu vergeben."
 grand_archive.8536.a: "Eine willkommene Entwicklung."
 grand_archive.8536.a.tt: "[traitor_leader.GetName] erhält negative Eigenschaften (1 Stufe)"
 grand_archive.8545.name: "Infrastruktur zusammengebrochen"
 grand_archive.8545.desc: "Leider waren wir nicht in der Lage, die verheerenden Sabotageaktionen der §Y$NAME_BlackNeedle$§!-Piraten zu vereiteln. Sie haben unsere Logistikinfrastruktur irreparabel beschädigt, und es wird viele Jahre dauern, bis wir unsere Lieferketten wiederaufgebaut haben. Die Korruption, die sich in unseren Systemen verbreitet hat, hat ein zu großes Ausmaß angenommen, als dass sie noch eingedämmt werden könnte.\n\nDies wird uns dennoch nicht davon abhalten, §Y$NESS_GRAND_ARCHIVE$§! für uns zu beanspruchen. Wir müssen nur die Piraten in einer Schlacht besiegen und der Schatz wird uns gehören."
 grand_archive.8545.a: "Der Kampf ist noch nicht vorbei."
 grand_archive.8550.name: "Widerstandsfähiger als Sabotage"
 grand_archive.8550.desc: "Obwohl die §Y$NAME_BlackNeedle$§!-Piraten alles versucht haben, um unsere Infrastruktur zu sabotieren, konnten wir uns erholen und stabilisieren. Da ihre Agenten besiegt wurden, müssen wir nur noch ihrer Flotte im [hoard_system.GetName]-System die Stirn bieten, um §Y$NESS_GRAND_ARCHIVE$§! für [root.GetName] zu beanspruchen."
 grand_archive.8550.a: "Tut es."
 grand_archive.8555.name: "$NAME_BlackNeedle$-Piraten besiegt"
 grand_archive.8555.desc: "Die §Y$NAME_BlackNeedle$§!-Piraten waren der Macht unseres Militärs einfach nicht gewachsen. Da ihre Flotten besiegt wurden, können sie auch ihre Sabotageversuche in unseren Systemen nicht mehr unterstützen. Wir können jetzt §Y$NESS_GRAND_ARCHIVE$§! im Namen von [root.GetName] beanspruchen."
 grand_archive.8555.a: "Ein erbärmlicher Versuch."
 grand_archive.8555.a.lom: "Jämmerliche Landratten."
 TREASURE_HUNTERS_BLACK_NEEDLE_PROJECT: "Das letzte Gefecht der $NAME_BlackNeedle$"
 TREASURE_HUNTERS_BLACK_NEEDLE_PROJECT_DESC: "Selbst während der umfangreichen Sabotageoperationen in zahlreichen Systemen von [root.GetName] haben die $NAME_BlackNeedle$-Piraten ihre Blockade vor §H$NESS_GRAND_ARCHIVE$§! aufrechterhalten. Sie haben jedoch einen Großteil ihrer Ressourcen aufgebraucht und befinden sich nun in einer weitaus verwundbareren Lage. Sollten wir sie hier besiegen, wird ihre Organisation mit Sicherheit zusammenbrechen und wir können den Schatz ungehindert für uns beanspruchen."
 TREASURE_HUNTERS_BLACK_NEEDLE_PROJECT_TOOLTIP: "§RBesiegt die $NAME_BlackNeedle$-Flotte im [solar_system.GetName]-System.§!"
 grand_archive.8560.name: "$grand_archive.8410.name$"
 grand_archive.8560.desc: "Die Kinder von Ness ... Wie ironisch.\n\nSie hat Euch ausgewählt - wisst Ihr das?\n\nHunderte verschiedener Spezies, aus der denen sie wählen konnte ... und sie hat ausgerechnet Euch auserkoren. Vielleicht hat sie etwas Besonderes in Euch gesehen? Vielleicht war es aber auch kompletter Zufall. Was es auch war: Es spielt jetzt keine Rolle mehr.\n\nIhr habt gewonnen ... für den Moment zumindest. Ihr solltet diesen Sieg jedoch nicht allzu lang genießen. Mit uns habt Ihr Euch einen mächtigen Feind gemacht. Die §Y$NAME_BlackNeedle$§!-Piraten vergeben niemals und sie vergessen auch nie.\n\nWie meine Vorfahren werden auch wir weitermachen. Wir werden das, was wir verloren haben, Stück für Stück wiederaufbauen. Selbst wenn es tausend oder eine Million Jahre dauern wird: Wir werden zurückkehren und uns all das zurückholen, was Ihr uns gestohlen habt.\n\nDie $NAME_BlackNeedle$-Piraten werden ewig leben! Ewig!"
 grand_archive.8560.a: "Nur die Zeit wird das weisen."
 grand_archive.8560.a.lom: "Macht, dass Ihr wegkommt, Deckschrubber."
 CAPTAIN_NESS_HOARD_PROJECT: "Der Schatz von Kapitänin Ness"
 CAPTAIN_NESS_HOARD_PROJECT_DESC: "§H$NESS_GRAND_ARCHIVE$§! liegt offen vor uns und wartet nur darauf, von uns beansprucht zu werden.\n\nObwohl die Struktur äußerlich verlassen aussieht, sind viele der Systeme noch aktiv. Angesichts der Piratenvergangenheit von §H$NAME_CaptainNess$§! sollten wir uns auf unerwartete Sicherheitsmaßnahmen gefasst machen.\n\nDer einzige Eingang in den Schatztresor hat eine Einkerbung an der zentralen Luke. Wir können dort die §H$celestial_chart$§! einsetzen, um die mysteriöse Anlage zu entriegeln."
 grand_archive.8565.name: "Der Schatz von $NAME_CaptainNess$"
 grand_archive.8565.desc: "Die §Y$celestial_chart$§! war ein Schlüssel und der Schatztresor das Schloss. Wir setzten die Karte in die Hauptluke der Megastruktur ein.\n\nSie aktivierte sich und ein Lichtstrahl tauchte auf, der jeden Stern auf unserer Reise zurückverfolgte. Eine uralte Maschine erwachte zum Leben und die Luke öffnete sich.\n\nAuf dem Boden und an den Wänden häuften sich unglaubliche Schätze, die aus Tausenden von Welten geplündert worden waren. Filigrane Statuen stehen neben aus Edelmetallen geschmiedeten Waffen. Feiner Schmuck hängt an den Gliedmaßen antiker Fossilien und komplexe Apparaturen sind ungeordnet aufgetürmt.\n\nMetallische Schritte ertönen aus dem zentralen Korridor. Eine mit Flüssigkeit gefüllte, humanoide Maschine nähert sich uns mit erhobenen Armen, die ihre Kapitulation zum Ausdruck bringen sollen. Ihre Sprachsysteme knistern und springen an.\n\n§L\"Ihr ... habt meine Karte also doch noch gefunden. Ihr seid ja so clever, was?\"§!"
 grand_archive.8565.a: "Kommunikationskanal öffnen."
 grand_archive.8565.a.lom: "Ahoi, Kapitänin!"
 grand_archive.8570.desc: "§HTrotz ihrer durch die Roboterform begrenzten Ausdrucksmöglichkeiten betrachtet uns die Maschine, die auch als Kapitänin Ness bekannt ist, mit einer gewissen Selbstgefälligkeit. Der metallische Körper zeigt keinerlei Anzeichen von Abnutzung und sieht nagelneu aus. Ihr Ton ist geduldig und doch herablassend, als würde sie zu jemandem sprechen, der unter ihrem Kommando steht.§!\n\nIch denke, es wäre angebracht, mich kurz vorzustellen, auch wenn Ihr vielleicht schon erraten habt, wer ich bin.\n\nMein Name ist Saanda Ness. Oder zumindest war er das einmal. Man nannte mich einst \"die galaktische Piratenkönigin\", doch derzeit bewohne ich lediglich diesen kalten Haufen Metall.\n\n§HDie Maschine hält für einen Moment inne, um uns zu betrachten.§!\n\nEs ist lange her, seit ich das letzte Mal ein Exemplar Eurer Spezies gesehen habe. Eure primitive Zivilisation scheint erwachsen geworden zu sein!\n\nIch muss schon sagen, ich bin stark beeindruckt, dass Ihr es hierhergeschafft habt."
 grand_archive.8570.a: "Wie kann es sein, dass Ihr noch am Leben seid?"
 grand_archive.8570.a.reply_fallen_empire: "Die Unsterblichkeit hat einen gewissen Preis. Ich habe einigen Wissenschaftlern aus [fallen_empire.GetRealName] ein paar Millionen Credits bezahlt, damit sie mein Bewusstsein transferieren, ohne die Behörden zu alarmieren. Sie haben gute Arbeit geleistet, doch ich kann nicht mehr so gut tanzen wie früher.\n\n$grand_archive.8570.a.reply$"
 grand_archive.8570.a.reply_curator: "Die Unsterblichkeit hat einen gewissen Preis. Ich habe einigen Wissenschaftlern des $NAME_Curator_Order$s ein paar Millionen Credits bezahlt, damit sie mein Bewusstsein transferieren, ohne die Behörden zu alarmieren. Sie haben gute Arbeit geleistet, doch ich kann nicht mehr so gut tanzen wie früher.\n\n$grand_archive.8570.a.reply$"
 grand_archive.8570.a.reply: "§HDie Maschine aktiviert eine Konsole, die eine hinter einer Wand verborgene Kammer offenbart. In ihr befindet sich eine uralte Kryokapsel, die die Überreste eines organischen Wesens enthält.§!\n\nDas bin ich. Ein nutzloses Ornament ... Entschuldigt. Ich bin etwas sentimental ... Sah ich nicht gut aus?\n\nNachdem ich sichergestellt hatte, dass alles in Ordnung war, fuhr ich diesen Ort für ein paar tausend Jahre herunter. Das Nächste, was ich weiß, ist, dass Ihr die Luke geöffnet habt und wir jetzt diese Unterhaltung führen. Es fühlt sich so an, als hätte ich mich erst gestern schlafen gelegt ..."
 grand_archive.8570.b: "Wo habt ihr all diese Schätze her?"
 grand_archive.8570.b.reply: "Gestohlen. Das meiste zumindest. Oder gegen andere illegale Waren getauscht. Ich habe jeden in der Galaxie, der etwas auf sich hält, ausgeraubt. Frachtschiffe, Koloss-Waffen - ganz egal, was: Ich habe es gekapert. Nach meiner Logik hat man es schlicht nicht verdient, so etwas zu besitzen, wenn man es sich so einfach wegnehmen lässt.\n\nManchmal wurden die Dinge etwas ... unschön. Ihr habt gesehen, was mit den Ytteriten geschehen ist, nicht wahr? Das öffnete mir die Augen.\n\nEs ist alles schön und gut, bis es das auf einmal nicht mehr ist ..."
 grand_archive.8570.c: "Warum wir?"
 grand_archive.8570.c.reply: "Würdet Ihr mir glauben, wenn ich Euch sage, dass ich mich einsam fühlte?\n\n§HDie Stimmkreise der Maschine knistern, als würde sie lachen.§!\n\nIch hatte all diese Schätze, doch wofür? Was brachten sie mir am Ende? Ich erkannte, dass es nicht der Reichtum war, den ich wollte, sondern ein Vermächtnis. Doch man kann ein Vermächtnis nicht so einfach stehlen ... Wie also erschafft man eines?\n\nNun, das war zumindest meine Art, es zu tun. Ich machte die vielversprechendsten primitiven Spezies ausfindig und füllte ihre Welt mit Schätzen - und gab ihnen natürlich ein Kartenstück. Jene Spezies, die meine Karte als Erstes zusammensetzt, würde meine Prüfung bestehen und wäre würdig, mein Lebenswerk zu erben. Und nun sind wir hier ...\n\nVielleicht schafft Eure Art, was ich nicht konnte, und findet einen Nutzen für all dies."
 grand_archive.8570.d: "Warum verschenkt Ihr alles?"
 grand_archive.8570.d.reply: "Wie ich Euch schon sagte: Ich übergebe die Fackel. Ich bin nicht gut darin, Geld auszugeben. Ich weiß nur, wie man es sich nimmt.\n\nIch konnte es jedoch nicht einfach irgendwem überlassen. Ich suchte jemanden, der klug genug war, diesen Ort zu erreichen. Ich suchte eine Crew, die mich mit Stolz erfüllen würde und der ich meine Geschichte erzählen konnte."
 grand_archive.8570.e: "Wie lautet Eure Geschichte?"
 grand_archive.8570.e.reply: "Nun, da Ihr schon gefragt habt ...\n\n§HDie Maschine aktiviert eine Konsole und eine Reihe digitaler Aufzeichnungen werden auf die Wände projiziert.§!\n\n\"Dieser ganze Ort ist meine Biografie. Ich zahlte den Autoren viel Geld, damit sie jeden erinnerungswürdigen Moment meines Lebens festhielten. Ich glaube, sie schufen ein Meisterwerk.\"\n\n§HDie Bilder wechseln zu einer Kommandobrücke, auf der Kapitänin Ness in biologischer Form zusammen mit ihrer Crew zu sehen ist. Ein kleines Knacksen kommt aus dem Sprachsystem der Maschine. Es klingt wie ein tiefer Seufzer.§!\n\n\"Ich war einst die gefürchtetste Piratin in der ganzen Galaxie. Ich trieb Megakonzerne in den Ruin, nahm ganze Planeten als Geiseln und legte Reiche in Schutt und Asche. Jeder, der dumm genug war, sich mit mr anzulegen, bekam kurz darauf meine Klinge zu spüren oder wurde gegen Lösegeld verkauft. Mein eigenes Kopfgeld? Astronomisch hoch.\""
 grand_archive.8570.f: "Bitte fahrt fort."
 grand_archive.8570.f.reply: "§HDigitale Aufnahmen von verschiedenen Überfällen, Raubzügen und waghalsigen Fluchten, die mit heroischer Musik untermalt sind, werden auf die Wände projiziert.§!\n\n\"Anfangs wählte ich meine Ziele sorgfältig aus und dachte mir irgendeinen Grund aus, warum sie es verdient hatten. Jedes neue Ding war aufregender als das davor. Das Problem war, dass die Suche nach Zielen, die es \"verdient\" hatten, zu zeitaufwendig war. Ich musste meinen Horizont erweitern.\n\nIrgendwann begann ich, mir einfach zu nehmen, was ich wollte. Ich genoss es, dabei zuzusehen, wie die Zahlen stiegen: der Preis meiner Beute und der Wert meines Schatzes. Ich hinterließ meine Spuren in der Galaxie und würde nie vergessen werden. Alles andere war unbedeutend.\""
 grand_archive.8570.g: "Was hat sich geändert?"
 grand_archive.8570.g.reply: "§HDie Ruinen der Ytteriten-Heimatwelt werden auf die Wände projiziert.§!\n\n\"Der Yterriten-Vorfall ... Ihr habt es gesehen, nicht wahr? Ich erinnere mich noch an die Schreie über Funk, als die Letzten von ihnen ausgelöscht wurden. Die Dinge gingen einfach zu weit. Es war Zeit für eine Veränderung.\n\nIm Lauf meiner Karriere stellte ich fest, dass die Dinge einem bestimmten Muster folgten: Die Geschichte verblasst, die Lehren der Vergangenheit werden vergessen und jemand Neues nimmt deinen Platz ein. Ich wollte mir einfach aussuchen können, wer nach mir kommt.\n\nUnd ich habe Euch gewählt. Ihr [root.GetSpeciesNamePlural] habt meine Prüfung bestanden. Was als Nächstes geschieht, liegt an Euch.\""
 grand_archive.8575.name: "Unermesslicher Reichtum"
 grand_archive.8575.desc.default: "§Y$NESS_GRAND_ARCHIVE$§! enthält eine unvorstellbare Menge Reichtum. Wir sollten jedoch die Konsequenzen bedenken, wenn wir diesen Reichtum in unserem Namen beanspruchen.\n\nJeder Credit ihres Schatzes wurde illegal beschafft. Sollten wir diese Ressourcen nutzen, würden wir damit zum Ausdruck bringen, dass wir $NAME_CaptainNess$ und ihre kriminellen Machenschaften tolerieren.\n\nViele, die $NAME_CaptainNess$ bestohlen hat, sind allerdings schon lange tot. Und diesen Reichtum zu beanspruchen, würde auch keine neuen Opfer schaffen. Vielmehr haben wir die §Y$NAME_BlackNeedle$§!-Flotte stark dezimiert und die Galaxie damit zu einem sichereren Ort gemacht. Auch der Weg hierhin war lang und voller Gefahren, und dafür verdienen wir doch wohl eine ansehnliche Belohnung. Oder etwa nicht?\n\nWir müssen eine Entscheidung darüber treffen, was wir mit dem Schatz machen."
 grand_archive.8575.desc.lom: "§Y$NESS_GRAND_ARCHIVE$§! ist die ultimative Schatzkammer und wir fordern diese Beute dankend ein.\n\nEine hart verdiente Belohnung für die Zerschlagung der §Y$NAME_BlackNeedle$§!-Piraten - ein dreifaches Hoch auf [this.GetName]!\n\nLasst uns alles mitnehmen. Alle [This.Species.GetHandNamePlural] an Deck!"
 grand_archive.8575.a.default: "Beansprucht es in unserem Namen."
 grand_archive.8575.a.lom: "Wir haben uns diese Beute wohlverdient."
 grand_archive.8575.b: "Gebt rückverfolgbare Gegenstände ihren rechtmäßigen Besitzern zurück."
 grand_archive.8575.c: "Teilt diesen Reichtum unter der ganzen Galaxie auf."
 grand_archive.8580.name: "Unsere Förderin"
 grand_archive.8580.desc.1: "§HDie als §Y$NAME_CaptainNess$§! bekannte Maschine war beeindruckt, wie schnell wir ihren Tresor ausräumten.§!\n\n\"Nur zu. Ihr habt es verdient. Für diesen Schatz wurde eine Menge Blut, Schweiß und Tränen vergossen. Gebt nur nicht alles auf einmal aus.\""
 grand_archive.8580.desc.2: "§HDie als §Y$NAME_CaptainNess$§! bekannte Maschine war etwas aufgebracht über unseren Wunsch, einen Teil ihres hart erarbeiteten Schatzes an die ehemaligen Besitzer zurückzugeben.§!\n\n\"Was für eine Enttäuschung. Irgendein Erbe der fünfzehnten Generation wird also den alten Schmuck seiner Vorfahren bekommen. Nun, ich hoffe, dass Ihr das, was übrig bleibt, für ein sinnvolleres Unterfangen nutzen werdet. Trotz allem vertraue ich darauf, dass Ihr das Richtige tut.\""
 grand_archive.8580.desc.3: "§HDie als §Y$NAME_CaptainNess$§! bekannte Maschine war angewidert, als sie erfuhr, dass wir ihren gesamten Schatz verschenken wollten.§!\n\n\"Das ist Euer Plan? Kostenloser Kram für alle? Warum sollten sie auch nur einen Credit davon verdient haben? Was für eine Verschwendung!\n\nIch hatte mehr von Euch erwartet ... Übergebt mir zumindest das Kommando über einige Eurer Flotten, damit ich das Ganze erneut versuchen kann.\""
 grand_archive.8580.desc.default: "§HWir müssen nur noch entscheiden, was mit $NAME_CaptainNess$ selbst geschehen soll. Als erfahrene Pilotin, die eine Vielzahl gefährlicher Begegnungen überlebt hat, wäre sie als Kommandantin eine hervorragende Bereicherung für unser Militär. Alternativ könnte sie eine eher unterstützende Rolle in unseren Reihen einnehmen, um unsere nächste Generation von Piloten auszubilden.§!"
 grand_archive.8580.desc.no_lom: "§HOder wir werfen sie ins Gefängnis, um ein Exempel zu statuieren, dass kein Verbrechen ungesühnt bleibt. Sie hätte dann viel Zeit, über ihre Taten nachzudenken.§!"
 grand_archive.8580.desc.gestalt: "§HWir müssen nur noch entscheiden, was mit $NAME_CaptainNess$ selbst geschehen soll. Als starkes, unabhängiges Bewusstsein wäre sie in der Rolle eines Kommandanten eine hervorragende Bereicherung und könnte uns kreative Strategien liefern, die unsere Feinde überraschen werden. Alternativ könnten wir ihre enorme Kampferfahrung in unser kollektives Wissen integrieren und es nutzen, um unser Verständnis der Kriegsführung zu erweitern.\n\nOder aber wir werfen sie ins Gefängnis, um deutlich zu machen, dass abweichendes Verhalten und Kriminalität innerhalb von [this.GetName] nicht toleriert werden.§!"
 grand_archive.8580.a: "Wir könnten eine fähige Pilotin gebrauchen."
 grand_archive.8580.a.tt: "Erhält einen §Yunsterblichen Admiral§! der Stufe 10"
 grand_archive.8580.b: "§YWir werden Euer Wissen in unser Bewusstsein integrieren.§!"
 grand_archive.8580.c: "§YHelft uns dabei, neue Piloten auszubilden.§!"
 grand_archive.8580.d: "§RIhr werdet im Gefängnis verrotten!§!"
 grand_archive.8585.desc: "Das ist es also?\n\nIhr schleudert mich einfach beiseite?\n\nWie enttäuschend ... Ich schätze, dann werde ich mich mal auf den Weg machen ...\n\nViel Glück da draußen ..."
 grand_archive.8585.a: "Wir schulden Euch nichts."
 grand_archive.8590.desc: "Ich biete Euch die Welt, und alles, was ich zurückbekomme, sind ein Paar neue Handschellen? Ihr verdient nicht, was ich Euch gegeben habe! Ihr verdient es nicht einmal, meine Stiefel zu putzen!\n\nVerflucht sei [this.GetName] und verflucht seid Ihr alle!\n\nMögen Eure [this.species.GetRemnantNamePlural] in der Leere verrotten und Euer Name in Vergessenheit geraten."
 grand_archive.8590.a: "Kein Verbrechen bleibt ungestraft."
 grand_archive.8595.name: "$NAME_CaptainNess$ deaktiviert"
 grand_archive.8595.desc: "Die ins Gefängnis geworfene Maschine, die als §Y$NAME_CaptainNess$§! bekannt ist, wurde deaktiviert in ihrer Zelle vorgefunden. Wir gehen davon aus, dass sie absichtlich eine kritische Fehlfunktion in ihren Schaltkreisen verursachte, wodurch wichtige Systeme abgeschaltet und alle gespeicherten Daten aus ihrem übertragenen Bewusstsein gelöscht wurden. An die Zellenwände wurde eine Nachricht gekritzelt:\n\n§LDie Leere wird Euer Ende sein ...§!"
 grand_archive.8595.a: "Ein passendes Ende."
 grand_archive.8600.name: "Ende des Regenbogens"
 grand_archive.8600.desc.common: "Es ist an der Zeit, dass wir unser eigenes Vermächtnis schmieden. Es gibt keine Karte mehr, an der wir uns orientieren können. Die Sterne selbst werden unser Wegweiser sein.\n\nWas werden wir erreichen? Wie wird man sich an uns erinnern?"
 grand_archive.8600.desc.default: "Dieses Abenteuer ist zu Ende. Die Suche nach dem Schatz von §HKapitänin Ness§! ist abgeschlossen.\n\n$grand_archive.8600.desc.common$\n\nHier beginnt die wahre Geschichte von [this.GetName]."
 grand_archive.8600.desc.lom: "Man wird noch ewig Geschichten über dieses Abenteuer erzählen! Wir haben den verborgenen Schatz von Kapitänin Ness gefunden und uns nicht einmal von den Schwarznadel-Piraten aufhalten lassen.\n\n$grand_archive.8600.desc.common$\n\nHisst die Fahne von [this.GetName] voller Stolz! Jetzt beginnt unsere wahre Geschichte."
 grand_archive.8600.a.default: "Vorwärts!"
 grand_archive.8600.a.lom: "Yo, ho, ho!"
 valuable_insight: "Ein wertvoller Einblick."
 grand_archive.9960.name: "$tech_alien_cloning$"
 grand_archive.9960.desc: "Mit unserem ersten erfolgreichen Fang wilder Weltraumfauna im [from.solar_system.GetName]-System und den richtigen Investitionen in die Forschung sollte es möglich sein, mehr dieser Kreaturen zu klonen."
 grand_archive.9960.a: "$valuable_insight$"
 grand_archive.9970.name: "Mutationspotenzial"
 grand_archive.9970.desc: "Die erste Weltraumfauna wurde erfolgreich im [from.solar_system.GetName]-System geklont.\n\nUnsere Forschung auf dem Gebiet der Xenobiologie hat gezeigt, dass wir die Physiologie dieser Kreaturen noch weiter verbessern können, wenn wir denn wollen. Dies würde es uns erlauben, unsere biologischen Flotten mit speziellen Kampfkomponenten auszustatten."
 grand_archive.9970.a: "$valuable_insight$"
