 VOIDLURE_ATTRACTED_FAUNA_TITLE: "Neue leerengeborene Organismen"
 VOIDLURE_ATTRACTED_FAUNA_DESC: "Einer unserer Leerenköder hat Weltraumfauna angelockt."
 NAME_Lured_Fauna: "Temporär angelockte Fauna"
 wildlife_ranch: "Wildtierfarm"
 wildlife_ranch_desc: "Wir leben mit den heimischen Tieren in Symbiose, schützen ihren Lebensraum und sorgen für ein nachhaltiges Wachstum ihrer Art."
 wildlife_ranch_2: "Wildtierreservat"
 wildlife_ranch_2_desc: "Behutsame Anpassungen im Ökosystem verbessern die Bedingungen für die heimische Tierwelt und erleichtern unseren Siedlern die Viehwirtschaft."
 wildlife_ranch_3: "Wildtiernexus"
 wildlife_ranch_3_desc: "Eine riesige Anlage, in der sich die Tiere frei bewegen können. Sie genießen hier Komfort und Luxus, um die Qualität der von ihnen bereitgestellten Ressourcen zu maximieren."
 hunting_grounds: "Jagdgründe"
 hunting_grounds_desc: "Ein Komplex, in dem man Jagdtechniken üben und perfektionieren kann. Ob mit modernen Energiewaffen oder traditioneller Jagdausrüstung: Man benötigt eine unvergleichbare Ausdauer und ausgezeichnete Fähigkeiten, um furchterregende Raubtiere als Trophäen zu erlegen."
 hunting_grounds_2: "Jagdweite"
 hunting_grounds_2_desc: "Eine Trainings- und Beobachtungseinrichtung, die optimale Jagdbedingungen für die lokale Fauna bietet. Wärmebilder helfen bei der Identifizierung neuer Tierspuren und erhöhen die Qualität beim Erlegen von Wild, das ausgezeichnete Jagdtrophäen bietet."
 hunting_grounds_3: "Jagdnexus"
 hunting_grounds_3_desc: "Eine riesige Weite, die planetare Jagdgesellschaften unterstützt. Dank der hochwertigen Waffen und Fährtenlesegeräte erhalten Jäger hier eine erstklassige Ausbildung, um die Qualität ihrer erlegten Beute zu maximieren."
 wildlife_sanctuary: "Wildtierzuflucht"
 wildlife_sanctuary_desc: "Ein geschütztes Reservat, um Wildtiere in ihrem natürlichen Lebensraum zu beobachten. Es gibt Sicherheitsvorkehrungen, um starke Populationsschwankungen oder gefährliche Krankheiten zu verhindern. Das Studium dieser Geschöpfe ist für sich bereits ein wertvolles akademisches Unterfangen, doch es lehrt uns auch etwas über unsere eigene Natur."
 wildlife_sanctuary_2: "Fortschrittliche Zuflucht"
 wildlife_sanctuary_2_desc: "Die hier untergebrachten Tiere erhalten eine individuelle Pflege, und ihre besonderen Ernährungs- und Gesundheitsbedürfnisse werden mit minimalen äußeren Eingriffen durchgeführt. Das speziell auf sie ausgerichtete Ökosystem erlaubt es sogar gefährdeten Arten, sich zu vermehren."
 wildlife_sanctuary_3: "Zufluchtsnexus"
 wildlife_sanctuary_3_desc: "Die hier untergebrachten Tiere werden überwacht und gepflegt, ohne dass die dafür benötigte Infrastruktur für sie sichtbar ist. Den Forschern ist es untersagt, in die natürlichen Abläufe einzugreifen, wodurch man Forschungsdaten von höchster Qualität erhält."
 primal_arena: "Urzeitarena"
 primal_arena_desc: "Ein Kolosseum, in dem die stärksten Krieger gegen die wildesten Kreaturen antreten. Es gibt keine größere Unterhaltung, als zu sehen, wie Helden über wilde Bestien triumphieren - oder bei dem Versuch draufgehen."
 primal_arena_2: "Urzeitstadion"
 primal_arena_2_desc: "In diesem riesigen Stadion werden ganze Rudel an Tieren von geschulten Trainern darauf abgerichtet, ihre Angriffe zu koordinieren. Die Kämpfer können sich nicht mehr darauf verlassen, ihre Beute einfach zu überwältigen: Sie müssen auch deren Trainer überlisten, um zu überleben."
 primal_arena_3: "Urzeitkolosseum"
 primal_arena_3_desc: "Eine ehrfurchtgebietende Arena, in der Schlachten von monumentalem Ausmaß ausgetragen werden. Jedes Gefecht wird wochenlang vorbereitet und von einem Millionenpublikum gesehen."
 symbiosis_nexus: "Symbioseknolle"
 symbiosis_nexus_desc: "Ein Naturreservat, in dem man unsere wilden Partner bei uns willkommen heißt. Jede Kreatur trägt etwas Einzigartiges zum Bewusstseinsgeflecht bei."
 symbiosis_nexus_2: "Symbioseweite"
 symbiosis_nexus_2_desc: "In diesem Reservat formt man unsere wilden Partner zu sich selbst erhaltenden Schulen. Die Koordinierung ihrer geringeren geistigen Fähigkeiten sorgt für die Stabilität der Gedanken des größeren Bewusstseinsgeflechts."
 symbiosis_nexus_3: "Symbiosenexus"
 symbiosis_nexus_3_desc: "Ein riesiger Knoten, der die Bewusstseine aller Lebewesen vereint, um unser kollektives Denken anzuregen."
 edict_space_fauna_exhibition: "Weltraumfauna-Ausstellung"
 space_fauna_exhibition: "$edict_space_fauna_exhibition$"
 edict_space_fauna_exhibition_desc: "Viehhüter aus der ganzen Galaxie stellen ihre wertvollsten Tiere zur Schau und konkurrieren um den begehrten Titel \"Ausstellungssieger\"."
 edict_beasts_burden: "Nutztiere"
 beasts_burden: "$edict_beasts_burden$"
 edict_beasts_burden_desc: "Unsere widerstandsfähigsten Tiere sollten einige unserer arbeitsintensivsten Aufgaben übernehmen."
 edict_creature_welfare: "Tierschutz"
 creature_welfare: "$edict_creature_welfare$"
 edict_creature_welfare_desc: "Es liegt in unserer Verantwortung, den unter unserer Obhut stehenden Lebewesen die bestmögliche Lebensqualität zu gewährleisten."
 edict_crack_the_whip: "Die Peitsche"
 crack_the_whip: "$edict_crack_the_whip$"
 edict_crack_the_whip_desc: "Unabhängig von seiner Spezies reagiert jeder Organismus ähnlich auf Schmerz. Die Kunst besteht darin, genau zu lernen, wie man diesen Schmerz korrekt zufügt."
 edict_exotic_network: "Exotisches Neuralnetz"
 exotic_network: "$edict_exotic_network$"
 edict_exotic_network_desc: "Das Bewusstsein unter unserer Obhut stehender niederer Organismen verfügt über ausreichend Kapazität, um bei anspruchsvolleren Berechnungen die nötige Bandbreite zu bieten."
 edict_defensive_instincts: "Selbsterhaltungsinstinkte"
 defensive_instincts: "$edict_defensive_instincts$"
 edict_defensive_instincts_desc: "Wir sind eins. Mögen unsere Instinkte in der kalten Leere des Weltraums miteinander verschmelzen."
 edict_biological_overdrive: "Biologische Übertaktung"
 biological_overdrive: "$edict_biological_overdrive$"
 edict_biological_overdrive_desc: "Durch die Stimulation der richtigen Nervenrezeptoren können niedere Kreaturen bis an ihre absolute Grenze gebracht werden."
 grand_archive.1060.name: "[from.GetSpaceFaunaName]-Aas"
 grand_archive.1060.desc: "Nach unserer Kontaktaufnahme zu der Weltraumfauna, die wir \"[from.GetSpaceFaunaName]\" nennen, entdeckten wir im [fromfrom.GetName]-System einen verwesenden Kadaver ihrer Spezies. Die Überreste sind ausgetrocknet und gefroren, da sie über längere Zeit dem All ausgesetzt waren.\n\nWir vermuten, dass dieser Kadaver ursprünglich andere Mitglieder dieser Spezies anlockte. Vielleicht waren sie sogar auf der Suche danach. Dies ist eine seltene Gelegenheit für uns, um die Biologie eines [from.GetSpaceFaunaName]-Exemplars zu studieren, das eines natürlichen Todes in der Leere gestorben ist."
 TIYANKI_GROUP_NAME: "Schule"
 SPACE_AMOEBA_GROUP_NAME: "Rudel"
 CRYSTAL_GROUP_NAME: "Gelege"
 VOIDWORM_GROUP_NAME: "Brut"
 CUTHOLOID_GROUP_NAME: "Wurf"
 voidworm_carcass_01_object: "Leerenwurm-Überreste"
 carcass_01_object: "Weltraumfauna-Kadaver"
 CARRION_DEBRIS_PROJECT: "[met_critter.GetSpaceFaunaName]-Autopsie"
 CARRION_DEBRIS_PROJECT_DESC: "Ein [met_critter.GetSpaceFaunaName]-Kadaver wurde im [contact_system.GetName]-System entdeckt. Eine Untersuchung der Überreste könnte unser Verständnis dieser im Weltraum lebenden Wesen erweitern."
 grand_archive.1065.name: "Autopsie abgeschlossen"
 grand_archive.1065.desc: "Die Autopsie des [met_critter.GetSpaceFaunaName]-Kadavers, der im [contact_system.GetName]-System gefunden wurde, ist abgeschlossen. Wir konnten ein gut konserviertes biologisches Exemplar aus den Überresten bergen, das uns einzigartige Einblicke in die Physiologie dieser Spezies gibt."
 grand_archive.1065.specimen_tt: "Faunaspezifisches ['concept_specimen'] (§MEpisch§!)"
 NAME_BoneShip: "Knochenschiff"
 NAME_BoneShip_desc: "Das Schiff ist mit den Ranken erwachsener Tiyanki, zahlreichen Leerenwurmzähnen und dem Schädel einer Kreatur geschmückt, die wir noch nie gesehen haben. Am Äußeren des Schiffs befinden sich eine Reihe von Präzisionswaffen."
 grand_archive.1069.name: "Das $NAME_BoneShip$"
 grand_archive.1069.desc: "Wir wurden von einem seltsam modifizierten Raumschiff im [from.GetName]-System kontaktiert. $NAME_BoneShip_desc$\n\nNachdem der Pilot des Schiffs naiverweise unsere Einladung angenommen hatte, wurde er kurzerhand [GetExecuted]. Wir haben das eigenartige Schiff unter unsere Kontrolle gebracht und es in unsere Reihen aufgenommen. Unter den persönlichen Gegenständen des Piloten haben wir auch ein nützliches Feldhandbuch für Jäger entdeckt."
 grand_archive.1069.a: "Ein willkommenes Geschenk."
 EXECUTED: "hingerichtet"
 DEVOURED: "verschlungen"
 grand_archive.1070.name: "Das $NAME_BoneShip$"
 grand_archive.1070.desc: "Wir wurden von einem seltsam modifizierten Raumschiff im [from.GetName]-System kontaktiert. $NAME_BoneShip_desc$\n\nEs ruft uns auf allen Frequenzen."
 grand_archive.1070.a: "Kommunikationskanal öffnen."
 NAME_PrimalHunter: "Ceriz t'Xal"
 primal_hunter_desc: "Ein geschickter Jäger, der auf der Suche nach Großwild durch die Galaxie streift."
 primal_hunter_catchphrase: "§L\"Ich suche weitere Trophäen für meine Sammlung.\"§!"
 grand_archive.1075.name: "$grand_archive.1070.name$"
 grand_archive.1075.desc: "§HDie Stimme des grübelnden Ceriz ist trocken und brüchig. Es scheint gar so, als wären die Stimmbänder wochenlang nicht genutzt worden. Das direkte Auftreten und der eindringliche Blickkontakt wirken respektvoll und einschüchternd zugleich.§!\n\n\"Als Trophäenjäger braucht es viel, um mich zu beeindrucken. Eure Leute haben es jedoch geschafft.\n\nIch bin bereit, mich Eurer Jagdgesellschaft anzuschließen, sofern unsere Partnerschaft Nutzen hat und auf einem gegenseitigen Erfahrungsaustausch beruht.\""
 grand_archive.1075.a: "Wer seid Ihr?"
 grand_archive.1075.a.reply: "Ich bin $NAME_PrimalHunter$. Ich jage schon seit vielen Jahren in diesen Systemen. Ich suche neue Beute, und Euer Volk scheint fähige Fährtenleser hervorgebracht zu haben.\n\nMeine Motivation ist leicht zu verstehen: der Nervenkitzel der Jagd."
 grand_archive.1075.b: "Was ist das für ein Schädel an Eurem Schiff?"
 grand_archive.1075.b.reply: "Es war das Letzte seiner Art. Es hat sich ganz schön gewehrt."
 grand_archive.1075.c: "Wie lange beobachtet Ihr uns bereits?"
 grand_archive.1075.c.reply: "Es ist offensichtlich, dass Euer Volk noch viel zu lernen hat.\n\nEin guter Jäger kann seine Beute so lange wie nötig verfolgen, ohne dass sie ihn bemerkt. Man muss ungesehen bleiben, bis der Schuss abgegeben ist. Die Zeit, die ich im Schatten verbracht habe, spielt keine Rolle. Was zählt, ist die Entscheidung, mich zu offenbaren."
 grand_archive.1075.d: "Warum wollt Ihr Euch uns anschließen?"
 grand_archive.1075.d.reply: "Ich suche keinen Wettbewerb. Ich teile zwar ungern mein Revier, aber ich würde lieber mit Euren Jägern zusammenarbeiten, als um dieselbe Beute zu wetteifern.\n\nWas auch immer Ihr verfolgt: Ich werde es töten."
 grand_archive.1075.hire: "Rekrutieren."
 grand_archive.1075.hire_tt: "§Y$NAME_PrimalHunter$§! tritt unserem Reich als §HAnführer§! bei."
 grand_archive.1075.dismiss: "Ablehnen."
 grand_archive.1080.name: "Reisende Xenologin"
 grand_archive.1080.desc: "Ein unabhängiges Forschungsschiff hat unsere Sternenbasis im [from.GetName]-System kontaktiert. Dieses Schiff ist mit einer Reihe von Fangapparaturen und Analyseinstrumenten ausgestattet, die speziell dafür gedacht sind, Weltraumfauna aufzuspüren und zu untersuchen.\n\nEs ruft uns auf allen Frequenzen."
 grand_archive.1080.a: "Kommunikationskanal öffnen."
 NAME_PrimalRancher: "Ruuk Qabruuk"
 primal_rancher_desc: "Eine Xenologin mit einer Vorliebe für Außeneinsätze, die alle möglichen Arten von im Weltraum geborenem Leben untersucht."
 primal_rancher_catchphrase: "§L\"Jede Kreatur hat eine Geschichte zu erzählen, und ich bin eine gute Zuhörerin!\"§!"
 grand_archive.1085.desc: "§HWissbegierig und analytisch wandert der Blick von Ruuk ständig zu einem kleinen Handgerät. Selbst als sie uns begrüßt, scheint sie sich Notizen zu machen. Trotzdem ist ihr Auftreten freundlich und professionell, wenn auch etwas distanziert.§!\n\n\"Wie ich sehe, bin ich mit meinem Interesse an in der Leere geborenen Wesen nicht allein. Ich habe die Forschungsarbeiten von [root.GetName] studiert, und sie sind sehr aufschlussreich. Ich würde diese Bemühungen gern als Teil Eurer Forschungsabteilung weiterführen. Natürlich nur, wenn Ihr mich einstellen wollt.\""
 grand_archive.1085.a: "Wer seid Ihr?"
 grand_archive.1085.a.reply: "Entschuldigt. Ich bin etwas aufgeregt und habe ganz vergessen, mich vorzustellen.\n\nMein Name ist Ruuk, und ich habe mich auf die Erforschung von Weltraumfauna spezialisiert. Mein Team und ich sammeln Daten über Bewegungsmuster, Körperzusammensetzung und Artenvielfalt auf galaktischer Ebene.\n\nIch habe bereits seit meinem Kindesalter eine Vorliebe für Tiere, und ohne Fuluff gehe ich nirgendwo hin."
 grand_archive.1085.b: "Wer ist Fuluff?"
 grand_archive.1085.b.reply: "Mein Lieblingsgeschöpf in der ganzen Galaxie!\n\nIch würde ihn Euch ja auf dem Bildschirm zeigen, aber er schläft grade. Wir halten diese Spezies auf meiner Heimatwelt als Haustier, und ich habe ihn bei meinem letzten Besuch adoptiert. Er ist einfach sooo niedlich. Zu hören, wie seine kleinen Hufe über den Metallboden schrappen, die Art und Weise, wie er an meinen Federn nagt, das Wollbüschel, das zwischen seinen kleinen Augen hervorguckt ... Ich bin sicher, Ihr werdet ihn auch lieben, wenn ... Falls wir anfangen, zusammenzuarbeiten."
 grand_archive.1085.c: "Wie habt Ihr uns gefunden?"
 grand_archive.1085.c.reply: "Eines der Exemplare, das wir verfolgten, zeigte ein ungewöhnliches Verhalten, weshalb wir seiner Spur gefolgt sind. Dann sahen wir Euer Forschungsschiff. Die Sorgfalt, die Ihr im Umgang mit der Kreatur an den Tag gelegt habt, zeugt von echtem Respekt für das Leben im Weltraum. Es hat mich zudem dazu inspiriert, mich mit Eurer Forschung zu beschäftigen, und diese hat mich noch viel mehr beeindruckt. Ich suche ständig nach gleichgesinnten Kollegen auf diesem Forschungsgebiet."
 grand_archive.1085.d: "Warum wollt Ihr Euch uns anschließen?"
 grand_archive.1085.d.reply: "Um ehrlich zu sein, ist die freiberufliche wissenschaftliche Forschung keine zuverlässige Einkommensquelle. Ich glaube an meine Arbeit, aber mein Leben mit der Suche nach einer Finanzierung zu verbringen, nimmt einfach zu viel Zeit von der eigentlichen Wissenschaft weg.\n\nIndem ich [root.GetName] beitrete, könnte ich meine ganze Zeit mit dem verbringen, was ich am besten kann: dem Studium von im Weltraum geborenem Leben. Ich hätte auch Zugang zu weitaus mehr Ressourcen und könnte mit Eurem eigenen Forschungsteam zusammenarbeiten, um unsere gemeinsamen Ziele zu verwirklichen."
 grand_archive.1085.hire: "Rekrutieren."
 grand_archive.1085.hire_tt: "§Y$NAME_PrimalRancher$§! tritt unserem Reich als §HAnführer§! bei."
 grand_archive.1085.dismiss: "Ablehnen."
 grand_archive.1100.name: "Bestialisches Kreischen"
 grand_archive.1100.desc: "Wir haben eine riesige Menge sonderbarer elektromagnetischer Wellen entdeckt, die aus einem noch nicht erkundeten Raumbereich stammen.\n\nEine erste Analyse ergibt, dass sie mit jenen Signalen übereinstimmen, die die §YLeerenwürmer§! zur Kommunikation nutzen, doch sie sind weitaus unregelmäßiger sind und weisen eine viel stärkere Amplitude auf. Wir müssen dieses Phänomen genauer untersuchen."
 grand_archive.1100.a: "Das ist äußerst besorgniserregend."
 grand_archive.1105.name: "Kreischende Leerenwürmer"
 grand_archive.1105.desc: "Wir haben die Quelle des animalischen Kreischens gefunden: ein verborgenes System unweit von [frenzied_voidworms_target.solar_system.GetName], in dem es nur so von §YLeerenwürmern§! wimmelt.\n\nDie Leerenwürmer in diesem System sind anders als alle, die wir zuvor gesehen haben. Diese Kreaturen sind mutiert. Sie bilden keine Troikas, wie sie es üblicherweise tun, und die einzelnen erwachsenen Exemplare befinden sich in einem äußerst heftigen und gewaltsamen Paarungsrausch.\n\nDas ist beunruhigend: Dieses nicht-parasitäre Verhalten legt nahe, dass sich dieser Schwarm ohne auf Planeten geborene Wirte vermehren kann."
 grand_archive.1105.desc_no_homicidal: "\nSollte es dieser Variante von Leerenwurm erlaubt werden, sich unkontrolliert zu vermehren, könnte dies das Gleichgewicht des gesamten galaktischen Ökosystems stören. Angesichts ihrer zunehmenden Aggressivität gehen wir davon aus, dass sich diese Kreaturen darauf vorbereiten, [frenzied_voidworms_target.GetName] anzugreifen."
 grand_archive.1105.desc_2: "\nWir müssen unsere Verteidigung verbessern."
 grand_archive.1105.a: "Alarmstufe Rot!"
 situation_frenzied_voidworms: "Rasende Leerenwürmer"
 situation_frenzied_voidworms_type: "$situation_frenzied_voidworms$"
 situation_frenzied_voidworms_desc: "Wir haben einen riesigen Schwarm mutierter Leerenwürmer entdeckt. Sie sind äußerst aggressiv und besitzen scheinbar die Fähigkeit, sich auf nicht-parasitäre Weise fortzupflanzen.\n\nUnsere Anwesenheit scheint ihre Nester weiter zu beunruhigen. Wir müssen Vorsicht walten lassen.\n\n[GetVoidwormsHostility]"
 situation_frenzied_voidworms_monthly_change_tooltip: "$situation_monthly_change_tooltip_approaches_dependent$"
 finisher_effects_frenzied_voidworms: "Die aggressiven Leerenwürmer könnten unsere Heimatwelt angreifen."
 approach_frenzied_voidworms_do_nothing: "Nichts tun"
 approach_frenzied_voidworms_do_nothing_tt: "Wir werden nichts unternehmen."
 approach_frenzied_voidworms_hide_presence: "Unsere Anwesenheit verbergen"
 approach_frenzied_voidworms_hide_presence_tt: "Alle Bauvorhaben in unserem System, das am dichtesten an ihrem Heimatsystem ist, werden gestoppt."
 approach_frenzied_voidworms_stir_nests: "Die Nester provozieren"
 approach_frenzied_voidworms_stir_nests_tt: "Die Kreaturen zu provozieren, wird ihre Feindseligkeit uns gegenüber erhöhen."
 approach_frenzied_voidworms_feed_nests: "Die Nester mit Nahrung versorgen"
 approach_frenzied_voidworms_feed_nests_tt: "Wenn wir ihr aggressives Verhalten weit genug reduzieren, könnten wir ihr Vertrauen gewinnen."
 #Strings for GetVoidwormsHostility trigger loc script
 voidworms_hostility_hostile: "Die mutierten Leerenwürmer wirken §Psehr aggressiv§!."
 voidworms_hostility_neutral: "Die mutierten Leerenwürmer wirken §Saggressiv§!."
 voidworms_hostility_pacified: "Die mutierten Leerenwürmer wirken §Bruhig§!."
