 fcsum_cutholoids_1: "$fcsum_critters_1$"
 further_fc_cutholoids_completed: "$further_fc_amoebas_completed$"
 grand_archive.3103.name: "$resolution_cutholoid_eradication$"
 grand_archive.3103.desc: "[global_event_country.GetGalCommunityOrGalImperiumDE3Cap] hat erklärt, dass Cutholoide nicht länger innerhalb von Systemen von Mitgliedsstaaten existieren dürfen.\n\nDiese Kreaturen müssen unmittelbar nach ihrer Entdeckung vernichtet werden; andernfalls begeht [Root.GetName] einen §RBruch des Galaktischen Gesetzes§!."
 grand_archive.3105.name: "$cutholoids_plural$ im Raumbereich der [this.GetSpeciesNamePlural]"
 grand_archive.3105.desc: "Im [from.GetName]-System wurde ein Cutholoid entdeckt. Da diese zu Feinden der Galaxie erklärt wurden, sind alle Mitglieder der Galaktischen Gemeinschaft gesetzlich dazu verpflichtet, sämtliche innerhalb ihrer Grenzen befindlichen Cutholoide auf der Stelle auszurotten.\n\n[Root.GetName] begeht einen §RBruch des Galaktischen Gesetzes§!, bis der Cutholoid entweder vernichtet oder auf anderem Weg aus unseren Systemen vertrieben wurde."
 grand_archive.3107.desc: "Die fortwährende Anwesenheit von Cutholoiden innerhalb des [invaded_system.GetName]-Systems gilt unter dem Beschluss \"$resolution_cutholoid_eradication$\" als erheblicher §RBruch des Galaktischen Gesetzes§!. Dies hat dazu geführt, dass es [global_event_country.GetGalCommunityOrGalImperiumDE3] Mitgliedern erlaubt hat, Sanktionen gegen [Root.GetName] zu verhängen."
 grand_archive.3011.name: "Forschungsschiff vermisst"
 grand_archive.3011.desc: "Wir haben den Kontakt zu einem unserer Forschungsschiffe verloren, das einen sonderbaren Asteroiden im [cutholoid_under_radar.solar_system.GetName]-System untersuchte.\n\nUnsere Scanner empfangen ein schwaches Notsignal vom letzten bekannten Standort. Wir müssen weitere Nachforschungen anstellen, wenn wir das vermisste Schiff finden wollen."
 grand_archive.3011.a: "Das ist nicht gut."
 grand_archive.3012.name: "Asteroidenwesen entdeckt"
 grand_archive.3012.desc: "Ein weiteres Exemplar dieser sonderbaren Asteroiden-Kreaturen wurde während einer routinemäßigen Erkundung im §H[from.solar_system.GetName]§!-System entdeckt.\n\nWir sollen dieses System vorerst mit unseren §HForschungsschiffen§! meiden, zumindest so lange, bis wir mehr über diese gefährlichen Objekte herausgefunden haben."
 grand_archive.3012.a: "Setzt die Untersuchungen fort."
 grand_archive.3016.name: "Unangenehme Überraschung"
 grand_archive.3016.desc.default: "Der Asteroid im [fromfrom.GetName]-System diente dem gewaltigen Organismus, der in seinem Inneren lebte, nur als Hülle.\n\nWir haben ihn erfolgreich vernichten und die [this.GetName] bergen können. Wenn wir in Zukunft Asteroiden untersuchen, sollten wir vorsichtiger vorgehen.\n\nVielleicht lauern da draußen noch mehr von diesen Kreaturen, die nur darauf warten, dass sich leichte Beute nähert."
 grand_archive.3016.desc.leader_killed: "$grand_archive.3016.desc.default$ Unglücklicherweise hat [leader.GetName] dabei irreparablen Schaden davongetragen."
 grand_archive.3018.name: "Aus dem Bauch der Bestie"
 grand_archive.3018.desc: "Unser im §H[current_system.GetName]§!-System verschwundenes Forschungsschiff ist wieder aufgetaucht!\n\n§H[leader.GetName]§! berichtet, sie wurden von einem gewaltigen Weltraumwesen verschlungen, das sich innerhalb eines Asteroiden befunden hatte, und dass die Integrität ihres Schiffes kurz vor dem Versagen stand, als sie unerwartet ins offene All katapultiert wurden. Offenbar hat jemand oder etwas diese Kreatur überrascht, bevor wir eingreifen konnten.\n\nWir sollten bei der Erforschung bestimmter Asteroidengürtel vorsichtiger vorgehen, bis wir mehr über diese Wesen in Erfahrung bringen konnten."
 grand_archive.3018.a: "Glück gehabt."
 grand_archive.3020.name: "Forschungsschiff verloren"
 grand_archive.3020.desc: "Das Notsignal der [from.GetName] wird nicht länger übertragen. Wir können nur vermuten, dass das Forschungsschiff endgültig zerstört wurde."
 alert_mia_fleet_eaten_title: "$alert_mia_title$"
 alert_mia_fleet_eaten_instant: "Wir haben den Kontakt zu einem unserer Forschungsschiffe verloren, das einen Asteroiden untersuchte. Unsere Scanner empfangen ein schwaches Notsignal vom letzten bekannten Standort."
 cutholoid_discovered_chain_title: "Bergung der [this.GetName]"
 cutholoid_discovered_chain_desc: "Wir haben den Kontakt zu unserem Forschungsschiff im [cutholoid_under_radar.solar_system.GetName]-System verloren, der [this.GetName].\n\nIhre letzte Übertragung deutete darauf hin, dass sie einen Asteroiden untersuchen wollte, der den Namen \"[cutholoid_under_radar.GetName]\" erhielt.\n\nWir sollten mit äußerster Vorsicht vorgehen, wenn wir dieses System erneut betreten."
 HIDDEN_CUTHOLOID_ATTACK_PROJECT: "Den Asteroiden vernichten"
 HIDDEN_CUTHOLOID_ATTACK_PROJECT_DESC: "Der Asteroid mit der Bezeichnung \"[cutholoid_under_radar.GetName]\" ist nicht das, was er zu sein scheint. Wir sollten uns ihm mit einer beachtlichen Militärflotte nähern, wenn wir unser Forschungsschiff, die [this.GetName], bergen wollen, bevor sie endgültig zerstört wird."
 HIDDEN_CUTHOLOID_CAPTURE_PROJECT: "Den Asteroiden einfangen"
 HIDDEN_CUTHOLOID_CAPTURE_PROJECT_DESC: "Der Asteroid mit der Bezeichnung \"[cutholoid_under_radar.GetName]\" ist nicht das, was er zu sein scheint. Mit der richtigen Technologie könnten wir ihn einfangen und so unser Forschungsschiff, die [this.GetName], bergen, bevor sie endgültig zerstört wird."
 grand_archive.2800.name: "Falscher Asteroid"
 grand_archive.2800.desc: "Der sonderbare Asteroid, auf den wir im §H[This.System.GetName]§!-System stießen, scheint empfindungsfähig zu sein. Sich in die Umlaufbahn solcher Objekte zu begeben, ist höchst gefährlich und Forschungsschiffen wurden deshalb aufgetragen, die betroffenen Systeme unverzüglich zu verlassen, bis wir mehr über diese Wesen in Erfahrung bringen konnten."
 grand_archive.2800.a: "Setzt die Untersuchungen fort."
 grand_archive.2900.name: "Cutholoide"
 grand_archive.2900.desc: "Wir sind auf einen Weltraumorganismus gestoßen, der innerhalb eines Asteroiden Unterschlupf gesucht hat. Diese Kreaturen, die wir \"§HCutholoide§!\" nennen, sind Jäger, die mehrere Jahre lang auf der Lauer liegen, um ihre Beute aus dem Hinterhalt anzugreifen. Da sie in der Lage sind, ganze Schiffe zu verschlingen, sollten wir sehr vorsichtig sein, wenn wir uns unerforschten Asteroidengürteln nähern.\n\nGlücklicherweise scheint es nicht viele von diesen Geschöpfen zu geben, da ihre ungeschlechtliche Fortpflanzung Hunderte von Jahren dauern kann."
 grand_archive.2900.a: "Wir sollten diese Kreaturen näher untersuchen."
 grand_archive.2900.b: "Hinterhältige Jäger. Vernichtet sie alle!"
 grand_archive.2900.b.homicidal: "Jäger werden zur Beute."
 grand_archive.2905.name: "Cutholoidenschalen"
 grand_archive.2905.desc: "Die Schale eines Cutholoiden besteht nicht nur aus Mineralien, sondern auch aus starken biologischen Fasern. Diese Fasern hören nie auf zu wachsen, und wir schätzen, dass einige Schalen aus bis zu 50 % Biomasse bestehen.\n\nWird ein Cutholoid zu groß für seinen Asteroiden, sucht er sich ein neues Zuhause und beginnt den Integrationsprozess von Neuem. Obwohl sie normalerweise in ihrem eigenen Territorium bleiben, wurden mehrere Cutholoide in der Umlaufbahn eines erstklassigen Kandidaten für ihre neue Schale beobachtet. Die größte Kreatur besetzt dabei den besten Asteroiden, während andere sich der Größe nach anordnen und friedlich mit dem nächsten in der Reihe tauschen. Auf diese Weise wurden die von ihnen bewohnten Asteroiden oft schon von Dutzenden anderer Organismen zuvor bewohnt.\n\nDies führt außerdem dazu, dass die kleinsten Asteroiden den höchsten Anteil an biologischer Masse aufweisen, da sie am häufigsten getauscht werden. Proben von diesen Asteroiden zu beschaffen, hätte einen großen Wert für die Wissenschaft."
 grand_archive.2905.a: "Verstärkt unsere Weltraumfauna."
 grand_archive.2905.b: "Verbessert unsere Schiffe."
 cutholoids_hunting_buff: "Cutholoiden-Jäger"
 cutholoids_hunting_buff_desc: "Die mineralienhaltigen Schalen von Cutholoiden werden nach einem Kampf geborgen, was dazu führt, dass wir durch jede zerstörte Flotte §G$@cutholoids_hunting_buff_mineral_reward|0$§! £minerals£ erhalten."
 grand_archive.2900.b.cutholoidhunt: "§G+$@cutholoids_hunting_buff_mineral_reward|0$§! £minerals£ für jede zerstörte Cutholoiden-Flotte"
 mod_damage_vs_country_type_cutholoids_mult: "Schaden an Cutholoiden"
 RESEARCH_CUTHOLOIDS_PROJECT: "Cutholoiden-Forschung"
 RESEARCH_CUTHOLOIDS_PROJECT_DESC: "Die asteroidenartige Schale von Cutholoiden ist ein Meisterwerk der Biologie. Wir können noch viel mehr von ihnen lernen."
