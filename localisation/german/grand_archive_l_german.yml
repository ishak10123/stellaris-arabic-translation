 grand_archive.4105.desc.2.common: "Wir sind beeindruckt. [GetStage2Description]"
 CURATORS_STAGE_2_DESC: "Wir würden Euch gern dabei unterstützen, ein spezialisiertes Museum auf einem Eurer Planeten zu errichten."
 DEAD_CURATORS_STAGE_2_DESC: "Die Pläne, die man zum Bau eines Museums braucht, haben die Vernichtung unserer Heimat überlebt und wir möchten sie gern mit Euch teilen."
 grand_archive.4105.desc.2.xeno_geology: "$grand_archive.4105.desc.common.xeno_geology$\n\n$grand_archive.4105.desc.2.common$"
