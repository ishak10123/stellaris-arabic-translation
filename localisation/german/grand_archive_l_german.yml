 LARGE_PREYING_MAW: "Großer verschlingender Schlund"
 LARGE_PREYING_MAW_DESC: "Verschlingt gelegentlich große Schiffe des Feindes."
 HUGE_PREYING_MAW: "Riesiger verschlingender Schlund"
 HUGE_PREYING_MAW_DESC: "Verschlingt gelegentlich riesige Schiffe des Feindes."
 HUNT_CUTHOLOID_ATTACK_PROJECT: "Den Cutholoiden im [solar_system.GetName]-System vernichten"
 HUNT_CUTHOLOID_ATTACK_PROJECT_DESC: "Die Vernichtung dieses Cutholoiden verhindert, dass er vorbeifliegende Schiffe verschlingt."
 HUNT_CUTHOLOID_CAPTURE_PROJECT: "Den Cutholoiden im [solar_system.GetName]-System einfangen"
 HUNT_CUTHOLOID_CAPTURE_PROJECT_DESC: "Der Cutholoid wartet nur darauf, dass sich ein Schiff nähert, das er verschlingen kann. Diese Gelegenheit können wir nutzen, um die Kreatur für weitere Studien einzufangen."
 leader_trait_cutholoid_victim: "Cutholoiden-Opfer"
 leader_trait_cutholoid_victim_desc: "Dieser Anführer war eine Zeit lang im Verdauungssystem eines Weltraum-Cutholoiden gefangen. Sein Körper ist zwar nicht mehr ganz vollständig, aber er hat einen einzigartigen Einblick in die Molekularbiologie gewonnen."
