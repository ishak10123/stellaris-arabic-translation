 opinion_return_traceable_items_tier_1_tt: "§G+$@opinion_return_traceable_items_tier_1_value|0$§! £opinion£ Meinung bei jedem Reich, das nicht auf die Vernichtung der Galaxie aus ist und mit dem wir uns nicht im Krieg befinden."
