 #Traditions #
 ##############
 galactic_trawling: "Galaktische Schleppnetze"
 council_agenda_agenda_galactic_trawling_name: "$galactic_trawling$"
 council_agenda_agenda_galactic_trawling_desc: "Es gibt Leben im Weltraum, das katalogisiert und untersucht werden sollte."
 agenda_galactic_trawling_launch_finish: "$agenda_ref$: $council_agenda_agenda_galactic_trawling_name$"
 agenda_galactic_trawling_launch_finish_desc: "$council_agenda_agenda_galactic_trawling_desc$"
 astute_observation: "Scharfsinnige Beobachter"
 council_agenda_agenda_astute_observation_name: "$astute_observation$"
 council_agenda_agenda_astute_observation_desc: "Die Geschichte unserer Galaxie reicht weit zurück und ist tief vergraben. Wir müssen aus vergangenen Lektionen lernen."
 agenda_astute_observation_launch_finish: "$agenda_ref$: $council_agenda_agenda_astute_observation_name$"
 agenda_astute_observation_launch_finish_desc: "$council_agenda_agenda_astute_observation_desc$"
 tradition_domestication: "Domestizierung"
 tradition_domestication_desc: "Will man die Galaxie beherrschen, muss man auch die in ihr lebenden Organismen beherrschen lernen."
 tr_domestication_adopt: "Domestizierungstraditionen"
 tr_domestication_finish: "Domestizierungstraditionen abgeschlossen"
 tr_domestication_finish_desc_primal_calling: "$MOD_SPACE_FAUNA_EXPERIENCE_GAIN_MULT$: §G+$@domestication_finish_exp_bonus|0%$§!\n$TRADITIONS_FINISH_AP$"
 tr_domestication_finish_desc_default: "Schaltet ['concept_voidlure', Leerenköder] frei\n$tr_domestication_finish_desc_primal_calling$"
 tr_domestication_finish_desc: "[GetDomesticationFinishEffectDesc]"
 tr_domestication_containment_protocols: "Eindämmungsprotokolle"
 tr_domestication_containment_protocols_delayed: "Bei der Lagerung und dem Transport großer Organismen besteht immer die Gefahr, dass sie verletzt werden oder sich selbst verletzen. Mit den richtigen Beruhigungsmitteln und den passenden Abläufen können wir dieses Risiko vermindern."
 tr_domestication_containment_protocols_tt: "Höhere Chance, §YWeltraumfauna§! mit einer höheren Seltenheit zu fangen."
 tr_domestication_bio_repurposing: "Bio-Recycling"
 tr_domestication_bio_repurposing_delayed: "Nichts wird verschwendet."
 tr_domestication_bio_repurposing_blocker_tt: "Erhält §G$@bio_repurposing_blocker_clear_food|0$§!$r_food$ beim Entfernen £blocker£ §Yorganischer Blocker§!"
 tr_domestication_bio_repurposing_tt: "Die von Euch besiegte §YWeltraumfauna§! hinterlässt Trümmer, die Ihr erforschen könnt, um einen Teil der Kosten für sie zurückzuerlangen. (§G10%§!)\n$tr_domestication_bio_repurposing_blocker_tt$"
 tr_domestication_bio_repurposing_reanimator_tt: "$tr_domestication_bio_repurposing_blocker_tt$"
 tr_domestication_astrozoology: "Astrozoologie"
 tr_domestication_astrozoology_delayed: "Die Kreaturen der Leere sind bezüglich ihres Brutverhaltens und ihrer Ernährungsbedürfnisse einzigartig. Man muss größte Sorgfalt walten lassen, um ihr volles Potenzial in einer isolierten Umgebung auszuschöpfen."
 tr_domestication_astrozoology_tt: "Beim Fangen oder Ausbrüten von Weltraumfauna: $NEW_LINE$$t$- Ressourcen durch das Erlegen: §G200%§!"
 tr_domestication_metabolic_regulation: "Stoffwechselregulierung"
 tr_domestication_metabolic_regulation_delayed: "Wir können die Aufzucht der von uns verwahrten Weltraumfauna künstlich steuern, indem wir verschiedene Schlüsselenzyme und Proteine regulieren, die ihren individuellen Stoffwechsel beeinflussen."
 tr_domestication_metabolic_regulation_tt: "Schaltet die Richtlinien \"§Y$policy_metabolic_regulation$§!\" frei"
 tr_domestication_metabolic_regulation_machine_tt: "$tr_domestication_metabolic_regulation_tt$"
