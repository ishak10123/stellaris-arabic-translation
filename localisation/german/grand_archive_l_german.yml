 grand_archive.4515.desc.common_1: "Unser $grand_archive$ im [fromfrom.GetName]-System wurde von [from.GetName] zerstört."
 grand_archive.4515.desc.common_2: "Wir müssen das $grand_archive$ in einem anderen System wiederaufbauen, um neue Exemplare auszustellen."
 grand_archive.4515.stolen: "Bedauerlicherweise konnten wir einige wertvolle Exemplare nicht retten."
 grand_archive.4515.freed: "Ein Teil unserer gefangenen Weltraumfauna ist ausgebrochen. Viele Exemplare sind verwirrt und aggressiv."
