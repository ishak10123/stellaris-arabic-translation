 test_subject_gestalt_modifier: "$test_subject_unwilling_modifier$"
 grand_archive.2310.name: "Leerenwurm-Plage"
 grand_archive.2310.desc.default: "Die Leerenwurmpopulation hat eine kritische Masse in der Galaxie erreicht und ihre Verhaltensmuster scheinen sich zusehends zu ändern.\n\nIhr normaler Lebenszyklus, in dem ein Teil der Wirtspopulation verschont bleibt, wurde unterbrochen. Für die Nachhaltigkeit ihrer Laichgründe zu sorgen, scheint keine Rolle mehr für sie zu spielen.\n\nUnsere Kolonien wurden in Alarmbereitschaft versetzt und die Anwesenheit von $NAME_Voidworms$n in einem System ist mit äußerster Vorsicht zu genießen.\n\nEine Leerenwurmvermehrung galaktischen Ausmaßes steht uns kurz bevor."
 grand_archive.2310.desc.tech: "$grand_archive.2310.desc.default$\n\nDie Immunität, die wir gegen diese Parasiten entwickelt haben, scheint nicht mehr so gut zu wirken wie zuvor. Wir werden zurück ans Reißbrett müssen."
 grand_archive.2310.desc.nocontact: "Wir fangen aus der ganzen Galaxie beunruhigende Berichte darüber ab, dass eine bisher unbekannte Spezies von Weltraumfauna, die als \"Leerenwurm\" bekannt ist, in einen Fortpflanzungsrausch verfallen ist. Diese Kreaturen stellen den Berichten zufolge eine erhebliche Bedrohung für Planeten ohne angemessene Verteidigungssysteme dar. Alle unsere Kolonien wurden in höchste Alarmbereitschaft versetzt."
 grand_archive.2310.a: "$DISTURBING$ $DOTDOTDOT$"
 situation_voidworm_plague: "Leerenwurm-Plage"
 situation_voidworm_plague_type: "$situation_voidworm_plague$"
 situation_voidworm_plague_desc: "Wir stehen kurz vor einer Leerenwurm-Plage.\n\nDiese Kreaturen werden nicht länger bestimmte Planeten für ihre Brutstätten verschonen. Wir müssen sie schnellstens ausrotten oder wir laufen Gefahr, dass unsere Kolonien zerstört werden.\n\n§YJeder getötete Leerenwurm beschleunigt den Situationsfortschritt.§!"
 situation_voidworm_plague_monthly_change_tooltip: "$situation_monthly_change_tooltip_approaches_dependent$"
 finisher_effects_voidworm_plague: "Eure Kolonien können nicht länger von Leerenwürmern bombardiert werden."
 approach_voidworm_plague_do_nothing: "Nichts tun"
 approach_voidworm_plague_do_nothing_tt: "Wir werden nichts unternehmen."
 approach_voidworm_plague_support_fleets: "Unsere Flotten unterstützen"
 approach_voidworm_plague_support_fleets_tt: "Wir können ein bisschen Lebensqualität aufgeben, um unsere Militärflotten gegen die Leerenwurm-Plage zu rüsten.\n$SITUATION_MONTHLY_CHANGE$ (Situation): §G+0.5§!"
 approach_voidworm_plague_purge_infected_pops: "Infizierte töten"
 approach_voidworm_plague_purge_infected_pops_tt: "$NAME_Voidworms$, die Eure Kolonien bombardieren, schaffen keine neuen $NAME_Voidworms$.\n$SITUATION_MONTHLY_CHANGE$ (Situation): §G+0.7§!"
 approach_voidworm_plague_search_for_cure: "Nach einem Heilmittel suchen"
 approach_voidworm_plague_search_for_cure_tt: "Wenn wir es schaffen, ihren biologischen Zyklus zu durchbrechen, können sich die $NAME_Voidworms$ nicht länger in dieser Galaxie vermehren.\n$SITUATION_MONTHLY_CHANGE$ (Situation): §G+1.0§!"
 change_approach_will_temporarily_lock: "§SWird dieser Ansatz ausgewählt, können andere Ansätze §Y$@voidworm_plague_approach_cooldown_years|0$ Jahre§! lang nicht mehr gewählt werden.§!"
 too_early_to_change_approach: "§SEs ist noch zu wenig Zeit vergangen, um erneut den Situationsansatz zu wechseln.§!"
 voidworm_crisis_eradicate_chain_title: "Ausrottung der $NAME_Voidworms$"
 voidworm_crisis_eradicate_chain_desc: "Die Leerenwurmpopulation hat in der Galaxie ein unhaltbares Niveau erreicht. Wir müssen sie ausrotten!\n\nWir haben alle verbliebenden §YLeerenwurm-Nester§! lokalisiert, die zerstört werden müssen."
 voidworm_system_poi_title: "[prev.GetName] zerstören"
 voidworm_system_poi_desc: "In diesem System wurden §YLeerenwurm-Nester§! entdeckt.\n\nZerstört sie, um zu verhindern, dass sich die Parasiten vermehren können."
 #Voidworms Plague Crisis Random Events #
 grand_archive.2400.name: "Überschüssige Komponenten"
 grand_archive.2400.desc: "Die verstärkte Flottenunterstützung gegen die $NAME_Voidworms$ hat aufgrund verbesserter Wartungsprotokolle einen unerwarteten Überschuss an zusätzlichen Komponenten erbracht. Wir haben die Möglichkeit, diese Materialien dazu zu nutzen, um kurzfristig den Bau neuer Schiffe zu beschleunigen."
 grand_archive.2400.a: "Investieren wir diese Komponenten in die Verstärkung unserer Flotten."
 grand_archive.2400.b: "Haltet die Reserve aufrecht."
 grand_archive.2405.name: "Ein Ruf zu den Waffen"
 grand_archive.2405.desc.default: "Unsere fortwährenden Bemühungen, der Leerenwurm-Plage Einhalt zu gebieten, haben eine neue Generation von Kommandanten hervorgebracht, die ihre Fähigkeiten für die Beseitigung dieser galaktischen Bedrohung einsetzen wollen."
 grand_archive.2405.desc.gestalt: "Unsere fortwährenden Bemühungen, der Leerenwurm-Plage Einhalt zu gebieten, haben es uns erlaubt, zusätzliche Kommandanten-Knoten zu produzieren. Durch die Bereitstellung zusätzlicher Ressourcen können sich diese Knoten alleinig auf die Bekämpfung dieser Bedrohung konzentrieren."
 grand_archive.2405.a: "Inspirierend."
 grand_archive.2405.tt: "Aktualisiert die §Hrekrutierbaren Anführer§! und fügt 3 zusätzliche §HKommandanten§! hinzu, die eine zusätzliche Stufe haben."
 grand_archive.2410.name: "Front-Innovation"
 grand_archive.2410.desc.default: "Ein auf [random_shipyard.GetName] stationierter Ingenieur hat eine neue konzeptuelle Blaupause für die Schiffsverteidigung entwickelt. [random_shipyard.leader.GetHeSheCap] führte routinemäßige Reparaturen in unserem Kampf gegen die Leerenwürmer durch, als [random_shipyard.leader.GetHeShe] auf die Idee für eine neue Komponente kam, die die Widerstandsfähigkeit unserer Schiffe erhöhen würde. Nachdem diese Idee unserer Forschungsabteilung vorgelegt wurde, ist man der Auffassung, dass sie großes Potenzial hat."
 grand_archive.2410.desc.gestalt: "[root.GetIndividualName::<DE_ART_IND_N_Cap>] auf [random_shipyard.GetName] stationiert[root.GetIndividualName::<DE_END_ADJ_IND_S_N>] [root.GetIndividualName&NOM], [root.GetIndividualName::<DE_ART_DEF_S_N>] für Reparaturarbeiten zuständig war, gewann neue Forschungserkenntnisse zur Verbesserung der Schiffsverteidigung. Nach einem Missverständnis bei einer Routinereparatur verwendete [root.GetIndividualName::<DE_ART_DEF_S_N>] [root.GetIndividualName&NOM] eine nicht regelkonforme Kombination von Methoden und Materialien, was zur Entdeckung einer neuen Schutzkomponente führte. Nach einer ersten Untersuchung durch unsere Forschungsdrohnen wurde das große Potenzial dieser zufälligen Entdeckung erkannt - vorausgesetzt, sie wird noch etwas verfeinert."
 grand_archive.2420.name: "[infected_leader.GetName] infiziert"
 grand_archive.2420.desc: "Während der Ausübung [infected_leader.GetHisHer]er Pflichten wurde [infected_leader.GetName] von Leerenwurmsporen infiziert. Es wird nicht lange dauern, bis die Nymphen schlüpfen und den Wirtskörper zerstören.\n\nEs scheint aussichtlos, doch unsere Ärzte spekulieren, dass die Möglichkeit besteht, die Larven zu entfernen, bevor sie sich vollständig in [infected_leader.GetHisHer] Nervensystem integriert haben. Es ist ein höchst riskanter Eingriff, doch [infected_leader.GetName] scheint das Risiko eingehen zu wollen."
 grand_archive.2420.a: "Beseitigt [infected_leader.GetName]."
 grand_archive.2420.b: "Entfernt die Larven."
 grand_archive.2425.name: "Quarantäneverstoß"
 grand_archive.2425.desc.common: "Eine kleine Gruppe infizierter [infected_planet_pop.species.GetNamePlural] ist vor der Säuberung auf [infected_planet.GetName] geflohen und hat sich im ganzen System verstreut. Sollten wir uns nicht unverzüglich um dieses Problem kümmern, besteht die Gefahr, dass sich die Leerenwurm-Infektion in ganz [this.GetName] ausbreitet."
 grand_archive.2425.desc.default: "$grand_archive.2425.desc.common$ Wer geflohen ist, muss beseitigt werden, bevor er uns alle in Gefahr bringt."
 grand_archive.2425.desc.rogue: "$grand_archive.2425.desc.common$ Wer geflohen ist, muss beseitigt werden, bevor er unsere anderen Bio-Trophäen in Gefahr bringt."
 grand_archive.2425.desc.gestalt: "$grand_archive.2425.desc.common$ Wer geflohen ist, muss beseitigt werden, bevor er unser gesamtes Kollektiv in Gefahr bringt."
 grand_archive.2425.desc.robot: "Die für eine Analyse vorgesehenen Proben von infizierter Flora und Fauna wurden irrtümlich zu Lebensmitteln verarbeitet. Infolge dieses Fehlers wurde eine Vielzahl an organischem Material mit Leerenwurm-Parasiten kontaminiert und muss nun beseitigt werden."
 grand_archive.2425.a.default: "Bringt sie zur Strecke."
 grand_archive.2425.a.default.tt: "-1 organischer Bewohner in jeder im Besitz befindlichen Kolonie"
 grand_archive.2425.a.robot: "Verbrennt die Nahrungsvorräte."
 grand_archive.2425.a.robot.tt: "$@infected_devastation|0$ Verwüstung auf allen nicht-infizierten Planeten"
 grand_archive.2425.b: "Unternehmt nichts."
 grand_archive.2425.b.tt: "In der Nähe unserer Kolonien könnten zusätzliche Leerenwurm-Nymphen auftauchen!"
 grand_archive.2430.name: "Pflichtvernachlässigung"
 grand_archive.2430.desc: "Obwohl man sich einig ist, dass die Säuberung der Infizierten die beste Lösung darstellt, fällt es vielen Soldaten schwer, diese Befehle auszuführen. Trotz der Gefahr, die vom Leerenwurm-Parasiten ausgeht, zögern viele, ihre Mitbürger zum Wohl der Allgemeinheit zu eliminieren.\n\nEs muss etwas getan werden, um zu verhindern, dass sich die Leerenwurm-Infektion in unseren Kolonien ausbreitet. Vielleicht sollten wir bestimmte Teile des Säuberungsprozesses automatisieren, damit wir weniger Soldaten benötigen. Alternativ könnte eine kurze Werbekampagne dabei helfen, die ethischen Standards unserer Säuberungsmaßnahmen zu erklären und ihre Notwendigkeit zu bekräftigen."
 grand_archive.2430.a: "Automatisiert den Säuberungsprozess."
 grand_archive.2430.b: "Führt eine PR-Kampagne durch."
 grand_archive.2440.name: "Gewaltiger Durchbruch"
 grand_archive.2440.desc: "Unsere Suche nach einem Heilmittel gegen die Leerenwurm-Plage hat es anderen biologischen Forschungsbereichen erlaubt, bedeutende Fortschritte zu machen. Die Parasiten haben zwar noch immer höchste Priorität, doch dieser neue Durchbruch birgt enormes Potenzial für künftige Studien."
 grand_archive.2445.name: "Erste Tests"
 grand_archive.2445.desc.common: "Unser Verständnis der Leerenwurm-Plage hat sich verbessert und die Grundlage für ein Heilmittel geschaffen."
 grand_archive.2445.desc.default: "$grand_archive.2445.desc.common$ Unsere Forschung würde jedoch deutlich schneller vorankommen, wenn [owner_main_species.GetAdj]e Testsubjekte erlaubt wären.\n\nAbgesehen von der Ethikfrage sollte es im Interesse der Allgemeinheit liegen, bestimmte Sicherheitsmaßnahmen zu umgehen."
 grand_archive.2445.desc.gestalt: "$grand_archive.2445.desc.common$ Die Tests sind allerdings sehr zeitaufwendig, vor allem deshalb, weil man einen ständigen Nachschub an nicht zugewiesenen [root.GetIndividualNamePlural] braucht, an denen die Tests durchgeführt werden können. Könnte man [root.GetIndividualNamePlural] einfach neu zuweisen, um an den Tests teilzunehmen, könnten wir deutlich schneller ein Heilmittel entwickeln.\n\nDie Folgen davon würden sicherlich an anderer Stelle im Kollektiv zu spüren sein, da die neu zugewiesenen Drohnen an ihren früheren Arbeitsplätzen fehlen."
 grand_archive.2445.a.default: "Nehmt nichts ahnende [owner_main_species.GetNamePlural] für die Tests."
 grand_archive.2445.a.gestalt: "Gebt den Tests Vorrang."
 grand_archive.2445.b.default: "Testet es nur an Freiwilligen."
 grand_archive.2445.b.gestalt: "Fahrt einfach wie gewohnt mit der Forschung fort."
 grand_archive.2445.c: "Keine unethischen Tests."
 grand_archive.2450.name: "Leerenwurm-Drüsen"
 grand_archive.2450.desc: "Wir haben ein Muster im Reproduktionszyklus der Leerenwürmer entdeckt, das uns zu einem Durchbruch in der Synthetisierung eines Heilmittels gegen die Leerenwurm-Plage verhelfen könnte.\n\nUm diese Hypothese zu bestätigen, braucht unser Forschungsteam die Reproduktionsdrüsen einer wilden $voidworms_titan$. Entscheidend ist jedoch, dass diese $voidworms_titan$ getötet werden muss, während sie einen Planeten bombardiert, um aktive Reproduktionszellen ernten zu können."
 grand_archive.2450.a: "Dafür haben wir keine Zeit."
 grand_archive.2450.b: "Ihr werdet Eure Drüsen bekommen."
 VOIDWORM_GLANDS_PROJECT: "Reproduktionsdrüsen einer Troika"
 VOIDWORM_GLANDS_PROJECT_DESC: "Wir haben einen Durchbruch bei der Erforschung eines Heilmittels gegen die Leerenwurm-Plage erzielt. Alles, was wir noch brauchen, sind die Reproduktionsdrüsen einer Leerenwurm-Troika, die in einem aktiven Furchtbarkeitszustand ist."
 VOIDWORM_GLANDS_PROJECT_TOOLTIP: "§RErntet die Überreste einer Troika, die aktiv dabei ist, einen Planeten zu bombardieren.§!"
 VOIDWORM_TITAN_DEBRIS_PROJECT: "Überreste einer Troika"
 VOIDWORM_TITAN_DEBRIS_PROJECT_DESC: "Die Überreste einer Leerenwurm-Troika können für ihre Reproduktionsdrüsen abgeerntet werden.\n\nDiese Organe werden unser Verständnis der Biologie dieser Kreaturen erweitern und uns dabei helfen, die Leerenwurm-Plage ein für alle Mal auszurotten."
 grand_archive.2455.name: "Drüsen geborgen"
 grand_archive.2455.desc: "Die von der fruchtbaren Leerenwurm-Troika geernteten Drüsen enthüllten neue Informationen über ihren Reproduktionszyklus.\n\nIn einem Paarungsritual, das bis zum Tod andauert, teilen die drei sich fortpflanzenden Leerwürmer ihr genetisches Material gleichmäßig untereinander auf und werden so zu einem völlig neuen Organismus.\n\nWir können diesen Prozess der genetischen Umformung gegen sie einsetzen."
 grand_archive.2500.name: "Heilmittel entdeckt"
 grand_archive.2500.desc.default: "Wir haben die Entwicklung des ultimativen Heilmittels gegen die parasitäre Infektion eines Leerenwurms abgeschlossen. Unsere Kolonien sind nicht länger anfällig für ihre Sporenbombardierung und wir müssen uns nicht länger um ihre Anwesenheit in der Galaxie Sorgen machen."
 grand_archive.2500.desc.tech: "$grand_archive.2500.desc.default$\n\nWir sind uns sicher, dass das von uns entwickelte Heilmittel diesmal auch vor künftigen Mutationen in ihrer Biologie schützt."
