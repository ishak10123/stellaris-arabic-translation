 space_amoeba_UNIQUE_MUTATION_PROJECT: "Mutationsprojekt für Weltraumamöben"
 space_amoeba_UNIQUE_MUTATION_PROJECT_DESC: "Während unserer Übungsmanöver für frisch geklonte Organismen setzte eine verletzte Weltraumamöbe eine neuartige Technik ein, um ihren Feind zu besiegen. Die Geißeln der Amöbe saugten Nährstoffe und andere Materialien aus ihrem Trainingspartner ab und flickten damit Löcher in ihrer eigenen Panzerung, um ihre Kampfkraft wiederherzustellen.\n\nDieses Phänomen genauer zu erforschen, könnte uns neue Anhaltspunkte über die Weltraumamöben-Biologie geben, die sich zur Entwicklung einer neuen speziesexklusiven Mutation nutzen ließen."
 tiyanki_UNIQUE_MUTATION_PROJECT: "Mutationsprojekt für Tiyanki"
 tiyanki_UNIQUE_MUTATION_PROJECT_DESC: "Eine kürzlich geklonte Tiyanki-Flotte wurde dabei beobachtet, wie sie durch eine wiederholte Reihe komplexer Laute miteinander kommunizierte. Die kaum wahrnehmbaren Laute scheinen anderen Lebewesen in der Nähe Trost und Ruhe zu spenden.\n\nDieses Phänomen genauer zu erforschen, könnte uns neue Elemente der Tiyanki-Biologie offenbaren, die sich zur Entwicklung einer neuen speziesexklusiven Mutation nutzen ließen."
 voidworm_UNIQUE_MUTATION_PROJECT: "Mutationsprojekt für Leerenwürmer"
 voidworm_UNIQUE_MUTATION_PROJECT_DESC: "Wir haben bemerkt, dass einige unserer Leerenwürmer beim Erreichen des Erwachsenenalters kleine zystenartige Auswüchse entwickeln. Eine nähere Untersuchung ergab, dass Exemplare mit diesen unansehnlichen Geschwülsten fruchtbarer als andere Artgenossen sind.\n\nDieses Phänomen genauer zu erforschen, könnte uns neue Elemente der Leerenwurm-Biologie offenbaren, die sich zur Entwicklung einer neuen speziesexklusiven Mutation nutzen ließen."
 cutholoid_UNIQUE_MUTATION_PROJECT: "Mutationsprojekt für Cutholoide"
 cutholoid_UNIQUE_MUTATION_PROJECT_DESC: "Als Folge einer Überfütterung wurde einer unserer geklonten Cutholoiden dabei beobachtet, wie er den Inhalt seines Magens ausstieß. Die hervorkommende Verdauungsflüssigkeit bildete ein stark konzentriertes Projektil, das sich als äußerst tödlich erwies und seine radioaktiven Eigenschaften für längere Zeit außerhalb des Körpers der Kreatur beibehielt.\n\nDieses Phänomen genauer zu erforschen, könnte uns neue Elemente der Cutholoiden-Biologie offenbaren, die sich zur Entwicklung einer neuen speziesexklusiven Mutation nutzen ließen."
 crystalline_entity_UNIQUE_MUTATION_PROJECT: "Mutationsprojekt für Kristallwesen"
 crystalline_entity_UNIQUE_MUTATION_PROJECT_DESC: "Während einer Kampfübung teilte sich eine Reihe unserer Kristallwesen perfekt in zwei Hälften, nachdem sie vernichtet wurden. Diese Bruchstücke lebten noch für kurze Zeit weiter und waren voll funktionsfähig."
 tiyanki_matriarch_UNIQUE_MUTATION_PROJECT: "Mutationsprojekt für $NAME_Elderly_Tiyanki$en"
 tiyanki_matriarch_UNIQUE_MUTATION_PROJECT_DESC: "Das genetische Material, das wir von einer $NAME_Elderly_Tiyanki$ gewonnen haben, hat uns einzigartige Einblicke verschafft. Wir können diese in experimentellen Mutationsprojekten erforschen und so Mutationen entwickeln, die sich auf jede Art von Weltraumfauna anwenden lassen."
 voidspawn_UNIQUE_MUTATION_PROJECT: "Mutationsprojekt für Todesbrut"
 voidspawn_UNIQUE_MUTATION_PROJECT_DESC: "Das genetische Material, das wir von einer $NAME_Voidspawn$ gewonnen haben, hat uns einzigartige Einblicke verschafft. Wir können diese in experimentellen Mutationsprojekten erforschen und so Mutationen entwickeln, die sich auf jede Art von Weltraumfauna anwenden lassen."
 unique_mutation_project_unlock_desc: "Unsere Bemühungen zum Klonen von [From.GetShipCategoryName] haben einen genetischen Durchbruch erzielt. Es sollte möglich sein, die Anatomie dieser Kreaturen zu verschmelzen, um eine einzigartige Mutation zu schaffen."
