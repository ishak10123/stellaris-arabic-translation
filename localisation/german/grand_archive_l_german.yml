 feature_unlock_gravity_snares: "Gravitationsfallen"
 feature_unlock_gravity_snares_desc: "Gravitationsfallen erlauben es, §YWeltraumfauna§! unbeschadet zu fangen und zu transportieren. Sollte bereits ein §Y$grand_archive$§! gebaut worden sein, werden gefangene Kreaturen direkt im Vivarium untergebracht."
 feature_unlock_containment_vessels: "Eindämmungsfeld"
 feature_unlock_containment_vessels_desc: "Gravitationsfallen können die doppelte Menge an §YWeltraumfauna§! einfangen"
 gravity_snare: "Gravitationsfalle"
 gravity_snare_plural: "Gravitationsfallen"
 NAME_GravitySnare: "$gravity_snare$"
 FLEETORDER_SEND_SNARE_NAME: "$NAME$ starten"
 FLEETORDER_SEND_SNARE_ON_COOLDOWN: "§R$TRIGGER_FAIL$ Die Gravitationsfallen haben noch §Y[This.GetGravitySnareCooldownForFleet] Tag(e)§! Abklingzeit.§!"
 FLEETORDER_GRAVITY_SNARE_NO_COMMUNICATIONS: "§R$TRIGGER_FAIL$ Wir besitzen unzureichende Informationen über diese Weltraumfauna und können sie deshalb nicht fangen.§!"
 FLEETORDER_MUST_BE_SPACE_CRITTER: "§R$TRIGGER_FAIL$ Wir sind nicht in der Lage, diese Art von Weltraumfauna einzufangen.§!"
 GRAVITY_SNARE_CAPTURE_CHANCE_LEADER: "Anführerstufe: $VALUE|G%0$"
 FLEETORDER_CAPTURE_SPACE_CRITTER: "Fängt Weltraumfauna"
 FLEETORDER_CAPTURE_SPACE_CRITTER_PROGRESS: "Fängt Weltraumfauna: $PROGRESS|Y%0$"
 FLEETORDER_WAIT_FOR_GRAVITY_SNARE_TO_RELOAD: "Lädt die §YGravitationsfalle§! nach: $DAYS|Y$ Tag(e)"
 SNARE_SPEED: "Fanggeschwindigkeit: $SPEED$"
 CAPTURE_CHANCE: "Fangchance: $VALUE|Y%0$"
 CAPTURE_AMOUNT: "Mit einer einzelnen §Y$gravity_snare$§! können wir bis zu $VALUE|0G$ §YWeltraumfauna§! gleichzeitig einfangen."
 CAPTURE_AMOUNT_FULL_FLEET: "Mit einer einzelnen §Y$gravity_snare$§! können wir eine gesamte Flotte §YWeltraumfauna§! einfangen."
 GRAVITY_SNARE_1: "$gravity_snare$"
 GRAVITY_SNARE_STANDARD: "$gravity_snare$"
 GRAVITY_SNARE_STANDARD_TOOLTIP: "Gravitationsfallen sind in der Lage, eine lokal begrenzte Quantengravitation aufrechtzuerhalten, was jedes bekannte Objekt ohne Hyperantrieb am Entkommen hindert. Dieses Quantengravitationsfeld kann lange genug aufrechterhalten werden, um die §YWeltraumfauna§! einzufangen und zur weiteren Analyse in unsere Systeme zu bringen."
