 tech_voidworm_immunity_desc: "Wir können ein Heilmittel gegen die parasitäre Infektion mit Leerenwürmern entwickeln. Alle unsere Kolonien wären damit immun gegen ihren Sporenbeschuss."
 tech_voidworm_immunity_effect: "Kolonien sind immun gegen die Leerenwurm-Bombardierung.\n$mod_damage_vs_country_type_voidworms_mult$: §G+$@vaccine_damage_vs_country_type_voidworms_mult|0%$§!"
 tech_voidworm_immunity_effect_during_situation: "§RWährend der Leerenwurm-Plage ist jegliche Bombardierungsimmunität ineffektiv.§!\n$mod_damage_vs_country_type_voidworms_mult$: §G+$@vaccine_damage_vs_country_type_voidworms_mult|0%$§!\nDie Situation \"§Y$situation_voidworm_plague$§!\" schreitet um §G+$@vaccine_situation_advancement|0$§! voran"
