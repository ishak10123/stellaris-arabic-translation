 #Treasure Troves #
 ###################
 TREASURE_TROVE: "Schatztresor"
 TREASURE_TROVE_DESC: "Im [this.GetName]-System wurde ein §Y$TREASURE_TROVE$§! gefunden, den wir einem Piraten zuordnen, der vor langer Zeit lebte. Wer weiß, welche Reichtümer er birgt?"
 treasure_troves_chain_title: "Schatztresore"
 treasure_troves_chain_desc: "Über die gesamte Geschichte unserer Galaxie hinweg haben Piraten ihre Beute in sorgfältig angelegten Schatztresoren versteckt. Viele dieser Geheimverstecke wurden aufgegeben und galten als verschollen, doch nun warten sie nur darauf, dass wir sie uns holen."
 mod_treasure_trove_reward_mult: "Schatztresor-Belohnungen"
 grand_archive.6010.name: "$TREASURE_TROVE$ entdeckt"
 grand_archive.6010.desc: "Wir haben ein schwaches Signal auf [event_target:treasure_trove_planet.GetName] entdeckt. Aufgrund der rudimentären Kryptographie glauben wir, dass es sich dabei um den §Y$TREASURE_TROVE$§! eines Piraten handelt, der vor langer Zeit die Galaxie unsicher machte.\n\nEs wird vermutlich eine Zeit dauern, aber wir sind zuversichtlich, dass wir die Geheimnisse dahinter lüften können."
 grand_archive.6010.a: "Lokalisiert den genauen Standort."
 grand_archive.6015.name: "Schatz geborgen"
 grand_archive.6015.common.1: "Nachdem wir vorsichtig das Verteidigungssystem des von dem Piraten auf [event_target:treasure_trove_planet.GetName] verborgenen §Y$TREASURE_TROVE$s§! entschärft hatten"
 grand_archive.6015.desc: "$grand_archive.6015.common.1$, fanden wir einen Raum voller Ressourcen vor.\n\nWir werden diesen unerwarteten Reichtum klug nutzen."
 grand_archive.6015.desc.specimen: "$grand_archive.6015.common.1$, entdeckten wir ein uraltes Piratenartefakt, das luftdicht in einem Behälter versiegelt war. Wir werden dieses Stück Piratengeschichte unserer Sammlung hinzufügen."
 grand_archive.6015.desc.specimen_extra: "In dem riesigen §Y$TREASURE_TROVE$§! fanden wir auch ein uraltes Piratenartefakt. Nach der Restaurierung wird dieses Stück Piratengeschichte eine hervorragende Ergänzung für unsere Sammlung sein."
 grand_archive.6015.desc.pirate_ship: "Nachdem wir vorsichtig das Verteidigungssystem des §Y$TREASURE_TROVE$s§! entschärft hatten, entdeckten wir analoge Richtungsangaben, die uns zu einem bestimmten Punkt auf dem Planeten führten. Als wir dort ankamen, begrüßte uns ein riesiges Piratenschiff, das hinter einem Tarnfeld verborgen lag.\n\nDas Schiff mit dem Namen \"[treasure_trove_pirate_ship.GetName]\" wurde von uns übernommen und unserer Militärflotte hinzugefügt."
 grand_archive.6015.desc.tech: "$grand_archive.6015.common.1$, fanden wir eine Datenbank voll seltener und wertvoller Forschungsberichte.\n\nWir wissen nicht, wie diese Berichte zusammengetragen wurden, aber wir können sie gut in unserer Forschung einsetzen."
 grand_archive.6015.a: "$GOOD$"
 treasure_trove_specimen_tt: "$t$Ihr bergt ein ['concept_specimen']."
 treasure_trove_pirate_ship_tt: "$t$Ihr bergt ein bewaffnetes Piratenschiff."
