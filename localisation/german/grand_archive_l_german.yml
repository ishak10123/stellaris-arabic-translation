 grand_archive.5015.name: "Einrichtung des Schatztresors"
 grand_archive.5015.desc: "Die §Y$celestial_chart$§! enthält archivierte Bewertungsinformationen, die uns helfen, den Wert der von uns entdeckten Schätze zu erhöhen. Wir sollten einen §YSchatztresor§! auf einem unserer Planeten errichten, um die wertvollen Schätze zu sortieren, zu restaurieren und aufzubewahren. Angesichts unserer derzeitigen Logistik eignen sich die folgenden Planeten für diese neue Anlage und wir müssen nur entscheiden, welchen davon wir am geeignetsten finden."
 grand_archive.5015.a: "Errichtet den $d_treasure_planet$ auf §Y[event_target:treasure_planet_candidate_1.GetName]§!."
