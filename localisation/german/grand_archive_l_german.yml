 ######################################
 CURATORS_DESIGNATION: "Wir haben"
 DEAD_CURATORS_DESIGNATION: "Wir, die letzten Überreste unseres Ordens, haben"
 grand_archive.4121.name: "$leviathans.500.name$"
 grand_archive.4121.desc.common: "haben Informationen darüber erhalten, dass Ihr ein §Y$grand_archive$§! errichtet habt, das in der Lage ist, zahlreiche Exponate aufzunehmen. Wir begrüßen diese Initiative, die Geschichte unserer Galaxie zu bewahren und mit allen zu teilen, die auf der Suche nach diesem Wissen sind.\n\nWir sind sehr daran interessiert, Euch bei diesem Unterfangen zu unterstützen."
 grand_archive.4121.desc.default: "Wir $grand_archive.4121.desc.common$ Erweitert Eure §YSammlung§! und wir werden Euch im Gegenzug unsere Unterstützung anbieten, wo immer wir können."
 grand_archive.4121.desc.dead: "Die letzten Überreste unseres Ordens $grand_archive.4121.desc.common$ Auch wenn unser Orden vor Kurzem stark dezimiert wurde, werden wir unsere verbleibenden Mittel einsetzen, um Euch bei der Erweiterung Eurer §YSammlung§! zu unterstützen."
 leviathans.4100.desc: "Aber gewiss!\n\nEure Bemühungen sind uns nicht entgangen. Basierend auf Eurer derzeitigen §YSammlung§! können wir Euch, gegen eine kleine Spende, die folgende Unterstützung bieten."
 leviathans.4100.a: "Erzählt uns mehr über"
 leviathans.4100.a.aesthetic_wonder: "$leviathans.4100.a$ \"§Y$EXHIBITION_AESTHETIC_WONDERS$§!\""
 leviathans.4100.a.historical_item: "$leviathans.4100.a$ die \"§Y$EXHIBITION_GALACTIC_HISTORY$§!\""
 leviathans.4100.a.xeno_geology: "$leviathans.4100.a$ die \"§Y$EXHIBITION_XENO_GEOLOGY$§!\""
 leviathans.4100.tooltip.no_pending_reward: "Ihr müsst Eure Sammlung erweitern, um weitere Unterstützung von den Kuratoren zu erhalten."
 leviathans.4100.tooltip.no_reward: "Ihr habt bereits jede Unterstützung angefordert, die es für"
 leviathans.4100.tooltip.no_reward.aesthetic_wonder: "$leviathans.4100.tooltip.no_reward$ \"$EXHIBITION_AESTHETIC_WONDERS$\" gibt"
 leviathans.4100.tooltip.no_reward.historical_item: "$leviathans.4100.tooltip.no_reward$ die \"$EXHIBITION_GALACTIC_HISTORY$\" gibt"
 leviathans.4100.tooltip.no_reward.xeno_geology: "$leviathans.4100.tooltip.no_reward$ die \"$EXHIBITION_XENO_GEOLOGY$\" gibt"
 leviathans.4105.desc: "Aber natürlich.\n\nWorüber würdet Ihr gern mehr erfahren?"
 leviathans.4105.a: "Wir würden gern an Eurem Wissen in bestimmten Bereichen teilhaben."
 leviathans.4105.b.common: "Wir möchten gern Pläne für"
 leviathans.4105.b.aesthetic_wonder: "$leviathans.4105.b.common$ ein Museum für \"§Y$EXHIBITION_AESTHETIC_WONDERS$§!\" erwerben."
 leviathans.4105.b.historical_item: "$leviathans.4105.b.common$ ein Museum für die \"§Y$EXHIBITION_GALACTIC_HISTORY$§!\" erwerben."
 leviathans.4105.b.xeno_geology: "$leviathans.4105.b.common$ ein Museum für die \"§Y$EXHIBITION_XENO_GEOLOGY$§!\" erwerben."
 leviathans.4105.c: "Wir möchten ein §YRelikt§! kaufen."
 leviathans.506.g: "Wie könnt Ihr uns noch bei unserer §YSammlung§! unterstützen?"
 leviathans.4110.desc: "Wir können Euch unser Fachwissen nur in einem Bereich anbieten. Wir sind nur wenige und die Galaxie ist groß.\n\nWobei benötigt Ihr am meisten Hilfe?"
 leviathans.4111.desc: "$leviathans.4110.desc$"
 leviathans.4112.desc: "$leviathans.4110.desc$"
 leviathans.4115.desc: "Wir möchten Euch gern einen Gegenstand aus unserer privaten Sammlung anvertrauen.\n\nDa dies jedoch keine Kleinigkeit ist, erwarten wir im Gegenzug eine beachtliche Spende."
 leviathans.4116.desc: "$leviathans.4115.desc$"
 leviathans.4117.desc: "$leviathans.4115.desc$"
 REWARD_NOT_AVAILABLE: "Diese Belohnung ist noch nicht verfügbar."
