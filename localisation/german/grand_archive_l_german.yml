 grand_archive.4510.desc.common: "Wir haben das $grand_archive$, das [from.GetName] im [fromfrom.GetName]-System gebaut hatte, zerstört."
 grand_archive.4510.stolen: "Wir konnten einige der in ihm befindlichen Exemplare bergen."
 grand_archive.4510.ancrel: "Wir konnten eine kleine Menge $r_minor_artifacts$ aus den Trümmern bergen."
 grand_archive.4510.nothing: "Bedauerlicherweise blieb nichts von Wert übrig."
 grand_archive.4510.freed: "Zusätzlich dazu scheint sich eine kleine Zahl Weltraumfauna befreit zu haben, die zuvor im Vivarium gehalten wurde. Diese könnte von ihrer plötzlichen Freiheit möglicherweise verwirrt und aggressiv sein."
