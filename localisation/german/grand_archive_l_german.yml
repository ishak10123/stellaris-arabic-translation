 pirate.1.desc.black_needle: "Es ist davon auszugesehen, dass die §Y$NAME_BlackNeedle$§!-Piraten andere zu diesen illegalen Aktivitäten getrieben haben und diese opportunistischen Freibeuter möglicherweise sogar unterstützen."
 pirate.2.k: "Niederträchtige Hunde!"
 pirate.25.desc.black_needle: "Zusätzlich dazu fanden wir ein Lager, das Wertgegenstände von ehemaligen Mitgliedern der §Y$NAME_BlackNeedle$§!-Piraten enthält."
 #Events
 grand_archive.8000.name: "Uralte Kapsel"
 grand_archive.8000.desc: "Wir haben einen Durchbruch bei jener uralten Kapsel erzielt, die in der Umlaufbahn von [this.GetHomeWorldName] gefunden wurde. Dank der unermüdlichen Bemühungen unserer [this.GetScientistPlural] sind wir nun in der Lage, auch den Rest des Sicherheitssystems zu deaktivieren und jene Karte zu entziffern, die uns schon so lange fasziniert."
 grand_archive.8000.a: "Welche Geheimnisse birgt sie wohl?"
 TREASURE_HUNTERS_ANCIENT_CAPSULE_PROJECT: "Analyse der uralten Kapsel"
 TREASURE_HUNTERS_ANCIENT_CAPSULE_PROJECT_DESC: "Eine erste Analyse der Karte, die wir in der Orbitalkapsel fanden, wies auf die Existenz mehrerer Himmelskörper hin, die jedoch nicht Teil unseres Heimatsystems sind. Es wird einige Zeit dauern, bis wir die genauen Koordinaten entschlüsseln konnten."
 grand_archive.8005.name: "Uralte Kapsel analysiert"
 grand_archive.8005.desc: "Die Karte ist nur teilweise vollständig!\n\nDie Daten aus der Orbitalkapsel sind lückenhaft und die von uns gefundene Karte ist nur ein Teil des Puzzles. Dennoch hat sie uns zumindest die Koordinaten eines bisher unbekannten Sternensystems offenbart. Was uns dort erwartet, ist ungewiss.\n\nDie Karte zeigt zudem eine Reihe von Durchbruchpunkten, die es uns erlauben sollten, das Ziel über Hyperraumrouten zu erreichen."
 grand_archive.8005.a.lom: "Alle an Deck!"
 grand_archive.8015.name: "Die Sternenkarte"
 grand_archive.8015.desc.common: "Unsere Schiffe stehen bereit, zum nächsten großen Abenteuer unserer Zivilisation aufzubrechen."
 grand_archive.8015.desc.default: "Die Bevölkerung von [this.GetHomeWorldName] ist von der gefundenen §Y$celestial_chart$§! hin und her gerissen. Die Karte liefert jedoch mehr Fragen als Antworten. Wo kam sie her? Wer schuf sie? Welchen Zweck hat sie? Und - was vielleicht am wichtigsten ist - wird sie uns in eine Falle locken?\n\n$grand_archive.8015.desc.common$"
 grand_archive.8015.desc.gestalt: "Die im Inneren der Kapsel gefundene Karte hat in unserer Gesellschaft große Aufmerksamkeit erregt. Da sich nun herausgestellt hat, dass es sich um nur ein Teil von vielen handelt, ist die Frage aufgekommen, wo sie uns hinführen mag und was wir dort vorfinden werden. Wir sind entschlossen, diese \"§Y$celestial_chart$§!\" zu vervollständigen.\n\n$grand_archive.8015.desc.common$"
 grand_archive.8015.a.default: "Auf ins Abenteuer!"
 grand_archive.8015.a.lom: "Andockklammern lösen!"
 grand_archive.8020.name: "Eine unerwartete Begegnung"
 grand_archive.8020.desc: "Wir sind auf eine schwer bewaffnete Flotte gestoßen, die unter einer uns unbekannten Flagge fliegt. Ihre Schiffe bilden zwar organisierte Formationen, sind aber nicht einheitlich gebaut. Viele sind mit kinetischen Abschussvorrichtungen ausgestattet, die aus Rollen mit dicken Kabeln, Karbonstahlhaken und Harpunen bestückt sind. Es gibt auch eine Reihe gepanzerter Schlepper mittig der Flotte. Wir können nur vermuten, dass diese Schiffe von einer Gruppe von Piraten oder Söldnern kontrolliert werden.\n\nWir empfangen eine Übertragung von ihrem Kommandoschiff."
 grand_archive.8020.a.lom: "Eine Verhandlung ..."
 grand_archive.8025.name: "$NAME_CaptainHoo$ von der $NAME_BlackNeedle$"
 grand_archive.8025.desc: "§HDieser herausstechende und hochmütige Kapitän täuscht Desinteresse vor, als er mit uns redet. Er behandelt uns die gesamte Zeit über von oben herab und weigert sich, unseren Blick zu erwidern. Scheinbar sind wir seiner vollen Aufmerksamkeit nicht würdig. Während er redet, gestikuliert er mit auf eine unfreiwillig komische Art und Weise mit den Federn.§!\n\nIhr habt den Weg der §Y$NAME_BlackNeedle$§!-Piraten gekreuzt. Ein Fehler Eurerseits!\n\nWir haben Gerüchte gehört, dass Eure kleine Gesellschaft dieses System erforschen würde. Ihr seid über eine Karte gestolpert, die eindeutig uns gehört. Übergebt sie uns, wenn Ihr leben wollt."
 grand_archive.8025.a: "Wer seid Ihr?"
 grand_archive.8025.a.reply: "Ich bin Hoo! Mein voller Name ist Glimarhoo Zelmendrion, doch Ihr könnt mich auch einfach §Y$NAME_CaptainHoo$§! nennen. Ich bin der Kapitän der Silberflügel und zweite Maat der illustren §Y$NAME_BlackNeedle$§!-Piraten. Unsere Federn sind seit Tausenden von Jahren in alle möglichen Geschäfte verwickelt und ich bin nur ein Faden im majestätischen Wandteppich unseres Erbes.\n\nIhr tätet gut daran, Euch meinen Namen zu merken. Mich erwartet eine beachtliche Belohnung, sobald ich unserem unvergleichlichen Oberhaupt diese Karte vorgelegt habe."
 grand_archive.8025.b: "Was wisst Ihr über die Karte?"
 grand_archive.8025.b.reply: "Ein talentierter, wenn auch sehr teurer Informationshändler hat uns darüber informiert, dass Ihr kürzlich über eine gewisse Kapsel gestolpert seid ... Eine Kapsel, die angeblich die Koordinaten eines verborgenen Systems enthält, welches von großem Interesse für uns ist.\n\nWir selbst besitzen ebenfalls einen Teil dieser Karte, doch ohne die Daten aus Eurer Kapsel ist diese nutzlos. Ich kann mir nicht erklären, warum §Y$NAME_CaptainNess$§! ausgerechnet Euch den Schlüssel zu ihrem Vermächtnis hinterlassen hat, aber es liegt an uns, ihn Euch abzunehmen."
 grand_archive.8025.c: "Warum wollt Ihr diese Karte so unbedingt haben?"
 grand_archive.8025.c.reply: "Seid Ihr wirklich so naiv? [this.GetCaptainHooSnarkyInsult] Muss ich es Euch etwa buchstabieren?\n\nEine Karte dient als eine Art Navigationshilfe zu einem bestimmten Ziel. Wir möchten dieses Ziel erreichen und damit den vor langer Zeit verloren gegangenen Schatz von §Y$NAME_CaptainNess$§! finden."
 grand_archive.8025.d: "Wer ist $NAME_CaptainNess$?"
 grand_archive.8025.d.reply: "Wir hätten gedacht, Ihr wärt besser informiert ... Sie ist diejenige, die diese Karte schuf. Vielleicht fand sie die Ignoranz Eurer Spezies belustigend?\n\nLetztlich geht Euch dies jedoch gar nichts an ... Übergebt uns die Informationen und wir werden die Sache von hier an übernehmen."
 grand_archive.8025.e: "Wir behalten die Karte!"
 grand_archive.8025.e.reply: "Damit hatte ich bereits gerechnet ... Bereitet Euch auf Euren Untergang vor!\n\nWir holen uns die Karte mit Gewalt!"
 grand_archive.8025.f.lom: "Dann kommt und holt sie Euch doch!"
 CAPTAIN_HOO_INSULT_MACHINE: "Ich dachte, eine Maschinenintelligenz wäre tatsächlich intelligent, aber anscheinend ist dies nicht der Fall."
 CAPTAIN_HOO_INSULT_HIVE: "Viele Bewusstseine erleichtern angeblich die Arbeit, doch Eure kollektive Intelligenz hat nur sehr wenig erreicht."
 CAPTAIN_HOO_INSULT_HUM: "Ihr glatthäutigen Dickschädel mögt das Geheimnis des interstellaren Reisens ergründet haben, doch die Vernunft ist dabei auf der Strecke geblieben."
 CAPTAIN_HOO_INSULT_MAM: "Kreaturen wie Ihr verfügen einfach nicht über den Intellekt und die Raffinesse unseres großen Oberhaupts."
 CAPTAIN_HOO_INSULT_REP: "Obwohl ich nie erwarten würde, dass Einfaltspinsel wie Ihr so grundlegende Konzepte wie dieses verstehen ..."
 CAPTAIN_HOO_INSULT_AVI: "Vielleicht haben Eure Vorfahren einen Schlag zu viel abbekommen ..."
 CAPTAIN_HOO_INSULT_ART: "Es überrascht mich nicht, dass die Fähigkeit, kritisch zu denken, das dicke Exoskelett Eurer Spezies nicht durchdrungen hat."
 CAPTAIN_HOO_INSULT_MOL: "Es ist eine Tatsache, dass Mollusken kein erkennbares Gehirn haben, und Eure Spezies ist der Beweis dafür."
 CAPTAIN_HOO_INSULT_FUN: "Ihr scheint ein paar Sporen zu wenig für einen ganzen Pilz zu sein."
 CAPTAIN_HOO_INSULT_PLANT: "Es wird immer offensichtlicher, warum Pflanzen auf den meisten Welten keine Intelligenz entwickelt haben."
 CAPTAIN_HOO_INSULT_LITHOID: "Eure Spezies ist buchstäblich dumm wie ein Stein."
 CAPTAIN_HOO_INSULT_NECROID: "Ihr müsst das sein, was von einer einst intelligenten Spezies übrig blieb."
 CAPTAIN_HOO_INSULT_AQUATIC: "Ihr seid eindeutig ein Fisch auf dem Trockenen."
 CAPTAIN_HOO_INSULT_TOX: "Ein Leben im Dreck hat Euch scheinbar den Verstand vernebelt."
 CAPTAIN_HOO_INSULT_ROBOT: "Anscheinend verbrauchen Eure Individualitätsmodule den Großteil Eurer Rechenleistung."
 CAPTAIN_HOO_INSULT_DEFAULT: "Offenbar stellt das Erlangen von Intelligenz die größte Herausforderung für Eure entstellte Spezies dar."
 grand_archive.8045.name: "$grand_archive.8025.name$"
 grand_archive.8045.desc: "Ihr wagt es, Euch über mich und die §Y$NAME_BlackNeedle$§!-Piraten lustig zu machen? Das wird Konsequenzen haben!\n\nWir werden Eure mangelnde Bereitschaft zur Zusammenarbeit nicht so schnell vergessen ... Die $NAME_BlackNeedle$-Piraten werden Euch mit allem entgegentreten, was sie aufzufahren haben. Eure erbärmliche Zivilisation wird unseren Zorn nicht überleben.\n\nWir werden Euch so lange verfolgen, bis die Karte uns gehört! Ich wünsche Euch noch eine angenehme Zeit. Ihr solltet sie nutzen ..."
 grand_archive.8045.a.lom: "Beim nächsten Mal weniger reden und mehr kämpfen!"
 TREASURE_HUNTERS_CHART_PIECE_2_PROJECT: "Ein achtgeteilter Planet"
 TREASURE_HUNTERS_CHART_PIECE_2_PROJECT_DESC: "Die §H$celestial_chart$§! führte uns zu einer zerborstenen Welt. Dort angekommen entdeckten wir einen unnatürlichen Tunnel, der in die größte Platte der Planetenkruste gebohrt wurde. Wir glauben, das nächste Stück unserer Karte liegt in diesem Tunnel verborgen, doch um es zu erreichen, müssen wir vorsichtig vorgehen.\n\nEin Konstruktionsschiff könnte die nötige Ausrüstung bauen, um dieses Stück zu extrahieren."
 grand_archive.8055.name: "Ausgrabung erfolgreich"
 grand_archive.8055.desc: "Eine Kapsel wurde zusammen mit einer Vielzahl Mineralien erfolgreich aus den umhertreibenden Trümmern des Planeten geborgen. Beim Öffnen entdeckten wir ein weiteres Stück der §Y$celestial_chart$§! sowie eine Auswahl einzigartiger kultureller Artefakte. Wir fanden auch eine Notiz, die in mehreren Sprachen verfasst wurde, um sie leichter übersetzen zu können.\n\n\"Das ist alles, was von der ytteritischen Heimatwelt $NAME_Soropegma$ übrig blieb. Die Ytteriten waren eine Zivilisation, die noch nicht die ÜL-Technologie erforscht hatte und durch einen tragischen Unfall ausgerottet wurde. Unwissend, welche Folgen unser Handeln haben würde, entfesselten wir versehentlich die zerstörerische Kraft eines gestohlenen Kolosses. Bitte bewahrt und respektiert ihr Andenken.\""
 TREASURE_HUNTERS_ANCIENT_CAPSULE_2_PROJECT: "Entschlüsselung des Kartenstücks"
 TREASURE_HUNTERS_ANCIENT_CAPSULE_2_PROJECT_DESC: "Wir haben eine Kapsel aus den Überresten eines zerborstenen Planeten geborgen und müssen nur noch die darin enthaltenen Navigationsdaten entschlüsseln. Dazu müssen wir unsere Datenbank bekannter Systeme mit den markierten Himmelskörpern abgleichen."
 grand_archive.8060.name: "Karte entschlüsselt"
 grand_archive.8060.desc: "Uns gelang es endlich, die mehrschichte Entschlüsselung zu knacken, und das Kartenteil fügte sich nahtlos an den Rest der §Y$celestial_chart$§! an. Dank der neuen Daten erhielten wir die Koordinaten zu einem weiteren neuen System. Unsere Reise geht weiter, doch wir sollten uns diesem unerforschten Gebiet des Weltraums mit äußerster Vorsicht nähern."
 grand_archive.8075.name: "Das Großarchiv"
 grand_archive.8075.desc: "Da sich jetzt ein §Y[This.GetLastAcquiredSpecimenName]§!-Exemplar in unserem Besitz befindet, haben unsere Wissenschaftler vorgeschlagen, ein §Y$grand_archive$§! zu bauen, um diesem Exemplar einen würdigen Platz zu bieten, an dem es ausgestellt werden kann. Dieses Bauwerk kann unsere Sammlung seltener Artefakte beherbergen und wird uns einen bedeutenden kulturellen und wissenschaftlichen Nutzen bringen. Eine frühzeitige Investition würde die Erforschung neuer Technologien ankurbeln, die für die Erhaltung und die Ausstellung der oft empfindlichen Weltraumfauna erforderlich sind.\n\nAußerdem wurde neben dem Ytteriten-Artefakt eine Blaupause entdeckt, die einen fortschrittlichen Entwurf für eine Vitrine mit innovativer atmosphärischer Überwachungstechnologie enthält. Die Weiterentwicklung dieser Idee würde die Aufbewahrungsmöglichkeiten des Archivs im Allgemeinen verbessern."
 grand_archive.8076.name: "Das Ytteriten-Exemplar"
 grand_archive.8076.desc: "Die verlorene Zivilisation der Ytteriten verdient eine eigene Ausstellung.\n\nGlücklicherweise wurde neben dem Ytteriten-Artefakt eine Blaupause entdeckt, die einen fortschrittlichen Entwurf für eine Vitrine mit innovativer atmosphärischer Überwachungstechnologie enthält. Die Weiterentwicklung dieser Idee würde die Aufbewahrungsmöglichkeiten des Archivs im Allgemeinen verbessern."
 grand_archive.8076.a: "Eine ausgezeichnete Gelegenheit."
 TREASURE_HUNTERS_EXHIBITION_PROJECT: "Blaupause für die Ausstellungsverbesserung"
 TREASURE_HUNTERS_EXHIBITION_PROJECT_DESC: "Neben dem Ytterit-Exemplar entdeckten wir auch einen fortschrittlichen Entwurf für eine komplexe Vitrine, die zu seiner Erhaltung beitragen sollte.\n\nIndem wir die in dieser Blaupause verwendeten Techniken weiter erforschen, treiben wir sicherlich unsere künftigen Bemühungen zur Aufbewahrung und Ausstellung anderer Exemplare voran."
 TREASURE_HUNTERS_EXHIBITION_PROJECT_TOOLTIP: "Weist ein §YKonstruktionsschiff§! an, ein §YGroßarchiv§! um einen Planeten herum zu errichten, der 2.500 oder mehr £pop£ §HBewohner§! hat.\nBenötigt: §H£society_research£$tech_galactic_archivism$§!"
 grand_archive.8080.name: "Ausstellungsverbesserung"
 grand_archive.8080.desc: "Nach sorgfältiger Analyse des Ytteriten-Bauplans haben wir eine fortschrittliche Eindämmungseinheit errichtet, um die Atmosphäre bis hinunter auf die atomare Ebene zu überwachen. Dies erlaubt es unseren Kuratoren, die atmosphärischen Anforderungen des empfindlichen Ytteriten-Exemplars im Blick zu behalten und Warnzeichen für einen möglichen Zerfall frühzeitig zu erkennen. Das Exemplar wird genau so bleiben, wie es ist, und zwar für immer.\n\nWir können diese Methode auch dazu verwenden, um die Lagerungsbedingungen für andere Objekte in unserer Sammlung weiter zu verbessern."
 TREASURE_HUNTERS_BUILD_GRAND_ARCHIVE: "Bau des Großarchivs"
 TREASURE_HUNTERS_BUILD_GRAND_ARCHIVE_DESC: "Während unserer Erforschung des Kosmos haben wir zahllose einzigartige Artefakte und kulturelle Kuriositäten zusammengetragen. Diese Exemplare werden unserem Volk als Inspiration dienen und unsere Ausstellung zum wichtigsten Bewahrer sämtlichen Wissens in der Galaxie machen.\n\nEin §H$grand_archive$§! würde diesen Zweck erfüllen."
 grand_archive.8090.name: "Eröffnung des Großarchivs"
 grand_archive.8090.desc: "Mit der heutigen Eröffnung des §YGroßarchivs§! im [fromfrom.GetName]-System ist ein bedeutender Tag für [this.GetName] angebrochen. Diese Ausstellung verschiedener Schätze, die aus der ganzen Galaxie zusammengetragen wurden, inspirieren zu weiteren Erkundungsexpeditionen und lehren uns etwas über unsere Vergangenheit."
 d_black_needle_base: "Verstecke Schwarznadel-Basis"
 d_black_needle_base_desc: "Eine verborgene Basis, die die Schwarznadel-Piraten nutzen, um zahlreiche illegale Geschäfte abzuwickeln und gestohlene Waren zu verstecken."
 d_abandoned_black_needle_base: "Aufgegebene Schwarznadel-Basis"
 d_abandoned_black_needle_base_desc: "Diese Basis wurde einst von den Schwarznadel-Piraten als Außenposten und sicherer Unterschlupf für gesuchte Verbrecher und gestohlene Waren genutzt."
 d_abandoned_black_needle_base_naval_cap: "Flottenkapazität von Soldaten-Jobs: §G+$@abandoned_black_needle_base_naval_cap_from_soldier_job|0$§!"
 d_abandoned_black_needle_base_naval_cap_short: "£mod_country_naval_cap_add£ durch £job_soldier£en-Jobs: §G+$@abandoned_black_needle_base_naval_cap_from_soldier_job|0$§!"
 black_needle_base_system_poi: "Der Sternenkarte folgen"
 black_needle_base_system_poi_desc: "Die §H$celestial_chart$§! hat ein verborgenes System offenbart. Dieses trägt den Namen \"[Prev.GetName]\". Wir müssen uns auf die Reise dorthin begeben und ergründen, was uns dort erwartet."
 grand_archive.8100.name: "Piratenunterschlupf entdeckt"
 grand_archive.8100.desc: "Wir haben eine verborgene Untergrundbasis auf [From.GetName] entdeckt, die das Zeichen der §YSchwarznadel§!-Piraten trägt. Wir glauben, es handelt sich hierbei um einen Außenposten, der nichts mit ihren anderen Operationen zu tun hat. Das nächste Stück der §Y$celestial_chart$§! muss hier gelagert sein, vermutlich unter all den anderen Reichtümern.\n\nWir können die Basis leicht vom Weltraum aus bombardieren, doch dies könnte den Schwarznadel-Piraten Zeit geben, Verstärkung zu rufen. Auf der anderen Seite könnten unsere Bodentruppen die Basis rascher erobern und ihnen keine Zeit lassen, auf unseren Angriff zu reagieren.\n\nEine heimlichere Vorgehensweise würde darin liegen, das Computersystem der Basis zu hacken und die $celestial_chart$ einfach zu stehlen."
 grand_archive.8100.a: "Wir müssen viele Punkte beachten."
 COLONIZATION_IMPOSSIBLE_DEFENDED_PLANET: "$TRIGGER_FAIL$§RDieser Planet wird stark verteidigt und kann nicht kolonisiert werden.§!"
 BLACK_NEEDLE_BASE_BOMBARD: "Schwarznadel-Basis bombardieren"
 BLACK_NEEDLE_BASE_BOMBARD_DESC: "Die Untergrundbasis auf [This.GetName] ist zwar gut vor einer Orbitalbombardierung geschützt, doch mit genügend Zeit und Feuerkraft kann unsere Flotte sie dennoch zerstören. Sobald die Basis neutralisiert wurde, können wir die Ruinen nach dem Stück der §H$celestial_chart$§! und anderen Wertgegenständen absuchen.\n\nUnsere für Gefechtstaktiken zuständigen Berater warnen davor, dass diese Vorgehensweise den Schwarznadel-Piraten genügend Zeit verschaffen könnte, um Verstärkung anzufordern."
 BLACK_NEEDLE_BASE_BOMBARD_REINFORCEMENTS_KILLED: "$BLACK_NEEDLE_BASE_BOMBARD$"
 BLACK_NEEDLE_BASE_BOMBARD_REINFORCEMENTS_KILLED_DESC: "$BLACK_NEEDLE_BASE_BOMBARD_DESC$"
 grand_archive.8103.name: "Gegenangriff der Schwarznadel-Piraten"
 grand_archive.8103.desc: "Wie erwartet haben die Schwarznadel-Piraten eine Flotte entsandt, um ihre Basis auf [FromFrom.GetName] zu verteidigen.\n\nWir werden uns mit diesen Schiffen befassen müssen, um das [FromFrom.System.GetName]-System zu sichern."
 grand_archive.8105.name: "In Schutt und Asche"
 grand_archive.8105.desc: "Nachdem wir den Piratenstützpunkt eine Weile lang aus dem Orbit bombardiert hatten, blieb schließlich nichts als Schutt und Asche übrig. Da die Bedrohung neutralisiert wurde, können wir nun einen Wissenschaftler entsenden, um die zerstörte Basis zu erkunden und das nächste Stück der §Y$celestial_chart$§! zu bergen."
 grand_archive.8105.a.custom_tooltip: "Die Schwarznadel-Basis wurde zerstört. §Y[FromFrom.GetName]§! kann jetzt sicher von uns erkundet werden."
 grand_archive.8105.a.lom: "Plündert alles von Wert!"
 project_type_research: "$RESEARCH$"
 project_type_bombardment: "Bombardierung"
 BLACK_NEEDLE_BASE_DEPLOY_ARMIES: "Angriff auf die Schwarznadel-Basis"
 BLACK_NEEDLE_BASE_DEPLOY_ARMIES_DESC: "Der unterirdische Stützpunkt auf [FromFrom.GetName] wird von einer beachtlichen Anzahl an Truppen und Sicherheitsdrohnen geschützt. Der Einsatz von Bodentruppen würde es uns erlauben, die Basis schnell zu überrennen, damit den §YSchwarznadel§!-Piraten keine Zeit zum Reagieren bleibt.\n\nSobald wir den Stützpunkt gesichert haben, können wir die Kartenkapsel und alle anderen Wertgegenstände, die die Piraten angehäuft haben, bergen."
 grand_archive.8110.name: "Verteidigung lahmgelegt"
 grand_archive.8110.desc: "Unsere Bodentruppen haben die Basis der §YSchwarznadel§!-Piraten übernommen und sichern derzeit die umliegenden Gebäude und Ressourcen. Da alle Bedrohungen neutralisiert wurden, können wir nun unsere Wissenschaftler entsenden, um das nächste Stück der §Y$celestial_chart$§! zu bergen."
 grand_archive.8110.a.custom_tooltip: "Die Bodentruppen der Schwarznadel-Piraten wurden neutralisiert. §Y[FromFromFrom.GetName]§! kann jetzt erforscht werden."
 grand_archive.8110.a.lom: "Zeit, die Beute aufzuteilen."
 BLACK_NEEDLE_BASE_HACK: "Hacken der Piraten"
 BLACK_NEEDLE_BASE_HACK_DESC: "Der übermäßige Gebrauch gestohlener und wiederverwerteter Technologie hat die Basis der Schwarznadel-Piraten anfällig für eine Infiltration gemacht. Ein einzelnes Forschungsschiff könnte das Netzwerk auf [FromFrom.GetName] vom Orbit aus hacken und sich als §YSchwarznadel§!-Frachter tarnen, der auf Befehl von Kapitän Hoo handelt. Dies könnte sie davon überzeugen, die Kartenkapsel ohne unnötiges Blutvergießen zu übergeben."
 grand_archive.8115.name: "Manöver erfolgreich"
 grand_archive.8115.desc.1: "Nach monatelanger Vorbereitung ist es Wissenschaftler[Leader.GetXInDE] [Leader.GetName] endlich gelungen, das Kommunikationsnetz zu infiltrieren und sich als §YSchwarznadel§!-Schiff auszugeben. Mit gefälschten Befehlen von Kapitän Hoo konnte [Leader.GetHeShe] den Befehlshaber der Basis dazu bringen, die Kapsel für einen Nottransfer vorzubereiten."
 grand_archive.8115.desc.slippery: "Wissenschaftler[Leader.GetXInDE] [Leader.GetName] landete [Leader.GetHerHis] Schiff so, dass sich [Leader.GetHerHis] Team schnell zurückziehen konnte, falls die Tarnung auffliegen sollte."
 grand_archive.8115.desc.charismatic: "Mit Charisma und etwas Charme schaffte es Wissenschaftler[Leader.GetXInDE] [Leader.GetName], schwierige Fragen zu vermeiden."
 grand_archive.8115.desc.psionic_organic: "Mit einer einfachen [Leader.Species.GetHandName]-Bewegung schaffte es Wissenschaftler[Leader.GetXInDE] [Leader.GetName], den Verdacht der Wachen zu zerstreuen."
 grand_archive.8115.desc.psionic_machine: "Dank [Leader.GetHerHis]er psionischen Kräfte war es für [Leader.GetName] ein Leichtes, den minderwertigen Verstand der Wachen zu manipulieren, um weiterem Verdacht vorzubeugen."
 grand_archive.8115.desc.2: "Die Kapsel konnte gesichert werden, ohne dass es Verletzte gab. Den Piraten ist noch nicht aufgegangen, dass wir sie überlistet haben."
 grand_archive.8115.a: "$EXCELLENT$"
 grand_archive.8120.name: "Auf frischer Tat ertappt"
 grand_archive.8120.desc: "Unglücklicherweise durchschaute eine der Wachen unseren Plan, als wir die Kapsel auf das Schiff luden, woraufhin ein kurzes Feuergefecht ausbrach. Die Kapsel konnte zwar erfolgreich geborgen werden, aber Wissenschaftler[Leader.GetXInDE] [Leader.GetName] wurde im Kreuzfeuer getötet."
 grand_archive.8120.a: "$TERRIBLE$"
 grand_archive.8125.name: "Piratenbasis aufgegeben"
 grand_archive.8125.common: "Nachdem wir ihre Schwachstellen aufgedeckt hatten, beschlossen die Piraten, ihre Basis auf [FromFromFromFrom.GetName] aufzugeben und mitsamt aller dort gelagerten Waren den Planeten zu evakuieren. Dieser bewohnbare Mond kann nun von uns kolonisiert werden."
 grand_archive.8125.desc.alive: "Die §YSchwarznadel§!-Piraten haben endlich bemerkt, dass sie hinters Licht geführt wurden, und sie haben die Schwachstellen in ihrem Sicherheitssystem entdeckt.\n\n$grand_archive.8125.common$"
 grand_archive.8125.desc.dead: "Kurz nach unserem knappen Entkommen aus der §YSchwarznadel§!-Festung wurde das volle Ausmaß unserer Infiltration aufgedeckt.\n\n$grand_archive.8125.common$"
 grand_archive.8125.a: "Eine logische Entscheidung."
 grand_archive.8125.a.custom_tooltip: "Die Armeen auf §Y[FromFromFromFrom.GetName]§! haben den Planeten verlassen. Er ist nun kolonisierbar."
 grand_archive.8130.name: "Plünderung der Schwarznadel-Basis"
 grand_archive.8130.desc.common: "Der Tresorraum enthielt eine Vielzahl von Wertgegenständen sowie andere sentimentale Schmuckstücke, die mit der Geschichte der Piratenorganisation in Verbindung standen. Wir fanden die Kartenkapsel zwischen gestohlenen Kunstwerken, persönlichem Schmuck und verschlüsselten digitalen Geldbörsen.\n\nWir vermuten, viele der hier gelagerten Waren wären nur schwer zu verkaufen. Die Kunstwerke haben einen hohen Wiedererkennungswert, der Schmuck müsste eingeschmolzen werden und Transaktionen mit digitalen Geldbörsen sind normalerweise rückverfolgbar. Einige der früheren Besitzer könnten schon lange tot sein, aber andere werden sicherlich noch immer danach suchen."
 grand_archive.8130.desc.bombarded: "Als wir die Ruinen der §YSchwarznadel§!-Basis erkundeten, fanden wir einen unterirdischen Tresor. Als wir ihn öffneten, entdeckten wir eine kleine Truhe, die voll unrechtmäßig erworbener Gegenstände war.\n\n$grand_archive.8130.desc.common$"
 grand_archive.8130.desc.landed: "Als wir die §YSchwarznadel§!-Basis durchsuchten, fanden wir eine Blaupause der Anlage, die auf einen Untergrundtresor hindeutete. In einem Dienstaufzug fuhren wir tief nach unten und gaben den Zugangscode ein, um eine kleine Schatztruhe mit unrechtmäßig erworbenen Wertgegenständen zu öffnen.\n\n$grand_archive.8130.desc.common$"
 grand_archive.8130.a: "Versucht, die Besitzer der gestohlenen Gegenstände ausfindig zu machen."
 grand_archive.8130.b: "Verkauft alles."
 grand_archive.8130.c.default: "Wir behalten die gestohlenen Gegenstände."
 grand_archive.8130.c.lom: "Wer es findet, der darf es behalten."
 black_needle_base_sold_stolen_items: "Verkaufte gestohlene Gegenstände aus der Schwarznadel-Basis"
 opinion_black_needle_base_repatriate_stolen_items: "Gab gestohlene Gegenstände zurück"
 opinion_black_needle_base_repatriate_stolen_items_tt: "§G+$@opinion_black_needle_base_repatriate_stolen_items_value|0$§! £opinion£ Meinung bei jedem Reich, das nicht auf die Vernichtung der Galaxie aus ist und mit dem wir uns nicht im Krieg befinden."
 DECODE_THIRD_MAP_PIECE: "Teil der Sternenkarte entschlüsseln"
 DECODE_THIRD_MAP_PIECE_DESC: "Dank der Kapsel, die wir aus der §YSchwarznadel§!-Basis geborgen haben, können wir die darin enthaltenen Daten entschlüsseln und neue Informationen über die §H$celestial_chart$§! erlangen."
 grand_archive.8135.name: "Karte entschlüsselt"
 grand_archive.8135.desc: "Es gelang uns, die vielschichtige digitale Verschlüsselung zu überwinden und neue Informationen in die §Y$celestial_chart$§! einzugliedern. Dies offenbarte uns noch ein weiteres Ziel, das es zu erforschen gilt, und die Karte scheint nun auch fast vollständig zu sein. Wir glauben, es fehlt nur noch ein Teil des Puzzles, und wir sind vorsichtig optimistisch, dass das Ende unserer Reise in Sicht ist.\n\nWährend die Navigationsdaten entschlüsselt wurden, wurde auch das Äußere der Kapsel untersucht. Die Festigkeit und Haltbarkeit war beispiellos. Sollten wir es schaffen, dieses Material zu replizieren, würde es unserer zukünftigen Forschung sicherlich viele neue Wege eröffnen."
 grand_archive.8135.a: "$GOOD$"
 d_hive_dwelling: "Behausung eines Schwarmbewusstseins"
 d_hive_dwelling_desc: "Eine abgelegene Siedlung, die vom Smeegibb-Kollektiv, den ehemaligen Crewmitgliedern von Kapitänin Ness, bewohnt wird."
 d_ruined_hive_dwelling: "Zerstörte Behausung eines Schwarmbewusstseins"
 d_ruined_hive_dwelling_desc: "Die zerstörte Siedlung des Smeegibb-Kollektivs, den ehemaligen Crewmitgliedern von Kapitänin Ness."
 COLONIZATION_IMPOSSIBLE_SMEEGIBB_PLANET: "§RDieser Planet gehört den $NAME_Smeegibb$.§!"
 grand_archive.8200.name: "Verborgene Siedlung"
 grand_archive.8200.desc.common_1: "Wir haben eine kleine Siedlung auf [FROM.GetName] entdeckt, die weniger als tausend empfindungsfähige Molluskuide beherbergt. Eine vorläufige biologische Analyse ihrer Spezies zeigt, dass sie die Fähigkeit aufweist, über den Subraum miteinander zu kommunizieren, was wiederum auf die Existenz eines Schwarmbewusstseins hindeutet. Abgesehen von dieser abgeschiedenen Siedlung gibt es auf dem Planeten keinerlei empfindungsfähiges Leben."
 grand_archive.8200.desc.common_2: "Wir wissen nicht, warum uns die §Y$celestial_chart$§! genau hierhin geführt hat. Weitere Untersuchungen sind angeraten."
 grand_archive.8200.desc: "$grand_archive.8200.desc.common_1$\n\n$grand_archive.8200.desc.common_2$"
 grand_archive.8200.desc.alt: "$grand_archive.8200.desc.common_1$\n\nVielleicht hat diese Spezies Informationen über diese \"§Y$NAME_CaptainNess$§!\", die wir noch nicht gehört haben.\n\n$grand_archive.8200.desc.common_2$"
 grand_archive.8205.desc.common_1: "§H$NAME_Smeegibb$, ein Knoten jenes Schwarmbewusstseins, das sich im [FROM.GetName]-System versteckt hält, zappelt vor Unbehagen und senkt den Blick, wenn man ihn anspricht. Es macht den Anschein, als wäre $NAME_Smeegibb$ Unterwürfigkeit gewöhnt.§!"
 grand_archive.8205.desc.common_2: "Unser Name ist $NAME_Smeegibb$. Wir sind neugierig, wie Ihr uns finden könnt. Dieses System ist seit Tausenden von Jahren vor den Blicken der Galaxie verborgen.\n\nNur die §YKapitänin§! weiß von diesem Ort. Ihr sucht was?"
 grand_archive.8205.desc.default: "$grand_archive.8205.desc.common_1$\n\nSmarak! Es ist doppeltlang, seit wir mit Einzelbewusstseinen sprechen.\n\n$grand_archive.8205.desc.common_2$"
 grand_archive.8205.desc.gestalt: "$grand_archive.8205.desc.common_1$\n\nSmarak! Es ist doppeltlang, seit wir mit einem anderem Gruppenbewusstsein reden.\n\n$grand_archive.8205.desc.common_2$"
 grand_archive.8205.a: "Was ist das für ein Ort?"
 grand_archive.8205.a.reply: "Smarak! Dieser Planet ist unsere Unterkunft. Wir leben hier doppeltsicher, fernab einer gewalttätigen Galaxie. Vor jetzt machen wir bei der Gewalt mit. Mord, Verbrechen, Piraterie: Wir machen alles. Jetzt nicht mehr. Wir pflegen unsere Hydrokulturen.\n\nVor damals sind wir Flüchtlinge. Niemand nimmt uns auf bis zur §YKapitänin§!. Sie rettet uns vor einem schlimmen Schicksal und erlaubt es uns, uns ihrer Mannschaft anzuschließen. Die Kapitänin gibt uns einen neuen Namen und im Gegenzug kümmern wir uns um das Schiff.\n\nWir sind verantwortlich für die Reinigung, das Kochen, die Munition, die Hydrokulturen und die Fracht. Wir arbeiten. Dann schließen wir uns dem Entertrupp an. Wir beschützen die Kapitänin, wenn sie Schätze stiehlt oder jemanden entführt. Wir verraten die Kapitänin niemals. Wir sind immer loyal."
 grand_archive.8205.b: "Was wisst Ihr über die §Y$celestial_chart$§!?"
 grand_archive.8205.b.reply: "Smarak! Wir wissen nichts von einer Karte. Wir bleiben immer nur in unserer Unterkunft. Wenn die §YKapitänin§! eine Karte macht, um Euch herzubringen, muss es einen Grund dafür geben ... Sie will uns helfen oder uns schaden. Wir sind uns da nie sicher. Die Kapitänin kann undurchschaubar sein.\n\nEinmal schickt sie uns eine Botschaft. Die Kapitänin sendet uns eine riesige Statue ihrer Lieblingsdrohne: der $NAME_Smeegibb$, an den sie sich erinnert und den sie vorher rettet. Die Statue ist imposant, aber wir wissen nicht, warum die Kapitänin sie uns schickt. Vielleicht will sie sich entschuldigen, aber sie schickt keine Erklärung mit."
 grand_archive.8205.c: "Erzählt uns mehr über diese §YKapitänin§!."
 grand_archive.8205.c.reply: "Smarak! Vor jetzt retten uns die §YKapitänin§!. Bevor sie unsere Mentorin und Anführerin ist. Sie bringt uns bei, uns um das Schiff zu kümmern. Sie sagt: \"$NAME_Smeegibb$, arbeite als Quartiermeister, Mechaniker und Arbeiter - du hast einen ausgezeichneten Wert.\"\n\nDie Kapitänin folgt zwei Geboten: \"Reichtum ist Unabhängigkeit\" und \"Man lebt, um ein Vermächtnis zu schaffen\". Gemeinsam jagen wir die Armen und die Reichen. Wir nehmen uns, was wir wollen, von der brutalen Galaxie.\n\nDoch dann ... ist die Kapitänin doppeltgierig und doppeltunvorsichtig. Sie opfert Crewmitglieder oder verrät sie für Beute. Die Kapitänin verliert alle außer $NAME_Smeegibb$. Wir sind immer loyal.\n\nSie zeigt uns, wie grausam die Galaxie ist. Jetzt ziehen wir es vor, weit weg von ihr zu bleiben."
 grand_archive.8205.d: "Warum hat Eure Karte uns hierhergeführt?"
 grand_archive.8205.d.reply: "Smarak! Wir sind uns nicht sicher, warum die §YKapitänin§! Euch hierherbringt. Sie sagt uns nie etwas.\n\nDa ist aber eine Idee. Es gibt einen Ort, wo die §YKapitänin§! und wir uns vor Kopfgeldhunden verstecken. Eine sichere Unterkunft. Vielleicht findet Ihr dort etwas."
 grand_archive.8210.name: "Sicheren Unterschlupf entdeckt"
 grand_archive.8210.desc: "$NAME_Smeegibb$, das Wesen, dem wir auf [from.GetName] begegneten, gab uns die Koordinaten eines verlassenen Unterschlupfs, den es in der Vergangenheit zusammen mit §Y$NAME_CaptainNess$§! benutzt hatte. Diesen Ort zu untersuchen, könnte uns zum nächsten Stück der §Y$celestial_chart$§! führen oder uns zumindest einen Hinweis darauf liefern, wo wir suchen müssen."
 grand_archive.8210.a: "Fangen wir mit dem Graben an!"
 smeegibb_digsite_poi: "Unterschlupf erkunden"
 smeegibb_digsite_poi_desc: "Diese Archäologische Stätte könnte den Schlüssel zum nächsten Stück der §H$celestial_chart$§! enthalten. Wir müssen den aufgegebenen Unterschlupf erkunden, wenn wir unsere Suche nach dem verlorenen $TREASURE_TROVE$ von §H$NAME_CaptainNess$§! fortsetzen wollen."
 NAME_Bemat_cruiser_inax_01: "Hebehr"
 #Treasure Hunters Origin - Smeegibb
 smeegibb_digsite: "Zerfallener Unterschlupf"
 smeegibb_digsite_desc: "In der eisigen Einöde von [fromfrom.planet.GetName] haben wir eine kleine Unterkunft entdeckt, die mit Lebenserhaltungssystemen und Wohnräumen ausgestattet ist. Das Bauwerk ist stark verfallen und wurde nach Jahrtausenden von Eisstürmen teilweise vergraben."
 grand_archive.8220.name: "Aufzeichnungen der Kapitänin"
 grand_archive.8220.desc: "Die von uns ausgegrabene Struktur weist Anzeichen dafür auf, dass sie in der Vergangenheit oft genutzt wurde, und sie besitzt alle Annehmlichkeiten, die man erwarten würde. Überall liegen verschiedene Gegenstände und Kuriositäten verstreut. In einem unordentlichen Stapel mit Papieren fanden wir einen Protokolleintrag, geschrieben von §Y$NAME_CaptainNess$§! höchstpersönlich.\n\n§L\"Wir haben einen weiteren Schatztransport der Perikaner geentert, doch diesmal haben sie auf uns gewartet. Es gab weitaus mehr Verteidigungsmaßnahmen, als mir lieb war, aber wir haben schon Schlimmeres erlebt. Eine anständige Ausbeute, doch das Tapico-Juwel entzieht sich uns weiterhin. Die Perikaner haben das Kopfgeld erneut erhöht und die Föderation hat sich eingeschaltet. Die Lage ist derzeit etwas angespannt. Vielleicht sollten wir uns eine Weile bedeckt halten.\"§!"
 grand_archive.8220.a: "Sucht weiter."
 grand_archive.8225.name: "Zeit totschlagen"
 grand_archive.8225.desc: "Die Ausgrabung brachte einen kleinen Vorrat an Wertgegenständen und einfache Sanitäranlagen zum Vorschein. Nachdem wir das Gebiet vollständig abgesucht hatten, konnten wir leider keine Hinweise auf die §Y$celestial_chart$§! finden.\n\nWir haben die überall verstreut liegenden Notizbücher und Papiere eingesammelt und hoffen, in den Logbucheinträgen von §Y$NAME_CaptainNess$§! weitere Hinweise zu finden.\n\n§L\"Die Zeit vergeht langsamer mit einem Partner wie $NAME_Smeegibb$ an seiner Seite, doch ist es es wirklich wert, den Ruhm zu teilen? Sicher, mit einem Schwarmbewusstsein zusammenzuarbeiten, hat gewisse Vorteile ... Es verschafft uns Zugang zu Hunderten von Drohnen und wir müssen trotzdem nur einen Anteil vom Gewinn abgeben ... Was für ein Geschäft! Doch vielleicht lenkt die Arbeit, die diese Drohnen leisten, von meinen eigenen Errungenschaften ab? Ich bin mir nicht sicher, ob ich mit dem Gedanken leben kann, mein Vermächtnis zu teilen. Darüber werde ich noch einmal nachdenken müssen.\"§!"
 grand_archive.8225.a: "$grand_archive.8220.a$"
 grand_archive.8230.name: "Etwas zu beweisen"
 grand_archive.8230.desc: "In einem Belüftungsschacht versteckt fanden wir den letzten Logbrucheintrag von §Y$NAME_CaptainNess$§!.\n\n§L\"Man soll sich nicht auf diese Art an mich erinnern. $NAME_Smeegibb$ war stets loyal, doch niemand soll behaupten, ich hätte ihn gebraucht. Ich stelle mich der Galaxie auch allein! Ich hinterlasse MEINE Spuren und der ganze Ruhm wird mir ALLEIN gehören. So wie auch der Reichtum.\n\nNotiz an mich selbst: Ich sollte $NAME_Smeegibb$ etwas schicken, was an mich erinnert.\"§!\n\nDas ist alles, was wir gefunden haben. Es gibt keine Spur zur Kapitänin selbst oder zur §Y$celestial_chart$§!.\n\nVielleicht ist in dem Geschenk, das $NAME_Smeegibb$ erhalten hat, ein Hinweis versteckt, der uns zum letzten Stück der Karte führen wird? Wir müssen erneut Kontakt zu dem Schwarmbewusstsein herstellen."
 grand_archive.8230.a: "Ausgrabung abgeschlossen."
 grand_archive.8236.name: "$NAME_Smeegibb$ wird vermisst"
 grand_archive.8236.desc.default: "$smeegibb_shelter_system_2_poi_desc$"
 grand_archive.8236.desc.xenophile: "$smeegibb_shelter_system_2_poi_desc$\n\nWir hoffen, unser neuer Freund ist in Sicherheit."
 grand_archive.8236.a: "Auf ins [smeegibb_system.GetName]-System"
 grand_archive.8241.name: "Rückkehr der $NAME_BlackNeedle$-Piraten"
 grand_archive.8241.desc: "Eine beachtliche Flotte, die unter der Flagge jener Piratenorganisation fliegt, die als §Y$NAME_BlackNeedle$§! bekannt ist, wurde im Orbit von [smeegibb_shelter.GetName] gesichtet. Wir glauben, diese Piraten sind uns bereits seit einiger Zeit gefolgt. Sie haben die Siedlung, die das Kollektiv mit dem Namen $NAME_Smeegibb$ einst bewohnte, dem Erdboden gleichgemacht. Sie müssen wohl noch immer nach dem nächsten Teil der §Y$celestial_chart$§! suchen.\n\nEs gibt keine Anzeichen von empfindungsfähigen Leben mehr auf dem Planeten.\n\nWir erhalten eine Übertragung von ihrem Kommandoschiff."
 grand_archive.8245.name: "$NAME_CaptainInax$ von den $NAME_BlackNeedle$-Piraten"
 grand_archive.8245.desc.inax.1: "§HVor uns steht ein großer Arthopoide. Die Facettenaugen leuchten hell auf, als er uns erblickt. Das disziplinierte Auftreten steht in starkem Widerspruch zu den sich ständig bewegenden Mandibeln, die unregelmäßige Klicklaute von sich geben.§!\n\n\"Endlich treffen wir uns also. Wie habt Ihr Weichhäute es geschafft, §YK-k-kapitän Hoo§! zu besiegen? Selbst dieser alte H-h-hartschaler sollte in der Lage sein, Eure erbärmliche Flotte mit Leichtigkeit zu besiegen. Ihr werdet dafür bezahlen"
 grand_archive.8245.desc.inax.2: "Dank-k-k-e, dass Ihr uns hierhergeführt habt. §Y$NAME_SilverQuill$§! hat diesen erbärmlichen $NAME_Smeegibb$ bereits seit mehr als hundert Zyklen gejagt. Diesen lang gehegten Groll zu beenden, bedeutet, dass ich ein großes Kopfgeld einstreichen kann ... sobald ich mit Euch fertig bin!"
 grand_archive.8245.desc.ransacked: "$grand_archive.8245.desc.inax.1$, dass Ihr unsere Basis auf [black_needle_base.GetName] gep-p-plündert habt.\n\n$grand_archive.8245.desc.inax.2$"
 grand_archive.8245.desc.stolen: "$grand_archive.8245.desc.inax.1$, dass Ihr die §YSch-sch-schwarznadel§! bestohlen habt!\n\n$grand_archive.8245.desc.inax.2$"
 grand_archive.8245.a: "Wer seid Ihr?"
 grand_archive.8245.a.reply: "N-n-nennt mich Inax, Flottenadmiral der §YSch-sch-schwarznadel§!.\n\nNun kennt Ihr den Namen jenes Wesens, das Euch t-t-töten wird. Ein ehrenvoller Tod. Ich rate Euch, ihn einfach anzunehmen.\n\nWie es B-b-brauch ist, dürft Ihr sogar den ersten Schuss abfeuern."
 grand_archive.8245.b: "Ihr habt $NAME_Smeegibb$ getötet ..."
 grand_archive.8245.b.reply.common: "Sie waren keine Herausforderung. Wir haben ihre jämmerliche Siedlung in blaues Mollusk-k-kuidenblut getränkt. Keine Flotte, keine Waffen. Hätten wir es nicht getan, wären sie früher oder später von jemand anderem p-p-plattgemacht worden. Niemand kommt der §YSch-sch-schwarznadel§! in die Quere und überlebt.\n\nSie waren Eure Freunde? Wie h-h-herzerwärmend. Ihr werdet sie schon bald wiedersehen. Im Namen von §Y$NAME_SilverQuill$§! werden wir"
 grand_archive.8245.b.reply.default: "$grand_archive.8245.b.reply.common$ diese Karte Euren noch zuckenden K-k-kadavern entreißen."
 grand_archive.8245.b.reply.robot: "$grand_archive.8245.b.reply.common$ zusehen, wie Euch das Licht a-a-ausgeht und Ihr sterbt."
 grand_archive.8245.c: "Wer ist $NAME_SilverQuill$?"
 grand_archive.8245.c.reply: "Wer ist §Y$NAME_SilverQuill$§!?! Was ist das für eine F-f-frage? Unser legendärer Gründer und Strippenzieher. Mit nur einem einzelnen Schiff baute er die §YSch-sch-schwarznadel§!-Piraten auf und entwickelte sie zu einem galaxieweiten Unternehmen.\n\nDie Sch-sch-schwarznadel führt sein Vermächtnis w-w-weiter. Euer Tod wird die nächste Note in unserer Symphonie werden."
 grand_archive.8245.d: "Warum wollt Ihr die $celestial_chart$?"
 grand_archive.8245.d.reply: "Wisst Ihr etwa nicht, was Ihr da habt? Dies ist die Karte zum Schatz von §YK-k-kapitänin Ness§!! Jeder C-c-credit und jedes Juwel, das sie zeit ihres Leben erbeutete.\n\nUnd dieser Reichtum gehört uns. Sobald wir ihn haben, wird man unsere Namen in die Geschichte singen. Jedes System wird die §YSch-sch-schwarznadel§! fürchten ... und die erste Note in unserer S-s-symphonie werdet Ihr sein. Ist das nicht großzügig?"
 grand_archive.8245.e: "So leicht geben wir nicht auf."
 grand_archive.8245.e.reply: "Dann lasst uns singen! Ich mache Eure [this.species.GetRemnantNamePlural] zu einer Trophäe und präsentiere sie meinem K-k-kommandanten als Geschenk."
 grand_archive.8265.name: "$grand_archive.8245.name$"
 grand_archive.8265.desc: "An diese Schlacht wird man sich erinnern! Ihr seid gar nicht so sch-sch-schwach, wie Ihr ausseht. Wir haben Euch bereits zweimal unterschätzt, doch dieser Fehler wird uns nicht erneut unterlaufen. Das nächste Mal, wenn wir auf Euch treffen, wird sich die §YSch-sch-schwarznadel§! nicht zurückhalten.\n\nFasst dies jedoch nicht als Warnung auf. Es ist ein Todesurteil."
 grand_archive.8265.a.scared: "Beunruhigend ..."
 grand_archive.8265.a.homicidal: "Versucht es doch!"
 grand_archive.8265.a.gestalt: "Kommunikation beendet."
 gateway_to_ness_treasure_system_poi: "X markiert den Punkt auf der Karte"
 gateway_to_ness_treasure_system_poi_desc: "Die §H$celestial_chart$§! ist vollständig und hat uns die Koordinaten zum letzten Ort, dem [Prev.GetName]-System, enthüllt. Unsere lange Suche neigt sich dem Ende zu. Begeben wir uns auf unsere letzte Reise, um zu entdecken, was uns dort erwartet."
 TREASURE_HUNTERS_CHART_PIECE_3_PROJECT: "Verborgene Kapsel"
 TREASURE_HUNTERS_CHART_PIECE_3_PROJECT_DESC: "Unsere Untersuchung hat ergeben, dass sich das nächste Stück der §H$celestial_chart$§! irgendwo in den Ruinen der Siedlung auf [this.GetName] befinden muss.\n\nAngesichts der robusten Bauweise der anderen Kapseln dürfen wir davon ausgehen, dass dieses Stück auch die jüngste Bombardierung überstanden hat."
 grand_archive.8270.name: "Das Geheimnis der Statue"
 grand_archive.8270.desc: "Unsere Suche nach dem vierten Stück der §Y$celestial_chart$§! auf [from.GetName] war erfolgreich. Die Kapsel wurde in einer Steinstatue entdeckt, die eine Drohne des ausgestorbenen Kollektivs mit dem Namen $NAME_Smeegibb$ darstellt. Die Inschrift der Statue liest sich wie folgt:\n\n§L\"An mein loyales Crewmitglied: Ein Zeichen meiner Wertschätzung. Möge Euer Leben in der Abgeschiedenheit lange und friedlich sein.\"§!\n\nSobald dieses letzte Stück der Karte entschlüsselt wurde, können wir nach dem Schatz von §Y$NAME_CaptainNess$§! suchen."
 TREASURE_HUNTERS_ANCIENT_CAPSULE_4_PROJECT: "Das letzte Kartenstück"
 TREASURE_HUNTERS_ANCIENT_CAPSULE_4_PROJECT_DESC: "Nachdem wir die Kapsel aus den Ruinen von $NAME_Smeegibb$s Siedlung geborgen haben, müssen wir nur noch die darin enthaltenen Daten entschlüsseln und die §H$celestial_chart$§! vervollständigen. Wir werden schon bald erfahren, was sich am Ende der Fährte von §H$NAME_CaptainNess$§! befindet."
 grand_archive.8280.name: "Karte vollständig"
 grand_archive.8280.desc: "Die Entschlüsselung des letzten Datenfragments hat unsere §Y$celestial_chart$§! vervollständigt. An verschiedenen Knotenpunkten leuchteten Lichter auf, die jene Zwischenziele anzeigten, die wir bereits entdeckt hatten. Anschließend leuchteten alle vier Lichter im Einklang, ehe sie ein weiteres verstecktes System enthüllten.\n\nDas letzte Stück der Karte hat das wahre Potenzial der §YKarte§! offenbart. Es handelt sich nicht nur um eine einfache Karte, sondern um einen Informationsspeicher, der Daten zu verlorenen Reichtümern und Schatzkammern voller Diebesgut enthält, die §Y$NAME_CaptainNess$§! während ihren Fahrten in der ganzen Galaxie zusammengetragen hat. Manche der Daten sind recht alt und die dortigen Schätze werden wahrscheinlich nicht mehr existieren, aber dennoch kann dieses Gerät möglicherweise Verstecke mit wertvollen Schätzen in all unseren Systemen aufspüren.\n\nWichtiger noch ist allerdings, dass die §YKarte§! Informationen über den Wert jedes Schatzes enthält, den die Kapitänin im Lauf ihrer Karriere entdeckt hatte. In diesen detaillierten Notizen wird erklärt, wie man erworbene Schätze identifiziert, schätzt und sie potenziellen Verkäufern präsentiert, um den maximalen Profit zu erzielen. Die Reaktivierung des Geräts wird uns auch die Blaupause für einen einzigartigen Schatztresor liefern, der es unseren Kolonien ermöglicht, von den unvergleichlichen Kenntnissen der Kapitänin zu profitieren, und der den Wert unserer Schätze erhöht."
 grand_archive.8280.a.lom: "Unermesslicher Reichtum."
 grand_archive.8285.name: "X markiert den Punkt auf der Karte"
 grand_archive.8285.desc: "Die Vervollständigung der §Y$celestial_chart$§! ist ein monumentales Ereignis für [this.GetName]. Wir haben alle Geheimnisse der Karte gelüftet und nur noch ein Ziel: das [gateway_to_ness_treasure_system.GetName]-System.\n\nAuf unserem Weg haben wir zahlreiche Hindernisse überwunden und sind nur noch einen Schritt vom Ziel entfernt. Doch was wird am Ende der §YKarte§! auf uns warten?\n\nEs gibt keine Garantie für einen Erfolg, doch anders würde es auch nur halb so viel Spaß machen. Brechen wir auf und bringen wir dieses Abenteuer zu seinem glorreichen Ende!"
 grand_archive.8285.a.default: "Macht weiter."
 grand_archive.8285.a.lom: "Aye, machen wir weiter!"
 councilor_head_treasure_hunter: "Oberster Schatzjäger"
 councilor_head_treasure_hunter_female: "Oberste Schatzjägerin"
 councilor_head_treasure_hunter_desc: "Der Oberste Schatzjäger hat die Aufgabe, die §Y$celestial_chart$§! sorgfältig zu analysieren, um verborgene Schätze und andere wertvolle Artefakte aufzuspüren."
 councilor_corporate_head_treasure_hunter: "$councilor_head_treasure_hunter$"
 councilor_corporate_head_treasure_hunter_female: "Oberste Schatzjägerin"
 councilor_corporate_head_treasure_hunter_desc: "$councilor_head_treasure_hunter_desc$"
 prospect_of_treasure_modifier: "Schatzsuche"
 prospect_of_treasure_modifier_tt: "Gibt §G+$@prospect_of_treasure_treasure_trove_reward|0%$§! $mod_treasure_trove_reward_mult$, §G+$@prospect_of_treasure_treasure_gatherers_produces|0%$§! $mod_planet_treasure_gatherers_produces_mult$ und §G+$@prospect_of_treasure_energy_produces|0$§! $mod_country_base_energy_produces_add$ pro $ruler$-Stufe:\n\n"
 grand_archive.8290.name: "Auf den Geschmack von Schätzen gekommen"
 grand_archive.8290.desc.chart: "Angesichts der Errichtung eines Schatztresors auf [from.GetName] hat die §Y$celestial_chart$§! das Potenzial, einen beachtlichen Teil unserer Wirtschaft zu tragen."
 grand_archive.8290.desc.trove: "Während wir die Ressourcen aus dem auf [from.GetName] entdeckten $TREASURE_TROVE$ umverteilen, ist klar geworden, dass die §Y$celestial_chart$§! das Potenzial hat, einen beachtlichen Teil unserer Wirtschaft zu tragen."
 grand_archive.8290.desc.default: "Um das Maximum aus der §YKarte§! herauszuholen, wurde ein neuer Ratsposten geschaffen, der die Aufgabe hat, unsere Bemühungen für das Entdecken und Sammeln von Schätzen zu steuern."
 grand_archive.8290.desc.gestalt: "Um das Maximum aus der §YKarte§! herauszuholen, haben wir Maßnahmen ergriffen, um mehr Ressourcen für die Entdeckung und das Sammeln von Schätzen bereitzustellen."
 grand_archive.8290.desc.chart.default: "$grand_archive.8290.desc.chart$\n\n$grand_archive.8290.desc.default$"
 grand_archive.8290.desc.chart.gestalt: "$grand_archive.8290.desc.chart$\n\n$grand_archive.8290.desc.gestalt$"
 grand_archive.8290.desc.trove.default: "$grand_archive.8290.desc.trove$\n\n$grand_archive.8290.desc.default$"
 grand_archive.8290.desc.trove.gestalt: "$grand_archive.8290.desc.trove$\n\n$grand_archive.8290.desc.gestalt$"
 grand_archive.8290.tt: "\n§EErlaubt das Freischalten von Ratsposten:§!\n§H$t$$councilor_head_treasure_hunter$§!\n$tt$$COUNCIL_POSITION_MODIFIER_BASE$\n$ttt$$mod_treasure_trove_reward_mult$: §G+$@councilor_head_treasure_hunter_treasure_trove_reward|0%$§!\n$ttt$$mod_planet_treasure_gatherers_produces_mult$: §G+$@councilor_head_treasure_hunter_treasure_gatherers_produces|0%$§!\n$ttt$$mod_country_base_energy_produces_add$: §G+$@councilor_head_treasure_hunter_energy_produces|0$§!\n$COUNCIL_POSITION_AVAILABLE_FOR$$t$$scientist_with_icon$ $commander_with_icon$"
 grand_archive.8300.name: "Wurmverseuchtes Sternentor"
 grand_archive.8300.desc.common: "Es muss dieses Tor sein, das uns zu unserem lang gesuchten Schatz führen wird."
 grand_archive.8300.desc.did_encounter_voidworms: "Die Karte hat uns zu einem nicht kartierten schwarzen Loch und einem System geführt, das voll $NAME_Voidworms$ ist. Die größten Exemplare haben sich in einem verfallenen Sternentor in der Nähe eingenistet und umkreisen die aufgegebene Weltraumkonstruktion.\n\n$grand_archive.8300.desc.common$ Wenn wir unserer Spur bis zum Ende folgen wollen, müssen wir die $NAME_Voidworms$ eliminieren und das Tor reparieren."
 grand_archive.8300.desc.didnt_encounter_voidworms: "Die Karte hat uns zu einem nicht kartierten schwarzen Loch und einem System geführt, das voll sonderbarer Kreaturen ist. Die größten Exemplare haben sich in einem verfallenen Sternentor in der Nähe eingenistet und umkreisen die aufgegebene Weltraumkonstruktion.\n\nDiese riesigen, wurmartigen Wesen sind in keiner unserer Weltraumfauna-Datenbanken zu finden. Wir versuchen derzeit, die Kommunikation zu ihnen aufzunehmen. $grand_archive.8300.desc.common$ Wenn wir unserer Spur bis zum Ende folgen wollen, müssen wir uns auf die eine oder andere Weise mit diesen Kreaturen befassen und das Tor reparieren."
 grand_archive.8300.a: "Nichts wird sich uns in den Weg stellen!"
 grand_archive.8300.a.pacifist: "Wenn wir müssen ..."
 grand_archive.8300.a.lom: "Gebt ihnen eine volle Breitseite!"
 GATEWAY_VOIDWORMS_KILL_PROJECT: "$grand_archive.8300.name$"
 GATEWAY_VOIDWORMS_KILL_PROJECT_DESC: "Wir sind der §H$celestial_chart$§! zu einem wurmverseuchten §HSternentor§! im [this.solar_system.GetName]-System gefolgt. Wir müssen uns mit diesen Kreaturen befassen, bevor wir das Tor reaktivieren und die andere Seite erreichen können."
 GATEWAY_VOIDWORMS_KILL_PROJECT_TT: "§RBesiegt die Kreaturen im [this.solar_system.GetName]-System§!"
 GATEWAY_VOIDWORMS_DEBRIS_PROJECT: "Leerenwurm-Überreste"
 GATEWAY_VOIDWORMS_DEBRIS_PROJECT_DESC: "Die Überreste der Leerenwürmer im [this.solar_system.GetName]-System weisen ungewöhnliche Messwerte auf. Unsere Scanner fangen offenbar auch ein Lebenszeichen aus einer der verwesenden Troikas auf. Wir sollten ein Forschungsschiff entsenden, das sich diese Sache genauer ansieht."
 grand_archive.8310.name: "Ein Gelege Leerenwürmer"
 grand_archive.8310.desc.did_encounter_voidworms: "Ein Gelege Nymphen wurde in einem der Leerenwurm-Kadaver gefunden. Obwohl wir ihre Artgenossen ausgelöscht haben, näherten sie sich unseren Schiffen friedlich und begannen, fast flehend neben unserer Flotte herzutreiben.\n\n$grand_archive.8310.desc.common$"
 grand_archive.8310.desc.didnt_encounter_voidworms: "Ein Gelege mit Jungen wurde in einem der schlangenartigen Kadaver gefunden. Obwohl wir ihre Artgenossen ausgelöscht haben, näherten sie sich unseren Schiffen friedlich und begannen, fast flehend neben unserer Flotte herzutreiben.\n\n$grand_archive.8310.desc.common$"
 grand_archive.8310.desc.common: "Wir könnten ihre instinktive Anhänglichkeit zu unserem Vorteil nutzen: Sobald sie erst einmal ausgereift sind, würden diese Weltraumkreaturen eine beachtliche organische Flotte abgeben, die dann unter unserer Kontrolle stünde."
 grand_archive.8310.a: "Ein bemerkenswerter Fund."
 grand_archive.8310.a.tt: "Wir erhalten eine Flotte mit §Y$@gateway_voidworm_nymph_reward_count|0$ $voidworms_small_plural$ (§2$epic$§!)§!."
 grand_archive.8310.b: "Einfache Beute."
 grand_archive.8315.name: "Einblicke in die Sternentor-Technologie"
 grand_archive.8315.desc: "Das Sternentor im [FromFromFrom.System.GetName]-System ist inaktiv. Als wir uns der uralten Konstruktion näherten, zeigte uns die §Y$celestial_chart$§! eine Reihe von Einblicken in diese verlorene Technologie. Diese alte Methode des Reisens zu verstehen, wird sicher auch für andere Anwendungsbereiche nützlich sein."
 RESEARCH_GATEWAY_ACTIVATION_PROJECT: "$grand_archive.8315.name$"
 RESEARCH_GATEWAY_ACTIVATION_PROJECT_DESC: "$grand_archive.8315.desc$"
 RESEARCH_GATEWAY_ACTIVATION_PROJECT_TT: "Erforscht die £physics£§Y$tech_gateway_activation$§!-Technologie"
 grand_archive.8325.name: "Aktivierung des Sternentors"
 grand_archive.8325.desc.common: "Sobald wir die Verbindung zwischen den Systemen wiederhergestellt haben, wird uns die Karte nicht mehr weiterführen. Welche Geheimnisse die Karte auch immer verbirgt: Wir werden es schon bald wissen."
 grand_archive.8325.desc.tech: "Da wir jetzt die benötigte Technologie erforscht haben, können wir das uralte Sternentor im [gateway_to_ness_treasure_system.GetName]-System reaktivieren.\n\n$grand_archive.8325.desc.common$"
 grand_archive.8325.desc.kill.known: "Da die Kreaturen keine Gefahr mehr darstellen, können wir das uralte Sternentor im [gateway_to_ness_treasure_system.GetName]-System jetzt reaktivieren.\n\n$grand_archive.8325.desc.common$"
 grand_archive.8325.desc.kill.unknown: "Da die $NAME_Voidworms$ keine Gefahr mehr darstellen, müssen wir das uralte Sternentor im [gateway_to_ness_treasure_system.GetName]-System nur noch reaktivieren.\n\n$grand_archive.8325.desc.common$"
 ACTIVATE_GATEWAY_PROJECT: "$grand_archive.8325.name$"
 ACTIVATE_GATEWAY_PROJECT_DESC: "Da es der letzte Punkt auf der §H$celestial_chart$§! ist, wird uns das inaktive §HSternentor§! im [this.solar_system.GetName]-System höchstwahrscheinlich zu etwas sehr Bedeutendem führen."
 ACTIVATE_GATEWAY_PROJECT_TT: "§HAktiviert das Sternentor§!"
 grand_archive.8400.name: "Aye, ein Schatz!"
 grand_archive.8400.desc: "Nachdem wir das Sternentor am Ende der §Y$celestial_chart$§! aktiviert hatten, öffnete sich uns der Weg ins [ness_treasure_system.GetName]-System. Die Anordnung der Himmelskörper stimmt mit Skizzen aus dem Logbuch von §Y$NAME_CaptainNess$§! überein.\n\nUnsere lange Reise steht kurz vor ihrem Ende."
 grand_archive.8400.a: "Macht weiter."
 ness_treasure_system_poi: "Reist durch das Sternentor im [from.solar_system.GetName]-System"
 ness_treasure_system_poi_desc: "Wir sind der §H$celestial_chart$§! bis ans Ende gefolgt, haben Piraten und monströse Kreaturen bekämpft, ein Sternentor gefunden und dieses reaktiviert. Alles, was noch bleibt, ist, die andere Seite zu erreichen und unsere wohlverdiente Belohnung einzustreichen."
