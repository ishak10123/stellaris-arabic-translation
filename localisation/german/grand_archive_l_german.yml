 grand_archive.4105.desc.3.common: "Eure Hingabe an die Bewahrung ist unübertroffen. Wir würden Euch gern einen ganz besonderen Gegenstand anvertrauen. [GetStage3Description]"
 grand_archive.4105.desc.3.common_2: "Selbstverständlich erwarten wir für einen solch kostbaren Gegenstand eine entsprechend große Spende ..."
 CURATORS_STAGE_3_DESC: "Ihr könnt einen mächtigen Gegenstand aus unserer wertvollsten Sammlung auswählen. Wir sind sicher, er wird bei Euch gut aufgehoben sein.\n\n$grand_archive.4105.desc.3.common_2$"
 DEAD_CURATORS_STAGE_3_DESC: "Diese mächtigen Gegenstände sind in geheimen Verstecken in der ganzen Galaxie gelagert, weshalb sie die Vernichtung unserer Station überlebt haben.\n\n$grand_archive.4105.desc.3.common_2$ Wir können unsere Heimat nicht allein durch guten Willen wiederaufbauen."
 grand_archive.4105.desc.3.xeno_geology: "$grand_archive.4105.desc.common.xeno_geology$\n\n$grand_archive.4105.desc.3.common$"
 grand_archive.4105.desc.3.aesthetic_wonder: "$grand_archive.4105.desc.common.aesthetic_wonder$\n\n$grand_archive.4105.desc.3.common$"
 grand_archive.4105.desc.3.historical_item: "$grand_archive.4105.desc.common.historical_item$\n\n$grand_archive.4105.desc.3.common$"
 grand_archive.4105.desc.3.no_relic.common: "Normalerweise würden wir Euch eines unserer wertvollsten Artefakte überlassen, doch andere waren schneller als Ihr und haben diese bereits für sich beansprucht.\n\nAls Trost könnt Ihr einen dieser Gegenstände auswählen."
 grand_archive.4105.desc.3.no_relic.xeno_geology: "Eure Hingabe an die Bewahrung der §YXeno-Geologie§! ist unübertroffen.\n\n$grand_archive.4105.desc.3.no_relic.common$"
