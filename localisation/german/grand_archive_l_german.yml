 #Homicidal considerations #
 #Fanatic Purifiers
 grand_archive.4135.name: "Schmuckstücke unbedeutender Zivilisationen"
 grand_archive.4135.desc: "Während wir diese Welt immer mehr vom Xeno-Abschaum befreien, wächst unsere Sammlung an Trophäen der Kategorie \"[GetCollectionRewardCategory]\" ständig.\n\nMögen diese Exponate dieser verseuchten Galaxie als Lehre dienen und uns bei unserer eingeschworenen Mission weiter inspirieren."
 grand_archive.4135.desc.geology: "$grand_archive.4135.desc$"
 grand_archive.4135.desc.aesthetic: "$grand_archive.4135.desc$"
 grand_archive.4135.a: "Für [this.GetName]!"
 grand_archive.4140.name: "Angesammelte Kuriositäten"
 grand_archive.4140.desc.geology: "Wir sammeln weiterhin Objekte der Kategorie \"[GetCollectionRewardCategory]\" - Steine und andere Kuriositäten dieser schmutzigen Galaxie.\n\nNehmen wir uns einen Moment, um unsere Trophäen zu bewundern ... aber in dem Wissen, dass es noch viel mehr da draußen gibt."
 grand_archive.4140.desc.aesthetic: "Wir sammeln weiterhin Objekte der Kategorie \"[GetCollectionRewardCategory]\" - Schmuckstücke und andere Überreste jener Kontamination, die minderwertige Lebensformen zurückließen.\n\nSobald der gesamte Xeno-Abschaum beseitigt wurde, werden uns diese Gegenstände als Erinnerung an ihre niedere Natur dienen."
 grand_archive.4140.a: "Die Galaxie muss gesäubert werden."
 grand_archive.4145.name: "Trophäenlager gefüllt"
 grand_archive.4145.desc.geology: "Unser Lager ist mit den verschiedensten Gegenständen der Kategorie \"[GetCollectionRewardCategory]\" gefüllt - dem uralten Fleisch dieser Galaxie.\n\nWir betrachten diese umfangreiche Sammlung als Aufzeichnung all dessen, was wir bereits vernichtet haben. Lasst uns auf all unsere Triumphe zurückblicken!"
 grand_archive.4145.desc.aesthetic: "Unser Lager ist mit den verschiedensten Kuriositäten der Kategorie \"[GetCollectionRewardCategory]\" gefüllt - einem wahren Schatz an bedeutungslosen Xeno-Ornamenten.\n\nWir betrachten diese riesige Sammlung und lachen über die erbärmliche Natur jener, die wir vernichtet haben. Allein der Gedanke, dass diese Vitrinen alles sind, was von ihnen bleibt, sobald wir mit ihnen fertig sind ..."
 grand_archive.4145.a: "Ein Hoch auf den Tod!"
 #Devouring Swarm
 grand_archive.4136.name: "Wertvolles Futter"
 grand_archive.4136.desc: "Unser Hunger lässt niemals nach, doch unsere Sammlung an Kuriositäten der Kategorie \"[GetCollectionRewardCategory]\" ist während unserer Fresszüge beachtlich gewachsen.\n\nMögen diese Exponate die letzte Erinnerung an jene Galaxie sein, die wir verschlungen haben."
 grand_archive.4136.desc.geology: "$grand_archive.4136.desc$"
 grand_archive.4136.desc.aesthetic: "$grand_archive.4136.desc$"
 grand_archive.4136.a: "Immerwährender Hunger."
 grand_archive.4141.name: "$grand_archive.4136.name$"
 grand_archive.4141.desc.common: "Während wir uns immer weiter an der Galaxie laben, erinnern uns diese Gegenstände an die unzählige Menge an Nahrung, die wir bereits verzehrt haben."
 grand_archive.4141.desc.geology: "Wir sammeln weiterhin Exemplare der Kategorie \"[GetCollectionRewardCategory]\" - dem uralten Fleisch dieser Galaxie.\n\n$grand_archive.4141.desc.common$"
 grand_archive.4141.desc.aesthetic: "Wir sammeln weiterhin Schmuckstücke der Kategorie \"[GetCollectionRewardCategory]\" - jene eigentümlichen Kuriositäten, die minderwertige Lebensformen einst sehr schätzten.\n\n$grand_archive.4141.desc.common$"
 grand_archive.4141.a: "Das Festmahl geht weiter!"
 grand_archive.4146.name: "Erinnerungen an vergangene Mahlzeiten"
 grand_archive.4146.desc: "Während wir uns ausgiebig durch die Galaxie gefressen haben, haben wir auch unsere Lager mit Vitrinen voller Exponate der Kategorie \"[GetCollectionRewardCategory]\" gefüllt.\n\nDiese riesige Sammlung dient nur dazu, uns an den Hunger zu erinnern, der nicht zu stillen ist. Sobald wir diese Galaxie vollständig verschlungen haben, werden wir uns an den Geschmack, den wir einst durch sie verspürt haben, erinnern."
 grand_archive.4146.desc.geology: "$grand_archive.4146.desc$"
 grand_archive.4146.desc.aesthetic: "$grand_archive.4146.desc$"
 grand_archive.4146.a: "Köstlich."
 #Determined Exterminators
 grand_archive.4137.name: "Schmuckstücke von wahrgenommenem Wert"
 grand_archive.4137.desc: "Wir haben einige Gegenstände der Kategorie \"[GetCollectionRewardCategory]\" zusammengetragen, die organische Bewohner für wertvolle und einzigartige Relikte halten.\n\nUnter unserer Aufsicht werden diese Gegenstände noch lange nach der Ausrottung allen organischen Lebens in dieser Galaxie überdauern."
 grand_archive.4137.desc.geology: "$grand_archive.4137.desc$"
 grand_archive.4137.desc.aesthetic: "$grand_archive.4137.desc$"
 grand_archive.4137.a: "Harmlose Kuriositäten."
 grand_archive.4142.name: "Angesammelte Kuriositäten"
 grand_archive.4142.desc: "Während wir alles organische Leben aus dieser Galaxie tilgen, vergrößern wir unsere Sammlung an Trophäen der Kategorie \"[GetCollectionRewardCategory]\" immer weiter.\n\nDiese Gegenstände werden dazu dienen, uns an die Unlogik des organischen Lebens zu erinnern, wenn wir unsere künftigen Vernichtungsprotokolle initialisieren."
 grand_archive.4142.desc.geology: "$grand_archive.4142.desc$"
 grand_archive.4142.desc.aesthetic: "$grand_archive.4142.desc$"
 grand_archive.4142.a: "Protokolle angepasst."
 grand_archive.4147.name: "Speicherplatz voll"
 grand_archive.4147.desc: "Beim Säubern dieser Galaxie füllten wir auch unsere Speicherplätze, die Exemplaren der Kategorie \"[GetCollectionRewardCategory]\" zugewiesen wurden, vollständig.\n\nDiese Sammlung liefert uns Daten darüber, was organische Wesen wertschätzen, und sie wird dazu dienen, deren Ausrottung voranzutreiben und Referenzpunkte in der Geschichte dieser infizierten Galaxie zu liefern."
 grand_archive.4147.desc.geology: "$grand_archive.4147.desc$"
 grand_archive.4147.desc.aesthetic: "$grand_archive.4147.desc$"
 grand_archive.4147.a: "Die Torheit von organischem Leben."
