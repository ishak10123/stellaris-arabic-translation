 NAME_Treasure_Trove_Pirate_Ship: "[event_target:pirate_system.GetName]-Banditen"
 NAME_Treasure_Trove_Pirate_Ship_Design: "Freibeuter"
 grand_archive.6025.name: "Piratenhinterhalt"
 grand_archive.6025.desc: "Während wir nach dem §Y$TREASURE_TROVE$§! im [from.GetName]-System suchten, wurde [fromfromfrom.Leader.GetName] von einer Piratenflotte in einen Hinterhalt gelockt!\n\nDiese Gesetzlosen haben irgendwie von unserem Fund erfahren und wollen den Schatz für sich selbst. Wenn wir diesen Schatz für uns beanspruchen wollen, müssen wir ihre Flotte abschießen, bevor sie ihn erreichen."
 grand_archive.6025.a: "Auf die Kampfstationen!"
 TREASURE_TROVE_PIRATES: "Besiegt die $NAME_Treasure_Trove_Pirate_Ship$"
 TREASURE_TROVE_PIRATES_DESC: "Eine Piratenflotte versucht, sich den §Y$TREASURE_TROVE$§! auf [this.GetName] unter den Nagel zu reißen!"
 TREASURE_TROVE_EVENT_TOOLTIP: "§RWir müssen diese Opportunisten besiegen, bevor sie diese wertvollen Ressourcen stehlen.§!"
 grand_archive.6031.name: "Piraten besiegt"
 grand_archive.6031.desc: "Da wir die opportunistischen Piraten in die Flucht geschlagen haben, können wir jetzt den Schatztresor auf [event_target:treasure_trove_planet.GetName] für uns beanspruchen."
 grand_archive.6031.a: "Diese Beute haben wir uns verdient."
 grand_archive.6035.name: "Schatztresor verloren"
 grand_archive.6035.desc: "Die opportunistischen Piraten haben den §Y$TREASURE_TROVE$§! auf [event_target:treasure_trove_planet.GetName] vor uns geplündert.\n\nSie haben nichts von Wert zurückgelassen."
 grand_archive.6035.a: "So ist das Leben."
 #################
 #Leader Traits #
 #################
 leader_trait_buccaneer: "Freibeuter"
 leader_trait_buccaneer_desc: "Diese Meister der Schlachtfeldbergung sind in der Lage, selbst aus den am stärksten beschädigten Schiffswracks jeden noch so kleinen Wert herauszuholen."
 leader_trait_trailblazer: "Vorreiter"
 leader_trait_trailblazer_desc: "Dieser Anführer wird von der Abenteuerlust angetrieben. Er bereist die Grenzen der Galaxie und erkundet jeden Winkel des Weltraums."
 leader_trait_treasure_hoarder: "Schatzhorter"
 leader_trait_treasure_hoarder_desc: "Keine Beute ist groß genug, um das Verlangen dieses Anführers zu stillen. Die Anhäufung wertvoller Ressourcen ist seine Hauptmotivation."
 mod_enemy_ship_destroyed_energy_add: "$r_energy$ pro zerstörter feindlicher Schiffsgröße"
 mod_deposit_increase_on_survey_chance_mult: "Nach Abschluss einer Erkundung:\n$t$Chance, die Größe von Ressourcenvorkommen zu erhöhen"
 ##########
 #Civics #
 ##########
 civic_galactic_curators: "Galaktische Kuratoren"
 civic_galactic_curators_desc: "Die akribische Sammlung und Bewahrung historischer Artefakte hat diese Zivilisation seit jeher fasziniert. Mit einer ganzen Galaxie, die es zu erkunden gibt, hat diese Zivilisation nun jedoch noch viel mehr zu lernen."
 civic_galactic_curators_effects: "$civic_galactic_curators_effects_common$\n- $entertainers_are_curators_tt$"
 civic_corporate_galactic_curators: "Antiquarische Expertise"
 civic_corporate_galactic_curators_desc: "Mit Antiquitäten und anderen seltenen Sammlerstücken lässt sich viel Geld verdienen, und diese Gesellschaft ist sich dessen nur allzu bewusst. Als Experten für materielle Spekulationen suchen sie nun im Himmel nach neuen Investitionsmöglichkeiten."
 civic_corporate_galactic_curators_effects: "$civic_galactic_curators_effects_common$\n- $entertainers_are_curators_tt$\n- £building£ §Y$building_public_relations_office$§!: $megacorp_civic_branch_office_building_effect$"
 civic_hive_galactic_curators: "Bewahrernetzwerk"
 civic_hive_galactic_curators_desc: "Dieses Kollektiv hat den nicht zu stillenden Zwang entwickelt, zu nehmen, zu behalten und zu bewahren. Dieses Verhalten, das ihm in der Vergangenheit beim Überleben half, treibt es nun dazu, seine gesammelten Schätze in einer großen Ausstellung zu präsentieren."
 civic_hive_galactic_curators_effects: "$civic_galactic_curators_effects_common$"
 civic_machine_galactic_curators: "Bewahrernetzwerk"
 civic_machine_galactic_curators_desc: "Diese Maschinenintelligenz hat nur eine Kerndirektive in ihrem Code: Sammeln und bewahren."
 civic_machine_galactic_curators_effects: "$civic_galactic_curators_effects_common$"
 civic_galactic_curators_effects_common: "- $GUARANTEED_RESEARCH_OPTION_STRING$ ['technology:tech_galactic_archivism', £society_research£$tech_galactic_archivism$]\n- Anfängliche ['concept_specimen', Exemplare]: ein §0$common$§!es Exemplar jeder Kategorie\n- Erhält für jedes gefundene §YExemplar§! oder den Abschluss einer §Y$ARCHAEOLOGICAL_SITE$§!Archäologischen Stätte $r_unity$\n- Einkäufe von der §YKurator-Enklave§!: §G$@galactic_curators_curator_enclave_purchase_cost|%0$§!\n- Aktiviert den Erlass \"§Y$edict_decentralized_research$§!\", der die Produktion von §YForschungsstationen§! erhöht, gleichzeitig jedoch auch die Produktion £job_researcher£ §Y[GetResearcher]§!-Jobs reduziert"
 edict_decentralized_research: "Dezentralisierte Forschung"
 edict_decentralized_research_desc: "Das größte Wissen liegt außerhalb unserer eigenen Zivilisation verborgen. Indem wir uns auf das große Ganze - die Galaxie - konzentrieren, lernen wir mehr über uns selbst."
 MOD_COUNTRY_SPECIMEN_ACQUIRE_CHANCE_MULT: "Erhöhte Chance für die Entdeckung von Exemplaren"
 councilor_galactic_curators: "Oberster Kurator"
 councilor_galactic_curators_desc: "Der Oberste Kurator hat die Aufgabe, die Bewahrung aller Exemplare zu überwachen."
 councilor_corporate_galactic_curators: "Kurationsoffizier"
 councilor_corporate_galactic_curators_desc: "Der Kurationsoffizier ist für die Verwaltung der Ausstellung und den Verkauf von Exemplaren verantwortlich."
 civic_beastmasters: "Bestienmeister"
 civic_beastmasters_desc: "Diese Gesellschaft hat sich in einem Sternensystem, das Weltraumamöben als Weidegrund dient, technologisch so weit entwickelt, dass sie die Sterne bereisen kann, und sie hat dabei ein umfassendes Wissen über den Lebenszyklus von Weltraumamöben zusammengetragen. Sie arbeitet nun daran, diese Kreaturen zum wechselseitigen Nutzen zu pflegen, aufzuziehen und schließlich zu klonen."
 civic_machine_beastmasters: "Biodrohnen"
 civic_machine_beastmasters_desc: "Nachdem diese Maschinenintelligenz in ihrem Heimatsystem direkt mit biologischen Organismen aus der Leere in Kontakt getreten ist, hat sie alles Wissen über diese Wesen in ihre Kernfunktionen integriert. Das Ergebnis davon ist eine für beide Seiten vorteilhafte symbiotische Beziehung."
 civic_hive_beastmasters: "Wilder Schwarm"
 civic_hive_beastmasters_desc: "Dieses Schwarmbewusstsein ist äußerst anpassungsfähig und eine symbiotische Beziehung mit den in seinem Heimatsystem lebenden biologischen Organismen eingegangen. Auch wenn sie nicht dasselbe Bewusstsein teilen, arbeiten sie zusammen, um ein gemeinsames Ziel zu erreichen."
 civic_wilderness_beastmasters: "$civic_hive_beastmasters$"
 civic_wilderness_beastmasters_desc: "Diese Wildnis hat sich für eine Symbiose mit der im Weltraum lebenden Fauna aus ihrem Heimatsystem geöffnet. Obwohl sie nicht vollständig in die mutualistische Intelligenz integriert sind, arbeiten diese Organismen zusammen, um ihre gemeinsamen Ziele zu verwirklichen."
 civic_corporate_beastmasters: "Weltraumhüter"
 civic_corporate_beastmasters_desc: "Dieser Megakonzern, der aus einer Zunft der besten Tierzüchter hervorgegangen ist, hat die nötige Technologie entwickelt, um die in seinem Heimatsystem lebenden Weltraumkreaturen heranzuzüchten und sie zu pflegen."
 civic_beastmasters_common_effects_1: "$t$- $ADDITIONAL_TECHNOLOGIES_STRING$$TABBED_NEW_LINE$$t$- ['technology:tech_gravity_wells', £physics£$tech_gravity_wells$]$TABBED_NEW_LINE$$t$- ['technology:tech_alien_cloning', £society£$tech_alien_cloning$]$TABBED_NEW_LINE$- $AVAILABLE_STARBASE_BUILDINGS$ ['concept_beastport', Bestienhäfen]$TABBED_NEW_LINE$- $HOME_SYSTEM$ Beginnt mit einem ['concept_beastport']"
 civic_beastmasters_ships: "$t$- Ersetzt zu Spielbeginn alle §YMilitärschiffe§! durch §YWeltraumamöben§!"
 civic_beastmasters_common_effects_2: "$t$- Erhält zu Spielbeginn £genetic_material£ ['concept_dna']:$TABBED_NEW_LINE$$t$- §0Gewöhnliche§! Weltraumamöbe"
 civic_beastmasters_effects: "$civic_beastmasters_common_effects_1$\n$civic_beastmasters_ships$\n$civic_beastmasters_common_effects_2$"
 civic_corporate_beastmasters_effects: "$civic_beastmasters_common_effects_1$\n$civic_beastmasters_ships$\n$civic_beastmasters_common_effects_2$\n$t$- £building£ §Y$building_food_conglomerate$§!: $megacorp_civic_branch_office_building_effect$"
 civic_cordyceptic_beastmasters_effects: "$civic_beastmasters_common_effects_1$$TABBED_NEW_LINE$- Beginnt mit einer §Ygeklonten Weltraumamöbe§! statt einer §Yuntoten Weltraumamöbe§!\n$civic_beastmasters_common_effects_2$"
 councilor_beastmasters: "Bestienfürst"
 councilor_beastmasters_desc: "Der Titel des Bestienfürsten ist eine prestigeträchtige und höchst spezialisierte Position, die sich in erster Linie auf die Verwaltung und den strategischen Einsatz von Weltraumfauna-Schiffen konzentriert."
 councilor_corporate_beastmasters: "Oberster Hüter"
 councilor_corporate_beastmasters_desc: "Der Oberste Hüter kümmert sich um die Gesundheit und die Versorgung der Weltraumfauna-Schiffe. Seine vielseitigen Aufgaben erfordern, dass er sich bestens mit Logistik, Ökologie und der Viehzucht auskennt."
 civic_tooltip_not_beastmasters: "Hat NICHT das Staatselement \"['concept_beastmasters_civic']\""
 concept_beastmasters_civic: "$civic_beastmasters$"
 concept_beastmasters_civic_desc: "Staatselemente der Kategorie \"$concept_beastmasters_civic$\" umfassen: $NEW_LINE$- ['civic:civic_beastmasters']$NEW_LINE$- ['civic:civic_hive_beastmasters'] $NEW_LINE$- ['civic:civic_machine_beastmasters'] $NEW_LINE$- ['civic:civic_corporate_beastmasters']"
