 grand_archive.10010.name: "Weltraumamöben-Mutationsprojekt abgeschlossen"
 grand_archive.10010.desc: "Unser experimentelles Mutationsprojekt für §YWeltraumamöben§! ist abgeschlossen und hat einige interessante neue Organellen hervorgebracht: abtrennbare §Y$tech_unique_mutation_space_amoeba$§!.\n\nDiese symbiotischen Organismen sind in der Lage, Objekten in der Nähe Energie zu entziehen und sie an ihren Wirt zurückzugeben, was ihre Überlebensfähigkeit und die Regeneration verbessert."
 grand_archive.10015.name: "Tiyanki-Mutationsprojekt abgeschlossen"
 grand_archive.10015.desc: "Unser experimentelles Mutationsprojekt für §YTiyanki§! ist abgeschlossen und hat einige interessante neue Verbesserungen hervorgebracht: §Y$tech_unique_mutation_tiyanki$§!\n\nWir haben die natürlichen Schwingungen, die diese Lebewesen zur Kommunikation innerhalb ihrer Herden nutzen, auf die maximal aufrechthaltbare Frequenz verstärkt. Das Ergebnis ist ein kontrollierbares Feld, das das Gewebe anderer Lebewesen in der Nähe stärkt."
 grand_archive.10020.name: "Leerenwurm-Mutationsprojekt abgeschlossen"
 grand_archive.10020.desc: "Unser experimentelles Mutationsprojekt für §YLeerenwürmer§! ist abgeschlossen und hat einige interessante Variationen in ihren Reproduktionszyklen hervorgebracht: §Y$tech_unique_mutation_voidworm$§!\n\nEs ist uns gelungen, die Fruchtbarkeit der parasitären Zysten zu erhöhen, mit denen diese Kreaturen ihre Wirtsplaneten bombardieren. Das Ergebnis ist eine deutlich höhere Menge an neuen Nymphen."
 grand_archive.10025.name: "Cutholoiden-Mutationsprojekt abgeschlossen"
 grand_archive.10025.desc: "Unser experimentelles Mutationsprojekt für §YCutholoide§! ist abgeschlossen und hat einige interessante Ergebnisse geliefert: §Y$tech_unique_mutation_cutholoid$§!\n\nWir haben einen Weg gefunden, ihr massives Verdauungssystem so umzufunktionieren, dass sie Hochgeschwindigkeitsgeschosse mit großer Reichweite abfeuern können. Leider bedeutet diese biologische Veränderung auch, dass sie nicht mehr in der Lage sind, feindliche Flotten zu verschlingen."
 grand_archive.10030.name: "Kristallwesen-Mutationsprojekt abgeschlossen"
 grand_archive.10030.desc: "Unser experimentelles Mutationsprojekt für §YKristallwesen§! ist abgeschlossen und hat einige interessante Ergebnisse geliefert: §Y$tech_unique_mutation_crystalline_entity$§!\n\nMit dieser Modifikation ihrer kristallinen Genetik ist jedes Exemplar in der Lage, sich im Fall eines schweren Traumas in zwei unabhängige Organismen aufzuspalten. Dies sollte ihre Kampfkraft drastisch erhöhen."
 grand_archive.10030.a: "$FASCINATING$"
 leviathan_unique_mutation_project_unlock_name: "Mutationsprojekt ([FromFromFrom.GetShipSizeName])"
 leviathan_unique_mutation_project_unlock_desc: "Wir haben das Genmaterial des [FromFromFrom.GetShipSizeName]-Exemplars, auf das wir im [FromFrom.solar_system.GetName]-System gestoßen sind, geborgen.\n\nAuch wenn uns das nötige Wissen fehlt, um eine solche Kreatur zu klonen, erlaubt es uns dennoch, wertvolle Einblicke in ihre einzigartige Biologie zu erlangen."
 grand_archive.10055.name: "$leviathan_unique_mutation_project_unlock_name$"
 grand_archive.10055.desc: "$leviathan_unique_mutation_project_unlock_desc$"
 grand_archive.10060.name: "Matriarchinnen-Mutationsprojekt abgeschlossen"
 grand_archive.10060.desc: "Unser experimentelles Mutationsprojekt für $NAME_Elderly_Tiyanki$nen ist abgeschlossen und hat einige interessante Ergebnisse geliefert: §H$restorative_enzymes$§!\n\nDie für ihre Regeneration verantwortlichen Enzyme im Genmaterial der Matriarchin können in ähnlichen Drüsen auf anderen Lebewesen reproduziert werden. Dadurch erhält ihr strukturelles Gewebe regenerative Eigenschaften, das besonders in engen Formationen bei einer Explosion sehr nützlich wäre."
 grand_archive.10075.name: "$leviathan_unique_mutation_project_unlock_name$"
 grand_archive.10075.desc: "$leviathan_unique_mutation_project_unlock_desc$"
 grand_archive.10080.name: "Todesbrut-Mutationsprojekt abgeschlossen"
 grand_archive.10080.desc: "Unser experimentelles Mutationsprojekt für die $NAME_Voidspawn$ ist abgeschlossen und hat zu einigen interessanten Entdeckungen geführt: §H$starborne_biology$§!\n\nDas Gewebe dieser Kreaturen reagiert stark auf Sternenlicht und kann in anderen Organismen das Wachstum anregen. Der Prozess erfordert eine kleine Menge Energie, verbessert aber ihre Wachstumsrate in der Nähe der hellsten Sterne beträchtlich."
