 #Technologies #
 ################
 tech_galactic_archivism: "Galaktischer Archivismus"
 tech_galactic_archivism_desc: "Damit wir von jenen lernen können, die vor uns da waren, muss die Geschichte unserer Galaxie angemessen bewahrt werden. Ein gewaltiges Archiv soll diesen Zweck erfüllen."
 tech_gravity_wells: "Gravitationsfallen"
 tech_gravity_wells_desc: "Der zielgerichtete Einsatz von Quantenmasse lässt sich nutzen, um kurzlebige Gravitationsbrunnen zu erzeugen. Durch die richtige Manipulation dieser Gravitation können theoretisch Kreaturen beliebiger Größe festgehalten und eingefangen werden, ohne dass man sie dabei verletzt."
 tech_containment_vessel: "Kuratoren-Eindämmungsprotokolle"
 tech_containment_vessel_desc: "Gravitationsfallen können die doppelte Menge an §YWeltraumfauna§! einfangen."
 TECH_UNLOCK_CONTAINMENT_VESSEL_TITLE: "$TECH_UNLOCK_COMPONENT_LINE$ $tech_containment_vessel$"
 TECH_UNLOCK_CONTAINMENT_VESSEL_DESC: "$tech_containment_vessel_desc$"
 tech_asteroidal_carapace: "Asteroiden-Carapax"
 tech_asteroidal_carapace_desc: "Die äußere Hülle eines Cutholoiden ist nicht nur mineralischer Natur, sondern wird auch durch ein Netz aus biologischen Fasern verstärkt. Wir können dieses Verfahren mithilfe fortschrittlicher Metallurgie synthetisieren."
 ASTEROIDAL_CARAPACE_ARMOR: "$tech_asteroidal_carapace$"
 ASTEROIDAL_CARAPACE_ARMOR_DESC: "$tech_asteroidal_carapace_desc$"
 tech_gravity_snare_capacity_desc: "Erhöht die Anzahl an §YWeltraumfauna§!, die durch Gravitationsfallen eingefangen werden kann, um §G1§!"
 tech_gravity_snare_capacity_1: "Mikro-Singularitätsverbesserungen"
 tech_gravity_snare_capacity_1_desc: "$tech_gravity_snare_capacity_desc$"
 tech_gravity_snare_capacity_2: "Gravitationsmanipulationsoptimierung"
 tech_gravity_snare_capacity_2_desc: "$tech_gravity_snare_capacity_desc$"
 tech_gravity_snare_capacity_3: "Eindämmungssystemverbesserung"
 tech_gravity_snare_capacity_3_desc: "$tech_gravity_snare_capacity_desc$"
 gateway_snare_capacity: "Kapazität (Gravitationsfalle)"
 gateway_gravity_snare_capacity: "§HGravitationsfallen-Kapazitätspfad§!\n§EDiese Technologie führt zu weiteren Fortschritten im Feld der Fangkapazität von Gravitationsfallen.§!"
 tech_alien_cloning: "Künstliche Aufzucht"
 tech_alien_cloning_beastmasters: "$tech_alien_cloning$"
 tech_alien_cloning_desc: "In einer streng kontrollierten Umgebung können wir das $genetic_material$, das wir von erlegter Weltraumfauna gesammelt haben, nutzen, um neue Exemplare der Spezies heranzuzüchten und sie unter unsere Kontrolle zu bringen."
 feature_alien_cloning_unlocked: "Neue Richtlinie: §Y$policy_space_fauna_growth$§!"
 feature_alien_cloning_unlocked_desc: "$policy_space_fauna_growth_desc$"
 tech_alien_cloning_tt: "§HNeue Mechanik:§! Klonen von Weltraumfauna in der Größe von Korvetten"
 tech_improved_incubators: "Verbesserte Inkubatoren"
 tech_improved_incubators_beastmasters: "$tech_improved_incubators$"
 tech_improved_incubators_desc: "Wir können die künstlichen Aufzuchtverfahren in unseren Brutstätten verbessern, um die frühen Entwicklungsstadien zu beschleunigen und schneller reife Klone heranzuzüchten."
 tech_improved_incubators_tt: "§HNeue Mechanik:§! Klonen von Weltraumfauna in der Größe von Zerstörern"
 tech_improved_incubators_tt_desc: "Brutstätten können jetzt größere Exemplare §YWeltraumfauna§! klonen, die an die Ausmaße traditioneller Zerstörer heranreichen."
 tech_metabolic_gases: "Metabolische Gase"
 tech_metabolic_gases_beastmasters: "$tech_metabolic_gases$"
 tech_metabolic_gases_desc: "Durch die Verbesserung der metabolischen Gase in unseren Brutstätten stellen wir sicher, dass jedes Exemplar noch weiter heranreift, bevor es auf die Welt gebracht wird."
 tech_metabolic_gases_tt: "§HNeue Mechanik:§! Klonen von Weltraumfauna in der Größe von Schlachtschiffen"
 tech_metabolic_gases_tt_desc: "Brutstätten können jetzt Weltraumfauna-Schiffe jeder Reifestufe oder Größe klonen."
 BOARDING_CABLES: "Enterkabel"
 BOARDING_CABLES_MODULES: "$BOARDING_CABLES$"
 BOARDING_CABLES_TOOLTIP: "Bietet eine kleine Chance, ein feindliches Schiff zu entern und gänzlich zu übernehmen oder einen feindlichen Kommandanten für Lösegeld gefangen zu nehmen."
 BOARDING_CABLES_DESC: "$BOARDING_CABLES_TOOLTIP$"
 tech_boarding_cables: "$BOARDING_CABLES$"
 tech_boarding_cables_desc: "Eine umfunktionierte kleinkalibrige Artillerie zum Abfeuern durchschlagender Haken, die an elastischen Kohlefaserkabeln befestigt sind und sich perfekt dazu eignen, feindliche Schiffe außer Gefecht zu setzen und zu entern."
 tech_controlled_mutations: "Kontrollierte Mutationen"
 tech_controlled_mutations_desc: "Wir können die Effektivität unserer Weltraumfauna-Schiffe noch weiter erhöhen, indem wir ihre Genome modifizieren und künstliche Technologien in ihre Biomasse integrieren."
 tech_controlled_mutations_2: "Verbesserte kontrollierte Mutationen"
 tech_controlled_mutations_2_desc: "Wir können noch viel weiter gehen. Die neuesten Methoden zur Manipulation der Weltraumfaunagenetik erlauben es uns, eine viel größere Palette an Spezialkomponenten in ihre Biologie zu integrieren."
