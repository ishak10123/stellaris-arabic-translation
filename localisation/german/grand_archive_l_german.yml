 grand_archive.2053.name: "Leerenwürmer ausgelöscht"
 grand_archive.2053.desc: "Die letzten Teile des Leerenwurm-Heimatsystems wurden zerstört und ihre Spezies damit ausgelöscht.\n\nWir müssen nicht länger Angst vor ihrer parasitären Bombardierung haben."
 grand_archive.2054.name: "Leerenwurm-Bau zerstört"
 grand_archive.2054.desc: "Wir haben das Heimatsystem der Leerenwürmer zerstört.\n\nSie werden ihre Nester nicht länger nutzen können, um ihre Jungen großzuziehen."
 voidworm_scaling: "Leerenwurm-Skalierung"
 voidworm_scaling_difficulty_civilian: "$voidworm_scaling$"
 voidworm_scaling_difficulty_cadet: "$voidworm_scaling$"
 voidworms_crisis_growth_modifier: "Leerenwurm-Krisenwachstum"
 voidworms_at_home_modifier: "Bonus ($NAME_Voidworms$)"
 voidworms_post_crisis_modifier: "$voidworm_crisis_eradicate_chain_title$"
 frenzied_voidworms_at_home_modifier: "Bonus ($NAME_Frenzied_Voidworms$)"
 frenzied_voidworms_enraged_modifier: "Wütende mutierte Leerenwürmer"
 frenzied_voidworms_pacified_modifier: "Befriedete mutierte Leerenwürmer"
 resolution_voidworm_eradication: "Leerenwürmer ausrotten"
 resolution_voidworm_eradication_desc: "Die parasitären Leerenwürmer sind eine Plage für die Galaxie und eine Bedrohung für jede besiedelte Welt. Ihr natürlicher Lebenszyklus stört das Gleichgewicht des galaktischen Ökosystems und daher müssen sie ausgerottet werden."
 resolution_voidworm_eradication_tooltip: "Jedes Reich, das §Y$NAME_Voidworms$§! innerhalb seiner Grenzen hat, begeht einen §RBruch des Galaktischen Gesetzes§!, bis die Kreaturen vernichtet wurden oder von selbst verschwunden sind."
 resolution_repeal_voidworm_eradication: "§R\"$resolution_voidworm_eradication$\" widerrufen§!"
 resolution_repeal_voidworm_eradication_desc: "[global_event_country.GetGalCommunityOrGalImperiumDE3Cap] sollte nicht das Recht haben, die Leerenwürmer auszurotten."
 resolution_repeal_voidworm_eradication_effect_success: "Widerruft den Beschluss \"§Y$resolution_voidworm_eradication$§!\"."
 grand_archive.2103.name: "$resolution_voidworm_eradication$"
 grand_archive.2103.desc: "[global_event_country.GetGalCommunityOrGalImperiumDE3Cap] hat erklärt, dass Leerenwürmer nicht länger innerhalb von Systemen von Mitgliedsstaaten existieren dürfen.\n\nBis sie eliminiert wurden oder von selbst verschwunden sind, begeht [this.GetName] einen §RBruch des Galaktischen Gesetzes§!."
 grand_archive.2105.name: "$NAME_Voidworms$ im Raumbereich der [this.GetSpeciesNamePlural]"
 grand_archive.2105.desc: "Eine Flotte Leerenwürmer ist in unseren Raumbereich im [from.GetName]-System eingedrungen. Als Mitglied [global_event_country.GetGalCommunityOrGalImperiumDE2] sind wir gesetzlich dazu verpflichtet, jeden in unserem Raumbereich befindlichen Leerenwurm auf der Stelle zu beseitigen.\n\n[this.GetName] begeht einen §RBruch des Galaktischen Gesetzes§!, bis die Leerenwürmer entweder vernichtet oder von selbst verschwunden sind."
 grand_archive.2107.desc: "Die fortwährende Anwesenheit von Leerenwürmern innerhalb des [invaded_system.GetName]-Systems gilt unter dem Beschluss \"$resolution_voidworm_eradication$\" als erheblicher §RBruch des Galaktischen Gesetzes§!. Dies hat dazu geführt, dass [global_event_country.GetGalCommunityOrGalImperiumDE3] es Mitgliedern erlaubt hat, Sanktionen gegen [this.GetName] zu verhängen."
 bombardment_damage_moderate: "§YMittlerer§!"
 bombardment_damage_massive: "§RMassiver§!"
 bombardment_voidworm_invasion_desc_common: "$bombardment_voidworm_invasion$ töten die Bevölkerung und erschaffen neue Leerenwurm-Nymphen.\n- §YMittlerer§! Schaden an §YArmeen§!\n- [GetVoidwormFleetBombardmentDamageIntensity] Schaden an §YPlaneten§! bis §Y25%§! Verwüstung\n- §YMittlerer§! Schaden an §YBewohnern§!"
 bombardment_voidworm_invasion: "Leerenwurmsporen"
 bombardment_voidworm_invasion_desc: "$bombardment_voidworm_invasion_desc_common$\n- Wird §RNICHT§! die letzten §Y$MIN_POPS$§! £pop£ §HBewohner§! töten"
 bombardment_voidworm_invasion_crisis: "$bombardment_voidworm_invasion$ (Krise)"
 bombardment_voidworm_invasion_crisis_desc: "$bombardment_voidworm_invasion_desc_common$"
 bombardment_frenzied_voidworm_invasion: "Mutierte $bombardment_voidworm_invasion$"
 bombardment_frenzied_voidworm_invasion_desc: "- Verwüstete Planeten werden zu §YZerborstenen Welten§!"
 alert_space_fauna_bombardment_title: "Leerenwürmer bombardieren unsere Kolonie!"
 alert_space_fauna_bombardment_instant: "Unsere Kolonie wird von galaktischen Parasiten bombardiert!\nSie beschießen die Welt mit einer begrenzten Menge an Sporen, die sich innerhalb der Bevölkerung verteilen, und sie werden bald wieder verschwinden."
 ALERT_SPACE_FAUNA_BOMBARDMENT_DETAIL: "$PLANET_NAME|Y$ im $SYSTEM_NAME|Y$-System. Noch zu verschlingende Bewohner: §Y$POPS_TO_KILL$§!."
 grand_archive.2195.name: "Galaktische Parasiten"
 grand_archive.2195.desc.common_1: "[from.GetName] wird angegriffen.\n\nEine riesige Anzahl Leerenwürmer befindet sich in der Umlaufbahn der Kolonie und bombardiert sie mit parasitären Zysten."
 grand_archive.2195.desc.common_2: "Eine biologische Analyse deutet darauf hin, dass jeder Leerenwurm nur über einen begrenzten Vorrat an Zysten verfügt, die er verteilen kann, und es ist wahrscheinlich, dass sie weiterziehen werden, sobald diese aufgebraucht sind. Bis dahin werden wir jedoch einen erheblichen Bevölkerungsverlust erleiden."
 grand_archive.2195.desc.default: "$grand_archive.2195.desc.common_1$\n\nJede Zyste enthält giftige Sporen, die nicht nur für unsere Kolonisten, sondern für alles Leben extrem tödlich sind. Nach der Aufnahme verwandelt sich die Zyste in eine Nymphe, die sich gewaltsam entpuppt und ihren Wirt vollständig vernichtet. Jede Nymphe verfügt über eine Blase mit komprimierten Gasen, die es ihr erlaubt, in die obere Atmosphäre aufzusteigen, wo sie sich instinktiv zu einem vorbestimmten Ziel treiben lässt.\n\n$grand_archive.2195.desc.common_2$"
 grand_archive.2195.desc.rocks: "$grand_archive.2195.desc.common_1$\n\nJede Zyste enthält giftige Sporen, die für die gesamte heimische Fauna extrem tödlich sind. Nach der Aufnahme verwandelt sich die Zyste in eine Nymphe, die sich gewaltsam entpuppt und den Wirtskörper vollständig vernichtet. Die Nymphen, die sich normalerweise von Asteroiden ernähren - deren Edelmetallen wegen -, jagen und laben sich an unseren ungeschützten [this.GetColonistPlural]. Jedes Jungtier verfügt über eine Blase mit komprimierten Gasen, die es ihm erlaubt, in die obere Atmosphäre aufzusteigen, wo es sich instinktiv zu einem vorbestimmten Ziel bewegt.\n\n$grand_archive.2195.desc.common_2$"
 grand_archive.2195.a: "Beunruhigend ..."
 grand_archive.2195.a.homicidal: "Alle werden sterben."
 ap_galactic_contender_voidworms_tt: "$MOD_DIPLO_WEIGHT_MULT$: §G+20%§!\n$mod_damage_vs_country_type_fallen_empire_mult$: §G+$@ap_galactic_contender_dmg_mult|0%$§!\n$mod_damage_vs_country_type_awakened_fallen_empire_mult$: §G+$@ap_galactic_contender_dmg_mult|0%$§!\n$mod_damage_vs_country_type_gate_builders_mult$: §G+$@ap_galactic_contender_dmg_mult|0%$§!\n$mod_damage_vs_country_type_voidworms_mult$: §G+$@ap_galactic_contender_dmg_mult|0%$§!"
 ap_defender_of_the_galaxy_voidworm_modifier_desc: "$mod_damage_vs_country_type_voidworms_mult$: §G+$@ap_defender_of_the_galaxy_voidworm_dmg_mult|0%$§!\n$ap_defender_of_the_galaxy_modifier_desc$"
