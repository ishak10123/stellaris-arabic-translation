 wealth_distribute_favor_tier_1_tt: "Erhält §Y1§! Gefallen bei jedem Reich."
 wealth_distribute_favor_tier_2_tt: "Erhält §Y2§! Gefallen bei jedem Reich."
 leader_trait_pirate_queen: "Piratenkönigin"
 leader_trait_pirate_queen_desc: "Viele Jahre voller Betrügereien und waghalsiger Raubzüge haben eine Anführerin hervorgebracht, die sich nie mit weniger zufrieden gibt als ursprünglich geplant."
 captain_ness_leader_desc: "Das Bewusstsein einer uralten Piratenkönigin in eine mechanische Form gegossen. Sie hat zahlreiche Welten mit Schätzen gefüllt."
 captain_ness_leader_catch_phrase: "Lasst uns gemeinsam ein Vermächtnis aufbauen."
