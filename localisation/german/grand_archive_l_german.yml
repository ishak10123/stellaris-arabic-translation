 grand_archive.4520.desc.default: "$grand_archive.4520.desc.common_1$\n\n$grand_archive.4515.desc.common_2$"
 grand_archive.4555.name: "$grand_archive$ demontiert"
 grand_archive.4555.desc: "Das $grand_archive$ von [from.GetName] im [fromfrom.GetName]-System wurde bei unserer Eroberung des Systems demontiert.\n\nDer von ihm eingenommene Raum wurde an uns zurückgegeben."
 grand_archive.4560.name: "$grand_archive.4555.name$"
 grand_archive.4560.desc.common_1: "Unser $grand_archive$ im [from.GetName]-System wurde nach Aufgabe des Systems demontiert."
 grand_archive.4560.desc.common_2: "Wir konnten den Großteil an Legierungen bergen, der für die ursprüngliche Konstruktion genutzt worden war. Wir werden die Struktur jedoch in einem anderen System vollständig wiederaufbauen müssen, wenn wir die Ausstellung weiterführen wollen."
 grand_archive.4560.desc.specimen: "Alle Exemplare konnten geborgen und sachgemäß eingelagert werden, bis ein neues $grand_archive$ gebaut werden kann."
 grand_archive.4560.desc.fauna: "Die gesamte Weltraumfauna wurde für Ressourcen erlegt."
 grand_archive.4560.desc.specimen_fauna: "$grand_archive.4560.desc.common_1$\n\n$grand_archive.4560.desc.specimen$\n$grand_archive.4560.desc.fauna$\n\n$grand_archive.4560.desc.common_2$"
 grand_archive.4560.desc.specimen_nofauna: "$grand_archive.4560.desc.common_1$\n\n$grand_archive.4560.desc.specimen$\n\n$grand_archive.4560.desc.common_2$"
 grand_archive.4560.desc.nospecimen_fauna: "$grand_archive.4560.desc.common_1$\n\n$grand_archive.4560.desc.fauna$\n\n$grand_archive.4560.desc.common_2$"
 grand_archive.4560.desc.none: "$grand_archive.4560.desc.common_1$\n\n$grand_archive.4560.desc.common_2$"
 grand_archive.4580.name: "Wiederbevölkerung des Vivariums"
 grand_archive.4580.desc: "Mit unserem neuen $grand_archive$ im [from.GetName]-System haben wir endlich die Möglichkeit, den Großteil unseres Vivariums wiederherzustellen.\n\nDas Genmaterial jeder Weltraumfauna, die wir zuvor herangezüchtet hatten, wurde bewahrt und mit einem ausreichenden Ressourceneinsatz können wir daraus neue Schlüpflinge klonen."
 grand_archive.4580.a: "Nein, wir benötigen diese Ressourcen derzeit andernorts."
 grand_archive.4580.b: "Klont die Weltraumfauna."
