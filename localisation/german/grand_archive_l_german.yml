 ### Primal Calling
 origin_primal_calling: "Ruf der Wildnis"
 origin_primal_calling_desc: "Das Rascheln des Grases ... Die dröhnende Stille der Nacht ... Der Wille des Jägers ist scharf und kalt wie das Sternenlicht ...\n\nDiese Zivilisation ist eins mit der Wildnis. Sie sieht sich als Hüterin der unterschiedlichsten (und oft tödlichen) Wildtiere, die auf ihrer Welt heimisch sind - und sie richtet ihren Blick nun gen Himmel. Ihre Mitglieder haben sowohl den Umgang mit Tieren als auch die Viehzucht gemeistert und diese innige Beziehung zur Fauna entsprechend ihrer Ethik ausgebaut. Wie sich diese Beziehung jedoch auf galaktischer Ebene weiterentwickeln wird, bleibt abzuwarten."
 origin_tooltip_primal_calling_effects: "- $HOMEWORLD$$TABBED_NEW_LINE$- $PLANETARY_MODIFIERS$ ['concept_untamed_wilds_mod']\n- $HOME_SYSTEM$ §YWeltraumfauna§! in einem benachbarten System\n- $AVAILABLE_BUILDINGS$ ['concept_wildlife_ranch', £building£ $wildlife_ranch$]\n- Kann beim Erstkontakt mit §YWeltraumfauna§! eine besondere ['concept_primal_calling_stance'] einnehmen\n- $ADDITIONAL_TECHNOLOGIES_STRING$ ['technology:tech_genome_mapping', £society_research£$tech_genome_mapping$]\n- $GUARANTEED_RESEARCH_OPTION_STRING$ ['technology:tech_alien_life_studies', £society£$tech_alien_life_studies$]\n- Erhält nach dem Erstkontakt mit Weltraumfauna Einblicke in ['technology:tech_gravity_wells', £physics_research£$tech_gravity_wells$]\n- Erhält nach dem Fangen von Weltraumfauna die Technologie \"['technology:tech_alien_cloning', £society_research£$tech_alien_cloning$]\"\n- Erhält nach dem Klonen von Weltraumfauna die Technologie \"['technology:tech_controlled_mutations', £society_research£$tech_controlled_mutations$]\""
 START_SCREEN_PRIMAL_CALLING: "Trotz unseres rasanten technologischen Fortschritts haben wir unsere innige Verbindung zu den wilden Tieren unserer Welt bewahrt. Als treue Begleiter unserer Evolution sind sie ebenso unsere Lehrer, wie wir ihre Hüter sind. Wir nehmen nicht mehr von ihnen, als sie geben können, und wir ehren ihr Opfer.\n\nIn den ungezähmten Weiten des Weltraums warten womöglich neue Arten auf uns. Wir werden sie mit demselben Respekt behandeln wie die Geschöpfe unserer Welt. Wir werden ihnen zeigen, wo ihr Platz in unserer Gesellschaft ist, und gleichzeitig werden wir lernen, wo unserer in ihrer ist. Gemeinsam werden wir stärker werden.\n\nDie Sterne haben uns gerufen, und in uns brennt ein urtümliches Verlangen. Was auch immer da draußen auf uns wartet: Wir sind entschlossen, es zu ergründen."
 leader_trait_trophy_hunter: "Trophäenjäger"
 leader_trait_trophy_hunter_desc: "Dieser durch seine lebenslange Erfahrung abgehärtete Kommandant besitzt ein unheimliches Verständnis für Weltraumfauna. Der Schlüssel zu einer erfolgreichen Jagd liegt darin, wie seine Beute zu denken - doch natürlich bringt nur der perfekte Schuss eine perfekte Trophäe hervor."
 leader_trait_gifted_trapper: "Fallensteller"
 leader_trait_gifted_trapper_desc: "Ein erfahrener Forscher, der beim Fangen und Transportieren lebender Exemplare größte Sorgfalt walten lässt. Dieser Anführer sorgt sich so sehr um das Wohlergehen der von ihm gefangenen Kreaturen, dass er eine Inspiration für andere darstellt und die Forschungsstandards in allen Disziplinen verbessert."
 leader_trait_void_hunter: "Leerenjäger"
 leader_trait_void_hunter_desc: "Ein erfahrener Jäger, der weiß, wie man Großwild erlegt. Er pirscht sich geduldig an seine Beute an und schlägt präzise zu."
 leader_trait_void_hunter_2: "$leader_trait_void_hunter$ II"
 leader_trait_void_hunter_2_desc: "$leader_trait_void_hunter_desc$"
 leader_trait_void_tracker: "Leerenfährtenleser"
 leader_trait_void_tracker_desc: "Dieser Anführer hat ein unvergleichliches Talent, wilde Weltraumfauna effizient und sicher zu fangen."
 leader_trait_void_tracker_2: "$leader_trait_void_tracker$ II"
 leader_trait_void_tracker_2_desc: "$leader_trait_void_tracker_desc$"
 #First Contacts
 first_contact_critters.15.desc.primal_calling: "Bemerkenswerterweise steht im Zentrum einer jeden §HTiyanki§!-Herde eine matriarchale Hierarchie, wobei jeweils eine einzelne Kuh die Gruppe anführt. Die Weibchen haben bei allen Nahrungsressourcen Vorrang, um nahrhafte Gase für ihre Jungen zu erzeugen und die Schule durch die Weite des Alls zu lenken. Die Bullen verzichten auf Nahrung, wenn die Ressourcen knapp sind, und suchen danach, während die Herde ruht."
 first_contact_critters.25.desc.primal_calling: "Bis auf die jüngsten Exemplare werden all diese Lebewesen von quasi-unabhängigen Organismen begleitet, die über RNA-haltige Sekrete gesteuert werden. Diese \"Geißeln\" greifen in komplexen Angriffsmustern an, weshalb §H\"Weltraumamöben\"§! trotz ihres scheinbaren Mangels an Intelligenz äußerst geschickte natürliche Räuber sind."
 first_contact_critters.35.desc.primal_calling: "Diese Weltraumwesen scheinen über chromatische Veränderungen im gebrochenen Licht miteinander zu kommunizieren. Obwohl dieses Medium ein hohes Potenzial für komplexe Ausdrücke hat, nutzen diese halb empfindungsfähigen Lebensformen es nur in einfacher Weise. Farbveränderungen zeigen den Status in der Gruppe, Aggression und sogar den Fruchtbarkeitszustand an."
 grand_archive.2005.desc.primal_calling: "Diesen parasitären Kreaturen fehlt die natürliche Fähigkeit, sich zu vermehren, weshalb sie darauf angewiesen sind, auf Planeten geborene Wirte zu finden. Diese §H\"Leerenwürmer\"§! müssen auf bewohnten Planeten genügend organisches Material ernten, um in ihren Dreigespannen zur Paarung, den sogenannten \"Troikas\", ein für ihre Fortpflanzung unerlässliches Hormon zu erzeugen. Als hermaphroditische Lebewesen wird die Auswahl der Partner in erster Linie durch komplementäre körperliche Merkmale und eine passende Größe bestimmt."
 grand_archive.2900.desc.primal_calling: "Wir glauben, die Kreaturen wählen ihre Asteroiden sowohl nach der Mineralzusammensetzung als auch nach der Größe aus. Das erste Exemplar, auf das wir stießen, zeigte zwar eine biologische Vorliebe für [GetCommonMineral], doch wir vermuten, jedes Individuum entwickelt eine solche Anpassung auf der Grundlage seiner aktuellen Umgebung. Scans zeigen, dass Spuren dieses Metalls im gesamten Wirtsasteroiden sowie im Nervensystem und im Verdauungstrakt dieser §H\"Cutholoiden\"§! vorhanden sind."
 COMMON_MINERAL_1: "Kobalt"
 COMMON_MINERAL_2: "Platin"
