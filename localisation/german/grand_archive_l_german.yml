 resolution_cutholoid_eradication_desc: "Schiffsverschlingenden Cutholoiden sollte nicht gestattet sein, in zivilisierten Systemen zu existieren. Diese Kreaturen müssen um jeden Preis ausgerottet werden."
 resolution_cutholoid_eradication_tooltip: "Jedes Reich, das §Y$cutholoids_plural$§! innerhalb seiner Grenzen hat, begeht einen §RBruch des Galaktischen Gesetzes§!, bis die Kreaturen vernichtet wurden."
 resolution_repeal_cutholoid_eradication: "§R\"$resolution_cutholoid_eradication$\" widerrufen§!"
 resolution_repeal_cutholoid_eradication_desc: "[global_event_country.GetGalCommunityOrGalImperiumDE3Cap] existiert nicht zu dem Zweck, um die Ausrottung der Cutholoiden-Spezies zu befürworten."
