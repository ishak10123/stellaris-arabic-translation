 grand_archive.2000.name: "Eine Vielzahl von Stimmen"
 grand_archive.2000.desc: "Unsere Sensoren haben die Anwesenheit von etwas im [This.System.GetName]-System aufgefangen, was rudimentäre Signale durch die Galaxie schickt. Dieselben Muster wurden ebenfalls von Langstreckenscannern aufgefangen, die auf einen uns unbekannten Teil des Weltraums gerichtet sind. Wir wissen nicht, ob diese Signale natürlichen oder künstlichen Ursprungs sind. Eine weitere Untersuchung ist erforderlich."
 grand_archive.2000.a: "Findet mehr heraus."
 fcsum_voidworms_2: "Es hat sich herausgestellt, dass es sich bei §H[This.ContactCountry.GetName]§! um einen galaktischen Parasiten mit dem Namen \"Leerenwurm\" handelt."
 grand_archive.2005.name: "$NAME_Voidworms$"
 grand_archive.2005.desc: "Wir haben herausgefunden, dass die weit entfernten Signale von einem einfachen Weltraumorganismus stammen, den wir \"§H$NAME_Voidworms$§!\" nennen. Offenbar wimmelt es in der Galaxie nur so von diesen Kreaturen. Aus den unterschiedlichen Wellenlängen der Signale haben wir geschlussfolgert, dass diese Wesen mehrere Wachstumsstadien durchlaufen, bevor sie ihre endgültige Reife erreichen. Obwohl sie äußerlich nicht aggressiv wirken, deuten ihre Kommunikationsmuster darauf hin, dass sie sich auf galaktischer Ebene koordinieren können."
 grand_archive.2005.a.homicidal: "Stumpfsinnige Bestien, die erlegt werden müssen."
 grand_archive.2015.name: "Leerenwurm-Enzyme"
 grand_archive.2015.desc: "Leerenwürmer paaren sich in Dreiergruppen, die man \"Troikas\" nennt. Durch ihr niemals endendes Paarungsritual binden sich diese Kreaturen fürs Leben. Sie benötigen jedoch einen externen biologischen Wirt, um Nachkommen zu produzieren.\n\nSie sind Parasiten.\n\nSobald ein Leerenwurm seine volle Reife erreicht, entwickelt er eine Reihe Zysten an seinen Fortpflanzungsorganen. Diese Zysten dienen dem Schutz und enthalten hochgradig ätzende Gameten, die - sollten sie mit den Gameten eines anderen Leerenwurms in der Troika in Berührung kommen - zu Planeten mit geeigneter Biomasse geschickt werden können, um neue Leerenwurm-Nymphen zu gebären. Ihre Wirte überleben diesen Prozess nicht. Es gibt Anzeichen dafür, dass die Leerwürmer ihre Bombardierungen so koordinieren, dass sie in der gesamten Galaxis eine nachhaltige Anzahl lebensfähiger Wirte erhalten.\n\nWir glauben, wir können diese Fortpflanzungsenzyme zu unserem eigenen Vorteil nutzen. Vielleicht entwickeln wir sogar eine Immunität gegen ihre Fortpflanzungsbemühungen."
 grand_archive.2015.a: "Nutzen wir ihre Furchtbarkeit für unsere eigenen Bedürfnisse."
 grand_archive.2015.b: "Ekelhaft. Findet ein Heilmittel."
