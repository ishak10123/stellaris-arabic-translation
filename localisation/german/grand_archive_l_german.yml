 sm_voidlure: "Leerenköder"
 sm_voidlure_desc: "Leerenköder entsenden Signale in die Tiefe des Weltraums, um jene Organismen anzulocken, die in der Leere Schutz suchen."
 sm_voidlure_desc_know_fauna: "Leerenköder entsenden Signale in die Tiefen des Weltraums, um bestimmte Arten von Weltraumfauna anzulocken. Der Köder muss dazu in dem von der Kreatur bevorzugten Systemtyp geschaffen werden. Angelockte Kreaturen werden 1 Jahr lang temporär fügsam."
