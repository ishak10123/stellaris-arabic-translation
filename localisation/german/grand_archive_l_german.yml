 mineral_insight: "Mineralieneinblicke"
 void_mining: "Leerenbergbau"
 cultural_enrichment: "Kulturelle Bereicherung"
 auctioneering_curation: "Kurationsversteigerung"
 historical_insight: "Geschichtseinblicke"
 lessons_from_the_past: "Lektionen aus der Vergangenheit"
 grand_archive.4105.name: "$leviathans.500.name$"
 grand_archive.4105.desc.common.aesthetic_wonder: "[GetCuratorsDesignation] Eure Sorgfalt bemerkt, mit der Ihr \"§Y$EXHIBITION_AESTHETIC_WONDERS$§!\" sammelt und bewahrt. Überall in unserer Galaxie lässt sich Schönheit finden, wenn man nur genau hinsieht."
 grand_archive.4105.desc.common.historical_item: "[GetCuratorsDesignation] Eure Sorgfalt bemerkt, mit der Ihr Exemplare, die die \"§Y$EXHIBITION_GALACTIC_HISTORY$§!\" veranschaulichen, sammelt und bewahrt. Mit dieser Sammlung macht ihr jene unsterblich, denen diese Objekte einst gehörten."
 grand_archive.4105.desc.common.xeno_geology: "[GetCuratorsDesignation] Eure Sorgfalt bemerkt, mit der Ihr Exemplare der \"§Y$EXHIBITION_XENO_GEOLOGY$§!\" sammelt und bewahrt. Die Geschichte unserer Galaxie liegt oft in Fels und Stein verborgen."
 grand_archive.4105.desc.1.common: "[GetStage1Description]\n\nMöge dies ein Ansporn sein, um Euer großartiges Werk fortzuführen."
 CURATORS_STAGE_1_DESC: "Eure Sammlung ist beindruckend. Wir würden Euch gern unsere Dienste anbieten. Im Interesse der galaktischen Bewahrung könnt Ihr einen unserer Spezialisten haben, der Euch in einem von Euch gewählten Bereich unterstützen wird."
 DEAD_CURATORS_STAGE_1_DESC: "Trotz der Zerstörung unserer Enklave möchten wir Euch im Interesse der galaktischen Bewahrung unsere Dienste anbieten. Wir können Euch in einem Bereich Eurer Wahl unterstützen."
 grand_archive.4105.desc.1.xeno_geology: "$grand_archive.4105.desc.common.xeno_geology$\n\n$grand_archive.4105.desc.1.common$"
 grand_archive.4105.desc.1.aesthetic_wonder: "$grand_archive.4105.desc.common.aesthetic_wonder$\n\n$grand_archive.4105.desc.1.common$"
 grand_archive.4105.desc.1.historical_item: "$grand_archive.4105.desc.common.historical_item$\n\n$grand_archive.4105.desc.1.common$"
 grand_archive.4105.1.mineral_insight: "Helft uns bei Ausgrabungen in unseren Kolonien."
 grand_archive.4105.1.void_mining: "Helft uns bei Ausgrabungen im All."
 grand_archive.4105.1.cultural_enrichment: "Helft uns dabei, ihren Ruhm zu verbreiten."
 grand_archive.4105.1.auctioneering_curation: "Helft uns, ein geeignetes Zuhause für diese Exemplare zu finden."
 grand_archive.4105.1.historical_insight: "Zeigt uns, wo wir mehr über die Geschichte lernen können."
 grand_archive.4105.1.lessons_from_the_past: "Leitet unsere Anführer mit dem Wissen der Vergangenheit."
 grand_archive.4105.1.no: "Jetzt ist nicht der richtige Zeitpunkt."
