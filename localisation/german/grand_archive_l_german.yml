 VOIDWORMS_LABEL_TOOLTIP: "§H$VOIDWORMS_LABEL$§!\nDies legt fest, wie viele $voidworms_plural$ in der Galaxie anzutreffen sind.$requires_grand_archive$"
 CUTHOLOIDS_LABEL: "$cutholoids_plural$"
 CUTHOLOIDS_LABEL_TOOLTIP: "§H$CUTHOLOIDS_LABEL$§!\nDies legt fest, wie viele $cutholoids_plural$ in der Galaxie anzutreffen sind.$requires_grand_archive$"
