 #Event chain
 treasure_hunters_origin_story_chain_title: "Der geheimnisvollen Karte folgen"
 treasure_hunters_origin_story_chain_desc: "Wir haben eine mysteriöse §H$celestial_chart$§! gefunden und begeben uns nun auf unser bisher größtes Abenteuer. Wer weiß, wo uns diese Karte hinführen wird und welche Gefahren während der Reise auf uns warten?"
 treasure_hunters_hidden_system_1_poi: "[prev.GetName] suchen"
 treasure_hunters_hidden_system_1_poi_desc: "Die Karte, die wir in einer alten Orbitalkapsel gefunden haben, führt zu einem verborgenen System mit dem Namen [prev.GetName]. Wenn wir mehr herausfinden möchten, müssen wir selbst dorthin reisen."
 treasure_hunters_explore_system_1_poi: "[treasure_hunters_hidden_system_1.GetName] erkunden"
 treasure_hunters_explore_system_1_poi_desc: "Da wir die §Y$NAME_BlackNeedle$§!-Flotte besiegt haben, können wir nun unsere Suche fortsetzen. Die §H$celestial_chart$§! führte uns zu diesem System, von dem wir vermuten, dass hier der nächste Teil der Karte versteckt ist."
 black_needle_fleet_poi: "Schwarznadel-Flotte"
 black_needle_fleet_poi_desc: "Eine organisierte Piratenflotte lockte uns im [from.GetName]-System in einen Hinterhalt. Die Piraten versuchen, unsere §H$celestial_chart$§! zu stehlen, und waren auf unsere Ankunft vorbereitet."
 smeegibb_shelter_system_1_poi: "[prev.GetName] suchen"
 smeegibb_shelter_system_1_poi_desc: "Die §H$celestial_chart$§! hat ein weiteres verborgenes System offenbart. Dieses trägt den Namen \"[prev.GetName]\". Wir müssen uns auf die Reise dorthin begeben und ergründen, was uns dort erwartet."
 smeegibb_shelter_system_2_poi: "Nach [smeegibb_system.GetName] reisen"
 smeegibb_shelter_system_2_poi_desc: "Wir konnten die Kommunikation zu $NAME_Smeegibb$ nicht wiederherstellen. Da dies unsere einzige Spur zum nächsten Teil der §H$celestial_chart$§! ist, sollten wir ins [smeegibb_system.GetName]-System zurückkehren und die Lage vor Ort überprüfen. Der Grund für diesen plötzlichen Kommunikationsabbruch ist uns derzeit nicht bekannt."
 black_needle_fleet_2_poi: "$NAME_CaptainInax$ besiegen"
 black_needle_fleet_2_poi_desc: "Die §Y$NAME_BlackNeedle$§!-Piraten haben uns erneut angegriffen, unseren Kontakt $NAME_Smeegibb$ getötet und das [from.GetName]-System blockiert. Wir glauben, der vierte Teil der §H$celestial_chart$§! ist irgendwo auf der Oberfläche von [smeegibb_shelter.GetName] verborgen.\n\nWir müssen die feindliche Flotte besiegen, wenn wir nach der Kapsel suchen wollen."
