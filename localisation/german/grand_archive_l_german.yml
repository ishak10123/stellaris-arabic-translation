 #Space Fauna Description #
 ###########################
 space_amoeba_desc: "Weltraumamöben sind einsame Räuber, die auf alles, was ihnen begegnet, aggressiv reagieren. Sie werden von ihrer teilweise herangewachsenen Brut, die als \"Geißeln\" bekannt ist, unterstützt und sind äußerst geschickt darin, ihre Beute zu jagen."
 tiyanki_desc: "Die auch als \"Weltraumwale\" bekannten Tiyanki sind normalerweise sanftmütige Lebewesen, die an atmosphärischen Gasen grasen. Diese Kreaturen zeigen einen extremen Gemeinschaftssinn, und in freier Wildbahn sind ihre Schulen nach einer strengen Hierarchie organisiert."
 voidworm_desc: "Leerenwürmer sind parasitäre Organismen, die Sporen auf besiedelten Welten mit geeigneter Biomasse verteilen, um sich zu reproduzieren. Ausgewachsene Exemplare bilden Dreiergruppen, die auch als \"Troika\" bekannt sind, und errichten Nester unweit von schwarzen Löchern, in denen sie ihre Jungen aufziehen."
 cutholoid_desc: "Cutholoide sind gewaltige Organismen, die Asteroiden bewohnen, um ihre ansonsten weichen Körper zu schützen. Diese Kreaturen verschlingen ihre Beute in einem Stück und nutzen ihre radioaktive Verdauungsflüssigkeit, um sie dann langsam aufzulösen."
 crystalline_entity_desc: "Kristallwesen sind einzigartige silikatbasierende Lebewesen, die sich frei durch den Raum bewegen. Der variable Farbton hängt nicht von ihrem Alter ab, sondern spiegelt ihre innere Ladung wider."
 wild_tiyanki_ox_modifier: "Wilder Tiyanki-Ochse"
 fauna_disengagement_modifier: "Weltraumfauna-Rückzug"
