 the_grand_archive: "Das Großarchiv"
 grand_archive_0: "$grand_archive$"
 grand_archive_0_DESC: "Eine besondere Orbitalstruktur, die der Unterbringung und Ausstellung der bemerkenswertesten ['concept_specimen', Exemplare] dient, die wir in der Galaxie gefunden haben, darunter auch §YWeltraumfauna§!."
 grand_archive_0_MEGASTRUCTURE_DETAILS: "Das §Y$grand_archive$§! bewahrt die wertvollsten Artefakte auf, die wir aus der gesamten Galaxie zusammengetragen haben, und stellt diese aus. Es enthält auch ein eigenes Vivarium, um lebendige §YWeltraumfauna§! unterzubringen und zu beobachten."
 requires_grand_archive: "$dlc_requirement_string$ §IGrand Archive§!"
 GOTO_COLLECTION: "$COLLECTION$ anzeigen"
 must_have_2500_pops: "Erfordert, dass ein Himmelskörper mit mindestens §Y2500§! £pop£ §HBewohnern§! vorhanden ist."
