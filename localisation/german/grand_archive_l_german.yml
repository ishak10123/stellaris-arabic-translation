 CUTHOLOID_DEBRIS_PROJECT_DESC: "Wir haben eine riesige Kreatur vernichtet, die sich in einem Asteroiden versteckt hielt. Die Überreste dieser Kreatur könnten sich als sehr nützlich für uns erweisen."
