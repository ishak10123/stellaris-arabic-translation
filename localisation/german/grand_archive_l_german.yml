 grand_archive.4006.desc.default: "Unsere Wissenschaftler sind der Meinung, es wäre für uns von großem Nutzen, unser neuestes Exemplar, §Y[This.GetLastAcquiredSpecimenName]§!, $grand_archive.4006.desc.common$"
 grand_archive.4006.desc.no_specimen: "Unsere Wissenschaftler sind der Meinung, es wäre für uns von großem Nutzen, unser neuestes Exemplar $grand_archive.4006.desc.common$"
 grand_archive.4006.desc.common: "öffentlich in einem §Y$grand_archive$§! auszustellen.\n\nDieses Vorhaben in die Tat umzusetzen, erfordert eine hohe Anfangsinvestition, doch der potenzielle kulturelle und wissenschaftliche Nutzen könnte unbezahlbar sein."
 grand_archive.4006.a: "Wir sollten dieses Unterfangen weiter verfolgen."
 grand_archive.4006.b: "Jetzt ist nicht der richtige Zeitpunkt."
 r_preservation_chamber: "Aufbewahrungskammer"
 r_preservation_chamber_desc: "Eine fortschrittliche Maschine, die den Raum dergestalt komprimiert, dass er zu einem späteren Zeitpunkt wiederhergestellt werden kann. Die ursprünglichen Schöpfer nutzten sie dazu, Wesen einzusperren, die viel zu mächtig waren, um sie zu bändigen. Obwohl sie keine Eingaben mehr annimmt, birgt sie noch viele Geheimnisse, die sie preisgeben kann."
 preservation_chamber_triumph_tt: "Fügt dem Vivarium 2 außergewöhnliche erwachsene Weltraumfauna-Exemplare derselben zufälligen Spezies hinzu."
