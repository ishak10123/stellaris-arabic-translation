 grand_archive.9005.name: "[fromfrom.GetName] gefangen genommen"
 grand_archive.9005.desc: "§H[fromfrom.GetClass]§! §Y[fromfrom.GetName]§! wurde von [from.GetName] während der Schlacht im [fromfromfrom.GetName]-System gefangen genommen. Man fordert ein Lösegeld im Tausch für [fromfrom.GetHisHer] Leben."
 grand_archive.9005.desc.second: "Wie zuvor berichtet wurde Kommandant [fromfrom.GetName] von [from.GetName] gefangen genommen. Man fordert nun Lösegeld im Tausch für [fromfrom.GetHisHer] Leben."
 grand_archive.9005.a: "Zahlt das Lösegeld."
 grand_archive.9005.a.tt: "[fromfrom.GetName] kehrt in unsere Reihen zurück."
 grand_archive.9005.b: "Wir sollten darüber nachdenken."
 grand_archive.9005.c: "Wir verhandeln nicht!"
 grand_archive.9010.name: "Über die Planke gehen"
 grand_archive.9010.desc: "Da [from.GetName] unwillig war, das Lösegeld für Kommandant [fromfrom.GetName] zu bezahlen, bleibt [fromfrom.GetHeShe] in unserem Gewahrsam. Wie soll [fromfrom.GetHisHer] Schicksal aussehen?"
 grand_archive.9010.a: "Richtet [fromfrom.GetIhnSieDE] öffentlich hin."
 grand_archive.9010.b: "Entlasst den Gefangenen auf [this.GetHomeWorldName] in die Freiheit."
 grand_archive.9010.c: "[fromfrom.GetHeSheCap] bleibt weiter inhaftiert."
 MESSAGE_LEADER_CAPTURED_TITLE: "Gefangennahme eines feindlichen Kommandanten"
 MESSAGE_LEADER_CAPTURED_DESC: "Wir konnten während der letzten Schlacht einen feindlichen Kommandanten gefangen nehmen. Wir haben $COUNTRY$ bereits kontaktiert, um Lösegeld für die sichere Rückkehr zu fordern."
 MESSAGE_LEADER_RANSOM_PAID_TITLE: "Lösegeld bezahlt"
 MESSAGE_LEADER_RANSOM_PAID_DESC: "Wir haben eine Lösegeldzahlung aus [this.GetName] erhalten, damit ihr Kommandant [fromfrom.GetName] sicher zurückkehren kann."
