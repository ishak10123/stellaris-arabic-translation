 hide_presence_starbase_modifier: "$approach_frenzied_voidworms_hide_presence$"
 frenzied_voidworms_killed.desc.common: "Das größte Nest der sonderbar mutierten Leerenwürmer wurde verschont. Es steht jetzt unter unserer Kontrolle und erlaubt es uns, mehr dieser einzigartigen Kreaturen heranzuzüchten, ohne zu riskieren, dass sie sich ungehindert vermehren und in der Galaxie ausbreiten."
 grand_archive.1165.name: "Mutierte Leerenwürmer vernichtet"
 grand_archive.1165.desc.common: "Da wir nicht auf ihren Angriff warten wollten, führten wir selbst einen Militärschlag gegen die mutierten Leerenwürmer in ihrem Heimatsystem durch. Die Bedrohung, die von diesen Kreaturen ausging, stellt keine Gefahr mehr für [frenzied_voidworms_target.GetName] dar. Die Sicherheit unseres Planeten"
 grand_archive.1165.desc.default: "$grand_archive.1165.desc.common$ und die der gesamten Galaxie wurde wiederhergestellt.\n\n$frenzied_voidworms_killed.desc.common$"
 grand_archive.1165.desc.homicidal: "$grand_archive.1165.desc.common$ wurde wiederhergestellt.\n\n$frenzied_voidworms_killed.desc.common$"
 grand_archive.1165.a: "Sieg!"
 grand_archive.1170.name: "Mutierte Leerenwürmer eliminiert"
 grand_archive.1170.desc.common: "Die mutierten Leerenwürmer wurden eliminiert. Die Bedrohung, die von diesen Kreaturen ausging, stellt keine Gefahr mehr für [frenzied_voidworms_target.GetName] dar. Die Sicherheit unseres Planeten"
 grand_archive.1170.desc.default: "$grand_archive.1170.desc.common$ und die der gesamten Galaxie wurde wiederhergestellt.\n\n$frenzied_voidworms_killed.desc.common$"
 grand_archive.1170.desc.homicidal: "$grand_archive.1170.desc.common$ wurde wiederhergestellt.\n\n$frenzied_voidworms_killed.desc.common$"
 grand_archive.1170.a: "$grand_archive.1165.a$"
 grand_archive.1180.name: "Entdeckung mutierter Leerenwürmer"
 grand_archive.1180.desc: "Nachdem wir einen Haufen Leerenwürmer in der Nähe ihres Nests eliminiert hatten, entdeckten wir, dass diese Kreaturen eine einzigartige Mutation aufwiesen.\n\nOffenbar waren sie in der Lage, sich auf nicht-parasitäre Art zu reproduzieren, und sie zeigten eine erhöhte Aggression, was ihre unnatürliche Stärke und Zähigkeit erklären würde.\n\nGlücklicherweise haben wir eines ihrer Nester als Trophäe verschont. Es steht jetzt unter unserer Kontrolle und erlaubt es uns, weitere Exemplare dieser einzigartigen Kreaturen heranzuzüchten, ohne zu riskieren, dass sie sich ungehindert vermehren und die Galaxie verwüsten."
 grand_archive.1180.a: "Unerwartet, aber höchst willkommen."
 grand_archive.1185.name: "Leerenwürmer eliminiert"
 grand_archive.1185.desc: "Wir haben in Erfahrung bringen können, dass die mutierten Leerenwürmer, die unsere Kolonie gefährdeten, eliminiert wurden.\n\nDies kam zwar unerwartet, ist aber sehr willkommen. Wir können uns mit der Tatsache trösten, dass diese Kreaturen nicht länger eine Gefahr für unsere Systeme darstellen."
 grand_archive.1185.a: "Die Galaxie ist sicherer geworden."
 grand_archive.1200.name: "Angriff der Leerenwürmer"
 grand_archive.1200.desc: "Die in Raserei geratenen Leerenwürmer greifen das [frenzied_voidworms_target.solar_system.GetName]-System an!\n\nIhre Aggression hat ihren Höhepunkt erreicht und die aktuelle Flugbahn ihres Hauptschwarms führt direkt zu [frenzied_voidworms_target.GetName].\n\nWir glauben nicht, dass sie vorhaben, Überlebende zurückzulassen."
 grand_archive.1200.a: "Bereitet die Verteidigung vor!"
 grand_archive.1205.name: "Der höchste zu zahlende Preis"
 grand_archive.1205.desc_common: "Trotz all unserer Bemühungen haben die Leerenwürmer [this.GetName] komplett überrannt. Die Bombardierung der in Raserei geratenen Kreaturen war derart brutal, dass der planetare Kern auseinandergerissen wurde. Es gab keine Überlebenden.\n\nDie Würmer sind mittlerweile wieder in ihre Nester zurückgekehrt und nicht mehr durch unsere Anwesenheit aufgebracht. Mit etwas Glück werden sie dort bleiben."
 grand_archive.1205.desc.default: "$grand_archive.1205.desc_common$\n\nAngesichts dieser Tragödie haben wir keine andere Wahl, als weiterzumachen und aus unseren Fehlern zu lernen."
 grand_archive.1205.desc.gestalt: "$grand_archive.1205.desc_common$\n\nDer Verlust unseres Primärschwarms hat [event_target:victim_country.GetName] stark zugesetzt, aber zumindest leben wir weiter."
 grand_archive.1205.a: "Jetzt ist die Zeit für den Wiederaufbau."
 grand_archive.1210.name: "Mutierte Leerenwürmer eliminiert"
 grand_archive.1210.desc: "Die mutierten Leerenwürmer im [From.GetName]-System wurden eliminiert, und damit wurde auch die Zerstörung von [avenged_homeworld.GetName] gerächt.\n\nDas größte Nest der sonderbar mutierten Leerenwürmer wurde verschont. Es steht jetzt unter unserer Kontrolle und erlaubt es uns, mehr dieser einzigartigen Kreaturen heranzuzüchten, ohne zu riskieren, dass sie sich ungehindert vermehren und in der Galaxie ausbreiten.\n\nAuf diese Weise wird das Vermächtnis unserer verlorenen Welt weiterleben."
 grand_archive.1210.a: "$grand_archive.1165.a$"
 grand_archive.1220.name: "Leerenwürmer befriedet"
 grand_archive.1220.desc.common: "Nachdem wir eine riesige Menge an mineralienhaltiger Nahrung direkt zu ihren Nestern schickten, konnten wir eine Art Verbindung zu den mutierten Leerenwürmern im [frenzied_home_system.GetName]-System herstellen. Die Bedrohung, die von diesen Kreaturen ausging, stellt keine Gefahr mehr für [frenzied_voidworms_target.GetName] dar. Die Sicherheit unseres Planeten"
 grand_archive.1220.desc.common_2: "Unsere erfahrensten Tierhüter haben sich um die Bestien gekümmert, und wir sind jetzt an einem Punkt angelangt, an dem sie bereit zu sein scheinen, mit uns zu kooperieren.\n\nSie haben uns eines ihrer Nester überlassen, mit dem wir mehr dieser mutierten Leerenwürmer heranzüchten können, die sich ansonsten unkontrolliert vermehrt und die Galaxie verwüstet hätten."
 grand_archive.1220.desc.default: "$grand_archive.1220.desc.common$ und die der gesamten Galaxie wurde wiederhergestellt.\n\n$grand_archive.1220.desc.common_2$"
 grand_archive.1220.desc.homicidal: "$grand_archive.1220.desc.common$ wurde wiederhergestellt.\n\n$grand_archive.1220.desc.common_2$"
 grand_archive.1220.a: "Eine willkommene Ergänzung für unsere Flotte."
 grand_archive.1220.tt: "Wir übernehmen die Kontrolle über alle in Raserei verfallenen Leerenwurm-Flotten"
 grand_archive.7010.name: "Entwicklung von Leerenködern"
 grand_archive.7010.desc.common: "Unsere Beherrschung der im Weltraum geborenen Organismen hat zur Entwicklung dessen geführt, was wir §YLeerenköder§! nennen."
 grand_archive.7010.desc: "$grand_archive.7010.desc.common$\n\nDiese Sternenbasen-Gebäude müssen innerhalb jenes Systems errichtet werden, in dem die Weltraumfauna heimisch ist. Sobald sie einsatzbereit sind, locken sie regelmäßig Weltraumfauna zur Sternenbasis.\n\nWir sollten jedoch vorsichtig sein, da gewisse Arten von Organismen aggressiv werden könnten."
 grand_archive.7010.desc.primal_calling: "$grand_archive.7010.desc.common$\n\nDiese Apparaturen entsenden Signale in die Weite des Weltraums, um Organismen anzulocken, die in der Leere Schutz suchen. Wir wissen nicht, was genau wir anlocken, doch wir erhalten eine regelmäßige und gespiegelte Antwort auf die derzeit von uns ausgesendeten Frequenzen.\n\nEtwas ist auf dem Weg zu uns."
 grand_archive.7020.name: "Walgesang"
 grand_archive.7020.desc: "Der §YLeerenköder§!, den wir vor Kurzem entwickelt hatten, lockte eine Gruppe Weltraumwale an, die in Systemen mit §YGasriesen§!, wie dem [This.Capital.System.GetName]-System, heimisch sind.\n\nEs scheint, als müssten unsere Apparaturen in solchen Systemen errichtet werden, um ordentlich zu funktionieren. Sollten wir andere Arten von Weltraumfauna entdecken, sollten wir in der Lage sein, Leerenköder auch in der Nähe ihrer natürlichen Habitate zu errichten."
 ### Treasure Hunters
 origin_treasure_hunters: "Schatzjäger"
 origin_treasure_hunters_desc: "Diese abenteuerlustige Zivilisation ist bereit, zu ihrer größten und schwierigsten Expedition aufzubrechen. Mit nichts als einer mysteriösen Karte ausgerüstet reist sie durch die Galaxie und sucht nach einem legendären Piratenschatz."
 origin_tooltip_treasure_hunters_effects: "- Beginnt mit einer inaktiven ['r_celestial_chart_0_desc', $celestial_chart$]\n- Jeder rekrutierte Anführer erhält zusätzlich die Eigenschaft \"['concept_adventurous_spirit_trait']\"$NEW_LINE$- Herrschereigenschaften:$TABBED_NEW_LINE$- ['leader_trait:leader_trait_buccaneer']$TABBED_NEW_LINE$- ['leader_trait:leader_trait_trailblazer']$TABBED_NEW_LINE$- ['leader_trait:leader_trait_treasure_hoarder']"
 START_SCREEN_TREASURE_HUNTERS: "Unsere Zivilisation lässt sich durch ihre Abenteuerlust definieren.\n\nDie Entdeckung verschollener Schätze, die Erforschung alter Ruinen und die Ausgrabung von Artefakten aus einer Zeit, die weit vor unserer liegt: Solche Ereignisse zählen zu unseren berühmtesten Geschichten und haben unsere Gesellschaft über Generationen hinweg inspiriert.\n\nWar es nun Zufall oder Schicksal, dass unser erster Flug in den Weltraum die Abenteuerlust in uns weckte? Eine mysteriöse Kapsel unbekannter Herkunft wurde in der Umlaufbahn unserer Heimatwelt entdeckt. Darin befand sich eine verschlüsselte Karte zu den Sternen.\n\nNach vielen Jahren harter Arbeit verfügen wir nun über die Technologie, um diese Karte zu entschlüsseln und unseren Kurs in unerforschtes Gebiet zu setzen. Während wir die Galaxie bereisen, sind wir entschlossen, uns auf die größte und schwierigste Expedition zu begeben, die wir je unternommen haben."
 d_treasure_planet: "Schatztresor"
 d_treasure_planet_desc: "Ein sicherer Aufbewahrungsort, um Gegenstände von Wert zu organisieren, zu restaurieren und aufzubewahren."
 concept_treasure_vault: "$d_treasure_planet$"
 concept_treasure_vault_desc: "$d_treasure_planet_desc$"
