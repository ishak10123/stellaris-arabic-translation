 tech_thrusters_bio_integration: "Biointegrierte Triebwerke"
 tech_thrusters_bio_integration_desc: "Künstliche Triebwerke können in Weltraumorganismen integriert werden, wenn man die Energieversorgung und die Verbindung zu den neuronalen Motorzentren entsprechend berücksichtigt."
 tech_thrusters_bio_integration_effect: "§HNeue Mechanik:§! Triebwerkverbesserungen für Weltraumfauna"
 tech_hyper_drive_bio_integration: "Biointegrierter Hyperantrieb"
 tech_hyper_drive_bio_integration_desc: "Das Reisen entlang von Hyperraumrouten kann für Weltraumorganismen gefährlich sein. Wir sind in der Lage, ihre Fähigkeiten diesbezüglich zu verbessern."
 tech_hyper_drive_bio_integration_effect: "§HNeue Mechanik:§! Hyperantriebverbesserungen für Weltraumfauna"
 tech_sensors_bio_integration: "Biointegrierter Sensor"
 tech_sensors_bio_integration_desc: "Die verschiedenen Sinnesorgane von Weltraumorganismen lassen sich durch die von uns entwickelte Technologie weiter verbessern, ohne dem Organismus zu schaden."
 tech_sensors_bio_integration_effect: "§HNeue Mechanik:§! Sensorverbesserungen für Weltraumfauna"
 tech_combat_computers_bio_integration: "Biointegrierte Gefechtscomputer"
