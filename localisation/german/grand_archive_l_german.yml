 COMMON_MINERAL_6: "Nickel"
 crystalline_entity_plural: "Kristallwesen"
 grand_archive.1002.name: "Leben inmitten der Sterne"
 grand_archive.1002.desc.default: "Die Leere ist voller Leben! Wir haben [from.GetSpaceFaunaNamePlural] entdeckt und fragen uns, was es da draußen wohl noch gibt.\n\nUnsere innige Verbindung zur Tierwelt auf [capital_scope.GetName] ist im galaktischen Maßstab vielleicht nicht anwendbar. Die Leere des Weltraums stellt ein völlig neues Ökosystem dar und wir befinden uns an einem Scheideweg.\n\nWelchen Stellenwert nehmen diese Kreaturen für uns ein?\n\nWie auch immer unsere Entscheidung aussehen mag: Sie wird uns für die kommenden Jahre prägen."
 grand_archive.1002.desc.homicidal: "Die Leere ist womöglich voller Leben - das wir auslöschen oder nutzen können. Nachdem wir [from.GetSpaceFaunaNamePlural] entdeckt haben, sind wir begierig, noch weitere Arten zu finden. Frische Beute oder Nutztiere: Die Wahl liegt bei uns."
 grand_archive.1002.a: "Exemplare zum Ausstellen."
 grand_archive.1002.b: "Vieh, das wir nutzen können."
 grand_archive.1002.c: "Organismen, die es zu beschützen gilt."
 grand_archive.1002.d: "Neue Beute zum Jagen."
 grand_archive.1002.d.purifier: "Neue Körper für den Leichenhaufen."
 grand_archive.1002.e: "Weitere Bewusstseine, die wir assimilieren können."
 grand_archive.1002.f: "Partner in der Symbiose."
 grand_archive.1002.g: "Beute und Gejagte."
 untamed_wilds: "Ungezähmte Wildnis"
 untamed_wilds_desc: "Ein riesiges geschütztes Territorium, das die heimischen Lebewesen nachhaltig versorgt und es ihnen erlaubt, dort zu gedeihen."
 grand_archive.1010.desc: "Unsere Kolonie auf [Root.GetName] hat gelernt, die territorialen Grenzen der heimischen §Ytitanischen Lebensformen§! zu achten.\n\nDiese gewaltigen Bestien werden für unsere Siedlung auch weiterhin förderlich sein, während wir unsere Grenzen erweitern und das Land erschließen."
 grand_archive.1010.a: "Unsere [owner.GetWranglerJobNamePlural] werden hier gedeihen können."
