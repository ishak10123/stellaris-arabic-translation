 GRAVITY_SNARE_NO_EMERGENCY_FTL: "Gravitationsfallen sind nicht dazu gedacht, einen Not-ÜL-Sprung durchzuführen."
 FLEET_CANNOT_TAKE_ORDERS: "§RDiese Flotte kann keine Befehle entgegennehmen.§!"
 MESSAGE_SPACE_CRITTER_CAPTURE_SUCCESS_TITLE: "Weltraumfauna eingefangen"
 MESSAGE_SPACE_CRITTER_CAPTURE_SUCCESS_DESC: "Der Fangversuch im $SYSTEM|Y$-System war ein voller Erfolg! Die $gravity_snare$ hat das Exemplar bereits im Vivarium untergebracht.\n\nWir haben eine neue Weltraumfauna erhalten:\n$CAPTURED_LIST$$RESOURCES_LIST$"
 MESSAGE_SPACE_CRITTER_CAPTURE_SUCCESS_NO_VIVARIUM_DESC: "Der Fangversuch im $SYSTEM|Y$-System war ein voller Erfolg! Da das §HVivarium§! keinerlei freie Kapazitäten hatte, wurde die gefangene Weltraumfauna eingeschläfert und in Ressourcen umgewandelt.\n$CULLED_LIST$$RESOURCES_LIST$"
 MESSAGE_SPACE_CRITTER_CAPTURE_FAILURE_TITLE: "Fangversuch gescheitert"
 MESSAGE_SPACE_CRITTER_CAPTURE_FAILURE_DESC: "Der Fangversuch im $SYSTEM|Y$-System ist gescheitert. Die $gravity_snare$ unseres Schiffs $SHIP_NAME|Y$ ging dabei verloren."
 MESSAGE_CAPTURED_SPACE_CRITTER_RETURNED_TITLE: "Neue Weltraumfauna"
 MESSAGE_CAPTURED_SPACE_CRITTER_RETURNED_DESC: "Ein neues Exemplar Weltraumfauna wurde im Vivarium untergebracht.\n$NEWBORN_LIST$$CULLED_LIST$$RESOURCES_LIST$"
 MESSAGE_CAPTURED_SPACE_CRITTER_RETURNED_DESC_CULLED: "\n\nDie folgende gefangene Weltraumfauna wurde erlegt und zu Ressourcen verarbeitet:\n$CULLED_LIST$"
 CULLED_CREATURES_RESOURCE_OUTPUT_DESC: "\n\nErhaltene Ressourcen:\n  $RESOURCES_LIST$"
 mod_gravity_snare_cooldown_mult: "Abklingzeit (Gravitationsfalle)"
 MOD_GRAVITY_SNARE_COST_MULT: "Kosten (Gravitationsfalle)"
 MOD_SPACE_FAUNA_CULLING_REWARD_MULT: "Ressourcen durch das Erlegen"
 grand_archive.7210.name: "Gravitationsfallen"
 grand_archive.7210.desc.common: "Mit der kürzlichen Entdeckung von §Y$tech_gravity_wells$§! sind [root.GetAdjective]e Forschungsschiffe jetzt in der Lage, $gravity_snare_plural$ einzusetzen."
 grand_archive.7210.desc.vivarium: "Diese nicht tödlichen Projektile lassen sich nutzen, um Weltraumfauna einzufangen und in ein §YVivarium§! zu transportieren, wo sie sich paaren und neue Exemplare hervorbringen kann.\n\nDas Er- und Zerlegen dieser Kreaturen erlaubt es uns, ihr §Y$genetic_material$§! zu Klonzwecken zu sammeln oder andere Ressourcen zu gewinnen."
 grand_archive.7210.desc.no_vivarium: "Diese nicht tödlichen Projektile lassen sich nutzen, um Weltraumfauna einzufangen und ihr §Y$genetic_material$§! und ihre Ressourcen zu enten.\n\nFalls wir sie zu Fortpflanzungszwecken am Leben halten wollen, müssen wir ein §YVivarium§! errichten. Dies kann entweder in einem §Y$grand_archive$§! oder in §Y[GetHatcheryPlural]§! auf unseren Sternenbasen geschehen."
 grand_archive.7220.name: "Prethoryn-Bestien"
 grand_archive.7220.desc: "Unsere §Y$gravity_snare_plural$§! schaffen es nicht, die §Y$NAME_Prethoryn_Scourge$§! zu verfolgen und einzufangen. Aufgrund ihrer Bewegungsmuster vermuten wir, dass diese Wesen von einer Art höherem Bewusstsein gesteuert werden und keine wirkliche Individualität besitzen.\n\nZu versuchen, einen dieser Organismen in einem Vivarium zu halten, würde unsere anderen Exemplare gefährden und sogar ganz [this.GetName].\n\nWir haben alle Versuche, diese Organismen zu fangen, auf unbestimmte Zeit ausgesetzt."
 grand_archive.7220.a: "Nur eine Vorsichtsmaßnahme ..."
