 FEDERATION_CREATURE_FLEET_DESC: "§HFöderationsflotten§! sind besondere Flotten unter der Kontrolle des Föderationspräsidenten. Diese Flotten können im §HFöderation-$CREATURE_DESIGNER$§! entworfen werden, wobei alle Technologien zur Verfügung stehen, die von Föderationsmitgliedern erforscht wurden. Föderationsflotten kosten keinen Unterhalt, können aber die §HFöderation-Flottenkapazität§! nicht überschreiten, zu der jedes Mitglied §Y$PERC|0%$§! seiner eigenen §HFlottenkapazität§! beiträgt. Wachsen Weltraumfauna-Flotten so weit heran, dass sie die §HFöderation-Flottenkapazität§! übersteigen, gehen überschüssige Kreaturen an den Föderationspräsidenten."
