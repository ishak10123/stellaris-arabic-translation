 concept_space_fauna_ship_component_desc: "Weltraumfauna-Schiffskomponenten können durch die Forschung von Spezialprojekten für verschiedenste Weltraumfauna erlangt werden. Jeder Bonus gilt auch dann, wenn die Komponente einer Weltraumfauna als §HMutation§! hinzugefügt wird. Beispiele für solche Komponenten sind unter anderem:\n- §H$SPACE_WHALE_WEAPON_1$§!\n- §H$AMOEBA_STRIKE_CRAFT$§!"
