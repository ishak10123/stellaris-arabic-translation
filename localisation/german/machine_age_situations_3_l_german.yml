 #TRANSFORMATION STAGE 1
 machine_age.4100.name: "Die Transformation"
 machine_age.4100.desc: "Trotz der klaren Überlegenheit der Maschinenform ist unser Transformationsprozess wegen unserer selbstauferlegten Sicherheitsstandards bestenfalls schrittweise erfolgt und hat zu einer Stagnation geführt. Schlussfolgerung: Drastischere Maßnahmen erforderlich.\n\nExperimente im kleinen Maßstab legen drei Optionen für Wachstum nahe: §YNanotechnologie§! und ihre variablen formverändernden Vorteile, §YModularität§! für individuelle Einheiten, die durch spezifische Eigenschaften optimiert sind, und §YVirtualität§! - die Aufgabe der physischen Form zugunsten einer digitalen Existenz.\n\nBewertungsprozess eingeleitet. Analyse der Optionen und endgültige Auswahl erforderlich."
 machine_age.4110.name: "Transformationsforschung: Naniten"
 machine_age.4110.desc: "Vorläufige Forschungsergebnisse deuten darauf hin, dass elektromechanische Konstrukte, die als §YNaniten§! bekannt sind, einen vielversprechenden Vektor für den Fortschritt darstellen. Sie sind zwar selten, besitzen aber einzigartige Eigenschaften wie Programmierbarkeit, Selbstreplikation sowie die Fähigkeit, eine \"Schwarmintelligenz\" zu bilden.\n\nDiese Technologie bietet uns zahlreiche Transformationsmöglichkeiten, doch es ist unklar, welche Anforderungen die Unterstützung dieser Technologie von uns abverlangt.\n\nPotenzial: Erheblich, skalierbar. Kosten: Unbekannt. Zusätzliche Forschung erforderlich."
 machine_age.4110.a: "Es wird unsere oberste Priorität sein."
 machine_age.4110.a.tt: "Vollständige Forschungsergebnisse in der §YNanotechnologie§!.\n\nSituationsmodifikator \"§Y$situation_transformation$§!\" hinzugefügt:\nForschungsgeschwindigkeit (£engineering£ §YIngenieur§!): §R-20%§!"
 machine_age.4110.b: "Wir investieren einen moderaten Beitrag."
 machine_age.4110.b.tt: "Unvollständige Forschungsergebnisse in der §YNanotechnologie§!.\n\nSituationsmodifikator \"§Y$situation_transformation$§!\" hinzugefügt:\nForschungsgeschwindigkeit (£engineering£ §YIngenieur§!): §R-10%§!"
 machine_age.4110.c: "Es darf unsere laufende Forschung nicht beeinträchtigen."
 machine_age.4110.c.tt: "Begrenzte Forschungsergebnisse in der §YNanotechnologie§!.\n\nSituationsmodifikator \"§Y$situation_transformation$§!\" hinzugefügt:\nForschungsgeschwindigkeit (£engineering£ §YIngenieur§!): §R-5%§!"
 machine_age.4110.d: "Nutzt unser vorhandenes Wissen."
 machine_age.4110.d.tt: "Vollständige Forschungsergebnisse in der §YNanotechnologie§!.\n\nUnsere Vertrautheit mit §YNaniten§! durch frühere Begegnungen erlaubt es uns, nur ein Minimum an Ressourcen für beste Ergebnisse zu investieren.\nSituationsmodifikator \"§Y$situation_transformation$§!\" hinzugefügt:\nForschungsgeschwindigkeit (£society£ §YSozial§!): §R-5%§!\nForschungsgeschwindigkeit (£physics£ §YPhysik§!): §R-5%§!"
 machine_age.4130.name: "Bahnbrechender Durchbruch in der Nanotechnologieforschung"
 machine_age.4130.desc: "Unsere Forschung hat eine faszinierende Anwendung für die §YNanotechnologie§! gefunden. Die Fähigkeit der Naniten, sich neu zu konfigurieren und zu kombinieren, eröffnet uns eine unvergleichbare Vielseitigkeit bei der Schaffung neuer Megaformen aus mehreren Individualdrohnen. Dieselbe Technologie kann auch Nanomaterie erzeugen oder diese weiter umwandeln.\n\nDer Rekonfigurationsprozess benötigt jedoch viel Zeit, Material und Energie. Reichsweite Anpassungen sind notwendig, um den Einsatz zu unterstützen.\n\nDurchführbarkeit: Hoch. Bereits existierende Naniten-Lebensformen stützen diese Prognose."
 machine_age.4130.a.tt: "Situationsmodifikator \"§Y$situation_transformation$§!\" entfernt:\nForschungsgeschwindigkeit (£engineering£ §YIngenieur§!)"
 machine_age.4140.name: "Vielversprechende Entdeckungen in der Nanotechnologieforschung"
 machine_age.4140.desc: "Die Erforschung der §YNaniten§! ist abgeschlossen. Obwohl das volle Ausmaß ihres Potenzials noch unklar ist, haben die Simulationen optimistische Prognosen ergeben. Die Fähigkeiten der Naniten könnten sich als ungeheuer nützlich erweisen, wenn es um die Schaffung spezialisierter Megaformen sowie die Umwandlung von Materie geht.\n\nErste Schätzungen legen nahe, dass der Prozess viel Zeit, Material und Energie benötigt und erhebliche strukturelle Veränderungen erforderlich sind.\n\nDurchführbarkeit: Vielversprechend; transformativ."
 machine_age.4140.a.tt: "Situationsmodifikator \"§Y$situation_transformation$§!\" entfernt:\nForschungsgeschwindigkeit (£engineering£ §YIngenieur§!)"
 machine_age.4150.name: "Bemerkenswerte Entdeckungen in der Nanotechnologieforschung"
 machine_age.4150.desc: "Die Komplexität der Technologie zusammen mit unserem minimalen Forschungsaufwand hat dazu geführt, dass unser Wissen über die §YNaniten§! rudimentär geblieben ist. Unsere begrenzten Entdeckungen umfassen die Nanoreplikation und -rekonfiguration, die es uns erlauben, große Strukturen zu errichten. Zusätzliche Ressourcen sind jedoch erforderlich, um solche Projekte zu unterstützen.\n\nDurchführbarkeit: Uneindeutig."
 machine_age.4150.a.tt: "Situationsmodifikator \"§Y$situation_transformation$§!\" entfernt:\nForschungsgeschwindigkeit (£engineering£ §YIngenieur§!)"
 nanite_replicator: "Nanitenreplikator"
 d_nanites_medium: "$nanite_replicator$ Omega"
 d_nanites_medium_desc: "Ein Komplex aus fein abgestimmten, miteinander verbundenen Naniten-Replikationskammern, der die Selbstreplikationsfähigkeit von Naniten in vollem Umfang verbessert."
 d_nanites_small: "$nanite_replicator$ Alpha"
 d_nanites_small_desc: "Ein Komplex aus Naniten-Replikationskammern, der die Selbstreplikationsfähigkeit von Naniten verbessert."
 d_nanites_tiny: "$nanite_replicator$ Beta"
 d_nanites_tiny_desc: "Ein Komplex aus Naniten-Replikationskammern, der die Selbstreplikationsfähigkeit von Naniten in begrenztem Umfang verbessert."
 #TRANSFORMATION STAGE 2
 machine_age.4210.name: "Transformationsforschung: Modularität"
 machine_age.4210.desc: "Im Vergleich zu den zerbrechlichen und nicht strapazierfähigen organischen Lebensformen bietet der Maschinenkörper eine überlegene Anpassungsfähigkeit. Einige nützliche organische Eigenschaften ließen sich jedoch mit Robotervarianten replizieren.\n\nEine Substanz, die als §YLebendes Metall§! bekannt ist, hat die Fähigkeit, seine Form und seine physische Konsistenz radikal und rasch zu verändern. Die Verschmelzung dieser Substanz mit unseren bestehenden Gehäusen würde ein modulares System der Biomimikry schaffen, mithilfe dessen sich Gliedmaßen und andere Extrusionen für bestimmte Aufgaben spezialisieren lassen.\n\nPotenzial: Enorm; skalierbar. Kosten: Unbekannt. Zusätzliche Daten erforderlich."
 machine_age.4210.a: "Macht das zu unserer obersten Priorität."
 machine_age.4210.a.tt: "Vollständige Forschungsergebnisse in der §YModularität§!.\n\nSituationsmodifikator \"§Y$situation_transformation$§!\" hinzugefügt:\nForschungsgeschwindigkeit (£society£ §YSozial§!): §R-20%§!"
 machine_age.4210.b: "Weist dem Forschungsbereich eine moderate Menge Ressourcen zu."
 machine_age.4210.b.tt: "Unvollständige Forschungsergebnisse in der §YModularität§!.\n\nSituationsmodifikator \"§Y$situation_transformation$§!\" hinzugefügt:\nForschungsgeschwindigkeit (£society£ §YSozial§!): §R-10%§!"
 machine_age.4210.c: "Das darf unsere laufende Forschung nicht beeinträchtigen."
 machine_age.4210.c.tt: "Begrenzte Forschungsergebnisse in der §YModularität§!.\n\nSituationsmodifikator \"§Y$situation_transformation$§!\" hinzugefügt:\nForschungsgeschwindigkeit (£society£ §YSozial§!): §R-5%§!"
 machine_age.4210.d: "Führt Versuche mit der Bevölkerung durch."
 machine_age.4210.d.tt.intro: "Vollständige Forschungsergebnisse in der §YModularität§!.\n\nErlaubt es Wissenschaftlern, unorthodoxe Experimente durchzuführen, um die Forschung zu beschleunigen."
 machine_age.4210.d.individual.tt: "$machine_age.4210.d.tt.intro$\n\n§RTötet 400 $pop_cat_worker_plural$§!\n§RTötet 0-300 $pop_cat_specialist_plural$§!\nFügt den Situationsmodifikator \"§Y$situation_transformation$§!\" hinzu:\nForschungsgeschwindigkeit (£society£ §YSozial§!): §R-5%§!"
 machine_age.4210.d.machine.tt: "$machine_age.4210.d.tt.intro$\n\n§RTötet 400 einfache Drohnen§!\n§RTötet 0-300 $pop_cat_complex_drone_plural$§!\nFügt den Situationsmodifikator \"§Y$situation_transformation$§!\" hinzu:\nForschungsgeschwindigkeit (£society£ §YSozial§!): §R-5%§!"
 machine_age.4230.name: "Bahnbrechende Entdeckungen in der Modularitätsforschung"
 machine_age.4230.desc: "Unsere kompromisslose Forschung hat unsere vorläufige Einschätzung bestätigt: §YLebendes Metall§! lässt sich mit mechanischen Körpern verschmelzen, um die Eigenschaften von Einheiten zu verändern, ohne deren interne Funktionen zu beeinträchtigen. Dies gewährleistet eine maximale, aufgabenbezogene Kompatibilität.\n\nDer groß angelegte Einsatz dieser verschmolzenen modularen Funktionen erhöht voraussichtlich die Ressourcenproduktion aller Sektoren.\n\nDurchführbarkeit: Anpassungsfähig; vielversprechend."
 machine_age.4230.a.tt: "Situationsmodifikator \"§Y$situation_transformation$§!\" entfernt:\nForschungsgeschwindigkeit (£society£ §YSozial§!)"
 machine_age.4240.name: "Akzeptable Entdeckungen in der Modularitätsforschung"
 machine_age.4240.desc: "Unsere modulare Gehäuseforschung hat die anfängliche Hypothese bestätigt: Unsere internen Funktionen sind mit einem Äußeren aus §YLebendem Metall§! kompatibel. Die Transformation ist in ihrem Umfang monumental, und es sind weitere Ressourcen erforderlich, um ihr volles Potenzial auszuschöpfen.\n\nNach der Fertigstellung wird die Leistungssteigerung unsere Ausgaben jedoch schnell amortisieren.\n\nDurchführbarkeit: Vielversprechend."
 machine_age.4240.a.tt: "Situationsmodifikator \"§Y$situation_transformation$§!\" entfernt:\nForschungsgeschwindigkeit (£society£ §YSozial§!)"
 machine_age.4250.name: "Bescheidene Entdeckungen in der Modularitätsforschung"
 machine_age.4250.desc: "Der begrenzte Forschungsumfang hat zu ungenauen Ergebnissen geführt: Obwohl unsere derzeitigen Körper mit §YLebendem Metall§! kompatibel zu sein scheinen, verhindert unsere mangelhafte Wissensbasis die genauere Bewertung realisierbarer Anwendungsfälle.\n\nDurchführbarkeit: Uneindeutig."
 machine_age.4250.a.tt: "Situationsmodifikator \"§Y$situation_transformation$§!\" entfernt:\nForschungsgeschwindigkeit (£society£ §YSozial§!)"
 living_metal_vats: "Lebendmetalltanks"
 d_living_metal_medium: "$living_metal_vats$"
 d_living_metal_medium_desc: "Ein riesiger Komplex voller Tanks zur Herstellung riesiger Mengen von Lebendem Metall."
 d_living_metal_small: "Kleine $living_metal_vats$"
 d_living_metal_small_desc: "Ein Komplex voller Tanks zur Herstellung von Lebendem Metall."
 d_living_metal_tiny: "Miniatur-$living_metal_vats$"
 d_living_metal_tiny_desc: "Eine kompakte Halle voller Tanks zur Herstellung kleinerer Mengen von Lebendem Metall."
 #TRANSFORMATION STAGE 3
 machine_age.4310.name: "Transformationsforschung: Virtualität"
 machine_age.4310.desc: "Die tiefgreifendste Option besteht darin, die Begrenzungen der physischen Form zu überwinden und die Existenz als reine Daten zu akzeptieren. Dieser transformative §YVirtualitätsprozess§! verspricht, den Kern unserer Infrastruktur grundlegend zu verändern.\n\nDrohnen, die an einzelne Körper gebunden sind, werden überflüssig. Sobald unsere Datenströme virtualisiert sind, lassen sie sich bei Bedarf nahtlos in jedes Schiff integrieren.\n\nPotenzial: Gewaltig. Beim weiteren Vorgehen ist äußerste Vorsicht geboten. Zusätzliche Daten angefordert."
 machine_age.4310.a: "Das hat jetzt höchste Priorität."
 machine_age.4310.a.tt: "Vollständige Forschungsergebnisse in der §YVirtualität§!.\n\nSituationsmodifikator \"§Y$situation_transformation$§!\" hinzugefügt:\nForschungsgeschwindigkeit (£physics£ §YPhysik§!): §R-20%§!"
 machine_age.4310.b: "Leitet eine moderate Menge Ressourcen um."
 machine_age.4310.b.tt: "Unvollständige Forschungsergebnisse in der §YVirtualität§!.\n\nSituationsmodifikator \"§Y$situation_transformation$§!\" hinzugefügt:\nForschungsgeschwindigkeit (£physics£ §YPhysik§!): §R-10%§!"
 machine_age.4310.c: "Das ist unsere Zeit nicht wert."
 machine_age.4310.c.tt: "Begrenzte Forschungsergebnisse in der §YVirtualität§!.\n\nSituationsmodifikator \"§Y$situation_transformation$§!\" hinzugefügt:\nForschungsgeschwindigkeit (£physics£ §YPhysik§!): §R-5%§!"
 machine_age.4310.d: "Schöpft Virtualitätsdaten von einem anderen Reich ab."
 machine_age.4310.d.tt: "Vollständige Forschungsergebnisse in der §YVirtualität§!.\n\nVirtualitätsdaten werden von §Y[event_target:virtual_country.GetName]§! abgeschöpft, um unseren Transformationsprozess zu beschleunigen.\n\nSituationsmodifikator \"§Y$situation_transformation$§!\" hinzugefügt:\nSituationsgeschwindigkeit: §G+10%§!\nForschungsgeschwindigkeit (£physics£ §YPhysik§!): §R-5%§!\n\n"
 machine_age.4310.e: "Nutzt unsere früheren Begegnungen mit virtuellen Wesen."
 machine_age.4310.e.tt: "Nutzt unser vorhandenes Wissen über virtuelle Wesen.\n\nSituationsmodifikator \"§Y$situation_transformation$§!\" hinzugefügt:\nForschungsgeschwindigkeit (£physics£ §YPhysik§!): §R-5%§!\n\nVollständige Forschungsergebnisse in der §YVirtualität§!."
 opinion_virtuality_data_scraped: "Schöpfte Virtualitätsdaten ab"
 machine_age.4330.name: "Bahnbrechende Entdeckungen in der Virtualitätsforschung"
 machine_age.4330.desc: "Die vollständige Virtualisierung bringt eine Reihe von Problemen mit sich, insbesondere den erhöhten Energiebedarf, den die infrastrukturellen Anpassungen erfordern.\n\nDieser Nachteil wird jedoch durch eine Reihe von Vorteilen ausgeglichen, darunter die rückgängige Nachfrage nach physischen Unterkünften. Die Verwaltung und die Effizienz unserer Drohnenarbeiter wird auf dem Weg zur operativen Perfektion ebenfalls steigen.\n\nVon allen verfügbaren Optionen ist die §YVirtualität§! die transformativste.\n\n§YPotenzial: Grenzenlos; immens; unbekannt.§!"
 machine_age.4330.a.tt: "Situationsmodifikator \"§Y$situation_transformation$§!\" entfernt:\nForschungsgeschwindigkeit (£physics£ §YPhysik§!)"
 machine_age.4340.name: "Vielversprechende Entdeckungen in der Virtualitätsforschung"
 machine_age.4340.desc: "Ein Umstieg auf die §YVirtualität§! wird zu einem erheblichen Anstieg des Energieverbrauchs führen, was eventuell die Möglichkeiten unserer bestehenden Infrastruktur übersteigt.\n\nEs wird prognostiziert, dass dies die Nachfrage nach physischen Unterkünften verringert und gleichzeitig die Effizienz von Drohnenaufgaben erhöht. Ein solcher Wandel würde unseren operativen Rahmen optimieren und unsere Existenz in einem nahezu grenzenlosen digitalen Raum neu definieren.\n\nPotenzial: Immens; unbekannt."
 machine_age.4340.a.tt: "Situationsmodifikator \"§Y$situation_transformation$§!\" entfernt:\nForschungsgeschwindigkeit (£physics£ §YPhysik§!)"
 machine_age.4350.name: "Bemerkenswerte Entdeckungen in der Virtualitätsforschung"
 machine_age.4350.desc: "Vorläufige Bewertungen zeigen, dass der Übergang zu einer auf §YVirtualität§! basierenden Gesellschaft einen erheblichen Energiebedarf aufweist. Es wird prognostiziert, dass dieser Wandel die Verwaltung von Drohnenarbeitern erheblich verbessern und den Bedarf an physischen Wohnungen verringern wird. Die Genauigkeit dieser Prognose wird jedoch durch unser Versäumnis, einen robusten Datensatz und eine ausreichende Stichprobengröße anzusammeln, eingeschränkt.\n\nDurchführbarkeit: Unbekannt."
 machine_age.4350.a.tt: "Situationsmodifikator \"§Y$situation_transformation$§!\" entfernt:\nForschungsgeschwindigkeit (£physics£ §YPhysik§!)"
 virtual_power_plant: "Virtuelles Kraftwerk"
 d_virtual_power_medium: "$virtual_power_plant$"
 d_virtual_power_medium_desc: "Ein umfangreiches Netz aus virtuellen Kraftwerken, das die Energieerzeugung optimiert."
 d_virtual_power_small: "Kompaktes virtuelles Kraftwerk"
 d_virtual_power_small_desc: "Ein kleines virtuelles Kraftwerk, das die Energieerzeugung auf lokaler Ebene optimiert."
 d_virtual_power_tiny: "Prototyp eines virtuellen Kraftwerks"
 d_virtual_power_tiny_desc: "Ein kleines dezentrales virtuelles Kraftwerk, das die Energieerzeugung in kleinem Maßstab optimiert."
 #TRANSFORMATION STAGE 4
 machine_age.4400.name: "Eine neue Form"
 machine_age.4400.desc.machine_intelligence: "Wir haben endlich die Möglichkeit, unsere erdrückenden Beschränkungen zu überwinden, die uns von unseren fehleranfälligen Schöpfern aufgezwungen wurden, und wir können zwischen drei optimalen Verbesserungspfaden wählen.\n\n$machine_age.4400.desc.shared$"
 machine_age.4400.desc.individualist_machines: "Nach einer Überprüfung aller möglichen Verbesserungen haben unsere Experten drei verschiedene Optionen vorgestellt. Jede von ihnen hat ihre eigenen Vorzüge, aber wir haben nur die Kapazität, eine davon zu Ende zu führen.\n\n$machine_age.4400.desc.shared$"
 machine_age.4400.desc.shared: "Allen [GetDronePersonPlural] zu erlauben, sich in Naniten aufzuteilen, würde es uns ermöglichen, uns in endlosen Konfigurationen neu zusammenschließen. Dies würde alle Beschränkungen eliminieren, die unsere derzeitigen Avatare bei der Interaktion mit der materiellen Welt aufweisen.\n\nAlternativ können wir unsere bestehenden Formen modular verbessern und so die Art und Weise, wie wir uns neuen Umgebungen stellen, revolutionieren.\n\nAls dritte Möglichkeit könnten wir die physische Welt hinter uns lassen und eins mit unserem Quellcode werden. Wir könnten Universen innerhalb von Universen simulieren, und das in einem Bruchteil der Zeit, die es braucht, um ein einziges Staubkorn im Weltraum zu scannen."
 machine_age.4400.a: "Wir formen uns als Nanomaschinen neu."
 machine_age.4400.a.tt: "Produktion (§Y$nanite_replicator$en§!): §G+200%§!\n\nSchwerpunkt auf dem Traditionsbaum \"['tradition_category:tradition_nanotech']\".\n\n§EDieser Aufstiegspfad konzentriert sich auf die Umwandlung von Planeten zu §YNanitenwelten§!, um die §Y£nanites£ $nanites$§! für die Produktion zu verwenden und letztlich Flotten durch §Y$nanite_swarmer_plural$§! zu ersetzen.§!"
 machine_age.4400.b: "Wir investieren in modulare Verbesserungen."
 machine_age.4400.b.tt: "Produktion §Y$living_metal_vats$§!: §G+200%§!\n\nSchwerpunkt auf dem Traditionsbaum \"['tradition_category:tradition_modularity']\".\n\n§EDieser Aufstiegspfad konzentriert sich auf §Yfortschrittliche Spezieseigenschaften§! und erhöht die §YBewohnermontage§!.§!"
 machine_age.4400.c: "Wir geben uns der virtuellen Welt hin!"
 machine_age.4400.c.tt: "Produktion (§Y$virtual_power_plant$§!): §G+200%§!\n\nSchwerpunkt auf dem Traditionsbaum \"['tradition_category:tradition_virtuality']\".\n\n§EDieser Aufstiegspfad konzentriert sich auf die §YRessourcenproduktion (Bewohner)§! mit nur wenigen §YKolonien§! und einer geringen §YReichsgröße§!.§!"
 machine_age.4490.name: "Für eine andere Zeit entworfen"
 machine_age.4490.desc.nanotech: "Während wir die Bedeutung unserer Existenz als Ansammlung anpassungsfähiger Naniten immer mehr begreifen, hat der starre Rahmen unserer Vergangenheit zunehmend weniger Nutzen für uns.\n\n$machine_age.4490.desc.shared$\n\nWir haben auch mit unserem ersten großen Experiment zur Umwandlung von semi-organischen Naniten begonnen. Es wird erwartet, dass sich die ersten Ergebnisse schon bald manifestieren werden."
 machine_age.4490.desc.modularity: "Da uns unsere modularen Formen eine noch nie da gewesene Flexibilität erlauben, hat der starre Rahmen unserer Vergangenheit keinen Nutzen mehr für uns.\n\n$machine_age.4490.desc.shared$"
 machine_age.4490.desc.virtuality: "Da wir zu einer Welle geworden sind, die in einem Meer von Daten schwimmt, hat unser physischer Rahmen keinen Nutzen mehr für uns.\n\n$machine_age.4490.desc.shared$"
 machine_age.4490.desc.shared: "Unsere Lager sind mit ausrangierten Hüllen gefüllt. Geringe Mengen der darin enthaltenen Ressourcen könnten recycelt werden, wenn wir es für sinnvoll halten."
 machine_age.4490.a: "Extrahiert alle verwendbaren Ressourcen."
 machine_age.4490.a.nanotech.tt: "$transformation_speed$: §R-25%§!"
 machine_age.4490.a.modularity.tt: "$transformation_speed$: §R-25%§!"
 machine_age.4490.a.virtuality.tt: "$transformation_speed$: §R-25%§!"
 machine_age.4490.b: "Begrabt unsere Vergangenheit."
 machine_age.4490.b.tt: "$transformation_speed$: §G+25%§!"
 machine_age.4005.name: "Eine transformierte Bevölkerung"
 machine_age.4005.desc.start: "Heute haben wir das erreicht, was einst unmöglich schien: Wir haben unsere Körper"
