 ### TRANSFORMATION SITUATION START ###
 situation_transformation: "Transformation"
 situation_transformation_type: "Aufstiegssituation"
 situation_transformation_desc: "Die passive Iteration des mechanischen Körpers ist zu ihrem logischen und unvermeidlichen Ende gekommen. Ein neues Zeitalter der Transformation ist angebrochen, ausgelöst durch Innovation und geölt durch unendliche Möglichkeiten."
 situation_transformation_monthly_change_tooltip: "Unsere Maschinenkörper bereiten sich auf die Transformation vor."
 situation_transformation_outcome: "Eine transformierte Maschinenbevölkerung."
 stage_transformation_effects: "Wir müssen das Ergebnis auswerten und den optimalsten Prozess für unsere Transformation umsetzen."
 #Approach Error Correcting
