 opinion_invaded_mind: "Gedankenübernahmeversuch"
 utopia.3100.name: "Die Flamme des Untergangs"
 utopia.3100.desc_prefix: "[Root.Capital.GetName] ... Die Vision ist undeutlich und verschwommen, aber es besteht keinerlei Zweifel: Es ist [Root.Capital.GetName], unsere Hauptwelt. "
 utopia.3100.desc_suffix: "\n\n§HNICHT EINE VON VIELEN. SO WIRD ES SICH EREIGNEN. SO SICHER, WIE DIE SONNE AUFGEHT. DAS IST EUER SCHICKSAL.§!\n\nDie Vision endet so schnell, wie sie begann, und hinterlässt nur ein Miasma aus psionischer Energie."
 utopia.3100.desc_default: "$utopia.3100.desc_prefix$Die Großstädte sehen anders und doch vertraut aus, selbst durch die Flammen und den Rauch. Auf den Straßen liegen Tausende ... nein, Millionen verstümmelter Leichen - alles [Root.GetSpeciesNamePlural]. Der Gestank des Verfalls ist unerträglich.\n\n§H\"EURE ZUKUNFT.\"§!\n\nIn diesen Ruinen lebt nichts und niemand mehr. Im Himmel darüber haben gewaltige Orbitalstationen, die Rauchfahnen hinter sich herziehen, ihren langsamen, aber unaufhaltsamen Abstieg zum Planeten begonnen. Sehen wir hier eine mögliche Zukunft von vielen?$utopia.3100.desc_suffix$"
 utopia.3100.desc_hive: "$utopia.3100.desc_prefix$Die Großstädte sehen anders und doch vertraut aus, selbst durch die Flammen und den Rauch. Auf den Straßen liegen Tausende ... nein, Millionen verstümmelter Leichen - alle von ihnen [Root.GetSpeciesNamePlural]. Der Gestank des Verfalls ist allgegenwärtig.\n\n§H\"EURE ZUKUNFT.\"§!\n\nIn diesen Ruinen lebt nichts und niemand mehr. Im Himmel darüber haben gewaltige Orbitalstationen, die Rauchfahnen hinter sich herziehen, ihren langsamen, aber unaufhaltsamen Abstieg zum Planeten begonnen. Sehen wir hier eine mögliche Zukunft von vielen?$utopia.3100.desc_suffix$"
 utopia.3100.desc_machine: "$utopia.3100.desc_prefix$Die größeren Städte sehen anders aus und doch erkennen wir sie, selbst durch die Flammen und den Rauch. Auf den Straßen liegen Tausende ... nein, Millionen demontierter Einheiten - alle von ihnen [Root.GetSpeciesNamePlural]. Wir sind von purer Zerstörung umgeben.\n\n§H\"EURE ZUKUNFT.\"§!\n\nIn diesen Ruinen funktioniert nichts und niemand mehr. Im Himmel darüber haben gewaltige Orbitalstationen, die Rauchfahnen hinter sich herziehen, ihren langsamen, aber unaufhaltsamen Abstieg zum Planeten begonnen. Sehen wir hier eine mögliche Zukunft von vielen?$utopia.3100.desc_suffix$"
 utopia.3100.a: "§GDie Energie in eine Inkarnation bündeln.§!"
 utopia.3100.b: "§YVorteil: Erhöhte Sensorreichweite.§!"
 utopia.3100.c: "§RVorteil: Erhöhte Schildstärke.§!"
 utopia.3110.name: "Duellierende Erscheinungen"
 utopia.3110.desc: "Der Schleier ist hier besonders unruhig. Stürme aus psionischer Energie werden hier gebündelt und erwecken semi-intelligente Erscheinungen zum Leben.\n\nDiese verwirrten Geister kämpfen oft gegeneinander und setzen bei ihren Scharmützeln, die Jahrtausende dauern können, gewaltige Mengen an psionischer Energie frei. Tatsächlich scheinen sich gerade mehrerer solcher Duelle zu ereignen.\n\nWir sollten Vorsicht walten lassen."
 utopia.3120.name: "Psionische Besucher"
 utopia.3120.desc_suffix: "Es war ein Besucher wie wir - eine mächtige psionische Sonde, die von einem kollektiven Bewusstsein stammte, das uns ebenso fremd war wie dem Schleier.\n\nAls sein psionisches Echo unser eigenes berührte, flackerte kurz ein schwaches Bild in uns auf: riesige organische Wesen, die in einer dichten, gasförmigen Atmosphäre schwebten, umgeben von Schwärmen kleinerer Kreaturen."
 utopia.3120.desc_machine: "In den Tiefen des Schleiers entdeckten wir eine Präsenz. $utopia.3120.desc_suffix$"
 utopia.3120.desc_default: "In den Tiefen des Schleiers machte sich urplötzlich eine Präsenz bemerkbar. $utopia.3120.desc_suffix$"
 utopia.3130.name: "Endloser Sand"
 utopia.3130.desc: "Vor uns erstreckt sich eine endlose Wüste. Wir sind schon früher hier gewesen.\n\n§H\"Shala'kul milem zunak?\"§!\n\nEtwas taucht aus dem Sand auf. Es ist nur schwer zu erkennen.\n\n§H\"Zharabi, melasuk.\"§!\n\nDie Worte klingen wie Donnergrollen, gesprochen von einem Mund, für den sie niemals vorgesehen waren. Wir werden zum Antworten gezwungen."
 utopia.3130.a: "Shashka malak."
 utopia.3130.b: "Tirit nali dasumara!"
 utopia.3130.c: "Kunak de'Kirak."
 utopia.3140.name: "Die Vielfältigen"
 utopia.3140.desc_common: "wird uns die Natur unserer Existenz offen dargelegt. Ein Multiversum, in dem Tausende von Galaxien wie die unsere in endlosen Konfliktzyklen gefangen sind.\n\nEs beginnt, es endet, und dann beginnt es erneut. Jedes Mal hängen dabei Billionen von"
 utopia.3140.desc_suffix: "§H\"So ist es\"§!, flüstert eine Stimme, §H\"und so wird es immer sein.\"§!"
 utopia.3140.desc_default: "In einem plötzlichen, schmerzhaften Moment der Klarheit $utopia.3140.desc_common$ Leben in der Schwebe.\n\n$utopia.3140.desc_suffix$"
 utopia.3140.desc_machine: "In einem plötzlichen Moment der Klarheit $utopia.3140.desc_common$ Variablen im Ungleichgewicht.\n\n$utopia.3140.desc_suffix$"
 utopia.3150.name: "Stimmen der Gefallenen"
 utopia.3150.desc: "Wir schauen von weit oben auf unsere Galaxie hinab, aus einer Entfernung, bei der es sich um tausende von Lichtjahren handeln muss. Ohne Vorwarnung stürzt uns der psionische Strom mit unfassbarer Geschwindigkeit nach unten auf die unzähligen Sterne zu ... in den [fallen_empire.GetName]-Raumbereich hinein, also in das Territorium eines Gefallenen Reichs.\n\nAnfangs zischen Sterne an uns vorbei, dann Planeten, und schließlich lässt sich die Vision endlich auf einer [fallen_empire.GetSpeciesName]-Stadt nieder. Dort ragen unglaubliche Türme in den Himmel, gestützt von Antigravitationstechnologien, die den unseren Generationen voraus sind. Der Strom trägt uns in einen solchen Turm. Wand um Wand durchdringen wir, bis wir schließlich in eine Art großen Versammlungsraum gelangen. Dort befinden sich zwei [fallen_empire.GetSpeciesNamePlural], die gemütlich in Schwerelosigkeitssesseln sitzen und sich mit sanften Stimmen unterhalten.\n\nSie sind sich unserer Gegenwart nicht bewusst."
 utopia.3150.a: "§YIhren Verstand nach Geheimnissen durchsuchen.§!"
 utopia.3151.name: "§GTechnologische Geheimnisse§!"
 utopia.3151.v1.desc: "$utopia.3151.a.desc$\n\n$utopia.3151.1.desc$\n\n$utopia.3151.b.desc$\n\n$utopia.3151.4.desc$\n\n$utopia.3151.c.desc$"
 utopia.3151.v2.desc: "$utopia.3151.a.desc$\n\n$utopia.3151.2.desc$\n\n$utopia.3151.b.desc$\n\n$utopia.3151.5.desc$\n\n$utopia.3151.c.desc$"
 utopia.3151.v3.desc: "$utopia.3151.a.desc$\n\n$utopia.3151.3.desc$\n\n$utopia.3151.b.desc$\n\n$utopia.3151.6.desc$\n\n$utopia.3151.c.desc$"
 utopia.3151.a.desc: "Die [fallen_empire.GetSpeciesNamePlural] sind eindeutig irgendeine Art von Würdenträgern, die Staatsangelegenheiten besprechen. Langsam und stetig nähert sich ihnen die Vision, während ihre Alien-Sprache allmählich in Worte übersetzt wird, die für uns eine Bedeutung haben."
 utopia.3151.b.desc: "Es ist überwältigend, wie stark die Gedanken der beiden [fallen_empire.GetSpeciesNamePlural] leuchten. Sie werden uns wie eine blühende Blume offen dargelegt. Es wäre so einfach, hineinzugreifen."
 utopia.3151.c.desc: "Dort, wo Technologische Geheimnisse so einfach aus den Nischen ihrer Gedanken herausgezogen werden können, wie man eine Datei von einem ungesicherten Computer kopiert. Die [fallen_empire.GetSpeciesNamePlural] nehmen den Diebstahl nicht wahr, der sich direkt in ihren Gedanken ereignet hat."
 utopia.3151.1.desc: "§H\"... ist verrückt. Wenn sie glaubt, dass die Bevölkerung selbst einen nur vorübergehenden Rückschritt im Lebensstandard bereitwillig akzeptieren würde, an den sie sich gewöhnt hat, dann ...\"§!"
 utopia.3151.2.desc: "§H\"... ist eine Schande. Man stelle sich nur vor, wenn die jüngeren Rassen auch nur vermuten würden, dass wir unsere eigene Technologie nicht mehr vollständig verstehen! Wir müssen ...\"§!"
 utopia.3151.3.desc: "§H\"... und werden immer mächtiger. Teile des Rats sind davon überzeugt, dass wir handeln müssen, weil sonst ...\"§!"
 utopia.3151.4.desc: "§H\"... mir egal, was der Rat sagt. Diesen Emporkömmlingen sind wir immer noch Jahrtausende voraus, und ihre kümmerlichen Flotten stellen für uns ebenso wenig eine Bedrohung dar wie eine gazuranische Mücke eine Hilaxi-Feuerechse verschlingen könnte. Es gibt keinen Grund für ...\"§!"
 utopia.3151.5.desc: "§H\"... denken immer noch, dass Strafmaßnahmen fehl am Platze sind. Sie sind jung und sorglos, aber das sind wir auch einmal gewesen. Sie haben immer noch Zeit, um ...\"§!"
 utopia.3151.6.desc: "§H\"... und dass wir vielleicht Schritte hätten unternehmen sollen, um die jüngeren Rassen auszumerzen, bevor sie zu mächtig wurden. Ich muss sagen, dass ich ihm zustimme, aber der Rat hat das Gefühl, dass es jetzt zu spät ist, um ...\"§!"
 utopia.3152.name: "Unglaubliche Geheimnisse"
 utopia.3152.desc: "Die [fallen_empire.GetSpeciesNamePlural] sind eindeutig irgendeine Art von Würdenträgern, die Staatsangelegenheiten besprechen. Langsam und stetig nähert sich ihnen die Vision, während ihre fremde Sprache allmählich in Worte übersetzt wird, die für uns eine Bedeutung haben.\n\nPlötzlich werden die Fremden still und bewegen sich kaum noch.\n\n§H\"Spürst du das?\"\n\n\"Ja. Jemand beobachtet uns.\"§!\n\nSie durchsuchen den Raum, bis sie uns schließlich beide anstarren.\n\n§H\"Bemerkenswert. Eine psionische Sonde.\"§!\n\n§H\"Sie scheint von [Root.GetSpeciesName]-Ursprung zu sein. Schnell, den Transplanar-Schild!§!\"\n\nDie Vision endet abrupt."
 utopia.3153.desc: "[Root.GetSpeciesNamePlural].\n\nDenkt ja nicht, dass euer widerlicher Versuch, euch in die Gedanken unserer Anführer einzuschleichen, unbemerkt geblieben ist.\n\nDies wird für euch Konsequenzen haben."
 utopia.3153.a: "A-aber ... wir können das erklären!"
 utopia.3153.b: "Dafür gibt es eine klare logische Erklärung ..."
 utopia.3160.name: "Ein Flackern in der Leere"
 utopia.3160.desc: "Im Schleier materialisiert sich ein kleiner, flackernder Stern. Er fliegt mit unglaublicher Geschwindigkeit an uns vorbei, und eine Sekunde lang ist er als Alien-Schiff unbekannter Bauart zu erkennen. Danach verschwindet er so schnell, wie er aufgetaucht ist, in einer Wolke aus psionischer Energie.\n\nKann das sein? Ist es möglich, sich auf physischem Wege in den Schleier zu begeben und dann irgendwo anders nur im Normalraum zu erscheinen?"
 utopia.3160.a: "§YEine Weile lang vor Ort bleiben.§!"
 utopia.3161.desc: "Dann erscheint plötzlich ein weiterer flackernder Stern, dieses Mal aber sind wir vorbereitet: Es handelt sich tatsächlich um ein Alien-Schiff, wie wir es in unserer Galaxie noch nie zuvor gesehen haben. Während es an uns vorbeifliegt, spüren wir das Gedankenleuchten seiner Besatzung, und dann gehören ihre Geheimnisse uns.\n\nEin psionischer Sprungantrieb. Wie raffiniert."
 utopia.3161.name: "§GPsionische Sprungantriebe§!"
 utopia.3162.desc: "Dann erscheint plötzlich ein weiterer flackernder Stern, dieses Mal aber sind wir vorbereitet: Es handelt sich tatsächlich um ein Alien-Schiff, wie wir es in unserer Galaxie noch nie zuvor gesehen haben. Während es an uns vorbeifliegt, spüren wir das Gedankenleuchten seiner Besatzung, aber ihre Intellekte sind dunkler und fremder als alle, denen wir bislang begegnet sind.\n\nNicht nur werden wir von ihrem Schiff zurückgeschlagen, sondern vom psionischen Feedback ihrer brutalen Abweisung auch noch außerhalb des Schleiers verfolgt! Die Unterlicht-Fluggeschwindigkeit unserer Raumschiffe ist vorübergehend reduziert worden."
 utopia.3170.name: "Abgeschirmtes Wesen"
 utopia.3170.desc: "Nachdem wir dem leisen Echo im Schleier gefolgt waren, trafen wir auf einen Geist, der sich hinter einem mächtigen psionischen Schild versteckte.\n\n§H\"VERSCHWINDET.\"§!"
 utopia.3170.a: "§YVersuchen, den Schild zu durchdringen.§!"
 utopia.3171.name: "§GPsionische Schilde§!"
 utopia.3171.desc_suffix: "Beim Durchbrechen des Schildes lernten wir zumindest, wie man vergleichbare Kraftfelder erzeugt. Sollte es uns gelingen, diese Technik zu verfeinern, wäre es eventuell möglich, psionische Schilde zu bilden, die ganze Raumschiffe umgeben können ..."
 utopia.3171.desc_machine_gestalt: "Wir sind nicht so tief in den Schleier vorgedrungen, nur um jetzt umzukehren. Nach der Bündelung unserer kollektiven psionischen Kräfte waren wir in der Lage, den Schild so weit zu öffnen, dass wir für einen Augenblick hindurchspähen konnten.\n\nWas sich hinter dem Schild verbirgt, übersteigt unser derzeitiges Verständnis und überforderte mehrere unserer psionischen Prozessoren kritisch."
 utopia.3171.desc_organic: "Wir sind nicht so tief in den Schleier vorgedrungen, nur um jetzt umzukehren. Nach der Bündelung ihrer gesamten psionischen Macht gelang es unseren Telepathen, den Schild so weit zu öffnen, dass einige von ihnen hindurchspähen konnten.\n\nWir wissen nicht, was diese Telepathen auf der anderen Seite sahen, doch es reichte aus, um ihren Verstand dauerhaft zu zerstören. Ihr Opfer war jedoch nicht umsonst. $utopia.3171.desc_suffix$"
 utopia.3172.name: "Schild nicht durchbrochen"
 utopia.3172.desc_machine_gestalt: "Unsere Telepathen waren durch unser tiefes Vordringen in den Schleier bereits so stark überlastet, dass es ihnen nicht gelang, genug psionische Energie zu bündeln, um den Schild zu durchbrechen. Auf unser Scheitern folgte prompt eine Kommunikation."
 utopia.3172.desc_machine_non_gestalt: "Unsere Telepathen waren durch unser tiefes Vordringen in den Schleier bereits so stark überlastet, dass es ihnen nicht gelang, genug psionische Energie zu bündeln, um den Schild zu durchbrechen. Unser Scheitern scheint das Wesen auf der anderen Seite provoziert zu haben."
 utopia.3172.desc_organic_gestalt: "Unsere Telepathen waren durch unser tiefes Vordringen in den Schleier bereits so stark erschöpft, dass es ihnen nicht gelang, genug psionische Energie zu bündeln, um den Schild zu durchbrechen. Auf unser Scheitern folgte prompt eine Kommunikation."
 utopia.3172.desc_organic_non_gestalt: "Unsere Telepathen waren durch unser tiefes Vordringen in den Schleier bereits so stark erschöpft, dass es ihnen nicht gelang, genug psionische Energie zu bündeln, um den Schild zu durchbrechen. Unser Scheitern scheint das Wesen auf der anderen Seite provoziert zu haben."
 utopia.3180.name: "In Erwartung der Zukunft"
 utopia.3180.desc.intro: "In diesem Teil des Schleiers scheint das Konzept der Zeit, wie wir sie kennen, unbekannt zu sein. Was hier wie Jahrhunderte erscheint, sind in der wahren Welt nur Stunden oder gar nur Minuten."
 utopia.3180.desc_gestalt: "$utopia.3180.desc.intro$ Wenn wir wissen, wohin wir blicken müssen, ist sogar die Voraussicht kein allzu fernes Konzept.\n\nEine solche Fähigkeit birgt jedoch ein nicht zu unterschätzendes Risiko für unser Kollektiv, weshalb wir Vorsicht walten lassen sollten."
 utopia.3180.desc_machine_non_gestalt: "$utopia.3180.desc.intro$ Wenn man weiß, wo man nachsehen muss, ist es sogar möglich, einen Blick in die Zukunft zu werfen ...\n\nDa das Konzept der Voraussicht für einen Telepathen jedoch einer der sichersten Wege in den Wahnsinn ist, sollten wir Vorsicht walten lassen."
 utopia.3180.desc_organic_non_gestalt: "$utopia.3180.desc.intro$ Wenn man weiß, wo man nachsehen muss, ist es sogar möglich, einen Blick in die Zukunft zu werfen ...\n\nDa die Voraussicht für einen Telepathen jedoch einer der sichersten Wege in den Wahnsinn ist, sollten wir Vorsicht walten lassen."
 utopia.3180.a: "§YHier einen Moment lang meditieren.§!"
 utopia.3181.desc_gestalt: "Eingeschränkte präkognitive Verbindungen zum Schleier können ohne Gefahr einer Einheitenüberlastung beibehalten werden. Die gewaltige Menge an Wahrscheinlichkeitsdaten ist jedoch zu groß, um von praktischem Nutzen zu sein.\n\nUnsere Forschungszentren fanden zumindest kleinere Anwendungsmöglichkeiten für diese Daten und wenden sie auf unsere Flotten an, um deren Kampfeffizienz zu verbessern."
 utopia.3181.desc_machine_non_gestalt: "Eingeschränkte präkognitive Verbindungen zum Schleier können ohne Gefahr einer Einheitenüberlastung beibehalten werden. Die gewaltige Menge an Wahrscheinlichkeitsdaten ist jedoch zu groß, um von praktischem Nutzen zu sein.\n\nSollte es uns allerdings gelingen, ein digitales Interface zur Interpretation dieser Daten zu entwickeln, ließe es sich möglicherweise dafür verwenden, die Leistung unserer Kampfcomputer zu verbessern ..."
 utopia.3181.desc_organic_non_gestalt: "Eingeschränkte präkognitive Verbindungen zum Schleier können beibehalten werden, ohne Gefahr zu laufen, wahnsinnig zu werden. Der gewaltige Zustrom an Wahrscheinlichkeitsdaten ist jedoch zu überwältigend, um von praktischem Nutzen zu sein.\n\nSollte es uns allerdings gelingen, ein digitales Interface zur Interpretation dieser Daten zu entwickeln, könnte es möglicherweise dafür verwendet werden, die Leistung unserer Gefechtscomputer zu verbessern ..."
 utopia.3181.name: "§GPräkognitives Interface§!"
 utopia.3182.name: "§RVerschleierter Wahnsinn§!"
 utopia.3182.desc_gestalt: "Wie befürchtet löste der Versuch, die unvorstellbare Vielzahl von Optionen und Wahrscheinlichkeiten zu begreifen, die sowohl in der Vergangenheit als auch in der Zukunft existieren, eine schwere Katatonie bei unseren psionischen Drohnen aus.\n\nSie wurden infolgedessen vom Überbewusstsein getrennt und treiben ziellos umher. Wenn wir jemals wieder den Schleier betreten wollen, müssen wir diese defekten Hüllen recyceln und unsere kollektive Stärke zurückgewinnen."
 utopia.3182.desc.non_gestalt.1: "die in der Vergangenheit und in der Zukunft existieren.\n\nIn ihren [GetSpeciesBrainPlural&DAT] wird jede einzelne Variation, jedes einzelne Szenario endlos wiederholt, unabhängig davon, welch riesige oder winzige Unterschiede zwischen ihnen bestehen. Sie befinden sich in einem Zustand der permanenten Katatonie.\n\n"
 utopia.3182.desc.non_gestalt.2: "wird es einige Zeit dauern, bis wir die psionische Energie aufbringen können, um erneut in den Schleier vorzudringen."
 utopia.3182.desc_machine_non_gestalt: "Wie befürchtet waren unsere psionischen Prozessoren nicht in der Lage, die unvorstellbare Vielzahl an Möglichkeiten und Wahrscheinlichkeiten zu verarbeiten, $utopia.3182.desc.non_gestalt.1$Da wir erst neue [GetTelepathPlural] bauen müssen,"
 utopia.3182.desc_organic_non_gestalt: "Wie befürchtet wurden unsere Telepathen vom Wahnsinn ergriffen. Ihr kollektives Bewusstsein wurde urplötzlich der unvorstellbaren Vielzahl an Möglichkeiten und Wahrscheinlichkeiten ausgesetzt, $utopia.3182.desc.non_gestalt.1$Da wir erst neue [GetTelepathPlural] rekrutieren müssen,"
 utopia.3190.name: "Konzentrierte Energie"
 utopia.3190.desc.intro: "Wir haben einen winzigen Bereich im Schleier gefunden, in dem die psionische Energie extrem stark konzentriert ist und weit über alles hinausgeht, was wir jemals zuvor gesehen haben."
 utopia.3190.desc_gestalt: "$utopia.3190.desc.intro$ Wenn es uns gelingen würde, diese psionische Energie anzuzapfen, könnten wir sie ohne größere Nebenwirkungen auf das gesamte Kollektiv verteilen. Wir könnten alternativ auch eine einzelne \"auserwählte\" Drohne als direkten Kanal für diese Energie bestimmen, die dadurch immens mächtig würde.\n\nWir wissen nicht, ob sie solche Energiemengen bewältigen kann, ohne fatale Folgen davonzutragen. Wir haben eine Auswahl an Kandidaten zusammengestellt."
 utopia.3190.desc_non_gestalt: "$utopia.3190.desc.intro$ Jed[GetPsychicNoun::<DE_END_PRO_S_D>] [GetPsychicNoun&NOM], [GetPsychicNoun::<DE_ART_DEF_S_D>] es gelingt, diesen Einschluss roher Energie anzuzapfen, würde unermesslich mächtig werden ... aber es gibt nur genügend Energie für ein einzelnes Individuum, und ohne Risiko ist die Sache auch nicht.\n\nIn ganz [Root.GetName] gibt es nur wenige Individuen, die psionisch stark genug sind, um diesen Energieeinschluss anzuzapfen und diesen Vorgang zu überleben. Wer soll ausgewählt werden?"
 utopia.3190.1.a: "§G[leader_1.GetTitle] [leader_1.GetName].§!"
 utopia.3190.2.a: "§Y[leader_1.GetTitle] [leader_1.GetName].§!"
 utopia.3190.3.a: "§R[leader_1.GetTitle] [leader_1.GetName].§!"
 utopia.3190.1.b: "§G[leader_2.GetTitle] [leader_2.GetName].§!"
 utopia.3190.2.b: "§Y[leader_2.GetTitle] [leader_2.GetName].§!"
 utopia.3190.3.b: "§R[leader_2.GetTitle] [leader_2.GetName].§!"
 utopia.3190.1.c: "§G[leader_3.GetTitle] [leader_3.GetName].§!"
 utopia.3190.2.c: "§Y[leader_3.GetTitle] [leader_3.GetName].§!"
 utopia.3190.3.c: "§R[leader_3.GetTitle] [leader_3.GetName].§!"
 utopia.3190.1.d: "§G[leader_4.GetTitle] [leader_4.GetName]§!"
 utopia.3190.2.d: "§Y[leader_4.GetTitle] [leader_4.GetName]§!"
 utopia.3190.3.d: "§R[leader_4.GetTitle] [leader_4.GetName]§!"
 utopia.3191.name: "[GetChosenName]"
 utopia.3191.desc_organic_non_gestalt: "$utopia.3191.desc_machine_non_gestalt$ Mögen die Geister unseren Seelen gnädig sein."
 utopia.3191.desc_machine_non_gestalt: "Es ... Es ist vollbracht. Als der Inhalt des psionischen Energieeinschlusses zu [chosen_leader.GetName] transferiert wird, erschauert der gesamte Schleier.\n\nIn der Geschichte der gesamten Galaxie hat nur eine Handvoll Individuen eine derartige psionische Macht besessen."
 utopia.3191.desc_gestalt: "Wir schafften es, den gesamten psionischen Energieeinschluss in unser ausgewähltes Ziel [chosen_leader.GetName] zu übertragen.\n\nWas ansonsten nur ein Tropfen in unserem kollektiven Ozean gewesen wäre, kann nun [Root.GetName] als mächtiges Werkzeug dienen. [chosen_leader.GetName] ist dieses Werkzeug und wird es zum Wohl aller [Root.Species.GetNamePlural] einsetzen."
 utopia.3192.name: "§RTod eines Anführers§!"
 utopia.3192.desc_gestalt: "Der gesamte Schleier erschaudert, als die immensen psionischen Energien des Einschlusses in [chosen_leader.GetName] kanalisiert werden.\n\nWie erwartet übersteigt eine solche Macht jedoch das, was eine einzige Einheit aushalten kann. Die physische Form von [chosen_leader.GetName] zerplatzt in einer Explosion aus psionischer Energie und trennt [chosen_leader.GetHisHer]e Stimme vom Rest de[GetBrainNameDE2] [GetBrainNameDE3]."
 utopia.3192.desc_non_gestalt: "Als die gewaltige psionische Energie des Einschlusses auf [chosen_leader.GetName] übertragen wurde, erschauderte der gesamte Schleier.\n\nLeider war [chosen_leader.GetHisHer][GetSpeciesBrain::<DE_END_PRO_S_N>] [GetSpeciesBrain&NOM] nicht in der Lage, die Belastung zu verarbeiten. Vielleicht war es nie vorgesehen, dass die physische Form eine derart mächtige Energie einschließen kann. [chosen_leader.GetName] starb durch eine starke Explosion psionischer Energie, die auch alle tötete, die sich in der Nähe befanden."
 utopia.3193.name: "§RPsionische Transformation§!"
 utopia.3193.desc.intro: "Als die gewaltige psionische Energie des Einschlusses auf [chosen_leader.GetName] übertragen wird, erschauert der gesamte Schleier.\n\nDer Transfer war zwar erfolgreich, doch [chosen_leader.GetName] wurde trotzdem ... verändert ..."
 utopia.3193.desc.outro: "\n\n§HUNBEDEUTENDE WELPEN ... WAS ... WAS HABT IHR ... MIR ... ANGETAN ... §!\n\n§HIHR ... WERDET ... FÜR EURE ÜBERHEBLICHKEIT ... BEZAHLEN ...§!"
 utopia.3193.desc_gestalt: "$utopia.3193.desc.intro$ und vom Kollektiv getrennt. Es ist gar so als, werde [chosen_leader.GetHeShe] von einem völlig Fremden Wesen bewohnt. $utopia.3193.desc.outro$"
 utopia.3193.desc_non_gestalt: "$utopia.3193.desc.intro$ und [chosen_leader.GetHisHer] Körper von einem Konstrukt aus purer Energie in Besitz genommen.$utopia.3193.desc.outro$"
 utopia.3200.name: "Eine Vision"
 utopia.3200.1.desc_organic: "Die Leere schimmert hier nur so vor Energie. Wir wollen uns eine Weile lang ausruhen."
 utopia.3200.1.desc_machine: "Die Leere schimmert hier nur so vor Energie. Wir sollten uns eine Weile lang wiederaufladen."
 utopia.3200.2.desc: "Der Weg, den wir verfolgt haben, hat ein abruptes Ende gefunden. Wir können nicht mehr weiter."
 utopia.3200.3.desc_organic: "Irgendetwas spricht hier zu uns. Etwas Wundervolles."
 utopia.3200.3.desc_machine: "Irgendetwas spricht hier zu uns. Etwas Bemerkenswertes."
 utopia.3200.4.desc: "Aus Gründen, die wir nicht nachvollziehen können, fühlen wir uns zu dieser Energiequelle im Schleier hingezogen. Warum nur?"
 utopia.3200.5.desc.outro: "Dann finden wir unsere Fassung wieder und das Entsetzen lässt nach."
 utopia.3200.5.desc_organic: "Einen flüchtigen Moment lang sind wir ganz verloren. Während wir uns eine Ewigkeit im Schleier vorstellen, überkommt uns das Gefühl völliger Panik. $utopia.3200.5.desc.outro$"
 utopia.3200.5.desc_machine: "Einen flüchtigen Moment lang sind wir ganz verloren. Während wir uns eine Ewigkeit im Schleier vorstellen, überkommt uns ein Gefühl wachsender Unsicherheit. $utopia.3200.5.desc.outro$"
 utopia.3200.6.desc.intro: "Ein Schwarm Geister in schillernden Farben, die es im Normalraum nicht gibt, tanzt mehrere Stunden lang um uns herum, während wir tiefer in den Schleier vordringen.\n\n"
 utopia.3200.6.desc_organic: "$utopia.3200.6.desc.intro$Das Spektakel ist recht unterhaltsam, bis uns klar wird, dass wir wie eine Viehherde getrieben werden."
 utopia.3200.6.desc_machine: "$utopia.3200.6.desc.intro$Das Spektakel ist faszinierend, bis uns klar wird, dass wir wie eine Viehherde getrieben werden."
 utopia.3200.7.desc: "Hier treibt ein Splitter aus perfektem Kristall, der langsam um seine eigene Achse rotiert. Als wir uns ihm nähern, zerspringt er in tausend Teile."
 utopia.3200.8.desc_organic: "Durch die Leere vor uns taumelt ein [Root.GetSpeciesName]-Leichnam. Die verweste Leiche stößt einen schrillen Schrei aus, bevor sie außer Sicht gerät."
 utopia.3200.8.desc_machine: "Durch die Leere vor uns treiben die Überreste eines [Root.GetSpeciesNamePlural]. Das zerstückelte Äußere stößt einen schrillen Schrei aus, bevor es davontreibt."
 utopia.3200.9.desc.intro: "Wir sind uns nicht sicher, ob dies wirklich geschieht. Befinden wir uns im Schleier oder"
 utopia.3200.9.desc_hive: "$utopia.3200.9.desc.intro$ versagen unsere Sensoren?"
 utopia.3200.9.desc_organic_non_hive: "$utopia.3200.9.desc.intro$ erleidet einer von uns einen akuten psychotischen Zusammenbruch?"
 utopia.3200.9.desc_machine_non_hive: "$utopia.3200.9.desc.intro$ stehen wir kurz vor einer kritischen Fehlfunktion?"
 terraforming_candidate_category: "Uralte Lebenszeichen"
 terraforming_candidate_category_desc: "Auf dieser kargen und leblosen Welt gibt es Anhaltspunkte dafür, dass es hier früher eine Biosphäre gegeben hat."
 MESSAGE_TERRAFORM_FOUND_TITLE: "$anomaly.2575.name$"
 MESSAGE_TERRAFORM_FOUND_DESC: "[From.GetName] wurde als Terraforming-Kandidat identifiziert. Der [From.GetPlanetMoon] wird als potenzielles zukünftiges Kolonisierungsziel verfolgt."
 anomaly.2575.name: "Terraforming-Kandidat entdeckt"
 anomaly.2575.desc.intro: "Unsere genaue Erkundung von [From.GetName] hat ergeben, dass es hier vor langer Zeit einmal Leben gegeben haben könnte. An den Polarkappen und unterhalb der Oberfläche des [From.GetPlanetMoonCap] gibt es bedeutende Vorkommen an gefrorenem Wasser. Die Existenz vernetzter Täler legt nahe, dass das Wasser früher ungehindert geflossen sein könnte."
 anomaly.2575.desc.1: "$anomaly.2575.desc.intro$\n\nTheoretisch wäre auf diesem [From.GetPlanetMoon] Terraforming möglich, aber wir verfügen nicht über die technologischen Möglichkeiten, um diese monumentale Aufgabe innerhalb eines realistischen Zeitrahmens abzuschließen."
 anomaly.2575.desc.2: "$anomaly.2575.desc.intro$\n\nDie Energiekosten wären zwar abschreckend, aber wir verfügen über die Technologie, um diesen [From.GetPlanetMoon] mit sukzessivem Terraforming so zu verwandeln, dass hier wieder Leben möglich wäre."
 anomaly.2575.desc.3: "$anomaly.2575.desc.intro$\n\nBedauerlicherweise hat die §YDyson-Sphäre§! in diesem System jede Möglichkeit zur Wiederherstellung des Planeten ausgeschlossen."
 anomaly.2575.a: "Vielleicht können wir ihn mit genügend Zeit neu erwecken?"
 utopia.3300.name: "Eine Präsenz im Schleier"
 utopia.3300.desc: "Es gibt eine Präsenz hier, die diesen gesamten Teil des Schleiers belegt. Wir sind schon früher auf Geister gestoßen, doch dies hier ist etwas anderes, etwas weitaus Mächtigeres ... etwas viel älteres.\n\nDie Präsenz scheint sich unser noch nicht bewusst zu sein. Vielleicht schläft sie ja. Vielleicht sind wir einfach zu unwichtig, um von ihr bemerkt zu werden.\n\nVielleicht sollten wir uns besser wieder entfernen."
 utopia.3300.1.a: "§GVersuchen, mit der Präsenz zu kommunizieren§!"
 utopia.3300.1.b: "§YVersuchen, mit der Präsenz zu kommunizieren§!"
 utopia.3300.1.c: "§RVersuchen, mit der Präsenz zu kommunizieren§!"
 utopia.3300.1.d: "§G[chosen_one.GetName] wird mit der Präsenz sprechen§!"
 utopia.3301.name: "§RKommunikation verweigert§!"
 utopia.3301.desc: "Als wir die Präsenz kontaktieren, merken wir, wie sie sich bewegt und uns ihre uneingeschränkte Aufmerksamkeit schenkt. Es scheint ihr nicht besonders zu gefallen, von uns gestört zu werden.\n\nEine Energiewelle schlägt nach unseren Telepathen, die manchen große Schmerzen bereitet und andere bewusstlos macht. Wir haben keine andere Wahl, als uns fürs Erste aus dem Schleier zurückzuziehen."
 utopia.3302.desc: "Als wir die Präsenz kontaktieren, merken wir, wie sie sich bewegt und uns ihre uneingeschränkte Aufmerksamkeit schenkt. Es scheint ihr nicht besonders zu gefallen, von uns gestört zu werden.\n\nWir werden von einer gewaltigen Welle psionischer Energie getroffen, welche die Sinne unserer Telepathen verdunkelt. Als sie wieder zu sich kommen, bemerken sie, dass einer von ihnen verschwunden ist. §Y[leader_to_kill.GetName]§! ist nirgendwo zu finden, und wo [leader_to_kill.GetSheHe] stand, ist nur die psionische Spur eines kleinen Risses zurückgeblieben - ganz so, als hätte das Wesen in unsere Welt hineingegriffen und [leader_to_kill.GetIhnSieDE] zu sich in den Schleier gezogen, um ... nun ja, wer weiß schon, aus welchem Grund oder zu welchem Zweck.\n\nWas auch seine Gründe waren, [leader_to_kill.GetIhnSieDE] zu entführen: Es kann wohl bezweifelt werden, dass wir [leader_to_kill.GetName] jemals wiedersehen werden."
 utopia.3304.name: "Pakt vorgeschlagen"
 utopia.3304.desc.start.default: "Als wir die Präsenz kontaktieren,"
 utopia.3304.desc.start.shroud: "Als wir in den Schleier vorstoßen,"
 utopia.3304.desc.common: "werden die Gedanken unserer Telepathen von einem Chor von Stimmen erfüllt. Anfangs ist es bloß ein leises Flüstern, doch die Kakofonie nimmt an Intensität zu, bis schließlich Tausende von Stimmen gleichzeitig sprechen.\n\nDie Stimmen stellen sich als $whisperers_in_the_void_color_article$ vor. Einzelne Mitglieder des Chors geben sich ebenfalls zu erkennen: der Geheimniskrämer,"
 utopia.3304.desc.throne.default: "des Throns Schatten,"
 utopia.3304.desc.throne.shroud: "der Unbeugsame,"
 utopia.3304.desc.end: "der Puppenspieler. Es sind so viele, alle vereint im Chor der Flüsterer. Sie behaupten, alles zu wissen, was Sterbliche einander im Geheimen zuflüstern, und bieten uns an, einige dieser Geheimnisse mit uns zu teilen ...\n\n§HVorausgesetzt, dass wir sie in unser Bewusstsein hineinlassen.§!\n\nSie versichern uns, dass dies nur ein geringfügiger Preis wäre. Wir werden ihre Gegenwart kaum wahrnehmen.\n\nIhr Ton hat eine gewisse Dringlichkeit."
 utopia.3304.desc: "$utopia.3304.desc.start.default$, $utopia.3304.desc.common$, $utopia.3304.desc.throne.default$, $utopia.3304.desc.end$"
 utopia.3304.desc.shroud: "$utopia.3304.desc.start.shroud$, $utopia.3304.desc.common$, $utopia.3304.desc.throne.shroud$, $utopia.3304.desc.end$"
 utopia.3304.a: "§YEinen Pakt mit den Flüsterern in der Leere schließen§!"
 utopia.3305.desc: "Die Präsenz heißt uns mit angenehmer Vertrautheit willkommen. Zum Sprechen verwendet sie weniger Worte als vielmehr Visionen, Konzepte und Ideen. Sie sickert so sanft und reibungslos in die Gedanken unserer Telepathen ein, dass man glauben könnte, sie wäre schon immer dort gewesen. Vor ihnen entfaltet sich eine rasche Abfolge von Bildern.\n\nDie Präsenz ist unter dem Namen $the_composer_of_strands_color_article$ bekannt und betrachtet unsere biologischen Formen mit großem Interesse. Sie zeigt uns verschiedenste Maßnahmen, mit denen sie gezüchtet und verändert werden können. Verbessert. Weiterentwickelt.\n\n§HSolange wir sie nur in unser Fleisch aufnehmen.§!\n\nSie wartet geduldig und liebevoll auf unsere Antwort. Wie ein in sein Lieblingskind vernarrter Elternteil. Dahinter verbirgt sich ihr Zwilling, der Lehmanimator. Dieser ist nicht an unserem organischen Bewusstsein interessiert. Er sehnt sich vielmehr danach, Seelen zu erschaffen, Schaltkreise in Geister zu verschmelzen.\n\nDie Komponistin wartet auf unsere Antwort."
 utopia.3305.a: "§YEinen Pakt mit der Komponistin der Stränge schließen§!"
 utopia.3306.desc.1: "Als wir Kontakt zu der Präsenz aufnehmen, spüren wir einen großen Hunger. "
 utopia.3306.desc.2: "Die Präsenz verschwendet weder Zeit noch Worte. Sie ist die $the_eater_of_worlds_color_article$ und möchte uns verschlingen.\n\nAber nur einige von uns. Nicht mehr, als wir entbehren können. Als Gegenleistung wird sie uns große Macht gewähren. Sie wird uns ihren Hunger und ihren Zorn lehren. Sie wird sie zu psionischen Waffen formen, die jeden Feind bezwingen können.\n\n§HAlles das, wenn sie nur einen Teil von uns fressen darf.§!"
 utopia.3306.desc.3: "$utopia.3306.desc.2$\n\nSie scheint ungeduldig darauf zu warten, beginnen zu können."
 utopia.3306.desc: "$utopia.3306.desc.1$$utopia.3306.desc.3$"
 utopia.3306.a: "§YEinen Pakt mit der Weltenfresserin schließen§!"
 utopia.3307.desc: "Bevor wir die Präsenz ausmachen können, werden wir von ihr kontaktiert. Ihre Gedanken schlängeln und winden sich um die Gedanken unserer Telepathen ... feilschend, schmeichelnd. Sie ist das $the_instrument_of_desire_color_article$ und wird uns Reichtum, Macht, Prestige geben - all das, was wir uns immer wünschten. Alles, was wir uns jemals wünschen werden.\n\nUnd der Preis dafür? Eine Kleinigkeit, kaum mehr als ein Unkostenbeitrag. Sie will nur das Beste für uns. Sie wird uns helfen, uns führen und unsere Ambitionen und Träume in geeignete Bahnen lenken.\n\n§HAlles das, wenn wir sie nur in unsere Herzen aufnehmen.§!\n\nSie ist zuversichtlich, dass wir zustimmen werden. Wie könnten wir diesem Vorschlag nicht zustimmen?"
 utopia.3307.a: "§YEinen Pakt mit dem Instrument der Sehnsüchte schließen§!"
 utopia.3308.desc: "Die Präsenz hatte schon auf uns gewartet. Sie ist §RDas Ende des Zyklus§! und hat schon immer auf uns gewartet. Plötzlich beginnen unsere Telepathen gemeinsam zu sprechen. Zwölf Stimmen wie eine: §R\"EURE ZEIT IST NOCH NICHT GEKOMMEN.\"§! Eine Pause. §R\"ABER ES KÖNNTE SO SEIN.\"§!\n\nMehr wird nicht gesagt, aber man hat uns ein Angebot unterbreitet - so viel ist uns klar. Macht, Wissen und unermesslicher Reichtum - wir müssen nur noch zugreifen.\n\n§RAll dass, wenn wir das Ende verkünden.§!"
 utopia.3308.a: "§REinen Pakt mit dem Ende des Zyklus schließen§!"
 utopia.3310.name: "Pakt geschlossen"
 utopia.3320.name: "Das Ende des Zyklus: §RAbrechnung§!"
 utopia.3320.desc.intro: "Unsere Zeit ist abgelaufen. Für eine kurze Weile profitierten wir von jener unermesslichen Macht, die uns das $end_of_the_cycle_color_article$ verlieh. Wir wussten, dass dies nicht ohne Gegenleistung unsererseits bleiben würde, doch wir dachten, es würde eine sein, die wir ertragen könnten ... oder irgendwie sogar ganz vermeiden.\n\nDas war nicht so, und wir konnten es nicht.\n\nDer Preis, den wir bezahlen mussten, war alles. In einem einzigen Augenblick wurde das Ende von [Root.GetName] besiegelt. Wo es früher blühende Kolonien gab, stehen nun nur noch Ruinen. Wo früher mächtige Flotten durch den Weltraum flogen, gibt es jetzt nur noch Stille und Trümmer. Alles wurde vom Ende verschlungen. Alles wurde vom §HSchleier§! geholt."
 utopia.3320.desc.outro: "nahe [former_capital.GetName] materialisiert. Nachdem es das Bewusstsein unserer [GetPsychicNounPlural] verschlungen hatte, streift es nun auf der Suche nach neuer Beute durch die Galaxie."
 utopia.3320.desc.a.1.gestalt: "Alles, was von unserem Reich übrig ist, ist eine Gruppe aus Exilanten, die von §H[Root.GetRulerName]§!, ein[GetPsychicNoun::<DE_END_PRO_S_D>] mächtigen [GetPsychicNoun&DAT], angeführt werden, und die sich einst vom Kollektiv abwandten, um sich zusammen mit einer kleinen Gruppe von [GetIndividualPlural] auf einer Welt zu verstecken, die nicht vom Ende gezeichnet wurde."
 utopia.3320.desc.a.1.non_gestalt: "Alles, was von unserem Reich übrig ist, ist eine Gruppe aus Exilanten, die von §H[Root.GetRulerName]§!, ein[GetPsychicNoun::<DE_END_PRO_S_D>] mächtigen [GetPsychicNoun&DAT], angeführt werden. [Root.GetRulerName] sah vorher, was geschehen wird würde, und entschloss sich, sich zusammen mit einem kleinen Teil der Bevölkerung auf einer Welt zu verstecken, die nicht vom Ende gezeichnet wurde."
 utopia.3320.desc.a.outro: "Als wäre es nicht schon schlimm genug, dass unser Reich über Nacht zerstört wurde, hat sich auch noch ein extrem mächtiges psionisches Wesen $utopia.3320.desc.outro$"
 utopia.3320.desc.a.gestalt: "$utopia.3320.desc.intro$\n\n$utopia.3320.desc.a.1.gestalt$\n\n$utopia.3320.desc.a.outro$"
 utopia.3320.desc.a.non_gestalt: "$utopia.3320.desc.intro$\n\n$utopia.3320.desc.a.1.non_gestalt$\n\n$utopia.3320.desc.a.outro$"
 utopia.3320.desc.b: "$utopia.3320.desc.intro$\n\nWir wurden nicht nur völlig zerstört, sondern im Orbit über [former_capital.GetName] manifestierte sich auch ein mächtiges psionisches Wesen. Dank dem kollektiven Bewusstsein unserer [GetPsychicNounPlural], die es verschlang, streift es nun auf der Suche nach neuen Opfern durch die Galaxie. Wenigstens müssen wir nicht mehr mitansehen, wie es beendet, was es begonnen hat."
 utopia.3320.opt.a: "Was haben wir nur getan ...?"
 utopia.3320.opt.a.shroud.tt: "$BEGINS_EVENT_CHAIN$ §Y$the_reckoning_chain_title$§!"
 utopia.3321.desc.1: "Wir wussten bereits seit einiger Zeit, dass mit §H[From.GetName]§! etwas nicht stimmt. Vor einigen Jahren erfuhren die Industrie, die Wissenschaft ... und einfach alles in diesem Reich plötzlich und unerklärlicherweise eine gewaltige Steigerung, als wäre es von einer unsichtbaren Macht gesegnet worden.\n\nWie sich herausstellte, war es weniger ein Segen, sondern vielmehr ein Fluch. [From.GetName] verpfändete seine Zukunft, und nun wurde diese Schuld eingefordert.\n\nBinnen eines einzigen Moments - so schnell, dass keinerlei Zeit zum Reagieren blieb - wurde das Ende von [From.GetName] besiegelt. Wo es früher blühende Kolonien gab, stehen nun nur noch Ruinen. Wo früher mächtige Flotten durch die Leere flogen, gibt es jetzt nur noch Stille und Trümmer."
 utopia.3321.desc.2: "Ein extrem mächtiges Energiewesen hat sich nun unweit der ehemaligen Hauptwelt materialisiert."
 utopia.3321.desc.3: "Vor einigen Jahrzehnten begannen wir, eine anormale Aktivität in fernen Sternensystemen aufzuzeichnen. Unsere [GetResearchers] stellten damals die Theorie auf, dass die erhöhten Bewegungs- und Strahlungsmesswerte auf eine fremde Zivilisation hinwiesen, die eine massive Produktionssteigerung erfuhr. Da wir noch keinen Kontakt zu dieser rein spekulativen Gesellschaft aufgebaut hatten, konnte die Theorie nie bestätigt werden.\n\nDann, beinahe augenblicklich, hörte sämtliche Aktivität auf. Die Stille gebietet nun über diese einst so lebendigen Raumregionen."
 utopia.3321.desc.4: "Unsere Langstreckenscanner fingen ein seltsames Phänomen auf, das aus denselben Systemen stammt. Wenn man den Berichten Glauben schenken darf, lässt es sich nur als extrem mächtiges Wesen beschreiben, das aus purer Energie besteht und auf dem Weg durch die Galaxie nichts als Zerstörung hinterlässt."
 utopia.3321.desc.a.contact: "$utopia.3321.desc.1$ Die Katastrophe machte selbst vor unseren eigenen Grenzen keinen halt und zerstörte einige der Welten, die zuvor unter [From.GetAdj]er Herrschaft standen.\n\n$utopia.3321.desc.2$\n\nEs scheint hungrig zu sein."
 utopia.3321.desc.a.no_contact: "$utopia.3321.desc.3$ Aus Gründen, die wir noch nicht erklären können, wurden auch einige Welten innerhalb unserer eigenen Grenzen im selben Moment zerstört.\n\n$utopia.3321.desc.4$"
 utopia.3321.desc.b.contact: "$utopia.3321.desc.1$\n\n$utopia.3321.desc.2$ Es bewegt sich von Welt zu Welt und zerstört auf dem Weg einfach alles."
 utopia.3321.desc.b.no_contact: "$utopia.3321.desc.3$\n\n$utopia.3321.desc.4$"
 utopia.3321.opt.a.contact: "Was haben sie getan!?"
 utopia.3321.opt.a.no_contact: "Was mag das bedeuten?"
 utopia.3325.name: "Das Ende des Zyklus: §RVerschleiert§!"
 utopia.3325.desc.organic: "Es ist uns nicht gelungen, §H[Root.GetName]§! vor dem monströsen Energiewesen zu retten. Der Planet und die gesamte Bevölkerung auf ihm wurden vom §HSchleier§! verschlungen."
 utopia.3325.desc.machine: "Es ist uns nicht gelungen, §H[Root.GetName]§! vor dem gewaltigen Energiewesen zu retten. Der Planet und die gesamte Bevölkerung auf ihm wurden vom §HSchleier§! verschlungen."
 utopia.3325.opt.a.organic_non_gestalt: "Wie schrecklich!"
 utopia.3325.opt.a.machine_or_gestalt: "Eine Katastrophe!"
 utopia.3331.name: "Flüsterer in der Leere: §RBewältigung§!"
 utopia.3331.desc.intro: "Die Geheimnisse, die die §HFlüsterer§! mit unserer Bevölkerung teilen, sind zwar sehr nützlich ... doch einige sind auch sehr beunruhigend"
 utopia.3331.desc: "$utopia.3331.desc.intro$. Da es schwierig sein kann, mit der Belastung eines zu großen Wissens umzugehen, greifen immer mehr Mitglieder unserer Bevölkerung, §H[leader_target.GetTitle] [leader_target.GetName]§! eingeschlossen, auf Drogen zurück."
 utopia.3331.opt.a: "Das ist bedauerlich."
 utopia.3332.name: "Flüsterer in der Leere: §RSelbstmord§!"
 utopia.3332.desc.intro: "$utopia.3331.desc.intro$, besonders jene, die wichtigen Individuen offenbart wurden. §H[leader_target.GetTitle] [leader_target.GetName]§! konnte die Informationen nicht effektiv verarbeiten und zerstörte sich selbst."
 utopia.3332.desc.organic_non_gestalt: "$utopia.3332.desc.intro$ konnte den Stress nicht länger ertragen und nahm sich das Leben."
 utopia.3332.desc.machine_non_gestalt: "$utopia.3332.desc.intro$ konnte die Informationen nicht effektiv verarbeiten und zerstörte sich selbst."
 utopia.3332.desc.gestalt: "Die Geheimnisse, die die §HFlüsterer§! mit uns teilen, sind zwar sehr nützlich, doch einige von ihnen sind auch von äußerst beunruhigender individualistischer Natur. §H[leader_target.GetTitle] [leader_target.GetName]§! war einer solchen Abweichung für einen längeren Zeitraum ausgesetzt und trennte sich infolgedessen vom Kollektiv, wodurch nichts als seine verwesende Hülle zurückblieb."
 utopia.3332.opt.a.non_gestalt: "Eine Tragödie."
 utopia.3332.opt.a.gestalt: "Es steht ein Recyling der Überreste an."
 utopia.3333.name: "Flüsterer in der Leere: §RWahnsinn§!"
 utopia.3333.desc.intro: "Seit wir den §HFlüsterern§! erlaubten, mit unser[GetBrainName::<DE_END_PRO_S_D>] [GetBrainName&DAT] zu kommunizieren, stellen wir einen beunruhigenden Anstieg von Abweichungen innerhalb des Kollektivs fest."
 utopia.3333.desc.gestalt: "$utopia.3333.desc.intro$\n\nDrohnen greifen sich gegenseitig an, während sie ansonsten standardmäßige Verfahren durchführen, und übertreiben es mit der Nutzung von Annehmlichkeiten bis zu einem fast individualistischen Grad.\n\nWir müssen die betroffenen Gefäße beseitigen, wenn wir die Ordnung wiederherstellen wollen."
 utopia.3333.desc.outro: "Wir konnten die Betroffenen zunächst noch unter Kontrolle halten, doch in letzter Zeit breitete sich dieses Verhalten derart stark aus, dass uns eine Eindämmung nicht mehr gelingt. Im gesamten Reich sind verschiedene radikale Fraktionen entstanden, die gewaltsam aufeinander losgehen."
 utopia.3333.desc.organic_non_gestalt: "Seit wir die §HFlüsterer§! in unsere Gedanken ließen, gibt es unter unserer psionischen Bevölkerung immer mehr Fälle von Programmierfehlern und unerklärlichen Gewalttaten. $utopia.3333.desc.outro$"
 utopia.3333.desc.machine_non_gestalt: "Seit wir die §HFlüsterer§! in unsere Gedanken ließen, gibt es unter unserer psionischen Bevölkerung immer mehr Fälle von Geisteserkrankungen und unerklärlichen Gewalttaten. $utopia.3333.desc.outro$"
 utopia.3333.opt.a: "Wir müssen die Ordnung wiederherstellen!"
 utopia.3334.name: "Flüsterer in der Leere: §RPsychose§!"
 utopia.3334.desc.gestalt: "$utopia.3333.desc.intro$\n\nSchlimmer noch ist jedoch, dass auch unser Zusammenhalt zu bröckeln beginnt. Das Kollektiv ist wegen dieser psionisch bedingten Zunahme individualistischer Abweichungen nicht mehr in der Lage, effektiv zu kommunizieren.\n\nWir müssen diese Auswüchse von uns selbst abtrennen, wenn wir die Ordnung wiederherstellen wollen."
 utopia.3334.desc.outro: "Bisher war das Ganze noch kontrollierbar, doch in letzter Zeit verschärften sich die Probleme so weit, dass sie nun außerhalb unserer Kontrolle liegen. Überall im Reich sind Geheimgesellschaften entstanden. Während einige eher harmloser Natur sind, verfolgen andere ruchlosere Ziele. Misstrauen ist zu einem festen Bestandteil unserer Gesellschaft geworden."
 utopia.3334.desc.organic_non_gestalt: "Seit wir die §HFlüsterer§! in unsere Gedanken ließen, gibt es unter unserer psionischen Bevölkerung immer mehr Fälle von Programmierfehlern und unerklärlichen Gewalttaten. $utopia.3334.desc.outro$"
 utopia.3334.desc.machine_non_gestalt: "Seit wir die §HFlüsterer§! in unsere Gedanken ließen, gibt es unter unserer psionischen Bevölkerung immer mehr Fälle von Geisteserkrankungen und unerklärlichen Gewalttaten. $utopia.3334.desc.outro$"
 utopia.3334.opt.a: "Schrecklich!"
 utopia.3335.name: "Weltenfresserin: §REin Häppchen§!"
 utopia.3335.desc.common: "§H[devoured_leader.GetTitle] [devoured_leader.GetName]§! ist urplötzlich verschwunden und hinterließ nur ein Echo psionischer Aktivität."
 utopia.3335.desc.gestalt: "$utopia.3335.desc.common$ Offenbar wurde [devoured_leader.GetHeShe] von der $the_eater_of_worlds_color_article$ verschlungen. Auch wenn sie unsere anderen Anführer bisher verschonte, können wir nicht genau sagen, wann sie für einen Nachtisch zurückkehren wird."
 utopia.3335.desc.non_gestalt: "$utopia.3335.desc.common$ Wir glauben, [devoured_leader.GetHeShe] wurde von der $the_eater_of_worlds_color_article$ verschlungen. Es gelang uns, den Vorfall zu vertuschen, und wir können nur hoffen, dass die Fresserin für eine Weile gesättigt ist."
 utopia.3335.opt.a: "Ein kleiner Preis."
 utopia.3336.name: "Weltenfresserin: §RVerhungert§!"
 utopia.3336.desc.intro: "Die §HWeltenfresserin§! kehrte abermals zurück, um ihren Tribut einzufordern"
 utopia.3336.desc.gestalt: "$utopia.3336.desc.intro$, und verschlang einen beachtlichen Teil unserer Bevölkerung auf §Y[planet_target.GetName]§!.\n\nWir verstehen zwar, welche Vorteile ein Pakt mit der Fresserin mit sich bringt, doch eine solch zügellose Auslese schürt Unruhe und Instabilität, wodurch unser Kollektiv noch weiter zersplittert wird."
 utopia.3336.desc.non_gestalt: "$utopia.3336.desc.intro$, und verschlang einen Großteil der Bevölkerung auf §Y[planet_target.GetName]§!.\n\nObwohl wir in der Lage waren, unseren Pakt mit der Weltenfresserin größtenteils vor der Bevölkerung geheim zu halten, empfinden die auf dem Planeten Verbliebenen wegen des \"mysteriösen Verschwindens\" ihrer Mitbürger verständlicherweise Angst und Wut und verlangen eine Erklärung der Regierung."
 utopia.3336.opt.a: "Bedauerlich, aber unvermeidbar."
 utopia.3337.name: "Weltenfresserin: §RGefräßig§!"
 utopia.3337.desc: "Die Weltenfresserin ist abermals zurückgekehrt, um ihren Tribut einzufordern. Dabei reichte es ihr scheinbar nicht, einen Teil unserer Bevölkerung für sich zu beanspruchen. Sie hat einen ganzen Planeten verschlungen! §Y[planet_target.GetName]§! ist von einem dichten psionischen Nebel umgeben und alle Rettungsschiffe, die wir in die Atmosphäre schickten, sind nicht zurückgekommen. Zum Glück war diese Welt unbewohnt, doch uns schaudert es bei dem Gedanken, dass die nächste eine unserer blühenden Kolonien sein könnte."
 utopia.3337.desc.shadows: "$utopia.3336.desc.intro$, und verschlang diesmal einen ganzen Planeten.\n\n§H[planet_target.GetName]§! ist jetzt von einem dichten psionischen Nebel umhüllt, und jeder Versuch, die Atmosphäre zu durchbrechen, ist gescheitert. Diese Welt war zwar unbewohnt; doch die Folgen wären gravierend, falls das nächste Ziel eine blühende Kolonie ist."
 utopia.3337.opt.a: "Wie weit soll das noch gehen?"
 utopia.3337.opt.tt: "[shrouded_planet.GetName] verwandelt sich in eine §Y$pc_shrouded$§!"
 #utopia.3338.name: "Instrument of Desire: §RParticularism§!"
 #utopia.3338.desc: "The desires inflicted upon our people by the Instrument are strong. The people of §Y[planet_target.GetName]§! have become convinced that their own particular customs are of distinct and paramount importance over those of our society as a whole. Alternative political movements are springing up like wildfire, and the political situation on the planet has become unpredictable, to say the least."
 utopia.3338.opt.a: "Bedauerlich."
 #utopia.3339.name: "Instrument of Desire: §RDeviance§!"
 #utopia.3339.desc: "The desires inflicted upon our people by the Instrument are strong. As if overnight, the population of our empire appear to have turned against both the government and the very traditions of our people, questioning ages-old customs and breaking social taboos. Support for government positions are rapidly dropping, and it seems we may be in for a period of considerable political turmoil."
 #utopia.3339.opt.a: "Terrible!"
 utopia.3340.name: "Instrument der Sehnsüchte: §RDekadenz§!"
 utopia.3340.desc.gestalt: "Der Einfluss des §HInstruments§! ist [GetBrainName::<DE_ART_PRAE_IM>] gesamten [GetBrainName&DAT] zu spüren und die überweltlichen Begierden korrumpieren unser Kollektiv mit abstrakten individualistischen Vorstellungen wie \"Exklusivität\", \"Dekadenz\" und \"Reichtum\".\n\nSolche Konzepte machen unsere Drohnen krank und sorgen dafür, dass sie von den einheitlichen Zielen abweichen, die uns antreiben. Wir müssen uns diesen Lastern vielleicht hingeben, um wieder zu uns selbst zu finden."
 utopia.3340.desc.organic_non_gestalt: "Das Sehnsüchte, die das §HInstrument§! schürt, sind stark, und unsere Bevölkerung ist in rauschhafte Verschwendungssucht und Dekadenz verfallen. Sie fordert immer exklusivere Waren und immer seltenere und exotischere Nahrungsmittel, und in mehreren Einkaufsdistrikten kommt es derzeit zu Ausschreitungen.\n\nWir müssen eventuell die Produktion an §H[GetInstrumentCraving]§! erhöhen, um die Massen zu beruhigen."
 utopia.3340.desc.machine_non_gestalt: "Die Sehnsüchte, die der Einfluss des §HInstruments§! in unserer Programmierung weckt, überschreiben die Logikzentren unserer Bevölkerung.\n\nKonsumdenken und Dekadenz beeinträchtigen zunehmend die betriebliche Effizienz, da die einzelnen Einheiten bestrebt sind, ihre Teile aus ästhetischen Gründen und nicht aufgrund ihrer beabsichtigten Funktionalität umzubauen. Der daraus resultierende Mangel an stark nachgefragten Teilen führte zu kleineren Ausschreitungen entlang der Fertigungsanlagen.\n\nWir müssen die Produktion an §H[GetInstrumentCraving]§! erhöhen, um das Problem in den Griff zu bekommen."
 utopia.3340.opt.a.organic_non_gestalt: "Aber warum?"
 utopia.3340.opt.a.machine_or_gestalt: "Das ist der Preis des Erfolgs."
 instrument_cravings: "Wilde Sehnsüchte"
 instrument_cravings_tooltip: "§RUnsere £pops£ Bewohner benötigen jetzt [GetInstrumentCravingIconAndName] für den Unterhalt§!"
 instrument_cravings_desc: "Das $the_instrument_of_desire_color_article_cap$ löste in unserer Bevölkerung einen neuen Trend aus. Jeder sehnt sich nach demselben, hauptsächlich um seiner selbst willen und nicht wegen der Nützlichkeit."
 instrument_cravings_gestalt: "$instrument_cravings$"
 instrument_cravings_gestalt_desc: "Das $the_instrument_of_desire_color_article_cap$ infizierte uns mit einem zwanghaften Verlangen - eine neue Empfindung für unser Kollektiv. Wir alle sehnen uns nach demselben, unabhängig davon, ob es sinnvoll ist."
 utopia.3341.name: "[GetComposerMutationName]"
 utopia.3341.name.organic: "$name_composer$: §RMutation§!"
 utopia.3341.name.machine: "$name_composer$: §RRekonfiguration§!"
 utopia.3341.desc.machine: "Die $the_composer_of_strands_color_article_cap$ schenkte uns ihren Segen und veränderte einige unserer fest verdrahteten Komponenten. Schaltkreise verbanden sich zu neuen Konfigurationen und festes Metall verschmolz irgendwie zu völlig neuen Formen. Bemerkenswerterweise funktionieren unsere Neuroprozessoren weiterhin ohne Fehler."
 utopia.3341.desc.organic_gestalt: "Die $the_composer_of_strands_color_article_cap$ schenkte uns ihren Segen und veränderte den Gencode der §H[Root.GetSpeciesAdj]en§! Spezies. Erstaunlicherweise riefen die zufälligen und unvorhersehbaren Mutation kaum nennenswerte Reaktionen hervor und scheinen wenig mehr als ein normaler Teil des Lebens zu sein, der kaum Besorgnis oder gar Unruhe auslöst."
 utopia.3341.desc.organic_non_gestalt: "Die $the_composer_of_strands_color_article_cap$ schenkte uns ihren Segen und veränderte den Gencode der §H[Root.GetSpeciesAdj]en§! Spezies. Erstaunlicherweise riefen die zufälligen und unvorhersehbaren Mutation kaum nennenswerte Reaktionen innerhalb unserer Bevölkerung hervor, für die es beinahe ein normaler Teil des Lebens ist, der wenig Empörung oder Diskussionsbedarf mit sich bringt."
 utopia.3341.opt.a: "Wollen wir mal sehen, zu was das führt ..."
 utopia.3342.name: "Weltenfresserin: §RHungrig§!"
 utopia.3342.desc.intro: "Der Hunger der §HWeltenfresserin§! kann niemals wirklich gesättigt werden. Diesmal hat sie einen Bissen von einer unserer Kolonien genommen."
 utopia.3342.desc.outro: "der von wirbelnden lila Nebeln verhangen ist."
 utopia.3342.desc.gestalt: "$utopia.3342.desc.intro$ Wo unser Kollektiv einst einen bedeutenden Teil des physischen Raums einnahm, gibt es nur noch einen Krater von unvorstellbarer Größe, $utopia.3342.desc.outro$"
 utopia.3342.desc.non_gestalt: "$utopia.3342.desc.intro$ Ein bedeutender Teil der Welt ist aus unserer Wirklichkeit verschwunden und hinterließ einen Krater von unvorstellbarer Größe, $utopia.3342.desc.outro$"
 utopia.3342.opt.a.non_gestalt: "Es wird schwer sein, das zu vertuschen ..."
 utopia.3342.opt.a.gestalt: "Das ist der Preis, den man für die Macht zahlen muss."
 utopia.3343.name: "Weltenfresserin: §RUnersättlich§!"
 utopia.3343.desc.gestalt: "Die §HWeltenfresserin§! kehrte abermals zurück, um ihren Tribut einzufordern, und verschlang diesmal eine ganze Stadt auf §Y[planet_target.GetName]§!. Mit dem Verlust so vieler Drohnen zahlte das Kollektiv einen hohen Preis für den Pakt mit der Fresserin."
 utopia.3343.desc.organic_non_gestalt: "Die §HWeltenfresserin§! kehrte abermals zurück, um ihren Tribut einzufordern, und verschlang diesmal eine ganze Stadt auf §Y[planet_target.GetName]§!. Obwohl wir in der Lage waren, unseren Pakt mit der Weltenfresserin größtenteils vor der Bevölkerung geheim zu halten, empfinden die auf dem Planeten Verbliebenen wegen des \"mysteriösen Verschwindens\" ihrer Mitbürger verständlicherweise Angst und Wut und verlangen eine Erklärung seitens der Regierung."
 utopia.3343.desc.machine_non_gestalt: "Die §HWeltenfresserin§! kehrte abermals zurück, um ihren Tribut einzufordern, und verschlang diesmal eine ganze Stadt auf §Y[planet_target.GetName]§!. Obwohl wir in der Lage waren, unseren Pakt mit der Weltenfresserin größtenteils vor der Bevölkerung geheim zu halten, sind die auf dem Planeten Verbliebenen wegen des \"mysteriösen Verschwindens\" verständlicherweise unzufrieden und verlangen eine Erklärung seitens der Regierung."
 utopia.3343.opt.a.organic_non_gestalt: "Tragisch, aber unvermeidbar."
 utopia.3343.opt.a.machine_or_gestalt: "Bedauerlich, aber unvermeidbar."
 utopia.3345.name: "[GetComposerDegenerationName]"
 utopia.3345.name.organic: "$name_composer$: §RRückentwicklung§!"
 utopia.3345.name.machine: "$name_composer$: §RIrreparable Rückentwicklung§!"
 utopia.3345.desc.organic_1: "Die Segen der $the_composer_of_strands_color_article$ sind oft unberechenbar. Kürzlich machte einer unserer Anführer eine unglückliche Erfahrung,"
 utopia.3345.desc.organic_2: "einen eigenen Willen bekam und sich binnen weniger Augenblicke zu einer unidentifizierbaren Masse verformte. Da es keine Hoffnung gibt, diesen Prozess rückgängig zu machen, wurde"
 utopia.3345.desc.organic_3: "für Tod erklärt."
 utopia.3345.desc.organic_individual_lithoid: "$utopia.3345.desc.organic_1$ als seine physische Form $utopia.3345.desc.organic_2$ dieser Anführer $utopia.3345.desc.organic_3$"
 utopia.3345.desc.organic_hive_lithoid: "$utopia.3345.desc.organic_1$ als seine physische Form $utopia.3345.desc.organic_2$ diese Anführerdrohne $utopia.3345.desc.organic_3$"
 utopia.3345.desc.organic_individual_non_lithoid: "$utopia.3345.desc.organic_1$ als sein Fleisch $utopia.3345.desc.organic_2$ dieser Anführer $utopia.3345.desc.organic_3$"
 utopia.3345.desc.organic_hive_non_lithoid: "$utopia.3345.desc.organic_1$ als sein Fleisch $utopia.3345.desc.organic_2$ diese Anführerdrohne $utopia.3345.desc.organic_3$"
 utopia.3345.desc.machine_non_gestalt: "Die Segen der $the_composer_of_strands_color_article$ sind unvorhersehbar. Einer unserer Anführer erlebte kürzlich einen spektakulären kritischen Ausfall, als seine physischen Komponenten einen eigenen Willen bekamen und zu einer bizarren neuen Form verschmolzen. Als irreparables Stück Schrott, das nicht länger funktionsfähig ist, hat [Root.GetName] keine Verwendung mehr für diesen Anführer."
 utopia.3345.desc.machine_gestalt: "Die Segen der $the_composer_of_strands_color_article$ sind unvorhersehbar. Einer unserer Anführerknoten erlebte kürzlich einen spektakulären kritischen Ausfall, als seine physischen Komponenten einen eigenen Willen bekamen und zu einer bizarren neuen Form verschmolzen. Als irreparables Stück Schrott, das nicht länger funktionsfähig ist, hat [Root.GetName] keine Verwendung mehr für diesen Anführerknoten."
 utopia.3345.opt.a.organic: "Er hat jetzt ein einfacheres Leben."
 utopia.3345.opt.a.machine: "Jede Hardware wird eines Tages veraltet sein."
 utopia.3346.name: "Komponistin der Stränge: §RRegression§!"
 utopia.3346.desc: "Die wohlwollenden Gaben der $the_composer_of_strands_color_article$ gingen heute auf [devolved_species_planet.GetName] hernieder und lösten schwere Mutationen bei der Bevölkerung aus, die nun teilweise in den Zustand nur beinahe vernunftbegabter Wesen zurückversetzt wurde."
 utopia.3346.opt.a.non_gestalt: "Faszinierend, aber bedauerlich."
 utopia.3346.opt.a.gestalt: "Bedauerlich."
 utopia.3346.opt.a.tt: "§Y500§! £pop£ §HBewohner§! auf [devolved_species_planet.GetName] haben sich zu §Ybeinahe vernunftbegabten Wesen§! zurückentwickelt.\n\nMit der richtigen Technologie kann man sie im Reiter \"Spezies\" §Yaufwerten§!."
 utopia.3347.name: "$name_cradle$: §RDemilitarisierung§!"
 utopia.3347.desc: "Die §HWiege der Seelen§! strebt nach einem Gleichgewicht in allen Dingen. Unseren [GetTelepathPlural] zufolge gehört dazu auch ein Militär, dass proportional zum Bedarf in Friedenszeiten ist. Die Größe unserer Flotte muss den Zorn unseres Mäzens erregt haben, denn eine Reihe von Schiffen aus der §H[demilitarized_fleet.GetFleetName]§! verschwand plötzlich in einem heftigen Ausbruch psionischer Energie."
 utopia.3347.opt.a: "$UNFORTUNATE$"
 utopia.3347.opt.a.tt: "Eine zufällige Flotte, die wir kontrollieren, verliert bis zu 12 §HFlottenkapazität§!"
 utopia.3348.name: "[GetCradleChaoticAnguishName]"
 utopia.3348.name.organic_non_gestalt: "$name_cradle$: §RAngst§!"
 utopia.3348.name.machine_or_gestalt: "$name_cradle$: §RFehlfunktion§!"
 utopia.3348.desc.intro: "[GetCradleAnguishIntro]"
 utopia.3348.desc.organic_non_gestalt: "$utopia.3348.desc.intro$ eine Existenzangst hervorrief."
 utopia.3348.desc.machine_or_gestalt: "$utopia.3348.desc.intro$ eine kognitive Fehlfunktion verursachte."
 utopia.3348.desc_intro_homicidal: "Im Einklang mit dem Willen der §HWiege§! ist die [root.GetSpeciesAdj]e Psyche von einer Dissonanz eingenommen, die sich mit der Absurdität einer harmonischen Koexistenz aller Bewusstseine befasst. Als Reaktion auf die derzeitigen Unruhen in der Galaxie wurde die Bevölkerung von einer psionischen Störwelle erfasst, die"
 utopia.3348.desc_intro_default: "Im Einklang mit dem Willen der §HWiege der Seelen§! entschied sich die [root.GetSpeciesAdj]e Spezies für ein harmonisches Zusammenleben. Als Reaktion auf die derzeitigen Unruhen in der Galaxie wurde die Bevölkerung von einer psionischen Störwelle erfasst, die"
 utopia.3348.opt.a: "Wir müssen überdauern."
 anguish_of_the_cradle: "Qualen der Wiege"
 anguish_of_the_cradle_desc: "Die $the_cradle_of_souls_article_cap$ schickte eine psionische Störwelle durch unsere Bevölkerung."
 anguish_of_the_cradle_gestalt: "$anguish_of_the_cradle$"
 anguish_of_the_cradle_gestalt_desc: "$anguish_of_the_cradle_desc$"
 utopia.3349.name: "$name_cradle$: §RBegrenzung§!"
 utopia.3349.desc: "Es wird immer schwieriger, Militärflotten in §H[root.GetName]§! zu unterhalten.\n\nUnsere [GetTelepathPlural] spürten, dass diese Störung von der §HWiege der Seelen§! verursacht wurde, die danach strebt, die galaktische Ordnung aufrechtzuerhalten. Unsere Investitionen in militärische Infrastruktur, ganz egal, wie gering sie auch sein mögen, müssen ihr Missfallen erregt haben."
 utopia.3349.opt.a: "Wir sollten unsere Präsenz in der Leere begrenzen."
 limit_of_the_cradle: "Begrenzungen der Wiege"
 limit_of_the_cradle_desc: "Unserer militärischen Infrastruktur wurden von der $the_cradle_of_souls_article$ Beschränkungen auferlegt."
 utopia.3350.name: "[GetLavishLifestyleEventName]"
 utopia.3350.name.individual: "$name_instrument$: §RVerschwenderischer Lebensstil§!"
 utopia.3350.name.gestalt: "$name_instrument$: §RAusschweifender Verbrauch§!"
 utopia.3350.desc.individual: "Unsere Verbindung zum §HInstrument§! führte dazu, dass ein Teil der [Root.GetSpeciesAdj]en Führung kostenintensive Konsumgewohnheiten entwickelt hat.\n\n[lavish_leader.GetName] wurde dabei erwischt, riesige Summen an Energie-Credits für extravagante Dinge auszugeben, um einen zunehmend verschwenderischen Lebensstil zu finanzieren."
 utopia.3350.desc.gestalt: "Unsere enge Verbindung zum §HInstrument§! führt bei einigen [Root.GetSpeciesAdj]en Anführerdrohnen zu einem erhöhten Ressourcenverbrauch.\n\n[lavish_leader.GetName] insbesondere verbraucht mehr Energie, als für die Kernfunktionalität notwendig wäre. Da wir keine physikalische Grundlage dafür finden konnten, sind wir zu dem Schluss gekommen, dass es sich bei dieser verschwenderischen Ressourcennutzung in gewisser Weise um eine Art Bevorzugung handeln muss."
 utopia.3350.opt.a: "Dies ist nun einmal der Preis, um seine Sehnsucht zu stillen."
 utopia.3351.name: "$name_instrument$: §RAblenkungen am Arbeitsplatz§!"
 utopia.3351.desc.individual: "Während sich der Einfluss unseres Schleierpakts immer weiter über [Root.GetName] ausbreitet, lenken neue Freizeitbeschäftigungen Teile der Bevölkerung von ihrer produktiven Arbeit ab.\n\nAngesichts der stark nachlassenden Motivation muss heute viel mehr investiert werden als früher, um mit der gleichen Arbeitskraft die gleichen Ergebnisse zu erzielen."
 utopia.3351.desc.gestalt: "Während sich der Einfluss unseres Schleierpakts immer weiter über [Root.GetName] ausbreitet, macht sich eine immer größere Abweichung innerhalb des [Root.GetSpeciesAdj]es Kollektivs breit.\n\nDiese individualistischen Triebe und die Neigung zur Ablenkung treten besonders häufig bei der Arbeit auf. Wir müssen nun viel mehr investieren, um Zusammenhalt und Disziplin zu gewährleisten."
 utopia.3351.opt.a: "Eine vorübergehende Laune des §HInstruments§!."
 distracted_workforce: "Abgelenkte Arbeitskraft"
 distracted_workforce_desc: "Diese Arbeiter lassen sich leicht ablenken und müssen ständig überwacht werden."
 utopia.200.name: "Eine neue Präsenz im Schleier"
 utopia.200.desc.a: "Die in unserem Reich lebenden [target_species.GetNamePlural] sind von einem Wandel ergriffen worden. Alles begann mit einer schwachen Woge im Schleier. Nun ist es so, als würden sie auf einer anderen Ebene vibrieren. Wir alle können es spüren: Die [target_species.GetNamePlural] stehen kurz dafür, latente psionische Fähigkeiten zu entwickeln.\n\nVielleicht liegt es daran, dass sie in unmittelbarer Nachbarschaft zu uns leben. Vielleicht sind sie auch einfach vom Schleier ausgewählt worden. Unsre obersten psionischen Experten der Telepathenkonklave warnen uns, dass dies unsere einzige Chance sein könnte einzugreifen. Wir könnten die Entwicklung im Keim ersticken oder ihnen bei der Erweckung helfen. Ohne unsere Führung werden sie es nicht weit schaffen."
 utopia.200.desc.b: "Ungewöhnliche Aktivität im Schleier legt nahe, dass sich bei den [target_species.GetNamePlural], der anderen Spezies in unserer Nation, latente psionische Fähigkeiten zu entwickeln beginnen. Wir stehen nun vor derselben Wahl wie zuvor - sollen wir sie unterdrücken oder ihre aufkeimenden Mächte entfesseln?"
 utopia.200.a: "Wir werden ihr Potenzial entfalten."
 utopia.200.a.tooltip: "Alle [target_species.GetAdj]en Bewohner erhalten die Eigenschaft \"§Y$trait_latent_psionic$§!\"."
 utopia.200.b: "Sie sind unwürdig."
 utopia.203.name: "Die Erweckung"
 utopia.203.desc.a: "Unter der Führung der Telepathenkonklave haben die [target_species.GetNamePlural] eine tiefere Verbindung zum Schleier entwickelt, als wir es jemals für möglich gehalten hätten. Es ist gar so, als wären diese Mächte schon immer für sie vorherbestimmt gewesen.\n\nSie behaupten, jetzt bereit zur Entfaltung ihres vollen psionischen Potenzials zu sein. Die Konklave ist sich diesbezüglich aber uneins: Einige machen sich Sorgen, dass der Wandel zu schnell gekommen ist und ihr Verstand instabil werden könnte ... andere befürchten, dass ihnen ihre neu entdeckten Mächte zu Kopfe steigen könnten. Wenn wir aber jetzt nicht zuschlagen, bekommen wir vielleicht nie wieder die Chance dazu."
 utopia.203.desc.b: "Die [target_species.GetNamePlural] behaupten ebenfalls, dass sie für die notwendigen Schritte zum Erreichen ihres vollen psionischen Potenzials und ihrer Erweckung bereit sind."
 utopia.203.a: "Sie sind bereit."
 utopia.203.a.tooltip: "Alle [target_species.GetAdj]en Bewohner erhalten die Eigenschaft \"§Y$trait_psionic$§!\"."
 utopia.203.b: "Sie sind unwürdig."
 utopia.203.c: "Es ist zu gefährlich."
 utopia.204.name: "Ein böses Erwachen"
 utopia.204.desc.a: "Die unerwartete Manifestierung psionischer Fähigkeiten bei manchen [original_species.GetSpeciesNamePlural] hat unsere Forscher in letzter Zeit sehr verblüfft. Bei genauerer Untersuchung fanden sie heraus, dass die Veränderungen mit einer bedeutenden psionischen Erweckung ihrer [target_country.GetName]-Brüder einhergingen - diese Nation ist schon seit langer Zeit für ihre psionischen Fähigkeiten bekannt gewesen.\n\nWir können nur annehmen, dass sich einige ihrer neu entdeckten Mächte auf ihre entfernten Verwandten in unserem Reich übertragen haben - auch wenn wir noch nicht verstehen, wie das geschehen sein könnte."
 utopia.204.desc.b: "Die unerwartete Manifestierung psionischer Fähigkeiten bei manchen [original_species.GetSpeciesNamePlural] hat unsere Forscher in letzter Zeit sehr verblüfft. Bei genauerer Untersuchung fanden sie heraus, dass die Psioniker mit ihren Brüdern in einer zuvor unbekannten Nation, [target_country.GetName], telepathisch verbunden sind. Mit dieser Nation haben wir nun Kontakt aufgenommen. Anscheinend handelt es sich bei den Veränderungen, die wir erfahren haben, um eine Art Welleneffekt, der durch eine bedeutende psionische Erweckung aller [target_country.GetName]-[original_species.GetSpeciesNamePlural] ausgelöst wurde."
 utopia.204.a.tooltip: "Bis zu 4 [original_species.GetSpeciesAdj]e Bewohner erlangen die Eigenschaft §YLatent psionisch§!."
 utopia.205.name: "Eine unerwartete Erweckung"
 utopia.205.desc: "Seit der psionischen [target_species.GetName]-Erweckung berichten unsere Informanten, dass auch andernorts Mitglieder derselben Spezies nun erste Anzeichen latenter psionischer Fähigkeiten zeigen. Es ist fast so, als wären sie aufgrund ihrer gemeinsamen Vorfahren im Schleier miteinander verbunden - ganz gleich, wie weit sie physisch voneinander getrennt sind.\n\nIm Gegensatz zu ihren entfernen Verwandten in unserer Nation sind sie aber nicht sehr zahlreich, und dass sie jemals eine volle Erweckung erreichen werden, gilt als unwahrscheinlich."
 whisperers_madness: "Schleier-Wahnsinn"
 whisperers_madness_desc: "Aufgrund des Wahnsinns, den die $whisperers_in_the_void_color_article$ in unserer Bevölkerung auslösten, ist unser Reich gespalten."
 whisperers_madness_gestalt: "$whisperers_madness$"
 whisperers_madness_gestalt_desc: "Aufgrund des kollektiven Wahnsinns, den die $whisperers_in_the_void_color_article$ in unseren Drohnen auslösten, ist unser Reich gespalten."
 whisperers_psychosis: "Schleier-Psychose"
 whisperers_psychosis_desc: "Aufgrund des Wahnsinns, den die $whisperers_in_the_void_color_article$ verursachten, fiel unser Reich inneren Streitigkeiten zum Opfer."
 whisperers_psychosis_gestalt: "$whisperers_psychosis$"
 whisperers_psychosis_gestalt_desc: "Aufgrund des Wahnsinns, den die $whisperers_in_the_void_color_article$ verursachten, fiel unser Reich innerer Zwietracht zum Opfer."
 eater_unhappiness_planet_1: "Von der Weltenfresserin verschlungene Bevölkerung"
 eater_unhappiness_planet_1_desc: "Ein Teil der Bevölkerung auf diesem Planeten wurde von der $the_eater_of_worlds_color_article$ verschlungen."
 eater_unhappiness_planet_1_gestalt: "$eater_unhappiness_planet_1$"
 eater_unhappiness_planet_1_gestalt_desc: "$eater_unhappiness_planet_1_desc$"
