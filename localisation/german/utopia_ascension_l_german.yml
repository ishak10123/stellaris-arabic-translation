 utopia.3000.name: "Der Schleier"
 utopia.3000.a: "In den Schleier hineinreichen."
 utopia.3000.intro.desc: "Der Schleier. Er ist unglaublich merkwürdig und erschütternd, gleichermaßen aber auch ...  unmittelbar vertraut. Jeder, der psionische Kräfte hat, wird diesen Ort in seinen Träumen gesehen haben, obwohl er ihn zu diesem Zeitpunkt wohl noch nicht kannte.\n\nWir verweilen nun am Abgrund dieses Reiches, ganz in der Nähe der Leere dazwischen, die als Grenze zwischen hier und dem gewöhnlichen Weltraum dient... oder was wir als die Wirklichkeit bezeichnen würden.\n\nTiefer in den Schleier hineinzureichen wird von unseren Telepathen große Anstrengungen erfordern und viel Energie kosten. Wir dürfen nicht schwanken ... selbst jetzt stehen wir unter Beobachtung."
 utopia.3000.1.desc: "Heute ist es ruhig im Schleier."
 utopia.3000.2.desc: "Jemand beobachtet uns."
 utopia.3000.3.desc: "Auf dieser Seite sieht alles so anders aus."
 utopia.3000.4.desc: "Sie hätten einen Poeten schicken sollen ..."
 utopia.3000.5.desc: "Etwas Dunkles kommt."
 utopia.3000.6.desc: "Träumen wir immer noch?"
 utopia.3000.7.desc: "Wir ... wir haben es geschafft. Wir sind drin!"
 utopia.3000.8.desc: "In der Nähe verweilt eine Art ... Präsenz. Sie ruft uns tiefer in den Schleier hinein ..."
 utopia.3000.9.desc: "Hört ihr die Stimmen auch?"
 utopia.3000.10.desc: "Der Schleier pulsiert vor Energie. Es fühlt sich an wie ... zuhause."
 utopia.3000.11.desc: "Meint ihr, dass es Luft ist, die ihr atmet?"
 utopia.3000.12.desc: "Wir sehen, und dennoch sehen wir nicht. Es gibt so viel über diesen Ort zu lernen."
 utopia.3000.13.desc: "Welche Sinne fehlen uns, dass wir eine andere Welt, die überall um uns herum ist, nicht sehen und hören können?"
 utopia.3000.14.desc: "Seht euch tunlichst vor. An diesem Ort kann selbst ein flüchtiger Gedanke zu etwas Greifbarem geformt werden ... und in den meisten Fällen gegen einen selbst gewendet werden."
 utopia.3000.15.desc: "Dass wir hier sind, war niemals vorgesehen."
 utopia.3000.16.desc: "So ... viel ... Macht ..."
 utopia.3000.17.desc: "Muss ... konzentrieren ..."
 utopia.3000.18.desc: "Hat hier vielleicht alles begonnen?"
 utopia.3000.19.desc: "Das Grauen ... das Grauen hat ein Gesicht."
 utopia.3000.b: "§MWendet euch an eine höhere Macht.§!"
 utopia.3005.desc: "Wir wissen, dass es da draußen unermesslich mächtige Kräfte gibt. Wir könnten versuchen, die Möglichkeiten von Zro anzuzapfen, um diese Kräfte zu kontaktieren. Unsere Telepathen spüren überall im Schleier den Einfluss dieser Wesen. Es bleibt nur eine Frage: Welches von ihnen sollten wir aufsuchen?"
 utopia.3005.a: "§GDas Wesen, das nach entfesseltem Fleisch stinkt.§!"
 utopia.3005.b: "§PDas Wesen, das vor einer unstillbaren Leere schreit.§!"
 utopia.3005.c: "§HDas Wesen, das von Sehnsucht und Ergreifung wispert.§!"
 utopia.3005.d: "§BDas Wesen, das nach enttäuschtem Vertrauen schmeckt.§!"
 utopia.3010.desc: "Die Telepathenkonklave hat sich noch nicht von unserem vorherigen Besuch im Schleier erholt. Ohne ihre kombinierte psionische Macht können wir nur kurze Blicke in dieses flüchtige Reich werfen - wie die verschwommenen Ränder einer Erinnerung, die gerade so außer Reichweite liegt.\n\nHier gibt es nichts für uns. Wir werden später zurückkommen müssen."
 boon.bestowed: "§GVorteil verliehen§!"
 curse.bestowed: "§RFluch verhängt§!"
 boon.psi.link.machine: "Die mächtigen Energien des §HSchleiers§! sind in die psionischen Verarbeitunsknoten geströmt, die alle [Root.GetSpeciesNamePlural] teilen."
 boon.psi.link.organic_non_gestalt: "Die mächtigen Energien des §HSchleiers§! sind in die gemeinschaftliche psionische Verbindung geströmt, die alle [Root.GetSpeciesNamePlural] teilen."
 boon.psi.link.hive: "Die mächtigen Energien des §HSchleiers§! sind in die gemeinschaftliche psionische Verbindung geströmt, die durch das gesamte [Root.GetAdjective]e Überbewusstsein pulsiert."
 boon.psi.link: "[GetBoonPsiLink]"
 boon.ship.link: "Unsere [GetTelepathPlural] schafften es, eine temporäre Verbindung zwischen dem §HSchleier§! und unseren Raumschiffen herzustellen."
 utopia.3030.desc.gestalt: "$boon.psi.link$\n\nDie Energie fließt durch das gesamte Netzwerk und sorgt für optimale Stabilität, während unsere Drohnen ihre Aufgaben erfüllen."
 utopia.3030.desc.organic_non_gestalt: "$boon.psi.link$\n\nEin tiefgreifendes Gefühl der Ruhe macht sich in ganz [Root.GetName] breit und scheint sich selbst auf jene ohne psionische Fähigkeiten auszuwirken."
 utopia.3030.desc.machine_non_gestalt: "$boon.psi.link$\n\nEin tiefgreifendes Gefühl des Gleichgewichts macht sich in ganz [Root.GetName] breit und scheint sich selbst auf jene ohne psionische Komponenten auszuwirken."
 utopia.3031.desc: "$boon.ship.link$\n\nUnsere Flotten weisen ungeachtet ihrer Betriebsdauer keine Anzeichen von Verschleiß auf. Infolgedessen wurden unsere Unterhaltskosten deutlich reduziert."
 utopia.3032.desc.non_gestalt: "$boon.psi.link$\n\nUnsere [GetScientistPlural] teilen sich per Telepathie eine kollektive Wissensbasis, was die Effizienz ihrer Arbeit enorm steigert."
 utopia.3032.desc.organic_gestalt: "$boon.psi.link$\n\nUnsere auf Forschung spezialisierten Knoten im [Root.GetSpeciesAdj]en Überbewusstsein arbeiten in perfekter Synchronität zusammen und steigern so die kognitive Leistung."
 utopia.3032.desc.machine_gestalt: "$boon.psi.link$\n\nPsionische Rendering-Schleifen erlauben es unserer Forschungsmatrix, über die maximale Effizienz hinaus zu arbeiten, was die Lerneffizienz erheblich verbessert."
 utopia.3033.desc: "$boon.ship.link$\n\nMit Hilfe ihrer psionischen Kräfte können die Besatzungen unserer Kriegsschiffe jetzt unsere Schildsysteme verbessern."
 utopia.3034.desc: "$boon.ship.link$\n\nDank ihrer psionischen Kräfte können unsere Besatzungen jetzt die Stärke unserer Waffensysteme verbessern."
 utopia.3035.desc: "$boon.ship.link$\n\nDank ihrer psionischen Kräfte können unsere Besatzungen jetzt die Feuergeschwindigkeit unserer Waffensysteme verbessern."
 utopia.3036.desc.organic_non_gestalt: "$boon.psi.link$\n\nIn den Herzen und Köpfen unserer Bürger hat sich ein neues Solidaritätsgefühl breitgemacht. Sie scheinen nun gewillter zu sein, auf die gemeinsamen Ziele hinzuarbeiten, die von der Regierung ausgegeben wurden."
 utopia.3036.desc.machine_non_gestalt: "$boon.psi.link$\n\nIn den Verarbeitungskernen unserer Bürger hat sich ein neues Solidaritätsgefühl breitgemacht. Sie scheinen nun gewillter zu sein, auf die gemeinsamen Ziele hinzuarbeiten, die von der Regierung ausgegeben wurden."
 utopia.3036.desc.gestalt: "$boon.psi.link$\n\nDiese Energien sind im gesamten Kollektiv zu spüren. Sie optimieren die Effizienz unserer Drohnen und reduzieren jegliche Abweichungen, die unsere Konzentration beeinträchtigen könnten."
 utopia.3037.desc.organic_non_genocidal: "$boon.psi.link$\n\nUnsere Empathen sind stärker als jemals zuvor, was zu größerem politischen Einfluss führt."
 utopia.3037.desc.machine_non_genocidal: "$boon.psi.link$\n\nUnsere Diplomateneinheiten arbeiten bei maximaler empathischer Effizienz, was zu einem größeren politischen Einfluss führt."
 utopia.3037.desc.genocidal: "$boon.psi.link$\n\nUnser Wille wird der Galaxie in einem Ausmaß aufgezwungen, wie es noch nie zuvor der Fall war."
 utopia.3038.desc.gestalt: "$boon.psi.link$\n\nWir haben noch nie eine solche Klarheit und Einigkeit erlebt."
 utopia.3038.desc.non_gestalt: "$boon.psi.link$\n\nWir hatten noch niemals ein größeres Einigkeitsgefühl."
 utopia.3039.desc: "$boon.ship.link$\n\nDank ihrer psionischen Kräfte können unsere Besatzungen jetzt die Bewegungen unserer Schiffe direkt beeinflussen, wodurch diese Feindbeschuss besser ausweichen können."
 utopia.3040.desc.organic: "$boon.ship.link$\n\nDank ihrer psionischen Kräfte können unsere Besatzungen jetzt eingeschränkte Reparaturen während eines Einsatzes vornehmen und allein mit der Kraft ihrer Gedanken Risse in Schiffsrümpfen ausbessern."
 utopia.3040.desc.machine: "$boon.ship.link$\n\nDank ihrer psionischen Kräfte können unsere Besatzungen jetzt eingeschränkte Reparaturen während eines Einsatzes vornehmen und allein mit der Kraft ihrer Neuroprozessoren Risse in Schiffsrümpfen ausbessern."
 utopia.3041.desc.machine: "$boon.psi.link$\n\nUnsere [GetTelepathPlural] nutzten diese Kraft, um die Leistung unserer wichtigsten Anführereinheiten vorübergehend zu verbessern und ihr voraussichtliches Verfallsdatum um Jahrzehnte hinauszuzögern. Leider reichte die psionische Energie nicht aus, um diesen Effekt auf die gesamte Bevölkerung auszuweiten."
 utopia.3041.desc.organic_gestalt: "$boon.psi.link$\n\nUnsere [GetTelepathPlural] nutzten diese Kraft, um den Alterungsprozess unserer wichtigsten Anführerdrohnen vorübergehend zu verlangsamen und so ihre Lebenserwartung um Jahrzehnte zu verlängern. Leider reichte die psionische Energie nicht aus, um diesen Effekt auf die gesamte Bevölkerung auszuweiten."
 utopia.3041.desc.organic_non_gestalt: "$boon.psi.link$\n\nUnsere [GetTelepathPlural] nutzten diese Kraft, den Alterungsprozess unserer wichtigsten Anführer vorübergehend zu verlangsamen und so ihre Lebenserwartung um Jahrzehnte zu verlängern. Leider reichte die psionische Energie nicht aus, um diesen Effekt auf die gesamte Bevölkerung auszuweiten."
 utopia.3041.tooltip: "Alle Anführer erhalten die Eigenschaft \"§Y$leader_trait_shroud_age$§!\". Dies erhöht die Lebensdauer (Anführer) um §G+40§! Jahre."
 utopia.3042.desc: "$boon.ship.link$\n\nDank ihrer psionischen Kräfte kann unsere Besatzung jetzt die Stärke der Schubdüsen ihrer Schiffe verbessern. Dies führt zu enorm erhöhten Unterlichtgeschwindigkeiten."
 utopia.3043.desc.organic: "$boon.psi.link$\n\nDies stärkte das Bewusstsein unserer Soldaten so weit, dass diese jetzt gewillt sind, es mit jeglichen Gefahren aufzunehmen. Ihre Moral ist unübertroffen."
 utopia.3043.desc.machine_or_gestalt: "$boon.psi.link$\n\nDies stärkte unsere Drohnen so weit, dass sie bei einer Schlacht eine optimale Effizienz erreichen."
 utopia.3044.desc: "$boon.psi.link$\n\nWir können die Flugbewegungen von Raumschiffen jetzt aus weitaus größerer Distanz spüren als jede konventionelle Sensormatrix."
 utopia.3045.name: "Aus dem Schleier geworfen"
 utopia.3045.1.desc: "Die Verbindung, die unsere [GetTelepathPlural] zum Schleier nutzten, fiel in sich zusammen, als sich mehrere Energieebenen der psionischen Dimension ohne Vorwarnung verlagerten.\n\nWir wurden kurzerhand in den Normalraum zurückgeworfen."
 utopia.3045.2.desc: "Unsere [GetTelepathPlural] wurden von der intensiven Belastung überwältigt, der sie während unseres Austauschs mit dem Schleier ausgesetzt waren.\n\nSie können die Verbindung nicht länger aufrechterhalten."
 utopia.3045.3.desc_organic: "Unser Kontakt zum Schleier begann zunächst langsam zu schwinden, dann immer schneller und schneller. Unsere [GetTelepathPlural] schrien vor Schmerzen, als sie ihren Halt verloren und zurück in den Normalraum geworfen wurden."
 utopia.3045.3.desc_machine: "Unser Kontakt zum Schleier begann zunächst langsam zu schwinden, dann immer schneller und schneller. Bei unseren [GetTelepathPlural] traten Fehlfunktionen auf, als sie ihren Halt verloren und zurück in den Normalraum geworfen wurden."
 curse.psi.link.organic: "Eine starke psionische Rückkopplung ist durch unsere Verbindung zum Schleier in das gemeinschaftliche psionische Netzwerk geströmt, das von allen [Root.GetSpeciesNamePlural] geteilt wird."
 curse.psi.link.machine: "Eine starke neurale Rückkopplung strömte durch unsere Verbindung zum Schleier in das gemeinschaftliche psionische Netzwerk, das alle [Root.GetSpeciesNamePlural] teilen."
 curse.psi.link: "[GetCursePsiLink]"
 curse.ship.link: "Eine starke psionische Rückkopplung strömte durch unsere Verbindung zum Schleier und scheint unsere Schiffe zu beeinflussen."
 utopia.3050.desc.gestalt: "$curse.psi.link$\n\nDies führte zu weitreichenden Störungen im Kollektiv und destabilisierte ganz [Root.GetName]."
 utopia.3050.desc.non_gestalt: "$curse.psi.link$\n\nDieses Ereignis hatte tiefgreifende Auswirkungen auf die Zufriedenheit unserer Bürger, und in ganz [Root.GetName] herrscht nun eine düstere Stimmung."
 utopia.3051.desc.gestalt: "$curse.psi.link$\n\nDie nachfolgenden Schockwellen durch das Kollektiv führten zu einem beunruhigend häufigen Auftreten abweichenden Verhaltens unter unseren Drohnen."
 utopia.3051.desc.non_gestalt: "$curse.psi.link$\n\nDiese negative Energie hat sich zweifelsohne in den Gemütern unserer Bürger festgesetzt. Viele wenden sich jetzt neuen radikalen Vorstellungen zu, die nicht mit denen unserer Regierung übereinstimmen. Der Effekt hat sich sogar auf nicht-psionische Bürger ausgeweitet!"
 utopia.3052.desc: "$curse.ship.link$\n\nIhre Panzerung ist brüchig geworden und daher nicht mehr so widerstandsfähig wie zuvor."
 utopia.3053.desc.machine: "$curse.psi.link$\n\nDie daraus resultierende Belastung unseres neuronalen Netzwerks führte zu einem erheblichen Rückgang in der Einheitenkonstruktion in ganz [Root.GetName]."
 utopia.3053.desc.organic_gestalt: "$curse.psi.link$\n\nDer daraus resultierende Schmerz, der im gesamten Kollektiv zu spüren war, führte dazu, dass wir deutlich weniger neue Drohnen produzieren können."
 utopia.3053.desc.organic_non_gestalt: "$curse.psi.link$\n\nAus irgendeinem Grund hatte dies einen negativen Effekt auf die Geburtenrate im gesamten [Root.GetName]-Territorium. Dies hat sogar Mitglieder von Rassen ohne angeborene psionische Fähigkeiten betroffen!"
 utopia.3054.desc.machine_gestalt: "$curse.psi.link$\n\nDie daraus resultierenden psionischen Rückkopplungsschleifen hindern unsere Forschungsmatrix daran, effizient und mit voller Kapazität zu arbeiten."
 utopia.3054.desc.machine_non_gestalt: "$curse.psi.link$\n\n[GetMindPhysicalLoc::<DE_ART_DEF_S_N_Cap>] [GetMindPhysicalLoc&NOM] unserer Forscher wurde derart stark überladen, dass sie sich nicht mehr auf ihre Aufgabe konzentrieren konnten."
 utopia.3054.desc.organic_gestalt: "$curse.psi.link$\n\nUnsere für die Forschung ausgewiesenen Knoten innerhalb des [Root.GetSpeciesNamePlural]-Kollektivs wurden derart überlastet, dass sie nicht in der Lage waren, neue Erkenntnisse effizient zu verarbeiten."
 utopia.3054.desc.organic_non_gestalt: "$curse.psi.link$\n\n[GetMindPhysicalLoc::<DE_ART_DEF_S_N_Cap>] [GetMindPhysicalLoc&NOM] unserer Forscher war derart vernebelt, dass sie sich nicht mehr auf ihre Aufgabe konzentrieren konnten."
 utopia.3055.desc: "$curse.psi.link$\n\nDie Geschwindigkeit, mit der wir politischen Einfluss sammeln, ist stark reduziert worden."
 utopia.3056.desc.organic_non_gestalt: "$curse.psi.link$\n\nDas Einigkeitsgefühl, das es früher zwischen unseren Bürgern gegeben hat, ist zerschmettert worden."
 utopia.3056.desc.machine_or_gestalt: "$curse.psi.link$\n\nDas Gefühl der Einheit, das einst in ganz [Root.GetName] herrschte, wurde in seinen Grundfesten erschüttert und löste einen weitreichenden Mangel an Koordination aus."
 utopia.3057.desc: "$curse.ship.link$\n\nUnsere Schiffe bewegen sich, als würden sie von einer unsichtbaren Kraft zurückgehalten werden, was zu einer deutlich langsameren Unterlichtgeschwindigkeit führt."
 utopia.3058.desc.organic_non_gestalt: "$curse.psi.link$\n\nDiese negative Energie hat die Moral unserer Bodentruppen unterwandert, die vorübergehend im Kampf viel ineffizienter sein werden."
 utopia.3058.desc.machine_or_gestalt: "$curse.psi.link$\n\nDie durch diese Energieschübe verursachten Rückkopplungsschleifen haben die Einsatzfähigkeit unserer Bodentruppen stark beeinträchtigt."
 utopia.3059.desc: "Eine starke psionische Rückkopplung strömte durch unsere Verbindung zum Schleier und scheint unsere interstellaren Sensoren zu stören.\n\nDie Sensorauflösung sämtlicher Quellen ist stark reduziert, was unsere Sensorreichweite deutlich verringert hat."
