 utopia.3400.name: "Ein göttlicher Herrscher"
 utopia.3400.desc: "Das [GetImmortalLoc]e Wesen, auch bekannt als \"§H[chosen_one.GetName]§!\" - zuvor \"[chosen_one_species.GetName]\", jetzt aber etwas viel Höheres - zog eine große und fromme Anhängerschaft in [Root.GetName] an. Von vielen als höchste Gottheit verehrt wird nun verlangt, dass der [chosen_one.GetTitle] offiziell und für alle Ewigkeit zum dauerhaften Herrscher unseres großen Reiches gekrönt wird."
 utopia.3400.a: "Ein mächtiger Psyioniker, ein Gott? Wohl kaum."
 utopia.3400.b: "Möge [chosen_one.GetHerHis]e Herrschaft bis in die Unendlichkeit... und darüber hinaus reichen!"
 reject_god_emperor: "[chosen_one.GetName] wird [chosen_one.GetTitle] bleiben."
 utopia.3401.name: "[chosen_one.GetTitle] auf [From.Capital.GetName] gekrönt"
 utopia.3401.desc.intro: "[GetPsychicNoun::<DE_ART_IND_N_Cap>] unglaublich mächtig[GetPsychicNoun::<DE_END_ADJ_NUL_S_N>] [chosen_one_species.GetName] [GetPsychicNoun&NOM] hat die Kontrolle über §H[From.GetName]§! übernommen!"
 utopia.3401.desc.outro: "Wesen, das von [chosen_one.GetHerHis]en Anhängern auch als \"Auserwählter\" bezeichnet wird, wurde heute Morgen in einer verschwenderischen Zeremonie auf [From.Capital.GetName] gekrönt. Kurz darauf wurde an alle interstellaren Regierungen ein Kommuniqué geschickt, das die ewige Herrschaft von §H[chosen_one.GetRulerTitle] [chosen_one.GetRegnalName]§! feiert."
