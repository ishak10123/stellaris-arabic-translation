 tech_covenant_composer_desc: "Wir haben herausgefunden, wie wir psionische Energie durch unsere Schiffe fließen lassen können. Mit diesem Wissen können wir unsere Schiffe nun mit den Kräften unseres Schleierpakts ausstatten."
