 shroud.avatar: "Wenn wir Erfolg haben, wird sich eine Inkarnation aus purer psionischer Energie in unserem Universum manifestieren. Sie wird vollständig unter unserer Kontrolle stehen."
 shroud.boon: "Wenn wir Erfolg haben, wird die Energie des Schleiers in einen mächtigen Vorteil gebündelt, der einen positiven Effekt auf unser gesamtes Reich hat."
 shroud.unknown: "Wenn wir Erfolg haben ... nun ja ... wer weiß das schon wirklich?"
