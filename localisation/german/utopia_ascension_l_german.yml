 whisperers_covenant_chain_title: "Die Flüsterer in der Leere"
 whisperers_covenant_chain_desc: "Wir stellten eine Verbindung zu den Schleierwesen namens \"$whisperers_in_the_void_color_article$\" her. Diese unergründlichen Wesen gewährten uns einen winzigen Bruchteil ihrer Macht, da wir bereit waren, den Preis dafür zu zahlen. Weitere Forderungen werden wahrscheinlich folgen.\n\nUnsere [GetTelepathPlural] verteten die Theorie, dass sich der Pakt noch vertiefen ließe, wenn wir unsere Handlungen mehr an den Willen unserer Mäzene anpassen.\n\nDie Flüsterer erfreuen sich an neuem Wissen, bewahrten Geheimnissen und Verschwörungen. Sie schwelgen in der einfachen Freude eines bis zum Rand gefüllten Geistes, der vor lauter Wissen schier aus allen Nähten platzt."
 whisperers_covenant_chain_begin: "$BEGINS_EVENT_CHAIN$ §Y$whisperers_covenant_chain_title$§!"
 whisperers_covenant_chain_end: "$ENDS_EVENT_CHAIN$ §Y$whisperers_covenant_chain_title$§!"
 eater_covenant_chain_title: "Die Weltenfresserin"
 eater_covenant_chain_desc.intro: "Wir stellten eine Verbindung zu dem Schleierwesen namens \"$the_eater_of_worlds_color_article$\" her. Dieses unersättliche Wesen gewährte uns einen winzigen Bruchteil seiner Macht, da wir bereit waren, den Preis dafür zu zahlen. Weitere Forderungen werden wahrscheinlich folgen.\n\nUnsere [GetTelepathPlural] vertreten die Theorie, dass sich der Pakt noch vertiefen ließe, wenn wir unsere Handlungen mehr an den Willen unserer Mäzenin anpassen."
 eater_covenant_chain_desc: "$eater_covenant_chain_desc.intro$\n\nDie Fresserin wartet ungeduldig auf ihre nächste Mahlzeit. Sie sehnt sich nach Krieg und dem süßen Geschmack von Streitigkeiten und Wehklagen."
 eater_covenant_chain_begin: "$BEGINS_EVENT_CHAIN$ §Y$eater_covenant_chain_title$§!"
 eater_covenant_chain_end: "$ENDS_EVENT_CHAIN$ §Y$eater_covenant_chain_title$§!"
 composer_covenant_chain_title: "Die Komponistin der Stränge"
 composer_covenant_chain_desc.intro: "Wir stellten eine Verbindung zu dem Schleierwesen namens \"$the_composer_of_strands_color_article$\" her. Dieses fleischbeschützende Wesen gewährte uns einen winzigen Bruchteil seiner Macht, da wir bereit waren, den Preis dafür zu zahlen. Weitere Forderungen werden wahrscheinlich folgen.\n\nUnsere [GetTelepathPlural] vertreten die Theorie, dass sich der Pakt noch vertiefen ließe, wenn wir unsere Handlungen mehr an den Willen unserer Mäzenin anpassen."
 composer_covenant_chain_desc: "$composer_covenant_chain_desc.intro$\n\nDie Komponistin sehnt sich nach genetischer Manipulation und Fleisch, das von den Zwängen der Evolution befreit wurde. Sie erzählt uns davon, Respekt vor dem Leben und der Natur zu haben, und von der Unantastbarkeit des Fleisches."
 composer_covenant_chain_begin: "$BEGINS_EVENT_CHAIN$ §Y$composer_covenant_chain_title$§!"
 composer_covenant_chain_end: "$ENDS_EVENT_CHAIN$ §Y$composer_covenant_chain_title$§!"
 instrument_covenant_chain_title: "Das Instrument der Sehnsüchte"
 instrument_covenant_chain_desc.intro: "Wir stellten eine Verbindung zu dem Schleierwesen namens \"$the_instrument_of_desire_color_article$\" her. Dieses verhätschelnde Wesen gewährte uns einen winzigen Bruchteil seiner Macht, da wir bereit waren, den Preis dafür zu zahlen. Weitere Forderungen werden wahrscheinlich folgen.\n\nUnsere [GetTelepathPlural] vertreten die Theorie, dass sich der Pakt noch vertiefen ließe, wenn wir unsere Handlungen mehr an den Willen unseres Mäzens anpassen."
 instrument_covenant_chain_desc: "$instrument_covenant_chain_desc.intro$\n\nDas Instrument dürstet es nach Sehnsüchten. Vergnügungen, Dekadenz und Sklaverei machen das Instrument aus."
 instrument_covenant_chain_begin: "$BEGINS_EVENT_CHAIN$ §Y$instrument_covenant_chain_title$§!"
 instrument_covenant_chain_end: "$ENDS_EVENT_CHAIN$ §Y$instrument_covenant_chain_title$§!"
 utopia.2671.name: "Unser Pakt vertieft sich"
 utopia.2671.desc: "Unser Verständnis für [GetShroudPatronDE2] wächst. Wir sind für das Wesen nicht mehr als eine Randnotiz, ein Insekt in seinem Haus, und dennoch hat es Gefallen an uns gefunden und uns einen weiteren Tropfen seiner Macht verliehen.\n\nUnsere Telepathen sind nun enger mit dem Wesen verbunden, und wir wurden dazu inspiriert, ein Monument zur Feier unseres Paktes zu errichten, einen Ort, von dem aus unsere besten Telepathen versuchen können, mit §Y[GetShroudPatronDE1]§! zu kommunizieren."
 utopia.2671.a: "Wir fühlen uns in der Umarmung der Komponistin sicherer."
 utopia.2671.a.tt: "Unsere Telepathen produzieren jetzt zusätzliches £pop£ §YBewohnerwachstum§!.\n\nWir können nun ein £building£ §YHeiligtum der Komponistin§! auf einem unserer Planeten bauen."
 utopia.2671.b: "Auch wir haben Hunger. Nur der Krieg kann uns sättigen."
 utopia.2671.b.tt: "Unsere Telepathen produzieren jetzt zusätzliche £mod_country_naval_cap_add£ Flottenkapazität.\n\nWir können nun ein £building£ §YHeiligtum der Fresserin§! auf einem unserer Planeten bauen."
 utopia.2671.c: "Es gibt nichts Schöneres als Sehnsucht."
 utopia.2671.c.tt: "Unsere Telepathen produzieren jetzt zusätzliche £amenities£ Dienstleistungen.\n\nWir können nun ein £building£ §YHeiligtum des Instruments§! auf einem unserer Planeten bauen."
 utopia.2671.d: "Ein erfüllter Geist hat keinen Platz für Zweifel."
 utopia.2671.d.tt: "Unsere Telepathen produzieren jetzt zusätzliche $r_research$.\n\nWir können nun ein £building£ §YHeiligtum der Flüsterer§! auf einem unserer Planeten bauen."
 utopia.2676.name: "Volles Potenzial erreicht"
 utopia.2676.desc: "Die Geheimnisse des §HSchleiers§! sind uns zu fremd, um sie vollständig zu ergründen, doch wir passten uns zumindest besser an §Y[GetShroudPatronDE2]§! an. Überall, wo wir hingehen, spüren wir die Anwesenheit dieses mächtigen Schleierwesens, und seine Macht sickert durch die Ritzen unserer Psyche in unsere Wirklichkeit."
 utopia.2676.a: "Der Wille des Fleisches ist heilig."
 utopia.2676.b: "Zwietracht ist Hingabe."
 utopia.2676.c: "Du sollst begehren."
 utopia.2676.d: "Geheimnisse bieten Sicherheit."
 utopia.2681.name: "Bruchstücke der Macht"
 utopia.2681.desc: "§H[GetShroudPatronDE5]§! lagerte einen Teil [GetShroudPatronDE3] Energie in einer Tasche im §HSchleier§!, und diese Energie wartet nur darauf, dass wir sie uns nehmen. Unsere enge Verbindung erlaubt es einem von uns, diese Macht sicher zu absorbieren und selbst zu nutzen.\n\nEs wurden einige Kandidaten ausgewählt, doch nur einem von ihnen kann das Privileg zuteilwerden, über die Macht unseres Schleierpakts zu gebieten. Wir müssen entscheiden, wer es sein soll."
 utopia.2681.a: "§H[leader_1.GetTitle]§! [leader_1.GetName]."
 utopia.2681.b: "§H[leader_2.GetTitle]§! [leader_2.GetName]."
 utopia.2681.c: "§H[leader_3.GetTitle]§! [leader_3.GetName]."
 utopia.2681.d: "§H[leader_4.GetTitle]§! [leader_4.GetName]."
 utopia.2682.name: "Aufgestiegen"
 utopia.2682.desc.intro: "Es ist vollbracht! Als die Macht in [chosen_leader.GetName] strömte, konnten alle Umstehenden die Stärke der psionischen Präsenz [GetFeelLoc]. Sie ist mächtig und verlangt Respekt. Von diesem Tag an wird [chosen_leader.GetHeShe] der [GetImmortalLoc]"
 utopia.2682.desc.patron_champion: "$utopia.2682.desc.intro$ Champion §H[GetShroudPatronDE4]§! sein."
 utopia.2682.desc.shroudshaper_champion: "$utopia.2682.desc.intro$ $leader_trait_shroudshaper$ von §H[This.GetName]§! sein."
 utopia.2682.desc.previous_chosen_killed: "Das Ereignisse hatte verheerende Auswirkungen auf [previous_chosen_leader.GetDenDieDE] Ketzer[previous_chosen_leader.GetinFemaleDE] §H[previous_chosen_leader.GetName]§!, [previous_chosen_leader.GetDerDieDE] einst als [previous_chosen_leader.GetDerDieDE] Auserwählte unseres ehemaligen Schleierpakts galt. [previous_chosen_leader.HeSheCap] verstarb im Exil, als die letzten Spuren psionischer Kraft aus [previous_chosen_leader.GetHisHer]em zerbrochenen Körper wichen."
 utopia.2682.desc.previous_chosen_lost_patron: "Das Ereignis wirkte sich spürbar auf §H[chosen_leader_lost_patron.GetName]§! aus. [chosen_leader_lost_patron.GetHeSheCap] ist zwar noch immer von einer beträchtlichen psionischen Energie durchdrungen, doch [chosen_leader_lost_patron.GetHeShe] hat sämtliche Kräfte verloren, die [chosen_leader_lost_patron.GetHimHer] unser ehemaliger Schleierpakt gewährte."
 utopia.2682.a: "[chosen_leader.GetHeSheCap] war dazu bestimmt, auserwählt zu sein."
 utopia.2682.a.shroudshaper: "Das ist [chosen_leader.GetHisHer]e Bestimmung."
 utopia.2686.name: "Gesegnete Bewaffnung"
 utopia.2686.desc: "Das Telepathenkonklave erzielte einen Durchbruch dabei, die Kräfte §H[GetShroudPatronDE4]§! für uns nutzbar zu machen. Wo bisher nur psionisch begabte Individuen das Ausmaß des Paktes voll erfassten, fanden wir einen Weg, die Macht durch gesamte Raumschiffe fließen zu lassen, und zwar in einem nie zuvor gesehenen Ausmaß.\n\nWenn wir es wünschen, kann das Zeichen §H[GetShroudPatronDE4]§! unsere Schiffe weiter vorantreiben als je zuvor."
 utopia.2686.a: "Was ist eine Hülle ohne Fleisch?"
 utopia.2686.b: "Auch unsere Schiffe sind hungrig."
 utopia.2686.c: "Diese Gefäße sehnen sich nach einem Zweck."
 utopia.2686.d: "Geheimnisse sind Waffen, die ihresgleichen suchen."
 building_composer_sanctum: "Heiligtum der Komponistin"
 building_composer_sanctum_desc: "Das Heiligtum ist ein Ort, an dem die Komponistin verehrt werden kann. [GetComposerSanctumDesc]"
 building_composer_sanctum_desc_default: "Hier bewegt sich das Fleisch so frei wie die Gedanken und erlaubt es dem Schleier, uns über unsere eigenen Möglichkeiten hinaus umzuformen."
 building_composer_sanctum_desc_machine: "Hier verlaufen Schaltkreise unabhängig von physikalischen Faktoren. Der Schleier kann hier unsere Prozessoren über unsere herkömmlichen Parameter hinaus optimieren."
 building_eater_sanctum: "Heiligtum der Fresserin"
 building_eater_sanctum_desc: "Das Heiligtum ist ein Ort, an dem die Fresserin verehrt werden kann. Hier bereitet uns der Schleier auf Kriege vor, während wir die nächsten [GetEaterSanctumDesc] planen."
 building_eater_sanctum_desc_machine: "Eroberungen"
 building_eater_sanctum_desc_default: "Feste"
 building_instrument_sanctum: "Heiligtum des Instruments"
 building_instrument_sanctum_desc: "Das Heiligtum ist ein Ort, an dem das Instrument verehrt werden kann. [GetInstrumentSanctumDesc]"
 building_instrument_sanctum_desc_gestalt: "Hier werden Reichtümer gehortet, gesäubert und anschließend umverteilt, um die Stabilität im Kollektiv zu bewahren."
 building_instrument_sanctum_desc_default: "Hier werden Reichtümer gehortet, die anschließend in einem Konsumrausch verprasst werden, welcher uns dennoch keinen Schritt näher an wahre Erfüllung führt."
 building_whisperers_sanctum: "Heiligtum der Flüsterer"
 building_whisperers_sanctum_desc: "Das Heiligtum ist ein Ort, an dem die Flüsterer verehrt werden können. [GetWhisperersSanctumDesc]"
 building_whisperers_sanctum_desc_machine: "Hier werden Geheimnisse in verschlüsselten Datenpaketen ausgetauscht und neues Wissen weggeschlossen. Unsere Signale schließen sich dem Chor an."
 building_whisperers_sanctum_desc_default: "Hier werden Geheimnisse in gedämpften Tönen ausgetauscht und neues Wissen weggeschlossen. Unser Raunen schließt sich dem Chor an."
