 triggered_opinion_hive_mind: "Schwarmbewusstsein"
 utopia.2700.name: "Organisierte Evolution"
 utopia.2700.desc: "Manchmal braucht die Evolution einen kleinen Schubs in die richtige Richtung. Wir sind nun in der Lage, unsere Körper und Gedanken durch genetische Modifizierung so anzupassen, dass wir mit den sich immer rasanter verändernden Umweltbedingungen Schritt halten können."
 utopia.2703.name: "Beherrschung der Evolution"
 utopia.2703.desc: "Die Zeit, in der das Überleben unserer Spezies reine Glückssache war, ist vorbei. Die Zeit, in der das [Root.GetSpeciesName]-Schicksal noch von den Launen der Natur abhing, wie bei einer genetischen Lotterie.\n\nDie heutigen Ingenieure arbeiten nicht mehr mit Stahl und Beton, sondern mit den Bausteinen des Lebens. Dank fortschrittlicher Genmanipulation werden wir die Zukunft unserer Nation sichern."
 utopia.2600.name: "Verstand über Materie"
 utopia.2600.desc: "Seit den Anfängen unserer Zivilisation gab es Geschichten über mächtige Zauberer, deren Mächte man nur übernatürlich nennen kann. Diese seltenen [Root.GetSpeciesNamePlural] konnten angeblich in den Verstand ihrer Gefährten eindringen, schwere Objekte mit bloßen Gedanken anheben oder viele andere \"magische\" Leistungen vollbringen. Bis vor kurzem waren diese Geschichten nicht mehr als nur ... Geschichten.\n\nNun aber haben unsere Wissenschaftler endlich schlüssige Beweise erhalten, die das psionische Potenzial in bestimmten [Root.GetSpeciesName]-Individuen belegen. Zwar scheint nur eine sehr kleine Minderheit unserer Spezies über psionische Kräfte zu verfügen, doch im Laufe der letzten Jahrhunderte ist ihr relativer Bevölkerungsanteil kontinuierlich gewachsen.\n\nUnsere Wissenschaftler wissen nicht, ob dies an einem plötzlichen evolutionären Wachstumsschub liegt oder etwas anderes latente psionische Fähigkeiten geweckt hat, die schon immer in unseren Genen angelegt waren."
 utopia.2600.desc.unplugged: "Trotzt der kurzen und gewalterfüllten Geschichte unserer jungen Zivilisation hatten wir [root.GetSpeciesNamePlural] die Gelegenheit, unserer Vorstellungskraft freien Lauf zu lassen und uns den fantastischsten Geschichten hinzugeben. Zu diesen spielerischen Ideen gehören auch Geschichten über mächtige Zauberer, die über Kräfte verfügen, die sich nur als übernatürlich bezeichnen lassen: Sie können Gedanken lesen, schwere Gegenstände nur mit ihrem Willen anheben und eine Vielzahl anderer \"wundersamer\" Taten vollbringen.\n\nViele glauben, dass wir diese Geschichten schon in uns trugen, bevor wir assimiliert wurden und sie in der kollektiven Psyche unserer Spezies verankert sind. Die meisten [root.GetSpeciesNamePlural] haben dies als Wunschdenken abgetan, zumindest bis vor Kurzem. Nun haben unsere Wissenschaftler endlich schlüssige Beweise gefunden, die das psionische Potenzial in bestimmten [Root.GetSpeciesNamePlural] erklären können\n.\nZwar scheint nur eine sehr kleine Minderheit unserer Spezies über psionische Kräfte zu verfügen, doch im Lauf der letzten Jahrhunderte ist ihr relativer Bevölkerungsanteil kontinuierlich gewachsen. Unsere Wissenschaftler wissen nicht, ob dies an einem plötzlichen evolutionären Wachstumsschub oder dem Einmischen von [origin_unplugged_assimilator_empire.GetName] liegt."
 utopia.2600.a: "Vielleicht ein flüchtiger Blick darauf, was die Zukunft für uns bereithält."
 utopia.2602.name: "[From.GetSpeciesNamePlural] zeigen psionisches Potenzial"
 utopia.2602.1.desc.1.non_gestalt_intro: "NOT_USED"
 utopia.2602.1.desc.1.non_gestalt_outro: "Das muss eine recht junge Entwicklung sein, da uns keine Berichte über [From.GetSpeciesNamePlural] vorliegen, die jemals irgendwelche psionischen Fähigkeiten gezeigt hätten."
 utopia.2602.1.desc.1.organic_non_gestalt: "Durchgesickerten Berichten der Behörden in §H[From.GetName]§! zufolge haben sich in bestimmten Individuen der [From.GetSpeciesNamePlural]-Spezies latente psionische Mächte zu manifestieren begonnen. $utopia.2602.1.desc.1.non_gestalt_outro$"
 utopia.2602.1.desc.1.machine_non_gestalt: "Durchgesickerten Berichten der Behörden in §H[From.GetName]§! zufolge haben sich in bestimmten Individuen des [From.GetSpeciesName]-Mechanotyps latente psionische Mächte zu manifestieren begonnen. $utopia.2602.1.desc.1.non_gestalt_outro$"
 utopia.2602.1.desc.1.gestalt_intro: "Durchgesickerten Berichten der Behörden in §H[From.GetName]§! zufolge haben sich in bestimmten [From.GetSpeciesNamePlural] latente psionische Fähigkeiten zu manifestieren begonnen."
 utopia.2602.1.desc.1.gestalt_outro: "paranormale Fähigkeiten, die weit über das hinausgehen, was bisher über sie aufgezeichnet wurde."
 utopia.2602.1.desc.1.organic_gestalt: "$utopia.2602.1.desc.1.gestalt_intro$ Eine kognitive Verbindung ist innerhalb ihrer Spezies zwar nichts Neues, doch die Berichte beschreiben $utopia.2602.1.desc.1.gestalt_outro$"
 utopia.2602.1.desc.1.machine_gestalt: "$utopia.2602.1.desc.1.gestalt_intro$ Die Kommunikation über ein Neuralnetzwerk ist für ihre Art zwar nichts Neues, doch diese Berichte beschreiben $utopia.2602.1.desc.1.gestalt_outro$"
 utopia.2602.1.desc.2.intro: "Diese Mächte begrenzen sich derzeit auf eine sehr kleine Minderheit"
 utopia.2602.1.desc.2.outro: "Die Berichte bieten keinerlei Erklärung für dieses Phänomen."
 utopia.2602.1.desc.2.organic: "$utopia.2602.1.desc.2.intro$ in der [From.GetSpeciesNamePlural]-Spezies. $utopia.2602.1.desc.2.outro$"
 utopia.2602.1.desc.2.machine: "$utopia.2602.1.desc.2.intro$ von [From.GetSpeciesNamePlural]. $utopia.2602.1.desc.2.outro$"
 utopia.2602.1.desc.machine_gestalt: "$utopia.2602.1.desc.1.machine_gestalt$\n\n$utopia.2602.1.desc.2.machine$"
 utopia.2602.1.desc.machine_non_gestalt: "$utopia.2602.1.desc.1.machine_non_gestalt$\n\n$utopia.2602.1.desc.2.machine$"
 utopia.2602.1.desc.organic_gestalt: "$utopia.2602.1.desc.1.organic_gestalt$\n\n$utopia.2602.1.desc.2.organic$"
 utopia.2602.1.desc.organic_non_gestalt: "$utopia.2602.1.desc.1.organic_non_gestalt$\n\n$utopia.2602.1.desc.2.organic$"
 utopia.2602.2.desc: "Die [From.GetSpeciesNamePlural]-Bevölkerung innerhalb unserer Grenzen bemerkte in letzter Zeit vergleichbare Veränderungen. Was auch immer also mit ihnen geschieht, ist anscheinend nicht auf einen bestimmten Raumbereich beschränkt."
 utopia.2602.a.organic_non_gestalt: "Wie eigenartig."
 utopia.2602.a.hive_or_machine_non_gestalt: "Besondere Kräfte? Wohl kaum."
 utopia.2602.a.machine_gestalt: "Kann nicht berechnet werden."
 utopia.2602.b: "Psionische Kräfte? Was für ein Schwachsinn!"
 utopia.2602.c: "Ihre Zauberei wird sie auch nicht retten."
 utopia.2602.d.organic: "Ja ... Ja, wir können ihre psionischen Emanationen spüren."
 utopia.2602.d.machine: "Ja ... Wir haben ihre psionischen Frequenzen registriert."
 utopia.2605.name.organic_non_gestalt: "[psionic_leader.GetTitle] als Psioniker entlarvt"
 utopia.2605.name.machine_non_gestalt: "[psionic_leader.GetTitle] als Psioniker identifiziert"
 utopia.2605.name.gestalt: "[psionic_leader.GetName] als Psioniker identifiziert"
 utopia.2605.desc.organic_non_gestalt: "Es ist zwar selten, dass sich psionische Kräfte erst nach dem Erreichen des Erwachsenenalters manifestieren, doch es kann vorkommen. [psionic_leader.GetTitle] [psionic_leader.GetName] zeigte in letzter Zeit Fähigkeiten, die vermutlich psionischer Natur sind. Nach gründlichen ESP-Tests wurde [psionic_leader.GetHisHer] Psioniktalent auf Klasse 4 eingestuft."
 utopia.2605.desc.machine_non_gestalt: "Es ist zwar selten, doch es kommt vor, dass sich in Einheiten, von denen zuvor nicht bekannt war, dass sie diese unterstützen, psionische Fähigkeiten entwickeln. [psionic_leader.GetTitle] [psionic_leader.GetName] wies in letzter Zeit Funktionalitäten auf, die als psionisch klassifiziert werden können. Nach umfangreichen Tests wurde [psionic_leader.GetSheHe] als Psionik-Einheit der Klasse 4 eingestuft."
 utopia.2605.desc.gestalt: "Der Einfluss unserer neu gewonnenen Kräfte wächst mit jedem Tag. Das Gefäß unsere[GetBrainNameDE2] [GetBrainNameDE3], [psionic_leader.GetName], wies in letzter Zeit Funktionalitäten auf, die als psionisch klassifiziert werden können. Nach umfangreichen Tests wurde [psionic_leader.GetSheHe] als [GetPsychicNoun&NOM] der Klasse 4 eingestuft."
 utopia.2605.a: "Diese neuen Fähigkeiten werden uns gute Dienste leisten."
 utopia.2652.name: "[This.GetSpeciesNamePlural] erwecken psionische Fähigkeiten"
 utopia.2652.desc.1.intro: "Alle [This.GetSpeciesNamePlural] in der Galaxie erfuhren starke Veränderungen. Während ihre latenten psionischen Kräfte zuvor nur"
 utopia.2652.desc.1.outro: "ihr volles psionisches Potenzial entfaltet."
 utopia.2652.desc.1.organic: "$utopia.2652.desc.1.intro$ in einer kleinen Minderheit erblühten, hat nun die gesamte Spezies $utopia.2652.desc.1.outro$"
 utopia.2652.desc.1.machine: "$utopia.2652.desc.1.intro$ in einer kleinen Minderheit auftauchten, hat nun ihre gesamte Art $utopia.2652.desc.1.outro$"
 utopia.2652.desc.2.non_gestalt: "Obwohl diese Veränderungen offenbar ihren Ursprung in [From.GetName] hatten, haben sie sich nun in jedem manifestiert - und zwar unabhängig vom derzeitigen Aufenthaltsort!"
 utopia.2652.desc.2.organic_non_gestalt: "$utopia.2652.desc.2.non_gestalt$\n\nDie [This.GetSpeciesNamePlural] besitzen nicht nur ein breites Spektrum mächtiger psionischer Fähigkeiten, sondern haben auch damit begonnen, zugunsten der Telepathie auf verbale Kommunikation untereinander zu verzichten."
 utopia.2652.desc.2.machine_non_gestalt: "$utopia.2652.desc.2.non_gestalt$\n\n$utopia.2652.desc.2.machine_gestalt$"
 utopia.2652.desc.2.gestalt.intro: "Die [This.GetSpeciesNamePlural] besitzen nicht nur ein breites Spektrum mächtiger psionischer Fähigkeiten, sondern haben auch damit begonnen,"
 utopia.2652.desc.2.organic_gestalt: "$utopia.2652.desc.2.gestalt.intro$ nonverbal über ihre bestehenden Kanäle hinaus miteinander zu kommunizieren."
 utopia.2652.desc.2.machine_gestalt: "$utopia.2652.desc.2.gestalt.intro$ über ihre bestehenden kollektiven Kanäle hinaus miteinander zu kommunizieren."
 utopia.2652.desc.organic_non_gestalt: "$utopia.2652.desc.1.organic$\n\n$utopia.2652.desc.2.organic_non_gestalt$"
 utopia.2652.desc.machine_non_gestalt: "$utopia.2652.desc.1.machine$\n\n$utopia.2652.desc.2.machine_non_gestalt$"
 utopia.2652.desc.organic_gestalt: "$utopia.2652.desc.1.organic$\n\n$utopia.2652.desc.2.organic_gestalt$"
 utopia.2652.desc.machine_gestalt: "$utopia.2652.desc.1.machine$\n\n$utopia.2652.desc.2.machine_gestalt$"
 utopia.2652.b: "Dafür muss es eine logische Erklärung geben."
 utopia.2652.c.organic: "Geht mit äußerster Vorsicht vor."
 utopia.2652.c.machine: "Eine suboptimale Entwicklung."
 utopia.2652.d.organic: "Wir spürten die große psionische Störung, die auf ihre Erweckung folgte."
 utopia.2652.d.machine: "Das erklärt die psionische Störung, die wir beobachteten."
 utopia.2650.name: "Die große Erweckung"
 utopia.2650.desc: "Die [Root.GetSpeciesName]-Spezies hat etwas erfahren, was man nur als große Erweckung bezeichnen kann. Wir waren uns schon eine Zeit lang des latenten psionischen Potenzials unserer Spezies bewusst, aber solche Mächte haben sich immer nur in einer kleinen Minderheit manifestiert ... bis jetzt.\n\nFast über Nacht haben [Root.GetSpeciesNamePlural] ihre volle psionische Kapazität entfaltet - ganz egal, wo sie sich aufhielten. Es ist gar so, als hätte eine Art [Root.GetSpeciesName]-Gemeinschaftsbecken für ihre psychische Energie nun schließlich seinen kritischen Punkt überschritten, was die kollektive Erweckung der latenten Fähigkeiten in unseren Gehirnen zur Folge hatte.\n\nDie Telepathie hat bereits einen Großteil der verbalen Kommunikation zwischen [Root.GetSpeciesNamePlural] ersetzt ... und dies ist nur ein kleines Beispiel der unzähligen Veränderungen, mit der es unsere Gesellschaft nun zu tun hat. Wir bilden nun eine engere Gemeinschaft, als wir es jemals für möglich gehalten hätten."
 utopia.2650.a: "Das Geheimnis ist gelüftet worden."
 utopia.2655.name: "Der Schleier"
 utopia.2655.desc: "Der Schleier spricht zu uns in unserem Verstand wie ein gedämpftes Flüstern in einem dunklen Raum. Beim Schleier handelt es sich um ein uranfängliches Reich reiner psionischer Energie, das am Anbeginn der Zeit entstand. Alle Kreaturen mit psionischen Fähigkeiten sind irgendwie, wenn auch nur unbewusst, mit dem Schleier verbunden und beziehen von ihm Energie.\n\nSeit unserer Transzendenz können wir den Schleier jetzt klarer sehen. Nun sind dort, wo früher selbst unsere stärksten Telepathen nur eine formlose Masse aus wirbelnder Energie sehen konnten, Muster zu erkennen. Es gibt dort aber auch noch ... andere Dinge ... Geister gewissermaßen, die uns von der anderen Seite entgegenstarren. Manchmal steht ihnen Neugier im Blick, manchmal Güte ... und manchmal Arglist.\n\nWir sind noch dabei, das Ausmaß unserer neuen Mächte zu ergründen, doch es könnte wohl möglich sein, mit diesen Geistern zu kommunizieren. Dies wird die Kombination der Kräfte unserer mächtigsten Telepathen erfordern."
 utopia.2655.a: "Wir müssen den Schleier erkunden."
 BREACHING_SHROUD_PROJECT: "Durchdringen des Schleiers"
 BREACHING_SHROUD_PROJECT_DESC: "Wenn wir mit den Bewohnern des psionischen Reichs, das wir den Schleier nennen, kommunizieren wollen, müssen wir eine unfassbare Menge an psionischer Energie freisetzen. In der neugegründeten Telepathenkonklave auf [Root.Capital.GetName] haben wir bereits Vorbereitungen für eine riesige Séance mit unseren mächtigsten Psionikern getroffen."
 utopia.2656.name: "Die Séance"
 utopia.2656.desc: "Nach einer tagelangen hypnotischen Trance ist es unseren Psionikern in der Telepathenkonklave endlich gelungen, ein kurzlebiges Portal in den Schleier zu öffnen.\n\nDa wir nun eine erste psionische Verbindung hergestellt haben, können wir in Zukunft über das Menü §HKontakte§! auf den Schleier zugreifen. Wenn wir bedeutsame Vorstöße in dieses Reich unternehmen und die Wesen treffen wollen, die dort leben, werden wir wahrscheinlich spezielle psionische Emitter einsetzen müssen, um unsere psionische Reichweite zu vergrößern. Dadurch wird eine enorme Energiemenge verbraucht werden."
 utopia.2656.a: "Die Zeit ist gekommen, um herauszufinden, was wir dort finden können."
 utopia.2657.name: "Blick durch den Spiegel"
 utopia.2657.desc: "Obwohl wir den §HSchleier§! noch nicht wirklich durchdringen können, spüren wir, wie er unter dem Druck unseres vereinten Bewusstseins immer dünner wird. Auf der anderen Seite sind unsere Bemühungen, den Schleier zu betreten, jedoch nicht unbemerkt geblieben. Etwas beobachtet uns.\n\nSeine Präsenz strahlt eine phänomenale Macht und eine unergründliche Zielstrebigkeit aus. Es sickert langsam durch die Risse unserer Psyche.\n\nEs nimmt uns kaum wahr. Es beobachtet uns wie ein Kondenswassertropfen an einem Bullauge. Es könnte uns einlassen, wenn wir doch nur sein eigenes undurchschaubares Bewusstsein erreichen könnten."
 utopia.2657.a: "Versucht, mit dem Wesen zu kommunizieren."
 utopia.2657.a.tt: "§GDiese Option ermöglicht es uns, einen Pakt zu schließen.§!"
 utopia.2657.b: "Wir werden uns allein hineinwagen."
 utopia.2657.c: "Das war eine schreckliche Idee! Wir müssen vorsichtiger sein."
 utopia.2658.name: "Eine Bestätigung"
 utopia.2658.desc: "Es ist einige Zeit vergangen, seit wir den Grundstein für einen Pakt mit §H[GetShroudPatronDE1]§! legten. Da der Pakt nach wie vor schwach ist, besteht noch die Möglichkeit, ihn zu brechen - oder aber wir versuchen, die Verbindung zu stärken."
 utopia.2658.a: "Bestätigt den Pakt."
 utopia.2658.b: "Schwört §Y[GetShroudPatronDE1]§! ab."
 utopia.2659.name: "Ein Weg hinein"
 utopia.2659.desc: "Unsere Telepathen bemühten sich unermüdlich darum, den §HSchleier§! ohne die Hilfe eines Schleierwesens zu durchbrechen, und heute haben sie endlich einen Weg hinein gefunden. Der Schleier ruft nach uns. Wir müssen uns nur trauen, den Sprung zu wagen."
 utopia.2659.a: "Hinein in die verschleierten Tiefen."
 FORM_COVENANT_PROJECT: "Kommuniziert mit dem Unberührbaren"
 FORM_COVENANT_PROJECT_DESC: "Das Telepathenkonklave auf [Root.Capital.GetName] bereitet eine große Zusammenkunft vor, um das Wesen zu erreichen, das im Schleier haust."
 utopia.3020.name: "§GPsionische Inkarnation herbeigerufen§!"
 utopia.3020.desc: "Die mächtigen Energien des §HSchleiers§! konnten erfolgreich in einer psionischen Inkarnation gebündelt werden, die unter unserer Kontrolle steht!\n\nNachdem die neugeborene Inkarnation in unsere Dimension übergetreten war, verwandelte sie sich in ein Weltraumwesen, das derzeit in eier Umlaufbahn [Root.Capital.GetName] umkreist."
 utopia.3021.desc: "Die mächtigen Energien des §HSchleiers§! konnten erfolgreich in einer psionischen Inkarnation gebündelt werden, die unter unserer Kontrolle steht!\n\nNachdem die neugeborene Inkarnation in unsere Dimension übergetreten war, verwandelte sie sich in einen kolossalen Krieger auf der Oberfläche von [Root.Capital.GetName]."
 utopia.3022.name: "§RHerbeirufung gescheitert§!"
 utopia.3022.desc: "Die psionische Energie in einer Inkarnation zu bündeln und diese in unsere Dimension zu bringen, übersteigt unsere derzeitigen Fähigkeiten. Die Energie des §HSchleiers§! zischt unruhig, während unser Versuch scheitert."
 utopia.3023.name: "Angriff eines psionischen Wesens"
 utopia.3023.desc: "Der Versuch, eine psionische Inkarnation herbeizurufen, ist nur zum Teil erfolgreich gewesen. Die Kreatur nahm zwar ihre korrekte Form an und wurde in unsere Dimension übertragen, doch unseren [GetTelepathPlural] gelang es nicht, sie unter unsere Kontrolle zu bringen!\n\nWir haben es nun mit einem aggressiven psionischen Wesen zu tun, das alles in seinem Weg zerstören wird!"
 utopia.3024.name: "Schleier-Übergriff"
 utopia.3024.desc: "Eine Kreatur aus dem §HSchleier§! durchdrang das Raum-Zeit-Gefüge und materialisierte sich im [shroud_spawn_system.GetName]-System! Diese rachsüchtige Inkarnation hat eine enorme Menge psionischer Energie gesammelt und greift damit alle an, die in ihren Weg geraten."
 utopia.3024.a: "Sie muss aufgehalten werden!"
 utopia.3026.name: "Schleier-Inkarnation verbannt"
 utopia.3026.desc: "Die fortwährende Atrophie im Normalraum schwächte die Inkarnation im §H[shroud_spawn_system.GetName]§!-System.\n\nDa sie ihre materielle Form nicht länger aufrechterhalten konnte, zog sie sich in den §HSchleier§! zurück."
 utopia.3026.a.default: "Auf Nimmerwiedersehen."
 utopia.3026.a.machine_or_hive: "Ein glückliches Ergebnis."
