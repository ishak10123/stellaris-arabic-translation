 eater_unhappiness_planet_2_desc: "$eater_unhappiness_planet_1_desc$"
 eater_unhappiness_planet_2_gestalt: "$eater_unhappiness_planet_2$"
 eater_unhappiness_planet_2_gestalt_desc: "$eater_unhappiness_planet_2_desc$"
 eater_unhappiness_empire: "Von der Weltenfresserin verschlungene Welt"
 eater_unhappiness_empire_desc: "Ein ganzer Planet in unserem Reich wurde von der $the_eater_of_worlds_color_article$ verschlungen."
 eater_unhappiness_empire_gestalt: "$eater_unhappiness_empire$"
 eater_unhappiness_empire_gestalt_desc: "$eater_unhappiness_empire_desc$"
 instrument_deviance_planet: "Schleier-Abweichung"
 instrument_deviance_planet_desc: "Die Bevölkerung dieses Planeten wendet sich von der Eethik unserer Regierung ab, um ihre eigenen Ziele zu verfolgen. Das ist zweifelsohne das Werk des §YInstruments der Sehnsüchte§!."
 instrument_deviance_empire: "Schleier-Abweichung"
 instrument_deviance_empire_desc: "Die Bevölkerung unseres gesamten Reichs hat damit begonnen, die Ethik und die Richtlinien unseres Reichs zu hinterfragen. Das ist zweifelsohne das Werk des §YInstruments der Sehnsüchte§!."
 instrument_consumer_goods: "Schleier-Dekadenz"
 instrument_consumer_goods_desc: "Die Bevölkerung dieses Planeten hat sich der hemmungslosen Verschwendungssucht hingegeben und hat ein verzweifeltes Verlangen nach exklusiver Nahrung und exotischen Waren. Das ist zweifelsohne das Werk des §YInstruments der Sehnsüchte§!."
 d_eater_deposit: "Verschleierter Krater"
 d_eater_deposit_desc: "Ein Teil dieses Planeten wurde von einem §HSchleierwesen§! verschlungen. Den zurückgeliebenden Krater sucht ein unbehaglicher, violetter Nebel heim, und sämtliche Bewohner, die ihm zu nahe kommen, verschwinden."
 opinion_doomed_us_all: "Das herbeigerufene Ende"
 absorbed_consciousness_1: "Absorbiertes Bewusstsein"
 absorbed_consciousness_2: "$absorbed_consciousness_1$"
 absorbed_consciousness_3: "$absorbed_consciousness_1$"
 absorbed_consciousness_4: "$absorbed_consciousness_1$"
 absorbed_consciousness_5: "$absorbed_consciousness_1$"
 covenant.tooltip: "§YDafür wird ein Preis zu zahlen sein.§!\n\n"
 covenant.cycle.tooltip: "§RTut das nicht.§!\n\n"
 covenant.whisperers.desc: "Es ist vollbracht. Die $whisperers_in_the_void_color_article$ und wir schlossen einen Pakt. Sie haben bereits damit begonnen, ihre Geheimnisse mit unseren Wissenschaftlern und Anführern zu teilen.\n\nWir werden enorm von ihrem Wissen profitieren. Der einzige Nachteil scheint ein plötzlicher Anstieg bei Geisteskrankheiten und Selbstmorden unter der allgemeinen Bevölkerung zu sein. Zudem kommt es auf einigen unserer Welten nun zu zahlreichen unerklärlichen Morden und tätlichen Angriffen, die ansonsten stabile und ausgeglichene Individuen begehen. Unsere Kliniken und Anstalten haben Probleme, dem plötzlichen Patientenansturm Herr zu werden."
 covenant.whisperers.option: "Wir kriegen das schon hin."
 covenant.eater.desc: "Es ist vollbracht. Die $the_eater_of_worlds_color_article$ und wir schlossen einen Pakt, und die Vorteile machen sich bereits in unserer Armee und in unserer Flotte bemerkbar. Unsere Soldaten kämpfen nun mit einer Wildheit, die an Barbarei grenzt, und selbst die Waffen unserer Schiffe scheinen irgendwie nach dem Tod unserer Feinde zu dürsten.\n\nDas plötzliche und mysteriöse Verschwinden der gesamten Bevölkerung einer unserer Koloniestädte steht zweifelsohne damit in Verbindung. Es war der Tribut, den wir der Weltenfresserin versprochen hatten.\n\nEs scheint ein geringer Preis zu sein ... Vorausgesetzt natürlich, dass die Weltenfresserin nicht wieder Hunger bekommt ..."
 covenant.eater.option: "Hoffentlich nicht."
 covenant.instrument.desc: "Es ist vollbracht. Das $the_instrument_of_desire_color_article$ und wir schlossen einen Pakt. Es dauerte nicht lange, bis sich die Effekte bemerkbar machten: Es gibt Berichte über reichhaltige Erzadern, die man in unseren Minen entdeckte. Von kurz vor der Insolvenz stehenden Unternehmen, die auf einmal wieder aufblühen. Von seltenen und kostbaren Ressourcen, die auf Asteroiden gefunden werden, die vorherigen Untersuchungen nach nur aus Eis und Stein bestanden.\n\nAnscheinend beginnt in unserem Reich ein goldenes Zeitalter des Reichtums und des Wohlstands - ganz so, wie es das Instrument versprochen hatte. Aber ... was war noch gleich der Preis, den es erwähnt hatte ...?"
 covenant.instrument.option: "Es ist bestimmt nichts Schlimmes."
 covenant.composer.desc: "Es ist vollbracht. Die $the_composer_of_strands_color_article$ und wir schlossen einen Pakt. Es dauerte nicht lange, bis sich die Effekte bemerkbar machten: Die Komponistin ist zweifelsohne dafür verantwortlich, dass es plötzlich zu einem enormen Anstieg an Geburten kommt. Einhergehend mit diesen positiven Effekten kommt es aber auch zu Unmengen merkwürdiger neuer Mutationen: Nachwuchs mit überzähligen Gliedmaßen und Organen ... von denen einige keinerlei Ähnlichkeit mit irgendetwas haben, was naturgemäß zu ihrer Anatomie gehört.\n\nGlücklicherweise werden die daraus resultierenden Todesfälle durch die höheren Geburtenraten und die offenbar erhöhte Vitalität unserer Bevölkerung mehr als ausgeglichen."
 covenant.composer.option: "Wir haben das Richtige getan."
 covenant.cycle.desc: "Es ist getan. Wir haben einen Pakt mit dem §REnde des Zyklus§! geschlossen. Als wir uns auf das Angebot einließen, wurden lediglich zwei Worte gesprochen: §R\"FÜNFZIG JAHRE.\"§! Darauf folgte nur Stille, und es wurde uns selbst überlassen, die zukünftigen Konsequenzen dessen zu verstehen, was wir uns gerade selbst eingebrockt hatten."
 covenant.cycle.option: "Mögen die Geister uns allen gnädig sein."
 covenant_shroud_marked: "Vom Schleier gekennzeichnet"
 covenant_shroud_marked_desc: "Diese Welt wurde vom Schleier gekennzeichnet.\n\n§RHier wird etwas äußerst Schlimmes passieren.§!"
 covenant_whisperers_in_the_void: "Pakt: Flüsterer in der Leere"
 covenant_whisperers_in_the_void_0: "$covenant_whisperers_in_the_void$"
 covenant_whisperers_in_the_void_desc: "Wir haben einen Pakt mit einem mächtigen Schleier-Wesen geschlossen und profitieren nun von seiner Unterstützung.\n\n§YOhne Gegenleistung wird das aber nicht bleiben.§!"
 covenant_whisperers_in_the_void_0_desc: "$covenant_whisperers_in_the_void_desc$"
