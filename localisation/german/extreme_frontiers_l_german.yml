 # CHRONICLES OF DENDRUS
 chronicles_of_dendrus_chain_title: "Dentritische Chroniken"
 chronicles_of_dendrus_chain_desc: "Durch das Studium der \"Dentritischen Chroniken\", einer Sammlung komplexer mathematischer Beweise, die wir aus dem abgestürzten Archeschiff auf §Y[from.Planet.GetName]§! bargen, erhoffen wir uns, mehr über den paradiesischen Planeten §YNeu-Bratulla§! zu lernen, nach dem die Dendritianer suchten."
 site_chronicles_of_dendrus: "$chronicles_of_dendrus_chain_title$"
 site_chronicles_of_dendrus_desc: "Erste Scans von §Y[from.Planet.GetName]§! zeigen das Wrack eines abgestürzten Raumschiffs. Es scheint vor vielen Jahren unkontrolliert gelandet zu sein.\n\nDie schiere Größe deutet darauf hin, dass immens viele Ressourcen in den Bau flossen. Eine archäologische Ausgrabung wird uns hoffentlich Antworten darauf liefern, wie es hierherkam."
 extreme_frontiers.1400.title: "Massives Transportschiff"
 extreme_frontiers.1400.desc: "Eine Analyse der äußeren Struktur des Schiffswracks auf §Y[from.Planet.GetName]§! deutet darauf hin, dass es sich um ein Transportschiff mit einem riesigen Fassungsvermögen handelt. Die Systeme sind inaktiv und reagieren nicht. Es gibt auch keine Lebenszeichen im Inneren. Eine Sedimentanalyse ergab, dass es seit ungefähr einem Jahrhundert hier ist, was auf der galaktischen Zeitskala relativ kurzfristig erscheint."
 extreme_frontiers.1400.a: "Erkundet das Innere."
 extreme_frontiers.1405.title: "Verunglücktes Kolonieschiff"
 extreme_frontiers.1405.desc: "Im Inneren des Schiffswracks auf §Y[from.Planet.GetName]§! befanden sich hochentwickelte Kammern für Hydrokulturpflanzen, umfangreiche Vorräte an Saatgut und Erde sowie Frachträume voll unberührter Werkzeuge, Maschinen und Baumaterialien. Viele der Datenterminals enthalten Pläne für eine neue Kolonie namens \"§YNeu-Bratulla§!\".\n\nAuf den unteren Decks stehen Tausende von Kryokapseln mit den Leichen der ehemaligen Bewohner des Schiffs."
 extreme_frontiers.1405.desc.phototrophic: "$extreme_frontiers.1405.desc$ Wie wir waren auch sie auf das Zellwachstum und die Zellerneuerung durch Photosynthese angewiesen. Ihre verwelkten Körper lassen vermuten, dass sie irgendwann während eines längeren Kälteschlafs umkamen."
 extreme_frontiers.1405.desc.default: "$extreme_frontiers.1405.desc$ Die verwelkten Überreste dieser phototrophen Organismen lassen vermuten, dass sie irgendwann während eines längeren Kälteschlafs umkamen."
 extreme_frontiers.1405.a: "Erkundet das Schiff weiter."
 extreme_frontiers.1405.b: "Nutzt sie als Nahrung und erkundet das Schiff weiter."
 extreme_frontiers.1410.title: "Schrein der Heimatwelt"
 extreme_frontiers.1410.desc: "Tief im Inneren des abgestürzten Kolonieschiffs auf §Y[from.Planet.GetName]§! befand sich ein Heiligtum, das mit kunstvollen Illustrationen eines Planeten geschmückt war, den man \"§YBratulla§!\" nannte. Einige der Bilder zeigen eine üppige Welt mit einer blühender Flora, während andere detaillert einen umweltbedingten Verfall und ein Massensterben darstellen. Das größte Bild zeigt dieses Schiff, wie es eine leblose Einöde verlässt.\n\nEin zentrales Datenterminal enthält kurze Videoaufnahmen der Schiffsbesatzung. Nach einem umfassenden Sprachvergleich fertigten wir eine Übersetzungen an:\n\n§SArborixxeum - Schote 9721\n\nUnsere Heimat zu verlassen, tut weh, doch unsere Wurzeln auf Neu-Bratulla auszubreiten, wird uns heilen.\n\nDarkht Paam - Schote 21301\n\nVertraut auf die Chronik, Dendritianer. Neu-Bratulla wird unsere Rettung sein.§!\n\nWir sind noch immer auf der Suche nach der Kommandobrücke in diesem gigantischen Schiff."
 extreme_frontiers.1410.a: "Sucht weiter."
 extreme_frontiers.1415.title: "Kommandobrücke"
 extreme_frontiers.1415.desc: "Nachdem wir uns Zugang zur Kommandobrücke verschafft hatten, übersetzten wir den letzten Logbucheintrag.\n\n§SARCHESCHIFF DENDRUS I - NOTFALLPROTOKOLL - XZ-47/9-113.5-AE\n\nIch fürchte, in die Chroniken zu vertrauen, war ein Fehler. Wir sind am Ziel angekommen, doch Neu-Bratulla, der Paradiesplanet, ist nicht hier. Dieser Planet kann kein dendritisches Leben unterstützen.\n\nDer Kälteschlaf aller Passagiere wurde verlängert. Wir werden unsere Suche fortsetzen müssen ...§!\n\nWir stellten weitere Daten wieder her, um diese \"Chroniken\" aus dem Wissenschaftsterminal des Decks zu sammeln, und förderten dabei eine Fülle ungewöhnlicher mathematischer Beweise zutage. Diese Gleichungen verwenden eine seltsame Form dendritischer Mathematik und stellen die Hypothese auf, dass es einen Planeten gibt, der für alles Leben bewohnbar ist: §YNeu-Bratulla§!."
 extreme_frontiers.1415.a: "Studiert diese \"Chroniken\"."
 DENDRITIAN_CHRONICLES_PROJECT_DEFAULT: "Studium der Dendritischen Chroniken"
 DENDRITIAN_CHRONICLES_PROJECT_MACHINE: "$DENDRITIAN_CHRONICLES_PROJECT_DEFAULT$"
 DENDRITIAN_CHRONICLES_PROJECT_DEFAULT_DESC: "Durch das Studium der \"Dentritischen Chroniken\", einer Sammlung komplexer mathematischer Beweise, die wir aus dem abgestürzten Archeschiff auf §Y[from.Planet.GetName]§! bargen, erhoffen wir uns, mehr über den paradiesischen Planeten §YNeu-Bratulla§! zu lernen, nach dem die Dendritianer suchten."
 DENDRITIAN_CHRONICLES_PROJECT_MACHINE_DESC: "$DENDRITIAN_CHRONICLES_PROJECT_DEFAULT_DESC$"
 extreme_frontiers.1420.title: "Instabile Hyperraumroute entdeckt"
 extreme_frontiers.1420.desc: "Die Dendritischen Chroniken behandeln eine Reihe komplexer mathematischer Axiome und Abstraktionen. Eine von ihnen stellt die Theorie auf, dass das §Y[from.solar_system.GetName]§!-System eine weitere und bisher nicht kartierte Hyperraumroute enthält, die nach §YNeu-Bratulla§! führt.\n\nNach umfassenden Quantenscans fanden wir endlich den Bruchpunkt dieser fehlenden Hyperraumroute, der aufgrund der extremen Nähe zum Schwarzen Loch verborgen und stark instabil ist. Wenn wir es schaffen, den Bruchpunkt zu stabilisieren, könnten wir die Ersten sein, die die andere Seite erkunden."
 extreme_frontiers.1420.a: "Wir fanden, wonach die Dendritianer so verzweifelt suchten."
 RESTORE_HYPERLANE_PROJECT: "Stabilisierung der Hyperraumroute"
 RESTORE_HYPERLANE_PROJECT_DESC: "Wenn wir einen Weg finden, um die instabile Hyperraumroute im §Y[from.solar_system.GetName]§!-System zu stabilisieren, sind wir in der Lage, die Existenz von §YNeu-Bratulla§! zu bestätigen - jenem Paradies, nach dem die Dendritianer suchten."
 extreme_frontiers.1425.title: "Hyperraumroute stabilisiert"
 extreme_frontiers.1425.desc: "Indem wir dem Schwarzen Loch in §Y[from.Planet.solar_system.GetName]§! Energie zuführten, richteten wir sein Gravitationsfeld neu aus, was den zuvor instabilen Hyperraumrouten-Bruchpunkt stabilisierte.\n\nErste Scans weisen auf das Vorhandensein eines einzelnen Planeten am anderen Ende der Hyperraumroute hin. Dieser verfügt über jene Eigenschaften, die auch §YNeu-Bratulla§! aus den Dendritischen Chroniken besitzt."
 extreme_frontiers.1425.a: "Eine neue Welt, die es zu erkunden gilt."
 NAME_new_bratulla: "Neu-Bratulla"
 NAME_new_bratulla_star: "Kipos"
 extreme_frontiers.1430.title: "Neu-Bratulla"
 extreme_frontiers.1430.desc.common: "Wir haben Neu-Bratulla gefunden, den in den Dendritischen Chroniken beschriebenen Planeten. Die Welt besitzt ein einzigartiges Ökosystem, und bei den ersten Erkundungen entdeckte man Millionen verschiedener heimischer Arten."
 extreme_frontiers.1430.desc.begin: "Diese faszinierende Welt kann besonders gut die Genetik pflanzlichen Lebens unterstützen -"
 extreme_frontiers.1430.desc.end: "Im Boden gibt es Milliarden verschiedener Bakterien, die organische Wurzelstrukturen nähren, schützen und reparieren.\n\nPflanzen scheinen basierend auf dem, was am meisten gebraucht wird, Nährstoffe miteinander zu teilen, wobei jene, die einen Überfluss davon haben, ihren Überschuss über ein miteinander verbundenes Wurzelsystem teilen."
 extreme_frontiers.1430.desc.default: "$extreme_frontiers.1430.desc.begin$ wie die der Dendritianer. $extreme_frontiers.1430.desc.end$"
 extreme_frontiers.1430.desc.phototrophic: "$extreme_frontiers.1430.desc.begin$ wie unsere. $extreme_frontiers.1430.desc.end$"
 extreme_frontiers.1430.desc.respawn: "Unsere [Root.Owner.GetScientistPlural] sind der festen Überzeugung, dass es möglich sein sollte, die Dendritianer hier wieder anzusiedeln, indem wir die genetischen Proben aus ihrem Archeschiff in den nährhaften Böden dieses Planeten anpflanzen."
 extreme_frontiers.1430.a: "Die Dendritianer gehören hierhin."
 extreme_frontiers.1430.b.default: "Neu-Bratulla gehört uns."
 extreme_frontiers.1430.b.phototrophic: "Diese Welt ist perfekt für uns geeignet."
 extreme_frontiers.1430.b.megacorp: "Diese unerschlossene Welt wartet nur darauf, in unsere Märkte integriert zu werden."
 NAME_buds_of_dendrus: "Knospen von Dendrus"
 NAME_dendritian: "Dendritianer"
 NAME_dendritian_plural: "Dendritianer"
 ADJECTIVE_dendritian: "Dendritisch"
 opinion_dendrus: "Retter der Dendritianer"
 opinion_to_dendrus: "$opinion_dendrus$"
 extreme_frontiers.1435.title: "Vasallisierungsangebot"
 extreme_frontiers.1435.desc: "Es dauerte Jahrhunderte ... doch schließlich ist das, was die Dendritischen Chroniken vorausgesagt hatten, eingetroffen. Auf §YNeu-Bratulla§! haben wir unsere Wurzeln geschlagen und gedeihen.\n\nDass wir hier leben können, verdanken wir §Y[Root.GetName]§!. Wir werden das niemals vergessen.\n\nWir werden unsere Dankbarkeit jedoch nicht nur durch Worte ausdrücken. Wir bieten aufrichtig unsere Vasallisierung an."
 extreme_frontiers.1435.a: "Eure Vasallisierung ist hiermit akzeptiert."
 extreme_frontiers.1435.b: "Wir wollen selbst sehen, was das Schicksal für Euch bereithält."
 extreme_frontiers.1435.b.tt: "Wir spielen als §RKnospen von Dendrus§! weiter."
 extreme_frontiers.1435.c: "Euer Wissen nutzen zu können, wird ausreichen."
 extreme_frontiers.1435.c.tt: "Erhält [Root.GetDendrusGivenBiotechAmount] £society£ §YBio-Technologien§!"
 # GEORADIATION TERRAFORMING
 georadiation_terraforming_chain_title: "Terraforming durch Georadiation"
 georadiation_terraforming_chain_desc: "Die Überreste einer zerstörerischen Terraforming-Maschine auf §Y[from.Planet.GetName]§! senden noch immer ein Signal an mehrere Orte in der gesamten Galaxie. Wir sollten diese Orte untersuchen, um weitere Informationen über diese gefährliche Technologie zu erhalten."
 site_georadiation_terraforming: "Unterirdisches Höhlennetz"
 site_georadiation_terraforming_desc: "Unsere Sensoren entdeckten ein unregelmäßiges Kommunikationssignal, das aus den Tiefen eines Einschlagskraters auf §Y[from.Planet.GetName]§! zu stammen scheint.\n\nSeismische Topologiescans enthüllten ein Netzwerk unterirdischer Höhlen, deren eingestürzter Eingang offenbar im Zentrum des Kraters liegt. Darüber hinaus registrieren unsere radiologischen Geräte schwache Spuren von Gravitationswellen, die von diesem Ort ausgehen - etwas, was mehr Fragen aufwirft, als es Antworten liefert."
 extreme_frontiers.1500.title: "Verstrahlte Trümmer"
 extreme_frontiers.1500.desc: "Bei Ausgrabungsarbeiten im Einschlagskrater auf §Y[from.Planet.GetName]§! fand man verstrahlte Trümmerteile. Diese zerbrochenen Teile weisen starke Spuren jener Gravitationsstrahlung auf, die zuvor vom Orbit aus gemessen wurde.\n\nDa der Zugang zu dem unterirdischen Höhlennetz jetzt frei ist, kann §Y[leader.GetName]§! das Kommunikationssignal bis zu seiner Quelle zurückverfolgen."
 extreme_frontiers.1500.a: "Sucht nach der Quelle des Signals."
 extreme_frontiers.1505.title: "Korrodierte Apparatur"
 extreme_frontiers.1505.desc: "Wir fanden die Quelle des Kommunikationssignals auf §Y[from.Planet.GetName]§!: eine riesige, strukturell beschädigte Konstruktion, die sich tief in die planetare Kruste gebohrt hat.\n\nDiese Struktur wurde zwar durch Säureeinwirkung stark korrodiert, doch eine Apparatur sendet weiterhin Signale in einer unbekannten Sprache aus, um offenbar Kontakt zu einem weit entfernten Gegenstück aufzunehmen.\n\nDie Apparatur ist mit speziellen Gravitationsklemmen gesichert und fest im Felsgestein verankert. Weitere Untersuchungen sind erforderlich, um ihren tatsächlichen Zweck zu ermitteln."
 extreme_frontiers.1505.a: "Entschlüsselt das Signal."
 extreme_frontiers.1510.title: "Dekonstruktives Terraforming"
 extreme_frontiers.1510.desc.common: "Nach eingehender Analyse sind wir nun in der Lage, die Konstruktion, die wir auf §Y[from.Planet.GetName]§! fanden, zu verstehen. Die Maschine ist in der Lage, ein primitives, dekonstruktives Terraforming durchzuführen.\n\nSie wurde entwickelt, um die einheimischen Biosphären durch das Bestrahlen gezielter Ressourcen zu stimulieren, was eine Art Kaskadeneffekt erzeugt, der das gesamte Ökosystem des Planeten zerstört und auf Kosten einer erhöhten Toxizität nutzbare Ressourcen freilegt.\n\nAuch wenn wir die genaue Funktionsweise nur teilweise verstehen, ist es uns zumindest gelungen, die Kommunikationsfrequenz zu entschlüsseln und zwei weitere Orte zu identifizieren, die dasselbe Signal aussenden."
 extreme_frontiers.1510.desc.default: "Eine Untersuchung dieser Orte bietet uns eventuell weitere Einblicke in diese Technologie."
 extreme_frontiers.1510.desc.industrialist: "Die unternehmerischen Pioniere, die diese Technologie nutzten, hatten eindeutig eine Affinität zur Gewinnoptimierung. Wir könnten noch viel von ihnen lernen."
 extreme_frontiers.1510.a: "Die Suche beginnt."
 GEORADIATION_SIGNAL_1_PROJECT: "Signalspur: §Y[planet.GetName]§!"
 GEORADIATION_SIGNAL_1_PROJECT_DESC: "Wir fanden an diesem Ort eine Kommunikationsfrequenz, die identisch zu jener auf §Y[from.Planet.GetName]§! ist, und auch eine ähnlich beschädigte Apparatur. Sie zu untersuchen, verbessert hoffentlich unser Verständnis des destruktiven Terraformings."
 extreme_frontiers.1515.title: "Gravitation als Treibstoff"
 extreme_frontiers.1515.desc.common: "Wir fanden eine weitere beschädigte Terraforming-Apparatur auf §Y[from.GetName]§!. Anders als die ursprüngliche Konstruktion war in dieser noch Treibstoff in Form von §HDunkler Materie§! vorhanden - offenbar die treibende Kraft hinter der Strahlenleistung.\n\nDie Apparatur beschleunigt das gezielte Wachstum von Ressourcen durch die Metastasierung wichtiger Molekülverbindungen. Dies regt das Wachstum auf Kosten des zellulären Verfalls der umgebenden Biosphäre an."
 extreme_frontiers.1515.desc.industrialist: "Die völlige Missachtung jeglicher planetarer Stabilität zur Ausbeutung von Ressourcen ist inspirierend."
 extreme_frontiers.1515.desc.signal_2_done: "Indem man Strahlungswellen durch ein feuerresistentes Kristallarray schießt, terraformiert diese Maschine ein Ziel, ohne den Planetenkern selbst zu beschädigen. Das Verfahren wird als \"gravitationsbasierte Molekühlmanipulation\" beschrieben.\n\nAufzeichnungen weisen auf den Ort einer vierten, nicht detonierten Apparatur hin."
 extreme_frontiers.1515.desc.signal_2_not_done: "Wie diese Apparatur dazu in der Lage ist und gleichzeitig den Zusammenbruch des Gravitationsfelds auf planetarer Ebene verhindert, ist weiterhin unklar. Vielleicht finden wir am vierten Ort Antworten auf diese Frage."
 GEORADIATION_SIGNAL_2_PROJECT: "Signalspur: §Y[planet.GetName]§!"
 GEORADIATION_SIGNAL_2_PROJECT_DESC: "Wir verfolgten die auf §Y[from.Planet.GetName]§! gefundene Kommunikationsfrequenz bis hierher zurück und fanden eine weitere beschädigte Apparatur. Sie zu untersuchen, verbessert hoffentlich unser Verständnis des destruktiven Terraformings."
 extreme_frontiers.1520.title: "Stimulierende Bestrahlung"
 extreme_frontiers.1520.desc.common: "Wir fanden eine weitere beschädigte Terraforming-Apparatur auf §Y[from.GetName]§! - diesmal von Kristallauswüchsen umgeben, die offenbar durch ein defektes Kristallarray verursacht wurden.\n\nNach näherer Untersuchung der Apparatur machten wir die Methode aus, die für die gezielte Strahlungsausrichtung verwendet wird: Durch den Einsatz kontrollierter modulierter Rückkopplungsschleifen ist die Maschine in der Lage, das Wachstum einer vorab festgelegten Ressource direkt anzusteuern und zu stimulieren."
 extreme_frontiers.1520.desc.signal_1_done: "Dies ermöglicht ein hochintensives Terraforming, ohne dabei den vollständigen Zusammenbruch der planetaren Gravitation zu riskieren.\n\nGefundene Aufzeichnungen weisen auf die Existenz einer vierten, nicht zerstörten Terraforming-Apparatur hin."
 extreme_frontiers.1520.desc.signal_1_not_done: "Die Substanz, die zur Erzeugung dieser Strahlung verwendet wurde, ist nach wie vor unbekannt. Trotz der Fehlfunktion waren die Treibstoffreserven aufgebraucht. Die Antwort findet sich möglicherweise am letzten Ort, zu dem das Kommunikationssignal weist."
 UNDETONATED_GEORADIATION_PROJECT: "Nicht detonierte Apparatur"
 UNDETONATED_GEORADIATION_PROJECT_DESC: "Wir fanden eine vierte Terraforming-Apparatur auf §Y[planet.GetName]§!, die nicht wie die anderen detoniert ist. Sie zu bergen, schließt hoffentlich die Lücken, die unser derzeitiges Verständnis der Technologie behindert."
 extreme_frontiers.1525.title: "Nicht detonierte Apparatur"
 extreme_frontiers.1525.desc.common: "Wir fanden eine vierte Terraforming-Apparatur auf der Oberfläche von §Y[from.GetName]§! - diesmal intakt. Die zur Steuerung notwendige Architektur liefert uns womöglich das fehlende Wissen, um diese Technologie zu rekonstruieren."
 extreme_frontiers.1525.desc.industrialist: "Die unglaublichen Gewinnspannen, die wir aus der Galaxie erzielen können, sobald wir diese Technologie beherrschen, überwiegen bei Weitem die unbedeutenden Umweltbedenken. Dies ist eine einmalige Gelegenheit für [controller.GetName]."
 extreme_frontiers.1520.desc.default.common: "Die potenziellen Auswirkungen des freien Einsatzes dieser Technologie auf galaktischer Ebene werfen wichtige Fragen auf."
 extreme_frontiers.1525.desc.default.default: "Vielleicht wäre es besser, wenn das potenzielle Risiko, das von diesen Apparaturen ausgeht, aus der Galaxie entfernt werden würde."
 extreme_frontiers.1525.desc.default.homicidal: "Vielleicht wäre es besser, die Galaxie von dieser Bedrohung zu befreien, bevor sie gegen uns eingesetzt wird."
 extreme_frontiers.1525.a.default: "Studieren wir diese Terraforming-Apparatur."
 extreme_frontiers.1525.a.industrialist: "Worauf warten wir noch? Beginnt mit den Studien!"
 extreme_frontiers.1525.b: "Das Risiko ist größer als die Vorteile. Zerstört die Apparatur."
 extreme_frontiers.1530.title: "Vertragsbruch"
 extreme_frontiers.1530.desc.common: "Als wir die Apparatur auf §Y[from.GetName]§! untersuchten, lösten wir versehentlich eine Sicherheitsvorrichtung aus, was zu einem Sirenenalarm auf allen Frequenzen führte. Entgegen unserer ursprünglichen Prognosen, dass dieser Alarm unbeantwortet bleiben würde, ist eine automatisierte Drohne in unser Territorium eingedrungen.\n\nUnsere Kommunikationsversuche erhalten alle dieselbe Antwort:\n\n\"Grüße, geschätzter Kunde. Unsere Aufzeichnungen weisen darauf hin, dass versucht wurde, eine unlizenzierte Version unserer neuesten MKIII Georaditationsmatrix anzufertigen, was einen klaren Verstoß gegen die Nutzungsbedingungen der $NAME_Geocorp$ darstellt.\n\nWir werden unsere Rechtsbefugnis geltend machen, um diesen Versuch mit äußerster Härte zu unterbinden. Beschwerden können gern an unseren Kundendienst gerichtet werden.\""
 extreme_frontiers.1530.desc.industrialist: "Ihre Sorgfalt wäre inspirierend, wenn sie nicht gerade unsere Arbeit verzögern würde."
 extreme_frontiers.1530.a: "Öffnet einen Kommunikationskanal."
 extreme_frontiers.1530.b: "Wir werden nicht mit diesem \"Kundendienst\" verhandeln."
 GEORADIATION_ANALYSIS_PROJECT: "Analyse der Apparatur"
 GEORADIATION_ANALYSIS_PROJECT_DESC: "Indem wir die zur Steuerung notwendige Architektur der auf §Y[planet.GetName]§! gefundenen Apparatur studieren, sind wir in der Lage, die Technologie für unsere eigenen Zwecke zu replizieren."
 NAME_Geocorp: "CoburnCorp"
 geocorp_corvette: "$NAME_Geocorp$-Kampfdrohne"
 geocorp_corvette_plural: "$NAME_Geocorp$-Kampfdrohnen"
 NAME_Geocorp_Combat_Drone: "$geocorp_corvette$"
 extreme_frontiers.1531.title: "Drohne der $NAME_Geocorp$"
 extreme_frontiers.1531.desc: "Als wir die Verbindung herstellten, ertönte zuerst eine Art archaische Musik, bevor die automatisierte Kundendienst-Drohne online ging.\n\nGrüße, geschätzter Kunde. Unsere Aufzeichnungen zeigen, dass versucht wurde, eine unlizenzierte Version unserer MKIII Georaditationsmatrix anzufertigen. Wie können wir helfen?\n"
 extreme_frontiers.1531.a: "Wo kommt Ihr her?"
 extreme_frontiers.1531.a.reply: "\"Jeder Einkauf bei $NAME_Geocorp$ wird mit einem ferngesteuerten Kundenzufriedenheits-Orbitalsatelliten geliefert, um den ordnungsgemäßen Betrieb und die lebenslange Kundenbindung sicherzustellen. Dank unserer internen Energiespeicher können wir über Jahrhunderte hinweg betrieben werden.\""
 extreme_frontiers.1531.b: "Können wir mit dem Administrator reden?"
 extreme_frontiers.1531.b.reply: "\"Bedauerlicherweise ist der letzte lebende Administrator jenseits seines Haltbarkeitsdatums. Unser Einsatz für Kundenzufriedenheit kann jedoch mehrere biologische Lebensspannen überdauern.\""
 extreme_frontiers.1531.c: "Wir dachten, wir würden Ruinen ausgraben."
 extreme_frontiers.1531.c.reply: "\"Unwissenheit ist keine zulässige Entschuldigung. Die Nutzungsbedingungen für Eure MKIII Georaditationsmatrix wurden beim Kauf im Detail erklärt.\""
 extreme_frontiers.1531.d: "Wir sind gewillt, unser Abonnement zu verlängern."
 extreme_frontiers.1531.d.reply: "\"Das ist fantastisch. Wir bereiten unverzüglich die nötigen Papiere vor, sobald eine Verwaltungsgebühr von 3000 §YEnergie-Credits§! übermittelt wurde. Nach Erhalt dieser Gelder betrachten wir diese Angelegenheit als erledigt und ziehen uns zurück."
 extreme_frontiers.1531.e: "Wir haben diese Apparatur nicht gekauft."
 extreme_frontiers.1531.e.reply: "\"Dann gesteht Ihr einen Diebstahl? Das macht die Sache deutlich einfacher. Unsere Antidiebstahlprotokolle sind recht tödlich. Wir hoffen, Ihr zieht unsere Bestattungsprodukte für Euren zukünftigen Bedarf in Betracht."
 extreme_frontiers.1531.f: "Bezahlt die Gebühr."
 extreme_frontiers.1531.f.reply: "\"Vielen Dank, dass Ihr die Lizenz für eine MKIII Georaditationsmatrix verlängert habt. Wir hoffen, diese Apparatur ist für Euch genauso nützlich, wie wir sie als profitabel erleben.\"\n\nNach Bezahlung der Gebühr verschwindet die Drohne in den Tiefen der Galaxie."
 extreme_frontiers.1531.g: "Das ist Wucher! Bereiten wir uns auf einen Kampf vor."
 extreme_frontiers.1531.h: "Auf Nimmerwiedersehen."
 extreme_frontiers.1531.i: "Bereiten wir uns auf einen Kampf vor."
 extreme_frontiers.1534.title: "Drohne der $NAME_Geocorp$"
 extreme_frontiers.1534.desc: "Als sich die Schlacht im §Y[fromfrom.solar_system.GetName]§!-System dem Ende näherte, erschien eine neue Botschaft der Kundendienst-Drohne auf unseren Bildschirmen.\n\n\"Wir haben die Einwände gegen unsere Bemühungen zur Durchsetzung der Nutzungsbedingungen zur Kenntnis genommen. Aufgrund der überwältigenden militärischen Macht werden wir unsere Ansprüche auf das geistige Eigentum der MKIII Georaditationsmatrix mit sofortiger Wirkung aufgeben. Wir hoffen, dass Ihr Eure neue Technologie genießen werdet.\"\n\nDie Drohne explodiert und die Kommunikation endet."
 extreme_frontiers.1534.a: "Auf Nimmerwiedersehen."
 extreme_frontiers.1535.title: "Nutzungsbedingungen überarbeitet"
 extreme_frontiers.1535.desc: "Nachdem wir uns um die Kundendienst-Drohne gekümmert haben, können wir nun damit fortfahren, die Georaditationsmatrix zu rekonstruieren."
 extreme_frontiers.1535.a: "Setzt die Studien bezüglich der Apparatur fort."
 GEORADIATION_ANALYSIS_PROJECT_CONTINUED: "$GEORADIATION_ANALYSIS_PROJECT$"
 GEORADIATION_ANALYSIS_PROJECT_CONTINUED_DESC: "$GEORADIATION_ANALYSIS_PROJECT_DESC$"
 extreme_frontiers.1540.title: "Nicht detonierte Apparatur"
 extreme_frontiers.1540.desc.industrialist: "Dank unserer unermüdlichen unternehmerischen Effizienz gelang es uns, die MKIII Georaditationsmatrix zu rekonstruieren und den Betriebsprozess so zu optimieren, dass wir maximale Gewinne erzielen."
 extreme_frontiers.1540.desc.default: "Nach umfangreichen Studien gelang es uns, die MKIII Georaditationsmatrix erfolgreich zu rekonstruieren. Wir können nun ihr volles Potenzial nutzen und haben den Prozess zusätzlich noch verbessert."
 extreme_frontiers.1540.desc.common: "Indem wir die radioaktive molekulare Destabilisierung in unserer Terraforming-Ausrüstung nutzen, stimulieren wir das Wachstum wertvoller Ressourcen."
 extreme_frontiers.1540.a: "Das sind hervorragende Neuigkeiten!"
 tech_georadiation_terraforming: "Terraforming durch Georadiation"
 tech_georadiation_terraforming_desc: "Indem wir die Biosphäre eines Planeten auf molekularer Ebene bestrahlen, fördern wir das Wachstum bestimmter Ressourcen und verwandeln die Welt gleichzeitig in ein giftiges Ödland."
 tech_georadiation_terraforming_tt: "Neue §Yplanetare Entscheidung§!: §H$decision_toxify_world$§!"
 extreme_frontiers.1545.title: "Apparatur zerstört"
 extreme_frontiers.1545.desc: "Wir haben die Terraforming-Apparatur auf §Y[from.GetName]§! erfolgreich zerstört und die noch verwertbaren Materialien geborgen.\n\nDa die Maschine nun vernichtet ist und ihre Schöpfer nicht mehr existieren, sind die Geheimnisse hinter dieser zerstörerischen Technologie für die Galaxie für immer verloren."
 extreme_frontiers.1545.a.default: "Die wären wir los."
 decision_toxify_world: "Welt vergiften"
 decision_toxify_world_desc: "Wir fördern das Wachstum bestimmter Ressourcen, indem wir die Biosphäre des Planeten auf molekularer Ebene bestrahlen und ihn dabei in ein giftiges Ödland verwandeln."
