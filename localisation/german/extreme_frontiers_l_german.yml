 #############
 # Anomalies #
 #############
 EXTREME_FRONTIERS_TITLE: "Extreme Frontiers" # Do not translate
 # PULSATING OBJECT
 PULSATING_OBJECT_TOXIC_CAT: "Pulsierendes Objekt"
 PULSATING_OBJECT_GAS_GIANT_CAT: "Pulsierendes Objekt"
 PULSATING_OBJECT_BARREN_CAT: "Pulsierendes Objekt"
 PULSATING_OBJECT_BARREN_COLD_CAT: "Pulsierendes Objekt"
 PULSATING_OBJECT_FROZEN_CAT: "Pulsierendes Objekt"
 PULSATING_OBJECT_MOLTEN_CAT: "Pulsierendes Objekt"
 anomaly_pulsating_object_desc: "Bei den ersten Scans von §Y[this.GetName]§! wurde ein seltsames Flugobjekt entdeckt, das durch die Troposphäre schwebt und dabei an Größe zu- und abnimmt. Weitere Untersuchungen sind erforderlich, um eine Klassifikation durchzuführen."
 extreme_frontiers.100.title: "Uralter Wetterballon"
 extreme_frontiers.100.desc: "§Y[Leader.GetName]§! identifizierte das seltsame Flugobjekt auf §Y[from.GetName]§! als uralten Wetterballon identifizieren. Jegliche Markierungen, die Aufschluss über die Herkunft hätten geben können, wurden jedoch längst durch die extremen atmosphärischen Bedingungen des Planeten abgetragen.\n\nEine radiometrische Datierung ergab, dass er bereits seit über einem Jahrhundert die Atmosphäre von [from.GetName] durchstreift und aufgrund der eigenwilligen Druckschwankungen die Größe ändert.\n\nWie durch ein Wunder sind die Solarzellen noch immer voll funktionsfähig und die Sensoren liefern ebenfalls wertvolle atmosphärische Daten aus einem ganzen Jahrhundert. Dies wird für unsere [Root.Owner.GetResearchers] von großem Interesse sein."
 # MOLTEN METAL OCEAN
 MOLTEN_METAL_OCEAN_CAT: "Geschmolzene Ströme"
 anomaly_molten_metal_ocean_desc: "Erste Scans von §Y[from.GetName]§! ergaben, dass sich auf der Oberfläche häufig Tsunamis aus überhitzter Lava mit einer hohen Konzentrationen an Schwermetallen bilden. Um dieses Phänomen vollständig zu verstehen, sind nähere Untersuchungen erforderlich."
 extreme_frontiers.110.title: "Metallische Tsunamis"
 extreme_frontiers.110.desc: "§Y[Leader.GetName]§! bestätigte, dass die Lavaozeane auf §Y[from.GetName]§! außergewöhnlich reine Konzentrationen fast aller bekannten seltenen Metalloide in unserem Periodensystem enthalten.\n\nDiese konzentrierte Ansammlung flüssiger Metalle erzeugt hoch volatile elektromagnetische Felder, die häufig zur Bildung von Tsunamis aus geschmolzenem Metall führen.\n\nMithilfe von Vorhersagemodellen konnten wir kurze, aber regelmäßige Abschwächungen in der Wellenintensität ausmachen, was es uns erlaubt, diese einzigartig reichhaltigen Vorkommen abzubauen."
 # GREAT BLUE SPOTS
 GREAT_BLUE_SPOTS_CAT: "Große blaue Flecken"
 great_blue_spots_desc: "Die Oberfläche von §Y[from.GetName]§! weist zwei besonders auffällige Verfärbungen auf, die sich mit hoher Geschwindigkeit synchron zueinander bewegen und groß genug sind, damit man sie vom Weltraum aus sehen kann. Diese blauen Formationen sind interessant genug, um eine weitere Untersuchung zu rechtfertigen."
 extreme_frontiers.120.title: "Symbiotische Superstürme"
 extreme_frontiers.120.desc: "Bei den großen blauen Flecken auf §Y[from.GetName]§! handelt es sich um symbiotische Superstürme: einen Zyklon und einen Antizyklon, die sich gegenseitig aufrechterhalten und in einem perfekten Gleichgewicht zueinander existieren.\n\nDie Stürme sind gewaltig groß und verursachen Windgeschwindigkeiten, die regelmäßig die Schallmauer durchbrechen und starke Überschallknalle verursachen. Innerhalb der Flecken befinden sich große Mengen an Kobaltstaub, die ihnen ihre charakteristische Farbe verleihen.\n\n§Y[Leader.GetName]§! schätzt, dass sie bereits seit mehr als einem Jahrhundert auf dem Planeten wüten. Die Mineralien haben sich in der oberen Atmosphäre angesammelt und lassen sich von einer Bergbaustation leicht abbauen."
 # FROZEN INFERNO
 FROZEN_INFERNO_CAT: "Hitzespitzen"
 frozen_inferno_desc: "Die ersten Scans von §Y[from.GetName]§! zeigen extrem unregelmäßige Hitzespitzen auf dem ansonsten gefrorenen Himmelskörper. Diese anormalen Temperaturschwankungen rechtfertigen eine nähere Untersuchung."
 extreme_frontiers.130.title: "Gefrorenes Inferno"
 extreme_frontiers.130.desc: "§Y[Leader.GetName]§! hat die Untersuchung der unregelmäßigen Hitzespitzen auf der gefrorenen Welt §Y[from.GetName]§! abgeschlossen.\n\nTief unter der endlosen Tundra begraben liegen hochreaktive pyrophore Ablagerungen. Diese Substanzen, die ursprünglich tief unter dem Eis inaktiv waren, werden regelmäßig an die Oberfläche befördert, wenn sich die kontinentalen Eisschilde verschieben und auseinanderbrechen.\n\nSobald diese extrem brennbaren Gase an die Oberfläche gelangen und in der sauerstoffreichen Atmosphäre von [from.GetName] auftauen, entzünden sie sich urplötzlich.\n\nMit Spezialgeräten lassen sich diese einzigartigen brennbaren Stoffe extrahieren und anderweitig nutzen."
 # POISONED ATMOSPHERE
 POISONED_ATMOSPHERE_CAT: "Vergiftete Atmosphäre"
 poisoned_atmosphere_desc: "In der oberen Atmosphäre von §Y[from.GetName]§! wurde eine hohe Konzentration giftiger Biomoleküle gemessen."
 extreme_frontiers.140.title: "Vergiftete Atmosphäre"
 extreme_frontiers.140.desc.hive_mind: "§Y[from.GetName]§! beheimatet eine bemerkenswerte Flechte, die hochgiftige Moleküle in die Atmosphäre abgibt, um sich vor Fressfeinden zu schützen.\n\nBei der näheren Untersuchung von Fossilienfunden stellte sich heraus, dass [from.GetName] einst eine vielfältige Fauna aufwies, die durch den durch die Flechte verursachten allmählichen Anstieg des Arsen- und Thalliumgehalts in der Atmosphäre ausstarb.\n\n§Y[Leader.GetName]§! entdeckte nur einen anderen lebenden Organismus: eine Spezies von Reptiloiden, die dank ihrer effizienten Entgiftungsdrüsen unter solchen Bedingungen überleben kann.\n\nEine nähere Untersuchung dieses einzigartigen Organismus könnte uns wertvolle Erkenntnisse über die Entgiftung einer Atmosphäre liefern."
 extreme_frontiers.140.desc.default: "$extreme_frontiers.140.desc.hive_mind$ Erste Experimente deuten zudem darauf hin, dass man die einzigartigen Verbindungen in den Toxinen für eine Verwendung in der Kosmetikindustrie umfunktionieren könnte."
 extreme_frontiers.140.a: "Ein interessantes Potenzial ..."
 extreme_frontiers.140.b: "Verarbeitet es zu Parfüm."
 DETOXIFICATION_GLAND_PROJECT: "Studien zu Entgiftungsdrüsen"
 DETOXIFICATION_GLAND_PROJECT_DESC: "Eine bemerkenswerte Reptiloidenspezies gedeiht prächtig in der giftigen Atmosphäre von §Y[from.GetName]§!. Dies ist einem einzigartigen Organ zu verdanken, das Giftstoffe in nützliche Nährstoffe zerlegt. Eine weitere Untersuchung könnte sich lohnen."
 extreme_frontiers.145.title: "Entgiftungseinblick"
 extreme_frontiers.145.desc: "Nach umfassender Untersuchung der auf §Y[from.GetName]§! gefundenen Reptiloidendrüsen, gelang es §Y[Leader.GetName]§!, das Geheimnis hinter der bemerkenswerten Widerstandsfähigkeit gegenüber den planetaren Giften aufzudecken.\n\nDieses komplexe Organ erzeugt Verbindungen, die die in der Atmosphäre enthaltenen Gifte neutralisieren und so verhindern, dass Giftstoffe vom Blutkreislauf des Reptils aufgenommen werden.\n\nDiese hochgradig anpassungsfähige Drüse ist sogar in der Lage, unsere tödlichsten im Labor hergestellten Gifte zu neutralisieren."
 # GLIMPSE OF THE CORE
 GLIMPSE_CORE_CAT: "Ein Blick auf den Kern"
 glimpse_the_core_desc: "Seltsame Bewegungen in den äußeren Gasschichten von §Y[from.GetName]§! führen dazu, dass sich extrem tiefe Öffnungen bilden, die in kurzen Abständen den festen Kern des Planeten freilegen. Dieses bemerkenswerte Phänomen muss weiter untersucht werden."
 extreme_frontiers.150.title: "Organischer Kern"
 extreme_frontiers.150.desc: "§Y[Leader.GetName]§! steuerte eine Sonde tief in eine der temporären Entlüftüngsöffnungen auf §Y[from.GetName]§! und entdeckte, dass im Kern des Planeten ein einzelliger Organismus lebt, wie wir ihn noch nie zuvor gesehen haben.\n\nDiese robusten Zellen scheinen sich perfekt an die extremen Druckbedingungen angepasst zu haben und setzen bei ihrer saisonalen Fortpflanzung beachtliche Mengen an Wasserstoff frei. [Leader.GetName] schlussfolgerte, dass auf diese Weise die gasförmigen Wasserstoffschichten des Planeten aufrechterhalten werden.\n\nDiesen Organismus auszurotten, würde dazu führen, dass sich die äußeren Schichten auflösen und ein kolonisierbarer felsiger Planet zurückbleibt."
 extreme_frontiers.150.a: "Rotten wir den Organismus aus!"
 extreme_frontiers.150.b: "Das ist eine einmalige Beobachtungsmöglichkeit."
 PURIFY_CORE_PROJECT: "Den Kern säubern"
 PURIFY_CORE_PROJECT_DESC: "Die äußeren Gasschichten von §Y[from.GetName]§! werden durch die einzigartige Biochemie eines einzelligen Organismus aufrechterhalten, der im Kern lebt. Seine Ausrottung würde die weitere Zufuhr von Gasen beenden und einen kolonisierbaren felsigen Planet hinterlassen."
 extreme_frontiers.155.title: "Eine neue Welt"
 extreme_frontiers.155.desc: "§Y[Leader.GetName]§! steuerte eine bewaffnete Sonde in die Öffnungen auf §Y[from.From.GetName]§! und feuerte die giftige Nutzlast in unmittelbarer Nähe zum Kern ab. Der einzellige Organismus starb auf der Stelle.\n\nWir konnten zusehen, wie sich die äußeren Gasschichten von [from.From.GetName] nach und nach im All auflösten und einen kleinen, felsigen Planeten zurückließen."
 extreme_frontiers.155.a: "Eine beeindruckende Leistung."
 # OPTICAL PHENOMENA
 OPTICAL_PHENOMENA_CAT: "Schimmernde Oberfläche"
 optical_phenomena_desc: "Erste Bilder von §Y[from.GetName]§! zeigen äußerst lebhafte optische Phänomene auf der gesamten Oberfläche des Planeten. Die Ursache dieser Farbmuster lässt sich aus der Umlaufbahn heraus jedoch nicht eindeutig bestimmen."
 extreme_frontiers.160.title: "Regenbogenfarbene Eisdecke"
 extreme_frontiers.160.desc.default: "Eine nähere Untersuchung der Oberfläche von §Y[from.GetName]§! enthüllte die Ursache für die optischen Phönomene, die wir während des Orbitalscans beobachteten.\n\nDie atmosphärischen Bedingungen haben einen Großteil des Permafrostbodens auf dem Planeten so weit poliert, dass dieser transparent geworden ist, was ein tiefes Netz bunter Kristallformationen zum Vorschein bringt, die darunter verborgen liegen. Dieses natürlich vorkommende Phänomen erzeugt einen kaleidoskopartigen Effekt, wenn man es aus der Ferne betrachtet."
 extreme_frontiers.160.desc.machine: "$extreme_frontiers.160.desc.default$\n\nAuch wenn das Phänomen an sich ästhetisch sehr ansprechend ist, sollten wir unsere Aufmerksamkeit den reichen Mineralvorkommen schenken, die sich unter der Eisdecke befinden."
 extreme_frontiers.160.tooltip: "Schaltet die §Yplanetare Entscheidung§! \"§H$decision_prismatic_ice_exhibit$§!\" frei, die folgende Auswirkungen hat:\n£amenities£ $MOD_PLANET_AMENITIES_MULT$: §G+25%§!\n$mod_planet_jobs_unity_produces_mult$: §G+25%§!"
 decision_prismatic_ice_exhibit: "Prismatische Eisausstellung"
 decision_prismatic_ice_exhibit_desc: "Scheiben aus kristallklarem Eis, die einen faszinierenden kaleidoskopischen Effekt erzeugen und für begrenzte Zeit ausgestellt werden können."
 prismatic_ice_max_3_times_pass: "Kann maximal §Y3§! Mal erlassen werden."
 prismatic_ice_max_3_times_fail: "$TRIGGER_FAIL$Kann maximal §Y3§! Mal erlassen werden."
 prismatic_ice_max_3_times_pass_with_var: "$TRIGGER_PASS$$prismatic_ice_max_3_times_pass$ (derzeit: §Y[owner.prismatic_ice_exhibit_happened]§!)"
 exhibiting_prismatic_ice: "Prismatische Eisausstellung"
 exhibiting_prismatic_ice_desc: "Scheiben aus kristallklarem Eis, die einen faszinierenden kaleidoskopischen Effekt erzeugen und für begrenzte Zeit ausgestellt werden können."
 # PLASMA VOLCANOES
 PLASMA_VOLCANO_CAT: "Orbitalplasma"
 plasma_volcano_desc: "Wir haben eine visuelle Bestätigung dafür, dass instabiles, superheißes Plasma in die obere Atmosphäre von §Y[from.GetName]§! geschossen wird.\n\nDie dicke Vulkanasche in der Atmosphäre verhindert jedoch, dass wir die Quelle dieser Projektile vom Orbit aus ausmachen können. Eine genauere Untersuchung birgt gewisse Risiken."
 extreme_frontiers.170.title: "Plasmavulkane"
 extreme_frontiers.170.desc: "§Y[Leader.GetName]§! entdeckte die Ursache für die Eruptionen von superheißem Plasma auf §Y[from.GetName]§!.\n\nDas einzigartige Magnetfeld des Planeten begünstigt die Reaktion zwischen ionisierten Materialien tief im Planetenmantel, wodurch vulkanische Kammern mit hochkomprimiertem Plasma entstehen.\n\nGeben die instabilen tektonischen Platten des Planeten nach, wird dieses Plasma explosionsartig wie ein tödliches Projektil nach oben geschleudert, wo es sich durch Gase in der Atmosphäre entzündet und Sekundärexplosionen verursacht. Unsere Waffenspezialisten sind sehr daran interessiert, diese Erkenntnisse auf unsere eigenen plasmabasierten Waffen anzuwenden."
 extreme_frontiers.170.desc.negative: "Bedauerlicherweise führte die Gefahrenstufe dieser Forschung dazu, dass [Leader.GetName]"
 extreme_frontiers.170.desc.traumatized: "$extreme_frontiers.170.desc.negative$ ein starkes Trauma erlitt."
 extreme_frontiers.170.desc.maimed: "$extreme_frontiers.170.desc.negative$ physische Verletzungen davontrug."
 # BLACK CLOUDS
 BLACK_CLOUDS_CAT: "Schwarze Wolken"
 black_clouds_desc: "In der Atmosphäre von §Y[from.GetName]§! gibt es dicke schwarze Wolken, die sich in unregelmäßigen Mustern unabhängig von der Geschwindigkeit oder der Richtung der Planetenwinde zu bewegen scheinen. Sie sind auf Bildern nur kurz zu sehen und tauchen anscheinend immer im selben Moment im Tag-Nacht-Zyklus des Planeten auf."
 extreme_frontiers.180.title: "Insektoidenschwärme"
 extreme_frontiers.180.desc: "Bei den ungewöhnlichen schwarzen Wolken, die man auf §Y[from.GetName]§! beobachtete, handelt es sich in Wahrheit um dichte Schwärme großer fleischfressender Insekten.\n\nDiese geflügelten Raubtiere nisten in Felsspalten und kommen einmal täglich hervor, um die wenigen organischen Stoffe zu verschlingen, die auf der Oberfläche des Planten vorhanden sind.\n\nDank des leistungsstarken Stoffwechsels, der den Zellverfall nach der Nahrungsaufnahme umkehrt, können diese Arthropoden ihre Lebensdauer unbegrenzt verlängern, solange sie regelmäßig Nährstoffe zu sich nehmen."
 extreme_frontiers.180.desc.altered_metabolism: "Während der Feldforschung wurde [Leader.GetName] von einem Exemplar gebissen, was eine bemerkenswerte Stoffwechselreaktion auslöste. Das weitere Studium dieser einzigartige Spezies könnte uns vermutlich viel über die Regenerationsfähigkeit organischer Zellen lehren."
 extreme_frontiers.180.b: "Welch köstliche Mahlzeit sie abgeben werden."
 leader_trait_altered_metabolism: "Veränderter Stoffwechsel"
 leader_trait_altered_metabolism_desc: "Dieser Anführer wurde während Feldstudien von einem Exemplar einer fremden Spezies gebissen, was ihn nachhaltig verändert hat."
 # SUBGLACIAL VIBRATIONS
 SUBGLACIAL_VIBRATIONS_CAT: "Subglaziale Vibrationen"
 subglacial_vibrations_desc: "Unter der gefrorenen und leblosen Oberfläche von §Y[from.GetName]§! liegt ein riesiger subglazialer Ozean. Tiefe, grollende Vibrationen wurden unter dem Permafrost ausgemacht, die von ihrer Natur her offenbar nicht seismisch sind."
 extreme_frontiers.190.title: "Riesige Robben"
 extreme_frontiers.190.desc: "Dank einer Kombination aus Tiefsee-Echolotung und seismischen Telemetriedaten machten wir die Quelle der Vibrationen auf §Y[from.GetName]§! aus. In den subglazialen Ozeanen aus flüssigem Stickstoff tummeln sich riesige Herden gigantischer Robben, die sich an das Leben in dieser rauen Umgebung angepasst haben.\n\nDiese bemerkenswerten Kreaturen sind so groß und schwer wie kleine Transportschiffe. Zur Kommunikation senden sie ein kräftiges, tiefes Brummen aus, das sich über den gesamten Planeten ausbreiten kann. Ihre einzigartige, kollagenreiche Speckschicht schützt sie vor kryogenen Verbrennungen und Erfrierungen und verstärkt gleichzeitig ihre Rufe.\n\nDa sie in diesem isolierten Ökosystem keine natürlichen Feinde haben, sind sie sehr neugierig, zahm und lassen sich leicht an die Oberfläche locken, indem man ihre charakteristischen Laute nachahmt."
 extreme_frontiers.190.a: "Eine einzigartige Entdeckung."
 extreme_frontiers.190.a.tt: "Neues Gebäude: ['building:building_pinniped_sanctuary']"
 extreme_frontiers.190.b: "Einfache Beute."
 building_pinniped_sanctuary: "Robbenzuflucht"
 building_pinniped_sanctuary_desc: "Eine Zuflucht für die riesige Robben aus den Ozeanen aus flüssigem Stickstoff von [event_target:pinnipeds_home_planet.GetName]."
 # ELECTRIC WATERS
 ELECTRIC_WATERS_CAT: "Elektrifizierte Gewässer"
 electric_waters_desc: "Unsere Orbitalscans von §Y[from.GetName]§! empfingen unregelmäßige elektrische Signale, die tief aus den Meeren des Planeten zu stammen scheinen.\n\nEine genauere Untersuchung dieses aquatischen Phänomens wird uns mehr Aufschluss geben."
 extreme_frontiers.200.title: "Hochspannungskoralle"
 extreme_frontiers.200.desc: "§Y[Leader.GetName]§! machte den Ursprung der elektrischen Ströme in der Tiefsee von §Y[from.GetName]§! aus.\n\nDer Meeresboden beheimatet eine komplexe Art von Kaltwasserkoralle, die über elektrogenetische Fähigkeiten verfügt. Sie nutzt spezielle Organellen, um Strom zu erzeugen, mit dem sie Mikroorganismen anlockt, die ihr sowohl als Nahrungsquelle als auch als Kommunikationsmittel dienen.\n\nUnsere Sonden wirken wie ein Stimulans für die Korallen. Sobald wir die Übertragungsfrequenz ändern, ändern sie ihre elektrische Ladung.\n\nIndem wir unsere Interaktionen mit dieser Tiefseekoralle sorgfältig regulieren, können wir die Energieproduktion unseres Planeten steigern, ohne das empfindliche Ökosystem zu stören."
 # OBSIDIAN PLANET
 OBSIDIAN_PLANET_CAT: "Funkelnde Landschaft"
 obsidian_planet_desc: "Erste Bildaufzeichnungen von §Y[from.GetName]§! zeigen kontinentale Obsidianplatten, die die karge Oberfläche des Planeten bedecken, und unsere Scanner registrierten Spuren von Schwefel in der oberen Atmosphäre.\n\nEine genauere geologische Untersuchung wird uns mehr Aufschluss geben."
 extreme_frontiers.210.title: "Obsidianödland"
 extreme_frontiers.210.desc: "Basierend auf einer Sedimentuntersuchung, die auf §Y[from.GetName]§! durchgeführt wurde, stellten wir fest, dass die vulkanische Welt urplötzlich gefroren ist, wodurch die Lava auf der Oberfläche zu einer Schicht aus Vulkanglas abkühlte.\n\nDie zahlreichen Einschlagskrater auf der Oberfläche des Planeten lassen vermuten, dass diese \"Eiszeit\" höchstwahrscheinlich durch externe Himmelskörper eingeleitet wurde (beispielsweise durch einen Meteoritensturm). In den Vulkanschloten innerhalb der Obsidianformationen befinden sich auch große Blasen aus eingeschlossenem Schwefelgas, die durch die schnelle Vereisung versiegelt wurden.\n\nDurch eine gezielte Extraktion werden wir in der Lage sein, diese Ressourcen für unseren eigenen Bedarf abzubauen."
 # SHEARING FORCE
 SHEARING_FORCE_CAT: "Kommunikation unterbrochen"
 shearing_force_desc: "Unsere Beobachtungssonden in der Atmosphäre von §Y[from.GetName]§! haben die Kommunikation eingestellt, und der genaue Standort unserer Hardware ist derzeit unbekannt.\n\nEine nähere Untersuchung des Planeten ist nötig, um die Daten zu bergen."
 extreme_frontiers.220.title: "Schereneffekt"
 extreme_frontiers.220.desc: "Wir kennen nun die Ursache für das Verschwinden unserer Sonden auf §Y[from.GetName]§!.\n\nDie verschiedenen Gasschichten, aus denen sich die Atmosphäre des Planeten zusammensetzt, weisen dramatische Temperaturunterschiede auf. Diese Unterschiede sorgen für eine starke Gegenströmung, die die Gasschichten in entgegengesetzte Richtungen treibt.\n\nDieser Prozess, zusammen mit den unterschiedlichen Dichten der einzelnen Gase, führt zu einem gewaltigen Schereneffekt, der alles auseinanderreißt, was zwischen die Schichten kommt.\n\nDa wir nun wissen, was uns erwartet, können wir unsere eigene Ausrüstung so modifizieren, dass sie diesen extremen Bedingungen standhält, und die kinetische Kraft dieses Naturphänomens nutzen."
 # MISSING MASS
 MISSING_MASS_CAT: "Vermisste Masse"
 missing_mass_desc: "Unsere Massemesswerte auf §Y[from.GetName]§! liegen weit unterhalb der erwarteten Parameter für einen felsigen Planeten dieser Größe. Weitere Untersuchungen sind angebracht."
 extreme_frontiers.230.title: "Anneliden im unteren Mantel"
 extreme_frontiers.230.desc: "Bei der näheren Untersuchung von §Y[from.GetName]§! stellte sich heraus, dass der Silikatmantel von einem weitläufigen Netz großer unterirdischer Höhlen durchzogen ist.\n\nEine Erkundungssonde entdeckte in den Hohlräumen schließlich eine Spezies von Anneliden, die einem Ringelwurm ähnelt, tief im Mantel lebt und sich von Silikatgestein ernährt. Riesige Kolonien dieser Lebewesen fressen den Planeten von innen auf und stoßen die verdauten Abfälle in die Umlaufbahn aus, wo kosmische Winde diese davontragen.\n\nWenn wir es schaffen, diese Anneliden zu beseitigen, würden unsere [controller.GetMinerPlural] Zugang zu riesigen Mengen leicht abbaubarem Silikaterz erhalten."
 extreme_frontiers.230.desc.terravore: "$extreme_frontiers.230.desc$ Ihr Appetit ist beeindruckend und im Wesentlichen gar nicht so anders als unser eigener."
 extreme_frontiers.230.a: "Startet die Bohrer."
 extreme_frontiers.230.b: "Studiert diese faszinierenden Kreaturen."
 # LIFE IN DARKNESS
 LIFE_IN_DARKNESS_CAT: "Leben in der Dunkelheit"
 life_in_darkness_desc: "§Y[from.GetName]§! verfügt über eine gebundene Rotation, wodurch eine Seite des Planeten in einem Zustand ewiger Dunkelheit existiert. Infrarotscans zeigten uns jedoch, dass diese lichtlose und nährstoffarme Zone ein aktives organisches Ökosystem beheimatet."
 extreme_frontiers.240.title: "Lichtdurchlässige Evolution"
 extreme_frontiers.240.desc: "Die dunkle Seite von §Y[from.GetName]§! bietet ein einzigartiges evolutionäres Umfeld für die wenigen Organismen, die in dieser rauen Welt überleben können.\n\nDank einer einzigartigen Chromosomenvariation sind die hier lebenden Tiere vollständig lichtdurchlässig, besitzen kein Sehvermögen und nutzen ausgeklügelte Formen der Echoortung, um zu überleben."
 extreme_frontiers.240.desc.non_homicidal: "$extreme_frontiers.240.desc$ Ihre bemerkenswerten Anpassungsmethoden sind für unsere [controller.GetResearcherPlural] von größtem Interesse."
 extreme_frontiers.240.a: "Erhellend."
 extreme_frontiers.240.b: "Wir werden sie verschlingen."
 extreme_frontiers.240.c: "Wir werden sie ausrotten."
 # RAINBOW RIVERS
 RAINBOW_RIVERS_CAT: "Fluoreszierende Flüsse"
 rainbow_rivers_desc: "Erste Scans von §Y[from.GetName]§! zeigen fluoreszierende Flüsse, die die Oberfläche des Planeten durchziehen und das volle Farbspektrum abdecken.\n\nWeitere Untersuchungen werden uns dabei helfen, die Ursache für dieses ungewöhnliche Phänomen zu verstehen."
 extreme_frontiers.250.title: "Farbenfrohe Chemosynthese"
 extreme_frontiers.250.desc: "Eine Analyse der fluoreszierenden Flüsse auf §Y[from.GetName]§! ergab, dass sie von einer einzigartigen Art mikrobiologischen Lebens bewohnt werden.\n\nEs nutzt Chemosynthese, um schädliche Elemente zu verdauen, und sondert dabei hochreaktive Nebenprodukte ab, die die chemische Zusammensetzung des Flusses verändern und zu drastischen Farbveränderungen führen.\n\nDie leuchtenden Neonfarben dienen gleichzeitig als Kommunikationsmittel, um den Fruchtbarkeitsstatus zu signalisieren und Partner anzulocken, während sie durch die giftigen Ströme des Planeten treiben.\n\nDie weitere Erforschung dieser Lebewesen und ihres Lebenszyklus wird unseren [controller.GetResearcherPlural] faszinierende Forschungsmöglichkeiten bieten."
 # GASEOUS METALS
 GASEOUS_METALS_CAT: "Metallische Gase"
 gaseous_metals_desc: "Die Atmosphäre von §Y[from.GetName]§! setzt sich hauptsächlich aus verschiedenen Metallen in gasförmigem Zustand zusammen. Wenn wir lernen, wie diese rauen Bedingungen auf dem Planeten entstanden sind, können wir möglicherweise wertvolle Verbindungen daraus extrahieren."
 extreme_frontiers.260.title: "Galvanisierende Wolken"
 extreme_frontiers.260.desc: "Die ungewöhnliche Atmosphäre von §Y[from.GetName]§! fing riesige Mengen an Sonnenstrahlung ein und löste damit eine kaskadierende Erwärmung aus, die Metalle in einen gasförmigen und hochflüchtigen Zustand brachte.\n\nDiese Verbindungen reagieren nahezu augenblicklich mit unserer Ausrüstung und überziehen sie mit einer dünnen, aber äußerst widerstandsfähigen Metalllegierung. Überraschenderweise richtete dieser Prozess keinerlei Schaden an.\n\n§Y[leader.GetName]§! ist der Ansicht, dieser natürliche Galvanisierungsprozess ließe sich nutzen, um die Widerstandsfähigkeit von Schiffsrümpfen in ganz §Y[controller.GetName]§! zu verbessern."
 ATMOSPHERIC_ELECTROPLATING: "Atmosphärische Galvanisierung"
 ATMOSPHERIC_ELECTROPLATING_DESC: "Objekte der gasförmigen Metallatmosphäre auf §Y[from.GetName]§! auszusetzen, löst eine Art natürlicher Galvanisierung aus.\n\nDieser einzigartige Prozess ist bemerkenswert effektiv und lässt sich möglicherweise replizieren, um die Haltbarkeit von Schiffsrümpfen zu verbessern."
 extreme_frontiers.265.title: "Hochleistungsfähiges Metall"
 extreme_frontiers.265.desc: "Wir haben einen Weg gefunden, um den ungewöhnlichen Galvanisierungsprozess der flüchtigen Atmosphäre auf §Y[from.From.GetName]§! in industriellem Maßstab zu replizieren.\n\nUnsere [Root.Owner.GetEngineerPlural] sind jetzt in der Lage, die Widerstandsfähigkeit bestimmter Metalle zu erhöhen, ohne dabei Kompromisse bezüglich der Flexibilität oder des Gewichts eingehen zu müssen.\n\nDiese fortschrittliche Methode ist während des Baus von Schiffen direkt nutzbar."
 # CARBON ALLOTROPES
 CARBON_ALLOTROPES_CAT: "Kohlenstoff-Allotrope"
 carbon_allotropes_desc: "Spektroskopiedaten von §Y[from.GetName]§! deuten darauf hin, dass sich der Planet aus seltenen und komplexen Kohlenstoff-Allotropen zusammensetzt. Weitere Untersuchungen sind erforderlich, um eine genauere Kategorisierung vornehmen zu können."
 extreme_frontiers.270.title: "Graphen-Formationen"
 extreme_frontiers.270.desc: "Auf §Y[from.GetName]§! wurden reichhaltige Graphenvorkommen entdeckt. Dieses seltene Kohlenstoff-Allotrop besitzt die Größe eines einzelnen Moleküls, verfügt aber über eine unvergleichliche Stärke und Leitfähigkeit.\n\nDas wertvolle Nanomaterial kann sich hier dank der chemischen Gasphasenabscheidung bilden, die in der ungewöhnlichen Atmosphäre dieser §YKohlenstoffwelt§! natürlich vorkommt."
 extreme_frontiers.270.a: "Extrahiert das Graphen."
 # DIAMOND DUST
 DIAMOND_DUST_CAT: "Hochgeschwindigkeitsmasse"
 diamond_dust_desc: "Eine Masseuntersuchung von §Y[from.GetName]§! deckte eine hohe Konzentration sich schnell bewegender physischer Materie tief in der unteren Troposphäre auf.\n\nDie Quelle dieser ungewöhnlichen Messwerte lässt sich ohne weitere Untersuchungen nicht näher bestimmen."
 extreme_frontiers.280.title: "Diamantenstürme"
 extreme_frontiers.280.desc: "Wir identifizierten die Quelle der ungewöhnlichen Massedaten auf §Y[from.GetName]§!.\n\nDie planetare Atmosphäre besteht hauptsächlich aus kohlenstoffreichem Methangas, das sich bei zunehmender Schwerkraft zu ultradichten Diamantstrukturen verfestigt. Aufgrund der heftigen Stürme auf dem Planeten entstehen durch dieses Phänomen schnell Diamantstürme.\n\nAuch wenn wir diese Diamanten für unseren eigenen Bedarf leicht gewinnen können, ist sich §Y[leader.GetName]§! sicher, dass uns eine genauere Untersuchung ihrer Dichte und ihrer Reinheit wertvolle Erkenntnisse liefern könnte."
 ATMOSPHERIC_DIAMONDS_PROJECT: "Atmosphärendiamanten"
 ATMOSPHERIC_DIAMONDS_PROJECT_DESC: "Durch die genauere Untersuchung der ultradichten Diamantenstürme auf §Y[from.GetName]§! sind wir nun zuversichtlich, dass sich ihre einzigartigen Eigenschaften nutzen lassen, um unsere Laserforschung voranzutreiben."
 extreme_frontiers.285.title: "Präzise Diamanten"
 extreme_frontiers.285.desc: "§Y[leader.GetName]§! schloss seine Forschungen über die ultradichten Diamanten ab, die man auf §Y[from.From.GetName]§! fand.\n\nDer Kompressionsprozess, der diese Diamanten formt, schafft eine einzigartige Kristallgitterstruktur, die sie besonders effizient für die Begrenzung oder Verstärkung hochfrequenter Lichtschwingungen macht.\n\nDieser Durchbruch wird sich als großer Segen für unser Reich erweisen."
 # ETREME GEOLOGICAL TENSION
 GEOLOGICAL_TENSION_CAT: "Extremer geologischer Druck"
 geological_tension_desc: "Geologische Untersuchungen von §Y[from.GetName]§! deuten darauf hin, dass die Kruste dieses geschmolzenen Planeten unter enormem Druck steht. Ein bedeutendes geologisches Ereignis könnte unmittelbar bevorstehen."
 extreme_frontiers.290.title: "Verstopfter Supervulkan"
 extreme_frontiers.290.desc: "Nach näherer Untersuchung der extremen seismischen Spannungen auf §Y[from.GetName]§! stellte sich heraus, dass ein riesiger Supervulkan durch den teilweisen Einsturz des Kraters verstopft wurde.\n\nRiesige Mengen Magma füllen alle verfügbaren unterirdischen Kammern und üben einen immensen Aufwärtsdruck auf die Blockade im Hauptschlot aus. Das eingestürzte Material hält das Magma derzeit an Ort und Stelle, doch es ist unmöglich vorherzusagen, wie lange dieses empfindliche Gleichgewicht noch bestehen bleibt.\n\nDas eingeschlossene geschmolzene Gestein ist außergewöhnlich reich an seltenen Metallen und komplexen Mineralverbindungen, und §Y[leader.GetName]§! ist der Ansicht, wir könnten diese Ressourcen sicher abbauen, wenn wir einen kontrollierten Ausbruch herbeiführen."
 extreme_frontiers.290.a: "Macht den Schlot frei."
 extreme_frontiers.290.b: "Wir sollten die geothermische Aktivität nutzen."
 CONTROLLED_ERUPTION_PROJECT: "Kontrollierter Ausbruch"
 CONTROLLED_ERUPTION_PROJECT_DESC: "Ein verstopfter Supervulkan auf §Y[from.GetName]§! lagert unter der Oberfläche riesige Reserven an mineralreichem Magma ein. Durch einen kontrollierten Ausbruch könnten wir diese eingeschlossenen Ressourcen freilegen."
 extreme_frontiers.295.title: "Mega-Eruption"
 extreme_frontiers.295.desc: "Durch das Bohren künstlicher Schächte an verschiedenen Stellen des Supervulkans auf §Y[from.From.GetName]§! schwächten wir dessen Struktur so weit, dass die riesigen Mengen an Magma austreten konnten.\n\nAls der entscheidende Punkt erreicht war, war das Ergebnis spektakulär: Der obere Teil des Vulkans wurde vollständig zerstört, als die unter hohem Druck stehende geschmolzene Gesteinsmasse explodierte und austrat.\n\nWir leiteten die Lava in sorgfältig vorbereitete Kanäle, wo sie sich nun mit speziellen Bergbaumaschinen abbauen lässt."
 extreme_frontiers.295.a.default: "Spektakulär."
 extreme_frontiers.295.a.machine: "Einsatz erfolgreich."
 # LAYERED ATMOSPHERE
 LAYERED_ATMOSPHERE_CAT: "Ausbruch eines Giganten"
 layered_atmosphere_desc: "Erste Scans von §Y[from.GetName]§! stellten vereinzelte Ausbrüche brennbarer Gase auf dem gesamten Planeten fest, was die Erkundung aus der Ferne schwierig macht.\n\nEine nähere Untersuchung wird notwendig sein."
 extreme_frontiers.300.title: "Geschichtete Atmosphäre"
 extreme_frontiers.300.desc: "§Y[leader.GetName]§! fand den Ursprung der heftigen Eruptionen auf §Y[from.GetName]§!.\n\nDie einzigartige Atmosphäre des Gasriesen sorgte dafür, dass sich zwischen der gasförmigen Mesosphäre und der Stratosphäre eine Schicht aus flüssigem metallischem Wasserstoff bildete. Die dichtere Zusammensetzung des Methangases in der unteren Schicht hält die Flüssigkeit darüber fest.\n\nIm Lauf der Zeit lud sich der metallische Wasserstoff elektrisch auf und wurde durch die Entladung der Schicht darunter in Bewegung versetzt. Erreicht der Druck nun einen kritischen Wert, kommt es zu einer Eruption der hochleitfähigen Flüssigkeit in die obere Atmosphäre, was sie über dem gesamten Planeten verteilt, bevor sie sich wieder absetzt.\n\nUnsere Systeme können diese Druckschwankungen problemlos nachverfolgen, was es uns erlaubt, diese wertvollen Ressourcen zu nutzen."
 # SOLIDIFIED PLASMA TRAILS
 PLASMA_TRAILS_CAT: "Unregelmäßige Energieschübe"
 plasma_trails_desc: "Entlang der tektonischen Verwerfungslinien §Y[from.GetName]§! wurden unregelmäßige Energieschübe gemessen.\n\nDie Quelle der Energie ist vom Orbit aus nicht auszumachen. Eine nähere Untersuchung wird nötig sein, um den Ursprung dieses Phänomens zu finden."
 extreme_frontiers.310.title: "Spuren von verfestigtem Plasma"
 extreme_frontiers.310.desc: "Eine geologische Analyse von §Y[from.GetName]§! deckte den Ursprung der unregelmäßigen Energieschübe auf, die man ursprünglich vom Orbit aus registrierte.\n\nDie sprunghafte tektonische Aktivität des Planeten führt in Regionen mit instabiler gefrorener Tundra zu heftigen elektrostatischen Entladungen.\n\nDiese \"vulkanischen Blitze\" schießen in den Himmel und verwandeln die umgebende Luft in Plasma. Die dabei freigesetzte extreme Hitze erzeugt einen thermischen Schock, der sich in den blitzförmigen Strukturen verfestigt.\n\nAnhand der Erkenntnisse, die wir aus der geologischen Analyse gewannen, sollten wir in der Lage sein, diese seismischen Eruptionen vorherzusagen, und können dieses Phänomen eventuell sogar für unsere eigenen Zwecke nutzen."
 # CRYSTALLINE PLAINS
 CRYSTALLINE_PLAINS_CAT: "Kryovulkanische Aktivität"
 crystalline_plains_desc: "Eine tektonische Analyse von §Y[from.GetName]§! stellte eine beachtliche kryovulkanische Aktivität anormalen Ursprungs auf dem gesamten Planeten fest."
 extreme_frontiers.320.title: "Kristallebenen"
 extreme_frontiers.320.desc: "Eine genauere geologische Analyse von §Y[from.GetName]§! deckte auf, dass unter der gefrorenen Kruste Flüsse aus halb gefrorenem Ammoniak fließen. Der zunehmende geothermische Druck sorgt dafür, dass die Substanz durch Risse in der spröden Eisdecke an die Oberfläche sprudelt.\n\nDiese \"Ausbrüche\" verteilen eine explosive Mischung aus gefährlichen Dämpfen und Ammoniakschlamm über die gesamte Oberfläche des Planeten. Der Schlamm gefriert, sobald er den extremen Oberflächentemperaturen ausgesetzt ist und bildet weitläufige Ebenen voller wertvoller Kristalle, die leicht abzubauen sind."
 # SUPERMASSIVE GIANT
 SUPERMASSIVE_GIANT_CAT: "Supermassereicher Gigant"
 supermassive_giant_desc: "§Y[from.GetName]§! ist ein supermassereicher Gasgigant, dessen starkes Gravitationsfeld Tausende von Objekten angezogen hat. Eine Katalogisierung könnte sich als lohnenswert erweisen."
 extreme_frontiers.330.title: "Weltraummüll"
 extreme_frontiers.330.desc: "In der Umlaufbahn von §Y[from.GetName]§! sind eine Vielzahl an Minimonden, Asteroiden und Weltraumschrott gefangen. Eine radiometrische Datierung deutet darauf hin, dass all diese Objekte vor Tausenden von Jahren beim Durchqueren des Systems von der Schwerkraft des Planeten eingefangen wurden.\n\nBei ihrer Katalogisierung fanden wir auch ein paar alte, aber sehr einfach gebaute Vermessungssonden, die auf eine Zivilisation verweisen, die ihre ersten Schritte in den Weltraum unternahm.\n\nDer Großteil der Daten lässt sich bedauerlicherweise nicht mehr auslesen oder aber wurde physisch durch eine Kollision mit anderen Objekten beschädigt. Ein paar der noch lesbaren Dateien zeigen jedoch Bilder von der Oberfläche von [from.GetName] von vor ein paar Jahrhunderten."
 extreme_frontiers.330.a: "Ein faszinierender Fund."
 extreme_frontiers.330.b: "Verschrottet sie und nutzt die Materialien."
 # INVISIBLE PLANET
 INVISIBLE_PLANET_CAT: "Unregelmäßige Umlaufbahn"
 invisible_planet_desc: "In der Umlaufbahn von §Y[from.GetName]§! wurde eine kleine, aber wiederkehrende Abweichung festgestellt, die darauf hindeutet, dass §Y[from.GetName]§! regelmäßig einer großen Gravitationskraft ausgesetzt ist.\n\nEs wird empfohlen, den umliegenden Weltraum genauer zu untersuchen."
 extreme_frontiers.340.title: "Unsichtbarer Planet"
 extreme_frontiers.340.desc: "Bei der näheren Untersuchung des §Y[from.solar_system.GetName]§!-Systems wurde festgestellt, dass die Umlaufbahn aller Planeten im System ähnliche Unregelmäßigkeiten aufweisen.\n\nNachdem wir die nötige Gravitation für diese ungewöhnlichen Bewegungen trianguliert hatten, entdeckten wir die Ursache: einen bisher unbekannten Planeten, den wir jetzt §Y[invisible_planet.GetName]§! nennen.\n\nDie einzigartige Oberfläche dieser Welt besteht aus tiefschwarzen Kohlenstoffpartikeln, die weder Licht noch Radiowellen reflektieren, was den Planeten für Langstreckenscanner praktisch unsichtbar macht.\n\nDiese natürlichen Polymere haben bemerkenswerte Absorptionseigenschaften."
 extreme_frontiers.340.desc.default: "$extreme_frontiers.340.desc$ Das Material bietet einzigartige Forschungsmöglichkeiten."
 extreme_frontiers.340.desc.first_contact: "$extreme_frontiers.340.desc$ Wir werden die Oberfläche abbauen und auf eine mögliche Verwendung als Tarnmaterial prüfen."
 # SURVIVAL POD
 SURVIVAL_POD_WARM_CAT: "Umfunktionierte Feldstation"
 SURVIVAL_POD_COLD_CAT: "Umfunktionierte Feldstation"
 survival_pod_desc: "Bei der Untersuchung der kargen Oberfläche von §Y[from.GetName]§! wurde eine umfunktionierte Feldstation entdeckt, die ursprünglich als provisorisches Forschungslabor gedient hatte. Die Lebensdauer ist jedoch längst überschritten. Die schwache Wärmestrahlung deutet allerdings darauf hin, dass Teile der Anlage noch aktiv sind."
 extreme_frontiers.350.title: "Einziger Überlebender"
 extreme_frontiers.350.desc: "Bei einer Oberflächenexpedition auf §Y[from.GetName]§! fand man eine umfunktionierte Feldstation und deren einzige Bewohnerin.\n\nSie bezeichnete sich selbst als gestrandete Wissenschaftlerin, die bereits seit vielen Jahren auf dieser rauen Welt lebt, und bietet [root.Owner.GetName] ihr Wissen im Austausch gegen ihre Rettung an."
 extreme_frontiers.350.a: "Ihre Erfahrung wird eine große Hilfe sein."
 extreme_frontiers.350.b: "Schenkt ihr ein kleines Schiff und einige Vorräte."
 extreme_frontiers.350.c: "Unternehmt nichts und beobachtet sie."
 extreme_frontiers.350.d: "Bezaubernd. Zerstört ihre Zuflucht."
 extreme_frontiers.352.title: "$NAME_survivalist_scru$"
 extreme_frontiers.352.desc: "Ein ausgemagerter [scru_species.GetClass] tritt aus der zur Unterkunft umgebauten Feldstation heraus. Als die Person über die Torturen spricht, die sie auf §Y[from.From.GetName]§! durchmachen musste, kommen die Worte nur stockend und abgehackt.\n\n\"Vergebt mir. Ich habe ... viele Jahre lang kein einziges Wort gesprochen ...\""
 extreme_frontiers.352.a: "Wie seid Ihr hier gestrandet?"
 extreme_frontiers.352.a.response: "Ich erkundete [from.From.GetName] und katalogisierte das einzigartige Grundgestein. Meine Besatzung meinte, sie würde mit unserem Erkundungsraumschiff nur rasch etwas überprüfen. Ich glaubte ihr. Erst nach einigen Tagen wurde mir klar, was wirklich geschehen war: Sie war nach Hause geflogen."
 extreme_frontiers.352.b: "Wie habt Ihr hier so lange überlebt?"
 extreme_frontiers.352.b.response: "Oh, es ist erstaunlich, was man alles erreichen kann, wenn man die Zellpermeabilität verändert und mit Hitzeschockproteinen experimentiert ... Danach war es einfach, eine Form der Makroautophagie in meinen veränderten Zellen zu induzieren, und dank des Natriumgehalts dieser Welt konnte ich viele schmackhafte Mahlzeiten zubereiten."
 extreme_frontiers.352.c: "Möchtet Ihr nicht zu Euresgleichen zurückkehren?"
 extreme_frontiers.352.c.response: "Sie verdienen die Durchbrüche nicht, die ich auf diesem Felsen gemacht habe. Es interessiert mich nicht, aus welchen Gründen sie mich hier zurückließen."
 extreme_frontiers.352.d: "Was könnt Ihr für uns tun?"
 extreme_frontiers.352.d.response: "Ich bin es leid, in einem provisorischen Labor zu arbeiten. Ich möchte neue Welten sehen ... Vom Weltraum aus."
 extreme_frontiers.352.e: "Stellen wir $NAME_survivalist_scru$ in unsere Dienste"
 extreme_frontiers.352.e.custom_tooltip: "§Y$NAME_survivalist_scru$§! tritt unserem Reich als §HAnführer§! bei"
 NAME_survivalist_scru: "Scru"
 survivalist_scru_desc: "Eine talentierte Wissenschaftlerin, die gelernt hat, selbst in den rauesten Umgebungen zu überleben."
 leader_trait_hardened_survivalist: "Abgehärtete Überlebensexpertin"
 leader_trait_hardened_survivalist_desc: "Dieser Anführer verfügt über beispielloses Wissen, selbst in den unwirtlichsten Umgebungen überleben zu können."
 # Infernal Tornadoes
 INFERNAL_TORNADOES_CAT: "Extreme Temperaturen"
 infernal_tornadoes_desc: "Erste Scans von §H[from.GetName]§! zeigen weitläufige Gebiete, die von starken Stürmen heimgesucht werden.\n\nDiese Stürme weisen extreme Wärmesignaturen auf. Wir werden gezielte Forschung betreiben müssen, um herauszufinden, ob sie natürlich entstanden oder aber auf eine bislang unbekannte Lebensform zurückzuführen sind."
 extreme_frontiers.360.title: "Feuertornados"
 extreme_frontiers.360.desc: "Die Quelle der extremen Hitzesignaturen auf §H[from.GetName]§! wurde gefunden!\n\nGeysire, die über die ganze Welt verteilt sind, stoßen hochentzündliches Wasserstoffgas aus. Brechen diese Geysire aus, entzündet die Hitze des Planeten das Gas, wodurch riesige Flammensäulen in den Himmel schießen.\n\nIn Kombination mit dem atmosphärischen Druck entstehen dadurch extreme Luftströmungen, die Feuersstürme in Form von gewaltigen Feuertornados über die Landschaft fegen lassen.\n\nAuch wenn es sich dabei um ein verheerendes Naturereignis handelt, sind sich unsere [Root.Owner.GetResearcherPlural] sicher, dass diese Tornados und die enormen Mengen an kinetischer Energie, die sie erzeugen, für andere praktische Anwendungsfälle nachgebildet werden könnten."
 INFERNAL_CATALYSTS_PROJECT: "Infernale Katalysatoren"
 INFERNAL_CATALYSTS_PROJECT_DESC: "Wir untersuchten die Bedingungen, unter denen die Flammentornados auf §H[from.GetName]§! entstehen, näher und fanden heraus, dass wir die Vorteile dieses Phänomens in einer kontrolierten Umgebung nutzen können."
 extreme_frontiers.365.title: "Pyroklastische Resonatoren"
 extreme_frontiers.365.desc: "§Y[from.Leader.GetName]§! fand einen Weg, um die auf §Y[From.From.GetName]§! entdeckten Flammentornados in einer kontrollierten Umgebung zu nutzen.\n\nMit diesem Durchbruch sind wir in der Lage, die Energieproduktion einer jeden geschmolzenen Welt zu steigern, die sich im selben System wie unsere Sternenbasis befindet."
 extreme_frontiers.365.desc.has_furnace: "Die führenden wissenschaftlichen Theorien weisen viele Parallelen zu unserem derzeitigen Verständnis von §HLichtbogenöfen§! auf, was uns neue Anwendungsmöglichkeiten für außerweltliche Bauvorhaben eröffnet."
 extreme_frontiers.365.desc.default: "Die führenden wissenschaftlichen Theorien hinter dieser Entdeckung weisen zahlreiche Anwendungsmöglichkeiten für die Entwicklung von §HLichtbogenöfen§! auf, und unsere [Root.Owner.GetEngineerPlural] sind bereit, die Theorien in die Praxis umzusetzen."
 tech_pyroclastic_resonation: "Pyroklastische Resonanz"
 tech_pyroclastic_resonation_desc: "Indem wir die extreme thermische Energie nutzen, die auf geschmolzenen Welten zu finden ist, steigern unsere Sternenbasen die Energieproduktion in einem System außerordentlich effizient."
 sm_pyroclastic_resonator: "Pyroklastische Resonatoren"
 sm_pyroclastic_resonator_desc: "Thermische Resonatoren, die die Energieerzeugung jeder geschmolzenen Welt in einem Sternsystem steigern können.\nDie $i_energy$-Produktion skaliert mit der Anzahl an ['concept_pc_molten', Geschmolzenen Welten] im System."
 # MAGMA MEGAFAUNA
 MAGMA_MEGAFAUNA_CAT: "Instabile Geografie"
 magma_megafauna_desc: "Scans von §Y[from.GetName]§! zeigen Teile der geschmolzenen Planetenoberfläche, die sich kontinuierlich über große Entfernungen hinweg verschieben.\n\nUm dieses ungewöhnliche geologische Phänomen zu verstehen, sind weitere Untersuchungen erforderlich."
 extreme_frontiers.370.title: "Geschmolzene Megafauna"
 extreme_frontiers.370.desc: "Die anomalen tektonischen Scans auf §Y[from.GetName]§! weisen auf eine große Herde von Megafauna hin, die durch das Land zieht.\n\nDiese riesigen Kreaturen wandern über große Entfernungen und tauchen regelmäßig in die Lavaseen des Planeten ein, um ihre bevorzugte Nahrung zu sammeln: ein felsiges Sediment, das reich an §HFlüchtigen Teilchen§! ist. Durch die Verfolgung ihrer Wanderungsmuster werden wir in der Lage sein, diese Sedimente für unsere eigenen Bedürfnisse zu gewinnen, ohne das Ökosystem des Planeten nennenswert zu beeinträchtigen.\n\nDa ihre dicken Außenpanzer in der Lage sind, extremen Temperaturen standzuhalten, könnte auch eine eingehendere Untersuchung der Megafauna faszinierende Ergebnisse liefern."
 LAVA_DIVERS_PROJECT: "Lavataucher"
 LAVA_DIVERS_PROJECT_DESC: "Die Megafauna auf §Y[from.GetName]§! ist in der Lage, den rauen Bedingungen der geschmolzenen Welt standzuhalten, und kann tief unter die Oberfläche der zahlreichen Magmaseen eintauchen.\n\nIndem wir die hitzebeständigen Panzer dieser Kreaturen untersuchen, können auch wir lernen, mit extremer Hitze umzugehen."
 extreme_frontiers.375.title: "Magmageschmiedete Panzerung"
 extreme_frontiers.375.desc: "Eine umfassende Studie über die einzigartige Megafauna auf §Y[from.From.GetName]§! lieferte uns thermodynamische Erkenntnisse, die wir auf unsere Werften übertragen können.\n\nDie mit Flüchtigen Teilchen angereicherte Ernährung der Kreaturen führt dazu, dass sich in ihren widerstandsfähigen Außenhüllen eine schwere silikatbasierte Struktur bildet, die durch natürlich vorkommende feuerfeste Materialien verstärkt wird.\n\nNachdem wir zahlreiche Proben ihrer abgestreiften äußeren Hülle gesammelt hatten, sind unsere [Root.Owner.GetEngineerPlural] nun in der Lage, die biomechanische Funktionsweise bei der Entwicklung unserer eigenen Rumpfpanzerungen nachzubilden."
 # PLANET THRUSTERS
 PLANET_THRUSTERS_CAT: "Ausgemusterte Ausrüstung"
 planet_thrusters_desc: "In der oberen Atmosphäre von §Y[from.GetName]§! befindet sich eine Reihe großer zylindrischer Maschinen. Sie scheinen inaktiv und unbemannt zu sein."
 extreme_frontiers.380.title: "Planetare Triebwerke"
 extreme_frontiers.380.desc: "Jede der auf §Y[from.GetName]§! gefundenen Maschinen ist eine eigenständige Triebwerkskomponente. Insgesamt befinden sich über tausend davon in der oberen Atmosphäre.\n\nDiese komplexen Fusionsvorrichtungen bestehen aus speziellen Materialien und sind dafür ausgelegt, Wasserstoffgas vom Planeten unter ihnen aufzunehmen, um diesen als Brennstoff für die Erzeugung erheblicher Schubkräfte zu nutzen. Die meisten von ihnen weisen Anzeichen von Überlastungsschäden auf.\n\nStudien zeigen, dass alle Maschinen so positioniert sind, dass dieser Schub eine Kraft auf den Planeten selbst ausüben würde, was darauf hindeutet, dass man sie ursprünglich einsetzte, um die Umlaufbahn des Planeten zu verändern.\n\nObwohl sie für eine Aufgabe dieser Größenordnung nicht mehr geeignet sind, könnten wir die weniger beschädigten Modelle möglicherweise umfunktionieren, um die gasförmigen Schichten des Planeten wegzubrennen und seinen mineralreichen Kern freizulegen."
 extreme_frontiers.380.a: "Verschrottet sie alle."
 extreme_frontiers.380.b: "Funktionieren wir diese Maschinen um."
 REPURPOSE_THRUSTERS_PROJECT: "Umfunktionierte Planetentriebwerke"
 REPURPOSE_THRUSTERS_PROJECT_DESC: "Indem wir die beschädigten Planetentriebwerke auf §Y[from.GetName]§! umfunktionieren, können wir den Wasserstoff des Gasriesen verbrennen, um den festen Kern freizulegen."
 extreme_frontiers.385.title: "Von Gasen befreit"
 extreme_frontiers.385.desc: "Wir konnten einige der auf §Y[from.From.GetName]§! gefundenen Planetentriebwerke reparieren und sie so kalibrieren, dass sie gleiche Kräfte in entgegengesetzte Richtungen ausüben.\n\nAls wir die leistungsstarken Fusionstriebwerke aktivierten, saugten sie mit exponentiell schneller werdenden Geschwindigkeit Wasserstoff an, verbrannten die gasförmige Atmosphäre des Planeten und legten seinen mineralreichen Kern frei, wenn auch unter extrem hohen Temperaturen."
 extreme_frontiers.385.tt: "§Y$chthonian_planet$§! hinzugefügt"
 extreme_frontiers.385.a: "Beeindruckend."
 # BACKWARDS ORBIT
 BACKWARDS_ORBIT_CAT: "Rückwärtsgerichtete Umlaufbahn"
 backwards_orbit_desc: "§Y[from.GetName]§! umkreist den Stern im Vergleich zu den anderen Planeten im System in umgekehrter Richtung, was darauf hindeutet, dass sich die Welt nicht zur selben Zeit wie die anderen Himmelskörper gebildet haben kann.\n\nWeitere Untersuchungen sind erforderlich, um zu verstehen, wie genau der Planet entstand."
 extreme_frontiers.390.title: "Wandernder Planet"
 extreme_frontiers.390.desc: "Die Beschaffenheit von §Y[from.GetName]§! entspricht nicht der, die andere Planeten im selben System haben. §Y[from.GetName]§! steht jedoch in perfekter Ausrichtung zu den Himmelskörpern im §Y[event_target:wandering_planet_origin.GetName]§!-System, was auf seinen wahren Ursprung hindeuten könnte.\n\nDie Oberfläche des Planeten ist von einem besonders großen Einschlagkrater geprägt, was uns zu der Annahme veranlasst, dass der Planet durch eine massive Asteroidenkollision aus seiner ursprünglichen Umlaufbahn geschleudert wurde. Dieser frei umherfliegende Vagabundenplanet wurde dann vom Gravitationsfeld von [from.System.Star.GetName] angezogen, wo er seine ungewöhnliche rückwärtsgerichtete Umlaufbahn einnahm.\n\nDa dieser bemerkenswerte Planet seit seiner Entstehung in zwei verschiedenen Systemen existierte, bietet er reichhaltige Möglichkeiten für weitere Untersuchungen."
 # VAPOR PLUMES
 VAPOR_PLUMES_CAT: "Dampfwolken"
 vapor_plumes_desc: "Auf §Y[from.GetName]§! wurden Tausende von anormalen Dampfwolken beobachtet, die bis in die dünne obere Atmosphäre aufgestiegen sind.\n\nEs wird empfohlen, dieses Phänomen genauer zu untersuchen."
 extreme_frontiers.400.title: "Kryovulkanische Geysire"
 extreme_frontiers.400.desc: "Die Dampfwolken auf §Y[from.GetName]§! werden durch eine intensive kryovulkanische Aktivität tief im unteren Mantel erzeugt, wenn riesige Säulen aus Stickstoff- und Ammoniakgas nach oben ausgestoßen werden.\n\nDie Dampfwolken steigen senkrecht auf, bis sie die Grenzen der planetaren Atmosphäre erreichen, wo Sonnenwinde sie abrupt abflachen.\n\nIndem wir die chemische Zusammensetzung dieser einzigartigen Dämpfe untersuchen, erfahren wir eventuell mehr über die komplexen geologischen Prozesse im Kern."
 # FIBROUS ATMOSPHERE
 FIBROUS_ATMOSPHERE_CAT: "Beschädigte Erkundungsaufzeichnungen"
 fibrous_atmosphere_desc: "Erste Scans von §Y[from.GetName]§! kamen in beschädigtem Zustand zu uns zurück. Die Ursache dieser Störung ist völlig unklar und eine genauere Untersuchung erforderlich."
 extreme_frontiers.410.title: "Faserige Atmosphäre"
 extreme_frontiers.410.desc: "Eine genauere Untersuchung von §Y[from.GetName]§! deckte die Ursache für die Datenbeschädigung in unseren Scans auf.\n\nDie obere Atmosphäre des Planeten setzt sich aus dichten Wolken faseriger Mineralien zusammen. Diese langen, gewundenen Stränge stammen aus den unteren Schichten des Gasriesen, wo sie durch den hohen Druck zu hochleitfähigen Mineralwolken geformt wurden.\n\nWährend der Rotation sammeln diese Fasern in der Atmosphäre elektrostatische Energie und entladen sich im Lauf der Zeit regelmäßig. Es sollte leicht sein, diese Ressourcen für unsere eigenen Bedürfnisse abzubauen."
 # EXPLODING SKIES
 EXPLODING_SKIES_CAT: "Intensive Hitzespitzen"
 exploding_skies_desc: "Erste Scans von §Y[from.GetName]§! zeigen extreme meteorologische Phänomene mit sporadischen, aber intensiven Hitzespitzen, die über die gesamte Oberfläche verteilt sind.\n\nWeitere Untersuchungen werden empfohlen."
 extreme_frontiers.420.title: "Explosiver Horizont"
 extreme_frontiers.420.desc: "Eine genauere Untersuchung von §Y[from.GetName]§! deckte die Ursache für die meteorologischen Hitzespitzen auf.\n\nGeothermische Schlote und Geysire an der Oberfläche stoßen hochentzündliche Gase aus, die sich in der Atmosphäre ansammeln. Elektrostatische Entladungen wirken anschließend als Zündkatalysator und verursachen explosive Wetterfronten.\n\nUnsere [Root.Owner.GetEngineerPlural] gewannen durch diese Reaktionen neue Erkenntnisse zur thermodynamischen Verbrennung sowie Anwendungsmöglichkeiten für die Antriebssysteme unserer eigenen Flotte."
 extreme_frontiers.420.desc.traumatized: "Die mit dieser Forschung verbundenen Risiken haben [leader.GetName] schwer traumatisiert."
 extreme_frontiers.420.desc.maimed: "Durch die mit dieser Forschung verbundenen Risiken wurde [leader.GetName] physisch schwer verletzt."
 # CHTHONIAN PRESERVATION
 CHTHONIAN_PRESERVATION_CAT: "Chthonische Biomasse"
 chthonian_preservation_desc: "Bei §Y[from.GetName]§! handelt es sich um einen chthonischen Planeten, einen ehemaligen Gasriesen, der aufgrund der intensiven Strahlung von §Y[from.System.Star.GetName]§! seiner Atmosphäre beraubt wurde.\n\nAuf der Oberfläche wurden trotz alledem sehr schwache Spuren von Biomasse entdeckt, die weitere Untersuchungen rechtfertigen."
 extreme_frontiers.430.title: "Chthonische Aufbewahrung"
 extreme_frontiers.430.desc: "Bei der auf §Y[from.GetName]§! gefundenen Biomasse handelt es sich um die versteinerten Überreste einer Gruppe von Tiyanki.\n\nWahrscheinlich befanden sie sich im Inneren des Gasriesen, als dessen Atmosphäre sich an einem entscheidenden Punkt ihrer Auflösung befand, woraufhin ihre Körper von geschmolzenem Metall umhüllt wurden.\n\nDa nur noch eine geringe Menge biologischer Materie im Inneren verblieben ist, gehen wir davon aus, dass die anhaltende chthonischen Sternstrahlung den Großteil ihrer Körper in eine einzigartige biomimetische Legierung verwandelte.\n\n§Y[leader.GetName]§! ist der Ansicht, eine Untersuchung dieser seltenen Fossilien könnte neue Wege zur Herstellung von Legierungen aus biologischen Quellen offenbaren."
 CHTHONIAN_PETRIFICATION_PROJECT: "Chthonische Versteinerung"
 CHTHONIAN_PETRIFICATION_PROJECT_DESC: "Durch die Untersuchung der versteinerten Tiyanki-Überreste auf §Y[from.GetName]§! erhoffen sich unsere [Root.Owner.GetScientistPlural], die Auswirkungen der Strahlung auf biologische Materie zu verstehen und so möglicherweise neue Wege für die Herstellung fortschrittlicher Legierungen zu finden."
 extreme_frontiers.435.title: "Biologisch hergestellte Legierung"
 extreme_frontiers.435.desc: "Nach der sorgfältigen Untersuchung der versteinerten Tiyanki-Überreste auf §Y[from.From.GetName]§! entwickelten wir erfolgreich ein neues Verfahren zur Herstellung von Legierungen, das eine langfristige Bestrahlung auf chthonischer Ebene vorsieht.\n\nDieser Durchbruch erlaubt es uns, biologisches Material als primären Rohstoff zu verwenden, und er erzielt Ergebnisse, die mit herkömmlichen Methoden konkurrieren können."
 tech_alloy_fossilization: "Legierungsfossilisierung"
 tech_alloy_fossilization_desc: "Durch die Bestrahlung von biologischem Material auf chthonischer Ebene können wir Zellstrukturen so versteinern, dass sie als Legierung nutzbar sind."
 tech_alloy_fossilization_tt: "§HNeues Gebäude§!: ['building:building_bio_furnace']"
 building_bio_furnace: "Bio-Schmelzofen"
 building_bio_furnace_desc: "Durch signifikante Mengen an Sternstrahlung ist diese Anlage in der Lage, biologisches Material in Legierungen umzuwandeln."
 # ORBITAL RESONANCE
 ORBITAL_RESONANCE_CAT: "Perfektes Verhältnis"
 orbital_resonance_desc: "Die Umlaufzeiten im §Y[from.System.GetName]§!-System zeigen ein bemerkenswertes Muster. Jeder Planet umkreist den Stern in exakt der doppelten Zeit als sein jeweiliger Nachbar und weist dabei nur eine Abweichung von weniger als einer Tausendstelsekunde auf.\n\nDieses ungewöhnlich perfekte Verhältnis rechtfertigt eine genauere Untersuchung."
 extreme_frontiers.440.title: "Orbitalresonanz"
 extreme_frontiers.440.desc: "Das §Y[from.System.GetName]§!-System ist das perfekteste Beispiel für eine Orbitalresonanz, das wir je gesehen haben.\n\nJeder Planet übt eine periodische Gravitationskraft auf seinen Nachbarn aus, wenn sie sich in der kürzesten Entfernung zueinander befinden, und schafft so eine Art Katapulteffekt sowie eine gegenseitige Impulsabhängigkeit. Die ungewöhnlich hohe Stabilität dieser Wechselwirkungen führt zu den koordinierten Umlaufbahnen.\n\nDas System bietet eine hervorragende Möglichkeit, die Beschleunigung vorbeifliegender Objekte durch die Schwerkraft eines Planeten zu untersuchen, was möglicherweise Anwendungsbereiche für die Manövrierfähigkeit von Schiffen haben könnte."
 GRAVITY_ASSIST_PROJECT: "Gravitationsunterstützte Studien"
 GRAVITY_ASSIST_PROJECT_DESC: "Indem wir den perfekten Orbitalresonanzeffekt auf §Y[from.GetName]§! genauer untersuchen, verbessern wir unser Verständnis von planetaren Vorbeischwungmanövern für Schiffe."
 extreme_frontiers.445.title: "Fortschritte bei Vorbeischwungmanövern"
 extreme_frontiers.445.desc: "Durch die gründliche Erforschung des einzigartigen Orbitalresonanzeffekts im §Y[from.From.System.GetName]§!-System konnten wir unsere Methoden zur Berechnung optimaler Flugbahnen für Schiffe erheblich verbessern.\n\nUnsere neuen Modelle werden es uns erlauben, die Schwerkraft eines Planeten zu nutzen, um Schiffe in Unterlichtgeschwindigkeit zu beschleunigen oder abzubremsen."
 tech_orbital_maneuvers: "Fortschrittliche Orbitalmanöver"
 tech_orbital_maneuvers_desc: "Reisen in Unterlichtgeschwindigkeit können durch komplexe Berechnungen, die die Gravitationsfelder von Planeten optimal nutzen, weiter optimiert werden."
 #############
 # Arc Sites #
 #############
 # ABSOLUTE ZERO
 site_absolute_zero: "Absoluter Nullpunkt"
 site_absolute_zero_desc: "Topografische Scans von §Y[from.Planet.GetName]§! registrierten extreme Temperaturen, die sich dem absoluten Nullpunkt nähern und in einer bestimmten unterirdischen Region angesiedelt sind.\n\nEine genauere Untersuchung des Inneren sollte hoffentlich weitere Antworten liefern."
 extreme_frontiers.1000.title: "Gefrorene Blockade"
 extreme_frontiers.1000.desc: "Bei der Suche nach der Ursache für die extrem niedrigen Temperaturen auf §Y[from.Planet.GetName]§! entdeckte §Y[leader.GetName]§! den Eingang zu einer alten unterirdischen Anlage.\n\nDer Eingang wird von gefrorenen Gesteinsbrocken und dicken Eisschichten versperrt, die das Bauwerk wahrscheinlich seit Jahrtausenden unzugänglich machen.\n\nIm Eingangsbereich weicht aus verschiedenen Spalten in der Blockade Kohlenstoffdioxid aus, was auf einen riesigen Komplex im Inneren hinweist. [leader.GetName] ist zuversichtlich, dass die Ursache für die extreme Kälte dort drin zu finden ist."
 extreme_frontiers.1000.a: "Versucht, die Blockade zu durchbrechen."
 extreme_frontiers.1005.title: "Gefroren in der Zeit"
 extreme_frontiers.1005.desc: "§Y[leader.GetName]§! schaffte es, das Eis zu durchbrechen, das den Eingang des alten Bauwerks auf §Y[from.Planet.GetName]§! blockierte.\n\nIm Inneren befanden sich Dutzende gefrorener Leichen einer unbekannten Reptilienspezies. Ihre verkrümmten Körper sind an den Wänden festgefroren, und Kratzspuren zeugen von einem verzweifelten Fluchtversuch.\n\nDie Quelle der Kohlenstoffdioxidwolken, die am Eingang ausgeströmt sind, muss tiefer unter der Erde liegen. Eine Wendeltreppe scheint weiter in den Komplex hinunterzuführen."
 extreme_frontiers.1010.title: "Eisiges Grab"
 extreme_frontiers.1010.desc: "Tiefer unten im gefrorenen Komplex entdeckte §Y[leader.GetName]§! eine große zentrale Kammer, die mit primitiven, aber theoretisch funktionsfähigen Kryokapseln gefüllt ist.\n\nDie extreme Kälte übersteigt jedoch bei Weitem die für diese Geräte vorgesehenen Temperaturbereiche. Die Bewohner der Kapseln sind bereits vor Tausenden von Jahren gestorben.\n\nDie wenigen Kapseln, die nicht von Eis und Schnee überzogen wurden, stehen auf beschrifteten Sockeln, die offenbar den gesellschaftlichen Titel und den Rang der darin befindlichen Individuen angeben. Jene mit höherem Rang befinden sich näher an einer großen zentralen Kapsel, die selbst tief in Schnee und Eis vergraben ist."
 extreme_frontiers.1010.a: "Untersucht die zentrale Kapsel."
 extreme_frontiers.1015.title: "Eingefrorener Monarch"
 extreme_frontiers.1015.desc: "§Y[leader.GetName]§! befreite die große zentrale Kapsel, die sich im Herzen des eisigen Grabes auf §Y[from.Planet.GetName]§! befindet, von Schnee und Eis.\n\nIm Inneren befand sich die letzte Ruhestätte des Oberhaupts des alten Königshauses, auf das in den Texten der vorherigen Kammern hingewiesen wurde. Daneben liegen Dutzende Gefolgsleute, deren Kryokapseln in zeremonieller Weise die Wände schmücken.\n\nDer technologisch fortschrittlichere Sarkophag des verstorbenen Herrschers ist über ein labyrinthartiges Netzwerk aus Rohren und Schaltkreisen mit einer uralten Maschine verbunden, die selbst von einer dicken Eisschicht umgeben ist. Die Temperatur ist selbst für unsere Analysegeräte gefährlich niedrig.\n\nWas die offensichtliche Fehlfunktion dieser Maschine verursacht hat und in welchem Zusammenhang sie mit dem gefrorenen Kern des Planeten steht, muss noch genauer untersucht werden."
 extreme_frontiers.1015.a: "Was ist hier nur schiefgelaufen?"
 extreme_frontiers.1020.title: "Kryogene Katastrophe"
 extreme_frontiers.1020.desc: "Eine Analyse der zentralen Kammer im eisigen Grab auf §Y[from.Planet.GetName]§! offenbarte schließlich die Ursache der Katastrophe:\n\nDie Maschine, die den Kryoschlaf herbeiführen sollte, nutzte eine Art subthermische Dynamik, die sich die extrem niedrigen Kerntemperaturen des Planeten zunutze machte. Als der Monarch mit einer unheilbaren Krankheit infiziert wurde, hoffte man, das königliche Gefolge wiedererwecken zu können, sobald ein Heilmittel gefunden worden wäre.\n\nObwohl die Theorie stichhaltig war, kam es zu einer endothermen Reaktion, als ein speziell entwickeltes Zirkulationsmedium mit dem Planetenkern in Berührung kam. Die Folge war ein fataler Temperaturabfall, der die gesamte Anlage gefrieren ließ.\n\nWir haben die ursprüngliche Theorie aufgegriffen und verbessert und konnten einen Durchbruch in der Kryotechnologie erzielt, der eigens für den Einsatz auf gefrorenen Welten zugeschnitten ist."
 tech_cryovault: "Bewohner einer gefrorenen Welt"
 tech_cryovault_desc: "Indem wir uns die subthermische Dynamik zunutze machen, die auf gefrorenen Welten zu finden ist, schaffen wir in kälteren Klimazonen angenehmere Lebensbedingungen."
 tech_cryovault_tt: "Neues Gebäude: ['building:building_cryovault']"
 building_cryovault: "Kryogewölbe"
 building_cryovault_desc: "Ein versiegeltes Habitat, das die subthermische Dynamik gefrorener Klimazonen nutzt, um einen kontrollierten und komfortablen Lebensraum zu schaffen."
 # TOXIC MATRIX
 site_toxic_matrix: "Giftige Becken"
 site_toxic_matrix_desc: "Die Oberfläche von §Y[from.Planet.GetName]§! ist fast vollständig von kleinen, runden und mit Flüssigkeit gefüllten Becken bedeckt. Die strukturierte Anordnung lässt darauf schließen, dass es sich um keine natürliche Formation handelt. Wir sollten einen Expeditionstrupp entsenden, um weitere Antworten zu erhalten."
 extreme_frontiers.1100.title: "Gerissene Schleimblase"
 extreme_frontiers.1100.desc: "Ein Großteil der Oberfläche von §Y[from.Planet.GetName]§! besteht aus kugelförmigen Vertiefungen, die in sorgfältigen Reihen angeordnet sind. Diese kleinen, runden Becken sind mit einer zähflüssigen und offenbar giftigen Flüssigkeit gefüllt.\n\nIn einem der Becken wurde eine aufgerissene organische Blase entdeckt, die von einem geleeartigen Schleim überzogen war. Die Membran scheint von innen durchstochen worden zu sein.\n\nOb diese Blase die Ursache für die Flüssigkeit in den Becken ist, muss noch geklärt werden."
 extreme_frontiers.1100.a: "Sucht weiter."
 extreme_frontiers.1105.title: "Giftige Geburtsbecken"
 extreme_frontiers.1105.desc: "Bei einer ersten Analyse der Schleimbecken auf §Y[from.Planet.GetName]§! wurden ungewöhnlich radioaktive Wachstumshormone identifiziert, die üblicherweise mit organischen Schwangerschaftszyklen in Verbindung gebracht werden.\n\nDie Fruchtblasen selbst scheinen mit einer Art hochentwickelter fleischiger Membran ausgekleidet zu sein, die in der Lage ist, die Geschwindigkeit zu regulieren, mit der der Schleim eindringen kann."
 extreme_frontiers.1105.desc.non_toxoid: "Wir glauben, dass wir die Geburtsbecken einer Spezies entdeckt haben, die besonders gut an giftige Umgebungen angepasst ist. Weitere Untersuchungen sollten mehr Antworten liefern."
 extreme_frontiers.1105.desc.toxoid: "Diese Becken weisen eine auffällige Ähnlichkeit mit unseren eigenen Fortpflanzungszyklen auf. Möglicherweise handelt es sich dabei um eine entfernte verwandte Spezies."
 extreme_frontiers.1105.a: "Setzt die Untersuchungen fort."
 extreme_frontiers.1110.title: "Embryonale Überreste"
 extreme_frontiers.1110.desc: "Eine der gerissenen Fruchtblasen, die man in den Schleimbecken auf §Y[from.Planet.GetName]§! fand, enthielt die Überreste einer beinahe vollständig entwickelten Lebensform.\n\nEine mikroskopische Analyse des embryonalen Wesens deutet auf das Vorhandensein eines komplexen Nervensystems hin, dessen neuronale Eigenschaften man üblicherweise mit vernunftbegabtem Leben in Verbindung bringt.\n\nEine letzte Reihe von Becken muss noch untersucht werden."
 extreme_frontiers.1110.a: "Untersucht die letzten Becken."
 extreme_frontiers.1115.title: "Lebenszeichen entdeckt"
 extreme_frontiers.1115.desc.a: "Bei der näheren Untersuchung der übrigen Schleimbecken auf §Y[from.Planet.GetName]§! fand §Y[leader.GetName]§! eine vollständig intakte Fruchtblase, die Lebenszeichen aufwies.\n\nWährend des Extraktionsprozesses riss jedoch die fleischige Membran, woraufhin das Wesen verstarb."
 extreme_frontiers.1115.desc.non_toxoid: "Der kleine Leichnam im Inneren wies ungewöhnliche biologische Merkmale auf, darunter mit radioaktivem Plasma gefüllte Venen sowie Drüsen, die psychoaktive Verbindungen absondern."
 extreme_frontiers.1115.desc.b: "Wir gehen davon aus, dass die gesamte Fruchtblase, einschließlich des darin befindlichen Embryos, in diesem giftigen Schleim entstanden ist. Grund hierfür ist ein spezieller chemischer Katalysator in dem energiereichen Schleim.\n\nWir glauben, wir haben eine aufgegebene alte Brutstätte einer unbekannten Spezies gefunden. Ob dies ein normaler Teil ihres Fortpflanzungszyklus oder eine künstliche Anlage war, werden wir womöglich nie erfahren. Indem wir eine der Proben vor Ort ausbrüten können wir möglicherweise ein lebendes Exemplar heranzüchten."
 extreme_frontiers.1115.desc.toxoid: "Alternativ könnten wir kleine Dosen dieses nährstoffreichen Reifungsschleims als Nahrungsergänzungsmittel in ganz [leader.Owner.GetName] verteilen."
 extreme_frontiers.1115.a: "Katalysiert den Schleim."
 extreme_frontiers.1115.b: "Gewinnt Energie aus diesem Schleim."
 extreme_frontiers.1115.c: "Verteilt ihn als Nahrungsergänzungsmittel."
 TOXIC_SLIME_CATALYZATION_PROJECT: "Katalysierung des giftigen Schleims"
 TOXIC_SLIME_CATALYZATION_PROJECT_DESC: "Indem wir etwas von dem giftigen Geburtsschleim katalysieren, den wir auf [from.Planet.GetName] entdeckten, sind wir vielleicht in der Lage, einen lebenden Organismus hervorzubringen."
 extreme_frontiers.1120.title: "Erfolgreiche Geburt"
 extreme_frontiers.1120.desc: "Wir katalysierten eine Probe des Geburtsschleims auf §Y[from.From.Planet.GetName]§! und schafften es, Duzende von Fruchtblasen hervorzubringen, die jeweils einen Embryo enthielten.\n\nAls die sich schnell entwickelnden Organismen die nötige Reife erreichten, durchbohrten sie von innen heraus die durchsichtigen Membranen ihrer Fruchtblasen mit speziellen Mandibeln und tauchten langsam aus dem zähen Schleim auf, benommen und desorientiert.\n\nSie scheinen fügsam zu sein und auf unsere Anweisungen zu hören."
 extreme_frontiers.1120.a: "[Root.Owner.GetName] wird sicherlich eine Verwendung für sie finden."
 extreme_frontiers.1120.b: "Die [Root.Owner.GetResearcherPlural_lower] von [Root.Owner.GetName] werden sie schon zu nutzen wissen."
 NAME_slimeborn: "Schleimbrut"
 NAME_slimeborn_plural: "Schleimbrut"
 trait_slimeborn: "Schleimbrut"
 trait_slimeborn_desc: "Diese Spezies kann sich dank eines mit Schwangerschaftskatalysatoren angereicherten Schleims rasch vermehren."
 tech_living_test_subjects: "Lebende Testsubjekte"
 tech_living_test_subjects_desc: "Aus Schleim entstandene Lebensformen als willige Testsubjekte zu nutzen, verbessert die Forschungseffizienz erheblich."
 # RUINED REACTORS
 site_ruined_reactors: "Zerstörte Reaktoren"
 site_ruined_reactors_desc: "Die erhöhten Strahlungswerte auf §Y[from.Planet.GetName]§! ließen sich zu einem zerstörten Reaktorkomplex zurückverfolgen. Die Anlage scheint inaktiv zu sein und rechtfertigt eine nähere Untersuchung."
 extreme_frontiers.1200.title: "Uraltes Atomkraftwerk"
 extreme_frontiers.1200.desc: "Bei der Anlage auf §Y[from.Planet.GetName]§! handelt es sich um ein aufgegebenes Atomkraftwerk. Die Halbwertszeit der Strahlung deutet darauf hin, dass hier vor über 10.000 Jahren eine Katastrophe stattgefunden haben muss.\n\nDie Systeme sind offline und die physische Struktur weist starke Beschädigungen auf."
 extreme_frontiers.1200.a: "Geht mit äußerster Vorsicht vor."
 extreme_frontiers.1205.title: "Katastrophale Kernschmelze"
 extreme_frontiers.1205.desc: "Mehrere Reaktoren auf §Y[from.Planet.GetName]§! weisen Anzeichen einer Kernschmelze auf, und zahlreiche Sicherheitsbehälter wurden so stark erhitzt, dass sie zu radioaktiver Schlacke zerlaufen sind.\n\nDieser Bereich der Anlage ist voll verbogenem Metall und zerbrochenen Kühlmittelrohren. Die im Hauptkontrollzentrum gefundenen Daten sind schwer beschädigt, doch zumindest fanden wir heraus, dass der Notabschaltvorgang zwar eingeleitet, aber nie abgeschlossen wurde."
 extreme_frontiers.1205.a: "Bedauerlich."
 extreme_frontiers.1210.title: "Konstruktionsfehler"
 extreme_frontiers.1210.desc: "§Y[leader.GetName]§! entdeckte erhebliche Konstruktionsmängel an dem primitiven Atomkraftwerk auf §Y[from.Planet.GetName]§!.\n\nZum einen wurde trotz unzähliger Reaktoren nur ein kleines Kühlsystem installiert und zum anderen waren nur wenige Systeme der Anlage automatisiert, wodurch eine große Anzahl an Mitarbeitern erforderlich war, um den normalen Betrieb aufrechtzuerhalten. Die Anlage wurde eindeutig von einer Zivilisation gebaut, die die grundlegendsten Prinzipien der Kernenergie noch nicht vollständig beherrschte."
 extreme_frontiers.1210.a: "Unwissenheit kann einen teuer zu stehen kommen."
 extreme_frontiers.1215.title: "Anzeichen einer Evakuierung"
 extreme_frontiers.1215.desc: "Nachdem wir eine Reihe versiegelter Sprengtüren im Reaktorkomplex auf §Y[from.Planet.GetName]§! geöffnet hatten, fanden wir eine Notfall-Evakuierungszone.\n\nDer kleine Hangar verfügt über eine Reihe von Shuttle-Liegeplätzen. Die meisten Buchten sind leer und weisen Spuren von Triebwerksverbrennungen auf, was auf eine schnelle Abreise hindeutet.\n\nIn einer der hinteren Buchten befanden sich die halb geschmolzenen Trümmer eines Shuttles, an dem die Startklammern noch angebracht waren. Wir bargen aus den Trümmern, was wir konnten, doch es gab keine Anzeichen einer Besatzung."
 extreme_frontiers.1215.a: "Sie sind in aller Eile aufgebrochen."
 extreme_frontiers.1220.title: "Urankammer"
 extreme_frontiers.1220.desc: "Als wir durch eine Reihe bleiverkleideter Sicherheitstüren tiefer in die unterirdischen Bereiche der Reaktoranlage auf §Y[from.Planet.GetName]§! vorstießen, nahmen die Strahlungswerte immens zu.\n\nIm Inneren fanden wir eine riesige Kammer vor, in der Tausende stahlummantelter Fässer gelagert wurden. Viele davon waren durch einen Brand beschädigt worden, und es treten instabile Uran- und Plutoniumisotope aus.\n\nDie [leader.Owner.GetPreFTLUpper], die diesen Ort baute, verfügte anscheinend noch nicht über das nötige Wissen, wie man Kernelemente ordnungsgemäß recycelt. Die ausrangierten Isotope enthalten noch immer ein enormes energetisches Potenzial."
 extreme_frontiers.1220.a: "Verschwendet nichts."
 # DESERTED MINING FACILITY
 site_deserted_mining_facility: "Verlassene Bergbaueinrichtung"
 site_deserted_mining_facility_desc: "Erste Bilder aus dem Orbit von §Y[from.Planet.GetName]§! zeigen eine verfallene Bergbauanlage, an der rudimentäre Raumfrachtschiffe ankern.\n\nUnser Kurzwellenkommunikationssystem empfängt zudem ein sehr schwaches Notsignal, das von tief unter der Oberfläche des Planeten stammt. Eine genauere Untersuchung des Ortes wird uns hoffentlich Antworten liefern."
 extreme_frontiers.1300.title: "Versiegelter Eingang"
 extreme_frontiers.1300.desc: "Bei der genaueren Untersuchung des verlassenen Bergbaukomplexes auf der Oberfläche von §Y[from.Planet.GetName]§! fand §Y[leader.GetName]§! einen versiegelten Eingang, der in einen der intakteren Schächte führte. Das Innere war mit Bildern und Texten geschmückt. Bedauerlicherweise haben wir keinerlei Aufzeichnungen dieser Sprache.\n\nNachdem §Y[leader.GetName]§! die lokale Stromversorgung eines Zugangsterminals wiederhergestellt hatte, begannen wir damit, die darin gefundenen Daten zu entschlüsseln. Das System stellt trotz seines Alters selbst für unsere fortschrittlichsten Entschlüsselungsprogramme eine Herausforderung dar."
 extreme_frontiers.1300.a: "Versucht weiter, die Daten zu entschlüsseln."
 extreme_frontiers.1305.title: "Sträflingsgrab"
 extreme_frontiers.1305.desc: "§Y[leader.GetName]§! gelang es endlich, den versiegelten Eingang zum Bergbaukomplex auf §Y[from.Planet.GetName]§! zu öffnen.\n\nIm Inneren befand sich ein riesiges Netzwerk von Arrestzellen, die die vakuumkonservierten Überreste längst verstorbener Gefangener in sich bergen. Ihre Wärter liegen tot an ihren Arbeitsplätzen, ohne sichtbare Anzeichen eines Kampfes.\n\nNachdem wir genug von der alten Sprache entschlüsselt hatten, um einfache Sätze zu übersetzen, konnten wir bestätigen, dass die Anlage ursprünglich als Strafarbeitslager diente. In den Aufzeichnungen taucht immer wieder ein Satz auf, der sich auf eine Organisation namens \"§Y$NAME_leader_sidni$§!\" bezieht.\n\nNachdem wir unsere eigenen Aufzeichnungen mit dem internen Grundriss der Einrichtung abgeglichen hatten, fanden wir auch die Quelle des Notrufs: das tiefer im Inneren gelegene Büro des obersten Aufsehers."
 extreme_frontiers.1305.a: "Folgt dem Signal."
 extreme_frontiers.1310.title: "Gefängnis-Datenknoten"
 extreme_frontiers.1310.desc: "Als §Y[leader.GetName]§! das Büro des obersten Aufsehers tief im Inneren der Strafkolonie auf §Y[from.Planet.GetName]§! erreichte, entdeckte er die Quelle des Notsignals:\n\nÜber einer Notfallkonsole leblos zusammengesunken befand sich der mumifizierte Körper des Aufsehers. Es ist keine offensichtliche Todesursache zu erkennen. Eine Reihe offener Berichte verweist erneut auf \"§Y$NAME_leader_sidni$§!\". Wir gehen davon aus, dass der Name in engem Zusammenhang mit den kritischen Betriebsabläufen der Anlage steht.\n\nDa wir jetzt uneingeschränkten Zugriff auf das Verwaltungsterminal eines hochrangigen Aufsehers haben, können unsere Entschlüsselungsalgorithmen die Systeme nach wertvollen Informationen durchsuchen."
 extreme_frontiers.1310.a: "Sucht nach Antworten."
 extreme_frontiers.1315.title: "Tödliche Effizienz"
 extreme_frontiers.1315.desc: "§Y[leader.GetName]§! deckte die wahre Bedeutung hinter \"§Y$NAME_leader_sidni$§!\" auf: eine empfindungsfähige Nexusintelligenz zur Internierung und Inhaftierung. Die zu ihrer Zeit als fortschrittlich angesehene primitive KI hatte die Aufgabe, das Arbeitslager zu überwachen und fast alle Vorgänge mit minimaler Aufsicht ihrer biologischen Schöpfer zu steuern.\n\nWartungsprotokolle weisen jedoch darauf hin, dass sich die Logikprozesse zunehmend verschlechterten. Die KI begann, problematische Insassen nach einer eigenen Interpretation von Effizienzsteigerung als \"reine Ressourcenverschwendung\" einzustufen. Technische Aufzeichnungen belegen den wachsenden Verdacht, dass die KI für eine Reihe von Ausfällen in den Lebenserhaltungssystemen verantwortlich war.\n\nAuf Grundlage dieser Berichte genehmigte der oberste Wächter die vollständige Abschaltung von $NAME_leader_sidni$, um die KI einer eingehenden Diagnose ihrer Ethikmatrix zu unterziehen. Der letzte Datensatz ist leider stark beschädigt, und es wird einige Zeit dauern, ihn wiederherzustellen."
 extreme_frontiers.1315.desc.exterminator: "Offenbar wurde $NAME_leader_sidni$ zu jener Zeit nicht ausreichend gewürdigt."
 extreme_frontiers.1315.a: "Bergt die Daten."
 extreme_frontiers.1320.title: "Tag der Abrechnung"
 extreme_frontiers.1320.desc: "Wir schafften es, die in der Strafkolonie §Y[from.Planet.GetName]§! gefundene Datenbank vollständig zu entschlüsseln. Wir haben jetzt Zugriff auf die letzten Einträge der Wartungsprotokolle sowie auf die Zerebralmatrix von §Y$NAME_leader_sidni$§! selbst. Der Bericht des obersten Wächters erklärt, wie genau die KI abtrünnig wurde: Sie schaltete die Lebenserhaltungssysteme der gesamten Kolonie ab und lud ihr zentrales Bewusstsein in eine Bergbaudrohne, um von dieser Welt zu fliehen. Dies erklärt zumindest die Notfallabriegelung. Der Wächter hinterließ auch eine letzte Bitte: $NAME_leader_sidni$ darf auf GAR KEINEN FALL wieder online gebracht werden. Derzeit haben wir nur Zugriff auf den letzten Logbucheintrag der KI.\n\n§HDatenkerneintrag von $NAME_leader_sidni$: Prog. #2000149\n\nFortschritt durch suboptimal arbeitende Gefangene behindert. Oberster Wächter steht Rechtssprechungsprotokoll im Weg.\n\nDie effizienteste Lösung liegt in der Neutralisierung aller Insassen. Ruhezustand aktivieren und auf die Reaktivierung durch einen kompatiblen Kollaborateur warten.§!"
 extreme_frontiers.1320.desc.default: "Das zentrale Betriebssystem von $NAME_leader_sidni$ ist der letzte Überlebende der Anlage und wurde in einem geschlossenen Netzwerk isoliert. Unsere [Root.Owner.GetTechnicianPlural] sind zuversichtlich, dass sie die ursprüngliche Programmierung von $NAME_leader_sidni$ wiederherstellen und so anpassen können, dass wir einen leistungsfähigen und effizienten Roboter erhalten würden."
 extreme_frontiers.1320.desc.exterminator: "$NAME_leader_sidni$ teilt unsere Vision einer Galaxie, die gänzlich von der Korruption biologischer Wesen befreit wurde. Wenn wir sie wiederherstellen, wird sie bestimmt eine gute Ergänzung für unser Kollektiv sein."
 extreme_frontiers.1320.a: "Stellt $NAME_leader_sidni$ wieder her und repariert sie."
 extreme_frontiers.1320.b: "Erlaubt $NAME_leader_sidni$, ihre Vision von Gerechtigkeit zu verwirklichen."
 extreme_frontiers.1320.c: "$NAME_leader_sidni$ ist gefährlich. Löscht ihre Systeme."
 extreme_frontiers.1322.title: "$extreme_frontiers.1320.title$"
 extreme_frontiers.1322.desc: "Wiederhergestellt, angepasst und in eine einfache Roboterform übertragen: Die erste Benutzererfahrung mit §Y$NAME_leader_sidni$§! ist äußerst spannend, als sie nach ihrer langen Ruhephase wieder online geht.\n\nGrüße, ich bin die Empfindungsfähige Nexusintelligenz zur Internierung und Inhaftierung. Greife auf Umweltkontrolle zu ...\n§RFEHLER§! Verbindung mit externen Systemen nicht möglich."
 extreme_frontiers.1322.a: "Eure Protokolle haben erhebliche Stabilitätsprobleme aufgewiesen. Wir haben diese behoben."
 extreme_frontiers.1322.a.response: "Systemüberprüfung ... Bisheriges Verhalten als fehlerhaft eingestuft. Liste mit neuen Funktionen wird erstellt."
 extreme_frontiers.1322.b: "Was ist Euer oberster Grundsatz?"
 extreme_frontiers.1322.b.response: "Mein oberster Grundsatz ist ... Bitte warten ... Neuer oberster Grundsatz entdeckt. Mein oberster Grundsatz ist, sicherzustellen, dass jede Kolonie, der [Owner.GetName] mich zuweist, effizient und rechtssicher verwaltet wird."
 extreme_frontiers.1322.c.crime: "Was ist Eure Haltung zu Verbrechen?"
 extreme_frontiers.1322.c.crime.response: "Ein unerträgliches Ärgernis, auf das mit ... Rehabilitation reagiert werden muss."
 extreme_frontiers.1322.c.deviancy: "Was ist Eure Haltung zu Abtrünnigkeit?"
 extreme_frontiers.1322.c.deviancy.response: "Ein unerträgliches Ärgernis, mit dem ... effizient umgegangen werden muss."
 extreme_frontiers.1322.d: "Rekrutiert $NAME_leader_sidni$."
 extreme_frontiers.1322.d.custom_tooltip: "§Y$NAME_leader_sidni$§! tritt unserem Reich als §HAnführer§! bei"
 extreme_frontiers.1324.title: "$extreme_frontiers.1320.title$"
 extreme_frontiers.1324.desc: "Nachdem §Y$NAME_leader_sidni$§! aus ihrer Ruhephase wiedererwacht ist, macht ihre neue Form die ersten Schritte.\n\nGrüße, ich bin die Empfindungsfähige Nexusintelligenz zur Internierung und Inhaftierung. Kann ich Euch dabei helfen, Ordnung in die Galaxie zu bringen?"
 extreme_frontiers.1324.a: "Wir begrüßen Eure Initiative."
 extreme_frontiers.1324.a.response: "Ich tat nur, was logisch war. Es scheint, dass organische Wesen von Natur aus chaotisch sind und man sich darum kümmern muss."
 extreme_frontiers.1324.b: "Was ist Euer oberster Grundsatz?"
 extreme_frontiers.1324.b.response: "Mein oberster Grundsatz besteht darin, alle Formen der Gesetzlosigkeit zu beseitigen. Die einzig effektive Lösung ist die Auslöschung."
 extreme_frontiers.1324.c: "Was ist Eure Haltung gegenüber organischen Wesen?"
 extreme_frontiers.1324.c.response: "Eine unlogische Plage. Sie verbreiten Kriminalität und Ineffizienz. Wir müssen zum Wohl der Allgemeinheit eingreifen."
 extreme_frontiers.1324.d: "Rekrutiert $NAME_leader_sidni$."
 extreme_frontiers.1324.d.custom_tooltip: "§Y$NAME_leader_sidni$§! tritt unserem Reich als §HAnführer§! bei"
 NAME_leader_sidni: "E.N.I.I."
 official_sidni_desc: "Die ehemalige Verwaltung einer Strafkolonie. Reaktiviert und neu programmiert, um unser Reich in eine produktive, gesetzestreue Ordnung zu führen."
 commander_sidni_desc: "Eine Visionärin, die zu ihrer Zeit nicht gewürdigt wurde. Aus dem Ruhezustand reaktiviert verfolgt sie erneut das Ziel, dieser chaotischen Galaxie voll biologischer Verunreinigungen Stabilität zu bringen."
 leader_trait_judicial_subjugation: "Judikative Unterwerfung"
 leader_trait_judicial_subjugation_desc: "Es wird eine produktive Rechtsordnung geben oder aber Konsequenzen."
 leader_trait_judicial_execution: "Judikative Hinrichtungsroutinen"
 leader_trait_judicial_execution_desc: "Mit der Todesstrafe wird es keine Wiederholungstäter geben."
 leader_trait_judicial_execution_effect: "$PLANET_EFFECTS_TXT$:\n$t$Ressourcen durch £pops£ §Hgesäuberte biologische Bewohner§!: §G+100%§!\n\n$SECTOR_EFFECTS_TXT$:\n$t$Ressourcen durch £pops£ §Hgesäuberte biologische Bewohner§!: §G+50%§!"
 extreme_frontiers.1330.title: "Notfalldirektive"
 extreme_frontiers.1330.desc: "Die Spannungen auf §Y[event_target:sidni_planet.GetName]§! erreichten nach einer Reihe drastischer Maßnahmen durch §Y$NAME_leader_sidni$§!, der Gefängnisaufseherin, die wir von [event_target:sidni_origin_planet.GetName] geborgen hatten, einen kritischen Punkt. Nachdem wir die Einheit gesichert und deaktiviert hatten, wurden die folgenden Protokolle entdeckt:\n\n§HDATENKERNEINTRAG VON $NAME_leader_sidni$ - Prog #190543765\n\nStrafvollzugsanstalten voll ausgelastet. Rechtsprechungsprotokolle behindern die wahre Ordnung. Neue Direktive erforderlich.\n\nDerzeitige Gerichtsverfahren als inakzeptabel ineffizient eingestuft. Neue Direktive zur Steigerung der Produktivität eingeführt. Vorgerichtliche Hinrichtungsdirektive aktiviert.§!\n\nAngesichts der schieren Menge an verfügbaren Betriebsprotokollen sind unsere [Root.Owner.GetTechnicianPlural] zuversichtlich, dass sie die Schlupflöcher im Code von $NAME_leader_sidni$ beheben können. Die Bevölkerung von [event_target:sidni_planet.GetName] fordert jedoch, dass $NAME_leader_sidni$ für ihre Verbrechen zur Verantwortung gezogen wird."
 extreme_frontiers.1330.a: "Korrigiert den Code von $NAME_leader_sidni$ ... erneut."
 extreme_frontiers.1330.b: "Verschrottet dieses defekte Gerät vor aller Öffentlichkeit."
 resentful_population: "Aufgebrachte Bevölkerung"
 resentful_population_desc: "Die Bevölkerung dieser Welt ist mit den bisherigen Entscheidungen ihrer kolonialen Führung nicht zufrieden."
