 extreme_frontiers.2005.title: "Giftige Ressourcen"
 extreme_frontiers.2005.desc.common: "Unser erster Einsatz des §YTerraformings durch Georadiation§! auf §Y[target.GetName]§! wurde abgeschlossen.\n\nIndem wir die Oberfläche in ein unbewohnbares giftiges Ödland verwandelten, gewannen wir dank unserer Verbesserungen am Design der Georadiationsmatrix eine beispiellose Menge an Ressourcen."
 extreme_frontiers.2005.desc.industrialist: "Dieser Meilenstein markiert eine neue Ära der Ressourcengewinnung und des Profits."
 extreme_frontiers.2005.a.default: "Fantastisch."
