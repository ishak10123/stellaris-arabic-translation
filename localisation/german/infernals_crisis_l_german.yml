 crisis_hyperthermia_level_2: "§RRisiko§!"
 crisis_hyperthermia_level_2_desc: "$crisis_level_2_desc$"
 crisis_hyperthermia_lv2_tt: "£trigger_yes£ Hat die Megastruktur \"§Y$galactic_crucible_0$§!\" errichtet und sie zu einem §YGalaktischen Schmelztiegelrahmen§! verbessert"
 crisis_hyperthermia_lv2_req_tt: "£trigger_no£ Hat die Megastruktur \"§Y$galactic_crucible_0$§!\" errichtet und sie zu einem §YGalaktischen Schmelztiegelrahmen§! verbessert"
 crisis_hyperthermia_level_3: "§RGefahr§!"
 crisis_hyperthermia_level_3_desc: "$crisis_level_3_desc$"
 crisis_hyperthermia_lv3_tt: "£trigger_yes£ Hat die Megastruktur \"§Y$galactic_crucible_1$§!\" verbessert"
 crisis_hyperthermia_lv3_req_tt: "£trigger_no£ Hat die Megastruktur \"§Y$galactic_crucible_1$§!\" verbessert"
 crisis_hyperthermia_level_4: "§RKatastrophe§!"
 crisis_hyperthermia_level_4_desc: "$crisis_level_4_desc$"
 crisis_hyperthermia_lv4_tt: "£trigger_yes£ Hat die Megastruktur \"§Y$galactic_crucible_2$§!\" verbessert"
 crisis_hyperthermia_lv4_req_tt: "£trigger_no£ Hat die Megastruktur \"§Y$galactic_crucible_2$§!\" verbessert"
 crisis_hyperthermia_dec_lv4_tt: "£trigger_yes£ Hat das Spezialprojekt \"§Y$INF_CRISIS_ENTROPY_EVIL$§!\" abgeschlossen"
 crisis_hyperthermia_lv4_dec_req_tt: "£trigger_no£ Hat das Spezialprojekt \"§Y$INF_CRISIS_ENTROPY_EVIL$§!\" abgeschlossen"
 crisis_hyperthermia_level_5: "§REnde aller Existenz§!"
 crisis_hyperthermia_level_5_desc: "$crisis_level_5_desc$"
 crisis_hyperthermia_lv5_tt: "£trigger_yes£ Hat die Megastruktur \"§Y$galactic_crucible_3$§!\" verbessert"
 crisis_hyperthermia_lv5_req_tt: "£trigger_no£ Hat die Megastruktur \"§Y$galactic_crucible_3$§!\" verbessert"
 # MPerks Level 1
 menp_hyperthermia_crystals: "$entropy_crystals$"
 menp_hyperthermia_crystals_desc: "Die §Y$entropy_crystals$§! markiert den Durchbruch in der kontrollierten Energiedestabilisierung. Mit dieser flüchtigen Ressource können wir die galaktische Ordnung neu gestalten."
 unlocks_entropy_objectives: "Ermöglicht das Anhäufen von £entropy_crystals£ §YKristallisierter Entropie§! durch das Abschließen von §HKrisenzielen§!."
 menp_hyperthermia_harnessing: "Entropienutzung"
 menp_hyperthermia_harnessing_desc: "Die §Y$entropy_crystals$synthese§! für unsere Industrie zu nutzen, erlaubt es uns, diese flüchtige Ressource effektiver einzusetzen und unseren technischen Fokus auf unsere strategischen Ziele auszurichten."
 unlocks_entropy_edict: "§HNeuer Erlass:§! $edict_entropy_harnessing$"
 menp_hyperthermia_crucible: "Galaktischer Schmelztiegel"
 menp_hyperthermia_crucible_desc: "Dieser vorgeschlagene Schmelztiegel würde als zentraler Motor für die stellare Entropie dienen. Dank seiner Fähigkeit, die Entropie zu kristallisieren und sie für den Transport vorzubereiten, könnte der Schmelztiegel zum Mittelpunkt unserer feurigen Macht werden und sie über die Sterne verbreiten."
 unlocks_galactic_crucible: "§HNeue Megastruktur:§! $galactic_crucible_0$"
 # MPerks Level 2
 menp_hyperthermia_conc_entropy: "Konzentrierte Entropie"
 menp_hyperthermia_conc_entropy_desc: "$entropy_conduit_plural$ sind in dieser Phase für den Ausbau unserer Macht von entscheidender Bedeutung. Die Leistung des Schmelztiegels zu erhöhen, beschleunigt unseren Weg in eine strahlende, brennende Zukunft."
 unlocks_conduit_spawn: "§H$UNLOCKS_SHIP_TYPE$:§! $entropy_conduit$ \n- §Y$entropy_conduit_plural$§! werden automatisch vom §YGalaktischen Schmelztiegel§! geschaffen und fliegen eigenständig in benachbarte Sternensysteme.\n- Kolonien innerhalb eines Zielsystems erhalten Boni.\n- Sie sind mit einem £ship_xl_slot£ §Y$LENS_FLARE_BEAM$§! bewaffnet, der Feinde beim Einschlag für mehrere Tage lahmlegt.\n\n"
 menp_hyperthermia_radiant: "Strahlende Ambitionen"
 menp_hyperthermia_radiant_desc: "Als Funke, der die Galaxie entzündet, bleibt keine Zeit für Zweifel oder Bürokratie. Wir können es uns nicht leisten, Zeit mit der Umgestaltung unzähliger Systeme zu vergeuden. Um unsere Ziele zu erreichen, müssen wir unsere Baukapazitäten drastisch erhöhen."
 menp_hyperthermia_ignition: "Erzwungene Entzündung"
 menp_hyperthermia_ignition_desc: "Manchmal reicht es nicht aus, sich einfach mehr anzustrengen. Wir müssen unsere Technologie auf die nächste Stufe bringen und ihr volles Potenzial ausschöpfen. Es ist an der Zeit, Sicherheitsvorkehrungen zu minimieren und die Leistung zu maximieren."
 unlocks_crucible_overclocking: "Erlaubt die \"Übertaktung\" der §HMegastruktur§! §Y$galactic_crucible_1$§!"
 # MPerks Level 3
 menp_hyperthermia_cruiser: "$ember_cruiser$"
 menp_hyperthermia_cruiser_desc: "Diese Schiffe sind mit modernster Technik ausgestattet, um flüchtige Wärmeflüsse zu einer gezielten Vernichtung umzuwandeln. Sie lassen von unseren Feinden nichts als verkohlte Aschehaufen zurück."
 unlocks_ember_cruiser: "§H$UNLOCKS_SHIP_TYPE$:§! $ember_cruiser$"
 menp_hyperthermia_flames: "Alles verschlingende Flammen"
 menp_hyperthermia_flames_desc: "Die Utopie, die wir anstreben, lässt keinen Raum für Widerstand. Jeder, der uns aufhalten will, lernt schnell, dass Widerstand mit einem Feuerregen auf der Heimatwelt beantwortet wird."
 unlocks_firestorm_stance: "§HNeue Terraformingoption:§! $pc_volcanic$ \n§HNeue Bombardierungshaltung:§! $bombardment_firestorm$\n\n"
 menp_hyperthermia_coronal: "Koronale Entlüftung"
 menp_hyperthermia_coronal_desc: "Unsere $entropy_conduit_plural$ strahlen derzeit eine massive Wärme ab. Durch die Abgabe dieser Hitze an den umliegenden Raum könnten wir die $entropy_conduit_plural$ in verheerende Waffen gegen unsere Feinde verwandeln."
 unlocks_conduit_damage: "§Y$entropy_conduit_plural$§! verursachen passiven Schaden an feindlichen Schiffen und Stationen.\n\n"
 # MPerks Level 4
 menp_hyperthermia_reactors: "Heliofusionsreaktoren"
 menp_hyperthermia_reactors_desc: "Durch die Nutzung von §Y$entropy_crystals$§! in der Militärtechnologie kann man Antriebssysteme von unvorstellbarer Kraft entwickeln. Unser Schiffe werden so schnell wie nie zuvor durch die Galaxie rasen."
 menp_hyperthermia_solarflare: "Künstliche Sonneneruption"
 menp_hyperthermia_solarflare_desc: "Es gab eine Zeit, in der Teile der Galaxie außerhalb unserer Reichweite lagen. Diese Illusion hat nun ein Ende. Schon bald werden unsere $entropy_conduit_plural$schwärme die Sterne erhellen und alle vernichten, die sich uns widersetzen."
 unlocks_conduit_borders: "§Y$entropy_conduit_plural$§! überqueren automatisch die Grenze in feindliches Territorium.\n\n"
 menp_hyperthermia_armada: "Feurige Armada"
 menp_hyperthermia_armada_desc: "Da sich die Galaxie immer mehr gegen uns verbündet, ist eine Mobilisierung unerlässlich. Jeder Bürger muss dazu beitragen, die Energiezufuhr aufrechtzuerhalten und die Flammen unseres Aufstiegs zu schüren."
 unlocks_blazing_navalcap: "§Y[GetAlloyProducerPlural]§! und §Y[GetResearcherPlural]§! erhöhen die £navy_size£ §Y$MOD_COUNTRY_NAVAL_CAP_ADD$§!.\n\n"
 # MPerks Level 5
 menp_hyperthermia_battleship: "$ember_battleship$"
 menp_hyperthermia_battleship_desc: "Mit Geschützrohren, die so heiß wie ein Feuersturm sind, der die Galaxie zu verschlingen droht, werden diese Schiffe den Großteil unserer Verteidigungsbemühungen rund um den Schmelztiegel ausmachen."
 unlocks_ember_battleship: "§H$UNLOCKS_SHIP_TYPE$:§! $ember_battleship$ \n- Kann die Waffe \"£ship_xl_slot£ §Y$LENS_FLARE_BEAM$§!\" ausrüsten."
 menp_hyperthermia_critical_mass: "Kritische Masse"
 menp_hyperthermia_critical_mass_desc: "Die entropische Aktivität in der äußeren Hülle eines Sterns zu erhöhen, führt dazu, dass der Stern eine Strahlungswelle absondert, die das System schneller erhitzt."
 unlocks_conduit_boost: "§Y$entropy_conduit_plural$§! werden basierend auf der Anzahl eroberter Systeme stärker.\n\n$hyperthermia_map_perc$\n\n"
 hyperthermia_map_perc: "§G20%§! der Galaxie: $TABBED_NEW_LINE$- $entropy_conduit_plural$ erhöhen die Verwüstung auf nahen Planeten $TABBED_NEW_LINE$- Betroffene Kolonien verlieren allmählich £pop£ $POPS$ $TABBED_NEW_LINE$- Die Auswirkungen treten nur bei Spezies auf, die nicht §Ythermophil§! sind $TABBED_NEW_LINE$- Benötigte Systeme: §Y[root.hyperthermia_own_systems_var]§!/§Y[root.hyperthermia_systems_var]§!"
 menp_hyperthermia_ammunition: "Entflammte Munition"
 menp_hyperthermia_ammunition_desc: "Als Weiterentwicklung im Munitionsdesign wird Standardmunition ein winziger Entropiekern hinzugefügt, der beim Aufprall destabilisierende thermische Druckwellen freisetzt. Das Ergebnis ist eine deutliche Steigerung der Zerstörungskraft."
 # Misc
 entropy_crystals_deficit: "$entropy_crystals$knappheit"
 edict_entropy_harnessing: "Entropienutzung"
 edict_entropy_harnessing_desc: "$entropy_crystals$ in die Infrastruktur zu integrieren, erlaubt es uns, unser technologisches Wissen zu nutzen, um das volle Potenzial dieser flüchtigen Ressource auszuschöpfen."
