 # Weapon
 LENS_FLARE_BEAM: "Linsenparalysator"
 LENS_FLARE_BEAM_DESC: "Der Strahl dieser Waffe wurde so kalibriert, dass er kritische Kontrollsysteme stört und ein begrenztes Zeitfenster für Angriffe schafft."
 lfb_on_hit_stun_tt: "§YDeaktiviert§! das Ziel für §G7§! Tage, wodurch es sich nicht mehr bewegen oder zurückschießen kann."
 lf_weapon_stun_effect: "§RAuswirkung ($LENS_FLARE_BEAM$)§!"
 lf_weapon_stun_effect_desc: "   " # not visible
 # Megastructure
 galactic_crucible_0: "Galaktische Schmelztiegelflamme"
 galactic_crucible_0_DESC: "Das Grundgerüst eines Galaktischen Schmelztiegels. Es unterstützt den Bau der restlichen Station."
 galactic_crucible_0_MEGASTRUCTURE_DETAILS: "Diese riesige Station saugt Energie aus dem Mutterstern ab und versorgt damit automatisierte Werften, die §Y$entropy_conduit_plural$§! produzieren: Schiffe, die in der Lage sind, das Schicksal ganzer Sterne neu zu gestalten."
 galactic_crucible_1: "Galaktischer Schmelztiegelrahmen"
 galactic_crucible_1_DESC: "Die Kerninfrastruktur wurde fertiggestellt, wodurch der Galaktische Schmelztiegel nun eine funktionsfähige Station ist. Der Bau der Entropiekristallisierungssysteme ist bereits im Gange."
 galactic_crucible_2: "Galaktischer Schmelztiegelkern"
 galactic_crucible_2_DESC: "Der Galaktische Schmelztiegel ist jetzt voll funktionsfähig und bereit, §Y$entropy_crystals$§! einzusetzen. Alle weiteren Verbesserungen basieren auf diesem Fundament.\n\n§HSchließt das Spezialprojekt ab, um die nächste Stufe freizuschalten.§!"
 galactic_crucible_3: "Galaktisches Schmelztiegelzentrum"
 galactic_crucible_3_DESC: "Der Galaktische Schmelztiegel wurde mit modularen Entropiesystemen erweitert, die eine nahtlose Rekonfiguration für das weitere Wachstum ermöglichen. Techniker können die Kapazitäten erhöhen und gleichzeitig Ineffizienzen minimieren."
 galactic_crucible_4: "Galaktischer Schmelztiegel"
 galactic_crucible_4_DESC: "Der Galaktische Schmelztiegel ist vollständig bewaffnet und bereit, die Galaxie mit Flammen zu säubern. Die Entopiesysteme arbeiten mit maximaler theoretischer Effizienz."
 galactic_crucible_5: "Galaktisches Schmelztiegelinstitut"
 galactic_crucible_5_DESC: "Der Galaktische Schmelztiegel wurde unwiderruflich umgebaut, um zu verhindern, dass es zu einer katastrophalen Energieabgabe kommt. Er dient nun als stabile und sichere Quelle des Wohlstands für das Reich."
 galactic_crucible_ruined: "Zerstörter $galactic_crucible_4$"
 galactic_crucible_ruined_DESC: "Eine zerstörte Schiffswerft, die einst den feurigen Ambitionen eines Gefallenen Reichs diente."
 galactic_crucible_ruined_MEGASTRUCTURE_DETAILS: "Diese riesige Ruine pulsiert noch immer mit einer ungeheuren Hitze."
 SPAWN_CONDUITS: "$entropy_conduit_plural$"
 SPAWN_CONDUITS_DESC: "Der Galaktische Schmelztiegel produziert automatisch $entropy_conduit_plural$. Diese wiederum begeben sich automatisch zu Sternen, die man zu einem §Y$pc_m_giant_star$§! umwandeln kann."
 megastructure_overclocking_desc: "Durch strategisches Übertakten überschreitet diese Megastruktur die normalen Betriebsgrenzen und löst einzigartige Effekte aus."
 overclock_mode: "Modus:"
 overclock_gc_default: "$overclock_mode$ §HStandard§!"
 overclock_gc_default_desc: "Erzeugt eine stetige, moderate Menge an Kristallisierter Entropie.\n"
 overclock_gc_high: "$overclock_mode$ §HÜberladen§!"
 overclock_gc_high_desc: "Nutzt die massiven Energiereserven, um den Bau von Schiffen der $entropy_conduit$-Klasse zu beschleunigen.\n"
 overclock_gc_eco: "$overclock_mode$ §HProduktion§!"
 overclock_gc_eco_desc: "Durch einen hohen Legierungseinsatz kann man die Kristallisierte Entropieproduktion erheblich steigern.\n"
 overclock_gc_war: "$overclock_mode$ §HKoordinationszentrum§!"
 overclock_gc_war_desc: "Der Galaktische Schmelztiegel versorgt Schiffe in der Nähe mit Energie, was besonders die Kampfstärke von Verteidigungsflotten verbessert.\n"
 # Event Chain
 galactic_hyperthermia_chain_title: "$ap_galactic_hyperthermia$"
 galactic_hyperthermia_chain_desc: "Wir haben beschlossen, dass unsere Zukunft im Feuer liegt, und sind dabei, die gesamte Galaxie in Brand zu setzen."
 # Special Projects
 INF_CRISIS_ENTROPY: "Neue Energiequelle"
 INF_CRISIS_ENTROPY_DESC: "Das Feuer spielt seit jeher eine wichtige Rolle in unserer Gesellschaft, doch erst jetzt haben wir gelernt, seine zerstörerische Kraft für uns nutzbar zu machen. Es könnte genau das sein, wovon die Wissenschaft schon lange träumt: eine Energiequelle, die unsere gesamte Zivilisation versorgen und uns zu den Sternen katapultieren kann.\n\n§HAuswirkungen:§! Schaltet die neue Ressource \"£entropy_crystals£ §Y$entropy_crystals$§!\" frei."
 INF_CRISIS_ENTROPY_EVIL: "Konstruierter Feuersturm"
 INF_CRISIS_ENTROPY_EVIL_DESC: "Der Schmelztiegel zeigte unserer Spezies einen neuen Weg auf. Es wäre töricht, diesen nicht weiter zu verfolgen. Es ist an der Zeit, die Galaxie nach unserem Bild zu formen und jeden zu verbrennen, der unsere Vision ablehnt.\n\n§HAuswirkungen:§!\n- Schaltet die nächste Verbesserung des §YGalaktischen Schmelztiegels§! frei.\n- §Y$entropy_conduit_plural$§! können jetzt Sterne in feindlichem Territorium unwandeln.\n\n" # Crystallized Entropy is used to its full potential
 INF_CRISIS_ENTROPY_GOOD: "Unerwarteter Zusammenhang"
 INF_CRISIS_ENTROPY_GOOD_DESC: "Die Macht unseres Schmelztiegels ist zwar immens, aber auch unbeständig. Indem wir seine Fähigkeiten dauerhaft einschränken, sichern wir uns eine stabile Wohlstandsquelle, ohne die Galaxie zu gefährden oder das Wohlwollen unserer Nachbarn auf die Probe zu stellen." # Crystallized Entropy can be used for the economy
 # Countdown Situation
 situation_galactic_hyperthermia_timer: "Mobilisierung"
 situation_galactic_hyperthermia_timer_type: "$situation_galactic_hyperthermia_timer$"
 situation_galactic_hyperthermia_timer_desc: "Dank der Beherrschung der §YKristallisierten Entropie§! werden wir schon bald in der Lage sein, die Galaxie nach unseren Vorstellungen umzuwandeln. Wir haben Wurmlöcher zu sechs Systemen rund um den Galaktischen Kern geöffnet.\nIndem wir in jedes dieser Systeme §Y$entropy_conduit_plural$§! entsenden und sie vor allen schützen, die unseren Plänen in die Quere kommen, können wir die Galaxie selbst in Flammen aufgehen lassen."
 situation_galactic_hyperthermia_timer_monthly_change_tooltip: "Die derzeitige Menge an Entropie, die in den galaktischen Kern ausgestrahlt wird. Sobald sie ihren Höhepunkt erreicht, wird die Galaxie brennen."
 situation_gh_timer_outcome: "Unser Geheimdienst berichtet, dass sich verschiedene Reiche möglicherweise auf einen Krieg vorbereiten, um unsere Pläne zu vereiteln. Wenn wir ihnen unvorbereitet entgegentreten, wird unser Vorhaben scheitern, bevor es überhaupt begonnen hat."
 situation_gh_approach_timer: "Den Konsequenzen stellen"
 situation_gh_approach_timer_tt: "Es ist endlich an der Zeit, die Galaxie in einen Krieg epischen Ausmaßes zu stürzen!"
 situation_gh_difficulty_progress: "Schwierigkeit"
 situation_gh_opponent_progress: "§G-0.1§! für jedes Reich, das gegen uns ist"
 # Crisis Situation
 situation_galactic_hyperthermia: "Galaktischer Feuersturm"
 situation_galactic_hyperthermia_type: "$situation_galactic_hyperthermia$"
 situation_galactic_hyperthermia_monthly_change_tooltip: "Die Geschwindigkeit, bis die Galaxie vollständig entflammt wurde."
 situation_hyperthermia_desc_perp: "§LWir streben eine Utopie aus Flammen an, aber um diese zu erschaffen, müssen wir alles verbrennen, was uns im Weg steht. Wir haben die ersten Funken entzündet und müssen nun die Feuer in jedem Winkel der Galaxie anfachen.§!\n\n$situation_hyperthermia_stats$"
 situation_hyperthermia_desc: "§L§Y[event_target:hyperthermia_empire.GetName]§! setzte die Sterne selbst in Flammen. Jetzt sind wir an der Reihe, den größten Brand zu bekämpfen, den die Galaxie jemals erlebte. Wir werden keine zweite Chance erhalten. Wenn wir scheitern, wird alles, was wir erreicht haben, zu Asche verbrennen.§!\n\n$situation_hyperthermia_stats$"
 situation_hyperthermia_stats: "§HEroberte Kernsysteme:§! [event_target:hyperthermia_empire.gh_crisis_core_var]"
 situation_galactic_hyperthermia_outcome: "[GetHyperthermiaOutcome]"
 situation_gh_outcome_perp: "Wenn wir Erfolg haben, wird ein Feuerregen die Galaxie verschlingen und nur wer die Hitze vollends für sich angenommen hat, wird in der Asche zurückbleiben. Nicht einmal die Sterne werden verschont werden. Wir werden sie nach Milliarden von Jahren nach dem Vorbild unseres Heimatsterns neu formen."
 situation_gh_outcome_other: "Sollte §Y[hyperthermia_empire.GetName]§! erfolgreich sein, wird die gesamte Galaxie zu Asche verbrannt und nur thermophile Lebensformen werden überleben."
 situation_galactic_hyperthermia_progress: "Die Anzahl an Galaktischen Kernsystemen, die von §Y$entropy_conduit_plural$n§! besetzt sind, bestimmt den monatlichen Fortschritt.\n$TABBED_NEW_LINE$- Weniger als §Y3§! Systeme: §R-3§! $TABBED_NEW_LINE$- Genau §Y3§! Systeme: §Y0§! $TABBED_NEW_LINE$- Mehr als §Y3§! Systeme: §G+3§! \n\nDerzeitiger Fortschritt"
 situation_galactic_hyperthermia_stage1: "Minimum erreicht ($stage_1$)"
 situation_gh_approach_perp: "Das Feuer schüren"
 situation_gh_approach_perp_tt: "Sollten wir scheitern, riskieren wir, alles zu verlieren, was wir erreicht haben. Wir müssen Erfolg haben!"
 situation_gh_approach_other: "Die Flammen löschen"
 situation_gh_approach_other_tt: "Dieses Reich ist eine existenzielle Bedrohung für die galaktische Stabilität. Es zu bekämpfen, ist keine Option, sondern eine Notwendigkeit."
 # Events
 # NOTE: Remove most #comments below after texts are done
 infernals.1000.name: "Neue Energiequelle"
 infernals.1000.desc: "[GetHyperthermiaIntroIfRedGiant]"
 infernals.1000.descNormal: "Unsere [GetScientistPlural] berichten von einer neuartigen Methode, Entropie zu ernten und zu lagern und sie in einer hochenergetischen Kristallmatrix zu binden. Diese §Y$entropy_crystals$§! kann eine erhebliche Menge Thermalenergie speichern, ist leicht zu transportieren und lässt sich in der Industrie und der Wirtschaft oder generell bei interstellaren Einsätzen verwenden.\n\nErste wissenschaftliche Modelle legen nahe, dass wir dies dazu nutzen können, um Planeten zu heißeren Klimazonen zu terraformen oder sogar die Sternentwicklung von Roten Riesen zu beschleunigen. Im Prinzip könnte die Streuentropie aus der gesamten Galaxie zurückgewonnen und in nutzbare Wärme umgewandelt werden, was zu einer verstärkten thermischen Expansion auf galaktischer Ebene führen würde.\n\n§HNeues Spezialprojekt:§! §Y$INF_CRISIS_ENTROPY$§!"
 infernals.1000.descRedGiant: "Unsere [GetScientistPlural] erforschten die §Y$entropy_crystals$§!, die man einst dazu nutzte, jenen Riesen zu entzünden, der unsere Zivilisation beinahe ausgelöscht hätte. Wir sind nun in der Lage, diese flüchtige Substanz selbst zu erzeugen, um große Mengen an Wärmeenergie zu binden und zu transportieren, was sich für industrielle, wirtschaftliche und stellare Zwecke nutzt lässt.\n\nErste Simulationen deuten darauf hin, dass dies das Terraforming zu heißeren Klimazonen erlaubt oder eine Sternentwicklung zu Roten Riesen auslösen könnte. Theoretisch könnte die galaktische Umgebungsentropie zurückgewonnen und in Wärme umgewandelt werden, was eine systemische thermische Expansion bewirken würde.\n\n§HNeues Spezialprojekt:§! §Y$INF_CRISIS_ENTROPY$§!" # Intro if you've learned about entropy from the Red Giant Miners
 infernals.1005.name: "Kristallisation erreicht"
 infernals.1005.desc1: "Wir stellten unsere erste funktionierende Infrastruktur fertig, die Energie sammelt und diese in §Y$entropy_crystals$§! umwandelt. Diese Kristalle bergen eine immense Menge thermischer Energie in sich und erlauben es uns, Energie weitaus effizienter zu speichern und zu transportieren, als es mit herkömmlichen Methoden möglich wäre.\n\nRote Riesen eignen sich aufgrund ihrer großen Emissionsflächen und thermischen Leistung ideal für diesen Prozess, und wir sind bereit, diese Technologie in jedem unserer Systeme einzusetzen.\n\nUnsere Techniker begannen außerdem damit, den Prozess für den industriellen Einsatz anzupassen, und sie experimentieren mit Möglichkeiten, $entropy_crystals$ durch die Nutzung der Umgebungsentropie künstlich zu synthetisieren. Mit dem Aufkommen dieses neuen Wirtschaftszweigs werden wir schon bald das wohlhabendste und mächtigste Reich der Galaxie sein. Unsere [GetScientistPlural] suchen bereits nach Möglichkeiten, die Produktion weiter zu skalieren.\n\n§HNeue Megastruktur:§! §Y$galactic_crucible_0$§!" # Reaching lv1
 infernals.1005.desc2: "Dank unserer Proben an §Y$entropy_crystals$§! sind wir in der Lage, neue zu synthetisieren, ohne unseren Heimatstern zu gefährden. Diese Kristalle können eine immense Menge thermischer Energie speichern und erlauben es uns, Energie weitaus effizienter zu speichern und zu transportieren, als es mit herkömmlichen Methoden möglich wäre.\n\nRote Riesen eignen sich aufgrund ihrer großen Emissionsflächen und thermischen Leistung ideal für diesen Prozess, und wir sind bereit, diese Technologie in jedem unserer Systeme einzusetzen.\n\nUnsere Techniker begannen außerdem damit, den Prozess für den industriellen Einsatz anzupassen, und experimentieren mit Möglichkeiten, $entropy_crystals$ durch die Nutzung der Umgebungsentropie künstlich zu synthetisieren. Mit dem Aufkommen dieses neuen Wirtschaftszweigs werden wir schon bald das wohlhabendste und mächtigste Reich der Galaxie sein. Unsere [GetScientistPlural] suchen bereits nach Möglichkeiten, die Produktion weiter zu skalieren.\n\n§HNeue Megastruktur:§! §Y$galactic_crucible_0$§!" # Reaching lv1
 infernals.1005.a: "Wir müssen mit dem Bau beginnen."
 infernals.1005.a.tt: "Nutzt einen $constructor$, um eine §Y$galactic_crucible_0$§! um einen Stern herum zu errichten."
 infernals.1005.b: "Ordnet die Drohnen an, mit dem Bau zu beginnen."
 infernals.1005.b.tt: "Nutzt einen $constructor$, um eine §Y$galactic_crucible_0$§! um einen Stern herum zu errichten."
 infernals.1006.name: "Thermophile Evolution"
 infernals.1006.desc: "Während wir die Galaxie in Flammen setzen, müssen wir auch unsere eigenen Formen darauf vorbereiten, der Hitze standzuhalten. Die Anpassung unserer Bevölkerung an höhere Temperaturen hilft uns, inmitten der Flammen unserer neuen Zukunft zu gedeihen."
 infernals.1006.descRedGiant: "Während wir unermüdlich daran arbeiten, die Veränderungen unseres Sterns umzukehren, müssen wir auch unsere eigenen Formen darauf vorbereiten, der Hitze standzuhalten. Unserer Bevölkerung an höhere Temperaturen anzupassen, hilft uns, inmitten der Flammen unserer neuen Zukunft zu gedeihen."
 infernals.1010.name: "Start der ersten $entropy_conduit_plural$"
 infernals.1010.desc: "Unser $galactic_crucible_1$ ist bereit, die ersten §Y$entropy_conduit_plural$§! zu entsenden, die automatisch die stellare Entropie bündeln und verstärken werden. Einmal entsandt werden sie die Energieproduktion eines Sterns recyceln und intensivieren, ihn in einen Roten Riesen verwandeln und das ganze System aufheizen, um es für die Expansion unserer Infrastruktur vorzubereiten.\n\n§Y$entropy_conduit_plural$§! werden in regelmäßigen Abständen hergestellt und arbeiten autonom, was für uns sehr praktisch ist. Vorerst bleiben sie innerhalb unseres eigenen Territoriums, doch mit der Zeit werden wir in der Lage sein, sie auf die ganze Galaxie loszulassen. Schließlich wächst unser Reich ständig weiter.\n\n§HNeue Megastrukturverbesserung:§! §Y$galactic_crucible_2$§!" # Reaching lv2
 infernals.1010.a: "Beschleunigen wir die $entropy_crystals$produktion."
 infernals.1010.b: "Wir müssen mehr Sterne erobern."
 infernals.1015.name: "Wie heiß wird es werden?"
 infernals.1015.desc: "Unsere fortlaufende Forschung bezüglich §YKristallisierter Entropie§! zeigte eine faszinierende Möglichkeit auf: In hoher Konzentration können wir damit Waffen von unvorstellbarer Größe antreiben, die ganze Planeten zerstören können. Mit einer solchen Macht wäre die Galaxie unserer Gnade ausgeliefert.\n\nDiesen militärischen Anwendungsbereich zu erforschen, würde jedoch das wenige Vertrauen, das zwischen uns und unseren Nachbarn noch besteht, zerstören. Und wer vermag schon zu sagen, ob solche Waffen nicht eines Tages gegen uns selbst eingesetzt werden?\n\nLeere Worte von Frieden reichen nicht aus. Wenn wir der Galaxie unsere Entschlossenheit beweisen wollen, müssen wir unseren Galaktischen Schmelztiegelkern so modifizieren, dass er niemals in der Lage sein wird, solche Waffen zu produzieren. Andernfalls wird es nur eine Frage der Zeit sein, bis diese Technologie von uns oder jemand anderem als Waffe eingesetzt wird.\n\n§HDiese Entscheidung schaltet ein Spezialprojekt frei§!" # Reaching lv3 & decision
 infernals.1015.a: "Entfache die Flammen des Krieges!" # evil path
 infernals.1015.a.desc: "Neue Krisenstufe: $crisis_hyperthermia_level_4$.\n" #\n\n§HIssues Special Project:§! §Y$INF_CRISIS_ENTROPY_EVIL$§!
 infernals.1015.b: "Wir sollten unsere Ambitionen zügeln." # good path
 infernals.1015.b.desc: "Sperrt den Zugang zu der Krisenstufe \"$crisis_hyperthermia_level_4$\".\n\n§HNeues Spezialprojekt:§! §Y$INF_CRISIS_ENTROPY_GOOD$§!. Dieses wandelt den §YGalaktischen Schmelztiegelkern§! in ein §Y$galactic_crucible_5$§! um."
 infernals.1020.name: "Umarmung des Feuers"
 infernals.1020.desc: "Unsere Forschung bezüglich der §YKristallinen Entropie§! und dem Projekt \"§Y$INF_CRISIS_ENTROPY_EVIL$§!\" bestätigten, was wir bereits vermutet hatten: Das Potenzial für den Bau verheerende Waffen ist real. Mit einer solchen Macht müssten wir uns nie wieder aus diplomatischen Gründen zurückhalten.\n\nDie Expansion des Galaktischen Schmelztiegelzentrums wird dadurch nur weiter beschleunigt, wobei ein besonderer Schwerpunkt auf einen eher ... aggressiven Anwendungsbereich gelegt wird. Je früher wir im Besitz dieser Waffen sind, desto weniger wird die Meinung der Galaxie für uns eine Rolle spielen.\n§HNeue Megastrukturverbesserung:§! §Y$galactic_crucible_4$§!" # Finishing special project for evil path
 infernals.1020.a: "Wir müssen uns auf einen Krieg vorbereiten."
 infernals.1020.a.tt: "- Die Erweiterung des §YGalaktischen Schmelztiegels§! muss oberste Priorität haben.\n- $unlocks_conduit_damage$"
 infernals.1020.b: "Unsere Rivalen werden das Feuer entfachen."
 infernals.1020.b.tt: "- Die Erweiterung des §Y$galactic_crucible_4$§!Galaktischen Schmelztiegels muss oberste Priorität haben.\n- $unlocks_conduit_damage$"
 infernals.1021.name: "Ein beständiges Glühen"
 infernals.1021.desc: "Das Galaktische Schmelztiegelzentrum wurde unwiderruflich umgebaut, damit es nicht mehr erweitert oder für destruktive Zwecke umfunktioniert werden kann. Der Verlust seines vollen Potenzials ist zwar bedauerlich, doch eine Fortsetzung dieses Kurses hätte eine Katastrophe und den Zusammenbruch aller diplomatischen Beziehungen zur Folge gehabt.\n\nGlücklicherweise ist es selbst in seiner eingeschränkten Form als $galactic_crucible_5$ eine äußerst starke Energiequelle, die unserem Wohlstand zugutekommen wird. Wir haben unsere eigenen Ambitionen gezügelt, um keine Grenze zu überschreiten, und uns damit eine Zukunft gesichert, in der wir mit der Galaktischen Gemeinschaft zusammenarbeiten und gleichzeitig weiterhin von dieser bemerkenswerten Technologie profitieren können.\n\n§HNeue Megastrukturverbesserung:§! §Y$galactic_crucible_5$§!" # Finishing special project for good path
 infernals.1021.a: "Wir alle profitieren von einer Zusammenarbeit."
 infernals.1021.b: "Wir finden Wohlstand in der Harmonie."
 infernals.1025.name: "Den Kern entflammen"
 infernals.1025.desc: "Unsere fortwährende Erforschung der §YKristallinen Entropie§! und der Umwandlung von Sternen in Rote Riesen brachte die Hypothese hervor, dass wir möglicherweise in der Lage sind, den galaktischen Kern selbst zu überhitzen und damit eine thermische Kaskade auszulösen, die sich über die gesamte Galaxie erstreckt und diese zu einem für uns viel lebensfreundlicheren Ort macht.\n\nWir haben sechs Systeme identifiziert, die den Kern umgeben und als operative Knotenpunkte für dieses Vorhaben dienen könnten. Diese Systeme liegen zwar außerhalb des galaktischen Hyperraumrouten-Netzwerks, doch wir können stabile Wurmlöcher erzeugen und uns so einen Zugang schaffen." # Reaching lv4
 infernals.1025.a: "Wir sind die Einzigen, die die Flammen überleben werden."
 infernals.1025.a.tt: "Andere Spezies werden versuchen, uns daran zu hindern. Wir sollten uns auf einen galaktischen Krieg vorbereiten."
 infernals.1025.b: "Die ganze Galaxie wird in den Flammen der Harmonie aufgehen."
 infernals.1025.b.tt: "Andere Spezies werden versuchen, uns daran zu hindern. Wir sollten uns auf einen galaktischen Krieg vorbereiten."
 infernals.1030.name: "Wettlauf zur Entzündung"
 infernals.1030.desc: "Unser $galactic_crucible_4$ ist nun voll bewaffnet und einsatzbereit. Mit der Fertigstellung der Wurmlochtunnel sicherten wir uns den Zugang zu allen sechs Systemen rund um den galaktischen Kern.\n\nWir können nun damit beginnen, den galaktischen Kern zu überhitzen. Andere Reiche könnten unsere Aktivitäten entdecken und versuchen, ebenfalls in diese Systeme vorzudringen, doch im Moment befinden wir uns in einer vorteilhaften Position und der Kern beugt sich unserem Willen.\n\n§HNutzt das Wurmloch, um die Galaktischen Kernsysteme zu sichern§!" # Reaching lv5, lanes open in 3 years!
 infernals.1030.a: "Beginnt damit, die Kernsysteme aufzuheizen."
 infernals.1030.a.tt: "§Y$entropy_conduit_plural$§! in die sechs Galaktischen Kernsysteme zu entsenden, erlaubt es uns, die ganze Galaxie auf einmal zu erhitzen. Wir müssen mit den Vorbereitungen beginnen."
 infernals.1030.b: "Unsere Zukunft ist hell wie Feuer."
 infernals.1030.b.tt: "$infernals.1030.a.tt$"
 infernals.1035.name: "Galaktischer Feueralarm"
 infernals.1035.desc: "Unsere Rivalen öffneten gewaltsam Hyperraumrouten zu den sechs Systemen in der Nähe des Galaktischen Kerns. Während wir den Galaktischen Kern weiter erhitzen, müssen wir uns nun auf Widerstand vorbereiten.\n\nDoch wir lassen uns nicht aufhalten. Die kalte Dunkelheit des Alls wird verschwinden und durch den strahlenden Glanz unserer aufstrebenden Zukunft ersetzt werden."
 # core is now connected with the galaxy!
 infernals.1035.a: "Sie werden uns niemals auslöschen."
 infernals.1035.b: "Sollen sie sich doch selbst in unser alles verschlingendes Feuer stürzen."
 infernals.1040.name: "Aufziehender Sturm"
 infernals.1040.desc: "Der galaktische Kern wird immer wärmer! Die Entropiewerte rund um das supermassive Schwarze Loch stiegen sprunghaft an, und es sendet nun Wellen thermischer Strahlung in benachbarte Systeme aus.\n\nKurz nachdem Panik deshalb ausbrach, fand ein Team mutiger Wissenschaftler aus mehreren Welten neue Hyperraumrouten, die den Rest der Galaxie mit den sechs Systemen verbinden, die den Kern umgeben. §Y[hyperthermia_empire.GetName]§! hat in diesen sechs Systemen offenbar eine Art Apparatur gebaut, die den Kern künstlich aufheizt. Ihre rücksichtslose Manipulation des Kerns droht, eine Kettenreaktion von Feuerstürmen in der gesamten Galaxie zu entfachen, die all jene verbrennen werden, die es nicht schaffen, ihre pyromanischen Ambitionen aufzuhalten.\n\nWenn wir überleben wollen, müssen wir in diese Systeme vordringen und ihnen die Kontrolle darüber entreißen. Uns steht eine Krise bevor und die Temperatur steigt stetig weiter an." # other empires learn about the core, forming a coalition war
 infernals.1040.a: "Wir müssen sie aufhalten!" # generic reply (declares war)
 infernals.1040.a.tt: "§LEine Krise von beispiellosem Ausmaß droht, unsere Galaxie zu verschlingen. Nur die vereinte Macht eines neuen galaxieweiten Bündnisses wird uns noch retten können.§!\n\nAlle Reiche, die sich der Krise widersetzen wollen, bilden eine §YKoalition§! und entfachen damit einen galaxieweiten Konflikt. Wir erklären §Y[hyperthermia_empire.GetName]§! den §RKrieg§!."
 infernals.1040.b: "Brennt, ihr Schwächlinge!" # Genocidals reply
 infernals.1040.b.tt: "§LIn Krisenzeiten ist jede Spezies auf sich allein gestellt. Wir sind stark genug, um das Problem aus eigener Kraft zu lösen.§!"
 infernals.1040.c: "Sie sind wie wir!" # Infernals reply
 infernals.1040.c.tt: "§LDie Methoden von §Y[hyperthermia_empire.GetName]§! entsprechen unserer eigenen Vision einer erneuerten Galaxie. Möglicherweise bleibt uns die volle Wucht dessen erspart, was andere als Katastrophe betrachten würden.§!"
 infernals.1040.d: "Das ist nicht unser Problem." # neutral reply
 infernals.1040.d.tt: "§LEin Reich, das mit dem Feuer spielt, ist keine Seltenheit. Auch diese Krise wird wie alle Dinge vorübergehen. Es gibt keinen Grund, uns einzumischen.§!"
 infernals.1042.name: "Eskalation: §RZur Krise erklärt§!"
 infernals.1042.desc: "Die größten Veränderungen forderten historisch gesehen schon immer gewisse Opfer. Dennoch betrachtet die Galaktische Gemeinschaft unsere Arbeit als Bedrohung und nicht als Notwendigkeit. Als Reaktion darauf mobilisierte sich eine vereinte Militärkoalition gegen uns.\n\nDa ihre erklärte Absicht unsere Vernichtung ist, bleibt uns keine andere Wahl: Jeder Vorstoß in Richtung Galaktischem Kern oder unserem Galaktischen Schmelztiegel muss mit überwältigender Feuerkraft begegnet werden.\n\nUnsere Vision entflammte die Sterne selbst. Mögen jene, die sich ihr widersetzen, in dem Sturm untergehen, den wir heraufbeschworen haben.\n\n§HVerteidigt die Galaktischen Kernsysteme und der Sieg ist uns sicher!§!"
 infernals.1042.a: "Das Ergebnis ist unvermeidlich."
 infernals.1043.name: "Ruf zu den Waffen: §RZur Krise erklärt§!"
 infernals.1043.desc: "Angesichts der Bedrohungen durch den sich immer weiter aufheizenden galaktischen Kern rief die Galaktische Gemeinschaft zu einer einheitlichen Reaktion gegen §Y[hyperthermia_empire.GetName]§! auf, da ihr radikales Vorgehen, die Temperatur der Galaxie zu erhöhen, alles bekannte Leben gefährdet.\n\nSollte nichts dagegen unternommen werden, droht unzähligen Zivilisationen das Aussterben. §Y[hyperthermia_empire.GetName]§! muss sich nun jener galaktischen Koalition stellen, die sich aus der Not heraus bildete.\n\nDie Kämpfe haben bereits begonnen und Billionen von Leben stehen auf dem Spiel.\n\n§HErobert die Galaktischen Kernsysteme oder alles ist verloren!§!"
 infernals.1043.a: "Mobilisiert die Flotten!"
 infernals.1045.name: "Wettlauf gegen die Zeit"
 infernals.1045.desc1: "Der Ausbruch des kaskadierenden Feuersturms steht kurz bevor. Schon bald wird der galaktische Kern so weit erhitzt sein, dass all unsere Feinde vernichtet werden und unsere Herrschaft über das All gefestigt wird.\n\nDie Galaxie weigert sich jedoch, unsere strahlende Zukunft zu akzeptieren. Über neue Hyperraumrouten plant man, in unsere Stützpunkte einzufallen und alles zu zerstören, was wir aufgebaut haben. Und wozu das alles? Um die kalte, stagnierende Dunkelheit zu bewahren?\n\nWir dürfen nicht zulassen, dass man sich einmischt. Wir müssen die Stellung im Kern halten, bis der Feuersturm entfacht wurde und unsere Feinde alle zu Asche verbrennt." # last stage of global situation - crisis
 infernals.1045.desc2: "Der galaktische Kern heizt sich wegen der fanatischen Besessenheit von §Y[hyperthermia_empire.GetName]§!, die Sterne in Brand zu setzen, immer weiter auf. Bei der derzeitigen Geschwindigkeit wird der Feuersturm alle vernichten, die sich ihnen entgegenstellen, und nahezu alles Leben in der Galaxie auslöschen.\n\nMit ihnen zu verhandeln, ist unmöglich. Wenn wir überleben wollen, müssen wir die Quelle angreifen: das galaktische Kernsystem, wo ihre Macht am größten ist. Nur dann kann §Y[hyperthermia_empire.GetName]§! aufgehalten werden.\n\nDas Schicksal der ganzen Galaxie steht auf dem Spiel. Es ist an der Zeit, §Y[hyperthermia_empire.GetName]§! zu zeigen, dass jene, die mit dem Feuer spielen, selbst brennen werden." # last stage of global situation - others
 infernals.1045.a: "Wir werden die Stellung halten."
 infernals.1045.a.tooltip: "Wir müssen die Kontrolle über die sechs Kernsysteme behalten, um den Sieg zu erringen."
 infernals.1045.b: "Wir müssen sie ein für alle Mal auslöschen."
 infernals.1045.b.tooltip: "Wir müssen die sechs Kernsysteme angreifen und die Brandkerne von §Y[hyperthermia_empire.GetName]§! zerstören. Sollten wir dies nicht schaffen, werden wir verbrennen."
 infernals.1055.name: "Die Galaxie gehört uns!"
 infernals.1055.desc: "Wir entfachten die Flammen des Sieges vom galaktischen Kern bis zu den äußersten Sternen und der Feuersturm verbrannte all unsere Feinde zu Asche. Ihnen fehlten schlicht die Vision und der Mut, sich jener glorreichen Zukunft zu stellen, die wir nun für uns beanspruchen. Die Galaxie gehört uns!\n\nIn dieser neuen Ordnung des Feuers brodelt das hell leuchtende Magma der Planeten, angeheizt von der glühenden Hitze Roter Riesen. Die Entropie durchströmt jedes System und wartet nur darauf, von uns geerntet und unserem Willen unterworfen zu werden. Mit jedem Tag gewinnen wir an Wohlstand und Stärke ... Wir sind unaufhaltsam!\n\nWir haben die gesamte Galaxie verschlungen und sie zu einem leuchtenden Symbol unserer Herrschaft in der Leere umgeformt. Eines Tages werden auch andere Galaxien auf unserem Scheiterhaufen brennen." # crisis won
 infernals.1055.a: "Diese neue Galaxie gehört uns."
 infernals.1055.b: "Am Ende vereinen sich alle Feuer zu einem einzigen."
 infernals.1055.c: "Unsere feurige Heimat hat keine Verwendung für lauwarme Schwächlinge." #Scorched world heralds (genocidal Infernal)
 infernals.1055.d: "Unsere Entschlossenheit wurde endlich belohnt." #Infernal Fire Cult
 infernals.1055.e: "Endlich haben wir die kalte Dunkelheit aus der Galaxie vertrieben." #Other Infernals
 infernals.1055.f: "Endlich sind unsere erbärmlichen Rivalen zu Asche geworden." #Generic Genocidal
 infernals.1052.name: "$galactic_crucible_4$ erobert"
 infernals.1052.desc: "Mit der Eroberung des §H[crucible_system.GetName]§!-Systems übernahmen unsere Truppen auch die Kontrolle über den Galaktischen Schmelztiegel, der um den lokalen Stern herum errichtet wurde. \n\nDer Verlust dieser Megastruktur zerstört jede Hoffnung ihrer Schöpfer, die Galaxie gewaltsam zu erobern."
 infernals.1052.a: "Zerstört ihn!"
 infernals.1052.a.tt: "Der §YGalaktische Schmelztiegel§! wird unwiderruflich zerstört und kann nicht mehr repariert werden."
 infernals.1052.b: "Wir könnten ihn für unsere eigene Pläne nutzen."
 infernals.1052.b.tt: "Wandelt den §YGalaktischen Schmelztiegel§! zu einem §YGalaktischen Schmelztiegelinstitut§! um, das $r_alloys$ produziert."
 infernals.1053.name: "$galactic_crucible_4$ erobert"
 infernals.1053.desc: "Die Eroberung des §H[crucible_system.GetName]§!-Systems enthüllte die finsteren Pläne von §H[crucible_builders.GetName]§!: die vollständige Vernichtung der gesamten Galaxie durch einen Feuersturm.\n\nVorerst wurde die Maschine, die über das Potenzial verfügt, dieses Massenaussterben zu verursachen, außer Betrieb genommen. Sobald der Krieg vorbei ist, sollten wir unsere verbliebenden Ressourcen nutzen, um diese gigantische Megastruktur ein für alle Mal zu zerstören."
 infernals.1053.a: "Wir müssen diesen Krieg schnell beenden!"
 infernals.1053.b: "Was für ein faszinierendes Bauwerk."
 infernals.1056.name: "Galaktische Wiedergeburt"
 infernals.1056.desc: "Während wir damit beschäftigt waren, den Funken zu entzünden, der die Galaxie in Flammen setzen würde, setzte §Y[hyperthermia_empire.GetName]§! die bereits umgewandelten Sterne als Waffe ein, um die Galaxie für immer zu verändern.\n\nWir begrüßen diese neue Utopie, aber wir sollten ihre nächsten Schritte genau beobachten, während sie ihren Einfluss auf die Galaxie ausweiten."
 infernals.1056.a: "Unermessliche Macht führt unweigerlich zu Konflikten."
 infernals.1056.b: "Eine neue Bedrohung hat sich erhoben."
 infernals.1056.c: "Eine überraschende Wendung der Ereignisse."
 # Relic
 r_crystallized_singularity: "Kristallisierte Singularität"
 r_crystallized_singularity_desc: "Verzerrt durch die Feuer der Galaxie knistert diese Singularität mit einer verführerischen Hitze. Sollten wir sie nicht sorgfältig abschirmen, wird sie unweigerlich Pilger anziehen, selbst in die trostlosesten Welten. Wer sie erblickt, den überkommt das Gefühl, ein einfacheres Leben führen zu wollen ... näher an den Flammen."
 r_crystallized_singularity_effect_tt: "\n- §G10%§! unserer £physics_research£ §Y$physics_research$§! produziert zusätzliche $r_energy$."
 r_crystallized_singularity_ls_effect_tt: "- Schaltet die Entscheidung \"§Y$decision_gh_life_seeding$§!\" für kolonisierbare Welten frei, um dort neue primitive Zivilisationen zu erschaffen."
 crystallized_singularity_mod: "$r_crystallized_singularity$"
 crystallized_singularity_mod_desc: "$r_crystallized_singularity_desc$"
 decision_gh_life_seeding: "Lebensaussaat"
 decision_gh_life_seeding_desc: "Unsere Umwandlung der Galaxie führte zum Aussterben der meisten Spezies. Wir haben nun das Privileg, das Leben nach unserem Bild neu zu erschaffen."
 decision_gh_life_seeding_limit: "$TRIGGER_FAIL$§RAuf diesem Planeten gibt es bereits eine primitive Zivilisation.§!"
 decision_gh_life_seeding_colony: "$TRIGGER_FAIL$§RKann in einem System mit einer Kolonie nicht durchgeführt werden.§!"
 decision_gh_life_seeding_effect: "Erschafft eine primitive Zivilisation nach unserem Abbild.\n\n§HAktivierungsbegrenzung:§! [from.gh_life_seeder_var]/3"
 # Grand Archive Specimen
 infernal_burning_gem: "Brennender Edelstein"
 infernal_burning_gem_desc_short: "Einer der ersten funktionierenden Prototypen, die von [GetName] zur Nutzung der Entropie entwickelt wurden."
 infernal_burning_gem_desc_details: "Der weiße Schimmer dieses Kristallfragments, den die meisten visuellen Systeme als schwaches Matt identifizieren würden, täuscht über die unglaubliche Energiemenge hinweg, die noch immer darin enthalten ist. Auch wenn neuere Technologien selbst diese Energiemenge bei Weitem übertreffen, können wir aus der Konstruktion und den Eigenschaften noch viel lernen."
 # Timeline
 TIMELINE_EVENT_GH_START: "Feuersturm\n§L[GetDate]§!"
 TIMELINE_EVENT_GH_START_TOOLTIP: "§HZur Krise geworden§!\n§YKrisenereignis§!\n\n[EVENT_TARGET_0.GetName] hüllte das eigene Reich in Flammen und hat begonnen, das Schicksal der Galaxie zu kontrollieren. Wer diese Vision nicht teilt, wird in einen lodernden Eroberungskrieg verwickelt werden, der nichts als Asche hinterlässt."
 TIMELINE_EVENT_GH_END: "Verschlingende Flammen\n§L[GetDate]§!"
 TIMELINE_EVENT_GH_END_TOOLTIP: "§HGalaxie besiegt§!\n§YKrisenereignis§!\n\nDas, was als Funke begann, hat die gesamte Galaxie entzündet. Wer sich uns widersetzte, ist zusammen mit seiner Geschichte zu Asche verbrannt."
