 crisis_conduit_stop_desc: ""
 sm_gravitational_centrifuge: "Schwerkraftzentrifuge"
 sm_gravitational_centrifuge_desc: "Diese Struktur nutzt die Schwerkraft, um Abfallmaterial auf molekularer Ebene zu zerkleinern und ein entropisches Plasma zu erzeugen, das sich für die weitere Verwendung kristallisieren lässt."
 gravitational_centrifuge_tt: "Schließt das Krisenziel \"§H$crisobj_entropy_starbase_name$§!\" ab"
 requires_multiple_stars_or_or_bh: "§RBenötigt entweder ein §Ybinäres§! oder §Ytrinäres§! System oder ein §Y$pc_black_hole$§!.§!"
 # Conduit Starforming
 crisis_conduit_buff: "Sternenüberwachung"
 crisis_conduit_buff_desc: "Die Atmosphäre des lokalen Sterns macht einen schnellen Wandel durch, was zu einer systemweiten Sonneneruption führt. Für manche Zivilisation kann dies katastrophale Folgen haben, aber wir können perfekt gedeihen."
 TERRAFORM_ORDER: "Stern transformieren"
 TERRAFORM_ORDER_DESC: "Dies verwandelt den Zielstern langsam in einen §Y$pc_m_giant_star$§!."
 TERRAFORM_ORDER_RESEARCH: "Indem wir das Energiepotenzial der kristallisierten Entropie nutzen, lassen sich kleinere Sterne zu mächtigen Roten Riesen umwandeln."
 FLEETORDER_TERRAFORM_BUTTON: "$TERRAFORM_ORDER$"
 FLEETORDER_TERRAFORM: "Sternenschmiedet $PLANET|Y$ ($PROGRESS|Y%0$)"
 FLEETORDER_BOOST_STAR: "Stern entflammen"
 CAN_NOT_TERRAFORM_STAR: "$TRIGGER_FAIL$Muss ein Primärstern sein."
 CAN_NOT_CRISIS_TERRAFORM_STAR_CLASS: "$TRIGGER_FAIL$Ungültige Sternenklasse für eine Umwandlung."
 CAN_NOT_CRISIS_TERRAFORM_STAR_MEGASTRUCTURE: "$TRIGGER_FAIL$Eine Megastruktur blockiert die Umwandlung."
 VALID_TERRAFORM_STAR: "Stern kann terraformiert werden."
 STATION_CAN_NOT_TERRAFORM_STAR: "Es muss sich ein Brandkern im Orbit befinden."
 # Objectives
 crisobj_own_volcanics_name: "Besitzt Vulkanische Welten"
 crisobj_own_volcanics_desc: "Die immer weiter steigende Hitze im System befeuert den Vulkanismus und treibt unsere feurige Mission voran. Wir sollten die Kolonisierung von §YVulkanischen Welten§! priorisieren, um jenen, die sich uns widersetzen, einen Schritt voraus zu sein.\n\nGeneriert jedes Jahr passiv §Y$entropy_crystals$§!, die mit der Anzahl an kolonisierten §YVulkanischen Welten§! skaliert."
 crisobj_create_volcanics_name: "Erschafft Vulkanische Welten"
 crisobj_create_volcanics_desc: "Den planetaren Vulkanismus in der Galaxie zu verbreiten, kurbelt unsere auf Kristalliner Entropie basierende Wirtschaft an. Mit den richtigen Terraforming-Technologien lösen wir auf jedem beliebigen Planeten nachhaltige vulkanische Aktivität aus.\n\nTerraformiert einen Planeten in eine §Y$pc_volcanic$§!"
 crisobj_own_red_stars_name: "Besitzt Rote Sterne"
 crisobj_own_red_stars_desc: "Wir sollten uns auf die Besiedlung von Systemen mit Roten Sternen konzentrieren. Ihre riesige Oberfläche ist ideal für die Gewinnung von Wärmeenergie geeignet.\n\nGeneriert jedes Jahr passiv §Y$entropy_crystals$§!, die mit der Anzahl an §Y$pc_m_star$en§! oder §Y$pc_m_giant_star$en§! skaliert, die innerhalb unserer Grenzen liegen."
 crisobj_create_red_stars_name: "Erschafft Rote Sterne"
 crisobj_create_red_stars_desc: "Durch das Bündeln Kristalliner Entropie lassen wir Sterne zu Roten Riesen heranwachsen und befeuern so den Aufstieg unseres Reichs.\n\nSterne, die durch §Y$entropy_conduit_plural$§! terraformiert werden, werden zu einem §Y$pc_m_giant_star$§!"
 crisobj_planet_firestorm_name: "Planetare Brandstiftung"
 crisobj_planet_firestorm_desc: "Es ist an der Zeit, dass wir unsere Rivalen die wahre Bedeutung unserer Vorherrschaft lehren und einen Feuersturm über ihren Welten entfachen, der nichts als Asche zurücklassen wird.\n\nBombardiert eine Kolonie mit einem §Y$bombardment_firestorm$§!, um §R100% Verwüstung§! anzurichten"
 crisobj_lens_beam_impact_name: "Störungsschiffe"
 crisobj_lens_beam_impact_desc: "Kalte und gemäßigte Welten nutzen uns nichts. Wir müssen sie umformen, indem wir ihre Oberfläche in etwas verwandeln, was unseren Bedürfnissen entspricht.\n\nNutzt die Waffe \"£ship_xl_slot£ §Y$LENS_FLARE_BEAM$§!\", die man bei Schiffen der §Y$entropy_conduit$§!- oder §Y$ember_battleship$§!-Klasse ausrüsten kann, um feindliche Welten zu bombardieren."
 crisobj_entropy_starbase_name: "Besitzt Schwerkraftzentrifugen"
 crisobj_entropy_starbase_desc: "Schwerkraftzentrifugen helfen uns dabei, mehr $entropy_crystals$ zu sammeln.\n\nBaut das Sternenbasen-Gebäude \"§Y$sm_gravitational_centrifuge$§!\" in einem §Ybinären§! oder §Ytrinären§! System oder einem §YSchwarzen Loch§!."
