 entropy_crystals_crisis_level_unlocked: "Auf $LEVEL$ erhalten wir die folgenden Belohnungen:\n"
 entropy_crystals_crisis_level_desc: "Um in den Krisenstufen voranzukommen, müssen wir $entropy_crystals$ sammeln und den §YGalaktischen Schmelztiegel§! errichten."
 entropy_crystals_crisis_level_unlock: "Verfügt über: £entropy_crystals£ §Y$CURRENCY$§! $entropy_crystals$"
