 entropy_crystals_crisis_description_title: "$ap_galactic_hyperthermia$"
 entropy_crystals_crisis_description: "$menace_crisis_description_intro$\n\nEine neue Art der Energieumwandlung erlaubt es uns, unsere Energieerzeugung erheblich zu steigern. Wir müssen das Feuer der Sterne selbst nutzen, um die Galaxie zu entfachen."
 entropy_crystals_crisis_howto_title: "Energiequelle"
 entropy_crystals_crisis_howto: "Das Verfolgen von §HKrisenzielen§! generiert £entropy_crystals£ §H$entropy_crystals$§!, die man wiederum nutzen kann, um den Galaktischen Schmelztiegel zu verbessern und die nächste Krisenstufe freizuschalten."
 # Level
 crisis_hyperthermia_already_ongoing: "Ein anderes Reich ist bereits dabei, die Kontrolle über den Galaktischen Kern zu übernehmen."
 crisis_hyperthermia_already_happened: "Ein anderes Reich kontrolliert den Galaktischen Kern bereits und hat begonnen, die Galaxie neu zu formen."
 crisis_hyperthermia_level_1: "§RBedenken§!"
 crisis_hyperthermia_level_1_desc: "$crisis_level_1_desc$"
