 # Ascension Perk
 ap_galactic_hyperthermia: "Galaktische Hyperthermie"
 ap_galactic_hyperthermia_desc: "Das Universum entstand aus Flammen, ist jedoch zu einem dunklen, feindseligen Ort heruntergekühlt. Wir müssen das Feuer neu entfachen, auch wenn andere dabei untergehen."
 must_be_infernals: "$TRIGGER_FAIL$Unsere Bevölkerung muss aus Thermophilen bestehen."
