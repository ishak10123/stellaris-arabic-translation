 ENTROPY_WORMHOLE_GALACTIC: "Merkwürdiges Wurmloch"
 ENTROPY_WORMHOLE_DESC: "Dieses System hat ein §YWurmloch§!, das mit $DEST|Y$ verbunden ist"
 ENTROPY_WORMHOLE_DESC_UNEXPLORED: "Dieses System enthält ein §Runerforschtes§! §YWurmloch§!"
