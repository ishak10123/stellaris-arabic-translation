 EXIT_BYPASS_ENTROPY_WORMHOLE: "$BYPASS_TYPE$ausgang"
 personality_hyperthermia_empire: "Thermarchie"
 personality_hyperthermia_empire_desc: "Dieses Reich verfolgt eine Ideologie, die Energie, Entropie und das Sternenfeuer verherrlicht. Es erobert nicht: Es kauterisiert und formt die Galaxie durch Hitze und Willenskraft."
 triggered_opinion_hyperthermia_empire: "$personality_hyperthermia_empire$-Reich"
 mod_job_metallurgist_naval_cap_add: "£mod_country_naval_cap_add£ $MOD_COUNTRY_NAVAL_CAP_ADD$ durch £job_foundry£ [GetAlloyProducerPlural]-Jobs"
