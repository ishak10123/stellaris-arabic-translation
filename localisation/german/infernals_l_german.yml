 d_rugged_landscape: "£blocker£ Zerklüftete Landschaft"
 d_rugged_landscape_desc: "Ein weitläufiges Gebiet, das ständig von tektonischen Aktivitäten und Vulkanausbrüchen heimgesucht wird."
 # Planet Modifiers
 volcanic_critters: "Extremophile Lebensformen"
 volcanic_critters_desc: "Selbst in einer extrem heißen Welt voll tödlicher Lava findet das Leben einen Weg."
