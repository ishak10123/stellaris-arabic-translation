 councilor_corporate_imbuement_officer: "Mimetischer Agenturoffizier"
 councilor_corporate_imbuement_officer_desc: "Der $TITLE$ fungiert als Koordinator zwischen den Stakeholdern und der Physik- und Ingenieur-Forschung."
 # Bombardment Stances
 bombardment_firestorm: "Feuersturm"
 bombardment_firestorm_desc: "Bei der Feuersturm-Bombardierung werden Teile des Planeten in Brand gesteckt, um ein glorreiches Feuer zu entfachen, das die Entschlossenheit stärkt und die Gesellschaft eint."
