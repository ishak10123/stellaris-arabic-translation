 job_cremator_desc: "Einäscherer überwachen den heiligen Ritus der Flamme und führen die Verstorbenen durch das Feuer zu ihrer letzten Ruhestätte. Als Hüter dieses ehrwürdigen Übergangsrituals dienen sie dort, wo Tod und Transzendenz aufeinandertreffen."
