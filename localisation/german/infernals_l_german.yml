 # Civic - Fire Cult
 civic_pyrolatry: "Feuerkult"
 civic_pyrolatry_desc: "Diese Gesellschaft wurde über viele Generationen hinweg durch eine extreme Not geprägt und glaubt an ein Überleben durch Einheit und an eine Einheit durch Überleben. Nur wer aus dem Feuer geboren wird, übersteht die Kälte und die Gleichgültigkeit der Galaxie."
 civic_pyrolatry_effects: "- Die Bewohnerproduktion an £unity£ §Y$unity$§! erhöht sich antiproportional zur $HABITABILITY$ (bis auf maximal §G500%§!).\n- Die Fraktion \"['concept_fire_cult']\" entsteht kurz nach dem Spielstart.\n- Ersetzt £job_priest£ §Y$job_priest_plural$§! durch £job_fire_dancer£ ['concept_inf_fire_dancers'].\n- Ersetzt £job_politician£ §Y$job_politician_plural$§! durch £job_fire_oracle£ ['concept_inf_fire_oracles'] auf Planeten mit weniger als §R50%§! $HABITABILITY$.\n- Erlaubt die Rekrutierung von §Y$ember_legion$en§!-Armeen auf Planeten mit weniger als §R20%§! $HABITABILITY$.\n- Gewährt Zugang zur planetaren Entscheidung \"§Y$decision_blazing_scourge$§!\", die Blocker der Art \"£blocker£ ['concept_dec_blazing_scourge']\" erschafft.\n- Synergiert mit folgenden Staatselementen: $civic_superstitious_beliefs$, $civic_exalted_priesthood$, $civic_death_cult$, $civic_aristocratic_elite$ und $civic_merchant_guilds$."
