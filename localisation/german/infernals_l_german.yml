 # Civic - Galvanic Empire
 civic_galvanic_empire: "Galvanisches Reich"
 civic_galvanic_symbiosis: "Galvanische Synthese"
 civic_galvanic_symbiosis_desc: "§RWARNUNG: Blockiert den ['concept_synthetic_ascension', Synthetischen Aufstieg].§!\n\nDiese Gesellschaft ist in der Lage, gewöhnliche Legierungen zu £sr_living_metal£ §YLebendem Metall§! zu synthetisieren und seine Festigkeit bei gleichzeitigen formverändernden Eigenschaften direkt in ihre Technologie einfließen zu lassen."
 civic_galvanic_symbiosis_effects: "$civic_galvanic_tt$\n- $civic_galvanic_job_tt$"
 civic_corporate_galvanic_symbiosis: "Biometallkartell"
 civic_corporate_galvanic_symbiosis_desc: "$civic_galvanic_symbiosis_desc$"
