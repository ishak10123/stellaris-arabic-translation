 infernals.35.name: "In Flammen gehüllt"
 infernals.35.desc: "Die Oberfläche von §H[from.GetName]§! brach auf und unerträgliche Hitze stieg aus der Tiefe empor. Die Transformation ging rasch vonstatten und verwandelte den gesamten Planeten: Berge stürzten ein, Ozeane kochten und der Himmel färbte sich rot.\n\nVon den einst blühenden Biomen des Planeten bleibt keine Spur mehr. Nur extremophile Lebensformen können diesen Ort noch als ihre Heimat bezeichnen."
