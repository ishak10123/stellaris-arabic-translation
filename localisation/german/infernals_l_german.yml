 volcanic_crystal_lake: "Kristallsee"
 volcanic_crystal_lake_desc: "Riesige Kristalle steigen langsam aus diesem Lavasee empor. Durch die Hitze und das warme Licht vibrieren sie sanft."
 volcanic_hollow_planet: "Hohler Planet"
 volcanic_hollow_planet_desc: "Unter der Oberfläche befinden sich riesige Höhlen, hohle Echos eines von Feuer geformten Planeten."
 volcanic_lavafall: "Lavafälle"
 volcanic_lavafall_desc: "Die Lava kann ungehindert fließen und ergießt sich in einem natürlichen Feuerwerk über einen steilen Abhang."
 volcanic_oasis: "Höllische Oase"
 volcanic_oasis_desc: "Ein kleiner, grüner Kontinent, den eine hohe Bergkette vor dem tobenden Inferno dahinter schützt. Die einzigartige Flora und Fauna steht in starkem Gegensatz zu der Verwüstung, die gleich hinter den Bergen liegt."
 fractalized_entropy_category: "Fraktalisierte Entropie"
 fractalized_entropy_category_desc: "Unsere Sensoren entdeckten ein seltsames Objekt, das durch das Asteroidenfeld treibt. Wir wissen nicht, wo es herkommt, doch der Kurs ist stabil, was es uns erlaubt, es abzufangen und zu untersuchen."
 infernals.3205.name: "Fraktalisierte Entropie"
 infernals.3205.desc: "[Leader.GetName] berichtete von der Entdeckung eines starren, eckigen Konstrukts, das in einer stabilen Umlaufbahn treibt. Das Objekt besteht aus einem uns unbekannten Material und das Äußere weist ein facettenartiges Muster auf, das an kristalline Strukturen erinnert. Es widersetzte sich allen Versuchen, seine Zusammensetzung zu analysieren. Es schien in seiner Flugbahn fest fixiert zu sein, blieb ständig dem Mutterstern zugewandt und ließ sich weder manipulieren noch drehen.\n\nIm Zuge eines kontrollierten Experiments sandte unser Forschungsschiff einen konzentrierten Energieimpuls aus. Das Objekt zerbrach und teilte sich in zwei symmetrische Hälften, von denen sich jede zu einer kleineren Nachbildung des Originals umformte. Nachfolgende Impulse führten zu identischen Ergebnissen: Teilung, Replikation und konsistente Miniaturisierung.\n\nDie Wolke aus Miniaturkonstrukten fixierte sich ebenfalls in der Umlaufbahn. Jedes Fragment behielt die genaue Ausrichtung und Geometrie bei, die es ursprünglich hatte und der Schwarm als Ganzes ahmte die Silhouette der ursprünglichen Struktur nach.\n\nDieses Phänomen ist nach wie vor einzigartig und unerklärlich. Alle gesammelten Telemetriedaten wurden zur weiteren Analyse archiviert."
 infernals.3205.a: "Überwacht die Fragmente weiter."
 # Archaeological Sites
 from_the_ashes_site: "Aus der Asche"
 from_the_ashes_site_desc: "Die Oberfläche von [Planet.GetName] ist glühend heiß und unterstützt eigentlich kein biologisches Leben. Bilder von eindeutig künstlichen Ruinen zogen daher die Aufmerksamkeit unserer [GetScientistPlural] auf sich. Eine archäologische Ausgrabung könnte enthüllen, wie sie hierhergekommen sind und was mit ihnen passiert ist."
 infernals.2700.name: "Vergessenes Reich"
 infernals.2700.desc: "Ursprünglich gingen wir davon aus, dass die auf [From.Planet.GetName] gefundenen Ruinen aus Stein gebaut waren, doch eine Ausgrabung und eine weitere Analyse deuten nun darauf hin, dass viele der Strukturen dieser einst verlorenen Stadt aus versteinertem organischen Material bestehen, die eine Ähnlichkeit zu Holz aufweisen. Wir konnten keine Spuren dafür finden, dass ein solches Material heute noch irgendwo auf dme Planeten existiert. Kleinere Artefakte bestehen aus Rohmetallen, Glas und ähnlichen versteinerten organischen Stoffen, und unsere [GetScientistPlural] fanden auch Fossilien von heimischen Lebewesen, die heute ausgestorben sind.\n\nOffenbar wurde der Planet von einer Zivilisation bewohnt, als das Klima noch viel gemäßigter war. Wir wissen nicht, ob sie geflohen ist, bevor der Planet diesen Zustand annahm, oder ob sie in ihren letzten Jahren den gewaltsamen Wandel ihrer Welt miterlebte."
 infernals.2705.name: "Zeugen des Untergangs"
 infernals.2705.desc: "Bei der Ausgrabung der zerstörten Stadt auf [From.Planet.GetName] wurden mehrere Orte von kultureller Bedeutung freigelegt, die mit komplizierten Mustern verziert sind - möglicherweise eine Art Schriftsprache. Am spannendsten war jedoch der Fund einer unterirdischen Kammer, in der wir dünne Bronzetafeln mit dicht aneinandergereihten Schriftzeichen fanden. Trotz der Untauglichkeit von Bronze als Speichermedium scheint es sich hierbei um ein gemeinschaftliches Archiv zu handeln.\n\nWir haben bereits mit der Übersetzung begonnen, während unsere Archäologen weiter die Stadt untersuchen. Die Frage nach dem endgültigen Schicksal dieser Zivilisation bleibt offen."
 infernals.2710.name: "Herannahende Katastrophe"
 infernals.2710.desc: "Unser Ausgrabungsteam auf [From.Planet.GetName] fand den Eingang zu einem düsteren Grabgewölbe. In diesem stieß man auf unzählige ausgehobener Gräber, in denen die mumifizierten Überreste einer uns unbekannten Spezies in Hohlräumen in den Wänden ruhten - jeweils drei oder vier von ihnen gestapelt. Die Grabbeigaben - darunter primitive Feuerwaffen, einfache Glasfernrohre und aufwendige Textilstickereien - verschafften uns Einblicke in ihre technologische Entwicklung.\n\nDie Kreuzungen innerhalb des Gewölbes werden von Statuen bewacht, die offenbar die ausgestorbene lokale Fauna repräsentieren. Diese Kreaturen haben einen runden, gewölbten Panzer, vier Beine und einen kleinen abgeflachten Kopf. Bei besser erhaltenen Exemplaren sind sie in gebückter Haltung dargestellt, wobei sie ihren Panzer nutzen, um sich vor flammenartigen Schnitzereien im Material über ihnen zu schützen.\n\nWir werden die wahre Bedeutung dieser Kunstwerke wohl nie gänzlich verstehen, doch sie könnten darstellen, dass sich diese Gesellschaft ihres bevorstehenden, feurigen Endes bewusst war. Weitere Ausgrabungen der Ruinen könnten Aufschluss darüber geben, was genau vorgefallen ist."
 infernals.2715.name: "Feuriger Untergang"
 infernals.2715.desc: "Bei unseren umfangreichen Untersuchungen der zerstörten Stadt auf [From.Planet.GetName] fanden wir heraus, dass die Zivilisation den Zusammenbruch ihres Ökosystems miterlebte und wusste, dass ihre letzten Tage immer näher rückten. Ursprünglich wurden Aufzeichnungen offenbar auf Papier niedergeschrieben, bevor man durch den heißen Vulkanascheregen gezwungen wurde, auf Bronzetafeln umzusteigen. Künstlerische Darstellungen von Tieren, die sich vor den Flammen verstecken, zeugen von den Versuchen dieser Spezies, sich mit ihrem eigenen Ende auseinanderzusetzen.\n\nBei den Ausgrabungen wurde auch ein nahezu perfekt erhaltenes Exemplar einer der Wächterstatuen dieser Katakomben gefunden. Die eingravierten Flammen leuchten von innen heraus, was dieses Stück besonders beeindruckend macht.\n\nWir fanden zudem Hinweise darauf, dass man versuchte, den Vulkanismus zu stoppen. Straßen und zerbrochene Karren zeugen davon, dass die Bewohner Geröll zur nächsten Vulkankaldera transportierten und dort abkippten, um den Vulkan zu verschließen. Sie schafften es damit jedoch nicht, ihr endgültiges Schicksal abzuwenden. Heute gibt es auf diesem Planeten kein mehrzelliges Leben mehr.\n\nDer Untergang dieser Zivilisation zeigt uns einmal mehr, wie hilflos man sein kann, wenn man mit einem Problem konfrontiert wird, das weit über den eigenen Möglichkeiten liegt."
 infernals.2715.a: "Welch tragisches Ende."
 infernals.2715.b: "Wir können aus ihren Fehlern lernen."
 inferno_temple_site: "Infernotempel"
 inferno_temple_site_desc: "Weit weg von den Bevölkerungszentren auf [Planet.GetName], zwischen aktiven Vulkanen gelegen, befindet sich ein uralter zerstörter Tempel. Seine Geschichte zu ergründen, wird uns eventuell weitere Einblicke in die Kultur der auf diesem Planeten lebenden Zivilisation geben."
 infernals.2720.name: "Uralte Zeichen"
 infernals.2720.desc: "Im gesamten Tempel gibt es Spuren eines Kampfes und halb im Boden vergraben befinden sich sterbliche Überreste jener empfindungsfähigen Spezies, die hier einst gelebt haben muss. Es scheint, als sei der Tempel in Brand gesteckt und verlassen worden. Unser Erkundungsteam stellte zudem fest, dass die Einheimischen das gesamte Gebiet meiden, da sie glauben, es sei verflucht.\n\nDie Mauern des Feuertempels haben das Innere weitgehend geschützt. Zahlreiche aufwendige Fresken und Schnitzereien zeigen ein wiederkehrendes Motiv eines Kreises aus gewundenem Feuer mit einem dunklen Einschnitt in der Mitte. In einer der Darstellungen reißt eine zweibeinige Gestalt eines von vier solcher Augen heraus und wirft es auf die Welt, wodurch das zentrale Motiv entsteht. Aufgrund dieser Erkenntnisse gaben wir dem Tempel den Namen \"Höllenauge\".\n\nWeitere Ausgrabungen geben uns hoffentlich Aufschluss darüber, welche Glaubensvorstellungen mit dieser seltsamen Figur verbunden waren."
 infernals.2725.name: "Geopferte Augen"
 infernals.2725.desc: "Weitere Ausgrabungen im Tempel des Höllenauges ergaben Hinweise auf eine Art Opferzeremonie: große kreisförmige Gruben, die mit Asche und Holzkohle gefüllt waren und eine Plattform in der Mitte besaßen, die das Höllenauge und seine Pupille nachahmten. Eine Molekularanalyse zeigte, dass die Asche und die Holzkohle mit tierischem Gewebe durchsetzt ist.\n\nOb es sich bei diesen Opfern um wilde oder domestizierte Tiere oder sogar um die Einheimischen selbst handelte, lässt sich nicht ohne Weiteres feststellen.\n\nWir haben Kundschafter in die verschiedenen heutigen Bevölkerungszentren entsandt, um nach entsprechenden Beweisen zu stöbern, während unsere Ausgräber weiter nach Antworten suchen."
 infernals.2725.a: "Es ist ein Rätsel, das nur darauf wartet, gelöst zu werden!"
 infernals.2725.b: "Entsenden wir unsere Drohnen, um das Rätsel zu lösen."
 infernals.2730.name: "Dunkle Praktiken"
 infernals.2730.desc: "Eine schwere Steintür versperrte den Weg in den tiefsten Teil des Tempels. Hinter ihr fand unser Ausgrabungsteam eine kreisförmige Kammer mit einer zentralen Grube, die direkt über einem natürlichen unterirdischen Magma-Reservoir lag. Das Licht des Magmas warf ein rotes Licht auf die Wände und die auf ihnen befindlichen Inschriften, die sich um den gesamten Raum zogen. Rings um die Oberseite der umliegende Wände befanden sich flammende Augen.\n\nAn einer Kante der Grube - auf einem Altar, der die Form des Höllenauges hatte - lagen die vertrockneten, aufgeschlitzten Überreste eines Einheimischen. Es scheint, als habe man tatsächlich jemanden aus den eigenen Reihen geopfert, um das Höllenauge zu besänftigen.\n\nDer Text an den Wänden könnte von entscheidender Bedeutung sein, um die kulturelle Rolle dieses Tempels für seine Zivilisation zu verstehen, und er sollte unverzüglich übersetzt werden."
 infernals.2735.name: "Prophezeiungen"
 infernals.2735.desc: "Die abschließende Untersuchung der Schriftzeichen aus der innersten Kammer des Tempels offenbarten eine Reihe von Prophezeiungen, die sich auf die Rückkehr des Höllenauges beziehen. Sie sprechen davon, dass das Höllenauge über die Auflehnung seiner Untertanen erzürnt sei und es zur Strafe einiges geschehen lassen werde: eine Verdunkelung des Himmels, den Ausbruch eines bestimmten heiligen Bergs, das Verdorren einer bestimmten Feldfrucht an den Reben und vieles mehr. Die Prophezeiung stellt dies als das Ende dar und behauptet, dass nach diesen Ereignissen nur diejenigen überleben, die sich dem Höllenauge unterwerfen.\n\nUnsere in die Bevölkerungszentren entsandten Erkundungsteams suchten nach kulturellen Verknüpfungen und stellten fest, dass dieser prophetische Text die Quelle vieler Aphorismen und Redewendungen sowie der Ausgangspunkt für viele spätere Geschichten und Mythen ist. Sie glauben außerdem, dass die mysteriösen Praktiken in den Tempeln Variationen dieser alten Prophezeiung nebst Reaktionen auf sie beinhalten.\n\nAll diese Ereignisse ließen sich mit unserer Technologie nachstellen respektive mit einem Maß an Realismus fälschen, damit die örtliche Bevölkerung den Trug nicht durchschauen würde. Wenn wir uns als die Reinkarnation des Höllenauges präsentieren und zeigen, dass die ursprüngliche Prophezeiung die ganze Zeit über richtig war, könnten wir die Bevölkerung möglicherweise leichter unterwerfen, was es langfristig einfacher macht, sie zu absorbieren."
 infernals.2735.a: "Wir sollten diese Prophezeiungen nachstellen."
 infernals.2735.a.tt: "Die primitive Gesellschaft auf §Y[From.Planet.GetName]§! wird lernen, sich unserer Ethik anzupassen."
 infernals.2735.a.fail: "Hat nicht die Richtlinie \"§Y$interference_not_allowed$§!\" ausgewählt."
 infernals.2735.b: "Wir dürfen uns nicht einmischen."
 infernals.2735.c: "Ihre Geschichte ist für immer verloren."
 infernal_figurine: "Figur eines Infernalen"
 infernal_figurine_desc_short: "Ein stämmiges Wesen mit gewölbtem Panzer und vier Beinen, das unter einer stilisierten Feuerskulptur kauert."
 infernal_figurine_desc_details: "Die Flamme wurde aus einem unbekannten Mineral geschnitzt, das tiefrot leuchtet. Dieses Artefakt stammt aus den Katakomben einer ausgestorbenen Zivilisation und könnte deren vergebliche Hoffnung symbolisieren, die bevorstehende vulkanische Zerstörung ihrer Biosphäre zu überleben."
