 job_radiant_priest_plural: "Strahlenpriester"
 job_radiant_priest_desc: "Um das Feuer des Glaubens am Lodern zu halten, verkörpern die Priester dieser Gesellschaft das strahlende Licht des heiligen Feuers. Sie erhellen damit ihren Anhängern den Weg und vertreiben das Böse."
