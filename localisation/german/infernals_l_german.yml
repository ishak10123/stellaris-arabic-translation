 councilor_thermal_engineer: "Thermalingenieur"
 councilor_thermal_engineer_desc: "Der $TITLE$ löst mögliche technische Herausforderungen, die beim Bau von Infrastruktur in außergewöhnlich heißen Umgebungen auftreten."
 councilor_corporate_thermal_engineer: "Leitender Thermalingenieur"
 councilor_corporate_thermal_engineer_desc: "Der Leitende Thermalingenieur löst mit der richtigen Bezahlung mögliche technische Herausforderungen, die beim Bau von Infrastruktur in außergewöhnlich heißen Umgebungen auftreten."
 councilor_pyromanic_priest: "Pyromanischer Priester"
