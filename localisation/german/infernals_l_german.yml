l_german:
 INFERNALS_TITLE: "Infernals Species Pack" # Do not translate
 vo_infernal_voice: "Thermophil"
 # Traits
 trait_pc_volcanic_preference: "Anpassung (Vulkanisch)"
 trait_pc_volcanic_preference_short: "Vulkanisch"
 trait_pc_volcanic_preference_desc: "$trait_pc_savannah_preference_desc$"
 trait_volcanic_planet_preference: "$trait_pc_volcanic_preference$" #robotic
 trait_volcanic_planet_preference_desc: "$trait_dry_planet_preference_desc$" #robotic
 trait_infernal: "Thermophil"
 trait_infernal_plural: "Thermophile"
 trait_infernal_desc: "Diese Spezies besitzt ein Gewebe aus Metalllegierungen, um auf heißen Planeten gedeihen zu können, auf denen traditionelle organische Wesen verbrennen würden. Diese legierten Zellen bauen sich langsamer ab und werden vom Körper seltener ersetzt, was das Auftreten altersbedingter Krankheiten hinauszögert. Da ihre Zellen auch Kälte leiten, ist die Gesundheit dieser Spezies in kälteren Klimazonen stark gefährdet."
 TRAIT_INFERNAL_EFFECT: "Unterhalt ($r_alloys$) für jeweils $pop_group_unit$ £pop£ Bewohner: §R+$@living_standard_alloys_normal$§!$TABBED_NEW_LINE$- $pc_volcanic$ $HABITABILITY$: §G+20%§! $TABBED_NEW_LINE$- Minimale $HABITABILITY$ (§H$pc_volcanic$§!): §Y+50%§! $TABBED_NEW_LINE$- $HABITABILITY$ auf §Ykalten§! Welten: §R-30%§!  $TABBED_NEW_LINE$- Lebensdauer (Anführer): §G+10 Jahre§!"
 trait_unbreakable_resolve: "Unerschütterliche Entschlossenheit"
 trait_unbreakable_resolve_desc: "Angehörige dieser Spezies besitzen ein komplexes Netz von Spiegelneuronen, was ihnen die Fähigkeit gibt, ihren Willen miteinander zu synchronisieren. Diese Pflicht ist für sie keine Last, sondern ein gemeinsames Ziel, und Schwierigkeiten begegnen sie mit unerschütterlicher Einigkeit."
 trait_unbreakable_resolve_tooltip: "Jeweils $pop_group_unit$ £pop£ §HBewohner§! auf dem Planeten mit dieser Eigenschaft geben §G+0.2§! £stability£ $PLANET_STABILITY_TITLE$ (Max: §G+15§!) \n- §RBeinhaltet keine Sklaven oder Bewohner aus niederen Schichten.§!"
 trait_shell_slag: "Bioschlacke"
 trait_shell_slag_desc: "Die Symbiose mit £sr_living_metal£ §YLebendem Metall§! lässt diese Spezies nicht auf traditionelle Weise heranwachsen, sondern durch die Anlagerung und eigenständige Umformung bio-eisenhaltiger Strukturen."
 trait_shell_slag_tooltip: "Für jeweils $pop_group_unit$ £pop£ §HBewohner§! mit dieser Eigenschaft, die den Lebensstandard eines Sklaven oder höher haben, werden monatlich §G$@shell_slag_trait_resource_production|3$§! §Y$r_living_metal$§! produziert."
 trait_robot_assembly_slag: "Montageschlacke"
 trait_robot_assembly_slag_desc: "Die Integration von £sr_living_metal£ §YLebendem Metall§! erlaubt es dieser Maschinenspezies, sich anstelle der herkömmlichen Montage durch die Anlagerung und eigenständige Umformung eisenhaltiger Rahmenstrukturen zu vergrößern."
 trait_pyroclastic: "Pyroklastische Kanalisierung"
 trait_pyroclastic_desc: "Diese Spezies wurde von den pyroklastischen Kräften vulkanischer Welten geformt und fürchtet diese nicht – sie kanalisiert und manipuliert diese Kräfte und verwandelt so Zerstörung in Nahrung und Energie."
 trait_pyroclastic_tooltip: "$MOD_LOGISTIC_GROWTH_MULT$ auf vulkanischen Welten: §G+10%§!"
 trait_crucible_community: "Gemeinschaft des Schmelztiegels"
 trait_crucible_community_desc: "Diese Spezies trotzte allen Widrigkeiten und bestritt gemeinsame Kämpfe, was sie zu einem unzerbrechlichen Ganzen formte. Ihr kollektiver Wille treibt die Regierung an, wobei jeder ein wichtiges Glied in der Kette der Einheit ist."
 trait_crucible_community_tooltip: "Jeweils $pop_group_unit$ £pop£ §HBewohner§! mit dieser Eigenschaft geben §G+0.25§! §Y$MOD_COUNTRY_EDICT_FUND_ADD$§!"
 trait_ductile: "Formbar"
 trait_ductile_desc: "§LDiese Spezies kann wiederverwendbare Legierungsverbindungen heranwachsen lassen.§!\n"
 # Volcanic World
 pc_volcanic: "Vulkanische Welt"
 pc_volcanic_plural: "Vulkanische Welten"
 pc_volcanic_desc: "Eine steinige Welt mit einer schwefelreichen Atmosphäre und einer teilweise flüssigen Lithosphäre. Die mit Asche und Basalt bedeckte Oberfläche ist von frischer vulkanischer Aktivität, Lavaseen und Lavaflüssen geprägt. Wenn überhaupt, können hier nur extremophile Lebensformen gedeihen."
 mod_pc_volcanic_habitability: "Bewohnbarkeit (Vulkanische Welt)"
 mod_pc_volcanic_max_districts_add: "Max. Distrikte ($pc_volcanic$)"
 concept_pc_volcanic: "$pc_volcanic$"
 concept_pc_volcanic_desc: "- $mod_planet_jobs_alloys_produces_mult$: §G+5%§! \n\n§L$pc_volcanic_desc$§!"
 district_geothermal: "Geothermisches Kraftwerk"
 district_geothermal_plural: "Geothermische Kraftwerke"
 district_geothermal_desc: "Dieses Kraftwerk nutzt die brodelnde Hitze tief im Inneren des Planeten, um die Kolonie mit Energie zu versorgen."
 district_melting: "Magmaleitung"
 district_melting_plural: "Magmaleitungen"
 district_melting_desc: "Eine Reihe elektromagnetischer Siebe extrahiert wertvolle Mineralien aus den Magmaströmen des Planeten."
 district_melting_uncapped: "$district_melting$"
 district_melting_uncapped_plural: "$district_melting_plural$"
 district_melting_uncapped_desc: "$district_melting_desc$"
 mod_district_melting_max: "$district_melting_plural$ (Maximum)"
 district_polytechnic: "Thermotechnik-Forum"
 district_polytechnic_plural: "Thermotechnik-Foren"
 district_polytechnic_desc: "Dieses Zentrum für interdisziplinäre Zusammenarbeit und Bildung unterstützt die Kolonie dabei, die geologische Dynamik des Planeten zu kontrollieren und zu nutzen."
 mod_district_polytechnic_max_add: "$district_polytechnic_plural$ (Maximum)"
 thermotechnic_default: "Hilfszentren"
 thermotechnic_hive: "Synapsencluster"
 thermotechnic_machine: "Hilfsknoten"
 melt_extractor: "$job_melt_extractor$"
 job_melt_extractor: "Thermalschmied"
 job_melt_extractor_plural: "Thermalschmiede"
 job_melt_extractor_desc: "Diese Arbeiter sind an extreme Hitze gewöhnt und wissen, wie man Mineralien zu nützlichen neuen Legierungen verbindet."
 mod_job_melt_extractor_add: "$job_melt_extractor_plural$-Jobs"
 job_melt_extractor_effect: "£job_miner£ $job_melt_extractor_plural$ produzieren £minerals£ §Y$minerals$§!"
 melt_extractor_drone: "$job_melt_extractor_drone$"
 job_melt_extractor_drone: "Thermalschmiededrohne"
 job_melt_extractor_drone_plural: "Thermalschmiededrohnen"
 job_melt_extractor_drone_desc: "Diese Drohnen können extremer Hitze widerstehen und wurden dazu konzipiert, Mineralien zu nützlichen neuen Legierungen zu verbinden."
 mod_job_melt_extractor_drone_add: "$job_melt_extractor_drone_plural$-Jobs"
 job_melt_extraction_drone_effect: "£job_mining_drone£ $job_melt_extractor_drone_plural$ produzieren £minerals£ §Y$minerals$§!"
 job_polytechnic_mentor: "Thermotechnik-Mentor"
 job_polytechnic_mentor_plural: "Thermotechnik-Mentoren"
 job_polytechnic_mentor_desc: "Dieser Mentor besitzt ein unglaubliches Repertoire an Fähigkeiten und hilft dabei, fachliche Lücken zu schließen, um die Effizienz anderer Facharbeiter zu steigern."
 mod_job_polytechnic_mentor_add: "$job_polytechnic_mentor_plural$-Jobs"
 job_polytechnic_mentor_effect: "£job_polytechnic_mentor£ $job_polytechnic_mentor_plural$ werden durch andere Jobs verbessert. \n\n$job_polytechnic_job_tt$"
 concept_polytechnic_mentor: "$job_polytechnic_mentor_plural$"
 concept_polytechnic_mentor_desc: "Zusätzliche Ressourcen je $pop_group_unit$ £pop£ §HBewohner§!\n(Maximal: §Y4000§! £job£ Jobs je Kategorie):\n- £job_miner£ ['concept_planet_miners']: §G+$@polytechnic_output$§! £unity£ $unity$\n- £job_technician£ ['concept_planet_technician']: §G+$@polytechnic_output$§! £physics_research£ $physics_research$\n- £job_foundry£ ['concept_planet_metallurgists']: §G+$@polytechnic_output$§! £engineering_research£ $engineering_research$\n- £job_artisan£ ['concept_planet_artisans']: §G+$@polytechnic_output$§! £society_research£ $society_research$"
 job_polytechnic_job_tt: "$concept_polytechnic_mentor_desc$"
 job_polytechnic_drone: "Pyroklastikdrohne"
 job_polytechnic_drone_plural: "Pyroklastikdrohnen"
 job_polytechnic_drone_desc: "Diese Drohne besitzt ein unglaubliches Repertoire an Fähigkeiten und hilft dabei, fachliche Lücken zu schließen, um die Effizienz anderer spezialisierter Drohnen zu steigern."
 mod_job_polytechnic_drone_add: "$job_polytechnic_drone_plural$-Jobs"
 job_polytechnic_drone_effect: "£job_polytechnic_drone£ $job_polytechnic_drone_plural$ werden durch andere Jobs verbessert. \n\n$job_polytechnic_job_tt$"
 concept_polytechnic_drone: "$job_polytechnic_drone_plural$"
 concept_polytechnic_drone_desc: "$concept_polytechnic_mentor_desc$"
 # Origin - Red Giant
 origin_red_giant: "Roter Riese"
 origin_red_giant_desc: "Diese Zivilisation steht an einem Scheideweg: Der Rote Riese im Zentrum ihres Systems erwärmt ihren Planeten und droht, sie bei lebendigem Leib zu kochen.\n\nWird sie sich schnell genug anpassen können, bis die Ursache gefunden und behoben wurde? Oder aber entschließt sie sich dazu, die Hitze zu akzeptieren und von diesen seltsamen und vielleicht unnatürlichen Veränderungen zu profitieren?"
 origin_tooltip_red_giant_effects: "- $HOMEWORLD$ ['concept_pc_volcanic'] (Größe: £planetsize£ 20)"
 START_SCREEN_RED_GIANT: "Die Wahrheit wurde nur allzu langsam entdeckt, doch dann regnete sie wie ein Feuerhagel auf uns herab.\n\nUnser Stern durchlebt eine anomale Entwicklung und seine Energieabgabe überschreitet alle erwarteten Parameter. Spektralverschiebungen deuten auf unregelmäßige Konvektionsmuster hin, und die Fusionsrate scheint ohne entsprechenden Massenverlust zu steigen.\n\nBislang konnten wir uns parallel zu dieser Erwärmung weiterentwickeln, doch unsere biologische Evolution hat ihre Grenzen.\n\nSollte die derzeitige Veränderung im Inneren von [capital_star.GetName] so weitergehen, wird die Welt, die wir unser Zuhause nennen, verbrennen. Es ist nicht mehr die Frage, ob dem so sein wird, sondern nur noch, wann diese Katastrophe eintritt."
 red_giant_start_NAME: "Roter-Riese-System"
 red_giant_start_DESC: "Dies ist das Startsystem für Reiche, die den Ursprung \"§Y$origin_red_giant$§!\" ausgewählt haben."
 tech_starfire_cannon: "$starfire_cannon$"
 tech_starfire_cannon_desc: "Wie jede andere potenzielle Gefahr lässt sich auch die gefährliche Strahlung, die bei der Umwandlung unseres Sterns entsteht, als Werkzeug nutzen. Indem wir sie als Strahlenwaffe einsetzen, könnten wir feindliche Schiffe überhitzen und außer Gefecht setzen.\n\nSchaltet eine planetare Entscheidung frei, um eine §Y$starfire_cannon$§! in der Umlaufbahn zu bauen."
 SOLARFLARE_EMITTER: "Sonenerruptionen-Emitter"
 SOLARFLARE_EMITTER_DESC: "Ein mächtiger Energiestrahl, der selbst die stärksten Verteidigungsanlagen durchdringt und anfällige Schiffssysteme außer Gefecht setzt."
 starfire_cannon_cap: "$starfire_cannon$"
 starfire_cannon: "Sternenfeuer-Kanone"
 starfire_cannon_plural: "Sternenfeuer-Kanonen"
 NAME_Starfire_Cannon: "$starfire_cannon$"
 starfire_cannon_key: "Sternenfeuer-Kanonenkern"
 sfe_on_hit_stun_tt: "§YLegt§! das Ziel für §G5§! Tage lahm, was Geschwindigkeit, Feuerrate und Schilde reduziert.\n\n$ION_CANNON_FLEET_EFFECT$"
 sfe_weapon_stun_effect: "§RAuswirkungen der $starfire_cannon$§!"
 sfe_weapon_stun_effect_desc: "   " # not visible
 decision_starfire_cannon: "$starfire_cannon$ bauen"
 decision_starfire_cannon_desc: "Diese Orbitalkanone ahmt die intensive Strahlung eines schnell alternden roten Riesen nach und projiziert einen hyperthermischen Ionisationsstrahl, der nicht nur das Ziel beschädigt, sondern auch Schiffskomponenten zerstört und sie unbrauchbar macht."
 decision_starfire_cannon_effects: "Errichtet eine §Y$starfire_cannon$§! in der Umlaufbahn des Planeten. Dieses Waffensystem besitzt eine extrem hohe Reichweite und kann die Systeme mehrere Schiffe gleichzeitig lahmlegen."
 decision_starfire_cannon_limit: "$TRIGGER_FAIL$Systembegrenzung: §Y3§!"
 # Origin - Cosmic Dawn
 origin_cosmic_dawn: "Kosmische Dämmerung"
 origin_cosmic_dawn_desc: "Diese Zivilisation hat sich nicht entwickelt - sie wurde freigelassen. Als die Stasiskapseln entriegelt wurden, erwachte sie in einer Welt, die bis zur Unkenntlichkeit gealtert war. Doch nicht alles war verloren. Unter Staub und Trümmern begraben und über die ganze Galaxie verstreut blieb ihre Vergangenheit erhalten und wartet nur darauf, wiederentdeckt zu werden."
 origin_tooltip_cosmic_dawn_effects: "- $HOMEWORLD$ $TABBED_NEW_LINE$- ['concept_pc_volcanic'] (Größe: £planetsize£ 14) $TABBED_NEW_LINE$- ['concept_inf_cd_deposit']: +5\n- Beginnt mit der Situation: §HTiefe Ausgrabung§!"
 origin_tooltip_cosmic_dawn_negatives: "- $INITIAL_POPS$ §R-600§!"
 START_SCREEN_COSMIC_DAWN: "Wir erwachten mit nur einer vagen Erinnerung daran, jemals eingeschlafen zu sein. Selbst jetzt stammt der einzige Beweis für eine Zeit vor dieser nicht aus unserer eigenen Erinnerung, sondern aus der komplexen Technologie, die uns in Stasis hielt.\n\nTausende und Abertausende von Kapseln, riesige Wärmeübertragungssysteme, Kessel, in denen geschmolzenes Gestein brodelt. In die Wänden dahinter waren Hinweise auf unseren Ursprung eingraviert: Flotten von Schiffen, die sich von abkühlenden Welten entfernten, um nach Wärme im All zu suchen. In dem Streben, Antworten zu finden, verließen wir diese unterirdische \"Geburtskammer\". Auf der Oberfläche von §Y[owner.Capital.GetName]§! entdeckten wir nützliche Technologien und Ressourcen. Es wurden auch Hinweise darauf gefunden, dass unter der Kruste des Planeten weitere Kammern verborgen liegen. Einige dieser Kammern beherbergen Schläfer, die wir als Verwandte willkommen heißen könnten.\n\nUnd was wartet wohl im All auf uns? Gibt es noch andere wie uns, die noch immer schlafen? Sollte es sie geben, können sie uns vielleicht dabei helfen, unsere drängendste Frage zu beantworten: Wer sind wir?"
 cosmic_dawn_start_NAME: "Neue Heimat"
 cosmic_dawn_start_DESC: "Dies ist das Startsystem, wenn der Ursprung \"$origin_cosmic_dawn$\" ausgewählt wurde."
 concept_inf_cd_deposit: "$d_stasis_pods$"
 concept_inf_cd_deposit_desc: "Produziert: £society_research£ +3\nBeim Entfernen: \n$d_stasis_pods_tt$ \n\n§L$d_stasis_pods_desc$§!"
 cosmic_dawn_districtsize: "$MOD_PLANET_MAX_DISTRICTS_ADD$: §G+1§!"
 cosmic_dawn_districtsize2: "$MOD_PLANET_MAX_DISTRICTS_ADD$: §G+2§!\n   $d_cd_ancient_tunnels$ §G+2§!"
 cosmic_dawn_tunnel_foundry: "$foundry_jobs_bonus_workforce_mult$ für jeden Uralten Tunnel: §G+1%§!"
 cosmic_dawn_tunnel_bureaucrat: "$bureaucrat_jobs_bonus_workforce_mult$ für jeden Uralten Tunnel: §G+1%§!"
 cosmic_dawn_tunnel_researcher: "$researcher_jobs_bonus_workforce_mult$ für jeden Uralten Tunnel: §G+1%§!"
 cosmic_dawn_tunnel_worker: "$mod_pop_cat_worker_bonus_workforce_mult$ für jeden Uralten Tunnel: §G+1%§!"
 d_stasis_pods: "£blocker£ Uralte Statiskapseln"
 d_stasis_pods_desc: "Diese Stasiskapseln sind uralt und können mithilfe fortschrittlicher Kryotechnologie Individuen in einer Art künstlichem Schlaf halten. Mit der richtigen Technologie könnten wir diese Individuen vielleicht wieder zum Leben erwecken."
 d_stasis_pods_tt: "[GetStasisPodOwner]"
 d_stasis_pods_tt_inf: "- §G100§! £pop£ $POPS$ werden erschaffen\n- $MOD_PLANET_MAX_DISTRICTS_ADD$: §G+1§!"
 d_stasis_pods_tt_other: "- £society_research£ §Y$society_research$§! erhalten: §G+350§!\n- $MOD_PLANET_MAX_DISTRICTS_ADD$: §G+1§!"
 d_cd_ancient_tunnels: "Uralte Tunnel"
 d_cd_ancient_tunnels_desc: "In diesen Tunneln wurden einst unzählige Stasiskapseln gelagert. Heute bieten sie den Bewohnern einen weitläufigen Lebensraum."
 d_galvanic_living_metal: "Lebende Metallablagerung"
 d_galvanic_living_metal_desc: "Auf diesem Planeten gibt es ein natürliches Vorkommen an Lebendem Metall. Die hier lebende Spezies entwickelte sich in ständigem Kontakt zu dieser faszinierenden Ressource, wodurch sie einzigartige biologische und wissenschaftliche Entwicklungswege einschlug."
 # Civic - Scorched World Heralds
 civic_scorched_earth: "Herolde einer versengten Welt"
 civic_scorched_earth_desc: "Die sengende Hitze durchdringt jeden kulturellen Aspekt dieser Gesellschaft, von Traditionen und Ritualen bis hin zur Technologie selbst. Sie sieht sich selbst als rechtmäßige Feuerherrscherin der Galaxie an und betrachtet schwächere Spezies als bloße Hindernisse auf dem Weg zu einem Universum, das nur für Thermophile geeignet ist."
 civic_scorched_earth_effects: "Kann mit anderen Spezies keine §YDiplomatie§! betreiben (ausgenommen §Y$trait_infernal_plural$§!).\nKann nicht auf den §YGalaktischen Markt§! zugreifen.\nHat den Kriegsgrund \"§Y$casus_belli_cb_blaze$§!\" gegen andere Spezies.\nErhält £unity£ §Y$unity$§! durch die Bombardierung mit der Bombardierungshaltung \"§Y$bombardment_firestorm$§!\".\nErschafft mit der Bombardierungshaltung \"§Y$bombardment_seismic_bombing$§!\" besondere Blocker auf dem betroffenen Planeten.\n- Nicht-['trait:trait_infernal']e Spezies sind auf §YSklaven§! oder schlechter begrenzt."
 SCORCHED_HERALDS_ONLY_INF: "$TRIGGER_FAIL$§Y$civic_scorched_earth$§! tolerieren nur ['trait:trait_infernal']e £pop£ $POPS$ in ihrer Gesellschaft."
 civic_hive_scorched_earth: "Pyromanischer Instinkt"
 civic_hive_scorched_earth_desc: "Unsere versengten Welten stellen den Höhepunkt der planetaren Evolution dar. Wir werden die gesamte Galaxie in Brand stecken und in ihren Flammen gedeihen!"
 # Civic - World Forgers
 civic_world_forgers: "Planetenschmiede"
 civic_world_forgers_desc: "Diese Gesellschaft gedeiht in vulkanischen Umgebungen und verfügt über das nötige Wissen, diese künstlich zu schaffen, wenn die Natur selbst darin versagt."
 civic_world_forgers_effects: "- Anfangsplanet: ['concept_pc_volcanic']. \n- $GUARANTEED_RESEARCH_OPTION_STRING$ £society_research£ ['concept_volcanic_forge'].\n- Kann das Gebäude \"£building£ §Y$building_volcanic_forge_1$§!\" errichten, das £job_polytechnic_mentor£ ['concept_polytechnic_mentor']-Jobs bereitstellt. \n- Planeten mit einer £building£ §Y$building_volcanic_forge_1$§! werden mit der Zeit zu einer §YVulkanischen Welt§! umgewandelt. \n- ['concept_guaranteed_colonies'] sind aus der Kategorie der §Ytrockenen Welten§!."
 civic_corporate_world_forgers: "Planetenarchitekten"
 civic_corporate_world_forgers_desc: "$civic_world_forgers_desc$"
 civic_hive_world_forgers: "Vulkannester"
 civic_hive_world_forgers_desc: "$civic_world_forgers_desc$"
 civic_world_forgers_gestalt_effects: "- Anfangsplanet: ['concept_pc_volcanic']. \n- $GUARANTEED_RESEARCH_OPTION_STRING$ £society_research£ ['concept_volcanic_forge'].\n- Kann das Gebäude \"£building£ §Y$building_volcanic_forge_1$§!\" errichten, das £job_polytechnic_drone£ ['concept_polytechnic_drone']-Jobs bereitstellt. \n- Planeten mit einer £building£ §Y$building_volcanic_forge_1$§! werden mit der Zeit zu einer §YVulkanischen Welt§! umgewandelt. \n- ['concept_guaranteed_colonies'] sind aus der Kategorie der §Ytrockenen Welten§!."
 civic_machine_world_forgers: "Thermaloptimierer"
 civic_machine_world_forgers_desc: "$civic_world_forgers_desc$"
 tech_volcanic_forge: "Vulkanschmiede"
 tech_volcanic_forge_desc: "Diese Anlage verwandelt einen Planeten langsam in ein vulkanisches Paradies und fördert dabei nützliche Ressourcen zutage. Thermalschmiede können diese Umwandlung beschleunigen."
 concept_volcanic_forge: "$tech_volcanic_forge$"
 concept_volcanic_forge_desc: "$building_volcanic_forge_basic$\n\n- Monatlicher Fortschritt: §G+0.1§!\n- Monatlicher Fortschritt für jeweils §Y100§! £job_miner£ $job_miner_plural$: §G+0.05§!\n- Monatlicher Fortschritt für jeweils §Y100§! £job_foundry£ $job_foundry_plural$: §G+0.05§!"
 building_volcanic_forge_1: "$tech_volcanic_forge$"
 building_volcanic_forge_1_desc: "Dieser Industriekomplex dringt tief in die Planetenkruste vor, um auf der ganzen Welt die vulkanischen Aktivitäten zu fördern. Dies führt dazu, dass sich jedes Biom in eine glühende Landschaft verwandelt."
 building_volcanic_forge_2: "Vulkangießerei"
 building_volcanic_forge_2_desc: "$building_volcanic_forge_1_desc$"
 building_volcanic_forge_1_effect: "\n$building_volcanic_forge_basic$\n$volcanic_forge_1_monthly$\n\nFortschritt durch £job_miner£ $concept_planet_miners$: §G+[root.GetMinerVar1]§!\nFortschritt durch £job_foundry£ $concept_planet_metallurgists$: §G+[root.GetForgerVar1]§!"
 building_volcanic_forge_2_effect: "\n$building_volcanic_forge_basic$ \n$volcanic_forge_2_monthly$ \n\nFortschritt durch £job_miner£ $concept_planet_miners$: §G+[root.GetMinerVar2]§! \nFortschritt durch £job_foundry£ $concept_planet_metallurgists$: §G+[root.GetForgerVar2]§!"
 building_volcanic_forge_basic: "Verwandelt eine Welt in eine §HVulkanische Welt§!."
 volcanic_forge_1_monthly: "- Fügt §G+200§! £job_polytechnic_mentor£ ['concept_polytechnic_mentor']-Jobs hinzu.\n- Monatlicher Fortschritt: §G+0.1§! \n- Monatlicher Fortschritt für jeweils §Y100§! £job_miner£ $concept_planet_miners$: §G+0.05§! \n- Monatlicher Fortschritt für jeweils §Y100§! £job_foundry£ $concept_planet_metallurgists$: §G+0.05§!"
