 civic_hive_galvanic_symbiosis_desc: "$civic_galvanic_symbiosis_desc$"
 civic_hive_galvanic_symbiosis_effects: "$civic_galvanic_tt$ \n- $civic_galvanic_job_hive_tt$"
 civic_machine_galvanic_symbiosis: "Galvanischer Umbau"
 civic_machine_galvanic_symbiosis_desc: "Diese Einheiten verfügen über selbstreparierende Rahmen. Die genutzte Speziallegierung verbindet die Vorteile von Biologie und künstlicher Intelligenz. "
 civic_machine_galvanic_symbiosis_effects: "$civic_galvanic_tt$ \n- $civic_galvanic_job_hive_tt$"
 civic_galvanic_tt: "- Beginnt mit der bereits erforschten Technologie \"£engineering_research£ ['technology:tech_mine_living_metal']\".\n- Es gibt ['concept_d_galvanic_living_metal'] auf der Heimatwelt.\n- Erhält Zugang zu den Erlassen: $TABBED_NEW_LINE$- ['concept_inf_lm_cs_edict'] $TABBED_NEW_LINE$- ['concept_inf_lm_mgc_edict']\n- Erhält Zugang zu den £sr_living_metal£ §YLebenden-Metall§!-Komponenten: $TABBED_NEW_LINE$- ['concept_inf_lm_armor'] $TABBED_NEW_LINE$- ['concept_inf_lm_weapon']\n- Erhält Zugang zur planetaren Entscheidung: §Y$decision_living_metal_distribution$§!.\n- Kann §Y$lm_imbued_army$§!-Armeen rekrutieren."
 civic_galvanic_job_tt: "Kann ein £building£ ['concept_offworld_expedition_hub'] in Systemen mit einer §YGeschmolzenen Welt§! errichten. Diese stellt Jobs für ['concept_offworld_prospector'] zur Verfügung."
 civic_galvanic_job_hive_tt: "Kann ein £building£ ['concept_offworld_expedition_hub'] in Systemen mit einer §YGeschmolzenen Welt§! errichten. Diese stellt Jobs für ['concept_offworld_prospector_drone'] zur Verfügung."
 concept_d_galvanic_living_metal: "$d_galvanic_living_metal$"
 concept_d_galvanic_living_metal_desc: "$d_galvanic_living_metal_desc$ \n$TABBED_NEW_LINE$- Produziert $r_living_metal$: §G+1§!"
 lm_imbued_army: "Nachahmungseinsatztrupp"
 seq_lm_imbued_army: "$ORD$ $lm_imbued_army$"
 lm_imbued_army_desc: "Diese Armee ist mit fortschrittlichen Technologien aus £sr_living_metal£ §YLebendem Metall§! ausgerüstet und kann sich selbst in der Form verändern, um sich an eine Vielzahl von Bedingungen auf dem Schlachtfeld anzupassen."
 concept_inf_lm_armor: "$INF_Regen$e Panzerung"
 concept_inf_lm_armor_desc: "Bonus für jede Panzerungskomponente:\n- $mod_weapon_type_energy_weapon_fire_rate_mult$: §G+2%§! \n- $MOD_SHIP_HULL_REGEN_ADD_PERC$: §G+1%§!\n- $MOD_SHIP_ARMOR_REGEN_ADD_PERC$: §G+1%§!\n\nFügt gewöhnlichen Panzerkomponenten für Schiffe §Y$INF_Regen$e§! Versionen hinzu. Die Kosten an $r_alloys$ werden durch $r_living_metal$ ersetzt. \n\nDies beinhaltet freigeschaltete Komponenten der folgenden £engineering_research£ Technologien: $TABBED_NEW_LINE$- ['technology:tech_ship_armor_1'] $TABBED_NEW_LINE$- ['technology:tech_ship_armor_2'] $TABBED_NEW_LINE$- ['technology:tech_ship_armor_3'] $TABBED_NEW_LINE$- ['technology:tech_ship_armor_4'] $TABBED_NEW_LINE$- ['technology:tech_ship_armor_5']"
 INF_Regen: "Regenerativ"
 LM_ARMOR_1: "$ARMOR_1$ - $INF_Regen$"
 LM_ARMOR_1_DESC: "Diese Panzerung aus £sr_living_metal£ §YLebendem Metall§! wurde in den Schmieden der Schiffswerften geformt und kehrt selbst nach schwerer Beschädigung in ihre ursprüngliche Form zurück."
 LM_ARMOR_2: "$ARMOR_2$ - $INF_Regen$"
 LM_ARMOR_2_DESC: "Eine Verdickung des £sr_living_metal£ §YLebenden Metalls§! verstärkt zum einen die grundlegenden Verteidigungsfähigkeiten und vergrößert zum anderen die für die Regeneration verfügbare Oberfläche."
 LM_ARMOR_3: "$ARMOR_3$ - $INF_Regen$"
 LM_ARMOR_3_DESC: "Dank der Verbindung mit anderen Stoffen lässt sich die Zugfestigkeit des £sr_living_metal£ §YLebenden Metalls§! verbessern, was die Panzerung stärker und widerstandsfähiger macht."
 LM_ARMOR_4: "$ARMOR_4$ - $INF_Regen$"
