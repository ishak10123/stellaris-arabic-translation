l_german:
 ### CONCEPTS
 # Above each concept definition are instructions on usage, including an icon where one exists.
 #   Note that between the icon and the term there's a non-breaking space. When you copy the usage example, it will keep the non-breaking space.
 #   This is important to not get a line break between the icon and the concept.
 # Use a concept link with icon the first time a new concept is mentioned, then use §H without an icon for repeated uses.
 # Use §H with an icon the first time a concept is used withing its own description.
 # Use §H without an icon if the concept is used more than once.
 ui_available_tabs: "\n\nVerfügbare Reiter:\n"
 # View: £interface£ ['concept_empire_view'] or £interface£ §H$concept_empire_view$§!
 concept_empire_view: "Reichsansicht"
 concept_empire_view_desc: "Bietet einen Überblick über das Reich.$ui_available_tabs$[GetConceptEmpireAdvisor]"
 empire_view_tab_empire: "§H$EMPIRE$§!"
 empire_view_tab_demographics: "§H$DEMOGRAPHICS_TITLE$§!"
 empire_view_tab_advisor: "§H$GOVERNMENT_ADVISOR_TAB$§!"
 concept_empire_view_tabs_advisor: "$concept_empire_view_tabs_no_advisor$\n- $empire_view_tab_advisor$: Erlaubt das Auswählen der Beraterstimme"
 concept_empire_view_tabs_no_advisor: "- $empire_view_tab_empire$: Bietet Informationen über die ['concept_authority'], ['concept_civics'] und ['concept_empire_modifiers']\n- $empire_view_tab_demographics$: Zeigt ['concept_pops'] und Modifikatoren, die sich auf sie auswirken"
 # View: £interface£ ['concept_situation_log_view'] or £interface£ §H$concept_situation_log_view$§!
 concept_situation_log_view: "$MENU_PANEL__SITUATION_LOG_TITLE$ansicht"
 concept_situation_log_view_desc: "Die £interface£ §H$concept_situation_log_view$§! bietet eine Übersicht aller laufenden Anliegen im Reich.$ui_available_tabs$$concept_situation_log_view_tabs$"
 situation_log_view_tab_situation_log: "§H$topbar_button_situation_name$§!"
 situation_log_view_tab_timeline: "§H$TIMELINE$§!"
 situation_log_view_tab_anomilies: "§H$ANOMALIES$§!"
 situation_log_view_tab_victory: "§H$VICTORIES$§!"
 concept_situation_log_view_tabs: "- $situation_log_view_tab_situation_log$: Bietet Informationen über ['concept_event_chains'], ['concept_special_projects'] und ['concept_first_contacts']\n- $situation_log_view_tab_timeline$: Zeigt ['concept_milestones'] und ['concept_empire_focuses']\n- $situation_log_view_tab_anomilies$: Bietet eine Übersicht über ['concept_anomalies']\n- $situation_log_view_tab_victory$: Zeigt die ['concept_scoreboard']"
 # View: £interface£ ['concept_government_view'] or £interface£ §H$concept_government_view$§!
 concept_government_view: "$topbar_button_council_name$sansicht"
 concept_government_view_desc: "In der §H$concept_government_view$§! kann man die Regierung verwalten.$ui_available_tabs$$concept_government_view_tabs$"
 government_view_tab_council: "§H$COUNCIL$§!"
 government_view_tab_factions: "§H$FACTIONS$§!"
 government_view_tab_policies_and_edicts: "§H$EDICTS_AND_POLICIES$§!"
 concept_government_view_tabs: "- $government_view_tab_council$: Verwaltet den ['concept_council'] und die ['concept_agendas']\n- $government_view_tab_factions$: Bietet einen Überblick über die ['concept_factions']\n- $government_view_tab_policies_and_edicts$: Wählt ['concept_policies'] und ['concept_edicts'] aus"
 # View: £interface£ ['concept_society_management_view'] or £interface£ §H$concept_society_management_view$§!
 concept_society_management_view: "$TRADITION_VIEW_TITLE$sansicht" # Use this alias when referring to the concept
 concept_society_management: "$TRADITION_VIEW_TITLE$" # Left out 'View' to fit in the Databank UI
 concept_society_management_desc: "In der §H$concept_society_management_view$§! kann man die Traditionen des Reichs verwalten.$ui_available_tabs$[GetConceptSocietyManagement]"
 society_management_view_tab_traditions: "§H$TRADITIONS$§!"
 society_management_view_tab_crisis: "§H$CRISIS_TAB$§!"
 concept_society_management_view_crisis: "$concept_society_management_view_no_crisis$\n- $society_management_view_tab_crisis$: Zeigt den Fortschritt an, den das Reich in Richtung ['concept_crisis'] gemacht hat"
 concept_society_management_view_no_crisis: "- $society_management_view_tab_traditions$: Wählt ['concept_traditions'] und ['concept_ascension_perks'] aus"
 # View: £interface£ ['concept_technology_view'] or £interface£ §H$concept_technology_view$§!
 concept_technology_view: "$TECHNOLOGY$ansicht"
 concept_technology_view_desc: "Die £interface£ §H$concept_technology_view$§! bietet einen Überblick über den wissenschaftlichen Fortschritt eines Reichs auf den Gebieten der £physics£ ['concept_physics_research'], £society£ ['concept_society_research'] und £engineering£ ['concept_engineering_research']. In diesem Interface kann man auch Forschungsoptionen auswählen und technologische Prioritäten verwalten.\n\nNeue ['concept_technologies'] werden halb zufällig aus den verfügbaren Optionen ausgewählt und spiegeln die Unvorhersehbarkeit der wissenschaftlichen Forschung wider."
 # View: £interface£ ['concept_leaders_view'] or £interface£ §H$concept_leaders_view$§!
 concept_leaders_view: "$topbar_button_leaders_name$ansicht"
 concept_leaders_view_desc: "Die £interface£ §H$concept_leaders_view$§! bietet einen Überblick über alle aktiven ['concept_leaders'] innerhalb des Reichs, einschließlich ihrer Rollen, ['concept_leader_traits'], Erfahrungsstufen und derzeitigen Zuweisungen. In diesem Interface kann man auch neue Anführer rekrutieren, die Aufgaben eines Anführers ändern oder Anführer in den Ruhestand schicken."
 # View: £interface£ ['concept_species_view'] or £interface£ §H$concept_species_view$§!
 concept_species_view: "$topbar_button_species_name$ansicht"
 concept_species_view_desc: "Die £interface£ §H$concept_species_view$§! listet alle bekannten ['concept_species'] innerhalb des Reichs auf. In diesem Interface kann man auch ['concept_species_traits'] überprüfen und anpassen sowie Bevölkerungsrechte wie die Staatsbürgerschaft, den Militärdienst und die ['concept_living_standards'] festlegen.\n\nDiese Ansicht trägt maßgeblich dazu bei, die Komplexität eines Reichs zu verstehen, in dem Politik, Biologie und Ideologie bei der Gestaltung der galaktischen Gesellschaft ineinandergreifen."
 # View: £interface£ ['concept_planets_and_sector_view'] or £interface£ §H$concept_planets_and_sector_view$§!
 concept_planets_and_sector_view: "Planeten- und Sektorenansicht" # Use this alias when referring to the concept
 concept_planets_and_sector: "$PLANET_LIST$" # Left out 'View' to fit in the Databank UI
 concept_planets_and_sector_desc: "Das Interface £interface£ §H$concept_planets_and_sector$§! bietet einen zentralisierten Überblick über alle £colony£ ['concept_colonies'] und £sector£ ['concept_sectors'] innerhalb des Reichs.\n\nIn dieser Ansicht kann man auch ['concept_governors'] zuweisen."
 # View: £interface£ ['concept_expansion_planner'] or
 concept_expansion_planner: "$MENU_PANEL__EXPANSION_PLANNER_TITLE$"
 concept_expansion_planner_desc: "Der £interface£ §H$concept_expansion_planner$§! listet alle £planet£ ['concept_planets'] auf, die geeignete Kolonisationsziele darstellen. Man kann die Kolonisierung direkt in dieser Ansicht beginnen, wodurch automatisch ein £colony_ship£ ['concept_colony_ship'] gebaut wird.\n\n£planet£ §H$concept_planets$§! müssen von einem £science_ship£ ['concept_science_ship'] erst erkundet und mögliche £anomaly£ ['concept_anomalies'] erforscht werden, bevor man den Planeten kolonisieren kann.\n\nIm System des Planeten muss außerdem eine ['concept_starbase'] errichtet worden sein, damit der Planet innerhalb der Reichsgrenzen liegt."
 # View: £interface£ ['concept_fleet_management_view'] or £interface£ §H$concept_fleet_management_view$§!
 concept_fleet_management_view: "$topbar_button_fleet_manager_name$sansicht" # Use this alias when referring to the concept
 concept_fleet_management: "$topbar_button_fleet_manager_name$" # Left out 'View' to fit in the Databank UI
 concept_fleet_management_desc: "Erlaubt das Entwerfen von Schiffen und das Erstellen von Flotten. Neue §HSchiffsgrößen§! und ['concept_components'] lassen sich durch das Erforschen der benötigten ['concept_technologies'] freischalten.$ui_available_tabs$[GetConceptFleetManagement]"
 fleet_management_view_tab_fleet_manager: "§H$FLEET_MANAGER_VIEW$§!"
 fleet_management_view_tab_ship_designer: "§H$SHIP_DESIGNER$§!"
 concept_fleet_management_view_space_fauna: "$concept_fleet_management_view_no_space_fauna$\n- §H$CREATURE_DESIGNER$§!: Formt die ['concept_space_fauna']"
 concept_fleet_management_view_no_space_fauna: "- $fleet_management_view_tab_fleet_manager$: Organisiert ['concept_fleets']\n- $fleet_management_view_tab_ship_designer$: Entwerft ['concept_military_ships']"
 # View: £interface£ ['concept_contacts_view'] or £interface£ §H$concept_contacts_view$§!
 concept_contacts_view: "Kontaktansicht"
 concept_contacts_view_desc: "Die £interface£ §H$concept_contacts_view$§! listet alle bekannten Reiche, unabhängigen Enklaven und sonstigen fremden Wesen auf. In diesem Interface kann man auch ['concept_diplomacy'] betreiben und Beziehungen überprüfen. Es dient als zentrale Anlaufstelle für die interstellare Kommunikation und um Geheiminformationen einzusehen."
 contacts_view_tab_contacts: "§H$topbar_button_contacts_name$§!"
 contacts_view_tab_agreements: "§H$AGREEMENTS_LIST_TITLE$§!"
 contacts_view_tab_shroud: "§H$THE_SHROUD_TITLE$§!"
 concept_contacts_view_tabs: "- $contacts_view_tab_contacts$: Führt ['concept_diplomacy']\n- $contacts_view_tab_agreements$: Verwaltet ['concept_subject_agreements']\n- $contacts_view_tab_shroud$: Fördert den ['concept_psionic_ascension', psionischen Aufstieg]"
 # View: £interface£ ['concept_discoveries_view'] or £interface£ §H$concept_discoveries_view$§!
 concept_discoveries_view: "Entdeckungsansicht"
 concept_discoveries_view_desc: "Die £interface£ §H$concept_discoveries_view$§! katalogisiert alle bedeutenden Objekte und Phänomene in der Galaxie, einschließlich ['concept_relics', Relikte], uralte Artefakte und andere galaktische Kuriositäten.$ui_available_tabs$[GetConceptDiscovery]"
 discoveries_view_tab_relics: "§H$relics$§!"
 discoveries_view_tab_collection: "§H$COLLECTION$§!"
 discoveries_view_tab_vivarium: "§H$VIVARIUM$§!"
 discoveries_view_tab_astral_actions: "§H$ASTRAL_ACTIONS$§!"
 concept_discovery_view_base: "- $discoveries_view_tab_relics$: Verwaltet ['concept_relics']"
 concept_discovery_view_base_ancrel: "$concept_discovery_view_base$ und ['concept_minor_artifacts']"
 concept_discovery_view_base_archive: "$concept_discovery_view_base$\n- $discoveries_view_tab_collection$: Bietet eine Übersicht über ['concept_specimens']\n- $discoveries_view_tab_vivarium$: Züchtet ['concept_space_fauna'] heran"
 concept_discovery_view_base_ancrel_archive: "$concept_discovery_view_base$\n- $discoveries_view_tab_collection$: Bietet eine Übersicht über ['concept_specimens'] und ['concept_minor_artifacts', kleinere Artefakte]\n- $discoveries_view_tab_vivarium$: Züchtet ['concept_space_fauna'] heran"
 concept_discovery_view_base_astral: "$concept_discovery_view_base$\n$concept_discovery_view_astral$"
 concept_discovery_view_base_ancrel_astral: "$concept_discovery_view_base_ancrel$\n$concept_discovery_view_astral$"
 concept_discovery_view_base_archive_astral: "$concept_discovery_view_base_archive$\n$concept_discovery_view_astral$"
 concept_discovery_view_base_ancrel_archive_astral: "$concept_discovery_view_base_ancrel_archive$\n$concept_discovery_view_astral$"
 concept_discovery_view_astral: "- $discoveries_view_tab_astral_actions$: Aktiviert ['concept_astral_actions']"
 # View: £interface£ ['concept_claims_view'] or £interface£ §H$concept_claims_view$§!
 concept_claims_view: "$CLAIMS_VIEW$ansicht"
 concept_claims_view_desc: "Die £interface£ §H$concept_claims_view$§! veranschaulicht alle territorialen ['concept_claims'], die ein Reich derzeit hält. Die diplomatische Galaxieansicht bietet einen klaren Überblick über umkämpfte Systeme und potenzielle Unruheherde für künftige Konflikte."
 # View: £interface£ ['concept_market_view'] or £interface£ §H$concept_market_view$§!
 concept_market_view: "$MARKET_VIEW$ansicht"
 concept_market_view_desc: "Die £interface£ §H$concept_market_view$§! bietet einen Rahmen für den interstallen Handel, für den Kauf und Verkauf von Ressourcen sowie für die Einrichtung monatlich wiederkehrender Transaktionen."
 # View: £interface£ ['concept_colony_view'] or £interface£ §H$concept_colony_view$§!
 concept_colony_view: "Kolonieansicht"
 concept_colony_view_desc: "In der £interface£ §H$concept_colony_view$§! kann man eine £colony£ ['concept_colony'] verwalten. Die Ansicht lässt sich auch nutzen, um den §HKolonisierungsprozess§! für unbewohnte £planet£ ['concept_planets'] oder ['concept_habitats'] einzuleiten.$ui_available_tabs$$concept_colony_view_tabs$"
 colony_view_tab_planet_summary: "§H$PLANET_TAB$§!"
 colony_view_tab_management: "§H$MANAGEMENT_TAB$§!"
 colony_view_tab_population: "§H$POPULATION_TAB$§!"
 colony_view_tab_armies: "§H$GROUND_COMBAT_TAB$§!"
 colony_view_tab_holdings: "§H$CORPORATE_TAB$§!"
 concept_colony_view_tabs: "- $colony_view_tab_planet_summary$: Gibt einen Überblick über die £district£ ['concept_districts'], £building£ ['concept_buildings'] und den zugewiesenen ['concept_governor'] einer Kolonie. Hier kann man auch die ['concept_designation'] festlegen oder die ['concept_planet_automation'] aktivieren.\n- $colony_view_tab_management$: Zeigt planetare Merkmale und Bevölkerungsveränderungen. Hier kann man auch ['concept_decisions'] oder den ['concept_planetary_ascension'] auswählen oder das ['concept_terraforming'] beginnen.\n- $colony_view_tab_population$: Zeigt die Bevölkerung aufgeteilt in £job£ ['concept_job']-Schichten.\n- $colony_view_tab_armies$: Zeigt vorhandene Bodentruppen in der Kolonie und wie viel ['concept_devastation'] die Kolonie erlitten hat.\n- $colony_view_tab_holdings$: Gibt einen Überblick über alle ['concept_overlord_holdings'] in der Kolonie."
 # View: £interface£ ['concept_starbase_view'] or £interface£ §H$concept_starbase_view$§!
 concept_starbase_view: "Sternenbasenansicht"
 concept_starbase_view_desc: "In der £interface£ §H$concept_starbase_view$§! kann man eine ['concept_starbase'] verwalten.$ui_available_tabs$$concept_starbase_view_tabs$"
 starbase_view_tab_command: "§H$STARBASE_STARBASE_TAB$§!"
 starbase_view_tab_defenses: "§H$STARBASE_DEFENSES_TAB$§!"
 starbase_view_tab_armies: "§H$MACRO_BUILDER_TAB$§!"
 starbase_view_tab_shipyard: "§H$STARBASE_SHIPYARD_TAB$§!"
 concept_starbase_view_tabs: "- $starbase_view_tab_command$: Zeigt eine Übersicht über die §HModule§! und §HGebäude§! der Sternenbasis. Hier kann man auch die Sternenbasis auf die nächste Stufe verbessern, sobald die entsprechende ['concept_technology'] erforscht wurde.\n- $starbase_view_tab_defenses$: Liefert einen Überblick über alle ['concept_defense_platforms']. Ein Klick auf einen Entwurf erlaubt den Bau weiterer.\n- $starbase_view_tab_armies$: Erlaubt es, schnell viele §H$assault_army_plural$§! zu bauen. Armeen werden auf verfügbaren £colony£ ['concept_colonies'] im £sector£ ['concept_sector'] rekrutiert und versammeln sich entweder in der Sternenbasis oder in einer §HArmee§!, wenn \"§HTruppen versammeln§!\" aktiviert ist.\n- $starbase_view_tab_shipyard$: Hier kann man sowohl ['concept_civilian_ships'] als auch ['concept_military_ships'] bauen"
 # View: £interface£ ['concept_system_map'] or £interface£ §H$concept_system_map$§!
 concept_system_map: "Systemkarte"
 concept_system_map_desc: "Die £interface£ §H$concept_system_map$§! bietet eine detaillierte Übersicht über ein bestimmtes Sternensystem, einschließlich ['concept_celestial_objects'], ['concept_civilian_space_stations'], ['concept_fleets'] und sonstige Infrastruktur. Sie erlaubt es, Bauvorhaben, die Kolonisierung, Kampfeinsätze und die wissenschaftlichen Aktivitäten innerhalb des Systems präzise zu verwalten."
 # View: £interface£ ['concept_galaxy_map'] or £interface£ §H$concept_galaxy_map$§!
 concept_galaxy_map: "Galaxiekarte"
 concept_galaxy_map_desc: "Die £interface£ §H$concept_galaxy_map$§! bietet eine strategische Übersicht über die bekannten Bereiche der Galaxie und zeigt £system£ ['concept_systems'], ['concept_empire', Reichsgrenzen] und ['concept_hyperlanes']. Diese Ansicht dient als primäre Anlaufstelle für die Erkundung, die Expansion und die interstellare Koordination."
 # View: £interface£ ['concept_navigation_bar'] or £interface£ §H$concept_navigation_bar$§!
 concept_navigation_bar: "Navigationsleiste"
 concept_navigation_bar_desc: "Die £interface£ §H$concept_navigation_bar$§! befindet sich auf der linken Seite des Bildschirms.\n\nMan kann sie entweder so konfigurieren, dass sie bei einer Interaktion minimiert bleibt oder aber sich ausklappt.\n\nIm ausgeklappten Modus lassen sich die verschiedenen Menüs neu anordnen. Dies ändert auch das Tastenkürzel, das das jeweilige Menü öffnet."
 # View: £interface£ ['concept_resource_bar'] or £interface£ §H$concept_resource_bar$§!
 concept_resource_bar: "Ressourcenleiste"
 concept_resource_bar_desc: "Die £interface£ §H$concept_resource_bar$§! befindet sich am oberen Rand des Bildschirms.\n\nHier werden verschiedene §HRessourcen§! wie £energy£ ['concept_energy'] und andere Metriken wie £trade_value£ ['concept_trade'], ['concept_research'], ['concept_starbase_capacity'] und ['concept_naval_capacity'] aufgelistet.\n\nAuf der rechten Seite befindet sich die §HZeitkontrolle§!, mit der man die Spielgeschwindigkeit beschleunigen, verlangsamen oder ganz anhalten kann.\n\nUnter der §HZeitkontrolle§! befindet sich der §HMusikspieler§!."
 # View: £interface£ ['concept_outliner'] or £interface£ §H$concept_outliner$§!
 concept_outliner: "Schnellauswahl"
 concept_outliner_desc: "Die £interface£ §H$concept_outliner$§! bietet einfachen Zugang zu den wichtigsten Dingen eines Reichs wie £colony£ ['concept_colonies'], ['concept_fleets'] und ['concept_civilian_space_stations']. Sie lässt sich nach Belieben einstellen und kann einem dank der Status-Aktualisierungen in Echtzeit und der direkten Kontrolle über die wichtigsten Befehle einen raschen Überblick über die jeweils aktuelle Situation liefern."
