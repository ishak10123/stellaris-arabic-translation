 psi_fighting_conscription: "Einberufung von Psi-Kämpfern"
 psi_fighting_conscription_desc: "Wir haben unsere Armee durch psionische Krieger aus der Unterwelt verstärkt, doch nicht alle unserer regulären Rekruten sind glücklich darüber, an ihrer Seite zu dienen."
 psi_fighting_conscription_gestalt: "$psi_fighting_conscription$"
 psi_fighting_conscription_gestalt_desc: "Psionische Krieger aus der Unterwelt verstärken unsere Armeen, obwohl die Integration dieser abweichenden Elemente für unsere Streitkräfte eine ständige Herausforderung darstellt."
 psi_fighting_research: "Erforschung des Psi-Kampfes"
 psi_fighting_research_desc: "Psionische Krieger aus der Unterwelt geben faszinierende Forschungsobjekte ab."
 psi_fighting_prohibition: "Verbot von Psi-Kämpfen"
 psi_fighting_prohibition_desc: "Aufgrund unseres harten Vorgehens gegen illegale psionische Kämpfe sind unsere Kolonien heute zu einem sichereren Ort geworden."
 psi_fighting_competitions: "Psi-Kampf-Wettbewerbe"
 psi_fighting_competitions_desc: "Psionische Kämpfe sind der ultimative Zuschauersport."
 psi_fighting_competitions_gestalt: "$psi_fighting_competitions$"
 psi_fighting_competitions_gestalt_desc: "Psionische Kämpfe sind eine akzeptable Form der Freizeitgestaltung innerhalb des Kollektivs."
 shroudfall: "Schleierfall"
 shroudfall_desc: "Der Schleier verschlang einen Teil dieses Landes. Wir erforschen derzeit Möglichkeiten, um den ursprünglichen Zustand wiederherzustellen."
 add_shroudfall_concept: "Fügt [This.GetName] ['concept_shroudfall'] hinzu"
 impulse_mitigation: "Impulsminderung"
 impulse_mitigation_desc: "Es gibt psionische Wesen, die unser Handeln beeinflussen, und wir erforschen derzeit Möglichkeiten, um diese Einflüsse abzuschwächen."
 shroud_influence: "Den Stimmen lauschen"
 shroud_influence_desc: "Unser Bewusstsein wird von Wesen beeinflusst, die auf psionischem Weg mit uns kommunizieren."
 shroud_suppression: "Impulsunterdrückung"
 shroud_suppression_desc: "Es gibt psionische Wesen, die unsere Handlungen zu beeinflussen versuchen. Wir müssen diese fremden Impulse unterdrücken."
 psionic_inhibitors: "Psionische Inhibitoren"
 psionic_inhibitors_desc: "Wir investieren in die Entwicklung von Implantaten, um die psychischen Störungen zu unterdrücken, die die Psionik verursacht."
 psionic_inhibitors_machine: "$psionic_inhibitors$"
 psionic_inhibitors_machine_desc: "Wir investieren in die Entwicklung von Verbesserungen, um die neuralen Störungen zu unterdrücken, die die Psionik verursacht."
 psionic_meditation: "Psionische Meditation"
 psionic_meditation_desc: "Unsere Forschung konzentriert sich derzeit auf verbesserte Meditationsmethoden für die Bevölkerung, um die psychischen Störungen zu mindern, die die Psionik verursacht."
 psionic_meditation_machine: "$psionic_meditation$"
 psionic_meditation_machine_desc: "Unsere Forschung konzentriert sich derzeit auf verbesserte Meditationsmethoden für die Bevölkerung, um die neuralen Störungen zu mindern, die die Psionik verursacht."
 psionic_training: "Psionische Ausbildung"
 psionic_training_desc: "Der Einfluss, den die Psionik auf unser Bewusstsein besitzt, bietet uns reichlich Chancen für unser psynergetisches Wachstum. Unser proaktiver Ansatz hat das Ziel, Strategien hervorbringen, die sich auf die Psionik konzentrieren und die Ergebnisse durchgängig optimieren."
 sleep_disturbance_research: "Schlafstörungsforschung"
 sleep_disturbance_research_desc: "Die psionischen Energien stören unsere Schlafzyklen. Wir haben reichlich Ressourcen in die Forschung investiert, um diese Albträume zu beenden."
 night_terrors: "Nachtschreck"
 night_terrors_desc: "Die psionischen Energie rufen schreckliche Albträume hervor, die unsere Schlafzyklen stören."
 night_terrors_gestalt: "$night_terrors$"
 night_terrors_gestalt_desc: "$night_terrors_desc$"
 shroud_portal: "Schleierportal"
 shroud_portal_desc: "Versuche, den Schleier zu durchdringen, lösten eine Welle von Angriffen durch lokale Wildtiere aus. Dies ist der Preis, den wir für die Weiterentwicklung unserer psionischen Fähigkeiten zahlen müssen."
 shroud_portal_gestalt: "$shroud_portal$"
 shroud_portal_gestalt_desc: "$shroud_portal_desc$"
 mindwarden_enclave_capacity: "Kapazität ($gov_mindwarden_enclave$)"
 mindwarden_enclave_capacity_desc: "Indem wir unsere Kapazitäten zur Schaffung weiterer unabhängiger $ENCLAVE_MINDWARDEN_PLURAL$ erhöhen, treiben wir unsere Mission zur Bekämpfung der psionischen Infektion in der gesamten Galaxie voran."
 mindwarden_logistics: "Gedankenwächter-Logistik"
 mindwarden_logistics_desc: "Dank der logistischen Unterstützung der Gedankenwächter konnte unsere Flotte weiter optimiert werden."
 survivors_of_the_end_modifier: "Überlebende des Endes"
 survivors_of_the_end_modifier_desc: "Trotz schwerer Verluste haben wir eine $PSIONIC_AURA$ kataklystischen Ausmaßes überlebt."
 penal_experimental_sentencing: "Ideale Testumgebung"
 penal_experimental_sentencing_desc: "Die von uns errichtete Strafkolonie bietet eine ausgezeichnete Testumgebung für umfangreiche Experimente."
