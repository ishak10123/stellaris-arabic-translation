 fertility_accord_tt: "Neue £decision£ §Yplanetare Entscheidung§!: §H$decision_add_aura_blocker$§!\nNeues £building£ §Y$BUILDING$§!: ['building:building_composer_sanctum']"
 col_pleasure: "Vergnügungswelt"
 col_pleasure_desc: "Ein Paradies des Überflusses und der psionischen Glückseligkeit. Durch psychische Verbesserungen kreierte exotische Freuden offenbaren eine Welt der transzendenten Lust."
 col_pleasure_tt: "$col_pleasure_desc$"
 bliss_accord_tt: "Erhält die Fähigkeit, eine §Y$col_resort$§! in eine §Y$col_pleasure$§! umzuwandeln. Dies erlaubt den Bau von §HHeiligtümern§! und des ['building:building_psi_corps'] und erhöht den §Y$i_trade_value$§! um §G5%§!.\nNeues £building£ §Y$BUILDING$§!: ['building:building_instrument_sanctum']"
