 ACCORD_EXTERMINATION_TT: "Insgesamt getötete £pop£ Bewohner über alle Kolonien hinweg: §R$@extermination_pop_loss|0$§!\nFortschritt bei der §HSituation§!\"§Y$situation_end_of_the_cycle$§!\": §G-120§!"
