 building_cradle_sanctum: "Heiligtum der Wiege"
 building_cradle_sanctum_desc: "Das Heiligtum ist ein Ort, an dem die Wiege verehrt werden kann. [GetCradleSanctumDesc]"
 building_cradle_sanctum_desc_homicidal: "Hier treffen sich Bewusstseine, um den fremdartigen Willen unseres Schleierpakts zu verstehen."
