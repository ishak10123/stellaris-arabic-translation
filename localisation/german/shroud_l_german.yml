 abomination_army: "Abscheulichkeiten"
 abomination_army_desc: "Versklavte Soldaten, die experimentellen Behandlungen unterzogen wurden, um ihre Aggressivität und Kampfkraft zu steigern. Sie sind lebende Waffen, die ihren Herren ebenso unterwürfig sind, wie sie sich im Kampf unerbittlich zeigen."
