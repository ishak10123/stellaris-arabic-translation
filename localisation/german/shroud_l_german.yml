 situation_breach_shroud_endbringers_chamber_of_silence_needed_desc: "£trigger_yes£ Hat die Tradition \"$tr_psionics_endbringers_cult$\"\n£trigger_no£ Hat NICHT das Gebäude \"$building_chamber_of_silence$\""
