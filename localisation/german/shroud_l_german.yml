 ACCORD_TRUST: "Vision"
 ACCORD_TRUST_desc: "Die $the_cradle_of_souls_article_cap$ spricht mit vielen Mündern, und wir teilen nun eine Stimme."
 ACCORD_THOUGHTBOND: "Gedankenbindung"
 ACCORD_THOUGHTBOND_desc: "Die $the_cradle_of_souls_article_cap$ schafft eine beispiellose Harmonie der Gedanken."
 ACCORD_THOUGHTBOND_TT: "$mod_pop_factions_produces_mult$: §G+$@accord_thoughtbond_faction_output|0%$§! für §H$@accord_duration|0$§! Jahre"
 ACCORD_THOUGHTBOND_TT_gestalt: "$mod_planet_jobs_unity_produces_mult$: §G+$@accord_thoughtbond_unity_from_jobs|0%$§! für §H$@accord_duration|0$§! Jahre"
 ACCORD_FAVOR: "Gefallen"
 ACCORD_FAVOR_desc: "Die $the_cradle_of_souls_article_cap$ gibt der Diplomatie eine hohe Wertigkeit."
 ACCORD_FAVOR_TT: "Nutzt alle Gefallen von anderen Reichen innerhalb unserer §Hpsionischen Aura§!, um Einigkeit und Einfluss zu erhalten.\n$ACCORD_LOOSE_INTENSITY$"
 # Composer of Strands accords
 ACCORD_LIFE: "Wachstum"
 ACCORD_LIFE_desc: "Die $the_composer_of_strands_article_cap$ trägt Früchte, und dennoch säen wir."
 ACCORD_FERTILITY: "Elan"
 ACCORD_FERTILITY_desc: "Die $the_composer_of_strands_article_cap$ segnet uns mit ihrem fruchtbaren Einfluss."
 ACCORD_TRANSFORMATION: "Transformation"
 ACCORD_TRANSFORMATION_desc: "Die $the_composer_of_strands_article_cap$ formt Welten nach ihrem Willen."
 ACCORD_TRANSFORMATION_TT: "Eine zufällige unbewohnte Welt innerhalb unserer Grenzen wird zu einer §H$pc_gaia$§! der Größe §G$@accord_transformation_gaia_world_size|0$§! umgewandelt"
 ACCORD_GENERATION: "Ausbreitung"
