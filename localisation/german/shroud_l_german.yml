 RECKONING_ARRIVAL_PROJECT: "Der Abrechnung entgegentreten"
 RECKONING_ARRIVAL_PROJECT_DESC: "Die Galaxie wird von einem extrem mächtigen Wesen bedroht, dass als die \"§R$NAME_Reckoning$§!\" bekannt ist. Das aus purer Energie bestehende Wesen materialisierte sich urplötzlich und zerstört alles, was sich ihm in den Weg stellt.\n\nDie verfügbaren Daten weisen darauf hin, dass dieses Wesen eine Bedrohung darstellt, wie wir sie noch nie zuvor gesehen haben. Wenn wir ihr entgegentreten wollen, sollten wir effektivere Methoden zu ihrer Bekämpfung erforschen."
 shroud.11235.title: "$RECKONING_ARRIVAL_PROJECT$"
 shroud.11235.desc: "Unsere [GetScientistPlural] beendeten ihre Forschungen bezüglich des mächtigen Wesens, das als die \"§R$NAME_Reckoning$§!\" bekannt ist.\n\nAuf der Grundlage ihrer Erkenntnisse konnte eine wirksame Methode entwickelt werden, um den Feind mit unserer vorhandenen Technologie zu bekämpfen. Die Energie, aus der sich die $NAME_Reckoning$ zusammensetzt, kann durch eine modifizierte Waffe abgetragen werden, die ursprünglich dazu gedacht war, Energieschilde zu durchdringen.\n\nWir stehen weiterhin vor einer großen Herausforderung, doch zumindest haben wir jetzt bessere Chancen, der Bedrohung entgegenzutreten."
 shroud.11235.a: "$extreme_frontiers.1531.i$"
 RECKONING_VULNERABILITY_PROJECT: "Es muss eine Schwachstelle haben"
 RECKONING_VULNERABILITY_PROJECT_DESC: "Auch wenn wir die §R$NAME_Reckoning$§! nicht zu besiegen vermochten, lieferte die Konfrontation dennoch wertvolle Daten für weitere Studien.\n\nIndem wir dieses mysteriöse Energiewesen weiter erforschen, machen wir hoffentlich eine Schwachstelle aus und entwickeln effektivere Angriffsmethoden."
 shroud.11240.title: "Aus Niederlagen lernen"
 shroud.11240.desc: "Die §R$NAME_Reckoning$§! machte kurzen Prozess mit unserer Flotte. Trotz dieser Niederlage konnten wir jedoch wichtige Daten über das mysteriöse Energiewesen sammeln - Informationen, die wir ohne diesen direkten Kontakt nicht hätten erhalten können.\n\nEine vorläufige Analyse lässt darauf schließen, dass wir genügend Datenpunkte sammelten, um die Zusammensetzung dieses Wesens zu modellieren. Die weitere Forschung erlaubt es uns hoffentlich, Schwachstellen zu identifizieren und unsere Angriffe entsprechend zu optimieren."
 shroud.11240.a: "Es muss eine Schwachstelle haben."
 shroud.11245.title: "Die Schwachstelle der $NAME_Reckoning$"
 shroud.11245.desc.1: "Unsere [GetScientistPlural] erzielten bei der Erforschung des als \"§R$NAME_Reckoning$§!\" bekannten Energiewesens einen Durchbruch."
 shroud.11245.desc.2.intro: "Dieses Wesen ist"
 shroud.11245.desc.2.outro: "Mithilfe von Lasern, die \"psionische Unterdrückungseigenschaften\" besitzen, können unsere Flotten diese Verbindung unterbrechen, wodurch die physische Form für Angriffe anfällig werden sollte."
 shroud.11245.desc.2.psionic: "$shroud.11245.desc.2.intro$ aus dem §HSchleier§! gekommen und hält auch eine transdimensionale Verbindung ins psionische Reich aufrecht, um seine Verteidigung zu erhöhen. $shroud.11245.desc.2.outro$"
 shroud.11245.desc.2.non_psionic: "$shroud.11245.desc.2.intro$ aus einer anderen Dimension der Realität gekommen und hält eine transdimensionale Verbindung aufrecht, um seine Verteidigungskraft zu erhöhen. $shroud.11245.desc.2.outro$"
 reckoning_insight_modifier: "Einblicke in die Abrechnung"
 reckoning_insight_modifier_desc: "Durch intensive Forschung fanden wir endlich eine wirksame Methode, um die $NAME_Reckoning$ effektiv zu bekämpfen. Wir müssen dafür nur unsere bereits bestehende Bewaffnung leicht modifizieren."
 reckoning_vulnerability_modifier: "Schwachstellen der Abrechnung"
 reckoning_vulnerability_modifier_desc: "Mithilfe der Daten, die wir bei unseren vorherigen Begegnungen mit der Abrechnung sammelten, entdeckten wir eine Möglichkeit, durch Laser mit \"psionischen Unterdrückungseigenschaften\" größeren Schaden anzurichten."
