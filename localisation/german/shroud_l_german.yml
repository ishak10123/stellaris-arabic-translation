 EXILED_COLONY_01: "Dhorodh"
 EXILED_COLONY_02: "Ix-Travunnh"
 EXILED_COLONY_03: "Ob-Ratak"
 EXILED_COLONY_04: "Dax-i-Hafa"
 EXILED_COLONY_05: "Blorr"
 EXILED_COLONY_06: "Frorzak"
 shroud.6020.name: "$UNKNOWN_LONG$"
 shroud.6020.desc: "§HAls wir versuchten, den Kontakt herzustellen, wurden die Besatzungsmitglieder auf der Brücke von unregelmäßigen Kopfschmerzen geplagt ...§!"
 shroud.6030.name: "[exiled_country.GetName]"
 shroud.6030.desc: "§HTrotzt wiederholter Versuche erhielten wir noch immer keine Antwort aus [exiled_country.GetName].§!"
 shroud.6050.name: "Ein seltsamer Zusammenhang"
 shroud.6050.desc: "Unser §H$building_ancient_ward_1$§! liefert in letzter Zeit unregelmäßige Messwerte. Normalerweise ist dies auf psionischen Aktivität auf [Root.GetHomeWorldName] zurückzuführen, doch wir fanden keine Beweise für eine solche Verdorbenheit.\n\nDie Antwort könnte jenseits unserer Grenzen liegen. Unsere Langstreckenscanner zeichneten einen seltsamen Energieausbruch im §H[exiled_system_border.GetName]§!-System auf, der zeitmäßig mit den Messwerten unseres $building_ancient_ward_1$es übereinstimmt."
 shroud.6050.a: "Wir müssen das [exiled_system_border.GetName]-System erkunden."
 shroud.shared_text_psy_symptoms: "emotionale Instabilität; lähmender psychischer Stress; wiederkehrende Visionen unaussprechlichen Grauens"
 shroud.shared_text_psi_radiation: "Diese Phänomene stimmen weitgehend mit den Erfahrungen überein, die unsere Vorfahren machten. Höchstwahrscheinlich handelt es sich um das, was sie als \"Psi-Strahlung\" bezeichneten, eine besonders zerstörerische Energieform."
 shroud.shared_text_ship_malfunction: "Die Schiffssysteme weisen ebenfalls schwerwiegende Fehlfunktionen auf, weshalb ein normaler Betriebsablauf nahezu unmöglich ist."
 shroud.6100.name: "Gefährliche Energien"
 shroud.6100.desc.no_border_aura: "Im kürzlich entdeckten §H[from.GetName]§!-System kam es zu einem alarmierenden Vorfall, als die Besatzung der [root.GetName] von einer Reihe psychischer Symptome berichtete, unter der sie litt: $shroud.shared_text_psy_symptoms$. Die Schiffssysteme sind ebenfalls von merkwürdigen Störungen befallen.\n\n$shroud.shared_text_psi_radiation$ Außerhalb unseres §HAhnenschutzes§! erleben wir zum ersten Mal die mentale Seuche, vor der uns unsere Vorfahren warnten.\n\nNachdem wir unsere Langstreckenscanner auf diese einzigartige Energieform kalibriert hatten, stellten wir fest, dass diese gefährliche Strahlung ihren Ursprung im §H[exiled_center_system.GetName]§!-System hat. $shroud.6100.desc.end$"
 shroud.6100.desc.border_aura: "Die Besatzung der [root.GetName] befindet sich in größter Gefahr!\n\nNachdem sie einer extrem hohen psionischen Strahlung im §H[from.GetName]§!-System ausgesetzt war, verschlimmerten sich ihre psychischen Probleme noch mehr als zuvor berichtet: $shroud.shared_text_ship_malfunction$\n\nUnsere Langstreckenscanner registrierten noch höhere Strahlungswerte in der Nähe des §H[exiled_center_system.GetName]§!-Systems. $shroud.6100.desc.end$"
 shroud.6100.desc.end: "Es wird dringend davon abgeraten, Schiffe weiter in diese Richtung zu schicken, bevor nicht die Auswirkungen gründlicher bewertet wurden."
 shroud.6100.tt: "Der §Y$first_contact$§! wird vorbereitet."
 shroud.6110.name: "Eine Präsenz im [This.System.GetName]-System"
 shroud.6110.desc: "Erstaunlicherweise scheint es im §H[This.System.GetName]§!-System große Objekte zu geben, die von intelligenter, unnatürlicher Bauweise sind. Vielleicht erfahren wir etwas über ihre Schöpfer, die wir vorerst \"§H[This.ContactCountry.GetName]§!\" genannt haben, wenn wir aus sicherer Entfernung einen direkten Kommunikationskanal öffnen.\n\nJede Lebensform, die sich in dem System aufhält, muss aufgrund der hohen psionischen Strahlung, die wir maßen, in großer Gefahr sein."
 fcsum_exiled_1: "Wir haben möglicherweise die Existenz einer fremden Intelligenz im §H[This.System.GetName]§!-System entdeckt."
 shroud.6115.name: "Begrenzter Fortschritt"
 shroud.6115.desc: "Eine genauere Untersuchung ergab, dass es sich bei den Objekten im §H[This.System.GetName]§!-Systeme vermutlich um Raumschiffe handeln könnte - allerdings konnten wir bisher noch keinen Kontakt zu der Besatzung herstellen.\n\nBeunruhigender jedoch ist, dass unser Gesandter [exiled_envoy.GetName] berichtete, dass [exiled_envoy.GetHisHer] Team parapsychologische Symptome aufweist, zu denen auch unerklärliche Visionen von seltsamen Wesen aus dem [This.System.GetName]-System gehören. Trotz dieser Komplikationen ist unsere Gesandtschaft weiterhin gewillt, die Mission fortzuführen."
 shroud.6115.a: "Macht weiter."
 fcsum_exiled_2: "Wir konnten noch keinen Kontakt zu \"§H[This.ContactCountry.GetName]§!\" herstellen. Unser Gesandter berichtete von psychischen Veränderungen bei seinem Team."
 shroud.6120.name: "Mission abgebrochen"
 shroud.6120.desc: "Nach Monaten der Stille erhielten wir endlich eine Übertragung von [exiled_envoy.GetName]. Der sonst nüchterne und direkte Gesandte gab einen bizarren, wirren Bericht ab. [exiled_envoy.GetSheHeCap] übermittelte Beschreibungen von seltsamen Bildern - offenbar ein Gewirr aus Träumen und Wahnvorstellungen. Die Beschreibungen vom Rest [exiled_envoy.GetHisHer]es Teams waren ebenso wenig schlüssig.\n\nWir haben sie ihren Aufgaben entbunden und diese Mission auf unbestimmte Zeit ausgesetzt.Was auch immer im §H[This.System.GetName]§!-System ist: Es liegt derzeit außerhalb unserer Möglichkeiten einer sicheren Untersuchung."
 fcsum_exiled_3: "Nach einer traumatischen Mission kehrte unser Team nach Hause zurück, bevor es Kontakt mit \"§H[This.ContactCountry.GetName]§!\" aufnehmen konnte."
 shroud.6125.desc: "Etwas schwebt über der brodelnden Strömung. §H[Root.Capital.GetName]§!, oder ...?\n\n§H... ein Rufen ...§!\n\nDie Oberfläche bricht auf. Ein übelriechender Gestank steigt aus unsichtbaren Tiefen auf.\n\n§H... eine Antwort ... nichts ...§!\n\nUnaufhörlich. Erstickend.\n\nEs ist schrecklich."
 MESSAGE_FIRST_CONTACT_ABORTED_EXILED_DESC: "Unser Erstkontaktverfahren mit $COUNTRY|H$ wurde infolge eines Exekutivbeschlusses abgebrochen."
 shroud.shared_text_aura_spread: "Die psionische \"Infektion\" hat sich nun auch auf das §H[exiled_system_border.GetName]§!-System ausgebreitet.\n\nTrotz des §HAhnenschutzes§! leidet unsere Bevölkerung auf §H[Root.GetHomeWorldName]§! bereits unter milden Symptomen einer psionischen Strahlenvergiftung. Erste Prognosen weisen darauf hin, dass sich diese Bewusstseinsplage schon bald auch auf das §H[Root.home_planet.System.GetName]§!-System ausgebreitet haben wird, wo sie eine deutlich höhere Gefahr für unsere Heimatwelt darstellt."
 shroud.shared_text_aura_study: "Trotz der Risiken liegt unsere größte Hoffnung auf einen wirksamen Schutz darin, dieses Phänomen näher an der Quelle zu untersuchen."
 shroud.6200.name: "Psionische Strahlung auf §H[Root.GetHomeWorldName]§!"
 shroud.6200.desc.no_visit: "Auf §H[Root.GetHomeWorldName]§! kam es zu einer alarmierenden Entwicklung. Die Bevölkerung leidet unter einer Reihe psychischer Symptome: $shroud.shared_text_psy_symptoms$.\n\n$shroud.shared_text_psi_radiation$ Jene, die sich außerhalb unseres §HAhnenschutzes§! befinden, erleben zum ersten Mal die mentale Seuche, vor der uns unsere Vorfahren warnten.\n\nNachdem wir unsere Langstreckenscanner auf diese einzigartige Energieform kalibriert hatten, stellten wir fest, dass diese gefährliche Strahlung ihren Ursprung jenseits des §H[exiled_system_border.GetName]§!-Systems hat. $shroud.shared_text_aura_study$"
 shroud.6200.desc.visit_no_ship: "$shroud.shared_text_aura_spread$\n\n$shroud.shared_text_aura_study$"
 shroud.6200.desc.visit_and_ship: "$shroud.shared_text_aura_spread$\n\nSeit sie einer extrem hohen psionischen Strahlung im §H[exiled_system_border.GetName]§!-System ausgesetzt war, haben sich die psychischen Probleme der Besatzung der [event_target:ship_in_border.GetName] nur noch weiter verschlimmert. $shroud.shared_text_ship_malfunction$\n\n$shroud.shared_text_aura_study$"
 shroud.6200.a: "Wir müssen herausfinden, wie wir diese Induktion aufhalten können."
 PSI_RADIATION_PROJECT: "Psionische Strahlung"
 PSI_RADIATION_PROJECT_DESC: "Die pscionischen Strahlungswerte im §H[exiled_system_border.GetName]§!-System nahmen plötzlich zu, und die Auswirkungen sind bereits auf §H[Owner.GetHomeWorldName]§! zu spüren. Wir müssen dieses Phänomen genau untersuchen, bevor die Bevölkerung weiteren Gefahren ausgesetzt wird."
 shroud.6205.name: "$PSIONIC_AURA_PLURAL$"
 shroud.6205.desc.start: "Unsere Wissenschaftler litten stark unter der giftigen psionischen Strahlung im §H[exiled_system_border.GetName]§!-System, doch ihre Mission lieferte uns endlich einige Erkenntnisse.\n\nWir konnten dieses alarmierende Phänomen als \"§H$PSIONIC_AURA$§!\" klassifizieren, eine dichte Anhäufigung zerstörerischer Energie, die nicht nur unser Bewusstsein, sondern auch unsere Technologie stören kann. Sie breitete sich vom §H[exiled_center_system.GetName]§!-System her aus, wo die psionischen Energien so stark sind, dass sie auf benachbarte Systeme übersprangen."
 shroud.6205.desc.aura_home: "$shroud.6205.desc.start$\n\nDie Aura hat bereits das §H[Root.home_planet.System.GetName]§!-System erreicht, was katastrophale Folgen nach sich zog. $shroud.6205.desc.end$"
 shroud.6205.desc.no_aura_home: "$shroud.6205.desc.start$\n\nSollte die Aura das §H[Root.home_planet.System.GetName]§!-System erreichen, wären die Folgen katastrophal. $shroud.6205.desc.end$"
 shroud.6205.desc.end: "Der §H$building_ancient_ward_1$§! auf §H[Root.GetHomeWorldName]§! bietet nur begrenzt Schutz."
 shroud.6205.a: "Wir müssen den $building_ancient_ward_1$ verstärken."
 PSIONIC_AURA_RESISTANCE_PROJECT: "Abwehr psionischer Auren"
 PSIONIC_AURA_RESISTANCE_PROJECT_DESC: "Der von unseren Vorfahren erbaute §H$building_ancient_ward_1$§! auf §H[Owner.GetHomeWorldName]§! wurde so konzipiert, dass er uns vor psionischer Strahlung schützt. §H$PSIONIC_AURA_PLURAL$§! drohen jedoch, die derzeitigen Kapazitäten zu überlasten. Indem wir das bisher Gelernte anwenden, sollten wir in der Lage sein, die Abwehrfähigkeiten zu verbessern."
 shroud.6210.name: "Psionische Dämpfung"
 shroud.6210.desc: "Unsere Wissenschaftler arbeiteten unermüdlich daran, eine Methode zur Stärkung unseres §HAhnenschutzes§! auf §H[Root.GetHomeWorldName]§! zu entwickeln. Durch die Verstärkung der psionischen Dämpfer kann der Schutz nun auf das gesamte §H[Root.home_planet.System.GetName]§!-System ausgeweitet werden.\n\nIhre Forschung führte auch dazu, dass diese verlorene Technologie wieder in den Fokus der Wissenschaft geraten ist. Wir wissen nun, dass die Verbindung zwischen Psi-Strahlung und dem [Root.GetSpeciesAdj]en Bewusstsein wechselseitig ist: Die Strahlung beeinflusst nicht nur unseren mentalen Zustand, wir sind auch in der Lage, Einfluss auf die psionische Strahlung zu nehmen. Es scheint, dass unser uraltes Tabu gegen \"psionische\" Praktiken doch eine wissenschaftliche Grundlage hat."
 shroud.6210.a: "Faszinierend - und beunruhigend."
 shroud.6210.a.tt: "$BEGINS_EVENT_CHAIN$ §Y$ancient_ward_upgrade_chain_title$§!"
 ancient_ward_upgrade_chain_title: "Der $building_ancient_ward_2$"
 ancient_ward_upgrade_chain_desc: "Der §H$building_ancient_ward_1$§! auf §H[Owner.GetHomeWorldName]§! hat seine funktionalen Grenzen erreicht. Um der psionischen Bedrohung etwas entgegenzusetzen, wird es nötig sein, die Kapazitäten zu vergrößern. Dieser neue §H$building_ancient_ward_2$§! wird unsere Bevölkerung vor der Plage einer §Hpsionischen Aura§! schützen."
 ancient_ward_upgraded: "Gebäude verbessert"
 shroud.6215.name: "Der $building_ancient_ward_2$ ist fertiggestellt"
 shroud.6215.desc.aura_home: "Nachdem unser §H$building_ancient_ward_2$§! fertiggestellt war, ging die psionische Strahlung im §H[Root.home_planet.System.GetName]§!-System auf ein vertretbares Maß zurück. Die Bevölkerung von §H[Root.GetHomeWorldName]§! erholt sich allmählich von den negativen Auswirkungen."
 shroud.6215.desc.no_aura_home: "Nachdem unser §H$building_ancient_ward_2$§! fertiggestellt war, ging die psionische Strahlung auf §H[Root.GetHomeWorldName]§! auf ein vertretbares Maß zurück. Die Bevölkerung erholt sich allmählich von den negativen Auswirkungen."
 shroud.6215.desc.end: "Nichtsdestotrotz vergiften diese §H$PSIONIC_AURA$§! und potenziell auch andere die Galaxie. Unsere Wissenschaftler stellten die Hypothese auf, dass die Technologie des $building_ancient_ward_2$es für die Entwicklung stärkerer \"§H$SHROUD_SEAL$§!\" genutzt werden könnte. Diese massiven Strukturen sollten in der Lage sein, Auren im gesamten Sternencluster zu unterdrücken. Ein solches $SHROUD_SEAL$ im §H[exiled_system_border.GetName]§!-System zu bauen, beschleunigt unseren Fortschritt bei der Bekämpfung der psionischen Infektionen erheblich."
 shroud.6215.a: "Diese Forschung ist es wert, weiter verfolgt zu werden."
 build_shroud_seal_poi_desc: "Sobald wir die Technologie \"§H$tech_psionic_suppression$§!\" erforscht haben, können wir ein $constructor$ anweisen, ein §H$SHROUD_SEAL$§! innerhalb des Gravitationsfelds des Sterns zu errichten. Dieses Siegel wird §H$PSIONIC_AURA_PLURAL$§! im gesamten Sternensystem sowie benachbarten Sternensystemen, die über eine Hyperraumroute verbunden sind, unterdrücken."
 shroud_seal_construction_chain_title: "Bau eines $SHROUD_SEAL$s"
 shroud_seal_construction_chain_desc: "Unsere Wissenschaftler stellten die Theorie auf, dass es möglich sein sollte, fortschrittlichere Technologien für die §Hpsionische Unterdrückung§! zu entwickeln, um §H$PSIONIC_AURA_PLURAL$§! in ganzen Sternenclustern zu unterdrücken.\n\nDiese Technologie wird es uns erlauben, ein \"§H$SHROUD_SEAL$§!\" zu bauen. Ein solches Siegel im §H[exiled_system_border.GetName]§!-System zu bauen, beschleunigt unseren Fortschritt bei der Bekämpfung der psionischen Infektionen erheblich."
 tech_psionic_suppression_researched: "$tech_psionic_suppression$ erforscht"
 shroud_seal_built: "$SHROUD_SEAL$ errichtet"
 shroud_6216_poi: "[exiled_system_border.GetName]"
 shroud_6216_poi_desc: "$build_shroud_seal_poi_desc$"
 shroud.6220.name: "Extreme Strahlung"
 shroud.6220.desc: "Nachdem die Besatzung der §H[Root.GetName]§! der extrem hohen psionischen Strahlung im §H[exiled_system_border.GetName]§!-System ausgesetzt war, verschlimmerten sich ihre psychischen Probleme noch mehr als zuvor berichtet. $shroud.shared_text_ship_malfunction$"
 shroud.6225.name: "Strahlung im §H[Root.home_planet.System.GetName]§!-System"
 shroud.6225.desc.shared: "Die negativen Auswirkung einer psionischen Strahlenvergiftung machen sich bereits in der gesamten Bevölkerung von §H[Root.GetHomeWorldName]§! bemerkbar und sogar unsere Schiffsysteme sind davon beeinträchtigt."
 shroud.6225.desc.know_aura: "Die §H$PSIONIC_AURA$§! hat sich auf das §H[Root.home_planet.System.GetName]§!-System ausgebreitet. $shroud.6225.desc.shared$\n\nDie Notwendigkeit, den §H$building_ancient_ward_1$§! zu verstärken, ist dringlicher denn je."
 shroud.6225.desc.no_know_aura: "Die psionische Plage hat sich auf das §H[Root.home_planet.System.GetName]§!-System ausgebreitet. $shroud.6225.desc.shared$\n\nEs wird immer dringlicher, diese Kontamination zu verstehen."
 shroud.6225.a: "Wir dürfen keine Zeit verlieren."
 shroud.6225.a.know_aura.tt: "Die §H$PSIONIC_AURA$§! von §H[exiled_country.GetName]§! hat die folgenden Auswirkungen:\n$effect_exiled_aura$"
 shroud.6225.a.no_know_aura.tt: "Diese psionische Phänomen hat die folgenden Auswirkungen:\n$effect_exiled_aura$"
 effect_exiled_aura: "- $MOD_SHIP_FIRE_RATE_MULT$: §R-125%§!\n- $MOD_SHIP_SHIELD_MULT$: §R-200%§!\n- $MOD_SHIP_EVASION_MULT$: §R-100%§!\n- $mod_planet_jobs_produces_mult$: §R-30%§!\n- $mod_planet_pops_upkeep_mult$: §R+100%§!\n- $MOD_PLANET_BUILDING_TIME_MULT$: §R+100%§!"
 shroud.6231.name: "§H[root.GetHomeWorldName]§! verloren"
 shroud.6231.desc: "Wir haben die Kontrolle über unsere Heimatwelt §H[root.GetHomeWorldName]§! verloren. Als unser wichtigster Wissensspeicher und Dreh- und Angelpunkt all unserer anti-psionischen Einsätze werden wir die Welt erst zurückgewinnen müssen, ehe wir unseren Kampf gegen die Psionik fortsetzen können."
 shroud.6231.a: "Wir müssen unverzüglich die Kontrolle zurückgewinnen."
 shroud_6231_poi: "[root.GetHomeWorldName]"
 shroud_6231_poi_desc: "Wir müssen unverzüglich die Kontrolle über §H[root.GetHomeWorldName]§! zurückgewinnen."
 shroud_reclaim_homeworld_chain_title: "Rückeroberung von §H[root.GetHomeWorldName]§!"
 shroud_reclaim_homeworld_chain_desc: "Wir haben die Kontrolle über unsere Heimatwelt §H[root.GetHomeWorldName]§! verloren. Als unser wichtigster Wissensspeicher und Dreh- und Angelpunkt all unserer anti-psionischen Einsätze werden wir die Welt erst zurückgewinnen müssen, ehe wir unseren Kampf gegen die Psionik fortsetzen können."
 homeworld_reclaimed: "Heimatwelt zurückerobert"
 shroud.6241.name: "§H[root.GetHomeWorldName]§! zurückerobert"
 shroud.6241.desc: "Wir haben die Kontrolle über unsere Heimatwelt §H[root.GetHomeWorldName]§! zurückerlangt. Die [root.GetName] kann sich damit wieder in vollem Umfang dem Kampf gegen die Psionik widmen."
 shroud.6241.a: "$EXCELLENT$"
 shroud.6300.name: "Schatten im Schleier"
 shroud.6300.desc: "Unsere Wissenschaftler beendeten ihre Forschungen beendet und entwickelten eine neue Technologie zur §Hpsionischen Unterdrückung§!. Wir können nun die Effekte unseres $building_ancient_ward_2$es auch in anderen von uns kontrollierten Kolonien replizieren, indem wir einen §HPsionischen Unterdrücker§! bauen.\n\nUm jedoch zu verhindern, dass sich §H$PSIONIC_AURA_PLURAL$§! auf andere Systeme ausbreiten, müssen wir etwas noch Mächtigeres errichten: das §H$SHROUD_SEAL$§!. $shroud.shared_text_shroud_seal$\n\nDie Forschungen verliehen auch einer beunruhigenden Theorie Glaubwürdigkeit, die in okkulten Texten beschrieben wird: Sie dreht sich um ein ätherisches Reich, das \"§HSchleier§!\" genannt wird und eine Dimension aus purer psionischer Energie ist. Die Theorie besagt, die kognitive Aktivität empfindungsfähiger Wesen könne dazu führen, dass Energie aus dem Schleier in die von uns beobachtbare Realität eindringt - und dass dieser Prozess die Ursache für die Bildung von $PSIONIC_AURA_PLURAL$ im Allgemeinen ist.\n\nDas bedeutet, dass wir es nicht nur mit den objektiven Kräften des Universums zu tun haben, sondern möglicherweise auch mit berechnenden Handlungen, hinter denen unklare Absichten stehen."
 shroud.6300.a: "Der \"§HSchleier§!\" ist also wirklich real ...?"
 shroud.6500.name: "Unerwartete Übertragung"
 shroud.6500.desc: "Wir empfingen eine unerwartete Übertragung von jenseits des §H[exiled_system_border.GetName]§!-Systems. §H[exiled_country.GetName]§! beherrscht auf unerklärliche Weise sowohl unsere Sprache und weiß gleichzeitig unsere Kommunikationssysteme zu nutzen."
 shroud.shared_screen_figure: "§HDas auf dem Bildschirm sichtbare Wesen kommuniziert in einem gleichmäßigen, hypnotischen Rhythmus, der von längeren Pausen unterbrochen wird.§!\n\nFerne Nachbarn, da ihr auf direkte Kontaktaufnahmen nicht reagiertet, entschlossen wir uns zu der mühsamen Nutzung primitiverer Telekommunikationsmittel.\n\nIch bin §HUk-Hogolath Scarat§!, Psiarch von §H[exiled_country.GetName]§!. Bitte entschuldigt die fehlenden Formalitäten, aber die Angelegenheit ist dringlich."
 shroud.shared_auric_flow_inhibition: "hemmt den ordnungsgemäßen Fluss unserer Aura. Wir gehen davon aus, dass diese untragbare Situation das Ergebnis eines unwissentlichen Fehlers Eurerseits war.\n\nDie Aura nützt jedem. Sie sollte in der gesamten Galaxie leuchten. Um Euer Engagement für das Allgemeinwohl zu demonstrieren, fordern wir, dass"
 shroud.6505.name: "$shroud.6500.name$"
 shroud.6505.desc: "$shroud.6500.desc$"
 shroud.6510.name: "Psiarch Uk-Hogolath Scarat"
 shroud.6510.desc: "$shroud.shared_screen_figure$ Eure Konstruktion im §H[exiled_system_border.GetName]§!-System $shroud.shared_auric_flow_inhibition$ dieses sogenannte \"$SHROUD_SEAL$\" auf der Stelle demontiert wird."
 shroud.6510.a: "Wir haben zuvor keine Nachricht von Euch erhalten."
 shroud.6515.desc: "Wir sprachen in der wahren Stimme. Hättet Ihr zugehört, hättet Ihr die Rufe in Eurem Inneren gehört. Ihr habt die Gabe dazu, auch wenn Ihr Euch dazu entschlossen habt, sie zu unterdrücken."
 shroud.6515.a: "Die Aura ist zerstörerisch. Sie ist eine Plage für uns."
 shroud.6520.desc: "Euer Verständnis ist unzureichend. Die Aura ist ein heiliges Geschenk unserer Beschützer. Sie vernichtet jeden, der die Zerstörung im Sinn hat."
 shroud.6520.a: "Was, wenn wir den Forderungen nicht nachkommen?"
 shroud.6525.desc: "Jeder, der eine Gefahr für die Aura ist, muss unterworfen werden. Solltet Ihr Euch weigern, werden wir gezwungen sein, militärische Maßnahmen zu ergreifen."
 shroud.6525.a: "Das Siegel bleibt bestehen."
 shroud.6525_heritage.a: "Wir werden unser Erbe niemals aufgeben."
 shroud.6525.b: "Wir werden das Siegel abbauen."
 shroud.6530.desc: "Unwissende Narren."
 shroud.6535.desc: "Eine weise Entscheidung."
 shroud.6550.name: "Feindseligkeiten ausgesetzt"
 shroud.6550.desc: "Um einen unmittelbaren Konflikt mit §H[exiled_country.GetName]§! zu vermeiden, kamen wir den Forderungen nach und bauten das $SHROUD_SEAL$ im §H[exiled_system_border.GetName]§!-System ab.\n\nDer Kontakt mit jener Spezies, die für diese psionische Plage verantwortlich ist, löste große Besorgnis in ganz §H[this.GetName]§! aus. Die Entfernung des $SHROUD_SEAL$s wird sie vermutlich nur kurzzeitig beschwichtigen. Sie werden vermutlich Gleiches auch von unserem §H$building_ancient_ward_2$§! fordern - und das wäre etwas, was wir nicht akzeptieren können.\n\nKünftige Feindseligkeiten scheinen unvermeidlich zu sein."
 shroud.6550.a: "Wir müssen vorbereitet sein."
 shroud.6560.name: "$shroud.6510.name$"
 shroud.6560.desc: "$shroud.shared_screen_figure$ Eine Struktur auf §H[capital_scope.GetName]§! $shroud.shared_auric_flow_inhibition$ dieser sogenannte \"$building_ancient_ward_2$\" auf der Stelle demontiert wird."
 shroud.6560.a: "$shroud.6510.a$"
 shroud.shared_psiarch_transmission: "§HAls sein Bild auf dem Monitor erschien, holte der Psiarch zu einer kalten, monotonen Zurechtweisung aus:§!\n\n[This.GetSpeciesNamePlural], ich bin äußerst enttäuscht, diese Übertragung machen zu müssen."
 shroud.shared_auric_flow_disdain: "Eure Handlungen haben Eure Unwissenheit nur bekräftigt. Eure Verachtung gegenüber unserer Aura und der damit verbundenen psionischen Verbesserungen im Allgemeinen ist mit dem intragalaktischen Frieden unvereinbar. Wir haben keine andere Wahl.\n\nBereitet Euch darauf vor, unseren Flotten entgegenzutreten."
 shroud.6570.name: "$shroud.6510.name$"
 shroud.6570.desc: "$shroud.shared_psiarch_transmission$ Obwohl Ihr zugestimmt habt, das $SHROUD_SEAL$ zu demontieren, sind wir uns des Gebäudes auf §H[capital_scope.GetName]§! bewusst, das über ähnliche Eigenschaften verfügt. Eure Absichten sind klar. $shroud.shared_auric_flow_disdain$"
 shroud.6570.a: "Ihr solltet das Gleiche tun. Beendet die Übertragung."
 shroud.6575.name: "$shroud.6570.name$"
 shroud.6575.desc: "$shroud.shared_psiarch_transmission$ Der Wiederaufbau des $SHROUD_SEAL$s machte jegliche Hoffnungen zunichte, die wir in Eure Wiedergutmachung gesetzt hatten. $shroud.shared_auric_flow_disdain$"
 shroud.6575.a: "$shroud.6570.a$"
 shroud.6580.name: "Versiegelung des §H[exiled_center_system.GetName]§!-Systems"
 shroud.6580.desc: "Nachdem die kolossalen psionischen Dämpfer eingeschaltet wurden, begann unser §H$SHROUD_SEAL$§! unverzüglich damit, die §H$PSIONIC_AURA$§! aus dem §H[exiled_center_system.GetName]§!-System zu drängen.\n\nInterstellare Scans bestätigten, dass das restliche Territorium unseres Feindes direkt über eine Hyperraumroute mit dem [exiled_center_system.GetName]-System verbunden ist. Das $SHROUD_SEAL$ ist daher in der Lage, die $PSIONIC_AURA_PLURAL$ im gesamten Territorium von §H[exiled_country.GetName]§! zu unterdrücken.\n\nUnser Sieg hängt davon ab, dafür zu sorgen, dass das Siegel unbeschädigt bleibt."
 shroud.6580.a: "Wir müssen es um jeden Preis verteidigen."
 shroud.6600.name: "Die Versammlung der Bewusstseinswege"
 shroud.6600.desc: "Wir eroberten erfolgreich die Kolonie unseres psionischen Widersachers auf §H[current_planet.GetName]§!.\n\nDabei erfuhren wir, dass die §H$PSIONIC_AURA$§! im System von der Bevölkerung und ihrer psychischen Interaktion mit dem §HSchleier§! verstärkt wurde - und dass dies besonders von einer Gruppe von Telepathen, die sich \"§HVersammlung der Bewusstseinswege§!\" nennt, vorangetrieben wurde. Dieser psionische Kult verehrt das \"§H$r_the_lost_patron$§!\", angeblich eines der mächtigsten Wesen im Schleier.\n\nSeine heiligen Schriften erwähnen wiederholt ein Artefakt, das mit diesem Wesen in Verbindung steht. Offenbar befindet es sich noch immer auf dem Planeten §H[other_planet.GetName]§!. Dieses Objekt für uns zu beanspruchen, wird uns dabei helfen, die weitere Ausbreitung der psionischen Plage zu verhindern."
 shroud.6600.a: "Setzt Kurs auf [other_planet.GetName]."
 shroud.6601.name: "Ruinen auf [current_planet.GetName]"
 shroud.6601.desc: "Wir schlossen die Kolonisierung von §H[current_planet.GetName]§!, einer ehemaligen Welt von [exiled_country.GetName] ab.\n\nAus den Überresten ihrer Aufzeichnungen erfuhren wir, dass die $PSIONIC_AURA$ im System von der Bevölkerung und ihrer psychischen Interaktion mit dem §HSchleier§! verstärkt wurde - und dass dies besonders von einem psionischen Kult vorangetrieben wurde, der den \"§H$r_the_lost_patron$§!\", angeblich eines der mächtigsten Wesen im Schleier, verehrte.\n\nFragmente der heiligen Schriften des Kults erwähnen wiederholt ein Artefakt, das mit diesem Wesen in Verbindung steht. Offenbar befindet es sich noch immer auf dem Planeten §H[other_planet.GetName]§!. Dieses Objekt für uns zu sichern, würde erfordern, dass wir bei der Eroberung von [other_planet.GetName] einen Teil der Bevölkerung am Leben lassen."
 shroud.6601.a: "$shroud.6600.a$"
 shroud.6700.name: "$SANCTUM_OF_THE_LOST$"
 shroud.6700.desc.common: "Wir ergriffen unverzüglich Maßnahmen, um die Psionik und die damit verbundene weitere Ausbreitung dieser abscheulichen §Hpsionischen Aura§! zu unterbinden.\n\nIn der planetaren Hauptstadt steht ein zerstörter Turm, der als \"§H$SANCTUM_OF_THE_LOST$§!\" bekannt ist und einst als Hochtempel des psionischen Kults diente. Unsere Soldaten beschreiben ihn als einen Ort, der eine ominöse, beunruhigende Präsenz ausstrahlt.\n\nIn der innersten Kammer des Bauwerks befindet sich ein versiegelter \"Kokon\", der eine starke psionische Strahlung absondert. Herkömmliche Munition erwies sich als unwirksam, um die Außenhülle zu durchbrechen. Weitere Untersuchungen sind erforderlich, um die potenzielle Gefahr zu beurteilen, die von diesem Objekt ausgeht."
 shroud.6700.desc.contact: "Die Eroberung von §H[current_planet.GetName]§! markierte unseren endgültigen Sieg gegen §H[exiled_country.GetName]§!. $shroud.6700.desc.common$"
 shroud.6700.desc.no_contact: "Durch die Eroberung von §H[current_planet.GetName]§! erhielten wir die Kontrolle über Territorium, das einst von einem Reich beherrscht wurde, welches sich \"§H[exiled_country.GetName]§!\" nannte. $shroud.6700.desc.common$"
 shroud.6700.desc.contact_no_name: "Die Eroberung von §H[current_planet.GetName]§! markierte unseren endgültigen Sieg. $shroud.6700.desc.common$"
 shroud.6700.desc.no_exiled: "Durch die Eroberung von §H[current_planet.GetName]§! erhielten wir die Kontrolle über Territorium, das einst von psionischen Zeloten regiert wurde. $shroud.6700.desc.common$"
 shroud.6700.a: "Beunruhigend ... Führt weitere Untersuchungen durch!"
 shroud.6705.name: "$psionic_threat_eliminated$"
 shroud.6705.desc.common: "Eine vorläufige Untersuchung förderte Hinweise darüber zutage, dass sich einst ein ausgedehntes Netzwerk von Gebäuden auf dem Planeten befand, wahrscheinlich das Machtzentrum der psionischen Plage. Heute sind nur noch deren zerfallenden Überreste übrig.\n\nWir werden vielleicht niemals erfahren, was für degenerierte Geheimnisse diesen Strukturen innewohnten oder gar welche Absichten die ehemaligen Bewohner hatten. Zumindest wissen wir, dass das System jetzt von den letzten Resten der psionischen Aura befreit wurde und wir vor weiterem Schaden geschützt sind, den sie einst verursachte."
 shroud.6705.desc.contact: "Die Auslöschung der Bevölkerung von §H[current_planet.GetName]§! markierte das Ende jenen Reiches, das als \"§H[exiled_country.GetName]§!\" bekannt war.\n\n$shroud.6705.desc.common$"
 shroud.6705.desc.no_contact: "Die Auslöschung der Bevölkerung von §H[current_planet.GetName]§! markierte das Ende einer gewaltigen psionischen Bedrohung.\n\n$shroud.6705.desc.common$"
 shroud.6705.a: "Mögen eines Tages alle Bedrohungen dieser Art ausgelöscht sein."
 psionic_threat_eliminated: "Psionische Bedrohung eliminiert"
 psionic_threat_eliminated_desc: "Die Auslöschung eines psionischen Reichs hat dessen $PSIONIC_AURA$ aus der Galaxie verbannt und unserer Bevölkerung ein ruhiges Bewusstsein beschert."
 SANCTUM_OF_THE_LOST: "Heiligtum des Träumers"
 SANCTUM_OF_THE_LOST_DESC: "Innerhalb des Heiligtums des Träumers auf §H[sanctum_of_the_lost_planet.GetName]§! fanden wir einen versiegelten \"Kokon\", der eine gefährliche psionische Strahlung absondert. Wir müssen den Ort untersuchen, um jegliche Gefahr zu beseitigen, die von diesem Objekt ausgehen könnte."
 shroud.6710.name: "Die Macht im Inneren"
 shroud.6710.desc: "Unsere Wissenschaftler untersuchten den auf §H[sanctum_of_the_lost_planet.GetName]§! gefundenen \"Kokon\" eingehend.\n\nExterne Scans dieser imposanten Struktur ergaben, dass es sich um einen Hochsicherheitsbehälter handelt, der entwickelt wurde, um ein mächtiges psionisches Wesen einzuschließen. Trotz der isolierenden Schichten aus schweren Legierungen durchdringt die psionische Strahlung dennoch die Hülle.\n\nAls unsere Wissenschaftler eine Reihe psionischer Dämpfer um den Kokon herum platzierten und diese aktivierten, wurden alle Anwesenden von brennenden neuronalen Schmerzen heimgesucht.\n\nDie Oberfläche des Kokons verdrehte sich daraufhin, und die zuvor eiförmige Struktur verwandelte sich in eine sich windende Spirale. Eine Öffnung entstand, und wir empfangen eine direkte Botschaft aus dem Inneren ..."
 cannot_found_mindwarden_enclave: "Muss die psychische Sicherheit des Reiches gewährleistet haben"
 shroud.6800.name: "$MINDWARDENS_THE_FIRST_ENCLAVE$"
 shroud.6800.desc: "Wir sammelten umfangreiches Wissen über den §HSchleier§! an und entwickelten fortschrittliche Technologien, um seine schädlichen Effekte zu unterdrücken. Im Zuge unserer Diskussion, wie wir das Gelernte auf die gesamte Galaxie anwenden, unterbreiteten unsere Flottenkommandanten einen interessanten Vorschlag:\n\nSie empfehlen, eine unserer Flotte als unabhängige \"§H$gov_mindwarden_enclave$§!\" einzusetzen, die dann der gesamten Galaxie anti-psionische Dienstleistungen anbieten könnte. $shroud.shared_enclave_investement$"
 shroud.6800.a: "Ein lohnenswertes Unterfangen."
 shroud.6800.a.tt: "Eine Flotte, die mindestens eine Größte von §Y30§! hat, kann zu einer §H$gov_mindwarden_enclave$§! umgewandelt werden"
 shroud.6825.name: "$gov_mindwarden_enclave$ gegründet"
 shroud.6825.desc_first: "Die §H[This.GetName]§! wurde als geeigneter Kandidat für die erste unabhängige §H$gov_mindwarden_enclave$§! ausgemacht. Wenn wir sie dazu autorisieren, wird diese Flotte eine neue Station im §H[This.Solar_System.GetName]§!-System aufbauen und damit beginnen, anti-psionische Dienstleistungen anzubieten."
 shroud.6825.desc_default: "Wir ziehen in Betracht, die §H[This.GetName]§! in eine unabhängige §H$gov_mindwarden_enclave$§! umzuwandeln, um der gesamten Galaxie anti-psionische Dienstleistungen anzubieten."
 shroud.6825.a: "Setzt den Bau fort."
 shroud.6825.a.tt: "Eine §H$gov_mindwarden_enclave$§! wird gegründet."
 shroud.6825.b: "Wir sollten das noch einmal überdenken."
 shroud.6830.name: "Die $MINDWARDEN_plural$"
 shroud.6830.desc: "Der Kampf gegen den §HSchleier§! und gegen den unverantwortlichen Einsatz von Psionik stärkte unser Volk und rückte unsere Ziele klarer in den Fokus. Die Gründung der ersten §H$gov_mindwarden_enclave$§! markiert den Anbruch eines neuen Zeitalters der Heilung und des Widerstands.\n\nWir dürfen nicht zulassen, dass auch nur ein Bewusstsein von psionischen Angreifern unterdrückt wird, und wir müssen dafür sorgen, dass keine Welt von den Mächten aus dem Schleier gequält werden kann.\n\nDies ist das Zeitalter der $MINDWARDEN_plural$."
 shroud.6830.a: "Unsere Reise beginnt erst."
 shroud.shared_enclave_investement: "Unsere anfänglichen Investitionen würde ausreichen, um den Bau einer Raumstation zu finanzieren. Im Gegenzug würden wir einen Anteil der zukünftigen Einnahmen erhalten. Ihre operative Unabhängigkeit erlaubt es einer solchen Einrichtung, in der gesamten Galaxie zu operieren.\n\nNatürlich könnten wir auch selbst ihre Dienste in Anspruch nehmen – und einen Teil der Kosten zurückerhalten."
 shroud.6841.name: "Die [mindwarden_enclave_country.GetName]-Enklave zahlt Dividenden"
 BEGINS_EVENT_CHAIN: "Beginnt die Ereigniskette:"
 ENDS_EVENT_CHAIN: "Beendet die Ereigniskette:"
 the_exiled_become_hostile: "§H[exiled_country.GetName]§! wird uns gegenüber feindlich gesinnt"
 start_psionic_war_chain: "$BEGINS_EVENT_CHAIN$ §Y$the_psionic_war_chain_title$§!"
 shroud_seal_dismantled: "Das §HSchleiersiegel§! im §H[exiled_system_border.GetName]§! wird demontiert."
 the_psionic_war_chain_title: "$NAME_Psionic_War$"
 the_psionic_war_chain_desc: "Wir befinden uns jetzt im Krieg mit §H[exiled_country.GetName]§!.\n\nDie psionische Geißel muss an ihrem Ursprung bekämpft werden. Wir müssen zunächst ein $SHROUD_SEAL$ im §H[exiled_center_system.GetName]§!-System errichten, um ihre $PSIONIC_AURA$ zu neutralisieren. Erst dann können wir einmarschieren und diese Bedrohung aus der Galaxie tilgen."
 the_psionic_war_chain_poi_1: "Bau eines $SHROUD_SEAL$s"
 the_psionic_war_chain_poi_1_desc: "Der Bau eines §H$SHROUD_SEAL$s§! im §H[exiled_center_system.GetName]§!-System wird alle §Hpsionischen Auren§! in diesem System und jenen, die direkt über eine Hyperraumroute verbunden sind, unterdrücken."
 the_psionic_war_chain_poi_2: "Kontrolle über §H[exiled_planet_1.GetName]§!"
 the_psionic_war_chain_poi_2_desc: "§H[exiled_country.GetName]§! ist nicht bereit, die psionischen Angriffe einzustellen. Die Eroberung ihrer Welten ist die einzige Garantie, um zu verhindern, dass in Zukunft erneut §H$PSIONIC_AURA_PLURAL$§! auftauchen."
 the_psionic_war_chain_poi_3: "Kontrolle über §H[exiled_planet_2.GetName]§!"
 the_psionic_war_chain_poi_3_desc: "§H[exiled_country.GetName]§! ist nicht bereit, die psionischen Angriffe einzustellen. Die Eroberung ihrer Welten ist die einzige Garantie, um zu verhindern, dass in Zukunft erneut §H$PSIONIC_AURA_PLURAL$§! auftauchen."
 shroud_seal_reconstruction_chain_title: "Bau eines Schleiersiegels"
 shroud_seal_reconstruction_chain_desc: "Die Demontage unseres §H$SHROUD_SEAL$s§! war ein notwendiges Opfer, um §H[exiled_country.GetName]§! zu besänftigen, doch diese Maßnahme war nur eine List, um mehr Zeit zu gewinnen. Die Struktur muss wiederaufgebaut werden, bevor wir in ihr Territorium eindringen und es von den §Hpsionischen Auren§! säubern können.\n\n§PDer Wiederaufbau wird als Akt der Aggression angesehen werden. Wir müssen auf eine mögliche Vergeltung vorbereitet sein.§!"
 shroud_seal_reconstruction_chain_poi_1: "[event_target:exiled_system_border.GetName]"
 shroud_seal_reconstruction_chain_poi_1_desc: "$build_shroud_seal_poi_desc$"
 SHROUD_WORLDS_IN_SYSTEM: "Verschleierte Welten: §G$QUANTITY|0$§!"
 NAME_Psionic_War: "Psionischer Krieg"
 wg_psionic_war: "$NAME_Psionic_War$"
 war_goal_wg_psionic_war: "$NAME_Psionic_War$"
 war_goal_wg_psionic_war_desc: "Führt Krieg, um die Galaxie von einem psionischen Agressor zu befreien."
 shroud.6720.name: "$UNKNOWN_LONG$"
 shroud.6720.desc: "§HIhr hört mich, aber Ihr hört nicht zu. Warum?§!"
 shroud.6720.a: "Wir lassen nicht zu, dass Ihr unser Bewusstsein vergiftet!"
 shroud.6720.b: "Was seid Ihr?"
 shroud.6720.c: "Warum seid Ihr hier?"
 shroud.6720.d: "Was wollt Ihr von uns?"
 shroud.6720.e: "Ihr kommt aus dem Schleier?"
 shroud.6720.f: "Wir haben genug gehört."
 shroud.6723.desc: "§HGift? Kein Gift ...\n\nEin Lied. Um singen zu können, muss man zuhören. Gebt Euch der Melodie hin und teilt ihre Schönheit mit anderen.§!"
 shroud.6725.desc: "§HWährend sich das Rad dreht ... hören wir zu.\n\nWährend sich die Sterne drehen ... singen wir.§!"
 shroud.6725.a: "Was ist das \"Rad\"?"
 shroud.6725.b: "Genug davon."
 shroud.6730.desc: "§HStändig im Wandel. Oben und unten. Eine Harmonie bekannt als der \"Schleier\".§!"
 shroud.6735.desc: "§HIch ... träume. Ein Traum von einem Lied. Aber die Stimmen sind verstummt. Was ist mit dem Chor geschehen?§!"
 shroud.6735.a: "Diejenigen, die Euch hier gefangen hielten, sind jetzt fort."
 shroud.6735.b: "Was sind das für \"Lieder\"?"
 shroud.6735.c: "Genug davon."
 shroud.6740.desc: "§HIhr seid hier. Vielleicht singt Ihr ...§!"
 shroud.6745.desc: "§HDer Fluss des Erwachens und Träumens ... Ein Weg zwischen dem Hier und dem Dort.\n\nIhr könnt sie nicht hören - Eure Bewusstseine verstehen es noch nicht ...§!"
 shroud.6750.desc: "§HIch möchte Gesang hören ... doch alles ist so leise ... Warum?§!"
 shroud.6750.a: "Was könnt Ihr uns im Gegenzug anbieten?"
 shroud.6750.b: "Genug davon."
 shroud.6755.desc: "§HIch kann es Euch zeigen ... Meine Träume. Die Schaffung von Welten.§!"
 shroud.6755.a: "Woher wissen wir, dass wir Euch vertrauen können?"
 shroud.6760.desc: "§HIhr müsst nur zuhören. Das Lied ist die Wahrheit, weil es schön ist. Eine schöne Wahrheit.\n\nAber Euer Bewusstsein ist verschlossen. Es kann geöffnet werden.§!"
 shroud.6763.desc: "§HIch bin noch da ... und höre dem Lied über zwei Welten zu. Dieses hier ist gedämpft.§!"
 shroud.6763.a: "Ihr gehört hier nicht hin."
 shroud.6765.desc: "§HIhr sprecht die Wahrheit.§!"
 shroud.6770.name: "$r_the_lost_patron$"
 shroud.6770.desc: "In dem Kokon, den wir auf §H[sanctum_of_the_lost_planet.GetName]§! fanden, haust ein mächtiges interdimensionales Wesen. Es ist gut möglich, dass dieses Wesen auf irgendeine Art und Weise für jene $PSIONIC_AURA$ verantwortlich war, die die Unantastbarkeit unserer Bewusstseine gefährdete.\n\nUnsere psionischen Dämpfer mindern derzeit die Gefahr, die von dem Wesen ausgeht, aber es ist unklar, wie lange wir seinen Einfluss noch eindämmen können. Es ist möglich, dass wir unter kontrollierten Bedingungen die schreckliche Macht dieses Wesens für unsere eigenen Zwecke nutzen könnten.\n\nDennoch fordern viele in unserer Gesellschaft die sofortige Vernichtung dieses Wesens. Seine bloße Existenz widerspricht unseren seit Langem geltenden Werten."
 shroud.6770.a: "Wir müssen diese Abscheulichkeit auf der Stelle vernichten."
 shroud.6770.b: "Findet einen Weg, dieses ... Ding für unsere Zwecke zu nutzen."
 destroyers_of_the_lost_modifier: "Zerstörer der Verlorenen"
 destroyers_of_the_lost_modifier_tt: "Gewährt Zugang zum Lebensstandard \"§Y$living_standard_shroud_inoculation$§!\", bei dem jegliche §Ypsionische§! Fähigkeiten entfernt werden."
 destroyers_of_the_lost_modifier_desc: "Unser Sieg über einen psionischen Feind und die damit verbundene Zerstörung der Quelle der psionischen Aura stärkte die Moral in unserem Reich nach all den Jahren der Qual wieder."
 living_standard_shroud_inoculation: "Schleierimpfung"
 living_standard_shroud_inoculation_tooltip: "Diese Spezies wird gegen die schädlichen Auswirkungen von Psi-Strahlung geimpft.\n\n§RUm weitere Komplikationen zu vermeiden, werden alle psionischen Eigenschaften entfernt.§!"
 living_standard_shroud_inoculation_tooltip_delayed: "§LWir schützen diese Spezies vor den Gefahren der Psionik.§!"
 psionic_heresy: "Psionische Häresie"
 shroud.6780.name: "$r_the_lost_patron$"
 shroud.6780.desc: "Gedanken durchbrechen unsere Bewusstseinsbarrieren.\n\nWir hören eine Melodie ... Sie ist hell und dringt bis in unser tiefstes Inneres.\n\nWir kennen diesen Schmerz. Er ist uns vertraut.\n\n§HIhr habt zugehört. Der Traum gehört Euch ... Singt. Singt ...§!"
 shroud.6780.a: "Was habt Ihr getan?"
 shroud.6785.desc: "§HWas ich versprach. Ich habe für Euch geträumt.§!"
 shroud.6785.a: "Was habt Ihr \"geträumt\"?"
 shroud.6790.desc: "§HWelten. Neue Welten zwischen meiner und Eurer.§!"
 shroud.6790.a: "Welchen Nutzen haben diese Welten für uns?"
 shroud.6795.desc: "§HLasst mich zu ihnen singen. Das hellste aller Lieder.§!"
 shroud.6795.a: "Hoffentlich bereuen wir das nicht."
 shroud.6795.a.tt: "Erschafft bis zu drei §Hverschleierte Welten§! innerhalb unserer Grenzen (maximal eine pro System)."
 r_the_lost_patron: "Der Träumer"
 r_the_lost_patron_desc: "Dieses numinose Geschöpf ist die physische Manifestation eines Wesens innerhalb des Schleiers – der ehemalige \"Schleierpakt\" eines nicht mehr existierenden psionischen Reiches. Wie genau es in dieser physischen Realität Gestalt annahm, ist unbekannt, doch seine einzigartige Verbindung zum psionischen Reich verleiht ihm enorme Macht."
 the_lost_patron_passive_effect: "Effektive Reichweite (§H$SHROUD_SEAL_PLURAL$§!): §G+1§!\n§H$SHROUD_SEAL_PLURAL$§! produzieren £unity£ §Y$unity$§!: §G+25§!\n§H$SHROUD_SEAL_PLURAL$§! geben £navy_size£ §Y$NAVY_SIZE_TITLE$§!: §G+10§!"
 the_lost_patron_before_activation_tt: "Wir wissen nicht, was passieren wird ..."
 the_lost_patron_after_activation_effect_tt: "Neue £decision£ §Yplanetare Entscheidung§!: ['concept_dreamscaping_decision']"
 decision_dreamscaping: "Traumformung"
 decision_dreamscaping_desc: "Terraformiert eine §Y$pc_shrouded$§! zu einer §Y$pc_gaia$§!"
 concept_dreamscaping_decision: "$decision_dreamscaping$"
 concept_dreamscaping_decision_desc: "$decision_dreamscaping_desc$"
 HAS_NOT_NUM_NEIGHBOR_SYSTEMS: "Anzahl an benachbarten Systemen ($VAL0|2Y$) ist NICHT $COMPARE$ $VAL1|2Y$"
 HAS_NEIGHBOR_SYSTEMS: "Anzahl an benachbarten Systemen ($VAL0|2Y$) ist $COMPARE$ $VAL1|2Y$"
 #======================
 # Endbringers origin
 #======================
 origin_endbringers: "Endenbringer"
 origin_endbringers_desc: "$CHALLENGING_ORIGIN$§RWARNUNG: Blockiert alle Aufstiegspfade außer den ['concept_psionic_ascension', Psionischen Aufstieg].§!\n\nDiese Zivilisation ist bereits seit Langem von einer mysteriösen Katastrophe besessen, die einen benachbarten Planeten in eine verschleierte Welt verwandelte. Da sie nun endlich ihren Weg zu den Sternen fand, können die Geheimnisse dieser Welt erforscht werden und es lässt sich ergründen, ob dieser Zivilisation ein ähnliches Schicksal bevorsteht."
 origin_tooltip_endbringers_negative_effects: "- Reiche beginnen mit dem Modifikator \"['concept_paranoia_modifier']\"\n- Kann keine ['concept_federation'] gründen und auch keiner beitreten"
 concept_paranoia_modifier: "$endbringers_paranoia$"
 concept_paranoia_modifier_desc: "Nachdem sie Zeugen einer uralten Katastrophe wurden, leiden nachfolgende Generationen unter einer sich ständig verschlimmernden Angst vor einer weiteren Katastrophe.\n\nErhält einen Modifikator, der die Zufriedenheit mit der Zeit verschlechtert: §R-5%§! bis §R-50%§!"
 endbringers_paranoia: "Paranoia"
 endbringers_paranoia_desc: "Nachdem sie Zeugen einer uralten Katastrophe wurden, leiden nachfolgende Generationen unter einer tief sitzenden Angst vor einer weiteren Katastrophe. Wird uns das gleiche Schicksal widerfahren?"
 endbringers_paranoia_tt: "$chamber_of_silence_negative_effects_reduction$"
 START_SCREEN_ENDBRINGERS: "Wir sind die Vorboten des Kataklysmus.\n\nWährend des Höhepunkts der [GetSpeciesAdj]en Zivilisation wurde unser himmlischer Nachbar von einer mysteriösen Katastrophe heimgesucht. Seine plötzliche und brutale Verwandlung ließ den Nachthimmel in einem unheilvollen violetten Licht erstrahlen und weckte in unserem Volk die Angst, dass auch wir eines Tages ein ähnliches Schicksal erleiden könnten. Mit jeder Generation verstärkte sich die erdrückende Angst vor einer möglichen Vernichtung.\n\nDa [GetSpeciesNamePlural] nun zu den Sternen aufbrechen, sind wir bereit, diese \"Verschleierte Welt\" zu erkunden. Die Antworten, nach denen wir seit Jahrhunderten suchten, liegen direkt vor uns. Und dennoch warnen viele davor, dass unsere obsessive Faszination für die Quelle dieser zerstörerischen Kraft letztlich zu unserem eigenen Untergang führen könnte.\n\nSchon bald werden wir den letzten Schleier lüften."
 shroud.8010.title: "Erkundungsmission nach [shrouded_planet.GetName]"
 shroud.8010.desc: "Unsere in der Umlaufbahn von §H[shrouded_planet.GetName]§! positionierten Erkundungssatelliten machten ein vielversprechendes Ziel für unsere erste bemannte Mission zur Oberfläche dieser \"Verschleierten Welt\" aus. Die Landezone sondert eine merkwürdige Strahlung ab, die ultraviolette Winde auf dem gesamten Planeten verteilen.\n\nEs gibt zahlreiche [Root.GetSpeciesNamePlural], die gegen diese Mission protestieren, da sie Angst haben, unsere Heimatwelt könnte ein ähnliches Schicksal ereilen. Ihre Besorgnis ist nicht ungerechtfertigt, doch unser übergeordnetes Bedürfnis, dieses Phänomen zu verstehen, muss Vorrang haben.\n\nSollten wir dazu bestimmt sein, eines Tages ein ähnliches Schicksal zu erleiden, werden wir zumindest wissen, warum wir sterben müssen."
 shroud.8010.a: "Die Suche nach Antworten beginnt jetzt"
 the_shrouded_world_site: "Die Verschleierte Welt"
 the_shrouded_world_site_desc: "Endlich sind wir in der Lage, zu jener \"Verschleierten Welt\" zu reisen, die uns als §H[planet.GetName]§! bekannt ist. Etwas ruft uns, und die Stimme ist nun stärker als je zuvor.\n\nDie Geheimnisse des Kataklysmus dieser Welt werden uns viel über die Entstehung unseres Systems beibringen und hoffentlich dazu beitragen, die Angst unserer Gesellschaft vor der eigenen Zerstörung zu lindern. Orbitalscans weisen auf intensive Energiemuster hin, die zu einem Ort auf der südlichen Hemisphäre zurückzuführen sind - ein unheilvolles Auge, das uns anstarrt."
 shroud.8100.name: "Das Ende ist nah"
 shroud.8100.desc: "Das Terrain von §H[shrouded_planet.GetName]§! ist so tückisch wie vorhergesagt. Wirbelnde Strudel aus leuchtenden Partikeln schneiden durch die Luft und verlangsamen die Fortschritte, die §H[Leader.GetName]§! und [Leader.GetHisHer]e Besatzung anfänglich machten.\n\nBeunruhigenderweise berichtet unser Erkundungstrupp auch von sensorischen Unstimmigkeiten. Sie beschreiben ferne Heulgeräusche, die vom Wind getragen werden, und schemenhafte Gestalten, die im Nebel umherstreifen. War es vielleicht ein Fehler, hierherzukommen?\n\nDie erste öffentliche Übertragung der Landung löste eine Panik auf §H[Owner.GetHomeWorldName]§! aus. Viele befürchten, wir könnten jene zerstörerischen Kräfte, die [shrouded_planet.GetName] einst besuchten, verärgern und ihren Zorn auf uns ziehen.\n\nErste Telemetriescanns machten eine Höhle mit einer besonders hohen Strahlungsintensität tief im Inneren einer nahen Bergkette aus. Wir sind entschlossen, unsere Erkundungsmission fortzusetzen - koste es, was es wolle."
 shroud.8100.a: "Stoßt weiter vor. Wir müssen herausfinden, was uns erwartet."
 the_end_is_nigh: "Das Ende ist nah"
 the_end_is_nigh_desc: "Ein Gefühl des drohenden Untergangs schwebt über unserer Gesellschaft."
 shroud.8105.name: "Fremde Strukturen"
 shroud.8105.desc: "Wir sind nicht die Ersten.\n\nDie Gebirgshöhlen auf §H[shrouded_planet.GetName]§! enthielten fremde Strukturen, die dem Kataklysmus zum Opfer gefallen waren. Es wurde angeraten, diese Informationen vor der Öffentlichkeit geheim zu halten, um eine weitere Panik zu verhindern.\n\nEine erste Analyse ergab, dass das für die Bauwerke genutzte Material auf molekularer Ebene nicht mit den auf dem Planeten verfügbaren Materialien übereinstimmt, was darauf hindeutet, dass eine andere Weltraumzivilisation diese Strukturen mit exotischen Materialien gebaut haben muss. Der genaue Zweck bleibt weiterhin unklar, doch es scheint sich größtenteils um eine vollständig automatisierte Einrichtung gehandelt zu haben.\n\nWährend der Erkundung verschlimmerten sich die psychischen Symptome beim Erkundungsteam noch weiter. Manche berichten von Stimmen, die über verschlüsselte Frequenzen flüstern, während andere von einer verzerrten Wahrnehmung ihrer physischen Umgebung sprechen. Gelegentliches Gelächter tritt ebenfalls unangenehm häufig auf.\n\nWir sind schon zu weit gekommen. Wir können jetzt nicht aufgeben."
 shroud.8110.name: "Die Beobachter"
 shroud.8110.desc: "Sie sind alle tot.\n\nAn jeder Arbeitsstation im Herzen der Anlage sind die verwesten Leichen einer uns unbekannten Spezies vorzufinden. Ihre zahlreichen blassen Augen starren die Decke an. Trotz ihres furchteinflößenden Äußeren ist §H[Leader.GetName]§! hinreichend sicher, dass diese Leichen nicht das Ergebnis einer Halluzination sind. Bilder dieser Lebensformen werden derzeit als streng vertraulich eingestuft.\n\nEs wurden keine Waffen jeglicher Art gefunden, was darauf hinweist, dass die auf §H[shrouded_planet.GetName]§! lebenden Wesen keine feindlichen Absichten hegten. Bei der Anlage handelte es sich vermutlich um einen Beobachtungsposten mit hochentwickelten Überwachungsgeräten, die direkt auf §H[Owner.GetHomeWorldName]§! gerichtet waren. Die Radiokarbondatierung deutet darauf hin, dass sie bereits lange vor der Katastrophe hier waren.\n\nWir konnten viele ihrer Aufzeichnungen entschlüsseln, und abgesehen von routinemäßigen Kommunikationsprotokollen betrifft der überwiegende Großteil die Geschichte unserer Zivilisation."
 shroud.8110.a: "Haben sie uns beobachtet?"
 shroud.8115.name: "Mächte jenseits unserer Vorstellungskraft"
 shroud.8115.desc: "Die auf §H[shrouded_planet.GetName]§! gefundenen Datenbanken konnten endlich entschlüsselt werden und bestätigten viele unserer zuvor diskreditierten Legenden als wahr. Wir waren Gegenstand eines Bewusstseinsexperiments, das man \"$tech_psionic_theory$\" nannte.\n\nUnsere Spezies war entschlossen, dieses latente Potenzial zu nutzen. Viele unserer Vorfahren hatten diese Kommunikationen in Träumen oder als entfernte Stimmen wahrgenommen - Phänomene, die sonst auf eine Geisteskrankheit oder Paranoia hindeuten können. Ihr Experiment wurde jedoch vorzeitig beendet. In den letzten Tagen vor dem Untergang war dieser Ort kein Beobachtungsposten mehr, sondern ein Überlebensbunker.\n\nIhre Berichte bezüglich unserer Gesellschaft hören nach einem katastrophalen Experiment auf ihrer Hauptwelt abrupt auf, bei dem versucht wurde, die Barriere zwischen unserer Realität und einer anderen, die der \"§HSchleier§!\" genannt wurde, zu durchbrechen. Ihre Wissenschaftler bezeichneten diesen Vorfall als \"die Abrechnung\", und wir gehen davon aus, dass dies auch die Ursache für den Kataklysmus war.\n\nWas auch immer zu diesem Unfall führte: Es hat sich rasch auf §H[shrouded_planet.GetName]§! ausgebreitet. In ihren letzten Momenten wurde ein letzter Logbucheintrag aufgezeichnet:\n\n§LDas Ende ist da.§!"
 shroud.8115.a: "Wird es auch für uns kommen?"
 shroud.8120.name: "$fragment_of_reckoning$"
 shroud.8120.desc: "Wir fanden eindeutige Beweise für die Quelle des Kataklysmus. §H[Leader.GetName]§! behauptet, es sei gar nicht schwer gewesen, sie zu finden, da sie zu [Leader.GetHimHer] sprachen.\n\nTief im Inneren der Anlage wurde entgegen aller bisherigen Aufzeichnungen eine pulsierende Masse entdeckt. Diese Masse besteht weder aus Materie noch aus Energie. §H[Leader.GetName]§! beschrieb sie als anhaltenden Groll verzehrter Bewusstseine, die als \"§H$fragment_of_reckoning$§!\" bezeichnet werden.\n\nIn einem gescheiterten Versuch, die ätherischen Energien des §HSchleiers§! zu kanalisieren, sollte dieses Objekt ursprünglich vor der \"Abrechnung\" schützen. Diese Aufgabe erfüllte es jedoch nur teilweise. In den letzten Augenblicken dieser Welt wurde das bösartige Wesen gewaltsam aus dieser Dimension verbannt und nahm dabei die widerwilligen Gedanken der Wissenschaftler mit sich. Dieses Fragment ist nun alles, was geblieben ist.\n\nEs verstärkt die Visionen und Halluzinationen unserer Forscher und gewährt ihnen einen zweiten Blick jenseits unserer begrenzten Realität. Es ist zwar ein gefährliches, aber potenziell auch lohnendes Unterfangen."
 shroud.8120.a: "Wir müssen noch viel lernen ..."
 ENDBRINGERS_RESEARCH_PSIONIC_THEORY: "$tech_psionic_theory$"
 ENDBRINGERS_RESEARCH_PSIONIC_THEORY_DESC: "Das Fragment aus psionischer Energie, das man auf §H[shrouded_planet.GetName]§! entdeckte, birgt Geheimnisse, die wir ergründen müssen.\n\nWir werden von den Grenzen unseres eigenen Bewusstseins zurückgehalten."
 ENDBRINGERS_PSIONIC_THEORY_PROJECT_TOOLTIP: "Für den Abschluss muss die \"§H£society_research£ $tech_psionic_theory$§!\" erforscht werden."
 ENDBRINGERS_ADOPT_PSIONICS_TRADITION: "$ENDBRINGERS_RESEARCH_PSIONIC_THEORY$"
 ENDBRINGERS_ADOPT_PSIONICS_TRADITION_DESC: "$ENDBRINGERS_RESEARCH_PSIONIC_THEORY_DESC$"
 ENDBRINGERS_PSIONICS_TRADITION_PROJECT_TOOLTIP: "Für den Abschluss muss die Tradition \"§H$tradition_psionics_shroud$§!\" angenommen werden."
 shroud.8200.title: "Ein Reich des Wahnsinns"
 shroud.8200.desc: "Die genauere Erforschung des kürzlich entdeckten Gebiets der Psionik bestätigte die Existenz bisher unbekannter Dimensionen der Realität, zu denen unser Bewusstsein das Tor ist. Hinter diesem Schleier liegt ein Reich des Chaos, das wir nur schwer verstehen.\n\nEine §RStimme§! ruft uns aus den Tiefen. Sie verspricht nicht die Erlösung, sondern einen Neuanfang. Diese unvorstellbare Macht zu nutzen, würde jedoch bedeuten, das aufzugeben, was wir waren, und ein Schicksal anzunehmen, das in das Gefüge des Wahnsinns selbst eingewoben ist.\n\n§R\"ES IST AN DER ZEIT.\"§!"
 shroud.8200.a: "Was haben wir nur getan?"
 shroud.8200.a.tt: "Schaltet den Traditionsbaum \"§H$tradition_psionics_shroud$§!\" frei."
 chamber_of_silence_negative_effects_reduction: "Jede ['building:building_chamber_of_silence'] reduziert die negativen Effekte um §G$@chamber_of_silence_effect_mult|0%$§!"
 endbringers_madness_1: "Wahnsinn"
 endbringers_madness_1_desc: "Unser Reich wird von einem einzigen Ziel angetrieben: die §RStimme§! zu finden. Unsere Bewusstseine werden nicht eher ruhen, bis wir sie finden."
 endbringers_madness_1_tt: "$chamber_of_silence_negative_effects_reduction$"
 endbringers_madness_2: "$endbringers_madness_1$"
 endbringers_madness_2_desc: "Unser Reich kommt der §RStimme§! näher. Die Intensität unserer Antriebsimpulse nimmt ab."
 endbringers_madness_2_tt: "$endbringers_madness_1_tt$"
 endbringers_madness_3: "$endbringers_madness_1$"
 endbringers_madness_3_desc: "Unser Reich kann die §RStimme§! fast hören. Schon bald werden wir verstehen."
 endbringers_madness_3_tt: "$endbringers_madness_1_tt$"
 ALLOW_CHAMBER_OF_SILENCE: "Neues Gebäude: ['building:building_chamber_of_silence']."
 tr_psionics_endbringers_cult: "Kult der Stimme"
 tr_psionics_endbringers_cult_desc: "$ALLOW_CHAMBER_OF_SILENCE$"
 tr_psionics_endbringers_cult_delayed: "Einmal gehört kann die Stimme nicht länger ignoriert werden. Wir beugen uns ihrem Willen."
 building_chamber_of_silence: "Kammer der Stille"
 building_chamber_of_silence_desc: "Psionische Individuen werden von überall aus unserem Reich hierhergebracht, um aus den Kammern der schützenden Stille Kontakt zum Schleier aufzunehmen."
 building_chamber_of_silence_madness_1_tt: "Reduziert die negativen Auswirkungen von \"['modifier:endbringers_madness_1']\" um §G$@chamber_of_silence_effect_mult|0%$§!"
 building_chamber_of_silence_madness_2_tt: "Reduziert die negativen Auswirkungen von \"['modifier:endbringers_madness_2']\" um §G$@chamber_of_silence_effect_mult|0%$§!"
 building_chamber_of_silence_madness_3_tt: "Reduziert die negativen Auswirkungen von \"['modifier:endbringers_madness_3']\" um §G$@chamber_of_silence_effect_mult|0%$§!"
 building_chamber_of_silence_paranoia_tt: "Reduziert die negativen Auswirkungen von \"['modifier:endbringers_paranoia']\" um §G$@chamber_of_silence_effect_mult|0%$§!"
 building_chamber_of_silence_destroyed_tt: "§RDieses Gebäude wird zerstört, wenn diese Kolonie verloren geht.§!"
 shroud.8310.name: "$shroud.2750.name$"
 shroud.8310.desc: "Wir sind zu höheren Ebenen der Existenz berufen. Jene unter uns, die sich an ihren fruchtlosen Widerstand klammern, müssen ausgemerzt werden, um die Heiligkeit unseres Aufstiegs zu bewahren. Unser Schicksal ist besiegelt. Der Weg, der hinter uns liegt, wurde bereits von den Schatten der Verschleierten Welt verschlungen.\n\nDie §RStimme§! spricht in überzeugender Klarheit zu uns.\n\n§R\"DER WEG IST UNVERÄNDERBAR.\"§!\n\nSie sehnt sich nach einem bereitwilligen Opfer."
 shroud.8310.a: "Es ist unvermeidlich."
 shroud.8310.a.tt: "Jede Kolonie verliert 100-300 £pop£ §HBewohner§!."
 situation_breach_shroud_endbringers: "$situation_breach_shroud$"
 situation_breach_shroud_endbringers_type: "$situation_breach_shroud_type$"
 situation_breach_shroud_endbringers_monthly_change_tooltip: "$situation_breach_shroud_monthly_change_tooltip$"
