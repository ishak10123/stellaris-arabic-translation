 #==========================
 # Edicts
 #==========================
 # Energy Drain
 edict_energy_drain: "Energie absaugen"
 edict_energy_drain_desc: "Die Bevölkerung ist dazu verpflichtet, sich Implantate zur Energieernte zu installieren und diese regelmäßig überprüfen zu lassen. Die Implantate müssen jederzeit sofort aktiviert werden können."
 edict_energy_drain_tt: "§YAnführer§! werden niemals an Altersschwäche sterben\n"
 # Sanguine Council
 edict_sanguine_council: "Blutrat"
 edict_sanguine_council_desc: "Die gesamte Bevölkerung muss sich regelmäßigen Flüssigkeitstests unterziehen, um lebenswichtige Energie zu gewinnen, die man im Regierungsrat des Reichs nutzt."
 edict_sanguine_council_machine: "Nexusladung"
 edict_sanguine_council_machine_desc: "$edict_sanguine_council_desc$"
 # Galactic Dowsing
 edict_galactic_dowsing: "Galaktische Wünschelrute"
 edict_galactic_dowsing_gestalt: "$edict_galactic_dowsing$"
 edict_galactic_dowsing_desc: "Indem Prospektoren ihre herkömmlichen geologischen Analysen durch Vorhersagepraktiken ergänzen, entdecken sie reichhaltigere Ressourcenadern."
 edict_galactic_dowsing_gestalt_desc: "$edict_galactic_dowsing_desc$"
 edict_annihilation_of_matter: "Materievernichtung"
 edict_annihilation_of_matter_desc: "Mit jedem Staubkorn, das in die Flammen geworfen wird, brennt die Glut der Vernichtung heller."
 edict_annihilation_of_energy: "Energievernichtung"
 edict_annihilation_of_energy_desc: "Der Tanz der Entropie wurde schon getanzt, bevor wir uns seiner Pracht bewusst wurden. Doch erst jetzt erhöhen wir sein Tempo."
 edict_dimensional_collapse: "Dimensionaler Kollaps"
 edict_dimensional_collapse_desc: "Es gibt noch andere Dimensionen als den Schleier, die mit unserer eigenen verflochten sind. Auch ihre Macht wird sich mit der Zeit auflösen."
 # Psychic Feast
 edict_psychic_feast: "Willenskonvergenz"
 edict_psychic_feast_desc: "Mit einer erheblichen Anstrengung unserer gebündelten Bewusstseine wecken wir noch viel größere Kräfte in unseren Anführern."
 # Animatus
 edict_animatus: "Animatus"
 edict_animatus_desc: "Der $the_animator_of_clay_color_article_cap$ haucht unseren Flotten neues Leben ein. Es ist gar so, als hätten sie einen eigenen Willen."
 # Will of Temperance
 edict_will_of_temperance: "Wille der Mäßigung"
 edict_will_of_temperance_desc: "Der $the_outsider_color_article$ macht uns auf die Gefahren aufmerksam, die uns bevorstehen."
 # Will of Distraction
 edict_will_of_distraction: "Wille der Ablenkung"
 edict_will_of_distraction_desc: "Der §HGoldene Traum§! zeigt uns höhere Formen der Freizeitgestaltung."
 # Will of Endless
 edict_will_of_endless: "Wille der Endlosigkeit"
 edict_will_of_endless_desc: "Die §HEndlosen Gezeiten§! verbessern unsere Einsichten in die Zeit selbst."
 # Will of Rebirth
 edict_will_of_rebirth: "Wille der Wiedergeburt"
 edict_will_of_rebirth_desc: "Der §HBleiche Berg§! erschafft, damit er wieder zerstören kann."
 # Will of Order
 edict_will_of_order: "Wille der Ordnung"
 edict_will_of_order_desc: "Der §HLeere Thron§! kennt die Ordnung aller Dinge."
 # Will of Motion
 edict_will_of_motion: "Wille der Bewegung"
 edict_will_of_motion_desc: "Die Geschwindigkeit des §HSchwarzen Flusses§! reißt uns mit in die Leere."
