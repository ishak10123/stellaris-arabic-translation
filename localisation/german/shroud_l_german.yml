 leader_trait_iron_will: "Eiserner Wille"
 leader_trait_iron_will_desc: "Ein erfahrener Kommandant der $MINDWARDEN_plural$. Er ist besonders für seine Expertise bezüglich Befestigungsanlagen und seine psychische Widerstandskraft bekannt."
 shroud.4190.name: "Eine $PSIONIC_AURA$ naht heran"
 shroud.4190.desc.intro: "Vor einiger Zeit beobachteten unsere [GetScientistPlural] ein unnatürliches Phänomen in einem fernen Sternensystem: Energieströme unbekannter Herkunft, die sich allmählich auf andere Systeme ausbreiteten."
 shroud.4190.desc: "$shroud.4190.desc.intro$ Aufgrund unbestätigter Theorien über ihren Ursprung wurden sie vorerst \"§H$PSIONIC_AURA_PLURAL$§!\" genannt. Wir müssen noch bestätigen, ob sie eine Bedrohung darstellen oder nicht.\n\nEine solch Aura wurde nun auch im §H[from.GetName]§!-System entdeckt und könnte unsere Grenzen erreichen, wenn sie sich weiter ausbreitet."
 shroud.4190.desc_mindwarden: "Wenn die Theorien über ihren psionischen Ursprung korrekt sind, könnte die §H[event_target:mindwarden_enclave_country.GetName]§! Methoden kennen, um ihren Auswirkungen entgegenzuwirken."
 shroud.4190.a: "Wir werden ihre Auswirkungen schon bald kennen."
 shroud.4191.name: "$shroud.4190.name$"
 shroud.4191.desc_1.common: "Wir entdeckten eine hohe Konzentration psionischer Energie im §H[from.GetName]§!-System. Nachdem sie den Echos innerhalb des §HSchleiers§! lauschten, sind sich unsere [GetTelepathPlural] nun sicher, dass dieses Phänomen durch die psionischen Aktivitäten"
 shroud.4191.desc_1.default: "$shroud.4191.desc_1.common$ einer uns fremden Zivilisation entstanden ist."
 shroud.4191.desc_1.contact: "$shroud.4191.desc_1.common$ von §H[fromfrom.GetName]§! entstanden ist."
 shroud.4191.desc_2.common: "Materie als auch Bewusstseine in der von uns wahrnehmbaren Realität. Unsere Beobachtungen deuten darauf hin, dass sich diese Auren zwischen Sternensystemen ausbreiten können."
 shroud.4191.desc_2.default: "Das als \"§H$PSIONIC_AURA$§!\" bezeichnete Phänomen entspringt dem Willen eines mächtigen Schleierwesens und beeinflusst sowohl $shroud.4191.desc_2.common$"
 shroud.4191.desc_2.knows_aura: "Offenbar entwickelte dieses Reich eine Methode, um eine §H$PSIONIC_AURA$§! zu kanalisieren. Diese stammt aus dem Schleier und beeinflusst sowohl $shroud.4191.desc_2.common$"
 shroud.4191.desc_3.common: "dass die Auswirkungen auf unser Territorium [GetPositiveRivalAdj] ausfallen werden - zumindest solange unsere Beziehungen unverändert bleiben."
 shroud.4191.desc_3.default: "Unseren [GetTelepathPlural] zufolge gehen von ihm [GetBenevolentRivalAdj]e Absichten aus, weshalb wir vermuten, $shroud.4191.desc_3.common$"
 shroud.4191.desc_3.contact: "Angesichts unserer [GetLessThanRivalAdj]günstigen Beziehungen zu [fromfrom.GetName], gehen wir davon aus, $shroud.4191.desc_3.common$"
 shroud.4191.a.rival_organic: "$WORRYING$"
 shroud.4191.a.rival_default: "Eine suboptimale Entwicklung."
 shroud.4191.a.organic: "Ein Geschenk aus dem Schleier"
 shroud.4191.a.default: "Ein interessantes Phänomen."
 shroud.mindwarden.back: "$enclave.410.a$"
 shroud.4205.name: "[event_target:mindwarden_enclave_country.GetName]"
 shroud.4205.common: "Seid gegrüßt. Ich spreche als Vertreter der [event_target:mindwarden_enclave_country.GetName] zu Euch."
 shroud.4205.desc: "$shroud.4205.common$\n\nUnsere Mission liegt darin, die Galaxie vor den Gefahren des §HSchleiers§! zu schützen und vor all jenen, die seinen negativen Einfluss zu verbreiten versuchen. Wir glauben fest an ein Bewusstsein, das frei von äußeren Einwirkungen ist. und an eine Galaxie, die sich gegen die Psionik stellt.\n\nDen Messungen unserer Psi-Sensoren zu urteilen, stellt Ihr keine Gefahr dar. Ausgezeichnet. Wir würden Euch gern dabei unterstützen, gegen jene vorzugehen, die es tun.\n\n$shroud.4205.desc.end$"
 shroud.4205.desc.end: "Solltet Ihr anti-psionische Militärdienste benötigen oder etwas §H$zro_lower$§! übrig haben, meldet Euch bei uns, damit wir Euch unterstützen können."
 shroud.4205.desc.return: "Willkommen zurück. Die [event_target:mindwarden_enclave_country.GetName] schätzt die fortwährende Zusammenarbeit.\n\nDie Messwerte unserer Psi-Sensoren sind eindeutig: Ihr seid weiterhin vom §HSchleier§! unberührt. Gut, gut ...\n\n$shroud.4205.desc.end$"
 shroud.4205.desc.eotc: "Wir leben in düsteren Zeiten. Trotz all unserer Bemühungen kommt das $end_of_the_cycle_color_article$ immer näher. Seine schrecklicke Manifestation schleicht unbehaglich zwischen den Sternen umher ...\n\n$shroud.4205.desc.eotc.end$"
 shroud.4205.desc.eotc.end: "Es ist an der Zeit, dass wir uns zusammentun und die psionische Apokalypse verhindern."
 shroud.4205.desc.merc_first: "Geschätzte Mitwächter, wir überbringen gute Neuigkeiten: der Aufbau der ersten §H$gov_mindwarden_enclave$§! wurde abgeschlossen. $shroud.shared_combating_the_shroud$"
 shroud.4205.desc.merc_more: "Geschätzte Mitwächter, wir überbringen gute Neuigkeiten: der Aufbau unserer §H$gov_mindwarden_enclave$§! wurde abgeschlossen. $shroud.shared_combating_the_shroud$"
 shroud.4205.desc.merc_back: "Willkommen zurück, geschätzte Mitwächter. Die §H[mindwarden_enclave_country.GetName]§! schätzt die fortwährende Zusammenarbeit.\n\n$shroud.4205.desc.end$"
 shroud.4205.desc.return_beginning: "$shroud.4205.desc.end$"
 shroud.4205.desc.return_beginning.eotc: "$shroud.4205.desc.eotc.end$"
 shroud.4205.a: "Was ist der Schleier?"
 shroud.4205.b: "Wir würden gern über §I$sr_zro$§! sprechen."
 shroud.4205.c: "Was können wir gegen §Y$PSIONIC_AURA_PLURAL$§! unternehmen?"
 shroud.4205.d: "Wir kennen ein gutes psionisches Ziel ..."
 shroud.4205.e: "Wir benötigen Hilfe, um gegen die £crime£ §Y[GetCrimeDeviancy]§! in unserem Reich vorzugehen."
 shroud.4205.ef: "Wir benötigen §Ylogistische Unterstützung§!."
 shroud.4205.f: "Wir könnten ein paar Eurer Soldaten gebrauchen."
 shroud.4205.g: "Wärt Ihr bereit, uns einen §YWächter§! zu schicken?"
 shroud.4205.h: "Wir würden gern über das $end_of_the_cycle_article$ sprechen."
 shroud.4205.i: "Als Eure §YGründer§! haben wir einen Vorschlag zu unterbreiten."
 shroud.shared_combating_the_shroud: "Vom heutigen Tag an wird sich §H[mindwarden_enclave_country.GetName]§! der wichtigen Aufgabe verschreiben, den Einfluss des §HSchleiers§! sowie aller anderen Formen des psionischen Fehlverhaltens zu bekämpfen.\n\nWir sind in der Lage, verschiedene anti-psionische Dienstleistungen anzubieten, angefangen von der §H$zro_lower$§!-Entsorgung bis hin zur Rekrutierung von Militärpersonal - und das schnell und effektiv."
 shroud.4210.desc: "Der §HSchleier§! lässt sich am besten als Dimension einer Realität beschreiben, die jenseits der gewöhnlichen Vorstellung liegt. Er setzt sich aus gefährlichen \"§Hpsionischen§!\" Energien zusammen. Er berührt jeden Punkt unserer eigenen physischen Galaxie, und doch kann er von vielen nicht wahrgenommen werden.\n\nDie Energien des Schleiers können sich durch die kognitiven Aktivitäten empfindungsfähiger Wesen in unserer physischen Dimension manifestieren. Diese Kräfte sind jedoch äußerst gefährlich und unberechenbar.\n\nUm die Sicherheit der eigenen Bevölkerung zu gewährleisten, sind Schutzmaßnahmen gegen den Schleier erforderlich. Dabei können wir Euch gern helfen."
 shroud.shared_text_shroud_seal: "Diese hochentwickelten Maschinen werden nach und nach alle psionischen Auren auflösen, bis sie vollständig unterdrückt werden können - sowohl in dem System, in dem sie sich derzeit befinden, als auch in allen Systemen, die über eine Hyperraumroute verbunden sind."
 shroud.4230.desc: "Wir kennen zwei Methoden, um §H$PSIONIC_AURA_PLURAL$§! zu unterdrücken.\n\nEinen §Hpsionischen Unterdrücker§! auf einem Planeten zu bauen, wird die Intensität der Aura im gesamten Sternensystem nach und nach verringern und verhindern, dass sie sich weiter ausbreiten kann.\n\nNoch mächtiger wäre ein §H$SHROUD_SEAL$§!. $shroud.shared_text_shroud_seal$"
 shroud.4230.a: "Vergesst es."
 shroud.4230.b: "Bringt uns bei, wie man die §Y$tech_psionic_suppression$§! nutzen kann."
 shroud.4231.desc: "Sehr gern. Wir werden die Daten umgehend übertragen.\n\nMögen Euch diese Technologien Frieden vor der Aura-Plage bringen."
 mindwarden_encourage_raid: "Wir bezahlen die [event_target:mindwarden_enclave_country.species.GetNamePlural] dafür, ein uns bekanntes psionisches Reich anzugreifen."
 shroud.4240.need_psionics: "Kontakt zu einem §Ypsionischen§! Reich hergestellt."
 shroud.4240.desc: "Ist dem so? Nun, wir werden niemals wahren Frieden und echte Sicherheit erfahren, solange sie die Galaxie mit ihrer Psionik verseuchen ...\n\nEin gezielter Angriff würde unsere Ablehnung gegenüber dieser gefährlichen Praktik deutlich machen. Mit Eurer finanziellen Unterstützung können wir eine solche Operation durchführen.\n\nNennt uns das Ziel, wenn Ihr bereit seid."
 shroud.4240.a: "Vergesst es."
 shroud.4240.b: "§I[event_target:raid_target_1.GetName]§!."
 shroud.4240.c: "§I[event_target:raid_target_2.GetName]§!."
 shroud.4240.d: "§I[event_target:raid_target_3.GetName]§!."
 shroud.4240.e: "§I[event_target:raid_target_4.GetName]§!."
 mindwarden_raid_cooldown_tt: "§RWir können bis zum §Y[root.mindwarden_raid_timer]§! keinen weiteren Angriff bei den Gedankenwächtern anfordern.§!"
 mindwarden_hire_raid: "Wir bezahlen die [event_target:mindwarden_enclave_country.GetName] dafür, eine Angriffsflotte gegen dieses Reich zu entsenden."
 shroud.4245.desc: "Ah, ja. Wir sind uns ihrer psionischen Praktiken bewusst. Eine Machtdemonstration ist nur gerechtfertigt.\n\nVielen Dank für die Unterstützung. Der Einsatz wird in Kürze beginnen."
 mindwarden_raider_modifier: "Anti-psionischer Angriff der Gedankenwächter"
 shroud.4246.name: "Angriff der $gov_mindwarden_enclave$"
 shroud.4246.common_1: "Eine abgefangene Nachricht deutet darauf hin, dass sie von einem unserer Rivalen angeheuert wurden, um unsere Systeme anzugreifen."
 shroud.4246.common_2: "senden eine Nachricht auf einem offenen Kanal direkt an uns."
 shroud.4246.desc: "Eine Angriffsflotte der §H[event_target:mindwarden_enclave_country.GetSpeciesNamePlural]§! wurde nahe unserer Grenzen gesichtet! $shroud.4246.common_1$ Sie $shroud.4246.common_2$"
 shroud.4247.desc: "Die Flotte eines unbekannten Reichs wurde nahe unserer Grenzen gesichtet! $shroud.4246.common_1$ Sie identifizieren sich selbst als §H[event_target:mindwarden_enclave_country.GetSpeciesNamePlural]§! und $shroud.4246.common_2$"
 NAME_Mindwarden_Corvette: "Fanatiker"
 NAME_Mindwarden_Frigate: "Wächter"
 NAME_Mindwarden_Destroyer: "Inquisitor"
 NAME_Mindwarden_Cruiser: "Exorzist"
 NAME_Mindwarden_Battleship: "Reiniger"
 NAME_Mindwarden_Titan: "Richter"
 mindwarden_defense_modifier: "Verteidigungseinheit der Gedankenwächter"
 shroud.4250.desc: "Ausgezeichnet. Indem Ihr uns Euer $zro_lower$ anvertraut, können wir unsere wichtigen Forschungen zu dieser wirkungsvollen und häufig missbrauchten Substanz fortsetzen. Die Forschung wird der gesamten Galaxie zugutekommen.\n\nDaher liegt unser Kaufpreis auch deutlich über dem galaktischen Standard."
 shroud.4250.a: "$shroud.mindwarden.back$"
 shroud.4250.b: "Was ist §I$sr_zro$§!?"
 shroud.4250.c: "Wir möchten etwas £sr_zro£ §I$sr_zro$§! spenden."
 mindwarden_zro_explanation: "Verkauft bis zu 100 Einheiten §Y$sr_zro$§! für das 5-fache des normalen Preises auf dem Galaktischen Markt."
 mindwarden_zro_cooldown_tt: "§RWir können den Gedankenwächtern bis zum §Y[root.mindwarden_zro_timer]§! kein weiteres $sr_zro$ geben§!"
 shroud.4251.desc: "§Y$sr_zro$§! ist eine seltene und äußerst instabile Substanz, deren Wirkung nur schwer zu kontrollieren und vorherzusagen ist. Es kann absichtlich oder auch unabsichtlich gewaltige Energiestöße absondern, die massive Zerstörung anrichten können.\n\nDiese Eigenschaften entstammen einer Reaktion mit dem §HSchleier§!, was es für Psioniker äußerst beliebt macht. Einige von ihnen nehmen es sogar als Droge zu sich.\n\nDa wir mehr über $zro_lower$ lernen und Methoden für die sichere Entsorgung erforschen wollen, zahlen wir für jede Menge, die man uns bringt, einen guten Preis."
 shroud.4255.desc: "Vielen Dank für den Beitrag."
 shroud.4260.desc: "Dann erlaubt uns, Euch mit einer effektiven §Y$decision_thought_police$§! auszustatten, die [GetCriminalDeviant]es Verhalten aufspürt, noch ehe es sich überhaupt manifestiert hat.\n\nIhre Methoden wurden als sichere Alternative zu psionischen Praktiken entwickelt und nutzen wissenschaftliche Techniken, um die kognitiven Aktivitäten der Bevölkerung zu überwachen. Dies liefert Einblicke in mentale Zustände, ohne auf die gefährlichen Energien des §HSchleiers§! zurückgreifen zu müssen."
 shroud.4260.a: "$shroud.mindwarden.back$"
 shroud.4260.b: "Wir möchten die §I$decision_thought_police$§! rekrutieren."
 mindwarden_decision_cooldown_tt: "§RWir können dies bis zum §Y[root.mindwarden_decision_timer]§! nicht erneut tun§!"
 mindwarden_decision_explanation: "Neue £decision£ §YPlanetare Entscheidung§!: §Y$decision_thought_police$§!"
 shroud.4262.desc: "Ausgezeichnet. Ich bin mir sicher, dass Ihr die Methoden sehr wirkungsvoll finden werdet."
 shroud.4265.desc: "Unsere Zusammenarbeit zeigte uns tatsächlich bereits einige Verbesserungen auf, die man an Euren militärischen Einsatzstrategien vornehmen könnte.\n\nWir wollen Euch damit keinesfalls beleidigen, sondern haben uns einfach auf diese Bereiche spezialisiert. Es wäre uns eine Ehre, einem so geschätzten Partner wie Euch in dieser Angelegenheit behilflich sein zu dürfen, sofern Ihr uns angemessen vergütet."
 shroud.4265.a: "$shroud.mindwarden.back$"
 shroud.4265.b: "Abgemacht."
 mindwarden_logistics_cooldown_tt: "§RWir können bis zum §Y[root.mindwarden_logistics_timer]§! keine weitere logistische Unterstützung bei den Gedankenwächtern anfragen.§!"
 shroud.4267.desc: "Grüße, geschätzter Partner.\n\nUnser Vertrag der logistischen Einsatzunterstützung ist ausgelaufen. Wir würde unsere Partnerschaft gern fortsetzen, solltet Ihr dies ebenfalls für lohnenswert halten."
 shroud.4267.a: "Wir möchten die Partnerschaft fortsetzen."
 shroud.4267.b: "Wir müssen im Moment ablehnen."
 shroud.4266.desc: "Sehr gut. Unsere Einsatzunterstützung wird unverzüglich fortgesetzt."
 shroud.4270.desc: "Unsere $NAME_Mindwarden_Army$ gibt einen hervorragenden Stoßtrupp ab. Sie ist darin geschult, vielfältige Bedrohungen zu bekämpfen, aber besonders wirksam ist sie gegen psionische Gegner.\n\nWir sind überzeugt, dass sie ihren Preis wert ist."
 shroud.4270.a: "$shroud.mindwarden.back$"
 shroud.4270.b: "Wir möchten eine §I$mindwarden_army$§! rekrutieren."
 mindwarden_army_cooldown_tt: "§RWir können bis zum §Y[root.mindwarden_army_timer]§! keine weitere Armee bei den Gedankenwächtern anfordern§!"
 mindwarden_army_explanation: "Wir erhalten eine §Y$mindwarden_army$§!-Armee, die per $transport$ in unser Heimatsystem gebracht wird."
 shroud.4271.desc: "Ihr habt Glück. Wir haben bereits eine einsatzbereite Kompanie. Rechnet in Kürze mit der Ankunft des Transportschiffs."
 shroud.4280.desc: "Sehr gern.\n\nEine effektive Führung ist der Schlüssel zur Bekämpfung des §HSchleiers§!,und unsere Wächter sind sehr versiert darin, psionische Aktivitäten durch eine strenge Herrschaft zu unterdrücken."
 shroud.4280.a: "$shroud.mindwarden.back$"
 shroud.4280.b: "Wir möchten einen §I$subclass_commander_governor$§! rekrutieren."
 mindwarden_commander_explanation: "\nWir rekrutieren einen Stufe-5 Gedankenwächter-$subclass_commander_governor$."
 unlocks_mindwarden_council_position: "\n§EErlaubt das Freischalten von Ratsposten:§!\n§H$t$$councilor_mindwarden$§!\n$tt$$COUNCIL_POSITION_MODIFIER_BASE$\n$ttt$$mod_country_unity_produces_mult$: §G+1%§!\n$ttt$$planet_crime$: §G-1%§!\n$ttt$$MOD_PSIONIC_AURA_RESISTANCE_MULT$: §G+5%§!\n$COUNCIL_POSITION_AVAILABLE_FOR$$t$$commander_with_icon$\n\n$COUNCIL_POSITION_REQUIREMENTS$$councilor_mindwarden_conditional_tooltip$"
 mindwarden_commander_already_bought: "§RWir nehmen bereits die Dienste eines Gedankenwächter-$subclass_commander_governor$s in Anspruch.§!"
 mindwarden_commander_conflicted_leader: "§RDarf keinen Anführer aus der [event_target:shroudwalker_enclave_country.GetName] haben.§!"
 mindwarden_commander_cooldown_tt: "§RWir können bis zum §Y[root.mindwarden_commander_timer]§! keinen weiteren Anführer bei den Gedankenwächtern anfordern§!"
 mindwarden_commander_desc: "Dieser Anführer stammt aus der $gov_mindwarden_enclave$ und hat eine unnachgiebige Haltung gegenüber allen psionischen Aktivitäten, um die Bevölkerung vor den Auswirkungen des Schleiers zu schützen."
 mindwarden_commander_catch_phrase: "Wo der Schleier durchsickert, muss die Wunde kauterisiert werden."
 shroud.4281.desc: "Eine kluge Entscheidung. Möge er dafür sorgen, dass Eure Bevölkerung auch in Zukunft sicher ist."
 shroud.4286.name: "Angriff auf [FROM.GetName]"
 mindwarden_farewell: "§L\"Euer kürzlicher Angriff auf eine $gov_mindwarden_enclave$ war skrupellos. Auch nur in irgendeiner Funktion für Euch zu arbeiten, wäre moralisch und ethisch nicht zu rechtfertigen. Ich empfehle dringend, diese sinnlosen Feindseligkeiten einzustellen. Ungeachtet dessen, wie Eure Entscheidung ausfallen mag, werde ich nicht hier bleiben.\"§!"
 shroud.4286.desc: "$enclave.8000.start$\n\n$mindwarden_farewell$\n\n$enclave.8000.end$"
 shroud.4286.desc.councilor: "$enclave.8000.start$\n\n$mindwarden_farewell$\n\n$enclave.8000.councilor_end$"
 shroud.4290.desc: "Das ist in der Tat eine ernste Angelegenheit. Es gibt keine größere Plage für die Galaxie als das $end_of_the_cycle_color_article$."
 shroud.4290.a: "$marauder.31.e$"
 shroud.4290.b: "Was ist das $end_of_the_cycle_color_article$?"
 shroud.4290.b.response: "Den von uns gesammelten Informationen zufolge ist das $end_of_the_cycle_color_article$ eine kataklystische Kraft, die aus dem §HSchleier§! stammt und sich in der physischen Realität durch Machtgier manifestieren lässt.\n\nDas Ende stürzt die ganze Galaxie mit der §R$NAME_Reckoning$§!, einem bösartigen Wesen aus reiner psionischer Energie, ins Verderben. Das endgültige Ziel des Endes liegt in der totalen Vernichtung jedweder Existenz."
 shroud.4290.c: "Wie können wir die §R$NAME_Reckoning$§! besiegen?"
 shroud.4290.d: "Bringt uns bei, wie man die §Y$mindwarden_tactics_modifier$§! nutzen kann."
 shroud.4291.desc: "Möget Ihr gegen diese große Bedrohung triumphieren. Sie bedroht die Existenz eines jeden, der diese Galaxie sein Zuhause nennt."
 shroud.4292.desc: "Wir entwickelten einen Algorithmus, der Eure Offensive gegen die §R$NAME_Reckoning$§! stärkt. Er verbessert die Zielfindung Eurer Waffensysteme und macht sie gegen diese Art von psionischer Energie wirksamer.\n\nIm aktuellen Zustand erfordert jede Bereitstellung des Codes umfangreiche Überarbeitungen, um Kompatibilität mit der jeweiligen militärischen Infrastruktur zu gewährleisten, in der er zum Einsatz gelangt. Es handelt sich also um einen Premium-Service, doch wir sind überzeugt, dass sich die Investition lohnen wird."
 mindwarden_tactics_modifier: "Gedankenwächter-Taktiken"
 shroud.4295.desc: "$shroud.4205.common$\n\nWir waren zunächst über die Berichte Eurer \"$building_materiality_engine_plural$\" besorgt. Nach eingehender Untersuchung halten wir diese Apparaturen jedoch für eine vielversprechende Entwicklung, um einen nicht-psionischen Nutzen aus dem sogenannten \"§HSchleier§!\" zu ziehen.\n\nWir möchten Euch dazu ermutigen, diese Technologie auch weiterhin einzusetzen, und freuen uns, auch in Zukunft mit Euch zusammenarbeiten zu können."
 mindwarden_opinion_materiality_engine_tt: "Meinung: £opinion£ §G+$@mindwarden_opinion_materiality_engine|0$§!"
 shroud.4300.desc: "Ich spreche als Vertreter der [mindwarden_enclave_country.GetName] zu Euch.\n\nDen Messwerten unserer Psi-Sensoren nach zu urteilen, wurde [Root.GetName] vollständig vom §HSchleier§! infiziert.\n\nEuer Handeln führte Euren Untergang herbei - und wir werden ihn beschleunigen."
 shroud.4300.a: "Warum fürchtet Ihr den Schleier?"
 shroud.4310.desc: "Wir fürchten weder ihn noch seine korrumpierenden Abgesandten. Wir wissen, wie wir sie bekämpfen können.\n\nIch erwarte nicht, dass Ihr - eine Gesellschaft, die von seinem Einfluss in den Wahnsinn getrieben wurde - dies verstehen wird."
 shroud.4320.desc.psionic: "War es denn nicht genug, die Galaxie mit der Psionik zu vergiften?"
 shroud.4320.desc.default: "Wir setzen uns für Ordnung in der Galaxie ein. Was bringt es Euch, uns anzugreifen? Wir werden diese Aggressivität nicht unbeantwortet lassen."
 shroud.4320.desc.common: "Solange Ihr nicht die bedingungslose Einstellung aller Angriffe bestätigt, gibt es für uns nichts zu besprechen."
 shroud.4340.desc: "Wir sind uns Eurer Geschäfte mit der §H[shroudwalker_enclave_country.GetName]§! bewusst. Eure Handlungen legitimieren nicht nur ihre Verbrechen, sondern tragen auch dazu bei, die Infektion des §HSchleiers§! weiter zu verbreiten.\n\nWir werden Euch keine Dienstleistungen anbieten, solange Ihr mit ihnen zusammenarbeitet."
 shroud.4350.desc: "§HSeit der Zerstörung ihrer Station waren wir nicht mehr in der Lage, Kontakt zur [mindwarden_enclave_country.GetName] aufzunehmen.\n\nWenn wir uns auf ihre Frequenzen einstellen, hören wir nur die Stille des Weltraums.§!"
 enclave_opinion_tt: "Meinung: £opinion£ §G+$@positive_opinion|0$§!"
 mindwarden_rival_opinion_tt: "Meinung über die [event_target:shroudwalker_enclave_country.GetName]: £opinion£ §R$@negative_opinion|0$§!"
 shroudwalker_rival_opinion_tt: "Meinung über die [event_target:mindwarden_enclave_country.GetName]: £opinion£ §R$@negative_opinion|0$§!"
 shroud.4405.title: "$gov_mindwarden_enclave$ zerstört"
 shroud.4405.desc_common: "Unser Angriff im [mindwarden_enclave_system.GetName]-System war erfolgreich: Die §H[mindwarden_enclave_country.GetName]§! gibt es nicht mehr."
 shroud.4405.desc.default: "$shroud.4405.desc_common$ Auch wenn die von ihnen verachteten Praktiken für uns von geringer Bedeutung sind, stellte ihr Kreuzzug gegen den \"§HSchleier§!\" jene Art von pseudowissenschaftlichem Dogmatismus dar, der in unserer Galaxie keinen Platz haben sollte."
 shroud.4405.desc.psionic: "$shroud.4405.desc_common$ Sie werden ihr ignorantes Dogma über die Gefahren des §HSchleiers§! nicht länger verbreiten können, und die psionischen Dämpfer ihrer Station liegen nun in Trümmern."
 shroud.4405.desc_end: "Unser Sieg war doppelt erfolgreich, da wir auch eine beachtliche Menge an Ressourcen aus den Trümmern ihrer Station bergen konnten."
 shroud.4406.title: "$gov_mindwarden_enclave$ zerstört"
 shroud.4406.desc_common: "Uns erreichte die Nachricht, dass es die §H[mindwarden_enclave_country.GetName]§! im [mindwarden_enclave_system.GetName]-System nicht mehr gibt. Diese $gov_mindwarden_enclave$ konnte den Angriff von §H[mindwarden_destroyer.GetName]§! offenbar nicht abwehren, wodurch die Station in Schutt und Asche gelegt wurde. Es ist nicht bekannt, ob es Überlebende gibt."
 shroud.4406.desc.psionic: "Die Galaxie wurde damit endlich von ihrem anti-psionischen Kreuzzug befreit - zumindest solange niemand den frei gewordenen Platz einnimmt."
 shroud.4406.desc.default: "Die Galaxie wird vorerst ohne ihre anti-psionischen Dienste auskommen müssen."
 shroud.4406.a: "Auf Nimmerwiedersehen."
 shroud.6855.desc: "Wir freuen uns über die enge Zusammenarbeit mit [root.GetName]. Unsere Geschichte und unsere Ziele sind untrennbar miteinander verbunden."
 shroud.6855.desc.1: "Wir sind Euch für Euren Beitrag für [mindwarden_enclave_country.GetName] auf ewig dankbar. Solange die psionische Bedrohung bestehen bleibt, soll unser Bund niemals ins Wanken geraten."
 shroud.6855.desc.2: "Ihr könnt Euch sicher sein, dass die nächste Gewinnbeteiligungszahlung pünktlich erfolgen wird."
 shroud.6855.b: "Wir möchten dabei helfen, die Enklave zu vergrößern."
 shroud.6855.b.timeout: "Die Enklave rekrutiert derzeit neue Offiziere und Flottenbesatzungen. Weitere Einsatzverbesserungen können erst nach §Y[mindwarden_enclave_country.upgraded_station_timer]§! vorgenommen werden."
 shroud.6855.c: "Wir möchten unsere Technologien mit Euch teilen."
 shroud.6855.c.timeout: "Die Enklave ist noch immer dabei, die zuvor von uns bereitgestellten Technologien zu integrieren. Wir müssen noch bis zum §Y[mindwarden_enclave_country.updating_databanks_timer]§! warten, bevor wir neue Technologien mit ihr teilen können."
 shroud.6855.d: "Wir möchten gern eine §YFlotte§! für unsere eigenen Zwecke anheuern."
 shroud.6855.e: "$enclave.205.b$"
 shroud.6855.f: "Wir wünschen, unsere Gedankenwächterenklavenkapazität zu erhöhen."
 shroud.6855.f.timeout: "Wir sind noch immer dabei, die infrastrukturellen Änderungen in Bezug auf Enklaven umzusetzen. Wir können unsere Gedankenwächterenklavenkapazität bis zum §Y[mindwarden_enclave_country.mindwarden_enclave_capacity_bought_timer]§! nicht erneut erhöhen."
 shroud.6860.1.desc: "Mit zusätzlichen Mitteln könnten wir unsere Einsatzreichweite erheblich ausweiten. Wir könnten die Anzahl und die Stärke unserer Flotten erhöhen und mehr Forscher einstellen, um die Technologien zum Schutz des eigenen Bewusstseins weiterzuentwickeln. Letztlich würde die gesamte Galaxie von der Unterstützung profitieren."
 shroud.6860.2.desc: "Wir müssen aufgrund der sich ständig verändernden Bedrohung durch Psioniker wachsam bleiben. Eure großzügige Spende würde es uns erlauben, unsere Aktivitäten erheblich auszuweiten, um dieser Herausforderung gewachsen zu sein."
 shroud.6860.3.desc: "Wir haben viel erreicht, doch noch ist nicht die Zeit gekommen, sich auszuruhen. Mit mehr Ressourcen könnten unsere Flotten noch viel weiter entfernte Orte in der Galaxie erreichen und eine noch viel größere Anzahl an von der Psionik geplagten Bewusstseinen befreien."
 shroud.6860.4.desc: "Eure Unterstützung prägte unseren Weg von Anfang an, und unsere gemeinsamen Ziele sind nach wie vor dieselben: Nur durch die vollständige Ausrottung der Psionik ist ein psychisches Wohlbefinden sicherzustellen. Mit Eurer Hilfe kommen wir unserem Ziel immer näher."
 shroud.6860.5.desc: "Solltet Ihr es für angebracht halten, erneut in uns zu investieren, könnten wir zur größten psionikbekämpfenden Kraft in der Galaxis werden – zur mächtigsten Bastion gegen das Eindringen in Bewusstseine im gesamten All."
 shroud.6860.b: "Dann sind wir uns einig."
 shroud.6861.desc: "Vielen Dank. Wir sind stolz, mit Euch gemeinsam daran arbeiten zu dürfen, die psychische Integrität aller vernunftbegabten Wesen in der Galaxie zu schützen."
 shroud.6865.desc: "Ein lohnendes Unterfangen. Je mehr $ENCLAVE_MINDWARDEN_PLURAL$ es in der Galaxie gibt, desto sicherer sind alle Bewusstseine vor einer psionischen Invasion.\n\nWir können Euch helfen, Eure Infrastruktur zu verbessern, um die Einrichtung weiterer Enklaven zu ermöglichen."
 shroud.6865.b.tt: "$mindwarden_enclave_capacity$: §G+1§!"
 shroud.6870.desc: "Wir begrüßen Eure Bereitschaft, die Ergebnisse Eurer Forschung mit uns zu teilen. Jedes Quäntchen Wissen, das Ihr uns vermittelt, trägt dazu bei, die Galaxie besser vor der psionischen Bedrohung schützen zu können."
 shroud.6875.desc: "Es wäre uns eine Ehre, Euch diesen Wunsch zu erfüllen. Die Flotten der [mindwarden_enclave_country.GetName] bilden die Vorhut der anti-psionischen Technologien und Taktiken. Niemand, der versucht, in die Bewusstseine anderer einzudringen, hat eine Chance gegen sie. Jede der Flotten verfügt über einen Kommandanten, der speziell für den Kampf gegen psionische Feinde ausgebildet wurde."
 mindwarden_tt_hirefleet: "Wir übernehmen 10 Jahre lang die Kontrolle über die §YGedankenwächterflotte§! dieser Enklave."
 shroud.6876.desc: "Wir vertrauen darauf, dass die §H[mercenary_fleet.GetName]§! ein effektives Werkzeug im Kampf gegen jene sein wird, die mit den zerstörerischen Kräften der Psionik spielen."
 mindwarden_tt_managefleet: "Beendet oder verlängert unseren Vertrag mit der §YGedankenwächterflotte§!."
 shroud.6880.desc: "Natürlich. Wir hoffen, dass die §H[mercenary_fleet.GetName]§! eine wertvolle Bereicherung für Eure Truppen war. Möchtet Ihr den Vertrag beenden oder verlängern?"
 shroud.6880.a: "$marauder.31.e$"
 shroud.6881.desc: "So sei es. Der Vertrag wird mit sofortiger Wirkung aufgehoben und die §H[mercenary_fleet.GetName]§! wird unverzüglich zurückkehren. Unsere Flotten stehen Euch jederzeit erneut zur Verfügung."
 #======================
 # Mindwardens origin
 #======================
 origin_mindwardens: "$MINDWARDEN_plural$"
 origin_mindwardens_desc: "$CHALLENGING_ORIGIN$§RWARNUNG: Blockiert den ['concept_psionic_ascension', psionischen Aufstieg].§!\n\nDie Vorfahren dieser Zivilisation wurden von übernatürlichen Kräften heimgesucht, die in ihr Bewusstsein eindrangen. Dies veranlasste sie dazu, große Anstrengungen und unzählige Ressourcen in die Entwicklung anti-psionischer Technologien zu investieren.\n\nDie von ihnen entwickelten Apparaturen sind zwar alt, aber noch immer funktionsfähig. Sie wurden jedoch noch nie gegen psionische Bedrohungen getestet, die aus unserer eigenen Galaxie stammen."
 origin_tooltip_mindwardens_effects: "- $ADDITIONAL_TECHNOLOGIES_STRING$ £engineering£ ['technology:tech_starbase_3']\n- $HOME_SYSTEM$ Beginnt mit einer §H$tech_starbase_3$§!.\n- $HOMEWORLD$ £building£ ['building:building_ancient_ward_1']\n- Erhält Zugang zum §HKriegsgrund§! \"§Y$casus_belli_cb_psionics_containment$§!\", der gegen psionisch aufgestiegene Reiche eingesetzt werden kann.\n- §Y$FE_GUARANTEED_COLONIES$§! tauchen nicht auf.\n- §Y$ENCLAVE_MINDWARDEN_PLURAL$§! werden zum Spielstart nicht generiert."
 SPECIES_CLASS_MUST_USE_ORIGIN_MINDWARDENS: "Benötigt den Ursprung \"§Y['civic:origin_mindwardens']§!\""
 START_SCREEN_MINDWARDENS: "Die Aufzeichnungen unserer Vorfahren berichten von einer Seuche, die die Psyche angreift und einst ganz [GetHomeWorldName] verwüstete. Ihre Bewusstseine wurden von übernatürlichen Mächten angegriffen und in der Atmosphäre breitete sich eine gefährliche Strahlung aus. Schlimmer noch: All dies wurde von den Psionikern innerhalb der [GetSpeciesAdj]en Gesellschaft gefördert.\n\nZum Schutz gegen diese bewusstseinsinvasive Bedrohung errichteten unsere Vorfahren den $building_ancient_ward_1$. Mit einer nur geringfügigen routinemäßigen Wartung erwies sich dieses altehrwürdige Bauwerk als stark genug, alle [GetSpeciesNamePlural] vor dem psionischen Einfluss zu schützen. Die Kerntechnologie führte darüber hinaus zur Entwicklung anderer Bewusstseinsabwehrtechnologien.\n\nWährend sich unsere Zivilisation darauf vorbereitet, die Umlaufbahnen des [capital_scope.System.GetName]-Systems zu verlassen, stehen wir erneut dem Unbekannten gegenüber. Welche psychischen Gefahren könnten wohl jenseits unseres derzeitigen Verständnisses lauern?"
 mindwarden_system_init_NAME: "$origin_mindwardens$"
 mindwarden_system_init_DESC: "Dies ist immer das Startsystem, wenn der Ursprung \"$origin_mindwardens$\" ausgewählt wurde.\n\n$system_initializer_DESC$"
 mindwarden_sol_system_init_NAME: "$origin_mindwardens$ (Sol)"
 mindwarden_sol_system_init_DESC: "Optionales Startsystem für den Ursprung \"$origin_mindwardens$\", bei dem das Sonnensystem der Menschen (Sol) als Basis benutzt wird.\n\n$system_initializer_DESC$"
 building_ancient_ward_1: "Ahnenschutz"
 building_ancient_ward_1_desc: "Diese uralte Struktur nutzt eine Reihe psionischen Dämpfer, um den gesamten Planeten vor bewusstseinsinvasiven Mächten zu schützen."
 building_ancient_ward_2: "Ahnensystemschutz"
 building_ancient_ward_2_desc: "Diese uralte Struktur wurde mit verbesserten psionischen Dämpfern aufgerüstet, die das gesamte Sternensystem vor psionischen Auren schützen."
 psionic_auras_immunity: "Löst §Y$PSIONIC_AURA_PLURAL$§! im System nach und nach auf"
 mindwarden_aura_immunity: ""
 war_goal_wg_end_threat_psionics: "$war_goal_wg_end_threat$"
 war_goal_wg_end_threat_psionics_desc: "Führt Krieg, um die Galaxie vor den Gefahren einer psionischen Infektion zu schützen."
 casus_belli_cb_psionics_containment: "Psionische Eindämmung"
 NAME_Exiled: "Chor der Träumer"
 EXILED_SYSTEM_01: "Romash"
