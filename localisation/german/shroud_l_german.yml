 CRADLE_MARK: "Zeichen der Wiege"
 CRADLE_MARK_DESC: "$COMPOSER_MARK_DESC$"
 tech_covenant_cradle: "$CRADLE_MARK$"
 tech_covenant_cradle_desc: "$tech_covenant_composer_desc$"
 leader_trait_cradle_chosen: "Auserwählter der Wiege"
 leader_trait_cradle_chosen_desc: "$leader_trait_whisperers_chosen_desc$"
 leader_trait_shroudshaper: "Schleierformer"
 leader_trait_shroudshaper_desc: "Dieser Anführer ist ein immerwährendes Wesen von unglaublicher psionischer Macht. Er hilft uns dabei, den Schleier nach unserem Willen zu formen."
 COVENANT_EFFECTS: "§EPaktauswirkungen:§!"
 COVENANT_EATER: "§HPakt der Fresserin§!"
 covenant_eater_desc: "Unser Pakt mit der $the_eater_of_worlds_article$ erfüllt uns mit einem unersättlichen Appetit nach Eroberung und Zerstörung."
 COVENANT_CRADLE: "§HPakt der Wiege§!"
 covenant_cradle_desc: "Unser Pakt mit der $the_cradle_of_souls_article$ strahlt durch die gesamte Galaxie und bringt andere dazu, uns herzlicher zu behandeln."
 covenant_cradle_tt: "[GetCradleCovenantTooltip]"
 covenant_cradle_bonus_tt: "$covenant_cradle_telepath_tt$\n$covenant_cradle_no_bonus_tt$"
 covenant_cradle_no_bonus_tt: "Unterhalt (Jobs), wenn ein anderes Reich innerhalb unserer §Hpsionischen Aura§! eine Meinung von weniger als Neutral hat: §R+[GetCradleCovenantUpkeepMult]%§!"
 COVENANT_INSTRUMENT: "§HPakt des Instruments§!"
 covenant_instrument_desc: "Unser Pakt mit dem $the_instrument_of_desire_article$ erfüllt unser Bewusstsein mit Visionen von Genuss und lockt uns immer tiefer in ein mentales Paradies."
 COVENANT_COMPOSER: "§HPakt der Komponistin§!"
 covenant_composer_desc: "Unser Pakt mit der $the_composer_of_strands_article$ lässt uns wachsen und erlaubt es uns, unsere Wurzeln auszubreiten, um die Galaxie zu transformieren."
 COVENANT_WITV: "§HPakt der Flüsterer§!"
 covenant_whisperers_desc: "Unser Pakt mit den Flüsterern in der Leere erfüllt uns mit der gebündelten Weisheit aller Geheimnisse, die sie aus dem Innersten des Schleiers zusammentrugen."
 COVENANT_EOTC: "§HPakt des Endes§!"
