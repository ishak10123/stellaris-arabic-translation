 trait_tankbound: "Tankgebunden"
 trait_tankbound_desc: "Diese Spezies lebt in Behältern, die mit einer speziellen biologischen Flüssigkeit gefüllt sind. Sie ist stark auf Unterstützungsausrüstung angewiesen und nicht in der Lage, körperliche Arbeiten selbst zu verrichten."
 trait_tankbound_effects: "Unterhalt an Nahrung (oder dem Äquivalent davon): §G-50%§! $TABBED_NEW_LINE$- §RKann keine Arbeiter-Jobs besetzen§!$TABBED_NEW_LINE$- §RKann nicht für Armeen rekrutiert werden§!"
 trait_tankbound_portrait_override_tt: "Erfordert eine tankgebundene Spezies"
 trait_robot_latent_psionic: "$trait_latent_psionic$"
 trait_robot_latent_psionic_desc: "§LDiese Spezies verfügt über latente psionische Prozessoren, die bei den meisten Einheiten inaktiv sind. Es kommt zwar ziemlich selten vor, doch manchmal schaffen es bestimmte Anführer, diese Kräfte zu aktivieren.§!\n"
 trait_robot_psionic: "$trait_psionic$"
 trait_robot_psionic_desc: "§LAlle Einheiten dieser Spezies besitzen mächtige psionische Fähigkeiten. Sie können sowohl die physische als auch die immaterielle Welt allein durch ihre kognitiven Verarbeitungsprozesse manipulieren.§!\n"
 trait_default_psionic_desc: "§LAlle Mitglieder dieser Spezies besitzen mächtige psionische Fähigkeiten. Normalerweise kommunizieren sie miteinander per Telepathie.§!\n"
 trait_hive_psionic_desc: "§LAlle Mitglieder dieser Spezies besitzen mächtige psionische Fähigkeiten. Sie können sowohl die physische als auch die immaterielle Welt allein durch die Macht ihrer Gedanken manipulieren.§!\n"
