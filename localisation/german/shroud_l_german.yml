 ACCORD_DISTORTION_TT: "Unsere Flotten können für die nächsten §H$@distortion_accord_duration|0$§! Jahre ohne negative Auswirkungen einen Hyperraumsprung auf doppelte Entfernung durchführen"
 ACCORD_DISTORTION_TRIGGER: "£trigger_no£ §R$stage_3$ in der §HSituation§! \"§Y$situation_end_of_the_cycle$§!\" wurde erreicht§!"
 ACCORD_INTENSIFICATION: "Intensivierung"
 ACCORD_INTENSIFICATION_desc: "Nichts kann die Unvermeidbarkeit der $end_aura$ aufhalten. Der Weg in die Vergessenheit wird jedem geöffnet."
 ACCORD_INTENSIFICATION_TT: "Erhöht 3 Jahre lang den Intensitätserhalt unserer §Hpsionischen Aura§! um §G+50§! und deaktiviert für diesen Zeitraum alle §H$SHROUD_SEAL_PLURAL$§! in der Galaxie"
