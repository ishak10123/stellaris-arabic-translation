 PATRON_REVENGE_PROJECT: "Inkarnation der Rache"
 PATRON_REVENGE_PROJECT_DESC: "ganzen Zorn gegen uns gerichtet hat. Ein $SHROUD_TUNNEL_GALACTIC$ ist im [event_target:selected_planet_for_revenge.solar_system.GetName]-System aufgetaucht, und unsere [GetTelepathPlural] können [GetFeelLoc], wie die Boshaftigkeit unseres ehemaligen Paktwesens rasch näherkommt.\n\nWir müssen uns auf unsere Verteidigung vorbereiten."
 the_eater_of_worlds_REVENGE_PROJECT: "$PATRON_REVENGE_PROJECT$"
 the_eater_of_worlds_REVENGE_PROJECT_DESC: "Die $the_eater_of_worlds_color_article_cap$ hat ihren $PATRON_REVENGE_PROJECT_DESC$"
