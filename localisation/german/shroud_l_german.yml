 ACCORD_BLISS: "Glückseligkeit"
 ACCORD_BLISS_desc: "Das $the_instrument_of_desire_article_cap$ überflutet uns mit süßer Glückseligkeit."
 ACCORD_ASCENSION: "Aufstieg"
 ACCORD_ASCENSION_desc: "Der Wohlstand des Instruments der Sehnsüchte ist an keine weltlichen Beschränkungen gebunden."
 ACCORD_ASCENSION_TT: "Entfernt die Kosten für unseren nächsten §Yplanetaren Aufstieg§!"
 ACCORD_ASCENSION_FAIL_TT: "$TRIGGER_FAIL$§RHat seit der letzten Aktivierung keinen Planeten aufsteigen lassen§!"
 ACCORD_EXPLOITATION: "Ausbeutung"
 ACCORD_EXPLOITATION_desc: "Das $the_instrument_of_desire_article_cap$ sehnt sich danach, dass mehr als nur der Bedarf gedeckt wird: Es wünscht einen Überfluss."
 ACCORD_EXPLOITATION_TT: "Ressourcen durch $pop_group_unit$ $job_entertainer_name_plural_with_icon$-Jobs in allen eigenen Kolonien für §H$@accord_duration|0$§! Jahre: §G+$@accord_exploitation_resources_from_jobs|0%$§!\n$ACCORD_LOOSE_INTENSITY$"
