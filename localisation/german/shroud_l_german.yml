 shroud.4862.title: "§H[From.GetName]§! transformiert"
 shroud.4862.shared: "Unsere [GetTelepathPlural] baten unseren Schleierpakt um einen Segen und unsere Bitte wurde erhört:"
 shroud.4862.desc: "$shroud.4862.shared$ Die $the_composer_of_strands_color_article_cap$ verwandelte §H[From.GetName]§! in eine $pc_gaia$, eine ideale Umgebung für alle [Root.GetSpeciesNamePlural]."
 shroud.4862.a: "$INCREDIBLE$"
 shroud.4862.a.tooltip: "Der Planet §H[From.GetName]§! wurde in eine §H$pc_gaia$§! umgewandelt."
 shroud.4890.title: "Die Macht des Zurückblickens"
 shroud.4890.desc: "Unsere [GetTelepathPlural] baten unseren Schleierpakt um einen Segen und unsere Bitte wurde mit einem Angebot beantwortet: Die $whisperers_in_the_void_color_article_cap$ werden einen unserer Planeten als $pc_relic$ neu interpretieren, und wir müssen nur die Wahl treffen, welche Welt es sein soll."
 shroud.4890.a: "§H[event_target:hindsight_planet_candidate_1.GetName]§!."
 shroud.4890.b: "§H[event_target:hindsight_planet_candidate_2.GetName]§!."
 shroud.4890.c: "§H[event_target:hindsight_planet_candidate_3.GetName]§!."
 shroud.4890.d: "§H[event_target:hindsight_planet_candidate_4.GetName]§!."
 leader_trait_whispering_mind: "Bewusstseinsflüsterer"
 leader_trait_whispering_mind_desc: "Das Bewusstsein dieses Anführers ist mit dem Geflüster von Tausenden gefüllt, die alle ihre eigenen Absichten verfolgen."
 knowledge_accord_tt: "Anführer können die Eigenschaft \"§Y$leader_trait_whispering_mind$§!\" erhalten"
 wisdom_accord_tt: "Neues £building£ §Y$BUILDING$§!: ['building:building_whisperers_sanctum']"
 shroud.4935.title: "$ACCORD_CREATION$ im §H[capital_scope.solar_system.GetName]§!-System"
 shroud.4935.desc: "$shroud.4862.shared$ Das $end_of_the_cycle_color_article_cap$ materialisierte eine $pc_gaia$ in unserem §H[capital_scope.solar_system.GetName]§!-System, eine ideale Umgebung für alle [Root.GetSpeciesNamePlural] und ein flüchtiges Paradies, von dem aus man dem Ende beiwohnen kann."
 shroud.4935.tooltip: "Eine §H$pc_gaia$§! ist im [capital_scope.solar_system.GetName]-System aufgetaucht: §H[accord_creation_world.GetName]§!"
 shroud.4970.title: "Das Ende ist gekommen"
 shroud.4970.desc.1: "Die Barriere zwischen den Dimensionen verschwand für einen kurzen Augenblick und entlud die gesamte psionische Macht des Schleiers in die greifbare Realität."
 shroud.4970.desc.2: "Alle vernunftbegabten Wesen, ob lebendig oder mechanisch, wurden auf der Stelle ausgelöscht. Jeder Planet verwandelte sich zu einer leblosen Hülle, und sogar die Sterne selbst gaben ihr letztes Licht ab, ehe sie erloschen.\n\nTrotz alledem nahmen wir in unseren letzten Augenblicken nur eine Stimme tief in unserem Bewusstsein wahr ...\n\n§R\"Das Ende aller Enden.\"§!"
 shroud.4970.desc: "Das $end_of_the_cycle_color_article_cap$ ist gekommen.\n\nDie $end_aura$ umfasst nun die gesamte Galaxie. Als sich das letzte Sternensystem sich seiner Macht fügte, fegte eine unermessliche Energiewelle über alles hinweg.$shroud.4970.desc.1$\n\n$shroud.4970.desc.2$"
 shroud.4970.a: "Es ist perfekt."
 shroud.4970.a.tooltip.destroyed: "§YDie Galaxie wurde zerstört.§!"
 shroud.4970.a.tooltip: "Wir haben den Zyklus beendet.\n\n$shroud.4970.a.tooltip.destroyed$"
 shroud.4971.title: "$shroud.4970.title$"
 shroud.4971.desc.1: "Das ist das Ende."
 shroud.4971.desc.2.1: "Die zerstörerische §H$PSIONIC_AURA$§!"
 shroud.4971.desc.2.2: "hat sich über die gesamte Galaxie ausgebreitet. Als das letzte Sternensystem von der korrumpierenden Aura eingenommen wurde, fegte eine unermessliche Energiewelle über alles hinweg."
 shroud.4971.desc.2.3: "Diese immense Kraft zerstöre mit ihrer immensen Wucht einfach alles. Es schien gar so, als käme sie aus einer völlig anderen Dimension."
 shroud.4971.desc.2.contact_psionic: "$shroud.4971.desc.2.1$ von §H[from.GetName]§! $shroud.4971.desc.2.2$ $shroud.4970.desc.1$\n\n$shroud.4970.desc.2$"
 shroud.4971.desc.2.contact_no_psionic: "$shroud.4971.desc.2.1$ von §H[from.GetName]§! $shroud.4971.desc.2.2$ $shroud.4971.desc.2.3$\n\n$shroud.4970.desc.2$"
 shroud.4971.desc.2.no_contact_psionic: "$shroud.4971.desc.2.1$ einer nicht kontaktierten fremden Zivilisation $shroud.4971.desc.2.2$ $shroud.4970.desc.1$\n\n$shroud.4970.desc.2$"
 shroud.4971.desc.2.no_contact_no_psionic: "$shroud.4971.desc.2.1$ einer nicht kontaktierten fremden Zivilisation $shroud.4971.desc.2.2$ $shroud.4971.desc.2.3$\n\n$shroud.4970.desc.2$"
