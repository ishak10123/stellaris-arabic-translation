 SEND_TO_PROXY_WAR_MISSING_REQUIREMENTS: "§RWir benötigen mindestens $@proxy_war_min_trust|Y0$ $opinion_trust$ oder ein $spy_network$ von $@proxy_war_min_infiltration|Y0$ bei $COUNTRY|H$, um sie in den Krieg zu schicken.§!"
 PROXY_WAR_VIEW_DESC: "Wählt Angreifer und ein gültiges Kriegsziel aus, um den Konflikt zu beginnen."
 PROXY_WAR_VIEW_ATTACKERS_DESC: "§GFügt vorgeschlagene Angreifer hinzu oder entfernt diese mit einem Klick in der Liste auf der linken Seite.§!"
 START_PROXY_WAR_COST: "$ACTION_START_PROXY_WAR_TITLE$ $CLAIMS_COST$"
 CASUS_BELLI_COST_TT: "Die Auswahl dieses §HKriegsgrunds§! kostet:"
 casus_belli_cb_proxy_war: "Stellvertreterkrieg"
 war_goal_wg_proxy_war: "Stellvertreterkrieg"
 war_goal_wg_proxy_war_desc: "Führt Krieg aufgrund von feindlichen Gerüchten und geheimem Geflüster. Bei einem Sieg erhält der Angreifer die Kontrolle über alle beanspruchten Systeme und erhält dabei §Y33%§! weniger §YBedrohung§! für jedes eroberte System."
 shroud.5055.title: "$proxy_war_busted_modifier$"
 shroud.5055.desc.common: "Man hat uns getäuscht.\n\nUnser Geheimdienst fing eine verschlüsselte Kommunikation aus §H[from.GetName]§! ab. Diese enthüllte den Plan, uns in einen Stellvertreterkrieg zu verwickeln.\n\nMan stritt jede Form der Beteiligung vehement ab, doch der Schaden, den unsere Beziehung dadurch nimmt, ist bereits angerichtet."
 shroud.5055.desc.galactic: "$shroud.5055.desc.common$ Die Nachricht über diese Doppelzüngigkeit hat sich rasch verbreitet und den Ruf von [from.GetName] in der gesamten Galaxis beeinträchtigt."
 shroud.5060.title: "$proxy_war_busted_modifier$"
 shroud.5060.desc.common: "Wir konnten zwar erfolgreich einen Konflikt schüren, doch der Einsatz verlief nicht ganz nach Plan. Die Kommunikation eines unserer Agenten wurde abgefangen, was unsere verdeckten Aktionen allen Beteiligten offenbarte.\n\nSämtliche Versuche, uns zu erklären, waren wirkungslos."
 shroud.5060.desc.galactic: "$shroud.5060.desc.common$ Dieser Skandal hat nicht nur unsere Beziehungen zu den Beteiligten verschlechtert, sondern auch unserer Reputation auf der galaktischen Bühne geschadet."
 shroud.5060.desc.default: "$shroud.5060.desc.common$ Dieses Ereignis hat unseren Beziehungen zu den Beteiligten erheblich geschadet."
 shroud.5060.a.tt: "Meinung von Reichen uns gegenüber, die in den §YStellvertreterkrieg§! verwickelt sind: §R-200§!"
 proxy_war_busted_modifier: "Stellvertreter-Kriegstreiberei aufgedeckt"
 proxy_war_busted_modifier_desc: "Die Intrigen, die zu einem Stellvertreterkrieg führten, wurden von den Konfliktparteien aufgedeckt. Dies schadete unserem Ruf."
 opinion_proxy_war_busted: "$proxy_war_busted_modifier$"
 PROXY_WAR_BUSTED_MESSAGE_TYPE_TITLE: "$proxy_war_busted_modifier$"
 PROXY_WAR_BUSTED_MESSAGE_TYPE_DESC: "Die Beteiligten entdeckten, dass wir sie in einen Stellvertreterkrieg verwickeln wollten.\n$shroud.5060.a.tt$"
 PROXY_WAR_REVEALED_MESSAGE_TYPE_TITLE: "$proxy_war_busted_modifier$"
 PROXY_WAR_REVEALED_MESSAGE_TYPE_DESC: "Wir deckten auf, dass §H$INSTIGATOR$§! versuchte, uns in einen Stellvertreterkrieg zu verwickeln.\nUnsere Meinung über §H$INSTIGATOR$§! hat sich um folgenden Wert geändert: §R-200§!"
