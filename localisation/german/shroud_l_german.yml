 shroud.4040.title: "$utopia.3300.name$"
 shroud.4040.desc: "Wir wissen, dass es im §HSchleier§! unzählige Stimmen gibt, und ihre Echos sind allgegenwärtig. Nach der jüngsten Trance berichteten unsere [GetTelepathPlural] jedoch von einer Präsenz, die völlig anders ist - ein §Hvielfältiges Summen§!, das das Zentrum des Schleiers durchdringt.\n\nMit einem ausreichend hohen Einsatz an psionischer Energie könnten wir versuchen, der psionischen Spur dieses mächtigen Wesens zu folgen, dem unsere [GetTelepathPlural] den Namen \"§H[Root.Patron:whisperers_in_the_void.GetPreCommunicationName]§!\" gaben."
 shroud.4040.a: "$utopia.2657.a$"
 shroud.4045.title: "$whisperers_in_the_void_article_cap$"
 shroud.4045.desc.intro: "In unserem Bemühen, Kontakt zu dem Wesen aufzunehmen, das wir \"§H[Root.Patron:whisperers_in_the_void.GetPreCommunicationName]§!\" genannt haben, werden wir in die tiefsten Ebenen des Schleiers gezogen. In dieser inneren Domäne dreht sich der Schleier reglos. Die Reflexionen jedes Gedankens aus jedem Zyklus bündeln sich hier zu einer Urkraft. Wir hören die Stimmen der Stimmlosen, getragen von einem zeitlosen Chor: die der $whisperers_in_the_void_color_article$.\n\nDie krächzende Disharmonie von Stimmen umgibt uns. Wir konzentrieren uns darauf, ihre unzähligen Botschaften zu verstehen, bis ein einziger Gedanke durchdringt.\n\n§HZuzuhören ist ein Opfer, das gebracht werden muss.§!\n\nUm diese gewaltige Macht zu nutzen, müssen wir dem Wesen dabei helfen,"
 shroud.4045.desc.covenant: "$shroud.4045.desc.intro$ die Domäne [GetCovenantPatronColor::<DE_ART_DEF_S_G>] [GetCovenantPatronColor&GEN] zu besetzen. Dies würde den uns bekannten Schleierpakt vollständig ersetzen und unseren etablierten Bund auflösen.$shroud.4045.desc.outro$"
 shroud.4045.desc.no_covenant: "$shroud.4045.desc.intro$ die Domäne eines anderen Schleierwesens zu besetzen und es damit vollständig zu ersetzen.$shroud.4045.desc.outro$$shroud.4045.desc.outro$"
 shroud.4045.desc.outro: "\n\nDies kann schwerwiegende Konsequenzen haben."
 shroud.4045.a: "Lasst die Flüsterer hinein."
 shroud.4045.a.covenant.tt: "§RBeendet unseren Pakt mit [GetCovenantPatronColor::<DE_ART_DEF_S_D>] [GetCovenantPatronColor&DAT].§!\nErsetzt die Domäne [GetCovenantPatronColor::<DE_ART_DEF_S_G>] [GetCovenantPatronColor&GEN] vollständig durch die der $whisperers_in_the_void_color_article$.\n§RDies wird Konsequenzen haben§!"
 shroud.4045.a.no_covenant.tt: "Wir können die Domäne eines mächtigen Schleierpakts duch die der $whisperers_in_the_void_color_article$ ersetzen.\n§RDies wird Konsequenzen haben§!"
 shroud.4045.b: "Wir sollten das Gleichgewicht im Schleier besser nicht stören."
 shroud.4046.title: "Verschiebung des Schleiers"
 shroud.4046.desc.1: "Als wir unsere Wahl getroffen hatten,"
 shroud.4046.desc.2: "Ihre Bewusstseine waren mit den Echos vielfältiger Stimmen gefüllt.\n\nUnsere Entscheidung veränderte unsere Wahrnehmung der psionischen Welt unwiderruflich. Während die $whisperers_in_the_void_color_article$ in unsere Bewusstseinse einströmen, stellen wir fest, dass wir [GetCovenantPatronColor::<DE_ART_DEF_S_A>] [GetCovenantPatronColor&AKK] nicht mehr fühlen können, wie wir es einst taten.\n\nWir beginnen langsam, den Willen der Flüsterer zu verstehen. Wir spüren ihre Vision von grenzenlosem Wissen. Sobald sich unsere [GetTelepathPlural]"
 shroud.4046.desc.3: "können wir erneut Kontakt aufnehmen und mit diesem vielzähligen Wesen kommunizieren."
 shroud.4046.desc.robot: "$shroud.4046.desc.1$ erwachten unsere [GetTelepathPlural] mit einem heftigen Ruck aus dem §HSchleier§!. $shroud.4046.desc.2$ erholt haben, $shroud.4046.desc.3$"
 shroud.4046.desc.organic: "$shroud.4046.desc.1$ kehrten unsere [GetTelepathPlural] durch die gewaltsame Aktivierung aus dem §HSchleier§! zurück. $shroud.4046.desc.2$ wieder aufgeladen haben, $shroud.4046.desc.3$"
 shroud.whispers_in_the_shroud.title: "Ein Flüstern im Schleier"
 shroud.whispers_in_the_shroud.a: "$utopia.2657.a$"
 minor_patron_instrument_cradle_intro: "Wir befinden uns zwischen den Domänen des Instruments der Sehnsüchte und der $the_cradle_of_souls_article$."
 minor_patron_cradle_composer_intro: "Wir befinden uns zwischen den Domänen der $the_cradle_of_souls_article$ und der $the_composer_of_strands_article$."
 minor_patron_composer_eater_intro: "Wir befinden uns zwischen den Domänen der $the_composer_of_strands_article$ und der $the_eater_of_worlds_article$."
 minor_patron_eater_instrument_intro: "Wir befinden uns zwischen den Domänen der $the_eater_of_worlds_article$ und des Instruments der Sehnsüchte."
 minor_patron_default_intro: "Wir befinden uns zwischen den Domänen zweier mächtiger Schleierwesen."
 shroud.4050.desc: "[This.GetMinorPatronCradleComposerIntro]\n\nIn einer Menagerie voll lebloser Konstrukte entdecken wir eine §H$code_name_animator$§!, deren bloßer Wille dichte Energien zu neuen und faszinierenden Formen umgestaltet.\n\nNachdem wir sie bei der Arbeit gestört haben, nähert sie sich uns und verdrängt den undurchsichtigen Nebel des Schleiers. Sie bietet uns etwas an.\n\nWas wird passieren, wenn wir annehmen?"
 shroud.4055.title: "Der Lehmanimator taucht auf"
 shroud.4055.desc: "Während unser Bewusstsein immer tiefer in die turbulenten Energien des Schleiers eintauchte, begannen unsere [GetSpeciesBodyPlural], unerklärlich zu zucken. Wir spürten, wie der §H$code_name_animator$§! einen Augenblick Besitz von uns ergriff. Er lockte uns zu einer Beobachtung.\n\nDie Trübheit lichtete sich und gab den Blick auf eine gestikulierende Silhouette frei. Ihre Gliedmaßen wurden von schwadenartigen Schnüren heftig hin und her gezogen, bis sich ihre Fesseln plötzlich auflösten. Die Gestalt brach zusammen.\n\nGanz langsam erwachte sie wieder zum Leben. Sie hob Glied für Glied, ohne an die früheren Fesseln gebunden zu sein, und nahm den hypnotischen Tanz wieder auf."
 shroud.4055.desc.know_animator: "Wir realisierten, dass wir diesem Wesen bereits zuvor begegnet waren. Der $the_animator_of_clay_color_article_cap$ amüsierte sich köstlich. Wo immer das Unbelebte erweckt und stumpfe Materie mit einer Seele gefüllt wird, ist auch er zu finden."
 shroud.4055.a: "Die Marionette tanzt frei von ihren Fäden."
 shroud.4060.desc: "[This.GetMinorPatronCradleComposerIntro]\n\nWir spüren, dass wir nicht allein sind. Ein §Hbetrübtes Wesen§! dringt in unser Bewusstsein ein und lässt einen Sturm aus psionischer Energie um uns herum entstehen.\n\nEin tiefes Gefühl von Bedauern und Sehnsucht drängt sich in unser kollektives Bewusstsein. Wir sehen Bilder von vertrauten Sternensystemen, die Tausende von Jahren in der Vergangenheit liegen.\n\nWer oder was auch immer dieses Wesen sein mag: Es scheint unsere Galaxie gut zu kennen. War es einst Teil davon?"
 shroud.4065.title: "Der Außenseiter taucht auf"
 shroud.4065.desc.intro: "Die Macht, die als §Hbetrübtes Wesen§! bekannt ist, überflutete unsere Bewusstseine mit Qualen aus dem §HSchleier§!. Es spricht nicht, und doch ist die Warnung unmissverständlich:\n\n§HBetretet diese Reiche nur mit äußerster Vorsicht. Ihr wisst nicht, welche Kräfte Ihr hier stören könntet. Der Untergang ist nur einen Schritt entfernt ...§!"
 shroud.4065.desc.outro_default: "Was auch immer dies bedeuten mag: Wir kennen den $the_outsider_color_article$ jetzt. Wie unsere Schicksale miteinander verbunden sind, bleibt abzuwarten."
 shroud.4065.desc.outro_know_zroni: "Dieses Wesen ist in unserer Galaxie kein Unbekannter. Es weist eindeutig den mentalen Fußabdruck jener Zroni auf, denen wir bereits begegnet sind. Wie ist das möglich?\n\nWas auch immer dies bedeuten mag: Wir kennen den $the_outsider_color_article$ jetzt. Wie unsere Schicksale miteinander verbunden sind, bleibt abzuwarten."
 shroud.4065.desc.outro_left_zroni: "Wir kennen dieses Wesen ... Es ist die Weitseherin, der wir einst in einem §HAstralriss§! begegneten. Ist dies etwa das Schicksal, das ihr widerfahren ist? Ist sie jetzt der $the_outsider_color_article$?"
 shroud.4065.a.default: "Was für Schrecken musste sie wohl durchmachen?"
 shroud.4065.a.know_zroni: "Leben die Zroni etwa noch?"
 shroud.4065.a.left_zroni: "Sorgen wir dafür, dass uns nicht dasselbe Schicksal ereilt."
 shroud.4070.desc: "[This.GetMinorPatronComposerEaterIntro]\n\nEine sich verändernde Masse von Gedanken setzt sich in unserem Bewusstsein fest. Eine riesige Last macht sich in uns breit und verzerrt unsere Wahrnehmung von Zeit. Jedes einzelne Körnchen eines Gedankens reibt und schleift an der Struktur dieser neu entdeckten Domäne.\n\nAls das Gefühl nachlässt, verblasst das §Hunergründliche Wesen§! und hinterlässt einen bleibenden Eindruck.\n\nVor uns bleibt eine Spur zurück. Sie lädt uns ein, ihr zu folgen."
 shroud.4075.title: "Die endlosen Gezeiten tauchen auf"
 shroud.4075.desc: "Das §Hunergründliche Wesen§! steigt aus dem §HSchleier§! hervor. Seine Präsenz ist formlos und doch unermesslich groß. Es erstreckt sich endlos über den gesamten Bereich unserer Wahrnehmung.\n\nEin strukturiertes Flüstern enthüllt längst vergessene Geschichten. Wir sehen untergegangene Reiche, die durch den unaufhaltsamen Lauf der Zeit zu Staub zerfielen. Jedes Korn, das über uns hinwegspült, ist eine Erinnerung.\n\nIn diesem grenzenlosen Archiv zeichnen sich Muster ab - Zyklen von Ehrgeiz und Untergang, Triumph und Verfall. In diesen Tiefen liegt Weisheit.\n\nDie §HEndlosen Gezeiten§! reichen weit über das Konzept der Zeit hinaus. Sie beseitigen Unwissenheit und lassen nur das zurück, was den Willen zum Überdauern besitzt."
 shroud.4075.a: "Dieses Wissen gehört jetzt uns."
 shroud.4080.desc: "[This.GetMinorPatronComposerEaterIntro]\n\nDie Last unserer eigenen Handlungen zieht uns weiter hinein, tiefer in den bedrückenden Schatten einer bergartigen Gestalt.\n\nVon den grauen Gipfeln aus bohrt sich ein unerbittlicher Blick in unser Bewusstsein. Wir haben Mühe, das Ausmaß des §HUnüberwindbaren§! auszumachen.\n\nDer höchste Gipfel lockt uns und fordert uns heraus, ihn zu erklimmen."
 shroud.4085.title: "Der bleiche Berg taucht auf"
 shroud.4085.desc: "Wir erklommen die schwindelerregenden Höhen des §HSchleiers§! und erreichten endlich den immateriellen Gipfel. Der §HUnüberwindbare§! stellte uns auf eine Probe - so wie er es mit allen tat, die vor uns kamen.\n\nEin hoch aufragendes Mausoleum aus vergessenen Reichen singt für uns. Es ist der widerhallende Chor einer verblassten Geschichte. Jedes Scheitern und jeder fehlgeleitete Ehrgeiz wurden zum Fundament dessen, was als Nächstes kommt.\n\nUnd doch ist dies kein Grab: Es ist ein Schmelztiegel. Der Kreislauf von Untergang und Erneuerung schmiedet die Fehler der Vergangenheit zu den Grundfesten künftiger Triumphe. Zerstörung ist kein Ende, sondern ein neuer Anfang.\n\nDer §HBleiche Berg§! erhebt sich in unserem Bewusstsein."
 shroud.4085.a: "Der Berg wird wachsen."
 shroud.4090.desc: "[This.GetMinorPatronInstrumentCradleIntro]\n\nEine tröstende Schwere verlangsamt unsere Gedanken zu einem trägen, glückseligen Dunst. Bisher unbekannte Spannungen lösen sich auf und werden durch eine schleichende, üppige Ruhe ersetzt.\n\nWir sinken tiefer in die geschmeidige Umarmung des §Hluxuriösen Wesens§!, das immer näher kommt. Seine überwältigende Natur nimmt uns vollends ein und flüstert uns Versprechen einer extravaganten Zufriedenheit zu.\n\nDie träge Gefälligkeit ist seltsam verlockend."
 shroud.4095.title: "Der goldene Traum taucht auf"
 shroud.4095.desc: "Als wir uns in einer Oase der Ruhe innerhalb des §HSchleiers§! ausruhten, wurden wir in die vergoldeten Hallen des §Hluxuriösen Wesens§! gezogen.\n\nDie seidigen Versuchungen durchströmten unsere Gedanken, als sich vor uns ein prunkvoller Teppich entrollte. Die gefällige Nachlässigkeit drohte unsere Bewusstseine unter der Last ihrer opulenten Bürde träge werden zu lassen.\n\nDer §HGoldene Traum§! bietet uns Luxus, der unser Vorstellungsvermögen weit übersteigt."
 shroud.4095.a: "Der Traum erwacht."
 shroud.4100.desc: "[This.GetMinorPatronInstrumentCradleIntro]\n\nDer Schleier verwandelt sich in einen wirbelnden Strudel aus psionischer Energie. Plötzlich verschmelzen die unzähligen Ströme miteinander, befriedet von einer unsichtbaren Kraft. Sie beruhigen sich und verwandeln sich in neue, stille Formen.\n\nWährend wir das Spektakel beobachten, werden wir uns des §Hfriedliebenden Wesens§! bewusst, das diese Bewegungen orchestriert und das Chaos der Ordnung unterwirft.\n\nDie Ruhe zieht uns an."
 shroud.4105.title: "Der bedeutungslose Punkt taucht auf"
 shroud.4105.desc: "Der Versuch unserer [GetTelepathPlural], in die turbulente Unordnung des Schleiers vorzudringen, war vergeblich. Erst als sie ihre Bemühungen einstellten, spürten sie die Umarmung des §Hfriedliebenden Wesens§!.\n\nTief in unserem Bewusstsein spielten sich Bilder einer überwältigenden Abfolge von Konflikten ab, jeder Einzelne voll Ablenkungen durch Chaos und Wut.\n\nInmitten all dessen spürten wir die wachsame und zeitlose Präsenz des §HBedeutungslosen Punkts§!. Er wartet geduldig darauf, dass die unaufhörliche Zwietracht in der Galaxie endlich ein Ende findet."
 shroud.4105.desc.outro_homicidal: "Trotz unserer niedrigsten Instinkte wurde unser Bewusstsein dieser seltsamen Denkweise ausgesetzt."
 shroud.4105.a.default: "Die Geduld wird jeden Konflikt überdauern."
 shroud.4105.a.homicidal: "Ein wehmütiger Traum ... Wir kennen unseren wahren Zweck."
 shroud.4110.desc: "[This.GetMinorPatronEaterInstrumentIntro]\n\nChaotischer Lärm weicht einer bedrückenden Dunkelheit. Wir spüren, wie unsere Absichten hinterfragt, untersucht und beurteilt werden.\n\nEin durchdringendes Gefühl der unangefochtenen und unveränderlichen Erwartung und der Ordnung blickt tief in uns hinein. Der §HUnnachgiebige§! richtet über unsere Absicht.\n\nAls sich sein Blick von uns abwendet, weicht die Dunkelheit zurück. Die ansteckende Neugier zwingt uns, uns zu fügen."
 shroud.4115.title: "Der leere Thron taucht auf"
 shroud.4115.desc: "Wir knien in der Präsenz des §HUnnachgiebigen§! nieder.\n\nUnsere Bewusstseine werden mit der kalten Gleichgültigkeit seiner kompromisslosen Autorität beurteilt, die uns an Ort und Stelle festhält.\n\nDas bedrückende Vakuum des §HLeeren Throns§! kennt weder Gnade noch Leid. Es erwartet nur Ordnung und Gewissheit und setzt diese dort durch, wo sie fehlen.\n\nWir tragen diese Last nun mit uns."
 shroud.4115.a: "Es wird stets über einen geurteilt."
 shroud.4120.desc: "[This.GetMinorPatronEaterInstrumentIntro]\n\nEin plötzliches Gefühl der Beschleunigung überkommt uns, und unsere Wahrnehmung wird von einer unfassbaren Flut an Informationen überwältigt. Wir rasen auf endlose Horizonte zu.\n\nEin mysteriöses Wesen bewegt sich parallel zu uns. Diese §Hruhelose Präsenz§! hält kurz inne, ehe sie beschleunigt und über die Grenzen unseres Verständnisses hinausfegt.\n\nWir müssen ihr folgen."
 shroud.4125.title: "Der schwarze Fluss taucht auf"
 shroud.4125.desc: "Erst als wir uns entschlossen, uns über die für uns komfortablen Grenzen innerhalb des §HSchleiers§! hinauszuwagen, gelang es uns, die §Hruhelose Präsenz§! einzuholen.\n\nEin Gefühl der omnidirektionalen Bewegung überkam uns, und wir erreichten eine Geschwindigkeit, die sich jedem logischen Verständnis entzog. Wir legten in kürzester Zeit eine viel zu große Strecke zurück.\n\nEndlich verstanden wir den §HSchwarzen Fluss§! und seine unaufhörliche Reise. Die Weiten der Galaxie sind ein offener Weg, den wir beschreiten können."
 shroud.4125.a: "Geschwindigkeit in ihrer reinsten Form."
 shroud.4135.title: "$end_of_the_cycle_article_cap$"
 shroud.4135.desc: "Ohne Vorwarnung werden wir in den Schleier gerissen. Eine bedrohliche Präsenz dringt in unser Bewusstsein ein.\n\nEs ist das $end_of_the_cycle_color_article$ und es hat schon auf uns gewartet. Plötzlich beginnen unsere [GetTelepathPlural], in ihrer Trance zu sprechen: Ein Dutzend Stimmen in einer perfekten Einheit: §R\"EURE ZEIT IST NOCH NICHT GEKOMMEN.\"§! Eine Pause. §R\"DOCH SIE KÖNNTE ES SEIN.\"§!\n\nMehr wird nicht gesagt, aber man hat uns ein Angebot unterbreitet - so viel ist uns klar. Macht, Wissen und unermesslicher Reichtum: Wir müssen nur noch zugreifen.\n\n§RAll dies, wenn wir nur das Ende herbeiführen.§!"
 shroud.4135.a: "$utopia.3308.a$"
 shroud.4135.a.tt: "Ersetzt die Domänen aller uns bekannten Schleierwesen mit der des $end_of_the_cycle_color_article$.\nWir haben mindestens 50 Jahre Zeit, um die Galaxie in der §H$end_aura$§! zu tränken. Sollten wir Erfolg haben, endet das Spiel.\n$covenant.cycle.tooltip$$shroud.8450.a.tech_tooltip$\n$shroud.4135.psionic_components_insight$\n\nDie Abkommen aller anderen Schleierpakte werden zurückgesetzt\n$eotc_opinion_modifier_tooltip$"
 shroud.4135.b: "Verlasst den Schleier und versucht, das Erlebte zu vergessen."
 shroud.4135.b.forging_our_own_path: "Der vor uns liegende Weg ist klar. Wir werden ihn allein beschreiten."
 shroud.4135.psionic_components_insight: "Technologischer Fortschritt für alle ['concept_psionic_components', psionischen Komponenten]: §G+10%§!"
 concept_psionic_components: "Psionische Komponenten"
 concept_psionic_components_desc: "$tech_psionic_bombers$\n$tech_psionic_lightning$\n$tech_psionic_disruptor$\n$tech_zro_launcher$\n$tech_psionic_shield$\n$tech_precognition_interface$\n$tech_psi_jump_drives$"
 triggered_opinion_eotc_situation_stage1: "Herbeirufung des Endes"
 shroud.4140.title: "Alles oder nichts"
 shroud.4140.desc: "Unser Schicksal ist eng mit dem $end_of_the_cycle_color_article$ verbunden. Wo auch immer seine Aura erstrahlt, gedeiht unsere Bevölkerung. In unserem tiefsten Inneren kristallisierte sich eine einfache Schlussfolgerung heraus: Alles, was die Ausbreitung der Aura einschränkt, schränkt auch das [This.GetName] ein und muss beseitigt werden.\n\nWenn wir es denn wünschen, könnten wir alle galaktischen Begrenzungen hinsichtlich unserer militärischen Ziele hinter uns lassen und unsere Feinde gnadenlos erobern. Nichts und niemand darf der Vorherrschaft des Endes im Wege stehen."
 shroud.4140.a: "Möge sich unser Schicksal erfüllen."
 shroud.4140.a.tooltip: "Erhält Zugang zum §HKriegsgrund§! \"['concept_total_war']\"\n$eotc_opinion_modifier_2_tooltip$"
 triggered_opinion_eotc_situation_stage2: "Vorboten des Endes"
 shroud.4145.title: "Vernichtung"
 shroud.4145.desc_1.common_1: "Während die §R$end_aura$§! die Galaxie immer weiter verschlingt, spüren wir einen wachsenden Widerstand."
 shroud.4145.desc_1.common_2: "Doch das alles spielt für uns keine Rolle. Wir werden nicht darauf warten, dass andere das $end_of_the_cycle_color_article$ annehmen."
 shroud.4145.desc_1.default: "$shroud.4145.desc_1.common_1$ Unsere galaktischen Nachbarn wenden sich in immer größerer Anzahl gegen uns. $shroud.4145.desc_1.common_2$"
 shroud.4145.desc_1.homicidal: "$shroud.4145.desc_1.common_1$ Die Feindseligkeit unserer Feinde uns gegenüber wird immer größer. $shroud.4145.desc_1.common_2$"
 shroud.4145.desc_2: "Vom Willen unseres Schleierpakts inspiriert entwickelten wir neue Methoden, um Energie und Materie zu nutzen, um die Aura zu nähren. Das Universum selbst könnte geopfert werden, um das Ende voranzutreiben."
 shroud.4145.a: "Wir müssen alles Notwendige tun."
 shroud.4145.a.tooltip: "$eotc_opinion_modifier_3_tooltip$\nNeue Erlasse:\n$t$- ['edict:annihilation_of_matter', $edict_annihilation_of_matter$]\n$t$- ['edict:annihilation_of_energy', $edict_annihilation_of_energy$][GetDimensionalCollapseEdictGain]"
 shroud.4145.dimensional_collapse: "\n$t$- ['edict:dimensional_collapse', $edict_dimensional_collapse$]"
 triggered_opinion_eotc_situation_stage3: "$triggered_opinion_eotc_situation_stage2$"
 shroud.4150.title: "Das Ende naht"
 shroud.4150.desc: "Unser Schleierpakt spricht in Stille zu uns. Das Ende des Zyklus steht kurz bevor, und eine neue Welle der Energie durchströmt [This.GetName]. Wir sind von Dringlichkeit eingenommen.\n\nWenn wir den Willen des Endes befriedigen wollen, muss die kollektive Energie aller [This.GetSpeciesNamePlural] auf ein Ziel gerichtet werden. Wir müssen die Kraft unseres Paktes manifestieren und die Aura bis in die entferntesten Winkel der Galaxie ausbreiten."
 shroud.4150.a: "Unsere Zeit ist gekommen."
