 ACCORD_CREATION: "Schöpfung"
 ACCORD_CREATION_desc: "In den letzten Jahren hat der Einfluss des Endes des Zyklus auf diese Realität stark zugenommen. Ganze Welten aus anderen Dimensionen treten in diese Dimension über und nähren die unausweichliche Nichtigkeit."
 ACCORD_CREATION_TT: "Erschafft eine §H$pc_gaia$§! mit §H1000§! £pop£ §Y$POPS$§! in unserem £system£ §YHeimatsystem§!"
