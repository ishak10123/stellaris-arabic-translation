 #==========================
 # Councilors
 #==========================
 # Energy Curator
 councilor_energy_curator: "Energiekurator"
 councilor_energy_curator_female: "Energiekuratorin"
 councilor_energy_curator_desc: "Der Energiekurator ist für die ordnungsgemäße Verteilung der von der Allgemeinheit gesammelten Energie verantwortlich. Die Energie muss in einem fragilen Gleichgewicht gehalten werden, um eine Ineffizienz auf den untersten Ebenen der Gesellschaft zu verhindern."
 # Executive Thrall Manager
 councilor_executive_thrall_manager: "Leitender Leibeigenenverwalter"
 councilor_executive_thrall_manager_female: "Leitende Leibeigenenverwalterin"
 councilor_executive_thrall_manager_desc: "Der leitende Leibeigenenverwalter ist für die ordnungsgemäße Zuweisung der durch den Stoffwechsel erzeugten Energie verantwortlich, die man von bereitwilligen Praktikanten sammelt. Diese Energie findet in den höheren Ebenen der Unternehmensführung einen besseren Nutzen."
 # Conspirator Liaison
 councilor_secret_societies: "Konspirateurenkontaktverwalter"
 councilor_secret_societies_female: "Konspirateurenkontaktverwalterin"
 councilor_secret_societies_desc: "Der Konspirateurenkontaktverwalter handhabt insgeheim verschiedene politische Aspekte des Reichs, trägt jedoch offiziell den Titel eines stellvertretenden Koordinators."
 # Manipulator Liaison
 councilor_secret_societies_corporate: "Manipulatorenkontaktverwalter"
 councilor_secret_societies_corporate_female: "Manipulatorenkontaktverwalterin"
 councilor_secret_societies_corporate_desc: "Der Manipulatorenkontaktverwalter handhabt insgeheim verschiedene politische Aspekte des Reichs, trägt jedoch offiziell den Titel eines Assistenzkoordinators."
 # Chief Medium
 councilor_chief_medium: "Hauptmedium"
 councilor_chief_medium_female: "$councilor_chief_medium$"
 councilor_chief_medium_desc: "Das Hauptmedium ist die oberste spirituelle Autorität im Reich. Es kümmert sich um die Bedürfnisse der staatlichen Mystiker und fördert die Wahrsagung in allen Bereichen der Gesellschaft."
 councilor_chief_medium_effect_tooltip: "$t$- $mod_planet_bureaucrats_upkeep_mult$: $@sb_councilors_priest_upkeep_mult|=-%$\n$t$- $MOD_COUNCIL_AGENDA_PROGRESS_SPEED$: $@sb_councilors_agenda_speed_mult|1=+%$\n$t$- $mod_cycle_negative_effects_bonus_mult$: $@sb_negative_effects_bonus|0=-%$"
 # Executive Astrologist
 councilor_executive_astrologist: "Leitender Astrologe"
 councilor_executive_astrologist_female: "Leitende Astrologin"
 councilor_executive_astrologist_desc: "Der Leitende Astrologe kümmert sich darum, dass spirituelle Praktiken im ganzen Reich vereinheitlicht, visionäre Ineffizienzen beseitigt und glückliche Zufälle beschleunigt werden, soweit es die Sterne zulassen."
 councilor_executive_astrologist_effect_tooltip: "$t$- $mod_planet_bureaucrats_upkeep_mult$: $@sb_councilors_priest_upkeep_mult|=-%$\n$t$- $MOD_COUNCIL_AGENDA_PROGRESS_SPEED$: $@sb_councilors_agenda_speed_mult|1=+%$\n$t$- $mod_cycle_positive_effects_bonus_mult$: $@sb_positive_effects_bonus|0=+%$"
 # Experimentation Overseer
 councilor_experimentation_overseer: "Experimentsaufseher"
 councilor_experimentation_overseer_female: "Experimentsaufseherin"
 councilor_experimentation_overseer_desc: "Der Experimentsaufseher stellt sicher, dass sich Forschungsinstitutionen strikt an die Regulierungen halten, damit Testsubjekte länger einen Nutzen abwerfen."
 # Test Marketer
 councilor_test_marketer: "Testvermarkter"
 councilor_test_marketer_female: "Testvermarkterin"
 councilor_test_marketer_desc: "Der Testvermarkter stellt sicher, dass sich Forschungszentren an die Unternehmensrichtlinien halten, was die Produktivität von Testsubjekten erhöht."
 # Thought Warden (Mindwarden)
 councilor_mindwarden: "Gedankenwächter"
 councilor_mindwarden_female: "Gedankenwächterin"
 councilor_mindwarden_desc: "Der Gedankenwächter ist die höchste Autorität, wenn es um die Bekämpfung psionischer Feindseligkeit und krimineller Gedanken geht."
 councilor_mindwarden_unlock_title: "§HRatsposten durch die [mindwarden_enclave_country.GetName]§!"
 councilor_mindwarden_conditional_tooltip: "Anführer besitzt keine psionischen Fähigkeiten"
 # Shroudspeaker
 councilor_chosen: "Schleiersprecher"
 councilor_chosen_female: "Schleiersprecherin"
 councilor_chosen_desc: "Der Schleiersprecher leitet unsere Priester, indem er sich ganz auf die Empfindungen aus dem Inneren des Schleiers einstimmt."
 # Grand Preacher
 councilor_chosen_corporate: "Großprediger"
 councilor_chosen_corporate_female: "Großpredigerin"
 councilor_chosen_corporate_desc: "Der Großprediger stellt sicher, dass die Arbeit unserer Priester im besten Interesse unserer Wirtschaft ist."
 # Grand Vessel
 councilor_grand_vessel: "Großes Gefäß"
 councilor_grand_vessel_female: "$councilor_grand_vessel$"
 councilor_grand_vessel_desc: "Das Große Gefäß ist dafür verantwortlich, die Effizienz unserer automatisierten Anlagen zu maximieren, und besitzt das Privileg, eine der größten Sicherheitseinheiten unserer Gesellschaft nutzen zu können."
 # Executive Vessel
 councilor_executive_vessel: "Leitendes Gefäß"
 councilor_executive_vessel_female: "$councilor_executive_vessel$"
 councilor_executive_vessel_desc: "Das Leitende Gefäß ist dafür verantwortlich, die Profite unserer automatisierten Anlagen zu maximieren, und besitzt das Privileg, eine der größten Sicherheitseinrichtungen unserer Gesellschaft nutzen zu können."
