 START_PATRON_FIRST_CONTACT: "Beginnt mit dem Prozess der Kontaktaufnahme zum Schleierwesen \"$PATRON$\"."
 COMPLETE_PATRON_FIRST_CONTACT: "Deckt das Schleierwesen \"$PATRON$\" im §YSchleier§! auf. Öffnet das Menü für §YKontakte§!, um darauf zuzugreifen."
 shroud.11225.title: "Plötzliches Verschwinden"
 shroud.11225.desc.common_1: "Plötzlich war alles fort.\n\nDie feindliche §R$end_aura$§!, die unser System eingenommen hatte, verschwand und nahm alles mit sich. Ganze Sterne kollabierten zu Schwarzen Löchern, Planeten verschwanden und nur eine große Stille blieb an ihrer Stelle zurück."
 shroud.11225.desc.common_2: "Welcher Wahnsinn eine solch Macht herbeirief, werden wir möglicherweise nie erfahren."
 shroud.11225.desc.default: "$shroud.11225.desc.common_1$\n\n$shroud.11225.desc.common_2$"
 shroud.11225.desc.mitigated: "$shroud.11225.desc.common_1$ Unsere Bemühungen, die Aura abzuschwächen, scheinen eine mildernde Wirkung gehabt und das wenige, was uns bleibt, bewahrt zu haben.\n\n$shroud.11225.desc.common_2$"
 shroud.11225.a: "Wie ist das möglich?"
 SPECIAL_PROJECT_CALLING: "Berufung des Wissens"
 SPECIAL_PROJECT_CALLING_DESC: "Die $whisperers_in_the_void_color_article_cap$ sehnen sich nach Wissen, das jenseits der Grenzen des konventionellen Denkens liegt. Indem wir unsere [Owner.GetResearchers] damit beauftragen, sich auf abwegigere Forschungsgebiete zu konzentrieren, können wir den Wissensdurst der Flüsterer eventuell stillen."
