 teleportation_research: "Teleportationsforschung"
 teleportation_research_desc: "Unsere psionische Aktivitäten erschöpfen allmählich unsere Rohstoffe. Es ist für unser Überleben entscheidend, dass wir Technologien gegen die Dematerialisierung entwickeln."
 psionic_caution: "Psionische Vorsicht"
 psionic_caution_desc: "Um der Dematerialisierung von Rohstoffen entgegenzuwirken, war es notwendig, den Einsatz von Psionik in der Nähe bestimmter Industriegebiete zu verbieten."
 necrocognition_research: "Nekrokognitionsforschung"
 necrocognition_research_desc: "Mit den [Owner.GetSpeciesBrainPlural&AKK] von Dahingeschiedenen zu kommunizieren, ist nicht länger nur eine private Freizeitbeschäftigung, sondern zu einer regulierten Form der öffentlichen Forschung geworden."
 resurrectionism: "Wiederauferstehung"
 resurrectionism_desc: "Dahingeschiedene [Owner.GetSpeciesBrainPlural&AKK] für die experimentelle Kommunikation zu lagern, ist trotz der dadurch entstandenen Kriminalität eine beliebte Freizeitbeschäftigung."
 regulated_transformation: "Regulierte Transformation"
 regulated_transformation_desc: "Bei einem kleinen Teil unserer psionischen Bevölkerung sind sonderbare Anhängsel gewachsen. Indem wir ihr Wachstum sorgfältig regulieren, steigern wir die Produktivität."
 forced_amputation: "Zwangsamputation"
 forced_amputation_desc: "Als bei einigen Mitgliedern unserer psionischen Bevölkerung seltsame Anhängsel heranwuchsen, wurde beschlossen, deren Amputation verpflichtend zu machen."
