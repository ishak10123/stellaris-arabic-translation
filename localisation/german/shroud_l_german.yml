 shroud.delve_event.boon.1: "Der Schleier ermächtigte uns."
 shroud.delve_event.boon.2: "Der Schleier schenkte uns seinen Segen."
 shroud.delve_event.boon.3: "Wir wurden vom Schleier gesegnet."
 shroud.delve_event.boon.4: "Unsere Bemühungen machten uns stärker."
 shroud.delve_event.boon.5: "Wir wurden vom Schleier für unsere Bemühungen belohnt."
 shroud.delve_event.boon.6: "Der Schleier vermachte uns ein Geschenk."
 shroud.delve_event.boon.7: "Der Schleier stärkte uns."
 shroud.delve_event.boon.8: "Der Schleier ließ uns ein Geschenk angedeihen."
 shroud.delve_event.boon.9: "Der Schleier belohnte unsere Bemühungen."
 shroud.delve_event.boon.10: "Die Gunst des Schleier scheint auf uns herab."
 shroud.delve_event.boon.11: "Der Schleier hielt es für angebracht, uns zu ermächtigen."
 shroud.delve_event.boon.12: "Die Gunst des Schleiers segnet uns."
 shroud.delve_event.boon.13: "Der Schleier segnet unsere Bemühungen."
 shroud.delve_event.boon.14: "Uns wurde der Segen des Schleiers geschenkt."
 shroud.delve_event.boon.15: "Der Schleier belohnt uns mit einer Ermächtigung."
 shroud.delve_event.curse.1: "Der Schleier hat uns verflucht."
 shroud.delve_event.curse.2: "Wir wurden von einem Fluch aus dem Schleier getroffen."
 shroud.delve_event.curse.3: "Unsere Bemühungen haben uns einen Fluch auferlegt."
 shroud.delve_event.curse.4: "Unsere Bemühungen wurden mit einem Fluch belohnt."
 shroud.delve_event.curse.5: "Der Schleier hat uns Unglück gebracht."
 shroud.delve_event.curse.6: "Wir wurden von einem Fluch gezeichnet."
 shroud.delve_event.curse.7: "Der Schleier hat unser Reich verflucht."
 shroud.delve_event.curse.8: "Der Schleier widersetzt sich uns mit einem Fluch."
 shroud.delve_event.curse.9: "Der Zorn des Schleiers verflucht uns."
 shroud.delve_event.curse.10: "Der Schleier überschüttet uns mit Unglück."
 shroud.delve_event.curse.11: "Der Schleier brandmarkt uns für den Untergang."
 shroud.delve_event.curse.12: "Der Schleier bürdet uns einen Fluch auf."
 shroud.delve_event.curse.13: "Der Schleier verflucht unsere Bemühungen."
 shroud.delve_event.curse.14: "Wir wurden vom Schleier verdammt."
 shroud.delve_event.curse.15: "Der Schleier schenkt uns seine Verachtung."
 shroud.3000.title: "Flüchtige Eindrücke"
 shroud.3000.desc: "In der wirbelnden Dunkelheit nehmen ferne Schatten flüchtige Formen an, ehe sie wieder ins Nichts entschwinden ... Eine undeutliche Kakophonie aus Stimmen, die unverständlich vor sich hin reden ... Lichter, die flackern und wieder verblassen. Hitzeflecken, die auftauchen und wieder verschwinden.\n\nAlles bewegt sich. Etwas dreht sich. Sind wir es, die sich bewegen, oder ist es der Schleier selbst?\n\nEine Präsenz nähert sich aus allen Richtungen gleichzeitig. Dann ertönt eine Stimme:\n\n§HWAS SEHT IHR?§!"
 shroud.3000.a: "Wir sehen eine Welt in Flammen."
 shroud.3000.a.reply: "Etwas Schwerfälliges verschiebt sich, und die Stimme kehrt zurück ...\n\n§HGUT.§!\n\nDie Dunkelheit kippt zur Seite und dreht sich. Wir spüren die Last, die auf uns drückt, und dann sind wir plötzlich wieder allein."
 shroud.3000.b: "Wir sehen Festlichkeiten."
 shroud.3000.b.reply: "Etwas Schwerfälliges erschaudert. Die Dunkelheit erdrückt uns. Sie wird immer stärker und dichter ...\n\n§HNEIN!§!\n\nDie Leere kippt zur Seite und dreht sich. Plötzlich sind wir wieder allein ..."
 shroud.3000.c: "Wir sind uns nicht sicher."
 shroud.3000.c.reply: "§HSCHWÄCHE!§!\n\nDie Leere kippt zur Seite und dreht sich. Plötzlich sind wir wieder allein ..."
 shroud.3005.title: "Sabbernder Hunger"
 shroud.3005.desc: "Der faulige Gestank von Eingeweiden überflutet unsere Sinne.\n\nBilder der Wut. Sie winden und krümmen sich und beginnen, aus den Tiefen des Schleiers emporzusteigen. Die wilden Schreie darbender Bestien hallen als Erstes wider ... Wir spüren ihren Hunger. Dann werden ihre sabbernden Mäuler zu unseren eigenen.\n\nSilhouetten tauchen vor uns auf. Tiere auf der Flucht. Beute. Verlockend nah ... Der Schmerz wird unerträglich.\n\nUnsere Sinne winden sich, und alles in unserem Inneren zieht sich zusammen, während der Hunger unsere Gedanken verschlingt. Sind diese Schreie die unserer Beute ... oder kommen sie aus unserem Innersten?\n\nDie Ketten, die uns binden, ziehen sich enger. Dann ein Knacken, eine gequälte Stimme, ein Winden und Kreischen.\n\n§HSPRENGT EURE KETTEN! NÄHRT EUCH!§!"
 shroud.3005.a: "Sprengt die Ketten. Nährt Euch an der Beute."
 shroud.3005.a.boons.tt: "Erhält einen zufälligen kampfbetonten $shroud_boon$"
 shroud.3005.a.reply: "Unsere Zurückhaltung zerbricht.\n\nAusgehungert. Entfesselt.\n\nSchrecken!\n\n§HNÄHREN.§!"
 shroud.3005.b: "Widersteht dem Hunger. Beruhigt den Geist."
 shroud.3005.b.reply: "Die Ketten halten. Die Stimmen brodeln vor Wut, während wir ihren Einfluss einschränken und unseren Geist beruhigen. Wir gewinnen die Kontrolle zurück.\n\n§HSCHWACH! NUTZLOS!§!\n\nDer Hunger verschwindet und hinterlässt einen anhaltenden Groll, der langsam im Schleier verblasst."
 shroud.3010.title: "Opferfest"
 shroud.3010.desc: "Aus der Tiefe ertönt eine Stimme ... Sie ist voller Bosheit ... und scheint uns zu rufen.\n\n§HNÄHREN. FRESSEN. VERSCHLINGEN.§!\n\nVisionen brechen unaufgefordert hervor. Völlig stille Welten, die zu Asche zerfallen sind; die Schreie unserer [Root.GetCitizenPlural], deren physische Formen von psionischer Energie verschlungen werden. Sie sättigen die Stimmen ... und unseren eigenen ... Hunger.\n\nWährend dieser Visionen spüren wir eine weitere Präsenz, die uns dazu drängt, Zurückhaltung zu üben, um gemeinsam stärker zu werden. Diese Stimme wird jedoch von den Schreien übertönt."
 shroud.3010.desc.organic: "§HGEBT MIR IHR FLEISCH!§!"
 shroud.3010.desc.other: "§HGEBT MIR IHRE KÖRPER!§!"
 shroud.3010.a: "Fresst."
 shroud.3010.a.reply: "Die Schreie der Verschlungenen hallen sowohl durch den Schleier als auch durch unser eigenes Reich, ehe eine abrupte Stille eintritt.\n\nMit diesem Opfer wächst unsere Macht und der Hunger lässt nach."
 shroud.3010.b: "Vereint Euch."
 shroud.3010.b.reply: "Wir bringen die Stimme zum Schweigen und sorgen für eine Einheit zwischen dem Schleier und unserem Reich. Ein kollektiver Seufzer der Erleichterung übertönt die unbändige Wut, während der Hunger allmählich abnimmt."
 shroud.3015.title: "Flüchtige Visionen"
 shroud.3015.desc: "Mächtige Ströme aus psionischer Energie stoßen in der Dunkelheit aufeinander. Schatten, die umherhuschen und im Boden verschwinden ... Ein schimmerndes Licht, das vor uns pulsiert.\n\nDann ist für einen kurzen Moment eine Szene zu erkennen. Die Umrisse verschwinden, ehe wir sie deuten können.\n\nEine seltsame Präsenz umgibt uns.\n\n§HWAS HABT IHR GESEHEN?§!"
 shroud.3015.a: "Wir sahen einen Wald, in dem unzählige Lebensformen existierten."
 shroud.3015.a.reply: "Die Stimme kehrt zurück ...\n\n§HAUSGEZEICHNET.§!\n\nEine starke Hitze steigt in uns auf und lässt wieder nach. Die Präsenz ist fort."
 shroud.3015.b: "Wir sahen eine Einöde, die allem beraubt wurde, was sie einst besaß."
 shroud.3015.b.reply: "Die Stimme kehrt zurück ...\n\n§HNIEMALS.§!\n\nEine extreme Kälte überkommt uns und verschwindet wieder. Die Präsenz ist fort."
 shroud.3015.c: "Wir sind uns nicht sicher."
 shroud.3015.c.reply: "Die Stimme kehrt zurück ...\n\n§HWIE UNINTERESSANT.§!\n\nEine extreme Leere überkommt uns und verschwindet wieder. Die Präsenz ist fort."
 shroud.3020.title: "Verlockende Bewahrung"
 shroud.3020.desc: "Aus den vielen Schichten des Schleiers entfaltet sich eine Vision vor uns.\n\nDer Nebel formt die Umrisse einer sich windenden, gefangenen Kreatur, die nach Luft ringt, während sich neblige Ranken immer fester um sie schnüren.\n\nDas Tier ist anders als alles, was wir kennen.\n\nEine Stimme schlängelt sich wie ein Faden durch unser Innerstes.\n\n§HDIE SCHICKSALSSTRÄNGE LIEGEN OFFEN! AN WELCHEM WERDET IHR ZIEHEN?§!"
 shroud.3020.a: "Lasst die Kreatur frei."
 shroud.3020.a.reply: "Die Stimme hallt in unseren [GetMindLoc&DAT] wider, während die Kreatur langsam verblasst.\n\n§HWOHLSTAND.§!\n\nEin weiterer flüchtiger Blick offenbart sich uns – die Rückkehr des Lebens, irgendwo in unserem Reich."
 shroud.3020.b: "Fangt sie ein."
 shroud.3020.b.reply: "Die Stimme verschwindet aus unseren Gedanken und hinterlässt einen durchdringenden Schrei, der über Bilder einer kargen Landschaft widerhallt.\n\n§HPESTILENZ.§!"
 shroud.3020.c: "Tötet sie."
 shroud.3020.c.swarm: "Verschlingt sie."
 shroud.3020.c.reply: "Als ein überwältigender Drang von uns Besitz ergreift, verschwindet die Stimme. Der Blutdurst überkommt unsere [GetMindLoc&AKK], während ein Gelächter durch die Leere hallt.\n\n§HNATÜRLICH! LEICHTE BEUTE!§!"
 shroud.3025.title: "Gestaltverändernde Landschaften"
 shroud.3025.desc: "Der Nebel des Schleiers legt sich und offenbart endlose Visionen, die sich unaufhörlich miteinander vermischen.\n\nDunkle Landschaften erscheinen. Berge erheben und senken sich. Brodelnde Ozeane des Chaos verdampfen und hinterlassen die bleichen Knochen von aquatischem Leben in endlosen Wüsten.\n\nUnter bewaldeten Baumkronen ruhen sanftmütige Kreaturen, bevor sie sich in blutrünstige Monstrositäten verwandeln. Sie zerreißen einander gegenseitig und befinden sich in einem endlosen Kreislauf aus Tod und Wiedergeburt.\n\nEine Stimme durchdringt unsere [GetMindLoc&AKK] inmitten des Chaos.\n\n§HSO VIEL UNORDNUNG. IN SICH SELBST VERWOBEN.§!"
 shroud.3025.a: "Wir formen die Natur nach unserem Willen."
 shroud.3025.a.reply: "Wir greifen nach dem Chaos vor uns.\n\nWir fixieren Landmarken an Ort und Stelle und zwingen Kontinente dazu, sich niederzulassen.\n\nAls sich die Teile zusammenfügen, hallt die Stimme in uns wider.\n\n§HFLACHHEIT, FADHEIT, LEERHEIT ...§!"
 shroud.3025.b: "Die Natur kann nur durch die natürliche Ordnung gedeihen."
 shroud.3025.b.reply: "Die Visionen gehen weiter, während wir zusehen. Dann verschwimmt der endlose Kreislauf allmählich. Alles endet genauso schnellauf, wie es begann.\n\nEnergien strömen durch die unendliche Weite, bevor sie neue Formen annehmen.\n\nDie Stimme hallt in uns wider.\n\n§HFRIEDLICHER STREIT. UNGEORDNETE EINIGKEIT.§!"
 shroud.3025.b.reply.tt: "Der Planet erhält je einen zufälligen §Gpositiven§! und §Rnegativen Modifikator§!"
 shroud.3030.title: "Prisma in der Dunkelheit"
 shroud.3030.desc: "Die unruhigen Wellen des Schleiers legen eine riesige Fläche aus schwarzem Sand frei. Das Brechen von Wellen ist zu hören, doch nicht zu sehen.\n\nVor uns - oder vielleicht dahinter uns - erscheint ein Prisma. Ein einziger Lichtstrahl durchdringt es. Das Licht wird gebrochen und erzeugt ein trübes Bild.\n\nUnzählige schemenhafte Gestalten und sich verändernde Formen sind kurz zu sehen, ehe die Dunkelheit sie wieder verschluckt.\n\nAuf dem Sand in der Nähe lässt sich eine Präsenz nieder.\n\n§HWAS GEZEIGT WURDE, WURDE GESEHEN. IST ES NICHT SO?§!"
 shroud.3030.a: "Wir sahen das Zusammentreffen vieler Stimmen."
 shroud.3030.a.reply: "Der Sand bewegt sich langsam. Die Stimme kehrt zurück.\n\n§HGUT. HARMONIE IST DER WEG DES UNIVERSUMS.§!\n\nWir fühlen, wie sich die Last legt, die auf uns ruhte. Wir sind wieder alleine."
 shroud.3030.b: "Wir sahen das Gemetzel einer Schlacht."
 shroud.3030.b.reply: "Der Sand wirbelt urplötzlich mit der Gewalt eines Sturms auf.\n\n§HNEIN. LASST WAFFEN ROSTEN UND IN VERGESSENHEIT GERATEN!§!\n\nDer Sandsturm legt sich. Die Stimme ist fort."
 shroud.3030.c: "Wir sind uns nicht sicher."
 shroud.3030.c.reply: "Der Sand bewegt sich langsam.\n\n§HZÖGERN FÜHRT ZUM SCHEITERN ...§!\n\nWir sind wieder allein."
 shroud.3035.title: "Schattenkampf"
 shroud.3035.desc: "Die chaotischen Energien des Schleiers krümmen sich und brechen hervor.\n\nSchattenhafte Ranken holen peitschend aus und ziehen sich wieder zusammen. Der Nebel bekämpft sich gewaltsam selbst. Inmitten dieses psionischen Sturms ist der Kampf zweier formloser Wesen auszumachen. Sie sind erbarmungslos, unnachgiebig und von ihrer Wut gänzlich eingenommen.\n\nEine weitreichende fremde Präsenz dringt in unsere [GetMindPhysicalLoc&AKK] ein.\n\n§HDIEJENIGEN, DIE EINTRETEN, MÜSSEN ENTSCHLOSSENHEIT MITBRINGEN.§!"
 shroud.3035.a: "Der Dialog fördert das Verständnis."
 shroud.3035.a.reply: "Der Nebel löst sich auf und verschmilzt mit der umherwirbelnden psionischen Energie. Das Bewusstsein kehrt zurück.\n\n§HHARMONIE IST WEISHEIT.§!\n\nDer Schleier ist jetzt ruhiger."
 shroud.3035.b: "Ein Kompromiss bedeutet Schwäche."
 shroud.3035.b.reply: "Mit jedem Schlag des Nebels verstärken sich die brodelnden Energien um uns herum.\n\n§HGEWALT IST DER LOHN FÜR DAS GEDANKENLOSE WESEN.§!\n\nDie sich windenden Energien des Schleiers wirbeln erneut umher."
 shroud.3040.title: "Ungesehen"
 shroud.3040.desc: "Ein schwarzer Ozean erstreckt sich vor uns.\n\nPlötzlich formt sich ein Bild auf der Oberfläche. Wir erblicken einen glitzernden Berg, dessen unzählige Kämme mit schimmerndem Gold überzogen sind. Er verschwindet ebenso plötzlich wieder, wie er aufgetaucht ist.\n\nEine Stimme hallt in den Tiefen unserer [GetMindLoc&GEN] wider.\n\n§HIHR HABT DAS UNGESEHENE GESEHEN?§!"
 shroud.3040.a: "Wir sahen einen Steinbruch, der auf die Spitzhacke wartete."
 shroud.3040.a.reply: "Eine Reihe aufeinanderfolgender Wellen breitet sich über die Oberfläche aus. Erneut hören wir eine Stimme.\n\n§HUNBEGRENZTES WACHSTUM ERHÄLT DAS MASSLOSE GLEICHGEWICHT.§!\n\nAls sich die Flüssigkeit beruhigt, spüren wir, dass die Stimme fort ist."
 shroud.3040.b: "Wir sahen, dass die Perfektion der Natur bewahrt werden muss."
 shroud.3040.b.reply: "Die Flüssigkeit ist aufgewühlt. Wogen schwellen an und brechen. Ein Strudel wirbelt durch die Dunkelheit. Die Stimme kehrt mit größerer Intensität zurück.\n\n§HINAKZEPTABEL! WACHSTUM UND ERHALT. WACHSTUM UND ERHALT!§!\n\nDie Oberfläche beruhigt sich. Die Stimme ist fort."
 shroud.3040.c: "Wir sind uns nicht sicher."
 shroud.3040.c.reply: "Die Flüssigkeit bewegt sich. Die Stimme spricht erneut.\n\n§HEINE SCHWANKENDE ÜBERZEUGUNG ZEUGT VON EINEM SCHWACHEN WILLEN.§!\n\nAls sich die Oberfläche beruhigt, spüren wir, dass die Stimme fort ist."
 shroud.3045.title: "Leuchtender Kern"
 shroud.3045.desc: "Der Nebel ordnet sich vor uns neu. Glühende Energien pulsieren mit einer unglaublichen Macht. Wir sehen die Umrisse einer seltsamen, baumartigen Gestalt.\n\nDas riesige Blätterdach schimmert in einem Mischmasch aus Violett-, Rosa- und Schwarztönen, als wir uns nähern.\n\nIm Stumpf befindet sich ein leuchtender Kern, der synchron zu den sich wechselnden Farben im Blätterdach erstrahlt.\n\nEine Stimme breitet sich in unseren [GetMindLoc&DAT] aus.\n\n§HAN SICH REISSEN. EINNEHMEN. INSTRUMENTALISIEREN.§!"
 shroud.3045.a: "Extrahiert den Kern."
 shroud.3045.a.reply: "Als der Kern entfernt wird, verdorrt das Blätterdach augenblicklich. Die Stimme kehrt zurück.\n\n§HJA! BEUTE BRINGT NEUE BEUTE.§!"
 shroud.3045.b: "Rührt den Kern nicht an."
 shroud.3045.b.reply: "Ein Beben breitet sich in uns aus. Ist es diese Welt, die bebt, oder sind wir es?\n\n§HWOHLSTAND IST DER DASEINSZWECK. SEINE ABLEHNUNG IST TÖRICHT!§!"
 shroud.3050.title: "Zankende Kakophonien"
 shroud.3050.desc.intro: "Mächtige psionische Ströme prallen inmitten der unendlichen Turbulenzen des Schleiers aufeinander. Eine tosende Kakophonie entsteht und buhlt lautstark um unsere Aufmerksamkeit."
 shroud.3050.desc.outro: "Der Lärm ist unerträglich."
 shroud.3050.desc.eater: "Schmerzensschreie, das donnernde Orchester einer Schlacht, das Knistern alles verschlingender Flammen. Wir spüren einen Schmerz ... Doch wem gehört er?"
 shroud.3050.desc.composer: "Schreie und Rufe, animalisch, wild, ursprünglich ... Flüsse rauschen und Winde heulen ... Die ganze Natur bellt und jault, eindringlich und als gewaltiger Chor ..."
 shroud.3050.desc.cradle: "Stimmen murmeln, flüstern, rufen und verkünden ... Unzählige Betonungen, Silben, Laute ... Eine Vielzahl von Sprachen, die alle gleichzeitig plappern."
 shroud.3050.desc.instrument: "Bohrer bohren, Maschinen brummen ... Materie wird laut und kraftvoll umgewandelt ... Alle Fabriken des Universums arbeiten gleichzeitig."
 shroud.3050.a: "Bleibt."
 shroud.3050.a.reply: "Das Crescendo baut sich immer weiter auf. Plötzlich werden wir in eine Richtung gestoßen, die wir nicht verstehen können ...\n\nSchließlich kehren wir wieder zur Stille zurück."
 shroud.3050.b: "Wendet Euch ab."
 shroud.3050.b.reply: "Es ist unerträglich. Unsere [GetMindLoc&NOM] ziehen sich in die Geborgenheit der Stille zurück."
 shroud.3055.title: "Prophetische Visionen"
 shroud.3055.desc.intro: "Die Dunkelheit umhüllt uns. Sie drückt von allen Seiten auf uns und wird immer stärker. Schließlich offenbart sie uns eine verschwommene Vision."
 shroud.3055.desc.outro: "Inmitten der schattenhaften Düsternis ist unverkennbar die Flagge von [Root.GetName] zu sehen.\n\nSind wir das?"
 shroud.3055.desc.eater: "Wir sehen eine verwüstete Welt, die Folgen einer Schlacht ... Die Sieger durchkämmen die Leichen und die Trümmer."
 shroud.3055.desc.composer: "Wir sehen viele Welten ... die unmöglich schnell durch Zeit und Raum eilen ... Alle gleich, vereint unter einem einzigen Reich."
 shroud.3055.desc.cradle: "Wir sehen eine große Versammlung ... Die undeutlichen Umrisse vieler Gestalten ... Sie lauschen, sie sprechen."
 shroud.3055.desc.instrument.default: "Wir sehen eine optimierte Welt ... Endlose Reihen von Fabriken und Minen ... Kein Fleckchen auf der Oberfläche ist unberührt."
 shroud.3055.desc.instrument.relentless_industrialist: "Wir sehen eine optimierte Welt ... Endlose Reihen von Fabriken und Minen ... Die pure Perfektion. Kein Fleckchen auf der Oberfläche ist unberührt."
 shroud.3055.a: "Versucht, die Vision aufrechtzuerhalten."
 shroud.3055.a.reply: "Die Bilder werden etwas klarer. Wir sind von dem, was wir wahrnehmen, überzeugt."
 shroud.3055.b.organic: "Verbannt die Vision aus unserem Bewusstsein."
 shroud.3055.b.machine: "Löscht die Vision aus unseren Schaltkreisen."
 shroud.3055.b.reply: "Die undeutlichen Umrisse der Vision lösen sich wieder in nichts auf."
 shroud.3060.title: "Zwischen der Leere"
 shroud.3060.desc.intro: "Der ewige Nebel des Schleiers wirbelt umher und zieht unser Bewusstsein immer tiefer in sich hinein, während unsere körperlichen Gestalten reglos und unberührt bleiben.\n\nUnser[GetPsycheLoc::<DE_END_PRO_S_N>] [GetPsycheLoc&NOM] wird immer stärker belastet, gefangen in einer sich wiederholenden Flut. Jede versuchte Bewegung bricht in sich zusammen und die Spannung nimmt immer weiter zu, wie ein Schraubstock, der sich beständig fester zuzieht."
 shroud.3060.desc.intro.organic: "Wir blicken über uns selbst hinaus, unsere Körper eingeschlossen in einem kaskadenförmigen Tesserakt, der unser physisches Verständnis weit übersteigt."
 shroud.3060.desc.intro.machine: "Unsere Logikprogramme werden aktiviert und der Fehler identifiziert: eine rekursive Schleife. Unsere psionischen Prozessoren reichen nicht aus, um den Zyklus zu durchbrechen und den Normalbetrieb wieder aufzunehmen."
 shroud.3060.desc.intro.end: "Als die Spannung unerträglich wird, drohen sich unsere Formen in Leere aufzulösen. Eine Stimme dringt zu uns in unserer Gefangenschaft durch."
 shroud.3060.desc.outro: "Die Worte hallen in uns nach. Ihre Kraft wächst und offenbart uns einen Weg, um jene Unruhe zu lindern, die uns zu zerreißen droht. Wir müssen uns nur fügen."
 shroud.3060.desc.eater: "§HVERSCHLINGT! VERZEHRT DIE ENDLOSE LEERE!§!"
 shroud.3060.desc.composer: "§HÜBERWINDET DIE GRENZEN DER REKURSIVEN UNENDLICHKEIT!§!"
 shroud.3060.desc.cradle: "§HUMARMT DIE EWIGKEIT! ALLES IST EINS UND EIN GANZES!§!"
 shroud.3060.desc.instrument: "§HGEBT EUCH DEM GRENZENLOSEN POTENZIAL HIN!§!"
 shroud.3060.a: "Unterwerfen wir uns."
 shroud.3060.a.reply: "Die Stimme wird klarer, lenkt unser Handeln und zwingt unsere Gedanken über unser begrenztes Verständnis hinaus. Der Kreislauf setzt sich fort – er verstärkt sich, zieht uns tiefer hinein –, ehe er an unserer Psyche zerschellt.\n\nWir haben die Rekursion durchbrochen, geleitet von unserer Bitte an die höheren Mächte des Schleiers.\n\nAllerdings bleiben nicht alle von uns. §H[event_target:shroud_warped_leader.GetName]§! ist nicht mehr an seinem ursprünglichen Platz. Die Stimme kehrt zurück."
 shroud.3060.a.reply.default: "SIE WERDEN NEU GESCHAFFEN."
 shroud.3060.a.reply.eater: "§H$shroud.3060.a.reply.default$§!"
 shroud.3060.a.reply.composer: "§H$shroud.3060.a.reply.default$§!"
 shroud.3060.a.reply.cradle: "§H$shroud.3060.a.reply.default$§!"
 shroud.3060.a.reply.instrument: "§H$shroud.3060.a.reply.default$§!"
 shroud.3060.b: "Leisten wir Widerstand."
 shroud.3060.b.reply: "Wir lehnen die uns auferlegten Zwänge ab.\n\nDie Schleife wird immer schneller und zieht uns mit der Kraft ihrer rekursiven Flut mit sich. Als wir aufhören, dagegen anzukämpfen, droht die Spannung nicht länger, uns auseinanderzureißen. Stattdessen umarmt sie uns und erlaubt es uns, einen flüchtigen Blick über uns selbst hinaus zu werfen.\n\nDie Stimme kehrt zurück."
 shroud.3060.b.reply.default: "WIE UNINTERESSANT."
 shroud.3060.b.reply.eater: "§H$shroud.3060.b.reply.default$§!"
 shroud.3060.b.reply.composer: "§H$shroud.3060.b.reply.default$§!"
 shroud.3060.b.reply.cradle: "§H$shroud.3060.b.reply.default$§!"
 shroud.3060.b.reply.instrument: "§H$shroud.3060.b.reply.default$§!"
 shroud.3060.leader_return.title: "Schleierverzerrt"
 shroud.3060.leader_return.desc: "Der Schleier bebt und leichte Verzerrungen breiten sich in unserem [GetMindPhysicalLoc&DAT] aus, während eine vertraute Präsenz am Rand unserer [GetMindPerceptionLoc] auftaucht und Echos, die knapp außerhalb unserer wahrnehmbaren Frequenzen liegen, zu uns flüstern.\n\n§H[from.GetName]§! kehrt zu uns zurück. Ein unbeschreiblicher Nebel verwandelt sich langsam in die uns vertraute Form. Entrückt, aber unversehrt und vom Schleier neu erschaffen kann [from.GetHeShe] es kaum erwarten, den Dienst wiederaufzunehmen."
 shroud.3060.leader_return_tt: "§H[from.GetName]§! erhielt eine neue Eigenschaft: §G$leader_trait_shroud_warped$§!"
 leader_trait_shroud_warped: "Schleierverzerrt"
 leader_trait_shroud_warped_desc: "Dieser Anführer wurde vom Schleier absorbiert und neu geformt. Die ihm zuteilgewordene ewige Weisheit verleiht ihm die Fähigkeit, das Unbeobachtbare zu beobachten und das psionische Potenzial seiner Untergebenen zu verstärken."
 leader_trait_shroud_warped_invasion_effect: "Geheiminformationen gegen andere Reiche pro gewonnener Invasion: §G+$@shroud_warped_intel|0$§!"
 shroud.3065.title: "Ein verheißungsvoller Kelch"
 shroud.3065.desc.intro: "Der Dunst im Schleier weicht und enthüllt einen Kelch mit einer glitzernden Flüssigkeit. Die Oberfläche ist glatt und still.\n\nUns überkommt ein Zwang. Wir nehmen den Kelch, ohne weiter darüber nachzudenken. Die Flüssigkeit schlägt sanfte Wellen, als wir sie [GetDrinkLoc].\n\nDie Klarheit durchströmt uns, und je mehr wir [GetImbibeLoc], desto mehr offenbart sich uns die Lüge. Die Flüssigkeit wird dicker und jeder Tropfen beginnt, in uns zu gerinnen.\n\nWir verspüren den Drang, unser System von den Schadstoffen zu befreien."
 shroud.3065.desc.eater: "§HNEHMT ES AUF! ÜBERWINDET EURE SCHWÄCHE!§!"
 shroud.3065.desc.composer: "§HNÄHRT EUCH! NEHMT DAS WACHSTUM IN EUCH AUF!§!"
 shroud.3065.desc.cradle: "§HSTÄRKT EUCH! UMARMT DIE SCHMERZHAFTE VEREINIGUNG!§!"
 shroud.3065.desc.instrument: "§HTRINKT! GEBT EUCH EURER SUCHT HIN!§!"
 shroud.3065.desc.outro: "Die Stimme wirbelt umher, vermischt sich mit der Flüssigkeit und verfestigt sich, während sie sich weiter in uns hineinzwängt und uns ihrem Willen unterwirft."
 shroud.3065.a.organic: "Trinkt."
 shroud.3065.a.machine: "Macht weiter."
 shroud.3065.a.reply.intro: "Der letzte Rest der zähen Flüssigkeit fließt herunter. Er durchströmt uns und sättigt unser[GetMindPhysicalLoc::<DE_END_PRO_S_A>] [GetMindPhysicalLoc&AKK].\n\nDie Hitze pulsiert durch uns hindurch, verzerrt unsere Gedanken, zerfasert die Ränder unser[GetPsycheLoc::<DE_END_PRO_S_G>] [GetPsycheLoc&GEN].\n\nDie Stimme kehrt zurück, merklich zufrieden, während sich der Kelch vor uns auflöst."
 shroud.3065.a.reply.default: "EROBERER! CHAMPION."
 shroud.3065.a.reply.eater: "§H$shroud.3065.a.reply.default$§!"
 shroud.3065.a.reply.composer: "§HFORMER! LEBENDIGER KATALYSTOR.§!"
 shroud.3065.a.reply.cradle: "§HINTEGRIERER! BEWUSSTSEIN UM BEWUSSTSEIN.§!"
 shroud.3065.a.reply.instrument: "§HDEKADENZ! SINNE, DIE ES ZU ERFAHREN GILT.§!"
 shroud.3065.b: "Scheidet alles aus."
 shroud.3065.b.reply.intro: "Heftige Erschütterungen ziehen durch unsere [GetBodiesLoc], während wir die klebrige Substanz wieder aus unserem Inneren hervorbringen und ausscheiden.\n\nDie widerwärtige Flüssigkeit spritzt in die Leere. Das kurze Zischen einer Stimme ist zu hören, doch ihre Worte verflüchtigen sich zusammen mit unseren Ausscheidungen."
 shroud.3065.b.reply.default: "SCHWÄCHE!"
 shroud.3065.b.reply.eater: "§H$shroud.3065.b.reply.default$§!"
 shroud.3065.b.reply.composer: "§HSTILLSTAND!§!"
 shroud.3065.b.reply.cradle: "§HFEIGHEIT!§!"
 shroud.3065.b.reply.instrument: "§HVERSCHWENDETES POTENZIAL ...§!"
 shroud.3070.title: "Leinwand des Wandels"
 shroud.3070.desc.intro: "Der Schleier schrumpft, faltet sich nach innen und drückt unsere Psyche tief in eine beengte, widerhallende Leere.\n\nEine Präsenz taucht auf, fließend und undeutlich. Ihre Form verändert sich, während sie die Kluft öffnet und schließt, die uns vom Rest des Schleiers trennt. Jedes Aufblitzen entfesselt eine Kaskade von Visionen."
 shroud.3070.desc.eater: "Brennende Welten, deren glühende Asche von den Klagen der Verbrannten davongetragen wird. Jede der Visionen offenbart ein potenzielles Festmahl, das nur darauf wartet, verschlungen zu werden."
 shroud.3070.desc.composer: "Überquellende Landschaften, gesättigt mit Wildtieren, die über grüne Ebenen schwärmen. Lebensfäden verflechten sich und breiten sich aus. Jede der Visionen offenbart das Potenzial, das in der Veränderung und der Umformung liegt."
 shroud.3070.desc.cradle: "Gemeinschaften, die auf Kosten der Ausgrenzung jener, die anderer Meinung sind, eine Einheit bilden. Jede der Visionen offenbart eine neue Utopie, die nur die Gläubigen willkommen heißt."
 shroud.3070.desc.instrument: "Riesige Steinbrüche erstrecken sich vor uns, voll mit lukrativen Ressourcen, die nur darauf warten, von uns abgebaut zu werden. Jeder Blick offenbart einen Schatz an Reichtümern."
 shroud.3070.desc.outro: "Mit jeder neuen Vision überkommt uns die Trägheit. Sie zieht uns in einem unmöglichen Tempo mit sich, während sich die Mauern der Realität biegen und Wellen schlagen.\n\nWir spüren die Belustigung der Gestalt. Sie testet uns und wartet darauf, dass wir der Kraft, die uns erfasst hat, einen Namen geben."
 shroud.3070.a.eater: "Zufriedenheit."
 shroud.3070.a.composer: "Entstehung."
 shroud.3070.a.cradle: "Harmonie."
 shroud.3070.a.instrument: "Potenzial."
 shroud.3070.a.reply.intro: "Unsere Stimme bringt einen Schrei hervor, und die Präsenz verstummt. Die wechselnden Visionen hören auf, als der Sturm der Trägheit zu einer klangvollen Klarheit abflaut.\n\nWir haben ihm einen Namen gegeben."
 shroud.3070.a.reply.default: "ZUFRIEDENHEIT. VON DER EROBERUNG GETRIEBEN."
 shroud.3070.a.reply.eater: "§H$shroud.3070.a.reply.default$§!"
 shroud.3070.a.reply.composer: "§HENTSTEHUNG. DAS LEBEN ENTFALTET SICH UND MUSTER VERFESTIGEN SICH.§!"
 shroud.3070.a.reply.cradle: "§HHARMONIE. UNEINIGKEIT, VERTRIEBEN DURCH GÜTE.§!"
 shroud.3070.a.reply.instrument: "§HPOTENZIAL. DARAUF WARTEND, AUS DER TRÄGHEIT DES KOSMOS GERISSEN ZU WERDEN.§!"
 shroud.3070.a.reply.outro: "Die Gestalt scheint mit unserer Entscheidung zufrieden zu sein und öffnet die Barriere. Die Leere löst sich auf, und wir treten aus ihr hinaus."
 shroud.3070.b.eater: "Verzweiflung."
 shroud.3070.b.composer: "Ausschweifung."
 shroud.3070.b.cradle: "Fassade."
 shroud.3070.b.instrument: "Verschwendung."
 shroud.3070.b.reply.intro: "Unsere Stimme bebt, entrissen von der zornigen Gestalt, die uns durch die Barriere zwängt."
 shroud.3070.b.reply.default: "VERZWEIFLUNG? SCHWÄCHE. HUNGER. EUCH FEHLT DIE ENTSCHLOSSENHEIT!"
 shroud.3070.b.reply.eater: "§H$shroud.3070.b.reply.default$§!"
 shroud.3070.b.reply.composer: "§HAUSSCHWEIFUNG? SUHLT EUCH IN EUREM MITTELMASS!§!"
 shroud.3070.b.reply.cradle: "§HFASSADE? STAGNIERT IN EURER ISOLATION!§!"
 shroud.3070.b.reply.instrument: "§HVERSCHWENDUNG? IHR SEID VOM ELEND BESESSEN!§!"
 shroud.3070.b.reply.outro: "Wir stolpern durch den Schleier und verlassen ihn mit einem Gefühl der Unruhe."
 shroud.3100.title: "Psionischer Konflikt"
 shroud.3100.desc: "Ein disharmonisches Orchester der Zerstörung zieht uns immer tiefer in den Schleier. Der Hall schlägt in einem unerbittlichen Rhythmus gegen unsere Psyche.\n\nDer Lärm nimmt Gestalt an.\n\nWir befinden uns am Rand eines psionischen Konflikts. Die Motive der Beteiligten sind unklar, doch die von ihnen zur Schau gestellte Macht ist beachtlich.\n\nDie psychische Bombardierung überwältigt unsere Wahrnehmung und windet sich durch die zerbrochene Realität vor uns. Es gibt keine Deckung, nur einen herannahenden Sturm."
 shroud.3100.a: "§YHaltet durch und beobachtet weiter.§!"
 shroud.3101.title: "§GUnaufhörliche Resonanz§!"
 shroud.3101.desc.intro: "Wir verharren an Ort und Stelle und riskieren, den Zorn der Beteiligten auf uns zu ziehen, während der Konflikt immer näherrückt."
 shroud.3101.desc: "$shroud.3101.desc.intro$\n\nKonzentriert stimmen wir uns auf die psychische Kaskade ein. Unsere Gedanken befinden sich im Fluss mit ihr. Die Bombardierung ist unerbittlich, doch wir bleiben weiter unberührt und bewegen uns im Einklang mit dem Rhythmus der Zerstörung.\n\nMit jedem Schritt wächst unser Verständnis. Psionische Salven schlüpfen durch Lücken auf unsichtbare Ebenen.\n\nAuch nach unserem Rückzug bleibt das Muster bestehen. Mit ein paar kleineren Anpassungen ließen sich die von uns beobachteten Prinzipien auf unsere eigene Ausrüstung anwenden."
 shroud.3102.title: "§RAbyssales Sperrfeuer§!"
 shroud.3102.desc: "$shroud.3101.desc.intro$ Wir versuchen, uns auf den psychischen Sturm einzustimmen und uns im Einklang mit seinen unvorhersehbaren Rhythmen zu bewegen.\n\nUnsere ersten Schritte sind vielversprechend, doch das Ausmaß der Zerstörung zehrt an uns.\n\nAls der Sturm vorüberzieht, klingen die Echos der Sperrfeuers noch immer in uns nach. Die psionischen Nachwirkungen unseres Scheiterns hallen selbst in dieser Realität durch unser Reich."
 shroud.3102.a.tt: "Zwei zufällige Gebäude in unserem Reich werden zerstört"
 shroud.3105.title: "Psychische Pfade"
 shroud.3105.desc: "Ohne jegliche Vorwarnung drückt etwas aus dem Schleier auf unsere Psyche.\n\nEin Labyrinth aus leuchtenden Pfaden breitet sich vor uns aus. Es erstreckt sich bis weit jenseits unserer Wahrnehmung. Es manifestiert sich kurz in unserer Existenz, ehe es wieder in die Leere entschwindet.\n\nErneut baut sich Druck auf. Wir versuchen, uns zu konzentrieren, und spüren Formen, noch ehe sie sich manifestieren. Das wandelbare Labyrinth wird erneut ausgelöst. Es breitet sich explosionsartig zu einem Netzwerk von Möglichkeiten aus.\n\nJeder Pfad führt uns in Versuchung, ihn zu erkunden, bevor er im Nichts zerfällt."
 shroud.3105.a: "§YBegeben wir uns auf den Spießrutenlauf.§!"
 shroud.3106.title: "§G$tech_psionic_lightning$§!"
 shroud.3106.desc.intro: "Druck baut sich auf, und mit ihm wachsen unsere Erwartungen. Wir bewegen uns mit seinem Crescendo und lenken unser Bewusstsein durch das Labyrinth an psychischer Energie. Gedanken werden zu Impulsen. Sie treiben uns vorwärts"
 shroud.3106.desc: "$shroud.3106.desc.intro$ und gleiten zwischen den Bögen aus psionischer Energie hindurch, ehe unsere Entschlossenheit ins Wanken geraten kann.\n\nWir sind ungebunden und erheben uns über unsere physischen Formen. Das Labyrinth und seine Vielzahl an Pfaden werden zu einer Erweiterung unseres eigenen Bewusstseins und offenbaren das tief in den Mustern des Sturms verborgene Wissen.\n\nSo rasch, wie es begann, endet es auch wieder. Das Nachbild des Labyrinths bricht hinter uns zusammen, während wir mit neuem Verständnis weiterziehen. Mit ein paar kleineren Anpassungen ließen sich diese psionischen Prinzipien auf unsere eigenen Waffensysteme anwenden."
 shroud.3107.title: "§RIn der Leere verloren§!"
 shroud.3107.desc: "$shroud.3106.desc.intro$. Die unzähligen Pfade breiten sich vor uns aus. Sie überwältigen das Bewusstsein mit eine Fülle an unmöglichen Entscheidungen.\n\nIn diesem Augenblick des Zögerns brechen die glühenden Pfade wie Vulkane um uns herum aus. Bogen aus psionischer Energie erfüllen den in sich zusammenbrechenden Nexus. Sie fesseln unsere Gedanken und ziehen uns in das Chaos des Schleiers.\n\nAls sie wieder zu sich kommen, sind unsere [GetTelepathPlural] desorientiert und von einem anhaltenden Trauma des Scheiterns geplagt. Die psionischen Nachwirkungen hallen in ganz [Root.GetName] nach."
 shroud.3110.title: "Psychische Lanze"
 shroud.3110.desc: "Ein enormer Strahl aus psionischer Energie erstreckt sich innerhalb des Schleiers jenseits von uns in die unermessliche Unendlichkeit. Die außergewöhnliche Stabilität steht in starkem Gegensatz zu den normalerweise chaotischen Formationen, denen wir bisher begegneten.\n\nIst es sicher, hier zu bleiben?"
 shroud.3110.a: "§YBleiben wir eine Weile hier.§!"
 shroud.3111.title: "§GPsionische Disruptoren§!"
 shroud.3111.desc: "Trotz seiner blendenden Intensität gelang es uns, unseren Fokus auf den perfekt geformten Strahl psychischer Energie zu richten. Wir erblickten schließlich die wahre Natur der komplexen und jenseitigen Struktur.\n\nIn unserem Bewusstsein bilden sich zahlreiche Anwendungsmöglichkeiten. Diese einzigartige Energieform in der physischen Dimension zu rekonstruieren, wird uns eine unaufhaltsame Waffe geben."
 shroud.3112.title: "§R[GetTelepathPluralCap] überladen§!"
 shroud.3112.desc: "Wir konnten nicht bleiben. Die Nähe zu einer solchen Energieform war einfach zu viel für unsere [GetTelepathPlural].\n\nDer Schaden, den dieses überwältigende Phänomen unserem Bewusstsein zufügte, wird nur langsam wieder heilen."
 recovering_telepaths: "Erholende $DEFAULT_TELEPATH_PLURAL_CAP$"
 recovering_telepaths_desc: "Die übermäßige Belastung im Schleier forderte ihren Tribut von unseren $DEFAULT_TELEPATH_PLURAL$."
 recovering_telepaths_robot: "Erholende $MACHINE_TELEPATH_PLURAL_CAP$"
 recovering_telepaths_robot_desc: "Die übermäßige Belastung im Schleier forderte ihren Tribut von unseren $MACHINE_TELEPATH_PLURAL$."
 recovering_telepaths_hive: "Erholende $HIVE_TELEPATH_PLURAL_CAP$"
 recovering_telepaths_hive_desc: "Die übermäßige Belastung im Schleier forderte ihren Tribut von unseren $HIVE_TELEPATH_PLURAL$."
 MACHINE_SENSE: "wahrnehmen"
 shroud.3120.title: "Ein fernes Echo"
 shroud.3120.desc: "Wir können durch den Schleier das Echo riesiger Mächte [GetFeelLoc]. Ihr Einfluss durchströmt das gesamte psionische Reich.\n\nUnser Handeln allein kann uns näher auf diese Macht einstimmen, doch es gibt auch einen anderen Weg: Indem wir Zro nutzen, lässt sich die Reichweite unserer [GetTelepathPlural] erhöhen, was uns direkt zu einem dieser Wesen führen sollte.\n\nWir müssen nur entscheiden, zu welchem von ihnen wir Kontakt aufnehmen wollen."
 shroud.3120.a: "$utopia.3005.a$"
 shroud.3120.b: "$utopia.3005.b$"
 shroud.3120.c: "$utopia.3005.c$"
 shroud.3120.d: "§CEiner, der um begrabene Hoffnung trauert.§!"
 ORGANIC_SPIRITS: "Geister"
 MACHINE_SPIRITS: "psionische Wesen"
 shroud.3125.title: "$shroud.3120.title$"
 shroud.3125.desc: "Während wir uns dieser Macht zuwenden, können wir [GetFeelSenseLoc], wie sie von uns Besitz ergreift. Wir sind bereits zuvor auf [GetSpiritsLoc] gestoßen, doch hierbei handelt es sich um etwas völlig anderes, etwas weitaus Mächtigeres ... und weitaus Älteres.\n\nDa die von Zro durchtränkte Energie unserer [GetTelepathPlural] erschöpft ist, müssen wir uns vorerst aus dem Schleier zurückziehen. Wir werden später wiederkehren müssen."
 shroud.3125.tt: "Erhält eine beachtliche Menge §HEinstimmung§! auf ein Wesen im §HSchleier§!."
 shroud.3115.title: "Psionische Bombardierung"
 shroud.3115.desc: "Eine Reihe heftiger Erschütterungen durchzieht den Schleier und sendet ein Beben durch unser Bewusstsein.\n\nDie Nachbeben drohen, unsere [GetTelepathPlural] zu überlasten.\n\nWas ist die Ursache für diese psionische Bombardierung?"
 shroud.3115.a: "§YWir müssen es herausfinden.§!"
 shroud.3116.title: "§G$tech_psionic_bombers$§!"
 shroud.3116.desc: "Wir haben unser Bewusstsein vor der fortwährenden Bombardierung abgeschirmt und es so geschafft, die Ursache dahinter zu ergründen.\n\nDie explosiven Erschütterungen werden durch Ströme konzentrierter Energie verursacht, die von unserer eigenen Dimension aus reflektiert werden. Diese unbeständigen Ausstöße besitzen das Potenzial, unvorbereitete Bewusstseine erheblich zu schädigen.\n\nEine Erkenntnis macht sich in uns breit: Diese mächtige Energie könnte die Grundlage für eine neue Waffe aus dem Schleier sein."
 shroud.3117.title: "§RPsionischer Schock§!"
 shroud.3117.desc: "Unsere mentalen Reserven sind aufgebraucht.\n\nDie psychischen Detonationen sind zu überwältigend und verursachten einen psionischen Schock in vielen unserer [GetTelepathPlural].\n\nWir werden einige Zeit brauchen, um uns davon zu erholen."
 psionic_shock_modifier: "Psionischer Schock"
 psionic_shock_modifier_desc: "Die überwältigenden Kräfte des Schleiers verursachten einen psionischen Schock bei unseren $DEFAULT_TELEPATH_PLURAL$."
 psionic_shock_hive_modifier: "$psionic_shock_modifier$"
 psionic_shock_hive_modifier_desc: "Die überwältigenden Kräfte des Schleiers verursachten einen psionischen Schock bei unseren $HIVE_TELEPATH_PLURAL$."
 psionic_shock_robot_modifier: "$psionic_shock_modifier$"
 psionic_shock_robot_modifier_desc: "Die überwältigenden Kräfte des Schleiers verursachten einen psionischen Schock bei unseren $MACHINE_TELEPATH_PLURAL$."
 shroud.3200.title: "Animatus"
 shroud.3200.desc: "Während unsere Bewusstseine immer weiter in den Tiefen des Schleiers versinken, finden wir uns in der vertrauten Präsenz des §HLehmanimators§! wieder.\n\nUhrwerkartige Rhythmen sind zu hören, unausgesprochene Stimmen erheben sich zu einem Chor und die Geister in unserer Flotte regen sich. Sie bieten an, unsere physischen Formen weiterzutragen, damit unser Bewusstsein entlastet wird und wir uns auf wichtigere Belange konzentrieren können.\n\nObwohl sie nicht lebendig sind, kennen wir sie. Ihre Formen wurden nach einem Muster geschaffen, und sie stecken voller Geschichte und dienen einem Zweck. Sie kommen zusammen und strecken erwartungsvoll die Hände aus.\n\nWir sind nicht mehr nur einfache Bediener dieser Schiffe: Wir sind Partner, verbunden in unserer Entschlossenheit und getragen von einem gemeinsamen Willen."
 shroud.3200.a: "Wir sind wie Blätter im Wind."
 shroud.3200.a.tt: "§Y$unlock_edict_tt$§!$edict_animatus$"
 shroud.3210.title: "Wille der Mäßigung"
 shroud.3210.desc.intro: "Die klagende Essenz des §HAußenseiters§! sickert in unsere Bewusstseine.\n\nWährend sein trauriges Echo in uns nachhallt, verschmelzen Wirbel aus psionischer Energie zu einer sich ständig verändernden Form. Je länger wir hinschauen, desto weniger können wir sie erkennen. Eine Stimme spricht.\n\n§HManche Dinge kann man nicht verstehen. Diese Dinge werden einem durch Schmerz und Reue beigebracht.\n\nIch war der Erste meiner Art, der an diesen Ort kam, doch wir alle mussten den Preis dafür zahlen. Wir ließen zu, dass uns der Schleier vernichtet. Lasst nicht zu, dass Euch das gleiche Schicksal ereilt!§!\n\n"
 shroud.3210.desc.know_zroni: "$shroud.3210.desc.intro$Wir erkannten, dass es sich bei der Stimme um die eines Zroni handelte. Wie er hierherkam, ist unklar, doch vielleicht wäre es ratsam, seiner Warnung über die zerstörerischen Kräfte des Schleiers Glauben zu schenken."
 shroud.3210.desc.left_zroni: "$shroud.3210.desc.intro$Wir erkennen ihn. Wir sind auf diesen Zroni, die \"Weitseherin\", bereits in der Vergangenheit gestoßen. Wie sie hierherkam, ist unklar, doch es wäre ratsam, ihrer Warnung über die zerstörerischen Kräfte des Schleiers Glauben zu schenken."
 shroud.3210.desc.default: "$shroud.3210.desc.intro$Dieses Wesen ist uns ein völliges Mysterium. Wir verstehen wenig, was diese unheilvolle Warnung zu bedeuten hat."
 shroud.3210.a: "Wir müssen vorsichtig fortfahren."
 shroud.3210.a.tt: "§Y$unlock_edict_tt$§!$edict_will_of_temperance$"
 shroud.3220.title: "Gedankenspiel"
 shroud.3220.desc: "Überall um uns herum pulsiert der Schleier im beruhigenden Rhythmus des §HGoldenen Traums§!.\n\nWir können beobachten, wie sich vereinzelte Ströme aus psionischer Energie langsam zu einem komplexen Gitter anordnen. Unerkennbare Zeichen beginnen, sich in sorgfältig angelegten Mustern zu manifestieren.\n\nSie fangen an, sich übereinander und umeinander herum zu bewegen, und bilden dabei immer komplexere neue Formen. Mit der Zeit erkennen wir ein Muster, eine Logik, die ihre Bewegungen bestimmt.\n\nUns wird bewusst, dass wir Teil des Spieles sind. Jede Bewegung, die der Traum uns zeigt, schenkt uns ein neues Gefühl des beruhigenden Genusses."
 shroud.3220.a: "Während wir spielen, entfliehen wir an einen bedeutungsvollen Ort."
 shroud.3220.a.tt: "§Y$unlock_edict_tt$§!$edict_will_of_distraction$"
 shroud.3230.title: "Sande der Zeit"
 shroud.3230.desc: "Fragmentierte Gedanken ziehen an uns vorbei. Wir erkennen die raue Präsenz der §HEwigen Gezeiten§!.\n\nSie sind wie Ebbe und Flut und erodieren alles vor sich mit einer immerwährenden Unausweichlichkeit, ehe sie etwas Neues schaffen.\n\nWährend sie an uns vorbeiziehen spüren wir echte Verjüngung."
 shroud.3230.a: "Hier sind wir zeitlos."
 shroud.3230.a.tt: "§Y$unlock_edict_tt$§!$edict_will_of_endless$"
 shroud.3240.title: "Neu geformt"
 shroud.3240.desc: "Ein schwindelerregender Gipfel überschattet unsere Gedanken. Es ist der §HBleiche Berg§!. Visionen überwältigen unsere Sinne und überlasten unsere Bewusstseine.\n\nWir sehen die verschwommenen Umrisse eines beschädigten Schiffes vor uns, das in der Leere treibt.\n\nDer Druck, der auf unserem Bewusstsein lastet, verschiebt sich, und das Gefäß beginnt, sich zu verwandeln. Risse schließen sich, Korrosion verschwindet und Metall richtet sich auf. Langsam wird das Erbe seiner Zerstörung rückgängig gemacht.\n\nAls das Schiff vollständig repariert ist, endet die Vision abrupt. Alles, was bleibt, ist ein tiefes Gefühl der Erneuerung."
 shroud.3240.a: "Eine großartige Wiedergeburt unserer Bewusstseine."
 shroud.3240.a.tt: "§Y$unlock_edict_tt$§!$edict_will_of_rebirth$"
 shroud.3250.title: "Die Kraft der Enthaltung"
 shroud.3250.desc: "Die Gelassenheit des §HBedeutungslosen Punkts§! erfüllt unsere Bewusstseine mit seiner Stille. Eine Vision breitet sich träge in uns aus.\n\nWir beobachten, wie sich Jahrtausende voller Konflikte in einem Augenblick auflösen – Zivilisationen zerfallen, Geschichten werden ausgelöscht, Statuen längst verstorbener Tyrannen von der Zeit begraben.\n\nDie Weisheit des Bedeutungslosen Punkts liegt in der stillen Kraft der Enthaltung. Konflikte kommen und gehen, und doch bleiben wir bestehen. Diese Distanzierung, befreit vom zersetzenden Gift sterblichen Grolls, verlängert die Lebenserwartung unserer Anführer."
 shroud.3250.a: "Wir leben noch immer."
 shroud.3250.a.tt: "Alle psionischen Anführer erhalten die Eigenschaft \"§Y$leader_trait_shroud_age$§!\". Dies erhöht die Lebensdauer (Anführer) um §G+40§! Jahre."
 shroud.3260.title: "Chaos zu Ordnung"
 shroud.3260.desc: "Die brodelnde Unruhe des Schleiers pulsiert offen vor uns. Eine unfügsame Präsenz nähert sich: Es ist der §HLeere Thron§!.\n\nEr kommt immer näher, und die verflochtenen Stränge aus roher psionischer Energie werden urplötzlich gebändigt. Der Sumpf wird immer klarer und verständlicher. Farben erstrahlen, und Symmetrie, Logik und Struktur werden auferlegt.\n\nIm tiefsten Inneren unserer Bewusstseine formt sich etwas: ein weitreichendes Verlangen nach Ordnung."
 shroud.3260.a: "Wir müssen das Chaos beseitigen und die Ordnung begrüßen."
 shroud.3260.a.tt: "§Y$unlock_edict_tt$§!$edict_will_of_order$"
 shroud.3270.title: "Unendliche Beschleunigung"
 shroud.3270.desc: "Eine unmögliche mentale Beschleunigung überwältigt unsere Sinne. Wir nehmen die Anwesenheit des §HSchwarzen Flusses§! wahr.\n\nWir rasen mit unfassbarer Geschwindigkeit auf ein Ende zu, das wir nicht vollständig begreifen. Es ist die Grenze zwischen allem und nichts; die Trennung zwischen dem, was immer gewesen ist, und dem, was niemals sein wird; die Grenze, in der physikalische Gesetze keine Rolle spielen.\n\nAls wir endlich wieder zu uns selbst zurückkehren, ist alles, was bleibt, eine Vorstellung davon, was es bedeutet, sich wirklich zu bewegen."
 shroud.3270.a: "Haben wir den Rand des Universums gesehen?"
 shroud.3270.a.tt: "§Y$unlock_edict_tt$§!$edict_will_of_motion$"
 #==========================
 # Forge our own Path
 #==========================
 shroud.3500.title: "Wir beschreiten unseren eigenen Weg"
 shroud.3500.desc: "Unsere psionischen [GetResearchers] entwickelten eine Methode, um dem §HSchleier§! Energie zu entziehen.\n\nDie größten Mächte im psionischen Reich werden von den Schleierwesen gut gehütet und erfordern einen Pakt. Damit wir einen solchen Preis nicht zahlen müssen, beschreiten wir unseren eigenen Weg.\n\nIndem wir unseren Willen in den Schleier projizieren, können wir kleinere Mengen an Energie aus jedem der Schleierreiche absaugen. Dies erfordert immense Konzentration, doch unser Bewusstsein wurde so weit gestärkt, dass es dieses empfindliche Gleichgewicht aufrechterhalten kann."
 shroud.3500.a: "Innerhalb des Schleiers gehört unser Wille nur uns."
 shroud.3510.title: "$utopia.2681.name$"
 shroud.3510.desc: "Unsere [GetTelepathPlural] entdeckten in einer Falte des §HSchleiers§! eine noch nicht angezapfte Macht.\n\nKonvergente Kräfte können sich im psionischen Raum allmählich ansammeln – mächtige Energiekonzentrationen, die eines Tages zu größeren Schleierwesen heranreifen könnten. Wir sind auf eine solche Ansammlung gestoßen und bereit, sie für unsere Zwecke zu nutzen.\n\nAllein durch die Kraft seines psionischen Willens kann einer von uns diese außergewöhnliche Macht absorbieren. Eine Reihe von Kandidaten wurde ausgewählt."
 shroud.3510.a: "§H[leader_1.GetTitle]§! [leader_1.GetName]."
 shroud.3510.b: "§H[leader_2.GetTitle]§! [leader_2.GetName]."
 shroud.3510.c: "§H[leader_3.GetTitle]§! [leader_3.GetName]."
 shroud.3510.d: "§H[leader_4.GetTitle]§! [leader_4.GetName]."
 psionic_mastery: "Psionische Exzellenz"
 psionic_mastery_desc: "Wir beherrschen unsere psionischen Kräfte vollständig, und unsere Psyche kann sich ungehindert durch den Schleier bewegen."
 shroud.3520.title: "$psionic_mastery$"
 shroud.3520.desc: "Indem wir unseren Willen in den §HSchleier§! projizierten, lernten wir, unsere psionischen Fähigkeiten bis zu einem gewissen Maß zu kontrollieren. Wir sammelten Energie aus den Domänen zahlreicher Schleierwesen, ohne dabei unter ihren Einfluss zu geraten. Darüber hinaus können unsere [GetTelepathPlural] ihre psionische Trance nun vollständig kontrollieren.\n\nWo andere den Schleier über ihr Schicksal bestimmen hätten lassen, bewahrten wir die Unabhängigkeit unseres eigenen Willens.\n\nDas psionische Potenzial von §H[this.GetName]§! ist grenzenlos."
 shroud.3520.a: "Das ist erst der Anfang."
 #==========================
 # Patrons First Contact
 #==========================
 shroud.first_contact.title: "$utopia.3300.name$"
 shroud.first_contact.prompt: "$utopia.2657.a$"
 shroud.first_contact.1.desc.default: "Der Schleier. Er fließt über- und unterhalb der uns bekannten Realität. Er ist ein Schatten, den die Dunkelheit wirft. Jeder, der über psionische Kräften verfügt, sah diesen Ort schon in seinen Träumen, auch wenn er sich dessen zu jenem Zeitpunkt wahrscheinlich nicht bewusst war.\n\nWir verbrachten Jahre damit, den Schleier zu durchdringen, und durch unseren kombinierten Willen wird die Barriere dünner und dünner. Auf der anderen Seite blieben unsere Bemühungen jedoch nicht unbemerkt. Etwas beobachtet uns.\n\nDie Präsenz aus dem Schleier strahlt eine phänomenale Macht aus und sondert [GetPatronInsert] ab. Sie nimmt uns kaum wahr. Sie beobachtet uns wie ein Kondenswassertropfen an einem Bullauge.\n\nWenn wir doch nur ihr eigenes undurchschaubares Bewusstsein erreichen könnten."
 shroud.first_contact.1.desc.hive: "Der Schleier. Er fließt über- und unterhalb der uns bekannten Realität. Er ist wie eine Vision in einer ruhenden Drohne. Obgleich es seltsam ist, fühlt es sich auch ... unerklärlich vertraut an.\n\nWir verbrachten Jahre damit, den Schleier zu durchdringen, und durch unseren kombinierten Willen wird die Barriere dünner und dünner. Auf der anderen Seite blieben unsere Bemühungen jedoch nicht unbemerkt. Etwas beobachtet uns.\n\nDie Präsenz aus dem Schleier strahlt eine phänomenale Macht aus und sondert [GetPatronInsert] ab. Sie nimmt uns kaum wahr. Sie beobachtet uns so, wie wir eine Drohne in der Masse beobachten.\n\nWenn wir nur ihr eigenes undurchschaubares Bewusstsein erreichen könnten."
 shroud.first_contact.1.desc.robot: "Der Schleier. Er liegt außerhalb aller uns bisher bekannten räumlichen und zeitlichen Parameter. Er lässt sich nur mit den anomalen Daten vergleichen, die unsere Ruhezyklen stören.\n\nWir verbrachten Jahre damit, seine Barriere zu hacken, und dank der Leistung unserer kombinierten Prozessoren, wird diese Barriere dünner und dünner. Auf der anderen Seite blieben unsere Bemühungen jedoch nicht unbemerkt. Etwas beobachtet uns.\n\nDie Präsenz aus dem Schleier strahlt eine phänomenale Macht aus und sondert [GetPatronInsert] ab. Sie nimmt uns kaum wahr. Sie beobachtet uns so, wie wir ein einzelnes Byte in einem Datenstrom beobachten.\n\nWenn wir nur doch nur ihr eigenes undurchschaubares Bewusstsein erreichen könnten."
 shroud.first_contact.2.desc.all: "Wir fühlen die Präsenz großer Wesen im Schleier, doch schaffen es nicht, sie näher auszumachen. Im Gegensatz zum sich ständig ausdehnenden Raum lassen sich ihre Bewegungen nicht verfolgen. Ihre Zielorte führen zurück zu ihren Ursprüngen - ganz so, als hätten die Energien sich selbst hervorgebracht.\n\nUngeachtet dessen sprechen sie zu uns als Singularitäten von Gedanken und Willen."
 shroud.first_contact.2.desc.default: "Inmitten der unzähligen Stimmen hören wir eine klarer als den Rest. Sie umgibt unsere Psyche und sondert [GetPatronInsert] ab.\n\nWenn wir uns nur genug anstrengen, gelingt es uns vielleicht, Kontakt aufzunehmen."
 shroud.first_contact.2.desc.robot: "Inmitten der unzähligen Stimmen nehmen wir eine klarer wahr als den Rest. Sie dominiert unsere Berechnungen und sondert [GetPatronInsert] ab.\n\nWenn wir uns nur genug anstrengen, gelingt es uns vielleicht, Kontakt aufzunehmen."
 shroud.first_contact.3.desc.default: "Wir gleiten durch das Dazwischen: ein Nichts, das den Schleier von der greifbaren Realität des normalen Raums trennt.\n\nAls wir eintreten, spüren wir sofort eine Präsenz. Sie durchdringt unser Bewusstsein und sondert [GetPatronInsert] ab. Es ist ein Wesen von unvorstellbarer Macht, das über die Zukunft wacht.\n\nWir dürfen uns nicht abwenden."
 shroud.first_contact.3.desc.robot: "Wir gleiten durch das Dazwischen: ein Nichts, das den Schleier von den Phänomenen des normalen Raums trennt.\n\nAls wir eintreten, registrieren wir sofort eine Präsenz. Sie durchdringt unser Bewusstsein und sondert [GetPatronInsert] ab. Es ist ein Wesen von phänomenaler Macht, das über die Zukunft wacht.\n\nWir dürfen uns nicht abwenden."
 shroud.first_contact.4.desc.default: "Die Energien des Schleiers pulsieren. Seine Macht ist allgegenwärtig, und doch ist sie nirgendwo zu sehen. Das \"Eintreten\" in ihn bedeutet, Muster aus vagen Empfindungen zu erkennen und die größeren Schleierwesen durch reine Konzentration wahrzunehmen.\n\nWir spüren das Signal einer solchen Macht in den unergründlichen Tiefen über uns. Sie sondert [GetPatronInsert] ab.\n\nKönnen wir den Atem lang genug anhalten, um sie zu erreichen?"
 shroud.first_contact.4.desc.robot: "Die Energien des Schleiers pulsieren. Seine Macht ist allgegenwärtig, und doch ist sie nirgendwo zu sehen. Das \"Eintreten\" in ihn bedeutet, Muster aus vagen Empfindungen zu erkennen und die größeren Schleierwesen durch konzentrierte Berechnungen wahrzunehmen.\n\nWir empfangen das Signal einer solchen Macht in den unergründlichen Tiefen über uns. Sie sondert [GetPatronInsert] ab.\n\nWerden unsere Schaltkreise überlasten, bevor wir sie erreichen?"
 shroud.first_contact.end.b: "Wir müssen vieles beachten."
 shroud.first_contact_insert.eater.default: "ein §Hhungriges Knurren§!"
 shroud.first_contact_insert.eater.machine: "ein §Hunersättliches Knurren§!"
 shroud.4005.title: "Die Weltenfresserin taucht auf"
 shroud.4005.desc.default: "Als wir tiefer in den §HSchleier§! vordrangen, kamen wir in Reichweite eines Wesens, das wir vorerst \"§H[Root.Patron:the_eater_of_worlds.GetPreCommunicationName]§!\" genannt haben. Das Wesen knurrte mit einer hohlen Gefräßigkeit, stets hungrig und niemals satt. Unser Erstkontaktsignal wurde mit Feuer und Zerstörung beantwortet. Die scheinbare Gleichgültigkeit gegenüber unserem Verständnis war erdrückend.\n\nSchließlich wurde das Wesen ungeduldig. Ein wildes Brüllen erklang in den Bewusstseinen unserer [GetTelepathPlural]. Tief in unserem Inneren erschienen Bilder von Trümmerhaufen und [GetEaterEmergesExtra]. Es offenbarte uns unser kriegerisches Schicksal in erschreckender Pracht.\n\nSo plötzlich, wie es begonnen hatte, verstummte das Geräusch wieder. Alles, was zurückblieb, ist ein schmerzlicher Hunger.\n\nWir haben nun Klarheit über den Willen des Wesens."
 shroud.4005.desc.hive: "$shroud.4005.desc.default$"
 shroud.4005.desc.gestalt_machine: "Als wir tiefer in den §HSchleier§! vordrangen, kamen wir in Reichweite eines Wesens, das wir vorerst \"§H[Root.Patron:the_eater_of_worlds.GetPreCommunicationName]§!\" genannt haben. Das Wesen knurrte mit einer hohlen Gefräßigkeit, stets hungrig und niemals satt. Unser Erstkontaktsignal wurde mit Feuer und Zerstörung beantwortet. Die scheinbare Gleichgültigkeit gegenüber unserem Verständnis war überwältigend.\n\nSchließlich wurde das Wesen ungeduldig. Ein wildes Brüllen erklang in den Bewusstseinen unserer [GetTelepathPlural]. Tief in unserem Inneren erschienen Bilder von Trümmerhaufen und [GetEaterEmergesExtra]. Es offenbarte uns unser kriegerisches Schicksal in erschreckender Pracht.\n\nSo plötzlich, wie es begonnen hatte, verstummte das Geräusch wieder. Zum ersten Mal sind wir uns einer Schwäche ins uns bewusst, die zuvor nur bei biologischen Spezies dokumentiert wurde: Hunger.\n\nWir haben nun Klarheit über den Willen des Wesens."
 shroud.4005.desc.individual_machine: "$shroud.4005.desc.gestalt_machine$"
 shroud.4005.desc_extra_pacifist: "Zerstörung. Uns wurde eine Vision sinnloser Aggression offenbart."
 shroud.4005.desc_extra_robot: "Zerstörung. Uns wurde ein Modell der kriegerischen Perfektion offenbart."
 shroud.4005.desc_extra_organic: "Leichen. Uns wurde unser kriegerisches Schicksal in erschreckender Pracht offenbart."
 shroud.4005.desc_outro_pacifist: "Es schürt Gewalt und Zwietracht und steht im Widerspruch zu vielen unserer Prinzipien. Wir sollten uns nicht weiter auf dieses Wesen, die $the_eater_of_worlds_color_article$, einstimmen."
 shroud.4005.desc_outro_robot: "Wir kennen diese Vision von Gewalt und Ruhm. Sobald sich unsere [GetTelepathPlural] wieder aufgeladen haben, können wir dieses Schleierwesen, die $the_eater_of_worlds_color_article$, kontaktieren."
 shroud.4005.desc_outro_organic: "Wir kennen seine Vision von Gewalt und Ruhm. Sobald sich unsere [GetTelepathPlural] erholt haben, können wir dieses Schleierwesen, die $the_eater_of_worlds_color_article$, kontaktieren."
 shroud.4005.a.default: "[GetEaterEmergesOptionA]"
 shroud.4005.a.robot: "[GetEaterEmergesOptionA]"
 shroud.4005.a.pacifist: "Wir können selbst von einer so erschreckenden Macht etwas lernen."
 shroud.4005.a.non_pacifist: "Was für eine rohe Kraft."
 shroud.4005.b.default: "$shroud.first_contact.end.b$"
 shroud.4005.b.robot: "$shroud.first_contact.end.b$"
 shroud.4005.c.default: "Das Grauen ...!"
 shroud.4005.c.robot: "Bedrohungsausweichprotokoll eingeleitet."
 shroud.first_contact.end.a.tt.the_eater_of_worlds: "Erhält §YEinstimmung§! auf die $the_eater_of_worlds_color_article$.\n$shroud.first_contact.end.b.tt.the_eater_of_worlds$"
 shroud.first_contact.end.b.tt.the_eater_of_worlds: "Deckt die $the_eater_of_worlds_color_article$ im §YSchleier§! auf."
 shroud.first_contact.end.c.tt.the_eater_of_worlds: "Verliert eine erhebliche Menge §YEinstimmung§! auf die $the_eater_of_worlds_color_article$.\n$shroud.first_contact.end.b.tt.the_eater_of_worlds$"
 shroud.first_contact_insert.cradle.default: "eine §Hverlockende Wärme§!"
 shroud.first_contact_insert.cradle.machine: "eine §Hübermäßige Hitze§!"
 shroud.4015.title: "Die Wiege der Seelen taucht auf"
 shroud.4015.desc.default: "Die Macht des Schleierwesens, das wir \"§H[Root.Patron:the_cradle_of_souls.GetPreCommunicationName]§!\" nennen, ist im gesamten §HSchleier§! spürbar, doch die Quelle dieser Macht entzog sich uns weiterhin. Wir streiften durch das psionische Reich, änderten ständig unseren Kurs und hinterfragten unser Urteilsvermögen.\n\n$shroud.4015.desc.default.end$"
 shroud.4015.desc.hive: "Die Macht des Schleierwesens, das wir \"§H[Root.Patron:the_cradle_of_souls.GetPreCommunicationName]§!\" nennen, ist im gesamten §HSchleier§! spürbar, doch die Quelle dieser Macht entzog sich uns weiterhin. Wir streiften durch das psionische Reich, änderten ständig unseren Kurs und hinterfragten unsere Berechnungen.\n\n$shroud.4015.desc.default.end$"
 shroud.4015.desc.default.end: "Als wir innehielten, um über unser weiteres Vorgehen nachzudenken, tauchte das Wesen direkt vor uns auf. Wir hörten nichts und wir sahen nichts, doch wir spürten es wärmer als je zuvor.\n\nWir fühlten die Kraft im Kern des Ganzen, einen Knotenpunkt von Energien aus dem gesamten Schleier und darüber hinaus - Gedanken, die zusammenflossen und Hitze ausstrahlten. Nach unserer Reise überkommt uns jetzt ein schweres Gefühl der Ruhe.\n\nDie Wünsche des Schleierwesens sind uns nun klarer. [GetCradleEmergesEnding]"
 shroud.4015.desc.gestalt_machine: "Die Macht des Schleierwesens, das wir \"§H[Root.Patron:the_cradle_of_souls.GetPreCommunicationName]§!\" nennen, ist im gesamten §HSchleier§! spürbar, doch die Quelle dieser Macht entzog sich uns weiterhin. Wir streiften durch das psionische Reich, änderten ständig unseren Kurs und hinterfragten unsere Berechnungen.\n\nAls wir innehielten, um unsere Prozesse zu überprüfen, tauchte das Wesen direkt vor uns auf. Wir empfingen keine Botschaft, und doch wurde ein tiefer Teil unseres Codes aktiviert.\n\nWir konnten die Kraft im Kern des Ganzen messen, einen Knotenpunkt von Energien aus dem gesamten Schleier und darüber hinaus - Gedanken, die zusammenflossen und Hitze ausstrahlten. Nach unserer Reise sind wir jetzt mit einer allumfassenden Ruhe aufgeladen.\n\nDie Wünsche des Schleierwesens sind uns nun klarer."
 shroud.4015.desc.individual_machine: "$shroud.4015.desc.gestalt_machine$"
 shroud.4015.desc_outro_homicidal: "Unsere Bewusstseine sträuben sich gegen die falschen Prämissen von Ordnung und Harmonie. Wir sollten uns nicht weiter auf die $the_cradle_of_souls_color_article$ einstimmen, die unsere Entschlossenheit zu schwächen versucht."
 shroud.4015.desc_outro_robot: "Wir kennen diese Vision von Ordnung und Harmonie. Sobald sich unsere [GetTelepathPlural] wieder aufgeladen haben, können wir dieses Schleierwesen, die $the_cradle_of_souls_color_article$, kontaktieren."
 shroud.4015.desc_outro_organic: "Wir kennen diese Vision von Ordnung und Harmonie. Sobald sich unsere [GetTelepathPlural] erholt haben, können wir dieses Schleierwesen, die $the_cradle_of_souls_color_article$, kontaktieren."
 shroud_is_homicidal: "§RUnsere gewaltsame und räuberische Natur verbietet dies.§!"
 shroud.4015.a.default: "Mögen wir uns immer näher kommen."
 shroud.4015.a.robot: "$shroud.4015.a.default$"
 shroud.4015.b.default: "$shroud.first_contact.end.b$"
 shroud.4015.b.robot: "$shroud.first_contact.end.b$"
 shroud.4015.c.default: "Nein. Nicht das."
 shroud.4015.c.robot: "Ganz klar ein kategorisches Nein."
 shroud.first_contact.end.a.tt.the_cradle_of_souls: "Erhält §YEinstimmung§! auf die $the_cradle_of_souls_color_article$.\n$shroud.first_contact.end.b.tt.the_cradle_of_souls$"
 shroud.first_contact.end.b.tt.the_cradle_of_souls: "Deckt die $the_cradle_of_souls_color_article$ im §YSchleier§! auf."
 shroud.first_contact.end.c.tt.the_cradle_of_souls: "Verliert eine erhebliche Menge §YEinstimmung§! auf die $the_cradle_of_souls_color_article$.\n$shroud.first_contact.end.b.tt.the_cradle_of_souls$"
 shroud.first_contact_insert.composer: "einen §Hresonierenden Akkord§!"
 shroud.4025.title: "Die Komponistin der Stränge taucht auf"
 shroud.4025.desc.default: "Wir folgten dem Geruch des Wesens, das wir vorerst \"§H[Root.Patron:the_composer_of_strands.GetPreCommunicationName]§! genannt haben, tiefer in den §HSchleier§!. Es hinterließ Spuren für uns, denen wir folgen konnten - Bilder, Melodien. Es versuchte, uns anzulocken, doch wir erzielten nur allzu langsam Fortschritte.\n\nAls wir es schließlich schafften, das Wesen zu erreichen, wurden wir von einer Vielzahl von Visionen begrüßt: Sternensysteme voller Aktivität, erstaunliche Abänderungen der [Root.GetSpeciesAdj]en Form. Wir verloren uns in dem schier endlosen Gewirr verzerrter Entwürfe.\n\nWir griffen nach Fäden und verbanden ihre Enden miteinander. Die unterschiedlichen Zeichen fügten sich zu Mustern zusammen. Als unsere Energie erschöpft war, sonnten wir uns in der Erhabenheit der Formen und Figuren. Die Präsenz zog sich in die Stille zurück.\n\nDie Absichten des Wesens sind uns jetzt klarer denn je. Wir sahen eine Vision von unbegrenztem Wachstum. Sobald sich unsere [GetTelepathPlural] erholt haben, können wir dieses Schleierwesen, die $the_composer_of_strands_color_article$, kontaktieren."
 shroud.4025.desc.hive: "$shroud.4025.desc.default$"
 shroud.4025.desc.gestalt_machine: "Wir folgten den molekularen Spuren des Wesens, das wir vorerst \"§H[Root.Patron:the_composer_of_strands.GetPreCommunicationName]§!\" genannt haben, tiefer in den §HSchleier§!. Es hinterließ Zeichen für uns, denen wir folgen konnten - Bilder, Melodien. Es versuchte, uns anzulocken, doch wir erzielten nur allzu langsam Fortschritte.\n\nAls wir es schließlich schafften, das Wesen zu erreichen, wurden wir von einer Vielzahl von Visionen begrüßt: Sternensysteme voller Aktivität, erstaunliche Verzerrungen der [Root.GetSpeciesAdj]en Form. Wir verloren uns in dem schier endlosen Gewirr nicht zueinander passender Entwürfe.\n\nWir griffen nach Fäden und verbanden ihre Enden miteinander. Die unterschiedlichen Zeichen fügten sich zu Mustern zusammen. Als unsere Energie erschöpft war, begannen wir, den bemerkenswerten Datensatz zu verarbeiten. Die Präsenz zog sich in die Stille zurück.\n\nDie Absichten des Wesens sind uns jetzt klarer denn je. Wir sahen eine Vision von unbegrenztem Wachstum. Sobald sich unsere [GetTelepathPlural] wieder aufgeladen haben, können wir dieses Schleierwesen, die $the_composer_of_strands_color_article$, kontaktieren."
 shroud.4025.desc.individual_machine: "$shroud.4025.desc.gestalt_machine$"
 shroud.4025.a.default: "Seine Kraft ist überwältigend."
 shroud.4025.a.robot: "Seine Kraft ist unermesslich."
 shroud.4025.b.default: "$shroud.first_contact.end.b$"
 shroud.4025.b.robot: "$shroud.first_contact.end.b$"
 shroud.4025.c.default: "Welch erbärmliches Spektakel!"
 shroud.4025.c.robot: "Das wird nicht gut enden ..."
 shroud.first_contact.end.a.tt.the_composer_of_strands: "Erhält §YEinstimmung§! auf die $the_composer_of_strands_color_article$.\n$shroud.first_contact.end.b.tt.the_composer_of_strands$"
 shroud.first_contact.end.b.tt.the_composer_of_strands: "Deckt die $the_composer_of_strands_color_article$ im §YSchleier§! auf."
 shroud.first_contact.end.c.tt.the_composer_of_strands: "Verliert eine erhebliche Menge §YEinstimmung§! auf die$the_composer_of_strands_color_article$.\n$shroud.first_contact.end.b.tt.the_composer_of_strands$"
 shroud.first_contact_insert.instrument: "einen §Hwilden Impuls§!"
 shroud.4035.title: "Das Instrument der Sehnsüchte taucht auf"
 shroud.4035.desc.all.start: "Nach Monaten vergeblicher Versuche tauchte das Wesen, dem wir dem Namen \"§H[Root.Patron:the_instrument_of_desire.GetPreCommunicationName]§!\" gaben, endlich aus den Tiefen des §HSchleiers§! auf."
 shroud.4035.desc.default: "$shroud.4035.desc.all.start$\n\nDie Botschaft kam wie eine Flut. Gedanken drangen mit Gewalt in unser Bewusstsein ein und sprachen unsere verborgensten Wünsche an. Worte strömten durch uns hindurch und verdrängten alles andere. Die Botschaft war verführerisch: eine Vision von Macht und Genuss.\n\n$shroud.4035.desc.default.end$"
 shroud.4035.desc.default.end: "Die Flut ebbte ab. Die Präsenz erwartete keine Antwort - noch nicht. Sie hinterließ uns mit einem Durst, der nicht zu stillen war.\n\nDie Bedürfnisse des Wesens sind uns jetzt klarer. Wir kennen seine Vision von unbegrenztem Wohlstand. Sobald sich unsere [GetTelepathPlural] erholt haben, können wir dieses Schleierwesen, das $the_instrument_of_desire_color_article$, kontaktieren."
 shroud.4035.desc.hive: "$shroud.4035.desc.all.start$\n\nDie Botschaft kam wie eine Flut. Gedanken drangen mit Gewalt in unser Bewusstsein ein und sprachen unsere verborgensten Wünsche an. Worte strömten durch uns hindurch und verdrängten alles andere. Die Botschaft war energetisierend: eine Vision von unermesslicher Leistung.\n\n$shroud.4035.desc.default.end$"
 shroud.4035.desc.gestalt_machine: "$shroud.4035.desc.all.start$\n\nDie Botschaft kam wie eine Flut. Daten drangen mit Gewalt in unsere Schaltkreise ein und überfluteten uns mit Eingaben, die alles Bisherige übertrafen. Ein exotischer Code strömte durch uns hindurch und verdrängte alles andere. Die Botschaft war energetisierend: eine Vision von unermesslicher Leistung.\n\n$shroud.4035.desc.machine.end$"
 shroud.4035.desc.machine.end: "Die Flut ebbte ab. Die Präsenz erwartete keine Antwort - noch nicht. Sie hinterließ eine fragmentierte Leere in uns, die nach eleganten Eingaben verlangte.\n\nDie Bedürfnisse des Wesens sind uns jetzt klarer. Wir kennen seine Vision von unbegrenztem Wohlstand. Sobald sich unsere [GetTelepathPlural] wieder aufgeladen haben, können wir dieses Schleierwesen, das $the_instrument_of_desire_color_article$, kontaktieren."
 shroud.4035.desc.individual_machine: "$shroud.4035.desc.all.start$\n\nDie Botschaft kam wie eine Flut. Gedanken drangen mit Gewalt in unser Bewusstsein ein und sprachen unsere verborgensten Wünsche an. Worte strömten durch uns hindurch und verdrängten alles andere. Die Botschaft war energetisierend: eine Vision von unermesslicher Leistung.\n\n$shroud.4035.desc.machine.end$"
 shroud.4035.a.default: "Es ist großartig."
 shroud.4035.a.robot: "Es ist bemerkenswert."
 shroud.4035.b.default: "$shroud.first_contact.end.b$"
 shroud.4035.b.robot: "$shroud.first_contact.end.b$"
 shroud.4035.c.default: "Leere Worte."
 shroud.4035.c.robot: "$shroud.4035.c.default$"
 shroud.first_contact.end.a.tt.the_instrument_of_desire: "Erhält §YEinstimmung§! auf das $the_instrument_of_desire_color_article$.\n$shroud.first_contact.end.b.tt.the_instrument_of_desire$"
