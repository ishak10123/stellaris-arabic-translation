 # Superstitious Beliefs
 civic_tooltip_not_superstitious_beliefs: "Hat NICHT das Staatselement \"['concept_superstitious_beliefs_civics']\""
 civic_superstitious_beliefs_desc_common: "Vor jeder wichtigen Entscheidung muss eine Zeremonie stattfinden, um die unsichtbaren Kräfte, die über unser Schicksal bestimmen, in Einklang zu bringen."
 civic_superstitious_beliefs_common_effects: "Aktiviert die ['edict:galactic_dowsing',$edict_galactic_dowsing$]\nAlle 13 Jahre ändert sich der ['concept_sb_cycle'].\nSchicksalsereignisse werden Eurem Reich regelmäßig Nutzen oder Schaden bringen."
 civic_superstitious_beliefs: "Aberglaube"
 civic_superstitious_beliefs_desc: "Diese Gesellschaft behauptet, ein Ritual entdeckt zu haben, das esoterische Mustererkennung und zyklische Anomalieanalyse nutzt, um die Zukunft vorherzusagen. $civic_superstitious_beliefs_desc_common$"
 civic_superstitious_beliefs_effects: "Ersetzt:\n$t$- £job_priest£ $job_priest_plural$ durch £job_superstitious_beliefs_priest£ $job_superstitious_beliefs_priest_plural$\n$t$- £job_high_priest£ $job_high_priest_plural$ durch £job_superstitious_beliefs_high_priest£ $job_superstitious_beliefs_high_priest_plural$\n$civic_superstitious_beliefs_common_effects$"
 civic_machine_superstitious_beliefs: "Mustersucher"
 civic_machine_superstitious_beliefs_desc: "Dieses Maschinenimperium behauptet, Berechnungen entdeckt zu haben, die esoterische Mustererkennung und zyklische Anomalieanalyse nutzen, um das Unbekannte vorauszusagen. Vor jeder wichtigen Entscheidung analysiert man die Konstellationen der Himmelskörper, um das bestmögliche Ergebnis zu gewährleisten."
 civic_machine_superstitious_beliefs_effects: "$civic_superstitious_beliefs_common_effects$"
 civic_hive_superstitious_beliefs: "Sternzeichen-Nexus"
 civic_hive_superstitious_beliefs_desc: "Dieses Kollektiv behauptet, ein Ritual entdeckt zu haben, das esoterische Mustererkennung und zyklische Anomalieanalyse nutzt, um die Zukunft vorherzusagen. $civic_superstitious_beliefs_desc_common$"
 civic_hive_superstitious_beliefs_effects: "$civic_superstitious_beliefs_common_effects$"
 civic_corporate_superstitious_beliefs: "Schicksalskonzern"
 civic_corporate_superstitious_beliefs_desc: "Dieser Konzern behauptet, ein Ritual entdeckt zu haben, das esoterische Mustererkennung und zyklische Anomalieanalyse nutzt, um die Zukunft vorherzusagen. Zur Maximierung der Ergebnisse werden zukünftige Gewinne und Verluste anhand von Leistungskennzahlen idealer Himmelskonstellationen berechnet."
 civic_corporate_superstitious_beliefs_effects: "Ersetzt:\n$t$- £job_priest£ $job_priest_plural$ durch £job_superstitious_beliefs_priest_corporate£ $job_superstitious_beliefs_priest_corporate_plural$\n$t$- £job_high_priest£ $job_high_priest_plural$ durch £job_superstitious_beliefs_high_priest_corporate£ $job_superstitious_beliefs_high_priest_corporate_plural$\n$civic_superstitious_beliefs_common_effects$"
 # Twisted Experimenters
 civic_twisted_experimenters: "Experimentelle Rechtsprechung"
 civic_twisted_experimenters_desc: "Justizverfahren und das Streben nach Wissen haben in dieser Gesellschaft eine gemeinsame Lösung: Unter strengster Geheimhaltung führen Wissenschaftler Experimente an Testsubjekten aus der kriminellen Unterwelt durch. Gelegentliche Todesfälle sind der Preis des Fortschritts."
 civic_twisted_experimenters_effects: "Beginnt mit der Situation \"['concept_experimental_testing']\", die bei Abschluss technologische Einblicke bietet.\nBeginnt mit dem Gebäude \"£building£['building:building_experimentation_chambers_1']\" und kann weitere bauen.\nAlle Sklaven, die keine Maschinen sind, können im ['concept_slave_orderly']-Sklavenjob arbeiten.\nHat Zugang zur ['concept_slave_army'] \"§Y$abomination_army$§!\""
 civic_twisted_experimenters_hive_mind: "Korrigierendes Bewusstsein"
 civic_twisted_experimenters_hive_mind_desc: "Wer abweichendes Verhalten zeigt, wird in diesem Kollektiv als Testsubjekt in der wissenschaftlichen Forschung eingesetzt, ohne dass es dabei Beschränkungen hinsichtlich der verwendeten Methoden gäbe. Problematische Drohnen haben dadurch immer noch einen gewissen Wert."
 civic_twisted_experimenters_hive_mind_effects: "Beginnt mit der Situation \"['concept_experimental_testing_hive_mind']\", die bei Abschluss technologische Einblicke bietet.\nBeginnt mit dem Gebäude \"£building£['building:building_experimentation_chambers_1']\" und kann weitere bauen."
 civic_twisted_experimenters_corporate: "Judikative Forschung und Entwicklung"
 civic_twisted_experimenters_corporate_desc: "Dieser $gov_megacorporation$ rief eine Initiative ins Leben, die die Ineffizienz des Justizsystems verringern und gleichzeitig die wissenschaftliche Innovation maximieren soll. Problematische Bürger werden experimentellen Forschungsprojekten zugewiesen und Tests unterzogen, um technologische Durchbrüche zu erzielen. Die Sterblichkeitsrate liegt innerhalb der Erwartungen."
 civic_twisted_experimenters_corporate_effects: "Beginnt mit der Situation \"['concept_experimental_testing_corporate']\", die bei Abschluss technologische Einblicke bietet.\nBeginnt mit dem Gebäude \"£building£['building:building_experimentation_chambers_1']\" und kann weitere bauen.\nKann das $BRANCH_OFFICE_BUILDING$ \"£building£ ['concept_building_carceral_test_facility']\" bauen.\nAlle Sklaven, die keine Maschinen sind, können im ['concept_slave_orderly']-Sklavenjob arbeiten.\nHat Zugang zur ['concept_slave_army'] \"§Y$abomination_army$§!\""
 experimenters_we_will_learn_1: "Wir werden viel daraus lernen."
 experimenters_we_will_learn_2: "Neue Wege der experimentellen Forschung."
 experimenters_we_will_learn_3: "Neue Testparameter. Wie aufregend."
 experimenters_tragic_lesson_1: "Wir werden viel aus dieser Tragödie lernen."
 experimenters_tragic_lesson_2: "Eine Tragödie ... aber auch eine Gelegenheit für neue Experimente."
 experimenters_tragic_lesson_3: "Eine tragische Lektion, aber die Daten werden nützlich sein."
 experimenters_ermerging_crime_1: "Unsere [GetExperimentalEngineerPlural] werden in einer solchen Umgebung zahlreiche neue Experimente durchführen können."
 experimenters_ermerging_crime_2: "Zumindest bietet uns dieses Maß an Kriminalität reichlich Gelegenheit, spannende neue Wege in der wissenschaftlichen Forschung zu beschreiten."
 experimenters_ermerging_crime_3: "Diese neuen Bedingungen werden uns eine Vielzahl neuer Möglichkeiten für Experimente bieten."
 experimenters_ermerging_crime_4: "Umgebungen wie diese sind eine reichhaltige Quelle für neue Testsubjekte."
 # Secret Societies
 civic_tooltip_not_secret_societies: "Hat NICHT das Staatselement \"['concept_secret_societies_civics']\""
 civic_secret_societies: "Geheimgesellschaften"
 civic_secret_societies_desc: "Eine geheime Elite spinnt hinter den Kulissen dieser Gesellschaft ein kompliziertes politisches Netz und verflicht die inneren Angelegenheiten mit denen anderer Welten."
 civic_secret_societies_effects: "Geheime ['concept_ss_factions'] tauchen nach dem Erstkontakt mit anderen Reichen auf.\nBeginnt mit der Fähigkeit, ['concept_proxy_wars'] durchzuführen.\n$job_bureaucrat_plural_with_icon$ erzeugen $i_unity$ für jeden aktiven und erfolgreichen §YStellvertreterkrieg§!.\nBeginnt mit einem ['concept_first_contact'] bei zwei benachbarten Reichen.\n$INFILTRATION_LEVEL$ nach dem §Y$first_contact$§! mit anderen Reichen: §G+$@secret_society_infiltration_gain|0$§!"
 civic_secret_societies_corporate: "Einflussreiches Kartell"
 civic_secret_societies_corporate_desc: "Die mächtigsten Abteilungen dieses Megakonzerns arbeiten an außerplanetaren Einsätzen und gehen dabei strikt nach dem Erforderlichkeitsprinzip vor: Informationen werden nur weitergegeben, wenn es unbedingt notwendig ist. Wenn man nach etwas fragen muss, ist man nicht berechtigt, die entsprechenden Informationen zu kennen."
 civic_secret_societies_corporate_effects: "Geheime ['concept_ss_factions'] tauchen nach dem Erstkontakt mit anderen Reichen auf.\nBeginnt mit der Fähigkeit, ['concept_proxy_wars'] durchzuführen.\n$job_bureaucrat_plural_with_icon$ erzeugen $i_unity$ für jeden aktiven und erfolgreichen §YStellvertreterkrieg§!.\nBeginnt mit einem ['concept_first_contact'] bei zwei benachbarten Reichen.\n$INFILTRATION_LEVEL$ nach dem §Y$first_contact$§! mit anderen Reichen: §G+$@secret_society_infiltration_gain|0$§!\n£building£ §Y$building_corporate_embassy$§!: $megacorp_civic_branch_office_building_effect$"
 shroud.5012.title: "Auftauchen von Geheimgesellschaften"
 shroud.5012.desc: "Unsere Vermutungen bestätigten sich. Die [first_neighbor.GetAdjective]e und [second_neighbor.GetAdjective]e Zivilisation räumten ein, dass sie über inoffizielle Kanäle kontaktiert wurden, bevor die formelle Kommunikation begann.\n\nDie §HFraktionen§!, die nun aus unseren eigenen Schatten auftauchen, bestätigen ihre Existenz. Die einst als \"§H$pft_the_curtain$§!\", \"§H$pft_the_masquerade$§!\" und \"§H$pft_the_grand_dance$§!\" bekannten Geheimorganisationen bitten nun offen um einen formellen Dialog.\n\nWas sie wollen und woher sie wissen, was sie wissen, werden wir vielleicht niemals in Erfahrung bringen. Es könnte in unserem besten Interesse sein, ihren Forderungen nachzukommen."
 shroud.5012.a: "Und so beginnt der Tanz ..."
 shroud.5012.tt: "§YGeheimgesellschaftsfraktionen§! werden in Kürze auftauchen:\n$t$§H$pft_the_curtain$§!\n$t$§H$pft_the_masquerade$§!\n$t$§H$pft_the_grand_dance$§!"
 shroud.5013.title: "Merkwürdige Kontakte"
 shroud.5013.desc: "Unter uns gibt es offenbar einige, die hinter den Kulissen der Diplomatie agieren. Es wird auch vermutet, dass sich ihr Einfluss nicht auf unsere Heimatwelt beschränkt.\n\nObwohl wir erst seit Kurzem in der Lage sind, den Weltraum zu bereisen, ist es uns bemerkenswert leicht gefallen, mit anderen Lebensformen in Kontakt zu treten. Das scheint mehr als nur Zufall zu sein. Wir vermuten, diese interstellaren Beziehungen haben ihren Ursprung hinter den verschlossenen Türen mehrerer geheimer §HFraktionen§!, die tief in unserer Gesellschaft verwurzelt sind.\n\nVielleicht werden sich diejenigen, die in unseren Schatten leben, offenbaren, sobald wir mehr über diese Wesen gelernt haben."
 shroud.5013.a: "Sind sie für uns oder gegen uns?"
 # Chosen
 civic_ap_blockade_tt: "§RWARNUNG: Blockiert alle Aufstiegspfade außer den ['concept_psionic_ascension', psionischen Aufstieg].§!"
 civic_chosen: "Auserwählt"
 civic_chosen_desc: "$civic_ap_blockade_tt$\n\nDiese Gesellschaft wurde bereits kurz nach ihrer Entstehung vom Schleier beeinflusst und ist an einen Pakt mit einem mächtigen Schleierwesen gebunden."
 civic_chosen_effects: "- Beginnt das Spiel mit Kontakt zu einem §ISchleierpakt§!.\n- $ADDITIONAL_TECHNOLOGIES_STRING$ £society£ ['technology:tech_psionic_aura']"
 civic_chosen_effects_additional: "- Erhält $i_unity$, die mit der ['concept_attunement'] zum Schleier skaliert."
 civic_hive_chosen: "Ausgewählte Vielzahl"
 civic_hive_chosen_desc: "$civic_ap_blockade_tt$\n\nDieses Kollektiv wurde bereits kurz nach seiner Entstehung vom Schleier beeinflusst und ist an einen Pakt mit einem mächtigen Schleierwesen gebunden."
 civic_machine_chosen: "Apostelnetzwerk"
 civic_machine_chosen_desc: "$civic_ap_blockade_tt$\n\nDiese Maschinen wurden bereits während ihrer Konstruktion vom Schleier beeinflusst und ihr Quellcode enthält einen Pakt mit einem mächtigen Schleierwesen."
 civic_corporate_chosen: "Auserwählter Exekutivrat"
 civic_corporate_chosen_desc: "$civic_ap_blockade_tt$\n\nDieses Unternehmen verdankt seinen Erfolg einem mysteriösen und äußerst mächtigen Schleierwesen, mit dem es seit seiner Gründung im Rahmen eines Schutzpakts zusammenarbeitet."
 civic_corporate_chosen_effects: "$civic_chosen_effects$\n- £building£ §Y$building_psionic_offices$§!: $megacorp_civic_branch_office_building_effect$"
 civic_tooltip_not_chosen: "Hat NICHT das Staatselement \"['concept_chosen_civics']\""
 concept_chosen_civics: "Auserwählt"
 concept_chosen_civics_desc: "Staatselemente der Kategorie \"$concept_chosen_civics$\" umfassen:\n- ['civic:civic_chosen']$NEW_LINE$- ['civic:civic_hive_chosen']$NEW_LINE$- ['civic:civic_machine_chosen']$NEW_LINE$- ['civic:civic_corporate_chosen']"
 shroud.5105.title: "Die Auserwählten"
 shroud.5105.desc: "Wir wussten es schon immer ... Wir haben eine ätherische Verbindung zu einem Wesen, das wir weder definieren noch verstehen können.\n\n[This.GetTheChosenP2]\n\nDieses Wesen war da, solange unsere historischen Aufzeichnungen zurückreichen. Dass es uns auserwählte, ist klar, doch der Grund bleibt für uns weiterhin ein Rätsel.\n\nWie sollen wir diese [This.GetSensation] nennen?"
 shroud.5105.desc_p2: "Wir spüren seine Präsenz in unseren tiefsten Gedanken. Es ist immer da, aber stets unerreichbar. Es ist sowohl eine Gewissheit als auch eine Unmöglichkeit in unserem Bewusstsein."
 shroud.5105.desc_p2_machine: "Wir registrieren seine Präsenz in unseren komplexesten Berechnungsalgorithmen. Es ist immer da, aber stets unerreichbar. Es ist sowohl eine Gewissheit als auch eine Unmöglichkeit in unseren Schaltkreisen."
 shroud.5105.a: "$the_composer_of_strands_article_cap$"
 shroud.5105.b: "$the_eater_of_worlds_article_cap$"
 shroud.5105.c: "$the_cradle_of_souls_article_cap$"
 shroud.5105.d: "$the_instrument_of_desire_article_cap$"
 shroud.5110.title: "[GetChosenPatron::<DE_ART_DEF_S_N_Cap>] [GetChosenPatron&NOM] lockt"
 shroud.5110.desc_common: "Im Lauf unserer Geschichte war jenes unbeschreibliche Wesen, das wir als §H[GetChosenPatron&AKK]§! kennen, stets bei uns. Da wir nun in die Weiten der Galaxie vorstoßen, nehmen wir [GetChosenPatron::<DE_PRO_POS_S_3P>]e Präsenz in unserem [GetMindPhysicalLoc&DAT] so deutlich wahr wie nie zuvor.\n\nEs wartet und zieht uns näher zu sich heran. Durch die Nähe bemerken wir zum ersten Mal die wahren Umrisse jener tiefen und geheimnisvollen Leere in unser[GetMindLogicLoc::<DE_END_PRO_S_D>] [GetMindLogicLoc&DAT]. [GetChosenPatron::<DE_ART_DEF_S_N_Cap>] [GetChosenPatron&NOM]"
 shroud.5110.desc_common_2: "Wir verstehen nun endlich, wie wir dieses ätherische Reich aus eigenem Antrieb erreichen können."
 shroud.5110.desc_organic: "$shroud.5110.desc_common$ verführt uns mit Erfahrungen, die unser Verständnis weit übersteigen.\n\n$shroud.5110.desc_common_2$"
 shroud.5110.desc_robot: "$shroud.5110.desc_common$ optimiert unsere Parameter nach einigen uns noch unbekannten Prinzipien.\n\n$shroud.5110.desc_common_2$"
 shroud.5110.a: "Unser Horizont hat sich nach innen erweitert."
 shroud.5110.a.tt: "Wir erhalten eine §YEinstimmung§! mit dem Schleierwesen \"$@chosen_patron_attunement_gift|0G$\"\nDer §YSchleier§! kann im Menü für §YKontakte§! eingesehen werden"
 shroud.5115.title: "[GetChosenPatron::<DE_ART_DEF_S_N_Cap>] [GetChosenPatron&NOM]"
 shroud.5115.desc.intro: "Der Schleier. Er fließt unterhalb der uns bekannten Realität wie ein von der Dunkelheit geworfener Schatten.\n\nWir wagen uns schon seit Langem in dieses psionische Reich vor, doch unsere früheren Vorstöße waren nur zaghaft. Dank unserer vereinten Kraft schafften wir es nun endlich, die Barriere zwischen den Dimensionen abzubauen. Wir nehmen ihn nun deutlich genug wahr, um ihn gezielt erforschen zu können.\n\nAuf der anderen Seite sind unsere Versuche jedoch nicht unbemerkt geblieben. [GetChosenPatron::<DE_ART_DEF_S_N_Cap>] §H[GetChosenPatron&NOM]§! erwartet unsere Ankunft."
 shroud.5115.desc.outro: "In diesem Strudel unzähliger Wesen wirkt diese Klarheit wie ein Versprechen."
 shroud.5115.desc.composer: "$shroud.5115.desc.intro$\n\n§HENTFALTEN. UMHÜLLEN. AUSBREITEN.§!\n\n$shroud.5115.desc.outro$"
 shroud.5115.desc.eater: "$shroud.5115.desc.intro$\n\n§HFÜHLT DEN WAHREN HUNGER.§!\n\n$shroud.5115.desc.outro$"
 shroud.5115.desc.cradle: "$shroud.5115.desc.intro$\n\n§HUMARMT DIE MÖGLICHKEITEN.§!\n\n$shroud.5115.desc.outro$"
 shroud.5115.desc.instrument: "$shroud.5115.desc.intro$\n\n§HGEBT EUCH EURER SEHNSUCHT HIN.§!\n\n$shroud.5115.desc.outro$"
 shroud.5115.a: "Wir werden zurückkehren."
