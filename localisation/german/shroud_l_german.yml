 shroud_seal: "$SHROUD_SEAL$"
 shroud_seal_DESC: "Diese technologisch fortschrittliche Apparatur sendet Wellen in einem niedrigen Frequenzbereich aus, um psionischer Energie entgegenzuwirken. Dies verstreut und nullifiziert letztlich $PSIONIC_AURA_PLURAL$."
 shroud_seal_MEGASTRUCTURE_DETAILS: "Das §Y$SHROUD_SEAL$§! dämpft in der Nähe befindliche §Y$PSIONIC_AURA_PLURAL$§! und reduziert die Effektivität §Ypsionischer Schiffskomponenten§!."
