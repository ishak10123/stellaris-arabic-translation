 the_composer_of_strands_REVENGE_PROJECT_DESC: "Die $the_composer_of_strands_color_article_cap$ hat ihren $PATRON_REVENGE_PROJECT_DESC$"
 DELVING_RITUAL: "Eintauchungsritual"
 DELVING_RITUAL_DESC: "Die §Y[shroudwalker_enclave_country.GetName]§! traf die nötigen Vorbereitungen für das Eintauchungsritual und kann nun in unserem Namen in den §HSchleier§! vordringen. Zu welchen Einblicken uns dies auch immer führen mag, ist ungewiss."
 MINDWARDENS_THE_FIRST_ENCLAVE: "Die erste Enklave"
 MINDWARDENS_THE_FIRST_ENCLAVE_DESC: "Wir sind bereit, eine unabhängige \"§H$gov_mindwarden_enclave$§!\" aufzubauen, um unsere Mission voranzutreiben, die psionische Infektion der Galaxie aufzuhalten.\n\nNach der Fertigstellung wird diese Einrichtung jedem, der sie benötigt, Anti-Psionik-Dienstleistungen bereitstellen und uns gleichzeitig einen Teil der Einnahmen und Materialien überlassen."
 MINDWARDENS_THE_FIRST_ENCLAVE_NOTE: "Konvertiert eine §Y$FLEET$§! mit einer Größe von 30 oder höher und einem §YKommandanten§! in einem von uns kontrollierten System in eine §Y$gov_mindwarden_enclave$§!."
 SHROUD_SHAPING_PROJECT: "Den Schleier formen"
 SHROUD_SHAPING_PROJECT_DESC: "Der §HSchleier§! wird von unzähligen Wesen bewohnt, und jedes von ihnen besitzt eine unglaubliche Macht. Sie erwarten jedoch einen unauflösbaren Pakt, bevor sie ihre größten Segen gewähren.\n\nWir wollen jedoch unseren eigenen Weg gehen. Anstatt unsere Psyche an einen einzelnen Schleierpakt zu binden, könnten unsere [GetResearchers] Technologien entwickeln, die es uns erlauben, eine kleine Menge Energie von jedem der Schleierwesen zu kanalisieren, was es uns ermöglichen würde, den Schleier nach unserem Willen zu formen."
 EXPLORE_BORDER_SYSTEM: "[exiled_system_border.GetName] erkunden"
 EXPLORE_BORDER_SYSTEM_DESC: "Unsere Langstreckenscanner registrierten einen merkwürdigen Energieausbruch im §H[exiled_system_border.GetName]§!-System, der in Korrelation zu jenen unregelmäßigen Messwerten steht, die unser $building_ancient_ward_1$ auf [owner.GetHomeWorldName] absondert.\n\nWenn wir dieses Phänomen verstehen wollen, müssen wir das [exiled_system_border.GetName]-System erkunden."
 EXPLORE_BORDER_SYSTEM_TOOLTIP: "Entsendet ein §YSchiff§! oder eine §YFlotte§!, um das §Y[exiled_system_border.GetName]§!-System zu erkunden."
