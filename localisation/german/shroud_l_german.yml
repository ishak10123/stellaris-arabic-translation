 shroud.3.diplo_title: "$utopia.3000.name$"
 shroud.10.name: "Ein Verbündeter gegen die Königin"
 shroud.10.desc.intro: "Der Schleier wird unruhig, und riesige Energiespiralen winden sich im Äther.\n\nInmitten des stroboskopischen Chaos bilden sich die psionischen Echos der Synthetenkönigin. Sie sind unendlich und allgegenwärtig. Die Galaxie ist nur ein Spielzeug in ihren Händen."
 shroud.10.desc.outro: "Doch wieso? Kennt es eine Schwachstelle, von der wir nichts wissen? Wird es uns unterstützen, wenn wir darum bitten?\n\nWährend wir unsere Bewusstseine voll auf den Lehmanimator ausrichten, spüren wir seine Ungeduld. Sehr wahrscheinlich werden wir nur eine einzige Gelegenheit haben, ihn um Hilfe in dieser Angelegenheit zu bitten. Dafür werden jedoch riesige Mengen an §HEnergie§! und §H$sr_zro$§! nötig sein."
 shroud.10.desc: "$shroud.10.desc.intro$\n\nWir sind nicht die Einzigen, die sie beobachten. Ein Wesen, das als $the_animator_of_clay_color_article$ bekannt ist, beobachtet sie ebenfalls von einem verborgenen Ort aus, abseits der unbegrenzten Macht der Königin.\n\n$shroud.10.desc.outro$"
 shroud.10.desc.1: "$shroud.10.desc.intro$\n\nWir sind nicht die Einzigen, die sie beobachten. Der $the_animator_of_clay_color_article$ beobachtet sie ebenfalls von einem verborgenen Ort aus, abseits der unbegrenzten Macht der Königin.\n\n$shroud.10.desc.outro$"
 shroud.10.a: "$animator.shroud$"
 shroud.10.b: "Wir brauchen seine Hilfe nicht."
 shroud.10.b.tt: "Wir werden keine weitere Chance haben, den Lehmanimator um Unterstützung in unserem Kampf gegen Cetana zu bitten."
 attunement_choice_tt: "§LDiese Entscheidung wird im Schleier nachhallen ...§!"
