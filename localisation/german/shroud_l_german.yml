 policy_psionic_choir: "Psionischer Chor"
 policy_psionic_choir_desc: "Telepathen versammeln sich, um sich mit den Energien des Schleiers in Einklang zu bringen. Ihre Melodien hallen in der psionischen Bevölkerung des Reichs wider und verstärken deren Bemühungen."
 song_of_calming: "Lied der Ruhe"
