 # Shroud
 THE_SHROUD_TITLE: "Der Schleier"
 SHROUD_HEADER_INSIGHT_TT: "$SHROUD_HEADER_TT$\n\nEntdeckt die dort lebenden Schleierwesen, indem Ihr Euch auf sie §Heinstimmt§! und ihre Gunst erhaltet."
 SHROUD_HEADER_TT: "Der §HSchleier§! ist die Heimat unzähliger Schleierwesen."
 SHROUD_HEADER_DESC: "Der Schleier selbst ist ein sich ständig veränderndes Rad, das aus konzeptuellen Bereichen besteht, die jeweils von einem mächtigen Schleierwesen kontrolliert werden. Es heißt, dass jede Handlung in der physischen Dimension auch die eigene Position in der anderen Dimension beeinflussen kann."
 DELVE: "Eintauchen"
 COUNTRY_ON_SHROUD_PLANE_INSIGHT_TT: "§HPosition im Schleier§!\nZeigt die Ausrichtung von §H$PLAYER_COUNTRY$§! im Schleier an. Dies wird durch die §HEinstimmung§! auf Schleierwesen bestimmt."
 COUNTRY_ON_SHROUD_PLANE_TT: "§HPosition im Schleier§!\nZeigt die Ausrichtung von §H$PLAYER_COUNTRY$§! im Schleier an."
