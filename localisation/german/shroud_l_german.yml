 # End of the Cycle
 situation_end_of_the_cycle: "$name_eotc$"
 situation_end_of_the_cycle_desc: "Wir haben einen Pakt mit dem $end_of_the_cycle_color_article$ geschlossen und erhalten dadurch eine überwältigende Macht. Unsere [Owner.GetTelepathPlural] gehen davon aus, dass wir die Kosten unseres Geschäfts durch eine kollektive psionische Trance aufschieben können - aber nur für eine gewisse Zeit.\n\nDer Wille unseres Schleierpakts manifestiert sich in einer intensiven psionischen Aura. Wenn wir den Willen des Endes verwirklichen wollen, müssen wir es zu unserem obersten Ziel machen, diese Aura zu verbreiten. Mit zunehmender Anzahl immer stärker werdender Bewusstseine werden auch die Macht und der Einfluss der Aura wachsen.\n\nNoch zu erobernde Systeme: §Y[Owner.GetEndCycleGalaxySystemsLeft]§!"
 situation_end_of_the_cycle_effects_1: "Wenn diese Phase erfolgreich abgeschlossen wird, wird uns die Macht der §H$ACCORD_CREATION$§! zuteilwerden.\n$eotc_opinion_modifier_tooltip$"
 situation_end_of_the_cycle_effects_2: "Wenn diese Phase erfolgreich abgeschlossen wird, wird uns die Macht der §H$ACCORD_DISTORTION$§! zuteil.\n$eotc_opinion_modifier_tooltip$\n$eotc_opinion_modifier_2_tooltip$"
 situation_end_of_the_cycle_effects_3: "Wenn diese Phase erfolgreich abgeschlossen wird, wird uns die Macht der §H$ACCORD_INTENSIFICATION$§! zuteil.\n$eotc_opinion_modifier_tooltip$\n$eotc_opinion_modifier_3_tooltip$"
 situation_end_of_the_cycle_effects_4: "Erst wenn diese Phase erfolgreich abgeschlossen wird, wird uns der Preis unserer Macht offenbart werden."
