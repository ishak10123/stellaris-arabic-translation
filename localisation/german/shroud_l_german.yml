 # Entropy Drinkers
 civic_tooltip_not_entropy_drinkers: "Hat NICHT das Staatselement \"['concept_entropy_drinkers_civics']\""
 civic_entropy_drinkers: "Entropietrinker"
 civic_entropy_drinkers_desc: "$civic_ap_blockade_tt$\n\nDiese Gesellschaft entzieht der untätigen Bevölkerung durch parasitäre psychische Verbindungen wertvolle Stoffwechselenergie. Einmal gesammelt lässt sich diese Energie an die wichtigeren Bevölkerungsschichten umverteilen."
 civic_entropy_drinkers_effects: "- Aktiviert die folgenden §H$EDICTS$§!:$TABBED_NEW_LINE$- ['edict:energy_drain',$edict_energy_drain$]$TABBED_NEW_LINE$- ['edict:sanguine_council',$edict_sanguine_council$]$TABBED_NEW_LINE$- ['edict:psychic_feast',$edict_psychic_feast$]\nKann folgende Gebäude bauen: £building£['building:building_lifecrypt_1'].\nAnführer beginnen mit der Eigenschaft \"['concept_leader_trait_psionic']\"."
 civic_entropy_drinkers_psionic_modifier: "- $energy_with_icon$ je $pop_group_unit$ £pop£ Psionische Bewohner: §G+0.5§!"
 civic_entropy_drinkers_machine: "Energieextraktoren"
 civic_entropy_drinkers_machine_desc: "$civic_ap_blockade_tt$\n\nEine ordnungsgemäße Energieverteilung ist für die Gewährleistung der maximalen Effizienz unerlässlich. Alle Einheiten wurden unter Berücksichtigung dieses Ziels so konzipiert, dass sie bei Bedarf vorübergehend kritische Knoten übertakten können."
 civic_entropy_drinkers_machine_effects: "Aktiviert die folgenden §H$EDICTS$§!:$TABBED_NEW_LINE$- ['edict:energy_drain',$edict_energy_drain$]$TABBED_NEW_LINE$- ['edict:sanguine_council_machine',$edict_sanguine_council_machine$]$TABBED_NEW_LINE$- ['edict:psychic_feast',$edict_psychic_feast$]\n- Kann folgende Gebäude bauen: £building£['building:building_lifecrypt_machine_1'].\n- Anführer beginnen mit der Eigenschaft \"['concept_leader_trait_psionic']\"."
 civic_entropy_drinkers_hive_mind: "Parasitäre Kaste"
 civic_entropy_drinkers_hive_mind_desc: "$civic_ap_blockade_tt$\n\nDieses Kollektiv entzieht den niederen Drohnen durch parasitäre psychische Verbindungen wertvolle Stoffwechselenergie. Einmal gesammelt lässt sich diese Energie an die wichtigeren Kasten umverteilen."
 civic_entropy_drinkers_hive_mind_effects: "- Aktiviert die folgenden §H$EDICTS$§!:$TABBED_NEW_LINE$- ['edict:energy_drain',$edict_energy_drain$]$TABBED_NEW_LINE$- ['edict:sanguine_council',$edict_sanguine_council$]$TABBED_NEW_LINE$- ['edict:psychic_feast',$edict_psychic_feast$]\n- Kann folgende Gebäude bauen: £building£['building:building_lifecrypt_hive_mind_1'].\n- Anführer beginnen mit der Eigenschaft \"['concept_leader_trait_psionic']\"."
 civic_entropy_drinkers_corporate: "Unternehmerische Vampire"
 civic_entropy_drinkers_corporate_desc: "$civic_ap_blockade_tt$\n\nDieser $gov_megacorporation$ entzieht der untätigen Bevölkerung durch parasitäre psychische Verbindungen wertvolle Stoffwechselenergie. Einmal gesammelt lässt sich diese Energie an die Konzernleitung umverteilen."
 civic_entropy_drinkers_corporate_effects: "- Aktiviert die folgenden §H$EDICTS$§!:$TABBED_NEW_LINE$- ['edict:energy_drain',$edict_energy_drain$]$TABBED_NEW_LINE$- ['edict:sanguine_council',$edict_sanguine_council$]$TABBED_NEW_LINE$- ['edict:psychic_feast',$edict_psychic_feast$]\n- Kann folgende Gebäude bauen: £building£['building:building_lifecrypt_corporate_1'].\n- Anführer beginnen mit der Eigenschaft \"['concept_leader_trait_psionic']\".\n£building£ §Y$building_executive_retreat$§!: $megacorp_civic_branch_office_building_effect$"
