 ACCORD_GENERATION_TT: "Alle Kolonien innerhalb unserer §Hpsionischen Aura§! erhalten $@accord_generation_pop_gain|0$ £pop£ §YBewohner§! unserer Hauptspezies\n$ACCORD_LOOSE_INTENSITY$"
 # Instrument of Desire accords
 ACCORD_PROGRESS: "Fortschritt"
