 ACCORD_FRACTALIZATION: "Fraktalisierung"
 ACCORD_FRACTALIZATION_desc: "Die $end_aura$ reißt Teile unserer physischen Realität in den Schleier, die wie Spiralen nach außen verlaufen. Einmal geknüpft bleiben diese Fäden an Ort und Stelle, bis das Ende eintrifft."
 ACCORD_FRACTALIZATION_TT: "§Y$mod_station_researchers_produces_mult$§! und §Y$mod_station_gatherers_produces_mult$§! innerhalb unserer §Hpsionischen Aura§!: §G+100%§!"
