 #==========================
 # Tutorials
 #==========================
 TUTORIAL_SHROUD_TAB_TITLE: "Tutorial: $THE_SHROUD_TITLE$"
 TUTORIAL_SHROUD_TAB_DESC: "Dieses Fenster bietet einen Überblick über den §SSchleier§!. Die linke Tafel veranschaulicht die Position unseres Reichs im Schleier, was durch die §SDomänen§! der vier psionischen Wesen dargestellt wird, die allgemein als \"§SSchleierwesen§!\" bekannt sind.\n\nUnsere Position hängt von unserer §S$concept_attunement$§! auf sie ab. Einstimmung erhält man, wenn eine Handlung im physischen Raum Gefallen bei einem Schleierwesen findet. Sammelt $concept_attunement$, um die Identität eines Schleierpakts zu enthüllen. Klickt nach der Enthüllung auf die Domäne des Schleierwesens, um das Schleierpaktmenü zu öffnen.\n\nKlickt dort auf \"§S$DELVE$§!\" oder auf die Mitte der linken Tafel, um in den Schleier einzutauchen und das psionische Reich zu erkunden. Während der Erkundung kann das Entdeckte Einfluss auf unsere $concept_attunement$ und damit auf unsere Position in den verschiedenen Domänen nehmen."
 TUTORIAL_SHROUD_PATRON_TITLE: "Tutorial: Schleierpakte"
 TUTORIAL_SHROUD_PATRON_DESC: "Das §SSchleierpaktmenü§! bietet Informationen und Optionen zu den verschiedenen Schleierwesen. Schließt Ziele ab, die durch §S$concept_callings$§! und §S$concept_deeds$§! repräsentiert werden, um eine §S$concept_attunement$§! auf ein bestimmtes Schleierwesen zu erhalten.\n\nErhöht die $concept_attunement$, um §S$PASSIVE_ACCORDS$§! freizuschalten, die Eurem Reich bestimmte Vorteile bieten. Solltet Ihr genügend Einstimmung auf ein Schleierwesen gesammelt haben, könnt Ihr einen §SPakt§! mit ihm schließen, was noch wesentlich größere Auswirkungen haben wird."
 TUTORIAL_SHROUD_COVENANT_TITLE: "Tutorial: Schleierpakte"
 TUTORIAL_SHROUD_COVENANT_DESC: "Einen §SPakt§! mit einem Schleierwesen einzugehen, gewährt Zugang zu dessen §SPaktmächten§!. $tutorial.shroud_covenant.shared$"
 tutorial.shroud_covenant.shared: "Klickt auf das Symbol für ein $ACTIVE_ACCORD$, um dessen Effekte für eine bestimmte Menge an £sr_zro£ §S$sr_zro$§! zu aktivieren. Dies kann in der Schleieransicht oder in der Ansicht des jeweiligen Schleierwesens vorgenommen werden.\n\nNach der Aktivierung muss sich ein $ACTIVE_ACCORD$ erst wieder aufladen, bevor man diesen Effekt erneut nutzen kann."
 TUTORIAL_SHROUD_SHAPING_TITLE: "Tutorial: Schleierformung"
 TUTORIAL_SHROUD_SHAPING_DESC: "Wir verfügen jetzt über die Voraussetzungen, um bestimmte Kräfte zu erlangen, die normalerweise einen §SPakt§! mit einem §SSchleierwesen§! erfordern.\n\nSobald wir beide §S$PASSIVE_ACCORDS$§! unseres Schleierpakts freigeschaltet haben, erhalten wir Zugang zu einer §S$ACTIVE_ACCORD$§!. $tutorial.shroud_covenant.shared$"
 tutorial.2600.name: "Tutorial: $PSIONIC_AURA_PLURAL$"
 tutorial.2600.desc: "Kolonien, die eine psionische Bevölkerung haben, besitzen nun die Möglichkeit, eine §S$PSIONIC_AURA$§! auszustrahlen. Die Art der Aura basiert auf dem §SSchleierwesen§!, zu dem wir derzeit die höchste §S$concept_attunement$§! haben.\n\n$PSIONIC_AURA_PLURAL$ haben verschiedene Auswirkungen, sowohl was unser eigenes Reich als auch freundliche oder feindliche Reiche betrifft. Um eine Aura auf weitere Systeme auszuweiten, müssen wir uns besser auf das Schleierwesen einstimmen, um die Technologie £research£ §S$tech_aura_intensification$§! freizuschalten.\n\nDie Effekte einer Psionischen Aura können entweder im \"§SSchleier§!\"-Reiter eingesehen werden oder in der £interface£ §SSystemansicht§! bei dem Aurasymbol unten mittig."
 tutorial.2610.name: "Tutorial: $tech_aura_intensification$"
 tutorial.2610.desc: "Unsere §S$PSIONIC_AURA$§! kann nun an §SIntensität§! gewinnen und sich auf andere Systeme ausbreiten.\n\n$PSIONIC_AURA_PLURAL$ können drei Intensitätsstufen erreichen, die jeweils skalierende Effekte haben. Wenn eine $PSIONIC_AURA$ eine neue Intensitätsstufe oder die Intensität das Maximum erreicht, wird sie versuchen, sich auf benachbarte Systeme auszubreiten. Die meisten Psionischen Auren haben eine maximale Reichweite, die von ihrer Quelle ausgeht.\n\nDie Aurenintensität kann auf verschiedenem Weg verstärkt werden: durch eine höhere psionische Bevölkerung, £happiness£ §SZufriedenheitsstufen§!, £job_telepath£ [GetTelepathPlural]-Jobs und psychische Gouverneure oder £leader£ Anführer von £sector£ Sektoren."
 tutorial.2620.name: "Tutorial: Aurenzusammenstoß"
 tutorial.2620.desc: "Unsere §S$PSIONIC_AURA$§! ist auf eine andere Aura in einem angrenzenden System gestoßen. In diesem Fall konkurrieren beide Auren miteinander, um zu bestimmen, welche sich in das andere System ausbreiten wird.\n\nDieser Prozess hängt vom monatlichen §SIntensitätserhalt§! jeder konkurrierenden Aura ab. Wie groß dieser ist, lässt dich über das Aurasymbol überprüften, das sich mittig unten in der £interface£ §SSystemansicht§! befindet."
 #==========================
 # Technologies
 #==========================
 tech_psionic_aura: "$PSIONIC_AURA$"
 tech_psionic_aura_desc: "Das Austreten psionischer Energie aus dem Schleier holt die Gunst einer Wesenheit in die physische Realität. Ein Reich, das in der Gunst eines Schleierpakts steht, strahlt eine psionische Aura von jenem Ort aus, an dem die psionische Bevölkerung am größten ist."
 feature_unlock_psionic_aura: "$PSIONIC_AURA_PLURAL$"
 feature_unlock_psionic_aura_desc: "Erlaubt es einem Reich, das in der Gunst eines Schleierpakts steht, eine psionische Aura von jenem Ort auszustrahlen, an dem die psionische Bevölkerung am größten ist."
 psionic_aura_delve_success_tt: "Erfolgschance beim Eintreten: §G+$@delve_success_tier_1|0$%§!"
 tech_aura_intensification: "Psionische Aurenverstärkung"
 tech_aura_intensification_desc: "Die psionischen Energien des Schleiers streben stets danach, sich auszudehnen. Dank dieser Erkenntnis lassen sich die psionischen Auren eines Reichs noch verstärken, um sie auf ganze Sternensysteme auszudehnen und so Verbündeten Vorteile und Feinden Nachteile zu bringen."
 feature_allow_psionic_aura_intensity_spread: "Psionische Aurenverbreitung"
 feature_allow_psionic_aura_intensity_spread_desc: "Erlaubt $PSIONIC_AURA_PLURAL$, sich auf benachbarte Systeme auszubreiten. Die Reichweite von der Quelle aus beträgt §Y[Owner.GetAuraHyperlaneRange]§! Hyperraumrouten."
 feature_allow_psionic_aura_intensity_growth: "Psionisches Aurenwachstum"
 feature_allow_psionic_aura_intensity_growth_desc: "Erlaubt $PSIONIC_AURA_PLURAL$, an Intensität zuzunehmen."
 aura_intensification_delve_success_tt: "Erfolgschance beim Eintreten: §G+$@delve_success_tier_2|0$%§!"
 tech_psionic_suppression: "Psionische Unterdrückung"
 tech_psionic_suppression_desc: "Apparaturen, die psionische Energie abschwächen, sind ebenso schwer zu bauen wie zu verstehen. Der Umgang mit diesen extradimensionalen Kräften ist nun einmal äußerst komplex."
 tech_psionic_suppression_feature_tt: "$i_unlocks_feature$ Schaltet den Bau von §YSchleiersiegeln§! und §YPsionischen Unterdrückern§! frei"
 tech_aura_resonation: "Aura-Resonatoren"
 tech_aura_resonation_desc: "Es gibt Wege, um psionische Auren auch jenseits bevölkerter Welten zu erzeugen. Durch $sm_aura_emitter$ kann selbst eine Sternenbasis zu einem Leiter von psionischer Energie aus dem Schleier werden."
 tech_materiality_engine: "$building_materiality_engine$"
 tech_materiality_engine_desc: "$building_materiality_engine_desc$"
 tech_psionic_bombers: "Psionische Bomber"
 tech_psionic_bombers_desc: "Diese kleinen und wendigen Raumschiffe sind darauf spezialisiert, konzentrierte Ladungen psionischer Energie abzuwerfen. Je größer das Ziel, desto größer auch die Explosion."
 tech_bio_psionic_bombers: "$tech_psionic_bombers$"
 tech_psionic_lightning: "Psionischer Blitz"
 tech_psionic_lightning_desc: "Durch eine temporäre psionische Verbindung zwischen zwei Schiffen entlädt sich die psionische Energie mit einer viel verheerenderen Wirkung. Diese rohe Energie kann Schiffssysteme stören und das Bewusstsein der Besatzung beeinflussen."
 tech_bio_psionic_lightning: "$tech_psionic_lightning$"
 ship_terrify_tt: "Chance, Militärschiffe basierend auf ihrer Rumpfgröße für £time£ §Y5-10§! Tage zu §Y['concept_terrify', verängstigen]§!."
 concept_terrify: "Verängstigen"
 concept_terrify_desc: "Verängstige Schiffe werden nicht länger angreifen und fliehen vor dem Angreifer."
 tech_psionic_disruptor: "Psionische Disruptoren"
 tech_psionic_disruptor_desc: "Diese fortschrittlichen Disruptoren feuern einen mächtigen Strahl psionischer Energie durch feindliche Schiffsrümpfe, um gezielt Waffensysteme auszuschalten."
 tech_bio_psionic_disruptor: "$tech_psionic_disruptor$"
 tech_zro_launcher: "Zrowerfer"
 tech_zro_launcher_desc: "Diese hochkonzentrierten $zro_lower$-Geschosse gleiten ungehindert durch feindliche Schilde hindurch und durchqueren dabei mehrere Realitäten. Sobald sie mit einem physischen Objekt in Kontakt kommen, richten sie exponentiellen Schaden an."
 tech_bio_zro_launcher: "$tech_zro_launcher$"
