 # Carceral Test Facility
 building_carceral_test_facility: "Experimentelle Büros"
 building_carceral_test_facility_desc: "Ein Kolonialbüro, das potenziellen Interessenten Franchising-Möglichkeiten anbietet und sie dabei unterstützt, eigene experimentelle Testprogramme aufzubauen. Reduziert die Kriminalität und stärkt die Verteidigung!"
 building_psionic_offices: "Psionische Büros"
 building_psionic_offices_desc: "Die Komplexität fremder Bewusstseine lässt sich viel leichter verstehen, wenn man sich physisch in ihrer Gegenwart befindet, um die für beide Seiten lukrativsten Handelsabkommen abzuschließen."
 building_psionic_offices_tt: "\nSystemauswirkungen:\n$t$- Strahlt eine §Y$PSIONIC_AURA$§! für den $TRIGGER_BRANCH_OFFICE_OWNER$ aus, die eine monatliche Intensität von $@psionic_offices_intensity|0+$ aufweist.\n$t$- §RJede Art von Aurenausstrahlung durch den Besitzer der Kolonie hat Vorrang vor diesem Gebäude.§!"
 job_shroud_trader: "Empathenvermarkter"
 job_shroud_trader_plural: "Empathenvermarkter"
 job_shroud_trader_plural_with_icon: "£job_telepath£ $job_shroud_trader_plural$"
 job_shroud_trader_desc: "Diese Experten auf ihrem Feld passen sich an den emotionalen Zeitgeist der lokalen Märkte an, schließen Geschäfte ab und veranstalten Seminare zu aktuellen Trends im Bereich Meinungsführerschaft."
 mod_job_shroud_trader_add: "$job_shroud_trader$-Jobs"
 mod_pop_shroud_trader_bonus_workforce_mult: "$BONUS_WORKFORCE_FOR$ [shroud_trader.GetNamePlural]"
