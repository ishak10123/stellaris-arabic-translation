 unregulated_transformation: "Unregulierte Transformation"
 unregulated_transformation_desc: "Bei einem kleinen Teil unserer psionischen Bevölkerung sind sonderbare Anhängsel gewachsen. Ihr Energieverbrauch hat sich zwar infolgedessen erhöht, aber auch das allgemeine Wohlbefinden."
 unregulated_transformation_gestalt: "$unregulated_transformation$"
