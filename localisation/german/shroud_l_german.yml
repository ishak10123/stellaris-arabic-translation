l_german:
 ##################################
 # ENGLISH LOCALISATION - Shroud #
 ##################################
 SHROUD_TITLE: "Shadows of the Shroud"
 ap_interdimensional_processing: "Interdimensionale Verarbeitung"
 ap_interdimensional_processing_desc: "Unsere Rechenleistung ist begrenzt, wenn wir uns nur auf die drei physikalischen Dimension beschränken. Wir können sie deutlich erhöhen, wenn wir unser Netzwerk auf die Räume jenseits der Leere ausdehnen."
 requires_not_ap_interdimensional_processing: "$TRIGGER_FAIL$Hat NICHT den Aufstiegsvorteil \"§Y$ap_interdimensional_processing$§!\"."
 vo_psionic_voice: "Psionisch"
 #==========================
 # Advanced Governments
 #==========================
 shroud.7099.name: "Psionische Antworten"
 shroud.7099.desc: "Unsere Gedanken bewegen sich mit einem neuen Ziel durch den §HSchleier§!. Während wir immer tiefer in ihn vorstoßen, schiebt er uns gleichzeitig zurück. Zunächst interpretierten wir dies als Widerstand gegen unsere Anwesenheit, doch jetzt verstehen wir es besser: Der Schleier stellt uns Fragen.\n\nAuch wenn uns diese Fragen in ihrer Bedeutung unklar sind, sind sie keineswegs trivial. Unseren [GetTelepathPlural] zufolge werden die von uns gegebenen Antworten in Zukunft Einfluss auf unsere Gesellschaft haben."
 shroud.7099.a: "Wir müssen antworten."
 # Shroud Songs events
 shroud.7100.title: "Schleierlied: [GetRolledShroudSongName]"
 shroud.7100.desc.common: "Wir hören zu und ein Bild formt sich vor [GetMindEyeLoc]. Wir sehen §H[GetRolledShroudSongName]§!.\n\n§P[GetRolledShroudSongDesc]§!"
 shroud.7100.desc: "Unsere Verbindung zum §HSchleier§! ist stark, und wir sind bereit, wenn er uns ruft. Uns erreicht eine Botschaft in rhythmischen Phrasen: Der Schleier singt zu uns.\n\n$shroud.7100.desc.common$"
 shroud.7100.a: "[GetRolledShroudSongOptionA]"
 shroud.7100.b: "[GetRolledShroudSongOptionB]"
 shroud.7100.tt: "Der Schleier wartet auf unsere Antwort ..."
 shroud.7105.desc: "Etwas nicht Sichtbares bewegt sich, und mit einem Flüstern wird ein weiterer Gedanke geboren.\n\n$shroud.7100.desc.common$"
 shroud.7105.tt: "Der Schleier wartet gespannt auf unsere Antwort ..."
 shroud.7110.desc: "Ein Chor ertönt in unseren Gedanken! Etwas wird nicht zufällig ausgewählt, sondern aufgrund von etwas Älterem.\n\n$shroud.7100.desc.common$"
 shroud.7110.tt: "Der Schleier erwartet sehnlichst unsere Antwort ..."
 shroud_song.1.name: "Sterne"
 shroud_song.1.desc: "Für diejenigen, die nach Wissen streben, ist der Prozess des Daseins ein Weg zum Verständnis."
 shroud_song.1.a: "Das Wissen geht weit über unsere Sinne hinaus."
 shroud_song.1.b: "Das Wissen liegt in greifbarer Nähe."
 shroud_song.2.name: "Licht"
 shroud_song.2.desc: "Das Dazwischen ist wie die Oberfläche eines Ozeans, eine infinitesimale Leere, die den Schleier begrenzt. Hier lässt sich ein Blick auf die Wahrheit erhaschen."
 shroud_song.2.a: "Die Wahrheit liegt in den Tiefen darunter."
 shroud_song.2.b: "Die Oberfläche spiegelt die Wahrheit wider."
 shroud_song.3.name: "Leben"
 shroud_song.3.desc: "Wo immer es blüht, ist das Leben vergänglich.\nWo immer sie wachsen, sind Lebewesen zerbrechlich."
 shroud_song.3.a.default: "Im Schleier gibt es weder Leben noch Tod."
 shroud_song.3.a.machine: "Unsere Existenz liegt jenseits des Lebens."
 shroud_song.3.b.default: "Das macht uns so wertvoll."
 shroud_song.3.b.machine: "Wir müssen erst noch geboren werden."
 shroud_song.3.b.homicidal: "Was zerbrechlich ist, ist verzichtbar."
 shroud_song.4.name: "Bewusstsein"
 shroud_song.4.desc: "Das Bewusstsein ist wie eine Quelle, in der Gedanken durch Zeit und Raum fließen. Wir sickern in andere Dimensionen."
 shroud_song.4.a: "Folgen wir dem Strom."
 shroud_song.4.b: "Bauen wir einen Brunnen."
 shroud_song.5.name: "Linien"
 shroud_song.5.desc: "Die Wirkung jeder Ursache lässt sich vorhersagen. Um das Schicksal der Dinge zu erkennen, muss man nur die Linien deuten."
 shroud_song.5.a: "Wir verfolgen die Linien in unseren Träumen."
 shroud_song.5.b: "Wir müssen diese Linien berechnen."
 shroud_song.6.name: "Tod"
 shroud_song.6.desc: "Im Tod können Sterne heller leuchten als Galaxien. Doch auch diese Dinge werden verblassen."
 shroud_song.6.a.default: "Der Tod betrifft uns nicht länger."
 shroud_song.6.a.machine: "Der Tod ist uns unbekannt."
 shroud_song.6.b.default: "Alle Dinge sterben. Nur wenige Dinge leben."
 shroud_song.6.b.machine: "Wir müssen zuerst leben, bevor wir sterben können."
 shroud_song.7.name: "Leere"
 shroud_song.7.desc: "Chaos regiert dort, wo Galaxien sich häufen. Die Leere ist die Verheißung von Ruhe."
 shroud_song.7.a: "Wir sind die Ruhe."
 shroud_song.7.b: "Wir sind das Chaos."
 shroud_song.8.name: "Falten"
 shroud_song.8.desc: "Eine Brücke kann jede beliebige Entfernung zusammenfalten, und jede Brücke kann zusammenfallen."
 shroud_song.8.a: "Wir überqueren sie, um die andere Seite zu erreichen."
 shroud_song.8.b: "Wir überqueren sie in der Hoffnung, zurückkehren zu können."
 shroud_song.9.name: "Gravitation"
 shroud_song.9.desc: "Auf jede Kraft wirkt auch eine gleichgroße entgegengerichtete Kraft."
 shroud_song.9.a: "Stoßen."
 shroud_song.9.b: "Ziehen."
 shroud_song.10.name: "Nebel"
 shroud_song.10.desc: "Ein Stern stirbt und wird zu Staub. Der Staub bildet eine Wolke.\nAus der Wolke formt sich ein Stern. Das Schicksal des Sterns liegt im Staub."
 shroud_song.10.a: "Der Zyklus ist endlos."
 shroud_song.10.b: "Alles muss einmal enden."
 shroud_song.11.name: "Kometen"
 shroud_song.11.desc: "Entdecker suchen das Unbekannte, doch die Entdeckung macht sie blind."
 shroud_song.11.a: "Der Schleier kennt keine Grenzen."
 shroud_song.11.b: "Der Schleier erweitert unsere Begrenzungen."
 shroud_song.12.name: "Schwarze Löcher"
 shroud_song.12.desc: "Was im Inneren liegt, kann niemand wissen. Wer sich ins Innere begibt, kann niemals entkommen."
 shroud_song.12.a: "Verschlingt uns im Ganzen."
 shroud_song.12.b: "Halten wir Abstand."
 shroud_song.13.name: "Energie"
 shroud_song.13.desc: "Ein sich bewegendes Objekt entscheidet sich zu ruhen. Was soll seine Strafe sein?"
 shroud_song.13.a: "Wer sind wir, darüber zu richten?"
 shroud_song.13.b: "Eine gleichgroße, aber entgegengesetzte Reaktion."
 shroud.7120.name: "Psionische Transzendenz"
 shroud.7120.desc.common: "Der §HSchleier§! verstummt, doch eine psychisches Bürde lastet auf unserer Gesellschaft. Die Antworten, die wir gaben, eröffneten uns neue Möglichkeiten - wenn wir denn gewillt sind, sie zu nutzen."
 shroud.7120.desc: "$shroud.7120.desc.common$\n\nUnsere aufgestiegenen Bewusstseine sind bereit für eine weitere Transformation. Die Gefäße, die den physischen Bedürfnissen dienen, verlieren an Bedeutung.\n\nWenn wir diesen Weg weiter verfolgen, kann unser Volk den physischen Körper vollends hinter sich lassen und sich vollständig der teilweisen Existenz im Schleier widmen. Eine kleine Leistungseinbuße bei körperlichen Arbeiten ist ein geringer Preis für den Gewinn an geistiger Schärfe."
 shroud.7120.a.default: "Nehmen wir unsere psionische Transzendenz vollends an."
 shroud.7120.a.gestalt: "Die psionische Transzendenz ist für das Kollektiv optimal."
 shroud.7120.a.tt: "$change_auth_tt$ [GetTranscendedAuthority]"
 shroud.7120.b.default: "Wir werden auch ohne diese Änderung erblühen."
 shroud.7120.b.machine: "Optionale Veränderungen verweigert."
 shroud.7121.name: "Lieder des Schleiers"
 shroud.7121.desc: "$shroud.7120.desc.common$\n\nUnsere aufgestiegenen Formen bieten in dieser körperlichen Dimension großes Potenzial. Durch die Zufuhr psionischer Energie gewinnen wir immer mehr an Stärke und können diese Kraft in unserer Gesellschaft verbreiten.\n\nWir würden nicht einfach nur die Lieder des Schleiers singen, sondern sie direkt in [GetGovBehaviourLoc] leiten."
 shroud.7121.a: "Mögen uns die Lieder des Schleiers Führung bieten."
 shroud.7121.a.tt: "$change_auth_tt$ [GetCorporealAuthority]"
 # Transcendent
 transcendent_trait_common_tt: "Die Spezieseigenschaft \"§Y$trait_psionic$§!\" gibt zusätzliche Effekte:$TABBED_NEW_LINE$- Job-Effizienz ($pop_cat_ruler$ und [GetSpecialist]): §G+10%§!$TABBED_NEW_LINE$- Job-Effizienz ([GetWorker]): §R-10%§!"
 transcendent_trait_tt: "$mod_psionic_aura_hyperlane_range_add$: §G+2§!\n$transcendent_trait_common_tt$\nDie Anführereigenschaft \"['concept_leader_trait_psionic']\" gibt zusätzliche Effekte: $TABBED_NEW_LINE$- §G+$@transcendent_psionic_leader_speed_mult|0%$§! Geschwindigkeit (Ratsagenden) $TABBED_NEW_LINE$- $MOD_LEADER_LIFESPAN_ADD$: §G+60§! $TABBED_NEW_LINE$- Nicht-transzendierte Effekte sind um §G+50%§! erhöht"
 auth_shroud_democratic_transcendent: "Transzendierte Demokratie"
 auth_shroud_democratic_transcendent_desc: "Alle transzendierten Bewusstseine haben im Schleier die gleichen Rechte, während Wahlen die Gleichheit im physischen Reich gewährleisten. Durch die psionische Stimmabgabe wählt die Bevölkerung ihre Vertreter für das regierende Konklave, das durch einen telepathischen Diskurs einen Konsens anstrebt."
 transcendent_democratic_tt: "$transcendent_trait_tt$\n$mod_pop_factions_produces_mult$: §G+40%§!\n$MOD_LEADER_LIFESPAN_ADD$: §G+20 Jahre§!\n$mod_negative_traits_leader$: §G-1§!"
 gov_shroud_transcendent_democracy: "$auth_shroud_democratic_transcendent$"
 gov_shroud_transcendent_democracy_desc: "$auth_shroud_democratic_transcendent_desc$"
 auth_shroud_oligarchic_transcendent: "Transzendierte Arisokratie"
 auth_shroud_oligarchic_transcendent_desc: "Die tiefsten Tiefen des Schleiers sind nur den stärksten Bewusstseinen unter uns vorbehalten. Die Zeit, die man braucht, um sich auf diese Bereiche einzustimmen, wird in ihre Amtszeit einbezogen."
 transcendent_oligarchic_tt: "$transcendent_trait_tt$\n$MOD_LEADER_SKILL_ADD$: §G+1§!\n$MOD_LEADER_COUNCILOR_EXP_GAIN$: §G+25%§!\n$mod_leaders_upkeep_mult$: §G-25%§!\n$MOD_ELECTION_TERM_YEARS_ADD$: §Y+20§!\n$mod_planet_telepaths_produces_mult$: $@transcendent_oligarchic_telepath|0=+%$ für §Y5§! Jahre nach jeder Wahl."
 gov_shroud_transcendent_oligarchy: "$auth_shroud_oligarchic_transcendent$"
 gov_shroud_transcendent_oligarchy_desc: "$auth_shroud_oligarchic_transcendent_desc$"
 transcendent_oligarchic_election_modifier: "$auth_shroud_oligarchic_transcendent$"
 auth_shroud_dictatorial_transcendent: "Transzendierte Theokratie"
 auth_shroud_dictatorial_transcendent_desc: "Es ist an der Zeit, dass wir uns der Wahrheit stellen: Der große Herrscher ist ein aufgestiegener Gott. Durch die Macht des Schleiers sieht und weiß er alles."
 auth_shroud_dictatorial_transcendent_tt: "$transcendent_trait_tt$\n[telepath.GetName] §H$EDICT_FUND$§!: +1\n£job_politician£ $job_politician_plural$ werden durch ['concept_high_priest'] ersetzt\n$mod_planet_bureaucrats_produces_mult$: §G+15%§!\n$mod_planet_enforcers_produces_mult$: §G+15%§!\n$mod_pop_ethic_spiritualist_attraction_mult$: §G+50%§!"
 gov_shroud_transcendent_dictatorial: "$auth_shroud_dictatorial_transcendent$"
 gov_shroud_transcendent_dictatorial_desc: "$auth_shroud_dictatorial_transcendent_desc$"
 auth_shroud_imperial_transcendent: "Transzendentes Imperium"
 auth_shroud_imperial_transcendent_desc: "Der Herrscher erhebt uns in eine höhere Dimension. Die rohe Kraft des Schleiers strömt aus dem Willen der kaiserlichen Linie in die begehrlichen Gemüter der Bevölkerung."
 auth_shroud_imperial_transcendent_tt: "$transcendent_trait_tt$\nDer $imperial_heir$ erhält zusätzliche Boni:$TABBED_NEW_LINE$- $scientist_plural_with_icon$ - Fähigkeit in §YArchäologischen Stätten§! und §YAstralrissen§!: $@transcendent_imperial_heir_skill|0=+$$TABBED_NEW_LINE$$official_plural_with_icon$ - $i_stability$: $@transcendent_imperial_heir_stability|0=+$$TABBED_NEW_LINE$$commander_plural_with_icon$ - §Y$HITPOINTS$§! und §Y$MOD_SHIP_SPEED_MULT$§!: $@transcendent_imperial_heir_mult|0=+%$\nWann immer ein £leader£ §Y$imperial_ruler$§! oder §YErbe§! eine Stufe aufsteigt, erhält das Reich $i_unity$\n$MOD_ENVOY_IMPROVE_RELATIONS_MULT$: §G+50%§!\n$MOD_ENVOY_HARM_RELATIONS_MULT$: §G+50%§!\n$MOD_ENVOY_ATTUNEMENT_MULT$: §G+50%§!\n$MOD_PLANET_CRIME_ADD$: §R+20§!"
 gov_shroud_transcendent_imperial: "$auth_shroud_imperial_transcendent$"
 gov_shroud_transcendent_imperial_desc: "$auth_shroud_imperial_transcendent_desc$"
 councilor_ruler_imperial_transcendent: "$imperial_ruler$"
 councilor_ruler_imperial_transcendent_desc: "$imperial_ruler_desc$"
 auth_shroud_corporate_transcendent: "Transzendentes Unternehmen"
 auth_shroud_corporate_transcendent_desc: "Das transzendente Unternehmen verfolgt auch weiterhin seine Kernziele. Durch die Schatten im Schleier kann das Unternehmen die Gedanken von Zielgruppen und Wettbewerbern gleichermaßen lesen und so gänzlich neue Möglichkeiten für psionische Managementstrategien schaffen."
 auth_shroud_corporate_transcendent_tt: "$transcendent_trait_tt$\n$i_trade_value$ ([telepath.GetName]): §G+$@corporate_government_telepaths_trade_value_mult|0%$§!\n$MOD_INTEL_DECRYPTION_ADD$: §G+1§!\n$mod_operations_influence_cost_mult$: §G-20%§!\n$MOD_BRANCH_OFFICE_VALUE_MULT$: §G+20%§!\n$MOD_COUNTRY_ENVOYS_ADD$: §G+1§!"
 gov_shroud_transcendent_corporate: "$auth_shroud_corporate_transcendent$"
 gov_shroud_transcendent_corporate_desc: "$auth_shroud_corporate_transcendent_desc$"
 auth_shroud_hive_transcendent: "Transzendentes Ätherbewusstsein"
 auth_shroud_hive_transcendent_desc: "Dieses Kollektiv begab sich gemeinsam in den Schleier. Es fühlt sich im Schleier nun mehr zu Hause als in seiner alten physischen Form. Jede Reise hinter den Schleier erhöht die kombinierte Weisheit dieses neuen Ätherbewusstseins."
 transcendent_hive_mind_tt: "$transcendent_trait_tt$\n§YAnführer§! erhalten §Y$@transcendent_hive_mind_leader_exp|0$§! Erfahrung für jedes Eintauchen in den Schleier.\n$MOD_PLANET_STABILITY_MULT$: §G+10%§!\n$mod_planet_jobs_complex_drone_produces_mult$: §G+10%§!\n$MOD_EMPIRE_SIZE_MULT$: §G-10%§!\n$MOD_POP_ENVIRONMENT_TOLERANCE$: §R-10%§!"
 gov_shroud_transcendent_hive: "$auth_shroud_hive_transcendent$"
 gov_shroud_transcendent_hive_desc: "$auth_shroud_hive_transcendent_desc$"
 auth_shroud_machine_transcendent: "Transzendierter Mainframe"
 auth_shroud_machine_transcendent_desc: "Dieses Netzwerk verlegte einen Großteil der Rechenleistung in den Schleier, wo Berechnungen in einer noch nie zuvor erreichten Geschwindigkeit getätigt werden können. Systemoperationen im alltäglichen Raum gelten als veraltet."
 transcendent_machine_tt: "$transcendent_trait_tt$\n$@transcendent_machine_research_per_attunement|2=+%$ Forschungsgeschwindigkeit für jeden Einstimmungspunkt\n£physics_research£ £society_research£ £engineering_research£ Zufällige Forschung für jedes §YEintauchen§! in den Schleier\nUnterhalt (§YSubroutinen§!) für jeweils $pop_group_unit$ $job_telepath_swap_plural_with_icon$: $@transcendent_machine_calculator_upkeep|0=-%$\n$MOD_COUNCIL_AGENDA_PROGRESS_SPEED$: §G+25%§!\n£pop£ Bewohner mit der Eigenschaft \"['trait:trait_robot_psionic']\" erhalten $@transcendent_machine_pop_upkeep|0=-%$ Unterhalt\n$mod_station_researchers_produces_mult$: §R-20%§!"
 gov_shroud_transcendent_machine: "$auth_shroud_machine_transcendent$"
 gov_shroud_transcendent_machine_desc: "$auth_shroud_machine_transcendent_desc$"
 transcendent_machine_research_modifier: "$auth_shroud_machine_transcendent$"
 AUTH_HIVE_MIND_GENEMODDING_ASCENDED: "Kann £pop£ §HBewohner§! so modifizieren, dass sie ein Teil des §HSchwarmbewusstseins§! werden"
 MOD_ENVOY_ATTUNEMENT_MULT: "Schleiereinstimmung (Gesandte)"
 REMOVE_FROM_EMPIRE_COUNCIL_EFFECT: "Aus dem Rat entfernen"
 # Corporeal
 corporeal_trait_tt: "$MOD_PSIONIC_AURA_EFFECTIVENESS_MULT$: §G+25%§!\n$AVAILABLE_POLICIES$ ['policy:psionic_choir',$policy_psionic_choir$]"
 auth_shroud_democratic_corporeal: "Spirituelle Vereinigung"
 auth_shroud_democratic_corporeal_desc: "Die Energien des Schleiers verteilten sich demokratisch über dem gesamten Reich. Sie verringern die Lasten des physischen Lebens und sorgen für eine größere physische Einheit unter der Bevölkerung."
 corporeal_democratic_tt: "$corporeal_trait_tt$\nZufriedenheit (Psionische Bewohner): $@corporeal_democratic_psionic_happiness|0=+%$\n$mod_pop_factions_produces_mult$: §G+10%§!\n$MOD_EMPIRE_SIZE_PSIONIC_POPS_MULT$: §G-10%§!\n$mod_planet_jobs_unity_produces_mult$: §G+10%§!\n$MOD_POP_POLITICAL_POWER$: §G+50%§!"
 gov_shroud_corporeal_democracy: "$auth_shroud_democratic_corporeal$"
 gov_shroud_corporeal_democracy_desc: "$auth_shroud_democratic_corporeal_desc$"
 auth_shroud_oligarchic_corporeal: "Prodigokratie"
 auth_shroud_oligarchic_corporeal_desc: "Indem wir unsere Anführer bereits in jungen Jahren einer psychischen Ausbildung unterziehen, kann man sie zu einer Eliteeinheit von Telepathen ausbilden, die über psionische Fähigkeiten verfügen, welche jenseits unserer derzeitigen Vorstellungskraft liegen."
 corporeal_oligarchic_tt: "$corporeal_trait_tt$\n$MOD_LEADER_INITIAL_SKILL$: §G+2§!\n$mod_leaders_upkeep_mult$: §G-25%§!\n$mod_leader_recruitment_age$: §G-15§!\n§YAnführer§! beginnen mit einer zusätzlichen §Rnegativen Eigenschaft§!."
 gov_shroud_corporeal_oligarchy: "$auth_shroud_oligarchic_corporeal$"
 gov_shroud_corporeal_oligarchy_desc: "$auth_shroud_oligarchic_corporeal_desc$"
 auth_shroud_dictatorial_corporeal: "Geweihte Autokratie"
 auth_shroud_dictatorial_corporeal_desc: "Der große Anführer verkörpert die Macht des Schleiers in physischer Form und nutzt die psionische Energie, um seine Herrschaft zu legitimieren. Nichts kann sich seiner ultimativen Vision entgegenstellen."
 auth_shroud_dictatorial_corporeal_tt: "$corporeal_trait_tt$\n+1 §H$EDICT_FUND$§! pro Telepath\n$MOD_COUNCIL_AGENDA_PROGRESS_SPEED$: §G+25%§!\n$MOD_COUNCIL_AGENDA_COOLDOWN_MULT$: §G-25%§!\n$mod_planet_bureaucrats_upkeep_mult$: §G-25%§!"
 gov_shroud_corporeal_dictatorial: "$auth_shroud_dictatorial_corporeal$"
 gov_shroud_corporeal_dictatorial_desc: "$auth_shroud_dictatorial_corporeal_desc$"
 auth_shroud_imperial_corporeal: "Vitales Imperium"
 auth_shroud_imperial_corporeal_desc: "Die kaiserliche Dynastie kanalisiert die Lebenskraft aus dem Schleier. Diese Kraft stärkt die physische Gestalt des Herrschers und seiner Erben, alles dank der Großzügigkeit unseres willigen Volkes."
 auth_shroud_imperial_corporeal_tt: "$corporeal_trait_tt$\nDer §Y$imperial_heir$§! erhält $@corporeal_imperial_heir_xp|0+$ §YERF§! bei der Besteigung des Throns\n$MOD_PSIONIC_AURA_EFFECTIVENESS_MULT$ für jeweils $pop_group_unit$ $job_telepath_swap_plural_with_icon$: $@corporeal_imperial_telepath_effectiveness|0=+%$\n$MOD_ENVOY_IMPROVE_RELATIONS_MULT$: §G+50%§!\n$MOD_ENVOY_HARM_RELATIONS_MULT$: §G+50%§!\n$MOD_ENVOY_ATTUNEMENT_MULT$: §G+50%§!\n$MOD_RULER_SKILL_ADD$: §G+2§!\n$MOD_COUNCILOR_SKILL_ADD$: §G+1§!\n$MOD_LEADER_LIFESPAN_ADD$: §G+10 Jahre§!\n$mod_psionic_pop_bonus_workforce_mult$: §R-20%§!\n$MOD_LOGISTIC_GROWTH_MULT$: §R-5%§!\n$MOD_PLANET_POP_ASSEMBLY_MULT$: §R-5%§!"
 gov_shroud_corporeal_imperial: "$auth_shroud_imperial_corporeal$"
 gov_shroud_corporeal_imperial_desc: "$auth_shroud_imperial_corporeal_desc$"
 auth_shroud_corporate_corporeal: "Rat der Psioniker"
 auth_shroud_corporate_corporeal_desc: "Es wäre töricht, die mentalen Vorteile, die der Schleier bietet, nicht zu nutzen. Dieses Unternehmen errichtet $building_psionic_offices$ in benachbarten Zivilisationen, um die Profitabilität von Handelsabkommen zu erhöhen."
 auth_shroud_corporate_corporeal_tt: "$corporeal_trait_tt$\n$r_trade$ für jeweils $pop_group_unit$ $job_telepath_swap_plural_with_icon$: §G+$@corporate_government_telepaths_trade_value_mult|0%$§!\n$MOD_PSIONIC_AURA_EFFECTIVENESS_MULT$ durch ['building:building_psionic_offices',Psionische Büros]: §G+2%§!\n$mod_planet_branch_offices_influence_cost_mult$: §G-40%§!\n$mod_council_agenda_early_activation_cost_mult$: §G-25%§!\n$MOD_COUNCIL_AGENDA_COOLDOWN_MULT$: §G-25%§!\n$MOD_LEADER_SPECIES_EXP_GAIN$: §G+25%§!"
 gov_shroud_corporeal_corporate: "$auth_shroud_corporate_corporeal$"
 gov_shroud_corporeal_corporate_desc: "$auth_shroud_corporate_corporeal_desc$"
 auth_shroud_hive_corporeal: "Psionischer Nexus"
 auth_shroud_hive_corporeal_desc: "Die Stärke seiner Einstimmung auf den Schleier resoniert in den physischen Formen dieses Kollektivs."
 corporeal_hive_mind_tt: "$corporeal_trait_tt$\n$@corporeal_hive_mind_job_upkeep_per_attunement|2=-%$ $mod_planet_jobs_upkeep_mult$ für jeden Einstimmungspunkt\n$MOD_PLANET_STABILITY_MULT$: §G+10%§!\n$MOD_COUNCIL_AGENDA_PROGRESS_SPEED$: §G+30%§!\n$MOD_COUNCIL_AGENDA_FINISHING_EFFECT_DURATION_MULT$: §G+30%§!"
 gov_shroud_corporeal_hive: "$auth_shroud_hive_corporeal$"
 gov_shroud_corporeal_hive_desc: "$auth_shroud_hive_corporeal_desc$"
 corporeal_hive_mind_upkeep_modifier: "$auth_shroud_hive_corporeal$"
 auth_shroud_machine_corporeal: "Psionisches Gitter"
