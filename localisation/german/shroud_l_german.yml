 ACTION_START_PROXY_WAR_TITLE: "Stellvertreterkrieg beginnen"
 ACTION_START_PROXY_WAR_DESC: "Stachelt andere Reiche dazu an, Krieg gegen §H[Recipient.GetName]§! zu führen."
 ACTION_START_PROXY_WAR_OFFER_DESC: "§H[Actor.GetName]§! hat einen Stellvertreterkrieg gegen §H[Recipient.GetName]§! begonnen."
 ACTION_START_PROXY_WAR_NO_ATTACKERS: "§R$TRIGGER_FAIL$ Es müssen gültige Angreifer ausgewählt werden§!"
 NO_RELATION_CAN_DECLARE_WAR: "§R$TRIGGER_FAIL$ Keiner unserer Kontakte ist in der Lage, diesem Reich den Krieg zu erklären.§!"
 PROXY_WAR_ON_COOLDOWN: "§R$TRIGGER_FAIL$ Wir müssen bis zum §Y[this.proxy_war_cooldown_timer]§! warten, um einen weiteren Stellvertreterkrieg beginnen zu können.§!"
