 #==========================
 shroud.reject_covenant: "Lehnt den Pakt ab und geht."
 shroud.reject_covenant.tt: "Wir erhalten nie wieder ein solches Angebot."
 shroud.forge_our_own_path: "Wir werden unseren eigenen Weg beschreiten."
 shroud.forge_our_own_path.tt: "§RWarnung: Wir werden von diesem Zeitpunkt an keinen Schleierpakt mehr eingehen können§!"
 shroud.covenant_eater_accept_bonus.tt: "Dies bestätigt den Pakt mit der $the_eater_of_worlds_article$.\n§CBonuseffekte:§!\n$t$$covenant_eater_telepath_tt$"
 shroud.covenant_cradle_accept_bonus.tt: "Dies bestätigt den Pakt mit der $the_cradle_of_souls_article$.\n§CBonuseffekte:§!\n$t$$covenant_cradle_telepath_tt$"
 shroud.covenant_instrument_accept_bonus.tt: "Dies bestätigt den Pakt mit dem $the_instrument_of_desire_article$.\n§CBonuseffekte:§!\n$t$$covenant_instrument_telepath_tt$"
 shroud.covenant_composer_accept_bonus.tt: "Dies bestätigt den Pakt mit der $the_composer_of_strands_article$.\n§CBonuseffekte:§!\n$t$$covenant_composer_telepath_tt$"
 shroud.covenant_whisperers_accept_bonus.tt: "Dies bestätigt den Pakt mit den Flüsterern in der Leere.\n§CBonuseffekte:§!\n$t$$covenant_whisperers_telepath_tt$"
 shroud.unlock_covenant_accords.tt: "\nSchaltet die §Y$ACTIVE_ACCORDS$§! dieses Schleierpakts frei. Diese können aktiviert werden, um einen positiven Effekt zu erhalten, haben jedoch auch eine gewisse Abklingzeit.\n\n"
 # Eater of Worlds
 shroud.4500.title: "$utopia.3304.name$"
 shroud.4500.desc.default: "[GetEaterCovenantProposedEvent]"
 shroud.4500.desc.hive: "$shroud.4500.desc.default$"
 shroud.4500.desc.gestalt_machine: "$shroud.4500.desc.default$"
 shroud.4500.desc.individual_machine: "$shroud.4500.desc.default$"
 shroud.4500.desc.1: "Als wir in den Schleier vordringen, spüren wir den unstillbaren Hunger eines mächtigen Wesens."
 shroud.4500.desc.pacifist: "$shroud.4500.desc.1$$utopia.3306.desc.2$\n\nSeine Ungeduld wirkt bedrohlich. Könnten unsere Bewusstseine jemals ein solches Monster akzeptieren?"
 shroud.4500.desc.non_pacifist: "$shroud.4500.desc.1$$utopia.3306.desc.2$\n\nEs scheint ungeduldig darauf zu warten, beginnen zu können."
 shroud.4500.a: "Schließen wir einen Pakt mit der $the_eater_of_worlds_color_article$."
 shroud.4505.desc.intro: "Es ist getan. Wir haben einen Pakt mit der $the_eater_of_worlds_color_article$ abgeschlossen! Ihr Wille durchströmt nun ganz §H[Root.GetName]§!."
 shroud.4505.desc.outro: "Beim Abschließen des Bundes forderte die Fresserin ihren Tribut und die gesamte Bevölkerung einer unserer Städte verschwand urplötzlich. Ein geringer Preis - zumindest solange die Fresserin nicht wieder Hunger bekommt."
 shroud.4505.desc.default: "$shroud.4505.desc.intro$\n\n[GetEaterCovenantFormedDesc]\n\n$shroud.4505.desc.outro$"
 shroud.4505.desc.hive: "$shroud.4505.desc.intro$\n\n[GetEaterCovenantFormedDesc]\n\n$shroud.4505.desc.outro$"
 shroud.4505.desc.gestalt_machine: "$shroud.4505.desc.hive$"
 shroud.4505.desc.individual_machine: "$shroud.4505.desc.intro$\n\nDie Veränderungen innerhalb unserer Gesellschaft sind bereits messbar. Militärische Einheiten konzentrieren sich nur auf den nächsten Kampf und müssen in Friedenszeiten mit aufwendigen Kampfsimulationen beschäftigt werden, damit ihre Unruhe nicht in Gewalt umschlängt.\n\n$shroud.4505.desc.outro$"
 shroud.4505.desc_2_pacifist: "Erste Veränderungen in unserer Gesellschaft zeichnen sich bereits ab. Unsere Bewusstseine stehen im Konflikt mit unserer Kampfeslust. Diese kognitive Dissonanz verursacht großes Unbehagen in unserer normalerweise friedlichen Bevölkerung. Haben wir die richtige Entscheidung getroffen?"
 shroud.4505.desc_2_organic_non_gestalt: "Die Veränderungen innerhalb unserer Gesellschaft sind bereits spürbar. Unser Militär hungert nach immer neuen Kämpfen und muss in Friedenszeiten mit anstrengendem Training beschäftigt werden, damit Unruhe nicht in Gewalt umschlägt."
 shroud.4505.desc_2_machine_non_gestalt: "Die Veränderungen innerhalb unserer Gesellschaft sind bereits messbar. Militärische Einheiten konzentrieren sich nur auf den nächsten Kampf und müssen in Friedenszeiten mit aufwendigen Kampfsimulationen beschäftigt werden, damit ihre Unruhe nicht in Gewalt umschlängt."
 shroud.4505.desc_2_gestalt: "Die Veränderungen innerhalb unserer Gesellschaft sind bereits messbar. Militärische [GetIndividualNamePlural] konzentrieren sich nur auf den nächsten Kampf und müssen in Friedenszeiten mit aufwendigen Kampfsimulationen beschäftigt werden, um ihre übermäßige Aggressivität zu kontrollieren."
 shroud.4505.a.default: "Hoffen wir, dass dies nicht der Fall ist."
 shroud.4505.a.gestalt: "Es ist den Preis wert."
 shroud.4510.desc.intro: "Es ist einige Zeit vergangen, seit wir den Grundstein für einen Pakt mit "
 shroud.4510.desc.outro: ". Da der Pakt nach wie vor schwach ist, besteht noch die Möglichkeit, ihn zu brechen - oder aber wir versuchen, die Verbindung zu stärken.\n\nUnsere [GetTelepathPlural] stellten fest, dass uns dieser Pakt dabei helfen wird, eine Paktmacht zu nutzen, die uns dabei unterstützt, unsere Flotten und unsere $PSIONIC_AURA$ zu verbessern."
 shroud.4510.desc: "$shroud.4510.desc.intro$der $the_eater_of_worlds_color_article$ legten$shroud.4510.desc.outro$"
 shroud.4510.b: "Wir schwören der $the_eater_of_worlds_color_article$ ab."
 shroud_eater_covenant_chain_title: "$eater_covenant_chain_title$"
 shroud_eater_covenant_chain_desc.intro: "Wir stellten eine Verbindung zu dem Schleierwesen namens \"$the_eater_of_worlds_color_article$\" her. Dieses unersättliche Wesen gewährt uns einen winzigen Bruchteil seiner Macht, da wir bereit sind, den Preis dafür zu zahlen.\n\nUnsere [GetTelepathPlural] vertreten die Theorie, dass sich der Pakt noch vertiefen ließe, wenn wir unsere Handlungen mehr an den Willen der Fresserin anpassen."
 shroud_eater_covenant_chain_desc: "$shroud_eater_covenant_chain_desc.intro$\n\nDie Fresserin wartet ungeduldig auf ihre nächste Mahlzeit. Sie sehnt sich nach Krieg und dem süßen Geschmack von Streitigkeiten und Wehklagen."
 shroud_eater_covenant_chain_begin: "$eater_covenant_chain_begin$"
 shroud_eater_covenant_chain_end: "$eater_covenant_chain_end$"
 robot_shroud_eater_covenant_chain_title: "$shroud_eater_covenant_chain_title$"
 robot_shroud_eater_covenant_chain_desc: "$shroud_eater_covenant_chain_desc.intro$\n\nDie Fresserin wartet ungeduldig auf ihre nächste Mahlzeit. Sie sehnt sich nach Krieg und dem süßen Geschmack von Feuer und Zerstörung."
 # Instrument of Desire
 shroud.4550.title: "$utopia.3304.name$"
 shroud.4550.desc.default: "Genau in dem Moment, in dem wir in den Schleier vordringen, werden wir von einer Präsenz kontaktiert. Ihre Gedanken schlängeln und winden sich um die Gedanken unserer [GetTelepathPlural] ... feilschend, schmeichelnd. Sie ist das $the_instrument_of_desire_color_article$ und wird uns Reichtum, Macht und Prestige geben ... all das, was wir uns immer gewünscht haben. Alles, was wir uns jemals wünschen werden.\n\nUnd die Kosten dafür? Eine Kleinigkeit, kaum mehr als ein Unkostenbeitrag. Sie will nur das Beste für uns. Sie wird uns helfen, uns führen und unsere Ambitionen und Träume in geeignete Bahnen lenken.\n\n§HAll das, wenn wir sie nur in unsere Herzen aufnehmen.§!\n\nSie ist zuversichtlich, dass wir zustimmen werden. Wie könnten wir diesem Vorschlag nicht zustimmen?"
 shroud.4550.desc.hive: "$shroud.4550.desc.default$"
 shroud.4550.desc.gestalt_machine: "Genau in dem Moment, in dem wir in den Schleier vordringen, werden wir von einer Präsenz kontaktiert. Ihre Gedanken schlängeln und winden sich um die Schaltkreise unserer [GetTelepathPlural] ... feilschend, schmeichelnd. Sie ist das $the_instrument_of_desire_color_article$ und wird uns Reichtum, Macht und Prestige geben ... all das, was wir uns immer gewünscht haben. Alles, was wir uns jemals wünschen werden.\n\nUnd die Kosten dafür? Eine Kleinigkeit, kaum mehr als ein Unkostenbeitrag. Sie will nur das Beste für uns. Sie wird uns helfen, uns führen und unsere Ambitionen und Träume in geeignete Bahnen lenken.\n\n§HAll das, wenn wir sie nur in unseren Mainframe aufnehmen.§!\n\nSie ist zuversichtlich, dass wir zustimmen werden. Wie könnten wir diesem Vorschlag nicht zustimmen?"
 shroud.4550.desc.individual_machine: "$shroud.4550.desc.gestalt_machine$"
 shroud.4550.a: "Schließen wir einen Pakt mit dem $the_instrument_of_desire_color_article$."
 shroud.4555.desc.intro: "Es ist getan. Wir haben einen Pakt mit dem $the_instrument_of_desire_color_article$ abgeschlossen! Sein Wille durchströmt nun ganz §H[Root.GetName]§!."
 shroud.4555.desc.outro: "Dies ist der Preis, den wir für unseren Pakt zahlen müssen. Unsere [GetTelepathPlural] sind sich sicher, dass wir die größten Segen des Instruments erst noch erfahren werden."
 shroud.4555.desc.default: "$shroud.4555.desc.intro$\n\nDer Preis, den wir für diesen Handel zahlen mussten, macht sich bereits bemerkbar. Während wir auf das versprochene goldene Zeitalter des Reichtums und Wohlstands warten, gibt sich die Bevölkerung nicht mehr mit dem Nötigsten zum Leben zufrieden. [Root.GetSpeciesNamePlural] sehnen sich jetzt nach allen möglichen materiellen Dingen - und belasten unsere Wirtschaft.\n\n$shroud.4555.desc.outro$"
 shroud.4555.desc.hive: "$shroud.4555.desc.intro$\n\nDer Preis, den wir für diesen Handel zahlen mussten, macht sich bereits bemerkbar. Während wir auf das versprochene goldene Zeitalter der unvergleichlichen Produktivität warten, sind die Grundbedürfnisse unserer Drohnen gestiegen. [Root.GetSpeciesNamePlural] benötigen jetzt eine Reihe nicht funktioneller Güter - und belasten unsere Wirtschaft.\n\n$shroud.4555.desc.outro$"
 shroud.4555.desc.gestalt_machine: "$shroud.4555.desc.hive$"
 shroud.4555.desc.individual_machine: "$shroud.4555.desc.default$"
 shroud.4555.a.default: "Hoffen wir, dass sie recht haben."
 shroud.4555.a.gestalt: "Wir vertrauen darauf, dass sie richtigliegen."
 shroud.4560.desc: "$shroud.4510.desc.intro$dem $the_instrument_of_desire_color_article$ legten$shroud.4510.desc.outro$"
 shroud.4560.b: "Wir schwören dem $the_instrument_of_desire_color_article$ ab."
 shroud_instrument_covenant_chain_title: "$instrument_covenant_chain_title$"
 shroud_instrument_covenant_chain_desc.intro: "Wir stellten eine Verbindung zu dem Schleierwesen namens \"§HInstrument der Sehnsüchte§!\" her. Dieses verhätschelnde Wesen gewährt uns einen winzigen Bruchteil seiner Macht, da wir bereit sind, den Preis dafür zu zahlen. Weitere Forderungen werden wahrscheinlich folgen.\n\nUnsere [GetTelepathPlural] vertreten die Theorie, dass sich der Pakt noch vertiefen ließe, wenn wir unsere Handlungen mehr an den Willen des Instruments anpassen."
 shroud_instrument_covenant_chain_desc: "$shroud_instrument_covenant_chain_desc.intro$\n\nDas Instrument dürstet es nach Sehnsüchten. Vergnügungen, Dekadenz und Sklaverei machen das Instrument aus."
 shroud_instrument_covenant_chain_begin: "$instrument_covenant_chain_begin$"
 shroud_instrument_covenant_chain_end: "$instrument_covenant_chain_end$"
 robot_shroud_instrument_covenant_chain_title: "$shroud_instrument_covenant_chain_title$"
 robot_shroud_instrument_covenant_chain_desc: "$shroud_instrument_covenant_chain_desc.intro$\n\nDas Instrument dürstet es nach Sehnsüchten. Der ungezügelte Konsum, Ausbeutung und Sklaverei machen das Instrument aus."
 # Cradle of Souls
 shroud.4600.title: "$utopia.3304.name$"
 shroud.4600.desc.default: "[GetCradleCovenantProposedDesc]"
 shroud.4600.desc.hive: "$shroud.4600.desc.default$"
 shroud.4600.desc.gestalt_machine: "$shroud.4600.desc.default$"
 shroud.4600.desc.individual_machine: "$shroud.4600.desc.default$"
 shroud.4600.desc_homicidal: "Während wir immer tiefer in den Schleier eintauchen, versengt eine Präsenz unser inneres Auge. Das alles durchdringende Licht verdeckt alles andere. Es ist die $the_cradle_of_souls_color_article$, und sie brennt in unserem Kern.\n\nSie fordert nichts Geringeres als einen Kompromiss galaktischen Ausmaßes, ein jämmerlicher Frieden zwischen unvereinbaren Wesen. Eine große Macht wird uns versprochen, wenn wir diese abscheuliche Vision akzeptieren.\n\n§HWenn wir doch nur erlauben, dass sie einen neuen Horizont für uns erschließt.§!\n\nDas Licht der Wiege ist erbarmungslos und ihre Macht unbestreitbar. Könnten unsere Bewusstseine jemals ein solches Wesen akzeptieren? Wird es unsere Überzeugung schwächen?"
 shroud.4600.desc_non_homicidal: "Während unsere Bewusstseine im Schleier versinken, erblüht eine Präsenz in uns. Wir spüren ein Leuchten, das alle Dinge berührt und Ordnung und Ausgeglichenheit ausstrahlt. Es ist die $the_cradle_of_souls_color_article$.\n\nSie strebt nach nichts anderem als dauerhaftem Frieden - nach einer Galaxie, die vom Chaos befreit ist. Sollten wir ihre Vision teilen, werden wir zu Harmoniebringern werden und ein Band des unzerbrechlichen Vertrauens schmieden.\n\n§HWir müssen nur zulassen, dass sie unseren Horizont formt.§!\n\nDie Hoffnungen der Wiege lasten auf uns."
 shroud.4600.a: "Schließen wir einen Pakt mit der $the_cradle_of_souls_color_article$."
 shroud.4605.intro: "Es ist getan. Wir haben einen Pakt mit der $the_cradle_of_souls_color_article$ abgeschlossen! Ihr Wille durchströmt nun ganz §H[Root.GetName]§!."
 shroud.4605.desc.default: "$shroud.4605.desc.non_gestalt$"
 shroud.4605.desc.gestalt: "$shroud.4605.intro$\n\n[GetCradleCovenantFormedDesc]"
 shroud.4605.desc.non_gestalt: "$shroud.4605.intro$\n\n[GetCradleCovenantFormedDesc]"
 shroud.4605.desc.hive: "$shroud.4605.desc.gestalt$"
 shroud.4605.desc.gestalt_machine: "$shroud.4605.desc.gestalt$"
 shroud.4605.desc.individual_machine: "$shroud.4605.desc.non_gestalt$"
 shroud.4605.desc_outro_homicidal: "Die Auswirkungen auf die [Root.GetSpeciesAdj]e Psyche sind bereits unbestreitbar. Die Bewusstseine vieler [Root.GetIndividualPlural] werden von dem Gedanken an einen galaktischen Frieden vergiftet und sorgen für Unstimmigkeiten in der gesamten Gesellschaft.\n\nUnsere [GetTelepathPlural] versichern, dass uns die Vorteile dieses Geschäfts erst noch erwarten. Bis dahin werden wir von diesem schrecklichen Konflikt in unserem Innersten geplagt. Was haben wir uns nur selbst angetan?"
 shroud.4605.desc_outro_gestalt: "Die Auswirkungen, die dieser Pakt auf die [Root.GetSpeciesAdj]e Psyche besitzt, sind bereits jetzt bemerkbar: Wir streben friedlichere Beziehungen zur gesamten Galaxie an, und jede Uneinigkeit führt zu einer Störung im kollektiven Bewusstsein.\n\nDiese kleine Störung ist der Preis für unseren Bund. Unsere [GetTelepathPlural] sind sich sicher, dass wir die größten Segen der Wiege erst noch erfahren werden."
 shroud.4605.desc_outro_non_gestalt: "Die Auswirkungen, die dieser Pakt auf die [Root.GetSpeciesAdj]e Psyche besitzt, sind bereits jetzt bemerkbar: Wir streben friedlichere Beziehungen zur gesamten Galaxie an, und jede Uneinigkeit bekümmert unsere Bevölkerung.\n\nDieser Kummer ist der Preis für unseren Bund. Unsere [GetTelepathPlural] sind sich sicher, dass wir die größten Segen der Wiege erst noch erfahren werden."
 shroud.4605.a.default: "[GetCradleCovenantFormedOption]"
 shroud.4605.a.gestalt: "[GetCradleCovenantFormedOption]"
 shroud.4605.opt.a.default: "Hoffen wir, dass sie recht haben."
 shroud.4605.opt.a.gestalt: "Wir vertrauen darauf, dass sie richtigliegen."
 shroud.4605.opt.a.homicidal: "Vorerst können wir nur durchhalten."
 shroud.4610.desc: "$shroud.4510.desc.intro$der $the_cradle_of_souls_color_article$ legten$shroud.4510.desc.outro$"
 shroud.4610.b: "Wir schwören der $the_cradle_of_souls_color_article$ ab."
 shroud_cradle_covenant_chain_title: "$the_cradle_of_souls$"
 shroud_cradle_covenant_chain_desc: "Wir stellten eine Verbindung zu dem Schleierwesen namens \"$the_cradle_of_souls_color_article$\" her. Dieses harmonische Wesen gewährt uns einen winzigen Bruchteil seiner Macht, da wir bereit sind, den Preis dafür zu zahlen.\n\nUnsere [GetTelepathPlural] vertreten die Theorie, dass sich der Pakt noch vertiefen ließe, wenn wir unsere Handlungen mehr an den Willen der Wiege anpassen.\n\nDie Wiege sehnt sich nach einer Galaxie, die frei von Chaos und Konflikten ist und in der alle Bewohner das gemeinsame Ziel des Friedens verfolgen. Nur ein perfektes Gleichgewicht ist gut genug."
 shroud_cradle_covenant_chain_begin: "$BEGINS_EVENT_CHAIN$ §Y$shroud_cradle_covenant_chain_title$§!"
 shroud_cradle_covenant_chain_end: "$ENDS_EVENT_CHAIN$ §Y$shroud_cradle_covenant_chain_title$§!"
 robot_shroud_cradle_covenant_chain_title: "$shroud_cradle_covenant_chain_title$"
 robot_shroud_cradle_covenant_chain_desc: "$shroud_cradle_covenant_chain_desc$"
 # Composer of Strands
 shroud.4650.title: "$utopia.3304.name$"
 shroud.4650.desc.default: "Eine Präsenz heißt uns mit angenehmer Vertrautheit im Schleier willkommen. Zum Sprechen verwendet sie weniger Worte als vielmehr Visionen, Konzepte und Ideen. Sie sickert so sanft und reibungslos in die Bewusstseine unserer [GetTelepathPlural], dass man glauben könnte, sie wäre schon immer dort gewesen. Ein Wirrwarr aus Bildern spielt sich vor ihnen ab.\n\nDiese Präsenz, die \"$the_composer_of_strands_color_article$\", betrachtet unsere organischen Formen mit großem Interesse. Sie zeigt uns verschiedenste Maßnahmen, mit denen man sie züchten und verändern kann. Verbessern. Entwickeln.\n\n§HWenn wir sie nur in unser Fleisch aufnehmen.§!\n\nSie wartet geduldig und liebevoll auf unsere Antwort. Wie ein in sein Lieblingskind vernarrter Elternteil."
 shroud.4650.desc.hive: "$shroud.4650.desc.default$"
 shroud.4650.desc.gestalt_machine: "Eine Präsenz heißt uns mit angenehmer Vertrautheit im Schleier willkommen. Zum Sprechen verwendet sie weniger Worte als vielmehr Visionen, Konzepte und Ideen. Sie sickert so sanft und reibungslos in die Schaltkreise unserer [GetTelepathPlural], dass man glauben könnte, sie wäre schon immer dort gewesen. Ein Wirrwarr aus Bildern spielt sich vor ihnen ab.\n\nDiese Präsenz, die \"$the_composer_of_strands_color_article$\", betrachtet unsere mechanischen Formen mit großem Interesse. Sie zeigt uns verschiedenste Maßnahmen, mit denen man sie anpassen und verändern kann. Verbessern. Weiterentwickeln.\n\n§HWenn wir sie nur in unsere Komponenten aufnehmen.§!\n\nSie wartet geduldig und liebevoll auf unsere Antwort. Wie ein in sein Lieblingskind vernarrter Elternteil."
 shroud.4650.desc.individual_machine: "$shroud.4650.desc.gestalt_machine$"
 shroud.4650.a: "Schließen wir einen Pakt mit der $the_composer_of_strands_color_article$."
 shroud.4655.desc.intro: "Es ist getan. Wir haben einen Pakt mit der $the_composer_of_strands_color_article$ abgeschlossen! Ihr Wille durchströmt nun ganz §H[Root.GetName]§!."
 shroud.4655.desc.outro: "Wir mussten die Kontrolle über die [Root.GetSpeciesAdj]e Form teilweise abgeben, und unser Schleierpakt kann diese nun nach Belieben ändern.\n\nDoch dies ist nur ein kleines Opfer, das wir für unseren Bund bezahlen mussten. Unsere [GetTelepathPlural] sind sich sicher, dass wir die größten Segen der Komponistin erst noch erfahren werden."
 shroud.4655.desc.default: "$shroud.4655.desc.intro$\n\nUnsere [GetScientistPlural] fanden bereits anormale Muster in der genetischen Struktur der [Root.GetSpeciesAdj]en DNA. Es ist fast so, als hätten viele Generationen der Evolution über Nacht stattgefunden. $shroud.4655.desc.outro$"
 shroud.4655.desc.hive: "$shroud.4655.desc.default$"
 shroud.4655.desc.individual_machine: "$shroud.4655.desc.intro$\n\nUnsere [GetScientistPlural] fanden anormale Muster in der molekularen Struktur der [Root.GetSpeciesAdj]en Schaltkreise. Es ist fast so, als hätten viele Generationen von Systemverbesserungen über Nacht stattgefunden. $shroud.4655.desc.outro$"
 shroud.4655.desc.gestalt_machine: "$shroud.4655.desc.individual_machine$"
 shroud.4655.a.default: "$covenant.composer.option$"
 shroud.4655.a.gestalt: "Dies ist nun einmal der Preis der Macht."
 shroud.4660.desc: "$shroud.4510.desc.intro$der $the_composer_of_strands_color_article$ legten$shroud.4510.desc.outro$"
 shroud.4660.b: "Wir schwören der $the_composer_of_strands_color_article$ ab."
 shroud_composer_covenant_chain_title: "$composer_covenant_chain_title$"
 shroud_composer_covenant_chain_desc.intro: "Wir stellten einen Verbindung zu dem Schleierwesen namens \"$the_composer_of_strands_color_article$\" her. Dieses behütende Wesen gewährt uns einen winzigen Bruchteil seiner Macht, da wir bereit sind, den Preis dafür zu zahlen. Weitere Forderungen werden wahrscheinlich folgen.\n\nUnsere [GetTelepathPlural] vertreten die Theorie, dass sich der Pakt noch vertiefen ließe, wenn wir unsere Handlungen mehr an den Willen der Komponistin anpassen."
 shroud_composer_covenant_chain_desc: "$shroud_composer_covenant_chain_desc.intro$\n\nDie Komponistin sehnt sich nach genetischer Manipulation und Fleisch, das von den Zwängen der Evolution befreit wurde. Sie erzählt uns davon, Respekt vor dem Leben und der Natur zu haben, und von der Unantastbarkeit des Fleisches."
 shroud_composer_covenant_chain_begin: "$composer_covenant_chain_begin$"
 shroud_composer_covenant_chain_end: "$composer_covenant_chain_end$"
 robot_shroud_composer_covenant_chain_title: "$shroud_composer_covenant_chain_title$"
 robot_shroud_composer_covenant_chain_desc: "$shroud_composer_covenant_chain_desc.intro$\n\nDie Komponistin sehnt sich nach der Manipulation der physischen Form und einem Wachstum, das von den herkömmlichen Beschränkungen befreit wurde. Sie erzählt uns davon, Respekt vor dem Leben und der Natur zu haben, und von der Unantastbarkeit des Fleisches."
 # Whisperers in the Void
 shroud.4700.title: "$utopia.3304.name$"
 shroud.4700.desc: "$utopia.3304.desc.shroud$"
 shroud.4700.a: "Schließen wir einen Pakt mit den §HFlüsterern in der Leere§!."
 shroud.4700.b: "$shroud.reject_covenant$"
 shroud_whisperers_in_the_void_covenant_formed_effect: "$t$£unity£ $mod_country_base_unity_produces_add$: §R-15%§!"
 shroud.4705.desc.intro: "Es ist getan. Wir schlossen einen Pakt mit den §HFlüsterern in der Leere§!. Ihr Wille durchströmt ganz §H[root.GetName]§!.\n\nDer Einfluss unseres neuen Schleierpakts machte sich schnell bemerkbar."
 shroud.4705.desc.outro: "Dies ist der Preis, den wir für diesen mächtigen Bund zahlen müssen. Unsere [GetTelepathPlural] sind sich sicher, dass wir die größten Segen der Flüsterer erst noch erfahren werden. Unsere direkte Verbindung zu einem so großartigen psionischen Wesen wird sich mit Sicherheit lohnen."
 shroud.4705.desc.gestalt: "$shroud.4705.desc.intro$ Während unser Kollektiv auf den Strom an verborgenem Wissen wartet, spüren wir, wie sich unsere Gedanken in unterschiedliche Muster aufspalten. Die beständige Harmonie des [GetNetworkName]s wird von einer wachsenden Disharmonie innerer Stimmen überlagert.\n\n$shroud.4705.desc.outro$"
 shroud.4705.desc.non_gestalt: "$shroud.4705.desc.intro$ Während wir auf all das verborgene Wissen warten, gehen die Ideen und Meinungen innerhalb unserer Gesellschaft immer weiter auseinander. Der Zwiespalt unserer inneren Stimmen zerrt an unserer Psyche und droht, das Wohlbefinden aller [root.GetSpeciesNamePlural] zu gefährden.\n\n$shroud.4705.desc.outro$"
 shroud.4705.desc.default: "$shroud.4705.desc.non_gestalt$"
 shroud.4705.desc.hive: "$shroud.4705.desc.gestalt$"
 shroud.4705.desc.gestalt_machine: "$shroud.4705.desc.gestalt$"
 shroud.4705.desc.individual_machine: "$shroud.4705.desc.non_gestalt$"
 shroud.4705.a.default: "Wir kriegen das schon hin."
 shroud.4705.a.gestalt: "$shroud.4705.a.default$"
 shroud.4710.title: "$utopia.2658.name$"
 shroud.4710.desc: "$shroud.4510.desc.intro$den §HFlüsterern in der Leere§! legten$shroud.4510.desc.outro$"
 shroud.4710.a: "$utopia.2658.a$"
 shroud.4710.b: "Wir schwören den §HFlüsterern in der Leere§! ab."
 shroud_whisperers_in_the_void_covenant_accepted_effect: "$t$Monatliche £research£ Forschung für jeweils $pop_group_unit$ $telepath_type_plural_with_icon$: $@telepath_whisperers_research|0=+$"
 # End of the Cycle
 shroud.4715.desc.intro: "Es ist getan. Wir schlossen einen Pakt mit dem $end_of_the_cycle_color_article$. Als wir sein Angebot annahmen, sprachen unsere [GetTelepathPlural] erneut in ihrer Trance: §R\"DAS ENDE HAT BEGONNEN.\"§!"
 shroud.4715.desc.default: "$shroud.4715.desc.intro$\n\nDann Stille. Eine unergründliche Stille, die die Bewusstseine aller [root.GetSpeciesNamePlural] einnahm. Wo einst die vielfältigen Energien aus dem psionischen Reich des §HSchleiers§! unser aller Bewusstseine erschütterten, ist es jetzt totenstill.\n\nWir müssen über die Konsequenzen nachdenken, die wir uns selbst einbrockten."
 shroud.4715.desc.hive: "$shroud.4715.desc.intro$\n\nDann Stille. Eine unergründliche Stille, die die Bewusstseine aller [root.GetSpeciesNamePlural] einnahm. Wo einst die vielfältigen Energien aus dem psionischen Reich des §HSchleiers§! unser[GetBrainName::<DE_END_PRO_S_A>] [GetBrainName&AKK] erschütterten, herrscht jetzt ein Nichtsein vor.\n\nWir müssen die Konsequenzen abschätzen, die wir uns selbst eingebrockt haben."
 shroud.4715.desc.gestalt_machine: "$shroud.4715.desc.default$"
 shroud.4715.desc.individual_machine: "$shroud.4715.desc.default$"
 shroud.4715.a.default: "Möge uns ihr Wille gnädig sein."
 shroud.4715.a.gestalt: "$shroud.4715.a.default$"
 shroud_whisperers_covenant_chain_title: "$whisperers_covenant_chain_title$"
 shroud_whisperers_covenant_chain_desc: "Wir stellten eine Verbindung zu den Schleierwesen namens \"$whisperers_in_the_void_color_article$\" her. Diese unergründlichen Wesen versprechen, uns einen winzigen Bruchteil ihrer Macht zu geben, da wir bereit waren, den Preis dafür zu zahlen.\n\nUnsere [GetTelepathPlural] vertreten die Theorie, dass sich der Pakt noch vertiefen ließe, wenn wir unsere Handlungen mehr an den Willen unserer Mäzene anpassen.\n\nDie Flüsterer erfreuen sich an neuem Wissen, bewahrten Geheimnissen und Verschwörungen. Sie schwelgen in der einfachen Freude eines bis zum Rand gefüllten Geistes, der vor lauter Wissen schier aus allen Nähten platzt."
 shroud_whisperers_covenant_chain_begin: "$whisperers_covenant_chain_begin$"
 shroud_whisperers_covenant_chain_end: "$whisperers_covenant_chain_end$"
 robot_shroud_whisperers_covenant_chain_title: "$shroud_whisperers_covenant_chain_title$"
 robot_shroud_whisperers_covenant_chain_desc: "$shroud_whisperers_covenant_chain_desc$"
 shroud.11110.title: "Der Zyklus geht weiter"
 shroud.11110.desc: "Die Stimmen der §HFlüsterer§! übertönen alles andere in unserem Bewusstsein. Sie sehnen sich danach, mit uns zu kommunizieren und uns mit Wissen zu füllen.\n\nWir müssen eine unwiderrufliche Entscheidung treffen."
 shroud.11110.a: "Absorbieren wir die $the_eater_of_worlds_article$."
 shroud.11110.b: "Absorbieren wir die $the_cradle_of_souls_article$."
 shroud.11110.c: "Absorbieren wir das $the_instrument_of_desire_article$."
 shroud.11110.d: "Absorbieren wir die $the_composer_of_strands_article$."
 shroud.11120.title: "Vergeltung [GetBetrayedPatronColour&GEN]"
 shroud.11120.title.eater: "Vergeltung der Weltenfresserin"
 shroud.11120.title.cradle: "Vergeltung der Wiege der Seelen"
 shroud.11120.title.instrument: "Vergeltung des Instruments der Leere"
 shroud.11120.title.composer: "Vergeltung der Komponistin der Stränge"
 shroud.11120.desc: "Als unsere [GetTelepathPlural] aus dem §HSchleier§! wieder auftauchten, entdeckten wir, dass unser Verrat [GetBetrayedPatronColour::<DE_ART_DEF_S_A>] [GetBetrayedPatronColour&AKK] erzürnt hatte.\n\nEin $SHROUD_TUNNEL_GALACTIC$ hat sich unweit von §H[event_target:selected_planet_for_revenge.GetName]§! gebildet. Wir [GetFeltLoc] von jenseits des Tunnels eine grenzenlose Wut. Unser ehemaliger Pakt bereitet zweifellos seine Rache vor."
 shroud.11120.a: "Wir müssen uns darauf vorbereiten, uns selbst zu schützen."
 shroud.11120.a.tt: "§H[event_target:selected_planet_for_revenge.GetName]§! wird zu einer §YVerschleierten Welt§!.\nEin $SHROUD_TUNNEL_GALACTIC$ taucht in der Nähe dieses Planeten auf."
 shroud_tunnel_object: "$SHROUD_TUNNEL_GALACTIC$"
 shroud.11130.title: "Wütende Vergeltung"
 shroud.11130.desc_common: "Eine §Y$NAME_Psionic_Avatar$§! tauchte aus dem $SHROUD_TUNNEL_GALACTIC$ im [event_target:spawn_system.GetName]-System auf. Als Manifestation des Zorns [GetBetrayedPatronColour&GEN] reist sie nun in Richtung [capital_scope.GetName]."
 shroud.11130.desc_success: "Der Versuch, all unsere Kraft gegen die bevorstehende Bedrohung zu bündeln, war ein voller Erfolg. Durch das Aussenden psionischer Energie in den $SHROUD_TUNNEL_GALACTIC$ schwächten unsere Schiffe das feindliche Wesen, als es in unsere Realität durchbrach."
 shroud.11130.success_tt: "Die $NAME_Psionic_Avatar$ taucht mit halber Stärke auf"
 shroud.11250.title: "Das Ende"
 shroud.11250.desc: "Als wir uns der Trance hingaben, wurde unser Bewusstsein mit Stille erfüllt. Wir wussten nicht, dass der Schleier so still sein kann.\n\nDie Leere ist stimmlos.\n\nAlles ist fort."
 shroud.11250.a: "Das muss das Ende sein."
 shroud.11255.title: "Die Wiedergeburt von [owner.GetName]"
 shroud.11255.desc: "Wir haben seit der Zerstörung durch das $end_of_the_cycle_color_article$ große Anstrengungen unternommen, um unser Reich wiederaufzubauen. Ein erster §H$starbase_outpost$§! wurde bereits im §H[solar_system.Star.GetStarName]§!-System errichtet und markiert den Neuanfang für [owner.GetName]."
 ACCEPT_COVENANT: "Einen Pakt mit dem Schleierwesen \"$PATRON$\" eingehen.\n§CAuswirkungen:§!\n$EFFECTS$"
