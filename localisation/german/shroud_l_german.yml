 shroud.1510.title: "Psionische Auren stoßen aufeinander"
 shroud.1510.desc: "Unsere §H$PSIONIC_AURA$§! im [from.GetName]-System kämpft gegen eine gegensätzliche Aura, die ihren Ursprung im nahen [fromfrom.GetName]-System hat. Unsere psionischen [GetResearchers] modellierten ein solches Verhalten bereits in der Vergangenheit, doch dies ist das erste Mal, dass wir dieses Phänomen aus nächster Nähe miterleben.\n\nDer Theorie zufolge wird die stärkere Aura - also die mit einer größeren Intensität - die gegensätzliche Aura allmählich schwächen. Sollte dies zum vollständigen Zerfall führen, kann die dominierende Aura in das nun aurenleere System einströmen.\n\nEs ist im wahrsten Sinn des Wortes ein Kampf der Bewusstseine."
 shroud.1510.a: "Unser Wille wird triumphieren."
 shroud.1550.title: "Die Macht des Willens"
 shroud.1550.desc.common_1: "Unsere Vorstöße in den §HSchleier§! führten dazu, dass dessen Energien in den beobachtbaren Raum gelangten. Obwohl die Auswirkungen selbst erheblich sind, traten sie zum Glück nur vereinzelt auf."
 shroud.1550.desc.common_2: "Unsere Taten wirken sich auf den gesamten Schleier aus und bringen uns näher an mächtige Wesen heran. Sollten wir in der Gunst dieser Wesen stehen, könnten wir ihre psionische Energie in die physische Realität leiten. Unsere [GetTelepathPlural] vermuten, dass die daraus resultierende \"Aura\" unser eigenes Reich"
 shroud.1550.desc_1.knows: "$shroud.1550.desc.common_1$ \"§H$PSIONIC_AURA_PLURAL$§!\" sind ein Weg, um ihren Einfluss in einen konstanten Fluss umzuwandeln."
 shroud.1550.desc_1.default: "$shroud.1550.desc.common_1$ Laut Theorien zu \"§HPsionischen Auren§!\" ist dies ein guter Weg, um ihren Einfluss in einen konstanten Fluss umzuwandeln."
 shroud.1550.desc.knows: "$shroud.1550.desc_1.knows$\n\n$shroud.1550.desc.common_2$ und die unserer Verbündeten deutlich stärken würde, während sie jene schwächt, die sich uns entgegenstellen. Dies wurde bereits in der Vergangenheit beobachtet."
 shroud.1550.desc.knows.homicidal: "$shroud.1550.desc_1.knows$\n\n$shroud.1550.desc.common_2$ deutlich stärken würde, während sie jene schwächt, die sich uns entgegenstellen. Dies wurde bereits in der Vergangenheit beobachtet."
 shroud.1550.desc.default: "$shroud.1550.desc_1.default$\n\n$shroud.1550.desc.common_2$ und die unserer Verbündeten deutlich stärken würde, während sie jene schwächt, die sich uns entgegenstellen."
