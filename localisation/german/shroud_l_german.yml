 # Whisperers in the Void accords
 ACCORD_KNOWLEDGE: "Wissen"
 ACCORD_KNOWLEDGE_desc: "Die $whisperers_in_the_void_article_cap$ teilen ihre geheimsten Geheimnisse mit uns."
 ACCORD_WISDOM: "Weisheit"
 ACCORD_WISDOM_desc: "Die $whisperers_in_the_void_article_cap$ verfügen über das Wissen aller Domänen innerhalb des Schleiers."
 ACCORD_FORESIGHT: "Weitsicht"
 ACCORD_FORESIGHT_desc: "Die $whisperers_in_the_void_article_cap$ besitzen zeitloses Wissen."
 ACCORD_FORESIGHT_TT: "Fügt den derzeitig erforschten Technologien §G$@foresight_tech_progression|0%$§! Fortschritt hinzu"
 ACCORD_HINDSIGHT: "Zurückblicken"
 ACCORD_HINDSIGHT_desc: "Die $whisperers_in_the_void_article_cap$ verfügen über einen Kodex von Welten aus Zeiten und Dimensionen, die uns unbekannt sind. Wir müssen nur eine der Seiten umblättern."
 ACCORD_HINDSIGHT_TT: "Wir können eine Kolonie auswählen, die sich innerhalb unserer §Hpsionischen Aura§! befindet, um sie zu einer §HReliktwelt§! umzuwandeln, bei der alle Blocker bereits entfernt sind.\n$ACCORD_LOOSE_INTENSITY$"
