 approach_situation_breach_shroud_endbringers_nothing_desc: "Was kommt, das kommt."
 breach_shroud_endbringers_nothing_tooltip: "$situation_speed_tt$: §R-25%§!"
 approach_situation_breach_shroud_endbringers_blind: "Blendet die Willigen"
 approach_situation_breach_shroud_endbringers_blind_desc: "Wo wir hingehen, brauchen wir keine [Owner.Species.GetEyeNamePlural]."
 breach_shroud_endbringers_blind_tooltip: "$situation_speed_tt$: §G+50%§!\n$breach_shroud_endbringers_blind_effects_tooltip$"
 breach_shroud_endbringers_blind_effects_tooltip: "Fügt jeden Monat $@nb_blinded_pop|0$ £pop£ §HBewohnern§! die Eigenschaft \"['trait:trait_blindness']\" hinzu"
 approach_situation_breach_shroud_endbringers_forsake_flesh: "Aufgegebenes Fleisch"
 approach_situation_breach_shroud_endbringers_forsake_flesh_desc: "Die Begrenzungen des Fleisches behindern unseren Weg der Transformation."
 breach_shroud_endbringers_forsake_flesh_tooltip: "$situation_speed_tt$: §G+100%§!\n$breach_shroud_endbringers_forsake_flesh_effects_tooltip$"
 breach_shroud_endbringers_forsake_flesh_effects_tooltip: "Verliert monatlich $@nb_forsaken_pop|0$ £pop£ §HBewohner§!"
