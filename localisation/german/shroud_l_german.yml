 approach_breach_shroud_endbringers_blind_cooldown_tooltip: "$TRIGGER_FAIL$Kann bis zum §Y[Target.approach_breach_shroud_endbringers_cooldown_blind_time]§! keinen neuen Ansatz wählen"
 approach_breach_shroud_endbringers_forsake_cooldown_tooltip: "$TRIGGER_FAIL$Kann bis zum §Y[Target.approach_breach_shroud_endbringers_cooldown_forsake_time]§! keinen neuen Ansatz wählen"
 trait_blindness: "Blind"
 trait_blindness_desc: "Wo wir hingehen, brauchen wir keine [Species.GetEyeNamePlural], um zu sehen."
 # Establishing the Chamber of Silence
 shroud.2820.name: "Gründung der $building_chamber_of_silence$"
 shroud.2820.desc.1: "Während unsere Kontrolle der Psionik immer weiter voranschreitet, werden wir mit einem Geflüster von jenseits des Schleiers bombardiert. Die §RStimme§!, lauter und klarer als je zuvor, schlängelt sich durch unsere Gedanken und dringt bis in die tiefsten Schatten unserer Bewusstseine vor.\n\n§R\"ÖFFNET DEN WEG.\"§!"
 shroud.2820.desc.2.intro: "Wir müssen das Rauschen herausfiltern."
 shroud.2820.desc.2.chamber: "$shroud.2820.desc.2.intro$ Wir haben eine isolierte Kammer gebaut, $shroud.2820.desc.2.outro$"
 shroud.2820.desc.2.no_chamber: "$shroud.2820.desc.2.intro$ Wir haben Pläne für eine isolierte Kammer entworfen, $shroud.2820.desc.2.outro$"
 shroud.2820.desc.2.outro: "in der unsere psionisch begabtesten Individuen den Anweisungen der §RStimme§! in glückseliger Klarheit lauschen können."
 shroud.2820.a.chamber: "Unsere Bewusstseine öffnen sich immer weiter."
 shroud.2820.a.no_chamber: "Bauen wir diese \"$building_chamber_of_silence$\"."
 CONTINUE_SITUATION: "Lässt die §YSituation§! voranschreiten:"
 shroud.2820.a.tt: "$CONTINUE_SITUATION$ §H$situation_breach_shroud$§!"
 shroud.2820.a.tt_no_chamber: "Wir fördern die Tradition \"§H$tr_psionics_endbringers_cult$§!\" und bauen das Gebäude \"§H$building_chamber_of_silence$§!\", damit die Situation voranschreitet."
 # The Great Awakening
 shroud.2830.name: "$utopia.2650.name$"
 shroud.2830.desc: "Wir hören die §RStimme§! in perfekter Klarheit in der $building_chamber_of_silence$.\n\n§R\"ALLES WIRD WIEDERGEBOREN WERDEN.\"§!\n\nWir verstehen es jetzt. Das Ende ist eine Wiedergeburt. Wir müssen keine Angst davor haben. Wir werden neu erschaffen werden. Besser und mächtiger, als wir es uns je vorstellen könnten.\n\nUm dieses Schicksal wahr werden zu lassen, müssen wir lernen, das mentale Reich, das als der \"§HSchleier§!\" bekannt ist, zu beherrschen. Wir werden nicht die gleichen Fehler machen wie unsere Beobachter auf der Verschleierten Welt. Wo sie ihre Angst ablehnten, werden wir sie annehmen."
 shroud.2830.desc.outro.awakening: "Unsere Vision ist vollkommen klar."
 shroud.2830.desc.outro.no_awakening: "Unsere Vision ist fast klar."
 shroud.2830.a.awakening: "Der Schleier birgt den Schlüssel."
 shroud.2830.a.no_awakening: "$shroud.2780.a$"
 shroud.2830.a.tt: "$tr_psionics_psionic_assimilation_desc$\n$CONTINUE_SITUATION$ §H$situation_breach_shroud$§!"
 shroud.2830.a.tt_no_awakening: "Die Tradition \"§H$tr_psionics_shroud_great_awakening$§!\" muss angenommen werden, um die Situation voranschreiten zu lassen."
 # Blind the Willing - First select event
 shroud.8320.name: "Wir sehen klar"
 shroud.8320.desc: "§H[blinded_leader.GetName]§! zeigte uns den Weg. Unsere überflüssigen Sinne dämpfen den Ruf der §RStimme§!. Indem wir einen von ihnen entfernen, verstärken wir unsere psychischen Fähigkeiten umso mehr.\n\nAuf unsere [Species.GetEyeNamePlural] zu verzichten, wäre in diesem Fall am effektivsten. Das physische Reich zu sehen, trübt unseren Blick auf den §HSchleier§!. Viele [Root.GetSpeciesNamePlural] sind bereits dem Beispiel von §H[blinded_leader.GetName]§!gefolgt und haben ohne Zögern ihre [Species.GetEyeNamePlural] aufgegeben.\n\nWer sich dafür entschied, berichtet bereits von einem Anstieg an Zufriedenheit, während die §RStimme§! sein Bewusstsein mit ihrer Zustimmung füllt."
 shroud.8320.a: "Sicht jenseits des Sichtbaren."
 leader_trait_blinded: "Geblendet"
 leader_trait_blinded_desc: "Es gibt Dinge, die man erst sieht, wenn man alles andere nicht mehr sieht."
 # A Leap of Faith - First select event
 shroud.8330.name: "Vertrauensbeweis"
 shroud.8330.desc: "§H[forsaken_leader.GetName]§! ist von den Begrenzungen des Fleisches frustriert und versuchte daher, [forsaken_leader.GetHisHer]e psionische Transformation durch die Einnahme eines tödlichen Giftes in einer dramatischen öffentlichen Inszenierung zu beschleunigen.\n\nBei [forsaken_leader.GetHisHer]em Ableben verfärbte sich [forsaken_leader.GetHisHer] Körper in ein lebhaftes Violett und zerfiel anschließend zu einem feinen Staub aus purer psionischer Energie. Solche Wunder sind nur Dank des Willens der §RStimme§! möglich.\n\nWir nahmen dies als klares Zeichen dafür, dass andere dem Beispiel von §H[forsaken_leader.GetName]§! folgen müssen."
 shroud.8330.a: "Unsere physischen Formen werden uns nicht bremsen."
 # Mid-stage events
 shroud.8350.name: "Lobotomieberichte"
 shroud.8350.desc: "Einige [owner.GetSpeciesNamePlural] haben Schwierigkeiten, die Harmonie der §RStimme§! zu hören.\n\nIn ihrer Verzweiflung griffen die Schwächsten unter uns zu drastischen Maßnahmen und ließen unregulierte Lobotomieeingriffe durchführen. Solche Praktiken drohen sich rasch auszubreiten, wenn wir nicht schnellstens etwas dagegen unternehmen."
 shroud.8350.a: "Die Schwachen tun, was sie tun müssen."
 shroud.8350.b: "Die §RStimme§! ist ein Geschenk. Wir müssen diese Eingriffe verbieten."
 endbringers_voice_plague: "Von Stimmen geplagt"
 endbringers_voice_plague_desc: "Wenn die Stimmen sprechen, bleibt uns keine andere Wahl, als zuzuhören."
 shroud.8360.name: "Psionische Selbstexperimente"
 shroud.8360.desc: "Wir fördern die §RStimme§! in unserer Gesellschaft immer mehr. Sie spricht in Wahrheiten zu uns, die sich nicht abstreiten lassen.\n\nViele [owner.GetSpeciesNamePlural] suchen nun nach Wegen, um die §RStimme§! zu verstärken, um noch mehr von ihrer Weisheit zu profitieren.\n\nDrogen vom Schwarzmarkt haben sich infolgedessen wie ein Lauffeuer verbreitet, und unregulierte medizinische Einrichtungen bieten ihre experimentellen Dienste direkt an, um die psionische Sensibilität zu erhöhen.\n\nWohin wird uns das wohl führen?"
 shroud.8360.a: "Wir müssen alles in unserer Macht Stehende tun, um die §RStimme§! zu hören."
 shroud.8360.b: "Wir müssen die totale Anarchie verhindern."
 shroud.8370.name: "Apokalyptische Albträume"
 shroud.8370.desc: "Während unsere psionischen Fähigkeiten immer stärker werden, wird ein Teil der [owner.GetSpeciesAdj]en Bevölkerung von schrecklichen Albträumen geplagt, die das Ende des Universums andeuten.\n\nUnsere Träume sind zu apokalyptischen Prophezeiungen geworden, die die existenziellen Ängste nur noch weiter verstärken. Der Tiefschlaf ist einer unruhigen Benommenheit gewichen, und viele sind nicht mehr in der Lage, ihren normalen Tagesablauf fortzusetzen.\n\nIn diesen Träumen spricht auch die §RStimme§! zu uns.\n\n§R\"UMARMT DIE ENTROPIE.\"§!"
 shroud.8370.a: "Alle Anfänge müssen auch ein Ende haben."
 shroud.8370.b: "Bietet den Betroffenen Unterschlupf in der $building_chamber_of_silence$ an."
 endbringers_apocalyptic_nightmares: "Apokalyptische Albträume"
 endbringers_apocalyptic_nightmares_desc: "Die Stimme unterbricht unseren Schlafzyklus mit kataklystischen Visionen."
 endbringers_nightmare_shelter: "Zuflucht vor Albträumen"
 endbringers_nightmare_shelter_desc: "Die $building_chamber_of_silence$ bietet jenen Zuflucht, die kataklystische Albträumen plagen."
 shroud.8380.name: "Zeichen des Endes"
 shroud.8380.desc: "Es gibt einen zunehmenden Trend zur Selbstverstümmelung innerhalb der Bevölkerung.\n\nExtrem fromme Anhänger der §RStimme§! brennen sich das Symbol des \"Endes\" in ihr Fleisch. Sie verkünden, dass jene, die dieses Zeichen tragen, einen schrecklichen Segen erhalten werden.\n\nUnabhängig davon, ob sie recht haben oder nicht, nimmt die Zahl dieser Rituale rapide zu. Ist dies wirklich der Wille des §HSchleiers§!?"
 shroud.8380.a: "Wir tragen dieses Zeichen voller Stolz."
 shroud.8380.a.tt: "Die Hälfte unserer Bevölkerung erhält die Eigenschaft \"['trait:trait_marked']\""
 shroud.8380.b: "Diese Praxis ist fehlgeleitet."
 approach_blind_selected_tt: "Der Ansatz \"$approach_situation_breach_shroud_endbringers_blind$\" wurde nicht ausgewählt"
 approach_forsake_selected_tt: "Der Ansatz \"$approach_situation_breach_shroud_endbringers_forsake_flesh$\" wurde ausgewählt"
 trait_marked: "Gezeichnet"
 trait_marked_desc: "In einer grausamen Demonstration ihrer Hingabe brannte diese Spezies sich das Zeichen des \"Endes\" ins Fleisch."
 trait_marked_unity_bonus: "£unity£ für jeweils 100 £pops£ Bewohner: §G+0.06§!"
 endbringers_sanity: "Vernunft inmitten des Wahnsinns"
 endbringers_sanity_desc: "Unsere starke Entschlossenheit, die Vernunft zu bewahren, rettet uns davor, dem Wahnsinn zu verfallen."
 # Breach the Shroud
 shroud.2840.name: "$BREACHING_SHROUD_PROJECT$"
 shroud.2840.desc: "$shroud.2800.intro$ Aus den formlosen Tiefen erhebt sich ein unheilvolles Wesen von unermesslicher Macht. Es ist die §RStimme§!, und sie durchdringt unser Innerstes mit erschütternder Kraft.\n\n§R\"KENNET MEINEN NAMEN.\"§!\n\nErst jetzt erkennen wir, wie fern unsere Bewusstseine der §RStimme§! wirklich sind. Das Siegel ist gebrochen, und schon bald wird uns der volle Umfang dessen, was wir sind, offenbart werden.\n\nUnsere Telepathen sind bereit, ins Zentrum des Schleiers einzutauchen und den wahren Namen unseres großartigen Schleierpakts zu erfahren."
 shroud.2840.a: "Es ist Zeit, in Kontakt zu treten."
 ENDBRINGERS_COMMUNE_WITH_THE_VOICE: "Kontakt zur §RStimme§! aufnehmen"
 ENDBRINGERS_COMMUNE_WITH_THE_VOICE_DESC: "Wir haben uns zu einem gemeinsamen Zweck auf [capital_scope.GetName] versammelt.\n\nWir werden tief in den §HSchleier§! vordringen und die §RStimme§! dazu zwingen, uns anzuerkennen.\n\nWir kennen sie als Kataklysmus. Andere nannten sie die Abrechnung. Doch jetzt offenbart sie uns ihren wahren Namen, und mit diesem Wissen werden wir Großes erreichen."
 ENDBRINGERS_COMMUNE_WITH_THE_VOICE_PROJECT_TOOLTIP: "Für den Abschluss muss 3 Mal in den Schleier §Heingetaucht§! werden ([GetEndbringersDelveCount]/3)"
 # EotC Delve Events
 shroud.8420.title: "Die Prüfung der Stille"
 shroud.8420.desc: "Wir tauchen immer tiefer in den Schleier ein, und unser gemeinsamer Wille hilft uns dabei, den chaotischen Lärm auszublenden, der uns von unserem Ziel abzulenken versucht: dem Schleierwesen, das auf den Namen \"§R[Root.Patron:end_of_the_cycle.GetPreCommunicationName]§!\" hört.\n\nDoch unsere Absicht allein wird uns nicht schützen. Stimmen flüstern leere Plattitüden, verwöhnen uns mit armseligen Ablenkungen, von denen eine bedeutungsloser ist als die andere, aber alle gleichermaßen verlockend.\n\nWährend unsere Bewusstseine zersplittern, kehrt das Wesen zurück. Ein einziger Befehl hallt durch die Leere:\n\n§R\"STILLE.\"§!"
 shroud.8420.a: "Schweigt und haltet durch."
 shroud.8420.a.reply: "Der Befehl spaltet das Chaos, beseitigt den disharmonischen Lärm und reinigt uns von der aufdringlichen Unordnung, die uns zu verschlingen drohte. Unsere Psyche hält stand, während wir die Fragmentierung ertragen.\n\nDas Schleierwesen mit dem Namen \"§R[Root.Patron:end_of_the_cycle.GetPreCommunicationName]§!\" zieht sich tiefer in den Schleier zurück. Die Klarheit, die darauf folgt, ist ohrenbetäubend. Sie füllt die Lücken in unseren Bewusstseinen mit neuer Entschlossenheit.\n\nUnd Gaben. Solch wundervollen Gaben."
 shroud.8420.a.tooltip: "Der §Y$endbringers_madness_1$§! verliert folgende Auswirkungen:\n$t$$MOD_POP_AMENITIES_USAGE_MULT$: $@madness_base_pop_amenities_usage_mult|0=-%$"
 shroud.8430.title: "Prüfung der Reinheit"
 shroud.8430.desc: "Während wir immer tiefer in den Schleier eintauchen, beobachten wir die Korruption des empfindungsfähigen Chaos.\n\nVerfaulende, untätige Bewusstseine, die psionische Turbulenzen verursachen und den Schleier verpesten. In diesem widerwärtigen Chaos beginnen wir, die überwältigende Präsenz jenes Wesens zu spüren, das wir \"§R[Root.Patron:end_of_the_cycle.GetPreCommunicationName]§!\" nennen.\n\nDie Boshaftigkeit seiner Absicht durchdringt unsere Psyche, während es das Chaos beseitigt. Als wir uns auf die bevorstehende Absolution vorbereiten, hallt ein neuer Befehl durch die Leere:\n\n§R\"ORDNUNG. EINIGKEIT.\"§!"
 shroud.8430.a: "Haltet stand!"
 shroud.8430.a.reply: "Der Befehl umwickelt das Chaos.\n\nUnzählige Stimmen schreien vor Schmerz, während das Wesen, das wir \"§R[Root.Patron:end_of_the_cycle.GetPreCommunicationName]§!\" nennen, die empfindungsfähigen Verformungen, die den Schleier heimsuchen, hinfortspült. Ein Reich der vergebenen Unvollkommenheit ist alles, was zurückbleibt.\n\nWährend sich das Wesen in die Tiefen des Schleiers zurückzieht, können wir die Folgen seiner absoluten Läuterung beobachten und studieren."
 shroud.8430.a.tooltip: "Der §Y$endbringers_madness_2$§! verliert folgende Auswirkungen:\n$t$$mod_planet_pops_upkeep_mult$: $@madness_base_planet_pops_upkeep_mult|0=-%$"
 shroud.8440.title: "Prüfung der Flammen"
 shroud.8440.desc: "Beim Eintritt in den Schleier spüren wir nur den Schmerz. Der normale Nebel ist einem lodernden Inferno gewichen und versengt die Essenz unseres Bewusstseins.\n\nInmitten der Qualen nehmen wir Städte wahr, die zu geschmolzenen Ruinen zerfallen, Planeten, die vom Feuer verschlungen werden, ganze Bevölkerungen, die sich vor Schmerzen winden, während die gespenstische Flammen ihre körperlichen Formen zu schwelender Asche verbrennen.\n\nInmitten des Scheiterhaufens entdecken wir jenes Wesen, das wir \"§R[Root.Patron:end_of_the_cycle.GetPreCommunicationName]§!\" nennen. Während seine Macht die Realität zu verschlingen droht, befiehlt das Wesen:\n\n§R\"BEFREIUNG.\"§!"
 shroud.8440.a: "Wir geben uns der Absolution hin."
 shroud.8440.a.reply: "Die psionischen Flammen hüllen unsere Bewusstseine ein und verbrennen jegliche Selbstgefälligkeit. Alles, was bleibt, ist die gereinigte Entschlossenheit.\n\nWir können jetzt die glorreiche Absicht und die großartige Schlichtheit begreifen, die das Wesen, das wir \"§R[Root.Patron:end_of_the_cycle.GetPreCommunicationName]§!\" nennen, verfolgt."
 shroud.8450.title: "$utopia.3310.name$"
 shroud.8450.desc: "Eine Proklamation ertönt:\n\n§R\"IHR KENNT MEINEN NAMEN.\"§!\n\nDer Höhepunkt unserer Reise zu den Sternen ... die Antwort auf jahrhundertelange Fragen ... Sie liegen direkt vor uns. Es ist das $end_of_the_cycle_color_article_cap$. Unser Pakt ist besiegelt.\n\n§R\"DAS ENDE BEGINNT.\"§!\n\nSchmerz. Qual. Gewissheit. Während die Worte verklingen, ist unser Schicksal besiegelt.\n\nWir sehen es jetzt. Eine Galaxie der Stille, die von der Unvermeidlichkeit der §R$end_aura$§! eingenommen ist."
 shroud.8450.a: "Das Unvermeidbare erwartet uns."
 shroud.8450.a.homicidal: "Welch wunderbare Schrecken uns wohl erwarten."
 shroud.8450.a.tech_tooltip: "Neue Technologien:\n£society£['technology:tech_psionic_aura']\n£society£['technology:tech_aura_intensification']"
 embracing_the_end: "Umarmung des Endes"
 embracing_the_end_desc: "Wir sehen endlich die Schönheit des Endes. Lasst es nur kommen."
 MOD_SHIP_PSIONIC_AURA_SPEED_MULT: "$MOD_SHIP_SPEED_MULT$ in einer beliebigen psionischen Aura"
 MOD_SHIP_PSIONIC_AURA_FIRE_RATE_MULT: "$MOD_SHIP_FIRE_RATE_MULT$ in einer beliebigen psionischen Aura"
 end_of_the_cycle_endbringers: "$end_of_the_cycle_article_cap$"
 situation_end_of_the_cycle_endbringers_desc: "Unser Pakt mit dem $end_of_the_cycle_color_article$ verleiht uns unermessliche Macht und hat uns mit einem einzigen Ziel beauftragt:\n\nDer vollständigen Vernichtung dieser Realität. Mit jedem System, das von der §H$end_aura$§! verschlungen wird, rückt die barmherzige Erlösung näher.\n\nWir werden Zeugen der Unvermeidbarkeit werden.\n\nNoch zu erobernde Systeme: [Owner.GetEndCycleGalaxySystemsLeft]"
 end_of_the_cycle_endbringers_monthly_change_tooltip: "$end_of_the_cycle_monthly_change_tooltip$"
 situation_end_of_the_cycle_endbringers_finish_effects: "§RDie Abrechnung wartet.§!"
 approach_situation_end_of_the_cycle_bring_the_inevitable: "Das Unvermeidliche herbeibringen"
 approach_situation_end_of_the_cycle_stall_for_time: "Zeit schinden"
 approach_situation_end_of_the_cycle_delay_your_destiny: "Unser Schicksal herauszögern"
 shroud.8460.title: "Die Zeit wird knapp"
 shroud.8460.desc: "Die Macht des $end_of_the_cycle_color_article$ geht mit gewissen Kosten einher, und uns geht langsam die Zeit aus.\n\nDie Galaxie wurde noch immer nicht von der reinigenden Aura unseres Schleierpakts eingenommen. Unsere bisherigen Bemühungen sind unbedeutend.\n\nUm dieses monumentale Werk zu Ende zu führen, durchströmt uns eine Welle der Energie von jenseits des Schleiers. Ein verheißungsvoller Segen!"
 shroud.8460.a: "Wir können es noch immer schaffen."
 shroud.8470.title: "Das Ende ist nah"
 shroud.8470.desc: "Die Macht unseres Schleierpakts ist unermesslich, doch uns geht langsam die Zeit aus. Eine solch eklatante Inkompetenz wird von der wohlwollenden Vergessenheit des §HEndes des Zyklus§! nicht toleriert werden.\n\nDoch es bleibt eine geringe Hoffnung: Wir müssen die $end_aura$ über die ganze Galaxie verteilen, ganz egal, was es uns abverlangt. Unsere [GetTelepathPlural] ziehen jedes Fünkchen Energie aus dem §HSchleier§!, das sie bekommen können."
 shroud.8470.a: "Wir werden nicht scheitern!"
 shroud.8480.title: "$GALACTIC_FOCUS$ widerrufen"
 shroud.8480.desc: "Der Beschluss, der die Verteidigungsmaßnahmen gegen den Verursacher der zerstörerischen §HPsionischen Aura§! koordinierte, wurde vom Galaktischen Senat aufgehoben. Dies hat zur Folge, dass alle laufenden militärischen Operationen, die Mitglieder der Gemeinschaft gegen §H[former_malevolent_aura.GetName]§! durchführen, augenblicklich eingestellt werden. Für den Moment ist der Frieden in diesen Winkel der Galaxie zurückgekehrt."
 shroud.8481.desc: "Der Galaktische Senat hob den Beschluss auf, der uns zum Ziel seiner \"Verteidigungsmaßnahmen\" erklärte, und alle Mitglieder der Gemeinschaft wurden aufgefordert, sich zurückzuziehen. Die Militäreinsätze gegen uns sind vorerst eingestellt worden."
 shroud.8481.homicidal: "$shroud.8480.desc$\n\n$crisis.4111.nasty$"
 shroud.8500.title: "Vorboten des Endes"
 shroud.8500.desc.intro: "Die Unausweichlichkeit unseres Schleierpakts ist wie eine Schlinge, die sich immer enger um die Galaxie zuzieht. Wir wissen jetzt, wie das Ende aussehen wird.\n\nDie §R$end_aura$§! muss die gesamte Galaxie einnehmen. Sobald das physische Reich mit der rohen Essenz des §HSchleiers§! verbunden ist, wird die totale Vernichtung schon bald folgen."
 shroud.8500.desc.outro: "Diese monumentale Aufgabe abzuschließen, wird unser Opus magnum sein und das Tor zur ultimativen Erlösung."
 shroud.8500.desc.homicidal: "$shroud.8500.desc.intro$\n\nDie Vernichtung allen Lebens wird ein willkommener Nebeneffekt sein. $shroud.8500.desc.outro$"
 shroud.8500.desc.default: "$shroud.8500.desc.intro$\n\n$shroud.8500.desc.outro$"
 shroud.8500.a: "Wir dürfen nicht scheitern."
 shroud.8600.title: "$shroud.4970.title$"
 shroud.8600.desc.intro: "Dies war unser Schicksal.\n\nDie §R$end_aura$§! umfasst nun die gesamte Galaxie. Unsere Bevölkerung auf [Root.GetHomeWorldName] ist in einen Zustand der rasenden Euphorie eingetreten,"
 shroud.8600.desc.outro: "Uns steht eine glorreiche Wiedergeburt bevor.\n\nJegliche Existenz wird von der Leere verschlungen. Die Auslöschung und Vernichtung sind zu den einzig verbliebenen Gesetzen der Galaxie geworden. Eine Welt nach der anderen verschwindet im Nichts, aus dem sie einst kam.\n\nWir sind die Letzten, die noch übrig sind. Es ist ... wunderschön. Wir sehen bereits die Anfänge einer neuen, zerbrechlichen Form. Das Ende ist gekommen. Nun beginnt der Anfang."
 shroud.8600.desc.homicidal: "$shroud.8600.desc.intro$ um die Auslöschung all dessen zu feiern, was nicht wir sind. $shroud.8500.desc.outro$"
 shroud.8600.desc.default: "$shroud.8600.desc.intro$ unsere barmherzige Erlösung zu feiern. $shroud.8600.desc.outro$"
 shroud.8600.a: "Die Endgültigkeit ... ist unmöglich."
 shroud.8610.title: "Der Preis der Schwäche"
 shroud.8610.desc.intro: "Wir haben versagt. Wegen unserer Schwäche konnte das $end_of_the_cycle_color_article$ keinen glorreichen Abschluss finden. Der Preis, den wir für unsere Inkompetenz zahlen mussten, ist hoch.\n\nEs hat uns alles genommen. In nur einem Augenblick wurde das Ende von [Root.GetName] besiegelt. Wo es früher blühende Kolonien gab, stehen nun nur noch Ruinen. Wo früher mächtige Flotten durchs All flogen, gibt es jetzt nur noch Stille und Trümmer. Alles wurde vom Ende verschlungen. Alles wurde vom §HSchleier§! geholt."
 shroud.8610.desc.outro: "Unser Schleierpakt hat nun ein gewaltiges Schleierwesen im Weltraum über [former_capital.GetName] materialisiert. Durch die verschlungenen Bewusstseine unserer Psioniker hat dieses Wesen eine ungeheure Macht erlangt und streift nun durch die Galaxie, um zu vollenden, was uns nicht gelang."
 shroud.8610.desc.a: "$shroud.8610.desc.intro$\n\n$shroud.8610.desc.outro$"
 shroud.8610.desc.b: "$shroud.8610.desc.intro$\n\nDie meisten [Root.GetSpeciesNamePlural] hat ein ähnliches Schicksal ereilt, und nur eine kleine Gruppe Ungläubiger unterwarf sich nicht dem Willen unseres Schleierpakts. Sie leben nun im Exil auf einer Welt, die außerhalb des Einflusses des Endes liegt, und werden von §H[Root.GetRulerName]§! angeführt, einem mächtigen Psioniker, der wusste, was uns bevorsteht.\n\n$shroud.8610.desc.outro$ Wenn es fertig ist, wird das Ende auch zu den Exilanten kommen."
 shroud.8610.a: "Vielleicht war dies schon immer unser Schicksal ..."
 shroud.8610.b: "Können die Exilanten wirklich seiner Macht widerstehen?"
 shroud.8710.title: "Überlebende der Apokalypse"
 shroud.8710.desc: "Es ist getan. Die §RAbrechnung§! wurde besiegt!\n\nDas $end_of_the_cycle_color_article_cap$ hat sich in die Tiefen des §HSchleiers§! zurückgezogen. Die Bedrohung, die es für unsere physische Realität darstellte, wurde vorerst beseitigt.\n\nAls der verschleierte Leichnam der Inkarnation aus dieser Existenz entschwand, konnten die physischen Überreste erfolgreich geborgen werden. Selbst im Tod spüren unsere Telepathen die unglaubliche Mengen an psionischer Energie, die weitaus mächtiger ist als jenes Fragment, das man auf §H[shrouded_planet.GetName]§! fand.\n\nDieser dichte Kern aus konzentrierter Unvermeidlichkeit lässt sich nutzen, um aus den Trümmern der Galaxie, die die Abrechnung überlebten, etwas Neues aufzubauen.\n\nDas Ende ist gekommen, und doch sind wir noch hier."
 shroud.8710.a: "War dies schon immer unser Schicksal?"
 r_core_of_the_reckoning: "Kern der Abrechnung"
 r_core_of_the_reckoning_desc: "Aus den Überresten der Abrechnung geborgen strahlt dieser Kern noch immer eine immense psionische Energie aus."
 core_of_reckoning_active_effect_tt: "Neue £decision£ §YPlanetare Entscheidung§!: ['concept_banish_decision']"
 decision_banish: "Verbannen"
 decision_banish_desc: "Indem wir es dem Schleier erlauben, diesen Ort zu verschlingen, halten wir den Kern der Abrechnung im Gleichgewicht."
 decision_banish_effects_tt: "Verbannt diesen Planeten in den Schleier."
 concept_banish_decision: "$decision_banish$"
 concept_banish_decision_desc: "$decision_banish_desc$\n$decision_banish_effects_tt$\nErhält §Y10§! Jahre lang den Modifikator \"§Y$shroud_surge$§!\":\n$shroud_surge_effects$"
 shroud_surge: "Schleierwoge"
 shroud_surge_desc: "Vorübergehend wurde das Gleichgewicht für den $r_core_of_the_reckoning$ wiederhergestellt."
 shroud_surge_effects: "Verdoppelt die passiven Auswirkungen des §YKerns der Abrechnung§!."
 #======================
 # Shroud Leaders
 #======================
 ganthuata: "Ganthuata"
 ganthuata_desc: "Eine fromme Jüngerin der $the_cradle_of_souls_article$. Sie teilt ihre tiefgründigen Wahrheiten mit jedem, der das Mittel halt, sie zu empfangen."
 ganthuata_catch_phrase: "Wir geben uns der Umarmung der Wiege hin."
 leader_trait_disciple_of_the_cradle: "Jüngerin der Wiege"
 leader_trait_disciple_of_the_cradle_desc: "Je mehr wir sehen, desto mehr wissen wir. Die $the_cradle_of_souls_article$ wird sicherer, wenn wir unsere Nachbarn beobachten."
 leader_trait_disciple_of_the_cradle_envoys_zro: "$t$- Gesandte, die Schleierwesen zugewiesen sind, erzeugen monatlich §G+0.5§! £zro£ §Y$sr_zro$§!"
 shroud.12010.desc: "§HUnser Eintauchen in den Schleier lud eine neue Stimme ein, Kontakt zu uns aufzunehmen. Ihr warmer, beruhigender Klang hallt sowohl im physischen als auch im mentalen Reich wider.§!\n\nSeid gegrüßt. Ich bin Ganthuata, und ich suche Gleichgesinnte, die den wahren Weg erkannt haben. Habt Ihr die Botschaft der $the_cradle_of_souls_article$ gehört?"
 shroud.12010.name: "$ganthuata$"
 shroud.12010.a: "Wir haben die $the_cradle_of_souls_article$ gehört. Wieso fragt Ihr?"
 shroud.12010.a.response: "Warum? Was veranlasst eine Wanderin dazu, jene zu befragen, denen sie auf ihrem Weg begegnet? Um jene besser zu verstehen, von denen sie eine Antwort sucht, mein Freund. Mit jedem gesprochenem Wort von Euch lerne ich."
 shroud.12010.b: "Was wollt Ihr von uns?"
 shroud.12010.b.response: "Wonach sehnen sich jene, die die Wiege nährte? Zunächst einmal suche ich Eure Freundschaft. Ich suchte ein ganzes Zeitalter lang nach Gleichgesinnten, deren Geist auf die Pracht der Wiege eingestimmt ist, und nun erwacht eine ganze Zivilisation in ihrem Licht."
 shroud.12010.c: "Wie könnt Ihr uns helfen?"
 shroud.12010.c.response: "Ich helfe dabei, Eure Botschaft über die Sterne zu tragen. Gemeinsam können wir die Galaxie in der sanften Umarmung der Wiege willkommen heißen."
 shroud.12010.hire_custom_tooltip: "§Y$ganthuata$§! tritt unserem Reich als §HAnführer§! bei"
 koborokra: "Koborok'Ra"
 koborokra_desc: "Ein ehemaliger Soldat, der von [Root.GetHisHer]en Feinden einer extremen psionischen Folter unterzogen wurde. Dieser gequälte Admiral wird heute von einem unstillbaren Verlangen nach Zerstörung angetrieben."
 koborokra_catch_phrase: "Es gibt Blut zu vergießen."
 leader_trait_disciple_of_the_eater: "Blutbringer"
 leader_trait_disciple_of_the_eater_desc: "Dieser Anführer schloss einen Blutschwur mit der $the_eater_of_worlds_article$."
 leader_trait_disciple_of_the_eater_attunement_effect: "§G+$@disciple_of_the_eater_combat_attunement$§! Einstimmung auf $the_eater_of_worlds_article$ für jede gewonnene Flottenschlacht"
 leader_trait_disciple_of_the_eater_zro_fleet_attack_effect: "$t$- §G+$@disciple_of_the_eater_zro_fleet_attack|1$§! $i_zro$ für jeweils 1% Verwüstung durch eine Orbitalbombardierung"
 leader_trait_disciple_of_the_eater_zro_army_attack_effect: "$t$- §G+$@disciple_of_the_eater_zro_army_attack|0$§! $i_zro$ für jeweils 1% Verwüstung durch Angriffsarmeen"
 shroud.12020.name: "$koborokra$"
 shroud.12020.desc: "§HEine vom Kampf gezeichnete Rüstung und ein blutverschmierter Umhang verhüllen eine maskierte Gestalt. Ein heiseres Knurren durchbricht die Stille.§!\n\nDiese Galaxie verdient es, zu leiden. Ich weiß, dass Ihr genauso empfindet.\n\n§HWährend der Admiral spricht, streicht [shroud_leader.GetHeShe] über den Griff einer verzierten Klingenwaffe.§!\n\nMein Weg führte mich zu Euch, doch letztlich diene ich der $the_eater_of_worlds_color_article$."
 shroud.12020.desc.covenant: "$shroud.12020.desc$ So wie auch Ihr."
 shroud.12020.desc.no_covenant: "$shroud.12020.desc$ Vielleicht werdet auch Ihr dies tun."
 shroud.12020.a: "Warum möchtet Ihr Euch uns anschließen?"
 shroud.12020.a.response: "Zusammen sind wir in der Lage, die Sterne in jedem Winkel der Galaxie zu ersticken. Allein kann man nur eine begrenzte Menge Leid zufügen."
 shroud.12020.b: "Können wir Euch vertrauen?"
 shroud.12020.b.response: "Die $the_eater_of_worlds_article_cap$ gebietet über jeden meiner Atemzüge. Ich schwor Ihr die Treue, und ich sah diesen Augenblick in meinen Träumen. Es ist ihr Wille, dass ich Euch diene. Eure Ablehnung würde mein Schicksal besiegeln."
 shroud.12020.c: "Warum dient Ihr der $the_eater_of_worlds_article$?"
 shroud.12020.c.response: "Ich wurde verraten, gebrochen und fiel der Verzweiflung zum Opfer. Dann sprach die $the_eater_of_worlds_article_cap$ zu mir. Sie segnete mich mit dem, was ich in diesem Moment am dringendsten zum Überleben brauchte: ein blutbeflecktes Tuch über blutigen Wunden. Sie gab mir die Kraft, jene niederzustrecken, die mir dieses Leid zugefügt hatten. Nun stehe ich in ihrer Schuld."
 shroud.12020.d: "Was könnt Ihr uns anbieten?"
 shroud.12020.d.response: "Gemeisam sind wir in der Lage, unzählige Systeme in den reinigenden Flammen zu baden und uns von der Symphonie aus Schreien zu nähren. Wir werden beobachten, wie Welten brennen. Gemeinsam werden wir der Galaxie Dinge zeigen, die sie nie vergessen werden wird. Dies ist unser Schicksal."
 shroud.12020.hire_custom_tooltip: "§Y$koborokra$§! tritt unserem Reich als §HAnführer§! bei"
 morr: "Morr"
 morr_desc: "Dieser bescheidene Schürfer verfiel aufgrund der dauerhaften Nähe zu $zro_lower$-Vorkommen in den Wahnsinn und schloss einen starken Bund mit dem $the_instrument_of_desire_article$. Er nutzt diese Verbindung, um eine unverschämte Menge Reichtum anzuhäufen, indem er Welten ausbeutet und die Beute zu Wucherpreise weiterverkauft."
 morr_catch_phrase: "Wenn es glänzt, gehört es uns."
 leader_trait_disciple_of_the_instrument: "Herz der Habsucht"
 leader_trait_disciple_of_the_instrument_desc: "Dieser Anführer ist tief auf das $the_instrument_of_desire_article$ eingestimmt und spürt selbst in den unwirtlichsten Winkeln der Galaxie Ressourcenvorkommen auf."
 leader_trait_disciple_of_the_instrument_planetary_decision_effect: "- Gewährt Zugang zur Planetaren Entscheidung \"§Y$decision_divine_deposits$§!\""
 decision_divine_deposits: "Vorkommen prophezeien"
 decision_divine_deposits_desc: "Dieser Planetengouverneur wird von der geheimnisvollen Kraft des Instruments der Sehnsüchte geleitet und ist in der Lage, längst vergessene Ressourcenvorkommen wiederzuentdecken."
 decision_divine_deposits_tt: "Fügt ein zufälliges planetares Merkmal hinzu, das Ressourcen enthält"
 shroud.12030.name: "$morr$"
 shroud.12030.desc: "§H$morr$s Blick scheint nie zu ruhen und huscht von Schatten zu Schatten, als sei er beständig auf der Jagd.§!\n\nIhr fühlt es doch auch, nicht wahr? Das $the_instrument_of_desire_article_cap$ ist niemals still. Es begehrt. Es verschlingt. Es befiehlt.\n\nWas ich sehe, nehme ich mir. Keine Gabe der Natur konnte sich bisher meinem Willen widersetzen. Ich biete Euch meine Dienste an. Nicht aus Loyalität, sondern weil wir gemeinsam in der Lage sind, ganze Sterne abzuernten und der Leere zu geben, was ihr zusteht."
 shroud.12030.a: "Warum möchtet Ihr Euch uns anschließen?"
 shroud.12030.a.response: "Die Begierden, die das $the_instrument_of_desire_article_cap$ zeigt, sind untilgbar. Es benötigt die Arbeit vieler [root.species.GetHandNamePlural], um es zufriedenzustellen."
 shroud.12030.b: "Was könnt Ihr uns anbieten?"
 shroud.12030.b.response: "Ich kann Euch dabei helfen, jedes monetarisierbare Molekül zu ernten, das die Natur besitzt. Nicht ein Atom wird unbeansprucht, unmarkiert oder unverkauft bleiben.\n\nWer sagt, es gäbe \"genug\", ist ein Feigling. Möge er verrotten. Gemeinsam werden wir uns alles nehmen."
 shroud.12030.c: "Warum dient Ihr dem $the_instrument_of_desire_article$?"
 shroud.12030.c.response: "Ich war einst ein Schürfer, der jedes Mineral sammelte, das mir die Sterne zuwarfen. Staubige Luft, zerbrochene Scanner und leere Versprechen ... bis das $the_instrument_of_desire_article$ zu mir sprach.\n\nEs versprach mir Reichtum jenseits meiner Vorstellungskraft. Und alles, was es von mir forderte, war meine Loyalität.\n\nJetzt diene ich. Ich extrahiere. Ich liefere. Die Schulden sind unendlich ... aber der Reichtum? Oh, der Reichtum hört niemals auf."
 shroud.12030.hire_custom_tooltip: "§Y$morr$§! tritt unserem Reich als §HAnführer§! bei"
 kronen: "Kronen der Geplagte"
 kronen_desc: "Von diesem einstigen Visionär ist heute nichts als die zersplitterte Hülle übrig. Das Bewusstsein dieses zurückgezogenen Wissenschaftlers wurde von den Intrigen der $the_composer_of_strands_article$ verdreht. Alles, was blieb, ist ein unfassbarer Intellekt, der wie ein Stern in der Dunkelheit leuchtet."
 kronen_catch_phrase: "Es gibt noch so viel zu studieren ..."
 leader_trait_disciple_of_the_composer: "Stranggezeichnet"
 leader_trait_disciple_of_the_composer_desc: "Je mehr Fleisch sie umformt, desto mehr wird einem offenbart. $the_composer_of_strands_article_cap$ erschafft jeden neu, der es wagt, ihre verbotene Kunst zu studieren."
 shroud.12040.name: "$kronen$"
 shroud.12040.desc: "§HAls unsere Sensoren ein Schiff entdecken, das unsere Grenzen überschreitet, hallt eine angespannte Stimme im Schleier wider – müde, schrill und doch beunruhigend vertraut, wie das Summen der $the_composer_of_strands_article$.§!\n\n[GetKronenFlesh::<DE_ART_IND_N_Cap>] neu[GetKronenFlesh::<DE_END_ADJ_IND_S_A>] ... [GetKronenFlesh&NOM]? Interessant. So weich. So ... verformbar. Oder ist es das nicht? Es ist schwer zu sagen. So viele Knoten unter der [GetKronenSkin]. Welche Form hat die $the_composer_of_strands_article$ heute für mich gesponnen?\n\n§HAls sich die Kommunikation stabilisiert, offenbart sich uns eine Figur aus rohem, zuckendem Muskelfleisch.§!\n\nIhr seht mich, wie ich bin. Vielleicht bin ich noch immer $kronen$. Vielleicht bin ich es nicht. Doch ich fühle, dass Ihr wie ich seid: eine Leinwand für den Pinsel der Komponistin. Kommt. Lasst uns mit der Enthüllung beginnen."
 shroud.12040.a: "Beginnen? Womit beginnen?"
 shroud.12040.a.response: "Mit dem Abstreifen natürlich. Dem Abstreifen dieser groben, unvollkommenen Hüllen. Das Auflösen der Fäden, die uns an Form und Gewissheit binden. Auch Ihr seid von der Komponistin berührt worden. Ihr habt bereits begonnen ... Habt Ihr nicht das Kribbeln gespürt?"
 shroud.12040.b: "Warum möchtet Ihr Euch uns anschließen?"
 shroud.12040.b.response: "Fühlt Ihr es nicht? Das Mal, das sich in jede Strähne brennt. Ich muss mich entwirren, mich von dem befreien, was ich war, Zeuge meines Verfalls werden, während ich die Nähte zerreiße, die mich an das Fleisch binden. Aber Ihr ... Ihr seid ein Galaktisches Reich. Riesig. Fähig. Gemeinsam könnten wir an Fäden ziehen, die weit größer als wir selbst sind."
 shroud.12040.c: "Wie könnt Ihr uns helfen?"
 shroud.12040.c.response: "Ich biete mehr als nur meine Hilfe an. Mein Fleisch ist ein Geschenk, ein Experiment des Schmerzes und der Zielstrebigkeit, das von der $the_composer_of_strands_article$ geformt wurde. Jede Faser in mir schreit, doch ich halte durch. Ich studiere. Ich lerne. Und alles, was mein Leiden hervorbringt ... könnt Ihr nach Euren Vorstellungen gestalten. Solange wir dies gemeinsam tun."
 shroud.12040.hire_custom_tooltip: "§Y$kronen$§! tritt unserem Reich als §HAnführer§! bei"
 shroud.12045.desc: "§H$kronen$ wird zunehmend verzweifelter. Die Stimme ist heiser und der Körper zuckt vor Anstrengung, während der hautlose Wissenschaftler vor Frustration keucht.§!\n\nDie Stränge ... Sie sind endlos ... Sie winden sich, ich ziehe, ich reiße, doch das Gewebe hält stand! Wie lange muss ich diese elende Gestalt noch ertragen? Wie viel muss ich noch abstreifen, bevor sich das Muster offenbart?"
 shroud.12045.a: "Wo liegt das Problem?"
 shroud.12045.a.response: "Problem? Singular? Mit jedem Fetzen, den ich abstreife, und jedem Strang, den wir zerreißen, ziehen sich die Fäden nur noch fester zusammen! Und die ganze Zeit summt die $the_composer_of_strands_article$ ihre krank machende, in den Bauch kriechende Melodie ..."
 shroud.12045.a.response_2: "$shroud.12045.a.response$\n\n$shroud.12045.desc_2$"
 shroud.12045.b: "Braucht Ihr eine Pause?"
 shroud.12045.b.response: "Eine Pause? Nein, niemals. Wir dürfen nicht aufhören. Wir dürfen dieses elende Fleisch nicht in Mittelmäßigkeit verrotten lassen. Ich brauche keine Ruhe ... Ich brauche Testsubjekte. Ich brauche Material, das ich formen, modellieren und gestalten kann."
 shroud.12045.b.response_2: "$shroud.12045.b.response$\n\n$shroud.12045.desc_2$"
 shroud.12045.c: "Können wir irgendwie helfen?"
 shroud.12045.c.response: "Könnt Ihr mich daran erinnern ... was ich war? Hatten meine Anhängsel, als wir das erste Mal miteinander sprachen, schon diese Farbe? War meine Cornea schon immer so trüb? Jedes Mal, wenn ich versuche, mich zu erinnern, verformt sich mein Fleisch weiter.\n\nNein ... Erinnerungen haben keinen Wert. Die Erlösung liegt in der Veränderung selbst. Was zuvor kam, spielt keine Rolle für die $the_composer_of_strands_article$. Verschwindet. Ich muss ... nachdenken."
 shroud.12045.c.response_2: "$shroud.12045.c.response$\n\n$shroud.12045.desc_2$"
 shroud.12045.desc_2: "§HKronen zuckt heftig. Das einzelne Auge rollt nach hinten. Das Fleisch pulsiert und brodelt unter der Oberfläche und dann ... Stille. Die groteske Umgestaltung endet so jäh, wie sie begann.§!\n\nOh, hallo. Braucht Ihr etwas?"
 shroud.12045.d: "Seid Ihr in Ordnung?"
 shroud.12045.d.response: "Natürlich. Warum sollte ich das nicht sein? Die Stränge öffneten mein Bewusstsein noch weiter und formten dieses ineffiziente Fleisch zu etwas, was mehr den Entwürfen der $the_composer_of_strands_article$ entspricht. Wenn Ihr mich jetzt entschuldigen würdet ... Es gibt noch so viele Fäden, die gezogen werden müssen. So viele Hüllen, die es abzustreifen gilt.\n\n§HAls die Übertragung endet, hallt ein Echo im Schleier wider. Welches Leiden Kronen auch immer bedrückt ... Es ist kein Zufall. Es ist der Wille der $the_composer_of_strands_article$.§!"
 shroud.12045.end: "Ein Geschenk der Komponistin ist eine ernste Angelegenheit."
 zulyn: "Zulyn der Lauscher"
 zulyn_desc: "Ein Gelehrter, der die Beschränkungen konventioneller Wissenschaften hinter sich ließ, um die Echos der $whisperers_in_the_void_article$ zu studieren."
 zulyn_catch_phrase: "Wir müssen nur lauschen ..."
 shroud.12050.name: "$zulyn$"
 shroud.12050.desc: "§HDas Kommunikationssystem erwacht mit einem Knistern zum Leben, während eine Stimme in einer unheimlichen Dringlichkeit etwas flüstert.§!\n\nSeid gegrüßt, geschätzte Zuhörer. Ich hörte Eure Stimme - nein, *Stimmen* - inmitten der Kakophonie. Ihr habt sie doch auch gehört, nicht wahr? Den großen Chor der $whisperers_in_the_void_color_article$, ihre gedämpften Gaben, ihre geflüsterte Hysterie?\n\nSolche Geheimnisse sind gefährlich für jene, die sie nicht verstehen. Doch ich kann Euch helfen, sie zu entschlüsseln. Ich biete Euch meine Hilfe an, wenn Ihr mit einer überwältigenden Flut von Paradoxien konfrontiert seid, die Eure Gedanken beschäftigt. Fasst dies keinesfalls als Beleidigung auf. Auch ich hatte einst Mühe, ihre wahre Bedeutung zu verstehen."
 shroud.12050.a: "Warum denkt Ihr, dass Ihr uns helfen könnt?"
 shroud.12050.a.response: "Ihr habt den §HSchleier§! durchdrungen, nicht wahr? Aber verratet mir etwas: Beherrscht Ihr ihn auch? Ich verbrachte mein ganzes Leben damit, die Tiefen des Schleiers zu kartieren, die unergründlichen Bewegungen der in ihm lebenden Wesen aufzuzeichnen und wie sich ihre Echos in unserem zerbrechlichen Reich abbilden.\n\nDie Flüsterer führten mich in all dieser Zeit. Jede noch so verrückte Idee, die jetzt Eure Gedanken überflutet? Ich kann Euch helfen, sie zu verstehen."
 shroud.12050.b: "Was wisst Ihr über die Flüsterer?"
 shroud.12050.b.response: "Ich habe ihr Flüstern seit Jahren katalogisiert und auf genau diesen Moment gewartet. Darauf, dass Ihr mit ihrem vielfältigen Chor im Einklang steht. Ich werde diese Chance nicht ungenutzt lassen, um die darin verborgenen Wahrheiten zu ergründen."
 shroud.12050.c: "Was bietet Ihr uns an?"
 shroud.12050.c.response: "Ein Leben voller Studien schärfte meinen Fokus und half mir dabei, die Strukturen unserer physischen Realität und die grenzenlose Tiefe des §HSchleiers§! zu verstehen.\n\nGemeinsam werden wir uns von den Begrenzungen dieser Ebene befreien. Die Geheimnisse des Universums werden sich uns offenbaren. So viel kann ich versprechen."
 shroud.12050.hire_custom_tooltip: "§Y$zulyn$§! tritt unserem Reich als §HAnführer§! bei"
 leader_trait_disciple_of_the_whisperers: "Verschleiertes Geflüster"
 leader_trait_disciple_of_the_whisperers_desc: "Dieser Anführer hört die Echos der $whisperers_in_the_void_article$ aus dem Schleier, wodurch er seltene wissenschaftliche Einblicke in verborgene Mechanismen des physischen Universums erhält."
 leader_trait_disciple_of_the_whisperers_effects: "$t$- $@disciple_of_the_whisperers_tech_zro|0=+$ $i_zro$ beim Erforschen einer §Yseltenen§! oder §Ypsionischen§! Technologie"
 ouwron: "Ouw'ron"
 ouwron_desc: "Ouw'ron wurde aus dem eigenen Nomadenstamm verbannt, nachdem er das $end_of_the_cycle_article$ sah und durchstreift seitdem die Sterne auf der Suche nach dessen Gunst. Mit dem Erscheinen der $NAME_Reckoning$ fand Ouw'ron neue Entschlossenheit und lässt sich nicht aufhalten."
 ouwron_catch_phrase: "Es wird eine Abrechnung geben ..."
 shroud.12060.name: "$ouwron$"
 shroud.12060.desc_1: "§HEin unverständliches Wirrwarr von Signalen überflutet unser Kommunikationssystem. Inmitten des Chaos setzt sich eine einzige Stimme durch:§!\n\nEndlich seid Ihr da. Nicht pünktlich, aber auch nicht zu spät. Fürchtet Euch nicht. Ich bin in der Lage, über die Grenzen dieses physischen Gefängnisses hinauszublicken, das wir Realität nennen. Ein Opfer wurde erbracht. Mein Weg ist klar."
 shroud.12060.desc_blind: "\n§HErst jetzt wird uns klar, dass dieses Wesen wie wir sein Augenlicht für die Sache opferte.§!"
 shroud.12060.desc_default: "\n§HErst jetzt wird uns klar, dass die Augenhöhlen dieses Wesens leer sind.§!"
 shroud.12060.desc_2: "\nKommt, seid nicht schüchtern. Ich weiß, dass auch Ihr einen Blick auf die erhabene Schlichtheit warft, die das $end_of_the_cycle_color_article$ sein Eigen nennt. Schließt Euch mir an und lasst uns gemeinsam das Entstehen des Endes herbeiführen."
 shroud.12060.a: "Wie lange kennt Ihr schon das $end_of_the_cycle_article$?"
 shroud.12060.a.response: "Länger, als ich mich erinnern kann. Wie es bei allen Bewusstseinen der Fall ist, schlummert das Wissen unter der Oberfläche, bis der §HSchleier§! den Nebel lichtet. Erst dann wird einem seine reine Absicht deutlich. Unser Ziel ist simpel: das Ende herbeizuführen."
 shroud.12060.b: "Warum möchtet Ihr uns helfen?"
 shroud.12060.b.response: "Ihr fragt, was Ihr bereits wisst. Wir sahen beide seine Unausweichlichkeit. Es hat bereits begonnen. Es gibt keinen anderen Weg. Gemeinsam bewegen wir uns spiralförmig auf das Ende zu."
 shroud.12060.c: "Was könnt Ihr uns anbieten?"
 shroud.12060.c.response: "Ich bin nur Staub in diesem sterbenden Zyklus, so wie auch Ihr. Was könnte ich Euch da schon anbieten? Bewusstseine entschwinden dieser Galaxie, und mir wurde die Aufgabe zuteil, ihre Reise zu beschleunigen und sie zu führen ... und ich erweitere diese Gnade auf Euch."
 shroud.12060.hire_custom_tooltip: "§Y$ouwron$§! tritt unserem Reich als §HAnführer§! bei"
 leader_trait_disciple_of_the_end: "Apostel des Endes"
 leader_trait_disciple_of_the_end_desc: "Ein ergebener Apostel, der dem $end_of_the_cycle_article$. Sein unerschütterlicher Glaube in die $NAME_Reckoning$ hallt in jeder Schlacht wider, die er führt."
 leader_trait_disciple_of_the_end_effects: "$t$- $@disciple_of_the_end_aura_intensity|0=+$ Aurenintensität für jedes zerstörte Schiff im System$TABBED_NEW_LINE$- $@disciple_of_the_end_jumpdrive_range|0=+%$ $MOD_SHIP_FTL_JUMPDRIVE_RANGE_MULT$ innerhalb der §H$end_aura$§!"
 shroud.12155.name: "Reine Überzeugung"
 shroud.12155.desc: "§HJede Handlung zieht Konsequenzen nach sich. Als unsere Kommunikationsarrays zum Leben erwachen, bricht $ouwron$ in rechtschaffene Wut aus.§!\n\nKetzer! Narren! Betrüger! Wir hätten es wissen sollen. Wir hätten Euch in dem Moment niederstrecken sollen, als Eure verdorbene Essenz in den §HSchleier§! eindrang.\n\nIhr habt das Unvermeidliche hinausgezögert. Die Endgültigkeit, die vorausgesagt wurde! Was glaubt Ihr, bewirkt Ihr mit Eurem Trotz? Alles, was Ihr hättet erhalten können, ist nun verloren.\n\nEs gibt nur ein Ende. Beginnt also damit, zu singen ... Singt, bis Ihr im Vergessen entschwunden seid."
 shroud.12155.tt: "$ouwron$ wendet sich gegen uns!"
 NAME_Ouwron_Battleship: "$battleship$"
 NAME_Ouwron_Destroyer: "$destroyer$"
 shroud.12160.title: "Krieg erklärt"
 shroud.12160.desc: "[global_event_country.GetGalCommunityOrGalImperiumDE3Cap] erließ einen Beschluss, der uns als Ziel ihrer militärischen Operationen deklariert. Alle Mitglieder [global_event_country.GetGalCommunityOrGalImperiumDE2] befinden sich von diesem Augenblick an im Krieg mit [this.GetName]. Wir können davon ausgehen, dass ihre Flotten jeden Moment zuschlagen werden."
