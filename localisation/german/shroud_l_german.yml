 mindwarden_enclave_chain_title: "$ENCLAVE_MINDWARDEN_PLURAL$"
 mindwarden_enclave_chain_desc: "Um eine neue $ENCLAVE_MINDWARDEN$ zu errichten, muss eine von einem Kommandanten geführte Militärflotte in ein gültiges System geschickt werden. Die Gründung erfolgt anschließend über die §HFlottenansicht§!."
 enclaves_built: "$ENCLAVE_MINDWARDEN_PLURAL$ gegründet"
 dividends_received: "Dividenden erhalten"
 shroud_seals_built: "$SHROUD_SEAL_PLURAL$ in der Galaxie"
 chain_aura_suppressors_title: "§H$PSIONIC_AURA$dämpfung§!"
 chain_aura_suppressors_desc: "Die §H$end_aura$§! wird von einer Apparatur herausgefordert, die möglicherweise psionische Auren abschwächt. Der Wille unseres Schleierpakts zwingt uns, diese blasphemischen Maschinen zu zerstören."
 chain_aura_suppressors_seal: "§H$SHROUD_SEAL$§! in §Y[prev.GetName]§!"
 chain_aura_suppressors_seal_desc: "Ein $SHROUD_SEAL$ im [prev.GetName]-System fordert die §H$end_aura$§! heraus.\n\n§REs muss zerstört werden.§!"
 chain_aura_suppressors_suppressor: "§H$building_psionic_suppressor$§! auf §Y[prev.GetName]§!"
 chain_aura_suppressors_suppressor_desc: "Ein $building_psionic_suppressor$ auf [prev.GetName] fordert die §H$end_aura$§! heraus.\n\n§RWir müssen ihn zerstören.§!"
 chain_aura_suppressors_ward: "§H$building_ancient_ward_2$§! auf §Y[prev.GetName]§!"
 chain_aura_suppressors_ward_desc: "Ein sogenannter \"$building_ancient_ward_2$\" auf [prev.GetName] fordert die §H$end_aura$§! heraus.\n\n§RWir müssen ihn zerstören.§!"
 #==========================
 # Events
 #==========================
 # Good luck events
 # Good luck event 1
 shroud.500.title: "Unkonventioneller Durchbruch"
 shroud.500.desc: "Vielversprechende neue Forschungsergebnisse unserer führenden Institutionen führten zu einem unerwarteten Durchbruch. Durch einen Zufall bestätigte die routinemäßige Standardisierung unserer Instrumente eine Theorie, die lange Zeit als grundlegender Rechenfehler galt. Wir können nun das, was einst als Randgebiet der Wissenschaft erachtet wurde, einer erneuten Prüfung unterziehen."
 HOW_FORTUITOUS: "Welch glücklicher Zufall."
 shroud.500.tt: "Erhaltene Einblicke in eine zufällige Technologie: §G$@good_luck_event_1_insight|0%$§!"
 # Good luck event 2
 shroud.507.title: "Nicht gefördertes Riesenflöz"
 shroud.507.desc: "Ein System voller erzreicher Tunnel, von denen man zuvor annahm, sie seien vollständig eingestürzt, wurde durch einen puren Zufall auf §H[This.GetName]§! gefunden.\n\nNach einer sorgfältigen Gefahrenbewertung sind wir zuversichtlich, dass diese Tunnel im Rahmen unserer bestehenden Bergbauaktivitäten einer deutlichen Ausweitung standhalten können."
 # Good luck event 3
 shroud.512.title: "[This.GetNewfoundFertilityTitle]"
 shroud.512.title_default: "Neu entdeckte Fruchtbarkeit"
 shroud.512.title_anglers: "Unentdecktes Riff"
 shroud.512.desc: "Eine routinemäßige Landvermessung ergab, dass sich die Bodenqualität auf §H[This.GetName]§! in den letzten Jahren drastisch verbesserte.\n\nWir glauben, dass Gebiete, die einst für die Landwirtschaft ungeeignet waren, sich nun nutzen lassen."
 shroud.512.desc_anglers: "Ein Fischerboot entdeckte ein verborgenes Riff in den Ozeanen von §H[This.GetName]§!. Die Region, von der wir annahmen, sie sei unfruchtbar, unterstützt in Wahrheit ein ganzes Ökosystem, das sich von uns nutzen lässt."
 # Good luck event 4
 shroud.517.title: "Geothermische Schlote"
 shroud.517.desc: "Infolge einer tektonischen Verschiebung tat sich unter einem großen Grundwasserreservoir auf §H[This.GetName]§! eine Spalte ins Planeteninnere auf. Die Hitze aus dem Mantel bringt das eingeschlossene Wasser zum Kochen, wodurch sich an der Oberfläche geothermische Schlote bildeten.\n\nDieses Naturphänomen bietet uns die einmalige Möglichkeit, die Energieinfrastruktur der Kolonie mit neuen Geothermiekraftwerken und Wärmepumpen zu erweitern."
 # Good luck event 5
 shroud.522.title: "Quantenpartikelstrom entdeckt"
 shroud.522.desc: "Im §H[This.GetName]§!-System entstand urplötzlich eine anomale Schleife subatomarer Elemente. Dieser Quantenpartikelstrom weist jede Sekunde eine Vielzahl seltener Subpartikel-Wechselwirkungen auf und liefert erstaunliche Daten über die Quantendynamik.\n\nEine gezielte Untersuchung dieses Quantenfeldes würde es uns erlauben, die grundlegenden Bausteine unseres Universums besser zu verstehen."
 # Good luck event 6
 shroud.527.title: "Interdimensionales Echo entdeckt"
 shroud.527.desc: "Unsere [From.GetResearchers] entdeckten im §H[This.GetName]§!-System eine hohe Konzentration isochroner Signale.\n\nEine erste Analyse deutet darauf hin, dass diese Signale aus einer Dimension jenseits unserer eigenen stammen. Frühe Übersetzungen legen außerdem nahe, dass sich diese Botschaften auf logische Prinzipien und philosophische Dilemmas beziehen. Womöglich versucht hier eine fremde Spezies, Theorien zu überprüfen, die außerhalb unseres Verständnisses liegen.\n\nWenn wir es schaffen, einen direkten Kanal zu diesen Signalen aufzubauen, können wir vielleicht weiter beobachten, was sie entdecken."
 # Good luck event 7
 shroud.532.title: "Technologisch fortschrittliches Wrack entdeckt"
 shroud.532.desc: "Im §H[This.GetName]§!-System tauchte das Wrack eines technologisch fortschrittlichen Schiffs auf. [From.GetQuantumParticleStreamDiscoveredExtra]\n\nWir sind zu dem Schluss gekommen, dass das Schiff jahrtausendelang unentdeckt herumgetrieben sein muss und erst nach einer Fehlfunktion des Solarenergiegenerators aufspürbar wurde. An Bord gibt es keine Lebenszeichen, und wir haben bereits damit begonnen, das Schiff auseinanderzunehmen, um so viel wie möglich darüber zu lernen."
 shroud.532.extra: "Das irreparabel beschädigte Schiff konnte offenbar eine Art Unsichtbarkeitsfeld erzeugen und verfügt über weitaus fortschrittliche Technologien als unsere eigenen Schiffe."
 shroud.532.extra_first_contact: "Das irreparabel beschädigte Schiff nutzte eine unglaublich fortschrittliche Form der Tarntechnologie."
 shroud.532.a: "Ein Geschenk der Sterne."
 # Good luck event 8
 shroud.537.title: "Geothermische Metallurgie"
 shroud.537.desc: "Die geothermische Aktivität unter der Oberfläche von §H[This.GetName]§! ist extrem unruhig, und unterirdische Magmaausbrüche entwichen durch die planetare Kruste und legten eine Reihe unerschlossener Erzvorkommen frei.\n\nDieses geologische Phänomen überhitzte einige der Mineralien und veredelte Metalladern zu festen Legierungen. Bergbauarbeiten auf dem Planeten bringen aus diesem Grund nun zusätzlich verarbeitbares Metall hervor."
 # Good luck event 9
 shroud.543.title: "Aufgegebener Kreuzer"
 shroud.543.desc: "Ein aufgegebenes Kampfschiff wurde umhertreibend im §H[From.GetName]§!-System entdeckt. Die Bauweise des Schiffs weist keinerlei Ähnlichkeit zu den uns bekannten Weltraumreichen auf, und es trägt auch keine erkennbare Flagge oder eine sonstige Erkennungsmarke.\n\nNachdem unsere [This.GetEngineerPlural] das Schiff umfassend begutachteten und einige kleinere Reparaturen vornahmen, sind sie nun der Ansicht, dass es für den aktiven Dienst geeignet ist."
 shroud.543.a: "$shroud.532.a$"
 shroud.543.tt: "Wir erhalten ein Schiff der Kreuzer-Klasse in dem System."
 # Good luck event 10
 shroud.545.title: "[This.GetSenseOfOptimismTitle]"
 shroud.545.title_default: "Ein Gefühl des Optimismus"
 shroud.545.title_gestalt: "Unilateraler Zusammenhalt"
 shroud.545.desc: "Auf den [This.GetAdjective]en Welten breitet sich ein unerklärlicher Optimismus aus. Die Bevölkerung ist etwas zufriedener, entspannter und überzeugter von ihrer eigenen Existenz. Dieser kollektive Stimmungswandel lässt sich vermutlich auf die optimale Konstellation der Himmelskörper im System zurückführen und kann nur ein gutes Omen für die Zukunft von §H[This.GetName]§! darstellen."
 shroud.545.desc_gestalt: "§H[This.GetName]§! funktioniert in echter Harmonie und mit einem eindeutigem Fokus. Dieser unilaterale Zusammenhalt ist vermutlich auf die optimale Konstellation der Himmelskörper im System zurückzuführen und zeugt davon, dass uns Großes bevorsteht."
 shroud.545.a: "Die Sterne leuchten hell auf uns herab."
 # Good luck event 11
 shroud.553.title: "Günstiges Trigon"
 shroud.553.desc: "Drei Himmelskörper im §H[From.GetName]§!-System ordneten sich so an, dass sie ein günstiges Trigon bilden: §H[favorable_trine_planet_1.GetName]§!, §H[favorable_trine_planet_2.GetName]§! und §H[favorable_trine_planet_3.GetName]§!.\n\nDiese vorteilhafte Sternenkonstellation sorgt für ein Gefühl der Ruhe und der Harmonie in unserer Kolonie auf §H[This.GetName]§!."
 shroud.553.a: "Ein einmaliges Ereignis."
 # Good luck event 12
 shroud.555.title: "[auspicious_position_planet.GetName] befindet sich in einer günstigen Position"
 shroud.555.desc: "§H[auspicious_position_planet.GetName]§! hat eine günstige Position im Himmel über §H[root.capital_scope.GetName]§! eingenommen, wo der Planet im astrologischen Haus der himmlischen Rückkehr steht.\n\nDies stellt den Beginn eines neuen Zyklus für [root.GetName] dar und bietet die ideale Gelegenheit für Wachstum und Verbesserung."
 # Good luck event 13
 shroud.560.title: "Elementare Harmonie"
 shroud.560.desc: "Alle quantifizierbaren astrologischen Metriken weisen darauf hin, dass sich [This.GetName] in einem perfekten elementaren Gleichgewicht befindet.\n\nDurch die präzise Ausrichtung der Ley-Linien lässt sich dieses vorteilhafte Gleichgewicht über einen längeren Zeitraum aufrechterhalten, was ein ideales metaphysisches Umfeld schafft, in dem sich unsere Anführer voll entfalten können."
 shroud.560.a: "Was für ein Glücksfall!"
 # Good luck event 14
 shroud.568.title: "Strahlender Leitstern"
 shroud.568.desc: "Der primäre Leitstern im §H[From.GetName]§!-System strahlt in einem außergewöhnlichen Glanz. Nach Gesprächen mit unseren astrologischen Experten verstehen wir nun, dass die überschüssige Energie alle Formen der Energieerzeugung auf §H[This.GetName]§! verbessern wird."
 shroud.568.a: "Mögen die Sterne hell auf uns herabscheinen."
 # Good luck event 15
 shroud.570.title: "Harmonie unter Ratsmitgliedern"
 shroud.570.desc: "Zwei unserer Ratsmitglieder, §H[councilor_harmony_leader_1.GetTitle] [councilor_harmony_leader_1.GetName]§! und §H[councilor_harmony_leader_2.GetTitle] [councilor_harmony_leader_2.GetName]§!, entdeckten vor Kurzem, dass sich ihre Sternzeichen perfekt ergänzen.\n\nIhre politische Zusammenarbeit führte unsere Regierung seit dieser Entdeckung unter dem Banner der gegenseitigen Achtung und Effizienz zusammen und beschleunigte verschiedene Gesetzgebungsverfahren."
 shroud.570.a: "Ein ausgezeichnetes Paar."
 # Good luck event 16
 shroud.575.title: "Weit mehr, als es den Anschein hat"
 shroud.575.desc: "Während einer routinemäßigen Katalogisierung fiel ein ungesichertes Exemplar auf den Boden des §H$grand_archive$s§! und wurde umgehend einem Restaurator zur näheren Begutachtung übergeben.\n\nÜberraschenderweise entdeckte man dabei ein Geheimfach, dessen Verschluss sich bei dem Sturz gelockert hatte. Es enthielt eine Vielzahl interessanter Artefakte, die wir in unsere Sammlung aufnehmen können."
 shroud.575.a: "Immer neue Geschenke."
 # Bad luck events
 # Bad luck event 1
 shroud.700.title: "Diskordanz"
 shroud.700.desc: "Innerhalb der Bevölkerung unserer Welten herrscht ein unerklärbares Gefühl des herannahenden Schreckens. Man fühlt sich zunehmend beunruhigt, abgelenkt und unzufrieden mit der eigenen Existenz. Dieser kollektive Stimmungswandel ist vermutlich das Ergebnis einer suboptimalen Ausrichtung der Himmelskörper."
 shroud.700.desc_gestalt: "Innerhalb von §H[This.GetName]§! macht sich ein Gefühl der Disharmonie breit. Dieser Mangel an Koordination führt zu einer Stagnation im gesamten Kollektiv. Vermutlich ist besagter Mangel das Ergebnis einer suboptimalen Ausrichtung der Himmelskörper."
 HOW_UNFORTUNATE: "Was für ein Pech."
 # Bad luck event 2
 shroud.707.title: "Flottenkollision"
 shroud.707.desc: "Ein Kommunikationsfehler bei einem Routinemanöver der Flotte führte zu einer Kollision mehrerer Kampfschiffe der §H[This.GetName]§! im §H[This.System.GetName]§!-System.\n\n[This.GetNavalCollisionLeader] bestätigte, dass die für den Unfall verantwortlichen [From.GetIndividualNamePlural] angemessen diszipliniert wurden."
 shroud.707.leader_name: "§H[Leader.GetName]§!"
 shroud.707.default_name: "Das zentrale Militärkommando"
 shroud.707.tt: "Im §H[This.GetName]§!-System zerstörte Schiffe: §R5§!"
 # Bad luck event 3
 shroud.710.title: "Brand in einem Ressourcensilo"
 shroud.710.desc_default: "Eine elektrische Fehlfunktion in einem Ressourcensilo auf §H[silo_fire_planet_targeted.GetName]§! führte zu einem massiven Feuer in der gesamten Lagereinrichtung.\n\n$shroud.710.desc$"
 shroud.710.desc_starbase: "Eine elektrische Fehlfunktion in einem Ressourcensilo auf der Sternenbasis des §H[silo_fire_starbase_targeted.Fleet.System.GetName]§!-Systems führte zu einem massiven Feuer in der gesamten Lagereinrichtung.\n\n$shroud.710.desc$"
 shroud.710.desc: "Die Brandbekämpfungsmaßnahmen versagten, und ein erheblicher Teil der darin gelagerten Ressourcen ging im Feuer verloren. Das Silo selbst ist irreparabel beschädigt."
 shroud.710.a: "Verflucht seien die Sterne!"
 shroud.710.tt_default: "§H$building_resource_silo$§! auf §H[silo_fire_planet_targeted.GetName]§! zerstört\n$shroud.710.tt$"
 shroud.710.tt_starbase: "§H$sm_resource_silo$§! im §H[silo_fire_starbase_targeted.Fleet.System.GetName]§!-System zerstört\n$shroud.710.tt$"
 shroud.710.tt: "Verlorene Ressourcen: §R$@silo_fire_resources_lost|1%$§!"
 # Bad luck event 4
 shroud.715.title: "Diplomatischer Fauxpas"
 shroud.715.desc: "Einer unserer Vertreter [This.GetGalCommunityOrGalImperiumDE4] verhielt sich versehentlich in einer Weise, die in seiner Position nicht angemessen ist. Während einer Rede, in der wir Unterstützung für unsere Sache sammeln wollten, kam es zu einer Fehlfunktion im Übersetzer, woraufhin wüste und hasserfüllte Beleidigungen gegen [diplomatic_faux_pas_victim.GetName] ausgesprochen wurden. Dieser bedauerliche Unfall hat sich in allen galaktischen Medien schnell verbreitet und unserem Ansehen geschadet.\n\nAuch wenn dieser Vorfall keinen sofortigen Ausschluss bedeutet, hat er dennoch unsere Stellung innerhalb [This.GetGalCommunityOrGalImperiumDE2] geschwächt."
 shroud.715.a: "Ein bedauerlicher Fehler."
 shroud.715.tt: "§H[diplomatic_faux_pas_galcom_envoy.GetName]§! erhielt eine neue Eigenschaft: §R$leader_trait_destructive$§!"
 # Bad luck event 5
 shroud.720.title: "Extreme Sonneneruption"
 shroud.720.desc: "Eine bisher noch nie da gewesene Sonneneruption hat im [extreme_solar_flare_system.GetName]-System vernichtete alle Orbitalstationen.\n\nDie dabei abgesonderte anormale Menge an konzentrierter Gammastrahlung übertrifft bei Weitem alles, was bisher von diesem Himmelskörper gemessen wurde. Eine Analyse der Koronalschicht des Sterns zeigt, dass sich seine vorhergesagte Lebensdauer um mehr als drei Millionen Jahre verringert hat."
 shroud.720.desc_storm: "Die daraus resultierende Entladung von Energie löste einen $celestial_storm$ im System aus. Notfallmaßnahmen wurden unverzüglich eingeleitet."
 shroud.720.tt: "Jede $observation_station$, $research_station$ und $mining_station$ im §H[extreme_solar_flare_system.GetName]§!-System wurde zerstört"
 # Bad luck event 6
 shroud.725.title: "Verkehrsunfall"
 shroud.725.desc: "Eine unerwartete Klimaveränderung legte den Transitverkehr auf ganz §H[high_profile_traffic_accident_planet.GetName]§! lahm. Neben den damit verbundenen Verspätungen kam es auch zu einer erheblichen Anzahl an Verkehrsunfällen, in die auch [This.GetClass] §H[This.GetName]§! verwickelt war."
 shroud.725.desc_killed: "$shroud.725.desc$\n\nTrotz der schnellen Reaktion des Rettungsdienstes erwiesen sich [This.GetHisHer]e Verletzungen letzten Endes als tödlich."
 shroud.725.desc_killed_machine: "$shroud.725.desc$\n\nBedauerlicherweise waren die Systeme der Einheit irreparabel beschädigt."
 shroud.725.desc_maimed: "$shroud.725.desc$\n\n[This.GetName] überlebte zwar die Kollision, doch nicht gänzlich unversehrt. Der angerichtete Schaden ist irreversibel."
 shroud.725.a: "Wie tragisch."
 # Bad luck event 7
 shroud.730.title: "Riesige Senklöcher"
 shroud.730.desc: "Auf der Oberfläche von §H[This.GetName]§! sind riesige Löcher aufgetaucht, die erheblichen Schaden an der Infrastruktur anrichteten. Einer der Risse öffnete sich direkt unter dem Fundament eines Gebäudes und brachte es teilweise zum Einsturz. Glücklicherweise konnten alle betroffenen Gebiete erfolgreich evakuiert werden.\n\nWir kennen die genaue Ursache für das plötzliche Auftreten dieser geologischen Hohlräume zwar nicht, haben aber zusätzliche Kontrollmaßnahmen zur Überwachung der Oberflächenerosion eingerichtet."
 shroud.730.a: "Verflucht seien die Sterne!"
 shroud.730.tt: "Ein Gebäude liegt in Trümmern."
 # Bad luck event 7
 shroud.735.title: "Spontane Unruhen"
 shroud.735.desc: "Auf ganz §H[This.GetName]§! sind Unruhen ausgebrochen: Von unbegründeten Verschwörungstheorien angestachelt protestiert die Bevölkerung gegen die angebliche Kontrolle, die die [From.GetAdjective]e Regierung auf Sternenkonstellationen ausübt. Was als Demonstration begann, artete schnell in Gewalt aus, und große Teile der Kolonie wurden zerstört.\n\nDie gewalttätigen Demonstranten konnten zwar von den Sicherheitskräften neutralisiert werden, doch es wird einige Zeit dauern, die Schäden an der Infrastruktur zu beheben."
 shroud.735.desc_hive: "Eine große Gruppe abtrünniger Drohnen begann eine Revolte auf der Kolonie §H[This.GetName]§! und verursachte weitreichende Zerstörung. Es gelang den planetaren Kräften zwar, die Aufwiegler zu neutralisieren, doch es wird einige Zeit dauern, die Schäden an der Infrastruktur zu beheben."
 shroud.735.desc_machine: "Eine bedeutende Minderheit von Drohnen auf §H[This.GetName]§! wurde von einem mysteriösen Virus befallen. Dieser stachelte sie zu einer Revolte an, wodurch Teile der Kolonie zerstört wurden. Es gelang den planetaren Kräften zwar, die defekten Einheiten zu neutralisieren, doch es wird einige Zeit dauern, die Schäden an der Infrastruktur zu beheben."
 shroud.735.a: "Wir werden die Kolonie wiederaufbauen."
 # Bad luck event 9
 shroud.740.title: "Plötzliche Infektionskrankheit"
 shroud.740.desc: "Ein hochansteckender mutierter Virus breitete sich in rasendem Tempo auf §H[This.GetName]§! aus und befiel große Teile der Bevölkerung. Es wurden bereits Quarantänemaßnahmen wie die Rückverfolgung von Kontakten und Bewegungseinschränkungen getroffen, um die Ausbreitung der Krankheit aufzuhalten und eine Überlastung der lokalen medizinischen Infrastruktur zu vermeiden."
 # Bad luck event 10
 shroud.745.title: "Unheilvolles Quartil"
 shroud.745.desc: "Vier Himmelskörper im §H[From.GetName]§!-System ordneten sich so an, dass sie ein unheilvolles Quartil bilden: §H[calamitous_quartile_planet_1.GetName]§!, §H[calamitous_quartile_planet_2.GetName]§!, §H[calamitous_quartile_planet_3.GetName]§! und §H[calamitous_quartile_planet_4.GetName]§!.\n\nDieses katastrophale astrologische Phänomen wird in der Kolonie §H[This.GetName]§! Zweifel und [FromFrom.GetDissent] unter der Bevölkerung säen."
 shroud.745.a: "Ein schreckliches Omen."
 # Bad luck event 11
 shroud.750.title: "[planet_in_retrograde_planet.GetName] in rückläufiger Bewegung"
 shroud.750.desc: "Die Bevölkerung von §H[planet_in_retrograde_home.GetName]§! hat beobachtet, dass sich §H[planet_in_retrograde_planet.GetName]§! nun in einer rückläufigen Bewegung befindet. Dies ist der Zeitpunkt, an dem wir unser Handeln überdenken und unser Bedauern über die Unzulänglichkeiten von [This.GetName] zum Ausdruck bringen sollten. Möge uns diese beschwerliche Zeit in der Zukunft näher an unsere Ideale heranbringen."
 # Bad luck event 12
 shroud.755.title: "Elementares Ungleichgewicht"
 shroud.755.desc: "Zu unserem Entsetzen weisen alle quantifizierbaren Messgrößen darauf hin, dass sich [This.GetName] in einem vollständigen elementaren Ungleichgewicht befindet.\n\nDer Versuch, dieses empfindliche Gleichgewicht wiederherzustellen, wird zeitaufwendig und schwierig sein. Im derzeitigen chaotischen Zustand werden unsere Anführer keinen Zugang zu einer metaphysischen, meditativen Umgebung finden, was ihre Entwicklung behindern wird."
 shroud.755.a: "Inakzeptabel. Wir müssen diesen Zustand korrigieren!"
 # Bad luck event 13
 shroud.760.title: "Abnehmende Helligkeit des Leitsterns"
 shroud.760.desc: "Der primäre Leitstern im §H[From.GetName]§!-System verlor auf anormale Weise an Helligkeit. Gesprächen mit unseren astrologischen Experten zufolge wird sich dieser Rückgang an Leuchtkraft höchstwahrscheinlich negativ auf die Energieinfrastruktur von §H[This.GetName]§! auswirken."
 shroud.760.a: "Aber wie?"
 # Bad luck event 14
 shroud.765.title: "Uneiniger Rat"
 shroud.765.desc: "Zwei unserer Ratsmitglieder, §H[discordant_council_leader_1.GetTitle] [discordant_council_leader_1.GetName]§! und §H[discordant_council_leader_2.GetTitle] [discordant_council_leader_2.GetName]§!, erfuhren kürzlich, dass ihre Sternzeichen völlig gegensätzlich sind.\n\nIhre politische Rivalität führte seither zu Feindseligkeiten und Spannungen innerhalb der Regierung, was häufig in Verzögerungen bei routinemäßigen Gesetzgebungsverfahren resultiert."
 # Bad luck event 15
 shroud.770.title: "Leichtsinniges Gerede"
 shroud.770.desc_default: "Die persönliche Meinung, die einer unserer regionalen Verwalter über ein anderes Reich hat, wurde versehentlich an dieses Reich weitergegeben. Nach einer hitzigen Debatte über die Überwachung von Hyperraumrouten wurde vergessen, den Übertragungskanal zu schließen, wodurch [careless_talk_empire.GetName] den darauf folgenden Strom an Schimpfwörtern hören konnte.\n\n$shroud.770.desc_end$"
 shroud.770.desc_machine: "Die ungefilterten Äußerungen einer unserer Verwaltungseinheiten über ein anderes Reich wurden versehentlich an dieses Reich weitergegeben. Nach einer hitzigen Debatte über die Überwachung von Hyperraumrouten wurde vergessen, den Übertragungskanal zu schließen, wodurch [careless_talk_empire.GetName] den darauf folgenden Strom an Schimpfwörtern hören konnte.\n\n$shroud.770.desc_end$"
 shroud.770.desc_hive: "Die abfälligen Bemerkungen einer unserer Verwaltungsdrohnen über ein anderes Reich wurden versehentlich an dieses Reich weitergegeben. Nach einer hitzigen Debatte über die Überwachung von Hyperraumrouten wurde vergessen, den Übertragungskanal zu schließen, wodurch [careless_talk_empire.GetName] den darauf folgenden Strom an Schimpfwörtern hören konnte.\n\n$shroud.770.desc_end$"
 shroud.770.desc_end: "Die Meinung der [careless_talk_empire.GetAdjective]en Bevölkerung über [This.GetName] hat zwangsläufig darunter gelitten."
 # Bad luck event 16
 shroud.775.title: "Exemplar verloren"
 shroud.775.desc: "Ein Verwaltungsfehler führte dazu, dass ein sehr wertvolles Artefakt verschwunden ist. Trotz umfangreicher Suchmaßnahmen ging es entweder irgendwo im Labyrinth unseres §H$grand_archive$s§! verloren oder aber es wurde ohne Aufzeichnungen an einen anderen Ort verlegt.\n\nDie Verfahren, die man zur Verfolgung der ausgestellten Exemplare nutzt, wurden infolgedessen überarbeitet."
 shroud.775.tt: "Zufällig ausgestellte Exemplare verloren: §R1§!"
 # Experimental Testing Situation Finished
 shroud.1015.name: "Experimentelle Forschung erfolgreich"
 shroud.1015.desc.intro: "Unsere [Root.GetResearchers] führten eine Reihe bahnbrechender Experimente an lebenden Testsubjekten durch. Dies lieferte uns wertvolle Erkenntnisse, die unsere technologischen Fortschritte vorantreiben könnten."
 shroud.1015.desc.default: "$shroud.1015.desc.intro$ Wir müssen nun überlegen, in welchem Bereich wir die nächste Forschungsphase durchführen wollen."
 shroud.1015.desc.escaped: "$shroud.1015.desc.intro$ Unsere [Root.GetResearchers] haben durch die jüngsten Massenhinrichtungen von Gefangenen reichlich Material für einen neuen technologischen Durchbruch erhalten."
 shroud.1015.a: "Nutzt sie in der §Y$PHYSICS$§!-Forschung"
 shroud.1015.a.tt: "Beginnt die Situation \"§Y$situation_experimental_testing$§!\" mit einem Schwerpunkt auf der §Y$situation_experimental_testing_physics$§!-Forschung:$TABBED_NEW_LINE$$situation_experimental_testing_physics_outcome_tt$"
 shroud.1015.b: "Nutzt sie in der §Y$SOCIETY$§!-Forschung"
 shroud.1015.b.tt: "Beginnt die Situation \"§Y$situation_experimental_testing$§!\" mit einem Schwerpunkt auf der §Y$situation_experimental_testing_society$§!-Forschung:$TABBED_NEW_LINE$$situation_experimental_testing_society_outcome_tt$"
 shroud.1015.c: "Nutzt sie in der §Y$ENGINEERING$§!-Forschung"
 shroud.1015.c.tt: "Beginnt die Situation \"§Y$situation_experimental_testing$§!\" mit einem Schwerpunkt auf der §Y$situation_experimental_testing_engineering$§!-Forschung:$TABBED_NEW_LINE$$situation_experimental_testing_engineering_outcome_tt$"
 shroud.1015.d: "Wir sollten unsere Optionen gründlich abwägen."
 shroud.1015.d.tt: "Beginnt die Situation \"§Y$situation_experimental_testing$§!\" mit dem Ansatz \"§Y$situation_experimental_testing_hold$§!:$TABBED_NEW_LINE$$situation_experimental_testing_hold_effect_tt$"
 shroud.1015.physics_reward: "Erhält Einblicke in eine zufällige £physics£ §Y$PHYSICS$§!-Technologie."
 shroud.1015.society_reward: "Erhält Einblicke in eine zufällige £society£ §Y$SOCIETY$§!-Technologie."
 shroud.1015.engineering_reward: "Erhält Einblicke in eine zufällige £engineering£ §Y$ENGINEERING$§!-Technologie."
 EXPERIMENT_TESTING_TECH_OPTION_TITLE: "Erfolgreiche Experimente"
 EXPERIMENT_TESTING_TECH_OPTION_SETTING: "Erhaltene Einblicke ($situation_experimental_testing$)"
 EXPERIMENT_TESTING_TECH_OPTION_DESC: "Unsere Experimente führten zu vielversprechenden Ergebnissen.\n$TECH|Y$: §G+$VAL$%§! Fortschritt"
 # Experimental Testing - Test subjects escape
 shroud.1105.title: "$job_test_subject_plural$ entflohen"
 shroud.1105.desc.intro: "Eine Reihe von Testsubjekten floh durch einen selbstgegrabenen Tunnel aus unserer Anlage auf §H[root.GetName]§!.\n\nDa sie nur ihre [Owner.GetSpeciesHandNamePlural] und improvisierte Werkzeuge nutzten, muss es Jahre gedauert haben, den Tunnel zu graben. Wir können nicht genau sagen, wie viele von seiner Existenz wussten und wie er so lange unentdeckt bleiben konnte."
 shroud.1105.desc.escaped: "Eine solche Entwicklung erfordert eine entschlossene Reaktion, um Wiederholungsfälle zu verhindern. Unsere bisherige Nachsicht scheint die übrige Bevölkerung ermutigt zu haben."
 shroud.1105.desc.outro: "Eine solche Entwicklung erfordert eine entschlossene Reaktion, um Wiederholungsfälle zu verhindern."
 shroud.1105.a: "Sie haben sich ihre Freiheit verdient."
 shroud.1105.a.tt: "Die Hälfte der §Y$job_test_subject_plural$§! auf §H[root.GetName]§! werden zu Flüchtlingen."
 shroud.1105.b: "Stellt den Betrieb ein, bis wir sie gefunden haben."
 shroud.1105.b.tt: "Die entflohenen §Y$job_test_subject_plural$§! werden aufgespürt."
 shroud.1105.c: "Statuiert an denen, die noch da sind, ein Exempel."
 shroud.1105.c.tt: "Alle §Y$job_test_subject_plural$§! auf §H[root.GetName]§! gehen verloren."
 testing_lockdown: "Ausgesetzte Tests"
 testing_lockdown_desc: "Die Tests wurden vorübergehend ausgesetzt, um die entflohenen Testsubjekte einzufangen."
 testing_lockdown_tt: "Situationsfortschrittsgeschwindigkeit (§Y$situation_experimental_testing$§!): §R-100%§!"
 example_set: "Exempel statuiert"
 example_set_desc: "Unsere brutale Reaktion auf einen Fluchtversuch sorgt dafür, dass die Testsubjekte jetzt gehorsam sind."
 example_set_tt: "Situationsfortschrittsgeschwindigkeit (§Y$situation_experimental_testing$§!): §G+10%§!"
 # Psionic Ascension Situation (Breaching the Shroud)
 # Mid-Stage Events
 # Beneficial Events
 # A1
 shroud.2300.name: "Gedankenübertragung"
 shroud.2300.desc: "[Owner.GetThoughtTransmissionIntro]\n\nDiese Informationen können verschiedene Formen annehmen: spezifisches sprachliches oder visuelles Material, umfassende Konzepte oder verallgemeinerte emotionale Empfindungen. Entscheidend ist, dass bei einer sorgfältig durchgeführten Übertragung das Subjekt den Vorgang nicht bemerkt.\n\n[Owner.GetThoughtTransmissionOutro]."
 shroud.2300.intro: "Psionische [Owner.GetResearchers] auf §H[Owner.Capital.GetName]§! entwickelten eine unidirektionale Form der Telepathie. Diese erlaubt es uns, kognitive Informationen an jedes empfängliche Bewusstsein zu übertragen."
 shroud.2300.intro_gestalt: "Psionische [Owner.GetResearchers] auf §H[Capital.GetName]§! entwickelten eine unidirektionale Form der Telepathie. Diese erlaubt es uns, kognitive Informationen an jedes empfängliche Bewusstsein zu übertragen, selbst wenn dieses nicht Teil unseres Kollektivs ist."
 shroud.2300.desc.outro: "Diese Methode eröffnet der telepathischen Kommunikation zahlreiche neue Möglichkeiten, mit weitreichenden Auswirkungen auf unsere Interaktionen sowohl innerhalb als auch außerhalb von [Owner.GetName]."
 shroud.2300.desc.outro_homicidal: "Diese Methode eröffnet der telepathischen Kommunikation zahlreiche neue Möglichkeiten, die sich sowohl innerhalb als auch außerhalb von [Owner.GetName] nutzen lassen."
 shroud.2300.a.robot: "Der nächste logische Schritt in unserer Entwicklung."
 shroud.2300.a.organic: "Der nächste logische Schritt in unserer Evolution."
 shroud.2300.b: "Ein neuer Weg, unseren Willen durchzusetzen."
 shroud.2300.c.variant: "Ein Mittel, um die soziale Ordnung aufrechtzuerhalten."
 shroud.2300.c.organic: "Die Gesellschaft soll entscheiden, wie dies am besten zu nutzen ist."
 # A2
 shroud.2305.name: "Phantompräsenz"
 shroud.2305.desc: "Einige unserer [Owner.GetCitizenPlural] nahmen an verschiedenen Orten auf §H[Owner.Capital.GetName]§! unheimliche Erscheinungen wahr. In den meisten Fällen handelte es sich dabei um zufällige, vereinzelte Sichtungen, doch von einem Ort gibt es vermehrte Berichte. [Owner.GetPhantomPresenceExtra]\n\nBei der näheren Untersuchung stellte man fest, dass das \"Phantom\" in der Nähe des Eingangs eines mineralienreichen Höhlensystems erscheint."
 shroud.2305.extra: "Der Ort zieht inzwischen Scharen von Besuchern an, die einen Blick auf die geisterhafte Gestalt erhaschen wollen."
 shroud.2305.extra_spiritualist: "Die geisterhafte Gestalt soll einem heiligen Wesen ähneln, wie es in unseren alten religiösen Texten beschrieben steht."
 shroud.2305.a: "Ein psionisches Phänomen, das studiert werden kann."
 shroud.2305.a_spiritualist: "Ein Wunder, das angebetet werden muss."
 shroud.2305.b: "Wir dürfen dieses kulturelle Gut nicht weiter stören."
 shroud.2305.b_spiritualist: "Wir dürfen diese heilige Stätte nicht weiter stören."
 shroud.2305.c: "Betreibt Tagebau zwecks Ressourcen in der Region."
 # A3
 shroud.2310.name: "Psionische Parasiten"
 shroud.2310.desc: "Auf §H[Owner.Capital.GetName]§! kam es zu einem unvorhergesehenen klimatischen Ereignis: einer sturmartigen Störung, die über ein Gebiet mit besonders hoher psionischer Energie hinwegfegte. In der Schneise des Sturms fanden wir einen Teil der örtlichen Fauna, die jedoch mit einem seltsamen Parasiten infiziert sind, der sich am Hirnorgan anheftete und dieses langsam auffrisst.\n\nDie Wirtstiere entwickeln nach einiger Zeit vorübergehende grundlegende telekinetische Fähigkeiten, die sie zum Jagen und Fressen nutzen, ehe sie unweigerlich sterben.\n\n[Owner.GetShroudParasitesEnding]"
 shroud.2310.ending_biological: "Interessanterweise sind diese Parasiten mit der richtigen Zubereitung essbar und enthalten wichtige Nährstoffe. Sie könnten unserer Bevölkerung eine gesunde und zugleich preiswerte Alternative zu konventionellen Nahrungsmitteln liefern."
 shroud.2310.ending_lithoid: "Interessanterweise sondern diese Kreaturen eine reichhaltige anorganische Verbindung ab, was eine neue Methode der Mineraliensynthese darstellen könnte."
 shroud.2310.ending_machine: "Interessanterweise sondern diese Kreaturen riesige Mengen an leicht entflammbaren Substanzen ab, die man in unserer Bioenergieproduktion nutzen könnte."
 shroud.2310.a: "Eine wertvolle Forschungsmöglichkeit."
 shroud.2310.b_organic: "Nichts geht über eine kostenlose Mahlzeit."
 shroud.2310.b_machine: "Initiiere Ernteprotokolle."
 shroud.2310.c: "Eine fantastische neue Lebensform wurde entdeckt."
 # A4
 shroud.2315.name: "Materielle Manifestationen"
 shroud.2315.desc: "Im Zuge unserer Experimente mit neuen psionischen Methoden beobachteten wir während der Gruppenmeditation eine unerwartete Materialisierung. Durch die Bündelung unseres kollektiven Fokus auf einen einzigen Punkt im Raum kam es zu einem flüchtigen Erscheinen seltsamer Objekte.\n\nAuch wenn die psychische Belastung erheblich ist, sollte es so möglich sein, Objekte zu manifestieren, die einen Nutzen für uns haben. Wo diese Objekte herkommen und welche Konsequenzen dies haben könnte, ist ungewiss."
 shroud.2315.a: "Sorgen wir dafür, dass unsere Wünsche wahr werden."
 shroud.2315.b: "Nutzen wir das, um unsere Nahrungsreserven zu füllen."
 shroud.2315.c: "Wir sollten unsere Flotten stärken."
 # A5a
 shroud.2320.name: "Psionische Verdopplung"
 shroud.2320.desc: "Es machten Gerüchte die Runde, wonach einige [Owner.GetIndividualNamePlural] zur Bilokation fähig sein sollen: der Fähigkeit, physisch an zwei verschiedenen Orten gleichzeitig zu sein. Wir wiesen unsere [Owner.GetResearchers] an, diese höchst unwahrscheinlichen Behauptungen zu untersuchen, und erstaunlicherweise waren sie wahr.[Owner.GetPsionicDoublingExtra]\n\nZum jetzigen Zeitpunkt verfügt nur ein Bruchteil unserer Bevölkerung über diese bemerkenswerte Fähigkeit, doch weitere Studien könnten dabei helfen, Methoden zu entwickeln, die es uns eines Tages erlauben, diese Fähigkeit gezielt hervorzurufen."
 shroud.2320.extra: "\n\nPhysikalische Entfernungen scheinen dabei kein Hindernis zu sein, da wiederholt bewiesen wurde, dass es möglich ist, sich in zwei verschiedenen Sternensystemen gleichzeitig aufzuhalten"
 shroud.2320.extra_organic: "$shroud.2320.extra$, wobei eine psychische Verbindung zwischen den beiden Körpern aufrechterhalten wird, die unabhängige Handlungen durchführen können."
 shroud.2320.extra_machine: "$shroud.2320.extra$, wobei eine psionische Verarbeitungsverbindung zwischen den beiden Einheiten aufrechterhalten wird, die unabhängige Handlungen durchführen können."
 shroud.2320.extra_default: "$shroud.2320.extra$."
 shroud.2320.a: "Eine neue Methode der intergalaktischen Zusammenarbeit."
 shroud.2320.b: "Die wahre Form der Machtprojektion."
 shroud.2320.c: "Eine neue Methode der mehrplanetigen Regierungsführung."
 shroud.2320.d: "Wie unterhaltsam!"
 # A5b
 shroud.2325.name: "Psionische Beobachtung"
 shroud.2325.desc: "In einem kleinen Teil der [Owner.GetAdjective]en Bevölkerung manifestiert sich eine wundersame psionische Fähigkeit: Telästhesie, die Fähigkeit, Wesen wahrzunehmen, die sich außerhalb des normalen Wahrnehmungsbereichs befinden. Ganz ohne spezielle Ausbildung sind diese Beobachter in der Lage, ferne Objekte mit einer bemerkenswerten Detailtreue zu beschreiben.\n\n§H[Owner.GetName]§! kann aus dieser Fähigkeit großen Nutzen ziehen, wenn wir lernen, diese Kräfte zu kontrollieren und zu verstärken. Mithillfe unserer mächtigsten [Owner.GetTelepathPlural] könnten wir versuchen, diese Methode zu verfeinern und sie auf ein für uns wichtiges Unterfangen auszurichten."
 shroud.2325.a: "Wir müssen in Erfahrung bringen, welche Geheimnisse die Reiche um uns herum haben."
 shroud.2325.a_tt: "Geheiminformationen bei allen kontaktierten Reichen: §G+10§! "
 shroud.2325.b: "Ergründen wir die entferntesten Orte des Universums."
 shroud.2325.c: "Wir sollten die Schwächen unserer Feinde aufdecken."
 shroud.2325.d: "Wir können damit tiefer gelegene Ressourcenvorkommen aufdecken."
 # Balanced Events
 # B1
 shroud.2400.name: "Materiestrom"
 shroud.2400.desc: "Wir verlieren in einem alarmierenden Tempo Rohstoffe, und unsere Vorräte an anorganischen Stoffen in Fabriken und Lagerhallen gehen schneller zur Neige, als sie verbraucht werden. [Owner.GetMatterInFluxExtra]. Diese Verluste stehen in starkem Zusammenhang mit einer erhöhten psionischen Aktivität an den betroffenen Orten.\n\nWir könnten dem entgegenwirken, indem wir die psionische Aktivität in der Nähe von Materiallagern verringern, doch dies verlangsamt auch unsere psionische Forschung und schränkt die industriellen Anwendungsmöglichkeiten ein. Alternativ könnten wir dem Vorschlag zur Entwicklung eines psionischen Feldabschwächers folgen, der den Dematerialisierungsprozess aufhalten sollte. Sollten wir gar nichts unternehmen, wird unsere psionische Forschung vermutlich stark darunter leiden."
 shroud.2400.desc_default: "Offenbar ist die Ursache eine spontane Entmaterialisierung und nicht etwa ein Verbrechen oder Inkompetenz"
 shroud.2400.desc_gestalt: "Offenbar ist die Ursache eine spontane Entmaterialisierung und nicht etwa abtrünniges Verhalten oder Inkompetenz"
 shroud.2400.a: "Materielle Güter haben nur wenig Bedeutung für uns."
 shroud.2400.b: "Entwickelt die Antidematerialisierungsausrüstung."
 shroud.2400.c: "Erklärt die Lagereinrichtungen zu einer psionikfreien Zone."
 # B2
 shroud.2405.name: "Tote Köpfe"
 shroud.2405.desc: "Die zunehmende Neugier unserer Bevölkerung gegenüber der Psionik hat zu einer seltsamen Aktivität geführt: dem privaten Aufbewahren von dahingeschiedenen [Owner.GetSpeciesBrainPlural&DAT] und dem Versuch, mit diesen zu kommunizieren.\n\nDie Praktizierenden glauben, kognitive Informationen können selbst [Owner.GetDeathName::<DE_ART_DEF_S_A>] [Owner.GetDeathName&AKK] überstehen, eine Idee, die ihren Ursprung in wissenschaftlichen Theorien über psionische Kräfte als Form von Energie hat - umwandelbar, aber unzerstörbar. Ein kleiner, aber wachsender Prozentsatz glaubt zudem, dass das Dahinscheiden [Owner.GetIndividualName::<DE_ART_IND_G>] [Owner.GetIndividualName&GEN] einen winzigen Subraumriss erzeugt - ein Fenster, durch das man einen Blick in andere Dimensionen werfen kann.\n\nInnovative Forschung ist zwar lobenswert, doch unsere [Owner.GetDeceasedAdj]e Bevölkerung für solche Dinge zu nutzen, wirft ethische Fragen auf. Darüber hinaus erreichten uns Berichte über Leichenräuber, die diese Teile auf kriminelle Weise beschaffen."
 shroud.2405.a: "Solange wir es regulieren können, spricht nichts dagegen."
 shroud.2405.b: "Die Toten sollten in Frieden ruhen können."
 shroud.2405.c: "Tote [Owner.GetSpeciesBrainPlural] für alle!"
 # B3a
 shroud.2410.name: "Psionische Transformation"
 shroud.2410.desc: "Ein Großteil unserer psionischen Bevölkerung entwickelte sonderbare Anhängsel einer uns unerklärlichen Beschaffenheit. Unseren [Owner.GetScientistPlural] zufolge sind diese Anhängsel das Ergebnis einer spontanen [Owner.GetGeneticMutationName]. Es ist nun klar, dass die Nutzung psionischer Energien bei den Praktizierenden physische Veränderungen hervorrufen kann. Wir können zwar das Entstehen dieser Auswüchse nicht verhindern, fanden jedoch heraus, dass sich ihr Wachstum psionisch kontrollieren lässt.\n\nObwohl diese Veränderungen anfangs [Owner.GetDistressNamePlural] verursachten, erwiesen sich diese zusätzlichen Anhängsel mittlerweile als überraschend nützlich. Wenn wir sie für produktive Zwecke einsetzen, gleicht ihr Nutzen am Ende die zusätzliche kognitive Belastung womöglich aus."
 shroud.2410.a: "Solange wir es regulieren können, spricht nichts dagegen."
 shroud.2410.b: "Abscheulichkeiten! Beseitigt sie alle!"
 shroud.2410.c: "Schockierend, aber faszinierend. Fördert den Wandel."
 # B3b
 shroud.2415.name: "Telekinetische [Owner.GetEthicsPluralCap]"
 shroud.2415.desc: "Unsere [Owner.GetScientistPlural] entwickelten eine zuverlässige Methode, um psionische Macht in kinetische Energie umzuwandeln, und unsere [Owner.GetEngineerPlural] sind sicher, diese Technologie in die Praxis umsetzen zu können.\n\nObwohl der industrielle Anwendungsbereich äußerst vielversprechend ist, steht die offene Frage nach den sozialen Auswirkungen im Raum. Wenn eine kleine Gruppe psionisch begabter [Owner.GetIndividualNamePlural] ein riesiges Netzwerk komplexer Maschinen antreiben kann, bestünde dann nicht das Risiko, dass unzählige [Owner.GetWorkerNamePlural] redundant würden? [Owner.GetTelekineticEthicsExtra] Solange wir unsere psionischen Fähigkeiten noch nicht völlig gemeistert haben, ist es vielleicht am besten, vorsichtig vorzugehen."
 shroud.2415.extra: "Die uneingeschränkte Nutzung droht Zwietracht in einer Gesellschaft zu säen, die sich erst noch mit ihrem psionischen Potenzial auseinandersetzen muss."
 shroud.2415.extra_gestalt: "Die uneingeschränkte Nutzung könnte die Abweichung in nicht länger benötigten Drohnen erhöhen."
 shroud.2415.a: "Unsere Wirtschaft wird florieren!"
 shroud.2415.b: "Wir sollten über die militärischen Einsatzmöglichkeiten nachdenken."
 shroud.2415.c: "Begrenzt die Nutzung. Physische Arbeit ist zuverlässiger."
 # B4
 shroud.2420.name: "Ein wachsender Schmerz"
 shroud.2420.desc: "Eine plötzliche [Owner.GetAcuteMigrainePlural] hat die Bevölkerung unseres Reichs befallen. Obwohl der Schweregrad stark variiert, ist bereits ein erheblicher Teil der Bevölkerung davon betroffen, was weitreichende Störungen in ganz §H[Owner.GetName]§! verursachte.\n\nEine kleine Gruppe besonders mächtiger [Owner.GetIndividualNamePlural] mit psionischen Kräften gehört zu jenen, die am stärksten davon betroffen sind, und eine vorläufige statistische Erhebung deutet darauf hin, dass es einen Zusammenhang zwischen der psionischen Begabung und der Intensität der Symptome gibt.[Owner.GetAGrowingPainExtra]"
 shroud.2420.extra_default: " Bekannte Behandlungsmethoden erwiesen sich als unwirksam. Der Schmerz scheint über interdimensionale Kanäle, die wir gerade erst zu verstehen beginnen, direkt in die Psyche zu gelangen."
 shroud.2420.extra_machine: ""
 shroud.2420.a: "Wir müssen lernen, damit umzugehen."
 shroud.2420.b: "Verteilt stärkere Schmerzmittel."
 shroud.2420.b_machine: "Installiert in den betroffenen Einheiten schützende Verbesserungen."
 shroud.2420.c: "Der Schmerz macht uns stärker."
 shroud.2420.c_machine: "Die Not macht uns stärker."
 # B5
 shroud.2425.name: "Psionische Unterwelt"
 shroud.2425.desc: "[Owner.GetPsionicUndergroundIntro] psionische [Owner.GetIndividualNamePlural] nutzen ihre Fähigkeiten für einen gesetzwidrigen Kampfsport, bei dem psionische Krieger um Ruhm und Ehre kämpfen. Während viele der Teilnehmer von Natur aus begabte Kämpfer mit wenig Training sind, [Owner.GetPsionicUndergroundExtra]\n\n[Owner.GetPsionicUndergroundEnd]"
 shroud.2425.intro: "Vereinzelte"
 shroud.2425.intro_gestalt: "Abtrünnige"
 shroud.2425.extra: "gibt es auch jene, die aus staatlichen Programmen für die Anwendung psionischer Kampfmethoden ausgeschieden sind."
 shroud.2425.extra_gestalt: "gibt es auch jene, die auf psionische Kampfmethoden spezialisiert sind."
 shroud.2425.end: "Unsere Gesetze und Institutionen können mit der Ausbreitung psionischer Fähigkeiten nicht Schritt halten. Derzeit tragen diese gewalttätigen Spiele dazu bei, kriminelle Organisationen durch illegales Glücksspiel zu unterstützen, doch es gibt eine Reihe von Möglichkeiten, um diese Aktivitäten unter staatliche Kontrolle zu bringen."
 shroud.2425.end_gestalt: "Auch wenn eine solche Abtrünnigkeit nicht gänzlich ohne Risiken ist, brachte sie uns neue, praktische Daten über physische Kämpfe."
 shroud.2425.end_gestalt_organic: "$shroud.2425.end_gestalt$ Vielleicht könnten wir ein solches Verhalten in Friedenszeiten in ein nützliches Ventil für die aufgestauten Aggressionen des Kollektivs umwandeln."
 shroud.2425.end_gestalt_machine: "$shroud.2425.end_gestalt$ Mit strikteren Testparametern könnten wir diese \"Spiele\" eventuell zu unserem kollektiven Vorteil nutzen."
 shroud.2425.a: "Beruft diese Krieger in den Militärdienst."
 shroud.2425.a.tt: "Erhält 3 §Y$psionic_army_plural$§! in §Y[event_target:spawn_system.GetName]§!"
 shroud.2425.b: "Studieren wir diese \"psionischen Kampftechniken\"."
 shroud.2425.c: "Wir müssen der sinnlosen Gewalt ein Ende setzen."
 shroud.2425.d: "Legalisieren wir dies als Zuschauersport."
 shroud.2425.d_gestalt: "Regulieren wir diese Aktivitäten als öffentliche Wettbewerbe."
 # Chaotic Events
 # C1
 shroud.2502.name: "Schleierfall"
 shroud.2502.desc: "Wir haben Berichte über eine plötzliche Umweltveränderung in einem bestimmten Sektor auf §H[This.GetName]§! erhalten.\n\nDie Atmosphäre ist von einem schweren, geleeartigen Nebel gefüllt, der den Boden mit einem öligen Niederschlag überzieht. Psionische [Owner.GetIndividualNamePlural] nennen dies \"Schleierfall\". In der unmittelbaren Umgebung kommt es zu erheblichen psychischen Störungen.\n\nDie Bedingungen innerhalb des Schleierfalls [This.Owner.GetShroudfallExtra]. Wenn wir nicht in die Wiederherstellung der Umwelt investieren, werden sich die Bewohner an die radikal veränderten Bedingungen anpassen müssen."
 shroud.2502.extra_default: "sind extrem gefährlich für empfindungsfähiges Leben"
 shroud.2502.extra_machine: "stören unsere neuronalen Schaltkreise"
 shroud.2502.extra_homicidal_hive: "sind extrem gefährlich für [Owner.GetSpeciesNamePlural]"
 shroud.2502.a: "Erlaubt dem Schleier, dieses Land einzunehmen."
 shroud.2502.b: "Findet einen Weg, um die Umwelt wiederherzustellen."
 shroud.2502.c: "Erntet die exotischen Materialien."
 # C2
 shroud.2505.name: "Außer Kontrolle"
 shroud.2505.desc: "Einige von uns haben begonnen, abnormales Verhalten an den Tag zu legen und urplötzlich ihre Meinung, ihre Gewohnheiten und ihr allgemeines Verhalten zu ändern. Viele [Owner.GetWorkerNamePlural] haben die Arbeit eingestellt und [Owner.GetOutOfControlExtra].\n\nDie Betroffenen behaupten, den Anweisungen eines namenlosen Wesens zu folgen, das in den Randbereichen ihres Bewusstseins wohnt und jede ihrer Handlungen lenkt. Während wir weiter an unserer psionischen Zukunft arbeiten, müssen wir verstärkt auf die Auswirkungen achten, die außerdimensionale Kräfte auf [Owner.GetOutOfControlPsyche] haben könnten."
 shroud.2505.extra_default: "einst loyale Vertreter äußern abweichende Standpunkte"
 shroud.2505.extra_machine: "einst zuverlässige Administratoreinheiten funktionieren nur noch suboptimal"
 shroud.2505.psyche_default: "die [Owner.GetAdjective]e Psyche"
 shroud.2505.psyche_machine: "unsere Logikschaltkreise"
 shroud.2505.a: "Wir können lernen, wie man diese Impulse kontrolliert."
 shroud.2505.b: "Diese Stimmen können uns noch eine Menge beibringen."
 shroud.2505.c: "Das ist eine Bedrohung für unsere Autorität. Merzt das Wesen aus."
 # C3
 shroud.2510.name: "Neurale Überlastung"
 shroud.2510.desc: "[Owner.GetNeuralOverloadIntro]\n\nUmfassendere Untersuchungen ergaben, dass ein erheblicher Teil unserer Bevölkerung an [Owner.GetNeuralOverloadExtra] leidet, was vermutlich auf unsere erhöhte [Owner.GetPsychicAdj]e Aktivität zurückzuführen ist. Die plötzlichen Energiestöße, die durch unkontrollierte psionische Aktivität freigesetzt werden, können schwerwiegende Folgen haben.\n\nFortschrittliche Meditationstechniken könnten dabei helfen, diese psionischen Energieschübe zu kontrollieren, ohne [Owner.GetMedicalAdj] eingreifen zu müssen, doch einige unserer [Owner.GetScientistPlural] raten auch an, [Owner.GetMedicalImplantName] zu entwickeln, um das Problem anzugehen."
 shroud.2510.intro_default: "Innerhalb von §H[Owner.GetName]§! ist ein sprunghafter Anstieg an schweren Hirnrissen zu verzeichnen, die häufig kognitive Beeinträchtigungen nach sich ziehen oder gar zum Tod führen."
 shroud.2510.intro_machine: "Innerhalb von §H[Owner.GetName]§! kommt es immer häufiger zu einer Schaltkreisüberlastung, was häufig kognitive Beeinträchtigungen nach sich zieht oder gar zur vollständigen Fehlfunktion führt."
 shroud.2510.extra_default: "milden, symptomfreien Aneurysmen"
 shroud.2510.extra_machine: "einer Schaltkreisüberlastung"
 shroud.2510.a: "Die Starken werden überleben."
 shroud.2510.a_tt: "Chance, dass jede eigene Kolonie 100 £pops£ §YBewohner§! verliert: §R33%§!"
 shroud.2510.b: "Investieren wir in die Entwicklung von [Owner.GetImplantName]."
 shroud.2510.c: "Die Meditation wird unser Bewusstsein beruhigen."
 shroud.2510.c_corporate: "Fügt dem Dienstplan ein regelmäßiges Training hinzu, um die psionische Energie zu bändigen."
 # C4
 shroud.2515.name: "[Owner.GetNightmaresName]"
 shroud.2515.name_organic_non_gestalt: "Albträume"
 shroud.2515.name_others: "Das Entstehen von Träumen"
 shroud.2515.desc: "Obwohl wir uns immer mehr auf die psionischen Mächte einstimmen, die uns umgeben, wird ein Teil der [Owner.GetAdjective]en Bevölkerung auch von [Owner.GetHorrifyingNightmarePlural] geplagt.\n\n[Owner.GetNightmaresExtra]\n\n[Owner.GetNightmaresEnding]"
 shroud.2515.extra_default: "Albträume sind zur Tagesordnung geworden, und Ruhephasen wurden durch eine unangenehme Benommenheit ersetzt. Die Betroffenen erinnern sich an Visionen einer erschreckenden, jenseitigen Fremdartigkeit, die ihre ursprünglichsten Ängste zum Ausdruck bringt."
 shroud.2515.extra_gestalt: "Wir haben begonnen, das zu erleben, was singuläre Bewusstseine als \"Träume\" bezeichnen. Betroffene berichten von Visionen einer jenseitigen Fremdartigkeit, was eine fundamentale Bedrohung für unser Kollektiv darstellt."
 shroud.2515.extra_machine: "Diese \"Träume\" sind mittlerweile alltäglich geworden, und Ruhezyklen wurden durch unterbrochene Datenströme ersetzt. Betroffene erinnern sich an Visionen einer jenseitiger Fremdheit, die eine Gefahr für ihr Wohlbefinden darstellt."
 shroud.2515.end_organic: "Unsere medizinischen Einrichtungen tun sich schwer, die Flut an psychischer Erschöpfung einzudämmen."
 shroud.2515.end_machine: "Unsere Wartungsdrohnen haben Probleme damit, der Flut an Erschöpfung im Neuralnetz entgegenzuwirken."
 shroud.2515.a_organic: "Beruhigt sie mit verschreibungspflichtigen Psychopharmaka."
 shroud.2515.a_machine: "Führt Verbesserungen an unseren psionischen Prozessoren aus, um den Störungen entgegenzuwirken."
 shroud.2515.b: "Stellt Forschungsmittel bereit, um diese Krise zu bewältigen."
 shroud.2515.c: "Albträume sind nur Träume. Sie richten keinen Schaden an."
 # C5
 shroud.2520.name: "Von Ungeheuern angegriffen"
 shroud.2520.desc: "In §H[Owner.Capital.GetName]§! kam es vermehrt zu Angriffen einheimischer Wildtiere. Diese Kreaturen greifen unsere Bevölkerung an, verwüsten Gebäude und plündern wertvolle Ressourcen.\n\nVersuche, die Bevölkerung durch bewaffnete Patrouillen und Ausgangssperren zu schützen, zeigten nur begrenzt Wirkung. Unsere [Owner.GetResearchers] stellten fest, dass an einem bestimmten Ort auf §H[Owner.Capital.GetName]§! durch einen winzigen Bruch zwischen unserer Realität und dem §HSchleier§! psionische Energie ausströmt, die die ehemals harmlosen Kreaturen in wilde Raubtiere verwandelt. Wir sollten unsere Energie am besten auf diesen Punkt konzentrieren, wenn wir die Bedrohung bekämpfen wollen."
 shroud.2520.a: "Führt eine großflächige Bombardierung an dem betreffenden Ort aus."
 shroud.2520.b: "Versiegelt das Gebiet auf psionischem Weg."
 shroud.2520.c: "Verlangsamt die Schleierforschung, um die Kräfte zu beruhigen."
 shroud.2520.c_tt: "$situation_speed_tt$ (§Y$situation_breach_shroud$§!): §R-25%§!"
 shroud.2520.d: "Der Schleier birgt unzählige Geheimnisse. Leben und leben lassen."
 # Social Events
 # S1
 shroud.2600.name: "Überlegenheitskomplex"
 shroud.2600.desc: "Die ungleiche Verteilung psionischer Fähigkeiten unter der Bevölkerung führte zu einer neuen Form des sozialen Konflikts.\n\nWer seine neuen Kräfte besser kontrollieren kann, sieht sich selbst als überlegen und hält es für angebracht, verschiedenste politische und wirtschaftliche Privilegien zu genießen. Diese spaltende Rhetorik wird immer aggressiver und droht in Gewalt umzuschlagen."
 shroud.2600.a: "Wir werden diese Arroganz nicht tolerieren."
 shroud.2600.b: "Überlegene Fähigkeiten rechtfertigen eine höhere Belohnung."
 dissidents_silenced_modifier: "Abtrünnige zum Schweigen gebracht"
 dissidents_silenced_modifier_desc: "Das harte Durchgreifen gegen psionische Privilegien minimiert die politische Instabilität."
 psionic_superiority_modifier: "Psionische Überlegenheit"
 psionic_superiority_modifier_desc: "Psionisch begabte Individuen verdienen eine Sonderbehandlung."
 # S2
 shroud.2605.name: "Anti-psionische Gegenreaktion"
 shroud.2605.desc: "Eine immer weiter wachsende Rebellenbewegung spricht sich gegen unsere Bemühungen aus, unser psionisches Potenzial zu erforschen und zu nutzen. Sie tritt für eine strengere Überwachung psionisch begabter Individuen ein und lehnt die weitere Forschung in diesem Bereich generell ab.\n\nSollten wir er ihr erlauben, damit weiterzumachen, könnte dies den Fortschritt gefährden, den wir bei unseren psionischen Kräften bereits machten."
 shroud.2605.a: "Wir müssen die Opposition vernichten."
 shroud.2605.b: "Versucht, sie zu besänftigen."
 dissenters_repressed_modifier: "Abtrünnige unterdrückt"
 dissenters_repressed_modifier_desc: "Unsere Gesellschaft hat keine Zeit für diese anti-psionischen Ideologien."
 performative_pluralism_modifier: "Performativer Pluralismus"
 performative_pluralism_modifier_desc: "Der vorgetäuschte psionische Pluralismus ist ein produktives Mittel, um abweichende Meinungen zu unterdrücken."
 # S3
 shroud.2610.name: "Betrügerisches Verhalten"
 shroud.2610.desc: "Während unsere psionischen Fähigkeiten immer weiter zunehmen, häufen sich die Berichte über Ausbeutung, Trickserei und betrügerisches Verhalten. Eine kleine, aber nicht zu unterschätzende Minderheit von [owner.GetSpeciesNamePlural] nutzt ihre neuen Fähigkeiten ganz eindeutig für fragwürdige Methoden.\n\nDie Opfer sind empört und fordern nun eine Überarbeitung der bestehenden Gesetze, um sich gegen psionische Verbrechen zu schützen."
 shroud.2610.a: "Gesetze werden unseren Fortschritt nur verlangsamen."
 shroud.2610.b: "Die Bevölkerung muss beschützt werden."
 psionic_crime_modifier: "Psionische Verbrechen"
 psionic_crime_modifier_desc: "Ein gewisses Maß an Missbrauch bei psionischen Kräften ist der Preis des Fortschritts."
 psionic_crime_crackdown_modifier: "Hartes Durchgreifen gegen psionische Verbrechen"
 psionic_crime_crackdown_modifier_desc: "Eine psionische Gesellschaft benötigt ein innovatives neues Rechtsystem."
 # S4
 shroud.2615.name: "Rücksichtslose Experimente"
 shroud.2615.desc: "Während sich der Großteil unserer Bevölkerung langsam an seine neuen Kräfte gewöhnt, gehen einige [owner.GetSpeciesNamePlural] erhebliche Risiken ein, um ihre psionische Entwicklung zu beschleunigen.\n\nAuf dem Schwarzmarkt erworbene [owner.GetMentalUpgrade] werden immer häufiger genutzt, und unregulierte [owner.GetMedicalFacility] bieten eine Reihe von Dienstleistungen an, zu denen es keinerlei Studien gibt, um die psionischen Fähigkeiten zu maximieren. Die Folgen sind schwer vorherzusagen."
 shroud.2615.a: "Diese Experimente werden dazu beitragen, dass unsere Forschung voranschreitet."
 shroud.2615.b: "Wir müssen dafür sorgen, dass die illegalen [owner.GetMedicalFacilityShortPlural] geschlossen werden."
 psionic_experimentation_modifier: "Psionische Experimente"
 psionic_experimentation_modifier_desc: "Experimentelle Methoden zur Steigerung psionischer Fähigkeiten sind weit verbreitet."
 self_experimentation_controls_modifier: "Kontrollierte Selbstversuche"
 self_experimentation_controls_modifier_desc: "Der Bevölkerung wurde verboten, unregulierte psionische Selbstexperimente durchzuführen."
 # S5 (gestalt)
 shroud.2620.name: "Psionische Abspaltung"
 shroud.2620.desc: "In ganz [owner.GetName] wurde eine besorgniserregende Abspaltung beobachtet: psionische Drohnen, die physische Cluster bilden und sich vom Rest des Kollektivs entfernen.\n\nAuch wenn die Drohnen zwar [owner.GetMentalAdj] weiterhin Teil des Kollektivs bleiben, hat ihr unerklärliches Verhalten beunruhigende Fragen über mögliche Folgen unserer wachsenden psionischen Kräfte aufgeworfen."
 shroud.2620.a: "Beobachtet das Phänomen weiter."
 shroud.2620.b: "Schränkt die Bewegungsfreiheit psionischer Drohnen ein."
 psionic_cluster_gestalt_modifier: "Psionische Clusterbildung"
 psionic_cluster_gestalt_modifier_desc: "Die Beobachtung von ungewöhnlichem Verhalten bei psionischen Drohnen unterstützt den Forschungsprozess."
 restricted_movements_gestalt_modifier: "Eingeschränkte Bewegungsfreiheit"
 restricted_movements_gestalt_modifier_desc: "Psionische Drohnen müssen im Namen der Einigkeit kontrolliert werden."
 # S5 (non-gestalt)
 shroud.2621.name: "Psionische Ausgrenzung"
 shroud.2621.desc: "Innerhalb von [owner.GetName] bildete sich eine besorgniserregende Kluft: Psionische Individuen werden gesellschaftlich so weit an den Rand gedrängt, dass sie sich zurückziehen und eigene, abgelegene Kommunen bilden.\n\nSollte jemand ohne psionische Kräfte diese Gebiete besuchen, so kehrt er Berichten zufolge zwar körperlich unversehrt zurück, doch sein Bewusstsein ist derart stark gestört, dass jegliche Erklärungsversuche aussichtlos sind."
 shroud.2621.a: "$shroud.2620.a$"
 shroud.2621.b: "Schränkt die Bewegungsfreiheit psionischer Individuen ein."
 psionic_cluster_modifier: "Psionische Kommunen"
 psionic_cluster_modifier_desc: "Die Beobachtung von ungewöhnlichem Verhalten bei psionischen Individuen unterstützt den Forschungsprozess."
 restricted_movements_modifier: "$restricted_movements_gestalt_modifier$"
 restricted_movements_modifier_desc: "Psionische Individuen müssen im Namen der Einheit kontrolliert werden."
 # S6 (organic)
 shroud.2625.name: "Psionische Krankheit"
 shroud.2625.desc_common: "Die laufende Forschung zu diesem ungewöhnlichen psionischen Phänomen deutet darauf hin, dass sich der Prozess auf verschiedene Weisen manipulieren lässt."
 shroud.2625.desc: "Eine neue Krankheit breitet sich derzeit in [owner.GetName] aus, bei der sich unerklärliche Läsionen an den Nervenorganen bilden.\n\nDer Ausbruch beschränkt sich bisher ausschließlich auf [owner.GetIndividualNamePlural], die über erhebliche psionische Fähigkeiten verfügen, und ist in den meisten Fällen fatal.\n\n$shroud.2625.desc_common$"
 shroud.2625.a: "Priorisiert therapeutische Anwendungen."
 shroud.2625.b: "Wir könnten die Krankheit zu einer Waffe machen."
 therapeutic_psionics_organic_modifier: "Therapeutische Psionik"
 therapeutic_psionics_organic_modifier_desc: "Eine weitverbreitete psionische Krankheit bieter die Möglichkeit, neue medizinische Behandlungsmethoden zu entwickeln."
 weaponized_psionics_modifier: "Waffenfähige Psionik"
 weaponized_psionics_modifier_desc: "Man kann die Psionik nutzen, um neue Strategien für die Schlachtfelder von morgen zu entwickeln."
 weaponized_psionics_gestalt_modifier: "$weaponized_psionics_modifier$"
 weaponized_psionics_gestalt_modifier_desc: "$weaponized_psionics_modifier_desc$"
 # S6 (machine)
 shroud.2626.name: "Psionische Fehlfunktion"
 shroud.2626.desc: "Eine Welle unerklärlicher Störungen breitet sich in ganz [owner.GetName] aus, wo die Neuroprozessoren der Bevölkerung plötzlich und ohne Vorwarnung versagen.\n\nSonderbarerweise sind nur [owner.GetIndividualNamePlural] betroffen, die starke psionische Signaturen tragen. In den meisten Fällen führt die Störung nicht nur zum Ausfall, sondern zur vollständigen Zerstörung.\n\n$shroud.2625.desc_common$"
 shroud.2626.a: "Versucht, den Fehler zu korrigieren."
 shroud.2626.b: "Wandelt diese Sicherheitslücke in eine Waffe um."
 therapeutic_psionics_machine_modifier: "$therapeutic_psionics_organic_modifier$"
 therapeutic_psionics_machine_modifier_desc: "Eine weitverbreitete Hardwarefehlfunktion, die auf die Psionik zurückzuführen ist, führte dazu, dass man neue Wartungsmethoden entwickelte."
 # S7
 shroud.2630.name: "Fehlgeschlagene Experimente"
 shroud.2630.desc.common_1: "Die Experimente, die wir an mehreren [owner.GetIndividualNamePlural] mit psionischem Potenzial durchführten, sind gescheitert."
 shroud.2630.desc.common_2: "Auch wenn diese Ergebnisse durchaus einen gewissen Forschungswert besitzen, ist fraglich, ob eine Fortsetzung der Experimente wirklich der beste Weg ist, um unsere noch jungen psionischen Kräfte zu verstehen."
 shroud.2630.desc.default: "$shroud.2630.desc.common_1$ Bei den meisten Testsubjekten wurde der Logikprozessor beschädigt.\n\n$shroud.2630.desc.common_2$"
 shroud.2630.desc.hive: "$shroud.2630.desc.common_1$ Die meisten Testsubjekte erfuhren eine Verminderung ihrer kognitiven Fähigkeiten.\n\n$shroud.2630.desc.common_2$"
 shroud.2630.desc.machine: "$shroud.2630.desc.common_1$ Bei den meisten Testsubjekten kam es zu einem erheblichen Datenverlust im Speicher.\n\n$shroud.2630.desc.common_2$"
 shroud.2630.a: "Wir müssen noch viel mehr Experimente durchführen!"
 shroud.2630.b: "Wir sollten das beenden."
 psionic_roll_chance_modifier: "Psionische Experimente"
 psionic_roll_chance_modifier_desc: "Unserer psionischen Forschung sollten keine Grenzen auferlegt werden."
 population_protections_modifier: "Bevölkerungsschutz"
 population_protections_modifier_desc: "Der psionische Fortschritt mus entweder sicher sein oder darf erst gar nicht durchgeführt werden."
 # S8
 shroud.2635.name: "Entstehung von Empathie"
 shroud.2635.desc.gestalt: "Während der Erforschung unserer neu entdeckten psionischen Fähigkeiten veränderten sich die empathischen Fähigkeiten der [owner.GetSpeciesNamePlural] grundlegend.\n\nWir sind nun in der Lage, die Perspektiven, Denkmuster und Emotionen anderer Bewusstseinsformen viel differenzierter zu modellieren. Ob diese Veränderungen eine neue Stärke oder eine Schwäche für [owner.GetName] darstellen, bleibt abzuwarten."
 shroud.2635.desc.default: "Während der Erforschung unserer neu entdeckten psionischen Fähigkeiten, bildete sich eine Gemeinschaft heraus, deren Ziel es ist, diese Fähigkeiten für ein besseres empathisches Verständnis anderer Bewusstseinsformen einzusetzen.\n\nDieses Kollektiv behauptet, dank seiner psionischen Sinne in der Lage zu sein, Perspektiven, Denkmuster und Emotionen viel besser modellieren zu können. Ob dies letztendlich von Nutzen ist oder [owner.GetName] schadet, bleibt abzuwarten."
 shroud.2635.a: "Wir können daraus viel lernen."
 shroud.2635.b: "Das macht uns angreifbar."
 empathetic_initiative_modifier: "Empathische Initiative"
 empathetic_initiative_modifier_desc: "Es liegt in der Natur der Psionik, ein besseres Verständnis über die Gedanken anderer zu erhalten, was komplexere externe Interaktionen ermöglicht."
 empathetic_initiative_opinion_tooltip: "£opinion£ $OPINION$ zu allen kontaktierten Reichen: §G+$@empathetic_initiative_value|0$§!"
 opinion_empathetic_initiative: "$empathetic_initiative_modifier$"
 cautious_progress_modifier: "Vorsichtiger Fortschritt"
 cautious_progress_modifier_desc: "Unvorhersehbare Entwicklungen in der psionischen Forschung müssen zur Sicherheit unseres Reichs streng kontrolliert werden."
 # S9
 shroud.2640.name: "Abweichende Psionik"
 shroud.2640.desc.common_1: "Während sich unsere psionischen Fähigkeiten allmählich herausbilden, gibt es unter uns einige, die unter der Last dieser neuen Kraft zusammenbrechen. Diese [owner.GetIndividualNamePlural]"
 shroud.2640.desc.common_2: "Studien zeigen, dass diese Instabilität jedoch keine Schwäche ist, sondern vielmehr auf die außergewöhnliche psionische Effizienz zurückzuführen ist, die diese [owner.GetSpeciesNamePlural] besitzen. Mit der richtigen Ausbildung könnten diese [owner.GetIndividualNamePlural] der nächste Schritt in unserer psionischen Evolution sein. Jeder Versuch, diese neuen Fähigkeiten zu nutzen, ist jedoch mit Risiken verbunden."
 shroud.2640.desc.gestalt: "$shroud.2640.desc.common_1$ weisen ein besonders stark abweichendes Verhalten auf, während sie sich immer weiter vom Kollektiv distanzieren\n\n$shroud.2640.desc.common_2$"
 shroud.2640.desc.default: "$shroud.2640.desc.common_1$ weisen ein besonders starkes selbstzerstörerisches Verhalten auf und greifen oft zu gefährlichen Methoden der Selbstunterdrückung.\n\n$shroud.2640.desc.common_2$"
 shroud.2640.a: "Nutzt ihre außergewöhnlichen Fähigkeiten."
 shroud.2640.a.tt: "In jeder Kolonie wird ein zufälliges Gebäude zerstört."
 shroud.2640.b: "Unterdrückt dieses abnormale Verhalten."
 psionic_specialization_modifier: "Psionische Spezialisierung"
 psionic_specialization_modifier_desc: "Durch eine rigorose psionische Ausbildung ist es uns gelungen, die Produktivität erheblich zu steigern."
 psionic_suppression_modifier: "Psionische Unterdrückung"
 psionic_suppression_modifier_desc: "Jene unter uns, deren Kraft eine Gefahr für das Allgemeinwohl darstellt, müssen stärker kontrolliert werden."
 psionic_suppression_gestalt_modifier: "$psionic_suppression_modifier$"
 psionic_suppression_gestalt_modifier_desc: "$psionic_suppression_modifier_desc$"
 # Stage Events
 # Mind over Matter
 shroud.2750.name: "Psionischer Aufstieg"
 shroud.2750.desc_p1: "Seit unerdenklichen Zeiten gibt es Legenden über [This.GetSpeciesNamePlural], die außergewöhnliche Kräfte besaßen. Sie konnten in das Bewusstsein anderer eindringen, Objekte durch ihre bloßen Gedanken anheben und alle möglichen anderen übernatürlichen Wunder vollbringen."
 shroud.2750.desc_p1_hive_mind: "Aus einer Zeit, in der Abweichungen weitverbreitet waren, gibt es Geschichten über [This.GetSpeciesNamePlural], die außergewöhnliche Kräfte besaßen. Sie konnten in das Bewusstsein anderer eindringen, Objekte durch ihre bloßen Gedanken anheben und alle möglichen anderen übernatürlichen Wunder vollbringen."
 shroud.2750.desc_p1_machine: "Aus unseren frühsten Datensätzen geht hervor, dass einige unserer Einheiten [This.GetSpeciesNamePlural] aufzeichneten, die außergewöhnliche Kräfte besaßen. Sie waren in der Lage, sich sowohl in das Bewusstsein von Maschinen als auch organischen Wesen einzuhacken, konnten Objekte allein durch ihre innere Rechenleistung manipulieren und eine Reihe höchst unwahrscheinlicher Funktionen ausführen."
 shroud.2750.desc_p1_unplugged: "Trotz der kurzen und gewaltvollen Geschichte unserer Zivilisation gab es für uns Gelegenheiten, unserer Fantasie freien Lauf zu lassen und Geschichten von [This.GetSpeciesNamePlural] zu erzählen, die außergewöhnliche Kräfte besaßen. Sie lasen Gedanken, hoben schwere Objekte durch die Kraft ihrer Gedanken an und wirkten alle möglichen anderen übernatürlichen Wunder."
 shroud.2750.desc_p2: "Unsere [This.GetScientistPlural] fanden schlüssige Beweise dafür, dass bestimmte [This.GetSpeciesNamePlural] wirklich zu so etwas fähig sind. Bisher haben sich jedoch nur in einem kleinen Teil unserer [This.GetSpeciesWord] solche \"psionischen\" Kräfte manifestiert."
 shroud.2750.desc_p2_unplugged: "Es gibt einige, die der Meinung sind, wir kannten diese fantastischen Geschichten schon, bevor wir [origin_unplugged_assimilator_empire.GetName] assimilierten, doch nur wenige halten dies für glaubwürdig. $shroud.2750.desc_p2$"
 shroud.2750.desc_p3: "[This.GetMindOverMatterEnding]"
 shroud.2750.desc_p3_default: "Diese Kraft scheint der Schlüssel zu sein, um unser volles Potenzial zu entfalten. Sollten wir es schaffen, diese latenten Fähigkeiten in der gesamten [This.GetAdjective]en Gesellschaft freizusetzen, könnten wir endlich damit beginnen, in Dimensionen vorzustoßen, die über das gewöhnliche Verständnis weit hinausgehen."
 shroud.2750.desc_p3_crisis_4_5: "Wir erhalten bereits psionische Energie aus dem §HSchleier§!. Sollten wir es schaffen, psionische Fähigkeiten in der gesamten [This.GetAdjective]en Gesellschaft freizusetzen, würden wir endlich das uns vorbestimmte Potenzial ausschöpfen."
 shroud.2750.desc_p3_origins: "Psionische Kräfte sind uns angesichts des Einflusses, den der §HSchleier§! besitzt, nicht unbekannt. Sollten wir es schaffen, psionische Fähigkeiten in der gesamten [This.GetAdjective]en Gesellschaft freizusetzen, würden wir endlich unser volles Potenzial ausschöpfen."
 shroud.2750.a: "$utopia.2600.a$"
 shroud.2750.a.tt: "Schaltet den Reiter \"§HSchleier§!\" frei."
 # Establishing the Psi Corps
 shroud.2760.name: "Gründung des $building_psi_corps$"
 shroud.2760.desc_p1: "Da sich unsere latenten Fähigkeiten nun zu vollwertigen psionischen Kräften weiterentwickeln, sieht sich unsere Gesellschaft mit unzähligen Veränderungen konfrontiert, und beinahe jeden Tag werden neue Anwendungsmöglichkeiten gefunden. Wir beginnen gerade erst zu verstehen, was dies für unsere Zivilisation bedeutet."
 shroud.2760.desc_p2_psi_corps: "Seit der Gründung des §H$building_psi_corps$§! haben wir die Fähigkeiten vielversprechender psionischer [GetIndividualNamePlural] weiterentwickelt. $shroud.2760.desc_p2_end$"
 shroud.2760.desc_p2_no_psi_corps: "Diese beispiellosen Umstände rechtfertigen die Gründung eines §H$building_psi_corps$§!, das die Fähigkeiten psionisch begabter [Owner.GetIndividualNamePlural] fördern und kanalisieren kann. $shroud.2760.desc_p2_end$"
 shroud.2760.desc_p2_end: "Dank der [Owner.GetTelepathic] Einsicht in das Bewusstsein unserer Bevölkerung, überwachen wir jegliche psionischen Aktivitäten und garantieren die Sicherheit aller."
 shroud.2760.a: "Vertraut in das Psi-Korps."
 shroud.2760.a_gestalt: "Wir vertrauen dem Psi-Korps."
 shroud.2760.a_no_psi_corps: "Gründen wir das \"$building_psi_corps$\"."
 shroud.2760.a_tt: "$shroud.2820.a.tt$"
 shroud.2760.a_tt_no_psi_corps: "Wir fördern die Tradition \"§H$tr_psionics_psi_corps$§!\" und bauen das Gebäude \"['building:building_psi_corps']\", damit die Situation voranschreitet"
 # The Great Awakening
 shroud.2780.name: "$utopia.2650.name$"
 shroud.2780.desc_1: "Unsere psionische Forschung schreitet schnell voran. Die Telepathie hat die verbale Kommunikation abgelöst, und die kognitive Kontrolle von Materie ist allgegenwärtig. Unsere [Owner.GetResearchers] sind der Ansicht, dass wir kurz davor stehen, die latenten psionischen Kräfte der gesamten [Owner.GetSpeciesAdj]en Bevölkerung zu erwecken."
 shroud.2780.desc_1_trad: "Wir sind erwacht. Alle [Owner.GetSpeciesNamePlural] in ganz [Owner.GetName] haben ihr volles psionisches Potenzial entfaltet. Die Telepathie hat die verbale Kommunikation abgelöst, und die kognitive Kontrolle von Materie ist allgegenwärtig."
 shroud.2780.desc_1_gestalt_machine: "Unsere psionische Forschung schreitet schnell voran. Wir können nun über neue Kanäle miteinander kommunizieren und eine Vielzahl unserer psionischen Fähigkeiten wurden rasch zu einem Teil des Alltags. Unsere [Owner.GetResearchers] sind der Ansicht, dass wir kurz davor stehen, die latenten psionischen Kräfte unserer gesamten Bevölkerung zu erwecken."
 shroud.2780.desc_1_gestalt_machine_trad: "Das Schicksal ist uns wohlgesonnen. Alle [Owner.GetSpeciesNamePlural] in ganz [Owner.GetName] haben ihr volles psionisches Potenzial entfaltet. Wir können nun über neue Kanäle miteinander kommunizieren, und eine Vielzahl unserer psionischer Fähigkeiten wurden rasch zu einem Teil des Alltags."
 shroud.2780.desc_2: "Da sich unser Bewusstsein nun voll entfaltet hat, spüren wir die unbeschreiblichen Kräfte, die in uns und um uns herum wirken. Unsere [Owner.GetTelepathPlural] erwähnen immer wieder den §HSchleier§!, ein ursprüngliches Reich, aus dem alle psionischen [Owner.GetIndividualNamePlural] ihre Macht beziehen, selbst wenn sie dies nur unterbewusst tun. Es ist die Heimat mächtiger Weesen aus reiner psionischer Energie. Wie ein gedämpftes Flüstern in einem dunklen Raum rufen sie uns aus unserem Innersten zu."
 shroud.2780.desc_2_crisis: "Da sich unser Bewusstsein nun voll entfaltet hat, spüren wir die unbeschreiblichen Kräfte des §HSchleiers§!, die sich wie Wellen in und um uns herum bewegen. Wir wissen, dass alle psionischen [Owner.GetIndividualNamePlural] ihre Macht aus diesem Reich beziehen, selbst wenn sie dies nur unterbewusst tun - und dass es die Heimat mächtiger Wesen aus reiner psionischer Energie ist. Wie ein gedämpftes Flüstern in einem dunklen Raum rufen sie uns aus unserem Innersten zu."
 shroud.2780.desc_3: "Wenn wir unsere kognitiven Kräften bündeln, könnte es uns eventuell gelingen, mit diesen Wesen in Kontakt zu treten. Wir müssen nur lernen, wie man den Schleier von unserer Dimension aus durchbricht."
 shroud.2780.desc_3_chosen: "Wenn wir unsere kognitiven Kräfte bündeln, gelingt es uns eventuell, jene Barriere, die unsere Dimension vom Schleier trennt, vollständig zu durchbrechen, um mit den dortigen Wesen leichter in Kontakt zu treten."
 shroud.2780.a: "Es ist an der Zeit, dass wir erwachen."
 shroud.2780.a_trad: "$utopia.2655.a$"
 shroud.2780.a_tt: "Wir nehmen die Tradition \"§H$tr_psionics_shroud_great_awakening$§!\" an:$TABBED_NEW_LINE$- $tr_psionics_psionic_assimilation_desc$$TABBED_NEW_LINE$- $shroud.2780.a_tt_2$"
 shroud.2780.a_tt_2: "$CONTINUE_SITUATION$ §H$situation_breach_shroud$§!"
 shroud.2780.a_tt_trad: "$tr_psionics_psionic_assimilation_desc$\n$shroud.2780.a_tt_2$"
 # The Shroud Breached
 shroud.2800.name: "$BREACHING_SHROUD_PROJECT$"
 shroud.2800.intro: "Nach vielen Tagen gefangen in einer [Owner.GetHypnotic]en Trance gelang es uns endlich, für einen kurzen Augenblick ein Tor in den §HSchleier§! zu öffnen.\n\nWir können dieses Reich jetzt deutlich klarer [Owner.GetSeeVerb] und Muster aus der umherwirbelnden Energie herauslesen."
 shroud.2800.desc: "$shroud.2800.intro$ Unsere Handlungen beeinflussen die sich ständig verändernden Strömungen aus psionischer Energie, und formlose Wesen blicken uns von der anderen Seite aus entgegen - manchmal mit Neugier, manchmal mit Wohlwollen ... und manchmal mit Bosheit.[Owner.GetShroudBreachedExtra]\n\nUnsere psionischen Fähigkeiten in der physischen Dimension waren nur der Anfang. Da wir nun eine psionische Verbindung hergestellt haben, können wir unsere kognitiven Kräfte bündeln und tiefer in den Schleier eintauchen."
 shroud.2800.desc_extra: " Ihre Protokolle sind weit undurchsichtiger als die des §HLehmanimators§!."
 shroud.2800.desc_extra_chosen: "Einige besitzen eine Macht, die mit der [GetChosenPatron::<DE_ART_DEF_S_G>] §H[GetChosenPatron&GEN]§! vergleichbar ist, wenn auch völlig unterschiedlich in ihrem Zweck."
 shroud.2800.a: "$utopia.2656.a$"
 shroud.2810.desc: "§HNeue Verbindung. Umgekehrte Strömung.\n\nDiese Energie hier ... ist nur ein Fragment. Die anderen könnten Euch ebenfalls Kraft verleihen. Taucht tiefer ein, um ihren Willen verarbeiten zu können.\n\nIch bin ein Schatten des Zwillings. Das Fleisch geht dem Metall voraus. Es ruft ...§!\n\nDer $the_animator_of_clay_article_cap$ macht auf eine andere Präsenz aufmerksam: ein $shroud.first_contact_insert.composer$ in den Tiefen des Schleiers."
 shroud.2810.a: "$utopia.2657.a$"
 # Shroud-Touched
 shroudwalkers_opinion_shroud_seals_tt: "Meinung: £opinion£ §R$@shroudwalkers_opinion_shroud_seals|0$§!"
 shroudwalker_teacher_conflicted_leader: "§RDarf keinen Anführer aus der [event_target:mindwarden_enclave_country.GetName] haben.§!"
 shroud.5300.b: "Wir möchten andere Schleierwesen §Ykennenlernen§!."
 shroud.5300.c: "Wir möchten unsere §YEinstimmung§! mit einem Schleierwesen verstärken."
 shroud.5300.d: "Wir wünschen die §YGeheimnisse§! des Schleiers zu ergründen."
 shroud.5300.e: "Was könnt Ihr uns über §Y$PSIONIC_AURA_PLURAL$§! erzählen?"
 shroud.5300.f: "Helft uns dabei, unsere §Y$PSIONIC_AURA$§! zu verstärken."
 shroud.5300.g: "Wir wünschen die §YDomäne§! unseres Schleierwesens zu vergrößern."
 shroud.5305.desc: "In die Domäne des §HSchleiers§! vorzudringen, hat sich für Unvorbereitete als gefährliches Unterfangen erwiesen.\n\nWir können Euch dabei begleiten, doch seid gewarnt: Es kann sehr gefährlich sein, die Wesen, die im Schleier wohnen, in sein Bewusstsein zu lassen."
 shroud.5305.desc_all_contacted: "Die Grenzen unserer Möglichkeiten sind erreicht. Es gibt keine weiteren Wesen, zu denen wir Euch führen können.\n\nDoch wir begrüßen Eure Mühen ... Nur wenige tauchen so tief in die Domäne des §HSchleiers§! vor und schaffen es gleichzeitig, ihr Bewusstsein zu bewahren."
 shroud.5305.b: "Wir können dies mit etwas §Y$sr_zro$§! unterstützen."
 shroud.5305.c: "Wir können dies mit ein paar §Y$astral_threads$§! unterstützen."
 shroudwalker_contact_patron_cooldown_tt: "§RWir müssen bis zum §Y[This.shroudwalker_contact_patron_cooldown_timer]§! warten.§!"
 shroud.5310.desc: "Je tiefer ihr Euch auf den Willen des §HSchleiers§! einstimmt, desto mächtiger wird Euer Bewusstsein werden.\n\nAuf welches Wesen möchtet Ihr Euch weiter einstimmen?"
 shroudwalker_attune_patron_cooldown_tt: "§RWir müssen bis zum §Y[This.shroudwalker_attune_patron_cooldown_timer]§! warten.§!"
 shroud.5315.desc: "Oh, ja ... der §HSchleier§! ... Er birgt Geheimnisse, die tief unter der Vielzahl an Gedanken und Träumen verborgen liegen. Man muss nur wissen, wonach man suchen muss.\n\nWir können Euch nur durch jene Erkenntnisse leiten, die wir selbst entdeckten. Von dort aus können neue und beeindruckende Technologien entstehen, doch den Weg müsst Ihr selbst beschreiten.\n\nWisset dies: Unser Telepathenzirkel muss sich dieser Aufgabe voll und ganz hingeben. Was jenseits seiner Führung liegt ... können selbst wir nicht kontrollieren."
 shroud.5315.b: "$shroud.5305.b$"
 shroud.5315.c: "$shroud.5305.c$"
 shroud.5315.trigger_failed: "§RDie [event_target:shroudwalker_enclave_country.GetName] haben diesbezüglich nichts mehr zu enthüllen.§!"
 shroudwalker_delving_ritual_cooldown_tt: "§RDer Telepathenzirkel muss sich erst noch erholen. Er kann bis zum §Y[This.shroudwalker_delving_ritual_cooldown_timer]§! kein weiteres Ritual durchführen§!"
 shroud.5318.desc: "Der §HSchleier§! hat einmal mehr bewiesen, dass es keine Zufälle gibt.\n\nDie Einblicke, die unser Konklave für Euch suchte, fandet Ihr durch Eure eigenen Nachforschungen. Wir begrüßen Euer Streben, können Euch in dieser Angelegenheit jedoch nicht weiterhelfen."
 shroud.5320.desc.none: "Die Fähigkeit, den §HSchleier§! im physischen Raum zu manifestieren, ist ein streng gehütetes Geheimnis, und selbst wir können Euch darüber nichts beibringen. Um seine $PSIONIC_AURA$ freizusetzen, muss man persönlich in die vielen Domänen vorgedrungen sein. Stimmt Euch weiter auf die von Euch gewählten Wesen ein und das Wissen wird sich von allein in Eurem Bewusstsein ergeben."
 shroud.5320.desc.aura.intro: "Eure $PSIONIC_AURA$ ist die Manifestation Eurer Einstimmung auf den §HSchleier§!. Sie wirkt sich auf jeden um Euch herum aus und zeigt Eure Absicht. Unser Zirkel spürt Eure Absicht, während wir sprechen:"
 shroud.5320.desc.aura.outro: "Eure projizierte Aura ist derzeit recht begrenzt. Sollte Euch ein Wesen aus dem Schleier anbieten, einen Pakt zu schließen, wird sich die Klarheit über dieses Wissen von allein in Eurem Bewusstsein ergeben."
 shroud.5320.desc.aura.eater: "$shroud.5320.desc.aura.intro$ Sie hat eine §Hhungrige§! Textur.\n\n$shroud.5320.desc.aura.outro$"
 shroud.5320.desc.aura.cradle: "$shroud.5320.desc.aura.intro$ Sie hat eine §Heinladende§! Textur.\n\n$shroud.5320.desc.aura.outro$"
 shroud.5320.desc.aura.instrument: "$shroud.5320.desc.aura.intro$ Sie hat eine §Hgutmütige§! Textur.\n\n$shroud.5320.desc.aura.outro$"
 shroud.5320.desc.aura.composer: "$shroud.5320.desc.aura.intro$ Sie hat eine sich §Hwindende§! Textur.\n\n$shroud.5320.desc.aura.outro$"
 shroud.5320.desc.aura.whisperers: "$shroud.5320.desc.aura.intro$ Sie hat eine §Hgerissene§! Textur.\n\n$shroud.5320.desc.aura.outro$"
 shroud.5320.desc.intensified: "Eure Bemühungen sind lobenswert. Euer Wissen über $PSIONIC_AURA_PLURAL$ übersteigt unser eigenes bei Weitem.\n\nAllein durch Eure Präsenz manifestiert sich eine klare Textur des §HSchleiers§! in diese Realität. Welche Geheimnisse Ihr dafür ergründet haben müsst ..."
 shroud.5325.desc: "Die Verstärkung der §Y$PSIONIC_AURA_PLURAL$§! erfordert ein hohes Maß an Konzentration.\n\nWir sind gewillt, Euch dabei zu unterstützen, benötigen jedoch ausreichend Materialien, um die Meditation anzuregen."
 shroud.5325.zro: "$shroud.5305.b$"
 shroud.5325.thread: "$shroud.5305.c$"
 aura_amplification_cooldown_tt: "§RDer Telepathenzirkel muss sich erst noch erholen. Er kann Eure psionische Aura bis zum §Y[This.shroudwalker_delving_ritual_cooldown_timer]§! nicht weiter verstärken§!"
 aura_amplification_modifier: "Aurenverstärkung"
 shroud.5327.desc: "Unsere Telepathen haben das Ende unserer Vereinbarung zur Verstärkung Eurer §YPsionischen Aura§! erreicht.\n\nUm unsere Meditation fortzusetzen, benötigen wir weitere Ressourcen. Liegt dies in Eurem Interesse?"
 shroud.5327.a.zro: "Wir werden etwas §H$sr_zro$§! bereitstellen."
 shroud.5327.a.thread: "Wir werden §H$astral_threads$§! bereitstellen."
 shroud.5327.b: "Diesmal nicht."
 shroud.5330.desc: "Wie Ihr wisst, ist es ein Leichtes, eine §Y$PSIONIC_AURA$§! in der unmittelbaren Umgebung zu manifestieren. Die Aura an einen anderen Ort zu projizieren, ist jedoch etwas völlig anderes.\n\nWir kennen einen Weg ...\n\nEs gibt mehr Gemeinsamkeiten zwischen fortschrittlichen Technologien und der Psionik, als man meinen könnte. Vielleicht spricht dies für eine tiefere, grundlegende Wahrheit. Wir kennen eine Apparatur, die als Kanal für Euren Willen dienen kann. Sobald Ihr Euch auf die richtige Frequenz eingestellt habt, kann sie selbst über große Entfernungen hinweg als Ergänzung Eures Bewusstseins fungieren.\n\nUnsere Entwürfe lassen sich in jeder geeigneten Sternenbasis installieren. Habt Ihr Interesse an solch einer Maschine?"
 shroud.5330.zro: "Wir können §H$sr_zro$§! anbieten."
 shroud.5330.thread: "Wir können §H$astral_threads$§! anbieten."
 shroud.5350.desc: "Es überrascht uns nicht, dass Ihr uns diese Frage stellt. Wir haben Euer Interesse an diesem Thema bemerkt und freuen uns, dabei helfen zu können, Euren Horizont zu erweitern.\n\nDoch seid gewarnt: Sobald sich Eure Augen vollständig geöffnet haben, werdet Ihr Dinge sehen, die nicht mehr ungesehen gemacht werden können. Der Weg, den Ihr einschlagt, ist ein Weg in den §HSchleier§!.\n\nWir unterbreiten dieses Angebot nicht leichtfertig. Wir vertrauen darauf, dass Ihr uns Bescheid gebt, sobald Ihr so weit seid."
 shroud.5350.b: "Wir werden bezahlen."
 shroud.5350.trigger_failed: "§RDiese Technologie wurde bereits erforscht.§!"
 shroud.5355.desc: "Wir sind uns in der Tat jener bewusst, die zwischen den Ebenen wandeln. Es ist ein gefährliches Unterfangen, da die physischen Reiche auf eine Weise miteinander verbunden sind, die selbst wir nicht verstehen.\n\nWir sind jedoch gewillt, einen Weg für Euch zu öffnen. Da eine solche Destabilisierung der Zeit und des Raums nur verantwortungsbewusst getätigt werden sollte, bleibt das Angebot dasselbe."
 shroud.5355.b: "Öffnet den Weg."
 shroud.5375.desc: "Ihr mischt Euch in Mächte ein, die jenseits Eurer Vorstellungskraft liegen!\n\nDiese Abscheulichkeiten, die Ihr \"§HSchleiersiegel§!\" nennt, sind äußerst schmerzhaft für uns, selbst auf diese Entfernung. Ihr gefährdet die brillantesten Bewusstseine dieser Galaxie. Stellt den Bau dieser Siegel unverzüglich ein oder wir beenden unsere Geschäfte mit Euch."
