 # Tankbound
 civic_tankbound: "Tankgebunden"
 civic_tankbound_desc: "Die Mitglieder dieser Gesellschaft leben in Behältern, die mit einer speziellen biologischen Flüssigkeit gefüllt sind. Sie sind stark auf Unterstützungsausrüstung angewiesen und nicht in der Lage, körperliche Arbeiten selbst zu verrichten."
 civic_tankbound_effects_base: "Fügt die Eigenschaft ['trait:trait_tankbound'] hinzu.\n$job_farmer_plural_with_icon$, $job_miner_plural_with_icon$ und $job_technician_plural_with_icon$ sind vollständig §Yautomatisiert§!.\n['concept_colonist', $job_colonist_plural$]-Jobs gelten als $SPECIALISTS$.\n£district£ §YStadt§!-Distrikte geben zusätzliche Jobs für §Y$job_production_overseer_with_icon$§!."
 civic_tankbound_effects: "$civic_tankbound_effects_base$"
 civic_tankbound_negative_effects: "$t$- Beginnt mit 2K £pop£ Bewohnern weniger als gewöhnlich"
 civic_tankbound_corporate: "Unternehmenswohnbottiche"
 civic_tankbound_corporate_desc: "Diese Gesellschaft führte ein experimentelles Produkt in Form von spezialisierten Wohnbottichen ein. Dies resultierte darin, dass die Bevölkerung stark auf Unterstützungsausrüstung angewiesen und nicht in der Lage ist, körperliche Arbeiten selbst zu verrichten."
