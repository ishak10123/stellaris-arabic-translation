 ACCORD_FRENZY: "Raserei"
 ACCORD_FRENZY_desc: "Die $the_eater_of_worlds_article_cap$ entfacht eine rasende Wut innerhalb unserer Streitkräfte."
 ACCORD_HUNGER: "Hunger"
 ACCORD_HUNGER_desc: "Die $the_eater_of_worlds_article_cap$ sehnt sich nach einem Konflikt."
 ACCORD_DOOM: "Verdammung"
 ACCORD_DOOM_desc: "Wir entfesseln den zerstörerischen Willen der $the_eater_of_worlds_article$ auf unsere Feinde."
 ACCORD_DOOM_TT: "Manifestiert die Flotte \"§Y$Name_Doom_Eater_Fleet$§!\".\n\nDie Stärke dieser Flotte skaliert mit der §YSchreckensintensität§!.\nDerzeitige Schreckensintensität: §Y[GetEaterOfWorldsDoomIntensity]/50§!\n\nVerfügbare Schiffsklassen: [GetEaterOfWorldsShipClasses]\n\n§RBereits existierende Flotten der §Y$Name_Doom_Eater_Fleet$§! werden aufgelöst.§!"
 ACCORD_DIGEST: "Verdauung"
 ACCORD_DIGEST_desc: "Der grenzenlose Hunger der $the_eater_of_worlds_article$ muss gestillt werden."
 ACCORD_DIGEST_TT: "§Y$DEVASTATION$§! auf feindlichen Planeten, die innerhalb unserer §Hpsionischen Aura§! liegen: §G+$@accord_digest_devastation|0$§!\n§Y$HULL$§! und §Y$ARMOR$§! für feindliche Schiffe, die innerhalb unserer §Hpsionischen Aura§! liegen: §G$@accord_digest_ship_malus|0%$§!\n$ACCORD_LOOSE_INTENSITY$"
 # Cradle of Souls accords
 ACCORD_CHARITY: "Vertrauen"
