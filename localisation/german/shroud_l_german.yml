 # Experimentation Chambers
 building_experimentation_chambers_1: "Experimentelle Kammern"
 building_experimentation_chambers_1_desc: "Eine streng geheime Einrichtung, in der man Experimente an unverbesserlichen Gesetzesbrechern durchführt. Diese Kammern bestehen überwiegend aus Gefängniszellen und Forschungslaboren."
 building_experimentation_chambers_2: "Experimenteller Komplex"
 building_experimentation_chambers_2_desc: "Ein Komplex voll streng geheimer Technologien und Internierungsanlagen. Hier werden [Owner.GetIndividualNamePlural], die gegen das Gesetz verstoßen haben, für Experimente benutzt."
 building_experimentation_chambers_3: "Experimenteller Nexus"
 building_experimentation_chambers_3_desc: "Ein Hochsicherheitsnexus und Internierungszentrum. Hier werden [Owner.GetIndividualNamePlural], die aus der Unterwelt dieses Reichs stammen, bahnbrechenden Experimenten unterzogen."
 # Lifecrypt
 # Lifecrypt (Normal)
 building_lifecrypt_1: "Absaugturm"
 building_lifecrypt_1_desc: "Diese monumentalen Konstruktionen sind in der Lage, Energie aus bestimmten Bevölkerungsgruppen in unmittelbarer Nähe abzusaugen. Ausgewählte Individuen tragen spezielle Geräte, die ihre Lebenskraft in einen zentralen Kanal leiten, wo sie sich anschließend an jene mit höherem Status weiterverteilen lässt."
 building_lifecrypt_2: "Seelensauger"
 building_lifecrypt_2_desc: "Auch wenn der Name etwas anderes vermuten lässt, basieren Seelensauger auf praktischer Wissenschaft. Sie wurden speziell darauf kalibriert, Individuen über eine physische Verbindung Energie abzusaugen, und sind in der Lage, Organismen immense Mengen davon zu entziehen, ohne deren Leben zu gefährden."
 building_lifecrypt_3: "Essenzleiter"
 building_lifecrypt_3_desc: "Die Grenzen von Essenzleitern müssen deutlich markiert sein, da das Betreten ohne entsprechende Ausrüstung tödlich sein kann. Ausgewählte Individuen werden darin geschult, ihren Stoffwechsel so zu regulieren, dass sie nicht zu viel Energie auf einmal abgeben."
 # Lifecrypt (Machine)
 building_lifecrypt_machine_1: "Absaugbatterie"
 building_lifecrypt_machine_1_desc: "Diese monumentalen Konstruktionen sind in der Lage, Rechenleistung von bestimmten Drohnen in unmittelbarer Nähe abzusaugen. Ausgewählte Arbeiterdrohnen sind mit einer Spezialausrüstung ausgestattet, die die Energie ihrer Batterien in einen zentralen Kanal leiten, wo sie sich anschließend an jene mit einem höheren Zweck weiterverteilen lässt."
 building_lifecrypt_machine_2: "Batteriekomplex"
 building_lifecrypt_machine_2_desc: "Diese Apparatur wurde speziell dafür kalibriert, Energie von Drohnen über eine physische Verbindung abzusaugen. Sie ist in der Lage, immense Mengen an überschüssiger Rechenleistung abzuzapfen, ohne kritische Fehler zu verursachen."
 building_lifecrypt_machine_3: "Batterienexus"
 building_lifecrypt_machine_3_desc: "Die Grenzen des Batterienexus müssen deutlich markiert werden, da das Betreten für Einheiten ohne geeignete Schutzausrüstung fatal sein kann."
 # Lifecrypt (Hive Mind)
 building_lifecrypt_hive_mind_1: "Absaugturm"
 building_lifecrypt_hive_mind_1_desc: "Diese monumentalen Konstruktionen sind in der Lage, Energie aus bestimmten Drohnen in unmittelbarer Nähe abzusaugen. Ausgewählte Arbeiter tragen spezielle Geräte, die ihre Lebenskraft in einen zentralen Kanal leiten, wo sie sich anschließend an jene in einer höheren Kaste weiterverteilen lässt."
 building_lifecrypt_hive_mind_2: "Seelensauger"
 building_lifecrypt_hive_mind_2_desc: "Auch wenn der Name etwas anderes vermuten lässt, basieren Seelensauger auf praktischer Wissenschaft. Sie wurden speziell darauf kalibriert, Drohnen über eine physische Verbindung Energie abzusaugen, und sind in der Lage, Organismen immense Mengen davon zu entziehen, ohne deren Leben zu gefährden."
 building_lifecrypt_hive_mind_3: "Essenzleiter"
 building_lifecrypt_hive_mind_3_desc: "Die Grenzen von Essenzleitern müssen deutlich markiert sein, da das Betreten ohne entsprechende Ausrüstung fatal sein kann. Arbeiter werden darin geschult, ihren Stoffwechsel so zu regulieren, dass sie nicht zu viel Energie auf einmal abgeben."
 # Lifecrypt (Corporate)
 building_lifecrypt_corporate_1: "Synergie-Hauptquartier"
 building_lifecrypt_corporate_1_desc: "Diese monumentalen Konstruktionen sind in der Lage, Energie von bestimmten Praktikanten in unmittelbarer Nähe abzusaugen. Ausgewählte Individuen tragen spezielle Geräte, die ihre Lebenskraft in einen zentralen Kanal leiten, wo sie sich anschließend an jene in Senior-Positionen weiterverteilen lässt."
 building_lifecrypt_corporate_2: "Synergie-Verwaltung"
 building_lifecrypt_corporate_2_desc: "Die Synergie-Verwaltungsgebäude wurden speziell darauf kalibriert, Individuen über eine physische Verbindung Energie abzusaugen, und sind in der Lage, Praktikanten immense Mengen davon zu entziehen, ohne deren Leben in nennenswertem Maß zu gefährden."
 building_lifecrypt_corporate_3: "Synergie-Nexus"
 building_lifecrypt_corporate_3_desc: "Die Grenzen des Synergie-Nexus müssen deutlich markiert sein, da das Betreten für Praktikanten ohne entsprechende Ausrüstung tödlich sein kann. Ausgewählte Individuen werden in fortschrittlichen Synergietechniken geschult, um ihr Überleben während dieses Prozesses sicherzustellen."
 # Psionic Suppressor
 building_psionic_suppressor: "Psionischer Unterdrücker"
 building_psionic_suppressor_desc: "Dieser Komplex unterstützt eine Reihe psionischer Langstreckendämpfer, die $PSIONIC_AURA_PLURAL$ im gesamten Sternensystem zerstreuen und ihre weitere Ausbreitung verhindern können."
 building_psionic_suppressor_tt: "Tägliche §HIntensitätsreduktion§! (§Y$PSIONIC_AURA$§!) in diesem System: $@building_psionic_suppressor_decrease|0$"
 # Materiality Engine
 building_materiality_engine: "Materialitätsmaschine"
 building_materiality_engine_plural: "Materialitätsmaschinen"
 building_materiality_engine_desc: "Die psionische Energie des Schleiers ist mit jedem Punkt der physischen Galaxie verbunden. Die $building_materiality_engine$ nutzt diese Schnittstelle und macht es möglich, über Dimensionen hinweg wertvolle Komponenten und Ressourcen zu materialisieren."
 building_materiality_engine_tt: "Löst ein §YSpezialprojekt§! aus, um psionische ['concept_components']-Teechnologien aus dem §HSchleier§! zu gewinnen. Bei Abschluss des Projekts wird die Leistung dieses Gebäudes erhöht und damit auch die Anzahl an §H$building_materiality_engine_plural$§!, die man bauen kann."
 biology_unit_is_observator_tt: "Wandelt $t$£job_calculator_biologist£ $job_calculator_biologist_plural$ in $job_observator_drone_plural_with_icon$ um"
 physics_unit_is_extradimensional_research_unit_tt: "Wandelt $t$£job_calculator_physicist£ $job_calculator_physicist_plural$ in £job_extradimensional_research_unit£ $job_extradimensional_research_unit_plural$ um"
