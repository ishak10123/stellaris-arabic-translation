 ACCORD_DESTRUCTION: "Zerstörung"
 ACCORD_DESTRUCTION_desc: "Das, was man Zuhause nennt, ändert sich stetig, doch das $end_of_the_cycle_article$ währt ewig. Das Unausweichliche der Nichtigkeit macht einem nur zu deutlich klar, wie redundant das Leben ist."
 ACCORD_DESTRUCTION_TT: "Eine im Besitz befindliche £colony£ Kolonie mit mindestens §Y$@destruction_planet_pop_min|0$§! £pop£ §HBewohnern§! wird zu einer §HVerschleierten Welt§!.\nFortschritt in der §HSituation§! \"§Y$situation_end_of_the_cycle$§!\": §G-180§!"
