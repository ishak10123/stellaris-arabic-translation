 shroud.4950.title: "Bösartige Aura"
 shroud.4950.desc.1: "Unsere Daten deuten darauf hin, dass diese Aura äußerst bösartig ist. Ohne geeignete Gegenmaßnahmen wird sie sich in rasendem Tempo in der gesamten Galaxie ausbreiten."
 shroud.4950.desc.2: "Wir haben eine mächtige $PSIONIC_AURA$ im §H[from.GetName]§!-System entdeckt"
 shroud.4950.desc.3.intro: "$shroud.4950.desc.2$. Unsere [GetTelepathPlural] glauben, dass diese aus dem §HSchleier§! stammende Strahlung durch die psionischen Aktivitäten"
 shroud.4950.desc.3.default: "$shroud.4950.desc.3.intro$ einer uns fremden Zivilisation entstanden ist."
 shroud.4950.desc.3.contact: "$shroud.4950.desc.3.intro$ von §H[fromfrom.GetName]§! entstanden ist."
 shroud.4950.desc.4: "$shroud.4190.desc.intro$ Solch eine \"§H$PSIONIC_AURA$§!\", wie sie aufgrund der theoretischen Herkunft genannt wird, wurde nun im §H[from.GetName]§!-System entdeckt."
 shroud.4950.desc.5.intro: "$shroud.4950.desc.2$. Sie scheint ihren Ursprung innerhalb der Grenzen"
 shroud.4950.desc.5.default: "$shroud.4950.desc.5.intro$ einer fremden Zivilisation zu haben."
 shroud.4950.desc.5.contact: "$shroud.4950.desc.5.intro$ von §H[fromfrom.GetName]§! zu haben."
 shroud.4950.a: "$grand_archive.1100.a$"
 shroud.4955.title: "Ein Gefühl der Angst"
 shroud.4955.desc.1: "Innerhalb unserer Bevölkerung macht sich das Gefühl breit, dass es schon bald zu einer Katastrophe kommen wird."
 shroud.4955.desc.1.gestalt: "$shroud.4955.desc.1$ Unsere [GetTelepathPlural] stellten gleichzeitig eine Störung in den Energien des §HSchleiers§! fest."
 shroud.4955.desc.1.non_gestalt: "$shroud.4955.desc.1$ Unsere [GetTelepathPlural] geben an, dass sich selbst der §HSchleier§! ungewöhnlich bedrohlich anfühlt und seine Energien in stiller Besorgnis erzittern."
 shroud.4955.desc.2.intro: "In den letzten Jahren nahm die Menge an schrecklichen Ereignissen in der gesamten Galaxie zu."
 shroud.4955.desc.2.outro: "Da wir immer seltsamere Phänomene entdecken, gehen unsere [GetResearchers] davon aus, dass in naher Zukunft noch schlimmere Ereignisse eintreten werden."
 shroud.4955.desc.2.contact_aura: "$shroud.4955.desc.2.intro$ Wir sahen das unerklärbare Wachstum von §H[from.GetName]§! mit an. Wir beobachteten eine §H$PSIONIC_AURA$§!, die immer näherkommt. $shroud.4955.desc.2.outro$"
 shroud.4955.desc.2.contact_no_aura: "$shroud.4955.desc.2.intro$ Wir sahen das unerklärbare Wachstum von §H[from.GetName]§!. $shroud.4955.desc.2.outro$"
 shroud.4955.desc.2.no_contact_aura: "$shroud.4955.desc.2.intro$ Wir beobachteten eine §H$PSIONIC_AURA$§!, die immer näherkommt. $shroud.4955.desc.2.outro$"
 shroud.4955.desc.2.no_contact_no_aura: "$shroud.4955.desc.2.intro$ $shroud.4955.desc.2.outro$"
 shroud.4955.desc.3: "Wir wissen nicht genau, was sich uns nähert, doch wir können mit tiefer Gewissheit sagen, dass etwas kommen wird."
 shroud.4955.a: "Wir müssen uns auf das Schlimmste vorbereiten."
 shroud.4955.a.tt: "Wenn die §H$end_aura$§! die gesamte Galaxie umfasst, endet das Spiel"
 shroud.4960.title: "Psionische Bedrohung"
 shroud.4960.desc.1.intro: "Die bösartige §H$PSIONIC_AURA$§!, die von"
 shroud.4960.desc.1.outro: "hat sich in einem alarmierenden Tempo in der Galaxie ausgebreitet. Den Beobachtungen unserer [GetResearchers] zufolge löste sie in vielen Systemen bereits negative Ereignisse aus."
 shroud.4960.desc.1.contact: "$shroud.4960.desc.1.intro$ §H[from.GetName]§! ausgeht, $shroud.4960.desc.1.outro$"
 shroud.4960.desc.1.no_contact: "$shroud.4960.desc.1.intro$ einer uns noch unbekannten Zivilisation ausgeht, $shroud.4960.desc.1.outro$"
 shroud.4960.desc.2: "Unseren neusten Daten deuten darauf hin, dass die Aura bereits die Hälfte der mit Hyperraumrouten verbundenen Galaxie eingenommen hat. Die Macht, die hinter ihr steht, scheint auf eine Zerstörung im galaktischen Maßstab aus zu sein. Sollte sich ihr nicht bald jemand entgegenstellen, könnte sie ihr Ziel erreichen."
 shroud.4960.a: "Wir müssen sie aufhalten."
 shroud.4960.a.tt: "Kann einen ['concept_total_war', Totalen Krieg] gegen §H[from.GetName]§! erklären.\n$shroud.4955.a.tt$"
 shroud.4965.title: "Drohender Untergang"
 shroud.4965.desc.1.intro: "Die verhängnisvolle §H$PSIONIC_AURA$§!, die von"
 shroud.4965.desc.1.outro: "breitet sich weiterhin in der Galaxie aus. Sie nimmt bereits einen Großteil unserer eigenen Sternensysteme ein."
 shroud.4965.desc.1.contact: "$shroud.4960.desc.1.intro$ §H[from.GetName]§! ausgeht, $shroud.4960.desc.1.outro$"
 shroud.4965.desc.1.no_contact: "$shroud.4960.desc.1.intro$ einer uns noch unbekannten Zivilisation ausgeht, $shroud.4960.desc.1.outro$"
 shroud.4965.desc.2: "Wenn wir nicht rasch wirksame Gegenmaßnahmen ergreifen, droht uns eine galaktische Katastrophe."
 shroud.4965.a: "Dies ist das letzte Gefecht."
 the_reckoning_chain_title: "Die Abrechnung"
 the_reckoning_chain_desc: "Unser Pakt mit dem $end_of_the_cycle_color_article$ führt zur Zerstörung von §H[this.GetName]§!, und nur die Überreste unseres einst mächtigen Reichs bleiben zurück.\n\nDie zerstörerischen Absichten unseres ehemaligen Schleierpakts manifestierten sich nun in der Form eines riesigen Energiewesens: der §R$NAME_Reckoning$§!. Das Wesen bewegt sich von Welt zu Welt und nährt sich an der Bevölkerung, um seine Kraft wiederherzustellen."
