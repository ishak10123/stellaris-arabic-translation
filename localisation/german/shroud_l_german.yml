 ravenous_onslaught: "Heißhungerattacke"
 ravenous_onslaught_desc: "Der Hunger der $the_eater_of_worlds_article$ treibt unsere Flotten in einen wilden Nahkampf. Alle Schiffe, die nach dem Gemetzel noch funktionsfähig sind, beanspruchen wir für uns.\n\n"
