 ATTUNEMENT_TT: "§HEinstimmung§! ist ein Maß für das Interesse, das ein §HSchleierwesen§! an einem Reich hat. Führt ['concept_deeds'] durch oder schließt ['concept_callings'] ab, um die Einstimmung zu verbessern.\n\nDie Einstimmung auf ein Schleierwesen zu steigern, verringert die Einstimmung auf das gegensätzliche Schleierwesen."
