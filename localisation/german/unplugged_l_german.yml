 situation_unplugged_identity_open_conversations: "Keine Einmischung"
 situation_unplugged_identity_open_conversations_effect_tt: "Erlaubt eine freie und offene Diskussion über alle Alternativen durch die Fraktionen und die entsprechende Forschung."
 situation_unplugged_identity_discourage_change: "Status quo"
 situation_unplugged_identity_discourage_change_effect_tt: "Fördert eine zurückhaltendere, weniger reaktionäre Debatte, um den Status quo für die derzeitige Phase dieser Situation aufrechtzuerhalten."
 situation_unplugged_identity_embrace_opinion: "Geförderter Diskurs"
 situation_unplugged_identity_embrace_opinion_effect_tt: "Wendet Ressourcen und politische Unterstützung auf, um die derzeitige Entwicklungsrichtung diese Situation aufrechtzuerhalten."
