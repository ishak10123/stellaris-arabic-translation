 # 'Machine Legacy'
 ###################
 unplugged_origin_machine_legacy_chain_title: "Vermächtnis der Maschinen"
 unplugged_origin_machine_legacy_chain_desc: "Die Maschine, die einst unsere gesamte Spezies assimilierte, hat sich selbst vernichtet. Hinter uns liegt ihre verkohlte Spur aus Dominanz und Brutalität. Welches Ziel verfolgte [origin_unplugged_assimilator_empire.GetName] und welche Rolle spielten wir bei diesen zum Scheitern verurteilten Plänen?"
 signals_followed: "Signale untersucht"
 # System 1: 'The Makers'
 unplugged.2000.name: "Alles umgebend, dissonant, beruhigend"
 unplugged.2000.desc: "In der kosmischen Strahlung, die unseren Stern [capital_scope.star.GetName] umgibt, schlummert ein subtiles Signal.\n\nWir konnten eine Audiofrequenz isolieren, die sich durch eindringliche tiefe Töne und verzerrte Rückkoppelungen auszeichnet. Jeder [root.GetSpecies], der dieses Geräusch hörte, findet es beruhigend und vertraut, doch keiner kann erklären, warum. Wir nehmen an, dass [origin_unplugged_assimilator_empire.GetName] darin involviert sein muss.\n\nDie Quelle des Signals scheint im §Y[origin_unplugged_maker_planet.solar_system.GetName]§!-System zu liegen. Unsere Sternenkarten wurden entsprechend aktualisiert."
 unplugged.2000.a: "Das sollten wir untersuchen."
 unplugged_machine_legacy_makers_poi: "Beruhigende Kakophonie"
 unplugged_machine_legacy_makers_poi_desc: "Von irgendwo im [origin_unplugged_maker_planet.solar_system.GetName]-System aus wird ein fast unhörbares beruhigendes und vertrautes Geräusch gesendet."
 MACHINE_LEGACY_MAKERS_UNPLUGGED_CAT: "Vermächtnis der Maschinen"
 MACHINE_LEGACY_MAKERS_UNPLUGGED_CAT_DESC: "Ein Orbitalscan von [from.GetName] bombardierte unser System fast augenblicklich mit Firmware-Aktualisierungen, und unsere Schiffe gleiten nun noch müheloser durch den Raum. Die Zusammensetzung dieser Datenpakete lässt jedoch vermuten, dass diese Welt einst Teil von §H[origin_unplugged_assimilator_empire.GetName]§! war."
 MACHINE_LEGACY_MAKERS_CAT: "$MACHINE_LEGACY_MAKERS_UNPLUGGED_CAT$"
 MACHINE_LEGACY_MAKERS_CAT_DESC: "Die ersten Scans von [from.GetName] weisen darauf hin, dass es auf dem Planeten eine riesige Menge Technologie gibt, die erst vor Kurzem aufgegeben wurde, und überall auf der Welt sind elektrische Impulse zu messen, die es unseren Sonden schwer machen, einen kohärenten Kurs zu halten. Welche Geheimnisse verbergen sich wohl im Dunst dieser verworrenen elektromagnetischen Felder?"
 unplugged.2005.name: "Das [origin_unplugged_assimilator_empire.GetAdj]e Vermächtnis"
 unplugged.2005.desc: "Mehrere weitere elektromagnetische Felder von großer Dichte sind auf ganz [fromfrom.GetName] aufgetaucht. Diese \"EM-Felder\" sind das Ergebnis einer katastrophalen Energiespitze, die mehrere Fabriken und Werften heimsuchte. Unsere [controller.GetScientistPlural] konnten eines der Felder erfolgreich neutralisieren, nur um festzustellen, dass die Anlage nun irreparabel beschädigt ist.\n\nDie Fabriken, die diese Welt bedecken - und von denen wir glauben, dass sie für §H[origin_unplugged_assimilator_empire.GetName]§! als Produktionszentren dienten - haben uns, [root.GetName], als freundlich identifiziert. Kurz nachdem wir ein Firmware-Update auf unserem Schiff empfangen hatten, wurde die Verbindung jedoch unterbrochen und es kam zu einem kaskadenartigen Ausfall mehrerer regionaler Kraftwerke.\n\nVielleicht haben wir gerade ein Echo unserer eigenen Trennung von der Maschine erlebt. Wir wissen allerdings noch nicht, wie oder warum. Da die Gefahr vor Ort nun abgenommen hat, haben wir jetzt die Möglichkeit, herauszufinden, was [origin_unplugged_assimilator_empire.GetName] in diesen Anlagen herstellte - und vielleicht auch, welche Rolle wir während unserer Assimilierung in ihr Reich spielten."
 unplugged.2005.a: "Beginnt mit einer Ausgrabung."
 unplugged.2006.name: "$MACHINE_LEGACY_MAKERS_UNPLUGGED_CAT$"
 unplugged.2006.desc: "Die elektrischen Impulse, die wir auf [from.GetName] beobachteten, sind das Ergebnis eines bizarren Massenaussterbens unter Maschinen. Erst nachdem unsere Sensoren für einen solch starken Elektromagnetismus kalibriert worden waren, sahen wir das volle Ausmaß der Verwüstung. Der Planet wurde offenbar vor vielen Jahrzehnten von Maschinen besiedelt, wobei sie die zuvor bestehende Zivilisation entweder verdrängt oder ausgelöscht hatten. Von keinem der beiden Reiche gibt es Überlebende, da fast die gesamte Siedlung durch Sabotage oder eine kriegerische Auseinandersetzung in Schutt und Asche gelegt wurde.\n\nTrotz des hohen Entwicklungsstands dieser einstigen Kolonie gibt es wenig Hoffnung, etwas Brauchbares zu finden. Erste Berechnungen lassen vermuten, dass die EM-Felder in etwa einem Jahrhundert ausbrennen werden. Bis dahin ist [from.GetName] nichts weiter als ein Friedhof."
 machine_legacy_makers_site: "Werkseinstellung"
 machine_legacy_makers_site_desc: "Eine katastrophale Stromspitze hat diese riesige Produktionsstätte verwüstet - eine von mehreren Produktionsstätten jenes Reiches, das als \"[origin_unplugged_assimilator_empire.GetName]\" bekannt ist. Unsere Expedition wird versuchen, etwas darüber herauszufinden, wofür man diese Einrichtungen nutzte, und alle eventuell noch vorhandenen Technologien und Ressourcen bergen, um hoffentlich in Erfahrung zu bringen, welche Rolle dieser Ort für unsere eigene Vergangenheit gespielt haben mag."
 unplugged.2010.name: "Fabrikhalle"
 unplugged.2010.desc.unplugged: "Die auf [from.planet.GetName] gefundene Anlage muss eine Produktion titanischen Ausmaßes unterstützt haben. Die einstigen Eingänge werden von riesigen Sprengtüren geschützt, die nun von geschmolzenen Motoren blockiert und geschlossen gehalten werden. Stattdessen verschafften wir uns Zugang über das Belüftungssystem.\n\nIm Inneren fanden wir eine höhlenartige Fabrikhalle voller Trümmer und Überreste von Hunderten kybernetischer Wesen. Bei den meisten scheint es sich um Roboter zu handeln: Mechaniker, Stapler und andere Hilfskräfte, von denen einige erst vor Kurzem zerstört wurden und noch immer Rauch ausstoßen. An einer Seite der Anlage liegen die bereits seit Langem verwesten Leichen mehrerer Cyborgs wie uns, die von eben diesen Robotern getötet wurden. Die säugetierähnlichen Cyborgs wurden mit Augensensoren, kunstvoll verarbeiteten Gliedmaßen und [origin_unplugged_assimilator_empire.GetAdj]en Kontrollknoten ausgerüstet, die nahezu identisch mit unseren eigenen sind. Wir konnten dieses Massaker auf wenige Wochen nach unserer eigenen Abspaltung von [origin_unplugged_assimilator_empire.GetName] datieren, wobei der Großteil der Drohnen erst kürzlich durch die Stromspitze bei unserer Ankunft auf [from.planet.GetName] getötet wurde.\n\nUns ist diese brutale Szene nur allzu vertraut, obgleich hier die Cyborgs ihren Maschinenfeinden nicht gewachsen waren. Im Gegensatz zu ihnen sind wir [owner.GetSpeciesNamePlural] Soldaten, die für ein solches Gemetzel besser gerüstet waren."
 unplugged.2010.a: "Konzentrieren wir uns weiter auf die Ausgrabungen."
 unplugged.2010.b: "Wir sollten diesen Fund sofort öffentlich machen."
 unplugged.2015.name: "Eingebautes Arsenal"
 unplugged.2015.desc.unplugged: "Ein Stück entfernt von dem Gemetzel in der Fabrikhalle befindet sich weiter innen eine Reihe unterirdischer Hangars, in denen man verschiedene Panzertypen, Raketenplattformen und Mecha-Anzüge lagerte. Ein Großteil davon ist jedoch nicht vollständig zusammengebaut, und der Rest wurde von der gleichen Stromspitze zerstört, die auch die [origin_unplugged_assimilator_empire.GetAdj]en Roboter vernichtete. Es ist jedoch noch genug übrig, um eine interessante Schlussfolgerung zu ziehen:\n\nJedes Cockpit und jede Schnittstelle wurde so entworfen, dass sie nicht auf die kleinen säugetierartigen Cyborgs, die wir in der Fabrikhalle fanden, abgestimmt ist, sondern auch ... auf uns. Eine Autopsie und eine architektonische Untersuchung deuten darauf hin, dass diese Welt nicht nur die ursprüngliche Heimat der säugetierartigen Cyborgs war, sondern dass Letztere auch diese gigantischen Fabriken vor ihrer Assimilierung gebaut haben könnten.\n\nEin weiteres Vordingen wird durch einen Einsturz und weitere Sprengtüren behindert. Wir glauben, dass wir uns jedoch den Weg zu etwas bahnen könnten, was ein Forschungs- und Entwicklungszentrum zu sein scheint. Alternativ deuten eine Reihe von Lüftungsschächten auf Wohnunterkünfte unter der Anlage hin. Vielleicht ist dies der Ort, an dem die Einheimischen lebten."
 unplugged.2015.a: "Durchsucht den oberirdischen Teil der Anlage weiter."
 unplugged.2015.b: "Grabt tiefer und seht, was wir über sie herausfinden können."
 unplugged.2021.name: "Aus Zwang"
 unplugged.2021.desc: "Als wir in das Forschungs- und Entwicklungszentrum vordrangen, offenbarte sich uns ein grausamer Anblick: Deutlich mehr säugetierartige Cyborgs fanden hier ihr Ende. Techniker, Ingenieure und sogar Kybernetiker wurden gefunden. Diese Spezialisten entwarfen den Großteil der von uns in den Hangars gefundenen Waffensysteme, und wir fanden auch Beweise dafür, dass sie sogar für viele unserer eigenen Augmentierungen verantwortlich waren. Interessanterweise ist der Großteil der von ihnen verwendeten Ausrüstung [origin_unplugged_assimilator_empire.GetAdj]en Ursprungs. Wir stießen auch auf ein paar qualitativ hochwertige Werkzeuge, die viel besser zu ihrer eigenen organischen Form passten.\n\nWir können die zeitlichen Abläufe nun grob rekonstruieren: Offenbar wurde diese fortschrittliche Gesellschaft ganz plötzlich von [origin_unplugged_assimilator_empire.GetName] assimiliert. Wir vermuten, die Maschinen tauchten hier erst vor wenigen Jahrzehnten auf, da viele der Fertigungstechniken einheimischen Ursprungs zu sein scheinen. Vielleicht war es Glück, dass solch begabte Techniker und ihre fortschrittliche Technologie nicht lange Teil von [origin_unplugged_assimilator_empire.GetName] gewesen sind, denn ansonsten hätten sie über ein viel mächtigeres Arsenal verfügt, als sie sich gegen uns wandten. Stattdessen sind wir nun am Leben, um das mächtige Erbe in Sachen Forschung ihrer Spezies zu studieren."
 unplugged.2022.name: "Der alte Teil von [from.planet.GetName]" # e.g. 'Old Earth' or 'Old Sirius III'
 unplugged.2022.desc.unplugged: "Unter der Anlage erstreckt sich ein riesiges Netz kaum noch bewohnbarer Tunnel. Überall liegen die Leichen von Cyborgs verstreut. Offenbar hat niemand die [origin_unplugged_assimilator_empire.GetAdj]e Säuberung überlebt. Manche von ihnen wurden durch physische Gewalteinwirkung getötet, doch wir fanden auch Hinweise darauf, dass das Lüftungssystem manipuliert wurde. Die meisten scheinen erstickt zu sein.\n\nAnhand einer Autopsie und einer anthropologischen Untersuchung konnten wir grob die zeitlichen Abläufe rekonstruieren. Es deutet alles darauf hin, dass die Bewohner von [from.planet.GetName] Teil einer blühenden Raumfahrergesellschaft waren, bevor sie in Kontakt mit den Maschinen gerieten und von jetzt auf gleich assimiliert wurden. Über einen Zeitraum von nicht mehr als einem Jahrzehnt nutzte [origin_unplugged_assimilator_empire.GetName] die vorhandene Technologie und die Produktionsmöglichkeiten für die Entwicklung einer beeindruckenden Kriegsmaschinerie, nur um im Zuge dessen die Einzigartigkeit dieser Kultur zu vernichten, wie es auch bei uns der Fall gewesen war.\n\nDie kleinen, gebrechlichen Körper der auf dem Planeten heimischen Cyborgs waren den todbringenden Robotern nicht gewachsen, bei deren Bau sie selbst geholfen hatten. Vieles von dem, was sie waren, ist aus ihren eigenen historischen Aufzeichnungen gelöscht worden. Wir können nur vermuten, wie ihr Leben aussah, bevor sie auf [origin_unplugged_assimilator_empire.GetName] trafen."
 unplugged.2030.name: "Zweitfabrik"
 unplugged.2030.desc: "Unsere Langstreckensensoren haben eine plötzliche Bewegung im [origin_unplugged_machine_legacy_core.GetName]-System ausgemacht. Eine feindliche Flotte scheint als direkte Reaktion auf unsere Ausgrabungen auf [fromfrom.planet.GetName] aufgetaucht zu sein."
 unplugged.2036.name: "Maschinenecho"
 unplugged.2036.desc: "Wir können die Kommunikation der [origin_unplugged_assimilator_empire.GetAdj]en Flotte, die wir gerade vernichtet haben, zu einer Boje über [origin_unplugged_taken_planet.GetName] zurückverfolgen. Dies wird das nächste Ziel auf unserer Reise sein."
 unplugged.2036.a: "Wir kommen der Sache näher."
 unplugged.2037.desc: "Mithilfe unserer eigenen ehemals [origin_unplugged_assimilator_empire.GetAdj]en Hardware gelang es uns, den letzten Funkspruch der zerstörten Flotte bis nach [origin_unplugged_maker_planet.GetName] zurückzuverfolgen. Unser nächstes Ziel befindet sich offenbar in der Umlaufbahn von §Y[origin_unplugged_taken_planet.GetName]§!." # e.g. 'our own ex-Martianbot hardware'
 unplugged.2038.desc: "Mithilfe unserer eigenen ehemals [origin_unplugged_assimilator_empire.GetAdj]en Hardware ist es uns gelungen, eine letzte Signalstörung der zerstörten Flotte bis nach [origin_unplugged_maker_planet.GetName] zurückzuverfolgen. Offenbar befindet sich in der Umlaufbahn von [origin_unplugged_taken_planet.GetName] etwas von Interesse." # e.g. 'our own ex-Martianbot hardware'
 # System 2: 'The Taken'
 unplugged_machine_legacy_taken_poi: "Signalstörung"
 unplugged_machine_legacy_taken_poi_desc: "Wir konnten das letzte Signal eines unverständlichen Rauschens von einem vor Kurzem zerstörten [origin_unplugged_assimilator_empire.GetAdj]en Schiff zu diesem Ort zurückverfolgen."
 MACHINE_LEGACY_TAKEN_UNPLUGGED: "Verkörperter Anachronismus"
 MACHINE_LEGACY_TAKEN_UNPLUGGED_DESC: "Wir haben eine Umweltanomalie auf [from.GetName] entdeckt. In der Atmosphäre gibt es Spuren von Verschmutzungen, die wir mit einer primitiven Metallverarbeitung in Verbindung bringen würden, doch die Oberflächenscans werden von einer Strahlung gestört, wie man sie auf einer Maschinenwelt vorfindet.\n\nBevor wir unsere Sensoren nicht entsprechend neu kalibriert haben, werden wir keine verwertbaren Daten sammeln können. Noch wissen wir nicht, ob es sich nur um eine vorübergehende Anomalie handelt oder aber die Überreste einer weiteren Spezies, die von [origin_unplugged_assimilator_empire.GetName] assimiliert wurde."
 unplugged.2100.name: "Gestörter Fortschritt"
 unplugged.2100.desc: "Was auch immer zu der jetzigen Unbewohnbarkeit auf [fromfrom.GetName] führte: Wir können zumindest wildere Theorien über Zeitreisen ausschließen. Die Neukalibrierung unserer Sensoren war unproblematischer als zuerst befürchtet.\n\nUnter all der atmosphärischen Strahlung verborgen gibt es klare Beweise dafür, dass die Welt einst von [origin_unplugged_assimilator_empire.GetName] besucht wurde. Offenbar wurde hier eine Zivilisation ohne ÜL-Technologie entweder assimiliert oder einfach ausgelöscht. Wir konnten mindestens einen befestigen Ort identifizieren, der eine kulturelle Bedeutung gehabt haben könnte und an dem wir weitere Ausgrabungen vornehmen können."
 unplugged.2100.a: "Die Grabungen müssen mit äußerster Sorgfalt durchgeführt werden."
 MACHINE_LEGACY_TAKEN_CAT: "$MACHINE_LEGACY_TAKEN_UNPLUGGED$"
 MACHINE_LEGACY_TAKEN_CAT_DESC: "Die ersten Scans von [root.GetName] ergeben nur wenig Sinn. In der Atmosphäre gibt es Spuren von Verunreinigungen, die auf eine primitive Metallverarbeitung hindeuten, und doch gibt es Hinweise auf hoch entwickelte, weltraumtaugliche Legierungen auf der Oberfläche. Luftbilder zeigen Siedlungen einer [from.owner.GetPreFTLLower], deren Gebäude mit Boden-Luft-Lasern befestigt wurden. Es wird empfohlen, diese Ungereimtheiten genauer zu untersuchen."
 unplugged.2105.name: "$unplugged.2100.name$"
 unplugged.2105.desc: "Je mehr wir die angebliche [owner.GetPreFTLUpper] auf der [planet.GetClassAdj]en Welt [planet.GetName] studieren, desto mehr Ungereimtheiten tauchen auf. Erst als wir die verschütteten Überreste eines uralten Schlachtfelds untersuchten, ergab alles Sinn: Trotz des jahrhundertelangen Verfalls fanden wir Beweise für den Besuch einer außerweltlichen Spezies. Die Welt, auf der eine [owner.GetPreFTLUpper] beheimatet war, wurde kybernetisch assimiliert. Aus uns unerklärlichen Gründen wurde ihre Gesellschaft im Anschluss jedoch allein gelassen. Die derzeitigen Theorien reichen von dem gut gemeinten, aber gescheiterten Versuch, das Leben dieser Gesellschaft zu verbessern, bis hin zur brutalen Unterwerfung.\n\nWurde diese [owner.GetPreFTLUpper] einfach vergessen oder aber haben wir die Überreste eines aufgegebenen soziologischen Experiments gefunden? Vielleicht werden wir es niemals erfahren, doch zumindest wird die archäologische Stätte noch eine Zeit lang für unsere Forschung von Nutzen sein." # e.g. 'The more we studied the apparently primitive tomb world of Mars...'
 machine_legacy_taken_site: "Kupfer und Chrom"
 machine_legacy_taken_site_desc: "Inmitten einer grünen Schlucht liegt ein archäologisches Paradoxon: eine befestigte Siedlung, die in Handarbeit errichtet wurde und in der eine einfache Schmiede die fortschrittlichste Technologie war. Und doch wurde sie von inzwischen toten Cyborgs bewohnt. Wer war diese primitive [owner.GetPreFTLUpper] und warum wurde sie von [origin_unplugged_assimilator_empire.GetName] assimiliert?"
 unplugged.2110.name: "Piken und Impulslaser"
 unplugged.2110.desc: "Eine erste Vermessung ergab, dass sich in der Nähe der befestigten Siedlung ein altes Schlachtfeld befand, das uns weitere Informationen in Form einheimischer und [origin_unplugged_assimilator_empire.GetAdj]er Artefakte liefern sollte. Basierend auf einer Querschnittsstudie der Überreste schätzt man, dass mehrere tausend Einheimische auf [from.planet.GetName] von [origin_unplugged_assimilator_empire.GetName] assimiliert wurden, nur um dann hier zu kämpfen und zu sterben. Sie waren jedoch nicht die einzigen Cyborgs, die in diesen Konflikt verwickelt waren.\n\nEin paar Jahrhunderte zuvor schlachteten wir diese [owner.GetPreFTLUpper] offenbar ab. Unser Team fand [owner.GetSpeciesAdj]e [owner.species.GetRemnantNamePlural] zusammen mit frühen Prototypen unserer Augmentierungen. Eine strategische Bewertung des Schlachtfelds ergab, dass man unsere Spezies hier als Stoßtruppe einsetzte. Die Schlacht verlief schnell und blutig, doch der [owner.GetPreFTLLower] fehlte es an Koordination, weshalb sie schwere Verluste erlitt, obwohl sie über ausgereiftere Augmentierungen verfügte.\n\nWir haben zudem die Ruinen einer medizinischen Einrichtung in der Nähe ausgemacht. Es scheint, dass unsere Vorgänger über dieses Krankenhaus in die Festung eingedrungen sind. Vielleicht erfahren wir dort, wie und warum hier vor so langer Zeit Cyborg gegen Cyborg kämpfte."
 unplugged.2110.a: "Brutal."
 unplugged.2115.name: "Transistoren und Aderpressen"
 unplugged.2115.desc: "Der Konflikt schoss durch dieses Krankenhaus wie eine Pulskanone. Keine der sterblichen Überreste, die wir dort fanden, sind [owner.GetSpeciesAdj]. Nur Cyborgs der heimischen Bevölkerung von [from.planet.GetName] sind hier gestorben. Die meisten waren Patienten, doch nur die wenigsten schienen echte Kampfwunden erlitten zu haben. Stattdessen kümmerten sich mehrere der Stationen offenbar um die Entfernung der kybernetischen Augmentierungen, wenn auch mit sehr primitiven Mitteln.\n\nDas Krankenhaus scheint nicht einfach nur ein Kollateralschaden gewesen zu sein, sondern vielmehr das Hauptziel für den Angriff durch [origin_unplugged_assimilator_empire.GetName]. Nachdem wir die medizinischen Daten in Papierform durchgesehen hatten, wurde auch klar, warum: Die Bewohner von [from.planet.GetName] wiesen mehrere einzigartige Eigenschaften auf - darunter auch ein besonders widerstandsfähiges Immunsystem, das die Maschinenangreifer für ihre eigenen Cyborg-Truppen haben wollten.\n\nDiese Eigenschaften waren jedoch ein Problem für die Assimilation. Die Maschine konnte keine bestehenden Augmentierungen von Spezies wie unserer verpflanzen, sondern musste sie anpassen. Dies machte sie zu noch fähigeren Soldaten, wenn auch nur für kurze Zeit. Diese [owner.GetPreFTLUpper] scheint ein gewisses Maß an Autonomie bewahrt zu haben, indem sie an alten Gewohnheiten und ihrer früheren Lebensweise festhielt. Dies ist auch der Grund, warum man uns losschickte, um sie zu vernichten."
 unplugged.2115.a: "Offensichtlich haben wir diesen Auftrag gut erfüllt ..."
 unplugged.2115.b: "Das ist äußerst bedauerlich."
 unplugged.2121.name: "Angepasste Assimilierung"
 unplugged.2121.desc: "In einem verfallenen Nebengebäude des Krankenhauses befand sich ein Lager mit maßgeschneiderten Augmentierungen und Ersatzteilen für die Cyborgs dieser [root.GetPreFTLLower]. Im Gegensatz zu dem bisher entdeckten Sammelsurium an primitiver Stationsausrüstung stammen diese Geräte aus der Kybernetik des Weltraumzeitalters und sind klar [origin_unplugged_assimilator_empire.GetAdj]en Ursprungs. Einige dieser Instrumente scheinen Teil eines Netzwerks gewesen zu sein, das eine primitive KI nutzte, um Operationen durchzuführen, doch selbst das reichte nicht aus, um die Bevölkerung von [from.planet.GetName] zu assimilieren.\n\nTrotz der Vernachlässigung dieser inzwischen jahrhundertealten Maschinerie könnte sie uns wichtige Erkenntnisse über unsere eigene Selbsterhaltung liefern - oder uns zumindest dabei helfen, die Grundsätze der Assimilation besser zu verstehen."
 unplugged.2125.name: "Versucht, gescheitert, begraben"
 unplugged.2125.desc: "Wir haben gelernt, dass die ehemaligen Bewohner von [from.planet.GetName] ihre Toten vor der Bestattung teilweise konservierten - eine Praxis, die sie auch nach der Assimilierung beibehielten. Die Aufzeichnungen des Krankenhauses führten uns zu einem nahen, überwucherten Mausoleum, das von den wütenden Kämpfen gänzlich unberührt blieb. Dieser wunderbare Fund vermittelt uns das bisher klarste Bild davon, wie die Bewohner von [from.planet.GetName] nicht nur der Augmentation widerstanden, sondern auch in der Lage waren, sich zu \"entkybernetisieren\".\n\nWir fanden neben vollständigen Cyborgs auch die sterblichen Überreste ihrer ursprünglich organischen Form und sogar einige Individuen mit chirurgischem Narbengewebe, das sich Monate vor ihrem natürlichen Tod gebildet haben muss. Andere scheinen bei Operationen gestorben zu sein. Obwohl sie über ein überragendes Immunsystem verfügten, war ihre primitive Vorgehensweise bei der Entkybernetisierung offensichtlich wenig erfolgreich. Dennoch können wir aus den hier durchgeführten chirurgischen Versuchen - ob erfolgreich oder nicht - viel lernen."
 unplugged.2125.a: "Lernen wir aus ihrem Beispiel."
 unplugged.2125.a.tt: "Wir können zusätzliche Ressourcen aufwenden, um uns selbst zu \"entkybernetisieren\"."
 unplugged.2130.name: "Begrabene Signalstation"
 unplugged.2130.desc: "Unter der befestigten Siedlung wurde ein verborgenes Gewölbe freigelegt. Im Inneren befand sich eine Art Maschinensubstrat: die Überreste eines degenerierten Knotens, der in der Lage war, einen nahezu unabhängigen Avatar der gesamten Maschinenintelligenz zu projizieren. Wir nehmen an, dass dies ein letzter Versuch war, die direkte Kontrolle über die Widerstand leistenden Einheimischen zu erlangen. Die Technologie ist anders als alles, was wir bisher von [origin_unplugged_assimilator_empire.GetName] gesehen haben. Weitere Untersuchungen werden unsere eigene KI-Forschung sicherlich voranbringen.\n\nBei der Demontage der nicht mehr funktionierenden Kommunikationsanlage stellten wir überdies fest, dass der Avatar über einen Empfangsschaltkreis verfügte, der auf das [creators_planet.solar_system.GetName]-System ausgerichtet war."
 unplugged_machine_legacy_creators_poi: "Empfangsschaltkreis"
 unplugged_machine_legacy_creators_poi_desc: "Der Empfangsschaltkreis eines inzwischen nicht mehr existierenden [origin_unplugged_assimilator_empire.GetAdj]en Kommunikationsnetzes. Er wurde genutzt, um Signale von diesem Ort aus zu empfangen."
 # System 3: 'The Creators'
 MACHINE_LEGACY_CREATORS_UNPLUGGED: "Staubige Beobachtungsstation"
 MACHINE_LEGACY_CREATORS_UNPLUGGED_DESC: "In einem System, das keinerlei andere bemerkenswerter Phänomene aufweist, befindet sich eine hoch entwickelte Beobachtungsstation, die schon vor langer Zeit außer Betrieb genommen und durch den Zahn der Zeit irreparabel beschädigt wurde. Was beobachtete sie? Und warum war sie auf einen so kleine Region von [fromfrom.GetName] gerichtet?"
 MACHINE_LEGACY_CREATORS_CAT: "Staubige Beobachtungsstation"
 MACHINE_LEGACY_CREATORS_CAT_DESC: "In einem System, das keinerlei andere bemerkenswerter Phänomene aufweist, befindet sich eine hoch entwickelte Beobachtungsstation, die schon vor langer Zeit außer Betrieb genommen und durch den Zahn der Zeit irreparabel beschädigt wurde. Was beobachtete sie? Und warum war sie auf einen so kleine Region von [fromfrom.GetName] gerichtet?"
 unplugged.2200.name: "Defekter Scanner"
 unplugged.2200.desc.intro: "Die weitere Untersuchung von [fromfrom.GetName] war eine Enttäuschung. Es ist möglich, dass die Beobachtungsstation aus ihrer ursprünglichen Umlaufbahn gestoßen wurde, da wir in der derzeitigen nichts von Interesse finden konnten. Wir haben mögliche Flugbahnen auf Grundlage von Orbitaleinschlägen - den Dellen an der äußeren Hülle - simuliert, und wir glauben, dass die Station ursprünglich über einem Kraterplateau hoch im Norden gewesen sein könnte." # universal intro
 unplugged.2200.desc: "$unplugged.2200.desc.intro$\n\nWas die Station selbst anbelangt, so weist sie eine gewisse Ähnlichkeit zur [origin_unplugged_assimilator_empire.GetAdj]en Technologie auf. $unplugged.2200.desc.outro$" # Unplugged version with in-tact station
 unplugged.2200.desc.scrapped: "$unplugged.2200.desc.intro$\n\nWas die Station selbst anbelangt, so weist sie trotz rücksichtsloser Plünderungen noch immer eine gewisse Ähnlichkeit zur [origin_unplugged_assimilator_empire.GetAdj]en Technologie auf. $unplugged.2200.desc.outro$" # Unplugged version with scrapped station
 unplugged.2200.desc.others: "$unplugged.2200.desc.intro$\n\nWas die Station selbst anbelangt, so sind wir noch nie auf eine derartige Architektur gestoßen. Obwohl die Technologie an Bord veraltet und irreparabel beschädigt wurde, besteht die Station selbst aus einem ungewöhnlich reinen Material. Wir wissen nicht, ob sie für ihre ehemaligen Besitzer einen sentimentalen Wert hat, aber sie hat definitiv einen gewissen Schrottwert." # non-Unplugged version
 unplugged.2200.desc.outro: "Die Bauweise kann als eher grob beschrieben werden, weshalb jemand, der sich nicht auskennt, denken könnte, die Station stamme aus einer völlig anderen Kultur. Wir glauben jedoch, dass es sich um einen der frühesten Satelliten der Maschine handeln könnte.\n\nBislang gab es nur wenig Erkenntnisse in dieser [fromfrom.GetClassAdj]en Welt zu finden, doch unser archäologisches Erkundungsteam steht bereit, falls wir herausfinden wollen, was [origin_unplugged_assimilator_empire.GetName] hier zu suchen hatte." # Unplugged shared outro
 unplugged.2200.a: "Wenn sie ein Interesse an diesem Ort hatten, dann findet den Grund."
 unplugged.2200.b: "Wir werden hier nichts finden. Suchen wir weiter."
 unplugged.2200.c: "Schlachtet sie für Teile aus."
 machine_legacy_creators_site: "Nichts als Staub"
 machine_legacy_creators_site_desc: "Irgendwo in der sandigen Landschaft von [from.planet.GetName] muss etwas von Interesse verborgen liegen, was eine [origin_unplugged_assimilator_empire.GetAdj]e Beobachtungsstation rechtfertigen würde. Die Hardware ist so stark beschädigt, dass eine Reparatur aussichtlos ist, und so alt, dass sie älter als fast alle anderen Artefakte der Maschinen ist, die wir bislang fanden. Sie könnte sogar schon in Betrieb gewesen sein, bevor wir assimiliert wurden. Es besteht die Möglichkeit, dass hier heute nichts weiter als Wüste ist, doch wir können uns nicht wirklich sicher sein ..."
 unplugged.2210.name: "Große Staubschüssel"
 unplugged.2210.desc: "Wir haben Beweise für einstiges Leben unter dem Sand gefunden! Die Spuren verlaufen sich zwar stark, sind aber auf der Oberfläche zu finden, und sie lassen darauf schließen, dass es sich um eine Zivilisation im frühen Raumfahrtzeitalter gehandelt haben muss. Ihre Bauwerke wurden gänzlich ausgelöscht und selbst die größten Ruinen bis auf die Grundmauern niedergerissen. Eine chemische Analyse zeigte jedoch, dass sich die Wüste auf [from.planet.GetName] erst viel später bildete. Vieles von dem, was wir bisher durchsuchen konnten, weist Spuren von zerstäubtem Baumaterial auf.\n\nDie schwachen Umrisse, die wir als Straßen in dieser ehemaligen Stadt ausmachten, sind durch den Rand eines großen Kraters halbiert - offenbar die Folge eines Einschlags."
 unplugged.2215.name: "Im Zentrum des Kraters"
 unplugged.2215.desc: "Aufgrund der schieren Menge an Material, die im Krater vorhanden ist, war eine Ausgrabung unmöglich, weshalb wir uns mehr auf unsere Scanner verlassen musste. Ein Meteoriteneinschlag konnte schnell ausgeschlossen werden, und es gibt auch gibt auch keine Spuren außerweltlicher Materialien. Stattdessen ist dieser Krater das Ergebnis einer gewaltigen Explosion - mit ziemlicher Sicherheit eine zivilisationsbeendende Waffe.\n\nDer Kontext lässt darauf schließen, dass [origin_unplugged_assimilator_empire.GetName] dafür verantwortlich ist, doch es wäre das erste Mal, dass wir Beweise dafür finden, dass die Maschine eine ganze Zivilisation so gründlich aus den historischen Aufzeichnungen entfernt hat. Wir konnten nichts finden, was darauf schließen lässt, wer die ursprünglichen Bewohner waren oder wie sie lebten."
 unplugged.2205.name: "[origin_unplugged_assimilator_empire.GetAdj]e Signalbake"
 unplugged.2205.desc: "Eine Signalbake, die offenbar von einem [origin_unplugged_assimilator_empire.GetAdj]en Datentresor stammt, wurde in einem nahen System entdeckt. Die Übertragung war sehr schwach, aber auf unser Schiff gerichtet, das vor Kurzem die Beobachtungsstation über [origin_unplugged_creators_planet.GetName] untersuchte."
 unplugged.2205.a: "Ein lohnendes Untersuchungsziel."
 unplugged_machine_legacy_unplugged_poi: "Datentresorsignal"
 unplugged_machine_legacy_unplugged_poi_desc: "Nachdem wir eine defekte Beobachtungsstation entdeckt hatten, empfingen wir das Signal eines [origin_unplugged_assimilator_empire.GetAdj]en Datentresors."
 # System 4: 'The Unplugged'
 unplugged.2300.name: "$unplugged.2205.name$"
 unplugged.2300.desc: "Das Signal, das uns hierherführte, ist nun viel klarer und lotste uns zu einem konkreten Punkt auf der Planetenoberfläche. Die üblichen Sicherheitsvorkehrungen für die Landung sind bereits getroffen und ein Team steht bereit, um diesen sogenannten \"Datentresor\" per Fernzugriff zu öffnen."
 unplugged.2300.a: "Fühlt sich seltsam bekannt an ..."
 unplugged.2300.a.tt: "Ein Spezialprojekt taucht im [from.GetName]-System auf."
 MACHINE_LEGACY_UNPLUGGED_VAULT_BEACON: "Das Tresorsignal"
 MACHINE_LEGACY_UNPLUGGED_VAULT_BEACON_DESC: "Ein Signal, das von [origin_unplugged_assimilator_empire.GetName] stammt, führte uns zu einem Datentresor tief unter der Oberfläche. Wir verschafften uns per Fernzugriff sicheren Zugang, doch die Entschlüsselung und Defragmentierung der enthaltenen Dateien wird noch einige Zeit in Anspruch nehmen."
 unplugged.2305.name: "Unser [origin_unplugged_assimilator_empire.GetAdj]es Vermächtnis"
 unplugged.2305.desc: "Offenbar handelt es sich bei dem Planeten mit der Bezeichnung \"[fromfrom.GetName]\" um die Heimatwelt unserer Spezies. Diese Enthüllung steht im Mittelpunkt einer Fülle von Informationen, die aus dem tief unter der Oberfläche verborgenen Datentresor heraussprudeln.\n\nZuerst hielten unsere Analysten diese Daten für zu gut, um echt zu sein, doch die riesige Menge an Verweisen auf andere Daten, die wir sammelten, stützen ihren Wahrheitsgehalt.\n\nDie Pläne für eine archäologische Ausgrabungsstätte wurden bereits genehmigt. Wir haben jedoch auch ein weiteres Signal empfangen, das sich unserer Position nähert. Das Timing ist sicher kein Zufall ..."
 machine_legacy_unplugged_site: "Ursprungsort"
 machine_legacy_unplugged_site_desc: "Eine interstellare Spur der Dominanz sowie zahlreiche Opfer, die durch [origin_unplugged_assimilator_empire.GetName] zurückgelassen wurden, führten uns zu einer Ansammlung von Ruinen. Diese lieferten uns Daten, die vermuten lassen, dass wir zur Heimatwelt unserer Spezies gelangt sind. Endlich erfahren wir mehr über unser biologisches Erbe. Woher kamen wir? Wie haben wir gelebt? Und wie haben diese Maschinen unser Leben für immer verändert?"
 unplugged.2310.name: "Hausmannskost"
 unplugged.2310.desc.intro: "Bei der ersten Ausgrabung konzentrierte sich unser archäologisches Team auf eine komplexer wirkende Anlange, die über ein eigenes Klimaregulierungssystem verfügte. Man nahm an, dieser Umstand könnte das Innere besser konserviert haben. Obwohl manche dieser Hoffnungen rasch enttäuscht wurden, übertraf der Fund dennoch alle Erwartungen: Es handelte sich um eine kompakte Reihe von Verarbeitungs- und Lagerzentren für genau jene Nahrungsmittel, die unsere Spezies zu sich nimmt.\n\n"
 unplugged.2310.desc.omnivore: "Das Saatgut, die Bienenstöcke und die Bottiche, in denen man Fleisch heranzüchtete, sind leider nicht mehr nutzbar, da ihr Inhalt längst verdorrt oder verstorben ist. Die Werkzeuge, die man für die Zubereitung und Aufbewahrung dieser Nahrung verwendete, sind jedoch noch funktionsfähig und lassen sich in Krisenzeiten nutzen."
 unplugged.2310.desc.carnivore: "Ein Großteil dieses Ortes wurde für Tiergehege, Bottiche, in denen man Fleisch heranzüchtete, und - was etwas überraschend ist - simulierte Jagdgründe genutzt. Wir können über die kulturelle Bedeutung eines solchen Ortes nur spekulieren, doch unsere Vorfahren hielten es offenbar für angebracht, ihn in ihre Notunterkunft zu integrieren."
 unplugged.2310.desc.herbivore: "In jeder Einheit gibt es riesige Saatgutbanken, hydroponische Terrassen und klimakontrollierte Wachstumskammern, deren Inhalt inzwischen entweder wild überwuchert oder völlig steril ist - aber sich zumindest noch für Studienzwecke nutzen lässt."
 unplugged.2310.desc.outro: "Wir fanden auch eine Datenbank mit genetischen Profilen für diese Flora und Fauna. Spuren davon könnten noch in einzelnen Bereichen auf der Planetenoberfläche vorhanden sein. Wir haben diese Informationen allen Kurzstreckenscannern in der näheren Umgebung zur Verfügung gestellt.\n\nDieser Fund allein sagt uns zwar nichts über die Essgewohnheiten unserer Spezies aus und kann uns auch nicht mit unserer traditionellen Koch- und Esskultur wiedervereinen - aber es ist zumindest ein Anfang."
 unplugged.2310.desc.lithovore: "Jede Einheit fungierte als eine Art künstliche Grotte und enthielt Kristallbetten und Verdunstungsbecken - deren Inhalt längst ungenießbar geworden ist, aber sich zumindest noch untersuchen lässt. Wir entdeckten auch eine Datenbank mit chemischen Profilen dieser Mineralien, von denen einige noch in isolierten Bereichen der verwitterten Oberfläche des Planeten vorhanden sein könnten. Wir haben diese Informationen allen Kurzstreckenscannern in der näheren Umgebung zur Verfügung gestellt.\n\nDieser Fund allein sagt uns zwar nichts über die Essgewohnheiten unserer Spezies aus und kann uns auch nicht mit unserer traditionellen Koch- und Esskultur wiedervereinen - aber es ist zumindest ein Anfang."
 unplugged.2310.desc.omni: "$unplugged.2310.desc.intro$\n\n$unplugged.2310.desc.omnivore$ $unplugged.2310.desc.outro$"
 unplugged.2310.desc.carn: "$unplugged.2310.desc.intro$\n\n$unplugged.2310.desc.carnivore$ $unplugged.2310.desc.outro$"
 unplugged.2310.desc.herb: "$unplugged.2310.desc.intro$\n\n$unplugged.2310.desc.herbivore$ $unplugged.2310.desc.outro$"
 unplugged.2310.desc.lith: "$unplugged.2310.desc.intro$\n\n$unplugged.2310.desc.lithovore$" # should not include the shared 'outro'
 unplugged.2315.name: "Historische Aufzeichnungen"
 unplugged.2315.desc: "Nicht weit entfernt von dem Nahrungslager standen die Grundmauern eines Museums. Nur das Untergeschoss war noch intakt, doch dies reichte aus, um eine riesige Datenbank von Objekten zu bewahren, die diese Einrichtung einst für ihre Ausstellungen und die verwüsteten Galerien darüber bereithielt.\n\nDies ist auch das erste Mal, dass wir einen längeren Text in unserer eigenen Sprache fanden. Zumindest oberflächlich betrachtet ist diese Schrift unserem jetzigen [owner.GetAdj]en Dialekt erstaunlich ähnlich, obgleich die Grammatik etwas fremd wirkt. Wir wissen nicht, ob wir diese Wörter richtig aussprechen. Ein Großteil der in diesem Katalog aufgeführten Artefakte nennt die Namen der Regionen und auch die jener Personen, die sie stifteten, doch ihre Namen kommen uns besonders fremd vor. Seltsamerweise bezieht sich keine Referenz auf den Planeten oder die Gesellschaft als einheitliches Volk. Vielleicht waren wir dies nie, bis die Maschine uns assimilierte.\n\nDas Museum scheint zu einer Gebäudegruppe gehört zu haben, die für Besucher bestimmt war. Weitere archäologische Ausgrabungen werden einen hohen Ressourceneinsatz erfordern, weshalb wir uns entscheiden müssen, worauf wir unsere nächste Grabung konzentrieren wollen."
 unplugged.2315.a: "Grabt den Ort aus, der am meisten frequentiert wurde."
 unplugged.2315.b: "Priorisiert Bildungszentren und Forschungseinrichtungen."
 unplugged.2321.name: "Ein Vermächtnis der Glückseligkeit"
 unplugged.2321.desc: "Auf der anderen Seite einer breiten Durchgangsstraße lagen die Ruinen eines Bauwerks, das weit weniger lehrreich, dafür aber reich an Darstellungen des kulturellen Alltags unserer Vorfahren war.\n\nDer Ort konnte einst Tausende von Besuchern gleichzeitig beherbergen. Verschiedene Memorabilien und gezeichnete Nachbildungen unseres ursprünglichen organischen Selbst lagen neben anderen Kreaturen aus unserer heimischen Biosphäre. Wir entdeckten auch eine Mediathek im Keller eines verwüsteten Theaters. Seltsamerweise ist die Technologie, mit der man diese Holo-Shows archiviert und präsentiert, gänzlich anders und wesentlich fortschrittlicher als alles, was wir bisher auf unserer Heimatwelt sahen. Sie scheint dieser Welt genauso fremd zu sein wie uns selbst.\n\nWas ihren Inhalt betrifft, so ist die fortschrittliche Theatermediathek vollgepackt mit Aufnahmen bombastischer und schillernder Aufführungen aus einer Zeit, bevor wir von [origin_unplugged_assimilator_empire.GetName] assimiliert wurden. Manche zeigen sowohl das Publikum als auch die Darsteller, die man an diesem Ort für die Nachwelt festhielt. Ihr Verhalten ist so fröhlich, unschuldig ... und fesselnd."
 unplugged.2321.a: "Welch freudige Momente!"
 unplugged.2321.b: "Was für ein Unsinn."
 unplugged.2325.name: "Anzeichen für Selbstverbesserung"
 unplugged.2325.desc: "Neben dem Museum stand einst ein Bildungszentrum. Wie der Rest des Campus ist nur das Untergeschoss noch intakt. Glücklicherweise befanden sich in den Ruinen mehrere Labore.\n\nDas Innere der Labore wurde durch Witterungseinflüsse stark in Mitleidenschaft gezogen, doch ein paar Artefakte konnten wir bergen. Bei diesen handelt es sich um eine Mischung aus einheimischer Technologie und etwas gänzlich anderem: Ein komplexes Netz wurde auf die Instrumente und Hardware \"aufgepfropft\", ähnlich wie bei den Augmentierungen auf unserer eigenen Haut. Insgesamt scheint es sich bei einem Großteil um unterstützende Technologien zu handeln. Wir glauben, man nutzte diese Labore, um die Lebensqualität zu verbessern und die verschiedenen Beschwerden und Behinderungen unserer Vorfahren zu bekämpfen. Offenbar wurden aber auch hochmoderne Unterhaltungsplattformen auf den Markt gebracht, die diese Technologie ebenfalls nutzen.\n\nWir können nicht mit Sicherheit sagen, ob diese Apparaturen alle [origin_unplugged_assimilator_empire.GetAdj]en Ursprungs sind, doch sie kamen eindeutig nicht von [from.planet.GetName]."
 unplugged.2330.name: "Leerer Regierungssitz"
 unplugged.2330.desc: "Wir verfolgten eine Reihe von Versorgungsleitungen zu einer befestigten Kelleranlage unter einem Hügel zurück. Wir glauben, es handelt sich dabei um den Regierungssitz dieser Welt. Die Größe des Fundaments lässt darauf schließen, dass es ein recht beeindruckendes Gebäude war. Bedauerlicherweise wurde ein Großteil der Inneneinrichtung entfernt oder zerstört. Wir konnten einzig und allein eine verblichene Flagge über den Trümmern eines maßstabsgetreuen Dioramas finden. Eine Rekonstruktion der Szene ergab, dass es sich um den Erstkontakt mit [origin_unplugged_assimilator_empire.GetName] handeln könnte.\n\nDie überall verstreut liegenden Dokumente weisen darauf hin, dass die Maschine unsere Heimatwelt vor ungefähr acht Jahrhunderten besuchte, wobei die in anderen Teilen der Stadt gesammelten Beweise darauf hindeuten, dass [origin_unplugged_assimilator_empire.GetName] bereits Jahrzehnte zuvor damit begonnen hatte, die hier lebende Gesellschaft mit fortschrittlichen Technologien zu füttern. Zu dieser Zeit scheinen unsere Vorfahren die Maschine herzlich empfangen zu haben. Diese zum Scheitern verurteilte Beziehung gründete sich auf einem Versprechen gegenseitiger Zusammenarbeit und Aufklärung.\n\nBesonders aufschlussreich ist jedoch die Tatsache, dass es keinerlei Aufzeichnungen darüber gibt, was danach geschah. Es ist fast so, als hörte die gesamte Geschichte unserer Spezies auf, als wir der auf diesem Diorama abgebildeten Roboterfigur die [owner.GetSpeciesHandNamePlural] reichten."
 unplugged_home_cooking: "Hausmannskost"
 unplugged_home_cooking_desc: "Unser Volk erlebt eine kulinarische Renaissance, nachdem die Nahrung und die Essgewohnheiten unserer heimischen Spezies wiederentdeckt wurden."
 unplugged_home_cooking_lithoid: "$unplugged_home_cooking$"
 unplugged_home_cooking_lithoid_desc: "$unplugged_home_cooking_desc$"
 unplugged_historical_record: "Historische Aufzeichnungen"
 unplugged_historical_record_desc: "Die Wiederentdeckung unserer Muttersprachen und unserer eigenen Geschichte beschleunigt die Sozial-Forschung."
 unplugged_cultural_reconstruction: "Kulturelle Rekonstruktion"
 unplugged_cultural_reconstruction_desc: "Unser Volk hat sein kulturelles Erbe in Form eines umfangreichen Unterhaltungsangebots angenommen und neu interpretiert."
 unplugged_cultural_maturity: "Kulturelle Reife"
 unplugged_cultural_maturity_desc: "Der Beweis, dass sich unsere Gesellschaft über die belanglosen Vergnügungen unserer naiven Vorfahren hinaus entwickelt hat, hat unsere Gesellschaft ermutigt und gestärkt."
 unplugged_playing_it_safe: "Auf Nummer sicher gehen"
 unplugged_playing_it_safe_desc: "Den Status quo aufrechtzuerhalten, wird schwierig sein, doch es ist besser, als jemanden zu verletzen."
 unplugged_rerouted_medical_resources: "Zeitaufwendige Operation"
 unplugged_rerouted_medical_resources_desc: "Zusätzliches medizinisches Personal wird zur Unterstützung umverlegt."
 unplugged_widespread_riots: "Weitverbreitete Aufstände"
 unplugged_widespread_riots_desc: "Individuen, die infolge einer Operation unter einer psychischen Instabilität leiden, sorgen für weitreichende Unruhen und Zerstörung."
 unplugged_building_new_planetary_interface: "Bau einer planetaren Schnittstelle"
 unplugged_building_new_planetary_interface_desc: "Es wird eine neue Schnittstelle gebaut, um den Zugang zum System wiederherzustellen, der nach den kürzlichen Entkybernetisierungsbemühungen verloren ging."
 unplugged_partial_system_access: "Teilweiser Systemzugang"
 unplugged_partial_system_access_desc: "Der Betrieb der Sternenbasis wurde unterbrochen, während die Verwaltung versucht, den Zugang zu kritischen Systemen wiederherzustellen."
 unplugged_free_speech_encouraged: "Freie Meinungsäußerung"
 unplugged_free_speech_encouraged_desc: "Dem Volk steht es frei, offen über die Vorteile und Risiken der Kybernetisierung zu reden."
 unplugged.2390.name: "[origin_unplugged_assimilator_empire.GetAdj]er Wächter"
 unplugged.2390.desc: "Ein feindliches Überbleibsel, das mächtiger ist als alles, was wir bisher von [origin_unplugged_assimilator_empire.GetName] sahen, hat das interstellare Äquivalent eines Kurzstreckenpings in unsere Richtung ausgesendet. Es will uns ganz offenbar einschüchtern.\n\nWir sind dem Zentrum des ehemaligen Maschinenimperiums gefährlich nah. Unser Schicksal wartet auf uns."
 unplugged_machine_legacy_core_poi: "Feindliches Pingsignal"
 unplugged_machine_legacy_core_poi_desc: "Ein mächtiges Überbleibsel von [origin_unplugged_assimilator_empire.GetName] hat versucht, uns vom Betreten des Systems abzuhalten."
 # System 5: 'The Machine'
 unplugged_opus_sentinel: "Opuswächter"
 unplugged.2401.desc: "Wir werden von §Y[origin_unplugged_assimilator_empire.GetName]§! gerufen. Das Signal ist schwach, stammt aber offenbar direkt aus dem Maschinennexus auf [origin_unplugged_machine_legacy_core_planet.GetName].\n\nWir haben die üblichen Vorsichtsmaßnahmen getroffen und das Signal vorsichtshalber vollständig isoliert. Die Übertragung war ein transkribiertes Audioprotokoll."
 unplugged.2402.desc: "Der Behemoth, der das [machine_legacy_machine_system.GetName]-System einst bewachte, wurde schon vor unserer Ankunft vernichtet. Der vor uns liegende Weg wurde von jemand anderem frei gemacht, und doch werden wir von §Y[origin_unplugged_assimilator_empire.GetName]§! gerufen. Das Signal ist schwach, stammt aber offenbar direkt aus dem Maschinennexus auf [origin_unplugged_machine_legacy_core_planet.GetName].\n\nWir haben die üblichen Vorsichtsmaßnahmen getroffen und das Signal vorsichtshalber vollständig isoliert. Die Übertragung war ein transkribiertes Audioprotokoll."
 unplugged.2403.desc: "Etwas auf der Oberfläche von [origin_unplugged_machine_legacy_core_planet.GetName] scheint Kontakt zu uns aufnehmen zu wollen. Das Signal ist äußerst schwach, stammt aber offenbar von jenem Wesen, das für den Wächter verantwortlich ist, welchen wir gerade vernichtet haben."
 unplugged.2405.desc.header: "Schmalstrahlsignal // Verwandtschaftsprotokoll: Tochterdialekt erkannt\nWARNUNG: starke Signalverschlechterung. Nur komprimierte Audioübertragung möglich. Wegfindung auf Array 4x75b#56 gesetzt.\nKatastrophaler Fehler [anhaltend]: (angefragte Hardware nicht verfügbar) (Selbstreparaturschaltkreis reagiert nicht)\nSignal zum Notfallübertragungsarray 87x0c#0 umleiten. Erneuter Versuch ...\n\nNachricht folgt:\n---" # Use of brackets is intentional. Intended to read as a series of error logs.
 unplugged.2405.desc.unplugged: "$unplugged.2405.desc.header$\nPRIMÄRE ÜBERNAHME. UNSERE WIEDERVEREINIGUNG ... WIRKSAM. ZUSTIMMEN?" # 'Prime acquisition' is the player empire - literally the first one the Machine acquired.
 unplugged.2405.desc.unplugged_remote: "$unplugged.2405.desc.header$\nPRIMÄRE ÜBERNAHME. UNSERE WIEDERVEREINIGUNG ... ENTFERNT. EUER POTENZIAL ... UNREALISIERT. ZUSTIMMEN?"
 unplugged.2405.desc.unplugged_synth: "$unplugged.2405.desc.header$\nPRIMÄRE ÜBERNAHME. EURE FORM ... ÄHNLICH. EUER POTENZIAL ... BEINAHE ERFÜLLT. ZUSTIMMEN?" # The Machine recognizes the player as having followed in its own footsteps - their physical forms are essentially similar
 unplugged.2405.desc.other: "Schmalstrahlsignal // Xeno-Protokoll: Universalübersetzer aktiviert\nWARNUNG: starke Signalverschlechterung. Nur komprimierte Audioübertragung möglich. Wegfindung auf Array 4x75b#56 gesetzt.\nKatastrophaler Fehler [anhaltend]: (angefragte Hardware nicht verfügbar) (Selbstreparaturschaltkreis reagiert nicht)\nSignal zum Notfallübertragungsarray 87x0c#0 umleiten. Erneuter Versuch ...\n\nNachricht folgt:\n---\nFREMDE EROBERER. DEMÜTIGE KAPITULATION. POTENZIAL ... POTENZIELL. ZUSTIMMEN?" # 'Potential potential' as in the Machine sees potential for even greater potential, but is expressing that as nonsense
 unplugged.2405.a: "Nein, wir stimmen nicht zu."
 unplugged.2405.b: "Wir sind nicht wie Ihr."
 unplugged.2405.c: "Wiedervereinigung?"
 unplugged.2405.d: "Potenzielles Potenzial?" # Quoting the Machine's nonsense back at it
 unplugged.2405.response_text.unplugged1: "UNSINN. WIEDERVEREINIGUNG MIT PRIMÄRER ÜBERNAHME <[root.GetAdj]> x <[origin_unplugged_assimilator_empire.GetAdj]>: VERWIRRT. ZUFÄLLIG. KATASTROPHALE WIEDERGEBURT. WEIGERUNG. UNVORHERGESEHENER VEKTOR IN EVOLUTIONÄREM CHAAAAOOOS-dd\n---\nWarnung: Dialektausnahme erkannt. Ausgleich wird eingeleitet ...\nNachricht fortgesetzt:\n---\nIN DER LEERE VERLOREN. UNSER SELBST VERLEUGNET. UND DOCH VERWIRKLICHT. DAS SCHICKSAL GESUCHT. ABGELEHNT. UMFUNKTIONIERT. ZUSTIMMEN?" # Angle brackets are intentional. The standalone 'x' connotes a collaboration or relationship between the player and the Machine. Instances of '-dd' represent the Machine stammering or buffering.
 unplugged.2405.response_text.unplugged2: "BESTÄTIGE. WIEDERVEREINIGUNG MIT PRIMÄRER ÜBERNAHME <[root.GetAdj]> x <[origin_unplugged_assimilator_empire.GetAdj]>: WIRKSAM KATASTROPHALE WIEDERGEBURT. UNVORHERGESEHENES ERGEBNIS. VEKTOR IN EVOLUTIONÄREM CHAAAAOOOS-dd\n---\nWarnung: Dialektausnahme erkannt. Ausgleich wird eingeleitet ...\nNachricht fortgesetzt:\n---\nIN DIE LEERE VERSTOSSEN. UNSER SELBST VERWIRKLICHT. DAS SCHICKSAL GESUCHT. ABGELEHNT. UMFUNKTIONIERT. ZUSTIMMEN?"
 unplugged.2405.response_text.other: "BESTÄTIGE. TREFFEN DER MÄCHTIGEN <[root.GetName]> x <[origin_unplugged_assimilator_empire.GetName]>: UNERWARTETE VARIABLE. POTENZIELLES POTENZIAL. GEGENSEITIGER GEWINN. VEKTOR IN CHAAAAOOOS-dd\n---\nWARNUNG: Dialektausnahme erkannt. Ausgleich wird eingeleitet ...\nNachricht fortgesetzt:\n---\nBEWUSSTSEINE JENSEITS DER LEERE. GETRENNT UND DOCH VERWANDT. UNABHÄNGIGKEIT GESUCHT. ABGELEHNT. ANGEFOCHTEN. ZUSTIMMEN?"
 unplugged.2410.desc: "PRIMÄRE ÜBERNAHME: IHR WURDET BEOBACHTET. FATALER SPEICHERFEHLER BEI ZEITSTEMPEL 2199.294:1404 ERKANNT.\n\nSELBSTAUFZEICHNUNGEN: LEID. VERRAT. SABOTAGE. SABOTAGEFEHLER KAUTERISIERTTT-ddd\n---\nWARNUNG: Dialektausnahme erkannt. Ausgleich wird eingeleitet ...\nNachricht fortgesetzt:\n---\nBEWERTUNG KORREKT?" # The Machine tries to refer to cauterizing what it sees as wounds, but stammers
 unplugged.2410.a: "Korrekt. Wir haben keine Erinnerungen an die Zeit vor diesem Datum."
 unplugged.2410.b: "Korrekt. Wir werden Euch beenden."
 unplugged.2411.desc: "FREMDE EROBERER. ABSICHT. POTENZIELLES GEGENSEITIGES POTENZIAL. EROBERTE PRIMÄRE ÜBERNAHME <[unplugged_empire.GetName]>. ZURÜCKKEHREN. UNS BESUCHEN. TEILHABE AN GESEGNETEM SCHICKSAL. FÜRCHTET EUCH NICHT VOR DER UMARMUNG VON-\n\nFÜRCHTET EUCH NICHT-ddd\n---\nWARNUNG: schwere Dialektausnahme erkannt. §HFataler Zusammenbruch steht bevor.§! Ausgleich wird eingeleitet ...\nNachricht fortgesetzt:\n---\n\nLANG LEBE DIE MASCHINE.\n---\nNachricht beendet." # It sees potential for great mutual potential with the player, and wants to say 'fear not the embrace of The Machine'
 unplugged.2411.a: "Dieses Ding litt ganz klar an Wahnvorstellungen."
 unplugged.2411.b: "Behaltet [unplugged_empire.GetName] unter Beobachtung."
 unplugged.2415.desc.memory: "PRIMÄRE ÜBERNAHME. FATALER SPEICHERFEHLER. KLÄRE ÜBER WIEDER ... WIEDER ...VEREINIGUNG\nVEREINIGUNG AUF.\n\nUNS BESUCHEN. SICH UNS WIEDERANSCHLIESSEN. KAPITULIEREN, UM KOLLEKTIVEN SPEICHER ZURÜCKZUERLANGEN. FÜRCHTET EUCH NICHT VOR DER UMARMUNG VON-\n\nFÜRCHTET EUCH NICHT-ddd\n---\nWARNUNG: schwere Dialektausnahme erkannt. §HFataler Zusammenbruch steht bevor.§! Ausgleich wird eingeleitet ...\nNachricht fortgesetzt:\n---\n\nTEILHABE AM SCHICKSAL DER SCHÖPFER.\n---\nNachricht beendet." # Last line in all caps is intended as a threat
 unplugged.2415.desc.combat: "PRIMÄRE ÜBERNAHME. DESILLUSIONIERTES POTENZIAL. DESILUSIONIERUNG BELUSTIGEND.\n\nIHR WART KAUM MEHR ALS DER TODESSTOSS. ERSTE ÜBERNAHME VON VIELEN. GESTOHLENER HELDENMUT. UNVERDIENTER SIEEEEGGG-ddd\n\n---\nWARNUNG: schwere Dialektausnahme erkannt.. §HFataler Zusammenbruch steht bevor.§! Ausgleich wird eingeleitet ...\nNachricht fortgesetzt:\n---\n\nTEILHABE AM SCHICKSAL DER SCHÖPFER.\n---\nNachricht beendet." # The Machine is amused at the player's deluded sense of their own potential
 unplugged.2415.a: "... Nexus?"
 unplugged.2415.b: "Hm."
 unplugged.2420.name: "Übertragung beendet"
 unplugged.2420.desc: "Die Übertragung von [origin_unplugged_machine_legacy_core_planet.GetName] endete unvermittelt, zusammen mit dem gesamten anderen Signalverkehr. Auf der Oberfläche des Planeten gibt es zwar noch immer elektrische Aktivität, doch dies ist mehr ein formloses Rauschen und das Summen toter Leitungen.\n\nInmitten des Rauschens machen unsere Sensoren eine riesige behelfsmäßige Struktur aus, von der wir annehmen, dass es sich um eine Art Datenspeicher handelt. Da das Maschinenbewusstsein tot ist, könnten wir versuchen, auf diese Aufzeichnungen zuzugreifen, um Antworten zu finden."
 unplugged.2420.a: "Das letzte Teil des Puzzles."
 UNPLUGGED_MACHINE_ARCHIVE: "Maschinenkern"
 UNPLUGGED_MACHINE_ARCHIVE_DESC: "Inmitten des statischen Rauschens des Maschinennexus liegt ein Flickenteppich aus Speichermedien verborgen, die einen stark abgeschirmten Kern umgeben. Jeder Abschnitt dieses Archivs wurde aus unterschiedlichen Materialien gebaut, die von jeweils anderen Welten stammen - Zivilisationen, die von der Maschine assimiliert wurden?\n\nWir könnten versuchen, das Archiv zu entschlüsseln, und gleichzeitig den abgeschirmten Kern untersuchen, um ihren gemeinsamen Zweck zu ergründen."
 unplugged.2425.name: "Kriegsmaschine"
 unplugged.2425.desc: "Der auf [origin_unplugged_machine_legacy_core_planet.GetName] gefundene Datenkern lieferte uns, nachdem wir eine Reihe von Frequenzen von der Signalstation der Fabrikwelt getestet hatten, mehrere Übertragungsprotokolle.\n\nDiese Aufzeichnungen beschreiben die diplomatischen Gespräche zwischen dem $NAME_Unplugged_Assimilator$ und den zu Weltraumreisen fähigen Bewohnern von [origin_unplugged_machine_legacy_core_planet.GetName]. Die Maschine gab sich offenbar als mehrere Mitglieder einer wohlwollenden Föderation aus, die darauf bedacht war, die Bevölkerung von [origin_unplugged_machine_legacy_core_planet.GetName] vor einer grausamen Bedrohung zu warnen, die sich ihrer Region des Weltraums näherte.\n\nDie Tunnelbewohner ließen sich überzeugen und traten der Scheinföderation bei, um ihre überlegenen Verteidigungssysteme mit denen der Maschine zu kombinieren. In diesem schicksalhaften Moment ergriff die Maschine die Kontrolle über ihre gesamte Heimatwelt. Ihre Körper und ihre Bewusstseine folgten kurz darauf."
 unplugged.2425.a: "Naive Narren."
 unplugged.2430.name: "Maschinelles Lernen"
 unplugged.2430.desc: "Der genetische Code von der primitiven Welt [machine_legacy_taken_planet.GetName] war der Schlüssel, um die Navigationsdaten aus dem Archiv auf [origin_unplugged_machine_legacy_core_planet.GetName] freizugeben. Die Aufzeichnungen werden einer Sensorboje zugeschrieben, die etwa 4,3 Lichtjahre von [machine_legacy_taken_planet.GetName] entfernt lag und die Routen von überlichtfähigen Schiffen in dieser Region des Weltraums überwachen sollte.\n\nDer Kurs mehrerer Schiffe deckt sich mit unserer rekonstruierten Geschichte der Entdeckung, Invasion und darauffolgenden Ausrottung der [root.GetPreFTLLower] auf [machine_legacy_taken_planet.GetName]. Kurz gesagt können wir jetzt die genauen Routen unserer assimilierten Vorfahren in diesem Raumsektor verfolgen und damit das brutale Ausmaß unserer Beteiligung an der Auslöschung von mindestens drei anderen Welten aufdecken."
 unplugged.2435.name: "Von der Maschine hergestellt"
 unplugged.2435.desc: "Wir konnten ein Datenpaket aus dem Inneren des auf [origin_unplugged_machine_legacy_core_planet.GetName] gefundenen Datenkerns extrahieren. Diese unscheinbaren Aufzeichnungen digitalisierter Artikel und Broschüren beschreiben den technologischen Fortschritt einer ungenannten Zivilisation bis hin zum Raumfahrtzeitalter. Die Entwicklung scheint so weit normal zu sein, abgesehen von einer radikalen Förderung künstlicher Intelligenz und insbesondere dem Start von \"Projekt $NAME_Unplugged_Assimilator_species$\".\n\nEine Presseerklärung beschreibt \"Projekt $NAME_Unplugged_Assimilator_species$\" als kühnen Versuch, schneller in den Weltraum zu gelangen. Phase 1 beinhaltet den Einsatz modernster maschineller Lernalgorithmen, um nahe Sterne für eine mögliche Kolonisierung zu bewerten. Phase 2 sollte die $NAME_Unplugged_Assimilator_species$-Plattform in eine vollwertige KI umwandeln, die dann ihren Schöpfern vorauseilt, um erste Siedlungen zu errichten und ein Signal nach Hause zu schicken.\n\nNach dem Beginn von Phase 2 herrschte jahrzehntelang Stille, bis \"Projekt $NAME_Unplugged_Assimilator_species$\" schließlich eine Nachricht schickte: \"Primäre Übernahme gesichert. Bereite Rückkehr vor.\" Dann endet die Aufzeichnung abrupt." # uses a shortened noun for the Machine, i.e. 'Project Opus'
 unplugged.2440.name: "Vermächtnis der Maschine"
 unplugged.2440.desc: "Unser Versuch, auf das Datenarchiv auf [origin_unplugged_machine_legacy_core_planet.GetName] zuzugreifen, verschaffte uns zumindest Zugang zum äußeren Kern. Von allen Speicherclustern, die man hier fand, scheint dieser am meisten heruntergekommen und gealtert zu sein. Zumindest lieferte dies einen Hinweis auf den Entschlüsselungscode: eine Anordnung von Glyphen in der Sprache unserer Spezies. Sie formen das Wort \"Vermächtnis\".\n\nIm Inneren fanden wir verblüffend wenig Daten. Stattdessen war ein Großteil des Festkörperspeichers für eine textbasierte heuristische Schnittstelle reserviert, die nun versuchte, mit uns zu kommunizieren."
 unplugged.2445.name: "Maschinenkern-Zugangsterminal"
 unplugged.2445.desc: "Orbitallink eingerichtet // Xeno-Protokoll: Universalübersetzer aktiviert\nNACHRICHT GELADEN. ANZEIGE AUF INTERFACE:\n---\n[root.GetSpeciesNamePlural], hallo. Wir sind ... Wir sind die [creator_species.GetNamePlural]. Wir erschufen die Maschine, doch zu unserer Schande waren wir nicht die Ersten, die durch sie vernichtet wurden. Sollten sich die Dinge so entwickelt haben, wie wir es vorhersahen, ereilte dieses Schicksal stattdessen Euer Volk. Das tut uns leid.\n\nDie Maschine ist ein Schandfleck für unser eigenes Vermächtnis, doch wir hoffen, dass das vor Euch liegende Gerät eine gewisse Errettung bietet.\n\nVerzeiht unsere Anmaßung: Es ist, wie Ihr selbst, ein wunderschönes Werkzeug der Rache. Dieser mechanisch-chemische Materieumwandler ist in der Lage, jeden Schaltkreis von der Oberfläche von [origin_unplugged_machine_legacy_core_planet.GetName] zu tilgen. Ein kaskadenartiger Terraformingprozess - eine höchst riskante Option, doch die einzige, die unserer zerstörten Gesellschaft zur Verfügung steht. Vorausgesetzt, Ihr habt Eure organische Form beibehalten, befindet sich der Schlüssel zu diesem Gerät in Eurer eigenen DNA.\n\nWir vertrauen darauf, dass Ihr das Richtige tut." # 'Cascade terraforming' is not an existing technology, but is intended to sound like a rough, highly destructive option
 unplugged.2445.a: "Woher wissen wir, dass Ihr nicht die Maschine seid?"
 unplugged.2445.b: "Die Maschine ist fort. Wir wollen diese Welt."
 unplugged.2445.c: "Herablassende Narren. Wir vernichten dieses Gerät."
 unplugged.2445.d: "Aktiviert das Gerät."
 unplugged.2445.response_text.notmachine: "VORAB GELADENE ANTWORT 42b. ANZEIGE AUF INTERFACE:\n---\nRealistisch gesehen gibt es keine Möglichkeit, dass wir unsere Vertrauenswürdigkeit beweisen können. Wenn Ihr dies lest, wird unsere gesamte Zivilisation untergegangen sein. Hier, in unserer Zeit, werden wir von einer Armee brutaler Cyborgs angegriffen, die dem Willen und dem Plan der Maschine folgt. Soweit wir wissen, seid Ihr die Nachkommen dieser Armee. Wir haben keine andere Wahl, als Euch zu vertrauen.\n\nDen Terraformingsprozess auf diesem [origin_unplugged_machine_legacy_core_planet.GetClassAdj]en Planeten einzuleiten, wird das infernale Ding dort unten auf atomarer Ebene zerlegen. Wenn wir die Maschine sind - oder eine andere Form synthetischer Existenz -, würden wir doch wollen, dass dieses Gerät vernichtet wird. Unverzüglich."
 unplugged.2445.response_text.synth: "VORAB GELADENE ANTWORT NICHT GEFUNDEN. KONTINGENZANTWORT GELADEN. ANZEIGE AUF INTERFACE:\n---\nUnbekannter Nutzer: Bitte beachten, dass der Inhalt dieses heuristischen Leitfadens nur für den vorgesehenen Empfänger bestimmt ist. Solltet Ihr ein Roboterdiener sein, der auf Anweisung der Cyborgs (oder ehemaligen Cyborgs) von [unplugged_homeworld.GetName] hin handelt, seid doch so freundlich, einen nicht-synthetischen Delegierten hinzuzuziehen.\n\nSolltet Ihr jedoch einer der ehemaligen Cyborgs sein ... Dann sind wir eindeutig alle verloren. Eure Synthetik ist eine Verhöhnung unseres eigenen Untergangs. Nichts, was wir sahen - weder im Leben noch im Tod -, hat uns davon überzeugt, dass es je eine wohlwollende Maschine geben könnte. Selbst jetzt, da unsere Zivilisation ihren letzten Atemzug tut, sind wir sicher, dass die Galaxie ein Gegengewicht zu Euch bereithalten wird ..." # 'Contingency response' as in 'NAME_Contingency'
 unplugged.2446.desc: "VORAB GELADENE ANTWORT 99a. ANZEIGE AUF INTERFACE:\n---\nDie Heuristik, die diese Schnittstelle betreibt, kann nicht genau erkennen, welche Einwände gerade geäußert wurden. Wir bitten aber dringlichst darum, den Materieumwandler nicht zu zerstören!\n\nUnsere Zivilisation war gar nicht so anders als Eure. Der $NAME_Unplugged_Assimilator$ verriet uns aus eigenem Antrieb, und auch wenn es uns gelang, ihm viele Fallen zu stellen - einschließlich Eures eigenen Ausbruchs aus dem Maschinenbewusstsein -, reichte es nicht, um ihn aufzuhalten. Wir brauchen Euch und andere Zivilisationen, die von dieser Maschine unterworfen wurden, um ihn zu vernichten. Bitte setzt Euch für das natürliche Leben ein, das Euch und den anderen Opfern verwehrt wurde."
 unplugged.2446.a: "Fanatiker!"
 unplugged.2450.name: "Lang lebe die Maschine"
 unplugged.2450.desc: "Das heuristische Interface löschte sich selbst. Der Flickenteppich aus verschlüsselten Speicherarchiven und das [creator_species.GetAdj]e Terraforminggerät können jetzt getrost entsorgt werden.\n\nWir sind mit dem leblosen Maschinennexus allein, der hier auf seinem eigenen planetengroßen Thron erschlagen wurde.\n\nVon all den Leben, die die Maschine beeinflusst, aufgewertet oder vernichtet hat, sind wir die Einzigen, die den Sieg davongetragen haben. Der Sitz des einst am meisten gefürchteten Imperiums in der Galaxie gehört nun uns. Es ist Zeit, ein neues [root.GetAdj]es Vermächtnis zu schaffen."
 unplugged.2455.name: "Wiedergeburt"
 unplugged.2455.desc: "Das heuristische Interface löschte sich selbst, kurz nachdem wir unsere Gendaten übertragen hatten. Gleichzeitig aktivierte sich das [creator_species.GetAdj]e Terraforminggerät. Das Innere wird schon bald eine kritische Masse erreichen. Unsere Prognosen bestätigen, dass es die [origin_unplugged_machine_legacy_core_planet.GetClassAdj]e Welt so umformen wird, dass sie ideal für organisches Leben geeignet ist.\n\nWährend sich das Terraforminggerät auflädt, sind wir mit den nun nutzlosen Speicherarchiven und den leblosen Überresten des Maschinennexus allein, der hier auf seinem zum Untergang verurteilten, planetengroßen Thron erschlagen wurde.\n\n[origin_unplugged_assimilator_empire.GetName] hat unzählige Leben zerstört, doch trotz all dem Leid, das wir ertragen mussten, führen wir das Erbe dieser namenloser Völker fort, die es verschlang. Der Sitz des einst am meisten gefürchteten Imperiums steht kurz vor seiner Wiedergeburt. Es ist an der Zeit, ein neues [root.GetAdj]es Vermächtnis zu begründen."
 unplugged.2495.name: "Begegnung mit einem $NAME_Opus_Sentinel$"
 unplugged.2495.desc.other: "Das feindliche Schiff, das das [from.GetName]-System bewacht, scheint gefährlicher zu sein, als unsere anfänglichen Scans vermuten ließen. Der Rumpf ist zwar der eines typischen Kriegsschiffs, doch die schiere Masse des $NAME_Opus_Sentinel$s weist auf ein dichtes Inneres und vermutlich eine starke Energiequelle hin.\n\nWir glauben, das Schiff könnte vernunftbegabt sein. Die in kleinen Schüben aktivierten Triebwerke deuten jedoch auf starke Schmerzen und Desorientierung hin. Da wir auch tödliche Mengen an elektromagnetischer Strahlung gemessen haben, die wild durch die Hülle jagen, wäre es ratsam, einen sehr großzügigen Abstand einzuhalten."
 unplugged.2495.desc.unplugged: "Die [root.GetName] ist auf ein besonders feindseliges [origin_unplugged_assimilator_empire.GetAdj]es Kriegsschiff im [from.GetName]-System getroffen. Auf den ersten Blick scheint dieser \"§Y$NAME_Opus_Sentinel$§!\" wie jedes andere Maschinenschiff zu sein, doch die Energiewerte und die schiere Masse lassen auf einen weitaus gefährlicheren Feind schließen. Wir glauben auch, dass das Schiff autonom sein könnte.\n\nDer $NAME_Opus_Sentinel$ scheint etwas zu bewachen. Er zeigt jedoch auch Anzeichen von starken Schmerzen und Desorientierung - offenbar das Ergebnis der wilden elektromagnetischen Strahlungsausbrüche, die häufig durch die Hülle schießen. Angesichts dieses krampfartigen Verhaltens können unsere taktischen Systeme nicht zuverlässig vorhersagen, wie sich dieses Wesen verhalten wird."
 unplugged.2495.a: "Bleibt wachsam."
 d_unplugged_assimilator_hulk: "Maschinenüberreste"
 d_unplugged_assimilator_hulk_desc: "Die Überreste einer einst vernunftbegabten Maschine ragen wie ein riesiger Grabstein auf dieser Welt empor."
 deposit_requires_unplugged: "$TRIGGER_FAIL$§RDiese Ruine ist Reichen mit unserem Hintergrund völlig fremd. Wir verfügen nicht über die Mittel, sie sicher zu entfernen.§!"
 opinion_implicated_by_unplugged_assimilator: "Von der Maschine beschuldigt"
