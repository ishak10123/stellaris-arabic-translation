 # Political Discourse
 ######################
 unplugged_they_fear_us: "Angst vor der Maschine"
 unplugged_they_fear_us_desc: "Dieses Reich, das in der Vergangenheit einem brutalen getriebenen Assimilator unterstellt war, wird noch immer von allen gefürchtet."
 unplugged.4005.name: "Wir müssen darüber reden ..."
 unplugged.4005.desc: "Zu den vielen Ängsten, Zweifeln und Möglichkeiten, die wir [root.GetSpeciesNamePlural] tagtäglich haben, gesellt sich nun auch noch ein starker politischer Wille. Unzählige Stimmen schlossen sich zu Diskussionsgruppen zusammen, um alle möglichen Themen zu besprechen. Manche von ihnen haben direkt mit unserer [origin_unplugged_assimilator_empire.GetAdj]en Vergangenheit zu tun.\n\nWährend wir unser junges Reich aufbauten, haben wir gelernt, wie man die vielen ungewohnten Werkzeuge nutzt. Die Frage, die sich uns nun stellt ist: Wie sollten wir die Wünsche und Ambitionen unseres Volkes am besten kanalisieren?"
 unplugged.4005.a: "Jetzt ist keine Zeit für solche Debatten!"
 unplugged.4005.tt: "Fraktionen, die gegensätzliche Ansichten über die kybernetische Zukunft unserer Spezies haben, können jetzt auftauchen"
 unplugged.4005.b: "Vielleicht können wir von anderen lernen."
 unplugged.4005.c: "Wir geben uns dem Göttlichen hin."
 unplugged.4005.d: "Jetzt ist keine Zeit für solche Debatten!"
 #######################################################
 # Random events following decyberization breakthrough #
 #######################################################
 unplugged.5001.name: "Ausfallsicherheit aktiviert"
 unplugged.5001.desc: "Der jüngste Durchbruch bei der Entfernung kybernetischer Komponenten führte zu unvorhergesehenen Problemen: Mehrere Individuen, bei denen man die Implantate entfernte, erlitten einen schweren anaphylaktischen Schock und werden voraussichtlich nicht überleben.\n\nBei einer weiteren Untersuchung entdeckte man eine versteckte Back-up-Komponente, die durch medizinische Scans zunächst nicht aufgespürt und unmittelbar nach Abschluss des chirurgischen Eingriffs aktiviert wurde.\n\nOffenbar waren unsere früheren [origin_unplugged_assimilator_empire.GetAdj]en Meister bereit, einen außerordentlichen Aufwand zu betreiben, um sicherzustellen, dass ihre Drohnen unter ihrer absoluten Kontrolle bleiben."
 unplugged.5001.a: "Versucht, die Ausfallsicherheit zu entfernen."
 unplugged.5001.a.tt1: "Ein Patient überlebt die Prozedur nicht"
 unplugged.5001.a.tt2: "Alle Ausfallsicherheiten werden erfolgreich entfernt"
 unplugged.5001.b: "Stabilisiert sie und stellt sie unter Palliativversorgung."
 unplugged.5001.c: "Zieht den Stecker."
 unplugged.5001.c.tt: "Mehrere Bewohner sterben"
 unplugged.5002.name: "Neuralblocker entfernt"
 unplugged.5002.desc: "Unser Versuch, uns von unseren kybernetischen Komponenten zu befreien, führte auf unserer Heimatwelt zu Misstrauen und Unruhe unter jenen, die sich dieser Prozedur unterworfen haben. Unsere Sicherheitskräfte konnten einen der Aufrührer festnehmen, bei dem sich rasch herausstellte, dass er vor der Entfernung eine modifizierte Version des Implantats besaß.\n\nDiese Modifikation sonderte offenbar einen neuronalen Hemmstoff aus, der psychotische Tendenzen unterdrückte, welche mit einem bestimmten Gendefekt zusammenhängen. Ihr Fehlen nach dem Eingriff könnte das beobachtete gewalttätige Verhalten erklären."
 unplugged.5002.a: "Wir müssen dafür sorgen, dass sie in der Öffentlichkeit keine weiteren Probleme verursachen."
 unplugged.5002.a.tt: "Es werden mehrere kostspielige Einrichtungen für die Behandlung der in die Unruhen verwickelten Individuen geschaffen"
 unplugged.5002.b: "Gewalt muss mit Gewalt beantwortet werden."
 unplugged.5002.b.tt: "Wir stellen bewaffnete Einheiten bereit, um die Unruhen zu unterdrücken. Dies führt zu Kollateralschäden und Todesopfern."
 unplugged.5002.c: "Das ist nur eine geringfügige Störung."
 unplugged.5002.c.tt: "Unsere Ordnungskräfte versuchen, die Unruhen mit den ihnen verfügbaren Kräften einzudämmen."
 unplugged.5003.name: "Zugang zu kritischen Systemen verloren"
 unplugged.5003.desc: "Der Entkybernetisierungsprozess führte zu unvorhergesehenen Komplikationen: Wichtige Systemschnittstellen erkennen einige unserer Administratoren nicht mehr, denen man Implantate entfernte. Ohne die von den Implantaten bereitgestellte neuronale Verbindung kann kein Zugang zu wichtigen System hergestellt werden, wodurch der Betrieb gestört ist."
 unplugged.5003.a: "Entwickelt eine neue Schnittstelle."
 unplugged.5003.a.tt: "Einige der fähigsten Ingenieure werden von kritischen Aufgaben abgezogen, um eine kompatible Schnittstelle zu entwickeln"
 unplugged.5003.b: "Versucht, die betroffenen Systeme zu hacken."
 unplugged.5003.b.tt: "Die Gegenmaßnahmen haben einen erheblichen Energieverbrauch, aber stellen den Zugang wieder her"
 unplugged.5003.c: "Startet das System neu."
 unplugged.5003.c.tt: "Die Datenkerne werden gelöscht, was zu einem erheblichen Informationsverlust führt. Die Forschungsstationen im gesamten [Root.home_planet.System.GetName] zerstören sich aufgrund einer automatischen Ausfallsicherung selbst"
 unplugged.5003.d: "Das ist unwichtig."
 unplugged.5003.d.tt: "Der Systemzugang ist eine Zeit lang eingeschränkt und stört den Betrieb auf der Sternenbasis"
 unplugged.5004.name: "Pro-Kybernetisierungs-Fraktion stellt sich gegen Entfernung"
 unplugged.5004.desc: "Unsere fortwährenden Bemühungen zur Entfernung unserer kybernetischen Komponenten ist auf unerwarteten Widerstand gestoßen.\n\nFraktionen, die gegen die Entfernung sind, gewinnen zunehmend an Beliebtheit und nutzen öffentliche Foren und Kommunikationskanäle, um ihre Unzufriedenheit zum Ausdruck zu bringen. Sie argumentieren, die Abschaffung von etwas, was jahrzehntelang ein fester Bestandteil unserer Gesellschaft war, habe in Verbindung mit den Risiken des Entfernungsprozesses zu einem deutlichen Stimmungsumschwung innerhalb der Öffentlichkeit geführt, der sich gegen die Fortsetzung der Entkybernetisierungsinitiative richtet."
 unplugged.5004.a: "Finanziert eine Kampagne für die Entkybernetisierung."
 unplugged.5004.a.tt: "\nMit einer Marketingkampagne wird versucht, die öffentliche Meinung zu beeinflussen, um den Einfluss der Opposition zu beschränken.\n\nDie Ethik mehrerer Bewohner wechselt zum §YEgalitarismus§!"
 unplugged.5004.b: "Interniert die Fraktionsanführer."
 unplugged.5004.b.tt: "Mehrere Fraktionsanführer werden in öffentlichen Umerziehungsanstalten untergebracht, wo man sie in \"überzeugende Gespräche\" verwickelt.\n\nIhre Ethik wechselt zum §YAutoritarismus§!"
 unplugged.5004.c: "Wir sollten uns heraushalten. Die Redefreiheit muss Vorrang haben."
 unplugged.5004.c.tt: "\nDie Regierung unternimmt nichts und lässt dem öffentlichen Diskurs freien Lauf"
 unplugged.5005.name: "Chip zur Emotionsregulierung"
 unplugged.5005.desc: "Die einzigartige Kombination aus der biologischen Natur unserer Spezies und unseren schädlichen technologischen Komponenten bot unseren Forschern eine seltene Gelegenheit.\n\nDurch das Studium von Patienten, die sowohl die Vorteile als auch die Nachteile dieser Implantate erfahren haben, ist ein gänzlich neues Forschungsgebiet entstanden: die Veränderung der Gehirnchemie.\n\nDank intensiver Studien konnten unsere Wissenschaftler einen komplexen \"Emotionschip\" entwickeln, der in der Lage ist, individuelles Verhalten zum Wohl der Gesellschaft zu regulieren. Je nach gewünschtem Ergebnis kann eine andere Chemikalie genutzt werden."
 unplugged.5005.a: "Neuroxen gegen weniger Kriminalität."
 unplugged.5005.a.tt: "Ein synthetischer Neurotransmitter, der Impulsivität und Aggression mindert und einen dazu bringt, gesellschaftliche Normen über den persönlichen Nutzen zu stellen"
 unplugged.5005.b: "Regenol-X für eine verringerte Regenerationszeit."
 unplugged.5005.b.tt: "Eine biotechnisch hergestellte Substanz, die für eine harmonische Verbindung zwischen biologischen und synthetischen Systemen sorgt und es kybernetischen Implantaten erlaubt, sich auf molekularer Ebene selbst zu reparieren."
 unplugged.5005.c: "Cognivex für einen schärferen Verstand."
 unplugged.5005.c.tt: "Ein neuartiger neurochemischer Wirkstoff, der die synaptische Plastizität erhöht und das Informationsgedächtnis sowie die Problemlösungsfähigkeiten verbessert."
