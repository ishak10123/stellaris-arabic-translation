 origin_unplugged_desc: "$CHALLENGING_ORIGIN$\nDiese aufkeimende Zivilisation wurde abrupt von der Maschine abgetrennt, die sie assimilierte, und kämpft nun erbittert um ihr Überleben in der Galaxie."
