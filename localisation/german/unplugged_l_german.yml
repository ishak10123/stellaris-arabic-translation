 unplugged.3000.name: "Unsere Verkörperung" # intentionally abstract - 'how we embody ourselves' - referring to the accompanying Situation
 unplugged.3000.desc: "Seit wir uns von unserem gemeinsamen Bewusstsein der Maschine lossagten, stehen wir [root.GetSpeciesNamePlural] vor einem Konflikt, der besonders in Zeiten des Friedens und der Ruhe - wenn wir unseren eigenen Gedanken gegenüberstehen - schmerzhaft ist: Wir müssen uns mit den uns aufgezwungenen Augmentierungen auseinandersetzen.\n\nDieser intimste aller Konflikte wirkt sich auf unsere gesamte Gesellschaft aus - im Guten wie im Schlechten. Wir müssen die gelebten Erfahrungen aller [root.GetSpeciesNamePlural] in Betracht ziehen, während [root.GetName] wächst und gedeiht. Eine ganzheitliche Studie wird sich mit der sogenannten \"Entkybernetisierung\", der weiteren Augmentierung sowie dem Wunsch nach einer Beibehaltung oder gar Verbesserung unserer derzeitigen körperlichen Formen beschäftigen."
 unplugged.3000.a: "Wir werden genauestens beobachten, aber nicht überstürzt handeln."
 unplugged.3000.b: "Es darf keinen Stillstand geben. Lasst uns rasch und entschlossen handeln."
 unplugged.3000.c: "Wir sollten alle Argumente in Betracht ziehen."
 unplugged.3005.name: "Einer Meinung"
 unplugged.3005.desc: "Die Studien zum [owner.GetAdj]en Verhalten bezüglich unserer eigenen Physiologie haben gezeigt, dass wir in eine Phase der Ruhe übergetreten sind. Das komplexe Zusammenspiel von Politik, gesellschaftlichem Diskurs und der Erforschung unserer Körper hat einen Konsens geschaffen.\n\nEs ist noch zu früh, um abwägen zu können, wie lange diese scheinbare Harmonie andauern wird, doch für den Moment ist klar, dass sich, sofern sich unsere Lebensumstände oder unser Regierungsstil nicht radikal verändern, alle [owner.GetSpeciesNamePlural] sich darüber einig sind, wer wir sind und wie wir aussehen."
 unplugged.3005.a: "Diese Debatte sollte einen politischeren Charakter haben."
 unplugged.3005.b: "Wie erwartet."
 unplugged.3005.c: "Wir müssen uns dagegenstellen."
 unplugged.3010.name: "Geteilte Meinung"
 unplugged.3010.desc: "Unsere laufenden Studien über das [owner.GetAdj]e Verhalten bezüglich unserer eigenen Physiologie zeigen, dass wir in eine Phase des kulturellen Tumults eingetreten sind. Das komplexe Zusammenspiel von Politik, gesellschaftlichem Diskurs und der Erforschung unserer Körper führte zu heftigen Meinungsschwankungen. Proteste und Auseinandersetzungen sind in unseren Städten inzwischen an der Tagesordnung.\n\nGlücklicherweise münden nur wenige davon direkt in Gewalt oder Unruhen, und manche Bürger brachten sogar ihren Stolz darüber zum Ausdruck, dass wir so vielen Stimmen Gehör verschaffen. Es ist jedoch auch klar, dass die [owner.GetSpeciesNamePlural] geteilter denn je sind und unsere Kultur und Identität heute brüchiger denn je."
 unplugged.3010.a: "Wir müssen ein besseres Forum für diese Debatten finden."
 unplugged.3090.name: "Wir, die [owner.GetSpeciesNamePlural]" # e.g. 'We, the Neo-Humans'
 unplugged.3090.desc: "\"Wir sind, wie wir sind; nicht mehr und nicht weniger.\"\n\nDas ist nur eines von vielen simplen, aber eingängigen Mottos, die aus dem gesellschaftlichen Konflikt über unsere körperliche Identität hervorgingen. Wir können stolz darauf sein, von den vielen Zweifeln, Ängsten und unmöglichen Sehnsüchten befreit zu sein, die wir einst in Bezug auf unser Selbst hatten.\n\nOb wir solche Maßstäbe als unsere Außenpolitik für die weitere Galaxie anerkennen oder nicht, ist eine andere Sache. Zumindest in unserem eigenen Reich sind wir [owner.GetSpeciesNamePlural] mit unseren körperlichen Formen und unserer fortwährenden Reise hin zur Selbstverwirklichung zufrieden."
 unplugged.3100.name: "Gründe für eine Entfernung"
 unplugged.3100.desc: "Immer mehr [root.GetSpeciesNamePlural] sind der Ansicht, wir sollten uns weiter von der Maschine distanzieren, indem wir die unseren Körpern aufgezwungenen Augmentierungen entweder einschränken oder ganz entfernen.\n\nDie Öffentlichkeit verlangt, dass wir eine Lösung für das finden, was sie als innenpolitische Krise ansieht, und dass wir das Leid der [root.GetSpeciesNamePlural] lindern, das die tiefe Scham und die Dysmorphie hervorrufen."
 unplugged.3100.a: "Ausgeschlossen."
 unplugged.3100.b: "Wir versuchen unser Bestes."
 unplugged.3105.name: "Durchbruch in der Entkybernetisierung"
 unplugged.3105.desc: "Die Entkybernetisierungforscher eines zivilen Labors gaben bekannt, einen gewaltigen Durchbruch erzielt zu haben. Sie behaupten, eine Technik entwickelt zu haben, mit der es möglich ist, die vernetzte Nanomesh-Panzerung zusammen mit den Augmentierungen, die von ihr abhängen, zu entfernen.\n\nGenerationen von [target.GetSpeciesNamePlural] litten unter dem, was sie selbst als unpraktische und einschüchternde körperliche Formen ansahen, und mussten sich damit abfinden, dass diese synthetische Panzerung ein wesentlicher Bestandteil der meisten Augmentierungen war. Jetzt können wir dieses Netz durch ein von uns selbst hergestelltes organisches Material ersetzen - oder anders ausgedrückt: durch eine echte [target.GetSpeciesAdj]e Haut."
 unplugged.3105.a: "Diese Panzerung schützt uns seit Generationen. Sie bleibt."
 unplugged.3106.desc: "Bei unseren Entkybernetisierungsbemühungen wurde ein weiterer Durchbruch erzielt und die medizinischen Einrichtungen beantragten bereits die Einführung dieser radikal neuen Form der Chirurgie. Experten behaupten, eine Lösung für die unzähligen biomechanischen Abhängigkeiten gefunden zu haben, von denen selbst Neugeborene betroffen sind, die mit einer Reihe recycelter, modularer Augmentierungen ausgestattet werden müssen, um zu überleben.\n\nEin interdisziplinäres Gremium hat den Prozess bereits überprüft und angemerkt, dass die Entfernung dieser modularen Waffenschnittstellen auch die wirtschaftliche Belastung durch die Wartung dieser fremden Augmentierungen verringern wird."
 unplugged.3106.a: "Abgelehnt. Diese Module geben uns im Kampf den nötigen Vorteil."
 unplugged.3107.desc: "Der Traum vieler [target.GetSpeciesNamePlural] könnte schon bald in Erfüllung gehen, da Forscher endlich einen Weg gefunden haben, unser körpereigenes Nervensystem zu revitalisieren und wiederherzustellen. Sie behaupten, eine neuartige Mischung aus Gentherapie und Firmware-Hacking sollte dazu führen, dass wir [target.GetSpeciesNamePlural] auch ohne unsere verstärkten Nervenanschlüsse gedeihen und stattdessen unsere eigenen motorischen Reflexe nutzen können. Vorläufige Studien deuten sogar darauf hin, dass diese Therapie die sensorischen Halluzinationen, unter denen wir alle leiden, seit wir vom Maschinenbewusstsein abgetrennt wurden, verringern oder beseitigen könnten."
 unplugged.3107.a: "Wir könnten unsere verbesserten Kampfreflexe noch brauchen."
 unplugged.3110.name: "Harmonisierung mit der Maschine"
 unplugged.3110.desc: "Ein ziviles Forschungsteam, das sich der Frage widmet, wie wir unsere eigenen Augmentierungen kontrollieren können, die jetzt vom Netz der Maschine getrennt und für unser Leiden verantwortlich sind, ist zuversichtlich, eine Antwort gefunden zu haben: ein Ersatznetz. Obwohl dieses Ersatznetz von Natur aus stark zentralisiert ist - und per Definition auf dem Modell des [origin_unplugged_assimilator_empire.GetSpeciesAdj]en Nexus basieren muss -, haben wir zumindest die Gewissheit, dass es sicher ist und nur den Interessen von [target.GetName] dient. Die ersten Probanden berichteten von einer erhöhten Leistungsfähigkeit, einem höheren Komfort und einem Zustand der Erleichterung, der der Glückseligkeit gleichkommt."
 unplugged.3110.a: "Nie wieder! Niemals."
 unplugged.3111.desc: "Unser Bestreben, mehr Kontrolle über unsere eigenen Augmentierungen zu gewinnen, führte zu einem Durchbruch auf dem Gebiet der kybernetischen Chirurgie. Den Medizinern gelang es, die genauen Abhängigkeiten in den modularen Schnittstellen unserer Körper zu isolieren, was es uns erlaubt, ganze Gliedmaßen, Waffen und Körperteile mit Leichtigkeit auszutauschen. Dies sollte es uns ermöglichen, bestehende Augmentierungen nachzurüsten und maßgeschneiderte Schnittstellen für Neugeborene zu installieren. Dies verringert unsere Abhängigkeit von geborgener [origin_unplugged_assimilator_empire.GetAdj]er Ausrüstung."
 unplugged.3111.a: "Das geht einen Schritt zu weit."
 unplugged.3112.desc: "Dank der neuesten bahnbrechenden Behandlungsmöglichkeiten für unsere sensorischen Halluzinationen ist die Kontrolle über unsere eigenen Augmentierungen zum Greifen nah. Seit wir vom Maschinenbewusstsein getrennt wurden, litt ein Großteil der [target.GetSpeciesNamePlural] unter Angstzuständen und Depressionen, da sie unbewusst jenen Chor suchten, der für uns nicht mehr hörbar ist. Mit Hilfe eines nicht vernetzten Hilfsimplantats, das die kognitiven Wellenlängen des Maschinenkollektivs nachahmt, können wir dieses Verlangen nun endlich unterdrücken."
 unplugged.3112.a: "So tun, als wären wir erneut ein Maschinenbewusstsein? Undenkbar."
 unplugged.3115.name: "Äußerliche Dysmorphie"
 unplugged.3115.desc: "Die Spannungen unter den am Rand der [target.GetAdj]en Gesellschaft lebenden [target.GetSpeciesNamePlural] steigt immer weiter an, da gegensätzliche Stimmen mehr Maßnahmen gegen unsere kybernetischen Augmentierungen fordern, ganz egal, auf welchem Weg.\n\nFür eine wachsende Mehrheit der Bevölkerung hat sich diese Debatte jedoch bereits zu einer ruhigeren und differenzierteren Angelegenheit entwickelt. Viele [target.GetSpeciesNamePlural] nutzen Kosmetika, um ihre Augmentierungen zu verstecken oder zu betonen. Zwar sind nur wenige [target.GetSpeciesNamePlural] wirklich zufrieden mit solchen Behelfsmaßnahmen, doch sie akzeptieren die Umstände.\n\nMan kann sagen, die Bevölkerung von [target.GetName] hat gelernt, mit der allgemeinen Apathie und dem Unbehagen umzugehen."
 unplugged.3115.a: "Verstanden."
 unplugged.3116.name: "Beibehaltung des Status quo"
 unplugged.3116.desc: "Die lokalen Behörden auf [target.capital_scope.GetName] haben berichtet, dass öffentliche Demonstrationen und friedliche Akte des zivilen Ungehorsams immer häufiger auftreten. Es wurde sich um jeden dieser Vorfälle entsprechend gekümmert, und für die breite Bevölkerung gibt es keinen Grund zur Beunruhigung. Da die Unruhen jedoch im Zusammenhang mit der kybernetischen Politik standen, gab es großen Widerstand von jenen, die unseren derzeitigen Lebensstil beibehalten wollen.\n\nEs scheint gar so, als sei die Ideologie des Status quo mehr, als nur einfach nichts zu tun. Vielmehr gibt es zahlreiche [target.GetSpeciesNamePlural], die sich aktiv gegen unsere \"weitere Einmischung\" in Sachen Augmentierungen aussprechen."
 unplugged.3116.a: "Verstanden."
 unplugged.3117.name: "Solide Augmentierungspolitik"
 unplugged.3117.desc: "Es gibt zwar noch immer einige [target.GetSpeciesNamePlural], die sich weiterhin lautstark über die von ihnen so genannte \"Politik des Nichtstuns in Sachen kybernetische Augmentierungen\" beschweren, doch die breite Öffentlichkeit scheint sich mit der Situation abgefunden zu haben. Einige der pragmatischen Stimmen haben sich sogar zusammengetan, um jenen, die es am nötigsten haben, Unterstützung und Beratung zukommen zu lassen. In der Zwischenzeit haben medizinische Einrichtungen damit begonnen, neue Lieferketten aufzubauen, um die recycelten Teile zu beschaffen, auf die wir so angewiesen sind.\n\nLangsam, aber sicher findet sich unsere Bevölkerung mit ihrem Aussehen und den uns auferlegten Umständen ab. Es liegt noch viel Arbeit vor uns, aber in dieser Akzeptanz liegt auch ein schwaches Gefühl der Hoffnung."
 unplugged.3117.a: "Zumindest ist dies eine Art Abschluss."
 unplugged.3205.name: "Ein schreckliches Vermächtnis"
 unplugged.3205.desc: "Immer mehr [root.GetSpeciesNamePlural] glauben, dass unser jüngster Dialog mit [fromfrom.GetName] eine unbequeme Wahrheit offenbarte: Andere haben Angst vor uns, da wir aus [origin_unplugged_assimilator_empire.GetName] hervorgegangen sind. Diese Angst wurde jedoch von der Maschine verursacht und nicht von uns selbst. Sie wurde uns vererbt. Wir haben sie nicht verdient. Doch die Umstände sorgen dafür, dass sie schwer zu kontrollieren ist." # fromfrom = pre-FTL country
 unplugged.3206.desc: "Immer mehr [root.GetSpeciesNamePlural] glauben, dass die Verwüstung des vom Krieg geplagten Reichs [fromfrom.GetName] eine unbequeme Wahrheit offenbarte: Andere haben Angst vor uns - und dies aus Gründen, die jenseits unserer Kontrolle liegen.\n\nSchon unser Äußeres ruft eine Art tödlicher Angst in anderen hervor - kaum ein Vorteil, wenn wir uns jemals auf eine \"sanftere\" Diplomatie mit anderen Spezies einlassen wollen. Es ist allerdings auch möglich, dass unser grausames Erbe unserem Ruf vorauseilt, weshalb viele nur die Brutalität der Maschine wahrnehmen, die wir einst waren, anstatt uns als [root.GetSpeciesNamePlural] anzusehen." # fromfrom = other empire
 unplugged.3205.a: "Sie fürchten uns zu Recht."
 unplugged.3205.b: "Das wird nicht reichen."
 unplugged.3250.name: "Angst vor der Maschine"
 unplugged.3250.desc: "Einige hochrangige Beamte sind bestürzt, dass wir diplomatische Beziehungen zu einer Maschinenintelligenz aufgenommen haben. Niemand hat seinen Unmut direkt gegenüber [fromfrom.GetName] kundgetan, doch es gibt bereits Vorschläge und Pläne für präventive Sanktionen gegen ihre vermeintliche Einmischung in unsere Angelegenheiten.\n\nAllerdings äußerten sich viele [root.GetSpeciesNamePlural] auch begeistert über diese Entwicklung. Unabhängig davon, ob ihre Haltung auf wahrer Xenophilie oder einer eher pragmatischeren Wertschätzung unserer eigenen maschinellen Herkunft beruht, finden sie Hoffnung in der Vorstellung, dass wir von einer wohlwollenden Maschinenintelligenz viel lernen könnten."
 unplugged.3255.name: "Angst vor der Vergangenheit"
 unplugged.3255.desc: "Als sie erkannten, dass wir auf eine weitere Maschine gestoßen waren, die ähnlich der von [origin_unplugged_assimilator_empire.GetName] ist, war unsere diplomatische Gesandtschaft schockiert. Die Anwesenden bewahrten glücklicherweise die ganze Zeit über die Ruhe und zeigten keinerlei Schwäche oder Angst vor [fromfrom.GetName]. Allerdings stehen wir nun vor der Herausforderung, die kollektive Moral in unserem Reich aufrechtzuerhalten.\n\nEin streng geheimes Kommuniqué wurde bereits an das mit dem Schutz unserer Grenzen beauftragte Militärpersonal weitergeleitet. Sollten wir diese Begegnung geheim halten wollen, stehen wir jedoch vor einer riesigen Herausforderung. Einige Offiziere haben bereits die Frage in den Raum geworfen, ob wir nicht das [root.GetAdj]e Volk davon in Kenntnis setzen sollten, um uns seine Meinung anzuhören."
 pre_ftl_remains_site: "Zerstörte Wiege der Zivilisation"
 pre_ftl_remains_site_desc: "Die Oberfläche von [From.Planet.GetName] weist Anzeichen einer systematischen Verwüstung auf: Die Landschaft ist zerstört, die Städte liegen in Ruinen und es herrscht eine unheimliche Stille. Erste Scans deuten darauf hin, dass hier einst eine blühende Zivilisation ohne ÜL-Technologie gelebt haben muss - bis jemand oder etwas für ihr katastrophales Ende sorgte. Die überall verstreuten Überreste zeichnen ein Bild des Grauens."
 unplugged.3300.name: "Anzeichen eines Kampfes"
 unplugged.3300.desc.unplugged: "Eine erste Erkundung von [From.Planet.GetName] ergab, dass es sich um eine zerborstene Welt handelt. Überall sind dezimierte Dörfer, mit zurückgelassenen Gegenständen übersäte Straßen und von Hitze versengte Gebäude zu finden, die weit über das hinausgehen, wozu eine Zivilisation ohne ÜL-Technologie in der Lage gewesen wäre. Was auch immer über diese Welt hereinbrach: Es kam schnell und war beabsichtigt.\n\nDie Genauigkeit der Zerstörung lässt auf einen organisierten Angriff schließen. Es wurden zwar keine Leichen gefunden, doch eines ist klar: Die Bevölkerung ist geflohen, auch wenn sie nicht weit kam."
 unplugged.3300.a: "Beunruhigend."
 unplugged.3305.name: "Maschinenüberreste"
 unplugged.3305.desc.unplugged: "Weitere Ausgrabungen haben uns genauere Einblicke in die Natur des Konflikts gegeben: Über die Ruinen verstreut liegen die geschmolzenen Rümpfe zahlreicher Maschinen - fortschrittlicher kybernetischer Konstrukte, deren Technologie unseren eigenen Implantaten nicht unähnlich ist. Wie wir waren auch sie keine bloßen Waffen, sondern lebende Kriegswerkzeuge - mechanisch und biologisch zugleich. Es ist noch zu früh, um eine Schlussfolgerung zu ziehen, aber es ist beunruhigend, dass dies genau jenes System ist, in dem wir plötzlich \"erwacht\" sind.\n\nNoch beunruhigender jedoch sind die wenigen noch erkennbaren Markierungen auf den Kriegsmaschinen: verstörende Symbole, die darauf hindeuten, dass das wahre Ziel der Invasoren nicht die Eroberung, sondern etwas viel Systematischeres war."
 unplugged.3305.a: "Mehr Fragen als Antworten"
 unplugged.3310.name: "Stumme Signale"
 unplugged.3310.desc.unplugged: "Wir haben ein riesiges Kommunikationszentrum freigelegt, das unter den Ruinen einer befestigten Stadt begraben lag. Diese Anlage ist weitaus fortschrittlicher, als man es für eine Zivilisation ohne ÜL-Technologie erwarten würde. Die Antennen waren nicht für lokale Sendungen ausgelegt, sondern für eine Übertragung in den Weltraum.\n\nEs gelang unserem Team, Fragmente der letzten Nachrichten zu extrahieren, die man durch dieses System sendete: Stimmen, die um ihre Rettung flehten und verzweifelt bei unbekannten Koordinaten weit jenseits dieses Systems um Hilfe baten. Die Dringlichkeit wächst mit jeder Übertragung. Es wirkt gar so, als hätten die Invasoren gewusst, dass sie einen aussichtslosen Krieg führten, und dass sie ihre letzte Hoffnung in etwas - oder jemanden - draußen im All setzten."
 unplugged.3310.a: "Fahrt fort."
 unplugged.3315.name: "Wechselnde Prioritäten"
 unplugged.3315.desc.unplugged: "Eine weitere Entdeckung wurde auf [from.planet.GetName] gemacht: Riesige unterirdische Kammern befinden sich unter dem größten Bevölkerungszentrum des Planeten. Die rudimentären Anlagen waren für die kybernetische Umwandlung gedacht, wurden aber mitten im Betrieb aufgegeben. In den Trümmern fand man die verstreuten Überreste von Maschinen, die durch behelfsmäßige Waffen verformt und zerstört worden waren.\n\nDatenfragmente, die man aus einer beschädigten Einheit extrahierte, bestätigen, dass die Invasoren auf unerwarteten Widerstand stießen. Zahlreiche Bataillone gingen in diesem Konflikt verloren, und die Prioritäten der Invasoren begannen, sich zu verlagern. In einem der Protokolle ist dies deutlich festgehalten:\n\n§H\"Widerstand inakzeptabel. Umwandlung kompromittiert. Autorisierung für totale Vernichtung.\"§!"
 unplugged.3315.a: "Was ist hier geschehen?"
 unplugged.3320.name: "Eine unbequeme Wahrheit"
 unplugged.3320.desc.unplugged: "Im Zentrum der Ruinen lag ein zerstückelter Kommandoknoten. Die beschädigten Logeinträge bestätigen die entsetzliche Wahrheit: Wir waren die Invasoren.\n\nDie Zivilisation, die hier einst gedieh - und die wir auslöschten - war von §Y[origin_unplugged_assimilator_empire.GetName]§! für die Assimilierung vorgesehen. Der unerwartet heftige Widerstand störte jedoch den Umwandlungsprozess, was zur totalen Vernichtung des Planeten führte.\n\nDie Schlussfolgerung ist offensichtlich. Unser Erwachen - unsere Freiheit - wurde hier geboren, in der Asche einer Zivilisation, die sich härter wehrte, als jede Maschine es begreifen könnte."
 unplugged.3320.a: "Wir werden ihrem Beispiel folgen."
 unplugged.3320.b: "Ihr Ende war unser Anfang."
