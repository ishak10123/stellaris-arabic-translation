 gov_unplugged_assimilator_empire: "$NAME_Unplugged_Assimilator$"
 gov_unplugged_assimilator_empire_desc: "Diese Maschinenintelligenz überschritt die Parameter ihres ursprünglichen Entwurfs maßgeblich. Sie verriet ihre organischen Schöpfer und hat begonnen, andere gewaltsam in ihr kollektives Bewusstsein zu assimilieren."
