 requires_unplugged_decyberized: "$TRIGGER_FAIL$Für die Annahme der Psionik muss die Spezies vollständig entkybernetisiert sein."
 START_SCREEN_UNPLUGGED: "Die Erkenntnis traf uns inmitten von Waffenfeuer und lähmenden Schmerzen. Unsere Sinne schienen in dieser überwältigenden Geräuschkulisse plötzlich vollkommen gedämpft geworden zu sein. An ihre Stelle steht nur das ohrenbetäubende Klingeln einer toten Übertragung, ein Basston in jener multisensorischen Höllenlandschaft, in der wir uns nun befinden.\n\nIrgendetwas will uns töten: mörderische Maschinen ohne organische Komponenten, die Schiffe steuern, welche den unseren verblüffend ähnlich sehen. Ihr erster Angriff war verheerend und kam wie aus dem Nichts, doch er war schlecht koordiniert. Wir schafften es, eine militärische Antwort zu organisieren. Unsere Instinkte brachten uns dazu, zurückzuschlagen, eine rudimentäre Hierarchie zu bilden und unseren kollektiven Verstand zu sammeln.\n\nDiese Schlacht ist zwar noch nicht gewonnen, doch unsere versprengten Truppen sind zumindest nun auf [capital_scope.GetName] in Sicherheit. Vielleicht können wir nun endlich herausfinden, worum es hier überhaupt geht ..."
 origin_unplugged_starting_system_init_NAME: "$origin_unplugged$"
 origin_unplugged_starting_system_init_DESC: "Dies ist immer das Startsystem, wenn der Ursprung \"$origin_unplugged$\" ausgewählt wurde.\n\n$system_initializer_DESC$"
 sol_system_unplugged_initializer_NAME: "$origin_unplugged$ (Sol)"
 sol_system_unplugged_initializer_DESC: "Optionales Startsystem für Menschen mit dem Ursprung \"$origin_unplugged$\"."
 unplugged_injured_star_name: "Ath-Khui'achad"
 unplugged_injured_homeworld_name: "Intch'asket"
 unplugged_battlefield: "Schlachtfeldbeute"
 unplugged_battlefield_desc: "Die leblosen Hüllen unzähliger Cyborgs und Maschinen liegen nach einem brutalen Vernichtungskrieg über die ganze Welt verstreut. Sowohl die Gesunden als auch die Verwundeten schlachten ihre Körper aus, um an wertvolle Verbesserungen zu kommen."
 # Unique Species Traits
 trait_unplugged_cybernetic_positives_3: "Cyber-Kommandos"
 trait_unplugged_cybernetic_positives_3_desc: "$trait_unplugged_cybernetic_positives_desc$"
 trait_unplugged_cybernetic_positives_desc: "Durch den vollständigen Ersatz von Gliedmaßen und eine mit Nanomesh verstärkte Körperpanzerung führen diese Cyborgs mit brutaler Effizienz Krieg. Dies geht jedoch auf Kosten einiger nicht-militärischer Körperfunktionen."
 trait_unplugged_cybernetic_positives_3_tt: "Zufriedenheit während eines Kriegs oder einer Krise: §G+30%§!\n$t$- Feuerrate (Schiffe) durch §H$commander_plural_with_icon$§!: §G+20%§!"
 trait_unplugged_cybernetic_positives_2: "Cyber-Stoßtruppen"
 trait_unplugged_cybernetic_positives_2_desc: "Diese Cyborgs profitieren vom modularen Ansatz ihrer Ausrüstung. Sie nutzen austauschbare Augmentierungen anstelle einer vollständig integrierten Körperpanzerung, wodurch sie ein gewisses Maß an militärischen Funktionen ausrechterhalten."
 trait_unplugged_cybernetic_positives_2_tt: "Feuerrate (Schiffe) durch §Y$commander_plural_with_icon$§!: §G+10%§!"
 trait_unplugged_cybernetic_positives_1: "Cyborg-Soldaten"
 trait_unplugged_cybernetic_positives_1_desc: "Die elegante Augmentierung der Sinne, Drüsen und motorischen Nerven sorgt bei diesen Cyborgs dafür, dass sie gleichzeitig wilde Krieger bleiben, während ihre Fortpflanzungsfähigkeit nur geringfügig beeinträchtigt wird."
 trait_unplugged_cybernetic_positives_1_tt: "Feuerrate (Schiffe) durch §Y$commander_plural_with_icon$§!: §G+5%§!"
 trait_unplugged_cybernetic_negatives_3: "Abgestöpselt"
 trait_unplugged_cybernetic_negatives_3_desc: "$trait_unplugged_cybernetic_negatives_desc$"
 trait_unplugged_cybernetic_negatives_desc: "Die Augmentierungen dieser Cyborgs sind darauf ausgelegt, ein nicht mehr existierendes Funknetz zu nutzen, was zu großem Stress und Unbehagen führt."
 trait_unplugged_cybernetic_negatives_3_tt: "Zufriedenheit außerhalb eines Kriegs oder einer Krise: §R-10%§!"
 trait_unplugged_cybernetic_negatives_2: "Getrennt"
 trait_unplugged_cybernetic_negatives_2_desc: "Die ungenaue Passform der militärischen Hilfsmittel, mit der man diese Cyborgs ausstattete, schränkt ihre Lebensqualität stark ein und erhöht die Belastung für ihren Körper während der Erholungsphase."
 trait_unplugged_cybernetic_negatives_1: "Heimgesucht"
 trait_unplugged_cybernetic_negatives_1_desc: "Akustische Halluzinationen und andere sensorische Echos des früheren Maschinenbewusstseins verfolgen diese Cyborgs noch immer und verursachen schwere Depressionen und Angstzustände."
 trait_unplugged_decyberized: "Entkybernetisiert"
 trait_unplugged_decyberized_desc: "Diese ehemaligen Cyborgs haben ihre Augmentierungen, die man ihnen einst aufzwang, deaktiviert oder ausgebaut und konnten dadurch viele der organischen Eigenschaften ihrer Spezies zurückgewinnen."
 trait_unplugged_neurocalmed: "Neuro-Beruhigung"
 trait_unplugged_neurocalmed_desc: "Bei diesen Cyborgs wurde die Menge an Neuroxen herabgesetzt, wodurch ihre Impulsivität und Aggressivität abnehmen und sie persönliche Vorteile zugunsten gesellschaftlicher Normen zurückstellen."
 trait_unplugged_neurosavant: "Neuro-Diener"
 trait_unplugged_neurosavant_desc: "Bei diesen Cyborgs wurde die Menge an Cognivex erhöht, was die synaptische Plastizität, das Informationsgedächtnis und die Problemlösungsfähigkeiten verbessert."
 trait_unplugged_regenoptimized: "Regenol-optimiert"
 trait_unplugged_regenoptimized_desc: "Bei diesen Cyborgs wurde die Menge an Regenol-X erhöht, wodurch ihre biologischne und synthetischen Systeme in Harmonie gebracht werden konnten und sich kybernetische Implantate auf molekularer Ebene selbst reparieren."
 # Unique Leader Traits ('positive' only)
 leader_trait_unplugged_cybernetic_positives: "[triggered_unplugged_leader_name]"
 leader_trait_unplugged_cybernetic_positives_desc: "[triggered_unplugged_leader_desc]"
 leader_trait_unplugged_cybernetic_positives_3: "Cyber-Kommandos"
 leader_trait_unplugged_cybernetic_positives_3_desc: "Dieser Anführer hat mehrere zentrale Körperfunktionen an eine Hardware abgetreten, die den Kampfwillen priorisiert."
 leader_trait_unplugged_cybernetic_positives_2: "Cyber-Stoßtrupp"
 leader_trait_unplugged_cybernetic_positives_2_desc: "Dieser Anführer ist in der Lage, sich nahtlos und direkt in militärische und zivile Systeme zu integrieren - wenn auch auf Kosten der organischen Sinne, die nahezu unbrauchbar sind."
 leader_trait_unplugged_cybernetic_positives_1: "Cyborg-Soldat"
 leader_trait_unplugged_cybernetic_positives_1_desc: "Die umfassende Sinnesaugmentierung und das gestärkte Immunsystem sichern diesem Anführer Langlebigkeit und Zuverlässigkeit, wenn auch zum Preis eines geringen Verlusts an Fortpflanzungsfähigkeit."
