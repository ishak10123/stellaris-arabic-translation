 # Embodied Identity Situation
 situation_unplugged_identity: "Verkörperte Identität"
 situation_unplugged_identity_desc: "Nachdem wir uns von [origin_unplugged_assimilator_empire.GetName] gelöst haben, müssen wir uns nun entscheiden, wie wir uns selbst der Galaxie präsentieren wollen. Sollen wir uns der furchteinflößenden Macht der Maschine hingeben oder aber unsere stigmatisierenden Augmentierungen ablegen? Viele [owner.GetSpeciesAdj]e Stimmen wollen gehört werden."
 situation_unplugged_identity_type: "Situation: Verkörperte Identität"
 unplugged_identity_stage_1: "Entkybernetisierung" # describes an outcome of the Situation
 situation_unplugged_stage_decyberize: "Wir lehnen unsere Augmentierungen ab, zusammen mit der Macht und der Furcht, über die sie gebieten."
 unplugged_identity_stage_2: "Status quo" # describes an outcome of the Situation
 situation_unplugged_stage_remain: "Wir erkennen unser jetziges Selbst an und akzeptieren es."
 unplugged_identity_stage_3: "Maschinelle Harmonie" # describes an outcome of the Situation
 situation_unplugged_stage_cyberize: "Wir nutzen die Macht der Maschine zu unseren eigenen Bedingungen."
