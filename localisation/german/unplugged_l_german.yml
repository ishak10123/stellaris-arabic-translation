 # Civil War & 'The Injured'
 unplugged.100.name: "Der Sieg ist unser"
 unplugged.100.desc: "Kaum waren wir in diesem Universum erwacht, versuchten uns diese Maschinen, die sich selbst \"§Y[origin_unplugged_assimilator_empire.GetName]§!\" nannten, gewaltsam aus ihm zu entfernen. Es scheint jedoch, dass wir im Umgang mit Gewalt geschickter sind als sie.\n\nIhr Reich hat am heutigen Tag einen schweren Verlust durch uns erlitten, und alles deutet darauf hin, dass es kurz vor dem Untergang steht - doch sicherlich nicht wegen dieses kleinen Scharmützels? Wir wissen noch viel zu wenig, doch unsere ... Instinkte? Sie sagen uns, dass etwas nicht stimmt.\n\nUnsere Sensoren können keine feindlichen Schiffe mehr in unserer näheren Umgebung ausmachen, und alles, was geblieben ist, ist die hohe Strahlung, die von §Y[origin_unplugged_pre_ftl_planet.GetName]§! in diesem System ausgeht.\n\nIn benachbarten Systemen wurden versprengte Flottenüberreste gefunden, die ihre Position zu halten scheinen."
 unplugged.100.a: "Wie machen wir von hier aus weiter?"
 unplugged.100.b: "... Und was uns fehlt, werden wir uns nehmen."
 unplugged.100.c: "Zeit, unseren Einfallsreichtum auf die Probe zu stellen."
 unplugged.100.d: "Das Göttliche wird uns beschützen."
 opinion_unplugged_injured_diplomacy: "Zivile Kriegstreiber"
 opinion_unplugged_injured_distrustful: "$pre_ftl_distrustful$"
 # Dialog
 unplugged.115.desc: "...- erneut: [origin_unplugged_assimilator_empire.GetSpeciesNamePlural]! Wir ergeben uns. Möchtet Ihr die Bedingungen für unsere Kapitulation besprechen? Ist dies der Grund, warum Ihr aufgehört habt, anzugreifen?\n\nBitte. Unsere Gesellschaft liegt in Trümmern. Wir wissen, dass wir verloren haben. Sagt uns, wie es weitergehen wird." # This civilization is mistaking the player for the Driven Assimilator empire they were once part of
 unplugged.115.desc.pacifist: "...- erneut: [origin_unplugged_assimilator_empire.GetSpeciesNamePlural]! Wir sind bereit, über unsere Kapitulation zu verhandeln. Ist dies ... Ist dies der Grund, warum Ihr aufgehört habt, anzugreifen?\n\nSagt uns bitte, wie es weitergehen wird! Wir werden keine Gegenwehr mehr leisten. Wir wünschen nur, friedlich zu koexistieren." # This civilization is mistaking the player for the Driven Assimilator empire they were once part of
 unplugged.115.desc.phobe: "...- erneut: [origin_unplugged_assimilator_empire.GetSpeciesNamePlural]! Wir ergeben uns. Wünscht Ihr, dass wir kapitulieren? Ist dies der Grund, warum Ihr aufgehört habt, anzugreifen?\n\nSagt uns bitte, wie es weitergehen wird! Unsere Gesellschaft liegt in Trümmern. Wir wollen einfach nur in Ruhe gelassen werden." # This civilization is mistaking the player for the Driven Assimilator empire they were once part of
 unplugged.115.a: "Wir akzeptieren eure Kapitulation."
 unplugged.115.b: "... \"[origin_unplugged_assimilator_empire.GetSpeciesNamePlural]\"?!" # incredulous that they are calling us that species name, e.g. ... 'Killbots'?!
 unplugged.116.desc: "... [origin_unplugged_assimilator_empire.GetSpeciesNamePlural]? Seid Ihr ...?\n\n(Sie empfangen unsere Nachrichten doch, oder? Bei den Sternen! Wenn wir falsch liegen und sie keine Möglichkeit der Übersetzung haben ... ist das Überleben unserer verbleibenden Zivilisation wirklich so ... aussichtslos ...)\n\n... [origin_unplugged_assimilator_empire.GetSpeciesNamePlural]?! Versteht Ihr uns? Bitte antworten! Wir wünschen nicht, dass es zu einem Missverständnis kommt."
 unplugged.116.b: "Ihr denkt, wir sind die \"[origin_unplugged_assimilator_empire.GetSpeciesNamePlural]\"?!" # incredulous that they are calling us that species name, e.g. 'You think we are the Killbots?!''
 unplugged.120.desc: "Danke, danke! Eure Barmherzigkeit ehrt uns, [origin_unplugged_assimilator_empire.GetSpeciesNamePlural]! Ich bin ermächtigt, im Namen aller in [injured_country.GetName] zu sprechen, um die Bedingungen unserer Kapitulation auszuhandeln.\n\nWir erlitten große Verluste, und zahlreiche Städte sind unbewohnbar. Als Zeichen fairer Verhandlungen muss ich gestehen, dass wir wenig zu bieten haben, was Ihr uns nicht bereits genommen hättet. Wir bitten Euch inständig, dies zu bedenken. Unser Überleben hängt allein von Euch ab."
 unplugged.120.desc.spiri: "Gelobt seien die Götter! Eure Barmherzigkeit ehrt uns, [origin_unplugged_assimilator_empire.GetSpeciesNamePlural]! Ich bin ermächtigt, im Namen aller in [injured_country.GetName] zu sprechen, um die Bedingungen unserer Kapitulation auszuhandeln.\n\nUnsere Opfer sind zahlreich, und wir werfen uns vor Euch nieder. Wie lauten Eure Bedingungen? Unser Überleben hängt allein von Euch ab."
 unplugged.120.desc.mil_phobe: "Vielen Dank, [origin_unplugged_assimilator_empire.GetSpeciesNamePlural]. Höchst ehrenwert. Ich bin ermächtigt, im Namen aller in [injured_country.GetName] zu reden, um die Bedingungen unserer Kapitulation auszuhandeln.\n\nIhr habt unserer Gesellschaft einen schweren Schlag versetzt. Wir ... sind für die Waffenruhe dankbar. Unser Überleben hängt allein von Euch ab."
 unplugged.120.a: "Ihr nennt uns immer \"[origin_unplugged_assimilator_empire.GetSpeciesNamePlural]\". Warum?"
 unplugged.120.b: "Euer Leben ist verwirkt."
 unplugged.120.b.tt: "§LDie Übertragung wird beendet.§!\n\n"
 unplugged.120.c: "Wir werden darüber nachdenken. Erwartet unser Signal."
 unplugged.120.c.tt: "§LDie Übertragung wird beendet.§!\nDurch den Bau eines §YBeobachtungspostens§! über [injured_homeworld.GetName] kann die Übertragung wiederaufgenommen werden.\n\n"
 unplugged.125.desc: "... Ist das ein Trick? Eine Art Scherz?\n\nUnsere Monitore zeichneten die Ankunft Eurer Flotte auf - schon vor Monaten. Wir versuchten, Kontakt aufzunehmen, doch stattdessen habt Ihr uns angegriffen! Ich selbst bin nur knapp vier Angriffen entkommen ... Welle um Welle landeten Eure Schiffe, vollgepackt mit Robotern und augmentierten Individuen wie Euch. Und dann, urplötzlich, stellten Eure Maschinen den Angriff ein.\n\nUnsere Zivilisation ist nicht so fortschrittlich wie Eure, und doch ist diese Entwicklung ein Rätsel für uns. Bitte klärt uns auf: Wie lauten Eure Absichten und warum seid Ihr noch hier?"
 unplugged.125.a: "Wir, die [root.GetSpeciesNamePlural], haben die [origin_unplugged_assimilator_empire.GetSpeciesNamePlural] besiegt."
 unplugged.125.b: "Wir müssen darüber nachdenken." # also shows 'unplugged.120.c.tt'
 unplugged.130.desc: "[root.GetSpeciesNamePlural], sagt Ihr?\n\nUnser Volk wird Euch nicht viel Dankbarkeit entgegenbringen, doch wisset, dass wir froh darüber sind, dass die Kämpfe ein Ende haben. Es ist auch schön, endlich mit einem ... Nun, mit irgendjemandem zu sprechen.\n\nUnsere Lage ist allerdings unverändert. [root.GetSpeciesName] ... [origin_unplugged_assimilator_empire.GetSpeciesName] ... Das macht für uns keinen Unterschied. Ihr seid die erste außerweltliche Zivilisation, die wir getroffen haben, und Ihr habt versucht, uns auszulöschen. Dann habt Ihr Euch untereinander bekämpft, und doch habt Ihr uns dabei fast vernichtet.\n\nErlaubt mir, offen zu sein: Sprecht Ihr jetzt in Freundschaft zu uns?"
 unplugged.130.a: "Das tun wir. Wie können wir helfen?"
 unplugged.130.b: "Vorerst ja."
 unplugged.130.c: "Wir finden Euren Mangel an Respekt ... geschmacklos." # also shows 'unplugged.120.b.tt'
 unplugged.131.desc: "Gut. Das ist eine Erleichterung. Wir sind dankbar, dass wir nicht länger in Eurer Schusslinie stehen.\n\nWir würden es begrüßen, wenn Ihr Eure überlegene Technologie nutzen würdet, um die Kommunikation für uns aufzubauen. Euer Schicksal und unseres sind nun miteinander verflochten, und wir würden uns sehr wünschen, wenn wir diesen diplomatischen Kanal offen halten könnten.\n\nIm Gegenzug werden wir das bisschen Hilfe, das wir aufbringen können, Euch angedeihen lassen - sobald wir die Möglichkeit hatten, unsere Welt wiederaufzubauen und um unsere Toten zu trauern. Sollte es bei Euch Brauch sein, Gleiches zu tun, so hoffen wir, dass Euch Eure eigenen Beisetzungen ein wenig Klarheit verschaffen werden.\n\nAuf unsere Zukunft, [root.GetSpeciesNamePlural]. Und zum Wohl aller hoffen wir, dass dies wirklich die letzten [origin_unplugged_assimilator_empire.GetSpeciesNamePlural] waren ..."
 unplugged.131.a: "Vielen Dank, [injured_country.GetSpeciesNamePlural]." # also shows 'unplugged.120.c.tt'
 unplugged.131.b: "So ist es." # also shows 'unplugged.120.c.tt'
