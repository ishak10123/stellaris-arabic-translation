 #Singular: ['concept_debris'] or §H$concept_debris$§!
 #Plural: -
 concept_debris: "Trümmer"
 concept_debris_desc: "§H$concept_debris$§! beschreiben umhertreibende Wrackteile und zertrümmerte Schiffsrümpfe. Sie sind die stummen Echos eines Konflikts im Weltraum, die nach einem Kampf zurückblieben und die man als zeitlich begrenztes ['concept_special_project'] untersuchen kann.\n\nEin £science_ship£ ['concept_science_ship'] damit zu beauftragen, §H$concept_debris$§! zu untersuchen, kann wertvolle Einblicke in neue ['concept_technologies'] liefern."
 #Singular: ['concept_council'] or §H$concept_council$§!
 #Plural: -
 concept_council: "Rat"
 concept_council_desc: "Der §H$concept_council$§! repräsentiert die Führung eines ['concept_empire', Reichs] und besteht aus dem §HHerrscher§! und bis zu 5 zusätzlichen §HRatsmitgliedern§!. Jeder Ratsposten kann von einem ['concept_leader'] besetzt werden, wobei einige ['concept_leader_traits'] reichsweite Boni geben.\n\nDer §H$concept_council$§! ist auch dafür verantwortlich, dass die ['concept_agenda'] verfolgt wird.\n\nDen Rat kann man im Reiter \"§HRat§!\" in der £interface£ ['concept_government_view'] verwalten, und hier können auch neue Ratsposten vergeben werden."
 #Singular: ['concept_agenda'] or §H$concept_agenda$§!
 #Plural: ['concept_agendas'] or §H$concept_agendas$§!
 concept_agenda: "Agenda"
 concept_agendas: "Agenden"
 concept_agenda_desc: "Eine §H$concept_agenda$§! repräsentiert den derzeitigen strategischen Schwerpunkt des ['concept_council', Rats], der die Prioritäten und langfristigen Ziele des Reichs festlegt. Agenden geben während der Vorbereitung kleinere Boni, die dann zu Beginn ihrer eigentlichen Umsetzung stärker werden.\n\nDie verfügbaren §H$concept_agendas$§! und ihre Auswirkungen hängen von der vorherrschenden ['concept_authority'], den geförderten ['concept_traditions'] und anderen Dingen ab.\n\n§H$concept_agendas$§! kann man im Reiter \"§HRat§!\" in der £interface£ ['concept_government_view'] verwalten."
 #Singular: £research£ ['concept_research'] or £research£ §H$concept_research$§!
 #Plural: -
 concept_research: "Forschung"
 concept_research_desc: "£research£ §H$concept_research$§! ist der Prozess des Voranbringens wissenschaftlichen Wissens in drei Hauptfeldern: £physics£ ['concept_physics_research'], £society£ ['concept_society_research'] und £engineering£ ['concept_engineering_research']. Jedes Feld wird separat entwickelt und produziert dabei neue ['concept_technologies'].\n\nDie Forschungsgeschwindigkeit kann durch Bedingungen, die für das gesamte Reich gelten, ['concept_leader_traits'] und externe Faktoren wie ['concept_diplomatic_pacts', $concept_research_agreements$] beeinflusst werden."
 concept_research_tooltip: "$concept_research_desc$\n\n§GAuf ['concept_research'] klicken, um die Datenbank zu öffnen\nAuf £research£ im Menü klicken, um die Liste auszuklappen§!"
 #Singular 1: ['concept_modifier'] or §H$concept_modifier$§!
 #Plural 1: ['concept_modifiers'] or §H$concept_modifiers$§!
 #Singular 2: ['concept_empire_modifier'] or §H$concept_empire_modifier$§!
 #Plural 2: ['concept_empire_modifiers'] or §H$concept_empire_modifiers$§!
 #Singular 3: ['concept_planet_modifier'] or §H$concept_planet_modifier$§!
 #Plural 3: ['concept_planet_modifiers'] or §H$concept_planet_modifiers$§!
 concept_modifier: "Modifikator"
 concept_modifiers: "Modifikatoren"
 concept_empire_modifier: "Reichsmodifikator"
 concept_empire_modifiers: "Reichsmodifikatoren"
 concept_planet_modifier: "Planetenmodifikator"
 concept_planet_modifiers: "Planetenmodifikatoren"
 concept_modifier_desc: "§H$concept_modifiers$§! sind Boni oder Mali, die normalerweise aus den Entscheidungen resultieren, die während £anomaly£ ['concept_anomalies'] oder ['concept_event_chains'] getroffen werden.\n\nSie können temporär oder dauerhaft sein und sich entweder auf das gesamte Reich oder Teile davon, wie Planeten, auswirken.\n\n§H$concept_modifiers$§!, die das ganze Reich betreffen, werden im Reiter \"§H$empire_view_tab_empire$§!\" der £interface£ ['concept_empire_view'] angezeigt, wohingegen man §H$concept_modifiers$§!, die nur spezielle Planeten betreffen, in der £interface£ ['concept_colony_view'] einsehen kann."
 #Singular: ['concept_diplomacy'] or §H$concept_diplomacy$§!
 #Plural: -
 concept_diplomacy: "Diplomatie"
 concept_diplomacy_desc: "§H$concept_diplomacy$§! bestimmt, wie Reiche miteinander interagieren. Darunter fällt alles von Handelsverträgen und Allianzen bis zu ['concept_rivals'] und ['concept_wars', Kriegen]. Diplomatische Aktionen werden beeinflusst von Faktoren wie ['concept_ethics'], ['concept_authorities'], relativer Macht und beiderseitigen Interessen.\n\nReiche können ihre Beziehungen durch ['concept_envoys'] oder ['concept_diplomatic_pacts'] verbessern oder indem sie sich durch eine ['concept_federation'] und die ['concept_galactic_community'] in der galaktischen Politik betätigen."
 #Singular: ['concept_subject_agreement'] or §H$concept_subject_agreement$§!
 #Plural: ['concept_subject_agreements'] or §H$concept_subject_agreements$§!
 concept_subject_agreement: "Untertanenvereinbarung"
 concept_subject_agreements: "Untertanenvereinbarungen"
 concept_subject_agreement_desc: "§H$concept_subject_agreements$§! definieren die Bedingungen der Unterwerfung zwischen Lehnsherr und Vasall und bestimmen den Grad an Autonomie, die Ressourcenabgaben sowie die militärischen Verpflichtungen. Diese Bedingungen lassen sich anpassen, um alles von streng kontrollierten Untertanen bis hin zu beinahe unabhängigen Verbündeten zu schaffen.\n\n§H$concept_subject_agreements$§! kann man im Reiter \"$contacts_view_tab_agreements$\" der £interface£ ['concept_contacts_view'] aushandeln."
 #Singular: ['concept_relic'] or §H$concept_relic$§!
 #Plural: ['concept_relics'] or §H$concept_relics$§!
 concept_relic: "Relikt"
 concept_relics: "Relikte"
 concept_relic_desc: "§H$concept_relics$§! sind mächtige Artefakte aus uralten Zivilisationen, die ihrem Besitzer einzigartige Vorteile gewähren.\n\nMan kann sie an Orten wie £archaeology£ ['concept_archaeology_site', Archäologischen Stätten] entdecken, als Belohnung für längere ['concept_event_chains'] erhalten oder besiegten Reichen abnehmen, wenn diese bereits welche besitzen.\n\n§H$concept_relics$§! gewähren dauerhafte passive Effekte und können aktiviert werden, um noch mächtigere Effekte mit begrenzter Dauer zu erhalten. Man kann sie im Reiter \"$discoveries_view_tab_relics$\" der £interface£ ['concept_discoveries_view'] verwalten."
 #Singular: ['concept_astral_action'] or §H$concept_astral_action$§!
 #Plural: ['concept_astral_actions'] or §H$concept_astral_actions$§!
 concept_astral_action: "Astralaktion"
 concept_astral_actions: "Astralaktionen"
 concept_astral_action_desc: "§H$concept_astral_actions$§! sind spezialisierte Fähigkeiten, mit denen Reiche auf einzigartige Weise mit dem Gefüge des Raums interagieren und häufig astrale Phänomene zum strategischen Vorteil nutzen können.\n\n§H$concept_astral_actions$§! werden für gewöhnlich durch das Erkunden von ['concept_astral_rifts', Astralrissen] freigeschaltet."
 #Singular: ['concept_minor_artifact'] or §H$concept_minor_artifact$§!
 #Plural: ['concept_minor_artifacts'] or §H$concept_minor_artifacts$§!
 concept_minor_artifact: "Kleineres Artefakt"
 concept_minor_artifacts: "Kleinere Artefakte"
 concept_minor_artifact_desc: "§H$concept_minor_artifacts$§! sind Überbleibsel uralter Zivilisationen, die man in der Regel bei Ausgrabungen an einer £archaeology£ ['concept_archaeology_site', Archäologischen Stätte] findet. Während sie für sich weniger mächtig sind als §H$concept_relics$§!, kamm man sie auf verschiedene Weise einsetzen, beispielsweise zum Aktivieren einzigartiger Reichsboni oder zum Tausch gegen wertvolle Ressourcen.\n\nDer Nutzen kleiner Artefakte hängt vom technologischen Fortschritt und den Richtlinien eines Reiches ab: Bestimmte Pfade erlauben es, sie zur kulturellen Bereicherung, für wissenschaftliche Durchbrüche oder sogar zu militärischen Zwecken einzusetzen. Man verwaltet sie in der £interface£ ['concept_discoveries_view']."
 #Singular: ['concept_crisis'] or §H$concept_crisis$§!
 #Plural: -
 concept_crisis: "Krise"
 concept_crisis_desc: "Eine §H$concept_crisis$§! markiert den Aufstieg eines Reichs zu einer existenziellen Bedrohung interstellaren Ausmaßes, sei es durch das Aneignen einer verbotenen Macht oder apokalyptische Technologien.\n\nWer diesen Weg einschlägt, steht dem vereinten Widerstand der Galaxie gegenüber. Es ist ein Weg der unausweichlichen Vergeltung."
 #Singular: ['concept_overlord_holding'] or §H$concept_overlord_holding$§!
 #Plural: ['concept_overlord_holdings'] or §H$concept_overlord_holdings$§!
 concept_overlord_holding: "Lehnsherrn-Besitztum"
 concept_overlord_holdings: "Lehnsherrn-Besitztümer"
 concept_overlord_holding_desc: "§H$concept_overlord_holdings$§! sind besondere Bauwerke, die ein Lehnsherrn-Reich auf der Welt eines Untertanen errichten kann. Diese Bauwerke erlauben es, Einfluss zu projizieren, Ressourcen zu extrahieren oder besondere Dienste zur Verfügung zu stellen, und sie stärken so die Autorität des Lehnsherrn auf unterschiedliche Weise.\n\nDie Art und Anzahl an §HLehnsherrn-Besitztümern§! hängen von der ['concept_subject_agreement'] ab und die Auswirkungen variieren je nach ['concept_civic'], ['concept_ethic'] und strategischen Prioritäten des Lehnsherrn. Für den Lehnsherrn kann dies zwar von Vorteil sein, doch bei Untertanen kann es starken Unmut hervorrufen, insbesondere wenn es als ausbeuterisch oder aufdringlich empfunden wird."
 #Singular: ['concept_branch_office'] or §H$concept_branch_office$§!
 #Plural: ['concept_branch_offices'] or §H$concept_branch_offices$§!
 concept_branch_office: "$BRANCH_OFFICE$"
 concept_branch_offices: "$BRANCH_OFFICES$"
 concept_branch_office_desc: "§H$BRANCH_OFFICES$§! verleihen dem Unternehmenseigentümer einen Prozentsatz des £trade_value£ ['concept_trade', Handels] der Welt als £energy£ ['concept_energy'].\n\nBis zu §Y4§! Zweigstellen-Gebäude können in der £interface£ ['concept_colony_view'] der Zielwelt erbaut werden; zusätzliche Plätze schaltet man durch Hauptwelt-Verbesserungen frei."
 #Singular 1: ['concept_war'] or §H$concept_war$§!
 #Plural 1: ['concept_wars'] or §H$concept_wars$§!
 #Singular 2: ['concept_subjugation_war'] or §H$concept_subjugation_war$§!
 #Plural 2: -
 #Singular 3: ['concept_total_war'] or §H$concept_total_war$§!
 #Plural 3: -
 concept_war: "Krieg"
 concept_wars: "Kriege"
 concept_subjugation_war: "Unterwerfungskrieg"
 concept_total_war: "Totaler Krieg"
 concept_war_desc: "§H$concept_war$§! beschreibt den formellen Zustand eines bewaffneten Konflikts zwischen Reichen, den man zur Verfolgung bestimmter Ziele führt, sei es zur Durchsetzung von ['concept_claims', Ansprüchen], zur Beseitigung von Missständen oder zur Neugestaltung der galaktischen Ordnung. Ein Krieg kann durch einen §HKriegsgrund§! gerechtfertigt werden, der die Ziele und zulässigen Ausgänge definiert.\n\nKriege können in einer Kapitulation enden, wobei eine Seite die Bedingungen der anderen akzeptiert, oder in einen §HStatus quo§! münden, bei dem Eroberungen durch die besetzten Systeme zum Zeitpunkt der Unterzeichnung des ['concept_peace', Friedens] begrenzt sind. Solange der Kriegszustand aufrechterhalten wird, sammelt sich §HKriegsmüdigkeit§! an, was den Druck erhöht, die Feindseligkeiten zu beenden. Kriege können oft kostspielig sein, doch sie sind ein wichtiges Mittel, um über das Schicksal von Sternenreichen zu bestimmen."
 #Singular: ['concept_peace'] or §H$concept_peace$§!
 #Plural: -
 concept_peace: "Frieden"
 concept_peace_desc: "§H$concept_peace$§! beschreibt die formelle Beendigung von Feindseligkeiten zwischen Reichen, was in der Regel zur Durchsetzung von Kriegszielen, dem Austausch von Systemen oder der Auferlegung neuer politischer Vereinbarungen führt. Ein Frieden kann durch eine Kapitulation erzwungen werden oder eintreten, wenn beide Seiten des Krieges müde geworden sind.\n\nDie Friedensbedingungen prägen die neue Ordnung, legen Grenzen fest, unterwerfen Reiche oder bringen die Saat für künftige Konflikte aus."
 #Singular: ['concept_galactic_community'] or §H$concept_galactic_community$§!
 #Plural: -
 concept_galactic_community: "Galaktische Gemeinschaft"
 concept_galactic_community_desc: "Die §H$concept_galactic_community$§! ist ein pangalaktisches Gesetzgebungsorgan, das von Mitgliedsreichen geformt wurde, um die Zusammenarbeit zu verstärken, interstellare Normen durchzusetzen und sich um gemeinsame Bedrohungen zu kümmern. Durch das Vorschlagen und Erlassen von Beschlüssen kann die Gemeinschaft Macht über ihre Mitglieder ausüben und ['concept_war'], die Wirtschaft und soziale Werte im galaktischen Maßstab regulieren.\n\nReiche können durch das Zuweisen von ['concept_envoys', Gesandten] Einfluss auf die Gemeinschaft ausüben und ['concept_diplomatic_weight'] ansammeln. Obwohl die Gemeinschaft vorrangig ein Forum der Einheit ist, kommt es oft zu Rivalitäten und Hinterzimmerverhandlungen. Manche Reiche könnten diese sogar dazu nutzen, um hegemoniale Ziele unter dem Deckmantel einer kollektiven Regierung zu verfolgen."
 #Singular: ['concept_galactic_council'] or §H$concept_galactic_council$§!
 #Plural: -
 concept_galactic_council: "Galaktischer Rat"
 concept_galactic_council_desc: "Der §HGalaktische Rat§! ist der regierende Apparat innerhalb der ['concept_galactic_community', Galaktischen Gemeinschaft]. Er besteht aus den mächtigsten Mitgliedsreichen basierend auf der ['concept_diplomatic_weight', diplomatischen Bedeutung]. Ratsmitglieder genießen besondere Privilegien, einschließlich der Fähigkeit, Notfallmaßnahmen zu erlassen, ein Veto gegen Beschlüsse einzulegen und die galaktische Agenda zu lenken.\n\nDie Ratssitze sind begrenzt und können beruhend auf der diplomatischen Bedeutung wechseln. Obwohl der Rat die galaktische Ordnung schützen soll, ist er oft ein Schmelztiegel galaktischer Ambitionen, in dem die Starken versuchen, ihre Vorherrschaft zu sichern, und sich die Schwachen zusammentun, um die Vorherrschaft der Starken zu brechen."
 #Singular: ['concept_favor'] or §H$concept_favor$§!
 #Plural: ['concept_favors'] or §H$concept_favors$§!
 concept_favor: "Gefallen"
 concept_favors: "Gefallen"
 concept_favor_desc: "§H$concept_favors$§! sind ein diplomatisches Instrument, das die Schuld eines Reichs gegenüber einem anderen repräsentiert. Gefallen werden häufig durch die Teilnahme an galaktischen Ereignissen vergeben und dienen als eine Art politischer Währung innerhalb der §HGalaktischen Gemeinschaft§! und der breiteren diplomatischen Landschaft.\n\nGefallen kann man nutzen, um Abstimmungen zu beeinflussen, diplomatischen Vorschlägen Nachdruck zu verleihen oder Verhandlungen zu den eigenen Gunsten zu lenken."
 #Singular: ['concept_diplomatic_weight'] or §H$concept_diplomatic_weight$§!
 #Plural: -
 concept_diplomatic_weight: "Diplomatische Bedeutung"
 concept_diplomatic_weight_desc: "§H$concept_diplomatic_weight$§! ist ein Maß für den Einfluss, den ein Reich innerhalb der ['concept_galactic_community', Galaktischen Gemeinschaft] besitzt, und bestimmt, wie viel Gewicht die eigene Stimme bei Beschlüssen hat. Man braucht sie auch, um Mitglied des ['concept_galactic_council', Galaktischen Rats] zu werden. Die diplomatische Bedeutung ergibt sich aus der Wirtschaft, dem technologischen Fortschritt und der militärischen Stärke eines Reichs sowie der Anzahl an ['concept_envoys', Gesandten], die der Gemeinschaft zugewiesen sind.\n\nDie diplomatische Bedeutung kann im Lauf der Zeit zu- und abnehmen und spiegelt sowohl das Ansehen des Reichs als auch seine Fähigkeit wider, die eigenen Interessen durchzusetzen."
 #Singular: ['concept_first_contact'] or §H$concept_first_contact$§!
 #Plural: ['concept_first_contacts'] or §H$concept_first_contacts$§!
 concept_first_contact: "Erstkontakt"
 concept_first_contacts: "Erstkontakte"
 concept_first_contact_desc: "Ein §H$concept_first_contact$§! markiert die erste Begegnung zwischen sich zuvor unbekannten Zivilisationen. Diese Momente der gegenseitigen Enthüllung können in ['concept_diplomacy'] resultieren oder zu Misstrauen und sogar Konflikten führen, je nach Veranlagung der beteiligten Reiche.\n\nDer Prozess des §HErstkontakts§! umfasst die Entschlüsselung der fremden Sprache, die Bewältigung potenzieller Zwischenfälle sowie die Festlegung einer Haltung gegenüber dem Unbekannten."
 #Singular: ['concept_workforce'] or §H$concept_workforce$§!
 #Plural: -
 concept_workforce: "Arbeitskraft"
 concept_workforce_desc: "Die §H$concept_workforce$§! stellt die kollektive Arbeitskapazität der Bevölkerung einer £colony£ ['concept_colony'] dar. Sie ist ein Maß für die Anzahl an Individuen, die für die Ausführung verschiedener Aufgaben zur Verfügung stehen und für die Funktionalität des Reichs unerlässlich sind.\n\n£pop£ ['concept_pops'] sind basierend auf gemeinsamen Merkmalen wie ['concept_species'], soziale Schicht und ['concept_ethic'] in Gruppen organisiert. Jede Gruppe trägt zur planetaren §H$concept_workforce$§! bei, die man wiederum nutzen kann, um verfügbare £job£ ['concept_jobs'] zu füllen."
