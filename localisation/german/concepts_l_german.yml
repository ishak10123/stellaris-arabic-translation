 concept_district_specialization_desc: "Die Distrikt-Spezialisierung bestimmt darüber, welche £job£ ['concept_jobs'] ein £district£ ['concept_district'] zur Verfügung stellt, und fügt oft zusätzlichen Platz für £building£ ['concept_buildings'] hinzu."
