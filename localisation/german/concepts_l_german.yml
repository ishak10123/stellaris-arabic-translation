 concept_strategic_resources: "Strategische Ressourcen"
 concept_strategic_resources_desc: "£strategic_resource£ §H$concept_strategic_resources$§! sind seltene Substanzen mit besonderen Eigenschaften, die für fortschrittliche Technologien, Infrastrukturen und Raumschiffe unerlässlich sind.\n\nBeispiele hierfür sind £volatile_motes£ §H$volatile_motes$§!, £exotic_gases£ §H$exotic_gases$§! und £rare_crystals£ §H$rare_crystals$§!.\n\n§HSeltene Ressourcen§! sind noch wertvoller und werden für besonders fortschrittliche Anwendungsgebiete benötigt. Seltene und strategische Ressourcen finden unter anderem bei dem Bau von ['concept_civilian_ships', Zivilschiffen], ['concept_military_ships', Militärschiffen], ['concept_starbases'] und ['concept_megastructures'] Anwendung.$tt_gain$- Baut £zone£ §H$zone_industrial_plural$§! oder £zone£ §H$zone_foundry_plural$§!\n- Baut entsprechende Gebäude für die Ressource\n- $tt_market$"
