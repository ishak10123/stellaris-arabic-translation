 district_orchard_forests: "Gartenwald"
 district_orchard_forests_plural: "Gartenwälder"
 district_orchard_forests_desc: "In diesen Regionen, die für den Ressourcenanbau und die Jagd reserviert sind, wird alles von zellulärem Nahrungsmaterial bis hin zu essbaren Körnern und Beutesymbionten angebaut."
