 ####################################
 # City Appearance
 ####################################
 WILDERNESS: "Wildnis"
 ####################################
 # Deposits
 ####################################
 d_wilderness_mining: "Aufgegebenes Höhlensystem"
 d_wilderness_mining_desc: "Die Lebensformen, die diese Welt früher bewohnten, gaben ihre Minen in aller Eile auf, wodurch mehrere Tunnel einsturzgefährdet sind."
 d_wilderness_mining_2: "Pockennarbige Hochebene"
 d_wilderness_mining_2_desc: "In dieser Region gibts es nichts als wertlosen Aushub und zahlreiche Erdsenken, die auf Bergbauaktivitäten in der Vergangenheit zurückzuführen sind."
 d_wilderness_farming: "Vertrockneter Wald"
 d_wilderness_farming_desc: "Was einst ein riesiger und produktiver Wald war, steht nun leblos da. Die verdorrten Äste sind nicht mehr in der Lage, Früchte zu tragen."
 d_wilderness_farming_2: "Versteinerter Wald"
 d_wilderness_farming_2_desc: "Die Überreste einer riesigen Waldregion. Die hier ansässigen Pflanzen und Pilze starben so schnell ab, dass die Überreste kristallisiert wurden und reaktionsträge sind."
 d_wilderness_generator: "Versengter Solarpark"
 d_wilderness_generator_desc: "Das mit Löchern gespickte Kronendach und die brüchigen Stämme sind alles, was von diesem Solarpark übrig blieb."
 d_wilderness_generator_2: "Solares Ödland"
 d_wilderness_generator_2_desc: "In dieser weitläufigen Region sind nur noch die dornigen Überreste des einst üppigen Solarwalds übrig. Vertrocknete, leicht verstrahlte Blätter treiben nun als Staub in der Atmosphäre."
 d_wilderness_city: "Fauler Sumpf"
 d_wilderness_city_desc: "Was einst unzählige Lebensformen versorgte, ist heute nur noch eine eiternde Grube."
 d_wilderness_city_2: "Verfaulter Morast"
 d_wilderness_city_2_desc: "Unzählige Lebensformen sind hier umgekommen. Ihre verrottenden Überreste sind in den Boden gesickert und haben stinkende, hochätzende biochemische Substanzen freigesetzt."
 d_wilderness_industrial: "Metallisches Moor"
 d_wilderness_industrial_desc: "Die Überreste mehrerer Mineralbäder, die durch einen Einsturz der Atmosphäre ausgesetzt wurden und giftig und reaktionsträge geworden sind."
 d_wilderness_industrial_2: "Biochemisches Ödland"
 d_wilderness_industrial_2_desc: "Steinerne Täler und Schluchten mit chemischem Staub sind alles, was von einer einst riesigen Kette halborganischer Mineralienaufbereitungsanlagen übrig blieb."
 d_scorched_plains: "Versengte Ebenen"
 d_scorched_plains_desc: "In dieser Region wimmelte es einst von Leben, bis es durch die Supereruption des Sterns ausgelöscht wurde."
 concept_scorched_plains: "$d_scorched_plains$"
 concept_scorched_plains_desc: "- $MOD_PLANET_MAX_DISTRICTS_ADD$: §R-2§!\n- Zeit zum Entfernen: £time£ 180 §ITage§!\n- Kosten zum Entfernen:\n$t$- 900 $i_energy$\n\n§L$d_scorched_plains_desc$§!"
 ####################################
 # Colony Types
 ####################################
 col_wilderness_default: "Wildniskolonie"
 ####################################
 # Planet Designations
 ####################################
 col_wilderness_capital: "Herzwelt"
 col_wilderness_capital_tt: "$col_wilderness_capital_desc$"
 col_wilderness_capital_desc: "Jeder Aspekt dieser Welt pulsiert vor symbiontischem Leben. Es ist in derart großer Anzahl vorhanden, dass der Himmelskörper beinahe lebendig erscheint."
 col_wilderness_generator: "Fotosynthesewelt"
 col_wilderness_generator_desc: "$col_generator_desc$"
 col_wilderness_generator_tt: "Unzählige chloroplastische Symbionten, die Energie auf dieser Welt sammeln und speichern."
 col_wilderness_mining: "Gesteinswelt"
 col_wilderness_mining_desc: "$col_mining_desc$"
 col_wilderness_mining_tt: "Unter der augenscheinlich unfruchtbaren Oberfläche dieses Planeten wimmelt es nur so von unterirdischem Leben, das eifrig nach Mineralien gräbt."
 col_wilderness_farming: "Bestäubungswelt"
 col_wilderness_farming_desc: "$col_farming_desc$"
 col_wilderness_farming_tt: "Spezialisierte Symbionten schaffen überall auf dieser Welt ideale Wachstumsbedingungen, um einen stetigen Nachschub an nahrhafter Flora und Fauna zu sichern."
 col_wilderness_fortress: "Jagdwelt"
 col_wilderness_fortress_desc: "$col_fortress_desc$"
 col_wilderness_fortress_tt: "Die Planetenoberfläche bebt nur so unter dem Stampfen der territorialen Herden und den Rufen furchterregender Raubtiere."
 col_wilderness_tech: "Kognitationswelt"
 col_wilderness_tech_desc: "$col_research_desc$"
 col_wilderness_tech_tt: "Auf dieser Welt gibt es jede Menge Kuriositäten und merkwürdige Phänomene, die von Wissbegierigen ergründet werden können."
 col_wilderness_nest: "Weberwelt"
 col_wilderness_nest_desc: "$col_city_desc$"
 col_wilderness_nest_tt: "Ein Zufluchtsort für eine Fülle symbiotischer Lebensformen. Die Atmosphäre kann ihre Zusammensetzung je nach Bedarf und Stimmung der Wildnis ändern."
 col_wilderness_refinery: "Raffineriewelt"
 col_wilderness_refinery_desc: "Ist auf die Produktion £exotic_gases£ §HExotischer Gase§! und anderer £strategic_resource£ §HStrategischer Ressourcen§! spezialisiert."
 col_wilderness_refinery_tt: "Dieser Planet ist von geothermischen Schloten durchzogen, in denen eine Vielzahl von Nanoorganismen und anderen exotischen Symbionten Rohstoffe sammeln und verarbeiten."
 col_wilderness_forge: "Schmelztiegelwelt"
 col_wilderness_forge_desc: "$col_foundry_desc$"
 col_wilderness_forge_tt: "Eine planetengroße Schmiede zur Umwandlung von Rohstoffen in vielseitige Legierungen."
 col_wilderness_unification: "Friedvolle Welt"
 col_wilderness_unification_desc: "$col_bureau_desc$"
 col_wilderness_unification_tt: "Diese Welt strahlt eine Aura mutalistischer Gemütlichkeit aus, die die komplexen Beziehungen zwischen den Symbionten vertieft."
 ####################################
 # Personalities
 ####################################
 personality_benevolent_wilderness: "Harmonische Wildnis"
 personality_benevolent_wilderness_desc: "Diese riesige vernunftbegabte Biosphäre strebt danach, sich mit den Sternen zu verflechten. Ihre Wurzeln verlaufen durch die gesamte Galaxie, doch nicht aus Hunger, sondern in Harmonie."
 personality_rampant_wilderness: "Ungezügelte Wildnis"
 personality_rampant_wilderness_desc: "Die ungezügelte Wildnis wütet nicht: Sie breitet sich aus, verzehrt und überdauert. Alle Dinge, ob lebendig oder tot, werden im endlosen Kreislauf von Wachstum und Verfall zurückgewonnen."
 ####################################
 # Policies
 ####################################
 policy_symbiont_policy: "$policy_drone_policy$"
 policy_symbiont_policy_desc: "Unser mutualistisches Kollektiv ist zwar zu großen Leistungen fähig und äußerst produktiv, doch es hat seine Grenzen. Wir müssen entscheiden, wie und wo wir unsere Ressourcen am besten einsetzen."
 symbiont_policy_balanced: "$drone_policy_balanced$"
 symbiont_policy_balanced_name: "$symbiont_policy_balanced$"
 symbiont_policy_balanced_desc: "Die Wildnis widmet sich der Produktion von Rohstoffen und Fertigerzeugnissen gleichermaßen.\n\n§EKeine Boni oder Strafen auf die Ressourcenproduktion.§!"
 symbiont_policy_worker: "$drone_policy_worker$"
 symbiont_policy_worker_name: "$symbiont_policy_worker$"
 symbiont_policy_worker_desc: "Die Wildnis priorisiert den Abbau von Rohstoffen, wodurch Symbionten produktiver werden, wenn auch auf Kosten spezialisierter Endprodukte.\n\n"
 symbiont_policy_thinker: "$drone_policy_thinker$"
 symbiont_policy_thinker_name: "$symbiont_policy_thinker$"
 symbiont_policy_thinker_desc: "Die Wildnis priorisiert die Herstellung von Endprodukten, was die Produktivität steigert, wenn auch auf Kosten des Ressourcenabbaus.\n\n"
 ####################################
 # Edicts
 ####################################
 edict_capacity_subsidies_wilderness: "$edict_capacity_subsidies$"
 edict_capacity_subsidies_wilderness_desc: "Dieser Erlass ermutigt unsere photosynthetischen Symbionten dazu, Herden zu bilden, die der Sonne über die Oberfläche folgen und so die Energieproduktion erhöhen."
 edict_mining_subsidies_wilderness: "$edict_mining_subsidies$"
 edict_mining_subsidies_wilderness_desc: "Dieser Erlass stärkt unsere Wurzeln, wodurch unsere grabenden Symbionten ihre Arbeit verrichten können, ohne einen strukturellen Zusammenbruch zu riskieren."
 edict_farming_subsidies_wilderness: "$edict_farming_subsidies$"
 edict_farming_subsidies_wilderness_desc: "Dieser Erlass sorgt für eine aggressive Verdünnung energiereicher Chemikalien im Boden, um die Nährstoffproduktion zu steigern."
 edict_forge_subsidies_wilderness: "$edict_forge_subsidies$"
 edict_forge_subsidies_wilderness_desc: "Indem wir unsere lithotrophen Algenbecken mit Nährstoffen sättigen, erreichen wir eine saisonale Blüte, in der die Ernte von Legierungsnebenprodukten wesentlich besser ausfällt."
 edict_research_subsidies_wilderness: "$edict_research_subsidies$"
 edict_research_subsidies_wilderness_desc: "$edict_research_subsidies_desc$"
 edict_clearing_motes_wilderness: "$edict_clearing_motes$"
 edict_clearing_motes_wilderness_desc: "Indem wir die Nahrung für unsere Symbionten mit flüchtigen Teilchen ergänzen, regen wir ihre Verdauung dazu an, sowohl organische als auch anorganische Stoffe zu verarbeiten. Unser Holobiont passt sich unserer eigenen Umwelt an, indem er sie isst."
 edict_learning_campaign_wilderness: "$edict_learning_campaign$"
 edict_learning_campaign_wilderness_desc: "Indem wir unsere Symbionten mit zusätzlichen Nährstoffen versorgen, steigen wir die Produktivität."
 edict_war_drone_campaign_wilderness: "Kriegssymbiontenkampagne"
 edict_war_drone_campaign_wilderness_desc: "Indem wir unseren Prädator- und Herdensymbionten zusätzliche Nährstoffe zuweisen, steigen wir ihre Stärke und ihre Kampfbereitschaft."
 edict_scientific_revolution_wilderness: "$edict_scientific_revolution$"
 edict_scientific_revolution_wilderness_desc: "$edict_scientific_revolution_desc$"
 edict_drone_overdrive_wilderness: "Symbiontenmehrbelastung"
 edict_drone_overdrive_wilderness_desc: "Unsere Biome müssen wettbewerbsfähiger gemacht werden, da immer mehr Ressourcen benötigt werden."
 ####################################
 # Colonization Rules
 ####################################
 COLONIZATION_IMPOSSIBLE_WILDERNESS_TECH: "§RWir können keine Planeten kolonisieren, die sich zu stark von unserer Heimatwelt unterscheiden, ohne zuvor die Technologie £society£ §H$tech_ecological_adaptation$§! erforscht zu haben.§!"
