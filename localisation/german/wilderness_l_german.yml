 gaseosymbiote: "$job_gaseosymbiote$"
 job_gaseosymbiote: "Gassymbiont" #Cus I don't want to have a Gassy  mbionte
 job_gaseosymbiote_plural: "Gassymbionten"
 job_gaseosymbiote_desc: "Diese Symbionten sind Meister der mikrobiellen Alchemie und sorgen für genau die richtigen Bedingungen, die zur natürlichen Erzeugung exotischer Gase erforderlich sind."
 job_gaseosymbiote_effect_desc: "[gas_refiner_drone.GetIcon] $job_gaseosymbiote_drone_plural$ wandeln [GetCatalyticMineralsOrFood] in £exotic_gases£ §Y$exotic_gases$§! um"
