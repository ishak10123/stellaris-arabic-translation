 ####################################
 # Traditions
 ####################################
 tr_adaptability_appropriation_wilderness: "Aneignung"
 tr_adaptability_appropriation_wilderness_delayed: "Ein ungenutztes Ökosystem trägt nichts zu unserem Reich bei. [GetIndividualNamePluralCap] müssen auf effiziente Weise auf jene Planeten verlagert werden, auf denen man sie am dringendsten braucht."
 tr_discovery_faith_in_science_wilderness: "Myzele Netzwerkbildung"
 tr_discovery_faith_in_science_wilderness_delayed: "Indem wir die natürliche Neugierde aller [GetIndividualNamePlural] in unserem verbundenen pilzbasierten Netzwerk fördern, werden Entdeckungen viel effizienter."
 tr_domination_wilderness_network: "Makrometabolische Beschleunigung"
 tr_domination_wilderness_network_delayed: "Indem wir den Energieaustausch auf kontinentaler Ebene steigern, steigert sich die Unterstützung, die jeder Teil von uns selbst dem anderen zukommen lässt, erheblich."
 tr_domination_wilderness_network_effect: "§YNeuer Erlass:§! $edict_drone_overdrive_wilderness$"
 tr_domination_imperious_architecture_wilderness: "Speziesübergreifende Pheromonkompabilität"
 tr_domination_imperious_architecture_wilderness_desc: "Zusätzliche £defense_army£ §Y$defense_army_plural$§! durch §Y$district_craglands_plural$§!: §G+1§!"
 tr_domination_imperious_architecture_wilderness_delayed: "Indem wir die pheromonale Kommunikation zwischen allen [GetIndividualNamePlural] fördern, können wir schneller auf äußere Bedrohungen reagieren."
 tr_expansion_colonization_fever_wilderness: "Bewusstsein vieler Welten"
 tr_expansion_colonization_fever_wilderness_desc: "Bei der Kolonisierung einer neuen Welt wird ein zufälliger §Y£district£ Distrikt§! hinzugefügt."
 tr_expansion_colonization_fever_wilderness_delayed: "[GetGestaltEntityName::<DE_ART_DEF_S_N_Cap>] [GetGestaltEntityName&NOM] ist ein Chor des Denkens, den selbst die kalte Leere des Weltraums nicht zum Schweigen bringen kann."
 tr_expansion_a_new_life_wilderness: "Ungezügeltes Wachstum"
 tr_expansion_a_new_life_wilderness_delayed: "[GetGestaltEntityName::<DE_ART_DEF_S_N_Cap>] [GetGestaltEntityName&NOM] lässt Lösungen für mögliche Probleme heranwachsen."
 tr_expansion_courier_network_wilderness: "$tr_expansion_courier_network_hive$"
 tr_expansion_courier_network_wilderness_delayed: "Jedes Biom als kleineren Teil des großen Ganzen zu behandeln, fördert die gezielte Kommunikation, ohne die volle Aufmerksamkeit des planetaren Bewusstseins zu erfordern."
 tr_expansion_galactic_ambition_wilderness: "$tr_expansion_galactic_ambition_hive$"
 tr_expansion_galactic_ambition_wilderness_delayed: "Panische Angst begleitete die zaghaften Ranken in die Dunkelheit. Nur durch die Bezwingung und das Wegzüchten dieser Angst können wir weiterwachsen. Millionen von [GetIndividualNamePlural] werden sterben, damit [GetGestaltEntityName::<DE_ART_DEF_S_N>] [GetGestaltEntityName&NOM] überleben kann."
 tr_prosperity_pursuit_of_profit_wilderness: "Globaler Flüssigkeitentransport"
 tr_prosperity_pursuit_of_profit_wilderness_delayed: "Ganze Kontinente überspannende Adern transportieren Nahrung und wichtiges Baumaterial in bedürftige Ökosysteme."
 tr_prosperity_public_works_wilderness: "Untergrundbau"
 tr_prosperity_public_works_wilderness_desc: "Alle £district£ §YDistrikte§! stellen §G+50§! zusätzliche £housing£ §Y$MOD_PLANET_HOUSING_ADD$§! zur Verfügung"
 tr_prosperity_public_works_wilderness_delayed: "Indem wir [GetIndividualNamePlural] unter der Oberfläche ansiedeln und ihre Nester um Wachstumsstrukturen ergänzen, können wir noch viel mehr von ihnen unterbringen."
 tr_synchronicity_kinship_wilderness: "Synchronisierter Tagesrhythmus"
 tr_synchronicity_kinship_wilderness_delayed: "Indem wir die Ruhezyklen von [GetIndividualNamePlural] präzise kontrollieren, lässt sich ein globaler Zeitplan für die Umverteilung von Nährstoffen schaffen."
 ####################################
 # Ascension Perks
 ####################################
 ap_mastery_of_nature_wilderness: "$ap_mastery_of_nature$"
 ap_mastery_of_nature_wilderness_desc: "Wir sind der Zyklus, der frisst und gefressen wird. Von der kleinsten Zelle bis zum höchsten Baum leben wir nach diesem Prinzip. Wir sind die Natur."
 ap_engineered_evolution_wilderness: "$ap_engineered_evolution$"
 ap_engineered_evolution_wilderness_desc: "Unser Bewusstsein bildete sich, um die Herausforderungen seiner Umwelt zu meistern. Die Umwelt hat sich verändert, und wir werden dies auch tun."
 engineered_evolution_wilderness_tt: "- Beginnt die Situation \"§Y$genetic_ascension_situation$§!\", die den Traditionsbaum \"['tradition_category:tradition_purity']\" freischaltet.$TABBED_NEW_LINE$- $REQUIRES_TRADITION_SLOT$\n- $UNLOCKS_AGENDA$: §Y$council_agenda_agenda_engineered_evolution_name$§!. Diese Agenda gewährt Genmanipulationstechnologien als Forschungsoptionen"
 ############
 # Espionage
 ############
 operation_embed_planetary_roots: "Planetare Wurzeln schlagen" # literal roots, as in plantlife
 operation_embed_planetary_roots_desc: "Es gibt derzeit wichtigere Aufgaben für unsere [owner.GetIndividualNamePlural]. Nur indem wir ein beinahe vernunftbegabtes Mikrobiom auf einer der Welten unseres Ziels schaffen, erhalten wir den Großteil unseres Spionagenetzes und unterbrechen vielleicht sogar ihre Nahrungskette." # the Wilderness embeds a part of itself, hence 'microbiome'
 operation_embed_planetary_roots_on_success: "$operation_sleeper_cells_on_success$"
 espionage_planetary_roots: "Planetare Wurzeln"
 espionage_planetary_roots_desc: "Wir haben ein beinahe vernunftbegabtes Biom erschaffen, das uns über wichtige Angelegenheiten in diesem Reich informiert. Diese primitiven Symbionten sind bereit, unsere für die Informationsbeschaffung zuständigen [owner.GetIndividualNamePlural] jederzeit zu unterstützen."
 operation_embed_planetary_roots_requires_blocker: "$TRIGGER_FAIL$ §RUnsere Planetaren Wurzeln benötigen einen ['concept_natural_blocker', Natürlichen Blocker] auf einer der Welten des Ziels.§!"
 operation_embed_planetary_roots_dont_stack_this: "$TRIGGER_FAIL$ §RWir haben bereits $espionage_planetary_roots$ in [target.GetName] geschlagen. Dies hat bis zum §Y[planet_roots_success]§! Nutzen für uns.§!"
 operation_embed_planetary_roots_not_cleared: "$TRIGGER_FAIL$ §RWir können noch immer unsere Planetaren Wurzeln in [target.GetName] spüren.§!"
 d_wilderness_root_blocker: "Invasives Dickicht"
 d_wilderness_root_blocker_desc: "Am Rand dieser ländlichen Gebiete hat sich eine beinahe vernunftbegabte, nicht einheimische Wildnis angesiedelt."
 wilderness.4500.name: "Die Wildnis durchkämmen"
 wilderness.4500.desc: "Unsere halbautonomen [owner.GetOperativesLowerPlural] haben mehrere brauchbare Standorte für unser einzigartiges Mikrobiom identifiziert. Sie werden diese Lebensräume noch eine Zeit lang überwachen und jenen Priorität einräumen, die uns die größten Chancen auf langfristigen Erfolg bieten."
 wilderness.4505.name: "Potenzieller Standort entdeckt"
 wilderness.4505.desc: "Wir konnten uns die Unterstützung eines unwissenden [target.GetSpeciesNamePlural] sichern, der glaubt, pflichtbewusst die Natur zu schützen. Stattdessen sind wir bereits dabei, unser Mikrobiom durch \"Samenbomben\" an einem Ort im Hinterland des §H[roots_planet.GetPlanetMoonCap] [roots_planet.GetName]§! zu errichten.\n\nDie dadurch herangezüchteten Symbionten verfügen zwar nur über eine kurze Lebenszeit und werden keine vollständige Erweiterung unseres Selbst sein, doch sie werden das uns fremde Land infiltrieren und beobachten, so weit es ihnen möglich ist."
 wilderness.4510.name: "$espionage_planetary_roots$ geschlagen"
 wilderness.4510.desc: "Von dem Moment an, in dem unser Mikrobiom in seinem neuen Zuhause, dem Natürlichen Blocker \"[GetRootsBlockerName]\" angekommen war, begannen wir, die verbotene Luft einzuatmen und die Welt wahrzunehmen, die als §H[roots_planet.GetName]§! bekannt ist.\n\nUnsere Anwesenheit hier wird zwar nur von kurzer Dauer sein, solange diese Symbionten nicht mit unserem größeren Selbst verbunden sind, doch sie werden uns dennoch gute Dienste leisten, wenn es an der Zeit ist, in den [target.GetAdj]en Raumbereich vorzudringen."
 wilderness.4510.a: "Unser Wurzeln werden tiefer schlagen und länger überdauern."
 wilderness.4510.b: "Lassen wir unseren Wurzeln hier freien Lauf."
 ####################################
 # Technologies
 ####################################
 tech_wilderness_terraform: "Planetare Keimung"
 tech_wilderness_terraform_desc: "Um auf einer neuen Welt Wurzeln schlagen zu können, müssen wir zunächst das Saatbett vorbereiten, und dafür müssen wir als Erstes einen Planeten terraformieren, um sicherzustellen, dass unsere Kolonien nicht verwelken."
 tech_terrestrial_sculpting_wilderness: "$tech_terrestrial_sculpting$"
 tech_terrestrial_sculpting_wilderness_desc: "$tech_terrestrial_sculpting_desc$"
 tech_terrestrial_sculpting_wilderness_effect: "§HNeue Mechanik:§! Kann alle standardmäßigen Planetenklassen terraformieren"
 tech_wilderness_node: "Zentren des Seins"
 tech_wilderness_node_desc: "Indem wir das Wachstum von Symbionten auf jenen Lichtungen unseres verteilten Selbst fördern, die über die Fähigkeit verfügen, tiefe Gedanken zu erfassen, kann unser kollektiver Wille neue Erfahrungen machen."
 tech_wilderness_cluster: "$tech_hive_cluster$"
 tech_wilderness_cluster_desc: "Wir können das kollektive Denken beschleunigen, indem wir mehrere Symbionten versammeln, deren einziger Zweck darin liegt, denselben Willen zu fördern."
 tech_wilderness_confluence: "$tech_hive_confluence$"
 tech_wilderness_confluence_desc: "Unser mutualistischer Wille wird durch riesige Ansammlungen empathischer Symbionten gestärkt, die so sehr mit ihrer Umgebung in Einklang stehen, dass sie unsere kollektiven Gedanken konzentrieren und verbreiten können."
 tech_genome_mapping_wilderness: "$tech_genome_mapping$"
 tech_genome_mapping_wilderness_desc: "Die Genome unserer zahllosen DNA-Stämme zu ergründen, vertieft unser Verständnis dafür, wie wir wachsen, und hilft dabei, Komplikationen zu beseitigen."
 tech_mining_1_wilderness: "$tech_mining_1$"
 tech_mining_1_wilderness_desc: "Verdickungsmittel und hydraulischer Druck können auf bestehende Mineralvorkommen angewandt werden, um unseren Ertrag zu steigern."
 tech_powered_exoskeletons_wilderness: "$tech_powered_exoskeletons$"
 tech_powered_exoskeletons_wilderness_desc: "Verstärkte Exoskelett-Anzüge, die die Kraft und Geschwindigkeit ihres Trägers steigern, bieten offensichtliche militärische Vorteile, steigern aber auch die Effizienz von körperlicher Arbeit."
 tech_colonization_1_wilderness: "Neue-Welt-Initiative"
 tech_colonization_1_wilderness_desc: "Wir berechnen penibel die Menge an Ressourcen und Materialien, die für die Erschließung neuer Welten erforderlich sind, um unsere Pioniersymbionten bestmöglich auf ihre beschwerliche Reise zu den Sternen vorzubereiten."
 tech_wilderness_government: "$tech_planetary_government$"
 tech_wilderness_government_desc: "Von dem Moment an, an dem ein neuer Planet erweckt wird, muss unsere Priorität mehr darauf liegen, ein stabiles Umfeld zu erhalten, in dem wir gedeihen können, als uns Sorgen um uns selbst zu machen."
