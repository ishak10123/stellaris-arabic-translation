 crystalsymbiote: "$job_crystalsymbiote$"
 job_crystalsymbiote: "Kristallsymbiont"
 job_crystalsymbiote_plural: "Kristallsymbionten"
 job_crystalsymbiote_desc: "Diese Symbionten züchten auf ihren Körpern seltene Kristallformationen. Jeder einzelne Auswuchs ist von der Umgebung, der Funktion und den kollektiven Bedürfnissen geprägt."
 job_crystalsymbiote_effect_desc: "[translucer_drone.GetIcon] $job_crystalsymbiote_plural$ wandeln [GetCatalyticMineralsOrFood] in £rare_crystals£ §Y$rare_crystals$§! um"
