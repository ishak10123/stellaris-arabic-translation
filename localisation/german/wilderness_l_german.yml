 mod_job_gaseosymbiote_per_pop_short: "\n§G+1§! £mod_job_gas_refiner_drone_add£ pro $VALUE$ £pop£"
 spindlesymbiont: "$job_spindlesymbiont$"
 job_spindlesymbiont: "Spindelsymbiont"
 job_spindlesymbiont_plural: "Spindelsymbionten"
 job_spindlesymbiont_desc: "Mit unzähligen beweglichen Gliedmaßen und exotischen Sinnesorganen lenkt dieser Symbiont den Fluss der Ressourcen und leitet Nährstoffe, Materie und Materialien dorthin, wo sie am dringendsten benötigt werden. Jede Bewegung bringt die Wildnis ins Gleichgewicht."
 job_spindlesymbiont_with_icon: "£job_spindlesymbiont£ $job_spindlesymbiont$"
 job_spindlesymbiont_plural_with_icon: "£job_spindlesymbiont£ $job_spindlesymbiont_plural$"
 job_spindlesymbiont_effect_desc: "$job_spindlesymbiont_plural_with_icon$ produzieren $r_trade$"
 mod_job_spindlesymbiont_add: "$job_spindlesymbiont_plural$-Jobs"
 job_wilderness_maintenance_drone: "Nachgiebige Biomasse"
 job_wilderness_maintenance_drone_plural: "Nachgiebige Biomassen"
 job_wilderness_maintenance_drone_desc: "Biomasse voller Potenzial. Sie wird gelagert und gepflegt, bis sie gebraucht wird."
 job_heart_processing: "Neu geformte Biomasse"
 job_heart_processing_plural: "$job_heart_processing$"
 job_heart_processing_desc: "Diese Biomasse wird schon bald integriert werden. Sie ist dazu bestimmt, eine höhere Funktion innerhalb von uns selbst zu erfüllen."
 neurosymbiont: "$job_neurosymbiont$"
 job_neurosymbiont: "Neurosymbiont"
 job_neurosymbiont_plural: "Neurosymbionten"
 job_neurosymbiont_plural_with_icon: "£job_neurosymbiont£ $job_neurosymbiont_plural$"
 job_neurosymbiont_desc: "Als lebendes Verbindungsstück zwischen dem Behemoth und uns verbringen diese Symbionten ihr Leben damit, unsere Psyche in die des Behemoths zu übertragen."
 job_neurosymbiont_effect_desc: "£job_neurosymbiont£ $job_neurosymbiont_plural$ produzieren £energy£ §Y$energy$§!"
