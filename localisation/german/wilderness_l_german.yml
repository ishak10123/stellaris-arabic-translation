 district_hollow_mountains: "Hohlberg"
 district_hollow_mountains_plural: "Hohlberge"
 district_hollow_mountains_desc: "Diese felsige Landschaft ist der Standort zahlreicher Minen, die Symbionten auf der Suche nach wertvollen Mineralien graben."
