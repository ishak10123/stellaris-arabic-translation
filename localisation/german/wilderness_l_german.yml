 motesymbiote: "$job_motesymbiote$"
 job_motesymbiote: "Teilchensymbiont"
 job_motesymbiote_plural: "Teilchensymbionten"
 job_motesymbiote_desc: "Diese Symbionten bringen flüchtige Teilchen voll instabiler Energie hervor. Sie sind klein, hell und tödlich."
 job_motesymbiote_effect_desc: "[chemist_drone.GetIcon] $job_motesymbiote_plural$ wandeln [GetCatalyticMineralsOrFood] in £volatile_motes£ §Y$volatile_motes$§! um"
