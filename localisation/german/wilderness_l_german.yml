 job_evosymbiont_desc: "Die Körper dieser Symbionten sind lebende Hypothesen. Ihre Antennen, lichtbrechenden Membranen und gitterartigen Stacheln erlauben es ihnen, die Schwerkraft zu schmecken und chemische Formeln zu entschlüsseln."
