l_german:
 ####################################
 # Events
 ####################################
 # introduction event
 progress.2.desc.wilderness: "Die [Root.GetName] machte auf [from.GetName] einen verblüffenden Fund: Auf dem [from.GetPlanetMoonCap] wimmelt es nur so von fremden Lebensformen! Zum ersten Mal sind wir auf Wesen gestoßen, die nicht von uns selbst stammen.\n\nDiese erstaunliche Entdeckung bestätigt endlich, dass wir, der Planet [root.owner.capital_scope.GetName], nicht allein im Universum sind. Obwohl keine der fremden Kreaturen auf [from.GetName] vernunftbegabt ist, ist es wahrscheinlich nur eine Frage der Zeit, bis wir auf solche Wesen treffen."
 # Colonization Events
 wilderness.1010.name: "[from.GetName] erwacht"
 wilderness.1010.desc.intro: "Unsere Terraforming-Sporen haben ihren Zweck erfüllt und einen Teil von uns selbst zum ersten Mal zwecks einer Kolonisierung auf eine fremde Welt gebracht."
 wilderness.1010.desc.same: "Sowohl [from.GetName] als auch [root.GetHomeWorldName] zu sein … Es fühlt sich für uns bereits so vertraut an: eine bequeme Art des Seins, und dies trotz all der zahlreichen neuen Formen unter einer fremden Sonne. Wir haben uns leicht an die hier vorherrschenden Bedingungen angepasst." #e.g. 'becoming Mars as well as Earth...''
 wilderness.1010.desc.similar_cold: "Uns selbst an die [from.GetClassAdj]e Welt §Y[from.GetName]§! anzupassen, wird eine Herausforderung darstellen, doch wir haben bereits vertraute Wege gefunden, damit umzugehen. Ranken breiten sich aus, Lebensräume werden geschaffen und hungrige Mäuler jagen." #e.g. 'Adapting our self to suit arctic Pluto...'
 wilderness.1010.desc.similar_dry: "Als Planet [root.GetHomeWorldName] konnten wir schon immer in einer trockenen Atmosphäre gedeihen. Und deshalb werden wir uns auch der Herausforderung stellen können, zur [from.GetClassAdj]en Welt §Y[from.GetName]§! zu werden. Wir haben bereits neue Wege gefunden, um Feuchtigkeit zu suchen, und wir haben gelernt, mit der anspruchsvollen neuen Geologie zu arbeiten anstatt gegen sie." #e.g. 'the challenge of becoming savannah Mars'
 wilderness.1010.desc.similar_wet: "So wie wir in und zwischen den Gewässern von [root.GetHomeWorldName] gedeihen, werden wir auch auf der [from.GetClassAdj]en Welt §Y[from.GetName]§! gedeihen. Die Mineralien, die Strömungen und selbst die Menge an Tageslicht fühlen sich hier sonderbar an, doch wir haben bereits Wege gefunden, um das für uns zu gewinnen, was wir brauchen." #e.g. 'we flourish as oceanic Neptune'
 wilderness.1010.desc.diff_cold: "Wir wussten, dass es eine Herausforderung sein wird, zu §Y[from.GetName]§! zu werden, und in der Tat ist einiges, was uns zur [root.capital_scope.GetClassAdj]en Welt [root.GetHomeWorldName] machte, bereits hier verwelkt, doch das, was bleibt, ist stark und hat bereits angefangen, sich anzupassen. In dieser ungewohnten Umgebung ist es schwierig, lebenswichtige Ressourcen zu finden - aber wir halten an dieser kalten Landschaft fest und auch das Leben hat bereits einen Weg gefunden." #e.g. 'becoming Earth'
 wilderness.1010.desc.diff_dry: "Dieser Ort ruft in uns eine urzeitliche Angst hervor: Die Hitze und die Trockenheit wecken in uns eine instinktive Erinnerung an das Verbrennen. Wenn wir uns jedoch anpassen und hier gedeihen ... können wir zu §Y[from.GetName]§! werden und etwas Neues in uns selbst erwecken. Wo es Feuchtigkeit gibt, haben wir Wege gefunden, sie zu speichern, und wo Schatten knapp war, haben wir Wege gefunden, ihn selbst zu erschaffen."
 wilderness.1010.desc.diff_wet: "Unser Streben, zu §Y[from.GetName]§! zu werden, wird uns zwar vor eine Herausforderung stellen, doch wir haben uns gegen Fäulnis und Überschwemmung gewappnet. Die Teile von uns, die besser mit Wasser umgehen können, leiten es nun für diejenigen weiter, die anfälliger dafür sind. Wir haben uns die einzigartigen Strömungen dieses Ortes zu eigen gemacht." #e.g. 'Our effort to become Mars'
 wilderness.1010.desc.other: "Um §Y[from.GetName]§! zu werden, machen wir die Teile von uns selbst aus, die hier gedeihen und verwelken werden. Diese [from.GetClassAdj]e Existenz hat vieles mit dem gemeinsam, was wir schon kannten, aber auch vieles, was fremd ist. Wir beobachten und wir experimentieren, um uns anzupassen." #e.g. 'shape ourselves to become Luna'
 wilderness.1010.desc.outro: "Unsere Zusammensetzung, unsere Nährstoffe und unsere DNA haben bereits begonnen, sich anzupassen und sich mit jenem Leben zu vermischen, das vor uns hier war. [from.GetName] erwacht."
 wilderness.1010.a: "Schon bald werden unsere Welten eins werden."
 # Terraforming Events
 terra.25.desc.wilderness: "Unser langwieriges Projekt zur Erweckung von §Y[From.GetName]§! war nicht so erfolgreich, wie wir gehofft hatten. Ein Riss in einem unserer Biomasse-Angleicher sonderte eine Flut von §YTerraforming-Rückständen§! ab, die Täler verstopfte und eine klebrige Kruste über bestimmten bewohnbaren Zonen bildete.\n\nAuch wenn dieses überschüssige Material keine direkte Gefahr für uns darstellt, könnten einige unserer beweglicheren Elemente eine Zeit lang beeinträchtigt sein."
 terra.80.desc.wilderness: "Wir haben unser künftiges Selbst von einer weiteren Strahlungsschicht in der Atmosphäre und dem Boden von §Y[From.GetName]§! befreit. Unsere wachsamen [Root.GetTerraformerPlural] mussten jedoch eingreifen und isolierten einen Teil der Welt vorübergehend. Wir scheinen eine extrem scheue einheimische Spezies gestört zu haben, die in radioaktiven Umgebungen gedeiht. Leider begann sie aufgrund des Terraformings, zu verwelken.\n\nNoch verblüffender ist jedoch, dass diese Spezies anscheinend beinahe vernunftbegabt ist und an der Schwelle zum unabhängigen Denken steht. Da bald schon die letzten gefährlichen ökologischen Rückstände auf [From.GetName] beseitigt sein werden, müssen wir entscheiden, wie wir mit dieser neuartigen Lebensform umgehen wollen."
 terra.80.b.wilderness: "Diese Welt gehört ihr. Wir sollten es ihr erlauben, zu erwachen."
 terra.80.d.wilderness: "Wir werden sie verschlingen."
 wilderness.2000.name: "Eine geplante Erweckung"
 #wilderness.2000.desc.reg: "We feel the tremendous potential of [from.GetName]. It seems proper to both fear and delight in the awesome power we are about to exert there: shaping this [from.GetPlanetMoon] with our will and the tools we have developed; laying the pattern for its eventual awakening.\n\nWe have long relied on natural processes to grow and sustain the [root.GetName]. But these trials also cost us dearly, and taught us much. Now we shall see what wonders emerge when a habitable world skips its own evolution and gains the wisdom of hard-earned growth and decay."
 wilderness.2000.desc.barren: "Die Verwüstung auf [from.GetName] ist schmerzhaft anzusehen, doch das ist nun vorbei. Das Leben in dieser Galaxie scheint diese karge Welt bisher ignoriert zu haben, doch nun verfügen wir, [root.GetName], über die nötigen Werkzeuge und das Wissen, diese Aufgabe zu übernehmen.\n\nTrotz allem, was wir bisher gelernt haben, ist die Wiederherstellung von [from.GetName] eine monumentale Aufgabe. Durch unseren Willen und mit den von uns entdeckten Werkzeugen zur klimatischen Anpassung wird es bald Leben geben, wo es vorher keines gab."
 wilderness.2000.desc.tomb_detox: "Obwohl das Leben, das es einst auf [from.GetName] gab, ausgelöscht wurde, sind wir nun bereit, dieser Welt eine zweite Chance zu geben. Wir haben damit begonnen, die Atmosphäre und den Wasserkreislauf wiederherzustellen, damit [from.GetName] in Form von [root.GetName] wieder Leben eine Heimat bieten kann."
 wilderness.2000.desc.gaia: "Die Evolution hat uns, [root.GetName], zu einem wahren Wunder gemacht. Wir haben nun die Möglichkeit, so viel mehr für den [from.GetPlanetMoonCap] [from.GetName] zu tun. Wir verfügen über Werkzeuge und Wissen, das sich unser früheres Selbst kaum hätte vorstellen können, und haben damit begonnen, [from.GetName] in einen Ort zu formen, dessen Erwachen völlig anders sein wird.\n\n[from.GetName] soll eines Tages nur so von Nährstoffen überquellen, die vom Lebenszyklus unserer Flora und Fauna erneuert werden. Täler, Bergrücken und Hochebenen werden reichlich Platz für die Nahrungssuche, die Jagd und Schutz bieten. Das Leben wird hier erblühen."
 wilderness.2000.a: "Fangen wir an."
 wilderness_pre_sapient_defence_army: "Beinahe vernunftbegabte Herde"
 seq_wilderness_pre_sapient_defence_army: "Symbiontenherde $R$" # e.g. 'Symbiont Herd IV'
 wilderness_pre_sapient_defence_army_plural: "Beinahe vernunftbegabte Herden"
 wilderness_pre_sapient_defence_army_desc: "Diese stark territorialen Wesen sind so lange gefügig, bis man sie provoziert. Ab diesem Zeitpunkt folgen sie nur noch ihren urtümlichsten Instinkten, um jene zu verteidigen, die sie als ihre Artgenossen erkennen."
 wilderness_pre_sapient_assault_army: "Beinahe vernunftbegabte Horde"
 seq_wilderness_pre_sapient_assault_army: "Symbiontenhorde $R$" # e.g. 'Symbiont Horde IV'
 wilderness_pre_sapient_assault_army_plural: "Beinahe vernunftbegabte Horden"
 wilderness_pre_sapient_assault_army_desc: "Erbarmungslose Kreaturen, die gerade über genügend Gerissenheit und Ausdauer verfügen, um jeden, den sie als Feind betrachten, brutal zu vernichten."
 ####################################
 # Origins
 ####################################
 origin_wilderness: "Wildnis"
 origin_wilderness_desc: "§RWARNUNG: Blockiert alle Aufstiegspfade außer den ['concept_purity_ascension'].§!\n\nDieses Wesen ist nicht viel mehr als ein vernunftbegabtes Ökosystem: eine Vielzahl unterschiedlicher Lebensformen, die sich zu einem Gestaltbewusstsein auf planetarer Ebene zusammengefügt haben."
 origin_tooltip_wilderness_effects: "- Spezieseigenschaft: ['trait:trait_wilderness']\n- Ersetzt alle standardmäßigen £building£ ['concept_buildings'], £district£ ['concept_districts'] und £zone£ ['concept_district_specialization'] mit besonderen Varianten\n- Ersetzt die Kolonisierung durch Kolonieschiffe durch das ['concept_terraforming']\n- Neue Ressource: £biomass£ ['concept_biomass']\n- Heimatwelt:$TABBED_NEW_LINE$- Größe: £planetsize£ 18$TABBED_NEW_LINE$- ['concept_scorched_plains', £blocker£ $d_scorched_plains$]"
 trait_wilderness: "Wildnis"
 trait_wilderness_desc: "§LDiese Spezies existiert als Teil eines mutualistischen Wesens, das sich in seinen Gedanken und der Produktionsleistung nicht von seiner Umwelt unterscheidet.§!"
 WILDERNESS_NATURAL_WORLDS_DECLINE: "§RDie §YWildnis§! kann auf unnatürlichen Welten nicht überleben§!"
 WILDERNESS_DEAD_WORLD: "$TRIGGER_FAIL$Die §YWildnis§! kann nicht in Reichen überleben, die selbst keine Wildnis sind."
 country_virtual_jobs: "Alle Jobs, die im Reich bearbeitet werden können, werden automatisch gefüllt."
 concept_wilderness_trait: "$trait_wilderness$"
 concept_wilderness_trait_desc: "- $MOD_LOGISTIC_GROWTH_MULT$: §R-100%§!\n- §RKann nicht migrieren oder umgesiedelt werden§! $NEW_LINE$- §RKann sich nicht auf natürliche Weise vermehren§!\n\n§L$trait_wilderness_desc$§!"
 PRESCRIPTED_adjective_zhardmehka: "Bloomer"
 PRESCRIPTED_ship_prefix_zhardmehka: "ZMV"
 PRESCRIPTED_species_name_zhardmehka: "Zhard-Krellin"
 PRESCRIPTED_species_name_plural_zhardmehka: "Zhard-Krellinen"
 PRESCRIPTED_species_adjective_zhardmehka: "Zhard-Krellinisch"
 PRESCRIPTED_planet_name_zhardmehka: "Tellon"
 PRESCRIPTED_system_name_zhardmehka: "Tattla"
 PRESCRIPTED_ruler_name_zhardmehka: "$FUN3_CHR_Obanva$ $FUN3_CHR_uvi-Livve$"
 PRESCRIPTED_ruler_title_zhardmehka: "Avatar"
 START_SCREEN_WILDERNESS_INTRO: "Solange wir uns erinnern können, war [root.GetHomeWorldName] der Planet [root.GetHomeWorldName]. Jeder Stängel, jede Ranke und jedes Enzym ist ein Teil des Selbst - ein Gleichgewicht von Wachstum, Verfall und Prädation. [root.GetHomeWorldName] konnte die jenseitige Galaxie nur schemenhaft wahrnehmen, und dennoch waren die Sterne schon lange unruhig.\n\nEine Schlacht fand am Himmel über [root.GetHomeWorldName] statt. Große Schiffe ließen Trümmer auf die Oberfläche regnen - fremde Artefakte wurden rasch für andere Zwecke genutzt. Dann kam die Sonneneruption ..."
 START_SCREEN_WILDERNESS_DEFAULT: "[root.GetHomeWorldName] empfand sie als blendendes, sengendes Licht. Milliarden Symbionten wurden von Feuerstürmen und Strahlung verbrannt oder fortgerissen. Einem ganzen Kontinent wurde sämtliches Leben geraubt."
 START_SCREEN_WILDERNESS_COLD: "[root.GetHomeWorldName] empfand sie als blendendes, sengendes Licht. Gletscher verwandelten sich in reißende Ströme, während die Sonnenstrahlung [root.GetHomeWorldName] bis zu den Wurzeln versengte. Ein ganzer Kontinent wurde weggespült."
 START_SCREEN_WILDERNESS_DRY: "[root.GetHomeWorldName] empfand sie als blendendes, sengendes Licht. Dünen schmolzen zu Glas und der beißende Wind schliff Felswände weg. Ein ganzer Kontinent wurde in ein Ödland verwandelt."
 START_SCREEN_WILDERNESS_WET: "[root.GetHomeWorldName] empfand sie als blendendes, sengendes Licht. Die Meere kochten und die Eisschilde schmolzen, während die Sonnenstrahlung [root.GetHomeWorldName] bis zu den Wurzeln versengte. Ein ganzer Kontinent ging verloren."
 START_SCREEN_WILDERNESS_OUTRO: "Der Schmerz rüttelte uns wach. Zum ersten Mal erkannten wir unsere Zerbrechlichkeit. Die Galaxie ist gefährlich, doch sie ist auch voller Wunder. Mit dem, was wir gelernt haben, werden wir aufkeimen und uns ausbreiten. Wir werden unser Selbst zu den Sternen bringen."
 ####################################
 # Authorities
 ####################################
 auth_mutualistic_intelligence: "Mutualistische Intelligenz"
 auth_mutualistic_intelligence_plural: "Mutualistische Intelligenzen"
 auth_mutualistic_intelligence_desc: "$auth_mutualistic_intelligence_plural$ sind Bewusstseine auf planetarer Ebene. Sie bestehen aus symbiotischen Spezies, die aus einer Vielzahl von Biota stammen und im Einklang mit dem kollektiven Willen ihrer Umwelt handeln.\n\nManche Symbionten können halbautonom an spezialisierten Aufgaben arbeiten, doch die meisten sind auf regelmäßigen Kontakt mit ihrer mutualistischen Umgebung angewiesen. Werden sie isoliert, kehren ihre Wildheit und ihr instinktives Verhalten zurück und sie gehen schließlich zugrunde."
 tt_auth_mutualistic_intelligence: "Hat die Autorität §Y$auth_mutualistic_intelligence$§! (§Y$auth_hive_mind$§!)"
 gov_wilderness: "$gov_hive_mind$"
 gov_wilderness_desc: "Diese Regierung regiert als Einzelbewusstsein. Die Bevölkerung besitzt keine persönlichen Antriebe, außer die Bedürfnisse und Wünsche der $RT_WILDERNESS$ zu erfüllen."
 RT_WILDERNESS: "Wildnis"
 RT_WILDERNESS_FEMALE: "$RT_WILDERNESS$"
 ####################################
 # Buildings
 ####################################
 building_colony_shelter_wilderness: "Planetare Ranken"
 building_colony_shelter_wilderness_desc: "Mehrzellige Organismen sind ins Gefüge dieser Welt eingewebt und gewährleisten die Stabilität der Wildnis."
 building_capital_wilderness: "Planetares Wurzelbündel"
 building_capital_wilderness_desc: "Eine riesige, lebendige Masse einfacher Organismen, die mit den Symbionten harmoniert, um deren Koordination und Produktivität zu verbessern."
 building_major_capital_wilderness: "Planetarer Wurzelkomplex"
 building_major_capital_wilderness_desc: "Eine konzentrierte lebende Masse, die so dicht ist, dass die Symbionten in einer stark begrenzten Sphäre leben, arbeiten und sich fortpflanzen."
 building_system_capital_wilderness: "Planetarer Wurzelnexus"
 building_system_capital_wilderness_desc: "Ein riesiger Zusammenschluss verschiedener Lebensformen, der so groß ist, dass er sein eigenes ideales Mikroklima kultiviert."
 requires_building_wilderness_capital: "§RBenötigt \"§Y$building_capital_wilderness$§!\" auf dem Planeten.§!"
 requires_building_wilderness_major_capital: "§RBenötigt \"§Y$building_major_capital_wilderness$§!\" auf dem Planeten.§!"
 requires_building_wilderness_system_capital: "§RBenötigt \"§Y$building_system_capital_wilderness$§!\" auf dem Planeten.§!"
 building_imperial_capital_wilderness: "Imperialer Komplex"
 building_imperial_capital_wilderness_desc: "Von dieser massiven Struktur aus regiert die Wildnis das Galaktische Imperium. Hier wird über das Schicksal der Galaxie entschieden."
 building_tendril_cradle_1: "Rankenwiege"
 building_tendril_cradle_1_desc: "Ein Bündel kurzer, verwurzelter Fäden erstreckt sich von diesem Ort in alle Richtungen und leitet Materialien zu den wichtigsten Organen in der unmittelbaren Umgebung."
 building_tendril_cradle_2: "Gewundene Weite"
 building_tendril_cradle_2_desc: "Endlos lange Ranken ziehen sich durch die Landschaft, um Ressourcen aus benachbarten Regionen in Verarbeitungs- und Umverteilungszentren zu befördern."
 building_tendril_cradle_3: "Transportwurzelnest"
 building_tendril_cradle_3_desc: "Miteinander verflochtene Wurzeln pulsieren unter der Oberfläche und befördern Biomasse durch geschichtete Kanäle zu fernen biotischen Zentren."
 building_tendril_cradle_4: "Planetares Rankenherz"
 building_tendril_cradle_4_desc: "Gewaltige Logistikranken erstrecken sich über die gesamte Welt, um die Ressourcen der Wildnis mit unermüdlicher Synchronität anzuziehen, anzupassen und weiterzuleiten."
 planet_research_buildings: "Planetare Forschungsgebäude"
 mod_planet_research_buildings_upkeep_mult: "Unterhalt ($planet_research_buildings$)"
 building_brain_node_1: "Forschungswucherung"
 building_brain_node_1_desc: "Die spielerische Arbeit forschender Symbionten bildet die Grundlage für die allgemeine Forschung."
 mod_planet_building_brain_node_1_build_speed_mult: "Baugeschwindigkeit ($building_brain_node_1$)"
 building_brain_node_2: "Forschungshain"
 building_brain_node_2_desc: "Ein Habitat, das in einzigartiger Weise die Neugierde fördert und das Studium fortschrittlicher Artefakte und Phänomene erleichtert."
 mod_planet_building_brain_node_2_build_speed_mult: "Baugeschwindigkeit ($building_brain_node_2$)"
 building_brain_node_3: "Exotische Forschungsgehege"
 building_brain_node_3_desc: "In diesen weitläufigen Gehegen experimentieren extremophile Symbionten mit allen möglichen exotischen und gefährlichen Materialien."
 mod_planet_building_brain_node_3_build_speed_mult: "Baugeschwindigkeit ($building_brain_node_3$)"
 building_brain_node_4: "Fortschrittliches Forschungsgehege"
 building_brain_node_4_desc: "Die Verschmelzung exotischer Technologien mit einem riesigen, von Symbionten bewachsenen Areal erlaubt es, die fortschrittlichste Forschung in einer Sandkastenumgebung durchzuführen."
 mod_planet_building_brain_node_4_build_speed_mult: "Baugeschwindigkeit ($building_brain_node_4$)"
 building_commensal_clearing_1: "Kommensale Lichtung"
 building_commensal_clearing_1_desc: "Auf diesen stillen Inseln können sich Teilchen aller Art sammeln, ausruhen und neu orientieren."
 building_commensal_clearing_2: "Kommensaler Hain"
 building_commensal_clearing_2_desc: "Ein geschützter Ort, der sich ideal für die massenhafte Ansammlung von Symbionten eignet. Ihre Interaktionen tragen zu einem besseren Verständnis des verteilten Selbst bei."
 building_commensal_clearing_3: "Kommensales Tal"
 building_commensal_clearing_3_desc: "Dichte Gemeinschaften vielfältiger Symbionten wandern durch diese unberührten Formationen und stärken die Bindung untereinander."
 building_commensal_clearing_4: "Kommensales Biom"
 building_commensal_clearing_4_desc: "Weitläufige, miteinander verbundene Habitate sind Schauplatz unzähliger Begegnungen, von denen jede unerlässlich für das gegenseitige Verständnis ist."
 building_massive_growth_1: "Nährstoffreiche Talsenke"
 building_massive_growth_1_desc: "Die winzigen geologischen Strukturen bieten ein ideales Mikroklima für ein ganzjähriges zuverlässiges Pflanzenwachstum."
 building_massive_growth_2: "Nährstoffreiches Unterholz"
 building_massive_growth_2_desc: "Ein weitläufiges, halb durchlässiges Blätterdach bietet dem Unterholz den nötigen Schutz, um reichhaltige und saftige Nahrung zu produzieren."
 building_massive_growth_3: "Gehügelte Megaplantage"
 building_massive_growth_3_desc: "Diese weitläufigen Terrassen bieten sowohl semiaquatischen Mikroorganismen als auch Fauna einen sicheren Zufluchtsort und liefern eine Fülle von Eiweißen und Körnern."
 building_massive_growth_4: "Waldbauplantagen"
 building_massive_growth_4_desc: "Das von einer blattreichen Megaflora geschützte Unterholz erhöht den Ertrag von Feldfrüchten für das gesamte Nahrungsnetz."
 building_bioelectric_stimulator_1: "Chloroplastischer Akklimatisator"
 building_bioelectric_stimulator_1_desc: "Eine Ansammlung linsenartiger Blasen bündelt Sonnenstrahlen ins Innere einer algenartigen Suppe, wo die Energie umgewandelt und für die spätere Nutzung gespeichert wird."
 building_bioelectric_stimulator_2: "Chloroplastischer Beschleuniger"
 building_bioelectric_stimulator_2_desc: "Glasartige Blasen, die mit fotosynthetisierenden Algen gefüllt sind. Sie nutzen Sonnenenergie, um biochemische Verbindungen zu verdichten, was die Selbstentladung verringert."
 building_bioelectric_stimulator_3: "Chloroplastische Linsenanordnung"
 building_bioelectric_stimulator_3_desc: "Die mit Solarkollektoren bestückten gegenläufigen Zweige können je nach Bedarf und Kapazität aufgerichtet oder gesenkt werden, um zuverlässig Energie zu liefern."
 building_bioelectric_stimulator_4: "Chloroplastische Blase"
 building_bioelectric_stimulator_4_desc: "Diese glasigen, mit Algen gefüllten Säcke sind in der Lage, sich zu vervielfältigen, und können sich dorthin bewegen, wo ihre Energie am meisten gebraucht wird, was den Energieverlust selbst über weite Entfernungen nahezu auf null reduziert."
 building_churning_tunnels_1: "Gesteinsbohrung"
 building_churning_tunnels_1_desc: "Pflanzenmaterial von nahezu kristalliner Härte wird in bestehende Abbaustätten gepresst, um noch größere Mengen an Material zu gewinnen."
 building_churning_tunnels_2: "Gesteinsfilter"
 building_churning_tunnels_2_desc: "Kolonien semipermeabler Biofilme sammeln wertvolle Mineralien, die andernfalls durch die Aussonderungen des Flüssigbergbaus verloren gingen."
 building_churning_tunnels_3: "Gesteinszerhacker"
 building_churning_tunnels_3_desc: "Harte Mahlplatten und Zangen zerkleinern Erdmaterial zu einer chemischen Suspension, die die Mineralgewinnung erleichtert."
 building_churning_tunnels_4: "Gesteinsbäder"
 building_churning_tunnels_4_desc: "Das Zusammenspiel von Zerhackern, biochemischen Suspensionen und Biofilmen erlaubt es, Mineralien dort zu gewinnen, wo immer sich reichhaltiges Flöz befindet."
 building_natural_furnace_0: "Schmelzbecken"
 building_natural_furnace_0_desc: "Thermophile Symbionten arbeiten unermüdlich daran, in dieser natürlichen Wärmequelle hochwertige Legierungen herzustellen."
 building_natural_furnace_1: "Schmelzofen"
 building_natural_furnace_1_desc: "Hitzeresistente Wucherungen erlauben eine effizientere Nutzung der Wärme und verbessern damit die Herstellung hochwertiger Legierungen."
 building_natural_furnace_2: "Feststofflichtschmelze"
 building_natural_furnace_2_desc: "Hochkomplexe litho-organische Öfen, die durch eine Art Hologrammtechnologie verstärkt werden, ermöglichen die Herstellung vielseitiger Legierungen."
 building_natural_furnace_3: "Nanoschmelze"
 building_natural_furnace_3_desc: "Thermophile Nanoorganismen bewohnen diese heißen Becken und Öfen und befreien Legierungen von unerwünschten Verunreinigungen."
 building_avatar_chamber_1: "Avatarwiege"
 building_avatar_chamber_1_desc: "Dieses knospenartige Organ erlaubt es der Wildnis, Grundformen zu schaffen. Es hat die Aufgabe, ihre Instinkte auf Leben und Terrain jenseits der heimischen Biosphäre vorzubereiten."
 building_avatar_chamber_2: "Avatarkammer"
 building_avatar_chamber_2_desc: "Hier wachsen simulierte Körper heran und absolvieren interne Testreihen, wobei man fremde Organismen und Ökosysteme nachahmt. Wissen kann nur durch die Akzeptanz des Unbekannten erlangt und verbreitet werden."
 building_avatar_chamber_2_effect: "Die $building_avatar_chamber_1$ produziert zusätzlich §G200§! £amenities£ Dienstleistungen"
 building_avatar_chamber_3: "Avatarwald"
 building_avatar_chamber_3_desc: "Dieses großflächige Organ erschafft Projektionen von Avatar-Vorlagen, die nach fremden Formen und Landschaften gestaltet sind. Die Wildnis lernt, indem sie lebt, was sie noch nie zuvor berührt hat."
 building_avatar_chamber_3_effect: "Die $building_avatar_chamber_1$ produziert zusätzlich §G400§! £amenities£ Dienstleistungen"
 building_avatar_chamber_4: "Avatarkortex"
 building_avatar_chamber_4_desc: "Eine Verkörperungsmaschine in planetarem Maßstab. Sie ist in der Lage, ganze Zivilisationen, Xeno-Ökologien und Umweltextreme zu simulieren. Hier probt die Wildnis ihre Begegnung mit der Galaxie."
 building_avatar_chamber_4_effect: "Die $building_avatar_chamber_1$ produziert zusätzlich §G800§! £amenities£ Dienstleistungen"
 building_mote_aggravator: "Chemischer Faulbehälter"
 building_mote_aggravator_desc: "Ein komplexes System von Gefäßen, Gewebe und chemischen Stoffwechslern produziert $volatile_motes$ aus biologischem planetaren Material."
 building_churning_stomach: "Exotische Gasfilter"
 building_churning_stomach_desc: "Hoch spezialisierte Mikroben und Nanoorganismen reagieren mit gewöhnlichen Aerosolen, um raffinierte $exotic_gases$ zu produzieren."
 building_crystal_growth: "Kristallbänke"
 building_crystal_growth_desc: "Eine besondere Überdachung reguliert sorgfältig Luftfeuchtigkeit und Temperatur, um das Wachstum künstlicher $rare_crystals$ zu fördern."
 building_planetary_carapace: "Knochengarnison"
 building_planetary_carapace_desc: "In diesem Kokon lassen sich eine Vielzahl territorialer Symbionten unterbringen. Sollten sie jemals gebraucht werden, sind sie bereit."
 mod_planet_building_planetary_carapace_build_speed_mult: "Baugeschwindigkeit ($building_planetary_carapace$)"
 building_planetary_carapace_2: "Knochenfestung"
 building_planetary_carapace_2_desc: "Diese weitläufige Anlage verfügt über robuste Übungsplätze und Unterkünfte und stellt sicher, dass die dort untergebrachten Verteidiger für jeden planetaren Überfall gewappnet sind."
 building_ozone_thickener: "Planetarer Schildüberwuchs"
 building_ozone_thickener_desc: "$tech_planetary_shield_generator_desc$"
 building_subterranean_cache: "Untergrundspeicher"
 building_subterranean_cache_desc: "$building_resource_silo_desc$"
 building_cradle_of_rebirth: "Wiege der Wiedergeburt"
 building_cradle_of_rebirth_desc: "Diese Struktur ist tief verwurzelt und wandelt verrottete Materie und Beute in Biomasse um, um den Körper der Welt mit jedem stillen Pulsschlag zu nähren."
 building_wilderness_storm_relief: "$building_storm_resistant_production$"
 building_wilderness_storm_relief_desc: "Ein breites Dach aus gehärteten, bioelektrisch geladenen Blättern, das schnell auf kosmische Stürme reagieren kann, um die darunter liegenden Symbionten zu schützen und deren Produktivität zu sichern."
 building_wilderness_storm_relief_tt: "Die negativen Auswirkungen §Ykosmischer Stürme§! auf die planetare Produktion sind um §G25%§! reduziert"
 holding_wilderness_glade: "Wildnislichtung"
 holding_wilderness_glade_plural: "Wildnislichtungen"
 holding_wilderness_glade_desc: "Eine produktive Region der symbiotischen Wildnis, die nur schwach mit dem übergeordneten Kollektiv verbunden ist. Obwohl die Symbionten, die in diesem Taschenbiom leben, in hohem Maß von den lokalen Nahrungsquellen abhängig sind, können sie auch andere Ressourcen in der Nähe erschließen."
 holding_wilderness_glade_effect_desc: "Untertanen wandeln [owner.WildernessGladeProvides] in $r_basic_plural$ für ihren Herrn um.\nIhr Herr reduziert den $mod_planet_jobs_productive_upkeep_mult$ auf der Untertanenwelt.\nEine £blocker£ §Y$holding_wilderness_glade$§! taucht auf dem Planeten auf und nimmt einen Distriktplatz ein."
 no_free_district_for_wilderness_glade: "$TRIGGER_FAIL$§REs gibt keine freien Distrikte auf diesem Planeten für unser Taschenbiom.§!"
 blocker_tied_to_wilderness_glade: "$TRIGGER_FAIL$§RDieser Blocker bleibt bestehen, solange das Besitztum \"§Y$holding_wilderness_glade$§!\" auf dieser Welt existiert.§!"
 d_wilderness_glade_blocker: "$d_wilderness_root_blocker$"
 d_wilderness_glade_blocker_desc: "Für den Unterhalt einer $holding_wilderness_glade$ werden beachtliche Wurzelstrukturen benötigt, die es diesem Taschenbiom erlauben, in der fremden Umgebung zu überdauern."
 holding_wilderness_glade_modifier: "Verteilte Wildnislichtungen"
 holding_wilderness_glade_modifier_desc: "Untertanenwelten leben in Harmonie mit uns selbst, und jeder trägt zum Wohl aller bei." # appears in 'lore brown'
 holding_wilderness_glade_modifier_tt: "Die Menge variiert je nach Anzahl an Untertanenwelten, die von den §Y$holding_wilderness_glade_plural$§! unterhalten werden können."
