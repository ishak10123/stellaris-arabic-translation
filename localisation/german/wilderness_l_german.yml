 ####################################
 # Zones
 ####################################
 zone_urban_wilderness: "Herzhain"
 zone_urban_wilderness_desc: "Ein pulsierender Kern aus Biomasse und Instinkten. Eine ständige Erweiterung und Umgestaltung erlaubt es der Wildnis, hier breite und tiefe Wurzeln zu schlagen, die bereit sind, jede benötigte Funktion zu übernehmen."
 zone_foundry_wilderness: "Schmelzgut"
 zone_foundry_wilderness_desc: "In dieser Hitzekammer brodeln geschmolzene Steine und eine Urgewalt. $job_forgesymbiont_plural$ formen hier Metall, um das wachsende Skelett der Welt zu nähren."
 zone_research_wilderness: "Denkstamm"
 zone_research_wilderness_desc: "Ein aufragender Knoten aus Nervenwurzeln und mutagenen Blüten. $job_evosymbiont_plural$ kommen aus ihm mit neuen Gliedmaßen, Sinnen und Erkenntnissen hervor."
 zone_unity_wilderness: "Singende Klippen"
 zone_unity_wilderness_desc: "Hoch aufragende Formationen, die von hohlen Knochen und steinernem Fleisch durchzogen sind und wo der Wind vielschichtige Melodien über die Oberfläche der Welt trägt. $job_choirsymbiont_plural$ versammeln sich hier, um die Welt singen zu lassen."
 zone_fortress_wilderness: "Kommandoknolle"
 zone_fortress_wilderness_desc: "Ein Sensorknoten, in dem $job_tamersymbiont_plural$ Duftimpulse freisetzen, die vorauseilende Horden lenken. Die Wildnis ordnet nicht, sie sondert ab."
 zone_minerals_wilderness: "Erzgrat"
 zone_minerals_wilderness_desc: "Ein hoch aufragendes, zerklüftetes Gebilde aus lebendigem Stein, teils Gebirge, teils Organ. Im höhlenartigen Inneren sammeln sich Mineralien, die mit dem langsamen Atem der Wildnis pulsieren."
 zone_energy_wilderness: "Solar-Mykolungen"
 zone_energy_wilderness_desc: "Ausgedehnte Felder voller Fotosynthesegewebe fangen Sonnenlicht auf und bauen Druck auf, bis sie in rhythmischen Stößen ausatmen. $job_photosymbiont_plural$ lassen sich durch diese Impulse in den Himmel tragen und reiten auf den thermalen Strömungen, um den Lauf der Sterne zu verfolgen."
 zone_food_wilderness: "Blütenstrahler"
 zone_food_wilderness_desc: "Ein Gehirn aus duftenden Blütenblättern und Pheromonen, das Bestäubungswege wie Fäden in einem Wandteppich webt. Von hier aus wird die Fruchtbarkeit des Planeten mit der Effizienz einer mechanischen Fabrik organisiert."
 zone_research_unity_wilderness: "Harmoniekern"
 zone_research_unity_wilderness_desc: "Ein rhythmisches Organ im Herzen der Wildnis. Hier vibriert Wissen durch Erinnerung und Erkenntnis. Gedanken beginnen nicht, sie hallen wider."
 zone_trade_wilderness: "Fadenweg"
 zone_trade_wilderness_desc: "Faserige Schlingen, sich windende Gliedmaßen und Speichersäcke bilden ein unermüdliche Leitzentrum, in dem $job_spindlesymbiont_plural$ die Essenz des Lebens selbst weben und verteilen. Die Wildnis gebärt sich selbst."
 ####################################
 # Decisions
 ####################################
 decision_wilderness_expand: "Planetengröße erhöhen"
 decision_wilderness_expand_desc: "Indem wir die gereinigte Biomasse wiederaufnehmen, die wir gesammelt haben, können wir unsere Welt wachsen lassen."
 decision_wilderness_mastery_over_nature_desc: "Unser kollektives Selbst benötigt Raum zum Wachsen, weshalb wir diesen Raum schaffen werden. Wir werden uns an alle Umgebungen auf dem Planeten anpassen."
