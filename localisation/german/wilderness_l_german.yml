 tamersymbiont: "$job_tamersymbiont$"
 job_tamersymbiont: "Zähmersymbiont"
 job_tamersymbiont_plural: "Zähmersymbiontem"
 job_tamersymbiont_desc: "Diese Symbionten sondern komplexe Pheromonsignale aus, um die beinahe vernunftbegabte Horde zu leiten. Sie nutzen ihre wilden Instinkte, um eine koordinierte planetare Verteidigung zu schaffen."
