 immunosymbiont: "$job_immunosymbiont$"
 job_immunosymbiont: "Immunsymbiont"
 job_immunosymbiont_plural: "Immunsymbionten"
 job_immunosymbiont_desc: "Diese Symbionten erkennen Abweichungen und unterbinden sie, indem sie durch die Wurzeln der Wildnis patrouillieren: makroskopische Antikörper für einen makroskopischen Organismus."
 job_immunosymbiont_effect_desc: "[patrol_drone.GetIcon] $job_immunosymbiont_plural$ reduzieren die £crime£ §Y$PLANET_CRIME_NO_HAPPINESS_TITLE$§!, erschaffen £defense_army£ §YVerteidigungsarmeen§! und produzieren £unity£ §Y$unity$§!"
 broodsymbiont: "$job_broodsymbiont$"
 job_broodsymbiont: "Brutsymbiont"
 job_broodsymbiont_plural: "Brutsymbionten"
 job_broodsymbiont_plural_with_icon: "[spawning_drone.GetIcon] $job_broodsymbiont_plural$"
 job_broodsymbiont_desc: "Diese Symbionten sättigen die Wildnis mit Biomasse. Sie sind rohe lebende Materie, die bereit ist, sich in alles zu verwandeln, was der Planet benötigt."
 job_broodsymbiont_effect_desc: "[spawning_drone.GetIcon] $job_broodsymbiont_plural$ wandeln $r_food$ (oder $r_minerals$) in £mod_planet_amenities_no_happiness_add£ §Y$PLANET_AMENITIES_TITLE$§! und £biomass£ §YBiomasse§! um"
