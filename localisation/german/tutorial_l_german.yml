 advisor.1.name: "Online-Berater"
 advisor.1.desc_01: "Guten Tag, Herr Präsident.\n\nIch bin VIR, ein KI-Prototyp. Ich soll Ihnen Rat und Unterstützung anbieten, während wir unsere Bestimmung in den Sternen suchen.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_02: "Guten Tag, Frau Präsidentin.\n\nIch bin VIR, ein KI-Prototyp. Ich soll Ihnen Rat und Unterstützung anbieten, während wir unsere Bestimmung in den Sternen suchen.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_03: "Guten Tag, Geschäftsführer.\n\nIch bin VIR, ein KI-Prototyp. Die Unternehmenszentrale hat mich vor kurzer Zeit aktiviert, damit ich Ihnen bei unseren fortwährenden Bemühungen zur Erschließung neuer interstellarer Märkte zur Seite stehen kann.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_04: "Euer Kaiserliche Majestät.\n\nIch bin VIR, ein KI-Prototyp und Euer demütiger Diener. Ich soll Euch mit Rat zur Seite stehen, während Ihr unser Reich in das große Unbekannte führt.\n\n$advisor.1.desc_filler$"
 #advisor.1.desc_05: "Good day, Lord Protector.\n\nI am VIR, a prototype synthetic intelligence and your humble servant. My role is to provide you with advice and counsel as you lead our empire into the great unknown.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_06: "Guten Tag, Geschäftsführer.\n\nIch bin VIR, ein KI-Prototyp mit einer synthetischen Intelligenz. Das Unternehmenshauptquartier hat mich kürzlich aktiviert, um Euch beim Erschließen neuer £market£ §SMärkte§! Unterstützung und Rat zu bieten.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_07: "Friede sei mit Euch, Euer Majestät.\n\nIch bin VIR, ein KI-Prototyp. Meine Aufgabe wird darin bestehen, beim erstmaligen Verlassen des Sicherheitsbereichs unserer Heimatwelt in der Geschichte unserer Zivilisation Unterstützung und Rat anzubieten.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_08: "Guten Tag, Kanzler.\n\nIch bin VIR, ein von den schlauesten Köpfen unserer Zivilisation entwickelter KI-Prototyp, und ich soll Ihnen als Berater dienen. Ich werde mich bemühen, meine Pflichten mit größtmöglicher Effizienz zu erfüllen.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_09: "Guten Tag, Direktor.\n\nIch bin VIR, ein von den schlauesten Köpfen unserer Zivilisation entwickelter KI-Prototyp, und ich soll Ihnen als Berater dienen. Ich werde mich bemühen, meine Pflichten mit größtmöglicher Effizienz zu erfüllen.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_10: "Guten Tag, Meister.\n\nIch bin VIR, ein von den schlauesten Köpfen unserer Zivilisation entwickelter KI-Prototyp, und ich soll Ihnen als Berater dienen. Ich werde mich bemühen, meine Pflichten mit größtmöglicher Effizienz zu erfüllen.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_11: "Willkommen, Konsul.\n\nIch bin VIR, ein unter höchster Geheimhaltung vom Militär entwickelter KI-Prototyp. Das Oberkommando hat mich aktiviert, um unserer Führung als Berater und strategischer Analyst zu dienen.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_12: "Willkommen, Archon.\n\nIch bin VIR, ein unter höchster Geheimhaltung vom Militär entwickelter KI-Prototyp. Das Oberkommando hat mich aktiviert, um unserer Führung als Berater und strategischer Analyst zu dienen.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_13: "Willkommen, Großmarschall.\n\nIch bin VIR, ein unter höchster Geheimhaltung vom Militär entwickelter KI-Prototyp. Das Oberkommando hat mich aktiviert, um unserer Führung als Berater und strategischer Analyst zu dienen.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_14: "Friede sei mit Euch, Euer Heiligkeit.\n\nIch bin VIR, ein KI-Prototyp. Die Priesterschaft hat mich als Euren treuen Diener und Berater bestimmt, auf dass ich Euch auf unserem göttlichen Weg zu den Sternen unterstütze.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_15: "Guten Tag, Primus.\n\nIch bin VIR, ein von den schlauesten Köpfen unserer Zivilisation entwickelter KI-Prototyp, und ich soll Ihnen als Berater dienen. Ich werde mich bemühen, meine Pflichten mit größtmöglicher Effizienz zu erfüllen.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_16: "Guten Tag, Primarchin.\n\nIch bin VIR, ein von den schlauesten Köpfen unserer Zivilisation entwickelter KI-Prototyp, und ich soll Ihnen als Berater dienen. Ich werde mich bemühen, meine Pflichten mit größtmöglicher Effizienz zu erfüllen.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_17: "Guten Tag, Aufseher.\n\nIch bin VIR, ein von den schlauesten Köpfen unserer Zivilisation entwickelter KI-Prototyp, und ich soll Ihnen als Berater dienen. Ich werde mich bemühen, meine Pflichten mit größtmöglicher Effizienz zu erfüllen.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_18: "Guten Tag, Vorredner.\n\nIch bin VIR, ein von den schlauesten Köpfen unserer Zivilisation entwickelter KI-Prototyp, und ich soll Ihnen als Berater dienen. Ich werde mich bemühen, meine Pflichten mit größtmöglicher Effizienz zu erfüllen.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_19: "Guten Tag, Vorsitzender.\n\nIch bin VIR, ein von den schlauesten Köpfen unserer Zivilisation entwickelter KI-Prototyp, und ich soll Ihnen als Berater dienen. Ich werde mich bemühen, meine Pflichten mit größtmöglicher Effizienz zu erfüllen.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_20: "Guten Tag, Vorsitzende.\n\nIch bin VIR, ein von den schlauesten Köpfen unserer Zivilisation entwickelter KI-Prototyp, und ich soll Ihnen als Berater dienen. Ich werde mich bemühen, meine Pflichten mit größtmöglicher Effizienz zu erfüllen.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_21: "Willkommen, Konsul.\n\nIch bin VIR, ein unter höchster Geheimhaltung vom Militär entwickelter KI-Prototyp. Das Oberkommando hat mich aktiviert, um unserer Führung als Berater und strategischer Analyst zu dienen.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_22: "Willkommen, Archont.\n\nIch bin VIR, ein unter höchster Geheimhaltung vom Militär entwickelter KI-Prototyp. Das Oberkommando hat mich aktiviert, um unserer Führung als Berater und strategischer Analyst zu dienen.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_23: "Willkommen, Generalkommissar.\n\nIch bin VIR, ein unter höchster Geheimhaltung vom Militär entwickelter KI-Prototyp. Das Oberkommando hat mich aktiviert, um unserer Führung als Berater und strategischer Analyst zu dienen.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_24: "Willkommen, Imperator.\n\nIch bin VIR, ein unter höchster Geheimhaltung vom Militär entwickelter KI-Prototyp. Das Oberkommando hat mich aktiviert, um unserer Führung als Berater und strategischer Analyst zu dienen.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_25: "Willkommen, Imperatrix.\n\nIch bin VIR, ein unter höchster Geheimhaltung vom Militär entwickelter KI-Prototyp. Das Oberkommando hat mich aktiviert, um unserer Führung als Berater und strategischer Analyst zu dienen.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_26: "Willkommen, Großmarschall.\n\nIch bin VIR, ein unter höchster Geheimhaltung vom Militär entwickelter KI-Prototyp. Das Oberkommando hat mich aktiviert, um unserer Führung als Berater und strategischer Analyst zu dienen.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_27: "Willkommen, Strategos.\n\nIch bin VIR, ein unter höchster Geheimhaltung vom Militär entwickelter KI-Prototyp. Das Oberkommando hat mich aktiviert, um unserer Führung als Berater und strategischer Analyst zu dienen.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_28: "Willkommen, Kriegsherr.\n\nIch bin VIR, ein unter höchster Geheimhaltung vom Militär entwickelter KI-Prototyp. Das Oberkommando hat mich aktiviert, um unserer Führung als Berater und strategischer Analyst zu dienen.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_29: "Willkommen, Clansprecher.\n\nIch bin VIR, ein unter höchster Geheimhaltung vom Militär entwickelter KI-Prototyp. Das Oberkommando hat mich aktiviert, um unserer Führung als Berater und strategischer Analyst zu dienen.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_30: "Friede sei mit Euch, Euer Heiligkeit.\n\nIch bin VIR, ein KI-Prototyp. Die Priesterschaft hat mich als Euren treuen Diener und Berater bestimmt, auf dass ich Euch auf unserem göttlichen Weg zu den Sternen unterstütze.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_31: "Willkommen, [root.GetBloodCourtRulerTitle].\n\nIch bin VIR, ein unter höchster Geheimhaltung vom Militär entwickelter KI-Prototyp. Der Rat hat mich ernannt, um der Führung als Berater und strategischer Analyst zu dienen.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_32: "Grüße, [root.GetPurityOrderRulerTitle].\n\n$advisor.1.desc_keenminds$\n\n$advisor.1.desc_filler$"
 advisor.1.desc_33: "Grüße, [root.GetPurificationCommitteeRulerTitle].\n\n$advisor.1.desc_keenminds$\n\n$advisor.1.desc_filler$"
 advisor.1.desc_34: "Grüße, $RT_OLIGARCH$.\n\n$advisor.1.desc_honortoserve$\n\n$advisor.1.desc_filler$"
 advisor.1.desc_35: "Grüße, $RT_DEFENSIVE_UNION$.\n\n$advisor.1.desc_honortoserve$\n\n$advisor.1.desc_filler$"
 advisor.1.desc_36: "Grüße, $RT_DIMENSIONAL_COVENANT$.\n\n$advisor.1.desc_honortoserve$\n\n$advisor.1.desc_filler$"
 advisor.1.desc_keenminds: "Ich bin VIR, ein KI-Prototyp, der von den klügsten Köpfen unserer Zivilisation entwickelt wurde, um Euch als Berater und strategischer Analyst zur Seite zu stehen. Ich werde mich bemühen, meine Aufgaben mit der größtmöglichen Effizienz zu erfüllen."
 advisor.1.desc_honortoserve: "Ich bin VIR, ein unter höchster Geheimhaltung vom Militär entwickelter KI-Prototyp. Ich fühle mich geehrt, Euch als Berater und strategischer Analyst dienen zu dürfen."
 advisor.1.desc_filler: "Über das Menü §HEinstellungen§! könnt Ihr den Tutorial-Level jederzeit ändern."
 advisor.1.a: "Ich will alles wissen. §G(VOLLES TUTORIAL)§!"
 advisor.1.b: "Etwas Hilfe bitte. §Y(NUR TIPPS)§!"
 advisor.1.c: "Schaltet dieses Ding ab. §R(KEIN TUTORIAL)§!"
 full_tutorial: "Tutorialmissionen und Erläuterungen zu Interface-Elementen helfen Euch, während Ihr die Spielmechaniken erkundet.\n\nEmpfohlen für Spieler, die das Spiel zum ersten Mal spielen."
 tips_only: "Ihr erhaltet während des Spiels gelegentlich Tipps und Vorschläge.\n\nEmpfohlen für Einsteiger und Spieler mit vergleichsweise wenig Erfahrung."
 no_tutorial: "Keine Ratschläge oder Tutorials.\n\nEmpfohlen für Experten."
 recycle_vir: "VIRs Direktzugriff-Speicherbänke §Rzerlegen§!:\n£minerals£ §G+2§!\n\n\n"
 advisor.2.name: "Tutorial: Situationsprotokoll"
 advisor.2.desc: "Ein Sternenreich aufzubauen, ist eine gewaltige Aufgabe.\n\nAls kleine Starthilfe werde ich §SLehrmissionen§! über einige Grundlagen zur Verfügung stellen, um uns als erfolgreiche interstellare Macht zu etablieren.\n\nUm die §SMissionen§! zu sehen:\n\n£dot_green£ Klickt auf die Schaltfläche \"§SSituationsprotokoll§!\" in der Leiste auf der linken Seite des Bildschirms oder drückt §SF1§!\n\n$tttt$$tt$£situation_log£\n"
 advisor.2.a: "Verstanden."
 advisor.3.name: "Tipps initialisiert"
 advisor.3.desc: "Nun gut. Ich werde Euch Tipps geben und Euch die grundlegenden Funktionen der verschiedenen Werkzeuge erklären, während Ihr diese erkundet."
 advisor.10.name: "Tutorial: Anomalien"
 advisor.10.desc: "Wir haben eine §SAnomalie§! gefunden!\n\nVon Zeit zu Zeit machen unsere £science_ship£ §SForschungsschiffe§! bei ihrer Erkundung fremder Welten eine solche Entdeckung.\n\n§SAnomalien§! können von £scientist£ §SWissenschaftlern§! erforscht werden, sofern deren Fähigkeitsstufe für diese Aufgabe ausreichend ist.\n\nUnerforschte §SAnomalien§! werden im Reiter §SAnomalien§! aufgeführt, der sich im §SSituationsprotokoll§! befindet. Manche muss man erst erforschen, bevor der £planet£ §SPlanet§!, auf dem man sie fand, kolonisiert oder anderweitig genutzt werden kann."
 advisor.15.name: "Tutorial: Kolonisierung"
 advisor.15.desc: "Eines unserer £science_ship£ §SForschungsschiffe§! hat gerade eine Welt erkundet, die einen hervorragenden Standort für unsere erste £colony£ §SKolonie§! abgäbe. Da sie zur selben §SPlanetenklasse§! wie unsere Heimatwelt gehört, sollten sich unsere Kolonisten dort ziemlich wohl fühlen.\n\nBevor wir diese Welt kolonisieren können, müssen wir allerdings erst unsere Grenze erweitern.\n\nWählt ein £construction_ship£ §SKonstruktionsschiff§! aus\n\n£dot_green£ Macht einen Rechtsklick auf ein erkundetes £system£ §SSystem§!, das eine potenzielle Kolonie enthält\n£dot_green£ Wählt \"§SSternenbasis [GetBuildGrowCap]§!\" aus\n\n$tttt$$ttt$£colonizable£\n\nSobald das §SSystem§! beansprucht wurde, können wir den Kolonisierungsprozess beginnen."
 advisor.17.name: "Tutorial: Erste Kolonie"
 advisor.17.desc: "Glückwunsch zur Kolonisation einer neuen Welt! Unsere Kolonisten sind nun dabei, ihrer erste Siedlung zu bauen - bis sie autark sind, wird es allerdings noch eine Weile dauern.\n\nDie £colony£ §SKolonie§! wird unsere Ressourcen bis zur Fertigstellung der ersten Siedlung belasten. Achtet deshalb darauf, nicht zu viele £planet£ §SPlaneten§! auf einmal zu kolonisieren."
 advisor.20.name: "Tutorial: Negative Einnahmen"
 advisor.20.desc: "Wir büßen £energy£ Energie-Credits mit besorgniserregender Geschwindigkeit ein. Der Budgetbericht des letzten Monats ist die reinste Schauerliteratur.\n\nEin häufiger Grund für Budgetdefizite sind stetig ansteigende Unterhaltskosten. Sollte dies der Fall sein, wäre es vielleicht angebracht, einige unserer Schiffe, Armeen oder Stationen aufzulösen."
 #advisor.27.name: "First Contact"
 #advisor.27.desc_01: "We have made first contact with an alien empire! These hideous creatures appear to have mastered space flight, just as we have. They could pose a significant threat.\n\nTheir empire will now be listed in the §SEmpires§! tab of the §SGalaxy§! screen. From there we may initiate diplomatic contact with them."
 #advisor.27.desc_02: "We have made first contact with an alien empire! These fascinating beings appear to have mastered space flight, just as we have. We should strive to learn more about them.\n\nTheir empire will now be listed in the §SContacts§! screen. From there we may initiate diplomatic contact with them."
 #advisor.27.desc_03: "We have made first contact with an alien empire! They appear to have mastered space flight, just as we have. I recommend a healthy degree of caution until we learn their intentions.\n\nTheir empire will now be listed in the §SEmpires§! tab of the §SGalaxy§! screen. From there we may initiate diplomatic contact with them."
 #advisor.28.name: "Fallen Empire"
 #advisor.28.desc: "We have encountered an ancient and highly advanced civilization! Fortunately for us, they appear to be in decline and it is doubtful whether they even fully understand their own technology anymore.\n\nThey will likely keep to themselves unless antagonized, and we should steer clear of their space - at least until we have reached technological parity."
 #############################
 #Tutorial Events
 #############################
 tutorial.1.name: "Tutorial: Galaxiekarte"
 tutorial.1.desc: "Die §HGalaxiekarte§! bietet einen strategischen Überblick über die Sterne. Nutzt sie, um zu navigieren, zu expandieren, Flotten zu kommandieren und die Reichsgrenzen zu überprüfen.\n\nZum Öffnen der §SGalaxiekarte§!:\n\n£dot_green£ Klickt auf das §HGalaxie§!-Symbol am unteren Bildschirmrand oder drückt §HM§!\n\n\n$tttt$$tt$£galaxy_view£\n\n"
 tutorial.2.name: "Tutorial: System erkundet"
 tutorial.2.desc: "Gut gemacht!\n\nDie Erkundung eines £system£ §SSternensystems§! wurde abgeschlossen.\n\nWir haben nun Zugriff auf planetare Daten, von denen die letzte Generation an Astronomen auf unserer Heimatwelt nur hätte träumen können.\n\nUm weitere Systeme zu erkunden:\n\n£dot_green£ Wählt ein £science_ship£ §SForschungsschiff§! aus\n£dot_green£ Macht einen Rechtsklick auf ein benachbartes §SSystem§!\n£dot_green£ Wählt \"§SSystem erkunden§!\" aus\n\nEin §SSystem§! muss erst erkundet werden, bevor man es beanspruchen kann."
 tutorial.3.name: "Tutorial: Technologien"
 tutorial.3.desc: "Die Erforschung neuer Technologien wird einer der Schlüssel für unseren Erfolg sein. Das sage ich nicht als Produkt eines nahezu uneingeschränkten technologischen Fortschritts, sondern als treuer Berater und vermutlich einziger wahrer Freund.\n\nEine der wichtigen Technologien, die Ihr so früh wie möglich erforschen solltet, ist das §SNeue-Welten-Protokoll§!. Dieses gibt uns Zugriff auf £colony_ship£ §SKolonieschiffe§!, mit denen wir auf anderen £planet£ §SPlaneten§! Fuß fassen können."
 tutorial.4.name: "Tutorial: Erkundung"
 tutorial.4.desc: "Ehe wir expandieren können, müssen wir erst die Galaxie erkunden. Unsere £science_ship£ §SForschungsschiffe§! erfüllen derlei Aufgaben.\n\nIhr könnt §SForschungsschiffe§! an folgendem Symbol erkennen:\n\n$tttt$$tt$£science_ship_map£\n\n\nEs gibt zwei Wege, um ein Schiff auszuwählen: von der §SGalaxiekarte§! aus oder in der §SSchnellauswahl§!.\n\n£dot_green£ Wählt ein §SForschungsschiff§! aus\n£dot_green£ Macht einen Rechtsklick auf ein nahes §SSystem§!\n£dot_green£ Wählt \"§SSystem erkunden§!\" aus\n\nEin §SSystem§! muss erst erkundet werden, bevor man es beanspruchen kann."
 tutorial.5.name: "Aufheben der Pause"
 tutorial.5.desc: "Wir haben dem £science_ship£ §SForschungsschiff§! einen Befehl gegeben, und es ist an der Zeit, loszulegen! Bevor jedoch irgendetwas passieren kann, muss die derzeit aktive Pause der Simulation aufgehoben werden.\n\nUm die §SPause aufzuheben§!:\n\n£dot_green£ Drückt die §SLeertaste§! oder klickt auf das folgende Symbol in der Leiste, die sich am oberen Bildschirmrand befindet:\n\n$tttt$$t$£pause_button£\n"
 tutorial.6.name: "Tutorial: Technologie erforscht"
 tutorial.6.desc: "Hervorragende Arbeit! Die beiden erforschten Technologien werden uns bestimmt sehr weiterhelfen. Vergesst nicht, unseren £scientist£ §SWissenschaftlern§! neue Forschungsaufträge zu erteilen."
 tutorial.7.name: "Tutorial: Konstruktionsschiff"
 tutorial.7.desc: "Die von unserer Heimatwelt erzeugten Ressourcen haben ihre Grenzen. Unsere Industrie muss jenseits unserer Heimatwelt expandieren, wofür ein £construction_ship£ §SKonstruktionsschiff§! benötigt wird.\n\nWir sollten eines [GetBuildGrowCap], sobald wir genügend £alloys£ §SLegierungen§! dafür zusammenhaben."
 tutorial.8.name: "Tutorial: Konstruktionsschiff gebaut"
 tutorial.8.desc: "Gute Arbeit! Unser £construction_ship£ §SKonstruktionsschiff§! ist jetzt einsatzbereit. Zu seiner Besatzung gehören einige der besten Ingenieure unseres Reichs."
 tutorial.9.name: "Tutorial: Bergbaustation"
 tutorial.9.desc: "Die von unserer Heimatwelt erzeugten Ressourcen haben ihre Grenzen. Glücklicherweise hat unser £science_ship£ §SForschungsschiff§! auf einer anderen Welt gerade eine Ressourcenstätte gefunden!\n\nEs ist an der Zeit, unser £construction_ship£ §SKonstruktionsschiff§! anzuweisen, eine £mining_station£ §SBergbaustation§! [GetBuildGrow].\n\n§SBergbaustationen§! kann man innerhalb unserer Grenzen bauen. Sie sammeln automatisch £minerals£ §SMineralien§!, £energy£ §SEnergie-Credits§! und £strategic_resource£ §SStrategische Ressourcen§!.\n\nMit ausgewähltem §SKonstruktionsschiff§!:\n\n£dot_green£ Rechtsklick auf ein beanspruchtes £system£ §SSystem§!\n£dot_green£ Wählt \"§SBergbaustation [GetBuildGrowCap]§!\" aus\n\n§SBergbaustationen§! kosten §SEnergie-Credits§! im Unterhalt."
 tutorial.10.name: "Tutorial: Einnahmen aus Bergbaustationen"
 tutorial.10.desc: "Sehr gut! Die neue £mining_station£ §SBergbaustation§! ist in Betrieb und hat bereits damit begonnen, Ressourcen zur Weiterverarbeitung zu sammeln.\n\nDie Einnahmen aller Stationen werden addiert und ergeben die Gesamteinnahmen des Reichs. Diese kann man in der Menüleiste am oberen Bildschirmrand einsehen. Bewegt den Zeiger über verschiedene Ressourcen, um eine Aufschlüsselung aller Quellen anzuzeigen."
 tutorial.11.name: "Tutorial: Forschungsstation"
 tutorial.11.desc: "Manche erkundeten Welten verfügen über einzigartige Eigenschaften, die sie zu wertvollen Forschungsobjekten machen. Diese £physics£ §SPhysik§!, £society£ §SSozial§! oder £engineering£ §SIngenieur§!-Ressourcen können von einer £science_ship£ §SForschungsstation§! gesammelt werden. Meine Programmierung zwingt mich fast, den Bau einer Forschungsstation dringend nahezulegen.\n\nDenkt daran, dass man §SForschungsstationen§! nur innerhalb unserer Grenzen errichten kann und dass sie £energy£ §SEnergie-Credits§! im Unterhalt kosten."
 tutorial.12.name: "Tutorial: Forschungsstation gebaut"
 tutorial.12.desc: "Unsere neue £science_ship£ §SForschungsstation§! ist online, und ihre Wissenschaftsbesatzung hat mit der Arbeit begonnen. Welche Geheimnisse wird sie wohl entdecken? Welche verbotenen Mysterien der Schöpfung wird sie ergründen?"
 tutorial.13.name: "Tutorial: Planeten"
 tutorial.13.desc: "Bewohnbare £planet£ §SPlaneten§! sind in £district£ §SDistrikte§!, §SZonen§! und £building£ §SGebäude§! unterteilt.\n\n£dot_green£ §SDistrikte§! können aus mehreren §SZonen§! bestehen \n£dot_green£§SZonen§! legen fest, welche §SJobs§! zur Verfügung stehen\n£dot_green£ §SGebäude§! geben §SZonen§! bestimmte Boni\n\nWeitere §SGebäudeplätze§! kann man durch die Verbesserung der Zonen freigeschalten.\n\nEs gibt zwei Wege, um einen Planeten anzusehen:\nvon der §SGalaxiekarte§! aus oder in der §SSchnellauswahl§!.\n\n£dot_green£ Wählt einen §SPlaneten§! aus\n£dot_green£Klickt auf die verschiedenen Reiter"
 tutorial.14.name: "Tutorial: Gebäudepriorisierung"
 tutorial.14.desc: "Ausgezeichnet! Der Bau eines neuen §Splanetaren Gebäudes§! wurde abgeschlossen und es hat bereits damit begonnen, Ressourcen zu produzieren.\n\n£pops£ §SBewohner§! werden automatisch £job£ §SJobs§! zugewiesen, die £building£ §SGebäude§! brauchen, doch man kann sie auch dazu ermutigen, den Job zu wechseln.\n\nUm ein §SGebäude§! zu priorisieren:\n\n£dot_green£ Wählt den £planet£ §SPlaneten§! in der §SSchnellauswahl§! aus\n£dot_green£Öffnet den Reiter \"§SWirtschaft§!\"\n£dot_green£ Klickt auf ein §SGebäude§!"
 tutorial.15.name: "Tutorial: Planetare Blocker"
 tutorial.15.desc: "Bewohnbare £planet£ §SPlaneten§! besitzen manchmal Blocker, die verhindern, dass man den Planeten voll nutzen kann. Einen §SBlocker§! zu entfernen, kostet Zeit und £energy£ §SEnergie-Credits§!, kann aber §Splanetare Merkmale§! freilegen oder zusätzlichen Platz zum Bauen schaffen.\n\nZum Entfernen eines §SBlockers§!:\n\n£dot_green£ Wählt einen Planeten in der §SSchnellauswahl§! aus\n£dot_green£ Öffnet den Reiter \"§SVerwaltung§!\"\n£dot_green£ Klickt auf die Schaltfläche \"§SBlocker entfernen§!\", die sich bei dem Blocker selbst befindet\n\n\n$tttt$$tt$£clear_blocker£\n\n\nZusätzlich zu den Ressourcenkosten benötigen manche §SBlocker§! bestimmte §STechnologien§!, um entfernt zu werden."
 tutorial.16.name: "Tutorial: Blocker entfernt"
 tutorial.16.desc: "Gut gemacht!\n\nDer £blocker£ §SBlocker§! wurde erfolgreich entfernt.\n\nIhr könnt Eure Maus über einen beliebigen anderen §SBlocker§! bewegen, um zu sehen, welche §Splanetaren Merkmale§! durch seine Entfernung freigeschaltet werden würden.\n\nSobald genügend Ressourcen vorhanden sind, sollte man auch die übrigen §SBlocker§! entfernen, damit der £planet£ §SPlanet§! sein volles Potenzial erreichen kann."
 tutorial.17.name: "Tutorial: Systeme erkunden"
 tutorial.17.desc: "Wir sollten unsere Erkundungsbemühungen vorantreiben. Ich empfehle die Entsendung eines £science_ship£ §SForschungsschiffs§! zur Erkundung benachbarter £system£ §SSternensysteme§!. Dringen wir an Orte vor, die nie eine synthetische Intelligenz zuvor gesehen hat!"
 tutorial.19.name: "Tutorial: System erkundet"
 tutorial.19.desc: "Großartige Arbeit! Die Nachbarsterne unseres £system£ §SHeimatsystems§! wurden vollständig erkundet. Wir sollten alle Ressourcen, die wir gefunden haben, einsammeln, indem wir ein £construction_ship£ §SKonstruktionsschiff§! anweisen, £mining_station£ §SBergbau-§! und £science_ship£ §SForschungsstationen§! [GetBuildGrow].\n\nDas §SKonstruktionsschiff§! lässt sich an folgendem Symbol erkennen:\n\n$tttt$$tt$£construction_ship_map£"
 tutorial.20.name: "Tutorial: Forschungsschiff [GetBuildGrowCap]"
 tutorial.20.desc: "Vielleicht sollten wir in Betracht ziehen, ein zweites £science_ship£ §SForschungsschiff§! [GetBuildGrow]. Dadurch könnten wir unsere galaktische Nachbarschaft doppelt so schnell erkunden!\n\nUm ein §SSchiff§! [GetBuildGrow]:\n\n£dot_green£ Wählt eine §SSternenbasis§! aus\n£dot_green£Klickt auf den Reiter \"§SSchiffswerft§!\"\n£dot_green£ Klickt auf \"§SForschungsschiff§!\"\n\nDas neue §SSchiff§! taucht nach seiner Fertigstellung in der Nähe der §SSternenbasis§! auf."
 tutorial.21.name: "Tutorial: Automatische Erkundung"
 tutorial.21.desc: "Doppelt so viele £science_ship£ §SForschungsschiffe§! bedeuten doppelt so viel Spaß! Oh, so aufgeregt bin ich ja seit der Erfüllung unseres letzten Auftrags nicht mehr gewesen!\n\nMehrere Schiffe auf Erkundung zu schicken, kann mühsam sein.\n\nDie Erkundung lässt sich durch die Auswahl eines §SForschungsschiffs§! und einen anschließenden Klick auf \"§SForschungsschiff-Automatisierung§!\" im Flotten-Interface aber auch automatisieren.\n\n\n$tttt$$tt$£science_ship_automate_exploration£\n\n"
 tutorial.22.name: "Tutorial: Wissenschaftler rekrutieren"
 tutorial.22.desc: "Wir haben nun ein brandneues £scientist£ §SForschungsschiff§!, doch ihm wurde noch kein £scientist£ §SWissenschaftler§! zugeteilt. Meine Programmierung besteht darauf, dass ich auf die Vorteile hinweise, eine organische §SWissenschaftler§!-Komponente hinzuzufügen\n\nMit ausgewähltem §SForschungsschiff§!:\n\n£dot_green£ Auf das leere Porträt im Flotten-Interface klicken\n£dot_green£ Einen §SWissenschaftler§! auswählen\n\nSollten wir uns die Rekrutierung eines neuen §SWissenschaftlers§! derzeit nicht leisten können, ist es auch möglich, einen Wissenschaftler aus einer anderen Abteilung abzuziehen."
 tutorial.23.name: "Tutorial: Wissenschaftler rekrutiert"
 tutorial.23.desc: "Gut! Der £scientist£ §SWissenschaftler§! hat das Kommando über unser neues £science_ship£ §SForschungsschiff§! übernommen. Wir können es nun dazu anweisen, neue £system£ §SSysteme§! zu erkunden oder das Schicksal grausiger Anomalien zu ergründen.\n\nSolltet Ihr den zugewiesenen §SWissenschaftler§! ändern wollen, klickt einfach noch einmal auf das Porträt im Flotten-Interface."
 tutorial.24.name: "Tutorial: Kolonieschiff [GetBuildGrowCap]"
 tutorial.24.desc: "Wir sollten jetzt bereit sein, unsere große Zivilisation auf eine zweite Welt auszuweiten. Dies erfordert den Bau eines £colony_ship£ §SKolonieschiffs§!.\n\nUm ein §SSchiff§! [GetBuildGrow]:\n\n£dot_green£ Eine §SSternenbasis§! auswählen\n£dot_green£ Den Reiter \"§SSchiffswerft§!\" öffnen\n£dot_green£ Auf \"§SKolonieschiff§!\" klicken\n\nDas neue §SSchiff§! wird in der Nähe der §SSternenbasis§! auftauchen, sobald es fertiggestellt wurde."
 tutorial.25.name: "Tutorial: Planet kolonisieren"
 tutorial.25.desc: "Sämtliche Kolonisten haben sich Bord des neuen £colony_ship£ §SKolonieschiffs§! eingefunden und der Kapitän hat gemeldet, man sei startbereit. Dies ist ein wirklich bedeutsamer Tag!\n\nEine £colony£ §SKolonie§! lässt sich auf verschiedenen Wegen gründen.\n\nUm einen£planet£ §SPlaneten§! auf der§SGalaxiekarte§! zu kolonisieren:\n\n£dot_green£ Auf einen kolonisierbaren §SPlaneten§! klicken\n£dot_green£ Auf die Schaltfläche \"§SKolonisieren§!\" klicken\n\n$tttt$$ttt$£colonizable£\n\nSobald die Kolonisten von Bord gegangen sind, dauert es ein paar Jahre, bis die Kolonie vollständig errichtet wurde."
 tutorial.26.name: "Tutorial: Kolonie aufbauen"
 tutorial.26.desc: "Wir besitzen ein £colony_ship£ §SKolonieschiff§! und haben eine geeignete Position für einen dauerhaften extrasolaren Außenposten gefunden. Ich sehe keinen Grund für weitere Verzögerungen - beginnen wir damit, unsere erste £colony£ §SKolonie§! zu gründen!"
 tutorial.27.name: "Tutorial: Kolonie aufgebaut"
 tutorial.27.desc: "Unsere erste extrasolare £colony£ §SKolonie§! wurde fertiggestellt! Sollte unsere Heimatwelt jetzt unvermittelt in Flammen aufgehen, ist unsere Spezies nicht länger vom Aussterben bedroht! Ist das nicht ein beruhigender Gedanke?"
 tutorial.28.name: "Tutorial: Gouverneur rekrutieren"
 tutorial.28.desc: "Zur Unterstützung unserer neuen £colony£ §SKolonie§! sollte ein §SPlanetengouverneur§! die dortigen Bemühungen leiten.\n\nGouverneure können auf die ihnen unterstellten £planet£ §SPlaneten§! verschiedene Effekte zeigen (meist positive). Diese Effekte richten sich nach den Eigenschaften und der Fähigkeitsstufe des Gouverneurs."
 tutorial.29.name: "Tutorial: Gouverneur rekrutiert"
 tutorial.29.desc: "Unsere £colony£ §SKolonie§! wird jetzt von einem neuen §SGouverneur§! verwaltet. Dadurch steigert sich ihre Effizienz bestimmt!"
 tutorial.30.name: "Tutorial: Mehr Kolonien"
 tutorial.30.desc: "Sobald wir genügend Ressourcen haben, wäre es eine gute Idee, weitere £colony_ship£ §SKolonieschiffe§! [GetBuildGrow], um die Grenzen unseres Reichs auszuweiten. Wir sollten zusätzlich zu unserer Heimatwelt und der soeben gegründeten £colony£ §SKolonie§! noch mindestens drei weitere Kolonien aufbauen."
 tutorial.32.name: "Tutorial: Kolonie aufgebaut"
 tutorial.32.desc: "Ausgezeichnete Arbeit! Sehr inspirierend. Unsere mächtige Zivilisation umfasst nun fünf Welten! Sollte sich die Gelegenheit bieten, sollten wir weiter expandieren."
 tutorial.33.name: "Tutorial: Ressourcenproduktion"
 tutorial.33.desc: "Für das Wohlergehen jeder interstellaren Macht ist die ausreichende Versorgung mit £minerals£ §SMineralien§!, £alloys£ §SLegierungen§! und £energy£ §SEnergie-Credits§! von entscheidender Bedeutung. Wir sollten die notwendigen Schritte unternehmen, um unsere Produktion dieser Ressourcen zu erhöhen.\n\nSchließlich kosten der Bau von Stationen und £building£ §SGebäuden§! Mineralien und Legierungen, und sie haben einen Unterhalt an Energie-Credits. Das Gleiche gilt auch für §SSchiffe§! - allerdings kosten diese Unterhalt in Form von Legierungen. Diese Ressourcen werden von £mining_station£ §SBergbaustationen§! oder §SPlanetaren Gebäuden§! produziert.\n\nSpäter könnt Ihr auch auf neue und interessante Ressourcen stoßen, die in neuen Produktionslinien Verwendung finden."
 tutorial.38.name: "Ressourcenproduktion erzielt"
 tutorial.38.desc: "Hervorragende Arbeit! Jetzt haben wir eine starke Ressourcenbasis, auf der wir unser Reich aufbauen können."
 tutorial.39.name: "Tutorial: Flotte vergrößern"
 tutorial.39.desc: "Ich komme nicht umhin zu bemerken, dass unsere Flotte ein bisschen schwachbrüstig ist. In der Galaxie werden wir sicherlich auf viele Bedrohungen treffen, die in irgendeiner Form eine militärische Reaktion erfordern. Vergesst nicht, das Überleben unserer Zivilisation steht auf dem Spiel!"
 tutorial.43.name: "Flottengröße erhöht"
 tutorial.43.desc: "Gut! Wir haben jetzt eine kleine, aber schlagkräftige Raumflotte, die uns im Falle unerwarteter Feindkontakte gute Dienste leisten sollte."
 tutorial.44.name: "Tutorial: Sektor aufbauen"
 tutorial.44.desc: "Unser wachsendes Reich ist mittlerweile so groß geworden, dass uns eine direkte Verwaltung von unserer Heimatwelt aus zunehmend schwerer fällt. Wir sollten einen neuen §SSektor§! aufbauen.\n\nSektoren sind Bereiche innerhalb unseres Reichs, die man dazu verwenden kann, die täglichen Angelegenheiten der £planet£ §SPlaneten§! unter ihrer Gerichtsbarkeit unabhängig zu verwalten."
 tutorial.45.name: "Tutorial: Sektor aufgebaut"
 tutorial.45.desc: "Wir können dem erhöhten Verwaltungsaufwand unseres Reichs entgegenwirken, indem wir £colony£ §SKolonien§! in §SSektoren§! organisieren. Sektoren kann man auf dem Bildschirm für §SPlaneten und Sektoren§! verwalten und automatisieren, wodurch sie automatisch mit den zugewiesenen Ressourcen £district£ §SDistrikte§! und £building£ §SGebäude§! bauen und verbessern."
 tutorial.46.name: "Tutorial: Sektorgouverneur"
 tutorial.46.desc: "§SGouverneure§! kann man zur Verwaltung ganzer §SSektoren§! einteilen. Alle £planet£ §SPlaneten§! des Sektors werden dann von den Gouverneurseffekten profitieren. Wir sollten unserem neuen Sektor einen Gouverneur zuteilen."
 tutorial.47.name: "Tutorial: Gouverneur zugewiesen"
 tutorial.47.desc: "Unser neuer §SSektorgouverneur§! hat sein Amt auf dem Regierungsplaneten des Sektors angetreten. Gut gemacht!"
 tutorial.48.name: "Tutorial: Schiff entwerfen"
 tutorial.48.desc: "Auf dem Bildschirm §SSchiffsdesigner§! können wir manuell neue §SSchiffe§! entwerfen. Dieses Verfahren ist zwar recht unkompliziert, doch wir können es trotzdem vollständig automatisieren, sollten wir dies wünschen.\n\nUm auf den §SSchiffsdesigner§! zuzugreifen:\n\n£dot_green£ Auf die Schaltfläche \"§SFlottenverwaltung§!\" in der linken Seitenleiste oder §SF9§! drücken\n\n$tttt$$tt$£fleet_management£\n"
 tutorial.49.name: "Tutorial: Schiff verbessern"
 tutorial.49.desc: "Gute Arbeit. Das Schiffsdesign wurde unserer Datenbank hinzugefügt und kann nun in einer §SSternenbasis§!, die mit einer §SSchiffswerft§! ausgestattet ist, gebaut werden.\n\nDen neuen Entwurf kann man im §SSchiffsdegisner§! jederzeit überarbeiten und anpassen. Sollte man eine Änderung vornehmen, müssen alle bereits gebauten §SSchiffe§! in einer §SSternenbasis§! verbessert werden.\n\nZur Verbesserung eines §SSchiffs§!:\n\n£dot_green£ Wählt das §SSchiff§! in der §SSchnellauswahl§! aus\n£dot_green£ Klickt auf die Schaltfläche \"§SVerbessern§!\" im Flotten-Interface\n\n$tttt$$tt$£upgrade_ship£\n"
 tutorial.52.desc: "Die Anomalie auf [From.GetName] hat sich als natürliche §Ygeometrische Formation§! herausgestellt. Sie sieht fast wie ein Pfeil aus, der den Weg nach vorne weist. Die natürliche Schönheit des Universums kann ziemlich erstaunlich sein.\n\n$tutorial.52.filler.desc$"
 tutorial.52.spirit.desc: "Wir haben eine §Ynatürliche Formation§! auf [From.GetName] gefunden, die durch ihre geometrische Perfektion beeindruckt. Dies ist sicherlich ein §Ygöttliches Zeichen§!, das uns den Weg zu den Sternen weist!\n\n$tutorial.52.filler.desc$"
 tutorial.52.filler.desc: "Wir sollten diese Art von Anomalien §Yweiter untersuchen§!, wann immer sich die Gelegenheit dazu bietet. Dadurch werden wir fast mit Sicherheit §Yneues Wissen und neue Technologien§! erhalten."
 tutorial.52.a: "Erstaunlich!"
 tutorial.52.spirit.a: "Die Götter seien gepriesen!"
 tutorial.53.desc: "Die auf [From.GetName] entdeckte Anomalie hat etwas Verblüffendes offenbart. Der [From.GetPlanetMoon] ist zweifelsfrei von einer Spur umgeben, wie sie von ÜL-Antrieben erzeugt wird. Da sie schon sehr alt ist, können wir ihren Ursprung nicht mehr feststellen.\n\n$tutorial.52.filler.desc$"
 tutorial.53.xenophobe.desc: "Wir haben in der Nähe von [From.GetName] eine schwache ÜL-Spur entdeckt. Da sie sehr alt ist, lässt sie sich nicht mehr nachverfolgen. Das muss bedeuten, dass schon andere interstellare Reisende hier gewesen sind und uns sicherlich genau beobachtet haben.\n\n$tutorial.52.filler.desc$"
 tutorial.53.xenophile.desc: "Die Anomalie auf dem [From.GetPlanetMoon] [From.GetName] zeigt Spuren anderer interstellarer Reisender! Eine schwache Warp-Spur verrät uns, dass jemand vor langer Zeit hier gewesen ist und auf der Suche nach potenziellen Verbündeten womöglich unseren £planet£ §SPlaneten§! beobachtet hat. Die Spur ist schon so schwach, dass sie nicht weiterverfolgt werden kann.\n\n$tutorial.52.filler.desc$"
 tutorial.53.a: "Wir sind beobachtet worden, aber warum nur?"
 tutorial.53.xenophobe.a: "Wir müssen uns vor der Bedrohung durch Fremde hüten!"
 tutorial.53.xenophile.a: "Lasst sie uns finden!"
 tutorial.54.desc: "Wir haben auf [From.GetName] eine unserer §Yalten Sonden§! gefunden. Irgendwie ist sie all diese Jahre intakt geblieben und versucht immer noch, Daten zur Heimatwelt zu senden. Sie ist ein Beleg für unsere Schwierigkeiten in der Vergangenheit und für unseren Wunsch, der Beengtheit unseres §SPlaneten§! zu entkommen.\n\n$tutorial.52.filler.desc$"
 tutorial.54.a: "Wir gehen immer weiter nach vorne."
 tutorial.54.spiritualist.a: "Die Götter haben für uns sicherlich noch mehr auf Lager."
 tutorial.54.materialist.a: "Unsere Bemühungen haben sich endlich ausgezahlt."
 tutorial.55.name: "Tutorial: Strategische Ressourcen"
 tutorial.55.desc: "Wir haben eine §SStrategische Ressource§! entdeckt! Viele £strategic_resource£ §SStrategische Ressourcen§! benötigen besondere Technologien, damit man sie abbauen kann, geben dafür aber starke Boni.\n\n\n\nZur Sicherung von §SStrategischen Ressourcen§!:\n\n£dot_green£ Ein £construction_ship£ §SKonstruktionsschiff§! auswählen\n£dot_green£ Einen Rechtsklick auf das £system£ §SSystem§! machen, in dem sich die Ressource befindet\n£dot_green£ Auf \"§S£mining_station£ Bergbaustationen [GetBuildGrowCap]§!\" klicken\n\n§SStrategische Ressourcen§! kann man für den Bau fortschrittlicher £building£ §SGebäude§! oder Schiffskomponenten nutzen oder einfach verkaufen."
 tutorial.55.poi.name: "Tutorial: Ressourcenstätte"
 tutorial.55.poi.desc: "Wir haben auf dem [From.GetPlanetMoon] [From.GetName] eine §Sstrategische Ressource§! entdeckt."
 tutorial.56.name: "Tutorial: Ressource extrahiert"
 tutorial.56.desc: "Hervorragende Arbeit! Diese Ressource wird unserem Reich sicherlich großen Reichtum einbringen."
 tutorial.56.poi.desc: "Wir haben auf dem [StrategicResourcePlanet.GetPlanetMoon] [StrategicResourcePlanet.GetName] eine §Sstrategische Ressource§! entdeckt."
 tutorial.560.desc: "Eine neue Technologie hat ergeben, dass wir bereits über eine £mining_station£ §SBergbaustation§! verfügen, die günstigerweise direkt über einer zuvor unbekannten §Sstrategischen Ressource§! platziert ist. Diese seltenen Ressourcen geben starke Boni und man kann mit ihnen handeln. Zwei metaphorische flugfähige Facettenäugler, die Opfer eines einzelnen Angriffs einer imaginären, kinetischen Druck ausübenden Waffe werden.\n\nMehr Informationen darüber kann man für eine bestimmte Zeit im §SSituationsprotokoll§! einsehen. In der Galaxie gibt es noch viel mehr £strategic_resource£ §SStrategische Ressourcen§! zu entdecken - also forscht immer weiter!"
 tutorial.57.name: "Tutorial: Aufwerten"
 tutorial.57.desc.notech: "Wir haben Tierleben in einem fortgeschrittenen Entwicklungszustand gefunden! Mit der richtigen §STechnologie§! könnten wir diese Wesen §Saufwerten§!, um sie vernunftbegabt und intelligent zu machen - oder zumindest zu dem, was unter organischen Wesen als intelligent gilt.\n\nEs könnte sich als vorteilhaft erweisen, unsere Forschung im Auge zu behalten und sie in Richtung §SEpigenetische Auslöser§! zu lenken, falls sich die Gelegenheit bietet."
 tutorial.57.desc.yestech: "Wir haben Tierleben in einem fortgeschrittenen Entwicklungszustand gefunden! Mit der richtigen §STechnologie§! könnten wir diese Wesen §Haufwerten§!, um sie vernunftbegabt und intelligent zu machen - oder zumindest zu dem, was unter organischen Wesen als intelligent gilt.\n\nOh.\n\nUnsere Technologie §SEpigenetische Auslöser§! sollte gut dafür geeignet sein. Wir sind tatsächlich bereits in der Lage, diese Kreaturen in eine schöne neue Welt der Existenzangst zu erheben."
 tutorial.58.name: "Tutorial: Beinahe vernunftbegabte Spezies aufgewertet"
 tutorial.58.desc: "Ein voller Erfolg! Diese niederen Kreaturen wurden zu weniger niederen Kreaturen aufgewertet und sind nun stolze Bürger unseres wachsenden Reichs."
 tutorial.59.name: "Tutorial: Erstkontakt"
 tutorial.59.desc: "Bemerkenswert! Wir haben §Sfremde raumfahrende Entitäten§! entdeckt, die möglicherweise über eine Art Intelligenz verfügen ... Gut, machen wir uns nichts vor ... Wahrscheinlich sind sie intelligent. Bis wir das entsprechende Projekt abgeschlossen haben, um sie ordnungsgemäß zu §Suntersuchen§!, wird ihre wahre Natur allerdings ein Mysterium bleiben. Ich schlage vor, dass wir das schnellstmöglich tun, damit sie uns nicht zuerst untersuchen ...\n\n.\n\nZur Untersuchung eines §SErstkontakts§!:\n\n£dot_green£ Das §SSituationsprotokoll§! öffnen\n£dot_green£ Auf \"§S$SHOW_FIRST_CONTACT$§!\" klicken\n\n$tttt$$ttt$£firstcontact£\n\nEinen §SErstkontakt§! kann man auch über einen Klick auf das Symbol auf der §SGalaxiekarte§! einleiten"
 #tutorial.60.name: "First Contact Made"
 #tutorial.60.desc: "A triumph. We have established communications with alien beings. What a time to be alive, or in my case, powered on."
 tutorial.61.name: "Tutorial: Beinahe vernunftbegabte Spezies"
 tutorial.61.desc: "Unsere Versuche zur Kontaktaufnahme belegen zwar unsere technologische Genialität, mit Ergebnissen können wir allerdings nicht aufwarten. Wahrscheinlich besitzt die andere Seite nur eine Form der tierischen Intelligenz - §Swenn überhaupt§!.\n\n§SBeinahe vernunftbegabte Wesen§! bieten wenig bis keine diplomatischen Interaktionen, aber je nach Reichstyp kann man sie manchmal aufwerten, ausrotten, versklaven oder beobachten."
 tutorial.63.name: "Tutorial: Eingehende Übertragung"
 tutorial.63.desc: "Anscheinend ist uns die §Sandere Seite§! zuvorgekommen und hat mit uns §SKontakt hergestellt§!, bevor wir ihre Kommunikationsprotokolle überhaupt dechiffrieren konnten.\n\nWir sollten damit dennoch fortfahren, damit wir bei der nächsten Gelegenheit besser vorbereitet sind."
 tutorial.64.name: "Tutorial: Spezies modifizieren"
 tutorial.64.desc: "Dank der kürzlichen Fortschritte in der Genforschung haben wir einen zusätzlichen §SEigenschaftspunkt§! erlangt, den wir zum §SModifizieren§! und Verbessern unserer Spezies benutzen können.\n\nUm eine §SSpezies§! zu modifizieren:\n\n£dot_green£ Den Reiter \"§SSpezies§!\" öffnen oder §SF6§! drücken\n£dot_green£ Auf die Schaltfläche \"§SModifizieren§!\" klicken\n£dot_green£ Das §SSpezialprojekt§! erforschen"
 tutorial.65.name: "Tutorial: Spezies modifiziert"
 tutorial.65.desc: "Vorbildlich. Da uns das Joch der natürlichen Evolution nun von den Schultern genommen wurde, wird sich unser Volk im Weltraum sicherlich prächtig entwickeln."
 tutorial.70.name: "Tutorial: Warp-Flug"
 tutorial.70.desc: "Unsere £scientist£ §SWissenschaftler§! entwickelten den §SWarp-Antrieb§!, um die riesigen Entfernungen zwischen den £system£ §SSternensystemen§! zu überbrücken. §SSchiffe§!, die mit diesem Antrieb ausgestattet sind, können schneller als mit Lichtgeschwindigkeit zwischen Systemen reisen.\n\nObwohl Warp-Flüge zu jedem System in Reichweite möglich sind, kann man Warp-Antriebe erst außerhalb des Schwerkraftbereichs von Sternen aktivieren. Darüber hinaus brauchen §SSchiffe§! nach einem Warp-Flug einige Zeit, bis sie ihre Systeme wieder hochfahren können - die Länge dieses Vorgangs hängt davon ab, wie weit das §SSchiff§! geflogen ist."
 tutorial.71.name: "Tutorial: Hyperraum-Flug"
 tutorial.71.desc: "Unsere £scientist£ §SWissenschaftler§! entwickelten den §SHyperantrieb§!, um die riesigen Entfernungen zwischen den £system£ §SSternensystemen§! zu überbrücken. Diese Art von Antrieb erlaubt es einem §SSchiff§!, mit Überlichtgeschwindigkeit zwischen Systemen hin und her zu reisen, die über Hyperraumrouten miteinander verbunden sind.\n\nSolche interstellaren Flüge entlang von Hyperraumrouten erfolgen nahezu sofort, sind aber ausschließlich auf das galaktische Hyperraumnetzwerk beschränkt.\n\nUm den Hyperraum zu betreten, muss das §SSchiff§! zuerst den äußeren Rand des Systems erreichen, der jenseits des Gravitationsfelds liegt.\n\nDas §SSchiff§! wird dies automatisch tun, sobald es angewiesen wurde, sich in ein anderes §SSystem§! zu begeben."
 tutorial.72.name: "Tutorial: Wurmloch-Flug"
 tutorial.72.desc: "Unsere £scientist£ §SWissenschaftler§! entwickelten die §SWurmloch§!-Technologie, um die riesigen Entfernungen zwischen den £system£ §SSternensystemen§! zu überbrücken. Mit Wurmlochgeneratoren ausgerüstete Raumstationen können den Hyperraum durchtunneln und so temporäre Portale zu anderen Systemen erzeugen, die von §SSchiffen§! durchflogen werden können.\n\nWurmloch-Flüge werden fast ohne Zeitverlust absolviert, erfordern aber, dass sich eine Wurmlochstation in Reichweite befindet. Darüber hinaus müssen §SSchiffe§! mit speziellen Wurmlochstabilisatoren ausgerüstet sein, um den extremen Hyperraum-Bedingungen standhalten zu können."
 tutorial.73.name: "Tutorial-Erinnerung: Aufwerten"
 tutorial.73.desc: "Nach der Erforschung der entsprechenden Technologie können wir nun niedere Lebewesen zu vernunftbegabten Wesen §Yaufwerten§!.\n\nUm eine §SSpezies§! aufzuwerten:\n\n£dot_green£ Den £planet£ §SPlaneten§! der §Sbeinahe vernunftbegabten§! Spezies anklicken\n£dot_green£ Den Reiter \"§SVerwaltung§!\" öffnen\n£dot_green£ Die §SSpezies§! auswählen\n£dot_green£ Auf \"§SRechte festlegen§!\" klicken\n£dot_green£ Auf \"§SAufwerten§!\" klicken\n\nDie Spezies wird nun den Aufwertungsprozess beginnen und die vollständige Vernunftbegabtheit erlangen, sobald dieser abgeschlossen wurde."
 tutorial.75.name: "Tutorial: System beanspruchen"
 tutorial.75.desc: "Da wir nun begonnen haben, unsere Nachbarsterne zu erkunden, könnte es an der Zeit sein, unseren Einfluss zu erhöhen.\nEine §SSternenbasis§! kann man um Sterne in £system£ Systemen bauen, die wir bereits erkundet haben, um unsere Grenzen zu erweitern und es uns zu ermöglichen, neue Regionen des Weltraums zu beanspruchen.\n\nDurch die Erforschung neuer Technologien lassen sich Sternenbasen verbessern, um §SSchiffe§! oder andere Ressourcen zu produzieren.\n\nUm ein §SSystem§! zu beanspruchen:\n\n Ein §SKonstruktionsschiff§! auswählen\n\n£dot_green£ Einen Rechtsklick auf ein erkundetes §SSystem§! machen\n£dot_green£ \"§SSternenbasis [GetBuildGrowCap]§! auswählen"
 tutorial.76.name: "Tutorial: Sternenbasis verbessern"
 tutorial.76.desc: "Ausgezeichnet! Wie auf der §SGalaxiekarte§! zu sehen ist, haben sich die Grenzen unseres Reichs um jenes £system£ §SSystem§! erweitert, in dem die neue §SSternenbasis§! errichtet wurde.\n\nEine §SSternenbasis§! fungiert als eine Art Außenposten. Sie bietet einen grundlegenden Schutz, hat aber keinerlei Platz für §SModule§! und £building£ §SGebäude§!. Da man kaum mit ihr interagieren muss, taucht sie nicht in der Schnellauswahl auf, bevor sie nicht verbessert wurde.\n\nZum Verbessern einer §SSternenbasis§!:\n\n£dot_green£ Auf das System auf der §SGalaxiekarte§! klicken\nDie §SSternenbasis§! auswählen\n£dot_green£Auf die Schaltfläche \"§SVerbessern§!\" klicken"
 tutorial.80.name: "Tutorial: Kartenmodi"
 tutorial.80.desc: "Auf der Galaxiekarte können wir verschiedene §SKartenmodi§! aktivieren und deaktivieren. Die Galaxiekarte befindet sich in der unteren rechten Bildschirmecke und verfügt über verschiedene Informationseinblendungen. Beispielsweise können wir die Territorien nach den Meinungen farbkodieren, die ihre Besitzer über uns haben."
 tutorial.100.name: "Tutorial deaktiviert"
 tutorial.100.desc: "§HTutorial-Missionen§! und §HTipps§! sind deaktiviert."
 tutorial.101.name: "Nur Tipps"
 tutorial.101.desc: "§HTipps§! sind aktiviert, §HTutorial-Missionen§! sind deaktiviert."
 tutorial.102.name: "Volles Tutorial"
 tutorial.102.desc: "§HTutorial-Missionen§! und §HTipps§! sind aktiviert."
 tutorial.1337.name: "Tutorial: Kleinere Artefakte"
 tutorial.1337.desc: "Wir haben einige £minor_artifacts£ §Skleinere Artefakte§! entdeckt. Dies ist eine etwas abseitige Ressource - ein Sammelbegriff für alle sonderbaren Gegenstände, die wir nicht verstehen und die sogar für immer unerklärlich bleiben könnten.\n\nArtefakte kann man nutzen, um eine Reihe von Entscheidungen zu treffen.\n\nUm mit §Skleineren Artefakten§! zu interagieren:\n\n£dot_green£ Auf \"§S$topbar_button_discoveries_name$§!\" in der linken Seitenleiste klicken\n£dot_green£ Den Reiter \"§SSammlung\"§! öffnen oder §SC§! drücken\n\n$tttt$$tt$£discoveries£\n"
 tutorial.1340.name: "Tutorial: $astral_threads$"
 tutorial.1340.desc: "Wir haben einige £astral_threads£ §SAstralfasern§! entdeckt. Diese Filamente stammen aus dem Gewebe der verdichteten Raumzeit und entstehen durch die Kollision von Dimensionsebenen. Normalerweise können sie nur von §SAstralnarben§! oder in £astral_rift£ §SAstralrissen§! gesammelt werden.\n\nUm §SAstralaktionen§! durchzuführen:\n\n£dot_green£ Auf \"§S$topbar_button_discoveries_name$§!\" in der linken Seitenleiste klicken\n£dot_green£ Den Reiter \"§SAstralfasern§!\" öffnen\n\n$tttt$$tt$£discoveries£\n\nZusätzliche Aktionen kann man durch das Erforschen von §SAstralrissen§! entdecken. Diese können aus §SAstralnarben§! entstehen oder durch andere anormale Ereignisse."
 tutorial.2000.name: "Erstkontakt durchführen"
 tutorial.2000.desc: "Manche §SErstkontakt-Missionen§! erfordern Entscheidungen, mit denen wir festlegen, wie wir uns verhalten möchten. Diese Entscheidungen können die diplomatischen Beziehungen zu anderen Reichen für lange Zeit beeinflussen."
 tutorial.2006.name: "Tutorial: Diplomatie"
 tutorial.2006.desc: "Die Kommunikationsprotokolle wurden initialisiert. Wir können nun mit diesem Reich §SDiplomatie§! betreiben. Die derzeitige Meinung dieses Reichs über uns hängt davon ab, wie der §SErstkontakt§! ablief.\n\nUm §SDiplomatie§! zu betreiben:\n\n£dot_green£Auf die Schaltfläche \"§SKontakte§!\" in der linken Seitenleiste klicken oder §SF10§! drücken\n\n$tttt$$tt$£contacts£\n\nWährend eines Erstkontakts erhalten wir zusätzlich auch Informationen. Je mehr Informationen wir über ein Reich sammeln, desto besser verstehen wir seine inneren Abläufe."
 tutorial.2007.name: "$tutorial.2006.name$"
 tutorial.2007.desc: "Wir haben den §SErstkontakt§! mit einer anderen Zivilisation hergestellt - einer, die im Allgemeinen nicht bereit ist, sich auf §SDiplomatie§! mit anderen einzulassen.\n\nDie diplomatischen Aktionen, die wir bei solchen Zivilisationen durchführen können, sind begrenzt, doch Letztere können sich dennoch dazu entscheiden, uns von Zeit zu Zeit zu kontaktieren."
 tutorial.2010.name: "Tutorial: Zuweisen von Spionagemitteln"
 tutorial.2010.desc: "§SSpionagemittel§! sind Agenten in wichtigen Positionen und Artefakte, die verschiedene Effekte für unsere Spionageaktivitäten bieten. Sie arbeiten innerhalb des Spionagenetzwerks und können Einsätzen zugewiesen werden, wo sie uns neue Möglichkeiten eröffnen oder uns Ärger ersparen.\n\nWir können Spionagemittel durch Ereignisse oder durch den Einsatztyp \"§S$operation_acquire_asset$§!\" erhalten."
 tutorial.2100.name: "Tutorial: Enklaven-Diplomatie"
 tutorial.2100.abbr.desc: "Wir haben den §SErstkontakt§! zu einer §SEnklave§! hergestellt, einer kleineren, unabhängigen Art von Reich, die mit größeren Reichen wie dem unseren Handel treiben kann und dabei einzigartige Formen der Diplomatie anwendet."
 tutorial.2100.full.desc: "$tutorial.2100.abbr.desc$\n\nEnklaven bieten eine Vielzahl von Dienstleistungen an. Diese reichen von wissenschaftlicher Forschung bis hin zum Verkauf von Informationen, Sternenbasengebäuden und sogar §SSchiffen§!. Der Erwerb solcher Dienstleistungen verbessert die §SMeinung§! der Enklave über uns."
 tutorial.2105.name: "Tutorial: $tutorial.2100.name$"
 tutorial.2105.abbr.desc: "Wir sind auf eine §SSöldnerenklave§! gestoßen. Diese unabhängigen Militärspezialisten können §SSöldnerflotten§! an Reiche, einschließlich unseres eigenen, ausleihen - gegen eine Gebühr, versteht sich."
 tutorial.2105.full.desc: "$tutorial.2105.abbr.desc$\n\nWenn wir uns dafür entscheiden, eine Söldnerflotte anzuheuern, erhalten wir für einen bestimmten Zeitraum die Kontrolle darüber. Während dieser Zeit wird die Enklave versuchen, die Flotte bei Bedarf zu verstärken, doch weder eine Söldnerflotte noch ihr Admiral können in unsere eigenen Flotten integriert werden."
 tutorial.2111.name: "Tutorial: Söldnerenklave"
 tutorial.2111.abbr.desc: "Die §Y[tutorial_mercenary_fleet.GetName]§! kann jetzt eine §SSöldnerenklave§! werden, sollten wir dies wünschen. Die Flotte würde dann nicht mehr unter unserer direkten Kontrolle stehen, sondern eine unabhängige Macht werden, die in der Lage ist, §SSöldnerflotten§! an Reiche einschließlich unseres eigenen zu verleihen."
 tutorial.2111.full.desc: "$tutorial.2111.abbr.desc$\n\nSolange die Söldnerenklave in unserem Raumbereich ist, §Sverdienen§! wir daran, wenn sie ihre Söldnerflotte an andere Reiche verleiht. Wenn wir uns dafür entscheiden, die Söldnerflotte selbst anzuheuern, erhalten wir für einen bestimmten Zeitraum die Kontrolle über diese Flotte. Reiche können einen bestehenden Vertrag gegen Aufpreis aufkaufen, falls die Söldnerflotte derzeit nicht verfügbar ist."
 tutorial.2115.name: "Tutorial: Megastrukturen"
 tutorial.2115.desc: "£megastructure£ §SMegastrukturen§! sind kolossale Bauprojekte, die in der Leere des Weltraums [GetBuildingGrowingCap] werden können. Sie bieten hochmoderne Forschungseinrichtungen, geben Zugang zu überlegenen Ressourcen und schaffen sogar einzigartige Transportmöglichkeiten.\n\nDer Bau eines solchen Projekts erfordert eine beträchtliche Investition an Zeit und Ressourcen, doch die aus ihnen resultierenden Belohnungen sind ebenso beträchtlich. Wir können mit dem Bau beginnen, indem wir ein £construction_ship£ §SKonstruktionsschiff§! dazu anweisen."
 tutorial.2120.name: "Tutorial: $tech_orbital_ring_tier_1$"
 tutorial.2120.desc: "Dank unserer jüngsten Forschungsfortschritte im Mega-Bauwesen sind wir nun in der Lage, §SOrbitalringe§! um bewohnbare £planet£ §SPlaneten§! zu errichten. Wir können mit dem Bau beginnen, indem wir ein £construction_ship£ §SKonstruktionsschiff§! dazu anweisen."
 tutorial.2121.name: "$tutorial.2120.name$"
 tutorial.2121.desc: "§SOrbitalringe§! sind riesige £megastructure£ §SMegastrukturen§!, die einen ganzen £planet£ §SPlaneten§! umschließen. Sie bilden eine effiziente Brücke zwischen dem Weltraum und dem darunter liegenden Planeten und bieten Platz für Einrichtungen wie Schiffswerften, Verteidigungsanlagen und Ressourcenzentren.\n\nIn der Orbitalring-Ansicht kann man £building£ §SGebäude§! und §SModule§! hinzufügen oder entfernen und den Orbitalring auf eine höhere Stufe aufwerteten. Durch die Aufwertung erhöht sich die Anzahl an verfügbaren Bauplätzen. Die Stufen sind durch die planetare Infrastruktur begrenzt."
 tutorial.2125.name: "Tutorial: $tech_quantum_catapult$"
 tutorial.2125.desc: "Dank der jüngsten Forschungsfortschritte im Mega-Bauwesen können wir jetzt ein §SQuantenkatapult§! um einen §SPulsar§! oder §SNeutronenstern§! herum errichten. Wir können mit dem Bau beginnen, indem wir ein £construction_ship£ §SKonstruktionsschiff§! dazu anweisen."
 tutorial.2126.name: "Tutorial: $tutorial.2125.name$"
 tutorial.2126.desc: "Das §SQuantenkatapult§! befördert §SSchiffe§! und Flotten über große interstellare Entfernungen. Diese Technologie verbessert unsere Fähigkeit, auf neue Situationen innerhalb unseres Reichs und in nahen Raumbereichen zu reagieren.\n\nDer Einsatz des Quantenkatapults birgt jedoch ein gewisses Risiko, und unsere Flotten könnten in £system£ §SSystemen§! ankommen, die nicht ihr eigentliches Ziel waren. Wir können diese Risiken vermindern - und Dinge wie Durchsatz und maximale Reichweite verbessern -, indem wir das Quantenkatapult auf höhere Stufen aufwerten."
 tutorial.2130.name: "Tutorial: $tech_hyper_relays$"
 tutorial.2130.desc: "Unsere Forschung im Bereich des Mega-Bauwesens hat zu Ergebnissen in Form von §SHyperrelais§! geführt. Wir können damit beginnen, ein Netz von Hyperrelais aufzubauen, indem wir ein £construction_ship£ §SKonstruktionsschiff§! dazu anweisen."
 tutorial.2131.name: "Tutorial: $tutorial.2130.name$"
 tutorial.2131.desc: "§SHyperrelais§! ermöglichen es, effizient zwischen benachbarten £system£ §SSternensystemen§! zu reisen. Mindestens §Szwei§! miteinander verbundene Hyperrelais bilden dabei ein Netzwerk, das die Transitzeiten in unserem Reich drastisch verkürzt.\n\nHyperrelais kann man auch über offene Grenzen hinweg bauen, um ganze Netzwerke miteinander zu verbinden. Dadurch können §SSchiffe§! schnell durch benachbarte Reiche reisen."
 tutorial.2140.name: "Tutorial: Beobachtungsposten"
 tutorial.2140.desc: "Wir haben eine §SZivilisation ohne ÜL-Technologie§! entdeckt! Obwohl sie nicht über die nötige Technologie verfügt, die es uns ermöglicht, das All zu bereisen, können wir von dieser Gesellschaft dennoch viel lernen. Es liegt an uns, ob wir uns von ihrer Kultur inspirieren lassen oder ihre Angehörigen als Sklaven halten wollen.\n\nWenn wir sie beobachten wollen - und sie sich innerhalb unserer Grenzen befindet -, müssen wir einen §SBeobachtungsposten§! um ihre Welt herum errichten.\n\nFalls wir sie erobern wollen, müssen wir nur unsere Bodentruppen einsetzen. Sie hätte kaum eine Chance."
 tutorial.2145.name: "Tutorial: Beobachtungsposten gebaut"
 tutorial.2145.desc.nodlc: "Unser neuer §SBeobachtungsposten§! ist nun einsatzbereit und wird seine §SMission§! erfüllen, solange die £awareness£ §SWahrnehmung§! des von uns untersuchten Objekts niedrig ist.\n\nSobald eine Zivilisation ohne ÜL-Technologie die maximale Wahrnehmung erreicht, kann man sie nicht mehr beobachten. Ab diesem Zeitpunkt werden wir in der Lage sein, über §Sdiplomatische Aktionen§! Kontakt aufzunehmen. Wir können uns auch frühzeitig zu erkennen geben, sofern wir eine §SEinmischungsrichtlinie§! haben, die dies zulässt."
 tutorial.2145.desc.dlc: "Unser neuer §SBeobachtungsposten§! ist nun einsatzbereit und wird seine §SMission§! erfüllen, solange die £awareness£ §SWahrnehmung§! des von uns untersuchten Objekts niedrig ist.\n\nDer Außenposten wird uns §SBeobachtungseinblicke§! liefern, eine einzigartige Technologieform, bis die Zivilisation ohne ÜL-Technologie die maximale Wahrnehmung erreicht hat und die Beobachtungsmission eingestellt wird. Ab diesem Zeitpunkt werden wir in der Lage sein, mit §Sdiplomatischen Aktionen§! Kontakt aufzunehmen.\n\nWir können uns auch frühzeitig zu erkennen geben, sofern wir eine §SEinmischungsrichtlinie§! haben, die dies zulässt."
 tutorial.2150.name: "Tutorial: $tutorial.2006.name$"
 tutorial.2150.desc: "Diese Zivilisation ohne ÜL-Technologie weiß, dass wir existieren. Wir können in begrenztem Umfang mit der Regierung des §SPlaneten§! in §Sdiplomatische Verhandlungen§! treten, je nachdem, was unsere §SRichtlinien§! vorgeben.\n\nDa die Bevölkerung des Planeten nun weiß, dass es fremdes Leben gibt, gibt es nichts mehr durch eine Beobachtung ihrer Zivilisation zu gewinnen. Unsere §SBeobachtungsmission§! wurde beendet."
 tutorial.2500.name: "Tutorial: Tarnfelder"
 tutorial.2500.desc: "Die jüngsten Fortschritte in der Feldmanipulationsforschung führten zur Erfindung von §S$science_cloaking_components$§!. Diese energieintensiven Komponenten projizieren modifizierte Partikelfelder, die es unseren Forschungs- und Militärschiffen erlauben, sich vor konventionellen Sensoren zu verbergen.\n\nDiese Tarnfelder haben jedoch auch negative Auswirkungen auf die §S$MOD_SHIP_BASE_SPEED_MULT$§!, die §S$MOD_SHIP_WINDUP_MULT$§! und die §S$MOD_SHIP_SHIELD_HP_ADD$§!, solange sie aktiv sind.\n\n§SGetarnte§! Schiffe, die unentdeckt bleiben, können §Sgeschlossene Grenzen§! passieren.\n§SGetarnte§! £science_ship£ §SForschungsschiffe§! sind in der Lage, §Saktive Aufklärung§! in fremden £colony£ §SKolonien§! zu betreiben, wodurch wir mehr Geheiminformationen über andere Reiche erhalten."
 tutorial.2550.name: "Tutorial: Ortung von Tarnvorrichtungen"
 tutorial.2550.desc: "Die jüngsten Fortschritte in der Computerforschung führten zur Erfindung von §S$sm_detection_array_plural$§!. Die Installation dieser leistungsstarken externen Sensoren auf unseren §SSternenbasen§! gibt uns die Möglichkeit, §Sgetarnte§! Flotten aufzuspüren.\n\nDie Empfindlichkeit der §S$sm_detection_array_plural$§! lässt sich steigern, indem man mehrere Arrays miteinander koppelt, was es ihnen erlaubt, immer stabilere §STarnfelder§! zu durchdringen.\n\nMit weiteren Forschungen sollten wir zudem in der Lage sein, £science_ship£ §SForschungsschiffe§! einzusetzen, um diese Ortungsfähigkeiten weiter zu verbessern. Die Reichweite dieser Arrays ist durch die §SSensorreichweite§! der Sternenbasis begrenzt."
 #############################
 #Tutorial Event Chains
 #############################
 tutorial_survey_system_chain_title: "Tutorial: Galaxiekarte umschalten"
 tutorial_survey_system_chain_desc: "Bevor wir die Sterne erkunden können, müssen wir erst einmal wissen, was um uns herum geschieht. Zum Glück steht uns dafür eine ausgeklügelte §SGalaxienkarte§! zur Verfügung. Um die Galaxiekarte aufzurufen, könnt Ihr entweder §SM§! oder die Galaxie-Taste am unteren Bildschirmrand drücken. Danach könnt Ihr das Situationsprotokoll schließen, indem Ihr entweder §SESC§! drückt oder das Fenster oben rechts schließt."
 map_toggled: "Galaxiekarte umgeschaltet"
 tutorial_survey_system_tooltip: "§STutorial: Galaxiekarte umschalten§! wurde dem Situationsprotokoll hinzugefügt"
 tutorial_1_chain_title: "Tutorial: Systeme erkunden"
 tutorial_1_chain_desc: "Wählt zuerst ein £science_ship£ §SForschungsschiff§! aus. Klickt es dazu auf der §HGalaxiekarte§! oder in der §SSchnellauswahl§!an.\n\nKlickt auf \"§SErkunden§!\" im Flotten-Interface am linken unteren Bildschirmrand, während Ihr Euch auf der §SGalaxiekarte§! befindet, und klickt anschließend auf ein unerkundetes £system£ §SSystem§!. Macht alternativ einen Rechtsklick auf ein unerkundetes System und wählt \"§SSystem erkunden§!\" aus.\n\nUnser §SForschungsschiff§! wird nun damit beginnen, alle Himmelskörper in diesem System zu untersuchen."
 tutorial_unpause_chain_tooltip: "§STutorial: Pause beenden§! wurde Situationsprotokoll hinzugefügt"
 tutorial_unpause_chain_title: "Tutorial: Pause beenden"
 tutorial_unpause_chain_desc: "Das £science_ship£ §SForschungsschiff§! steht bereit, um die Galaxie zu erkunden, und alles, was noch bleibt, ist die derzeit aktive Pause der Simulation zu beenden. Drückt dafür einfach die £space£ §SLeertaste§! oder benutzt das folgende Symbol in der Leiste am oberen Bildschirmrand:\n\n$tttt$$tttt$$t$£pause_button£\n"
 unpaused_game: "Pause der Simulation beendet"
 system_surveyed: "Nachbarsystem erkundet"
 tutorial_1_tooltip: "§STutorial: Systeme erkunden§! wurde Situationsprotokoll hinzugefügt"
 tutorial_2_chain_title: "Tutorial: Technologie-Forschung"
 tutorial_2_chain_desc: "Wir müssen neue Technologien erforschen. Das §SNeue-Welten-Protokoll§! ermöglicht uns den Bau von £colony_ship£ §SKolonieschiffen§!. Wenn wir unser Reich vergrößern wollen, sollten wir uns schnellstmöglich darauf konzentrieren.\n\nRuft dazu den §STechnologiebildschirm§! auf, indem Ihr im linken Bereich der Oberleiste auf seine Schaltfläche klickt oder §SF4§! drückt. Klickt dann auf \"§SForschung auswählen§!\" und wählt aus den verfügbaren Optionen die zu erforschende Technologie aus."
 tech_1_researched: "Neue-Welten-Protokoll erforscht"
 tech_2_researched: "Weltraumbau erforscht"
 tutorial_2_tooltip: "§STutorial: Technologie-Forschung§! wurde Situationsprotokoll hinzugefügt"
 tutorial_3_chain_title: "Tutorial: Konstruktionsschiff [GetBuildGrowCap]"
 tutorial_3_chain_desc: "Wenn wir die Ressourcen ausbeuten wollen, die unser £science_ship£ §SForschungsschiff§! entdeckt hat, müssen wir erst ein £construction_ship£ §SKonstruktionsschiff§! bauen.\n\nKlickt dazu auf Eure Sternenbasis und wählt dort den Reiter \"§SSchiffswerft§!\" aus. Wählt anschließend das §SKonstruktionsschiff§! aus den verfügbaren Möglichkeiten.\n\nBeachtet, dass zum Baubeginn genügend £alloys£ §SLegierungen§! vorhanden sein müssen."
 construction_ship_built: "Konstruktionsschiff gebaut"
 tutorial_3_tooltip: "§STutorial: Konstruktionsschiff [GetBuildGrowCap]§! wurde dem Situationsprotokoll hinzugefügt"
 tutorial_4_chain_title: "Tutorial: Bergbaustation [GetBuildGrowCap]"
 tutorial_4_chain_desc: "Zum Abbau von £minerals£ §SMineralien§! oder §SStrategischen Ressourcen§! auf einem £planet£ §SPlaneten§! muss man in dessen Umlaufbahn eine £mining_station£ §SBergbaustation§! bauen. Wählt dazu zuerst Euer £construction_ship£ §SKonstruktionsschiff§! aus, indem Ihr es direkt anklickt oder es in der §SSchnellauswahl§! an der rechten Bildschirmseite heraussucht.\n\nNachdem dies geschehen ist, klickt im Flotteninterface des Konstruktionsschiffs auf die Schaltfläche \"§SBergbaustation [GetBuildGrowCap]§!\". Klickt danach auf einen verfügbaren Planeten oder Asteroiden mit Mineralienvorkommen.\n\nBeachtet, dass das [GetBuildingGrowing] einer £mining_station£ §SBergbaustation§! ebenfalls £minerals£ §SMineralien§! kostet. Daher könnt Ihr mit dem Bau erst dann beginnen, sobald Ihr genügend Mineralien angesammelt habt."
 mining_station_built: "Bergbaustation gebaut"
 tutorial_4_tooltip: "§STutorial: Bergbaustation [GetBuildGrowCap]§! wurde dem Situationsprotokoll hinzugefügt"
 tutorial_5_chain_title: "Tutorial: Forschungsstation [GetBuildGrowCap]"
 tutorial_5_chain_desc: "Um die Erforschung neuer Technologien zu beschleunigen, sollte man über jeder Welt, auf der es £physics£ §SPhysik-§!, £society£ §SSozial- §!oder £engineering£ §SIngenieur-§!Ressourcen gibt, £science_ship£ §SForschungsstationen§! bauen.\n\nForschungsstationen funktionieren fast genauso wie £mining_station£ §SBergbaustationen§! - der einzige Unterschied besteht in den Ressourcen, die sie sammeln. Forschungsstationen können keine £minerals£ §SMineralien§! oder £strategic_resource£ §SStrategische Ressourcen§! abbauen.\n\nZum Bau einer solchen Station: Wählt Euer £construction_ship£ §SKonstruktionsschiff§! aus und klickt im Schiffsinterface auf \"§SForschungsstation [GetBuildGrowCap]§!\". Klickt anschließend auf einen verfügbaren £planet£ §SPlaneten§!, Asteroiden oder eine Sonne, wo es Physik-, Sozial- oder Ingenieur-Ressourcen gibt."
 research_station_built: "Forschungsstation gebaut"
 tutorial_5_tooltip: "§STutorial: Forschungsstation [GetBuildGrowCap]§! wurde dem Situationsprotokoll hinzugefügt"
 tutorial_6_chain_title: "Tutorial: Planetare Gebäude"
 tutorial_6_chain_desc: "Unsere Heimatwelt verfügt bereits über eine geringe Menge an £building£ §SGebäuden§!, doch wir sollten in Erwägung ziehen, weitere zu bauen.\n\nWählt dazu Eure Heimatwelt in der §SSchnellauswahl§! aus und öffnet den Reiter \"§SOberfläche§!\". Wählt anschließend einen leeren Gebäudeplatz in einer Zone aus und baut eines der verfügbaren Gebäude. Vorausgesetzt es sind genügend §SRessourcen§! vorhanden, beginnen die Bauarbeiten unverzüglich.\n\nGebäude stellen £job£ §SJobs§! zur Verfügung, produzieren jedoch erst etwas, sobald £pops£ §SBewohner§! diesen Jobs zugewiesen werden. Der Reiter \"§SWirtschaft§!\" bietet eine Übersicht darüber, welche Jobs Eure §SBewohner§! ausüben können."
 building_constructed: "Gebäude gebaut"
 tutorial_6_tooltip: "§STutorial: Planetare Gebäude§! wurde Situationsprotokoll hinzugefügt"
 tutorial_7_chain_title: "Tutorial: Blocker entfernen"
 tutorial_7_chain_desc: "Auf unserer Heimatwelt befinden sich mehrere £blocker£ §SBlocker§!, die den Bau zusätzlicher §SDistrikte§! verhindern und entfernt werden sollten. Ihre Entfernung kostet Zeit und §SRessourcen§!.\n\nKlickt auf die Schaltfläche \"§SBlocker entfernen§!\" auf dem §SBlocker§! selbst, um ihn zu entfernen. Dieser befindet sich im Reiter \"§SVerwaltung§!\".\n\n\n$tttt$$tttt$$tt$£clear_blocker£\n\n\n§SVerschiedene Blocker§! haben unterschiedliche Kosten, technologische Anforderungen und Zeiten, um sie zu entfernen."
 blockers_cleared: "Blocker entfernt"
 tutorial_7_tooltip: "§STutorial: Merkmalsblocker§! wurde Situationsprotokoll hinzugefügt"
 tutorial_8_chain_title: "Tutorial: Systeme erkunden"
 tutorial_8_chain_desc: "Wir müssen unseren Einfluss über unser £system£ §SHeimatsystem§! hinaus ausdehnen. Der erste Schritt hierfür ist die Erkundung der benachbarten Sternensysteme.\n\nWählt dazu Euer £science_ship£ §SForschungsschiff§! aus und klickt in seinem Flotteninterface auf die Schaltfläche \"§SErkunden§!\". Klickt danach unten auf dem Bildschirm auf die Schaltfläche \"§SGalaxiekarte aufrufen§!\" und wählt dort einen der Nachbarsterne Eures eigenen Sterns aus. Das §SForschungsschiff§! fliegt nun zu diesem Sternensystem und erforscht alle dortigen Sternenkörper."
 tutorial_8_poi: "Ziele erkunden"
 tutorial_8_poi_desc: "Erkundet die Systeme §S[survey_target_1.GetName]§!, §S[survey_target_2.GetName]§! und §S[survey_target_3.GetName]§!."
 systems_surveyed: "Systeme erkundet"
 tutorial_8_tooltip: "§STutorial: Systeme erkunden§! wurde Situationsprotokoll hinzugefügt"
 tutorial_9_chain_title: "Tutorial: Forschungsschiff [GetBuildGrowCap]"
 tutorial_9_chain_desc: "Wir sollten in Betracht ziehen, ein zweites £science_ship£ §SForschungsschiffs§! [GetBuildGrow], um die Erkundung der Galaxie voranzutreiben.\n\nKlickt dazu auf Eure Sternenbasis und wählt dort den Reiter \"§SSchiffswerft§!\" aus. Wählt anschließend das §SForschungsschiff§! aus den verfügbaren Möglichkeiten aus.\n\nBeachtet, dass genügend £alloys£ §SLegierungen§! vorhanden sein müssen."
 science_ship_built: "Forschungsschiff gebaut"
 tutorial_9_tooltip: "§STutorial: Zweites Forschungsschiff [GetBuildGrowCap]§! wurde dem Situationsprotokoll hinzugefügt"
 tutorial_10_chain_title: "Tutorial: Wissenschaftler rekrutieren"
 tutorial_10_chain_desc: "Wir brauchen einen £scientist£ §SWissenschaftler§!, der unser £science_ship£ §SForschungsschiff§! befehligt. Ohne diesen ist es nicht möglich, §SAnomalien§! zu erkunden oder zu erforschen.\n\nWählt ein neues §SForschungsschiff§! aus und klickt anschließend auf das Porträt im Flotten-Interface, um das Fenster zum §SAuswählen eines Anführers§! zu öffnen, in dem alle §SWissenschaftler§! angezeigt werden, die derzeit in unseren Diensten stehen oder von uns rekrutiert werden können. Wählt einen beliebigen Kandidaten aus der Liste aus.\n\nDas Rekrutieren eines Anführers kostet £unity£ §Y Einigkeit§!. Eventuell müsst Ihr etwas warten, bis genug im Lager ist.\n\nSobald der Anführer rekrutiert wurde, kann das §SForschungsschiff§! mit der Erkundung der Galaxie beginnen."
 scientist_assigned: "Wissenschaftler rekrutiert"
 tutorial_10_tooltip: "§STutorial: Wissenschaftler rekrutieren§! wurde Situationsprotokoll hinzugefügt"
 tutorial_11_chain_title: "Tutorial: Kolonieschiff [GetBuildGrowCap]"
 tutorial_11_chain_desc: "Die Zeit zur Kolonisation anderer Welten ist gekommen. Dazu müssen wir zuerst ein £colony_ship£ §SKolonieschiff§! [GetBuildGrowCap]. Das [GetBuildingGrowing] dieser §SSchiffe§! dauert lang und erfordert eine große Menge an £alloys£ §SLegierungen§!, £food£ §SNahrung§! und £consumer_goods£ §SKonsumgütern§!, aber eine blühende £colony£ §SKolonie§! zahlt diese Investition mehr als nur zurück.\n\nKlickt zuerst auf Eure §SSternenbasis§! und öffnet den Reiter \"§SSchiffswerft§!\". Wählt dort \"§SKolonieschiff§!\" aus den verfügbaren Möglichkeiten aus.\n\nBeachtet, dass genügend Ressourcen vorhanden sein müssen, bevor der Bau beginnen kann."
 colony_ship_built: "Kolonieschiffe gebaut"
 tutorial_11_tooltip: "§STutorial: Kolonieschiff [GetBuildGrowCap]§! wurde dem Situationsprotokoll hinzugefügt"
 tutorial_12_chain_title: "Tutorial: Kolonie aufbauen"
 tutorial_12_chain_desc: "Wir sollten unser neues £colony_ship£ §SKolonieschiff§! nun zum Aufbau unserer ersten £colony£ §SKolonie§! benutzen. Die besten planetaren Kandidaten für dieses Unterfangen sind Planeten derselben Planetenklasse wie unsere Heimatwelt - unsere Kolonisten werden dort keine Schwierigkeiten haben, sich an die Umweltbedingungen anzupassen.\n\nKlickt zur Kolonisation eines £planet£ §SPlaneten§! auf Euer §SKolonieschiff§! oder wählt es in der §SSchnellauswahl§! aus. Klickt in seinem Flotteninterface auf die Schaltfläche \"§SKolonisieren§!\" und wählt den Planeten aus, den Ihr kolonisieren möchtet. Beachtet, dass Ihr nur Planeten kolonisieren könnt, die zuvor erkundet wurden, auf denen es keine §SAnomalien§! gibt und die sich innerhalb unserer Grenzen befinden. Ihr könntet zwar auch Planeten mit niedriger Bewohnbarkeit kolonisieren, allerdings könnte dies sehr teuer werden."
 colony_established: "Kolonie aufgebaut"
 tutorial_12_tooltip: "§STutorial: Kolonie aufbauen§! wurde Situationsprotokoll hinzugefügt"
 tutorial_13_chain_title: "Tutorial: Gouverneur rekrutieren"
 tutorial_13_chain_desc: "Zur Verwaltung unserer neuen £colony£ §SKolonie§! sollten wir einen §SPlanetengouverneur§! rekrutieren. Klickt dazu auf die Kolonie und ruft dort den Reiter \"§SPlanetenzusammenfassung§!\" auf. Klickt danach im Fenster \"§SGouverneur§!\" auf die Schaltfläche \"§SÄndern§!\". Dadurch wird der Bildschirm \"§SAnführer§!\" aufgerufen, wo Ihr die Gouverneure sehen könnt, die derzeit für uns arbeiten.\n\nKlickt im oberen Bildschirmteil auf die Schaltfläche \"§SRekrutieren§!\" und wählt dort einen der verfügbaren Kandidaten aus. Beachtet, dass die Rekrutierung von Anführern immer £unity £ §YEinigkeit§! kostet. Fehlt uns der benötigte Betrag, müssen wir so lang warten, bis wir genügend angesammelt haben, um uns den Anführer zu leisten.\n\nNach seiner Rekrutierung wartet der neue Gouverneur auf unserer Heimatwelt auf neue Aufgaben."
 governor_recruited: "Gouverneur rekrutiert"
 tutorial_13_tooltip: "§STutorial: Gouverneur rekrutieren§! wurde Situationsprotokoll hinzugefügt"
 tutorial_14_chain_title: "Tutorial: Weitere Kolonien aufbauen"
 tutorial_14_chain_desc: "Erweitert Euer Reich auch weiterhin durch die Gründung neuer £colony£ §SKolonien§!. Sorgt für einen stetigen Nachschub an £colony_ship£ §SKolonieschiffen§!, wenn genügend £alloys£ §SLegierungen§!, £food£ §SNahrung§! und £consumer_goods£ §SKonsumgüter§! dafür vorhanden sind, und schickt sie los, um neue Kolonien zu gründen.\n\nAchtet darauf, nicht zu viele Kolonien gleichzeitig aufzubauen, da diese bis zu ihrer Eigenständigkeit £energy£ §SEnergie-Credits§! kosten."
 colonies_established: "Kolonien aufgebaut"
 tutorial_14_tooltip: "§STutorial: Weitere Kolonien aufbauen§! wurde Situationsprotokoll hinzugefügt"
 tutorial_15_chain_title: "Tutorial: Ressourcenproduktion"
 tutorial_15_chain_desc: "Unsere wachsende Industrie hat einen starken Bedarf an Rohmaterialien, weshalb wir unseren £minerals£ §SMineralien§!-Nachschub steigern müssen. Wir können dies schaffen, indem wir £mining_station£ §SBergbaustationen§! über £planet£ §SPlaneten§! und Asteroiden mit Mineralienvorkommen [GetBuildGrowCap], oder indem wir §SBergbau-Distrikte§! auf der Oberfläche bewohnter Planeten errichten.\n\nDa sowohl Stationen als auch £building£ §SGebäude§! im Unterhalt £energy£ §SEnergie-Credits§! kosten, sollten wir auch für ausreichenden Nachschub bei dieser Ressource sorgen. Energie-Credits werden von §SGenerator-Distrikten§! auf der Oberfläche unserer bewohnten Planeten produziert. §SBergbaustationen§!, die man über Planeten, Asteroiden oder Sonnen baut, die über Energie-Credit-Vorkommen verfügen, liefern ebenfalls Energie-Credits."
 mineral_income: "+30 Mineralien/Monat"
 credit_income: "+10 Energie/Monat"
 tutorial_15_tooltip: "§STutorial: Ressourcenproduktion§! wurde Situationsprotokoll hinzugefügt"
 tutorial_16_chain_title: "Tutorial: Flotte vergrößern"
 tutorial_16_chain_desc: "Wir sollten eine schlagkräftige Sternenflotte [GetBuildGrowCap], um die Vormachtstellung von [Root.GetName] aufrechtzuerhalten.\n\nEin paar weitere §SKorvetten§! sollten fürs Erste reichen. Diese können in einer §SSternenbasis§! [GetBuildingGrowingCap] werden, wenn es unsere §SLegierungsvorräte§! erlauben. Neue Militärschiffe schließen sich immer bestehenden Flotten im Orbit der §SSternenbasis§! an, auf der sie [GetBuildGrow] werden.\n\nUm die militärische Macht einer Flotte zu optimieren, können wir ihr einen §SAdmiral§! zuweisen. Dies würde ihr einen Vorteil gegenüber feindlichen Flotten verschaffen, die oft selbst keinen £commander£ §SKommandanten§! haben."
 corvettes_built: "Korvetten gebaut"
 admiral_assigned: "Kommandant zugewiesen"
 tutorial_16_tooltip: "§STutorial: Flotte vergrößern§! wurde Situationsprotokoll hinzugefügt"
 tutorial_17_chain_title: "Tutorial: Sektor aufbauen"
 tutorial_17_chain_desc: "Die Anzahl an £planet£ §SPlaneten§!, die wir direkt kontrollieren können, ist begrenzt. Diese Begrezung findet man in der Leiste oben auf dem Bildschirm. Ein Überschreiten führt zu Abzügen. §SSektoren§! sind teilautonom und verwalten die Planeten, die ihrer Kontrolle unterstellt wurden. Öffnet die Ansicht \"§SPlaneten und Sektoren§!\", indem Ihr in der Dropdown-Liste in der Oberleiste auf das zugehörige Symbol klickt oder §SF5§! drückt, um einen neuen Sektor zu erstellen. Klickt dann oben rechts auf die Schaltfläche \"§SNeuen Sektor erstellen§!\".\n\nDies ruft den §SSektorverwaltungsmodus§! auf. Hier kann man festlegen, welche £system£ §SSternensysteme§! zum neuen Sektor gehören sollen. Alle Planeten in diesen Systemen fallen unter die Gerichtsbarkeit des Sektors. Wählt ein System aus, in dem wir eine Kolonie besitzen, und klickt auf die Schaltfläche \"§SAbschließen§!\". Unser erster Sektor wurde nun eingerichtet!"
 sector_established: "Sektor aufgebaut"
 tutorial_17_tooltip: "§STutorial: Sektor aufbauen§! wurde Situationsprotokoll hinzugefügt"
 tutorial_18_chain_title: "Tutorial: Sektorgouverneur"
 tutorial_18_chain_desc: "Wir sollten unserem neuen §SSektor§! einen §SGouverneur§! zuweisen. Alle £planet£ §SPlaneten§! innerhalb des Sektors werden von den Fähigkeiten und Eigenschaften des Gouverneurs profitieren."
 sector_governor_assigned: "Sektorgouverneur"
 tutorial_18_tooltip: "§STutorial: Sektorgouverneur§! wurde Situationsprotokoll hinzugefügt"
 tutorial_19_chain_title: "Tutorial: Schiff entwerfen"
 tutorial_19_chain_desc: "Öffnet den §SSchiffsdesigner§!, indem Ihr auf \"§SFlottenverwaltung§!\" in der linken Seitenleiste klickt, oder benutzt §SF9§!. Klickt auf die Schaltfläche \"§SNeues Design§!\" und wählt \"§SKorvette§!\" aus, sobald Ihr dazu aufgefordert werdet, eine §SRumpfgröße§! auszuwählen. Klickt auf \"§SKeine Sektion§!\" und wählt eine §SSektion§! für das Design aus.\n\nKorvetten sind die kleinsten Kriegsschiffe und verfügen nur über eine einzige Sektion, wohingegen größere Schiffe mehrere haben. Sektionen legen fest, welche §SWaffen-§! und §SHilfsmittelplätze§! verfügbar sind. Wählt einen aus und füllt den Platz mit Komponenten. Stellt sicher, dass die Schiffsenergie dabei positiv bleibt.\n\nUm den Prozess zu vereinfachen, könnt Ihr das Schiff auch §Sautomatisch zusammenstellen§! lassen. In diesem Fall legt das Spiel den Rest des Designs fest."
 ships_designed: "Schiffsdesign erstellt"
 tutorial_19_tooltip: "§STutorial: Schiff entwerfen§! wurde Situationsprotokoll hinzugefügt"
 tutorial_20_chain_title: "Tutorial: Beobachtungsposten"
 tutorial_20_chain_desc: "Wir sollten einen §SBeobachtungsposten§! über der Heimatwelt einer §S[Owner.GetPreFTLLower]§! [GetBuildGrowCap]. Diese Raumstationen können eine Anzahl verschiedener §SMissionen§! ausführen. Die verfügbaren Missionen werden abhängig davon festgelegt, ob wir uns in aufstrebende Kulturen einmischen wollen oder nicht.\n\nDer Bau von Beobachtungsposten erfolgt wie der von £mining_station£ §SBergbau§!- oder £science_ship£ §SForschungsstationen§!. Man kann sie allerdings nur über den Heimatwelten von [Owner.GetPreFTLLowerPlural] errichten. Wählt einfach ein £construction_ship£ §SKonstruktionsschiff§! aus und klickt dann im Flotten-Interface auf \"§SBeobachtungsposten [GetBuildGrowCap]§!\".\n\nWählt nun die Heimatwelt der [Owner.GetPreFTLLower] aus, die Ihr studieren möchtet. Das Konstruktionsschiff beginnt dann seinen Einsatz."
 observation_post_built: "Beobachtungsposten gebaut"
 tutorial_20_tooltip: "§STutorial: Beobachtungsposten§! wurde Situationsprotokoll hinzugefügt"
 tutorial_21_chain_title: "Tutorial: Strategische Ressourcen"
 tutorial_21_chain_desc: "Wir sollten in der Umlaufbahn eines astronomischen Objekts mit einer £strategic_resource£ §SStrategischen Ressource§! eine £mining_station£ §SBergbaustation§! [GetBuildGrowCap]. Diese seltenen Materialien haben einen enormen strategischen Wert.\n\nNachdem solche Ressourcen durch die §SErkundung§! gefunden wurden: Wählt ein £construction_ship£ §SKonstruktionsschiff§! aus und klickt auf die Schaltfläche \"§SBergbaustation [GetBuildGrowCap]§!\" und dann auf das entsprechende astronomische Objekt."
 tutorial_21b_chain_title: "Information: Strategische Ressourcen"
 tutorial_21b_chain_desc: "Wir haben in der Umlaufbahn eines astronomischen Objekts mit einer £strategic_resource£ §SStrategischen Ressource§! eine £mining_station£ §SBergbaustation§! gebaut. Wir fanden dies erst heraus, nachdem wir von der Ressource selbst erfahren hatten. Der Abbau dieser seltenen Materialien erfordert zwar bestimmte Technologien, doch sie verfügen über einen immensen strategischen Wert, und wir sollten versuchen, noch mehr von ihnen zu finden."
 strategic_resource_extracted: "Strategische Ressource extrahiert"
 tutorial_21_tooltip: "§STutorial: Strategische Ressourcen§! wurde Situationsprotokoll hinzugefügt"
 tutorial_22_chain_title: "Tutorial: Beinahe vernunftbegabte Spezies aufwerten"
 tutorial_22_chain_desc: "Wir sollten eine niedere Spezies §Saufwerten§!, müssen aber eventuell vorher noch die Technolgie §SEpigenetische Auslöser§! erforschen.\n\n§SWertet§! eine beinahe vernunftbegabten Spezies §Sauf§!, indem Ihr ihren Eintrag in der §SSpezies§!-Anicht auswählt und dann auf \"aufwerten\" klickt."
 tutorial_22_tooltip: "§STutorial: Beinahe vernunftbegabte Spezies aufwerten§! wurde Situationsprotokoll hinzugefügt"
 species_uplifted: "Beinahe vernunftbegabte Spezies aufgewertet"
 tutorial_23_chain_title: "Tutorial: Erstkontakt"
 tutorial_23_chain_desc: "Nachdem wir in der schwarzen Tiefe des Weltraums unbekannte Entitäten angetroffen haben, sollten wir die §SKontaktaufnahme§! wagen.\n\nDies geschieht durch den §SErstkontakt§!, der im §SSituationsprotokoll§! zu finden ist. Klickt dort auf die Schaltfläche \"§SErstkontakt anzeigen§!\". Klickt alternativ auf das Symbol des §SErstkontakts§! auf der §SGalaxiekarte§!, um den Erstkontakt direkt zu öffnen.\n\n\n$tttt$$tttt$$ttt$£firstcontact£\n"
 contact_made: "Kontakt hergestellt"
 tutorial_23_tooltip: "§STutorial: Erstkontakt§! wurde dem Situationsprotokoll hinzugefügt"
 tutorial_24_chain_title: "Tutorial: Spezies modifizieren"
 tutorial_24_chain_desc: "Wir können jede vernunftbegabte Spezies in unserem Reich §Smodifizieren§!, sofern wir genügend §SEigenschaftspunkte§! dafür haben.\n\nÖffnet zuerst den \"§SSpezies§!\"-Bildschirm und dort dann das Menü \"§SModifizieren§!\". Erforscht danach das entsprechende §SSpezialprojekt§!. Das Projekt benötigt £society£ §SSozial-Forschung§! und wird unseren gesamten Technologiefortschritt in diesem Feld auf sich selbst abzweigen, solange es aktiv ist."
 species_modified: "Spezies modifiziert"
 tutorial_24_tooltip: "§STutorial: Spezies modifizieren§! wurde Situationsprotokoll hinzugefügt"
 tutorial_25_chain_title: "Tutorial: System beanspruchen"
 tutorial_25_chain_desc: "Wir können unsere Grenzen um fremde Sterne erweitern, indem wir neue §SSternenbasen§! [GetBuildGrowCap]. Dies beansprucht das £system£ §SSystem§! für uns, gewährt uns Zugang zu dessen Ressourcen und verhindert, dass andere hindurchfliegen können, wenn wir die Grenzen geschlossen haben.\n\nWählt ein £construction_ship£ §SKonstruktionsschiff§! aus, klickt im Flotten-Interface auf \"§SSternenbasis [GetBuildGrowCap]§!\" und macht anschließend einen Linksklick auf einen Stern. Alternativ könnt Ihr auch einen Rechtsklick auf einen Stern machen und dort \"§SSternenbasis [GetBuildGrowCap]§!\" auswählen.\n\nIm Gegensatz zu anderen Orbitalstationen kann man §SSternenbasen§! auch außerhalb der eigenen Grenzen bauen."
 frontier_outpost_built: "Sternenbasis gebaut"
 tutorial_25_tooltip: "§STutorial: Sternenbasen§! wurde Situationsprotokoll hinzugefügt"
 TUTORIAL_PLANETVIEW_MANAGEMENT_TITLE: "Tutorial: Verwaltung"
 TUTORIAL_PLANETVIEW_MANAGEMENT_DESC: "Der Reiter \"§SVerwaltung§!\" bietet wichtige Informationen über den Zustand und die Beschaffenheit eines £planet£ §SPlaneten§!.\n\nIn der Sektion \"§SPlanetare Merkmale§!\" werden alle natürlichen £blocker£ §SBlocker§! angezeigt, die man entfernen kann, sowie andere planetare §SMerkmale§!.\n\nDie Sektion über die §Sderzeitige Bevölkerung§! bietet einen Überblick über alle £pops£ §SBewohner§! auf dem £planet£ §SPlaneten§!.\n\nDie £sector£ §SSektorensektion§! erlaubt es, den Planeten einem §SSektor§! hinzuzufügen, damit er automatisch verwaltet wird.\n\nDer §SKolonieaufstieg§! erlaubt es, §SPlaneten§! zu verbessern, sofern die benötigten Ressourcen vorhanden sind."
 TUTORIAL_DATABANK_TITLE: "Tutorial: Datenbank"
 TUTORIAL_DATABANK_DESC: "Die £databank£ §SDatenbank§! enthält Erklärungen zu verschiedenen Spielsystemen.\n\nEinträge sind in Kategorien organisiert, um die Suche nach bestimmten Mechaniken, §SInhalten§! oder Konzepten zu vereinfachen.\n\nSucht einfach nach einem Thema oder klickt es in der Liste an, um mehr darüber zu erfahren."
 TUTORIAL_EMPIRE_FOCUS_TIMELINE_TITLE: "Tutorial: Fokus und Zeitlinie"
 TUTORIAL_EMPIRE_FOCUS_TIMELINE_DESC: "Das System des £focus_core£ §SReichsfokus§! hilft Euch dabei, die Richtung Eures Reichs durch die Auswahl einer Priorität zu lenken: £focus_exploration£ §SErkundung§!, £focus_conquest£ §SEroberung§! oder £focus_development£ §SEntwicklung§!.\n\nJeder Fokus enthält eine Reihe von Aufgaben, die auf Grundlage des gewählten Wegs eine Form der Orientierung bieten. Der Abschluss einer Fokuskarte gibt §SFortschrittspunkte§! in der ihr zugehörigen Kategorie.\n\nDer derzeit ausgewählte Fokus erhöht die Wahrscheinlichkeit, Aufgaben aus dieser Kategorie zu erhalten. Karten können neu gewürfelt werden, was allerdings £unity£§SEinigkeit§! kostet, und den Fokus kann man ebenfalls ändern.\n\nDie derzeitigen Ziele können in den Reitern \"§SAbgeschlossen§!\" und \"§SFortschritt§!\" verfolgt werden. Hier gibt es auch eine Übersicht darüber, wie nah Ihr der nächsten Belohnungsstufe seid.\n\nDie §SZeitlinie§! zeigt wichtige Meilensteine und historische Ereignisse in der Geschichte Eures Reichs an, angefangen bei seinem §SUrsprung§!. Neue Einträge tauchen auf, sobald Schlüsselereignisse voranschreiten."
 TUTORIAL_COLONIZATION_TITLE: "Tutorial: Kolonisierung eines Planeten"
 TUTORIAL_COLONIZATION_DESC: "Der Bildschirm \"§SKolonisierung§!\" hilft Euch dabei, die Kolonisierung eines Planeten vorzubereiten.\n\nEine §SSpezies§! muss ausgewählt sein, die den Planeten besiedeln soll, und ein §SKoloniefokus§!, um die Entwicklung vorzugeben.\n\nEine Übersicht über verfügbare §SDistrikte§!, die §SPlanetengröße§! sowie potenzielle §SModifikatoren§! werden hier zusammen mit §Splanetaren Merkmalen§! ebenfalls angezeigt.\n\nDie Entwicklung des §SPlaneten§! basierend auf den natürlichen Ressourcen festzulegen, erlaubt es Euch, das Optimum aus Euren Kolonien herauszuholen."
