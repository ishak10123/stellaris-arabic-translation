l_german:
 SITLOG: "Situationsprotokoll aktualisiert"
 ####################################
 #Advisor Tutorial Messages
 ####################################
 TUTORIAL_GOVERNMENTVIEW_GOVERNMENT_TITLE: "Regierung"
 TUTORIAL_GOVERNMENTVIEW_GOVERNMENT_DESC: "Der Bildschirm §SRegierung§! präsentiert uns Informationen über unser Reich und seine Regierung. Hier sehen wir unseren §SHerrscher§! und alle mit ihm verbundenen Effekte.\n\nEin separater Reiter gibt detaillierte Übersichten über die §SDemographien§! unseres Reiches."
 TUTORIAL_TECH_VIEW_TITLE: "Tutorial: Technologie"
 TUTORIAL_TECH_VIEW_DESC: "Auf dem Bildschirm §STechnologie§! kann man alle Forschungsbemühungen lenken. Technologien sind in drei separate Disziplinen aufgeteilt, in denen üblicherweise jeweils drei verschiedene Forschungsoptionen zur Auswahl stehen.\n\nDie Forschungsdisziplinen sind: £physics£ Physik-, £society£ Sozial- und £engineering£ Ingenieur-Forschung.\n\nZum Erforschen einer §STechnologie§!:\n\n£dot_green£ Auf die Schaltfläche \"§SForschung auswählen§!\" klicken\n£dot_green£ Eine Forschung aus den verfügbaren Optionen auswählen\n\nDie Zuweisung eines §SForschungsleiters§! wird dringend empfohlen, um die Forschungsgeschwindigkeit zu erhöhen. Die §SEigenschaften§! des Forschungsleiters können außerdem zusätzliche Boni bringen.\n\nDie Forschung kann man durch einen Klick auf \"§SAutom. Forschung aktivieren§!\" auch automatisieren.\n\n$tttt$$ttt$£automate_research£\n"
 TUTORIAL_CONTACTSVIEW_EMPIRES_TITLE: "Tutorial: Kontakte"
 TUTORIAL_CONTACTSVIEW_EMPIRES_DESC: "Der Bildschirm §SKontakte§! bietet einen detaillierten Überblick über die verschiedenen §SReiche§!, denen Ihr bereits begegnet seid. Ihr könnt hier auf einen Blick ihre §SMeinungen§! gegenüber Eurem Reich erkennen und schnell und einfach §SDiplomatie§! mit ihnen betreiben.\n\nJeder Eintrag enthält außerdem wichtige Details wie die §SRegierungsart§!, die §SEthik§! und den §SReichsstatus§!.\n\nVon hier aus kann man auch §SSpionageeinsätze§! durchführen und bestehende §SVereinbarungen§! einsehen."
 TUTORIAL_SITUATION_LOG_TITLE: "Tutorial: Situationsprotokoll"
 TUTORIAL_SITUATION_LOG_DESC: "Das §SSituationsprotokoll§! listet alle derzeit verfügbaren §SSpezialprojekte§!, £archaeology£ §SArchäologischen Stätten§! und verschiedene andere interessante Dinge auf.\n\nSobald wir mit der Erkundung der Galaxie beginnen, wird es wahrscheinlich rasch zu Neueinträgen kommen."
 TUTORIAL_SHIP_DESIGNER_TITLE: "Tutorial: Schiffsdesigner"
 TUTORIAL_SHIP_DESIGNER_DESC: "Hier werden alle §SSchiffe§! entworfen, die man in unserem Reich nutzt. Die Erforschung neuer Technologien schaltet neue §SSchiffsrumpfgrößen§! und §SKomponenten§! frei.\n\nZur Erstellung eines neuen §SSchiffsdesigns§!:\n\n£dot_green£ Auf die Schaltfläche \"§SNeues Design§!\" klicken\n£dot_green£ §SRumpfgröße§! auswählen\n£dot_green£ Auf die Schaltfläche \"§SKeine Sektion!§!\" klicken und eine §SSektion§! auswählen\n\nDurch einen Klick auf einen verfügbaren Platz kann man hier nun frei §SSchiffskomponenten§! auswählen.\n\n\n$tttt$$tt$£slot_component£\n\n\nSobald es gespeichert wurde, kann man das neue Design in jeder §SSternenbasis§! mit einer §SSchiffswerft§! bauen."
 TUTORIAL_EMPIREVIEW_PLANETS_TITLE: "Tutorial: Planeten und Sektoren"
 TUTORIAL_EMPIREVIEW_PLANETS_DESC: "Der Bildschirm §SPlaneten und Sektoren§! bietet einen Überblick über alle kolonisierten Welten deren £pops£ §SBewohner§! und §SRessourcenproduktion§!.\n\nWird ein Reich größer, empfiehlt es sich, Welten in §SSektoren§! zu organisieren, um die Verwaltung zu erleichtern.\n\n£vassal£ §SVasallen§! können ebenfalls aus existierenden §SSektoren§! erschaffen werden."
 TUTORIAL_MILITARY_FLEET_TITLE: "Tutorial: Militärflotten"
 TUTORIAL_MILITARY_FLEET_DESC: "§SMilitärflotten§! schützen unser aufstrebendes Reich vor Bedrohungen ... oder erweitern unsere glorreiche Herrschaft mit Waffengewalt, wenn uns danach ist.\n\nDie Größe unserer Flotte hängt von unserer derzeitigen §SFlottenkapazität§! ab, die zu Spielbeginn stark limitiert ist. Sie kann jedoch durch Folgendes erhöht werden:\n\n£dot_green£ Erforschung neuer §STechnologien§!\n£dot_green£ Mehr £pops£ Bewohner\n£dot_green£ Bau von §SSternenbasen-Ankerplätzen§!\n\nWir können einen £commander£ §SKommandanten§! damit beauftragen, eine Flotte zu befehligen, was sie stärker macht und basierend auf den Eigenschaften des £leader£ §SAnführers§! zusätzliche Boni gibt."
 TUTORIAL_SCIENCE_SHIP_TITLE: "Tutorial: Erkundung"
 TUTORIAL_SCIENCE_SHIP_DESC: "Dies ist unser £science_ship£ §SForschungsschiff§!, zu dessen Aufgaben die §SErkundung§! astronomischer Objekte wie £planet£ §SPlaneten§! in einem £system£ §SSternensystem§! gehört. Um die §SRessourcen§! eines Planeten sichtbar zu machen, muss man den Planeten erst erkunden.\n\nUnser Heimatsystem wurde bereits erkundet, weswegen wir uns anderweitig umsehen sollten.\n\nMit ausgewähltem §SForschungsschiff§!:\n\n£dot_green£ Rechtsklick auf ein benachbartes §SSystem§!\n£dot_green£ \"§SSystem erkunden§!\" auswählen"
 TUTORIAL_CONSTRUCTION_SHIP_TITLE: "Tutorial: Konstruktionsschiff"
 TUTORIAL_CONSTRUCTION_SHIP_DESC: "Dies ist unser £construction_ship£ §SKonstruktionsschiff§!, mit dem wir Raumstationen errichten können.\n\nWurde ein astronomisches Objekt wie ein £planet£ §SPlanet§! gefunden, können wir diesem Schiff befehlen, eine £science_ship£ §SForschungsstation§! oder £mining_station£ §SBergbaustation§! zu errichten, um uns die Ausbeutung etwaiger Ressourcen zu ermöglichen.\n\nDiese §SSchiffe§! nutzt man auch, um §SSternenbasen§! in unbeanspruchten £system£ §SSystemen§! [GetBuildGrow], was sie für unsere Expansionspläne entscheidend macht."
 TUTORIAL_PLANETVIEW_PLANET_TITLE: "Tutorial: Oberfläche"
 TUTORIAL_PLANETVIEW_PLANET_DESC: "Der Reiter \"§SOberfläche§!\" bietet einen Überblick über die Infrastruktur und den Status eines £planet£ §SPlaneten§!.\n\nDie Sektion £building£ §SDistrikte und Gebäude§! zeigt bebaute und verfügbare Gebäudeplätze in den entsprechenden Distrikten.\n\n£district£ §SDistrikte§! und §SZonen§! bieten £housing£ §SWohnungen§!, £job£ §SJobs§! und Ressourcen.\n\nDie §SAutomatisierung§! erlaubt es dem Planeten, sich basierend auf einem Schwerpunkt selbst zu entwickeln.\n\nIm oberen Teil des Fensters werden außerdem Informationen zur £stability£ §SStabilität§!, £crime£ §SKriminalität§!, aktive Modifikatoren und der §SGouverneur§! angezeigt."
 TUTORIAL_PLANETVIEW_TILES_TITLE: "Tutorial: Wirtschaft"
 TUTORIAL_PLANETVIEW_TILES_DESC: "Der Reiter \"§SWirtschaft§!\" bietet eine Übersicht über die §SArbeitskraft§! und die £job£ §SJobs§!.\n\nDie Bevölkerung eines £planet£ §SPlaneten§! ist in §SSchichten§! aufgeteilt, die man ausklappen kann, um die verschiedenen Arten von §SJobs§! anzusehen. £pops£ §SBewohner§! füllen eine Schicht je nach Bedarf auf, um ausreichend §SArbeitskraft§! aufrechtzuerhalten.\n\n§SJobs§! verbrauchen und erzeugen Ressourcen.\n\nBewohner benötigen £housing£ §SWohnungen§! und £amenities£ §SDienstleistungen§!.\n\nSollte eines von beiden knapp werden, reduziert dies die £happiness£ §SZufriedenheit§!, was möglicherweise die £stability£ §SStabilität§! beeinträchtigt."
 TUTORIAL_PLANETVIEW_COMBAT_TITLE: "Tutorial: Armeen"
 TUTORIAL_PLANETVIEW_COMBAT_DESC: "Im Reiter \"§SArmeen§!\" kann man die gesamten Bodentruppen auf dem Planeten verwalten. Hier wird außerdem angezeigt, wie viel §SVerwüstung§!, oder Schaden, der £planet£ §SPlanet§! selbst erlitten hat.\n\nNeue §SArmeen§! kann man hier ebenfalls durch die Schaltfläche \"§SRekrutieren§!\" ausheben.\n\n§SEine bestimmte Anzahl an Verteidigungsarmeen§! wird automatisch von £pops£ §SBewohnern§! erzeugt, die in §SJobs§! wie dem eines Vollstreckers oder als [soldier.GetName] arbeiten. Diese £job£ §SJobs§! werden von der planetaren Hauptstadt, £building£ §SPolizeiwachen§! und £building£ §SBollwerken§! geschaffen."
 TUTORIAL_PLANETVIEW_SPACEPORT_TITLE: "Raumhafen"
 TUTORIAL_PLANETVIEW_SPACEPORT_DESC: "Im Reiter §SRaumhafen§! können Flotten im Orbit angesehen und neue Zivilschiffe [GetBuildGrowCap]. Militärschiffe kann man nur in einer §SSternenbasis§! bauen, die mit einer §SSchiffswerft§! ausgestattet ist. Konstruktions-, Forschungs- und §SKolonieschiffe§! baut man allerdings hier.\n\nSelbst wenn wir unsere letzte Sternenbasis verlieren, haben wir immer noch die Mittel, zu expandieren und uns wiederaufzubauen, solange wir mindestens einen bewohnten £planet£ §SPlaneten§! besitzen."
 TUTORIAL_MILITARY_STATION_TITLE: "Militärstationen"
 TUTORIAL_MILITARY_STATION_DESC: "§SMilitärstationen§! sind statische Verteidigungsanlagen, die man zum Schutz wichtiger £planet£ §SPlaneten§! oder strategischer Flugrouten nutzen kannn. Man kann sie allerdings nur innerhalb unserer Grenzen oder in Territorien bauen, für die wir besondere Zugangsrechte besitzen.\n\nIhr solltet jedoch nicht zu viele von ihnen [GetBuildGrowCap], da sie genau wie §SSchiffe§! Unterhalt kosten und damit die Wirtschaft belasten könnten."
 TUTORIAL_RESEARCH_STATION_TITLE: "Tutorial: Forschungsstationen"
 TUTORIAL_RESEARCH_STATION_DESC: "Eine in der Umlaufbahn eines planetaren Körpers gebaute £science_ship£ §SForschungsstation§! sammelt £physics£ §SPhysik-§!, £engineering£ §SIngenieur-§! und £society£ §SSozial§!-Forschungspunkte.\n\nDiese Stationen können nur innerhalb unserer Grenzen errichtet werden und werden nicht benötigt, wenn der £planet£ §SPlanet§! bereits kolonisiert wurde."
 TUTORIAL_MINING_STATION_TITLE: "Bergbaustationen"
 TUTORIAL_MINING_STATION_DESC: "£mining_station£ §SBergbaustationen§! bauen auf dem planetaren Objekt, in dessen Orbit sie sich befinden, £minerals£ §SMineralien§! und £strategic_resource£ §SStrategische Ressourcen§! ab.\n\n§SBergbaustationen§! werden nicht benötigt, um die Ressourcen eines kolonisierten £planet£ §SPlaneten§! abzubauen, und man kann sie nur innerhalb unserer Grenzen bauen."
 TUTORIAL_TRANSPORT_SHIP_TITLE: "Tutorial: Transportschiffe"
 TUTORIAL_TRANSPORT_SHIP_DESC: "Werden §SArmeen§! in den Weltraum beordert, besteigen sie automatisch diese §STransportschiffe§!. Sorgt für adäquaten Begleitschutz dieser verwundbaren Schiffe."
 TUTORIAL_DIPLOMACY_VIEW_TITLE: "Tutorial: Diplomatie"
 TUTORIAL_DIPLOMACY_VIEW_DESC: "Auf dem Bildschirm §SDiplomatie§! kommunizieren wir mit anderen Zivilisationen. Hier können wir unseren Nachbarn unter anderem §SKriege erklären§!, bei ihnen §SSpionagenetze§! aufbauen, §SBündnisse§! mit ihnen schmieden und §SHandelsabkommen§! mit ihnen schließen. Wir können hier außerdem die derzeitige §HInformationsstufe§! einsehen.\n\nEure §SBeziehung§! zu dem ausgewählten Reich wird als eine von fünf Stufen angezeigt, die von Schrecklich bis Hervorragend reichen. Um ein Abkommen zu schließen oder eine Vereinbarung zu treffen, muss die Stufe ausreichend hoch sein.\n\nIhr könnt einem anderen Reich £envoy£ §SGesandte§! zuweisen, um es §Sauszuspionieren§!, §SGeheiminformationen§! zu sammeln, §SBeziehungsanforderungen§! zu umgehen oder die Beziehungen zu ihm zu §Sverbessern§! oder zu §Sverschlechtern§!."
 TUTORIAL_DIPLOMACY_VIEW_TRADE_TITLE: "Tutorial: Handel"
 TUTORIAL_DIPLOMACY_VIEW_TRADE_DESC: "Auf dem Bildschirm §SHandel§! können wir jede Art von §SRessource§!, §SInformationen§! und §SGefallen§! mit anderen Reichen handeln.\n\nGefallen kann man dazu nutzen, um die Bereitschaft eines Reiches zu erhöhen, eine Vereinbarung zu akzeptieren. Man kann sie auch bei einer Abstimmung im Senat der §Hgalaktischen Gemeinschaft§! verwenden, um die eigene diplomatische Bedeutung zu steigern."
 TUTORIAL_DIPLOMACY_VIEW_FEDERATION_TITLE: "Föderationstypen"
 TUTORIAL_DIPLOMACY_VIEW_FEDERATION_DESC: "Der §SFöderationstyp§! bestimmt den Fokus einer £federation£ §SFöderation§!. Jeder Föderationstyp beginnt mit einzigartigen §SEigenschaften und Gesetzen§! und §Sschaltet weitere Eigenschaften frei§!, sobald die Föderation Erfahrung erhält."
 TUTORIAL_DIPLOMACY_VIEW_HIGHINTEL_TITLE: "Tutorial: Hohe Geheiminformationsstufe"
 TUTORIAL_DIPLOMACY_VIEW_HIGHINTEL_DESC: "Wir haben eine §Shohe Informationsstufe§! über dieses Reich und somit Zugang zu viel mehr Informationen.\n\nDie Aufrechterhaltung einer hohen Informationsstufe mit einem Reich stellt sicher, dass wir aktuelle Informationen über seine §SEthik§! und seine §SStaatselemente§!, seine §SBeziehungen§! zu anderen Reichen und seine §STechnologie§!, seine §SWirtschaft§! und seine §Smilitärische§! Macht im Vergleich zu uns haben."
 TUTORIAL_DIPLOMACY_VIEW_LOWINTEL_TITLE: "Tutorial: Niedrige Geheiminformationsstufe"
 TUTORIAL_DIPLOMACY_VIEW_LOWINTEL_DESC: "Unsere §SInformationsstufe§! über dieses Reich sinkt. Wir riskieren, die Informationen zu verlieren, die wir zuvor gesammelt hatten, da Geheiminformationen mit der Zeit §Sveralten§!.\n\nZur Erhöhung der §SInformationsstufe§!:\n\n£dot_green£ Unterhalten von §Sdiplomatischen Abkommen§!\n£dot_green£ £envoy£ §SGesandte§! damit beauftragen, die Beziehungen zu verbessern\n£dot_green£ Einrichten eines §SSpionagenetzes§!\n£dot_green£ Einrichten einer §SBotschaft§! in ihrem Territorium."
 TUTORIAL_PLANETVIEW_ADJACENCY_BONUS_TITLE: "Angrenzungseffekte"
 TUTORIAL_PLANETVIEW_ADJACENCY_BONUS_DESC: "Manche £building£ §SGebäude§! können §SAngrenzungseffekte§! für §SGebäude§! in benachbarten §SFeldern§! verursachen. Dies sollten wir beim Bau neuer Einrichtungen berücksichtigen."
 TUTORIAL_GOVERNMENTVIEW_BUDGET_TITLE: "Budget"
 TUTORIAL_GOVERNMENTVIEW_BUDGET_DESC: "Im Reiter §SBudget§! werden die §SEinnahmen§! und die §SAusgaben§! unseres Reichs in £energy £ Energie-Credits zusammengerechnet. Hier können wir auch eine Vielzahl von Effekten verfolgen, die unsere Wirtschaft beeinflussen."
 TUTORIAL_GOVERNMENTVIEW_DECISIONS_TITLE: "Erlasse"
 TUTORIAL_GOVERNMENTVIEW_DECISIONS_DESC: "Hier kann man reichsweite §SErlasse§! - Praktiken, die sich durch den Einsatz einiger unserer Ressourcen durchsetzen lassen - einsehen und verabschieden.\n\nErlasse haben monatliche Unterhaltskosten, die durch unsere §H$EDICT_FUND$§! oder unsere £unity£ §YEinigkeit§! gedeckt werden können."
 TUTORIAL_GOVERNMENTVIEW_DEMOGRAPHICS_TITLE: "Tutorial: Demografie"
 TUTORIAL_GOVERNMENTVIEW_DEMOGRAPHICS_DESC: "Der Reiter §SDemografie§! zeichnet den Aufbau und die Verbreitung der Bevölkerung unseres Reichs nach.\n\nZudem sind hier die dominanten §SEigenschaften§! unserer £pops£ §SBewohner§! sowie Modifikatoren wie Produktivität und £happiness£ §SZufriedenheit§! und andere wissenswerte Details zu finden."
 TUTORIAL_EMPIREVIEW_LEADERS_TITLE: "Tutorial: Anführer"
 TUTORIAL_EMPIREVIEW_LEADERS_DESC: "Der Reiter \"§SAnführer§!\" bietet einen Überblick über alle £leader£ §SAnführer§! im Reich. Hier kann man auch neue Anführer rekrutieren, entlassen oder verwalten.\n\nDie §SKlasse§! bestimmt über die möglichen Aufgaben im Reich und welche Position im §SRat§! eingenommen werden kann.\n\nDie Liste der §Srekrutierbaren Anführer§! wird regelmäßig aktualisiert. Da unser Reich jedoch nur eine begrenzte Anzahl von Anführern unterhalten kann, sorgt eine Überschreitung der Kapazität dafür, dass die Kosten für ihren Unterhalt erheblich steigen und die gewonnene Erfahrung sinkt. Entlasst überflüssige oder untätige Anführer, um diesen Mali entgegenzuwirken."
 TUTORIAL_EMPIREVIEW_FACTIONS_TITLE: "Tutorial: Fraktionen"
 TUTORIAL_EMPIREVIEW_FACTIONS_DESC: "Der Bildschirm §SFraktionen§! bietet einen Überblick über die politischen Tendenzen der Bevölkerung. Beachtet, dass Veränderungen des gesellschaftspolitischen Klimas §SFraktionen§! auf den Plan rufen könnten. Hier findet Ihr auch Einzelheiten über die Größe von §SFraktionen§!, deren Attraktivität für unsere £pops£ §SBewohner§! und wie zufrieden Letztere sind.\n\n§SFraktionen§! haben §SAnliegen§!, die wichtig für ihre allgemeine §SZustimmung§! sind. Die Richtlinien und Aktionen unserer Nation können diese Gruppierungen zufrieden oder unzufrieden stimmen und somit also zu einem Schub für die Erzeugung von £unity£ §SEinigkeit§! führen. Die Stärke von §SFraktionen§! und die Art ihrer §SAnliegen§! können sich mit unseren Umständen verändern. Bedenkt aber, dass die £happiness£ §SZufriedenheit§! eines §SBewohners§! durch die §SZustimmung§! der §SFraktion§! festgelegt wird, der er angehört.\n\nWir können auch §SFraktionen verwalten§!, um die Beziehung zwischen einer §SFraktion§! und dem Staat zu manipulieren. Das kann sogar so weit gehen, dass wir die Ethik einer starken §SFraktion§! übernehmen."
 TUTORIAL_CREATESECTOR_TITLE: "Tutorial: Sektorverwaltung"
 TUTORIAL_CREATESECTOR_DESC: "Um einen §SSektor§! einzurichten, müsst Ihr zuerst einen £planet£ §SPlaneten§! innerhalb Eurer §SGrenzen§! auswählen und auf die Schaltfläche \"§SSektor erstellen§!\" klicken. Das macht den Planeten zur §SSektorhauptwelt§! des neuen Sektors und fügt alle angrenzenden Systeme innerhalb von sechs Hypersprüngen dem Sektor hinzu. Sektoren können den Bau von planetaren £building£ §SGebäuden§! innerhalb ihrer Grenzen automatisieren, wenn diese Option aktiviert ist, und Ihr könnt ihnen Ressourcen zuweisen, was den Bedarf an Mikromanagement erheblich reduziert."
 TUTORIAL_CONTACTSVIEW_SPECIES_TITLE: "Tutorial: Spezies"
 TUTORIAL_CONTACTSVIEW_SPECIES_DESC: "Auf dem Bildschirm §SSpezies§! werden alle Arten nominell intelligenter Wesen aufgeführt, die wir getroffen haben. Wir können die §SSpeziesansicht umschalten§!, um nur Bürger unseres Reichs oder alle bekannten Bewohner der Galaxie anzuzeigen.\n\nWir können hier auch auf Eigenschaften von Spezies zugreifen und sie §Smodifizieren§!, sofern wir technologisch weit genug fortgeschritten dafür sind. Außerdem können wir hier beinahe vernunftbegabte Wesen §Saufwerten§! und für all unsere £pops£ §SBewohner§! §SStandardrechte festlegen§! bzw. je nach Spezies §SRechte festlegen§!."
 TUTORIAL_PLANETVIEW_TERRAFORM_TITLE: "Tutorial: Terraforming"
 TUTORIAL_PLANETVIEW_TERRAFORM_DESC: "Das §STerraforming§! erlaubt es uns, die Umweltbedingungen eines £planet£ §SPlaneten§! zu verändern, um seine Eignung für eine bestimmte §SSpezies§! oder einen bestimmten Zweck zu verbessern."
 TUTORIAL_GENEMODIFICATION_TITLE: "Genmanipulation"
 TUTORIAL_GENEMODIFICATION_DESC: "Wir können diese Spezies genetisch weiterentwickeln und ihre §SEigenschaften§! ändern.\n\nDies wird eine neue Spezies-§SVorlage§! mit den neu ausgewählten Merkmalen erstellen. Bevor sich irgendwelche £pops£ §SBewohner§! dieser Spezies tatsächlich ändern, müsst Ihr auf \"§SVorlage anwenden§!\" klicken. Dies schafft ein neues §SSpezialprojekt§!."
 TUTORIAL_UPLIFTING_TITLE: "Aufwerten"
 TUTORIAL_UPLIFTING_DESC: "Wir können die §SEigenschaften§! dieser intelligenten Tiere modifizieren. Über die Option §SAufwerten§! können wir sie dann in vollständig vernunftbegabte Wesen und produktive Bürger unseres Reichs verwandeln."
 TUTORIAL_SYSTEMVIEW_TITLE: "Systemansicht"
 TUTORIAL_SYSTEMVIEW_DESC: "Dies ist die §SSystemansicht§!, die Detailansicht eines bestimmten £system£ §SSternensystems§!. Hier kann man relativ einfach £planet£ §SPlaneten§!, Raumstationen und Flotten finden."
 TUTORIAL_WORMHOLE_STATION_TITLE: "Wurmlochstation"
 TUTORIAL_WORMHOLE_STATION_DESC: "§SWurmlochstationen§! baut man am Außenrand eines £system£ §SSystems§!, wo sie Risse im Raum-Zeit-Kontinuum in beidseitige Portale zu anderen Sternen verschmelzen. Genial."
 TUTORIAL_OBSERVATION_STATION_TITLE: "Tutorial: Beobachtungsposten"
 TUTORIAL_OBSERVATION_STATION_DESC: "§SBeobachtungsposten§! beherbergen ein Team von £scientist£ §SWissenschaftlern§!, die dort Forschung betreiben und aus der Ferne die §SZivilisationen ohne ÜL-Technologie§! jener £planet£ §SPlaneten§! beobachten, in deren Umlaufbahnen sie sich befinden.\n\nBasierend auf der §SReichsethik§! des eigenen Reichs und den erforschten Technologien könnt Ihr zwischen einer passiven Beobachtung, der kulturellen Beeinflussung, der technologischen Erleuchtung oder sogar der Entführung und Infiltration wählen.\n\nDie Vorgehensweise beeinflusst, wie sich die Zivilisation entwickeln und welche Haltung sie gegenüber Eurem Reich einnehmen wird."
 TUTORIAL_TERRAFORMING_STATION_TITLE: "Terraformingstation"
 TUTORIAL_TERRAFORMING_STATION_DESC: "§STerraformingstationen§! ermöglichen §STerraforming§! der Planeten, in deren Orbit sie sich befinden."
 TUTORIAL_PLANETVIEW_EDICTS_TITLE: "Entscheidungen"
 TUTORIAL_PLANETVIEW_EDICTS_DESC: "Dies sind planetenweite §SEntscheidungen§!, also Methoden oder Anordnungen, die wir durch die Aufwendung eines Teils unserer Ressourcen vorübergehend durchsetzen können.\n\nNeue §SEntscheidungen§! werden verfügbar, wenn wir neue Technologien erforschen und auf neue Situationen treffen."
 TUTORIAL_UNKNOWN_ALIEN_FLEET_TITLE: "Unbekannte"
 TUTORIAL_UNKNOWN_ALIEN_FLEET_DESC: "Dies sind §Sunbekannte Weltraumwesen§!. Durch Abschluss des entsprechenden §SSpezialprojekts§! können wir mehr über sie lernen und vielleicht sogar den §SErstkontakt§! herstellen."
 TUTORIAL_VICTORY_TITLE: "Tutorial: Sieg"
 TUTORIAL_VICTORY_DESC: "Im §SSiegbildschirm§! werden §Sbestimmte Bedingungen§! aufgelistet, nach deren Erfüllung wir streben können. Unser Ziel ist, dass das Vermächtnis unserer Sternennation so lange Bestand hat, wie es intelligentes Leben in der Galaxie gibt."
 TUTORIAL_OUTPOST_STATION_TITLE: "Tutorial: Sternenbasen"
 TUTORIAL_OUTPOST_STATION_DESC: "Dies ist die §SSternenbasis§! unseres Systems. Diese verbesserbaren Stationen kennzeichnen die Eigentumsverhältnisse des Systems und werden meist mit der Produktion von §SSchiffen§! beauftragt.\n\nWir können unsere Reichsgrenzen erweitern, indem wir §SSternenbasen§! in benachbarten Systemen [GetBuildGrowCap].\n\nFeindliche §SSternenbasen§! kann man durch einen Angriff erobern.\n\n§SSternenbasen§! lassen sich durch §SModule§! und £building£ §SGebäude§! spezialisieren und bilden die letzte Verteidigungslinie gegen feindliche Flotten in einem System."
 TUTORIAL_GALAXY_MAP_TITLE: "Galaxiekarte"
 TUTORIAL_GALAXY_MAP_DESC: "Auf der §SGalaxiekarte§! werden große, §Snicht kartographierte Raumbereiche§!, unsere Grenzen und die Territorien aller fremden Zivilisationen angezeigt, mit denen wir Kontakt aufgenommen haben.\n\nAuf der Menüleiste unten rechts können wir auf die Schaltfläche §SDetails-Kartenmodus§! klicken, um auf die Ansichten §SRessourcen§! und §SSensorreichweiten§! umzuschalten."
 TUTORIAL_WAR_GOAL_TITLE: "Kriegsgrund"
 TUTORIAL_WAR_GOAL_DESC: "Wenn wir jemandem den Krieg erklären, müssen wir unserem Feind und auch etwaigen Verbündeten unsere Absichten darlegen. Diese §SKriegsgründe§! legen fest, welche Art von Forderungen wir während Friedensverhandlungen durchsetzen können. Diese Forderungen können von der Abtretung beanspruchter £system£ §SSysteme§! bis hin zur Vasallisierung reichen.\n\nWenn wir dem Feind dieses Ziel präsentieren, erhält er die Gelegenheit, angemessen zu reagieren. Er könnte sofort aufgeben, ein Gegenangebot nebst Waffenstillstand anbieten oder aber für seine Interessen bis zum letzten Mann kämpfen ... oder eben zur letzten Frau, zum letzten Sporenpilz, zum letzten halb vernunftbegabten Pflanzenfresser. Das herauszufinden, macht einen Teil des Vergnügens aus!\n\nWählt den §SKriegsgrund§! aus der Liste aus, um mit ihm einen Krieg zu erklären."
 TUTORIAL_WAROVERVIEW_TITLE: "Kriegsübersicht"
 TUTORIAL_WAROVERVIEW_DESC: "Dieses Fenster gibt einen Überblick über unseren aktuellen Krieg. Jede Seite leidet unter §SKriegsmüdugkeit§!, die abhängig vom Voranschreiten des Krieges ist. Sie bestimmt, wie gewillt die jeweilige Seite ist, ein Friedensabkommen zu unterzeichnen.\n\nWenn die Kriegsmüdigkeit für eine Seite 100% beträgt, kann die andere Seite einen §SStatus Quo§! durchsetzen. Alle im Krieg geführten Gefechte können ebenfalls hier nachvollzogen werden."
 TUTORIAL_STRATEGIC_RESOURCES_TITLE: "Strategische Ressourcen"
 TUTORIAL_STRATEGIC_RESOURCES_DESC: "Auf dem Bildschirm §HStrategische Ressourcen§! werden unsere verfügbaren £strategic_resource£ §Sstrategischen Ressourcen§! mitsamt ihren Effekten katalogisiert.\n\nViele §Sstrategische Ressourcen§! kann man erst dann abbauen und benutzen, sobald bestimmte §STechnologien§! erforscht wurden."
 TUTORIAL_EXPANSION_PLANNER_TITLE: "Tutorial: Expansionsplaner"
 TUTORIAL_EXPANSION_PLANNER_DESC: "Im §HExpansionsplaner§! befinden sich §Sbewohnbare§! £planet£ §SPlaneten§! in der Nähe, die geeignete Kolonisationsziele darstellen könnten. Auf diesem Bildschirm können auch £colony_ship£ §SKolonieschiffe§! [GetBuildingGrowingCap] werden, denen man direkte Befehle erteilen kann.\n\nEhe man einen Planeten kolonisieren kann, muss man ihn erst erkunden und etwaige Anomalien erforschen.\n\nZudem muss man eine §SSternenbasis§! im £system£ §SSystem§! des §SPlaneten§! bauen, damit dieser innerhalb unserer Grenzen liegt."
 TUTORIAL_TRADITIONS_TITLE: "Tutorial: Traditionen"
 TUTORIAL_TRADITIONS_DESC: "Auf dem Bildschirm §HTraditionen§! werden die §STraditionsbäume§! angezeigt, die unserem Reich zur Verfügung stehen.\n\nEin §STraditionsbaum§! muss erst §Sangenommen§! werden, bevor man irgendeine £traditions£ §STradition§! in ihm freischalten kann.\n\nDas §SAnnehmen§! eines §STraditionsbaums§! oder das Freischalten einer bestimmten §STradition§! kostet einen bestimmten Betrag an £unity£ §HEinigkeit§! - und während wir weitere §STraditionen§! freischalten und unser Reich immer mehr wächst, steigt dieser Preis.\n\nZur Annahme eines§STraditionsbaums§!:\n\n£dot_green£ Klickt auf die Schaltfläche \"§SAuswählen§!\"\n£dot_green£ Klickt auf die Schaltfläche \"§SAnnehmen§!\" auf dem bevorzugten Baum\n\nVerfügbare §STraditionen§! werden angezeigt, wenn Ihr den Mauszeiger über den §STraditionsbaum§! bewegt."
 TUTORIAL_TRADITIONS_SELECT_TITLE: "Traditionsbaum freischalten"
 TUTORIAL_TRADITIONS_SELECT_DESC: "Dieser Bildschirm zeigt alle §HTraditionsbäume§! an, die unserem Reich zur Verfügung stehen. Hier kann man auch die £traditions£ §HTraditionen§! eines jeden Baumes sowie die §HAnnahme-§! und §HAbschluss-Effekte§! einsehen.\n\nIch empfehle Euch einige §HTraditionsbäume§!, mit denen Ihr beginnen solltet."
 TUTORIAL_TRADITIONS_NEW_TITLE: "Neuer Baum oder neue Tradition"
 TUTORIAL_TRADITIONS_NEW_DESC: "Wenn Euer Reich über genügend £unity£ §HEinigkeit§! verfügt, könnt Ihr entweder einen §Hneuen Baum§! oder eine £traditions£ §HTradition§! in Eurem zuvor gewählten Baum auswählen."
 TUTORIAL_ASCENSION_PERKS_TITLE: "Tutorial: Aufstiegsvorteile"
 TUTORIAL_ASCENSION_PERKS_DESC: "Die Liste §HAufstiegsvorteile§! zeigt die §SAufstiegsvorteile§!, die wir möglicherweise freischalten können. Manche §SAufstiegsvorteile§! können mit speziellen Voraussetzungen wie §STechnologien§! verbunden sein oder über eine bestimmte Anzahl bereits freigeschalteter §SAufstiegsvorteil-Slots§! verfügen.\n\nEin §HAufstiegsvorteil-Slot§! wird freigeschaltet, wenn alle £traditions£ §HTraditionen§! eines §STraditionsbaums§! angenommen wurden."
 TUTORIAL_SPECIES_RIGHTS_TITLE: "Tutorial: Spezies-Rechte"
 TUTORIAL_SPECIES_RIGHTS_DESC: "Über die Liste §HSpezies-Rechte§! können wir unter anderem die §SStaatsbürgerschaft§! und die §SLebensstandards§! bestimmter Spezies anpassen.\n\nBei Anpassung der §SStandardrechte§! wirken sich diese auf alle £pops£ §SBewohner§! aus, für die zuvor noch keine spezifischen §SSpezies-Rechte§! festgelegt worden waren. Dies betrifft Migranten, Flüchtlinge oder sonstige Neuankömmlinge in unserer Nation."
 TUTORIAL_FLEET_MANAGER_TITLE: "Tutorial: Flottenmanager"
 TUTORIAL_FLEET_MANAGER_DESC: "Im §SFlottenmanager§! können wir Vorlagen für unsere Militärflotten erstellen. Da unsere Flotten immer größer werden, erleichtern diese Vorlagen den schnellen Ersatz von Verlusten."
 TUTORIAL_CLAIMS_VIEW_TITLE: "Tutorial: Ansprüche"
 TUTORIAL_CLAIMS_VIEW_DESC: "Auf dem Bildschirm \"§SAnsprüche§!\" kann man £influence£ §SEinfluss§! einsetzen, um Anspruch auf ein £system£ §SSternensystem§! in fremdem Besitz zu erheben.\n\nEinen Anspruch auf ein §SSystem§! zu haben, gibt uns einen gültigen §SKriegsgrund§! gegen den Besitzer des Systems. Dieser erlaubt es uns, einen Krieg zur Eroberung dieses Systems zu erklären.\n\nIn Kriegen, an denen mehrere Verbündete beteiligt sind, wird das Reich mit dem höchsten §SAnspruch§! auf ein §SSystem§! dasjenige sein, das das System nach erfolgreichem Abschluss des Krieges gewinnt."
 TUTORIAL_ANOMALIES_TITLE: "Tutorial: Anomalien"
 TUTORIAL_ANOMALIES_DESC: "Auf Bildschirm \"§SAnomalien§!\" werden alle noch nicht erforschten §SAnomalien§! aufgelistet, denen wir bei der Erforschung des Weltraums begegnet sind, sowie deren Positionen. Man kann sie durch ein £science_ship£ §SForschungsschiff§!, dem ein £scientist£ §SWissenschaftler§! zugewiesen wurde, untersuchen."
 TUTORIAL_GOVERNMENTVIEW_MARKET_TITLE: "Tutorial: Binnenmarkt"
 TUTORIAL_GOVERNMENTVIEW_MARKET_DESC: "Auf dem £market£ §SMarkt§! können Ressourcen gekauft und verkauft werden. Zu Beginn ist dies nur ein Binnenmarkt, doch sobald genügend Reiche Kontakt zueinander hergestellt haben, kann der §SGalaktische Markt§! gegründet werden.\n\nDurch angesammelten £trade£ §SHandel§! kann man Ressourcen kaufen und verkaufen. Der Preis ändert sich mit jeder Transaktion, was bedeutet, dass der Kauf von Ressourcen den Preis erhöht und der Verkauf den Preis verringert.\n\n§SAutomatische Handelsabkommen§! kann man hier ebenfalls einrichten."
 TUTORIAL_GOVERNMENTVIEW_SLAVE_MARKET_TITLE: "Tutorial: Sklavenmarkt"
 TUTORIAL_GOVERNMENTVIEW_SLAVE_MARKET_DESC: "Alles hat einen Preis, einschließlich Individuen. Auf dem §SSklavenmarkt§! werden £pops£ §SBewohner§! wie Waren gehandelt. Wenn ein Sklavenhandel akzeptiert wird, werden die §SBewohner§! automatisch an den £planet£ §SPlaneten§! Eurer Wahl geliefert. Über die Logistik muss man sich keine Sorgen machen. Der Markt kümmert sich darum ... für einen gewissen Preis versteht sich."
 #TUTORIAL_PLANETVIEW_CORPORATE_TITLE: "Corporation View"
 #TUTORIAL_PLANETVIEW_CORPORATE_DESC: "The corporate tab allows §SMegacorporations§! to build §SBranch Offices§! on the planets of other Empires, provided they have signed the necessary paperwork. Once built, they can view and upgrade their facilities here as well. As we know, large Corporations wish only the best for their customers, events of the 23rd cycle notwithstanding."
 TUTORIAL_GOVERNMENTVIEW_POLICIES_TITLE: "Tutorial: Richtlinien"
 TUTORIAL_GOVERNMENTVIEW_POLICIES_DESC: "Der Reiter §SRichtlinien§! deckt regierungsweite §SRichtlinien§! ab, die weitreichende Auswirkungen auf die Verwaltung unseres Reichs haben.\n\nEs gibt oft einige verschiedene Positionen, die man bei einer bestimmten §SRichtlinie§! auswählen kann. Diese sind allerdings oft durch Technologie oder §SEthik§! limitiert."
 TRADE_VIEW_DESC: "Mit dem Wachstum unseres Reichs wird der §SHandel§! zwischen unseren £planet£ §SPlaneten§! zunehmend zum wichtigsten Teil unserer Wirtschaft. §SSternenbasen§! mit §SHandelsknoten§! sammeln §SHandel§! innerhalb ihres £system£ §SSystems§! und leiten ihn zur §SHauptwelt§! um, wo er in £energy£ §SEnergie-Credits§! umgewandelt wird.\n\nMehr §SHandelsknoten§! zu besitzen, bedeutet, dass eine §SSternenbasis§! auch §SHandel§! von benachbarten Systemen sammeln kann. Reiche Handelsrouten können §SPiraten§! anziehen, denen man wiederum durch Flotten auf §SPatrouille§! sowie durch §SVerteidigungsmodule§! auf §SSternenbasen§! entgegenwirken kann. §SHangar-Module§! sind dafür besonders wirksam."
 PLANETVIEW_CORPORATE_DESC: "Der Reiter \"Unternehmen\" erlaubt es §SMegakonzernen§!, Zweigstellen auf den £planet£ §SPlaneten§! anderer Reiche zu bauen, vorausgesetzt diese haben die notwendigen Unterlagen unterzeichnet. Einmal gebaut können sie hier auch ihre Einrichtungen ansehen und verbessern. Wie wir wissen, wünschen große Unternehmen ihren Kunden nur das Beste, trotz der Ereignisse des 23. Zyklus."
 TUTORIAL_FEDERATION_VIEW_TITLE: "Tutorial: Föderation"
 TUTORIAL_FEDERATION_VIEW_DESC: "Dies ist der §HFöderationsbildschirm§!. Unsere £federation£ §SFöderation§! wird stärker, wenn die Mitglieder eine enge §SKohäsion§! bewahren. Tritt ein neues Mitglied unserer Föderation bei, geht ein Teil der Kohäsion verloren.\n\nIhr könnt der Föderation£envoy£ §SGesandte§! zuweisen, um die Kohäsion zu stärken.\n\nWird unsere Föderation stärker, schalten wir §SEigenschaften§! frei, die unseren gegenseitigen Nutzen erhöhen."
 TUTORIAL_FEDERATION_VIEW_ENVOYS_TITLE: "Tutorial: Föderationsgesandte"
 TUTORIAL_FEDERATION_VIEW_ENVOYS_DESC: "Wenn wir unserer £federation£ §SFöderation§! einen £envoy£ §SGesandten§! zuweisen, verbessert dies die §SKohäsion§! der Föderation. Denkt daran, dass Eure Gesandten limitiert sind. Gesandte, die einer Föderation zugewiesen sind, kann man später allerdings auch wieder anderen §Sdiplomatischen Aktionen§! zuweisen."
 TUTORIAL_FEDERATION_VIEW_MEMBERS_TITLE: "Tutorial: Föderationsmitglieder"
 TUTORIAL_FEDERATION_VIEW_MEMBERS_DESC: "Dies ist die Übersicht über alle §HFöderationsmitglieder§!. Hier sehen wir, wie stark die §SMitglieder§! in verschiedenen Bereichen sind, wie viele £envoy£ §SGesandte§! sie zur Föderation beitragen und welche ihrer §SEthiken§! mit den Föderationsansichten in Konflikt stehen und zu einem Verlust an §SKohäsion§! führen."
 TUTORIAL_FEDERATION_VIEW_NAVY_TITLE: "Föderationsflotte"
 TUTORIAL_FEDERATION_VIEW_NAVY_DESC: "Die §HFöderationsflotte§! wird aus der von allen Mitgliedern aufgegebenen §SFlottenkapazität§! aufgebaut und vom §SFöderationsanführer§! kontrolliert. Alle Mitglieder können £federation£ §SFöderationsschiffe§! bauen und diese zur Flotte beitragen."
 TUTORIAL_FEDERATION_VIEW_LAWS_TITLE: "Tutorial: Föderationsgesetze"
 TUTORIAL_FEDERATION_VIEW_LAWS_DESC: "Eine Änderung der §HFöderationsgesetze§! kann von jedem Mitglied vorgeschlagen werden. Wenn die £federation£ §SFöderation§! ein Gesetz nicht verabschiedet, erhält die Föderation eine §SKohäsionsstrafe§!.\n\nManche Gesetze sind gesperrt und erfordern eine stärkere §SZentralisierung§!, um sie zu entsperren. Die Föderation muss zuerst in ihrer §SStufe aufsteigen§!, um Zugang zu einer höheren Zentralisierung zu erhalten.\n\nSeid jedoch vorsichtig, da eine Steigerung der Zentralisierung zu einer Reduktion der Kohäsion führt."
 TUTORIAL_GALACTIC_COMMUNITY_TITLE: "Tutorial: Galaktische Gemeinschaft"
 TUTORIAL_GALACTIC_COMMUNITY_DESC: "Willkommen in der §HGalaktischen Gemeinschaft§!, in der sich Diplomaten aus der ganzen Galaxie treffen, um mit Hilfe von §SBeschlüssen§! über galaktische Gesetze zu entscheiden.\n\nIhr könnt §Svorgeschlagene Beschlüsse§! in der §SWarteschlange§! auf diesem Bildschirm unterstützen, wodurch Ihr Eure §Sdiplomatische Bedeutung§! zur Gesamtunterstützung hinzufügt.\n\nDer Beschluss mit der größten Unterstützung in der Warteschlange wird zur endgültigen Abstimmung in den §SSenat§! verschoben. Dort wird anschließend darüber abgestimmt, ob er zum §SGalaktischen Gesetz§! werden soll.\n\nBeachtet dabei aber auch den §SGalaktischen Fokus§!, der die Richtung für ein gemeinsames Ziel der Gemeinschaft vorgibt.\n\nZu guter Letzt könnt Ihr hier noch alle Mitglieder sehen und welche §SGalaktischen Modifikatoren§! durch Beschlüsse aktiv sind."
 TUTORIAL_GALACTIC_COMMUNITY_ENVOYS_TITLE: "Tutorial: Gesandte"
 TUTORIAL_GALACTIC_COMMUNITY_ENVOYS_DESC: "£envoy£ §SGesandte§! können der Galaktischen Gemeinschaft zugewiesen werden, um Eure §Sdiplomatische Bedeutung§! zu erhöhen. Gesandte, die der Galaktischen Gemeinschaft zugeordnet sind, kann man zu einem späteren Zeitpunkt auch wieder anderen §SGesandtenaktionen§! zuordnen."
 TUTORIAL_GALACTIC_COMMUNITY_SENATE_TITLE: "Tutorial: Senat"
 TUTORIAL_GALACTIC_COMMUNITY_SENATE_DESC: "Im §HSenat§! stimmt die Galaktische Gemeinschaft darüber ab, ob der Beschluss, der die höchste Unterstützung in der §SWarteschlange§! hatte, verabschiedet oder aufgegeben werden soll. Als Mitglied könnt Ihr mit §SJa§!, §SNein§! oder §SEnthaltung§! abstimmen. Wird der Beschluss verabschiedet, wird er zum §SGalaktischen Gesetz§! und wirkt sich auf alle Mitglieder der Galaktischen Gemeinschaft aus. Sollte man ihn ablehnen, kann er für eine gewisse Zeit nicht erneut vorgeschlagen werden.\n\nReiche, die sich nicht enthalten, erhalten eine §SMeinungssteigerung§! bei Reichen, die mit ihnen gestimmt haben, und eine Meinungsreduktion bei denen, die gegen sie gestimmt haben.\n\nHabt Ihr von anderen Reichen §Sdiplomatische Gefallen§! erhalten, könnt Ihr diese ebenfalls hier verwenden, um Eure §Sdiplomatische Bedeutung§! bei der Stimmabgabe im §SSenat§! zu erhöhen."
 TUTORIAL_GALACTIC_COMMUNITY_RESOLUTIONS_TITLE: "Tutorial: Beschlüsse"
 TUTORIAL_GALACTIC_COMMUNITY_RESOLUTIONS_DESC: "Auf dem Bildschirm für §HBeschlüsse§! findet Ihr eine Liste aller aktuell verabschiedeten Beschlüsse. Ihr könnt einen §Sneuen Beschluss vorschlagen§!, indem Ihr ihn aus einer Beschlusskette auswählt. Das Auswählen kostet £influence£ §SEinfluss§!.\n\nIhr könnt nur den ersten noch nicht verabschiedeten §SBeschluss§! in der Kette vorschlagen, was bedeutet, dass Ihr erst die Grundlage schaffen müsst, bevor Ihr radikalere Beschlüsse vorschlagen könnt. Selbst dann werden allerdings nicht alle Euren Vorschlag unterstützen.\n\nWenn ein §SBeschluss§! verabschiedet wird, kann man den nächsten Beschluss in der Kette für einige Jahre nicht vorschlagen."
 TUTORIAL_GALACTIC_COMMUNITY_COUNCIL_TITLE: "Der Galaktische Rat"
 TUTORIAL_GALACTIC_COMMUNITY_COUNCIL_DESC: "Der §HGalaktische Rat§! wurde gegründet. Eine §SWahl§! wird beginnen und die Mitglieder mit der höchsten diplomatischen Bedeutung erhalten §SRatsposten§!. Die Ratsmitglieder haben eine höhere diplomatische Bedeutung und können einen §SNotfallbeschluss§! vorschlagen, der unverzüglich dem §SSenat§! vorgelegt wird.\n\nDas §SVetorecht§! des Rates kann durch Beschlüsse zur Stärkung des Rates freigeschaltet werden. Ratsmitglieder haben außerdem Zugang zu §Sspeziellen Beschlüssen§!."
 TUTORIAL_EMPIRE_SPRAWL_TITLE: "Tutorial: $EMPIRE_SIZE$"
 TUTORIAL_EMPIRE_SPRAWL_DESC: "Die £empire_sprawl£ §H$EMPIRE_SIZE$§! ist ein Maß für die territoriale Ausdehnung Eures Reichs in Form von kontrollierten £system£ §SSystemen§!, £colony£ §SKolonien§!, £district£ §SDistrikten§! und der Gesamtbevölkerung.\n\nEine hohe Reichsgrößte ist eine Belastung für die §SVerwaltungskapazitäten§! Eures Reichs und erhöht die Kosten von §STechnologien§!, £traditions£ §STraditionen§!, £leader£ §SAnführern§! und §SErlassen§!."
 TUTORIAL_FIRSTCONTACT_VIEW_TITLE: "Tutorial: Gesandten zuweisen"
 TUTORIAL_FIRSTCONTACT_VIEW_DESC: "Wir sind mit einem fremden Wesen in Kontakt gekommen - vielleicht einer im §SWeltraum lebenden Kreatur§! oder einem anderen §SReich§!. Wir können mehr über sie erfahren, indem wir einen §HErstkontakt§! herstellen.\n\nWir müssen dieser Mission einen £envoy£ §SGesandten§! zuweisen. Dieser wird daran arbeiten, eine Verständigung zu ermöglichen und die Sprache zu entschlüsseln, die das Wesen eventuell benutzt.\n\nZur Zuweisung eines §SGesandten§!:\n\n£dot_green£ Auf das Porträt im §SErstkontakt§!-Fenster klicken\n£dot_green£ Einen der verfügbaren §SGesandten§! wählen"
 TUTORIAL_CRISIS_VIEW_TITLE: "Tutorial: Zur Krise werden"
 TUTORIAL_CRISIS_VIEW_DESC: "Wir sind auf dem besten Weg, zur §SKrise§! zu werden. Dieser Weg schaltet spezielle Boni frei, die uns befähigen, zu einer bedrohlicheren Macht innerhalb der Galaxie zu werden.\n\nDas §SKrisen-Interface§! zeigt unsere Ziele an - bestimmte Aktionen, die wir durchführen können, um §S[GetCrisisResource]§! zu erlangen. [GetCrisisResource] schaltet die verschiedenen §SKrisenstufen§! und §SKriseneigenschaften§! frei. Diese erlauben es uns, unser volles Potenzial zu entfalten und auf die Galaxie loszulassen.\n\nMit steigender Krisenstufe könnte sich die Galaktische Gemeinschaft jedoch vereinen und uns zu einer §SBedrohung für die Galaxie§! erklären."
 TUTORIAL_CRISIS_VIEW_LEVEL1_TITLE: "Tutorial: Krisenstufen"
 TUTORIAL_CRISIS_VIEW_LEVEL1_DESC: "Während wir auf dem Pfad, eine §SKrise zu werden§!, voranschreiten und bestimmte Anforderungen erreichen, schalten wir neue Stufen frei. Jede davon bringt unterschiedliche Boni mit sich (wie etwa §SEigenschaften§! und spezielle §SSchiffe§!).\n\nSobald wir §SStufe 5§! erreichen - oder von der Galaktischen Gemeinschaft zur Krise erklärt werden -, stellt sich die gesamte Galaxie gegen uns. Zu diesem Zeitpunkt treten wir in einen §Stotalen Krieg§! gegen die Galaktische Gemeinschaft ein."
 TUTORIAL_DIPLOMACY_VIEW_BUILDING_SPYNETWORK_TITLE: "Tutorial: Spionagenetze"
 TUTORIAL_DIPLOMACY_VIEW_BUILDING_SPYNETWORK_DESC: "Einer unserer £envoy£ §SGesandten§! baut nun ein §SSpionagenetz§! in diesem Reich auf.\n\nDie §SInfiltrationsstufe§! des Spionagenetzes steigt mit der Zeit an, abhängig vom aktuellen §SWert des Spionagenetzes§! und der £empire_sprawl£ §SReichsgröße§! des Ziels. Je größer das Spionagenetz wird, desto mehr §SGeheiminformationen§! erhalten wir über das Ziel. Im Reiter \"§SSpionage§!\" können wir zudem §SSpionageeinsätze§! durchführen.\n\nEin Spionagenetz beginnt zu §Pzerfallen§!, wenn ihm kein Gesandter zugewiesen ist oder wenn seine Existenz durch §SSpionageeinsätze§! aufgedeckt wird."
 TUTORIAL_ESPIONAGE_VIEW_TITLE: "Tutorial: Spionage"
 TUTORIAL_ESPIONAGE_VIEW_DESC: "Der Reiter \"§SSpionage§!\" zeigt, in welchen Reichen unsere £envoy£ §SGesandten§! Spionagenetze aufbauen. Hier könnt Ihr auch auf die §SGeheimstatistik§! zugreifen sowie §SEinsätze§! einsehen und beginnen.\n\nEinsätze können in Reichen durchgeführt werden, in denen wir einen §SGesandten§! haben, der ein Spionagenetz verwaltet. Jede Art von Einsatz erfordert, dass das Spionagenetz eine bestimmte Stufe erreicht hat, bevor die Mission begonnen werden kann."
 TUTORIAL_ESPIONAGE_VIEW_OPERATIONS_TITLE: "Tutorial: Spionageeinsätze"
 TUTORIAL_ESPIONAGE_VIEW_OPERATIONS_DESC: "Da unser Spionagenetzwerk nun eine ausreichende Stufe erreicht hat, können wir §SEinsätze§! gegen das Ziel durchführen. Diese sind in Kategorien eingeteilt, wobei verschiedene Arten von Einsätzen zu unterschiedlichen Ergebnissen führen - einige davon sind gefährlicher als andere.\n\nDie Einsatzkategorien umfassen §S$op_cat_subterfuge$§!, §S$op_cat_manipulation$§!, §S$op_cat_sabotage$§! und §S$op_cat_provocation$§!. Einsätze vom Typ Sabotage und Provokation sind in der Regel anspruchsvoller und ziehen schwerwiegendere §Sdiplomatische Strafen§! nach sich, falls wir dabei erwischt werden."
 TUTORIAL_ESPIONAGE_VIEW_ASSIGN_ASSET_TITLE: "Tutorial: Spionagemittel"
 TUTORIAL_ESPIONAGE_VIEW_ASSIGN_ASSET_DESC: "§SSpionagemittel§! sind Agenten in wichtigen Positionen und Artefakte, die verschiedene Effekte für unsere Spionageaktivitäten bieten. Sie arbeiten innerhalb des Spionagenetzwerks und können Einsätzen zugewiesen werden, wo sie uns neue Möglichkeiten eröffnen oder uns Ärger ersparen.\n\nWir können Spionagemittel durch Ereignisse oder durch den Einsatztyp \"§SMittel beschaffen§!\" erhalten. Hört ein Spionagenetz auf zu existieren, gehen auch die darin enthaltenen Spionagemittel verloren."
 TUTORIAL_MEGASTRUCTURE_CONSTRUCTION_TITLE: "Tutorial: Megastrukturen"
 TUTORIAL_MEGASTRUCTURE_CONSTRUCTION_DESC: "Diese Liste enthält alle £megastructure£ §SMegastrukturen§!, die wir in diesem £system£ §SSonnensystem§! [GetBuildGrowCap] können. Manche Projekte werden erst verfügbar, sobald wir die entsprechende §STechnologie§! entdeckt und erforscht haben.\n\nDie Subroutinen für das \"Meine galaktischen Ambitionen\"-Projekt sind nun vollständig aktiviert, und ich empfehle Euch, diese Gelegenheiten zu ergreifen, um einen bleibenden Eindruck in der Galaxie zu hinterlassen."
 TUTORIAL_ORBITAL_RING_TITLE: "Tutorial: Orbitalring"
 TUTORIAL_ORBITAL_RING_DESC: "§SOrbitalringe§! sind riesige £megastructure£ §SMegastrukturen§!, die einen ganzen £planet£ §SPlaneten§! umschließen. Sie bilden eine effiziente Brücke zwischen dem Weltraum und dem darunter liegenden Planeten und bieten Platz für Einrichtungen wie Schiffswerften, Verteidigungsanlagen und Ressourcenzentren.\n\nIn der Orbitalring-Ansicht kann man £building£ §SGebäude§! und §SModule§! hinzufügen oder entfernen und den Orbitalring auf eine höhere Stufe aufwerten. Durch die Aufwertung erhöht sich die Anzahl an verfügbaren Bauplätzen. Die Stufen sind durch die planetare Infrastruktur begrenzt."
 TUTORIAL_DIPLOMACY_CONFIGURABLE_TERMS_TITLE: "Tutorial: Konfigurierbare Bedingungen"
 TUTORIAL_DIPLOMACY_CONFIGURABLE_TERMS_DESC: "In dieser Ansicht könnt Ihr eine §SVoreinstellung§! für Eure Vereinbarungen wählen und die einzelnen Bedingungen konfigurieren. Jede Voreinstellung bietet eine Reihe von Verantwortlichkeiten und Verpflichtungen für Untertan und Lehnsherr.\n\nIn der Liste der §SBedingungen§! können Änderungen vorgenommen werden, die sich auf die §SLoyalität§! der Reiche auswirken und die Vereinbarung für beide Parteien attraktiver machen."
 TUTORIAL_AGREEMENTS_TITLE: "Tutorial: Vereinbarungsübersicht"
 TUTORIAL_AGREEMENTS_DESC: "Die §SVereinbarungen§!-Ansicht bietet Euch einen Überblick über Eure Untertanen- und Lehnsherrenvereinbarungen. Ihr könnt diesen Bildschirm nutzen, um die §SLoyalität§! der beteiligten Reiche zu verfolgen, §SBesitztümer§! und §SHandel§! zu verwalten und die §SBedingungen§! bestehender Vereinbarungen neu zu verhandeln. Ihr könnt eine Vereinbarung auch ganz beenden, wenn sie nicht länger Euren Wünschen entspricht."
 TUTORIAL_AGREEMENTS_NO_OVERLORD_TITLE: "$TUTORIAL_AGREEMENTS_TITLE$"
 TUTORIAL_AGREEMENTS_NO_OVERLORD_DESC: "$TUTORIAL_AGREEMENTS_DESC$"
 TUTORIAL_AGREEMENTS_HAS_OVERLORD_TITLE: "$TUTORIAL_AGREEMENTS_TITLE$"
 TUTORIAL_AGREEMENTS_HAS_OVERLORD_DESC: "$TUTORIAL_AGREEMENTS_DESC$\n\nUnterworfene Reiche können sich dafür entscheiden, §SSpezialisten§! zu werden. Eine Spezialisierung kann erhebliche Vorteile in den Bereichen der Ressourcenproduktion oder den militärischen Fähigkeiten mit sich bringen, allerdings zum Nachteil von anderen Bereichen.\n\nSpezialisten-Reiche geben außerdem §SLoyalität§!. Solange eine positive Menge an Loyalität aufrechterhalten wird, erhalten Spezialistenreiche Erfahrungspunkte, mit denen sie in höhere Ränge für ihr gewähltes Spezialgebiet aufsteigen können."
 TUTORIAL_HOLDINGS_TITLE: "Tutorial: Besitztümer"
 TUTORIAL_HOLDINGS_DESC_SHARED: "Die Ansicht \"§SBesitztümer§!\" bietet einen Überblick über alle Besitztümer auf diesem £planet£ §SPlaneten§!. Sie ermöglicht es Reichen auch, verschiedene £building£ §SGebäudetypen§! auf den Hauptwelten und £colony£ §SKolonien§! des jeweils anderen zu platzieren. Diese können sich auf Dinge wie Diplomatie, Geheiminformationen und Ressourcenproduktion auswirken."
 TUTORIAL_HOLDINGS_DESC_MEGA_CORP: "Megakonzerne können §SZweigstellen§! auf den Welten anderer Reiche eröffnen, vorausgesetzt, es besteht eine diplomatische Vereinbarung darüber. Wie Ihr sicherlich wisst, wollen Großkonzerne nur das Beste für ihre Kunden - ungeachtet der Ereignisse, die sich im 23. Zyklus zugetragen haben!"
 TUTORIAL_HOLDINGS_DESC_OVERLORD: "§SLehnsherren§! können Besitztümer nutzen, um ihren Einfluss auf die Domäne eines §SUntertanen§!auszudehnen. Viele dieser Besitztümer wirken sich auf die Loyalität aus, und einige sind speziell auf Spezialistenreiche zugeschnitten. Mögliche Verbesserungen können ebenfalls über diesen Bildschirm verwaltet werden."
 TUTORIAL_HOLDINGS_NO_MEGA_CORP_NO_OVERLORD_TITLE: "$TUTORIAL_HOLDINGS_TITLE$"
 TUTORIAL_HOLDINGS_NO_MEGA_CORP_NO_OVERLORD_DESC: "$TUTORIAL_HOLDINGS_DESC_SHARED$"
 TUTORIAL_HOLDINGS_NO_MEGA_CORP_HAS_OVERLORD_TITLE: "$TUTORIAL_HOLDINGS_TITLE$"
 TUTORIAL_HOLDINGS_NO_MEGA_CORP_HAS_OVERLORD_DESC: "$TUTORIAL_HOLDINGS_DESC_SHARED$\n\n$TUTORIAL_HOLDINGS_DESC_OVERLORD$"
 TUTORIAL_HOLDINGS_HAS_MEGA_CORP_NO_OVERLORD_TITLE: "$TUTORIAL_HOLDINGS_TITLE$"
 TUTORIAL_HOLDINGS_HAS_MEGA_CORP_NO_OVERLORD_DESC: "$TUTORIAL_HOLDINGS_DESC_SHARED$\n\n$TUTORIAL_HOLDINGS_DESC_MEGA_CORP$"
 TUTORIAL_HOLDINGS_HAS_MEGA_CORP_HAS_OVERLORD_TITLE: "$TUTORIAL_HOLDINGS_TITLE$"
 TUTORIAL_HOLDINGS_HAS_MEGA_CORP_HAS_OVERLORD_DESC: "$TUTORIAL_HOLDINGS_DESC_SHARED$\n\n$TUTORIAL_HOLDINGS_DESC_MEGA_CORP$\n\n$TUTORIAL_HOLDINGS_DESC_OVERLORD$"
 TUTORIAL_PLANETVIEW_COLONY_GOV_TITLE: "Tutorial: Gouverneur rekrutieren"
 TUTORIAL_PLANETVIEW_COLONY_GOV_DESC: "Zur Unterstützung unserer neuen £colony£ §SKolonie§! sollte ein planetarer §SGouverneur§! die dortigen Bemühungen leiten.\n\nDie meisten unserer Welten werden ohne den Luxus eines §SGouverneurs§! auskommen müssen und erhalten stattdessen nur einen Bonus, der von unserer Regierungsart abhängt, aber ein Gouverneur kann für jene £planet£ §SPlaneten§!, denen er zugewiesen wurde, ein großer Segen sein!\n\nGouverneure können auf die ihnen unterstellten Planeten unterschiedliche Effekte haben, zumeist positive. Diese Effekte richten sich nach den §SEigenschaften§! und der Fähigkeitsstufe des §SGouverneurs§!."
 TUTORIAL_ELECTION_VIEW_TITLE: "Tutorial: Wahlen"
 TUTORIAL_ELECTION_VIEW_DESC: "Im Bildschirm \"§SWahlen§!\" wird der nächste Herrscher unseres Reichs bestimmt.\n\n[TutorialElectionViewTypeSpecific]"
 TUTORIAL_ELECTION_VIEW_DEMOCRACY_NO: "Gültige Kandidaten werden aus Euren derzeitigen £leader£ §SAnführern§! ausgewählt, und sofern Ihr die nötigen Ressourcen übrig habt, könnt Ihr einen Herrscher auch direkt wählen."
 TUTORIAL_ELECTION_VIEW_DEMOCRACY_YES: "Gültige Kandidaten werden aus Euren derzeitigen £leader£ §SAnführern§! ausgewählt und können befördert werden, um ihre Unterstützung zu erhöhen - natürlich auf möglichst demokratische Weise."
 TUTORIAL_EDICTS_AND_POLICIES_TITLE: "Tutorial: Richtlinien & Erlasse"
 TUTORIAL_EDICTS_AND_POLICIES_DESC: "Der Reiter \"§SRichtlinien§!\" umfasst sowohl §SRegierungsrichtlinien§! als auch reichsweite §SErlasse§!, die man durch die Verwendung einiger Ressourcen durchsetzen kann.\n\nEs gibt oft mehrere Standpunkte zu einer bestimmten §SRichtlinie§!, obwohl diese durch unsere Technologie oder §SEthik§! begrenzt sein können.\n\nErlasse haben monatliche Unterhaltskosten, die entweder durch unsere §H$EDICT_FUND$§!, mit £unity£ §SEinigkeit§! oder (manchmal) mit anderen Ressourcen bezahlt werden können."
 TUTORIAL_COUNCIL_VIEW_TITLE: "Tutorial: Rat & Agenden"
 TUTORIAL_COUNCIL_VIEW_DESC: "Auf dem Bildschirm \"§SRat§!\" kann man £leader£ §SAnführer§! ernennen, die uns in die Zukunft führen. Ihre Persönlichkeit und ihre §SEigenschaften§! beeinflussen unser Reich zum Guten wie zum Schlechten. Wir können §SAgenden§! festlegen, um ihre Bemühungen auf einen bestimmten Bereich zu konzentrieren.\n\nEin §SRatsmitglied§! kann jederzeit ernannt oder ersetzt werden und kann auch weiterhin andere Aufgaben gleichzeitig erfüllen (wie beispielsweise ein £science_ship£ §SForschungsschiff§! zu befehligen). Die einzige Ausnahme ist unser Herrscher.[TutorialCouncilViewDlcSpecific]Der Fortschritt einer §SAgenda§! hängt von den Stufen der Ratsmitglieder, unserer $EMPIRE_SIZE$ und in bestimmten Fällen von der Ethik der Ratsmitglieder ab. Endet eine Agenda, kann man sie aktivieren, um eine noch mächtigere Wirkung zu entfalten und Platz für eine neue zu schaffen."
 TUTORIAL_COUNCIL_VIEW_PARAGON_NO: "\n\n"
 TUTORIAL_COUNCIL_VIEW_PARAGON_YES: "\n\nUm weitere §SRatsposten§! freizuschalten, sind zwei Dinge erforderlich: ein passendes §SStaatselement§! und die Erfüllung einer bestimmten Agenda.\n\n"
 TUTORIAL_ASSIGN_COUNCILOR_TITLE: "Tutorial: Ratsmitgliedereigenschaften"
 TUTORIAL_ASSIGN_COUNCILOR_DESC: "Manche £leader£ §SAnführer§! verfügen über §SRatsmitgliedereigenschaften§!. Diese sind oft stärker und haben weitreichende Auswirkungen, werden aber nur aktiv, wenn ein Anführer im Rat ist.\n\n§SRatsposten§! wohnen zudem verschiedene Effekte inne. Je höher die Fertigkeitsstufe eines Anführers ist, desto stärker werden diese Effekte."
 TUTORIAL_LEADER_LEVEL_UP_TITLE: "Tutorial: Anführerfertigkeiten"
 TUTORIAL_LEADER_LEVEL_UP_DESC: "Ein £leader£ §SAnführer§! in unserem Reich hat eine neue §SFertigkeitsstufe§! erreicht! Dies verbessert die Boni und verleiht ihm eine neue Eigenschaft.[TutorialLeaderLevelUpDlcSpecific]Um die verfügbaren §SAnführer§! anzusehen:\n\n£dot_green£ Auf die Schaltfläche \"§S$topbar_button_leaders_name$§!\" auf der linken Seite der Leiste klicken oder §SF5§! drücken\n\n$tttt$$tt$£leaders£\n\nWenn §SAnführer§! älter werden, kann es vorkommen, dass sie auch negative Eigenschaften erhalten. In diesem Fall liegt die logischste Vorgehensweise darin, sie zu ersetzen."
 TUTORIAL_LEADER_LEVEL_UP_PARAGON_NO: "\n\n"
 TUTORIAL_LEADER_LEVEL_UP_PARAGON_YES: "\n\nIn welche Richtung sich ein £leader£ §SAnführer§! entwickeln soll, können wir über seine §SEigenschaften§! bestimmen. Eigenschaften lassen sich auch zu einem späteren Zeitpunkt auswählen und wirken sich nicht auf die fortwährende Entwicklung aus. Nach ein paar Stufen werden §SUnterklassen§! verfügbar, die besondere Boni geben und künftige Eigenschaftsoptionen festlegen.\n\nEigenschaften gibt es in allen möglichen Formen, Stärken und Seltenheiten: Manche können verbessert werden, andere schließen einander gegenseitig aus und wieder andere haben sowohl positive als auch negative Auswirkungen. Doch alle sind in der Regel dauerhaft.\n\n"
