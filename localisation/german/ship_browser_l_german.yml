l_german:
 SHIPSET_LABEL: "Schiffsmodell"
 SHIPSETS_LABEL: "Schiffsmodelle"
 SHIP_GRAPHICS_PREVIEW: "Schiffsklassen ansehen"
 SHIP_GRAPHICS_REQUIRED_DLC: "Benötigter DLC"
 SHIP_GRAPHICS_MISSING_DLC_TOOLTIP: "§GKlicken, um $CULTURE_NAME$e Schiffe anzusehen§!"
 SHIP_GRAPHICS_CAMERA_TRANSFORM_TOOLTIP: "£camera_zoom_in£ Nutzt §GMausrad hoch§!, um heranzuzoomen.\n£camera_zoom_out£ Nutzt §GMausrad runter§!, um herauszuzoomen.\n£camera_rotate£ Klickt mit der §Grechten Maustaste§! auf das Schiffsmodell, haltet die Taste gedrückt und bewegt die Maus hin und her, um das Modell zu rotieren."
 SHIP_GRAPHICS_CORVETTE_DESC: "Die Korvette ist die für ein Reich erste verfügbare militärische Schiffsklasse. Korvetten sind schnell, wendig und billig."
 SHIP_GRAPHICS_FRIGATE_DESC: "Fregatten sind eine fortschrittliche Variante der Korvette, die sich auf den Einsatz von Torpedos spezialisiert hat. Sie sind zwar langsamer und dadurch leichter angreifbar, verursachen aber verheerenden Schaden gegen große Ziele."
 SHIP_GRAPHICS_DESTROYER_DESC: "Zerstörer tauschen die Wendigkeit und Schnelligkeit einer Korvette gegen mehr Feuerkraft und einen stärkeren Rumpf ein."
 SHIP_GRAPHICS_CRUISER_DESC: "Kreuzer sind vielseitig und robust, was sie in die Lage versetzt, Schaden sowohl aufzusaugen als auch auszuteilen."
 SHIP_GRAPHICS_BATTLESHIP_DESC: "Schlachtschiffe sind teuer, aber mächtig. Dank ihrer großen Feuerreichweite sind sie hervorragend dazu geeignet, einem Gegner zuzusetzen, noch ehe dieser zurückschlagen kann."
 SHIP_GRAPHICS_TITAN_DESC: "Obwohl sie für sich allein genommen bereits unermesslich mächtig sind, können Titanen zudem ihre Aura-Fähigkeiten nutzen, um befreundete Schiffe zu stärken."
 SHIP_GRAPHICS_BIO_TITAN_DESC: "$SHIP_GRAPHICS_TITAN_DESC$"
 SHIP_GRAPHICS_JUGGERNAUT_DESC: "Der Bau eines Juggernauts ist für jedes Reich ein großes Unterfangen. Diese gewaltigen Schiffe fungieren sowohl als mobile Werften als auch als Versorgungseinheiten."
 SHIP_GRAPHICS_COLOSSUS_DESC: "Diese riesigen Schiffe sind nicht für den Kampf gegen feindliche Flotten ausgerüstet, sondern haben stattdessen die Aufgabe, ganze Welten zu neutralisieren."
 SHIP_GRAPHICS_OUTPOST_DESC: "Ein Außenposten ist die unterste Stufe einer Sternenbasis, die kaum eine andere Funktion hat, als den Besitz eines Sternensystems zu markieren."
 SHIP_GRAPHICS_STARBASE_CITADEL_DESC: "Eine Zitadelle ist die höchste ausbaufähige Stufe einer Sternenbasis. Ausgestattet mit immensen Verteidigungsanlagen ist eine Zitadelle für jeden Feind eine harte Nuss, die es zu knacken gilt."
 SHIP_GRAPHICS_TRANSPORT_DESC: "Transportschiffe befördern Armeen, um feindliche Planeten während eines Krieges anzugreifen. Da sie ungepanzert und unbewaffnet sind, benötigen sie eine unterstützende Flotte, wenn sie sich auf feindlichem Territorium befinden."
 SHIP_GRAPHICS_SCIENCE_DESC: "Forschungsschiffe werden in erster Linie zur Erkundung neuer Sternensysteme und zur Erforschung von Anomalien eingesetzt. Als zivile Schiffe sind sie ungepanzert und verwundbar."
 SHIP_GRAPHICS_CONSTRUCTOR_DESC: "Konstruktionsschiffe sind für den Bau einer jeden Raumstation notwendig. Als zivile Schiffe sind sie ungepanzert, unbewaffnet und verwundbar."
 SHIP_GRAPHICS_COLONIZER_DESC: "Kolonieschiffe befördern Siedler zur Besiedlung neuer Planeten durchs All. Als zivile Schiffe sind sie ungepanzert, unbewaffnet und verwundbar."
 SHIP_GRAPHICS_SHIP_SIZE_LOCKED_DESC: "§RDiese Schiffsklasse benötigt den DLC $SHIP_SIZE_NAME$.§!"
 SHIP_GRAPHICS_ION_CANNON_DESC: "Eine massive Verteidigungswaffe, die verheerende Energieimpulse verschießt, um feindliche Schiffe lahmzulegen. Sie ist zwar langsam, aber stark genug, um unerwünschte Besucher abzuschrecken."
 SHIP_GRAPHICS_MILITARY_STATION_SMALL_DESC: "Verteidigungsplattformen sind stationäre Weltraumfestungen, die Sternenbasen vor feindlichen Angriffen schützen."
 SHIP_GRAPHICS_STARBASE_DEEP_SPACE_CITADEL_1_DESC: "Eine Orbitalstation, die als erste Verteidigungslinie dient. Sie wurde entwickelt, um Macht zu projizieren und strategische Orte zu sichern."
 SHIP_GRAPHICS_STARBASE_DEEP_SPACE_CITADEL_2_DESC: "Eine fortschrittliche Festung mit zahlreichen Waffenstellungen und Verteidigungssystemen. Ideal für längere Gefechte geeignet und um Flotten in umkämpften Raumbereichen zu unterstützen."
 SHIP_GRAPHICS_STARBASE_DEEP_SPACE_CITADEL_3_DESC: "Der Gipfel aller Weltraumfestungen. Diese riesige Orbitalstation ist ein nahezu uneinnehmbares Bollwerk und hält selbst den stärksten Angriffen stand. Gleichzeitig übt sie volle Kontrolle über die Systemlogistik aus."
 SHIP_SIZE_SELECTOR_LOC: "SHIP_GRAPHICS_$SIZE$_DESC"
 SHIPSETS_DESCRIPTION_LABEL: "Beschreibung"
 SHIP_GRAPHICS_NANITE_SWARMER_DESC: "Ein schnelles und unberechenbares Trägergeschwader aus selbstreplizierenden Naniten. Dieser autonome Schwarm benötigt keine Piloten, überwältigt den Feind durch seine schiere Anzahl und durchbricht feindliche Verteidigungen mit unerbittlicher Präzision."
 SHIP_GRAPHICS_NANITE_INTERDICTOR_DESC: "Ein anpassungsfähiges Trägergeschwader aus selbstreplizierenden Naniten. Der Interdiktor stellt Kontrolle über Chaos. Als geschlossene Einheit sind diese autonomen Konstrukte in der Lage, Bedrohungen mit einer tödlichen Effizienz abzufangen und zu neutralisieren, indem sie feindliche Formationen durch koordinierte Störungsmanöver durchbrechen."
 SHIP_GRAPHICS_CRISIS_CORVETTE_DESC: "Krisen-Korvetten lassen sich schnell in den Einsatz schicken und sind darauf ausgelegt, den Feind durch ihre schiere Anzahl zu überwältigen. Sie sind gewöhnlichen Korvetten in jederlei Hinsicht überlegen und versetzen jeden in Angst und Schrecken, der sich dem vor ihm aufziehenden Sturm entgegenstellt."
 SHIP_GRAPHICS_CRISIS_DESTROYER_DESC: "Ein schwer bewaffnetes Kriegsschiff, das man allein für seine rücksichtslose Effizienz konzipierte. Es ist größer und widerstandsfähiger als Korvetten und bietet eine überwältigende Feuerkraft. Gleichzeitig ist es schnell genug, um fliehende Feinde zu jagen."
 SHIP_GRAPHICS_CRISIS_CRUISER_DESC: "Ein beachtliches Kriegsschiff, das ein Gleichgewicht zwischen Feuerkraft, Widerstandsfähigkeit und strategischer Vorherrschaft schafft. Mit den schweren Waffen und der starken Panzerung bildet es das Rückgrat eines jeden Angriffs und durchbricht die feindlichen Linien mit Leichtigkeit."
 SHIP_GRAPHICS_STAR_EATER_DESC: "Dieses kolossale Schiff ist in der Lage, ganze Sterne zu verschlingen und eine Supernova auszulösen, die ein System vollständig auszulöschen vermag. Der Sternenfresser ist jedoch mehr als nur ein Kriegsschiff: Er ist der Vorbote des Endes und verwandelt jede Welt auf seinem Weg in leblose Leere."
 SHIP_GRAPHICS_COSMO_CRISIS_DESTROYER_DESC: "Ein schnittiges, von kosmischen Energien durchdrungenes Kriegsschiff, das präzise und mit unerbittlicher Feuerkraft zuschlägt. Dieses Schiff ist ein Vorbote einer sich abzeichnenden neuen Wirklichkeit."
 SHIP_GRAPHICS_COSMO_CRISIS_BATTLECRUISER_DESC: "Dieses Kriegsschiff ist die Verschmelzung von Wissenschaft und Schicksal und gebietet über eine verheerende Feuerkraft. Es ist in der Lage, das Schicksal ganzer Schlachtfelder so zu verändern, wie seine Erbauer die Sterne verändern."
 SHIP_GRAPHICS_COSMO_CRISIS_TITAN_DESC: "Eine himmlische Kriegsmaschine und ein Vorbote eines bevorstehenden Wandels. Die bloße Anwesenheit dieses Schiffs beugt die Realität und läutet die Neugeburt des Universums ein."
 SHIP_GRAPHICS_OFFSPRING_CORVETTE_DESC: "$SHIP_GRAPHICS_CORVETTE_DESC$\n\n$OFFSPRING_SHIP_DESC$"
 SHIP_GRAPHICS_OFFSPRING_DESTROYER_DESC: "$SHIP_GRAPHICS_DESTROYER_DESC$\n\n$OFFSPRING_SHIP_DESC$"
 SHIP_GRAPHICS_OFFSPRING_CRUISER_DESC: "$SHIP_GRAPHICS_CRUISER_DESC$\n\n$OFFSPRING_SHIP_DESC$"
 SHIP_GRAPHICS_OFFSPRING_BATTLESHIP_DESC: "$SHIP_GRAPHICS_BATTLESHIP_DESC$\n\n$OFFSPRING_SHIP_DESC$"
