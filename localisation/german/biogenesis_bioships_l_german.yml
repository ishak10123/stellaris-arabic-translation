 MEDIUM_DRAGON_BIO_ARMOR: "Mittlerer $DRAGON_BIO_ARMOR$"
 LARGE_DRAGON_BIO_ARMOR: "Großer $DRAGON_BIO_ARMOR$"
 tech_bio_archaeoarmor: "$tech_archaeoarmor$"
 BIO_ARCHAEO_ARMOR: "Impuls-Carapax"
 BIO_ARCHAEO_ARMOR_DESC: "Ionisierte Schichten innerhalb der Panzerung erzeugen eine reaktive Ladung, die die Aufprallenergie durch magnetische Abstoßung und projizierte Felder zerstreut."
