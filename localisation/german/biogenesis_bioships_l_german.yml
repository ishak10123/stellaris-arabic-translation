 ######################
 BIOGENESIS_CAT: "Biogenese"
 BIOGENESIS_01: "Spinovore"
 BIOGENESIS_02: "Hartschale"
 graphical_culture_tooltip_not_biological: "Hat KEINE ['concept_biological_ship', biologischen] Schiffsmodelle"
 graphical_culture_tooltip_biological: "Muss ['concept_biological_ship', biologische] Schiffsmodelle haben"
 concept_biological_ship: "$bio_ship$"
 concept_biological_ships: "$concept_biological_ship$"
 concept_biological_ship_desc: "- Biologische Schiffe haben spezialisierte Schlachtschiffklassen mit klar definierten Rollen und drei Wachstumsphasen.$NEW_LINE$- Sie werden hauptsächlich mit $i_food$ statt $i_alloys$ gebaut.$NEW_LINE$- Sie kosten im Unterhalt hauptsächlich $i_food$ statt $i_energy$.$NEW_LINE$- Sie basieren auf §Y£society£biologischen§! Technologien anstelle der §Y£engineering£Weltraumkunde§!.$NEW_LINE$$h_line$§L. Lebendige Schiffe bestehen aus massivem, welligem Muskelgeflecht und sind mit biolumineszenten Organellen gefüllt. Sie setzen energetische Verbindungen frei, um Licht und Wärmeschübe für den Antrieb zu erzeugen.§!"
 default_ship: "Mechanische Schiffe"
 bio_ship: "Biologische Schiffe"
 #Shipset Descriptions
 biogenesis_01_shipset_desc: "§HSchiffsmodellart: ['concept_biological_ship', Biologisch]§!\nDiese lebendigen Kriegsschiffe werden geboren und nicht gebaut. Sie verkörpern den Spitzenprädator der Galaxie. Ihre halb-empfindungsfähige Biomasse passt sich an, geht auf die Jagd und schlägt mit einem unerbittlichen Willen zu."
 biogenesis_02_shipset_desc: "§HSchiffsmodellart: ['concept_biological_ship', Biologisch]§!\nDiese hartschaligen Raumschiffe dienen nicht - sie halten Dinge aus und wachsen gemeinsam mit jenen furchtlosen Entdeckern, die sie ihr Zuhause nennen."
 humanoid_01_shipset_desc: "Diese robusten, zielstrebigen Schiffe wurden so konzipiert, dass sie den Strapazen des Weltraums standhalten. Sie wurden entwickelt, um das Unbekannte zu erobern und tragen die Hoffnungen und Träume ihrer Schöpfer bis zu den fernsten Sternen."
 synthetics_01_shipset_desc: "Dieser Schiffsentwurf spiegelt Reinheit und einen unermüdlichen Willen wider. Die hitzeresistenten Hüllen leiten Energie von den übertakteten Mainframes ab und sorgen für einen reibungslosen Betrieb im Streben nach der absoluten Effizienz."
 mammalian_01_shipset_desc: "Diese Schiffe wurden für die Ewigkeit gebaut. Der dichte isolierte Rumpf schützt das Innere, während redundante Systeme die Funktionsfähigkeit selbst unter widrigsten Umständen gewährleisten."
 reptilian_01_shipset_desc: "Das robuste und zweckmäßige Design erinnert an die Widerstandsfähigkeit eines Raubtiers. Ihre Präsenz in der Leere ist ein Beweis für die kaltblütige Hartnäckigkeit ihrer Schöpfer."
 avian_01_shipset_desc: "Diese vielseitigen Schiffe sind anmutig und geschmeidig und verkörpern die Schönheit des Reisens. Jede Kurve und jeder Umriss spricht von einer Spezies, die den Raum nicht als Hindernis, sondern als Erweiterung des Himmels betrachtet."
 arthropoid_01_shipset_desc: "Chitin oder Stahl, Form oder Funktion - es macht keinen Unterschied. Diese Schiffe sollen nicht inspirieren, sondern Dinge aushalten, und die mehrschichtigen Rümpfe verdeutlichen diese Philosophie."
 molluscoid_01_shipset_desc: "Anmutig und doch beständig - diese Schiffe sind zugleich Schild und Speer. Unter der harten Schale regulieren komplexe Systeme mit einer ruhigen Effizienz den Energiefluss und die Nährstoffaufnahme."
 fungoid_01_shipset_desc: "Diese knollenförmigen Schiffe erinnern an die Schönheit von Fungusblüten. Die spezialisierten Systeme sind auf die Selbstversorgung ausgelegt und bilden komplizierte interne Netzwerke, um die die Logik des Myzels nachzubilden."
 plantoid_01_shipset_desc: "Diese mit Pflanzen überwucherten Schiffe bereisen nicht einfach nur die Sterne - sie schlagen ihre Wurzeln zwischen ihnen. Die für die Fotosynthese zuständigen Gondeln halten das Gleichgewicht aufrecht und schaffen ein ausgewogenes Biom an Bord."
 lithoid_01_shipset_desc: "Diese durch Zeit und hohen Druck geschaffenen steinartigen Schiffe verkörpern Beständigkeit. Siliziumkristallmatrizen verstärken die Kernsysteme und beziehen ihre Kraft aus denselben Mächten, die die Welt formen."
 necroid_01_shipset_desc: "Diese dunklen und bedrohlich wirkenden fliegenden Kathedralen repräsentieren Tod und Wiedergeburt. Die entropischen Kerne und das rituelle Design zeugen flüsternd von der Macht der Leere und dem ewigen Ehrgeiz ihrer Schöpfer."
 nemesis_01_shipset_desc: "Diese massiven und übermächtig wirkenden Schiffe symbolisieren die Forderung nach Unterwerfung, und ihre verstärkten Aufbauten und redundanten Systeme vermitteln eine Aura unvergleichlicher Herrschaft."
 aquatic_01_shipset_desc: "Diese zugleich fließenden und doch aufgedunsenen Schiffe bündeln die Kraft der Ozeane. Das aquatische Innere und die hydrodynamischen Konturen verkörpern die Anmut ihrer Schöpfer."
 toxoid_01_shipset_desc: "Diese Schiffe stoßen Unmengen an Abgasen aus, klappern bedrohlich und widersetzen sich jeder Vorschrift - aber sie laufen. Sie werden durch Abfälle angetrieben und durch Einfallsreichtum zusammengehalten. Sie halten durch, wo andere versagen."
 cybernetics_01_shipset_desc: "Das glänzende Chrom und die surrenden Schaltkreise lassen Reflexe der Vergangenheit angehören. Die direkten neuralen Uplinks sorgen dafür, dass es keine Verzögerungen und keine Grenzen gibt - nur reine, hochoktanige Präzision."
