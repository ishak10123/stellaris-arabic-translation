 #Combat Computers
 BIO_COMBAT_COMPUTER_DEFAULT: "Kampfinstinkte"
 BIO_COMBAT_COMPUTER_DEFAULT_DESC: "Alle biologischen Schiffe haben rudimentäre Kampfinstinkte, die man für Ausweichmanöver und Zielberechnungen nutzen kann."
 BIO_COMBAT_COMPUTER_BASIC: "Neuralimplantate"
 BIO_COMBAT_COMPUTER_BASIC_DESC: "Diese Implantate werden nahtlos in die Schiffsorgansysteme integriert und ermöglichen eine schnelle Entscheidungsfindung und präzise taktische Koordination. Sie funktionieren wie ein lebender Kampfcomputer, verbessern das Situationsbewusstsein und optimieren die Effizienz auf dem Schlachtfeld."
 BIO_COMBAT_COMPUTER_ADVANCED: "Verbesserte Neuralimplantate"
 BIO_COMBAT_COMPUTER_ADVANCED_DESC: "Dieses System ist eine Weiterentwicklung gewöhnlicher Neuralimplantate und verbessert die taktische Verarbeitung sowie die Entscheidungsgeschwindigkeit noch weiter. Es erhöht die Effizienz und Koordinationsfähigkeit und erlaubt es biologischen Schiffen, schneller auf die sich stetig verändernden Bedingungen auf dem Schlachtfeld zu reagieren."
 BIO_COMBAT_COMPUTER_SAPIENT: "Vernunftbegabte Neuralimplantate"
 BIO_COMBAT_COMPUTER_SAPIENT_DESC: "Diese Implantate enthalten eine vernunftbegabte biologische Intelligenz, die zu unabhängigem strategischem Denken fähig ist. Durch die Verbindung von organischem Instinkt mit künstlichem Denken können sich die Bioschiffe dynamisch an komplexe Kampfszenarien anpassen und nahezu autonome Entscheidungen treffen."
 BIO_COMBAT_COMPUTER_AUTONOMOUS: "Autonome Neuralimplantate"
 BIO_COMBAT_COMPUTER_AUTONOMOUS_DESC: "Diese Systeme arbeiten völlig autonom. Sie sind mit einer selbstbewussten biologischen Intelligenz ausgestattet und verleihen biologischen Schiffen die Fähigkeit, ohne externe Eingaben Analysen durchzuführen, Strategien zu entwickeln und Entscheidungen zu treffen, wodurch man eine beispiellose Kampfeffizienz erreicht."
 BIO_COMBAT_COMPUTER_PRECOG: "Präkognitive Kampfinstinkte"
 BIO_COMBAT_COMPUTER_PRECOG_DESC: "Diese Implantate machen sich die Macht der Psionik zunutze, um biologischen Schiffen präkognitive Einsichten zu verleihen, die die Schiffe dazu befähigen, feindliche Bewegungen vorherzusehen, bevor sie überhaupt erfolgen. Diese nahezu übernatürliche Fähigkeit verschafft biologischen Flotten einen entscheidenden Vorteil, da sie in Sekundenbruchteilen selbst auf die komplexesten Bedrohungen reagieren können."
