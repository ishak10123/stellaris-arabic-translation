 bio_ship_unique_components: "Ersatzorgane"
 bio_ship_unique_components_DESC: "Diese zusätzlichen Organe werden in lebende Hüllen eingepflanzt oder bereits in ihnen gezüchtet, um die einzigartigen Fähigkeiten biologischer Schiffe zu verstärken."
 MAULER_STAGE_1_GROWTH_1: "$ship_growth_stage_1$e Wachstumsdrüse"
 MAULER_STAGE_1_GROWTH_1_DESC: "Diese Drüsen produzieren eine starke Mischung aus Hormonen und Steroiden, die das Schiff in die nächste Wachstumsphase zwingen."
 MAULER_STAGE_1_GROWTH_2: "Beschleunigte $ship_growth_stage_1$e Wachstumsdrüse"
 MAULER_STAGE_1_GROWTH_2_DESC: "Durch das Anreichern exotischer Gase in hormon- und steroidreichen Sekreten ist dieses Organ in der Lage, das Wachstum biologischer Schiffe zu beschleunigen."
 MAULER_STAGE_2_GROWTH_1: "$ship_growth_stage_2$e Wachstumsdrüse"
