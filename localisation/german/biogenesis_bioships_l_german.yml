 #Shields/Musculature
 tech_bio_shields_1: "$tech_shields_1$"
 BIO_SHIELD_1: "Deflektorenmuskulatur"
 BIO_SHIELD_1_DESC: "Spezialisiertes Muskelgewebe, das ein Energiefeld kanalisieren kann, um einen Deflektorschild zu erschaffen, der eintreffenden Energiewaffenbeschuss absorbiert. Auch wenn er nur eine begrenzte Menge an Energie gleichzeitig absorbieren kann, regeneriert er sich schnell."
 SMALL_BIO_SHIELD_1: "Kleine $BIO_SHIELD_1$"
 MEDIUM_BIO_SHIELD_1: "Mittlere $BIO_SHIELD_1$"
 LARGE_BIO_SHIELD_1: "Große $BIO_SHIELD_1$"
 tech_bio_shields_2: "$tech_shields_2$"
 BIO_SHIELD_2: "Verbesserte Deflektorenmuskulatur"
 BIO_SHIELD_2_DESC: "Ein feineres Muskelgewebe, das die Energie effizienter an die Deflektorschilde weiterleitet. Diese verbesserten Systeme absorbieren mehr Schaden und laden sich schneller wieder auf, was einen besseren Schutz bei längeren Kämpfen bietet."
 SMALL_BIO_SHIELD_2: "Kleine $BIO_SHIELD_2$"
 MEDIUM_BIO_SHIELD_2: "Mittlere $BIO_SHIELD_2$"
 LARGE_BIO_SHIELD_2: "Große $BIO_SHIELD_2$"
 tech_bio_shields_3: "$tech_shields_3$"
 BIO_SHIELD_3: "Abschirmungsmuskulatur"
 BIO_SHIELD_3_DESC: "Diese fortschrittliche biologische Schildtechnologie nutzt ein verstärktes, energieleitendes Gewebe für eine bessere Schutzfunktion. Es bietet guten Schutz gegen energetische und kinetische Angriffe und erlaubt es dem biologischen Schiff, sich an verschiedenste Kampfsituationen anzupassen."
 SMALL_BIO_SHIELD_3: "Kleine $BIO_SHIELD_3$"
 MEDIUM_BIO_SHIELD_3: "Mittlere $BIO_SHIELD_3$"
 LARGE_BIO_SHIELD_3: "Große $BIO_SHIELD_3$"
 tech_bio_shields_4: "$tech_shields_4$"
 BIO_SHIELD_4: "Verbesserte Abschirmungsmuskulatur"
 BIO_SHIELD_4_DESC: "Der Gipfel biologischer Schildtechnologie. Dieses verstärkte Muskelgewebe leitet Energie effektiver weiter, um die Schildstärke zu erhöhen. Es bietet robusten Schutz gegen energetische und kinetische Angriffe und bietet während einer Schlacht eine vielseitige Verteidigung."
 SMALL_BIO_SHIELD_4: "Kleine $BIO_SHIELD_4$"
 MEDIUM_BIO_SHIELD_4: "Mittlere $BIO_SHIELD_4$"
 LARGE_BIO_SHIELD_4: "Große $BIO_SHIELD_4$"
 tech_bio_shields_5: "$tech_shields_5$"
 BIO_SHIELD_5: "Hyper-Abschirmungsmuskulatur"
 BIO_SHIELD_5_DESC: "Ein hyperadaptives Gewebe, das immense Energieströme kanalisieren kann, um eine nahezu undurchdringliche Verteidigung zu schaffen. Dieses fortschrittliche System regeneriert sich schnell und sorgt dafür, dass das biologische Schiff selbst die verheerendsten Angriffe übersteht."
 SMALL_BIO_SHIELD_5: "Kleine $BIO_SHIELD_5$"
 MEDIUM_BIO_SHIELD_5: "Mittlere $BIO_SHIELD_5$"
 LARGE_BIO_SHIELD_5: "Große $BIO_SHIELD_5$"
 tech_bio_dark_matter_deflector: "$tech_dark_matter_deflector$"
 DARK_MATTER_BIO_DEFLECTOR: "Dunkelmateriedurchsetze Muskulatur"
 DARK_MATTER_BIO_DEFLECTOR_DESC: "Ein hochmoderner biologischer Schild, der in Gewebe integrierte dunkle Materie nutzt, um die Energieleit- und Verteidigungsfähigkeit immens zu verbessern. Die Integration dieser exotischen Substanz erlaubt es dem Muskelgewebe, Schilde von unvorstellbarer Stärke zu projizieren, die außergewöhnlich starkem Beschuss standhalten."
 SMALL_DARK_MATTER_BIO_DEFLECTOR: "Kleine $DARK_MATTER_BIO_DEFLECTOR$"
 MEDIUM_DARK_MATTER_BIO_DEFLECTOR: "Mittlere $DARK_MATTER_BIO_DEFLECTOR$"
 LARGE_DARK_MATTER_BIO_DEFLECTOR: "Große $DARK_MATTER_BIO_DEFLECTOR$"
 tech_bio_psionic_barrier: "$tech_psionic_barrier$"
 PSI_BIO_SHIELD: "Zrodurchsetzte Muskulatur"
 PSI_BIO_SHIELD_DESC: "Muskelgewebe, das von der psionisch reaktiven Substanz Zro durchdrungen ist und anpassungsfähige Schilde erzeugen kann. Die einzigartigen Eigenschaften von Zro verbessern sowohl die Widerstandsfähigkeit als auch die Regenerationsfähigkeit des biologischen Schilds, was eine fast übernatürliche Verteidigung schafft."
 SMALL_PSI_BIO_SHIELD: "Kleine $PSI_BIO_SHIELD$"
 MEDIUM_PSI_BIO_SHIELD: "Mittlere $PSI_BIO_SHIELD$"
 LARGE_PSI_BIO_SHIELD: "Große $PSI_BIO_SHIELD$"
 tech_bio_psionic_shield: "$tech_psionic_shield$"
 PSI_BIO_BARRIER: "Psionisches Resonanzgewebe"
 PSI_BIO_BARRIER_DESC: "Dieser außergewöhnlich starke biologische Schild nutzt ein speziell gezüchtetes Gewebe, um psionische Energie freizusetzen. Die daraus resultierende Verteidigung kann sich mit unheimlicher Präzision an eingehende Bedrohungen anpassen. Die psionische Resonanz verstärkt den Schild und beschleunigt die Regenerationsfähigkeit, was ihn zu einem wirksamen Schutz gegen die unvorhersehbarsten Angriffe macht."
 SMALL_PSI_BIO_BARRIER: "Kleines $PSI_BIO_BARRIER$"
 MEDIUM_PSI_BIO_BARRIER: "Mittleres $PSI_BIO_BARRIER$"
 LARGE_PSI_BIO_BARRIER: "Großes $PSI_BIO_BARRIER$"
 tech_bio_archaeoshield: "$tech_archaeoshield$"
 BIO_ARCHAEO_SHIELD: "Suspensionsfeldgewebe"
 BIO_ARCHAEO_SHIELD_DESC: "Indem man Schildprojektionsgewebe um uralte Artefaktknoten herum züchtet, kann diese Technologie Suspensionsfelder erzeugen, die die Zeit am Aufprallpunkt verlangsamen. Diese Verzögerung verbessert die Fähigkeit des Schildes, die Energie ankommender Angriffe abzuleiten, was die Verteidigungsfähigkeit erheblich verbessert."
 SMALL_BIO_ARCHAEO_SHIELD: "Kleines $BIO_ARCHAEO_SHIELD$"
 MEDIUM_BIO_ARCHAEO_SHIELD: "Mittleres $BIO_ARCHAEO_SHIELD$"
 LARGE_BIO_ARCHAEO_SHIELD: "Großes $BIO_ARCHAEO_SHIELD$"
 #Reactors
 tech_bio_fission_power: "$BIO_FISSION_REACTOR$"
 BIO_FISSION_REACTOR: "Kernspaltungsmetabolismus"
 BIO_FISSION_REACTOR_DESC: "Dank der jüngsten Fortschritte in der Biotechnik fungiert ein Verdauungstrakt als biologischer Kernreaktor. Der auf einer induzierten Kernspaltung basierende Stoffwechsel produziert sowohl Energie als auch schädliche nukleare Abfallstoffe."
 tech_bio_fusion_power: "$BIO_FUSION_REACTOR$"
 BIO_FUSION_REACTOR: "Kernfusionsmetabolismus"
 BIO_FUSION_REACTOR_DESC: "Durch die Integration einer Mikrofauna, die zur Kernfusion fähig ist, kann das Biom eines biologischen Schiffs eine immense Energie erzeugen und gleichzeitig viele jener Gefahren vermeiden, die mit Energiequellen auf Kernspaltungsbasis verbunden sind."
