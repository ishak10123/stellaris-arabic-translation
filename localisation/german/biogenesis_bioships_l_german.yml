 tech_bio_ship_armor_5: "$tech_ship_armor_5$"
 BIO_ARMOR_5: "Neutronium-Carapax"
 BIO_ARMOR_5_DESC: "Diese Panzerung, ein Wunderwerk der Biotechnik, ist mit einem organischen Neutronium-Gewebe verstärkt, was sie nahezu undurchdringbar macht. Die dichte und dennoch anpassungsfähige Zusammensetzung bietet selbst gegen die zerstörerischste Kraft einen robusten Schutz."
 SMALL_BIO_ARMOR_5: "Kleiner $NEUTRONIUM_CARAPACE$"
 MEDIUM_BIO_ARMOR_5: "Mittlerer $NEUTRONIUM_CARAPACE$"
 LARGE_BIO_ARMOR_5: "Großer $NEUTRONIUM_CARAPACE$"
 tech_bio_dragon_armor: "$tech_dragon_armor$"
 DRAGON_BIO_ARMOR: "$DRACONIC_CARAPACE$"
 DRAGON_BIO_ARMOR_DESC: "Dieser Carapax wurde nach dem Vorbild eines uralten Spitzenprädators entworfen und stellt die Krönung in Sachen biologischer Panzerung dar. Die mehrschichtige Struktur kombiniert regenerative organische Materie mit einer nahezu unzerstörbaren Bio-Legierung. Die daraus resultierende Panzerung ist so unnachgiebig wie jene Kreaturen, die ihr als Inspiration dienten."
