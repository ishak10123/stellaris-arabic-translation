 #FTL Drives
 BIO_EMPTY_DRIVE: "$EMPTY_DRIVE$"
 BIO_EMPTY_DRIVE_DESC: "$EMPTY_DRIVE_DESC$"
 BIO_HYPER_DRIVE_1: "Bio-Hyperraumroutenfeld I"
 BIO_HYPER_DRIVE_1_DESC: "Fortwährenden Druck gegen den Hyperraum auszuüben, erlaubt es einem Schiff, sich durch die engen Lücken in den interstellaren Hyperraumrouten zu quetschen."
 BIO_HYPER_DRIVE_2: "Bio-Hyperraumroutenfeld II"
 BIO_HYPER_DRIVE_2_DESC: "$BIO_HYPER_DRIVE_1_DESC$"
 BIO_HYPER_DRIVE_3: "Bio-Hyperraumroutenfeld III"
 BIO_HYPER_DRIVE_3_DESC: "$BIO_HYPER_DRIVE_1_DESC$"
 BIO_JUMP_DRIVE_1: "Sprungorgan"
 BIO_JUMP_DRIVE_1_DESC: "Sprungantriebsorgane reißen schiffsgroße Löcher in das Realitätsgefüge und ermöglichen Flüge zwischen Systemen fast ohne Zeitverlust. Die genaue Beschaffenheit des Raums, den das Schiff auf diesem Flug durchquert, ist noch immer kaum erforscht."
 BIO_PSI_JUMP_DRIVE_1: "Psionisches Sprungorgan"
 BIO_PSI_JUMP_DRIVE_1_DESC: "Das psionische Sprungorgan fungiert als Fokuspunkt zur Bündelung des psionischen Potenzials des Schiffs und erlaubt es ihm so, das lokale Raum-Zeit-Kontinuum zu krümmen. Dadurch wird die Entfernung zwischen Ausgangs- und Zielort eliminiert. Angeblich."
 tech_bio_hyper_drive_1: "Hyperraum-Flug"
 tech_bio_hyper_drive_1_desc: "Das extradimensionale Reich des Hyperraums erstreckt sich zwischen den Schwerkraftbereichen der meisten Sterne wie die Stränge eines Spinnennetzes. Entlang dieser Hyperraumrouten sind ÜL-Flüge theoretisch möglich."
 tech_bio_hyper_drive_2: "Hyperraumrouten-Bruchpunkte"
 tech_bio_hyper_drive_2_desc: "Wir haben herausgefunden, dass es im Weltraum Punkte gibt, an denen Schiffe weniger Energie aufwenden müssen, um in eine Hyperraumroute \"einzubrechen\". Dies wird zu einer neuen Generation von Hyperantrieben führen."
 tech_bio_hyper_drive_3: "Hyperraum-Strudel"
 tech_bio_hyper_drive_3_desc: "Eine neue Generation von Hyperantrieben, die sich die im Hyperraum vorhandenen Strudel zunutze machen. Dies führt zu einer drastisch erhöhten Antriebsleistung."
 tech_bio_jump_drive_1: "$BIO_JUMP_DRIVE_1$"
 tech_bio_jump_drive_1_desc: "Ein revolutionäres $BIO_JUMP_DRIVE_1$, das das lokale Raum-Zeit-Kontinuum auf Quantenebene manipuliert, um es so umzustrukturieren, dass es dem Zielort entspricht. Dieser Prozess ermöglicht es Schiffen, fast augenblicklich zwischen Systemen zu \"springen\"."
