 BIOSHIP_SENSOR_1: "Funkortung"
 BIOSHIP_SENSOR_1_DESC: "Diese Sensororgane nutzen ein biologische Äquivalent zum Radar, um Schiffen im Weltraum grundlegende Erkennungs- und Verfolgungssysteme zu geben."
 BIOSHIP_SENSOR_2: "Gravitationssensoren"
 BIOSHIP_SENSOR_2_DESC: "Diese Sensororgane wurden entwickelt, um Gravitationsänderungen im Weltraum aufzuspüren, wie sie unter anderem Raumschiffe erzeugen."
 TECH_UNLOCK_BIOSHIP_SENSOR_2_TITLE: "§HNeue Komponente:§! $BIOSHIP_SENSOR_2$"
