 #Unique components
 MAULER_PURSUIT_1: "Metabolische Aufbereitung"
 MAULER_PURSUIT_1_DESC: "Das Aufbereiten der chemischen Abfälle aus dem Antriebsorgan des Schiffes erhöht dessen Ausdauer drastisch."
 MAULER_PURSUIT_2: "Energetische Aufbereitung"
 MAULER_PURSUIT_2_DESC: "Das Hinzufügen flüchtiger Teilchen in den Aufbereitungsprozess erhöht die Ausdauer noch weiter."
 MAULER_BITER_1: "Korrosive Flüssigkeiten"
 MAULER_BITER_1_DESC: "Diese implantierten Drüsen geben der Körperflüssigkeit unserer $mauler_class_plural_cap$ korrosive Eigenschaften, was ihr zerstörerisches Potenzial drastisch verstärkt."
 MAULER_BITER_2: "Ätzende Flüssigkeiten"
 MAULER_BITER_2_DESC: "Durch das Hinzufügen flüchtiger Teilchen erhalten die Körperflüssigkeiten unserer $mauler_class_plural_cap$ ätzende Eigenschaften, was ihren Schaden gegen Schiffspanzerungen deutlich erhöht."
 weapon_type_mandible: "§YMandibeln§!"
 mod_weapon_type_mandible_weapon_damage_mult: "Waffenschaden (Mandibeln)"
 APPLIED_MODIFIERS_SUPPORT_TITLE: "Modifikatoren von Unterstützungswaffen:"
 WEAVER_GROWTH_AURA_1: "Entwicklungspheromone"
 WEAVER_GROWTH_AURA_1_DESC: "Schiffe der Weber-Klasse senden eine Reihe komplexer biologischer Signale aus, um nahe organische Einheiten schneller heranwachsen zu lassen. Diese Entwicklungspheromone erhöhen die Wachstums- und Anpassungsrate und sorgen dafür, dass sich die Flotte schnell genug weiterentwickelt, um es mit jeder Herausforderung aufzunehmen."
 WEAVER_GROWTH_AURA_2: "Exotische Entwicklungspheromone"
 WEAVER_GROWTH_AURA_2_DESC: "Mithilfe einer verfeinerten Biotechnik wird die Wirkung von Pheromonen verstärkt, was das Wachstum verbündeter biologischer Schiffe drastisch erhöht. Diese verbesserte Aura sorgt dafür, dass die Flotte selbst in der Hitze des Gefechts Spitzenleistungen erreicht."
 GROWTH_AURA: "$WEAVER_GROWTH_AURA_1$"
 GROWTH_AURA_TT: "§PDiese Aura wirkt sich nur auf biologische Schiffe aus, die wachsen können.§!"
 WEAVER_BOOSTER_1: "Einfacher symbiotischer Verstärker"
 WEAVER_BOOSTER_1_DESC: "Diese organische Apparatur verstärkt die Verbindung zwischen biologischen Schiffen, was den Energieaustausch und die Koordinationsfähigkeit der Flotte insgesamt verstärkt und für mehr Effizienz im Kampf und bei der Ressourcenverwaltung sorgt."
 WEAVER_BOOSTER_2: "Verbesserter symbiotischer Verstärker"
 WEAVER_BOOSTER_2_DESC: "Die Weiterentwicklung des einfachen symbiotischen Verstärkers. Diese Apparatur passt sich dynamisch an die Bedürfnisse der Flotte an und erhöht dadurch die Effizienz und Reaktionsfähigkeit. Sie optimiert die Fähigkeiten der Flotte und gewährleistet, dass sich diese in einem Gefecht nahtlos anpassen kann."
 HARBINGER_INCUBATOR_1: "Inkubationsmatrix"
 HARBINGER_INCUBATOR_1_DESC: "Diese Zellmatrix bildet sich um die Eier heranreifender Trägergeschwader und fungiert wie ein biotechnischer Brutkasten."
 HARBINGER_INCUBATOR_2: "Beschleunigte $HARBINGER_INCUBATOR_1$"
 HARBINGER_INCUBATOR_2_DESC: "Indem man das Schiff während der Inkubationszeit exotischen Gasen aussetzt, beschleunigt man die Reifung von Trägergeschwadern."
 HARBINGER_CHITIN_1: "Chitinhaltige Wachstumsregulatoren"
 HARBINGER_CHITIN_1_DESC: "Die Sekrete in den Hangarbuchten regen das Chitinwachstum in den sich entwickelnden Trägergeschwadern an und verstärken deren Widerstandsfähigkeit."
 HARBINGER_CHITIN_2: "Kristalline Wachstumsregulatoren"
 HARBINGER_CHITIN_2_DESC: "Das Hinzufügen seltener Kristalle in die chitinartigen Exoskelette unserer Trägergeschwader erhöht deren Widerstandsfähigkeit gegen Schaden erheblich."
 STINGER_RANGE_1: "Entfernungsmessercluster"
 STINGER_RANGE_1_DESC: "Ein sekundäres Neuralcluster, das für die Auswertung von Sensordaten zuständig ist."
 STINGER_RANGE_2: "Verbessertes $STINGER_RANGE_1$"
 STINGER_RANGE_2_DESC: "Seltene Kristalle, die in die Nervenbahnen eingebettet sind, erlauben eine bessere Zielverarbeitung."
 STINGER_FIRE_RATE_1: "Wärmeauslasstracheen"
 STINGER_FIRE_RATE_1_DESC: "Eine Reihe von Wärmeauslassen entlang des Brustkorbs dieses Schiffes erlauben das Aussondern hochtemperierter komprimierter Gase in den Weltraum, was die Feuerrate der Waffen verbessert."
 STINGER_FIRE_RATE_2: "Flüchtige $STINGER_FIRE_RATE_1$"
 STINGER_FIRE_RATE_2_DESC: "Die Nutzung flüchtiger Teilchen als Wärmetauschmedium erfordert eine spezielle Zellmatrix, um unbeabsichtigte Explosionen zu verhindern."
 #Armor/Carapace
 tech_bio_ship_armor_1: "$tech_ship_armor_1$"
 BIO_ARMOR_1: "$NANOCOMPOSITE_CARAPACE$"
 BIO_ARMOR_1_DESC: "Diese fortschrittliche biologische Panzerung verbindet widerstandsfähiges biologisches Gewebe mit Nanostrukturmaterialien, wodurch ein lebendiger Panzer entsteht, der selbst extremen Einschlägen standhält. Der Panzer passt sich dynamisch an Beschädigungen an, regeneriert sich und bietet biologischen Schiffen einen unvergleichlichen Schutz."
 SMALL_BIO_ARMOR_1: "Kleiner $BIO_ARMOR_1$"
 MEDIUM_BIO_ARMOR_1: "Mittlerer $BIO_ARMOR_1$"
 LARGE_BIO_ARMOR_1: "Großer $BIO_ARMOR_1$"
 tech_bio_ship_armor_2: "$tech_ship_armor_2$"
 BIO_ARMOR_2: "$CERAMO_CHITIN_CARAPACE$"
 BIO_ARMOR_2_DESC: "Mit keramischen Verbindungen durchsetztes und so verstärktes Chitin verleiht der Biopanzerung eine unglaublich hohe Widerstandsfähigkeit und Hitzebeständigkeit. Die geschichtete Struktur bietet robusten Schutz und bewahrt gleichzeitig die für organische Schiffe erforderliche Flexibilität."
 SMALL_BIO_ARMOR_2: "Kleiner $CERAMO_CHITIN_CARAPACE$"
 MEDIUM_BIO_ARMOR_2: "Mittlerer $CERAMO_CHITIN_CARAPACE$"
 LARGE_BIO_ARMOR_2: "Großer $CERAMO_CHITIN_CARAPACE$"
 tech_bio_ship_armor_3: "$tech_ship_armor_3$"
 BIO_ARMOR_3: "$PLASTEEL_CARAPACE$"
 BIO_ARMOR_3_DESC: "Diese biologische Panzerung kombiniert widerstandsfähiges Gewebe mit Plastik-Stahl-Verbindungen, um ein bemerkenswertes Gleichgewicht aus Stärke und Flexibilität zu schaffen. Die hybride Struktur ist ein hervorragender Schutz gegen kinetische und energiebasierte Angriffe, was sie zu einer zuverlässigen Wahl für biologische Schiffe macht."
 SMALL_BIO_ARMOR_3: "Kleiner $PLASTEEL_CARAPACE$"
 MEDIUM_BIO_ARMOR_3: "Mittlerer $PLASTEEL_CARAPACE$"
 LARGE_BIO_ARMOR_3: "Großer $PLASTEEL_CARAPACE$"
 tech_bio_ship_armor_4: "$tech_ship_armor_4$"
 BIO_ARMOR_4: "Durastahl-Carapax"
 BIO_ARMOR_4_DESC: "Diese biologische Panzerung ist mit haltbaren organischen Verbindungen durchsetzt und bietet eine außergewöhnliche Widerstandsfähigkeit gegen Schaden. Die hybride Struktur garantiert eine bemerkenswerte Beständigkeit, ohne die Flexibilität lebender Schiffe zu beinträchtigen."
 SMALL_BIO_ARMOR_4: "Kleiner $DURASTEEL_CARAPACE$"
 MEDIUM_BIO_ARMOR_4: "Mittlerer $DURASTEEL_CARAPACE$"
