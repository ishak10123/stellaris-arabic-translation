 BIOSHIP_SENSOR_3: "Subraumsensoren"
 BIOSHIP_SENSOR_3_DESC: "Sensororgane, die von Raumschiffen hinterlassene Subraum-Fluktuationen erkennen. Ihre Empfindlichkeit und ihre Reichweite übertreffen alle anderen Sensororgane im Weltraum bei Weitem."
 TECH_UNLOCK_BIOSHIP_SENSOR_3_TITLE: "§HNeue Komponente:§! $BIOSHIP_SENSOR_3$"
 TECH_UNLOCK_BIOSHIP_SENSOR_3_DESC: "§H$BIOSHIP_SENSOR_3$§!\n$BIOSHIP_SENSOR_3_DESC$"
 BIOSHIP_SENSOR_4: "Tachyonensensoren"
 BIOSHIP_SENSOR_4_DESC: "Ein Sensororgan, das rotierende Tachyonenstrahlen nutzt, um interstellare Bewegung selbst aus extremen Entfernungen zu erkennen."
