 #Mauler Technologies
 tech_maulers: "$mauler_class_plural_cap$"
 tech_maulers_desc: "Unsere Durchbrüche im Bioengineering erlauben es uns, ÜL-fähige Weltraumschiffe für den militärischen Anwendungsbereich zu entwickeln."
 TECH_UNLOCK_mauler_stage_1_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! $mauler_stage_1$"
 TECH_UNLOCK_mauler_stage_1_CONSTRUCTION_DESC: "§H$mauler_stage_1$§!\nDer $mauler_class_cap$ ist die einfachste Form des Militärschiffs und mit Nahkampfwaffen und dicker Panzerung ausgestattet."
 tech_mauler_build_speed: "Standardisierte Schläger-Inkubation"
 tech_mauler_build_speed_desc: "Diese Inkubationskammern enthalten nährstoffreiche Biopods und sorgen für ein beschleunigtes Wachstum bei den embryonalen Kriegsschiffen. Es handelt sich zwar nur um rudimentäre Schiffe, doch sie stellen den ersten Schritt zu einer Flotte dar, die nicht konstruiert wurde, sondern gewachsen ist."
 tech_mauler_build_speed_effect: "$mod_ship_mauler_cost_mult$: §G-5%§!\nBaugeschwindigkeit ($mauler_class_cap$): §G+25%§!"
 tech_mauler_growth_1: "Verbesserte Schläger-Entwicklung"
 tech_mauler_growth_1_desc: "Dank eines verfeinerten Inkubationsprozesses lässt sich die Heranreifungszeit reduzieren und die strukturelle Integrität der organischen Raumschiffe erhöhen. Ein verbessertes Nährstoffzufuhrsysteme und genetisches Tuning sorgt zusätzlich dafür, dass die Schiffe sowohl schnell als auch belastbar sind."
 TECH_UNLOCK_mauler_stage_2_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! $mauler_stage_2$"
 TECH_UNLOCK_mauler_stage_2_CONSTRUCTION_DESC: "§H$mauler_stage_2$§!\nEin $ship_growth_stage_2$er $mauler_class$ wurde selektiv mit einer größeren Feuerkraft und Panzerung herangezüchtet."
 gateway_bio_ships: "§HBiologischer Schiffspfad§!\n§EDiese Technologie führt zu weiteren Fortschritten auf dem Feld biologischer Schiffe.§!"
 tech_mauler_growth_2: "Fortschrittliche Schläger-Entwicklung"
 tech_mauler_growth_2_desc: "Diese Einrichtungen bringen Schiffe von unvergleichlicher Vitalität und Anpassungsfähigkeit hervor. Die optimierten genetischen Matrizen und fortschrittlichen biotechnologischen Unterstützungswerkzeuge sorgen für eine unübertroffene Leistung in der Leere."
 TECH_UNLOCK_mauler_stage_3_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! $mauler_stage_3$"
 TECH_UNLOCK_mauler_stage_3_CONSTRUCTION_DESC: "§H$mauler_stage_3$§!\nEin $ship_growth_stage_3$er $mauler_class_cap$ ist die höchste Form der $mauler_class_cap$-Klasse. Er ist stark gepanzert und mit einer Vielzahl an Nahkampfwaffen ausgerüstet."
 #Weaver Technologies
 tech_weavers: "$weaver_class_plural_cap$"
 tech_weavers_desc: "Die Weber wurden auf Grundlage einer frühen Biotechnik entworfen und sind so konstruiert, dass sie ein Gleichgewicht zwischen Beweglichkeit und verbesserten Kampffähigkeiten herstellen."
 TECH_UNLOCK_weaver_stage_1_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! $weaver_stage_1$"
 TECH_UNLOCK_weaver_stage_1_CONSTRUCTION_DESC: "§H$weaver_stage_1$§!\nDer $weaver_class_cap$ ist ein vielseitiges mittelgroßes biologisches Schiff. Dank seiner Manövrierfähigkeit kann es selbst größere Schiffe überlisten und gleichzeitig Flottenangriffe unterstützen."
 tech_weaver_build_speed: "Standardisierte Weber-Inkubation"
 tech_weaver_build_speed_desc: "In diesen Anlagen werden mittelgroße biologische Schiffe in fortschrittlichen Biopods mit einer verbesserten Nährstoffzufuhr und genetischen Optimierung herangezogen. Sie sind sowohl wendig als auch anpassungsfähig."
 tech_weaver_build_speed_effect: "$mod_ship_weaver_cost_mult$: §G-5%§!\nBaugeschwindigkeit ($weaver_class_cap$): §G+25%§!"
 tech_weaver_growth_1: "Verbesserte Weber-Entwicklung"
 tech_weaver_growth_1_desc: "In diesen Anlagen setzt man verbesserte biotechnische Verfahren ein, um die Wachstumszyklen zu beschleunigen und die Anpassungsfähigkeit der Schiffe zu erhöhen. Verbesserte genetische Matrizen und optimierte Umgebungen sorgen dafür, dass diese Bioschiffe sowohl langlebig als auch reaktionsschnell sind."
 TECH_UNLOCK_weaver_stage_2_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! $weaver_stage_2$"
 TECH_UNLOCK_weaver_stage_2_CONSTRUCTION_DESC: "§H$weaver_stage_2$§!\nEin $weaver_class_cap$ ($ship_growth_stage_2$) wurde selektiv herangezüchtet, um im Flottenbetrieb mobiler und anpassungsfähiger zu sein."
 tech_weaver_growth_2: "Fortschrittliche Weber-Entwicklung"
 tech_weaver_growth_2_desc: "In diesen Anlagen züchtet man Schiffe von unvergleichlicher Präzision und Vielseitigkeit heran. Revolutionäre Wachstumstechniken und anpassungsfähige genetische Verbesserungen bringen Schiffe hervor, die sich selbst in den anspruchsvollsten taktischen Szenarien durchsetzen."
 TECH_UNLOCK_weaver_stage_3_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! $weaver_stage_3$"
 TECH_UNLOCK_weaver_stage_3_CONSTRUCTION_DESC: "§H$weaver_stage_3$§!\nEin $weaver_class_cap$ ($ship_growth_stage_3$) wurde sorgfältig herangezüchtet, um eine überlegene Mobilität und taktische Vielseitigkeit aufzuweisen."
 #Harbinger Technologies
 tech_harbingers: "$harbinger_class_plural_cap$"
 tech_harbingers_desc: "Unheilsbringer besitzen eine beeindruckende Feuerkraft und Widerstandsfähigkeit und stellen dank der lebenden Technologien einen bedeutenden Fortschritt in der biotechnischen Kriegsführung dar. Sie bilden das Rückgrat der Flotte."
 TECH_UNLOCK_harbinger_stage_1_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! $harbinger_stage_1$"
 TECH_UNLOCK_harbinger_stage_1_CONSTRUCTION_DESC: "§H$harbinger_stage_1$§!\nEin $harbinger_class_cap$ verstärkt die Flotte durch Trägergeschwader."
 tech_harbinger_build_speed: "Standardisierte Unheilsbringer-Inkubation"
 tech_harbinger_build_speed_desc: "In diesen Anlagen werden große Bioschiffe herangezüchtet und durch fortschrittliche Nährstoffinfusion versorgt, um ihre Widerstandsfähigkeit und ihre Kampfbereitschaft zu verbessern."
 tech_harbinger_build_speed_effect: "$mod_ship_harbinger_cost_mult$: §G-5%§!\nBaugeschwindigkeit ($harbinger_class_cap$): §G+25%§!"
 tech_harbinger_growth_1: "Verbesserte Unheilsbringer-Entwicklung"
 tech_harbinger_growth_1_desc: "In diesen Anlagen setzt man fortschrittliche biotechnische Verfahren ein, um das Wachstum zu beschleunigen und die strukturelle Integrität zu verbessern. Das Ergebnis sind Schiffe mit verbesserter Ausdauer und höherer Kampfeffizienz."
 TECH_UNLOCK_harbinger_stage_2_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! $harbinger_stage_2$"
 TECH_UNLOCK_harbinger_stage_2_CONSTRUCTION_DESC: "§H$harbinger_stage_2$§!\nVerbesserte Wachstumstechniken bringen stärkere und zuverlässigere Schiffe hervor."
 tech_harbinger_growth_2: "Fortschrittliche Unheilsbringer-Entwicklung"
 tech_harbinger_growth_2_desc: "Die fortschrittlichen Inkubationssysteme bringen Bioschiffe von außergewöhnlich hoher Haltbarkeit und Feuerkraft hervor. Eine genetische Feinabstimmung und überlegene Wachstumsbedingungen sorgen dafür, dass diese Schiffe die Schlachtfelder mit ihrer unübertroffener Widerstandsfähigkeit beherrschen."
 TECH_UNLOCK_harbinger_stage_3_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! $harbinger_stage_3$"
 TECH_UNLOCK_harbinger_stage_3_CONSTRUCTION_DESC: "§H$harbinger_stage_3$§!\nFür maximale Stärke und Überlegenheit auf dem Schlachtfeld herangezüchtet."
 #Stinger Technologies
 tech_stingers: "$stinger_class_plural_cap$"
 tech_stingers_desc: "Schiffe der Stachel-Klasse sind darauf spezialisiert, verheerende Angriffe gegen hochrangige Ziele zu führen. Sie zeichnen sich besonders dadurch aus, Schwachstellen in der gegnerischen Verteidigung zu finden."
 TECH_UNLOCK_stinger_stage_1_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! $stinger_stage_1$"
 TECH_UNLOCK_stinger_stage_1_CONSTRUCTION_DESC: "§H$stinger_stage_1$§!\nEin schnelles und tödliches biologisches Schiff, das Präzisionsschläge durchführen kann und zwecks taktischer Überlegenheit herangezüchtet wurde."
 tech_stinger_build_speed: "Standardisierte Stachel-Inkubation"
 tech_stinger_build_speed_desc: "In diesen Anlagen züchtet man schnittige biologische Schiffe heran, die auf Präzision und Geschwindigkeit ausgelegt sind. Dank fortschrittlicher Biopods und spezieller Nährstofflösungen sind diese Schiffe in der Lage, präzise und effiziente Angriffe durchzuführen."
 tech_stinger_build_speed_effect: "$mod_ship_stinger_cost_mult$: §G-5%§!\nBaugeschwindigkeit ($stinger_class_cap$): §G+25%§!"
 tech_stinger_growth_1: "Verbesserte Stachel-Entwicklung"
 tech_stinger_growth_1_desc: "Diese Anlagen beschleunigen die Wachstumszyklen und verbessern die biotechnische Präzision, was den herangezüchteten Schiffen eine überlegenere Manövrierfähigkeit und Genauigkeit verleiht. Diese Verbesserungen geben dem Stachel eine verheerende Feuerkraft in taktischen Gefechten."
 TECH_UNLOCK_stinger_stage_2_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! $stinger_stage_2$"
 TECH_UNLOCK_stinger_stage_2_CONSTRUCTION_DESC: "§H$stinger_stage_2$§!\nMehr Geschwindigkeit und eine höhere Präzision bei taktischen Einsätzen."
 tech_stinger_growth_2: "Fortschrittliche Stachel-Entwicklung"
 tech_stinger_growth_2_desc: "Diese fortschrittlichen Anlagen stellen den Höhepunkt der biologischen Schiffsinkubation dar und bringen Schiffe der Stachel-Klasse hervor, die über eine unübertroffene Geschwindigkeit und Tödlichkeit verfügen. Die optimierten genetischen Vorlagen und die hochmodernen Inkubationstechniken sorgen dafür, dass diese Schiffe jedes Schlachtfeld mit ihrer Schnelligkeit und tödlichen Präzision beherrschen."
 TECH_UNLOCK_stinger_stage_3_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! $stinger_stage_3$"
 TECH_UNLOCK_stinger_stage_3_CONSTRUCTION_DESC: "§H$stinger_stage_3$§!\nUltimative Geschwindigkeit und Präzision zur Beherrschung des Schlachtfelds."
