 BIO_SHIP_THRUSTER_5_DESC: "In das Schiffsgewebe eingebettete Cluster aus Dunkler Materie erlauben es dem Schiff, durch den Weltraum zu \"schwimmen\" und sich auf eine Weise zu bewegen, die der herkömmlichen Physik und unserem derzeitigen Verständnis von Antrieben zuwiderläuft."
