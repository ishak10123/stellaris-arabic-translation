 #Traits
 #Modifiers
 synth_opposition_truth: "Informationskampagne zur Synthetisierung"
 synth_opposition_truth_desc: "Es werden wahrheitsgemäße Informationen über alle Aspekte der Synthetisierung verbreitet."
 synth_opposition_deception: "Synthetisierungskampagne"
 synth_opposition_deception_desc: "Das öffentliche Narrativ wird verändert, um die positiven Aspekte der Synthetisierung des Bewusstseins hervorzuheben."
 synth_tinkering_with_minds: "Bewusstseinsumprogrammierung"
 synth_tinkering_with_minds_desc: "Neu digitalisierte Gehirne werden einer moderaten Umprogrammierung unterzogen, um sie an unsere Zukunftsvision anzupassen."
 synth_brightest_minds: "Priorisierung der Klügsten"
 synth_brightest_minds_desc: "Nur die außergewöhnlichsten Individuen werden für unser Synthetisierungsprogramm ausgewählt."
 synth_reprogram_minds: "Unterdrückerische Umprogrammierung"
 synth_reprogram_minds_desc: "Diese Regierung programmiert \"unpassende\" Individuen im Zuge der Digitalisierung um."
 victim_compensation: "Entschädigung der Opfer"
 victim_compensation_desc: "Die Familien jener, deren Bewusstseine während der Synthetisierung verloren gingen, werden entschädigt."
 synth_mandatory_volunteers: "Zwangsfreiwillige"
 synth_mandatory_volunteers_desc: "Testsubjekte werden gezwungen, an Experimenten zur Digitalisierung des biologischen Bewusstseins teilzunehmen."
 synth_mass_demonstrations: "Massendemonstrationen"
 synth_mass_demonstrations_desc: "Die Arbeiterschaft dieses Planeten hat zu Massendemonstrationen gegen den geplanten Übergang zu Maschinen aufgerufen."
 synth_fund_heritage_sites: "Finanzierung von Kulturerbestätten"
 synth_fund_heritage_sites_desc: "Es werden spezielle Kulturerbestätten geschaffen, um die Auswirkungen des synthetischen Übergangs auf den biologischen Teil unserer Spezies zu begrenzen."
 synth_revere_the_past: "Verehrung der Vergangenheit"
 synth_revere_the_past_desc: "Die religiösen Riten, die aus unserer biologischen Existenz hervorgegangen sind, haben für uns noch immer Bedeutung und wir müssen sie schützen!"
 synth_preserve_the_past: "Bewahrung der Vergangenheit"
 synth_preserve_the_past_desc: "Eine neue Existenz anzunehmen, bedeutet nicht, dass wir die Orte und Gegenstände zerstören sollten, die unserer biologischen Vergangenheit einen Sinn gaben."
 synth_resistance_fight: "Razzia gegen Widerstandsanführer"
 synth_resistance_fight_desc: "Indem wir Maschinenkommandos in die $d_biological_enclaves_no_icon$ schicken und die Anführer des Widerstands festnehmen, bringt man Einwände schneller zum Verstummen."
 synth_resistance_diplomacy: "Diplomatischer Austausch mit Widerstandsanführern"
 synth_resistance_diplomacy_desc: "Die $d_biological_enclaves_no_icon$ zu besuchen, um uns mit den Anführern des Widerstands zu treffen, wird das gegenseitige Verständnis verbessern."
 synth_character_force: "Imitate unserer alten organischen Form"
 synth_character_force_desc: "Das traditionelle Aussehen unserer Spezies bleibt in der digitalen Welt erhalten."
 synth_character_customize: "Uneingeschränkte synthetische Körpermodifikationen"
 synth_character_customize_desc: "Jeder kann sein neues digitales Erscheinungsbild selbst gestalten."
 synth_character_customize_elite: "Beschränkte synthetische Körpermodifikationen"
 synth_character_customize_elite_desc: "Um eine klare soziale Hierarchie aufrechtzuerhalten, ist es nur der Oberschicht erlaubt, ihr Aussehen zu verändern."
 synth_character_customize_corpo: "Monetarisierte synthetische Körpermodifikationen"
 synth_character_customize_corpo_desc: "Unserem Volk steht es frei, sein digitales Erscheinungsbild zu verändern - solange man es sich leisten kann."
 synth_cravings_imperfections: "Bewusste synthetische Imperfektion"
 synth_cravings_imperfections_desc: "Damit unsere Existenz nicht zu leer und unpersönlich wird, werden synthetischen Körpern bewusst Makel hinzugefügt."
 synth_cravings_simulation: "Leben in einer Simulation"
 synth_cravings_simulation_desc: "Wir streben danach, jenen, die sich für ein Leben in der Simulation entschieden haben, ein authentischeres Dasein zu ermöglichen - Härten inbegriffen."
 synth_cravings_stop: "Organische Hardliner ignoriert"
 synth_cravings_stop_desc: "Mit der Zeit wird unser Volk sein perfektioniertes Leben, das von den Schwächen des organischen Daseins befreit wurde, zu schätzen wissen."
 synth_cravings_pain: "Virtuelle Kampfarena"
 synth_cravings_pain_desc: "An schmerzhaften virtuellen Kämpfen teilzunehmen, weckt sowohl in den Teilnehmern als auch in den Zuschauern etwas Vertrautes."
 synth_health_physical: "Körperlicher Gesundheitsfokus für Syntheten"
 synth_health_physical_desc: "Unsere synthetische Gesundheitsfürsorge befasst sich vorrangig mit lokalen Hardwaredefekten."
 synth_health_virtual: "Mentaler Gesundheitsfokus für Syntheten"
 synth_health_virtual_desc: "Ständige Software-Updates, die für die Sicherheit unseres Bewusstseins sorgen, sind unerlässlich für unsere Gesundheit."
 synth_health_both: "Ausgewogener Gesundheitsfokus für Syntheten"
 synth_health_both_desc: "Für das Wohlergehen unserer synthetischen Bevölkerung ist es unerlässlich, sowohl Software- als auch Hardware-Instabilitäten zu beheben."
 synth_health_corporate: "Medikalisierung von Syntheten"
 synth_health_corporate_desc: "Für die Behandlung digitaler Viren ist es von entscheidender Bedeutung, das Wissen unseres Unternehmens über die traditionelle Medikation hinaus zu erweitern."
 synth_virtual_world_outlaw: "Verbot virtueller Welten"
 synth_virtual_world_outlaw_desc: "Hochgradig süchtig machende virtuelle Zufluchtsorte werden als Bedrohung für die Gesellschaft angesehen und sind verboten."
 synth_virtual_world_promote: "Förderung virtueller Welten"
 synth_virtual_world_promote_desc: "In der digitalen Utopie kann unser Volk praktisch unbegrenzte Formen der Unterhaltung genießen."
 synth_virtual_world_regulate: "Regulierte virtuelle Welten"
 synth_virtual_world_regulate_desc: "Hochgradig süchtig machende virtuelle Zufluchtsorte werden streng reguliert, um sicherzustellen, dass niemand den Bezug zur Realität verliert."
 synth_home_centralized: "Zentralisierte Serverfarmen"
 synth_home_centralized_desc: "Jedes digitalisierte Bewusstsein wird in zentralen staatlichen Serverfarmen gespeichert, um eine maximale Kosteneffizienz zu erreichen."
 synth_home_distributed: "Verteilte Heimsysteme"
 synth_home_distributed_desc: "Das digitalisierte Bewusstsein wird in traditionellen Heimnetzwerken gespeichert."
 synth_digital_homes: "Digitale Immobilien"
 synth_digital_homes_desc: "Ähnlich wie auf dem traditionellen Wohnungsmarkt lassen sich mit digitalen Immobilien nahezu identische Erträge zu einem Bruchteil der Kosten erzielen."
 synth_respawn_push: "Lockere Sicherheitsstandards für Syntheten"
 synth_respawn_push_desc: "Niedrige physische Sicherheitsstandards schaffen eine widerstandsfähige Wirtschaft."
 synth_respawn_caution: "Strenge Sicherheitsstandards für Syntheten"
 synth_respawn_caution_desc: "Synthetische Körper und die darin enthaltenen Bewusstseine können nur durch strenge staatliche Vorschriften geschützt werden."
 synth_respawn_elite: "Sicherheitsprivilegien für Syntheten"
 synth_respawn_elite_desc: "Der Oberschicht ist es untersagt, Arbeiten auszuführen, die eine Gefahr für Körper oder Bewusstsein darstellen."
 synth_cultural_exchange: "Kulturelle Verständigung"
 synth_cultural_exchange_desc: "Kulturaustauschprogramme in Bezug auf unsere Kulturerbestätten fördern das wechselseitige Verständnis zwischen unseren Völkern."
 synth_combat_reactors: "Kampfreaktoren"
 synth_combat_reactors_desc: "Unsere Maschinenkörper wurden mit der neuesten Mikrofusionstechnologie ausgestattet, was ihnen eine westlich größere Kampfkraft schenkt."
 synth_AI_actor: "KI-Sprecher"
 synth_AI_actor_desc: "Wir haben eine KI-Kopie einer verstorbenen Berühmtheit angefertigt, um Unterstützung für unsere laufende Synthetisierungskampagne zu erhalten."
 #Deposits
 d_old_towns_no_icons: "Alte Städte"
 d_old_towns: "£blocker£ $d_old_towns_no_icons$"
 d_old_towns_desc: "In den gut erhaltenen Städten dieser Region leben Angehörige unserer ursprünglichen Spezies. Durch den Einsatz von Ressourcen können wir diese Überlebenden dazu ermutigen, ebenfalls das Maschinendasein anzunehmen."
 d_old_towns_custom_tooltip: "Erschafft §Y[Owner.GetNumSynthOpposition] [Owner.GetMechanicalPopOrPops]§!"
 d_biological_enclaves_no_icon: "Biologische Enklaven"
 d_biological_enclaves: "£blocker£ $d_biological_enclaves_no_icon$"
 d_biological_enclaves_desc: "In den Städten dieser Region leben jene, die sich gegen den synthetischen Übergang ausgesprochen haben."
 d_biological_enclaves_custom_tooltip: "Erschafft §Y[Owner.GetNumSynthOpposition] [Owner.GetMechanicalPopOrPops]§!"
 #Policies
 policy_synthetic_identities_policy: "Synthetische Identitäten"
 policy_synthetic_identities_policy_desc: "Es müssen neue synthetische Identitäten geschaffen werden, damit wir uns vermehren können."
 identity_copy_name: "Identitätskopien"
 identity_copy: "$identity_copy_name$"
 identity_copy_desc: "$tech_identity_copy_desc$\n\nDie Erfahrungen dieser Kopien werden durch ihre mangelnde Einzigartigkeit nur leicht getrübt.\n\n$TECH_UNLOCK_IDENTITY_COPY_DESC$\n\n§E$identity_copy_name$ $can_enable_mind_creation$§!"
 identity_fusion_name: "Identitätsfusion"
 identity_fusion: "$identity_fusion_name$"
 identity_fusion_desc: "$tech_identity_fusion_desc$\n\n$TECH_UNLOCK_IDENTITY_FUSION_DESC$\n\n§E$identity_fusion_name$ $can_enable_mind_creation$§!"
 identity_initialization_name: "Identitätsinitialisierung"
 identity_initialization: "$identity_initialization_name$"
 identity_initialization_desc: "$tech_identity_initialization_desc$\n\n$TECH_UNLOCK_IDENTITY_INITIALIZATION_DESC$\n\n§E$identity_initialization_name$ $can_enable_mind_creation$§!"
 can_enable_mind_creation: "wird bei der Montage von Syntheten benutzt"
 policy_computation_core_allocation: "Computergesteuerter Kernfokus"
 policy_computation_core_allocation_desc: "Synthetisierte Unternehmen können Rechenzyklen von ihren Kernsystemen abzweigen, um hochwertige gesellschaftliche Bereiche ohne Verzögerung zu optimieren."
 computation_core_production_name: "Produktionsrationalisierung"
 computation_core_production: "$computation_core_production_name$"
 computation_core_production_desc: "Nutzt freie Verarbeitungszyklen, um den Produktionsprozess zu rationalisieren.$computation_core_production_tt$"
 computation_core_production_tt: "\n\n$EFFECTS_HEADER$ $NEW_LINE$- Jeweils $pop_group_unit$ £job_roboticist£ $job_roboticist_plural$ und $job_identity_designer_plural_with_icon$ erhöhen die §Y$BONUS_WORKFORCE_FOR$ £job_foundry£ $job_foundry_plural$§! und §Y£job_artisan£ $job_artisan_plural$§! um §G+2.5%§!"
 computation_core_stability_name: "Stabilitätsanalyse"
 computation_core_stability: "$computation_core_stability_name$"
 computation_core_stability_desc: "Weist Ressourcen zu, um den gesellschaftlichen Informationsfluss auf Unregelmäßigkeiten zu überwachen.$computation_core_stability_tt$"
 computation_core_stability_tt: "\n\n$EFFECTS_HEADER$ $NEW_LINE$- Jeweils $pop_group_unit$ £job_roboticist£ $job_roboticist_plural$ und $job_identity_designer_plural_with_icon$ erhöhen die §Y$BONUS_WORKFORCE_FOR$ £job_bureaucrat£ $job_bureaucrat_plural$§! um §G+2.5%§!"
 computation_core_research_name: "Forschungsprozesse"
 computation_core_research: "$computation_core_research_name$"
 computation_core_research_desc: "Weist leistungsintensiven Forschungsservern zusätzliche Verarbeitungszyklen zu.$computation_core_research_tt$"
 computation_core_research_tt: "\n\n$EFFECTS_HEADER$ $NEW_LINE$- Jeweils $pop_group_unit$ £job_roboticist£ $job_roboticist_plural$ und $job_identity_designer_plural_with_icon$ erhöhen die §Y$BONUS_WORKFORCE_FOR$ £job_physicist£ $job_physicist_plural$§!, §Y£job_biologist£ $job_biologist_plural$§! und §Y£job_engineer£ $job_engineer_plural$§! um §G+2.5%§!"
 #Technologies
 tech_identity_copy: "Identitätskopien"
 tech_identity_copy_desc: "Wir werden in der Lage sein, die Identität und die Erinnerungen eines Syntheten in einen neuen mechanischen Körper zu kopieren. Die Kopien haben vorhersehbare Fähigkeiten, sorgen aber für langweilige Gespräche."
 TECH_UNLOCK_IDENTITY_COPY_TITLE: "Neue Richtlinie:$TABBED_NEW_LINE$§H$policy_synthetic_identities_policy$§! - $identity_copy_name$"
 TECH_UNLOCK_IDENTITY_COPY_DESC: "£pop£ §HMechanische Bewohner§!$TABBED_NEW_LINE$Zufriedenheit: §R-5%§!"
 tech_identity_fusion: "Identitätsfusion"
 tech_identity_fusion_desc: "Die Identitäten und Erinnerungen von zwei oder mehr Syntheten in einem einzelnen mechanischen Körper zu verschmelzen, erschafft ein gewissermaßen einzigartiges neues Individuum."
 TECH_UNLOCK_IDENTITY_FUSION_TITLE: "Neue Richtlinie:$TABBED_NEW_LINE$§H$policy_synthetic_identities_policy$§! - $identity_fusion_name$"
 TECH_UNLOCK_IDENTITY_FUSION_DESC: "£pop£ §HMechanische Bewohner§!$TABBED_NEW_LINE$Montagekosten: §R+10%§!"
 tech_identity_initialization: "Identitätsinitialisierung"
 tech_identity_initialization_desc: "Wir werden in der Lage sein, einen Identitätskern zu initialisieren und ihn mit einer virtuellen Kindheit auszustatten. Dieser Prozess ist zwar kostspielig, aber wir können so eine optimale Erfahrung generieren, um produktive Persönlichkeiten zu schaffen."
 TECH_UNLOCK_IDENTITY_INITIALIZATION_TITLE: "Neue Richtlinie:$TABBED_NEW_LINE$§H$policy_synthetic_identities_policy$§! - $identity_initialization_name$"
 TECH_UNLOCK_IDENTITY_INITIALIZATION_DESC: "£pop£ §HMechanische Bewohner§!$TABBED_NEW_LINE$Zufriedenheit: §G+5%§!$TABBED_NEW_LINE$Ressourcen durch £job£ §HJobs§!: §G+5%§!$TABBED_NEW_LINE$Montagekosten: §R+20%§!"
 #DIGITIZATION STAGE 1
 synth.100.name: "Hochfahren" #Stage 1 - Start event
 synth.100.desc: "Es ist an der Zeit, unsere biologischen Formen abzulegen, um in Legierungen und Elektrizität aufzusteigen. Mit unseren hochmodernen Körpern und dem schnelleren Bewusstsein marschieren wir in die Zukunft. [Owner.Species.GetFleshTypeCyberCreed::<ART_DEF_S_N_Cap>] [Owner.Species.GetFleshTypeCyberCreed&NOM] ist fehlbar, doch eine Maschine lässt sich perfektionieren.\n\nDer Übergang ist allerdings nicht ganz ungefährlich. Die Forschungsgemeinschaft benötigt mindestens einen $building_identity_complex$, der als Zentrum für die synthetische Entwicklung dient. Schmieden wir unser eigenes Schicksal!"
 synth.100.a: "Wir schmieden unser eigenes Schicksal."
 synth.100.a.tt: "§RErforderliche Maßnahme:§!\nBaut ein $building_identity_complex$, um die Situation \"§Y$situation_digitization$§!\" fortzuführen."
 synth.105.name: "Verbesserte Bauweise"
 synth.105.desc: "Dank der gesteigerten Verarbeitungsleistung eines synthetischen Gehirns können wir unsere biologischen Fesseln abstreifen.$synth.105.end$"
 synth.105.end: "\n\nWir könnten uns entweder darauf konzentrieren, den Entscheidungsfindungsprozess zu beschleunigen, die Speicherkapazität erhöhen oder die Koordination von Gliedmaßen verbessern - alles Optimierungen, die das Arbeiten in bestimmten Jobs erleichtern würden. Alternativ könnten wir die Haltbarkeit aller Körper verbessern.\n\nDa diese Leistungssteigerung eine dauerhafte Überwachung benötigt, wird dies nur auf Planeten mit einer Roboter-Montageanlage verfügbar sein, doch mit dem, was wir aus dem Entwurf gelernt haben, sollte es zu einer unmittelbaren Produktivitätssteigerung führen."
 synth.105.a: "Optimiert den Entscheidungsfindungsprozess."
 build_better_synths: "Fügt Robotermontage-Gebäuden den folgenden Modifikator hinzu:"
 synth.105.a.tt: "$build_better_synths$\nRessourcenproduktion (Eliten-Bewohner): §G+15%§!\n\n"
 synth.105.b: "Legt den Schwerpunkt auf die Speicherkapazität."
 synth.105.b.tt: "$build_better_synths$\nBewohnerressourcenproduktion (Spezialisten): §G+5%§!\n\n"
 synth.105.c: "Verbessert die motorischen Funktionen."
 synth.105.c.tt: "$build_better_synths$\nBewohnerressourcenproduktion (Arbeiter): §G+10%§!\n\n"
 synth.105.d: "Verbessert die Haltbarkeit."
 synth.105.d.tt: "$build_better_synths$\n$mod_planet_jobs_upkeep_mult$: §G-5%§!\n\n"
 #Stage 1 Opportunities - Research
 synth.120.name: "Kinästhetische Mikrofusion"
 synth.120.desc: "\"Mit Mikrofusionsmodifikationen kann man einen ganzen Panzer heben\", schreibt ein großer Verbrauchertestdienst. Das ist keine Übertreibung: Die jüngsten Entwicklungen in der Mikrofusionstechnologie versprechen, unsere Maschinenkörper erheblich zu verbessern.\n\nDer Einbau winziger Fusionsreaktoren ist zwar etwas riskant, erlaubt es uns aber, explosionsartig Energie in wichtige Systeme umzuleiten. Dies würde uns natürlich dazu zwingen, unseren Produktionszeitplan neu zu bewerten, da die Generatoren den Projektumfang erheblich erweitern."
 synth.120.a: "Wir müssen die Perfektion anstreben!"
 synth.120.a.tt: "§Y$situation_digitization$§!-Situationsfortschritt für §Y1§! Jahr: §R-50%§!"
 situation_kinesthetic_microfusion_tt: "Kinästhetische Mikrofusionskonfiguration"
 synth.120.b: "Eine unnötige Funktion."
 synth.120.c: "Konzentrieren wir uns darauf, unsere Kampfkraft zu erhöhen."
 #Stage 1 Challenges - Research
 synth.160.name: "Negative Schlagzeilen"
 synth.160.desc: "Ein neues Melodram erfreut sich großer Beliebtheit und hat die Öffentlichkeit in seinen Bann gezogen. Im Mittelpunkt der Handlung steht ein synthetischer Arbeiter, der nach und nach eine wachsende Dissoziation angesichts seines neuen Körpers erlebt.\n\nWährend der Protagonist immer weiter außer Kontrolle gerät, können seine Freunde und Angehörigen nur entsetzt zusehen. Das tragische Ende des Dramas wird als kaum verhüllte Kritik an unserem geplanten Übergang zu Maschinenkörpern gesehen.\n\nDer öffentliche Diskurs über den Kassenschlager ist ein harter Rückschlag für uns und könnte letztlich unseren Fortschritt bremsen."
 synth.160.a: "Das wird sich legen."
 synth.160.b: "Leitet ein paar Forschungsgelder in die PR um."
 synth.160.c: "Verhaftet den Direktor des Melodrams."
 synth.160.d: "Verhängt eine Nachrichtensperre."
 #DIGITIZATION STAGE 2
 synth.200.name: "Bewusstseinsphilosophie" #Stage 2 - Start event
 synth.200.desc: "Wir gingen davon aus, die Vorteile eines vollständig digitalisierten Bewusstseins wären so offensichtlich, dass wir jede Art von Opposition von vornherein ausgeschlossen hätten. Wie sich herausstellte, war dies zu naiv. Die Einwände gegen die vollständige Synthetisierung waren heftig und müssen nun ausgeräumt werden.\n\nDie Hauptkritik bezieht sich auf unsere Unfähigkeit, einen Beweis dafür zu liefern, dass das Selbst sicher und vollständig übertragen werden kann. Die Befürchtung, dass alles, was wir bisher geschafft haben, lediglich eine digitale Kopie ist, ist nicht ganz unbegründet. Sind diese Bewusstseine wirklich unsere eigenen?"
 synth.200.a: "Sagt die Wahrheit: Wir wissen es nicht."
 synth.200.a.tt: "Führt eine Informationskampagne durch, die zu §Hminimalem§! Synthetisierungswiderstand führt.\n\n"
 synth.200.b: "Erzählt ihnen, was sie hören wollen."
 synth.200.b.tt: "Führt eine Täuschungskampagne durch, die zu §Hmoderatem§! Synthetisierungswiderstand führt.\n\n"
 synth.200.c: "Diese paar Gegenstimmen werden uns nicht von unserem Kurs abbringen."
 synth.200.c.tt: "Ignoriert die Einwände, was zu einem §Hmaximalen§! Synthetisierungswiderstand führt."
 synth.200.c.material: "Die Frage des Bewusstseins ist irrelevant."
 synth.200.c.material.tt: "Eine rein wissenschaftliche Betrachtungsweise wird zu einem §Hmoderaten§! Synthetisierungwiderstand führen.\n\n"
 synth.205.name: "An der Vergangenheit festhalten"
 synth.205.desc: "Unser Projekt zur Synthetisierung der Bevölkerung stößt weiterhin auf Widerstand. Überall im Reich kommt es zu gewalttätigen Demonstrationen und unsere Ordnungskräfte sind kaum in der Lage, sie einzudämmen. Die Demonstranten befürchten, genau die Dinge zu verlieren, die dem Leben einen Sinn geben. Welchen Sinn hat die Synthetisierung, wenn sie zu einem Verlust an körperlichem Vergnügen oder Geselligkeit führt?\n\nHardliner innerhalb der Protestbewegung fordern, bestimmte Städte zu Kulturerbestätten zu erklären. Diese würden es Digitalisierungsverweigerern erlauben, ihr biologisches Leben ungestört fortzusetzen."
 synth.205.a.regular: "Wir unterstützen diese Kulturerbestätten in vollem Umfang."
 synth.205.a.spiritualist: "Unsere Vergangenheit muss bewahrt werden."
 synth.205.a.memorialist: "Die Vergangenheit zu respektieren, ist ein Akt der Ehrerbietung."
 synth.205.b: "Wir müssen die Vergangenheit hinter uns lassen."
 #Stage 2 Opportunities - Objectors
 synth.220.name: "Zweites Leben"
 synth.220.desc: "Eine berühmte Persönlichkeit, die sich zuvor lautstark gegen die Synthetisierung unserer Körper aussprach, hat einen Unfall erlitten und liegt derzeit im Wachkoma. Während die Bevölkerung den Verlust ihres geliebten Idols beklagt, sehen unsere Berater darin auch eine Chance.\n\nDas Bewusstsein zu digitalisieren und ihm ein zweites Leben in einem synthetischen Körper anzubieten, würde zweifellos einige Fans zu begeisterten Synthetisierungsbefürwortern machen. Obwohl das Verfahren an sich völlig legal ist, erfordert es dennoch die Zustimmung des Betroffenen, und diese berühmte Persönlichkeit würde selbige niemals erteilen. Sollte unsere PR-Abteilung die Digitalisierung nicht gut vermarkten, könnte sich dies zu einem medialen Desaster entwickeln."
 synth.220.a: "Die Synthetisierung ist kein Verbrechen."
 synth.220.a.tt.negative: "§Y$situation_digitization$§!-Situationsfortschritt für §Y6§! Monate: §R-30%§!"
 synth.220.a.tt.positive: "§Y$situation_digitization$§!-Situationsfortschritt für §Y6§! Monate: §G+30%§!"
 synth.220.b: "Wir können dieses Risiko nicht eingehen."
 synth.220.c: "Täuscht die Öffentlichkeit mit einem KI-Ersatz."
 synth.220.c.tt: "Das Abbild wird zu einem Akteur in unserem Narrativ werden."
 #Stage 2 Challenges - Objectors
 synth.260.name: "Bewusstseinsverlust"
 synth.260.desc: "Unsere Versuche, die Billionen synaptischer Verbindungen zu digitalisieren, aus denen ein biologisches Bewusstsein besteht, endeten in einem katastrophalen Fehlschlag. Ein einfacher Syntaxfehler führte zur sofortigen Löschung der Nervenbahnen. Manche nennen dies Mord.\n\nUnsere Testsubjekte waren allesamt Freiwillige, doch ihre trauernden Angehörigen fordern dennoch Gerechtigkeit. Erschwerend hinzu kommt noch, dass dies die Suche nach neuen Testsubjekten erschwert."
 synth.260.a: "Entschädigt die Familien und setzt die Experimente fort."
 synth.260.b: "Neue Testsubjekte können durch ein Losverfahren ausgewählt werden."
 synth.260.b.tt: "§Y$situation_digitization$§!-Situationsfortschritt für §Y1§! Jahr: §R-25%§!"
 situation_test_subject_lottery_tt: "Testsubjektlotterie"
 synth.260.c: "Findet weitere Freiwillige. Zwingt sie nötigenfalls."
 #DIGITIZATION STAGE 3
 synth.300.name: "Upload von Massenidentitäten" #Stage 3 - Start event
 synth.300.desc: "Überall in unserem Reich und besonders in jedem größeren Stadtzentrum wurden Synthetisierungskabinen aufgestellt, um unsere [owner.species.GetNamePlural]-Bevölkerung in die digitale Zukunft zu führen. Die von unseren $job_identity_designer_plural$n entworfenen digitalen Identitätsmuster sorgen dafür, dass das biologische Original eins zu eins übertragen wird.\n\nEndlich ist der Tag gekommen, an dem wir unsere biologische Vergangenheit ablegen und uns der synthetischen Zukunft zuwenden."
 synth.300.a: "Synthetisieren!"
 synth.300.a.resistance.tt: "$unlock_edict_tt$ ['concept_edict_subsidized_identity_backups']\n\nVerschiebt §Y[Owner.GetNumSynthOpposition] [Owner.GetBiologicalPopOrPops]§! in §Y$d_biological_enclaves$§! auf [root.owner.capital_scope.GetName]\nDie Entfernung des Blockers gibt §Y[Owner.GetNumSynthOpposition] [Owner.GetMechanicalPopOrPops]§! zurück\n\nEntfernt den Modifikator \"§Y$synth_mass_demonstrations$§!\" von [root.owner.capital_scope.GetName]\n\nDie Synthetisierungsgeschwindigkeit hängt vom Situationsansatz und der Anzahl an Roboter-Montageanlagen ab."
 synth.300.a.heritage.tt: "$unlock_edict_tt$ ['concept_edict_subsidized_identity_backups']\n\nVerschiebt §Y[Owner.GetNumSynthOpposition] [Owner.GetBiologicalPopOrPops]§! in §Y$d_old_towns$§! auf [root.owner.capital_scope.GetName]\nDie Entfernung des Blockers gibt §Y[Owner.GetNumSynthOpposition] [Owner.GetMechanicalPopOrPops]§! zurück\n\nDie Synthetisierungsgeschwindigkeit hängt vom Situationsansatz und der Anzahl an Roboter-Montageanlagen ab."
 synth.305.name: "Synthetischer Tourismus"
 synth.305.desc: "Obwohl die ausgewiesenen Kulturerbestätten auf [root.owner.capital_scope.GetName] von der Öffentlichkeit gut aufgenommen wurden, hat sich die Initiative vielleicht als zu erfolgreich erwiesen. In einer Welle von Nostalgie sind Unmengen synthetischer Touristen zu den Stätten geströmt und haben begonnen, die biologischen Bewohner zu stören.\n\nEs könnte notwendig sein, den Tourismus einzuschränken, wenn wir ein Gefühl der Authentizität an diesen Orten erhalten wollen. Andererseits könnte die Interaktion zwischen Tourist und Bewohner faszinierende soziologische Erkenntnisse liefern."
 synth.305.a: "Begrenzt den Tourismus."
 synth.305.b: "Besucher könnten eine lukrative Einnahmequelle darstellen."
 synth.305.c: "Studiert, welche Auswirkungen der Tourismus auf diese Stätten hat."
 synth.305.d: "Der kulturelle Austausch fördert das gegenseitige Verständnis."
 synth.310.name: "Der Widerstand"
 synth.310.desc: "Die Widerstandsbewegung, die sich gegen die Synthetisierung auf [root.owner.capital_scope.GetName] ausspricht, ist in ihrer Vorgehensweise und ihren Ambitionen radikaler geworden. Unsere Sicherheitskräfte haben einen Anstieg an Gewalt und die Verbreitung illegaler Waffen innerhalb der extremeren Teile der Bewegung festgestellt.\n\nManche dieser Abtrünnigen, die sich selbst als \"Widerstandsführer\" bezeichnen, verstecken sich, um aus den Schatten gegen die Regierung vorzugehen."
 synth.310.a: "Ergreift ihre Anführer!"
 synth.310.a.tt: "§Y$situation_digitization$§!-Situationsfortschritt für §Y1§! Jahr: §G+25%§!\n\n"
 synth.310.b: "Versucht, die Situation zu entschärfen."
 synth.310.b.tt: "§Y$situation_digitization$§!-Situationsfortschritt für §Y1§! Jahr: §R-25%§!\n\n"
 #Stage 3 Opportunities - Mind Upload
 synth.320.name: "21.386.732.184 Speichereinheiten"
 synth.320.desc: "21.386.732.184 Speichereinheiten: Das ist die durchschnittliche Kapazität eines [root.owner.GetSpeciesAdj]en Gehirns. Doch nicht alle Gehirne sind gleich.\n\nWährend der Synthetisierungsprozess immer weiter voranschreitet, argumentieren manche, nicht alle Gehirne seien eines künstlichen Körpers würdig. Die Frage, wem man den Vorzug geben sollte, ist allerdings heikel. Vielleicht ließen sich weniger wünschenswerte Bewusstseine auch ... verbessern, sobald sie erst einmal digitalisiert wurden? Praktisch umprogrammieren?"
 synth.320.a: "Jedes Bewusstsein ist es wert, bewahrt zu werden."
 synth.320.b: "Es zu versuchen, wird sicher nicht schaden."
 synth.320.c: "Priorisiert nur die klügsten Bewusstsein."
 synth.320.d: "Programmiert \"problematische\" Bewusstseine einfach um."
 #Stage 3 Challenges - Mind Upload
 synth.360.name: "Over-the-Air-Malware"
 synth.360.desc: "Um die Produktivität unserer [roboticist.GetNamePlural] zu steigern, haben unsere Manager unsichere Over-the-air-Updates für die Identitätssoftware genehmigt. Ziel war es, ein Update aufzuspielen, das Wissen über optimale Arbeitsprozesse vermittelt, doch stattdessen gingen die Persönlichkeiten und die Erinnerungen der unglücklichen Empfänger teilweise verloren.\n\nDas Managementteam argumentiert, es koste zu viel Zeit, die Identitätsupdates vor der Veröffentlichung vollständig zu testen, und dass es einfacher wäre, Arbeiter, die ihre Erinnerungen verlieren, einfach neu zuzuweisen."
 synth.360.a: "Eine optimierte Produktivität ist die Kosten wert."
 synth.360.a.tt: "Fügt Robotermontage-Gebäuden den folgenden Modifikator hinzu:\n$MOD_PLANET_POP_ASSEMBLY_MULT$: §G+10%§!\n\nGrundunterhalt (§Y[roboticist.GetNamePlural]§!): £alloys£§R3.00§!"
 synth.360.b: "Sorgt für einen sicheren Update-Prozess, auch wenn dieser langsamer ist."
 synth.360.b.tt: "Fügt Robotermontage-Gebäuden den folgenden Modifikator hinzu:\n$MOD_PLANET_POP_ASSEMBLY_MULT$: §R-10%§!\nStabilität: §G+5§!"
 #DIGITIZATION STAGE 4
 synth.400.name: "Eine perfekte Kopie" #Stage 4 - Start event
 synth.400.desc: "Als wir unsere Bewusstseine digitalisierten und in synthetische Körper hochluden, verloren wir die Fähigkeit, uns biologisch fortzupflanzen. Neue Individuen können nur noch geschaffen werden, indem wir Kopien eines vorhandenen Bewusstseins anfertigen.\n\nWährend unsere $job_identity_designer_plural$ ihre Untersuchungen fortsetzen, werden wir den Prozess zweifellos verbessern. Doch selbst die perfekte Kopie ist nichts weiter als eine einfache Replik. Ein neues Bewusstsein zu erschaffen, eine neue Identität ... Darin liegt die wahre Herausforderung."
 synth.400.a: "Erlaubt jedem, eine kostenlose Identitätskopie zu beantragen."
 synth.400.pop.tt: "$unlock_edict_tt$ ['concept_edict_optimized_identity_creation']\n\nJeder §Y$job_identity_designer$§! gibt jetzt reichsweit:$TABBED_NEW_LINE$£mod_planet_pop_assembly_mult£ $MOD_POP_ASSEMBLY_SPEED$: §G+1§!\n\n"
 synth.400.b: "Stellt den Benutzern jede Kopie in Rechnung."
 synth.405.name: "Diversifizierte Identitäten"
 synth.405.desc: "Unsere $job_identity_designer_plural$ haben zwei Methoden entwickelt, um vielfältigere digitale Identitäten zu schaffen.\n\nEine Möglichkeit besteht darin, die Eigenschaften von zwei oder mehr bereits vorhandenen Persönlichkeiten zu vermischen, um eine neue kombinierte Identität zu schaffen. Eigenschaften, die wir bevorzugen, könnten priorisiert oder nach dem Zufallsprinzip ausgewählt werden. In jedem Fall wäre die neue Identität sicherlich interessanter als unsere derzeitigen Identitätskopien.\n\nAlternativ dazu könnten wir eine neue Identität aus einem künstlichen Kern initialisieren und diese eine beschleunigte (und simulierte) Kindheit erleben lassen. So könnte man eine perfekte Persönlichkeit entwerfen."
 synth.405.a: "Wir werden unsere Identitäten vermischen."
 synth.405.a.vault: "Wir vermischen uns mit unseren digitalisierten Vorfahren."
 synth.405.a.tt: "Neue Forschungsoption: £engineering£§Y$tech_identity_fusion$§!\n\nZukünftige Forschungsmöglichkeit: £engineering£§Y$tech_identity_initialization$§!"
 synth.405.b: "Eine virtuelle Tagesbetreuung ist optimal geeignet."
 synth.405.b.tt: "Neue Forschungsoption: £engineering£§Y$tech_identity_initialization$§!\n\nZukünftige Forschungsmöglichkeit: £engineering£§Y$tech_identity_fusion$§!"
 synth.4.name: "Eine synthetische Bevölkerung" #Digitization - Last event
 synth.4.desc: "Dank unserer koordinierten Anstrengungen haben wir das scheinbar Unmögliche geschafft: Wir haben unser Bewusstsein in einen Code und unsere Körper in Maschinen verwandelt.\n\nDer Prozess war nicht ungefährlich und der Übergang alles andere als einfach. Doch was auch immer auf dem Weg verloren gegangen sein mag: Unsere neue Konfiguration bietet unendliche Möglichkeiten."
 synth.4.desc.unplugged: "Dank unserer koordinierten Anstrengungen haben wir erneut das scheinbar Unmögliche geschafft: Wir haben uns weit über das hinaus entwickelt, was [origin_unplugged_assimilator_empire.GetName] je erwartet hätte. Wir haben unser Bewusstsein in einen Code und unsere Körper in Maschinen verwandelt.\n\nDer Prozess war nicht ungefährlich und der Übergang alles andere als einfach. Doch was auch immer auf dem Weg verloren gegangen sein mag: Unsere neue Konfiguration bietet unendliche Möglichkeiten."
 synth.4.a: "Wir werden außergewöhnlich sein."
 synth.4.a.tt: "Schaltet die vollständigen Effekte des Traditionsbaums \"['tradition_category:tradition_synthetics']\" frei"
 ### DIGITIZATION SITUATION END ###
 ### SOCIETAL EFFECTS EVENT CHAIN START ###
 synthshock_chain_title: "Digitale Refaktorierung"
 synthshock_chain_desc: "Die Synthetisierung einer ganzen Bevölkerung ist ein Unterfangen von monumentalem Ausmaß und wird zwangläufig auch das ein oder andere Problem mit sich bringen. Uns an unsere neue Normalität anzupassen, wird unser tägliches Leben zweifellos vor ungeahnte Herausforderungen stellen, aber auch einzigartige Chancen bieten.\n\nDie Art und Weise, wie wir diese Veränderungen bewältigen, wird unsere Gesellschaft für die Zukunft prägen."
 synth_keep_auth_option: "Die Synthetisierung ändert nicht, wer wir sind."
 ### AUTHORITIES ###
 #DEMOCRATIC
 #Synth Democratic Physical
 auth_synth_democratic_physical: "Demokratische Übertragung"
 auth_synth_democratic_physical_desc: "Diese Regierungsform bietet mit der Bewusstseinsübertragung in einen neuen synthetischen Körper eine noch nie da gewesene Bewegungsfreiheit und ist bereit, die damit verbundenen zusätzlichen Kosten zu tragen."
 auth_synth_democratic_physical_tt: "$auth_democratic_election_tt$\nJob-Effizienz (Spezialisiten): §G+1%§! für jeden £district£ Distrikt\nUnterhalt (Distrikte) §R+1%§! für jeden £district£ Distrikt"
 concept_auth_synth_democratic_physical: "$auth_synth_democratic_physical$"
 gov_synth_democracy_physical: "$auth_synth_democratic_physical$"
 gov_synth_democracy_physical_desc: "$auth_synth_democratic_physical_desc$"
 #Synth Democratic Virtual
 auth_synth_democratic_virtual: "Demokratisches Surrogat"
 auth_synth_democratic_virtual_desc: "Soldaten durch ausgeklügelte, ferngesteuerte Systeme zu ersetzen, verringert die negativen Auswirkungen, die ein Krieg auf die Bevölkerung hat. Schiffe lassen sich ebenfalls schlanker bauen, da die Besatzung keine Quartiere oder Cockpits mehr benötigt."
 auth_synth_democratic_virtual_tt: "$auth_democratic_election_tt$"
 concept_auth_synth_democratic_virtual: "$auth_synth_democratic_virtual$"
 gov_synth_democracy_virtual: "$auth_synth_democratic_virtual$"
 gov_synth_democracy_virtual_desc: "$auth_synth_democratic_virtual_desc$"
 #OLIGARCHIC
 auth_cyber_oligarch_ruler_enforcers_tt: "Ressourcenproduktion (Herrscher) für jeden [enforcer.GetIcon] [enforcer.GetNamePlural]: §G+10%§!"
 #Synth Oligarchic Physical
 auth_synth_oligarchic_physical: "Oligarchische Überbrückung"
 auth_synth_oligarchic_physical_desc: "Eine synthetische Oligarchie, die die höchsten Verwalter dazu ermächtigt, vorübergehend die Körper ihrer leistungsschwächeren Kollegen zu übernehmen, um Katastrophen im Prozessmanagement zu vermeiden."
 concept_auth_synth_oligarchic_physical: "$auth_synth_oligarchic_physical$"
 gov_synth_oligarchy_physical: "$auth_synth_oligarchic_physical$"
 gov_synth_oligarchy_physical_desc: "$auth_synth_oligarchic_physical_desc$"
 #Synth Oligarchic Virtual
 auth_synth_oligarchic_virtual: "Oligarchische Überwachung"
 auth_synth_oligarchic_virtual_desc: "Holistische Projektmanagementprotokolle und zusätzliche Bearbeitungsressourcen befähigen hochrangige Beamte, mehrere reichsweite Erlasse mit einer noch nie da gewesenen Effizienz zu überwachen."
 concept_auth_synth_oligarchic_virtual: "$auth_synth_oligarchic_virtual$"
 gov_synth_oligarchy_virtual: "$auth_synth_oligarchic_virtual$"
 gov_synth_oligarchy_virtual_desc: "$auth_synth_oligarchic_virtual_desc$"
 #DICTATORIAL
 #Synth Dictatorship Physical
 auth_synth_dictatorial_physical: "Diktatorische Mannigfaltigkeit"
 auth_synth_dictatorial_physical_desc: "Synchronisierte Neuroverbindungen und die sie unterstützende Infrastruktur erlauben es einem einzigen Individuum, mehrere synthetische Körper gleichzeitig zu steuern. Dies hat einen enormen positiven Effekt auf die Produktivität der Arbeiter."
 concept_auth_synth_dictatorial_physical: "$auth_synth_dictatorial_physical$"
 gov_synth_dictatorship_physical: "$auth_synth_dictatorial_physical$"
 gov_synth_dictatorship_physical_desc: "$auth_synth_dictatorial_physical_desc$"
 #Synth Dictatorship Virtual
 auth_synth_dictatorial_virtual: "Diktatorische Indoktrination"
 auth_synth_dictatorial_virtual_desc: "Wir leben heute in einer vollständig virtuellen Welt. Nichts ist real. Alles kann manipuliert werden.\n\nDa wir die vollständige Kontrolle über die digitale Umgebung haben, können wir die öffentliche Meinung nach unseren Wünschen formen. Alle werden genau das glauben, was wir sie glauben lassen wollen."
 concept_auth_synth_dictatorial_virtual: "$auth_synth_dictatorial_virtual$"
 gov_synth_dictatorship_virtual: "$auth_synth_dictatorial_virtual$"
 gov_synth_dictatorship_virtual_desc: "$auth_synth_dictatorial_virtual_desc$"
 #IMPERIAL
 #Synth Imperial Physical
 auth_synth_imperial_physical: "Imperiales Feedback"
 auth_synth_imperial_physical_desc: "Wir können unsere Forschungsbemühungen beschleunigen, indem wir die in den imperialen Bewusstseinsarchiven gespeicherten Abdrücke unserer verstorbenen Anführer analysieren. So können sie selbst nach dem Tod noch einen Beitrag für das Imperium leisten.\n\nDer imperiale Thron wird nach dem Tod des Herrschers vom designierten Thronfolger geerbt."
 auth_synth_imperial_physical_tt: "Anführer geben bei ihrem Ableben $r_research$: $TABBED_NEW_LINE$$scientist_plural_with_icon$ - $r_physics$ $TABBED_NEW_LINE$$official_plural_with_icon$ - $r_society$ $TABBED_NEW_LINE$$commander_plural_with_icon$ - $r_engineering$ $NEW_LINE$ Die erhaltene $r_research$ skaliert mit der §YFähigkeitsstufe des Anführers§!"
 concept_auth_synth_imperial_physical: "$auth_synth_imperial_physical$"
 gov_synth_imperial_physical: "$auth_synth_imperial_physical$"
 gov_synth_imperial_physical_desc: "$auth_synth_imperial_physical_desc$"
 #Synth Imperial Virtual
 auth_synth_imperial_virtual: "Imperiale Transmission"
 auth_synth_imperial_virtual_desc: "Die Technologie des schnellen Bewusstseinstransfers erlaubt es uns, unsere gefallenen Soldaten in neuen mechanischen Körper erneut in die Schlacht zu schicken. Dieselbe Technik ermöglicht es unseren Arbeitern auch, hochgefährliche Schiffsreparaturen im Weltraum durchzuführen.\n\nDer imperiale Thron wird nach dem Tod des Herrschers vom designierten Thronfolger geerbt."
 auth_synth_imperial_virtual_tt: "Unsere Roboterarmeen werden mit einer Wahrscheinlichkeit von §Y33%§! wiederhergestellt, wenn sie besiegt werden."
 concept_auth_synth_imperial_virtual: "$auth_synth_imperial_virtual$"
 gov_synth_imperial_virtual: "$auth_synth_imperial_virtual$"
 gov_synth_imperial_virtual_desc: "$auth_synth_imperial_virtual_desc$"
 #CORPORATE
 #Synth Corporate Physical
 auth_synth_corporate_physical: "Vernunftschaffungskonzern"
 auth_synth_corporate_physical_desc: "Mit Begrenzungen versehene synthetische Gehirne können in unbelebte Objekte eingebaut werden, um rudimentäre Lebewesen zu schaffen. Diese können als unermüdliche Diener, treue Begleiter oder sogar geschätzte Mitglieder Eurer Familie oder Eures Unternehmens fungieren.\n\nKonzernregierungen sind riesige Wirtschaftsunternehmen, die die Rolle des Staates vollständig verdrängt haben."
 auth_synth_corporate_physical_tt: "$AVAILABLE_POLICIES$ §Y$policy_computation_core_allocation$§!\n$AVAILABLE_HOLDINGS$ ['building:building_ai_emporium']"
 concept_auth_synth_corporate_physical: "$auth_synth_corporate_physical$"
 gov_synth_corporate_physical: "$auth_synth_corporate_physical$"
 gov_synth_corporate_physical_desc: "$auth_synth_corporate_physical_desc$"
 #Synth Corporate Virtual
 auth_synth_corporate_virtual: "Erinnerungskonzern"
 auth_synth_corporate_virtual_desc: "Dieses Unternehmen kauft Erinnerungen und löscht sie dauerhaft aus dem Gehirn des Kunden. Lebendige und intensive Erinnerungen sind mehr wert als alltägliche. Das Unternehmen geht die Daten anschließend nach nützlichen Informationen durch, ehe es sie schließlich in den synthetischen Bewusstseinserschaffungsprozess integriert.\n\nKonzernregierungen sind riesige Wirtschaftsunternehmen, die die Rolle des Staates vollständig verdrängt haben."
 auth_synth_corporate_virtual_tt: "$AVAILABLE_POLICIES$ §Y$policy_computation_core_allocation$§!\n$AVAILABLE_HOLDINGS$ ['building:building_clear_thought_clinic']"
 concept_auth_synth_corporate_virtual: "$auth_synth_corporate_virtual$"
 gov_synth_corporate_virtual: "$auth_synth_corporate_virtual$"
 gov_synth_corporate_virtual_desc: "$auth_synth_corporate_virtual_desc$"
 ### EDICTS ###
 edict_subsidized_identity_backups: "Subventionierte Identitätsback-ups"
 edict_subsidized_identity_backups_desc: "Die Regierung stellt den immensen Serverplatz zur Verfügung, den kontinuierlicher Identitätsback-ups benötigen."
 edict_subsidized_identity_backups_effect: "$MOD_LEADER_LIFESPAN_ADD$: §G+20 Jahre§!\n$MOD_LEADER_SPECIES_EXP_GAIN$: §G+10%§!"
 concept_edict_subsidized_identity_backups: "$edict_subsidized_identity_backups$"
 edict_optimized_identity_creation: "Optimierte Identitätsschöpfung"
 edict_optimized_identity_creation_desc: "Fortschrittliche Persönlichkeits- und Kernspeicher-Komprimierungsalgorithmen verbessern die Geschwindigkeit der Identitätsschöpfung."
 concept_edict_optimized_identity_creation: "$edict_optimized_identity_creation$"
 ### EVENTS ###
 synth.social_consequences.tt: "Beeinflusst den laufenden §Ysynthetischen Gesellschaftswandel§!.\n\n" #Standard tooltip to indicate that the Physical/Virtual focus variables has changed
 #FIRST EVENT #
 #DEMOCRATIC
 synth.505.name: "$synthshock_chain_title$"
 synth.505.desc: "Dank der Bemühungen unserer Regierung wurde das Bewusstsein eines jeden gewillten Bürgers digitalisiert. Die Synthetisierung hat uns neue Wege eröffnet, die wir uns noch nicht einmal vorstellen können und die zu neuen Herausforderungen und Möglichkeiten führen werden.\n\nIndem wir unsere Bemühungen auf die physische Welt konzentrieren, könnten wir unser digitalisiertes Bewusstsein über große Entfernungen in einen neuen Körper übertragen, der bereits für uns vorbereitet wurde. Oder aber wir könnten Mittel und Wege finden, um ferngesteuerte Soldaten zu schaffen, die die Härten des Krieges mildern."
 synth.505.a: "Wir sollten uns auf die Bewegungsfreiheit konzentrieren."
 synth.505.a.tt: "Wir legen den Schwerpunkt auf die Umsiedlung und Distrikte."
 synth.505.b: "Wir müssen uns auf die Schrecken des Krieges vorbereiten."
 synth.505.b.tt: "Wir legen den Schwerpunkt auf die Kriegsmüdigkeit und das Reisen in Unterlichtgeschwindigkeit."
 #OLIGARCHIC
 synth.510.name: "$synthshock_chain_title$"
 synth.510.desc: "Obwohl die Synthetisierung unsere Gesellschaft bereits in einer Weise beeinflusst hat, die wir niemals hätten vorhersehen können, könnten wir noch viel weiter gehen. Unsere derzeitigen synthetischen Körper können verbessert oder sogar ganz zugunsten einer vollständig virtuellen Existenz aufgegeben werden.\n\nSollten wir uns dafür entscheiden, jedem einen synthetischen Körper zu geben, könnten speziell zugewiesene Beamte vorübergehend die Körper ineffektiver Regierungsmitglieder übernehmen. Auf unsere physische Formen zugunsten einer vollständig virtuellen, gemeinschaftlichen Erfahrung zu verzichten, würde uns andererseits in die Lage versetzen, Entscheidungen mit größerer Effizienz als je zuvor zu treffen."
 synth.510.a: "Legen wir den Schwerpunkt darauf, die Körper ineffektiver Mitglieder der Gesellschaft zu übernehmen."
 synth.510.a.tt: "Wir sollten uns darauf konzentrieren, die Verwaltungseffizienz zu erhöhen."
 synth.510.b: "Gebt eine Studie in Auftrag, um virtuelle Überwachungsmöglichkeiten zu erforschen."
 synth.510.b.tt: "Wir sollten Erlasse und unsere Reichsgröße priorisieren."
 #DICTATORIAL
 synth.515.name: "$synthshock_chain_title$"
 synth.515.desc: "Die vollständige Synthetisierung der Bevölkerung war ein durchschlagender Erfolg. Unsere organische Vergangenheit ist Geschichte, doch um einen Weg in die Zukunft zu finden, benötigt §Y[From.GetRulerTitle] [From.GetRulerName]§! sowohl den bedingungslosen Gehorsam unserer klügsten Köpfe als auch eine Entscheidung.\n\nUnsere synthetischen Körper zu verbessern, würde es jedem Einzelnen erlauben, mehrere Wirte gleichzeitig zu kontrollieren. Alternativ könnten wir auch ganz auf unsere physische Form verzichten und die öffentliche Meinung in einer vollständig virtuellen Umgebung beeinflussen."
 synth.515.a: "Konzentrieren wir uns auf die Neurosynchronisation mehrerer Körper."
 synth.515.a.tt: "Wir sollten Arbeiter und die Distrikte priorisieren."
 synth.515.b: "Wir konzentrieren uns auf die virtuelle Manipulation."
 synth.515.b.tt: "Wir sollten den Schwerpunkt auf Gebäude und die Regierungsethik legen."
 #IMPERIAL
 synth.520.name: "$synthshock_chain_title$"
 synth.520.desc: "Obwohl die Synthetisierung unser Imperium bereits auf unvorhergesehene Weise beeinflusst hat, scheint die Bevölkerung bereit zu sein, noch weiter zu gehen. Unsere synthetischen Körper könnten zu Erweiterungen unserer Identität werden oder zu bloßen Werkzeugen, die unser virtuelles Bewusstsein fernsteuert. Unsere Zukunft steht uns offen.\n\nWir könnten unseren Forschungsschwerpunkt darauf legen, ein Bewusstsein schnell von einem entbehrlichen Körper auf einen anderen zu übertragen, oder aber wir konzentrieren uns darauf, das Wissen kürzlich Verstorbener zu extrahieren, um unsere Forschungsbemühungen zu beschleunigen."
 synth.520.a: "Versucht, den Verstorbenen ihr Wissen zu entlocken."
 synth.520.a.tt: "Konzentriert die Bemühungen auf unsere Anführer und die Forschung."
 synth.520.b: "Studiert die schnelle Bewusstseinsübertragung."
 synth.520.b.tt: "Legt den Schwerpunkt auf Armeen und Schiffe."
 #CORPORATE
 synth.525.name: "$synthshock_chain_title$"
 synth.525.desc: "Die Synthetisierung unserer gesamten Gesellschaft erfordert eine eingehende Risiko- und Nutzenanalyse. Wir betreten zwar eine neue, profitreiche Welt der synthetischen Zukunft, doch wir lassen auch unseren materialistisch ausgerichteten Kundenstamm zurück. In einer perfekten Welt würden wir gern beide Segmente zufriedenstellen.\n\nFortschritte im Bereich der Synthetisierung - wie etwa künstliche Intelligenz - würden es uns ermöglichen, unbelebten Gegenständen ein rudimentäres Leben einzuhauchen und mehrere Produktlinien auf den Markt zu bringen. Eine umfassendere Erforschung des virtuellen Raums würde es uns erlauben, die Erinnerungen von Individuen als eine Art Ware anzuzapfen."
 synth.525.a: "Studiert die gesellschaftliche Integration von KIs."
 synth.525.a.tt: "Legt den Schwerpunkt auf die Produktion und den Profit."
 synth.525.b: "Erforscht, wie man Erinnerungen in Profit umwandeln kann."
 synth.525.b.tt: "Konzentriert unsere Bemühungen auf den Handel, Waren und Geheiminformationen."
 ### EVENT POOL 1: IDENTITY ###
 synth.610.name: "Synthetische Herkunft"
 synth.610.desc: "Die gesellschaftlichen Veränderungen, die die Synthetisierung der Bevölkerung mit sich bringt, werden allmählich spürbar. Da wir nicht mehr durch unsere körperlichen Formen eingeschränkt sind, haben wir Kategorien wie Geschlecht, Spezies und körperliche Selbstbestimmung radikal neu definiert. Obwohl dies einige als neue Freiheiten ansehen, zögern die traditionelleren Elemente unserer Gesellschaft, vom alten Rahmenwerk loszulassen. Sie wünschen sich eine vorgegebene Identität, auf Grundlage derer sie agieren können.\n\nUm sie zu besänftigen, könnten wir Teile unseres organischen Erbes in unserer synthetischen Form beibehalten. Alternativ könnten wir es der Bevölkerung erlauben, ihre Identität freier zum Ausdruck zu bringen."
 synth.610.a: "Behaltet unsere ursprüngliche Form bei."
 synth.610.b: "Erlaubt die uneingeschränkte Körpermodifikation."
 synth.610.c: "Setzt der Identitätsanpassung moderate Grenzen."
 synth.610.d: "Sichtbare Statussymbole müssen erhalten bleiben."
 synth.610.e: "Das lässt sich doch sicher monetarisieren, oder?"
 synth.620.name: "Organische Sehnsucht"
 synth.620.desc: "Manche sind von der Synthetisierung nicht sonderlich begeistert und blicken mit Sehnsucht auf ihre organische Vergangenheit zurück. Sie argumentieren, die kürzere Lebensdauer und die angeborene Unvollkommenheit eines \"natürlichen Körpers\" hätten dem Leben einen Sinn verliehen.\n\nEine Gruppe von Hardlinern, die behauptet, ihre synthetischen oder virtuellen Formen würden sich zu unpersönlich und hohl anfühlen, hat gar eine kultähnliche Hingabe an den organischen Körper entwickelt.\n\nVielleicht sollten wir ihnen eine weniger perfekte Simulation bieten, in der auch sie einen Sinn finden. Oder würden sie eine unvollkommene Hülle vorziehen?"
 synth.620.a: "Jeder synthetische Körper muss eine geplante Unvollkommenheit enthalten."
 synth.620.b: "Erlaubt es ihnen, in einer unvollkommenen Welt zu leben."
 synth.620.c: "Es ist töricht, die Vergangenheit zu romantisieren."
 synth.620.d: "Der Schmerz wird sie an ihre Aufgabe erinnern."
 synth.620.d.tt: "Lasst die virtuellen Schlachten BEGINNEN!\n\n"
 synth.630.name: "Heimserver-Architektur"
 synth.630.desc: "Die Synthetisierung der gesamten §Y[root.GetSpeciesAdj]en§! Spezies hat auch zur Folge, dass wir unsere Wohnsituation überdenken müssen: Da die Bewusstseine in riesigen Serverfarmen ruhen, lassen sich synthetische Körper in Regalen lagern. Obwohl dies eine kosteneffiziente Lösung darstellt, gibt es einige Interessengruppen, die ihre Besorgnis darüber geäußert haben.\n\nDer bisher lukrative Immobilienmarkt könnte völlig zusammenbrechen und beträchtlichen Schaden an unserer Wirtschaft anrichten. Potenziell noch problematischer, zumindest aus psychologischer Sicht, ist, dass man keinen physischen Ort mehr hätte, den man sein Zuhause nennen kann."
 synth.630.a: "Zentralisierte Server sind am effizientesten."
 synth.630.b: "Einzelne Server können in bestehenden Wohnungen untergebracht werden."
 synth.630.c: "Beginnt damit, digitale Wohnungen zu verkaufen."
 ### EVENT POOL 2: POSSIBILITIES ###
 synth.1010.name: "Unendliche-Möglichkeiten-Matrix"
 synth.1010.desc: "Die digitale Industrie boomt. Vom Nervenkitzel eines simulierten Abenteuers aus der Ichperspektive bis hin zum Entspannen in einem digitalen Urlaubresort: Virtuelle Unterhaltung war noch nie so fesselnd - oder so süchtig machend. Doch obwohl diese aufblühende Industrie ein wichtiger Wirtschaftsfaktor ist, leidet die Produktion in der realen Welt darunter, da das Volk immer mehr Zeit in seinen digitalen Utopien verbringt. Manche laufen sogar Gefahr, den Bezug zum \"realen\" Leben völlig zu verlieren, könnten aber dennoch einen gesellschaftlichen Beitrag leisten, indem sie sich an der digitalen Wirtschaft beteiligen.\n\nSollen wir süchtig machende virtuelle Welten verbieten, sie als neue Form der lukrativen Unterhaltung fördern oder einen Mittelweg anstreben und sie regulieren?"
 synth.1010.a: "Wir müssen virtuelle Welten mit einem dauerhaften Suchtpotenzial verbieten."
 synth.1010.b: "Wir sollten mehr Werbung für diese virtuellen Paradiese machen."
 synth.1010.b.hedonist: "Endlich das ultimative Paradies!"
 synth.1010.c: "Reguliert die Industrie."
 synth.1020.name: "Synthetische Medizin"
 synth.1020.desc: "Unsere neuen synthetischen Formen haben uns von den Beschwerden und Leiden des organischen Körpers befreit. Bedauerlicherweise haben sie auch eine ganze Reihe neuer Probleme geschaffen, von einfachen mechanischen Ausfällen bis hin zu lebensbedrohlichen Serverinstabilitäten, Verbindungsschwierigkeiten und digitalen Viren.\n\nSollten wir uns auf den Schutz unseres digitalisierten Bewusstseins konzentrieren und den Körper als Wegwerfware betrachten oder ihm als Erweiterung unserer Identität mehr Aufmerksamkeit schenken?"
 synth.1020.a: "Wir müssen den Körper weiterhin schützen."
 synth.1020.a.spiritual: "Der Körper ist ein heiliges Gefäß für die Seele."
 synth.1020.b: "Konzentrieren wir uns darauf, das Bewusstsein zu schützen."
 synth.1020.b.spiritual: "Wir haben die physische Form bereits überwunden."
 synth.1020.c: "Beides im Gleichgewicht zu halten, ist der Schlüssel."
 synth.1020.d: "Diese neuen Beschwerden bieten großes Wachstumspotenzial ..."
 synth.1030.name: "Wiedergeburt"
 synth.1030.desc: "Wir sind schneller, besser und stärker, doch wenn wir unsere künstlichen Körper gefährlichen Situationen aussetzen, hat dies immer noch einen psychischen Preis. Das Wissen, dass die Psyche wiederherstellbar ist, lindert das Trauma zwar, beseitigt es aber nicht vollständig. Zumal eine reibungslose Wiederherstellung des Bewusstseins nicht immer garantiert ist. Neue Körper lassen sich zudem nicht einfach aus dem Nichts herstellen.\n\nWir können entweder das psychologische Trauma ignorieren, um die Grenzen der synthetischen Perfektion zu erweitern, oder aber unsere Ambitionen mäßigen, um das psychische Wohlbefinden der Bevölkerung keinen Gefahren auszusetzen."
 synth.1030.a: "Wir tasten uns immer weiter an die Grenzen des Möglichen heran."
 synth.1030.b: "Geht vorsichtiger vor."
 synth.1030.c: "Die gesellschaftliche Elite sollte keinen Gefahren ausgesetzt werden."
 #FINAL EVENT #
 synth_virtual_trait: "\nAlle [owner.species.GetNamePlural] erhalten die Eigenschaft: §Y$trait_robot_digital_1$§!\nErsetzt die Anführereigenschaft \"§Y$leader_trait_synthetic$§!\" durch \"§Y$leader_trait_virtual$§!\""
 synth_physical_traits: "\nSchaltet §Yfortschrittliche§! Eigenschaften für die Spezies-Modifikation frei."
 #DEMOCRATIC
 synth.1505.name: "Synthetisierte Gesellschaft"
 synth.1505.desc.physical: "Wir haben nicht die Absicht, die Individualität völlig aufzugeben. Wir können die Vorteile der Synthetisierung nutzen, ohne unwiderruflich unser Selbst verlieren zu müssen.\n\nVöllige Bewegungsfreiheit ist so zugänglich wie nie zuvor. Wir können unsere Bewusstseine in großer Zahl in spezialisierte Körper übertragen und unsere Bevölkerung dort einsetzen, wo wir sie am nötigsten brauchen."
 synth.1505.desc.virtual: "Unsere Gesellschaft hat sich von der physischen Welt losgelöst und blickt mit einer Mischung aus Spannung und Angst in die Zukunft. Wir haben uns auf eine Art und Weise verändert, die wir noch nicht ganz begreifen, aber wir begeben uns gemeinsam auf diese bedeutsame Reise.\n\nUnsere Bevölkerung kann nun auf eine Weise mit Maschinen interagieren, die unser Bewusstsein nicht gefährdet. Dies ist ein wichtiger Meilenstein, wenn es darum geht, wie wir uns den Gefahren des Krieges oder der gefühllosen Leere des Alls stellen."
 synth.1505.desc.neutral: "Es ist nur verständlich, dass man zögert, diese unbegreiflichen Veränderungen anzunehmen. Viele machen sich mehr Sorgen darüber, was sie verlieren könnten, als daran zu denken, was man womöglich alles gewinnt. Doch wir können an diesem wichtigen Scheideweg nicht untätig bleiben. Wir müssen unser Volk vorwärtsführen!\n\nDies könnte entweder bedeuten, dass wir eine Auswahl an spezialisierten Körpern schaffen, in die unser Volk das eigene Bewusstsein nach Belieben übertragen kann. Oder wir konzentrieren uns vollständig darauf, unsere synthethische Form ganz anzunehmen, um die Härten einer Weltraumreise oder eines Krieges zu überstehen."
 synth.1505.a: "Erleichtert die Bewegung zwischen verschiedenen physischen Körpern."
 synth.1505.a.tt: "$change_auth_tt$ ['concept_auth_synth_democratic_physical'] $synth_physical_traits$"
 synth.1505.b: "Wir sollten ferngesteuerte Körper nutzen, die für uns kämpfen."
 synth.1505.b.tt: "$change_auth_tt$ ['concept_auth_synth_democratic_virtual'] $synth_virtual_trait$"
 synth.1505.c: "$synth_keep_auth_option$"
 synth.1505.c.tt: "$keep_auth_tt$ ['concept_auth_democratic']"
 #OLIGARCHIC
 synth.1510.name: "Synthetisierte Gesellschaft"
 synth.1510.desc.physical: "Unsere synthetisierte Gesellschaft, die verbesserten synthetischen Körper und die allgemeine Stimmung deuten alle auf einen eher konservativen Weg der Synthetisierung hin. Unser Volk behält zwar seine maßgeschneiderte physische Form bei, wird aber in der Lage sein, den Körper nach Belieben auszutauschen.\n\nDies wird es erfahreneren Beamten erlauben, vorübergehend die Kontrolle über ihre weniger effizienten Kollegen zu übernehmen, was die bürokratische Leistung deutlich verbessert."
 synth.1510.desc.virtual: "Wir sind nun bereit, den nächsten logischen Schritt in der Synthetisierung zu unternehmen: die vollständige virtuelle Existenz.\n\nKurzzeit-Körper werden Aufgaben in der physischen Welt ausführen, doch die Mehrheit der Bevölkerung ist bereit, in einen eher immateriellen Zustand überzugehen.\n\nDies wird es uns erlauben, Aufträge schnell und effizient auszuführen, und zwar mit weitaus weniger staatlicher Aufsicht."
 synth.1510.desc.neutral: "Wir haben alle Teile der Gesellschaft an das synthetische Leben angepasst, doch aus den Daten lassen sich weiterhin keine Rückschlüsse darauf ziehen, welche Vorteile eine weitere Spezialisierung hätte.\n\nWir können entweder Identitätshintertüren schaffen, die es unseren Beamten erlauben, die Körper weniger effizienter Untergebener zu übernehmen, oder aber eine vernetzte virtuelle Schnittstelle entwickeln, über die sie mehrere Regierungsprojekte gleichzeitig und ohne Verzögerung überwachen können."
 synth.1510.a: "Erlaubt es Beamten, ineffizientere Untergebene zu übernehmen."
 synth.1510.a.tt: "$change_auth_tt$ ['concept_auth_synth_oligarchic_physical'] $synth_physical_traits$"
 synth.1510.b: "Fördert die vollständige virtuelle Aufsicht."
 synth.1510.b.tt: "$change_auth_tt$ ['concept_auth_synth_oligarchic_virtual'] $synth_virtual_trait$"
 synth.1510.c: "$synth_keep_auth_option$"
 synth.1510.c.tt: "$keep_auth_tt$ ['concept_auth_oligarchic']"
 #DICTATORIAL
 synth.1515.name: "Synthetisierte Gesellschaft"
 synth.1515.desc.physical: "Unser Volk scheut sich nicht vor ehrlicher körperlicher Arbeit. Unsere Arbeiter sind vernetzt und können nun mehrere Körper gleichzeitig fernsteuern - und damit die Produktionsquoten deutlich erhöhen.\n\nDiese Entwicklung ist ein klares Zeichen dafür, dass wir zu Recht auf die Anweisungen unseres obersten Anführers §Y[From.GetRulerTitle] [From.GetRulerName]§! vertrauen."
 synth.1515.desc.virtual: "Unser Volk ist bereit, seine physische Form zugunsten eines digitalen Bewusstseins abzulegen und die Existenz in einer vollständig virtuellen Umgebung fortzusetzen.\n\nDa es seine Sinne zugunsten von digitalem Code aufgegeben hat, können wir seine Realität nach Belieben beeinflussen und die positiven Gefühle gegenüber dem Staat verstärken. Eine Bevölkerung, die mit ihren Anführern übereinstimmt, bildet das Fundament eines starken Reichs."
 synth.1515.desc.neutral: "Die §Y[root.GetSpeciesAdj]e§! Bevölkerung ist nach wie vor unentschlossen, welche Form unser digitalisiertes Bewusstsein annehmen soll. Konservativere Stimmen möchten, dass wir unseren Körpern eng verbunden bleiben, wohingegen andere diese \"halbe Sache\" zwischen Alt und Neu ablehnen.\n\nEs liegt an uns, diese Entscheidung zu treffen. Den Schwerpunkt auf unsere physische Form zu legen, würde es einem einzelnen Arbeiter erlauben, mehrere Körper zu kontrollieren, während eine virtuelle Existenz gesellschaftliche Kontrolle in einem noch nie da gewesenen Ausmaß ermöglichen würde."
 synth.1515.a: "Entwickelt neurosynchrone Körper für unsere Arbeiter."
 synth.1515.a.tt: "$change_auth_tt$ ['concept_auth_synth_dictatorial_physical'] $synth_physical_traits$"
 synth.1515.b: "Beeinflusst die öffentliche Meinung im virtuellen Raum."
 synth.1515.b.tt: "$change_auth_tt$ ['concept_auth_synth_dictatorial_virtual'] $synth_virtual_trait$"
 synth.1515.c: "$synth_keep_auth_option$"
 synth.1515.c.tt: "$keep_auth_tt$ ['concept_auth_dictatorial']"
 #IMPERIAL
 synth.1520.name: "Synthetisierte Gesellschaft"
 synth.1520.desc.physical: "Das Imperium fördert die Verbesserung unserer neuen synthetischen Körper.\n\nDieses neue Wissen ermöglicht es uns, die positronischen Gehirne der kürzlich verstorbenen Elite zu demontieren, um ihre Wissensabdrücke zu erhalten. Als Diener des Imperiums hätten sie das gewiss gewollt."
 synth.1520.desc.virtual: "Das §Y[From.GetSpeciesAdj]e§! Volk ist bereit, den nächsten Schritt zu unternehmen und seine Existenz in der physischen Welt gegen die Virtualität einzutauschen. Dieses bedeutsame Ereignis wird Schockwellen erzeugen, die noch weit in unserer Zukunft nachhallen werden. Indem wir die Geschwindigkeit und die Reichweite der Identitätsübertragung erhöht haben, sind wir nun in der Lage, bei schwierigen Einsätzen rasch Ersatz für zerstörte synthetische Körper zu entsenden.\n\nDiese Entwicklung wird unsere Effizienz in verschiedenen Kriegssituationen steigern und dem §Y[From.GetSpeciesAdj]en§! Imperium Ruhm einbringen!"
 synth.1520.desc.neutral: "Das §Y[From.GetSpeciesAdj]e§! Imperium befindet sich an einem Scheideweg. Manche sind der Auffassung, wir könnten nur durch spezialisierte physische Körper jemals Sicherheit und Vertrautheit erlangen, wohingegen andere der Meinung sind, wir sollten die Vorteile der Synthetisierung und alles, was diese mit sich bringt, voll ausschöpfen.\n\nUns auf den physischen Aspekt unserer Existenz zu konzentrieren, würde es uns erlauben, das Wissen kürzlich verstorbener Würdenträger für unsere Forschungsbemühungen zu nutzen. Andererseits würde es uns der Weg in die virtuelle Existenz erlauben, zerstörte synthetische Körper durch einen schnellen Identitätstransfer zu ersetzen."
 synth.1520.a: "Nutzt das Wissen unserer kürzlich dahingeschiedenen Anführer."
 synth.1520.a.tt: "$change_auth_tt$ ['concept_auth_synth_imperial_physical']"
 synth.1520.b: "Entwickelt physische Wegwerfkörper."
 synth.1520.b.tt: "$change_auth_tt$ ['concept_auth_synth_imperial_virtual']"
 synth.1520.c: "$synth_keep_auth_option$"
 synth.1520.c.tt: "$keep_auth_tt$ ['concept_auth_imperial']"
 #CORPORATE
 synth.1525.name: "Synthetisierte Gesellschaft"
 synth.1525.desc.physical: "Unsere Marketing- und Forschungsabteilung hat eine neue Anwendungsmöglichkeit für künstliche Intelligenz für unseren gesamten Kundenstamm entwickelt. Unser ausgewogener Ansatz in Sachen neuer synthetischer Existenz erlaubt es uns, Produkte zu entwickeln, die die Vorteile der virtuellen Welt auf die physische Welt übertragen.\n\nWir sind in der Lage, eine limitierte KI in künstliche Objekte zu installieren. Wir können dieses Produktsegment dann noch präziser auf den Verbraucher, den privaten Sektor und andere Interessengruppen in der gesamten Galaxie zuschneiden."
 synth.1525.desc.virtual: "Unser Schwerpunkt auf den virtuellen Raum hat eine völlig neue Produktlinie hervorgebracht, die auf Erinnerungen basiert. Unsere Zweigstellen-Techniker sind in der Lage, unabhängig vom Phänotyp Erinnerungen zu extrahieren.\n\nUnsere Spionageabteilung kann diese \"Erinnerungsabdrücke\" anschließend sorgfältig untersuchen, was uns einen Wettbewerbsvorteil gegenüber anderen Reichen verschafft. In einem letzten Schritt lassen sich die Erinnerungen in synthetische Gehirne einpflanzen, was die Leistung signifikant erhöht."
 synth.1525.desc.neutral: "Trotz unserer detaillierten Kosten-Nutzen-Analysen sticht weder die physische noch die virtuelle Spezialisierung im Synthetisierungsprozess heraus. Wir müssen Interessenvertreter hinzuziehen, um unseren weiteren Weg in die Zukunft festzulegen.\n\nUns auf die physische Welt zu spezialisieren, gibt uns die Möglichkeit, eine limitierte KI in künstlichen Objekten zu installieren, die wir als vereinfachte Version von neuem Leben vermarkten können. Investitionen in die virtuelle Welt zu tätigen, würde es uns andererseits erlauben, Erinnerungen und Gedankenmuster zu kommerzialisieren."
 synth.1525.a: "Vermarktet limitierte KI-Wesen."
 synth.1525.a.tt: "$change_auth_tt$ ['concept_auth_synth_corporate_physical'] $synth_physical_traits$"
 synth.1525.b: "Kommerzialisiert Erinnerungen."
