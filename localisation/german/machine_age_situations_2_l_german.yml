 situation_digitization_desc: "Es ist an der Zeit, unsere fehlerhaften biologischen Gefäße hinter uns zu lassen. Wir müssen fortschrittliche Maschinenkörper vorbereiten und unser Bewusstsein in sie transferieren.\n\n§YBewohner, die nächsten Monat digitalisiert werden§!: §G[From.GetSynthPopsPerMonth]§!"
