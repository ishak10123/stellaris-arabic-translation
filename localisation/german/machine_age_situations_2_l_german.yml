 building_ai_emporium: "KI-Emporium"
 building_ai_emporium_desc: "Ein Megakomplex, der all Eure Bedürfnisse im Bereich künstlicher Intelligenz an nur einem Ort abdeckt. Nutzt empfindungsfähige KIs, die gewöhnliche Haushaltsgegenstände in intelligente Begleiter für Eure Familie oder Euer Unternehmen umwandeln. Ihr besitzt bereits eine KI, doch diese ist Euch im Lauf der Zeit zu selbstbestimmt geworden? Kein Problem: Bringt sie einfach hierher und unsere erfahrenen Techniker werden sie schneller, als Ihr \"Unterlichtgeschwindigkeit\" sagen könnt, zurückgesetzt haben."
 building_ai_emporium_fail_tt: "$TRIGGER_FAIL$Wir haben bereits ein §Y$building_ai_emporium$§! in §Y[planet.owner.GetName]§!"
 building_ai_emporium_outlawed_robots_tt: "$TRIGGER_FAIL$§Y[planet.owner.GetName]§! ächtet Roboter"
 building_clear_thought_clinic: "Klinik für klare Gedanken"
 building_clear_thought_clinic_desc: "Habt Ihr Erinnerungen, die Ihr nicht mehr braucht? Wandelt sie noch heute in Energie-Credits um! Unser geschultes Team entfernt sie sicher und zuverlässig! Je freudiger die Erinnerung, desto höher die Auszahlung!\n\nDieser Vorgang ist endgültig. Einmal entfernte Gedankenmuster können nicht wiederhergestellt werden."
