 resolution_cosmic_storms_storm_encouragement_mandate: "Sturmverlaufsmandat"
 resolution_cosmic_storms_storm_encouragement_mandate_desc: "Durch die Verbreitung von Vitalpartikeln und Energie hauchen kosmische Stürme der Galaxie, ihren Systemen und den Planeten Leben ein. Ihr natürlicher Verlauf darf nicht behindert werden."
