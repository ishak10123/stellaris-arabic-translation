 #Storm Tech Insight events
 cstorms.505.name: "Im Angesicht des Sturms"
 cstorms.505.desc: "Aus der Verwüstung, die der §H[this.GetAffectedStormType]§! hinterließ, konnten wir einige einzigartige Erkenntnisse über diese galaktischen Phänomene sammeln.\n\nIndem wir unseren Forschungsschwerpunkt auf die Astrometeorologie legen, können wir uns in Zukunft besser schützen. Dieses neue Forschungsgebiet könnte letztlich auch dazu führen, dass wir lernen, diese Stürme zu beherrschen."
 #Storm Buildings
 building_storm_attraction_center: "Sturmanziehungszentrum"
 building_storm_attraction_center_desc: "Durch die Manipulation der Schwerkraft können diese Einrichtungen nahe kosmische Stürme anziehen."
 building_advanced_storm_attraction_center: "Fortgeschrittenes Sturmanziehungszentrum"
 building_advanced_storm_attraction_center_desc: "Unser fortschrittliches Wissen bezüglich Dunkler Energie erlaubt es uns, Sturmanziehungszentren aufzuladen, um kosmische Stürme noch viel effizienter anzuziehen."
 building_storm_repellent_center: "Sturmabwehrzentrum"
 building_storm_repellent_center_desc: "Je weiter ein Sturm weg ist, desto sicherer ist unsere Bevölkerung - und desto beruhigter ist sie. Die komplexen astrometeorologischen Instrumente dieser Sturmzentren stoßen herannahende Stürme zurück."
 building_advanced_storm_repellent_center: "Fortschrittliches Sturmabwehrzentrum"
 building_advanced_storm_repellent_center_desc: "Eine Manipulation der Raumzeit ist gerechtfertigt, wenn sie eine Welt vor kosmischen Stürmen bewahrt. Dieses Zentrum tut genau dies."
 building_storm_resistant_production: "Sturmhilfszentrum"
 building_storm_resistant_production_desc: "Dieses Hilfszentrum unterstützt die Lokalverwaltung dabei, die Auswirkungen, die ein kosmischer Sturm auf die planetare Produktion zeigt, zu verringern. Durch eine effizientere Koordination und Kommunikation leitet das $building_storm_resistant_production$ Rettungsteams rasch an betroffene Standorte weiter und verbessert die Bedingungen für den Welthandel."
 building_storm_resistant_production_tt: "Die negativen Auswirkungen §Ykosmischer Stürme§! auf die planetare Produktion sind um §G30%§! reduziert.\n\nSolange ein §Y$default_storm$§! anhält:$TABBED_NEW_LINE$$mod_planet_miners_minerals_produces_add$: §G+0.5§! $TABBED_NEW_LINE$$mod_planet_farmers_food_produces_add$: §G+0.5§! $TABBED_NEW_LINE$$mod_planet_technician_energy_produces_add$: §G+0.5§!\n\nSchaltet die planetare Entscheidung \"§Y$decision_hunker_down$§!\" frei"
 building_advanced_storm_resistant_production: "Sturmnullifizierer"
 building_advanced_storm_resistant_production_desc: "Indem wir jedem $building_storm_resistant_production$ ein Wetterkontrollsystemen hinzufügen, lassen sich die negativen Auswirkungen kosmischer Stürme deutlich verringern. Darüber hinaus können Rettungsteams noch effizienter eingesetzt werden und die lokalen Wetterbedingungen haben so gut wie keinen Einfluss auf den planetaren Handel."
 building_advanced_storm_resistant_production_tt: "Die negativen Auswirkungen §Ykosmischer Stürme§! auf die planetare Produktion sind um §G45%§! reduziert.\n\nSolange ein §Y$default_storm$§! anhält:$TABBED_NEW_LINE$$mod_planet_miners_minerals_produces_add$: §G+1§! $TABBED_NEW_LINE$$mod_planet_farmers_food_produces_add$: §G+1§! $TABBED_NEW_LINE$$mod_planet_technician_energy_produces_add$: §G+1§!\n\nSchaltet die planetare Entscheidung \"§Y$decision_hunker_down$§!\" frei"
 building_adakkaria_patriotic_institute: "Patriotisches Institut der Feierlichkeiten"
 building_adakkaria_patriotic_institute_desc: "Das Patriotische Institut der Feierlichkeiten bietet detaillierte Einblicke in die Empfindungsfähigkeit. Hier werden Bewohner dazu angehalten, ihren Inneren Sturm zu manifestieren, ohne die mit einem kosmischen Sturm verbundene Grausamkeit heraufzubeschwören."
 building_adakkaria_patriotic_institute_effect_desc: "Zieht ein kosmischer Sturm durch dieses System, besteht eine 10%ige Chance, dass ein £pop£ §HBewohner§! die Eigenschaft \"$Name_Storm_Fused$\" erhält."
 building_adakkaria_patriotic_institute_effect_upgrade_desc: "Zieht ein kosmischer Sturm durch dieses System, besteht eine 40%ige Chance, dass ein £pop£ §HBewohner§! die Eigenschaft \"$Name_Storm_Fused$\" erhält. Zusätzlich dazu besteht alle 10 Jahre eine 20%ige Chance, dass §Y100§! £pop£ §HBewohner§! selbst zu einem kosmischen Sturm werden."
 building_astrometeorology_observation_center: "Astrometeorologie-Observatorium"
 building_astrometeorology_observation_center_desc: "Dank der empfindlichen Sensoren kann dieses Beobachtungszentrum verschiedene Umweltbedingungen aufzeichnen und damit unser Verständnis in Bezug auf die Natur des Universums steigern."
 concept_building_astrometeorology_observation_center: "$building_astrometeorology_observation_center$"
 building_storm_summoning_theater: "Sturmrufungstheater"
 building_storm_summoning_theater_desc: "Eine imposante Verschmelzung von Kunst und Technologie. Die heftigen Verrenkungen der $job_storm_dancer_plural$ ziehen kosmische Stürme an."
 building_storm_holo_theater: "Sturmholohalle"
 building_storm_holo_theater_desc: "Die $building_storm_holo_theater$ überträgt die Aufführungen der hypnotischen $job_storm_dancer_plural$ auf den ganzen Planeten und sogar darüber hinaus."
 building_storm_grand_theater: "Großes Sturmtheater"
 building_storm_grand_theater_desc: "Diese riesigen Theater verkörpern die neuesten Entwicklungen unserer künstlerischen und technologischen Errungenschaften und bieten das perfekte Forum für den ultimativen Tanz."
 sm_storm_attraction_computer: "Sturmanziehungsarray"
 sm_storm_attraction_computer_desc: "Dieses Array erlaubt es uns, die lokalen Gravitationsbedingungen zu manipulieren, um Stürme aus den Tiefen des Weltraums anzuziehen."
 sm_storm_repelling_computer: "Sturmabwehrarray"
 sm_storm_repelling_computer_desc: "Diese leistungsstarken Laser sind in der Lage, hochenergetische Magnetpartikeltaschen zu erzeugen, die kosmische Stürme auf natürliche Weise abstoßen."
 #Jobs
 astrometeorologist: "$job_astrometeorologist$"
