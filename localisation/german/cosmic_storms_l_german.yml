 ###########################################
 #Anomalies #
 ###########################################
 STORMS_ANOM_ANTS: "Der organische Komet"
 STORMS_ANOM_ANTS_DESC: "Nachdem der kosmische Sturm abgeklungen war, blieb ein Komet mit einer ungewöhnlichen Zusammensetzung zurück. Er scheint aus organischem Material zu bestehen. Unsere [solar_system.Owner.GetScientistPlural] sind sehr daran interessiert, ihn zu untersuchen."
 cstorms.5020.name: "Ameisenasteroid"
 cstorms.5020.desc: "Es stellte sich heraus, dass es sich bei dem Kometen um ein riesiges Nest handelt, das von winzigen Insekten bewohnt wird. Der Schweif des Kometen ist kein ausgasendes Eis, sondern ein Produkt jener chemischen Prozesse, die tief im Inneren des Schwarms ablaufen.\n\nDie äußere Schicht des Nests besteht aus toten Individuen, die das Innere vor den rauen Bedingungen des Weltraums schützen. Wir haben auch verschiedene Pilzarten entdeckt, die in und um das Nest herum gedeihen. Sie leben in einer komplexen Symbiose, wobei sich die Pilze an den chemischen Prozessen des Schwarms nähren und sich die Insekten wiederum von den Pilzen ernähren."
 cstorms.5020.a: "Erntet das Nest."
 cstorms.5020.b: "Beobachtet sie, aber fasst sie nicht an."
 STORMS_ANOM_STAT: "Verwirrende Zusammensetzung"
 STORMS_ANOM_STAT_DESC: "Dieses Objekt wurde von einem vorbeiziehenden kosmischen Sturm zurückgelassen. Es sieht aus wie eine Raumstation, aber erste strukturelle Scans liefern verwirrende Ergebnisse. Eine nähere Untersuchung wird empfohlen."
 cstorms.5030.name: "Stationäre Apokalypse"
 cstorms.5030.desc: "Unsere [Root.Owner.GetScientistPluralCapital] berichten, dass große Teile der Raumstation aus gewöhnlichen Objekten zu bestehen scheinen, die die Station gerade so vor dem Auseinanderfallen bewahren. Weiter innen änderte sich ihr Material von Metalllegierungen zu Kunststoffen und anderen Substanzen.\n\nIm Herzen des Konstrukts fanden unsere [Root.Owner.GetScientistPluralCapital] eine Maschine vor, die offenbar noch immer aktiv ist. Sie dekonstruiert organisches Material und formt es zu genau jenen Gegenständen um, auf die wir bisher gestoßen sind.\n\nAls unsere [Root.Owner.GetScientistPlural] die DNA untersuchten, kamen sie zu dem Schluss, dass das Material wahrscheinlich von den ehemaligen Bewohnern dieses Außenpostens stammt."
 cstorms.5030.evopred: "Mal sehen, ob wir daraus nicht noch etwas gewinnen können."
 STORMS_ANOM_BRAIN: "Existenzielle Dissipation"
 STORMS_ANOM_BRAIN_DESC: "Seit dieses System von einem $shroud_storm$ heimgesucht wurde, empfangen wir seltsame Signale. Als unsere [Root.Owner.GetScientistPlural] jedoch versuchten, auf diese Kakophonie von Signalen zu antworten, verschwanden sie urplötzlich. Die [Root.Owner.GetScientistPlural] empfehlen, ein Forschungsschiff zu entsenden."
 cstorms.5025.name: "Kopfsalat"
 cstorms.5025.desc: "Wir hätten unsere Entdeckung niemals vorhersehen können: Gehirne. Weiche organische zentrale Verarbeitungsorgane verschiedener Spezies. Hunderte und Aberhunderte von ihnen, alle miteinander verbunden und in einer großen ballonartigen Kapsel aufgehängt. Dieser Ort scheint aufgegeben worden zu sein und schwebt durch die Tiefen des Weltraums, seit sich der jüngste $shroud_storm$ auflöste.\n\nDie Kapsel enthält zudem eine unglaubliche Menge an Sensoren, die an den Gehirnen und dem Ballon befestigt sind, und es gibt ein Kommunikationsmodul, das in der Lage ist, Schiffe zu rufen und Informationen zu übertragen - so wie es bei uns der Fall war.\n\nDie Kakophonie an Botschaften scheint von den Gehirnen selbst zu stammen, die versucht haben, Kontakt zu uns aufzunehmen. Unsere [Root.Owner.GetScientistPlural] sind der Meinung, die Konstruktion war dazu gedacht, die Reaktionen organischer Wesen auf einen $shroud_storm$ zu messen. Angesichts der instabilen psionischen Rückstände, die sich in diesen umherschwebenden Bewusstseinen befinden, würde es jedoch in einer Katastrophe enden, sich erneut mit ihnen zu verbinden."
 #Terrestrial Telescopes
 terrestial_telescope_category: "Terrestrische Teleskope"
 terrestial_telescope_category_desc: "Von der [fleet.GetName] durchgeführte Scans haben ergeben, dass sich im [From.GetStarName]-System eine verfallene Raumstation befindet.\n\nEs sieht so aus, als wäre sie von einem vorbeiziehenden kosmischen Sturm zurückgelassen worden. Es gibt weder Lebenszeichen noch konnten andere Signale empfangen werden. Zwei massive Teleskope ragen von gegenüberliegenden Seiten aus der Station. Diese optischen Instrumente sind äußerst fortschrittlich und erscheinen im Vergleich zur Größe der Station viel zu riesig. Technologie und Architektur sind uns nicht geläufig.\n\nWir könnten versuchen, die Teleskope zu reaktivieren, und darauf hoffen, dass sie uns interessante Erkenntnisse liefern."
 cstorms.1605.name: "Terrestrische Teleskope"
 cstorms.1605.desc: "Das Betreten der Station und das Aktivieren der Teleskope verlangte unseren [Root.Owner.GetScientistPluralDE1] einiges ab, doch es war für sie kein Ding der Unmöglichkeit. Jener Winkel der Galaxie, auf den die Instrumente gerichtet waren, zeigte allerdings nichts von Bedeutung.\n\nUnsere [Root.Owner.GetScientistPlural] konnten zumindest einige interessante Artefakte finden, die über die gesamte Station verstreut waren: detaillierte Bilder, die von den Teleskopen aufgenommen und in dekorativen Rahmen präsentiert wurden. Jede einzelne Aufnahme konzentriert sich auf die kosmischen Stürme. Es gibt auch mehrere Bilder jenes kosmischen Sturms, der dieses System heimsuchte. Die ursprünglichen Astrologen verwendeten verschiedene Winkel, Zoomstufen und sogar künstlerische Ansätze, um die Stürme in ihrem besten Licht zu zeigen.\n\nDie Kunstwerke scheinen jedoch der einzige interessante Fund an Bord der verlassenen Station zu sein. Wir werden sie archivieren, damit auch zukünftige Generationen diese ausdrucksstarken Bilder von roher Macht und Schönheit genießen können."
 STORMS_ANOM_POLYCHROMATIC: "Polychromer Stern"
 STORMS_ANOM_POLYCHROMATIC_DESC: "Der kosmische Sturm, der kürzlich das [from.solar_system.GetName]-System heimsuchte, hat die visuelle Erscheinung des Sterns verändert. Als sich der Sturm gelegt hatte, zeigte die äußere Korona des Sterns ein sich stetig wechselndes Farbmuster und polychrome Sonneneruptionen wurden in alle Richtungen ausgestoßen. Dieses Phänomen sollte näher untersucht werden."
 cstorms.5035.name: "$STORMS_ANOM_POLYCHROMATIC$"
 cstorms.5035.desc: "[root.leader.GetName] berichtet von erstaunlichen Veränderungen in der Fusionsreaktion von [From.GetStarName] nach dem kürzlichen [from.GetAffectedStormType].\n\nScheinbar löste der Sturm eine unerwartete Nuklearreaktion im Kern des Sterns aus, was dazu führte, dass eine riesige Menge an [from.GetEarnedResources] aus den Konvektionszonen freigesetzt wurde.\n\nDiese komplexen und einzigartigen Reaktionen sind zudem die Ursache jener ungewöhnlichen polychromen Farbveränderungen, die wir beobachtet haben. Wir sollten dieses Phänomen noch einige Zeit länger untersuchen."
 cstorms.5035.a: "Studiert diese neuen Prozesse."
 cstorms.5035.b: "Erntet die Ressourcen."
 STORMS_ANOM_TRIPLETS: "Asteroidendrillinge"
 STORMS_ANOM_TRIPLETS_DESC: "Ein vorbeiziehender kosmischer Sturm hinterließ drei neue Asteroiden im [from.solar_system.GetName]-System. Diese Himmelskörper neigen dazu, auf unerklärliche Weise ihre Richtung zu ändern, weshalb es unmöglich ist, ihre Flugbahn vorherzusagen. Eine weitere Untersuchung ist erforderlich."
 cstorms.5040.name: "$STORMS_ANOM_TRIPLETS$"
 cstorms.5040.desc: "[root.leader.GetName] entdeckte, dass die Asteroidendrillinge im [from.solar_system.GetName]-System von einem höchst instabilen Magnetfeld umgeben sind, das dafür sorgt, dass sie zufällig von den Magnetosphären des Systems abprallen.\n\n[root.leader.GetName] konnte das Magnetfeld durch einen Magnetkompensator stabilisieren, den man an jedem der Asteroiden anbrachte. Diese Kompensatoren regeln nun ihre Flugbahn und erlauben uns den Abbau von Ressourcen."
 STORMS_ANOM_TRAVELLERS: "Stürmisches Notsignal"
 STORMS_ANOM_TRAVELLERS_DESC: "Nach dem kürzlichen §H[from.GetAffectedStormType]§! im §H[from.solar_system.GetName]§!-System wurde ein unidentifiziertes Notsignal abgesetzt."
 cstorms.5050.name: "Abgedriftete Reisende"
 cstorms.5050.desc: "Wir haben die Quelle des Notsignals im §H[from.solar_system.GetName]§!-System ausgemacht. Es stammt von einem schwer beschädigten, aber noch funktionsfähigen Handelsfrachter.\n\nDie Besatzung gibt an, durch den §H[from.GetAffectedStormType]§! stark von ihrem Kurs abgetrieben worden zu sein. Der Sturm hat auch ihr Triebwerk ausgebrannt und somit das Schiff gestrandet in unserem Raumbereich zurückgelassen.\n\nMan ist gewillt, uns einen Teil der Fracht zu überlassen, wenn wir helfen."
 cstorms.5050.a: "Wir helfen ihnen."
 cstorms.5050.evopred: "Wir helfen im Tausch für ein paar DNA-Proben."
 cstorms.5050.b: "Wünscht ihnen viel Glück."
 cstorms.5050.c.genocide: "Nehmt ihnen ihr Leben und ihre Fracht."
 cstorms.5050.d.devouring_swarm: "Eine kostenlose Mahlzeit."
 STORMS_COSMIC_SLUDGE: "Kosmischer Schlamm"
 STORMS_COSMIC_SLUDGE_DESC: "Unsere zahlreichen auf das §H[from.solar_system.GetName]§!-System gerichteten Sensoren empfangen nach dem kürzlichen §H[from.GetAffectedStormType]§! unregelmäßige Messwerte.\n\nEine Systemdiagnose zeigt keinerlei Anzeichen für ein technisches Versagen der Geräte auf. Wir müssen diese Messwerte genauer untersuchen!"
 cstorms.5060.name: "$STORMS_COSMIC_SLUDGE$"
 cstorms.5060.desc: "Die unregelmäßigen Messwerte aus dem §H[from.solar_system.GetName]§!-System stammen aus einem ungewöhnlichen Trümmerfeld, das der §H[from.GetAffectedStormType]§! zurückgelassen hat.\n\nDieses umhertreibende Gebilde ist ein amorpher Klumpen aus kosmischen Schlamm, der unter dem extremen Druck des Sturms eine feste Masse gebildet hat. Die verschiedenartigen Bestandteile des Klumpens haben auf einzigartige Weise miteinander reagiert.\n\nEine gezielte Untersuchung der chemischen Zusammensetzung könnte uns wertvolle astrometeorologische Erkenntnisse darüber liefern, wie der Klumpen entstanden ist."
 cstorms.5060.a: "Untersucht seine Zusammensetzung."
 cstorms.5060.b: "Zerlegt ihn."
 STORMS_SHATTERED_SATTELITE: "Zerstörter Satellit"
 STORMS_SHATTERED_SATTELITE_DESC: "Nach dem kürzlichen §H[from.GetAffectedStormType]§! im §H[from.solar_system.GetName]§!-System wurde ein unidentifiziertes Objekt entdeckt. Weitere Untersuchungen der Trümmer könnten uns wertvolle Erkenntnisse liefern."
 cstorms.5070.name: "$STORMS_SHATTERED_SATTELITE$"
 cstorms.5070.desc: "Bei dem im §H[from.solar_system.GetName]§!-System gefundenen Objekt handelt es sich um einen uralten Satelliten, der mit komplexen astrometeorologischen Sensorarrays ausgerüstet ist. Wir glauben, er wurde durch den kürzlichen §H[from.GetAffectedStormType]§! quer durch die Galaxie getragen.\n\nAuch wenn der Satellit selbst so stark beschädigt ist, dass wir ihn nicht mehr zu reparieren vermögen, enthalten seine Datenbanken eine Fülle an Informationen, die wir für unsere eigene Forschung nutzen können.\n\nDer Rest des Satelliten kann nur noch als Schrott wiederverwertet werden."
 STORMS_EVISCERATED_FAUNA: "Unbekanntes Objekt"
 STORMS_EVISCERATED_FAUNA_DESC: "Unsere Sensoren im §H[from.solar_system.GetName]§!-System haben ein unbekanntes Objekt entdeckt, das durch den kürzlichen §H[from.GetAffectedStormType]§! in das System getragen wurde.\n\nEine genauere Untersuchung ist erforderlich, um verifizieren zu können, mit welcher Art von Anomalie wir es hier zu tun haben."
 cstorms.5080.name: "Organische Überreste"
 cstorms.5080.desc.common: "Eine erste Untersuchung ergab, dass es sich bei dem unbekannten Objekt, das im §H[from.solar_system.GetName]§!-System gefunden wurde, um eine riesige Masse aus organischer Materie handelt, die wahrscheinlich von einem im Weltraum geborenen organischen Wesen stammt. Da der kosmische Sturm alle identifizierbaren Merkmale zerfetzte, ist es unmöglich, die biologischen Überreste korrekt zu katalogisieren."
 cstorms.5080.desc.swarm: "Glücklicherweise sind sie größtenteils essbar."
 cstorms.5080.desc.default: "[leader.GetName] ist zuversichtlich, dass eine genauere forensische Untersuchung der organischen Überreste weitere Informationen darüber zutage fördern könnte, wo diese Kreatur einst herkam und welche Auswirkungen ein §Y[from.GetAffectedStormType]§! auf ähnliche Weltraumorganismen hätte."
 cstorms.5080.a: "Wir sind hungrig."
 cstorms.5080.b: "Führt eine Autopsie vor Ort durch."
 cstorms.5080.c: "Entsorgt die Überreste."
 FORENSIC_DISSECTION_PROJECT: "Forensische Sezierung"
 FORENSIC_DISSECTION_PROJECT_DESC: "Wir haben die Überreste einer unbekannten Kreatur im §H[solar_system.GetName]§!-System entdeckt, die von einem kosmischen Sturm quer durch die Galaxie getragen wurden. Eine forensische Untersuchung der Leiche sollte uns weitere Informationen liefern."
 cstorms.5085.name: "$FORENSIC_DISSECTION_PROJECT$"
 cstorms.5085.desc: "Selbst nach sorgfältiger Sezierung wissen wir noch immer nicht, um welche Art von Spezies es sich bei dieser viszeralen Masse handelt. Die Auswirkungen, die das Epizentrum des Sturms auf den organischen Körper hatte, haben alle erkennbaren Merkmale und genetischen Marker zerstört.\n\nZumindest konnten wir im Lauf der Studie Einblicke in die Zusammensetzung §Ykosmischer Stürme§! erlangen und ihre verheerenden Auswirkungen auf xenobiologische Materie untersuchen."
 cstorms.5085.evopred: "Eine faszinierende Mahlzeit."
 STORMS_DISPLACED_TIYANKI: "Sturmverschleppte Tiyanki"
 STORMS_DISPLACED_TIYANKI_DESC: "Als der kosmische Sturm abgeklungen war, entdeckten unsere Sensoren die Signaturen von drei Tiyanki im §H[solar_system.GetName]§!-System."
 cstorms.5090.name: "$STORMS_DISPLACED_TIYANKI$"
 cstorms.5090.desc.common: "Bei den drei Tiyanki-Signaturen, die im §H[solar_system.GetName]§!-System aufgezeichnet wurden, handelt es sich um unterernährte Kälber, die aufgrund ihrer Größe vom Sturm mitgetragen wurden.\n\nDer §Ykosmische Sturm§! hat diese Kälber von ihrer Herde getrennt und sich selbst überlassen.\n\nEs ist unwahrscheinlich, dass sie lang im Weltraum überleben können. Unsere Sensoren zeigen auch, dass sie versuchen, ihre Herde zu rufen, wenn auch ohne Erfolg."
 cstorms.5090.desc.swarm: "Wir könnten ihre Hilferufe verstärken und sie als Köder für ein gewaltiges Festessen nutzen."
 cstorms.5090.desc.default: "Unsere Kommunikationssysteme könnten ihre Hilferufe verstärken und die Herde in das System locken."
 cstorms.5090.a.default: "Verstärkt ihre Signale."
 cstorms.5090.a.swarm: "Legt den Köder aus."
 cstorms.5090.b.default: "Die Natur ist grausam."
 cstorms.5090.b.machine: "Leitet die Ausrottungsprotokolle ein."
 cstorms.5090.b.swarm: "Eine kostenlose Mahlzeit."
 cstorms.5090.c: "Gebt ihnen ein neues Zuhause."
 cstorms.5090.c.tt: "Fügt Eurem ['concept_vivarium'] 3 §Y$NAME_Tiyanki_Hatchling$§! einer zufälligen Seltenheit hinzu"
 REUNITE_POD_PROJECT: "Die Herde vereinen"
 REUNITE_POD_PROJECT_DESC: "Drei Tiyanki-Kälber wurden durch einen kosmischen Sturm von ihrer Herde getrennt und irren im [this.solar_system.GetName]-System umher. Wir können dabei helfen, sie wieder mit ihrer Herde zu vereinen, indem wir ihren Hilferuf verstärken."
 cstorms.5095.name: "Wiedervereinte Tiyanki"
 cstorms.5095.desc.common: "Eine Tiyanki-Kuh und ein Bulle sind im §H[solar_system.GetName]§!-System aufgetaucht, nachdem sie die von uns verstärkten Hilferufe der drei verirrten Kälber gehört hatten.\n\nDie jungen Tiyanki wurden wieder mit ihrer Herde vereint und wirken bereits viel glücklicher und gesünder als zuvor.\n\nDie Tiyanki-Kuh hat in der Nähe unseres Forschungsschiffs eine große Menge Trümmer zurückgelassen, offenbar als Dank für unsere Hilfe. Zu unserer Überraschung enthielten sie einige brauchbare Materialien."
 cstorms.5095.desc.swarm: "Natürlich sind diese gewaltigen Tiere die eigentliche Beute - und nur zu bereit, von uns geschlachtet zu werden."
 ###########################################
 #Event Chains #
 ###########################################
 ### Collided Planet Event Chain
 collided_planets_category: "Der Kollidierte Planet"
 collided_planets_category_desc: "Vor Äonen kollidierten zwei Planeten. Infolge ihres Untergangs wurde eine einzigartige Welt geboren."
 cs_collided_planet_chain_title: "Der Kollidierte Planet"
 cs_collided_planet_chain_desc: "Eine Katastrophe droht das fragile Gleichgewicht dieses einzigartigen Planeten zu zerschlagen."
 cstorms.1200.name: "Eine Geschichte von zwei Planeten"
 cstorms.1200.desc: "Von dem Moment an, als wir [From.Planet.GetName] entdeckten, war seine bloße Existenz eine Quelle der Faszination.\n\nEs ist jedoch nicht die Kollision zweier Himmelsobjekte, die so ungewöhnlich erscheint - schließlich ist die Galaxie ein riesiger chaotischer Ort -, sondern es ist der Umstand, dass in allen bislang bekannten Fällen eines solchen Aufpralls einer oder sogar beide Himmelskörper vernichtet wurden.\n\nDie Kollision, aus der [From.Planet.GetName] hervorging, fand vor Jahrmillionen statt, und doch halten diese beiden Welten ein seltsames Gleichgewicht aufrecht und haben sogar eine lebensfähige Atmosphäre geschaffen."
 cstorms.1205.name: "Prekäres Gleichgewicht"
 cstorms.1205.desc: "Die Situation auf dem sogenannten \"Kollidierten Planeten\" hat sich als weitaus prekärer erwiesen als erwartet. Eine kürzliche Serie von Erdbeben öffnete die alten Narben rund um die Einschlagzone, wodurch eine beträchtliche Menge Magma austrat. Verschiedene planetare Biome leiden bereits unter den steigenden globalen Temperaturen und der vulkanischen Asche, die den Himmel verdunkelt.\n\nUnsere Messungen haben ergeben, dass sich [From.Planet.GetName] in weniger als 50 Jahren vollständig aufgelöst haben wird, sollten die tektonischen Aktivitäten weiter kaskadieren."
 cstorms.1210.name: "Ungezügelte Metamorphose"
 cstorms.1210.desc: "Unsere besten Geologen kamen zusammen und arbeiteten zwei mögliche Pläne aus, um [From.Planet.GetName] vor dem tektonischen Untergang zu bewahren.\n\nDer erste Plan sieht vor, die Einschlagszone zu stabilisieren. Da es viele Jahrhunderte dauern würde, die vulkanische Wunde gänzlich zu heilen, sollten wir versuchen, zumindest den Druck auf die Kruste des Planeten zu lindern und eine weitere tektonische Instabilität verhindern, indem wir die Einschlagzone trepanieren. Die übrigen vulkanischen Auswürfe ließen sich dann nutzen, um den Planeten zu terraformieren und ein stabiles Biom zu schaffen.\n\nDer zweite Plan ist weitaus ehrgeiziger. Anstatt den Druck auf die Kruste des Planeten zu verringern, könnten wir die durch den Vulkanausbruch erzeugte Energie und die Materialien nutzen, um einen speziell an die dortigen Bedingungen zugeschnittenen Terraforming-Prozess einzuleiten.\n\nDieser Ansatz erlaubt es uns, eine Vielzahl von Biomen zu schaffen, die in der Lage sind, jede Art von Lebensform zu erhalten, und er würde diese Welt in ein Paradies verwandeln. Es besteht jedoch ein erhebliches Risiko, dass dieses Verfahren fehlschlägt - und sogar zur vollständigen und völligen Vernichtung dieses einzigartigen Himmelskörpers führen könnte."
 cstorms.1210.a: "Stabilisieren wir die Einschlagszone."
 cstorms.1210.b: "Nutzen wir die vulkanischen Emissionen."
 cstorms.1210.c: "Wir sollten vorerst nichts tun und beobachten."
 collided_planet_collapsing: "Planetarer Zerfall"
 collided_planet_collapsing_desc: "Die verheerende tektonische Aktivität lässt den Kollidierten Planeten auseinanderbrechen und vernichtet dabei beide Welten."
 collided_planet_collapsing_tt: "Die Welt wird nach 50 Jahren zerfallen."
 project_cosmic_storms_collidedplanet_stabilize: "Stabilisierung der Einschlagszone"
 project_cosmic_storms_collidedplanet_stabilize_DESC: "Es ist notwendig, dass wir den kollidierten Planeten stabilisieren, wenn wir verhindern wollen, dass diese Welt auseinanderbricht."
 project_cosmic_storms_collidedplanet_harmonize: "Harmonisierung des Einschlags"
 project_cosmic_storms_collidedplanet_harmonize_DESC: "Wir sollten unseren ehrgeizigen Plan in die Tat umsetzen und die Biome des kollidierten Planeten aufeinander abstimmen. Wir werden dadurch entweder eine Welt schaffen, auf der wirklich jeder leben kann, oder die Welt vollkommen vernichten."
 cstorms.1220.name: "Kollision bewahrt"
 cstorms.1220.desc: "Unsere Bemühungen zur Stabilisierung der kollidierten Welt haben sich ausgezahlt! Die tektonischen Erschütterungen, die die Existenz von [From.Planet.GetName] bedrohten, haben aufgehört und auch die vulkanischen Auswürfe nehmen rapide ab und bringen die Welt wieder in ihr fragiles Gleichgewicht zurück.\n\nFür unseren letzten Terraforming-Vorstoß gilt es nur noch eine Frage zu beantworten: Welche Art von Planet soll [From.Planet.GetName] werden?"
 cstorms.1220.a: "Behaltet die Kontinentaleigenschaften bei."
 cstorms.1220.b: "Terraformiert ihn zu einer Savannenwelt."
 cstorms.1220.c: "Erschafft eine Alpinwelt."
 cstorms.1225.name: "Eine Welt für jeden"
 cstorms.1225.desc.stabalize: "Einfach unglaublich! Wir dachten, unsere Bemühungen würden [collided_planets.GetName] nur stabilisieren, doch die Welt hat sich zu so viel mehr entwickelt!\n\n$cstorms.1225.desc.def$"
 cstorms.1225.desc.def: "Vor uns liegt ein Paradies, ein Planet, der nahezu jede erdenkliche Form von Leben erhalten kann.\n\nDass wir in der Lage waren, eine dem Untergang geweihte Welt zu retten und sie in etwas derart Inspirierendes zu verwandeln - gab es jemals eine größere Errungenschaft? Das Glück ist uns auf jeden Fall hold!"
 cstorms.1230.name: "Renovierungsbedürftig"
 cstorms.1230.desc: "Obwohl die Welt selbst glücklicherweise gerettet werden konnte, ist unser Bestreben, den Kollidierten Planeten in ein Paradies zu terraformieren, gescheitert.\n\nUnsere Versuche, das Biom nach unseren Vorstellungen zu formen, wurden durch die heftige tektonische Aktivität des Planeten zunichtegemacht. Das Schlimmste scheint überstanden zu sein und die vulkanische Aktivität ist auf jenes Niveau zurückgekehrt, wie es sich vor dem jüngsten Umbruch darstellte. Die Einschlagszone bleibt zwar weiterhin aktiv, doch es ist unwahrscheinlich, dass sie in absehbarer Zeit erneut kaskadiert.\n\nUnsere Herausforderung besteht nun darin, diese Welt wiederaufzubauen."
 cstorms.1235.name: "Entzweite Heimat"
 cstorms.1235.desc: "Unser Versuch, den Kollidierten Planeten vor dem drohenden Untergang zu bewahren, ist kläglich gescheitert. Obwohl unsere Wissenschaftler alle nur erdenklichen Vorsichtsmaßnahmen trafen, waren ihre Modelle nicht in der Lage, sämtliche Eventualitäten zu berücksichtigen.\n\nWährend die Überreste dieser Welten immer tiefer in die Leere hinein driften, trauert die Galaxie um den Verlust dieses einzigartigen Phänomens."
 cstorms.1240.name: "Kollidiert und abgestürzt"
 cstorms.1240.desc: "Der Kollaps des Kollidierten Planeten folgt unseren Ablaufvorhersagen bis auf die Dezimalstelle. Wo einst die Galaxie durch ein einzigartiges Phänomen bereichert wurde, ist heute nichts als Fels übrig."
 collided_planets_destroyed_tt: "[collided_planets.GetName] wird vernichtet."
 ### Crimson crawlers Event Chain
 cs_crimson_crawlers_chain_desc: "Karminrote Kriecher"
 cs_crimson_crawlers_chain_title: "Wir haben einen Planeten gefunden, der mit mehreren Billionen roter Insekten bedeckt ist. Ist das eine Plage oder eine günstige Gelegenheit?"
 crimson_crawlers_category: "Karminrote Komposition"
 crimson_crawlers_category_desc: "Unsere Wissenschaftler haben bei ihrer Erkundung einen karminroten Planeten im [From.GetStarName]-System entdeckt. Die Intensität der Farbe ist bemerkenswert. Wir sollten dem nachgehen."
 cstorms.1255.name: "Karminrote Kriecher"
 cstorms.1255.desc: "Aus der Ferne beobachtet leuchtet [From.GetName] wie ein kostbarer Rubin. Ton oder andere mit Hartmetallen angereicherte Bodentypen liefern normalerweise die fachübliche Erklärung für eine solche geografische Anomalie, aber die Wahrheit ist weitaus bizarrer.\n\nKäfer. Aberbillionen von Käfern. Sie schwärmen über die Oberfläche von [From.GetName] aus und bilden einen nahezu lückenlosen Teppich aus mehrbeinigem Leben.\n\nDiese Wirbellosen, die rasch als \"karminrote Kriecher\" bezeichnet wurden, besitzen einen bemerkenswert hyperaktiven Fortpflanzungszyklus. Sie scheinen keine Bedrohung für ihre Umwelt darzustellen, aber aufgrund der schieren Anzahl an herumkriechenden Käfern eignet sich [From.GetName] nicht wirklich für eine Besiedlung.\n\nEs wurde jedoch von anderweitigen Stellen eine eher unorthodoxe Methode zum Umgang mit diesen Insekten vorgeschlagen. Unsere Scans haben ergeben, dass diese Insekten essbar sind, weshalb wir womöglich eine neue Nahrungsquelle gefunden haben. Es wurde empfohlen, diese Möglichkeit zumindest zu untersuchen."
 project_cosmic_storms_crimson_crawlers: "Denknahrung"
 project_cosmic_storms_crimson_crawlers_DESC: "[From.Planet.GetName] ist vollständig von friedliebenden, roten Insekten bedeckt. Sollten die Käfer beseitigt werden, könnte der Planet bewohnbar sein. Gleichzeitig scheinen sie allerdings auch eine gute Nahrungsquelle darzustellen."
 cstorms.1260.name: "Kuriose Kulinarik"
 cstorms.1260.desc: "Die Idee, die karminroten Kriecher zu verzehren, mochte auf den ersten Blick absurd gewirkt haben, doch als man ein Exemplar an Bord brachte, wurde die Vorstellung wesentlich leichter verdaulich.\n\nDie Insekten sind wundersame Wesen: Sie besitzen ein extrem fortgeschrittenes Nervensystem ohne den Vorteil eines zentralen Verarbeitungsorgans. Noch wichtiger ist, dass ihr blasses Fleisch überraschend zart und saftig ist, und selbst wenn man sie roh verzehrt, ist das zinnoberrote Exoskelett knusprig und schmackhaft.\n\nEs stellt sich nur noch die Frage, ob man die Käfer besser als Forschungsmaterial oder als köstliche Nahrungsquelle nutzen sollte. Sie zu kochen, könnte den Geschmack verbessern, aber sie so zu essen, wie sie kommen, wird schneller und einfacher sein, besonders wenn man sie mit einer entsprechenden Würze oder Soße kombiniert."
 cstorms.1260.a: "Untersucht die Kriecher."
 cstorms.1260.b: "Esst sie roh!"
 cstorms.1260.c: "Kocht sie!"
 ### Stormbound Event Chain
 cs_stormbound_chain_title: "Sturmgebunden"
 cs_stormbound_chain_desc: "Ein mysteriöses Schiff ist auf den Sensoren aufgetaucht - und es kam aus dem kosmischen Sturm. Was mag hier nur vorgehen?"
 letters_of_the_manifold: "Briefe aus der Mannigfaltigkeit"
 stormbound_event_ship_object: "$cs_stormbound_chain_title$"
 cstorms.1310.name: "Die Sturmgebundenen"
 cstorms.1310.desc: "Wir erhalten seltsame Berichte aus dem [This.GetName]-System. Offenbar tauchte während des kosmischen Sturms, der unlängst in diesem Sektor wütete, ein Schiff unbekannter Herkunft auf. Es besaß kein Rufzeichen und schaffte es irgendwie, den Sturm unbeschadet zu durchqueren, ganz so, als sei es von der Naturgewalt vollkommen unbeeinflusst.\n\nEs reagierte nicht auf unsere Rufe, und als sich der Sturm auflöste, verschwand auch das mysteriöse Schiff. Viele würden dies auf fehlerhafte Instrumente schieben, aber die visuellen Beweise sprechen für sich.\n\nKönnte dies eine Zurschaustellung einer unglaublich fortschrittlichen Technologie gewesen sein oder handelt es sich um etwas Bedrohlicheres? Wir werden es sofort weitermelden, falls man dieses mysteriöse Schiff erneut sichtet."
 cstorms.1313.name: "Rückkehr der Sturmgebundenen"
 cstorms.1313.desc: "Eine der Forschungsstationen im [This.GetName]-System übermittelte einen überraschenden Bericht: Während des letzten kosmischen Sturms war ein seltsames Schiff beinahe mit dem Außenposten kollidiert. Visuelle Berichte zeigen auf, dass es dasselbe ominöse Schiff war, das vor einiger Zeit zum ersten Mal gemeldet wurde.\n\nDem Bericht der Raumstation zufolge bestand der Rumpf des Schiffs aus einer sonderbaren Verschmelzung von organischem Material, Kalziummineralien und metallischen Legierungen.\n\nEs konnten keinerlei Lebenszeichen an Bord des Schiffs registriert werden, was uns vermuten lässt, dass dieses Schiff entweder automatisiert umherflog oder seinen Besitzern auf irgendeine andere Weise abhandenkam.\n\nNoch verblüffender jedoch ist, dass das Antriebssystem durch Weltraumschrott zerstört wurde und das Schiff eigentlich bewegungsunfähig durch den Weltraum treiben müsste.\n\nWenn wir ein Forschungsschiff mit der Überwachung des nächsten kosmischen Sturms beauftragen, erfahren wir vielleicht mehr über dieses mysteriöse Schiff."
 cstorms.1313.a: "Wir haben keine Zeit für solchen Unsinn."
 cstorms.1316.name: "Ein Flüstern im Sturm"
 cstorms.1316.desc: "Wir haben einen Bericht von der [stormbound_science.GetName] erhalten. Dieser beschreibt, wie man das sonderbare Schiff inmitten eines Sturms entdeckte. Als es vorbeiflog, empfing man wilde Messwerte, die vom kosmischen Geflecht selbst ausgingen.\n\nDies gibt uns endlich eine Antwort auf die Frage, warum unsere Sensoren das Schiff nicht erkennen konnten: Die physische Manifestation des Schiffs wurde jenseits der Mannigfaltigkeit ausgedehnt, ganz so, als sei es gleichzeitig zur Hälfte in einem Wurmloch und zur anderen nicht. Der wahrscheinlichste Grund, warum das Schiff zurück in unsere Realität gelangen konnte, könnte der hyperdimensionale Ursprung der kosmischen Stürme sein.\n\nMit diesem Wissen sollten wir in der Lage sein, das nächste Auftauchen zu bemerken und dieses Schiff vielleicht vollständig in unsere Realität zurückziehen."
 cstorms.1317.name: "Sichtung der Sturmgebundenen"
 cstorms.1317.desc: "Das sonderbare Schiff wurde im §Y[this.GetName]§! gesichtet!"
 cstorms.1320.name: "Heimatgebunden"
 cstorms.1320.desc: "Da war es! Das mysteriöse Schiff tauchte erneut vor der [Root.Fleet.GetName] auf und trat in Kontakt mit uns. Eine mechanische Wesenheit mit einer fein verzierten Maske erschien auf dem Bildschirm. Sie nannte sich B'Tiin, und die Geschichte, die sie erzählte, war faszinierend.\n\nSie war einst eine renommierte Offizierin für eine Organisation, die als Wohltäter-Konvention bekannt ist. Während einer Patrouille gerieten sie und der Rest der Schiffsbesatzung in einen kosmischen Sturm. Um zu überleben, traf sie die Entscheidung, den \"Bruchantrieb\" des Schiffs zu überlasten. Diese experimentelle Technologie wurde noch nie zuvor getestet, und die Aktivierung führte dazu, dass das Schiff und seine Besatzung im hyperdimensionalen Feld des Sturms gefangen wurden.\n\nAls ihre Geschichte endete, wurde ein kleines Behältnis von ihrem Schiff abgestoßen. Darin befand sich eine Sammlung von Dokumenten. \"Nehmt diese mit nach Hause\", bat B'Tiin, woraufhin die Übertragung abbrach und das Schiff in der räumlichen Mannigfaltigkeit verschwand.\n\nDie Dokumente sind in einer fremden Sprache geschrieben, und es wird einige Zeit dauern, sie zu entschlüsseln."
 cstorms.1320.a: "Beginnt mit der Übersetzung."
 cstorms.1321.name: "Briefe aus der Mannigfaltigkeit"
 cstorms.1321.desc: "Der Inhalt des seltsamen Behältnisses konnte endlich entschlüsselt werden. Eines der Dokumente enthielt eine schematische Darstellung des sogenannten \"Bruchantriebs\", den das Schiff verwendete. Diese Technologie geht zwar weit über unseren eigenen Kenntnisstand hinaus, doch die Prinzipien dahinter haben unser Wissen in Sachen Hyperraumreisen dennoch verbessert.\n\nWeniger nützlich, aber nichtsdestominder interessant waren die Übersetzungen persönlicher Briefe. Jeder von ihnen war an einen Geliebten gerichtet und sprach von Zuneigung, Hoffnung und Bedauern.\n\nOffenbar wollte B'Tiin ihrer Mannschaft damit eine letzte Chance geben, sich zu verabschieden. Leider wissen wir nicht, wohin wir diese Briefe schicken sollen. Sie unserem eigenen Volk zur Verfügung zu stellen, könnte zumindest ihr ungewöhnliches Erbe bewahren. Da das Wissen über seltsame Schiffe und gespenstische Briefe jedoch auch äußerst verstörend wirken könnte, sollten wir in Erwägung ziehen, diese Schriftstücke zu vernichten."
 cstorms.1321.a: "Archiviert die Briefe für die Nachwelt."
 cstorms.1321.b: "Vernichtet die Briefe."
 project_cosmic_storms_stormbound: "Sturmgeister"
 project_cosmic_storms_stormbound_DESC: "Wir haben prognostiziert, dass sich das ominöse Schiff in diesem Sturm manifestieren wird.\n\nWir sollten unverzüglich ein Forschungsschiff entsenden, um es hervorzulocken und abzufangen!"
 ### But They're Cute Event Chain
 cs_but_they_are_cute_chain_title: "Aber sie ist niedlich!"
 cs_but_they_are_cute_chain_desc: "Nach der Untersuchung von [From.Planet.GetName] wurde eine seltsame Kreatur entdeckt. Was sollen wir mit ihr machen?"
 but_they_are_cute_category: "Aber sie ist niedlich!"
 but_they_are_cute_category_desc: "Nach der Untersuchung von [From.Planet.GetName] wurde eine seltsame Kreatur entdeckt. Obwohl sie erst seit kurzer Zeit unter uns lebt, hat sie bereits den tiefen Wunsch in uns geweckt, uns um sie zu kümmern und sie zu beschützen. Unsere Wissenschaftler empfehlen, weitere Studien durchzuführen."
 cstorms.1500.name: "Aber sie ist niedlich!"
 cstorms.1500.desc: "Von dem Moment an, als die Kreatur entdeckt wurde, weckte sie Liebe und Hingabe in uns. Die vier unschuldig dreinblickenden Knopfaugen laden jeden dazu ein, das weiche, geradezu wolkige Fell zu streicheln. Die Kreatur scheint eine besonders innige Verbindung zu [Root.GetLeaderName] aufgebaut zu haben und verbringt die meiste Zeit auf [Leader.GetHisHer]em Schoß, ohne Anzeichen von Aggression oder Gefahr zu zeigen. Es ist fast so, als habe sie sich absichtlich so entwickelt, so harmlos wie möglich zu wirken.\n\nDennoch haben einige Skeptiker darauf hingewiesen, wie unverantwortlich es wäre, eine bisher unentdeckte Lebensform ohne vorherige Genehmigung an Bord des Schiffes zu halten. [Root.GetLeaderName] versicherte, dass von der Kreatur keinerlei Gefahr ausgeht, hat allerdings eingewilligt, eine formelle Untersuchung einzuleiten."
 cstorms.1500.a: "Findet heraus, womit wir es hier zu tun haben."
 cstorms.1500.b: "Anfrage abgelehnt. Werdet sie los."
 cstorms.1500.evopred: "Anfrage abgelehnt. Fresst sie."
 project_cosmic_storms_but_they_are_cute: "Biologisches Wunder"
 project_cosmic_storms_but_they_are_cute_DESC: "An Bord eines unserer Forschungsschiffe wurde eine faszinierende und äußerst niedliche Kreatur gefunden. Bevor wir jedoch darüber entscheiden, ob wir sie behalten oder nicht, müssen erst ihre biologischen Eigenschaften untersucht werden."
 cstorms.1505.name: "Biologisches Wunder"
 cstorms.1505.desc: "Der fügsame Hexapode musste nicht einmal sediert oder gar dazu gezwungen werden, Scans und Tests über sich ergehen zu lassen. Er scheint seltsam umgänglich zu sein. Die Crew nannte ihn Gurr nach jenem leisen Geräusch, das er macht, wenn man ihn streichelt.\n\nDie Tests ergaben, dass Gurr ein Allesfresser ist und sich sein Fell aus sehr weichen Filamenten zusammensetzt, die auf einer uns sehr wohl bekannten Keratinbasis beruhen. Das wahre Wunder - und zugleich auch ein Mysterium - findet sich jedoch im Inneren dieser niedlichen Kreatur: In nur einem Monat erreicht sie die totale Zellerneuerung. Dazu gehört auch das Nervensystem, was bedeutet, dass innerhalb weniger Tage voll funktionsfähige Körperteile nachwachsen können.\n\nDass eine Kreatur mit einer derart ausgeklügelten biologischen Verfasstheit ein Produkt der natürlichen Evolution ist, ist äußerst unwahrscheinlich. Wir haben so etwas noch nie gesehen und können uns der wahren Absichten dieses Wesens nicht sicher sein. Trotz seiner offensichtlichen Fügsamkeit könnte es sich jeden Moment gegen uns wenden. [Root.GetLeaderName] wirkt jedoch motivierter und arbeitsamer denn je, seit die Kreatur an Bord ist.\n\nWas sollen wir mit Gurr machen? Können wir ihn behalten?"
 cstorms.1505.a: "Solange ihr seinen Dreck weg macht."
 cstorms.1505.b: "Werdet das Ding los."
 cstorms.1510.name: "Gurr, die emotionale Stütze"
 cstorms.1510.desc: "Der niedlichen Kreatur wurde erlaubt, an Bord des Forschungsschiffs zu bleiben, und sie hat sich seitdem gut eingelebt. Sie schenkt [Root.GetLeaderName] Ruhe und heitert die Stimmung auf, wenn sie durch die Gänge trottet. Alles in allem ist die Moral der Crew auf einem Allzeithoch!\n\nHoffentlich wird dieses bemerkenswerte Wunder der \"Natur\" uns noch lange ein niedlicher und fügsamer Freund sein. Und sein Name soll Gurr lauten."
 cstorms.1510.a: "Großartig!"
 cstorms.1515.name: "Das Ende von Gurr"
 cstorms.1515.desc: "Aufgrund ihres ungewöhnlichen und eindeutig gentechnisch veränderten Körpers konnte die Kreatur nicht an Bord des Forschungsschiffs bleiben. Das Risiko für die Besatzung war schlicht zu hoch, und zudem war nicht auszuschließen, dass ihr verärgerter Besitzer sie zurückfordern würde. Das Ende war schnell und gnädig, und binnen eines Sekundenbruchteils wurde das zarte \"Gurr\" für immer zum Schweigen gebracht.\n\nObwohl diese Entscheidung für die Schiffsbesatzung nachvollziehbar war, hat sie sie dennoch emotional mitgenommen. Es wird einige Zeit dauern, bis [Root.GetLeaderName] und der Rest der Crew über den Verlust dieser entzückenden Laune der Natur hinwegkommen werden."
 cstorms.1515.a: "Wir hatten keine andere Wahl."
 cstorms.1515.evopred: "Sichern wir uns eine DNA-Probe."
 cstorms.1520.name: "Das Ende von Gurr?"
 cstorms.1520.desc: "Die Neutralisierung der entzückenden Kreatur hätte eigentlich ihr Ende sein sollen, doch ihre bemerkenswerten regenerativen Eigenschaften waren stärker, als wir geahnt hatten.\n\nKurz nach ihrem Tod brachte das unserer Auffassung nach leblose Gewebe zwei identische Kopien der Kreatur hervor. Selbst nach unserer Entscheidung, das Leben ihres Vorgängers zu beenden, zeigten die zwei Lebensformen keinerlei Anzeichen von Aggression.\n\nWir werden es vorerst dabei belassen, da wir nicht riskieren können, eine Armee von Gurrs zu erschaffen. [Root.GetLeaderName] und die Besatzung haben ihre Freude darüber zum Ausdruck gebracht, dass sie das Paar behalten dürfen."
 cstorms.1520.a: "Wir haben unsere Lektion gelernt."
 ### The Imitator Event Chain
 cstorms.1550.name: "Der Imitator"
 cstorms.1550.desc: "Die auf [From.Planet.GetName] entdeckte Kapsel wurde dem Sturm überlassen. Obwohl die von ihr verwendete Datensignatur eine der unseren zu sein scheint, ist die Kapsel definitiv fremdartiger Natur. Wir antworteten auf die von ihr ausgehenden Kommunikationsversuche vorsichtig, doch das Wesen in der Kapsel zeigte sich regelrecht begeistert.\n\nEs erklärte, es sei vom Sturm mitgerissen worden und dass die Lebenserhaltungssysteme seines Schiffs kurz vor dem Zusammenbruch stünden. Er bat darum, gerettet zu werden.\n\nAls er aufgefordert wurde, sich zu identifizieren, behauptete der Fremde bizarrerweise, ein Mitglied unserer eigenen Schiffsbesatzung zu sein. Die Lüge ist offensichtlich, da niemand auf unserem Schiff als vermisst gemeldet wurde."
 cstorms.1550.a: "Schluss mit den Spielchen. Vernichtet die Kapsel!"
 cstorms.1550.b: "Bringt die Kapsel an Bord."
 cstorms.1555.name: "Der Imitator"
 cstorms.1555.desc: "Wir haben die Rettungskapsel an Bord unseres Schiffs gebracht. Als sich die Kapsel öffnete, stürmte ein fremdes Geschöpf heraus, warf sich flehend vor uns auf den Boden und entschuldigte sich für die Täuschung.\n\nEs erklärte, dass es bei einer routinemäßigen Inspektion der Kapsel auf seinem Mutterschiff in deren Innerem gefangen und in den Weltraum geschleudert worden war. Niemand an Bord seines Schiffs bemerkte, dass es fehlte.\n\nDie Monate vergingen, und das Wesen nutzte das bisschen an Technologie, das an Bord der Kapsel vorhanden war, um die Energiesignale vorbeiziehender Schiffe wie ein Köder nachzuahmen. Doch niemand kam. Schließlich wurde die Kapsel von einem kosmischen Sturm ergriffen und Lichtjahre von ihrem Heimatsystem weggetragen. Von Einsamkeit und Angst bis zum Äußersten getrieben, schmiedete der Passagier den Plan, sich als vermisstes Besatzungsmitglied des nächsten Schiffs auszugeben, das vorbeikam. Er entschuldigte sich aufrichtig für die Täuschung, ist allerdings froh, am Leben zu sein."
 cstorms.1555.a: "Ein solcher Einfallsreichtum könnte nützlich sein."
 cstorms.1555.b: "Bereitet seinen Transport auf den nächsten Planeten vor."
 cstorms.1555.c: "Werft ihn raus und nehmt die Kapsel mit."
 the_imitator_category_desc: "Bei einer kürzlich durchgeführten Erkundungsmission wurde eine einzelne Rettungskapsel entdeckt. Seltsamerweise sendete sie eine Datensignatur aus, die mit unserer eigenen übereinstimmt. Die Kapsel scheint von einem kosmischen Sturm zurückgelassen worden zu sein, der kürzlich durch das System zog. Eine nähere Untersuchung wird empfohlen."
 #The Imitator Leader
 the_imitator_category: "Der Imitator"
 the_imitator_catch_phrase: "Ich bin so froh, hier zu sein!"
 the_imitator_leader_desc: "Dieses gerissene, exzentrische Genie, das von einem kosmischen Sturm mitgerissen und an Bord gebracht wurde, weiß, wie man jede Situation zum eigenen Vorteil nutzt."
