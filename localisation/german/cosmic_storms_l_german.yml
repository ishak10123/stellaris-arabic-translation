 magnetic_storm_aftermath_modifier_severity_desc: "Die magnetischen Störungen, die der $magnetic_storm$ verursachte, erzeugen ein wahres Lichtspektakel in der Atmosphäre. Die Magnetfelder wirken sich auch negativ auf die Geschwindigkeit planetarer Bauprojekte aus."
