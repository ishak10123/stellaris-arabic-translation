 #The adAkkaria Convention of Benevolence #
 ###########################################
 cs_adAkkaria_chain_title: "Vorläufer - Die adAkkaria"
 cs_adAkkaria_chain_desc: "Um mehr über das Schicksal dieser seltsamen und uralten Zivilisation herauszufinden, müssen wir einer Reihe von Hinweisen nachgehen, ganz egal, wohin uns diese auch führen mögen."
 #Anomaly: Ancient Signals
 STORMS_PREC_ONE: "Uralte Signale"
 STORMS_PREC_ONE_DESC: "Wir haben eine Reihe seltsamer elektronischer Signale aus diesem System empfangen. Vorläufige Untersuchungen zeigen, dass diese Übertragungen Tausende von Jahren alt sein könnten. Unsere Besatzung ist bestrebt, ihren Ursprung zu finden."
 cstorms.205.name: "Ein Signal des Wohlwollens"
 cstorms.205.desc: "Die seltsamen Signale, die wir in diesem System entdeckt haben, stammen von einer uralten Kommunikationsstation, die [FromFrom.GetName] umkreist. Die Botschaften scheinen von einer längst vergessenen Zivilisation herzurühren.\n\nDies ist auch der Grund, warum unsere [Root.Owner.GetScientistPlural] Schwierigkeiten haben, sie zu entschlüsseln. Sie schlagen vor, dass wir die Station betreten, damit sie sich direkt mit dem Mainframe verbinden können."
 #Digsite: The Propaganda Station
 site_adakkaria_the_propaganda_station: "Die Propagandastation"
 site_adakkaria_the_propaganda_station_intro: "Diese uralte Kommunikationsstation ist noch immer aktiv. Indem wir sie betreten und uns direkt mit ihren Systemen verbinden, können wir möglicherweise den Inhalt der Übertragung entschlüsseln."
 cstorms.215.name: "Eine Schnittstelle in die Vergangenheit"
 cstorms.215.desc: "Beim Betreten der Station gab es nur wenig Probleme, doch dafür war es umso schwieriger, sich in ihrem Inneren zurechtzufinden. Obwohl sie überraschend gut erhalten war - zum Teil aufgrund der fortschrittlichen Legierungen, die man für die äußere Hülle genutzt hatte -, stellten die engen Gänge und die niedrigen Decken eine Herausforderung dar.\n\nDer Außenposten bietet nur wenige Hinweise auf seine früheren Besitzer. Die Wände sind von einer Papier-Kunststoff-Mischung geschmückt, die stilisierte Bilder von Individuen einer unbekannten organischen Spezies zeigen. Sie stehen aufrecht und entschlossen vor einem Hintergrund voller Eroberungen und Festivitäten. Die Grafiken sind eindeutig so gestaltet, dass sie ein gewisses Gefühl von Stolz vermitteln.\n\nDer Mainframe selbst ist uns ebenso ein Rätsel. Anfänglich dachten unsere [Root.Owner.GetEngineerPlural], er sei analog, ähnlich dem, was wir bei [Root.Owner.GetPreFTLLowerPlural] gesehen haben. Unter den Tasten und Zifferblättern verborgen lag jedoch eine komplexe Anordnung elektronischer Schaltkreise, die aus uns unbekannten Legierungen hergestellt waren. Unsere [Root.Owner.GetScientistPlural] vermuten, diese Zivilisation könnte mehrere Entwicklungsschritte in der Informatik übersprungen haben, was den anachronistischen Technologiemix erklären würde.\n\nNach einer Reihe von Versuchen und Fehlschlägen gelang es unseren [Root.Owner.GetLinguists] schließlich, die erste von vielen aufgezeichneten Übertragungen zu entschlüsseln."
 cstorms.220.name: "Von der erhabenen Führung"
 cstorms.220.desc: "Nachdem sich unsere [Root.Owner.GetLinguists] erfolgreich mit dem alten Sendermainframe verbunden hatten, konnten sie ein Transkript der ersten Übertragung anfertigen:\n\n§LBesucher der adAkkaria-Konvention!\n\nIch spreche nicht als Anführer zu Euch, sondern als Freund und Mentor.\n\nEs ist uns allen nicht entgangen, dass die Tage dunkler werden und uns selbst die Sterne feindselig gesonnen sind.\n\nDoch wir müssen Vertrauen haben! So wie unsere Wohltäter Vertrauen in uns hatten, müssen wir auf unsere Sache vertrauen. Ich habe Vertrauen in Euch.\n\nJahrhundertelang schützte unser Volk die Sterne vor den schlimmsten barbarischen Horden. Es ist unsere Pflicht und unser Schicksal, die Galaxie von diesen bösartigen Mächten zu säubern. Das Schicksal lässt sich nicht durch einen einzigen Rückschlag aufhalten! Wir werden nicht vor den niederträchtigen Legionen, die sich gegen uns verschworen haben, kapitulieren.\n\nIch glaube an unsere Mission. Die adAkkaria-Konvention des Wohlwollens bringt allen Zivilisationen Wahrheit und Freiheit. Es ist unsere Mission, die uns erhält. Es ist unser Schicksal, das uns triumphieren und gedeihen lässt!\n\nUnd deshalb, meine lieben Freunde, dürfen wir uns nicht dem Zweifel hingeben. Trauern wir um das Verlorene und ehren wir die Gefallenen. Und lasst uns danach so zusammenkommen, wie wir es immer getan haben. Für unsere Wohltäter. Für die adAkkaria-Konvention. Für das Wohlwollen!§!"
 cstorms.225.name: "Ultimatum der UniCom"
 cstorms.225.desc: "All die gefundenen Daten zu sortieren und zu analysieren, die auf der alten Station gefunden wurden, war eine äußerst anspruchsvolle Aufgabe für unsere [Root.Owner.GetLinguists]. Mehrere Übertragungen wurden letztlich als besonders aufschlussreich eingestuft, wobei einige Einblicke in aufgezeichnete Gespräche liefern:\n\n§SilSapne Tuerthi - Moderator§!\n§L... Kommen wir nun zu der jüngsten Einmischung der Universalgemeinschaft. Wir haben heute Hochprofessor akMani Sando und emEk Inna, Doktor aller wahrgenommenen Existenzen, zu Gast. Wie interpretieren Sie die Forderungen der UniCom?§!\n\n§SakMani Sando - Hochprofessor§!\n§LDie Forderungen sind unverschämt! Die Universalgemeinschaft behandelt zivilisierte Welten weiterhin mit äußerster Verachtung. Doch sollten wir diese selbsternannten Hüter der galaktischen Moral nicht lieber fragen, ob es nicht unethischer ist, potenziell lebensrettende Technologien zurückzuhalten? Genau jene Ideale zu verweigern, die das Fundament unserer äußerst erfolgreichen Gesellschaft ausmachen? Wie abscheulich wäre es von uns, eine Welt ihrem Untergang zu überlassen und sie nicht zu retten, obwohl wir die Mittel dazu hätten?§!\n\n§SilSapne Tuerthi - Moderator§!\n§LDas sind alles wichtige Punkte! Doktor aller wahrgenommenen Existenzen, ich kann mir vorstellen, dass Sie genauso empört sein müssen, wenn UniCom unser eigenes Schicksal zu manipulieren versucht.§!\n\n§SemEk Inna - Doktor aller wahrgenommenen Existenzen§!\n§LWas ich jetzt sage, könnte Sie schockieren. Trotz der Sturheit, die diese Organisation an den Tag legt, denke ich, dass man sich bemühen sollte, UniComs Bedenken zu unt...§!\n\n§TOffenbar wurde die Übertragung zu diesem Zeitpunkt unterbrochen.§!"
 cstorms.225.a: "Sie sind äußerst dogmatisch."
 cstorms.225.a.hive: "Zu viele Stimmen führen zu Chaos."
 cstorms.225.a.machine: "Das Leben steckt voller Streitsucht."
 cstorms.230.name: "Heilige und Psioniker"
 cstorms.230.desc: "Eine weitere Übertragung wurde als besonders wertvoll eingestuft. Obwohl es sich dabei eindeutig um ein Drama handelt, könnte es uns nützlichen Kontext für unsere Untersuchung liefern:\n\n§SakTamian Riwan§!\n§LIch habe erfahren, dass du gestern Abend erneut bei enTulla Saman warst. Ich dachte, du liebst mich?§!\n\n§SinElka Utae§!\n§LIch schwöre, dass es nichts weiter als ein Besuch aus reiner Höflichkeit war. Du weißt, dass ich mich dir versprochen habe und niemandem sonst!§!\n\n§SakTamian Riwan§!\n§LDas sagt dein Mund, aber dein Verstand sagt mir etwas ganz anderes!§!\n\n§SinElka Utae§!\n§LNein, nicht du auch!§!\n\n§SakTamian Riwan§!\n§LDoch, ich auch! Ich habe erst letzte Nacht meine psionische Gabe entdeckt! Und was ich mir als heitere Ergründung unserer tiefsten Gefühle vorstellte, schlug in Verzweiflung um! Der Verrat in deinen Gedanken!§!\n\n§SinElka Utae§!\n§LDu verstehst nicht! Mein Verstand ... Ich kann nicht anders. Ich kann nicht anders, als diesen Weg als rational zu betrachten. Oh, Riwan, wenn deine neuen psionischen Gaben es dir nur erlauben würden, mein Herz anstelle meiner Gedanken zu lesen!§!"
 cstorms.230.a: "Psionische Fähigkeiten? Interessant."
 cstorms.230.b: "Was für ein leeres Gefasel."
 cstorms.230.b.hive: "Eine sonderbar individualistische Form der Unterhaltung."
 cstorms.230.b.machine: "Organische Wesen und ihre Dramen ..."
 dramatic_enthusiasm: "Dramen-Liebhaber fremder Spezies"
 melodramatic_much: "Dramen-Hasser fremder Spezies"
 cstorms.235.name: "Lokalnachrichten"
 cstorms.235.desc: "Unsere [Root.Owner.GetLinguists] haben auch mehrere Lokalnachrichten übersetzt. Sie glauben, gerade diese seien eine nähere Untersuchung wert:\n\n§LBerichte aus dem Haliios-System zeichnen ein zunehmend düsteres Bild. Solphanische Truppen überfielen unsere tapferen Aufklärungskräfte in enYpsal! Unsere erhabene Führung erklärte, der Prozess werde dennoch nicht unterbrochen. Wir zitieren: \"Unsere Wohltäter haben uns nicht aufgegeben, und deshalb werden auch wir keine unterentwickelte Zivilisation aufgeben.\"\n\nEs gibt zudem Gerüchte über eine mögliche Zusammenarbeit zwischen den barbarischen Behörden und Vertretern der UniCom. Der Botschafter der UniCom bestreitet jedoch, dass die interstellare Gemeinschaft mit den barbarischen Unterdrückern verhandeln würde, und erklärte, dies sei ein weiteres Beispiel für die \"bequeme Paranoia\" unserer Erhabenen Führung.\n\nDoch ganz egal, ob nun mit oder ohne mächtige Verbündete: Der Erleuchtungsprozess der Solphani befindet sich in einer kritischen Phase. Es wird nicht leicht sein, diese Entwicklung umzukehren, doch ...§!\n\n§TLeider ist der Rest der Übertragung zu unkenntlich. Unsere [Root.Owner.GetEngineerPlural] haben bereits eine Kopie der Datenbank erstellt. Wir hoffen, im Lauf der Zeit weitere Informationen über diese vor Langem untergegangene Zivilisation erhalten zu können.§!"
 cstorms.235.a: "Wir warten bereits gespannt auf neue Erkenntnisse."
 #Event: A Site Barren and Bare
 cstorms.245.name: "Eine unwirtliche Stätte"
 cstorms.245.desc: "Ein vorbeiziehender kosmischer Sturm hat im [planet_windswept_fates.System.GetName]-System eine potenziell interessante archäologische Stätte auf §Y[planet_windswept_fates.GetName]§! freigelegt.\n\nErste Scans deuten auf eine verheerend instabile Atmosphäre hin, die von gewaltigen planetaren Stürmen dominiert wird. Unsere [Root.Owner.GetScientistPlural] hätten niemals erwartet, Überreste einer Zivilisation auf einer Welt wie dieser zu finden, und sind sich sicher, dass wir viel daraus lernen könnten."
 cstorms.245.a: "Bereitet einen Landetrupp vor!"
 #Digsite: Windswept Fates
 site_adakarria_windswept_fates: "Windgepeitschtes Schicksal"
 site_adakarria_windswept_fates_intro: "So zerstörerisch kosmische Stürme auch sein mögen: Dieser legte Beweise für eine fremde Zivilisation frei. Obwohl die Atmosphäre des Planeten unglaublich instabil ist, könnte ein Landetrupp das schreckliche Schicksal dieser uralten Kultur enthüllen."
 cstorms.2105.name: "Harsche Bedingungen"
 cstorms.2105.desc: "Unser Landetrupp kam sicher auf [From.Planet.GetName] an und machte sich rasch an die Arbeit, um die neue Umgebung zu vermessen.\n\nScheinbar war der jüngste kosmische Sturm, der dieses System heimsuchte, derart heftig, dass er genügend Staub- und Bodenschichten freilegte, um die Überreste einer alten Zivilisation zu enthüllen.\n\nAls unsere Wissenschaftler die archäologischen Funde untersuchten, überraschte sie am meisten, dass die Sandschichten, die die Überreste bedeckten, eine völlig andere Zusammensetzung hatten als der umliegende Boden. Ein Scan des Planeten deutet darauf hin, dass diese Ablagerungen aus einer Wüste stammen, die Hunderte von Kilometern entfernt liegt, und dass sie nur durch eine große Kraft wie einen extremen planetaren Sturm hierhergetragen werden konnten."
 cstorms.2105.a: "Macht weiter."
 cstorms.2110.name: "Was einst verloren ging"
 cstorms.2110.desc: "Trotz der ungewöhnlichen planetaren Wetterbedingungen konnten unsere [Root.Owner.GetScientistPlural] große Fortschritte machen. Doch mit jedem Tag wurden ihre Entdeckungen immer sonderbarer und beunruhigender.\n\nZuerst fanden sie Überreste von Steinmetzarbeiten und verkohlten organischen Materialien. Danach stießen sie auf zerrissenen Stoff, Lederarbeiten, mit Polymeren überzogene Westen und schließlich die organischen Überreste der einstigen Bewohner.\n\nEin Leichnam nach dem anderen wurde freigelegt. Ihre ausgetrockneten Organe waren mit Sand gefüllt und die Nägel wie von einem verzweifelten Kratzen abgenutzt. Jede Leiche war mit schwerer militärischer Ausrüstung einer [Root.Owner.GetPreFTLLower] ausgestattet und trug eine Projektilwaffe. Was wir für eine verlassene Stadt hielten, war in Wirklichkeit ein Massengrab.\n\nEs ist sehr wahrscheinlich, dass diese sterblichen Überreste bereits seit Äonen hier liegen, doch aufgrund der vollständigen Isolierung von Ultraviolettstrahlung und reaktiven Chemikalien bestens konserviert wurden. Was diesen Wesen genau widerfahren ist, bleibt weiter unklar."
 cstorms.2110.a: "Was für ein grausamer Tod."
 cstorms.2115.name: "Eine höhere Gewalt"
 cstorms.2115.desc: "Die Funde auf [From.Planet.GetName] bleiben nach wie vor verstörend. [Root.GetLeaderName] hat die Theorie aufgestellt, dass dieser Ort nicht als Grabstätte gedacht war, da die Toten dort zu Lebzeiten in bester körperlicher Verfassung waren, ehe der Sand sie erstickte.\n\nDarüber hinaus haben wir auch eine Reihe von Waffenanlagen und Geschütze entdeckt, die schwere Kampfmittel abfeuern können. Überraschenderweise zielen sie nicht auf die Oberfläche des Planeten, sondern in die Tiefen des Alls selbst.\n\nWelchem Feind auch immer diese Zivilisation gegenüberstand: Er kam wahrscheinlich von den Sternen."
 cstorms.2120.name: "Der ewige Sturm"
 cstorms.2120.desc: "Unsere Theorien über das seltsame Massengrab, das wir auf [From.Planet.GetName] fanden, führten zu keinen nützlichen Schlüssen. Der einzig verbliebene Hinweis ist der Ursprung des Sands, der diese gesamte Armee verschlang.\n\nNach einer Reihe immens komplexer Berechnungen und Simulationen hat sich herausgestellt, dass der Sturm, der den Sand hierhertrug, an einem anderen Ort auf dem Planeten noch immer wütet. Ein kleiner Expeditionstrupp wurde zusammengestellt, um diesem Umstand nachzugehen.\n\nAls sie ankamen, begrüßte sie ein heftiger Sturm, dessen brutalen Winde eine tiefe Schneise in den Boden gegraben haben. Sollten hier Antworten zu finden sein, dann zweifellos genau im Auge des Sturms."
 cstorms.2120.a: "Trefft alle notwendigen Vorsichtsmaßnahmen!"
 cstorms.2125.name: "Ein Skelett"
 cstorms.2125.desc: "Sich im Sturm zurechtzufinden, war schwierig und erforderte ein Höchstmaß an Geschick und Aufmerksamkeit. Im Auge des Sturms befand sich ein Krater und in diesem ein höchst ungewöhnliches Skelett. Die sterblichen Überreste sind so alt wie die im Massengrab, doch sowohl der Phänotyp als auch der Genotyp dieses Skeletts waren völlig anders.\n\nSeine Uniform war überraschend gut erhalten und zeigte ebenfalls signifikante Unterschiede im Design. Es gab zudem Anzeichen, dass einige der Gliedmaßen absichtlich entfernt wurden ...\n\nDoch am merkwürdigsten waren die Messwerte unserer Sensoren: Wir stellten Energieschwankungen um das Skelett herum fest. Diese Signaturen waren denen des Sturms überraschend ähnlich.\n\nStand dieses Individuum irgendwie mit den kosmischen Stürmen in Verbindung, denen wir bisher schon begegnet sind? War es für den Tod der Armee verantwortlich? Es fühlte sich bizarr an, darüber nachzudenken, doch alle Tatsachen wiesen in diese Richtung."
 cstorms.2130.name: "Staub zu Staub"
 cstorms.2130.desc: "Als wir die Symbole der Uniform mit unserer Datenbank verglichen, erhielten wir ein verblüffendes Ergebnis: Das Skelett gehörte einem Bürger der adAkkaria-Konvention! Eben jene Zivilisation, deren Funkstation wir vor nicht allzu langer Zeit erkundet hatten. Zu unserer noch größeren Überraschung zeichnen die Uniform, das Alter des Skeletts und die Informationen aus den Übertragungen ein überraschend zusammenhängendes Bild. Wir glauben, dass dies die Welt ist, die in diesen Übertragungen erwähnt wurde.\n\nMit den Sprachkenntnissen, die wir in der Propagandastation sammelten, konnte [Root.GetLeaderName] den Namen des Opfers ermitteln: §ShaToor Gailon§!.\n\nNur wenige Augenblicke später gewann der Sturm in der Umgebung rapide an Größe und Heftigkeit hinzu. Da Stürme dieser Art unvorhersehbare Folgen haben können, war es zu gefährlich, um zu bleiben. Wir waren gezwungen, diese Welt dem Sturm zu überlassen. Die Spur zur adAkkaria-Konvention ist kalt."
 #Storm to Signal
 cstorms.2140.name: "Sturmsignal"
 cstorms.2140.desc: "Die Energiesignaturen des Skeletts und des planetenzerstörenden Mahlstroms auf §Y[planet_windswept_fates.GetName]§! stimmen mit denen jenes kosmischen Sturms überein, der die vergrabene Armee zum Vorschein brachte. Ein Abgleich unserer Datenbanken deckte ein bereits erforschtes System auf, das ebenfalls die entsprechenden Energieschwankungen aufweist: Sie sind identisch mit den Übertragungen der adAkkaria-Konvention!\n\nWir sollten ein Erkundungsschiff entsenden und diesen Umstand näher untersuchen."
 #Fleets of the Trice Damned
 site_adakkaria_fleets_of_the_thrice_damned: "Die Flotten der Dreifach Verdammten"
 site_adakkaria_fleets_of_the_thrice_damned_intro: "Die seltsamen Energieschwankungen in dieser Region verbargen einen riesigen Schiffsfriedhof. Diese Nekropole aus Polymer und Metall könnte wichtige Anhaltspunkt zur adAkkaria-Konvention liefern."
 cstorms.2150.name: "Geschredderte Überreste"
 cstorms.2150.desc: "Auf diesem Friedhof ruhen Schiffe aller Art, von länglichen Gefährten aus Holz bis hin zu Archen aus Kristall. Manche von ihnen weisen große Ähnlichkeiten zu jenen Bildern auf, die wir in den Übertragungen und Protokollen der adAkkaria-Übertragungsstation fanden.\n\nWir vermuten, dass hier eine Konfrontation zwischen den Flotten der Konvention und der Unicom stattfand - jener galaktischen Friedenstruppe, die vor Tausenden von Jahren existierte.\n\nUnd dennoch scheinen diese Schiffe weder durch gewöhnliche Waffen noch durch eine Fehlfunktion oder eine ähnliche Katastrophe hier gestrandet zu sein. Die Rümpfe und das Innere wurden zerfetzt, als hätte sie ein gewaltiger Schredder angegriffen."
 cstorms.2155.name: "Die Grenzen des Pflichtbewusstseins"
 cstorms.2155.desc: "Unsere [Root.Owner.GetEngineerPlural] konnten einige Datenbanken aus den Friedhofsschiffen bergen. Der Großteil von ihnen ist bedauerlicherweise irreparabel beschädigt, doch eine adAkkaria-Datenbank hat überlebt:\n\n§L- Wir wurden in einen Hinterhalt gelockt. Ich wiederhole: Wir wurden in einen Hinterhalt gelockt. Die UniCom fordert, dass wir unsere Versuche einstellen, die Rokukora zu erleuchten, wenn wir nicht vernichtet werden wollen. Eine Antwort wird erbeten. Wenn wir uns nicht zurückziehen, werden sie uns vernichten. Bitte schickt wenigstens Verstärkung!\n\n- Negativ. Euer Opfer wird zur Kenntnis genommen.§!"
 cstorms.2155.a: "Sie stellten die Pflicht vor ihr eigenes Leben!"
 cstorms.2160.name: "Sichtbare Überreste"
 cstorms.2160.desc: "Während unsere [Root.Owner.GetLinguists] weiter damit beschäftigt waren, Transkripte der Übertragungen anzufertigen, machten wir eine erstaunliche Entdeckung: einen gefrorenen Körper, der in der Mitte des Friedhofs schwebte!\n\nDie Leiche war zwar bereits stark verwest, doch ihre Kleidung war die eines Konventionsoffiziers.\n\nSeltsamerweise hat sich ein Ring aus kleineren Trümmern um den Körper herum angesammelt. Es ist fast so, als übe er eine Art Anziehungskraft auf diese Objekte aus. Die sterblichen Überreste wurden zur weiteren Analyse an Bord geholt."
 cstorms.2165.name: "Die Toten sprechen"
 cstorms.2165.desc.intro: "Die Übersetzung des Namensschilds enthüllte, dass es sich bei dem Toten um ein Mitglied der adAkkaria-Konvention namens §SalAtta Landeer§! handelt. Ähnlich wie bei dem Skelett, das wir auf [planet_windswept_fates.GetName] fanden, wurden mehrere Gliedmaßen vor dem Ableben operativ entfernt. In diesem Fall jedoch war zusätzlich auch der Körper stark verbrannt. Der Oberkörper wies vor allem Anzeichen extremer Hitze sowie einer langsamen und sicherlich schmerzhaften Genesung auf.\n\nUnsere [Root.Owner.GetScientistPlural] kamen zu dem Schluss, dass diese Wunden eine beunruhigende Ähnlichkeit mit jenen Foltermethoden hatten, wie sie primitivere Zivilisationen zur Extraktion von Informationen bei unkooperativen Individuen anwenden. Handelt es sich hierbei um einen Kriegsveteranen? Oder ist ihm etwas noch viel Schlimmeres widerfahren?"
 cstorms.2165.desc.def: "$cstorms.2165.desc.intro$\n\nKurz nachdem wir die Wunden analysiert hatten, wurden unsere Schiffsinstrumente von einer plötzlichen Energiespitze getroffen und [Root.GetLeaderName] schrie auf.\n\nEtwas später beschrieb [Leader.GetHeShe] die Erfahrung als intensives Licht, gefolgt von verheerenden Schmerzen, als ob etwas oder jemand versuche, [Leader.GetHerHis]en Schädel aufzubrechen ... aber von innen heraus."
 cstorms.2165.desc.psio: "$cstorms.2165.desc.intro$\n\nKurz nachdem wir die Wunden analysiert hatten, wurden unsere Schiffsinstrumente von einer plötzlichen Energiespitze getroffen und unsere psionisch begabte Crew schrie auf.\n\nEtwas später berichteten sie, einen Moment höchster Klarheit erlebt zu haben, gefolgt von einer alles einnehmenden Welle geschmolzener, gedankenzerreißender Wut. [Root.GetLeaderName] erklärte, dass unter der Wut ein tiefes Gefühl des Verrats begraben lag. Ein einziger Gedanke wurde ständig wiederholt: §LSie haben mich heraufbeschworen!§!"
 cstorms.2165.desc.psio_robot: "$cstorms.2165.desc.intro$\n\nKurz nachdem wir die Wunden analysiert hatten, wurden unsere Schiffsinstrumente von einer plötzlichen Energiespitze getroffen und auch innerhalb unserer Einheit registrierte man Energiespitzen.\n\nEtwas später berichtete diese Einheit von einem Moment, den ihre psionischen Prozessoren als extreme Wut katalogisierten. [Root.GetLeaderName] gab an, dass die emotionale Reaktion zusammen mit einem einzigartigen Gedanken kam, der wie folgt transkribiert wurde: §LSie haben mich heraufbeschworen!§!"
 cstorms.2165.desc.gestalt: "$cstorms.2165.desc.intro$\n\nNach dieser Entdeckung wurden unsere Datenbanken durch eine unerklärliche Kraft beschädigt. Mehrere [controller.GetIndividualNamePlural] erinnerten sich an einen kurzen, lähmenden Stromstoß, während andere verschlüsselten und unzusammenhängenden Bildern ausgesetzt waren, die ihre Sprachmodulatoren dazu veranlassten, ein durchdringendes Geräusch von mehr als 120 Dezibel auszusenden."
 cstorms.2165.a: "-- Signal verloren --"
 cstorms.2170.name: "Landeers Vermächtnis"
 cstorms.2170.desc.def: "Als wir die Kommunikation zu unserem Forschungsschiff, der §Y[Root.GetFleetName]§!, wieder aufgenommen hatten, waren wir den Schreien der Besatzung ausgesetzt. Deutlich später, nachdem wieder eine gewisse Ruhe hergestellt war, ergab sich, dass jene Leiche, die sie an Bord gebracht hatten, für den Aufschrei verantwortlich war.\n\nDie Leiche selbst übte eine seltsame Kraft auf ihr Bewusstsein aus und kleinere Objekte erhoben sich in die Luft und begannen, den Körper zu umkreisen. Selbst Teile der Innenwände wurden durch den Druck verbogen.\n\n§Y[Root.GetLeaderName]§! konnte gerade noch rechtzeitig aus [Leader.GetHerHis]em katatonischem Zustand erwachen, um die Leiche aus der Luftschleuse zu werfen. Dieser schnellen Reaktion war es auch zu verdanken, dass das Schiff aus dem plötzlich auftauchenden kosmischen Sturm entkommen konnte. Hätte [Root.GetLeaderName] nicht so entschlossen gehandelt, hätte der Friedhof ein neues Schiff willkommen geheißen.\n\nAls [Root.GetLeaderName] von [Leader.GetHerHer]en Erfahrungen berichtete, bemerkte [Leader.GetHeShe] noch etwas anderes: Wo auch immer diese sonderbare Kraft ihren Ursprung hatte, sie hatte ein einzigartiges Muster auf den Bildschirmen der Steuerkonsolen gebildet. Handelt es sich hierbei vielleicht um einen Kommunikationsversuch? Einen Ruf von jenseits des Grabes?\n\nIm Moment haben wir noch keine Antworten."
 cstorms.2170.desc.gestalt: "Die verschlüsselten Bilder, die einige unserer für die Erkundung ausgesandten [controller.GetIndividualNamePlural] korrumpieren, ließen sich endlich entschlüsseln. Sie zeigen ein altes Habitat. Wie sich überdies herausstellte, wurden unsere [controller.GetScientistPluralCapital] vom Anblick und den Geräuschen eines Individuums heimgesucht, das auf grausame Art gefoltert wurde. Der Körper wurde verbrannt und die Organe gekocht ...\n\nEinigen [controller.GetIndividualNamePlural] gelang es, den audiovisuellen Angriff abzuwehren. Sie gaben an, dass mehrere kleine Objekte in einer engen Umlaufbahn um den Körper zu schweben begannen. Der organische Leichnam hatte scheinbar irgendwie ein eigenes Gravitationsfeld entwickelt.\n\nDiese mysteriöse Kraft wurde immer stärker, bis sich sogar Teile der Innenwände durch den Druck verbogen. In diesem Moment aktivierte sich zum Glück das Sicherheitssystem und schleuderte die Leiche in den Weltraum.\n\nKurz darauf brach in diesem System ein kosmischer Sturm los. Unser Schiff schaffte es gerade so, ihm unbeschadet zu entgehen.\n\nWas auch immer dort geschehen ist, warf mehr Fragen auf, als dass es Antworten lieferte."
 #Special Project: Assembling the Past
 cstorms.2180.name: "Rekonstruktion der Vergangenheit"
 cstorms.2180.desc: "Nach den von [FromFrom.Leader.GetName] im §Y[planet_assembling_the_past.System.GetName]§!-System gemachten Erfahrungen sind unsere Wissenschaftler noch mehr daran interessiert, herauszufinden, was genau aus der adAkkaria-Konvention wurde. Die Datenbanken und die Daten, die wir während der Erforschung von [planet_windswept_fates.GetName] und des Flottillenfriedhofs gesammelt hatten, ergaben, dass die Galaxie mit adAkkaria-Propagandastationen übersät ist.\n\nNach langen Diskussionen vermutet man überdies, dass das Muster, das in der [Root.GetName] beobachtet wurde, eine Reihe von Anweisungen zu einem zuvor unentdeckten System enthielt!\n\nEin Spezialprojekt wurde geschaffen, um dieses neue System zu untersuchen."
 project_adakkaria_tracing_history: "Auf den Spuren der Vergangenheit"
 project_adakkaria_tracing_history_DESC: "Die Koordinaten verweisen auf einen Planeten im [planet_assembling_the_past.System.GetName]-System. Wir sollten ein Erkundungsschiff dorthin schicken und untersuchen, welche Bedeutung dieser Planet für die adAkkaria-Konvention gehabt haben könnte."
 NAME_adSalivul: "adSalivul"
 NAME_Patriotic_Institute_of_Exalted_Benevolence: "Erhabenes Wohlwollen"
 cstorms.2185.name: "Das uralte Habitat"
 cstorms.2185.desc: "Wir befürchteten zunächst, dass uns die Erforschung des [From.solar_system.GetName]-Systems in eine Sackgasse geführt hatte. Die Koordinaten deuteten auf einen Planeten, den ein derart starkes Magnetfeld umgab, dass er fast vollständig auseinandergerissen worden war. Es war unwahrscheinlich, dass etwas oder jemand eine solche Katastrophe überlebt hatte.\n\nIn der Umlaufbahn des Planeten trieb jedoch ein mehrere tausend Jahre altes Habitat, das architektonische Ähnlichkeiten zu der Übertragungsstation der adAkkaria-Konvention aufwies. Dieses war von außen hermetisch verschlossen, doch dank der Informationen, die wir aus den adAkkaria-Datenbanken extrahiert hatten, ließ sich ein Öffnungssignal erzeugen.\n\nEs ist sehr lange her, seit diese Station das letzte Mal geöffnet wurde, und wir wissen nicht, was uns im Inneren erwartet."
 cstorms.2185.a: "Lasst Vorsicht walten."
 #The Patriotic Institute of Exalted Benevolence
 site_adakkaria_the_patriotic_institute: "Institut des Erhabenen Wohlwollens"
 site_adakkaria_the_patriotic_institute_intro: "Dieses uralte Habitat umkreist einen verwüsteten Planeten und wurde von der adAkkaria-Konvention gebaut. Die hochwertigen Materialien, die bei der Konstruktion Verwendung fanden, sorgten dafür, dass sich die Station in einem nahezu makellosen Zustand befindet.\n\nAls wir unsere Systeme auf die richtige Übertragungsfrequenz einstellten, wurde eine Nachricht abgespielt, gefolgt von einer bombastischen Erkennungsmelodie mit dem Motto: §LWillkommen im Patriotischen Institut des Erhabenen Wohlwollens§!."
 cstorms.2200.name: "Tretet in das Wohlwollen ein"
 cstorms.2200.desc: "Jenseits der Luftschleuse erstreckte sich ein kleines Netzwerk von Tunneln, von denen einige in einem massiven Raum endeten, der von künstlichem Sonnenlicht beleuchtet wurde. Sonderbarerweise ähnelte die Architektur des Habitats eher Vororten von Wohnwelten als einer Wissenschaftsstation: Das Habitat enthält riesige Apartmentkomplexe, Einkaufszentren und Schulen, aber auch Gärten, Parks und andere Einrichtungen. Dieser Ort wurde ganz offensichtlich für luxuriöses Wohnen konzipiert.\n\nJetzt ist er jedoch völlig verlassen. Im gesamten Habitat war keine einzige organische Lebensform zu finden. Die Leere dieses Orts und die trostlose Atmosphäre trafen einen schwer.\n\nDas künstliche Sonnenlicht flackerte gelegentlich, was die Station immer wieder in Dunkelheit tauchte. Auch andere elektronische Geräte waren von derselben Störung betroffen, auch wenn sie weitgehend funktionsfähig blieben. Am merkwürdigsten jedoch war das Netzwerk an Überwachungsgeräten, die in den Wohnungen zu finden waren. Offenbar standen alle Bürger unter strenger Beobachtung. Eine Art Sicherheitsterminal zu finden, könnte uns weitere Einblicke geben."
 cstorms.2205.name: "Komplett gestört"
 cstorms.2205.desc.intro: "Es dauerte viele Tage, um die Stadt auf der Station zu durchkämmen und alles sauber zu verzeichnen, doch schließlich fanden wir die Überwachungsstation. Sie war vollständig vom Rest des Habitats abgeschnitten und erforderte einen gesonderten Zugangscode.\n\nEs gab Reihen um Reihen von Monitoren, die noch immer an das Überwachungsnetz angeschlossen waren. Die noch funktionsfähigen deckten jeden Winkel der Station ab, doch auch sie waren von elektrischen Störungen betroffen."
 cstorms.2205.desc.mach: "$cstorms.2205.desc.intro$\n\nUnsere Drohnen brachten ihre Besorgnis zum Ausdruck, als sie Zeuge der Störungen wurden. Sie erinnerte sie an die vorherige Begegnung mit der adAkkaria-Konvention auf dem alten Schiffsfriedhof.\n\n$cstorms.2205.desc.outro$"
 cstorms.2205.desc.def: "$cstorms.2205.desc.intro$\n\n[Root.GetLeaderName] brachte [Leader.GetHerHis]e Besorgnis zum Ausdruck, als [Leader.GetSheHe] Zeuge der Störungen wurde. Sie erinnerte [Leader.GetIhnSieDE] an unsere vorherige Begegnung mit der adAkkaria-Konvention auf dem Schiffsfriedhof.\n\n$cstorms.2205.desc.outro$"
 cstorms.2205.desc.outro: "Noch beunruhigender jedoch war das, was wir in der Überwachungszentrale vorfanden: Den alarmierenden Meldungen zufolge, die auf den Bildschirmen angezeigt wurden, war dieses Habitat auf Selbstzerstörung eingestellt!\n\nUnsere [Root.Owner.GetEngineerPlural] gehen davon aus, dass die Störung, die die gesamte Stadt plagte, verhinderte, dass der Befehl ausgeführt wurde. Wir deaktivierten schleunigst die Selbstzerstörungsroutine und wiesen unsere [Root.Owner.GetLinguists] an, alle wiederherstellbaren Protokolle zu entschlüsseln. Seltsamerweise hörten die Berichte der Station fast ein Jahr früher auf als jene Aufzeichnungen, die wir auf der Propagandastation fanden."
 cstorms.2210.name: "Erhabene Anfragen"
 cstorms.2210.desc: "Es dauerte nicht lange, bis unsere [Root.Owner.GetLinguists] den Zweck jenes Habitats enträtseln konnten, das [From.Planet.GetName] umkreist: Protokolle und Nachrichten von einfachen Bewohnern und Mitarbeitern der Station beschreiben beide zahlreiche Untersuchungen der neu entstandenen psionischen Kräfte bei adAkkaria-Bürgern. Alle, die hier lebten, wurden von der \"Erhabenen Führung\" der Konvention eingeladen, ein Leben in Luxus und Selbstentfaltung an Bord zu genießen. Im Gegenzug erklärten sie sich bereit, an den laufenden Experimenten der Station teilzunehmen.\n\nDie meisten Bürger waren sehr daran interessiert, sich dem Programm anzuschließen. Die Sicherheitsprotokolle zeigen, dass unter ihnen viele kriegsversehrte Veteranen waren. Ihnen wurde Pflege, finanzielle Unterstützung sowie eine Begnadigung für alle ausstehenden rechtlichen Fragen versprochen, die sie womöglich hatten.\n\nDarüber hinaus enthielt die Personalliste der Station einen sehr vertrauten Namen: den von §SalAtta Landeer§!, jenes Wissenschaftlers und Kriegsversehrten, dessen Leiche mit den sonderbaren Amputationen wir auf dem Schiffsfriedhof fanden."
 cstorms.2210.a: "Endlich ein Durchbruch!"
 cstorms.2215.name: "Wörter unserer Probanden"
 cstorms.2215.desc: "Wir haben endlich eine der letzten Nachrichten aus dem Habitat übersetzen können:\n\n§gNachricht - Datum 02100363 - Absender: §SsiDani Itempeer§! - Empfänger: siZul Itempeer§!\n§LHallo! Ich lebe noch! Es tut mir leid, dass ich mich so lange nicht gemeldet habe. Seitdem ... verhalten sich alle auf dem Habitat seltsam, was das Senden von Nachrichten schwierig macht. Sie sagten, es hätte damit nichts zu tun, aber wir denken, dass er doch psionisch begabt war. Was mich betrifft, hatte ich dir ja bereits erzählt, dass ich mit den vorherigen ... nicht wirklich weitergekommen bin. Sie schlugen daher vor, etwas Radikaleres auszuprobieren: ... kosmische Stürme. Ich weiß, was du denkst, aber es ist nur ein Finger, und vielleicht wächst er sogar nach. Doch das, was ich empfand, als ...!\nIn Liebe, siDani\n- ÜBERTRAGUNG§! §YZENSIERT (Bei Fragen wenden Sie sich an Ihren Vorgesetzten)§!\n\n§gNachricht - Datum 02100365 - Absender: §ShaToor Gailon§! - Empfänger: aeDal Asduur§!§L\nLieber aeDal,\nmir geht es gut. Ich habe ein paar andere Veteranen getroffen. Wir reden nicht darüber, aber wir alle wissen es. Es ist schön, nicht reden zu müssen.\nHeute musste ich nur daran denken, eine Tasse zu heben, und es passierte. Ich vermisse noch immer mein rechtes Anhängsel, doch vielleicht ist dieses neue Leben gar nicht so schlimm, wie ich befürchtet hatte. Ich habe sie davon reden hören, mich zu ... Anscheinend bin ich ein psionisches Wunder ... Ich ... möchte wieder in den aktiven Dienst.\nIch hoffe zum Nationalfeiertag wieder zu Hause zu sein. Treffen wir uns doch.\nDein haToor\n- ÜBERTRAGUNG§! §YZENSIERT (Bei Fragen wenden Sie sich an Ihren Vorgesetzten)§!\n\n§gNachricht - Datum 02100367 - Absender: §SenRida Direen§! - Empfänger: onRida Direen§!\n§LICH HABE EIN FEUER MIT MEINEM VERSTAND GESTOPPT!!!\nEiner der anderen Probanden wurde aus irgendeinem Grund hysterisch und verursachte einen Brand in der Kantine. Alle waren in Panik, doch wir konnten nirgendwo hin! Ich hatte RIESIGE Angst, aber dann ist etwas in mir passiert und ich habe das Feuer einfach verschwinden lassen!\nIch habe ALLE GERETTET!! Sag den Ältesten, dass ich kein völlig hoffnungsloser Fall bin!\n- ÜBERTRAGUNG§! §RBLOCKIERT (MELDEN SIE SICH UNVERZÜGLICH BEI IHREM VORGESETZTEN)§!\n\nDie zweite Nachricht ist für uns am interessantesten. Die Leiche von §ShaToor Gailon§! wurde während unserer archäologischen Ausgrabung auf der Welt der [Root.Owner.GetPreFTLLower] entdeckt."
 cstorms.2215.a: "Hervorragende Arbeit!"
 cstorms.2220.name: "Fehlerhafte Konsequenzen"
 cstorms.2220.desc: "Diese Nachrichten sind auf einige Tage vor der Evakuierung des Habitats datiert:\n\n§gNachricht - Datum 02100359 - Absender: Oberster Doktor - Empfänger: Erhabener Admiral§!\n§LIhre letzte Nachricht löste hier einige Bedenken aus. Wären Sie so freundlich, mir zu erklären, warum Sie, nachdem Sie uns all die Jahre bedingungslos unterstützt haben, uns nun plötzlich mit der Schließung drohen?\n- ÜBERTRAGUNG§! §GGESENDET§!\n\n§gNachricht - Datum 02100360 - Absender: Erhabener Admiral - Empfänger: Oberster Doktor§!\n§LDas soll doch wohl ein Scherz sein! Wir haben Sie bereits seit Monaten gewarnt, aber vermutlich hat die Umrundung einer solch wechselhaften Welt eine bequeme Amnesie verursacht? Ihnen ist schon bewusst, dass unsere Existenz durch UniCom bedroht wird, oder? Angesichts des bevorstehenden Krieges können wir es uns nicht mehr leisten, exorbitante Mengen an Ressourcen auszugeben, nur damit Ihre Probanden den ganzen Tag auf Vieh starren können. Ich brauche greifbare, nutzbare Ergebnisse. SOFORT.\n- ÜBERTRAGUNG§! §GEMPFANGEN§!\n\n§gNachricht - Datum 02100360 - Absender: Oberster Arzt - Empfänger: Erhabener Admiral§!\n§LEntschuldigen Sie vielmals. Wir haben Ihre früheren Nachrichten nie erhalten. Unsere Station wird von technischen Störungen geplagt, und das muss sich auch auf die Übertragungen ausgewirkt haben. Unabhängig davon brauchen wir mehr Zeit. Wir haben Prozesse und Protokolle. Wir können die nicht einfach aufgeben!\n- ÜBERTRAGUNG§! §GGESENDET§!\n\n§gNachricht - Datum 02100361 - Absender: Erhabener Admiral - Empfänger: Oberster Arzt§!\n§LSie haben eine Woche Zeit. Kein Wenn. Kein Aber. Keine zweite Chance. ERGEBNISSE!\n- ÜBERTRAGUNG§! §GEMPFANGEN§!\n\n§gNachricht - Datum 02100368 - Absender: Oberster Arzt - Empfänger: Erhabener Admiral§!\n§LIm Anhang finden Sie einen Bericht über unsere jüngsten Errungenschaften. Diese Videos beweisen, dass kosmische Stürme von unseren psionisch begabten Probanden beeinflusst werden können. Der militärische Anwendungszweck könnte das Blatt in diesem Krieg wenden. Mit genügend Zeit könnten wir ihre psionischen Kräfte aufladen, ohne sie einem körperlichen und geistigen Trauma auszusetzen.\n- ÜBERTRAGUNG§! §RFEHLGESCHLAGEN (Ursache: Übertragungsmatrix beschädigt)§!"
 cstorms.2220.a: "Diese letzte Nachricht wurde nie gesendet."
 cstorms.2225.name: "Unvollständiges Schicksal"
 cstorms.2225.desc: "Dies ist die letzte wiederherstellbare Nachricht:§L\n\nLiebe Kollegen,\n\nich wende mich schweren Herzens an Sie. Das Erhabene Kommando hat beschlossen, alle Operationen innerhalb des Patriotischen Instituts für Erhabenes Wohlwollen einzustellen.\n\nDies ist weder Ihnen noch der Arbeit, die wir hier getan haben, anzulasten. Es war mir eine Ehre, mit jedem Einzelnen von Ihnen arbeiten zu dürfen. Ich weiß, dass Sie bestimmt viele Fragen habt, aber kurz gesagt: Die Erwartungen, die das Erhabene Kommando hatte, entsprachen nicht unseren Forschungszielen.\n\nWas unsere Bürger betrifft, so wurden sie alle vom Erhabenen Kommando eingeladen, sich dem Programm am Patriotischen Institut der Feierlichkeiten auf adSul anzuschließen. Nachfolgend finden Sie eine vollständige Personalliste. Bitte informieren Sie Ihre Kontaktperson entsprechend.\n\nWas die anderen anbelangt ... Bedauerlicherweise bedeutet die Geheimhaltungsstufe unserer Forschung, dass es den Probanden nicht erlaubt sein wird, in die Gesellschaft zurückzukehren. Das Erhabene Kommando hat versprochen, eine Spezialeinheit zu entsenden, die sich um sie kümmert. Sie werden nicht selbst dafür sorgen müssen, was auf seine ganz eigene Weise sicherlich ein Segen ist ... Ihre Angehörigen werden in vollem Umfang entschädigt werden.\n\nGezeichnet\nOberster Doktor §!§SalAtta Landeer§!\n\nDie beigefügte Liste ist zwar zum Teil unvollständig, erwähnt aber §ShaToor Gailon§! und §SenRida Direen§!. Offenbar wurden sie in die adSul-Hauptwelt der adAkkaria-Konvention verlegt. Die Koordinaten zu dieser Welt befinden sich jetzt ebenfalls in unserem Besitz."
 cstorms.2225.a: "Setzt Kurs auf die Heimatwelt der Konvention!"
 #Special Project: Eye of the Convention / The Void Calls
 cstorms.2240.name: "Das Auge der Konvention"
 cstorms.2240.desc: "Die Koordinaten enthüllten ein System, das unseren Scannern zuvor verborgen war. Es ist an der Zeit, der adAkkaria-Konvention einen Besuch abzustatten - bevor es jemand anderes tut.\n\nEin neues Spezialprojekt wurde in Auftrag gegeben."
 cstorms.2245.name: "Die Leere ruft"
 cstorms.2245.desc: "Nur wenige Augenblicke, nachdem wir das Habitat verlassen hatten, traf [event_target:leader_patriotic_institute.GetName] eine überraschende Entscheidung: Wie von einer äußeren Kraft angetrieben befahl [event_target:leader_patriotic_institute.GetHeShe] dem Schiff, einen Kommunikationskanal zu öffnen und die Frequenz so einzustellen, dass sie mit der von psionischen Massenereignissen oder kosmischen Stürmen übereinstimmte.\n\nDer Kanal war auf dieselben Koordinaten ausgerichtet, wo auch das Heimatsystem der adAkkaria-Konvention liegen sollte. Es dauerte nicht lange, bis eine Antwort zurückkam."
 cstorms.2245.desc.gestalt: "Kurz nachdem wir das Habitat verlassen hatten, wurde unser Gruppenbewusstsein durch eine ungewöhnliche Schwingung gestört. Irgendetwas versuchte scheinbar, über eine große Entfernung mit uns zu kommunizieren. Das Signal kam von denselben Koordinaten wie denen des Heimatsystems der adAkkaria-Konvention und existierte auf einer Frequenz, die typischerweise mit psionischen Massenereignissen oder einem kosmischen Sturm übereinstimmt.\n\nWir schickten eine Nachricht zurück, die umgehend beantwortet wurde."
 cstorms.2250.name: "Der Sturm ruft"
 cstorms.2250.desc: "Wir haben alles in unserer Macht Stehende getan, doch adSul zu erreichen, erwies sich als eine viel größere Herausforderung als erwartet. Das gesamte System ist von einem kosmischen Sturm unbekannter Zusammensetzung umgeben, was es uns unmöglich macht, uns dem Planeten zu nähern.\n\nWas den Sturm betrifft ... Er versucht offenbar, uns zu rufen?"
 #The Storm
 cstorms.2260.name: "Der Sturm"
 cstorms.2260.desc: "SAGT UNSERE NAMEN\n\nSAGT UNSERE NAMEN\n\nSAGT | UNSERE | NAMEN"
 cstorms.2260.a: "Wer seid Ihr?"
 cstorms.2260.b: "Was ist hier geschehen?"
 cstorms.2260.c: "Namen?"
 cstorms.2260.a.resp: "SEIN | NICHT SEIN | GEWESEN SEIN\n\nTOSENDER STURM UND ZORN\n\nSCHMERZ UND WUT UND TRAUER UND ANGST\n\nSAGT UNSERE NAMEN"
 cstorms.2260.b.resp: "HERBEIRUFEN | HERVORRUFEN | HERANRUFEN\n\nSAGT UNSERE NAMEN"
 cstorms.2265.name: "$cstorms.2260.name$"
 cstorms.2265.desc: "WIR KÖNNEN NICHT DENKEN | SPRECHEN | WÜNSCHEN | TRÄUMEN\n\nUNSERE NAMEN RUFEN UNS HERBEI | GEBT UNS UNSER SELBST ZURÜCK | WIR SIND DIE VERGESSENEN\n\nSAGT UNSERE NAMEN"
 cstorms.2265.c.resp: "$cstorms.2265.desc$"
 cstorms.2265.d: "Wo können wir eure Namen finden?"
 cstorms.2265.e: "Zeigt uns diese Feier."
 cstorms.2270.name: "$cstorms.2260.name$"
 cstorms.2270.desc: "ES IST EINE FEIER\n\nES IST EINE FEIER\n\nSCHMERZ | WUT | TRAUER | ANGST\n\nFEIER\n\nSAGT UNSERE NAMEN"
 NAME_adSul: "adSul"
 project_adakkaria_benevolent_grounds: "Wohlwollender Boden"
 project_adakkaria_benevolent_grounds_DESC: "Wir entschlüsselten die Koordinaten der adAkkaria-Heimatwelt.\n\nDie Erforschung des Systems und des Planeten könnte uns mehr über das Schicksal der adAkkaria-Konvention lehren."
 #Celebration
 site_adakkaria_celebration: "Institut der Feierlichkeiten"
 site_adakkaria_celebration_intro: "Nach der Kommunikation mit dem kosmischen Sturm wurde ein kleiner Teil von adSul enthüllt. Zwischen den verbliebenen Wolken stand ein massiver Komplex. Verlassen, aber seltsamerweise unbeeinflusst von der Zeit. Erste Scans enthüllten organisches Material im Inneren.\n\nVor dem riesigen Gebäude erhoben sich eine Reihe von Bannern mit dem immer gleichen Motto: Es ist Zeit für eine Feier!"
 cstorms.2285.name: "Erzwungene Nichtigkeit"
 cstorms.2285.desc: "Die leeren Hallen des Instituts der Feierlichkeiten enthüllten nichts weiter als Staub, der sich im Lauf der Zeit angesammelt hat. Die Propagandaplakate, die die Tapferkeit der adAkkaria-Konvention auf ewig verherrlichten, waren alles, was von diesem einst blühenden und gefürchteten Imperium geblieben ist.\n\nUnsere Sprachkenntnisse machten sich jedoch bezahlt. Die Sicherheit war eher nebensächlich, und der Mainframe gab seine Geheimnisse leicht preis.\n\nDie daraus gewonnenen Protokolle waren bis zur letzten Übertragung der Propagandastation voller Aktivitäten.\n\nAn diesem Tag hörte die adAkkaria-Konvention des Wohlwollens einfach auf zu existieren."
 cstorms.2290.name: "Abstieg zu den Verdammten"
 cstorms.2290.desc: "Mit einem Hauch von Angst und Neugier drangen wir tiefer in die unterirdischen Ebenen vor, wo uns ein weitläufiges, gründlich durchgeplantes Netz von Laboratorien begrüßte. Unsere Einheit wurde in zwei Gruppen aufgeteilt: Die eine Hälfte sollte die Laboratorien untersuchen, um mehr über den Zweck des Instituts der Feierlichkeiten zu erfahren. Die andere sollte tiefer vordringen.\n\nEs dauerte nicht lange, bis wir das zuvor durch unsere Scanner registrierte organische Material fanden: Die unteren Ebenen bestanden ausschließlich aus Beobachtungszellen. Die mumifizierten sterblichen Überreste von adAkkaria-Bürgern waren noch immer in diesen engen Räumen eingesperrt. Eine digitale Schnittstelle neben jeder Kammer verriet den Namen des Insassen, die Phase der Studie, der er unterzogen wurde, sowie die Anmerkungen der Beobachter.\n\nFolgende Nachricht ließ sich wiederherstellen:\n§LUnser Probelauf im Haliios-System war ein komplettes Desaster. Der anfängliche Einsatz des als §ShaToor Gailon§! bekannten Probanden verlief wie geplant. Als wir jedoch mit den barbarischen Kräften der Solphani konfrontiert wurden, verlor der Proband die Kontrolle. Obschon der Sturm die primitiven Armeen auslöschte, wurden auch unsere dezimiert.\n\nEs ist anzumerken, dass diese Probanden allem voran böse und gestört sind. Je früher der Sturmbeschwörer einsatzfähig ist, desto besser.§!"
 cstorms.2290.a: "Was haben sie hier nur gemacht?"
 cstorms.2290.a.gen: "So viel Tod ... Inspirierend!"
 cstorms.2295.name: "Eine Art Feier"
 cstorms.2295.desc.start.authgen: "Die von der adAkkaria-Konvention durchgeführten Experimente waren faszinierend. Jeder Gefangene war Teil einer bestimmten Phase, und mit zunehmenden Phasen nahm auch die Brutalität der Behandlung zu. Einige wenige, besonders innovative Methoden stechen hervor: die Nutzung von Feuer und Elektrizität, um den psionischen Aufbau des Körpers anzukurbeln; die Entfernung essenzieller Organe, um im Entstehen begriffene Kräfte und die Verwendung anderer Sinne zu provozieren; und die Anwendung bewusstseinsverändernder Substanzen, um eine Nahtoderfahrung herbeizuführen.\n\nWir müssen uns von diesen Methoden inspirieren lassen. Diese Experten auf ihrem Gebiet arbeiteten auf ein nachvollziehbares Ziel hin, nämlich die Vormachtstellung der adAkkaria-Konvention in der Galaxie.\n\nDennoch deuten die Berichte zugleich darauf hin, dass es möglicherweise nicht diese Behandlung war, die die Probanden tötete. Ähnlich wie §ShaToor Gailon§! scheinen viele von ihnen einfach aufgegeben zu haben."
 cstorms.2295.desc.start.default: "Die Angst und die Verwirrung, die sich bei unserem Erkundungsteam breitmachte, als es die Leichen sah, waren entmutigend. Doch es stärkte auch unseren Wunsch, den vollen Umfang und den Zweck dieser Experimente zu verstehen.\n\nIn einem kräftigen und emotionslosen Ton berichteten die adAkkarianischen Wissenschaftler, welche Experimente sie an ihren Probanden durchgeführt hatten. Jedem Proband wurde eine Phase zugewiesen, und mit zunehmenden Phasen nahm auch die Brutalität der Behandlung zu. Feuer, Elektrizität, Verstümmelungen, die Abschaltung bestimmter Sinne sowie Nahrungsentzug - nichts war zu grausam für sie. Alles für die glorreiche Mission, die Vormachtstellung der AdAkkarianer in der Galaxie aufrechtzuerhalten. Die Berichte deuten jedoch auch darauf hin, dass diese grausame Folter nicht für das Ableben der Probanden verantwortlich gewesen war. Ähnlich wie bei §ShaToor Gailon§! scheinen viele einfach aufgegeben zu haben."
 cstorms.2295.desc.end.default: "Nur kurz nach diesen Beobachtungen klappte [Root.GetLeaderName] zusammen. Zwischen Schmerzensschreien brachte [Root.GetLeaderName] hervor, etwas versuche, [Leader.GetHerHis]en Verstand aufzubrechen!\n\nFür den Moment konnte [Leader.GetSheHe] stabilisiert werden, aber es scheint ganz so, als hätte ein eindringendes Wesen versucht, [Leader.GetHerHim] eine radikale Einsicht zu vermitteln. [Root.GetLeaderName] möchte es noch einmal versuchen und glaubt, diese Erfahrung werde letzten Endes eine tiefgreifende Erklärung liefern."
 cstorms.2295.desc.end.psionic: "Während [Root.GetLeaderName] die Leichen begutachtete, begann [Leader.GetHeShe], ein seltsames Flüstern zu hören - eine körperlose Stimme, die mit großer Sehnsucht zu [Leader.GetHimHer] sprach:\n§LWir waren stets loyal! Wir schworen der Konvention unsere Treue geschworen und glaubten an die Mission.\nDoch die Stürme riefen uns immer wieder aufs Neue. Sie verschlangen uns! Begehrten uns!\nWir taten, was sie wollten. Wir waren talentiert, und wir waren hartnäckig!\nSie sagten, wir seien böse und stempelten uns als Verräter ab. Sie töteten unsere Freunde!\n\nDIES SOLLTE EINE FEIER SEIN!§!\n\nDas Flüstern führte uns zu einem Korridor mit der Aufschrift \"Die letzte Phase\". Doch die fortschrittlichen Sicherheitsmaßnahmen gaben uns keinen Zugriff."
 cstorms.2295.desc.end.psionic_individual_robot: "Während [Root.GetLeaderName] die Leichen analysierte, fing [Leader.GetHeShe] eine Übertragung auf:\n§LWir waren stets loyal! Wir schworen der Konvention unsere Treue und glaubten an die Mission.\nDoch die Stürme riefen uns immer wieder aufs Neue. Sie verschlangen uns! Begehrten uns!\nWir taten, was sie wollten. Wir waren talentiert, und wir waren hartnäckig!\nSie sagten, wir seien böse, und stempelten uns als Verräter ab. Sie töteten unsere Freunde!\n\nDIES SOLLTE EINE FEIER SEIN!§!\n\nDie Übertragung führte uns zu einem Korridor mit der Aufschrift \"Die letzte Phase\". Doch die fortschrittlichen Sicherheitsmaßnahmen erlaubten uns keinen Zugriff."
 cstorms.2295.desc.end.psionic_gestalt: "Während wir die Leichen begutachteten, überkam das Kollektiv erneut eine Stimme, die durch [Root.GetLeaderName] als Form der Kommunikation kanalisiert wurde:\n§LWir waren stets loyal! Wir schworen der Konvention unsere Treue und glaubten an die Mission.\nDoch die Stürme riefen uns immer wieder aufs Neue. Sie verschlangen uns! Begehrten uns!\nWir taten, was sie wollten. Wir waren talentiert, und wir waren hartnäckig!\nSie sagten, wir seien böse, und stempelten uns als Verräter ab. Sie töteten unsere Freunde!\n\nDIES SOLLTE EINE FEIER SEIN!§!\n\nDie Stimme führte uns zu einem Korridor mit der Aufschrift \"Die letzte Phase\". Doch die fortschrittlichen Sicherheitsmaßnahmen erlaubten uns keinen Zugriff."
 cstorms.2295.desc.end.gestalt: "Innerhalb der kognitiven Prozesse unserer [controller.GetIndividualNamePlural] kam es zu weiteren merkwürdigen Störungen. Sie lösten Gedanken aus, die nicht unsere eigenen waren. Durch sie erfuhren wir, dass die Probanden des Instituts durch nicht-physische Mittel miteinander sprachen. Sie erreichten eine nahezu sofortige Übertragung, die einem im Entstehen begriffenen Schwarmbewusstsein ähnelte.\n\nObwohl wir den genauen Wortlaut nicht entschlüsseln konnten, war der Zweck umso klarer. Im Institut der Feierlichkeiten braute sich eine Revolte zusammen."
