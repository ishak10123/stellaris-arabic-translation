 storm_repellent_allow: "$TRIGGER_FAIL$Kann nicht gebaut werden, wenn es im System ein §YSturrmanziehungsgebäude§! gibt"
 storm_attracting_allow: "$TRIGGER_FAIL$Kann nicht gebaut werden, wenn es im System ein §YSturrmabwehrgebäude§! gibt"
