 solar_storm_aftermath_modifier_severity_desc: "Der $solar_storm$ und die damit verbundenen extrem hohen Strahlungswerte erfordern einen nahezu permanenten Lockdown. Angesichts der stark eingeschränkten Lebensräume ist es zwar wesentlich einfacher geworden, die Bevölkerung des Planeten zu kontrollieren, aber sie ist auch zunehmend verzweifelter geworden."
