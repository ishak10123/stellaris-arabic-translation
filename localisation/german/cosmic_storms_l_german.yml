 cstorms.2000.b.tt.allow: "Benötigt eins der folgenden Dinge:$TABBED_NEW_LINE$$TRIGGER_FAIL$$approach_situation_initiate_storm_agitate$$TABBED_NEW_LINE$$t$$TRIGGER_FAIL$Hat die Technologie £physics£ \"§Y$tech_basic_science_lab_3$§!\"$TABBED_NEW_LINE$$t$$TRIGGER_FAIL$$must_have_access_to_volatile_motes_tt$$TABBED_NEW_LINE$$TRIGGER_FAIL$$approach_situation_initiate_storm_destabilize$$TABBED_NEW_LINE$$t$$TRIGGER_FAIL$Hat die Technologie £physics£ \"§Y$tech_mine_dark_matter$\"§!$TABBED_NEW_LINE$$TRIGGER_FAIL$$approach_situation_initiate_storm_scramble$$TABBED_NEW_LINE$$t$$TRIGGER_FAIL$Hat die Technologie £physics£ \"§Y$tech_hyper_drive_3$§!\"$TABBED_NEW_LINE$$t$$TRIGGER_FAIL$$must_have_access_to_rare_crystals_tt$"
 cstorms.2000.c: "Brecht das Projekt ab."
 cstorms.2010.name: "Sturmkalibrierung"
 cstorms.2010.desc_irradiate_only: "Die Vorbereitungen für die Entfesselung des kosmischen Sturms im §H[target.solar_system.GetName]§!-System haben ein kritisches Stadium erreicht. Der nächste Schritt, die Manipulation der Sonnenwinde von §H[target.GetName]§!, erfordert intensive Konzentration sowie neue Ressourcen, wird aber schließlich den gewünschten §Y$solar_storm$§! hervorbringen."
 cstorms.2010.desc_others: "Die Vorbereitungen für die Entfesselung des kosmischen Sturms im §H[target.solar_system.GetName]§!-System haben ein kritisches Stadium erreicht. Die nächste Phase ist entscheidend und erfordert intensive Konzentration und den gezielten Einsatz von Ressourcen."
 cstorms.2010.a: "Verstärkt die Sonnenwinde."
 cstorms.2010.a.tt: "$approach_situation_initiate_storm_irradiate_tt$\nKostet $@irradiate_alloy_upkeep|0$ $r_alloys$ monatlich, $@default_monthly_progress$ Fortschritt/Monat"
 cstorms.2010.b: "Durchtrennt die Elektronenfelder."
 cstorms.2010.b.tt: "$approach_situation_initiate_storm_sever_tt$\nKostet $@sever_energy_upkeep|0$ $r_energy$ monatlich, $@default_monthly_progress$ Fortschritt/Monat"
 cstorms.2010.c: "Magnetisiert die Ionen."
 cstorms.2010.c.tt: "$approach_situation_initiate_storm_magnetize_tt$\nKostet $@magnetize_mineral_upkeep|0$ $r_minerals$ monatlich, $@default_monthly_progress$ Fortschritt/Monat"
 cstorms.2010.d: "Gebt das Projekt auf."
 cstorms.2015.name: "$cstorms.2010.name$"
 cstorms.2015.desc_one_tech_only: "Die Vorbereitungen für die Entfesselung des kosmischen Sturms im §H[target.solar_system.GetName]§!-System haben ein kritisches Stadium erreicht. Die nächsten Schritte erfordern intensive Konzentration seitens [storm_researcher.GetName] sowie neue Ressourcen, um den aufgeblähten Zustand von [target.GetName] zu nutzen."
 cstorms.2015.desc_others: "Die Vorbereitungen für die Entfesselung des kosmischen Sturms im §H[target.solar_system.GetName]§!-System haben ein kritisches Stadium erreicht. Die nächsten Schritte, die [storm_researcher.GetName] unternehmen wird, sind von entscheidender Bedeutung und erfordern den gezielten Einsatz von Ressourcen, um den aufgeblähten Zustand von [target.GetName] für unsere Zwecke zu nutzen."
 cstorms.2015.a: "Wühlt die Partikel auf."
 cstorms.2015.a.tt: "$approach_situation_initiate_storm_agitate_tt$\nKostet $@rare_resource_upkeep|0$ $r_volatile_motes$ monatlich, $@default_monthly_progress$ Fortschritt/Monat"
 cstorms.2015.b: "Destabilisiert das Gravitationsfeld."
 cstorms.2015.b.tt: "$approach_situation_initiate_storm_destabilize_tt$\nKostet $@rare_resource_upkeep|0$ $r_dark_matter$ monatlich, $@default_monthly_progress$ Fortschritt/Monat"
 cstorms.2015.c: "Zerstreut den Sternenstaub."
 cstorms.2015.c.tt: "$approach_situation_initiate_storm_scramble_tt$\nKostet $@rare_resource_upkeep|0$ $r_rare_crystals$ monatlich, $@default_monthly_progress$ Fortschritt/Monat"
 cstorms.2015.d: "$cstorms.2010.d$"
 cstorms.storm_gathered.final_word: "Die Macht des kosmischen Sturms unter Kontrolle zu bringen, war keine leichte Aufgabe, doch wir können endlich die lang ersehnten Früchte unserer Arbeit ernten."
 cstorms.storm_gathered.a: "Hervorragende Arbeit!"
 cstorms.2020.name: "Den Sturm entfesseln"
 cstorms.2020.desc: "Die intensiven Solarwinde von §H[target.GetName]§! haben einen kritischen Punkt erreicht.\n\nWir stehen kurz davor, einen §Y$solar_storm$§! zu entfesseln.\n\n$cstorms.storm_gathered.final_word$"
 cstorms.2025.name: "$cstorms.2020.name$"
 cstorms.2025.desc: "Das Elektronenfeld von §H[target.GetName]§! wurde vollständig durchtrennt.\n\nWir stehen kurz davor, einen §Y$electric_storm$§! zu entfesseln.\n\n$cstorms.storm_gathered.final_word$"
 cstorms.2030.name: "$cstorms.2020.name$"
 cstorms.2030.desc: "Die Ionen von §H[target.GetName]§! wurden erfolgreich magnetisiert.\n\nWir stehen kurz davor, einen §Y$magnetic_storm$§! zu entfesseln.\n\n$cstorms.storm_gathered.final_word$"
 cstorms.2035.name: "$cstorms.2020.name$"
 cstorms.2035.desc: "Die Partikel von §H[target.GetName]§! haben ihren Sättigungspunkt erreicht.\n\nWir stehen kurz davor, einen §Y$particle_storm$§! zu entfesseln.\n\n$cstorms.storm_gathered.final_word$"
 cstorms.2040.name: "$cstorms.2020.name$"
 cstorms.2040.desc: "Das Gravitationsfeld von §H[target.GetName]§! wurde erfolgreich destabilisiert.\n\nWir stehen kurz davor, einen §Y$gravity_storm$§! zu entfesseln.\n\n$cstorms.storm_gathered.final_word$"
 cstorms.2045.name: "$cstorms.2020.name$"
 cstorms.2045.desc: "Der Sternenstaub von §H[target.GetName]§! wurde vollständig zerstreut.\n\nWir stehen kurz davor, einen §Y$celestial_storm$§! zu entfesseln.\n\n$cstorms.storm_gathered.final_word$"
 ### Aftermath Deposits ###
 d_magnetic_storm_1_minerals: "Magnetisiertes Erz"
 d_magnetic_storm_1_minerals_desc: "Ein vorbeiziehender kosmischer Sturm hat zahlreiche unerschlossene Mineralvorkommen magnetisiert und den Bergbaubetrieben den Zugang zu diesen neuen Ressourcen deutlich erleichtert."
 d_magnetic_storm_2_alloys: "Sturmgeschmiedete Gießerei"
 d_magnetic_storm_2_alloys_desc: "Ein vorbeiziehender kosmischer Sturm hat diesen Planeten verwüstet, aber auch eine beachtliche Anzahl von Gießereien aufgeladen. Wir verstehen das Prinzip dahinter noch nicht gänzlich, doch es hat unsere Legierungsproduktion deutlich verbessert."
 d_magnetic_storm_3_mix: "Himmelsplateaus"
 d_magnetic_storm_3_mix_desc: "Diese Landmassen wurden durch die Gravitationswirkung eines vorbeiziehenden kosmischen Sturms magnetisiert und können direkt über bestehende Industriekomplexe manövriert werden."
 cstorms.8000.title: "Kosmische Landumformung"
 cstorms.8000.desc: "Ein vorbeiziehender kosmischer Sturm hat mehr als nur Verwüstung hinterlassen. Auf [Planet.GetName] ist ein völlig neues geografisches Merkmal entstanden."
 cstorms.8000.a: "Faszinierend."
 d_electric_storm_1_engineering: "Vom Blitz getroffene Ruinen"
 d_electric_storm_1_engineering_desc: "Ein vorbeiziehender kosmischer Sturm hat eine einst blühende Siedlung in eine von Blitzen getroffene Ruine verwandelt und gewöhnliche Baumaterialien in seltene und ungewöhnliche Zusammensetzungen umgewandelt."
 d_electric_storm_2_unity: "Planetare Narbe"
 d_electric_storm_2_unity_desc: "Ein vorbeiziehender kosmischer Sturm hat den Planeten so stark verwüstet, dass eine vom Weltraum aus sichtbare Narbe zurückgelassen wurde."
 d_electric_storm_3_physics: "Stille Armada"
 d_electric_storm_3_physics_desc: "Ein vorbeiziehender kosmischer Sturm hat die Navigationssysteme zahlreicher Zivilschiffe zerstört und die am stärksten betroffenen Gebiete in gespenstische Friedhöfe verwandelt."
 d_particle_storm_1_society: "Sturmzerstörte Vororte"
 d_particle_storm_1_society_desc: "Der kosmische Sturm hat einige unserer Vororte in Ruinen verwandelt. Diese nicht länger bewohnbaren Regionen können nur noch dazu genutzt werden, um die Folgen von Stürmen zu untersuchen."
 d_particle_storm_2_unity: "Der Große"
 d_particle_storm_2_unity_desc: "Der kosmische Sturm hat auf dieser Welt einen gewaltigen Krater hinterlassen, eine brutale Erinnerung an die kosmische Gleichgültigkeit gegenüber unserer Existenz."
 d_particle_storm_3_motes: "Instabile Ebenen"
 d_particle_storm_3_motes_desc: "Der kosmische Sturm hat die tektonischen Platten der Ebenen destabilisiert, doch mit der zunehmenden Gefahr ist auch die Menge an flüchtigen Teilchen gestiegen."
 particle_storm_aftermath_1_tt: "Geschwindigkeit (Robotermontageanlagen): §R-40%§!\n£minerals£ §YMineralien§! von Jobs: §R-10%§!\n£volatile_motes£ §YFlüchtige Teilchen§! von Bewohnern: §G+0.02§!"
 particle_storm_aftermath_2_tt: "Geschwindigkeit (Robotermontageanlagen): §R-50%§!\n£minerals£ §YMineralien§! von Jobs: §R-20%§!\n£volatile_motes£ §YFlüchtige Teilchen§! von Bewohnern: §G+0.04§!"
 particle_storm_aftermath_3_tt: "Geschwindigkeit (Robotermontageanlagen): §R-60%§!\n£minerals£ §YMineralien§! von Jobs: §R-30%§!\n£volatile_motes£ §YFlüchtige Teilchen§! von Bewohnern: §G+0.06§!"
 d_solar_storm_1_energy: "Zerstörte Ozonschicht"
 d_solar_storm_1_energy_desc: "Der kosmische Sturm hat ein Loch in die Ozonschicht der planetaren Atmosphäre gerissen. Dies hat zwar die Lebensqualität stark in Mitleidenschaft gezogen, aber auch die Produktion erhöht."
 d_solar_storm_2_districts: "Verstrahltes Hochland"
 d_solar_storm_2_districts_desc: "Der kosmische Sturm hat das Hochland dieser Welt verstrahlt und damit einen idealen Ort für unsere Energieproduktion geschaffen."
 d_solar_storm_3_output: "Leuchtende Wüste"
 d_solar_storm_3_output_desc: "Der kosmische Sturm hat die gesamte Wüste zum Leuchten gebracht - ein tödlicher Anblick, der sich jedoch mit ausreichenden Sicherheitsmaßnahmen in ein wirtschaftlich rentables Touristenziel verwandeln lässt."
 d_celestial_storm_1_mines: "Kristalline Stachel"
 d_celestial_storm_1_mines_desc: "Ein verheerender vorbeiziehender kosmischer Sturm hat scharfkantige, gezackte Kristalle zurückgelassen. Diese stellen zwar eine Gefahr für jeden dar, der sie berührt, sie könnten allerdings auch äußerst profitabel sein."
 d_celestial_storm_2_society: "Historische Ablagerungen"
 d_celestial_storm_2_society_desc: "Ein vorbeiziehender kosmischer Sturm hat ganze Sedimentschichten weggesprengt und dabei Spuren einer längst vergangenen Zeit freigelegt, die wir bisher nicht untersuchen konnten."
 d_celestial_storm_3_crystal: "Sternenstaubdünen"
 d_celestial_storm_3_crystal_desc: "Ein vorbeiziehender kosmischer Sturm ist wie eine gewaltige Welle über diese Welt hinweggefegt und ließ eine himmlische Landschaft aus glitzernden Sternenstaubdünen zurück."
 celestial_storm_aftermath_1_tt: "Planetare Kriminalität: §R+10%§!\n£food£ §YNahrung§! durch Jobs: §R-10%§!\n£rare_crystals£ §YSeltene Kristalle§! von Bewohnern: §G+0.02§!"
 celestial_storm_aftermath_2_tt: "Planetare Kriminalität: §R+20%§!\n£food£ §YNahrung§! durch Jobs: §R-20%§!\n£rare_crystals£ §YSeltene Kristalle§! von Bewohnern: §G+0.04§!"
 celestial_storm_aftermath_3_tt: "Planetare Kriminalität: §R+30%§!\n£food£ §YNahrung§! durch Jobs: §R-30%§!\n£rare_crystals£ §YSeltene Kristalle§! von Bewohnern: §G+0.06§!"
 d_gravity_storm_1_districts: "Verdichtete Ebenen"
 d_gravity_storm_1_districts_desc: "Die erdrückende Gravitation eines vorbeiziehenden kosmischen Sturms hat Land verdichtet, das zuvor als zu instabil für eine Bebauung galt, und der Sturm hat so neuen Bauplatz geschaffen."
 d_gravity_storm_2_unity: "Pulverisierte Denkmäler"
 d_gravity_storm_2_unity_desc: "Ein vorbeiziehender kosmischer Sturm hat enormen Druck auf einige unserer zerbrechlichen Denkmäler ausgeübt und sie zu Staub verwandelt - es ist eine demütige Erinnerung an jene furchterregenden Kräfte, die uns dort draußen erwarten."
 d_gravity_storm_3_engineering: "Gravitationshöhlen"
 d_gravity_storm_3_engineering_desc: "Ein vorbeiziehender kosmischer Sturm hat die Schächte einiger unserer Bergbaukomplexe zum Einsturz gebracht und das Material verdichtet. Unsere Versuche, sie wieder zu öffnen, haben zwar neue Theorien im Ingenieurswesen und in Sachen Bohrungen hervorgebracht, doch kaum Fortschritte zur Wiederherstellung der Minen erzielt."
 d_shroud_storm_1_society: "Schleierparasiten"
 d_shroud_storm_1_society_desc: "Ein vorbeiziehender kosmischer Sturm hat unseren Viehbestand mit Parasiten infiziert. Diese Tiere sind zwar jetzt zwischen unserer Wirklichkeit und dem Schleier phasenverschoben, haben sich aber als essbar, gesund und überraschend lecker erwiesen."
 d_shroud_storm_2_zro: "Zro-Felder"
 d_shroud_storm_2_zro_desc: "Ein vorbeiziehender kosmischer Sturm hat die einst grünen Biome dieses Planeten in instabile Zro-Felder verwandelt. Dabei handelt es sich jedoch um einige der reichsten Vorkommen, die wir je gefunden haben."
 d_shroud_storm_3_happy: "Wesen aus dem See"
 d_shroud_storm_3_happy_desc: "Ein vorbeiziehender kosmischer Sturm hat uns ein sonderbares, aber wundersames Geschenk hinterlassen. Die Wellen des größten Gewässers auf diesem Planeten bilden nun Muster und Symbole, denen eine Bedeutung zugesprochen werden kann und die in der Lage sind, Fragen mit überraschender Weisheit zu beantworten."
 ### Shroud Storm Events
 shroud_switched: "Schleierverborgen"
 shroud_switched_tt: "Ein natürlicher Schleier liegt über diesem Himmelskörper und deutet entweder auf einen tiefen Riss oder die Folgen eines katastrophalen Schleiersturms hin."
 cstorms.8510.title: "Psionischer Austausch"
 cstorms.8510.desc: "Nach einem gewaltigen psionischen Ausbruch wurde [from.GetName] mit einer Welt der Kategorie \"[from.GetClassName]\" ausgetauscht."
 cstorms.8510.a: "Ein merkwürdiges Schicksal."
 cstorms.8515.title: "Massenverformung"
 cstorms.8515.desc: "Eine Welle psionischer Energie ist über [from.GetName] hinweggefegt und hat Teile der Bevölkerung in einer Weise verändert, die den Naturgesetzen zu trotzen scheint. Ganze Gruppen wurden in ihrer Gestalt verändert und sind für uns nun fremd und ungewohnt. Es ist fast so, als sei ihr innerster Kern von einem Wesen umgeschrieben worden, das unsere Vorstellungskraft übersteigt."
 cstorms.8515.a: "Unbekannte Mächte sind am Werk ..."
 cstorms.8520.title: "Sternenverformung"
 cstorms.8520.desc: "Eine Welle psionischer Energie hat [from.GetName] umgeformt und in einen völlig neuartigen Stern verwandelt. Jetzt wirft eine Welt der Kategorie \"[from.GetClassName]\" ihr unheilvolles Licht auf das [from.solar_system.GetName]-System. Es wirkt fast so, als sei die Wirklichkeit selbst verändert worden."
 cstorms.8520.a: "Selbst die Sterne sind nicht sicher ..."
