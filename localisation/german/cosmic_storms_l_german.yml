 MESSAGE_STORM_AFTERMATH_DESC: "§H$PLANET$§! meldet anhaltende atmosphärische Störungen."
 electric_storm_aftermath_custom_desc: "Der §Y$electric_storm$§! hat die Produktion verlangsamt, aber die Energieproduktion erhöht."
 particle_storm_aftermath_custom_desc: "Der §Y$particle_storm$§! hat korrosive Partikel auf dem Planeten zurückgelassen."
 gravity_storm_aftermath_custom_desc: "Ein vorbeiziehender §Y$gravity_storm$§! hat Gravitationsanomalien auf einer unserer Kolonien zurückgelassen."
 magnetic_storm_aftermath_custom_desc: "Infolge des vorbeiziehenden §Y$magnetic_storm$s§! berichtet unsere Kolonie von elektromagnetischen Störungen in den Polarregionen."
 solar_storm_aftermath_custom_desc: "Der §Y$solar_storm$§! hat eine gefährlich hohe Strahlung auf dem gesamten Planeten zurückgelassen."
 celestial_storm_aftermath_custom_desc: "Der §Y$celestial_storm$§! hat den gesamten Planeten mit einer dicken Schicht kosmischen Staubs bedeckt."
