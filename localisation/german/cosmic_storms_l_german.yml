 ### Green Skies
 site_green_skies: "Grüner Himmel"
 site_green_skies_intro: "Unsere Scanner haben eine Reihe faszinierender Signale aus dieser Region des Planeten empfangen. Aufgrund ihrer Zusammensetzung ist es sehr wahrscheinlich, dass dort die Überbleibsel einer uralten Zivilisation nur darauf warten, von uns entdeckt zu werden."
 cstorms.1400.name: "Eine kuriose Kollage"
 cstorms.1400.desc: "In der Nähe unseres Basislagers wurde eine Reihe seltsamer Stadtruinen entdeckt.\n\nDie Architektur weist Merkmale jeder Zivilisation auf, der wir bisher begegnet sind - einschließlich unserer eigenen!\n\nDie materielle Zusammensetzung ähnelt jedoch der unseres Basislagers bei der Errichtung der Kolonie. Das ist seltsam, weil diese Materialien niemals mehrere Jahrzehnte überdauern würden und schon gar nicht so lange, um das Alter zu erklären, das unsere Scanner für diese Ruinen ermittelt haben.\n\nEs ist unwahrscheinlich, dass diese Ruinen zu einer der mysteriösen Vorläufer-Zivilisationen gehören, doch unsere Scanner liefern immer dasselbe Ergebnis. Was geht hier nur vor sich?"
 cstorms.1405.name: "Verwitterte Lage"
 cstorms.1405.desc: "Die Signale führten zu einem Pfad in die unteren Ebenen der Ruinenstadt. In der Regel verfügen archäologische Stätten dieser Art über irgendeine Form von unterirdischem Transportnetz oder eine Reihe von Sicherheitsbunkern. Stattdessen fanden wir ein kleines Höhlensystem vor, das mit Stoffresten, Polymerbehältern und sogar organischen Abfällen übersät war. Offenbar sind wir nicht die Ersten, die diese archäologische Stätte erkunden.\n\nNoch besorgniserregender jedoch ist, dass [Root.GetLeaderName] davon berichtete, dass sich der Himmel grünlich färbt, was darauf hinweist, dass sich ein kosmischer Sturm im Inneren von [Fromfrom.getName] bildet. Dennoch setzt unser Erkundungstrupp die Suche fort und kommt dem Ursprung der Signale immer näher."
 cstorms.1410.name: "Torheit"
 cstorms.1410.desc: "Unser Fortschritt wurde kurzzeitig durch eine Reihe schwer beschädigter Metalltüren gestoppt. Mit etwas Aufwand arbeiteten wir uns aber auch an diesem Hindernis vorbei und gelangten in ein rudimentäres Lager.\n\nDie Regale waren bis zum Rand mit einer Auswahl abgenutzter technologischer Gerätschaften gefüllt. Kisten bekannter Unternehmen wurden sorgfältig an den Wänden gestapelt. Und schließlich fanden wir auch die Quelle der Signale: ein Transponder, der unseren eigenen nicht unähnlich war.\n\nAls wir uns mit dem Gerät verbanden und die Datenbanken durchsuchten, zogen unsere [Root.Owner.GetEngineerPlural] eine wilde Schlussfolgerung: Das Signal wurde absichtlich so konstruiert, dass es so mysteriös und faszinierend wie möglich erscheint - indem es Eigenschaften anderer Zivilisationen nachahmt und kombiniert.\n\nDarüber hinaus fanden wir in den Kisten Bausätze für jene Ruinen, auf die wir an der Oberfläche gestoßen waren.\n\nWir konnten keinen Kontakt zum Basislager herstellen, um über den Fund zu berichten. Der kosmische Sturm wütet bereits und stört die Kommunikation. Das Letzte, was wir von [Root.GetLeaderName] hörten, war eine beunruhigende Abfolge von Befehlen. Offenbar greift man unser Basislager an!"
 cstorms.1410.a: "Bereitet unsere Antwort vor!"
 cstorms.1415.name: "Piraten!"
 cstorms.1415.desc: "Der kosmische Sturm in [Fromfrom.getName] verbarg eine Piratenflotte, die unser Basislager angriff. Die Piraten baten uns, diese Nachricht weiterzuleiten:\n\n§L\"Narren!\n\nIst es nicht erstaunlich, wie schnell scheinbar intelligente Wesen sämtliche Vernunft aufgeben, wenn sie auch nur die entfernteste Möglichkeit wahrnehmen, uralte Artefakte oder Relikte zu finden? Hattet Ihr gehofft, mit ihnen einen großen Feind zu besiegen? Oder Eure Flotten so weit zu vergrößern, dass sie über den Ereignishorizont hinausreichen? Oder habt Ihr nur versucht, Euresgleichen zu Hilfe zu eilen? Wie drollig.\n\nBitte fühlt Euch nicht schlecht dabei - viele andere kamen vor Euch, und unser Geschäftsmodell hängt davon ab, dass noch viele weitere in Eure Fußstapfen treten.\n\nFür die bescheidene Summe von 2000 Energie-Credits geben wir Euch etwas zurück, was Ihr verloren habt.\n\nSolltet Ihr unser Angebot ablehnen ... Nun ja, wer weiß, was für schreckliche Dinge [Leader.getName] und [Leader.getHisHer]er schlecht bewaffneten Crew zustoßen könnten, die immer noch auf dem Planeten gefangen sind.\n\nEntscheidet mit Bedacht, aber entscheidet schnell.\"§!\n\nVorerst sind wir in diesen Höhlen sicher, aber wer weiß wie lange. Sollen wir uns diesen Banditen fügen?"
 cstorms.1415.a: "Wir werden bezahlen."
 cstorms.1415.b: "Sagt ihnen, dass sie in der Unendlichkeit verrotten können!"
 cstorms.1415.b.tt: "[Root.GetLeaderName] wird als Geisel genommen."
 cstorms.1416.name: "Widerstand"
 cstorms.1416.desc: "Wir haben eine neue Nachricht erhalten:\n\n§L\"Zu schade. Wir hätten viele lustige Dinge mit diesen Ressourcen anstellen können.\n\nWir werden Euren Anführer und [Leader.getHisHer]e Crew darüber informieren, dass ihr Leben den Aufwand oder die Credits nicht wert war. Vielleicht ist ein Sklavenhändler oder ein sehr motivierter Assimilator an ihnen mehr interessiert. Wir hörten, das Abklemmen von Nerven ist der neueste Schrei.\"§!\n\nWir haben alles genutzt, was wir finden konnten, um uns zu verbarrikadieren, und es gibt genug Vorräte, um für eine Weile zu überleben. Irgendwann wird die Piratenflotte jedoch unsere Verteidigung durchbrechen!"
 cstorms.1420.name: "Wir werden uns nicht erneut täuschen lassen"
 cstorms.1420.desc: "Diese Piraten konnten ihre überschwänglichen Reden nicht mit Können untermauern. Es dauerte nicht lange, bis das, was von ihrer Flotte übrig war, Teil des galaktischen Ökosystems wurde.\n\nBald darauf stellten wir den Kontakt mit der Crew an der Oberfläche wieder her. Sie war von der Erfahrung ziemlich erschüttert, erlitt aber keinen Schaden.\n\nObwohl wir hier keine Einblicke in alte Zivilisationen fanden, sind wir jetzt zumindest wachsamer als zuvor. Der Expeditionsleiter erkannte die drohende Gefahr nicht - wir werden nicht den gleichen Fehler machen."
 cstorms.1420.a: "Das sollte uns allen eine Lehre sein."
 cstorms.1420.b: "Dieser Anführer wird uns niemals wieder enttäuschen."
 cstorms.1425.name: "Die Freude, Geschäfte zu machen"
 cstorms.1425.desc: "Wir haben eine Antwort erhalten:\n\n§L\"Eine wunderbare Entscheidung, wenn man das so sagen darf!\n\nEuer Beitrag zu unserem 'Fonds für benachteiligte Unternehmer, die einen Resort-Planeten brauchen' ist eingegangen.\n\nDer Anführer mitsamt seiner Crew wird schon bald in Euren Besitz übergehen.\n\nUnd bitte empfehlt uns bei all Euren Handelspartnern weiter.\"§!\n\nKurz nachdem die Nachricht beendet war, konnten wir den Kontakt zu unserem Oberflächenteam wiederherstellen. Es war von der Erfahrung ziemlich erschüttert, erlitt aber keinen Schaden.\n\nObwohl wir hier keine Einblicke in alte Zivilisationen finden konnten, sind wir jetzt zumindest wachsamer als zuvor. Der Expeditionsleiter erkannte die drohende Gefahr nicht - wir werden nicht den gleichen Fehler machen."
 cstorms.1425.a: "$cstorms.1420.a$"
 cstorms.1425.b: "$cstorms.1420.b$"
 NAME_green_skies_pirate_country: "Das Resort"
 NAME_green_skies_pirate_fleet: "Exzentrische Unternehmer"
 KILL_EXILED_LEADER_EFFECT: "$LEADER$ wurde aufgrund von Inkompetenz getötet."
 FREE_HOSTAGED_LEADER_EFFECT: "$LEADER$ ist zurückgekehrt."
 green_skies_outcome_modifier: "Wir sind gegenüber drohenden Gefahren jetzt wachsamer."
