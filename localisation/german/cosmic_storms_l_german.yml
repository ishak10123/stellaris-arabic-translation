 #Eye of the Storm
 cstorms.1801.name: "Das Auge des Sturms"
 cstorms.1801.desc: "Unsere Scanner registrieren Unregelmäßigkeiten im Auge von [fromfrom.GetName] - jenem Sturm, der in [from.GetName] wütet. Sie deuten auf eine seltsame Masse im Zentrum hin. Die ungewöhnlichen Messwerte sollten genauer untersucht werden, bevor sich der Sturm auflöst oder das System verlässt."
 EYE_OF_THE_STORM_PROJECT: "$cstorms.1801.name$"
 EYE_OF_THE_STORM_PROJECT_DESC: "Erste Scans von [fromfrom.GetName] - dem Sturm, der in [this.GetName] wütet - deuten auf eine gewaltige Masse im inneren Wirbel hin. Unsere Langstreckensensoren konnten keine schlüssige Antwort auf dieses ungewöhnliche Phänomen liefern. Eine Feldexpedition in das Auge des Sturms ist notwendig, um unser Verständnis zu verbessern."
 cstorms.1805.name: "Im Auge des Sturms"
 cstorms.1805.desc: "Als [leader.GetName] in das Auge des Sturms in [from.GetName] navigierte, fand [leader.GetSheHe] rasch die Ursache für die von unseren Scannern aufgezeichneten Unregelmäßigkeiten. Dieser ungewöhnliche Sturm bezieht seine Energie aus einer riesigen Menge an [from.star.GetEarnedResources].\n\nUnser Forschungsschiff hat so viele Proben wie möglich gesammelt, bevor es gewaltsam aus dem Sturm geschleudert wurde. Die Sensordaten, die man während des knappen Entkommens aufzeichnete, werden unseren Ingenieuren dabei helfen, die Leistung des Schiffs unter extremen Sturmbedingungen zu verbessern."
 cstorms.1805.desc.traumatized: "Leider hatte dieses Wagnis bleibende Folgen für [leader.GetName]."
