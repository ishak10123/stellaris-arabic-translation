 #Ascension Perk
 ap_weather_control: "Galaktische Wetterkontrolle"
 ap_weather_control_desc: "Die jüngsten Fortschritte in der Astrometeorologie erlauben es uns, kosmische Stürme auf unseren Befehl hin zu manifestieren. Mit der richtigen Technologie können wir sogar die Art des Sturms wählen, die erschaffen werden soll."
