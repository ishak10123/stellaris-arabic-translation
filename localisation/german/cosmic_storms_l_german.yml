 cstorms.2295.a: "Erlaubt es [Root.GetLeaderName], tiefer einzutauchen."
 cstorms.2295.b: "Verbietet es [Root.GetLeaderName], sich weiter damit zu beschäftigen."
 cstorms.2295.a.psionic: "Ihre Opfer weinen noch immer."
 cstorms.2295.a.psionic_gestalt: "Ihre vereinten Stimmen klagen noch immer voller Schmerz."
 cstorms.2295.a.gestalt: "Zwietracht ist der Samen des Chaos."
 cstorms.2300.name: "Und alles ist gesagt"
 cstorms.2300.desc: "Wir haben hart daran gearbeitet, den letzten Abschnitt des Patriotischen Instituts der Feierlichkeiten freizulegen. Inzwischen hat uns ein verwirrender Bericht aus den unteren Laboren erreicht. Die adAkkaria-Wissenschaftler behaupteten, in jedem einzelnen Wesen, vielleicht sogar in empfindungsfähigen Maschinen, existiere ein \"Funke\". Vom Ausbruch kosmischer Stürme inspiriert nannten sie diese Kraft den \"Inneren Sturm\": ein Strudel aus Verlangen und Macht, der alles empfindungsfähige Leben antreibt. Indem man den Inneren Sturm extremen Erfahrungen aussetzt, lässt sich eine große Macht entfesseln.\n\nWährend seiner Zeit als Kriegsgefangener war §SalAtta Landeer§! der Erste, der dies entdeckte. Als Wissenschaftler überzeugte er das Erhabene Kommando davon, weitere Studien im Institut der Feierlichkeiten zu finanzieren. Obwohl die Protokolle keine Informationen darüber enthalten, was mit §SLandeer§! geschehen ist, wissen wir aus den Ereignissen auf dem Schiffsfriedhof, dass er ein tragisches Schicksal erlitten haben muss.\n\nWeitere Berichte beziehen sich auf eine \"effizientere\" Art und Weise, den Inneren Sturm zu entfesseln - ein Mittel, das keine extreme körperliche Grausamkeit erforderte, sondern sich stattdessen auf das Auslösen eines unausweichlichen und tödlichen Schreckens im Geist des Opfers verließ. Um diesem Effekt in großem Maßstab auszulösen, plante die Konvention, ein Signal über ihr ausgedehntes Netzwerk von Propagandastationen auszusenden."
 cstorms.2300.desc.psionic: "Wir haben es geschafft, das psionische Flüstern auf den Beobachtungsdecks aufzuzeichnen:\n\n§LLasst mich raus! Bitte! Ich war immer ein anständiger Bürger!\nMeine Träume sind nur noch ein endloser Sturm. Er ruft nach mir.\nIch verstehe das nicht. Wir haben alles getan, was ihr wolltet - warum tut ihr uns das an?\nIn uns allen schlummert eine Kraft. Ihr wollt diese Macht nutzen. Wir dürfen sie euch nicht überlassen.\nUnsinn! Es ist zur Rettung der Konvention des Wohlwollens. Wir müssen ihre Anweisungen befolgen.\nDie Satelliten flüstern mir zu. Ich kann mit meinem Bewusstsein jetzt die ganze Galaxie erreichen!\nIch habe gesehen, dass sie etwas entwickelt haben. Etwas, was dies jedem antun kann. Überall.\nWir werden gerettet werden. Gebt ihnen einfach, was sie wollen!\nDu verstehst nicht ... Wenn sie uns das antun, werden sie es allen antun!\nWir könnten uns selbst befreien.\nAber das bedeutet, dass wir ...\nSie werden uns sowieso umbringen. Sobald dieses Ding funktionsfähig ist. Sie werden uns alle umbringen!\nIch habe Angst. Ich will nicht sterben. Ich will leben. Bitte.\nDie letzte Phase spricht zu mir. Sie will wissen, ob wir zustimmen.§!"
 cstorms.2300.b: "Diese Macht muss uns gehören."
 cstorms.2300.a.psionic: "Was für ein trauriges Ende."
 cstorms.2300.a.psionic_hive_robot: "Ein bedauerliches Ergebnis."
 cstorms.2300.b.psionic: "Nichts ist edler als ein Opfer!"
 cstorms.2300.b.psionic_hive_robot: "Ein würdiges Opfer."
 cstorms.2305.name: "Der Sturmbeschwörer"
 cstorms.2305.desc.start: "Wir haben einen riesigen Hangar entdeckt. Eine unglaublich komplexe Konstellation aus Drähten, Rohren und Elektronik nahm fast den gesamten Raum ein - alles führte zu einem massiven, wenn auch leeren Raketensilo. Seinen Dimensionen nach zu urteilen, ließ sich hier ein Objekt unterbringen, das so groß wie eine Korvette war.\n\nDie Aufzeichnungen beschreiben, dass an diesem Ort eine Maschine mit der Bezeichnung \"§lSturmbeschwörer\"§! zusammengebaut und diese dann erfolgreich im adSul-System zum Einsatz gebracht wurde. Der Kontakt zum Sturmbeschwörer ging scheinbar verloren, doch die §GStromversorgung§! ist noch funktionsfähig."
 cstorms.2305.desc.end.default: "Als unsere Crew den Namen las, wurde sie von einem irrationalen Gefühl der Wut überwältigt und begann, Kabel und Verkleidungen herauszureißen. Es brauchte mehr als einen einfachen Befehl, um sie zu beruhigen. Wir kommen der Wahrheit immer näher!"
 cstorms.2305.desc.end.psionic: "Als [Root.GetLeaderName] der leeren Konstruktion näher kam, kehrte das psionische Flüstern zurück.\n§LIhr seht es, nicht wahr? Zuerst wussten wir nicht, was sie bauten. Wir wussten nicht, dass sie uns loswerden wollten. Einige wollten Rache. Einige von uns wollten frei sein. Einige spürten den Ruf der Stürme. Es musste aufhören, versteht Ihr? Wir mussten es tun. Wir konnten es nicht länger ertragen.§!"
 cstorms.2305.desc.end.gestalt: "Als wir den Namen der Apparatur lasen, stellten unsere für die Erkundung zuständigen [controller.GetIndividualNamePlural] fest, wie der §lSturmbeschwörer§! aktiviert und mit welcher Methode sein Signal durch die vielen Propagandastationen gelenkt wurde, bis es schließlich sein Ziel erreichte.\n\nUnd wir waren nicht immun gegen dieses Schicksal."
 cstorms.2305.desc.default: "$cstorms.2305.desc.start$\n\n$cstorms.2305.desc.end.default$"
 cstorms.2305.desc.psionic: "$cstorms.2305.desc.start$\n\n$cstorms.2305.desc.end.psionic$"
 cstorms.2305.desc.gestalt: "$cstorms.2305.desc.start$\n\n$cstorms.2305.desc.end.gestalt$"
 cstorms.2310.name: "Die letzte Phase"
 cstorms.2310.desc.start: "Das Institut der Feierlichkeiten hat uns endlich das letzte seiner Geheimnisse enthüllt: die letzte Phase.\n\nIn den Fluren lagen ausgetrocknete Leichen des adAkkaria-Personals auf dem Boden verstreut, zerrissen von Steinen, Metall, Kunststoffen und anderem Müll. Etwas hatte in diesen Korridoren gewütet und alles und jeden dezimiert.\n\n"
 cstorms.2310.desc.piece.default: "Doch das wahre Grauen sollte noch kommen."
 cstorms.2310.desc.piece.authgen: "Doch die wahre Freude sollte noch kommen."
 cstorms.2310.desc.end: "\nEin halbes Dutzend Wesen war hier in Zellen eingesperrt. Die Bildschirme beschrieben sie als \"§GEnergieversorgung des Sturmbeschwörers§!\". Es handelte sich bei ihnen eindeutig um junge Bürger der Konvention, deren kleine Körper an Dutzenden von Rohren und Kabeln angeschlossen waren. Die Flüssigkeit in den Zellen hielt sie in einem Zustand zwischen Leben und Tod. Ihre Körper waren von einer Kraft umgeben, die der gemessenen Energie innerhalb des anhaltenden Sturms im adSul-Systems ähnelte.\n\nDie wenigen noch funktionsfähigen Bildschirme erwachten zum Leben und zeigten jeweils eine einzige Aufforderung:\n§LERINNERT EUCH AN UNS | SAGT UNSERE NAMEN | SAGT UNSERE NAMEN.§!\n\nWir haben die Namen aufgezeichnet. Der letzte ließ uns jedoch innehalten: §SenRida Direen§!, jenes Individuum vom Erhabenen Wohlwollen, das ein Feuer nur mit bloßen Gedanken gelöscht hatte.\n\nMit diesen Namen ausgestattet sollten wir in der Lage sein, den kosmischen Sturm erneut zu kontaktieren."
 cstorms.2310.desc.default: "$cstorms.2310.desc.start$ $cstorms.2310.desc.piece.default$ $cstorms.2310.desc.end$"
 cstorms.2310.desc.authgen: "$cstorms.2310.desc.start$ $cstorms.2310.desc.piece.authgen$ $cstorms.2310.desc.end$"
 cstorms.2310.a: "Hervorragende Arbeit!"
 #The Storm's Swansong
 cstorms.2320.name: "Der Sturm"
 cstorms.2320.desc: "SAGT UNSERE NAMEN\n\nSAGT UNSERE NAMEN\n\nSAGT | UNSERE | NAMEN"
 cstorms.2320.a: "Wir haben gesehen, was euch die Konvention angetan hat."
 cstorms.2320.b: "Was ist mit der adAkkaria-Konvention passiert?"
 cstorms.2320.c: "Wo ist der Sturmbeschwörer?"
 cstorms.2320.d: "Wir kennen eure Namen."
 cstorms.2320.a.resp: "SIE WOLLTEN NICHT AUFHÖREN\n\nSCHMERZ UND WUT UND TRAUER UND ANGST\n\nES WAREN ZÄHNE\nES WAREN KIEFER\nSIE VERSCHLANGEN UNS UND SPUCKTEN UNS AUS\n\nSIE BRACHTEN SCHMERZ UND WUT UND TRAUER UND ANGST\n\nWIR ÜBERDAUERTEN WIR ÜBERKAMEN WIR WURDEN\n\nSCHMERZ UND WUT UND TRAUER UND ANGST"
 cstorms.2320.b.resp: "GUTMÜTIG UND RECHTHABERISCH UND GNADENLOS\nSTOLZ | GRAUSAM | GETRIEBEN\nBRINGEN TOD BRINGEN LEID\n\nWIR MUSSTEN MUSSTEN MUSSTEN MUSSTEN MUSSTEN MUSSTEN MUSSTEN MUSSTEN\nSEIN | NICHT SEIN | GEWESEN SEIN\n\nWIR\nREISEN DURCH DIE ÜBERTRAGUNG | KORRUMPIEREN DAS SIGNAL | KORRUMPIEREN DEN VERSTAND\nWHITEOUT | GREYOUT | BLACKOUT | DER DUNKELHEIT HINGEBEN\nZWISCHEN DEN STERNEN VERSTREUT UND NIE WIEDER GESEHEN"
 cstorms.2320.c.resp: "WIR\nSIND EIN SCHILD | SCHÜTZEN EUCH\n\nWIR\nFORMTEN EINE WIEGE | LEGTEN EUCH IN DIE WIEGE\n\nUND SCHAUKELTEN SIE IN DIE VERGESSENHEIT | SCHLAF SCHLAF SCHLAF VERGEHE\n\n§lSTURM§! §RABSCHEULICHKEIT§!\nUND NIEMALS WIEDER AUFWACHEN"
 cstorms.2325.desc: "SAGT UNSERE NAMEN | SAGT UNSERE NAMEN | SAGT UNSERE NAMEN\n\nJETZT §g(JETZT)§! JETZT §g(JETZT)§!\n\nSAGT UNSERE NAMEN | SAGT UNSERE NAMEN | SAGT UNSERE NAMEN\n\nSAGT | UNSERE | NAMEN | JETZT"
 cstorms.2325.d: "In Ordnung. Eure Namen sind ..."
 cstorms.2330.desc: "§LWir rezitieren alle Namen, die wir bei unseren Ausgrabungen fanden. Als wir den letzten aussprechen, verstummt der Sturm.§!"
 cstorms.2330.a: "Seid ihr noch da?"
 cstorms.2335.desc: "Wir können wieder denken! §g(denken denken denken)§!\nSo viele Stimmen um uns herum §g(denkend, sprechend, wünschend, träumend)§!\nSo viele einzigartige Individuen §g(ihr und ich und sie)§!\n\nIhr habt uns unsere Vernunft zurückgegeben §g(reisend entschlüsselnd erforschend)§!\nUnd dennoch habt ihr jetzt, wo ihr unsere Namen gesprochen habt, die Kontrolle §g(Nein, nicht schon wieder!)§!\nWas wollt ihr von uns? §g(lasst uns gehen lasst uns gehen lasst uns gehen lasst uns gehen)§!"
 cstorms.2335.a: "Es ist an der Zeit, dass ihr frei seid."
 cstorms.2335.b: "Unterwerft euch und übergebt uns den Sturmbeschwörer!"
 cstorms.2340.desc: "Frei.\n\nIhr wollt uns gehen lassen? §g(Frei?)§!\n\nUnmöglich. §g(Es ist unmöglich.)§!\nIhr könnt das nicht so meinen. §g(Was ist mit dem Sturmbeschwörer?)§!"
 cstorms.2340.a: "Wir werden ihn vernichten."
 cstorms.2345.desc: "Schmerz und Wut und Trauer und Angst. §g( SCHMERZ | WUT | TRAUER | ANGST )§!\n\nDas war alles, wofür wir jemals gut waren.\n\nDAS IST ALLES WOFÜR WIR JEMALS GUT WAREN SCHMERZ WUT TRAUER ANGST\n§gSCHMERZ WUT TRAUER ANGST SCHMERZ WUT TRAUER ANGST SCHMERZ WUT TRAUER ANGST WUR TRAUER ANGST SCHMERZ WUT TRAUER ANGST SCHMERZ WUT TRAUER ANGST SCHMERZ TRAUER ANGST SCHMERZ WUT TRAUER ANGST SCHMERZ WUT TRAUER ANGST SCHMERZ WUT ANGST SCHMERZ WUT TRAUER ANGST SCHMERZ WUT TRAUER ANGST SCHMERZ WUT TRAUER SCHMERZ WUT TRAUER ANGST SCHMERZ WUT TRAUER ANGST SCHMERZ WUT TRAUER ANGST WUT TRAUER ANGST SCHMERZ WUT TRAUER ANGST SCHMERZ WUT TRAUER ANGST SCHMERZ TRAUER ANGST SCHMERZ WUT TRAUER ANGST SCHMERZ WUT TRAUER ANGST SCHMERZ WUT ANGST SCHMERZ WUT TRAUER ANGST SCHMERZ WUT TRAUER ANGST SCHMERZ WUT TRAUER§!"
 cstorms.2345.a: "Wütet so viel ihr wollt, unsere ewigen Diener."
 cstorms.2350.name: "Kein Sturm mehr"
 cstorms.2350.desc: "Der Sturm schuf ein Loch in sich und enthüllte uns den §lSturmbeschwörer§!. Es ist seltsam, dass ein so kleiner Apparat derart begehrt war und zu so viel Streit und so vielen Opfern führte. Seine bloße Existenz löste den Untergang eines riesigen Imperiums aus.\n\nMit einem einfachen Satz von Befehlen aktivierten wir die Selbstzerstörungsroutine des Sturmbeschwörers. Als die Explosionen abebbten und die Trümmer über das gesamte System verstreut wurden, begann der Sturm abzuflauen. Zusammen mit dem Sturm verschwand auch jener seltsame Schleier, der die Heimatwelt der adAkkaria-Konvention bedeckte.\n\nDer lange Albtraum ist endlich zu Ende."
 cstorms.2350.a: "Mögen eure Namen für immer in Erinnerung bleiben."
 cstorms.2355.name: "Schmerz Wut Trauer Angst"
 cstorms.2355.desc: "Der Sturm tobte und brodelte in seiner ohnmächtigen Wut, doch er konnte uns oder dem §lSturmbeschwörer§! keinerlei Schaden zufügen.\n\nWir befahlen den Stimmen, die in ihm gefangen waren, uns einen Weg durch den Strudel zu eröffnen, und beanspruchten die größte Errungenschaft der Konvention für uns selbst.\n\nDie adAkkaria-Heimatwelt blieb jedoch unerreichbar: Der Weg zum Patriotischen Institut der Feierlichkeiten ist nun für immer versperrt. Doch die Schreie des Sturms blieben in unserem Bewusstsein fest verankert.\n\nSchmerz, Wut, Trauer und Angst.\nDie Galaxie wird diese Worte ebenfalls lernen."
 cstorms.2355.a: "Opfer müssen gebracht werden."
 MESSAGE_INSTITUTE_SPAWNED_STORM_TITLE: "Sturm beschworen"
 MESSAGE_INSTITUTE_SPAWNED_STORM: "§Y100§! £pop£ §HBewohner§! haben sich auf $PLANET$ selbst heraufbeschworen. Durch sie ist ein $STORM$ im $SYSTEM$-System entstanden."
 artifact_adakkaria_research: "Geheimnisse der adAkkaria"
 artifact_adakkaria_research_desc: "Taucht tiefer in die Geheimnisse der adAkkaria ein"
 artifact_adakkaria_research_completed: "$artifact_adakkaria_research$"
 artifact_adakkaria_research_completed_desc: "Wir konnten das uralte Wissen der adAkkaria für uns selbst nutzen."
 #Secrets of the adAkkaria Convention
 project_adakkaria_secrets_of: "Geheimnisse der adAkkaria-Konvention"
 project_adakkaria_secrets_of_DESC: "Es gibt noch so viel, was wir vom Institut der Feierlichkeiten lernen können. Sollen wir noch tiefer in die Experimente der adAkkarian-Konvention eintauchen?"
 cstorms.2365.name: "Entfesseltes Potenzial"
 cstorms.2365.desc.start: "Je eingehender wir uns mit der Forschung der adAkkaria-Konvention befassen, desto mehr wirkt es, als wären ihre Wissenschaftler keinem anerkannten Standard verpflichtet gewesen. Die Methodik war schlampig, die Schlussfolgerungen fast banal. Eine sorgfältige und penible Forschung wurde aufgegeben und Wahnsinn gefördert. Doch je grausamer ihre Versuche wurden, desto größer war das Lob ihres Erhabenen Kommandos.\n\nÄltere Forschungsberichte erzählten jedoch eine ganz andere Geschichte: Die Probanden wurden auf ihrem Weg zur Erweckung des \"Inneren Sturms\" gut behandelt und respektiert. Vergleicht man die Erfolgsraten zwischen früher und später Forschung, kommt man unweigerlich zu einer erschreckenden Schlussfolgerung: Es gab nie eine Korrelation zwischen dem Grad der Folter und der Anzahl an erwachten Individuen. Unzählige Probanden litten und starben umsonst."
 cstorms.2365.desc.end.default: "Wir verstehen jetzt das Prinzip hinter der Forschung, und wenn wir die richtigen Schlussfolgerungen aus der adAkkaria-Konvention ziehen, sollten wir in der Lage sein, unsere eigene Bevölkerung dazu zu ermutigen, ihren Inneren Sturm zu erwecken. Die größte Gefahr liegt darin, dass einige dieser §G$Name_Storm_Fused$en§! Individuen dem Ruf des Sturms folgen und schließlich selbst einen Sturm herbeibeschwören."
 cstorms.2365.desc.end.gestalt: "Unser Kollektiv versteht jetzt das Prinzip hinter der Forschung, und wenn wir die richtigen Schlussfolgerungen aus der adAkkaria-Konvention ziehen, sollte ein Teil von uns in der Lage sein, den eigenen Inneren Sturm zu erwecken. Die größte Gefahr liegt darin, dass einige der §G$Name_Storm_Fused$en§! Knoten dem Ruf des Sturms zu sehr folgen und schließlich selbst einen Sturm herbeibeschwören."
 cstorms.2365.desc.default: "$cstorms.2365.desc.start$\n\n$cstorms.2365.desc.end.default$"
 cstorms.2365.desc.gestalt: "$cstorms.2365.desc.start$\n\n$cstorms.2365.desc.end.gestalt$"
 cstorms.2365.a: "Beschäftigen wir uns mit diesem neuen Wissen. Ganz behutsam!"
 cstorms.2365.b: "Nein. Lasst diese Geheimnisse besser ruhen."
 cstorms.2365.a.tt: "- Die Wahrscheinlichkeit, dass §Y100§! £pop£ §HBewohner§! die Eigenschaft \"$Name_Storm_Fused$\" erhalten, wird vervierfacht.\n- Alle 20 Jahre besteht eine kleine Chance, dass §Y100§! £pop£ §HBewohner§! sterben und selbst zum Sturm werden.\n- Kultivierungspotenzial: +5% Zufriedenheit (Reichsmodifikator)"
 Name_Storm_Fused: "Sturmverschmolzen"
 Name_Storm_Fused_affix: "Sturmverschmolzen" #The trailing space is intentional, to give a space before the species name on the species screen
 ########################################
 #### Storm Chasers #
 ########################################
 origin_storm_chasers: "Sturmjäger"
 origin_storm_chasers_desc: "Es gibt keine Herausforderung, der sie sich nicht stellen, keine Spur, der sie nicht nachjagen - und keinen Sturm, den sie ignorieren.\n\nDiese Zivilisation ist ständig auf der Suche nach dem nächsten Nervenkitzel. Zu ihrem Vorteil, aber auch Nachteil."
 origin_tooltip_storm_chasers_effects: "- $LEADERS_TRAITS$ \"['concept_storm_rider']\"\n- Planetare $mod_planet_jobs_unity_produces_mult$ pro §YSturmgebäude§!: §G+$@storm_chasers_storm_building_unity_produces_mult|%0$§!\n- Hauptweltgebäude erhalten automatisch die Modifikatoren durch §YSturmschutzbunker§!, sobald die erforderliche Technologie erforscht wurde.\n- Chance, dass ein §Y$default_storm$§! innerhalb unserer Grenzen auftaucht: §G+100%§!\n- Chance für §YTechnologieoptionen der Kategorie Kosmischer Sturm§!: §G+175%§!\n- Zugang zum ['concept_weather_forecasting_mode']\n- $ADDITIONAL_TECHNOLOGIES_STRING$$TABBED_NEW_LINE$- £physics£ ['technology:tech_storm_prediction_1']"
 START_SCREEN_STORM_CHASERS: "Was ist ein Leben ohne den Rausch der Geschwindigkeit? Schnell ausbrennen und in einer Explosion vergehen: Das war schon immer unser Weg. Doch wenn jeder neue Pfad gefunden und selbst der höchste Gipfel erklommen ist, was dann?\n\nUnser Planet wurde schon immer von Stürmen und Überschwemmungen aller Art heimgesucht. Wenn wir einen Weg finden, diese einzigartigen Bedingungen zu nutzen, könnten wir lernen, selbst einen kosmischen Sturm heraufzubeschwören.\n\nUnsere legendären Vorfahren haben die Herausforderungen unserer Heimatwelt längst gemeistert. Es ist an der Zeit, dass auch wir in die kalte Leere springen. Es wird nicht einfach, aber wie ein altes Sprichwort sagt: \"Nur die Mutigen erreichen den Horizont!\""
 #Storm Rider Trait
 leader_trait_storm_rider_desc: "Sturmreiter suchen den ständigen Adrenalinrausch und erschließen ihr wahres Potenzial nur in den Wirbeln eines kosmischen Sturms. Ratsmitglieder erhalten Ratsboni statt Feldboni."
 mod_trait_storm_rider: "\n$t$Solange sich dieser Anführer in einem kosmischen Sturm befindet, sind die Boni seiner Eigenschaften erhöht."
 leader_trait_storm_rider_name: "Sturmreiter"
 leader_trait_storm_rider_commander: "$leader_trait_storm_rider_name$"
 leader_trait_storm_rider_commander_desc: "$leader_trait_storm_rider_desc$"
 leader_trait_storm_rider_scientist: "$leader_trait_storm_rider_name$"
 leader_trait_storm_rider_scientist_desc: "$leader_trait_storm_rider_desc$"
 leader_trait_storm_rider_official: "$leader_trait_storm_rider_name$"
 leader_trait_storm_rider_official_desc: "$leader_trait_storm_rider_desc$"
 #Storm Chasers specific Progress Events
 progress.2.desc.storm.normal: "Um es in den Worten unserer [Root.Owner.GetScientistPlural] auszudrücken: \"Seht Euch den an. Wahnsinn!\"\n\n$progress.2.desc.storm.outro$"
 progress.2.desc.storm.gestalt: "Wir sind so aufgeregt.\n\n$progress.2.desc.storm.outro$"
 progress.2.desc.storm.outro: "Fremde Lebensformen - genau hier auf [From.GetName]! Diese Wesen werden in absehbarer Zeit nicht zu uns sprechen, doch zumindest wissen wir, dass wir auf unserer Reise durch die Galaxie nicht allein sind.\n\nDie Galaxie könnte voller Leben sein!"
 progress.3.desc.storm.normal: "\"Unglaublich!\", rief [ruler.GetRegnalName]. \"Eine Welt voll neuer unfassbarer Möglichkeiten!\"\n\nWährend wir unser Kolonieschiff in ein Basislager umwandelten, rüsteten sich die ersten Entdecker bereits für das, was diese Welt für uns zu bieten hat."
 progress.3.desc.storm.gestalt: "Eine unglaubliche Entdeckung! Eine Welt voll neuer unfassbarer Möglichkeiten!\"\n\nWährend wir unser Kolonieschiff in ein Basislager umwandelten, rüsteten sich die ersten Entdeckerknoten bereits für das, was diese Welt für uns zu bieten hat."
 progress.3.a.storm: "Vorwärts!"
 progress.4.desc.storm: "Wir haben endlich eine Antwort aus der Stille des Weltraums erhalten! Eine fremde Zivilisation mit gleichwertiger Technologie - sie muss genau zur selben Zeit wie wir in die Weiten der Galaxie eingetaucht sein.\n\nIhr Auftauchen kündigt eine ganz neue Erfahrung für uns an. Kommen sie als Gleichgesinnte und Verbündete oder als Rivalen, die unseren Mut auf die Probe stellen? Was auch immer der Fall sein mag: Der Nervenkitzel des Unbekannten versetzt uns in Ekstase."
 progress.4.h.storm: "Höchst faszinierend."
 progress.5.desc.storm.normal: "Wir haben auf [From.Planet.GetName] beinahe vernunftbegabte Lebensformen entdeckt. Wie einer unserer [Root.Owner.GetScientistPlural] zu sagen pflegte: \"Diese Dinger mögen derzeit noch nicht nach viel aussehen, doch ihr Potenzial ist riesig!\"\n\nFür den Moment bleibt es jedoch dabei, dass sie nur beinahe vernunftbegabt sind. Es wird interessant sein, sie weiter zu beobachten und zu sehen, wie sich diese Geschöpfe entwickeln."
 progress.5.desc.storm.gestalt: "Wir haben auf [From.Planet.GetName] beinahe vernunftbegabte Lebensformen entdeckt.\n\nWir sind gespannt, was die Zukunft für sie bereithält. Es wird interessant sein, sie weiter zu beobachten und zu sehen, wie sich diese Geschöpfe entwickeln."
 progress.5.h.storm: "Wild."
 progress.6.desc.storm: "Wir haben in die Stille des Weltraums geschrien und endlich eine Antwort erhalten! Doch die anfängliche Euphorie ließ rasch nach. Dieses Volk teilte unseren Weg nicht und zieht es vor, für sich zu bleiben. Wir sollten uns vorerst zurückhalten."
 progress.6.h.storm: "Die werden uns mit der Zeit schon zu schätzen wissen."
 pirate.1.desc.storm: "Weltraumpiraten! Selbst der Gedanke daran ist ein Nervenkitzel, und eine Gruppe, die sich §S[pirate_band.GetName]§! nennt, hat uns ins Visier genommen.\n\nAuch wenn wir ihren Lebensstil respektieren, ist die Wirkung, die sie auf unsere Handelsnetze hat, weniger ideal."
 pirate.2.j.storm: "Höchst bedauerlich."
 ### STORMFALL SITUATION START ###
 situation_stormfall: "Sturmtief"
 situation_stormfall_type: "Ursprungssituation"
 situation_stormfall_desc: "Das erbarmungslose Wetter auf [owner.capital_scope.GetName] hat uns die berauschende Kraft der Stürme offenbart. Indem wir lernen, das Wetter auf dem Planeten zu beherrschen, können wir dieses Wissen in einem kosmischen Maßstab anwenden. Der Bau von Sturmanziehungsgebäuden wird unsere Fortschritte auf dem Weg zum ultimativen Sturm beschleunigen."
 situation_stormfall_monthly_change_tooltip: "Wir werden lernen, wie man diese Stürme beherrschen kann."
 situation_stormfall_outcome: "Die Geburt eines kosmischen Sturms."
 stage_stormfall_effects: "Wir müssen lernen, wie man kosmische Stürme manipulieren kann."
 #Approach Chill
 situation_stormfall_chill: "Kühl"
 approach_stormfall_chill_tt: "$situation_speed_tt$: §R-20%§!\nForschungsgeschwindigkeit: §YUnbeeinflusst§!"
 #Approach Balanced
