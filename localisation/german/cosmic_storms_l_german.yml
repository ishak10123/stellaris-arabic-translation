 #Storm in a Box
 cstorms.1816.name: "Umhertreibende Kapsel"
 cstorms.1816.desc: "Eine sonderbare Kapsel treibt durch das §H[this.GetName]§!-System. Sie verfügt über keinerlei Offensivfähigkeiten und antwortet nicht auf unsere Kommunikationsversuche.\n\nErste Scans haben gezeigt, dass die beschädigte Hülle aus fortschrittlichen Materialien besteht und mit uns unvertrauten Methoden gefertigt wurde. Eine genauere Untersuchung wird empfohlen."
 cstorms.1816.a: "Untersucht sie."
 STORM_IN_A_BOX_INVESTIGATE_PROJECT: "Untersuchung der Kapsel"
 STORM_IN_A_BOX_INVESTIGATE_PROJECT_DESC: "Eine mysteriöse und sichtlich beschädigte Kapsel treibt durch das §H[this.GetName]§!-System. Wir wissen weder wo sie herkommt noch welche Funktion sie hat. Sie besitzt keine offensichtliche Bewaffnung und wir glauben, eine weitere Analyse ihrer fortschrittlichen Konstruktion wäre ein sicheres und lohnendes Unterfangen."
 cstorms.1820.name: "Sturmfalle"
 cstorms.1820.desc: "[this.leader.GetName] glaubt, dass es sich bei der mysteriösen Kapsel, die durch das [solar_system.GetName]-System driftet, um eine uralte \"Sturmfalle\" handelt, die einst Teil eines größeren Verteidigungsnetzes gewesen sein könnte.\n\nDie Ansaugöffnung ist dicht verschlossen, doch die Messwerte deuten darauf hin, dass die Kapsel die komprimierte Energie und Materie eines gefangenen kosmischen Sturms enthält.\n\nSollten wir einen Weg finden, um dieses bemerkenswerte Behältnis zu öffnen, könnten wir viel über die Abschwächung von Stürmen lernen, wenn auch auf die Gefahr hin, dass die Kräfte, die die Kapsel in sich birgt, freigesetzt werden."
 cstorms.1820.a: "Wir können viel daraus lernen."
 cstorms.1820.b: "Viel zu gefährlich! Rührt sie nicht an!"
 STORM_IN_A_BOX_TRAP_PROJECT: "Öffnen der Sturmfalle"
 STORM_IN_A_BOX_TRAP_PROJECT_DESC: "Eine uralte \"Sturmfalle\", die einen komprimierten kosmischen Sturm in sich trägt, treibt ziellos durch den Raum. Sie zu öffnen, könnte uns wertvolle Einblicke dahingehend geben, wie man Stürme bekämpfen kann, wenn auch auf die Gefahr hin, dass die in der Kapsel gefangenen Kräfte freigesetzt werden."
 cstorms.1826.name: "Sturm freigesetzt"
 cstorms.1826.desc: "[leader.GetName] konnte die inneren Abläufe der Sturmfalle erfolgreich entschlüsseln und den Öffnungsmechanismus auslösen, woraufhin der darin gefangene §H[from.GetStormType]§! in die Leere des [solar_system.GetName]-Systems entlassen wurde.\n\nEine erste Untersuchung der Falle und ihrer äußerst komplexen Technologie hat zu faszinierenden Erkenntnissen über sturmsichere Materialien und Strukturen geführt, auch wenn wir noch immer nicht verstehen, wie die Vorrichtung in der Lage ist, Stürme vollständig einzufangen. Dieses neue Wissen wird uns dennoch dabei helfen, mit künftigen Stürmen fertigzuwerden."
 cstorms.1826.storm_tt: "Ein kleiner, schwacher §Y$default_storm$§! taucht im [solar_system.GetName]-System auf"
 storm_trap_insight_modifier: "Einblicke in Sturmfallen"
 storm_trap_insight_modifier_tt: "Reduziert die negativen Auswirkungen §Ykosmischer Stürme§! um §G10%§!."
 cstorms.1835.desc: "Unser herzliches Beileid, [this.GetSpeciesNamePlural]! Wir sahen zufälligerweise, wie ein gewaltiger Sturm [this.GetName] heimsuchte.\n\nNatürlich waren wir sehr traurig, als wir von den Schäden hörten, die dort entstanden sind. Und wir haben geweint. Viel geweint! Bitte erlaubt uns, Euch zu helfen ... mit einem besonderen und einmaligen Superangebot!\n\nWir können verschiedene Vorrichtungen und Apparaturen liefern. Nur das Beste! Damit seid Ihr beim nächsten Sturm gerüstet. Sind wir also im Geschäft?"
 cstorms.1835.a: "Wir akzeptieren."
 cstorms.1835.b: "Wir sind nicht interessiert."
