 gov_storm_chasers: "Ältestenrat"
 gov_storm_chasers_desc: "Die Mitglieder des durchlauchtesten Regierungsrates zeichnen sich besonders durch ihre körperlichen Fähigkeiten aus, dank derer sie selbst dem Tod trotzen. Sie erklimmen die höchsten Gipfel, reiten die größten Wellen und widmen ihr Leben dem ständigen Streben, Erfahrungen zu sammeln. Dadurch haben sie das Vertrauen der Gemeinschaft gewonnen, was ihnen das Recht einräumt, den weiteren Kurs zu bestimmen.\n\nRatsmitglieder werden unabhängig vom Alter \"Älteste\" genannt, da ihre Taten als legendär gelten. Man wird sich noch lange an ihre Namen erinnern."
