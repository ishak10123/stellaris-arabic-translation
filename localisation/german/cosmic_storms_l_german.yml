 ### Hold the Line
 site_hold_the_line: "Bleiben Sie dran"
 site_hold_the_line_intro: "Der vorbeiziehende kosmische Sturm hinterließ ein sonderbares Geschenk: einen Orbitalkomplex aus einem alten Habitat. Wir sollten ihn betreten und versuchen, ihn zu reaktivieren."
 cstorms.1275.name: "Brandneue Verwirrung"
 cstorms.1275.desc: "Obwohl der Orbitalkomplex vom kosmischen Sturm quer durch die Galaxie gezogen wurde, hat er kaum Schaden genommen. Wir fanden die Wohn- und Gewerbeflächen des Habitats in nahezu perfektem Zustand vor. Nicht ein einziges Staubkorn lag auf dem Boden, das darauf hingewiesen hätte, dass das Habitat jemals bewohnt worden wäre. Es war wie neu.\n\nIm Inneren des zentralen Steuerungszentrums begrüßte uns ein verwirrendes Eingabesystem: Zifferblätter ohne Erklärung, Hebel mit inkonsistenten Einstellungen und eine große Anzahl an Tasten, die in scheinbar zufälligen Intervallen in ganzen Farbspektren blinkten. Glücklicherweise stießen wir schließlich auf ein Handbuch. Wir sind zuversichtlich, das Habitat reaktivieren zu können, sobald unser Fund übersetzt wurde."
 cstorms.1280.name: "Manuelle Überbrückung"
 cstorms.1280.desc: "Leider scheint unsere bisherige Einschätzung sehr optimistisch gewesen zu sein: Das Handbuch erwies sich als ebenso unverständlich wie die Steuerung. Die Hälfte der Seiten schien zu fehlen und die Bildanweisungen ergaben für uns kaum Sinn, da sie viel semiotisches Spezialwissen voraussetzten. Die zweite Hälfte des Handbuchs ist in schwer zu interpretierenden Hieroglyphen geschrieben.\n\nAuf der letzten Seite wurde jedoch eine Kommunikationsfrequenz niedergeschrieben, begleitet von einer Reihe von Zeichen, die sich als \"Helpdesk\" übersetzen ließen. Wir versuchen es jetzt mit dieser Frequenz."
 cstorms.1285.name: "Ihr Anruf ist uns wichtig"
 cstorms.1285.desc: "Die Frequenz des Handbuchs verband uns mit der Hauptvermittlungsstelle einer kommerziellen Wesenheit, die als \"Himmelsgarten\" bekannt ist.\n\nMit einem freundlichen, aber neutralen Ton teilte uns die KI mit, sie wüsste unsere Anfrage zu schätzen, und sie hakte nach, ob es etwas gäbe, wobei sie uns helfen könne. Zu den aufgelisteten Optionen gehörten \"Beantwortung von Fragen zu Abonnements\" sowie \"Etwas über die neueste Baureihe intelligenter Verteidigungssysteme lernen\" und ob wir mehr über die \"Initiativen zur sozialen Verantwortung\" des Unternehmens erfahren wollten.\n\nDie weiterführenden Optionen brachten uns jedoch zu völlig unzusammenhängenden Themen. Schlimmer war allerdings, dass unsere [Root.Owner.GetEngineerPlural] des Öfteren in einer Warteschleife landeten, woraufhin der Anruf kurze Zeit später ganz abbrach. Offenbar hat die KI dem Zahn der Zeit nicht ganz so gut getrotzt wie der Rest des Habitats.\n\nUngeachtet dessen werden wir weiterhin versuchen, uns unseren Weg durch dieses verworrene System zu bahnen."
 cstorms.1290.name: "Ein Labyrinth an Optionen"
 cstorms.1290.desc: "Unsere [Root.Owner.GetEngineerPlural] berichten, dass das System nach dem Durchlaufen mehrerer Menüs einfach zu einer vorherigen Anweisung zurückkehrt, ganz egal, was man der KI auch sagt.\n\nSie führten bereits mehrere Simulationen durch, um den genauen Strukturbaum abzubilden, doch ihre Bemühungen ergaben rekursive Fehler. Selbst das Betreiben eines Quantenmodells erzielte keine wünschenswerten Ergebnisse. Sie vermuten, dass sie bei diesem Vorgang versehentlich einige Wellenfunktionen zum Zusammenbruch gebracht haben.\n\nWir sind ratlos."
 cstorms.1290.a: "Sagt der KI, dass sie §RZENSIERT§! und §RZENSIERT§! ist."
 cstorms.1290.b: "Haltet die Leitung offen und sagt nichts."
 cstorms.1290.c: "Drückt einfach alle Knöpfe."
 cstorms.1295.name: "Dem Protokoll folgen"
 cstorms.1295.desc.a: "Endlich ein Durchbruch! Die KI ermahnte uns, eine angemessene Sprache zu verwenden, und meinte, wir sollen warten, bis uns ein Kundendienstmitarbeiter kontaktiert.\n\n$cstorms.1295.desc.followup$"
 cstorms.1295.desc.b: "Endlich ein Durchbruch! Die KI war wegen unseres längeren Schweigens scheinbar verwirrt und wird uns an einen Kundendienstmitarbeiter weiterleiten.\n\n$cstorms.1295.desc.followup$"
 cstorms.1295.desc.c: "Endlich ein Durchbruch! Die KI ermahnte uns, nicht das Bedienfeld zu beschädigen, und meinte, wir sollen warten, bis uns ein Kundendienstmitarbeiter kontaktiert.\n\n$cstorms.1295.desc.followup$"
 cstorms.1295.desc.followup: "Wir mussten noch eine Weile in der Warteschleife verbringen, bevor die Kommunikationsleitung wieder geöffnet wurde. Das Wesen am anderen Ende stellte sich als Archivarin des Himmelsgarten-Konzerns vor. Der Helpdesk selbst war ein KI-Programm, das der vorherige Archivar erschaffen hatte. Soweit die Archivarin weiß, blieb die Kommunikationsstation seit der Insolvenz des Himmelsgartens vor vielen Jahrzehnten ungenutzt. Als wir fragten, warum sie weiterhin für eine bankrotte Organisation arbeitete, sagte sie einfach, es sei so in ihrem Vertrag festgelegt.\n\nWir erklärten unsere Situation, woraufhin die Archivarin eine alte Schnellstartanleitung für das Habitat suchte. Sie wird uns in Kürze die Seiten in digitaler Form übermitteln."
 cstorms.1300.name: "Jahre zu gewinnen, Sekunden zu verlieren"
 cstorms.1300.desc: "Mit dem neuen Handbuch in unserem Besitz war der Neustart des Habitats mit wenig Aufwand verbunden.\n\nAls der Lärm der sich aktivierenden Maschinen langsam nachließ, beschlossen wir, uns noch einmal an die Archivarin zu wenden, um ihr zu danken.\n\nSie sagte uns, sie habe einige Informationen über diese Station gefunden. Offenbar wurde sie vor über fünf Jahrhunderten als Prototyp gebaut, ging dann aber nach einem besonders schweren kosmischen Sturm im Chaos des Alls verloren. Der Verlust von Immobilien- und Entwicklungskosten reichte aus, um den Himmelsgarten in den Bankrott zu treiben.\n\nUns zu helfen, war die erste nützliche Aufgabe der Archivarin seit Jahren.\n\n\"Außerdem\", sagte sie, \"war es schön, die Stimme meiner Urgroßmutter wieder in der Leitung zu hören, auch wenn es nur eine KI war.\""
 ### Repowered Complex
 site_repowered_complex: "Mit Strom versorgte Anlage"
 site_repowered_complex_intro: "Nach dem kürzlichen §Y$electric_storm$§! wurde eine ungewöhnliche Energiespitze unter der Oberfläche von §H[From.Planet.GetName]§! gemessen. Weitere Scans offenbarten die Existenz einer uralten unterirdischen Anlage, deren Stromgeneratoren durch den Sturm reaktiviert wurden und die Einrichtung wieder hochgefahren haben."
 cstorms.1845.name: "Befestigter Eingang"
 cstorms.1845.desc: "Der Eingangsbereich der isolierten Anlage auf §H[From.Planet.GetName]§! ist ungewöhnlich robust gebaut. Der Komplex ist eindeutig auf Langlebigkeit ausgelegt und verfügt über eine schwere Panzerung, Strahlungsschilde sowie eine Reihe von Atmosphärensensoren. §H[Leader.GetName]§! ist der Meinung, die Anlage könne selbst den extremsten Bedingungen standhalten.\n\nErste Scans deuten darauf hin, dass hinter einer Reihe versiegelter Sicherheitstüren eine riesige Kammer liegt."
 cstorms.1850.name: "Schutzbunker"
 cstorms.1850.desc: "Nachdem man sich Zutritt zum Inneren verschafft hatte, schlussfolgerte §H[Leader.GetName]§!, dass es sich bei der Anlage um einen nie benutzten Schutzbunker handelt, der vor langer Zeit von einer uns unbekannten organischen Spezies errichtet wurde.\n\nDie Bunkeranlage verfügt über gut ausgestattete Wohnquartiere, Schlafkapseln, Freizeitbereiche und eine medizinische Station. In den Schränken auf jeder Etage befinden sich reichlich Vorräte, darunter ungeöffnete Nährstoffpakete, Batterien und Werkzeuge. Alles, was hier verbogen lag, ist in tadellosem Zustand.\n\nEinige der tieferen Sicherheitstüren konnten noch nicht geöffnet werden. Wir glauben, dass sie uns zum Kommandodeck der Anlage führen werden."
 cstorms.1850.a: "Macht weiter."
 cstorms.1855.name: "Das Deluxe-Schutzpaket"
 cstorms.1855.desc: "Das Kommandodeck der Anlage verfügt über eine beachtliche Menge an Monitoren, die mit Atmosphärensensoren auf der Oberfläche verbunden sind und §Ykosmische Stürme§! überwachen. Diese Konsolen enthalten auch historische Sturmdaten aus mehreren Jahrhunderten, die unser Verständnis über die Astrometeorologie erheblich verbessern werden.\n\nBei der weiteren Durchsuchung fand §H[Leader.GetName]§! zudem einen kleinen Holo-Projektor. Bei der Aktivierung wurde das 3-D-Abbild eines Molluskoiden unter dem Logo eines Konzerns ausgestrahlt, der ein Verkaufsgespräch führte und die wichtigsten Merkmale der Anlage vorstellte.\n\nOb dieser Schutzbunker jemals einen Käufer gefunden hat, lässt sich nicht sagen."
 cstorms.1855.desc.megacorp: "Unsere Marketingabteilung analysiert bereits, was sie falsch gemacht haben."
 ###############################
 #### The Weather Manipulators #
 ###############################
 STORMS_PREC_WM_ONE: "Uralter Untergrundkomplex"
 STORMS_PREC_WM_ONE_DESC: "Wir haben mehrere verborgene unterirdische Bauwerke auf [From.Planet.GetName] entdeckt, die alle sehr alt zu sein scheinen. Wir sollten diese Gelegenheit nutzen und sie untersuchen."
 cstorms.105.name: "Uralte Bunker"
 cstorms.105.desc: "Bei [From.Planet.GetName] im [From.GetStarName]-System handelt es sich um die Ruinenwelt eines uralten Reichs, dessen Name verloren ging. Die für uns interessanten unterirdischen Bauten sind zwar ebenso alt, aber relativ intakt.\n\nDie Sonarresonanztomografie wies auf ein komplexes unterirdisches Labyrinth von Lager- und Schutzräumen hin, die den Naturgewalten standhalten sollten. Die Zerstörung an der Oberfläche ist zweifellos eine Folge kosmischer Stürme, was auch die Existenz dieser Zuflucht erklären würde.\n\nDie Menge an Trümmern macht es jedoch schwierig, weitere Untersuchungen durchzuführen. Eine archäologische Ausgrabungsstätte könnte uns mehr Informationen liefern."
 #arcsite The Ancient Storm Shelters
 site_weathermanipulators_the_ancient_storm_shelters: "Uralte Bunker"
 site_weathermanipulators_the_ancient_storm_shelters_intro: "Eine Zuflucht, die unter den Trümmern einer von Stürmen verwüsteten Welt begraben liegt. Die Verwüstung macht die Erforschung schwierig, aber das Innere scheint größtenteils intakt zu sein."
 cstorms.110.name: "Nichts als Staub und Verwüstung"
 cstorms.110.desc: "Als sich unser Forschungsteam dem Bunkerkomplex vom Boden aus näherte, entdeckte es eine kleine Öffnung unter zwei eingestürzten Türmen, durch die das schwache Leuchten von noch arbeitenden Maschinen zu sehen war.\n\nDie Öffnung bot unseren [Root.Owner.GetScientistPluralDE1] einen Anhaltspunkt, mithilfe dessen sie die Größe des Komplexes bestimmen und möglicherweise einen Weg finden können, um ihn zu öffnen, ohne seine empfindliche strukturelle Integrität noch weiter zu gefährden.\n\nDie Ruinen weisen alle Schäden wie von einem kosmischen Sturm auf. Seltsamerweise gibt es jedoch keinerlei Anzeichen dafür, dass die Bewohner der Stadt versucht hätten, sich vor ihm zu schützen.\n\nEs scheint gar so, als hätten sie die Naturgewalt so lange wie möglich ertragen, nur um dann doch in großer Eile vor ihr zu fliehen. Vielleicht liegen die Antworten unter den Ruinen von [From.Planet.GetName]."
 cstorms.110.a: "Verstanden."
 cstorms.115.name: "Unter den Türmen"
 cstorms.115.desc: "Nachdem unser Ausgrabungsteam zahlreiche Schichten von Trümmern und Dreck entfernt hatte, war die Öffnung groß genug für unsere [Root.Owner.GetScientistPlural], um in den Bunker zu gelangen.\n\nDie Zuflucht ist einfach und zweckmäßig eingerichtet und viele der zahlreichen Nebenräume sind leer. Der Ort wirkt sogar schon fast zu spartanisch. Es scheint definitiv eine Art Zuflucht zu sein, doch er würde kosmischen Stürmen nicht standhalten. Die Wände sind zu dünn und bieten sehr wenig Halt, und die Decken und Böden sind nicht verstärkt. Es ist reines Glück, dass die Struktur noch intakt ist. Ohne die beiden Türme und den Erdrutsch wäre dieser \"Sturmschutz\" längst zerstört worden.\n\nDas von außen sichtbare Leuchten stammt von einigen fehlerhaften Alarmsystemen, und tiefer in den Schutzräumen wurden mehrere betriebsbereite Terminals gesichtet. Dies könnte eine gute Gelegenheit sein, um mehr über die früheren Bewohner dieser Einrichtung sowie die merkwürdigen Umstände zu erfahren, die wir hier beobachten."
 cstorms.120.name: "Von der Zeit gezeichnete Abschriften"
 cstorms.120.desc: "Die Terminals waren schwerer zu erreichen als erwartet, da unser Vorankommen teilweise durch Einbrüche behindert wurde. Manche der Trümmer waren jünger, was auf ein kritisches strukturelles Versagen hindeutet, das durch unsere Ankunft ausgelöst wurde. Wir sollten Vorsicht walten lassen.\n\nBedauerlicherweise geben die uralten Terminals ihre Geheimnisse nicht so einfach preis, da alles in einer längst verlorenen Sprache aufgezeichnet wurde. Wir können zumindest die intergalaktischen Kommunikationsprotokolle nutzen, die in der Benutzeroberfläche zurückgelassen wurden. Zusammen mit den restlichen physischen Medien, die im Bunker verstreut liegen, sollten wir in der Lage sein, eine einfache Übersetzung zu erstellen. Darüber hinaus gibt es noch weitere Räume, die untersucht werden sollten, solange die strukturelle Integrität noch gegeben ist."
 cstorms.120.a: "Geht mit äußerster Vorsicht vor."
 cstorms.120.b: "Wir sollten die Arbeit beschleunigen."
 cstorms.120.c: "Entschlüsselt die Terminals und lasst den Rest zurück."
 cstorms.125.name: "Versicherung von Vermögenswerten"
 cstorms.125.desc: "Die tiefer gelegenen Räume und Kammern sind bei Weitem nicht so leer wie der Eingangsbereich. Mit Waren gefüllte Kartons, alle sorgfältig verpackt, stapeln sich bis an die Decke. Erste Übersetzungen verweisen auf Rohmaterialien und unfertige elektronische Komponenten, die man beide nicht zum Überleben braucht. Die Liste enthält zudem genaue Mengenangaben zu den hier vorfindbaren Gegenständen sowie die prognostizierten Gewinne, die sie auf etwas namens \"Intergalaktisches Netzwerk für gleiche Handelsbedingungen\", kurz INET, erzielt hätten.\n\nDie Sprache, mit der diese riesige Handelsbörse beschrieben wird, ist geradezu ekstatisch und beinhaltet sorgfältige Notizen zu Transaktionen sowie aufgeschlüsselte Gewinnindizes. Scheinbar beruht auch der Name dieser untergegangenen Zivilisation auf dieser Handelsbörse, da ihre Mitglieder sich selbst \"Inetische Händler\" nannten.\n\nDiese Zuflucht wurde nicht zum Schutz der allgemeinen Bevölkerung errichtet, sondern war ein Warenlager, was die Frage aufwirft, warum ihre Unterkünfte so jämmerlich schlecht ausgestattet waren, um mit den Stürmen fertigzuwerden.\n\nWeitere Übersetzungen sollten uns mehr Erkenntnisse liefern, doch wir haben nur begrenzt Zeit, wie das beunruhigende Knarren der Infrastruktur vermuten lässt."
 cstorms.125.a: "Seid vorsichtig dort unten."
 cstorms.125.b: "Priorisiert die Übersetzung der Daten."
 cstorms.125.c: "Wir sollten die Untersuchungen unterstützen."
 cstorms.130.name: "Marktplatzmachenschaften"
 cstorms.130.desc: "Die knackenden und reißenden Geräusche werden immer lauter. Dennoch setzt unser Übersetzungsteam in dem unterirdischen Komplex auf [From.Planet.GetName] die Arbeit fort. Die gelagerten Waren gaben zwar kaum neue Erkenntnisse preis, doch die noch funktionierenden Terminals verrieten viel.\n\nEine Reihe verschlüsselter Koordinaten beschrieb die Position einer \"mächtigen\" Apparatur auf einem nahen Planeten. Soweit wir das nachvollziehen können, konnte diese Maschine einen kosmischen Sturm \"manipulieren\" - eine unglaubliche Behauptung, wenn sie denn wahr ist.\n\nAufgrund der immer weiter abnehmenden strukturellen Integrität haben wir den Standort evakuiert. Eine Kopie der Koordinaten wurde bereits an unser Schiff im Orbit übertragen. Viele Fragen bleiben unbeantwortet, doch die Jagd geht weiter."
 cstorms.130.a: "Wir dürfen uns diese Chance unter keinen Umständen entgehen lassen."
 #Special Project Descramble the Coordinates
 INETIAN_PROJECTS_01: "Entschlüsselung der Koordinaten"
 INETIAN_PROJECTS_01_DESC: "Wir konnten eine Reihe verschlüsselter Koordinaten von [wm_storm_shelter_planet.GetName] bergen, bevor der unterirdische Komplex einstürzte. Wir haben Grund zu der Annahme, dass eine der Koordinaten zu einer Maschine führen könnte, mit der die Inetischen Händler kosmische Stürme manipulierten. Diese Technologie könnte den Aufwand wert sein."
 #Special project completed
 cstorms.135.name: "Fruchtbares System"
 cstorms.135.desc: "Glücklicherweise konnten unsere [Root.Owner.GetScientistPlural] mit einem verschlüsselten Koordinatensatz aus dem einstürzenden unterirdischen Komplex auf [wm_storm_shelter_planet.GetName] entkommen. Die gefundenen Dateien ließen sich inzwischen wiederherstellen und markieren drei Orte, die wir erkunden sollten:\n\n[wm_digsite_A.GetName], [wm_digsite_B.GetName] sowie [wm_digsite_C.GetName]. Weitere Analysen deuten darauf hin, dass jeder dieser Planeten eine entscheidende Rolle im Inetischen Handelsnetzwerk gespielt haben muss. Warum sonst sollten sie im unterirdischen Komplex auf [wm_storm_shelter_planet.GetName] aufgezeichnet worden sein?"
 #Precursors Event Chain
 cs_inetian_chain_title: "Vorläufer - Die Inetischen Händler"
 cs_inetian_chain_desc: "Wir haben die Überreste einer uralten unterirdischen Anlage gefunden. Diese muss einer Zivilisation gehört haben, die vor Millionen von Jahren erblühte - eine Zivilisation, die in unseren Aufzeichnen keinerlei Erwähnung findet, als hätte man sie sorgfältig aus der Geschichte getilgt. Wir sollten dem weiter nachgehen, um das Warum dahinter zu klären."
 #Arcsite Coordinates A
 site_weathermanipulators_CoordinatesA_Residential_Planet: "Koordinaten A: Kolonisierter Planet"
 site_weathermanipulators_CoordinatesA_Residential_Planet_intro: "Einer der drei Koordinatensätze, die wir in der alten unterirdischen Anlage fanden, hat uns nach [From.Planet.GetName] geführt. Angesichts der schieren Größe der Ruinen ist klar, dass dieser Planet einst über zahlreiche Metropolen verfügt haben muss. Dies ist wahrscheinlich der Ort, an dem die Bevölkerung der Inetischen Händler vor Urzeiten lebte. Warum man diese Koordinaten sicher in einem Sturmschutzbunker verwahrte, muss untersucht werden."
 cstorms.140.name: "Religiöse Absichten"
 cstorms.140.desc: "Von den Städten auf [From.Planet.GetName] ist nicht mehr viel übrig. Neben dem Zahn der Zeit nagten auch zahlreiche Stürme an den beeindruckenden Bauwerken. Die verbleibende Architektur stimmt mit der auf [wm_storm_shelter_planet.GetName] überein und zeigt ebenfalls einen deutlichen Mangel an Katastrophenvorsorge trotz zahlreicher Hinweise auf die Auswirkungen von Naturgewalten in Form von Stürmen. Der Grad an Zerstörung wird es schwierig machen, etwas Nützliches zu finden, auch wenn es hoffentlich kein Ding der Unmöglichkeit ist.\n\nUnsere [Root.Owner.GetScientistPlural] haben drei besonders interessante Orte in der Nähe des Landeplatzes ausgemacht: eine relativ intakte Struktur für den öffentlichen Dienst, einen Tempel sowie einen gewaltigen zentralen Platz. Diese Orte sollten uns gute Anhaltspunkte liefern, um tiefer in die Geheimnisse der Inetischen Händler einzutauchen."
 cstorms.145.name: "Wirtschaftszentrum"
 cstorms.145.desc: "Wir haben mehrere Teams gebildet, um die drei vielversprechendsten Orte zu untersuchen. Wo das Amtsgebäude und der öffentliche Platz zwar architektonisch und kulturell interessante Merkmale aufwiesen, war allein die Anbetungsstätte von echter Bedeutung.\n\nDie bröckelnde Fassade verbarg einen höhlenartigen Saal. Im Inneren sind 521 Terminals in konzentrischen Kreisen angeordnet, und in ihrem exaktem Zentrum ruht ein beeindruckendes - und voll funktionsfähiges - Modell dieses Sternensystems. Sensible Nanokomponenten innerhalb des Modells sind auf die elektromagnetischen Felder des Planeten abgestimmt. Trotz des unglaublichen Alters und der damit verbundenen Veränderungen bietet das Modell noch immer eine genaue Darstellung der Position der Himmelskörper in diesem System.\n\nDes Weiteren verläuft entlang der kreisförmigen Basis eine von jedem Terminal einsehbare Schnittstelle, in deren Bildelemente eine Liste von Unternehmenseinheiten und Aktienwerten eingebrannt ist. Dies ist kein Ort religiöser Verehrung, sondern ein INET-Handelsplatz und eine Börse!\n\nDie logischste Schlussfolgerung ist, dass dieses Gebäude einst wichtige Daten enthielt. Wir sollten versuchen, diese zu finden."
 cstorms.145.a: "Durchsucht jeden Winkel!"
 cstorms.150.name: "Das Handbuch"
 cstorms.150.intro: "Nach eingehender Untersuchung stellte sich heraus, dass aus dem Handelszentrum auf [From.Planet.GetName] alles von Wert entfernt wurde. Die Terminals sind nicht funktionsfähig und abgesehen von den eingebrannten Bildern keinerlei Handelsinformationen zu finden.\n\nEine Lagereinheit in einer Ecke der Halle enthielt jedoch etwas, was wie eine Bedienungsanleitung aussah. Mit den rudimentären Übersetzungsschlüsseln, die wir während unserer Ausgrabung auf [wm_storm_shelter_planet.GetName] entwickelten, ließ sich eine grobe Interpretation des Handbuchs vornehmen.\n\nEs enthält Anweisungen zum Bedienen der Terminals, zum Einstellen des Systemmodells und wie man Unterstützung von einer Maschine erhält, die als \"Sektoraler Störungsunterdrücker\" bezeichnet wird. Die Beschreibungen zur Bedienung, Ausrichtung und Aktivierung dieser Maschine sind klar und eindeutig.\n\nEs muss sich dabei um jene Apparatur handeln, deren Beschreibung wir in den Sturmschutzbunkern fanden, und sie könnte genau das sein, wonach wir gesucht haben."
 cstorms.150.outro: "dass wir einen Schritt dichter daran sind, die Absichten der Inetischen Händler zu verstehen und vielleicht sogar zu lernen, wie wir diese Maschine für unsere eigenen Zwecke nutzen können."
 cstorms.150.desc.a: "$cstorms.150.intro$ Dies bedeutet, $cstorms.150.outro$"
 cstorms.150.desc.b: "$cstorms.150.intro$ Das Handbuch bezieht sich auf eine der Komponenten, die wir auf [wm_digsite_B.GetName] fanden, und wie man sie installiert. Dies bedeutet, $cstorms.150.outro$"
 cstorms.150.desc.c: "$cstorms.150.intro$ Das Handbuch bezieht sich auf die Maschine, die wir auf [wm_digsite_C.GetName] fanden, doch es fehlt eine wichtige Komponente. Nichtsdestotrotz bedeutet dies, $cstorms.150.outro$"
 cstorms.150.desc.d: "$cstorms.150.intro$ Das Handbuch bezieht sich auf die Maschine, die wir auf [wm_digsite_C.GetName] fanden, und wie man die Komponente installiert, auf die wir auf [wm_digsite_B.GetName] stießen. Der letzte Schritt besteht lediglich darin, den Sektoralen Störungsunterdrücker zu aktivieren. Wir stehen kurz davor, die wahre Macht dieser Maschine für uns nutzen zu können!"
 cstorms.150.a: "Macht weiter!"
 #Arcsite Coordinates B
 site_weathermanipulators_CoordinatesB_Industrial_Planet: "Koordinaten B: Industrieplanet"
 site_weathermanipulators_CoordinatesB_Industrial_Planet_intro: "Einer der drei Koordinatensätze, die wir in dem alten Sturmschutzbunker fanden, hat uns nach [From.Planet.GetName] geführt, einer Industriewelt der Inetischen Händler. Der Architektur nach zu urteilen, wurde dieser Planet eindeutig nicht als Wohnraum genutzt. Es bleibt jedoch ein Rätsel, was genau die hiesige Industrie produzieren sollte."
 cstorms.155.name: "Industrielle Effizienz"
 cstorms.155.desc: "Es war schwierig, die Oberfläche von [From.Planet.GetName] durch jenen dichten Smog auszumachen, der noch immer über den Fabriken schwebt. Ein Großteil des Planeten wurde von kosmischen Stürmen verwüstet, die in der eher homogenen Industrielandschaft tiefe Schneisen hinterließen. Eine davon war perfekt für eine Landung geeignet.\n\nEs gibt keine Anzeichen dafür, dass man versuchte, diese Produktionsanlagen zu demontieren. Sie wurden einfach zurückgelassen. Viele von ihnen enthalten noch immer Produktionsmaterial. Eine Analyse dieses Materials könnte uns dabei helfen, besser zu verstehen, welchem Zweck der Planet innerhalb der Handelsinfrastruktur diente. Sie könnte uns auch neue Erkenntnisse über diese \"mächtige\" Maschine liefern, auf die in dem von uns auf [wm_storm_shelter_planet.GetName] gefundenen Sturmschutzbunker verwiesen wurde."
 cstorms.160.name: "Gefährliche Verpackung"
 cstorms.160.desc: "Eine erste Analyse der auf [From.Planet.GetName] verwendeten Materialien deutet auf eine sehr flüchtige Beschaffenheit hin. Diese Produkte waren Teil eines größeren Prozesses und sollten nicht ohne weitere Verarbeitung verwendet werden. Die Substanzen wurden durch ein Fördersystem in Richtung eines zentralen Sammellagers transportiert.\n\nAus den umliegenden Brandspuren geht hervor, dass man dieses Depot ständig für den interplanetaren Transport nutzte. Die Frage ist jedoch, wohin man das Produkt lieferte. Angesichts der instabilen Explosivität der Ladung konnte der Zielort nicht allzu weit entfernt gewesen sein.\n\nIn der Nähe entdeckten wir mehrere Versandkisten. Es wurden eindeutig große Bemühungen unternommen, um den Inhalt sicher zu verpacken: Es waren noch immer Reste aufgedruckter Warnhinweise auf den Seiten zu erkennen. Ein Wort ist nach wie vor lesbar: \"Gefährlich\"."
 cstorms.165.name: "Fehlendes Bindeglied"
 cstorms.165.intro: "Unsere [Root.Owner.GetScientistPlural] haben kurzen Prozess mit dem Turm aus sorgfältig verpackten Kisten gemacht.\n\nBeim Öffnen der ersten Kiste gab es starke Anzeichen dafür, dass sie eine klimatisierte Innenkammer besaß, was eine vorübergehende Panik auslöste, dass sich ihr Inhalt destabilisieren könnte. Zum Glück blieb die Innenkammer unbeschädigt.\n\nDie genauere Untersuchung förderte eine handwerklich meisterhaft gefertigte Maschinenkomponente zutage, die eine gewisse Menge des von der Fabrik produzierten flüchtigen Materials in sich barg."
 cstorms.165.outro: "\n\nWir werden die Komponenten zur weiteren Untersuchung an Bord bringen. Unsere [Root.Owner.GetScientistPlural] sollten nicht mehr Zeit auf der rauen Oberfläche von [From.Planet.GetName] verbringen als nötig."
 cstorms.165.desc.a: "$cstorms.165.intro$\n\nEin Versandetikett auf der Innenseite der Kiste erwähnt etwas von einem \"Sektoralen Störungsunterdrücker\". Unsere [Root.Owner.GetScientistPlural] sind sich nicht sicher, was das bedeutet, doch angesichts des schweren Aufbewahrungsbehälters und der Warnungen, die an der Außenseite der Kiste angebracht sind, muss es etwas Wichtiges gewesen sein.$cstorms.165.outro$" #A & C sites not yet visited
 cstorms.165.desc.b: "$cstorms.165.intro$\n\nDie Komponente kam unseren [Root.Owner.GetScientistPluralDE1] sofort bekannt vor, woraufhin sie das auf [wm_digsite_A.GetName] gefundene Handbuch hervorholten, um einen Vergleich anzustellen. Das aufwendig hergestellte Objekt in der Kiste ist eine wichtige Komponente des Sektoralen Störungsunterdrückers.$cstorms.165.outro$" #A site visited & C site not visited
 cstorms.165.desc.c: "$cstorms.165.intro$\n\nDie einzigartige Form und der flüssige Kern deuten darauf hin, dass es sich hierbei genau um jene Komponente handeln könnte, die man braucht, um die auf [wm_digsite_C.GetName] gefundene Maschine zu vollenden. Die enthaltene Substanz versorgt den Sektoralen Störungsunterdrücker vermutlich mit Energie. Es ist jedoch auch wahrscheinlich, dass spezifisches Wissen erforderlich ist, um sie sicher zu installieren.$cstorms.165.outro$" #A site not visited & C site visited
 cstorms.165.desc.d: "$cstorms.165.intro$\n\nDie Komponente scheint der fehlende Teil des Sektoralen Störungsunterdrückers zu sein, den wir auf [wm_digsite_C.GetName] fanden. Mit dem Handbuch aus [wm_digsite_A.GetName] können wir sie ordnungsgemäß einbauen und die Maschine vielleicht endlich aktivieren.$cstorms.165.outro$" #A & C sites visited
 cstorms.165.a: "Gute Arbeit."
 #Arcsite Coordinates C
 site_weathermanipulators_CoordinatesC_Barren_Planet: "Koordinaten C: Karger Planet"
 site_weathermanipulators_CoordinatesC_Barren_Planet_intro: "Einer der drei Koordinatensätze, die wir in dem alten Sturmschutzbunker fanden, hat uns nach [From.Planet.GetName] geführt. Die Oberfläche ist kaum mehr als Schnee und Staub, aber erste Scans zeigen, dass der Planet einst bewohnbar war. Die Frage ist nur, ob er für die Inetischen Händlern vor oder nach seiner Verwüstung einen Nutzen hatte?"
 cstorms.170.name: "Endlos und unerbittlich"
 cstorms.170.desc: "Endlose Schneestürme wehen über die Oberfläche von [From.Planet.GetName], und als wäre dies nicht bereits herausfordernd genug gewesen, verbarg die schneebedeckte Landschaft noch eine weitere sonderbare Überraschung.\n\nUnter den Stürmen gab es unzählige Staubschichten. In ihnen wurden Hinweise auf jene Lebensformen gefunden, die einst diese Welt bewohnten. Sie alle wurden gleichzeitig unter den Staubschichten begraben, was auf ein riesiges Massensterben hindeutet. Der Zusammenbruch der Ökosysteme muss die Atmosphäre so weit ausgedünnt haben, dass eine Eiszeit eintrat, die den Planeten in eine Wüste verwandelte.\n\nDieser Ort muss mehr als nur Sand und Eis zu bieten haben, doch es ist auch klar, dass uns die Oberfläche keine weiteren Antworten liefern wird. Unsere [Root.Owner.GetScientistPlural] empfehlen, tiefer zu graben."
 cstorms.170.a: "Holt die Siebe raus."
 cstorms.171.name: "Wurzeln des Lebens"
 cstorms.171.desc: "Ausgestattet mit Schutzausrüstung und frostbeständigen schweren Maschinen begannen unsere [Root.Owner.GetScientistPlural] den mühsamen, wenn auch einfachen Prozess, die Schnee- und Staubschichten zu entfernen. Darunter fanden sie eine Reihe von Gräben, die sich in einem seltsamen wurzelartigen Muster ausbreiteten und einen riesigen Teil des Gebiets bedeckten.\n\nIn diesen Gräben befanden sich die getrockneten Überreste aller möglichen Organismen, von der Flora über die Fauna bis hin zu allem, was dazwischen existierte. Die Gräben haben die organischen Stoffe scheinbar zermahlen, indem sie diese zwischen ihren felsigen Wänden pulverisierten. Dabei wurden alle nützlichen Nährstoffe extrahiert und in einem Vorgang, der der Verdauung ähnelt, zu einem Konvergenzpunkt transportiert. Der Staub, der übrig blieb, bedeckt nun den Großteil der Landschaft von [From.Planet.GetName].\n\nDies wirft die Frage auf, wen oder was die Spalten gefüttert haben."
 cstorms.171.a: "Findet den Ursprung."
 cstorms.172.name: "Urzeitliche Maschinen"
 cstorms.172.intro: "Das Netz aus Gräben ist riesig, und je weiter unsere [Root.Owner.GetScientistPlural] vordrangen, desto dichter wurde es auch. Die Gräben liefen alle vor einem der letzten verbliebenen Berge auf [From.Planet.GetName] zusammen. Der Gipfel - ein offenkundig künstlich angelegtes Plateau - bietet drei großen Maschinen Platz, die in gleichmäßigen Abständen zueinander angeordnet sind. Diese Maschinen scheinen von den Inetischen Händlern zu stammen, da sie mit Symbolen ihrer Sprache gekennzeichnet sind und zu dem passen, was wir über ihre Gesellschaft wissen. Trotz ihres bemerkenswerten Alters und der extremen Winde, die über das Plateau fegen, sind sie in einem ausgezeichneten Zustand."
 cstorms.172.outro: "\n\nWir haben gefunden, wonach wir suchten, und stehen kurz vor einer unglaublichen Entdeckung."
 cstorms.172.desc.a: "$cstorms.172.intro$ Es muss sich dabei um jene Maschinen handeln, die auf [wm_storm_shelter_planet.GetName] erwähnt wurden. Leider fehlt uns das nötige Wissen, um die komplexe Funktionsweise dieser Apparaturen zu verstehen. Das ist jedoch nicht alles: Dem Steuerpult, das man an einer der Maschinen entdeckte, fehlen eindeutig wichtige Komponenten. Auf einer kleinen Plakette sind die Worte \"Sektorale Störungsunterdrücker\" zu lesen.\n\nWenn wir es schaffen, die Maschinen zu aktivieren, könnten wir endlich in Erfahrung bringen, welchem Zweck sie dienen. Dazu müssen wir die verbleibenden Koordinaten erkunden. $cstorms.172.outro$" #A&B not visited
 cstorms.172.desc.b: "$cstorms.172.intro$\n\nDie Schaltpläne des Handbuchs, das wir auf [wm_digsite_A.GetName] fanden, scheinen mit den Instrumenten der Maschinen übereinzustimmen, was darauf hindeutet, dass es sich hierbei tatsächlich um jenen \"Sektoralen Störungsunterdrücker\" handeln muss, der in den Sturmschutzbunkern auf [wm_storm_shelter_planet.GetName] erwähnt wurde.\n\nAus dem Handbuch geht hervor, dass man diese Maschinen über ein Bedienfeld steuern muss. Unsere [Root.Owner.GetScientistPlural] haben dieses Bedienfeld am Fuß einer der Maschinen entdeckt, doch es scheint ein wichtiges Teil zu fehlen. Wir haben noch einen Satz Koordinaten, der bislang unerforscht ist und uns eine Antwort liefern könnte. $cstorms.172.outro$" #A visited & B not visited
 cstorms.172.desc.c: "$cstorms.172.intro$\n\nEs muss sich hierbei um jene Maschinen handeln, die auf [wm_storm_shelter_planet.GetName] erwähnt wurden und die Bezeichnung \"Sektorale Störungsunterdrücker\" tragen! Darüber hinaus passte die Komponente, die wir auf [wm_digsite_B.GetName] fanden, nahtlos in ein Bedienfeld am Fuß einer der Maschinen.\n\nWeitere Reparaturen sind aufgrund der Komplexität und des Alters der Bauteile jedoch riskant. Unsere [Root.Owner.GetScientistPlural] empfehlen, nach weiteren Informationen zu suchen, bevor wir weitermachen. $cstorms.172.outro$" #A not visited & B visited
 cstorms.172.desc.d: "$cstorms.172.intro$\n\nEs handelt sich hierbei zweifellos um jene Maschinen, die auf [wm_storm_shelter_planet.GetName] erwähnt wurden und in dem Handbuch beschrieben stehen, das wir auf [wm_digsite_A.GetName] fanden: die \"Sektoralen Störungsunterdrücker\". Wir müssen nur noch die auf [wm_digsite_B.GetName] gefundene Komponente einsetzen und hoffen, dass die Maschinen noch betriebsbereit sind. Dann werden wir endlich ihren Zweck ergründen! $cstorms.172.outro$" #A&B visited
 cstorms.172.a: "Wollen wir einmal sehen, was diese Maschinen so können." #Finished sites A and B
 cstorms.172.b: "Wir haben es fast geschafft!" #Did not finish sites A and B
 #Special Project 2
 INETIAN_PROJECTS_02: "Das Geheimnis der Maschine"
 INETIAN_PROJECTS_02_DESC: "Die drei Koordinatensätze, die wir auf [wm_storm_shelter_planet.GetName] fanden, ließen uns ein uraltes Rätsel lösen. Nun muss der Sektorale Störungsunterdrücker nur noch aktiviert werden. Es ist an der Zeit, seinen Zweck zu ergründen!"
 cstorms.176.name: "Das Geheimnis der Maschine"
 cstorms.176.desc: "Wir fanden das letzte Teil des Puzzles und unsere [Root.Owner.GetScientistPlural] machten sich an die Arbeit. Die Komponente aus [wm_digsite_B.GetName] passte nahtlos in eine Steuerkonsole, und das Handbuch aus [wm_digsite_A.GetName] beschrieb die weitere Vorgehensweise. Als alles an seinem Platz war, erwachten alle drei Maschinen zum Leben.\n\nEine gewaltige Vibration rüttelte den Staub und Schnee vom Plateau. Mit dem Knistern eines Blitzes wurde ein [Root.Owner.GetScientist] augenblicklich verdampft, und die Staubpartikel, die eben noch ein Körper gewesen waren, wurden von den Gräben aufgesogen und in Richtung des Sektoralen Störungsunterdrückers befördert.\n\nDies liefert uns die Erklärung, was auf [wm_digsite_C.GetName] geschehen ist: Die Gräben, die zur Unterseite der Maschinen führen, sind Energieleitungen, die die biologische Materie aus der Umgebung aufsaugen. Alles, was übrig bleibt, ist eine Schneise der Verwüstung quer über den gesamten Planeten.\n\nDie Sektoralen Störungsunterdrücker sind nun voll funktionsfähig, und es ist auch genug Energie für eine weitere Aktivierung vorhanden. Man muss nur noch den Knopf drücken."
 cstorms.176.a: "Aktiviert die Maschine."
 cstorms.176.b: "Drückt diesen Knopf auf gar keinen Fall!"
 #Delayed Event 1
 cstorms.180.name: "Neue Erkenntnisse"
 cstorms.180.desc: "Wir konnten zwar die Geheimnisse der Sektoralen Störungsunterdrücker aufdecken, doch das letztliche Schicksal der Inetischen Händler bleibt nach wie vor ungeklärt. Eine gründliche Neubewertung aller vorhandenen Daten lieferte uns allerdings einige neue Erkenntnisse:\n\nDie Handelsaufzeichnungen, die wir auf [wm_digsite_A.GetName] fanden, zeigen, dass ihre Gesellschaft einer stark egalitären Überzeugung folgte. Diese Schlussfolgerung wird durch den hohen Lebensstandard sowie die zahlreichen luxuriösen Einrichtungen, die ebenfalls auf dem Planeten zu finden waren, weiter gestützt. Abgesehen von einer kleinen Varianz genoss jeder Bürger denselben Komfort und hatte unabhängig von seinem Beruf, seiner sozialen Stellung oder seiner Herkunft die gleichen Chancen.\n\nAuf [wm_digsite_B.GetName] fanden wir Informationen darüber, welchen Nutzen jede ihrer Fabriken hatte, die alle Teil einer viel größeren Produktionskette waren. Sie waren eindeutig dazu bestimmt, ihrem riesigen Imperium die nötigen Mittel zur Verfügung zu stellen, um ihren opulenten Lebensstil aufrechtzuerhalten. Um jedem die gleichen Chancen zu bieten, ist immerhin eine ungeheure Menge an Material und Nahrung vonnöten.\n\nDie Wiederinbetriebnahme der Sektoralen Störungsunterdrücker auf [wm_digsite_C.GetName] lieferte weitere Einblicke. Auch wenn uns ihr genauer Nutzen noch ein Rätsel ist, wurde ein nachverfolgbares Datensignal ausgesendet, was die Schlussfolgerung zulässt, dass die Maschinen nicht auf ein bewegliches Objekt ausgerichtet sind.\n\nUnsere [Root.Owner.GetScientistPlural] empfehlen, benachbarte Sektoren zu erkunden, um eine Antwort zu finden."
 cstorms.180.a: "Gehen wir der Sache nach!"
 #Digsite 5
 site_weathermanipulators_storm_formation: "Der Ursprung der Inetischen Händler"
 site_weathermanipulators_storm_formation_intro: "In der Steuerungskonsole der Sektoralen Störungsunterdrücker wurde ein Datensignal gespeichert. Obwohl es schwierig war, gelang es uns, das Signalmuster klonen und die Galaxie nach einer passenden Quelle abzusuchen. Die Spur führte zu einem unbewohnten Planeten. Es ist an der Zeit, herauszufinden, welche Interessen die Inetischen Händler verfolgten."
 cstorms.181.name: "Unspektakuläre Ebenen"
 cstorms.181.desc: "Auf den ersten Blick erscheint [From.Planet.GetName] ganz normal - ein Planet wie jeder andere in der Galaxie. Es gibt auch keinen Hinweis auf den Empfänger des Signals. Es sind keine sichtbaren Sender oder eine Technologie vorhanden, die stark genug wäre, um Signale von weit entfernten Systemen registrieren zu können.\n\nDie Suche wird fortgesetzt."
 cstorms.182.name: "Konzentrierte Katastrophe"
 cstorms.182.desc: "Als wir auf der Oberfläche ankamen, stellten wir rasch fest, dass das Signal je nach unserer Position stärker oder schwächer wurde. Diesem einfachen Muster folgend gelangten wir schließlich zu einer hoch aufragenden Bergkette auf der anderen Seite des Planeten.\n\nAls wir uns den Bergen näherten, wurde die Landschaft immer unwirtlicher, karger und verwüsteter, als hätte eine verheerende Kraft diesen Teil der Welt heimgesucht. Aufgrund des Schadensmusters glauben wir, dieser Ort wurde irgendwann von einem kosmischen Staubsturm getroffen. Sollte dies der Fall sein, müsste jedoch der gesamte Planet betroffen sein. Wir haben noch nie zuvor eine derart konzentrierte Zerstörung durch einen solchen Sturm erlebt. Wir müssen wohl oder übel die imposanten Gipfel erklimmen, wenn wir mehr erfahren wollen."
 cstorms.183.name: "Flüchtige Energie"
 cstorms.183.desc: "Die verwüstete Bergkette bestand aus zahlreichen Gipfeln und Tälern, doch ein seltsam geformter Krater erregte schon sehr früh unsere Aufmerksamkeit. Die Wände waren glatt und in der Mitte eine Reihe konzentrischer Ringe in den Boden gegraben.\n\nBei unserem Abstieg spürten wir, wie uns eine schier unwiderstehliche Macht anzog, die vom Mittelpunkt der Kreise ausging. Stränge aus flackernder Energie bildeten sich aus den Ringen, von denen einige so weit wegdrifteten, dass sie schließlich in die Atmosphäre des Planeten entwichen. Dies ist eindeutig die Quelle des Signals!\n\nUnsere [Root.Owner.GetScientistPlural] schlagen vor, den Krater und die Energieschwankungen zu analysieren, um besser zu begreifen, was hier vor sich geht."
 cstorms.184.name: "Ungewisser Anfang"
 cstorms.184.desc: "Auf der Grundlage von Umweltdaten und detaillierten Simulationen ist davon auszugehen, dass es tatsächlich ein himmlischer Staubsturm war, der über diese Gipfel fegte und sich genau an dieser Stelle manifestierte! Warum er dabei nicht den ganzen Planeten verschlang, bleibt ungewiss. Wir vermuten, er war schlicht zu klein: Unsere Messwerte weisen auf einen Sturm hin, der nur einen Bruchteil so groß war wie ein durchschnittlicher Sturm.\n\nBeruhend auf der Tatsache, dass die Inetischen Händler die Sektoralen Störungsunterdrücker als \"Manipulationsvorrichtung\" bezeichneten und dass das Energiesignal dieses konkreten Sturms in ihren Datenbanken gespeichert war, scheint es wahrscheinlich, dass sie versuchten, den kosmischen Sturm zu kontrollieren. Indem wir den Weg berechnen, den der Sturm nach dem Verlassen dieses Ortes nahm, können wir eventuell etwas Nützliches lernen."
 cstorms.184.a: "Machen wir weiter!"
 #Special Project 3
 INETIAN_PROJECTS_03: "Auf den Spuren der Händler"
 INETIAN_PROJECTS_03_DESC: "Wir fanden den Ausgangsort eines uralten himmlischen Staubsturms, doch es gibt Hinweise darauf, dass er viel kleiner gewesen sein muss als gewöhnlich. Angesichts dieser geringen Größe erscheint es umso merkwürdiger, dass die Inetischen Händler den Sturm mit ihren Sektoralen Störungsunterdrückern zu kontrollieren versuchten.\n\nWenn wir dem Weg folgen, den der Sturm nahm, finden wir vielleicht heraus, warum sie so viel Zeit in dieses Projekt investierten."
 cstorms.186.name: "Auf den Spuren der Händler"
 cstorms.186.desc: "Der Weg, den der Staubsturm nahm, war komplexer als erwartet. Nur wenige Systeme vom Ausgangspunkt entfernt muss etwas geschehen sein, was Stärke, Größe und Kurs drastisch veränderte. Unsere [Root.Owner.GetScientistPlural] vermuten, der Sturm wurde zu diesem Zeitpunkt von den Sektoralen Störungsunterdrückern getroffen. Diese müssen den Sturm aus dem Gleichgewicht gebracht und den inneren Wirbel durch die pulverisierten Überreste von Wildtieren verunreinigt haben, die von der Oberfläche von [wm_digsite_C.GetName] stammten.\n\nAls der Sturm weiter durch die Galaxie wütete, verwüstete er mehrere Systeme.\n\nUnd all dies nur, um einen winzigen Sturm von einem bestimmten System wegzulocken? Unsere Sensoren haben eine verlassene Raumstation in diesem System entdeckt. Um diesen Ort zu schützen, nahmen die Inetischen Händler scheinbar mehrere Durchläufe eines Massenaussterbens in Kauf.\n\nDie Station ist vielleicht nicht die Hauptwelt, auf die wir zu stoßen hofften, doch sie muss genauso wichtig sein, um solche Maßnahmen zu rechtfertigen."
 cstorms.186.a: "Nehmt Kurs!"
 #Digsite 6
 site_weathermanipulators_last_shelter: "Vor dem Untergang"
 site_weathermanipulators_last_shelter_intro: "Die Inetischen Händler versuchten offenbar, eine Raumstation in diesem System vor einem winzigen Staubsturm zu schützen. Womit sie nicht rechneten, war, dass der Sturm dadurch so groß wurde, dass er mehrere andere ihrer Systeme vernichtete. Warum versuchten sie so verzweifelt, ausgerechnet diese Einrichtung zu schützen?"
 cstorms.190.name: "Stabile Umlaufbahn"
 cstorms.190.desc: "Die Raumstation, die [From.Planet.GetName] umkreist, ist viel größer als ursprünglich erwartet. Angesichts ihrer unzähligen Forschungsinstrumente, ihres ausgeklügelten Lebenserhaltungssystems und Dutzenden von Weltraumsensoren scheint sie mehr als nur eine einfache Station zu sein. Dies könnte darauf hindeuten, dass die Einrichtung als langfristige Kolonie und nicht als Rastplatz für vorbeiziehende Reisende gedacht war.\n\nDie strukturelle Integrität der Station lässt allerdings sehr zu wünschen übrig. Es kam zu einem katastrophalen Hüllenbruch, der ganze Sektoren zerstörte. Es ist unklar, ob dieser Schaden von außen oder von innen verursacht wurde. Glücklicherweise sind die Bahnsteuerungs- und Achsenstabilisierungssysteme noch funktionsfähig, was auch erklärt, warum die Station nicht in den Stern hineingetrieben ist oder unaufhaltsam rotiert.\n\nEs wird schwierig sein, ins Innere zu gelangen, ohne dieses sensible Gleichgewicht zu destabilisieren."
 cstorms.191.name: "Öffnen der Luftschleuse"
 cstorms.191.desc: "Um die Station im [This.System.GetName]-System betreten zu können, musste eine unbeschädigte Luftschleuse geöffnet werden. Da das Innere der Station jedoch noch immer unter Druck stand und trotz ihres beeindruckenden Alters erfolgreich eine Planetenatmosphäre nachahmte, galt es, eine Implosion um jeden Preis zu verhindern.\n\nEs dauerte Tage, um die Verbindung zwischen unserem Schiff und der Station vollständig abzudichten und den Druck auszugleichen. Schließlich gelang es uns jedoch, die Tür sicher öffnen. Dummerweise stießen wir allerdings sofort auf ein weiteres Hindernis: einen blockierten Korridor, der mit verdrehten Stützbalken und Schutt aus einem nahen Riss verstopft war, welcher dort zu einem Druckabfall geführt hatte. Es wird einige Zeit dauern, bis wir tiefer vordringen können."
 cstorms.192.name: "Innere Grabstätte"
 cstorms.192.desc: "Als wir den vor uns liegenden Weg endlich geräumt hatten, begannen wir, die Station zu erkunden, um Antworten zu finden.\n\nDa ein Großteil der Scanner der Station auf ihr Inneres gerichtet war, gehen wir davon aus, dass man sie nicht baute, um den Kosmos zu beobachten, sondern um etwas zu schützen. Es wurden zudem persönliche Gegenstände gefunden, die den Inetischen Händlern gehört haben könnten, sowie Protokolle, die das Leben in der Station schildern. Diese sprachen von einer wichtigen \"Fracht\", die in einer bewachten Kammer irgendwo innerhalb der Basis aufbewahrt wurde. Es dauerte zwar nicht lange, bis dieser Raum gefunden war, doch das, worauf wir dort stießen, war erschreckend: Es war eine Grabstätte!\n\nAusgetrocknete, fast mumifizierte Überreste lagen überall verstreut im Raum. Sie alle stammten von Inetischen Händlern. Angesichts der Position der Leichen wirkt es ganz so, als hätten sie sich nicht gewehrt, sondern sich einfach hingesetzt, um zu sterben. Was hat sich hier abgespielt?"
 cstorms.193.name: "Hochmut"
 cstorms.193.desc: "Die \"Fracht\", wie sie von den Inetern genannt wurde, befand sich genau in der Mitte des Raums. Es handelt sich dabei um ein einzigartiges Relikt, offenbar brandneu und unbenutzt. Es ist definitiv inetischen Ursprungs, aber fortschrittlicher als alles, was wir bisher gesehen haben.\n\nDas Relikt ist von mehreren Terminals umgeben, die alle Absätze desselben Texts anzeigten. Sie ließen sich rasch übersetzen:\n\n§LTeuerste Besucher, wenn Ihr dies lest, seid Ihr Zeuge unseres Hochmuts geworden. In unserem edlen Streben nach Gleichheit vergaßen wir, wer wirklich für Gleichheit sorgt: Schöpfung und Vernichtung.\n\nUm unsere Handelsrouten vor den Verwüstungen der kosmischen Stürme zu bewahren, manipulierten wir die Natur, doch was einst kleinere Unwetter waren, entglitt unserem Einfluss. Die kosmischen Stürme rissen unsere Welten entzwei. Doch dies war kein Zufall, sondern Vergeltung! Wir schlossen uns in dieser Station ein. Sie war unsere letzte Verteidigung. Obwohl wir unsere Sturmunterdrücker nicht mehr nutzten, bildeten sich neue Stürme, die stärker waren als alle zuvor. Unsere letzte Aufgabe war klar:\n\nWir arbeiteten fieberhaft daran, diese Maschine fertigzustellen. Wir haben sie für Euch gebaut, Besucher. Sie wird Euch vor den kosmischen Stürmen schützen, ohne sie weiter zu verärgern. Unser Untergang ist unsere Absolution, doch sie muss nicht Eure sein.§!\n\nIn diesem Raum besiegelten die Inetischen Händler ihr Schicksal. Ihr Großmut stand ihrer Sorglosigkeit in Nichts nach. Wir verließen die Station mit ihrem Abschiedsgeschenk."
 cstorms.193.a: "Lasst sie ruhen."
 cstorms.193.b: "Ein passendes Ende für ein törichtes Volk."
 #Artifact action
 artifact_inetian_research: "Geheimnisse der Inetischen Händler"
 artifact_inetian_research_desc: "Taucht tiefer in die Geheimnisse der Inetischen Händler ein."
 artifact_inetian_research_completed: "$artifact_inetian_research$"
 artifact_inetian_research_completed_desc: "Wir konnten das Wissen der Inetischen Händler für unsere eigenen Zwecke nutzen."
 INETIAN_PROJECTS_04: "In die Geheimnisse der Inetischen Händler abtauchen"
 INETIAN_PROJECTS_04_DESC: "Nachdem wir die letzte Ruhestätte der Inetischen Händler entdeckt haben, würden wir gern mehr über ihr riesiges Reich erfahren. Wir möchten sie noch einmal untersuchen."
 cstorms.195.name: "In die Geheimnisse der Inetischen Händler abtauchen"
 cstorms.195.desc: "Die letzte Ruhestätte der Inetischen Händler erwies sich als hochtechnisierte Raumstation. Sie wurde als Zuflucht gebaut, um jene schrecklichen kosmischen Stürme zu überstehen, die die Inetischen Händler selbst ins Leben gerufen hatten. Dieses Habitat ist der Zenit ihres technologischen Wissens und verfügt über ausgeklügelte Lebenserhaltungs- und Schutzsysteme. Doch selbst dies konnte sie nicht retten.\n\nObwohl die Station selbst aufgrund von Äonen des Verfalls nicht mehr bewohnbar ist, diente sie unseren [Root.Owner.GetScientistPluralDE1] als Fundgrube des Wissens. Sie fanden nicht nur die wichtigsten Handelsrouten der Ineter in einer Datenbank gespeichert, sondern auch empfindliche Prototypen effizienterer, weniger planetenzerstörender Klimakontrollmaschinen, die einfach so auf einem der Werktische herumlagen.\n\nEs scheint, zumindest ein kleiner Teil der Hartnäckigkeit der Inetischen Händler hat die Zeiten überdauert und wird uns auch in Zukunft helfen, die kommenden Stürme zu überstehen."
 secrets_of_the_inetian_traders: "Geheimnisse der Inetischen Händler"
 secrets_of_the_inetian_traders_hive_mach: "Geheimnisse der Inetischen Händler"
 secrets_of_the_inetian_traders_desc: "Wieder einmal hat uns das Wissen der Inetischen Händler geholfen. Dank ihres Einflusses können wir jetzt von niedrigeren Marktgebühren profitieren."
 secrets_of_the_inetian_traders_hive_mach_desc: "Wieder einmal haben die Daten der Inetischen Händler dem Kollektiv geholfen. Marktgebührenreduktionen sind jetzt in Kraft."
 #Hyperlane Detailer - Secrets Of Inetian Traders Reward
 sm_hyperlane_detailer: "Hyperraumroutenaufbereiter"
 NAME_inetian: "Inetische Händler"
