 resolution_cosmic_storms_advanced_storm_studies: "Tiefgreifendere Sturmstudien"
 resolution_cosmic_storms_advanced_storm_studies_desc: "Stürme sind eine wunderschöne Naturgewalt. Wir sollten von ihnen lernen und sie respektieren."
