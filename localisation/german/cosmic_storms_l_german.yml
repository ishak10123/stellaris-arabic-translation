 edict_auto_hunker_down_desc: "Jeder Planet, der von einem §YKosmischen Sturm§! getroffen wird, setzt die planetare Entscheidung \"§Y$decision_hunker_down$§!\" um, bis die Gefahr vorüber ist."
 edict_auto_hunker_down_tt: "Schaltet die planetare Entscheidung \"§Y$decision_hunker_down$§!\" basierend darauf um, ob der Planet von einem §YKosmischen Sturm§! getroffen wird oder nicht.\n\n$storm_hunkered_down_modifier_tt$"
