 #Magnetized Planetary Core
 pm_magnetized_planetary_core: "Hypermagnetisierter Planetenkern"
 pm_magnetized_planetary_core_desc: "Der Elektromagnetismus tief im Mantel des Planeten macht Magnetbergbau möglich, stört allerdings auch die technische Infrastruktur."
 cstorms.1705.name: "$pm_magnetized_planetary_core$"
 cstorms.1705.desc: "Nach dem kürzlichen §Y$magnetic_storm$§! auf [this.GetName] erhielten wir einige sonderbare Berichte. Die starken Energiefelder des Sturms magnetisierten scheinbar den geschmolzenen Kern des Planeten, was zu einem weitreichenden Ausfall der technischen Infrastruktur führte.\n\nDieses Phänomen bietet jedoch auch eine einzigartige Gelegenheit zur Rohstoffgewinnung. Metallreiche Lavaströme unter dem Planetenmantel sind nun elektromagnetisch aufgeladen und können mit Hilfe von Bergbaumagneten abgebaut werden."
 #Electrified Oceans
 d_electrified_oceans: "Elektrifizierte Ozeane"
 d_electrified_oceans_desc: "Ein beständiger elektrischer Strom fließt durch den riesigen Ozean des Planeten."
 GLACIAL_OCEANS: "subglazialen Ozeane"
 DEFAULT_OCEANS: "Ozeane"
 cstorms.1715.name: "$d_electrified_oceans$"
 cstorms.1715.desc.common: "Nach dem kürzlichen §Y$electric_storm$§! wurde ein sonderbares Phänomen auf [this.GetName] beobachtet. Die [GetOceansState] wurden mit einem beständigen elektrischen Strom aufgeladen, der nun in diesem gigantischen Gewässer zirkuliert und eine tödliche Gefahr für alles Leben im Wasser darstellt."
 cstorms.1715.desc.aquatic: "Dies stellt eine ernsthafte Bedrohung für das Überleben unserer Kolonie dar. Wir müssen uns unverzüglich darum kümmern."
 cstorms.1715.desc.non_aquatic: "Dieses Phänomen hat keinen direkten Einfluss auf uns, stellt aber eine Herausforderung für die künftige Entwicklung unserer Kolonie dar."
 cstorms.1715.a: "Entladet den Strom."
 cstorms.1715.b: "Lernt, damit zu leben."
 #Ghostly Apparitions
 d_ghostly_canyon: "Geisterhafte Schlucht"
 d_ghostly_canyon_desc: "Besucher dieser Schlucht werden Zeuge feinstofflicher Erscheinungen."
 cstorms.1725.name: "Geisterhafte Erscheinungen"
 cstorms.1725.desc.common: "Nach dem kürzlichen §Y$shroud_storm$§! im [this.solar_system.GetName]-System berichten unsere [owner.GetColonistPlural] von unerklärlichen Sichtungen feinstofflicher Erscheinungen in einer abgelegenen Schlucht. Diese geisterhaften blauen Gestalten erscheinen nur kurz und sind unfähig oder unwillig, mit unseren [owner.GetColonistPlural] zu interagieren. Sie wandern einfach ziellos umher, bevor sie sich auflösen."
 cstorms.1725.desc.psionic: "Obwohl die Erscheinungen psionischer Natur zu sein scheinen, gelang uns keine mentale Kommunikation mit ihnen. Wir haben jedoch festgestellt, dass ihre Anwesenheit unsere eigenen telepathischen Fähigkeiten verstärkt."
 cstorms.1725.desc.psionic_robot: "Obwohl die Erscheinungen psionischer Natur zu sein scheinen, gelang es uns nicht, mit ihnen psionisch zu kommunizieren. Eine Systemanalyse ergab jedoch, dass ihre Anwesenheit unsere eigenen telepathischen Fähigkeiten verstärkt."
 cstorms.1725.desc.spiritualist: "Dieses bemerkenswerte Phänomen erinnert uns an die immateriellen Wunder unserer Existenz."
 cstorms.1725.desc.gestalt: "Bislang wurden keine Schäden an Leib und Seele oder irgendein aggressives Verhalten gemeldet."
 cstorms.1725.desc.default: "Bislang wurden keine Schäden an Leib und Seele oder an Gebäuden gemeldet. Nichtsdestotrotz strahlt dieses Phänomen Unbehagen aus."
 cstorms.1725.a: "Füllt die Schlucht mit Erde. Die Toten werden begraben bleiben."
 #Volcanic Inactivity
 cstorms.1735.name: "Vulkanische Inaktivität"
 cstorms.1735.desc: "Die Reststrahlung des kürzlichen §Y[this.GetAffectedStormType]s§! hat die geologische Aktivität auf ganz §H[this.GetName]§! gestört.\n\nBesonders erwähnenswert ist, dass durch den Sturm ein aktiver Vulkan erloschen ist, der von seinem Hotspot und damit von der Magmazufuhr abgeschnitten wurde.\n\nDiese Veränderungen bieten uns ganz neue Möglichkeiten, den Planeten weiterzuentwickeln, da das abkühlende Magma neue Gebiete erschließt."
 #Mountain in the Sky
 d_sky_mountain: "Himmelsberge"
 d_sky_mountain_desc: "Eine kolossale Bergkette schwebt in der dünnen Luft der oberen Atmosphäre des Planeten und hat neue Erzvorkommen freigelegt."
 unlocks_zone_minerals_physics: "$t$Neue Distrikt-Spezialisierung: §Y$zone_minerals_physics$§!"
 cstorms.1745.name: "$d_sky_mountain$"
 cstorms.1745.desc: "Ein verheerender §Y$gravity_storm$§! führte zu einer außergewöhnlichen Transformation im Landschaftsbild von §H[this.GetName]§!. Die starken Gravitationsschwankungen des Sturms lösten die größte Bergkette des Planeten von seiner tektonischen Platte und hoben sie senkrecht in den Himmel.\n\nAufgrund der Restgravitation des Sturms schwebt der Berg nun in der oberen Atmosphäre. Dieses bemerkenswerte Phänomen legte bislang unzugängliche Erzvorkommen in tiefen Gesteinsschichten frei und gab unseren [owner.GetResearchersDE1] eine Menge zu analysieren."
 #Melting Glaciers
 cstorms.1755.name: "Schmelzende Gletscher"
 cstorms.1755.desc.common: "Der kürzliche §Y[this.GetAffectedStormType]§! hatte unerwartete Auswirkungen auf das Klima von [this.GetName]."
 cstorms.1755.desc.electric: "Die stark aufgeladene Atmosphäre führte zu einer drastischen Temperaturveränderung in der Polarregion $cstorms.1755.desc.common_2$"
 cstorms.1755.desc.particle: "Die korrosiven Partikel des Sturms hatten besonders drastische Auswirkungen auf die Polarregion $cstorms.1755.desc.common_2$"
 cstorms.1755.desc.gravity: "Die durch den Sturm erzeugte Schwerkraftverschiebung sprengte mehrere Schichten des subaquatischen Eises $cstorms.1755.desc.common_2$"
 cstorms.1755.desc.magnetic: "Die Störungen am Magnetfeld haben zu seismischen Verschiebungen geführt $cstorms.1755.desc.common_2$"
 cstorms.1755.desc.solar: "Die extreme Hitze des Sturms führten zu einem starken Temperaturanstieg auf dem gesamten Planeten $cstorms.1755.desc.common_2$"
 cstorms.1755.desc.celestial: "Der stark überhitzte Sternenstaub hatte besonders drastische Auswirkungen auf die Polarregion $cstorms.1755.desc.common_2$"
 cstorms.1755.desc.common_2: "und taute die zuvor unzugängliche gefrorene Tundra auf.\n\nWir können dieses neu erschlossene Land jetzt entwickeln."
 #Dusty Drink
 cstorms.1761.name: "Kosmische Verstopfung"
 cstorms.1761.desc.common: "Unsere auf §H[this.GetName]§! stationierten [Owner.GetEngineerPlural] berichten, dass sich der §Y$celestial_storm$§! nachteilig auf die Wasserfiltersysteme ausgewirkt hat. Da sich die Partikel im Grundwasser des Planeten absetzen, verstopft der daraus resultierende mineralienreiche Schlamm wichtige Infrastrukturknoten."
 cstorms.1761.desc.default: "Der Wassermangel zeigt schwerwiegende Auswirkungen auf die planetare Landwirtschaft und führt zu einer Knappheit von sicher trinkbarem Wasser.\n\nDieses Problem könnte langfristige Folgen auf die Wasserversorgung haben, wenn wir uns nicht schleunigst darum kümmern. Glücklicherweise sind unsere [owner.GetEngineerPlural] zuversichtlich, dass sie ein robusteres Filtersystem entwickeln können."
 cstorms.1761.desc.lithoid: "Als unsere [Owner.GetColonistPlural] die hydroponische Verstopfung näher untersuchten, entdeckten sie, dass der mineralienhaltige Schlamm sowohl köstlich als auch nahrhaft ist, zumindest für Lithoide. Nachdem sie einige kleinere Anpassungen an den Filtersystemen der Kolonie vorgenommen hatten, konnten sie als Nebenprodukt ein saisonales Getränk produzieren, mit dem sich der Sturm aussitzen ließ."
 cstorms.1761.a: "Macht weiter."
 cstorms.1761.b: "Eine unerwartete Bedrohung."
 pm_satured_filtration: "Gesättigte Filtration"
 pm_satured_filtration_desc: "Die örtliche Wasserversorgung wurde durch kosmischen Sternenstaub verunreinigt, der nun das hydroponische Netz des Planeten verstopft."
 filtration_insight_modifier: "Einblicke in die hydroponische Filtration"
 CLEAR_DUSTY_PIPES_PROJECT: "Säubert die Rohre"
 CLEAR_DUSTY_PIPES_PROJECT_DESC: "Der §Y$celestial_storm$§! auf §H[this.GetName]§! hat die Wasserfiltersysteme mit einem unlöslichen mineralienhaltigen Schlamm verstopft. Wir müssen ein robusteres Filtersystem entwickeln, um das Problem anzugehen."
 cstorms.1765.name: "Filter freigelegt"
 cstorms.1765.desc: "Unsere [Owner.GetEngineerPlural] haben die hydroponische Verstopfung und die damit verbundene Wasserknappheit auf §H[this.GetName]§! beseitigt. Das Wasserversorgungssystem der Kolonie wurde verbessert und kann jetzt auch komplexere Verunreinigungen herausfiltern (wie die von einem $celestial_storm$).\n\nDiese Verbesserungen können in ganz [Owner.GetName] eingesetzt werden."
 #Flightless Fauna
 cstorms.1771.name: "Flugunfähige Fauna"
 cstorms.1771.desc.common: "Unsere auf [this.GetName] stationierten [Owner.GetScientistPlural] berichten, dass der §Y$gravity_storm$§! schwerwiegende Auswirkungen auf die Fauna hatte.\n\nDie durch den Sturm verursachten Schwerkraftfluktuationen haben die Atmosphäre destabilisiert und mehrere Vogelarten flugunfähig gemacht."
 cstorms.1771.desc.default: "Dies hat nicht nur dazu geführt, dass diese Vogelarten nicht wie gewohnt jagen können, sondern macht sie auch anfälliger für andere Raubtiere.\n\nEs besteht die Sorge, dass die betroffenen Arten bis zum Aussterben gejagt werden könnten, wenn wir nicht eingreifen."
 cstorms.1771.desc.swarm: "Uns erwartet ein wahres Festmahl."
 cstorms.1771.a: "Einfache Beute."
 cstorms.1771.b: "Lasst die Natur ihren Lauf nehmen."
 cstorms.1771.c: "Baut für diese Kreaturen ein Reservat."
 cstorms.1771.evopred: "Sichert ihre DNA, bevor sie aussterben."
 d_avian_reserve: "Vogelreservat"
 d_avian_reserve_desc: "Ein abgelegenes Naturschutzgebiet, das für gefährdete Vogelarten eingerichtet wurde."
 cstorms.1776.name: "Wieder flugfähig"
 cstorms.1776.desc: "Nachdem der §Y$gravity_storm$§! vorüber war, hat sich die vorübergehend flugunfähige Fauna, die wir in unserem Vogelreservat auf [this.GetName] untergebracht haben, wieder in die Lüfte erhoben.\n\nViele der Tiere sind in ihre früheren Lebensräume zurückgekehrt, doch eine beträchtliche Anzahl ist auch im Reservat geblieben und genießt die Annehmlichkeiten und den Schutz.\n\nDies bietet uns die einmalige Gelegenheit, die Vogelwelt des Planeten aus nächster Nähe zu studieren."
 cstorms.1776.a: "Das sind hervorragende Neuigkeiten!"
