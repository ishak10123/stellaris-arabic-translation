 #Storm Technology
 tech_storm_manipulation: "Sturmmanipulation"
 tech_storm_manipulation_desc: "Indem wir die Prinzipien der Sturmnegationstechnologie nutzen, können wir die astrometeorologische Natur der Galaxie so manipulieren, dass sie unseren eigenen Bedürfnissen dient."
 tech_advanced_storm_manipulation: "Fortschrittliche Sturmmanipulation"
 tech_advanced_storm_manipulation_desc: "Das Fortwährende Studium der Astrometeorologie verleiht uns die Macht, §Ykosmische Stürme§! noch viel genauer zu manipulieren und sie unseren eigenen Bedürfnissen anzupassen."
 tech_industrial_storm_protection: "Planetare Sturmminderung"
 tech_industrial_storm_protection_desc: "Dieser Wetterkommunikationsnexus verringert die Auswirkungen kosmischer Wetterkatastrophen, wodurch die Produktion durch einen vorbeiziehenden galaktischen Sturm weniger in Mitleidenschaft gezogen wird."
 tech_advanced_industrial_storm_protection: "Planetare Sturmnegierung"
 tech_advanced_industrial_storm_protection_desc: "Durch die Verbindung mehrerer lokaler Wetterkontrollsysteme lassen sich planetare Wettermuster manipulieren, was die meisten negativen Auswirkungen kosmischer Stürme auf die Produktion deutlich reduziert."
 tech_storm_prediction_1: "Kosmische Wettermodelle"
 tech_storm_prediction_1_desc: "Durch die Nutzung wissenschaftlicher Wettermodelle können wir den Verlauf und die Entstehung §Ykosmischer Stürme§! verfolgen."
 tech_storm_prediction_1_title: "§HNeue Mechanik§!: Kosmische Wettervorhersage"
 tech_storm_prediction_1_tooltip: "Schaltet die Fähigkeiten \"§YEntstehung kosmischer Stürme vorhersagen§!\" und \"§YVerlauf kosmischer Stürme vorhersagen§!\" im §YWettervorhersage§!-Kartenmodus frei"
 tech_storm_prediction_2: "Wahrscheinlichkeitsstromdichte"
 tech_storm_prediction_2_desc: "Indem wir Wahrscheinlichkeitsströmungen auf unsere wissenschaftlichen Wettermodelle anwenden, sind wir in der Lage, den Verlauf und die Entstehung heranziehender §Ykosmischer Stürme§! noch viel genauer zu verfolgen."
 tech_storm_prediction_2_title: "§HMechanikverbesserung§!: Kosmische Wettervorhersage"
 tech_storm_prediction_2_tooltip: "Maximiert die Reichweite der Fähigkeiten \"§YEntstehung kosmischer Stürme vorhersagen§!\" und \"§YVerlauf kosmischer Stürme vorhersagen§!\" im §YWettervorhersage§!-Kartenmodus"
 tech_ship_hull_storm_breaker_1: "Sturmdämpfungsgeneratoren"
 tech_ship_hull_storm_breaker_1_desc: "Diese Generatoren erzeugen ein Dämpfungsfeld und bieten damit Schiffen, die kosmische Stürme durchqueren, den dringend benötigten Schutz."
 tech_ship_hull_storm_breaker_2: "Sturmbrecherbeschichtung"
 tech_ship_hull_storm_breaker_2_desc: "Diese spezielle Beschichtung lädt das Äußere des Schiffs mit einem sturmdämpfenden Feld auf und erhöht so die Schutzwirkung gegen kosmische Stürme."
 tech_ship_storm_weapons_1: "Nutzlastpolsterung"
 tech_ship_storm_weapons_1_desc: "Ein neuer Ansatz für die Verwendung von Legierungen in militärischen Anwendungsfeldern reduziert die Fähigkeit kosmischer Stürme, Energiewaffen und Explosionsgeschosse zu stören, erheblich."
 tech_ship_storm_weapons_2: "Sturmkäfigarchitektur"
 tech_ship_storm_weapons_2_desc: "Diese neue Schiffsarchitektur reduziert die negativen Auswirkungen, die kosmische Stürme auf die Waffensysteme zeigen, erheblich."
 feature_sustain_cosmic_storm_unlocked: "Kosmische Stürme aufrechterhalten"
 feature_sustain_cosmic_storm_unlocked_desc: "Erlaubt es Euren Forschungsschiffen, einen §YKosmischen Sturm§! aufzulösen oder unbegrenzt aufrechtzuerhalten."
 FLEETORDER_SUSTAIN_COSMIC_STORM: "Hält den Kosmischen Sturm „$STORM|Y$“ im $SYSTEM|Y$-System aufrecht"
