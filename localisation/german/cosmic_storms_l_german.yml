 situation_stormfall_pause_desc: "$situation_cyberization_pause_desc$"
 situation_stormfall_project_pause_desc: "Spezialprojekt"
 situation_stormfall_leader_ongoing: "Sturmverstärkung durch Anführer"
 situation_stormfall_building: "Sturmanziehungsgebäude"
 situation_stormfall_module: "$sm_storm_attraction_computer$"
 situation_stormfall_finish_project_tt: "Das Spezialprojekt \"§Y$PROJECT_TEMPEST_BREWING$§!\" muss abgeschlossen sein"
 #Modifiers for Stormfall event chain
 cs_storm_chasers_storm_fruition: "Sturmentfaltung"
 cs_storm_chasers_storm_fruition_desc: "Die Erweckung unseres selbsterschaffenen kosmischen Sturms hat unser Volk für viele Jahre inspiriert."
 cs_storm_chasers_storm_fruition_gestalt: "$cs_storm_chasers_storm_fruition$"
 cs_storm_chasers_storm_fruition_gestalt_desc: "Die Erweckung unseres selbsterschaffenen kosmischen Sturms hat unser Bewusstsein für viele Jahre inspiriert."
 cs_storm_chasers_homeworld_storm_attraction: "Extremes Wetter"
 cs_storm_chasers_homeworld_storm_attraction_desc: "Die unerbittlichen Stürme auf diesem Planeten haben das Leben in zwei unterschiedliche Richtungen getrieben: Einerseits gibt es diejenigen, die Schutz vor dem Chaos suchen, und andererseits jene, die sich am Rausch des Sturms ergötzen."
 cs_storm_chasers_homeworld_storm_attraction_tt: "Anziehungsintensität (§Y$default_storm$§!): §PNiedrig§!"
 #Special project
 PROJECT_TEMPEST_BREWING: "Ein Sturm braut sich zusammen"
 PROJECT_TEMPEST_BREWING_DESC: "Der Jahrhundertsturm, der auf [Owner.Capital.GetName] wütet, besitzt besondere Eigenschaften, die wir modifizieren können. Zuerst müssen wir die ihm zugrunde liegende Zusammensetzung jedoch besser zu verstehen lernen. Wer weiß, was für eine geniale Kuriosität wir zum Leben erwecken können?"
 #Events
 cstorms.3100.name: "Sturmtief"
 cstorms.3100.desc: "Die natürlich auftretenden Stürme auf §Y[owner.capital_scope.GetName]§! haben uns die ehrfurchtgebietende Macht der Natur gezeigt - sowohl dahingehend, was ihre Intensität betrifft, als auch in Bezug auf die Regeneration, die nach der Zerstörung folgt.\n\nWetterstationen auf dem gesamten Planeten haben kürzlich ein außergewöhnliches Phänomen aufgezeichnet: Superstürme, die über den gesamten Planeten fegen.\n\nUnsere [Root.Owner.GetScientistPlural] bezeichnen dieses Phänomen als \"Serendipität\", die zufällige Beobachtung von etwas ursprünglich nicht Gesuchtem. Diese seltenen Stürme schaffen die idealen Bedingungen, um etwas wirklich Unglaubliches zu erleben."
 cstorms.3100.a: "Schnappt euch die Feldausrüstung!"
 cstorms.3105.name: "Ein Sturm braut sich zusammen"
 cstorms.3105.desc: "Unsere [Root.Owner.GetScientistPlural] haben die Geheimnisse der Sturmmanipulation ergründet. Die prognostizierte Macht der Stürme liegt außerhalb sämtlicher Parameter, und wir haben uns alle hier versammelt, um sie mitzuerleben. Wir werden auf die Probe gestellt und für würdig befunden werden.\n\nBesondere Gebäude dienen als Koordinationszentren für die aufziehenden Stürme. Ein Gebäude auf §Y[owner.capital_scope.GetName]§! erhöht die Sturmanziehung und wird den Fortschritt zur Schaffung des ultimativen Sturms erhöhen."
 cstorms.3105.a: "Ausgezeichnet."
 cstorms.3105.a.tt: "Ein §YSturmanziehungsgebäude§! auf der Heimatwelt:\n$situation_speed_tt$: §G+10%§!\n\nEin §Y$sm_storm_attraction_computer$§! auf der Station des Heimatsystems:\n$situation_speed_tt$: §G+10%§!\n\n"
 cstorms.3110.name: "Die Ruhe vor dem Sturm"
 cstorms.3110.desc.outro: "Indem wir einem natürlichen Sturm Energie zuführen, können wir die idealen Bedingungen für einen Elektronensturm schaffen.\n\nDie Manipulation des Planetenkerns könnte das Magnetfeld von [owner.capital_scope.GetName] neu ausrichten und einen Magnetsturm erzeugen.\n\nDie Tachyonenpolarität an bestimmten Orten auf dem Planeten umzukehren, könnte hingegen einen Gravitationssturm hervorrufen."
 cstorms.3110.desc.regular: "Wir haben gelernt, wie wir die stürmischen Schwingungen auf [owner.capital_scope.GetName] verstärken und sie zu einem ultimativen Erlebnis formen können. Wir müssen nur noch entscheiden, welche Art von Sturm am besten für uns geeignet wäre.\n\n$cstorms.3110.desc.outro$"
 cstorms.3110.desc.hive: "Wir haben gelernt, wie wir die stürmischen Schwingungen auf [owner.capital_scope.GetName] verstärken und sie zu einem ultimativen Erlebnis formen können. Unser Bewusstsein muss nur noch entscheiden, welche Art von Sturm am besten für uns geeignet wäre.\n\n$cstorms.3110.desc.outro$"
 cstorms.3110.desc.machine: "Wir haben gelernt, wie wir die stürmischen Schwingungen auf [owner.capital_scope.GetName] verstärken und sie zu einem ultimativen Erlebnis formen können. Unsere Werturteilsprozesse stecken jedoch in rekursiven Schleifen fest und versuchen, genau zu bestimmen, welche Art von Sturm am besten für uns geeignet wäre.\n\n$cstorms.3110.desc.outro$"
 cstorms.3110.a: "Ladet die Wolken auf."
 cstorms.3110.a.tt: "Schafft die Bedingungen für einen planetaren §Y$electric_storm$§!."
 cstorms.3110.b: "Magnetisiert den Planetenkern."
 cstorms.3110.b.tt: "Schafft die Bedingungen für einen planetaren §Y$magnetic_storm$§!."
 cstorms.3110.c: "Erzeugt Gravitationswellen."
 cstorms.3110.c.tt: "Schafft die Bedingungen für einen planetaren §Y$gravity_storm$§!."
 cstorms.3130.name: "Macht, dass ihr wegkommt!"
 cstorms.3130.desc.electric: "Der Himmel grollt und schleudert seine Blitze in alle Richtungen!\n\nDiese gewaltigen Entladungen haben nicht nur die Oberfläche des Planeten elektrisiert, sondern auch unser Volk in einen wahren Rausch versetzt! Die Landwirtschaft wird zwar unter den Elektronenstürmen leiden, doch das Potenzial für die Energieerzeugung ist unbestreitbar."
 cstorms.3130.desc.magnetic: "Kompassnadeln drehen sich unaufhörlich im Kreis, während sich das Magnetfeld von [owner.capital_scope.GetName] verzerrt.\n\nIndem wir die Kruste unserer Heimatwelt durchbohrten, konnten wir magnetisierte Materie direkt in den Kern injizieren und die natürlichen Stürme durch die daraus resultierenden Feldschwankungen verstärken und magnetisieren. Dies wird die Energieerzeugung erschweren, aber die Entdeckung neuer Mineralvorkommen erleichtern."
 cstorms.3130.desc.gravity: "Noch nie war eine einfache Bewegung so berauschend! Die Schwerkraft nimmt zu und wieder ab, ohne dass man es merkt.\n\nÜber ganz [owner.capital_scope.GetName] verteilte Partikelmanipulationsapparaturen kehrten die Polarität der Tachyonen um, wodurch diese zu knisternden Energiekugeln werden. Da die Kugeln ohne Spur verschwanden und sich die Gravitationswellen in alle Richtungen ausbreiteten, haben unsere [Root.Owner.GetScientistPlural] die These aufgestellt, dass sie in der Zeit zurückgeschickt wurden.\n\nDie daraus resultierenden Fluktuationen werden Arbeiten auf der Planetenoberfläche erschweren, dafür aber das Arbeiten auf Orbitalstationen erleichtern."
 cstorms.3130.a: "Was für ein Erlebnis!"
 cstorms.3130.a.tt.regular: "Während des planetaren Sturms:\n$MOD_POP_HAPPINESS$: §G+20%§!"
 cstorms.3130.a.tt.gestalt: "Während des planetaren Sturms:\n$mod_country_unity_produces_mult$: §G+5%§!"
 cstorms.3140.name: "Gute Schwingungen"
 cstorms.3140.desc.intro: "Unsere [Root.Owner.GetScientistPlural] sind davon überzeugt, dass wir dieselben Ideen, die wir für die Manipulation planetarer Stürme nutzen, auch in einem viel größeren Maßstab anwenden können, da das ganze Sonnensystem nun mit stürmischer Energie geladen ist."
 cstorms.3140.desc.electric: "$cstorms.3140.desc.intro$\n\nWir können unser Wissen und die vorhandene Infrastruktur nutzen, um einen $electric_storm$ heraufzubeschwören, oder aber etwas gänzlich Neues und Aufregendes erschaffen.\n\nBestimmte Mineralien könnten die magnetische Resonanz des Sturms verstärken, wohingegen die Hinzugabe von Legierungen dem Sturm ein starkes Gravitationsfeld verleihen würde."
 cstorms.3140.desc.magnetic: "$cstorms.3140.desc.intro$\n\nWir können unser Wissen und die vorhandene Infrastruktur nutzen, um einen $magnetic_storm$ heraufzubeschwören, oder aber etwas gänzlich Neues und Aufregendes erschaffen.\n\nUnsere Sonne aufzuladen, würde das elektrische Potenzial des Sturms verstärken, wohingegen die Hinzugabe von Legierungen dem Sturm ein starkes Gravitationsfeld verleihen würde."
 cstorms.3140.desc.gravity: "$cstorms.3140.desc.intro$\n\nWir können unser Wissen und die vorhandene Infrastruktur nutzen, um einen $gravity_storm$ heraufzubeschwören, oder aber etwas gänzlich Neues und Aufregendes erschaffen.\n\nBestimmte Mineralien könnten die magnetische Resonanz des Sturms verstärken, wohingegen das Aufladen unserer Sonne das elektrische Potenzial des Sturms steigern würde."
 cstorms.3140.a: "Elektrisiert die Sonne!"
 cstorms.3140.a.tt: "Schafft die Bedingungen für einen kosmischen §Y$electric_storm$§!.\n§Y2§! Jahre lang:$TABBED_NEW_LINE$$mod_country_energy_produces_mult$: §R-50%§!$TABBED_NEW_LINE$$mod_country_unity_produces_mult$: §G+20%§!"
 cstorms.3140.a.infra: "Nutzt die bestehende Infrastruktur."
 cstorms.3140.a.tt.electric: "Schafft die Bedingungen für einen kosmischen §Y$electric_storm$§!.\n§Y2§! Jahre lang:$TABBED_NEW_LINE$$mod_country_unity_produces_mult$: §G+5%§!"
 cstorms.3140.b: "Fügt dem Sturm magnetisierte Mineralien hinzu."
 cstorms.3140.b.tt: "Schafft die Bedingungen für einen kosmischen §Y$magnetic_storm$§!.\n§Y2§! Jahre lang:$TABBED_NEW_LINE$$mod_country_minerals_produces_mult$: §R-50%§!$TABBED_NEW_LINE$$mod_country_unity_produces_mult$: §G+20%§!"
 cstorms.3140.b.tt.magnetic: "Schafft die Bedingungen für einen kosmischen §Y$magnetic_storm$§!.\n§Y2§! Jahre lang:$TABBED_NEW_LINE$$mod_country_unity_produces_mult$: §G+5%§!"
 cstorms.3140.c: "Nutzt spezielle Legierungen."
 cstorms.3140.c.tt: "Schafft die Bedingungen für einen kosmischen §Y$gravity_storm$§!.\n§Y2§! Jahre lang:$TABBED_NEW_LINE$$mod_country_alloys_produces_mult$: §R-25%§!$TABBED_NEW_LINE$$mod_country_unity_produces_mult$: §G+20%§!"
 cstorms.3140.c.tt.gravity: "Schafft die Bedingungen für einen kosmischen §Y$gravity_storm$§!.\n§Y2§! Jahre lang:$TABBED_NEW_LINE$$mod_country_unity_produces_mult$: §G+5%§!"
 cstorms.3160.name: "Nach dem Sturm"
 cstorms.3160.desc: "Als sich der planetare Sturm auflöste, erschien auf [owner.capital_scope.GetName] ein neues dauerhaftes planetares Merkmal. Wieder einmal hat ein Sturm für Veränderung und Wiedergeburt gesorgt.\n\nSo berauschend dieser Sturm auch war: Wir können nur erahnen, welche Möglichkeiten uns ein wahrer kosmischer Sturm bieten würde. Warum nur dauert das so lange?"
 cstorms.3160.a: "Was für ein Erlebnis!"
 cstorms.3160.a.tt.electric: "Der Sturm hat elektrifizierte §Y$d_buzzing_plains$§! auf [owner.capital_scope.GetName] zurückgelassen."
 cstorms.3160.a.tt.magnetic: "Der Sturm hat elektrifizierte §Y$d_geothermal_vent$§! auf [owner.capital_scope.GetName] zurückgelassen."
 cstorms.3160.a.tt.gravity: "Der Sturm hat §Y$d_rich_mountain$§! auf [owner.capital_scope.GetName] enthüllt."
 cstorms.3170.name: "Kosmische Formen"
 cstorms.3170.desc.intro: "Wir können das Entstehen des gewaltigen kosmischen Sturms im [owner.capital_scope.GetStarName]-System beschleunigen, müssen uns dabei allerdings eine Frage stellen: Sind wir wirklich bereit für den Ritt unseres Lebens?\n\n"
 cstorms.3170.desc.scientist.snippet: "Eine Gruppe [Root.Owner.GetScientistPlural], angeführt von §Y[event_target:storm_scientist.GetName]§!, könnte die frühen Muster kosmischer Stürme untersuchen und so den optimalen Weg finden, um ihr Entstehen zu manipulieren.\n\n"
 cstorms.3170.desc.commander.snippet: "Indem wir unsere Flotte, angeführt von §Y[event_target:storm_commander.GetName]§!, entsenden, könnte sie auf den Sturm schießen und seine Energie kaskadieren lassen.\n\n"
 cstorms.3170.desc.outro: "Ob dieses von einem Anführer geleitete Team zurückkehren wird, ist ungewiss. Andererseits könnte es aber auch etwas Großartiges erreichen!"
 cstorms.3170.desc.both: "$cstorms.3170.desc.intro$$cstorms.3170.desc.scientist.snippet$$cstorms.3170.desc.commander.snippet$$cstorms.3170.desc.outro$"
 cstorms.3170.desc.scientist: "$cstorms.3170.desc.intro$$cstorms.3170.desc.scientist.snippet$$cstorms.3170.desc.outro$"
 cstorms.3170.desc.commander: "$cstorms.3170.desc.intro$$cstorms.3170.desc.commander.snippet$$cstorms.3170.desc.outro$"
 cstorms.3170.desc.none: "Wir können nur noch darauf warten, dass der kosmische Sturm Form annimmt.\n\nDie Vorfreude ist schier unerträglich, doch das Ergebnis wird sich lohnen."
 cstorms.3170.a: "Entsendet die [Root.Owner.GetScientistPlural]."
 cstorms.3170.a.tt: "Wissenschaftler §Y[event_target:storm_scientist.GetName]§! ist temporär nicht verfügbar und könnte sterben."
 cstorms.3170.b: "Entsendet das Militär."
 cstorms.3170.b.tt: "Flottenkommandant §Y[event_target:storm_commander.GetName]§! ist temporär nicht verfügbar und könnte sterben."
 cstorms.3170.c: "Wir sollten kein Risiko eingehen und abwarten."
 cstorms.3190.name: "Der Erste von vielen"
 cstorms.3190.desc.intro: "Es begann mit einer kleinen Falte im kosmischen Gefüge. Energien tanzten, verschmolzen und kollidierten. Ein Hauch exotische Partikel, ein Schuss Masse. Schließlich manifestierte sich jenes Ungeheuer von Sturm, das unseren Stern umkreist.\n\nNach unseren Wünschen geformt beherrscht dieser Segen der Natur und unseres Einfallsreichtums den Himmel."
 cstorms.3190.desc.success: "$cstorms.3190.desc.intro$ Dass unser Anführer den Sturm geritten hat, hat eine große Begeisterungswelle ausgelöst.\n\nWir haben das getan. Wir allein. Lasst uns diesen Sturm bezwingen und den Nervenkitzel unseres Lebens erleben!"
 cstorms.3190.desc.failure: "$cstorms.3190.desc.intro$ Unser Anführer ging zwar im Sturm verloren, doch was für ein grandioser Abgang!\n\nWir haben das getan. Wir allein. Lasst uns diesen Sturm bezwingen und den Nervenkitzel unseres Lebens erleben!"
 cstorms.3190.desc.wait: "$cstorms.3190.desc.intro$ Wir haben lange Zeit auf diesen Moment gewartet, und nun ist der Tag endlich gekommen.\n\nWir haben das getan. Wir allein. Lasst uns diesen Sturm bezwingen und den Nervenkitzel unseres Lebens erleben!"
 cstorms.3190.a.success: "Auf in den Sturm!"
 cstorms.3190.a.failure: "Werdet Zeuge seiner Macht!"
 cstorms.3190.a.failure.tt: "\nUnser Anführer ging ruhmreich von uns."
 cstorms.3190.a.wait: "Makellos!"
 ### Storm Fever ###
 #Modifiers for Storm Fever event chain
 cs_storm_chasers_bad_vibes: "Schlechtes Gefühl"
 cs_storm_chasers_bad_vibes_desc: "Langeweile macht sich breit."
 cstorms.3205.name: "Unstillbares Verlangen"
 cstorms.3205.normal: "Die kosmischen Schwingungen lassen allmählich nach, und was zuvor noch als Heldentat galt, löst nicht mehr dieselbe Begeisterung aus wie früher. Zweifellos haben wir Unglaubliches geleistet, doch nun macht sich ein Gefühl der Leere breit. Die Errungenschaften unserer Vorfahren, die sowohl in ihrem Umfang als auch ihrem Streben legendär waren, werfen einen langen Schatten.\n\n\"Dieses Problem ist existenziell\", schrieb kürzlich einer unserer führenden Köpfe. \"Haben wir, als wir die Leere durchquerten, eine Leere in uns selbst geschaffen?\"\n\nDie Angst ist real, und um sie zu überwinden, müssen wir dahin zurückkehren, wo alles begann: zu einer Reihe von Herausforderungen, die man einzig zu dem Zweck entwickelte, ein Höchstmaß an Adrenalin zu erzeugen!"
 cstorms.3205.gestalt: "Die kosmischen Schwingungen sind abgeklungen, und andere Herausforderungen rufen einfach nicht mehr dieselbe Euphorie in uns hervor wie früher. Zweifellos haben wir Unglaubliches geleistet, doch nun macht sich ein Gefühl der Leere breit.\n\nWir werden von Fragen geplagt: Wissen wir wirklich, wer wir sind? Liegen unsere glorreichen Zeiten hinter uns? Als Kollektiv liegt es in unserer eigenen Verantwortung, die beste Version unserer selbst zu werden.\n\nDie Angst ist real, und um sie zu überwinden, müssen wir dahin zurückkehren, wo alles begann: zu einer Reihe von Herausforderungen, die man einzig zu dem Zweck entwickelte, ein Höchstmaß an Adrenalin zu erzeugen!"
 cstorms.3205.a: "Der Nervenkitzel hat gerade erst begonnen."
 cstorms.3205.tooltip: "Erfahrt mehr über die Herausforderungen der Vergangenheit im Situationsprotokoll."
 cstorms.3215.name: "Abklingendes Fieber"
 cstorms.3215.intro: "Wir haben es geschafft!\n\nWir haben uns der Herausforderung gestellt, danach zu streben, den puren Nervenkitzel zu suchen. Seht nur, was wir in den letzten Jahren erreicht haben!"
 cstorms.3215.desc: "$cstorms.3215.intro$\n\nWie die tapferen Pioniere unserer Heimatwelt sind auch wir über unsere Grenzen hinausgegangen.\n\nMehr noch: Dadurch, dass wir uns mit dem Zorn der Natur auseinandersetzten, konnten wir unglaubliche Einblicke in die Natur von Stürmen erlangen und sogar in unsere eigene Existenz."
 cstorms.3215.a: "Wir sind zurück!"
 ### Storm Frenzy ###
 cs_storm_chasers_storm_frenzy_1: "Sturmrausch"
 cs_storm_chasers_storm_frenzy_1_desc: "Die Aussicht, einen gewaltigen Sturm miterleben zu dürfen, versetzt uns in einen Zustand der Euphorie."
 cs_storm_chasers_storm_frenzy_2: "$cs_storm_chasers_storm_frenzy_1$"
 cs_storm_chasers_storm_frenzy_2_desc: "$cs_storm_chasers_storm_frenzy_1_desc$"
 cs_storm_chasers_storm_frenzy_3: "$cs_storm_chasers_storm_frenzy_1$"
 cs_storm_chasers_storm_frenzy_3_desc: "$cs_storm_chasers_storm_frenzy_1_desc$"
 cs_storm_chasers_storm_frenzy_1_gestalt: "$cs_storm_chasers_storm_frenzy_1$"
 cs_storm_chasers_storm_frenzy_1_gestalt_desc: "Die Aussicht, einen gewaltigen Sturm miterleben zu dürfen, entflammt unser Bewusstsein."
 cs_storm_chasers_storm_frenzy_2_gestalt: "$cs_storm_chasers_storm_frenzy_1$"
 cs_storm_chasers_storm_frenzy_2_gestalt_desc: "$cs_storm_chasers_storm_frenzy_1_gestalt_desc$"
 cs_storm_chasers_storm_frenzy_3_gestalt: "$cs_storm_chasers_storm_frenzy_1$"
 cs_storm_chasers_storm_frenzy_3_gestalt_desc: "$cs_storm_chasers_storm_frenzy_1_gestalt_desc$"
 cs_storm_chasers_the_code: "Der Kodex"
 cs_storm_chasers_the_code_desc: "Es ist nicht die Vorherrschaft über die Galaxie, die uns antreibt, und auch nicht der materielle Gewinn. Wir leben, um unsere Grenzen zu testen. Wir glauben daran, an der Speerspitze der Möglichkeiten unseres Daseins zu stehen!"
 cs_storm_chasers_the_code_gestalt: "Der Kodex"
 cs_storm_chasers_the_code_gestalt_desc: "$cs_storm_chasers_the_code_desc$"
 every_empire_opinion_hit: "Die Meinung §Y[global_event_country.GetGalCommunityOrGalImperiumDE2]§! über uns ändert sich um:"
 nexus_opinion_first_hit: "Nexus-Besorgnis"
 nexus_opinion_first_hit_tt: "$every_empire_opinion_hit$ §R$@first_hit_opinion_change$§!"
 nexus_opinion_second_hit: "Nexus-Abneigung"
 nexus_opinion_second_hit_tt: "$every_empire_opinion_hit$ §R$@second_hit_opinion_change$§!"
 nexus_opinion_third_hit: "Nexus-Angst"
 nexus_opinion_third_hit_tt: "$every_empire_opinion_hit$ §R$@third_hit_opinion_change$§!"
 nexus_opinion_summon_hit: "Nexus-Wut"
 nexus_opinion_summon_hit_tt: "$every_empire_opinion_hit$ §R$@nexus_hit_opinion_change$§!"
 nexus_opinion_the_code: "Nexus-Versöhnung"
 cs_stormfrenzy_chain_title: "Sturmrausch"
 cs_stormfrenzy_chain_desc: "Wir sind schon immer über unsere Grenzen hinausgegangen und haben uns von den Heldentaten unserer Vorgänger inspirieren lassen. Alles, um den Sturm unserer Träume zu formen."
 cstorms.3220.name: "Das Credo eines Jägers"
 cstorms.3220.desc: "Unser Volk wird nie aufhören, nach dem nächsten Nervenkitzel zu suchen. Jeden Tag stellen wir uns unglaublichen Situationen und immer größeren Herausforderungen, doch [ruler.GetRegnalName] denkt, wir sollten noch weiter gehen:\n\n\"Das Auge eines kosmischen Sturms wird unser volles Potenzial entfalten, ein Sturm, der stark genug ist, um den Status quo zu zerfetzen und den Adrenalinrausch unseres Lebens zu entfesseln.\"\n\nEs ist an der Zeit, dass wir einen Sturm von wahrhaft epischem Ausmaß heraufbeschwören, einen Nexus eines ekstatischen Pandämoniums: den wirklich Großen! Es fehlen nur noch zwei Dinge: eine abschließende Studie, um genau zu bestimmen, wie wir den perfekten Sturm heraufbeschwören können, und was der Rest der Galaxie davon hält, sollten wir uns wirklich dazu entschließen, dies zu tun.\n\nSo etwas ins Leben zu rufen, wird sicherlich auf einige Ablehnung stoßen."
 PROJECT_SOW_THE_BIG_ONE: "Den Großen anlocken"
 PROJECT_SOW_THE_BIG_ONE_DESC: "Wir verfügen zwar über die nötige Technologie, aber solange es keinen aufkeimenden Sturm in der Nähe gibt, müssen wir selbst erforschen, wie man die Saat ausbringt und einen Sturm herbeibeschwört, den wir formen können."
 cstorms.3222.name: "Sturmkultivierung durch Dunkle Materie"
 cstorms.3222.desc: "Die einzigartigen Eigenschaften von Dunkler Materie machen sie zum perfekten Katalysator, um \"den Großen\" zu erschaffen. Wir werden dieses schwer fassbare Material in das Raumgefüge unseres Heimatsystems injizieren und auf die ersten Wellen des Sturms warten.\n\nDieses Vorhaben hat jedoch auch unerwünschte Aufmerksamkeit erregt: Unsere Nachbarn haben begonnen, dagegen zu protestieren. \"Scheinbar ist nicht jeder so begeistert wie wir, diese besondere Welle zu reiten\", klagten unsere [Root.Owner.GetScientistPlural]."
 cstorms.3222.a: "Zeit zum Loslegen."
 cstorms.3222.b: "Wir müssen erst einige Ressourcen einlagern."
 PROJECT_DARK_SEEDING: "Exotische Verlockung"
 PROJECT_DARK_SEEDING_DESC: "Durch die sorgfältige Injektion von Dunkler Materie in das Raumgefüge dieses Systems wird ein kosmischer Sturm herbeibeschworen."
 cstorms.3224.name: "Ankunft des \"Großen\""
 cstorms.3224.desc: "Es ist einfach unglaublich! Die Vibrationen des heraufziehenden Sturms sind bereits zu spüren. Für unsere [Root.Owner.GetScientistPlural] gibt es noch viel zu tun, aber wir sind dem \"Großen\" bereits einen Schritt näher.\n\nUnsere Nachbarn sind jedoch weniger glücklich darüber. Sie behaupten, wir mischen uns in Kräfte ein, die wir unmöglich verstehen können, geschweige denn kontrollieren, und dies hat sich bereits negativ auf unsere Beziehungen ausgewirkt."
 cstorms.3224.a: "Es ist, wie es ist."
 cstorms.3225.name: "Den \"Großen\" füttern"
 cstorms.3225.desc: "Die Daten sind eindeutig: Was auch immer wir in diesen Sturm gesteckt haben, es wird etwas Ähnliches hervorbringen. Wenn wir den Sturm also mit den richtigen Ressourcen füttern, wird er die Eigenschaften - und epischen Proportionen - aller Stürme gleichzeitig annehmen.\n\nAndere galaktische Reiche haben erneut ihre Besorgnis zum Ausdruck gebracht, doch der Ritt des Jahrhunderts wartet auf uns! Füttern wir den Sturm mit dem, was wir haben!"
 cstorms.3225.a: "Füttert den Sturm!"
 cstorms.3225.b: "Wir benötigen mehr Ressourcen."
 cstorms.3226.name: "Das ultimative Festmahl"
 cstorms.3226.desc: "Wir müssen dem aufziehenden Sturm eine Vielzahl von Nährstoffen zur Verfügung stellen, wenn wir einen Sturm epischen Ausmaßes schaffen wollen. Für diese erstaunliche Großtat bedarf es ganz bestimmter Ressourcen aus unserem Besitz."
 PROJECT_EVERY_ITEM_ON_THE_MENU: "Etwas von der Speisekarte"
 PROJECT_EVERY_ITEM_ON_THE_MENU_DESC: "Wir wissen jetzt, dass sich ein kosmischer Sturm manipulieren lässt, indem man ihn mit den richtigen Ressourcen füttert. Für diesen benötigen wir bestimmte Ressourcen."
 PROJECT_EVERY_ITEM_ON_THE_MENU_REPEAT: "Wiederholung: $cstorms.3225.name$"
 PROJECT_EVERY_ITEM_ON_THE_MENU_REPEAT_DESC: "Den perfekten Sturm zu schaffen, erfordert das sorgfältige Hinzufügen von Ressourcen."
 cstorms.3227.name: "Der letzte Schubs"
 cstorms.3227.desc: "Die Begeisterung ist überall zu spüren. Der vor uns liegende Weg ist klar: weiter drängen, härter drängen - so lange, bis wir ganz durch sind. Wir müssen eins mit dem kosmischen Rausch werden! Alle Vorbereitungen sind abgeschlossen. Wir sind bereit, den \"Großen\" zu empfangen! Wir müssen ihm nur noch einen kleinen, letzten Schubs geben.\n\nUnsere Nachbarn sind außer sich vor Wut und behaupten, unser sogenannter \"$nexus_storm$'' werde Verwüstungen galaktischen Ausmaßes anrichten. Doch sollen wir uns wirklich von solchen Spaßverderbern von einem Projekt mit derart epischen Ausmaßen abbringen lassen? Wir müssen diese Entscheidung jetzt treffen."
 cstorms.3227.a: "Der \"Große\" ist unser ultimatives Schicksal!"
 cstorms.3227.a.tt: "Ein $nexus_storm$ trifft in 40 Tagen ein.\n$nexus_opinion_third_hit_tt$"
 cstorms.3227.b: "Nein, wir wissen es besser!"
 cstorms.3227.b.tt: "Der $nexus_storm$ wird abgebrochen.\n§YDie Meinung [global_event_country.GetGalCommunityOrGalImperiumDE2]§! verbessert sich in 40 Tagen."
 cstorms.3230.name: "Die Entstehung des \"Großen\""
 cstorms.3230.desc: "Wir stehen am Rand einer neuen Erfahrung. Die ultimative Katastrophe. Unsere Sturmjäger schrecken vor keiner Herausforderung zurück.\n\nLasst die Galaxie ihre Namen hören!"
 cstorms.3230.a: "Tut es!"
 has_spawned_nexus_storm_tt: "$TRIGGER_FAIL$Hat einen §Y$nexus_storm$§! hervorgebracht"
 cstorms.3235.name: "Sturmkodex"
 cstorms.3235.desc: "Wir haben viel gelernt und verstehen jetzt, dass die Galaxie kein Spielzeug, sondern ein Abenteuer ist, das erlebt werden will.\n\n[ruler.GetRegnalName] sagte einst: \"In diesem Leben mangelt es uns nicht an Nervenkitzel. Wir werden nie aufhören, die nächste Herausforderung zu suchen, doch wir müssen dies respektvoll tun. Das ist der Weg, der uns wahrlich vorherbestimmt ist.\""
 cstorms.3235.a: "Bleibt locker!"
 cstorms.3235.a.tt: "$every_empire_opinion_hit$ §G+$@the_code_total_change$§!"
 #Storm Fever Challenges
 cs_stormfever_chain_title: "Sturmfieber"
 cs_stormfever_chain_desc: "Um neue Höhen zu erreichen, wahre Freude zu genießen und unsere Grenzen zu testen, machen wir uns an eine Reihe von Prüfungen. Lasst den Spaß beginnen!"
 challenges_completed: "Abgeschlossene Herausforderungen"
 MISSION_CS_STORM_FEVER_CHALLENGE_1: "Besiegt eine Flotte in einem Sturm"
 MISSION_CS_STORM_FEVER_CHALLENGE_1_DESC: "Die Hitze des Gefechts war seit jeher ein Ort, um sich zu beweisen. Und jetzt stelle man sich nur vor, solch ein Gefecht inmitten eines kosmischen Sturms zu erleben! Zeigen wir der Galaxie, dass unsere Wildheit keine Grenzen kennt.\n\nDie derzeitige Herausforderung liegt darin, eine feindliche Flotte in einem Sturm zu besiegen."
 fleets_defeated_in_storm: "Flotten in einem Sturm besiegt"
 MISSION_CS_STORM_FEVER_CHALLENGE_2: "Den Rand der Galaxie erkunden"
 MISSION_CS_STORM_FEVER_CHALLENGE_2_DESC: "Über unsere eigenen Grenzen hinauszugehen, am Rand der Sterne zu balancieren, die entferntesten Weiten des Weltraums zu aufzusuchen - gibt es etwas Belebenderes?\n\nWir müssen ein Forschungsschiff in das ausgewiesene System schicken - ganz egal, wie."
 far_edge_explored: "Rand der Galaxie erkundet"
 MISSION_CS_STORM_FEVER_CHALLENGE_3: "Auf den Stürmen reiten"
 MISSION_CS_STORM_FEVER_CHALLENGE_3_DESC: "Die Besten der Besten sehnen sich nach dem Nervenkitzel eines kosmischen Sturms. Lasst sie segeln!\n\nUnsere nächste Herausforderung liegt darin, einem Sturmreiter dabei zu helfen, 180 Tage in einem kosmischen Sturm zu überstehen."
 days_storm_rider_spend_in_storm: "Tage, die der Sturmreiter in einem Sturm verbracht hat"
 MISSION_CS_STORM_FEVER_CHALLENGE_4: "Untersucht das Unbekannte"
 MISSION_CS_STORM_FEVER_CHALLENGE_4_DESC: "Eine Galaxie voll vergrabener Schätze und uralter Geheimnisse - und einem fiesen Wind, der sie aufrüttelt! Lasst uns losziehen und diese Geheimnisse lüften!\n\nWir fordern uns selbst heraus und erforschen eine Anomalie oder eine Archäologische Stätte, die von einem kosmischen Sturm aufgedeckt wurde."
 storm_unraveled_event_investigated: "Untersuchte Anomalien oder Ausgrabungsstätten"
 MISSION_CS_STORM_FEVER_CHALLENGE_5: "Verbreitet Freude"
 MISSION_CS_STORM_FEVER_CHALLENGE_5_DESC: "Warum sollten nur wir den ganzen Spaß haben? Abenteuer erlebt man am besten gemeinsam.\n\nDamit sich unsere Nachbarn einbezogen fühlen, liegt die Herausforderung jetzt darin, einen kosmischen Sturm innerhalb ihrer Grenzen zu treiben."
 send_storm_to_other_empire: "An andere Reiche gesendete Stürme"
 MISSION_CS_STORM_FEVER_CHALLENGE_6: "Erliegt dem Sturm"
 MISSION_CS_STORM_FEVER_CHALLENGE_6_DESC: "Es ist nicht unsere Art, alt zu werden und in Vergessenheit zu geraten. Wir leben dafür, im Glanz unserer eigenen Herrlichkeit auszubrennen!\n\nDie nächste Herausforderung besteht darin, einem Sturmreiter dabei zu helfen, seine letzten Momente in einem kosmischen Sturm zu erleben."
 rider_died_in_storm: "Getötete oder vermisste Sturmreiter"
 #Challenge completed intro
 challenge_completed_intro: "Neue Höhen wurden erreicht und Grenzen überwunden! Das ist genau das, was es braucht, um die Emotionen in Schwung zu bringen. Wir haben die Prüfung abgeschlossen!"
 #Challenge 1 completed
 challenge_completed: "Herausforderung abgeschlossen:"
 cstorms.305.name: "$challenge_completed$ $MISSION_CS_STORM_FEVER_CHALLENGE_1$"
 cstorms.305.desc: "$challenge_completed_intro$\n\nIhre Flotte hatte nie eine wirkliche Chance. Wer wird uns wohl als Nächstes herausfordern?"
 cstorms.305.a: "Es fühlt sich so gut an!"
 #Challenge 2 completed
 cstorms.310.name: "$challenge_completed$ $MISSION_CS_STORM_FEVER_CHALLENGE_2$"
 cstorms.310.desc: "$challenge_completed_intro$\n\nDie Galaxie hat einem so viel zu bieten! Es wird nie langweilig und es hat keinen Sinn, jetzt aufzuhören. Auf zur nächsten Herausforderung!"
 cstorms.310.a: "Weiter geht's!"
 #Challenge 3 completed
 cstorms.315.name: "$challenge_completed$ $MISSION_CS_STORM_FEVER_CHALLENGE_3$"
 cstorms.315.desc.normal: "$challenge_completed_intro$\n\nUnser Sturmreiter meldet sich mit lautem Jubel zurück. Der Nervenkitzel der kosmischen Stürme ist auf einem völlig anderen Niveau!"
 cstorms.315.desc.gestalt: "$challenge_completed_intro$\n\nWir sind von einem Hochgefühl erfüllt. Die kosmischen Stürme sind einfach so aufregend!"
 cstorms.315.a: "Niemals Langeweile!"
 #Challenge 4 completed
 cstorms.320.name: "$challenge_completed$ $MISSION_CS_STORM_FEVER_CHALLENGE_4$"
 cstorms.320.desc: "$challenge_completed_intro$\n\nIn alte Geheimnisse einzutauchen und vergrabene Schätze zu entdecken, ist stets ein Nervenkitzel. Wer weiß, was da draußen noch so lauert und nur darauf wartet, gefunden zu werden?"
 cstorms.320.a: "Endlose Möglichkeiten!"
 #Challenge 5 completed
 cstorms.325.name: "$challenge_completed$ $MISSION_CS_STORM_FEVER_CHALLENGE_5$"
 cstorms.325.desc: "$challenge_completed_intro$\n\nDer Sturm wütete in ihrem Reich und brachte ihnen Nervenkitzel und Chaos zugleich! Mit dem Wissen, unseren Nachbarn ein solch unglaubliches Erlebnis geboten haben, können wir uns endlich beruhigt zurücklehnen.\n\nSie werden das alles jetzt vielleicht noch nicht zu schätzen wissen, aber sie werden es uns irgendwann danken."
 cstorms.325.a: "Wir sind Geber!"
 #Challenge 6 completed
 cstorms.330.name: "$challenge_completed$ $MISSION_CS_STORM_FEVER_CHALLENGE_6$"
 cstorms.330.desc.normal: "$challenge_completed_intro$\n\nDer große Sturm rief einen Namen und die Antwort kam mit freudigem Jubel. Hoch lebe der Sturmreiter - was für eine Legende! Möge die Reise ins Jenseits so episch sein wie der Abgang von dieser Bühne."
 cstorms.330.desc.gestalt: "$challenge_completed_intro$\n\nDer große Sturm hat einen Teil von uns dazu aufgerufen, sich ihm in einem jubelnden Abgang anzuschließen. Einen Knoten zu verlieren, hat sich noch nie so bedeutungsvoll und belebend angefühlt! Diese epische Erfahrung wird unsere Spezies für viele Jahre prägen."
 cstorms.330.a: "Auf in den Sturm!"
 cstorms.331.desc.normal: "$challenge_completed_intro$\n\nDer große Sturm rief einen Namen und die Antwort kam mit freudigem Jubel. Hoch lebe der Sturmreiter - was für eine Legende!"
 cstorms.331.desc.gestalt: "$challenge_completed_intro$\n\nDer große Sturm hat einen Teil von uns dazu aufgerufen, sich ihm in einem jubelnden Abgang anzuschließen. Fast einen Knoten zu verlieren, hat sich noch nie so bedeutungsvoll und belebend angefühlt! Diese epische Erfahrung wird unsere Spezies für viele Jahre prägen."
 electric_storm_desc: "Die zusammenstoßenden elektromagnetischen Felder verleihen diesem kosmischen Sturm eine gefährliche elektrische Ladung. Besonders heikel für Schilde, aber nützlich für die planetare Produktion."
 particle_storm_desc: "Diese Stürme scheinen fast lebendig und bewegen sich innerhalb des galaktischen Gefüges und durch es hindurch, ohne Raumschiffe gezielt zu jagen oder zu meiden. Ihre bloße Anwesenheit ist gefährlich instabil und reicht aus, um eine ganze Zivilisation auszulöschen."
 gravity_storm_desc: "Kollidieren riesige Himmelskörper, erzeugt der Aufprall Gravitationswellen, die durch die gesamte Galaxie gehen. Sobald diese wiederum in sich zusammenbrechen, wird ein Schwerkraftsturm geboren. Dieser wirkt sich negativ auf die Zielsuchsysteme von Schiffen aus und die Gravitationsfluktuation zwingt jeden, zu Hause zu bleiben."
 magnetic_storm_desc: "Kommt ein metallreicher Asteroidengürtel mit starken Gravitationskräften in Kontakt, bildet sich ein Magnetfeld im Inneren des Gürtels. Stürme dieser Art zerreißen Schiffsrümpfe und behindern industrielle Bauvorhaben, doch sie sorgen auch dafür, dass wertvolle Mineralien aus der Planetenkruste nach oben befördert werden."
 solar_storm_desc: "Ein $solar_storm$ erzeugt eine Energieschwankung innerhalb des Raumgefüges, was Sterne in unberechenbaren Sonneneruptionen ausbrechen lässt. Die daraus resultierende Strahlung ist extrem gefährlich, erhöht aber auch die Produktion von Raumstationen und macht es Schiffen schwerer, im Verborgenen zu bleiben."
 celestial_storm_desc: "Staub von Millionen von Planeten treibt ständig ziellos durch die Galaxie. Manchmal sammeln sich diese Körner in so großen Mengen an, dass ein Staubsturm entsteht. Dieser kann die Kommunikation auf dem gesamten Planeten stören, doch die chemischen Elemente, die er mit sich bringt, können für die Ressourcenproduktion äußerst nützlich sein. Objekte, die in diese Stürme geraten, könnten auch gar nicht existieren, was unsere eigenen Scanner angeht."
 shroud_storm_desc: "In seltenen Fällen kommt es vor, dass man das Flüstern des Schleiers in der physischen Welt wahrnehmen kann. Diese extrem seltenen Stürme setzen bei empfindungsfähigen Wesen Visionen frei, die sowohl außergewöhnlich als auch abscheulich sein können. Diejenigen, die bereits mit dem Schleier kommuniziert haben, können sogar von der unbeständigen Synergie profitieren."
 nexus_storm_desc: "Wenn die Sterne richtig stehen, kann selbst ein kleiner kosmischer Sturm über die üblichen Grenzen hinauswachsen. Dieses seltene Ereignis wird Schrecken apokalyptischen Ausmaßes entfesseln. In dieser Ausgeburt der Hölle gibt es kein blühendes Leben, sondern nur nacktes Überleben."
 FROM_STORM: "Durch Stürme"
 #Planetary modifiers
 hyper_ecosystem: "Hyper-Ökosystem"
 hyper_ecosystem_desc: "Der Boden dieses Planeten enthält hohe Konzentrationen an Stickstoff und Phosphor, die von natürlich gebildeten Mineralien in der Kruste absorbiert werden. Dies führt zu einem außergewöhnlich raschen Pflanzenwachstum - ideal für die Landwirtschaft, doch unvorteilhaft für alle anderen Bauprojekte."
 docile_fauna: "Fügsame Fauna"
 docile_fauna_desc: "Die Tier- und Pflanzenwelt des Planeten hat kaum natürliche Feinde, was sie ungewöhnlich fügsam und angenehm macht. Die Bevölkerung wird eher durch Sturmschäden als durch das Überleben der Stärkeren auf die Probe gestellt."
 obsidian_lakes: "Obsidianseen"
 obsidian_lakes_desc: "Die tektonischen Aktivitäten haben dazu geführt, dass die Magmaseen abgekühlt sind. Diese haben riesige Obsidianschichten erschaffen und damit wertvolle Ressourcen viel näher an die Oberfläche befördert."
 obsidian_lakes_volcanic: "$obsidian_lakes$"
 obsidian_lakes_volcanic_desc: "$obsidian_lakes_desc$"
 crimson_crawlers: "Karminrote Kriecher"
 crimson_crawlers_tt: "§R$COLONIZATION_IMPOSSIBLE_CRIMSON_CRAWLERS$§!"
 crimson_crawlers_desc: "Die Oberfläche des Planeten ist aufgrund Billionen winziger roter Insekten wie ein karminroter Teppich. Trotz ihrer unglaublichen Anzahl wirken sie harmlos und haben ein anfälliges Gleichgewicht innerhalb des Ökosystems hergestellt."
 metal_planet: "Metallplanet"
 metal_planet_desc: "Dieser Planet ist vollständig von natürlichem Rohmetall bedeckt. Es fehlen grundlegende lebensnotwendige Ressourcen wie Wasser oder eine atmungsaktive Atmosphäre, doch er hat zumindest viele nutzbare Ressourcen."
 terraform_fail_is_metal_planet: "Dieser Planet kann aufgrund seiner metallischen Kruste nicht terraformiert werden."
 previously_terraformed_planet: "Zuvor terraformierter Planet"
 previously_terraformed_planet_desc: "Eine felsige Welt mit einer Stickstoff-Sauerstoff-Atmosphäre und vielen Ozeanen. Es gibt Hinweise darauf, dass ein uraltes Reich diesen Planeten bereits schon einmal erreichte und kolonisierte, seitdem jedoch in Vergessenheit geriet. Das bedeutet, es gibt viel zu entdecken und zu finden, aber auch, dass der Planet bereits für eine Kolonie vorbereitet ist!"
 previously_terraformed_planet_tt: "Frühere Terraforming-Versuche machen es viel einfacher, diesen Planeten in eine Gaia-Welt zu verwandeln."
 has_patriotic_institute: "Das Patriotische Institut der Feierlichkeiten"
 has_patriotic_institut_desc: "Dieser Planet war einst die Heimat der adAkkaria-Konvention. Das Patriotische Institut der Feierlichkeiten ist alles, was von dieser einst mächtigen Zivilisation übrig geblieben ist."
 has_patriotic_institute_tt: "Hat das Gebäude \"$building_adakkaria_patriotic_institute$\". Kolonisiert den Planeten, um der Eigentümer zu werden."
 adakkaria_patriotic_institute_desc.supercharged: "Hat die Chance, jedes Jahr zum Preis von §Y100§! £pop£ §HBewohnern§! einen Sturm im System auszulösen."
 #Planet Modifiers
 crimson_crawlers_sashimi_style: "Karminrote Kriecher: Rohverzehr"
 crimson_crawlers_sashimi_style_desc: "Die Oberfläche des Planeten ist wegen der Billionen winziger roter Insekten tief karminrot gefärbt. Selbst roh verzehrt sind sie eine köstliche Nahrungsquelle."
 crimson_crawlers_bbq_them: "Karminrote Kriecher: Gekochte Nahrung"
 crimson_crawlers_bbq_them_desc: "Die Oberfläche des Planeten ist wegen der Billionen winziger roter Insekten tief karminrot gefärbt. Die Bevölkerung hat große Freude daran, sie zu grillen und zu verspeisen."
 COLONIZATION_IMPOSSIBLE_CRIMSON_CRAWLERS: "§RDieser Planet kann nicht von Maschinen oder Terravoren kolonisiert werden.§!"
 #New planet types modifiers
 collided_planet: "Kollidierter Planet"
 collided_planet_desc: "Zwei Planeten stießen zusammen, doch anstatt sich gegenseitig zu zerstören, sind sie miteinander verschmolzen. Die Welt hat dadurch zwar eine vergrößerte Nutzfläche, stellt einen aber auch vor einzigartige Wohn- und Bauherausforderungen."
 wooden_planet: "Arboreale Welt"
 wooden_planet_desc: "Über Jahrtausende hat sich über der Planetenkruste eine dichte Schicht von Wurzeln gebildet, die mehrere Kilometer dick ist. Sie ist ein einziger, riesiger lebender Organismus."
 wooden_planet_tt: "Wohnungen zu bauen und zu unterhalten, kostet $w_food$.\nFarmen zu bauen, kostet $w_food$."
 #Eruption Event
 recent_eruption: "Kürzliche Eruption"
 eruption_report_tooltip: "\nDie Berichte werden innerhalb von 30 Tagen eintreffen."
 colony_mod.31.name: "Eruption!"
 colony_mod.31.desc: "Die tektonischen Ereignisse auf [Root.GetName] haben dazu geführt, dass die Obsidiandecke auf einer der Platten gesprungen ist. Lava strömt über die Oberfläche und vernichtet alles auf ihrem Weg. Die Berichte aus der Kolonie sind erschreckend"
 colony_mod.31.a: "Lasst sie uns hören."
 colony_mod.32.name: "Schadensbericht der Eruption"
 colony_mod.32.desc: "Die kürzliche Eruption der Obsidianfelder, die unsere Kolonie auf [Root.GetName] durchschüttelte, hat sich in einen aktiven Vulkan verwandelt! Alles, was dort einmal existierte, ist jetzt unter geschmolzenem Gestein begraben."
 colony_mod.33.desc: "Die kürzliche Eruption der Obsidianfelder, die unsere Kolonie auf [Root.GetName] durchschüttelte, verursachte unerwarteterweise keinen Schaden. Dank einer glücklichen Fügung zersprang auch der Obsidian in kleinere Stücke, was es uns einfacher macht, ihn zu sammeln."
 colony_mod.34.desc: "Die kürzliche Eruption der Obsidianfelder schüttelte unsere Kolonie auf [Root.GetName] durch, verursachte aber unerwarteterweise keinen Schaden."
 #Aftermath modifiers
