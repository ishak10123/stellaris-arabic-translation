 cstorms.2000.name: "Sturmvorbereitung"
 cstorms.2000.desc_common_1: "Alle nötigen Vorbereitungen wurden getroffen und wir sind bereit, den §Ykosmischen Sturm§! im §H[target.solar_system.GetName]§!-System zu entfesseln.\n\nDurch die temporäre Überladung von [target.GetName] können wir die idealen Bedingungen schaffen, um die gewünschte astrometeorologische Reaktion hervorzurufen."
 cstorms.2000.desc_tech: "\nMit unseren fortschrittlichen Energiemanipulationsmethoden könnten wir [target.GetName] mit Rohstoffen übersättigen, um einen strukturell komplexeren Sturm zu schaffen."
 cstorms.2000.desc_common_2: "\nDies wird ein zeitaufwendiges Unterfangen sein, doch das Ergebnis wird phänomenal für [owner.GetName]. Der Stern selbst bleibt nach Entfesselung des Sturms völlig intakt."
 cstorms.2000.a: "Überladet den Stern."
