 #Storm Visible Events
 MESSAGE_COSMIC_STORM_SPOTTED_DESC: "Unsere Scanner haben einen kosmischen Sturm des Typs \"$TYPE|Y$\" registriert! Wir haben ihm den Namen \"$NAME|Y$\" gegeben.\n\n"
 MESSAGE_COSMIC_STORM_SPOTTED_EVENT_CONFIRM: "Interessant."
 MESSAGE_STORM_INTRO: "Diese Art von Sturm wird verheerende Auswirkungen auf Kolonien und den Not-ÜL-Sprung von Flotten haben. Es wird dringend empfohlen, Präventionsmaßnahmen zu ergreifen.\n\n"
 MESSAGE_ELECTRIC_STORM_COSMIC_STORM_SPOTTED_DESC: "$MESSAGE_COSMIC_STORM_SPOTTED_DESC$$MESSAGE_STORM_INTRO$Die extreme elektrische Ladung, die der Sturm in sich trägt, wird die Schilde unserer Flotten unbrauchbar machen. Wir erwarten allerdings auch, dass der Energieüberschuss sich dazu nutzen lässt, in unseren Kolonien die Produktion und die Baugeschwindigkeit von Schiffen zu erhöhen."
 MESSAGE_SOLAR_STORM_COSMIC_STORM_SPOTTED_DESC: "$MESSAGE_COSMIC_STORM_SPOTTED_DESC$$MESSAGE_STORM_INTRO$Die Strahlung dieses Sturms wird Flotten, die darin gefangen sind, für jeden sichtbar machen, der den Sturm auf seinen Scannern hat. Dies stellt zwar ein gewisses Sicherheitsrisiko dar, doch unsere Stationen werden unter diesen Bedingungen viel effizienter arbeiten."
 MESSAGE_CELESTIAL_STORM_COSMIC_STORM_SPOTTED_DESC: "$MESSAGE_COSMIC_STORM_SPOTTED_DESC$$MESSAGE_STORM_INTRO$Diese Art von Sturm wird unsere Sensoren stören, was es unmöglich macht, Flotten in diesen Systemen zu erkennen, und er wird Raumreisen verlangsamen. Einige Jobs können diese Bedingungen jedoch zu ihrem Vorteil zu nutzen und ihre Leistung erhöhen."
 MESSAGE_NEXUS_STORM_COSMIC_STORM_SPOTTED_DESC: "$MESSAGE_COSMIC_STORM_SPOTTED_DESC$$MESSAGE_STORM_INTRO$Diese Art von Sturm stellt eine extreme Gefahr für unsere Kolonien, Flotten und Stationen dar. Sie werden schweren Schaden nehmen, solange er anhält."
 MESSAGE_SHROUD_STORM_COSMIC_STORM_SPOTTED_DESC: "$MESSAGE_COSMIC_STORM_SPOTTED_DESC$$MESSAGE_STORM_INTRO$Die starke Konzentration psionischer Energie in diesem Sturm wird die Stabilität unserer Kolonien erheblich beeinträchtigen, dafür aber auch die Effektivität von Ausweichmanövern erhöhen."
 MESSAGE_SHROUD_STORM_COSMIC_STORM_SPOTTED_SHROUD_BREACHED_DESC: "$MESSAGE_COSMIC_STORM_SPOTTED_DESC$$MESSAGE_STORM_INTRO$Die starke Konzentration psionischer Energie in diesem Sturm wird die Stabilität unserer Kolonien erheblich beeinträchtigen. Unser Wissen über die Navigation im Schleier wird jedoch die Effektivität unserer Flotten und Telepathen erhöhen.\n\nDer Schleier ruft … Wir müssen auf alles vorbereitet sein."
 MESSAGE_GRAVITY_STORM_COSMIC_STORM_SPOTTED_DESC: "$MESSAGE_COSMIC_STORM_SPOTTED_DESC$$MESSAGE_STORM_INTRO$Die starken Gravitationsfelder dieses Sturms werden den Flottenbetrieb zunehmend erschweren, wobei größere Schiffe am stärksten betroffen sind.\n\nUnsere Kolonien können diese extremen Bedingungen jedoch auch zu ihrem Vorteil nutzen und die Effizienz bestimmter Aufgaben erhöhen."
 MESSAGE_MAGNETIC_STORM_COSMIC_STORM_SPOTTED_DESC: "$MESSAGE_COSMIC_STORM_SPOTTED_DESC$$MESSAGE_STORM_INTRO$Die extreme magnetische Kraft dieses Sturms wird unsere Flotten- und Strukturerhaltungssysteme durcheinanderbringen.\n\nUnerwarteterweise zeigt sich jedoch auch eine Synergie mit unserer fortschrittlichen Metallurgie. Diese Wechselwirkung dürfte die Kosten für unsere Metallurgen während der Dauer dieses galaktischen Ereignisses senken."
 MESSAGE_PARTICLE_STORM_COSMIC_STORM_SPOTTED_DESC: "$MESSAGE_COSMIC_STORM_SPOTTED_DESC$$MESSAGE_STORM_INTRO$Die dichten partikelartigen Trümmer in diesem Sturm werden verheerende Auswirkungen auf Schiffe und Stationen haben und die Regeneration ihrer Schilde vollständig blockieren. Eine Flotte, die mutig genug ist, im Inneren zu verharren, sollte sich auf eine äußerst gefährliche Umgebung einstellen."
 MESSAGE_ELECTRIC_STORM_AFTERMATH_TITLE: "$electric_storm$-Nachwirkung"
