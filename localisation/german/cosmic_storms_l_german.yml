 resolution_cosmic_storms_control_restrictions: "Sturmmanipulationskontrolle"
 resolution_cosmic_storms_control_restrictions_desc: "Die Galaxie ist ein riesiges, miteinander verbundenes Ökosystem, in dem kosmische Stürme eine wichtige Rolle spielen. Einfluss auf ihr Verhalten zu nehmen, muss verboten werden."
