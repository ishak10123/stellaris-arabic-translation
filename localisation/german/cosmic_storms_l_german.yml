 #Planetary Decisions
 decision_hunker_down: "Verbarrikadiert"
 decision_hunker_down_desc: "Die Bewohner dieses Planeten befürchten das Schlimmste und haben jedmögliche Vorkehrung getroffen, um sich vor kosmischen Stürmen zu schützen."
 decision_stop_hunker_down: "Verbarrikadierung beenden"
 decision_stop_hunker_down_desc: "Sobald die Gefahr eines kosmischen Sturms vorübergezogen ist, können wir unsere Vorsichtsmaßnahmen lockern. Doch werden die Dinge wirklich jemals zur Normalität zurückkehren?"
 decision_cultivated_worldscaping: "Kultivierte Landschaftsgestaltung"
 decision_cultivated_worldscaping_desc: "Lasst uns diese Welt umformen, um die perfekte Symmetrie zu feiern. Allein die Geometrie der Landschaft zu betrachten, wird ein Gefühl der Gelassenheit hervorrufen."
 decision_cultivated_worldscaping_natural_blockers_fail_tt: "§REs müssen zuerst alle £blocker£ Blocker beseitigt werden§!"
 #Civics
 civic_astrometeorology: "Astrometeorologie"
 civic_astrometeorology_desc: "Diese Spezies empfindet tiefen Respekt vor Naturgewalten und unternimmt große Anstrengungen, um alles über Umweltphänomene in Erfahrung zu bringen. Auf ihrem Weg quer durchs All zeigt sie ein besonderes Interesse an der Astrometeorologie. Im Mittelpunkt ihrer Ambitionen stehen die fantastischsten und potenziell verheerendsten aller astronomischen Ereignisse: die kosmischen Stürme selbst.\n"
 civic_astrometeorology_effect_tooltip: "$t$- $AVAILABLE_BUILDINGS$ £building£ ['building:building_astrometeorology_observation_center']$TABBED_NEW_LINE$- $ADDITIONAL_BUILDINGS_STRING$ £building£ §Y$building_astrometeorology_observation_center$§!"
 civic_astrometeorology_hive: "Klimamodellierung"
 civic_astrometeorology_hive_desc: "Während das Kollektiv nach den Sternen greift, wird sein Bewusstsein vom Anblick astrometeorologischer Phänomene verzaubert. Diese Drohnen erweitern ihr Zuhause für einen edlen Zweck: um Umwelteinflüsse zu untersuchen und die Wunder der kosmischen Stürme zu ergründen."
 civic_astrometeorology_hive_effect_tooltip: "$civic_astrometeorology_effect_tooltip$"
 civic_astrometeorology_machine: "Klimamodellierung"
 civic_astrometeorology_machine_desc: "Dieses Maschinenimperium begreift, dass Naturgewalten tiefgreifende Auswirkungen auf das Kollektiv haben können, und unternimmt große Anstrengungen, um sie zu untersuchen. Seine Wettermodelle beschreiben jedes astronomische Ereignis akribisch genau - fast schon in sakraler Weise. Im Mittelpunkt stehen die fantastischsten und potenziell verheerendsten aller astronomischen Ereignisse: die kosmischen Stürme selbst."
 civic_astrometeorology_machine_effect_tooltip: "$civic_astrometeorology_effect_tooltip$"
 civic_astrometeorology_megacorp: "Profitables Wetter"
 civic_astrometeorology_megacorp_desc: "Wozu sind Wetterphänomene gut, wenn man sie nicht wie jede andere Ressource ausbeutet? Dieser Megakonzern ist darauf spezialisiert, so viel Wissen wie möglich aus astrometeorologischen Phänomenen zu gewinnen und sie an den Höchstbietenden zu verkaufen."
 civic_astrometeorology_megacorp_effect_tooltip: "$civic_astrometeorology_effect_tooltip$ $TABBED_NEW_LINE$- £building£ §Y$building_private_research_initiative$§!: $megacorp_civic_branch_office_building_effect$"
 civic_storm_callers: "Sturmanbetung"
 civic_storm_callers_desc: "Seit Anbeginn ihrer Zivilisation ist diese Gesellschaft in der Lage, Stürme durch ihre Rituale anzuziehen. Im Lauf ihrer Entwicklung kombinierte sie diese mit neuen technischen Innovationen, um ihre Effizienz zu steigern. Mit dem Beginn des Weltraumzeitalters versucht sie nun, ihr Wissen zu den Sternen zu tragen."
 civic_storm_callers_effect_tooltip: "- $AVAILABLE_BUILDINGS$ £building£ ['building:building_storm_summoning_theater']\n- Ersetzt [entertainer.GetIcon] §H[entertainer.GetNamePlural]§!-Jobs durch £job_storm_dancer£ §H$job_storm_dancer$§!-Jobs\n- $SPECIES_TRAITS$ ['trait:trait_storm_touched']"
 civic_storm_callers_megacorp: "Sturminfluencer"
 civic_storm_callers_megacorp_desc: "Was als einfache Übertragung heiliger Rituale begann, hat sich zu einem riesigen Medienkonglomerat entwickelt. Seher und Priester wurden durch charismatische Entertainer ersetzt, die alles geben, um beim nächsten kosmischen Sturm Aufmerksamkeit zu erhalten."
 civic_storm_callers_megacorp_effect_tooltip: "$civic_storm_callers_effect_tooltip$\n- Das Unternehmensgebäude \"£building£ §Y$building_amusement_megaplex$§!\" erzeugt zusätzlichen §YWert (Zweigstellen)§! und gibt unserer Hauptwelt §G+50§! £job_merchant£ §YHändler§!-Jobs."
 mod_capital_storm_diplo_weight_mult: "$MOD_DIPLO_WEIGHT_MULT$ während die Hauptwelt von einem §YKosmischen Sturm§! heimgesucht wird"
 storm_devotion_diplo_weight_modifier: "$civic_storm_callers$"
 storm_devotion_corporate_diplo_weight_modifier: "$civic_storm_callers_megacorp$"
 civic_environmental_architects: "Planetenformer"
 civic_environmental_architects_desc: "Nachdem sich diese Spezies äonenlang um die sorgfältige Pflege und Erhaltung eines perfekten Gleichgewichts auf ihrer Heimatwelt kümmerte, ist sie nun in der Lage, selbst auf den unwirtlichsten Welten im All zu leben. Ihre Gesellschaft glaubt fest daran, dass sich die Natur formen, kontrollieren und perfektionieren lässt - nicht um ihrer Zähmung willen, sondern im Dienst vollkommener Schönheit."
 civic_environmental_architects_negative_effect_tooltip: "- $HOMEWORLD$ Beginnt mit 2 £blocker£ §Hnatürlich vorkommenden Blockern§!"
 civic_environmental_architects_effect_start: "- $ADDITIONAL_TECHNOLOGIES_STRING$ £society£ §HTechnologien§!, um £blocker£ ['concept_natural_blockers', natürlich vorkommende Blocker] auf der §HHeimatwelt§! zu entfernen\n- £society£ §HTechnologien§!, um £blocker£ §Hnatürlich vorkommende Blocker§! zu entfernen, werden bei der Kolonisierung als §Hdauerhafte Forschungsoptionen§! angeboten\n- Ersetzt den ['concept_ascension_perk'] \"§HBeherrschung der Natur§!\" durch die planetare ['concept_decision'] \"§H$decision_cultivated_worldscaping$§!\"\n- Für jeden £blocker£ §Hnatürlich vorkommenden Blocker§! auf kolonisierten £planet£ ['concept_planets']:"
 civic_environmental_architects_effect_tooltip: "$civic_environmental_architects_effect_start$\n$t$- Ressourcen von Jobs: §R-10%§!\n$t$- Wachstumsgeschwindigkeit (Bewohner): §R-10%§!\n$t$- Bewohnerunterhalt: §R+15%§!"
 civic_environmental_architects_hive: "Kultivierungsdrohnen"
 civic_environmental_architects_hive_desc: "Teil eines großen Organismus zu sein, erlaubt es diesen Drohnen, die Möglichkeiten im größten Organismus von allen zu entdecken: der Natur. Sie versuchen, natürliche Systeme nach den Wünschen des Kollektivs zu kontrollieren und zu formen."
 civic_environmental_architects_hive_effect_tooltip: "$civic_environmental_architects_effect_start$\n$t$- Ressourcen von Jobs: §R-10%§!\n$t$- Bewohnermontage: §R-10%§!\n$t$- Bewohnerunterhalt: §R+15%§!"
 civic_environmental_architects_machine: "Gartenarbeitsprotokolle"
 civic_environmental_architects_machine_desc: "Obwohl ihre organischen Schöpfer bereits lange fort sind, haben diese Maschinengeschöpfe noch immer eine Vorliebe für deren alte Ästhetik. Die Natur ist ein fruchtbarer Boden für einen programmierten Perfektionismus."
 civic_environmental_architects_machine_effect_tooltip: "$civic_environmental_architects_hive_effect_tooltip$"
 civic_environmental_architects_megacorp: "Geoengineering Inc."
 civic_environmental_architects_megacorp_desc: "Die Angestellten dieses Megakonzerns sind es gewohnt, in einem goldenen Käfig zu leben, und der Konzern wird deshalb auch überall dort einen bauen, wo er aktiv ist."
 civic_environmental_architects_megacorp_effect_tooltip: "$civic_environmental_architects_effect_tooltip$\n- £building£ §Y$building_executive_retreat$§!: $megacorp_civic_branch_office_building_effect$"
