 job_astrometeorologist_plural: "Astrometeorologen"
 job_astrometeorologist_desc: "$job_astrometeorologist_plural$ sind darauf spezialisiert, die Umwelteinflüsse kosmischer Stürme zu untersuchen."
 job_astrometeorologist_effect_desc: "$job_astrometeorologist_plural_with_icon$ wandeln $r_consumer_goods$ in $r_physics$\n\n um. Solange das System von einer §YUmwelteinwirkung§! betroffen ist, ist die Bewohnerproduktion erhöht"
