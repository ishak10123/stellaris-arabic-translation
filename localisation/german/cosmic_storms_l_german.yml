 resolution_cosmic_storms_galactic_emergency_relief_desc: "Wir müssen diejenigen unterstützen, die am stärksten von den Auswirkungen kosmischer Stürme betroffen sind."
 resolution_cosmic_storms_galactic_emergency_relief_tooltip: "Schaltet den §YNotfallfonds§! frei, zu dem jedes Mitglied [global_event_country.GetCommunityOrImperiumDE2] §R5%§! seiner $r_energy$-Produktion beitragen muss.\n\nWird ein Mitglied [global_event_country.GetCommunityOrImperiumDE2] von einem §YKosmischen Sturm§! getroffen, erhält es monatlich §G+3§! $r_energy$ pro betroffenem System\n\n$storm_tech_cost$ §R+30%§!"
