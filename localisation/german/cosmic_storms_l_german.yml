 technophant: "$job_technophant$"
 warden: "$job_warden$"
 noble_researcher: "$job_noble_researcher$"
 job_noble_researcher: "Adligenwissenschaftler"
 job_noble_researcher_plural: "Adligenwissenschaftler"
 job_noble_researcher_desc: "Die klügsten und edelsten unserer Nachkommen sind sowohl in der Wissenschaft als auch in Sachen Etikette bewandert und wissen, wie sie ihre Vormachtstellung rechtfertigen."
 sacred_noble: "$job_sacred_noble$"
 job_sacred_noble: "Heiligenadeliger"
 job_sacred_noble_plural: "Heiligenadelige"
 job_sacred_noble_desc: "Das Erlangen von Göttlichkeit durch Vererbung ist der Weg. Die durch die Göttlichkeit legitimierte Vererbung ist das Mittel. Wir stellen sicher, dass unser Adel gesegnet ist und wir mit ihm und durch ihn."
 augmentation_merchant: "$job_augmentation_merchant$"
 job_augmentation_merchant: "Augmentierungshändler"
 job_augmentation_merchant_plural: "Augmentierungshändler"
 job_augmentation_merchant_desc: "Wer könnte unser Reich besser in die Zukunft führen als jene, die die Selbstverbesserung zu so erschwinglichen Kosten anbieten - und mit einer verlängerten Garantie obendrein?"
 visionary: "$job_visionary$"
 job_visionary: "Tech-Visionär"
 job_visionary_plural: "Tech-Visionäre"
 job_visionary_desc: "Für diese Träumer sind Bescheidenheit und Nichtmachbarkeit fremdartige Konzepte. Sie verstehen es, die Träume von morgen in eine marktfähige Realität zu verwandeln. Für einen wahren Visionär ist Fortschritt nicht nur ein Prinzip, sondern ein Produkt."
 noble_merchant: "$job_noble_merchant$"
 job_noble_merchant: "Patrizier"
 job_noble_merchant_plural: "Patrizier"
 job_noble_merchant_desc: "Das Recht auf die Herrschaft wird nicht weitervererbt, sondern über den Wert einer Person ermittelt: Und wie könnte man diesen Wert besser messen als anhand einer Bilanzaufstellung?"
