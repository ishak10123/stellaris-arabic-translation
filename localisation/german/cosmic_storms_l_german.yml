 cultivated_worldscaping_modifier: "$decision_cultivated_worldscaping$"
 cultivated_worldscaping_modifier_desc: "Die Landschaft wurde so verändert, dass sie eine erhabene geometrische Erfahrung bietet, bei der man der Form Vorrang vor dem Leben einräumte. Die verbliebene Flora wurde auf eine Monokultur reduziert, um unharmonische Elemente zu eliminieren."
