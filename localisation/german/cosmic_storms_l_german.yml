 #Weather Manipulator
 r_weather_manipulator: "Der Störungsunterdrücker"
 r_weather_manipulator_desc: "Eine fortschrittlichere Version jener Maschine, mit der die Inetianischen Händler einst die kosmischen Stürme manipulierten. Diese Apparatur erhöht die Effektivität all unserer Sturmtechnologie und richtig eingesetzt verhindert sie sogar, dass ein Sturm jemals unsere Grenzen passiert."
 storm_relic_repelling_field_modifier: "Störungsunterdrücker aktivieren"
 storm_relic_repelling_field_modifier_tt: "Erzeugt für 36 Monate ein §Mriesiges§! Abwehrfeld gegen §YKosmische Stürme§! um die Reichshauptwelt."
 #Temporary effect used by the Inetian Precursor Digsite C
 storm_timed_repelling_field_modifier: "Sektoralen Störungsunterdrücker aktivieren"
 storm_timed_repelling_field_modifier_tt: "Erzeugt für 18 Monate ein §Hmittelgroßes§! Abwehrfeld gegen §YKosmische Stürme§! um die Reichshauptwelt."
 #The Tempest Invocator
 r_the_tempest_invocator: "Der Sturmbeschwörer"
 r_the_tempest_invocator_desc: "Das Potenzial dieser Apparatur ist selbst im ausgeschalteten Zustand spürbar. Sollen wir es wirklich riskieren, in unseren klügsten Köpfen eine stürmische Wut hervorzurufen? Für den Ruhm unseres Reichs sind Opfer zu bringen."
 r_the_tempest_invocator_active_effect_tt: "Erzeugt einen ['concept_nexus_storm'] in einem System Eurer Wahl.\n$t$Sobald ein System ausgewählt wurde, wird ein $scientist_with_icon$ §Pgeopfert§!."
