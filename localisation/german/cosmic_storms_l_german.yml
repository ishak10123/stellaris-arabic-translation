 #The tempest invocator relic UI localisations
 CLICK_TO_SELECT_LEADER: "§GZur Auswahl eines Anführers klicken§!"
 LEADER_SELECTION: "Anführer auswählen"
 TEMPEST_INVOCATOR_VIEW_HEADER: "Sturm erzeugen"
 TEMPEST_INVOCATOR_VIEW_BODY: "Das schlummernde Potenzial dieser Apparatur ist selbst im ausgeschalteten Zustand spürbar. Sollten wir den Mut aufbringen, sie zu benutzen, können wir uns die Macht der kosmischen Stürme selbst zu eigen machen.\n\nWählt einen Ort aus, um einen $nexus_storm_color_tooltip$ hervorzurufen."
 #Tutorial Localisation
 cstorms_tutorial.a: "Verstanden."
 cstorms_tutorial.1.name: "Tutorial: Sturmmanipulation"
 cstorms_tutorial.1.desc: "Wir können den §SWeg§!, den ein §Y$default_storm$§! nimmt, zu unserem eigenen Vorteil §Smanipulieren§!. Entweder um ihn von unseren Systemen §Sabzulenken§! und so den negativen Auswirkungen zu entgehen, oder um ihn §Sanzulocken§!, um die positiven Eigenschaften zu nutzen."
 TUTORIAL_STORM_FORECAST_MAP_MODE_TITLE: "Tutorial: Wettervorhersage"
 TUTORIAL_STORM_FORECAST_MAP_MODE_DESC: "Dieser Kartenmodus visualisiert alle §SKosmischen Stürme§! in der Galaxie und gibt Informationen über ihre Auswirkungen.\n\n£storm_forecast_map£\n\nDer Wettervorhersage-Kartenmodus kann mit einem Klick auf das Kartensymbol unten rechts geöffnet werden.\n\nDurch die Erforschung fortschrittlicherer Technologien zeigt der Kartenmodus neben dem Ort und der Richtung des §SKosmischen Sturms§! auch an, welche Art von Sturm zu erwarten ist."
 concept_weather_forecasting_mode: "Wettervorhersagemodus"
 concept_weather_forecasting_mode_desc: "$TUTORIAL_STORM_FORECAST_MAP_MODE_DESC$"
 TUTORIAL_STORM_PROTECTION_TITLE: "Tutorial: Kosmische Stürme"
 TUTORIAL_STORM_PROTECTION_DESC: "§SKosmische Stürme§! sind eine nicht zu unterschätzende Naturgewalt. Sie können verheerende Auswirkungen auf Flotten, die Wirtschaft und sogar die Bevölkerung haben. Sie können aber auch große Chancen bieten.\n\nDie Erforschung von §SSturmtechnologie§! schaltet Gebäude frei, die die negativen §SAuswirkungen§! eines Sturms stark §Sverringern§!. §SZusätzliche Forschung§! kann einen sogar in die Lage versetzen, die Stürme zu seinem eigenen Vorteil §Sauszunutzen§!."
