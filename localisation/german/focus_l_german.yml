 development.220.name: "Beitritt zur Galaktischen Gemeinschaft"
 development.220.desc: ""
 development.220.hint: "Nehmt eine Einladung zum Beitritt in die ['concept_galactic_community'] an oder öffnet die §H$concept_galactic_community$§! über der £interface£ ['concept_outliner'], nachdem sie gegründet wurde, um einen Beitritt zu erbitten."
 development.220.lore: "§L\"Wir waren einst ein einziges Samenkorn. Jetzt sind wir Teil eines Gartens, der im All erblüht.\" - Schwarze Blüte, Erster Sprecher der Galaktischen Gemeinschaft§!"
 development.220.req: "Ist der Galaktischen Gemeinschaft beigetreten"
