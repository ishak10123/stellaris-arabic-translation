 development.130.lore: "§L\"Die Diplomatie ist nicht auf Vertrauen, sondern Interessen aufgebaut. Bringt man beides in Einklang, werden Feinde zu Partnern. Scheitert man, werden Partner zu Hindernissen.\"§!"
