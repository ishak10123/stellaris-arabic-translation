 development.515.name: "Einsetzen eines Behemoth-Eis"
 development.515.desc: ""
 development.515.hint: "Setzt ein §HBehemoth-Ei§! ein, indem Ihr Euer ['concept_construction_ship'] auswählt und auf §HMegastruktur bauen§! klickt. Wählt nun \"Behemoth-Ei\" aus und anschließend einen geeigneten §HGasriesen§!, bei dem Ihr die Orbitalstruktur bauen könnt."
 development.515.lore: "§L\"Wir blickten nach oben und sahen seinen Schatten auf dem Mond. Es war kein Schiff. Es war kein Sturm. Es war größer … und es lebte.\" - Zeugenprotokoll, Kolonie E-91§!"
 development.515.req: "Hat ein Behemoth-Ei eingesetzt"
