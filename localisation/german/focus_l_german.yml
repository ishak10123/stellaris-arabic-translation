 ###################
 # Core Focus Cards
 ###################
 core.100.name: "Gründung einer Kolonie"
 core.100.desc: ""
 core.100.hint: "Nutzt ein £colony_ship£ ['concept_colony_ship'], um einen bewohnbaren £planet£ ['concept_planet', Planeten] zu kolonisieren."
 core.100.lore: "§L\"Eine neue Welt ist nicht nur ein Zugewinn, er ist eine Verantwortung\" - Kolonialeinsatzhandbuch, 223. Auflage§!"
 core.100.req: "Hat eine Kolonie gegründet"
 core.100.fail: "£trigger_no£ $core.100.req$"
 core.100.success: "£trigger_yes£ $core.100.req$"
 core.102.name: "Koloniefokus festlegen"
 core.102.desc: "(Abgesehen von der Hauptwelt)"
 core.102.hint: "Die ['concept_designation'] kann man im Reiter \"$colony_view_tab_planet_summary$\" in der £interface£ ['concept_colony_view'] einer Kolonie ändern, die nicht die Hauptwelt ist."
 core.102.lore: "§L\"Offiziell erhöht der Koloniefokus die Effizienz. Inoffiziell ist es nur ein Mittel, um bloße Steine als wirtschaftliche Strategie anzupreisen.\"§!"
 core.102.req: "Hat den Koloniefokus eines Planeten geändert."
 core.102.fail: "£trigger_no£ $core.102.req$"
 core.102.success: "£trigger_yes£ $core.102.req$"
 core.104.name: "Bau einer Bergbaustation"
 core.104.desc: ""
 core.104.hint: "Nutzt ein £construction_ship£ ['concept_construction_ship'], um eine £mining_station£ ['concept_mining_station'] an einem geeigneten ['concept_celestial_object'] zu errichten."
 core.104.lore: "§L\"Wo andere nur einen Asteroiden sehen, sehen wir einen Haufen Credits.\"§!"
 core.104.req: "Hat eine Bergbaustation gebaut"
 core.104.fail: "£trigger_no£ $core.104.req$"
 core.104.success: "£trigger_yes£ $core.104.req$"
 core.106.name: "Errichten eines Gebäudes"
 core.106.desc: ""
 core.106.hint: "Öffnet den Reiter \"$colony_view_tab_planet_summary$\" in der £interface£ ['concept_colony_view'], klickt auf einen verfügbaren §HBauplatz§! und wählt ein £building£ ['concept_building'] aus, das gebaut werden soll."
 core.106.lore: "§L\"Heute eine Baustelle. Morgen eine Zivilisation.\"§!"
 core.106.req: "Hat ein Gebäude errichtet"
 core.106.fail: "£trigger_no£ $core.106.req$"
 core.106.success: "£trigger_yes£ $core.106.req$"
 core.108.name: "Bau eines Sternenbasenmoduls"
 core.108.desc: ""
 core.108.hint: "Öffnet den Reiter \"$starbase_view_tab_command$\" in der £interface£ ['concept_starbase_view'] und wählt ein verfügbares §HSternenbasenmodul§! aus, um es zu bauen."
 core.108.lore: "§L\"Sie versprachen ein Abenteuer, doch die monatelange Stille und die recycelte Luft erwähnten sie nicht. Dann ging die Handelsstation online - endlich etwas, wofür es sich lohnt, hier zu bleiben.\"§!"
 core.108.req: "Hat ein Sternenbasenmodul gebaut"
 core.108.fail: "£trigger_no£ $core.108.req$"
 core.108.success: "£trigger_yes£ $core.108.req$"
 core.110.name: "Bau eines Sternenbasengebäudes"
 core.110.desc: ""
 core.110.hint: "Öffnet den Reiter \"$starbase_view_tab_command$\" in der £interface£ ['concept_starbase_view'] und wählt ein verfügbares §HSternenbasengebäude§! aus, um es zu bauen."
 core.110.lore: "§L\"Die galaktische Position definiert die Funktion der Sternenbasis; ein Gebäude verfeinert sie.\" - Orbitales Ingenieurswesen: Theorie und Praxis§!"
 core.110.req: "Hat ein Sternenbasengebäude errichtet"
 core.110.fail: "£trigger_no£ $core.110.req$"
 core.110.success: "£trigger_yes£ $core.110.req$"
 core.112.name: "Annahme einer Tradition"
 core.112.desc: ""
 core.112.hint: "Öffnet den Reiter \"$society_management_view_tab_traditions$\" in der £interface£ ['concept_society_management_view'] und fördert eine ['concept_tradition']."
 core.112.lore: "§L\"Eine Zivilisation ohne Tradition ist ziellos. Wer an alten Traditionen festhält, stagniert. Weisheit ist nur zu erreichen, wenn man jene auswählt, die man weiterführen will.\"§!"
 core.112.req: "Hat eine Tradition angenommen"
 core.112.fail: "£trigger_no£ $core.112.req$"
 core.112.success: "£trigger_yes£ $core.112.req$"
 core.114.name: "Aktivieren eines Erlasses"
 core.114.desc: ""
 core.114.hint: "Öffnet den Reiter \"§H$government_view_tab_policies_and_edicts$§!\" in der £interface£ ['concept_government_view'] und aktiviert einen ['concept_edict']."
 core.114.lore: "§L\"Wichtige Kundmachung an alle Bürger: Erlass 827-B ist offiziell in Kraft getreten. Paragraf 34, Abschnitt 12 beschreibt die vollständigen Verhaltensrichtlinien. Wir wünschen einen produktiven Tag!\"§!"
 core.114.req: "Hat einen Erlass aktiviert"
 core.114.fail: "£trigger_no£ $core.114.req$"
 core.114.success: "£trigger_yes£ $core.114.req$"
 core.116.name: "Abschluss von 3 Agenden"
 core.116.desc: ""
 core.116.hint: "Immer wenn eine ['concept_agenda'] abgeschlossen wird, kann man sie im Reiter \"$government_view_tab_council$\" in der £interface£ ['concept_government_view'] aktivieren und eine neue auswählen."
 core.116.lore: "§L\"Ein Herrscher ohne Agenda ist wie ein Raumschiff ohne Kurs.\"§!"
 core.116.req: "Hat 3 Agenden abgeschlossen"
 core.116.fail: "£trigger_no£ $core.116.req$"
 core.116.success: "£trigger_yes£ $core.116.req$"
 core.118.name: "Besitzt 1000 Energie-Credits"
 core.118.desc: ""
 core.118.hint: "Öffnet den Reiter \"$colony_view_tab_planet_summary$\" in der £interface£ ['concept_colony_view'], um £district£ ['concept_generator_districts'] zu errichten, die £energy£ ['concept_energy'] produzieren.\n\nBaut alternativ £mining_station£ ['concept_mining_stations'] um energiereiche ['concept_celestial_objects'] oder kauft £energy£ §H$concept_energy$§! auf dem £market£ ['concept_market'] oder von anderen ['concept_empires', Reichen].$focus_other$"
 core.118.lore: "§L\"Credits allein machen nicht glücklich, doch der Handel vielleicht schon!\"§!"
 core.118.req: "Hat 1000 Energie-Credits"
 core.118.fail: "£trigger_no£ $core.118.req$"
 core.118.success: "£trigger_yes£ $core.118.req$"
 core.120.name: "Besitzt 1000 Mineralien"
 core.120.desc: ""
 core.120.hint: "Öffnet den Reiter \"$colony_view_tab_planet_summary$\" in der £interface£ ['concept_colony_view'], um £district£ ['concept_mining_districts'] zu errichten, die £minerals£ ['concept_minerals'] produzieren.\n\nBaut alternativ £mining_station£ ['concept_mining_stations'] um mineralienreiche ['concept_celestial_objects'] oder kauft £minerals£ §H$concept_minerals$§! auf dem £market£ ['concept_market'] oder von anderen ['concept_empires', Reichen].$focus_other$"
 core.120.lore: "§L\"Atme zu tief ein und du bekommst eine Silikatlunge; atme zu schwach und du fällst in Ohnmacht. Wie es auch kommt: Das Unternehmen kürzt dir den Lohn.\"§!"
 core.120.req: "Hat 1000 Mineralien"
 core.120.fail: "£trigger_no£ $core.120.req$"
 core.120.success: "£trigger_yes£ $core.120.req$"
 core.122.name: "Besitzt 1000 Nahrung"
 core.122.desc: ""
 core.122.hint: "Öffnet den Reiter \"$colony_view_tab_planet_summary$\" in der £interface£ ['concept_colony_view'], um £district£ ['concept_farming_districts'] zu errichten, die £food£ ['concept_food'] produzieren.\n\nKauft alternativ £food£ §H$concept_food$§! auf dem £market£ ['concept_market'] oder von anderen ['concept_empires', Reichen].$focus_other$"
 core.122.lore: "§L\"Ein gut genährtes Reich ist ein starkes Reich. Ein hungerndes Reich wird schon bald das Reich eines anderen sein.\"§!"
 core.122.req: "Hat 1000 Nahrung"
 core.122.fail: "£trigger_no£ $core.122.req$"
 core.122.success: "£trigger_yes£ $core.122.req$"
 core.124.name: "Besitzt 1000 Konsumgüter"
 core.124.desc: ""
 core.124.hint: "Öffnet den Reiter \"$colony_view_tab_planet_summary$\" in der £interface£ ['concept_colony_view'], um £district£ ['concept_industrial_districts'] zu errichten, die £consumer_goods£ ['concept_consumer_goods'] produzieren.\n\nKauft alternativ £consumer_goods£ §H$concept_consumer_goods$§! auf dem £market£ ['concept_market'] oder von anderen ['concept_empires', Reichen].$focus_other$"
 core.124.lore: "§L\"Konsumgüter treiben die Innovation voran, fördern die Kultur und sorgen für allgemeine Zufriedenheit. Doch sind Luxusgüter, fortschrittliche Werkzeuge oder ein wirklich schöner Hut Konsumgüter? Ganz klar ja.\"§!"
 core.124.req: "Hat 1000 Konsumgüter"
 core.124.fail: "£trigger_no£ $core.124.req$"
 core.124.success: "£trigger_yes£ $core.124.req$"
 core.126.name: "Besitzt 1000 Legierungen"
 core.126.desc: ""
 core.126.hint: "Öffnet den Reiter \"$colony_view_tab_planet_summary$\" in der £interface£ ['concept_colony_view'], um £district£ ['concept_industrial_districts'] zu errichten, die £alloys£ ['concept_alloys'] produzieren.\n\nKauft alternativ £alloys£ §H$concept_alloys$§! auf dem £market£ ['concept_market'] oder von anderen ['concept_empires', Reichen].$focus_other$"
 core.126.lore: "§L\"Legierungen mögen nicht die glamouröseste Ressource sein, aber versucht doch einmal, ein Schlachtschiff nur mit guten Absichten zu bauen.\"§!"
 core.126.req: "Hat 1000 Legierungen"
 core.126.fail: "£trigger_no£ $core.126.req$"
 core.126.success: "£trigger_yes£ $core.126.req$"
 core.127.name: "Bau eines Schwarm-Distrikts"
 core.127.desc: ""
 core.127.hint: "Baut einen £district£ ['concept_hive_district'] in einer £colony£ ['concept_colony']."
 core.127.lore: "§L\"Mehr Tunnel. Mehr Drohnen. Mehr Schwarm. Immer mehr.\"§!"
 core.127.req: "Hat einen Schwarm-Distrikt gebaut"
 core.127.fail: "£trigger_no£ $core.127.req$"
 core.127.success: "£trigger_yes£ $core.127.req$"
 core.127_1.name: "Bau eines kommunalen Bioms"
 core.127_1.hint: "Baut ein £district£ §C$district_craglands$§! auf einer £colony£ ['concept_colony']."
 core.127_1.lore: "§L\"Dieser Planet war.\"§!"
 core.127_1.req: "Hat einen Kommunalbiom-Distrikt gebaut"
 core.127_1.fail: "£trigger_no£ $core.127_1.req$"
 core.127_1.success: "£trigger_yes£ $core.127_1.req$"
 core.128.name: "Bau eines Stadt-Distrikts"
 core.128.desc: ""
 core.128.hint: "Öffnet den Reiter \"$colony_view_tab_planet_summary$\" in der £interface£ ['concept_colony_view'], um einen £district£ ['concept_city_district'] zu bauen."
 core.128.lore: "§L\"Die Silhouette einer Stadt repräsentiert die Ambitionen ihrer Bewohner. Je höher wir bauen, desto höher kann unser Volk träumen.\"§!"
 core.128.req: "Hat einen Stadt-Distrikt gebaut"
 core.128.fail: "£trigger_no£ $core.128.req$"
 core.128.success: "£trigger_yes£ $core.128.req$"
 core.129.name: "Bau eines Nexus-Distrikts"
 core.129.desc: ""
 core.129.hint: "Baut einen £district£ ['concept_nexus_district'] in einer £colony£ ['concept_colony']."
 core.129.lore: "§L\"Mehr Nexus-Distrikte bedeuten mehr Einheiten. Es gibt keinen Nachteil. Es sei denn, es wird eine Abweichung festgestellt. Dann erfolgt eine Rekalibrierung.\"§!"
 core.129.req: "Hat einen Nexus-Distrikt gebaut"
 core.129.fail: "£trigger_no£ $core.129.req$"
 core.129.success: "£trigger_yes£ $core.129.req$"
 core.130.name: "Bau eines Industrie-Distrikts"
 core.130.desc: ""
 core.130.hint: "Öffnet den Reiter \"$colony_view_tab_planet_summary$\" in der £interface£ ['concept_colony_view'], um einen £district£ ['concept_industrial_district'] zu bauen."
 core.130.lore: "§L\"Nichts beschreibt Fortschritt so gut wie industrielle Abgase.\"§!"
 core.130.req: "Hat einen Industrie-Distrikt gebaut"
 core.130.fail: "£trigger_no£ $core.130.req$"
 core.130.success: "£trigger_yes£ $core.130.req$"
 core.132.name: "Bau eines Generator-Distrikts"
 core.132.desc: ""
 core.132.hint: "Öffnet den Reiter \"$colony_view_tab_planet_summary$\" in der £interface£ ['concept_colony_view'], um einen £district£ ['concept_generator_district'] zu bauen."
 core.132.lore: "§L\"Energie ist das Medium, durch das sich alle Dinge manifestieren. - Der Abdbaal§!"
 core.132.req: "Hat einen Generator-Distrikt gebaut"
 core.132.fail: "£trigger_no£ $core.132.req$"
 core.132.success: "£trigger_yes£ $core.132.req$"
 core.132_1.name: "Bau eines Fotosynthesefelds"
 core.132_1.hint: "Baut ein £district£ §CFotosynthesefeld§! im Reiter \"$colony_view_tab_planet_summary$\" der £interface£ ['concept_colony_view']."
 core.132_1.lore: "§L\"Diese Welt trank Licht, wie du oder ich Wasser trinken.\"- Zosira K'Tun§!"
 core.132_1.req: "Hat einen Fotosynthesefeld-Distrikt gebaut"
 core.132_1.fail: "£trigger_no£ $core.132_1.req$"
 core.132_1.success: "£trigger_yes£ $core.132_1.req$"
 core.134.name: "Bau eines Bergbau-Distrikts"
 core.134.desc: ""
 core.134.hint: "Öffnet den Reiter \"$colony_view_tab_planet_summary$\" in der £interface£ ['concept_colony_view'], um einen £district£ ['concept_mining_district'] zu bauen."
 core.134.lore: "§L\"Der Reichtum einer Welt liegt nicht im Himmel, sondern im Dreck. Grabt tief und der Wohlstand wird folgen.\"§!"
 core.134.req: "Hat einen Bergbau-Distrikt gebaut"
 core.134.fail: "£trigger_no£ $core.134.req$"
 core.134.success: "£trigger_yes£ $core.134.req$"
 core.134_1.name: "Bau eines Hohlbergs"
 core.134_1.hint: "Baut einen £district£ §CHohlberg§! im Reiter \"$colony_view_tab_planet_summary$\" der £interface£ ['concept_colony_view']."
 core.134_1.lore: "§L\"Ein Berg kann ähnlich wie ein Baum angezapft werden, um das darin enthaltene Mana zu gewinnen.\"§!"
 core.134_1.req: "Hat einen Hohlberg-Distrikt gebaut"
 core.134_1.fail: "£trigger_no£ $core.134_1.req$"
 core.134_1.success: "£trigger_yes£ $core.134_1.req$"
 core.136.name: "Bau eines Landwirtschaft-Distrikts"
 core.136.desc: ""
 core.136.hint: "Öffnet den Reiter \"$colony_view_tab_planet_summary$\" in der £interface£ ['concept_colony_view'], um einen £district£ ['concept_farming_district'] zu bauen."
 core.136.lore: "§L\"Die erste Ernte war eher dürftig, doch als neues Getreide unsere Zungen berührte, wussten wir, dass uns diese Welt ernähren würde.\"§!"
 core.136.req: "Hat einen Landwirtschaft-Distrikt gebaut"
 core.136.fail: "£trigger_no£ $core.136.req$"
 core.136.success: "£trigger_yes£ $core.136.req$"
 core.136_1.name: "Bau eines Gartenwalds"
 core.136_1.hint: "Baut einen £district£ §CGartenwald§! im Reiter \"$colony_view_tab_planet_summary$\" der £interface£ ['concept_colony_view']."
 core.136_1.lore: "§L\"Wenn es einen Überfluss gibt, wird die Welt wachsen.\"§!"
 core.136_1.req: "Hat einen Gartenwald-Distrikt gebaut"
 core.136_1.fail: "£trigger_no£ $core.136_1.req$"
 core.136_1.success: "£trigger_yes£ $core.136_1.req$"
 core.138.name: "Erlassen einer planetaren Entscheidung"
 core.138.desc: ""
 core.138.hint: "Öffnet die Liste planetarer ['concept_decisions'] im Reiter \"$colony_view_tab_management$\" in der £interface£ ['concept_colony_view'] und aktiviert eine von ihnen."
 core.138.lore: "§L\"Kolonisten lieben eine entschlossene Führung - zumindest bis sie dieser Entscheidung widersprechen.\"§!"
 core.138.req: "Hat eine planetare Entscheidung erlassen"
 core.138.fail: "£trigger_no£ $core.138.req$"
 core.138.success: "£trigger_yes£ $core.138.req$"
 ##########################
 # Exploration Focus Cards
 ##########################
 exploration.100.name: "Untersuchung einer Anomalie"
 exploration.100.desc: ""
 exploration.100.hint: "Nach der Entdeckung einer £anomaly£ ['concept_anomaly'] kann man dieser einen £scientist£ ['concept_scientist'] zuweisen, um sie zu untersuchen."
 exploration.100.lore: "§L\"So etwas wie ein gewöhnliches Signal gibt es nicht. Jedes Rauschen und jedes Echo hat eine Bedeutung. Die einzige Frage ist, welche.\"§!"
 exploration.100.req: "Hat eine Anomalie untersucht"
 exploration.100.fail: "£trigger_no£ $exploration.100.req$"
 exploration.100.success: "£trigger_yes£ $exploration.100.req$"
 exploration.105.name: "Erkundung eines Systems"
 exploration.105.desc: ""
 exploration.105.hint: "Nutzt ein £science_ship£ ['concept_science_ship'], um ein neues £system£ ['concept_system'] vollständig zu erkunden."
 exploration.105.lore: "§L\"Eine Expansion kann erst dann stattfinden, wenn wir die Sterne verstehen, die wir für uns beanspruchen wollen.\" - Einführung in die stellare Kartografie, 7. Ausgabe§!"
 exploration.105.req: "Hat ein System erkundet"
 exploration.105.fail: "£trigger_no£ $exploration.105.req$"
 exploration.105.success: "£trigger_yes£ $exploration.105.req$"
 exploration.110.name: "Beendigung eines Spezialprojekts"
 exploration.110.desc: ""
 exploration.110.hint: "Öffnet den Reiter \"$situation_log_view_tab_situation_log$\" in der £interface£ ['concept_situation_log_view'], um ein ['concept_special_project'] zu erforschen."
 exploration.110.lore: "§L\"Du denkst, der schwere Teil liegt darin, die Daten zu verstehen? Ich sage dir, der schwere Teil ist, die Leute davon zu überzeugen, dass das, was wir gefunden haben, wirklich Bedeutung hat.\"§!"
 exploration.110.req: "Hat ein Spezialprojekt beendet"
 exploration.110.fail: "£trigger_no£ $exploration.110.req$"
 exploration.110.success: "£trigger_yes£ $exploration.110.req$"
 exploration.115.name: "Fremdes Leben finden"
 exploration.115.desc: ""
 exploration.115.hint: "Nutzt ein £science_ship£ ['concept_science_ship'], um ein neues £system£ ['concept_system'] zu erkunden, bis fremdes Leben gefunden wurde."
 exploration.115.lore: "§L\"Die Suche nach fremdem Leben ist keine Frage des Obs, sondern des Wanns. Und wenn wir es finden, müssen wir uns fragen: Werden wir es als das erkennen, was es ist?\"§!"
 exploration.115.req: "Hat fremdes Leben gefunden"
 exploration.115.fail: "£trigger_no£ $exploration.115.req$"
 exploration.115.success: "£trigger_yes£ $exploration.115.req$"
 exploration.120.name: "Erlangt eine dauerhafte Forschungsoption"
 exploration.120.desc: ""
 exploration.120.hint: "Untersucht £anomaly£ ['concept_anomalies'], £archaeology£ ['concept_archaeology_site', Archäologische Stätten] und ['concept_debris'] aus Weltraumschlachten. Manche von ihnen können eine §Hdauerhafte Forschungsoption§! gewähren, die bis zu ihrer Erforschung verfügbar ist."
 exploration.120.lore: "§L\"Wahrer Fortschritt ist niemals ein Sprung - es sind Tausende von sorgfältigen Schritten ins Unbekannte.\" - Grundsätze der wissenschaftlichen Forschung, Band III§!"
 exploration.120.req: "Hat dauerhafte Forschungsoptionen"
 exploration.120.fail: "£trigger_no£ $exploration.120.req$"
 exploration.120.success: "£trigger_yes£ $exploration.120.req$"
 exploration.125.name: "Anwerben eines Wissenschaftlers"
 exploration.125.desc: ""
 exploration.125.hint: "Öffnet die £interface£ ['concept_leaders_view'] und werbt einen ['concept_leader'] der Klasse £scientist£ ['concept_scientist'] an.$focus_other$"
 exploration.125.lore: "§L\"Du suchst jemanden, der sowohl eine Quantensingularität untersuchen als auch einen Haushaltsplan aufstellen kann? Viel Glück dabei.\"§!"
