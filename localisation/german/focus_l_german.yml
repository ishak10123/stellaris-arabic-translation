 development.415.desc: ""
 development.415.hint: "$development.230.hint$"
 development.415.lore: "§L\"Jahrzehnte der Herrschaft machten sie zu Meistern der Richtlinien, der Verhandlungskünste und der Schuldzuweisungen.\"§!"
