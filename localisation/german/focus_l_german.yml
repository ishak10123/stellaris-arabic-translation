 exploration.300.name: "Bau eines Dyson-Schwarms"
 exploration.300.desc: "(Produziert mindestens:\n30\n £physics£, £society£ oder £engineering£)"
 exploration.300.hint: "Erforscht die Technologie \"£physics£ §H$tech_dyson_swarm$§!\" und findet anschließend einen geeigneten ['concept_star'], um ein £construction_ship£ ['concept_construction_ship'] anzuweisen, die £megastructure£ ['concept_megastructure'] §H$tech_dyson_swarm$§! zu errichten."
 exploration.300.lore: "§L\"Auf der Aussichtsplattform zu stehen und zu beobachten, wie sich die ersten Satelliten entfalten ... Es verändert einen. Die Vorstellung, dass wir das Licht eines Sterns besitzen können, ist berauschend.\" - Ingenieursoffizier Tig Bori, ISS D'Tuma§!"
