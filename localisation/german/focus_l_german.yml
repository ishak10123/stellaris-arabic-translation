 development.505.name: "+3000 Konsumgüter monatlich"
 development.505.desc: ""
 development.505.hint: "Öffnet den Reiter \"$colony_view_tab_planet_summary$\" in der £interface£ ['concept_colony_view'], um £district£ ['concept_industrial_districts'] und £building£ ['building:building_factory_1', Zivilindustrien] zu errichten, die £consumer_goods£ ['concept_consumer_goods'] produzieren. Kauft alternativ £consumer_goods£ §H$concept_consumer_goods$§! auf dem £market£ ['concept_market'] oder von anderen ['concept_empires', Reichen]."
 development.505.lore: "§L\"Sie essen sie nicht und nutzen sie auch nicht zur Expansion. Manche werden einfach nur ... ausgestellt. Die Ineffizienz dieser Individuen ist unerträglich.\"§!"
 development.505.req: "Besitzt +3000 Konsumgüter monatlich"
