 exploration.200.name: "Ausgraben einer archäologischen Stätte"
 exploration.200.desc: ""
 exploration.200.hint: "Weist einer £archaeology£ ['concept_archaeology_site', Archäologischen Stätte] einen £scientist£ ['concept_scientist'] zu und führt diesen durch die Ereignisse."
 exploration.200.lore: "§L\"Ein weiteres altes Reich und eine weitere unheilvolle Warnung. Man sollte meinen, es hätte inzwischen jeder gelernt.\"§!"
