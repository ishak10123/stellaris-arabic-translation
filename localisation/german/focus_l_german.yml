 development.105.lore: "§L\"In dem Moment, wo sich zwei Zivilisationen treffen, ändert sich der Lauf der Geschichte. Ob dieser Wandel zu Frieden oder Krieg führt, kann von einem einzigen Wort abhängen.\" - Gesandtin Datri Yukonna§!"
