 development.215.lore: "§L\"Ein Herrscher wird gepriesen und ein General gefürchtet. Ein wahrer Verwalter jedoch wird nichts von beidem, da er seine Arbeit am besten verrichten kann, wenn sie unbemerkt bleibt.\" - Präfektin Flent shar Astatenn§!"
