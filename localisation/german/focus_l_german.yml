 development.225.name: "Erhalten von Gefallen"
 development.225.desc: ""
 development.225.hint: "Öffnet den Reiter \"$contacts_view_tab_contacts$\" in der £interface£ ['concept_contacts_view'], kontaktiert ein anderes ['concept_empire'] und wählt \"§HBeziehungen verbessern§!\" aus, bis ein ['concept_favor'] gewährt wird.$focus_other$"
 development.225.lore: "§L\"Ein Gefallen ist keine Währung, und dennoch hängt vieles von ihm ab. Er hält keinerlei diplomatische Bedeutung, und dennoch kann er das Gleichgewicht in einer diplomatischen Verhandlung kippen.\"§!"
 development.225.req: "Hat einen Gefallen erhalten"
 development.225.fail: "£trigger_no£ $development.225.req$"
 development.225.success: "£trigger_yes£ $development.225.req$"
 development.230.name: "Aufstufen eines Beamten"
 development.230.desc: ""
 development.230.hint: "Weist den £official£ ['concept_official', Beamten] dem ['concept_council'], der ['concept_galactic_community', Galaktischen Gemeinschaft] oder einer ['concept_federation'] zu oder ernennt ihn zum ['concept_governor'].\n\nDiese Aufgaben geben wertvolle Erfahrung, und sobald genug angesammelt wurde, erhöht sich die Stufe, was dazu führt, dass sich neue ['concept_leader_traits'] entwickeln."
 development.230.lore: "§L\"Die erste Lektion der Regierungsführung lautet: Wenn niemand zufrieden ist, macht man es vermutlich richtig.\" - Der offizielle Leitfaden der Regierungsführung§!"
 development.230.req: "Hat einen Beamten aufgestuft"
 development.230.fail: "£trigger_no£ $development.230.req$"
 development.230.success: "£trigger_yes£ $development.230.req$"
 development.300.name: "Bau eines Dyson-Schwarms (80 Energie)"
 development.300.desc: "(Produziert mindestens:80 $energy$)"
 development.300.hint: "Erforscht die Technologie \"£physics£ §H$tech_dyson_swarm$§!\" und findet anschließend einen geeigneten ['concept_star'], um ein £construction_ship£ ['concept_construction_ship'] anzuweisen, die £megastructure£ ['concept_megastructure'] §H$tech_dyson_swarm$§! zu errichten."
 development.300.lore: "§L\"Wir haben einen Blick auf diesen Stern geworfen und dachten: Was, wenn wir ihn besteuern würden?\"§!"
 development.300.req: "Hat einen Dyson-Schwarm gebaut"
 development.300.fail: "£trigger_no£ $development.300.req$"
 development.300.success: "£trigger_yes£ $development.300.req$"
 development.305.name: "Bau eines Lichtbogenofens"
 development.305.desc: "(System mit mindestens 15 Planeten)"
 development.305.hint: "Erforscht die Technologie \"£engineering£ §H$tech_orbital_arc_furnace$§!\" und findet anschließend eine geeignete §HGeschmolzene Welt§! in einem £system£ ['concept_system'] mit mindestens 15 £planet£ ['concept_planets', Planeten], um ein £construction_ship£ ['concept_construction_ship'] anzuweisen, die £megastructure£ ['concept_megastructure'] §H$tech_orbital_arc_furnace$§! zu errichten."
 development.305.lore: "§L\"Die Sonne wandert über den Horizont, und für einen kurzen Moment leuchtet das ganze Bauwerk golden. Tausende von Kilometern an Gerüsten und Stahl ... Wir haben das gebaut. Wir haben diesen Planeten zu unserer Schmiede gemacht.\"§!"
 development.305.req: "Hat einen Lichtbogenofen gebaut"
 development.305.fail: "£trigger_no£ $development.305.req$"
 development.305.success: "£trigger_yes£ $development.305.req$"
 development.310.name: "Besitzt 3 Spezies"
 development.310.desc: ""
 development.310.hint: "Öffnet den Reiter \"$contacts_view_tab_contacts$\" in der £interface£ ['concept_contacts_view'] und schlagt einem anderen ['concept_empire'] das ['concept_diplomatic_pact', diplomatische Abkommen] \"§H$PACT_migration_treaty$§!\" vor.$focus_other$"
 development.310.lore: "§L\"Die Galaxie ist riesig und voller Wissen, Fähigkeiten und Ideen. Warum sich nur auf eine Art des Denkens beschränken?\"§!"
 development.310.req: "Besitzt 3 Spezies"
 development.310.fail: "£trigger_no£ $development.310.req$"
 development.310.success: "£trigger_yes£ $development.310.req$"
 development.315.name: "Gründung einer Föderation"
 development.315.desc: ""
 development.315.hint: "Öffnet den Reiter \"$contacts_view_tab_contacts$\" in der £interface£ ['concept_contacts_view'], kontaktiert ein anderes ['concept_empire'] und fragt es, ob es eine ['concept_federation'] gründen möchte.$focus_other$"
 development.315.lore: "§L\"Möge dieses Abkommen ein Beweis für unsere Entschlossenheit sein, die Einigkeit der Spaltung vorzuziehen und den Dialog dem Krieg. Wir haben uns für ein gemeinsames Schicksal im All entschieden.\" - Präambel der Galaktischen Konkordanz§!"
 development.315.req: "Hat eine Föderation gegründet"
 development.315.fail: "£trigger_no£ $development.315.req$"
 development.315.success: "£trigger_yes£ $development.315.req$"
 development.320.name: "Dem Galaktischen Rat beitreten"
 development.320.desc: ""
 development.320.hint: "Erhöht die ['concept_diplomatic_weight'] vor der nächsten Wahl im ['concept_galactic_council', Galaktischen Rat], um gewählt zu werden."
 development.320.lore: "§L\"Wahre Macht liegt nicht in Flotten oder Armeen, sondern in den ehrwürdigen Hallen, wo die Entscheidungen getroffen werden.\"§!"
 development.320.req: "Ist dem Galaktischen Rat beigetreten"
 development.320.fail: "£trigger_no£ $development.320.req$"
 development.320.success: "£trigger_yes£ $development.320.req$"
 development.325.name: "Hat einen Veteranen-Beamten"
 development.325.desc: "(Erreicht Stufe 4)"
 development.325.hint: "$development.230.hint$"
 development.325.lore: "§L\"Am Ende des Tages ist es der Arbeiter, der müde sein sollte, nicht seine Anführer.\" - Hauptmagistratin Ir'B va'Bir§!"
 development.325.req: "Hat einen Beamten der Stufe 4"
 development.325.fail: "£trigger_no£ $development.325.req$"
 development.325.success: "£trigger_yes£ $development.325.req$"
 development.400.name: "Föderation der Stufe 5"
 development.400.desc: ""
 development.400.hint: "Weist der ['concept_federation'] einen £official£ ['concept_official', Beamten] zu, um die §HFöderationserfahrung§! zu erhöhen."
 development.400.lore: "§L\"5 Stufen der Regierungsführung, Hunderte Ausschüsse, Tausende Sitzungen ... und irgendwie sind wir dadurch tatsächlich stärker geworden.\"§!"
 development.400.req: "Ist Teil einer Föderation der Stufe 5"
 development.400.fail: "£trigger_no£ $development.400.req$"
 development.400.success: "£trigger_yes£ $development.400.req$"
 development.405.name: "Bau einer Dyson-Sphäre"
 development.405.desc: ""
 development.405.hint: "Erforscht die Technologie \"£physics£ §H$tech_dyson_sphere$§!\" und verbessert anschließend die £megastructure£ ['concept_megastructure'] \"§H$tech_dyson_swarm$§!\" auf \"§H$tech_dyson_sphere$§!\".$focus_other$" # With Machine Age
 development.406.hint: "Erforscht die Technologie \"£physics£ §H$tech_dyson_sphere$§!\" und findet anschließend einen geeigneten ['concept_star'], um ein £construction_ship£ ['concept_construction_ship'] anzuweisen, die £megastructure£ ['concept_megastructure'] §H$tech_dyson_sphere$§! zu errichten.$focus_other$" # Without Machine Age
 development.405.lore: "§L\"Die größte Zivilisation wetteifert nicht um Ressourcen - sie definiert sie.\" - Fortschritte des dritten Ranges§!"
 development.405.req: "Hat eine Dyson-Sphäre gebaut"
 development.405.fail: "£trigger_no£ $development.405.req$"
 development.405.success: "£trigger_yes£ $development.405.req$"
 development.410.name: "Bau einer Ringwelt"
 development.410.desc: ""
 development.410.hint: "Erforscht die Technologie \"£physics£ §H$tech_ring_world$§!\" und findet anschließend einen geeigneten ['concept_star'], um ein £construction_ship£ ['concept_construction_ship'] anzuweisen, die £megastructure£ ['concept_megastructure'] §H$tech_ring_world$§! zu errichten.$focus_other$"
 development.410.lore: "§L\"Der Ring war so schön wie das Licht unseres Sterns. Dann fiel der Schatten der Invasorenstreitmacht auf ihn ...\" - Tagebuch von Addavv uvi-Waddiv, Standard 174§!"
 development.410.req: "Hat eine Ringwelt gebaut"
 development.410.fail: "£trigger_no£ $development.410.req$"
 development.410.success: "£trigger_yes£ $development.410.req$"
