 development.500.name: "Bau einer Interstellaren Versammlung"
 development.500.desc: ""
 development.500.hint: "Erforscht die Technologie \"£society£ §H$tech_interstellar_assembly$§!\" und findet anschließend einen geeigneten ['concept_star'], um ein £construction_ship£ ['concept_construction_ship'] anzuweisen, die £megastructure£ ['concept_megastructure'] §H$tech_interstellar_assembly$§! zu errichten.$focus_other$"
 development.500.lore: "§L\"Wer den Diskurs kontrolliert, kontrolliert auch den Lauf der Geschichte.\" - Hochkanzerlin Sagu, Tochter von Thub§!"
 development.500.req: "Hat eine Interstellare Versammlung gebaut"
