 exploration.205.name: "Stufenaufstieg eines Wissenschaftlers"
 exploration.205.desc: ""
 exploration.205.hint: "Weist ein £science_ship£ ['concept_science_ship'], das von einem £scientist£ ['concept_scientist'] geführt wird, an, £system£ ['concept_systems'] zu erkunden und untersucht auftretende £anomaly£ ['concept_anomalies']. Macht den ['concept_scientist'] alternativ zu einem Gouverneur oder gebt ihm eine Position im ['concept_council'].\n\nDiese Aufgaben geben wertvolle Erfahrung und sobald genug angesammelt wurde, erhöht sich die Stufe, was dazu führt, dass sich neue ['concept_leader_traits'] entwickeln."
 exploration.205.lore: "§L\"Etwas zu wissen, ist nicht das Ziel, sondern eine Brücke, die nur beschritten werden kann, wenn man sie zu überqueren wagt.\" - Der Weg des Gelehrten: Wachstum durch Verstehen§!"
 exploration.205.req: "Hat einen Wissenschaftler aufgestuft"
