 development.515.success: "£trigger_yes£ $development.515.req$"
 development.520.name: "Bau einer Genforschungseinrichtung"
 development.520.desc: ""
 development.520.hint: "Baut das Gebäude §HGenforschungseinrichtung§! auf einem Eurer Planeten in einem beliebigen freien ['concept_building']-Slot."
 development.520.lore: "§L\"Wenn wir unser Genom nicht modifizieren sollen, warum ist unser Genom dann so hervorragend modifizierbar?\"§!"
 development.520.req: "Hat eine Genforschungseinrichtung gebaut"
