 exploration.220.name: "Durchfliegen eines Wurmlochs"
 exploration.220.desc: ""
 exploration.220.hint: "Erforscht die Technologie \"£physics£ §H$tech_wormhole_stabilization$§!\" und weist anschließend ein £science_ship£ ['concept_science_ship'] an, ein §HWurmloch§! zu erforschen und durch es hindurchzufliegen."
 exploration.220.lore: "§L\"Wir möchten ausdrücklich darauf hinweisen, dass die Lebensversicherung unseres Instituts nicht haftet, wenn man in einem Zeitreiseparadoxon ein vor- oder spätzeitiges Ende finden sollte.\"§!"
