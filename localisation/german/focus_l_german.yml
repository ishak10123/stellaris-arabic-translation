 exploration.215.name: "Einen Wissenschaftler als Gouverneur einsetzen"
 exploration.215.desc: ""
 exploration.215.hint: "Öffnet den Reiter \"$colony_view_tab_planet_summary$\" in der £interface£ ['concept_colony_view'] oder £interface£ ['concept_planets_and_sector_view'] und weist einen £scientist£ ['concept_scientist'] als ['concept_governor'] eines £sector£ ['concept_sector', Sektors] oder £planet£ ['concept_planet', Planeten] zu."
 exploration.215.lore: "§L\"Die Wissenschaft dient weder der Tradition noch gehorcht sie der Vergangenheit. Eine von Wissenschaftlern regierte Welt wird immer in Bewegung sein.\" - Kuratorin Rhassa Tosh, Betrachtungen in Sachen Führung§!"
