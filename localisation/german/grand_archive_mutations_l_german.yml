l_german:
 RED_EYE_BEAM: "Roter Augenlaser"
 RED_EYE_BEAM_DESC: "Mutiert die Augenlinsen von Weltraumfauna so, dass sie hochintensive rote Laserstrahlen projizieren. Eine weitere Veränderung ihres Genoms löst das spontane Wachstum zusätzlicher Augen aus."
 RED_EYE_BEAM_SMALL: "$RED_EYE_BEAM$"
 RED_EYE_BEAM_MEDIUM: "$RED_EYE_BEAM$"
 RED_EYE_BEAM_LARGE: "$RED_EYE_BEAM$"
 RED_EYE_BEAM_EXTRA_LARGE: "$RED_EYE_BEAM$"
 BLUE_EYE_BEAM: "Blauer Augenlaser"
 BLUE_EYE_BEAM_DESC: "Die genetische Mutation der Netzhaut erlaub es den Sehorganen von Weltraumfauna, einen stärkeren blauen Energiestrahl zu projizieren."
 BLUE_EYE_BEAM_SMALL: "$BLUE_EYE_BEAM$"
 BLUE_EYE_BEAM_MEDIUM: "$BLUE_EYE_BEAM$"
 BLUE_EYE_BEAM_LARGE: "$BLUE_EYE_BEAM$"
 BLUE_EYE_BEAM_EXTRA_LARGE: "$BLUE_EYE_BEAM$"
 UV_EYE_BEAM: "UV-Augenlaser"
 UV_EYE_BEAM_DESC: "UV-Projektoren schirmen die Netzhaut ab, um einen präzisen und zerstörerischen Laserstrahl abzugeben."
 UV_EYE_BEAM_SMALL: "$UV_EYE_BEAM$"
 UV_EYE_BEAM_MEDIUM: "$UV_EYE_BEAM$"
 UV_EYE_BEAM_LARGE: "$UV_EYE_BEAM$"
 UV_EYE_BEAM_EXTRA_LARGE: "$UV_EYE_BEAM$"
 XRAY_EYE_BEAM: "Röntgenstrahlen-Augenlaser"
 XRAY_EYE_BEAM_DESC: "Weitere Modifikationen an der Netzhaut erlauben es der Weltraumfauna, noch zerstörerische Laserstrahlen mit einer kürzeren Wellenlänge abzufeuern."
 XRAY_EYE_BEAM_SMALL: "$XRAY_EYE_BEAM$"
 XRAY_EYE_BEAM_MEDIUM: "$XRAY_EYE_BEAM$"
 XRAY_EYE_BEAM_LARGE: "$XRAY_EYE_BEAM$"
 XRAY_EYE_BEAM_EXTRA_LARGE: "$XRAY_EYE_BEAM$"
 GAMMA_EYE_BEAM: "Gammastrahlen-Augenlaser"
 GAMMA_EYE_BEAM_DESC: "Die vollständige genetische Modifikation des Sehorgans erlaubt es der Weltraumfauna, einen Laserstrahl von unvergleichlicher Stärke und Zerstörungspotenzial hervorzubringen."
 GAMMA_EYE_BEAM_SMALL: "$GAMMA_EYE_BEAM$"
 GAMMA_EYE_BEAM_MEDIUM: "$GAMMA_EYE_BEAM$"
 GAMMA_EYE_BEAM_LARGE: "$GAMMA_EYE_BEAM$"
 GAMMA_EYE_BEAM_EXTRA_LARGE: "$GAMMA_EYE_BEAM$"
 BIO_PLASMA_THROWER: "Bio-Plasmawerfer"
 BIO_PLASMA_THROWER_DESC: "Diese Genetikmutation regt das Wachstum plasmabildender Drüsen und röhrenförmiger Auswüchse an, um Plasma über große Entfernungen hinweg abfeuern zu können."
 BIO_PLASMA_THROWER_SMALL: "$BIO_PLASMA_THROWER$"
 BIO_PLASMA_THROWER_MEDIUM: "$BIO_PLASMA_THROWER$"
 BIO_PLASMA_THROWER_LARGE: "$BIO_PLASMA_THROWER$"
 BIO_PLASMA_THROWER_EXTRA_LARGE: "$BIO_PLASMA_THROWER$"
 BIO_PLASMA_ACCELERATOR: "Bio-Plasmabeschleuniger"
 BIO_PLASMA_ACCELERATOR_DESC: "Die Verfeinerung des organischen Plasmawerfers erhöht die Reichweite und verhindert das Austreten von Plasma, wodurch ein schnelleres und zerstörerisches Projektil entsteht."
 BIO_PLASMA_ACCELERATOR_SMALL: "$BIO_PLASMA_ACCELERATOR$"
 BIO_PLASMA_ACCELERATOR_MEDIUM: "$BIO_PLASMA_ACCELERATOR$"
 BIO_PLASMA_ACCELERATOR_LARGE: "$BIO_PLASMA_ACCELERATOR$"
 BIO_PLASMA_ACCELERATOR_EXTRA_LARGE: "$BIO_PLASMA_ACCELERATOR$"
 BIO_PLASMA_CANNON: "Bio-Plasmakanone"
 BIO_PLASMA_CANNON_DESC: "Die Konzentration von biologisch erzeugtem Plasma zu intensivieren, erlaubt es der Weltraumfauna, Geschosse mit unglaublicher Zerstörungskraft abzufeuern."
 BIO_PLASMA_CANNON_SMALL: "$BIO_PLASMA_CANNON$"
 BIO_PLASMA_CANNON_MEDIUM: "$BIO_PLASMA_CANNON$"
 BIO_PLASMA_CANNON_LARGE: "$BIO_PLASMA_CANNON$"
 BIO_PLASMA_CANNON_EXTRA_LARGE: "$BIO_PLASMA_CANNON$"
 PARTICLE_BEAM: "Partikelstrahl"
 PARTICLE_BEAM_DESC: "Eine invasive Mutation zur Schaffung organischer Energieprojektoren. Diese richten aus der Ferne verheerenden Schaden an, schränken jedoch auch die Manövrierfähigkeit ein."
 PARTICLE_BEAM_SMALL: "$PARTICLE_BEAM$"
 PARTICLE_BEAM_MEDIUM: "$PARTICLE_BEAM$"
 PARTICLE_BEAM_LARGE: "$PARTICLE_BEAM$"
 PARTICLE_BEAM_EXTRA_LARGE: "$PARTICLE_BEAM$"
 TACHYON_BEAM: "Tachyonenstrahl"
 TACHYON_BEAM_DESC: "Verdichtet man organische Energieprojektoren zu einer einzigen Biolanze, erlaubt dies der Weltraumfauna, einen extrem starken Tachyonenstrahl abzufeuern."
 TACHYON_BEAM_SMALL: "$TACHYON_BEAM$"
 TACHYON_BEAM_MEDIUM: "$TACHYON_BEAM$"
 TACHYON_BEAM_LARGE: "$TACHYON_BEAM$"
 TACHYON_BEAM_EXTRA_LARGE: "$TACHYON_BEAM$"
 SHARP_EYE_LASER: "Scharfer Augenlaser"
 SHARP_EYE_LASER_DESC: "Diese Mutation wurde nach dem Vorbild der Schneidelaser von Bergbaudrohnen entwickelt und erlaubt es der Weltraumfauna, einen Augenstrahl zu erzeugen, der auf kurze Distanz Schiffsrümpfe durchtrennen kann."
 SHARP_EYE_LASER_SMALL: "$SHARP_EYE_LASER$"
 SHARP_EYE_LASER_MEDIUM: "$SHARP_EYE_LASER$"
 SHARP_EYE_LASER_LARGE: "$SHARP_EYE_LASER$"
 SHARP_EYE_LASER_EXTRA_LARGE: "$SHARP_EYE_LASER$"
 PROTON_THROWER: "Protonenwerfer"
 PROTON_THROWER_DESC: "Diese Mutation erlaubt es der Kreatur, dichte Konzentrationen von Protonen zu erzeugen und diese zu einem Projektil zu formen. Der Ladevorgang kann jedoch recht langwierig sein."
 PROTON_THROWER_SMALL: "$PROTON_THROWER$"
 PROTON_THROWER_MEDIUM: "$PROTON_THROWER$"
 PROTON_THROWER_LARGE: "$PROTON_THROWER$"
 PROTON_THROWER_EXTRA_LARGE: "$PROTON_THROWER$"
 NEUTRON_THROWER: "Neutronenwerfer"
 NEUTRON_THROWER_DESC: "Mit der Fähigkeit, die Kraft der etwas schwereren Neutronen anstelle von Protonen zu nutzen, werden die konzentrierten Geschosse noch zerstörerischer."
 NEUTRON_THROWER_SMALL: "$NEUTRON_THROWER$"
 NEUTRON_THROWER_MEDIUM: "$NEUTRON_THROWER$"
 NEUTRON_THROWER_LARGE: "$NEUTRON_THROWER$"
 NEUTRON_THROWER_EXTRA_LARGE: "$NEUTRON_THROWER$"
 BIO_DISINTEGRATOR: "Bio-Disintegrator"
 BIO_DISINTEGRATOR_DESC: "Durch die Replikation von Materie-Disintegratoren der Ungebetenen kann Weltraumfauna, die mit dieser Biowaffe ausgerüstet wurde, ihren Feind einfach in seine atomaren Bestandteile zerlegen."
 BIO_DISINTEGRATOR_SMALL: "$BIO_DISINTEGRATOR$"
 BIO_DISINTEGRATOR_MEDIUM: "$BIO_DISINTEGRATOR$"
 BIO_DISINTEGRATOR_LARGE: "$BIO_DISINTEGRATOR$"
 BIO_DISINTEGRATOR_EXTRA_LARGE: "$BIO_DISINTEGRATOR$"
 MOLECULAR_DISRUPTOR: "Molekular-Disruptor"
 MOLECULAR_DISRUPTOR_DESC: "Diese Biowaffen umgehen die konventionelle Verteidigung des Ziels, indem sie die molekulare Verbindung auf atomarer Ebene aufbrechen und so kritischen Rumpfschaden verursachen."
 MOLECULAR_DISRUPTOR_SMALL: "$MOLECULAR_DISRUPTOR$"
 MOLECULAR_DISRUPTOR_MEDIUM: "$MOLECULAR_DISRUPTOR$"
 MOLECULAR_DISRUPTOR_LARGE: "$MOLECULAR_DISRUPTOR$"
 MOLECULAR_DISRUPTOR_EXTRA_LARGE: "$MOLECULAR_DISRUPTOR$"
 ION_MOLECULAR_DISRUPTOR: "Ionen-Molekular-Disruptor"
 ION_MOLECULAR_DISRUPTOR_DESC: "Diese Biowaffen schießen Ladungen explosiver Ionenpartikel ab und erhöhen so den Schaden, ohne die Feuerrate zu beeinträchtigen."
 ION_MOLECULAR_DISRUPTOR_SMALL: "$ION_MOLECULAR_DISRUPTOR$"
 ION_MOLECULAR_DISRUPTOR_MEDIUM: "$ION_MOLECULAR_DISRUPTOR$"
 ION_MOLECULAR_DISRUPTOR_LARGE: "$ION_MOLECULAR_DISRUPTOR$"
 ION_MOLECULAR_DISRUPTOR_EXTRA_LARGE: "$ION_MOLECULAR_DISRUPTOR$"
 PHASED_MOLECULAR_DISRUPTOR: "Phasenverschobener Molekular-Disruptor"
 PHASED_MOLECULAR_DISRUPTOR_DESC: "Hoch entwickelte Biowaffen, die Ladungen instabiler Quantenenergie abfeuern, um die molekularen Bindungen ihres unglücklichen Ziels zu zerreißen."
 PHASED_MOLECULAR_DISRUPTOR_SMALL: "$PHASED_MOLECULAR_DISRUPTOR$"
 PHASED_MOLECULAR_DISRUPTOR_MEDIUM: "$PHASED_MOLECULAR_DISRUPTOR$"
 PHASED_MOLECULAR_DISRUPTOR_LARGE: "$PHASED_MOLECULAR_DISRUPTOR$"
 PHASED_MOLECULAR_DISRUPTOR_EXTRA_LARGE: "$PHASED_MOLECULAR_DISRUPTOR$"
 LIGHTNING_BREATH: "Blitz-Atem"
 LIGHTNING_BREATH_DESC: "Durch die Modifizierung des Atmungssystems mit bioelektrischen Leitungen kann Weltraumfauna Lichtbögen mit durchdringenden Blitzen \"ausatmen\"."
 LIGHTNING_BREATH_SMALL: "$LIGHTNING_BREATH$"
 LIGHTNING_BREATH_MEDIUM: "$LIGHTNING_BREATH$"
 LIGHTNING_BREATH_LARGE: "$LIGHTNING_BREATH$"
 LIGHTNING_BREATH_EXTRA_LARGE: "$LIGHTNING_BREATH$"
 LIGHTNING_EMITTER: "Blitz-Emitter"
 LIGHTNING_EMITTER_DESC: "Durch die Integration zusätzlicher bioelektrischer Leitungen kann Weltraumfauna überladene Blitze in Form chaotischer Lichtbögen erzeugen."
 LIGHTNING_EMITTER_SMALL: "$LIGHTNING_EMITTER$"
 LIGHTNING_EMITTER_MEDIUM: "$LIGHTNING_EMITTER$"
 LIGHTNING_EMITTER_LARGE: "$LIGHTNING_EMITTER$"
 LIGHTNING_EMITTER_EXTRA_LARGE: "$LIGHTNING_EMITTER$"
 FOCUSED_LIGHTNING_EMITTER: "Konzentrierter Blitz-Emitter"
 FOCUSED_LIGHTNING_EMITTER_DESC: "Die Stabilisierung von Blitz-Emittern erhöht die Genauigkeit und die Stabilität der Blitze, wodurch die zuvor chaotischen Lichtbögen zu präzisen Strahlen purer Zerstörung geformt werden können."
 FOCUSED_LIGHTNING_EMITTER_SMALL: "$FOCUSED_LIGHTNING_EMITTER$"
 FOCUSED_LIGHTNING_EMITTER_MEDIUM: "$FOCUSED_LIGHTNING_EMITTER$"
 FOCUSED_LIGHTNING_EMITTER_LARGE: "$FOCUSED_LIGHTNING_EMITTER$"
 FOCUSED_LIGHTNING_EMITTER_EXTRA_LARGE: "$FOCUSED_LIGHTNING_EMITTER$"
 ENERGY_SIPHON: "Energiesauger"
 ENERGY_SIPHON_DESC: "Diese dem natürlichen Angriffsverhalten der Tiyanki nachempfundene Mutation fügt ein neues Organ hinzu, das in der Lage ist, Feinden in der Nähe Energie abzusaugen."
 ENERGY_SIPHON_SMALL: "$ENERGY_SIPHON$"
 ENERGY_SIPHON_MEDIUM: "$ENERGY_SIPHON$"
 ENERGY_SIPHON_LARGE: "$ENERGY_SIPHON$"
 ENERGY_SIPHON_EXTRA_LARGE: "$ENERGY_SIPHON$"
 NULL_VOID_SIPHON: "Null-Leere-Sauger"
 NULL_VOID_SIPHON_DESC: "Als Variante des natürlichen Angriffsverhaltens von Weltraumamöben produziert dieses Organ Null-Leere-Strahlen, die die einzigartige Fähigkeit besitzen, Energie mit einer gleichgroßen Entropiekraft zu kontern."
 NULL_VOID_SIPHON_SMALL: "$NULL_VOID_SIPHON$"
 NULL_VOID_SIPHON_MEDIUM: "$NULL_VOID_SIPHON$"
 NULL_VOID_SIPHON_LARGE: "$NULL_VOID_SIPHON$"
 NULL_VOID_SIPHON_EXTRA_LARGE: "$null_void_siphon$"
 SHARD_ACCELERATOR: "Splitterbeschleuniger"
 SHARD_ACCELERATOR_DESC: "Splitterbeschleuniger nutzen die latente statische Elektrizität, um magnetisierte Knochensplitter mit extrem hohen Geschwindigkeiten auf ihre Ziele zu schleudern."
 SHARD_ACCELERATOR_SMALL: "$SHARD_ACCELERATOR$"
 SHARD_ACCELERATOR_MEDIUM: "$SHARD_ACCELERATOR$"
 SHARD_ACCELERATOR_LARGE: "$SHARD_ACCELERATOR$"
 SHARD_ACCELERATOR_EXTRA_LARGE: "$SHARD_ACCELERATOR$"
 BIO_COIL_SHARD_ACCELERATOR: "Bio-Spulen-Splitterbeschleuniger"
 BIO_COIL_SHARD_ACCELERATOR_DESC: "Indem man die elektrischen Nervenbahnen zu einer Spule aufwickelt, lässt sich die statische Ladung verstärken, was es der Weltraumfauna erlaubt, magnetisierte Splitter mit höherer Geschwindigkeit abzuschießen."
 BIO_COIL_SHARD_ACCELERATOR_SMALL: "$BIO_COIL_SHARD_ACCELERATOR$"
 BIO_COIL_SHARD_ACCELERATOR_MEDIUM: "$BIO_COIL_SHARD_ACCELERATOR$"
 BIO_COIL_SHARD_ACCELERATOR_LARGE: "$BIO_COIL_SHARD_ACCELERATOR$"
 BIO_COIL_SHARD_ACCELERATOR_EXTRA_LARGE: "$BIO_COIL_SHARD_ACCELERATOR$"
 SHARD_RAIL_ACCELERATOR: "Schienen-Splitterbeschleuniger"
 SHARD_RAIL_ACCELERATOR_DESC: "Schienenartige Anhängsel wandeln chemische Energie in Elektrizität um und erzeugen ein starkes Magnetfeld für den Abschuss tödlicher Projektile."
 SHARD_RAIL_ACCELERATOR_SMALL: "$SHARD_RAIL_ACCELERATOR$"
 SHARD_RAIL_ACCELERATOR_MEDIUM: "$SHARD_RAIL_ACCELERATOR$"
 SHARD_RAIL_ACCELERATOR_LARGE: "$SHARD_RAIL_ACCELERATOR$"
 SHARD_RAIL_ACCELERATOR_EXTRA_LARGE: "$SHARD_RAIL_ACCELERATOR$"
 ADVANCED_SHARD_RAIL_ACCELERATOR: "Verbesserter Schienen-Splitterbeschleuniger"
 ADVANCED_SHARD_RAIL_ACCELERATOR_DESC: "Zusätzliche energieerzeugende Anhängsel erhöhen die Ladung der Schiene und beschleunigen die Geschwindigkeit des Geschosses, um eine noch höhere Tödlichkeit zu erreichen."
 ADVANCED_SHARD_RAIL_ACCELERATOR_SMALL: "$ADVANCED_SHARD_RAIL_ACCELERATOR$"
 ADVANCED_SHARD_RAIL_ACCELERATOR_MEDIUM: "$ADVANCED_SHARD_RAIL_ACCELERATOR$"
 ADVANCED_SHARD_RAIL_ACCELERATOR_LARGE: "$ADVANCED_SHARD_RAIL_ACCELERATOR$"
 ADVANCED_SHARD_RAIL_ACCELERATOR_EXTRA_LARGE: "$ADVANCED_SHARD_RAIL_ACCELERATOR$"
 SHARD_GAUSS_ACCELERATOR: "Gauß-Splitterbeschleuniger"
 SHARD_GAUSS_ACCELERATOR_DESC: "Ineinander verschlungene Anhängsel, die große Mengen organischer Elektrizität nutzen, um Geschosse mit unvergleichlicher Geschwindigkeit abzuschießen."
 SHARD_GAUSS_ACCELERATOR_SMALL: "$SHARD_GAUSS_ACCELERATOR$"
 SHARD_GAUSS_ACCELERATOR_MEDIUM: "$SHARD_GAUSS_ACCELERATOR$"
 SHARD_GAUSS_ACCELERATOR_LARGE: "$SHARD_GAUSS_ACCELERATOR$"
 SHARD_GAUSS_ACCELERATOR_EXTRA_LARGE: "$SHARD_GAUSS_ACCELERATOR$"
 THORN_CANNON: "Dornenkanone"
 THORN_CANNON_DESC: "Zusätzliche Öffnungen, die mit einer beeindruckenden Feuerrate Salven von gehärteten Knochensplittern abschießen, die mit einer explosiven Flüssigkeit gefüllt sind."
 THORN_CANNON_SMALL: "$THORN_CANNON$"
 THORN_CANNON_MEDIUM: "$THORN_CANNON$"
 THORN_CANNON_LARGE: "$THORN_CANNON$"
 THORN_CANNON_EXTRA_LARGE: "$THORN_CANNON$"
 RIPPER_THORN_CANNON: "Ripper-Dornenkanone"
 RIPPER_THORN_CANNON_DESC: "Die verlängerten Mündungsrohre und die verbesserte Splitterbildung erlauben es Dornenkanonen, noch tödlichere Salven explosiver Munition abzufeuern."
 RIPPER_THORN_CANNON_SMALL: "$RIPPER_THORN_CANNON$"
 RIPPER_THORN_CANNON_MEDIUM: "$RIPPER_THORN_CANNON$"
 RIPPER_THORN_CANNON_LARGE: "$RIPPER_THORN_CANNON$"
 RIPPER_THORN_CANNON_EXTRA_LARGE: "$RIPPER_THORN_CANNON$"
 ACIDSTORM_THORN_CANNON: "Säuresturm-Dornenkanone"
 ACIDSTORM_THORN_CANNON_DESC: "Durch eine stark erhöhte Konzentration der explosiven Flüssigkeit können die Knochensplitter Schilde schmelzen, Metall korrodieren und Fleisch zerreißen."
 ACIDSTORM_THORN_CANNON_SMALL: "$ACIDSTORM_THORN_CANNON$"
 ACIDSTORM_THORN_CANNON_MEDIUM: "$ACIDSTORM_THORN_CANNON$"
 ACIDSTORM_THORN_CANNON_LARGE: "$ACIDSTORM_THORN_CANNON$"
 ACIDSTORM_THORN_CANNON_EXTRA_LARGE: "$ACIDSTORM_THORN_CANNON$"
 NANITE_INFUSED_THORN_CANNON: "Naniten-Dornenkanone"
 NANITE_INFUSED_THORN_CANNON_DESC: "Indem die organische Munition durch selbstreplizierende Naniten ersetzt wird, können diese Dornenkanonen EMPs mit kurzer Reichweite auslösen und sich durch jedes Material fressen."
 NANITE_INFUSED_THORN_CANNON_SMALL: "$NANITE_INFUSED_THORN_CANNON$"
 NANITE_INFUSED_THORN_CANNON_MEDIUM: "$NANITE_INFUSED_THORN_CANNON$"
 NANITE_INFUSED_THORN_CANNON_LARGE: "$NANITE_INFUSED_THORN_CANNON$"
 NANITE_INFUSED_THORN_CANNON_EXTRA_LARGE: "$NANITE_INFUSED_THORN_CANNON$"
 CHITIN_BATTERY: "Chitinbatterie"
 CHITIN_BATTERY_DESC: "Diese Mutation verleiht Weltraumfauna die Fähigkeit, dichte Chitinstangen zu erzeugen, die sie mit hoher Geschwindigkeit aus großer Entfernung abschießen kann."
 CHITIN_BATTERY_SMALL: "$CHITIN_BATTERY$"
 CHITIN_BATTERY_MEDIUM: "$CHITIN_BATTERY$"
 CHITIN_BATTERY_LARGE: "$CHITIN_BATTERY$"
 CHITIN_BATTERY_EXTRA_LARGE: "$CHITIN_BATTERY$"
 CHITIN_ARTILLERY: "Chitinartillerie"
 CHITIN_ARTILLERY_DESC: "Zusätzliche unterstützende Anhängsel erhöhen die Mündungsgeschwindigkeit und Stabilität der Geschosse und verleihen der organischen Artillerie eine höhere Durchschlagskraft."
 CHITIN_ARTILLERY_SMALL: "$CHITIN_ARTILLERY$"
 CHITIN_ARTILLERY_MEDIUM: "$CHITIN_ARTILLERY$"
 CHITIN_ARTILLERY_LARGE: "$CHITIN_ARTILLERY$"
 CHITIN_ARTILLERY_EXTRA_LARGE: "$CHITIN_ARTILLERY$"
 MEGA_BOMBARD: "Mega-Bombarde"
 MEGA_BOMBARD_DESC: "Diese unförmige und invasive Bombardenmutation schränkt die Bewegungen der Kreatur stark ein und erfordert ein präzises Zielsuchsystem, um effektiv zu sein. Diese Nachteile werden jedoch durch die rohe Zerstörungskraft der Waffe mehr als wettgemacht."
 MEGA_BOMBARD_SMALL: "$MEGA_BOMBARD$"
 MEGA_BOMBARD_MEDIUM: "$MEGA_BOMBARD$"
 MEGA_BOMBARD_LARGE: "$MEGA_BOMBARD$"
 MEGA_BOMBARD_EXTRA_LARGE: "$MEGA_BOMBARD$"
 GIGA_BOMBARD: "Giga-Bombarde"
 GIGA_BOMBARD_DESC: "Durch die Modifizierung des organischen Dralls kann diese Bombarde noch größere Geschosse mit noch höherer Geschwindigkeit abfeuern und so extrem durchschlagskräftige Artillerieangriffe durchführen."
 GIGA_BOMBARD_SMALL: "$GIGA_BOMBARD$"
 GIGA_BOMBARD_MEDIUM: "$GIGA_BOMBARD$"
 GIGA_BOMBARD_LARGE: "$GIGA_BOMBARD$"
 GIGA_BOMBARD_EXTRA_LARGE: "$GIGA_BOMBARD$"
 MIASMA_LAUNCHER: "Miasmakanone"
 MIASMA_LAUNCHER_DESC: "Diese Biowaffe nutzt eine kleine Gebärkapsel, in der eine teilweise herangewachsene und äußerst explosive Brut aufbewahrt wird, die sich wie eine Zielsuchrakete abfeuern lässt. Sobald die Brut von ihrer Hülle getrennt wurde, steuert sie instinktiv auf das gewünschte Ziel zu und detoniert beim Aufprall."
 MIASMA_LAUNCHER_SMALL: "$MIASMA_LAUNCHER$"
 MIASMA_LAUNCHER_MEDIUM: "$MIASMA_LAUNCHER$"
 MIASMA_LAUNCHER_LARGE: "$MIASMA_LAUNCHER$"
 MIASMA_LAUNCHER_EXTRA_LARGE: "$MIASMA_LAUNCHER$"
 VOLATILE_MIASMA_LAUNCHER: "Explosive Miasmakanone"
 VOLATILE_MIASMA_LAUNCHER_DESC: "Indem das Brutgeschoss mit einem explosiven Miasma ummantelt wird, lassen sich eine noch höhere Projektilgeschwindigkeit und explosive Nutzlast erreichen."
 VOLATILE_MIASMA_LAUNCHER_SMALL: "$VOLATILE_MIASMA_LAUNCHER$"
 VOLATILE_MIASMA_LAUNCHER_MEDIUM: "$VOLATILE_MIASMA_LAUNCHER$"
 VOLATILE_MIASMA_LAUNCHER_LARGE: "$VOLATILE_MIASMA_LAUNCHER$"
 VOLATILE_MIASMA_LAUNCHER_EXTRA_LARGE: "$VOLATILE_MIASMA_LAUNCHER$"
 ANTIMATTER_LAUNCHER: "Antimateriekanone"
 ANTIMATTER_LAUNCHER_DESC: "Durch eine leichte Abwandlung im Entstehungsprozess des Brutgeschosses kann eine gewisse Nutzlast an Antimaterie integriert werden, die die Sprengkraft deutlich erhöht."
 ANTIMATTER_LAUNCHER_SMALL: "$ANTIMATTER_LAUNCHER$"
 ANTIMATTER_LAUNCHER_MEDIUM: "$ANTIMATTER_LAUNCHER$"
 ANTIMATTER_LAUNCHER_LARGE: "$ANTIMATTER_LAUNCHER$"
 ANTIMATTER_LAUNCHER_EXTRA_LARGE: "$ANTIMATTER_LAUNCHER$"
 QUANTUM_LAUNCHER: "Quantenkanone"
 QUANTUM_LAUNCHER_DESC: "Eine Verbesserung im Reifungsprozess erlaubt die Bildung von Quanten-Brutgeschossen. Diese lebenden Projektile beziehen Energie aus dem Nullpunkt-Vakuum, um eine unglaubliche Zerstörungskraft zu entfalten."
 QUANTUM_LAUNCHER_SMALL: "$QUANTUM_LAUNCHER$"
 QUANTUM_LAUNCHER_MEDIUM: "$QUANTUM_LAUNCHER$"
 QUANTUM_LAUNCHER_LARGE: "$QUANTUM_LAUNCHER$"
 QUANTUM_LAUNCHER_EXTRA_LARGE: "$QUANTUM_LAUNCHER$"
 MARAUDER_LAUNCHER: "Marodeur-Kanone"
 MARAUDER_LAUNCHER_DESC: "Genetische Veränderungen verleihen dem Geschoss eine nahezu vollständige Empfindungsfähigkeit und verbessern so die Flugdynamik und die Zielfindung von Schwachpunkten. Die moralischen Fragen für den Einsatz dieser Geschosse sind jedoch etwas kompliziert."
