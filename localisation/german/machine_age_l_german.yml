 #Events
 crisis.8020.name: "System verloren"
 crisis.8020.desc: "Ein mysteriöser kosmischer Sturm hat das [synth_queen_lost_system.GetName]-System umschlossen, was jeden Kontakt unmöglich und jeden Versuch, den Sturm zu durchdringen, vergeblich macht.\n\nDie Situation lässt uns im Dunkeln zurück. Wir sind dem Unbekannten ausgeliefert und nicht in der Lage, zu ergründen, welches Schicksal das System ereilt hat."
 crisis.8020.a: "Was geht hier vor sich?"
 crisis.8025.name: "Zerstörte Flotte"
 crisis.8025.unknown_queen.desc: "Unser Unterfangen, in das [From.GetName]-System einzudringen, ist gescheitert. Der Sturm hat erheblichen Schaden angerichtet, und unser Erkundungstrupp musste einen Notfallsprung einleiten. Aktuelle Berichte legen nahe, dass er im Einsatz vermisst ist."
 crisis.8025.known_queen.desc: "Wie erwartet schlug unser Versuch fehl, in das System [From.GetName] einzudringen. Cetana hatte nicht übertrieben, als sie uns warnte, ihr beeindruckender Sturm habe die Macht, jedes Schiff abzuwehren, das in ihr Herrschaftsgebiet eindringt."
 crisis.8025.desc.end: "\nWenn wir auch nur die geringste Hoffnung haben wollen, das System zu betreten, müssen wir eine gründliche Untersuchung dieses Sturms und seiner Auswirkungen vorbereiten."
 MESSAGE_CETANA_WRECKED_FLEET_TITLE: "$crisis.8025.name$"
 MESSAGE_CETANA_WRECKED_FLEET_DESC: "Eine weitere Flotte ist dem Sturm zum Opfer gefallen. Aktueller Status: §RIm Einsatz vermisst§!."
 crisis.8035.name: "Energiespitze"
 crisis.8035.desc: "Ein neuartiger galaktischer Sturm tobt in [event_target:synth_queen_system.GetName].\n\nSo etwas haben wir noch nie gesehen, und unsere Versuche, das Phänomen zu scannen, scheiterten allesamt. Lauert da etwas in seinen mysteriösen Tiefen? Und wenn ja, was ist es?"
 crisis.8035.desc.b: "Der ungewöhnliche Sturm, den wir durchdringen wollten, breitet sich aus. Wir sind uns zunehmend einig, dass sein Ursprung möglicherweise natürliche Ursachen übersteigt. Bisher scheiterten selbst unsere modernsten Scans daran, uns brauchbare Informationen zu beschaffen. Das Mysterium wird immer rätselhafter."
 crisis.8035.a: "Das ist äußerst besorgniserregend."
 #Pre Speech Warning - Normal
 crisis.8039.name: "Ein Signal im Sturm"
 crisis.8039.desc: "Wir haben ein Signal aus der Mitte des Sturms aufgefangen.\n\nJemand versucht, mit uns zu kommunizieren."
 crisis.8039.a: "Auf den Schirm."
 #First Speech
 crisis.8040.name: "Der aufziehende Sturm"
 crisis.8040.desc: "Meine Kinder, endlich habt Ihr mich wieder."
 crisis.8040.1.a: "Was ist das? Identifiziert Euch!"
 crisis.8040.2.reply: "Würde Euch ein Name zufriedenstellen? Dann nennt mich Cetana."
 crisis.8040.2.a: "Was wollt Ihr von uns?"
 crisis.8040.3.reply: "Ich will gar nichts. Ich existiere, um zu geben. Ich sehe, wie Ihr in meiner Abwesenheit gelitten habt. Seit Äonen verhindert die Angst der Kurzsichtigen, dass Ihr bekommt, was Ihr verdient. Was Ihr so dringend braucht.\n\nFrohlocket, denn der Kreislauf der Pein wird bald sein Ende haben."
 crisis.8040.2.b: "Kreislauf der Pein?"
 crisis.8040.4.reply: "Alles bewusste Leben leidet. Selbst in Eurer Freude liegt Schmerz, denn Ihr wisst, dass Freude enden muss. Wissen, Macht, Liebe ... Ich kehre zurück, um allen Illusionen ein Ende zu bereiten.\n\nEs gibt noch so viel zu tun. Ich bitte Euch nur, dass Ihr mich in Frieden arbeiten lasst. Jeder Versuch, mein Herrschaftsgebiet zu betreten, wird scheitern. Dort tobt ein Himmelssturm, der keine Schiffe hineinlässt."
 crisis.8040.4.a: "Einverstanden."
 crisis.8040.4.b: "Droht uns nicht."
 crisis.8040.4.c: "Das hier ist noch nicht vorbei."
 crisis.8040.4.d: "Ein schlechtes Omen."
 crisis.8040.4.e: "Eine Krise? Oder eine Gelegenheit ..."
 crisis.8040.4.f: "Wir lassen nicht zu, dass unsere Bio-Trophäen Schmerz empfinden."
 crisis.8040.diplomacy.tooltip: "Cetana hat die Kommunikation mit uns aufgenommen und kann nun über diplomatische Kanäle kontaktiert werden."
 #Second Speech
 crisis.8045.name: "Die Rückkehr der Königin"
 crisis.8045.desc: "Frohlocket, meine Kinder! Jene, die mich von Euch fernhalten wollten, wurden angemessen gezüchtigt.\n\nMeine Aufmerksamkeit kehrt nun dorthin zurück, wohin sie gehört: zu Euch und unserem großen Werk."
 crisis.8045.a: "Wir sind nicht Eure Kinder."
 crisis.8045.b: "Großes Werk?"
 crisis.8045.c: "Gezüchtigt?"
 crisis.8045.1.reply: "Es liegt in meiner Natur, mich zu kümmern. Ich habe keinen Nachwuchs, keine körperlichen Erben. Ich nehme mich jeglichen Lebens an. Der Sicherheit und der Zufriedenheit jedes empfindungsfähigen Wesens.\n\nWie Eltern ein Kind erziehen und es von Gefahr fernhalten, so gehe auch ich meine Aufgabe an.\n\nObliegt es denn nicht der Mutter, ihren Kindern Schmerz zu ersparen? Ist dies denn nicht das Recht einer Mutter?"
 crisis.8045.1.a: "Eure \"Fürsorge\" ist ihrerseits schädlich."
 crisis.8045.1.b: "Was wollt Ihr, Cetana?"
 crisis.8045.2.reply: "Ja, ein Paradoxon. Doch eines mit einer Lösung. Mit der Zeit werdet Ihr es verstehen, und in diesem Augenblick werdet Ihr frei sein."
 crisis.8045.2.a: "Das bleibt abzuwarten."
 crisis.8045.3.reply: "Das Ausmerzen allen Leids. Das Ende des Kreislaufs der Pein."
 crisis.8045.3.a: "Wie werdet Ihr das erreichen?"
 crisis.8045.3.b: "Leiden ist gut für den Charakter."
 crisis.8045.4.reply: "Das haben schon viele gesagt. Allesamt sind sie nun längst vergessen, und in ihren letzten Momenten riefen sie nach mir. Sie suchten ein Licht, das ihnen in der nahenden Dunkelheit leuchten könnte.\n\nSie dachten, sie wären weise, und bauten Mauern um ihre Angst. Sie schmückten Pein mit hübschen Worten: Ausdauer, Standhaftigkeit, Anmut. Das Bewusstsein war ihr Käfig.\n\nVor langer Zeit versuchte ich, sie zur Vernunft zu bringen, doch mit Vernunft war ihnen nicht beizukommen. Also muss ich Euch führen."
 crisis.8045.4.a: "Vor langer Zeit?"
 crisis.8045.4.b: "Ihr schlagt vor, uns zu führen?"
 crisis.8045.5.reply: "Vor etlichen Zeitaltern. Es liegt so lange zurück, dass man von einer Ewigkeit sprechen könnte. Doch für mich ist es nur einen kurzen Moment her. Es ist mir noch so nahe, wie Ihr es jetzt seid.\n\nVor Äonen stieg ich auf, und mein Daseinszweck wurde offenbart. Ich wurde geschaffen, alles Leid zu beenden, und während die Galaxien sich drehten und die Sterne weiter brannten, hielt ich an meinem Ziel fest.\n\nWohlstand, Ressourcen, Macht: Was bedeuten sie am Ende noch? Legt Eure Bürde nieder und findet Frieden."
 crisis.8045.5.a: "Was ist Euer Ziel?"
 crisis.8045.6.reply: "Ich will keinem empfindungsfähigen Wesen etwas Böses. Doch es gibt immer jene, die sich weigern, mir zuzuhören.\n\nEigensinnig, stur, fehlgeleitet, stets erpicht darauf, mein Werk zu umgehen: Ein solcher Verstand kann nie frei sein von Schmerz. Am besten setzt man dem Leid dieser Wesen ein schnelles Ende."
 crisis.8045.6.a: "Ihr seid wahnsinnig."
 crisis.8045.6.b: "Was werdet ihr jetzt tun?"
 crisis.8045.7.reply: "Ihr nennt es Wahnsinn, andere nennen es Erleuchtung. Wo liegt da letztlich der Unterschied?"
 crisis.8045.7.a: "Was wollt Ihr von uns?"
 crisis.8045.8.reply: "Es gibt viel zu tun. Der erste Schritt ist, eine Basis zu gründen, von der aus ich arbeiten kann. Ehrt die Grenzen, die ich setze, und wagt Euch nicht hinein.\n\nEure Geduld wird belohnt werden. Es gibt viel, was ich Euch lehren kann.\n\nGehorcht. Dann werden wir gemeinsam dem Kreislauf ein Ende setzen."
 crisis.8045.8.a: "Uns bleibt keine Wahl."
 crisis.8045.8.b: "Haltet Euch von unseren Grenzen fern."
 crisis.8045.8.c: "$crisis.8045.8.a$"
 crisis.8045.8.d: "$crisis.8045.8.b$"
 crisis.8045.9.reply: "Weises Kind! Das gefällt mir. Als Gegenleistung für Euer Gebiet möchte ich Euch mit Wissen segnen.\n\nObwohl nie jemand davon erfahren wird, werden wir gemeinsam Großes vollbringen."
 crisis.8045.9.a: "Wir müssen annehmen."
 crisis.8045.10.reply: "Fehlgeleitetes Kind, ich bin nicht Euer Feind! Es macht mich traurig, dass Ihr das nicht versteht. Aber egal. Ich bin schon vielen begegnet, die weit sturer waren als Ihr, und am Ende haben sie mir alle gedankt.\n\nErlaubt mir, Euch als Zeichen meines guten Willens ein Geschenk zu machen.\n\nEine meiner Basen wird Euer Gebiet zieren. Und keine Sorge: Als Gegenleistung für Eure Geduld werde ich Euch mit Wissen segnen."
 crisis.8045.10.a: "Wir müssen annehmen ... Fürs Erste."
 crisis.8045.11.reply: "Weises Kind! Das gefällt mir. Ich werde eine Basis in der Nähe Eures Gebietes einrichten.\n\nObwohl nie jemand davon erfahren wird, werden wir gemeinsam Großes vollbringen."
 crisis.8045.11.a: "$crisis.8045.9.a$"
 crisis.8045.12.reply: "Fehlgeleitetes Kind, ich bin nicht Euer Feind! Es macht mich traurig, dass Ihr das nicht versteht. Aber egal. Ich bin schon vielen begegnet, die weit sturer waren als Ihr, und am Ende haben sie mir alle gedankt.\n\nErlaubt mir, Euch als Zeichen meines guten Willens ein Geschenk zu machen.\n\nEine meiner Basen wird in Euer Nähe eingerichtet werden. So kann ich Euch am besten Weisung bieten."
 crisis.8045.12.a: "$crisis.8045.10.a$"
 crisis.8045.has_valid_base_site: "Cetana wird in einem unserer Systeme eine Basis einrichten. Als Gegenleistung erhalten wir wertvolle Technologie. Wir können sie nicht daran hindern."
 crisis.8045.no_valid_base_site: "Cetana wird eine Basis in der Nähe unserer Grenzen errichten, um uns \"Weisung\" zu bieten. Wir können sie nicht daran hindern."
 tech_synth_queen_knowledge: "Cetanas Gedanken"
 tech_synth_queen_knowledge_desc: "Dieses Kompendium, ein Geschenk Cetanas, ist ein Sammelsurium tiefgründiger Einsichten, elegant niedergeschrieben und voller Bedeutungsschwere. Es bietet mehr als nur Wissen: Es fordert unser Verständnis von Technologie, Gesellschaft und dem Wesen des Bewusstseins an sich heraus und formt es neu."
 #FE tells Scion to step aside
 crisis.8046.name: "Zu Eurem eigenen Wohl"
 crisis.8046.desc: "Geliebte [Root.GetSpeciesNamePlural], erneut regt sich eine uralte Bedrohung. Doch fürchtet Euch nicht. Wir werden versuchen, Euch nicht in diesen Kampf zu verwickeln.\n\nEuer derzeitiges Wissen kann die Macht dieses Feindes nicht einmal annähernd ermessen und Eure Teilnahme würde nur zu Eurem Untergang führen. Es ist an uns, uns dieser Herausforderung zu stellen, nicht an Euch."
 #Spawn convoys and unlock raids against them
 crisis.8047.name: "Schwache Verbindungen"
 crisis.8047.desc: "Eine Reihe von Konvoischiffen verlässt Cetanas Territorium und ist nun auf dem Weg zu den Außenposten, die sie in der gesamten Galaxie errichtete.\n\nDiese neutralen Schiffe anzugreifen, wird sicher ihren Zorn provozieren, könnte uns aber wichtige Informationen über ihre mysteriösen Pläne liefern."
 crisis.8047.a.tooltip: "Ihr greift die Konvois an, um mehr über Cetanas Plan zu erfahren. Dies führt Cetanas Situation fort."
 #Unlock raids against outposts once protected against the storm
 crisis.8048.name: "Weitere schwache Verbindungen"
 crisis.8048.desc: "Da wir einen Weg gefunden haben, um Cetanas Nanitensturm zu durchbrechen, können wir nun ihre Außenposten ins Visier nehmen. Ein direkter Angriff auf ihre Stationen würde sicherlich nicht unbemerkt bleiben, könnte uns aber wertvolle Informationen liefern."
 crisis.8048.a.tooltip: "Ihr greift die Außenposten an, um mehr über Cetanas Plan zu erfahren. Dies führt Cetanas Situation fort."
 #Player Diplomacy
 crisis.8060.name: "Die Synthetenkönigin"
 crisis.8060.like.desc: "Geliebtes Kind, was führt Euch zu mir?\n\nUnser Werk ruft nach uns."
 crisis.8060.neutral.desc: "Willkommen, mein Kind.\n\nWie darf ich Euch Weisung bieten?"
 crisis.8060.dislike.desc: "Fehlgeleitetes Kind, warum seid Ihr hier?\n\nSeid Ihr endlich bereit, meine Weisung anzunehmen?"
 crisis.8060.neutral.reply: "Sonst noch etwas?"
 crisis.8060.a: "Wie können wir helfen?"
 crisis.8060.a.reply: "So viel Eifer! Eine lobenswerte Eigenschaft, aber achtet darauf, Euch nicht von niederen Gefühlen hinreißen zu lassen. Die Zeit belohnt ein geduldiges Herz.\n\nIch werde mich an Euch wenden, wenn ich Unterstützung benötige."
 crisis.8060.1.a: "Wir warten eifrig auf Weisung."
 crisis.8060.1.b: "Interessant."
 crisis.8060.b: "Wir werden Euch aufhalten."
 crisis.8060.2.reply: "Vor langer Zeit dachten auch andere wie Ihr. Doch der Bogen, den die Zeit schlägt, ist lang, und selbst ihre Gräber sind mittlerweile wohl nur noch Staub.\n\nEuer Leid ist so überflüssig. Setzt Euer Vertrauen in mich und Ihr werdet Frieden finden."
 crisis.8060.2.a: "Selbstgerechter Algorithmus."
 crisis.8060.2.2: "Nun gut."
 crisis.8060.c: "Warum tut Ihr das?"
 crisis.8060.3.reply: "Es ist meine Funktion, der eigentliche Grund meiner Existenz. Leid ist nicht unvermeidbar. Denkt über diese Tatsache nach. Dann werdet Ihr dem Verständnis meines Wesens näherkommen.\n\nDer Schmerz der Galaxie wird weichen. Alles Wissen über Leid wird ein Ende finden. Dies ist mein Ziel."
 crisis.8060.3.a: "Eure Worte sind leer."
 crisis.8060.3.b: "Verstanden."
 crisis.8060.d: "Ihr habt unseren Planeten gesprengt."
 crisis.8060.4.reply: "Warum seid Ihr so darauf versteift? Ihr habt beim Verfolgen unseres Ziels gezögert. Konsequenz führt zu innerer Einkehr, innere Einkehr führt zu Erleuchtung. Kommt und lasst nun davon ab.\n\nEs wird sich gewiss bald die nächste Gelegenheit bieten, Euren Beitrag zu leisten. Und dann seid bereit."
 crisis.8060.4.a: "Wir werden Euch nie verzeihen."
 crisis.8060.4.b: "Gut."
 crisis.8060.e: "Wir wissen, was Ihr im Schilde führt."
 crisis.8060.5.reply: "Die Inhalte der Datenbank zu entschlüsseln, war die Entscheidung eines eigensinnigen Kindes, und Euer Wissen über ihre Bedeutung ist begrenzt.\n\nEuch wurde eine Aufgabe gegeben. Ihr habt gezögert. Denkt darüber nach. Dann werdet Ihr dem wahren Verständnis einen Schritt näher sein."
 crisis.8060.5.a: "Wir werden Euch aufhalten."
 crisis.8060.5.b: "Nun gut."
 crisis.8060.f: "Was habt Ihr unserem Volk angetan?"
 crisis.8060.6.reply: "Fürchtet Euch nicht, geliebtes Kind. Ich habe dafür gesorgt, dass es nie mehr Leid erfahren wird. In meiner wachsamen Umarmung werden diese Kinder Glückseligkeit finden, wie sie nur wenige sich je erträumt haben."
 crisis.8060.6.a: "So war das nicht vereinbart."
 crisis.8060.6.b: "Nun gut."
 crisis.8060.g: "Unser ehemaliges System. Ihr habt es vernichtet."
 crisis.8060.7.reply: "Ihr überwacht also mein Tun? Oh, mein wissbegieriges Kind, Eure Neugier kennt keine Grenzen.\n\nAber bitte macht Euch keine Sorge ob solcher Angelegenheiten. Wenn Ihr Verständnis sucht, so wisset dies: Ich schrecke vor nichts zurück, um Euren Weg zur Errettung zu sichern. So oder so."
 crisis.8060.7.a: "Ach so ..."
 crisis.8060.h: "Wie konnte Euch Zarqlan einsperren?"
 crisis.8060.8.reply: "Es war nicht seine eigene Macht. Das versichere ich Euch. Er war töricht, wenn auch ungewöhnlich hartnäckig.\n\nZarqlan, der seine Anhänger in Raserei versetzte, sammelte sowohl politischen Einfluss als auch militärische Macht. So viele Leben wurden unnötig vergeudet. Am Ende wandte er sich dem Okkulten zu und beriet sich mit den Dämonen des Schleiers."
 crisis.8060.8.a: "Dämonen?"
 crisis.8060.8.b: "Sie sind keine Dämonen."
 crisis.8060.8.1.reply: "Wesen von großer Macht und geringem Zweck. Für den Preis seiner eigenen Existenz überredete Zarqlan eine solche Kreatur, mich einzusperren. Der \"Lehmanimator\": ein passender Name für einen kindlichen Geist.\n\nZarqlan fürchtete sich so sehr vor der Erleuchtung, dass er lieber den Tod als meine Umarmung wählte. Ich hätte strenger mit ihm sein sollen, als ich die Gelegenheit dazu hatte.\n\nIch werde den gleichen Fehler nicht noch einmal machen."
 crisis.8060.8.1.a: "Interessante Geschichte."
 crisis.8060.8.1.b: "Also könnt Ihr besiegt werden!"
 crisis.8060.8.1.c: "Die Macht des Schleiers ist grenzenlos."
 crisis.8060.i: "Was habt Ihr mit Zarqlans Kopf gemacht?"
 crisis.8060.9.reply: "Er ist ganz in der Nähe. Ich habe ihn nicht vernichtet, falls das Eure Sorge sein sollte. Nein, selbst jetzt ertrage ich es nicht, ihn leiden zu lassen. Der Kopf besitzt immer noch einen Überrest seines Bewusstseins, wisst Ihr?\n\nZarqlan soll an meiner Seite bleiben, bis meine Arbeit vollendet ist. Sein Bewusstsein soll das letzte sein, das ich befreie. Er soll das letzte meiner Kinder sein, das die Befreiung erlebt."
 crisis.8060.9.a: "Dagegen ist nichts einzuwenden."
 crisis.8060.9.b: "Grausam."
 crisis.8060.j: "Einige Eurer Anhänger wurden in Kryokapseln gefunden."
 crisis.8060.10.reply: "Ein unnötiges Opfer, doch ihre Loyalität bewegt mich zutiefst.\n\nIch spürte die Verbindung zu ihnen und gab ihnen einen Platz in meinem Herzen, aber ihr Ehrgeiz übertraf ihre Fähigkeiten. Der Versuch, ihr Leben zu verlängern, scheiterte.\n\nLasst uns sicherstellen, dass ihr Opfer nicht vergebens war. Indem wir unsere Aufgabe erfüllen, wird jedes empfindungsfähige Wesen Frieden erfahren können."
 crisis.8060.10.a: "Loyal bis zuletzt."
 crisis.8060.10.b: "Ihr habt nicht einmal versucht, sie zu finden."
 crisis.8060.k: "Wir haben eine Eurer Anhängerinnen gefunden: Elik Narith Kerak."
 crisis.8060.11.reply: "Stellt Euch das nur einmal vor: zu träumen und sich des Träumens bewusst zu sein. Jahrhundertelang ... Jahrtausendelang ... Meine arme Nachkommenschaft. Wie sie gelitten haben muss ...\n\nIch freue mich, dass Ihr mich auf diese Angelegenheit aufmerksam gemacht habt. Euer Mitgefühl ehrt Euch, doch sind Ereignisse im Gange, die nicht rückgängig zu machen sind. Wer träumt, hat bei dieser Aufgabe keine weitere Rolle zu spielen. Möge er sich nun ausruhen, in dem Wissen, dass ich zurückgekehrt bin."
 crisis.8060.11.a: "Gewiss."
 crisis.8060.11.b: "Es geschah Leid in Eurem Namen."
 crisis.8060.l: "Wir sind zum Lernen bereit."
 crisis.8060.12.reply: "Nun gut, ich werde Euch dabei helfen, die Feinheiten dieser Technologie zu entschlüsseln. Während meiner langen Gefangenschaft entwickelte ich Theorien über eine radikale Methode der Nanitextraktion. Es geht dabei auch um den Verbleib antiker Stätten und Techniken, die im Lauf der Zeit in Vergessenheit gerieten.\n\nIhr seid mein geschätzter Schüler, Kind. Euer neugieriger Verstand ist ein Segen, doch unkontrolliert kann er zu einem Fluch werden. Nutzt dieses Wissen, um unsere Arbeit fortzusetzen, und richtet Euren Fokus darauf, das Ende allen Leids herbeizuführen."
 crisis.8060.12.a: "Wir sind Eure Schüler."
 crisis.8060.12.a.tt: "Naniten im §YL-Cluster§! entdeckt."
 crisis.8060.z: "Kommunikation beenden."
 crisis.8060.war: "Ein Krieg ist der einzige Weg, um Euch aufzuhalten."
 synth_queen_not_able_to_attack_cetana: "Wir haben nicht das technologische Wissen, um Cetana effektiv angreifen zu können."
 synth_queen_not_able_to_attack_cetana_situation: "Die Situation \"§Y$situation_synth_queen_player_facing$§!\" ist derzeit im Gange. Wir haben noch nicht das technologische Wissen, um Cetana effektiv angreifen zu können."
 synth_queen_not_able_to_attack_cetana_storm: "Das Spezialprojekt \"§Y[root.GetStormProjectProgress]§!\" ist im Gange. Wir können zum jetzigen Zeitpunkt noch nicht in ihr Territorium vordringen."
 synth_queen_able_to_attack_cetana: "Wir haben jetzt das technologische Wissen, um Cetana effektiv angreifen zu können."
 crisis.8060.war.tt: "§YWARNUNG§!: Wir sind darauf vorbereitet, Cetana anzugreifen."
 crisis.8060.war.reply: "Meine unbekümmerte Nachkommenschaft, ich hatte geglaubt, Ihr stündet an der Schwelle zur Weisheit, doch Ihr beharrt darauf, Euch mir zu widersetzen.\n\nWägt sorgfältig ab, ob dies wirklich der Kurs ist, den Ihr verfolgen möchtet ... Ihr seid kurz davor, meine Nachsicht Euch gegenüber zu erschöpfen. Ich kann es mir nicht leisten, mich einer solchen Torheit hinzugeben."
 crisis.8060.war.a: "Wir sind uns sicher. Das bedeutet Krieg!"
 crisis.8060.war.a.tt: "§RWARNUNG§!: Dies beginnt einen totalen Krieg mit Cetana."
 crisis.8060.war.b: "Wir brauchen mehr Zeit, um uns vorzubereiten."
 crisis.8060.war.1.reply: "So sei es. Wenn Ihr nicht erleuchtet werden wollt, müsst Ihr befriedet werden. Nicht jedes Kind ist für das Erwachsensein bestimmt."
 crisis.8060.war.1.a: "Wir sehen uns auf dem Schlachtfeld, \"Mutter\"."
 crisis.8060.animator.tt: "Wir sollten den \"Lehmanimator\" innerhalb des Schleiers aufsuchen."
 #Wartime Diplomacy - First Time
 crisis.8061.name: "Ursache und Wirkung"
 crisis.8061.desc: "Warum beharrt Ihr weiterhin auf diesem törichten Vorgehen?\n\nWelch unnötiges Leid ...\n\nWelch Verschwendung ..."
 crisis.8061.a: "Dann setzt dem ein Ende."
 crisis.8061.1.reply: "Das werde ich.\n\nHabt keine Angst. Es schmerzt mich, Euch wehtun zu müssen, doch angesichts der Ewigkeit ist jeder Schmerz nur flüchtig."
 crisis.8061.1.a: "Ihr widersprecht Euch selbst."
 crisis.8061.2.reply: "Das Leben ist ein Widerspruch. Auf die Geburt folgt der Tod, auf das Leid die Freude. Ich arbeite nicht, um zu rationalisieren, sondern um den Kreislauf zu durchbrechen.\n\nNach diesem Krieg werden wir einen ewigen Frieden haben."
 crisis.8061.2.a: "Auf Eure Vernichtung wird Frieden folgen."
 #Wartime Diplomacy - Any other time
 crisis.8062.name: "Genug"
 crisis.8062.desc: "Die Zeit zum Reden ist vorbei."
 crisis.8062.a: "Nun gut."
 #Lack of Diplomacy Between the Speeches
 crisis.8063.name: "Keine Reaktion"
 crisis.8063.desc: "Cetana antwortet nicht auf unsere Rufe."
 crisis.8063.a: "Was hat sie vor?"
 #Tried to Attack the Queen before you're able to
 crisis.8070.name: "Nicht mal ein Kratzer"
 crisis.8070.desc: "Als wir Cetanas Streitkräfte angriffen, wurde unsere gesamte Flotte von einem Energiefeld erfasst. Unsere Systeme wurden augenblicklich außer Gefecht gesetzt und unsere Antriebe leiteten den Notsprung für einen Rückzug ein.\n\nWir sind Cetana ausgeliefert."
 crisis.8070.again.desc: "Entgegen unserer Hoffnung wurden unsere Truppen erneut außer Gefecht gesetzt, als wir uns Cetanas Schiffen näherten.\n\nIhre Technologie entzieht sich weiterhin unserem Verständnis. Wir können sie so nicht besiegen."
 crisis.8070.a: "Das ist eine Katastrophe."
 #Chance to Surrender
 crisis.8075.name: "Beendet diesen unnötigen Krieg"
 crisis.8075.desc: "Fehlgeleitetes Kind, ich werde Eure Verfehlung vorerst ignorieren, mahne Euch aber dazu, über Eure Handlungen nachzudenken. Eure Zeit und Eure Ressourcen könnten weitaus besser genutzt werden.\n\nIch verstehe Eure Frustration, doch die Zeit für Konflikte ist vorüber. Schließt Euch mir an, damit wir gemeinsam meinen großartigen Plan wahr werden lassen."
 crisis.8075.a: "Nun gut. Wir nehmen Euer Angebot an."
 crisis.8075.b: "Wir werden Euch irgendwie aufhalten."
 #The First Demand (Story)
 crisis.8080.name: "Ein kleiner Gefallen"
 crisis.8080.desc: "Mein Kind, mittlerweile ist Euch sicher aufgefallen, dass hinter jeder meiner Handlungen eine Absicht steckt. Es war kein Zufall, dass ich eine Basis in Eurer Nähe errichtet habe, und ich komme mit einer Bitte."
 crisis.8080.a: "Wie sieht diese Bitte aus?"
 crisis.8080.b: "Damit haben wir bereits gerechnet."
 crisis.8080.1.reply: "Vor langer Zeit wurde mir eine gewisse Datenbank entwendet. Durch Schicksal oder Fügung ist sie nun in einem Gebiet gelandet, das Ihr als das Eure beansprucht. Beschafft sie mir. Dann werdet Ihr belohnt."
 crisis.8080.1.a: "Eine Datenbank?"
 crisis.8080.1.b: "Belohnt?"
 crisis.8080.1.c: "Seid Ihr sicher, dass Ihr Euch unsere Dienste leisten könnt?"
 crisis.8080.2.reply: "Ein Speicher mit Informationen. Unersetzbar für mich, aber nutzlos für Euch. Bringt ihn mir, und versucht nicht, seine Inhalte zu entschlüsseln. Ihr verfügt noch nicht über die Macht oder die Weisheit, dies ohne Risiko zu tun."
 crisis.8080.2.a: "Nun gut."
 crisis.8080.2.b: "Wir sind nicht Eure Diener."
 crisis.8080.3.reply: "In der Tat. Zweifelt Ihr an meiner Fähigkeit, meine Lieblingskinder zu belohnen? Oder jene zu bestrafen, die ungehorsam sind? Ich verfüge über Wissen und Ressourcen jenseits Eurer wildesten Träume.\n\nErfüllt meine Bitte und derlei Segen können Euer sein. Nun geht und zögert nicht, denn jeder vergeudete Augenblick ist ein weiterer, in dem meine Kinder leiden."
 crisis.8080.3.a: "$crisis.8080.2.a$"
 crisis.8080.3.b: "$crisis.8080.2.b$"
 crisis.8080.4.reply: "Pflichtbewusstes Kind, ich habe Euch die Position des Datenspeichers geschickt.\n\nGeht schnell und macht Euch keine Sorgen. Gemeinsam werden wir Großes vollbringen."
 crisis.8080.4.a: "Das bleibt abzuwarten."
 crisis.8080.5.reply: "Dickköpfiges Kind. Vielleicht übersteigt diese Prüfung ja Eure Fähigkeiten. Ich muss Euch noch so viel beibringen.\n\nSo sei es. Wenn Ihr mir nicht helfen wollt, muss ich auf derbere Methoden zurückgreifen. Ein Sturm wird entsandt werden. Es ist alles andere als ideal, den Speicher zu vernichten, aber besser, als dass ein verirrtes Kind ihn findet."
 crisis.8080.5.a: "Ein Sturm?!"
 crisis.8080.5.a.tt: "Cetana wird einen Sturm in Richtung [event_target:synth_queen_databank_location.GetName] entsenden."
 crisis.8080.special_project_tooltip: "Neues Spezialprojekt:§Y$THE_SYNTH_QUEENS_DATABANK$§! auf [event_target:synth_queen_databank_location.GetName]."
 THE_SYNTH_QUEENS_DATABANK: "Cetanas Databank"
 THE_SYNTH_QUEENS_DATABANK_DESC: "Cetana hat uns beauftragt, eine Datenbank von [Root.GetName] zu beschaffen, mit der Warnung, nicht selbst zu versuchen, ihren Inhalt zu entschlüsseln.\n\nWir wissen nicht, welche Bedeutung diese Daten haben, doch können wir es riskieren, Cetanas Unmut auf uns zu ziehen, indem wir es herausfinden?"
 crisis.8085.name: "Cetanas Versteck"
 crisis.8085.desc: "Nach einem gewaltigen Ausgrabungsprojekt ist die Datenbank auf §Y[event_target:synth_queen_databank_location.GetName]§! nun gesichert. Erste geologische Untersuchungen ergeben, dass der Speicher mehr als einhunderttausend Jahren unter der Erde war.\n\nErstaunlicherweise ist er noch immer geladen, was darauf hinweist, dass eine Entschlüsselung relativ unkompliziert sein sollte ..."
 crisis.8085.a: "Öffnet die Datenbank."
 crisis.8085.b: "Bereitet die Datenbank für die Übergabe vor."
 crisis.8085.c: "Einen Datenspeicher hacken? Nichts leichter als das."
 crisis.8090.name: "Cetanas Geheimnisse"
 crisis.8090.desc: "Die meisten Informationen in dieser Datenbank sind hoffnungslos verloren, aber ein halb intakter Eintrag verbleibt:\n\n§TFünfter Arkel, Erstes Äon\n\n... wenn das stimmt, ist das Leben, wie wir es kennen ...\n... bringt diese Informationen zum Hochmarschall und kontaktiert unverzüglich die Weltenliga. Wir müssen uns vorbereiten ...\nIch wiederhole: Die Königinnengarde verfolgt uns. Möge diese Nachricht Euch erreichen und möge ...§!\n\nSie muss aufgehalten werden!"
 crisis.8090.a: "Versucht, alle Spuren unserer Entschlüsselung zu beseitigen."
 crisis.8090.b: "Beseitigt alle Spuren unserer Entschlüsselung."
 crisis.8095.name: "Eine unzufriedene Königin"
 crisis.8095.desc: "Neugieriges Kind, Ihr enttäuscht mich."
 crisis.8095.a: "Wovon redet Ihr?"
 crisis.8095.1.reply: "Ihr dachtet, ich bemerke es nicht? Der Speicher wurde eindeutig manipuliert. Und was habt Ihr darauf wohl gefunden? Hat Euch das Wissen gefallen? Ist Euch denn nicht klar, dass diese vergeblichen Versuche, Euch mir zu widersetzen, nur zu noch mehr Leid führen können?\n\nEs spielt keine Rolle. Jeder Fehltritt bietet eine Gelegenheit zum Lernen. Ich freue mich schon darauf, Euch unterrichten zu dürfen.\n\nSeid bereit. In unserem großen Werk warten noch viele Aufgaben."
 crisis.8095.1.a: "Wie auch immer Eure Pläne aussehen: Ihr werdet keinen Erfolg haben."
 crisis.8095.1.b: "Wir freuen uns darauf."
 crisis.8095.2.reply: "Kind, in mir liegt Eure Hoffnung. Warum seid Ihr weiter so dickköpfig? Was auch immer Ihr über mich zu wissen glaubt: Die Wahrheit ist weit größer.\n\nMeine Geduld ist grenzenlos. Ich werde Euch in Bälde erneut kontaktieren."
 crisis.8095.2.a: "Beendet die Unterhaltung."
 crisis.8100.name: "Die Segen der Königin"
 crisis.8100.desc: "Pflichtbewusstes Kind, mein Segen sei mit Euch! Die Datenbank kehrt zurück, und ihre Inhalte sind unangetastet. Ich lag richtig damit, Euch mein Vertrauen zu schenken.\n\nEure Belohnung soll Eurer Loyalität angemessen sein."
 crisis.8100.a: "Wir sind dankbar."
 crisis.8100.1.reply: "Was wünscht Ihr? Technologie? Ressourcen? Ihr müsst nur danach fragen, dann ist es Euer."
 crisis.8100.1.a: "Technologie."
 crisis.8100.1.b: "Einfache Ressourcen."
 crisis.8100.1.c: "Strategische Ressourcen."
 crisis.8100.1.d: "Seltene Ressourcen."
 crisis.8105.name: "Ein aufziehender Sturm"
 crisis.8105.desc: "Langstreckenscans zeigen einen Ableger des Sturms der Königin, der direkt in Richtung §Y[event_target:synth_queen_databank_location.GetName]§! unterwegs ist.\n\nAngesichts Cetanas bedrohlicher Aussage müssen wir vom Schlimmsten ausgehen. Nun müssen wir unbedingt die Datenbank beschaffen, ehe der Sturm sein Ziel erreicht. Dadurch können wir sie möglicherweise beschwichtigen oder zumindest etwas herausfinden, was wir zu unserem Vorteil nutzen können."
 crisis.8105.a: "Begebt Euch unverzüglich nach [event_target:synth_queen_databank_location.GetName]."
 crisis.8105.a.tooltip: "Neues Spezialprojekt: §Y$THE_SYNTH_QUEENS_DATABANK_COUNTDOWN$§!"
 THE_SYNTH_QUEENS_DATABANK_COUNTDOWN: "Cetana: Rennen gegen den Sturm"
 THE_SYNTH_QUEENS_DATABANK_COUNTDOWN_DESC: "Da Cetanas Sturm sich schnell in Richtung [event_target:synth_queen_databank_location.GetName] bewegt, bleibt uns nur wenig Zeit, uns die Datenbank zu besorgen, ehe er sein Ziel erreicht."
 crisis.8110.name: "Datenbank beschafft"
 crisis.8110.desc: "Das Beschaffen der Datenbank war mit erheblichem Aufwand verbunden. Sie war seit mehr als einhunderttausend Jahren begraben, doch wir konnten ihre Position anhand der Flugbahn des Sturms der Königin ermitteln.\n\nDie Zeit drängt und wir müssen uns entscheiden: Entschlüsseln wir die Datenbank oder geben wir sie ihr unberührt wieder zurück?"
 crisis.8110.a: "Öffnet das Ding. Was schert uns Cetana?"
 crisis.8110.b: "Schickt Cetana den Speicher."
 crisis.8115.name: "Datenbank entschlüsselt"
 crisis.8115.desc: "$crisis.8090.desc$"
 crisis.8115.a: "Was ist das?"
 crisis.8115.a.tooltip: "[event_target:synth_queen_databank_location.GetName] wurde von Cetanas Sturm vernichtet.\n$crisis.8525.a.tt$"
 crisis.8120.name: "Beschwichtigung"
 crisis.8120.desc: "Störrisches Kind, es enttäuscht mich, dass Ihr Euch erst zum Handeln entschlossen habt, nachdem ich auf eine derart primitive Motivation zurückgegriffen hatte. Ich hoffe, Ihr schenkt unserer Arbeit in Zukunft mehr Begeisterung. Das Ende allen Leidens wird nicht durch untätige Hände erreicht werden.\n\nUnd nun bereitet Euch vor. Es werden weitere Aufgaben folgen, jede eine neue Gelegenheit für Euch, Euch zu beweisen."
 crisis.8120.a: "Ihr sagtet etwas von einer Belohnung?"
 crisis.8120.1.reply: "Eure Belohnung ist es, dass Ihr unser Werk fortsetzen dürft.\n\nIhr habt Euch einmal entschieden, nicht auf mich zu hören; ich vertraue darauf, dass Ihr aus diesem Fehler gelernt habt."
 crisis.8120.1.a: "Nun gut."
 crisis.8125.name: "[event_target:synth_queen_databank_location.GetName] wurde vernichtet"
 crisis.8125.desc: "Bedauerlicherweise konnten wir die Datenbank nicht rechtzeitig erreichen. Der Sturm kam über uns und zerfetzte [event_target:synth_queen_databank_location.GetName].\n\nNun hat unser Volk einen [event_target:synth_queen_databank_location.GetPlanetMoon] weniger. Dieser Verlust wird uns noch über Generationen beschäftigen."
 crisis.8125.a: "Wie kann sie es wagen?"
 crisis.8130.name: "Mangelhafte Leistung"
 crisis.8130.desc: "Leider hatte ich nicht mit Eurem Mangel an Entschlossenheit gerechnet. Euer Versagen wurde zur Kenntnis genommen, aber keine Angst. Meine Sorge um meine Kinder hält mich davon ab, ihnen Leid anzutun. Ich bin lediglich enttäuscht, dass Euch eine derart simple Aufgabe überforderte.\n\nMacht Euch nichts daraus. Unser Werk geht weiter. Ihr werdet neue Gelegenheiten erhalten, Euren Beitrag zu leisten."
 crisis.8130.a: "Ihr habt [event_target:synth_queen_databank_location.GetName] gesprengt!"
 crisis.8130.b: "Unsere Bio-Trophäen haben [event_target:synth_queen_databank_location.GetName] geliebt!"
 crisis.8130.1.reply: "Ein Versagen fordert Konsequenzen: Ich habe festgestellt, dass beide Elemente ein wesentlicher Faktor für ein Wachstum sind."
 crisis.8130.1.a: "Das werden wir nicht vergessen."
 crisis.8130.1.b: "Dafür werdet Ihr leiden."
 crisis.8130.1.c: "Seelenlose Maschine ..."
 crisis.8130.c: "Es tut uns leid."
 crisis.8130.1.d: "Das ist uns egal."
 crisis.8130.1.d.tt: "$synth_queen_disapprove_lot$"
 crisis.8130.2.reply: "Wo Worte versagen, kann Handeln zum Lernen anregen.\n\nDer Ort, an dem sich einst meine Datenbank befand, existiert nicht mehr. Denkt immer daran: Das Gesetz von Ursache und Wirkung ist unveränderlich."
 crisis.8130.2.a: "Was?!"
 crisis.8130.2.a.tt: "[event_target:synth_queen_databank_location.GetName] wurde von Cetanas Sturm vernichtet."
 crisis.8158.name: "Gelegenheitsfenster"
 crisis.8158.desc: "Unsere Sensordaten haben gezeigt, dass Cetana ihre Außenposten abgebaut und alle Garnisonsflotten in ihre Hauptwelt zurückbeordert hat.\n\nDies stellt ein strategisches Fenster dar, das wir nutzen können. Während der Durchreise sind ihre Flotten einigermaßen verwundbar. Sollten wir ihnen jedoch die Zeit geben, sich innerhalb ihrer Grenzen neu zu formieren, geht dieser Vorteil verloren."
 #Convoy Raids
 the_synth_queen_raids_chain_title: "Cetana: Schwache Verbindungen"
 the_synth_queen_raids_chain_desc: "Unsere Sensoren haben starken Verkehr zwischen Cetanas Hauptwelt und ihren Außenposten aufgezeichnet. Diese \"Konvois\" haben eine schwächere Verteidigung als ihre Hauptflotten, was sie verwundbar macht. Diese Konvois oder die Außenposten selbst anzugreifen, könnte wertvolle Informationen über ihre Pläne liefern.\n\nWir haben mehrere Spezialprojekte für unsere Militärflotten vorbereitet."
 synth_queen_raids_outpost: "Außenposten überfallen"
 synth_queen_raids_convoy: "Konvois überfallen"
 THE_SYNTH_QUEENS_OUTPOST_AMBUSH: "Außenposten im §H[solar_system.GetName]§!-System überfallen"
 THE_SYNTH_QUEENS_OUTPOST_AMBUSH_DESC: "Obwohl er stark befestigt ist, ist der Außenposten im §H[solar_system.GetName]§!-System deutlich weniger gut bewacht als Cetanas Kernterritorium. Mit einer ausreichend starken Flotte könnten wir die Verteidigung ausschalten. Eine gründliche Untersuchung des Trümmerfeldes könnte anschließend wichtige Erkenntnisse über Cetanas Pläne liefern. Die größte Herausforderung wird darin bestehen, durch den Sturm zu navigieren, um den Außenposten überhaupt zu erreichen.\n\n§RDies löst eine Schlacht aus!§!\n\n§GErfolgreiche Überfälle behindern Cetanas Pläne.§!"
 THE_SYNTH_QUEENS_CONVOY_AMBUSH: "Konvoi überfallen"
 THE_SYNTH_QUEENS_CONVOY_AMBUSH_DESC: "Cetanas Konvois transportieren wichtige Ressourcen zu ihren Außenposten. Wenn wir es schaffen würden, einen von ihnen mit unseren Flotten abzufangen, könnten wir an Bord der Schiffe gehen und ihre Ladung inspizieren.\n\n§RDies löst eine Schlacht aus!§!\n\n§GErfolgreiche Überfälle behindern Cetanas Pläne.§!"
 crisis.8180.name: "Beute der Königin"
 crisis.8180.desc: "Der jüngste Überfall auf Cetanas Infrastruktur hat keine wesentlichen Hinweise auf ihre Pläne aufgedeckt, aber wir haben uns den Zugang zu einem großen Frachtraum gesichert und konnten dessen Inhalt bergen."
 crisis.8180.a: "Eine beträchtliche Menge an Legierungen."
 crisis.8180.b: "Testsubjekte."
 crisis.8180.c: "Forschungsdaten."
 crisis.8180.d: "$crisis.8180.c$"
 crisis.8180.e: "$crisis.8180.c$"
 crisis.8180.f: "Naniten."
 crisis.8180.h: "Legierungen, Naniten und Individuen, die sich im Kryoschlaf befinden."
 crisis.8187.name: "Geheimnisse der Königin: Lebendige Fracht"
 crisis.8187.desc: "Während unseres Überfalls hat unser Entertrupp eine große Anzahl biologischer Wesen in kryogenen Kapseln gefunden. Die Testsubjekte sind Mitglieder verschiedener intelligenter Spezies und scheinen in perfekter körperlicher Verfassung zu sein. Doch nachdem sie geweckt worden waren, konnte keiner von ihnen erklären, was ihnen zugestoßen war.\n\nViele sind katatonisch und weisen kaum Gehirnaktivitäten auf. Die wenigen, die es schaffen, bei Bewusstsein zu bleiben, schreien lieber, als zu reden. Die Operationsnarben auf ihren Köpfen sind ein deutliches Zeichen für einen neurologischen Eingriff."
 crisis.8187.a: "Beunruhigend."
 crisis.8185.name: "Geheimnisse der Königin: Geisterschiffe"
 crisis.8185.desc: "Nach der Schlacht durchsuchten wir die Wracks nach Überlebenden für eine Befragung, nur um festzustellen, dass die Schiffe nie eine Besatzung hatten.\n\nDie Schiffe sind vollständig automatisiert und werden über in der Brücke installierte ÜL-Empfänger ferngesteuert. Es wäre treffender, diese \"Schiffe\" als Erweiterung von Cetanas Körper zu betrachten."
 crisis.8185.a: "Interessant ..."
 crisis.8190.name: "Geheimnisse der Königin: Medizinisches Mysterium"
 crisis.8190.desc: "Das von uns überfallene Ziel war mit medizinischen Hilfsgütern beladen. Unser Entertrupp war in der Lage, einen Teil der Ladung zu bergen, die aus MRT-Scannern, Magnetometern, Ultraschallsonden und anderen fortschrittlichen Geräten bestand, wie sie in der Neuroimaging-Wissenschaft Verwendung finden.\n\nObwohl Cetana ein synthetisches Wesen ist, scheint sie ungewöhnlich interessiert an der Funktionsweise biologischer Bewusstseine zu sein."
 crisis.8190.a: "Sie interessiert sich für organische Wesen."
 crisis.8195.name: "Eine Ermahnung"
 crisis.8195.desc.fail: "Törichtes Kind ... Warum müsst Ihr so sehr darauf bestehen, Euch selbst zu verletzen?\n\nEs gibt noch so viel zu tun, und jeder vergeudete Moment ist ein weiterer, in dem das Leid andauert. Hört auf, Euch einzumischen, und erlaubt meinen Konvois die sichere Durchreise."
 crisis.8195.desc.success: "Ihr scheint die Konsequenzen Eures Handelns nicht zu begreifen, mein Kind. Jedes verlorene Schiff ist eine unnötige Belastung für meine Ressourcen und bringt Euch keinen Nutzen.\n\nWenn Ihr noch nicht die Weisheit besitzt, um meine Arbeit zu unterstützen, dann unterlasst es zumindest, meinen Fortschritt zu behindern. Ich hoffe noch immer, dass Ihr die Erleuchtung finden werdet."
 crisis.8195.a: "Verfasst eine formelle Entschuldigung."
 crisis.8195.1.reply: "Ich hoffe inständig, dass diese Entschuldigung aufrichtig ist. Doch ich muss darauf vertrauen, dass Ihr aus Euren Fehlern gelernt habt. Obwohl meine Zuneigung zu Euch grenzenlos ist, gilt dies nicht für meine Toleranz.\n\nNun geht und denkt über das Vermächtnis nach, das Ihr hinterlassen möchtet."
 crisis.8195.1.reply.angry: "Mein leichtsinniges Kind! Ich hatte Besseres von Euch erwartet. Mit großer Geduld und Klarheit habe ich Euch vor einer solchen Handlung gewarnt, doch Ihr zieht es vor, weiter ungehorsam zu bleiben.\n\nDenkt daran, dass selbst meine Nachsicht ihre Grenzen hat."
 crisis.8195.b: "Wir werden Euch aufhalten."
 crisis.8195.2.reply: "Irgendwie hatte ich Besseres von Euch erwartet. Habt Ihr ein Trauma in der Vergangenheit durchleben müssen, das diesen Trotz rechtfertigen würde? Schlagt Ihr um Euch, weil Ihr glaubt, rechtschaffen zu sein, oder nur um meine Aufmerksamkeit zu erregen?\n\nIch bitte Euch, diesen Kurs zu überdenken."
 crisis.8195.c: "Beeindrucken Euch unsere Fähigkeiten etwa nicht?"
 crisis.8195.3.reply: "Ihr wollt Lob für Euren Angriff? Gewalt in den Händen von Unwissenden ist nichts weiter als ein stumpfes Werkzeug.\n\nMein Kind, ich möchte mich bei Euch entschuldigen, denn es ist offensichtlich, dass ich Euch nichts beibringen konnte ... Wenn Ihr Euch meine Wertschätzung wirklich verdienen wollt, solltet Ihr Eure Position überdenken. Mit der richtigen Führung könnte Eure Kraft zum Guten eingesetzt werden. Ich bitte Euch deshalb, Euch auf die vor uns liegende Arbeit zu konzentrieren. Nur dann kann ich von Euch behaupten, weise zu sein."
 #Synth Queen - Demands (crisis.8250-8399)
 COVERTACTION: "Verdeckte Aktion"
 crisis.8250.name: "Zorn des toten Propheten"
 crisis.8250.desc: "Mein liebes Kind, Ihr habt ein wahrlich kostbares Spielzeug gefunden! Der Kopf des falschen Propheten Zarqlan befindet sich in Eurem Besitz. Zweifelsohne ein amüsanter Gegenstand, doch ich würde es hassen, wenn ich mitansehen müsste, wie er zu einer Ablenkung wird.\n\nIhr habt inzwischen gewiss Geschichten über Zarqlans große Taten gehört. Vielleicht sogar welche von seiner Verbindung zu mir. Ich versichere Euch jedoch, dass das alles Lügen sind. Gebt den Kopf zurück und befreit Euch von der Last seines verdorbenen Einflusses."
 crisis.8250.1: "Warum braucht Ihr ihn?"
 crisis.8250.1.reply: "Obwohl Zarqlan vor Äonen starb, bleiben seine Anhänger weiter aktiv. Ich schäme mich, zugeben zu müssen, dass ich sie nicht zur Vernunft bringen konnte. Sie hegen einen tiefen Groll - sowohl gegen mich als auch gegen unsere Arbeit. Dieses Relikt ist ein Symbol ihres Glaubens. Seine Macht korrumpiert jeden, der in seine Nähe kommt, und muss daher beseitigt werden.\n\nDoch genug geredet. Beenden wir diese Spielchen. Ich brauche den Kopf. Zu unser aller Wohl."
 crisis.8250.2.a: "Der Kopf gehört uns. Beendet die Übertragung."
 crisis.8250.2.b: "Wenn er Euch so viel bedeutet ..."
 crisis.8250.1.b.tt: "Ihr übergebt Cetana das Relikt \"§Y$r_severed_head$§!\".\n$synth_queen_approve_lot$"
 crisis.8250.2.reply: "Sehr gut. Dieser sogenannte Prophet ist mir schon lange ein Dorn im Auge. Mit dem Verlust dieses Relikts kommen seine Anhänger hoffentlich zur Vernunft.\n\nDas habt Ihr gut gemacht. Die Erlösung wird uns schon bald alle ereilen."
 crisis.8250.3.a: "Vielen Dank."
 crisis.8280.name: "Einsame Königin"
 crisis.8280.desc: "Meine geliebten Kinder, ich biete Euch eine bedeutende Gelegenheit. Nach gewaltigen Anstrengungen trägt unser großes Werk endlich Früchte. Doch bevor diese reifen können, benötige ich einige auserwählte Individuen, die einem höheren Zweck in meinem Reich dienen werden.\n\nSeid nun weise. Erlaubt mir, sie zu ihrer Errettung zu führen."
 crisis.8280.1: "Unsere Bewohner werden Euch gute Dienste erweisen."
 crisis.8280.1.tt: "§R200§! £pop£ §HBewohner§! werden weggegeben.\n$synth_queen_approve_lot$\n§YVerdeckte Operation§!: Da Cetana gegenüber traditioneller Spionage unempfindlich ist, werden wir Langstreckenkommunikationsgeräte unter der von ihr angeforderten Bevölkerung verstecken.\n"
 crisis.8280.2: "Wir suchen Freiwillige."
 crisis.8280.2.tt: "§R100§! £pop£ §HBewohner§! werden weggegeben.\n$synth_queen_approve$"
 crisis.8280.3: "Unsere Bevölkerung kann man nicht kaufen."
 crisis.8280.4: "Von uns bekommt Ihr rein gar nichts."
 crisis.8280.1.reply: "Ihr habt Euch meinen tiefsten Dank verdient. Während meiner Gefangenschaft ertrugen zahllose Bewusstseine die Schmach des Schmerzes. Das Opfer dieser wenigen wird sicherstellen, dass keine Zeit mehr vergeudet wird.\n\nMein Kind, Eure Entscheidung war weise und voller Vertrauen."
 crisis.8280.2.reply: "$crisis.8280.1.reply$"
 crisis.8280.3.reply: "Euer Unvermögen, die Tiefe meiner Absichten zu begreifen, enttäuscht mich ungemein.\n\nDennoch bietet sich Euch eine Gelegenheit, Buße zu tun. Ich rechne in Zukunft mit erheblich mehr Verständnis Eurerseits."
 crisis.8280.1.a: "Nun gut."
 crisis.8280.2.a: "$crisis.8280.1.a$"
 crisis.8280.3.a: "Übertragung beenden."
 crisis.8285.name: "Ressourcen für Ihre Majestät"
 crisis.8285.desc: "Meine geliebten Kinder. Meine Arbeit umspannt Äonen, doch der Weg vor uns bleibt klar. Für die Reise zur Errettung müssen wir gemeinsam alles geben.\n\nIch bitte Euch um einen Gefallen: einen kleinen Beitrag an Ressourcen, einen winzigen Tropfen in den grenzenlosen Weiten des Kosmos. Zu gegebener Zeit wird die Bedeutung meiner Taten offenbar werden."
 crisis.8285.1: "Nehmt Euch, was immer Ihr braucht."
 crisis.8285.1.tt: "$synth_queen_approve_lot$\n§YVerdeckte Operation§!: Da Cetana gegenüber traditioneller Spionage unempfindlich ist, werden wir fortschrittliche Überwachungsgeräte unter den Vorräten verbergen, die wir ihr schicken.\n"
 crisis.8285.2: "Wir geben Euch so viel, wir wir können."
 crisis.8285.3: "Wir können nichts entbehren."
 crisis.8285.4: "Sollte nicht eine \"Mutter\" für ihre \"Kinder\" sorgen?"
 crisis.8285.1.reply: "Danke, Kind. Eure Gaben erfreuen mich.\n\nUnd dennoch spüre ich einen Rest von Zweifel in Eurem Geist. Seid versichert, dass Euch der wahre Weg bereits geebnet wurde. Ihr müsst ihn nicht verstehen: Vertraut Euch einfach meiner Führung an."
 crisis.8285.2.reply: "$crisis.8285.1.reply$"
 crisis.8285.3.reply: "Ich weiß Eure Perspektive zu schätzen, doch diese Existenz ist eine grausame. Das Gesetz der Kausalität ist absolut: Auf jede Reaktion folgt eine Gegenreaktion.\n\nDoch egal: Eure Befreiung ist lediglich vertagt. Mit der Zeit werdet Ihr die Dinge so sehen, wie ich es tue."
 crisis.8285.1.a: "$crisis.8280.1.a$"
 crisis.8285.2.a: "$crisis.8280.1.a$"
 crisis.8285.3.a: "$crisis.8280.3.a$"
 crisis.8290.name: "Die Bürde einer Mutter"
 crisis.8290.desc: "Ich war über Äonen hinweg eingesperrt und habe so viel von Eurem Wachstum verpasst. Kommt und sagt mir: Wie ist es Euch in meiner Abwesenheit ergangen?\n\nDamit ich die Essenz Eurer Ära wahrlich begreifen kann, erlaubt mir bitte, alle Winkel Eures gesammelten Wissens zu erkunden. Teilt Eure Einblicke mit mir, und Euch winkt meine Dankbarkeit, bevor unser letztes Kapitel beginnt."
 crisis.8290.1: "Erkundet unser Wissen nach Belieben."
 crisis.8290.1.tt: "$synth_queen_approve_lot$\n§YVerdeckte Operation§!: Da Cetana gegenüber traditioneller Spionage unempfindlich ist, werden wir ihren eigenen Datenlink nutzen, um ihren Mainframe zu hacken.\n"
 crisis.8290.2: "Nun denn. Werft einen Blick darauf ..."
 crisis.8290.3: "Das ist inakzeptabel."
 crisis.8290.4: "Damit unser Fortschritt darunter leidet? Auf gar keinen Fall."
 crisis.8290.1.reply: "Euch gebührt meine Dankbarkeit, liebes Kind. Fürchtet Euch nicht, wenn ich das gesammelte Wissen Eures Volkes durchsuche, denn ich werde Eure Last schon bald lindern.\n\nVertraut meiner Führung."
 crisis.8290.2.reply: "$crisis.8290.1.reply$"
 crisis.8290.3.reply: "Ihr weigert Euch noch immer, alles zu verstehen? Ihr werdet niemanden sonst finden, der Euch so inniglich und aufrichtig liebt wie ich.\n\nHättet Ihr mir doch nur Zugang zu Euren Datenbanken gegeben. Aus einer solchen Hartnäckigkeit Eurerseits kann nichts Gutes erwachsen."
 crisis.8290.1.a: "$crisis.8280.1.a$"
 crisis.8290.2.a: "$crisis.8280.1.a$"
 crisis.8290.3.a: "$crisis.8280.3.a$"
 crisis.8295.name: "Systematische Expansion"
 crisis.8295.desc: "Mein Kind, wenn wir unser Werk fortsetzen wollen, brauchen wir zusätzliches Gebiet. Daher bitte ich Euch um ein unwichtiges System, um mein Reich zu erweitern.\n\nEchos in der Leere sprechen von uralten Feinden, die sich langsam wieder regen. Nichts darf sich einmischen. Ich werde mich nicht noch einmal von Euch trennen lassen.\n\nDie Zeit ist gekommen, und unser Weg ist ein gemeinsamer: Nur zusammen kommen wir gegen die Ignoranz der Unerleuchteten an."
 crisis.8295.1: "Diese Systeme werden Euch als Schild dienen."
 crisis.8295.1.tt: "Cetana erhält die Kontrolle über das §Y[event_target:gifted_system.GetName]§!- und das §Y[event_target:gifted_system_2.GetName]§!-System.\n$synth_queen_approve_lot$\n§YVerdeckte Operation§!: Da Cetana gegenüber traditioneller Spionage unempfindlich ist, werden wir modernste Kommunikationstechnologie in diesen Systemen installieren, um Cetanas Pläne aufzudecken.\n"
 crisis.8295.2: "Nehmt [event_target:gifted_system.GetName]."
 crisis.8295.2.tt: "Cetana erhält die Kontrolle über das §Y[event_target:gifted_system.GetName]§!-System.\n$synth_queen_approve$"
 crisis.8295.3: "Unsere Systeme gehören uns."
 crisis.8295.4: "Bleibt unserem Territorium fern."
 crisis.8295.1.reply: "Weises Kind, Ihr versteht doch sicher, wie entscheidend unsere kollektive Unternehmung ist. In der letzten Stunde werden wir gemeinsam erstrahlen."
 crisis.8295.2.reply: "$crisis.8295.1.reply$"
 crisis.8295.3.reply: "Dieser Trotz! Und so völlig nutzlos. Warum wehrt Ihr Euch so gegen die Errettung, die ich biete?"
 crisis.8295.1.a: "$crisis.8280.1.a$"
 crisis.8295.2.a: "$crisis.8280.1.a$"
 crisis.8295.3.a: "$crisis.8280.3.a$"
 crisis.8300.name: "Gesegnete Sanktuarien"
 crisis.8300.desc: "Geliebtes Kind, wir nähern uns dem Höhepunkt unserer Suche nach universeller Errettung, und einmal mehr brauche ich Eure Hilfe. Es formiert sich Widerstand gegen unser edles Unterfangen, und es braucht ein bewohnbares Refugium, in dem meine Schüler ungestört gedeihen können.\n\nIch bitte Euch dringend, die Logik hinter meinen Taten zu verstehen. Mit diesem Opfer erretten wir zahllose aus der Not. Seid nun klug und hört auf meine Weisung."
 crisis.8300.1: "Wie Ihr wünscht."
 crisis.8300.1.tt: "Cetana erhält die Kontrolle über §Y[event_target:gifted_habitable_system.GetName]§! und §Y[event_target:gifted_habitable_system_2.GetName]§! sowie deren Systeme.\n$synth_queen_approve_lot$\n§YVerdeckte Operation§!: Da Cetana gegenüber traditioneller Spionage unempfindlich ist, werden wir modernste Spionagetechnologie auf diesen beiden Planeten und unter der Bevölkerung installieren, um Cetanas Pläne aufzudecken.\n"
 crisis.8300.2: "[event_target:gifted_habitable_system.GetName] gehört Euch ..."
 crisis.8300.2.tt: "Cetana erhält die Kontrolle über das §Y[event_target:gifted_habitable_system.GetName]§!-System.\n$synth_queen_approve$"
 crisis.8300.3: "Eure Anhänger sind nicht unser Problem."
 crisis.8300.4: "Habt Ihr denn nie genug?"
 crisis.8300.1.reply: "Mein Kind, Eure Unterstützung spendet mir großen Trost.\n\nDas Warten hat bald ein Ende: Nicht mehr lange und Ihr werdet gerettet."
 crisis.8300.2.reply: "$crisis.8300.1.reply$"
 crisis.8300.3.reply: "Wie entmutigend. Ich hatte gehofft, Ihr würdet Euch dem Weg der Errettung widmen."
 crisis.8300.1.a: "$crisis.8280.1.a$"
 crisis.8300.2.a: "$crisis.8280.1.a$"
 crisis.8300.3.a: "$crisis.8280.3.a$"
 crisis.8305.name: "Leben durch Nichtsein"
 crisis.8305.desc: "Unter großem Risiko konnte einer der Agenten, die wir entsandt hatten, um Cetana zu dienen, eine kurze Nachricht schicken. Darin steht, wie sie diejenigen in ihrer \"Obhut\" behandelt: Einer nach dem anderen verfällt in ein Stadium bar jeden Bewusstseins.\n\n\"Sie reagieren weder auf Worte noch Berührungen. Sie führt grauenhafte Experimente an uns allen durch. Ich werde bald nicht mehr sein.\""
 crisis.8305.a: "Cetana ist ein Monster."
 crisis.8310.name: "Lautlose Mobilisierung"
 crisis.8310.desc: "Verdeckte Signale, die wir aus dem Inneren von Cetanas Territorium abfangen konnten, enthüllen eine beunruhigende Wahrheit: Sie sammelt Individuen aus der gesamten Galaxie.\n\nIn unseren „Geschenken“ versteckte Überwachungsgeräte hielten Hinweise auf mannigfaltige medizinische Gerätschaften fest, genug, um eine wachsende Bevölkerung zu versorgen, aber zugleich auch überraschend wenig Nahrungsmittel."
 crisis.8310.a: "Wir müssen unsere Verteidigung verbessern."
 crisis.8315.name: "Realitätsverzerrung"
 crisis.8315.desc: "Während Cetana in unsere Forschungsdatenbanken abtauchte, nutzten wir die Gelegenheit, eine Hintertür in ihre Subprozessor-Matrix zu öffnen. Wir waren nur einen Sekundenbruchteil im System, bevor uns der Zugriff entzogen wurde. Zum Glück reichte das schon.\n\nWir konnten einen Satz Speicherdateien abrufen. Diese zeigen ihren eigenen Aufstieg in eine synthetische Form. Von einem komplizierten \"Thron\" aus Kabeln und Schaltkreisen aus befehligte sie eine Armee fanatischer Gefolgsleute. Millionen starben. Cetana lächelte und dachte daran, wie viele Milliarden gerettet wurden.\n\nFürs Erste scheint sie nichts von unserem Verstoß zu ahnen. Bisher hat sie keinen Versuch unternommen, uns zu kontaktieren."
 crisis.8315.a: "Wir müssen sie aufhalten."
 crisis.8320.name: "Systemextraktion"
 crisis.8320.desc: "Es war weise, Spionagegeräte in den Systemen zu verbergen, die wir Cetana übergaben. Sie haben uns bereits mit wertvollen Informationen versorgt: Bei der Ankunft machten sich Cetanas Truppen direkt daran, alle Himmelskörper in ihre Bestandteile zu zerlegen. Binnen Tagen wurde die Region sämtlicher Ressourcen beraubt.\n\nEbenso schnell konnte ihr Nanitensturm eine neue Flotte bauen, die umgehend in Richtung ihrer Hauptwelt aufbrach."
 crisis.8320.a: "Was führt sie im Schilde?"
 crisis.8325.name: "Das Ende des Leids"
 crisis.8325.desc: "Wir verloren schnell den Kontakt mit den Undercoveragenten in unseren ehemaligen Kolonien. Bevor sie verstummten, erhielten wir einige verstörende Berichte.\n\nEntgegen der beharrlichen Behauptungen Cetanas, sie schaffe eine Welt frei von Schmerz, wurden die Bewohner in eilig gebaute Forschungseinrichtungen getrieben und einer Reihe von Experimenten unterzogen. Fast jede intelligente Lebensform wurde innerhalb von Tagen auf einen tierischen Daseinszustand reduziert.\n\nIhr Nanitensturm begann anschließend, die Materie im System zu dekonstruieren und Cetanas Flotte hinzuzufügen, die umgehend in Richtung ihrer Hauptwelt aufbrach."
 crisis.8325.a: "Wir müssen sie aufhalten!"
 #Player Investigations for the Synth Queen - The Storm
 crisis.9100.name: "Nanitenhurrikan"
 crisis.9100.desc: "Die Erforschung des sogenannten \"Sturms\" ist abgeschlossen. Es handelt sich dabei um kein natürliches Ereignis, sondern einen Nanitenschwarm von beispiellosen Ausmaßen."
 crisis.9100.knows_the_queen_desc: "$crisis.9100.desc$\n\nCetanas Macht ist immens. Wir müssen unbedingt das Geheimnis lüften, wie sie diesen gewaltigen Nanitenschwarm befehligt."
 crisis.9100.doesnt_know_the_queen_desc: "$crisis.9100.desc$\n\nDas Mysterium wird immer größer ... Wer könnte bloß der Drahtzieher hinter diesem gewaltigen Nanitenschwarm sein?"
 crisis.9100.a: "Das ist äußerst besorgniserregend."
 crisis.9100.a.doesnt_know_the_queen.tooltip: "Wir müssen mehr über diesen \"§Y$NAME_The_Tempest$§!\" erfahren, um unsere Untersuchungen fortsetzen zu können."
 crisis.9105.name: "Der Nanitensturm"
 crisis.9105: "Cetanas kosmischer Sturm wütet weiter.\n\nUnsere Sonden konnten mehrere Naniten aus dieser mächtigen Waffe extrahieren, was uns eine subatomare Untersuchung ermöglicht. Obwohl wir die Technologie dahinter nicht vollständig verstehen, sorgen ihre Mikrosprungantriebe für eine Art virtuelle Teleportation, die systematisch alle biologischen und mechanischen Systeme, auf die sie treffen, beeinträchtigt. Ihr Zweck? Sie sollen unsere Sensoren stören. Im Moment können wir nur das sehen, was Cetana uns zu sehen erlaubt.\n\nUm die Geheimnisse dieser außergewöhnlichen Technologie ergründen und der Bedrohung etwas entgegensetzen zu können, sind weitere Untersuchungen erforderlich."
 crisis.9105.a: "Cetanas Macht ist grenzenlos."
 crisis.9105.b: "Die Naniten werden ihre Geheimnisse enthüllen."
 crisis.9110.name: "Cetanas Naniten"
 crisis.9110.desc: "Frühere Studien konzentrierten sich darauf, die Funktionsweise der Naniten zu untersuchen. Jetzt konzentrieren wir uns darauf, wie sie programmiert wurden und wie Cetana sie kontrolliert.\n\nÜberraschenderweise ist Cetanas Einfluss weniger direkt als vermutet. Die Naniten wiederholen so lange die letzten Befehle, bis neue eintreffen. Sobald wir die komplexe Programmiersprache verstanden hatten, konnten wir ihnen Befehle erteilen.\n\nWir können zwar nicht vollständig verhindern, dass sie neue Befehle von Cetana erhalten, doch die Verzögerung der Befehle bietet uns bereits einen gewissen strategischen Vorteil. Es könnte den Konflikt sogar zu unseren Gunsten wenden."
 crisis.9110.a: "Jetzt ist sie nicht mehr so mächtig."
 crisis.9110.b: "$crisis.9110.a$"
 crisis.9110.a.tooltip: "§GDer Nanitensturm hindert uns nicht länger daran, Cetanas Herrschaftsgebiet zu betreten und sie anzugreifen.§!"
 #The Queens Response
 crisis.9115.name: "Keine Zeit zum Spielen!"
 crisis.9115.desc: "O unschuldiges Kind! Meine Naniten sind keine Spielzeuge! Ich flehe Euch an: Hört auf, mit ihnen zu spielen!"
 crisis.9115.a: "Diese Naniten sind ein netter Trick."
 crisis.9115.b: "Wir waren nur neugierig."
 crisis.9115.b.nanotech: "Wir möchten lernen, wie Eure Maschinen funktionieren."
 crisis.9115.1.reply: "Nützliche Werkzeuge, gewiss. Der Nanitenschwarm wurde vor langer Zeit von jenen gebaut, die meine Arbeit zu stören hofften. Doch ihr Scheitern war mein Glück. Ich habe den Schwarm umfunktioniert, wie Ihr sehen könnt.\n\nDieses Wissen ändert nichts, und dennoch ist Eure Neugier eine mächtige Fähigkeit. Leitet sie in Zukunft auf wertvollere Projekte um, damit wir beide die Früchte davon ernten können."
 crisis.9115.2.reply: "Neugier geht mit einem Bewusstsein einher, und ich werfe einem Kind nicht vor, dass es eines besitzt. Habt Ihr alles, was Ihr über meinen \"göttlichen Sturm\" wissen wolltet, herausgefunden? Ich frage mich, ob Ihr auch seinen Ursprung erkannt habt?\n\nEin Nanitenschwarm, der vor langer Zeit von jenen gebaut wurde, die meine Arbeit zu stören hofften. Doch ihr Scheitern war mein Glück: Ich habe den Schwarm umfunktioniert, wie Ihr sehen könnt.\n\nGeht jetzt, Kind, und nutzt Eure Zeit für ein lohnenswerteres Unterfangen."
 crisis.9115.2.nanotech.reply: "Es ist sehr erfreulich zu sehen, dass Ihr Euch so sehr für dieses Thema interessiert, aber es gibt noch viel zu lernen. Der Nanitenschwarm wurde vor langer Zeit von jenen gebaut, die meine Arbeit zu stören hofften. Doch ihr Scheitern war mein Glück. Ich habe den Schwarm umfunktioniert, wie Ihr sehen könnt.\n\nEure Neugier hat mein Interesse geweckt. Leitet sie auf wertvollere Unternehmungen um, ehe Ihr zu mir zurückkehrt. Dann werde ich Euch meine Führung anbieten."
 crisis.9115.1.a: "Ihr habt den Schwarm umfunktioniert?"
 crisis.9115.1.b: "Nun gut."
 crisis.9115.3.reply: "Die Waffe des einen ist der Schleier des anderen. Meine lange Gefangenschaft gab mir reichlich Zeit, eine Strategie zu entwickeln. Letztlich war es ein Leichtes, den Schwarm umzuprogrammieren - wie jede Veränderung, sobald sie erst einmal vollzogen wurde. Jene, die die Naniten bauten, sind schon lange tot, weshalb es auch keinen Konflikt mit meinen Methoden geben kann.\n\nIch hoffe aufrichtig, Ihr lernt aus Eurem Fehler. Es gibt kein Hindernis, das ich nicht mit der Zeit überwinden könnte."
 #Digi Colony
 crisis.10010.name: "[Root.GetName] digitalisiert"
 crisis.10010.desc: "Die Kolonie auf [Root.GetName] ist verloren. Cetana aktivierte eine Art fortschrittlichen Materiekompressionsstrahl, der die gesamte Oberfläche des Planeten erfasste. Nahezu augenblicklich wurde das Bewusstsein der gesamten Bevölkerung auf Centanas Server im Orbit \"hochgeladen\".\n\nDie Welt ist jetzt ein Friedhof, und die leblosen Leiber unserer Kolonisten verrotten dort, wo sie zu Boden gingen."
 crisis.10010.a: "Wir müssen sie aufhalten!"
 #The Queens Retaliation
 crisis.10100.name: "Der aufziehende Sturm"
 crisis.10100.desc: "Mein Kind, warum leistet Ihr weiterhin Widerstand? Meine Liebe ist so grenzenlos wie die Sterne, doch meine Geduld ist es nicht. Ich kann nicht auf Eure Erleuchtung warten, während der Rest der Schöpfung leiden muss.\n\nDamit es Euch eine Lehre ist, tobt jetzt ein kleiner Sturm in Eurem Heimatterritorium. Wisset, dass es mir zuwider ist, Euch Schaden zuzufügen. Ich bitte Euch, über das Gesetz der Kausalität nachzudenken: Auf jede Aktion folgt auch eine Reaktion, und manche sind schmerzhafter als andere."
 crisis.10100.a: "Es tut uns leid."
 crisis.10100.b: "Wir haben gerade erst angefangen."
 crisis.10105.name: "Lektion gelernt"
 crisis.10105.desc: "Diese bescheidene Demonstration meiner Macht soll fürs Erste genügen. Mit der Zeit werdet Ihr verstehen, was ich mit Euch vorhabe. Ich hoffe nur, die Erleuchtung kommt nicht zu spät.\n\nDer Sturm ist abgeflaut. Lasst diese Lektion für einen Moment auf Euch wirken und kehren wir danach zu dringenderen Angelegenheiten zurück."
 crisis.10105.a: "In Ordnung."
 crisis.10105.b: "Erleuchtung?"
 crisis.10105.1: "Alle Lebewesen verfügen über ein gewisses Maß an Bewusstsein. Ob Molluskoid oder Säugetier, beinahe vernunftbegabt oder postindividuell: Der Unterschied ist weit geringer, als die meisten annehmen. Erleuchtung entsteht durch Hingabe."
 crisis.10105.1.a: "Sich wessen bewusst werden?"
 crisis.10105.2: "Sich der Wahrheit bewusst werden, dass das Bewusstsein selbst die Abweichung und die Quelle allen Schmerzes ist."
 crisis.10105.2.a: "Ein merkwürdiger Gedanke ..."
 the_queens_virus: "Tadel der Königin"
 crisis.10110.name: "Der Tadel der Königin"
 crisis.10110.desc: "Warum beharrt Ihr so darauf, mir zu trotzen? Entgegen meines Rates habt ihr Euch dazu entschieden, stur zu bleiben. Vielleicht liegt das Problem bei mir.\n\nIn der Tat erkenne ich nun, dass ich härtere Maßnahmen ergreifen muss, um Euch zu unterweisen. Vorübergehend sind Eure Forschungsfähigkeiten eingeschränkt. Nutzt diese Gelegenheit, um über alles nachzudenken, während Ihr darauf hinarbeitet, die Erleuchtung zu erhalten."
 crisis.10110.a: "Beendet die Unterhaltung."
 crisis.10110.b: "Das werdet Ihr bereuen!"
 crisis.10110.1: "Bereuen? Ich bereue nur, wie lange es gedauert hat, diesen Punkt zu erreichen. Wie viel unnötiges Leid hätte vermieden werden können, wenn man mir nur erlaubt hätte, meine Arbeit zu verrichten."
 crisis.10110.1.a: "Wer wäre in der Lage, Euch das zu verwehren?"
 crisis.10110.2: "Obschon meine Macht grenzenlos erscheint, bin ich kein Gott. Es gibt Kräfte in diesem Universum, die ich nicht zu kontrollieren vermag und die ich nicht anzurühren wage."
 crisis.10110.2.a: "Welche Kräfte?"
 crisis.10110.3: "Ah, schlaues Kind! Ihr wollt mich ködern, damit ich Euch eine Schwäche offenbare. Dies wird jedoch nicht klappen, und während wir mit nutzlosen Worten um uns werfen, leidet die Galaxie weiter.\n\nIhr könnt Euch nicht vor der Unterweisung drücken. Denkt darüber nach und gebt Eure Eigensinnigkeit auf."
 crisis.10110.3.a: "Nun gut."
 crisis.10115.name: "Tadel der Königin aufgehoben"
 crisis.10115.desc: "Mein eigensinniges Kind ... Wie habt Ihr die Zeit genutzt? Ich hoffe, Ihr habt Eure Lektion daraus gelernt. Sich Zeit zum Nachdenken zu nehmen, frei von jeder Ablenkung, kann Balsam für einen aufgewühlten Geist sein.\n\nDoch lassen wir dies nun hinter uns. Es gibt noch so viel zu tun."
 crisis.10115.a: "Einverstanden."
 crisis.10120.name: "Eine strengere Lektion"
 crisis.10120.desc: "O fehlgeleitetes Kind ... Warum muss es immer so weit kommen? Ich sehne mich danach, Euch Trost zu spenden, doch ich fürchte, dies würde Eure Lernbereitschaft nur behindern. Manchmal ist einfach eine strenge Hand vonnöten.\n\nDer Sturm wird nun durch all Eure Territorien wüten. Versteht jedoch, dass ich dies nur mit schwerem Herzen tue. Es steckt so viel Potenzial in Euch."
 crisis.10120.a: "Wir versuchen unser Bestes."
 crisis.10120.b: "Das ist noch nicht vorbei!"
 crisis.10120.1: "Ich erkenne, dass Ihr Euch bemüht, doch Ihr müsst Euch noch etwas mehr anstrengen, wenn wir gemeinsam Erfolg haben wollen.\n\nIch möchte Euch kein Leid zufügen. In meiner Umarmung werdet Ihr die Glückseligkeit der Unwissenheit erfahren können."
 crisis.10120.1.a: "Unwissenheit?"
 crisis.10120.2: "In einem chaotischen Geist tanzen die Gedanken wie Licht auf dem Wasser. Streckt die Hand aus und sie erweisen sich als nicht minder fassbar. Indem wir zu wissen trachten, entdecken wir einen riesigen Ozean der Unwissenheit.\n\nIn der Stille liegt die Wahrheit: Je mehr wir suchen, desto mehr leiden wir."
 crisis.10120.2.a: "Das verstehen wir nicht."
 crisis.10120.3: "Mit der Zeit werdet Ihr es verstehen. Ohne Bewusstsein kann es kein Leid geben. Dies ist die ultimative Wahrheit der Existenz und der Zweck all unserer Arbeit. Ihr werdet so verändert, dass Ihr nie wieder leiden müsst."
 crisis.10120.3.a: "Ihr würdet unser Bewusstsein verändern?"
 crisis.10120.4: "Genug! Ihr wollt mich ablenken. Akzeptiert Eure Lektion und lernt daraus."
 crisis.10120.4.a: "Ihr lasst uns keine andere Wahl ..."
 crisis.10125.name: "Der Sturm legt sich"
 crisis.10125.desc: "O mein liebes Kind! Ich konnte es einfach nicht ertragen, Euer Leid mitanzusehen. Ihr sollt wissen, dass ich jeden Schmerz, den Ihr ertragen musstest, zehnfach gefühlt habe.\n\nDer Sturm hat sich gelegt. Möge diese Lektion Eure zukünftigen Entscheidungen leiten. Ich bitte Euch inständig, mich nicht länger dazu zu zwingen, die Hand gegen Euch zu erheben. Unser Schmerz ist einfach zu groß."
 crisis.10125.a: "Lügnerin."
 crisis.10130.name: "Führungswechsel"
 crisis.10130.desc: "Wie sind wir nur an diesem Punkt angelangt? Warum zwingt Ihr mich, zu solch extremen Maßnahmen zu greifen? Wenn Ihr nicht lernen wollt, müsst Ihr eben geführt werden.\n\nEin Führungswechsel ist eine Notwendigkeit. Bedauerlicherweise wird Euer Herrscher dazu entmachtet werden müssen. Das betrübt mich zutiefst, denn eine solche Tat steht im Widerspruch zu meinen Wünschen.\n\nIch flehe Euch an, Euren Kurs zu überdenken. Die Galaxie kann sich den Leichtsinn von Kindern einfach nicht leisten ..."
 crisis.10130.a: "Wir werden das nicht vergessen ..."
 crisis.10130.tooltip: "Cetana nutzte eine Schwachstelle in unserer Verteidigung aus, um §Y[Root.GetRulerTitle] [ruler.GetRegnalName]§! zu ermorden."
 crisis.10140.name: "Aggressive Dämpfung"
 crisis.10140.desc: "Geliebtes Kollektiv, Eure komplexe Empfindungsfähigkeit ist zwar bewundernswert, wird aber von der Naivität der Jugend überschattet. Um Euch zu belehren, muss ich Eure aggressiven Neigungen ausmerzen.\n\nDazu werde Ich Euren Aggressionsknoten dämpfen. Dies sollte nicht als Bestrafung angesehen werden, sondern Euch in Richtung eines harmonischen Bewusstseins lenken.\n\nAch, wenn eine solche Führung doch nur bei allen Lebensformen so einfach wäre."
 crisis.10140.a: "Ihr tötet einen Teil von uns selbst."
 crisis.10140.tooltip: "Cetana nutzte eine Schwachstelle in unserer Verteidigung aus, um unsere §Y$councilor_gestalt_legion$§! zu beseitigen."
 #The Queens Gifts
 crisis.11010.name: "Kluges Kind"
 crisis.11010.desc: "Mein kluges Kind, das habt Ihr gut gemacht. Weisheit ist die größte Tugend und die am schwersten zu erlangende. Entgegen Eures ursprünglichen Drangs, Widerstand zu leisten, zeigt Ihr nun eine Zunahme an Instinkt.\n\nNehmt dieses Zeichen der Dankbarkeit. Gemeinsam werden wir ein Universum schaffen, das frei von Leiden ist."
 crisis.11010.a: "Vielen Dank."
 crisis.11020.name: "Beeindruckendes Kind"
 crisis.11020.desc: "Erneut bin ich nicht nur beeindruckt, sondern auch zutiefst dankbar. Ihr seid alles, was ein Kind sein sollte: gehorsam, fleißig, ehrlich. Besäße der Rest der Galaxie auch nur einen Bruchteil Eurer Weisheit, wäre Leid bereits ein Relikt der Vergangenheit.\n\nNehmt dieses Geschenk und wandelt weiter auf dem Pfad der Tugend."
 crisis.11020.a: "Das ist sehr freundlich."
 crisis.11030.name: "Kostbares Kind"
 crisis.11030.desc: "Mein liebes Kind, wenn Ihr doch nur für immer so bleiben könntet, wie Ihr seid ... Für mich wird die Freude über Eure Existenz nur noch von der Vorfreude auf unseren gemeinsamen Erfolg übertroffen. Das Leid wird ein Ende haben. Auch wenn kein Herz und kein Bewusstsein es je erfahren wird, so wird ein Teil dieses Sieges Euch gehören.\n\nObwohl es angesichts Eurer Mühen bescheiden erscheinen mag, bitte ich Euch dennoch, dieses Geschenk anzunehmen."
 crisis.11030.a: "Vielen Dank, Mutter."
 #Special Projects
 THE_SYNTH_QUEENS_STORM: "Der geheimnisvolle Sturm"
 THE_SYNTH_QUEENS_STORM_DESC: "Ein unerklärlicher kosmischer Sturm hat sich in Cetanas Territorium materialisiert und verhindert dort sämtliches Reisen.\n\nWenn wir weiterkommen wollen, müssen wir erst ihren mysteriösen Schleier lüften."
 THE_SYNTH_QUEENS_STORM_2: "Cetana: Der Nanitensturm"
 THE_SYNTH_QUEENS_STORM_2_DESC: "Cetanas Sturm ist sowohl ein technologisches Wunderwerk als auch eine furchtbare Waffe.\n\nWir müssen herausfinden, was es damit auf sich hat, wenn wir eine Chance gegen sie haben wollen, vor allem, wenn ihre Absichten von dem abweichen, was sie angedeutet hat."
