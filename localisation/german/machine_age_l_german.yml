 #Cybernetic Special Traits
 trait_cyborg_creed_of_construction: "Augmentierungen der Gemeinschaft"
 trait_cyborg_creed_of_construction_desc: "Die Gemeinschaft des Hammers verwendet göttliche Augmentierungen, um alles zu erschaffen, was die Gläubigen benötigen."
 trait_cyborg_creed_of_war: "Augmentierungen der Templer"
 trait_cyborg_creed_of_war_desc: "Durch die göttlichen Augmentierungen des Templerordens des Stahls werden unsere heiligen Krieger unaufhaltsam in der Schlacht."
 trait_cyborg_creed_of_research: "Augmentierungen des Chors"
 trait_cyborg_creed_of_research_desc: "Der Chor des Bewusstseins ermöglicht durch sein semi-vernetztes Bewusstsein eine sofortige Kommunikation zwischen Forschern."
 trait_cyborg_creed_of_labor: "Augmentierungen der Kommune"
 trait_cyborg_creed_of_labor_desc: "Die göttlichen Augmentierungen der Kommune der Arbeitsamkeit übertreffen traditionelle Werkzeuge in jeder Hinsicht."
 trait_cyborg_ritualistic_implants: "Rituelle Implantate"
 trait_cyborg_ritualistic_implants_desc: "Diese Implantate werden von den Gläubigen mit Stolz getragen. Ihre Hingabe an das Göttliche inspiriert alle."
