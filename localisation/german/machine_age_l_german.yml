 situation_synthetic_fertility_digitization_monthly_change_tooltip: "Wir erforschen die Technologie, die nötig ist, um eine stoffliche Bevölkerung wiederaufzustocken."
 situation_synthetic_fertility_digitization_desc: "Wir können keine Kinder gebären, aber wir können unser Bewusstsein abspeichern. Dieser Prozess ist langsam, aber notwendig.\n\nMit der Zeit wird es uns vielleicht möglich sein, in die physische Welt zurückzukehren, doch dafür müssen synthetische Ersatzkörper entwickelt werden."
 situation_synthetic_fertility_approach_none: "Wirtschaft zuerst"
 situation_synthetic_fertility_approach_none_desc: "Wir müssen die Bedürfnisse des Projekts mit der Gesundheit unserer Wirtschaft in Einklang bringen."
 situation_synthetic_fertility_approach_tech_low: "Zusätzliche Mittel"
 situation_synthetic_fertility_approach_tech_low_desc: "Wir werden einen Teil unserer Wirtschaft unseren Forschungseinrichtungen zuführen."
 situation_synthetic_fertility_approach_tech_high: "Forschungsfokus"
 situation_synthetic_fertility_approach_tech_high_desc: "Wir müssen bereit sein, harte wirtschaftliche Entscheidungen zu treffen, um zu überleben."
 situation_synthetic_fertility_approach_unity_low: "Virtuelle Entwicklung"
 situation_synthetic_fertility_approach_unity_low_desc: "Wir werden unseren besten digitalen Identitäten mehr Energie zuführen, um an einer Lösung für unsere synthetischen Körper zu arbeiten."
 situation_synthetic_fertility_approach_unity_high: "Notfallmaßnahmen"
 situation_synthetic_fertility_approach_unity_high_desc: "Primäre Energiequellen werden den virtuellen Identitäten zugeführt, um einen vollständigen Ersatzkörper zu gewährleisten."
 situation_synthetic_fertility_complete: "Bis dahin werden unsere physischen Formen nicht mehr existieren und unsere Bevölkerung wird digitalisiert sein."
 stage_synthetic_fertility_problem_effects: "Um unsere physische Form in der natürlichen Welt erhalten zu können, müssen wir hochmoderne synthetische Körper mit komplexen positronischen Gehirnen entwickeln."
 stage_synthetic_fertility_danger_effects: "Wenn mehr als die Hälfte unserer Bevölkerung nicht mehr existiert, müssen wir bereit sein, mehr Ressourcen in unser Synthetisierungsprogramm zu stecken."
 stage_synthetic_fertility_crisis_effects: "Da nur noch wenige übrig sind, müssen wir alles in unserer Macht Stehende tun, um ein positronisches Gehirn von ausreichender Komplexität zu entwickeln."
 situation_synthetic_fertility_synthesization_outcome: "Wir werden erst ruhen, wenn unsere Zukunft gesichert ist."
