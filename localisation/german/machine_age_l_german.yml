 trait_auto_mod_biological: "Berufsgenomik"
 trait_auto_mod_biological_desc: "Diese hochentwickelten Gene verfügen über epigenetische Auslöser, die sich an die beruflichen Anforderungen anpassen und die Genexpression dynamisch für die jeweilige Arbeitsumgebung optimieren."
 trait_auto_mod_cyborg: "Universalaugmentierungen"
 trait_auto_mod_cyborg_desc: "Universelle Adapteranschlüsse erlauben es, Augmentierungen bei Bedarf zu ersetzen und an die jeweils aktuellen Anforderungen anzupassen."
 trait_auto_mod_robotic: "Anpassbare Körper"
 trait_auto_mod_robotic_desc: "Dieses System konfiguriert die Hardware dynamisch neu, um die betrieblichen Anforderungen zu erfüllen und die Leistung für jede gesonderte Aufgabe zu optimieren."
 trait_auto_mod_overtuned: "Vergängliche Vorzüglichkeit"
 trait_auto_mod_overtuned_desc: "Fortschrittliche epigenetische Auslöser steigern die körperliche und kognitive Leistungsfähigkeit am Arbeitsplatz und verkürzen die Lebenserwartung drastisch. Schließlich macht Dahinsiechen nie so viel Spaß wie Ausbrennen."
 concept_automodding_trait: "Auto-Modifikationseigenschaft"
 concept_automodding_traits: "Auto-Modifikationseigenschaften"
 concept_automodding_trait_desc: "- Modifikatoren werden automatisch mit einer vorgegebenen Liste von Eigenschaften kombiniert, die dem derzeitigen Job entsprechen\n- Die Effekte der Eigenschaft skalieren mit dem Anteil der Bewohnergruppe, die über die Eigenschaft verfügt.\n- $pop$ §HBewohner§! mit §Y$concept_automodding_traits$§!, die monatlich pro Kolonie überprüft werden: §G100§!\n- Gebäude für das Bewohnerwachstum oder die Bewohnermontage erhöhen die Anzahl an £pop£ §Hauto-modifizierten Bewohnern§!, die monatlich überprüft werden."
 concept_automodding_biological: "Biologische Auto-Modifikationseigenschaftsliste"
 concept_automodding_biological_desc: "- ['trait:trait_traditional']\n- ['trait:trait_thrifty']\n- ['trait:trait_intelligent']\n- ['trait:trait_industrious']\n- ['trait:trait_agrarian']\n- ['trait:trait_ingenious']\n- ['trait:trait_charismatic']"
