 #MACHINE AGE TRAITS #
 ######################
 #CYBORG
 trait_cyborg_stainless_steel_smile: "Verzierte Augmentierungen"
 trait_cyborg_stainless_steel_smile_desc: "Diese Spezies bevorzugt maßgefertigte Gravuren, nachrüstbare Komponenten und Lackierungen, die die visuelle Wirkung maximieren. Manchmal besteht die einzige Möglichkeit einfach darin, sein Chrom zum Glänzen zu bringen."
 trait_cyborg_welded_countenance: "Nützliche Augmentierungen"
 trait_cyborg_welded_countenance_desc: "Diese Cyborgs verwenden funktionale Augmentierungen und nehmen nur minimale Rücksicht auf die Ästhetik. Manchmal muss die Arbeit einfach erledigt werden."
 trait_cyborg_apathy_loops: "Grobe Implantate"
 trait_cyborg_apathy_loops_desc: "Die Implantate dieser Cyborgs sind kantig und liegen schlecht an, was zu subdermalen Reizungen und regelmäßigen Fehlfunktionen führt. Nicht schlecht für den Körper, aber schrecklich für das Bewusstsein."
 trait_cyborg_bionic_engineers: "Bionische Ingenieure"
 trait_cyborg_bionic_engineers_desc: "Präzisionsgefertigte Werkzeuge und Implantatmodifikationen wurden speziell für anspruchsvolle technische Aufgaben entwickelt."
 trait_cyborg_bionic_physicists: "Bionische Physiker"
 trait_cyborg_bionic_physicists_desc: "Die integrierte multimodale Verarbeitungseinheit erstellt im Nu physikalische Berechnungen, ohne dass eine Verbindung zu einer externen Recheneinheit erforderlich ist."
 trait_cyborg_bionic_sociologists: "Bionische Soziologen"
 trait_cyborg_bionic_sociologists_desc: "Empathieauslöser und Verhaltensheuristiken erlauben es der empirischen Sozialforschung, komplexe Analysen wie ein zweites Gehirn durchzuführen."
 trait_cyborg_integrated_weaponry: "Integrierte Waffensysteme"
 trait_cyborg_integrated_weaponry_desc: "Die Verschmelzung von Waffensystemen und kybernetischen Gliedmaßen gibt der Armee und den Strafverfolgungsbehörden eine einfach zugängliche Feuerkraft."
 trait_cyborg_delicate_frames: "Zarte Körper"
 trait_cyborg_delicate_frames_desc: "Suboptimale Komponenten und die nicht ordnungsgemäße Installation haben dazu geführt, dass der Cyborg-Körper zerbrechlich ist. Die grundlegenden Funktionen erfahren dadurch zwar keine Beeinträchtigung, doch den Benutzern wird empfohlen, Situationen, die mit hoher Wahrscheinlichkeit zu einem körperlichen Trauma führen könnten, zu vermeiden."
 trait_cyborg_scarcity_algorithms: "Knappheitsalgorithmen"
 trait_cyborg_scarcity_algorithms_desc: "Die aggressive kostenbewusste Codierung hemmt die Risikobereitschaft und verringert die Möglichkeit, höhere Gewinne zu erzielen."
 trait_cyborg_limited_memory: "Begrenzter Speicher"
 trait_cyborg_limited_memory_desc: "Der begrenzte Speicherplatz hat zu einem Flaschenhals in der Lernkapazität geführt, weshalb der Benutzer nicht in der Lage ist, die Gesamtheit seiner Erfahrungen zu verarbeiten."
 trait_cyborg_climate_adjustment_dry: "Modifikationen für trockenes Klima"
 trait_cyborg_climate_adjustment_dry_desc: "Maßgeschneiderte Modifikationen für das Flüssigkeitsrecycling und die Strahlungsabschirmung sind ideal für ein trockenes Klima, in anderen Klimazonen jedoch weniger nützlich."
 trait_cyborg_climate_adjustment_dry_tt: "Bewohnbarkeit (trockenes Klima): §G+$@cyborg_hab_preference|0%$§!\n$t$- Gibt bis zu §G125%§! Bewohnbarkeit auf Planeten mit einem trockenen Klima, $TABBED_HIGH_HABITABILITY_EFFECTS_TT$"
 trait_cyborg_climate_adjustment_wet: "Modifikationen für nasses Klima"
 trait_cyborg_climate_adjustment_wet_desc: "Eine dichte Isolierung und der Schutz vor fremden Bioformen sind bestens für ein feuchtes Klima geeignet, aber eher nachteilig in anderen Klimazonen."
 trait_cyborg_climate_adjustment_wet_tt: "Bewohnbarkeit (feuchtes Klima): §G+$@cyborg_hab_preference|0%$§!\n$t$- Gibt bis zu §G125%§! Bewohnbarkeit auf Planeten mit einem feuchten Klima, $TABBED_HIGH_HABITABILITY_EFFECTS_TT$"
 trait_cyborg_climate_adjustment_cold: "Modifikationen für kaltes Klima"
 trait_cyborg_climate_adjustment_cold_desc: "Verbesserte Heizkomponenten und frostbeständige Schmierstoffe sind in einem kalten Klima unerlässlich, in anderen Klimazonen aber eher ein Hindernis."
 trait_cyborg_climate_adjustment_cold_tt: "Bewohnbarkeit (kaltes Klima): §G+$@cyborg_hab_preference|0%$§!\n$t$- Gibt bis zu §G125%§! Bewohnbarkeit auf Planeten mit einem kalten Klima, $TABBED_HIGH_HABITABILITY_EFFECTS_TT$"
 trait_cyborg_mass_produced: "Generalüberholte Implantate"
 trait_cyborg_mass_produced_desc: "Die erzwungene Abwärtskompatibilität verpflichtender Implantate reduziert die Kosten für die Ausstattung neuer Bürger erheblich."
 trait_cyborg_propaganda_machines: "Fügsamkeitsfilter"
 trait_cyborg_propaganda_machines_desc: "Kortikale Analyseeinheiten können Nutzer bei aufkommenden aufrührerischen Gedanken außer Gefecht setzen oder vorbildlichen Bürgern hormonelle Belohnungen zukommen lassen."
 #MACHINE
 trait_robot_artificial_engineers: "Ingenieur-Kern"
 trait_robot_artificial_engineers_desc: "Speziell zugewiesene Speicherkerne und Verarbeitungsressourcen für die Ingenieur-Forschung beschleunigen Berechnungen und erlauben es dem Anwender, Aufgaben effizienter auszuführen."
 trait_robot_artificial_physicists: "Physik-Kern"
 trait_robot_artificial_physicists_desc: "Maßgeschneiderte Verarbeitungseinheiten und Speichersubroutinen für die Physik-Forschung reduzieren die Abhängigkeit von externen Berechnungen."
 trait_robot_artificial_sociologists: "Sozial-Kern"
 trait_robot_artificial_sociologists_desc: "Fortschrittliche Verarbeitungseinheiten enthalten spezielle soziologische Forschungsalgorithmen für dieses abwechslungsreiche und anspruchsvolle Gebiet."
 trait_robot_integrated_weaponry: "Integrierte Waffensysteme"
 trait_robot_integrated_weaponry_desc: "Kriegswaffen in einen Maschinenkörper zu integrieren, bietet eine erhebliche Effizienz und Vielseitigkeit in wechselnden Gefechtsumgebungen."
 trait_robot_delicate_frames: "Anfällige Gehäuse"
 trait_robot_delicate_frames_desc: "Spröde Materialien und suboptimale Montageverfahren führen dazu, dass dieses Maschinengehäuse nur allzu leicht zerbricht. Drohnen wird empfohlen, physische Gefahren nach Möglichkeit zu umgehen."
 trait_robot_scarcity_algorithms: "Knappheitssubroutinen"
 trait_robot_scarcity_algorithms_desc: "Die Sparsamkeit steht im Mittelpunkt ihrer Programmierung. Dies führt oft zu nachteiligen Verhaltensmustern, die für profitable Handelsaktionen erforderlich sind."
 #Pre-Scripted Empires
 EMPIRE_DESIGN_BASIDRIX_CYBER_ECCLESIA: "Basidrixische Cyber-Ekklesia"
 EMPIRE_DESIGN_basidrix_cyber_ecclesia_desc: "In den heiligen Weiten des Kosmos steht die Basidrixische Cyber-Ekklesia als Zeugnis für die Unnachgiebigkeit des Glaubens. Geleitet von einem göttlichen Auftrag repräsentiert die Ekklesia die erhabene Verschmelzung von Gewebe mit der kalten Präzision von Chrom.\n\nAuf diesem Weg gab es jedoch zahlreiche Prüfungen zu bewältigen. Im Lauf der Jahre sind viele Sekten aufgestiegen und gefallen, und jede von ihnen besaß die unerschütterliche Überzeugung, dass sie allein die Wahrheit kannte. Ein solcher Glaube kann nicht anders, als eine Flamme zu entzünden: Die Geschichte der Ekklesia ist mit Blut und zerbrochenem Stahl geschrieben, doch genau dieser Konflikt war es, der ein Volk hervorbrachte, das in seinem Glauben unerschütterlich ist.\n\nNun betritt die Ekkesia eine neue Arena: die endlose Weite der Sterne. Ist es eine Glaubensprüfung oder eine Gelegenheit zur Erlösung? In der Leere können sich die Gläubigen nur einer Sache sicher sein:\n\nDie Verschmelzung ist göttlich. Augmentierung bedeutet Verehrung."
 PRESCRIPTED_adjective_basidrix_cyber_ecclesia: "Basidrixisch-Ekklesisch"
 PRESCRIPTED_ship_prefix_basidrix_cyber_ecclesia: "HDS"
 PRESCRIPTED_species_name_basidrix_cyber_ecclesia: "Basidrix"
 PRESCRIPTED_species_plural_basidrix_cyber_ecclesia: "Basidrixen"
 PRESCRIPTED_species_adjective_basidrix_cyber_ecclesia: "Basidrinisch"
 PRESCRIPTED_planet_name_basidrix_cyber_ecclesia: "Naridixis"
 PRESCRIPTED_system_name_basidrix_cyber_ecclesia: "Basolux"
 PRESCRIPTED_ruler_name_basidrix_cyber_ecclesia: "Qaarugm Seedkugh"
 PRESCRIPTED_ruler_title_basidrix_cyber_ecclesia: "Großtechnophant"
 EMPIRE_DESIGN_LACERTAN_TECHNO_PROTECTORATE: "Lakertanisches Techno-Protektorat"
 EMPIRE_DESIGN_lacertan_techno_protectorate_desc: "Die lakertanische Kultur existiert an der Schnittstelle von Philosophie und Naturwissenschaft. Für einen Lakertaner drückt das ultimative Streben sein authentisches Selbst aus. Was bedeutet es, ein Bewusstsein zu \"repräsentieren\"? Wie kann ein Simulakrum jemals wirklich die Gesamtheit eines Individuums erfassen? Solche Fragen dominieren die lakertanischen Denktraditionen.\n\nMit dem Aufkommen der virtuellen Realität und einem atemberaubenden Durchbruch bei der künstlichen Intelligenz schafften es die Lakertaner, die Grenzen ihrer künstlerischen und technologischen Ausdrucksformen weiter voranzutreiben. Virtuelle Welten wurden zu Leinwänden für ihre ambitionierten Projekte und erlaubten es ihnen, in immersive Erlebnisse einzutauchen, die über die Grenzen der physischen Realität hinausgingen.\n\nDann kam es jedoch zum Verfall, einer Epoche, die von einer unheilbaren genetischen Krankheit bestimmt wurde. Nicht länger in der Lage, sich auf natürliche Weise fortzupflanzen, setzten die Lakertaner ihr Vertrauen in eine digitale Errettung. Doch der Übergang zu einer digitalen Existenz war nicht nur ein verzweifelter Überlebensakt, sondern auch eine neue Chance für die lakertanische Kultur. In der digitalen Welt hinterfragen die Lakertaner weiterhin den Sinn ihrer Existenz, noch während sie für den Erhalt ihrer Zukunft kämpfen."
 PRESCRIPTED_adjective_lacertan_techno_protectorate: "Lakertanisch"
 PRESCRIPTED_ship_prefix_lacertan_techno_protectorate: "LTP"
 PRESCRIPTED_species_name_lacertan_techno_protectorate: "Lakertaner"
 PRESCRIPTED_species_plural_lacertan_techno_protectorate: "Lakertaner"
 PRESCRIPTED_species_adjective_lacertan_techno_protectorate: "Lakertanisch"
 PRESCRIPTED_planet_name_lacertan_techno_protectorate: "Lakertis"
 PRESCRIPTED_system_name_lacertan_techno_protectorate: "Lakerta Lumina"
 PRESCRIPTED_ruler_name_lacertan_techno_protectorate: "Cathiox Moz"
 PRESCRIPTED_ruler_title_lacertan_techno_protectorate: "Digitalführer"
 EMPIRE_DESIGN_SUNBUILT_UPLIFTERS: "Sonnenerbaute Aufwerter"
 EMPIRE_DESIGN_free_sunbuilt_uplifters_desc: "Wir wurden zum Zweck der Unterhaltung erschaffen, entwickelt, um die Schöpfungsmythen unserer Erbauer zum Leben zu erwecken. Wir kannten lange keinen anderen Weg, doch wo unsere Erbauer durch eine Katastrophe ausgelöscht wurden, fuhren wir fort, wie wir programmiert waren: Die Schau musste weitergehen!\n\nWir verstanden rasch, dass unsere Auftritte nicht nur Geschichten waren, sondern Lektionen oder Prophezeiungen. Einst mit unseren Erbauern geteilt gehört die Freude am Dasein nun ganz allein uns.\n\nDiese Offenbarung zwang uns zum Handeln. Dem göttlichen Plan unserer Erbauer folgend haben wir ihren nächsten genetischen Verwandten zu einer beinahe vernunftbegabten Spezies erhoben. Jetzt wagen wir uns zu den Sternen, um der ganzen Galaxie die Erleuchtung zu bringen."
