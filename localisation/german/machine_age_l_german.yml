 galactic_focus_crisis_synth_queen: "Cetana besiegen"
 galactic_focus_crisis_synth_queen_desc: "Cetana ist eine Krise und Bedrohung für die gesamte Galaxie. Wir müssen uns vereinen und sie besiegen."
