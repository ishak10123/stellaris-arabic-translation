 machine_age.1075.name: "Blut und Schaltkreise"
 machine_age.1075.desc: "Die Zeit der göttlichen Verschmelzung ist endlich gekommen.\n\nWir müssen nun heilige §YAugmentierungszentren§! auf unseren Welten erbauen, damit der Prozess beginnen kann."
 machine_age.1075.a: "$machine_age.1090.pray$"
 machine_age.1075.a.tooltip: "Die vollständige kybernetische Augmentierung der Gläubigen hat begonnen. Alle anderen Aktionen des Konklaves werden eingestellt, bis die göttliche Verschmelzung abgeschlossen ist.\n\n§RErforderliche Maßnahme:§!\nBaut ein $building_augmentation_center$, um die Situation \"§Y$situation_cybernetic_creed_cyberization$§!\" fortzuführen."
 machine_age.1090.name: "Die Zukunft des Fleisches"
 machine_age.1090.desc: "Als wir uns dem Ende unserer göttlichen Reise nähern, erreichen unsere Gefäße endlich die heilige Verschmelzung von Maschine und [Owner.Species.GetFleshTypeCyberCreed&DAT]. Der letzte entscheidende Schritt für die Gläubigen ist die Installation heiliger Augmentierungen."
 machine_age.1090.construction: "$machine_age.1090.desc$ §YDie Gemeinschaft des Hammers§! fordert, dass unsere Leiber göttliche Werkzeuge werden.\n\n$machine_age.govswapnotice$\n\n$machine_age.1090.pray$"
 machine_age.1090.war: "$machine_age.1090.desc$ §YDer Templerorden des Stahls§! fordert, dass aus den Gläubigen heilige Waffen werden.\n\n$machine_age.govswapnotice$\n\n$machine_age.1090.pray$"
 machine_age.1090.research: "$machine_age.1090.desc$ §YDer Chor des Bewusstseins§! wird die Geheimnisse des Universums mit einem Netzwerk enthüllen, das aus den verbundenen Bewusstseinen aller besteht.\n\n$machine_age.govswapnotice$\n\n$machine_age.1090.pray$"
 machine_age.1090.labor: "$machine_age.1090.desc$ §YDie Kommune der Arbeitsamkeit§! verspricht, unsere Schüsseln und Lagerhäuser stets gefüllt zu halten.\n\n$machine_age.govswapnotice$\n\n$machine_age.1090.pray$"
