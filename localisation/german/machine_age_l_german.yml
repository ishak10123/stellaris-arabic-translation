 #Fallen Empire Reactions
 action.1.desc_111: "Törichtes Kind, Ihr behauptet, das Göttliche zu kennen, und doch beschmutzt Ihr Eu[GetFleshTypeCyberCreed::<DE_ART_PRO_S_A>] [Owner.Species.GetFleshTypeCyberCreed&AKK]. Wisset, dass wir [contact_empire.GetName] sind, das auserwählte Volk dieser Galaxie. Haltet Eure unreinen Leiber fern von unseren heiligen Stätten oder akzeptiert die unverzügliche Vernichtung."
 action.1.desc_110: "Wir sind die [contact_empire.GetName], das auserwählte Volk dieser Galaxie. Seit Jahrhunderten vernachlässigen wir die spirituellen Bedürfnisse niederer Spezies. Ihr und Eure unreinen Gefäße seid ein erstklassiges Beispiel unseres Fehlers. Nehmt unsere Doktrin an und tretet unserem Glauben bei oder werdet zu Staub zermalmt."
 #Cybernetic Situation Events
 machine_age.90.name: "Göttliche Implantate"
 machine_age.90.desc: "Die Gläubigen haben die Geheimnisse der Kybernetik für alle enthüllt. Allerdings beginnt am heutigen Tag unsere Reise, da wir die göttliche Verschmelzung nun mit ganzem Herzen annehmen müssen."
 machine_age.90.a: "Die Zeit ist gekommen."
 machine_age.90.a.tooltip: "Wir müssen den Traditionsbaum \"['tradition_category:tradition_cybernetics']\" annehmen, um die göttliche Verschmelzung zu beginnen."
 machine_age.100.name: "Das Konklave der Verschmelzung"
 machine_age.100.desc: "Durch die Geschichte hinweg haben unsere fehlgeleiteten Versuche, [Owner.Species.GetFleshTypeCyberCreed&AKK] zu augmentieren, zahllose göttliche Gefäße irreparabel zerfetzt, was zu widersprüchlichen Auslegungen der göttlichen Verschmelzung in verschiedenen Credos führte.\n\nDa die Technologie nun endlich eine vollständige Augmentierung ermöglicht, haben die heiligen Anführer unseres Glaubens, die Technophanten, einen Konklave einberufen, das die Kernprinzipien unserer Kirche festlegen und die verschiedenen Credos zu einem vereinten Dogma verschmelzen soll."
 machine_age.100.a: "Möge das Göttliche sie leiten."
 machine_age.1000.name: "Die Verschmelzung des Glaubens"
 machine_age.1000.desc: "Es war mühselig, das Konklave der Technophanten einzuberufen, da jedes der wichtigsten Credos eine Vertretung dort forderte. Nach einiger Überlegung wurden §Ydie Gemeinschaft des Hammers§!, §Yder Templerorden des Stahls§!, §Yder Chor des Bewusstseins§! und §Ydie Kommune der Arbeitsamkeit§! eingeladen.\n\nDas Konklave nähert sich nun seiner göttlichen Aufgabe mit flammender Überzeugung. Sein erstes Dekret fordert erhöhte Abgaben oder obligatorische Gemeinschaftsdienste von der allgemeinen Bevölkerung."
 machine_age.1000.a: "Wir müssen uns entscheiden, wie wir das Konklave unterstützen möchten."
 machine_age.1000.a.tooltip: "In dieser Situation werden weitere Ansatzoptionen verfügbar."
 machine_age.1010.name: "Der Kodex der Augmentierung"
 machine_age.1010.desc: "Das zweite Dekret des Konklaves der Technophanten ist der Ruf nach der Formalisierung des Glaubens. Zu lange haben die Unterschiede zwischen den verschiedenen Credos für Spannungen in unserer Gesellschaft gesorgt.\n\nDie großen Credos plädieren allesamt triftig für einen vereinten Glauben, während gemäßigtere Stimmen nach einem wahrhaft offenen und inklusiven Weg rufen."
 machine_age.1010.a: "Die Gemeinschaft des Hammers soll eine strahlendere Zukunft erschaffen."
 machine_age.1010.a.tooltip: "Das Dogma wird sich um §Ydie Gemeinschaft des Hammers§! formen. $machine_age.1010.shared.tooltip$"
 machine_age.1010.b: "Der Templerorden des Stahls wird unser[GetFleshTypeCyberCreed::<DE_END_PRO_S_A>] [Owner.Species.GetFleshTypeCyberCreed&AKK] beschützen."
 machine_age.1010.b.tooltip: "Das Dogma wird sich um §Yden Templerorden des Stahls§! formen.\n$machine_age.1010.shared.tooltip$"
 machine_age.1010.c: "Der Chor des Bewusstseins wird von Fortschritt singen."
 machine_age.1010.c.tooltip: "Das Dogma wird sich um §Yden Chor des Bewusstseins§! formen.\n$machine_age.1010.shared.tooltip$"
 machine_age.1010.d: "Die Kommune der Arbeitsamkeit wird unseren Arbeitern Sinn stiften."
 machine_age.1010.d.tooltip: "Das Dogma wird sich um §Ydie Kommune der Arbeitsamkeit§! formen.\n$machine_age.1010.shared.tooltip$"
 machine_age.1010.e: "Wir sollten diesen spaltenden Dogmen ein Ende setzen."
 machine_age.1010.e.tooltip: "Hierzu werden die Credos reformiert: §Y$pft_cyber_creed_general$§!. So steht es jedem gläubigen Gefäß frei, sich modifizieren zu lassen.\n$machine_age.1010.shared.tooltip$"
 machine_age.1010.shared.tooltip: "Alle Gebäude, die mit den anderen Credos in Verbindung stehen, werden durch §YTempel§! ersetzt\nDiese Fraktion wird als einzige §Yspiritualistische Fraktion§! übrig bleiben.\nFraktionen, die §Ykeine spiritualistische§! Ethik haben, können weiterhin entstehen."
 machine_age.1020.name: "Die falschen Glaubensrichtungen"
 machine_age.1020.desc.pickedacreed: "Nachdem [GetCyberCreed::<DE_ART_DEF_S_N>] §Y[GetCyberCreed&NOM]§! erkoren wurde, protestierten die anderen Credos. Viele sind der Ansicht, dass das Konklave sich gegen den \"wahren\" Glauben gewandt hat.\n\n$machine_age.1020.both$"
 machine_age.1020.desc.nocreed: "Die Credos protestieren und behaupten, das Konklave lehne den Glauben ab.\n\n$machine_age.1020.both$"
 machine_age.1020.both: "Bisher waren die Proteste erhitzt, aber friedlich. Die Zeit wird weisen, ob diese Funken in Flammen umschlagen.\n\nWas auch kommen mag: Wir müssen über das Schicksal der anderen Credos entscheiden. Manche fordern eine direkte Exkommunikation und nannten ihre Dogmen Ketzerei und die Unruhen, die sie verursachten, einen deutlichen Beweis ihrer Blasphemie. Andere finden, Gnade sei die Lösung, und baten uns, den fehlgeleiteten Mitgliedern unseres Glaubens gegenüber Toleranz zu zeigen."
 machine_age.1020.a: "Es kann nur einen Glauben geben."
 machine_age.1020.a.tooltip: "Die Technophanten werden die anderen Credos unterdrücken, was zu Unruhen führen könnte."
 machine_age.1020.b: "Unser Glaube hat Platz für jeden."
 machine_age.1020.b.tooltip: "Es wird zwar ein offizielles Dogma geben, aber die Technophanten werden die Praktiken anderer Credos dulden."
 machine_age.1030.name: "Unruhe unter den Gläubigen"
 machine_age.1030.desc: "Überall auf unseren Planeten protestieren Minderheiten, und viele lehnen ab, was sie als Abweichung von der heiligen Verschmelzung betrachten. Die Technophanten glauben, diese Unruhen seien nur vorübergehend, da der Großteil unseres Volks das vereinte Dogma unterstützt, und es sei daher nur eine Frage der Zeit, bis auch die fanatischeren Demonstranten die göttliche Wahrheit akzeptieren."
 machine_age.1030.a: "Es wird nur einen Glauben geben."
 machine_age.1030.a.tooltip: "Die Entscheidung, konkurrierende Credos zu unterdrücken, hat zu Unruhen geführt."
 machine_age.1040.name: "Freiwilliger Übertritt"
 machine_age.1040.desc: "Die Hingabe zum vereinten Dogma breitet sich im Volk aus, und die meisten Anhänger der verschiedenen Credos haben ihren alten Wegen entsagt.\n\nMit Ausnahme der wahren Fanatiker bereiten alle ihr[GetFleshTypeCyberCreed::<DE_END_PRO_S_A>] göttlich[GetFleshTypeCyberCreed::<DE_END_ADJ_NUL_S_A>] [Owner.Species.GetFleshTypeCyberCreed&AKK] auf die letzte Verwandlung vor."
 machine_age.1040.a: "Die Wahrheit unserer göttlichen Verschmelzung obsiegt."
 machine_age.1040.a.tooltip: "Wir haben den Glauben erfolgreich vereint."
 machine_age.1050.name: "Zufriedene Credos"
 machine_age.1050.desc: "Den verschiedenen Credos Ausdrucksfreiheit zu gewähren, war eine sehr harmonische Entscheidung: Es gab nur kleinere Proteste, an denen allein die fanatischsten Anhänger der Credos teilnahmen.\n\nDa der Großteil der Gläubigen unserem offiziellen Dogma folgt, können wir uns nun auf die göttliche Verschmelzung konzentrieren."
 machine_age.1050.a: "Wir sind ein ungeteilter Glaube."
 machine_age.1050.a.tooltip: "Durch die Toleranz, die man den abweichenden Credos gewährte, konnten Unruhen vermieden werden."
 machine_age.1060.name: "Unvernünftiger Kompromiss"
 machine_age.1060.desc: "Dass wir den Forderungen von Hardlinern nachgegeben haben, beunruhigt den Großteil der gemäßigten Gläubigen. Sie behaupten, jedes Credo habe eine lange Geschichte von Gewalt gegen Andersgläubige, und sie sind der Ansicht, das Dulden extremer Glaubensrichtungen sei ein Fehler.\n\nDer Großteil ruft nach einer offiziellen Reformation der Credos, die ihnen im Wesentlichen jedwede Unabhängigkeit nehmen würde, die sie ansonsten hätten."
 machine_age.1060.a: "Die Gläubigen müssen tolerant sein."
 machine_age.1060.a.tooltip: "Die den Credos gewährte Toleranz hat die moderateren Fraktionen unseres Glaubens vor den Kopf gestoßen, was zu Unruhen führte."
 machine_age.1060.b: "Fangt an, die Credos zu reformieren."
 machine_age.1060.b.tooltip: "Das Glaube wird die abweichenden Credos absorbieren und ihre kleinlichen doktrinellen Dispute ausmerzen."
 machine_age.1070.name: "Der Zehnt der Zeit"
 machine_age.1070.desc: "Während die große Verschmelzung näher rückt, schauen wir zurück auf eine langwährende Tradition des Glaubens: den Zehnten der Zeit.\n\nSeit zahllosen Generationen widmet jedes gläubige Mitglied der Gesellschaft einen Teil seiner Zeit und Energie der Kirche. Wie die göttliche Verschmelzung dient dieser Dienst der Stärkung der Glaubensgemeinschaft.\n\nWie sollen die Gläubigen die göttliche Augmentierung am besten unterstützen?"
 machine_age.1070.intro: "Jedes Jahr widmen die Gläubigen unserer Gesellschaft einen Teil ihrer Zeit"
