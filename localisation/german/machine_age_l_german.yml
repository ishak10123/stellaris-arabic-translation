 situation_cybernetic_creed_cyberization_monthly_change_tooltip: "$situation_monthly_change_tooltip_approaches_dependent$"
 situation_cybernetic_creed_cyberization_desc: "Unsere Gesellschaft sehnt sich seit Langem nach der perfekten Vereinigung von [Owner.Species.GetFleshTypeCyberCreed&DAT] und Maschine, und die Zeit für ihre letzte Reise ist nun gekommen.\n$machine_age.1090.pray$\n\n§YBewohner, die im nächsten Monat heilige Implantate erhalten§!: §G[From.GetCyberCreedPopsPerMonth]§!"
 situation_cybernetic_creed_cyberization_complete: "Die Gläubigen werden ihre Reise zur perfekten Verschmelzung von [Owner.Species.GetFleshTypeCyberCreed&DAT] und Maschine vollenden."
 stage_cybernetic_creed_the_conclave_effects: "Das Konklave berät, wie der korrekte Weg zum Erreichen der göttlichen Verschmelzung aussieht."
 stage_cybernetic_creed_cyberization_effects: "Wir augmentieren uns langsam zur heiligen Verschmelzung von Maschine und [Owner.Species.GetFleshTypeCyberCreed&DAT] voran, die wir seit Generationen ersehnen."
 situation_cybernetic_creed_cyberization_no_funding: "Kirche finanziert"
 situation_cybernetic_creed_cyberization_no_funding_desc: "Das Konklave setzt das Werk der Augmentierung ohne zusätzliche Unterstützung fort."
 cybernetic_creed_cyberization_no_funding: "$situation_speed_tt$: §YUnverändert§!"
 cybernetic_creed_cyberization_no_funding_approach: "Das Konklave arbeitet geschäftig mit den zur Verfügung stehenden Mitteln."
 situation_cybernetic_creed_cyberization_funding: "Zusätzliche Mittel"
 situation_cybernetic_creed_cyberization_funding_desc: "Werden dem Konklave zusätzliche Mittel gewährt, beschleunigt dies die Augmentierung der Gläubigen."
