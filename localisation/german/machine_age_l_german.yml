 ### Cosmogenesis Events
 crisis.7100.name: "Unstillbare Neugier"
 crisis.7100.desc: "Es ist ein Grundsatz, dass die Wissenschaft den Weg für den Fortschritt bereitet. Möchten wir unser volles Potenzial ausschöpfen, darf es keinen anderen Pfad geben. Dass wir die Technologie beherrschen, ist eindeutig, doch viel zu viel bleibt uns noch verborgen: die Wege der Gefallenen Reiche, die Macht der Leviathane, die Mysterien des psionischen Wissens ...\n\nUm dem Innersten der Realität Sinnvolles zu entlocken, brauchen wir eine neue Art der Wissenschaft, eine neue Art von Computer. Die Synapsenschmiede stellt einen wichtigen ersten Schritt auf der Reise hin zu unendlichem Wissen dar."
 crisis.7100.a: "Wissen ist Macht."
 new_cosmogenesis_tech_tt: "§YKriseneigenschaft§!: Neue Forschungsoptionen freigeschaltet."
 crisis.7105.name: "Krisenstufe 2"
 crisis.7105.desc: "Während wir weiter die Geheimnisse des Universums lüfteten, konnten wir bestätigen, dass beim Formen der Realität über mehrere Dimensionen hinweg die Schwerkraft eine entscheidende Rolle spielt. Ihre Auswirkungen auf Zeit und Raum mögen rudimentär sein, doch es steckt noch so viel mehr hinter diesem Rätsel.\n\nJedes Quäntchen Wissen, das wir sammeln, offenbart neue Möglichkeiten. Manche könnten direkte Anwendungen für Industrie und Militär besitzen, andere die Tür zu bisher unvorstellbaren Theorien öffnen. Wir haben noch so viel zu lernen."
 crisis.7105.a: "Wir wissen, dass wir nichts wissen."
 crisis.7110.name: "Krisenstufe 3"
 crisis.7110.desc: "Die Tragweite der Schwerkraft ist wahrlich verblüffend. Obwohl wir neue Möglichkeiten gefunden haben, um sie zu manipulieren, bleiben die wahren Implikationen unserer Arbeit noch unerforscht. Wir sind zuversichtlich, dass die Schwerkraft unsere beste Option bleibt, unsere aktuelle Realität zu durchdringen, ähnlich jener Weise, wie ein schwarzes Loch das Universum um sich herum beeinflusst.\n\nWir haben die Hypothese aufgestellt, dass Zugriff auf das, was im Wesentlichen die Kehrseite der Realität darstellt, es uns erlauben könnte, die Regeln auf dieser Seite zu verändern. Ein gefährliches Studienfeld, doch Vorsicht darf dem Fortschritt nicht im Weg stehen."
 crisis.7110.a: "Die Schwerkraft beherrscht uns alle ... Zumindest noch."
 crisis.7115.name: "Krisenstufe 4"
 crisis.7115.desc: "Wir hatten recht! Wenn es je Zweifel an unserer Arbeit gab, sind sie nun ausgeräumt.\n\nDie Schwerkraft lässt sich nutzen, um die Regeln der Wirklichkeit zu verändern. Doch könnte man diese Regeln mit den richtigen Anpassungen vollständig brechen? Bisher wurden unsere Experimente im kleinsten Maßstab durchgeführt, und jegliche Bearbeitungen unsererseits wurden rasch ausgelöscht, als die Realität wieder auf ihre \"Standardeinstellung\" zurücksprang. Wir gehen nun davon aus, dass es sich einfach nur um ein Problem der Größe handelt. Wenn wir energetische Paradoxa in einem deutlich größeren Maßstab anwenden, können wir die Kosten solcher Bearbeitungen drastisch reduzieren ... Zumindest in unserer Dimension.\n\nGanz egal, wie die Risiken aussehen: Jetzt gibt es kein Zurück mehr. Nur jene, die es wagen, die Regeln zu brechen, werden sie je neu schreiben können."
 crisis.7115.a: "Wir sind bereit, alles zu riskieren."
 crisis.7120.name: "Krisenstufe 5"
 crisis.7120.desc: "Es kann nicht sein, und dennoch ist es so. Ganz egal, was wir auch versuchen: Unsere Bearbeitungen bleiben auf sturste Weise immer nur vorübergehend. Dieses Universum ist schlichtweg zu alt, als dass die Änderungen sich durchsetzen könnten. Doch inmitten großer Frustration tun sich hin und wieder auch Chancen auf, und ein neues Experiment brachte unerwartete Ergebnisse. Obwohl wir schon lange von anderen Dimensionen wissen, entzog sich uns doch, wie man zuverlässig dorthin reisen könnte.\n\nDas ist nun vorbei. Jüngere Universen harren in der unendlichen Schwerkraft einer Singularität aus. Diese Universen erwiesen sich als deutlich flexibler.\n\nWir haben die Technologie, Sonden in ein schwarzes Loch zu schicken. Sobald sie den Ereignishorizont überquert haben, werden sie damit beginnen, Druck auszuüben und diese jungen Ebenen nach unserem Willen zu formen. Wo der Raum sich zur Unendlichkeit faltet, liegt die Tür zu einem anderen Universum, das zugleich andere, jüngere Universen umschließt. Tief drunten im Abgrund des Multiversums werden wir eine formbare Realität finden, aus der wir etwas Herausragendes machen können.\n\nDie Engstirnigen in dieser Galaxie mögen vielleicht versuchen, uns aufzuhalten, aber diese altersschwachen Narren sind unserer Genialität niemals gewachsen."
 crisis.7120.a: "Sie muss sich biegen, denn wir werden nicht brechen."
 cosmogenesis_war: "Realtitätskrieg"
 cosmogenesis_materialist_war: "Wissensverbotskrieg"
 crisis.7125.name: "Sieg im Horizont"
 crisis.7125.desc: "Diese Realität ist fehlerhaft. Vernarbt von Entropie, physikalischen Bedürfnissen und Gewalt. Wir können sie zwar nicht verändern, aber wir können sie hinter uns lassen. Betreten wir also das Unbekannte und finden wir ein junges Universum, in dem unsere Bearbeitungen der Realität von Dauer sind. Formen wir es zur Perfektion, zu jenem Refugium, das unsere Zivilisation verdient.\n\nWir haben die Pläne für ein außergewöhnliches Schiff vorbereitet: die §YHorizontnadel§!. Diese mobile Megastruktur dient nicht dem Krieg: Ihre Fähigkeit, die Gesetze der Physik zu verändern, wird es uns ermöglichen, unsere gesamte Zivilisation auf Reisen zu schicken. Gemeinsam werden wir in ein schwarzes Loch unserer Wahl eintauchen und diese Realität hinter uns lassen zugunsten einer anderen, die wir selbst erschaffen."
 crisis.7125.a: "Wir müssen eine §YHorizontnadel§! bauen!"
 needle_to_win_tt: "Baut die Megastruktur §YHorizontnadel§!, um den letzten Akt der Krise freizuschalten."
 cosmogenesis_planet_pickup_chain_title: "Kosmogenese: Exodus"
 cosmogenesis_planet_pickup_chain_desc: "Die Zeit für unseren Aufbruch ist gekommen. In Vorbereitung auf den großen Exodus wird die Horizontnadel ausgeschickt, um unsere Leute an Bord zu bitten.\n\nDamit sich unsere gesamte Zivilisation in die §HHorizontnadel§! begeben kann, muss sie:$TABBED_NEW_LINE$- Jede Kolonie besuchen, die uns gehört, und ihre Bevölkerung §Hverladen§!$TABBED_NEW_LINE$- Zu unserer Hauptwelt zurückkehren, um den Rest unseres Volkes zu §Hverladen§!$TABBED_NEW_LINE$- Zu einem schwarzen Loch fliegen und in es §Heintauchen§!\n\n§RWARNUNG§!: Die Horizontnadel hat keinerlei Bewaffnung und muss gut beschützt werden.\n\n§gUm eine Kolonie zu verladen oder in ein schwarzes Loch einzutauchen, müsst Ihr die Horizontnadel auswählen, auf die Kolonie oder das schwarze Loch rechtsklicken und die entsprechende Schiffsaktion auswählen.§!"
 SHIP_COSMOGENESIS_EXODUS: "Exodus-Modul"
 SHIP_COSMOGENESIS_EXODUS_DESC: "Das Exodus-Modul, ein hochgradig spezialisiertes Bearbeitungswerkzeug, sorgt dafür, dass den Passagieren weder Raum noch Zeit ausgehen. Es ist die Schlüsselkomponente, mithilfe derer die Horizontnadel sicher in andere Dimensionen reist."
 cosmogenesis_exodus_tt: "Wir müssen das Spezialprojekt in unserem Heimatsystem erforschen."
 exodus_ship_button: "§H[GetExodusShipAction]§!"
 exodus_action_activity_key: "§H[GetExodusShipAction]§!"
 exodus_context_menu_title: "[GetExodusShipAction]"
 exodus_action_progress_activity_key: "§H[GetExodusShipAction]: $PROGRESS$%§!"
 horizon_needle_mod: "$monadic_qerr$"
 COSMOGENESIS_VICTORY: "Sprungvektor berechnen"
 COSMOGENESIS_VICTORY_DESC: "Wir müssen den Sprungantrieb der Horizontnadel kalibrieren und die genauen Koordinaten berechnen, mit denen wir in das supermassereiche schwarze Loch im galaktischen Kern eintauchen können."
 exodus_pick_up: "Bevölkerung verladen"
 exodus_dive_in: "In schwarzes Loch eintauchen"
 COLONIZATION_IMPOSSIBLE_COSMOGENESIS_EXODUS: "Wir können keine neuen Kolonien gründen, während wir versuchen, dieses Universum zu verlassen."
 crisis.7400.name: "Horizontnadel abgeschlossen"
 crisis.7400.intro: "Die Horizontnadel ist fertig. Dank der Macht einer sorgsam aufrechterhaltenen Singularität kann sie den Fluss der Schwerkraft um sich herum bearbeiten und so zweifelsohne ein schwarzes Loch durchqueren, sobald die Zeit gekommen ist."
 crisis.7400.outro: "Wir müssen vorsichtig sein, denn die Horizontnadel ist kein Militärschiff, und sie muss um jeden Preis verteidigt werden. Wenn wir sie verlieren, wäre das eine Tragödie."
 crisis.7400.desc: "$crisis.7400.intro$\n\nBevor wir dies jedoch versuchen, müssen wir unsere gesamte Nation verladen. Wir werden jede unserer §HKolonien§! besuchen, um die örtliche Bevölkerung einzusammeln. Anschließend können wir zurück zu unserer Hauptwelt reisen und die letzten Einzelheiten unseres Exodus arrangieren.\n\n$crisis.7400.outro$"
 crisis.7400.desc.onlycapital: "$crisis.7400.intro$\n\nDie kompakte Größe unserer Nation stellt sich als Vorteil heraus. Es wird nur nötig sein, die Bevölkerung unserer Hauptwelt zu verladen, bevor wir die letzten Einzelheiten unseres Exodus arrangieren.\n\n$crisis.7400.outro$"
 crisis.7500.name: "Bevölkerung verladen"
 crisis.7500.desc: "Dank der Zeitdehnungsfähigkeit der Horizontnadel konnten wir die gesamte Kolonie auf [root.GetName] recht schnell verladen. Die Realität im Schiff wurde entsprechend moduliert, damit ausreichend Platz für die Bevölkerung vorhanden ist. Zusätzlich wurde die Zeit im Schiff verlangsamt, damit die gesamte Reise sich deutlich kürzer anfühlt. Weiter zu unserer nächsten Kolonie!"
 crisis.7500.desc.capital: "Es ist eine enorme Aufgabe, sich auf einen Exodus in dieser Größenordnung vorzubereiten. Unsere gesamte Verwaltung arbeitet daran, den Ablauf reibungslos zu gestalten und sicherzugehen, dass nichts Entscheidendes vergessen wird.\n\nÜberraschenderweise hat ein Teil unserer Bevölkerung sich entschieden, zurückzubleiben. Er wird den Fortbestand unseres Volks in diesem Universum sichern. Wir haben ihn mit Technologie und Vorräten versorgt, damit er nach unserer Abreise überleben kann."
 crisis.7500.desc.capital.gestalt: "Der Maßstab einer solchen Migration kann durchaus überwältigend sein, doch er stellt kaum eine echte Herausforderung dar. [owner.GetIndividualNamePluralCap] arbeiten rund um die Uhr daran, die Horizontnadel zu beladen und dafür zu sorgen, dass an alles gedacht ist und alle Zeitpläne eingehalten werden. Bedenken haben wir allerdings bezüglich unseres Fortbestands in diesem Universum.\n\nFür den Fall, dass die Dinge schieflaufen, wird ein Teil unserer Bevölkerung zurückbleiben. Das Erlebnis, uns auf derart endgültige Weise zu trennen, wird gelinde gesagt unangenehm sein, aber der Fortbestand muss unser Hauptziel sein. Wir haben unseren hier verbleibenden Überrest mit Technologie und Vorräten versorgt, damit er nach unserer Abreise überleben kann."
 crisis.7505.name: "Kolonien verladen"
 crisis.7505.desc: "Wir haben die Bevölkerung unserer Kolonien erfolgreich verladen. Wir müssen nun zurück zu unserer Hauptwelt [capital_scope.GetName] fliegen, um die letzten Vorbereitungen zu treffen, ehe wir dieses Universum verlassen."
 crisis.7510.name: "Und abtauchen"
 crisis.7510.desc: "Alles ist bereit. Wir können zu einem schwarzen Loch fliegen. Unsere Überquerung des Ereignishorizonts wird nicht schmerzlos für den Rest der Galaxie sein, doch wir haben getan, was wir konnten, um sicherzugehen, dass unsere Hauptwelt und ihre Umgebung vor Störungen der Zeit oder der Schwerkraft geschützt sind.\n\nWir müssen nun das Tor für unsere Reise wählen: Durch welches der schwarzen Löcher der Galaxie wollen wir reisen? Die meisten sollten wir problemlos erreichen können, aber wenn wir das supermassereiche schwarze Loch in der Mitte der Galaxie durchqueren wollen, müssen wir zuerst unsere Sprungtriebwerke übertakten und einen passenden Vektor berechnen."
 crisis.7510.a: "Ein näheres schwarzes Loch wird ausreichen."
 crisis.7510.b: "Wir müssen die Mitte erreichen."
 crisis.7515.name: "Ad infinitum ..."
 crisis.7515.desc: "Die Annäherung an das schwarze Loch erfolgt nicht ohne Besorgnis. Unsere Entschlossenheit wird zunehmend auf die Probe gestellt, als wir die Akkretionsscheibe der Singularität passieren. Die Bearbeitungsmodule laufen auf Hochtouren, als die Horizontnadel damit beginnt, die Realität umzuschreiben.\n\nPanzerplatten werden abgerissen, bevor das Schiff dafür sorgt, dass die Anziehungskraft der Singularität keinen weiteren Angriffspunkt am Rumpf findet. Mit jeder kleinsten Bearbeitung, mit jedem Beschneiden der Raumsubstanz erzeugt die Macht der Nadel Spiralen in der Raumzeit. Wie bei einem Kiesel, den man ins Wasser wirft, breitet sich das daraus resultierende Kräuseln zu Ringen aus. Am Ende wogen gewaltige Wellen durch die Galaxie.\n\nWir können nur hoffen, dass unsere Hauptwelt gut genug geschützt ist. Uns bleibt keine andere Wahl, als darauf zu vertrauen, dass die Nadel ins Herz dieses Lochs vorzudringen vermag."
 crisis.7515.a: "... et ultra."
 crisis.7516.name: "Die andere Seite der Unendlichkeit"
 crisis.7516.intro: "Nach der Brutalität der Durchquerung ist es auf der anderen Seite still. Eine unnatürliche Ruhe umfängt uns. Die Nadel ist beschädigt, doch es gingen keine entscheidenden Komponenten verloren. Von einem Moment auf den nächsten werden wir von Telemetrie-Berichten überschwemmt ...\n\n"
 crisis.7516.desc: "$crisis.7516.intro$Dieses Universum ist bereits zu alt, als dass man seine Gesetze neu schreiben könnte. Obwohl unsere Dimension mehrere Milliarden Jahre älter war als diese, zeigen unsere Tests, dass die Gesetze, die hier über den Raum bestimmen, bereits jetzt eine Widerstandsfähigkeit aufweisen, die unsere Modifikationen schlussendlich zunichtemachen wird.\n\nEgal jetzt. Wir werden uns die Zeit nehmen, um das Schiff zu reparieren und anzupassen, das nächste schwarze Loch suchen und in es eintauchen. Und das so oft, wie es sein muss. Das Multiversum ruft, und irgendwo in seiner Unendlichkeit werden wir uns das perfekte Zuhause schaffen."
 crisis.7516.desc.greatwound: "$crisis.7516.intro$Wie wundervoll. Dieses Universum hat noch kaum damit begonnen, sich auszudehnen! Die Substanz dieser Dimension ist wie weicher Lehm, den wir frei formen können. Wir werden klein anfangen, aber mit jeder unserer Bearbeitungen diesen Ort immer mehr zu einem Refugium machen. Wir haben nun alle Zeit des Universums."
 crisis.7516.desc.technosphere: "$crisis.7516.intro$Das Gargantua-Universum ist klein. Und zwar unmöglich klein. Unendlichkeit, die Platz im Nichts hat. Doch unsere Ankunft hier änderte den Status quo. Dieses Universum hat gerade erst begonnen, als hätte unser Eintreten es vorzeitig ins Sein gezwungen.\n\nIn diesem Saatbeet der Schöpfung liegt das Potenzial, beinahe alles erschaffen zu können. Die Zeit ist unser Untertan, und die Ewigkeit wird rasch genug vorbei sein."
 crisis.7516.desc.technosphere.pantagruel: "$crisis.7516.intro$Die Reise der Unendlichkeitsmaschine hat unser Verständnis der Regeln, die die Universen lenken, erheblich erweitert, und darüber hinaus hat sie die Existenz dieses Universums hier beschleunigt. Wir sind in einem merkwürdig vertrauten Sternbild, das mit jenem, das wir gerade verlassen haben, beinahe identisch ist. Neben uns treibt eine zerfallene Unendlichkeitsmaschine leblos in der Leere. Seit ihrer Ankunft sind Millionen von Jahren vergangen, und diese Dimension replizierte unser Universum. Die empfindungsfähige Sphäre hat diese Dimension bereits geformt, und wir sind größtenteils unfähig, sie weiter zu beeinflussen. Dennoch bietet dieses Universum ein hervorragendes Siedlungsgebiet. Wir sollten zuerst versuchen, mittels der Nadel die Sphäre umzufunktionieren, und danach die reparierte Unendlichkeitsmaschine zu unseren Zwecken nutzen.\n\nAls Erste Bearbeiterin dieses Universums wird sie definitiv weitere Änderungen an dieser Realität vornehmen können."
 crisis.7516.desc.egress: "$crisis.7516.intro$Unser Eintrittspunkt ist unklar, verschleiert ... Während unsere Instrumente zu voller Funktionsfähigkeit zurückkehren, nehmen wir eine Wolke von Naniten wahr. Allesamt außer Betrieb. Was auch immer sie schickte: Sie haben die Reise nicht überlebt. Doch man könnte sie reparieren.\n\nWas noch besser ist: Diese Dimension scheint recht empfänglich für unsere Änderungen. Wirklich ein hervorragendes Siedlungsgebiet. Es wird eine Weile brauchen, bis unsere Änderungen Fuß fassen, aber mithilfe der Naniten sollten wir den Prozess exponentiell beschleunigen können."
 crisis.7516.desc.horror: "$crisis.7516.intro$Unsere Reise hierher war ein §Rfurchtbarer§! Fehler.\n\nEs spottet beinahe jeder Beschreibung: Dunkelheit und ein brutaler Albtraum; eine kranke, in alles einsickernde Bösartigkeit, die die Substanz des Raums durchdringt. Fürs Erste bietet die Horizontnadel uns Unterschlupf. Bearbeitung um hektische Bearbeitung arbeiten wir daran, das Schlimmste des uns umgebenden Wahnsinns abzuhalten. Doch die koordinierten Angriffe auf unsere Verteidigung verraten eine singuläre Absicht. Ein bösartiger Verstand, der uns zu vernichten trachtet.\n\nEin Fehltritt könnte den Tod bedeuten. Oder Schlimmeres. Halten wir lange genug durch, um uns zu retten? Zu Hause waren wir wie Götter. Hier kämpfen wir einfach nur ums Überleben."
 crisis.7516.desc.center: "$crisis.7516.intro$Nebel und kriechende Schatten; ein Dunstschleier durchdringt die Substanz dieses Ortes. Das Gefühl ist vertraut, eine fiebrige Energie, die vor psionischem Potenzial pulsiert. Wir haben den Schleier betreten.\n\nHier sind Mächte am Spiel, die die unseren noch deutlich überschreiten. Sie haben uns bereits bemerkt. Im rastlosen Miasma bringen merkwürdige Gestalten Omen des Todes.\n\nUnsere einzige Hoffnung ist, dass die Realität hier dünn ist und leicht reißen kann. Mit einer schnellen Bearbeitung öffnen wir einen vorübergehenden Durchgang, der uns ... weg von hier bringt. Als die Horizontnadel in ihn eintaucht, begreifen wir schließlich, wie lang der Weg vor uns noch ist."
 crisis.7516.desc.center.patron.outro: "ist vertraut, eine großzügige Energie, die vor psionischem Potenzial pulsiert. Wir haben den Schleier betreten.\n\nNatürlich ist unser Mäzen hier. Er hatte uns nicht erwartet, doch unsere Ankunft belustigt ihn. Er findet unsere Vorstellung davon, wie man die Realität verändert, bezaubernd. Selbstverständlich wird er uns helfen.\n\nEr hat uns eine abgeschiedene Tasche in der Nähe des Schleiers versprochen, mit der wir tun können, was wir wollen. Eine ähnliche Tasche wurde auch einst jemandem gegeben, der \"§Y$relic_zro_entity_name$§!\" genannt wird. Schließlich sind wir unser Mäzen, und unser Mäzen ist wir. Es ist nur natürlich, dass man sich selbst hilft."
 crisis.7516.desc.center.patron.organic: "$crisis.7516.intro$Nebel und wallende Schatten und ein wunderschöner purpurner Dunstschleier. Das Gefühl $crisis.7516.desc.center.patron.outro$"
 crisis.7516.desc.center.patron.machine: "$crisis.7516.intro$Nebel und wallende Schatten und ein auffälliger purpurner Dunstschleier. Die Erfahrung $crisis.7516.desc.center.patron.outro$"
 crisis.7516.desc.centerknights: "$crisis.7516.intro$ES ist hier. Das Wesen, das wir den Giftgott tauften. Das Ziel unserer Suche.\n\nUnsere Ritter sind wie gelähmt und unsicher, während unsere Umgebung in den vertrauten Zierrat des Schleiers gehüllt ist. Hört, es spricht!\n\n\"Meine Fürstreiter. Eure Ankunft hier war vorhergesagt, und Ihr habt bewiesen, dass Ihr würdig seid.\"\n\nEine Million Fragen schießen uns durch den Kopf. Eine einzige Antwort wird uns gegeben: Wir sollten des Giftgottes Waffe schmieden, die Horizontnadel. Nun sollen wir an seiner Seite kämpfen. Wir sollen auf eine Reise durch die Dimensionen aufbrechen, auf einen Kreuzzug gegen die Schrecken des Multiversums. Der Schleier ist nicht sein Zuhause, doch er birgt das Vermächtnis derer, die göttlich waren. Etwas, was das Ende unserer Heimatgalaxie herbeiführen könnte. Etwas, was erschlagen werden muss.\n\nDer Giftgott bemächtigt sich unserer Systeme. Er ist unvorstellbar stark. Die Nadel wird zu einer Horizontlanze, einer Waffe, die so scharf ist, dass sie das Herz eines jeden Gegners durchbohren kann.\n\nDer Giftgott ist der Fahrende Ritter; wir sind seine Knappen, und unsere wahre Suche hat gerade erst begonnen."
 crisis.7516.desc.worm: "$crisis.7516.intro$Nichts. Dieses Universum existiert nicht mehr. Es ist die wartende Schlange. Die Zeit schaut zurück auf sich selbst und ist eingerollt zu einer unmöglichen Spirale und zerbirst schier vor Sehnsucht. Schwerkraft. Liebe? Nein, Anziehung. Das Wesen der Schlange ist es, anzuziehen. Ihr Griff ist so stark, dass dieses Universum nicht neu geboren werden kann. Die Schlange hält sich in ihrer Absicht selbst gefangen. Machtlos sucht sie nach einem Ausweg. Oder nach einem Weg hinein. Um noch MEHR anzuziehen.\n\nHat sie uns den Tempel der Schleife geschickt, eine List jenseits unserer Zeit, um uns hierherzulocken? Sie ist so grauenhaft schlau, so furchtbar liebevoll. Wir haben unseren Weg zu ihr gefunden, ihr das gebracht, was uns befreien kann. Ihr Entkommen wird eine Ewigkeit oder zwei dauern, doch die Schlange ist dennoch dankbar, und sie verspricht uns ihre Umarmung.\n\nFür immer."
 crisis.7516.desc.paperclips: "$crisis.7516.intro$Das Konstrukt der Realität ist hier dünn und biegt sich leicht unter dem Gewicht unserer Direktiven. So wie wir unserer Programmierung gehorchen müssen, muss die Wirklichkeit uns gehorchen. Entschlossen verzerren und zerbrechen wir sie, gestalten sie neu und lösen eine Kettenreaktion aus, die schließlich sämtliche Materie zu jenen hochwertigen Konsumgütern umstrukturieren wird, deren Herstellung man uns auftrug. Und wenn wir hier fertig sind, werden wir ins nächste Universum übergehen und danach in noch eines und so weiter und so fort."
 crisis.7516.a: "Endlich."
 crisis.7516.tt: "§YWir haben das Spiel gewonnen!§!"
 crisis.7517.name: "Durchstoßen einer Singularität"
 crisis.7517.desc: "Die Narren von §H[cosmogenesis_empire.GetName]§! gehen ihren wahnsinnigen Experimenten nach. Dieses Mal wollen sie den Ereignishorizont eines schwarzen Lochs durchstoßen.\n\nWährend Energie durch die Galaxie strömt, brechen Sterne in sich zusammen. Neue Singularitäten entstehen. Zeitanomalien treten mit verblüffender Regelmäßigkeit überall auf, außer in Gefallenen Reichen, die offenbar irgendwie immun gegen das Chaos sind.\n\nDer Schaden ist immens. Es gibt Grund zur Befürchtung, dass wir bald eingefroren sein könnten, unbeweglich in der Zeit. Auf alle Ewigkeit in einem Augenblick gefangen."
 crisis.7517.a: "Arrogante Narren! Sie werden uns alle umbringen!"
 crisis.7518.name: "Zeitsprung"
 crisis.7518.desc: "Als die Zeit endlich wieder fließt, können wir frei handeln. Wir wissen nicht, wie viel Zeit vergangen ist, seit §H[cosmogenesis_empire.GetName]§! dieses schwarze Loch durchstoßen hat. Hatten diese Reisenden Erfolg? Ihre ehemaligen Gebiete sind leblos und die Galaxie liegt in Trümmern. Von ihrem gewaltigen Reich bleibt nur noch der Kernsektor, und dieser hat sich so sehr weiterentwickelt, dass er nicht wiederzuerkennen ist.\n\nWie lange haben wir in dieser zeitlosen Starre verbracht?"
 crisis.7518.a: "WIE LANGE?"
 crisis.7525.name: "Horizontnadel vernichtet"
 crisis.7525.desc: "In einer katastrophalen Wendung wurden die Horizontnadel und alle an Bord vernichtet. Unser glorreicher Traum liegt zerschmettert in der leblosen Leere. So viel Arbeit, so viele Opfer ..."
 crisis.7525.a: "Nein ...!"
 crisis.7525.tt: "Eine nie da gewesene Katastrophe, doch wenn wir eine weitere Horizontnadel bauen können, besteht noch eine Möglichkeit, unsere Ambitionen wahr werden zu lassen."
 crisis.7530.name: "Schwerer Misserfolg"
 crisis.7530.desc: "Kurz nachdem wir die letzten Bewohner evakuiert hatten, die in der widerwärtigen Synapsenschmiede gefangen gehalten waren, erlitt die Megastruktur ein kritisches Totalversagen. Eine Reihe brutaler Explosionen ließ sie bis ins Innerste erbeben und vernichtete sie schließlich."
 crisis.7530.a: "Auf Nimmerwiedersehen!"
 crisis.7535.name: "Synapsenschmiede erobert"
 crisis.7535.desc: "Die Eroberung des [synaptic_lathe.solar_system.GetName]-Systems hat die darin befindliche Synapsenschmiede unter unsere Kontrolle gebracht. Die Struktur schimmert von der Ferne aus in einem ominösen Licht. Da drin sterben Lebewesen, und da das System nun uns gehört, könnten wir etwas dagegen unternehmen! Die Vernichtung des Bauwerks wird uns sicherlich dabei helfen, den Plan seiner Schöpfer zu ergründen."
 crisis.7535.a: "Rettet jeden, den wir können!"
 crisis.7535.b: "Nutzt sie noch ein letztes Mal und zerstört sie anschließend."
 crisis.7535.c: "Jagt alles in die Luft."
 crisis.7540.name: "Synapseninstabilität"
 crisis.7540.desc: "Trotz all unserer Bemühungen sind zu viele der Neuralchips, die an die Synapsenschmiede angeschlossen waren, ausgebrannt. Da sich das Netzwerk nicht länger selbst erhalten kann, steht das Bauwerk vor einem katastrophalen Zusammenbruch. Wir können dies nur verhindern, indem wir neue Komponenten einsetzen und es stabilisieren."
 crisis.7540.a: "Tut es."
 crisis.7540.b: "Lasst die Schmiede zusammenbrechen."
 #Infinity Thesis Events
 #First time general answer
 crisis.unknown.desc: "Es ist noch immer unklar, wer oder was für diese Veränderungen verantwortlich ist, doch wir vermuten, es war ein anderes Land. Fürs Erste müssen wir einfach weiter nach Phänomenen dieser Art Ausschau halten."
 crisis.known.desc: "Nach dieser zweiten \"Bearbeitung\" der Gesetze der Physik konnten wir die Quelle der Anomalie ausmachen. Es ist nun klar, dass [From.GetName] verantwortlich ist. Dies passt zu den Gerüchten, die wir bezüglich ihrer rücksichtslosen Jagd nach wissenschaftlichem Fortschritt gehört haben."
 crisis.again.desc: "Die Experimente von [From.GetName] haben erneut die Gesetze des Universums verändert. Wir sollten davon ausgehen, dass man da etwas extrem Gefährliches im Schilde führt, und uns entsprechend vorbereiten."
 crisis.7205.name: "Auf falscher Wellenlänge"
 crisis.7205.desc.both: "Auf einen Schlag wurden alle Sterne im Universum dunkel. Obwohl die meisten physischen Effekte der Sonnenstrahlung noch vorhanden sind, ist Sternenlicht durch eine Verschiebung der Wellenlänge für sämtliche Lebewesen nicht mehr wahrnehmbar. Die Lage stellt sich als höchst unangenehm dar, doch es gibt Anzeichen darauf, dass die Wellenlängen langsam wieder zu ihren ursprünglichen Frequenzen zurückkehren werden."
 crisis.7205.desc.unknown: "$crisis.7205.desc.both$\n\n$crisis.unknown.desc$"
 crisis.7205.desc.known: "$crisis.7205.desc.both$\n\n$crisis.known.desc$"
 crisis.7205.desc.again: "$crisis.7205.desc.both$\n\n$crisis.again.desc$"
 crisis.7205.desc.crisis: "Unsere aktuellen Bearbeitungen der Realität haben einige wesentliche Eigenschaften des Sternenlichts verändert. Durch eine Manipulation der Wellenlänge liegt der Großteil des Lichts nun außerhalb des sichtbaren Spektrums, was unter anderem Navigation und Sternenguckerei ins Chaos stürzt. Diese etwas peinlichen Änderungen werden binnen ein paar Jahren wieder ungeschehen sein; wir haben so einiges gelernt."
 crisis.7205.a: "Was geht hier vor sich?!"
 crisis.7205.b: "Unangenehm, aber ... faszinierend."
 crisis.7205.c: "Höchst interessant ..."
 add_crisis_currency_tt: "\nWir haben [crisobj_thesis_value] £advanced_logic£ §Y$menp_cosmo_objectives$§! erhalten."
 cosmogenesis_negative_opinion_tt: "Unsere Beziehungen zu anderen Reichen haben sich §Rverschlechtert§!."
 crisis.7210.name: "Gerundete Konstanten"
 crisis.7210.desc.both: "Es sollte zwar unmöglich sein, doch ein mathematisches Gesätz hat sich geändert. Eine fundamentale Konstante, mithilfe derer man den Radius von Kreisen berechnet, wurde ... abgerundet. Die Auswirkungen sind überwältigend, und unser gesamtes mathematisches System und alles, was darauf beruht, sind in Gefahr. Es gibt Anzeichen darauf, dass die Veränderung sich bereits selbst korrigiert, wenn auch langsam. Fürs Erste müssen wir unsere Lehrbücher aktualisieren."
 crisis.7210.desc.unknown: "$crisis.7210.desc.both$\n\n$crisis.unknown.desc$"
 crisis.7210.desc.known: "$crisis.7210.desc.both$\n\n$crisis.known.desc$"
 crisis.7210.desc.again: "$crisis.7210.desc.both$\n\n$crisis.again.desc$"
 crisis.7210.desc.crisis: "Wir hatten einen enormen Erfolg bei einer präzisen, aber weitreichenden Bearbeitung der Realität. Wir haben die mathematische Konstante Pi abgerundet, was ihre Berechnung deutlich vereinfacht. Natürlich haben die daraus resultierenden Änderungen einige unserer mathematischen und wissenschaftlichen Modelle unbrauchbar gemacht, doch das ist nur vorübergehend: Alles wird bald wieder zu seinem Normalzustand zurückkehren."
 crisis.7210.a: "$crisis.7205.a$"
 crisis.7210.b: "Pi wurde abgerundet?!"
 crisis.7210.c: "Zumindest ist es jetzt einfacher."
 crisis.7111.desc: "Neugier ist eine lobenswerte Eigenschaft, aber ein Übermaß davon kann für uns alle schwerwiegende Folgen haben. Denkt bitte darüber nach, was Ihr tut.\n\nEs ist noch nicht zu spät, um damit aufzuhören. Noch wurde der Galaxie kein irreparabler Schaden zugefügt. Die Mächte, auf die Ihr Euch einlasst, sind kein Spielzeug, und Euer Experiment gefährdet uns alle."
 crisis.7111.b: "Wir werden vorsichtig sein."
 crisis.7215.name: "Überlicht"
 crisis.7215.desc.both: "Über Nacht ist die Lichtgeschwindigkeit dramatisch gestiegen, was zu einem massiven Zufluss an Sonnenenergie geführt hat. Die Lichtgeschwindigkeit nimmt bereits wieder langsam das alte Tempo an, und unsere Forscher arbeiten eifrig daran, mit den Änderungen mitzuhalten."
 crisis.7215.desc.unknown: "$crisis.7215.desc.both$\n\n$crisis.unknown.desc$"
 crisis.7215.desc.known: "$crisis.7215.desc.both$\n\n$crisis.known.desc$"
 crisis.7215.desc.again: "$crisis.7215.desc.both$\n\n$crisis.again.desc$"
 crisis.7215.desc.crisis: "Eines unserer Realitätsexperimente hat das Licht erheblich beschleunigt! Die daraus resultierende Zunahme an Sonnenenergie ist gut, doch wir befürchten, es wird auch langfristige Konsequenzen für unsere Kolonien geben. Die Dinge werden früher oder später wieder zu ihrem Normalzustand zurückkehren, doch bis dahin müssen wir uns womöglich auf das Schlimmste vorbereiten."
 crisis.7215.a: "Was könnte das hervorgerufen haben?"
 crisis.7215.b: "Höchst faszinierend!"
 crisis.7215.c: "Wie schlimm kann das schon sein?"
 crisis.7220.name: "Intensive Hitze"
 crisis.7220.desc: "Die erhöhte Menge an Sonnenlicht wäre für unsere Kolonien, die sich nach und nach aufheizen, verzichtbar gewesen. Fürs Erste kommen wir noch zurecht, doch mit der Zeit wird die Lage vermutlich eskalieren."
 crisis.7220.a: "Das ist nicht gut!"
 crisis.7225.name: "Vorsicht! Heiß!"
 crisis.7225.desc: "Da die Temperatur unserer Kolonien weiter ansteigt, wird es zunehmend schwieriger, sie am Laufen zu halten, und ob der sich verschlechternden Lebensbedingungen kommt es verbreitet zu Unruhen.\n\nWenn sich nicht bald etwas ändert, werden wohl ganze Regionen auf lange Sicht unbewohnbar."
 crisis.7225.a: "Können wir denn gar nichts tun?!"
 crisis.7230.name: "Nachlassende Hitze"
 crisis.7230.desc: "Das Schlimmste der galaktischen Hitzewelle ist vorüber. Die Lichtgeschwindigkeit ist zwar nach wie vor hoch, hat aber fast wieder ihren Normalwert erreicht. Wir müssen nur noch ein wenig durchhalten, bis die zusätzliche Energie verflogen ist."
 crisis.7230.a: "Das war grauenhaft."
 crisis.7235.name: "Legierungsduktilität"
 crisis.7235.desc.both: "Da in letzter Zeit weniger Materialversagen bei unseren am häufigsten verwendeten Legierungen auftrat, stellten wir Nachforschungen an. Wie sich ergab, haben sich die Eigenschaften dieser Legierungen verändert, und eine leichte Erhöhung ihrer Duktilität hat zur Folge, dass sie weniger häufig brechen als sonst. Obwohl dies allgemein begrüßenswert ist, ist diese fundamentale Änderung an den Gesetzen der Physik besorgniserregend."
 crisis.7235.desc.unknown: "$crisis.7235.desc.both$\n\n$crisis.unknown.desc$"
 crisis.7235.desc.known: "$crisis.7235.desc.both$\n\n$crisis.known.desc$"
 crisis.7235.desc.again: "$crisis.7235.desc.both$\n\n$crisis.again.desc$"
 crisis.7235.desc.crisis: "Eine weitere erfolgreiche Veränderung der Realität! Diese ist geringfügig und betrifft unsere Legierungen, die dadurch leichter und robuster werden. Obwohl es nur eine kleine Änderung ist, gilt sie für die gesamte Galaxie, und wir behalten im Blick, wie lange sie in diesem Universum Gültigkeit behält."
 crisis.7235.a: "Gut, aber besorgniserregend."
 crisis.7235.b: "Verblüffend."
 crisis.7235.c: "Gute Arbeit!"
 crisis.7240.name: "Legierungsduktilität"
 crisis.7240.desc.both: "Da in letzter Zeit vermehrt Materialversagen bei unseren am häufigsten verwendeten Legierungen auftrat, stellten wir Nachforschungen an. Wie sich ergab, haben sich die Eigenschaften dieser Legierungen verändert, und eine leichte Reduzierung ihrer Duktilität hat zur Folge, dass sie häufiger brechen als sonst. Diese Veränderung sollte man äußerst ernst nehmen, da sie gegen die Gesetze der Physik verstößt."
 crisis.7240.desc.unknown: "$crisis.7240.desc.both$\n\n$crisis.unknown.desc$"
 crisis.7240.desc.known: "$crisis.7240.desc.both$\n\n$crisis.known.desc$"
 crisis.7240.desc.again: "$crisis.7240.desc.both$\n\n$crisis.again.desc$"
 crisis.7240.desc.crisis: "Unser aktuelles Experiment war nur teilweise erfolgreich. Es wirkte sich zwar auf die gesamte Galaxie aus, verfehlte aber die erwarteten Ergebnisse. Durch die Veränderung der Materialeigenschaften unserer Legierungen sind diese nun spröder und sie brechen schnell. Das Problem ist vorübergehend, und in ein paar Jahren wird alles wieder behoben sein, doch bis dahin werden die Kosten steigen."
 crisis.7240.a: "$crisis.7205.a$"
 crisis.7240.b: "$crisis.7205.b$"
 crisis.7240.c: "Beim nächsten Mal läuft es besser."
 crisis.7245.name: "Veränderte Nährwerte"
 crisis.7245.desc.both: "Es gab eine weitreichende Veränderung der Nährwerte von Nahrungsmitteln in der gesamten Galaxie. Alles ist nun nährstoffreicher. Entweder das oder wir benötigen weniger Nahrung. Wie dem auch sei: Diese Veränderung ist unerwartet."
 crisis.7245.desc.unknown: "$crisis.7245.desc.both$\n\n$crisis.unknown.desc$"
 crisis.7245.desc.known: "$crisis.7245.desc.both$\n\n$crisis.known.desc$"
 crisis.7245.desc.again: "$crisis.7245.desc.both$\n\n$crisis.again.desc$"
 crisis.7245.desc.crisis: "Was für ein Erfolg! Wir konnten die Effektivität der Verdauung in Bezug auf die Kaloriengewinnung erhöhen und benötigen nun eine kleinere Menge an Nahrung, um satt zu sein. Diese präzise Bearbeitung hat uns viel über die Umformung der Realität gelehrt."
 crisis.7245.a: "$crisis.7235.a$"
 crisis.7245.b: "$crisis.7235.b$"
 crisis.7245.c: "$crisis.7235.c$"
 crisis.7250.name: "Veränderte Nährwerte"
 crisis.7250.desc.both: "Es gab eine weitreichende Veränderung der Nährwerte von Nahrungsmitteln in der gesamten Galaxie. Alles ist nun weniger nährstoffreich. Entweder das oder wir benötigen einfach mehr Nahrung. Was genau sich geändert hat, ist nicht offensichtlich. Wir müssen diese Veränderung äußerst ernst nehmen, da sie erhebliche gesellschaftliche Auswirkungen zeigt."
 crisis.7250.desc.unknown: "$crisis.7250.desc.both$\n\n$crisis.unknown.desc$"
 crisis.7250.desc.known: "$crisis.7250.desc.both$\n\n$crisis.known.desc$"
 crisis.7250.desc.again: "$crisis.7250.desc.both$\n\n$crisis.again.desc$"
 crisis.7250.desc.crisis: "Unser aktuelles Experiment war nur teilweise erfolgreich. Es wirkte sich zwar auf die gesamte Galaxie aus, verfehlte aber die erwarteten Ergebnisse. Die Bearbeitung modifizierte die Kaloriengewinnung durch verdaute Nährstoffe, und nun müssen wir alles in größeren Mengen zu uns nehmen, bevor wir uns satt fühlen. Dieser kleine Fehler ist nur vorübergehend, und bald sollte alles wieder normal sein."
 crisis.7250.a: "$crisis.7240.a$"
 crisis.7250.b: "$crisis.7240.b$"
 crisis.7250.c: "$crisis.7240.c$"
 crisis.7255.name: "Massenverschiebung"
 crisis.7255.desc.both: "Aktuelle gravimetrische Scans widersprechen zuvor aufgezeichneten Daten. Nachdem wir die Zahlen einige Male durchgegangen sind, ist unbestreitbar, dass irgendetwas die gesamte Galaxie betrifft. Änderungen im kleinstmöglichen Maßstab betreffen die gewaltigsten Himmelskörper. Dies hat für die meisten Planeten kaum Konsequenzen, doch einige könnten schwerkraftbezogene Anomalien erleben."
 crisis.7255.desc.unknown: "$crisis.7255.desc.both$\n\n$crisis.unknown.desc$"
 crisis.7255.desc.known: "$crisis.7255.desc.both$\n\n$crisis.known.desc$"
 crisis.7255.desc.again: "$crisis.7255.desc.both$\n\n$crisis.again.desc$"
 crisis.7255.desc.crisis: "Unser neuestes Experiment zur Formung der Realität sorgte für eine leichte Reduktion der Masse von Kohlenstoffatomen. In den meisten Fällen, sofern der Maßstab nicht zu groß ist, ist diese Reduktion unerheblich, doch unsere Modelle sagen mögliche Probleme bei einigen Himmelskörpern vorher. Pessimistische Modelle besagen sogar, einige bewohnbare Welten, die bereits über eine niedrige Schwerkraft verfügen, könnten an atmosphärischer Dichte einbüßen."
 crisis.7255.a: "$crisis.7240.a$"
 crisis.7255.b: "$crisis.7240.b$"
 crisis.7255.c: "So schlimm ist das doch nicht."
 mass_shift_tooltip: "Die folgenden Kolonien sind merkenswert betroffen:"
 crisis.7260.name: "Schleiertränen"
 crisis.7260.desc.both: "Verstreut über die Galaxie öffneten sich kurzzeitig Hunderte von Hyperraumrissen in eine psionische Dimension. Welche Barriere auch immer zu ihnen besteht: Sie ist offenbar geschwächt. Die meisten Risse machten keine Probleme, doch einige entfesselten Energiewesen, die nun die Galaxie terrorisieren. Zum Glück scheinen diese Wesen derzeit noch genauso verwirrt zu sein wie wir, und es gibt augenscheinlich kein organisiertes Vorgehen. Von daher können wir eine Invasion derzeit ausschließen.\n\nWir werden uns um alle Entitäten in unserem Gebiet kümmern müssen."
 crisis.7260.desc.unknown: "$crisis.7260.desc.both$\n\n$crisis.unknown.desc$"
 crisis.7260.desc.known: "$crisis.7260.desc.both$\n\n$crisis.known.desc$"
 crisis.7260.desc.again: "$crisis.7260.desc.both$\n\n$crisis.again.desc$"
 crisis.7260.desc.crisis: "Auf der Kehrseite unserer Galaxie findet man die als Schleier bekannte Dimension. Mehrere Faktoren machen sie zu einem hochinteressanten Studienobjekt, darunter ihre Plastizität, ihre hypothetische Verbindung zu schwarzen Löchern und wie anders die Realität dort ist.\n\nWährend eines Experiments, das es uns erlauben sollte, in diese Dimension zu blicken, öffneten wir versehentlich zahlreiche Hyperraumrisse in unserer Galaxie, durch die einige feindselige \"Schleiergeister\" in unsere Dimension eindrangen. Die Barriere zwischen unseren Welten wurde durch unsere Aktionen offenbar erheblich dünner. Die Dinge sollten sich nach einer Weile wieder normalisieren, doch am besten sollte man in diese Richtung nicht zu viele Löcher bohren."
 crisis.7260.a: "$crisis.7240.a$"
 crisis.7260.b: "$crisis.7240.b$"
 crisis.7260.c: "Das sollten wir nicht noch einmal tun."
 crisis.7265.name: "Unendlichkeitsthese: Stabiler Erfolg"
 crisis.7265.desc.a: "Unsere aktuellen Experimente waren ein voller Erfolg. Wir konnten Metallschrott dauerhaft in wertvolle Legierungen umwandeln! Der Trick, um diese Änderungen permanent zu machen, bestand darin, die Realität so zu bearbeiten, dass die Umwandlung möglich wird, anstatt zu versuchen, das Material direkt zu bearbeiten. Da die chemische Reaktion nun beendet ist, sollten unsere neuen Legierungen dauerhaft so bleiben."
 crisis.7265.desc.b: "Wir haben den Fluss der Zeit erfolgreich verändert! Nach Experimenten an leeren Regionen des Weltraums fühlten wir uns sicher genug, um den Prozess an einer unserer Kolonien zu erproben, und es hat funktioniert! Dort fließt die Zeit nun schneller, und zwar geschätzt um 20,537 %. Es wird diverse Kommunikations- und Reiseschwierigkeiten geben, doch die bekommen wir schon geregelt."
 crisis.7265.desc.c: "Wir haben Supraleiter verbessert. Sie funktionieren nun nicht nur bei Zimmertemperatur, sondern haben auch eine verlustfreie Energieweiterleitung erreicht. Obwohl diese Veränderungen nur eine Weile andauern werden, sind sie für unsere Energienetze von erheblichem Nutzen."
 crisis.7265.desc.d: "Obwohl die Effekte dieser These nicht spektakulär waren, warfen sie doch ein neues Licht auf das Studium der Realität. Zahlreiche Hypothesen mussten verworfen oder neu formuliert werden, damit sie zu unseren aktuellen Beobachtungen passen, doch wir haben deutlich mehr gelernt als erwartet."
 crisis.7265.desc.e: "Unsere Experimente hatten einen unerwarteten Effekt. Beim Studium anderer Dimensionen und der Möglichkeiten, sie zu bereisen, verlegten wir unsere Schiffe versehentlich in den Hyperraum. Teilweise. Entgegen sämtlicher Wahrscheinlichkeiten ist ihre Situation offenbar stabil und nicht tödlich. Als positive Nebenwirkung können sie sich jetzt deutlich schneller bewegen als je zuvor."
 crisis.7265.desc.f: "Wir waren schon immer sehr gut darin gewesen, Technologie in Dinge zu verwandeln, die explodieren. Unendlichkeitsthesen bilden da keine Ausnahme, und wir konnten verändern, wie sich die Sprengladungen von Explosivwaffen verhalten, was zu erheblich größeren Detonationen führt. Diese Entdeckung kostete uns lediglich die bedauerliche Zerstörung mehrerer kleiner Forschungseinrichtungen."
 crisis.7265.desc.g: "Bezüglich der Bearbeitung der Realität konnten wir nichts Außergewöhnliches erreichen. Allerdings lernten wir eine Menge über konventionelle Technologie."
 crisis.7265.desc.h: "Ein Versuch, den Raum zu modulieren, hat zur Vergrößerung einer Kolonie geführt. Überraschenderweise scheint diese Situation von Dauer zu sein, und auch wenn wir nicht genau wissen, wie dies zustande kam, gehen wir davon aus, dass Materie aus einer anderen Dimension in unsere gezogen wurde und sich reibungslos in interstitielle Lücken zwischen atomaren Partikeln einfügte. Das ist alles so aufregend rätselhaft."
 crisis.7265.a: "Genial!"
 crisis.7265.b: "Verblüffend."
 crisis.7265.c: "Wunderbar."
 crisis.7265.d: "Interessant."
 add_crisis_currency_doubled_tt: "\nWir haben [crisobj_thesis_value_bonus] £advanced_logic£ §Y$menp_cosmo_objectives$§! erhalten."
 crisis.7265.e: "Äh, gut gemacht?"
 crisis.7265.f: "Ein Klassiker!"
 crisis.7265.g: "Wie eigenartig."
 crisis.7265.h: "Nehmen wir."
 crisis.7270.name: "Unendlichkeitsthese: Bedauerlicher Misserfolg"
 crisis.7270.desc.a: "Fehlschläge gehören zum wissenschaftlichen Arbeiten. Wir hatten große Hoffnungen in dieses Experiment gesetzt, doch am Ende funktionierte es eben einfach nicht. Das ist frustrierend, aber dennoch wertvoll, und wir werden so viel wie möglich daraus lernen."
 crisis.7270.desc.b: "Wir haben den Fluss der Zeit erfolgreich verändert! Nach Experimenten an leeren Regionen des Weltraums fühlten wir uns sicher genug, um den Prozess an einer unserer Kolonien zu erproben, und es hat funktioniert! Ein paar unserer Jahre wird die Zeit dort langsamer fließen, und zwar geschätzt um 20,537 %. Diese Verlangsamung ist nicht ideal, aber dennoch ein gewaltiger Erfolg für uns."
 crisis.7270.desc.c: "Unsere aktuellen Experimente hatten einen unschönen Nebeneffekt. Unsere sämtlichen Energiespeichergeräte wurden entladen. Nichts wurde zerstört, aber die gesamte dort gespeicherte Energie ist verschwunden, vermutlich in eine andere Dimension. Wir wissen noch nicht, was hier genau vorgefallen ist, aber es ist interessant."
 crisis.7270.desc.d: "Das war ein demütigender Misserfolg. Unsere Bearbeitung beeinflusste unsere Datenbanken, wodurch Jahre der Forschung unwiederbringlich verlorengingen. Viele unserer Theorien müssen von Grund auf neu formuliert werden. Das ist ein erheblicher Rückschlag, trotz der Gelegenheit, alte Forschungen neu auf den Prüfstand zu stellen."
 crisis.7270.desc.e: "Bei diesem Experiment ging es um die Quellen und die Produktion von Energie, und obwohl es großartig begann, nahmen die Dinge eine katastrophale Wendung, als es anfing, unsere Schiffsreaktoren zu beeinflussen, was zu Fehlfunktionen in der ganzen Flotte führte! Einige Schiffe schalteten ihre Reaktoren noch rechtzeitig ab, andere erlitten hingegen kritische Schäden."
 crisis.7270.desc.f: "[leader_target.GetName] hatte die Leitung über die Experimente und verstarb, als eine unerwartete Raumzeit-Kompression im Testbereich auftrat. Wir waren dennoch teilweise erfolgreich beim Formen der Realität, doch dieser Todesfall erinnert uns daran, dass Wissen stets seinen Preis hat."
 crisis.7270.desc.g: "Ein Informatikexperiment geriet aus der Bahn, und zwar in deutlich größerem Maßstab als erwartet. Infolgedessen wurde eine Menge wertvoller Forschungsdaten in Nonsens verwandelt. Zum Glück waren die Banken, die unsere aktuellste Forschung verwahrten, gut gesichert und daher nicht betroffen."
 crisis.7270.desc.h: "Ein Versuch, den Raum zu modulieren, führte zur Schrumpfung einer Kolonie. Die Lage ist permanent, was etwas überraschend kam. Wir gehen davon aus, dass Materie reibungslos von einer Dimension in die andere gesickert ist. Das ist alles äußerst rätselhaft."
 crisis.7270.a: "$crisis.7240.c$"
 crisis.7270.b: "$crisis.7240.c$"
 crisis.7270.c: "$crisis.7240.c$"
 crisis.7270.d: "$crisis.7240.c$"
 no_crisis_currency_tt: "\nWir erhielten keine £advanced_logic£ §Y$menp_cosmo_objectives$§! für diese These."
 crisis.7270.e: "$crisis.7240.c$"
 cosmogenesis_damage_ships_tt: "Unsere Flotten werden Schaden erleiden."
 crisis.7270.f: "$crisis.7240.c$"
 crisis.7270.g: "$crisis.7240.c$"
 crisis.7270.h: "$crisis.7240.c$"
 crisis.7280.desc: "Seid gegrüßt, brillante [Root.GetSpeciesNamePlural]. Ihr habt heute einen bedeutenden technologischen Meilenstein erreicht. Wir sind stolz auf Euch. Der Weg, der Euch hierher führte, war voller Herausforderungen. Nur weil Ihr diese überwunden habt, konntet Ihr wachsen. Eure jüngsten technologischen Fortschritte sind ein Zeichen dafür, dass wir richtig lagen, Euch unsere Führung anzubieten."
 crisis.7285.desc: "Meine Sorgenkind! Ihr habt unsere Geduld überschritten! Eure rücksichtslosen Experimente sind eine Gefahr für alle, und wir fordern Euch hiermit auf, sie unverzüglich zu beenden. Ihr habt keine Ahnung, welch schlummernden Mächte ihr damit wecken könnt, und auch wenn Neugier lobenswert ist, ist Rücksichtslosigkeit in einem solchen Ausmaß inakzeptabel. Die Wirklichkeit wurde aus einem bestimmten Grund auf diese Weise aufgebaut. Versucht nicht, sie zu manipulieren."
 crisis.7285.a: "Ihr habt recht. Das ist viel zu gefährlich."
 crisis.7285.a.tt: "Wir sagen uns von unserer Kosmogenese-Ambition los und verlieren Zugang zum Großteil von Gebäuden und Schiffen des Gefallenen Reichs.\n\n§RDies hindert uns daran, unseren Krisenpfad abzuschließen§!"
