 origin_cybernetic_creed_desc: "§RWARNUNG: Blockiert alle Aufstiegspfade außer ['concept_cybernetic_ascension'].§!\n\nDieses Reich verfolgt eine göttliche Bestimmung: die Verschmelzung des erhabenen Leibes mit heiliger Kybernetik. Augmentierung ist Lobpreisung."
 origin_tooltip_cybernetic_creed_effects: "- $HOMEWORLD$ Anfängliche Gebäude werden durch ['concept_cybernetic_creed_infrastructure'] ersetzt $NEW_LINE$- ['concept_cybernetic_creeds'] (Fraktionen) werden kurz nach Spielbeginn gegründet\n- $SPECIES_TRAITS$ ['trait:trait_cyborg_ritualistic_implants']\n- $GUARANTEED_RESEARCH_OPTION_STRING$ ['concept_integrated_cybernetics', £engineering£ $tech_integrated_cybernetics$]\n- ['concept_cybernetic_creed_jobs']-Jobs"
 START_SCREEN_CYBERNETIC_CREED: "Unsere vollendete Erfüllung ist die Vereinigung von [Owner.Species.GetFleshTypeCyberCreed&DAT] und Maschine. Unsere Geschichte ist voll von gescheiterten Versuchen, doch geleitet vom göttlichen Willen haben wir nun dank unserer rituellen Implantate das erste Stadium der geheiligten Symbiose erreicht.\n\nDies ist erst der Anfang unseres grenzenlosen kybernetischen Potenzials. Fortschrittlichere Augmentierungen werden folgen.\n\nDennoch ist unser Glaube gespalten, und konkurrierende Credos streiten über die Ziele der geheiligten Augmentierung. Sobald wir diese Frage beantwortet haben, werden wir mit der perfekten Einheit aus heilig[GetFleshTypeCyberCreed::<DE_END_ADJ_NUL_S_D>] [Owner.Species.GetFleshTypeCyberCreed&DAT] und gesegneter Technologie die beschränkten Baupläne der Evolution verbessern.\n\n$machine_age.1090.pray$"
