 virtuality_research_focus: "Virtueller Forschungsschwerpunkt"
 virtuality_research_focus_desc: "Ein virtuelles Bewusstsein kann Probleme wahrnehmen und lösen, die für weniger fortschrittliche Bewusstseine wie unmöglich zu meisternde Hindernisse erscheinen.\n\n"
