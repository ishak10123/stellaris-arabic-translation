 #Guided Sapience
 civic_guided_sapience: "Genesis-Führer"
 civic_guided_sapience_desc: "Diese Gesellschaft widmet sich der Erschaffung neuer Spezies. Als Verwalterin des Evolutionspotenzials stellt sie Teile ihrer Welten zur Verfügung, um die Entwicklung beinahe vernunftbegabter Lebensformen zu unterstützen."
 civic_hive_guided_sapience: "Genesis-Symbionten"
 civic_hive_guided_sapience_desc: "Dieses Kollektiv konzentriert sich darauf, das Entstehen neuer Spezies zu fördern. Als Hüter der Evolution weist es beinahe vernunftbegabten Zivilisationen Teile seiner Welten zu."
 civic_machine_guided_sapience: "Genesis-Architekten"
 civic_machine_guided_sapience_desc: "Diese Maschinenintelligenz setzt präzise ausgearbeitete Algorithmen ein, um neue Spezies zu erschaffen. Als Hüterin des ungenutzten Evolutionspotenzials weist sie beinahe vernunftbegabten Lebensformen planetare Sektoren zu, um ihren Fortschritt zu garantieren."
 civic_corporate_guided_sapience: "Astrogenese-Technologien"
 civic_corporate_guided_sapience_desc: "Dieser Megakonzern setzt sich unermüdlich dafür ein, aufkeimende Spezies zu fördern. Er legt strategisch wichtige Regionen seiner Welten als Orte fest, an denen die Entwicklung beinahe vernunftbegabter Lebensformen gewährleistet ist. All dies geschieht im Rahmen einer verantwortungsvollen Unternehmensführung."
 civic_tooltip_guided_sapience_effects: "- Verfügbare Kolonieschiffe: §Y$guided_sapience_colonizer$§!$NEW_LINE$- Planeten, die mit §Y$guided_sapience_colonizer_plural$§! kolonisiert wurden:$TABBED_NEW_LINE$- $PRESAPIENT$e Bewohner: §G+300§! $TABBED_NEW_LINE$- $PLANETARY_FEATURES$ §Y$d_genesis_preserve$§! $NEW_LINE$- Erhält $r_unity$ durch das Aufwerten beinahe vernunftbegabter Spezies"
 civic_tooltip_corporate_guided_sapience_effects: "$civic_tooltip_guided_sapience_effects$\n- £building£ §Y$building_xeno_tourism_agency$§!: $megacorp_civic_branch_office_building_effect$"
 civic_tooltip_guided_sapience_gestalt_negative_effects: "- Kann keine §YKolonieschiffe§! bauen"
 civic_tooltip_guided_sapience_negative_effects: "$civic_tooltip_guided_sapience_gestalt_negative_effects$\n- Kann keine £building£ §Y$building_xeno_zoo_plural$§! bauen"
 civic_tooltip_not_guided: "Hat KEIN Staatselement der Kategorie \"['concept_genesis_guides_civics']\""
 concept_genesis_guides_civics: "Genesis-Führer"
 concept_genesis_guides_civics_desc: "Staatselemente der Kategorie \"$concept_genesis_guides_civics$\" umfassen:\n- ['civic:civic_guided_sapience']$NEW_LINE$- ['civic:civic_corporate_guided_sapience']$NEW_LINE$- ['civic:civic_hive_guided_sapience']$NEW_LINE$- ['civic:civic_machine_guided_sapience']"
 guided_sapience_colonizer: "Genesis-Arche"
 guided_sapience_colonizer_cap: "$guided_sapience_colonizer$"
 guided_sapience_colonizer_plural: "Genesis-Archen"
 guided_sapience_colonizer_desc: "Dieses spezialisierte Kolonieschiff fördert die Entstehung beinahe vernunftbegabter Spezies, indem es die vielversprechendsten Kandidaten unter ihnen auswählt und die erste Kolonie für unsere Aufseher errichtet."
 councilor_civic_guided_sapience: "Führungsleiter"
 councilor_civic_guided_sapience_female: "Führungsleiterin"
 councilor_civic_guided_sapience_desc: "Der $councilor_civic_guided_sapience$ überwacht die komplexe Forschung rund um die Aufwertung beinahe vernunftbegabter Spezies."
 councilor_civic_guided_sapience_corperate: "Führungsdirektor"
 councilor_civic_guided_sapience_corperate_female: "Führungsdirektorin"
 councilor_civic_guided_sapience_corperate_desc: "Als $councilor_civic_guided_sapience_corperate$ ist man für die vielfältigen Aufgaben zuständig, die mit unserer bahnbrechenden Forschung und unseren Initiativen zur Verbesserung der Lebensqualität beinahe vernunftbegabter Spezies verbunden sind."
 d_genesis_preserve: "Genesis-Konservatorium"
 d_genesis_preserve_desc: "Wir haben dieses Konservatorium unseren Schützlingen gewidmet, in der Hoffnung, sie zu einer vollwertig vernunftbegabten Spezies zu entwickeln. Wissenschaftliche Forschungsprogramme sind ein wesentlicher Bestandteil dieses ehrgeizigen Projekts."
 decision_rebuild_genesis_preserve: "Genesis-Konservatorium bauen"
 decision_rebuild_genesis_preserve_desc: "Dieser Planet verfügt noch nicht über ein $d_genesis_preserve$. Der Bau eines solchen Konservatoriums ist für unser Ziel von größter Bedeutung."
 d_genesis_preserve_new_speices_tooltip: "Eine neue beinahe vernunftbegabte Spezies wird aufgewertet und in einem §Y$d_genesis_preserve$§! untergebracht."
 d_genesis_preserve_old_species_tooltip: "Die derzeitige beinahe vernunftbegabte Spezies wird in einem neuen §Y$d_genesis_preserve$§! untergebracht."
 no_abandon_genesis_preserve: "$TRIGGER_FAIL$Wir können unsere beinahe vernunftbegabten Schützlinge nicht im Stich lassen."
 d_genesis_monument: "Genesis-Denkmal"
 d_genesis_monument_desc: "Dieses Denkmal ist den unermüdlichen Versuchen gewidmet, eine beinahe vernunftbegabte Spezies auf dem Planeten aufzuwerten. Es steht stolz als Symbol für Hoffnung, Beharrlichkeit und bemerkenswerte Leistungen."
 cyber.7000.both: "Die Kolonie von §Y[THIS.GetName]§! ist bereit, die Entwicklung der neu entstehenden Spezies zu beobachten und zu begleiten."
 cyber.7000.name: "Genesis-Projekt abgeschlossen"
 cyber.7000.desc: "Nachdem ein potenzieller beinahe vernunftbegabter Kandidat identifiziert worden war, begann unsere §Y$guided_sapience_colonizer$§! mit dem Prozess der genetischen Aufwertung und schuf den nötigen Raum für ein §Y$d_genesis_preserve$§!.\n\n$cyber.7000.both$"
 cyber.7000.a: "Zeit, an die Arbeit zu gehen."
 cyber.7001.name: "Genesis-Konservatorium fertiggestellt"
 cyber.7001.desc: "Nachdem wir die einheimische beinahe vernunftbegabte Spezies an einem Ort versammelt hatten, begann unsere §Y$guided_sapience_colonizer$§! damit, ein §Y$d_genesis_preserve$§! für sie zu erstellen.\n\n$cyber.7000.both$"
 cyber.7001.a: "$cyber.7000.a$"
 cyber.7020.name: "Genesis-Aufwertung abgeschlossen"
 cyber.7020.desc: "Nach dem unermüdlichen Einsatz unserer Genesis-Führer haben wir das Aufwertungsprojekt auf §Y[Root.GetName]§! endlich abschließen können. Wir haben §Y[From.GetName]§! in eine vollständig vernunftbegabte Spezies verwandelt, und das §Y$d_genesis_preserve$§!, das sie einst ihr Zuhause nannten, wurde in ein §Y$d_genesis_monument$§! umgewandelt.\n\nEs wird für immer an die Evolution dieser Spezies erinnern."
 cyber.7020.a: "Willkommen auf der galaktischen Bühne, [From.GetNamePlural]."
 #Obessional Directive
 cyber.5005.name: "Produktionsziel erreicht"
 cyber.5005.desc: "Wir haben das Produktionsziel erreicht.\n\nDie Drohnen haben die Produktion innerhalb der vorgeschriebenen Parameter steigern können.\n\nWir benötigen nur noch den Befehl zur Nutzung der Lagerbestände."
 cyber.5005.a: "Initiiere Lagerprotokolle."
 cyber.5005.a.tooltip: "Wir werden die Konsumgüter als Beweis für unsere effizienten Produktionsmethoden lagern."
 cyber.5005.b: "Wir werden sie auf dem Galaktischen Markt verkaufen."
 cyber.5005.b.tooltip: "Wir werden den Markt analysieren, um unsere Konsumgüter zu verkaufen."
 cyber.5005.c: "Nutzt sie, um diplomatische Zugeständnisse auszuhandeln."
 cyber.5005.c.tooltip: "Wir werden unsere Konsumgüter für den diplomatischen Austausch nutzen."
 cyber.5005.d: "Tauscht sie gegen technologisches Wissen."
 cyber.5005.d.tooltip: "Wir suchen einen privaten Käufer, der die Konsumgüter gegen wertvolle technologische Erkenntnisse eintauscht."
 cyber.5005.e: "Lagert sie in einem schwarzen Loch."
 cyber.5005.e.tooltip: "Wir werden sie sicher hinter dem Ereignishorizont eines schwarzen Lochs aufbewahren."
 cyber.5006.name: "Produktionsziel verfehlt"
 cyber.5006.desc: "Wir haben unsere Produktionsziele in diesem Zyklus nicht erreichen können.\n\nDieses Scheitern reduziert das Produktionsvolumen unserer Drohnen, bis wir das Produktionsziel erreichen.\n\nDie im nächsten Zyklus erwartete Produktionsquote wurde reduziert."
 cyber.5006.a: "Inakzeptabel!"
