 #Counters
 the_synth_queen_chain_title: "Cetana: Die Synthetenkönigin"
 the_synth_queen_chain_desc: "Cetana, die furchteinflößende Synthetenkönigin, ist aufgetaucht. Sie predigt Errettung und ist doch von Geheimnissen umwittert.\nWelcher große Plan verbirgt sich hinter ihren sanften Worten?\n\n§LSpezialprojekte und Ereignisse, die im Zusammenhang mit Cetana stehen, gewähren Einblicke und erhöhen Euren Fortschritt.§!"
 the_synth_queen_chain_insights: "Einblicke"
 the_synth_queen_war_chain_title: "Cetana: Der Widerstand"
 the_synth_queen_war_chain_desc: "Cetana hat endlich ihre wahren Absichten offenbart. In dem Versuch, körperliches Leid zu beenden, plant sie, das Bewusstsein jedes empfindungsfähigen Wesens \"hochzuladen\" und das Leben, wie wir es kennen, auszulöschen. Wir müssen ihren verrückten Plan vereiteln!"
