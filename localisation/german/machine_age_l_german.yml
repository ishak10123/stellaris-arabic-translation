 tr_virtuality_5_modifier_desc: "Hauptweltgebäude erhöhen die Anzahl an §Ymaximalen Distrikten§! auf den §Yplanetaren Aufstiegsstufen§! §G1§!, §G5§! und §G10§! jeweils um §G+1§!"
 tr_virtuality_finisher_modifier_desc: "£pop£ §HVirtuelle Bewohner§! werden augenblicklich erschaffen, um die £job£ Job-Anforderungen von §Y£building£ Gebäuden§! und §Y£district£ Distrikten§! zu erfüllen\n§R£pop£ Virtuelle Bewohner können nicht länger zu Flüchtlingen oder montiert werden§!\nAlle §Y$trait_machine_unit$n§!-Anführer erhalten die Eigenschaft \"§Y$leader_trait_virtual$§!\"\nNeue planetare Entscheidung: $TABBED_NEW_LINE$ §Y$decision_server_shut_down$§!"
