 tech_cosmogenesis_thesis_desc: "Indem wir weitere Änderungen an den Regeln der Realität vornehmen, können wir ihre Reaktionen darauf besser überwachen. In diesem Maßstab sind die Effekte nach wie vor schwer vorherzusagen, und sie könnten sich auf die gesamte Galaxie auswirken."
