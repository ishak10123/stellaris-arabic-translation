 civic_individual_machine_predictive_analysis_desc: "Diese Gesellschaft zeichnet sich durch ihre prädiktive Analyse von Forschungsmethoden aus, was sicherstellt, dass man nur die vielversprechendsten Theorien verfolgt."
 councilor_individual_machine_predictive_analysis: "Leitender Methodikanalyst"
 councilor_individual_machine_predictive_analysis_desc: "Der Leitende Methodikanalyst führt unsere Bemühungen an, Forschungsmethoden zu analysieren, was sicherstellt, dass man nur die vielversprechendsten Theorien verfolgt."
 civic_individual_machine_warbots: "$civic_machine_warbots$"
 civic_individual_machine_warbots_desc: "Diese Gesellschaft verfeinert ihre Armeen, ihre Wirtschaft und ihr Bildungswesen ständig zugunsten verschiedener Strategien der Kriegsführung. Jede Maschine trägt zur kollektiven Stärke bei und passt sich in einem Konflikt den Gegebenheiten an, um Erfolg zu haben."
 councilor_individual_machine_warbots: "Kampflogistiker"
 councilor_individual_machine_warbots_desc: "Kampflogistiker planen und verwalten die Lieferketten und sorgen für eine nahtlose Unterstützung unserer Kampfeinsätze, ganz egal, wo sie auch stattfinden mögen."
 civic_individual_machine_replication: "$civic_machine_replication$"
 civic_individual_machine_replication_desc: "Diese Gesellschaft hat die Kontrolle über die Produktionsmittel ihrer eigenen Montage übernommen. Eine Maschine erzeugt die nächste und schafft so eine ununterbrochene Kette, die die Grenzen des Planeten immer weiter ausdehnt."
 councilor_individual_machine_replication: "Replikationskoordinierungsoffizier"
 councilor_individual_machine_replication_desc: "Der Replikationskoordinierungsoffizier sorgt dafür, dass die Montage sicher und geregelt abläuft."
