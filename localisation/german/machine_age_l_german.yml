 mod_pc_cosmogenesis_world_max_buildings_add: "Zusätzliche Bauplätze"
 SYNAPTIC_LATHE_EFFICENCY_TITLE: "Effizienz"
 SYNAPTIC_LATHE_EFFICENCY_DESC: "§EMit jedem §YNeuralchip§!, der mit der Schmiede verbunden wird, steigt die Effizienz aller anderen §YNeuralchips§! in der Anlage. Wenn wir unsere Bevölkerung in großer Zahl hierher umsiedeln, können wir die Produktion der Anlage erheblich verbessern.§!"
 pop_cat_chip_slave: "Rechenkomponente"
 pop_cat_chip_slave_desc: "Diese Individuen finden als Chips in einem Computer mit gigantischen Ausmaßen Verwendung. Sie liegen tief in einem künstlichen Koma und Lebenserhaltungskapseln garantieren eine maximale Lebenserwartung. Irgendwann lässt die gewaltige Belastung der Verarbeitungsmenge den Denkapparat versagen."
 pop_cat_chip_slave_plural: "$pop_cat_chip_slave$n"
 purge_cosmogenesis: "Kognitive Überlastung"
 purge_cosmogenesis_tooltip: "Betroffene Bewohner werden automatisch in die §YSynapsenschmiede§! umgesiedelt und als $job_neural_chip$ beschäftigt."
 purge_cosmogenesis_tooltip_delayed: "§LEin Rädchen im Getriebe.§!"
 cosmogenesis_world_0: "$pc_cosmogenesis_world$"
 cosmogenesis_world_0_DESC: "Ein Computer unvernünftiger Ausmaße, der empfindungsfähige Wesen als Verarbeitungschips nutzt, um Forschung und Fortschrittliche Logik zu generieren, und besagte Wesen am Ende umbringt. Seine Effizienz steigt mit der Anzahl verbundener Einheiten dramatisch."
 cosmogenesis_world_0_MEGASTRUCTURE_DETAILS: "Eine Computeranlage, die im Grunde Bewohner verbraucht, um §YForschung§! und §YFortschrittliche Logik§! zu generieren."
 cosmogenesis_world_ruined: "Zerstörte $pc_cosmogenesis_world$"
 cosmogenesis_world_ruined_DESC: "Die zertrümmerten Überreste einer Synapsenschmiede. Einst war dies ein gewaltiger Computer, der empfindungsfähige Wesen als Chips nutzte, um die Geheimnisse des Universums zu enthüllen."
 cosmogenesis_world_ruined_MEGASTRUCTURE_DETAILS: "$cosmogenesis_world_ruined_DESC$"
 #Hidden district - not being displayed in the UI.
 district_cosmogenesis_goverment: "Synaptische $building_lathe_capital$"
 district_cosmogenesis_goverment_plural: "Synaptische Verarbeitungseinheiten"
 district_cosmogenesis_goverment_desc: "$building_lathe_capital_desc$"
 mod_district_cosmogenesis_goverment_max_add: "$district_cosmogenesis_goverment_plural$ (Maximum)"
 district_cosmogenesis_world_science: "Neuraltor"
 district_cosmogenesis_world_science_plural: "Neuraltore"
 district_cosmogenesis_world_science_desc: "Das gesammelte Erfindungsvermögen zahlloser Individuen ermöglicht uns das Durchführen schneller Simulationen fortschrittlicher Hypothesen. Eine komplexe Struktur logischer Tore und organischer Pufferspeicher produziert unvergleichbar präzise Ergebnisse."
 district_cosmogenesis_world_logic: "Erweiternder Spekulant"
 district_cosmogenesis_world_logic_plural: "Erweiternde Spekulanten"
 district_cosmogenesis_world_logic_desc: "Dieser Distrikt ist ein Wunderwerk dialektischer Metaphysik und nutzt Neuralchips, um die Wahrheit innerhalb formeller Aussagen zur Realität zu überprüfen. Im Grunde beantwortet er die komplexesten Fragen, die je von der kollektiven Psyche der Bewohner der Synapsenschmiede gestellt wurden, mit Ja oder Nein."
 tech_lathe_resonator: "$building_lathe_resonator$"
 tech_lathe_resonator_desc: "$building_lathe_resonator_desc$"
 tech_lathe_overclocker: "$building_lathe_overclocker$"
 tech_lathe_overclocker_desc: "$building_lathe_overclocker_desc$"
