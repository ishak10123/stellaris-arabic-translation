 leader_trait_robotic_surrogate: "Robotischer Ersatzkörper"
 leader_trait_robotic_surrogate_desc: "Dieser schwerfällige und langsame Roboterkörper wird von einem digitalisierten Anführer unseres Identitätsarchivs bewohnt."
 #Buildings
 building_identity_repository: "Identitätsarchiv"
 building_identity_repository_tt: "Dieses Archiv beherbergt §Y[Owner.GetTotalIdentities]§! Identitäten. $building_identity_repository_scaling$"
 building_identity_repository_scaling: "\n\nJede Identität steigert die Produktion und den Unterhalt des Archivs, verteilt auf alle Identitätsarchive auf unseren Planeten.\n"
 building_identity_repository_desc: "Bevor der Körper verfällt, wird der Geist digitalisiert. Zum Wohl der Gesellschaft arbeiten wir sicher geschützt im Inneren weiter."
 building_abandoned_gene_clinic: "Verlassene Genklinik"
 building_abandoned_gene_clinic_tt: "§RKann nicht abgerissen, ersetzt oder repariert werden§!"
 building_abandoned_gene_clinic_desc: "Nachdem wir die Fähigkeit verloren hatten, uns auf natürliche Weise fortzupflanzen, setzte die Medizin ihre Hoffnung auf diese hochmoderne Genklinik, doch wie auch der Großteil unserer anderen Infrastruktur steht diese nun leer und ist eine ständige Erinnerung an unsere Notlage und den dringenden Bedarf an neuen Lösungen."
 #Situation Events
 machine_age.3100.name: "Digitale Errettung"
 machine_age.3100.desc: "Da es kein medizinisches Heilmittel für uns gibt, besteht unsere beste Überlebenschance in der Digitalisierung unserer Bevölkerung und der Verwahrung im §YIdentitätsarchiv§!. Da dies jedoch als Notlösung angesehen wird, ist bereits geplant, synthetische Körper und ein positronisches Gehirn von ausreichender Komplexität zu entwickeln. Wir schätzen, wir haben genug Zeit, um die Forschung mit einer gezielten Anstrengung abzuschließen.\n\nDank modernster KI haben unsere besten Experten bereits eine Blaupause für unsere Roboterkörper erarbeitet und so das Fundament für unsere synthetische Errettung gelegt."
 machine_age.3100.a: "Das muss funktionieren."
 machine_age.3110.name: "Roboterarbeiter"
 machine_age.3110.desc: "Unsere Forschung bezüglich Roboterkörpern ist abgeschlossen. Wir haben die Anlage der verlassenen Genklinik in $building_robot_assembly_plant$ umgewandelt, und die Prototypen wurden aufgewertet und in den Einsatz gebracht. Obwohl diese rudimentären Systeme noch nicht über die notwendige Rechenleistung verfügen, um das Bewusstsein eines Individuums in sich aufzunehmen, lässt sich dadurch zumindest ein Teil unserer verlorenen Arbeitskraft ersetzen. Durch positronische Uplinks bringen die Bewohner des digitalen Reichs ihr Wissen und ihre Erfahrungen in den täglichen Betrieb dieser Roboter ein, was deren Leistung verbessert.\n\nGleichzeitig haben unsere KI-Systeme einen Entwurf für verbesserte Androiden entwickelt. Unsere alternden Techniker sind bereit, zur Tat zu schreiten."
 machine_age.3110.a: "Eine Phase ist abgeschlossen."
 machine_age.3110.a.tooltip: "[Root.Capital.GetName]:\n- §Y$building_robot_assembly_plant$§!: §G+1§!\n- £pop£ §HMechanische Bewohner§!: §G+300§!"
 machine_age.3115.name: "Droidenbeherrschung"
 machine_age.3115.desc: "Durch diese erhebliche Verbesserung unserer Robotertechnologie können wir nun andere Planeten kolonisieren, und unsere mechanisierte Bevölkerung kann komplexere Aufgaben durchführen.\n\nUnseren KI-Systemen zufolge wäre der nächste logischer Schritt das Nachahmen ihrer positronischen Matrizen in synthetischen Körpern. Dieses bedeutende Forschungsprojekt sollte es uns ermöglichen, ein digitalisiertes Bewusstsein wieder in die natürliche Welt zurückzubringen."
 machine_age.3115.a: "Wir dürfen jetzt nicht aufgeben."
 machine_age.3120.name: "Ein letzter Schritt"
 machine_age.3120.desc: "Nach all der harten Arbeit sind wir nun endlich am Ziel. Es wurde ein voll funktionsfähiges positronisches Gehirn entwickelt, das so ausgereift ist, dass es unsere Identitäten in sich aufnehmen kann.\n\nWir können zwar den Tod nicht besiegen, sind aber nicht länger an die Beschränkungen einer biologischen Existenz gebunden."
 machine_age.3120.a: "Die Zeit unserer synthetischen Auferstehung ist gekommen."
 machine_age.3120.a.tooltip: "Um bei diesen Ereignissen Fortschritte erzielen zu können, müssen wir die §YSynthetentraditionen§! annehmen."
 machine_age.3125.name: "Der digitale Traum"
 machine_age.3125.both: "Unsere Montageanlagen und Synthetisierungsexperten sind bereit, sich der monumentalen Aufgabe zu stellen, unsere Identitäten in ein neues positronisches Gehirn zu übertragen."
 machine_age.3125.desc: "$machine_age.3125.both$\n\nWir werden mit jenen beginnen, die sich noch in der physischen Welt befinden, um die Krankheit ein für alle Mal auszurotten. Dank der gesteigerten Verarbeitungsleistung eines synthetischen Gehirns können wir endlich unsere biologischen Fesseln abstreifen.$synth.105.end$"
 machine_age.3125.nobody.desc: "$machine_age.3125.both$\n\nOhne physische Präsenz in der realen Welt sind wir dazu gezwungen, schnellstens den ersten Prototyp zu bauen. Dank der gesteigerten Verarbeitungsleistung eines synthetischen Gehirns können wir endlich unsere biologischen Fesseln abstreifen.$synth.105.end$"
 machine_age.3125.a: "Lasst die Identitätsübertragungen beginnen."
 machine_age.3125.a.tooltip: "Wenn noch biologische Bewohner übrig sind, werden diese nach und nach in synthetische Körper übertragen."
 machine_age.3200.name: "Digitales Fegefeuer"
 machine_age.3200.desc: "Unsere schlimmsten Befürchtungen haben sich bewahrheitet.\n\nAuch unser letzter physischer Körper ist dahingeschieden. Obwohl unsere digitalisierten Bewusstseine im Identitätsarchiv gespeichert sind, fehlt uns die Technologie, um diese in ein künstliches Gehirn zu übertragen.\n\nBis wir unsere Forschung abgeschlossen haben, werden unsere digitalen Anführer über robotische Stellvertreter mit der natürlichen Welt interagieren müssen."
 machine_age.3305.name: "Virtuelle Errettung"
 machine_age.3305.desc: "Wir haben erfolgreich alle Identitäten entweder in einen neuen synthetischen Körper oder in das Identitätsarchiv übertragen und so garantiert, dass unser Volk überdauert.\n\nAllerdings stehen wir nun vor einer neuen Herausforderung. Der virtuelle Raum, den wir erschaffen haben, um unsere digitalen Identitäten zu lagern, war immer nur als vorübergehender Speicher gedacht. Die Bewohner haben sich allerdings nun an diese Existenz gewöhnt und wollen nur widerwillig in die physische Welt zurückkehren.\n\nWir könnten ihnen erlauben, dort zu bleiben, doch die Option, sie in neue synthetische Körper zu zwingen, ist auch eine Alternative."
 machine_age.3305.a: "Lasst sie das Nirwana genießen."
 machine_age.3305.a.tooltip: "Die verbleibenden digitalen Identitäten werden im §Y$building_identity_repository$§! verbleiben und unser Volk aus dessen Inneren weiter unterstützen."
 machine_age.3305.b: "Wir sind stärker, wenn wir zusammenbleiben."
 machine_age.3305.b.tooltip: "Wir werden die verbleibenden digitalen Identitäten in unseren aktuellen Vorrat an synthetischen Körpern übertragen und neue Körper für den Rest bauen. Das §Y$building_identity_repository$§! wird vernichtet."
 machine_age.3310.name: "Synthetische Wiedergeburt"
 machine_age.3310.desc: "Es ist Jahrzehnte her, dass ein [Root.Owner.GetSpeciesName] ein neugeborenes Kind bestaunen durfte. Obschon wir dieses Gefühl wohl nie wieder erleben werden, kehrt heute die Hoffnung für unser Volk zurück.\n\nWir haben §YIdentitätskomplexe§! entwickelt, fortschrittliche Zentren, in denen wir existierende Identitäten kopieren und im Wesentlichen neue Individuen erschaffen können.\n\nWir könnten Persönlichkeitsaspekte mehrerer Individuen zufällig zu neuen Identitäten kombinieren: Die Permutationen wären endlos. Alternativ könnten wir den natürlichen Prozess nachahmen, indem wir \"Bewusstseinssamen\" in einer offenen virtuellen Umgebung aufziehen."
 machine_age.3310.a: "Wir werden unsere Bewusstseine vermengen."
 machine_age.3310.building_tooltip.a.tt: "$unlock_edict_tt$ ['concept_edict_subsidized_identity_backups']\n$unlock_edict_tt$ ['concept_edict_optimized_identity_creation']\n\n$synth.405.a.tt$\n§YNeues Gebäude:§! $building_identity_complex$"
 machine_age.3310.b: "Die Natur hat einige wirklich brauchbare Systeme."
 machine_age.3310.building_tooltip.b.tt: "$unlock_edict_tt$ ['concept_edict_subsidized_identity_backups']\n$unlock_edict_tt$ ['concept_edict_optimized_identity_creation']\n\n$synth.405.b.tt$\n§YNeues Gebäude:§! $building_identity_complex$"
 machine_age.3315.name: "Synthetisches Morgen"
 machine_age.3315.desc: "Heute endet unsere digitale Reise. Niemand kann die gewaltige Tragweite dessen bestreiten, was vollbracht wurde, oder die gewaltigen Opfer, die dafür nötig waren.\n\nNun sind wir zu einem vollständig digitalisierten und synthetischen Volk aufgestiegen. Wir sind nicht mehr den Schrecken einer Krankheit ausgesetzt, und die Grenzen schwächlicher Genetik gelten nicht mehr für uns.\n\nUns steht es frei, jede Realität zu erschaffen, die uns gefällt."
 machine_age.3315.a: "Gepriesen sei das synthetische Morgen."
 machine_age.3315.a.tooltip: "Beendet die Ereigniskette: §Y$origin_synthetic_fertility$§!"
 machine_age.3315.a.tt: "§Y[This.Owner.GetSpeciesName]§! erhält die Eigenschaft \"['concept_synthetic_dawn']\""
 synthetic_dawn: "Synthetischer Aufstieg"
 synthetic_dawn_desc: "Wir sind als vollständig digitalisiertes und synthetisches Volk aufgestiegen. Wir sind in der Lage, jede Realität zu erschaffen, die wir für richtig halten."
 trait_robot_synthetic_dawn: "Synthetische Errettung"
 trait_robot_synthetic_dawn_desc: "Diese synthetische Spezies hat ihren biologischen Ursprung hinter sich gelassen und gedeiht in ihrer neuen digitalen Existenz."
 concept_synthetic_dawn: "$trait_robot_synthetic_dawn$"
