 civic_tooltip_pleasure_seekers_effects_machines: "Erlaubt den Lebensstandard \"§Y$living_standard_decadent$§!\", der allen betroffenen £pop£ §HBewohnern§! eine höhere £happiness£ §YZufriedenheit§! gibt, aber auch einen höheren £consumer_goods£ §Y$consumer_goods$§!-Unterhalt.\nBewohnermontage Mechanischer Bewohner durch Unterhalter: §G+1%§!\n£job_servant£ §Y$job_servant_plural$§! produzieren §Y5§! zusätzliche £amenities£ §YDienstleistungen§!."
