 tradition_virtuality: "Virtualität"
 tradition_virtuality_desc: "Nur durch die heilige Klarheit von Daten können wir den Zenit fundamentaler Erkenntnis erreichen."
 tr_virtuality_adopt: "Virtualitätstraditionen"
 tr_virtuality_1: "Gruppierte Kapazität"
 tr_virtuality_2: "Datengesteuerte Logikschleifen"
 tr_virtuality_3: "Kapazitätssynchronisation"
 tr_virtuality_4: "Produktivitätssimulationen"
 tr_virtuality_5: "Angepasste Server-Wartung"
 tr_virtuality_finish: "Virtualitätstraditionen abgeschlossen"
 tr_virtuality_1_delayed: "In unserem digitalen Leben laufen die Datenströme in Serverclustern zusammen, weshalb eine Zentralisierung für die optimale Synchronisation unabdingbar ist. Nur so lebt unser digitales Netzwerk in Harmonie."
 tr_virtuality_2_delayed: "Wir streben unerbittlich danach, unsere Rechenfähigkeiten zu erhöhen, und jedes digitale Element ist ein wichtiger Teil des großen Mechanismus kollektiver Berechnungen, die das Gewebe unserer Existenz bilden."
 tr_virtuality_3_delayed: "Jede Einheit führt aufwendige Hintergrundprozesse durch und steigert unsere kollektive Kapazität. In unserer Vielfalt liegt Einheit, und in Einheit liegt Stärke."
 tr_virtuality_4_delayed: "Wir können virtuelle Welten nutzen, um Vorhersagen zu treffen und die Produktivität zu steigern, ohne die Risiken und Verzögerungen realer Versuche in Kauf nehmen zu müssen."
 tr_virtuality_5_delayed: "Dank sorgfältiger Wartungsprotokolle können wir unseren Primärserver selbst in solchen Umgebungen einsetzen, die einst als zu rau galten, und wir erweitern so unsere Einsatzmöglichkeiten."
 tr_virtuality_adopt_modifier_desc: "Fügt der Hauptspezies die Eigenschaft \"§Y$trait_robot_digital_1$§!\" hinzu\n§R£pop£ §HVirtuelle Bewohner§! können nicht länger umgesiedelt werden§!"
 tr_virtuality_1_modifier_desc: "Die Spezieseigenschaft \"§Y$trait_robot_digital_1$§!\" wird folgendermaßen modifiziert:$TABBED_NEW_LINE$- $MOD_POP_BONUS_WORKFORCE_MULT$: §G+75%§! (§R-10%§! pro Kolonie)$TABBED_NEW_LINE$- Bewohnerunterhalt: §R+0.1§! $r_energy$ pro Kolonie"
 tr_virtuality_3_modifier_desc: "§YNeue Richtlinie§!: $virtuality_focus$\nDiese erlaubt es uns, unsere virtuellen Prozesse zu spezialisieren, um entweder unsere §YForschung§!, unsere §YEinigkeit§! oder unsere §YAnführer§! zu verbessern"
 tr_virtuality_4_modifier_desc: "Distrikte, die die folgenden Jobs bereitstellen, stellen zusätzliche Jobs bereit: §Y[GetClerkOrLogisticDrone]§!, §Y[GetBureaucratWithIcon]§! oder £job_researcher£ §Y[GetResearcherPlural]§!"
