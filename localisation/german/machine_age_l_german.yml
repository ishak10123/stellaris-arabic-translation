 #Traits
 trait_pathogenic_genes: "Pathogene Gene"
 trait_pathogenic_genes_desc: "Eine neuartige Genkrankheit verhindert, dass diese Spezies Nachkommen zeugen kann. Die Krankheit ist gegen alle bekannten Methoden der Gentherapie immun."
