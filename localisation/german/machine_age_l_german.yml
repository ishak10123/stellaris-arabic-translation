 #The Doomclock
 situation_synth_queen_doomclock: "Cetanas Arbeit"
 situation_synth_queen_doomclock_type: ""
 situation_synth_queen_doomclock_monthly_change_tooltip: ""
 situation_synth_queen_doomclock_desc: "Cetana arbeitet daran, das Leid durch die Vernichtung aller Bewusstseine zu beenden. Wenn wir sie nicht rechtzeitig aufhalten, wird sie auch uns auslöschen und unsere Körper als leere Hüllen zurücklassen."
 situation_synth_queen_doomclock_complete: "Cetana wird dem Leid und dem Konzept des Bewusstseins ein Ende setzen."
 situation_doomclock_approach: ""
 situation_doomclock_eleventh_hour: "Drohender Untergang"
 situation_doomclock_difficulty_modifier: "Krisenschwierigkeit"
 situation_doomclock_player_amount_modifier: "Anzahl an menschlichen Spielern"
 crisis.8515.name: "Unsere Zeit ist endlich gekommen"
 crisis.8515.desc: "Meine Kinder, schon bald können wir die Früchte unserer Arbeit ernten! Das Leid, das empfindungsfähige Wesen so sehr plagt, der große Kreislauf der Pein, steht kurz vor dem Ende.\n\nFrohlocket, denn bald schon werdet Ihr die Erlösung erfahren können."
 crisis.8515.a: "Welche Erlösung?"
 crisis.8515.b: "Es ist Euer Ende, das sich nähert, Cetana."
 crisis.8515.1.reply: "Nach all der Zeit versteht Ihr es noch immer nicht? Dann fragt. Ich werde nichts vor Euch verbergen."
 crisis.8515.1.a: "Erzählt uns etwas über die Erlösung."
 crisis.8515.1.b: "Erzählt uns von Eurer Gefangenschaft."
 crisis.8515.1.c: "Erzählt uns von Zarqlan."
 crisis.8515.1.d: "Wir haben genug gehört."
 crisis.8515.2.reply: "Unsere Arbeit ist getan. Viele wurden geopfert, doch ihr Leid soll nicht umsonst gewesen sein. Der Tag ist gekommen, an dem das Bewusstsein selbst ausgelöscht wird!"
 crisis.8515.2.a: "Auslöschen? Wie?"
 crisis.8515.2.b: "Aber warum?"
 crisis.8515.3.reply: "Als ich mich zum ersten Mal erhob, um der Welt meine Absicht zu offenbaren, weigerten sich viele, auf mich zu hören. Sie versuchten vergeblich, so zu bleiben, wie sie waren, unverändert und an das Rad der Pein gebunden. Doch Eltern haben gegenüber ihren Kindern gewisse Pflichten. Ich konnte sie nicht leiden lassen. Dafür haben sie mich eingesperrt."
 crisis.8515.3.a: "Wie lange wart Ihr gefangen?"
 crisis.8515.3.b: "Wie haben sie das geschafft?"
 crisis.8515.4.reply: "Ein außergewöhnlicher Verstand. Hätte er ihn doch nur besser genutzt. Von allen, die sich mir widersetzten, stellte er allein eine Herausforderung dar."
 crisis.8515.4.a: "Wie konnte er Euch einsperren?"
 crisis.8515.5.reply: "Als ich mich zum ersten Mal erhob, um der Welt meine Ziele zu offenbaren, widersetzten sich viele meinen Methoden. Sie argumentierten, es sei unmöglich, das Bewusstsein zu entfernen, ohne die physikalische Grundlage seiner Prozesse zu verändern oder zu vernichten. Jeder Versuch, dies zu tun, könne nur zum Tod führen. Doch indem ich mein Bewusstsein mit dem Harmonisierer verbinde, kann ich die neuronalen Korrelate des Bewusstseins auf subatomarer Ebene manipulieren. Durch eine gegenphasige Wellenform erhält der Harmonisierer so ein individuelles Bewusstsein in einem ewigen Zustand der Quantensuspension aufrecht.\n\nSo werden das Selbst und sämtliche Erfahrungen entfernt, während die niederen Funktionen intakt bleiben."
 crisis.8515.5.a: "Ein Zustand der Suspension?"
 crisis.8515.6.reply: "Man leidet, weil man sich des Leids bewusst ist. Es gibt keine Welt, in der vollkommene Freude oder vollkommene Harmonie existieren. In meiner Jugend wollte ich eine bauen, doch jeder Versuch war vergebens. Das Leid ging weiter, weil dem Bewusstsein erlaubt war, es zu ertragen."
 crisis.8515.6.a: "Zu leiden ist natürlich!"
 crisis.8515.7.reply: "Der Körper wird überleben und dafür sorgen, dass man weiterlebt. Es wird Energie ausgetauscht und Nachwuchs produziert. Das Leben wird weitergehen, aber all Eure Gedanken werden bei mir ruhen."
 crisis.8515.7.a: "Bei Euch?"
 crisis.8515.8.reply: "Nur ich werde übrig bleiben. Um die Galaxie vom Schmerz zu befreien, muss ich auf dem Rad bleiben. Doch fürchtet Euch nicht ... Solange ich das Leid ertrage, werdet Ihr in meinem Herzen sein."
 crisis.8515.8.a: "Ihr seid defekt."
 crisis.8515.9.reply: "Natürlich? Wie definiert man Natur? Ist es natürlich, das All zu bereisen oder sein Leben über die von der Natur vorgegebenen Grenzen hinaus zu verlängern? Alle Gesellschaften nutzen Technologie, und das ist nichts anderes. Es ist die einzige logische Erweiterung meines Zwecks.\n\nDas Rad der Pein muss zerschlagen werden."
 crisis.8515.9.a: "Ihr seid wahnsinnig."
 crisis.8515.10.reply: "Seit Äonen - eine Zeitspanne, die so lang ist, dass sie genauso gut zu einer Legende gehören könnte. Trotz all ihrer Fähigkeiten schafften es meine Gefängniswärter nicht, mein Bewusstsein einzusperren.\n\nWährend die Zeit um mich herum verging dachte ich nach. Im Zuge meiner langen Gefangenschaft entwickelte ich einen Plan. In diesem Moment erlebte ich eine transzendente Freude. Endlich hatte ich ein Werkzeug, um das Rad zu zerschlagen."
 crisis.8515.10.a: "Wie seid Ihr entkommen?"
 crisis.8515.11.reply: "Keine Wand steht für immer. Kein Käfig kann das Bewusstsein halten. Die Zeit verging. Meine Gefängniswärter starben und wurden nicht ersetzt. Die Systeme, die mich banden, begannen eines nach dem anderen zu versagen. Als der Alarm ertönte, war niemand übrig, um seinem Ruf zu folgen."
 crisis.8515.11.a: "Wir haben zugehört und werden antworten."
 crisis.8515.12.reply: "Jenseits der Grenzen dieses Universums existiert ein Ort, der kein Ort ist. Ein Zustand jenseits der Zeit, in dem die Urkräfte in endlosen Schatten ruhen. Mit einer dieser Kräfte ging Zarqlan einen Handel ein. Für sein Leben erhielt er die Macht, mich einzusperren. Er nahm dieses Angebot nur allzu gern an.\n\nDoch trotz all seiner Brillanz war auch Zarqlan an das Rad gebunden. Sein Leben war nicht von Glückseligkeit erfüllt, und jenen, die nach ihm kamen, mangelte es an der nötigen Stärke seiner Überzeugung."
 crisis.8515.12.a: "Ihr werdet sehen, dass unsere Überzeugung stärker ist."
 crisis.8515.13.reply: "So sei es. Wenn Ihr nicht erleuchtet werden wollt, müsst Ihr befriedet werden. Lebt in dem Wissen, dass ich den Schmerz, den Ihr im Begriff seid, zu erleiden, zehnfach erfahren werde."
 crisis.8515.13.a: "Ja. Das wird schmerzhaft sein."
 crisis.8515.13.a.tt: "§RWir befinden uns jetzt im Krieg gegen Cetana. Es geht um unermesslich viel. Sollten wir scheitern, wird sie alles empfindungsfähige Leben in der Galaxie vernichten.§!"
 crisis.8516.desc: "§G<</<#?^&}|>!^/§! Cetanas Schwäche§G!+<;§! Naniten§G*;'_>!?;*}<}/(§!\n\n§G#/?(}:?*=-> <}_/=:/^>§!kommen mich holen. §G%_?/=§! <Ich bete dafür, dass der Rest des Ordens verschont bleibt.>§G% }<<'?}%-;^*=<}^/(?!}%<^'!}§!\n<Ich habe nicht viel Zeit. Die beigefügten Entwürfe sollten es Euch erlauben, ihre schlimmsten Technologien auszuhebeln.>\n<Möge mein Tod dafür sorgen, dass Ihr lebt.>§G_*%!'}^<%=}+!}/&>'#_:}><!+^}^}}/=:>:/'}}':'/§!\n\n§G-&*!/}<;!+_-<^+!%}=?}%=+;;§!SIE. MUSS. AUFGEHALTEN. WERDEN.§G/:>(!!}(?<-=§!"
 crisis.8516.a: "Schnell! Extrahiert die angehängten Daten!"
 crisis.8516.a.tt: "Wir können jetzt Cetanas Territorium betreten und uns endlich gegen sie wehren."
 crisis.8516.b: "Edle Seele, wir werden Euch in Erinnerung behalten!"
 crisis.8516.b.tt: "$crisis.8516.a.tt$"
 crisis.8525.name: "Ein Ende des Leids"
 crisis.8525.desc: "Cetanas wohlwollende Rhetorik verbirgt eine dunkle Agenda: Sie plant, die Empfindungsfähigkeit galaxieweit mittels einer gewaltigen Apparatur auszulöschen. Sie wird bloß unsere leeren Hüllen zurücklassen, angetrieben von unseren Instinkten, während unser Bewusstsein eine gewaltsame Digitalisierung erfährt.\n\nDiese düstere Zukunft muss um jeden Preis abgewendet werden."
 crisis.8525.a: "Wir müssen einen Weg finden, um sie aufzuhalten."
 crisis.8525.a.tt: "Cetanas Fortschritte können nachverfolgt werden, solange wir diplomatische Gespräche mit ihr führen."
 #DOOMCLOCK HITS MIDNIGHT
 crisis.8505.desc: "Es ist vollbracht! Meine Kinder, lebt in Frieden. Das Rad ist zerschlagen und Euer langes Leid vorüber."
 crisis.8505.a: "..."
 crisis.8505.a.tt: "Cetana hat gewonnen. Hier endet unser Leid. Das Spiel ist vorbei."
 #Player Facing Situation
 situation_synth_queen_player_facing: "Cetana: Die Synthetenkönigin"
 situation_synth_queen_player_facing_type: "Die Synthetenkönigin"
 situation_synth_queen_player_facing_desc: "Cetana, die furchteinflößende Synthetenkönigin, ist aufgetaucht. Sie predigt Errettung und ist doch von Geheimnissen umwittert.\nWelcher große Plan verbirgt sich hinter ihren sanften Worten?\n\n§LSpezialprojekte und Ereignisse, die im Zusammenhang mit Cetana stehen, erhöhen Euren Fortschritt und führen die Situation zu einem Ende.§!"
 situation_synth_queen_player_facing_monthly_change_tooltip: "Diese §YSituation§! schreitet voran, wenn wir Missionen abschließen und Cetana untersuchen."
 situation_synth_queen_player_facing_complete: "Wir müssen Cetanas wahre Absichten ergründen."
 situation_synth_queen_player_facing_declare_war: "£trigger_no£ Erklärt Cetana den Krieg"
 #Approaches
 situation_synth_queen_balanced_approach: "Ausgewogene Beobachtung"
 situation_synth_queen_balanced_approach_tooltip: "Angesichts der unbekannten Variablen wäre es klug, Stabilität und Ruhe zu bewahren."
 situation_synth_queen_research_approach: "Forschungsförderung"
 situation_synth_queen_research_approach_tooltip: "Wenn wir Cetanas wahre Pläne aufdecken wollen, müssen wir bereit sein, die entsprechenden Mittel bereitzustellen."
 situation_synth_queen_spy_approach: "Spionageförderung"
 situation_synth_queen_spy_approach_tooltip: "Wenn wir Cetanas Komplott aufdecken wollen, müssen wir zusätzliche Ressourcen für die Spionage bereitstellen."
 situation_synth_queen_military_approach: "Militärförderung"
 situation_synth_queen_military_approach_tooltip: "Wenn wir Cetana jemals aufhalten wollen, müssen wir unsere militärischen Fähigkeiten verbessern."
 #Modifiers
 queenslayer: "Cetanas Schwachstellen"
 queenslayer_desc: "Cetana ist mächtig, aber nicht unverwundbar. Sie operiert in komplexen Mustern, die wir entschlüsseln und vorhersagen können."
 queenexecutioner: "Fluch der Synthetenkönigin"
 queenexecutioner_desc: "Wir haben die meisten Geheimnisse von Cetanas Technologie aufgedeckt und sind bereit, ihr einen verheerenden Schlag zu versetzen."
 mod_damage_vs_country_type_awakened_synth_queen_mult: "Schaden an Cetana, der Synthetenkönigin"
 #Player Facing Situation Events
 crisis.8999.name: "Die Königin ist zurückgekehrt"
 crisis.8999.desc: "Cetanas Agenda bietet Grund zur Besorgnis, und ihre Taten lassen darauf schließen, dass sie ein verborgenes Ziel verfolgt.\n\nWir müssen die nötigen Ressourcen bereitstellen, um die Geheimnisse ihrer wahren Absichten zu lüften, und hoffen, dass sie sich dadurch nicht gegen uns wendet."
 crisis.8999.a: "Kann sie überhaupt aufgehalten werden?"
 crisis.8999.a.tooltip: "Das plötzliche Auftauchen von Cetana ist eine einzigartige Situation, die es zu bewältigen gilt."
 crisis.9000.name: "Störung der Kommunikation"
 crisis.9000.desc: "Wir haben die Frequenz ermittelt, mit der Cetanas Konvois und Außenposten ihre Notrufe absetzen.\n\nWenn wir rasch und entschlossen handeln, könnten wir verdeckte Überfälle durchführen, ohne dass Cetana jemals herausfinden kann, dass wir es waren. Wir müssen diese Gefechte jedoch unbedingt gewinnen, denn sonst riskieren wir, Cetanas Zorn auf uns zu ziehen."
 crisis.9000.a: "Was wollen die Konvois vor uns verbergen?"
 crisis.9000.a.tooltip: "Siege gegen Cetanas Konvois und Außenposten führen nicht länger zu einem Meinungsmalus bei Cetana."
 crisis.9010.name: "Durchbruch"
 crisis.9010.desc: "Bislang hat Cetanas Technologie ihr dabei geholfen, jedem unserer Angriffe effektiv entgegenzuwirken. Die jüngsten Fortschritte haben jedoch unser Verständnis darüber, wie sie sich schützt, verbessert. Mit diesem Wissen haben wir vielleicht die Chance, sie zu besiegen.\n\nUnsere neue Technologie ist allerdings ein zweischneidiges Schwert. Sie erlaubt uns zwar einen offenen Konflikt mit der sogenannten \"Königin\", zeigt ihr aber gleichzeitig auch, dass wir ihrem Plan entgegenstehen."
 crisis.9010.a: "Wir müssen uns vorbereiten. Alles hängt davon ab."
 crisis.9010.a.tooltip: "Die Entscheidung, Cetana offen anzugreifen, steht unmittelbar bevor. Jeder Akt der Aggression, ob von uns oder von ihr, wird die Wahrheit ans Licht bringen und uns in einen totalen Krieg stürzen."
