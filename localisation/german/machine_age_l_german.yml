 cosmogenesis_needle: "$NAME_Cosmogenesis_Sphere$"
 cosmogenesis_needle_DESC: "Dieses Schiff verstößt augenscheinlich gegen die Gesetze des Universums: Es verfügt über Möglichkeiten, die Realität zu bearbeiten. Es soll den Ereignishorizont eines schwarzen Lochs durchstoßen und ins Herz der Singularität eindringen können, wo unendliche Dichte zu unendlicher Schwerkraft führt."
 cosmogenesis_needle_MEGASTRUCTURE_DETAILS: "Um eine Realität betreten zu können, die wir selbst erschaffen haben, müssen wir unsere gesamte Zivilisation an Bord der Horizontnadel bringen, bevor wir dieses Universum endgültig verlassen."
