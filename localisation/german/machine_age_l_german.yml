 advanced_logic: "Fortschrittliche Logik"
 advanced_logic_name: "$advanced_logic$:"
 advanced_logic_value: "£advanced_logic£ $VAL|0$"
 advanced_logic_gaining: "Schließt §HKrisenziele§! ab, um mehr £advanced_logic£ §YFortschrittliche Logik§! zu erhalten."
 advanced_logic_desc: "Die \"Fortschrittliche Logik\" misst unser Verständnis über die größten Geheimnisse des Universums."
 advanced_logic_crisis_objective: "Krisenziele"
 advanced_logic_crisis_objective_gained: "Fortschrittliche Logik erhalten"
 advanced_logic_crisis_objective_reward: "$REWARD$"
 advanced_logic_crisis_objective_progress: "Wir haben £advanced_logic£ $AMOUNT$ durch dieses Krisenziel erhalten."
 advanced_logic_crisis_level_locked: "Folgendes wird benötigt, um diese Stufe freizuschalten:\n"
 advanced_logic_crisis_level_unlocked: "Auf der Stufe \"$LEVEL$\" erhaltet Ihr diese Belohnungen:\n"
 advanced_logic_crisis_level_desc: "Um in den Krisenstufen voranzukommen, müsst Ihr Fortschrittliche Logik sammeln und die speziellen Krisentechnologien erforschen."
 advanced_logic_crisis_level_unlock: "Hat £advanced_logic£ §Y$CURRENCY$§! Fortschrittliche Logik"
 advanced_logic_current_value: "Derzeitiger Wert: §Y$VALUE|0$§!"
 advanced_logic_crisis_description_title: "Kosmogenese"
 advanced_logic_crisis_description: "$menace_crisis_description_intro$\n\nGefallene Reiche verfügen über das Wissen, das wir suchen, doch sie sind abgestumpft und faul geworden. Es ist unser Recht, sie zu übertreffen, ganz egal, mit welchen Mitteln."
 advanced_logic_crisis_howto_title: "Logik und Thesen"
 advanced_logic_crisis_howto: "Durch das Verfolgen von §HKrisenzielen§! wird £advanced_logic£ §HFortschrittliche Logik§! generiert, die das technologische Potenzial unseres Reichs entfesselt. Bei unserem Bestreben, die Gefallenen Reiche zu übertreffen, müssen wir irgendwann §HThesen§! aufstellen und die Gesetze des Universums umschreiben."
