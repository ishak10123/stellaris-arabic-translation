 machine_age.govswapnotice: "Damit sie zur Verschmelzung unserer Körper passt, wird unsere Regierung nun die Kybernetik vollständig annehmen und einer Umstrukturierung unterzogen werden. §Y[Owner.GetGovernmentName]§! wird entstehen."
