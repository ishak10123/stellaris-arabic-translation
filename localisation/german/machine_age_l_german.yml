 CYBERCREED_war: "Der Templerorden des Stahls&!M|||NOM:Templerorden des Stahls|||GEN:Templerordens des Stahls|||DAT:Templerorden des Stahls|||AKK:Templerorden des Stahls"
 CYBERCREED_research: "Der Chor des Bewusstseins&!M|||NOM:Chor des Bewusstseins|||GEN:Chors des Bewusstseins|||DAT:Chor des Bewusstseins|||AKK:Chor des Bewusstseins"
 CYBERCREED_labor: "Die Kommune der Arbeitsamkeit&!F|||NOM:Kommune der Arbeitsamkeit|||GEN:Kommune der Arbeitsamkeit|||DAT:Kommune der Arbeitsamkeit|||AKK:Kommune der Arbeitsamkeit"
 pft_cyber_creed_labor: "Die Kommune der Arbeitsamkeit"
 pft_cyber_creed_labor_desc: "Die Kommune der Arbeitsamkeit betreut pflichtbewusst jeden bescheidenen Arbeiter und dessen Augmentierungen, und der tiefe Glaube an die Göttlichkeit harter Arbeit spornt sie an. Nur jene, die sich um seine Wurzeln kümmern, können das Göttliche begreifen.\n\n§LSpiritualistische Ethik§!"
 cyber_creed_labor: "Die Kommune der Arbeitsamkeit"
 pft_cyber_creed_war: "Der Templerorden des Stahls"
 pft_cyber_creed_war_desc: "Der Templerorden des Stahls bewacht unsere geheiligten Leiber, unsere Kybernetik und unsere Seelen. Augmentierungen ergänzen die harte Ausbildung und das Kampfgeschick der Templer.\n\n§LSpiritualistische Ethik§!"
 cyber_creed_war: "Der Templerorden des Stahls"
 pft_cyber_creed_construction: "Die Gemeinschaft des Hammers"
 pft_cyber_creed_construction_desc: "Die Gemeinschaft des Hammers stellt die hochwertigsten Materialien her. Ihre Augmentierungen verbessern die Handwerker unseres Reichs.\n\n§LSpiritualistische Ethik§!"
 cyber_creed_construction: "Die Gemeinschaft des Hammers"
 pft_cyber_creed_research: "Der Chor des Bewusstseins"
 pft_cyber_creed_research_desc: "Der Chor des Bewusstseins ist ein Quasi-Schwarmkollektiv von Forschern und Technikern. In ihrer meditativen Trance können sie ohne Zeitverlust Informationen mit anderen Anhängern des Credos austauschen.\n\n§LSpiritualistische Ethik§!"
 cyber_creed_research: "Der Chor des Bewusstseins"
 pft_cyber_creed_general: "Die Vereinten Credos"
 pft_cyber_creed_general_desc: "Die Vereinten Credos, geführt von einer Koalition Heiliger Technophanten, hat alle extremen Glaubensrichtungen ausgemerzt. Dennoch bleibt ihre Hingabe an die heilige Verschmelzung felsenfest, frei von jener dogmatischen Vergangenheit, die ihren Ruhm mindern wollte.\n\n§LSpiritualistische Ethik§!"
