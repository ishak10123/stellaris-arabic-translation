 building_amphitheater_of_the_mind: "Amphitheater des Bewusstseins"
 building_amphitheater_of_the_mind_desc: "Dieser lokale Verarbeitungsschrein ermöglicht es dem semi-verbundenen Chor des Bewusstseins, die Geheimnisse der stofflichen Ebene in Lichtgeschwindigkeit zu besprechen, zu teilen und zu erforschen."
 building_grand_concert_hall_of_the_mind: "Die Große Konzerthalle des Bewusstseins"
 building_grand_concert_hall_of_the_mind_desc: "Das hochmoderne Kommunikationsarray in diesen resonanten Hallen ermöglicht es dem Chor des Bewusstseins, auf der Suche nach Göttlichkeit miteinander zu kommunizieren. Durch Cyberware vereint wird sein Gesang die versteckten Melodien des Universums enträtseln."
 building_forge_of_the_fellowship: "Schmiede der Gemeinschaft"
 building_forge_of_the_fellowship_desc: "Hier stellt die erste Schmiede der Gemeinschaft des Hammers die hochwertigsten Baumaterialien her. Hämmer singen, während die Gläubigen ihr göttliches Werk verrichten."
 building_grand_forge_of_the_fellowship: "Große Schmiede der Gemeinschaft"
 building_grand_forge_of_the_fellowship_desc: "Noch weit fernab der Hallen der Großen Schmiede hören die Gläubigen die Litanei der niemals ruhenden Werkzeuge der Gemeinschaft. Nachts leuchtet die verzierte Schmiedekathedrale heller als die Sterne über ihr, wie auch unsere heiligen Funken für das Göttliche leuchten."
 building_battlement_of_steel: "Zinnen des Stahls"
 building_battlement_of_steel_desc: "Diese Kirchenfestung beherbergt sowohl das Arsenal als auch das Trainingsgelände des gefechtsbereiten Templerorden des Stahls. Die Templer sind stets wachsam und verteidigen unser göttliches Fleisch."
 building_grand_battlements_of_steel: "Die Großen Zinnen des Stahls"
 building_grand_battlements_of_steel_desc: "Mögen die gewaltigen Mauern dieser großen Festungskathedrale niemals bröckeln. Ihr Arsenal ist bis zum Bersten gefüllt mit den heiligen Implantaten des Templerordens des Stahls, der auf seine geweihten Helden wartet. Diesen Hallen wohnt die Göttlichkeit der Schnittstelle zwischen Fleisch und Stahl inne."
 building_sanctuary_of_toil: "Sanktuarium der Arbeitsamkeit"
 building_sanctuary_of_toil_desc: "In diesem Sanktuarium werden das Fleisch und die Augmentierungen der Kommune der Arbeitsamkeit koordiniert, repariert und verjüngt."
 building_grand_cathedral_of_toil: "Große Kathedrale der Arbeitsamkeit"
 building_grand_cathedral_of_toil_desc: "Gesegnet seien jene, die sich um die Bedürfnisse der Gläubigen kümmern. Ihre müden Seelen sollen sich in der Großen Kathedrale der Arbeitsamkeit ausruhen, deren Werkstätten und Koordinationszentren die getreuen Arbeiter und ihre heiligen Augmentierungen in all ihren göttlichen Pflichten anleiten und erquicken."
 building_the_sanctum_of_augmentation: "Heiligtum der Augmentierung"
 building_the_sanctum_of_augmentation_desc: "Im Geist des gemeinsam geteilten Glaubens steht dieses verehrte Heiligtum als Symbol der Einigkeit. In diesen geweihten Kammern kümmern sich die Gläubigen um die Seelen und Augmentierungen der Gemeinde."
 building_the_united_sanctum_of_augmentation: "Vereintes Heiligtum der Augmentierung"
 building_the_united_sanctum_of_augmentation_desc: "Dieses majestätische Heiligtum ist ein lebendiges Zeugnis der Huldigung der heiligsten Verschmelzung. In seinen geweihten Kammern versammeln sich die Gläubigen in unerschütterlicher Hingabe an die göttliche Verschmelzung."
 #Advanced Cyber Creed Authorities
 auth_cyber_creed_democratic: "Demokratische Augmentokratie"
 auth_cyber_creed_democratic_desc: "Demokratische kybernetische Regierungen haben heilige Wahlrechte, die es augmentierten Bürgern erlauben, ihren Stimmen in diversen politischen Angelegenheiten Gehör zu verschaffen und so ihrer Verbundenheit mit dem Göttlichen gerecht zu werden."
 concept_auth_cyber_creed_democratic: "$auth_cyber_creed_democratic$"
 auth_cyber_creed_oligarchic: "Oligarchische Kybertheokratie"
 auth_cyber_creed_oligarchic_desc: "In oligarchischen kybernetischen Regierungen gibt es eine privilegierte Gruppe hochgradig augmentierter Individuen, die über die gesamte politische Macht verfügen und ihre kybernetische Gesellschaft mit einzigartiger Präzision lenken."
 concept_auth_cyber_creed_oligarchic: "$auth_cyber_creed_oligarchic$"
 auth_cyber_creed_dictatorial: "Diktatorische Synthodoxie"
 auth_cyber_creed_dictatorial_desc: "Diktatorische kybernetische Regierungen wählen Herrscher auf Lebenszeit, die dank fortschrittlicher kybernetischer Implantate über eine absolute Kontrolle verfügen, auch und gerade über das Schicksal der gesamten Gesellschaft."
 concept_auth_cyber_creed_dictatorial: "$auth_cyber_creed_dictatorial$"
 auth_cyber_creed_imperial: "Kybernat-Imperium"
 auth_cyber_creed_imperial_desc: "Imperiale kybernetische Regierungen haben einen obersten Herrscher, der seinen eigenen Nachfolger wählt, um eine nahtlose Machtübergabe zu gewährleisten. Diese Regierungen vereinen Spiritualität und fortschrittliche Kybernetik zu einer standhaften Herrschaft."
 concept_auth_cyber_creed_imperial: "$auth_cyber_creed_imperial$"
 auth_cyber_creed_corporate: "SakralTech-Konzern"
 auth_cyber_creed_corporate_desc: "Kybernetische Konzernregierungen lassen dank fortschrittlicher Implantate und dem Verschmelzen von Glauben und Technologie traditionelle Staatsrollen hinter sich. Das Ziel sind göttliche finanzielle Möglichkeiten."
 concept_auth_cyber_creed_corporate: "$auth_cyber_creed_corporate$"
 #Advanced Cyber Creed Government Types
 gov_cyber_creed_monarchy: "Kybernetische Souveränität"
 gov_cyber_creed_monarchy_desc: "Diese Regierung ist eine techno-spiritualistische Monarchie, in der der Herrscher und seine Nachkommen göttliche Symbole der heiligen Verschmelzung sind. Die Kirche unterstützt direkt den Staatsapparat."
 gov_cyber_creed_dictatorship: "Göttliche Technokratie"
 gov_cyber_creed_dictatorship_desc: "Diese Regierung ist eine techno-spiritualistische Diktatur, in der ein einzelnes augmentiertes Individuum in einer hierarchischen Machtstruktur und mit Unterstützung des Staatsglaubens herrscht."
 gov_cyber_creed_oligarchy: "Rat der Technophanten"
 gov_cyber_creed_oligarchy_desc: "Diese Regierung ist eine techno-spiritualistische Form der Oligarchie, in der die politische Macht ganz bei den mächtigsten religiösen Fraktionen der Nation liegt."
 gov_cyber_creed_democracy: "Transzendente Republik"
 gov_cyber_creed_democracy_desc: "Diese Regierung ist eine techno-spiritualistische Form der Demokratie. Hier wird der Demokratisierungsprozess von einem klerikalen Rat augmentierter Individuen überwacht."
 gov_cyber_creed_divine_empire: "Göttliches augmentiertes Imperium"
 gov_cyber_creed_divine_empire_desc: "Diese Regierung ist eine Form der techno-spiritualistischen Autokratie. Die offizielle Staatsreligion zieht sich durch jeden Aspekt des öffentlichen Lebens, und das Volk betrachtet seinen augmentierten Herrscher als unfehlbaren lebendigen Gott."
 gov_cyber_creed_holy_tribunal: "Tribunal der Technophanten"
 gov_cyber_creed_holy_tribunal_desc: "Diese Regierung ist eine techno-spiritualistische Form der Oligarchie, in der ein vom Willen des Göttlichen geleiteter klerikaler Rat alle Mechanismen des Staates lenkt."
 gov_cyber_creed_megachurch: "Augmentierte MegaKirche"
 gov_cyber_creed_megachurch_desc: "Diese Regierung ist eine Oligarchie, die auf einer Mischung kommerzieller und techno-spiritualistischer Werte beruht und in der die Posten ordinierter Priester und Vorstandsmitglieder zu einer einzigen Rolle verschmolzen sind."
 gov_cyber_creed_subversive_cult: "Maschinenkult"
 gov_cyber_creed_subversive_cult_desc: "Diese Regierung ist ein religiöser Kult, der sich auf verschiedene kriminelle und korporative Unternehmungen mit einem Schwerpunkt auf Kybernetik stützt."
 #Advanced Government Edicts
 edict_cybernetic_creed_construction_edict: "Ein tugendhaftes Hämmern"
 edict_cybernetic_creed_construction_edict_desc: "Für eine göttliche Gesellschaft müssen wir die Gemeinschaft des Hammers voll und ganz unterstützen. Ihre Arbeit ist der Schlüssel zu einer Zukunft, die das Göttliche verdient."
 edict_cybernetic_creed_war_edict: "Der Kreuzzug des Stahls"
 edict_cybernetic_creed_war_edict_desc: "Um uns vor jenen zu schützen, die unser göttliches Fleisch angreifen, müssen wir den Templerorden des Stahls voll und ganz unterstützen. Nur er stellt sicher, dass unsere Krieger allzeit bereit sind."
 edict_cybernetic_creed_research_edict: "Das Lied des Wissens"
 edict_cybernetic_creed_research_edict_desc: "Nur durch ein lebhaftes Lied des Wissens wird unser Volk das Göttliche jemals wirklich erkennen. Wir müssen unseren weisen Chor des Bewusstseins in all seinen Bemühungen unterstützen."
 edict_cybernetic_creed_construction_labor: "Die arbeitende Masse"
 edict_cybernetic_creed_construction_labor_desc: "Unsere wahre Stärke liegt in unseren Arbeitern. Wenn wir nicht die Kraft haben, sie zu erleuchten, werden sie nicht die Kraft haben, uns in die Zukunft zu tragen."
 edict_cybernetic_creed_general_edict: "Die Lehren der Harmonie"
 edict_cybernetic_creed_general_edict_desc: "Die Vereinigung der Kirche brachte viele Lehren hervor. Das hat unseren Glauben stärker und tiefgreifender denn je gemacht."
 #Intro Events
 machine_age.2150.name: "Die Credos"
 machine_age.2150.desc: "Vom Göttlichen zu den Sternen geführt möchten verschiedene Credos innerhalb unseres Glaubens nun Einfluss auf die neue Regierung ausüben.\n\nJedes hat erhebliches Gewicht bei den Gläubigen und plädiert dafür, dass seine eigenen Mitglieder einflussreiche Positionen erhalten und die eigenen spirituellen Bedürfnisse erfüllt werden.\n\nAllein die Zeit wird weisen, ob dieses Gezerre uns dem Göttlichen näherbringen oder uns alle ins Chaos stürzen wird."
 machine_age.2150.a: "Hoffentlich werden sie hilfreich sein."
 machine_age.2150.a.tooltip: "§YGegründete Fraktionen§!:\n- $cyber_creed_labor$\n- $cyber_creed_war$\n- $cyber_creed_research$\n- $cyber_creed_construction$"
 cyber_creed_please_labor: "Dies wird das Credo \"§Y$cyber_creed_labor$§!\" zufriedenstellen\nDies wird allen anderen Credos missfallen."
 cyber_creed_displease_labor: "Dies wird dem Credo \"§Y$cyber_creed_labor$§!\" missfallen\nDies wird alle anderen Credos zufriedenstellen."
 cyber_creed_please_war: "Dies wird das Credo \"§Y$cyber_creed_war$§!\" zufriedenstellen\nDies wird allen anderen Credos missfallen."
 cyber_creed_displease_war: "Dies wird dem Credo \"§Y$cyber_creed_war$§!\" missfallen\nDies wird alle anderen Credos zufriedenstellen."
 cyber_creed_please_construction: "Dies wird das Credo \"§Y$cyber_creed_construction$§!\" zufriedenstellen\nDies wird allen anderen Credos missfallen."
 cyber_creed_displease_construction: "Dies wird dem Credo \"§Y$cyber_creed_construction$§!\" missfallen\nDies wird alle anderen Credos zufriedenstellen."
 cyber_creed_please_research: "Dies wird das Credo \"§Y$cyber_creed_research$§!\" zufriedenstellen\nDies wird allen anderen Credos missfallen."
 cyber_creed_displease_research: "Dies wird dem Credo \"§Y$cyber_creed_research$§!\" missfallen\nDies wird alle anderen Credos zufriedenstellen."
 machine_age.2205.name: "Geschichte, neu geschrieben"
 machine_age.2205.desc: "Der §YTemplerorden des Stahls§! hat vor Kurzem eine Kampagne ins Leben gerufen, sämtliche Beispiele militärischer Niederlagen aus unseren Chroniken historischer wie religiöser Natur zu streichen.\n\nDas Credo behauptet, solche Informationen würden Militärdienstleistende demoralisieren und die öffentliche Unterstützung schwächen. Unsere Historiker verneinen dies und erinnern uns daran, dass jene, die nicht aus der Geschichte lernen, dazu verdammt sind, sie zu wiederholen.\n\nSollen wir ihre positivere Einstellung zur Vergangenheit übernehmen?"
 machine_age.2205.a: "Um siegreich zu sein, müssen wir wie Sieger denken."
 machine_age.2205.a.tooltip: "$cyber_creed_please_war$"
 machine_age.2205.b: "Inakzeptabel. Wir müssen aus unseren Fehlern lernen."
 machine_age.2205.b.tooltip: "$cyber_creed_displease_war$"
 machine_age.2210.name: "Das Feuer ist erloschen"
 machine_age.2210.desc: "Der Hochschmied, der Anführer der §YGemeinschaft des Hammers§!, ist unerwartet verstorben.\n\nObwohl er für ein forsches Auftreten und entschiedene Ansichten bekannt war, war er innerhalb des eigenen Credos geradezu eine Kultfigur. Die Gemeinschaft fordert, dass er ein offizielles Staatsbegräbnis erhält, eine Ehre, die für gewöhnlich unseren beliebtesten Anführern vorbehalten ist.\n\nEs ist wenig überraschend, dass die anderen Credos fordern, dass der Staat mit der Beisetzung dieses spirituellen Oberhaupts nichts zu schaffen haben sollte.\n\nWie sollen wir auf die Forderungen der Credos reagieren?"
 machine_age.2210.a: "Führt das Begräbnis durch."
 machine_age.2210.a.tooltip: "$cyber_creed_please_construction$"
 machine_age.2210.b: "Das ist es nicht wert, wenn die anderen Credos deswegen erzürnt sind."
 machine_age.2210.b.tooltip: "$cyber_creed_displease_construction$"
 machine_age.2215.name: "Umstrittene Relikte"
 machine_age.2215.desc: "Vor Kurzem entdeckte ein archäologischer Trupp eine uralte religiöse Stätte, die eigentlich als Mythos galt. Dadurch waren wir gezwungen, einige der historischen Aufzeichnungen unseres Glaubens zu revidieren.\n\nAm überraschendsten ist, dass viele der entdeckten historischen Artefakte eindeutige Symbole der §YKommune der Arbeitsamkeit§! tragen. Diese Informationen würden belegen, dass die Kommune die ursprüngliche Auslegung unserer Religion ist, was innerhalb unseres Glaubens heftig diskutiert wird.\n\nWenn wir diese Offenbarung offiziell anerkennen, würde dies der §YKommune der Arbeitsamkeit§! gefallen, aber strategisches Schweigen würde die anderen Credos zufriedenstellen."
 machine_age.2215.a: "Wir dürfen die Wahrheit nicht fürchten."
 machine_age.2215.a.tooltip: "$cyber_creed_please_labor$"
 machine_age.2215.b: "Das wurde nicht grundlos vergraben. Ignoriert es."
 machine_age.2215.b.tooltip: "$cyber_creed_displease_labor$"
 machine_age.2221.name: "Credo-Undercoveragent"
 machine_age.2221.desc: "Wir fanden heraus, dass §Y[cyber_creed_undercover_leader.GetName]§! über tiefgehende Verbindungen [GetCyberCreed::<DE_ART_PRAE_ZU>] §Y[GetCyberCreed&DAT]§! verfügt und sowohl Mittel veruntreut als auch Projekte in den Einflussbereich des Credos umverteilt hat.\n\nDie anderen Credos sind wütend, dass in der aktuellen Regierung ein derart unverschämter Machtmissbrauch möglich ist, und sie verlangen, dass §Y[cyber_creed_undercover_leader.GetName]§! unverzüglich aus dem Amt entfernt wird.\n\nWie sollen wir mit diesem fehlgeleiteten Anführer verfahren?"
 machine_age.2221.a: "Entfernt [cyber_creed_undercover_leader.GetName] aus dem Amt."
 machine_age.2221.a.tooltip: "[cyber_creed_undercover_leader.GetName] wird aus dem Amt entfernt."
 machine_age.2221.b: "Das Gute, das [cyber_creed_undercover_leader.GetName] getan hat, überwiegt gegen diesen Verstoß."
 machine_age.2225.name: "Hammerjubiläum"
 machine_age.2225.desc: "Die Jubiläumspilgerfahrt der §YGemeinschaft des Hammers§! steht kurz bevor, und zahllose Gläubige werden von ihren örtlichen Schmieden zur §Y$building_forge_of_the_fellowship$§! in der Hauptstadt reisen.\n\nTraditionell bringt dieses Ereignis zahllose logistische Probleme mit sich, und es endet häufig in einem Gewaltausbruch, wenn die Gemeinschaft früher oder später mit Gläubigen der anderen Credos aneinandergerät.\n\nDie anderen Credos und die Bewohner der Hauptstadt haben bereits gefordert, dieser Praxis ein Ende zu setzen."
 machine_age.2225.a: "Verbietet die Pilgerfahrt ein für alle Mal."
 machine_age.2225.a.tooltip: "$cyber_creed_displease_construction$"
 machine_age.2225.b: "Die Religionsfreiheit ist ein Grundrecht."
 machine_age.2225.b.tooltip: "$cyber_creed_please_construction$"
 machine_age.2230.name: "Lowtech-Behauptungen"
 machine_age.2230.desc: "Seit Kurzem reitet der Anführer des §YChors des Bewusstseins§!, der Große Chorleiter, öffentlich darauf herum, dass unsere Gläubigen zu wenig in Forschung investieren.\n\nMan geht davon aus, er möchte so dafür sorgen, dass Mitglieder seines Credos mehr Mittel erhalten. Wenn wir den Forderungen nachgeben, könnte man dies als Bevorzugung des §YChors des Bewusstseins§! ansehen.\n\nSollten wir die Mittel für die Wissenschaft erhöhen?"
 machine_age.2230.a: "Soll der Chorleiter doch singen, bis er seine Stimme verliert."
 machine_age.2230.a.tooltip: "$cyber_creed_displease_research$"
 machine_age.2230.b: "Erhöht die Mittel moderat, bis Gras über diese Sache gewachsen ist."
 machine_age.2230.b.tooltip: "$cyber_creed_please_research$"
 machine_age.2230.c: "Wir werden die Mittel stark erhöhen."
 machine_age.2230.c.tooltip: "$cyber_creed_please_research$"
 cyber_creed_history_rewritten: "Geschichte umgeschrieben"
 cyber_creed_history_rewritten_desc: "Wir haben alle Erwähnungen militärischer Niederlagen aus unseren Aufzeichnungen entfernt, sehr zum Entsetzen der Historiker."
 cyber_creed_history_repeating: "Geschichte wiederholt sich"
 cyber_creed_history_repeating_desc: "Wir haben alle Erwähnungen militärischer Niederlagen in unseren Aufzeichnungen beibehalten. Diese Entscheidung macht den Templerorden des Stahls wütend."
 cyber_creed_no_choirmaster_funding: "Chorleiter ignoriert"
 cyber_creed_no_choirmaster_funding_desc: "Wir haben die Forderungen des Chors des Bewusstseins nach mehr Mitteln für die Wissenschaft ignoriert."
 cyber_creed_low_choirmaster_funding: "Chorleiter gehört"
 cyber_creed_low_choirmaster_funding_desc: "Wir haben unserer Forschung ein wenig mehr Mittel zugewiesen, um den Chor des Bewusstseins zu beschwichtigen."
 cyber_creed_high_choirmaster_funding: "Chorleiter erhört"
 cyber_creed_high_choirmaster_funding_desc: "Wir sind dem Wunsch des Chors des Bewusstseins nach mehr wissenschaftlichen Mitteln in vollem Umfang nachgekommen."
 cyber_creed_state_funeral: "Bestattung des Hochschmieds"
 cyber_creed_state_funeral_desc: "Wir haben dem verstorbenen Anführer der Gemeinschaft des Hammers ein Staatsbegräbnis beschert."
 cyber_creed_no_state_funeral: "Kein Staatsbegräbnis"
 cyber_creed_no_state_funeral_desc: "Wir verweigerten dem verstorbenen Anführer der Gemeinschaft des Hammers ein Staatsbegräbnis."
 cyber_creed_relics_truth: "Wahrheit offenbart"
 cyber_creed_relics_truth_desc: "Wir ließen es zu, dass die Wahrheit über das Alter der Kommune der Arbeitsamkeit die Öffentlichkeit erreicht. Dies verärgerte die anderen Credos."
 cyber_creed_relics_hidden: "Wahrheit begraben"
 cyber_creed_relics_hidden_desc: "Wir ignorierten das Relikt, was den meisten Credos gefiel. Dies brachte der Führung des Glaubens jedoch etwas Misstrauen ein."
 cyber_creed_leader_removed: "Abtrünniger Anführer abgesetzt"
 cyber_creed_leader_removed_desc: "Unser Anführer, der insgeheim für ein anderes Credo arbeitete, wurde des Amtes enthoben."
 cyber_creed_leader_stayed: "Abtrünniger Anführer bleibt"
 cyber_creed_leader_stayed_desc: "Wir standen zu unserem Anführer, der insgeheim für ein anderes Credo arbeitete, obwohl manche seine Absetzung forderten."
 cyber_creed_pilgrimage_allowed: "Pilgerreise der Gemeinschaft gestattet"
 cyber_creed_pilgrimage_allowed_desc: "Die Gemeinschaft des Hammers durfte ihre Pilgerreise durchführen. Wie erwartet folgten auf die Prozession Gewalt und Proteste."
 cyber_creed_pilgrimage_canceled: "Pilgerreise der Gemeinschaft verboten"
 cyber_creed_pilgrimage_canceled_desc: "Die Gemeinschaft des Hammers durfte ihre Pilgerreise nicht durchführen, wodurch die erwartete Gewalt unterbunden wurde. Diese Entscheidung hat die Gläubigen verärgert."
 POP_ATTRACTION_CYBER_CREED_WAR: "§G+ £empire£ Ethik durch den Templerorden des Stahls§!"
 POP_ATTRACTION_CYBER_CREED_RESEARCH: "§G+ £empire£ Ethik durch den Chor des Bewusstseins§!"
