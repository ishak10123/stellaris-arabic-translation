 #Galcom Resolutions
 resolution_galactic_focus_crisis_synth_queen: "Schwerpunkt: Cetana"
 resolution_galactic_focus_crisis_synth_queen_desc: "Cetana ist eine Gefahr für die Galaxie. Wenn wir uns nicht vereinen, um sie aufzuhalten, wird sie uns alle vernichten. Wir sollten den Umgang mit dieser Krise zum galaktischen Schwerpunkt machen."
