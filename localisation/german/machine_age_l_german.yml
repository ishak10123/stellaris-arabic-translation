 trait_robot_ancient_dreadnought: "Uralter Dreadnought"
 trait_robot_ancient_dreadnought_desc: "Die miniaturisierten Energiemodule des uralten Dreadnoughts sorgen für eine drastische Steigerung der industriellen Produktivität und erhöhen den Schaden der im Rumpf integrierten Waffen."
 trait_robot_enigmatic_fortress: "Enigmatische Festung"
 trait_robot_enigmatic_fortress_desc: "Die Selbstreparaturroutinen der Enigmatischen Festung beziehen Materialien direkt aus dem Subraum, was die Materialkosten für Reparaturen drastisch senkt."
 trait_robot_infinity_sphere: "Unendlichkeitssphäre"
 trait_robot_infinity_sphere_desc: "Hocheffiziente, schwerkraftresistente Verarbeitungskreisläufe, die den Energieverbrauch minimieren und die Verarbeitungskosten erheblich senken."
 trait_robot_scavenger_bot: "Wiederverwerterbot"
 trait_robot_scavenger_bot_desc: "Die fortschrittliche Wiederverwertung auf Molekularebene kann jede Substanz in die für den Bau von Roboterrahmen erforderlichen Materialien umwandeln."
