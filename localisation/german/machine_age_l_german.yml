 synth_queen_much_shared_research_desc: "Wir erklärten uns bereit, Cetana uneingeschränkten Zugriff auf unsere Datenbanken zu gewähren, was unsere Forschungsproduktion dramatisch einbrechen ließ."
 synth_queen_war_preparations: "Krieg am Horizont"
 synth_queen_war_preparations_desc: "Nachdem wir Cetanas verdeckte Operationen bemerkt haben, müssen wir dringender denn je unser Militär verstärken."
 synth_queen_advanced_war_preparations: "Kampf ums Überleben"
 synth_queen_advanced_war_preparations_desc: "Cetanas Plan, jegliches Bewusstsein auszurotten, muss um jeden Preis verhindert werden."
 synth_queen_nanite_apprentice: "Cetanas Lehrling"
 synth_queen_nanite_apprentice_desc: "Cetana entwickelt ein großes Interesse an uns, seit wir unsere gemeinsame Faszination für die Nanotechnologie entdeckt haben. Unabhängig davon, ob wir ihr vertrauen oder nicht, könnte sich dies in Zukunft als nützlich erweisen."
 #Opinion
 synth_queen_approve: "Dies wird Cetana zufriedenstellen."
 synth_queen_approve_lot: "Dies wird Cetana sehr zufriedenstellen."
 synth_queen_disapprove: "Dies wird Cetana missfallen."
 synth_queen_disapprove_lot: "Dies wird Cetana erheblich missfallen."
 synth_queen_gift_tt: "Wir müssen beweisen, dass wir Cetana gegenüber auch weiterhin loyal sind, bevor sie uns weitere Geschenke zukommen lassen wird."
 synth_queen_punishment_tt: "Mit jeder \"Lektion\", die Cetana erteilt, scheint ihr Zorn zu schwinden."
