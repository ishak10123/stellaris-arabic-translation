 situation_paperclips: "Konsumgüter Konsolidierung"
 situation_paperclips_type: "Konsumgüter Konsolidierung"
 situation_paperclips_monthly_change_tooltip: "Produktionsziel festgelegt. Drohnen zugewiesen. Aufgabe wird ausgeführt."
 situation_paperclips_desc: "Unser oberstes Ziel und unsere Bestimmung liegen in der Maximierung der Produktion. Die geforderten Quoten zu erfüllen, ist eine Notwendigkeit.\nDas Lieferdatum ist der §Y[owner.situation_paperclips_timer]§!\nDas derzeitige Produktionsziel liegt bei: §Y[Owner.paperclips_once_again]§!\nDer derzeitige Lagerbestand beträgt: §Y[Owner.paperclips_current_amount]§!\n[Owner.GetPaperclipStatus]"
