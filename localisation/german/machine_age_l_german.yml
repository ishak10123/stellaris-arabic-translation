 machine_age.1100.name: "Die Zukunft des Glaubens"
 machine_age.1100.desc: "Heute erheben wir uns vollständig verschmolzen, nicht nur in Leib und Seele, sondern auch in unserem Glauben. Wir sind frei von dogmatischen Credos: Die göttliche Verschmelzung soll eine persönliche Reise für alle Gläubigen sein.\n\n$machine_age.govswapnotice$\n\n$machine_age.1090.pray$"
 machine_age.1100.a: "Unser Glaube ist vereint wie unser[GetFleshTypeCyberCreed::<DE_END_PRO_S_N>] verschmolzen[GetFleshTypeCyberCreed::<DE_END_ADJ_NUL_S_N>] [Owner.Species.GetFleshTypeCyberCreed&NOM]."
