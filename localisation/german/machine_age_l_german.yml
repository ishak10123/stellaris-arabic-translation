 MACHINEAGE_TITLE: "The Machine Age" #Do not translate
 #### Cosmogenesis Crisis ####
 ap_cosmogenesis: "Kosmogenese"
 ap_cosmogenesis_desc: "Zeit, Schwerkraft und Raum sind die grundlegenden Rädchen, die das Uhrwerk der Realität ausmachen. Wenn wir lernen können, sie zu manipulieren, gehören das Universum und seine Geheimnisse uns."
 cosmogenesis_chain_title: "Kosmogenese"
 cosmogenesis_chain_desc: "Unwissenheit legt uns Ketten an und enthält uns die Geheimnisse des Universums vor.\n\nKoste es, was es wolle: Wir müssen diese Ketten sprengen.\n\n§RGefallene Reiche werden versuchen, uns aufzuhalten!§!"
 cosmogenesis_level_reached: "Krisenstufe erreicht"
 cosmogenesis_aborted_tt: "\n£trigger_no£ §RWir haben unsere Kosmogenese-Ambition aufgegeben.§!"
 ### Crisis Stage Techs
 tech_cosmogenesis_crisis_1: "Exponentielles Lernen"
 tech_cosmogenesis_crisis_1_desc: "Der radikale Perspektivenwechsel, der für das Verständnis der unendlichen Schichten der Realität erforderlich ist, fordert selbst unsere größten Genies heraus."
 cosmogenesis_level_1_tech_title: "Schaltet die Krise §HKosmogenese§! auf §HStufe 2§! frei"
 cosmogenesis_level_1_tech_desc: "§H$tech_cosmogenesis_crisis_1$§!\nUm die inneren Abläufe der Realität zu ergründen, müssen wir unseren Geist einem größeren Maßstab des Denkens öffnen."
 tech_cosmogenesis_crisis_2: "Gravitationspinsel"
 tech_cosmogenesis_crisis_2_desc: "Schwerkraft und Raumzeit formen das Universum. Beginnend mit der Schwerkraft werden wir Werkzeuge meistern, um unseren Aufstieg voranzutreiben."
 cosmogenesis_level_2_tech_title: "Schaltet die Krise §HKosmogenese§! auf §HStufe 3§! frei"
 cosmogenesis_level_2_tech_desc: "§H$tech_cosmogenesis_crisis_2$§!\nDie Schwerkraft ist lediglich einer der Pinsel, die wir nutzen können, um auf der Leinwand der Realität zu malen."
 tech_cosmogenesis_crisis_3: "Theoretische Unendlichkeitsthese"
 tech_cosmogenesis_crisis_3_desc: "Durch präzise und unglaublich winzige Veränderungen der Schwerkraft können wir Befehle in den Code der Realität einfügen. Äußerste Vorsicht ist geboten, während wir den Gebrauch dieses neuen und unglaublichen Werkzeugs erlernen."
 cosmogenesis_level_3_tech_title: "Schaltet die Krise §HKosmogenese§! auf §HStufe 4§! frei"
 cosmogenesis_level_3_tech_desc: "§H$tech_cosmogenesis_crisis_3$§!\nMit winzigen Nadelstichen aus Gravitationskraft werden wir die Raumzeit durchdringen."
 tech_cosmogenesis_crisis_4: "Die Regeln der Realität"
 tech_cosmogenesis_crisis_4_desc: "Neueste Experimente bestätigen, dass unsere Änderungen an der Realität nur vorübergehend sind. Wir brauchen bedeutendere Veränderungen, um diese Neuerungen zu verankern."
 cosmogenesis_level_4_tech_title: "Schaltet die Krise §HKosmogenese§! auf §HStufe 5§! frei"
 cosmogenesis_level_4_tech_desc: "§H$tech_cosmogenesis_crisis_4$§!\nDie Realität ächzt: Sie protestiert und murrt, während sie sich trotz unserer Änderungen hartnäckig neu formt. Diese unerwartete Entwicklung darf so nicht weitergehen."
 tech_cosmogenesis_crisis_5: "Aufkeimende Universen"
 tech_cosmogenesis_crisis_5_desc: "Es ist eine gewaltige Aufgabe, im großen Maßstab in andere Universen zu reisen. Wir müssen ein Raumschiff konstruieren, das nicht nur den Stoff der Raumzeit durchdringen kann, sondern diese Reise auch übersteht.\n\n§RGefallene Reiche werden versuchen, uns aufzuhalten!§!"
 cosmogenesis_level_5_tech_title: "§HNeue Megastruktur:§!Horizontnadel"
 cosmogenesis_level_5_tech_desc: "§HHorizontnadel§!\nDie Horizontnadel ist ein technisches Wunderwerk, ein Zivilschiff, das die Realität verformen kann. Es kann unsere Bevölkerung und unser gesammeltes Wissen aufnehmen und die transuniverselle Migration sicher durchführen."
 requires_capital: "£trigger_no£ Muss in der Umlaufbahn unserer Hauptwelt gebaut werden."
 ### Crisis Tab
 crisobj_research_tech_name: "Erforscht neue Technologien"
 crisobj_research_tech_desc: "Mit jeder neuen Technologie, so klein sie auch sein mag, erhalten wir Einblicke in das Innenleben der Realität.\n\nErforscht Technologien, um diese \"Fortschrittliche Logik\"-Belohnung zu erhalten."
 crisobj_research_thesis_name: "Erforscht Angewandte Unendlichkeitsthesen"
 crisobj_research_thesis_desc: "Experimente im großen Maßstab, um jene Regeln zu ändern, die über das Verhalten der Realität bestimmen, bringen wertvolle Daten.\n\nErforscht diese seltenen Technologien, um diese \"Fortschrittliche Logik\"-Belohnung zu erhalten."
 crisobj_have_scholarium_vassals_name: "Haltet Scholarium-Vasallen"
 crisobj_have_scholarium_vassals_desc: "Forschungsbasierte Untertanen helfen uns auf unserer Suche nach absolutem Wissen.\n\nHaltet §YScholarium-Vasallen§!, um diese §Yjährliche§! \"Fortschrittliche Logik\"-Belohnung zu erhalten."
 crisobj_neural_chips_name: "Setzt Neuralchips ein"
 crisobj_neural_chips_desc: "Der Maßstab unserer Forschung ist derart enorm, dass wir Opfer bringen müssen, um sie überhaupt durchzuführen.\n\nVerwendet Bewohner als §YNeuralchips§! in der §YSynapsenschmiede§!, um Fortschrittliche Logik zu erhalten.\n\nDie Produktion von §YNeuralchips§! skaliert mit der Anzahl an Bewohnern in der §YSynapsenschmiede§!; man kann sie zusätzlich durch Distrikte und Gebäude erhöhen."
 crisobj_have_science_nexuses_name: "Kontrolliert Forschungsnexus"
 crisobj_have_science_nexuses_desc: "Diese hochmoderne Forschungseinrichtung fernab jeder Gravitationsanomalie garantiert unverfälschte Raumzeit-Daten.\n\nKontrolliert vollständig aufgewertete §YForschungsnexus§!-Megastrukturen, um diese §Yjährliche§! \"Fortschrittliche Logik\"-Belohnung zu erhalten."
 crisobj_galcom_science_resolution_name: "Sichert Euch die Unterstützung der Galaktischen Gemeinschaft"
 crisobj_galcom_science_resolution_desc: "Die Mitglieder der Galaktischen Gemeinschaft davon zu überzeugen, dass unsere Forschung unverzichtbar ist, würde unsere Pläne enorm voranbringen.\n\nSorgt dafür, dass die §YGalaktische Gemeinschaft§! \"Ungezügeltes Wissen\"-§YBeschlüsse§! umsetzt, um diese §Yjährliche§! \"Fortschrittliche Logik\"-Belohnung zu erhalten."
 crisis_cosmogenesis_level_1: "§UBedenken§!"
 crisis_cosmogenesis_level_1_desc: "Krisenstufe 1"
 crisis_cosmogenesis_level_2: "§URisiko§!"
 crisis_cosmogenesis_level_2_desc: "Krisenstufe 2"
 crisis_cosmogenesis_level_3: "§UGefahr§!"
 crisis_cosmogenesis_level_3_desc: "Krisenstufe 3"
 crisis_cosmogenesis_level_4: "§UKatastrophe§!"
 crisis_cosmogenesis_level_4_desc: "Krisenstufe 4"
 crisis_cosmogenesis_level_5: "§UEnde aller Existenz§!"
 crisis_cosmogenesis_level_5_desc: "Krisenstufe 5"
 menp_cosmo_objectives: "Fortschrittliche Logik"
 unlocks_cosmo_objectives: "Ermöglicht das Anhäufen von £advanced_logic£ §YFortschrittlicher Logik§! durch das Abschließen von §HKrisenzielen§!.\n\nSchaltet die Technologie \"§Y$tech_cosmogenesis_crisis_1$§!\" frei, die uns näher an das Erreichen unserer Ziele bringt.\n"
 menp_cosmo_objectives_desc: "Fortschrittliche Logik steht für unser Verständnis jener Gesetze, die über die Realität bestimmen, und unsere Macht, sie zu beeinflussen."
 menp_cosmo_buildings_1: "Perfekte Arkologien"
 unlocks_buildings_1: "Einfache Gebäude eines Gefallenen Reichs können nun als Forschungsoptionen erscheinen.\n"
 menp_cosmo_buildings_1_desc: "Gefallene Reiche haben womöglich vergessen, wie man ihre fortschrittliche Technologie repliziert, doch unsere Forscher werden die Geheimnisse ihres Goldenen Zeitalters wiederfinden."
 menp_cosmo_techs_1: "Nicht-baryonische Energie"
 unlocks_techs_1: "Schaltet die Technologie für die Schiffskomponente §Y$tech_dark_matter_power_core$§! frei.\n"
 menp_cosmo_techs_1_desc: "Wir müssen lernen, wie wir die Energie nicht-baryonischer Partikel nutzen können, um den nächsten Schritt in der Evolution ultrakompakter Energie zu tun."
 menp_cosmo_features_1: "Wetware"
 unlocks_features_1: "Schaltet die Technologie für die Megastruktur §YSynapsenschmiede§! frei.\n"
 menp_cosmo_features_1_desc: "Die gewaltige Synapsenschmiede ist ein Reservoircomputer. Er nutzt die Rechenleistung der vernetzten Bewusstseine unserer Bevölkerung für das Berechnen und Speichern von Daten. Die Vorteile sind offenkundig, doch einige fehlgeleitete Spezies betrachten das Nutzen von Individuen als Computerchips als moralisch fragwürdig."
 menp_cosmo_ship_2: "Mysteriöse Begleiter"
 unlocks_ship_2: "Schaltet die Technologie für das §YBegleitschiff§! eines Gefallenen Reichs frei.\n"
 menp_cosmo_ship_2_desc: "[Get_menp_cosmo_ship_2]"
 menp_cosmo_ship_2_desc_regular: "Ein Raumschiff bescheidener Größe, das unser Wissen über Raumzeit optimiert, um einen dimensionalen Transzendentalismus zu ermöglichen: Der Innenraum ist größer, als die äußere Form es verrät. Fortschrittliche Feuerkraft erfordert im Vergleich zu traditionellen Schiffsdesigns einen reduzierten logistischen Aufwand."
 menp_cosmo_buildings_2: "Fortschrittliche Ernte"
 unlocks_buildings_2: "Fortschrittliche Gebäude eines Gefallenen Reichs können nun als Forschungsoptionen erscheinen.\n"
 menp_cosmo_buildings_2_desc: "Lange Zeit stellten die Möglichkeiten zur Ressourcenerzeugung der Gefallenen Reiche uns vor Rätsel. Dies ist nun vorbei."
 menp_cosmo_techs_2: "Nicht-baryonische Fortschritte"
 unlocks_techs_2: "Schaltet die Technologie für die Schiffskomponenten §Y$tech_enigmatic_decoder$§! und §Y$tech_dark_matter_propulsion$§! frei.\n"
 menp_cosmo_techs_2_desc: "Unser wachsendes Wissen, was dunkle Materie und ihre Anwendungsmöglichkeiten anbelangt, wird uns neue Wege des technologischen Fortschritts eröffnen."
 menp_cosmo_features_2: "Gravitationswerkzeuge"
 unlocks_features_2: "Schaltet die Technologie §Y$tech_cosmogenesis_crisis_2$§! frei, die uns näher an das Erreichen unserer Ziele bringt.\n"
 menp_cosmo_features_2_desc: "$tech_cosmogenesis_crisis_2_desc$\n"
 menp_cosmo_ship_3: "Rätselhafte Kreuzer"
 unlocks_ship_3: "Schaltet die Technologie für den §YSchlachtkreuzer§! eines Gefallenen Reichs frei.\n"
 menp_cosmo_ship_3_desc: "[Get_menp_cosmo_ship_3]"
 menp_cosmo_ship_3_desc_regular: "Ein weiteres optimiertes Raumschiff, dieses Mal in größerem Maßstab, wird aktuelle Schlachtschiffe aussehen lassen wie Spielzeug."
 menp_cosmo_buildings_3: "Komplexe Infrastrukturen"
 unlocks_buildings_3: "Komplexe Gebäude eines Gefallenen Reichs können nun als Forschungsoptionen erscheinen.\n"
 menp_cosmo_buildings_3_desc: "Da wir nun damit begonnen haben, jenen Schleier der Mysterien zu lüften, der Gefallene Reiche umgibt, dürfen wir nicht nachlassen. Mit der Zeit werden wir alle Geheimnisse ihrer Technologie enträtseln."
 menp_cosmo_techs_3: "Exotische Nicht-Baryone"
 unlocks_techs_3: "Schaltet die Technologie für die Schiffskomponenten §Y$tech_enigmatic_encoder$§! und §Y$tech_dark_matter_deflector$§! frei.\n"
 menp_cosmo_techs_3_desc: "Durch die Nutzung dunkler Materie in Verteidigungstechnologien und bei der Verschlüsselung können wir Annullierungsfelder und robuste Kommunikationskanäle erschaffen."
 menp_cosmo_features_3: "Ewige Expansion"
 unlocks_features_3: "Schaltet die Technologie §Y$tech_cosmogenesis_crisis_3$§! frei, die uns näher an das Erreichen unserer Ziele bringt.\n"
 menp_cosmo_features_3_desc: "$tech_cosmogenesis_crisis_3_desc$\n"
 menp_cosmo_ship_4: "Unverpassbare Flaggschiffe"
 unlocks_ship_4: "Schaltet die Technologie für das §YTitan§!-Schiff eines Gefallenen Reichs frei.\n"
 menp_cosmo_ship_4_desc: "[Get_menp_cosmo_ship_4]"
 menp_cosmo_ship_4_desc_regular: "Diese unglaublichen Schiffe sind fast schon mobile Festungen, und nur die brutalsten Attacken haben überhaupt eine Chance, ihnen Schaden zuzufügen."
 menp_cosmo_buildings_4: "Goldenes Zeitalter"
 unlocks_buildings_4: "Außergewöhnliche Gebäude eines Gefallenen Reichs können nun als Forschungsoptionen erscheinen.\n"
 menp_cosmo_buildings_4_desc: "Das Wissen der Gefallenen Reiche hinsichtlich dimensionaler Manipulation war verblüffend. Mit jeder Entdeckung scheinen sogar ihre undurchschaubarsten Technologien nach und nach simpel."
 menp_cosmo_techs_4: "Panzerung und Bewaffnung"
 unlocks_techs_4: "Schaltet die Technologie für die Schiffskomponenten §Y$tech_energy_lance_2$§! und §Y$tech_dragon_armor$§! frei.\n"
 menp_cosmo_techs_4_desc: "Dank unserer neuesten technologischen Errungenschaften sollten wir tödlichere Waffen und noch robustere Panzerung für unsere Schiffe herstellen können."
 menp_cosmo_features_4: "Regelbrecher"
 unlocks_features_4: "Schaltet die Technologie \"§Y$tech_cosmogenesis_crisis_4$§!\" frei, die uns näher an das Erreichen unserer Ziele bringt.\nSchaltet zudem die wiederholbare Technologie \"§Y$tech_cosmogenesis_thesis$§!\" frei, die erhebliche Mengen §YFortschrittliche Logik§! einbringen kann.\n"
 menp_cosmo_features_4_desc: "$tech_cosmogenesis_crisis_4_desc$"
 menp_cosmo_buildings_5: "Erinnerung und Schöpfung"
 unlocks_buildings_5: "Arkane Gebäude eines Gefallenen Reichs können nun als Forschungsoptionen erscheinen.\n"
 menp_cosmo_buildings_5_desc: "Die endlich enthüllten Geheimnisse der Gefallenen Reiche werden ein neues Zeitalter für unser Volk einläuten."
 menp_cosmo_techs_5: "Nanoschwärme"
 unlocks_techs_5: "Schaltet die Technologie für die Schiffskomponenten §Y$tech_nanite_repair_system$§!, §Y$tech_nanite_autocannon$§! und §Y$tech_nanite_flak_batteries$§! frei.\n"
 menp_cosmo_techs_5_desc: "Mit jedem Perspektivwechsel bieten sich neue Gelegenheiten. Änderungen im kleinsten Rahmen können gewaltige Konsequenzen haben."
 menp_cosmo_features_5: "Leerenreisender"
 unlocks_features_5: "Schaltet die Technologie §Y$tech_cosmogenesis_crisis_5$§! frei, die uns den Bau einer §YHorizontnadel§! und das Erreichen unserer Ziele ermöglicht."
 menp_cosmo_features_5_desc: "$tech_cosmogenesis_crisis_5_desc$"
