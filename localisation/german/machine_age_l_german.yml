 pc_cosmogenesis_world: "Synapsenschmiede"
 col_cosmogenesis_world: "$pc_cosmogenesis_world$"
 pc_cosmogenesis_world_desc: "Ein gewaltiges Reservoir-Computersystem, das Milliarden empfindungsfähiger Wesen organischer oder synthetischer Natur über ein verschlungenes Netz an Kabeln, Transistoren und Lebenserhaltungskapseln miteinander verbindet. Die intensive Belastung der individuellen Verarbeitungsorgane führt zwangsläufig zu Hirnschäden bei jeder \"Komponente\" des Netzwerks."
 col_cosmogenesis_world_desc: "$pc_cosmogenesis_world_desc$"
 trait_pc_cosmogenesis_world_preference: "Anpassung (Synapsenschmiede)"
 trait_pc_cosmogenesis_world_preference_short: "Synapsenschmiede"
 trait_pc_cosmogenesis_world_preference_desc: "Die Spezies kann nicht außerhalb der Lebenserhaltungskapseln einer Synapsenschmiede überleben. Sie zieht ein unbeschwertes Koma den gnadenlosen Attacken der Realität vor."
