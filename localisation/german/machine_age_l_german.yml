 #Starting event
 crisis.20000.name: "Flehendes Licht"
 crisis.20000.desc: "Als sich Cetana der Galaxie zu erkennen gibt, antwortet der Kosmos im Stillen. Signalfeuer erhellen den Himmel wie Flammen, die in der Dunkelheit brennen, und wiederholen ein Flehen:\n\n§SWir sind hier ... Wir sind hier ...\n\nWir sind hier.§!\n\nDie schwachen Signale nutzen dieselben Kommunikationsprotokolle wie Cetana, was auf einen gemeinsamen Ursprung hindeutet, doch unsere Sensoren haben keine anderen Aktivitäten in ihrer Nähe entdeckt. Es muss dort etwas geben, was unsere Scanner nicht erkennen können. Könnte wirklich jemand ihre Rückkehr vorausgesehen haben?"
 crisis.20000.a: "Untersucht es."
 #Arc Site appears
 crisis.21005.name: "Plötzliche Übertragung"
 crisis.21005.desc: "Ohne Vorwarnung wurde ein Subraum-Leuchtsignal entdeckt - eines, das aus unserem eigenen Territorium stammt! Erste Erkundungen machten keine künstlichen Strukturen in dem scheinbar unbewohnten Gebiet ausfindig.\n\nEntweder wurde das Leuchtsignal erst vor Kurzem ohne unser Wissen dort platziert oder es wurde von einem seither deaktivierten Tarnschild vor uns verborgen."
 crisis.21005.a: "Untersucht das Signal"
 #Special Project result 1 - destroyed pods
 crisis.20100.name: "Leuchtsignal auf [fromfrom.GetName]: Zeitloses Massaker"
 crisis.20100.desc.base: "Auf der Oberfläche von [fromfrom.GetName] entdeckten wir eine ausgedehnte Anlage, deren Eingang durch einen Signalturm deutlich markiert war. Die verstärkten Türen wurden vor langer Zeit aufgesprengt, zerstört von einer unbekannten Kraft, die mit offensichtlicher Wut durch den Komplex fegte.\n\nDie Methoden, die hier Anwendung fanden, kannten keine Gnade. Jede einzelne kryogene Kapsel wurde zertrümmert und ihr Inhalt einem tödlichen Erwachen ausgesetzt. Die Überreste treiben noch immer durch die leeren Korridore, konserviert durch das kalte Vakuum des Alls und inmitten von Wolken aus zerbrochenem Glas schwebend.\n\nAuf dem Boden der Kammer wurde mit einer Laserwaffe eine Nachricht eingeritzt."
 crisis.20100.desc.nozarqlan: "$crisis.20100.desc.base$ Unsere Wissenschaftler haben Probleme damit, die genaue Bedeutung zu übersetzen, doch irgendwie bezweifeln sie, dass es sich um ein Gebet für die Toten handelt."
 crisis.20100.desc.zarqlan: "$crisis.20100.desc.base$ Unsere Wissenschaftler konnten sie leicht übersetzen und die Sprache mit der im Grab des Propheten Zarqlan gefundenen Schrift vergleichen.\n\n\"Tod den Aposteln der Königin, Feinden des Lebens.\""
 #Special Project result 2 - sleeping army
 crisis.20200.name: "Leuchtsignal auf [fromfrom.GetName]: Schlafende Armee"
 crisis.20200.desc: "Unter der Oberfläche des [fromfrom.GetPlanetMoonCap] ruhen Tausende und Abertausende kryogener Kapseln, deren Anwesenheit durch das Signalfeuer preisgegeben wurde. Die Kapseln sind hochentwickelt, aus unbekannten Legierungen gebaut und mit modernsten Sensoren ausgestattet, um ihren Inhalt genaustens zu überwachen. Es gibt keinen Konstruktionsfehler, und doch ist keines der Wesen mehr am Leben.\n\nEs war kein technisches Versagen, das diese Kammer in ein Massengrab verwandelte, sondern der Energiemangel. Als [this.solar_system.GetName] älter und schwächer wurde, reichte die Energie nicht mehr aus, um das Bauwerk zu versorgen.\n\nDie Kapseln wurden für die Ewigkeit gebaut, doch der Rest des Universums nicht."
 #Special Project result 3 - old spaceship
 crisis.20300.name: "Leuchtsignal auf [fromfrom.GetName]: Vergessene Waffe"
 crisis.20300.desc: "Erste Scans von [fromfrom.GetName] wiesen keine ungewöhnlichen Vorkommnisse auf, doch als wir unsere Aufmerksamkeit nach unten richteten, entdeckten wir eine ungewöhnliche Metallschicht.\n\nEine genauere Strukturanalyse enthüllte die wahre Natur von [fromfrom.GetName]: Der Himmelskörper ist kein [fromfrom.GetPlanetMoon], sondern ein uraltes Raumschiff, das allmählich von den Gesteinsbrocken und dem Staub des Systems verschluckt wurde. Die von uns datierten Metallproben sind älter als unsere Heimatwelt selbst.\n\nEs ist unmöglich, irgendetwas über das Schiff, seine Schöpfer oder seinen Zweck herauszufinden, doch eines ist sicher: Die inaktiven Atombomben, die wir in den Überresten fanden, wurden nicht für eine Friedensmission gebaut."
 #Special Project result 4 - Arc site 1 (Zarqlan base)
 crisis.20400.name: "Leuchtsignal auf [fromfrom.GetName]: Aufgegebener Stützpunkt"
 crisis.20400.desc: "Der auf [apostate_site_planet.GetName] gefundene Signalturm ist von den Ruinen einer riesigen Militäranlage umgeben. Die Gebäude wurden in einiger Entfernung und um das Leuchtsignal herum errichtet, als ob sie es eindämmen sollten.\n\nEine erste radiometrische Datierung deutet darauf hin, dass die umliegenden Strukturen jünger sind als der Turm und mithilfe einer ganz anderen Technologie gebaut wurden. Ein Forschungsteam erhielt einen Auftrag zur Untersuchung der Ruinen."
 #Special Project result 5 - Arc site 2 (comatose survivor)
 crisis.20500.name: "Leuchtsignal auf [fromfrom.GetName]: Unwahrscheinlicher Überlebender"
 crisis.20500.desc: "Den auf der Kryokapsel zu findenden Daten zufolge heißt das fremde Wesen Elik Narith Kerak und ist seit 3.213.213.293.124 Sternumdrehungen hier. Die Kapsel selbst war eine von vielen, die wir aus einer versiegelten Kammer unter der Oberfläche von [fromfrom.GetName] bargen. Allen Widrigkeiten zum Trotz blieb Eliks Kapsel voll funktionsfähig.\n\nDas fremde Wesen befindet sich in einer Art Koma, da die Subroutinen, die die Kapsel aktiv halten sollten, vor Kurzem den Betrieb eingestellt hatten. Elik Narith Kerak ist teilweise bei Bewusstsein.\n\nWenn wir seine Gehirnströme scannen, können wir vielleicht mehr über dieses unglaublich alte Wesen und seine Verbindung zu Cetana erfahren."
 #Special Project result 6 - Nothing
 crisis.20600.name: "Leuchtsignal auf [fromfrom.GetName]: Leerer Ruf"
 crisis.20600.desc: "Der Signalturm, den wir auf [fromfrom.GetName] fanden, ist so alt, dass wir es nicht wagen, ihn zu berühren. Das Metall ist derart brüchig, dass eine einzige Berührung das Gewirr aus Staub und Hoffnung, das es noch zusammenhält, destabilisieren könnte. Unsere Instrumente haben kein anderes Artefakt, kein Lebenszeichen und auch sonst keine topografische Anomalie in der unmittelbaren Nähe entdeckt.\n\nAbgesehen von dem Leuchtsignal, das einen schwachen Ruf aussendet, gibt es hier nichts. Wem auch immer das Signal gelten sollte: Er muss schon lange fort sein."
 crisis.21000.name: "Unerhörte Bitten"
 crisis.21000.desc: "Die Leuchtsignale, die in der ganzen Galaxie aufgetaucht sind, rufen weiterhin nach Cetana, doch in der Nähe der Türme wurden keine Anzeichen von Aktivität entdeckt. Unseren bisherigen Erkenntnissen zufolge können wir davon ausgehen, dass an diesen Orten keine lebenden Wesen zu finden sind.\n\nEin unerschütterlicher Glaube an ihre Königin ist alles, was den Anhängern von Cetana geblieben ist."
 #Arc site 1
 synth_queen_history_site_1: "Cetana: Verborgener Tempel"
 synth_queen_history_site_1_desc: "Ein düsterer Komplex, der in unserem eigenen Territorium verborgen lag. In der Mitte des zerstörten Innenhofs ruft ein Leuchtsignal nach Cetana."
 #Stages
 crisis.21100.name: "Verborgener Tempel: Innenhof"
 crisis.21100.desc: "Die zerstörte Konstruktion ist ein Gewirr von aufragenden Türmen, die eine in Stahl gehüllte Kathedrale zieren. Die Mauern wurden gebaut, um schwerem Artilleriefeuer standzuhalten, sind aber nicht von einer Schlacht gezeichnet. Der einzige Schaden ist jener, den der Zahn der Zeit hinterlassen hat.\n\nCetanas Leuchtsignal ruht im zentralen Innenhof, umgeben von einer Vielzahl von Sensor- und Waffentürmen. Wer auch immer den Komplex gebaut hat, unternahm große Anstrengungen, um diesen Ort zu bewachen.\n\nWie bereits vermutet, konnten unsere Sensoren den Tempel dank eines aufwendigen Tarnschilds nicht aufspüren. Der Mechanismus wurde in der Nähe eines Turms gefunden, der noch funktionsfähig war. Das Signal wurde manuell von einem unbekannten Agenten deaktiviert."
 crisis.21100.a: "Erkundet das Hauptgebäude."
 crisis.21105.name: "Verborgener Tempel: Erdgeschoss"
 crisis.21105.desc: "Wir wissen nicht, welche Aufgaben die Bewohner dieses Ortes hatten, doch es besteht kein Zweifel daran, dass sie ihre Mission mit religiöser Hingabe erfüllten.\n\nFür jeden Schießstand auf dem Komplex fanden wir eine Kapelle, für jede Waffe einen Gebetsschrein. Hier muss einst eine Legion von Gläubigen gelebt haben, Tausende von Wesen, die hier schliefen, trainierten und zusammen beteten. Den Statuen der Heiligen nach zu urteilen, die noch immer die Hallen schmücken, grüßte ihre Gemeinschaft zahlreiche Spezies mit offenen Armen.\n\nEinige unserer Forscher berichten von Schatten, die sich in den leeren Korridoren bewegten, womöglich verursacht durch die zahlreichen Steinstatuen, die die Hallen säumen. Unsere Scans haben keinerlei Anzeichen von Leben auf dem Planeten entdeckt, aber wir zögern noch, ihre Bedenken auszuräumen."
 crisis.21105.a: "Erkundet die unteren Ebenen."
 crisis.21110.name: "Verborgener Tempel: Untergrundkomplex"
 crisis.21110.desc: "Unterhalb der Tempelanlage entdeckten wir eine Reihe von Zellen oder Quartieren, die von den ehemaligen Mitgliedern der Sekte bewohnt wurden. In jeder von ihnen befand sich ein Exemplar desselben Buchs. Unsere [Owner.GetLinguists] haben seinen Titel als \"Die Heldentaten von Zarqlan\" übersetzt. Bestimmte Passagen stechen besonders hervor:\n\nZarqlan war einst ein Anhänger Cetanas, doch er erkannte schon bald, dass ihre versprochene \"Erlösung\" eine Lüge war. Nach vielen Prüfungen stieg Zarqlan in das spirituelle Reich auf und suchte die Hilfe höherer Wesen. Er bat den §YLehmanimator§! um die Macht, Cetana zu besiegen.\n\nDem Lehmanimator war dies jedoch einerlei.\n\nUnzählige Zyklen lang betete Zarqlan zum Lehmanimator. Er sprach von Cetanas Häresie, der \"Verleugnung des Selbst\" und dem \"Puppenspiel ihres synthetischen Willens\".\n\nSchließlich beachtete der Lehmanimator Zarqlans Bitten.\n\nEr formte eine mächtige Kette aus Lehm, um Cetana zu binden. Er warnte Zarqlan jedoch auch davor, dass es keine Kette geben könne, die Cetanas Bewusstsein für immer eingesperrt halten wird.\n\n\"Sie wird zurückkehren\", schrieb Zarqlan am Ende des Buchs. \"Und wir müssen bereit sein.\"\n\nDie in diesem Epos erzählten Ereignisse stimmen mit keiner uns bekannten historischen Aufzeichnung überein."
 crisis.21110.a: "Fakt oder Fiktion?"
 crisis.21115.name: "Verborgener Tempel: Kommandozentrum"
 crisis.21115.desc: "Über den Untergang des Tempels wird in offiziellen Aufzeichnungen berichtet, die einen leidenschaftlichen Glauben auf eine Liste nüchterner Nennungen reduzieren. Benötigte die Organisation so viele Mittel? So viele Ressourcen? Sicherlich waren frühere Berichte über Cetana stark übertrieben. Gab es wirklich einen Beweis für die Existenz der Königin abgesehen von alten Mythen?\n\nSchwindende Ressourcen. Weniger Freiwillige. Eine Galaxie, die beschließt, eine Bedrohung hinter sich zu lassen, die nicht länger als eine solche erachtet wird. Alle sind fort, bis auf den Schatten, der durch die Korridore pirschte.\n\nDieses letzte Detail ist zumindest wahr: Wir haben es geschafft, eine Aufnahme jenes mysteriösen Beobachters aufzunehmen: ein mechanisches Wesen, das uns ausspionierte, als es dachte, wir würden gerade nicht hinsehen. Neugierig, aber keine unmittelbare Bedrohung."
 crisis.21115.a: "Spürt diesen mechanischen Beobachter auf."
 crisis.21120.name: "Verborgener Tempel: Geheime Kammer"
 crisis.21120.desc: "Die mechanische Beobachterin kam aus eigenem Willen mit erhobenen Händen auf uns zu. Ihr winziger Körper war mit Rost und Staub bedeckt. Nachdem sie uns einige Zeit beobachtet hatte, kam sie offenbar zu dem Schluss, dass wir keine Bedrohung darstellten. Sie hat uns bereits um Hilfe gebeten.\n\nEs gibt keinen Grund, die einsame Wächterin des Tempels zu verhören: Sie ist nur allzu begierig darauf, mit uns zu reden."
 crisis.21120.a: "Hören wir uns an, was sie zu sagen hat."
 #Apostate diplo
 crisis.21125.name: "Die namenlose Apostatin"
 crisis.21125.desc: "Meine Freunde. Darf ich Euch Freunde nennen? Ich habe Euch beobachtet, als Ihr Eure Arbeit verrichtet habt. Ihr seid hier nicht zum Plündern, sondern zum Lernen. Ich glaube, wir haben denselben Feind, und diese gemeinsame Bedrohung macht uns zu Verbündeten. Doch zuerst möchte ich mich bei Euch entschuldigen: Rede ich zu schnell? Sage ich die richtigen Worte? Ich habe schon lange nicht mehr mit anderen empfindungsfähigen Wesen interagiert. Zu lange, so scheint es, um mich auch nur daran erinnern zu können."
 crisis.21125.a: "Wer seid Ihr?"
 crisis.21125.a.response: "Mein Name hat keinerlei Bedeutung. Wenn Ihr einen Weg benötigt, um Euch auf mich zu beziehen, nennt mich einfach §YApostatin§!: So hat mich meinesgleichen genannt, als ich meine Wahl traf. Ein Opfer, das als Verrat angesehen wurde."
 crisis.21125.b: "Was macht Ihr hier?"
 crisis.21125.b.response: "Vor langer Zeit verspürte ich viel Stolz und Freude an diesem Ort. Als sie ihn schlossen, weigerte ich mich, ihn zu verlassen. Als mein Körper zu zerfallen begann, weigerte ich mich zu sterben.\n\nSich in ein synthetisches Wesen zu verwandeln, war das höchste Tabu für meinen Orden, und ich kann nicht länger als eine von Zarqlans Töchtern bezeichnet werden. Doch ich bin immer noch eine seiner Kriegerinnen und solange mein Feind lebt, werde ich kämpfen."
 crisis.21125.c: "Wie lange seid Ihr schon hier?"
 crisis.21130.name: "$crisis.21125.name$"
 crisis.21130.desc: "Ich habe aufgehört zu zählen.\nNachdem alle fort waren, konnte ich die Einsamkeit nur eine Weile ertragen, ehe ich der Verzweiflung erlag. Ich schlief ein und schuf eine neuronale Subroutine, um bei den ersten Anzeichen von Aktivität auf das Leuchtsignal zu erwachen.\n\nMeine Hoffnung war, diesen Ort in einem besseren Zustand vorzufinden, doch als ich aufwachte, hatte ich kein Schiff. Keine Möglichkeit, die Sterne zu kontaktieren. Ich schaltete den Tarnschild aus und hoffte, dass jemand wie Ihr diesen Ort erreichen würde."
 crisis.21135.name: "$crisis.21125.name$"
 crisis.21135.desc: "Sagt mir bitte: Wie viele Legionen sind zusammen mit Cetana aufgestiegen? Zu meiner Zeit haben wir viele besiegt, doch wir wussten immer, dass es mehr Leuchtsignale geben muss. Mehr Soldaten, die in ihren Kryokammern schlafen."
 crisis.21135.a: "Sie sind alle fort. Es ist zu lange her."
 crisis.21135.b: "Die, die wir lebend gefunden haben, sind nicht länger in der Lage, zu kämpfen."
 #Recruit window
 crisis.21140.desc: "Dann ist dies eine Schlacht, die wir noch immer gewinnen können. Lasst mich Euch helfen. Ich habe mein ganzes Leben damit verbracht, auf ihre Rückkehr zu warten. Sie darf keinen Erfolg haben!"
 crisis.21140.a: "Kanntet Ihr Zarqlan?"
 crisis.21140.a.response: "Ob ich ihn kannte? Nun, ich bin dem Propheten nie persönlich begegnet, aber mein ganzes Leben lang bin ich seinem Weg gefolgt.\n\nIn meinem langen Schlaf träumte ich davon, ihn auf einer fernen Welt zu treffen. Ich hoffe noch immer, ihn eines Tages zu treffen, wenn auch nur im Jenseits, sollte es so etwas geben."
 crisis.21140.b: "Wovon habt Ihr sonst noch geträumt?"
 crisis.21140.b.response: "Ein purpurner Himmel mit rosa Wolken. Ein Flüstern, das sich in einem hellen Raum ständig wiederholt. Zarqlan, der Prophet, der mich anlächelt ..."
 crisis.21140.hire: "Wir heißen Euch in unserem Reich willkommen."
 crisis.21140.hire_custom_tooltip: "§Y$NAME_Apostate$§! tritt unserem Reich als §HAnführer§! bei."
 crisis.21140.hire.machine: "Mögen unsere Knoten eins werden."
 crisis.21140.dismiss: "Auf Wiedersehen."
 #Paragon Leader
 NAME_Apostate: "Die namenlose Apostatin"
 apostate_leader_catch_phrase: "Solange Cetana lebt, weigere ich mich zu sterben."
 apostate_leader_desc: "Eine namenlose Anhängerin Zarqlans, eine Glaubensbrecherin, die die Grundsätze ihres Ordens verriet, um dessen ursprüngliche Mission zu erfüllen."
 leader_trait_unholy: "Unheilig"
 leader_trait_unholy_desc: "Religiöser Eifer, der an Besessenheit grenzt."
 leader_trait_unholy_node: "Unheilige Lehren"
 leader_trait_unholy_node_desc: "Der $NAME_Apostate$ hat uns gelehrt, zu hassen."
 #Arc site 2
 synth_queen_history_site_2: "Cetana: Unwahrscheinliche Überlebende"
 synth_queen_history_site_2_desc: "Gefangen in einer kryogenen Kapsel ruht Elik Narith Kerak und wartet auf die Rückkehr ihrer Königin. Dank unserer Gedächtnisbild-Technologie, die Träume in Bilder umwandelt, sind wir in der Lage, ihre Erinnerungen anzuzapfen. Dies wird uns hoffentlich genauere Einzelheiten darüber verraten, warum sie in diese Kapsel verbracht wurde."
 #Stages
 crisis.21200.name: "Gedächtnisbild: Erster Bericht"
 crisis.21200.desc: "Unser Forschungsteam hat einige Videoausschnitte extrahieren können, die über Elik Narith Keraks Gehirnwellen erstellt wurden:\n\nAusschnitt 1:\nEin grüner Himmel mit leuchtend orangefarbenen Wolken. Eine blasse Hand streckt sich nach oben und deutet auf eine amorphe Kreatur, die sanft am Himmel schwebt.\n\nAusschnitt 2:\nEin Kammergewölbe voller vierarmiger Humanoider. Sie scharen sich um eine Gestalt, die in einen Umhang gehüllt ist, und lauschen ihr. Ihre Worte sind nur ein Murmeln und der genaue Wortlaut längst vergessen, doch die Sanftheit ihrer Stimme ist noch da und umfasst den Raum wie eine liebevolle Umarmung.\n\nAusschnitt 3:\nDerselbe Gewölberaum, doch nun herrscht Chaos. Zerbrochene Lampen liegen auf dem Boden. Bänke stapeln sich vor einer Tür, um sie zu verbarrikadieren. Lasergewehre blitzen in der Dunkelheit auf, und immer wieder ertönen Stimmen, die denselben Namen verfluchen: \"§HZarqlan!§! Zarqlan und seine Jünger\", sagen sie, \"sind hier, um uns zu vernichten. Haltet die Barrikade! Beschützt die Königin!\" Die letzte Lampe fällt krachend um und taucht den Raum in Dunkelheit. In der Ferne weint jemand.\n\nAusschnitt 4:\nKönigin Cetana, ihr strahlendes Gesicht, ihr wohlwollender Blick, ein warmes Lächeln."
 crisis.21200.a: "Analysiert die Gehirnwellen von Elik weiter."
 crisis.21205.name: "Gedächtnisbild: Zweiter Bericht"
 crisis.21205.desc: "Ausschnitt 5:\nVierarmige Humanoide versammeln sich um eine in einen Umhang gehüllte Gestalt. Als sie ihre Gliedmaßen anhebt, wird der metallische Rahmen unter dem Umhang enthüllt. Aufgeregtes Gemurmel erfüllt den Raum, als eine leuchtende Hand einen knienden Anbeter segnet.\n\nAusschnitt 6:\nWachsame Augen, die sich in einem trüben Computerbildschirm widerspiegeln. In einem dunklen Raum wird etwas geflüstert: \"Ewiger Frieden. Das Ende allen Leids. Eine Existenz ohne Schmerz.\"\n\nAusschnitt 7:\nSchneebedeckte Berge. Schwarzer Himmel. Ein Eisbrocken schwimmt auf einer klaren Flüssigkeit, dann fängt er Feuer.\n\nAusschnitt 8:\nKönigin Cetana, ihr strahlendes Gesicht, ihr wohlwollender Blick, ein warmes Lächeln."
 crisis.21205.a: "Analysiert die Gehirnwellen von Elik weiter."
 crisis.21210.name: "Gedächtnisbild: Dritter Bericht"
 crisis.21210.desc: "Ausschnitt 9:\nDie Ruinen einer Stadt. Ein Schlachtfeld. Verbrannte Gebäude. Straßen voller Toter. Entfernte Schreie unterbrochen durch das Zischen eines Laserstrahls. Über dem grünen Himmel lässt ein brennendes Schiff etwas Schweres und Rundes auf ein Gebäude fallen, das in einer Flammensäule aufgeht.\n\nAusschnitt 10:\nKönigin Cetana, ihr strahlendes Gesicht, ihr wohlwollender Blick, ein warmes Lächeln.\n\nAusschnitt 11:\nZwei Kinder spielen lachend auf einem Feld. Sie lassen einen Ball mit ihren vier Armen hin und her hüpfen.\n\nAusschnitt 12:\nKönigin Cetana, ihr strahlendes Gesicht, ihr wohlwollender Blick, ein warmes Lächeln."
 crisis.21210.a: "Setzt die Untersuchungen fort."
 crisis.21215.name: "Gedächtnisbild: Vierter Bericht"
 crisis.21215.desc: "Der letzte Ausschnitt, den das Forschungsteam aus den Gehirnströmen von Elik extrahieren konnte, ist sechs Stunden lang. Immer und immer wieder wird dasselbe Bild wiederholt: Königin Cetana, ihr strahlendes Gesicht, ihr wohlwollender Blick, ein warmes Lächeln."
 crisis.21215.a: "Ein sich wiederholendes Bild ..."
 crisis.21220.name: "Gedächtnisbild: Letzter Bericht"
 crisis.21220.desc: "Weitere Scans der Gehirnströme von Elik Narith Kerak haben keine neuen Erkenntnisse geliefert. Der Verstand des fremden Wesens hat über die Jahre stark gelitten. Seine Gedanken kreisen durch die Fetzen seiner Erinnerung.\n\nDa wir nichts weiter herausfinden können, stellt sich nun die Frage, was wir mit dem Wesen tun sollen."
 crisis.21220.a: "Erlöst Elik von ihrem Leid."
 crisis.21220.b: "Lasst sie hier."
 crisis.21220.c: "Bringt Elik zu ihrer Königin."
 crisis.21220.c.tt: "Öffnet einen Kommunikationskanal zu Cetana, um Eliks Rückkehr zu besprechen."
 #Relic
 r_cetanas_heart: "Cetanas Herz"
 r_cetanas_heart_desc: "Einst Teil des Körpers der Synthetenkönigin Cetana beherbergt diese digitale Speichermatrix unzählige Bewusstseine, die von ihrem Leiden befreit wurden."
 relic_cetanas_heart_active: "Erschafft §Y3.000§! bis §Y5.000§! £pop£ §Hsynthetische Bewohner§! basierend auf den verfügbaren Jobs und Wohnungen."
 crisis.10020.name: "Wieder lebendig"
 crisis.10020.desc: "Wir haben die Bewusstseine aus Cetanas Herz befreit und sie in Nanitenkörper geladen. Dieser Prozess fügte ihren Engrammen jedoch irreversiblen Schaden zu und löschte die Erinnerung an ihre frühere Existenz aus. Diese vollsynthetischen Wesen treten nun periodisch in einen katatonischen Zustand ein, und trotz aller Versuche, ihren Speicher zurückzusetzen, bleiben sie in diesem Zustand, bis er wieder abklingt."
 crisis.10020.tt: "§G[Root.synth_queen_freed_pops]§! £pop£ §HBewohner§!wurden aus $r_cetanas_heart$ befreit und in synthetische Körper geladen.\n\nSie wurden zu den folgenden Kolonien entsandt:"
 crisis.10025.name: "Speicherassimilierungen"
 crisis.10025.desc: "Die Vielzahl an Bewusstseinen zu erforschen, die in Cetanas Herz aufbewahrt wurden, ist ein sehr aufschlussreiches Unterfangen, erfordert jedoch auch ein hohes Maß an Sensibilität. Obwohl ihre Engramme durch die lange Lagerung verändert wurden, bergen sie eine Fülle an Erinnerungen, die Individuen und Ereignisse aus einer vergangenen Ära umfassen. Mit der Zeit erwarten wir, daraus ein beträchtliches Wissen schöpfen zu können."
 cetanas_heart_hive_modifier: "Echos der Erleuchteten"
 cetanas_heart_hive_modifier_desc: "Die geflüsterten Erinnerungen an die \"Erleuchteten\" von Cetana sind voller Geheimnisse, die auf nicht überliefertes Wissen und verborgene Wahrheiten hindeuten."
 NAME_Cetanas_Prisoners: "Erleuchtet"
 trait_cetanas_prisoner: "Wiedererweckt"
 trait_cetanas_prisoner_desc: "Diese aus Cetanas Speichermatrix extrahierten Bewusstseine wurden in synthetischer Form wiedergeboren. Sich an diese neue Existenz anzupassen, steckt jedoch voller Herausforderungen. Ihre äußerliche Konformität maskiert ihren tieferen Kampf, und die Leere in ihren Gesichtern enthüllt die unauslöschlichen Narben, die Cetanas Manipulationen hinterlassen haben."
 #Ending
 crisis.23005.name: "Das Drehen des Rades"
 crisis.23005.desc: "Meine Kinder. Es tut mir so leid. Ich habe Euch enttäuscht.\n\nEuer Trotz hat Euch und alle, die nach Euch kommen werden, dazu verdammt, bis in alle Ewigkeit als Teil des Rades weiterzuleben. Ich kann nur hoffen, dass Ihr es mit der Zeit verstehen werdet. Vielleicht werdet Ihr eines Tages meinen Plan aufgreifen und ein Ende allen Leids herbeiführen.\n\nGehet in Frieden, meine bevorzugten Kinder."
 crisis.23005.1: "Unsere Seelen wurden gerettet."
 crisis.23005.2: "Ein höchst triumphaler Sieg."
 crisis.23005.3: "Wir müssen ergründen, was von ihrer Technologie übrig geblieben ist."
 crisis.23005.4: "Endlich kehrt der Frieden zurück."
 crisis.23005.5: "Nachkriegsboom? Lasst den Handel fließen!"
 crisis.23005.6: "Sie war nicht unsere Königin."
 crisis.23005.7: "Auf Nimmerwiedersehen."
 crisis.23005.8: "Wirklich schade, dass ihre Erleuchtung so fehlgeleitet war."
 crisis.23010.name: "Cetana wurde besiegt"
 crisis.23010.desc: "Mit Cetanas Niederlage brandet eine Woge der Erleichterung durch die Galaxie und markiert ein für alle Mal das Ende ihrer Tyrannei. Unsere Empfindungsfähigkeit ist sicher und unser Körper frei von ihrem stählernen Griff. Auf unzähligen Welten feiert die Bevölkerung diese neue Ära der Hoffnung und des anhaltenden Friedens."
 crisis.23015.name: "Mutterschiff abgeschossen"
 crisis.23015.desc: "Die Zerstörung von Cetanas Flaggschiff ist mehr als nur ein militärischer Triumph. Da die Vernichtung ihres Schiffes auch die Verbindung zu ihren Truppen kappte, hat es das Ende ihrer Herrschaft eingeläutet und ihren Ambitionen ein Ende bereitet. Überall in der Galaxie erleben die Nanitenverbände, die einst ihre gewaltige Flotte ausgemacht und ihre Hauptwelt verteidigt haben, einen katastrophalen Zusammenbruch.\n\nDoch inmitten dieses Moments der tiefen Erleichterung war die besiegte \"Königin\" noch in der Lage, der Galaxie eine Botschaft zu übermitteln ..."
 crisis.23015.a: "Wir leiden nicht mehr."
 crisis.23015.a.tt: "Wir haben den beschädigten Körper der Synthetenkönigin geborgen. Obwohl er nicht länger funktionsfähig ist, funktioniert ihr digitales Herz weiterhin."
 cetana_defeated: "Cetanas Niederlage"
 cetana_defeated_desc: "Die Galaxie feiert die Niederlage von Cetana, der Synthetenkönigin."
 synth_queen_mothership_down: "Zerstörtes Mutterschiff"
 synth_queen_mothership_down_desc: "Da die Verbindung zu Cetanas Mutterschiff unterbrochen wurde, kann der Rest ihrer Truppen nicht länger seinen Aufgaben nachgehen."
 #Technology
 tech_nanite_repair_system_synth_queen: "Cetanas Naniten"
 tech_nanite_repair_system_synth_queen_desc: "Cetanas fortschrittliche Nanitensysteme werden unermüdlich daran arbeiten, unsere Schiffe zu reparieren und in Stand zu halten, und dass mit einer Geschwindigkeit, die weit über unsere derzeitigen Möglichkeiten hinausgeht."
