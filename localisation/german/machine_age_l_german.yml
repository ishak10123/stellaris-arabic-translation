 tech_lathe_validator: "$building_lathe_validator$"
 tech_lathe_validator_desc: "$building_lathe_validator_desc$"
 building_lathe_capital: "Verarbeitungseinheit"
 building_lathe_capital_desc: "Durch das Quantenwesen der Verarbeitungseinheiten der Synapsenschmiede kann Letztere parallele Berechnungen auf mehreren dimensionalen Schichten durchführen."
 building_lathe_major_capital: "Verarbeitungseinheit: Parallelisiert"
 building_lathe_major_capital_desc: "Diese Verarbeitungseinheit kann Parallelvorgänge nun besser durchführen, indem die kognitiven Echos der Neuralchips in in sich geschlossenen Gammaraum-Taschen reflektiert werden."
 building_lathe_super_capital: "Verarbeitungseinheit: Vektoriell"
 building_lathe_super_capital_desc: "Diese verbesserte Verarbeitungseinheit optimiert die Rechenleistung durch das Erzeugen negativer Raumvektoren. Diese dimensionalen Bereichsbildungsprozesse führen zu außergewöhnlich effektiven und stabilen Ergebnissen."
 building_lathe_resonator: "Synapsenresonator"
 building_lathe_resonator_desc: "Resonatoren nutzen das kognitive Potenzial verirrter Gedanken und autonomer Systeme und leiten diese um, sodass jeder einzelne Chip die Effizienz seiner unmittelbaren Verarbeitungsnachbarn erhöht."
 lathe_resonator_tt: "§YNeuralchip§!-Produktion: §G+1%§! pro §YNeuralchip§!\n(Derzeitiger Wert: §G+[num_neural_chips]%§!)"
 building_lathe_stabilisator: "Neuralstabilisator"
 building_lathe_stabilisator_desc: "Stabilisierungssysteme filtern jene Störsignale heraus, die beim Berechnen entstehen, wenn Neuralchips körperliches Leid plagt. Dadurch lässt sich die Produktion insgesamt steigern."
 building_lathe_overclocker: "Synapsenübertakter"
 building_lathe_overclocker_desc: "Die Schmiede ist so konstruiert, dass sie die installierten Neuralchips bewahrt und möglichst lange produktiv hält. Der Übertakter kann diese Befehle negieren und so eine höhere und schnellere Produktion erzielen, was jedoch eine gestiegene Ausfallrate zur Folge hat."
 building_lathe_preserver: "Synapsenbewahrer"
 building_lathe_preserver_desc: "Die organischen Komponenten des Netzwerks sind besonders anfällig gegen Energieschwankungen, die zu einem raschen axonalen Verfall führen können. Der Bewahrer versucht, diese Schwankungen zu reduzieren, um die anfälligeren Teile der Synapsenschmiede zu schützen."
 building_lathe_reactor: "Reaktorerweiterung"
 building_lathe_reactor_desc: "Je mehr Chips an das Netzwerk angeschlossen sind, desto mehr Energie benötigt das System. Die Installation zusätzlicher Reaktoren federt die komplexe Logistik ab, die die Energieversorgung der Synapsenschmiede mit sich bringt."
 building_lathe_life_support: "Synapsenerhalter"
 building_lathe_life_support_desc: "Dedizierte Einrichtungen organisieren die Wartung der kritischen Komponenten der Schmiede, sodass wir mehr Chips und eine gesundere Netzwerkumgebung unterstützen können."
 building_lathe_cogitator: "Synapsenkogitator"
 building_lathe_cogitator_desc: "Die Berechnung von Hyperraum-Versorgungsketten ist komplex. Zweigt man dafür einen Teil der Rechenleistung ab, wird sogar die größte Flotte tiefer in feindliches Gebiet vordringen können."
 building_lathe_cogitator_tt: "§YFlottenkapazität§!: §G+1%§! pro §YNeuralchip§!\n(Derzeitiger Wert: §G+[num_neural_chips]%§!)\n§YErfahrungsgewinn (Schiffe)§!: §G+2%§! pro §YNeuralchip§!\n(Derzeitiger Wert: §G+[num_neural_chips_double]%§!)"
 building_lathe_validator: "Synapsenvalidator"
 building_lathe_validator_desc: "Obwohl der primäre Zweck der spezialisierten Funktionen des Validators in der Unterstützung beim Formulieren von Unendlichkeitsthesen besteht, lässt er sich auch auf allgemeinere Aspekte der Informatik anwenden."
 building_lathe_validator_tt: "$mod_category_computing_research_speed_mult$: §G+1%§! pro §YNeuralchip§!\n(Derzeitiger Wert: §G+[num_neural_chips]%§!)"
 ### Synaptic Lathe UI
 SYNAPTIC_LATHE_STABILITY_DESC: "§E$r_stability$ ist ein Maß für die globale Netzwerkstabilität der Synapsenschmiede. Sie wird primär durch die gesamte £happiness£ §YZufriedenheit§! der Neuralchips bestimmt.\n\nStabilität kann durch Dinge wie £housing£ §RÜberbevölkerung§! und §Rwenig £amenities£ Dienstleistungen§! reduziert werden. Eine hohe $PLANET_STABILITY_TITLE$ führt zu einer erhöhten Ressourcenproduktion, wohingegen eine niedrige $PLANET_STABILITY_TITLE$ die Ressourcenproduktion reduziert. Anders als bei anderen Kolonien kann die Synapsenschmiede nie eine vollständige §YRevolte§! erleben.§!"
 SYNAPTIC_LATHE_RESISTANCE_DESC: "§E§YWiderstand§! ist ein Maß für das allgemeine Niveau an Störungen, die abtrünnige Neuralchips verursachen. Ein hohes Maß an £crime£ §YWiderstand§! führt zu mehr §YBevölkerungsschwund§! und erhöht die Wahrscheinlichkeit, dass Bevölkerung flieht. Widerstand entsteht auf natürliche Weise, wenn ein Planet viele Bewohner hat, und lässt sich durch das Erhöhen von £happiness£ §YBewohnerzufriedenheit§! oder den Bau von £building£ §YNeuralstabilisatoren§! verringern.§!"
 SYNAPTIC_LATHE_HOUSING_DESC: "§E§Y$PLANET_HOUSING_TITLE$§! steht für die Infrastruktur, die dem Beherbergen von Neuralchips zugewiesen ist. Geht Euch der Platz aus, um Neuralchips angemessen unterzubringen und zu erhalten, verringert dies die $r_stability$. Ihr könnt mehr §YWohnraum§! schaffen, indem Ihr zusätzliche £district£ §YDistrikte§! einrichtet, die §YVerarbeitungseinheit§! der Schmiede verbessert oder den £building£ §YSynapsenerhalter§! baut.§!"
 SYNAPTIC_LATHE_AMENITIES_DESC: "§E§Y$PLANET_AMENITIES_TITLE$§! stehen für die Infrastruktur, die der Lebenserhaltung der Neuralchips dient. Ein Planet, der nicht die erforderliche Menge an $PLANET_AMENITIES_TITLE$ für seine Bevölkerung zur Verfügung stellt, erleidet einen Malus auf £happiness£ §YZufriedenheit§!. Ihr könnt §YDienstleistungen§! erhöhen, indem Ihr die §YVerarbeitungseinheit§! der Schmiede verbessert oder den £building£ §YSynapsenerhalter§! baut.§!"
 SYNAPTIC_LATHE_RESISTANCE_TITLE: "Widerstand"
