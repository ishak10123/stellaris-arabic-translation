 cybercreed_faithful_unrest: "Unruhen der Gläubigen"
 cybercreed_faithful_unrest_desc: "Die Entscheidung des Technophanten, die Credos zu unterdrücken, hat für Unruhe unter den fanatischsten Anhängern gesorgt."
 cybercreed_unified_faith: "Vereinter Glaube"
 cybercreed_unified_faith_desc: "Die Technophanten haben den Glauben erfolgreich vereint."
 cybercreed_moderates_ignored: "Gemäßigte ignoriert"
 cybercreed_moderates_ignored_desc: "Die Technophanten ignorieren den Ruf nach Einschränkungen und gestatten den einzelnen Credos, ihre Praktiken weiter fortzusetzen."
 cybercreed_creeds_absorbed: "Credos absorbiert"
 cybercreed_creeds_absorbed_desc: "Die Technophanten sind dem Ruf gefolgt, die Credos in einen vereinten Glauben aufzunehmen."
 cybercreed_forced_cyberization: "Zwangsweise Augmentierung"
 cybercreed_forced_cyberization_desc: "Den Ungläubigen der Gesellschaft widerstrebt es, dazu gezwungen zu werden, die heilige Verschmelzung anzunehmen."
 cybercreed_allowed_non_cyborgs: "Entscheidungsfreiheit"
 cybercreed_allowed_non_cyborgs_desc: "Den Nichtgläubigen unserer Gesellschaft wurde gestattet, auf die göttlichen Verbesserungen zu verzichten. Dies brachte dem Glauben Wohlwollen ein."
 cyber_creed_no_creed_robot_points_modifier: "Credofreie Kybernetik"
 cyber_creed_no_creed_robot_points_modifier_desc: "Die Analyse der göttlichen Augmentierungen, die die einzelnen Credos verwenden, hat unser Verständnis in Sachen kybernetisches Design verbessert."
