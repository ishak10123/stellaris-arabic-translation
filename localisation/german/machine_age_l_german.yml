 situation_paperclip_status_low_capacity: "Lagerkapazität ist §Runzureichend§!, um die Quote zu erfüllen."
 civic_machine_obsessional_directive: "Zwangsdirektive"
 civic_machine_obsessional_directive_desc: "Diese Maschinenintelligenz hat es sich zum Ziel gemacht, unaufhörlich Waren zu produzieren, um die Gewinne zu maximieren, unabhängig davon, dass ihre Schöpfer schon lange tot sind. Nichts kann ihre ständig wachsenden Produktionsquoten aufhalten."
