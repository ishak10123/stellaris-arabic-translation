 #AUGMENTATION BAZAAR CIVIC
 ###########################
 building_augmentation_bazaars: "Augmentierungsbasar"
 building_augmentation_bazaars_desc: "Ein neonbeleuchteter Irrgarten aus Gängen, Implantatshändlern und inoffiziellen Hardware-Kliniken: Hier findet man alles rund um kybernetische Implantate, sowohl über als auch unter der Ladentheke."
 concept_augmentation_bazaars: "$building_augmentation_bazaars$"
 building_augmentation_bazaars_branch: "Weltraum-Implantatsknoten"
 building_augmentation_bazaars_branch_desc: "Ihr wollt schneller sein, höher springen, besser denken und länger durchhalten? Exotische Importe aus der gesamten Galaxie sind nun in Eurem örtlichen Implantatsknoten verfügbar."
 concept_augmentation_bazaars_branch: "$building_augmentation_bazaars_branch$"
 civic_augmentation_bazaars: "Augmentierungsbasare"
 civic_augmentation_bazaars_desc: "§RWARNUNG: Blockiert alle Aufstiegspfade außer ['concept_cybernetic_ascension'].§!\n\nDie Kommodifizierung von Kybernetik hat zu labyrinthartigen Märkten geführt, auf denen sich Händler billiger Augmentierungen, zwielichtige Mod-Kliniken und grell beleuchtete Werbetafeln dicht an dicht drängen. Taucht ein in eine Synergie aus Fleisch und Schaltkreisen, ganz egal, ob Ihr reich seid oder nicht."
 civic_tooltip_augmentation_bazaars_effects: "- $SPECIES_TRAITS$ Erlaubt die Auswahl von ['concept_universal_augmentations_traits'] $NEW_LINE$- $AVAILABLE_BUILDINGS$ ['concept_augmentation_bazaars']$NEW_LINE$- $AVAILABLE_HOLDINGS$ ['concept_augmentation_bazaars_branch'] $NEW_LINE$- Ersetzt alle £job_executive£ §Y$job_executive_plural$§! durch £job_augmentation_merchant£ §Y$job_augmentation_merchant_plural$§!"
 concept_basic_cyborg_trait: "Kybernetische Grundeigenschaften"
 concept_basic_cyborg_trait_desc: "Kybernetische Grundeigenschaften sind:$NEW_LINE$- ['trait:trait_cyborg_power_drills'] $NEW_LINE$- ['trait:trait_cyborg_harvesters'] $NEW_LINE$- ['trait:trait_cyborg_superconductive']"
 councilor_augmentation_bazaars: "Implantat-Impresario"
 councilor_augmentation_bazaars_female: "Implantat-Impresaria"
 councilor_augmentation_bazaars_desc: "Als $TITLE$ überwacht man sowohl die Produktentwicklung als auch die Verteilung von Implantaten an Augmentierungsbasare und Weltraum-Implantatsknoten in der Galaxie."
