 tr_nanotech_finish: "Nanotechnologietraditionen abgeschlossen"
 tr_nanotech_1_delayed: "Die Galaxie ist sich nicht bewusst, dass sie bereits eine Erweiterung von uns ist und schon bald in unsere allumfassende Nanitenflut aufgenommen werden wird."
 tr_nanotech_2_delayed: "Der Schwarm zieht alles im Kosmos an. Wir transformieren die Galaxie nach unseren Vorstellungen."
 tr_nanotech_3_delayed: "Jede Welt, die der Schwarm assimiliert, vergrößert unsere kollektive Reichweite und bereichert das Gefüge unserer vereinten Existenz."
 tr_nanotech_4_delayed: "Mit jeder Transformation kommen wir unserem Ziel ein Stück näher und steigern unsere Effizienz immer weiter."
 tr_nanotech_5_delayed: "Wir sind jede Fabrik, jedes Schiff, jede Waffe und jedes Schild: Alle sind sie jeweils nur ein Tröpfchen in der gewaltigen Flut unserer kollektiven Macht."
 tradition_nanotech_delayed: "Wir sind eine unaufhörliche Flut. Wir sind ständig in Bewegung. Wir sind immerwährend. Wir sind allumfassend. Möge alles in uns verschmelzen. Mögen wir uns zu allem formen."
