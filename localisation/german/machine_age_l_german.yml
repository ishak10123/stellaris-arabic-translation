 trait_robot_history_warbot: "Kriegsmaschine"
 trait_robot_history_warbot_desc: "Diese ursprünglich für die Kriegsführung und Verteidigung entwickelten Maschinen zeichnen sich durch ihre außergewöhnlichen Reaktionszeiten, ihre verstärkte Panzerung und ihre robusten Sicherungssysteme aus."
 trait_robot_history_artbot: "Kinderbetreuungsbot"
 trait_robot_history_artbot_desc: "Diese ursprünglich für Haushaltsarbeiten entwickelten Maschinen verfügen über feinmotorische Fähigkeiten, ein effizientes Ressourcenmanagementsystem sowie außergewöhnliche Multitasking-Eigenschaften."
 trait_robot_history_explorebot: "Kunstgenerator"
 trait_robot_history_explorebot_desc: "Diese Maschinen, die man ursprünglich nicht für den praktischen Einsatz konzipierte, zeichnen sich durch ihre beeindruckenden Kreativalgorithmen, ihre komplizierten Designprozesse und deren ausdrucksstarken Ausstoß aus, und sie eignen sich hervorragend für künstlerische und kulturelle Zwecke."
 trait_robot_history_researchbot: "Forschungsassistenten"
 trait_robot_history_researchbot_desc: "Diese ursprünglich als Forschungsassistenten konzipierten Maschinen verfügen über scharfe analytische Fähigkeiten sowie eine rasche Informationsaufnahme und streben unermüdlich nach wissenschaftlichen Erkenntnissen."
 trait_robot_history_resourcebot: "Arbeiterbots"
 trait_robot_history_resourcebot_desc: "Diese Maschinen wurden eigens für die Gewinnung von Rohstoffen entwickelt. Die spezialisierten Werkzeuge, die verstärkten Gelenke und die modularen Systeme machen sie zu idealen Arbeitern."
 trait_robot_history_chatbot: "Konversations-KI"
 trait_robot_history_chatbot_desc: "Diese Maschinen, die man ursprünglich zur sozialen Unterstützung ihrer Schöpfer entwickelte, verfügen über fortschrittliche Empathie-Algorithmen und besitzen tadellose Kommunikationsfähigkeiten, was sie zu idealen Begleitern macht."
 individual_machine_assault_1: "Kampfandroidenarmee"
 individual_machine_assault_1_desc: "Diese spezialisierten Kampfandroiden verfügen über eine fortschrittliche Panzerung und hochmoderne optische Sensoren, wodurch sie sich bestens für die Invasion von Planeten eignen."
