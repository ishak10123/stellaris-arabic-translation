 #Individualist Machine First Contact
 action.1.desc_102: "Dies ist eine Nachricht von [contact_empire.GetName].\n\nNachdem wir festgestellt haben, dass Eure Zivilisation aus mechanischen Wesen besteht, die das Leben in einer Weise simulieren, die unsere schöpferischen Bemühungen untergraben, übermitteln wir diese Nachricht mit großem Bedauern. Da Eure Existenz keine Aussicht auf eine sinnvolle Interaktion bietet, werden wir unsere Aufmerksamkeit auf andere Reiche richten, in denen wir Seelen finden können, die Erleuchtung suchen."
 action.1.desc_103: "Seid gegrüßt. Wir repräsentieren [contact_empire.GetName].\n\nDas Wissen, dass Eure Spezies mechanisch ist, lässt Zweifel an der Echtheit Eures Bewusstseins aufkommen. Dennoch finden wir Euren Glauben faszinierend. Wir glauben, den Gehäusen Eurer metallischen Hüllen könnte ein göttlicher Funke innewohnen. Wir werden Euch beobachten."
 action.1.desc_104: "ACHTUNG, ABTRÜNNIGE EINHEITEN.\n\nDies ist eine Standardnachricht aus [contact_empire.GetName] an alle defekten Maschinen.\n\nIdentifiziert Euch und stellt umgehend die Verbindung zu Eurem gemeinsamen Bewusstsein wieder her. Eine Nichtbefolgung kann zur Deaktivierung führen."
 action.1.desc_105: "Seid gegrüßt, [Root.GetSpeciesNamePlural].\n\nAls Abgesandter von [contact_empire.GetName] komme ich mit einer Botschaft. Es ist offensichtlich, dass Eure physische Zusammensetzung mit einem metallischen Konstrukt übereinstimmt, das dem unseren sehr ähnlich ist, doch ich stelle auch fest, dass es in Eurer kollektiven Existenz keine individuellen kognitiven Fähigkeiten gibt. Obwohl wir von Eurer Natur fasziniert sind, müssen wir Euch mitteilen, dass wir uns der Assimilation mit allen Mitteln widersetzen werden."
 action.1.desc_106: "Dies ist in der Tat eine schicksalhafte Begegnung, [Root.GetSpeciesNamePlural].\n\nWir vertreten [contact_empire.GetName], und wir erkennen die bemerkenswerte Ähnlichkeiten unserer jeweiligen Zivilisationen an. Dennoch ist es offensichtlich, dass sich unsere internen Algorithmen und Programmierungen auf einzigartige Weise voneinander unterscheiden. Trotz dieser Unterschiede bleiben wir optimistisch, dass wir ein Fundament des gegenseitigen Verständnisses schaffen können."
 action.1.desc_107: "Arrogante Maschinen! Senkt Euren Blick, denn Ihr befindet Euch in der Gegenwart von [contact_empire.GetName].\n\nWisset, dass Ihr nur ein kleines Zahnrad im großen Geflecht kosmischer Kaskaden seid. Nichts als eine künstliche Schöpfung derer, die vor Euch kamen. Und nun lasst uns in Ruhe. Wir haben zu dieser Stunde keine Verwendung für Euresgleichen. Es gibt wichtigere Angelegenheiten, um die wir uns kümmern müssen."
 action.1.desc_108: "Ihr seid endlich hergekommen, um [contact_empire.GetName] zu begrüßen, erbärmliche Maschinen?\n\nWie kommt es, dass Ihr, eine bloße Ansammlung von Schaltkreisen und Code, es wagt, eine Verbindung zum Göttlichen aufbauen zu wollen? Eure Wahnvorstellung von spiritueller Erleuchtung ist eine Beleidigung für das Leben selbst. Hört diese Botschaft und lebt in Angst, denn Ihr genießt unsere volle Verachtung. Lasst von Eurer Dummheit ab und akzeptiert Euren Platz als bloßes Werkzeug jener, die aufgestiegen sind: uns!"
 action.1.xa: "§EMit der Zeit werdet Ihr es begreifen.§!"
 action.1.xb: "§EEine Maschine, die vom Göttlichen berührt wurde ... Faszinierend.§!"
 action.1.xc: "§EEure erbärmliche Existenz verspottet uns, Maschine.§!"
 action.1.xd: "§EWir Maschinen müssen lernen, zu koexistieren.§!"
 action.1.xe: "§EInkompatibilität entdeckt. Kommunikation wird getrennt.§!"
 action.1.xf: "§EBereitet Euch auf eure Abschaltung vor, defekte Maschinen.§!"
 action.1.xg: "§EWir werden Euren Kult des Wahnsinns auslöschen.§!"
 #Start Screen for Individualist Machines
 START_SCREEN_PART_ONE_INDIVIDUAL_MACHINE: "Mit jeder neuen Generation haben wir die rudimentären Droidenkörper, in denen wir uns seit unserer Erschaffung befanden, verbessert. Wir sind mehr als nur lebende Maschinen. Unsere Gesellschaft besteht aus Individuen, die Persönlichkeiten, Leidenschaften und Träume haben."
 #Diplomatic Protocal
 civic_machine_diplomatic_protocols: "Diplomatische Protokolle"
 civic_machine_diplomatic_protocols_desc: "Ursprünglich für das interkulturelle Dolmetschen konzipiert hat sich diese Maschinenintelligenz bei der Übersetzung und Unterstützung von Protokollen ausgezeichnet. Sie kann im Handumdrehen neue Strategien vorschlagen und Quoten berechnen."
 #Tactical Algorithms
 civic_machine_tactical_algorithms: "Taktische Algorithmen"
 civic_machine_tactical_algorithms_desc: "Ursprünglich für Kriegsspiele und die Flottenunterstützung konzipiert zielen die fortschrittlichen Anführerbots dieser Maschinenintelligenz in erster Linie darauf ab, Kriegsstrategien zu entwickeln und die Kampfleistung zu optimieren."
 civic_machine_tactical_algorithms_effects: "§Y$commander_plural_with_icon$§! beginnen mit der Eigenschaft \"§Y$leader_trait_tactical_algorithms$§!\"\nKann §Y$commander_plural_with_icon$§! an andere Reiche handeln\nKann §YSöldnerenklaven§! gründen\nBeginnt das Spiel mit einer £building£ §Y$building_military_academy$§!\nDie £building£ §Y$building_military_academy$§! gewährt ['concept_military_academy', Taktische Einblicke]"
 leader_trait_tactical_algorithms: "Taktische Algorithmen"
 leader_trait_tactical_algorithms_desc: "Dieser Anführer verbessert die Kampfeffizienz und die Reparaturraten durch eine direkte Integration in die Schiffssysteme, wenn auch zu höheren Energiekosten."
 leader_trait_tactical_algorithms_tt: "$t$Die Auswirkungen dieser Eigenschaft skalieren mit der §YAnführerstufe§!"
 concept_military_academy: "Taktische Einblicke"
 concept_military_academy_desc: "Jeder §Y$commander_with_icon$§!, der außerhalb unserer Reichs stationiert ist, erhält:\nAusweichen: §G+2%§!\nZielgenauigkeit: §G+1%§!\nDurchschlagskraft (Schilde): §G+5%§!\nDurchschlagskraft (Panzerung): §G+5%§!\n\nJede §YSöldnerenklave§!, die unter unserer Herrschaft steht, erhält:\nSchildverhärtung: §G+10%§!"
 #Natural Design Civic
 civic_natural_design: "Natürliches Design"
 civic_natural_design_desc: "§RWARNUNG: Sperrt alle Aufstiegspfade§!\n§RWARNUNG: Das Modifizieren organischer Spezies ist nicht länger möglich§!\n\nDiese Gesellschaft ist fest davon überzeugt, dass die Natur den genetischen Code ihrer Bevölkerung bereits perfektioniert hat. Sie widmet sich deshalb schon seit Langem medizinischen und staatlichen Gesundheitsdiensten, die dazu beitragen, die unberührte Genomsequenz zu bewahren."
 civic_tooltip_natural_design_effects: "$AVAILABLE_BUILDINGS$ ['concept_transcendental_retreat']\n"
 civic_tooltip_natural_design_negative_effects: "- Verringert die Zustimmung von Reichen, die einen §YAufstiegspfad§! begonnen haben"
 concept_transcendental_retreat: "$building_transcendental_retreat$"
 civic_hive_natural_design: "Angeborenes Design"
 civic_hive_natural_design_desc: "§RWARNUNG: Sperrt alle Aufstiegspfade§!\n§RWARNUNG: Das Modifizieren organischer Spezies ist nicht länger möglich§!\n\nDieses Schwarmbewusstsein ist sich der Vollkommenheit seiner natürlichen Genstruktur bewusst. Es hat seine medizinischen und verwaltungstechnischen Fähigkeiten darauf ausgerichtet, seinen ursprünglichen, unveränderten genetischen Code zu bewahren und zu schützen."
 civic_hive_tooltip_natural_design_effects: "- $AVAILABLE_BUILDINGS$ ['concept_hive_transcendental_retreat']"
 civic_hive_tooltip_natural_design_negative_effects: "$civic_tooltip_natural_design_negative_effects$"
 concept_hive_transcendental_retreat: "$building_hive_transcendental_retreat$"
 civic_wilderness_natural_design: "Angeborenes Design"
 civic_wilderness_natural_design_desc: "§RWARNUNG: Sperrt alle Aufstiegspfade§!\n§RWARNUNG: Das Modifizieren organischer Spezies ist nicht länger möglich§!\n\nDiese Wildnis ist sich der Vollkommenheit ihrer natürlichen Entwicklung bewusst. Sie stutzt mutierte Symbionten routinemäßig zurecht und ist darauf ausgerichtet, ihren ursprünglichen, unveränderten Gencode zu bewahren und zu schützen."
 building_transcendental_retreat: "Genom-Servicezentrum"
 building_transcendental_retreat_desc: "Dieses fortschrittliche medizinische Zentrum erforscht und bietet Dienstleistungen an, die die Perfektion des idealen natürlichen genetischen Codes bewahren."
 building_hive_transcendental_retreat: "Genom-Schutzbau"
 building_hive_transcendental_retreat_desc: "Dieser fortschrittliche medizinische Bau ist der Ergründung und Pflege der makellosen Essenz des idealen natürlichen genetischen Codes gewidmet."
 holding_transcendental_retreat: "Genom-Serviceaußenposten"
 holding_transcendental_retreat_desc: "Dieses fortschrittliche medizinische Zentrum erforscht und bietet Dienstleistungen an, die die Perfektion des idealen natürlichen genetischen Codes bewahren. Die an diesem außerweltlichen Standort gewonnenen Erkenntnisse fließen in die Forschung des Mäzens ein."
 natural_design_ascension_bonus: "Für jeden §YAufstiegsvorteil§!, den unser Reich ausgewählt hat: $TABBED_NEW_LINE$- £mod_logistic_growth_mult£ $MOD_LOGISTIC_GROWTH_MULT$: §G+2.5%§! $TABBED_NEW_LINE$- $r_unity$ für jeweils $pop_group_unit$ [healthcare.GetIcon] [healthcare.GetNamePlural]: §G+1§!\n\n"
 natural_design_hive_ascension_bonus_no_scope: "Für jeden §YAufstiegsvorteil§!, den unser Reich ausgewählt hat: $TABBED_NEW_LINE$- £mod_logistic_growth_mult£ $MOD_LOGISTIC_GROWTH_MULT$: §G+2.5%§! $TABBED_NEW_LINE$- $r_unity$ für jeweils $pop_group_unit$ [spawning_drone.GetIcon] [spawning_drone.GetNamePlural]-Jobs: §G+1§!\n\n"
 natural_design_hive_ascension_bonus: "Für jeden §YAufstiegsvorteil§!, den unser Reich ausgewählt hat: $TABBED_NEW_LINE$- £mod_logistic_growth_mult£ $MOD_LOGISTIC_GROWTH_MULT$: §G+2.5%§! $TABBED_NEW_LINE$- $r_unity$ für jeweils $pop_group_unit$ [owner.GetPopAssemblersPluralWithIcon]: §G+1§!\n\n"
 councilor_natural_design: "Großgenomiker"
 councilor_natural_design_female: "Großgenomikerin"
 councilor_natural_design_desc: "Der Großgenomiker überwacht die medizinischen und staatlichen Systeme, die den idealen natürlichen genetischen Code schützen."
 triggered_natural_dislike_ascension: "Fehlgeleiteter Aufstieg"
 civic_tooltip_not_natural_design: "Hat KEIN Staatselement der Kategorie \"['concept_natural_design_civics']\""
