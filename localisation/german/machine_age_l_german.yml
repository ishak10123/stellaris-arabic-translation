 civic_corporate_toxic_baths_individual_machine_desc: "Gedankt sei dem Schöpfer! Die üppige, süchtig machende und weiche Textur dieser Schmiermittel ist unerlässlich, um die Abnutzungserscheinungen eines alternden Gehäuses zu verringern. Eine speziell entwickelte Mischung aus hochwertigen, hitzeaktiven Ölen sorgt dafür, dass die Bevölkerung dieses Maschinenreichs wie frisch aus der Fabrik aussieht und sich auch so anfühlt. Geeignet für alle Modelltypen."
