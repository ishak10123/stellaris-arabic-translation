 #ARC WELDERS ORIGIN
 ##########################
 origin_arc_welders: "Lichtbogenschweißer"
 origin_arc_welders_desc: "Ihr Planet ist unfruchtbar, doch ihr Heimatsystem reich an Ressourcen. Damit sie diese nutzen konnten, entwarfen diese Maschinen eine noch viel größere Maschine als je zuvor. Eine mächtige §H$tech_orbital_arc_furnace$§! dominiert ihren Himmel, aber diese Meisteringenieure sind alles andere als zufrieden.\n\nDie Galaxie wartet und die Möglichkeiten sind endlos. Alles, was es braucht, ist ein wenig Einfallsreichtum."
 origin_tooltip_arc_builders_effects: "- $HOMEWORLD$ Anfängliche ['concept_mining_district', £district£ $district_mining_plural$] werden durch ['concept_generator_district', £district£ $district_generator_plural$] ersetzt$NEW_LINE$- $HOME_SYSTEM$ Ein ['concept_arc_furnace'] wird um eine ['concept_pc_molten'] herum errichtet$NEW_LINE$- $ADDITIONAL_TECHNOLOGIES_STRING$ ['concept_orbital_arc_furnace',£engineering_research£ $tech_orbital_arc_furnace$]$NEW_LINE$- $GUARANTEED_RESEARCH_OPTION_STRING$ ['concept_mega_engineering', £engineering_research£ $tech_mega_engineering$] bei dem Bau eines zweiten Lichtbogenofens"
 origin_tooltip_arc_builders_negative_effects: "- $INITIAL_POPS$ §R-300§!$NEW_LINE$- $HOMEWORLD$ Größe: £planetsize£ 15"
 START_SCREEN_ARC_WELDERS: "Die jahrelange Ausbeutung hat [Root.Capital.GetName] unfruchtbar gemacht, doch der Himmel darüber ist reich an Ressourcen. Mit einem Ehrgeiz, der nur von unserem Einfallsreichtum übertroffen wird, bestreiten wir unseren Lebensunterhalt im Weltraum.\n\nDer anfängliche Bau des Lichtbogenofens war ein massives Unterfangen, doch das daraus resultierende Potenzial immens. Der offensichtlichste nächste Schritt besteht darin, diesen auf volle Kapazität zu verbessern, ebenso wie die Notwendigkeit einer systemweiten Ressourcenextraktion. Doch was liegt jenseits unserer Grenzen? Welche unglaublichen Möglichkeiten erwarten dort wohl unsere Ingenieure?\n\nMit dem Aufkommen der ÜL-Reisen sind wir nicht mehr auf nur ein einziges System beschränkt. Die Galaxie ist unser Reißbrett, und es ist Zeit, an die Arbeit zu gehen."
 concept_arc_furnace: "$orbital_arc_furnace_1$"
 concept_arc_furnace_desc: "§EAuswirkungen:§!$NEW_LINE$$orbital_arc_furnace_1_mod_tooltip$\n\n§L$tech_orbital_arc_furnace_desc$§!"
 concept_orbital_arc_furnace: "$tech_orbital_arc_furnace$"
 concept_orbital_arc_furnace_desc: "§INeue Megastruktur:§! $orbital_arc_furnace_4$$DOUBLE_NEW_LINE$§L$tech_orbital_arc_furnace_desc$§!"
 concept_mega_engineering: "$tech_mega_engineering$"
 concept_mega_engineering_desc: "-$MOD_COUNTRY_RESOURCE_MAX_ADD$: §G+20000§!$NEW_LINE$- §I$UNLOCKS_FEATURE$§! Megastrukturrestaurierung $DOUBLE_NEW_LINE$§L$tech_mega_engineering_desc$§!"
 machine_age.3400.name: "Brennmaterial für die Schmiede"
 machine_age.3400.desc: "Selbst aus der Ferne schien [From.GetName] ein idealer Kandidat zu sein. Da unsere Untersuchung des Systems nun abgeschlossen ist, gibt es keinen Zweifel mehr: eine geschmolzene Welt und ein Gasriese, eine Fülle von Asteroiden und Monden - dies ist der ideale Ort für einen weiteren Lichtbogenofen.\n\nDer nächste logische Schritt besteht darin, ein Konstruktionsschiff damit zu beauftragen, die Arbeit aufzunehmen. Es ist Zeit, die Schmiede zu entzünden."
 ideal_furnace_system_poi: "Ideales Lichtbogenofensystem"
 ideal_furnace_system_name: "[From.GetName]"
 ideal_furnace_system_desc: "Ein ideales System für den Bau eines zweiten Lichtbogenofens."
 ideal_furnace_system: "Ideales System entdeckt"
 ideal_furnace_chain_title: "Brennmaterial für die Schmiede"
 ideal_furnace_chain_desc: "Wir haben ein ideales System gefunden, um einen zweiten $tech_orbital_arc_furnace$ zu errichten."
 machine_age.3405.name: "Geschweißter Horizont"
 machine_age.3405.desc: "Der Lichtbogenofen in unserem Heimatsystem war ein hervorragender Machbarkeitsnachweis und beweist unseren Ehrgeiz und Einfallsreichtum. Im [from.GetName]-System brennt nun ein weiterer Ofen in der Leere.\n\nWeit wichtiger als die Ressourcen, die wir dadurch erhalten werden, ist jedoch, dass unsere Arbeit hier die Tür zu Projekten von riesigen Ausmaßen geöffnet hat. Wir können jetzt viel weiter blicken. Es ist ganz so, als stünden wir am Rand eines gewaltigen Horizonts.\n\nDie einzige Begrenzung ist unsere eigene Vorstellungskraft."
 ##########################
 #SYNTHETIC FERTILITY
 ##########################
 #Event Chain
 synthetic_fertility_chain_title: "$origin_synthetic_fertility$"
 synthetic_fertility_chain_desc: "Wir haben die Fähigkeit verloren, uns fortzupflanzen. Unsere Heimatwelt ist mit verlassenen Bildungszentren übersät. Die Spielplätze sind leer. Es ist nur eine Frage der Zeit, bis der Letzte von uns fort ist. Für den Moment besteht unsere Hoffnung darin, uns in unserem digitalen Identitätsarchiv zu speichern.\n\nWir müssen synthetische Gehäuse und ein positronisches Gehirn von ausreichender Komplexität entwickeln, wenn wir jemals in die physische Welt zurückkehren wollen."
 #Origin Text
 origin_synthetic_fertility: "Synthetische Fruchtbarkeit"
 origin_synthetic_fertility_desc: "§RWARNUNG: Blockiert alle Aufstiegspfade außer ['concept_synthetic_ascension'].§!\n\nDiese einst blühende Gesellschaft wurde von einer neuartigen Genkrankheit heimgesucht und ist nicht länger in der Lage, sich fortzupflanzen. Da ihr die Optionen ausgehen und sie vom Aussterben bedroht ist, setzt sie ihre Hoffnung auf eine digitale Errettung."
 origin_tooltip_synthetic_fertility_effects: "- $INITIAL_POPS$ §G+900§!$NEW_LINE$- $SPECIES_TRAITS$ \"['concept_pathogenic_genes']\"\n- Heimatwelt: $TABBED_NEW_LINE$- Größe: £planetsize£ 20 $TABBED_NEW_LINE$- ['concept_abandoned_cities', £blocker£ $concept_abandoned_cities$]: +2 $TABBED_NEW_LINE$- ['concept_identity_repository',£building£ $concept_identity_repository$] $TABBED_NEW_LINE$- ['concept_abandoned_gene_clinic',£building£ $concept_abandoned_gene_clinic$] $NEW_LINE$- Situation: ['concept_identity_rescue'] $NEW_LINE$- $ADDITIONAL_TECHNOLOGIES_STRING$ ['concept_synth_ai'] $NEW_LINE$- $GUARANTEED_RESEARCH_OPTION_STRING$ ['concept_robotic_workers', £engineering_research£ $tech_robotic_workers$]"
 origin_tooltip_synthetic_fertility_negative_effects: "- £pop£ §HBewohner§!: Im Niedergang"
 START_SCREEN_SYNTHETIC_FERTILITY: "Unsere ersten Ausflüge in die Welt künstlicher Bewusstseine waren revolutionär. Wir entwickelten uns zunehmend zu einer vollständig digitalisierten Gesellschaft, bei der die Grenzen zwischen der physischen und der virtuellen Welt immer weiter verwischten. Unser Erfolg war derart groß, dass wir selbstgefällig wurden und glaubten, wir hätten unzählige Generationen Zeit, um neue Innovationen zu erforschen.\n\nDoch wir lagen falsch.\n\nAls eine neuartige Krankheit unseren genetischen Code angriff, verloren wir die Fähigkeit, uns fortzupflanzen. Ein Heilmittel wurde selbst von unseren klügsten Köpfen nie gefunden, und die Panik wuchs, während die Bevölkerung immer älter wurde und zu schrumpfen begann.\n\nAus lauter Verzweiflung erweiterten wir unseren digitalen Speicher und schufen genug \"Raum\", in dem wir unsere Identitäten bewahren konnten. Doch ist das wirklich die Existenz, die wir uns wünschen? Unser Schwerpunkt verlagerte sich auf die Entwicklung synthetischer Körper und eines positronischen Gehirns, was es uns erlauben soll, in der physischen Welt zu leben."
