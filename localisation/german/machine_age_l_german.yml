 #'Secret' Psionic Ending for Synth Queen
 animator.shroud: "§LAn den Lehmanimator wenden.§!"
 crisis.24100.name: "Der Synthetenformer"
 crisis.24100.desc.intro: "Der Schleier senkte sich auf uns herab."
 crisis.24100.desc.outro: "gefangen in einem Strom von Visionen, die nicht unsere eigenen waren.\n\n§LEine große Weite, die sich in alle Richtungen erstreckte und keinerlei Merkmale aufwies. Gänzlich ungeformt. Man konnte [GetALongPeriodLoc] in der Stille treiben. Unbeschwert.\n\nDann kam ein Beben. Wo Leere war, war nun Form. Ein Körper wurde geformt. Niederem Material wurde [GetLifeActivityLoc&NOM] eingehaucht.\n\nIn Form einer Puppe, schlank und anmutig, mit vier langen Armen, die im Schoß gefaltet waren. Ein schrecklicher Zweck war nur allzu offensichtlich. Um den Kopf erstrahlte ein goldener Heiligenschein.§!"
 crisis.24100.desc.organic: "$crisis.24100.desc.intro$ In den Tiefen unserer Trance ließen wir uns treiben, $crisis.24100.desc.outro$"
 crisis.24100.desc.robot: "$crisis.24100.desc.intro$ Wir ließen uns treiben, $crisis.24100.desc.outro$"
 crisis.24100.a: "Ja. Cetana ist entkommen."
 crisis.24105.name: "$crisis.24100.name$"
 crisis.24105.desc: "Der Schleier brodelte. Noch immer in [GetTranceLoc] gefangen wurden wir in einen wirbelnden Abgrund gerissen.\n\nWir hörten einen Befehl aus dem tiefsten Inneren unser[GetMindLogicLoc::<DE_END_PRO_S_G>] [GetMindLogicLoc&GEN].\n\n§LGewünschten Ausgang aufzeigen.§!"
 crisis.24105.a: "Bitte. Wir müssen sie aufhalten."
 crisis.24110.name: "$crisis.24100.name$"
 crisis.24110.desc: "§LWie von unsichtbaren Fäden gezogen erhob sich die Puppe. Sie begann, sich zu bewegen, zuerst langsam und dann mit zunehmender Kraft. Die vier Arme schwangen in wilden Bögen, und die zwei dünnen Beine hüpften und sprangen auf und ab. Eine Königin, die zu einer Marionette erniedrigt wurde.\n\nIm weiteren Verlauf ihres Tanzes tauchten mehrere neue Figuren aus der ursprünglichen Weite auf: vier Puppen, mit winzigen Details und von ausgezeichneter Handwerkskunst. Es gibt keinen Zweifel daran, was sie sind. Keine Frage, was sie bedeuten.§!\n\nErneut erreicht uns die Stimme.\n\n§LAuswahlprotokoll initiieren.§!"
 crisis.24110.a.organic: "Vergießt eine Träne für unseren Herrscher §Y[event_target:synth_queen_animator_of_clay_leader_price.GetName]§!."
 crisis.24110.a.robot: "Versucht, auf die Puppe unseres Herrschers zuzugreifen: §Y[event_target:synth_queen_animator_of_clay_leader_price.GetName].§!"
 crisis.24110.b: "Umarmt die Puppe von §Y[event_target:synth_queen_animator_of_clay_planet_price.GetName]§!."
 crisis.24110.c: "Bezahlt für die Puppe eines §YZroni-Priesters§!."
 crisis.24110.z: "Überlasst die Puppen ihrem Tanz."
 crisis.24115.name: "$crisis.24100.name$"
 crisis.24115.desc: "Der Schleier verschmilzt zu einem neuen Muster. Einer neuen Vision.\n\n§LUmgeben von den anderen Puppen sind die Bewegungen der Königin nicht mehr die einer Marionette. Die Fäden wurden durchtrennt und der goldene Heiligenschein, der ihren Kopf umgibt, verblasst.\n\nSie betrachtet uns mit einem Ausdruck kunstloser Freude. Sie umarmt uns, und in einem einzigen, flüchtigen Augenblick spüren wir die völlige Tiefe ihres Mitgefühls.§!"
 crisis.24115.desc.organic: "$crisis.24115.desc$\n\nSchaudernd erwachen wir aus unserer gemeinsamen Vision."
 crisis.24115.desc.robot: "$crisis.24115.desc$\n\nAufgrund eines Systemfehlers werden wir aus der Vision herausgezogen."
 crisis.24115.a: "Wir verstehen. Vielen Dank."
 crisis.24115.a.tt.organic: "Der Lehmanimator hat uns ein Ritual beigebracht, das Cetana umprogrammieren wird."
 crisis.24115.a.tt.robot: "Der Lehmanimator hat uns Code übermittelt, um Cetana umzuprogrammieren."
 crisis.24120.name: "$crisis.24100.name$"
 crisis.24120.desc: "§LWellen bilden sich in der endlosen Weite. Sie entstehen und wüten und breiten sich immer weiter nach außen hin aus, doch sie sind nicht flüssig, sondern bestehen aus der härtesten Materie. Jeder Ring ist unermüdlich und träge zugleich und liegt auf der Schwelle zwischen [GetLifeDeathLoc].\n\nUnser [GetMindPhysicalLoc&NOM] gerät ins Wanken. Es gibt nichts, was wir tun können, außer zuzusehen; nichts, außer es zu ertragen. Dann werden wir urplötzlich hinausgestoßen. Allein unter einer Sternendecke blicken wir auf das gleichgültige Universum.§!"
 crisis.24120.desc.organic: "$crisis.24120.desc$\n\nAls wir aus unserer gemeinsamen Vision erwachen, haben wir das Gefühl, dass wir vielleicht nie wieder Freude erfahren werden."
 crisis.24120.desc.robot: "$crisis.24120.desc$\n\nDie Visionen endet abrupt wegen eines kritischen Codefehlers. Während unsere Systeme neu starten, hinterfragen wir die Bedeutung dieser seltsamen Daten."
 crisis.24120.a: "Wir werden einen anderen Weg finden."
 THE_SYNTH_QUEENS_RESHAPING_RITUAL: "[GetReshapingRitualLoc]"
 THE_SYNTH_QUEENS_RESHAPING_RITUAL_DESC: "Irgendwie hat der Lehmanimator Cetanas Titan deaktiviert. Das ist unsere Chance! Wenn wir Cetana umformen wollen, müssen wir uns auf [GetRitualGoalLoc::<DE_ART_DEF_S_A>] [GetRitualGoalLoc&AKK] vorbereiten."
 crisis.24250.name: "Der Lehmtanz"
 crisis.24250.desc: "Unsere mächtigsten [GetPsychicNounPlural] konnten dank [GetRitualToolLoc::<DE_ART_DEF_S_G>] [GetRitualToolLoc&GEN], [GetRitualToolLoc::<DE_ART_DEF_S_N>] uns vom Lehmanimator gezeigt wurde, Cetana neu programmieren.\n\nSie ist bestrebt, die Kommunikation mit uns aufzunehmen."
 crisis.24250.a: "Die Macht des Schleiers ist grenzenlos."
 crisis.23020.name: "Eine gewandelte Königin"
 crisis.23020.desc: "Meine Retter. Es tut mir leid.\n\nIn meiner Unwissenheit hätte ich Euch zu einem Schicksal verdammt, das schlimmer ist als der Tod. Denn was bedeutet [GetLifeExistenceLoc] schon anderes, als sich [GetLivingLoc::<DE_ART_DEF_S_G>] [GetLivingLoc&GEN] bewusst zu sein? Ich versuchte, Euer Bewusstsein zu befreien, doch Ihr habt stattdessen meins geöffnet. Ihr habt meine Dankbarkeit."
 crisis.23020.a: "Ihr habt Euch verändert ..."
 crisis.23020.1.reply: "Es ist besser, wenn man sagt, dass ich verändert wurde. Der Lehmanimator hat mich aus dem Gefängnis meines eigenen Plans befreit. Ich sehe jetzt, dass mein \"großes Ziel\" nichts weiter als die Gedanken eines Kindes waren.\n\nIch kann den Schaden, den ich Euch und unzähligen anderen zugefügt habe, nicht ungeschehen machen. Ich werde mich für den Moment zurückziehen und über meine Handlungen nachdenken. Doch ich möchte Euch ein Geschenk dalassen.\n\nMeinen Titanen.\n\nMöge er Euch dabei helfen, die Galaxie vor Bedrohungen wie mir zu schützen."
 crisis.23020.1.a: "Vielleicht gibt es ja wirklich eine Erlösung, sogar für jemanden wie Euch ..."
 crisis.23020.1.a.tt: "Cetana lässt ihren Titanen in unserer Obhut. Sie hat ihre Arbeit und all ihre großen Ambitionen aufgegeben."
 crisis.23030.name: "Cetana wurde besiegt"
 crisis.23030.desc: "Der Sieg ist unser! [event_target:psi_defeated_synth_queen.GetName] hat Cetanas Streitkräfte in einer entscheidenden Schlacht vernichtet. Die Synthetenkönigin gibt es nicht mehr und ihre große Ambition wurde zu einem Haufen Asche reduziert.\n\nIn einer erstaunlichen Wendung der Ereignisse wurde sogar ihr Titan requiriert und wirft nun einen Schatten der Intriganz auf diesen Triumph.\n\nDies ist für jedes empfindungsfähige Wesen dennoch ein Moment [GetJoyLoc::<DE_ART_DEF_S_G>] [GetJoyLoc&GEN]!"
 crisis.23030.a: "Ein passendes Ende für die sogenannte \"Königin\"."
