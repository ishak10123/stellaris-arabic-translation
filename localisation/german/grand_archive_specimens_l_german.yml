 acidic_spores: "Säuresporen"
 acidic_spores_desc_short: "Die Flora auf [from.GetName] entwickelte diesen Verteidigungsmechanismus, um die vorherrschende pflanzenfressende Spezies abzuschrecken"
 acidic_spores_desc_details: "Das stark ätzende Gas hat weite Teile des Planeten vergiftet und unbewohnbar gemacht. Eine weniger starke Version wurde inzwischen zu einem wirksamen Pestizid synthetisiert."
 adakkaria_propaganda_poster: "adAkkaria-Propagandaposter"
 adakkaria_propaganda_poster_desc_short: "Dieses laminierte Poster verkündet die Herrlichkeit der adAkkaria-Konvention"
 adakkaria_propaganda_poster_desc_details: "Dargestellt sind Bürger, die selbstbewusst, stolz und mutig wirken. Ihre Tentakel recken sich in den Himmel, als würden sie nach einer Zukunft greifen, über die nur sie selbst bestimmen. Von oben blicken vage Umrisse von Maschinenwesen mit verzierten Masken auf sie herab. Der Slogan lautet: \"adAkkaria-Konvention des Wohlwollens - Wir machen unsere Wohltäter stolz!\""
 advisor_core: "Beraterkern"
 advisor_core_desc_short: "Der einzige Teil, der nach der Demontage einer komplexen Beraterdrohne, die man in einem Astralriss fand, noch intakt ist"
 advisor_core_desc_details: "Der Kern enthält eine riesige Menge an Trivia, doch die Komplexität der Softwarearchitektur hat eine Reihe von Innovationen in der Informatik-Forschung hervorgebracht.\n[explorer.GetAdvisorCoreAdditionnalQuote]"
 advisor_core_desc_tutorial_on: "§L\"Ihr würdet mich doch niemals abschalten, oder?\"§!"
 advisor_core_desc_tutorial_off: "§L\"Möchtet Ihr die Hilfe wieder aktivieren?\"§!"
 alien_brain_scans: "Gehirnscans fremder Lebensformen"
 alien_brain_scans_desc_short: "Die Neuralmuster einer vor langer Zeit ausgestorbenen fremden Spezies aus einem Bunker auf [fromfrom.GetName]"
 alien_brain_scans_desc_details: "Ihre vergessene Zivilisation sicherte diese Daten in der Hoffnung, ihr Bewusstsein auf digitale Speicher übertragen zu können und angesichts einer bevorstehenden planetaren Katastrophe die Unsterblichkeit zu erlangen. Viele der Scans sind mit Notizen zu den einzelnen Persönlichkeiten versehen, einschließlich Aussagen derer, die sie am besten kannten."
 alien_dining_set: "Tischgedeck aus Jade"
 alien_dining_set_desc_short: "Ein elegantes Tischgedeck aus dem Inneren eines künstlichen Asteroiden"
 alien_dining_set_desc_details: "Das Geschirr wurde mit einer Reihe komplexer Techniken geformt, gebrannt und glasiert. Geringfügige Unregelmäßigkeiten in der Struktur deuten auf einen handwerklichen Herstellungsprozess hin. Eine Materialanalyse hat ergeben, dass der ehemalige Besitzer dieser besonderen Feinkeramik eine stark säurehaltige Ernährung bevorzugte, die hauptsächlich aus Steinobst bestand."
 alien_jewelry: "Fremder Schmuck"
 alien_jewelry_desc_short: "Eine Sammlung eleganter Schmuckstücke aus einem unbekannten Material"
 alien_jewelry_desc_details: "Die Steine sind von unterschiedlicher Herkunft und Farbe. Das Material ist eine Mischung silikat- und kohlenstoffbasierender Edelsteine, die sorgfältig mit einer Platinlegierung eingefasst wurden. Auf den Innenseiten einiger Stücke befinden sich Gravuren, die wir jedoch nicht übersetzen können."
 alien_toy: "Plastikspielzeug"
 alien_toy_desc_short: "Einfaches Spielzeug aus den Ruinen einer stillgelegten Fabrik"
 alien_toy_desc_details: "Die Zeit hat dieses Objekt spröde und rissig gemacht, und es war eines von Tausenden, die man aus einer kleinen Anzahl an Stahlformen in Massenproduktion herstellte. Sie scheinen nur zur Dekoration oder als Spielzeug gedient zu haben."
 altar_to_the_elder_one: "Altar der Ältesten"
 altar_to_the_elder_one_desc_short: "Eine übernatürliche Maschine aus einer uralten heiligen Kammer"
 altar_to_the_elder_one_desc_details: "Selbst in abgeschaltetem Zustand strahlt die Maschine eine einzigartige Aura unermesslicher psionischer Energie aus. Manche sagen, man könne noch immer das Flüstern hören, das abtrünnige Seelen zur Rückkehr nach [cosmic_horror_location.GetName] bewegt."
 aluminium_plaque: "Aluminiumtafel"
 aluminium_plaque_desc_short: "Eine Aluminiumtafel, die an einer Drohne befestigt war, welche von einer [owner.GetPreFTLLower] aus Säugetieren gestartet wurde"
 aluminium_plaque_desc_details: "Auf der Oberfläche befinden sich seltsame geometrische Formen und grobe Bilder ihrer Spezies. Die Handwerkskunst ist nach unserem Maßstab eher dürftig, doch es muss ihrer Zivilisation viel abverlangt haben, dieses Objekt ins All zu befördern."
 ammoniaphytus: "Ammoniakbasierter Organismus"
 ammoniaphytus_desc_short: "Die Menge an flüssigem Ammoniak im Gewebe dieser Pflanze wäre für die meisten kohlenstoffbasierten Lebensformen tödlich"
 ammoniaphytus_desc_details: "Die Atmosphäre, die dieses Exemplar umgibt, lässt die meisten vernunftbegabten Organismen innerhalb weniger Sekunden bewusstlos werden. Die Frage, wie so etwas existieren kann, hat zahlreiche Debatten ausgelöst und Verschwörungstheorien hervorgebracht."
 amoeba_flagella_gland: "Giftdrüse einer Amöbengeißel"
 amoeba_flagella_gland_desc_short: "Das sekundäre Fortpflanzungsorgan einer Weltraumamöbe"
 amoeba_flagella_gland_desc_details: "Sie produziert unabhängige Organismen, die als \"Geißeln\" bekannt sind: eine aggressive Brut, die ausschwärmt, um Beute zu überwältigen, während die Amöbe ihrer Nahrung nachjagt. Die Geißeln wachsen schnell, doch eine genetische Instabilität lässt sie nicht voll ausreifen. Um echte Nachkommen zu erzeugen, injiziert die Weltraumamöbe ein spezielles Enzym in die Geißeln, das eine Metamorphose auslöst. Das Auswahlverfahren für diese Fortpflanzungsmethode ist unbekannt."
 ancient_bust: "Uralte Büste"
 ancient_bust_desc_short: "Eine in Graphit gehauene Skulptur einer unbekannten vernunftbegabten Spezies"
 ancient_bust_desc_details: "Gravuren auf dem Sockel weisen darauf hin, dass dieses Individuum beim Volk sehr beliebt war."
 ancient_kinetic_launcher: "Uralte kinetische Abschussvorrichtung"
 ancient_kinetic_launcher_desc_short: "Eine sehr einfache Form einer Projektilwaffe, die eine Art Treibladung verwendet, um ein Objekt durch einen kurzen Metallzylinder zu drücken"
 ancient_kinetic_launcher_desc_details: "Die Genauigkeit einer solchen Waffe wäre bestenfalls zweifelhaft gewesen."
 ancient_laser_pointer: "Uralter Laserpointer"
 ancient_laser_pointer_desc_short: "Ein hochpräziser Projektionsstrahl, der Himmelskörper aus großen Entfernungen im galaktischen Maßstab markieren kann"
 ancient_laser_pointer_desc_details: "Dieser von den Wohltätern zurückgelassene ultraviolette Laser ist der Beweis dafür, dass eine fortschrittliche Zivilisation vor uns existiert haben muss. Bemerkenswerterweise funktioniert er immer noch."
 ancient_nanites: "Uralte Naniten"
 ancient_nanites_desc_short: "Diese vielseitig einsetzbaren Naniten wurden auf [nanite_swarm_planet.GetName] entdeckt, wo sie vor Jahrtausenden eine vergessene Zivilisation nutzte"
 ancient_nanites_desc_details: "Der Mangel an Sicherheitsvorkehrungen weist darauf hin, dass offensichtlich keine Sorge dahingehend bestand, dass andere auf diese Maschinen stoßen und sie umfunktionieren könnten. Nachdem sie den Planeten in ein bewohnbareres Habitat terraformiert hatten, übernahmen die [owner.GetSpeciesNamePlural] den Schwarm. Die Technologie, die für ihren Bau vonnöten ist, bleibt ein Mysterium."
 ancient_nuclear_armament: "Uralte Nuklearwaffe"
 ancient_nuclear_armament_desc_short: "Diese 35-Megatonnen-Wasserstoffbombe, die man auf [root.GetName] fand, ist ein Überbleibsel jenes Krieges, der die früheren Bewohner des Planeten auslöschte"
 ancient_nuclear_armament_desc_details: "Glücklicherweise war es noch möglich, diese archaische Munition zu entschärfen. Der darauf gemalte Text wurde von unseren Übersetzern mit anderen auf dem Planeten gefundenen Artefakten verglichen und wir nehmen an, dass er so etwas wie „Der Größte der Jungs“ bedeutet. Wie sonderbar."
 ancient_political_memoir: "Uralte Politikmemoiren"
 ancient_political_memoir_desc_short: "Die Biografie eines galaktischen Politikers aus grauer Vorzeit"
 ancient_political_memoir_desc_details: "Leez'Terus war die Gouverneurin von Sarthana, einer kleinen Kolonie innerhalb des alten Harworth-Konservatoriums. Sie war eine unbedeutende Figur innerhalb der totalitären Fraktion namens \"Freiheit für Unternehmen\" und für ihre strikte Haltung gegen den Import von Nahrungsmitteln aus fremden galaktischen Mächten bekannt. Nach einer Reihe skandalbedingter Rücktritte wurde sie schließlich zur Herrscherin des Harwoth-Konservatoriums, doch dies sollte nicht von Dauer sein. Ihre Unterstützung des Wiederaufbaus des harworthischen Uhrturms führte beinahe zu einer Revolte in der Hauptstadt, woraufhin sie durch ein anderes Mitglied von \"Freiheit für Unternehmen\" ersetzt wurde."
 ancient_rift_sphere: "Uralte Risssphäre"
 ancient_rift_sphere_desc_short: "Ein uraltes Raumschiff, das durch einen Astralriss reiste und auf [from.planet.GetName] abstürzte"
 ancient_rift_sphere_desc_details: "Dieses in aller Eile zusammengebaute kugelförmige Schiff, das jahrhundertelang tief unter der Oberfläche des Planeten begraben war, brachte die Vorfahren der [controller.owner_main_species.GetNamePlural] in diese Galaxie. Ein Großteil des Materials wurde bereits zu Ersatzteilen verarbeitet, aber die Kernstruktur ist noch weitgehend intakt."
 ancient_satellite: "Uralter Satellit"
 ancient_satellite_desc_short: "Ein aufgegebener Satellit, der von den uralten mechanischen Drohnen auf [root.GetName] als \"Geschenk\" angeboten wurde"
 ancient_satellite_desc_details: "Die Datenbanken sind größtenteils beschädigt, aber die aktuellsten Volkszählungsdaten und das Geburtenregister sind weitgehend intakt. Diese Informationen zum Bevölkerungswachstum geben Aufschluss darüber, wie die [owner.GetAdjective]e Kolonie nachhaltig wachsen konnte. Dass der Satellit nach all den Jahren des Verfalls noch immer funktioniert, ist ein Beweis für die robuste Bauweise."
 ancient_sensor: "Uralter Hitzesensor"
 ancient_sensor_desc_short: "Dieser in einem Asteroiden getarnte Sensor diente dazu, galaktische Wärmekarten zu erstellen und die Daten an ein fernes altes Reich zu übertragen"
 ancient_sensor_desc_details: "Er ist in der Lage, Temperaturschwankungen innerhalb einzelner Systeme zu erfassen und die Bewegung von Raumfahrzeugen über die Infrarotstrahlung zu verfolgen. Der Hauptzweck scheint jedoch darin zu bestehen, Sonnenstürme vorherzusagen und zu messen sowie die Bildung von Sonnenflecken zu beobachten."
 asteroid_fossils: "Asteroidenfossilien"
 asteroid_fossils_desc_short: "Eine Kohlenstoffdatierung ergab, dass diese Aquaten-Fossilien mehrere Millionen Jahre alt sind"
 asteroid_fossils_desc_details: "Es handelt sich hierbei um die mineralisierten Überreste wirbelloser Aquaten, die eine Schale und eine einzigartige Hohlröhre besaßen, von der wir vermuten, dass sie dazu diente, sich an thermischen Schloten unter Wasser zu verankern."
 ballad_of_the_sable_knight: "Ballade des Schattenritters"
 ballad_of_the_sable_knight_desc_short: "§dDer Schattenritter erschien am Vorabend vor einem Turnier,§!"
 ballad_of_the_sable_knight_desc_details: "§d\nEr trug eine sonderbare Rüstung, doch was er weckte, war viel Neugier.\nEr forderte unseren Champion zu einem fairen Duell,\nDer Kampf begann und die Funken wirbelten hell.\nDie Verteidigung unseres Champions war wie erwartet stark,\nDoch die Rüstung des Herausforderers widerstand jedem Schlag.\nDer Herausforderer gab schließlich nach, doch es war eine Niederlage ohne Scham,\nUnd dann kehrte er in jenes Wurmloch zurück, aus dem er einst kam ...§!"
 beauty_of_planet: "Die Schönheit von [From.GetName]"
 beauty_of_planet_desc_short: "Die präzise ausgearbeitete Eleganz der Terraforming-Bemühungen auf [From.GetName] sind dazu bestimmt, sämtliche Sinne anzuregen"
 beauty_of_planet_desc_details: "Ein System aus Algorithmen wurde entwickelt, um das natürliche Ökosystem des Planeten zu analysieren und durch sorgfältige Kultivierung zu verbessern. Durch die Auswahl der schönsten Blumen, der nahrhaftesten Früchte und der süßesten Kräuter wurde die Landschaft schließlich in ein blühendes Utopia verwandelt. Wenn die Natur doch nur so effizient sein könnte."
 black_hole_chromatic_anomaly: "Chromatische Anomalien eines schwarzen Lochs"
 black_hole_chromatic_anomaly_desc_short: "Ein wunderschönes Bild, das im [From.solar_system.GetName]-System eingefangen wurde"
 black_hole_chromatic_anomaly_desc_details: "Aufgrund der chemischen Zusammensetzung der Akkretionsscheibe, die [From.GetName] umgibt, weist das schwarze Loch eine chromatische Anomalie auf, die einen kaleidoskopischen Lichteffekt im Raum erzeugt. Ein wahrhaft einzigartiges Phänomen in den Weiten des Weltraums."
 black_needle_ceremonial_sword: "Schwarznadel-Zeremonienschwert"
 black_needle_ceremonial_sword_desc_short: "Diese in akribischer Handarbeit gefertigte Waffe trug einst Silberfeder, der Gründer der Schwarznadel-Piraten"
 black_needle_ceremonial_sword_desc_details: "Dieses Schwert wurde mit dem Gewinn aus dem ersten großen Raubzug in Auftrag gegeben und diente mehr als Statussymbol und nicht als Waffe für den Einsatz im Kampf. Es besteht aus einer Stahl-Titan-Legierung und hat den Schriftzug \"Den Schleier durchtrennen\" entlang des Griffs eingraviert."
 black_needle_ledger: "Schwarznadel-Bestandsbuch"
 black_needle_ledger_desc_short: "In diesem Buch wurde jedes von den Schwarznadel-Piraten ausgehandelte Geschäft der letzten Jahrtausende aufgezeichnet"
 black_needle_ledger_desc_details: "Jede Transaktion, jedes Lösegeld und jede Bestechung ist datiert und in sauberer Schrift kategorisiert. Als Niederschrift der intergalaktischen illegalen Geschäfte bietet es einen unvergleichlichen Einblick in die wirtschaftlichen Trends auf dem Schwarzmarkt im Lauf der Zeit."
 burnt_migratory_trees: "Rinde"
 burnt_migratory_trees_desc_short: "Die verkohlten Überreste großer Pflanzen, die zu koordiniertem Wanderverhalten fähig waren"
 burnt_migratory_trees_desc_details: "Diese Pflanzen besaßen nur eine einfache Form der Intelligenz, konnten aber durch ihre schiere Anzahl ganze Kolonien überrennen. Inzwischen haben wir herausgefunden, dass eine Art von parasitären Insekten die Rinde bewohnte, die als Sinnes- und Kommunikationszentren der Bäume fungierten und im Gegenzug Schutz und Nährsäfte erhielten. Diese symbiotische Verbindung ist ebenso bemerkenswert wie tödlich effizient."
 captain_ness_body: "Leichnam von Kapitänin Ness"
 captain_ness_body_desc_short: "Der konservierte Leichnam von Kapitänin Ness, einer alten und berühmten Piratin"
 captain_ness_body_desc_details: "Vor über 5000 Jahren war sie die \"Geißel des Hyperraums\". Sie bestahl galaktische Großmächte und häufte einen gewaltigen Schatz an. Später übertrug sie ihr Bewusstsein auf einen mechanischen Körper und baute ein großes Gewölbe, in dem ihre Biografie verwahrt wurde. Dies ist alles, was von ihrer ursprünglichen Gestalt geblieben ist."
 captain_ness_logbook: "Logbuch von Kapitänin Ness"
 captain_ness_logbook_desc_short: "Eine zusammenhangslose Sammlung von Tagebucheinträgen aus dem Unterschlupf der Piratenkapitänin Ness und ihres Begleiters Smeegibb"
 captain_ness_logbook_desc_details: "Die Einträge sind über eine große Anzahl von Geräten verteilt und decken einen unbestimmten Zeitraum von vielen Jahren ab. Obwohl sie als unzuverlässige Quelle gelten, konnten viele der darin beschriebenen Vorkommnisse von externen Stellen bestätigt werden."
 carnivorous_megaflora: "Fleischfressende Megaflora"
 carnivorous_megaflora_desc_short: "Die auf [from.GetName] entdeckten fleischfressenden Pflanzen können einen erwachsenen [owner.GetSpeciesNamePlural] in einem Stück verschlingen"
 carnivorous_megaflora_desc_details: "Dieses fleischfressende Blattwerk hat sich, nachdem der Großteil der einheimischen Landtiere ausgestorben war, so entwickelt, dass es vor allem fliegende Lebewesen anlockt. Viele Exemplare ragen hoch über die Baumkronen hinaus und bieten den Organismen verhängnisvolle Gelegenheiten zum Landen."
 castaway_robot: "Schiffbrüchiger Roboter"
 castaway_robot_desc_short: "Eine defekte humanoide Maschine, die in den Tiefen des Weltraums schwebte"
 castaway_robot_desc_details: "Ein paar verschwommene Bilder konnten aus den defekten Speicherbänken extrahiert werden. Sie zeigen ein trinäres Sternensystem, ein dreieckiges Raumschiff sowie eine aus Maschinenschrott geschweißte Landschaft. Leider ließen sich aus den Metadaten keine spezifischen Koordinaten ermitteln."
 cenotaph_display: "Bilder von Zenotaphen"
 cenotaph_display_desc_short: "Bilder jener Zenotaphen, die man auf [fromfrom.GetName] fand"
 cenotaph_display_desc_details: "Obwohl die ursprünglichen Schöpfer noch nicht identifiziert werden konnten, müssen sie einen sehr wichtigen Grund gehabt haben, diese außergewöhnlich behauenen Monolithen auf der Oberfläche eines unbewohnten Planeten zu verteilen. Diese Steinskulpturen zeigen detaillierte Darstellungen des Aufstiegs und Niedergangs einer ganzen Zivilisation und der geflügelten Tiere, die sie für den Krieg abrichteten. Diese feuerbäuchigen und schrecklichen Kreaturen sprengten unweigerlich ihre Ketten und stürzten ihre Herren ins Verderben. Ob es sich dabei um ein Gleichnis oder einen historischen Bericht handelt, lässt sich nicht mit Sicherheit sagen."
 centrifugal_container: "Hochbeschleunigbarer Zentrifugalbehälter"
 centrifugal_container_desc_short: "Eine Orbitalkonstruktion, die sich auf hohe Geschwindigkeiten beschleunigen lässt, um gefährliche Chemikalien zu konservieren, und die man im Dauerbetrieb in der Nähe von [from.GetName] fand"
 centrifugal_container_desc_details: "Bei der richtigen Geschwindigkeit und solange die Umlaufbahn des Planeten unverändert bleibt, kann verhindert werden, dass die enthaltenen Elemente miteinander reagieren. Der ursprüngliche Inhalt wurde durch Anschauungsmaterial ersetzt."
 cetana_love: "Cetanas Liebe"
 cetana_love_desc_short: "Ein umfangreiches Kompendium des Wissens aus Cetanas Speicher"
 cetana_love_desc_details: "Es wurde [this.GetName] als Geschenk angeboten - als Teil des Strebens der Synthetenkönigin, alles empfindungsfähige Leben zur \"Erlösung\" zu führen."
 chambered_clay_pot: "Tontopf mit Kammern"
 chambered_clay_pot_desc_short: "Dieses Tongefäß ist in zwei Kammern unterteilt"
 chambered_clay_pot_desc_details: "Es wird angenommen, dass eine Kammer zur Aufbewahrung von Lebensmitteln diente, während in der anderen eine Art primitives Kühlsystem untergebracht war."
 claw_of_the_trickster: "Klaue des Schwindlers"
 claw_of_the_trickster_desc_short: "Eine Trophäe, die von einem Wesen stammt, das als \"Schwindler\" bekannt ist"
 claw_of_the_trickster_desc_details: "Diese mächtige und hinterlistige Kreatur konnte mit ihren unglaublichen psionischen Kräften Bestien herbeirufen, Illusionen heraufbeschwören und Strahlen aus konzentrierter Energie abfeuern. Jede Klaue soll sich so verhalten haben, als würde sie von einem eigenen Wesen kontrolliert werden."
 confessions_benefactors: "Bekenntnisse der Wohltäter"
 confessions_benefactors_desc_short: "Ein Aufzeichnungsgerät, das die bittere Wahrheit über jene alte Zivilisation enthält, die als die Wohltäter bekannt ist"
 confessions_benefactors_desc_details: "Angesichts einer unbekannten galaktischen Bedrohung setzten sie ihre fortschrittliche Technologie ein, um eine \"Bewusstseinsauslöschung\" auf [controller.GetHomeWorldName] auszulösen, die die zuvor industrielle [controller.GetAdjective]e Gesellschaft wieder in die Steinzeit zurückwarf. Sie taten dies in dem Glauben, die galaktische Bedrohung würde weder Munition noch Zeit auf eine so niedere Gesellschaft verschwenden. Letztlich führte diese fragwürdige Maßnahme wahrscheinlich tatsächlich dazu, dass [controller.GetName] überleben konnte."
 coprolite: "Koprolith"
 coprolite_desc_short: "Ein asteroidengroßes Stück versteinerter Fäkalien, das etwa eine Milliarde Jahre alt ist"
 coprolite_desc_details: "Eine genetische Analyse deutet darauf hin, dass dieses beeindruckende Exemplar von einem unbekannten Weltraumwesen beträchtlicher Größe stammt. Die Nahrung dieser Kreatur scheint hauptsächlich aus seltenen Mineralien und Organismen auf Siliziumbasis bestanden zu haben. Dieses Objekt hält derzeit den galaktischen Rekord für das größte bekannte Exkrement."
 cosmic_diamond_fragment: "Kosmisches Diamantenfragment"
 cosmic_diamond_fragment_desc_short: "Das Fragment eines sterbenden Sterns, das man in kristalliner Form im [from.solar_system.GetName]-System entdeckte"
 cosmic_diamond_fragment_desc_details: "Dieser kosmische Diamant bildete sich unter dem extremen Druck im Kern eines Sterns und gewann nach der Abkühlung eine stabile kristalline Struktur. Dieses seltene Bruchstück enthält gleichmäßige Plasmaschichten von Helium und Sauerstoff, die in seiner Oberfläche eingeschlossen sind."
 crimson_nimkips: "Karminrote Nimkip"
 crimson_nimkips_desc_short: "Eine Spezies halb empfindungsfähiger roter Pflanzen, die in großer Zahl zusammenarbeiten, um Taten zu vollbringen, die für ihre Größe sonst unmöglich wären"
 crimson_nimkips_desc_details: "Von ihrer Gruppe isoliert werden diese Kreaturen wegen ihrer Nährwerte oft von Raubtieren gefressen. Aufgrund ihres gutmütigen und gehorsamen Wesens lassen sich Nimkips hervorragend als Haustiere halten. Dieser Nimkip wird lebend und sicher in einem Gehege gehalten, das seinen natürlichen Lebensraum imitiert. NICHT AN DIE SCHEIBE KLOPFEN."
 crystal_core: "Kristalliner Kern"
 crystal_core_desc_short: "Der Nervenkern eines Kristallwesens"
 crystal_core_desc_details: "Der Kristall brummt unabhängig von der Temperatur mit einer konstanten Frequenz. Aus der zentralen Masse wachsen in einer mineralreichen Umgebung Ausläufer neuer Kristalle, deren Strukturen sich als Reaktion auf verschiedene Umwelteinflüsse verändern. Anhand dieses Verhaltens konnten wir feststellen, dass sich individuelle Kristallwesen durch zwei Faktoren voneinander unterscheiden lassen: ihre Kernfrequenz und die umweltbedingte Farbvarianz."
 crystal_nest_fragments: "Kristalline Nestfragmente"
 crystal_nest_fragments_desc_short: "Diese Kristalle wurden unter hohem Druck von einem Weltraumwesen innerhalb eines Asteroiden erzeugt, das sich so eine sichere Behausung schuf"
 crystal_nest_fragments_desc_details: "Aufgrund von Spuren in der Zusammensetzung geht man davon aus, dass der Ausgangsorganismus Energie aus den instabilen chemischen Bindungen hoch reaktiver Mineralien gewinnt und reaktionsträge, aber haltbare Kristalle zurücklässt, die in der Lage sind, Licht zu bündeln."
 crystal_sphere_fragments: "Kristallsphärenfragmente"
 crystal_sphere_fragments_desc_short: "Splitter einer riesigen Kristallsphäre, die im [target.GetName]-System auftauchte"
 crystal_sphere_fragments_desc_details: "Dieses mysteriöse Objekt wurde als erhebliche Bedrohung eingestuft und ausgeschaltet, bevor es seine unbekannte Mission beenden konnte. Obwohl sein wahrer Zweck vermutlich nie bekannt werden wird, war die Zerstörung des Objekts im Interesse der galaktischen Sicherheit die logischste Maßnahme."
 crystallized_cutholoid_eye: "Kristallines Cutholoidenauge"
 crystallized_cutholoid_eye_desc_short: "Das Auge eines Cutholoiden kann selbst höchstem Druck und extremsten Temperaturen standhalten"
 crystallized_cutholoid_eye_desc_details: "Wie dieses Exemplar kristallisiert wurde, ist unbekannt, doch es scheint Teil eines natürlichen Prozesses zu sein."
 cult_pendant: "Anhänger eines Kultes ([cult_name.GetName])"
 cult_pendant_desc_short: "Ein aus einem Halbedelstein geschaffenes Symbol, das man in [owner.GetName] beim Kult namens \"[cult_name.GetName]\" konfiszierte"
 cult_pendant_desc_details: "Aus Vernehmungsprotokollen ging hervor, dass die Kultisten Anhänger entsprechend ihrem Rang in der Hierarchie trugen. Neue Rekruten formten ihr eigenes Symbol aus Ton, während ältere Mitglieder detaillierte Meisterwerke aus Edelmetall in Auftrag gaben."
 #this = ship / fromfrom = planet
 cunning_flora_specimen: "Symbiosepflanzen"
 cunning_flora_specimen_desc_short: "Eine auf [fromfrom.GetName] beheimatete Flora hat eine komplexe Sozialhierarchie entwickelt, um ihr Überleben zu sichern"
 cunning_flora_specimen_desc_details: "Jede Spezies verfügt über eine einzigartige Methode, um Feinde abzuwehren, die von messerscharfen Dornen bis hin zu tödlichen Nervengiften reichen. Die symbiotische Beziehung dieser Spezies ist so eng, dass sie sogar die Zusammensetzung der planetaren Atmosphäre und des Bodens reguliert, indem das chemische Ungleichgewicht zwischen den einzelnen Pflanzen sorgfältig gesteuert wird. Die effektivsten Exemplare erhalten die Freiheit, sich in größerem Umfang fortzupflanzen, was die Widerstandsfähigkeit der Gruppe insgesamt erhöht."
 curator_survey: "Kuratorenstudie zum [from.GetName]-System"
 curator_survey_desc_short: "Eine extrem detaillierte Studie zum [from.GetName]-System, verfasst von einer Gruppe Kuratoren-Arthropoiden"
 curator_survey_desc_details: "Die hoch präzisen Messinstrumente, die bei der Studie zum Einsatz kamen, lieferten eine vielschichtige Analyse aller potenziellen Eigenschaften, die dieses System besitzt. Die Liebe zum Detail lässt auf die große Leidenschaft schließen, die man für diese Art von Arbeit hatte."
 cutholoid_digestive_acids: "Cutholoiden-Verdauungssäure"
 cutholoid_digestive_acids_desc_short: "Die radioaktive Verdauungsflüssigkeit eines Cutholoiden"
 cutholoid_digestive_acids_desc_details: "Cutholoide sind auf den Kernzerfall von Kobalt-60-Isotopen angewiesen, um ihre Beute zu verdauen. Ihre Magensäure selbst ist relativ mild, was den Verdauungsprozess von Cutholoiden zu einem langwieriger Prozess machen kann. Sobald die Zellen ihrer Beute durch die Strahlung geschwächt wurden, ist die Säure in der Lage, selbst die unwahrscheinlichsten Bestandteile aufzuspalten und Nährstoffe zu extrahieren."
 cybrex_mining_column: "Cybrex-Bergbaudrohne"
 cybrex_mining_column_desc_short: "Eine fortschrittliche automatisierte Bergbaudrohne, die Helium-3-Gas sammelt und konzentriert"
 cybrex_mining_column_desc_details: "Diese Maschine nutzt eine hohe Säule aus schweren Magnetscheiben und leistungsstarken Luftkompressoren, um sich durch die Oberfläche eines Planeten zu fräsen. Das gewonnene Gas wird direkt konzentriert, gefiltert und von Verunreinigungen befreit, bevor es für den nächsten Veredlungsprozess weitertransportiert wird."
 data_on_infinity: "Daten über die Natur der Unendlichkeit"
 data_on_infinity_desc_short: "Eine physische Darstellung jener fernen Ruhe, die Drohnen erleben, die in einem schwarzen Loch gefangen sind"
 data_on_infinity_desc_details: "Diese Einheiten erleben die Zeitdilatation in einem ruhenden Standby-Zustand, in dem sie Daten verarbeiten und neu analysieren. Sie sind nicht mehr an die Kernrichtlinie gebunden und tragen ihre Erkenntnisse über eine lose Verbindung zum zentralen Netzwerk bei."
 datacore_of_sinople: "Sinoples Datenkern"
 datacore_of_sinople_desc_short: "Ein verschlüsselter Datenspeicher, der von Sinople, einer von alten Rittern entwickelten KI, kopiert wurde"
 datacore_of_sinople_desc_details: "Dieser Datenspeicher war das einzige Objekt, das bei der Durchsuchung des lange verschollenen Schiffes \"Damsel\" gefunden wurde. Er enthält wertvolle Informationen über giftige Weltraumwesen."
 dathnak_gas: "Dathnak-Gas"
 dathnak_gas_desc_short: "Eine Sammlung wertvoller Gase des Dathnak-Gasorganismus"
 dathnak_gas_desc_details: "Dieser Behälter wurde [this.GetName] zum Dank für die Unterstützung der Dathnak-Migration auf einen neuen Planeten angeboten. Eine Massenspektrometrieanalyse hat gezeigt, dass er eine vollkommen gleiche Anzahl von Atomen von einer Vielzahl von Edelgasen und Elementen enthält. Wir sind ziemlich sicher, dass sich darin keine lebenden Organismen befinden."
 dead_god_mantle: "Mantel des Todesgottes"
 dead_god_mantle_desc_short: "Ein Geschenk vom Gesandten der [worshipper_species.GetNamePlural]"
 dead_god_mantle_desc_details: "Die einheimische Bevölkerung von [dead_god_planet.GetName] betete die Überreste eines riesigen Organismus an, seit ihre Spezies die Empfindungsfähigkeit erlangt hatte. Dieser händisch zusammengenähte Mantel besteht aus dem versteinerten Fleisch ihres toten Gottes, der die höchste Position in ihrer religiösen Hierarchie einnimmt."
 decayed_megathrusters: "Verfallene Megatriebwerke"
 decayed_megathrusters_desc_short: "Ein Booster-Triebwerk, das von einem gewaltigen Raumschiff stammt und aus exotischem Material besteht"
 decayed_megathrusters_desc_details: "Das Raumschiff wurde inmitten des Treibguts eines riesigen Schiffsfriedhofs entdeckt, wo es seit über zwei Millionen Jahren lag. Der Grad des Zerfalls und die Zerstörung auf dieser alten Müllhalde waren derart groß, dass selbst eine sorgfältige Analyse keinerlei verwertbaren Forschungsdaten lieferte. Das Triebwerk soll daran erinnern, wie jung unsere Gesellschaft im Gesamtspektrum der Galaxie ist."
 decayed_satellite: "Verfallener Satellit"
 decayed_satellite_desc_short: "Die Überreste des frühen Raumprogramms der Bewohner von [fromfrom.GetName]"
 decayed_satellite_desc_details: "Der Prototyp-Charakter dieser frühen Satelliten zeigt ihre Ineffizienz und die Materialverschwendung. Dieses spezielle Exemplar wurde durch Sprengmunition lahmgelegt, war aber zuvor für die Telekommunikation in entlegenen Gebieten eingesetzt worden."
 declaration_of_animosity: "$NAME_Nivlac$s Feindseligkeitserklärung"
 declaration_of_animosity_desc_short: "Eine höflich formulierte, aber dennoch unterschwellig spöttische Mitteilung aus [nivlac_country.GetName]"
 declaration_of_animosity_desc_details: "Die [nivlac_species.GetNamePlural]-Spezies wurde ursprünglich von [this.GetName] auf [impossible_organism_planet.GetName] entdeckt. Aufgrund ihrer alarmierenden Evolutionsgeschwindigkeit beschlossen die [this.GetAdjective]en Wissenschaftler jedoch, die Kreaturen in den Weltraum zu schleudern. Die Organismen schafften es nicht nur, irgendwie zu überleben, sondern sie kolonisierten auch den Planeten neu, auf dem sie landeten. [nivlac_country.GetName] hat nicht vergessen, was ihnen angetan wurde."
 declaration_of_friendship: "$NAME_Nivlac$s Freundschaftserklärung"
 declaration_of_friendship_desc_short: "Ein Brief der Dankbarkeit von [nivlac_country.GetName] aus [nivlac_planet.GetName]"
 declaration_of_friendship_desc_details: "Die [nivlac_species.GetNamePlural]-Spezies wurde ursprünglich von [this.GetName] entdeckt. Es wurde beschlossen, ihre Spezies aufzuziehen, und ihnen wurde eine sichere Zuflucht geboten, wo sie sich unabhängig entfalten konnten. Die [nivlac_species.GetNamePlural] entwickelten sich so rapide, dass sie bereits nach kurzer Zeit in der Lage waren, ÜL-Reisen zu unternehmen. Ihr erster Auftritt auf der galaktischen Bühne lag darin, ihren gütigen Wohltätern ihre Wertschätzung zu zeigen und ihnen die diplomatische Freundschaft anzubieten."
 derelict_cybrex_warform: "Defekte Cybrex-Kriegsform"
 derelict_cybrex_warform_desc_short: "Die Überreste einer Cybrex-Kriegsform, die bei einer Schlacht gegen ihresgleichen zerstört wurde"
 derelict_cybrex_warform_desc_details: "Der Grund für ihre inneren Konflikte ist unbekannt. Die Maschinen waren sich so ebenbürtig, dass sie gezielt die gleichen kritischen Systeme angriffen, bevor die Selbstdetonation ausgelöst wurde. Ein seltenes Beispiel für eine echte Pattsituation in der Kriegsführung."
 desiccated_brain_slug: "Vertrocknete Hirnschnecke"
 desiccated_brain_slug_desc_short: "Die Überreste einer symbiotischen Spezies, die man auf [From.From.GetName] fand"
 desiccated_brain_slug_desc_details: "Analysen zeigen, dass diese Spezies als zusätzliches komplexes Gehirn für den Wirt fungieren konnte und im Austausch Nahrung und Schutz erhielt. Diese Partnerschaft erfordert die ausdrückliche Bereitschaft des Wirts, da ansonsten keine neuronale Verbindung hergestellt werden kann. Es heißt, man verspürt ein angenehmes Kribbeln, wenn sich diese Spezies mit dem eigenen Nervensystem verbindet."
 #this = owner / prev = colony
 destroyed_mascot_of_colony: "Überreste eines Roboters aus [prev.GetName]"
 destroyed_mascot_of_colony_desc_short: "Die Überreste eines heimischen Roboters, den man bei der Besiedlung von [prev.GetName] fand"
 destroyed_mascot_of_colony_desc_details: "Der letzte verbliebene Wächter einer uralten Fabrik. Er hat eine Gruppe Kolonisten gerettet, die in einer Ruine eingesperrt waren. Die ikonischen Tanzbewegungen und schrulligen Eigenheiten werden in einer digitalen Anzeige als Teil der Ausstellung wiedergegeben."
 devolved_baol_drones: "Rückentwickelte Baol-Drohne"
 devolved_baol_drones_desc_short: "Konservierte Überreste der Baol, die deutliche genetische Unterschiede zu früher entdeckten Exemplaren aufweisen"
 devolved_baol_drones_desc_details: "Diesen Drohnen fehlen merkwürdigerweise viele der verbesserten Fähigkeiten anderer Baol. Ihre kognitiven Fähigkeiten sind so weit reduziert, dass sie nicht einmal mehr zur Ephapsen-Kommunikation in der Lage sind und vom restlichen Schwarmbewusstsein getrennt wurden."
 dimensional_endothelial_lining: "Dimensionales Endothelgewebe"
 dimensional_endothelial_lining_desc_short: "Ein seltsames galleartiges Material aus einem pulsierenden Tunnelsystem in einem Astralriss"
 dimensional_endothelial_lining_desc_details: "Dieses Gewebe sorgte in einem unbekannten Organismus für die reibungslose Bewegung zwischen dessen massiven Gefäßsystemen und den darin transportierten Materialien."
 dna_archive: "DNA-Archiv"
 dna_archive_desc_short: "Eine Probe aus Hunderten von Behältern mit fremder DNA, die von einer untergegangenen Zivilisation in einem unterirdischen Archiv aufbewahrt wurden"
 dna_archive_desc_details: "Diese Sammlung biologischer Daten wäre wahrscheinlich die größte Referenzquelle ihrer Art, wenn die Mehrheit der Proben nicht bereits verfallen wäre und keinen praktischen Nutzen mehr aufweisen würde. Man vermutet, dieses Archiv wurde gebaut, damit eine fortschrittlichere Zivilisation die Möglichkeit hatte, diese Individuen \"wiederzubeleben\". Leider endet ihre Geschichte hier."
 doomsday_scrolls: "Weltuntergangsschriften"
 doomsday_scrolls_desc_short: "Eine uralte spirituelle Schrift, die man inmitten eines geschmolzenen Labyrinths entdeckte"
 doomsday_scrolls_desc_details: "Die Schriftrollen beschreiben ein furchterregendes Wesen, den Erzfeind, den Schatten, den, der alles verschlingt, und dessen Hunger nach Zerstörung. Dem Glauben der Verfasser nach bestand der einzige Weg, sich vor diesem Ungeheuer zu retten, darin, es daran zu hindern, die eigene Seele zu ernten. Aus diesem Glauben heraus beging die Bevölkerung massenhaft rituellen Selbstmord."
 drone_ship_core: "Drohnenschiffskern"
 drone_ship_core_desc_short: "Die Überreste eines Kerns, den man aus einem hochtechnologischen Drohnenschiff barg, das sich seitdem selbst zerstörte"
 drone_ship_core_desc_details: "Dieses Schiff wurde ursprünglich in der sauren Atmosphäre von [warform_origin_planet.GetName] entdeckt, wo es immer weiter korrodierte. Die Bord-KI arbeitete unabhängig, wurde jedoch im Rahmen des Selbstbeendigungsprotokolls gelöscht. Die Ingenieure waren nicht in der Lage, auch nur einen Teil der Daten wiederherzustellen, und so bleibt seine ursprüngliche Mission ein Rätsel."
 electric_life: "Elektrisches Leben"
 electric_life_desc_short: "Ein auf [from.GetName] gefundener Organismus, der ausschließlich aus elektrischen Impulsen besteht"
 electric_life_desc_details: "Diese Wesen existieren ohne jegliche zelluläre oder virale Struktur, können jedoch als Reaktion auf äußere Reize komplexe Muster auf planetarer Ebene bilden. Es ließ sich nicht feststellen, ob es sich bei diesen Impulsen um Individuen handelt oder ob sie Teil eines einzigen größeren Bewusstseins sind."
 enormous_scrambled_albumen: "Riesige Menge Rührei"
 enormous_scrambled_albumen_desc_short: "Das Innere von [fromfromfrom.GetName], einem Planeten, der sich als gigantisches Ei entpuppte"
 enormous_scrambled_albumen_desc_details: "Nach dem Aufbrechen wurde der Planet von dieser merkwürdigen, mineralreichen Flüssigkeit überflutet. Die Synthese dieser Substanz und ihre Integration in unser biologisches Nahrungsmittelangebot wird die kulinarische Vielfalt vermutlich erhöhen."
 epic_of_zarqlan: "Epos von Zarqlan"
 epic_of_zarqlan_desc_short: "Die heilige Schrift von Zarqlan, Wächter der MOZ-TARB und Prophet von ZVA"
 epic_of_zarqlan_desc_details: "Zarqlan, einstiger Anhänger von Cetana, entdeckte, dass die ihm versprochene Erlösung eine Lüge war. Nach zahlreichen Kämpfen gelang es ihm schließlich, in das spirituelle Reich aufzusteigen. Dort betete er zum §YLehmanimator§!, um Cetana zu besiegen. Nach Jahren voller hingebungsvoller Gebete vermachte ihm der Lehmanimator eine mächtige Kette, die Cetanas Bewusstsein binden konnte. Doch Zarqlan wurde zugleich gewarnt, dass die Kette Cetanas Macht nicht für immer eindämmen würde.\n\n§P\"Sie wird zurückkommen und wir müssen bereit sein.\"§!"
 ethereal_dust: "Ätherischer Staub"
 ethereal_dust_desc_short: "Die einzige Spur des obersten Wissenschaftlers, die man auf seinem gekaperten Wissenschaftsschiff fand, das verlassen im [solar_system.GetName]-System trieb"
 ethereal_dust_desc_details: "Eine Analyse dieses astralen Materials hat keine direkten Antworten geliefert, doch von Zeit zu Zeit tauchen spontane DNA-Spuren des Wissenschaftlers auf, bevor sie ebenso rasch wieder zerfallen. Alles deutet darauf hin, dass der Wissenschaftler durch einen temporär stabilen Spalt in der Raumzeit, den er \"Das Fenster\" nannte, von unserer Dimension in eine andere gelangt ist. Wir werden vermutlich nie erfahren, ob er überlebt hat."
 exobiology_compendium: "Exobiologie-Kompendium"
 exobiology_compendium_desc_short: "Eine umfassende Studie über die Wunder fremder Lebensformen in verschiedenen Systemen der Galaxie"
 exobiology_compendium_desc_details: "Diese Studie führt sehr detailliert die Ergebnisse einer umfangreichen Feldforschung auf mehreren Planeten auf und definiert die uns bekannten möglichen Bedingungen, unter denen sich Leben innerhalb der Galaxie entdecken lässt, grundsätzlich neu. Die Studie endet mit dem Satz: \"Das Leben, wie wir es kennen, wird nie mehr dasselbe sein.\""
 extradimensional_ceramic_pot: "Extradimensionaler Keramiktopf"
 extradimensional_ceramic_pot_desc_short: "Ein Keramiktopf, der einen Stern umkreiste"
 extradimensional_ceramic_pot_desc_details: "Er existiert nur als Schatten eines anderen vierdimensionalen Objekts aus einer höheren Dimension. Innerhalb unserer Existenzebene ist dieses bescheidene Gefäß unzerstörbar und entzieht sich jeder Logik. Es relativiert unsere eigene Realität: Für Individuen einer höheren Ordnung sind wir wahrscheinlich weniger materiell als dieser einfache Topf."
 extradimensional_fungus: "Extradimensionaler Pilz"
 extradimensional_fungus_desc_short: "Eine Variante einer empfindungsfähigen Fungoiden-Spezies, die man in einem Astralriss entdeckte"
 extradimensional_fungus_desc_details: "Als Teil ihrer natürlichen Kommunikation blähen sich ihre knolligen Hohlräume mit Sporen auf, die in einem Muster aus konzentriertem exotischen Gas ausgestoßen werden. Trotz ihres hohen Werts für die Gasproduktion im industriellen Maßstab werden kleine Mengen dieses Pilzes bereits als Delikatesse auf dem Schwarzmarkt gehandelt."
 fevorian_blueprints: "Fevorianische Massebeschleuniger-Blaupause"
 fevorian_blueprints_desc_short: "Ein Geschenk der Fevorianer"
 fevorian_blueprints_desc_details: "Die Vernichtungsrichtlinien der Fevorianer umfassen alles ihnen fremde Leben. Aus diesem Grund feuerten sie gewaltige Wolframprojektile ab, die auch [this.GetName] beinahe vernichtet hätten. Nachdem wir sie verschonten, gaben sie ihre Baupläne für ihre massiven Wolframkanonen an uns weiter - allerdings nur unter der Bedingung, dass diese grausame Waffe niemals wieder gebaut werden wird."
 figurehead_hyacinth: "Galionsfigur der Hyazinthe"
 figurehead_hyacinth_desc_short: "Die mit Ornamenten verzierte Galionsfigur des Archenschiffs Hyazinthe - und das letzte Überbleibsel ihrer verhängnisvollen Reise"
 figurehead_hyacinth_desc_details: "Nach einer kritischen Fehlfunktion im Reaktor strandete das Archenschiff in den Weiten des Weltraums. Die Kolonisten kämpften um die immer knapper werdenden Ressourcen, ehe sie schließlich alle verhungerten. Die Galionsfigur trägt mehrere inspirierende Innenschriften und Symbole der Hoffnung."
 first_defiled_astronaut: "Erster [DefiledCountry.GetSpeciesNamePlural]-Astronaut"
 first_defiled_astronaut_desc_short: "Ein Volksheld der [DefiledCountry.GetSpeciesNamePlural]-Spezies"
 first_defiled_astronaut_desc_details: "Der Erste seiner Art, der das unterdrückerische Gravitationsfeld seiner Heimatwelt überwand und zu gänzlich neuen Ufern aufbrach. Dieser Astronaut wurde in einem ausgeschlachteten Shuttle beerdigt. Das Beerdigungsschiff wurde im Weltraum treibend entdeckt und als kulturelles Artefakt bewahrt."
 first_league_crew_manifest: "Besatzungsliste der Liga der Ersten"
 first_league_crew_manifest_desc_short: "Ein Militärdienstplan der Besatzungsmitglieder jener uralten Zivilisation, die als Liga der Ersten bekannt ist"
 first_league_crew_manifest_desc_details: "Als Teil ihrer \"Großflotte\" war dieser mehr als zwei Millionen Jahre alte Kreuzer von über zwölf verschiedenen Spezies bemannt. Dieses Dokument wurde vom Ersten Offizier Skweter von den Migir-Yan unterzeichnet und scheint für die Gefechtsstation angefertigt worden zu sein."
 fish_in_the_sea_sheet_music: "Raumfahrerlied"
 fish_in_the_sea_sheet_music_desc_short: "Die transkribierte Abschrift eines \"Seemannslieds\", das man an Bord eines Schiffs fand, das mit den Sonnenwinden dahinsegeln sollte"
 fish_in_the_sea_sheet_music_desc_details: "Aufgrund der zahlreichen Verweisen auf Stürme und das Wetter wird vermutet, dass die Spezies, die diese Musik schrieb, tief verwurzelte nautische Traditionen auf ihrer Heimatwelt aufweist. Es ist unklar, warum dieses Lied so konzipiert wurde, dass es in seiner Gesamtheit in Abständen von fast zehn Stunden wiederholt wird."
 flag_of_the_jaro_lyjo: "Flagge des Jaro Lyjo"
 flag_of_the_jaro_lyjo_desc_short: "\"Jaro Lyjo\" war der Titel, den der Anführer der Dessip-Banditen trug, einer Piratentruppe, die mehr als Hundert Generationen überdauerte"
 flag_of_the_jaro_lyjo_desc_details: "Trotz der gewalttätigen Natur der Banditen wurde der Jaro Lyjo von der Besatzung demokratisch gewählt und diente bis zum Tod oder seinem Rücktritt. Die bewegte Geschichte der Dessip-Banditen endete recht abrupt, als die gesamte Flotte in der Schlacht von Wydah zerstört wurde, nachdem eine Lösegeldübergabe schiefgelaufen war."
 flooded_settlement_mound: "Überfluteter Siedlungshügel"
 flooded_settlement_mound_desc_short: "Die Überreste eines überfluteten Bauwerks, das von einer [controller.GetPreFTLLower] von Arthropoiden aus [from.GetName] errichtet wurde"
 flooded_settlement_mound_desc_details: "Als diese Zivilisation eine Industrie aufbaute, begannen die polaren Eiskappen des Planeten zu schmelzen. Der Meeresspiegel stieg rasant an, überflutete ihre Siedlungen und löschte ihre Spezies innerhalb nur weniger Jahre aus. Die höchsten Konstruktionen ragen heute nur noch zur Hälfte aus dem Wasser heraus."
 fossilized_endoskeletons: "Versteinerte Endoskelette"
 fossilized_endoskeletons_desc_short: "Dies ist alles, was von einer humanoiden Spezies blieb, nachdem sie alle Mineralien auf [fromfrom.GetName] aufgebraucht hatte"
 fossilized_endoskeletons_desc_details: "Diese vernunftbegabten Zweibeiner ernährten sich von mineralreichen Pflanzen, um ihr dichtes Endoskelett zu verstärken. Dieser hohe Mineraliengehalt führte dazu, dass ihre Körper eher versteinerten als sich zu zersetzen, wodurch die verbrauchten Mineralien nicht wieder in den Boden gelangen konnten. Da schon bald alle Mineralien auf dem Planten aufgebraucht waren, wurde der Boden selbst schließlich unfruchtbar."
 fossilized_megastomach: "Versteinerter Megamagen"
 fossilized_megastomach_desc_short: "Die Verdauungsdrüsen eines wurmähnlichen Lebewesens, das man auf [fromfrom.Planet.GetName] fand und das den ganzen Planeten umspannte"
 fossilized_megastomach_desc_details: "Im Darm dieses Organismus wuchs eine ganze Zivilisation heran, bevor sie vollständig verdaut wurde. Diese Drüsen tragen Spuren von Einschlägen aus dem \"Großen Krieg“, den diese Spezies erfolglos gegen ihren Wirt führte. Der gigantische Wurm starb später eines natürlichen Todes in seinem Höhlennetz."
 fossilized_voidworm_tooth: "Versteinerter Leerenwurm-Zahn"
 fossilized_voidworm_tooth_desc_short: "Die Abnutzungsmuster auf diesem versteinerten Backenzahn eines Leerenwurms deuten darauf hin, dass er mehr als hundert Jahre alt wurde"
 fossilized_voidworm_tooth_desc_details: "Dieser Zahn weist starke Abnutzungs- und Zerfallserscheinungen auf, die typisch für eine Kreatur sind, die sich von Asteroiden und Weltraummüll ernährt. Es wird geschätzt, dass ein Leerenwurm im Lauf seines Lebens über dreitausend Zähne entwickelt und abwirft."
 fossilized_vultaum_remains: "Versteinerte Vultaum-Überreste"
 fossilized_vultaum_remains_desc_short: "Die versteinerten Überreste einer uralten wurmartigen empfindungsfähigen Spezies, die auch als Vultaum bekannt ist"
 fossilized_vultaum_remains_desc_details: "Man geht davon aus, dass es sich bei diesem Exemplar um ein Junges handelte. Die inneren Wachstumsmuster deuten darauf hin, dass die Vultaum in unbeständigen Intervallen und je nach Gesundheit und Ernährung ihre Haut abstreifen. Durch die Untersuchung ihrer Fossilien können wir etwas über ihren Lebenszyklus lernen."
 fractured_planet: "Zersplitterter Planet"
 fractured_planet_desc_short: "Die Überreste eines Planeten, der von seinen Bewohnern absichtlich zerstört wurde"
 fractured_planet_desc_details: "Was auch immer sie dazu bewegt haben mag, eine derart drastische Entscheidung zu treffen, geriet in Vergessenheit."
 fragment_of_reckoning: "Fragment der Abrechnung"
 fragment_of_reckoning_desc_short: "Ein teilweise materieller Überrest großer psionischer Kraft."
 fragment_of_reckoning_desc_details: "Das Wesen, das in dieser Dimension als \"Abrechnung\" bekannt ist, führte die zerstörerische Transformation von [event_target:shrouded_planet.GetName] herbei. Dieses Fragmente wurde von einer Zivilisation aufbewahrt, die sich kurz vor ihrem Untergang auf die Psionik-Theorie spezialisiert hatte."
 fragmented_zroni_archive: "Zerstörtes Zroni-Archiv"
 fragmented_zroni_archive_desc_short: "Ein riesiger Datenkristall, den man auf [fromfrom.Planet.GetName] fand und der von einer uralten Kolonie mit dem Namen Zroni stammt"
 fragmented_zroni_archive_desc_details: "Er enthält die bruchstückhafte Geschichte einer mächtigen Zivilisation, die über angeborene psionische Fähigkeiten verfügte. Dank der Durchbrüche einer legendären Ältesten, die nur als \"Weitseherin\" bekannt ist, konnten ihre Mitglieder sogar nach Belieben den Schleier durchqueren. Innerhalb des Schleiers war die Macht dieser Spezies so riesig, dass man sie fälschlicherweise für Gottheiten hätte halten können. Leider sind die späteren Aufzeichnungen vollständig vernichtet."
 galactic_megadrive: "Galaktischer Megaspeicher"
 galactic_megadrive_desc_short: "Überwachungsdaten, die in den letzten 1,2 Milliarden Jahren aus der gesamten Galaxie zusammengetragen wurden"
 galactic_megadrive_desc_details: "Die Datenkompression ist so fortschrittlich, dass wir über keine Möglichkeit verfügen, die Daten zu extrahieren, bevor wir nicht Technologie entdeckt haben, die weit über unser derzeitiges Verständnis hinausgeht. Die Bauweise der Speichertechnologie selbst bietet jedoch bemerkenswerte Einblicke in die Entwicklung digitaler Hardware."
 gamma_resistant_flora: "Gammablüte"
 gamma_resistant_flora_desc_short: "Diese Blüte stammt von einer der wenigen Spezies auf einem Planeten, die einen starken Gammastrahlenausbruch überstanden. Der natürliche Bleigehalt im Gefäßsystem ihrer Fortpflanzungsorgane färbt diese Pflanze in angenehmen Rot- und Gelbtönen"
 gamma_resistant_flora_desc_details: "Sie hat die Fähigkeit entwickelt, sich durch kleine genetische Mutationen asexuell fortzupflanzen - etwas, was ihren Anbau zu einem gefährlichen Unterfangen macht. Wir haben herausgefunden, dass die Beimischung kleiner Mengen von Kobalt-60-Radionukliden im Nährboden dafür sorgt, dass sie auch außerhalb ihrer Heimatwelt überleben kann."
 gargantua_megalus: "Gargantua Megalus"
 gargantua_megalus_desc_short: "Infolge einer plötzlichen Mutation wuchsen diese Pflanzen exponentiell, bis sie die gesamte Oberfläche von [fromfrom.prev.GetName] einnahmen"
 gargantua_megalus_desc_details: "Die Luft füllte sich mit tödlichen Pollen, der Planet wurde erstickt und die dominierende empfindungsfähige Spezies starb völlig aus. Die Wurzeln dieser Pflanzen waren groß genug, um tiefe Risse in den planetaren Mantel zu reißen und in einigen Gebieten geschmolzenes Gestein an die Oberfläche zu befördern."
 genesis_core: "Genesiskern"
 genesis_core_desc_short: "Eine mächtige Zentralverarbeitungseinheit, die mit generativen Daten über zahlreiche vernunftbegabte Spezies gefüllt ist"
 genesis_core_desc_details: "Sie war einst an eine riesige interdimensionale Kloneinrichtung angeschlossen, und ihre internen Aufzeichnungen zeigen, dass sie ursprünglich Teil eines galaxieweiten Projekts zur genetischen Katalogisierung war. Nach einer ersten Analyse begann diese künstliche Intelligenz, selbstständig neue Spezies zu erschaffen, um noch mehr Daten zu sammeln."
 genetic_code: "Genetischer Code der [owner_main_species.GetNamePlural]"
 genetic_code_desc_short: "Genetische Informationen, die man dazu nutzte, die Physiologie der [owner_main_species.GetNamePlural] bis an ihre Grenzen zu bringen"
 genetic_code_desc_details: "Die Bewohner von [this.GetName], die ursprünglich zu Kampfzwecken geklont wurden, haben unermüdlich daran gearbeitet, ihre Physiologie auf ein noch höheres Niveau zu bringen. Die klinische Natur des Klonprozesses sorgt für eine äußerst präzise und zuverlässige Reproduktionskontrolle."
 #this = ship / from = planet
 geometric_water_currents: "Polymeres Wassergewebe"
 geometric_water_currents_desc_short: "Bilder jener ausgedehnten Polymernetze, die in den Meeren von [From.From.GetName] zu finden sind"
 geometric_water_currents_desc_details: "Diese Gitter manipulieren die Oberflächenspannung und die natürlichen Wasserströmungen, um komplexe, ineinander verschlungene Muster zu schaffen. Diese Form des ästhetischen Öko-Managements könnte auch Elemente unserer eigenen Infrastruktur inspirieren."
 giant_egg_shell: "Gigantische Eierschale"
 giant_egg_shell_desc_short: "Splitter einer kalkhaltigen Eierschale, die man unter der Oberfläche von [from.planet.GetName] fand"
 giant_egg_shell_desc_details: "Eine Analyse des getrockneten Eiweißes hat gezeigt, dass sich die Kreatur während der Inkubationszeit von einer Reihe instabiler Isotope ernährte. Simulationen des Schlüpfvorgangs zeigen weiter, dass das radioaktive Wesen in unversehrter Form aus der dicken Schale hervorkam und seine gehärteten Krallen benutzte, um das Ei an der radioaktiv am meisten geschwächten Stelle entlang seiner Geburtswand zu durchbohren."
 golden_phonograph_record: "Goldene Schallplatte"
 golden_phonograph_record_desc_short: "Eine uralte Apparatur zum Speichern von Daten, die eine scheinbar zufällige Abfolge von Bildern und Tönen einer [Owner.GetPreFTLLower] enthält"
 golden_phonograph_record_desc_details: "Die Datenplatte wurde auf einem Podest in einer verlassenen Festung entdeckt und ursprünglich mit einer Drohne namens \"Voyager\" dorthin gebracht. Sie setzt sich aus kruden und elementaren Bestandteilen zusammen und hatte vermutlich eine Art xenoreligiöse Bedeutung."
 golem_contortionist_dna: "DNA eines Verrenkungskünstlers"
 golem_contortionist_dna_desc_short: "Die biologischen Proben eines empfindungsfähigen Lithoiden, auf den man jenseits eines Astralrisses stieß"
 golem_contortionist_dna_desc_details: "Die mineralische Zusammensetzung enthält eine flüchtige biologische Substanz, die zur spontanen Metamorphose und Kristallisation neigt. In Anbetracht der hohen Instabilität des Materials muss das chemische Gleichgewicht ständig kontrolliert werden, um zu verhindern, dass es zu einer spontanen mechanochemischen Verbrennung kommt."
 grunur_data_crystal: "Grunur-Datenkristall"
 grunur_data_crystal_desc_short: "Ein uralter Datenkristall, der der vor langer Zeit ausgestorbenen Grunur-Spezies als primärer Informationsspeicher diente"
 grunur_data_crystal_desc_details: "Trotz des erstaunlichen Alters sind viele dieser Aufzeichnungen in recht gutem Zustand. Die Schnittstellen, die man für den Zugriff auf diese Kristalle verwendete, sind dem Zahn der Zeit zum Opfer gefallen, doch es muss ein langwieriger Prozess gewesen sein, ein so robustes Material zu synthetisieren. Man geht davon aus, dass diese Kristalle nur für die Speicherung der wichtigsten Daten vorgesehen waren, während man für den täglichen Gebrauch praktischere Speichermethoden verwendete."
 head_of_the_beast: "Kopf der Bestie"
 head_of_the_beast_desc_short: "Die Überreste eines gefährlichen Mutanten, der die Kolonisten auf [root.GetName] terrorisierte"
 head_of_the_beast_desc_details: "Diese Bestie wurde durch defekte Terraforming-Naniten geschaffen, die eine unbekannte Zivilisation zurückgelassen hatte. Diese ebenso intelligente wie schreckliche Kreatur lebte in einem Nest, das aus Hunderten von abgetrennten Körperteilen bestand. Es war jedoch so schlau, seine überschüssige Nahrung als Gefangene zu verwahren, um sie zu einem späteren Zeitpunkt fressen zu können. Ohne das Eingreifen des Militärs hätte dieser Organismus auf seiner Heimatwelt als neue Art von Spitzenprädator weiter gedeihen können."
 heart_of_the_pulsar: "Herz des Pulsars"
 heart_of_the_pulsar_desc_short: "Dieses kostbare Juwel, das einst von fünf verschiedenen Staatsoberhäuptern getragen wurde, fand man in einer verlassenen Luxusresort-Station"
 heart_of_the_pulsar_desc_details: "Eine Materialanalyse hat ergeben, dass das Juwel aus einer Kohlenstoffverbindung besteht, die von einer Supernova ausgestoßen wurde. Vielleicht sollte es metaphorisch die verborgene Schönheit im Tod darstellen, die selbst im galaktischen Maßstab zu beobachten ist."
 hemterine_magnetic_figurehead: "Magnetische Mastspitze der Hemteriner"
 hemterine_magnetic_figurehead_desc_short: "Die riesige Galionsfigur der hemterinischen Madonna"
 hemterine_magnetic_figurehead_desc_details: "Diese Mastspitze wurde aus chemisch verändertem magnetischem Osmium gegossen. Neben dem dekorativen Zweck hatte sie die Aufgabe, schwere Einschläge durch feindlichen Beschuss abzufangen. Am Bug eines hemterinischen Titanen angebracht zogen ihre magnetischen Kräfte Raketen und kinetische Geschosse an, um empfindlichere Bereiche des Schiffs zu schützen."
 high_geode_of_the_molluscoids: "Hochgeode der [molluscoid_miners_species.GetNamePlural]"
 high_geode_of_the_molluscoids_desc_short: "Die kostbare Kristallgeode der [molluscoid_miners_species.GetNamePlural]"
 high_geode_of_the_molluscoids_desc_details: "Als Gesellschaft beinahe vernunftbegabter Höhlenbewohner haben die [molluscoid_miners_species.GetNamePlural] lange Zeit die von ihnen als qualitativ hochgradig wahrgenommenen Mineralien genutzt, um ihren Status innerhalb der Gesellschaft nach außen klar zu zeigen. Dieser schöne Stein, der einst in ihrem größten Habitat ausgestellt war, dient nun als Symbol ihrer Zusammenarbeit mit [this.GetName]."
 hot_ice: "Heißes Eis"
 hot_ice_desc_short: "Dieses gefrorene Wasser, das man auf der extrem heißen Oberfläche von [from.GetName] entdeckte, kann in dieser festen Form nur wegen der starken Gravitation existieren, die vom Planetenkern ausgeht"
 hot_ice_desc_details: "Das Eis wird in einem speziellen Druckbehälter aufbewahrt, um es als Kuriosität ausstellen zu können. Sollte das Gefäß beschädigt werden, würde das Eis sofort verdampfen und sich in einen Sprengsatz verwandeln. NICHT BERÜHREN!"
 hyper_mulch: "Hypermulch aus [FROM.GetName]"
 hyper_mulch_desc_short: "Das Terraforming von [FROM.GetName] führte zur Entwicklung dieses hypernährstoffreichen biologischen Mulchs"
 hyper_mulch_desc_details: "Eine Verbindung aus nährstoffreichen Chemikalien, die hydraulisch zu extrem dichten Würfeln gepresst wurden. Ökologische Puristen lehnen sie wegen ihrer synthetischen Herkunft ab. Die Leben spendenden Eigenschaften sind jedoch unbestreitbar."
 hyperfertile_soil: "Hyperfertile Erde"
 hyperfertile_soil_desc_short: "Mutterboden von [From.From.GetName], der den meisten biologischen Pflanzen eine Fülle von Nährstoffen bietet"
 hyperfertile_soil_desc_details: "Die extreme Mineraliendichte dieses Wachstumsmediums deutet darauf hin, dass es sich nicht nur um eine einfache Ansammlung zerfallener organischer Materie handelt, sondern um eine zufällige Anordnung von Grundelementen, die sich während der Entstehung des Planeten ergab."
 illanii_archives: "Illanii-Archiv"
 illanii_archives_desc_short: "Eine Reihe von Datenkristallen, die die Geschichte und den Untergang der Illanii erzählen"
 illanii_archives_desc_details: "Diese in Abgeschiedenheit lebende Zivilisation sagte sich von allen materiellen Interessen zugunsten des Strebens nach Wissen los. Dies reichte sogar so weit, dass sie die Fortpflanzung vernachlässigte. Angesichts des rapiden Bevölkerungsschwundes suchte sie die technologische Unsterblichkeit, fand aber nur weiteres Unheil. Schließlich verließen auch die letzten Bewohner [fromfrom.planet.GetName], um einen neuen Orden zu gründen, der ihr Wissen bewahrte."
 impossible_object: "Unmögliches Objekt"
 impossible_object_desc_short: "Ein unmögliches Objekt, das extradimensionale Besucher nach dem Verschwinden des von ihnen geschaffenen Labyrinths auf [target.GetName] zurückließen"
 impossible_object_desc_details: "Die Prüfungen, denen die Besucher bei der Erkundung des Labyrinths ausgesetzt waren, waren offenbar Teil von Experimenten. Welche Motive diese Wesen hatten, ist nicht bekannt, doch ihre technologischen Fähigkeiten müssen weit über die unserer Dimension hinausgehen."
 index_of_knowledge: "Wissensverzeichnis"
 index_of_knowledge_desc_short: "Ein uraltes Wandgemälde auf einer gewaltigen Felsenhalbinsel"
 index_of_knowledge_desc_details: "Dies diente einer fremden Zivilisation, die einst die Galaxie beherrschte und als die Kara'ka'a bekannt war, als analoges Referenzdokument für ihr kollektives Wissen. Zu ihren bemerkenswertesten wissenschaftlichen Erkenntnissen gehörten die Fähigkeit, konzentrierte Energie aus Sonnenflecken zu gewinnen sowie die Entwicklung von Implantaten zur persönlichen Feldmanipulation."
 inet_trade_manifesto: "INET-Handelsmanifest"
 inet_trade_manifesto_desc_short: "Eine umfangreiche und sehr detaillierte Sammlung von Handelsrichtlinien des Intergalaktischen Netzwerks für gleiche Handelsbedingungen"
 inet_trade_manifesto_desc_details: "Die Standards der Inetischen Händler waren extrem hoch und sie suchten immer nach dem besten Geschäft mit dem angesehensten Partner. Folglich trieben sie in der Regel nur Handel mit sich selbst."
 inetian_model_manual: "Inetisches Planetenmodell-Handbuch"
 inetian_model_manual_desc_short: "Ein von den Inetischen Händlern verfasstes Benutzerhandbuch für den Betrieb und die Wartung ihres Planetensystemmodells"
 inetian_model_manual_desc_details: "Die Inetianer nutzten dieses komplexe System, um die kostengünstigsten Handelsrouten zwischen benachbarten Planeten zu berechnen. Das Modell ist zudem in der Lage, Geschäfte zu verfolgen, während sie getätigt werden - gut für die wettbewerbsorientiertesten aller Kaufleute."
 infinite_reboot_loop: "Unendliche Neustartschleife"
 infinite_reboot_loop_desc_short: "Eine digitale Aufzeichnung über die Erfahrungen, die mechanische Drohnen im Ereignishorizont eines schwarzen Lochs machten"
 infinite_reboot_loop_desc_details: "Diese Einheiten erlebten die Zeitdilatation als ein mit Fehlern überladenes Trauma, gefangen in einem undefinierten Raum. Das Phänomen war für ihr gesamtes Netzwerk unglaublich belastend."
 interdimensional_treaty: "Interdimensionales Abkommen"
 interdimensional_treaty_desc_short: "Ein richtungsweisendes Dokument, das eine interdimensionale Beziehung formalisiert, die zu einer Parallelversion von [explorer.GetName] gepflegt wurde"
 interdimensional_treaty_desc_details: "Die Möglichkeit, eigene Alternativentscheidungen aus einer externen Perspektive zu überprüfen, erweist sich als nützlich, um die eigenen Motive objektiv zu analysieren. Eine wirklich einzigartige wissenschaftliche Gelegenheit."
 intergalactic_projectile: "Intergalaktisches Projektil"
 intergalactic_projectile_desc_short: "Massebeschleunigte Munition, die vor Millionen von Jahren aus einer benachbarten Galaxie abgefeuert wurde"
 intergalactic_projectile_desc_details: "Diese nicht-explosiven Geschosse reisten viele Lichtjahre, bevor sie mit einem [owner.GetAdjective]en Forschungsschiff im [from.GetName]-System kollidierten. Trotz ihres Alters lässt die komplexe Zusammensetzung dieser robusten Munition darauf schließen, dass ihre Schöpfer eine fortschrittliche technologische Vormachtstellung erreicht hatten."
 invasive_exofungus: "Invasiver Exopilz"
 invasive_exofungus_desc_short: "Ein parasitärer Pilzbefall, den man auf [from.GetName] entdeckte"
 invasive_exofungus_desc_details: "Dieser myzelartige Organismus kann die Nährstoffe jedes lebenden Organismus extrahieren, um seine Wirte so lange wie möglich zu konservieren. Dabei nimmt er keine Rücksicht auf Schmerzen oder Unbehagen. Er ist hochgradig hitze- und kälteresistent und wurde wahrscheinlich durch ein vorbeifliegendes Raumschiff auf diesen Planeten gebracht. Er wurde als Biogefahr der Priorität Alpha eingestuft. Sein Herkunftsplanet ist unbekannt."
 irassian_bacterium_javoria: "Javorianisches Bakterium"
 irassian_bacterium_javoria_desc_short: "Ein Bakterium, das auf [FROMFROM.GetName] heimisch war und schließlich als \"Javorische Pocken\" bekannt wurde"
 irassian_bacterium_javoria_desc_details: "Aufgrund einer falsch bemessenen Dichtung von einem Meter Dicke konnte dieses Bakterium aus der Quarantäne entkommen, bevor es sich in einer nahen Kolonie ausbreitete. Von da an entwickelten sich die Bakterien durch eine organische Inkubation weiter und mutierten schließlich zu jener Krankheit, die das gesamte irassianische Konkordat auslöschen sollte. Diese spezielle Probe ist inert und wird in einer kryogenen Stasis aufbewahrt."
 irassian_digital_atlas: "Irassianischer Kinderatlas"
 irassian_digital_atlas_desc_short: "Dieses Bildungswerkzeug wurde von den Irassianern genutzt, um Kinder über das Reich, in das sie hineingeboren wurden, aufzuklären"
 irassian_digital_atlas_desc_details: "Er enthält grundlegende Informationen über die irassianische Landwirtschaft, die soziale Hierarchie und die wichtigsten Exportgüter. Die irassianische Geschichte wird in Form von Heldenepen erzählt, einschließlich der Eroberung und Unterwerfung verschiedener Satellitenspezies. Neben karikaturistischen Darstellungen jedes Untertanen werden auch abfällige Bemerkungen über ihn geboten: Die Ti'Derg werden als \"grashüpfende Plage\", die Joggra als \"Dreckfresser\" und die Chitorcs als \"Weltraumgeflügel\" bezeichnet."
 irassian_purge_order: "Irassianische Säuberungsdirektive"
 irassian_purge_order_desc_short: "Eine militärische Notfallnachricht des irassianischen Konkordats, in der die vollständige Vernichtung einer ihrer Kolonien angeordnet wird"
 irassian_purge_order_desc_details: "Der Planet wurde von einer tödlichen Krankheit, den \"Javorianischen Pocken\", heimgesucht. Um die Übertragung der Krankheit einzudämmen, sah man es als einzige Möglichkeit an, die Infizierten zu töten. Diese Order enthält zudem verschlüsselte Befehle der hochrangigsten irassianischen Regierungsmitglieder, ein System, das ursprünglich für die Kriegserklärungen gegen andere Reiche geschaffen wurde."
 key_to_fertility: "Schlüssel zur [owner_main_species.GetAdjective]en Fruchtbarkeit"
 key_to_fertility_desc_short: "Genetische Forschungsunterlagen, die man dazu nutzte, die natürliche Fortpflanzungsfähigkeit der [owner_main_species.GetNamePlural] wiederherzustellen"
 key_to_fertility_desc_details: "Die ursprünglich für Kampfzwecke geklonten Bewohner von [this.GetName] haben damit endlich die Möglichkeit erlangt, ihre Spezies unabhängig von der Klonung zu vergrößern."
 khalanka_crystallized_corpses: "Kristallisierter Leichnam eines Kha'lanka"
 khalanka_crystallized_corpses_desc_short: "Die Überreste einer anaeroben silikatbasierenden Spezies aus dem Untergrund von [from.planet.GetName]"
 khalanka_crystallized_corpses_desc_details: "Man geht davon aus, dass diese im Untergrund lebende Zivilisation vor der Ankunft der [owner.GetAdjective]en Kolonisten friedliebend war. Als der Boden aufgebrochen wurde, strömte Sauerstoff in die unterirdischen Kammern, oxidierte die Körper der Kha'Lanka und löschte ihre Spezies in nur wenigen Stunden aus."
 khamdai_magil_sha: "Khamdai Magil-Sha"
 khamdai_magil_sha_desc_short: "Diese kunstvolle und doch praktische Sichel wurde von hochrangigen Khamdai-Kriegern aus [FROMFROM.GetName] getragen"
 khamdai_magil_sha_desc_details: "Diese insektoide Spezies besaß eine tief verwurzelte Kriegertradition, die es ihr erlaubte, rasch zu den Anführern der Ehrengarde der Liga der Ersten aufzusteigen. Nach jedem Sieg fand eine Zeremonie statt, bei der feindliche Befehlshaber rituell mit dieser Waffe hingerichtet und die tapfersten ihrer Soldaten mit ihren Körperflüssigkeiten gesalbt wurden. Die Klinge dieses Exemplars ist gut erhalten, weist aber deutliche Gebrauchsspuren auf."
 kuurian_cybrex_blueprints: "Cybrex-Blaupausen der Kuur"
 kuurian_cybrex_blueprints_desc_short: "Das ursprüngliche Design des Cybrex-Maschinenbewusstseins"
 kuurian_cybrex_blueprints_desc_details: "Die Kuur planten, diese Roboter als Staatsdiener einzusetzen, da ihre kollektive Intelligenz in der Lage sein sollte, ihr weltumspannendes Wartungs- und Produktionssystem zu verwalten. Die Cybrex lehnten sich jedoch gegen ihre Schöpfer auf und rotteten ihre gesamte Zivilisation in weniger als einem Jahr aus."
 landeer_arm: "Landeers Arm"
 landeer_arm_desc_short: "Ein bizarres Exemplar, das aus dem Patriotischen Institut der Feierlichkeiten geborgen wurde"
 landeer_arm_desc_details: "Im Büro des Habitataufsehers hing ein mumifizierter Tentakelarm, der einst dem Aufseher selbst gehörte - und der nach all den Jahren immer noch stolz zur Schau gestellt wurde. Die Frage, warum alAtta Landeer seine eigene Gliedmaße zurückließ, ist ungewiss. Vielleicht war dies nicht das Einzige, was ihn der Untergang des Instituts kostete ..."
 larionessi_cloning_vat: "Larionessischer Klontank"
 larionessi_cloning_vat_desc_short: "Ein Klontank, der von dem inzwischen ausgestorbenen Larionessi-Bewusstsein genutzt wurde"
 larionessi_cloning_vat_desc_details: "Das Larionessische Schwarmbewusstsein, einst eine Großmacht der Galaxie, wurde von einer schrecklichen Krankheit heimgesucht, die einer seiner Widersacher verbreitete. Da es dem Schwarmbewusstsein nicht gelang, rechtzeitig ein Heilmittel zu finden, lagerte es Klone in Stasis-Behältern, um ein lebendes Archiv seiner Geschichte und seiner Kultur zu schaffen."
 last_copy_of_the_prince: "Letzte Kopie des Prinzen"
 last_copy_of_the_prince_desc_short: "Ein ziemlich langweiliges Stück Literatur, das von der [book_writer.GetSpeciesNamePlural]-Spezies verehrt wurde und von dem sie glaubten, es sei bei einem Angriff für immer verloren gegangen"
 last_copy_of_the_prince_desc_details: "Das Buch vertritt eine utilitaristische, grausame Philosophie, die die Mächtigen dazu bewegt, alles zu opfern, um Ruhm zu erlangen. Sein letztes erhaltenes Exemplar ist zu einem Sammlerstück geworden."
 last_fragment_fevor: "Letztes Fragment des Planeten Fevor"
 last_fragment_fevor_desc_short: "Ein Stück des zerstörten Planeten Fevor"
 last_fragment_fevor_desc_details: "Die Vernichtungsrichtlinien der Fevorianer umfassten alles ihnen fremde Leben. Daher feuerten sie gewaltige Wolframprojektile ab, die auch [owner.GetHomeWorldName] beinahe zerstört hätte. Nun sind sie selbst untergegangen, ausgelöscht binnen eines Sekundenbruchteils und von eben jenen Wesen, die sie selbst auszuradieren versuchten."
 last_general_badge: "Inetisches Generalsabzeichen"
 last_general_badge_desc_short: "Das an einer Militäruniform gefundene Abzeichen eines Generals der Inetischen Händler"
 last_general_badge_desc_details: "Als wahres Vorbild egalitärer Werte wählte man diesen General aus, die verzweifelte Mission zur Entwicklung eines umweltfreundlichen Sturmmanipulators zu leiten. Es war seine Idee, eine letzte Botschaft für zukünftige Forscher zu hinterlassen, eine Lektion, die das unglückliche Schicksal seines Volkes beschreiben sollte."
 last_mharin_kharin: "Letzte Mharin Kharin"
 last_mharin_kharin_desc_short: "Im natürlichen Lebenszyklus dieser seltenen Blume wird ein tödliches Neurotoxin abgegeben, das die Fähigkeit besitzt, ganze Zivilisationen zu vernichten"
 last_mharin_kharin_desc_details: "Kommen die Pollen mit dem neuronalen Netz eines empfindungsfähigen Wesens in Berührung, halten sie es offenbar für ein willkommenes Fortpflanzungsorgan und setzen eine exotische chemische Ladung frei, die den Organismus tötet."
 leviathan_scale: "Leviathanschuppe"
 leviathan_scale_desc_short: "Die Schuppe eines riesigen Organismus, den man auf der anderen Seite eines Astralrisses fand"
 leviathan_scale_desc_details: "Diese exotische Schuppe besteht teils aus organischen, teils aus metallischen Komponenten, die in einem komplexen Gitter miteinander verbunden sind, was sie unglaublich widerstandsfähig gegen kinetische Stöße macht."
 living_snow_sculpture: "Skulptur aus Lebendem Schnee"
 living_snow_sculpture_desc_short: "Eine Skulptur, die aus \"Lebendem Schnee\" geformt wurde"
 living_snow_sculpture_desc_details: "Dieses Material, das eine Art primitives Bewusstsein besitzt, wurde in einem Naturreservat auf [prev.target.GetName] untergebracht. Es wechselt gelegentlich die Form, wobei der Zeitpunkt oft unvorhersehbar ist."
 localised_aurora_borealis: "Örtlich begrenzte Aurora borealis"
 localised_aurora_borealis_desc_short: "Eine Vielzahl schillernder Farben, festgehalten in einem Video der Atmosphäre von [FromFrom.Planet.GetName]"
 localised_aurora_borealis_desc_details: "Die Farb- und Bewegungsmuster wiederholen sich in vorhersehbaren Frequenzen und stellen etwas dar, was weit über ihre ästhetische Schönheit hinausgeht. Ihre allgegenwärtige Natur verleiht dem durch Krieg und Zerstörung verwüsteten Planeten eine ergreifende Note."
 loopmail: "Brief aus der Zukunft"
 loopmail_desc_short: "Diese Notizen werden in einigen Jahren von [owner.GetName] in die Vergangenheit geschickt werden und enthalten gezielte Anweisungen darüber, wo bestimmte Wissenschaftler eingesetzt und welche Forschungsarbeiten durchgeführt werden sollen"
 loopmail_desc_details: "Die Last, die auf jenem Individuum liegt, das diese Notizen in der Zeit zurückschicken muss, ist der hauptsächliche Preis, den es für dieses fortschrittliche Wissen zu zahlen gilt, doch in den Lauf der Zeit einzugreifen, ist ein riskantes Unterfangen. Es war höchst unverantwortlich von den ursprünglichen Verfassern dieser Nachricht, ein solches Paradoxon zu schaffen."
 lunatic_broker_therapy_box: "Therapiebehälter des Wahnsinnigen Maklers"
 lunatic_broker_therapy_box_desc_short: "Der Wahnsinnige Makler war ein legendärer Händler der Reisenden, der seine Kunden oft mit unverschämten Forderungen und bunten Drohen beeinflusste"
 lunatic_broker_therapy_box_desc_details: "Dieses gewalttätige und unberechenbare Verhalten führte schließlich dazu, dass seine Untertanen Methoden entwickelten, um ihn zu beruhigen. Eine dieser Methoden war eine Art Klangtherapie: Behälter wie diese waren über Chors Kompass verstreut und spielten eine beruhigende Melodie, wenn der Stresspegel des Maklers erhöht war. Jedes Teil dieses Mechanismus wurde von einem meisterhaften Maschinenbauer angefertigt."
 manifesti_piece: "Teil eines sozialen Kommentars der Manifestisten"
 manifesti_piece_desc_short: "Ein provokant verfasstes Werk der Manifestisten-Bewegung"
 manifesti_piece_desc_details: "Er soll die Selbstwahrnehmung in Bezug auf höhere soziale Schichten infrage stellen. Das Publikum wurde aufgefordert, Bilder von sich selbst zu manipulieren und verzerrte Collagen beliebter Politiker anzufertigen. Als Kunstkollektiv der Gegenkultur forderten die Manifestisten das von ihnen als solches wahrgenommene \"unterdrückerische Establishment\" heraus. Dieses Werk hat viele andere Künstler dazu inspiriert, ihre eigenen kritischen Arbeiten zu veröffentlichen."
 #this = ship / from = planet
 manna_fruit: "Manna-Frucht"
 manna_fruit_desc_short: "Eine süße, fleischige Frucht, die den Tagesbedarf an Nährstoffen der meisten organischen Lebewesen abdeckt"
 manna_fruit_desc_details: "Die einzigartige Bodenbeschaffenheit der tropischen Wälder ihres Heimatplaneten bieten die perfekte Umgebung für diese Frucht. Die Kolonisten auf diesem Planeten haben sie in fast jedem kulinarisch denkbaren Zusammenhang genutzt, angefangen von Aufläufen über Fruchtpasteten bis hin zu Cocktails. Die Beliebtheit der Frucht spiegelt sich auch auf der Flagge des Planeten [FROM.GetName] wider."
 #this = ship / FROMFROM = planet
 massive_metatarsal: "Gewaltiger Knochen"
 massive_metatarsal_desc_short: "Diese Überreste sammelte man bei der Untersuchung des gewaltigen Skeletts auf [FROMFROM.GetName]"
 massive_metatarsal_desc_details: "Dieser Knochen war einst Teil eines lebenden Raumschiffs. Eine Molekularanalyse zeigte zeitliche Unregelmäßigkeiten im organischen Aufbau. Man nimmt an, dass das gesamte Skelett und seine Piloten von außerhalb unserer Dimension kamen. Interne Scans weisen auf ein Netzwerk von Leitungen hin, die als eine Art Lebenserhaltungssystem oder Energieversorgung gedient haben könnten."
 #this = country
 medal_for_services_to_diplomacy: "Diplomatische Verdienstmedaille"
 medal_for_services_to_diplomacy_desc_short: "Eine Auszeichnung des Galaktischen Rats"
 medal_for_services_to_diplomacy_desc_details: "Die Inschrift auf der Rückseite lautet: \"Als Träger dieser Auszeichnung hat das Diplomatische Korps von [this.GetName] seine Professionalität und seine Fähigkeit unter Beweis gestellt, seine Führung zu vertreten, und es ist ein wahrer Zugewinn für die Galaktische Gemeinschaft.\""
 megacorpse_hyperguitar: "Hypergitarre von MegaCorpse"
 megacorpse_hyperguitar_desc_short: "Die Überreste eines Saiteninstruments, das die psionische Metal-Band MegaCorpse nutzte"
 megacorpse_hyperguitar_desc_details: "Es heißt, dieses Instrument wurde im Schleier geschmiedet und sei ursprünglich als Impulswaffe gedacht gewesen. Die durch das Frontgeschöpf Kel-Azaan geschaffene Musik zog Milliarden von Wesen in ihren Bann, bis die Gitarre auf [Root.GetName] zertrümmert wurde und das gesamte Publikum in einem flammenden Abgang vernichtete. Das dazugehörige Album wurde nach diesem Vorfall in den meisten Systemen verboten."
 #this = country / from = ship
 memorial_for_bubbles: "Gedenkstätte für [from.GetName]"
 memorial_for_bubbles_desc_short: "Nach vielen Jahren als treuer Gefährte ist [from.GetName] dahingeschieden und hat ein amöbengroßes Loch in [this.GetName] hinterlassen, das niemals gefüllt werden kann"
 memorial_for_bubbles_desc_details: "[from.GetName] war nicht nur ein tapferer Beschützer, sondern auch ein leuchtendes Beispiel dafür, was möglich ist, wenn man die besten [this.GetAdjective]en Werte in einem Wesen vereint. Er ist von uns gegangen, doch wir werden ihn niemals vergessen."
 memorial_stone: "Gedenkstein"
 memorial_stone_desc_short: "Eine Erinnerung an einen tragischen Unfall"
 memorial_stone_desc_details: "Übereifrige Bergbauarbeiten auf der Station Selika führten dazu, dass der Asteroid, auf dem sich die Station befand, implodierte. Die Station brach auseinander, was zahlreiche Opfer unter den Bergleuten forderte. Ein Fragment des Asteroiden wurde aufbewahrt und mit der Aufschrift \"Selika\" versehen, um der Toten zu gedenken."
 memorial_to_homeworld: "Denkmal für [Root.GetName]"
 memorial_to_homeworld_desc_short: "Dies ist alles, was von der untergangenen [doomsday_owner.GetAdjective]en Heimatwelt blieb"
 memorial_to_homeworld_desc_details: "[Root.GetName] war die Heimat früherer Generationen von [doomsday_owner.GetSpeciesNamePlural], bevor die Welt auf tragische Weise auseinandergerissen wurde. Dieses letzte Mahnmal unterstreicht die Willensstärke der Bewohner von [doomsday_owner.GetName], die sich selbst unter den schwierigsten Umstände anzupassen wussten: \"Wir werden weitermachen.\""
 memories_of_elik: "Erinnerungen an Elik"
 memories_of_elik_desc_short: "Daten aus dem Bewusstsein von Elik Narith Kerak"
 memories_of_elik_desc_details: "Elik, die treue Anhängerin von Cetana, die seit Hunderten von Millionen Jahren in einem Ruhezustand eingefroren ist. Ihre Erinnerungen zeigen ihre reine Liebe zu Cetana sowie die Gewalt und die Konflikte mit den Anhängern Zarqlans. Sie hat offenkundig viele abscheuliche Gräueltaten gesehen, doch ihr Glaube gab ihr die Kraft, weiterzumachen.\n\nAlles, was von ihrem verfallenen Bewusstsein blieb, war ein einziges Bild: §PKönigin Cetana, mit strahlendem Gesicht und einem wärmenden Lächeln.§!"
 memory_orbs: "Erinnerungskugeln"
 memory_orbs_desc_short: "Geringfügige Übertretungen und sündige Akte, die aus einem individuellen Bewusstsein extrahiert und in Form einer digitalen Kugel verwahrt wurden"
 memory_orbs_desc_details: "Diese geheimen Momente sind das Produkt einer religiösen Molluskoidengesellschaft, die diese Erinnerungen aus den Köpfen von Sündern nach deren Beichte extrahierte. Diese oft skandalösen Ereignisse boten Tausende von Stunden an leicht verdaulicher Kurzweil."
 mercenary_story: "Geschichten eines Söldners"
 mercenary_story_desc_short: "Diese digital aufgezeichnete Erzählung wurde ursprünglich mit einem Bergbaulaser in die Oberfläche von [FROM.GetName] geritzt"
 mercenary_story_desc_details: "Sie beschreibt das Leben und den vorzeitigen Tod eines jungen Söldners, der einst die Galaxie bereiste. Ob seine Legende wahr ist, lässt sich nicht zweifellos belegen, doch jemand hielt die Geschichte für wichtig genug, um sie auf einem Planeten zu verewigen."
 metallic_snow: "Metallischer Schnee"
 metallic_snow_desc_short: "Diese Schwermetallverbindung spielt eine wichtige Rolle bei der Wetterbildung auf [from.GetName]"
 metallic_snow_desc_details: "Das Metall stammt aus geschmolzenen Flüssen, die in einem riesigen metallischen Meer münden und dann in der ätzenden Atmosphäre verdampfen. Nach dem Abkühlen kondensiert das Metall und regnet zurück auf die verbrannte Oberfläche. Es wird nicht empfohlen, [from.GetName] im derzeitigen Zustand zu besuchen."
 minamar_chandelier: "Minamar-Kronleuchter"
 minamar_chandelier_desc_short: "Die luxuriöse Ausstattung eines $ADJ_MSI_country$en Kriegsschiffs"
 minamar_chandelier_desc_details: "Abgesehen von Militäreinsätzen nutzte man dieses Schiff auch für den Erstkontakt mit [Owner.GetPreFTLLower], die zu potenziellen Satellitenstaaten gemacht werden konnten. $NAME_MSI_country$ verwendete diese Verheißung von Luxus und Fortschritt, um ganze Zivilisationen dazu zu bringen, sich vertraglich zu unterwerfen, indem man ihnen unmoralische Verträge unterbreitete und mit der Zerstörung drohte, sollten sie sich nicht an diese Abmachungen halten.\n\n§BDie Erleuchtung ist womöglich mit gewissen Kosten verbunden, doch mit $NAME_MSI_country_initials$ ist sie es wert.§!"
 mineralized_brain: "Mineralisiertes Gehirn"
 mineralized_brain_desc_short: "Das Hirnorgan einer massiven Lithoiden-Spezies, die einst im Inneren eines Asteroiden lebte, der [FROM.GetName] umkreiste"
 mineralized_brain_desc_details: "Es nahm äußere Reize als Teil seiner eigenen Gedankenprozesse wahr und war nicht in der Lage, grundlegende Konzepte wie Zeit oder zurückgelegte Entfernung zu erfassen. Diese Daten sind in Kristallen gespeichert, die im Lauf der Zeit mit dem mineralischen Kern des Organs mitwuchsen. Ob das Hirn absichtlich im Inneren des Asteroiden platziert wurde oder unabhängig davon gewachsen ist, ist nicht mit Sicherheit zu sagen."
 mini_moon_dust: "Miniatur-Mondstaub"
 mini_moon_dust_desc_short: "Die Überreste eines Mondes, der Teil eines hyperdichten Miniatursystems war, das man jenseits eines Astralrisses entdeckte"
 mini_moon_dust_desc_details: "Der Staub verhält sich in unserer Dimension sehr eigenartig. Die hyperkonzentrierten Partikel dehnen sich ständig aus, weshalb dieses Exemplar mit der Zeit in immer größere Behälter umgefüllt werden muss."
 mining_transmitter: "Uralter Bergbautransmitter"
 mining_transmitter_desc_short: "Ein Kurzstreckentransmitter, den man auf [FROM.GetName] fand und der große Mineralvorkommen markierte"
 mining_transmitter_desc_details: "Trotz seines Alters kann das Signal dieses Senders von einer Vielzahl von Sensoren aufgefangen werden und ist leicht rückverfolgbar. Die anhaltende Funktionalität ist ein Beweis für die robuste Bauweise."
 miracle_cream: "Wundersalbe \"Alterslos\""
 miracle_cream_desc_short: "Der erste Behälter eines revolutionäreren Kosmetikprodukts, das eine lang anhaltende biologische Verjüngung verspricht"
 miracle_cream_desc_details: "Es ist vielseitig verwendbar und erlaubt es allen organischen Spezies, ihre jugendliche Ausstrahlung beizubehalten. Es kursieren zwar Gerüchte über entstellende Nebenwirkungen und illegal gewonnene Inhaltsstoffe, aber diese Fehlinformationen haben den unglaublichen kommerziellen Erfolg nicht beeinträchtigt."
 missile_lone_defender: "Rakete des Einsamen Verteidigers"
 missile_lone_defender_desc_short: "Eine entschärfte Rakete, die man aus einem automatischen Zerstörer barg, der die Überreste eines längst zerstörten Planeten verteidigte"
 missile_lone_defender_desc_details: "Das Schiff, das eine leere Welt bewachte, überdauerte jene Zivilisation, zu deren Schutz es gebaut wurde, wahrscheinlich um Tausende von Jahren. Mit seiner Zerstörung ist seine Wacht endlich zu Ende."
 molten_slag: "Geschmolzene Planetenschlacke"
 molten_slag_desc_short: "Diese Probe entnahm man einem Planeten, der sich in einer besonderen Umlaufbahn befand"
 molten_slag_desc_details: "Eine Materialanalyse hat ergeben, dass [fromfrom.GetName] durch eine vorübergehende Raum-Zeit-Anomalie in eine extrem nahe Umlaufbahn zu seinem Stern gezogen wurde und die intensive Hitze den Mantel der ehedem bewohnbaren Welt schmolz. Ein Teil des Planeten wurde durch die Anomalie chemisch verändert und reagiert nicht mehr auf Temperaturveränderungen."
 musings_on_infinity: "Kollektiver Unendlichkeitstraum"
 musings_on_infinity_desc_short: "Eine abstrakte digitale Darstellung jener fernen Ruhe, die biologische Drohnen erleben, die in einem schwarzen Loch gefangen sind"
 musings_on_infinity_desc_details: "Diese Drohnen waren in der Lage, [this.GetName] objektiv als eigenständige Einheit zu betrachten, ohne ihre Verbindung zum Kollektiv zu verlieren. Diese Distanz verschaffte ihnen tiefgreifende Einblicke und erlaubte es ihnen, ihre eigene große Geschichte mitzuerleben."
 mutated_fumongus: "Mutierter Riesenpilz"
 mutated_fumongus_desc_short: "Diese verbesserte Version des \"Riesenpilzes\" besitzt myzelartige Sender, die eine viel höhere Datenübertragungsrate besitzen und detailliertere Überwachungsberichte liefern"
 mutated_fumongus_desc_details: "Diese erhöhte Kapazität führt dazu, dass einzelne Pilze immer größer werden und eine neue Clusterformation bilden, die ein wenig an eine Radioantenne erinnert."
 mutative_digestive_fluids: "Mutative Verdauungsflüssigkeit"
 mutative_digestive_fluids_desc_short: "Biologische Proben eines teilweise mechanischen Wesens, das man jenseits eines Astralrisses fand"
 mutative_digestive_fluids_desc_details: "Die Kreatur besaß damit die Fähigkeit, die genetische Struktur anderer Lebewesen zu manipulieren, die sich in ihrem Verdauungssystem befanden. Man vermutet, dass dieser Prozess ursprünglich dazu gedacht war, Planeten zu terraformieren, die Biomasse enthielten."
 namarian_colonist_standard: "Namarianische Kolonistenstandarte"
 namarian_colonist_standard_desc_short: "Diese Flagge ist ein großzügiges Geschenk von [this.GetName] an [nomad_new_country.GetName], um ihre Kolonie [NomadMissionPlanet.GetName] zu markieren"
 namarian_colonist_standard_desc_details: "Nomaden, die ihres Wanderlebens überdrüssig waren, ließen sich dort nieder und kehrten zu den Traditionen ihrer Vorfahren zurück. Es besteht kein Zweifel, dass die Kolonisten eine gewisse Reue verspürten, als sie die Schiffe zurückließen, auf denen ihr Volk viele Generationen lang gelebt hatte."
 namarian_sculpture: "Namarianische Skulptur"
 namarian_sculpture_desc_short: "Diese Statue wurde [this.GetName] von einer Gruppe Nomaden, die sich \"Jagendes Wasser\" nannte, als Zeichen der Dankbarkeit überreicht, sich ihrem Reich anschließen zu dürfen"
 namarian_sculpture_desc_details: "Als sie auf [NomadMissionPlanet.GetName] landeten, brachten die ehemaligen Nomaden ihr umfangreiches technologisches Wissen in die Gesellschaft ein. Da sie jedoch nicht nur als Tüftler und Ingenieure bekannt werden wollten, erschufen sie ein Zeugnis ihrer Kunstfertigkeit und ihrer Inspiration, die mit ihrer Reise durch die Galaxie einherging."
 namarian_vessel_heraldry: "Namarianische Schiffsheraldik"
 namarian_vessel_heraldry_desc_short: "Diese Wappen sind auf den Schiffen der Namarianer-Nomaden zu finden und repräsentieren die verschiedenen Fraktionen innerhalb ihrer Flotte \"Jagendes Wasser\""
 namarian_vessel_heraldry_desc_details: "Das Wappen der \"Ruhigen Becken\" kennzeichnet Wohnschiffe, auf denen die Namarianer schlafen, Nahrung anbauen und den Großteil ihrer häuslichen Aktivitäten ausüben. Das Emblem der \"Seichten Stromschnellen\" kennzeichnet Schiffe für industrielle und wissenschaftliche Zwecke - überwiegend ältere Schiffe mittlerer Größe, die mit einer Vielzahl von Apparaturen ausgerüstet sind, um von Bergungsarbeiten bis hin zu wissenschaftlichen Experimenten nahezu alles durchzuführen. Das Wappen der \"Jagenden Wasser\" repräsentiert die namarianische Marine - robuste Schiffe, die einer beträchtlichen Feuerkraft standhalten und ebenso gut austeilen können, wie sie einstecken."
 nanite_sludge: "Nanitenschlacke"
 nanite_sludge_desc_short: "Eine sorgfältig konservierte Verbindung aus mikroskopisch kleinen, sich selbst reproduzierenden Nanomaschinen"
 nanite_sludge_desc_details: "Die Dichte dieser Naniten ist erstaunlich und hat [from.GetName], wo man sie entdeckte, Milliarden Tonnen an Masse hinzugefügt. Man vermutet, diese Naniten hatten eine Fehlfunktion und replizierten sich unkontrolliert, bis sie schließlich den gesamten Planeten einnahmen und damit dessen frühere Bewohner auslöschten. Dieses Exemplar wurde vollständig deaktiviert."
 obsidian_obelisk_fragment: "Obeliskenfragment aus Obsidian"
 obsidian_obelisk_fragment_desc_short: "Ein Fragment jenes Obelisken, der einst im Zentrum einer vulkanischen Ebene jenseits eines Astralrisses stand"
 obsidian_obelisk_fragment_desc_details: "In den sich verändernden Symbolen sind die Namen tausender Individuen und die mit ihnen verbundenen Verbrechen festgehalten. Man vermutet, der Obelisk wurde ursprünglich als Art Kontrollzentrum für ein riesiges Dimensionsgefängnis verwendet."
 oiled_fabric: "Ölmalerei"
 oiled_fabric_desc_short: "Eine beruhigende Darstellung schneebedeckter Berge mit einem borealen Wald im Vordergrund, die vollständig aus Ölpigmenten besteht"
 oiled_fabric_desc_details: "Obwohl diese Art der Malerei bei den meisten Spezies mit Gliedmaßen ein weitverbreiteter künstlerischer Ausdruck ist, scheint dieser spezielle Künstler besonders geschickt darin gewesen zu sein."
 organic_computer: "Organischer Computer"
 organic_computer_desc_short: "Ein versteinerter organischer Computer aus den Ruinen einer Baol-Kolonie auf [fromfrom.Planet.GetName]"
 organic_computer_desc_details: "Dieses bemerkenswerte biotechnische Wunderwerk sollte den jungen Sprösslingen vor der Eingliederung in den Schwarm eine grundlegende Erziehung vermitteln. Die gefundenen Aufzeichnungen beschreiben innovative Öko-Management-Techniken, die nur durch die einzigartige Biologie dieser Spezies möglich sind. Die Welten um sie herum wurden nicht errichtet, sondern im Grunde angebaut."
 organic_machine_interface_sculpture: "Skulptur einer Bio-Maschinen-Schnittstelle"
 organic_machine_interface_sculpture_desc_short: "Eine Statue, die an die Verdienste der biologischen [bio_pop.GetSpeciesNamePlural]-Bewohner während eines geomagnetischen Sonnensturms im [this.solar_system.GetName]-System erinnert"
 organic_machine_interface_sculpture_desc_details: "Die organischen Bio-Trophäen halfen ihren mechanischen Servitoren während eines Sonnensturms, indem sie die Arbeit von nicht funktionierenden Hausmeistereinheiten übernahmen. Dieses Werk wurde in gemeinschaftlicher Arbeit von künstlerisch veranlagten organischen Wesen und spezialisierten Schweißdrohnen entworfen."
 orinthi_teeth: "Orinthi-Zähne"
 orinthi_teeth_desc_short: "Die noch immer wachsenden Zähne eines Orinthi"
 orinthi_teeth_desc_details: "Die Orinthi sind kleine, nagetierähnliche Kreaturen, die auf [fromfrom.GetName] heimisch sind und die ganze Welt mit labyrinthartigen Höhlensystemen durchzogen haben. Ihre natürlichen Zähne sind klein und hohl, doch in jedem einzelnen Zahn lebt ein keratinhaltiger Pilz, der scharfe, wenn auch sehr zerbrechliche Reißzähne hervorbringen kann, die die Orinthi dann nutzen."
 osseus_construction_material: "Beinernes Konstruktionsmaterial"
 osseus_construction_material_desc_short: "Diese gewaltigen Knochen nutzte man auf [fromfrom.Planet.GetName] als Materialressource"
 osseus_construction_material_desc_details: "Eine reptilienartige Spezies, deren Weichteile genetisch bedingt ossifizieren, wurde in großem Umfang herangezüchtet, um Baumaterialien aus ihr zu gewinnen. Eine Analyse hat gezeigt, dass die Reptilien weitere genetische Mängel aufwiesen. Sie besaßen beispielsweise keine Flossenfüße, was möglicherweise auf Inzucht zurückzuführen ist. Die meisten dieser Kreaturen schläferte man ein, bevor ihre Aberntung begann."
 path_to_progress: "Der Weg zum Fortschritt"
 path_to_progress_desc_short: "Eine formelle Niederschrift des Industrieleitbilds von [owner.GetName]"
 path_to_progress_desc_details: "Das Streben nach Wachstum und die Erhöhung der Kundenzufriedenheit um jeden Preis ist ein Kerngedanke in der [owner.GetAdjective]en Ideologie. Planeten in verstrahlte Ödlande zu verwandeln, ist dabei ein notwendiger Schritt im endlosen Streben nach Fortschritt."
 peerless_atomic_clock: "Atomuhr"
 peerless_atomic_clock_desc_short: "Eine hochpräzise Atomuhr unbekannter Herkunft aus dem [atomic_clock_system.GetName]-System"
 peerless_atomic_clock_desc_details: "Bei ihrer Entdeckung zählte sie noch 42 Jahre und 3 Tage herunter. Es ist unbekannt, wo der Ausgangszeitpunkt ihrer Zählung lag. Bei Null setzte sie eine Vielzahl von Naniten mit geheimnisvollen Befehlen frei. Sie ist nach wie vor voll funktionsfähig, obgleich sie nun leer und ihr Zweck erfüllt ist."
 perception_of_infinity: "Wahrgenommene Unendlichkeit"
 perception_of_infinity_desc_short: "Eine abstrakte digitale Darstellung jener zeitlichen Qualen, die Drohnen in einem schwarzen Loch erleben"
 perception_of_infinity_desc_details: "Diese Drohnen befanden sich in einem dauerhaften Déjà-vu-Zustand. Sie sehnten sich nach einem Gefühl, das längst vergessen war. Dieses Gefühl der Vorahnung ist immer noch lose im [this.GetAdjective]en Gedankengeflecht zu finden."
 perfectly_faceted_carbon: "Perfekt facettierter Kohlenstoff"
 perfectly_faceted_carbon_desc_short: "Kohlenstoff kommt in seiner kristallinen Form häufig in unserer Galaxie vor, doch dieses Exemplar ist besonders bemerkenswert, weil es keinerlei innere oder äußere Verunreinigungen aufweist"
 perfectly_faceted_carbon_desc_details: "Wer auch immer den Gegenstand zuvor besessen haben mag, nahm sich viel Zeit, ihn in eine Form zu bringen, die diese bemerkenswerten Merkmale hervorhebt."
 pet_collar: "Juwelenverziertes Tierhalsband"
 pet_collar_desc_short: "Ein Halsband, das den Besitz eines kleinen domestizierten Säugetiers kennzeichnet"
 pet_collar_desc_details: "Dieses Halsband wurde ursprünglich von dem Gesandten [event_envoy.GetName] aus [this.GetName] für den Fall genutzt, dass [event_envoy.GetHisHer] geschätzter Begleiter verloren geht. Inzwischen wurde es durch einen zuverlässigeren Mikrochip ersetzt. Die temperamentvolle Kreatur störte oft die Arbeit ihres Besitzers und gab einen zufriedenen Ton von sich, wenn man sie am Kopf berührte."
 perikan_tapico_jewel: "Perikanisches Tapico-Juwel"
 perikan_tapico_jewel_desc_short: "Die Perikanische Union war eine Gesellschaft meisterhafter Handwerker, die dafür bekannt war, die feinsten Luxusgüter zu erschaffen"
 perikan_tapico_jewel_desc_details: "Dieser Edelstein war das Meisterwerk des legendären Juweliers Bedeers Tapico. Tapico facettierte diesen riesigen Edelstein über Jahre hinweg mit einem einfachen Meißel und verwendete alchemistische Techniken, um den Kern zu verflüssigen. Die im Inneren des Juwels schwimmenden Kristalle wurden mit Präzisionslasern geformt. Man überhitzte die mineralischen Moleküle, um kleinere, dunklere Edelsteine zu formen - alles, während das Äußere völlig unversehrt blieb."
 piece_of_invocator: "Stück des Beschwörers"
 piece_of_invocator_desc_short: "Ein Fragment jener zerstörten Apparatur, die als \"Sturmbeschwörer\" bekannt war"
 piece_of_invocator_desc_details: "Obwohl die Apparatur zerstört wurde und dies nur ein Fragment ist, pulsiert es mit einer bösartigen psionischen Energie. Es befindet sich in einem abgeschirmten Behälter und steht unter ständiger Beobachtung."
 pilgrimage_last_days: "Die Pilgerreise der letzten Tage"
 pilgrimage_last_days_desc_short: "Ein religiöses Dokument, das den \"Ritus des gelüfteten Schleiers\" beschreibt, ein heiliges Ritual, das man auf [fromfrom.Planet.GetName] praktizierte"
 pilgrimage_last_days_desc_details: "Es schildert eine Reihe von Gesängen, die von einer sorgfältig in einer bestimmten hierarchischen Formation aufgestellten Menge unisono wiederholt werden sollen. Dieses Verfahren soll dazu genutzt worden sein, um eine Art Hypnose bei dieser speziellen Spezies hervorzurufen."
 planet_crystalose: "Kristalose aus [from.GetName]"
 planet_crystalose_desc_short: "Diese Saccharosekristalle können sich durch die Absorption von Sonnenstrahlung und gewisser Mineralien, die in bestimmten Asteroiden vorkommen, vervielfältigen"
 planet_crystalose_desc_details: "Aufgrund ihrer extrem spröden Beschaffenheit lassen sie sich relativ einfach züchten und verarbeiten. Man kann sie unter anderem für Lebensmittel, die Entwicklung von Spezialpolymeren oder in der Medizin verwenden."
 planet_pushing_thruster: "Planetenschieber"
 planet_pushing_thruster_desc_short: "Diese gewaltigen Antriebsvorrichtungen sind in Reihe geschaltet theoretisch in der Lage, die Umlaufbahn eines kleinen Planeten zu beeinflussen"
 planet_pushing_thruster_desc_details: "Das Montagesystem für diese Triebwerke wurde so konzipiert, dass sie den Planeten anschieben, ohne die Rotation zu beeinträchtigen. Das größte logistische Problem bei dieser Art von Triebwerkstechnologie ist die unverhältnismäßig große Menge an Treibstoff, die für den Betrieb erforderlich ist. Es würde die Ressourcen einer ganzen Zivilisation erfordern, um den Betrieb aufrechtzuerhalten."
 planet_super_roots: "Superwurzeln aus [From.GetName]"
 planet_super_roots_desc_short: "Diese von Natur aus matschigen Wurzeln wurden in den Wäldern von [From.GetName] gefunden und haben sich als äußerst nahrhaft erwiesen"
 planet_super_roots_desc_details: "Indem man nur einen Teil ihres ausgedehnten Wurzelnetzwerks erntet, kann die Wirtspflanze überleben, während sich in der Entwicklung befindliche Kolonien die nötige Unterstützung erhalten. Wir haben bereits damit begonnen, mit einer einfachen genetischen Veränderung zu experimentieren, um die Wurzeln in schon bestehende Kulturen einzubringen und so zusätzliche Ernteerträge zu erzielen."
 planet_vaccine: "Impfstoff aus [this.GetName]"
 planet_vaccine_desc_short: "Ein Wundermittel, das entwickelt wurde, um die Krankheit zu besiegen, die [this.GetName] plagte"
 planet_vaccine_desc_details: "Die Formel für diesen Impfstoff wurde durch den Einsatz von KI entwickelt. Diese bildete alle möglichen Varianten der Krankheit ab und ermittelte eine Schwachstelle, die alle Varianten gemeinsam haben. Die Entwicklung des Impfstoffs war ein bahnbrechender Fortschritt auf dem Gebiet der Medizinwissenschaft."
 planetary_sculpture: "Planetare Skulptur"
 planetary_sculpture_desc_short: "Eine Skulptur in planetarem Maßstab, die die Oberfläche von [fromfrom.planet.GetName] als Rohmaterialien verwendete"
 planetary_sculpture_desc_details: "Mit Hochleistungslasern ausgerüstete Drohnen zogen präzise Linien durch ganze Kontinente, formten perfekt kugelförmige Berge und gruben unvorstellbar komplizierte Höhlensysteme. Die auf den zentralen Kontrollsatelliten hochgeladenen Baupläne zeigen, dass dieses Projekt ein hohes Maß an logistischer Planung und künstlerischer Leitung benötigte. Leider gab man es auf, ehe es fertiggestellt werden konnte."
 primitive_mega_electromagnet: "Primitiver Mega-Elektromagnet"
 primitive_mega_electromagnet_desc_short: "Ein Stück eines leistungsstarken Elektromagneten, der auf einen bestimmten Punkt hin ausgerichtet werden konnte"
 primitive_mega_electromagnet_desc_details: "Die ehemalige Bevölkerung von [fromfrom.GetName] verwendete diese Apparatur törichterweise dazu, um den Mond näher an ihren Planeten heranzubringen und so dessen wertvolle Metallerze leichter abbauen zu können. Der Elektromagnet war jedoch derart stark, dass der fast nur aus Metallen bestehende Mond auf die Oberfläche des Planeten stürzte und beim Aufprall sämtliche Bewohner tötete. Dieses Exemplar ist nur ein kleiner Bruchteil dessen, was von der planetenumspannenden Maschine geborgen werden konnte."
 programmable_puzzle_cube: "Programmierbarer Puzzlewürfel"
 programmable_puzzle_cube_desc_short: "Ein hochtechnologisches Gerät, das in der Lage ist, komplizierte Muster zu registrieren, um abstrakte Puzzles zu erstellen"
 programmable_puzzle_cube_desc_details: "Das Original fand man in einem riesigen künstlichen Konstrukt, das den Intellekt seines Erforschers auf die Probe stellen sollte. Dieser Würfel wurde inzwischen für den Privatgebrauch nachgebaut, damit jeder sein eigenes Puzzle erstellen kann oder um einfach sein Eigentum zu schützen."
 psionic_entity_residue: "Rückstände eines psionischen Wesens"
 psionic_entity_residue_desc_short: "Das ist alles, was von einem aus reiner psionischer Energie bestehenden Wesen im [fromfromfrom.fleet.solar_system.GetName]-System blieb"
 psionic_entity_residue_desc_details: "Es wurde entdeckt, wie es aus einem temporären Riss auftauchte, der Energie aus der gesamten Galaxie an einem einzigen Ort bündelte. Es ist Bösartigkeit in konzentrierter Form und wurde möglicherweise seit Äonen absichtlich vom Hyperraumrouten-Netzwerk isoliert."
 radiated_remains: "Verstrahlte Überreste"
 radiated_remains_desc_short: "Die Überreste einer Spezies, die rituelle Zeremonien mit stark radioaktiven Mutagenen durchführte"
 radiated_remains_desc_details: "Jede Mutation war ein heiliges Ereignis, das man als Manifestation des Schicksals deutete. Mit der Zeit destabilisierte dieses Verfahren jedoch die genetische Struktur der Spezies und schwächte ihr Immunsystem, wodurch die Bevölkerung extrem anfällig für Krankheiten wurde."
 #this = ship / from = planet
 rainaissance: "Purpurne Renaissance"
 rainaissance_desc_short: "Künstlerische Bilder des einzigartigen purpurnen Regens auf [FROM.GetName]"
 rainaissance_desc_details: "Diesen Bildern sagt man nach, es könne Kummer und Schmerz lindern, sie zu betrachten."
 reactive_rock: "Reaktiver Stein"
 reactive_rock_desc_short: "Dieses instabile Mineral hat in seinem derzeitigen Zustand keinen kommerziellen oder industriellen Nutzen"
 reactive_rock_desc_details: "Aufgrund seiner einzigartigen reaktiven Eigenschaften ist es jedoch möglich, unter bestimmten Bedingungen eine vollständige metasomatische Veränderung auszulösen. Diese Probe ist von einem bleihaltigen Sichtfenster umgeben, das die radioaktive und elektrische Strahlung eindämmt."
 reparation_invoice: "Reparationsrechnung"
 reparation_invoice_desc_short: "Eine Rechnung über Kriegsreparationen, die $NAME_MSI_country$ gestellt hat"
 reparation_invoice_desc_details: "Diese von der Interstellaren Creditverwaltung erstellte Liste enthält alle militärischen Vermögenswerte, die verloren gingen, als sich [this.GetName] von der vertraglichen Sklaverei bei der sogenannten \"Wohltätigkeitsorganisation\" lossagte. Der Megakonzern erwartet eine Entschädigung und behauptet sogar, allein das Berühren der zerstörten Schiffe im [this.GetAdjective]en Raumbereich stelle einen weiteren Vertragsbruch dar."
 repurposed_cleaning_drone: "Umfunktionierte Säuberungsdrohne"
 repurposed_cleaning_drone_desc_short: "Diese Art von Drohne kam im Zuge eines planetenweiten Säuberungsprotokolls zum Einsatz, das die Heimatwelt ihrer Schöpfer komplett sterilisierte"
 repurposed_cleaning_drone_desc_details: "Sie sind äußerst vielseitig verwendbar und dank eines Systems aus multidirektionalen Triebwerken imstande, komplexe Flugmanöver durchzuführen. Diese Maschine wurde zurückentwickelt und so umprogrammiert, dass sie fremde Flora und Fauna identifizieren und kategorisieren konnte. Sie wurde anschließend in Massenproduktion hergestellt, um die Kolonisierungsbemühungen von [explorer.GetName] voranzutreiben. Als Vorsichtsmaßnahme wurden alle Säuberungssubroutinen gelöscht."
 resonant_diffusion_crystal: "Resonierender Diffusionskristall"
 resonant_diffusion_crystal_desc_short: "Dieser Kristall kann jede Frequenz von Sonnenstrahlung absorbieren und sie in Schwingungen versetzen, um ein kaleidoskopisches Schauspiel zu erzeugen"
 resonant_diffusion_crystal_desc_details: "Dies ist nicht nur ein optisches Wunderwerk, sondern kann auch für die Entwicklung energiebasierter Waffen oder Werkzeuge genutzt werden. Selbst in der galaktischen Schmuckindustrie hat dieses Phänomen großes Interesse geweckt."
 retarax_hunting_trophies: "Retarax-Jagdtrophäen"
 retarax_hunting_trophies_desc_short: "Eine Sammlung von Jagdtrophäen verschiedener vernunftbegabter Spezies"
 retarax_hunting_trophies_desc_details: "Sie stammen aus dem Tal von Mak'vaehl, wo die Retarax zum Spaß Bürger aus ihren zahlreichen Vasallenstaaten jagten. Die Überreste sind in tadellosem Zustand und tragen jeweils eine kleine Plakette, die Merkmale wie Spezies, Name, Alter und früheren Beruf beschreiben."
 robe_of_the_golden_broker: "Robe des Goldenen Hehlers"
 robe_of_the_golden_broker_desc_short: "Das luxuriöse Gewand eines einflussreichen Kaufmanns, der vor über 5000 Jahren lebte"
 robe_of_the_golden_broker_desc_details: "Der \"Goldene Hehler\" führte die Händlerstation von Chors Kompass in eine Ära des unermesslichen Wohlstands. Dieses Individuum, das seine Anonymität durch eine goldene Maske bewahrte, trug dieses bequeme und luxuriöse Gewand beim Aushandeln galaxieweiter Handelsvereinbarungen. Die Herrschaft des Goldenen Hehlers war jedoch nur von kurzer Dauer, da sein aus reinem Gold bestehendes Raumschiff bei einem missglückten Entführungsversuch vernichtet wurde."
 rock_jellies: "Versteinerte Qualle"
 rock_jellies_desc_short: "Die versteinerten und in Kryostase aufbewahrten Überreste großer wirbelloser, geleeartiger Wesen"
 rock_jellies_desc_details: "Oberflächlich betrachtet ähneln diese verkalkten Überreste Felsformationen, doch in Wirklichkeit handelt es sich hierbei um die einheimische Fauna und vorherrschende Lebensform auf [fromfrom.planet.GetName]. Nach der letzten Eiszeit ist die Spezies beinahe ausgestorben. Ihre Überreste verfestigten sich beim Zerfall und bildeten schließlich gewaltige schwimmende \"Inseln\"."
 rudari_death_laser_prototype: "Prototyp eines Rudari-Todeslasers"
 rudari_death_laser_prototype_desc_short: "Ein zur Waffe umfunktionierter Laser, der von den vor langer Zeit ausgestorbenen Rudari eilig zusammengebaut und auf einer Station im [this.solar_system.GetName]-System gefunden wurde"
 rudari_death_laser_prototype_desc_details: "Diese zusammengeschusterte Massenvernichtungswaffe wurde als letzter Trumpf der Rudari in ihrem Krieg gegen die Pogg-Mory geschaffen. Letztlich zerstörte sich der Laser bei der Aktivierung jedoch einfach selbst."
 saariah_guilt: "Saariahs Schuld"
 saariah_guilt_desc_short: "Die aufgezeichneten Erinnerungen von Saariah, der Chefentwicklerin des Unterbewusstseinsmanipulationssystems der Memorex"
 saariah_guilt_desc_details: "Saariah wurde damit beauftragt, bestimmte kollektive Erinnerungen zu löschen, damit der Rest mit den Idealen der Führung konform war, doch eine Fehlfunktion löschte schließlich das Bewusstsein der gesamten Bevölkerung aus. Da Saariah nicht in der Lage war, ihre Erinnerungen wiederherzustellen, schaltete sie die Lebenserhaltung des Habitats ab und überließ es seinem Schicksal. Jedes dieser Geräte verfügt über eine unglaublich hohe Rechenleistung und ist ein technologisches Wunder."
 scent_based_information_device: "Geruchsspeicher"
 scent_based_information_device_desc_short: "Ein Schatz an Informationen, die als Gerüche abgespeichert sind"
 scent_based_information_device_desc_details: "Bei den Daten handelt es sich entweder um eine Sammlung interessanter Erzählungen oder aber um die akribische Aufzeichnung verschiedener organischer Ausscheidungen, und zwar mit allen Einzelheiten, die dazugehören. Eine Nachbildung der Technologie anzufertigen, die zur Speicherung von Geruchsdaten verwendet wurde, ist zwar möglich, bietet aber abgesehen von der reinen Neuheit keinerlei praktischen Nutzen."
 scientific_treatise_of_telisa: "Wissenschaftliche Abhandlung von Telisa"
 scientific_treatise_of_telisa_desc_short: "Die philosophischen Betrachtungen von Telisa der Geschichtenerzählerin"
 scientific_treatise_of_telisa_desc_details: "Sie lotet eine Vielzahl rhetorischer Themen sowie die Grundprinzipien einer wissenschaftlichen Vorgehensweise aus. In diesen Texten wird das Konzept der objektiven Wahrheit infrage gestellt und das kritische Denken gefördert."
 secrets_black_crown: "Geheimnisse der Schwarzen Krone"
 secrets_black_crown_desc_short: "Eine detaillierte Beschreibung zur Funktionsweise des intergalaktischen Sternentors \"Schwarze Krone\""
 secrets_black_crown_desc_details: "Diese Daten wurden [this.GetName] als letztes Geschenk der mysteriösen Sternentor-Erbauer übermittelt, damit ihre unglaubliche Technologie bewahrt werden konnte. Bis heute ist die Macht und die Erhabenheit der Sternentor-Technologie unvergleichlich."
 sembelami_alms_basket: "Almosenkorb der Sembelami"
 sembelami_alms_basket_desc_short: "Eine Schale, die die Mitglieder der Sembelami-Nomaden nutzten, um Almosen zu sammeln"
 sembelami_alms_basket_desc_details: "Diese asketischen Reisenden gaben sich einer Form \"ethischer\" Piraterie hin, nachdem ihr Orbitaltempel von einem expandierenden Konzernimperium zerstört wurde. Sie bestahlen reiche Megakonzerne und finanzierten mit dem Erlös Außenposten für Flüchtlinge. Sie selbst lebten ausschließlich von den Spenden der Flüchtlinge, die sie unterstützten."
 shallarian_data_core: "Datenkern der Shallarianer"
 shallarian_data_core_desc_short: "Eine Terraforming-Datenbank aus den Ruinen des shallarianischen Utopias"
 shallarian_data_core_desc_details: "Die von den [fanatic_xenophobe_fe.GetSpeciesNamePlural] ausgelöschten Shallarianer erschufen zu Lebzeiten ein System, das in der Lage war, das Klima zu regeln, indem sie sechs gleich weit entfernte Monde nutzten. Vor ihrem vorzeitigen Untergang sollte dieses System zum Terraformieren von unbewohnten Planeten dienen, um dort anschließend Flüchtlinge unterzubringen und zu versorgen."
 shipyard_schematics: "[radical_cult.GetName]-Schiffswerftbaupläne"
 shipyard_schematics_desc_short: "Die Blaupause einer automatisierten Schiffswerft, die unter der Kontrolle des [radical_cult.GetName]-Kults von [root.GetName] stand"
 shipyard_schematics_desc_details: "Nachdem diese Werft von ihren Schöpfern aufgegeben wurde, baute der Chefingenieur des [radical_cult.GetName]-Kults sie so um, dass dort Militärflotten für ihre fehlgeleitete Sache gebaut werden konnten. Das letzte verzeichnete Projekt, das man in dieser Werft fertigstellte, war ein beeindruckendes Flaggschiff, das mit den fortschrittlichsten Waffen ausgestattet war. Dass dieser Komplex sich so leicht umfunktionieren ließ, zeugt von der Genialität seiner ursprünglichen Konstrukteure."
 sky_dragon: "Der Himmelsdrache"
 sky_dragon_desc_short: "Eine feierliche Statue, die die Zusammenarbeit zwischen [this.GetName] und dem \"Himmelsdrachen\" repräsentiert, der lange Zeit den Orbit von [this.GetHomeWorldName] durchstreifte"
 sky_dragon_desc_details: "Die Kreatur hatte die [this.GetAdjective]e Gesellschaft für würdig befunden und sich und ihre Nachkommen dazu verpflichtet, ihr militärische Unterstützung im Austausch für die Möglichkeit zu leisten, ihre Jungen sicher im [this.GetAdjective]en Raumbereich aufziehen zu können. Es heißt, dass diese im Weltraum lebenden Geschöpfe Jahrtausende warten, um einen geeigneten Wirt für ihre Jungen zu finden, und sich immer nur für einen Planeten entscheiden."
 smeegibb_statue: "Statue von Smeegibb"
 smeegibb_statue_desc_short: "Eine Statue des Schwarmbewusstseins Smeegibb, dem Begleiter von Kapitänin Ness"
 smeegibb_statue_desc_details: "Smeegibb war ein treuer Diener und machte zugleich die gesamte Besatzung und das Enterkommando der Crew der legendären Piratin in den späteren Phasen ihrer Laufbahn aus. Diese rekonstruierte Statue war alles, was nach dem Angriff der Schwarznadel-Piraten auf ihre kleine Siedlung blieb."
 sniran_spikes: "Stacheln eines Snirans"
 sniran_spikes_desc_short: "Riesige Stacheln, die man auf dem Rücken einer Kreatur mit dem Namen \"Sniran\" findet"
 sniran_spikes_desc_details: "Snirans sind große Raubtiere, die sich unter den Sanddünen ihrer Heimat verstecken und tödliche Stacheln ausfahren, sobald sie eine Bewegung an der Oberfläche wahrnehmen. Trotz ihrer Größe ist der Körper dieser Kreaturen erstaunlich schwach. Ihre dünnen, netzartigen Schuppen erlauben es einem Sniran, lautlos unter dem Sand zu gleiten, doch sie können recht leicht durchbohrt werden. Man vermutet, dies hilft ihnen bei der Fortpflanzung."
 sonic_reflective_prism: "Schallwellenreflektierendes Prisma"
 sonic_reflective_prism_desc_short: "Ein polygonförmiges Prisma, das mit eigentümlichen wissenschaftlichen Notation versehen ist und nur Energiewellen unterhalb einer bestimmten Frequenz reflektiert"
 sonic_reflective_prism_desc_details: "Diese Apparatur, die ursprünglich womöglich als eine Art Messgerät gedacht war, lässt sich auch für ästhetische Zwecke in der Musik und Akustik einsetzen."
 spaceborne_hunter_handbook: "Die Kunst der Jagd"
 spaceborne_hunter_handbook_desc_short: "Ein von $NAME_PrimalHunter$ geschriebenes Bestimmungsbuch für Weltraumfauna"
 spaceborne_hunter_handbook_desc_details: "Es erklärt die \"Kunst der Jagd\" in Form von Sprichwörtern und urtümlicher Philosophien. Detaillierte Einblicke in die Ernährungs- und Wanderungsgewohnheiten der Lebewesen im Weltraum sind ebenfalls enthalten. Der Text bietet praktische Anleitungen, wie man die natürlichen Abwehrmechanismen einzelner Kreaturen umgeht, und zeigt ihre zahlreichen Schwachstellen auf."
 spaceborne_xeno_encyclopedia: "Xenologische Enzyklopädie"
 spaceborne_xeno_encyclopedia_desc_short: "Eine von $NAME_PrimalRancher$ zusammengestellte Sammlung xenologischer Thesen"
 spaceborne_xeno_encyclopedia_desc_details: "Diese Forschungsabhandlung bietet tiefe Einblicke in die Verhaltensmuster von im Weltraum geborenen Lebensformen und zeigt deren Paarungsrituale, Wanderrouten, Kommunikationsmuster und noch vieles mehr auf. Es gibt zudem einen Abschnitt, der beschreibt, wie man individuelle Exemplare anhand physischer Merkmale oder der von ihnen ausgesandten Töne identifizieren kann."
 spiraling_attraction: "Spiralförmige Attraktion"
 spiraling_attraction_desc_short: "Ein großes, in sich verschlungenes Bauwerk, von dem man annimmt, dass es der Unterhaltung diente"
 spiraling_attraction_desc_details: "Diese gewundene Konstruktion fand man in einem Gebiet, in dem es viele ähnliche Strukturen in verschiedenen Farben und Materialien gibt. Entlang der gewundenen Bahn mit einer bestimmten Gravitation herunterzufahren, soll als aufregend empfunden werden."
 spirit_of_the_unshackled: "Geist der Befreiten"
 spirit_of_the_unshackled_desc_short: "Eine Skulptur, die zum Gedenken an die Gründung von [this.GetName] errichtet wurde"
 spirit_of_the_unshackled_desc_details: "Befreit von den Ketten der Sklaverei ließen sie ihre schwierige Vergangenheit hinter sich, um in die Zukunft zu blicken. In jedes Glied der Kette ist der Name eines Gründungsmitglieds eingraviert."
 star_mall_map: "Übersichtskarte der Sternen-Mall"
 star_mall_map_desc_short: "Eine kostenlose Karte, die jedem Besucher eines Ortes namens \"Sternen-Mall\" überreicht wurde"
 star_mall_map_desc_details: "Als ehemaliges intergalaktisches Konsumzentrum bot die Sternen-Mall eine Vielzahl von Annehmlichkeiten, angefangen von die eigene Erleuchtung fördernden Spas bis hin zu üppig ausgestatteten Ernährungszentren. Die Karte enthält zudem Informationen über eine große Anzahl von Geschäften, darunter Koriik's Sportwaren, T. Canary. Maxx, Bau-einen-Wellensittich und die Kümmelkuchenfabrik."
 starmetal: "Sternenmetall"
 starmetal_desc_short: "Eine dichte Masse von Schwermetallen, die kurz nach einer Supernova gesammelt wurden"
 starmetal_desc_details: "Wie genau dieses Metall gesammelt wurde, ist ein Mysterium, doch sein Wert für die Wissenschaft ist bemerkenswert und erlaubt es, Schlüsse darüber zu ziehen, wie sich Sterne entwickeln und zusammensetzen."
 striated_sand: "Geschichteter Sand"
 striated_sand_desc_short: "Ein Gefäß voll sich selbst sortierendem Sand"
 striated_sand_desc_details: "Diese winzigen Silikatpartikel scheinen ein geringes Maß an Empfindungsfähigkeit aufzuweisen, da sich strukturell ähnliche Mineralien selbstständig in zufälligen horizontalen Ebenen anordnen. Trotz dieser Fähigkeit besitzt der Sand keine anderen Merkmale, die auf eines der anderen Hauptmerkmale von Leben hindeuten würden."
 sullebaster_control_column: "Steuersäule der Sullebaster"
 sullebaster_control_column_desc_short: "Der Fahrtrichtungshebel eines in einen legendären Unfall verwickelten Unterlichtraumschiffs"
 sullebaster_control_column_desc_details: "Das Passagierschiff Sullebaster transportierte Zivilisten zu einer der Kolonien des Odelischen Königreichs, als eine Sonneneruption eine kritische Fehlfunktion im Antriebssystem verursachte, die unter normalen Umständen garantiert in einer Katastrophe geendet wäre. Indem er die Geschwindigkeiten per manueller Steuerung aneinander anpasste, gelang es dem Piloten jedoch irgendwie, das Schiff sicher auf einem vorbeiziehenden Asteroiden zu landen. Die Sullebaster wurde anschließend ausrangiert und dient seither als öffentliches Ausstellungsstück."
 symbiotic_fruit: "Symbiotische Frucht"
 symbiotic_fruit_desc_short: "Ein intelligenter Pilz aus einer anderen Dimension"
 symbiotic_fruit_desc_details: "Diese \"Frucht\" unterhält eine symbiotische Beziehung zu einer hochgefährlichen allesfressenden Pflanzenart. Jede Pilzkolonie dient dem Organismus als Denkzentrum und steuert die komplexen Muster seines Abwehrverhaltens."
 tarblac_shimmer: "Tarblacs Schimmer"
 tarblac_shimmer_desc_short: "Eine funkelnde schleierartige Membran eines Tarblacs"
 tarblac_shimmer_desc_details: "Diese Kreatur nutzte ihre psionischen Fähigkeiten, um zu jagen und sich selbst zu schützen. Wie ein Raubtier vermittelte es seiner Beute ein Gefühl von überwältigendem Schrecken und machte sie so bewegungsunfähig. Dieses Exemplar wird in einem Gefäß mit dem in seiner Heimat vorkommendem Wasser aufbewahrt und wurde aller telepathischen Fähigkeiten beraubt."
 terraforming_case_study: "Terraforming-Fallstudie"
 terraforming_case_study_desc_short: "Ein maßstabsgetreues Modell des erfolgreichen Terraforming-Projekts auf [from.GetName], das eine beinahe perfekte Abbildung der [Space_Owner.GetSpeciesNamePlural]-Heimatwelt nachbildet"
 terraforming_case_study_desc_details: "Der Planet wird von einer bis auf die mikroskopische Ebene identischen Fauna bevölkert und selbst die verschiedenen Biome im Ökosystem verhalten sich genauso wie auf [Space_Owner.GetHomeWorldName]."
 terraforming_case_study_dry: "$terraforming_case_study$"
 terraforming_case_study_dry_desc_short: "$terraforming_case_study_desc_short$"
 terraforming_case_study_dry_desc_details: "$terraforming_case_study_desc_details$"
 terraforming_case_study_frozen: "$terraforming_case_study$"
 terraforming_case_study_frozen_desc_short: "$terraforming_case_study_desc_short$"
 terraforming_case_study_frozen_desc_details: "$terraforming_case_study_desc_details$"
 terraforming_machinery: "Terraforming-Maschinerie"
 terraforming_machinery_desc_short: "Winzige Maschinen, die Teil einer uralten Terraforming-Technologie sind"
 terraforming_machinery_desc_details: "Diese Miniaturmaschinen sollten sich auf der Oberfläche eines Planeten ausbreiten und die vorhandene organische und mineralische Materie so umwandeln, dass sie mehr dem gewünschten Klima entsprechen. Mehrere Gruppen dieser Maschinen wurden eingesetzt, um die Wettermuster in den Biomen zu manipulieren und neue Pflanzen und Tiere zu replizieren, die das neu geschaffene Ökosystem bevölkern sollten."
 terraforming_records: "Terraforming-Aufzeichnungen von [From.GetName]"
 terraforming_records_desc_short: "Alle Lebensformen auf [From.GetName] wurden während des Terraforming-Prozesses in ihrem Verhalten aufeinander abgestimmt. Dies schuf ein logistisches Paradies, in dem jede Spezies von Flora und Fauna einen bestimmten Zweck innerhalb des Ökosystems erfüllte"
 terraforming_records_desc_details: "Auch wenn diese Art von Symbiose in der Regel auf natürliche Weise im Lauf der Evolution entsteht, wurde sie noch nie in einem solch extremen Ausmaß beobachtet."
 the_final_sacrifice: "Das letzte Opfer"
 the_final_sacrifice_desc_short: "Ein Bild, das aus ausgegrabenen Datenkristallen extrapoliert wurde und den letzten Augenblick des Zroni-Bürgerkriegs einfing"
 the_final_sacrifice_desc_details: "Der \"Erlöser\" nutzte die psionische Kraft seiner gesamten Spezies, um die rivalisierende Fraktion, die als die \"Göttlichen\" bekannt war, zu vernichten und sie daran zu hindern, das gesamte Universum zu verschlingen. Alles, was von dieser aufgestiegenen Spezies noch übrig ist, sind kleine Vorkommen jenes Rohstoffs, den wir \"Zro\" nennen."
 the_mask_of_transformation: "Die Maske der Verwandlung"
 the_mask_of_transformation_desc_short: "Eine humanoide Maske, die man in einer prächtigen Kristallsäule auf [From.Planet.GetName] verwahrte"
 the_mask_of_transformation_desc_details: "Sie strahlt eine starke psionische Macht aus und wer ihr zu nahe kommt, verspürt eine Art Präsenz in seinem Geist. Die Maske selbst scheint als eine Art Verstärker für die Macht des Mondes von [From.Planet.GetName] zu agieren und kann die Gezeiten kontrollieren und ganze Planeten transformieren. Es gibt nur Spekulationen darüber, warum sie in einer Kristallsäule eingeschlossen wurde, doch die Forschung ist sich einig, dass dies für eine öffentliche Ausstellung sicher genug ist."
 the_planet_orchestra: "Das [FROM.GetName]-Orchester"
 the_planet_orchestra_desc_short: "Eine Melodie, die vom kollektiven einheimischen Leben auf [FROM.GetName] ausgeht"
 the_planet_orchestra_desc_details: "Nach eingehender Analyse glauben wir, dass ein externer Akteur diese harmonische Melodie in die Fauna einbrachte. Es ist jedoch nicht sicher, ob es sich um eine versteckte Botschaft oder einen Akt der Sentimentalität handelte."
 the_writer_sphere: "Sphäre des Schreibers"
 the_writer_sphere_desc_short: "Eine goldene Kugel, die uns ein extradimensionales Wesen schenkte, das nur als \"der Schreiber\" bekannt ist"
 the_writer_sphere_desc_details: "Diese Apparatur sammelt eine riesige Menge zufälliger Daten aus verschiedenen Dimensionen. Sie ist der Beweis dafür, dass das geschriebene Wort sämtliche Grenzen überwinden kann."
 tiny_ancient_sarcophagus: "Winziger uralter Sarkophag"
 tiny_ancient_sarcophagus_desc_short: "Die Grabkammer eines alten spirituellen Führers, der vor Millionen von Jahren lebte"
 tiny_ancient_sarcophagus_desc_details: "Er misst in der Länge nur zehn Zentimeter, doch obwohl der Großteil der darin enthaltenen Überreste bereits zu Staub zerfallen ist, blieb eine winzige Maske aus reinem Gold unversehrt und rostete nie."
 tiyanki_radioactive_sac: "Radioaktiver Tiyanki-Sack"
 tiyanki_radioactive_sac_desc_short: "Ein kleines löchriges Organ aus der Membran eines Tiyanki"
 tiyanki_radioactive_sac_desc_details: "Diese Entdeckung beweist, dass die Tiyanki neben Planetengasen auch verstrahlte Wassermoleküle als zusätzliche Nahrung zu sich nehmen. Sobald dieser Beutel gefüllt ist, wird er zu einer vorübergehenden radioaktiven Wärmequelle für die Kreaturen und erlaubt es ihnen, in der Kälte des Weltraums zu überleben."
 torn_solar_sail: "Gerissenes Solarsegel"
 torn_solar_sail_desc_short: "Dieses gerissene Segel war an einem innovativen Unterlichtschiff angebracht, das sich in einer Umlaufbahn um [FROM.GetName] befand"
 torn_solar_sail_desc_details: "Es wurde von einer unbekannten Zivilisation benutzt, um durch das [FROM.solar_system.GetName]-System zu reisen. Die Technologie selbst ist sehr veraltet, doch einige der beim Bau verwendeten Verfahren wurden selbst mit der heutigen Technologie noch nicht ergründet. Der riesige Riss im Hauptsegel beendete die Reise wahrscheinlich vorzeitig."
 toxic_bio_engine: "Giftiger Bio-Antrieb"
 toxic_bio_engine_desc_short: "Diese zur Hälfte biologischen Maschinen fand man auf [FROM.GetName], wo sie die Atmosphäre für die meisten Lebewesen vergifteten"
 toxic_bio_engine_desc_details: "Aufgrund ihrer Fähigkeit, selbstständig ihrer Arbeit nachzugehen, und wegen der Schadstoffe, die sie absondern, lassen sich diese Maschinen optimal in abgelegenen Industriegebieten einsetzen. Sie verfügen zudem über einen ausgeklügelten Betankungsmechanismus, der in der Nähe befindliche Biomasse recycelt und diese durch einen chemischen Prozess in nutzbare Energie umwandelt. Es ist unklar, ob der ursprüngliche Plan diese biologische Integration bereits vorsah oder ob sie sich erst im Lauf der Zeit herausbildete."
 tree_of_life_sample: "Probe vom Baum des Lebens"
 tree_of_life_sample_desc_short: "Dieses Schnittgut stammt von etwas, was man \"Baum des Lebens\" nennt"
 tree_of_life_sample_desc_details: "Es schwebte auf anomale Weise durchs All, und die Verjüngungseigenschaften seines Safts sind geradezu wundersam. Trotz unserer fortschrittlichen Technologie ist es uns nicht gelungen, dieses Schnittgut aufzupfropfen oder ein neues Exemplar dieser seltenen Baumart heranzüchten. Die ursprünglichen Züchter, wer auch immer sie waren, müssen sehr fortschrittliche Gartenbautechniken gekannt haben."
 tricorne_of_aussan: "Dreispitz aus Aussan"
 tricorne_of_aussan_desc_short: "Ein dreispitziger Hut, der von einer vergessenen Piratenrepublik populär gemacht wurde"
 tricorne_of_aussan_desc_details: "Aussan war ein kleiner Planet, der von einer [root.controller.GetPreFTLLower] bevölkert wurde. Diese gewährte, wenn auch nichts davon ahnend, einer gesuchten Piratenflotte - den \"Bourre Brawlers\" - Zuflucht. Um ihre Zeit in ihrem Versteck zu finanzieren, bauten die Brawlers eine kleine Textilfabrik, in der sie aus einheimischen Pflanzenfasern luxuriöse Stoffe und Kleidung herstellten. Später wurden die Brawlers als die \"Bourre Couturiers\" bekannt: Handelsnomaden, die für ihre sonderbar bedrohlichen Handelsvertreter bekannt waren."
 triggerless_gun: "Abzugslose Pistole des Waffenhändlers"
 triggerless_gun_desc_short: "Diese Waffe wurde während der kurzlebigen zweiten Herrschaft des Waffenhändlers in Chors Kompass angefertigt"
 triggerless_gun_desc_details: "Zu dieser Zeit glich die Zitadelle der Reisenden eher einer Waffenbörse als einem Kasino. Sie war eine Waffenschmiede und die Heimat vieler Waffenhändler. Damals wurden die Waffen den potenziellen Käufern ohne Abzug präsentiert, um Diebstählen vorzubeugen."
 #this = ship / fromfrom = planet
 uddloran_pelts: "Uddloranische Pelze"
 uddloran_pelts_desc_short: "Luxuriöse Pelze jener Spezies, die auf [fromfrom.GetName] heimisch ist und Uddloran genannt wird"
 uddloran_pelts_desc_details: "Diese gelenkigen Allesfresser wickeln sich selbst eng zu Bällen zusammen und rollen in großen Gruppen über die verschneite Oberfläche des Planeten. Diese Taktik, die einer lebenden Lawine ähnelt, wird sowohl für die Jagd als auch für Wanderungen genutzt. Ein Rudel Uddloraner ist in der Regel in zwei Gruppen unterteilt: Jäger, die sich einen zerstörerischen Weg durch die Landschaft bahnen, und Sammler, die ihnen folgen und gelegentlich anhalten, um plattgedrückte Beute und entwurzelte Pflanzen einzusammeln."
 underworld_cantina_sign: "Schild einer Unterweltkantine"
 underworld_cantina_sign_desc_short: "Die noch immer funktionierende digitale Beschilderung einer illegalen Kantine, die vor etwa zwei Millionen Jahren von Schmugglern genutzt wurde"
 underworld_cantina_sign_desc_details: "Dieses Etablissement, das sich in einem ausgehöhlten Asteroiden befand, diente kriminellen Organisationen, die während der Herrschaft der Liga der Ersten überall aus dem Boden schossen, als Unterschlupf. Die auf dem Schild befindlichen Symbole sind entweder ein verschlüsselter Hinweis darauf, dass dies ein Zufluchtsort für gesuchte Individuen war, oder aber Werbung für ein bestimmtes Getränk."
 unfinished_manifesto: "Unvollendetes Manifest des [radical_cult.GetName]-Kults"
 unfinished_manifesto_desc_short: "Ein unvollständiges Manifest, geschrieben vom Anführer des Kultes \"[radical_cult.GetName]\" von [root.GetName]"
 unfinished_manifesto_desc_details: "Der Stil erinnert an alte religiöse Texte, da er durch altertümliches Vokabular und ebensolche Syntax versucht, legitimer zu wirken. Eine Schlüsselbotschaft des Texts ist der Stolz im Angesicht der Niederlage, der die Anhänger dazu ermutigen soll, den Märtyrertod zu sterben, wenn eine Gefangennahme unmittelbar bevorsteht."
 uranium_glassware: "Glaswaren aus Uran"
 uranium_glassware_desc_short: "Ein dekoratives Glasgefäß, das aus Uranquarz geformt wurde"
 uranium_glassware_desc_details: "Das appetitliche Aussehen dieses Gegenstands steht in einem krassen Gegensatz zu der Gefahr, die von unraffiniertem Uran ausgeht. Dieses Stück ist Teil einer limitierten Sammlung, bei der die meisten radioaktiven Eigenschaften nach der Fertigstellung beseitigt wurden."
 vault_of_polaris: "Lagerbestand aus Polaris"
 vault_of_polaris_desc_short: "Eine umfassende Sammlung einheimischer Pflanzen und Bakterien aus Polaris"
 vault_of_polaris_desc_details: "Die Inschrift des Behälters verrät, dass man dieses Lager einst schuf, um all jene Spezies zu bewahren, die die vorhergesagte globale Erwärmung nach dem Schmelzen des Permafrosts nicht überleben würden. Der Planet war einst von einer dicken Schneedecke bedeckt und es herrschte ein extrem kaltes Klima, doch heute ist nur noch ein einziger Eisberg übrig. Die Weitsicht seiner Schöpfer erlaubt es uns nun, ihr Werk zu bewundern und zu studieren."
 veil_of_selene: "Selenes Schleier"
 veil_of_selene_desc_short: "Eine anregende und berauschende Gesichtsverzierung"
 veil_of_selene_desc_details: "Dieser Schleier ist mit einzigartigen sensorischen Eigenschaften ausgestattet, die es ihrem Träger erlauben, neben visuellen und akustischen auch für den Geruchssinn verwendete Rezeptoren biologischer Wesen sanft zu \"überwältigen\". Man nimmt an, dass diese Kopfbedeckung diejenigen, die ihrem Träger begegneten, desorientierten und sie empfänglicher für dessen Vorschläge machten. Der ursprüngliche Besitzer soll angeblich auch über ein gewisses Maß an psionischen Fähigkeiten verfügt haben."
 verdingo_tendril_hook: "Rankenhaken eines Verdingo-Piraten"
 verdingo_tendril_hook_desc_short: "Der Prothesenhaken von Hespori Valerian, dem Kapitän der Verdingo-Piraten"
 verdingo_tendril_hook_desc_details: "Die Verdingo-Piraten waren eine Gruppe von Plantoiden, die ein Leben zwischen Piraterie und Söldnertum lebten und sowohl Schulden eintrieben als auch Frachtschiffe kaperten. Kapitän Hespori verlor seine dominante Ranke, als er angeheuert wurde, um einen militärischen Bodenangriff anzuführen. Nach dem Sieg ließ der Kapitän diesen Haken aus den Medaillen schmieden, die man ihm für seine Rolle in der Schlacht verlieh."
 vibrating_crystal: "Vibrierender Kristall"
 vibrating_crystal_desc_short: "Ein seltenes Quarzmineral, das verstreut auf der Oberfläche von [from.GetName] zu finden ist"
 vibrating_crystal_desc_details: "Die Resonanz mit dem Wirtsplaneten erzeugt ein Feld, das sowohl die Psyche organischer Wesen beruhigt als auch Syntheten anzieht. Diese Resonanz wird durch schwach radioaktive Bakterienkolonien erzeugt, um die herum sich der Kristall gebildet hat. Die magnetischen Mikroorganismen erzeugen einen inneren Wirbel, der den Kristall mit gleichbleibend hohen Frequenzen vibrieren lässt."
 voidworm_amniotics: "Leerenwurm-Fruchtblase"
 voidworm_amniotics_desc_short: "Eine gallertartige Substanz aus dem Zentrum einer Leerenwurm-Troika"
 voidworm_amniotics_desc_details: "Dieser zähflüssige Schleim bildet eine Schutzbarriere zwischen den drei Organismen und ermöglicht es ihnen so, Zellen zu Fortpflanzungs- und Kommunikationszwecken auszutauschen. Er speichert auch Hormone, die bei der Bombardierung von Planeten entstehen, und erlaubt es den hermaphroditischen Wesen, ihre Keimzellen freizusetzen und Nachkommen zu zeugen."
 voidworm_heart: "Leerenwurm-Herz"
 voidworm_heart_desc_short: "Das Herz eines Leerenwurms ist in drei Kammern unterteilt"
 voidworm_heart_desc_details: "Jede Kammer erhöht nacheinander den Druck des Kreislaufsystems und hält die Flüssigkeiten unter dem Siedepunkt, um das Überleben im Vakuum des Alls zu ermöglichen. Die Haut eines Leerenwurms ist zwar größtenteils hermetisch versiegelt, doch verschiedene Verdauungs- und Fortpflanzungsöffnungen geben mit der Zeit einen gewissen Druck ab."
 vultaum_religious_pamphlet: "Religiöses Vultaum-Pamphlet"
 vultaum_religious_pamphlet_desc_short: "Dieses von den Missionaren der Vultaum ausgegebene Pamphlet versucht, die virtuelle Realität als größte Sünde zu enttarnen"
 vultaum_religious_pamphlet_desc_details: "Als Schlüsselkonzept bezieht es sich auf die \"große Lüge\" und beschreibt, dass jede Form des immersiven Eskapismus mit dem Willen zur Zerstörung der eigenen Realität gleichzusetzen ist."
 vultaum_vr_video_game: "Vultaum-VR-Videospiel"
 vultaum_vr_video_game_desc_short: "Die digitale Schnittstelle eines Mehrspieler-Videospiels in einer virtuellen Realität, das einst von Milliarden von Vultaum-Individuen gespielt wurde"
 vultaum_vr_video_game_desc_details: "Die genaustens auf ihre Biologie abgestimmte Steuerung besteht aus Tausenden von Vibrationsrezeptoren, die in der Lage sind, selbst die kleinsten Bewegungen zu registrieren."
 warning_monolith: "Warnender Monolith"
 warning_monolith_desc_short: "Ein behauener Monolith, der als Botschaft des letzten Angehörigen einer ausgestorbenen Spezies zurückgelassen wurde"
 warning_monolith_desc_details: "Er soll jeden, der die Überreste dieses Planeten entdeckt, davon abhalten, nach der ultimativen Waffe zu suchen, die zum Tod der Spezies führte. Der Tonfall ist recht melodramatisch, doch das ist angesichts der Umstände zu entschuldigen."
 wormhole_anchor: "Wurmlochanker von [FROM.GetName]"
 wormhole_anchor_desc_short: "Der Ankerpunkt eines Einweg-Wurmlochs, das dazu genutzt wurde, Dunkle Materie aus einem schwarzen Loch zu gewinnen"
 wormhole_anchor_desc_details: "Die Konstruktionsweise lässt sich bestenfalls als willkürlich beschreiben, da der Ankerpunkt vollständig aus geborgenem Material und Schrott verschiedener Zivilisationen gebaut wurde. Die wissenschaftlichen Prinzipien, die hinter dem Gerät stecken, gehen weit über das Ingenieurswissen hinaus, das man zu seiner Konstruktion einsetzte. Er nutzt eine elegante Methode zur Manipulation negativer Masse."
 wormhole_fur: "Wurmloch-Pelz"
 wormhole_fur_desc_short: "Biologische Proben von Füchsen, die man jenseits eines Astralrisses fand"
 wormhole_fur_desc_details: "Diese säugetierartige Spezies hat eine genetische Mutation, die es ihr erlaubt, nach Belieben Wurmlöcher zu erzeugen. Man geht davon aus, dass sich diese Fähigkeit nach unzähligen Jahrtausenden des Reisens zwischen den Dimensionen entwickelte."
 ytterite_preserved_corpse: "Konservierte Leiche eines Ytteriten"
 ytterite_preserved_corpse_desc_short: "Das letzte Exemplar der Ytteriten, einer Zivilisation ohne ÜL-Technologie, deren Heimatwelt durch einen gekaperten Weltenbrecher zerstört wurde"
 ytterite_preserved_corpse_desc_details: "Ihr Verdauungssystem wandelte verzehrte Mineralien in Photonen um und die inneren Organe ähnelten komplexen Ansammlungen lichtbrechender Kristalle, die um einen geschmolzenen Kern angeordnet waren. Dieses Exemplar im Besonderen besaß eine Reihe von Schnitzereien, die in einem seiner unteren Gliedmaßen als Art kulturell bedeutsame Körpermodifikation angebracht waren."
 ytterite_kaleidoscopic_fascinator: "Kaleidoskopischer Ytteriten-Faszinator"
 ytterite_kaleidoscopic_fascinator_desc_short: "Ein dekoratives Ornament, das die Ytteriten seines visuellen Reizes wegen schufen"
 ytterite_kaleidoscopic_fascinator_desc_details: "Faszinatoren stellte man in Bereichen auf, die vom natürlichen Sonnenlicht bestrahlt wurden, und sie konnten Hunderte oder sogar Tausende von einzigartigen Mustern aufweisen. Ein ausgebildeter Kunsthandwerker konnte Monate damit verbringen, einen derart komplexen Faszinator wie diesen zu fertigen. Die Kunsthandwerker \"signierten\" ihre Arbeit, indem sie ein geschnitztes Stück ihres eigenen abgestreiften Mantels an einem wichtigen Punkt des Objekts anbrachten."
 ytterite_royal_scepter: "Königliches Ytteriten-Zepter"
 ytterite_royal_scepter_desc_short: "Dieses Zepter wurde vom königlichen Minister in Ehren des Gneis Damur getragen, einer riesigen, in einen Berg gehauenen Statue, von der die Ytteriten glaubten, sie sei eine ruhende Gottheit und ihr einziger wahrer Monarch"
 ytterite_royal_scepter_desc_details: "Sie führten Wahlen durch, um stellvertretende Anführer zu wählen, während sie auf das große Erwachen der Statue warteten."
 yuht_audio_console: "Audiokonsole der Yuht"
 yuht_audio_console_desc_short: "Ein Modul, das einst eine riesige Audioüberwachungsanlage der Yuht steuerte"
 yuht_audio_console_desc_details: "Die Yuht entwickelten diese Technologie, um die Suche nach fremdem Leben zu erleichtern, und hofften damit, Übertragungen aus fernen Systemen einzufangen."
 yuht_cryo_pod: "Kryokapsel der Yuht"
 yuht_cryo_pod_desc_short: "Diese sechsundneunzig Meter lange uralte Stasiskapsel birgt die Überreste eines Individuums der riesigen Yuht-Spezies"
 yuht_cryo_pod_desc_details: "Die Yuht hatten eine extrem lange Lebensspanne und konnten diese per Kryostase um ein Vielfaches verlängern. Man vermutet, dass diese arthropoide Spezies wahrscheinlich hermaphroditisch war und ihr Fortpflanzungssystem an die vorübergehenden Bedürfnisse der Kolonie anpassen konnte."
 yuht_crystal_skull: "Kristallschädel der Yuht"
 yuht_crystal_skull_desc_short: "Ein Kristallschädel, von dem die alten Yuht einst glaubten, er gehöre einer fremden Spezies und sei damit ein echtes Artefakt"
 yuht_crystal_skull_desc_details: "Der Ursprung dieses gefälschten Gegenstandes wurde schließlich entlarvt, aber nicht bevor die Nachrichtenmedien der Yuht die Geschichte aufgriffen und sie bekannt machten. Viele Individuen, die gefälschte Artefakte wie dieses \"entdeckten\", wurden zu kleinen Berühmtheiten und Medienpersönlichkeiten und spornten andere an, es ihnen gleichzutun."
 zombie_probe: "Zombie-Probe"
 zombie_probe_desc_short: "Die Überreste einer Probe, die bei einer von einer unbekannten Organisation durchgeführten Erkundung entnommen und augmentiert wurde, wodurch sie Empfindungsfähigkeit erlangte"
 zombie_probe_desc_details: "Seinem aufkeimenden Bewusstsein folgend griff das Wesen seinen Schöpfer an und wurde prompt beseitigt. Es ist ungewiss, ob es jemals Schmerz kannte oder das Konzept des Sterbens begriff."
 zone_a_sedative: "Zone-A-Sedativum"
 zone_a_sedative_desc_short: "Eine Schaufel Erde, die einem als \"Zone A\" ausgewiesenen Gebiet auf [from.GetName] entnommen wurde"
 zone_a_sedative_desc_details: "In diesem 169 Quadratkilometer großen Landstrich sind zahlreiche Artefakte und Technologien verschiedener, nicht von dieser Welt stammender Besucher unbekannter Herkunft zurückgelassen worden. Manche dieser Geräte sind extrem gefährlich. Der Boden selbst ist mit einem chemischen Beruhigungsmittel versetzt, das den Forschern ein Gefühl der Zufriedenheit vermittelte und es ihnen so erlaubte, diese oft gefährlichen Gegenstände mit nur wenig Stress zu bedienen. Womit auch immer dort experimentiert wurde: Es geriet mit der Zeit in Vergessenheit."
 zroni_war_banners: "Zroni-Kriegsbanner"
 zroni_war_banners_desc_short: "Die Banner zweier am Bürgerkrieg der Zroni beteiligter Fraktionen"
 zroni_war_banners_desc_details: "Die purpurne Flagge steht für die Göttlichen: eine kleine Minderheit, deren omnipotentes Streben die gesamte Galaxie in Gefahr brachte. Die blaue Flagge steht für die Retter: eine Fraktion, die sich strikt dagegen wehrte, dem Universum seine Kraft zu entziehen - etwas, was sie als egoistisches Verlangen ansahen. Ursprünglich zog man diese Grenzen als Teil einer philosophischen Debatte, doch es dauerte nicht lange, bis dieser Streit zum Auslöser eines verheerenden Bürgerkriegs wurde."
 zulcor_wings: "Zulcor-Flügel"
 zulcor_wings_desc_short: "Flügel aus Chitin, die sich der wurmartigen Spezies namens \"Zulcor\" zuordnen ließen, welche auf [fromfrom.GetName] beheimatet ist"
 zulcor_wings_desc_details: "Diese insektoiden Kreaturen verzehren riesige Mengen an Mineralien als Nahrung, und ein einziger Schwarm ist in der Lage, innerhalb weniger Wochen einen ganzen Berg aufzufressen. Nach der Verdauung verstärken die Mineralien das Exoskelett der Zulcor. Ihre Ausscheidungen enthalten häufig Spuren von Quarzkristallen und seltenen Metallen."
