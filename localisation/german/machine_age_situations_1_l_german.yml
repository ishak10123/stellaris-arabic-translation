 #Cyber Corporate Collectivist
 auth_cyber_corporate_collectivist: "Kaizen-Unternehmen"
 auth_cyber_corporate_collectivist_desc: "Kaizen, der Wille zur kontinuierlichen Verbesserung, ist eine Philosophie, die sich hervorragend für eine moderne Software- und Wetware-Umgebung eignet. Indem wir unserem Kundenstamm eine umfangreiche Auswahl an Augmentierungen bieten, steigert dies die Leistungen und trägt dazu bei, eine gesellschaftliche Synergie zu erreichen.\n\nEnthalten ist zudem eine Hintertür zur Überwachung aller Benutzer, die mit den Netzwerken der Sternenbasis verbunden sind. Die beträchtliche Gewinnspanne, die diese Augmentierungen bieten, beleben jedoch wahrscheinlich auch den Weiterverkauf auf dem Schwarzmarkt."
