 #Traits
 trait_limited_cybernetic: "Begrenzte Kybernetik"
 trait_limited_cybernetic_desc: "Diese Spezies verfügt über die geringste Anzahl an Implantaten, die für das Funktionieren in einer kybernetischen Gesellschaft erforderlich sind."
 leader_trait_limited_cyborg: "Begrenzter Cyborg"
 leader_trait_limited_cyborg_desc: "Dieser Anführer verfügt über die geringste Anzahl an Implantaten, die für das Funktionieren in einer kybernetischen Gesellschaft erforderlich sind."
