 situation_cyberization_hive_desc: "Ein Schwarmbewusstsein braucht überlegene Körper. Mit kybernetischen Implantaten können unsere Drohnen perfektioniert, verbessert und umgestaltet werden.\nEs ist an der Zeit, die Grenzen unserer biologischen Beschränkungen zu überwinden.\n\n§YBewohner, die nächsten Monat ein Implantat erhalten§!: §G[From.GetCyberPopsPerMonth]§!"
 situation_cyberization_hive_monthly_change_tooltip: "Unsere Körper werden kybernetisch verändert: die perfekte Verschmelzung des Organischen mit der Maschine."
 situation_cyberization_hive_outcome: "Eine kybernetische Bevölkerung."
 stage_cyberization_hive_effects: "Wir müssen kybernetische Implantate entwickeln und installieren und uns selbst augmentieren."
