 edict_love_letter_virus: "Liebesbrief-Virus"
 edict_love_letter_virus_desc: "Veranlasst die Implantate, mehr Pheromone und andere chemische Stoffe zu produzieren, um andere Individuen in verschiedenen Teilen des Reiches zu mehr \"amourösem\" Verhalten zu bewegen."
 concept_edict_love_letter_virus: "$edict_love_letter_virus$"
