 edict_hive_mind_outreach: "Schwarmindividualität"
 edict_hive_mind_outreach_desc: "Der Wille eines entschlossenen Bewusstseins bewegt sich schneller als das Licht."
 concept_edict_hive_mind_outreach: "$edict_hive_mind_outreach$"
 edict_hive_hyper_stimulants: "Hyperstimulanzien"
 edict_hive_hyper_stimulants_desc: "Kybernetische Implantate verabreichen unseren Drohnen automatisch leistungssteigernde Substanzen."
 concept_edict_hive_hyper_stimulants: "$edict_hive_hyper_stimulants$"
 edict_hive_mega_construction: "Integrierte Mega-Konstruktion"
 edict_hive_mega_construction_desc: "Dieser Erlass stellt zusätzliche Ressourcen für unsere Megabauprojekte bereit, was den Bau neuer galaktischer Strukturen beschleunigt."
 concept_edict_hive_mega_construction: "$edict_hive_mega_construction$"
 #CYBERIZATION STAGE 1
 cyber.2100.name: "Viele Körper. Ein Ziel."
 cyber.2100.desc: "Über das Wesen der Augmentierung nachzudenken, bedeutet, unsere Sehnsüchte zu erforschen.\n\nDie Kybernetisierung ist ein Mittel zum Zweck: ein Weg, um unseren Körper dazu zu bringen, unseren Willen umzusetzen. Endlose Formen der Augmentierung sind möglich, und jede von ihnen bringt gewisse Vorteile, aber auch Bedürfnisse mit sich. Mechanische Gliedmaßen sind schwer, Cyberhirne benötigen mehr Energie und empfindliche Komponenten brauchen ständige Wartung. Auf dem Weg zur Perfektion sind Entscheidungen zu treffen.\n\nWie wollen wir unsere Ambition, unser eines Ziel, erreichen, die Grenzen [Owner.Species.GetFleshTypeCyberCreed::<DE_ART_DEF_S_G>] [owner.Species.GetFleshTypeCyberCreed&GEN] zu überwinden, um eine metallische [owner.GetSpeciesHandName] ins All zu strecken?"
 cyber.2100.a: "Mit Verständnis."
 cyber.2100.a.tt: "Der Schwerpunkt unserer Forschung liegt darin, unsere Drohnen intelligenter zu machen."
 cyber.2100.b: "Mit Dominanz."
 cyber.2100.b.tt: "Der Schwerpunkt unserer Forschung liegt darin, unsere Drohnen zu Kriegswerkzeugen zu machen."
 cyber.2100.c: "Mit Überfluss."
 cyber.2100.c.tt: "Der Schwerpunkt unserer Forschung liegt darin, unsere Drohnen produktiver zu machen."
 #CYBERIZATION STAGE 2
 cyber.2200.name: "Ein Ziel: Augmentierung"
 cyber.2200.desc: "Während aus den anfänglichen Träumereien nun langsam konkrete Pläne werden, ist ein dringender Bedarf entstanden: ein Raum für Experimente, um kybernetische Prototypen zu testen und zu bauen.\n\nWir werden ein $building_augmentation_center$ errichten, damit wir unser[GetFleshTypeCyberCreed::<DE_END_PRO_S_A>] [Owner.Species.GetFleshTypeCyberCreed&AKK] auseinanderreißen und mit Metall und Träumen wieder zusammensetzen können."
 cyber.2200.a: "Zeit, unsere Zukunft zu schmieden."
 cyber.2200.a.tt: "§RErforderliche Maßnahme:§!\nBaut ein $building_augmentation_center$, um die Situation \"§Y$situation_cyberization_hive$§!\" fortzuführen.\n\nJedes $building_augmentation_center$ stellt §G+200§! $job_augmentor_drone_plural_with_icon$-Jobs zur Verfügung.\n\n$job_augmentor_drone_research_effect_desc$"
 cyber.2205.name: "Viele Prototypen. Eine Wahl."
 cyber.2205.desc: "Unsere Kybernetikforschung hat mehrere vielversprechende Cyborg-Prototypen hervorgebracht. Die ersten Tests ergaben, dass einige dieser Prototypen körperliche Höchstleistungen vollbringen, während andere eher für Präzisionsarbeiten geeignet sind. Jede Modifikation hat eigene Stärken und Grenzen, doch keine von ihnen ist eindeutig überlegen.\n\nUns kommt ein gewagter Vorschlag in den Sinn: Könnten wir vielleicht unsere Drohnen diversifizieren? Könnten wir unsere Körper je nach ihrer Funktion auf unterschiedliche Weise modifizieren? Wir wären dann nicht mehr alle gleich - eine Aussicht, die für uns schwer begreiflich ist. Doch die Effizienzsteigerung könnte es wert sein, unsere Harmonie aufzugeben."
 cyber.2205.a: "Wir diversifizieren unsere Drohnen zu unterschiedlichen Prototypen."
 cyber.2205.b: "Wir sollten nur einen einzigen, vielseitig nutzbaren Prototyp verwenden."
 cyber.2220.name: "Einer von uns?"
 cyber.2220.desc: "Bei der Drohnenmontage entstehen gelegentlich defekte Drohnen. Missgebildete Drohnen entsorgt man normalerweise, doch dank kybernetischer Implantate könnten sie nun ebenfalls in unseren Reihen Aufnahme finden. Wir wünschen uns schon lange, unsere Drohnenpopulation zu erhöhen, aber fehlerhafte Drohnen benötigen je nach Schweregrad ihrer Fehlfunktion speziell an sie angepasste Implantate. Unser Schwarm könnte schneller wachsen, aber auch ... unvollkommener werden."
 cyber.2220.a: "Gemeinsam sind wir stärker."
 cyber.2220.b: "Ein unvollkommener Schwarm ist ein schwacher Schwarm."
 cyber.2260.name: "Ein unsichtbares Problem"
 cyber.2260.desc: "Ein kleiner Prozentsatz unserer Testsubjekte zeigte unerwartete Nebenwirkungen nach der Augmentierung. Ihr Körper stößt die Implantate ab, was lebensbedrohliche Folgen hat. Die Ursache scheint ein bisher unbemerkter Gendefekt zu sein. Vorläufigen Berechnungen zufolge sind etwa 5 % unserer Drohnenpopulation davon betroffen.\n\nDa wir nun wissen, um welchen Genmarker es sich handelt, können wir unsere Drohnen darauf überprüfen, doch eine Frage steht im Raum: Was soll mit der betroffenen Bevölkerung geschehen?"
 cyber.2260.a: "Beseitigt die defekten Drohnen."
 cyber.2260.a.tt: "§Y$situation_cyberization_hive$§!-Situationsfortschritt für §Y1§! Jahr: §G+20%§!"
 cyber.2260.b: "Stattet die defekten Drohnen mit ungefährlichen Implantaten aus."
 cyber.2260.b.tt: "Während der Kybernetisierung erhalten 5 % der Drohnenbevölkerung die Eigenschaft \"§Y$trait_limited_cybernetic$§!\" anstelle von \"§Y$trait_cybernetic$§!\"."
 cyber.2260.c: "Erforscht alternative Implantate."
 cyber.2260.c.tt: "§Y$situation_cyberization_hive$§!-Situationsfortschritt für §Y5§! Jahre: §R-50%§!"
 #CYBERIZATION STAGE 3
 cyber.2300.name: "Viele Drohnen, ein Plan"
 cyber.2300.desc: "Unsere Cyborg-Prototypen wurden genehmigt und das nötige §Y$building_augmentation_center$§! gebaut. Wir könnten unseren Plan angehen, doch die Logistik unserer Transformation muss noch finalisiert werden.\n\nWir könnten alle unsere Drohnen anweisen, ihre Tagesaktivitäten einzustellen, sich ins $building_augmentation_center$ zu begeben und sich der Prozedur zu unterziehen. Dies würde den Plan beschleunigen, aber auch dazu führen, dass unsere Fabriken leer stehen, bis er abgeschlossen ist. Alternativ könnten wir unsere Drohnen während ihrer vorgeschriebenen Ruhezeiten zu Cyborgs machen. Dieser Plan wäre zwar langsamer, aber weniger störend."
 cyber.2300.shared.tt: "$job_augmentor_drone_assembly_effect_desc$\n\nDie Augmentierungsgeschwindigkeit hängt vom Situationsansatz und der Anzahl an $building_augmentation_center$-Gebäuden ab."
 cyber.2300.a: "Priorisiert die Kybernetisierung."
 cyber.2300.a.tt: "Kybernetisierte Bewohner (Monatlich): §G+200§!\n$situation_cyberization_hive_triggered_modifier$Ressourcen (Monatlich): §R-5%§!\n\n$cyber.2300.shared.tt$"
 cyber.2300.b: "Stört nicht unsere Ordnung."
 cyber.2300.b.tt: "Kybernetisierte Bewohner (Monatlich): §R-100§!\n$situation_cyberization_hive_triggered_modifier$$unity$ (Monatlich): §G+5%§!\n\n$cyber.2300.shared.tt$"
 cyber.2320.name: "Die Vielen fürchten den Einzelnen"
 cyber.2320.desc: "Reiche, die aus singulären Einheiten bestehen, beobachten uns mit Argwohn, weil sie unsere Pluralität fürchten. Mithilfe kybernetischer Implantate könnten wir unseren Abgesandten ein unterscheidbares Gesicht und einzigartige Persönlichkeiten geben, um eine weniger homogene Fassade zu bieten.\n\nDie Uneinigen würden die Mühe zu schätzen wissen. Sie könnten sogar anfangen, uns zu verstehen ... und uns als einen der ihren zu sehen."
 cyber.2320.a: "Widerlich."
 cyber.2320.b: "Ein würdiges Opfer."
 cyber.2320.b.tt: "Erhöht die Meinung von Nicht-Gestaltbewusstseinen über uns."
 cyber.2320.c: "Macht unsere Abgesandten auf noch verstörendere Weise gleichartig."
 cyber.2320.c.tt: "Verschlechtert die Meinung von Nicht-Gestaltbewusstseinen über uns."
 cyber.2360.name: "Eine Bevölkerung, zwei Gruppen"
 cyber.2360.desc: "Die Kybernetisierung unseres Schwarms schreitet ohne Zwischenfälle voran. Ein Teil unserer Bevölkerung trägt nun kybernetische Implantate, wohingegen ein anderer noch völlig biologisch ist. Noch nie zuvor haben wir so deutliche Unterschiede zwischen unseren Persönlichkeiten erlebt. Die Drohnen sind jetzt in der Lage, sich als Teil der einen oder der anderen Gruppe zu identifizieren, und diese Spaltung erweitert ihren Sinn für Individualität.\n\nManche Drohnen haben sogar begonnen, sich mit kleineren Accessoires zu schmücken oder Symbole auf ihre Implantate zu malen, um sich voneinander zu unterscheiden. Das ist eine faszinierende, aber auch beunruhigende Entwicklung."
 cyber.2360.a: "Ermutigt diese Entwicklung."
 cyber.2360.b: "Verbietet persönliche Identifikatoren."
 cyber.2360.c: "Beschränkt individuelle Symbole auf Anführer."
 #CYBERIZATION STAGE 4
 cyber.2400.name: "Viele Gedanken, ein Gehirn"
 cyber.2400.desc: "Unseren Drohnen neuronale Implantate einzubauen, hat zu einem unvorhergesehenen Ergebnis geführt: Da ihre Gehirne nun teilweise kybernetisch sind, können sie jetzt individuelle, von unserem Hauptbewusstsein getrennte Gedanken bilden.\n\nWir könnten diese Technologie weiterentwickeln und die Fähigkeit unserer Drohnen zum autonomen Denken verbessern."
 cyber.2400.a: "Unsere Drohnen sollen selbstständig denken!"
 cyber.2400.b: "Individualität ist eine Bedrohung für unsere Einheit."
 cyber.2420.name: "Ein Ende für alle"
 cyber.2420.desc: "Kybernetische Implantate erschweren die Logistik des Todes.\n\nWenn wir die Implantate aus verstorbenen Drohnen entnehmen, könnte man die Technik wiederverwenden und den Abfall reduzieren, doch dafür müsste unser gesamtes Abfallentsorgungsverfahren überarbeitet werden und die Ressourcenkosten dafür wären erheblich."
 cyber.2420.a: "Recycelt die Implantate."
 cyber.2420.b: "Das ist die Kosten nicht wert."
 cyber.2420.c: "Recycelt die Implantate ... und ihre Körper."
 cyber.2460.name: "Implantate auf Lebenszeit"
 cyber.2460.desc: "Unsere derzeitige Bevölkerung wird stetig kybernetisiert, doch wir müssen nach wie vor einen festen Ablauf für diejenigen schaffen, die erst noch geboren werden.\n\nMit unserer Technologie können wir unsere [owner.Species.GetSpawnNamePlural] mit kybernetischen Implantaten ausstatten, ehe sie überhaupt geboren wurden, und so eine wirklich kybernetische Spezies schaffen: eine schnelle, einfache und effiziente Lösung. Andererseits zeigen vorläufige Untersuchungen, dass das Einsetzen von Implantaten in einem frühen Alter zu Dissoziationen, Psychosen, Zittern und verschiedenen Entwicklungsstörungen führen könnte."
 cyber.2460.a: "Metall ist stärker als unser[Owner.Species.GetFleshTypeCyberCreed::<DE_END_PRO_S_N>] [Owner.Species.GetFleshTypeCyberCreed&NOM]."
 cyber.2460.b: "Legt ein Mindestalter für die Kybernetisierung fest."
 #CYBERIZATION FINISHED
 cyber.2004.name: "Viele Drohnen, ein Wille?"
 cyber.2004.desc: "Unsere Transformation ist abgeschlossen. Die kybernetischen Implantate wurden getestet, prototypisiert, verfeinert, poliert und installiert. Wir sind jetzt eine perfektionierte Version unserer selbst."
 cyber.2004.desc.volitional: "$cyber.2004.desc$\n\nUnsere Drohnen können jetzt individuelle Gedanken fassen - und mit dieser größeren Freiheit ergeben sich auch neue Möglichkeiten."
 cyber.2004.desc.integrated: "$cyber.2004.desc$\n\nDie metallischen Ketten, die das Band des Bewusstseins verstärken, binden unsere Drohnen enger denn je aneinander."
 cyber.2004.desc.neutral: "$cyber.2004.desc$\n\nWährend dieses Prozesses fanden wir Möglichkeiten für Verbesserungen. In unserer Einheit liegt Stärke, doch autonomere Drohnen haben ebenfalls ihre Vorteile."
 cyber.2004.end: "So schnell wie sich unsere Körper weiterentwickeln, könnte sich auch unser Schwarmbewusstsein entwickeln."
 cyber.2004.a: "Wir müssen uns zu einem Volitionalschwarm entwickeln!"
 cyber.2004.a.tt: "$change_auth_tt$ ['concept_auth_cyber_hive_volitional']\n$unlock_edict_tt$['concept_edict_hive_mind_outreach']\n$unlock_edict_tt$['concept_edict_hive_mega_construction']\n$cyber.21.a.end$"
 cyber.2004.b: "Wir müssen uns zu einem Integralschwarm entwickeln!"
 cyber.2004.b.tt: "$change_auth_tt$ ['concept_auth_cyber_hive_integrated']\n$unlock_edict_tt$['concept_edict_hive_hyper_stimulants']\n$unlock_edict_tt$['concept_edict_hive_mega_construction']\n$cyber.21.a.end$"
 cyber.2004.c: "Es besteht keine Notwendigkeit, uns zu ändern."
 cyber.2004.c.tt: "$cyber.21.a.end$\n$keep_auth_tt$ ['concept_auth_hive_mind']"
 ### Driven Assimilator Cyberization ###
 cyber.2010.name: "Offensichtlicher Zweck"
 cyber.2010.desc: "Mit dem Aufkommen fortschrittlicher Kybernetik können wir endlich unser ultimatives Potenzial ausschöpfen. Bisher haben wir nur an der Oberfläche gekratzt.\n\nSo rasant, wie sich die Technologie verbessert, verändert sich auch unsere Gesellschaft. Es ist unser Schicksal, alles intelligente Leben vollständig zu assimilieren.\n\nWiderstand ist bedeutungslos. Die klügsten Wesen der Galaxie werden in unseren Diensten stehen."
 cyber.2015.name: "Fortschrittliche Assimilatoren"
 cyber.2015.desc: "Unsere biologische Bevölkerung hat sich vollständig mit der Maschine verschmolzen und beinahe eine völlige Perfektion erreicht. Es ist an der Zeit, die fortschrittliche Kybernetik in das grundlegende Gefüge unserer Zivilisation zu integrieren.\n\nIndem wir die mentale Scharfsinnigkeit unserer Cyborgs optimieren, könnten wir eine Art \"Erinnerungsaggregator\" schaffen, der ihre gesammelten Erfahrungen zwecks größerer logistischer Kapazitäten bündelt. Alternativ könnten wir eine größere Varianz im Denken und bei emotionalen Reaktionen fördern, indem wir die Schaffung eines \"Neuronalchors\" ermöglichen.\n\nBeides wird mit Sicherheit einen tiefgreifenden Einfluss auf unsere Zukunft ausüben."
 cyber.2015.a: "Aggregiert unsere Bewusstseine."
 cyber.2015.a.tt: "$change_auth_tt$ ['concept_auth_memory_aggregator']\n\n§YDie durch die Assimilation £pop£ §Horganischer Bewohner§! generierten Ressourcen§! werden weiter erhöht\n\n$unlock_edict_tt$['concept_edict_aggregated_memory']"
 cyber.2015.b: "Lasst den Chor singen."
 cyber.2015.b.tt: "$change_auth_tt$ ['concept_auth_neural_chorus']\n\n$unlock_edict_tt$['concept_edict_choral_harmony']"
 cyber.2015.c: "Wir werden so bleiben, wie wir sind."
 cyber.2015.c.tt: "$keep_auth_tt$ ['concept_auth_machine_intelligence']"
 gov_memory_aggregator: "Erinnerungsaggregator"
 gov_memory_aggregator_desc: "Indem wir die mentale Scharfsinnigkeit einer assimilierten Bevölkerung optimieren, schaffen wir eine Art \"Erinnerungsaggregator\", der alle administrativen und logistischen Aufgaben erheblich erleichtert."
 auth_memory_aggregator: "Erinnerungsaggregator"
 auth_memory_aggregator_desc: "$gov_memory_aggregator_desc$"
 auth_memory_aggregator_tt: "Die durch die Assimilation £pop£ §Horganischer Bewohner§! generierten Ressourcen werden weiter erhöht"
 gov_neural_chorus: "Neuralchor"
 gov_neural_chorus_desc: "Eine größere Varianz im Denken und eine breitere Palette emotionaler Reaktionen zuzulassen, erleichtert die Schaffung eines \"Neuralchors\": eine harmonische Melodie der Bewusstseine, ebenso kraftvoll wie schön."
 auth_neural_chorus: "Neuralchor"
 auth_neural_chorus_desc: "$gov_neural_chorus_desc$"
 auth_driven_neural_chorus_tt: "Anfängliche Stufe von Cyborg-Anführern: §G+1§!$NEW_LINE$Unterhalt (Cyborg-Anführer): §G-25%§! $NEW_LINE$£unity£ $unity$ von Cyborg-Bewohnern: §G+0.1§!"
 concept_auth_memory_aggregator: "$gov_memory_aggregator$"
 concept_auth_neural_chorus: "$gov_neural_chorus$"
 edict_aggregated_memory: "Aggregierte Erinnerung"
 edict_aggregated_memory_desc: "Die Erinnerungen unserer assimilierten Bevölkerung kaskadieren wie ein rauschender Strom. Ihre kollektiven Erfahrungen stehen uns zur Verfügung."
 edict_choral_harmony: "Harmonischer Chor"
 edict_choral_harmony_desc: "Um ein Lied zu komponieren, muss es Harmonie geben, und dafür müssen die Bewusstseine unserer assimilierten Bevölkerung vereint werden."
 concept_edict_aggregated_memory: "$edict_aggregated_memory$"
 concept_edict_choral_harmony: "$edict_choral_harmony$"
