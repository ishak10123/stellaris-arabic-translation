 ### EVENTS ###
 cyber.social_consequences.tt: "Beeinflusst den laufenden §Ykybernetischen Gesellschaftswandel§!.\n\n" #Standard tooltip to indicate that the Individualism/Collectivism variables are changed
 #FIRST EVENT #
 #DEMOCRATIC
 cyber.505.name: "Zukunftsschock"
 cyber.505.desc.gov: "Die Augmentierung unseres Volkes war ein voller Erfolg und führte dazu, dass Produktionsprozesse und Entscheidungsfindungen rationalisiert werden konnten. Unsere vielen Stimmen finden Anerkennung und ihre Anliegen Berücksichtigung. Jetzt hat jeder einzelne §Y[root.GetSpeciesName]§! die gleiche Chance, von diesen lebensverändernden Implantaten zu profitieren.\n\nDer logische nächste Schritt besteht nun darin, die weiteren Anwendungsgebiete dieser Technologie zu studieren. Wir könnten sie dazu nutzen, um unser demokratisches System zu stärken, oder aber unsere Arbeiter durch eine Erfahrungssynchronisierung aufwerten."
 cyber.505.desc.cor: "Der Augmentierungsprozess mit unseren Partnerunternehmen wurde erfolgreich abgeschlossen. Die Implantate wurden mit einer unfassbaren Effizienz hergestellt, verteilt und installiert. Die vielen Stimmen der §Y[root.GetSpeciesAdj]en§! Gesellschaft werden gehört und ihre berechtigten Bedenken berücksichtigt. Wir schreiten voller Elan der Zukunft entgehen.\n\nDie Regierung ist zudem bereit, den nächsten Schritt zu unternehmen. Wir können unsere technologischen Fortschritte nutzen, um unser demokratisches System zu verbessern, oder die Implantate unserer Arbeiter synchronisieren, damit sie vom Wissen aller profitieren können."
 cyber.505.desc.ind: "Trotz der Befürchtungen einiger Regierungsvertreter hat das dezentrale Verteilungsmodell der Implantate funktioniert. Kleinere Kliniken und Dienste tauchen an jeder Straßenecke auf und erlauben es jedem, sich augmentieren zu lassen, ohne große Entfernungen zurücklegen zu müssen.\n\nDoch auch unsere Regierung muss bereit sein, der Zukunft entgegenzublicken. Wir können die Implantate entweder nutzen, um unser demokratisches System zu stärken, oder die Erfahrungen aller zum Wohl der Arbeiter synchronisieren."
 cyber.505.a: "Wir sollten unser demokratisches System stärken."
 cyber.505.a.tt: "Wir sollten uns auf Zufriedenheit, Einigkeit und Spezialisten konzentrieren."
 cyber.505.b: "Wir müssen unsere Bewusstseine miteinander verbinden."
 cyber.505.b.tt: "Wir sollten uns auf die Zufriedenheit, die Arbeiterproduktion und die Stabilität konzentrieren."
 #OLIGARCHIC
 cyber.510.name: "Neustrukturierung der Macht"
 cyber.510.desc.gov: "Diese monumentale Veränderung kann nur von den oberen Rängen der Gesellschaft verstanden und umgesetzt werden, damit es keine Verwirrung oder Unstimmigkeit innerhalb unserer Untertanen gibt. Während man die §Y[Species.GetNamePlural]§! mit ihren von der Regierung ausgegebenen kybernetischen Implantaten ausstattet, haben wir die einmalige Gelegenheit, jene ungenutzten Möglichkeiten zu erforschen, die diese Chips uns bieten.\n\nSollen wir eine Gesellschaft anstreben, in der ein harter Wettbewerb unsere Arbeiter zu neuen Höchstleistungen anspornt, oder sollten wir uns die ungenutzte Rechenleistung der Schlafenden zunutze machen?"
 cyber.510.desc.cor: "Während staatlich genehmigte Unternehmen immer bessere Biochips herstellen, müssen wir eine Entscheidung dahingehend treffen, wie wir diesen unglaublichen gesellschaftlichen Wandel am besten nutzen.\n\nSollen wir die Natur nachahmen, wo nur die Stärksten überleben, oder das ungenutzte Potenzial des schlummernden Gehirns fördern?"
 cyber.510.desc.ind: "Was auch immer geschehen mag: Die Bevölkerung wird sich bei der Herstellung und dem Vertrieb der Augmentierungshardware bewähren dürfen, was uns die Möglichkeit gibt, über das große Ganze nachzudenken und zu überlegen, wie wir das Beste aus diesem unvorhergesehenen gesellschaftlichen Wandel herausholen.\n\nSollten wir die Bevölkerung dazu drängen, immer höhere Quoten zu erfüllen, oder sollten wir sie stattdessen im Schlaf für uns arbeiten lassen?"
 cyber.510.a: "Das niedere Volk soll für uns schuften."
 cyber.510.a.tt: "Wir konzentrieren uns darauf, die Produktion zu erhöhen, wenn auch auf Kosten der Zufriedenheit."
 cyber.510.b: "Selbst im Schlaf kann man produktiv sein."
 cyber.510.b.tt: "Wir konzentrieren uns darauf, den Fraktionen zusätzliche Ressourcen abzuringen."
 #DICTATORIAL
 cyber.515.name: "Kontrolle der Massen"
 cyber.515.desc.gov: "Im Rahmen unseres Augmentierungsprogramms haben sich mehrere Möglichkeiten zur Erhöhung der Stabilität und der Kontrolle ergeben. Indem wir von der Regierung finanzierte Implantate herstellen und diese der Bevölkerung frei zugänglich machen, wäre es ein Leichtes, heimlich Algorithmen zu installieren, die die Bevölkerung in Richtung eines bevorzugten Ergebnisses lenken.\n\nWir könnten auch unsere Überwachungsabdeckung erhöhen, indem wir persönliche Implantate mit Überwachungswerkzeugen und Hintertüren ausstatten, oder aber wir könnten einen Code installieren, der es unsere[Ruler.GetMREndingDE] §Y[Ruler.GetTitle]§! erlaubt, [Ruler.GetHisHer]e strahlende Persönlichkeit zu nutzen, um die Massen zu beeinflussen."
 cyber.515.desc.cor: "Unsere Partnerunternehmen sind bereit, kybernetische Implantate in großen Mengen herzustellen, zu vertreiben und in der Bevölkerung zu installieren. Das bevorstehende Firmware-Update bietet uns dabei eine einzigartige Gelegenheit.\n\nWir könnten versteckte Überwachungswerkzeuge in die persönliche Augmentierungshardware einbauen, was es uns erlauben würde, problematische Individuen rasch aufzuspüren. Alternativ könnten wir eine Funktion einbauen, die die Persönlichkeit eines Individuums überschreibt und es unsere[Ruler.GetMREndingDE] §Y[Ruler.GetTitle]§! so erlaubt, dem Volk [Ruler.GetHisHer]en Willen aufzuzwingen."
 cyber.515.desc.ind: "Krankenhäuser, Tante-Emma-Läden und Hacker-Gruppen sind bereit, kybernetische Implantate an die Bevölkerung zu verteilen und zu installieren. Doch es gibt keinen Grund, unsere Macht über diese neue und aufregende dezentrale Technologie so vollständig abzutreten.\n\nWir könnten maßgeschneiderte Implantatmodifikationen anbieten, in denen unsere eigenen Überwachungssysteme versteckt sind, um problematische Individuen aufzuspüren. Alternativ könnten wir Algorithmen installieren, die die Persönlichkeit überschreiben und es unsere[Ruler.GetMREndingDE] §Y[Ruler.GetTitle]§! erlauben, [Ruler.GetHisHer] Volk zu wahrer Größe zu führen, ohne dass es dies bewusst wahrnimmt."
 cyber.515.a: "Versteckt Überwachungswerkzeuge in persönlichen Implantaten."
 cyber.515.a.tt: "Legt den Schwerpunkt auf die Reichsstabilität und die Kriminalitätsreduktion."
 cyber.515.b: "Untersucht die Möglichkeiten zur Persönlichkeitsüberschreibung."
 cyber.515.b.tt: "Legt den Schwerpunkt auf die Arbeiterproduktion und die Wiederansiedlung."
 #IMPERIAL
 cyber.520.name: "Zukunftsschock"
 cyber.520.desc.gov: "Die Regierung hat ihre Ressourcen zur effizienteren Augmentierung der Bevölkerung eingesetzt. Von der Regierung zugelassene Augmentierungszentren haben Tag und Nacht Implantate installiert und die Bevölkerung über deren korrekte Anwendung und Wartung unterrichtet.\n\nAllein die Wertschöpfungsfrage steht noch offen. Sollen die Implantate dazu benutzt werden, um unsere ohnehin schon beeindruckende Führung weiter zu verbessern? Oder sollten sie als Mittel zur Unterhaltung und Ablenkung derer dienen, die unter uns arbeiten?\n\nDie hochwertigsten Implantate würden es unserer Dynastie erlauben, ihr Wissen zwischen den Generationen zu bewahren und weiterzugeben, was unermessliche Stabilität böte. Wir könnten aber auch den Status unserer Hauptwelt verbessern und das Volk mit kybernetisch aufgerüsteten Athleten unterhalten, die an äußerst brutalen Sportveranstaltungen zur Belustigung der Massen teilnehmen."
 cyber.520.desc.cor: "Von der Regierung zugelassene Unternehmen haben die operativen Richtlinien erfüllt, um die gesamte Bevölkerung mit kybernetischen Implantaten auszustatten, was es unseren Arbeiter erlaubt, ihre Dienste noch effizienter als zuvor zu verrichten.\n\nAllein die Wertschöpfungsfrage steht noch offen.\n\nDie hochwertigsten Implantate würden es unserer Dynastie erlauben, ihr Wissen zwischen den Generationen zu bewahren und weiterzugeben, was unermessliche Stabilität böte. Wir könnten aber auch den Status unserer Hauptstadt verbessern und das Volk mit kybernetisch aufgerüsteten Athleten unterhalten, die an äußerst brutalen Sportveranstaltungen zur Belustigung der Massen teilnehmen."
 cyber.520.desc.ind: "Trotz zahlreicher Vorbehalte seitens unserer Beamten war die dezentrale Verteilung und Installation kybernetischer Implantate erfolgreich. Mehrere kleine Kliniken haben auf all unseren Welten unermüdlich daran gearbeitet, unsere Bevölkerung zu augmentieren.\n\nAllein die Wertschöpfungsfrage steht noch offen. Wir könnten diese Technologie dazu nutzen, um das Wissen von Generationen zu bewahren, oder die Massen mit brutalen Cyborg-Sportveranstaltungen unterhalten, die so beeindruckend sind, dass sie noch nie von einem Okularimplantat gesehen wurden."
 cyber.520.a: "Bewahrt das Wissen des Reiches."
 cyber.520.a.tt: "Legt den Schwerpunkt auf den Reichsherrscher."
 cyber.520.b: "Bietet der Masse Unterhaltung."
 cyber.520.b.tt: "Legt den Schwerpunkt auf die Hauptwelt und die Zufriedenheit der Bevölkerung."
 #CORPORATE
 cyber.525.name: "Implantat GmbH"
 cyber.525.desc.gov: "Das umfangreiche, wenn auch ineffektive staatliche Implantatprogramm steht kurz vor dem Abschluss und bietet uns die Möglichkeit, die Einnahmequellen im Zusammenhang mit der Produkteinführung noch auszuweiten. Unsere Analysten schlagen zwei potenzielle Einnahmequellen vor, die beide ihre eigenen Risiken und Chancen bieten.\n\nDie Regierung könnte entweder die Aufnahme von Werbung in alle zukünftigen Okularimplantate vorschreiben oder regelmäßige Upgrades für die augmentierte Bevölkerung anordnen."
 cyber.525.desc.cor: "Die Implantatproduktion und -installation ist so effizient, wie man es von unserer optimierten Unternehmensinfrastruktur erwarten würde. Die Geschäftsmöglichkeiten, die diese neuen Implantate bieten, sind praktisch endlos.\n\nZwei besonders vielversprechenden Geschäftszweigen, die einander wechselseitig ausschließen, sagt man hervorragende Gewinnspannen voraus.\n\nWir könnten entweder die Aufnahme von Werbung in alle zukünftigen Okularimplantate vorschreiben oder aber regelmäßige Upgrades für die augmentierte Bevölkerung anordnen."
 cyber.525.desc.ind: "Es überrascht wohl niemanden, dass die willkürliche \"kommunale\" Einführung von Cyberware ihrem gnädigen Ende entgegengeht. Wir haben jetzt die Möglichkeit, die Richtung dieser vielversprechenden neuen Technologie zu beeinflussen und dabei unsere Produktmargen zu erhöhen.\n\nWir können entweder die Aufnahme von Werbung in alle zukünftigen Okularimplantate vorschreiben oder aber einen regelmäßigen Upgrade-Zyklus für die Soft- und Wetware anordnen."
 cyber.525.a: "Entwickelt einen Prototyp für werbegestützte Okularimplantate."
 cyber.525.a.tt: "Legt den Schwerpunkt auf die Steigerung des Handels und eine Senkung der Opportunitätskosten."
 cyber.525.b: "Erforscht die Praktikabilität regelmäßiger Implantat-Verbesserungen."
 cyber.525.b.tt: "Legt den Schwerpunkt auf Produktivitätsagenden, Spionage und den Dienstleistungsunterhalt."
 ### EVENT POOL ###
 cyber.610.name: "Augenblickliche Glückseligkeit"
 cyber.610.desc: "Unter unserer Arbeiterschaft verbreitet sich ein Schwarzmarkt-Implantat, das das Gehirn dazu anregt, nach Belieben chemische Neurotransmitter zu produzieren. Die Einsatzmöglichkeiten sind vielfältig und reichen von der Erzeugung intensiver Lust bis zur Erhöhung der Schmerztoleranz. Eine stabile Version des illegalen Implantats nachzukonstruieren, würde beträchtliche Investitionen erfordern und die stimulierende Wirkung mit der Zeit nachlassen.\n\nSollen wir eine kommerzielle Version davon entwickeln, den Schwarzmarkt-Prototyp einfach neu verpacken und weiterverkaufen oder lediglich seine Verwendung regulieren?"
 cyber.610.a: "Produziert ein stabiles Implantat."
 cyber.610.b: "Wir sollten den Schwarzmark-Prototyp einfach weiterverkaufen."
 cyber.610.c: "Reguliert diese Arten der Modifikation."
 cyber.615.name: "Trennung von Berufs- und Privatleben"
 cyber.615.desc: "Immer mehr Unternehmen verlangen, dass alle arbeitsbezogenen Informationen in einem speziellen Speicherbereich des Cybergehirns aufbewahrt werden, der außerhalb der Arbeit nicht zugänglich ist.\n\nSie behaupten, diese Funktion nur bei streng vertraulichen Aufgaben zu nutzen, um Unternehmensspionage zu verhindern. Manche verlangen sogar, dass die Mitarbeiter ihre privaten Erlebnisse am Arbeitsplatz abschirmen, um zu verhindern, dass die persönliche Ethik die Produktivität beeinträchtigt."
 cyber.615.a: "Die Arbeiter müssen die volle Kontrolle haben."
 cyber.615.b: "Es ist gesund, die Arbeit im Büro zu lassen."
 cyber.615.c: "Einflüsse sollten beidseitig abgeschirmt werden."
 cyber.625.name: "Abonnementbasierte Monetarisierung"
 cyber.625.desc: "Da Cyberware zu einem wichtigen Aspekt unseres Lebens geworden ist, wirken sich Änderungen an den Monetarisierungsmodellen stark auf unsere gesamte Gesellschaft aus. Jüngst ist ein Trend in Mode gekommen, grundlegende Funktionen von Implantaten hinter einem Abomodell zu monetarisieren. Sollte jemand eine Zahlung versäumen, werden die kybernetischen Gliedmaßen plötzlich blockiert und die Optik ausgeschaltet. Verbraucherorganisationen fordern uns auf, dieser Praxis Einhalt zu gebieten."
 cyber.625.a: "Verbietet das Abomodell für Cyberware."
 cyber.625.b: "Wenn sie es sich nicht leisten können, hätten sie es nicht kaufen sollen."
 cyber.625.c: "Beschränkt das Abomodell auf nicht-überlebenswichtige Funktionen."
 cyber.625.d: "Das ist eine hervorregende Idee! Wir halten weiter daran fest!"
 cyber_subscription_ban: "Verbot von Cyberware-Abomodellen"
 cyber_subscription_ban_desc: "Wir verbieten Herstellern von Cyberware, Implantatfunktionen hinter Abomodellen zu verstecken."
 cyber_subscription_limited: "Begrenztes Cyberware-Abomodell"
 cyber_subscription_limited_desc: "Wir verbieten Herstellern von Cyberware, grundlegende Implantatfunktionen hinter Abomodellen zu verstecken."
 cyber_subscription: "Fügt der Spezieseigenschaft \"§Y$trait_cybernetic$§!\" die folgenden Modifikatoren hinzu:\n$t$Zufriedenheit: §R-5%§!\n$t$$BONUS_WORKFORCE_FOR$ ['concept_planet_traders']: §G+25%§!"
 cyber_subscription_megacorp: "Fügt der Spezieseigenschaft \"§Y$trait_cybernetic$§!\" die folgenden Modifikatoren hinzu:\n$t$Zufriedenheit: §R-5%§!\n$t$$BONUS_WORKFORCE_FOR$ ['concept_planet_traders']: §G+50%§!"
 cyber.655.name: "Unvorhersehbares mechanisches Versagen"
 cyber.655.desc: "Unsere Cyberware-Ingenieure sind mit einer interessanten Profitidee an uns herangetreten. Mit einer nur geringfügigen Verringerung der Implantathaltbarkeit könnten wir unsere Gewinne beträchtlich erhöhen, da die Nutzer Teile öfter ersetzen müssten.\n\nDurch die Verwendung einer minderwertigen Biolegierung in jenen Bereichen, die besonders von Verschleiß betroffen sind, sollten die Implantate so ausfallen, dass der Schaden für den Verbraucher zwar möglichst gering, aber ein Austausch dennoch erforderlich wird."
 cyber.655.a: "Eine Unverschämtheit!"
 cyber.655.a.tt: "Wir werden unsere Bevölkerung nicht mit minderwertigen Komponenten versorgen!\n\n"
 cyber.655.b: "Interessant ... Beginnt damit, die Cyberware weniger haltbar zu machen."
 cyber.655.c: "Gute Idee! Verbindet das auch direkt mit einer Preiserhöhung."
 cyber.655.d: "Nutzt diese Daten, um unsere Kybernetisierungsbemühungen weiter zu verstärken."
 worse_parts: "Minderwertige Teile"
 worse_parts_desc: "Wir haben uns absichtlich dafür entschieden, unsere Bevölkerung mit minderwertigen kybernetischen Komponenten auszustatten, damit sie häufiger Ersatzteile von uns kaufen muss."
 worse_parts_effect_tt: "$r_trade$ für jeweils $pop_group_unit$ £pop£ §HBewohner§! mit der Eigenschaft \"§Y$trait_auto_mod_cyborg$§!\": §G+0.5§!"
 optimized_parts: "Optimierte Teile"
 optimized_parts_desc: "Wir haben unsere kybernetischen Komponenten weiterentwickelt und verbessert, was die Installation sowohl schneller als auch sicherer macht."
 optimized_parts_effect_tt: "$r_energy$ Unterhalt für £pop£ §HBewohner§! mit der Eigenschaft \"§Y$trait_auto_mod_cyborg$§!\": §R+0,1§!"
 cyber.660.name: "Unvorhersehbares gesellschaftliches Versagen"
 cyber.660.desc: "Unsere Bevölkerung hat unsere Pläne zur gewollten Produktalterung aufgedeckt.\n\nDie Straßen sind voller [Owner.GetSpeciesNamePlural], die über die jüngsten Änderungen, welche wir an der Qualität und den Kosten von Cyberware vorgenommen haben, empört sind. Sie fordern lautstark, dass wir diese Änderungen rückgängig machen."
 cyber.660.a: "Zugegeben, das war ein bisschen zu gierig."
 cyber.660.b: "Wie bitte? WIR KÖNNEN EUCH NICHT HÖREN!"
 cyber.660.c: "Wir gehen auf keine Forderungen ein."
 discontent: "Unzufriedenheit"
 discontent_desc: "Unsere Bevölkerung ist aufgebracht, weil die Preise für Cyberware gestiegen und die Qualität gesunken ist."
 cyber.805.name: "Elterliche Kontrolle"
 cyber.805.desc: "Nachdem Säuglingen Hirnimplantate eingesetzt werden, fordern Erziehungsberechtigte mehr Kontrolle über ihre Kinder. Die Fähigkeit, motorische Funktionen zu übernehmen, ist derzeit Vollstreckern vorbehalten, doch einige wollen diese Rechte auch auf die Erziehungsberechtigten ausdehnen.\n\nObwohl dies ein klarer Verstoß gegen die körperliche Autonomie ist, sind verschiedene andere Formen der elterlichen Kontrolle und Übernahme bereits erlaubt. Die Alternative wäre, eine begrenzte Kontrolle zuzulassen, wie beispielsweise die Lautstärke eines sich falsch verhaltenden quengelnden Kindes zu reduzieren."
 cyber.805.a: "Erlaubt es Erwachsenen, ihre Kinder zu kontrollieren."
 cyber.805.b: "Erlaubt es ihnen, eine begrenzte Kontrolle auszuüben."
 cyber.805.c: "Ein ferngesteuerte Körperkontrolle bleibt Vollstreckern vorbehalten."
 cyber.810.name: "Wissenstransfer"
 cyber.810.desc: "Die Entwicklung kybernetischer Gehirnimplantate bietet eine verlockende Gelegenheit. Anstatt sich auf subjektive und langsame Lehrmethoden zu verlassen, könnten wir Schlüsselwissen direkt von einem Gehirn auf ein anderes übertragen. Dies erfordert jedoch sterile Laborbedingungen und wäre daher nicht in großem Maßstab durchführbar. Die empfangenen Informationen überschreiben zudem Teile des eigenen Gedächtnisses.\n\nDer wirkungsvollste Anwendungsbereich für diese neue Technologie wäre der Wissensaustausch zwischen Wissenschaftlern. Es könnte einen Teil der technischen Schulden ausgleichen, die wir während des Kybernetisierungsprozesses angehäuft haben, oder aber für einen anderen Bereich verwendet werden."
 cyber.810.a: "Übertragt das Wissen der Ingenieur-Forschung."
 cyber.810.b: "Übertragt das Wissen der Physik-Forschung."
 cyber.810.c: "Übertragt das Wissen der Sozial-Forschung."
 cyber.810.d: "Jeder sollte sein eigenes Wissen behalten dürfen."
 cyber.815.name: "Dezentrale Liebe"
 cyber.815.desc: "Obwohl viele [root.GetSpeciesNamePlural] ihr tägliches Leben und ihre Beziehungen mit Kybernetik von der Stange augmentiert haben, gibt es auch eine wachsende Zahl von Mehrparteienhaushalten, die sich stattdessen für ein privates Netzwerk mit eigens auf sie ausgerichteter Hardware entscheiden. Diese Hausgemeinschaften leben in einer maßgeschneiderten Isolation und teilen ihre Gefühle und Erfahrungen mit einer einzigartigen Intimität.\n\nManche Sozialhilfeorganisationen und Pädagogen begrüßen dieses Phänomen, da ihrer Meinung nach jeder von einer maßgeschneiderten Augmentierung von Beziehungen und Familienbanden profitieren sollte. Andere haben jedoch Bedenken geäußert, welche Folgen ein solcher Rückzug aus der Gesellschaft mit sich bringt, und sie argumentieren, Individuen könnten sich durch diese Praxis in künstlichen \"Liebesbewusstseinen\" verlieren."
 cyber.815.a: "Es geht uns nichts an, darüber zu entscheiden, wie sie leben und lieben wollen."
 cyber.815.a.tt: "Wir erlauben den Zugang zu benutzerspezifischer Hardware und privaten digitalen Räumen weiterhin."
 decentralized_families: "Dezentralisierte Familien"
 decentralized_families_desc: "Lebensgemeinschaften aller Art können ihre Beziehungen durch maßgeschneiderte Software und Augmentierungen bereichern."
 cyber.815.b: "Bringt diese Familien zurück in die Gesellschaft."
 cyber.815.b.tt: "Wir raten zugunsten strenger regulierter Lösungen von einer maßgeschneiderten Augmentierung ab."
 centralized_families: "Zentralisierte Familien"
 centralized_families_desc: "Strengere Kontrollen für kybernetische Augmentierungen und ihre Software halten Lebensgemeinschaften davon ab, digital abgeschirmte Oasen zu errichten." #as in a richly decorated but enclosed space
 cyber.820.name: "Radikales Selbstbild"
 cyber.820.desc: "Subkulturen, die am Rand der Gesellschaft stehen, gab es in der [root.GetSpeciesAdj]en Geschichte schon immer, doch mit dem Aufkommen kybernetischer Verbesserungen hat sich die Lage gewandelt: Randgruppen haben begonnen, sich derart radikal zu verändern, dass sie nicht mehr als [root.GetSpeciesAdj] erscheinen. Vor allem die Jugend mit ihrer Vorliebe für stark modifizierte [root.GetSpeciesHandNamePlural], 3-D-Körperkunst und andere dekorative Anhängsel treibt einen immer größeren Keil zwischen die Generationen.\n\nIhre Befürworter behaupten, sie würden ihr wahres Selbst annehmen und durch den Verzicht auf die [root.GetSpeciesAdj]e Homogenität die Kontrolle über ihr eigenes Leben erlangen. Diese Ansichten werden von einer wachsenden Zahl besorgter Eltern und Sozialexperten nicht geteilt, die diese Form der Individualität als absonderlich anprangern und der Auffassung sind, damit würde die Gesellschaft zerstört."
 cyber.820.a: "Wir müssen die Körpermodifizierung strenger regulieren."
 cyber.820.b: "Das ist nur eine Phase. Das geht vorüber."
 radical_image: "Radikales Selbstbild"
 radical_image_desc: "Die jüngste Generation dieser Gesellschaft experimentiert mutig mit ihrem Aussehen."
 cyber.820.c: "Vielleicht können wir von diesen jungen [root.GetSpeciesNamePlural] etwas lernen."
 radical_insights: "Radikale Einsichten"
 radical_insights_desc: "Dem Vorbild gegenkultureller Körpermodifizierung entsprechend experimentiert diese Gesellschaft an ihrem eigenen Aussehen mit neuen Formen der ästhetischen Augmentierung."
 cyber.821.name: "Radikale Proteste"
 cyber.821.desc: "Besorgte Jugendliche, Aktivisten und Künstler haben sich zu Tausenden versammelt, um die freie Nutzung kybernetischer Augmentierungen zu fordern. Die Demonstranten reichen von äußerlich natürlich aussehenden [root.GetSpeciesNamePlural] bis hin zu Individuen mit modifizierten Gliedmaßen, umgestalteten Oberkörpern und anderen fremdartig aussehenden Formen. Sie verkünden ihre Solidarität zu [root.GetAdj]en Bürgern, die wegen ihrer kybernetischen Modifikationen diskriminiert werden."
 cyber.821.a: "Wir lassen uns von ihnen nicht von unserem Weg abbringen."
 cyber.821.a.tt: "Wir verfolgen weiterhin einen kollektivistischen Ansatz in der Kybernetik."
 radical_image_denied: "Verweigerung des radikalen Selbstbilds"
 radical_image_denied_desc: "Die jüngsten Proteste gegen das Recht auf freie Meinungsäußerung durch kybernetische Augmentierungen sind eskaliert."
 cyber.821.b: "Wir ziehen ihre Forderungen in Betracht."
 cyber.821.b.tt: "Individuen können frei entscheiden, welche kybernetischen Augmentierungen sie vornehmen wollen."
 radical_image_upheld: "Aufrechterhaltung des radikalen Selbstbilds"
 radical_image_upheld_desc: "Die jüngsten Proteste haben einige Rechte auf freie Meinungsäußerung durch sichtbare kybernetische Augmentierungen sichergestellt."
 cyber.822.name: "Radikale Physiologie"
 cyber.822.desc: "Medizinisches Personal hat sich über die bizarren und noch nie da gewesenen Hindernisse beschwert, denen es sich bei der Behandlung von Patienten mit einzigartigen kybernetischen Augmentierungen gegenübersieht.\n\nViele dieser aufwendig gestalteten Individuen erfordern spezielle Behandlungsmaßnahmen und besondere Werkzeuge oder die vollständige Demontage, selbst bei kleineren Beschwerden. Die Kosten für solche Eingriffe übersteigen bei Weitem jene, die bei nicht modifizierten [root.GetSpeciesNamePlural] anfallen."
 cyber.822.a: "Die Kosten sind gerechtfertigt."
 cyber.822.b: "Es war ein Fehler, so viel Individualität zuzulassen."
 #Cold Metal
 cyber.830.name: "Schüttelfrost"
 cyber.830.desc: "Ein Teil unserer augmentierten Bevölkerung berichtet, sie verspürt Schmerzen, wenn sie sich kaltem Wetter ausgesetzt sieht. Besonders ernst ist die Lage auf §H[cold_planet.GetName]§!, wo Temperaturen um den Gefrierpunkt die Norm sind.\n\nMetallimplantate sind dafür bekannt, dass sie sich bei niedrigen Temperaturen unangenehm anfühlen, doch sie sollten keine so schwerwiegende Reaktion hervorrufen. Die Situation wirkt sich auch auf unsere Produktion aus."
 cyber.830.a: "Gebt eine medizinische Studie in Auftrag."
 cyber.830.b: "Ihr Leiden liegt nicht in unserer Verantwortung."
 cyber.830.tooltip: "Fügt der Spezieseigenschaft \"§Y$trait_cybernetic$§!\" die folgenden Modifikatoren hinzu:$TABBED_NEW_LINE$Bewohnbarkeit (Alpin/Arktisch/Tundra): §R-20%§!"
 COLD_METAL_PROJECT: "Kaltes Metall"
 COLD_METAL_PROJECT_DESC: "Bevölkerungsgruppen, die in kalten Klimazonen leben, berichten über Fälle von starken Schmerzen im Zusammenhang mit kybernetischen Implantaten. Eine klinische Studie wird es uns ermöglichen, mehr Daten zu sammeln."
 cyber.835.name: "Medizinischer Bericht"
 cyber.835.desc: "In klinischen Studien war kein eindeutiger Zusammenhang zwischen dem Kontakt von Cyberware mit kaltem Wetter und dem Alter, dem Geschlecht, dem Beruf und der Art der von den betroffenen Patienten verwendeten Implantate festzustellen.\n\nManche Mediziner haben die These aufgestellt, die Schmerzen seien psychosomatischer Natur und die Behandlung sollte auf Schmerzmittel und Verhaltenstherapien beschränkt werden. Andere fordern uns auf, das Problem nicht zu unterschätzen und stattdessen ein Programm zur Verbesserung der Behandlungsmöglichkeiten zu finanzieren."
 cyber.835.a: "Ihr Schmerz ist nur in ihrem Kopf."
 cyber.835.b: "Wir sollten ein Forschungsprogramm finanzieren."
 cyber.835.c: "Siedelt die betroffenen Bewohner auf wärmere Planeten um."
 cyber.835.tooltip: "Entfernt die folgenden Modifikatoren von der Spezieseigenschaft \"§Y$trait_cybernetic$§!\":$TABBED_NEW_LINE$Bewohnbarkeit (Alpin/Arktisch/Tundra): §R-20%§!"
 cyber.840.name: "Wohin uns unsere Herzen tragen"
 cyber.840.desc: "Unser Volk ist seit jeher umhergereist. Wir sind Nomaden. Wir sind Wanderer. Doch wo einige das Reisen nur als Mittel ansehen, um ihr Ziel zu erreichen, ist für uns die Reise selbst das Ziel. Die Körperaugmentierung hat es uns einfacher gemacht, neue Welten zu erreichen, doch sie hat es uns zudem ermöglicht, diejenigen aufzuspüren, die sich zu weit von uns entfernen. Nicht jeder ist mit dieser Veränderung einverstanden.\n\nImmer mehr Bewohner manipulieren ihre Implantate, um ihre Privatsphäre zu schützen. Im Moment ist dies noch ein Nischentrend, doch sollte er an Beliebtheit gewinnen, könnte er ein Problem darstellen."
 cyber.840.a: "Sie haben recht. Verbietet Überwachungstechnologien."
 cyber.840.b: "Das wird schon niemandem schaden."
 cyber.840.c: "Bietet ihnen nicht nachverfolgbare Implantate an ... zu einem gewissen Aufpreis."
 cyber.840.d: "Beruhigt die Aufständischen. Überwachungstechnologie ist unserer Gesellschaft nicht mehr wegzudenken."
 cyber_wanderers: "Rastlose Wanderer"
 cyber_wanderers_desc: "Schwer aufzuspüren. Überall leicht zu finden."
 cyber_wanderers_tracked: "An der Leine"
 cyber_wanderers_tracked_desc: "Unser Volk schätzt seine Freiheit und lehnt jede Art von Überwachungstechnologie vehement ab."
 cyber.855.name: "Den Anforderungen gerecht werden" #Idiom: if you achieve a required score, you 'make the grade'; similar to 'make the cut'
 cyber.855.intro.desc: "Kognitive Mikroprozessoren, verbesserte KI-Tutoren, Designer-Enzyme zur Förderung der neuroplastischen Regeneration - und das alles nur für Vorschulkinder."
 cyber.855.gov.desc: "$cyber.855.intro.desc$\n\nMit dem technologischen Wandel Schritt zu halten, ist eine große Belastung für unsere staatlich geförderten Bildungsprogramme. Die Leistungen zwischen denjenigen, die auf öffentliche Zuschüsse angewiesen sind, und denen, die sich die modernste Technologie leisten können, klaffen immer weiter auseinander.\n\nDamit unser Bildungssystem für alle zugänglich bleibt, müssen in den nächsten 5 Jahren erhebliche Investitionen erfolgen."
 cyber.855.corp.desc: "$cyber.855.intro.desc$\n\nEine gute Ausbildung kann teuer sein, doch für viele wird es immer schwieriger, mit dem technologischen Wandel Schritt zu halten. Die Kluft zwischen jenen, die sich eine hochmoderne Ausstattung leisten können, und jenen, die auf ältere Modelle zurückgreifen müssen, welche aus zweiter Hand stammen oder vererbt wurden, wird immer größer.\n\nUm zu verhindern, dass die sozialen Schichten noch weiter auseinanderdriften, müssen in den nächsten 5 Jahren erhebliche Investitionen in unser Bildungssystem erfolgen."
 cyber.855.a: "Die Kosten sind einfach zu hoch."
 cyber.855.b: "Bildung muss für alle zugänglich bleiben."
 cyber_education: "Augmentierte Bildung"
 cyber_education.tt: "Wir werden ein auf fünf Jahre angelegtes Programm zur Förderung eines vollständig augmentierten Bildungssystems finanzieren."
 cyber.860.name: "Egalitäre Exzellenz"
 cyber.860.desc: "Unsere Investitionen in die Augmentierung der Bildung haben sich ausgezahlt.\n\nDer öffentliche Zugang zu hochwertiger Kybernetik hat eine echte akademische Leistungsgesellschaft geschaffen, in der jeder - unabhängig von seiner sozialen Schicht - sein volles Potenzial entfalten kann. Die Vorteile sind besonders in den Wissenschaften spürbar, wo sich die Forschungsproduktion und die Erfindung neuer Innovationen im Allgemeinen verbessert haben."
 egalitarian_excellence: "Egalitäre Exzellenz"
 egalitarian_excellence.tt: "Eine gut ausgebildete und vollständig augmentierte Bevölkerung ist der Schlüssel zum sozialen und materiellen Fortschritt."
 cyber.865.name: "Außergewöhnliche Anführer"
 cyber.865.desc: "Auf eine öffentliche Finanzierung der Bildungsaugmentierung zu verzichten, hat sich als weise erwiesen.\n\nWir sind eine Gesellschaft, die an individuelle Spitzenleistungen glaubt. Trotz vereinzelter Kritik an der zunehmenden \"sozialen Kluft\" hat der akademische Wettbewerb einige der am besten ausgebildeten und produktivsten Anführer der gesamten Galaxie hervorgebracht."
 exceptional_leaders: "Außergewöhnliche Anführer"
 exceptional_leaders.tt: "Unsere besten Talente auf individueller Ebene weiterzuentwickeln, hat außergewöhnliche Anführer hervorgebracht."
 cyber.1005.name: "Überschreiten des Möglichen"
 cyber.1005.desc: "\"Die [Species.GetNamePlural] haben einen weiteren Rekord gebrochen\", ist eine Schlagzeile, die im [Owner.GetAdjective]en Sport alltäglich geworden ist. Während [GetAthletePlural] darum wetteifern, sich gegenseitig mit neueren und raffinierteren Modifikationen zu übertreffen, dehnen sich die Grenzen sportlicher Leistungen immer weiter aus.\n\nObwohl die Fans dieser \"verbesserten Athleten\" von den Ergebnissen begeistert sind, fordert eine wachsende Zahl von Hardcore-Anhängern, dass verbesserte [GetAthletePlural] separat behandelt werden sollten. Eine dritte Gruppe möchte stattdessen die Anzahl an modifizierten [Species.GetNamePlural], die an Mannschaftswettbewerben teilnehmen, begrenzen, damit natürliche [GetAthletePlural] ebenfalls einen Platz im Rampenlicht haben können."
 cyber.1005.a: "Die Unmodifizierten hatten ihre Zeit."
 cyber.1005.a.tt: "Ermutigt modifizierte [GetAthletePlural] dazu, Innovationen voranzutreiben."
 cyber.1005.b: "Gründet eine eigene Liga für die modifizierten [GetAthletePlural]."
 cyber.1005.c: "Begrenzt die Anzahl an modifizierten [GetAthletePlural]."
 cyber_athletes: "Kybernetische Athleten"
 cyber_athletes_desc: "Indem wir modifizierte Athleten im Sport fördern, können wir die modernste Cyberware in der Praxis testen."
 cyber_athlete_leagues: "Liga für kybernetische Athleten"
 cyber_athlete_leagues_desc: "Die Trennung in \"natürliche\" und augmentierte Sportler gewährleistet einen fairen Wettbewerb für alle."
 limited_cyber_athletes: "Begrenzte Anzahl an kybernetischen Athleten"
 limited_cyber_athletes_desc: "Die maximale Anzahl an modifizierten Athleten zu begrenzen, sorgt dafür, dass jede Mannschaft eine echte Chance auf Erfolg hat."
 athlete_plural: "Athleten"
 cyber.1010.name: "Zu verkaufen: Der Himmel"
 cyber.1010.desc: "§Y[sky_megacorp.GetName]§! hat uns einen lukrativen Vorschlag unterbreitet. Man möchte für sein neuestes Produkt werben, ein energiespendendes Getränk namens Plasma Quench.\n\nDie Werbung für das Getränk wird direkt in die Okularimplantate unserer Bürger projiziert, wenn sie zufällig in den Himmel schauen. Die damit erzielten Einnahmen ließen sich für eine Vielzahl von Projekten verwenden.\n\nTrotz des invasiven Charakters der Werbung hat man uns versichert, das Getränk selbst sei köstlich und völlig ungiftig."
 cyber.1010.a: "Trinkt noch heute Plasma Quench!" #Feel free to localize Plasma Quench to sound like a slimy energy drink. No need to make it word for word.
 cyber.1010.b: "Der Himmel steht nicht zum Verkauf."
 cyber.1010.c: "Lasst uns die Bedingungen aushandeln."
 cyber.1010.d: "Wir sind nicht interessiert."
 cyber.1015.desc: "§Y[sky_megacorp.GetName]§! ist mit einem neuen Angebot für das beliebteste Energiegetränk der Galaxie, Plasma Quench, zurückgekehrt. Da der Verkauf unseres digitalen Himmels so gut funktioniert hat, hat man darum gebeten, auch in der physischen Welt weitere Werbung schalten zu dürfen.\n\n\"[most_populous.GetName] ist der ideale Standort für eine Werbekampagne\", erklärte ein Sprecher von [sky_megacorp.GetName]. Ist es denn nicht fairer, dass jeder Zugang zu solch unglaublichen Möglichkeiten hat?"
 cyber.1015.a: "Möge das Plasma fließen!"
 cyber.1015.a.tt: "Platziert gigantische Werbetafeln auf ganz §Y[most_populous.GetName]§!."
 cyber.1015.b: "Unser digitaler Himmel muss ausreichen."
 cyber.1015.c: "Unser Volk muss wieder frei sehen können!"
 sold_sky_1: "Digitale Werbetafeln"
 sold_sky_1_desc: "Die virtuelle Aufmerksamkeit unserer Bewohner zu verkaufen, war eine gute Entscheidung."
 sold_sky_1_mega: "$sold_sky_1$"
 sold_sky_1_mega_desc: "$sold_sky_1_desc$"
 sold_sky_2: "Planetare Werbetafeln"
 sold_sky_2_desc: "Die planetare Elite entschied sich dafür, den Himmel ihrer augmentierten Bürger zu verkaufen, um ein paar zusätzliche Ressourcen zu verdienen."
 sold_sky_2_mega: "$sold_sky_2$"
 sold_sky_2_mega_desc: "$sold_sky_2_desc$"
 cyber.1030.name: "Rechtswidrige Erinnerungen"
 cyber.1030.desc: "Da viele Implantate in der Lage sind, sensorische und emotionale Erfahrungen zu kontrollieren, ist der neue Trend entstanden, sich virtuelle Lebensereignisse anderer anzusehen, um sich entweder der Realität zu entziehen oder sich zu unterhalten. Obwohl Engramm-Künstler theoretisch jede Emotion stimulieren können, hat die Praxis morbide Züge angenommen.\n\nSpeicherengramm-Clubs zahlen hohe Summen für selbst aufgezeichnete, intensiv emotionale Erlebnisse wie Hochzeiten und Paarungsrituale, aber auch Suizide, Überfälle und Morde. Dies hat zu einem Anstieg der Kriminalität geführt, da Verbrecher sowohl sich selbst bei der Begehung von Straftaten aufzeichnen als auch die Implantate der Opfer nach einem traumatischen Erlebnis stehlen.\n\nWie sollten wir mit diesem Wahnsinn umgehen?"
 cyber.1030.a: "Geht hart gegen diese Industrie vor. Sie ist zu gefährlich."
 cyber.1030.a.tt: "Die Engramm-Unterhaltung wird verboten."
 cyber.1030.b: "Besteuert die Produktion"
 cyber.1030.b.tt: "Die Engramm-Unterhaltung wird als Einnahmequelle benutzt."
 cyber.1030.c: "Verhaftet jeden, der mit solchen Aufnahmen erwischt wird."
 cyber.1030.c.tt: "Unsere Strafverfolgung verhaftet jeden, der kriminelles Verhalten aufzeichnet."
 cyber.1030.d: "Das klingt äußerst dekadent. Befürwortet es."
 cyber.1030.d.tt: "Alle Formen des Vergnügens werden vom Staat gebilligt."
 cyber.1030.e: "Die endlose Erfahrung des Todes? Wie göttlich!"
 cyber.1030.e.tt: "Dies erlaubt es unseren Todespriestern, die Erfahrungen unserer Sterblichen Eingeweihten besser zu verstehen und zu kontrollieren."
 entertainment_crackdown: "Hartes Durchgreifen gegen Engramme"
 entertainment_crackdown_desc: "Aufgezeichnete Engramme zu Unterhaltungszwecken zu nutzen, wurde für illegal erklärt, um mögliches kriminelles Verhalten zu entmutigen."
 endorsed_entertainment: "Befürwortung von Engramm-Unterhaltung"
 endorsed_entertainment_desc: "Aufgezeichnete Engramme zu Unterhaltungszwecken zu nutzen, wird staatlich gebilligt und hat sich infolgedessen überall verbreitet."
 illicit_entertainment: "Rechtswidrige Engramme"
 illicit_entertainment_desc: "Die neuesten Gesetze zur Engramm-Unterhaltung haben dazu geführt, dass die Nachfrage nach dieser Dienstleistung zurückgegangen ist."
 decadent_entertainment: "Dekadente Engramme"
 decadent_entertainment_desc: "Unser Volk genießt die Freunden der Engramm-Unterhaltung. Zumindest so lange, bis der nächste kurzlebige Trend auftaucht."
 deadly_entertainment: "Tödliche Engramme"
 deadly_entertainment_desc: "Dank der Engramm-Unterhaltung können unsere Todespriester nun selbst erfahren, was es bedeutet, Leben zu nehmen und zu sterben. Dies hilft ihnen dabei, das Volk anzuleiten, insbesondere unsere Sterblichen Eingeweihten."
 cyber.1055.name: "Spionagespiele"
 cyber.1055.desc: "Aus entsetzlicher Dummheit hat ein Marinekadett Geheiminformationen weitergegeben. Der Kadett, ein begeisterter Fan vernetzter Kampfsimulatoren, geriet mit anderen Spielern in einen Streit über die Winkelgeschwindigkeit der Geschütztürme unserer Zerstörer.\n\nUm seine Position zu untermauern, lud der Kadett mehrere geheime Blaupausen unserer Schiffe hoch, die sich schnell im galaktischen Netz verbreiteten. Obwohl der Schuldige gefasst werden konnte, werden im Rat die Stimmen immer lauter, Online-Spiele generell zu verbieten."
 cyber.1055.a: "Es war ohnehin an der Zeit, die Flotte zu modernisieren."
 cyber.1055.b: "Verstärkt unsere Sicherheitsmaßnahmen."
 cyber.1055.c: "Der Rat hat recht. Verbietet die Spiele!"
 cyber.1055.d: "Verbreitet widersprüchliche Berichte, um die Informationen unglaubhaft zu machen."
 cyber_breach_overcome: "Spionagespiele: Flottenmodernisierung"
 cyber_breach_overcome_desc: "Was geschehen ist, ist geschehen. Wir werden daran arbeiten, unsere Flotten zu modernisieren, um die durchgesickerten Pläne unbrauchbar zu machen."
 cyber_breach_forgive: "Spionagespiele: Sicherheitsupdates"
 cyber_breach_forgive_desc: "Als Reaktion auf den Leak wurden unsere Sicherheitsprotokolle aktualisiert. Spieler stellen keine Bedrohung für die nationale Sicherheit dar. Es gibt keinen Grund, wegen eines dummen Fehlers zu überreagieren."
 cyber_breach_ban: "Spionagespiele: Totalverbot"
 cyber_breach_ban_desc: "Zusätzlich zur Verstärkung unserer operativen Sicherheit haben wir ein Verbot auf Online-Spiele verhängt."
 cyber.1055.leak.tt: "Jedes Mitglied der §YGalaktischen Gemeinschaft§! erhält §Y720§! Tage lang §Hmittlere§! §YMilitärinformationen§! über §Y[Root.GetName]§!."
 cyber.1055.minorleak.tt: "Jedes Mitglied der §YGalaktischen Gemeinschaft§! erhält §Y360§! Tage lang §Rgeringe§! §YMilitärinformationen§! über §Y[Root.GetName]§!."
 has_tradition_subterfuge_tt: "Diese Option ist verfügbar, weil wir den Traditionsbaum \"§YTäuschung§!\" vollständig abgeschlossen haben."
 cyber.1205.name: "Sensorische Zensur"
 cyber.1205.desc: "Die neueste Generation sensorischer Cyberware ermöglicht es dem Benutzer, unerwünschte Sinneseindrücke auszublenden. Von unwillkommenen Gerüchen bis hin zu unanständigen Bildern lässt sich alles verpixeln, maskieren oder sogar ganz aus der Wahrnehmung des Benutzers löschen. In den konservativeren Kreisen unserer Gesellschaft wächst die Besorgnis darüber, wie sich eine solche Zensur auf das Bewusstsein unserer Bürger auswirkt."
 cyber.1205.a: "Wir müssen uns der Realität stellen."
 cyber.1205.b: "Jeder hat ein Recht auf die Glückseligkeit der Unwissenheit."
 cyber.1205.c: "Das Wahrgenommene kosmetisch zu verändern, ist in Ordnung. Eine Zensur ist zu riskant."
 cyber.1205.d: "Wir werden ihre Sinne kuratieren."
 cyber_censure_truth: "Sensorische Zensur: Verboten"
 cyber_censure_truth_desc: "Es ist unserer Bevölkerung verboten, Wahrnehmungsfilter anzuwenden, die Elemente des realen Lebens ausblenden. Wir müssen der Wahrheit jederzeit entgegenblicken."
 cyber_censure_total: "Sensorische Zensur: Totale Zensur"
 cyber_censure_total_desc: "Wenn einem die Realität zu unangenehm ist, warum dann nicht einfach störende Elemente ausblenden? Wenn man nicht will, muss man auch nicht Zeuge von Verbrechen, Elend oder Vorurteilen werden."
 cyber_censure_partial: "Sensorische Umgestaltung"
 cyber_censure_partial_desc: "Wir haben es unserer Bevölkerung erlaubt, ihre Implantate mit Wahrnehmungsveränderungsalgorithmen zu versehen. Damit kann sie lebendige Farben und Effekte in ihr ansonsten tristes Dasein bringen."
 cyber_censure_authoritarian: "Staatlich geforderte sensorische Zensur"
 cyber_censure_authoritarian_desc: "Wir kontrollieren, wie unsere Bürger die Realität wahrnehmen. Indem wir abweichendes Verhalten aus der Wahrnehmung unserer loyalen Staatsbürger löschen, bewahren wir sie vor denen, die sie in die Irre führen wollen."
 cyber.1210.name: "Subliminalhack-Botschaften"
 cyber.1210.desc: "In jüngster Zeit hat innerhalb von Untergrundbewegungen und ambitionierten Unternehmen der Trend Einzug gehalten, Benutzern heimliche Botschaften in die Cyberware zu implantieren. Gefälschte Erinnerungen, selektive Hormonreaktionen und die Manipulation von Träumen werden immer alltäglicher. Einige besorgte Politiker haben uns auf das Problem aufmerksam gemacht und sich für ein Verbot oder zumindest eine Regulierung dieser invasiven Botschaften eingesetzt."
 cyber.1210.a: "Wir dürfen solche Praktiken nicht dulden!"
 cyber.1210.b: "Raffiniert! Erlaubt die Praktiken."
 cyber.1210.c: "Lizenziert die Praktiken zu unserem Vorteil!"
 cyber.1210.d: "Nutzt den Trend, um unseren Glauben zu verbreiten."
 cyber_subliminhack_banned: "Subliminalhack: Verboten"
 cyber_subliminhack_banned_desc: "Wir haben die Verwendung unterschwelliger Botschaften in Cyberware verboten."
 cyber_subliminhack_allowed: "Subliminalhack: Erlaubt"
 cyber_subliminhack_allowed_desc: "Wir haben die Verwendung unterschwelliger Botschaften in Cyberware erlaubt. Auf einem freien Markt ist alles zulässig."
 cyber_subliminhack_licensed: "Subliminalhack: Lizenziert"
 cyber_subliminhack_licensed_desc: "Wir verkaufen Lizenzen, die die Nutzung unterschwelliger Botschaften in Cyberware ermöglichen."
 cyber_subliminhack_hallowed: "Subliminalhack: Missionierung"
 cyber_subliminhack_hallowed_desc: "Wir nutzen unterschwellige Botschaften in Cyberware, um unseren Glauben zu verbreiten."
 cyber.1255.name: "Cyber-Sicherheitssysteme durchbrochen"
 cyber.1255.intro: "Kürzlich wurden mehrere geheime Dokumente illegal von einem Server heruntergeladen. Unsere Sicherheitsbeauftragten versichern nachdrücklich, dass alle primären und sekundären Firewalls intakt sind und es bisher keine Hinweise auf einen Cyberangriff von außen gäbe.\n\n"
 cyber.1255.gov.desc: "$cyber.1255.intro$Wir können daraus nur eine Schlussfolgerung ziehen: Es gibt eine undichte Stelle, und angesichts der Sensibilität der gestohlenen Informationen muss es sich um jemanden mit einer hochrangigen Freigabe handeln."
 cyber.1255.hack.desc: "$cyber.1255.intro$Wir können daraus nur eine Schlussfolgerung ziehen: Wir haben ein Leck - eines, das unsere Entscheidung für eine offene kybernetische Augmentierung infrage stellt."
 cyber.1255.a: "Leitet eine Untersuchung ein."
 leak_investigation: "Untersuchung des Datenlecks"
 leak_investigation_desc: "Um das Datenleck zu finden, müssen wir jeden untersuchen, der ein kybernetisches Implantat besitzt. Der Prozess wird wahrscheinlich ... intrusiv sein."
 cyber.1260.name: "Neuromantie"
 cyber.1260.desc: "Die Untersuchung unseres Cyber-Sicherheitslecks ist abgeschlossen, doch das Ergebnis ist beunruhigend.\n\nDie neurologische Wetware hochrangiger augmentierter Regierungsbeamter wurde gehackt. Externe Agenten manipulierten sie und zwangen sie, gegen ihren Willen zu handeln. Die betroffenen Beamten haben allerdings keine Erinnerung an diese Ereignisse.\n\nObwohl wir jetzt die Ursache für das Leck kennen, haben wir noch immer keine Spur, wer - oder was - letztlich dafür verantwortlich war. Durch die heimliche Einpflanzung falscher Daten in die Gehirne der betroffenen Beamten könnten wir jedoch das Leck zu seiner Quelle zurückzuverfolgen."
 leak_distrust: "Marionetten unter uns"
 leak_distrust_desc: "Wie können wir von unserem Volk erwarten, Vertrauen in unsere Führung zu haben, wenn jeder von uns eine Marionette sein könnte?"
 leader_trait_hacked: "Cyber-Marionette"
 leader_trait_hacked_desc: "Dieser Anführer wurde kompromittiert. Eine unbekannte Quelle hackte seine neurologische Wetware."
 hacked_leaders.tt: "Eine zufällige Anzahl von Cyborg-Anführern erhält die Eigenschaft \"§Y$leader_trait_hacked$§!\"."
 cyber.1265.name: "Bewusstseinsdiebe" #Playing on the word 'hijacker'
 cyber.1265.desc: "Wir haben sie!\n\nDie Verbrecher, die hinter den Cyberangriffen stecken, konnten aufgespürt werden! Diesen selbsternannten \"Bewusstseinsdieben\", die kein anderes Ziel hatten, als Chaos zu stiften, ist es gelungen, unsere Sicherheitssysteme mit peinlicher Leichtigkeit zu umgehen. Die Anführer dieser Gruppierung konnten bereits in Gewahrsam genommen werden, doch wir müssen noch immer entscheiden, was mit unseren kompromittierten Beamten geschehen soll.\n\nDie einfachste Lösung bestünde darin, eine speziell auf sie zugeschnittene Firewall um die betroffenen Implantate zu installieren. Sauberer, wenn auch riskanter wäre ein harter Neustart: Durch den Zugriff auf ihre grundlegenden kognitiven Funktionen könnte man die fraglichen Beamten \"abschalten\", während ein neues Betriebssystem installiert wird."
 cyber.1265.a: "Errichtet eine Firewall."
 cyber.1265.b: "Startet die Beamten neu."
 cyber.1265.c: "Sie sind uns auf den Fersen. Errichtet die Firewall!"
 cyber.1270.name: "Neu gestartet und wie neu"
 cyber.1270.desc: "Der harte Neustart unserer kompromittierten Beamten hatte einige unerwartete Nebenwirkungen: Jede Spur des neurologischen Hacks wurde gelöscht, aber auch ein Großteil ihres angesammelten Wissens und ihrer Erfahrungen.\n\nTrotz dieses Rückschlags berichten sie, sie hätten durch den \"Neustart\" ein tiefes Gefühl der beruflichen und persönlichen Erneuerung erfahren. Indem sie uns zu solch drastischen Maßnahmen zwangen, haben uns die Hacker vielleicht ungewollt einen Gefallen getan."
 rebooted_leaders: "Entfernt alle §Hnegativen Eigenschaften§! von Anführern mit der Eigenschaft \"§Y$leader_trait_hacked$§!\".\nFür jede entfernte Eigenschaft gehen §R300§! Erfahrung verloren."
 leader_hack_resolution: "Entschlossene Wachsamkeit"
 cyber.1275.name: "Neurologische Firewalls"
 cyber.1275.desc: "Unser Bewusstsein ist vorerst sicher.\n\nUnsere Wetware-Ingenieure haben erfolgreich eine neurologische Firewall entwickelt, die unsere kollektive Sicherheit aufrechterhält. Das Programm wird in diesem Augenblick bei allen derzeitigen und zukünftigen Beamten installiert. Dies wird sich zwar nachteilig auf die kognitive Grundfunktionalität unserer Anführer auswirken, doch zumindest hat uns das Projekt wertvolle Erkenntnisse bezüglich Datensicherheit geliefert."
 cyber.1275.a: "Sicherheit geht vor."
 leader_trait_firewalled: "Neurologische Firewall"
 leader_trait_firewalled_desc: "Unsere Anführer sind zwar vor Cyberangriffen sicher, aber sie sammeln weniger schnell neue Erfahrungen."
 hacked_and_firewalled_leaders.tt: "Entfernt die Eigenschaft \"§Y$leader_trait_hacked$§!\" und gibt allen Cyborg-Anführern die Eigenschaft \"§Y$leader_trait_firewalled$§!\"."
 #FINAL EVENT #
 #DEMOCRATIC
 cyber.1505.name: "Gesellschaft 2.0"
 cyber.1505.desc.individualist: "Unsere Gesellschaft fußt auf Demokratie, und es ist daher nur sinnvoll, dieses Fundament zu stärken. Unsere Kybernetik erlaubt es uns, zu allen gesellschaftlichen Fragen - ob nun kleine oder große - unsere Stimme abzugeben. Sie bietet so jedem Einzelnen die Möglichkeit, seine Meinung zu äußern. Die Fülle der damit verbundenen Daten ist unvorstellbar riesig, doch die Möglichkeiten sind grenzenlos."
 cyber.1505.desc.collectivist: "Anderen §Y[Species.GetNamePlural]§! offen seine Gedanken mitzuteilen, ist beängstigend, doch der anfängliche Schock weicht rasch einem Gefühl des Vertrauens und der Sicherheit. Wir sind uns darüber bewusst, was unser Gegenüber tut, und umgekehrt ist es sich über unsere Absichten im Klaren. Die Kommunikation erfolgt sofort und ohne Worte - als bloßer Gedanke. Um diese Klarheit des Geistes zu schützen, wurde das Cyberhirn angewiesen, Emotionen auszublenden, damit sie das Wesentliche nicht überdecken."
 cyber.1505.desc.neutral: "Trotz endloser Beratungssitzungen, Abstimmungsrunden und lebhafter Diskussionen bleibt unser Reich bezüglich der Frage einer kybernetisch verbesserten Gesellschaft unentschlossen. Bevor unser Reich infolge dieses Konflikts entzweit wird, muss die Führung eingreifen.\n\nWir könnten diese Gelegenheit nutzen, um unsere Kybernetik so zu verändern, dass sie dem demokratischen Prozess dient, oder aber einen radikaleren Ansatz wählen, bei dem jeder seine Gedanken über die Cyberware teilen kann. Letzteres würde auch erfordern, dass das Cyberhirn grundlegende Emotionen unterdrückt, um zu verhindern, dass heftige spontane Gedanken die unmittelbare Umgebung stören."
 cyber.1505.a: "Wir brauchen Cybergehirn-Abstimmungen in Echtzeit."
 cyber.1505.a.tt: "$change_auth_tt$ ['concept_auth_cyber_democratic_individualist']\n$unlock_edict_legislative_chorus$"
 cyber.1505.b: "Verbindet die Cybergehirne, um Erfahrungen auszutauschen."
 cyber.1505.b.tt: "$change_auth_tt$ ['concept_auth_cyber_democratic_collectivist']\n$unlock_edict_self_preservation_override$"
 cyber.1505.c: "$cyber_keep_auth_option$"
 cyber.1505.c.tt: "$keep_auth_tt$ ['concept_auth_democratic']"
 #OLIGARCHIC
 cyber.1510.name: "Neustrukturierung der Macht"
 cyber.1510.desc.individualist: "Es wurde nur allzu klar, dass Individuen aus der Menge herausstechen wollen und deshalb miteinander wetteifern. Unsere Pläne, dieses hyperkompetitive Verhalten mit einem gamifizierten System zu unterstützen, das die soziale Mobilität fördert und kleinere Belohnungen im Austausch für eine erhöhte Produktivität verspricht, kommen diesem Wunsch entgegen."
 cyber.1510.desc.collectivist: "Dass unser Volk ein Gemeinschaftsgefühl empfindet, ist wichtiger als die individuelle soziale Mobilität. Anstatt den Wettbewerb zu nutzen, werden wir das Potenzial des schlafenden augmentierten Gehirns anzapfen. Seine Rechenleistung ist über einen kybernetischen Uplink drahtlos mit einer Basisstation verbunden, die dem Testsubjekt während der Ruhephase Rechenaufgaben zuführt."
 cyber.1510.desc.neutral: "Unsere Untertanen haben es versäumt, sich für eine wettbewerbsfähigere oder gemeinschaftlichere Gesellschaft starkzumachen. Als ihre Vorgesetzten werden wir nun entscheiden, was für sie am besten ist.\n\nWir könnten entweder ein stark wettbewerbsorientiertes gamifiziertes System schaffen, bei dem bessere Leistungen zu Belohnungen führen und die Karriere vorantreiben, oder aber die Rechenleistung der gesamten Gemeinschaft über einen kybernetischen Uplink nutzen, um ihre schlafenden Gehirne mit unseren Serverfarmen zu verbinden."
 cyber.1510.a: "Lasst sie kämpfen, um unsere Gunst zu erlangen."
 cyber.1510.a.tt: "$change_auth_tt$ ['concept_auth_cyber_oligarchic_individualist']\n$unlock_edict_battle_royale$"
 cyber.1510.b: "Lasst sie arbeiten, während sie schlafen."
 cyber.1510.b.tt: "$change_auth_tt$ ['concept_auth_cyber_oligarchic_collectivist']\n$unlock_edict_stately_acclaim$"
 cyber.1510.c: "$cyber_keep_auth_option$"
 cyber.1510.c.tt: "$keep_auth_tt$ ['concept_auth_oligarchic']"
 #DICTATORIAL
 cyber.1515.name: "Kontrolle der Massen"
 cyber.1515.desc.individualist: "Das §Y[Species.GetAdj]e§! Volk lebt in einer Welt, in der die Augmentierten ihre Identität auf ganz neue Weise zum Ausdruck bringen können.\n\nDoch diese Freiheit ist nur eine Fassade, da verbesserte Überwachungsalgorithmen in ihren Implantaten jeden Einzelnen überwachen und abweichende Gedanken in dem Moment erkennen, in dem sich die Gehirnsynapsen verbinden."
 cyber.1515.desc.collectivist: "Gemeinsam ist man stark und bildet eine geeinte Front im Angesicht aller Widrigkeiten. Jeder kybernetisch verbesserte §Y[Species.GetName]§! kämpft für eine bessere Zukunft und vertraut darauf, dass die Person neben ihm dasselbe tut.\n\nUnser Volk kann in der Gewissheit leben, dass der eiserne Wille und die strahlende Persönlichkeit von §Y[Ruler.GetTitle] [Ruler.GetName]§! es in die Zukunft führen werden."
 cyber.1515.desc.neutral: "Da unser Volk an diesem Scheideweg zaudert, muss unser[Ruler.GetEFemaleDE] §Y[Ruler.GetTitle] [Ruler.GetName]§! diese einmalige Gelegenheit, die sich durch die Augmentierung bietet, ergreifen und eine Entscheidung treffen.\n\nSollen unserem Volk einige persönliche Freiheiten zugestanden werden, während es durch seine Implantate überwacht wird? Oder sollte es leichter vom Willen seines Anführers beeinflusst werden können?"
 cyber.1515.a: "Eine mäßige Freiheit mit Überwachung."
 cyber.1515.a.tt: "$change_auth_tt$ ['concept_auth_cyber_dictatorial_individualist']\n$unlock_edict_self_indictment_protocol$"
 cyber.1515.b: "Unsere Anführer werden uns leiten."
 cyber.1515.b.official.tt: "$change_auth_tt$ ['concept_auth_cyber_dictatorial_collectivist_official']\n$unlock_edict_love_letter_virus$"
 cyber.1515.b.commander.tt: "$change_auth_tt$ ['concept_auth_cyber_dictatorial_collectivist_commander']\n$unlock_edict_love_letter_virus$"
 cyber.1515.b.scientist.tt: "$change_auth_tt$ ['concept_auth_cyber_dictatorial_collectivist_scientist']\n$unlock_edict_love_letter_virus$"
 cyber.1515.b.vacant.tt: "$change_auth_tt$ ['concept_auth_cyber_dictatorial_collectivist_vacant']\n$unlock_edict_love_letter_virus$"
 cyber.1515.c: "$cyber_keep_auth_option$"
 cyber.1515.c.tt: "$keep_auth_tt$ ['concept_auth_dictatorial']"
 #IMPERIAL
 cyber.1520.name: "Lang lebe das Imperium!"
 cyber.1520.desc.individualist: "Der imperiale Sitz hat verfügt, dass sich unsere Bemühungen auf die Dynastie selbst konzentrieren sollten. Ein spezieller §Y$r_the_rulerchip$§! wird allen zukünftigen Herrschern implantiert, um ihre Erfahrungen als [root.GetRulerTitle] von §Y[root.GetName]§! aufzuzeichnen. Dieses Relikt wird anschließend beim Ableben des Herrschers auf den Thronfolger übertragen.\n\nDer über Generationen hinweg weitergegebene $r_the_rulerchip$ und seine riesige Bibliothek an Erfahrungen werden das Fundament unserer Gesellschaft bilden. Wir können zudem die Erfahrungen unserer Bevölkerung für unseren Anführer nutzen."
 cyber.1520.desc.collectivist: "Wir müssen einen gewaltigen §Y$building_cyberdome$§! auf §Y[root.Capital.GetName]§! bauen, um unserer Bevölkerung eine Pause von ihren harten Strapazen zu bieten. Er wird als glorreicher Austragungsort für neuartige Cybersportarten dienen, bei denen augmentierte Athleten um unsere Gunst kämpfen. Der Anblick eines solch brutalen Wettkampfs wird die Massen beflügeln und ihre Bewunderung für §Y[root.GetName]§! sicherstellen.\n\nDarüber hinaus ließen sich diese Spektakel direkt in die Cyberhirne des gesamten Reiches übertragen. Es würde die ausgelassenen Massen auch dazu einladen, nach [root.Capital.GetName] zu reisen, um den Nervenkitzel aus der Nähe zu erleben."
 cyber.1520.desc.neutral: "Unser gesellschaftlicher Fortschritt auf dem Gebiet der Kybernetik steht an einem Scheideweg. Wir können unsere Bemühungen entweder auf das Wohl der wenigen oder das der vielen konzentrieren. Beides würde letztlich §Y[root.GetName]§! zugutekommen.\n\nEinerseits würde es uns die Entwicklung eines speziellen Implantats ermöglichen, um die Erfahrungen, die unser[root.GetEFemaleDE] [root.GetRulerTitle] zu Lebzeiten sammelt, auf den Thronfolger zu übertragen. Andererseits würde uns der Fokus auf augmentierte Cybersport- und Übertragungstechnologien es erlauben, gewaltige Veranstaltungen auf unserer Hauptwelt [root.Capital.GetName] zu organisieren, um die Massen für uns zu gewinnen."
 cyber.1520.a: "Bewahrt das imperiale Wissen."
 cyber.1520.a.tt: "$change_auth_tt$ ['concept_auth_cyber_imperial_individualist']\n$create_relic_the_rulerchip$\n$unlock_edict_levied_experience$"
 cyber.1520.b: "Veranstaltet ein Cybersportereignis auf der Hauptwelt und übertragt es ins ganze Reich!"
 cyber.1520.b.tt: "$change_auth_tt$ ['concept_auth_cyber_imperial_collectivist']\n$unlock_building_cyberdome$\n$unlock_edict_neurocasted_spectacles$"
 cyber.1520.c: "$cyber_keep_auth_option$"
 cyber.1520.c.tt: "$keep_auth_tt$ ['concept_auth_imperial']"
 #CORPORATE
 cyber.1525.name: "Implantat GmbH"
 cyber.1525.desc.individualist: "Die §Y[Species.GetAdj]en§! Fokusgruppen reagieren positiv auf ihre neuen Okularimplantate. Unsere Marktforschungsabteilung hat einen bemerkenswerten Anstieg an Werbewirksamkeit bei den Testsubjekten verzeichnet und infolgedessen vielversprechende Prognosen für unser gesamtes Verkaufsportfolio aufgestellt. Die bevorstehende vollständige Produkteinführung birgt immenses Potenzial!\n\nDas Zeitalter der Kybernetik ist angebrochen, und wir sind bestens gerüstet, mit unserer neuen Unternehmensstrategie maximalen Profit daraus zu ziehen."
 cyber.1525.desc.collectivist: "Unsere Pionierarbeit für eine ganzheitliche Selbstverbesserung findet bei der Bevölkerung großen Anklang.\n\nDie Berücksichtigung sozioökonomischer Belange entspricht unserer Unternehmensvision und sorgt dafür, dass ständig neue Generationen von \"Must-have\"-Implantaten eingeführt werden."
 cyber.1525.desc.neutral: "Angesichts der enormen Veränderungen, die die kybernetische Technologie der Gesellschaft brachte, ist es kaum verwunderlich, dass der Durchschnittsverbraucher Probleme damit hat, eine Entscheidung zu treffen. Sollte die individuelle Differenzierung zum Standard werden oder soll das kollektive Wohlergehen im Vordergrund stehen?\n\nDiese wichtige Entscheidung hat weitreichende Folgen, aber Unentschlossenheit ist der Tod des Profits. Es muss eine Entscheidung getroffen werden!"
 cyber.1525.a: "Bringt werbegestützte Implantate auf den Markt."
 cyber.1525.a.tt: "$change_auth_tt$ ['concept_auth_cyber_corporate_individualist']\n$unlock_edict_customer_insights$"
 cyber.1525.b: "Wir sollten uns auf ständige Implantatverbesserungen spezialisieren."
 cyber.1525.b.tt: "$change_auth_tt$ ['concept_auth_cyber_corporate_collectivist']\n$unlock_edict_rolling_updates$\n$unlock_agenda_augmentation_product_launch$"
 cyber.1525.c: "$cyber_keep_auth_option$"
 cyber.1525.c.tt: "$keep_auth_tt$ ['concept_auth_corporate']"
