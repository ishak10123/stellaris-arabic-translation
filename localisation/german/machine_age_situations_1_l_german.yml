 auth_cyber_imperial_individualist: "Imperialer Chipsatz"
 auth_cyber_imperial_individualist_desc: "Der designierte Nachfolger des Kaiserthrons erbt nicht nur das Amt, sondern auch ein spezielles, über Generationen weitergegebenes Implantat. Es enthält einen unvergleichlichen Schatz an Wissen seiner Vorgänger und vermittelt alle Nuancen der Regierungsführung. Dieselbe Technologie verwendet man im gesamten Reich in abgeschwächter Form, damit Individuen ihr Wissen weitergeben können."
