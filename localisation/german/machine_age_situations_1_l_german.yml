 #Static Modifiers
 borrowed_research: "Geliehene Forschung"
 borrowed_research_desc: "Gestohlene Forschungsergebnisse sind in die Kybernetisierung eingeflossen, was zu Unruhen geführt hat."
 researcher_media_relations: "Abgezweigte Forschungsmittel"
 researcher_media_relations_desc: "Mittel, die für die Forschung bestimmt waren, werden für die Öffentlichkeitsarbeit umgeleitet."
 bad_publicity: "Negative Schlagzeilen"
 bad_publicity_desc: "Ein beliebter Film hat die öffentliche Meinung gegen die Pläne der Regierung aufgebracht."
 state_censorship: "Staatliche Zensur"
 state_censorship_desc: "Die raue Behandlung von Abtrünnigen hat die Unzufriedenheit geschürt."
 cyber_state_censorship: "Kybernetikzensur"
 cyber_state_censorship_desc: "Das Verbot eines beliebten Melodrams hat das Volk gegen die Übervorteilung durch die Regierung aufgebracht."
 cyber_victim_compensation: "Entschädigung der Opfer"
 cyber_victim_compensation_desc: "Die Familien jener, die unter den Folgen einer fehlgeschlagenen experimentellen Augmentierung leiden, werden entschädigt."
 cyber_anti_faith: "Kalter harter Stahl"
 cyber_anti_faith_desc: "Wir haben die Bedenken religiöser Gruppen ignoriert, um unsere Kybernetisierungsinitiative voranzutreiben."
 cyber_rulers_force_tests: "Zwangselitetestsubjekte"
