 cyber_hive_imperfect_drones_desc: "Jeder ist nützlich."
 cyber_hive_recycling_implants: "Implantatrecycling"
 cyber_hive_recycling_implants_desc: "Alte Implantate für neue Drohnen."
 cyber_hive_recycling_everything: "Erbitterte Effizienz"
 cyber_hive_recycling_everything_desc: "Nichts ist heilig. Nichts wird vergeudet."
 cyber_hive_cyber_babies: "Kybernetisierung der Jugend"
 cyber_hive_cyber_babies_desc: "Neue Drohnen werden bereits beim Laichen mit Implantaten ausgestattet."
