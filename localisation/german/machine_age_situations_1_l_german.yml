 futureshock_chain_title: "Zukunftsschock"
 futureshock_chain_desc: "Wir geben uns nicht mit dem zufrieden, was die Natur für uns vorgesehen hat. Stattdessen streben wir danach, die Grenzen des organischen Körpers auszudehnen. Bei der flächendeckenden Verbreitung von Implantaten sind wir nur auf geringfügige Probleme gestoßen, die sich alle leicht beheben lassen. Die überwiegende Mehrheit der Bevölkerung ist begeistert von den neuen kybernetischen Möglichkeiten.\n\nWir stehen an der Schwelle zu wahrer Größe. Wie es weitergeht, bleibt abzuwarten."
