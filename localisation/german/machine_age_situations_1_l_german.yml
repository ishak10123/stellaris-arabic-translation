 #DICTATORIAL
 edict_self_indictment_protocol: "Selbstanzeige-Protokoll"
 edict_self_indictment_protocol_desc: "Aktiviert ein verstecktes Persönlichkeitsprotokoll im Implantat, das mithilfe einer heuristischen Live-Feed-Analyse ohne Zustimmung des Besitzers Verbrechen erkennt und meldet."
 concept_edict_self_indictment_protocol: "$edict_self_indictment_protocol$"
