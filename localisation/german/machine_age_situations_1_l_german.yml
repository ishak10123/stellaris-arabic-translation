 ### AUTHORITIES ###
 #VOLITIONAL
 auth_cyber_hive_volitional: "Volitionalschwarm"
 auth_cyber_hive_volitional_desc: "Jede Drohne ist einzigartig. Jeder Gedanke ist eine neue Perspektive, die das Kollektiv in Betracht ziehen kann. Unzählige Bewusstsein bilden den Schwarm, der weit größer ist als die Summe seiner Teile."
 concept_auth_cyber_hive_volitional: "$auth_cyber_hive_volitional$"
 gov_cyber_hive_volitional: "$auth_cyber_hive_volitional$"
