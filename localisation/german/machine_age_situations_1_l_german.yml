 #IMPERIAL
 edict_levied_experience: "Extrahierte Erfahrung"
 edict_levied_experience_desc: "Indem wir das Wissen unserer Bevölkerung mit Hilfe von Kybernetik extrahieren, verbessern wir die Erfahrung unserer Anführer, ohne dass diese Zeit mit unbedeutenden Aufgaben verschwenden müssen."
 concept_edict_levied_experience: "$edict_levied_experience$"
