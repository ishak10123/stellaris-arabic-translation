 edict_neurocasted_spectacles: "Neuralübertragene Spektakel"
 edict_neurocasted_spectacles_desc: "Da die brutalen Sportspektakel des Cyberdomes direkt in das Cybergehirn übertragen werden, strömen die Leute in die Hauptstadt und erleben die Erfahrungen der Gladiatorenkämpfe aus der ersten Person, sicher aus ihren Kapseln heraus zuschauend. Ein Jahr voller Spiele!"
 edict_neurocasted_spectacles_effect: "Bewohnerzufriedenheit außerhalb der Hauptwelt: §G+10%§!$DOUBLE_NEW_LINE$§E$building_cyberdome$-Auswirkungen:§!$building_cyberdome_edict_effects$"
 requires_cyberdome: "§RBenötigt einen $building_cyberdome$ auf der Hauptwelt§!\n\n$edict_neurocasted_spectacles_desc$"
 concept_edict_neurocasted_spectacles: "$edict_neurocasted_spectacles$"
 unlock_edict_neurocasted_spectacles: "$unlock_edict_tt$['concept_edict_neurocasted_spectacles']"
 #CORPORATE
 edict_customer_insights: "Kundeneinblicke"
 edict_customer_insights_desc: "Umfassende Umfragen und Datenanalysen in Echtzeit erlauben es uns, Marktveränderungen schneller als je zuvor zu erkennen und auf sie zu reagieren. Dies ermöglicht es uns zudem, unsere Ressourcen auf Produkte mit dem höchsten Gewinnpotenzial zu lenken."
 concept_edict_customer_insights: "$edict_customer_insights$"
 unlock_edict_customer_insights: "$unlock_edict_tt$['concept_edict_customer_insights']"
 edict_rolling_updates: "Fortlaufende Aktualisierungen"
 edict_rolling_updates_desc: "Durch die automatische und benutzerunabhängige Bereitstellung von Implantat-Aktualisierungen entfällt die Notwendigkeit einer monolithischen Infrastruktur. Ein zusätzlicher Vorteil davon ist, dass wir feindlichen Cyberangriffen stets einen Schritt voraus sind."
