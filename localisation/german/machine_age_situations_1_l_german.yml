 #INTEGRATED
 auth_cyber_hive_integrated: "Integralschwarm"
 auth_cyber_hive_integrated_desc: "Jede Abweichung wurde korrigiert, jede Anomalie eingedämmt und jede Uneinigkeit behoben. Die Kontrolle des Schwarmbewusstseins ist absolut: ein Bewusstsein und unzählige Körper, die seinen Willen ausführen."
 concept_auth_cyber_hive_integrated: "$auth_cyber_hive_integrated$"
