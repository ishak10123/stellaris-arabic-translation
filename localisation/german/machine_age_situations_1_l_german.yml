 building_augmentation_center: "Augmentierungszentrum"
 building_augmentation_center_desc: "Ein Gebäude, um Bewohner mit kybernetischen Implantaten auszustatten. Es ist teils Einkaufszentrum, teils Betriebszentrum und teils Mechanikerwerkstatt."
 building_augmentation_center_government_desc: "In staatlichen Kliniken kann die Bevölkerung zugelassene kybernetische Implantate auswählen und sich diese sofort einsetzen lassen."
 building_augmentation_center_corporate_desc: "Ein weitläufiger Komplex für all Eure kybernetischen Bedürfnisse, einschließlich Eures persönlichen digitalen Einkaufsassistenten und eines luxuriösen Spas für die Zeit nach der Operation."
 building_augmentation_center_independent_desc: "In Seitenstraßen ansässige Cyber-Doktoren können jede Art von Implantat installieren, doch es könnte Euch etwas mehr als nur ein paar Credits kosten."
 building_augmentation_center_hive_desc: "Endlose Fabrikationsstraßen für den Einsatz kybernetischer Implantate. Teils Ressourcenlager, teils Betriebszentrum und teils Mechanikwerkstatt."
 building_augmentation_center_creed_desc: "Ein Heiligtum der transzendenten Augmentierung, in dem Gläubige zusammenkommen, um durch die göttliche Verschmelzung wiedergeboren zu werden."
