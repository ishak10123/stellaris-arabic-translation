 cyber_workers_force_tests: "Zwangstestsubjekte - Arbeiter"
 cyber_workers_force_tests_desc: "$cyber_everyone_force_tests_desc$"
 cyber_everyone_force_tests: "Zwangstestsubjekte"
 cyber_everyone_force_tests_desc: "Testsubjekte dazu zu zwingen, an unseren Experimenten teilzunehmen, wird uns dabei helfen, unsere Ziele zu erreichen."
 cyber_birth_implants: "Kybernetische Kindheit"
 cyber_birth_implants_desc: "Selbst die jüngste Generation wird umgehend mit kybernetischer Technologie augmentiert."
 cyber_natural_childhood: "Augmentfreie Kindheit"
 cyber_natural_childhood_desc: "Unsere jüngste Generation kann sich ohne Augmentierungen frei entwickeln."
 AI_control: "KI-Aufseher"
 AI_control_desc: "KI-augmentierte synaptische Reaktionen helfen dabei, Individuen produktive Aufgaben zu geben."
 moderate_AI_control: "$AI_control$"
 moderate_AI_control_desc: "$AI_control_desc$"
 AI_forced_control: "KI-Kontrolleure"
 AI_forced_control_desc: "Implantate, die man tief in die Entscheidungszentren des Gehirns einpflanzt, ermöglichen ein höheres Maß an staatlicher Kontrolle."
 media_blockade: "Nachrichtensperre"
 media_blockade_desc: "Eine vollständige Nachrichtensperre hat jene zum Schweigen gebracht, die Kritik an den Zielen der Regierung übten."
 helping_hand: "Helfende Hand"
 helping_hand_desc: "Es ist immer besser, mehr Arme zu haben. Vor allem im Labor."
 armed_forces: "Augmentierte Streitkräfte"
 armed_forces_desc: "Die Integration zusätzlicher Gliedmaßen hat das Militär gestärkt."
 state_handouts: "Staatliche Förderungen"
 state_handouts_desc: "Die Regierung stellt jenen, die nur eingeschränkt mobil sind, zusätzliche Gliedmaß-Augmentierungen zur Verfügung."
 branching_out: "Verzweigter Markt"
 branching_out_desc: "Zusätzliche Gliedmaß-Augmentierungen sind für den Höchstbietenden verfügbar."
 handy_workers: "Hilfe für Arbeiter"
 handy_workers_desc: "Die Arbeiterklasse wird durch die bahnbrechende Entwicklung zusätzlicher Gliedmaß-Augmentierungen unterstützt."
 luxury_limbs: "Luxusgliedmaßen"
 luxury_limbs_desc: "Mit Macht geht auch das Recht auf zusätzliche Gliedmaßen einher."
 murdered_martyrs: "Opferung von Testsubjekten"
 murdered_martyrs_desc: "Jene Testsubjekte, bei denen experimentelle Augmentierungen fehlgeschlagen sind, werden rituell geopfert, um ihr Leid zu beenden."
 artificial_pain_relief: "Künstliche Schmerzlinderung"
 artificial_pain_relief_desc: "Die Pharmaindustrie konzentriert sich auf die Entwicklung wirksamer Schmerzmittel für kybernetische Individuen."
 chained_experiments: "Verkettete Experimente"
 chained_experiments_desc: "Nur Staatsbürger haben das Recht, die Teilnahme an Kybernetikexperimenten zu verweigern."
 cyber_opposition: "Kybernetikopposition"
 cyber_opposition_desc: "Die Weigerung des Staates, Rechenschaft abzulegen, hat zu politischem Widerstand geführt."
 cyber_event_bliss_commercial: "Kommerzielle Glückseligkeitsmodifikationen"
 cyber_event_bliss_commercial_desc: "Kommerzielle Implantate bieten ein chemisch induziertes Gefühl von Glückseligkeit und Wohlbefinden auf Abruf."
 cyber_event_bliss_underground: "Glückseligkeitsmodifikationen vom Schwarzmarkt"
 cyber_event_bliss_underground_desc: "Auf fragwürdige Weise erworbene instabile Implantate bieten Glückseligkeit und Gesundheit auf Knopfdruck."
 cyber_event_bliss_regulate: "Regulierte Glückseligkeitsmodifikationen"
 cyber_event_bliss_regulate_desc: "Der Staat reguliert Modifikationen, die die Zufriedenheit oder Regeneration beeinflussen, ohne eine eigene Produktion zu haben."
 cyber_event_worklife_name: "$cyber.615.name$"
 cyber_event_worklife_own: "Uneingeschränkter Speicherzugriff für Arbeiter"
 cyber_event_worklife_own_desc: "Arbeiter sind nicht verpflichtet, Teile ihres Erinnerungsspeichers bei der Arbeit oder zu Hause zu isolieren."
 cyber_event_worklife_leave: "Eingeschränkter Speicherzugriff für Arbeiter"
 cyber_event_worklife_leave_desc: "Arbeiter sind dazu verpflichtet, arbeitsbezogene Erinnerungen beim Verlassen des Arbeitsplatzes im Erinnerungsspeicher zu isolieren, um Industriespionage zu verhindern."
 cyber_event_worklife_isolate: "Isolierter Speicherzugriff für Arbeiter"
 cyber_event_worklife_isolate_desc: "Arbeiter sind dazu verpflichtet, arbeitsbezogene Erinnerungen vollständig von ihrer Freizeit zu trennen und umgekehrt, um Industriespionage und ethische Konflikte mit dem Arbeitgeber zu vermeiden."
 mod_pop_cyborg_specialist_happiness: "Zufriedenheit (Cyborg-$pop_cat_specialist$)"
 cyber_event_parental_control: "Vollständige elterliche Kontrolle motorischer Funktionen"
 cyber_event_parental_control_desc: "Eltern erhalten die Kontrolle über die motorischen Funktionen ihrer minderjährigen Kinder."
 cyber_event_parental_limited: "Begrenzte elterliche Kontrolle motorischer Funktionen"
 cyber_event_parental_limited_desc: "Eltern dürfen ihre minderjährigen Kinder in begrenztem Umfang kontrollieren, beispielsweise in Bezug auf die Laufgeschwindigkeit und die Lautstärke."
 cyber_event_parental_enforcers: "Erzwungene Kontrolle motorischer Funktionen"
 cyber_event_parental_enforcers_desc: "Entgegen der Einwände von Eltern ist die Kontrolle motorischer Funktionen nur Vollstreckern vorbehalten."
 cyber_event_knowledge_engineering: "Wissenstransfer - Ingenieurforschung"
 cyber_event_knowledge_engineering_desc: "Wissen aus dem Bereich der Ingenieurforschung wird auf Kosten anderer Forschungsbereiche in die Köpfe von Wissenschaftlern übertragen."
 cyber_event_knowledge_physics: "Wissenstransfer - Physikforschung"
 cyber_event_knowledge_physics_desc: "Wissen aus dem Bereich der Physikforschung wird auf Kosten anderer Forschungsbereiche in die Köpfe von Wissenschaftlern übertragen."
 cyber_event_knowledge_society: "Wissenstransfer - Sozialforschung"
 cyber_event_knowledge_society_desc: "Wissen aus dem Bereich der Sozialforschung wird auf Kosten anderer Forschungsbereiche in die Köpfe von Wissenschaftlern übertragen."
 cyber_implant_taxes: "Implantatbesteuerung"
 cyber_implant_taxes_desc: "Das Material und die Produktion kybernetischer Implantate werden hoch besteuert."
 cyber_implant_taxes_tt: "Energie-Credits (Monatlich): §G+5%§!\n: Wachstumskosten ($pop_cat_cyborg$): §R+10%§!"
 cyber_reformed_implant_taxes: "Reformierte Implantatbesteuerung"
 cyber_reformed_implant_taxes_desc: "Eine Reform der Besteuerung von Materialien und Produktionsmitteln zur Herstellung kybernetischer Implantate sorgt für kurzfristige Profite."
 cyber_reformed_implant_taxes_tt: "Energie-Credits (Monatlich): §G+10%§!"
 cyber_market_standards: "Marktstandard für Implantate"
 cyber_market_standards_desc: "Produzenten minderwertiger Kybernetikimplantate werden strafrechtlich verfolgt, um den Standard zu erhöhen."
 cyber_implant_weapons: "Waffenimplantate"
 cyber_implant_weapons_desc: "Staatsbürger dürfen Waffenimplantate für den persönlichen Gebrauch installieren."
 cyber_implants_dismantled: "Rückbau gefährlicher Implantate"
 cyber_implants_dismantled_desc: "Alle Implantate, die mit der Absicht hergestellt wurden, andere zu verletzen, werden eingezogen und zu sinnvolleren Produkten umgebaut."
 cyber_implant_hacks: "Implantat-Hacks"
 cyber_implant_hacks_desc: "Hacker, die über den Quellcode für die Steuerung von Kernimplantaten verfügen, können auf die Implantate anderer zugreifen - und diese Implantate manipulieren."
 cyber_counter_hacking: "Implantat-Hackerabwehr"
 cyber_counter_hacking_desc: "Datenanalysten spüren illegales Implantate-Hacking in unseren Kommunikationsnetzen auf."
 cyber_protests: "Demonstrationen gegen Implantatverzögerungen"
 cyber_protests_desc: "Unsere Bevölkerung, die an einen ständigen Strom neuer Augmentierungen gewöhnt ist, ist wegen der jüngsten Produktverzögerung aufgebracht."
 cyber_stop_protests: "Auflösung von Demonstrationen"
 cyber_stop_protests_desc: "Die Demonstrationen, die aufgrund der Implantatverzögerungen entstanden sind, werden aufgelöst."
 #Policies
 policy_cyberization_standards: "Kybernetisierungsstandards"
 policy_cyberization_standards_desc: "Der bevölkerungsweite Einsatz von Implantaten ist für unsere Gesellschaft unabdingbar, doch diejenigen, die gegen eine vollständige Kybernetisierung sind, können sich für eine begrenzte Augmentierung entscheiden."
 cyberization_standards_full_name: "Vollständige Kybernetisierung"
 cyberization_standards_full: "$cyberization_standards_full_name$"
 cyberization_standards_full_effect: "Spiritualistische Anführer erhalten die Eigenschaft \"§Y$leader_trait_cyborg$§!\"\nSpiritualistische Bewohner erhalten die Eigenschaft \"§Y$trait_cybernetic$§!\""
 cyberization_standards_full_desc: "Von allen Individuen wird erwartet, sich einen kompletten Satz kybernetischer Implantate einsetzen zu lassen.\n\n§E$cyberization_standards_full_effect$§!"
 cyberization_standards_limited_name: "Begrenzte Kybernetisierung"
 cyberization_standards_limited: "$cyberization_standards_limited_name$"
 cyberization_standards_limited_effect: "Spiritualistische Anführer erhalten die Eigenschaft \"§Y$leader_trait_limited_cyborg$§!\"\nSpiritualistische Bewohner erhalten die Eigenschaft \"§Y$trait_limited_cybernetic$§!\""
 cyberization_standards_limited_desc: "Individuen, die gegen die vollständige Augmentierung sind, können sich eine begrenze Anzahl an Kybernetik-Implantaten einsetzen lassen.\n\n§E$cyberization_standards_limited_effect$§!"
 #CYBERIZATION STAGE 1
 cyber.100.name: "Die Zukunft kontrollieren" #Stage 1 - Start event
 cyber.100.desc.shared: "Die jüngsten Durchbrüche bei der Erforschung fortschrittlicher Kybernetik-Implantate werden es uns eines Tages erlauben, unsere Gesellschaft neu zu gestalten. Indem wir jede biologische Schwäche beseitigen, machen wir uns intelligenter, schneller und stärker."
 cyber.100.desc.shared_unplugged: "Die jüngsten Durchbrüche bei der Erforschung fortschrittlicher Kybernetik-Implantate werden es uns eines Tages erlauben, unsere Gesellschaft neu zu gestalten und dieses Mal zu unseren eigenen Bedingungen. Indem wir biologische Schwächen und Defekte in unseren bestehenden Augmentierungen beseitigen, machen wir uns intelligenter, schneller und stärker."
 cyber.100.desc: "$cyber.100.desc.shared$\n\nUnternehmen haben Geschäftsvorschläge und Umsatzprognosen vorgelegt, während Regierungsvertreter argumentieren, der Staat müsse jedem den Zugang zu dieser wichtigen Technologie garantieren."
 cyber.100.desc.unplugged: "$cyber.100.desc.shared_unplugged$\n\nUnternehmen haben Geschäftsvorschläge und Umsatzprognosen vorgelegt, während Regierungsvertreter argumentieren, der Staat müsse jedem den Zugang zu dieser wichtigen Technologie garantieren."
 cyber.100.desc.megacorp: "$cyber.100.desc.shared$\n\nSubunternehmer haben Geschäftsvorschläge und Umsatzprognosen für die Auslagerung der Implantatsproduktion an Dritte vorgelegt, während unser Vorstand argumentiert, wir müssten ein Monopol auf diese wichtige Technologie behalten."
 cyber.100.desc.megacorp_unplugged: "$cyber.100.desc.shared_unplugged$\n\nSubunternehmer haben Geschäftsvorschläge und Umsatzprognosen für die Auslagerung der Implantatsproduktion an Dritte vorgelegt, während unser Vorstand argumentiert, wir müssten ein Monopol auf diese wichtige Technologie behalten."
 cyber.100.a: "Wir müssen die Augmentierungsindustrie verstaatlichen."
 cyber.100.a.megacorp: "Fördert die interne Entwicklung."
 cyber.100.a.tt: "$situation_cyberization_triggered_modifier$$cyber_control_government_effects$"
 cyber.100.b: "Wir sollten den Vertrieb privatisieren."
 cyber.100.b.megacorp: "Überlasst die Produktion Tochterunternehmen."
 cyber.100.b.tt: "$situation_cyberization_triggered_modifier$$cyber_control_corporate_effects$"
 cyber.105.name: "Vom Volk, für das Volk"
 cyber.105.desc: "Selbstmodder sind wütend darüber, dass viele unserer geplanten kybernetischen Entwürfe für den Durchschnittsbürger unzugänglich sein werden.\n\nSie argumentieren, dass nahezu jeder in der Lage sein wird, seine eigenen Augmentierungen herzustellen und zu reparieren, wenn man die Entwürfe veröffentlichen und die Umweltschutzvorschriften lockern würde."
 cyber.105.desc.megacorp: "Unabhängige Auftragnehmer beschweren sich, viele unserer geplanten kybernetischen Entwürfe seien nicht für sie zugänglich.\n\nSie argumentieren, die Implantatproduktion könne verbessert werden, wenn man die Entwürfe allen zugänglich machen und die Patente für die Produktion freigeben würde."
 cyber.105.a: "Die Marktregulation gibt es aus einem bestimmten Grund ..."
 cyber.105.a.megacorp: "Es ist unser geistiges Eigentum."
 cyber.105.a.tt: "Der Situationsmodifikator \"§Y$situation_cyberization$§!\" ist unverändert."
 cyber.105.b: "Dereguliert die Industrie."
 cyber.105.b.crafters: "Lasst das Volk produzieren, was es will."
 cyber.105.b.megacorp: "Veröffentlicht den Quellcode der Entwürfe."
 cyber.105.b.gov.tt: "Der Situationsmodifikator \"§Y$situation_cyberization$§!\" wird um Folgendes verbessert:\n§GHinzugefügt:§! $cyber_control_independent_effects$\n§REntfernt:§! $cyber_control_government_effects$"
 cyber.105.b.cor.tt: "Der Situationsmodifikator \"§Y$situation_cyberization$§!\" wird um Folgendes verbessert:\n§GHinzugefügt:§! $cyber_control_independent_effects$\n§REntfernt:§! $cyber_control_corporate_effects$"
 #Stage 1 Opportunities - Research
 cyber.120.name: "Mentale Entlastung"
 cyber.120.desc: "Eines unserer Forscherteam hat einen innovativen Vorschlag zur Integration von KI-Überwachungsfunktionen in unsere Mobilgeräte vorgelegt. Später könnte man diese Funktionen direkt in die Cyberware integrieren.\n\nDie KI-Aufseher würden dabei unsere Bevölkerung weg von müßigen Aufgaben und hin zu geistig komplexeren Abenteuern lenken. Zwar wird ein gewisses Maß an Autonomie verloren gehen, doch das beispiellose Potenzial, unsere Produktivität zu steigern, ist nicht zu unterschätzen."
 cyber.120.a: "Produktivität über alles."
 cyber.120.a.spiritual: "Wir müssen das als einen Segen betrachten."
 cyber.120.b: "Der Autonomieverlust wäre zu groß."
 cyber.120.b.spiritual: "Wir werden nicht weiter vom heiligen Pfad abkommen."
 cyber.120.c: "Akzeptabel, sofern ein Ein/Aus-Schalter vorhanden ist."
 cyber.120.d: "Man bedenke nur das Ausmaß an Kontrolle, das wir dadurch erhalten würden ..."
 #Stage 1 Challenges - Research
 cyber.160.name: "Kybernetische Dissoziation"
 cyber.160.desc: "Ein reichsweit beliebtes neues Melodram hat die kollektive Vorstellungskraft des Publikums für sich gewonnen.\n\nDie Geschichte spielt in einer Welt, in der kybernetische Implantate allgegenwärtig sind, und sie folgt einem augmentierten Arbeiter, der eine traumatische Dissoziation von seinem veränderten Körper erfährt. Das tragische Ende der Geschichte ist eine kaum verhüllte Kritik an der vollständigen Kybernetisierung und der damit einhergehenden Auslöschung der [Owner.Species.GetAdj]en Identität.\n\nDieser Kassenschlager hat erheblichen Widerstand gegen unsere Initiative ausgelöst und zu einem 60%-igen Rückgang an Testsubjekten seit seiner Veröffentlichung geführt."
 cyber.160.a: "Versucht, die öffentliche Meinung zurückzugewinnen."
 cyber.160.b: "Verschärft die Regulierung neuer Implantate."
 cyber.160.c: "Das wird sich sicher bald legen."
 cyber.160.d: "Zensiert das Melodram."
 cyber.160.e: "Verhängt eine Nachrichtensperre."
 #CYBERIZATION STAGE 2
 cyber.200.name: "Augmentierungszentren"
 cyber.200.desc.gov: "Nach einer Zeit voller politischer Machtkämpfe wurde die Zuständigkeit für die Produktion kybernetischer Augmentierungen unter verschiedenen Regierungsstellen aufgeteilt. Bekommt jeder ein Stück vom Kuchen ab, wird man einander wechselseitig sicher im Zaum halten.\n\nUm den Plan in die Tat umzusetzen, benötigt die Forschungsgemeinschaft jedoch mindestens ein $building_augmentation_center$, um als Zentrum für die kybernetische Entwicklung zu dienen."
 cyber.200.desc.cor: "Was einst nur ein Traum war, ist nun in greifbare Nähe gerückt, und wer könnte besser davon profitieren als die zahlreichen Konzerne innerhalb unserer Grenzen? Die aufkeimende Kybernetikindustrie wetteifert darum, die Vorherrschaft auf dem Kybernetikmarkt zu übernehmen, ein Vorteil, der dazu führt, dass Produkte viel schneller auf den Markt gebracht werden können.\n\nDie Konzernlobby hat jedoch gefordert, dass zumindest ein $building_upload_center$ errichtet werden soll, um als Zentrum für die kybernetische Entwicklung zu dienen."
 cyber.200.desc.ind: "In unseren Kommunikationsnetzen tummeln sich einige wilde Ideen, die von neurosynaptischen Augmentierungen bis zu kybernetischen Geschmacksdrüsen reichen. Die meisten davon wären höchst unpraktisch und sehr teuer in der Umsetzung, aber einige Entwürfe wirken vielversprechend.\n\nUm den Plan in die Tat umzusetzen, benötigt die Online-Community jedoch mindestens ein $building_augmentation_center$, um als Zentrum für die kybernetische Entwicklung zu dienen."
 cyber.200.a.gov: "Erteilt die Baugenehmigung."
 cyber.200.a.cor: "Genehmigt."
 cyber.200.a.ind: "Bewilligt."
 cyber.200.a.tt: "§RErforderliche Maßnahme:§!\nBaut ein $building_augmentation_center$, um die Situation \"§Y$situation_cyberization$§!\" fortzuführen.\n\nJedes $building_augmentation_center$ stellt §G+200§! $job_augmentor_plural_with_icon$-Jobs zur Verfügung.\n\n$job_augmentor_research_effect_desc$"
 cyber.205.name: "Pilotprojekt" #Stage 2 - Start event
 cyber.205.desc.shared: "Es ist an der Zeit, ein umfassendes Pilotprojekt in die Wege zu leiten. Dieses Projekt erfordert eine kontinuierliche Unterstützung und wird nur auf Planeten mit einem $building_augmentation_center$ verfügbar sein, doch unsere Erkenntnisse werden unmittelbare Produktivitätsvorteile mit sich bringen."
 cyber.205.desc.gov: "Kleinere Versuche im Rahmen staatlich finanzierter Forschungsprojekte haben bestätigt, dass mechanische Augmentierungen die Produktivität verbessern.\n\n$cyber.205.desc.shared$"
 cyber.205.desc.cor: "Kleinere Versuche im Rahmen freiwilliger Fokusgruppen haben bestätigt, dass mechanische Augmentierungen die Produktivität verbessern.\n\n$cyber.205.desc.shared$"
 cyber.205.desc.ind: "Berichte von Selbstmoddern haben bestätigt, dass mechanische Augmentierungen die Produktivität verbessern.\n\n$cyber.205.desc.shared$"
 cyber.205.a: "Verbessert unsere Elite."
 cyber.205.a.tt: "Ressourcenproduktion ($pop_cat_ruler$): §G+10%§! mit einem $building_augmentation_center$"
 cyber.205.b: "Fördert die Spezialisten."
 cyber.205.b.tt: "Ressourcenproduktion ($pop_cat_specialist$): §G+10%§! mit einem $building_augmentation_center$"
 cyber.205.c: "Stärkt die Arbeiter."
 cyber.205.c.tt: "Ressourcenproduktion ($pop_cat_worker$): §G+10%§! mit einem $building_augmentation_center$"
 cyber.205.d: "Augmentiert jeden."
 cyber.205.d.tt: "Ressourcen durch £job£ §HJobs§!: §G+5%§! mit einem $building_augmentation_center$"
 cyber.210.name: "Parallele Entwicklung"
 cyber.210.desc.gov.rival: "Eine Gruppe Journalisten hat Beweise für von der Regierung finanzierte Experimente aufgedeckt, bei denen Mikrochips zur Überwachung von Gedanken eine Rolle Spielen. Diese Mikrochips lassen sich im Kopf eines Bürgers installieren, um detaillierte Informationen über Sicherheitsmaßnahmen sowie Einsichten in die Persönlichkeit zu erhalten."
 cyber.210.desc.cor.rival: "Ein Gerichtsprozess, der im Zusammenhang mit einem Markenrechtsstreit steht, hat aufgedeckt, dass Unternehmen mit Augmented-Reality-Implantaten experimentieren, die sich nahtlos in den Sehnerv einfügen. Die Entwürfe zeigen sowohl die Vorteile für den Nutzer als auch die Möglichkeit für die Unternehmen, ihre visuellen Informationen anzuzapfen."
 cyber.210.desc.ind.rival: "Unabhängige Selbstmodder haben damit begonnen, Gliedmaßen durch rudimentäre mechanische Alternativen zu ersetzen. Es gibt keine Möglichkeit, das Wohlergehen derjenigen zu gewährleisten, die dies auf eigene Faust versuchen, und man befürchtet, die unregulierte Verwendung solcher Implantate könnte mehr schaden als nutzen."
 cyber.210.a: "Wir können das nutzen."
 cyber.210.a.tt: "§Y$situation_cyberization$§!-Situationsfortschritt für §Y1§! Jahr: §G+25%§!\n\n"
 cyber.210.b: "Damit ist jetzt Schluss."
 cyber.210.b.tt: "§Y$situation_cyberization$§!-Situationsfortschritt für §Y1§! Jahr: §R-25%§!"
 #Stage 2 Opportunities - Test Results and Rival Sector
 cyber.220.name: "Koordination zusätzlicher Gliedmaßen"
 cyber.220.desc: "Im Bereich der neuronalen Schnittstellen ist ein bedeutender Durchbruch erzielt worden. Ein Gehirnsignalverstärker könnte dem Nutzer eine nahtlose, wenn auch begrenzte Kontrolle über eine Reihe künstlicher Gliedmaßen ermöglichen. Später könnte man dies direkt in ein Cybergehirn integrierren, ohne dass ein externes Gerät erforderlich wäre.\n\nIn der ersten Testphase zeigten die Probanden vielversprechende Verbesserungen bei der Geschicklichkeit und der Handhabung von Gegenständen sowie eine erhöhte Kampffähigkeit. Da die Herstellungskosten allerdings immens sind, muss entschieden werden, wer als Erster Zugang zu dieser bahnbrechenden Technologie bekommen sollte."
 cyber.220.a: "Unsere Wissenschaftler brauchen mehr [owner.species.GetHandNamePlural]."
 cyber.220.b: "Wir sollten unsere Armee damit verstärken."
 cyber.220.c: "Wir sollten jenen helfen, die körperlich eingeschränkt sind."
 cyber.220.d: "Wir haben nichts zu verschenken! Verkauft sie an den Meistbietenden."
 cyber.220.e: "Die Arbeiterklasse könnte zusätzliche [owner.species.GetHandNamePlural] brauchen."
 cyber.220.f: "Unsere Elite sollte stets die Oberhand behalten."
 #Stage 2 Challenges - Test Results and Rival Sector
 cyber.260.name: "Völlig verrenkt"
 cyber.260.desc: "Der Testlauf eines neuen Wirbelsäulenmoduls endete mit einem katastrophalen Fehlschlag. Die von den Motoren des Implantats erzeugte überschüssige Energie führte bei mehreren Probanden zu dauerhaften Rückenmarksverletzungen.\n\nBeunruhigende Bilder, die das schreckliche Ergebnis zeigen, sind an die Öffentlichkeit gelangt, weshalb die Anzahl an Freiwilligen für künftige Experimente stark zurückgegangen ist."
 cyber.260.a: "Führt so lange keine Versuche mehr durch, bis eine Lösung gefunden wurde."
 cyber.260.a.tt: "§Y$situation_cyberization$§!-Situationsfortschritt für §Y6§! Monate: §R-50%§!"
 cyber.260.b: "Entschädigt die Familien der Opfer."
 cyber.260.c: "Findet weitere Freiwillige. Zwingt sie nötigenfalls."
 #CYBERIZATION STAGE 3
 cyber.300.name: "Markteinführung" #Stage 3 - Start event
 cyber.300.desc: "Überall in unserem Territorium und besonders in jedem größeren Stadtzentrum wurden mechanische Implantate für unsere [Owner.Species.GetNamePlural]-Bevölkerung eingelagert. Diese von unseren $job_augmentor_plural$ entwickelte Kybernetik verspricht, unsere biologischen Körper erheblich zu verbessern.\n\nHeute ist endlich der Tag, an dem wir unsere Vergangenheit ablegen und uns der kybernetischen Zukunft zuwenden!"
 cyber.300.a: "Kybernetisieren wir uns!"
 cyber.300.a.tt: "Anführer erhalten die Eigenschaft \"§Y$leader_trait_cyborg$§!\"\nBewohner erhalten die Eigenschaft \"§Y$trait_cybernetic$§!\"\n\n$job_augmentor_growth_effect_desc$\n\nDie Augmentierungsgeschwindigkeit hängt vom Situationsansatz und der Anzahl an $building_augmentation_center$-Gebäuden ab."
 cyber.305.name: "Kybernetikverweigerer" #Spiritualists are Cybernetic Objectors
 cyber.305.desc.shared: "Ihnen fehlt es selbst an den grundlegendsten Implantaten, was es schwierig für sie macht, sich in unserer zunehmend vernetzten Gesellschaft zurechtzufinden.\n\nDie Bevölkerung zur Installation von Implantaten zu zwingen, würde ihnen dabei helfen, sich besser in die Gesellschaft zu integrieren, aber zweifellos auch zu großem Unmut führen."
 cyber.305.desc: "Mehrere religiöse Gruppen, die gegen die Verschmelzung von [Owner.Species.GetFleshTypeCyberCreed&DAT] und Maschine sind, haben sich unseren Kybernetisierungsbemühungen entgegengestellt. $cyber.305.desc.shared$"
 cyber.305.desc.spiritualist: "Die Gläubigen, die sich verständlicherweise dagegen sträuben, [Owner.Species.GetFleshTypeCyberCreed&AKK] und Maschine zu verschmelzen, haben sich unseren Kybernetisierungsbemühungen entgegengestellt. $cyber.305.desc.shared$"
 cyber.305.desc.none: "Die Verschmelzung von [Owner.Species.GetFleshTypeCyberCreed&DAT] und Maschine ist seit Langem moralisch umstritten, da diejenigen, die sich gegen die Kybernetisierung aussprechen, aufgrund der erhöhten Effizienz durch diese im Nachteil sind.\n\nDie Bevölkerung dazu zu zwingen, Implantate zu installieren, würde zwar dafür sorgen, dass niemand gesellschaftlich zurückgelassen wird, könnte aber zu Unruhen führen."
 cyber.305.desc.unplugged: "Die erneute Verschmelzung von [Owner.Species.GetFleshTypeCyberCreed&DAT] und Maschine ist seit Langem moralisch umstritten. Die von uns selbst entworfenen Augmentierungen unterliegen jedoch nicht mehr den Launen jener Maschine, die uns assimilierte, und sie sind äußerst effizient. Wer sich dagegen entscheidet, könnte im Nachteil sein.\n\nDie Bevölkerung dazu zu zwingen, Implantate zu installieren, würde zwar dafür sorgen, dass niemand gesellschaftlich zurückbleibt, könnte allerdings zu Unruhen führen."
 cyber.305.a: "Sie müssen sich anpassen."
 cyber.305.a.materialist: "Der Glaube ist irrelevant. Wir marschieren in eine kybernetisierte Zukunft."
 cyber.305.a.spiritualist: "Der Glaube muss sich anpassen."
 cyber.305.a.tt: "$cyberization_standards_full_effect$\n\nNeue Richtlinie: §Y$policy_cyberization_standards$§!\n"
 cyber.305.b: "Wir werden uns auf halbem Weg entgegenkommen."
 cyber.305.b.spiritualist: "Findet eine Lösung, die für beide Seiten vorteilhaft ist."
 cyber.305.b.tt: "$cyberization_standards_limited_effect$\n\nNeue Richtlinie: §Y$policy_cyberization_standards$§!\n"
 #Stage 3 Opportunities - Treatment of Non-Cyborgs
 cyber.320.name: "Kybernetisches Potenzial von Kindern"
 cyber.320.birth.desc: "Unser technologischer Fortschritt erlaubt es uns nun, Neugeborenen Implantate einzusetzen, doch dies stellt uns auch vor eine schwere Entscheidung. Diese bahnbrechenden neonatalen Augmentierungen haben die Macht, unsere Verbindung zur Technologie für immer zu verändern, indem sie von klein auf unser angeborenes kybernetisches Potenzial freisetzen und unsere Zivilisation zu nie da gewesenen Höhen führen.$cyber.320.end.desc$"
 cyber.320.metamorphosis.desc: "Uns ist kürzlich ein unglaublicher Durchbruch gelungen. Wir sind jetzt in der Lage, Mikrochips während der Metamorphose in unsere Larven einzusetzen, die wiederum in der Lage sind, mechanische Systeme zu absorbieren. Augmentierungen, die man während des Puppenstadiums vornimmt, können ein ungenutztes kybernetisches Potenzial freisetzen und unsere Zivilisation zu neuen Höhen führen.$cyber.320.end.desc$"
 cyber.320.lithoid.desc: "Unser technologischer Fortschritt erlaubt es uns nun, unseren kristallinen Nachkommen Implantate einzusetzen, doch dies stellt uns auch vor eine schwere Entscheidung. Solche Augmentierungen würden es unseren Jungkristallen ermöglichen, eine natürliche Verbindung zu metallischen Mineralien einzugehen, ihr kybernetisches Potenzial von klein auf freisetzen und unsere Zivilisation zu neuen Höhen führen.$cyber.320.end.desc$"
 cyber.320.root.desc: "Unser technologischer Fortschritt erlaubt es uns nun, unseren Sprösslingen kybernetische Implantate einzusetzen, doch dies stellt uns auch vor eine schwere Entscheidung. Diese Augmentierungen würden es ihnen erlauben, elektrische Impulse durch ein verbessertes Netzwerk von Hyphen zu übertragen und so ihr kybernetisches Potenzial schon in jungen Jahren freizusetzen.$cyber.320.end.desc$"
 cyber.320.egg.desc: "Unser technologischer Fortschritt erlaubt es uns nun, Schlüpflingen Implantate einzusetzen, doch dies stellt uns auch vor eine schwere Entscheidung. Diese bahnbrechenden Augmentierungen haben die Macht, ihre Verbindung zur Technologie für immer zu verändern, indem sie von klein auf ihr angeborenes kybernetisches Potenzial freisetzen und unsere Zivilisation zu nie da gewesenen Höhen führen.$cyber.320.end.desc$"
 cyber.320.other.desc: "Unser technologischer Fortschritt erlaubt es uns nun, kybernetische Implantate in Säuglinge einzusetzen, doch dies stellt uns auch vor eine schwere Entscheidung. Diese bahnbrechenden Augmentierungen haben die Macht, unsere Verbindung zur Technologie für immer zu verändern, indem sie von klein auf unser angeborenes kybernetisches Potenzial freisetzen und unsere Zivilisation zu nie da gewesenen Höhen führen.$cyber.320.end.desc$"
 cyber.320.end.desc: "\n\nBereits in einem so frühen Alter von kybernetischen Verbesserungen abhängig zu sein, könnte jedoch dazu führen, dass unsere Spezies die Fähigkeit verliert, in ihrer natürlichen Form zu überleben."
 cyber.320.a: "Es ist nur natürlich, dass wir uns weiterentwickeln."
 cyber.320.b: "Wir müssen dafür sorgen, dass die Kindheit natürlich bleibt."
 #Stage 3 Challenges - Treatment of Non-Cyborgs
 cyber.360.name: "Umstellungsschmerzen"
 cyber.360.desc: "In letzter Zeit haben immer mehr Individuen öffentlich verkündet, dass sie es bereuen würden, sich experimentellen Körpermodifikationen unterzogen zu haben. Den natürlichen Hirnstamm gegen einen mechanischen auszutauschen, hat zu anhaltenden existenziellen Ängsten geführt, wobei einige ihre Erfahrung als einen ständigen Kreislauf unerträglicher Qualen beschreiben.\n\nInmitten der anhaltenden Forderungen nach Entschädigungen sind wir gezwungen, unsere Position bezüglich kybernetischer Implantate und die damit verbundene Verantwortung des Staates zu überdenken."
 cyber.360.a: "Wir sollten die extremsten Augmentierungen verbieten."
 cyber.360.a.tt: "§Y$situation_cyberization$§!-Situationsfortschritt für §Y6§! Monate: §R-50%§!"
 cyber.360.b: "Ein Opfer wird ihr Leid beenden."
 cyber.360.c: "Stellt ihnen stärkere Schmermittel zur Verfügung."
 cyber.360.d: "Neue Probanden sollten ab sofort nur noch aus der Unterschicht kommen."
 cyber.360.e: "Wir übernehmen keine Verantwortung."
 #CYBERIZATION STAGE 4
 cyber.405.name: "Implantatbesteuerung" #Government rival
 cyber.405.desc: "Aufgrund der Profite, die die derzeit nur locker regulierte Augmentierungsindustrie erzielt, haben sich viele lokale Regierungsvertreter darum bemüht, mit den neuesten Entwicklungen Schritt zu halten. Auf jede Phase der Produktion kybernetischer Implantate von der Rohstoffgewinnung bis zur endgültigen Installation werden fortan umfangreiche Steuern erhoben.\n\nDie zusätzliche Bürokratie und die Kosten haben unseren Augmentierungsprozess verlangsamt und den Fortschritt in Richtung einer vollständigen Kybernetisierung behindert."
 cyber.405.a: "Besteuert sie!"
 cyber.405.b: "Schafft die Besteuerung ab."
 cyber.405.b.tt: "§Y$situation_cyberization$§!-Situationsfortschritt: §G+25%§!\n\n"
 cyber.405.c: "Reformiert die Besteuerung von Augmentierungen."
 cyber.405.c.tt: "§Y$situation_cyberization$§!-Situationsfortschritt für §Y1§! Jahr: §R-10%§!"
 cyber.410.name: "Judikative Kriegsführung" #Government rival escalation
 cyber.410.desc: "Da unsere Gesetzgeber nicht in der Lage sind, mit der Akzeptanz kybernetischer Implantate in der Öffentlichkeit Schritt zu halten, tun sie alles, um bestimmte Aspekte der Augmentierung einzuschränken.\n\nIndem sie unsere \"Implantatbesessenheit\" beklagen, bei der uns jede Augmentierung \"weiter von dem entfernt, was es bedeutet, ein [Owner.Species.GetName] zu sein\", legen die neuesten Gesetzesentwürfe einen maximalen Augmentierungsprozentsatz pro Person fest. Schließlich besteht die Gefahr, dass wir irgendwann mehr Maschine als [Owner.Species.GetName] werden."
 cyber.410.a: "Stoppt den Gesetzesentwurf!"
 cyber.410.a.tt: "§Y$situation_cyberization$§!-Situationsfortschritt für §Y1§! Jahr: §G+25%§!"
 cyber.410.b: "Findet eine Kompromisslösung."
 cyber.410.b.tt: "§Y$situation_cyberization$§!-Situationsfortschritt für §Y1§! Jahr: §R-25%§!"
 cyber.415.name: "Keine Garantien" #Corporate rival
 cyber.415.desc: "Aufgrund von Profitgier wurde der Augmentierungsmarkt von billigen, minderwertigen Implantaten überschwemmt, und die Unternehmen bieten keinen Ersatz an, wenn diese unweigerlich Defekte zeigen.\n\nIn einem kürzlich bekannt gewordenen Fall hatte das Herzimplantat eines beliebten Künstlers auf der Bühne eine Fehlfunktion. Das Ergebnis war explosiv."
 cyber.415.a: "Der Markt wird sich von selbst regeln."
 cyber.415.a_industrial: "Nichts Ungewöhnliches."
 cyber.415.a.tt: "§Y$situation_cyberization$§!-Situationsfortschritt: §G+25%§!"
 cyber.415.b: "Wir müssen die Sicherheit der Nutzer gewährleisten."
 cyber.415.c: "Bestraft die schlimmsten Unternehmen."
 cyber.415.c.tt: "§Y$situation_cyberization$§!-Situationsfortschritt: §R-25%§!"
 cyber.420.name: "Mit Absicht gefährlich entworfen" #Corporate rival escalation
 cyber.420.desc: "In letzter Zeit hat eine fragwürdige neue Art kybernetischer Implantate an Beliebtheit gewonnen. Diese sind nicht dazu bestimmt, dem Nutzer zu helfen, sondern andere zu verletzen: Giftsprühgeräte, Nano-Garrotten und Apparaturen, die ein Cybergehirn überlasten können, überschwemmen unsere Straßen.\n\nBefürworter argumentieren, diese Implantate seien zur Selbstverteidigung notwendig, wohingegen andere darauf beharren, eine solche Technologie könne nichts Gutes bringen."
 cyber.420.a: "Erlaubt dem Volk, sich selbst zu bewaffnen."
 cyber.420.b: "Das ist zu gefährlich."
 cyber.420.b.tt: "§Y$situation_cyberization$§!-Situationsfortschritt: §R-25%§!"
 cyber.420.b_pacifist: "Alle Implantate, die dazu bestimmt sind, anderen zu schaden, müssen eingezogen werden."
 cyber.420.b.tt_pacifist: "Verwendet die Materialien, um etwas ... Vernünftigeres zu bauen.\n\n"
 cyber.425.name: "Steuerungssoftware gehackt" #Independent rival
 cyber.425.desc: "In einem koordinierten Angriff haben sich mehrere Hackergruppen Zugang zur Kernsoftware verschafft, die alle kybernetischen Implantate steuert. Sie drohen damit, den Code der Öffentlichkeit zugänglich zu machen, sollten wir ihre Forderungen nicht erfüllen.\n\nBislang haben wir keinen Grund, an ihrer Entschlossenheit zu zweifeln. Sollte der Code veröffentlicht werden, bliebe uns keine andere Wahl, als ihn neu zu schreiben, was verheerende Auswirkungen auf unsere Augmentierungsbemühungen hätte."
 cyber.425.a: "Gebt ihren Forderungen nach."
 cyber.425.b: "Schreibt die Software neu."
 cyber.425.b.tt: "§Y$situation_cyberization$§!-Situationsfortschritt für §Y1§! Jahr: §R-25%§!"
 cyber.425.c: "Sollen sie es doch versuchen."
 cyber.425.c.tt: "Gut, dass wir die besten Hacker auf UNSERER Gehaltsliste haben."
 cyber.430.name: "Unzuverlässige Augmentierungen" #Independent rival escalation
 cyber.430.desc.demands: "Trotz der Zahlung eines hohen Lösegelds an die für den Sicherheitsverstoß verantwortlichen Hackergruppen wurde gestern Abend unser Primärcode in jedes öffentliche Informationsnetz hochgeladen. Der Veröffentlichung ging eine obszöne Grafik voraus, die sich über unsere Unfähigkeit, den Angriffe zu verhindern, lustig machte.\n\nDie Öffentlichkeit ist empört, und die \"Reue\" von Käufern kybernetischer Implantate hat spürbar zugenommen."
 cyber.430.desc.protest: "Die Implantatsteuerungssoftware neu zu programmieren, kostete viel Zeit und verlangsamte die Produktion.\n\nDie Bevölkerung ist immer abhängiger von den neuesten Augmentierungen, und viele sind auf die Straße gegangen, um gegen die verzögerte Markteinführung zu protestieren."
 cyber.430.a: "Wir werden die neusten Produkte in Kürze auf den Markt bringen."
 cyber.430.b: "Ignoriert sie."
 cyber.430.c.demands: "Beginnt damit, die Hacker aufzuspüren."
 cyber.430.c.protest: "Zerstreut die Demonstranten."
 cyber.21.name: "Eine augmentierte Bevölkerung" #Situation 1 - Last event
 cyber.21.desc: "Der heutige Tag markiert einen Wendepunkt für unsere Gesellschaft. Wir sind jetzt in der Lage, unseren Körper mit vollständig integrierten Maschinenteilen zu augmentieren.\n\nDer Prozess war äußerst schwierig und der Übergang alles andere als einfach. Doch was auch immer auf dem Weg verloren gegangen sein mag: Unsere neue Existenz bietet unendliche Möglichkeiten."
 cyber.21.a: "Wir werden immer stärker!"
 cyber.21.a.start: "Modifikator \"§Y$building_augmentation_center$§!\" hinzugefügt:$TABBED_NEW_LINE$"
 cyber.21.a.end: "Schaltet die vollständigen Effekte des Traditionsbaums \"['tradition_category:tradition_cybernetics']\" frei"
 cyber.21.a.gov.tt: "$cyber.21.a.start$$cyber_control_government_effects$\n$cyber.21.a.end$"
