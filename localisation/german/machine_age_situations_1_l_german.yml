 #Cyber Corporate Individualist
 auth_cyber_corporate_individualist: "Neurokommerz-Unternehmen"
 auth_cyber_corporate_individualist_desc: "Veraltete Hilfsmittel wie Werbetafeln und mobile Handgeräte haben es nicht geschafft, die volle Aufmerksamkeit der Verbraucher auf sich zu ziehen. Doch wir sind nun in der Lage, die Gedanken potenzieller Kunden zu scannen, um gezielt Botschaften oder Handlungsaufforderungen direkt ins Gehirn zu senden.\n\nDiese Innovation erlaubt es uns zudem, Besucher auf unseren Sternenbasen hinsichtlich Piratenaktivitäten zu überwachen. Sie wird allerdings wahrscheinlich auch eine Nachfrage nach Signalblockern auf dem Schwarzmarkt schaffen."
