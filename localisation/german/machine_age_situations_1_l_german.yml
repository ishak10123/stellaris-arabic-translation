 edict_stately_acclaim_desc: "Die Oligarchie betont die erhebliche Aufopferung der derzeit ausgebeuteten Fraktion und steigert so deren Zustimmung und Anziehung. Dieser flüchtige Ruhm kann auch zu einer gesteigerten sozialen Mobilität führen."
