 #Healing Guns
 tech_weaver_buffer_2: "Lecznicze zarodniki tkacza"
 tech_weaver_buffer_2_desc: "Zarodniki regeneracyjne są wystrzeliwane w sojusznicze okręty i naprawiają drobne uszkodzenia kadłuba oraz zwiększają ich wytrzymałość podczas walki."
 tech_weaver_buffer_3: "Naprawcze zarodniki tkacza"
 tech_weaver_buffer_3_desc: "Zwiększony poziom regeneracji dostarcza silnych związków leczniczych, które pomagają okrętom sojuszniczym przetrwać ciężki ostrzał."
 tech_weaver_buffer_4: "Adaptacyjne zarodniki tkacza"
 tech_weaver_buffer_4_desc: "Ukierunkowane wyrzuty wysoce adaptacyjnej biomaterii naprawiają znaczne uszkodzenia, jednocześnie wzmacniając proces organicznej regeneracji."
 tech_weaver_buffer_5: "Inteligentne zarodniki tkacza"
 tech_weaver_buffer_5_desc: "Wysyłane inteligentne czynniki lecznicze wyszukują i naprawiają kluczowe obszary, które uległy uszkodzeniu, drastycznie zwiększając szanse na przetrwanie w bitwie."
 tech_weaver_buffer_6: "Tajemnicze urządzenie naprawcze tkacza"
 tech_weaver_buffer_6_desc: "Ta broń wsparcia biologicznego jest zdolna do niemal natychmiastowej naprawy i regeneracji, zapewniając sojusznikom przetrwanie nawet najbardziej zaciekłych starć."
 BIO_HEALING_GUN_1: "Wyrzutnia zarodników"
 BIO_HEALING_GUN_1_DESC: "Wystrzeliwane kapsuły regeneracyjne dostarczają sojuszniczym okrętom silne substancje lecznicze."
