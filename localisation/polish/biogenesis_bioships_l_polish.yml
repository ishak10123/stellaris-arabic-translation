 BIO_COMBAT_COMPUTER_DEFAULT_DESC: "Wszystkie okręty biologiczne mają elementarne instynkty bojowe, mogą wykonywać uniki i obliczać namiary celów."
 BIO_COMBAT_COMPUTER_BASIC: "Wszczepy neuronowe"
 BIO_COMBAT_COMPUTER_BASIC_DESC: "Wszczepy te integrują się bezpośrednio z organicznymi systemami okrętu, umożliwiając szybkie podejmowanie decyzji i precyzyjną koordynację taktyczną. Działając jak żywy komputer bojowy, zwiększają świadomość sytuacyjną i optymalizują wydajność na polu bitwy."
 BIO_COMBAT_COMPUTER_ADVANCED: "Zaawansowane wszczepy neuronowe"
 BIO_COMBAT_COMPUTER_ADVANCED_DESC: "Systemy te, będące rozwinięciem standardowych implantów neuronowych, zwiększają szybkość przetwarzania danych taktycznych i podejmowania decyzji. Zapewniają większą wydajność i koordynację, umożliwiając okrętom biologicznym szybkie reagowanie na zmieniające się warunki na polu bitwy."
 BIO_COMBAT_COMPUTER_SAPIENT: "Rozumne wszczepy neuronowe"
 BIO_COMBAT_COMPUTER_SAPIENT_DESC: "Implanty te zawierają biorozumną inteligencję zdolną do niezależnego strategicznego myślenia. Łącząc organiczny instynkt ze sztucznym rozumowaniem, umożliwiają okrętom biologicznym dynamiczne dostosowywanie się do złożonych scenariuszy walki, wykazując się niemal autonomicznym podejmowaniem decyzji."
 BIO_COMBAT_COMPUTER_AUTONOMOUS: "Samodzielne wszczepy neuronowe"
 BIO_COMBAT_COMPUTER_AUTONOMOUS_DESC: "Systemy te działają w pełni autonomicznie. Wyposażone w samoświadomą biointeligencję, zapewniają okrętom zdolność analizowania, opracowywania strategii i podejmowania decyzji bez udziału czynników zewnętrznych, osiągając niezrównaną skuteczność bojową."
 BIO_COMBAT_COMPUTER_PRECOG: "Prekognicyjne instynkty bojowe"
 BIO_COMBAT_COMPUTER_PRECOG_DESC: "Wykorzystując moc psioniki, implanty te zapewniają okrętom biologicznym zdolności prekognitywne, które pozwalają im przewidywać działania wroga, zanim one nastąpią. Ta niemal nadprzyrodzona zdolność daje flotom decydującą przewagę, umożliwiając reakcje w ułamku sekundy na nawet najbardziej złożone zagrożenia."
