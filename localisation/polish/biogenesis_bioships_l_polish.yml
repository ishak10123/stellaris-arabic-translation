 tech_weaver_debuffer_2: "Tłumiące wici"
 tech_weaver_debuffer_2_desc: "Organiczne wici tłumiące emitują impulsy destabilizujące, które zakłócają działanie osłon przeciwnika i osłabiają jego systemy obronne."
 tech_weaver_debuffer_3: "Dławiące wici"
 tech_weaver_debuffer_3_desc: "Udoskonalone systemy tłumiące wzmacniają pola zakłócające, skutecznie zmniejszając integralność osłon i wytrzymałość okrętów przeciwnika."
 tech_weaver_debuffer_4: "Zakłócające wici"
 tech_weaver_debuffer_4_desc: "Potężne wici wytwarzają rozległe pola tłumiące, paraliżując całe formacje wrogich okrętów poprzez zakłócanie zarówno osłon, jak i komunikacji."
 tech_weaver_debuffer_5: "Bioelektryczne wici"
 tech_weaver_debuffer_5_desc: "Adaptacyjne bioelektryczne impulsy osłabiają osłony i destabilizują systemy celownicze, przez co przeciwnicy stają się bezbronni i zdezorientowani."
 tech_weaver_debuffer_6: "Fale bioplazmy"
 tech_weaver_debuffer_6_desc: "Złożone fale bioplazmy o dużym zasięgu neutralizują osłony i paraliżują systemy, czyniąc wrogów bezradnymi."
 bio_confuser_tt_intro: "Do"
 bio_confuser_tt_outro: "Szansa ['concept_confusion', zdezorientowania] okrętów wojennych na £time£ §Y5-10§! dni, w zależności od wielkości okrętu wskazanego jako cel."
 concept_confusion: "Zdezorientowanie"
