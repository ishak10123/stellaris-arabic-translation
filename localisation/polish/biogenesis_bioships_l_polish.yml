 BIOSHIP_SENSOR_1: "Radiolokacja"
 BIOSHIP_SENSOR_1_DESC: "Te organy czuciowe korzystają z organicznego odpowiednika radaru, aby statki działające w głębokiej przestrzeni kosmicznej mogły posiadać podstawowe zdolności wykrywania i śledzenia celów."
 BIOSHIP_SENSOR_2: "Czujniki grawitacyjne"
 BIOSHIP_SENSOR_2_DESC: "Te organy czuciowe rozwinęły się tak, by wykrywały zmiany grawitacyjne w przestrzeni kosmicznej, na przykład tych wytwarzanych przez statki kosmiczne."
 TECH_UNLOCK_BIOSHIP_SENSOR_2_TITLE: "§HOdblokowuje komponent:§! $BIOSHIP_SENSOR_2$"
 TECH_UNLOCK_BIOSHIP_SENSOR_2_DESC: "§H$BIOSHIP_SENSOR_2$§!\n$BIOSHIP_SENSOR_2_DESC$"
 BIOSHIP_SENSOR_3: "Czujniki podprzestrzenne"
 BIOSHIP_SENSOR_3_DESC: "Organy czuciowe wykrywające fluktuacje podprzestrzenne wywołane przez przemieszczające się statki. Ich czułość i zasięg są znacznie większe niż wcześniejszych organów czuciowych stworzony z myślą o głębokiej przestrzeni kosmicznej."
 TECH_UNLOCK_BIOSHIP_SENSOR_3_TITLE: "§HOdblokowuje komponent:§! $BIOSHIP_SENSOR_3$"
 TECH_UNLOCK_BIOSHIP_SENSOR_3_DESC: "§H$BIOSHIP_SENSOR_3$§!\n$BIOSHIP_SENSOR_3_DESC$"
 BIOSHIP_SENSOR_4: "Czujniki tachionowe"
 BIOSHIP_SENSOR_4_DESC: "Organy czuciowe wykorzystujące wirujące promienie tachionowe do wykrywania ruchu międzygwiezdnego z ekstremalnych odległości."
 TECH_UNLOCK_BIOSHIP_SENSOR_4_TITLE: "§HOdblokowuje komponent:§! $BIOSHIP_SENSOR_4$"
 TECH_UNLOCK_BIOSHIP_SENSOR_4_DESC: "§H$BIOSHIP_SENSOR_4$§!\n$BIOSHIP_SENSOR_4_DESC$"
 #FTL Drives
 BIO_EMPTY_DRIVE: "$EMPTY_DRIVE$"
 BIO_EMPTY_DRIVE_DESC: "$EMPTY_DRIVE_DESC$"
 BIO_HYPER_DRIVE_1: "Pole biologicznej hiperlinii I"
 BIO_HYPER_DRIVE_1_DESC: "Nieustanne napieranie na hiperprzestrzeń pozwala temu statkowi przeciskać się przez ciasne przejścia międzygwiezdnych hiperlinii."
 BIO_HYPER_DRIVE_2: "Pole biologicznej hiperlinii II"
 BIO_HYPER_DRIVE_2_DESC: "$BIO_HYPER_DRIVE_1_DESC$"
 BIO_HYPER_DRIVE_3: "Pole biologicznej hiperlinii III"
 BIO_HYPER_DRIVE_3_DESC: "$BIO_HYPER_DRIVE_1_DESC$"
 BIO_JUMP_DRIVE_1: "Organ skokowy"
 BIO_JUMP_DRIVE_1_DESC: "Organ skokowy otwiera dziurę wielkości statku w osnowie rzeczywistości, co umożliwia praktycznie natychmiastowe przeniesienie się z układu do układu. Wciąż niewiele wiadomo o właściwościach przestrzeni, w której statek porusza się podczas tej podróży."
 BIO_PSI_JUMP_DRIVE_1: "Psioniczny organ skokowy"
 BIO_PSI_JUMP_DRIVE_1_DESC: "Psioniczny organ skokowy działa jako miejsce koncentracji potencjału psionicznego statku i jego załogi w celu zakrzywienia miejscowego kontinuum czasoprzestrzeni, likwidującego odległość między punktem początkowym i docelowym. Podobno."
 tech_bio_hyper_drive_1: "Podróż nadprzestrzenna"
 tech_bio_hyper_drive_1_desc: "Pozawymiarowa kraina nadprzestrzeni rozciąga się niczym pajęcza sieć między studniami grawitacyjnymi większości gwiazd. Po tych hiperliniach można teoretycznie podróżować szybciej niż światło."
 tech_bio_hyper_drive_2: "Punkty przełamania hiperlinii"
 tech_bio_hyper_drive_2_desc: "Odkryliśmy istnienie w przestrzeni pewnych punktów, w których statek kosmiczny zużywa mniej energii na \"włamanie się\" do hiperlinii. Dzięki temu powstanie nowa generacja hipernapędu."
 tech_bio_hyper_drive_3: "Ślizgi w nadprzestrzeni"
 tech_bio_hyper_drive_3_desc: "Nowa generacja hipernapędu - silniki, które są w stanie przedostać się na tzw. ślizgi podprzestrzenne. Dzięki temu osiągi napędu znacznie wzrastają."
 tech_bio_jump_drive_1: "$BIO_JUMP_DRIVE_1$"
 tech_bio_jump_drive_1_desc: "$BIO_JUMP_DRIVE_1$ to rewolucyjne rozwiązanie, które manipuluje lokalną czasoprzestrzenią na poziomie kwantowym, przekształcając ją tak, aby pasowała do miejsca docelowego. Proces ten umożliwia statkom niemal natychmiastowe \"przeskakiwanie\" między układami."
 tech_bio_psi_jump_drive_1: "$BIO_PSI_JUMP_DRIVE_1$"
 tech_bio_psi_jump_drive_1_desc: "$BIO_PSI_JUMP_DRIVE_1_DESC$"
