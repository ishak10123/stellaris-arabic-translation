 bio_ship_unique_components: "Dodatkowe organy"
 bio_ship_unique_components_DESC: "Te dodatkowe organy wyhodowane lub przeszczepione do żywych kadłubów zostały zaprojektowane w celu dostrojenia unikalnych możliwości okrętów biologicznych."
 MAULER_STAGE_1_GROWTH_1: "$ship_growth_stage_1$: Gruczoły rozwoju"
 MAULER_STAGE_1_GROWTH_1_DESC: "Wszczepione gruczoły wydzielają silną mieszaninę hormonów i sterydów, która powoduje, że ten statek wchodzi w następny etap rozwoju."
 MAULER_STAGE_1_GROWTH_2: "Przyspieszenie $ship_growth_stage_1$: Gruczoły rozwoju"
 MAULER_STAGE_1_GROWTH_2_DESC: "Poprzez nasycanie gazami egzotycznymi swoich wydzielin bogatych w hormony i steroidy narząd ten przyspiesza wzrost okrętów biologicznych."
 MAULER_STAGE_2_GROWTH_1: "$ship_growth_stage_2$: Gruczoły rozwoju"
