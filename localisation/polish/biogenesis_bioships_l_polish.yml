 tech_bio_fission_power: "$BIO_FISSION_REACTOR$"
 BIO_FISSION_REACTOR: "Metabolizm jądrowy"
 BIO_FISSION_REACTOR_DESC: "Dzięki odpowiedniej bioinżynierii układ trawienny może działać jak biologiczny reaktor jądrowy, dzięki czemu metabolizm może opierać się na wywołanym rozszczepieniu, które wytwarza energię oraz szkodliwe odpady promieniotwórcze."
 tech_bio_fusion_power: "$BIO_FUSION_REACTOR$"
 BIO_FUSION_REACTOR: "Metabolizm jądrowy"
 BIO_FUSION_REACTOR_DESC: "Integrując mikrofaunę zdolną do syntezy jądrowej z biomem jelit okrętu biologicznego, system ten generuje ogromną moc i jednocześnie unika wielu zagrożeń związanych ze źródłami energii opartymi na procesie rozszczepienia."
