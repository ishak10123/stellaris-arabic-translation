 BIO_ARCHAEO_ARMOR: "Karapaks pulsacyjny"
 BIO_ARCHAEO_ARMOR_DESC: "Zjonizowane warstwy karapaksu generują reaktywny ładunek, rozpraszając energię uderzeniową poprzez odpychanie magnetyczne i emitowane pola."
