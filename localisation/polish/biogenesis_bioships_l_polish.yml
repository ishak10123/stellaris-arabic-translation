 #Mauler Technologies
 tech_maulers: "$mauler_class_plural_cap$"
 tech_maulers_desc: "Przełomowe odkrycia w dziedzinie bioinżynierii umożliwiły rozwój pojazdów wojskowych, które mogą operować w kosmosie i podróżować z prędkościami nadświetlnymi."
 TECH_UNLOCK_mauler_stage_1_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! $mauler_stage_1$"
 TECH_UNLOCK_mauler_stage_1_CONSTRUCTION_DESC: "§H$mauler_stage_1$§!\n$mauler_class_cap$ to najprostszy okręt wojenny, wyposażony w uzbrojenie bliskiego zasięgu i mający gruby pancerz skorupowy."
 tech_mauler_build_speed: "Standardowa inkubacja dręczyciela"
 tech_mauler_build_speed_desc: "Te komory inkubacyjne przyspieszają rozwój embrionalnych okrętów wojennych w biokapsułach o dużej zawartości składników odżywczych. Choć są prymitywne, stanowią pierwszy krok ku flocie, która nie jest budowana, lecz hodowana."
 tech_mauler_build_speed_effect: "$mod_ship_mauler_cost_mult$: §G-5%§!\n$mauler_class_cap$ Szybkość budowy: §G+25%§!"
 tech_mauler_growth_1: "Ulepszony rozwój dręczyciela"
 tech_mauler_growth_1_desc: "Udoskonalone procesy inkubacji skracają czas dojrzewania i poprawiają integralność strukturalną organicznych okrętów kosmicznych. Ulepszone systemy dostarczania składników odżywczych i dostrajanie genetyczne sprawiają, że jednostki są zarówno szybkie, jak i wytrzymałe."
 TECH_UNLOCK_mauler_stage_2_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! $mauler_stage_2$"
 TECH_UNLOCK_mauler_stage_2_CONSTRUCTION_DESC: "§H$mauler_stage_2$§!\nOkręt $ship_growth_stage_2$ $mauler_class_cap$ został wyhodowany tak, aby posiadał większą siłę ognia i lepszy pancerz."
 gateway_bio_ships: "§HŚcieżka statków biologicznych§!\n§ETa technologia doprowadzi do dalszego rozwoju w dziedzinie budowy potężniejszych statków biologicznych.§!"
 tech_mauler_growth_2: "Zaawansowany rozwój dręczyciela"
 tech_mauler_growth_2_desc: "Obiekty te pozwalają uzyskać jednostki o niezrównanej witalności i możliwościach adaptacyjnych. Zoptymalizowane matryce genetyczne i zaawansowane wsparcie biotechnologiczne gwarantują niedoścignioną skuteczność w przestrzeni kosmicznej."
 TECH_UNLOCK_mauler_stage_3_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! $mauler_stage_3$"
 TECH_UNLOCK_mauler_stage_3_CONSTRUCTION_DESC: "§H$mauler_stage_3$§!\nOkręt $ship_growth_stage_3$ $mauler_class_cap$ to najlepsza z jednostek typu $mauler_class_cap$, świetnie opancerzona i z silnym uzbrojeniem bliskiego zasięgu."
 #Weaver Technologies
 tech_weavers: "$weaver_class_plural_cap$"
 tech_weavers_desc: "Tkacze, opierające się na fundamentach wczesnej bioinżynierii, zostały stworzone tak, by łączyć zwrotność ze zwiększonymi możliwościami bojowymi."
 TECH_UNLOCK_weaver_stage_1_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! $weaver_stage_1$"
 TECH_UNLOCK_weaver_stage_1_CONSTRUCTION_DESC: "§H$weaver_stage_1$§!\n$weaver_class_cap$ to wszechstronny okręt średniej wielkości zaprojektowany z myślą o zwodzeniu większych przeciwników i wspieraniu działań floty."
 tech_weaver_build_speed: "Standardowa inkubacja tkacza"
 tech_weaver_build_speed_desc: "Obiekty te hodują średniej wielkości okręty biologiczne w udoskonalonych biokapsułach, wykorzystując ulepszone systemy dostarczania składników odżywczych i optymalizację genetyczną w celu stworzenia zwinnych i elastycznych jednostek dla floty."
 tech_weaver_build_speed_effect: "$mod_ship_weaver_cost_mult$: §G-5%§!\n$weaver_class_cap$ Szybkość budowy: §G+25%§!"
 tech_weaver_growth_1: "Ulepszony rozwój tkacza"
 tech_weaver_growth_1_desc: "Obiekty te wykorzystują ulepszone techniki bioinżynierii w celu przyspieszenia cykli wzrostu i zwiększenia zdolności adaptacyjnych okrętów. Udoskonalone matryce genetyczne i zoptymalizowane środowiska sprawiają, że hodowane w nich okręty biologiczne są zarówno wytrzymałe, jak i niezwykle responsywne w walce."
 TECH_UNLOCK_weaver_stage_2_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! $weaver_stage_2$"
 TECH_UNLOCK_weaver_stage_2_CONSTRUCTION_DESC: "§H$weaver_stage_2$§!\n$ship_growth_stage_2$ $weaver_class_cap$ został wyhodowany tak, aby odznaczać się ulepszoną mobilnością i adaptacją podczas operacji floty."
 tech_weaver_growth_2: "Zaawansowany rozwój tkacza"
 tech_weaver_growth_2_desc: "Obiekty te produkują okręty biologiczne o niezrównanej precyzji i wszechstronności. Rewolucyjne techniki wzrostu i adaptacyjne ulepszenia genetyczne pozwalają hodować jednostki, które sprawdzają się nawet w najbardziej wymagających scenariuszach taktycznych."
 TECH_UNLOCK_weaver_stage_3_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! $weaver_stage_3$"
 TECH_UNLOCK_weaver_stage_3_CONSTRUCTION_DESC: "§H$weaver_stage_3$§!\n$ship_growth_stage_3$ $weaver_class_cap$ został skrupulatnie wyhodowany z myślą o uzyskaniu najwyższej zwinności i wszechstronności taktycznej."
 #Harbinger Technologies
 tech_harbingers: "$harbinger_class_plural_cap$"
 tech_harbingers_desc: "Zwiastuny stanowią znaczący skok w rozwoju bioinżynierii wojennej, łącząc potężną siłę ognia z wytrzymałością żywej technologii. Okręty te stanowią trzon floty."
 TECH_UNLOCK_harbinger_stage_1_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! $harbinger_stage_1$"
 TECH_UNLOCK_harbinger_stage_1_CONSTRUCTION_DESC: "§H$harbinger_stage_1$§!\n$harbinger_class_cap$ wzmacnia flotę poprzez tworzenie pojazdów szturmowych."
 tech_harbinger_build_speed: "Standardowa inkubacja zwiastuna"
 tech_harbinger_build_speed_desc: "Obiekty te hodują duże okręty biologiczne, karmiąc je za pomocą zaawansowanej infuzji składników odżywczych, aby zapewnić im wytrzymałość i gotowość bojową."
 tech_harbinger_build_speed_effect: "$mod_ship_harbinger_cost_mult$: §G-5%§!\n$harbinger_class_cap$ Szybkość budowy: §G+25%§!"
 tech_harbinger_growth_1: "Ulepszony rozwój zwiastuna"
 tech_harbinger_growth_1_desc: "Udoskonalone obiekty wykorzystujące zaawansowane techniki bioinżynierii w celu przyspieszenia wzrostu i zwiększenia integralności strukturalnej. Powstałe w ten sposób okręty charakteryzują się zwiększoną wytrzymałością i skutecznością bojową."
 TECH_UNLOCK_harbinger_stage_2_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! $harbinger_stage_2$"
 TECH_UNLOCK_harbinger_stage_2_CONSTRUCTION_DESC: "§H$harbinger_stage_2$§!\nUlepszone techniki wzrostu zapewniają mocniejsze i bardziej niezawodne jednostki."
 tech_harbinger_growth_2: "Zaawansowany rozwój zwiastuna"
 tech_harbinger_growth_2_desc: "Zaawansowane systemy inkubacyjne wytwarzają okręty biologiczne o wyjątkowej wytrzymałości i sile ognia. Dostrajanie genetyczne i doskonałe warunki wzrostu tworzą okręty zdolne do zdominowania pola bitwy dzięki niezrównanej wytrzymałości."
 TECH_UNLOCK_harbinger_stage_3_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! $harbinger_stage_3$"
 TECH_UNLOCK_harbinger_stage_3_CONSTRUCTION_DESC: "§H$harbinger_stage_3$§!\nWyhodowany z myślą o uzyskaniu maksymalnej siły i przewagi na polu bitwy."
 #Stinger Technologies
 tech_stingers: "$stinger_class_plural_cap$"
 tech_stingers_desc: "Groty zostały zaprojektowane z myślą o przeprowadzaniu druzgocących ataków na cele o dużej wartości. Doskonale wykorzystują słabe punkty obrony przeciwnika."
 TECH_UNLOCK_stinger_stage_1_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! $stinger_stage_1$"
 TECH_UNLOCK_stinger_stage_1_CONSTRUCTION_DESC: "§H$stinger_stage_1$§!\nSzybki i śmiercionośny okręt biologiczny stworzony do precyzyjnych ataków i zapewniania przewagi taktycznej."
 tech_stinger_build_speed: "Standardowa inkubacja grota"
 tech_stinger_build_speed_desc: "Obiekty te hodują eleganckie, zwinne okręty biologiczne zaprojektowane z myślą o precyzji i szybkości. Wykorzystując zaawansowane biokapsuły i wyspecjalizowane roztwory odżywcze, wytwarzają statki zdolne do precyzyjnych i skutecznych ataków."
 tech_stinger_build_speed_effect: "$mod_ship_stinger_cost_mult$: §G-5%§!\n$stinger_class_cap$ Szybkość budowy: §G+25%§!"
 tech_stinger_growth_1: "Ulepszony rozwój grota"
 tech_stinger_growth_1_desc: "Udoskonalone obiekty przyspieszają cykle wzrostu i zwiększają bioinżynieryjną precyzję, w wyniku czego powstają okręty o doskonałej zwrotności i celności. Ulepszenia te sprawiają, że grot jest niszczycielską potęgą w starciach taktycznych."
 TECH_UNLOCK_stinger_stage_2_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! $stinger_stage_2$"
 TECH_UNLOCK_stinger_stage_2_CONSTRUCTION_DESC: "§H$stinger_stage_2$§!\nUdoskonalony pod kątem większej szybkości i precyzji w operacjach taktycznych."
 tech_stinger_growth_2: "Zaawansowany rozwój grota"
 tech_stinger_growth_2_desc: "Te zaawansowane obiekty, będące szczytowym osiągnięciem technologii hodowli okrętów biologicznych, produkują groty o niezrównanej szybkości i śmiercionośności. Zoptymalizowane szablony genetyczne i najnowocześniejsze techniki inkubacji sprawiają, że statki te dominują na każdym polu bitwy z szybką i zabójczą precyzją."
 TECH_UNLOCK_stinger_stage_3_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! $stinger_stage_3$"
 TECH_UNLOCK_stinger_stage_3_CONSTRUCTION_DESC: "§H$stinger_stage_3$§!\nWyhodowany z myślą o najwyższej szybkości, precyzji i dominacji na polu bitwy."
