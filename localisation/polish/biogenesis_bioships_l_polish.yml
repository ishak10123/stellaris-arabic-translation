 BIO_DARK_MATTER_REACTOR: "Metabolizm ciemnej materii"
 BIO_DARK_MATTER_REACTOR_DESC: "Tajemnicza substancja pokrywa układ trawienny naszych okrętów i czerpie energię bezpośrednio z ciemnej materii, łamiąc przy tym znane prawa fizyki."
