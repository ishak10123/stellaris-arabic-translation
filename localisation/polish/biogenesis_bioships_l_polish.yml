 #Shields/Musculature
 tech_bio_shields_1: "$tech_shields_1$"
 BIO_SHIELD_1: "Muskulatura deflektorowa"
 BIO_SHIELD_1_DESC: "Wyspecjalizowana tkanka mięśniowa generuje pole energetyczne, tworząc ochronną osłonę deflektorową. Chociaż absorbuje ograniczoną ilość energii, jest zdolna do szybkiej regeneracji."
 SMALL_BIO_SHIELD_1: "Mała $BIO_SHIELD_1$"
 MEDIUM_BIO_SHIELD_1: "Średnia $BIO_SHIELD_1$"
 LARGE_BIO_SHIELD_1: "Duża $BIO_SHIELD_1$"
 tech_bio_shields_2: "$tech_shields_2$"
 BIO_SHIELD_2: "Ulepszona muskulatura deflektorowa"
 BIO_SHIELD_2_DESC: "Udoskonalona tkanka mięśniowa wydajniej przewodzi energię, wzmacniając osłony deflektorowe. Te ulepszone systemy pochłaniają więcej obrażeń i szybciej się regenerują, oferując lepszą ochronę podczas przedłużającej się walki."
 SMALL_BIO_SHIELD_2: "Mała $BIO_SHIELD_2$"
 MEDIUM_BIO_SHIELD_2: "Średnia $BIO_SHIELD_2$"
 LARGE_BIO_SHIELD_2: "Duża $BIO_SHIELD_2$"
 tech_bio_shields_3: "$tech_shields_3$"
 BIO_SHIELD_3: "Osłonięta muskulatura"
 BIO_SHIELD_3_DESC: "Ta zaawansowana technologia bioosłon integruje wzmocnione, przewodzące energię tkanki ze zwiększonymi możliwościami ochronnymi. Oferuje dużą odporność zarówno na ataki energetyczne, jak i kinetyczne, zapewniając elastyczną obronę okrętom biologicznym w różnych sytuacjach bojowych."
 SMALL_BIO_SHIELD_3: "Mała $BIO_SHIELD_3$"
 MEDIUM_BIO_SHIELD_3: "Średnia $BIO_SHIELD_3$"
 LARGE_BIO_SHIELD_3: "Duża $BIO_SHIELD_3$"
 tech_bio_shields_4: "$tech_shields_4$"
 BIO_SHIELD_4: "Zaawansowana osłonięta muskulatura"
 BIO_SHIELD_4_DESC: "Wzmocniona muskulatura będąca szczytowym osiągnięciem technologii bioosłon przewodzi energię bardziej efektywnie, zwiększając wytrzymałość osłony. Oferuje świetną ochronę zarówno przed atakami energetycznymi, jak i kinetycznymi, zapewniając wszechstronną obronę w walce."
 SMALL_BIO_SHIELD_4: "Mała $BIO_SHIELD_4$"
 MEDIUM_BIO_SHIELD_4: "Średnia $BIO_SHIELD_4$"
 LARGE_BIO_SHIELD_4: "Duża $BIO_SHIELD_4$"
 tech_bio_shields_5: "$tech_shields_5$"
 BIO_SHIELD_5: "Hiperosłonięta muskulatura"
 BIO_SHIELD_5_DESC: "Hiperadaptacyjne tkanki odprowadzają ogromne ilości energii, tworząc niemal niemożliwą do sforsowania barierę ochronną. Ten zaawansowany system szybko się regeneruje, zapewniając okrętowi biologicznemu bezpieczeństwo nawet podczas nieustannych ataków."
 SMALL_BIO_SHIELD_5: "Mała $BIO_SHIELD_5$"
 MEDIUM_BIO_SHIELD_5: "Średnia $BIO_SHIELD_5$"
 LARGE_BIO_SHIELD_5: "Duża $BIO_SHIELD_5$"
 tech_bio_dark_matter_deflector: "$tech_dark_matter_deflector$"
 DARK_MATTER_BIO_DEFLECTOR: "Muskulatura naładowana ciemną materią"
 DARK_MATTER_BIO_DEFLECTOR_DESC: "Ta najnowocześniejsza bioosłona łączy ciemną materię z organicznymi tkankami, radykalnie zwiększając przewodnictwo energii i zdolności obronne. Zastosowanie tej egzotycznej substancji umożliwia mięśniom wytworzenie osłon o niezrównanej sile, zdolnych sprostać ekstremalnym poziomom obrażeń."
 SMALL_DARK_MATTER_BIO_DEFLECTOR: "Mały $DARK_MATTER_BIO_DEFLECTOR$"
 MEDIUM_DARK_MATTER_BIO_DEFLECTOR: "Średni $DARK_MATTER_BIO_DEFLECTOR$"
 LARGE_DARK_MATTER_BIO_DEFLECTOR: "Duży $DARK_MATTER_BIO_DEFLECTOR$"
 tech_bio_psionic_barrier: "$tech_psionic_barrier$"
 PSI_BIO_SHIELD: "Muskulatura naładowana zro"
 PSI_BIO_SHIELD_DESC: "Ta zaawansowana muskulatura nasycona psionicznie reaktywną substancją zro generuje osłony o niezrównanej precyzji i możliwościach adaptacyjnych. Jej unikalne właściwości zwiększają zarówno wytrzymałość, jak i zdolności regeneracyjne bioosłony, zapewniając niemal nadnaturalny poziom obrony."
 SMALL_PSI_BIO_SHIELD: "Mała $PSI_BIO_SHIELD$"
 MEDIUM_PSI_BIO_SHIELD: "Średnia $PSI_BIO_SHIELD$"
 LARGE_PSI_BIO_SHIELD: "Duża $PSI_BIO_SHIELD$"
 tech_bio_psionic_shield: "$tech_psionic_shield$"
 PSI_BIO_BARRIER: "Tkanka odbijająca psi"
 PSI_BIO_BARRIER_DESC: "Ta niebywała biologiczna osłona wykorzystuje energię psioniczną wytwarzaną przez specjalnie wyhodowane tkanki. Powstają w ten sposób mechanizmy obronne, które z niezwykłą precyzją dostosowują się do nadciągających zagrożeń. Rezonans wzmacnia siłę osłony i przyspiesza regenerację, czyniąc z niej potężne zabezpieczenie przed nawet najbardziej nieprzewidywalnymi atakami."
 SMALL_PSI_BIO_BARRIER: "Mała $PSI_BIO_BARRIER$"
 MEDIUM_PSI_BIO_BARRIER: "Średnia $PSI_BIO_BARRIER$"
 LARGE_PSI_BIO_BARRIER: "Duża $PSI_BIO_BARRIER$"
 tech_bio_archaeoshield: "$tech_archaeoshield$"
 BIO_ARCHAEO_SHIELD: "Tkanka pola antygrawitacyjnego"
 BIO_ARCHAEO_SHIELD_DESC: "Poprzez kultywowanie tkanek wytwarzających osłony wokół węzłów starożytnych artefaktów technologia ta generuje pola antygrawitacyjne, które spowalniają czas w miejscu uderzenia. Opóźnienie to zwiększa zdolność osłony do rozpraszania energii nadchodzących ataków, znacznie wzmacniając obronną wytrzymałość."
 SMALL_BIO_ARCHAEO_SHIELD: "Mała $BIO_ARCHAEO_SHIELD$"
 MEDIUM_BIO_ARCHAEO_SHIELD: "Średnia $BIO_ARCHAEO_SHIELD$"
 LARGE_BIO_ARCHAEO_SHIELD: "Duża $BIO_ARCHAEO_SHIELD$"
