 ######################
 #Graphical Cultures #
 ######################
 BIOGENESIS_CAT: "BioGenesis"
 BIOGENESIS_01: "Kościożer"
 BIOGENESIS_02: "Skorupowiec"
 graphical_culture_tooltip_not_biological: "Nie ma zestawu statków ['concept_biological_ship', biologicznych]"
 graphical_culture_tooltip_biological: "Musi mieć zestaw statków ['concept_biological_ship', biologicznych]"
 concept_biological_ship: "$bio_ship$"
 concept_biological_ships: "$concept_biological_ship$"
 concept_biological_ship_desc: "- Statki biologiczne używają wyspecjalizowanych klas okrętów bojowych pełniących ściśle określone role i przechodzących trzy etapy rozwoju. $NEW_LINE$- Koszty budowy zużywają głównie $i_food$ zamiast: $i_alloys$. $NEW_LINE$- Utrzymanie zużywa głównie $i_food$ zamiast: $i_energy$. $NEW_LINE$- Zależne od §Y£society£biologicznych§! technologii, a nie od §Y£engineering£techniki kosmicznej§!. $NEW_LINE$$h_line$§LŻywe statki składają się z ogromnych, pofałdowanych włókien mięśniowych, które są wypełnione bioluminescencyjnymi organellami, uwalniającymi wysokoenergetyczne związki chemiczne - dzięki temu wytwarzają rozbłyski światła oraz ciepło służące jako źródło napędu.§!"
 default_ship: "Statki mechaniczne"
 bio_ship: "Statki biologiczne"
 #Shipset Descriptions
 biogenesis_01_shipset_desc: "§HRodzaj zestawu okrętów: ['concept_biological_ship', biologiczne]§!\nW takim samym stopniu rodzą się, co są budowane. Te żywe okręty wojenne to najgroźniejsze z drapieżników. Ich półświadoma biomasa niestrudzenie adaptuje się, poluje i atakuje."
 biogenesis_02_shipset_desc: "§HRodzaj zestawu okrętów: ['concept_biological_ship', biologiczne]§!\nHodowane przez odważnych, te okręty z mocnymi skorupami nie służą, lecz trwają, rosnąc wraz z nieustraszonymi odkrywcami, którzy nazywają je swoim domem."
 humanoid_01_shipset_desc: "Te wytrzymałe i śmiałe statki buduje się z myślą o przetrwaniu zagrożeń czających się w przestrzeni kosmicznej. Mają podbijać nieznane, nieść nadzieję i marzenia swoich twórców aż do najodleglejszych gwiazd."
 synthetics_01_shipset_desc: "Te projekty ukazują czystość niestrudzonych umysłów. Wypełnione ciepłem kadłuby odprowadzają energię z przetaktowanych komputerów, co umożliwia bezawaryjne działanie w dążeniu do totalnej wydajności."
 mammalian_01_shipset_desc: "Budowane z myślą o trwałości, te wytrzymałe jednostki są ucieleśnieniem odporności ich twórców. Gęste kadłuby izolują i chronią, a redundantne systemy pozwalają przetrwać nawet w najgorszych warunkach."
 reptilian_01_shipset_desc: "Kanciasty i utylitarny projekt tej jednostki przywołuje na myśl wytrzymałego drapieżnika. Jej obecność w pustce jest świadectwem zimnokrwistej wytrwałości rasy, która je stworzyła."
 avian_01_shipset_desc: "Wszechstronne okręty odznaczające się gracją i elegancją uosabiają piękno lotu. Każda krzywizna i kontur są dziełem gatunku, dla którego przestrzeń kosmiczna nie jest przeszkodą, lecz przedłużeniem nieba."
 arthropoid_01_shipset_desc: "Chityna czy stal? Forma czy funkcja? W przypadku tych jednostek pytania te nie mają znaczenia. Okręty nie są tworzone z myślą o inspirowaniu, lecz o wytrzymałości. Ich wielowarstwowe kadłuby są ucieleśnieniem czystej filozofii przetrwania."
 molluscoid_01_shipset_desc: "Pełne gracji, a zarazem wytrzymałe statki są jednocześnie schronieniem i włócznią. Pod utwardzonymi powłokami złożone systemy z cichą wydajnością regulują przepływ energii i obieg składników odżywczych."
 fungoid_01_shipset_desc: "Bulwiaste jednostki przywołują na myśl piękno grzybowych rozkwitów. Ich wyspecjalizowane systemy zbudowane z myślą o samowystarczalności tworzą skomplikowane wewnętrzne sieci będące odzwierciedleniem logiki grzybni."
 plantoid_01_shipset_desc: "Te zielone statki nie tylko podróżują wśród gwiazd, ale zapuszczają też wśród nich korzenie. Fotosyntetyczne gondole utrzymują stan równowagi, balansują pokładowe biomy."
 lithoid_01_shipset_desc: "Te przypominające skały jednostki wykute przez czas i ciśnienie są ucieleśnieniem trwałości. Matryce z kryształu krzemu chronią kluczowe systemy, czerpiąc siłę z tych samych mocy, które kształtują światy."
 necroid_01_shipset_desc: "Te mroczne i złowieszcze pływające katedry są monumentami śmierci i odrodzenia. Ich entropowe rdzenie i rytualne projekty szepczą o mocy pustki i wiecznej ambicji."
 nemesis_01_shipset_desc: "Te ogromne i przytłaczające konstrukcje wymuszają uległość. Wzmocnione nadbudówki i nadmiarowe systemy tworzą aurę niedoścignionej dominacji."
 aquatic_01_shipset_desc: "Te płynne a jednocześnie wytrzymałe statki wykorzystują moc oceanów. Wodne wnętrza i hydrodynamiczne kształty uosabiają wdzięk ich twórców."
 toxoid_01_shipset_desc: "Jednostki te emitują spaliny, złowieszczo grzechoczą i łamią wszelkie przepisy - ale działają. Napędzane odpadami i utrzymywane w całości dzięki upartej pomysłowości dają radę tam, gdzie inne zawodzą."
 cybernetics_01_shipset_desc: "Chrom błyszczy, obwody brzęczą, a odruchy należą już do przeszłości. Bezpośrednie połączenia neuronowe oznaczają brak opóźnień, brak ograniczeń - po prostu czystą, wysokooktanową precyzję."
