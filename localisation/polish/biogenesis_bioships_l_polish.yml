 #Unique components
 MAULER_PURSUIT_1: "Recykler metaboliczny"
 MAULER_PURSUIT_1_DESC: "Recykling odpadów chemicznych wytwarzanych przez organy motoryczne statku zwiększa jego wytrzymałość."
 MAULER_PURSUIT_2: "Recykler energetyczny"
 MAULER_PURSUIT_2_DESC: "Niestabilny pył w przewodach recyklingowych statku dodatkowo zwiększa wytrzymałość jednostki."
 MAULER_BITER_1: "Korozyjne płyny"
 MAULER_BITER_1_DESC: "Wszczepione gruczoły modyfikują płyny ustrojowe naszych jednostek. $mauler_class_plural_cap$ stają się dzięki temu żrące i zwiększają swój niszczycielski potencjał."
 MAULER_BITER_2: "Żrące płyny"
 MAULER_BITER_2_DESC: "Wprowadzenie niestabilnego pyłu do płynów ustrojowych naszych jednostek typu $mauler_class_plural_cap$ dodatkowo zwiększa zadawane przez nie uszkodzenia, szczególnie pancerzom statków wroga."
 weapon_type_mandible: "§YŻuchwa§!"
 mod_weapon_type_mandible_weapon_damage_mult: "Uszkodzenia od broni w żuchwie"
 APPLIED_MODIFIERS_SUPPORT_TITLE: "Zastosowane modyfikatory pochodzące od broni wsparcia:"
 WEAVER_GROWTH_AURA_1: "Feromony rozwojowe"
 WEAVER_GROWTH_AURA_1_DESC: "Tkacze wydzielają złożone sygnały biochemiczne, które przyspieszają dojrzewanie pobliskich jednostek organicznych. Te feromony rozwojowe zwiększają tempo wzrostu i adaptacji, zapewniając szybką ewolucję floty, aby mogła sprostać każdemu wyzwaniu."
 WEAVER_GROWTH_AURA_2: "Egzotyczne feromony rozwojowe"
 WEAVER_GROWTH_AURA_2_DESC: "Udoskonalone rozwiązania bioinżynieryjne wzmacniają moc tych feromonów, znacznie przyspieszając wzrost i optymalizację sojuszniczych okrętów biologicznych. Ulepszona aura sprawia, że flota osiąga szczytową skuteczność z niezwykłą szybkością, nawet w ogniu walki."
 GROWTH_AURA: "$WEAVER_GROWTH_AURA_1$"
 GROWTH_AURA_TT: "§PTę aurę stosuje się tylko dla statków biologicznych, które mogą się rozwijać.§!"
 WEAVER_BOOSTER_1: "Podstawowy wzmacniacz symbiotyczny"
 WEAVER_BOOSTER_1_DESC: "To organiczne urządzenie wzmacnia więź między okrętami biologicznymi, zwiększając transfer energii i koordynację całej floty. Jego obecność zapewnia większą skuteczność w walce i zarządzaniu zasobami."
 WEAVER_BOOSTER_2: "Ulepszony wzmacniacz symbiotyczny"
 WEAVER_BOOSTER_2_DESC: "Ta bardziej zaawansowana wersja wzmacniacza symbiotycznego dynamicznie dostosowuje się do potrzeb floty, zapewniając zwiększoną skuteczność i szybkość reakcji. Optymalizuje możliwości całej floty, gwarantując płynną adaptację podczas operacji."
 HARBINGER_INCUBATOR_1: "Matryca inkubacyjna"
 HARBINGER_INCUBATOR_1_DESC: "Ta matryca komórkowa powstaje wokół jaj dojrzewających pojazdów szturmowych, działając jako inkubator stworzony dzięki bioinżynierii."
 HARBINGER_INCUBATOR_2: "Błyskawiczny $HARBINGER_INCUBATOR_1$"
 HARBINGER_INCUBATOR_2_DESC: "Narażenie na działanie gazów egzotycznych w okresie inkubacji prowadzi do błyskawicznego dojrzewania pojazdów szturmowych tego okrętu."
 HARBINGER_CHITIN_1: "Regulatory przyrostu chityny"
 HARBINGER_CHITIN_1_DESC: "Wydzieliny w przedziałach hangarowych stymulują wzrost chityny u rozwijających się pojazdów szturmowych, zwiększając ich wytrzymałość."
 HARBINGER_CHITIN_2: "Regulatory przyrostu kryształu"
 HARBINGER_CHITIN_2_DESC: "Wprowadzenie rzadkich kryształów do chitynowych egzoszkieletów naszych pojazdów szturmowych dodatkowo zwiększa odporność na uszkodzenia."
 STINGER_RANGE_1: "Sieć dalmierzy"
 STINGER_RANGE_1_DESC: "Dodatkowa sieć neuronowa służąca do przetwarzania danych sensorycznych."
 STINGER_RANGE_2: "Ulepszona jednostka $STINGER_RANGE_1$"
 STINGER_RANGE_2_DESC: "Rzadkie kryształy umieszczone w osłonkach ścieżek neuronowych zwiększają możliwości przetwarzania danych o celach."
 STINGER_FIRE_RATE_1: "Przetchlinki odprowadzania ciepła"
 STINGER_FIRE_RATE_1_DESC: "Zespół wylotów ciepła rozmieszczonych wzdłuż tułowia tego statku pozwala mu wypuszczać w kosmos sprężone, gorące gazy, co zwiększa szybkostrzelność uzbrojenia."
 STINGER_FIRE_RATE_2: "Niestabilne przetchlinki"
 STINGER_FIRE_RATE_2_DESC: "Wykorzystanie niestabilnych przetchlinek jako systemu odprowadzania ciepła wymaga utworzenia specjalnej matrycy komórkowej, która zapobiegnie przypadkowym wybuchom."
 #Armor/Carapace
 tech_bio_ship_armor_1: "$tech_ship_armor_1$"
 BIO_ARMOR_1: "$NANOCOMPOSITE_CARAPACE$"
 BIO_ARMOR_1_DESC: "Ten zaawansowany biopancerz łączy wytrzymałe tkanki organiczne z nanostrukturalnymi materiałami, tworząc żywy karapaks wytrzymujący ekstremalne uderzenia. Pancerz dynamicznie dostosowuje się do uszkodzeń, szybko się regenerując i zapewniając okrętom biologicznym niezrównaną ochronę."
 SMALL_BIO_ARMOR_1: "Mały $BIO_ARMOR_1$"
 MEDIUM_BIO_ARMOR_1: "Średni $BIO_ARMOR_1$"
 LARGE_BIO_ARMOR_1: "Duży $BIO_ARMOR_1$"
 tech_bio_ship_armor_2: "$tech_ship_armor_2$"
 BIO_ARMOR_2: "$CERAMO_CHITIN_CARAPACE$"
 BIO_ARMOR_2_DESC: "Wzmocniona chityna wzbogacona związkami ceramicznymi zapewnia temu biopancerzowi wyjątkową trwałość i odporność na wysoką temperaturę. Jego warstwowa struktura zapewnia skuteczną ochronę przy jednoczesnym zachowaniu elastyczności niezbędnej dla organicznych okrętów."
 SMALL_BIO_ARMOR_2: "Mały $CERAMO_CHITIN_CARAPACE$"
 MEDIUM_BIO_ARMOR_2: "Średni $CERAMO_CHITIN_CARAPACE$"
 LARGE_BIO_ARMOR_2: "Duży $CERAMO_CHITIN_CARAPACE$"
 tech_bio_ship_armor_3: "$tech_ship_armor_3$"
 BIO_ARMOR_3: "$PLASTEEL_CARAPACE$"
 BIO_ARMOR_3_DESC: "Ten biopancerz łączy wytrzymałe tkanki organiczne z plastalowymi wzmocnieniami, oferując rozwiązanie odznaczające się niezwykłą wytrzymałością i elastycznością. Hybrydowa struktura zapewnia doskonałą ochronę zarówno przed atakami kinetycznymi, jak i energetycznymi, co czyni ją niezawodnym wyborem dla biologicznych okrętów."
 SMALL_BIO_ARMOR_3: "Mały $PLASTEEL_CARAPACE$"
 MEDIUM_BIO_ARMOR_3: "Średni $PLASTEEL_CARAPACE$"
 LARGE_BIO_ARMOR_3: "Duży $PLASTEEL_CARAPACE$"
 tech_bio_ship_armor_4: "$tech_ship_armor_4$"
 BIO_ARMOR_4: "Karapaks durastalowy"
 BIO_ARMOR_4_DESC: "Ten biopancerz wzmocniony wytrzymałymi związkami organicznymi zapewnia wyjątkową odporność na ciągłe uszkodzenia. Jego hybrydowa struktura zapewnia niezwykłą wytrzymałość bez utraty elastyczności żywych jednostek."
 SMALL_BIO_ARMOR_4: "Mały $DURASTEEL_CARAPACE$"
 MEDIUM_BIO_ARMOR_4: "Średni $DURASTEEL_CARAPACE$"
 LARGE_BIO_ARMOR_4: "Duży $DURASTEEL_CARAPACE$"
 tech_bio_ship_armor_5: "$tech_ship_armor_5$"
 BIO_ARMOR_5: "Karapaks z neutronium"
 BIO_ARMOR_5_DESC: "Ten karapaks będący cudem bioinżynierii jest zbudowany z organicznej tkanki wzmocnionej włóknami neutronium, dzięki czemu tworzy niemal nieprzenikalny pancerz. Gęsty a jednocześnie elastyczny kompozyt zapewnia niezrównaną ochronę przed najbardziej nawet niszczycielskimi siłami."
 SMALL_BIO_ARMOR_5: "Mały $NEUTRONIUM_CARAPACE$"
 MEDIUM_BIO_ARMOR_5: "Średni $NEUTRONIUM_CARAPACE$"
 LARGE_BIO_ARMOR_5: "Duży $NEUTRONIUM_CARAPACE$"
 tech_bio_dragon_armor: "$tech_dragon_armor$"
 DRAGON_BIO_ARMOR: "$DRACONIC_CARAPACE$"
 DRAGON_BIO_ARMOR_DESC: "Ten pancerz inspirowany starożytnymi drapieżnikami jest szczytowym osiągnięciem ewolucji biopancerzy. Jego warstwowa struktura łączy regenerującą się materię organiczną z niemal niezniszczalnymi biostopami, zapewniając ochronę tak mocną i nieustępliwą, jak stworzenia, które ją zainspirowały."
 SMALL_DRAGON_BIO_ARMOR: "Mały $DRAGON_BIO_ARMOR$"
 MEDIUM_DRAGON_BIO_ARMOR: "Średni $DRAGON_BIO_ARMOR$"
