l_polish:
 ### CONCEPTS
 # Above each concept definition are instructions on usage, including an icon where one exists.
 #   Note that between the icon and the term there's a non-breaking space. When you copy the usage example, it will keep the non-breaking space.
 #   This is important to not get a line break between the icon and the concept.
 # Use a concept link with icon the first time a new concept is mentioned, then use §H without an icon for repeated uses.
 # Use §H with an icon the first time a concept is used withing its own description.
 # Use §H without an icon if the concept is used more than once.
 ui_available_tabs: "\n\nDostępne zakładki:\n"
 # View: £interface£ ['concept_empire_view'] or £interface£ §H$concept_empire_view$§!
 concept_empire_view: "Widok imperium"
 concept_empire_view_desc: "Zobacz informacje ogólne o imperium.$ui_available_tabs$[GetConceptEmpireAdvisor]"
 empire_view_tab_empire: "§H$EMPIRE$§!"
 empire_view_tab_demographics: "§H$DEMOGRAPHICS_TITLE$§!"
 empire_view_tab_advisor: "§H$GOVERNMENT_ADVISOR_TAB$§!"
 concept_empire_view_tabs_advisor: "$concept_empire_view_tabs_no_advisor$\n- $empire_view_tab_advisor$: wybierz głos doradcy"
 concept_empire_view_tabs_no_advisor: "- $empire_view_tab_empire$: pokaż ['concept_authority'], ['concept_civics'] i ['concept_empire_modifiers']\n- $empire_view_tab_demographics$: zobacz ['concept_pops'] i co na nie wpływa"
 # View: £interface£ ['concept_situation_log_view'] or £interface£ §H$concept_situation_log_view$§!
 concept_situation_log_view: "Widok: $MENU_PANEL__SITUATION_LOG_TITLE$"
 concept_situation_log_view_desc: "£interface£ §H$concept_situation_log_view$§! pokazuje obecne problemy.$ui_available_tabs$$concept_situation_log_view_tabs$"
 situation_log_view_tab_situation_log: "§H$topbar_button_situation_name$§!"
 situation_log_view_tab_timeline: "§H$TIMELINE$§!"
 situation_log_view_tab_anomilies: "§H$ANOMALIES$§!"
 situation_log_view_tab_victory: "§H$VICTORIES$§!"
 concept_situation_log_view_tabs: "- $situation_log_view_tab_situation_log$: pokaż ['concept_event_chains'], ['concept_special_projects'] i ['concept_first_contacts']\n- $situation_log_view_tab_timeline$: zobacz ['concept_milestones'] i ['concept_empire_focuses']\n- $situation_log_view_tab_anomilies$: pokaż ['concept_anomalies']\n- $situation_log_view_tab_victory$: zobacz ['concept_scoreboard']"
 # View: £interface£ ['concept_government_view'] or £interface£ §H$concept_government_view$§!
 concept_government_view: "Widok: $topbar_button_council_name$"
 concept_government_view_desc: "§H$concept_government_view$§! umożliwia zarządzanie rządem.$ui_available_tabs$$concept_government_view_tabs$"
 government_view_tab_council: "§H$COUNCIL$§!"
 government_view_tab_factions: "§H$FACTIONS$§!"
 government_view_tab_policies_and_edicts: "§H$EDICTS_AND_POLICIES$§!"
 concept_government_view_tabs: "- $government_view_tab_council$: zarządzanie ['concept_council', radą] i ['concept_agendas', agendami]\n- $government_view_tab_factions$: zobacz ['concept_factions']\n- $government_view_tab_policies_and_edicts$: wybierz ['concept_policies'] i ['concept_edicts']"
 # View: £interface£ ['concept_society_management_view'] or £interface£ §H$concept_society_management_view$§!
 concept_society_management_view: "Widok: $TRADITION_VIEW_TITLE$" # Use this alias when referring to the concept
 concept_society_management: "$TRADITION_VIEW_TITLE$" # Left out 'View' to fit in the Databank UI
 concept_society_management_desc: "§H$concept_society_management_view$§! Umożliwia zarządzanie tradycjami.$ui_available_tabs$[GetConceptSocietyManagement]"
 society_management_view_tab_traditions: "§H$TRADITIONS$§!"
 society_management_view_tab_crisis: "§H$CRISIS_TAB$§!"
 concept_society_management_view_crisis: "$concept_society_management_view_no_crisis$\n- $society_management_view_tab_crisis$: śledź postępy jako ['concept_crisis']"
 concept_society_management_view_no_crisis: "- $society_management_view_tab_traditions$: wybierz ['concept_traditions'] i ['concept_ascension_perks']"
 # View: £interface£ ['concept_technology_view'] or £interface£ §H$concept_technology_view$§!
 concept_technology_view: "Widok: $TECHNOLOGY$"
 concept_technology_view_desc: "£interface£ §H$concept_technology_view$§! pokazuje postępy naukowe imperium w dziedzinie £physics£ ['concept_physics_research', badań fizycznych], £society£ ['concept_society_research', badań socjologicznych] i £engineering£ ['concept_engineering_research', badań technicznych]. W tym interfejsie wybiera się opcje badań i zarządza priorytetami technicznymi.\n\nNowe ['concept_technologies'] są pokazywane częściowo losowo spośród dostępnych opcji, co odzwierciedla nieprzewidywalność badań naukowych."
 # View: £interface£ ['concept_leaders_view'] or £interface£ §H$concept_leaders_view$§!
 concept_leaders_view: "Widok: $topbar_button_leaders_name$"
 concept_leaders_view_desc: "£interface£ §H$concept_leaders_view$§! pokazuje wszystkich aktywnych ['concept_leaders', przywódców] na terenie imperium, wraz z ich rolami, ['concept_leader_traits', cechami], poziomami doświadczenia oraz aktualnymi zadaniami. Z poziomu tego interfejsu można werbować nowych przywódców, zmieniać przydział tych już istniejących albo zwalniać ich ze służby."
 # View: £interface£ ['concept_species_view'] or £interface£ §H$concept_species_view$§!
 concept_species_view: "Widok: $topbar_button_species_name$"
 concept_species_view_desc: "£interface£ §H$concept_species_view$§! pokazuje wyczerpującą listę wszystkich znanych ['concept_species', gatunków] zamieszkujących dane imperium. Z poziomu tego interfejsu można sprawdzać i modyfikować ['concept_species_traits'], a także zarządzać takimi prawami populacji jak obywatelstwo, służba wojskowa i ['concept_living_standards', standard życia].\n\nTo okno odgrywa kluczową rolę w zarządzaniu złożonym imperium zamieszkanym przez wiele gatunków, gdzie polityka, biologia i ideologia przenikają się, kształtując społeczeństwo galaktyczne."
 # View: £interface£ ['concept_planets_and_sector_view'] or £interface£ §H$concept_planets_and_sector_view$§!
 concept_planets_and_sector_view: "Widok: $PLANET_LIST$" # Use this alias when referring to the concept
 concept_planets_and_sector: "$PLANET_LIST$" # Left out 'View' to fit in the Databank UI
 concept_planets_and_sector_desc: "Interfejs £interface£ §H$concept_planets_and_sector$§! pokazuje ogólne informacje o wszystkich £colony£ ['concept_colonies', koloniach] i £sector£ ['concept_sector', sektorach] imperium.\n\nW tym oknie można też przydzielać ['concept_governors', zarządców]."
 # View: £interface£ ['concept_expansion_planner'] or
 concept_expansion_planner: "$MENU_PANEL__EXPANSION_PLANNER_TITLE$"
 concept_expansion_planner_desc: "£interface£ §H$concept_expansion_planner$§! Pokazuje £planet£ ['concept_planets'] nadające się do kolonizacji. Kolonizację można zacząć bezpośrednio z tego menu, wtedy automatycznie powstanie £colony_ship£ ['concept_colony_ship'].\n\n£planet£ §H$concept_planets$§! należy zbadać, wysyłając tam £science_ship£ ['concept_science_ship'], a wszelkie znalezione £anomaly£ ['concept_anomalies'] muszą zostać przeanalizowane, zanim możliwa będzie kolonizacja.\n\nW układzie z daną planetą musi powstać ['concept_starbase'], żeby dany świat znalazł się w granicach imperium."
 # View: £interface£ ['concept_fleet_management_view'] or £interface£ §H$concept_fleet_management_view$§!
 concept_fleet_management_view: "Widok: $topbar_button_fleet_manager_name$" # Use this alias when referring to the concept
 concept_fleet_management: "$topbar_button_fleet_manager_name$" # Left out 'View' to fit in the Databank UI
 concept_fleet_management_desc: "Projektuj statki i twórz floty. Nowe §Hwielkości okrętów§! i ['concept_components'] odblokowuje się, opracowując odpowiednie ['concept_technologies'].$ui_available_tabs$[GetConceptFleetManagement]"
 fleet_management_view_tab_fleet_manager: "§H$FLEET_MANAGER_VIEW$§!"
 fleet_management_view_tab_ship_designer: "§H$SHIP_DESIGNER$§!"
 concept_fleet_management_view_space_fauna: "$concept_fleet_management_view_no_space_fauna$\n- §H$CREATURE_DESIGNER$§!: kształtuj ['concept_space_fauna', faunę kosmiczną]"
 concept_fleet_management_view_no_space_fauna: "- $fleet_management_view_tab_fleet_manager$: organizuj ['concept_fleets']\n- $fleet_management_view_tab_ship_designer$: projektuj ['concept_military_ships']"
 # View: £interface£ ['concept_contacts_view'] or £interface£ §H$concept_contacts_view$§!
 concept_contacts_view: "Okno kontaktów"
 concept_contacts_view_desc: "£interface£ §H$concept_contacts_view$§! pokazuje wszystkie znane imperia, niezależne enklawy i obce istoty. Z poziomu tego interfejsu można rozpocząć działania ['concept_diplomacy', dyplomatyczne] i ocenić stosunki z innymi imperiami. To także centrum komunikacji międzygwiezdnej oraz działań wywiadowczych prowadzonych za granicą."
 contacts_view_tab_contacts: "§H$topbar_button_contacts_name$§!"
 contacts_view_tab_agreements: "§H$AGREEMENTS_LIST_TITLE$§!"
 contacts_view_tab_shroud: "§H$THE_SHROUD_TITLE$§!"
 concept_contacts_view_tabs: "- $contacts_view_tab_contacts$: prowadź ['concept_diplomacy', dyplomację]\n- $contacts_view_tab_agreements$: badaj ['concept_subject_agreements']\n- $contacts_view_tab_shroud$: prowadź ['concept_psionic_ascension', rozwój psioniczny]"
 # View: £interface£ ['concept_discoveries_view'] or £interface£ §H$concept_discoveries_view$§!
 concept_discoveries_view: "Widok: $topbar_button_discoveries_name$"
 concept_discoveries_view_desc: "£interface£ §H$concept_discoveries_view$§! kataloguje ważne obiekty i zjawiska znalezione w galaktyce, w tym ['concept_relics'], starożytne artefakty oraz inne galaktyczne ciekawostki o niezmiennym znaczeniu.$ui_available_tabs$[GetConceptDiscovery]"
 discoveries_view_tab_relics: "§H$relics$§!"
 discoveries_view_tab_collection: "§H$COLLECTION$§!"
 discoveries_view_tab_vivarium: "§H$VIVARIUM$§!"
 discoveries_view_tab_astral_actions: "§H$ASTRAL_ACTIONS$§!"
 concept_discovery_view_base: "- $discoveries_view_tab_relics$: zarządzaj ['concept_relics', reliktami]"
 concept_discovery_view_base_ancrel: "$concept_discovery_view_base$ i ['concept_minor_artifacts']"
 concept_discovery_view_base_archive: "$concept_discovery_view_base$\n- $discoveries_view_tab_collection$: pokaż ['concept_specimens']\n- $discoveries_view_tab_vivarium$: hoduj ['concept_space_fauna', faunę kosmiczną]"
 concept_discovery_view_base_ancrel_archive: "$concept_discovery_view_base$\n- $discoveries_view_tab_collection$: pokaż ['concept_specimens'] i ['concept_minor_artifacts']\n- $discoveries_view_tab_vivarium$: hoduj ['concept_space_fauna', faunę kosmiczną]"
 concept_discovery_view_base_astral: "$concept_discovery_view_base$\n$concept_discovery_view_astral$"
 concept_discovery_view_base_ancrel_astral: "$concept_discovery_view_base_ancrel$\n$concept_discovery_view_astral$"
 concept_discovery_view_base_archive_astral: "$concept_discovery_view_base_archive$\n$concept_discovery_view_astral$"
 concept_discovery_view_base_ancrel_archive_astral: "$concept_discovery_view_base_ancrel_archive$\n$concept_discovery_view_astral$"
 concept_discovery_view_astral: "- $discoveries_view_tab_astral_actions$: aktywuj ['concept_astral_actions']"
 # View: £interface£ ['concept_claims_view'] or £interface£ §H$concept_claims_view$§!
 concept_claims_view: "Widok: $CLAIMS_VIEW$"
 concept_claims_view_desc: "£interface£ §H$concept_claims_view$§! pokazuje wszystkie ['concept_claims', roszczenia] terytorialne danego imperium. Tryb dyplomatyczny ['concept_galaxy_map', mapy galaktyki] podaje jasne informacje o spornych układach oraz potencjalnych punktach zapalnych dla przyszłych sporów."
 # View: £interface£ ['concept_market_view'] or £interface£ §H$concept_market_view$§!
 concept_market_view: "Widok: $MARKET_VIEW$"
 concept_market_view_desc: "£interface£ §H$concept_market_view$§! tworzy podstawy dla handlu międzygwiezdnego, umożliwia zakup oraz sprzedaż zasobów albo zawarcie umów na regularne, comiesięczne transakcje."
 # View: £interface£ ['concept_colony_view'] or £interface£ §H$concept_colony_view$§!
 concept_colony_view: "Okno kolonii"
 concept_colony_view_desc: "£interface£ §H$concept_colony_view$§! umożliwia zarządzanie £colony£ ['concept_colony', kolonią]. Na odpowiednich, niezamieszkanych £planet£ ['concept_planets', planetach] albo ['concept_habitats', stacjach mieszkalnych] ten widok może posłużyć do rozpoczęcia procesu §Hkolonizacji§!.$ui_available_tabs$$concept_colony_view_tabs$"
 colony_view_tab_planet_summary: "§H$PLANET_TAB$§!"
 colony_view_tab_management: "§H$MANAGEMENT_TAB$§!"
 colony_view_tab_population: "§H$POPULATION_TAB$§!"
 colony_view_tab_armies: "§H$GROUND_COMBAT_TAB$§!"
 colony_view_tab_holdings: "§H$CORPORATE_TAB$§!"
 concept_colony_view_tabs: "- $colony_view_tab_planet_summary$: pokazuje informacje ogólne o tym, jakie £district£ ['concept_districts'] i £building£ ['concept_buildings'] znajdują się w kolonii oraz kim jest przydzielony ['concept_governor']. Można tu wprowadzać ['concept_designation'] albo uruchomić ['concept_planet_automation', automatyzację planety].\n- $colony_view_tab_management$: pookazuje cechy planetarne i zmiany populacji. Można tu wprowadzać ['concept_decisions'], określać ['concept_designation'], ['concept_planetary_ascension'] albo rozpocząć ['concept_terraforming', terraformację].\n- $colony_view_tab_population$: pokazuje populację kolonii podzieloną na grupy według £job£ ['concept_job', miejsc pracy]\n- $colony_view_tab_armies$: pokazuje wojska lądowe kolonii oraz jej ['concept_devastation'].\n- $colony_view_tab_holdings$: pokazuje, jakie ['concept_overlord_holdings'] znajdują się w kolonii."
 # View: £interface£ ['concept_starbase_view'] or £interface£ §H$concept_starbase_view$§!
 concept_starbase_view: "Menu bazy gwiezdnej"
 concept_starbase_view_desc: "£interface£ §H$concept_starbase_view$§! umożliwia zarządzanie ['concept_starbase', bazą gwiezdną].$ui_available_tabs$$concept_starbase_view_tabs$"
 starbase_view_tab_command: "§H$STARBASE_STARBASE_TAB$§!"
 starbase_view_tab_defenses: "§H$STARBASE_DEFENSES_TAB$§!"
 starbase_view_tab_armies: "§H$MACRO_BUILDER_TAB$§!"
 starbase_view_tab_shipyard: "§H$STARBASE_SHIPYARD_TAB$§!"
 concept_starbase_view_tabs: "- $starbase_view_tab_command$: pokazuje informacje o §Hmodułach§! i §Hbudynkach§! bazy gwiezdnej. Pozwala też ulepszyć ją do następnego poziomu, jeśli została opracowana odpowiednia ['concept_technology'].\n- $starbase_view_tab_defenses$: pokazuje wszystkie ['concept_defense_platforms'], a kliknięcie jakiegoś projektu powoduje, że zostają zbudowane kolejne.\n- $starbase_view_tab_armies$: to narzędzie, za pomocą którego tworzone są liczne §H$assault_army_plural$§!. Dostępne w £sector£ ['concept_sector', sektorze] £colony£ ['concept_colonies'] są miejscami powstawania armii, gromadzi się je w bazie gwiezdnej albo w §Harmii§! z włączoną opcją §Hkoncentracji wojsk§!.\n- $starbase_view_tab_shipyard$: pozwala budować zarówno ['concept_civilian_ships'], jak i ['concept_military_ships']."
 # View: £interface£ ['concept_system_map'] or £interface£ §H$concept_system_map$§!
 concept_system_map: "Mapa układu"
 concept_system_map_desc: "£interface£ §H$concept_system_map$§! pokazuje szczegółowy widok pojedynczego układu gwiezdnego, wraz z ['concept_celestial_objects', ciałami niebieskimi], ['concept_civilian_space_stations', cywilnymi stacjami kosmicznymi], ['concept_fleets', flotami] oraz infrastrukturą orbitalną. Pozwala to precyzyjnie zarządzać budową, kolonizacją, działaniami bojowymi i działalnością naukową w układzie."
 # View: £interface£ ['concept_galaxy_map'] or £interface£ §H$concept_galaxy_map$§!
 concept_galaxy_map: "Mapa galaktyki"
 concept_galaxy_map_desc: "£interface£ §H$concept_galaxy_map$§! ukazuje strategiczne informacje o znanej galaktyce, widać tam £system£ ['concept_systems'], granice ['concept_empire'] i ['concept_hyperlanes']. Działa jako główny interfejs eksploracji, ekspansji i koordynacji międzygwiezdnej."
 # View: £interface£ ['concept_navigation_bar'] or £interface£ §H$concept_navigation_bar$§!
 concept_navigation_bar: "Suwak nawigacyjny"
 concept_navigation_bar_desc: "£interface£ §H$concept_navigation_bar$§! znajduje się po lewej stronie ekranu.\n\nPowiększa się, kiedy z niego korzystasz, można go też zablokować w wersji zminimalizowanej.\n\nTryb powiększony umożliwia dostęp do ustawień, które służą do zmiany układu menu, a także skrótów klawiszowych otwierających poszczególne menu."
 # View: £interface£ ['concept_resource_bar'] or £interface£ §H$concept_resource_bar$§!
 concept_resource_bar: "Pasek zasobów"
 concept_resource_bar_desc: "£interface£ §H$concept_resource_bar$§! znajduje się w górnej części ekranu.\n\nWidać na nim różne §Hzasoby§! takie jak £energy£ ['concept_energy'] oraz takie wskaźniki jak £trade_value£ ['concept_trade'], ['concept_research'], ['concept_starbase_capacity'] i ['concept_naval_capacity'].\n\nPo prawej znajdziesz §Hsterowanie czasem§!, które pozwala zwalniać i przyspieszać grę, a także włączać/wyłączać pauzę.\n\nPod §Hsterowaniem czasem§! jest §Hodtwarzacz muzyki§!."
 # View: £interface£ ['concept_outliner'] or £interface£ §H$concept_outliner$§!
 concept_outliner: "Rejestr"
 concept_outliner_desc: "£interface£ §H$concept_outliner$§! umożliwia szybki dostęp do kluczowych aktywów w imperium, w tym £colony£ ['concept_colonies', kolonii], ['concept_fleets', flot] i ['concept_civilian_space_stations', cywilnych stacji kosmicznych]. Ten interfejs można modyfikować, ułatwia on szybką nawigację oraz nadzór nad najistotniejszymi działaniami."
