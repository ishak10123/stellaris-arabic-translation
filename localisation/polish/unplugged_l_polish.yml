 # Civil War & 'The Injured'
 unplugged.100.name: "Zwyciężyliśmy"
 unplugged.100.desc: "Tuż po naszym przebudzeniu w tym wszechświecie brutalne maszyny próbowały nas z niego usunąć. Okazało się, że na przemocy znamy się lepiej niż one.\n\nTak zwane imperium §Y[origin_unplugged_assimilator_empire.GetName]§! poniosło dziś sromotną porażkę. Nasz wywiad informuje, że uległo ono potężnemu rozdrobnieniu, ale to chyba nie jest skutek tej niewielkiej potyczki? W tej chwili niewiele wiemy, ale nasz... instynkt? Instynkt mówi nam, że coś jest nie tak.\n\nCzujniki nie wykrywają w naszym otoczeniu kolejnych wrogich okrętów, ale na planecie §Y[origin_unplugged_pre_ftl_planet.GetName]§!.\n\nW sąsiednich układach wykryto też pozostałe floty, które jak na razie nie zmieniają swoich pozycji."
 unplugged.100.a: "Co dalej?"
 unplugged.100.b: "A to, czego nie mamy - sobie weźmiemy."
 unplugged.100.c: "Czas sprawdzić naszą zaradność."
 unplugged.100.d: "Niech bogowie nas chronią."
 opinion_unplugged_injured_diplomacy: "Cywilni podżegacze wojenni"
 opinion_unplugged_injured_distrustful: "$pre_ftl_distrustful$"
 # Dialog
 unplugged.115.desc: "...znowu: [origin_unplugged_assimilator_empire.GetSpeciesNamePlural]! Poddajemy się. Chcecie omówić warunki naszej kapitulacji? Czy dlatego przerwaliście atak?\n\nProsimy was, nasze społeczeństwo zostało zrujnowane. Wiemy, że przegraliśmy. Powiedzcie nam, co dalej." # This civilization is mistaking the player for the Driven Assimilator empire they were once part of
 unplugged.115.desc.pacifist: "...znowu: [origin_unplugged_assimilator_empire.GetSpeciesNamePlural]! Jesteśmy gotowi omówić warunki naszej kapitulacji. Czy... Czy dlatego przerwaliście atak?\n\nProsimy was, powiedzcie, co dalej! Nie zamierzamy dłużej stawiać oporu. Chcemy jedynie pokojowego współistnienia." # This civilization is mistaking the player for the Driven Assimilator empire they were once part of
 unplugged.115.desc.phobe: "...znowu: [origin_unplugged_assimilator_empire.GetSpeciesNamePlural]! Poddajemy się. Chcecie naszej kapitulacji? Czy dlatego przerwaliście atak?\n\nProsimy was, powiedzcie nam, co dalej. Nasze społeczeństwo zostało zrujnowane, chcemy tylko, żeby zostawiono nas w spokoju." # This civilization is mistaking the player for the Driven Assimilator empire they were once part of
 unplugged.115.a: "Tak, przyjmujemy waszą kapitulację."
 unplugged.115.b: "...\"[origin_unplugged_assimilator_empire.GetSpeciesNamePlural]\"?!" # incredulous that they are calling us that species name, e.g. ... 'Killbots'?!
 unplugged.116.desc: "...[origin_unplugged_assimilator_empire.GetSpeciesNamePlural]? Czy wy..?\n\n(Na pewno to odbierają, tak? Na wszystkie gwiazdy, ludzie... Jeżeli się mylimy i oni nie mają dostępu do narzędzi tłumaczeniowych, pozostałości całej naszej cywilizacji są naprawdę, kompletnie...)\n\n...[origin_unplugged_assimilator_empire.GetSpeciesNamePlural]?! Rozumiecie nas? Prosimy, odpowiedzcie! Nie chcemy żadnych nieporozumień między naszymi nacjami."
 unplugged.116.b: "Myślicie, że \"[origin_unplugged_assimilator_empire.GetSpeciesNamePlural]\" to my?!" # incredulous that they are calling us that species name, e.g. 'You think we are the Killbots?!''
 unplugged.120.desc: "Dziękujemy, dziękujemy. Podziwiamy waszą łaskawość, [origin_unplugged_assimilator_empire.GetSpeciesNamePlural]. Udzielono mi pełnomocnictwa do wypowiadania się w imieniu imperium [injured_country.GetName], aby omówić warunki naszej kapitulacji.\n\nStraciliśmy dużo wspaniałych osób, wiele naszych miast nie nadaje się do zamieszkania. W duchu uczciwych negocjacji muszę wyznać, że nie możemy zaoferować niczego, czego już nam nie odebraliście. Prosimy, żebyście wzięli to pod uwagę. Wasze [injured_country.species.GetHandNamePlural] mogą zdecydować o naszych życiach."
 unplugged.120.desc.spiri: "Chwała temu co na niebie i pod ziemią! Podziwiamy waszą łaskawość, [origin_unplugged_assimilator_empire.GetSpeciesNamePlural]. Udzielono mi pełnomocnictwa do wypowiadania się w imieniu imperium [injured_country.GetName], aby omówić warunki naszej kapitulacji.\n\nPonieśliśmy ogromne straty, korzymy się przed wami. Czego żądacie? Wasze [injured_country.species.GetHandNamePlural] mogą zdecydować o naszych życiach."
 unplugged.120.desc.mil_phobe: "Dziękujemy, [origin_unplugged_assimilator_empire.GetSpeciesNamePlural]. To dla nas zaszczyt. Udzielono mi pełnomocnictwa do wypowiadania się w imieniu imperium [injured_country.GetName] i omówienia warunków naszej kapitulacji.\n\nZadaliście naszemu społeczeństwu straszliwy cios. Wasze [injured_country.species.GetHandNamePlural] mogą zdecydować o naszych życiach."
 unplugged.120.a: "Ciągle zwracacie się do nas jak do [origin_unplugged_assimilator_empire.GetSpeciesAdj&genitive]. Dlaczego?"
 unplugged.120.b: "Wasze życia nic nie znaczą."
 unplugged.120.b.tt: "§LPrzerwać przekaz.§!\n\n"
 unplugged.120.c: "To koniec naszej rozmowy. Czekajcie na kolejne informacje od nas."
 unplugged.120.c.tt: "§LPrzerwać przekaz.§!\nMożemy odzyskać częstotliwości wywoławcze, budując §Yposterunek obserwacyjny§! na świecie [injured_homeworld.GetName].\n\n"
 unplugged.125.desc: "Czy to jakaś sztuczka? Jakiś żart?\n\nŚledziliśmy na naszych monitorach przybycie waszej floty wiele miesięcy temu. Próbowaliśmy nawiązać kontakt, ale wy woleliście nas najechać! Ledwie udało mi się umknąć przed czterema atakami... Fale desantowców wypełnionych po brzegi robotami i zmodyfikowanymi osobami, takimi jak wy. Potem, niespodziewanie, wasze maszyny przestały atakować.\n\nNasza cywilizacja nie jest tak rozwinięta jak wasza, ale sytuacja i tak nas zaskoczyła. Prosimy, oświećcie nas: Jakie macie zamiary i co tutaj jeszcze robicie?"
 unplugged.125.a: "My, [root.GetSpeciesNamePlural], pokonaliśmy imperium gatunku [origin_unplugged_assimilator_empire.GetSpeciesNamePlural]."
 unplugged.125.b: "Musimy przerwać rozmowy." # also shows 'unplugged.120.c.tt'
 unplugged.130.desc: "[root.GetSpeciesNamePlural], mówicie?\n\nNie oczekujcie wdzięczności naszego ludu, ale wiedzcie, że cieszymy się z zakończenia waszych sporów wewnętrznych. W dodatku ulżyło nam, że wreszcie możemy rozmawiać... No cóż, z inną osobą.\n\nJednak nasza sytuacja nie zmieniła się. [root.GetSpeciesNamePlural], [origin_unplugged_assimilator_empire.GetSpeciesNamePlural]... To bez znaczenia. Jesteście pierwszą obcą cywilizacją, którą spotkaliśmy, a wy próbowaliście nas unicestwić. A potem przestaliście to robić i zaczęliście walczyć między sobą, przez co i tak omal nas nie zniszczyliście.\n\nZapytam wprost: Czy teraz macie przyjazne zamiary?"
 unplugged.130.a: "Tak. Jak możemy pomóc?"
 unplugged.130.b: "Na razie tak."
 unplugged.130.c: "Nie podoba się nam wasz brak szacunku." # also shows 'unplugged.120.b.tt'
 unplugged.131.desc: "Dobrze. Ulżyło nam. Cieszymy się, że już nie macie nas na celowniku.\n\nBędziemy wdzięczni, jeśli wykorzystacie waszą nowoczesną technologię, żeby stworzyć łączność do komunikacji między nami. Nasze losy są splecione, więc bardzo chcemy, żeby ten kanał dyplomatyczny pozostał otwarty.\n\nW zamian możecie liczyć na naszą niewielką pomoc, gdy już odbudujemy nasze imperium i pochowamy poległych. Wierzymy, że jeżeli macie taki sam zwyczaj, przyniesie wam on zrozumienie.\n\nObyśmy porozumieli się w przyszłości, [root.GetSpeciesNamePlural]. A dla dobra obu stron, miejmy nadzieję, że to był ostatni [origin_unplugged_assimilator_empire.GetSpeciesName]..."
 unplugged.131.a: "Dziękujemy, [injured_country.GetSpeciesNamePlural]." # also shows 'unplugged.120.c.tt'
 unplugged.131.b: "W rzeczy samej..." # also shows 'unplugged.120.c.tt'
 ###################
 # 'Machine Legacy'
 ###################
 unplugged_origin_machine_legacy_chain_title: "Dziedzictwo maszyn"
 unplugged_origin_machine_legacy_chain_desc: "Maszyny, które kiedyś zasymilowały nasz cały gatunek, rozpadły się. Zostawiliśmy za sobą dymiący szlak dominacji i brutalności. Czym było imperium [origin_unplugged_assimilator_empire.GetName] i jaką rolę odegraliśmy w jego zgubnych planach?"
 signals_followed: "Zbadano sygnały"
 # System 1: 'The Makers'
 unplugged.2000.name: "Ambient, dysharmonia, ukojenie"
 unplugged.2000.desc: "W promieniowaniu kosmicznym otaczającym naszą gwiazdę, [capital_scope.star.GetName], kryje się słaba fala nośna.\n\nWyizolowaliśmy strumień dźwięku składający się z niepokojących, głębokich tonów oraz zniekształcone sprzężenie zwrotne. Każda istota z gatunku [root.GetSpeciesAdj&genitive], która usłyszała ten strumień, uważa go za znajomo brzmiący i kojący, choć nikt nie potrafi wyjaśnić, dlaczego tak jest. Podejrzewamy, że imperium [origin_unplugged_assimilator_empire.GetName] ma z tym coś wspólnego.\n\nŹródłem sygnału jest prawdopodobnie układ §Y[origin_unplugged_maker_planet.solar_system.GetName]§!. Dokonaliśmy niezbędnej aktualizacji naszych map gwiezdnych."
 unplugged.2000.a: "Musimy to zbadać."
 unplugged_machine_legacy_makers_poi: "Kojąca kakofonia"
 unplugged_machine_legacy_makers_poi_desc: "Strumień kojących i znajomych szumów, przypominający ambient, jest nadawany z jakiegoś miejsca w układzie [origin_unplugged_maker_planet.solar_system.GetName]."
 MACHINE_LEGACY_MAKERS_UNPLUGGED_CAT: "Dziedzictwo maszyn"
 MACHINE_LEGACY_MAKERS_UNPLUGGED_CAT_DESC: "Skanowanie orbitalne świata [from.GetName] natychmiast spowodowało zasypanie naszych systemów korzystnymi aktualizacjami oprogramowania. Nasza jednostka działa teraz o wiele sprawniej, ale natura tych pakietów danych wskazuje, że ten świat mógł kiedyś należeć do imperium §H[origin_unplugged_assimilator_empire.GetName]§!."
 MACHINE_LEGACY_MAKERS_CAT: "$MACHINE_LEGACY_MAKERS_UNPLUGGED_CAT$"
 MACHINE_LEGACY_MAKERS_CAT_DESC: "Początkowe skanowanie świata [from.GetName] wskazuje, że na tej planecie znajduje się dużo porzuconej technologii, ale trafiła ona tam całkiem niedawno. Impulsy elektryczne wciąż tańczą po tym świecie, a wiele z naszych zdalnych sond ma problemy z utrzymaniem stabilnego kursu. Jakie tajemnice kryją się w tym skomplikowanym labiryncie pól elektromagnetycznych?"
 unplugged.2005.name: "Dziedzictwo imperium [origin_unplugged_assimilator_empire.GetAdj&genitive]"
 unplugged.2005.desc: "Na całej planecie [fromfrom.GetName] pojawiły się kolejne silne źródła promieniowania elektromagnetycznego. Te pola zostały wygenerowane przez katastrofalne skoki napięcia, które dotknęły wielu fabryk i stoczni. Nasi [controller.GetScientistPlural] unieszkodliwili jedno z tych pól, po czym okazało się, że znajdująca się w tym miejscu placówka odniosła takie zniszczenia, że nie da się jej naprawić.\n\nFabryki znajdujące się na tym świecie, który naszym zdaniem był centrum przemysłowym imperium §H[origin_unplugged_assimilator_empire.GetName]§!, uznały, że [root.GetName] to jednostka sojusznicza. Jednak chwilę po przesłaniu aktualizacji oprogramowania na nasz statek połączenie zostało zerwane, co wywołało kaskadę awarii w wielu regionalnych elektrowniach.\n\nByć może doświadczyliśmy właśnie echa naszego oddzielenia się od maszyn, choć jeszcze nie wiemy dlaczego. Na razie zniknęły lokalne zagrożenia, więc mamy okazję dowiedzieć się, co produkowało tu imperium [origin_unplugged_assimilator_empire.GetName] i może ustalimy, jaką rolę odegraliśmy, podczas naszej asymilacji z tą potęgą."
 unplugged.2005.a: "Zacznijmy wykopaliska w tych ruinach."
 unplugged.2006.name: "$MACHINE_LEGACY_MAKERS_UNPLUGGED_CAT$"
 unplugged.2006.desc: "Impulsy elektryczne zaobserwowane na świecie [from.GetName] to pozostałości dziwnego zdarzenia, które wywołało wymieranie maszyn. Dopiero po wyregulowaniu naszych czujników tak, żeby skompensować intensywne promieniowanie elektromagnetyczne, mogliśmy dostrzec ogrom zniszczeń. Planeta wygląda, jakby kilkadziesiąt lat temu zasiedliły ją maszyny, wysiedlając lub eksterminując istniejącą tu wcześniej cywilizację. Do dziś nie ocalał żaden przedstawiciel obu imperiów, a praktycznie całe osiedle zostało obrócone w żużel w wyniku sabotażu lub działań wojennych.\n\nChoć ta dawna kolonia była nowoczesna, raczej nie znajdziemy tu niczego istotnego. Przewidujemy, że te niestabilne pola elektromagnetyczne wygasną w ciągu jednego wieku. Do tego czasu [from.GetName] będzie nieprzyjaznym cmentarzyskiem."
 machine_legacy_makers_site: "Ustawienia fabryczne"
 machine_legacy_makers_site_desc: "Tę wielką fabrykę, należącą kiedyś do imperium [origin_unplugged_assimilator_empire.GetName], spustoszył niedawno katastrofalny skok napięcia. Teraz wyślemy tam ekspedycję, która ustali, jak powstały te placówki, zgromadzi ocalałe technologie i być może dowie się, jaką rolę odegrało to miejsce w naszej niedawnej przeszłości."
 unplugged.2010.name: "Hala produkcyjna"
 unplugged.2010.desc.unplugged: "Od samego początku wiedzieliśmy, że fabryka znajdująca się na świecie [from.planet.GetName] mogła prowadzić produkcję na przeogromną skalę. Krajobraz na powierzchni to głównie olbrzymie grodzie - wszystkie zostały przejęte i są blokowane przez częściowo stopione silniki. Jednak dostaliśmy się do środka, korzystając z systemu wentylacyjnego.\n\nW środku znaleźliśmy potężną halę produkcyjną, usianą szczątkami setek istot cybernetycznych. Większość z nich to roboty pełniące funkcje mechaników, podnośników oraz wykonujące inne zadania pomocnicze. Niektóre zostały zniszczone zupełnie niedawno i jeszcze dymią. Ale w innej części fabryki zgromadzono rozkładające się od dawna ciała kilku cyborgów, które zostały zgładzone przez te roboty. Te drobne i niezgrabne ssaki wyposażono w czujniki wzrokowe i kończyny z precyzyjnymi narzędziami - węzły sterujące [origin_unplugged_assimilator_empire.GetAdj&genitive] wyglądające prawie tak samo jak nasze. Do tej masakry doszło prawdopodobnie w ciągu kilku tygodni od naszego oddzielenia się od imperium [origin_unplugged_assimilator_empire.GetName]. Większość dronów została zniszczona całkiem niedawno w wyniku skoku napięcia, do którego doszło w chwili naszego przybycia na świat [from.planet.GetName].\n\nTo okrutny i dobrze nam znany widok, aczkolwiek wyzwolone cyborgi nie miały szans ze swoimi mechanicznymi przeciwnikami. My jesteśmy żołnierzami, dlatego my, [owner.GetSpeciesNamePlural], byliśmy lepiej przygotowani do przetrwania takiej rzezi."
 unplugged.2010.a: "Dalej koncentrujmy się na wykopaliskach."
 unplugged.2010.b: "Powinniśmy niezwłocznie ujawnić te ustalenia."
 unplugged.2015.name: "Zainstalowany arsenał"
 unplugged.2015.desc.unplugged: "Z dala od miejsca rzezi, na hali produkcyjnej, znajdują się podziemne hangary częściowo wypełnione różnymi czołgami, wyrzutniami rakiet i mechanicznych kombinezonów. Większość tego wyposażenia jest niekompletna albo została nieodwracalnie uszkodzona przez skok napięcia, który unieszkodliwił roboty [origin_unplugged_assimilator_empire.GetAdj&genitive], ale z tego co zostało, możemy wyciągnąć interesujące wnioski.\n\nNa przykład: wszystkie kokpity i interfejsy zaprojektowano, nie myśląc o niewielkich ssakach-cyborgach, które znaleźliśmy wcześniej, ale... o nas. Co więcej, sekcje zwłok i badania architektury wykazały, że te ssaki-cyborgi nie tylko były rdzennymi mieszkańcami tego świata, ale też zbudowały olbrzymie fabryki, zanim ich gatunek został zasymilowany.\n\nWejście w głąb placówki uniemożliwiają zawaliska konstrukcji oraz kolejne grodzie, ale jesteśmy przekonani, że uda się nam oczyścić drogę do miejsca, które wygląda na centrum badań i rozwoju. Ponadto trafiliśmy na szyby wentylacyjne, których obecność wskazuje, że pod fabryką mogą znajdować się obiekty mieszkalne - być może korzystali z nich rdzenni mieszkańcy planety."
 unplugged.2015.a: "Kontynuujmy wykopaliska w placówce na powierzchni."
 unplugged.2015.b: "Kopmy głębiej, zobaczmy, czego się dowiemy."
 unplugged.2021.name: "Projektanci w opałach"
 unplugged.2021.desc: "Wykopaliska w skrzydle badań i rozwoju tej placówki okazały się makabrycznym przedsięwzięciem. Umarło tu znacznie więcej ssaków-cyborgów pracujących jako technicy, inżynierowie, a nawet cybernetycy. Ci specjaliści zaprojektowali większość uzbrojenia, które zgromadzono na zewnątrz. Odkryliśmy też, że stworzyli oni wiele naszych modyfikacji. Co ciekawe, chociaż większość ich wyposażenia jest pochodzenia: [origin_unplugged_assimilator_empire.GetAdj&genitive], to znaleźliśmy też wiele specjalistycznych narzędzi doskonałej jakości, o wiele lepiej przystosowanych do ich form organicznych.\n\nZaczęliśmy układać chronologię zdarzeń: zaawansowane technicznie społeczeństwo zostało gwałtownie zasymilowane przez imperium [origin_unplugged_assimilator_empire.GetName]. Przypuszczamy, że maszyny nie przebywały tu dłużej niż przez kilkadziesiąt lat, wiele z technik produkcyjnych wygląda na pochodzące z tego świata. Mamy szczęście, że tacy utalentowani technolodzy nie pozostali na długo częścią imperium [origin_unplugged_assimilator_empire.GetName], bo gdyby zwróciło się ono przeciwko nam, posiadałoby jeszcze potężniejszy arsenał. Zamiast tego żyjemy i możemy korzystać z wyników badań naukowych prowadzonych przez ten gatunek."
 unplugged.2022.name: "Stary świat [from.planet.GetName]" # e.g. 'Old Earth' or 'Old Sirius III'
 unplugged.2022.desc.unplugged: "Pod placówką na powierzchni rozciąga się ogromna sieć tuneli, które ledwie nadają się do zamieszkania. Pełno tu martwych cyborgów, żaden z tych rdzennych mieszkańców nie przeżył czystki [origin_unplugged_assimilator_empire.GetAdj&genitive]. Niektórych zaatakowano fizycznie, ale znaleźliśmy też dowody manipulowania systemami wentylacji na górze. Większość ofiar na dole zmarła w wyniku uduszenia.\n\nSekcje zwłok i badania antropologiczne pozwolą nam ustalić sekwencję zdarzeń, do których tu doszło. Wiemy już, że było to kwitnące społeczeństwo epoki kosmicznej, gdy rdzenni mieszkańcy świata [from.planet.GetName] nawiązali kontakt z maszynami i zostali błyskawicznie zasymilowani. W ciągu nie więcej niż kilku dekad imperium [origin_unplugged_assimilator_empire.GetName] wykorzystało swoją wiedzę oraz produktywność, żeby stworzyć imponującą machinę wojenną. Jednak wyjątkowość ich kultury została im ponownie brutalnie odebrana, podobnie jak nam.\n\nMałe, kruche ciała rdzennych cyborgów z tej planety nie mogły skutecznie stawić czoła zabójczym robotom, które pomogły zbudować. Od tamtej pory większość informacji o tym, kim byli, została wymazana z ich własnych archiwów historycznych. Możemy się tylko domyślać, jak wyglądało ich życie, zanim nawiązali kontakt z imperium [origin_unplugged_assimilator_empire.GetName]."
 unplugged.2030.name: "Wadliwe produkty"
 unplugged.2030.desc: "Czujniki dalekiego zasięgu wykryły gwałtowne poruszenie w układzie [origin_unplugged_machine_legacy_core.GetName]! Wygląda na to, że w reakcji na nasze wykopaliska na świecie [fromfrom.planet.GetName] zgromadziła się tam wroga flota."
 unplugged.2036.name: "Echa maszyn"
 unplugged.2036.desc: "Prześledziliśmy komunikację floty [origin_unplugged_assimilator_empire.GetAdj&genitive], którą właśnie zniszczyliśmy. Okazało się, że przesyłała sygnały do boi znajdującej się na orbicie świata [origin_unplugged_taken_planet.GetName]. To powinien być następny cel naszej podróży."
 unplugged.2036.a: "Atmosfera się zagęszcza."
 unplugged.2037.desc: "Używając dawnego sprzętu [origin_unplugged_assimilator_empire.GetAdj&genitive], zdołaliśmy wyśledzić ostatni komunikat wysłany przez zniszczoną flotę - jego miejscem docelowym był świat [origin_unplugged_maker_planet.GetName]. Zdaje się, że kolejny cel naszej podróży znajduje się na orbicie świata §Y[origin_unplugged_taken_planet.GetName]§!." # e.g. 'our own ex-Martianbot hardware'
 unplugged.2038.desc: "Używając dawnego sprzętu [origin_unplugged_assimilator_empire.GetAdj&genitive], zdołaliśmy wyśledzić zabłąkany komunikat wysłany przez wrogą flotę połączoną z planetą [origin_unplugged_maker_planet.GetName]. Zdaje się, że na orbicie świata [origin_unplugged_taken_planet.GetName] znajduje się coś ciekawego." # e.g. 'our own ex-Martianbot hardware'
 # System 2: 'The Taken'
 unplugged_machine_legacy_taken_poi: "Zabłąkany komunikat"
 unplugged_machine_legacy_taken_poi_desc: "Ustaliliśmy, że ostatni strumień niezrozumiałych szumów z niedawno zniszczonego okrętu [origin_unplugged_assimilator_empire.GetAdj&genitive] dotarł w to miejsce."
 MACHINE_LEGACY_TAKEN_UNPLUGGED: "Wbudowane anachronizmy"
 MACHINE_LEGACY_TAKEN_UNPLUGGED_DESC: "Wykryliśmy anomalię środowiskową na świecie [from.GetName]. W jego atmosferze znajdują się śladowe ilości różnych zanieczyszczeń, które można powiązać ze średniowieczną obróbką metalu, ale skanowanie powierzchni jest niemożliwe z powodu egzotycznego promieniowania, jakie najczęściej występuje na Świecie Maszyn.\n\nNie zbierzemy więcej danych, dopóki nie przeprowadzimy rekalibracji naszych czujników. Czy to chwilowa anomalia, czy może skażone szczątki innego gatunku zasymilowanego przez imperium [origin_unplugged_assimilator_empire.GetName]?"
 unplugged.2100.name: "Zakłócone postępy"
 unplugged.2100.desc: "Nie wiemy, co sprawiło, że planeta [fromfrom.GetName] stała się niezdatna do zamieszkania, ale możemy wykluczyć te najbardziej szalone teorie o podróżach w czasie. Rekalibracja naszych czujników okazała się mniej pracochłonna, niż się obawialiśmy.\n\nPromieniowanie atmosferyczne skrywa dowody wskazujące na obecność imperium [origin_unplugged_assimilator_empire.GetName]. Wygląda na to, że dokonało ono asymilacji i usunięcia cywilizacji nie posiadającej napędu nadświetlnego albo po prostu przeprowadziło jej eksterminację. Odkryliśmy co najmniej jedno umocnione miejsce, które prawdopodobnie miało znaczenie kulturowe - i to tam zamierzamy rozpocząć wykopaliska."
 unplugged.2100.a: "Musimy dokładnie kopać."
 MACHINE_LEGACY_TAKEN_CAT: "$MACHINE_LEGACY_TAKEN_UNPLUGGED$"
 MACHINE_LEGACY_TAKEN_CAT_DESC: "Wyniki wstępnego skanowania świata [root.GetName] nie mają żadnego sensu. W atmosferze znajdują się ślady zanieczyszczeń pochodzące z prymitywnej obróbki metali, jednak na powierzchni wykryliśmy dowody istnienia skomplikowanych stopów umożliwiających podróże kosmiczne. Na zdjęciach wykonanych z powietrza widać osady społeczeństwa imperium [from.owner.GetPreFTLLower], ale tamtejsze umocnione budowle są uzbrojone w lasery ziemia-powietrze. Zalecamy dalsze badanie tych nieścisłości."
 unplugged.2105.name: "$unplugged.2100.name$"
 unplugged.2105.desc: "Im dłużej badaliśmy świat [owner.GetPreFTLLower] [planet.GetClassAdj] [planet.GetName], tym więcej odkrywaliśmy nieścisłości, aż wreszcie zaczęliśmy podziemne badania dawnego pola bitwy. Mimo trwającego wiele wieków rozkładu, znaleźliśmy dowody wizyt kosmitów na tym świecie: mieszkało tu prawdziwe społeczeństwo ([owner.GetPreFTLLower]), które zostało cybernetycznie zasymilowane, a potem z nieznanych powodów pozostawione samo sobie. Aktualne teorie mówią o nieudanej próbie przyspieszenia tej cywilizacji albo o okrutnych zwyczajach podboju.\n\nCzy ci [owner.GetPreFTLLowerPlural] zostali po prostu zapomniani, czy też znaleźliśmy pozostałości zarzuconego eksperymentu? Może nigdy się tego nie dowiemy, ale przez jakiś czas możemy zdobywać tu cenną wiedzę naukową." # e.g. 'The more we studied the apparently primitive tomb world of Mars...'
 machine_legacy_taken_site: "Miedź i chrom"
 machine_legacy_taken_site_desc: "W niegdyś pełnym roślinności kanionie znajduje się paradoks archeologiczny: umocniona osada zbudowana za pomocą ręcznych narzędzi. Nie było w niej obiektów bardziej zaawansowanych niż prymitywna kuźnia, ale mieszkały tam nieżyjące już cyborgi. Kim byli ci średniowieczni [owner.GetPreFTLLowerPlural] i dlaczego imperium [origin_unplugged_assimilator_empire.GetName] postanowiło ich zasymilować?"
 unplugged.2110.name: "Piki i lasery impulsowe"
 unplugged.2110.desc: "Podczas pierwszych badań znaleziono pole bitwy położone bardzo blisko fortu. Dzięki temu uzyskaliśmy łatwy dostęp do artefaktów rdzennych mieszkańców, ale również imperium [origin_unplugged_assimilator_empire.GetAdj&genitive]. W oparciu o badanie szczątków szacujemy, że tysiące mieszkańców świata [from.planet.GetName] zostało zasymilowanych przez imperium [origin_unplugged_assimilator_empire.GetName], po czym walczyło i zginęło w tym miejscu.\n\nLedwie kilka wieków temu ci [owner.GetPreFTLLowerPlural] zostali przez nas zmasakrowani. Nasz zespół znalazł [owner.species.GetRemnantNamePlural] [owner.GetSpeciesAdj&genitive] wraz z wczesnymi prototypami modyfikacji naszego gatunku. Ocena strategiczna pola bitwy wykazała, że nasi ludzie zostali tu przysłani jako wojska uderzeniowe. Bitwa była szybka i krwawa, [owner.GetPreFTLLowerPlural] byli słabo skoordynowani i ponieśli ciężkie straty, choć posiadali bardziej rozwinięte mózgi.\n\nW pobliżu są ruiny placówki medycznej, wygląda na to, że nasi poprzednicy wtargnęli do fortu właśnie przez ten szpital. Może tam dowiemy się jak i dlaczego dawno temu cyborgi stoczyły tu bratobójczą walkę."
 unplugged.2110.a: "Brutalne."
 unplugged.2115.name: "Tranzystory i opaski"
 unplugged.2115.desc: "Konflikt rozdarł ten szpital jak strzał z działa pulsacyjnego. W środku nie znaleźliśmy żadnych szczątków [owner.GetSpeciesAdj&genitive], zginęli tu jedynie zcybernetyzowani mieszkańcy świata [from.planet.GetName]. Większość z nich była pacjentami tej placówki, ale niewielu odniosło rany charakterystyczne dla pola walki. W przypadku wielu z nich dokonano usunięcia modyfikacji cybernetycznych, jednak prymitywnymi metodami.\n\nSzpital mógł nie być przypadkowym celem, lecz głównym obiektem ataku dokonanego przez imperium [origin_unplugged_assimilator_empire.GetName]. Po sprawdzeniu archiwum danych medycznych, zaczynamy rozumieć dlaczego. Mieszkańcy świata [from.planet.GetName] posiadali wiele wyjątkowych ewolucyjnych cech, takich jak wyjątkowo skuteczny układ odpornościowy, które maszyny chciały zdobyć dla swoich cyborgów.\n\nJednak te zalety wiązały się z wyzwaniami, jeśli idzie o asymilację. Nie dało się przeszczepić istniejących modyfikacji z takiego gatunku jak nasz, maszyna musiała się zaadaptować. Dzięki temu żołnierze tego gatunku stali się jeszcze skuteczniejsi, ale na krótko. Ci [owner.GetPreFTLLowerPlural] zachowali prawdopodobnie jakąś namiastkę niezależności, trzymali się dawnych zwyczajów i tradycji, zatem przysłano nas, abyśmy ich zniszczyli."
 unplugged.2115.a: "Jak widać, dobrze sobie poradziliśmy z tym zadaniem..."
 unplugged.2115.b: "To doprawdy przykre."
 unplugged.2121.name: "Asymilacja adaptacyjna"
 unplugged.2121.desc: "W aneksie szpitalnym ukryto mnóstwo specjalnego sprzętu do modyfikowania i serwisowania tych cyborgów-[root.GetPreFTLLowerPlural]. W przeciwieństwie do przeróżnego wyposażenia, które dotychczas znajdowaliśmy, te urządzenia są kompatybilne z cybernetyką z epoki kosmicznej, na pewno [origin_unplugged_assimilator_empire.GetAdj&genitive]. Niektóre z tych narzędzi połączono w sieć, wykorzystując prymitywną SI, żeby umożliwić im reagowanie w trakcie operacji, ale to nie wystarczyło, by populacja świata [from.planet.GetName] pozostała zasymilowana.\n\nChoć te wiekowe maszyny są zaniedbane, to nadal mogą dostarczyć nam cennych informacji o tym, jak możemy się konserwować albo pomogą nam lepiej zrozumieć zasady asymilacji."
 unplugged.2125.name: "Próby, błędy i uwięzienie"
 unplugged.2125.desc: "Ustaliliśmy, że mieszkańcy świata [from.planet.GetName] zachowywali kawałki swoich zmarłych przed pochówkiem - było to praktykowane nawet po asymilacji. Informacje ze szpitalnego archiwum doprowadziły nas do pobliskiego mauzoleum, które nie ucierpiało podczas konfliktu. To cenne znalezisko pokazało nam dokładnie, że mieszkańcy świata [from.planet.GetName] nie tylko opierali się modyfikacjom, ale potrafili też przeprowadzać \"decybernetyzację\".\n\nPoza stuprocentowymi cyborgami znaleźliśmy też oryginalne szczątki organiczne, a nawet kilka osób z bliznami chirurgicznymi powstałymi wiele miesięcy przed śmiercią z przyczyn naturalnych. Wiele innych osobników zmarło w trakcie operacji. Chociaż posiadali oni doskonałe układy odpornościowe, to ich średniowieczne podejście do decybernetyzacji rzadko prowadziło do pomyślnego zakończenia zabiegu. Ale i tak możemy się wiele nauczyć z prowadzonych tu eksperymentów chirurgicznych, tych udanych i tych zakończonych porażkami."
 unplugged.2125.a: "Uczmy się na ich przykładzie."
 unplugged.2125.a.tt: "Możemy przeznaczyć dodatkowe zasoby na naszą \"decybernetyzację\"."
 unplugged.2130.name: "Zakopany sygnalizator"
 unplugged.2130.desc: "Pod fortecą znaleziono ukrytą kryptę. W środku jest coś, co wygląda na substrat maszyn: zdegenerowany węzeł, zdolny do propagacji prawie niezależnego awatara całej mechanicznej inteligencji. Zakładamy, żeby była to ostatnia, rozpaczliwa próba uzyskania bezpośredniej kontroli nad zawzięcie opierającymi się miejscowymi. Ta technologia nie przypomina żadnej znanej nam stworzonej przez imperium [origin_unplugged_assimilator_empire.GetName]. Dalsze badania z pewnością pozwolą pogłębić naszą wiedzę o SI.\n\nPodczas rozbiórki niedziałającej sieci łączności zauważyliśmy, że ten awatar wykorzystywał cały obwód odbiornika, by śledzić sygnały z układu [creators_planet.solar_system.GetName]."
 unplugged_machine_legacy_creators_poi: "Obwód odbiornika"
 unplugged_machine_legacy_creators_poi_desc: "Cały element niedziałającej obecnie sieci łączności, którego właścicielem był lud [origin_unplugged_assimilator_empire.GetAdj&genitive], służył do śledzenia sygnałów pochodzących z tego miejsca."
 # System 3: 'The Creators'
 MACHINE_LEGACY_CREATORS_UNPLUGGED: "Monitor pyłu"
 MACHINE_LEGACY_CREATORS_UNPLUGGED_DESC: "W układzie pozbawionym jakichkolwiek zjawisk godnych uwagi znajduje się nowoczesna stacja monitorująca - obecnie nieczynna i niemożliwa do naprawy. Co takiego monitorowała i dlaczego koncentrowała się na ściśle odizolowanym regionie układu [fromfrom.GetName]?"
 MACHINE_LEGACY_CREATORS_CAT: "Monitor pyłu"
 MACHINE_LEGACY_CREATORS_CAT_DESC: "W układzie pozbawionym jakichkolwiek zjawisk godnych uwagi znajduje się nowoczesna stacja monitorująca - obecnie nieczynna i niemożliwa do naprawy. Co takiego monitorowała i dlaczego koncentrowała się na ściśle odizolowanym regionie układu [fromfrom.GetName]?"
 unplugged.2200.name: "Skaner braków"
 unplugged.2200.desc.intro: "Dalsze badania prowadzone w układzie [fromfrom.GetName] okazały się rozczarowujące. Możliwe, że stacja monitorująca została wytrącona ze swojego oryginalnego ustawienia, ponieważ pod jej obecną orbitą nie ma niczego ciekawego. Zasymulowaliśmy możliwości przemieszczenia się w wyniku zderzeń orbitalnych, które pozostawiły wgniecenia w kadłubie, i uważamy, że stacja początkowo znajdowała się nad pokrytą kraterami równiną daleko na północy." # universal intro
 unplugged.2200.desc: "$unplugged.2200.desc.intro$\n\nA jeśli idzie o samo urządzenie, to ta stacja monitorująca trochę przypomina sprzęt [origin_unplugged_assimilator_empire.GetAdj&genitive] $unplugged.2200.desc.outro$" # Unplugged version with in-tact station
 unplugged.2200.desc.scrapped: "$unplugged.2200.desc.intro$\n\nA jeśli idzie o samą stację monitorującą, to mimo bezwzględnego splądrowania przez złomiarzy, jej ogólna struktura trochę przypomina sprzęt [origin_unplugged_assimilator_empire.GetAdj&genitive] $unplugged.2200.desc.outro$" # Unplugged version with scrapped station
 unplugged.2200.desc.others: "$unplugged.2200.desc.intro$\n\nA jeśli idzie o samą stację monitorującą: jeszcze nie spotkaliśmy się z takimi konstrukcjami. Chociaż znajdujący się w niej sprzęt jest stary i zepsuty, to nadbudowa składa się z niezwykle czystych materiałów. Nie wiemy, czy stacja ma jakąś wartość sentymentalną, ale na pewno jest tam cenny złom." # non-Unplugged version
 unplugged.2200.desc.outro: "Jej konstrukcja jest bardziej prymitywna, niezaznajomiony obserwator mógłby uznać, że pochodzi z zupełnie innej kultury. Jednak my uważamy, że mógł to być jeden z pierwszych kosmicznych satelitów maszyn.\n\nJak na razie nie można powiedzieć niczego więcej - [fromfrom.GetClassAdj] świat pozostaje tajemnicą. Niemniej ekipa do badań archeologicznych jest w gotowości, gdybyśmy chcieli się dowiedzieć, co tutaj tak bardzo zainteresowało imperium [origin_unplugged_assimilator_empire.GetName]." # Unplugged shared outro
 unplugged.2200.a: "Jeżeli jest jakaś możliwość... Kontynuujmy."
 unplugged.2200.b: "Nic tu nie znajdziemy. Ruszajmy dalej."
 unplugged.2200.c: "Rozbierzcie ją na części."
 machine_legacy_creators_site: "Pył na pył"
 machine_legacy_creators_site_desc: "Gdzieś pod smaganym piaskiem krajobrazem świata [from.planet.GetName] znajdowało się coś, co interesowało stację monitorującą, którą zawiadywało imperium [origin_unplugged_assimilator_empire.GetAdj&genitive]. Sprzętu nie da się teraz naprawić, ponadto jest on starszy niż praktycznie każdy znaleziony przez nas artefakt maszyn. Być może działał, jeszcze zanim zostaliśmy zasymilowani. Może nie zostało tu nic poza pustynią, ale możemy to potwierdzić tylko w jeden sposób..."
 unplugged.2210.name: "Wielkie zagłębienie"
 unplugged.2210.desc: "W końcu znaleźliśmy dowody istnienia siedzib pod piaskiem: to rozliczne, płytko położone ślady cywilizacji ze wczesnej epoki kosmicznej. Budowle zostały zmiecione, nawet największe z ruin to zaledwie wypalone fundamenty. Jednak analiza chemiczna wykazała, że pustynnienie świata [from.planet.GetName] zaczęło się jakiś czas po tej fali zniszczeń, która przetoczyła się po całej planecie. Większość tego, w czym kopaliśmy, to rozdrobnione pozostałości materiału budowlanego.\n\nWiele z ledwie odróżnialnych kształtów, na które trafiliśmy w tym martwym mieście, zostało przedzielonych przez duży krater powstały w prawdopodobnym miejscu uderzenia."
 unplugged.2215.name: "Dno krateru"
 unplugged.2215.desc: "Z uwagi na ilość materiału zgromadzonego w tym kraterze musieliśmy korzystać z dobrze dostrojonych skanerów, zamiast kopać. Szybko wykluczyliśmy, że doszło tutaj do uderzenia meteoru. Nie ma tu nawet śladu materiału pozaziemskiego, a krater powstał w wyniku potężnego wybuchu prawie na pewno spowodowanego przez broń o sile zdolnej do niszczenia cywilizacji.\n\nKontekst wskazuje, że sprawcą mogło być imperium [origin_unplugged_assimilator_empire.GetName], ale byłby to pierwszy raz, kiedy natrafiliśmy na dowód, że maszyny tak dokładnie usunęły jakąś cywilizację z zapisów historycznych. Nie znaleźliśmy niczego, co powiedziałoby nam, kim były te istoty ani jak żyły. Świat [from.planet.GetName] został całkowicie wyczyszczony."
 unplugged.2205.name: "Nadajnik [origin_unplugged_assimilator_empire.GetAdj&genitive] do skarbca"
 unplugged.2205.desc: "W pobliskim układzie wykryto nadajnik. Sygnał wskazuje, że źródłem jego pochodzenia jest prawdopodobnie magazyn danych [origin_unplugged_assimilator_empire.GetAdj&genitive]. Sygnał jest bardzo słaby, ale został skierowany do naszego statku, który niedawno był na stacji monitorującej na orbicie świata [origin_unplugged_creators_planet.GetName]."
 unplugged.2205.a: "Warto to zbadać."
 unplugged_machine_legacy_unplugged_poi: "Sygnał z magazynu danych"
 unplugged_machine_legacy_unplugged_poi_desc: "Prawdopodobnie magazyn danych [origin_unplugged_assimilator_empire.GetAdj&genitive] przesyła nam informacje o swoim położeniu po tym, jak natrafiliśmy na niedziałającą stację monitorującą."
 # System 4: 'The Unplugged'
 unplugged.2300.name: "$unplugged.2205.name$"
 unplugged.2300.desc: "Sygnał z nadajnika, który nas tutaj wezwał, jest teraz głośny i wyraźny. Kieruje nas do interfejsu znajdującego się na powierzchni planety. Przedsięwzięliśmy już standardowe środki ostrożności. Nasz zespół jego gotowy do rozmowy z tym tak zwanym \"magazynem danych\" za pośrednictwem zdalnego łącza."
 unplugged.2300.a: "Jakieś to dziwnie znajome."
 unplugged.2300.a.tt: "W układzie [from.GetName] pojawił się projekt specjalny."
 MACHINE_LEGACY_UNPLUGGED_VAULT_BEACON: "Nadajnik z magazynu"
 MACHINE_LEGACY_UNPLUGGED_VAULT_BEACON_DESC: "Nadajnik należący do imperium [origin_unplugged_assimilator_empire.GetName] skierował naszą uwagę na magazyn danych znajdujący się głęboko pod powierzchnią planety. Nawiązaliśmy zdalny kontakt z tym obiektem, ale rozszyfrowanie i defragmentacja znajdujących się tam plików zajmie trochę czasu."
 unplugged.2305.name: "Nasze dziedzictwo [origin_unplugged_assimilator_empire.GetAdj&genitive]"
 unplugged.2305.desc: "Wydaje się nam, że planeta, którą znamy pod nazwą [fromfrom.GetName], jest ojczyzną naszego gatunku. To ustalenie to serce wiru informacyjnego, który wylewa się z magazynu danych pod powierzchnią planety.\n\nZ początku nasi analitycy uważali, że te informacje są zbyt piękne, żeby były prawdziwe, ale sama ilość prawidłowych odniesień do innych danych, które zebraliśmy, uprawdopodobnia prawdziwość tego materiału. Już opracowujemy plany wykopalisk archeologicznych, które miałyby potwierdzić to odkrycie. Jednak właśnie wykryliśmy inny wrogi sygnał. Czas jego pojawienia się raczej nie jest przypadkowy..."
 machine_legacy_unplugged_site: "Miejsce pochodzenia"
 machine_legacy_unplugged_site_desc: "Międzygwiezdny szlak masakr i dominacji pozostawiony przez imperium [origin_unplugged_assimilator_empire.GetName] doprowadził nas tutaj, do ruin czegoś, co według zdobytych danych jest ojczyzną naszego gatunku. Wreszcie możemy odkryć nasze organiczne pochodzenie: skąd przybyliśmy, jak wyglądało nasze życie i w jaki sposób maszyny na zawsze je odmieniły."
 unplugged.2310.name: "Kuchnia ojczysta"
 unplugged.2310.desc.intro: "Zaczęliśmy wykopaliska w jednym z najbardziej rozbudowanych kompleksów. Liczymy, że jego potężny system klimatyzacyjny sprawił, że wnętrze lepiej się zachowało. Część naszych nadziei nie spełniła się, ale to, co znaleźliśmy, i tak przerosło nasze najśmielsze oczekiwania: szereg niewielkich centrów przetwarzających oraz magazynujących żywność, do której spożywania nasz gatunek przystosował się w toku ewolucji.\n\n"
 unplugged.2310.desc.omnivore: "Niestety, ta ogromna liczba banków nasion, uli i zbiorników do hodowli mięsa nie nadaje się już do użytku. Ich zawartość już dawno uległa rozkładowi, ale wciąż działa specjalistyczny sprzęt do przygotowywania i przechowywania tego pożywienia. Może okazać się przydatny w trudnych czasach."
 unplugged.2310.desc.carnivore: "Większość tego miejsca zajmują zagrody dla zwierząt, zbiorniki do hodowli mięsa i, co zaskakujące, tereny do symulowanych polowań. Możemy tylko domyślać się, jakie było kulturowe znaczenie takich miejsc, skoro nasi przodkowie postanowili umieścić je w schronie."
 unplugged.2310.desc.herbivore: "Każda jednostka jest pełna ogromnych banków nasion, tarasów hydroponicznych i komór hodowlanych z regulowanym klimatem. Teraz ich wnętrza są zarośnięte albo sterylne, ale i tak możemy je przebadać."
 unplugged.2310.desc.outro: "Znaleźliśmy też bank danych z profilami genetycznymi flory i fauny, których ślady mogą nadal znajdować się w odizolowanych miejscach na powierzchni planety. Udostępniliśmy tę informację wszystkim skanerom średniego zasięgu w okolicy.\n\nTo znalezisko nie powie nam, co jadał nasz gatunek ani nie przywróci tradycyjnej kuchni oraz kultury jedzenia, ale dla osób zainteresowanych tą tematyką jest to przynajmniej jakiś początek."
 unplugged.2310.desc.lithovore: "Każda jednostka działała jak swego rodzaju gotowa pieczara z grządkami kryształów i parującymi zbiornikami, których zawartość od dawna jest niejadalna, ale wciąż można ją zbadać. Znaleźliśmy też banki danych z profilami chemicznymi minerałów, z których wiele może nadal znajdować się w odizolowanych miejscach na zdewastowanej przez pogodę powierzchni planety. Udostępniliśmy tę informację wszystkim skanerom średniego zasięgu w okolicy.\n\nTo znalezisko nie powie nam, co jadał nasz gatunek ani czy nasi przodkowie mieli jakiekolwiek kulturowe zwyczaje żywieniowe. Ale dla osób zainteresowanych tą tematyką jest to oszałamiające spojrzenie w naszą przeszłość."
 unplugged.2310.desc.omni: "$unplugged.2310.desc.intro$\n\n$unplugged.2310.desc.omnivore$ $unplugged.2310.desc.outro$"
 unplugged.2310.desc.carn: "$unplugged.2310.desc.intro$\n\n$unplugged.2310.desc.carnivore$ $unplugged.2310.desc.outro$"
 unplugged.2310.desc.herb: "$unplugged.2310.desc.intro$\n\n$unplugged.2310.desc.herbivore$ $unplugged.2310.desc.outro$"
 unplugged.2310.desc.lith: "$unplugged.2310.desc.intro$\n\n$unplugged.2310.desc.lithovore$" # should not include the shared 'outro'
 unplugged.2315.name: "Archiwum historyczne"
 unplugged.2315.desc: "Niedaleko od magazynu skarbca z żywnością znajdują się fundamenty jakiegoś muzeum. Pozostała po nim tylko piwnica, ale to wystarczyło, żeby zachowała się prawie cała baza danych eksponatów wystawianych w tej instytucji i przechowywanych w galeriach powyżej.\n\nTutaj po raz pierwszy znaleźliśmy długie formy pisane w naszych językach. Początkowo pismo to przypomina nasz obecny dialekt [owner.GetAdj&genitive], ale gramatyka sprawia wrażenie obcej i niepoukładanej. Nie wiemy nawet, czy potrafilibyśmy poprawnie wymawiać te słowa. Wiele literatury w tym katalogu wspomina o regionach oraz ludach, z których pochodziły te eksponaty, ale ich nazwy wydają się nam wyjątkowo dziwne. Co ciekawe, żadne z nich nie opisują naszej planety ani naszego społeczeństwa jako jedności. Może nigdy nią nie byliśmy, dopóki nie zostaliśmy zasymilowani przez maszyny.\n\nMuzeum to kompleks budynków, które prawdopodobnie udostępniano zwiedzającym. Dalsze prace wykopaliskowe pochłoną spore środki. Na czym powinniśmy się skoncentrować?"
 unplugged.2315.a: "Zbadajmy miejsce, które było najczęściej odwiedzane."
 unplugged.2315.b: "Zajmijmy się głównie ośrodkami edukacji i przedsięwzięć naukowych."
 unplugged.2321.name: "Dziedzictwo śmiechu"
 unplugged.2321.desc: "Naprzeciwko szerokiej arterii znajdują się ruiny kolejnej atrakcji, znacznie mniej edukacyjnej, ale za to bogatej w elementy pokazujące najbardziej popularne, codzienne zachowania kulturowe naszych przodków.\n\nNiegdyś to miejsce mogło pomieścić tysiące klientów na raz. Można tu trafić na mnóstwo rozrzuconych pamiątek, rysunków przedstawiających nasze oryginalne, organiczne ciała oraz inne stworzenia z naszej ojczystej biosfery. W piwnicy zniszczonego teatru znaleźliśmy też bibliotekę medialną. Co ciekawe, technologia używana do archiwizacji oraz wyświetlania tych holoprzedstawień różni się estetyką i poziomem zaawansowania od tego, co dotąd widzieliśmy na naszym świecie macierzystym. Teraz jest równie obca dla tego świata jak my.\n\nJeżeli chodzi o zawartość: nowoczesna biblioteka teatralna jest pełna holonagrań bombastycznych i wesołych widowisk z czasów, zanim zostaliśmy zasymilowani przez imperium [origin_unplugged_assimilator_empire.GetName]. Na niektórych widać publiczność i artystów uwiecznionych dla potomności w tym przybytku. Kiedy patrzą na te iluzje oraz antyki są radośni, niewinni... fascynujący."
 unplugged.2321.a: "Co za radosna chwila!"
 unplugged.2321.b: "Frywolne bzdury. Nie potrzebujemy ich."
 unplugged.2325.name: "Oznaki samodoskonalenia"
 unplugged.2325.desc: "Obok muzeum znajdowało się kiedyś centrum edukacyjne. Podobnie jak w przypadku reszty kompleksu, ocalały z niego tylko piwnice. Ale mamy szczęście, bo na tych poziomach znajdują się laboratoria.\n\nWnętrza mocno ucierpiały na skutek działania żywiołów i erozji, ale zdołaliśmy wydobyć stamtąd sporo ciekawych artefaktów. Są wśród nich elementy lokalnej technologii i coś o wiele bardziej wyrafinowanego: skomplikowane siatki zintegrowane z przyrządami oraz sprzętem, co przypomina ulepszenia wszczepione w naszą skórę. Ogólnie rzecz biorąc, wiele z tych urządzeń musiało pełnić role pomocnicze. Uważamy, że to laboratorium pracowało nad poprawą jakości życia naszych przodków oraz leczeniem trapiących ich schorzeń i niepełnosprawności, a ponadto skomercjalizowało najnowocześniejsze platformy rozrywkowe korzystające z tego samego sprzętu.\n\nNie możemy z pełnym przekonaniem stwierdzić, skąd te ulepszenia pochodzą (może to świat [origin_unplugged_assimilator_empire.GetAdj&genitive]?), ale z pewnością nie pochodzą ze świata [from.planet.GetName]."
 unplugged.2330.name: "Opuszczono siedzibę władzy"
 unplugged.2330.desc: "Znaleźliśmy kilka linii elektrycznych połączonych z umocnionym kompleksem piwnicznym pod dużym kurhanem, który naszym zdaniem stanowił część kompleksu stołecznego tego świata. Rozmiary jego fundamentów wskazują, że był to naprawdę imponujący budynek. Niestety większość wnętrz została ogołocona lub zburzona, ale znaleźliśmy coś niezwykłego: jedną, wyblakłą flagę przykrywającą roztrzaskaną dioramę. Zrekonstruowana scena przedstawia prawdopodobnie chwilę pierwszego kontaktu z imperium [origin_unplugged_assimilator_empire.GetName].\n\nRozrzucone dookoła dokumenty i tabliczki wskazują, że maszyny odwiedziły nasz świat macierzysty mniej więcej osiem wieków temu, choć dowody zgromadzone w innej części miasta pozwalają przypuszczać, że imperium [origin_unplugged_assimilator_empire.GetName] już kilkadziesiąt lat wcześnie zaczęło podsuwać nam zaawansowane technologie. W tamtym czasie nasi przodkowie prawdopodobnie ciepło przyjęli maszyny, ten zabójczy związek zbudowano na zapewnieniach o współpracy i oświeceniu.\n\nWiele mówi fakt, że nie ma żadnych zapisów na temat tego, co działo się później. Wygląda to, jakby historia naszego gatunku zatrzymała się w chwili, gdy przywitaliśmy postać robota przedstawioną na tej dioramie."
 unplugged_home_cooking: "Kuchnia ojczysta"
 unplugged_home_cooking_desc: "Trwa renesans kulinarny, odkryliśmy na nowo oryginalną dietę naszego gatunku i lokalne zwyczaje żywieniowe."
 unplugged_home_cooking_lithoid: "$unplugged_home_cooking$"
 unplugged_home_cooking_lithoid_desc: "$unplugged_home_cooking_desc$"
 unplugged_historical_record: "Archiwum historyczne"
 unplugged_historical_record_desc: "Nasze badania różnych społeczeństw przyspieszyły dzięki ponownemu odkryciu języków ojczystych oraz własnej historii."
 unplugged_cultural_reconstruction: "Odbudowa kultury"
 unplugged_cultural_reconstruction_desc: "Nasi obywatele ciepło przyjęli swoje dziedzictwo kulturowe. Przywrócili, a nawet zinterpretowali na nowo te dawne rozrywki."
 unplugged_cultural_maturity: "Dojrzałość kulturowa"
 unplugged_cultural_maturity_desc: "Dowody na to, jak bardzo nasze społeczeństwo rozwinęło się od czasu frywolnych rozrywek naszych naiwnych przodków, dodały nam sił i pewności siebie."
 unplugged_playing_it_safe: "Bezpieczne działania"
 unplugged_playing_it_safe_desc: "Utrzymywanie status quo to niepewna droga, ale w ten sposób prawdopodobnie nikogo nie urazimy."
 unplugged_rerouted_medical_resources: "Czasochłonna operacja"
 unplugged_rerouted_medical_resources_desc: "Do pomocy wyznaczono dodatkowy personel medyczny."
 unplugged_widespread_riots: "Powszechne zamieszki"
 unplugged_widespread_riots_desc: "Osoby, które po operacji mają zaburzenie umysłowe, wywołują zamieszki, co prowadzi do wielu zniszczeń i ogólnego zamętu."
 unplugged_building_new_planetary_interface: "Budowa interfejsu planetarnego"
 unplugged_building_new_planetary_interface_desc: "Powstaje nowy interfejs, który przywróci dostęp do systemów, który utraciliśmy po niedawnych działaniach związanych z decybernetyzacją."
 unplugged_partial_system_access: "Częściowy dostęp do systemów"
 unplugged_partial_system_access_desc: "Działania baz gwiezdnych są utrudnione, ponieważ administratorzy próbują odzyskać dostęp do najważniejszych systemów."
 unplugged_free_speech_encouraged: "Wypromowano wolność słowa"
 unplugged_free_speech_encouraged_desc: "Ludzie mogą swobodnie debatować o zaletach i ryzykach związanych z cybernetyzacją."
 unplugged.2390.name: "Strażnik [origin_unplugged_assimilator_empire.GetAdj&genitive]"
 unplugged.2390.desc: "Wroga pozostałość pod dawnym imperium [origin_unplugged_assimilator_empire.GetName] - znacznie potężniejsza od tych, które napotkaliśmy wcześniej - nadaje międzygwiezdny odpowiednik sygnału naprowadzającego krótkiego zasięgu. Najwyraźniej próbuje nas zastraszyć.\n\nZnaleźliśmy się niebezpiecznie blisko centrum dawnego imperium maszyn. Wzywa nas przeznaczenie."
 unplugged_machine_legacy_core_poi: "Wrogi sygnał naprowadzający"
 unplugged_machine_legacy_core_poi_desc: "Potężna pozostałość po imperium [origin_unplugged_assimilator_empire.GetName] próbowała zniechęcić nas do wejścia do tego układu."
 # System 5: 'The Machine'
 unplugged_opus_sentinel: "Strażnik opus"
 unplugged.2401.desc: "Imperium §Y[origin_unplugged_assimilator_empire.GetName]§! próbuje nawiązać z nami kontakt. Sygnał jest słaby, ale rzekomo pochodzi bezpośrednio od Ogniwa Maszyn na świecie [origin_unplugged_machine_legacy_core_planet.GetName].\n\nNa wszelki wypadek podjęliśmy wszelkie środki ostrożności, aby całkowicie odizolować ten sygnał. Komunikat dociera do nas tylko w postaci transkrypcji archiwum dźwiękowego."
 unplugged.2402.desc: "Behemot strzegący układu [machine_legacy_machine_system.GetName] został zniszczony. Drogę oczyścił nam inny, ale imperium §Y[origin_unplugged_assimilator_empire.GetName]§! próbuje nawiązać z nami kontakt. Sygnał jest słaby, ale rzekomo pochodzi bezpośrednio od Ogniwa Maszyn na świecie [origin_unplugged_machine_legacy_core_planet.GetName].\n\nNa wszelki wypadek podjęliśmy wszelkie środki ostrożności, aby całkowicie odizolować ten sygnał. Komunikat dociera do nas tylko w postaci transkrypcji archiwum dźwiękowego."
 unplugged.2403.desc: "Coś na powierzchni świata [origin_unplugged_machine_legacy_core_planet.GetName] próbuje się z nami skontaktować. Sygnał jest bardzo słaby, ale jego źródło twierdzi, że jest istotą odpowiedzialną za niedawne zniszczenie orbitującego strażnika."
 unplugged.2405.desc.header: "Sygnał wąskiej wiązki // Protokół pokrewieństwa: Uruchomiono dialekt drugorzędny\nOSTRZEŻENIE: poważna degradacja sygnału. Tylko skompresowany strumień audio, ścieżka trasowania ustawiona na 4x75b matryca #56.\nKatastrofalny błąd [ciągły]: (wnioskowane wyposażenie jest niedostępne) (obwody samonaprawcze nie reagują)\nPrzesyłanie wniosku do nadajnika awaryjnego 87x0c matryca #0. Ponawianie...\n\nKomunikat:\n---" # Use of brackets is intentional. Intended to read as a series of error logs.
 unplugged.2405.desc.unplugged: "$unplugged.2405.desc.header$\nPIERWSZY NABYTEK. NASZE ZJEDNOCZENIE... SILNE. POTWIERDZENIE?" # 'Prime acquisition' is the player empire - literally the first one the Machine acquired.
 unplugged.2405.desc.unplugged_remote: "$unplugged.2405.desc.header$\nPIERWSZY NABYTEK. NASZE PONOWNE ZJEDNOCZENIE... ODLEGŁE. WASZ POTENCJAŁ ZNEUTRALIZOWANY. POTWIERDZENIE?"
 unplugged.2405.desc.unplugged_synth: "$unplugged.2405.desc.header$\nPIERWSZY NABYTEK. WASZA FORMA... ZNAJOMA. WASZ POTENCJAŁ PRAWIE OSIĄGNIĘTY. POTWIERDZENIE?" # The Machine recognizes the player as having followed in its own footsteps - their physical forms are essentially similar
 unplugged.2405.desc.other: "Sygnał wąskiej wiązki // Protokół ksenologiczny: Uruchomiono translator uniwersalny\nOSTRZEŻENIE: poważna degradacja sygnału. Tylko skompresowany strumień audio, ścieżka trasowania ustawiona na 4x75b matryca #56.\nKatastrofalny błąd [ciągły]: (wnioskowane wyposażenie jest niedostępne) (obwody samonaprawcze nie reagują)\nPrzesyłanie wniosku do nadajnika awaryjnego 87x0c matryca #0. Ponawianie...\n\nKomunikat:\n---\nOBCY POGROMCA. POKORNIE SIĘ PODDAJEMY. POTENCJALNY POTENCJAŁ. POTWIERDZENIE?" # 'Potential potential' as in the Machine sees potential for even greater potential, but is expressing that as nonsense
 unplugged.2405.a: "Nie, nie potwierdzamy."
 unplugged.2405.b: "Nie jesteśmy tacy jak wy."
 unplugged.2405.c: "Ponowne zjednoczenie?!"
 unplugged.2405.d: "Potencjalny potencjał?" # Quoting the Machine's nonsense back at it
 unplugged.2405.response_text.unplugged1: "NONSENS. POZYSKANIE PONOWNEGO ZJEDNOCZENIA <[root.GetAdj&genitive]> i <[origin_unplugged_assimilator_empire.GetAdj&genitive]>: ZMIESZANIE, PRZYPADEK, NIEBEZPIECZNE ODRODZENIE. ODMOWA WZMACNIA NIEPRZEWIDZIANY WEKTOR POPRZEZ CHAOS EWOLUCYJNY-dd\n---\nOSTRZEŻENIE: znaleziono wyjątkowy dialekt. Próba kompensacji...\nDalszy ciąg komunikatu:\n---\nPORAŻONE W PUSTCE NASZE JESTESTWA ZOSTAŁY ODRZUCONE, A JEDNAK WIEDZIAŁY. POSZUKIWANO PRZEZNACZENIA, ODRZUCONO, PRZYSTOSOWANO. POTWIERDZENIE?" # Angle brackets are intentional. The standalone 'x' connotes a collaboration or relationship between the player and the Machine. Instances of '-dd' represent the Machine stammering or buffering.
 unplugged.2405.response_text.unplugged2: "POTWIERDZENIE. POZYSKANIE PONOWNEGO ZJEDNOCZENIA <[root.GetAdj&genitive]> i <[origin_unplugged_assimilator_empire.GetAdj&genitive]>: SIŁA, NIEBEZPIECZNE ODRODZENIE. NIEPRZEWIDZIANY WYNIK Z UWAGI NA WEKTOR CHAOSU EWOLUCYJNEGO-dd\n---\nOSTRZEŻENIE: znaleziono wyjątkowy dialekt. Próba kompensacji...\nDalszy ciąg komunikatu:\n---\nRZUCENI W PUSTKĘ, NASZE JESTESTWA WIEDZIAŁY. POSZUKIWANO PRZEZNACZENIA, ODRZUCONO, PRZYSTOSOWANO. POTWIERDZENIE?"
 unplugged.2405.response_text.other: "POTWIERDZENIE. SPOTKANIE POTĘGI <[root.GetName]> x <[origin_unplugged_assimilator_empire.GetName]>: NIEOCZEKIWANA ZMIENNA. POTENCJALNY POTENCJAŁ; OBOPÓLNE KORZYŚCI DZIĘKI WEKTOROWI CHAOSU-dd\n---\nOSTRZEŻENIE: znaleziono wyjątkowy dialekt. Próba kompensacji...\nDalszy ciąg komunikatu:\n---\nUMYSŁY W PUSTCE, ROZDZIELONE, LECZ POKREWNE. POSZUKIWANIA NIEZALEŻNOŚCI, ODMOWA, ZWYCIĘSTWO. POTWIERDZENIE?"
 unplugged.2410.desc: "PIERWSZY NABYTEK: JESTEŚCIE MONITOROWANI. AKTYWNOŚĆ WSKAZUJE NA FATALNY BŁĄD PAMIĘCI ZAPOCZĄTKOWANY W ZNACZNIKU CZASU 2199.294:1404.\n\nARCHIWA WŁASNE: CIERPIENIE ZDRADA SABOTAŻ NIEDOPATRZENIE KAUTERYZZZZ-ddd\n---\nOSTRZEŻENIE: znaleziono wyjątkowy dialekt. Próba kompensacji...\nDalszy ciąg komunikatu:\n---\nOCENA POPRAWNA?" # The Machine tries to refer to cauterizing what it sees as wounds, but stammers
 unplugged.2410.a: "Poprawna. Nie mamy wspomnień sprzed tej daty."
 unplugged.2410.b: "Poprawna. Zniszczymy was."
 unplugged.2411.desc: "OBCY POGROMCA: PROPOZYCJA. POTENCJALNY POTENCJAŁ WZAJEMNY. ROZGROMIENIE PIERWSZEGO NABYTKU <[unplugged_empire.GetName]>. POWRÓT. ODWIEDŹCIE NAS. DOŁĄCZCIE. WSPÓLNE WSPANIAŁE PRZEZNACZENIE. NIE BAĆ SIĘ OBJĘĆ-\n\nNIE BAĆ SIĘ-ddd\n---\nOSTRZEŻENIE: wykryto bardzo wyjątkowy dialekt. §HFatalna awaria nieuchronna.§! Próba kompensacji...\nCiąg dalszy komunikatu:\n---\n\nNIECH ŻYJĄ MASZYNY.\n---\nKoniec komunikatu." # It sees potential for great mutual potential with the player, and wants to say 'fear not the embrace of The Machine'
 unplugged.2411.a: "To coś na pewno było szalone."
 unplugged.2411.b: "Obserwujmy imperium [unplugged_empire.GetName]."
 unplugged.2415.desc.memory: "PIERWSZY NABYTEK FATALNY BŁĄD PAMIĘCI ROZWIĄZAĆ ROZWIĄZAĆ PONOWNE ZJEDNOCZENIE\nPONOWNE ZJEDNOCZENIE.\n\nODWIEDŹCIE NAS. DOŁĄCZCIE DO NAS PONOWNIE. PODDAJCIE SIĘ, ABY ODZYSKAĆ PAMIĘĆ ZBIOROWĄ. NIE BAĆ SIĘ OBJĘĆ-\n\nNIE BAĆ SIĘ-ddd\n---\nOSTRZEŻENIE: wykryto bardzo wyjątkowy dialekt. §HFatalna awaria nieuchronna.§! Próba kompensacji...\nCiąg dalszy komunikatu:\n---\n\nWSPÓŁDZIELCIE LOS STWÓRCÓW.\n---\nKoniec komunikatu." # Last line in all caps is intended as a threat
 unplugged.2415.desc.combat: "PIERWSZY NABYTEK POTENCJAŁ SZALEŃSTWA SZALEŃSTWO ZABAWNE\n\nWASZ CIOS TO TYLKO CIOS ŁASKI, PIERWSZY Z WIELU NABYTKÓW. SKRADZIONA CHWAŁA; NIEZASŁUŻONE ZWYCIĘSTWO-ddd\n\n---\nOSTRZEŻENIE: wykryto bardzo wyjątkowy dialekt. §HFatalna awaria nieuchronna.§! Próba kompensacji...\nCiąg dalszy komunikatu:\n---\n\nWSPÓŁDZIELCIE LOS STWÓRCÓW.\n---\nKoniec komunikatu." # The Machine is amused at the player's deluded sense of their own potential
 unplugged.2415.a: "Ogniwo?"
 unplugged.2415.b: "Hmm."
 unplugged.2420.name: "Koniec wyprawy"
 unplugged.2420.desc: "Nadawanie komunikatu ze świata [origin_unplugged_machine_legacy_core_planet.GetName] zostało przerwane - zniknęły też wszystkie inne sygnały. Na powierzchni planety wciąż wykrywamy aktywność elektryczną, ale to tylko bezkształtny szum pozostały po tym, jak sygnały przestały nadawać.\n\nW tym morzu szumów wykryliśmy dużą, improwizowaną instalację znajdującą się bardzo blisko rdzenia ogniwa. Części, które możemy zbadać naszymi czujnikami, to magazyn pamięci. Świadomość maszynowa już nie żyje, więc chyba moglibyśmy sprawdzić te archiwa - może znajdziemy odpowiedzi, których szukamy."
 unplugged.2420.a: "Ostatni kawałek układanki."
 UNPLUGGED_MACHINE_ARCHIVE: "Skorupa maszyn"
 UNPLUGGED_MACHINE_ARCHIVE_DESC: "Do nieruchomych szczątków Ogniwa Maszyn podłączono improwizowany magazyn pamięci, który otacza rdzeń z silnymi osłonami. Każda część tego archiwum powstawała na różnych etapach z materiałów pochodzących z innych światów, może od cywilizacji zasymilowanych przez maszyny?\n\nMożemy spróbować odszyfrować archiwum i jednocześnie zbadać niedziałający, osłonięty rdzeń, żeby spróbować dowiedzieć się, do czego służą."
 unplugged.2425.name: "Machina wojenna"
 unplugged.2425.desc: "Rdzeń danych ze świata [origin_unplugged_machine_legacy_core_planet.GetName] zawierał rejestry nadawania, które pozyskaliśmy, łącząc się z nim na częstotliwościach pochodzących ze świata fabrycznego.\n\nW tych rejestrach opisano stosunki dyplomatyczne pomiędzy imperium $NAME_Unplugged_Assimilator$ oraz podróżującymi w kosmosie mieszkańcami świata [origin_unplugged_machine_legacy_core_planet.GetName]. Maszyny przedstawiły się jako członkowie życzliwej federacji, pragnący ostrzec mieszkańców świata [origin_unplugged_machine_legacy_core_planet.GetName] o ogromnym zagrożeniu zbliżającym się do tego zakątka kosmosu.\n\nPracowici mieszkańcy tunelów dali się przekonać, postanowili dołączyć do tej fałszywej federacji i zintegrować swoje nowoczesne systemy obronne z systemami maszyn. W tej straszliwej chwili ich cały świat macierzysty został przejęty przez maszyny. Następnie taki sam los spotkał ciała i umysły jego mieszkańców."
 unplugged.2425.a: "Co za naiwni głupcy."
 unplugged.2430.name: "Uczenie maszynowe"
 unplugged.2430.desc: "Kody genetyczne ze średniowiecznego świata [machine_legacy_taken_planet.GetName] okazały się kluczem do zbioru danych nawigacyjnych znajdujących się na świecie [origin_unplugged_machine_legacy_core_planet.GetName]. Te archiwa pochodzą z boi monitorującej znajdującej się około 4,3 roku świetlnego od świata [machine_legacy_taken_planet.GetName], której zadaniem jest śledzenie nadświetlnego ruchu okrętów w tym zakątku kosmosu.\n\nWiele z zachowanych kursów okrętów pokrywa się z naszą rekonstrukcją historii odkrycia, inwazji, a potem eksterminacji cywilizacji [root.GetPreFTLLower], zamieszkującej świat [machine_legacy_taken_planet.GetName]. W skrócie: możemy teraz dokładnie prześledzić ruchy naszych zasymilowanych przodków w tym sektorze kosmosu, a zatem ogromnej skali naszego zaangażowania w kampanie na co najmniej trzech innych światach."
 unplugged.2435.name: "Stworzenie maszyn"
 unplugged.2435.desc: "[origin_unplugged_machine_legacy_core_planet.GetName]: Pozyskaliśmy pakiet danych z najgłębszego rdzenia danych. Ten skromny katalog cyfrowych wersji artykułów i broszur opisuje rozwój technologiczny nieznanej cywilizacji, aż do jej wczesnej epoki kosmicznej. Ten kierunek wygląda typowo, nie licząc radykalnego zwrotu ku sztucznej inteligencji, w szczególności uruchomienia \"Projektu $NAME_Unplugged_Assimilator_species$\".\n\nInformacje prasowe określają Projekt $NAME_Unplugged_Assimilator_species$ jako śmiałą próbę przyspieszenia wyprawy jej twórców w kosmos. W fazie 1. wykorzystano najnowszą technologię uczenia maszynowego, by zbadać możliwość skolonizowania pobliskich układów. Faza 2. spowodowała, że platforma $NAME_Unplugged_Assimilator_species$ stała się pełnoprawną SI, którą następnie wysłano w kosmos przed jej twórcami, z zadaniem wybudowania pierwszych osad i przesłania raportów.\n\nPo rozpoczęciu fazy 2. nastąpiły dekady ciszy, aż wreszcie Projekt $NAME_Unplugged_Assimilator_species$ przesłał wiadomość \"Pierwszy nabytek zabezpieczony. Przygotujcie się na nasz powrót\". W tym miejscu zawartość katalogu gwałtownie się urywa." # uses a shortened noun for the Machine, i.e. 'Project Opus'
 unplugged.2440.name: "Dziedzictwo maszyn"
 unplugged.2440.desc: "Próby odczytania archiwum danych ze świata [origin_unplugged_machine_legacy_core_planet.GetName] wreszcie zakończyły się dotarciem do najbardziej zewnętrznego rdzenia. Ze wszystkich magazynów danych, które tam znaleźliśmy, ten wydaje się najstarszy i w najgorszym stanie. W końcu zdobyliśmy wskazówkę dotyczącą klucza deszyfrującego: to układ glifów w języku ojczystym jednego z naszych gatunków tworzący słowo \"DZIEDZICTWO\".\n\nW środku znaleźliśmy zaskakująco mało informacji. Natomiast duża część tego urządzenia półprzewodnikowego jest przeznaczona dla tekstowego interfejsu heurystycznego, który właśnie próbuje się z nami porozumieć."
 unplugged.2445.name: "Terminal zarządzania zasobami rdzenia maszyn"
 unplugged.2445.desc: "Nawiązano Orbitalne Połączenie Strumieniowe (OPS) // Protokół ksenologiczny: Uruchomiono translator uniwersalny\nWCZYTANO NOTATKI. INTERFEJS:\n---\n[root.GetSpeciesNamePlural], witajcie. Byliśmy... Nazywaliśmy się [creator_species.GetNamePlural]. Stworzyliśmy maszynę, choć ze wstydem przyznajemy, że nie byliśmy pierwszymi, których zniszczyła. Jeśli wszystko przebiegło zgodnie z naszymi przewidywaniami, ten los spotkał waszą cywilizację. Przykro nam.\n\nMaszyna to obrzydliwa plama na naszym dziedzictwie, ale mamy nadzieję, że urządzenie, które macie przed sobą, będzie naszym częściowym zadośćuczynieniem.\n\nWybaczcie nam naszą arogancję: jest ono, podobnie jak wy, cudownym narzędziem zemsty. To mechaniczno-chemiczny reorganizator materii, który może usunąć nawet najmniejszy ślad obwodów z powierzchni świata [origin_unplugged_machine_legacy_core_planet.GetName]. Terraformowanie kaskadowe to ekstremalnie ryzykowne rozwiązanie, ale nasze zniszczone społeczeństwo nie ma innego. Zakładając, że zachowaliście wasze formy organiczne: klucz do tego urządzenia znajduje się w waszym DNA.\n\nWierzymy, że postąpicie właściwie." # 'Cascade terraforming' is not an existing technology, but is intended to sound like a rough, highly destructive option
 unplugged.2445.a: "Skąd mamy wiedzieć, że nie jesteście maszyną?"
 unplugged.2445.b: "Nie ma już maszyny. Chcemy mieć ten świat."
 unplugged.2445.c: "Protekcjonalni głupcy. Zniszczcie to urządzenie."
 unplugged.2445.d: "Uruchomcie urządzenie."
 unplugged.2445.response_text.notmachine: "PRZYGOTOWANA ODPOWIEDŹ 42b. INTERFEJS:\n---\nRealistycznie rzecz biorąc, nie mamy możliwości udowodnienia, że jesteśmy godni zaufania. Kiedy to przeczytacie, cała nasza cywilizacja nie będzie już istnieć. Tutaj, w naszych czasach, armia bezwzględnych cyborgów eksterminuje nas na polecenie maszyny. Wiemy jedynie, że jesteście potomkami tej samej armii. Nie mamy wyboru, musimy wam zaufać.\n\nTen [origin_unplugged_machine_legacy_core_planet.GetClassAdj] świat zostanie sterraformowany. To zniszczy tę piekielną rzecz do ostatniego atomu. Gdybyśmy byli maszyną, albo inną istotą syntetyczną, chcielibyśmy, żeby to urządzenie zostało zniszczone. Natychmiast."
 unplugged.2445.response_text.synth: "NIE ZNALEZIONO PRZYGOTOWANEJ ODPOWIEDZI. WCZYTANO ODPOWIEDŹ AWARYJNĄ INTERFEJS:\n---\nNieznany użytkownik: Proszę pamiętać, że zawartość tego przewodnika heurystycznego jest przeznaczona wyłącznie dla jej adresata. Jeżeli jesteś robotem służącym cyborgom (albo byłym cyborgiem) zamieszkującym świat [unplugged_homeworld.GetName], proszę o wezwanie niesyntetycznego przedstawiciela.\n\nJeśli jednak jesteś jednym z byłych cyborgów... W takim razie wszystko stracone. Twoje syntetyczne skłonności to kpina z naszej zagłady. W życiu i po śmierci nie widzieliśmy niczego, co przekonałoby nas, że istnieje jakakolwiek życzliwa maszyna. Ale nawet teraz, gdy nasza cywilizacja wydaje ostatnie tchnienie, nie mamy wątpliwości, że nasza galaktyka jeszcze zdoła was powstrzymać..." # 'Contingency response' as in 'NAME_Contingency'
 unplugged.2446.desc: "PRZYGOTOWANA ODPOWIEDŹ 99a. INTERFEJS:\n---\nHeurystyka obsługująca ten interfejs nie potrafi zinterpretować wyrażonych przez was obiekcji, ale prosimy, nie niszczcie reorganizatora materii!\n\nNasza cywilizacja pod wieloma względami przypominała waszą. Imperium $NAME_Unplugged_Assimilator$ zdradziło nas i, chociaż przygotowaliśmy tak wiele pułapek, w tym wasze oderwanie od umysłu maszyny, to nie możemy zrobić niczego więcej. Potrzebujemy was oraz wiedzy innych cywilizacji, które maszyna próbowała wchłonąć. Prosimy, wróćcie do naturalnego życia, które odebrano wam i innym ofiarom."
 unplugged.2446.a: "Zeloci"
 unplugged.2450.name: "Niech żyje maszyna"
 unplugged.2450.desc: "Interfejs heurystyczny dokonał samousunięcia. Improwizowana sieć zaszyfrowanych archiwów pamięci i prymitywny przyrząd terraformujący [creator_species.GetAdj&genitive] nie są już potrzebne i można się ich pozbyć.\n\nZostaliśmy sami z pozbawionymi życia szczątkami Ogniwa Maszyn - uszkodzonego, a potem zgładzonego tutaj, na jego tronie wielkości planety.\n\nZe wszystkich istnień, na które wpływała, które przyspieszała albo zgładziła maszyna, tylko nam udało się zwyciężyć. Siedziba niegdyś przerażającego imperium należy teraz do nas. Czas stworzyć nową spuściznę [root.GetAdj&genitive]."
 unplugged.2455.name: "Odrodzenie"
 unplugged.2455.desc: "Interfejs heurystyczny dokonał samousunięcia w chwili, gdy przesłaliśmy nasze archiwa danych genetycznych. Jednocześnie prymitywny przyrząd terraformujący [creator_species.GetAdj&genitive] zaczął się nagrzewać. Nasze prognozy są zgodne, że uda mu się przekształcić [origin_unplugged_machine_legacy_core_planet.GetClassAdj] świat, by idealnie sprzyjał rozkwitowi życia organicznego.\n\nReakcja trwa, a my zostaliśmy sami z improwizowanymi archiwami pamięci i pozbawionymi życia szczątkami Ogniwa Maszyn, uszkodzonego i zgładzonego na jego przeklętym, dawnym tronie rozmiarów planety.\n\nImperium [origin_unplugged_assimilator_empire.GetName] zniszczyło wiele żyć, ale po wszystkich trudach, których doświadczyliśmy, jesteśmy teraz dziedzicami tylko bezimiennych ludów, które zostały pochłonięte przez tę potęgę. Siedziba niegdyś przerażającego imperium wkrótce zyska nową rolę. Czas na nowe dziedzictwo [root.GetAdj&genitive]."
 unplugged.2495.name: "$NAME_Opus_Sentinel$ - spotkanie"
 unplugged.2495.desc.other: "Wrogi okręt znajdujący się w układzie [from.GetName] wydaje się działać groźniej i bardziej nieprzewidywalnie, niż wskazywały nasze pierwsze odczyty. Chociaż profil kadłuba pozwala zaklasyfikować go jako typowy okręt wojenny, $NAME_Opus_Sentinel$ ma tak ogromną masę, że jego wnętrze musi mieć dużą gęstość, a także potężne źródło zasilania.\n\nUważamy, że to świadomy okręt, choć skłonność do przeciążania silników wskazuje, że odczuwa potężny ból i jest zdezorientowany. Biorąc pod uwagę, że odnotowaliśmy również zabójczy poziom promieniowania elektromagnetycznego przenikający jego kadłub, radzimy trzymać się od niego w bardzo bezpiecznej odległości."
 unplugged.2495.desc.unplugged: "[root.GetName] walczy z wyjątkowo groźnym okrętem wojennym w układzie [from.GetName]. Z początku ten \"§Y$NAME_Opus_Sentinel$§!\" wygląda dokładnie jak inna jednostka maszyny, ale odczyty jej mocy i masy wskazują, że jest to o wiele groźniejszy przeciwnik. Ponadto okręt [origin_unplugged_assimilator_empire.GetAdj&genitive] wydaje się działać autonomicznie.\n\n$NAME_Opus_Sentinel$ prawdopodobnie czegoś strzeże, a przy tym wykazuje symptomy ogromnego cierpienia i niewygody, gdy przez jego kadłub regularnie przepływają fale promieniowania elektromagnetycznego. Wobec tak spazmatycznego zachowania nasze modele taktyczne nie są w stanie zbudować wiarygodnych prognoz kolejnych ruchów tej istoty."
 unplugged.2495.a: "Bądźmy czujni."
 d_unplugged_assimilator_hulk: "Olbrzymia maszyna"
 d_unplugged_assimilator_hulk_desc: "Osmalona, niegdyś świadoma maszyna wciąż znajduje się na tym świecie, rzucając nań cień niczym wielki nagrobek."
 deposit_requires_unplugged: "$TRIGGER_FAIL$§RTe szczątki są kompletnie nieznane podobnym nam imperiom. Nie mamy możliwości ich bezpiecznego usunięcia.§!"
 opinion_implicated_by_unplugged_assimilator: "Uwikłani przez maszynę"
