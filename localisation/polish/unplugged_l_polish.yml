 START_SCREEN_UNPLUGGED: "Świadomość zalało nam szaleństwo strzałów z ognistej broni i obezwładniający ból. Nasze zmysły rozchwiały się, jakby wszechobecna harmonia dźwięków nagle zamilkła. W jej miejsce pojawiło się ogłuszające echo martwej transmisji. Basowa nuta w wielozmysłowym piekle, w którym teraz się znajdujemy.\n\nCoś chce nas zabić: krwiożercze maszyny, pozbawione części organicznych, pilotujące okręty, które bardzo przypominają nasze. Ich pierwszy atak był niespodziewany i niszczycielski, a przy tym słabo skoordynowany. Przygotowaliśmy odpowiedź militarną. Instynkt kazał nam walczyć, stworzyć elementarną hierarchię i skumulować wspólną mądrość.\n\nJeszcze nie wygraliśmy tej bitwy, ale mamy nadzieję, że to się zmieni, gdy nasze rozproszone siły będą bezpieczne na świecie [capital_scope.GetName]. Może wtedy zdołamy ustalić, o co im chodziło..."
 origin_unplugged_starting_system_init_NAME: "$origin_unplugged$"
 origin_unplugged_starting_system_init_DESC: "To zawsze będzie układ początkowy w przypadku pochodzenia: $origin_unplugged$.\n\n$system_initializer_DESC$"
 sol_system_unplugged_initializer_NAME: "$origin_unplugged$ (Słońce)"
 sol_system_unplugged_initializer_DESC: "Opcjonalny układ początkowy dla ludzi z pochodzeniem: $origin_unplugged$."
 unplugged_injured_star_name: "Ath-Khui'achad"
 unplugged_injured_homeworld_name: "Intch'asket"
 unplugged_battlefield: "Zdobycze z pola bitwy"
 unplugged_battlefield_desc: "Powierzchnia tego świata jest usiana niezliczonymi martwymi cyborgami i maszynami, które próbowały dokonać tu brutalnej eksterminacji. W ich ciałach zdrowe jednostki i sprawni ranni mogą szukać dla siebie modyfikacji."
 # Unique Species Traits
 trait_unplugged_cybernetic_positives_3: "Cyberkomandosi"
 trait_unplugged_cybernetic_positives_3_desc: "$trait_unplugged_cybernetic_positives_desc$"
 trait_unplugged_cybernetic_positives_desc: "Wymiana wszystkich kończyn i zaimplantowany pancerz z nanosiatki umożliwiają temu cyborgowi brutalnie skuteczne prowadzenie walki. Uzyskano to poprzez poświęcenie kilku funkcji ciała nieprzydatnych w walce."
 trait_unplugged_cybernetic_positives_3_tt: "Zadowolenie podczas wojny i kryzysu: §G+30%§!\n$t$- §H$commander_plural_with_icon$§! - zapewniona szybkostrzelność okrętu: §G+20%§!"
 trait_unplugged_cybernetic_positives_2: "Cybernetyczne jednostki szturmowe"
 trait_unplugged_cybernetic_positives_2_desc: "Te cyborgi są dziełem holistycznego podejścia do implantowanego wyposażenia. Zamiast całkowicie zintegrowanego pancerza posiadają wymienialne modyfikacje, co pozwoliło zachować część funkcji nie związanych z walką."
 trait_unplugged_cybernetic_positives_2_tt: "§Y$commander_plural_with_icon$§!- Zapewnia szybkostrzelność okrętu: §G+10%§!"
 trait_unplugged_cybernetic_positives_1: "Żołnierze cyborgi"
 trait_unplugged_cybernetic_positives_1_desc: "Eleganckie modyfikacje zmysłów, gruczołów i nerwów motorycznych tych cyborgów czynią z nich sprawnych i niezłomnych wojowników, którzy wciąż posiadają zdolności reprodukcyjne."
 trait_unplugged_cybernetic_positives_1_tt: "§Y$commander_plural_with_icon$§!- Zapewnia szybkostrzelność okrętu: §G+5%§!"
 trait_unplugged_cybernetic_negatives_3: "Odłączenie"
 trait_unplugged_cybernetic_negatives_3_desc: "$trait_unplugged_cybernetic_negatives_desc$"
 trait_unplugged_cybernetic_negatives_desc: "Wiele z modyfikacji tych cyborgów powstało z myślą o nieistniejącej już sieci bojowej, co wywołuje silny stres i dyskomfort."
 trait_unplugged_cybernetic_negatives_3_tt: "Zadowolenie, gdy nie trwa wojna albo kryzys: §R-10%§!"
 trait_unplugged_cybernetic_negatives_2: "Rozłączenie"
 trait_unplugged_cybernetic_negatives_2_desc: "Niedopasowane właściwości wojskowych modyfikacji tych cyborgów znacznie pogarszają ich komfort życia i zwiększają potrzeby ich ciał podczas rehabilitacji."
 trait_unplugged_cybernetic_negatives_1: "Nawiedzanie"
 trait_unplugged_cybernetic_negatives_1_desc: "Halucynacje dźwiękowe i inne echa sensoryczne z dawnej świadomości maszynowej nadal prześladują te cyborgi, przez co często wpadają w depresję lub nerwicę."
 trait_unplugged_decyberized: "Decybernetyzacja"
 trait_unplugged_decyberized_desc: "Te byłe cyborgi wyłączyły lub wyrwały modyfikacje, które kiedyś przymusowo im zamontowano. Dzięki temu odzyskały wiele z organicznych, dziedzicznych cech ich gatunku."
 trait_unplugged_neurocalmed: "Neurouspokojenie"
 trait_unplugged_neurocalmed_desc: "Tym cyborgom obniżono poziomy neuroksenu, co ograniczyło ich impulsywność i agresję, dzięki czemu mniej interesują się osobistymi zyskami, a bardziej normami społecznymi."
 trait_unplugged_neurosavant: "Neuromędrzec"
 trait_unplugged_neurosavant_desc: "Tym cyborgom zwiększono poziomy kogniweksu, co zwiększyło plastyczność ich synaps, zdolność przyswajania informacji oraz zdolność rozwiązywania problemów."
 trait_unplugged_regenoptimized: "Optymalizacja pod kątem regeneracji"
 trait_unplugged_regenoptimized_desc: "Tym cyborgom zwiększono poziomy regenolu X, co zwiększyło równowagę między ich układami organicznymi i syntetycznymi - teraz ich cyberimplanty mogą naprawiać się samodzielnie na poziomie molekularnym."
 # Unique Leader Traits ('positive' only)
 leader_trait_unplugged_cybernetic_positives: "[triggered_unplugged_leader_name]"
 leader_trait_unplugged_cybernetic_positives_desc: "[triggered_unplugged_leader_desc]"
 leader_trait_unplugged_cybernetic_positives_3: "Cyberkomandos"
 leader_trait_unplugged_cybernetic_positives_3_desc: "Ten przywódca powierzył część funkcji swojego ciała sprzętowi, który podnosi świadomość bojową."
 leader_trait_unplugged_cybernetic_positives_2: "Cybernetyczna jednostka szturmowa"
 leader_trait_unplugged_cybernetic_positives_2_desc: "Ten przywódca może płynnie i bezpośrednio integrować się z systemami wojskowymi i cywilnymi, ale znacznym kosztem dla zmysłów organicznych."
 leader_trait_unplugged_cybernetic_positives_1: "Żołnierz cyborg"
 leader_trait_unplugged_cybernetic_positives_1_desc: "Znaczące modyfikacje zmysłów i układów odpornościowych tego przywódcy gwarantują długowieczność, niezawodność, a przy tym nieznaczną utratę funkcji rozrodczych."
