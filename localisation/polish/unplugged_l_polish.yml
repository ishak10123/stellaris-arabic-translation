 situation_unplugged_identity_desc: "Oderwani od imperium [origin_unplugged_assimilator_empire.GetName] musimy teraz zdecydować, jak zaprezentujemy się na arenie galaktycznej. Będziemy korzystać z przerażającej potęgi maszyny czy może odrzucimy nasze stygmatyzujące modyfikacje? Wiele głosów [owner.GetSpeciesAdj&genitive] chce, żeby je usłyszano."
 situation_unplugged_identity_type: "Sytuacja ucieleśnionej tożsamości"
