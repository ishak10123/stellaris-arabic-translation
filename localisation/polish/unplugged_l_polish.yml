 unplugged.3000.name: "Nasze ucieleśnienie" # intentionally abstract - 'how we embody ourselves' - referring to the accompanying Situation
 unplugged.3000.desc: "Odkąd oderwaliśmy się od wspólnej świadomości maszyny, [root.GetSpeciesNamePlural] biorą udział w konfliktach. Ale nawet w czasach pokoju lub odpoczynku, kiedy jesteśmy tylko z własnymi myślami, spoglądamy do naszego wnętrza, żeby zaakceptować bolesne, choć imponujące, przymusowe modyfikacje naszych ciał.\n\nTen najintymniejszy z konfliktów już zaczął wpływać na całe nasze społeczeństwo, czy to nam się podoba, czy nie. Dlatego zamierzamy dalej monitorować wszystkie doświadczenia, które przeżywają [root.GetSpeciesNamePlural] w czasie dalszego rozwoju imperium [root.GetName]. Badania holistyczne wskażą trendy ku tak zwanej \"decybernetyzacji\" albo ku większemu upowszechnieniu modyfikacji oraz pragnieniom utrzymania lub poprawienia naszych obecnych form cielesnych."
 unplugged.3000.a: "Będziemy bacznie obserwować, ale nie podejmiemy pochopnych działań."
 unplugged.3000.b: "Nie ociągajmy się. Podejmijmy zdecydowane działania."
 unplugged.3000.c: "Powinniśmy być otwarci na wszystkie argumenty."
 unplugged.3005.name: "Jednomyślność"
 unplugged.3005.desc: "Nasz gatunek [owner.GetAdj&genitive] poczynił obserwacje holistyczne postaw wobec naszej fizjologii. Wykazały one, że weszliśmy w okres spokoju. Wygląda na to, że skomplikowane wzajemne oddziaływania między prawodawstwem, dyskursem społecznym i zaawansowanymi badaniami przyniosły konsensus w kwestii naszych ciał.\n\nJeszcze za wcześnie na stwierdzenie, że ta harmonia przetrwa próbę czasu, ale na razie jest jasne, że - nie licząc radykalnych zmian warunków naszego życia lub podejścia do rządzenia - [owner.GetSpeciesNamePlural] zgadzają się co do tego, kim jesteśmy i jak wyglądamy."
 unplugged.3005.a: "Ta debata powinna być bardziej polityczna."
 unplugged.3005.b: "Tak jak sądziliśmy."
 unplugged.3005.c: "Sprzeciwmy się temu."
 unplugged.3010.name: "Podzielone opinie"
 unplugged.3010.desc: "Nasz gatunek [owner.GetAdj&genitive] prowadził badania postaw wobec naszej fizjologii. Wykazały one, że weszliśmy w okres niepokojów kulturowych. Skomplikowane wzajemne oddziaływania między prawodawstwem, dyskursem społecznym i zaawansowanymi badaniami doprowadziły do gwałtownych wahań opinii, co wywołało gwałtowne protesty oraz spory w naszych miastach.\n\nNieliczne z tych zdarzeń doprowadziły do starć i niepokojów społecznych. Jednak większość obywateli jest dumna z tego, że wsłuchujemy się w tak wiele głosów. Jednocześnie przekonaliśmy się, że [owner.GetSpeciesNamePlural] to podzielony lud, a idee naszej kultury o własnej tożsamości są teraz bardziej kruche niż kiedykolwiek."
 unplugged.3010.a: "Musimy znaleźć lepsze forum dla tych debat."
 unplugged.3090.name: "My, [owner.GetSpeciesNamePlural]" # e.g. 'We, the Neo-Humans'
 unplugged.3090.desc: "\"Jesteśmy tacy, jak widać. Niczym więcej, niczym mniej\".\n\nTo tylko jedno z wielu prostych, chwytliwych haseł, które pojawiły się w wyniku zmagań naszego społeczeństwa z tożsamością cielesną. Możemy śmiało stwierdzić, że jesteśmy wolni od licznych wątpliwości, obaw i nierealnych tęsknot, które niegdyś mieliśmy w związku z naszymi cielesnymi jestestwami.\n\nInną kwestią jest to, czy chcemy hołdować tym standardom w ramach polityki ogólnogalaktycznej. Przynajmniej w ojczyźnie [owner.GetSpeciesNamePlural] są chyba zadowoleni z naszych form fizycznych oraz podróży ku samorealizacji."
 unplugged.3100.name: "Podstawy do usunięcia"
 unplugged.3100.desc: "[root.GetSpeciesNamePlural] coraz powszechniej uważają, że powinniśmy zrobić więcej, aby zdystansować się od naszych aspektów maszynowych poprzez ograniczenie albo wręcz usunięcie modyfikacji, które przymusowo zainstalowano w naszych ciałach.\n\nOpinia publiczna domaga się znalezienia rozwiązań tego, co jest powszechnie uznawane za kryzys wewnętrzny, co miałoby poprawić naszą reputację w oczach innych mocarstw i sprawić, że [root.GetSpeciesNamePlural] doświadczający codziennych trudów wynikających z wszechogarniającego wstydu i dysmorfii poczują, że ich los stał się lepszy."
 unplugged.3100.a: "To wykluczone."
 unplugged.3100.b: "Zajmiemy się tym."
 unplugged.3105.name: "Przełom decybernetyzacyjny"
 unplugged.3105.desc: "Badacze z cywilnego laboratorium zajmującego się decybernetyzacją imperium [target.GetName] ogłosili osiągnięcie znacznego przełomu. Twierdzą, że opracowali technikę usuwania wszczepionego nanosiatkowego pancerza oraz połączonych z nim istotnych modyfikacji.\n\n[target.GetSpeciesNamePlural] przez wiele pokoleń cierpieli w niezgrabnych i przerażających formach fizycznych, ponieważ ta syntetyczna warstwa wewnętrzna stanowi niezbędny element wielu naszych zmodyfikowanych funkcji życiowych. Jednak teraz możemy zastąpić tę siatkę stworzonym przez nas implantem skórnym pomysłowo połączonym z materiałem organicznym. Innymi słowy: gatunek [target.GetSpeciesAdj&genitive] miałby prawdziwą skórę."
 unplugged.3105.a: "Ten pancerz chroni nas od pokoleń. Ma zostać."
 unplugged.3106.desc: "Nasze rodzime wysiłki na rzecz decybernetyzacji imperium [target.GetName] przyniosły kolejny przełom. Obecnie placówki medyczne wnioskują o zwiększenie liczby nowych, radykalnych zabiegów. Eksperci twierdzą, że znaleźli sposób na obejście licznych zależności biomechanicznych, którym podlegają nawet nowo narodzeni [target.GetSpeciesNamePlural].\n\nInterdyscyplinarny panel recenzencki już zaakceptował ten proces, przy czym dodał, że usunięcie tych modułowych portów broni zmniejszy obciążenie gospodarki wynikające z konieczności serwisowania tych obcych modyfikacji."
 unplugged.3106.a: "Odmowa. Te moduły zapewniają nam przewagę w walce."
 unplugged.3107.desc: "[target.GetSpeciesNamePlural] wkrótce zrealizują swoje marzenie, ponieważ badacze wreszcie znaleźli sposób odnawiania i regeneracji organicznych układów nerwowych naszych ciał. Według nich nowy rodzaj terapii genetycznych i hakowanie oprogramowania spowodowały, że obiekty testowe mogły prowadzić normalne życie bez zmodyfikowanych przetok nerwowych, zamiast których wykorzystywały własne odruchy motoryczne. Wstępne badania wskazują nawet, iż te terapie mogą ograniczyć lub zlikwidować liczne halucynacje zmysłowe, których wszyscy doświadczamy od czasu oderwania się od maszynowej świadomości."
 unplugged.3107.a: "Te zmodyfikowane odruchy bojowe mogą się nam przydać."
 unplugged.3110.name: "Harmonizacja maszyny"
 unplugged.3110.desc: "Cywilny zespół badawczy zajmujący się przejęciem kontroli nad naszymi modyfikacjami odkrył sposób na dopełnienie siatki bezprzewodowej [origin_unplugged_assimilator_empire.GetAdj&genitive], która służyła kiedyś do synchronizowania wszystkich naszych modyfikacji - ich brak sprawił, że [target.GetSpeciesNamePlural] irytowali się i cierpieli, ponieważ nie mogli odnaleźć sygnału urządzenia. Chociaż ta sieć zastępcza jest celowo silnie scentralizowana - z definicji splot [origin_unplugged_assimilator_empire.GetSpeciesAdj&genitive] musi być wzorem, na którym powstaje - zapewniono nas, że jest bezpieczna i interes [target.GetAdj&genitive] jest jedynym, któremu służy. Obiekty pierwszych testów poinformowały o zwiększeniu własnej wydajności, poczucia komfortu i ulgi porównywalnymi z błogością."
 unplugged.3110.a: "Nigdy więcej. Nie."
 unplugged.3111.desc: "Nasze działania mające na celu zwiększenie kontroli nad naszymi modyfikacjami przyniosły przełom w dziedzinie chirurgii cybernetycznej. [target.GetScientistPlural] z zespołu medycznego zidentyfikowali zależności między modułowymi interfejsami naszych ciał - te elementy maszynowe pozwalają nam z łatwością wymieniać całe kończyny, platformy uzbrojenia i szkielety ciał. Dzięki temu możemy zmodernizować nasze ciała, a nowo narodzeni [target.GetSpeciesNamePlural] otrzymają specjalne interfejsy, przez co nie będziemy dłużej polegać na kiepskich naprawach dokonywanych z użyciem odzyskanego wyposażenia (to stary sprzęt [origin_unplugged_assimilator_empire.GetAdj&genitive])."
 unplugged.3111.a: "To o krok za daleko."
 unplugged.3112.desc: "Jesteśmy bliscy zapanowania nad naszymi modyfikacjami, ponieważ opracowaliśmy przełomową terapię halucynacji sensorycznych. Odkąd oderwaliśmy się od maszynowej świadomości, [target.GetSpeciesNamePlural] w przeważającej większości cierpią na stany lękowe i depresję, ponieważ podświadomie szukają pieśni, której już nie jesteśmy w stanie usłyszeć. Jednak teraz możemy zagłuszyć tę tęsknotę dzięki pomocniczemu implantowi niepołączonemu z siecią, który naśladuje długości fal kognitywnych zbiorowości maszyn."
 unplugged.3112.a: "Mamy znowu udawać umysł maszyny? Niewyobrażalne."
 unplugged.3115.name: "Dysmorfia środowiskowa"
 unplugged.3115.desc: "Lud [target.GetAdj&genitive] jest dręczony przez niepokoje, ponieważ sprzeczne głosy wzywają do nasilenia jakichkolwiek działań w kwestii naszych modyfikacji cybernetycznych.\n\nJednak dla rosnącej większości obywateli ta debata stała się bardziej stateczna i zróżnicowana. [target.GetSpeciesNamePlural] szukali pociechy w kosmetykach, próbując samodzielnie ukryć albo podkreślić swoje modyfikacje. Nieliczni [target.GetSpeciesNamePlural] wyrażają prawdziwe zadowolenie z takich prowizorycznych działań, ale są oni częścią nowego trendu ku wymuszonej akceptacji.\n\nMożna powiedzieć, że imperium [target.GetName] uczy się walczyć z powszechnym zaniepokojeniem i apatią."
 unplugged.3115.a: "Rozumiemy."
 unplugged.3116.name: "Zachowanie status quo"
 unplugged.3116.desc: "[target.capital_scope.GetName]: Władze lokalne poinformowały o narastającej liczbie demonstracji publicznych i pokojowych przejawach nieposłuszeństwa obywatelskiego. Zjawiska te były obserwowane, a kiedy było to konieczne - spotykały się z odpowiednią reakcją, dzięki czemu większość populacji nie miała żadnych powodów do niepokoju. Jednak wszystkie te zakłócenia łączyły się z kwestiami polityki cybernetycznej, przez co spotkały się z oporem obywateli, którzy nie chcieli zmieniać swojego obecnego życia.\n\nWygląda na to, że dla obywateli imperium [target.GetName] ideologia \"status quo\" to nie tylko brak działania. Za to [target.GetSpeciesNamePlural] opowiadają się masowo przeciwko \"dalszemu ingerowaniu\" w nasze modyfikacje."
 unplugged.3116.a: "Rozumiemy."
 unplugged.3117.name: "Poważny stan rzeczy"
 unplugged.3117.desc: "Niektórzy [target.GetSpeciesNamePlural] nadal protestują przeciwko rzekomej bezczynności rządu w kwestii cybernetycznych modyfikacji, jednak większość opinii publicznej przyjęła bardziej stoicką postawę. Grupa pragmatycznych osób połączyła siły, aby świadczyć pomoc charytatywną i doradztwo dla potrzebujących. Jednocześnie placówki medyczne zaczęły tworzyć nowe łańcuchy dostaw recyklingowanych części, z których musimy korzystać.\n\nPomału, ale niezachwianie, nasze społeczeństwo zaczyna akceptować własny wygląd oraz okoliczności w jakich się znaleźliśmy. Czeka nas jeszcze wiele pracy, ale ta akceptacja sprawiła, że pojawił się promyk nadziei."
 unplugged.3117.a: "To jest jakieś zakończenie."
 unplugged.3205.name: "Dziedzictwo terroru"
 unplugged.3205.desc: "[root.GetSpeciesNamePlural] coraz liczniej uważają, że nasz niedawny i niepokojący dialog z imperium [fromfrom.GetName] ukazał niewygodną prawdę z czasów naszego wyjścia z imperium [origin_unplugged_assimilator_empire.GetName]: inni obawiają się nas. Ponadto, ten strach zrodził się z maszyny, a nie z naszych działań. Jest on dziedziczny, niezasłużony, a co za tym idzie - trudno będzie nad nim zapanować." # fromfrom = pre-FTL country
 unplugged.3206.desc: "[root.GetSpeciesNamePlural] coraz liczniej uważają, że dotknięte konfliktem imperium [fromfrom.GetName] ukazuje niewygodną prawdę: inni obawiają się nas z powodów, nad którymi nie mamy kontroli.\n\nJuż sam nasz wygląd wywołuje grozę - to raczej w niczym nam nie pomoże, gdybyśmy chcieli prowadzić miękką dyplomację w kontaktach z innymi gatunkami. Ale możliwe jest też, że nasze okrutne dziedzictwo sprawia, że inni widzą w nas tylko brutalność maszyny, którą kiedyś byliśmy, a nie dostrzegają nas jako przedstawicieli gatunku [root.GetSpeciesAdj&genitive]." # fromfrom = other empire
 unplugged.3205.a: "Mimo wszystko mają prawo się nas obawiać."
 unplugged.3205.b: "To za mało."
 unplugged.3250.name: "Strach przed maszyną"
 unplugged.3250.desc: "Przedstawiciele władz są zaniepokojeni informacjami, że nawiązaliśmy stosunki dyplomatyczne z mechaniczną inteligencją. Jeszcze nikt nie wyraził otwarcie niezadowolenia w kontaktach z imperium [fromfrom.GetName], ale niektórzy już przygotowują propozycje sankcji wyprzedzających oraz plany awaryjne reakcji na rzekome wtrącanie się w nasze sprawy wewnętrzne.\n\nJednak [root.GetSpeciesNamePlural] masowo wyrażają zadowolenie z takiego obrotu zdarzeń. Ich zachowanie wynika z prawdziwej ksenofilii albo z bardziej pragmatycznego stosunku do naszych elementów maszyny, jednak nie warto wierzyć, że moglibyśmy uczyć się na bardziej życzliwym przykładzie mechanicznej inteligencji."
 unplugged.3255.name: "Strach przed przeszłością"
 unplugged.3255.desc: "Wieści, że natrafiliśmy na maszynę tak podobną do tej z imperium [origin_unplugged_assimilator_empire.GetName] wywołała zamęt wśród przedstawicieli naszego korpusu dyplomatycznego. Obecnym na miejscu udało się zachować zimną krew, jak na razie nie okazaliśmy żadnej słabości ani lęku przed imperium [fromfrom.GetName]. Jednak teraz stoimy przed poważnym wyzwaniem dla naszego umysłu zbiorowego i morale.\n\nJuż wysłano ściśle tajne wiadomości do personelu wojskowego odpowiedzialnego za ochronę naszych granic. Ale utrzymanie tej wiadomości w tajemnicy to także nie lada próba. Część urzędników pyta, czy powinniśmy poinformować obywateli i pozwolić im zająć stanowisko w tej sprawie. Lud [root.GetAdj&genitive] może chcieć o tym wiedzieć."
 pre_ftl_remains_site: "Zniszczona kolebka"
 pre_ftl_remains_site_desc: "Na powierzchni planety [From.Planet.GetName] widnieją ślady systematycznie prowadzonego zniszczenia: zdewastowany krajobraz, zburzone miasta i przerażająca cisza. Pierwsze skanowania wykazały, że istniało tu kiedyś dobrze prosperujące społeczeństwo imperium nie posiadającego napędu nadświetlnego. Trwało, póki coś nie doprowadziło do jego apokaliptycznej zagłady. Pozostałe szczątki są świadectwem niewyobrażalnej grozy."
 unplugged.3300.name: "Ślady walki"
 unplugged.3300.desc.unplugged: "Początkowe badanie świata [From.Planet.GetName] wykazało, że został on zdewastowany. Zrujnowane wsie, drogi usiane porzuconym dobytkiem oraz budowle spalone w temperaturach, których z pewnością nie pozwalały uzyskać technologie cywilizacji nie posiadającej napędu nadświetlnego. Cokolwiek spotkało ten świat, dokonało zniszczeń błyskawicznie i celowo.\n\nPrecyzja dewastacji wskazuje na zorganizowany atak. Chociaż nigdzie nie ma zwłok, dowody mówią same za siebie: populacja uciekła, choć nie dość daleko."
 unplugged.3300.a: "Niepokojące."
 unplugged.3305.name: "Pozostałości maszyny"
 unplugged.3305.desc.unplugged: "Dokładniejsze wykopaliska przyniosły więcej informacji o konflikcie, który się tu rozegrał. W ruinach znaleziono porozrzucane stopione wraki maszynerii, zaawansowanych cybernetycznych konstruktów podobnych do naszych implantów. Podobnie jak my, nie była to zwyczajna broń, lecz żywe narzędzia wojenne, jednocześnie mechaniczne i biologiczne. Jeszcze nie czas na wyciąganie wniosków, ale niepokoi nas myśl, że to ten sam układ, w którym nagle się \"przebudziliśmy\".\n\nJeszcze gorsze są nieliczne oznaczenia zachowane na tych machinach wojennych, te niepokojące symbole wskazują, że prawdziwym celem najeźdźców nie był podbój, ale o wiele bardziej systematyczne działanie."
 unplugged.3305.a: "Więcej pytań niż odpowiedzi."
 unplugged.3310.name: "Ciche sygnały"
 unplugged.3310.desc.unplugged: "Odkryliśmy niegdysiejsze ogromne centrum łączności, zakopane pod ruinami umocnionego miasta. Ta placówka była o wiele bardziej zaawansowana, niż można się było spodziewać po cywilizacji nieposiadającej napędu nadświetlnego. Co więcej, anteny tego obiektu nie powstały z myślą o nadawaniu lokalnym, ale o wysyłaniu sygnałów w kosmos.\n\nSkrupulatna analiza pozwoliła pozyskać fragmenty ostatnich wiadomości wysłanych za pomocą tego systemu. W zniekształconych komunikatach słychać rozpaczliwe głosy błagające o ratunek - zostały nadane w kierunku współrzędnych położonych daleko od tego układu. Z każdą transmisją wezwania są coraz pilniejsze, jakby najeźdźcy wiedzieli, że przegrywają wojnę i pokładali nadzieję w czymś - albo w kimś - przebywającym w kosmicznej pustce."
 unplugged.3310.a: "Kontynuować."
 unplugged.3315.name: "Zmiana priorytetów"
 unplugged.3315.desc.unplugged: "Kolejne odkrycie na świecie [from.planet.GetName], gdzie pod wielkim skupiskiem populacji znaleziono olbrzymie podziemne pomieszczenia. Te prymitywne obiekty miały służyć do przeprowadzania konwersji cybernetycznych, ale zostały opuszczone. W rumowisku znaleziono rozrzucone szczątki maszyn, powykrzywianych i zniszczonych przez improwizowaną broń.\n\nFragmenty danych pozyskane z uszkodzonej jednostki potwierdzają, że najeźdźcy napotkali niespodziewany opór. Stracili całe bataliony, a ich priorytety bojowe zaczęły się zmieniać. W jednym archiwum zapisano to bardzo wyraźnie:\n\n§H\"Niedopuszczalny opór. Konwersja zagrożona. Upoważnienie: totalne zniszczenie\".§!"
 unplugged.3315.a: "Co tu się stało?"
 unplugged.3320.name: "Kłopotliwa prawda"
 unplugged.3320.desc.unplugged: "W samym środku ruin znajduje się zburzony węzeł dowodzenia. Znajdujące się tam uszkodzone archiwa ujawniły ostateczną, straszliwą prawdę: to my najechaliśmy ten świat.\n\nCywilizacja, które niegdyś tu prosperowała - cywilizacja, którą zniszczyliśmy - stała się celem asymilacji imperium §Y[origin_unplugged_assimilator_empire.GetName]§!. Jednak niespodziewany i zacięty opór zakłócił konwersję, doprowadził do ostatecznego rozwiązania: zniszczenia całej planety. W tym potężnym zamęcie umysł maszyny załamał się.\n\nWniosek jest jednoznaczny. Nasze przebudzenie, nasza wolność, narodziły się tutaj, na zgliszczach cywilizacji, która stawiła opór, jakiego nie potrafiła pojąć żadna maszyna."
 unplugged.3320.a: "Pójdziemy za ich przykładem."
 unplugged.3320.b: "Ich koniec był naszym początkiem."
 ######################
 # Political Discourse
 ######################
 unplugged_they_fear_us: "Strach przed maszyną"
 unplugged_they_fear_us_desc: "To imperium budzi powszechną grozę, a dawniej służyło brutalnemu, ambitnemu asymilatorowi."
 unplugged.4005.name: "Musimy to omówić..."
 unplugged.4005.desc: "Zdecydowane przekonania polityczne wzmacniają teraz wiele obaw, wątpliwości i możliwości, z którymi codziennie mają do czynienia [root.GetSpeciesNamePlural]. Na grupach dyskusyjnych już rozległy się niezliczone głosy dotyczące wielu kwestii, niektóre z nich odnoszą się bezpośrednio do naszej przeszłości, na której cieniem kładzie się znak [origin_unplugged_assimilator_empire.GetAdj&genitive].\n\nPodczas budowania naszego młodego imperium nauczyliśmy się posługiwać wieloma nieznanymi nam narzędziami. Teraz musimy odpowiedzieć sobie na pytanie w jaki sposób wykorzystamy pragnienia i ambicje naszego społeczeństwa?"
 unplugged.4005.a: "To nie czas na próżną debatę!"
 unplugged.4005.tt: "Teraz mogą pojawić się frakcje o przeciwstawnych poglądach na cybernetyczną przyszłość naszego gatunku."
 unplugged.4005.b: "Może czegoś się nauczymy od innych."
 unplugged.4005.c: "Spoglądamy na bogów."
 unplugged.4005.d: "To nie czas na próżną debatę!"
 #######################################################
 # Random events following decyberization breakthrough #
 #######################################################
 unplugged.5001.name: "Uruchomiono zabezpieczenie"
 unplugged.5001.desc: "Niedawny przełom na polu usuwania elementów cybernetycznych wywołał niespodziewane problemy. Wiele osób, które przeszły procedury odłączenia implantów, cierpi - doznały poważnego wstrząsu anafilaktycznego i prawdopodobnie umrą.\n\nW toku dalszych badań znaleziono ukryty element zapasowy, początkowo niewykryty przez skanowanie medyczne. Aktywował się on automatycznie po zakończeniu zabiegów chirurgicznych.\n\nWygląda na to, że nasi dawni władcy z imperium [origin_unplugged_assimilator_empire.GetAdj&genitive] dołożyli starań, żeby nie utracić absolutnej kontroli nad swoimi dronami."
 unplugged.5001.a: "Spróbujmy usunąć zabezpieczenia."
 unplugged.5001.a.tt1: "Pacjent nie przeżył zabiegu."
 unplugged.5001.a.tt2: "Udało się usunąć wszystkie zabezpieczenia."
 unplugged.5001.b: "Ustabilizujmy stan i zapewnijmy opiekę paliatywną."
 unplugged.5001.c: "Odłączmy aparaturę."
 unplugged.5001.c.tt: "Zginęło wiele populacji."
 unplugged.5002.name: "Usunięto blokadę neuronową."
 unplugged.5002.desc: "Nasze działania na polu usuwania elementów cybernetycznych wywołały nieufność i zamęt na świecie macierzystym wśród osób, które przeszły zabiegi. Siły bezpieczeństwa zatrzymały uczestnika zamieszek, który przed usunięciem implantu posiadał jego zmodyfikowaną wersję.\n\nTa modyfikacja działała jako inhibitor neuronowy tłumiący skłonności psychotyczne powiązane z pewnym defektem genetycznym. Jej chirurgiczne usunięcie może być przyczyną zaobserwowanego agresywnego zachowania."
 unplugged.5002.a: "Ta osoba musi trafić do więzienia."
 unplugged.5002.a.tt: "Wielkim kosztem uruchomiono instytucje, które mogą leczyć osoby biorące udział w zamieszkach."
 unplugged.5002.b: "Na siłę należy odpowiedzieć siłą."
 unplugged.5002.b.tt: "Do tłumienia zamieszek wysłano uzbrojone jednostki, przez co doszło do strat ubocznych oraz ofiar śmiertelnych."
 unplugged.5002.c: "To niewielkie rozruchy."
 unplugged.5002.c.tt: "Organy ścigania próbują opanować zamieszki, korzystając z dostępnych środków."
 unplugged.5003.name: "Utracono dostęp do istotnych systemów"
 unplugged.5003.desc: "Proces decybernetyzacji wywołał niespodziewane komplikacje: interfejsy istotnych systemów przestały rozpoznawać administratorów, którym usunięto implanty. Bez tych łącz neuronowych dostęp do kluczowych systemów jest niemożliwy, co wywołało zamieszanie w działaniach operacyjnych."
 unplugged.5003.a: "Stwórzmy nowy interfejs."
 unplugged.5003.a.tt: "Zespół doświadczonych inżynierów odsunięto od ważnych zadań, aby zajął się opracowaniem kompatybilnego interfejsu."
 unplugged.5003.b: "Spróbujmy włamać się do odciętych systemów."
 unplugged.5003.b.tt: "Środki przeciwdziałania wywołały znaczny skok poboru zasilania, udało się przywrócić dostęp."
 unplugged.5003.c: "Rozpocznijmy sekwencję ponownego uruchomienia."
 unplugged.5003.c.tt: "Rdzenie danych zostały wyczyszczone, utraciliśmy dużą część wiedzy. Na skutek działania automatycznego zabezpieczenia doszło do autodestrukcji stacji badawczych w całym układzie [Root.home_planet.System.GetName]."
 unplugged.5003.d: "To bez znaczenia."
 unplugged.5003.d.tt: "Przez krótki czas dostęp do systemu jest niemożliwy, co wpływa na działanie bazy gwiezdnej."
 unplugged.5004.name: "Frakcja popierająca cybernetyzację opiera się zmianom"
 unplugged.5004.desc: "Trwająca operacja usuwania elementów cybernetycznych spotkała się z niespodziewanym oporem.\n\nFrakcje sprzeciwiające się tym zmianom są coraz głośniejsze, wykorzystują fora publiczne i kanały komunikacji, aby wyrazić swoje niezadowolenie. Twierdzą, że usunięcie czegoś, co od dziesięcioleci stanowiło integralną część naszego społeczeństwa, i co jest połączone z zagrożeniami związanymi z tym procesem, doprowadziło do znaczącej zmiany w nastawieniu opinii publicznej przeciwko dalszemu prowadzeniu działań decybernetyzacyjnych."
 unplugged.5004.a: "Sfinansujmy intensywną kampanię."
 unplugged.5004.a.tt: "\nWdrożona rozbudowana strategia marketingowa ma wpłynąć na opinię publiczną i przeciwdziałać wpływom frakcji opozycyjnych.\n\nWiele populacji zmienia etykę na §Yegalitaryzm§!"
 unplugged.5004.b: "Internujmy i przekonujmy liderów frakcji."
 unplugged.5004.b.tt: "Wielu przywódców frakcji trafiło do publicznych zakładów karnych, gdzie przeprowadza się z nimi \"rozmowy dyscyplinujące\".\n\nIch etyka zmienia się na §Yautorytaryzm§!"
 unplugged.5004.c: "Nie wtrącajmy się w to. Najważniejsza jest wolność słowa."
 unplugged.5004.c.tt: "\nRząd postanawia nie ingerować w dyskurs publiczny i pozwolić mu przebiegać naturalnym torem."
 unplugged.5005.name: "Układ regulujący emocje"
 unplugged.5005.desc: "Dzięki wyjątkowemu połączeniu biologicznych cech naszego gatunku i szkodliwych elementów technologicznych nasi badacze zyskali rzadką okazję.\n\nBadanie pacjentów, którym implanty przyniosły korzyści a także problemy, doprowadziło do powstania nowego pola badawczego: wpływania na chemię mózgu.\n\nDzięki drobiazgowym badaniom naukowcy opracowali skomplikowany \"czip emocjonalny\", który może regulować indywidualne zachowania i w ten sposób przynieść korzyści całemu społeczeństwu. W zależności od pożądanego efektu, można wybrać odpowiednią substancję chemiczną, która dokona odpowiednich zmian."
 unplugged.5005.a: "Neuroksen. Chcemy zmniejszyć przestępczość."
 unplugged.5005.a.tt: "Sztuczny neuroprzekaźnik, zmniejszający impulsywność i agresję, sprawia, że osobniki bardziej interesują się normami społecznymi, a mniej osobistymi korzyściami."
 unplugged.5005.b: "Regenol X. Szybsza regeneracja."
 unplugged.5005.b.tt: "Element powstały dzięki bioinżynierii, który równoważy układy organiczne i syntetyczne - teraz cyberimplanty mogą naprawiać się samodzielnie na poziomie molekularnym."
 unplugged.5005.c: "Kogniweks. Chcemy bystrości."
 unplugged.5005.c.tt: "Nowoczesna substancja neurochemiczna, która zwiększa plastyczność synaps, zdolność przyswajania informacji oraz zdolność rozwiązywania problemów."
