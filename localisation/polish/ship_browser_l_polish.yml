l_polish:
 SHIPSET_LABEL: "Zestaw okrętów"
 SHIPSETS_LABEL: "Zestawy okrętów"
 SHIP_GRAPHICS_PREVIEW: "Podgląd klas okrętów"
 SHIP_GRAPHICS_REQUIRED_DLC: "Wymagane DLC"
 SHIP_GRAPHICS_MISSING_DLC_TOOLTIP: "§GKliknij, aby obejrzeć wygląd okrętów§! ($CULTURE_NAME$)"
 SHIP_GRAPHICS_CAMERA_TRANSFORM_TOOLTIP: "£camera_zoom_in£ §GObróć rolkę myszy do przodu§!, aby powiększyć obraz.\n£camera_zoom_out£ §GObróć rolkę myszy do tyłu§!, aby pomniejszyć obraz.\n£camera_rotate£ Przytrzymaj §Gprawy przycisk myszy§! na modelu okrętu i przeciągaj myszą, by go obracać."
 SHIP_GRAPHICS_CORVETTE_DESC: "Korwety są pierwszą klasą okrętów wojennych dostępną dla imperiów. Są szybkie, zwrotne i tanie."
 SHIP_GRAPHICS_FRIGATE_DESC: "Fregaty to zaawansowane wersje korwet, wyspecjalizowane w walce torpedami. Są wolniejsze i mniej wytrzymałe, ale mogą być dużym zagrożeniem dla większych celów."
 SHIP_GRAPHICS_DESTROYER_DESC: "Niszczyciele są mniej zwrotne i wolniejsze niż korwety, ale za to mają większą siłę ognia oraz grubszy kadłub."
 SHIP_GRAPHICS_CRUISER_DESC: "Krążowniki są wszechstronne i wytrzymałe, zdolne zarówno do zadawania, jak i znoszenia dużych uszkodzeń."
 SHIP_GRAPHICS_BATTLESHIP_DESC: "Pancerniki są kosztowne, ale potężne. Dzięki dużemu zasięgowi broni świetnie sobie radzą z rażeniem przeciwnika, zanim ten będzie mógł kontratakować."
 SHIP_GRAPHICS_TITAN_DESC: "Okręty klasy Tytan są niezwykle potężne, ale mogą też używać aury służącej do wzmacniania sojuszniczych jednostek."
 SHIP_GRAPHICS_BIO_TITAN_DESC: "$SHIP_GRAPHICS_TITAN_DESC$"
 SHIP_GRAPHICS_JUGGERNAUT_DESC: "Budowa Behemota stanowi wielkie przedsięwzięcie dla dowolnego imperium. Jest to kolosalna jednostka, pełniąca funkcję ruchomej stoczni i okrętu wsparcia."
 SHIP_GRAPHICS_COLOSSUS_DESC: "Te wielkie okręty nie są przeznaczone do walki z wrogimi flotami, ponieważ ich rolą jest neutralizowanie całych światów."
 SHIP_GRAPHICS_OUTPOST_DESC: "Placówka jest najmniejszym rodzajem bazy gwiezdnej, a jej funkcja polega w zasadzie tylko na oznakowaniu zajęcia układu słonecznego."
 SHIP_GRAPHICS_STARBASE_CITADEL_DESC: "Cytadela to najwyższy możliwy do rozbudowania poziom bazy gwiezdnej. Jest wyposażona w rozległy system obronny i stanowi twardy orzech do zgryzienia dla wroga."
 SHIP_GRAPHICS_TRANSPORT_DESC: "Transportowce przewożą armie, które mają zdobywać wrogie planety podczas wojny. Są nieopancerzone i nieuzbrojone, więc podczas przelotu przez terytorium nieprzyjaciela trzeba zapewnić im eskortę floty wojennej."
 SHIP_GRAPHICS_SCIENCE_DESC: "Statki badawcze służą głównie do badania nowych układów słonecznych i anomalii. Jako jednostki cywilne są nieopancerzone i wrażliwe na ostrzał."
 SHIP_GRAPHICS_CONSTRUCTOR_DESC: "Statki konstrukcyjne są niezbędne do budowania stacji kosmicznych. Jako jednostki cywilne są nieopancerzone i wrażliwe na ostrzał."
 SHIP_GRAPHICS_COLONIZER_DESC: "Statki kolonizacyjne przewożą osadników z zasiedlonych planet na nowe światy przeznaczone do skolonizowania. Jako jednostki cywilne są nieopancerzone i wrażliwe na ostrzał."
 SHIP_GRAPHICS_SHIP_SIZE_LOCKED_DESC: "§RTa klasa statku wymaga posiadania DLC: $SHIP_SIZE_NAME$.§!"
 SHIP_GRAPHICS_ION_CANNON_DESC: "Potężna broń defensywna, strzelająca niszczycielskimi uderzeniami energii, które unieszkodliwiają wrogie statki. Powolna, choć silna, stanowi poważny element odstraszania wobec nieproszonych gości."
 SHIP_GRAPHICS_MILITARY_STATION_SMALL_DESC: "Platformy obronne to stacjonarne fortyfikacje orbitalne zaprojektowane z myślą o ochronie baz gwiezdnych przed wrogimi wtargnięciami."
 SHIP_GRAPHICS_STARBASE_DEEP_SPACE_CITADEL_1_DESC: "Stacja orbitalna stanowiąca pierwszą linię obrony w układzie. Zaprojektowana z myślą o demonstracji siły i zabezpieczaniu strategicznych lokalizacji."
 SHIP_GRAPHICS_STARBASE_DEEP_SPACE_CITADEL_2_DESC: "Zaawansowana forteca najeżona bronią i systemami obronnymi. Wzmocniona z myślą o długich starciach, stanowi bazę dla operacji floty w spornej przestrzeni."
 SHIP_GRAPHICS_STARBASE_DEEP_SPACE_CITADEL_3_DESC: "Ta olbrzymia stacja, szczytowe osiągnięcie w zakresie fortyfikacji kosmicznych, jest niezdobytym szańcem zdolnym do przetrwania pełnoskalowych ataków, a przy tym sprawowania całkowitej kontroli nad logistyką w układzie."
 SHIP_SIZE_SELECTOR_LOC: "SHIP_GRAPHICS_$SIZE$_DESC"
 SHIPSETS_DESCRIPTION_LABEL: "Opis"
 SHIP_GRAPHICS_NANITE_SWARMER_DESC: "Szybki, nietypowo poruszający się pojazd szturmowy złożony z samoreplikujących się nanitów. Nie posiada typowych pilotów - to autonomiczne roje, które przytłaczają wroga swoją liczebnością i niszczą jego defensywę z bezlitosną precyzją."
 SHIP_GRAPHICS_NANITE_INTERDICTOR_DESC: "Adaptatywny pojazd szturmowy złożony z samoreplikujących się nanitów. Zakłócacz priorytetyzuje kontrolę nad chaosem. Te autonomiczne konstrukty funkcjonują spójnie jako jednostka. Przechwytują i neutralizują zagrożenia z niepokojącą wręcz skutecznością, niszcząc wrogie formacje przez skoordynowane zaburzanie ich działalności i niezmordowany pościg."
 SHIP_GRAPHICS_CRISIS_CORVETTE_DESC: "Korwety kryzysowe stworzono z myślą o szybkim reagowaniu i przytłaczaniu wroga liczebnością. Są silniejsze niż zwykłe korwety i budzą lęk w tych, którzy ośmielają się stawić czoła nadchodzącej burzy."
 SHIP_GRAPHICS_CRISIS_DESTROYER_DESC: "Potężnie uzbrojony okręt wojenny zaprojektowany z myślą o bezwzględnej skuteczności. Jest większy i bardziej wytrzymały niż korwety - zapewnia przytłaczającą siłę ognia, utrzymując przy tym szybkość, która pozwala ścigać uciekających wrogów."
 SHIP_GRAPHICS_CRISIS_CRUISER_DESC: "Potężny okręt wojenny równoważący siłę ognia, wytrzymałość i strategiczną dominację. Ciężko uzbrojony i wytrzymały, służy jako fundament szykujących się do boju wojsk i przełamuje linie wroga z niezłomną siłą."
 SHIP_GRAPHICS_STAR_EATER_DESC: "Ta potężna jednostka zdolna jest do niszczenia całych gwiazd - wywołuje niszczące całe układy supernowe. To nie tylko okręt wojenny. Pożeracz gwiazd jest heroldem końca galaktyki, a na swojej ścieżce pozostawia tylko wyzutą z życia pustkę."
 SHIP_GRAPHICS_COSMO_CRISIS_DESTROYER_DESC: "Zwinny okręt wojenny przesycony kosmiczną energią, uderzający z precyzją i niezłomną siłą. To nie tylko jednostka, lecz także herold nowej rzeczywistości."
 SHIP_GRAPHICS_COSMO_CRISIS_BATTLECRUISER_DESC: "Niezwykła fuzja nauki i przeznaczenia, niosąca niszczycielską siłę ognia. Ten okręt przekształca pola bitew, podobnie jak jego dowódcy przekształcają gwiazdy."
 SHIP_GRAPHICS_COSMO_CRISIS_TITAN_DESC: "Niebańska machina wojenna promieniująca mocą nadciągającej transformacji. Sama jej obecność zakrzywia rzeczywistość i zwiastuje świt odrodzonego wszechświata."
 SHIP_GRAPHICS_OFFSPRING_CORVETTE_DESC: "$SHIP_GRAPHICS_CORVETTE_DESC$\n\n$OFFSPRING_SHIP_DESC$"
 SHIP_GRAPHICS_OFFSPRING_DESTROYER_DESC: "$SHIP_GRAPHICS_DESTROYER_DESC$\n\n$OFFSPRING_SHIP_DESC$"
 SHIP_GRAPHICS_OFFSPRING_CRUISER_DESC: "$SHIP_GRAPHICS_CRUISER_DESC$\n\n$OFFSPRING_SHIP_DESC$"
 SHIP_GRAPHICS_OFFSPRING_BATTLESHIP_DESC: "$SHIP_GRAPHICS_BATTLESHIP_DESC$\n\n$OFFSPRING_SHIP_DESC$"
