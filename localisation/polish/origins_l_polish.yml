 NAME_Zroni_Legacy_3_Planet: "Narei"
 # Names
 NAME_Shroud_Creatures: "Stworzenia z Woalu"
 # Armies
 shroud_monstrosities: "Istota nie z tego świata"
 shroud_monstrosities_desc: "Oglądanie tych istot na polu bitwy może doprowadzić do szaleństwa, ich postacie wiją się i rozbłyskują, ciągle się zmieniają, nigdy nie trwają w miejscu."
