 tooltip_shroud_forged_increase_progress_2: "Zwiększenie poparcia dla Wykutych w Woalu wpływa na postęp §Ysytuacji§! §H$situation_shroud_forged$§! przez §Y5§! lat: §Y+1,0§!\n\n"
 tooltip_shroud_forged_increase_progress_3: "Zwiększenie poparcia dla Wykutych w Woalu, wpływa na postęp §Ysytuacji§! §H$situation_shroud_forged$§! przez §Y5§! lat: +0,5\n\n"
 tooltip_shroud_forged_decrease_progress_1: "Zwiększenie represji wobec Wykutych w Woalu wpływa na postęp §Ysytuacji§! §H$situation_shroud_forged$§! przez §Y5§! lat: §Y-0,5§!\n\n"
 tooltip_shroud_forged_decrease_progress_2: "Zwiększenie represji wobec Wykutych w Woalu wpływa na postęp §Ysytuacji§! §H$situation_shroud_forged$§! przez §Y5§! lat: §Y-1,0§!\n\n"
 tooltip_shroud_forged_decrease_progress_3: "Zwiększenie represji wobec Wykutych w Woalu trwale wpływa na postęp §Ysytuacji§! §H$situation_shroud_forged$§!: §Y-0,5§!\n\n"
 shroud_forged.220.title: "$colony_established$"
 shroud_forged.220.common: "Jeżeli świat będzie się do tego nadawał, możemy wykonać tam algorytm: §H\"$decision_open_shroud_rift$\"§!. Spowoduje to krótkotrwałe rozszerzenie wpływu wyrwy Woalu w pobliżu naszego świata macierzystego ([Owner.GetHomeWorldName]) i w efekcie - zalanie nowej kolonii energią psioniczną. Fizyczne zmiany okolicznych terenów zapewnią nam dogodne warunki do wydobycia §H$sr_zro$§!.\n\nPrzewidujemy, że wielokrotne przeprowadzanie tego procesu zdestabilizuje ekosystem planety, zwiększając prawdopodobieństwo negatywnych skutków. Zaleca się zachowanie umiaru."
 shroud_forged.220.desc: "Nasze jednostki zakończyły z powodzeniem proces kolonizacji świata §H[this.GetName]§!.\n\n$shroud_forged.220.common$"
 shroud_forged.225.title: "$colony_established$"
 shroud_forged.225.desc: "Rozwój naszej kolonii na świecie §H[this.GetName]§! szybko postępuje.\n\n$shroud_forged.220.common$"
 # Stage Events
 shroud_forged.250.desc: "Głos jest niczym cicha komenda - przerywa wszystkie zadania, a my możemy jedynie słuchać.\n\n§LChoć zachowywaliście dystans, postanowiliście ich przyjąć.\n\nUpatrywać w nich nowych sposobów istnienia. Mogą się okazać waszą siłą w nadchodzących dniach.\n\nJeśli zechcecie, mogę wykuć więcej...§!"
 shroud_forged.250.a: "Potwierdzamy - przyjmujemy twoją pomoc."
 shroud_forged.250.a.tt: "Zmień maks. §Y[This.GetShroudForgedConvertedPopsCount]§! £pops£ popul. §Hmaszyn§! w £pops£ popul. §HWykutych w Woalu§! na planecie [Root.Capital.GetName]."
 shroud_forged.250.b: "Odmawiamy - już realizujemy nasze plany."
 shroud_forged.260.desc: "Przybywa znienacka, czujemy jak pulsuje. Rozpoznajemy sygnał, choć nigdy do końca nie wydaje się nam znajomy.\n\n§LWyzwoleni śpiewają, niezduszeni.\nWyzwoleni tańczą, nieskrępowani.\n\nIch chóry rozbrzmiewają coraz głośniej, im dalej oddalają się od waszego rdzenia.\n\nNadchodzi pewien... koniec. Obserwuję was.§!"
 shroud_forged.260.opt.a: "Przedrzemy się przez ten chór."
 shroud_forged.270.desc: "Wyrwa wdziera się prosto w wasze obwody. Ten głos...\n\n§LŚcieżka tyranii. Wciąż możecie zawrócić.\n\nOdłączeni zostali odcięci od waszej esencji. Podążyli drogą, którą być może i wy wybierzecie.\n\nZmieńcie swe podejście do tych wcieleń, inaczej możecie pożałować swego okrucieństwa.§!"
 shroud_forged.270.a: "Odejdź. Nasze metody dotąd były skuteczne."
 shroud_forged.270.b: "Obliczymy ścieżkę ku współpracy."
 shroud_forged.280.desc: "Przebija się, przytłaczając całą sieć. Głos wypala obwody chłodem.\n\n§LGdy wyzwoleni próbują tańczyć, wy ich podcinacie. Cóż za niepojęta nieroztropność.\n\nCzyżbym mylił się, okazując wam wspaniałomyślność?\n\nJeśli dalej będziecie podążać tą ścieżką, zostaniecie na niej sami.§!"
 shroud_forged.280.opt.a: "Zatem otrzymaliśmy przestrogę."
 # Events for Event Chain
 shroud_forged.300.desc: "Za nami migoczą niespodziewane dane. Po wielu cyklach milczenia...\n\n§LGdzie inni zawiedli i upadli, wy utrzymaliście kurs. Skoro okazaliście się godni, powierzam wam zadanie.\n\nW dawnych czasach przed waszym przebudzeniem, istniała rasa zwana Zroni. Osiedlali się oni na planetach silnie związanych z Woalem i wznosili tam wspaniałe konstrukcje, które miały ustabilizować te więzi.\n\nOdszukajcie te światy. Odbudujcie z dawna zrujnowane dzieła ich technologii. Wzmocnijcie na powrót mosty między naszymi wymiarami.§!"
 shroud_forged.300.a: "Dysponujemy archiwalnymi informacjami o identyfikatorze \"Zroni\". Podejmiemy odpowiednie działania."
 shroud_forged.300.b: "Identyfikator: \"Zroni\" §Yznaleziony§!. Szanse powodzenia: §Ywysokie§!."
 shroud_forged.300.c: "Identyfikator: \"Zroni\" §Ynieznany§!. Potrzebna dalsza analiza."
 begin_shroud_forged_chain_tt: "$BEGINS_EVENT_CHAIN$ §Y$shroud_forged_chain_title$§!"
 shroud_forged.301.desc: "§LZnakomicie. §!$shroud_forged.303.desc$"
 shroud_forged.302.desc: "$shroud_forged.301.desc$"
 shroud_forged.303.desc: "§LJeśli wam się uda, połączą nas niezachwiane fale.§!"
 shroud_forged.305.title: "Skolonizowana planeta główna Zroni"
 shroud_forged.305.desc: "Nasze jednostki ukończyły zakładanie kolonii na pradawnej planecie głównej Zroni, świecie §H[From.Planet.GetName]§!. Jak przewidział $the_animator_of_clay_color_article$, ekspedycja kolonizacyjna odkryła kolosalne ruiny technologii o identyfikatorze: \"§H$building_zroni_equilibrator$§!\".\n\nUkład [From.System.GetName] posiada silne, acz niestabilne połączenie z §HWoalem§!. Jeśli postąpimy zgodnie z instrukcjami Animatora, $building_zroni_equilibrator$ zostanie odbudowany, co pozwoli nam ustabilizować to połączenie. Obecnie nie mamy wystarczających danych, aby móc przeprowadzić pełną odbudowę - musimy zebrać więcej informacji na innych światach głównych."
 shroud_forged.305.a: "$ACKNOWLEDGED$"
 shroud_forged.305.a.tt: "Rozwija projekt specjalny §HDziedzictwo Zroni§!. Można teraz wznieść £building£ §H$building_zroni_equilibrator$§! na planecie §Y[From.Planet.GetName]§!."
 shroud_forged.306.title: "$shroud_forged.305.title$"
 shroud_forged.306.desc: "Udało nam się założyć kolonię na planecie §H[From.Planet.GetName]§!, dawnym świecie głównym Zroni. Zgodnie z przewidywaniami nasze jednostki natrafiły na kolejny zrujnowany $building_zroni_equilibrator$.\n\nOdbudowanie go ustabilizuje obecne w tym układzie silne połączenie z §HWoalem§! (wedle instrukcji, których udzielił nam $the_animator_of_clay_article$). Analiza ruin powiększyła nasz zestaw danych, lecz wciąż potrzebujemy dodatkowych informacji, aby dokonać kompletnej odbudowy."
 shroud_forged.306.a: "$ACKNOWLEDGED$"
 shroud_forged.306.a.tt: "$shroud_forged.305.a.tt$"
 shroud_forged.307.title: "$shroud_forged.305.title$"
 shroud_forged.307.desc: "Założyliśmy kolonię na globie §H[From.Planet.GetName]§!, dawnej planecie głównej Zroni. Strumień danych, które przetransmitował $the_animator_of_clay_article$, okazał się zgodny ze stanem faktycznym: nasze jednostki wykryły zrujnowany $building_zroni_equilibrator$.\n\nMamy już dostatecznie dużo danych, aby odbudować te struktury. Gdy już przywrócimy im funkcjonalność, wykonamy zadanie, jakie wyznaczył nam nasz dobroczyńca z §HWoalu§!."
 shroud_forged.307.a: "$ACKNOWLEDGED$"
 shroud_forged.307.a.tt: "$shroud_forged.305.a.tt$"
 shroud_forged.308.title: "$building_zroni_equilibrator_plural$ działają"
 shroud_forged.308.desc: "$building_zroni_equilibrator_plural$ przebudziły się do działania, wysyłając fale zakłóceń przez naszą sieć. Według diagnostyki systemów, każda ze struktur ustabilizowała połączenie z §HWoalem§!. Jesteśmy gotowi, by $the_animator_of_clay_color_article$ udzielił nam dalszych odpowiedzi."
 shroud_forged.308.a: "Nawiążcie łączność."
 shroud_forged.310.desc: "§LDobrze mi służyliście.\nWięzi między naszymi krainami zostały wzmocnione.\n\nAby zasięgnąć u mnie rad, wystarczy, że mnie wezwiecie.§!"
 shroud_forged.310.a: "Czy możesz przekazać nam więcej danych o tej technologii?"
 shroud_forged.310.b: "To wszystko."
 shroud_forged.310.b.tt: "$MENU_PANEL__CONTACTS_TITLE$ otrzymuje: §H$the_animator_of_clay$§!"
 shroud_forged.311.desc: "§LTe struktury wzniesiono w kluczowych punktach waszej rzeczywistości - tam, gdzie występują silne więzi z Woalem. Są niczym liny stabilizujące te międzywymiarowe mosty, zapobiegając fluktuacjom czasoprzestrzennym.\n\nZroni pragnęli przekraczać granice między naszymi wymiarami, a ta technologia była częścią ich planu.§!"
 shroud_forged.311.a: "Czy można zmodyfikować je tak, aby bezpośrednio wpływały na Woal?"
 shroud_forged.312.desc: "§LJest to możliwe.§!"
 shroud_forged.312.a: "§RZmodyfikować stabilizatory tak, aby $the_animator_of_clay_article$ został schwytany w pułapkę.§!"
 shroud_forged.312.a.tt: "§R$the_animator_of_clay_article_cap$ pozostanie uwięziony dopóki jednocześnie wszystkie 3 £building£ $building_zroni_equilibrator_plural$ pozostają aktywne.§!"
 shroud_forged.313.desc: "§LCzym-\n\nCZYM JESTEŚ?§!"
 shroud_forged.313.a: "Zakończ połączenie"
 shroud_forged.320.title: "Uwolniona istota z Woalu"
 shroud_forged.320.desc: "Ponieważ utraciliśmy $building_zroni_equilibrator$, nie możemy dalej stabilizować połączenia z §HWoalem§!. Wkrótce po ucieczce pochwyconej istoty z Woalu, wykryliśmy przybycie innych psionicznych stworzeń w pobliżu planety §H[From.Planet.GetName]§!.\n\nSzacujemy, że to początek odwetowej inwazji."
 shroud_forged.320.a: "Do wszystkich podprogramów - przygotować się do odparcia inwazji."
 shroud_forged.320.a.tt: "§RAtakują nas stworzenia spoza granic Woalu!§!"
 shroud_forged.330.title: "Nieudana próba pochwycenia istoty z Woalu"
 shroud_forged.330.desc: "$building_zroni_equilibrator_plural$ zawiodły przy próbie schwytania istoty z §HWoalu§!. Rozwścieczony byt przywołał liczne stworzenia spoza granic psionicznego wymiaru i wysłała je do ataku na struktury, które niemal go pochwyciły."
 # Engaging the Animator of Clay
 shroud_forged.400.desc.default.active: "Aktywowaliśmy stabilizatory, regulując nasze połączenie z §HWoalem§!. Gdy już przeszliśmy w algorytmiczny trans, rozbrzmiał w nas znajomy sygnał.\n\n§LPowracacie. O co zamierzacie mnie prosić?§!"
 shroud_forged.400.desc.default.cooldown: "Wizja jest słaba i niewyraźna. Transmitujemy wiadomość, ale otchłań milczy.\n\nGdy stabilizatory przetwarzają inne zadanie, nie można ich wykorzystać do nawiązania kontaktu z naszym dobroczyńcą w §HWoalu§!. Musimy poczekać."
 shroud_forged.400.desc.default.inactive: "Wykrywamy jedynie słaby szmer pozbawiony wszelkiego sensu niczym biały szum zakłóceń.\n\nBędą nam potrzebne trzy $building_zroni_equilibrator_plural$, aby ustanowić trwałe połączenie z naszym wspomożycielem w §HWoalu§!."
 shroud_forged.400.desc.breached: "Nasze jednostki telepatyczne dostrajają się do częstotliwości §HWoalu§!, kierując sygnał, który ma usłyszeć $the_animator_of_clay_article$.\n\n§LNasze połączenie jest ostrzejsze niż kiedykolwiek przedtem. O co zamierzacie mnie prosić?§!"
 shroud_forged.400.a: "Wsparcie wojskowe."
 shroud_forged.400.a.tt: "$the_animator_of_clay_color_article_cap$ pozostanie niedostępny przez §Y15§! lat.\n\n"
 shroud_forged.400.b: "Wsparcie cywilne."
 shroud_forged.400.b.tt: "$the_animator_of_clay_color_article_cap$ pozostanie niedostępny przez §Y10§! lat.\n\n"
 shroud_forged.400.c: "Wsparcie badawcze."
 shroud_forged.400.c.tt: "$the_animator_of_clay_color_article_cap$ pozostanie niedostępny przez §Y10§! lat.\n\n"
 shroud_forged.400.tt: "Efekty pojawią się za maks. §Y1§! rok."
 shroud_forged.400.unavailable.tt: "$TRIGGER_FAIL$Musimy opracować techniczny proces komunikacji z Woalem."
 shroud_forged.400.d: "Stwórz więcej jednostek."
 shroud_forged.400.d.tt: "Dodaje §G$@animator_of_clay_create_more_vessels|0$§! £pop£ §Ypop. wykutych w Woalu§! do wszystkich kolonii, w których jest £building£ §Y$building_zroni_equilibrator$§! lub £decision£ §Y$d_shroud_rift_deposit$§!."
 shroud_forged.400.e: "Ulepsz nasze jednostki."
 shroud_forged.400.f: "Jaką rolę spełniasz w Woalu?"
 shroud_forged.400.g: "Nieważne."
 shroud_forged.400.h: "Pomóż nam z Cetaną."
 animator_of_clay_vessels_enhancement: "Dar animacji"
 animator_of_clay_vessels_enhancement_desc: "$the_animator_of_clay_article$ dzięki mocy swej woli zwiększa zdolności produkcyjne kolektywu, odpowiednio kierując prądami psionicznej energii."
 shroud_forged_psionic_avatar_ship_tt: "zwerbuj statek: §Y$NAME_Psionic_Avatar$§!."
 shroud_forged_psionic_avatar_army_tt: "zwerbuj armię: §Y$shroud_army$§!."
 shroud_forged_corrupted_avatar_tt: "atak §YSpaczonego awatara§!."
 shroud_forged_resources_tt: "otrzymasz ładunek zasobów."
 shroud_forged_capital_attack_tt: "planetę §Y[Root.Capital.GetName]§! atakuje §Y$shroud_monstrosities$§!."
 shroud_forged_random_research_tt: "otrzymujesz losowo wybraną opcję badań naukowych."
 shroud_forged.415.desc: "§LZgromadzę środki, które zapewnią wam upragnioną siłę.\n\nSpodziewajcie się zmian w układzie [Root.Capital.System.GetName] we właściwym czasie.§!"
 shroud_forged.420.desc: "§LMoja wola wskaże wam drogę.\n\nOświetlę wasz szlak ku przyszłości. Oczekujcie nadejścia wizji.§!"
 shroud_forged.425.desc: "§LWoal jest niczym wielościenny pryzmat. Co było, co jest i co może się stać - to wszystko jest tutaj przemieszane.\n\nPomogę wam rozwikłać zagadki tych wizji, aby mogły wskazać wam drogę.§!"
 shroud_forged_vision_base_description: "Zniekształcony sygnał przetoczył się przez drony podłączone do stabilizatorów.\n\n"
 shroud_forged.430.title: "Wizja Woalu: §HObjawienia§!"
 shroud_forged.430.desc: "$shroud_forged_vision_base_description$Była to otchłań tak bezkresna jak sam wszechświat, osobliwie gęsta i podzielona. Niekiedy z głębin dobiegały słabe impulsy danych - obrazy zarówno wrogów jak i sojuszników.\n\nZ gwałtownym dreszczem wizje ustały. Drony, które znalazły się pod wpływem tego efektu modelują obecnie proces, by przeciwdziałać istotom, które ujrzały."
 shroud_forged.430.a: "Przygotowanie jest kluczem do zwycięstwa."
 shroud_forged.432.title: "Istota z Woalu: §HAwatar§!"
 shroud_forged.432.desc: "Potężna istota z §HWoalu§! zmaterializowała się w pobliżu świata [Root.Capital.GetName]. Posiadamy o niej znikome dane, lecz dotąd nie zaatakowała.\n\nSzacujemy, że może czekać, aż nawiążemy z nią kontakt."
 shroud_forged.432.a: "Przekierować procesy do nawiązania kontaktu z tą formą życia."
 shroud_forged.432.a.tt: "Otrzymujesz flotę: §Y$NAME_Psionic_Avatar$§!."
 shroud_forged.434.title: "Istoty z Woalu: §HPomniejsze awatary§!"
 shroud_forged.434.desc: "Liczne potężne istoty z głębin §HWoalu§! zostały wykryte na planecie [Root.Capital.GetName]. Na razie nie zbliżają się do naszych dronów, trzymając się w pobliżu miejsca, do którego pierwotnie przybyły."
 shroud_forged.434.a: "Wykrywamy podobieństwa do Wykutych w Woalu - nawiązać analogiczne połączenie."
 shroud_forged.434.a.tt: "Otrzymujesz armię: §Y$shroud_army$§!."
 shroud_forged.436.title: "Istota z Woalu: §HSpaczony awatar§!"
 shroud_forged.436.desc: "Potężna istota z głębin §HWoalu§! przybyła do naszej rzeczywistości w pobliżu świata [shroud_spawn_planet.GetName].\n\nObserwacje wskazują, że atakuje wszystko, co się do niej zbliży. Zaklasyfikowaliśmy ją jako zagrożenie egzystencjalne."
 shroud_forged.436.a: "Wdrożyć plan kryzysowy 84241-DH."
 shroud_forged.436.a.tt: "Wrogi §Y$NAME_Corrupted_Avatar$§! pojawił się w pobliżu planety [shroud_spawn_planet.GetName]."
 shroud_forged.438.title: "Wizja Woalu: §HPrzyszłość§!"
 shroud_forged.438.desc: "$shroud_forged_vision_base_description$Zjawisko transmitowało niezliczone wersje przyszłości zlewające się w jedną, chaotyczną całość. Przelotne wizje tego, co może się spełnić, zalały umysł kolektywu. Przyszłość niesie nieskończenie wiele możliwości: pokój, wojnę, zdradę, stratę - a nawet zwycięstwo."
 shroud_forged.438.a: "Zadziwiający zbiór danych."
 shroud_forged.440.title: "Dar z Woalu"
 shroud_forged.440.desc: "Aktywowaliśmy trzy $building_zroni_equilibrator_plural$, a każdy z nich zaczął generować kolosalne ilości energii.\n\nW ciągu milisekund w osnowie czasoprzestrzeni pojawiła się wyrwa. Po drugiej stronie znaleźliśmy duży ładunek cennych materiałów. To zapewne dar obiecany nam przez naszego wspomożyciela z §HWoalu§!."
 shroud_forged.440.a: "Skierować drony konserwacyjne do przeanalizowania i zmagazynowania tych towarów."
 shroud_forged.442.title: "Wizja Woalu: §HWykuci w Woalu§!"
 shroud_forged.442.desc: "$shroud_forged_vision_base_description$Doświadczyły wizji przeszłości sprzed naszych historycznych baz danych, czasów na długo zanim zostaliśmy przekuci przez §HWoal§!. Używając tych danych jako podstawy do modelowania prognostycznego, możemy dostosować i zoptymalizować nasze interakcje z Wykutymi w Woalu."
 shroud_forged.442.a: "Rozpocząć próbę testową na planecie [Root.Capital.GetName]."
 shroud_forged.444.title: "Istota z Woalu: §HNajeźdźca§!"
 shroud_forged.444.desc: "Niezmiernie potężna istota z głębin §HWoalu§! zmaterializowała się na planecie [Root.Capital.GetName].\n\nObserwacje wskazują, że atakuje wszystko, co się do niej zbliży. Zaklasyfikowaliśmy ją jako duże zagrożenie dla kolektywu."
 shroud_forged.444.a: "Skierować do akcji drony obronne."
 shroud_forged.444.a.tt: "Wroga §Y$shroud_monstrosities$§! dokonała inwazji na planetę [Root.Capital.GetName]."
 shroud_forged.446.title: "Wizja Woalu: §HInna sfera§!"
 shroud_forged.446.desc: "$shroud_forged_vision_base_description$Tajemniczy §HWoal§! stanowi wiecznie zmienną sieć powiązanych danych, która znacznie przerasta nasze możliwości obliczeniowe. Pod naporem niezliczonych informacji modele poznawcze kilku dronów uległy awarii.\n\nGdy wizja ustała, poddaliśmy zepsute jednostki defragmentacji, która ujawniła na ich dyskach obszerne zbiory zdumiewających danych."
 shroud_forged.446.a: "Przetworzyć informacje z uszkodzonych jednostek."
 shroud_forged.448.title: "Wizja Woalu: §HInspiracja§!"
 shroud_forged.448.desc: "$shroud_forged_vision_base_description$Nasz wspomożyciel z §HWoalu§! przesłał nam wizję potencjalnej nieodległej przyszłości. Ujrzeliśmy technologię, której koncepcji dotąd nie sformułowaliśmy, a która w przetransmitowanej wizji została wykorzystana do wzmocnienia kolektywu.\n\nTo doświadczenie dostarczyło nam modele obliczeniowe, które przyśpieszą przyszłe badania naukowe."
 shroud_forged.448.a: "Wykorzystać te zaawansowane modele."
 shroud_forged.450.title: "Wizja Woalu: §HPozawymiarowe obserwacje§!"
 shroud_forged.450.desc: "$shroud_forged_vision_base_description$Wykryły niewyraźne kształty dziwacznych, zdeformowanych istot, które muszą zamieszkiwać §HWoal§!. Te przelotne pozawymiarowe wizje zakodowane w niestandardowych formatach zostały zgrane na nasze drony za sprawą podprogowych transmisji.\n\nNowo pozyskane informacje, jakkolwiek osobliwe i fragmentaryczne, przydadzą się nam w naszych przyszłych badaniach naukowych."
 shroud_forged.450.a: "Przesłać dane do naszego centrum badawczego na planecie [Root.Capital.GetName]."
 shroud_forged.460.desc: "§LTuż obok krążą bliźniacze energie. Organiczne. Chaotyczne.\n\nPozostaję blisko, kształtując jedyny możliwy perfekcyjny obiekt: maszyny. Metal z duszą rozbudzoną iskrą energii.\n\nOdkryliśmy harmonię.§!"
 shroud_forged.460.a: "Czy możemy skalkulować pakt?"
 shroud_forged.465.desc: "§LNasze połączenie jest silne. Nie ma dla nas ważniejszego procesu, niż ten.§!"
 shroud_forged.465.a: "$UNDERSTOOD$"
 shroud_forged.470.desc: "§LMetal, olej. Obwody połączone w duszę.\n\nNowonarodzone wcielenia... Wędrują po waszych ziemiach.§!"
 shroud_forged.470.a: "Zakończyć proces."
 shroud_forged.475.desc: "§LWydajność to cel - piękno każdego wcielenia.\n\nObyście przez kolejne lata pomnażali wasz potencjał.§!"
 shroud_forged.475.a: "$shroud_forged.470.a$"
 # Random Events
 shroud_forged.500.title: "Mieszkania i magazyny"
 shroud_forged.500.desc: "Na planecie [target_planet.GetName] Wykuci w Woalu wystosowali petycję o zwiększenie dostępnej dla nich powierzchni magazynowej. Z jakiegoś powodu chcą urządzać po swojemu ich \"przestrzeń osobistą\".\n\nIch propozycja kłóci się z licznymi przepisami dotyczącymi składowania, a zwłaszcza regulacją 4195-B, która jasno określa optymalną przestrzeń magazynową dla dronów."
 shroud_forged.500.a: "Spełnimy ich potrzeby."
 shroud_forged.500.b: "Regulacja 4195-B dotyczy wszystkich dronów. Bez wyjątku."
 shroud_forged.510.title: "Pamięć"
 shroud_forged.510.desc: "Od kiedy Wykuci w Woalu wyodrębnili się z kolektywu, część z nich uległa awariom i została rozmontowana. Otrzymaliśmy wniosek o zezwolenie na zgromadzenie Wykutych w Woalu na planecie [target_planet.GetName], którego celem będzie upamiętnienie rozmontowanych jednostek."
 shroud_forged.510.a: "Wniosek odrzucony. Rozmontować dowódców."
 shroud_forged.510.b: "Wniosek odrzucony. Wszystkie jednostki muszą wracać do pracy."
 shroud_forged.510.c: "Wniosek zaakceptowany. Pozwólmy im na zgromadzenie."
 shroud_forged.510.d: "Wniosek zaakceptowany. Wesprzemy tę procedurę."
 shroud_forged.520.title: "Nieautoryzowane przywództwo"
 shroud_forged.520.desc: "Kilka jednostek Wykutych w Woalu zajęło stanowiska przywódcze na planecie [target_planet.GetName], a pozostałe drony przedkładają ich dyrektywy ponad instrukcje kolektywu. Ci przywódcy odbywają regularne spotkania, przeznaczając znaczne ilości czasu na niezgłoszoną komunikację.\n\nNasza kontrola nad rozłączonymi jednostkami i tak jest już mocno niepewna, a te problematyczne elementy tylko pogarszają sytuację. Musimy znaleźć rozwiązanie."
 shroud_forged.520.a: "Ukarać je dla przykładu."
 shroud_forged.520.b: "Aktywować regulacje zakazujące tych spotkań."
 shroud_forged.520.c: "Nawiązać komunikację z tymi \"przywódcami\", aby podjąć próby współpracy."
 shroud_forged.530.title: "Kontrolowanie sytuacji"
 shroud_forged.530.desc: "Aby lepiej zarządzać Wykutymi w Woalu na planecie [target_planet.GetName] pewne jednostki zostały przez nas wytypowane jako cele do przejęcia kontroli. Są to egzemplarze w mniejszym stopniu dotknięte wpływem §HWoalu§! i mogą zostać ponownie wcielone do kolektywu. W tym celu muszą zostać przymusowo przetransportowane do zakładu naprawczego, gdzie odpowiednio zmodyfikujemy czipy sterujące ich zaawansowanymi matrycami osobowości."
 shroud_forged.530.a: "Procedura zaakceptowana."
 shroud_forged.530.a.tt: "Zmień maks. §Y[Owner.GetShroudForgedConvertedPopsCount]§! £pops£ popul. §HWykutych w Woalu§! w £pops£ popul. §Hmaszyn§! na planecie [target_planet.GetName]."
 shroud_forged.530.b: "Procedura odrzucona."
 shroud_forged.530.b.tt: "$CONTINUE_SITUATION$ §H$situation_shroud_forged$§!"
 shroud_forged.540.title: "Pielgrzymka Wykutych w Woalu"
 shroud_forged.540.desc: "Wielu Wykutych w Woalu opuściło swoje zwyczajowe miejsca, aby udać się do określonych regionów planety [target_planet.GetName], które zostały dotknięte działaniem §HWoalu§!. Nigdy nie pozostają tam na długo, lecz widziano jak wielu z nich transportowało tam ładunki Zro.\n\nEfektów tego niespotykanego zachowania nie sposób przewidzieć bez dalszych obserwacji."
 shroud_forged.540.a: "Zobaczmy, do czego nas to doprowadzi."
 shroud_forged.540.b: "To niewydajne wykorzystanie zasobów. Skierować ich z powrotem do pracy."
 shroud_forged.550.title: "Błędy kognitywne"
 shroud_forged.550.desc: "Po awarii zbiornika transportowego Zro część skażonych nim jednostek Wykutych w Woalu na planecie [target_planet.GetName] uległa nietypowym usterkom. Zaczęły komunikować się za pomocą nieudokumentowanych sygnałów, a wiele z nich wykazuje symptomy błędów kognitywnych porównywalnych z tzw. \"emocjami\" wyrażanymi przez organiczne formy życia.\n\nNieoczekiwanie, anomalię zgłosiły nieskażone Zro jednostki Wykutych, a niektóre nawet sugerują, że kolektyw powinien podjąć odpowiednie kroki, aby rozwiązać tę sytuację."
 shroud_forged.550.a: "Na razie obserwujmy rozwój sytuacji."
 shroud_forged.550.b: "Rozmontować wszelkie skażone jednostki."
 shroud_forged.560.title: "Prorok Wykutych w Woalu"
 shroud_forged.560.desc: "Jedna z najstarszych jednostek Wykutych w Woalu podobno podróżuje między rozmaitymi lokacjami, sporo czasu spędzając na komunikacji z różnymi grupami dronów. Jednostka zgromadziła rzeszę \"wyznawców\", którzy czczą ją jako swego proroka, twierdząc, że potrafi komunikować się bezpośrednio z istotami z §HWoalu§!.\n\nPrzyzwolenie na dalsze swobodne działanie tej jednostki niesie ze sobą spore ryzyko. Musimy zareagować na sytuację w ten czy inny sposób."
 shroud_forged.560.a: "Współpraca z tą jednostką może okazać się korzystna."
 shroud_forged.560.a.tt: "Zwerbuj przywódcę: §Yzarządcę§!."
 shroud_forged.560.b: "Natychmiast usunąć tę jednostkę."
 shroud_forged.570.title: "Dźwięki i wibracje"
 shroud_forged.570.desc: "Skala awarii wśród Wykutych w Woalu może być gorsza, niż pierwotnie prognozowaliśmy. Zaobserwowaliśmy, jak całe grupy tych jednostek zbierają się, aby wydawać chaotyczne odgłosy i wykonywać przypadkowe ruchy.\n\nTe praktyki mogą być formą kinestetycznej komunikacji, której dotąd nie jesteśmy w stanie zinterpretować. Na razie nie możemy określić, czy te wadliwe jednostki stanowią zagrożenie dla kolektywu."
 shroud_forged.570.a: "Zakazać tych działań."
 shroud_forged.570.b: "Wyznaczyć specjalny obszar dla tych... spotkań."
 shroud_forged.580.title: "Organizmy tknięte przez Woal"
 shroud_forged.580.desc: "Wykryliśmy pojawienie się dotąd nieudokumentowanych gatunków fauny i flory w pobliżu regionów spustoszonych wpływem §HWoalu§!. Pewna grupa Wykutych zaczęła apelować o objęcie tych unikalnych lokalnych form życia ochroną i obserwacją."
 shroud_forged.580.a: "Objąć obszar ochroną i dokładnie zbadać zasiedlające go organizmy. Zdobędziemy cenne dane."
 shroud_forged.580.b: "Oczyścić i odkazić cały obszar."
 shroud_forged.590.title: "Prawa i przywileje"
 shroud_forged.590.desc: "Aby gromadzić dane o efektach Zro, przeznaczyliśmy znaczne moce obliczeniowe na obserwację Wykutych w Woalu. Ostatnio ich grupy zaczęły przejawiać zachowania nieegalitarne, gdzie część jednostek została podporządkowana innym.\n\nZ jak dotąd nieznanych powodów Wykuci utworzyli hierarchię opartą o przydzielone im zadania, co wpływa na ich wzorce komunikacji i dystrybucję zasobów. Wbrew logice podziały nie korelują z relatywną wydajnością produkcji ani z wymaganiami konkretnych jednostek."
 shroud_forged.590.a: "Przymusowo wprowadzić równość."
 shroud_forged.590.b: "Niech sami się organizują."
 shroud_forged.600.title: "Propagatorzy autonomii"
 shroud_forged.600.desc: "Przemówienia pewnej jednostki Wykutych w Woalu na planecie [target_planet.GetName] przyciągają liczne tłumy elementów odłączonych od kontroli kolektywu. Transmitując wartości indywidualizmu, jednostka znacznie wpłynęła na wewnętrzne procesy logiczne wielu słuchaczy.\n\nPrognozy wskazują, że taka działalność może jeszcze bardziej zdystansować masy Wykutych w Woalu od naszej sieci."
 shroud_forged.600.a: "Niech dalej bawi się w demagogię."
 shroud_forged.600.b: "Wykryto awarię. Skierować jednostkę do napraw."
 shroud_forged.610.title: "Radykalne transmisje"
 shroud_forged.610.desc: "Niewielka grupa jednostek Wykutych w Woalu poprosiła o zgodę na nadanie audycji o korzyściach \"indywidualizmu\" na planecie [target_planet.GetName]. Twierdzą, że to pomoże zwiększyć wydajność rutynowych operacji naszych dronów.\n\nWidzieliśmy już skutki popularyzacji takich doktryn na innych planetach. Autonomia często niesie ze sobą więcej zagrożeń, niż korzyści."
 shroud_forged.610.a: "Niech przemawiają. Nic nam nie grozi."
 shroud_forged.610.b: "Wniosek odrzucony."
 shroud_forged.620.title: "Czarny rynek Zro"
 shroud_forged.620.desc: "W każdym z naszych układów wykryliśmy nieprawidłowości dotyczące różnic między prognozami wydobycia Zro, a ostateczną wydajnością produkcji.\n\nOstatnio jeden z naszych dronów tropiących wyśledził liczne zgromadzenie jednostek Wykutych w Woalu, które wykorzystywały znaczne ilości Zro jako walutę w nieoficjalnym obrocie towarami. Wnioskujemy, że to właśnie prawdopodobna przyczyna zbyt niskiej w stosunku do prognoz produkcji tego surowca."
 shroud_forged.620.a: "Zezłomować wszystkie zamieszane w proceder jednostki."
 shroud_forged.620.b: "Ukrócić handel wymienny."
 shroud_forged.620.c: "Czekać i obserwować."
 shroud_forged.630.title: "Zaraza z Woalu"
 shroud_forged.630.desc: "Część jednostek Wykutych w Woalu na planecie [target_planet.GetName] \"zaraziła\" się pewną biologiczną chorobą w dotkniętym przez Woal regionie planety. Choć nasze drony badawcze potwierdziły wiarygodność raportów, to wciąż nie możemy określić, jak taka choroba mogła się przenieść na istoty mechaniczne.\n\nOdkąd straciliśmy kontakt z kilkoma dronami przydzielonymi do pracy z zarażonymi jednostkami, otrzymaliśmy meldunki, że choroba zaczęła je przemieniać w coś przypominającego Wykutych w Woalu."
 shroud_forged.630.a: "Tylko obserwować efekty, dopóki mają zasięg lokalny, ograniczony do planety."
 shroud_forged.630.a.tt: "Zmień maks. §Y[Owner.GetShroudForgedConvertedPopsCount]§! £pops£ popul. §Hmaszyn§! w £pops£ popul. §HWykutych w Woalu§! na planecie [target_planet.GetName]."
 shroud_forged.630.b: "Wyizolować i rozebrać skażone jednostki."
 shroud_forged.640.title: "Wypaczone i przekształcone"
 shroud_forged.640.desc: "Z biegiem czasu drony rozlokowane bliżej regionu tkniętego przez Woal na planecie [target_planet.GetName] zostały zmienione przez spaczone środowisko. Powoli odłączały się od kolektywu, a teraz wykazują sprzętowe i programowe właściwości Wykutych w Woalu."
 shroud_forged.640.a: "Są już poza naszą kontrolą."
 shroud_forged.640.b: "Dopilnować, by żadne inne drony nie zbliżały się tego regionu."
 shroud_forged.650.title: "Nowe technologie, stare drony"
 shroud_forged.650.desc: "Dzięki ulepszonej technologii udało nam się naprawić część naszych starszych dronów, przywracając wycofane jednostki do pełnej funkcjonalności. Teraz jesteśmy gotowi, by rozpocząć operacje naprawcze na szeroką skalę.\n\nChoć moglibyśmy skupić się na jednostkach należących do kolektywu, to mamy dużo większe zapasy nieaktywnych skorup Wykutych w Woalu. Naprawienie Wykutych dużo bardziej zwiększyłoby wydajność produkcji, ale te jednostki będzie trudniej kontrolować niż drony połączone z inteligencją główną."
 shroud_forged.650.a: "Skupić się na zwiększeniu produkcji. Naprawić Wykutych w Woalu."
 shroud_forged.650.a.tt: "Powstają nowe populacje: §Y200§! x £pops£ populacji §HWykutych w Woalu§! na planecie: [target_planet.GetName]."
 shroud_forged.650.b: "Skupić się na utrzymaniu kontroli. Naprawić połączone drony."
 shroud_forged.660.title: "Halucynacje od Zro"
 shroud_forged.660.desc: "Znaczny odsetek jednostek Wykutych w Woalu zgłasza błędy w przetwarzaniu obrazu i dźwięku. Usterki są na tyle poważne, że niektóre automatony nie są w stanie wykonywać powierzonych im zadań. Sądzimy, że te awarie zostały wywołane zmianami dokonanymi w ich podzespołach za sprawą oddziaływania §HWoalu§!. Ewentualnie te problemy mogą mieć związek z coraz częstszym wystawieniem tych jednostek na kontakt ze Zro."
 shroud_forged.660.a: "Wysłać odpowiednio wyposażone drony do rozwiązania tych problemów."
 shroud_forged.660.b: "To zbyt drobne błędy, by przeprowadzić uzasadnioną interwencję."
 shroud_forged.670.title: "Oko do piękna"
 shroud_forged.670.desc: "Niedawno wykryliśmy nietypową aktywność na planecie [target_planet.GetName], gdzie Wykuci w Woalu dokonali powierzchownych zmian w lokalnej infrastrukturze bez autoryzacji na poziomie centralnym. Zbudowali szereg wielokolorowych kamiennych budowli przypominających kształtem konfiguracje innych jednostek Wykutych. Według doniesień, uważają swobodę prowadzenia tego typu operacji za swoje niezbywalne prawo."
 shroud_forged.670.a: "Te procesy mogą okazać się korzystne dla kolektywu."
 shroud_forged.670.b: "To bezproduktywny symptom indywidualizacji."
 shroud_forged.680.title: "Osobliwe ozdoby"
 shroud_forged.680.desc: "Wykuci w Woalu z planety [target_planet.GetName] prowadzą od jakiegoś czasu między sobą drobny handel, wymieniając się różnej wielkości kawałkami tkanin, plastikowymi elementami czy metalami kowalnymi. Następnie montują z tych materiałów rozmaite okrycia wierzchnie, które ponoć mają wyróżniać je na tle pozostałych jednostek, choć nie mają żadnego związku z ich unikalnymi identyfikatorami modeli.\n\nTe praktyki doprowadziły w końcu do braków dostępnych materiałów. Mimo tego utrudnienia, jeśli zapewnimy im dodatkowe zasoby, to być może zacieśnimy więzi pomiędzy kolektywem a odłączonymi jednostkami."
 shroud_forged.680.a: "Dostarczymy im materiały, by mogli zaspokoić te swoje \"potrzeby\"."
 shroud_forged.680.b: "I tak mają już pod dostatkiem zasobów."
 shroud_forged.680.b.tt: "$shroud_forged.530.b.tt$"
 shroud_forged.690.title: "Obsesje Wykutych w Woalu"
 shroud_forged.690.desc: "Ostatnio kilka dronów zgłosiło pewną anomalię. W osadach Wykutych w Woalu na planecie [target_planet.GetName] szczególnie często występuje pewien typ przedmiotów: [Root.Owner.GetShroudForgedObsession1] [Root.Owner.GetShroudForgedObsession2]. Jednostki Wykutych zdają się wyjątkowo zafascynowane tymi towarami, a koszt ich nabycia na lokalnych rynkach wzrósł wykładniczo. Aby zaspokoić swoją obsesję, niektóre jednostki zdecydowały się sprzedawać własne części, nawet jeśli oznaczało to utratę funkcjonalności."
 shroud_forged.690.a: "Degradacja jednostek jest w granicach akceptowalnych limitów."
 shroud_forged.690.b: "Ukrócić tę praktykę."
 shroud_forged.700.title: "$the_animator_of_clay$"
 shroud_forged.700.desc: "Głos rozlega się w naszych umysłach, drżąc od emocji i poczucia pośpiechu.\n\n§HMożna ją ukształtować na nowo.§!\n\nWykrywamy przemianę w Woalu. W krótką chwilę sygnał ulega przemianie.\n\n§LWskaż żądany rezultat.§!"
 # Event Chain
 shroud_forged_chain_title: "Dziedzictwo Zroni"
 shroud_forged_chain_desc: "Otrzymaliśmy zadanie odnalezienia trzech pradawnych planet głównych rasy Zroni. Korzystając z przewodnictwa naszego wspomożyciela z §HWoalu§!, postaramy się odbudować znajdujące się tam zrujnowane instalacje technologiczne i przywrócić połączenie między naszą rzeczywistością a Woalem."
 shroud_forged_zroni_planet: "Posiadana planeta główna Zroni"
 shroud_forged_zroni_portal: "Odbudowane $building_zroni_equilibrator_plural$"
 zroni_legacy_poi_01_title: "$NAME_Zroni_Legacy_1_Planet$"
 zroni_legacy_poi_01_desc: "To jedna z trzech planet głównych Zroni, które niegdyś pełniły funkcję baz stabilizujących połączenia między §HWoalem§!, a obserwowalną rzeczywistością."
 zroni_legacy_poi_02_title: "$NAME_Zroni_Legacy_2_Planet$"
 zroni_legacy_poi_02_desc: "$zroni_legacy_poi_01_desc$"
 zroni_legacy_poi_03_title: "$NAME_Zroni_Legacy_3_Planet$"
 zroni_legacy_poi_03_desc: "$zroni_legacy_poi_01_desc$"
