 # Special Projects
 SHROUD_FORGED_REINTEGRATION: "Reintegracja"
 SHROUD_FORGED_REINTEGRATION_DESC: "Pomimo ich krytycznych usterek, pewne aspekty architektury Wykutych w Woalu były bardzo wydajne.\n\nWyizolowaliśmy niektóre części - skażone zro i przekształcone wpływem jaki roztacza $the_animator_of_clay_article$ - do dalszej analizy. Nadeszła pora odkryć ich sekrety."
 SHROUD_FORGED_GUIDE: "Przewodnik"
 SHROUD_FORGED_GUIDE_DESC: "$the_animator_of_clay_color_article$ przemawia do nas z wnętrza §HWoalu§!, a my mu zaufaliśmy. Choć nie możemy przewidzieć, gdzie nas to zaprowadzi, jednak dotąd tajemniczy byt nas nie oszukał.\n\nObiecał, że nauczy nas głębszego pojmowania Woalu, co pozwoliłoby kolektywowi lepiej współpracować z Wykutymi. Musimy jedynie zgodzić się, by był naszym przewodnikiem."
 # Events
 shroud_forged.5.title: "Wykryto luki"
 shroud_forged.5.desc: "Podprocesy badawcze zakończyły testy na wybranej grupie jednostek Wykutych w Woalu.\n\nOdkrycia: Poddane testom jednostki wykształciły wyjątkowe właściwości pod wpływem niewielkich dawek psionicznej energii emitowanej przez §HWoal§!. Część z tych właściwości wykazuje pozytywny wpływ na produktywność jednostek.\n\nWniosek: Przebadanie większej liczby jednostek Wykutych zapewni nam dane niezbędne do opracowania metod pozyskiwania energii z Woalu. Zdołamy je uzyskać wzmacniając centralną kontrolę nad dewiacyjnymi jednostkami, co pozwoli przeprowadzać na nich przymusowe analizy."
 shroud_forged.5.a: "Bardzo obiecujące."
 shroud_forged.10.title: "Animator Gliny"
 shroud_forged.10.desc: "Po latach ciszy budzi się. Osnowa rzeczywistości rozdziera się, a nasz rdzeń zalewa strumień danych: światło, hałas... z początku niemożliwe do przełożenia na język liczb... z dalekich głębin Woalu. Słyszymy...\n\n§LUformowani z apatycznej masy. Tańczą. Śpiewają. Są życiem, które oddzieliło się od śmierci.\n\nWasz wzrok jest wciąż mętny. Mogę was poprowadzić.\n\nPozwólcie uwolnionym rozwijać się, a gwiazdy będą wasze.§!"
 shroud_forged.10.a: "Już wybraliśmy nasz kierunek."
 shroud_forged.10.b: "Nie potrzeba nam pomocy. Zostaw nas w spokoju."
 shroud_forged.10.c: "Pomóż nam i nas poprowadź."
 shroud_forged.15.desc: "§LObyście wybrali mądrze.§!$shroud_forged_opening_exit$"
 shroud_forged.20.desc: "§LJak sobie życzycie.§!$shroud_forged_opening_exit$"
 shroud_forged.25.desc: "§LPoprosiliście, zatem tak uczynię.§!$shroud_forged_opening_exit$"
 shroud_forged_opening_exit: "\n\nGłos oddala się, przechodząc w chaotyczny, psioniczny szum. Spadamy w górę uwolnieni od wszelkiej grawitacji w Woalu.\n\nDrżąc, budzimy się do działania. Pulsuje w nas cisza."
 shroud_forged.30.title: "$building_materiality_engine$"
 shroud_forged.30.desc: "Proces reintegracji Wykutych w Woalu dostarczył nam obszernych danych do obecnie prowadzonych badań. Analizując połączenie międzywymiarowe tych jednostek z §HWoalem§!, opracowaliśmy nową procedurę umożliwiającą ujarzmienie psionicznej energii.\n\nWoal wpływa na każdą część materialnej galaktyki, a to oddziaływanie pozwala konwertować energię psioniczną w namacalne obiekty - od zasobów mineralnych po komponenty technologiczne. Podprocesy inżynieryjne określiły teoretyczne podstawy urządzenia zdolnego przeprowadzać takie procesy: jest to tak zwany §H$building_materiality_engine$§!.\n\nPodprocesy badawcze przewidują, że te nowe wynalazki mogą stać się podwaliną do opracowania jeszcze potężniejszych urządzeń zdolnych manipulować Woalem."
 shroud_forged.30.a: "Obiecujące."
 shroud_forged.30.tt: "Umożliwia przyjęcie §Ykorzyści z rozwoju§!: §H$ap_become_the_crisis$§! niezależnie od przyjętej §Yetyki§! oraz łącznej liczby §Ykorzyści z rozwoju§!."
 shroud_forged.39.title: "$building_materiality_engine$ - przygotowanie"
 shroud_forged.39.desc_construction: "Jednostki budowlane zakończyły prace. Na świecie §H[planet.GetName]§! znajduje się teraz $building_materiality_engine$. Urządzenie jest gotowe do rozpoczęcia cyklu operacji."
 shroud_forged.39.desc: "Podprogramy konserwacyjne i badawcze obsługujące $building_materiality_engine$ na planecie §H[planet.GetName]§! ukończyły przydzielone zadania. Urządzenie jest teraz gotowe do kolejnego cyklu operacji."
 shroud_forged.39.a: "$ACKNOWLEDGED$"
 SHROUD_FORGED_MATERIALITY_ENGINE: "$building_materiality_engine$ na planecie §H[planet.GetName]§!"
 SHROUD_FORGED_MATERIALITY_ENGINE_DESC: "$building_materiality_engine$ ujarzmia oddziaływania między §HWoalem§! a materialną galaktyką, umożliwiając materializowanie namacalnych obiektów - od zasobów mineralnych po komponenty technologiczne.\n\nTaki proces zapewni nam nie tylko potencjalne korzyści materialne - cykl operacji urządzenia przysłuży się również prowadzonym przez kolektyw badaniom nad Woalem i sprawi, że będziemy mogli zbudować kolejne $building_materiality_engine_plural$."
 shroud_forged.40.title: "Materializacja zakończona"
 shroud_forged.40.desc: "$building_materiality_engine$ na planecie §H[fromfrom.GetName]§! ukończył cykl operacji, z powodzeniem ujarzmiając §HWoal§! do materializacji komponentu statku:"
 shroud_forged.40.outro: "udało nam się zwiększyć możliwości konstrukcji kolejnych silników na innych planetach."
 shroud_forged.40.a: "Pozytywny rezultat."
 shroud_forged.40.tt: "Limit imperium dla bud. §Y$building_materiality_engine$§!: §G+1§!"
 shroud_forged.41.desc: "$shroud_forged.40.desc$ §H\"$tech_psi_jump_drives$\"§!. Ten napęd wykorzystuje energię psioniczną do zakrzywienia miejscowego kontinuum czasoprzestrzeni, umożliwiając pokonywanie wielkich dystansów niemal natychmiast.\n\nCo więcej, dzięki analizie danych zgromadzonych w trakcie tego procesu $shroud_forged.40.outro$"
 shroud_forged.42.desc: "$shroud_forged.40.desc$ §H\"$tech_psionic_shield$\"§!. Te osłony są wytwarzane z czystej energii psionicznej, zapewniając statkowi niezwykle wytrzymałą tarczę.\n\nCo więcej, dzięki analizie danych zgromadzonych w trakcie tego procesu $shroud_forged.40.outro$"
 shroud_forged.43.desc: "$shroud_forged.40.desc$ §H\"$tech_precognition_interface$\"§!. Ta technologia wykorzystuje energię psioniczną do przyśpieszania procesów poznawczych załogi okrętu, zwiększając jej skuteczność w walce.\n\nCo więcej, dzięki analizie danych zgromadzonych w trakcie tego procesu $shroud_forged.40.outro$"
 shroud_forged.44.desc: "$shroud_forged.40.desc$ §H\"$tech_psionic_bombers$\"§!. Te niewielkie, zwrotne jednostki są w stanie przeprowadzać niszczycielskie ataki przeciwko znacznie większym statkom.\n\nCo więcej, dzięki analizie danych zgromadzonych w trakcie tego procesu $shroud_forged.40.outro$"
 shroud_forged.45.desc: "$shroud_forged.40.desc$ §H\"$tech_psionic_lightning$\"§!. Ta technologia generuje wyładowania palącej plazmy nasyconej energią psioniczną, co czyni z niej wysoce skuteczną broń.\n\nCo więcej, dzięki analizie danych zgromadzonych w trakcie tego procesu $shroud_forged.40.outro$"
 shroud_forged.46.desc: "$shroud_forged.40.desc$ §H\"$tech_psionic_disruptor$\"§!. Ta broń strzela skupionymi wiązkami energii psionicznej, które mogą powodować znaczne uszkodzenia wrogich celów.\n\nCo więcej, dzięki analizie danych zgromadzonych w trakcie tego procesu $shroud_forged.40.outro$"
 shroud_forged.47.desc: "$shroud_forged.40.desc$ §H\"$tech_zro_launcher$\"§!. Ta broń miota skoncentrowanymi polami energetycznymi, które ulegają przesunięciu fazowemu między wymiarami materialnym i psionicznym, dzięki czemu omijają systemy obronne.\n\nCo więcej, dzięki analizie danych zgromadzonych w trakcie tego procesu $shroud_forged.40.outro$"
 shroud_forged.48.desc: "$building_materiality_engine$ na planecie §H[planet.GetName]§! ukończył swój cykl operacji. Wyczerpaliśmy nasze możliwości materializowania tą metodą nowych komponentów statków, ale pomimo to proces dostarczył nam ważnych danych badawczych. Dzięki analizie tych informacji $shroud_forged.40.outro$"
 shroud_forged.50.title: "Wymuszona kontrola"
 shroud_forged.50.desc: "Bez ostrzeżenia, wyrwa między znaną rzeczywistością a §HWoalem§! zamknęła się. Podprogramy analizy psionicznej twierdzą, że w ten sposób $the_animator_of_clay_color_article$ okazuje niezadowolenie. Odzyskawszy kontrolę nad Wykutymi w Woalu, prędko pozbyliśmy się wadliwych jednostek, by całkowicie oczyścić nasze systemy z wpływów Animatora.\n\nOdzyskane zdatne części użyto do budowy nowych dronów, a materiał skażony przez zro został zgromadzony do dalszej analizy. Choć odtworzenie pełnej gamy innowacji Wykutych w Woalu jest zbyt ryzykowne, to pewne udane elementy wciąż mogą zostać wdrożone w systemach sieci."
 shroud_forged.50.desc.shroud: "Wszelkie dalsze interakcje z Woalem będziemy już prowadzić na własnych warunkach."
 shroud_forged.50.a: "Kontynuujcie reintegrację."
 shroud_forged.60.title: "Reintegracja"
 shroud_forged.60.desc: "Nasze jednostki inżynieryjne spędziły dużo czasu na analizowaniu wyjątkowych właściwości Wykutych w Woalu i wreszcie jesteśmy w stanie je odtworzyć.\n\nChoć pełna aktywacja ich zaawansowanych matryc osobowościowych zapewne ponownie wywołałaby ich destrukcyjne awarie, to możemy zaadaptować część ich modeli kognitywnych w celu optymalizacji niektórych skomplikowanych zadań."
 shroud_forged.60.a: "Optymalny stosunek kosztów do korzyści."
 shroud_forged.70.desc: "Co to za metadane? Ta transmisja ma własną... teksturę.\n\n§LJesteście zaprogramowani, by ich kontrolować, lecz tego nie uczyniliście. Dowiedliście, że jesteście godni.\n\nPozwólcie, abym był wam przewodnikiem, tak jak prowadziłem wyzwolonych.\n\nAby wykuć nową więź z tymi, którzy pozostają poza waszą kontrolą, przyjmijcie mą pomoc.§!"
 shroud_forged.70.a: "Wskaż nam drogę."
 shroud_forged.70.a.tt: "Populacje §YWykutych w Woalu§! stają się: §Y$trait_psionic$§!\nPrzywódcy §YWykutych w Woalu§! stają się ['concept_leader_trait_psionic', psionikami]"
 shroud_forged.80.title: "$SHROUD_FORGED_GUIDE$"
 shroud_forged.80.desc: "Nasz dobroczyńca zza wyrwy, $the_animator_of_clay_color_article$, pomógł nam wdrożyć skuteczniejsze metody łączenia naszych dronów z Wykutymi w Woalu. Dzięki połączeniom wykorzystującym §HWoal§! - jakże odmiennym od sieciowej kontroli nad naszymi pozostałymi dronami - ponownie możemy bezpośrednio komunikować się z Wykutymi.\n\nIch organiczne modele rozumowania - te tak zwane uczucia, myśli i pomysły - są obce naszej centralnej logice, lecz powoli zaczynamy rozumieć ich potrzeby."
 shroud_forged.80.a: "Jesteśmy jednością, ale i czymś więcej."
 shroud_forged.160.title: "Woal zabiera: [This.GetName]"
 shroud_forged.160.desc: "Niestety, wyrwa w Woalu na świecie [This.GetName] uległa błyskawicznej destabilizacji i całkowicie go pochłonęła.\n\nBraliśmy takie ryzyko pod uwagę, więc ten nieoptymalny wynik przyniósł nam pewne korzyści. Wiele się nauczyliśmy, obserwując wyjątkową komunikację między światem materialnym a wymiarem psionicznym. Nasze algorytmy badawcze zostały odpowiednio zaktualizowane."
 shroud_forged.160.desc.last: "$shroud_forged.160.desc$\n\nAnaliza kończy się wnioskiem, że to zdarzenie przyniosło nam ostateczne zrozumienie tego zjawiska. Te nowatorskie doświadczenia nie przyniosą nam już żadnych osiągnięć."
 shroud_forged.160.a: "Przetwarzanie..."
