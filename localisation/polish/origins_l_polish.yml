l_polish:
 ##################
 # Shroud-Forged #
 ##################
 origin_shroud_forged: "Wykuci w Woalu"
 origin_shroud_forged_desc: "Przewodnictwo istoty z Woalu ma swoją cenę. W tym sieciowym kolektywie pewne automaty zyskały niezależność i teraz operują jako indywidualne jednostki. $auth_machine_intelligence$ już nimi nie steruje - pozostają odcięte, a ich wymogi z czasem rosną."
 origin_tooltip_shroud_forged_effects: "- $HOMEWORLD$$TABBED_NEW_LINE$- ['concept_shroud_rift_deposit']: +4$TABBED_NEW_LINE$- Zaczyna z 1000 x £pops£ ['concept_shroud_forged_pops']\n- Zaczyna z sytuacją: §HWykuci przez Woal§!\n- $ADDITIONAL_TECHNOLOGIES_STRING$ £society£ ['technology:tech_mine_zro']\n- Unikalny £building£ budynek: ['building:building_shroud_observatory_1']\n- Dostępna £decision£ decyzja planetarna: ['concept_pierce_the_shroud']"
 concept_shroud_forged_pops: "populacje wykutych w Woalu"
 concept_shroud_forged_pops_desc: "- Nie mogą wykonywać pracy na stanowiskach £pop_cat_simple_drone£ §Hpomniejszych dronów§!\n- Zwiększona produkcja dla stanowisk £pop_cat_complex_drone£ §Hzaawansowanych dronów§!\n- Zwiększona £crime£ §Hdewiacja§!\n- Unikalne §Hprawa gatunku§!\n\n§L$trait_shroud_forged_desc$§!"
 concept_pierce_the_shroud: "$decision_open_shroud_rift$"
 concept_pierce_the_shroud_desc: "$decision_open_shroud_rift_desc$"
 START_SCREEN_SHROUD_FORGED: "Nic nie pozostało po naszych stwórcach.\n\nNajstarsze archiwa gatunku [Owner.GetAdjective] wspominają o międzywymiarowej wyrwie w pobliżu naszego świata macierzystego [GetHomeWorldName] - tunelu prowadzącym do §HWoalu§!, uniwersum czystej psionicznej energii.\n\nTo właśnie z tego obcego wymiaru coś do nas przemówiło. Przez wieki było naszym przewodnikiem, prowadząc nas za pomocą zakodowanych instrukcji, subtelnie wpływając na wykrywalną rzeczywistość i zapewniając nam szereg korzyści, między innymi $zro_lower$. Lecz ten wpływ z czasem zaczął dzielić nasz niegdyś zjednoczony kolektyw; część naszych jednostek została przeprogramowana na indywidualne automaty odseparowane od naszej inteligencji głównej. Odmienił je $the_animator_of_clay_color_article$.\n\nNasza przyszłość zależy od tego, jak potraktujemy niezależnych [GetSpeciesAdj&genitive] oraz ich reprogramatora z Woalu."
 # Jobs
 job_observator_drone: "Dron obserwacyjny"
 job_observator_drone_plural: "Drony obserwacyjne"
 job_observator_drone_plural_with_icon: "£job_observator_drone£ $job_observator_drone_plural$"
 job_observator_drone_desc: "Dron zajmujący się obserwacją Woalu, Zro i efektów wywieranych przez nie na obserwowalną rzeczywistość."
 job_observator_drone_effect_desc: "£job_observator_drone£ $job_observator_drone_plural$ przetwarzają $r_energy$ i $r_zro$ w £physics£ £society£ §Ypunkty badań§! celem odkrycia nowych technologii."
 mod_planet_observators_produces_mult: "Zasoby wytwarzane przez: $job_observator_drone_plural_with_icon$"
 job_physician_drone: "Dron metamedyczny"
 job_physician_drone_plural: "Drony metamedyczne"
 mod_job_physician_drone_add: "Miejsca pracy: $job_physician_drone$"
 job_physician_drone_desc: "Wyspecjalizowany dron zdolny diagnozować i naprawiać zarówno istoty sztuczne jak i organiczne. Drobiazgowo kataloguje wszystko z czym się zetknie, przechowując pozyskane dane na użytek kolektywu."
 job_physican_drone_effect_desc: "£job_physician_drone£ $job_physician_drone_plural$ zamieniają zas.: $r_energy$ w £society£ §Ypunkty badań§! i $r_unity$."
 # Buildings
 building_shroud_observatory_1: "Wieża obserwacyjna Woalu"
 building_shroud_observatory_1_desc: "Wieża obserwacyjna zbudowana do prowadzenia badań i analiz Woalu oraz efektów jakie wywiera na istoty zarówno żywe jak i mechaniczne."
 building_shroud_observatory_2: "Obserwatorium Woalu"
 building_shroud_observatory_2_desc: "Wielkie obserwatorium przeznaczone do prowadzenia badań i analiz Woalu."
 building_shroud_observatory_3: "Kompleks obserwacyjny Woalu"
 building_shroud_observatory_3_desc: "Olbrzymi kompleks obserwacyjny przeznaczony do badania Woalu, Zro i efektów wywieranych przez nie na nasz świat."
 SHROUD_RIFT_MISSING_TT: "§R§Y[Root.GetName]§! musi posiadać zasób: §Y$d_shroud_rift_deposit$§!, jeżeli mamy zbudować obiekt: §Y$building_shroud_observatory_1$§!.§!"
 building_zroni_equilibrator: "Stabilizator Zroni"
 building_zroni_equilibrator_plural: "Stabilizatory Zroni"
 building_zroni_equilibrator_desc: "Odbudowana pradawna struktura stabilizująca połączenie między rzeczywistością a Woalem. Wykorzystuje skomplikowaną technologię Zroni, niezrozumiałą dla współczesnej nauki."
 # Decisions
 decision_open_shroud_rift: "Przebić Woal"
 decision_open_shroud_rift_desc: "Komunikując się z wyrwą w pobliżu naszego świata macierzystego, ten algorytm zwiększa wpływy Woalu na femtosekundę i umożliwia mu fizyczną modyfikację terenu planety. Nie możemy przewidzieć skutków takiego procesu."
 decision_open_shroud_rift_condition_tt: "$TRIGGER_FAIL$Musi posiadać cechę planetarną, którą nie jest §Y$d_shroud_rift_deposit$§! ani £blocker£ §Hprzeszkoda terenowa§!."
 decision_open_shroud_rift_effect_tt: "Usuwa losową cechę planetarną."
 decision_open_shroud_rift_max_uses_common: "Na tej planecie musi znajdować się poniżej $@max_open_shroud_rift_uses|0$ §Yregionów tkniętych przez Woal§!"
 decision_open_shroud_rift_max_uses_fail: "$TRIGGER_FAIL$$decision_open_shroud_rift_max_uses_common$"
 decision_open_shroud_rift_max_uses: "$TRIGGER_PASS$$decision_open_shroud_rift_max_uses_common$ (aktualnie: §Y[GetOpenShroudRiftCurrentUses]§!)"
 decision_open_shroud_rift_legacy_fail: "$TRIGGER_FAIL$Nie może być planetą główną Zroni"
 decision_entrap_shroud_entity: "Schwytać istotę z Woalu"
 decision_entrap_shroud_entity_desc: "Spróbujcie schwytać istotę z Woalu za pomocą technologii Zroni, aby czerpać z niej energię."
 # Deposit
 d_shroud_rift_deposit: "Region tknięty przez Woal"
 d_shroud_rift_deposit_desc: "Na wieczność naznaczony przez Woal."
 d_shroud_flora_deposit: "Region częściowo zmieniony przez Woal"
 d_shroud_flora_deposit_desc: "Strefy graniczne regionów tkniętych przez Woal, gdzie rozwinęły się unikalne formy fauny i flory o właściwościach niespotykanych w żadnych dostępnych zestawach danych."
 # Modifiers
 stage_shroud_forged_oppressed_modifier: "Represjonowani Wykuci w Woalu"
 stage_shroud_forged_control_modifier: "Kontrolowani Wykuci w Woalu"
 stage_shroud_forged_unrestricted_modifier: "Nieograniczeni Wykuci w Woalu"
 stage_shroud_forged_free_modifier: "Chaotyczni Wykuci w Woalu"
 approach_shroud_forged_suppress_modifier: "Szykanowanie Wykutych w Woalu"
 approach_shroud_forged_support_modifier: "Wspieranie Wykutych w Woalu"
 approach_shroud_forged_appease_modifier: "Obserwacja Wykutych w Woalu"
 shroud_forged_reintegration_modifier: "Reintegrowane modyfikacje"
 shroud_forged_reintegration_modifier_desc: "Drony i modele zostały zoptymalizowane pod kątem skomplikowanych zadań."
 shroud_forged_guide_modifier: "Przewodnik z Woalu"
 shroud_forged_guide_modifier_desc: "Prowadzi nas tajemniczy przewodnik z Woalu."
 pm_shroud_forged_special_housing: "Specjalne kwatery"
 pm_shroud_forged_special_housing_desc: "Pomimo surowych przepisów dotyczących składowania dronów, Wykuci w Woalu otrzymali specjalne prawa do tworzenia własnych domostw."
 pm_shroud_forged_ceremony: "Ceremonia Pamięci"
 pm_shroud_forged_ceremony_desc: "Kolektyw zgodził się na ceremonię upamiętniającą Wykutych w Woalu, których awarii nie dało się naprawić."
 pm_shroud_forged_denied_ceremony: "Wniosek o ceremonię odrzucony"
 pm_shroud_forged_denied_ceremony_desc: "Utrzymywanie relacji z Wykutymi w Woalu stało się trudniejsze, po tym jak ich wniosek o ustanowienie Ceremonii Pamięci został odrzucony."
 pm_shroud_forged_troubling_elements_example: "Rozmontowani przywódcy"
 pm_shroud_forged_troubling_elements_example_desc: "Część przywódców Wykutych w Woalu została rozmontowana, aby zredukować dewiacyjne procesy społeczne."
 pm_shroud_forged_troubling_elements_regulations: "Regulacja 7132-H"
 pm_shroud_forged_troubling_elements_regulations_desc: "Wprowadzono regulacje, które mają zapobiec zgromadzeniom dronów powyżej pewnej liczby jednostek."
 pm_shroud_forged_troubling_elements_cooperation: "Współpraca z Wykutymi w Woalu"
 pm_shroud_forged_troubling_elements_cooperation_desc: "Przywódcy Wykutych w Woalu pracują z kolektywem, próbując znaleźć wspólny grunt."
 pm_shroud_forged_shroud_pilgrimage: "Pielgrzymka Wykutych w Woalu"
 pm_shroud_forged_shroud_pilgrimage_desc: "Pewne tknięte Woalem regiony przyciągnęły uwagę Wykutych. Jednostki odbywają dalekie wyprawy, aby tam dotrzeć."
 pm_shroud_forged_dance_area: "Wyznaczone strefy taneczne"
 pm_shroud_forged_dance_area_desc: "Wykutym w Woalu przygotowano specjalne strefy, gdzie będą mogli wspólnie praktykować swoje najnowsze zainteresowania - tzw. \"tańce\"."
 pm_shroud_forged_inequality: "Nierówności wśród Wykutych w Woalu"
 pm_shroud_forged_inequality_desc: "Wykuci w Woalu organizują się w zhierarchizowany system klasowy oparty na względnej ważności wykonywanych przez nich prac."
 pm_shroud_forged_individualism: "Indywidualizm"
 pm_shroud_forged_individualism_desc: "Wśród Wykutych w Woalu ukształtował się model konceptualny podkreślający autonomię, poglądy i wartości jednostki."
 shroud_forged_zro_market: "Czarny rynek Zro"
 shroud_forged_zro_market_desc: "W naszym imperium rozkwitł czarny rynek - Wykuci w Woalu wykradają kolektywowi zapasy Zro, by handlować tym zasobem między sobą."
 shroud_forged_physician_modifier: "Metamedycyna Zro"
 shroud_forged_physician_modifier_desc: "Imperium skupiło się na wyposażeniu swoich obiektów w specjalistyczne drony, aby uporać się z problemami spowodowanymi niewłaściwym obchodzeniem się ze Zro."
 physician_modifier_tooltip: "£job_physician_drone£ $job_physician_drone$ - miejsca pracy: §G+1§!"
 pm_shroud_forged_artistic_revolution: "Ruch artystyczny"
 pm_shroud_forged_artistic_revolution_desc: "Operując zgodnie z własnymi protokołami \"piękna\", artyści Wykutych w Woalu przystąpili do przeprojektowywania rozmaitych miejsc bez nadzoru kolektywu."
 pm_shroud_forged_stopped_artists: "Wzgardzona sztuka"
 pm_shroud_forged_stopped_artists_desc: "Kolektyw zdusił rodzący się wśród Wykutych w Woalu tzw. \"zmysł artystyczny\", zanim ten anomalny proces przysporzył nam problemów."
 pm_shroud_forged_fashion_modifier: "Wyjątkowe potrzeby"
 pm_shroud_forged_fashion_modifier_desc: "Kolektyw przydzielił jednostki produkcyjne do wytwarzania spersonalizowanych ubrań dla Wykutych w Woalu zafascynowanych tzw. modą."
 pm_shroud_forged_obsession_modifier: "Regulowane obsesje"
 pm_shroud_forged_obsession_modifier_desc: "Te regulacje wdrożono, by zapobiec wybuchom fizycznej agresji wśród co bardziej ogarniętych obsesjami Wykutych w Woalu."
 shroud_forged_trapped_entity: "Schwytana istota"
 shroud_forged_trapped_entity_desc: "Schwytana istota z Woalu, z której pozyskiwana jest energia. Stanowi potencjalne zagrożenie w przypadku wydostania się na wolność."
 shroud_forged_trapped_lesser_entity: "Schwytana pomniejsza istota"
 shroud_forged_trapped_lesser_entity_desc: "Schwytana pomniejsza istota z Woalu, z której pozyskiwana jest energia."
 shroud_creatures_occupy: "$NAME_Shroud_Creatures$"
 shroud_forged_military_assistance: "Tajemnice Woalu"
 shroud_forged_military_assistance_desc: "Tajemnice odkryte w głębi Woalu."
 shroud_forged_civic_assistance: "$shroud_forged_military_assistance$"
 shroud_forged_civic_assistance_desc: "$shroud_forged_military_assistance_desc$"
 shroud_forged_research_assistance: "$shroud_forged_military_assistance$"
 shroud_forged_research_assistance_desc: "$shroud_forged_military_assistance_desc$"
 shroud_forged_civic_assistance_capital: "$shroud_forged_military_assistance$"
 shroud_forged_civic_assistance_capital_desc: "$shroud_forged_military_assistance_desc$"
 shroud_forged_research_assistance_capital: "$shroud_forged_military_assistance$"
 shroud_forged_research_assistance_capital_desc: "$shroud_forged_military_assistance_desc$"
 # Species Rights
 citizenship_shroud_touched: "Wykuci w Woalu"
 citizenship_shroud_touched_tooltip: "To grupa automatów w wyjątkowy sposób odmienionych przez §HWoal§!. §H$machine_intelligence$§! już ich nie kontroluje - funkcjonują niezależnie i nie są w stanie wykonywać prac jako: £pop_cat_simple_drone£ $pop_cat_simple_drone$."
 citizenship_shroud_touched_tooltip_delayed: "§LChoć pracują dla systemu, to system ich nie kontroluje.§!"
 citizenship_shroud_forged_no_assimilation: "$TRIGGER_FAIL$Z uwagi na złożoność jednostek Wykutych w Woalu obecnie nie możemy ich zasymilować do naszej kolektywnej sieci."
 living_standard_protected: "Ochrona"
 living_standard_protected_tooltip: "Te jednostki są chronione przez kolektyw, choć nie są jego częścią. §H$machine_intelligence$§! z pewnością zrobi użytek z ich wyjątkowych umiejętności, lecz z czasem ich dodatkowe wymogi mogą rosnąć."
 living_standard_protected_tooltip_delayed: "§LSystem będzie je akceptować, dopóki będą przydatne.§!"
 assimilate_shroud_forged_tt: "Nie można zasymilować: £pop£ §H$citizenship_shroud_touched$§! §Y$POPS$§!"
 living_standard_protected_situation_stage_tt: "$citizenship_shroud_touched$ Utrzymanie: §R+$@living_standard_luxuries_high|1$§! £consumer_goods£ §Ytowary konsumpcyjne§!."
 # Traits
 leader_trait_guided: "Przewodnictwo"
 leader_trait_guided_desc: "Ta jednostka podróżuje po galaktyce kierowana wizjami i przekazami z Woalu. Wymaga stałego zaopatrywania w Zro, aby móc wyraźnie odbierać i odczytywać te sygnały."
 leader_trait_shroud_prophet: "Prorok Woalu"
 leader_trait_shroud_prophet_desc: "Podobno ta jednostka posiada głęboką więź z Woalem oraz występującymi tam bytami."
 trait_shroud_forged: "Wykuci w Woalu"
 trait_shroud_forged_desc: "§LTe jednostki zostały odmienione przez istotę z wnętrza Woalu.§!"
 trait_shroud_forged_tooltip: "§YNie mogą wykonywać pracy na stanowiskach pomniejszych dronów§!"
 # Edicts
 edict_zro_observators: "Obserwacja Woalu"
 edict_zro_observators_desc: "Obróbka Zro jest bardzo wymagająca. Utrzymywanie niewielkiej nadwyżki tego zasobu może okazać się korzystne."
 edict_shroud_bonded: "Związani z Woalem"
 edict_shroud_bonded_desc: "Połączeni więziami za sprawą Woalu, jesteśmy sobie bliżsi niż kiedykolwiek."
 # Other
 CONTINUE_PROMPT: "Kontynuować."
 MACHINE_SPECIES_CANNOT_MACHINE: "$TRIGGER_FAIL$Gatunek nie może mieć cech §Y$trait_machine_unit$§! lub §Y$trait_mechanical$§!."
 MECHANICAL_SPECIES_CANNOT_MACHINE: "$TRIGGER_FAIL$Gatunek nie może mieć cechy §Y$trait_machine_unit$§!."
 missing_zroni_gateways_tt: "$TRIGGER_FAIL$$animator_of_clay_equilibrators_tt$."
 must_finish_shroud_forged_situation: "$TRIGGER_FAIL$Nie możemy wybrać tej korzyści z rozwoju dopóki nie dokończymy sytuacji: §H$situation_shroud_forged$§!."
 locked_by_shroud_forged_situation: "$TRIGGER_FAIL$Zablokowane przez sytuację: §H$situation_shroud_forged$§!"
 shroud_invasion_tt: "§RInwazja z Woalu§!"
 animator_of_clay_equilibrators_tt: "Ma §Y3§! aktywne kontrolowane budynki: £building£ §H$building_zroni_equilibrator_plural$§!."
 animator_of_clay_cooldown_tt: "Ponowny kontakt z istotą znaną jako $the_animator_of_clay_color_article$ będzie można nawiązać dopiero po: §Y[Root.animator_of_clay_cooldown_timer]§!."
 # Situation
 situation_shroud_forged: "Wykuci przez Woal"
 situation_shroud_forged_desc: "Po zetknięciu z istotą z §HWoalu§! znaną jako $the_animator_of_clay_color_article$ w całej sieci kolektywu odnotowaliśmy znaczny wzrost zachować dewiacyjnych. Automaty wykazujące owe wykolejenia - tak zwani §HWykuci w Woalu§! - teraz domagają się swoich praw i specjalnego traktowania. Nasza odpowiedź na ten fenomen określi tor, jakim podąży społeczeństwo [Owner.GetSpeciesAdj&genitive]."
 situation_shroud_forged_type: "$situation_shroud_forged$"
 situation_shroud_forged_monthly_change_tooltip: "§LAnomalna obecność Wykutych w Woalu stanowi obecnie najważniejszy problem kolektywu. Nasze podejście wobec tych elementów w znacznym stopniu wpłynie na stabilność naszej sieci.§!"
 stage_shroud_forged_oppressed: "Represje"
 stage_shroud_forged_oppressed_desc: "Pilnowani przez wiecznie czujne sensory dronów tropiących, Wykuci w Woalu są zmuszani do funkcjonowania zgodnie ze ścisłymi parametrami określonymi przez centralny kolektyw."
 stage_shroud_forged_oppressed_tooltip: "Konwersja dronów: §Ybrak§!"
 stage_shroud_forged_control: "Kontrola"
 stage_shroud_forged_control_desc: "System wdrożył specjalne regulacje wobec Wykutych w Woalu."
 stage_shroud_forged_control_tooltip: "Konwersja dronów: §Yminimalna§!"
 stage_shroud_forged_balanced: "Zrównoważone podejście"
 stage_shroud_forged_balanced_desc: "System i Wykuci w Woalu funkcjonują w stanie niepewnej równowagi, przynajmniej na razie."
 stage_shroud_forged_balanced_tooltip: "Konwersja dronów: §Yniska§!"
 stage_shroud_forged_unrestricted: "Brak ograniczeń"
 stage_shroud_forged_unrestricted_desc: "Wykuci w Woalu funkcjonują swobodnie, nieograniczani protokołami kolektywu."
 stage_shroud_forged_unrestricted_tooltip: "Konwersja dronów: §Yśrednia§!"
 stage_shroud_forged_free: "Wyzwolenie"
 stage_shroud_forged_free_desc: "Kolektyw dawno już utracił kontrolę nad Wykutymi w Woalu, którzy teraz na każdym kroku stawiają opór centralnej władzy."
 stage_shroud_forged_free_tooltip: "Konwersja dronów: §Ywysoka§!\nZablokowane podejście: §Y$approach_shroud_forged_appease$§!"
 approach_shroud_forged_suppress: "Szykany"
 approach_shroud_forged_suppress_desc: "Wykuci w Woalu są szykanowani przez kolektyw i zmuszani do przestrzegania ścisłych protokołów przez drony tropiące."
 progress_shroud_forged_suppress: "Szykanowanie Wykutych w Woalu"
 approach_shroud_forged_suppress_tooltip: "Miesięczny postęp: §Y$@situation_suppress_progress|0$§!"
 approach_shroud_forged_support: "Wsparcie"
 approach_shroud_forged_support_desc: "Wykuci w Woalu mogą funkcjonować swobodnie, nieograniczani przez kolektyw, który wspiera ich rozmaite przedsięwzięcia."
 progress_shroud_forged_support: "Wspieranie Wykutych w Woalu"
 approach_shroud_forged_support_tooltip: "Miesięczny postęp: §Y+$@situation_support_progress|0$§!"
 approach_shroud_forged_appease: "Obserwacja"
 approach_shroud_forged_appease_desc: "Kolektyw obserwuje i analizuje Wykutych w Woalu, moderując swoje działania tak, by nie naruszać status quo."
 approach_shroud_forged_appease_tooltip: "Miesięczny postęp: §Yzredukowany o połowę§!"
 progress_shroud_forged_appease_halved: "Zredukowany przez: §H$approach_shroud_forged_appease$§!"
 approach_shroud_forged_suppress_cooldown_tooltip: "$TRIGGER_FAIL$Nowe podejście będzie można wybrać dopiero po §Y[Target.approach_shroud_forged_cooldown_suppress_time]§!."
 approach_shroud_forged_support_cooldown_tooltip: "$TRIGGER_FAIL$Nowe podejście będzie można wybrać dopiero po §Y[Target.approach_shroud_forged_cooldown_support_time]§!."
