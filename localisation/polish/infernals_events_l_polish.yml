l_polish:
 ####################################
 # Anomaly Events
 ####################################
 # useful refs:
 # [From.GetName] planet
 # [From.GetStarName]
 # [Leader.GetName] scientist
 spires_of_light_category: "Świetlne iglice"
 spires_of_light_category_desc: "Wstępne skany ujawniają potężne, lśniące struktury wznoszące się nad absolutnie niepozornym krajobrazem. Ich pochodzenie i cel istnienia pozostają niejasne, lecz upiorny blask sugeruje, że stanowią coś więcej niż tylko naturalne zjawisko."
 infernals.500.name: "$spires_of_light_category$"
 infernals.500.desc: "Sondy wysłane do zbadania świecących kolumn pozwoliły stwierdzić, że składają się one z kowalnej, krzemowej magmy. Materiał ten jest wyrzucany ze skały macierzystej, twardnieje jednak, zanim trafi na powierzchnię. Powstałe świecące struktury osiągają nieraz setki metrów wysokości, zanim zapadną się pod własnym ciężarem.\n\nW rezultacie powstaje imponujący las kolumn złożonych z niemal nieskazitelnego, przezroczystego szkła wulkanicznego, które lśnią ciepłym, pomarańczowym blaskiem wciąż kłębiącej się pod nimi roztopionej magmy.\n\n[Leader.GetName] w ramach naukowej analizy wysuwa tezę, iż pozostałości po tych zawalonych iglicach mogą posłużyć za cenny zasób."
 #EXCELLENT:0 (first option has default answer)
 infernals.500.a: "Pozostawmy to boskie miejsce w spokoju."
 infernals.500.b: "Zorganizujmy przetarg na wydobycie surowca."
 infernals.500.c: "Użyjmy ich do ćwiczeń strzeleckich."
 lava_whirlpool_category: "Wir lawy"
 lava_whirlpool_category_desc: "[Planet.GetName] - pierwsze badania ujawniają obecność w głównym oceanie lawy na planecie dziwny, przypominający burzę kształt. To niezwykle dziwne zjawisko wymaga zbadania."
 infernals.56.name: "Wir lawy"
 infernals.56.desc: "[Leader.GetName] potwierdza, że dziwny kształt to wir lawy. To niezwykle rzadkie zjawisko, ten zaś jest największy, jaki kiedykolwiek zaobserwowano. Zdumiony tym odkryciem, nakazuje pozyskanie próbek.\n\nWykazują one, że wir jest częściowo wzbudzany przez obecność zbiornika żywego metalu rozdzieranego przez prądy, a następnie próbującego ponownie połączyć się w całość. Proces ten zaburza przepływ lawy i wzmaga ruch wiru. Pozyskane próbki wskazują też, że ten żywy metal można pozyskać niewielkim wysiłkiem."
 infernals.56.a: "Rozpocznijcie operacje wydobywcze."
 outgassing_category: "Wyrzut gazu"
 outgassing_category_desc: "[Planet.GetName]: Rutynowy skan wykazał niezwykle silne chemiczne fluktuacje w atmosferze. Dokładniejsze badania mogą wykazać, co się tu dzieje."
 infernals.1001.name: "Wyrzut gazu"
 infernals.1001.desc: "Obecność chemicznych fluktuacji w atmosferze została potwierdzona jako stała i występująca na całej powierzchni. Były one najsilniejsze nad dużym planetarnym oceanem odsłoniętej magmy, wysłano więc sondę, aby pobrała próbki.\n\nPo dokładniejszej analizie [Leader.GetName] stwierdza, że [Planet.GetName] posiada ocean magmy wyrzucający z siebie cenne gazy egzotyczne. To nieoczekiwane znalezisko wskazuje, że planeta może okazać się przydatna dla naszego przemysłu, jeśli zdołamy eksploatować jej surowce."
 infernals.1001.a: "Rozpocząć operacje wydobywcze."
 crystal_lava_lakes_category: "Jeziora kryształowej lawy"
 crystal_lava_lakes_category_desc: "Wygląda na to, że na powierzchni planety znajdują się duże zbiorniki swobodnie płynącej lawy. Warto się im przyjrzeć na wypadek, gdyby zapewniały możliwości związane z pozyskiwaniem zasobów."
 infernals.1002.name: "Jeziora kryształowej lawy"
 infernals.1002.desc: "[Planet.GetName]: Pierwsze obrazy powierzchni ujawniają niezwykłe i zupełnie niespodziewane formacje geologiczne zwane jeziorami kryształowej lawy. Te zbiorniki magmy o bardzo długim czasie istnienia pełne są wyjątkowych minerałów, które w odpowiednim zakresie temperatur w naturalny sposób porządkują się w formacje krystaliczne. W rezultacie jeziora stają się niezwykle przezroczyste i połyskują czerwienią. Ze względu na orbitę planety, ten wizualnie oszałamiający efekt podlega sezonowym zmianom związanym ze zmianami temperatury.\n\nEstetyka tych jezior kryształowej lawy może stanowić wspaniałą atrakcję turystyczną. W sezonie ich aktywności można też pozyskiwać z powierzchni skrystalizowane minerały, których właściwości można wykorzystać do magazynowania energii."
 infernals.1002.a: "Stwórzmy tu kurort."
 infernals.1002.b: "Pozyskajmy z jezior energię."
 crystal_lava_resort: "Kurort kryształowej lawy"
 crystal_lava_resort_desc: "Oszałamiające wizualnie planetarne jeziora stały się celem luksusowych wycieczek i przyciągają do siebie gości z całej galaktyki."
 bioadaptive_flora_category: "Bioadaptywna flora"
 bioadaptive_flora_category_desc: "Choć [Planet.GetName] to typowe wulkaniczne pustkowie, zawartość tlenu w atmosferze jest dziwnie wysoka. Musi go wytwarzać coś niezwykłego."
 infernals.1003.name: "Bioadaptywna flora"
 infernals.1003.desc: "[Planet.GetName]: Wstępna ocena sprawiła, że świat ten scharakteryzowano jako pełen magmy i ognia. Badania ujawniły jednak obecność natywnego ekosystemu złożonej flory zamieszkującej sieć pokrywających planetę wąwozów. Wytwarza on tlen i gromadzi obecną w atmosferze śladową wilgoć. W rezultacie pośród niezwykle gorącego pustkowia powstają zakątki z niemalże umiarkowanym mikroklimatem.\n\nBiomy wytwarzane przez tę florę mogą okazać się zdatne do zamieszkania dla gatunków unikających zwykle światów wulkanicznych, same rośliny zaś mogą mieć znaczenie rolnicze. Dokładne zbadanie życia w tych kanionach z pewnością będzie korzystne dla każdego rodzaju osadników."
 infernals.1003.a: "Oznaczmy ten teren jako strefę możliwą do zasiedlenia."
 infernals.1003.tooltip_a: "Dodaje modyfikator planetarny zwiększający bazową możliwość zamieszkania i przyrost ludności."
 bioadaptive_flora_modifier: "Bioadaptywna flora"
 bioadaptive_flora_modifier_desc: "Wąwozy planety porasta odporna, rodzima flora. Tworzy chłodniejsze mikroklimaty ze zdatnym do oddychania powietrzem i zapewnia ograniczoną możliwość zamieszkania nawet w środowisku wulkanicznym."
 tectonic_icebreaker_category: "Tektoniczny lodołamacz"
 tectonic_icebreaker_category_desc: "[Planet.GetName]: W regolicie wykryto dziwne anomalie w postaci nietypowo niskiej temperatury. Sugeruje to, że jakiś proces lub obiekt może chłodzić część powierzchni. Przeprowadzenie odwiertów pozwoliłoby dowiedzieć się więcej."
 infernals.1004.name: "Tektoniczny lodołamacz"
 infernals.1004.desc: "[Leader.GetName] donosi, że §Y[from.GetName]§! skrywa pod wulkaniczną powierzchnią wielkie lodowce. Są one otoczone niezwykłymi formacjami skalnymi złożonymi z minerałów o niecodziennych właściwościach izolacyjnych. Aktywność tektoniczna powoli degraduje te izolujące warstwy - [Leader.GetName] przewiduje, że jeśli temperatury między lodowcami a resztą planety ulegną zrównaniu, ochłodzi się ona na tyle, by ze świata wulkanicznego przemienić się w suchy.\n\nMożemy przyspieszyć ten proces, aby uczynić planetę nieco bardziej zdatną do zamieszkania. Zjawisko jest jednak niezwykle interesujące z punktu widzenia nauki i być może zbadanie jego naturalnego przebiegu przyniesie nam korzyści."
 infernals.1004.a: "Ustabilizujmy tektonikę."
 infernals.1004.b: "Przyspieszmy topnienie lodu."
 infernal_oasis_category: "Piekielna oaza"
 infernal_oasis_category_desc: "§Y[from.GetName]§!: zaskakujące obrazy przedstawiają płonący, stopiony świat zaznaczony niezwykle jasną, mającą rozmiary kontynentu połacią zieleni. Ten niezwykły widok sugeruje, że na powierzchni dzieje się coś wielce nietypowego."
 infernals.505.name: "Schronienie pośród kataklizmu"
 infernals.505.desc: "§Y[from.GetName]§!: niezwykły skład chemiczny i tektonika świata doprowadziły do powstania cudu. Choć większość planety to gorąca pustynia, zduszona wulkanicznym smogiem i płynącą swobodnie lawą, jedna potężna płyta kontynentalna z litej skały wznosi się na dziesiątki kilometrów ponad średnią. Powstała wyżyna znajduje się ponad warstwą toksycznych chmur, dzięki czemu wykształcił się tam zielony ekosystem pełen rodzimych roślin i zwierząt.\n\nNadaje się ona do zamieszkania przez wiele różnych gatunków, zaś jej zbadanie może przynieść szereg fascynujących odkryć naukowych."
 infernals.505.a: "Niesamowite odkrycie."
 NAME_Vermilion: "Cynober"
 NAME_Kira: "Kira"
 mysterious_ringing_category: "Tajemnicze dzwonienie"
 mysterious_ringing_category_desc: "[Planet.GetName]: Nasi naukowcy wykryli regularne impulsy fal radiowych pochodzące z pojedynczego punktu. Wygląda na to, że pojawiają się w chwili, w której źródło sygnału przechodzi z nocy w dzień."
 infernals.3210.name: "Tajemnicze dzwonienie"
 infernals.3210.desc: "[from.GetName]: zespół badawczy przybywa, aby odnaleźć źródło sygnału, i stwierdza, że pochodzi on z podziemnego systemu jaskiń wyposażonego w naukowy sprzęt obserwacyjny.\n\n[Leader.GetName], poprowadziwszy zespół w głąb jaskiń, odnajduje komorę oddzieloną od reszty ścianą z nieznanych stopów. Z zewnątrz dobiega delikatne dzwonienie. [GetMysteriousRingingDesc3210]\n\nPo założeniu sprzętu chroniącego słuch, zespół wchodzi i znajduje istotę nieznanego gatunku hibernującą przy źródle sygnału: dziwnym, cylindrycznym urządzeniu.\n\nAnaliza wykazuje, że emituje on regularne sygnały radiowe oraz kilkugodzinny, melodyjny hałas połączony z wokalizami. Wydają się one kompatybilne z anatomią narządu głosu istoty. [Leader.GetName] twierdzi, że urządzenie może próbować wybudzić ją zgodnie z ustalonym harmonogramem."
 infernals.3210.individual: "Zespół znajduje słaby punkt pieczęci i przebija się przez nią. Dzwonienie staje się wówczas ogłuszające i wywołuje wśród członków ekspedycji ataki paniki i wściekłości."
 infernals.3210.gestalt: "Zespół znajduje słaby punkt pieczęci i przebija się przez nią. Dzwonienie staje się wówczas ogłuszające i wywołuje wśród dronów z ekspedycji przeciążenie sensoryczne i kognitywne."
 infernals.3210.a: "Skopiujcie ich badania naukowe i odejdźcie."
 infernals.3210.b: "Spróbujcie przebudzić i zatrudnić istotę."
 infernals.3210.btt: "Otrzymano przywódcę: £scientist£ §Y$scientist$§! z §G4.§! poziomem początkowym"
 infernals.3210.c: "Ukradnijcie urządzenie."
 infernals.3210.ctt: "Dzięki częstym przypomnieniom o powrocie do pracy nasi robotnicy staną się wydajniejsi. Odblokowuje decyzję zapewniającą §G+10%§! do produktywności, jaką wykazują £job£ ['concept_jobs'] kosztem §R-5%§! do £happiness£ ['concept_happiness', zadowolenia]."
 decision_planetary_workshift: "Wymuszenie planetarnych zmian pracy"
 decision_planetary_workshift_desc: "$planetary_workshift_deployed_desc$"
 planetary_workshift_deployed: "Wymuszone są planetarne zmiany pracy"
 planetary_workshift_deployed_desc: "Zadbanie, aby cała planeta pracowała w tej samej strefie czasowej, poprawi komunikację i wydajność współpracy zespołów przy akceptowalnym spadku poziomu zadowolenia."
 ####################################
 # Origin Events
 ####################################
 # Red Giant Origin
 infernals.45.name: "Niepokojące trendy"
 infernals.45.desc: "Bardzo długo sądziliśmy, że §Y[capital_star.GetName]§! to typowy czerwony olbrzym, ostatnia analiza wykazała jednak, że rozmiar i siła promieniowania gwiazdy rosną. Zmiany te mają już wymierny wpływ na nasz klimat - ludność zaczyna się niepokoić.\n\nNic nie wskazuje, żeby trend ten miał się odwrócić. Jeśli nasz gatunek ma przetrwać, musimy dojść, jaka jest przyczyna tego zjawiska."
 infernals.45.desc.gestalt: "Bardzo długo sądziliśmy, że §Y[capital_star.GetName]§! to typowy czerwony olbrzym, ostatnia analiza wykazała jednak, że rozmiar i siła promieniowania gwiazdy rosną. Zmiany te mają już wymierny wpływ na nasz klimat.\n\nNic nie wskazuje, żeby trend ten miał się zmienić. Jeśli nasz gatunek ma przetrwać, musimy dojść, jaka jest przyczyna tego zjawiska."
 infernals.45.a: "Zachowajmy spokój i zbagatelizujmy problem."
 infernals.45.b: "Należy to szybko zbadać."
 infernals.45.c: "Mamy inne priorytety."
 infernals.45.d: "Niech zajmie się tym nasz zespół PR-owców."
 infernals.45.public.tt: "\n§HSytuacja:§! $situation_red_giant_expansion$ \n- Ustala \"§Y$approach_reassure_public$§!\" jako podejście do sytuacji. \n- Miesięczny przyrost zasobów: §G10§! £unity£"
 infernals.45.cause.tt: "\n§HSytuacja:§! $situation_red_giant_expansion$ \n- Ustala \"§Y$approach_find_the_cause$§!\" jako podejście do sytuacji."
 infernals.50.name: "Gwiezdna nowa"
 infernals.50.desc: "[GetRedGiantEndingExplode]"
 infernals.50.totalIgnorance: "Cokolwiek wywołało katastrofę czerwonego olbrzyma, nie ma już znaczenia. Możemy tylko zaakceptować obecną sytuację i odbudować to, co nam pozostało."
 infernals.50.semiIgnorance: "Zakłócenia wywołane gwiezdną eksplozję zniszczyły wszelkie dowody niezbędne do wytropienia winowajcy.\n\nMożemy tylko zaakceptować obecną sytuację i odbudować to, co nam pozostało."
 infernals.50.defaultEnding: "Proces rozpoczęty przez pozostałości populacji obcych w zdegradowanej stacji górniczej osiągnął ostatecznie swój koniec: gwiazda §Y[Target.GetStarName]§! weszła w nową, która ogarnęła swoim zasięgiem niemal cały układ. Wielobarwna plazma i promieniowanie sprawiły, że §Y[event_target:red_giant_homeworld_tmp.GetName]§! to teraz pustkowie, podobnie jak reszta naszego układu macierzystego.\n\n[GetMegacorpDesc50]\n\n[GetLususMiningDesc]"
 infernals.50.megacorp: "Nasz świat macierzysty zmienił się w rozległy obszar pełen mineralnego bogactwa, łatwo dostępnego i rozrzuconego po całym układzie. Koszt pozyskania tych surowców jest o wiele niższy, niż gdyby pozostały one wewnątrz swoich planet i księżyców. Możemy oczekiwać, że dzięki temu taniemu dostępowi do zasobów nasze zyski gwałtownie wzrosną."
 infernals.50.nonmegacorp: "Choć nasz świat macierzysty to teraz pustkowie, nowa odsłoniła w całym układzie mnóstwo nowych zasobów mineralnych, które można łatwo pozyskać za pomocą konwencjonalnego sprzętu górniczego. Można wykorzystać to bogactwo do zbudowania nowej przyszłości."
 infernals.50.lususExists: "Stacja rozbłyska ostatnim impulsem energetycznym, po czym wyłącza się, pozostawiając nas, byśmy zebrali to, co pozostało po naszym świecie macierzystym."
 infernals.50.lususGone: "Ponieważ stacja przestała już istnieć, §Y[event_target:red_giant_homeworld_tmp.GetName]§! może spać spokojnie, wiedząc, że wszystko to nie ma szans się powtórzyć."
 infernals.50.a: "Musimy zrobić, co tylko się da, żeby odbudować nasz dom."
 infernals.51.name: "Ryzyko nowej zażegnane"
 infernals.51.desc: "§Y[this.GetName]§!: dzięki ogromnemu wysiłkowi naprawczemu powierzchnia znów nadaje się do tego, aby zamieszkali ją $trait_infernal_plural$. Choć nie wszystkie blizny uda się zaleczyć, można teraz w pełni wykorzystać zapewniane przez nie wspaniałe możliwości badawcze."
 infernals.60.name: "Powrót do normalności"
 infernals.60.desc: "Zmieniając działanie ssawki, wydobywając wodór ze skorupy i odpowiednio ustawiając stosunek wejściowy gwiazdy, z powodzeniem sprawiliśmy, że §Y[Target.GetStarName]§! już się nie rozszerza i znów jest spokojnym, ciepłym, czerwonym olbrzymem.\n\n§Y[Target.GetStarName]§! wykazuje już stabilizację klimatu i możemy spodziewać się spokojnej przyszłości, w której nasz świat macierzysty pozostanie sercem imperium.\n\n[GetRedGiantEndingKalmStationStatus]"
 infernals.60.lususDestroyed: "Nie mając dostępu do stacji, nie zrozumiemy być może nigdy, co się wydarzyło - możemy jednak jak najlepiej wykorzystać wyrzucone przez kurczącą się gwiazdę materiały."
 infernals.60.lususAlive: "Teraz, kiedy rozumiemy już, jak kontrolować tę stację, możemy zdecydować, jak ją teraz wykorzystamy."
 infernals.60.a: "Rozbierzmy stację."
 infernals.60.b: "Kontynuujmy badania nad stacją."
 infernals.60.c: "Niech stanie się pomnikiem naszego zwycięstwa."
 infernals.60.d: "Nareszcie ulga."
 infernals.65.name: "Gwiezdna ekspansja"
 infernals.65.desc: "Trwające obserwacje potwierdzają, że gwiazda §Y[Target.system_star.GetName]§! coraz szybciej się rozszerza. Pojawiają się też donosy o fizycznych skutkach zwiększonego poziomu promieniowania. O ile nie znajdziemy sposobu na zatrzymanie tego procesu, przestaniemy istnieć przez §Y[Target.system_star.GetName]§! na długo przed tym, jak pochłonięta zostanie nasza planeta.\n\n[GetMegacorpDesc65]"
 infernals.65.nonmegacorp: "Ochrona przed gwiezdnym promieniowaniem może zapewnić nam więcej czasu. Bardziej niebezpieczny, lecz potencjalnie dochodowy plan pozwoli nam okiełznać zwiększone promieniowanie i zasili nasz sektor energetyczny i przemysłowy."
 infernals.65.megacorp: "Inwestycja w ochronę planetarną zapewni nam zabezpieczenie przed niestabilnością i pomoże zapewnić bazową ochronę zasobów. Jeśli jednak zamiast tego spróbujemy okiełznać zwiększone promieniowanie, być może zdołamy zwiększyć naszą produkcję energii i przemysłową."
 infernals.65.a: "Chrońmy nasz świat macierzysty."
 infernals.65.b: "Wykorzystajmy to zjawisko."
 infernals.70.name: "Żarłoczna gwiazda"
 infernals.70.desc: "§Y[Target.GetName]§! pochłania właśnie swoją pierwszą ofiarę - najbliższy gwieździe świat naszego układu. Choć jego surowce nadal istnieją, leżą teraz poza naszym zasięgiem, w ognistej głębi gwiazdy.\n\nChoć strata finansowa jest do udźwignięcia, stanowi to przerażający pokaz tego, czego może doczekać §Y[Owner.Capital.GetName]§!."
 infernals.75.name: "Uszkodzenia uboczne"
 infernals.75.desc: "Bezprecedensowy rozwój naszego czerwonego olbrzyma spowodował pochłonięcie kolejnej planety. Jej bogate zasoby pozostaną na zawsze niedostępne, o ile gwiazda nie zrzuci swoich zewnętrznych warstw w formie gwałtownej nowej."
 infernals.95.name: "Gwiezdne tunelowanie"
 infernals.95.desc: "§Y[capital_star.GetName]§!: prawda o procesie, który dotyka gwiazdy, jest dziwaczniejszy, niż sądziliśmy. Trwające badania ujawniły parę bliźniaczych tuneli podprzestrzennych głęboko w naszej gwieździe.\n\nJeden z nich kieruje bogaty w wodór materiał prosto do jej zewnętrznej warstwy, przyspieszając fuzję i zwiększając produkcję helu. Powinno to powodować kompresję rdzenia, drugi tunel jednak aktywnie pobiera z niego energię, hamując proces. Rezultatem jest ekspansja gwiazdy.\n\nWstępna telemetria obu tuneli podprzestrzennych sugeruje, że są one połączone z szeregiem punktów końcowych rozrzuconych po galaktyce. Nasze przetrwanie zależy od ich jak najszybszego zbadania."
 infernals.95.a: "Musimy zbadać trzy z tych miejsc."
 infernals.95.a.tt: "Zlokalizowano podprzestrzenne cele, które można wykorzystać do triangulacji."
 infernals.105.name: "Blizny podprzestrzenne"
 infernals.105.desc: "§Y[FromFromFrom.GetName]§!: skanowanie astrometryczne wykazało obecność blizn podprzedstrzennych niewyjaśnionego pochodzenia. Choć nie ma w tym miejscu obecnie końca tunelu, na orbicie gazowego olbrzyma mógł być kiedyś tunel. Dane zapewniły nam informacje z dziedziny fizyki, które można zastosować w innych obszarach. \n\nBędziemy tymczasem musieli gdzie indziej poszukać źródła tuneli podprzestrzennych aktywnych w naszej gwieździe."
 infernals.105.a: "Szukajmy dalej."
 infernals.110.name: "Złom obcego pochodzenia"
 infernals.110.desc: "§Y[FromFromFrom.GetName]§!: skany okolicy wykazują obecność blizn podprzestrzennych. Odkryliśmy też nieopodal planety fragmenty starożytnego złomu. Pozostają one nieruchome na orbicie i mogą mieć jakiś związek z bliznami. \n\nTrwające skany tych podprzestrzennych fluktuacji powinny pomóc nam w optymalizacji układu elektrowni słonecznych wokół naszej gwiazdy macierzystej.\n\nChoć dane te są pomocne, musimy zbadać jeszcze przynajmniej jedno miejsce, aby odnaleźć źródło naszych problemów."
 infernals.110.a: "Sprzedajmy złom na aukcji."
 infernals.115.name: "Triangulacja ukończona"
 infernals.115.desc: "§Y[FromFromFrom.GetName]§!: nareszcie - prawdziwy przełom.\n\nObecność kolejnych blizn pozwoliła nam dokonać triangulacji miejsca pochodzenia zakłóceń w naszej gwieździe - to niewykryty wcześniej układ, w którym obecne są wrogie sygnatury.\n\nŚledztwo to może pomóc nam ostatecznie w zapobieżeniu temu, co nęka naszą gwiazdę.\n\nGdy już dotrzemy do układu §YLusus§!, będziemy być może w stanie sprawić, że §Y[FromFromFromFrom.Target.solar_system.GetName]§! i nasza cywilizacja unikną okrutnego losu."
 infernals.115.a: "Zachowajmy ostrożność."
 infernals.115.b: "Przygotujmy pokaz siły."
 infernals.115.c: "Dokonajmy uprzednio błogosławieństwa."
 red_giant_lusus_triangulated_tt: "Odkryto nowy układ."
 infernals.2115.name: "Grupa abordażowa"
 infernals.2115.desc: "Nasze siły przejęły kontrolę nad stacją. Jej mieszkańcy stawili pewien opór, byli jednak słabo uzbrojeni i, jak się zdaje, niewyszkoleni w sztuce wojennej. Po bliższych oględzinach okazało się, że wielu wygląda na bardzo młode osobniki. Ci, których nie zabito, zostali pojmani.\n\nRozpoczęła się analiza sposobów, w jakie możemy przejąć kontrolę nad tunelami podprzestrzennymi - wydają się one być jakiegoś rodzaju pozyskującą energię ssawką. Odrobina czasu pozwoli nam zająć się problemem naszego układu macierzystego."
 infernals.2115.a: "Zniszczyć wszystko."
 infernals.2115.b: "Przesłuchać ocalałych."
 infernals.2115.c: "Zniewolić ich."
 infernals.2115.d: "Ocalali stanowią ryzyko. Wyeliminujcie ich."
 infernals.2115.e: "Porozmawiajcie z ocalałymi."
 infernals.2115.f: "Oczyśćcie stację z wszelkiego życia. Zjedzcie ich."
 infernals.2115.g: "Zjedzcie ich."
 infernals.400pops: "[this.GetName]: powstaje §G400§! x £pop£ $POPS$"
 infernals.300pops: "[this.GetName]: powstaje §G300§! x £pop£ $POPS$"
 infernals.2121.name: "Obcy zlikwidowani"
 infernals.2121.desc: "Podprzestrzenna gwiazda górnicza została zniszczona, a wszyscy na pokładzie zginęli.\n\nZniszczenie stacji spowodowało detonację jakiegoś nieznanego typu magazynu energii. Nadmiary zostały przepchnięte przez rozpadający się tunel podprzestrzenny, którego drugi koniec prowadzi do §Y[event_target:situation_red_giant_target_shortterm.GetStarName]§!, co znacząco pogorszyło sytuację w naszym macierzystym układzie.\n\nTo powiedziawszy, transfer wodoru do naszej gwiazdy ustał. Jak zła nie byłaby sytuacja - przestanie się przynajmniej pogarszać. Choć być może nigdy nie poznamy pochodzenia ani sposobu budowy tej stacji, możemy przynajmniej spać spokojnie, wiedząc, że jej potęga nie dostanie się w ręce naszych wrogów.\n\nNiestety, nie mamy na podorędziu sposobu sprawienia, aby nasza gwiazda, §Y[event_target:situation_red_giant_target_shortterm.GetStarName]§!, powróciła do pierwotnego stanu. Jeśli chcemy na nią wpłynąć, będziemy musieli polegać na zarejestrowanych przez nas danych w celu ustalenia, co właściwie robiła ta stacja."
 infernals.2121.a: "Posprzątajmy ten bałagan."
 infernals.2122.name: "Stacja zniszczona"
 infernals.2122.desc: "Stacja dryfuje w przestrzeni kosmicznej. Jej zniszczenie daje nam nową szansę na odmianę losu, jakim dotknięta jest nasza gwiazda §Y[event_target:situation_red_giant_target_shortterm.GetStarName]§!, nie za pomocą przełącznika, lecz poprzez ciężką i kosztowną pracę."
 infernals.2125.name: "Negocjacje z obcymi"
 infernals.2125.desc: "Po długiej, żmudnej pracy opracowaliśmy prosty translator pozwalający na komunikację z mieszkańcami stacji.\n\nPlacówka ta operuje od pokoleń, przemieszczając się między gazowymi olbrzymami i wykorzystując ssawkę podprzestrzenną do pozyskiwania energii z odległych gwiazd i zasilania nią systemów podtrzymywania życia oraz potężnego napędu skokowego.\n\nObcy nie rozumieją w pełni sprzętu, który obsługują, nie wiedzieli więc, że ssawka obiera za cel gwiazdy i je niszczy.\n\nMimo zdezorientowania, wydają się być gotowi do opuszczenia stacji. Obiecali nauczyć nas wszystkiego, co wiedzą, w zamian za bezpieczne miejsce do życia dla siebie i swoich dzieci."
 infernals.2125.a: "Zapewnijmy im schronienie."
 infernals.2125.b: "Dajmy im statek, żeby znaleźli własną drogę."
 infernals.2125.c: "Zdalnie opróżnijmy stację z powietrza."
 infernals.2125.d: "Pozwólmy im samym nas ocenić."
 infernals.2130.name: "Podprzestrzenna operacja górnicza"
 infernals.2130.desc: "Stacja wysysa wodór z gazowego olbrzyma i przekierowuje go przez podprzestrzeń do naszej gwiazdy. Dochodzi tam do fuzji helu i uwolnienia energii, z której powstaje §Y$entropy_crystals$§! zasilająca stację.\n\nNasza gwiazda, §Y[event_target:situation_red_giant_target_shortterm.GetStarName]§!, utraciła stabilność w wyniku błędów w kalibracji i degradacji sprzętu, którego mieszkańcy stacji albo nie zauważyli, albo nie umieli naprawić. \n\nPraca z tą starożytną technologią może pomóc w odwróceniu procesu, nie będzie jednak łatwa. Alternatywą jest dopuszczenie do eksplozji naszej gwiazdy - odsłoniłoby to niezliczone złoża zasobów i zmieniło nasze dziedzictwo w wielkie bogactwo surowców."
 infernals.2130.a: "Czas zabrać się do pracy."
 infernals.2131.desc: "Stacja wysysa wodór z gazowego olbrzyma i przekierowuje go przez podprzestrzeń do naszej gwiazdy. Dochodzi tam do fuzji helu i uwolnienia energii, z której powstaje §Y$entropy_crystals$§! zasilająca stację.\n\nMieszkańcy stacji wiedzę o jej obsłudze czerpią jedynie z niejasnych, ustnych przekazów. Kontakt ze swoją rodzimą cywilizacją utracili tysiące lat temu, być może w wyniku jej upadku lub zniszczenia. Szereg błędów kalibracji i degradacja sprzętu spowodowały wzrost niestabilności pracy ssawki, przez co nasza gwiazda, §Y[event_target:situation_red_giant_target_shortterm.GetStarName]§!, jest teraz narażona na niebezpieczeństwo.\n\nPraca z tą starożytną technologią może pomóc w odwróceniu procesu, nie będzie jednak łatwa. Alternatywą jest dopuszczenie do eksplozji naszej gwiazdy - odsłoniłoby to niezliczone złoża zasobów i zmieniło nasze dziedzictwo w wielkie bogactwo surowców."
 infernals.2135.name: "Koniec zagrożenia"
 infernals.2135.desc: "Gdy mieszkańcy stacji dowiedzieli się o naszych kłopotach, wpadli w przerażenie. Byli pewni, że są całkiem sami, i nie mieli pojęcia o istnieniu w galaktyce innych gatunków.\n\nW napadzie wyrzutów sumienia rozpoczęli demontaż stacji i, zanim zorientowaliśmy się, co robią, zniszczyli trwale większość jej komponentów.\n\nW rezultacie trudno będzie kontrolować powiększanie się gwiazdy. Musimy ponadto postanowić, co zrobimy z tymi mało stabilnymi obcymi. I czy zechcemy zaoferować im przebaczenie, którego tak pragną."
 infernals.2135.a: "Przyjmijmy ich i uratujmy ze stacji, co się da."
 infernals.2135.b: "Pozbądźmy się i obcych, i stacji."
 infernals.2135.c: "Zniewólmy ich i zniszczmy stację."
 infernals.2140.name: "Wizja stabilności"
 infernals.2140.desc: "§Y[event_target:situation_red_giant_target_shortterm.GetStarName]§!: dzięki wielkiemu wysiłkowi mamy teraz pełną kontrolę nad losem naszej gwiazdy. Pozostawiona sama sobie, podąży naturalnym cyklem swojego życia, poczynając od obecnego rozmiaru.\n\nStarożytna, rozpadająca się stacja nie przetrzyma jednak ciągłych rekonfiguracji. Każda zmiana stanowi dla obiektu próbę możliwości. Musimy dokonać wyboru.\n\nMożemy zmniejszyć gwiazdę do poprzedniego rozmiaru lub wymusić na niej ekspansję i przekształcić nasz układ w rozległe pole łatwych do pozyskania zasobów.\n\n[GetScientistPlural] podejmą próbę jeszcze jednej, ostatniej rekonfiguracji. Później możliwa będzie już tylko gwałtowna rozbiórka. Siłami zewnętrznymi."
 infernals.2140.a: "Pozostawmy gwiazdę w jej obecnym stanie."
 infernals.2140.b: "Przyspieszmy ekspansję gwiazdy."
 infernals.2140.bdesc: "§Y[event_target:situation_red_giant_target_shortterm.GetStarName]§! nieuchronnie urośnie."
 infernals.2140.c: "Przywróćmy gwiazdę do normalnego stanu."
 infernals.2140.cdesc: "§Y[event_target:situation_red_giant_target_shortterm.GetStarName]§! nieuchronnie się skurczy."
 infernals.2145.name: "Osiągnięto stabilność"
 infernals.2145.desc: "§Y[Target.GetStarName]§!: całkowita kontrola nad zmiennym rozmiarem i energią naszej gwiazdy pozwoliła nam na pełne jej ustabilizowanie. Pozostanie w obecnym stanie przez miliony lat, zaś nasz lud może znów cieszyć się stabilnością i przewidywalnością swojego układu macierzystego.\n\nZwiększony rozmiar naszej gwiazdy ma oczywiste konsekwencje dla sposobu, w jaki zarządzamy infrastrukturą, i możemy teraz maksymalnie wykorzystać te zmiany - spożytkować zwiększoną produkcję energii, zachowując przy tym obecność w układzie."
 infernals.2145.a: "Nareszcie kontrolujemy własne przeznaczenie."
 infernals.2151.name: "Tajemnicza stacja"
 infernals.2151.desc: "Nasze jednostki natknęły się w układzie na ograniczony opór grupy zautomatyzowanych dronów. Zostały one szybko zneutralizowane, co pozwoliło na dokładniejsze oględziny obcej stacji.\n\nKonstrukcja pozostaje sprawna, choć na kadłubie widać ślady wielu prowizorycznych napraw. Próba uzyskania dostępu do jednego z lądowisk pozwoliła nam nawiązać kontakt z nieznanym dotąd gatunkiem obcych. Choć dzieli nas bariera lingwistyczna, zdołaliśmy potwierdzić, iż to właśnie ta instalacja tworzy tunele, wskutek których §Y[event_target:situation_red_giant_target_shortterm.GetStarName]§! pozostaje w swoim niestabilnym stanie.\n\nTrwają starania, aby nawiązać łączność - być może sprawę uda się rozwiązać drogą dyplomacji. W innym wypadku możemy być zmuszeni do rozważenia bardziej bezpośrednich metod, jak wejście na pokład obiektu lub po prostu jego zniszczenie. Bez dokładnego zrozumienia jego przeznaczenia możemy jednak narazić w ten sposób naszą gwiazdę na znaczące ryzyko."
 infernals.2151.a: "Przetłumaczmy ich język."
 infernals.2151.b: "Siłą wedrzyjmy się na stację."
 infernals.2151.c: "Zniszczyć stację."
 infernals.2160.name: "Iskra kryzysu"
 infernals.2160.desc: "Trwające badania nad podprzestrzenną stacją górniczą wskazują, iż magazynuje ona potężne ilości energii termicznej, wykorzystując do tego egzotyczną jej formę, którą jest §Y$entropy_crystals$§!. Termiczne sprzężenie zwrotne pozwala na maksymalizację gromadzonej energii.\n\nReplikacja tej technologii może nauczyć nas, jak wykorzystywać niewyobrażalną dotąd potęgę, którą wielu uznałoby za nienaturalną i niebezpieczną. Może to doprowadzić do wytworzenia się dużej ilości nadmiarowego ciepła, jeśli jednak znajdziemy sposób na bytowanie w takich warunkach, galaktyka może być na wyciągnięcie naszej ręki."
 infernals.2160.a: "Zbadajmy sprawę dokładniej."
 infernals.2160.a.tt: "[GetRedgiantAlreadyHyperthermiaPickable]Ujawnia zasób §Y$entropy_crystals$§! w celu rozwoju galaktycznej hipertermii."
 infernals.2160.a.ttunlock: "Pozwala na przyjęcie korzyści z rozwoju \"$ap_galactic_hyperthermia$\".\n"
 infernals.2160.b: "To zbyt niebezpieczna technologia, aby się nią zajmować."
 infernals.2160.c: "Co za prymitywne zastosowanie. §Y$entropy_crystals$§! może być wykorzystywana lepiej."
 situation_red_giant_expansion: "Ekspansja czerwonego olbrzyma"
 situation_red_giant_expansion_type: "$situation_red_giant_expansion$"
 situation_red_giant_expansion_desc: "Gwałtowne zmiany w emisjach naszej gwiazdy zagrażają stabilności naszego świata macierzystego. Jeśli trend ten się utrzyma, §Y[Owner.Capital.GetStarName]§! w końcu wybuchnie, całkowicie niszcząc układ."
 situation_red_giant_expansion_monthly_change_tooltip: "Postępy w rozszerzaniu się gwiazdy zależą od tego, czy zdołamy znaleźć jego przyczynę."
 situation_red_giant_expansion_fail_tooltip: "§Y[Target.solar_system.GetName]§! wejdzie w supernową."
 situation_red_giant_expansion_finish_tooltip: "§Y[Target.solar_system.GetName]§! powróci do normalnego stanu."
 situation_red_giant_expansion_stage_1: "Nasza gwiazda jest stosunkowo spokojna, emituje jednak nietypowo silne promieniowanie."
 situation_red_giant_expansion_stage_2: "Nasza gwiazda jest większa, niż było to w czasie naszej ewolucji, co wyraźnie wpływa na nasz świat macierzysty."
 situation_red_giant_expansion_stage_3: "Nasza gwiazda jest niebezpiecznie duża, a jej ekstremalna aktywność zagraża stabilności naszego świata macierzystego."
 situation_red_giant_expansion_stage_4: "Czerwony olbrzym pali większość naszego układu, czyniąc przetrwanie ekstremalnie trudnym."
 situation_red_giant_expansion_stage_5: "Nasza gwiazda jest o włos od eksplozji, która spowodowałaby katastrofalne szkody w całym naszym układzie macierzystym."
 rg_default_progress: "\nRozrost miesięczny: §Y+7§!\n\n"
 rg_small_progress: "\nRozrost miesięczny: §G+3§!\n\n"
 rg_high_progress: "\nRozrost miesięczny: §R+50§!\n\n"
