 # RG Timeline events
 TIMELINE_EVENT_ORIGIN_RG_START: "$origin_red_giant$\n§L[GetDate]§!"
 TIMELINE_EVENT_ORIGIN_RG_START_TOOLTIP: "§HGwiezdne tunelowanie§!\n§YWydarzenie pochodzenia§!\n\nOdkryliśmy szereg zakłóceń podprzestrzennych. Rozpoczęło się poszukiwanie źródła niebezpiecznej niestabilności naszej gwiazdy."
 TIMELINE_EVENT_ORIGIN_RG_END_NOVA: "Śmierć olbrzyma\n§L[GetDate]§!"
 TIMELINE_EVENT_ORIGIN_RG_END_NOVA_TOOLTIP: "§HŚwiadkowie supernowej§!\n§YWydarzenie pochodzenia§!\n\nNasza gwiazda rozrosła się tak, że pochłonęła cały układ, zmieniając planety w stopione szczątki i rozrzucając zasoby w przestrzeni. Nie mamy wyjścia - musimy stworzyć sobie nową przyszłość pośród gwiazd."
 TIMELINE_EVENT_ORIGIN_RG_END_STABLE: "Obłaskawiony olbrzym\n§L[GetDate]§!"
 TIMELINE_EVENT_ORIGIN_RG_END_STABLE_TOOLTIP: "§HOcalony świat macierzysty§!\n§YWydarzenie pochodzenia§!\n\nOsiągnęliśmy stabilizację rozmiaru gwiazdy i zapobiegliśmy jej katastrofalnej śmierci. Zwiększona produkcja energii wymagać będzie adaptacji, lecz jeśli sprostamy temu wyzwaniu, staniemy się silniejsi niż kiedykolwiek."
 TIMELINE_EVENT_ORIGIN_RG_END_NORMAL: "Spokojny olbrzym\n§L[GetDate]§!"
 TIMELINE_EVENT_ORIGIN_RG_END_NORMAL_TOOLTIP: "§HOcalony świat macierzysty§!\n§YWydarzenie pochodzenia§!\n\nOdwróciliśmy niszczycielskie zmiany w naszej gwieździe, przywracając jej spokojny stan, w jakim ewoluowaliśmy. Udowodniliśmy, że możemy sprostać zagrożeniu apokaliptycznych rozmiarów i zmierzyć się ze wszystkim, co rzuci przeciwko nam wszechświat."
 # COSMIC DAWN
 # All strings below are in order of their appearance ingame
 infernals.2500.name: "Sygnały z głębi" # intro
 infernals.2500.desc: "§Y[root.capital_scope.GetName]§!: celowane skany wykryły dowody na obecność pod powierzchnią skomplikowanych instalacji, których rozmiar i wyrafinowanie zwiększają się tym bardziej, im bliżej rdzenia się znajdują. Ich materiał i sygnatury energetyczne pozostają zgodne z tymi, jakie posiadała komora hibernacyjna, w której się przebudziliśmy.\n\nMuszą to być pozostałości naszej poprzedniej cywilizacji. Jeśli zdołamy uzyskać do nich dostęp, znajdziemy być może odpowiedź na najważniejsze pytania o naszej przeszłości: kim jesteśmy i co się z nami stało?"
 infernals.2500.a: "Rozpoczyna się nasza podróż."
 INF_ORIGIN_COSMIC_DAWN_DRILLING: "Odwierty w skorupie" # from 2500
 INF_ORIGIN_COSMIC_DAWN_DRILLING_DESC: "§Y[owner.Capital.GetName]§!: jeśli chcemy zrozumieć, kim jesteśmy, musimy się najpierw dowiedzieć, skąd przybyliśmy. Niezbędne będzie dotarcie do obiektów zakopanych pod powierzchnią."
 infernals.2505.name: "Przebudzenie naszych braci"
 infernals.2505.desc.a: "Odkryliśmy więcej kapsuł hibernacyjnych, w których znajdują się §Y[root.GetSpeciesNamePlural]§!. Trwa właśnie proces ich wybudzenia, lecz wygląda na to, że nie wiedzą o naszej przeszłości więcej niż my."
 infernals.2505.desc.b: "Odkryliśmy więcej kapsuł hibernacyjnych, w których znajdują się §Y[root.GetSpeciesNamePlural]§!. Nawet po integracji jasnym jest, że nie zachowali żadnych przydatnych wspomnień."
 infernals.2505.a: "Rozpocznijcie wykopaliska na pełną skalę."
 infernals.2505.b: "Usuwajcie tylko to, co konieczne."
 infernals.2505.c: "Zatrudnijcie do prac podwykonawców."
 situation_cosmic_dawn: "Głębokie wykopaliska"
 situation_cosmic_dawn_type: "$situation_cosmic_dawn$"
 situation_cosmic_dawn_monthly_change_tooltip: "Obecne postępy naszych głębokich wykopalisk."
 situation_cosmic_dawn_desc: "Nasze wykopaliska odsłoniły podziemne obiekty skrywające zaawansowaną technologię, zarchiwizowane dane i kapsuły hibernacyjne skrywające więcej naszych uśpionych pobratymców. Zakopana jest tu historia naszego ludu. Jeśli zdołamy ją wydobyć, zrozumiemy wreszcie być może, kim jesteśmy."
 situation_cosmic_dawn_finish_tt: "Aby dowiedzieć się więcej o nas samych, musimy ponownie odkryć naszą odległą przeszłość."
 situation_cd_mod_mining: "$approach_cd_mining$"
 situation_cd_mod_drilling: "$approach_cd_drilling$"
 situation_cd_mod_financial: "$approach_cd_financial$"
 situation_cd_mod_storm: "$TRIGGER_FAIL$ Niedokończony projekt specjalny \"§Y$INF_ORIGIN_COSMIC_DAWN_STORM$§!\""
 situation_cd_mod_bribe: "$TRIGGER_FAIL$ Niedokończony projekt specjalny \"§Y$INF_ORIGIN_COSMIC_DAWN_BRIBE$§!\""
 sit_cd_stage1_tt: "Rozpoczęliśmy przebijanie się przez skorupę planety."
 sit_cd_stage2_tt: "Nie widzimy już stąd powierzchni."
 sit_cd_stage3_tt: "Jesteśmy w połowie skorupy. Temperatura rośnie."
 sit_cd_stage4_tt: "Jesteśmy tak głęboko w skorupie, że słyszymy dobiegający z rdzenia szum."
 sit_cd_stage5_tt: "Nie możemy już zejść niżej - pochłonie nas rdzeń."
 approach_cd_mining: "Kopanie odkrywkowe"
 approach_cd_mining_tt: "Niech wszyscy biorą się za kopanie. Skoro już tu jesteśmy, możemy gromadzić minerały. \nPostęp miesięczny: §Y+$@approach_cd_mining$§!\n\n"
 approach_cd_drilling: "Odwierty celowane"
 approach_cd_drilling_tt: "Wykorzystać najlepszy i najbardziej precyzyjny sprzęt do odwiertów, jakim dysponujemy. Kopcie tylko to, co trzeba. \nPostęp miesięczny: §Y+$@approach_cd_drilling$§!\n\n"
 approach_cd_financial: "Korzyści finansowe"
 approach_cd_financial_tt: "Przenieście pozwolenia dla naszych podwykonawców na ten obszar i zatrzymajcie dla nas część z ich zysków. \nPostęp miesięczny: §Y+$@approach_cd_financial$§!\n\n"
 # Stage 2
 infernals.2510.name: "Amnezja i dane"
 infernals.2510.intro: "Odsłanianie kolejnych kapsuł hibernacyjnych pozwala nam stwierdzić, że utrata pamięci jest niemal całkowita."
 infernals.2510.desc.a: "$infernals.2510.intro$\n\nNiektórzy z naszych nowo przebudzonych pobratymców zadają dokładnie to samo pytanie, nad którym sami się zastanawiamy: \"Kim jesteście?\".\n\nMimo stuleci historii i coraz to bardziej rozwiniętego społeczeństwa nie jesteśmy ani o krok bliżej odpowiedzi niż oni.\n\n$infernals.2510.outro$"
 infernals.2510.desc.b: "$infernals.2510.intro$\n\nŚpiący dotąd, teraz zaś przebudzeni bracia nadal nie posiadają żadnych wspomnień o naszym pochodzeniu, podobnie jak inni. W obliczu braku odpowiedzi musimy wytyczyć własny szlak przez historię.\n\n$infernals.2510.outro$"
 infernals.2510.outro: "W przeciwieństwie do uśpionych osobników, bazy danych skrywają oszałamiające nowe informacje. Dla pewności powtórzyliśmy ich analizę kilkukrotnie, wyniki są jednak niezaprzeczalne. Dane wskazują, że od czasu, kiedy rozpoczęliśmy hibernację, minęło ponad dwanaście miliardów lat.\n\nOznacza to, że pochodzimy z czasów bliskich powstaniu wszechświata, kiedy formowały się pierwsze gwiazdy i planety. Możliwe, że należymy do jednych z pierwszych istot rozumnych, jakie kiedykolwiek wyewoluowały."
 infernals.2510.a: "Nadróbmy wiedzę na temat tego, co nam umknęło."
 infernals.2510.b: "Wszechświat należy nam się z urodzenia."
 # Stage 3
 infernals.2515.name: "Awaria systemów podtrzymywania życia"
 infernals.2515.desc: "Wydobyliśmy na światło dzienne wspomnienie tragedii. Dzienniki z tej sprawnej kapsuły hibernacyjnej ujawniają, że nasz świat, §Y[event_target:homeworld.GetName]§!, przez miliardy lat dryfował w przestrzeni, zanim został przechwycony przez swoją obecną gwiazdę. Wywołało to potężne zjawisko pływów.\n\nChoć siły te ukształtowały wulkaniczny raj, który zwiemy domem, początkowa fala uderzeniowa krytycznie uszkodziła ogniwa zasilające obiektu. Zautomatyzowane systemy priorytetowo potraktowały osoby wyższego stopnia, wyłączając kapsuły o niższym statusie i konserwację strukturalną.\n\n[GetScientistPlural] przewidują, że przed aktywacją, która spowoduje uszkodzenie nieszczelnego źródła zasilania i doprowadzi do całkowitego zapadnięcia się tunelu, można uratować tylko jedną osobę.\n\nGdyby o priorytecie nie stanowiła hierarchia, moglibyśmy ocalić ich o wiele więcej."
 infernals.2515.a: "Postęp naukowy jest najważniejszy."
 infernals.2515.a.tt: "Zyskano przywódcę: £scientist£ §Y$scientist$§!"
 infernals.2515.b: "Uznanie ekspertów za priorytetowych było słusznym wyborem."
 infernals.2515.b.tt: "Zyskano przywódcę: £official£ §Y$official$§!"
 infernals.2515.c: "Należy rozbroić ogniwa bez aktywacji."
 infernals.2515.c.tt: "Jednostki są zastępowalne, a nasze imperium potrzebuje przestrzeni do rozwoju."
 infernals.2520.name: "Międzygwiezdne azyle"
 infernals.2520.desc: "§Y[event_target:leader.GetName]§! odbudowuje archiwa stazy. Najnowsze odkrycia sugerują, że w galaktyce mogą znajdować się liczne pomniejsze populacje [root.GetSpeciesAdj&genitive], pozostające w hibernacji, tak jak niegdyś my.\n\nW archiwach zapisane są pozycje tych światów, lecz ponieważ w tym przedziale czasowym narodziło się i zakończyło swoje istnienie wiele gwiazd, ich znalezienie wymaga skomplikowanej interpolacji. W ramach próby udało się zidentyfikować jedną taką planetę, lecz przetłumaczenie pełnego zestawu danych dopiero się rozpoczyna.\n\nW międzyczasie zrodziła się pośród nas niepokojąca myśl: [root.Capital.GetStarName] to być może nie nasz prawdziwy dom, lecz ledwie jedno z wielu schronień. Jeśli tak, to skąd pochodzimy? I czy to wciąż ma znaczenie?"
 infernals.2520.a: "Musimy odnaleźć naszych krewniaków."
 infernals.2520.b: "Ten świat jest teraz naszym domem."
 cosmic_dawn_anomalies_event_chain_title: "Międzygwiezdne azyle"
 cosmic_dawn_anomalies_event_chain_desc: "W galaktyce mogą znajdować się liczne ukryte populacje [root.GetSpeciesAdj&genitive], pozostające w hibernacji, tak jak niegdyś my.\n\nW archiwach zapisane są pozycje tych światów, lecz ponieważ w tym przedziale czasowym narodziło się i zakończyło swoje istnienie wiele gwiazd, ich znalezienie wymaga skomplikowanej interpolacji."
 # Anomaly 2
 cosmic_dawn_sleepers_category: "Odizolowani uśpieni"
 cosmic_dawn_sleepers_category_desc: "Planeta o tych współrzędnych skrywa rzekomo hibernujących i technologię. Powinniśmy dokładnie to sprawdzić."
 infernals.2525.name: "$cosmic_dawn_sleepers_category$"
 infernals.2525.desc: "§Y[root.leader.GetName]§! odkrywa podziemny obiekt skrywający więcej naszych pobratymców w stanie hibernacji i z powodzeniem ich wybudza. W przeciwieństwie do nas zachowali oni mgliste wspomnienia z poprzednich żyć. Pamiętają też opowieści o wielkim kosmicznym imperium, które może kiedyś przybyć im na ratunek.\n\nSą podejrzliwi, lecz uznają w nas swoich pobratymców. Możemy przedstawić się jako ich od dawna oczekiwani zbawcy, dziedzice tej pradawnej chwały, lub też powiedzieć im prawdę: że tworzymy coś nowego i jesteśmy równie chętni uczyć się od nich, jak uczyć ich.\n\nDodatkowe odwołania w tych archiwach pozwoliły nam zawęzić krąg poszukiwań i wytypować kolejne miejsce z kapsułami hibernacyjnymi."
 infernals.2525.a: "Jesteśmy ich pradawnymi zbawcami."
 infernals.2525.b: "Budujemy coś nowego."
 infernals.2525.c: "Asymilujmy ich."
 # Anomaly 3
 cosmic_dawn_sleepers2_category: "Podejrzliwi uśpieni"
 cosmic_dawn_sleepers2_category_desc: "$cosmic_dawn_sleepers_category_desc$"
 infernals.2530.name: "$cosmic_dawn_sleepers2_category$"
 infernals.2530.desc: "§Y[root.leader.GetName]§! odkrywa kolejną grupę naszych hibernujących pobratymców i z powodzeniem ich budzi, ci jednak reagują strachem i żądają, aby zostawić ich w spokoju. Nie widzą w nas rodaków ani nie życzą sobie naszej obecności.\n\nPo pełnych napięcia negocjacjach wyrażają chęć opuszczenia tego miejsca i zbadania galaktyki. Możemy zaproponować im niskim kosztem prosty statek. Lub też, biorąc pod uwagę stałe zapotrzebowanie na ręce do pracy, możemy przenieść ich do pobliskiej kolonii. Być może wówczas pójdą po rozum do głowy.\n\nArchiwa tej placówki wskazują lokalizację innego świata, na którym znajduje się więcej kapsuł hibernacyjnych."
 infernals.2530.a: "Dajmy im statek."
 infernals.2530.b: "Sprowadźmy ich do nas."
 infernals.2530.b.tt: "Zyskano £pop£ $POPS$: §G+200§!"
 infernals.2530.c: "Asymilujmy ich."
 # Ship returns
 infernals.2531.name: "Powrót"
 infernals.2531.desc: "Uśpieni, którzy wzięli naszą jednostkę, powrócili na pokładzie potężnego okrętu wojennego. Podczas swojej podróży popadli w konflikt z piratami, których przechytrzyli i - koniec końców - pokonali.\n\nPrzejęcie wrogiego okrętu coś w nich obudziło - sami zaczęli parać się piractwem. Podejmowali się coraz to śmielszych napadów, wybierali sobie coraz potężniejsze cele. Nawet udane pirackie przedsięwzięcie nie może jednak trwać wiecznie.\n\nPowrócili więc do domu w poszukiwaniu stabilności, być może też czegoś więcej. Dzięki swojemu okrętowi, doświadczeniu i łupom mogą okazać się dla nas bardzo przydatni."
 infernals.2531.a: "Koszt się zwrócił."
 infernals.2531.a.tt: "Przydałby nam się we flocie ich okręt. Zdobywamy krążownik."
 infernals.2531.b: "Przeróbmy ich okręt tak, aby mógł zasiedlić dla nas nowy świat."
 infernals.2531.b.tt: "Zdobywamy §H$colonizer$§!."
 infernals.2531.c: "Znajdzie się dla nich miejsce w naszej stolicy."
 infernals.2531.c.tt: "Zyskano £pop£ $POPS$: §G+200§!"
 # Anomaly 4
 cosmic_dawn_sleepers3_category: "Port gwiezdny uśpionych"
 cosmic_dawn_sleepers3_category_desc: "$cosmic_dawn_sleepers_category_desc$"
 infernals.2535.name: "$cosmic_dawn_sleepers3_category$"
 infernals.2535.desc: "§Y[root.leader.GetName]§! odkrywa niewielki obiekt hibernacyjny z własnym ukrytym portem gwiezdnym, w którym znajduje się niemal w pełni funkcjonalny statek badawczy - potrzebuje on tylko niewielkich napraw.\n\nObiekt skrywa również wiele danych naukowych, w tym zachowane okazy innych gatunków[GetInterstellarRefugiaDesc2535] Nie jest jasne, czy zostały one odebrane siłą, czy przekazane dobrowolnie, jednostka posiada jednak również cele przeznaczone dla ładunków samoświadomych.\n\nMożemy wiele zyskać na zbadaniu tego znaleziska, a być może natrafimy tam na jeszcze więcej organizmów."
 infernals.2535.contact: ", z których niektóre mogą być przodkami współczesnych istot rozumnych." # prints this in [GetInterstellarRefugiaDesc2535] above
 infernals.2535.nocontact: "." # Can't be empty, so holds the full stop.
 infernals.2535.a: "Zbadajcie okazy."
 infernals.2535.b: "Zwróćcie okazy ich współczesnym krewnym."
 infernals.2535.c: "Zniszczcie dowody."
 # Random Stasis Pods discovered
 infernals.2536.1: "[root.GetSpeciesNamePlural] na planecie [planet.GetName] dołączają do naszych szeregów. Miesiące pracy związanej z wybudzaniem przyniosły efekty."
 infernals.2536.1.a: "Kurs na ten układ!"
 infernals.2536.1.b: "Nie mamy już na to czasu." # ends the chance to spawn more pods.
 infernals.2536.2: "Kolejna kapsuła hibernacyjna została pomyślnie otwarta, a znajdujące się w niej osoby zabrane do domu."
 infernals.2536.3: "[root.GetSpeciesNamePlural] wybudzają się i pomagamy im przystosować się do zimniejszego wszechświata, w którym przetrwanie wymaga korzystania z energii gwiezdnej."
 infernals.2536.4: "[root.GetSpeciesNamePlural] budzą się na planecie [planet.GetName]. To kolejny już sukces."
 infernals.2536.5: "Udało się zlokalizować kolejną kapsułę hibernacyjną."
 infernals.2536.6: "[root.leader.GetName] odkrywa kolejną kapsułę hibernacyjną. [root.GetSpeciesNamePlural] dołączają do nas z odległej przeszłości."
 infernals.2536.7: "[root.leader.GetName] lokalizuje kolejną kapsułę hibernacyjną. [root.GetSpeciesNamePlural] czekają w niej bezpiecznie na wybudzenie."
 infernals.2536.8: "[root.leader.GetName] otwiera starożytną kapsułę hibernacyjną na planecie [planet.GetName]. Wybudzeni muszą przywyknąć do zimniejszego wszechświata."
 infernals.2536.9: "Na planecie [planet.GetName] znaleziono kolejną kapsułę hibernacyjną. [root.GetSpeciesNamePlural] czekają w niej na wybudzenie."
 infernals.2536.10: "[root.GetSpeciesNamePlural] z odległej przeszłości budzą się, aby do nas dołączyć."
 # Stage 4
 infernals.2540.name: "Starożytne więzienie"
 infernals.2540.desc: "Nasze najnowsze wykopalisko przyniosło ze sobą niespodziankę: ta grupa uśpionych przebudziła się stulecia temu, pozostała jednak na miejscu.\n\nAnaliza architektoniczna wskazuje, że obiekt jest zamknięty od wewnątrz. Po przecięciu wzmocnionych drzwi spotkaliśmy się z natychmiastową wrogością - ostatecznie jednak uśpieni się wycofali.\n\nW archiwach może znajdować się wyjaśnienie tej sytuacji, ale wejście do środka może stanowić dalszą prowokację. Możliwe jest też wzięcie obiektu szybkim szturmem lub spróbowanie nakłonienia ich do współpracy poprzez przekupstwo."
 infernals.2540.a: "Przeprowadźmy szturm."
 infernals.2540.b: "Zaoferujmy im dary i przyjaźń."
 INF_ORIGIN_COSMIC_DAWN_STORM: "Szturm na obiekt hibernacyjny"
 INF_ORIGIN_COSMIC_DAWN_STORM_DESC: "Musimy uzyskać dostęp do tego obiektu, a przebudzeni stoją nam na drodze. Usunąć ich siłą."
 infernals.2545.name: "Otwarcie więzienia"
 infernals.2545.desc: "Nasze siły przypuściły szturm i szybko spacyfikowały mieszkańców, mierząc się z niewielkim oporem z ich strony.\n\nArchiwa ujawniają, że miejsce to było więzieniem. Osadzeni to ekstremiści, którzy nawoływali do podejmowania drastycznych technologicznych kroków mających na celu ogrzanie stygnącego wszechświata. Niektóre ich pomysły były absurdalnie niepraktyczne, inne mogły skończyć się katastrofą.\n\nCzęść przywódców więzienia (§Y[root.GetSpeciesNamePlural]§!) zabarykadowała się w centralnym pomieszczeniu z ładunkami wybuchowymi i domaga się pozostawienia więźniów na miejscu i ich ponownego zamknięcia.\n\nTunel można wypełnić niewidzialnym gazem, który unieszkodliwi materiały wybuchowe, aby ocalić obiekt, ale spowoduje to śmierć większości przebywających w nim osób."
 infernals.2545.a: "Wypełnijmy tunel gazem."
 infernals.2545.a.tt: "Zyskano £pop£ $POPS$: §G+100§!"
 infernals.2545.b: "Przeprowadźmy szybką ewakuację."
 infernals.2545.b.tt: "Zyskano £pop£ $POPS$: §G+400§!"
 INF_ORIGIN_COSMIC_DAWN_BRIBE: "Przekupstwo w obiekcie hibernacyjnym."
 INF_ORIGIN_COSMIC_DAWN_BRIBE_DESC: "Jeśli uczynimy mieszkańców obiektu zależnymi od nas, będziemy mieć możliwość zażądania do niego dostępu. Powinniśmy zasypać ich przydatnymi i kluczowymi towarami i zasobami."
 infernals.2550.name: "Otwarcie więzienia"
 infernals.2550.desc: "Miesiące handlu uczyniło dawnych więźniów hibernacyjnych zależnymi od naszych zapasów. Kiedy zagroziliśmy im odcięciem od tego zaopatrzenia, spanikowali i zdali kontrolę nad obiektem.\n\nArchiwa potwierdzają, że był on więzieniem. Osobnicy ci nalegali kiedyś na stworzenie radykalnych technologii mających podnieść temperaturę stygnącego wszechświata. Niektóre pomysły były absurdalne, inne niebezpiecznie praktyczne.\n\nNa szczęście nic z tego nie pamiętają. Naukowcy badają obiekt, zaś dawni więźniowie asymilują się ze społeczeństwem."
 infernals.2550.a: "Dobra robota."
 infernals.2550.a.tt: "Zyskano £pop£ $POPS$: §G+300§!"
 # Stage 5
 infernals.2555.name: "Tragiczny wypadek"
 infernals.2555.intro: "W miejscu ostatnich prac archeologicznych doszło do wypadku. Stacja zasilająca obiekt uległa uszkodzeniu, choć kapsuły hibernacyjne pozostają na razie aktywne."
 infernals.2555.outro: "Nie wiadomo, jak długo systemy pozostaną sprawne. Jeśli chcemy uratować śpiących, musimy zacząć działać, zanim w obiekcie skończy się energia."
 infernals.2555.desc.a: "$infernals.2555.intro$\n\nPodejrzenia padły na kilku z niedawno zasymilowanych termofili z poprzedniego obiektu. Jak głosi plotka, mogli nie być najpilniejszymi z pracowników.\n\n$infernals.2555.outro$"
 infernals.2555.desc.b: "$infernals.2555.intro$\n\nNa wieść o tej katastrofie wcześniejsza społeczność uratowanych termofili zgłosiła się ochotniczo do prac ratunkowych.\n\n$infernals.2555.outro$"
 infernals.2555.a: "Zlikwidujmy wszystkich nielojalnych robotników."
 infernals.2555.b: "Zapłaćmy i zatrudnijmy dodatkową pomoc."
 infernals.2555.c: "Ruszmy na pomoc."
 infernals.2555.d: "Zachowajmy ostrożność."
 # Option events from above (Stage 4)
 infernals.2560.name: "Ratowanie sytuacji"
 infernals.2560.desc: "Ograniczyliśmy dostęp jedynie do naszych najwierniejszych pracowników, minimalizując zakłócenia w akcji ratowniczej.\n\nNiestety, kontrola bezpieczeństwa ograniczyła naszą liczebność, przez co nie zdołaliśmy ocalić obiektów. Śpiący stracili życie.\n\nJedyne pocieszenie możemy odnaleźć w zbadaniu ich technologii. Jej powolny rozpad i wyłączenie się może przynieść nam cenną wiedzę."
 infernals.2560.a: "Jaka szkoda."
 infernals.2565.name: "$infernals.2560.name$"
 infernals.2565.desc: "Zaoferowaliśmy nagrody finansowe za udział w akcji ratunkowej, co spowodowało napływ zgłoszeń.\n\nNiestety, starania sabotowała grupa dawnych więźniów, którzy żywili urazę, że wykorzystaliśmy nasz dobrobyt do przejęcia kontroli. Sabotaż doprowadził do śmierci wszystkich śpiących w kapsułach.\n\nNiewielkim pocieszeniem jest fakt, że to jedyne, co się wydarzyło. Możemy nadal zbadać technologię i archiwa, zaś klęska ta ujawniła braki w naszych analizach bezpieczeństwa, które będziemy mogli załatać."
 infernals.2565.a: "Co za odrażający czyn!"
 infernals.2570.name: "$infernals.2560.name$"
 infernals.2570.intro: "Wielka liczba robotników i ratowników, jacy zjawili się w podziemnym obiekcie, pozwoliła nam szybko i bezpiecznie wydobyć uśpionych z ich wyłączających się kapsuł. [Species.GetName] dołączają do nas. Ci nowi obywatele świadomi tragicznego losu, którego udało im się uniknąć, są wdzięczni za ratunek."
 infernals.2570.outro: "Niestety, podczas tego pospiesznego ratunku wiele z kapsuł trzeba było otworzyć siłą lub w inny sposób zniszczyć, co ogranicza ich wartość dla naukowców."
 infernals.2570.desc.a: "$infernals.2570.intro$\n\n$infernals.2570.outro$"
 infernals.2570.desc.b: "$infernals.2570.intro$\n\nZdaje się też, że ochotnicy spośród zasymilowanych więźniów wspierają tych przybyszów, rozmawiając z nimi i dzieląc zapasami, tym samym ułatwiając im integrację ze społeczeństwem.\n\n$infernals.2570.outro$"
 infernals.2570.a: "Jak dobrze, że mieliśmy tych dodatkowych ochotników."
 infernals.2570.a.tt: "Zyskano £pop£ $POPS$: §G+400§!"
 infernals.2570.b: "Dobra robota."
 infernals.2570.b.tt: "Zyskano £pop£ $POPS$: §G+400§!"
 infernals.2570.c: "$ACKNOWLEDGED$"
 infernals.2570.c.tt: "Zyskano £pop£ $POPS$: §G+400§!"
 infernals.2575.name: "$infernals.2560.name$"
 infernals.2575.desc: "Nasi naukowcy dokładnie przeanalizowali systemy, dbając, abyśmy w pełni rozumieli, z czym mamy do czynienia, zanim podejmiemy próby uratowania hibernującej populacji.\n\nNiestety, proces od analizy po publikację wyników badań trwał zbyt długo. Kiedy byliśmy gotowi, podtrzymywanie życia zawiodło i wszyscy, którzy na nim polegali, zmarli.\n\nChoć to tragiczne, akcja ratunkowa zapewniła nam znaczne korzyści naukowe, zaś odzyskana technologia udowadnia już swoją wartość."
 infernals.2575.a: "Na szczęście żywi wciąż mogą korzystać z wyników naszej pracy."
 infernals.2575.b: "$ACKNOWLEDGED$"
 # Situation completed
 infernals.2580.name: "Nasza historia - ujawniona"
 infernals.2580.desc: "Dotarliśmy w końcu do centralnego rdzenia. Skala przedsięwzięcia jest trudna do objęcia rozumem. Wewnątrz planety znajduje się potężna, zasilana magmą i skrywająca tysiące uśpionych arkologia.\n\nZnajdują się w niej również rozległe archiwa, kronika naszej przeszłości: powstanie galaktycznego imperium, głosy z czasów wielkiego stygnięcia wszechświata. Niektórzy wybrali hibernację, część walczyła z nieuniknionym, inni zaś po prostu nie przyjęli stanu rzeczy do wiadomości i zginęli.\n\nSkarbiec ten ujawnił dawno zapomniane prawdy. Niektórzy uważają, że jest on demonstracją tego, kim tak naprawdę jesteśmy i kim jeszcze możemy się stać. Inni twierdzą, że stworzyliśmy nową, lepszą tożsamość, a społeczeństwo naszych przodków nie przystaje już do dzisiejszego wszechświata.\n\nTak czy inaczej, rozległa sieć tuneli może zostać wykorzystana wedle naszego uznania."
 infernals.2580.a: "Powinniśmy odbudować nasze starożytne imperium."
 infernals.2580.b: "Inne imperia powinny szanować nasze dziedzictwo."
 infernals.2580.b.tt: "Otrzymano przywódcę: £commander£ §Y$commander$§! z §G5.§! poziomem początkowym"
 infernals.2580.c: "Powinniśmy myśleć o przyszłości."
 infernals.2580.d: "Najważniejsze jest, byśmy dobrze sobie radzili."
 # Relic & Specimen
 r_pyroglyphic_codex: "Kodeks piroglifowy"
 r_pyroglyphic_codex_desc: "Misternie wykonane kryształowe obserwatorium przechowujące informacje o cywilizacji istniejącej u zarania dziejów. Dzięki jego zawartości możemy nauczyć się wiele o budowie lepszego społeczeństwa."
 r_pyroglyphic_codex_effect_tt: "\nKiedy $r_pyroglyphic_codex$ zostaje aktywowany §Ypo raz pierwszy§!, na stałe daje naszej stolicy modyfikator §Y$infernal_library$§! z następującymi efektami: $TABBED_NEW_LINE$- $MOD_PLANET_MAX_DISTRICTS_ADD$: §G+5§! $TABBED_NEW_LINE$- $MOD_PLANET_HOUSING_MULT$: §G+20%§! $TABBED_NEW_LINE$- $MOD_PLANET_AMENITIES_ADD$: §G+10%§!"
 infernal_library: "Architektura podziemna"
 infernal_library_desc: "Odkrycie na tym świecie pradawnych technik budowlanych otworzyło nowe możliwości budowania rozległych, potężnych miast. Nieznane nam wcześniej szczegółowość i architektura tworzą widok zapierający dech w piersiach, który przypomina wszystkim obywatelom o ich prawdziwym pochodzeniu."
 pyroglyphic_codex_mod: "$r_pyroglyphic_codex$"
 pyroglyphic_codex_mod_desc: "Fascynujące sekrety odnalezione w kodeksie piroglifowym dały początek nowym kierunkom badań i będą inspirować jeszcze przez wiele lat."
 infernal_stasispod: "Pradawna kapsuła hibernacyjna"
 infernal_stasispod_desc_short: "Pojemnik z syntetycznego kamienia wyposażony w zadziwiająco precyzyjny system regulacji temperatury."
 infernal_stasispod_desc_details: "Pradawna cywilizacja gatunku [Species.GetAdj&genitive] wykorzystywała te kapsuły, by na miliardy lat wchodzić w stan hibernacji, z której budzono się tylko, jeśli temperatury wzrosły na tyle, by dało się w nich przeżyć. Ta kapsuła pochodzi z placówki, w której doszło do awarii wielu systemów, w wyniku czego wielu jej mieszkańców zginęło. To surowe i mocne przypomnienie, jakie próby przetrwali przedstawiciele gatunku [Species.GetAdj&genitive]."
 ####################################
 # Colony Events
 ####################################
 # Imminent Eruption
 infernals.3000.name: "Nieuchronna erupcja"
 infernals.3000.desc: "§Y[planet.GetName]§!: Geologiczne systemy alarmowe ostrzegają, że w ciągu roku dojdzie do wybuchu wulkanu w pobliżu głównej enklawy tego świata.\n\nInwestycja w kontrolowane zmniejszenie ciśnienia mogłoby posłużyć do pozyskiwania energii z przepływającej lawy. Można też rozmieścić ekipy, które zajmą się pobieraniem magmy wprost z miejsca erupcji, by potem wydobyć z niej metale szlachetne. Innym rozwiązaniem jest ewakuacja cywili i zasobów z zagrożonego obszaru, by zminimalizować ryzyko strat.\n\nMożemy też nadal obserwować sytuację, zanim podejmiemy jakiekolwiek działania, gdyby nasze przewidywania okazały się chybione."
 infernals.3000.a: "Ewakuować teren!"
 infernals.3000.a.tt: "Ma zasób: §Y500§! x $energy$"
 infernals.3000.b: "Zaczekajmy i zobaczmy, co się wydarzy."
 infernals.3000.c: "Zajmijmy się pozyskiwaniem energii."
 infernals.3000.d: "Zbierzmy magmę."
 infernals.3005.name: "W samą porę"
 infernals.3005.desc: "Wczesna ewakuacja kolonii okazała się dobrą decyzją. Wulkan wybuchł wcześniej, niż się spodziewaliśmy i poważnie uszkodził okoliczne budynki. Teraz podziemne ciśnienie wulkanu jest minimalne, więc koloniści mogą wrócić i bezpiecznie prowadzić odbudowę."
 infernals.3010.name: "Gniew wulkanu"
 infernals.3010.desc: "Wulkan wybuchł wcześniej, a kolonia nie była przygotowana na tę katastrofę. Infrastruktura została poważnie uszkodzona, zginęło wielu mieszkańców."
 infernals.3015.name: "Zaczekajmy i zobaczmy, co się wydarzy."
 infernals.3015.desc: "§Y[planet.GetName]§!: Po kilku miesiącach aktywność wulkaniczna w pobliżu kolonii ponownie osłabła. Zagrożenie długoterminowe nie minęło, ale na razie kolonia prawdopodobnie jest bezpieczna."
 infernals.3015.a: "Ryzyko się opłaciło."
 infernals.3020.name: "Rozwinięta sieć energetyczna"
 infernals.3020.desc: "Zespoły inżynieryjne stworzyły bezpieczny system powolnego uwalniania z podziemnych komór lawy pod ciśnieniem i kierowania jej do generatorów prądu. Zapewniło to krótkotrwałe korzyści dla sieci elektrycznej kolonii."
 infernals.3025.name: "Gromadzenie magmy"
 infernals.3025.desc: "Erupcja wulkanu została przerwana przez połączenie dezintegratorów ultradźwiękowych i barier materialnych. Dzięki tym elementom na powierzchni powstało ogromne pole magmy, która stwardniała po pewnym czasie. Ekipy górnicze już zaczęły wydobycie minerałów."
 # Lava Sports
 infernals.3030.name: "Sporty lawowe"
 infernals.3030.desc: "Można sądzić, że nikt nie chciałby spędzać czasu w pobliżu otwartych, szybko płynących rzek lawy. §Y[planet.GetName]§! to jednak miejsce inne niż wszystkie.\n\nKoloniści ścigają się poduszkowcami nad aktywnymi strumieniami lawy, unikając po drodze dryfujących głazów i przyspieszając gwałtownie nad lawospadami. Inni obstawiają wyniki tych wyścigów, a jaskinie hazardu przyciągnęły przestępczość zorganizowaną. W wyniku najróżniejszych wypadków zginęło kilku pilotów.\n\nW kolonii nie obowiązuje żadne prawo zabraniające tego rodzaju aktywności, ponieważ nikomu nie przyszło do głowy, że ktoś mógłby robić coś takiego. Możemy wesprzeć kolonistów w ich entuzjazmie i pozwolić, by robili co chcą, jednak mogłoby to okazać się zachętą to jeszcze bardziej niebezpiecznych wyczynów oraz wzrostu przestępczości, hazard związany z tym sportem zyskuje na popularności. Inne rozwiązanie to uregulowanie tych aktywności, co z kolei może wywołać pewne niezadowolenie, ale w dłuższej perspektywie spadnie liczba wypadków śmiertelnych i przestępstw. Możemy też całkowicie zakazać tych wyścigów, to skuteczne rozwiązanie, ale kosztowne w egzekwowaniu."
 infernals.3030.a: "Nie przeszkadzajmy."
 infernals.3030.b: "Uregulujmy ten sport."
 infernals.3030.c: "Zakażmy tych wygłupów!"
 lava_surfboard: "Lawowa deska surfingowa"
 lava_surfboard_desc_short: "Podłużna płyta stalowa z prymitywnym mechanizmem poduszkowym przyspawanym do spodu."
 lava_surfboard_desc_details: "[Event.Planet.GetName]: Ta deska surfingowa została pieczołowicie i pomysłowo sklecona z części zapasowych i służy do poruszania się nad lawą. Jej system poduszkowy oraz osłony termiczne są doskonałe, a estetyka odzwierciedla samowystarczalność kolonistów z pogranicza."
 infernals.3035.name: "Nie przeszkadzajmy!"
 infernals.3035.desc: "§Y[planet.GetName]§!: Pozwolenie kolonistom na podążanie z tym trendem wywołało ogromny boom na sporty lawowe. Obraz pilota mknącego swoim poduszkowcem nad strumieniami lawy szybko stał się wizytówką lokalnej kultury.\n\nNiestety entuzjazm przyćmił bezpieczeństwo. Sporadycznie wciąż pojawiają się doniesienia o ofiarach śmiertelnych, w dodatku lichwiarze wykorzystują hazardowe uzależnienie entuzjastów sportów lawowych. Opinia publiczna w większości akceptuje ten sport, ale w przyszłości powinniśmy bacznie przyglądać się jego negatywnym skutkom."
 infernals.3035.a: "To niepokojące."
 infernals.3040.name: "Środki bezpieczeństwa"
 infernals.3040.desc: "Koloniści początkowo byli niezadowoleni z przybycia przedstawicieli władz imperialnych, którzy zaczęli wprowadzać regulacje odnoszące się do ukochanego lokalnego hobby, jednak nowe środki bezpieczeństwa zastosowane w pojazdach wyścigowych sprawiły, że już praktycznie nie dochodzi do wypadków, w których ktoś ginie lub odnosi poważne obrażenia. Piloci wyścigowi chwalą regulacje zwiększające ich bezpieczeństwo, a opinia publiczna idzie za ich przykładem.\n\nWprowadzono też przejrzystość finansową oraz opodatkowanie hazardu związanego ze sportami lawowymi, a pozyskane w ten sposób środki są przeznaczane na zabezpieczenia dla zawodników. Przestępcy wycofali się z jaskiń hazardu, ale część kolonistów narzeka, że podatki nałożone przez władzę są niesprawiedliwe."
 infernals.3040.a: "Nadmiar ostrożności nie zawadzi."
 infernals.3045.name: "Zakazany sport"
 infernals.3045.desc: "Wysłaliśmy organy ścigania, żeby ukrócić te nielegalne ekscesy. Wywołało to potężny sprzeciw opinii publicznej, a w całej kolonii doszło do protestów. Jednak nieustanny nadzór nad strumieniami lawy i uniemożliwienie ścigania się sprawiły, że liczba zgonów spadła do zera, a hazard praktycznie zniknął."
 infernals.3045.a: "Nie mieliśmy innego wyjścia."
 lava_sports_flow: "Sporty lawowe: §GDozwolone§!"
 lava_sports_flow_desc: "Umożliwienie kolonistom podążania za trendem wywołało gwałtowny wzrost popularności sportów lawowych."
 lava_sports_regulated: "Sporty lawowe: §YRegulowane§!"
 lava_sports_regulated_desc: "Koloniści początkowo byli niezadowoleni z przybycia przedstawicieli władz imperialnych, którzy zaczęli wprowadzać regulacje odnoszące się do ukochanego lokalnego hobby, jednak nowe środki bezpieczeństwa zastosowane w pojazdach wyścigowych sprawiły, że już praktycznie wcale nie dochodzi do wypadków, w których ktoś ginie lub odnosi poważne obrażenia. Piloci wyścigowi chwalą regulacje zwiększające ich bezpieczeństwo, a opinia publiczna idzie za ich przykładem."
 lava_sports_banned: "Sporty lawowe: §RZdelegalizowane§!"
 lava_sports_banned_desc: "Wysłano organy ścigania, by położyły kres tym niebezpiecznym praktykom."
 # Kindled Myths
 infernals.3055.name: "Odświeżone mity"
 infernals.3055.desc: "§Y[pre_ftl_planet.GetName]§!: Przedstawiciele gatunku nie posiadającego napędu nadświetlnego są bliźniaczo podobni do mitycznych istot z naszych najstarszych legend. Częściowo można przypisać to szerokim trendom konwergencji oraz psychologii, ale im lepiej poznajemy ten gatunek, tym więcej znajdujemy powiązań.\n\nCzy to rzeczywiście stworzenia z naszych mitów i legend? To niezwykle ekscytująca perspektywa, moglibyśmy zainwestować w głębsze zbadanie tej kwestii. Ale czasami przypadki mnożą się bez głębszego znaczenia, a nadmierna dociekliwość mogłaby zdradzić tej społeczności naszą obecność, co wywołałoby niezamierzone skutki."
 infernals.3055.a: "Zignorujmy ten przypadek."
 infernals.3055.b: "Zbadajmy to dokładniej."
 infernals.3060.name: "Nierozsądne założenie"
 infernals.3060.desc: "Mimo nawoływań do przeprowadzenia dokładnych badań, dalsze sprawdzanie hipotezy o mitologicznych kosmitach byłoby nierozsądne. Przecież wszystkie gatunki mają własne mity, legendy i spojrzenie na siebie, które mogą słabo współgrać z naszymi osądami. Badania tego tematu zostały wstrzymane, a środki przekierowano na inne przedsięwzięcia."
 infernals.3060.a: "Znajomi, a przy tym zupełnie inni."
 infernals.3065.name: "Prymitywne niepokoje"
 infernals.3065.desc: "W pogoni za powiązaniem tego gatunku z naszymi mitami nasi przedstawiciele zlekceważyli zasady bezpiecznego kontaktu z gatunkami nie posiadającymi napędu nadświetlnego. Na całej planecie tubylcy utrwalili liczne spotkania z naszymi statkami, kradli nasze wyposażenie, a w jednym wypadku porwali jednego z agentów, by przeprowadzić na nim badania. Dowiedzenie się o naszym istnieniu wywołało niepokój oraz spolaryzowane reakcje.\n\nMimo chaosu operacyjnego nasze społeczeństwo nadal ekscytuje się mitologicznymi powiązaniami z tym ludem. W całym naszym imperium ten gatunek jest coraz częściej postrzegany przez soczewkę coraz silniejszego spirytualizmu."
 infernals.3065.a: "Powinniśmy byli zachować większą ostrożność."
 infernals.3070.name: "Zdumiewające odkrycie"
 infernals.3070.desc: "§Y[pre_ftl_planet.GetName]§!: Intensywne badania mieszkańców tego świata doprowadziły do schłodzenia mitologicznych hipotez. Choć można dostrzec wiele paraleli między naszymi najstarszymi opowieściami a tymi istotami, ujawniono także liczne i znaczące różnice.\n\nChoć obraz stał się bardziej skomplikowany, entuzjazm wobec tego gatunku nie osłabł. Pojawiły się sugestie, że może on być pozostałością populacji istot z naszych legend, a zaobserwowane różnice pojawiły się po długim upływie czasu. Dziś jesteśmy zmuszeni traktować ich jako odrębne społeczeństwo, niemniej liczni obywatele naszego imperium czują z nimi więź duchową."
 infernals.3070.a: "Ta chwila ubogaciła nas wszystkich."
 # Molten Core Grand Archive specimen
 infernals.3200.name: "Stopiony rdzeń"
 infernals.3200.desc: "W miarę rozwoju kolonii na planecie §Y[planet.GetName]§! natrafiliśmy na coraz więcej dowodów istnienia tu wymarłej cywilizacji, która znała $sr_living_metal$ i wiedziała jak go używać - choć dotychczas brakowało wskazówek, skąd owa kultura pozyskiwała ten materiał.\n\nNiedawno jednak odkryliśmy odpowiedź: z głębokich strumieni magmy wypłynęła dziwna lśniąca kula otoczona polem siłowym. Trudno powiedzieć, do czego pierwotnie służyła i jak jest zbudowana, ale jedno jest pewne: $sr_living_metal$ wydobywa się z niej równym strumieniem, jeśli na kulę oddziałuje ekstremalnie wysoka temperatura. Choć mamy już rozwiązanie tej zagadki archeologicznej, to teraz musimy postanowić, co z tym zrobić."
 infernals.3200.a: "Zatrzymajmy artefakt."
 infernals.3200.a.accept: "Ten ciekawy przedmiot nie przypomina żadnego z naszych wynalazków. Może nie tylko dawać nam $sr_living_metal$, ale też służyć za wartą zbadania ciekawostkę naukową i historyczną."
 infernals.3200.b: "Wrzućmy ją z powrotem do lawy."
 infernals.3200.b.deny: "Nie ma sensu podziwiać cywilizacji, która nie potrafiła się zaadaptować i wyginęła. Pozbądźmy się tego artefaktu, a potem o nim zapomnijmy."
 infernal_molten_core: "Stopiony rdzeń"
 infernal_molten_core_desc_short: "Srebrzysta kula o falującej, płynnej teksturze, otoczona cicho szumiącym polem siłowym."
 infernal_molten_core_desc_details: "Pole siłowe rdzenia słabnie tylko, gdy działa na nie wysoka temperatura - dopiero wtedy wydostaje się z niego $r_living_metal$. Twórcy tego obiektu już dawno przestali istnieć, ale jest on świadectwem ich wiedzy naukowej i pomysłowości."
 # CD Timeline events
 TIMELINE_EVENT_ORIGIN_CD_START: "Dudniące echa\n§L[GetDate]§!"
 TIMELINE_EVENT_ORIGIN_CD_START_TOOLTIP: "§HPo śladach§!\n§YWydarzenie pochodzenia§!\n\nWykryliśmy słabe, złożone sygnały emitowane głęboko spod powierzchni planety. Ich źródłem jest sieć pradawnych budowli umieszczonych w skorupie, powstałych na długo przed naszą trwającą eony hibernacją."
 TIMELINE_EVENT_ORIGIN_CD_END: "Odkrycie historii\n§L[GetDate]§!"
 TIMELINE_EVENT_ORIGIN_CD_END_TOOLTIP: "§HUkończ ciąg wydarzeń§!\n§YWydarzenie pochodzenia§!\n\nGłęboko we wnętrzu planety odkryliśmy olbrzymią, pradawną placówkę, a w niej kodeks zawierający informacje z dawno minionej epoki. Jesteśmy dziedzicami starożytnej i potężnej spuścizny."
