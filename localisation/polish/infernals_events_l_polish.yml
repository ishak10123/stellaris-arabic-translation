 rg_high_negative_progress: "\nRozrost miesięczny: §G-50§!\n\n"
 approach_reassure_public: "Uspokójmy ludność"
 approach_find_the_cause: "Znajdźmy przyczynę"
 approach_suppress_unrest2: "Stłummy niepokoje"
 approach_disrupt_subspace_tunnels2: "Zakłóćmy działanie tuneli podprzestrzennych"
 approach_add_fuel_to_the_fire3: "Dodajmy oliwy do ognia"
 approach_wait_and_see3: "Poczekajmy i obserwujmy"
 approach_siphon_stellar_material3: "Wyssijmy gwiezdny materiał"
 approach_continue_siphoning4: "Kontynuujmy wysysanie"
 approach_stabilize_the_star4: "Ustabilizujmy gwiazdę"
 approach_cease_activity4: "Zakończmy aktywność"
 approach_reverse_inflation4: "Odwróćmy rozrost"
 approach_at_any_cost: "Za wszelką cenę"
 approach_reassure_public_effect: "Informacja o kryzysie może zdestabilizować społeczeństwo. Zachowajmy go w tajemnicy.$rg_default_progress$"
 approach_find_the_cause_effect: "Rozrostu gwiazdy nie można zatrzymać. Niezbędne jest natychmiastowe i wyczerpujące śledztwo w celu znalezienia jego przyczyny.$rg_default_progress$"
 approach_suppress_unrest2_effect: "Skutecznego rozwiązania nie sposób szukać w warunkach społecznego niepokoju. Należy przede wszystkim przywrócić porządek i stabilność.$rg_default_progress$"
 approach_disrupt_subspace_tunnels2_effect: "Zachowanie integralności naszej gwiazdy wymaga wdrożenia natychmiastowych środków zaradczych. Zakłócenie działania tuneli podprzestrzennych to rzecz kluczowa.$rg_small_progress$"
 approach_add_fuel_to_the_fire3_effect: "Ta sytuacja stanowi okazję do rozpoczęcia głębokościowych operacji wydobywczych na planetach w naszym układzie i zmaksymalizowania pozyskiwania minerałów.$rg_high_progress$"
 approach_wait_and_see3_effect: "Musimy przestać podejmować pochopne decyzje. Zamiast tego powinniśmy być cierpliwi i obserwować sytuację.$rg_small_negative_progress$"
 approach_siphon_stellar_material3_effect: "Być może zdołamy przyspieszyć powrót do normalności, jeśli rozpoczniemy bezpośrednie usuwanie materiału z gwiazdy.$rg_medium_negative_progress$"
 approach_continue_siphoning4_effect: "Możemy wykorzystać tę moc do spalenia naszego układu macierzystego. Potem będziemy mogli poszukać bogactw w jego szczątkach.$rg_high_progress$"
 approach_stabilize_the_star4_effect: "Możemy ustabilizować gwiazdę w jej obecnym stanie i zachować zmiany, jakich dokonaliśmy w celu adaptacji.$rg_no_progress$"
 approach_cease_activity4_effect: "Możemy dezaktywować platformę górniczą i pozwolić gwieździe na powrót do spokojniejszego stanu.$rg_small_negative_progress$"
 approach_reverse_inflation4_effect: "Możemy zmniejszyć naszą gwiazdę z powrotem do dawnego rozmiaru, przywracając naszemu światu macierzystemu przyjazne warunki.$rg_high_negative_progress$"
 approach_at_any_cost_effect: "Musimy, bez względu na koszty, zahamować rozwój w celu uniknięcia katastrofy.\nRozrost miesięczny: §G+0,5§!\n\n"
 INF_ORIGIN_RED_GIANT_TRIANGULATION: "Triangulacja zaburzenia podprzestrzennego"
 INF_ORIGIN_RED_GIANT_TRIANGULATION_DESC: "Dobre miejsce do triangulacji pochodzenia zaburzenia."
 INF_ORIGIN_RED_GIANT_PROTECT_HOMEWORLD: "Ochrona świata macierzystego"
 INF_ORIGIN_RED_GIANT_PROTECT_HOMEWORLD_DESC: "Pracujemy niestrudzenie nad odwróceniem zmian naszej gwiazdy, a jednocześnie nasze formy muszą być przygotowane na działanie ciepła. Adaptacja naszej populacji do wysokich temperatur pomoże nam rozwijać się w nowej, ognistej przyszłości kreowanej przez naszą gwiazdę."
 INF_ORIGIN_RED_GIANT_EXPLOIT: "Eksploatacja termiki"
 INF_ORIGIN_RED_GIANT_EXPLOIT_DESC: "Zwiększone promieniowanie słoneczne powoduje na dłuższą metę poważne kłopoty, jednak możemy je wykorzystać do zwiększenia naszych możliwości przemysłowych i energetycznych."
 INF_ORIGIN_RED_GIANT_BOARD_STATION: "Abordaż stacji"
 INF_ORIGIN_RED_GIANT_BOARD_STATION_DESC: "Ci lekkomyślni obcy eksploatują naszą gwiazdę. Musimy natychmiast wejść na pokład ich stacji i przejąć kontrolę."
 INF_ORIGIN_RED_GIANT_PARLAY: "Ksenolingwistyka awaryjna"
 INF_ORIGIN_RED_GIANT_PARLAY_DESC: "Mieszkańcy stacji kontrolują ssawkę podprzestrzenną, która niszczy naszą gwiazdę. Musimy nawiązać z nimi łączność, by móc z nimi współpracować w celu rozwiązania tego problemu."
 INF_THERMOPHILE_ADAPTATION: "Termofilna ewolucja"
 INF_THERMOPHILE_ADAPTATION_DESC: "Wyruszamy podpalić galaktykę, ale nasze formy muszą być przygotowane na działanie ciepła. Adaptacja naszej populacji do wysokich temperatur pomoże nam rozwijać się w naszej nowej, ognistej przyszłości. \n\n§HPo zakończeniu:§!$TABBED_NEW_LINE$- Dodaje modyfikator \"§Y$crisis_thermophile_adaptation$§!\".$TABBED_NEW_LINE$- §Y$mod_pc_volcanic_habitability$§! ulega zwiększeniu o §G50%§!."
 red_giant_event_chain_title: "$origin_red_giant$"
 red_giant_event_chain_desc: "$origin_red_giant_desc$"
 red_giant_fire_rate: "Pokaz siły"
 red_giant_fire_rate_desc: "Wszystkie załogi są w stanie wysokiej gotowości."
 red_giant_stage_1: "Czerwona gwiazda"
 red_giant_stage_2: "Niestabilny olbrzym"
 red_giant_stage_3: "Gniewny olbrzym"
 red_giant_stage_4: "Pożerający olbrzym"
 red_giant_stage_5: "Nadciągająca nowa"
 red_giant_exploded: "Spopielenie nową"
 red_giant_exploded_mitigated: "Ryzyko nowej zażegnane"
 red_giant_exploit_mod: "Zmaksymalizowana aktywność gwiazdy"
 red_giant_protect_mod: "Mitygacja uszkodzeń cieplnych"
 red_giant_calmed_mod: "Uśpiony czerwony olbrzym"
 red_giant_venting: "Czystka Lusurich"
 NAME_red_giant_miners: "Lusuri"
