 trait_ruler_frontier_spirit: "Duch pogranicza"
 trait_ruler_frontier_spirit_desc: "Ten przywódca koniecznie chce rządzić odległymi gwiazdami."
 trait_ruler_world_shaper: "Budowniczy światów"
 trait_ruler_world_shaper_desc: "Ten przywódca chce kształtować oblicze światów."
 trait_ruler_home_in_the_sky: "Dom na niebie"
 trait_ruler_home_in_the_sky_desc: "Ten przywódca sięga gwiazd."
 trait_ruler_industrialist: "Gorączka górnicza"
 trait_ruler_industrialist_desc: "Ten przywódca mocno koncentruje się na zwiększeniu wydobycia minerałów."
 trait_ruler_eye_for_talent: "Odkrywca talentów"
 trait_ruler_eye_for_talent_desc: "Ten przywódca charakteryzuje się niezwykłą spostrzegawczością. Potrafi dostrzec talent tam, gdzie inni widzą tylko ekscentryczność albo niekompetencję."
 trait_ruler_deep_connections: "Głębokie powiązania"
 trait_ruler_deep_connections_desc: "Ten przywódca doskonale zna poplątaną sieć tworzącą machinę polityczną."
 trait_ruler_deep_connections_2: "$trait_ruler_deep_connections$ II"
 trait_ruler_deep_connections_2_desc: "$trait_ruler_deep_connections_desc$"
 trait_ruler_charismatic: "Charyzmatyczny"
 trait_ruler_charismatic_desc: "Ten przywódca ma wyjątkową charyzmę i z łatwością forsuje swoje pomysły."
 trait_ruler_champion_of_the_people: "Obrońca ludu"
 trait_ruler_champion_of_the_people_desc: "Ten przywódca wydaje się naprawdę troszczyć o swoich poddanych."
 trait_ruler_feedback_loop: "Pętla informacji zwrotnych"
 trait_ruler_feedback_loop_desc: "Wydajne pętle informacji zwrotnych, a także analizy akcji i reakcji sprawiają, że ta jednostka o wiele lepiej prognozuje wyniki."
 trait_ruler_expansionist: "Ekspansyjna"
 trait_ruler_expansionist_desc: "Ten dowódca chce powiększyć terytorium."
 trait_ruler_fertility_preacher: "Rzecznik rodziny"
 trait_ruler_fertility_preacher_desc: "Ten przywódca celuje w zdobywaniu kluczowych zasobów dla rozwijającej się populacji."
 trait_ruler_investor: "Inwestor"
 trait_ruler_investor_desc: "Ten przywódca doskonale zna się na ekonomii i potrafi zmaksymalizować potencjał finansowy."
 trait_ruler_investor_2: "$trait_ruler_investor$ II"
 trait_ruler_investor_2_desc: "$trait_ruler_investor_desc$"
 trait_ruler_investor_3: "$trait_ruler_investor$ III"
 trait_ruler_investor_3_desc: "$trait_ruler_investor_desc$"
 trait_ruler_space_miner: "Wydobywca"
 trait_ruler_space_miner_desc: "Ten przywódca dobrze wie, jak ważna dla gwiezdnej nacji jest eksploatacja zasobów na innych światach."
 trait_ruler_explorer: "Filomacja"
 trait_ruler_explorer_desc: "Ten przywódca słynie z nienasyconej ciekawości. Ponad wszystko ceni badania kosmosu."
