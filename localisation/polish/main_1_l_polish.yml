 RELATIVE_POWER_5: "§RPotężna§!"
 RELATIVE_POWER_5_DESC: "Są o wiele silniejsi od nas. Powinniśmy unikać konfliktu z nimi, chyba że mamy po naszej stronie mocnych sojuszników."
 RELATIVE_POWER_UNAVAILABLE_INTEL: "§YNiedostępne§!"
 RELATIVE_POWER_UNAVAILABLE_INTEL_DESC: "Twoje informacje wywiadowcze są zbyt skromne w porównaniu z względną siłą waszych imperiów."
