 RELATIVE_POWER_1_DESC: "Są o wiele słabsi od nas. Możemy ich zmiażdżyć, jeżeli zechcemy."
 RELATIVE_POWER_2: "§GMniejsza§!"
 RELATIVE_POWER_2_DESC: "Są od nas słabsi i nie należy się nimi przejmować."
 RELATIVE_POWER_3: "§YRówna§!"
 RELATIVE_POWER_3_DESC: "Siłą mogą równać się z nami."
