 AGGRESSIVENESS_NORMAL: "Normalna"
 AGGRESSIVENESS_HIGH: "Duża"
 AGGRESSIVENESS_LOW: "Mała"
 FE_AGGRESSIVENESS: "Agresywność SI"
 FE_AGGRESSIVENESS_TOOLTIP: "§HAgresywność SI§!\nDecyduje o prawdopodobieństwie wypowiadania wojen wrogom przez imperia komputerowe, a tym samym o łącznej liczbie wojen, jakie wybuchną w trakcie kampanii. Niezależnie od ustawienia agresywności SI będzie wypowiadać wojny tylko wtedy, gdy ich postawa względem drugiej strony będzie to dopuszczać."
 FE_DIFFICULTY: "Poziom trudności"
 DIFFICULTY_ADJUSTED_AI_MODIFIERS: "Modyfikatory SI dostosowane do poziomu trudności"
 DIFFICULTY_ADJUSTED_AI_MODIFIERS_TOOLTIP: "§H$DIFFICULTY_ADJUSTED_AI_MODIFIERS$§!\nModyfikatory gospodarcze dla całego imperium są mnożone przez premię §Ypoziomu trudności§! dla imperiów SI. Na przykład technologia dająca +20% £minerals£ $minerals$ z [miner.GetIcon] miejsc pracy w górnictwie da aż +40% imperiom SI, które posiadają: ['concept_grand_admiral']. \n\n§PUwaga:§! Włączenie tej opcji sprawia, że gospodarki SI z późnej fazy gry stają się znacznie silniejsze."
 DIFFICULTY_CIVILIAN_DESC: "Gracz otrzymuje ogromne premie do gospodarki, badań naukowych i limitu marynarki wojennej, a także premię do nawiązywania nowych kontaktów. Poza tym agresywne i zakłócające grę imperia SI są zablokowane."
 DIFFICULTY_CADET_DESC: "Gracz otrzymuje premie do gospodarki, badań naukowych i limitu marynarki wojennej."
 DIFFICULTY_ENSIGN_DESC: "SI nie ma nad graczem początkowej przewagi gospodarczej, naukowej i militarnej."
 DIFFICULTY_CAPTAIN_DESC: "SI otrzymuje niewielkie premie do gospodarki, badań naukowych i limitu marynarki wojennej."
 DIFFICULTY_COMMODORE_DESC: "SI otrzymuje umiarkowane premie do gospodarki, badań naukowych i limitu marynarki wojennej."
 DIFFICULTY_ADMIRAL_DESC: "SI otrzymuje duże premie do gospodarki, badań naukowych i limitu marynarki wojennej."
 DIFFICULTY_GRAND_ADMIRAL_DESC: "SI otrzymuje bardzo duże premie do gospodarki, badań naukowych i limitu marynarki wojennej."
 FE_DIFFICULTY_TOOLTIP: "§HPoziom trudności§!\nTa opcja służy do określenia poziomu trudności.\n\nDostępne ustawienia poziomu trudności to:\n- §Y$DIFFICULTY_CIVILIAN$§!: $DIFFICULTY_CIVILIAN_DESC$\n- §Y$DIFFICULTY_CADET$§!: $DIFFICULTY_CADET_DESC$\n- §Y$DIFFICULTY_ENSIGN$§!: $DIFFICULTY_ENSIGN_DESC$\n- §Y$DIFFICULTY_CAPTAIN$§!: $DIFFICULTY_CAPTAIN_DESC$\n- §Y$DIFFICULTY_COMMODORE$§!: $DIFFICULTY_COMMODORE_DESC$\n- §Y$DIFFICULTY_ADMIRAL$§!: $DIFFICULTY_ADMIRAL_DESC$\n- §Y$DIFFICULTY_GRAND_ADMIRAL$§!: $DIFFICULTY_GRAND_ADMIRAL_DESC$"
 FE_IRONMAN: "Tryb ironman"
 FE_IRONMAN_TOOLTIP: "§HTryb ironman§!\nW trybie ironman polecenia wpisywane z konsoli nie działają, a gra jest regularnie automatycznie zapisywana do jednego pliku. W grach z tym ustawieniem wszystkie decyzje są ostateczne."
 FE_EMPIRES_TOOLTIP: "§HLiczba imperiów SI§!\nOkreśla, ile imperiów SI znajduje się w galaktyce."
 FE_ADVANCED_EMPIRES_TOOLTIP: "§HLiczba zaawansowanych imperiów SI§!\nOkreśla, ile zwykłych imperiów kierowanych przez SI zacznie grę z przewagą w zasobach, technologii i populacji. Prócz tego nie otrzymają one żadnych premii. To ustawienie nie wpływa na ['concept_fallen_empires']."
 FE_IRONMAN_MULTIPLAYER: "§RTryb ironman jest niedostępny w grze wieloosobowej.§!"
 FE_IRONMAN_NOCLOUD: "§RIronman wymaga uruchomienia chmury Steam, a użytkownik musi być zalogowany do Steam.§!"
 FE_IRONMAN_AUTOSAVE: "§RW trybie ironman nie możesz zmieniać częstotliwości automatycznego zapisu.§!"
 FE_GALAXY_SHAPE_TOOLTIP: "§HKształt galaktyki§!\nTa opcja decyduje o kształcie mapy galaktyki.\n\nNiektóre kształty są dostępne tylko dla określonych §Ykształtów galaktyki§!.\n\nDostępne kształty to:\n$concept_galaxy_shape_desc$"
 FE_GALAXY_SIZE_TOOLTIP: "§HRozmiar galaktyki§!\nTa opcja decyduje o liczbie układów słonecznych istniejących w galaktyce i wpływa na domyślną liczbę §Yimperiów kontrolowanych przez SI§!.\n\n§RUwaga:§! Zwiększenie tego ustawienia może znacząco spowolnić działanie gry w końcowych fazach rozgrywki."
 ACHIEVEMENT_TOOLTIP_YES: "§GW tej rozgrywce można zdobywać osiągnięcia.§!"
 ACHIEVEMENT_TOOLTIP_NO: "§RW tej rozgrywce NIE można zdobywać osiągnięć.§!"
 ACHIEVEMENT_TOOLTIP_IRONMAN: "§RTryb człowieka z żelaza nie jest włączony.§!"
 ACHIEVEMENT_TOOLTIP_CHECKSUM: "§RZmieniono sumę kontrolną.§!"
 ACHIEVEMENT_ELIGIBLE: "§GW tej grze można zdobywać osiągnięcia.§!"
 ACHIEVEMENT_CONSOLE_WARNING: "Użycie jakichkolwiek poleceń usuwania błędów wyłączy osiągnięcia."
 ACHIEVEMENT_NOT_ELIGIBLE: "§IW tej grze nie można zdobywać osiągnięć.§!"
 NUM_FALLEN_EMPIRES: "Upadłe imperia"
 FE_FALLEN_EMPIRES_TOOLTIP: "§HLiczba upadłych imperiów§!\nTa opcja określa maksymalną liczbę imperiów typu ['concept_fallen_empires'], które mogą pojawić się w galaktyce."
 NUM_MARAUDER_EMPIRES: "Zbójeckie imperia"
 FE_MARAUDER_EMPIRES_TOOLTIP: "§HLiczba zbójeckich imperiów§!\nTa opcja określa maksymalną liczbę ['concept_marauder_empires', imperiów zbójeckich], które mogą pojawić się w galaktyce.$requires_apoc$"
 NUM_HABITABLE_WORLDS: "Światy do zamieszkania"
 FE_HABITABLE_WORLDS_TOOLTIP: "§HŚwiaty zdatne do zamieszkania§!\nTo ustawienie modyfikuje szansę na to, że planeta znajduje się w ekosferze układu słonecznego, a więc jest zdatna do zamieszkania. Zwiększenie tej wartości stworzy galaktykę z większą ogólną liczbą światów zdatnych do zamieszkania. Na ustawieniu §Y$FE_HABITABLE_WORLDS_RARE$§! światy nadające się do zamieszkania wciąż będą się pojawiać, ale tylko w układach specjalnych.\n\n§RUwaga:§! Zwiększenie tego ustawienia ponad wartość 1x może wpłynąć na szybkość działania w końcowej fazie gry."
 FE_HABITABLE_WORLDS_RARE: "Rzadkie"
 FE_RANDOMIZE: "Losowo"
 FE_RANDOMIZE_EMPIRES_TOOLTIP: "Jeżeli ta opcja jest włączona, zostanie stworzona losowa liczba imperiów SI, znajdująca się w zakresie wyznaczonym przez suwak."
 FE_RANDOMIZE_ADVANCED_EMPIRES_TOOLTIP: "Jeżeli ta opcja jest włączona, losowa liczba imperiów SI będzie zaawansowana od początku gry, liczba ta będzie znajdowała się w zakresie wyznaczonym przez suwak."
 FE_RANDOMIZE_FALLEN_EMPIRES_TOOLTIP: "Jeżeli ta opcja jest włączona, zostanie stworzona losowa liczba upadłych imperiów, znajdująca się w zakresie wyznaczonym przez suwak."
 FE_RANDOMIZE_MARAUDER_EMPIRES_TOOLTIP: "Jeżeli ta opcja jest włączona, zostanie stworzona losowa liczba imperiów zbójeckich, znajdująca się w zakresie wyznaczonym przez suwak."
 FE_CLUSTERED_STARTS: "Umiejscowienie imperium"
 FE_CLUSTERED_STARTS_TOOLTIP: "§HUmiejscowienie imperium§!\nTa opcja określa, czy imperia mają pojawiać się w gromadach, czy rozmieszczone w losowo wybranych miejscach galaktyki."
 FE_ADVANCED_NEAR_PLAYER: "Rozwinięci sąsiedzi"
 FE_ADVANCED_NEAR_PLAYER_TOOLTIP: "§HRozwinięci sąsiedzi§!\nTa opcja określa, czy imperia z ['concept_advanced_empires', początkowymi zaawansowanymi SI] mogą pojawić się w pobliżu gracza. §YWyłączenie§! tej opcji może spowodować wygenerowanie mniejszej niż określona liczby zaawansowanych początkowych SI."
 FE_MID_GAME: "Rok rozp. środk. fazy gry"
 FE_MID_GAME_TOOLTIP: "§H$FE_MID_GAME$§!\nTa opcja określa pierwszy rok, w którym mogą nastąpić wydarzenia ze środkowej fazy rozgrywki, takie ['concept_machine_uprising'] i ['concept_great_khan']."
 FE_GUARANTEED_COLONIES: "Gwarantowane światy zdatne do zamieszkania"
 FE_GUARANTEED_COLONIES_TOOLTIP: "§H$FE_GUARANTEED_COLONIES$§!\nTa opcja kontroluje liczbę światów zdatnych do zamieszkania, które będą należeć do tej samej klasy, co twój świat macierzysty, i na pewno wygenerują się w pobliżu twojego układu początkowego.\n\n§RUwaga:§! Jej wyłączenie może sprawić, że w pobliżu swego świata macierzystego w ogóle nie znajdziesz światów nadających się do zamieszkania."
 FE_VICTORY: "Rok zwycięstwa"
 FE_VICTORY_TOOLTIP: "§H$FE_VICTORY$§!\nTa opcje decyduje o tym, w którym roku może zakończyć się gra, jeśli nie działa ['concept_endgame_crisis'] albo ['concept_war_in_heaven']. Imperium z najwyższą §Iliczbą punktów§! zostanie zwycięzcą rozgrywki. Grę będzie można potem kontynuować.\n\nUstawienie tego suwaka na maksimum wyłączy ten typ zwycięstwa całkowicie."
 FE_END_GAME: "Rok rozp. końc. fazy gry"
 FE_END_GAME_TOOLTIP: "§H$FE_END_GAME$§!\nTa opcja określa pierwszy rok, w którym mogą nastąpić wydarzenia z końcowej fazy rozgrywki, takie jak ['concept_endgame_crises'] i ['concept_fallen_empire_awakening']."
 FE_TECH_SPEED: "Koszt technologii"
 FE_TECH_SPEED_TOOLTIP: "§H$FE_TECH_SPEED$§!\nTa opcja określa, jak szybko zwykłe imperia zyskują ['concept_technologies']."
 FE_TECH_SPEED_DIFFICULTY_SCALE: "Koszty technologii dostosowane do poziomu trudności"
 FE_TECH_SPEED_DIFFICULTY_SCALE_TOOLTIP: "§H$FE_TECH_SPEED_DIFFICULTY_SCALE$§!\nTa opcja określa, jak wybrany poziom trudności wpływa na koszt badań nad: ['concept_technologies']. Ma to większy wpływ na bardziej zaawansowane technologie.\n\nZwiększenie tego wskaźnika czyni grę trudniejszą, szczególnie na wyższych poziomach trudności."
 DIFF_TECH_SCALING_OFF: "Wył."
 DIFF_TECH_SCALING_LOW: "Małe"
 DIFF_TECH_SCALING_NORMAL: "Zwykłe"
 DIFF_TECH_SCALING_HIGH: "Duże"
 DIFF_TECH_SCALING_EXTREME: "Ekstremalne"
 DIFF_TECH_SCALING_OFF_TOOLTIP: "§H$DIFF_TECH_SCALING_OFF$§!\n['concept_technology']: Poziom trudności nie wpływa na koszty tego elementu."
 DIFF_TECH_SCALING_LOW_TOOLTIP: "§H$DIFF_TECH_SCALING_LOW$§!\n['concept_technology']: Zwiększony poziom trudności ma mały wpływ na koszty tego elementu. Koszty bardziej zaawansowanych technologii rosną bardziej niż technologii niższego poziomu."
 DIFF_TECH_SCALING_NORMAL_TOOLTIP: "§H$DIFF_TECH_SCALING_NORMAL$§!\n['concept_technology']: Zwiększony poziom trudności ma średni wpływ na koszty tego elementu. Koszty bardziej zaawansowanych technologii rosną bardziej niż technologii niższego poziomu."
 DIFF_TECH_SCALING_HIGH_TOOLTIP: "§H$DIFF_TECH_SCALING_HIGH$§!\n['concept_technology']: Zwiększony poziom trudności ma duży wpływ na koszty tego elementu. Koszty bardziej zaawansowanych technologii rosną bardziej niż technologii niższego poziomu."
 DIFF_TECH_SCALING_EXTREME_TOOLTIP: "§H$DIFF_TECH_SCALING_EXTREME$§!\n['concept_technology']: Zwiększony poziom trudności ma bardzo duży wpływ na koszty tego elementu. Koszty bardziej zaawansowanych technologii rosną bardziej niż technologii niższego poziomu.\n\n§RUwaga:§! Na wysokich poziomach trudności może to utrudnić, a nawet uniemożliwić pokonanie przeciwników na końcu gry."
 FE_TRADITION_SPEED: "Koszt tradycji"
 FE_TRADITION_SPEED_TOOLTIP: "§H$FE_TRADITION_SPEED$§!\nTa opcja określa, jak szybko zwykłe imperia zyskują ['concept_traditions']."
 FE_NAVAL_CAPACITY_MULT: "$NAVY_SIZE_TITLE$"
 FE_NAVAL_CAPACITY_MULT_TOOLTIP: "§H$FE_NAVAL_CAPACITY_MULT$§!\nPowoduje to pomnożenie limitu marynarki wojennej wszystkich imperiów i łączy się z pozostałymi modyfikatorami limitu marynarki wojennej.\n\n§RUwaga:§! Zwiększenie tego ustawienia może mieć wpływ na działanie i balans w późnej fazie gry."
 FE_COMMAND_LIMIT_MULT: "$COMMAND_LIMIT$"
 FE_COMMAND_LIMIT_MULT_TOOLTIP: "§H$FE_COMMAND_LIMIT_MULT$§!\nPowoduje to pomnożenie limitu dowodzenia wszystkich imperiów i łączy się z pozostałymi modyfikatorami limitu dowodzenia.\n\n§RUwaga:§! Zmiana tego ustawienia może mieć wpływ na balans gry."
 FE_CRISES: "Siła kryzysu"
 FE_CRISES_TOOLTIP: "§KSiła kryzysu§!\nOkreśla siłę floty, gdy działa ['concept_endgame_crises']. Im wyższy mnożnik, tym niebezpieczniejszy będzie kryzys końcowy.\n\nJeśli §Ityp kryzysu§! ustawiono na §Iwszystkie§!, ta wartość zostanie pomnożona przez 2 za każdy przetrwany kryzys końcowy.\n\nNa poziomie trudności §Y$DIFFICULTY_ENSIGN$§! i wyższych wpływa to również na §Ykryzysy w trakcie gry§!."
 FE_PRIMITIVE_WORLDS: "Cywilizacje bez napędu nadświetlnego i gatunki przedrozumne"
 FE_PRIMITIVE_WORLDS_TOOLTIP: "§H$FE_PRIMITIVE_WORLDS$§!\nOkreśla częstość, z jaką w galaktyce występują ['concept_preftl_civilizations'] i ['concept_presapient_species'].\n\nIm wyższa wartość, tym większe prawdopodobieństwo stworzenia tych cywilizacji podczas generowania galaktyki."
 FE_LOGISTIC_CEILING: "Pułap rozwoju logistyki"
 FE_LOGISTIC_CEILING_TOOLTIP: "§H$FE_LOGISTIC_CEILING$§!\nTa opcja decyduje o tym, jak duże są premie do przyrostu populacji, gdy planety są w środkowej strefie krzywej logistyki. Im jest wyższa, tym szybciej będą rozwijać się populacje.\n\n§RUwaga:§! zwiększenie tego ustawienia może wpłynąć na szybkość działania i zrównoważenie w końcowej fazie gry."
 FE_GROWTH_SCALE: "Skalowanie wymaganego przyrostu"
 FE_GROWTH_SCALE_TOOLTIP: "§H$FE_GROWTH_SCALE$§!\nSkaluje przyrost populacji w oparciu o jej wielkość w imperium. Im wyższa wartość, tym wolniejszy przyrost populacji.\n\n§RUwaga:§! zmniejszenie tego parametru może znacząco wpłynąć na szybkość działania i zrównoważenie; zaleca się równocześnie zmniejszyć ustawienie \"§Y$FE_LOGISTIC_CEILING$§!\"."
 FE_LOGISTICS_FLEET_UPKEEP: "Koszty logistyczne utrzymania floty"
 FE_LOGISTICS_FLEET_UPKEEP_TOOLTIP: "§H$FE_LOGISTICS_FLEET_UPKEEP$§!\nKontroluje koszt utrzymania flot ($r_trade$), które znajdują się poza dokami lub na wrogim terytorium. Zwiększenie tego parametru sprawi, że utrzymanie flot w trakcie wojny będzie droższe."
 FE_LOGISTICS_PLANET_DEFICIT: "Koszty logistyczne planetarnego deficytu"
 FE_LOGISTICS_PLANET_DEFICIT_TOOLTIP: "§H$FE_LOGISTICS_PLANET_DEFICIT$§!\nKontroluje koszt zaopatrywania planet ($r_trade$) z lokalnymi deficytami. Zwiększenie tego parametru sprawi, że posiadanie wysoce wyspecjalizowanych planet z dużymi lokalnymi deficytami będzie droższe, nawet jeśli są one zaopatrywane przez inne planety w imperium."
