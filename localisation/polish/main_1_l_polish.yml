 leader_trait_towel: "Powiernik ręcznika"
 leader_trait_towel_desc: "Ręcznik wywiera ogromny efekt psychologiczny."
 leader_trait_percussive_maintainer: "Konserwator udarowy"
 leader_trait_percussive_maintainer_desc: "Nie ma takiego problemu sprzętowego, którego nie rozwiązałby solidny cios pięścią."
 #Ruler
 trait_ruler_corvette_focus: "Priorytet - produkcja korwet"
 trait_ruler_corvette_focus_desc: "Ten przywódca zamierza promować budowę korwet."
 trait_ruler_destroyer_focus: "Priorytet - produkcja niszczycieli"
 trait_ruler_destroyer_focus_desc: "Ten przywódca zamierza promować budowę niszczycieli."
 trait_ruler_cruiser_focus: "Priorytet - produkcja krążowników"
 trait_ruler_cruiser_focus_desc: "Ten przywódca zamierza promować budowę krążowników."
 trait_ruler_battleship_focus: "Priorytet - produkcja pancerników"
 trait_ruler_battleship_focus_desc: "Ten przywódca zamierza promować budowę pancerników."
 trait_ruler_recruiter: "Werbownik"
 trait_ruler_recruiter_desc: "Ten przywódca ma wyjątkową charyzmę, rekruci ustawiają się w długie kolejki, by służyć swemu krajowi."
 trait_ruler_from_the_ranks: "Z szeregów"
 trait_ruler_from_the_ranks_desc: "Ten przywódca ma za sobą awanse w strukturach wojskowych."
 trait_ruler_fortifier: "Fortyfikator"
 trait_ruler_fortifier_desc: "Ten władca dobrze wie, jaka jest wartość stacji wojskowych dla ochrony terytorium."
 trait_ruler_logistic_understanding: "Zrozumienie logistyki"
 trait_ruler_logistic_understanding_desc: "Ten przywódca zdaje sobie sprawę z kluczowego znaczenia dobrze zorganizowanych linii zaopatrzenia."
 trait_ruler_military_pioneer: "Pionier wojskowości"
 trait_ruler_military_pioneer_desc: "Ten przywódca uwielbia nowoczesne technologie wojskowe i budowy okrętów."
 trait_ruler_warlike: "Wojowniczość"
 trait_ruler_warlike_desc: "Ten dowódca nie unika konfliktów."
 trait_ruler_architectural_sense: "Wyczucie architektury"
 trait_ruler_architectural_sense_desc: "Ten przywódca żyje architekturą i inwestuje w wydajniejsze techniki budowlane."
