 CRISIS_TYPE_LABEL: "Typ kryzysu"
 CRISIS_TYPE_LABEL_TOOLTIP: "§HTyp kryzysu§!\nDecyduje o tym, który ['concept_endgame_crisis'] może wystąpić podczas rozgrywki, jeśli tylko nie wyłączono tej funkcji w ustawieniu §Isiły kryzysu§!.\n\nUstawienie na §Iwszystkie§! powoduje, że wszystkie kryzysy zostaną uruchomione w losowej kolejności, ale nie jednocześnie."
