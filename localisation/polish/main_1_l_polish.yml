 leader_trait_maniacal_2_desc: "$leader_trait_maniacal_desc$"
 leader_trait_custom_AI_assistant: "Modyfikowany asystent SI"
 leader_trait_custom_AI_assistant_desc: "Ten przywódca ma własną prostą sieć neuronową, która pomaga w prostym przetwarzaniu danych."
 leader_trait_sapient_AI_assistant: "Myślący asystent SI"
 leader_trait_sapient_AI_assistant_desc: "Ten przywódca ma własną złożoną sieć neuronową zdolną do podejmowania niezależnych decyzji, a nawet introspekcji."
 leader_trait_expertise_materials: "Biegłość w materiałach"
 leader_trait_expertise_materials_desc: "Ten przywódca po latach badań uchodzi za autorytet w dziedzinie materiałoznawstwa."
 leader_trait_expertise_propulsion: "Biegłość w technice napędu"
 leader_trait_expertise_propulsion_desc: "Ten przywódca po latach badań uchodzi za autorytet w dziedzinie napędu kosmicznego."
 leader_trait_expertise_voidcraft: "Biegłość w technice kosmicznej"
 leader_trait_expertise_voidcraft_desc: "Przestrzeń kosmiczna to kolejna granica, więc trzeba ją opanować. Biegłość w technice kosmicznej oznacza opanowanie kosmosu, a co za tym idzie - przyszłości."
 leader_trait_expertise_industry: "Biegłość w przemyśle"
 leader_trait_expertise_industry_desc: "Ten przywódca po latach badań uchodzi za autorytet w dziedzinie przemysłu."
 leader_trait_expertise_field_manipulation: "Biegłość w fizyce pól siłowych"
 leader_trait_expertise_field_manipulation_desc: "Ten przywódca po latach badań uchodzi za autorytet w dziedzinie fizyki pól siłowych."
 leader_trait_expertise_particles: "Biegłość w fizyce cząstek"
 leader_trait_expertise_particles_desc: "Ten przywódca po latach badań uchodzi za autorytet w dziedzinie fizyki cząstek."
 leader_trait_expertise_metaphysics: "Biegłość w metafizyce"
 leader_trait_expertise_metaphysics_desc: "Ten przywódca po latach badań uchodzi za autorytet w dziedzinie metafizyki."
 leader_trait_expertise_psionics: "Biegłość: Psionika"
 leader_trait_expertise_psionics_desc: "Ten przywódca po latach badań uchodzi za autorytet w dziedzinie psioniki."
 leader_trait_expertise_computing: "Biegłość w technice komputerowej"
 leader_trait_expertise_computing_desc: "Ten przywódca po latach badań uchodzi za autorytet w dziedzinie techniki komputerowej."
 leader_trait_expertise_new_worlds: "Biegłość w planetologii"
 leader_trait_expertise_new_worlds_desc: "Prawdziwy wizjoner stara się patrzeć poza horyzont, aby sięgnąć nowych światów i nowych miejsc. Galaktyka jest rozległa i pełna cudów."
 leader_trait_expertise_statecraft: "Biegłość w sztuce rządzenia"
 leader_trait_expertise_statecraft_desc: "Dogłębne zrozumienie sztuki władania państwem daje temu przywódcy przewagę, jeśli chodzi o budowę udanej społeczności i jej ulepszanie."
 leader_trait_expertise_biology: "Biegłość w biologii"
 leader_trait_expertise_biology_desc: "Ten przywódca po latach badań uchodzi za autorytet w dziedzinie biologii."
 leader_trait_expertise_military_theory: "Biegłość w teorii wojskowej"
 leader_trait_expertise_military_theory_desc: "Dogłębne zrozumienie sztuki wojny daje temu przywódcy nowatorski wgląd w proces usprawniania wojskowości."
 leader_trait_curator: "Kurator"
 leader_trait_curator_desc: "Ten przywódca pochodzi z zakonu kuratorów. Jego wiedza na temat technologii i eksploracji jest niedościgniona."
 leader_trait_curator_effect: "$t$Zwiększa szansę na wylosowanie rzadkich technologii."
 leader_trait_curator_hive: "Zasady kuratorów"
 leader_trait_curator_hive_desc: "Ten węzeł przyswoił sobie fundamentalne nauki enklawy kuratorów."
 leader_trait_curator_machine: "$leader_trait_curator_hive$"
