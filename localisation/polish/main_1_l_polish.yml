 slave_army_plural: "Armie niewolnicze"
 slave_army_desc: "Żołnierze-niewolnicy służą swoim panom na polu walki. Większość jest rekrutowana siłą, ale wielu niewolników zgłasza się na ochotnika, ponieważ rozpaczliwie pragną zwiększyć swój przydział żywności albo uciec od morderczej pracy."
