 starting_weapons_missiles: "Broń rakietowa"
 starting_weapons_lasers_desc: "Broń energetyczna emituje skoncentrowane wiązki laserowe w kierunku celów. Jest skuteczna na średnim i bliskim zasięgu, w dużym stopniu ignorując nieprzyjacielski pancerz."
 starting_weapons_projectiles_desc: "Działa elektromagnetyczne miotają w kierunku celów pociski lecące z oszałamiającą prędkością. Mają dość ograniczony zasięg, ale dzięki dużej energii kinetycznej i szybkostrzelności łatwo przegryzają się przez osłony."
 starting_weapons_missiles_desc: "Pociski kosmos-kosmos wyposażone w głowice jądrowe. Mają doskonały zasięg, ale mogą zostać zestrzelone przez systemy obrony bezpośredniej."
 starting_ftl_warp: "Zakrzywiająca"
 starting_ftl_hyperdrive: "Nadprzestrzenna"
 starting_ftl_wormhole: "Czasoprzestrzenna"
 starting_ftl_warp_desc: "Napęd zakrzywiający wytwarza bąbel podprzestrzenny wokół statku, dzięki czemu prędkość jednostki może przekroczyć prędkość światła. Pozwala to na swobodne, ale dość powolne przemieszczanie się między gwiazdami, biorąc pod uwagę duże odległości podróży."
 starting_ftl_hyperdrive_desc: "Hipernapęd umożliwia statkom tymczasowe przejście w nadprzestrzeń. Podróż międzygwiezdna odbywa się szybko, ale ogranicza ją sieć istniejących hiperlinii."
 starting_ftl_wormhole_desc: "Generatory czasoprzestrzenne tworzą w podprzestrzeni tunele łączące dwa punkty, co umożliwia przemieszczanie się na duże odległości. Generatory są tak duże, że nie mieszczą się na statkach, dlatego budowane są specjalne stacje tuneli czasoprzestrzennych."
 RECOMMENDED_BEGINNER: "§G(Nowi gracze)§!"
 RECOMMENDED_ADVANCED: "§R(Zaawansowani gracze)§!"
 TOOLTIP_SETUP_APPEARANCE: "§H$PORTRAIT$§!\nWybierz swój gatunek i wygląd."
 TOOLTIP_SETUP_SPECIES_NAME: "§H$SPECIES_NAME$§!\nWybierz nazwę swojego gatunku."
 TOOLTIP_SETUP_TRAITS: "§H$TRAITS$§!\nWybierz cechy swojego gatunku."
 TOOLTIP_SETUP_RULER: "§H$RULER$§!\nStwórz swojego początkowego przywódcę. Pamiętaj, że niektóre rodzaje rządów mogą zmieniać władców częściej niż inne, a ponadto przywódca morze umrzeć."
 TOOLTIP_SETUP_NAME_CLASS: "§H$NAME_AND_CLASS$§!\nWybierz klasę swojej planety macierzystej i podaj jej nazwę. Wybrana klasa planety stanie się głównym typem świata odpowiadającego twojemu gatunkowi.\n\nInne klasy planet mogą być zamieszkiwane przez twój gatunek w zależności od tego, jak bardzo różnią się one od klasy twojego świata macierzystego."
 TOOLTIP_SETUP_CITY_APPEARANCE: "§H$CITY_GRAPHICS$§!\nWybierz wygląd swoich miast. Nie ma to wpływu na grę."
 TOOLTIP_SETUP_GOVERNMENT: "§H$ETHICS_AND_GOVERNMENT$§!\nWybierz etykę i rodzaj rządów w twoim imperium. Wybór etyki określa dostępne rodzaje rządów."
 TOOLTIP_SETUP_EMPIRE_ADVISOR: "§H$EMPIRE_ADVISOR$§!\nWybierz rodzaj głosu dla alertów i powiadomień."
 TOOLTIP_SETUP_EMPIRE_NAME: "§H$EMPIRE_NAME$§!\nWybierz nazwę swojego imperium."
 TOOLTIP_SETUP_FLAG: "§H$EMPIRE_FLAG$§!\nWybierz flagę swojego imperium."
 TOOLTIP_SETUP_EMPIRE_NAMELIST: "§H$CUSTOMIZE_NAME_LISTS$§!\nWybierz listę, z której będą wybierane nazwy statków, planet i imiona przywódców."
 TOOLTIP_SETUP_SPECIES_EMPIRE_NAMES: "§H$NAMES$§!\nZmodyfikuj nazwę swojego gatunku i imperium."
 TOOLTIP_SETUP_WEAPONS: "§H$STARTING_WEAPONS$§!\nWybierz początkowe uzbrojenie okrętów twojego imperium.\n\nPodczas gry możesz zmieniać elementy broni swoich jednostek. Zajrzyj do §YProjektanta okrętów§!, żeby zmieniać elementy wyposażenia statków."
 TOOLTIP_SETUP_FTL: "§H$FTL_LABEL$§!\nWybierz metodę podróży międzygwiezdnych wykorzystywaną przez twoje imperium. Nie można zmienić rodzaju napędu nadświetlnego poza przypadkami odblokowania bardzo rzadkich technologii. Podczas gry nigdy nie ma możliwości zmiany podstawowych rodzajów napędu nadświetlnego."
 TOOLTIP_SETUP_SHIP_APPEARANCE: "§H$SHIP_GRAPHICS$§!\nWybierz wygląd statków twojego imperium."
