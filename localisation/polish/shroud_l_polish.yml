 building_cradle_sanctum_desc: "Sanktuarium to miejsce przeznaczone do obcowania z Kolebką. [GetCradleSanctumDesc]"
 building_cradle_sanctum_desc_homicidal: "Tutaj umysły spotykają się, by prowadzić rozważania nad obcą wolą naszego patrona troszczącego się o pokój."
 building_cradle_sanctum_desc_default: "Spotykają się tu umysły, by kultywować spokój i budować współpracę w ramach całej galaktyki."
 trust_accord_tt: "Odblokuj £building£ §Y$BUILDING$§!: ['building:building_cradle_sanctum']\nUzyskana technologia: ['technology:tech_federation_code']"
 decision_add_aura_blocker: "Dodaj §I$d_aura_blocker$§! przeszkody terenowe."
 decision_add_aura_blocker_desc: "$the_composer_of_strands_article$ ma swoje ogrody, te gęste lasy są pełne roślinności wzmocnionej przez $zro_lower$."
 decision_add_aura_blocker_tt: "Dodaj na planecie 2 £blocker£ §Yprzeszkody terenowe§!: §H$d_aura_blocker$§!"
 d_aura_blocker: "Roślinność Woalu"
 d_aura_blocker_desc: "Gęstwina niezwykłej roślinności wydzielającej §H$zro_lower$§! w normalnym cyklu rozwoju."
 fertility_accord_tt: "Odblokuj £decision£ §Ydecyzję planetarną§!: §H$decision_add_aura_blocker$§!\nOdblokuj £building£ §Y$BUILDING$§!: ['building:building_composer_sanctum']"
 col_pleasure: "Świat przyjemności"
 col_pleasure_desc: "Dekadencki raj psionicznej rozkoszy. Egzotyczne przyjemności możliwe dzięki modyfikacjom psionicznym tworzą świat transcendentnej rozkoszy."
 col_pleasure_tt: "$col_pleasure_desc$"
 bliss_accord_tt: "Zyskaj zdolność ulepszenia §Y$col_resort$§! do §Y$col_pleasure$§!, co umożliwi budowę §Hsanktuariów§! i ['building:building_psi_corps'], a także zwiększy §Y$i_trade_value$§! o §G5%§!.\nOdblokuj £building£ §Y$BUILDING$§!: ['building:building_instrument_sanctum']"
 bliss_accord_gestalt_tt: "Odblokuj £building£ §Y$BUILDING$§!: ['building:building_instrument_sanctum']"
 shroud.4862.title: "Transformacja: §H[From.GetName]§!"
 shroud.4862.shared: "Nasi [GetTelepathPlural] posłużyli się mocą naszego patrona, a ten zesłał nam nagrodę."
 shroud.4862.desc: "$shroud.4862.shared$ $the_composer_of_strands_color_article_cap$ transformuje świat §H[From.GetName]§! w: $pc_gaia$. Dzięki temu staje się on idealnym habitatem dla gatunku [Root.GetSpeciesAdj&genitive]."
 shroud.4862.a: "$INCREDIBLE$"
 shroud.4862.a.tooltip: "Planeta §H[From.GetName]§! przeszła transformację, teraz to §H$pc_gaia$§!."
 shroud.4890.title: "Potęga: $ACCORD_HINDSIGHT$"
 shroud.4890.desc: "Nasi [GetTelepathPlural] posłużyli się mocą naszego patrona, a ten składa nam propozycję. $whisperers_in_the_void_color_article_cap$ sprawi, że jedna z naszych planet zamieni się w $pc_relic$. Musimy wybrać która."
 shroud.4890.a: "Planeta §H[event_target:hindsight_planet_candidate_1.GetName]§!"
 shroud.4890.b: "Planeta §H[event_target:hindsight_planet_candidate_2.GetName]§!"
 shroud.4890.c: "Planeta §H[event_target:hindsight_planet_candidate_3.GetName]§!"
 shroud.4890.d: "Planeta §H[event_target:hindsight_planet_candidate_4.GetName]§!"
 leader_trait_whispering_mind: "Szepczący umysł"
 leader_trait_whispering_mind_desc: "Umysł tego przywódcy zalewają szepty, każdy z nich ma inne zamiary. Porozumiewa się on nie z jedną istotą, lecz z tysiącami."
 knowledge_accord_tt: "Przywódca może otrzymać cechę §Y$leader_trait_whispering_mind$§!."
 wisdom_accord_tt: "Odblokuj £building£ §Y$BUILDING$§!: ['building:building_whisperers_sanctum']"
 shroud.4935.title: "$ACCORD_CREATION$ w układzie §H[capital_scope.solar_system.GetName]§!"
 shroud.4935.desc: "$shroud.4862.shared$ $end_of_the_cycle_color_article_cap$ sprawił, że $pc_gaia$ pojawił się w naszym układzie §H[capital_scope.solar_system.GetName]§!, dzięki czemu powstał doskonały habitat dla gatunku [Root.GetSpeciesAdj&genitive], ulotny raj, gdzie można kontemplować nadejście końca wszechrzeczy."
 shroud.4935.tooltip: "§H$pc_gaia$§! pojawia się w układzie [capital_scope.solar_system.GetName]: §H[accord_creation_world.GetName]§!"
 shroud.4970.title: "Nadszedł koniec"
 shroud.4970.desc.1: "Zasłona międzywymiarowa zniknęła na krótką chwilę, uwalniając do materialnej rzeczywistości moc psioniczną Woalu."
 shroud.4970.desc.2: "Wszystkie świadome istoty, żywe oraz mechaniczne, zostały wytępione. Wszystkie planety stały się jałowymi skorupami. Nawet gwiazdy rozbłysły po raz ostatni.\n\nMimo to, w naszych ostatnich chwilach, docierał do nas tylko głos wypełniający nasze umysły...\n\n§R\"KONIEC KOŃCÓW\".§!"
 shroud.4970.desc: "Nadszedł $end_of_the_cycle_color_article_cap$.\n\n$end_aura$ pochłonęła galaktykę. Gdy ostatni układ słoneczny padł ofiarą jej mocy, nastąpił wybuch energii o niewyobrażalnej sile.$shroud.4970.desc.1$\n\n$shroud.4970.desc.2$"
 shroud.4970.a: "Doskonałość."
 shroud.4970.a.tooltip.destroyed: "§YGalaktyka została zniszczona.§!"
 shroud.4970.a.tooltip: "Zakończyliśmy cykl.\n\n$shroud.4970.a.tooltip.destroyed$"
 shroud.4971.title: "$shroud.4970.title$"
 shroud.4971.desc.1: "To koniec."
 shroud.4971.desc.2.1: "Niszczycielska §H$PSIONIC_AURA$§!, którą emituje:"
 shroud.4971.desc.2.2: "rozprzestrzeniła się po galaktyce. Gdy ostatni układ słoneczny padł ofiarą mocy aury, nastąpił wybuch energii o niewyobrażalnej mocy."
 shroud.4971.desc.2.3: "Jakby z innego wymiaru rzeczywistości, ta potężna, destrukcyjna moc zmiotła dosłownie wszystko."
 shroud.4971.desc.2.contact_psionic: "$shroud.4971.desc.2.1$ §H[from.GetName]§! $shroud.4971.desc.2.2$ $shroud.4970.desc.1$\n\n$shroud.4970.desc.2$"
 shroud.4971.desc.2.contact_no_psionic: "$shroud.4971.desc.2.1$ §H[from.GetName]§! $shroud.4971.desc.2.2$ $shroud.4971.desc.2.3$\n\n$shroud.4970.desc.2$"
 shroud.4971.desc.2.no_contact_psionic: "$shroud.4971.desc.2.1$ nieznana nam obca cywilizacja $shroud.4971.desc.2.2$ $shroud.4970.desc.1$\n\n$shroud.4970.desc.2$"
 shroud.4971.desc.2.no_contact_no_psionic: "$shroud.4971.desc.2.1$ nieznana nam obca cywilizacja $shroud.4971.desc.2.2$ $shroud.4971.desc.2.3$\n\n$shroud.4970.desc.2$"
 shroud.4971.a: "$crisis.6051.a$"
 #==========================
 # Mindwardens
 #==========================
 MINDWARDEN_ENCLAVE: "$MINDWARDEN$"
 MINDWARDEN_ENCLAVE_plural: "$MINDWARDEN_plural$"
 starbase_mindwarden: "$MINDWARDEN$"
 starbase_mindwarden_plural: "$MINDWARDEN_plural$"
 gov_mindwarden_enclave: "Enklawa strażników umysłu"
 gov_mindwarden_enclave_desc: "Ta organizacja, kierująca się głęboką antypatią do Woalu, dostarcza technologie i usługi, które pozwalają przeciwdziałać potężnym efektom oddziaływań psionicznych."
 civic_mindwarden_enclave: "$ENCLAVE_MINDWARDEN$"
 civic_mindwarden_enclave_desc: ""
 enclave_mindwarden_station: "stacja $MINDWARDEN$"
 enclave_mindwarden_station_plural: "stacje $MINDWARDEN$"
 leader_trait_iron_will: "Żelazna wola"
 leader_trait_iron_will_desc: "Genialny dowódca ($MINDWARDEN_plural$), słynie z doświadczenia w budowaniu silnych umocnień i odporności psychicznej."
 shroud.4190.name: "Zbliża się $PSIONIC_AURA$"
 shroud.4190.desc.intro: "Jakiś czas temu, nasi [GetScientistPlural] zaobserwowali niecodzienne zjawisko: w odległych układach słonecznych pojawiły się fale energii nieznanego pochodzenia, które stopniowo rozprzestrzeniły się na inne układy."
 shroud.4190.desc: "$shroud.4190.desc.intro$ §H$PSIONIC_AURA_PLURAL$§! otrzymały swą nazwę w oparciu o niepotwierdzone teorie o źródłach ich pochodzenia. Jeszcze nie ustaliliśmy, czy są niebezpieczne.\n\nJedna z takich aur została wykryta w układzie §H[from.GetName]§!, która może wejść na nasze terytorium, jeśli nie przestanie się rozszerzać."
 shroud.4190.desc_mindwarden: "Jeżeli teorie dotyczące pochodzenia tego zjawiska są poprawne, to §H[event_target:mindwarden_enclave_country.GetName]§! może znać sposoby przeciwdziałania jego efektom."
 shroud.4190.a: "Być może wkrótce poznamy efekty tego zjawiska."
 shroud.4191.name: "$shroud.4190.name$"
 shroud.4191.desc_1.common: "Wykryliśmy duże natężenie energii psionicznej w układzie §H[from.GetName]§!. Wsłuchując się w echa §HWoalu§!, nasi [GetTelepathPlural] informują, że to zjawisko zostało wywołane przez psioniczną aktywność"
 shroud.4191.desc_1.default: "$shroud.4191.desc_1.common$ obcej cywilizacji."
 shroud.4191.desc_1.contact: "$shroud.4191.desc_1.common$ §H[fromfrom.GetName]§!."
 shroud.4191.desc_2.common: "świadomość i materię w obserwowanej rzeczywistości. Nasze obserwacje wykazały, że te aury mogą rozprzestrzeniać się między układami słonecznymi."
 shroud.4191.desc_2.default: "Tak zwana §H$PSIONIC_AURA$§! emanuje z umysły potężnej istoty zamieszkującej Woal i wpływa na $shroud.4191.desc_2.common$"
 shroud.4191.desc_2.knows_aura: "Wygląda na to, że to imperium opracowało sposoby skanalizowania zjawiska §H$PSIONIC_AURA$§!, emitowanego przez Woal i wpływającego na $shroud.4191.desc_2.common$"
 shroud.4191.desc_3.common: "spodziewamy się, że jej oddziaływania na naszym terytorium są [GetPositiveRivalAdj], dopóki nasze stosunki z emiterem nie ulegną zmianie."
 shroud.4191.desc_3.default: "Nasi [GetTelepathPlural] twierdzą, że emanuje ona zamiarami [GetBenevolentRivalAdj], zatem $shroud.4191.desc_3.common$"
 shroud.4191.desc_3.contact: "Ponieważ mamy dobre [GetLessThanRivalAdj] stosunki z imperium [fromfrom.GetName], $shroud.4191.desc_3.common$"
 shroud.4191.a.rival_organic: "$WORRYING$"
 shroud.4191.a.rival_default: "Sytuacja nie rozwija się po naszej myśli."
 shroud.4191.a.organic: "Dar Woalu."
 shroud.4191.a.default: "Ciekawe zjawisko."
 shroud.mindwarden.back: "$enclave.410.a$"
 shroud.4205.name: "[event_target:mindwarden_enclave_country.GetName]"
 shroud.4205.common: "Witajcie. Przemawiam do was w imieniu imperium [event_target:mindwarden_enclave_country.GetName]."
 shroud.4205.desc: "$shroud.4205.common$\n\nZajmujemy się ochroną przed zagrożeniem ze strony §HWoalu§! i wszystkich, którzy rozprzestrzeniają jego szkodliwe efekty. Wierzymy w umysły wolne od wtargnięć i galaktykę umocnioną do walki z psioniką.\n\nWedług odczytów z naszych czujników psionicznych, nie zaliczacie się do tych zagrożeń. Doskonale. Z przyjemnością pomożemy wam bronić się przed tymi, którzy są tymi niebezpieczeństwami.\n\n$shroud.4205.desc.end$"
 shroud.4205.desc.end: "Jeżeli potrzebujecie wojskowych usług antypsionicznych albo macie zbędne §H$zro_lower$§!, pomożemy wam."
 shroud.4205.desc.return: "Witajcie z powrotem. [event_target:mindwarden_enclave_country.GetName] ceni sobie naszą trwałą współpracę.\n\nOdczyty z naszego czujnika psionicznego są jasne. Nie zostaliście skalani przez §HWoal§!. Dobrze, dobrze...\n\n$shroud.4205.desc.end$"
 shroud.4205.desc.eotc: "Nastał ponury czas. Mimo naszych wysiłków, zbliża się $end_of_the_cycle_color_article$. Jego przerażająca manifestacja grasuje wśród gwiazd...\n\n$shroud.4205.desc.eotc.end$"
 shroud.4205.desc.eotc.end: "Czas połączyć siły i zapobiec psionicznej apokalipsie."
 shroud.4205.desc.merc_first: "Towarzysze strażnicy, mamy dla was dobre wieści. Powstała pierwsza §H$gov_mindwarden_enclave$§!. $shroud.shared_combating_the_shroud$"
 shroud.4205.desc.merc_more: "Towarzysze strażnicy, mamy dla was dobre wieści. Powstała nasza §H$gov_mindwarden_enclave$§!. $shroud.shared_combating_the_shroud$"
 shroud.4205.desc.merc_back: "Witajcie z powrotem, towarzysze strażnicy. §H[mindwarden_enclave_country.GetName]§! ceni sobie naszą trwałą współpracę.\n\n$shroud.4205.desc.end$"
 shroud.4205.desc.return_beginning: "$shroud.4205.desc.end$"
 shroud.4205.desc.return_beginning.eotc: "$shroud.4205.desc.eotc.end$"
 shroud.4205.a: "Czym jest Woal?"
 shroud.4205.b: "Chcemy porozmawiać o §I$sr_zro$§!."
 shroud.4205.c: "§Y$PSIONIC_AURA_PLURAL$§!, czy możemy coś z nimi zrobić?"
 shroud.4205.d: "Mamy dobry cel psioniczny..."
 shroud.4205.e: "£crime£ §Y[GetCrimeDeviancy]§! szerzy się wśród nas, potrzebujemy pomocy."
 shroud.4205.ef: "Potrzebujemy §Ypomocy logistycznej§!."
 shroud.4205.f: "Przydaliby się nam wasi żołnierze."
 shroud.4205.g: "Czy bylibyście skłonni przysłać nam §Ystrażnika§!?"
 shroud.4205.h: "Chcemy rozmowy, której tematem będzie $end_of_the_cycle_article$."
 shroud.4205.i: "Jako wasi §Ypatroni założycielscy§!, mamy dla was propozycję."
 shroud.shared_combating_the_shroud: "Od dziś, §H[mindwarden_enclave_country.GetName]§! zajmie się ważną pracą, jaką jest walka z §HWoalem§! i wszystkimi postaciami przestępczości psionicznej.\n\nJeśli jesteście w potrzebie, możemy zapewnić wam szeroki wachlarz usług zwalczania psioniki: od usuwania §H$zro_lower$§! aż po rekrutację wojsk. Działamy szybko i skutecznie."
 shroud.4210.desc: "§HWoal§! można opisać jako wymiar rzeczywistości istniejący poza zasięgiem zwykłej percepcji. Składa się on w całości ze szkodliwej energii §Hpsionicznej§!. Dotyka on każdej części naszej materialnej galaktyki, choć nie potrafimy go aktywnie dostrzec.\n\nEnergie Woalu mogą pojawić się w wymiarze materialnym dzięki działalności kognitywnej świadomych istot. Te siły są wyjątkowo niebezpieczna i nieprzewidywalne.\n\nZapewnienie bezpieczeństwa waszej populacji wymaga zastosowania środków chroniących przed Woalem. Możemy wam w tym pomóc."
 shroud.shared_text_shroud_seal: "W wyniku działania tych skomplikowanych maszyn $PSIONIC_AURA$ stopniowo znika, zarówno w układzie początkowym, jak i w tych, które są z nim połączone poprzez hiperlinie."
 shroud.4230.desc: "§H$PSIONIC_AURA_PLURAL$§! można likwidować na dwa sposoby.\n\nJeśli na planecie powstanie §H$building_psionic_suppressor$§!, aura będzie stopniowo słabnąć w całym układzie słonecznym i już nie powróci.\n\n§H$SHROUD_SEAL$§! to jeszcze skuteczniejsze rozwiązanie. $shroud.shared_text_shroud_seal$"
 shroud.4230.a: "Nieważne."
 shroud.4230.b: "§Y$tech_psionic_suppression$§! to coś, czego chętnie się nauczymy."
 shroud.4231.desc: "Oczywiście. Niezwłocznie prześlemy dane.\n\nOby te technologie uwolniły was od plagi aury."
 mindwarden_encourage_raid: "Jeśli [event_target:mindwarden_enclave_country.species.GetNamePlural] otrzymają od nas zapłatę, zaatakują znane nam imperium psioniczne."
 shroud.4240.need_psionics: "Nawiązaliśmy kontakt z imperium posiadającym cechę §Y$trait_psionic$§!."
 shroud.4240.desc: "Doprawdy? Cóż, nigdy nie zaznamy prawdziwego pokoju i bezpieczeństwa, kiedy oni zakażają galaktykę psioniką...\n\nDobrze wymierzony atak pokaże, że sprzeciwiamy się tym niebezpiecznym praktykom. Dzięki waszemu wsparciu finansowemu będziemy mogli przeprowadzić taką operację.\n\nWskażcie nam cel, jeśli się zgadzacie."
 shroud.4240.a: "W sumie nieważne."
 shroud.4240.b: "§I[event_target:raid_target_1.GetName]§!"
 shroud.4240.c: "§I[event_target:raid_target_2.GetName]§!"
 shroud.4240.d: "§I[event_target:raid_target_3.GetName]§!"
 shroud.4240.e: "§I[event_target:raid_target_4.GetName]§!"
 mindwarden_raid_cooldown_tt: "§RO kolejny atak strażników umysłu będziemy mogli poprosić dopiero po §Y[root.mindwarden_raid_timer]§!.§!"
 mindwarden_hire_raid: "Po otrzymaniu zapłaty [event_target:mindwarden_enclave_country.GetName] wyślą flotę uderzeniową, która zaatakuje to imperium."
 shroud.4245.desc: "Ach, tak. Wiemy, że parają się psionikom. Demonstracja siły jest uzasadniona.\n\nDziękujemy za wsparcie. Operacja rozpocznie się niebawem."
 mindwarden_raider_modifier: "Antypsioniczny najeźdźca strażników umysłu"
 shroud.4246.name: "$gov_mindwarden_enclave$: atak"
 shroud.4246.common_1: "Przechwycone komunikaty wskazują, że nasi rywale zapłacili im za zaatakowanie naszych układów."
 shroud.4246.common_2: "Nadają na otwartym kanale i zwracają się do nas bezpośrednio."
 shroud.4246.desc: "Flota wojenna imperium §H[event_target:mindwarden_enclave_country.GetSpeciesAdj&genitive]§! zbliża się do naszych granic! $shroud.4246.common_1$. $shroud.4246.common_2$"
 shroud.4247.desc: "Flota wcześniej nie znanej nam potęgi militarnej zbliża się do naszych granic! $shroud.4246.common_1$ Przedstawiają się się jako §H[event_target:mindwarden_enclave_country.GetSpeciesNamePlural]§!. $shroud.4246.common_2$"
 NAME_Mindwarden_Corvette: "Zelota"
 NAME_Mindwarden_Frigate: "Wartownik"
 NAME_Mindwarden_Destroyer: "Inkwizytor"
 NAME_Mindwarden_Cruiser: "Egzorcysta"
 NAME_Mindwarden_Battleship: "Czyściciel"
 NAME_Mindwarden_Titan: "Sędzia"
 mindwarden_defense_modifier: "Siły Obronne Strażników Umysłu"
 shroud.4250.desc: "Doskonale. Powierzenie nam $zro_lower$ umożliwi przeprowadzenie kluczowych badań tej potężnej i powszechnie nadużywanej substancji. Ich wyniki przyniosą korzyści całej galaktyce.\n\nDlatego nasza cena ich zakupu jest o wiele wyższa od średniej galaktycznej."
 shroud.4250.a: "$shroud.mindwarden.back$"
 shroud.4250.b: "Czym jest §I$sr_zro$§!?"
 shroud.4250.c: "Podarujmy £sr_zro£ §I$sr_zro$§!"
 mindwarden_zro_explanation: "Sprzedaj nie więcej niż 100 §Y$sr_zro$§! za pięciokrotność zwykłej ceny ($resolution_category_galactic_market$)."
 mindwarden_zro_cooldown_tt: "§RWięcej $sr_zro$ będziemy mogli dać strażnikom umysłu dopiero po §Y[root.mindwarden_zro_timer]§!.§!"
 shroud.4251.desc: "§Y$sr_zro$§! to rzadko występująca i wysoce niestabilna substancja. Trudno przewidzieć, a tym bardziej kontrolować, skutki jej działania. Celowo lub nie, może wywołać gwałtowne wybuchy energii, siejące masowe zniszczenie.\n\nTe właściwości pochodzą z reakcji z §HWoalem§!, co czyni zro popularnym wśród osób posługujących się psioniką. Niektórzy z nich przyjmują tę substancję jak narkotyk.\n\nChcemy lepiej poznać $zro_lower$ i opracować bezpieczne metody jego utylizacji. Dlatego sowicie płacimy za każdą dostarczoną nam jego ilość."
 shroud.4255.desc: "Dziękujemy za wasz wkład."
 shroud.4260.desc: "Zatem §Y$decision_thought_police$§! to coś dla was. Może wykrywać [GetCriminalDeviant] zamiary, zanim przerodzą się one w działanie.\n\nMetody tej formacji zostały opracowane jako bezpieczna alternatywa dla praktyk psionicznych, techniki naukowe służą do monitorowania kognitywnej aktywności populacji. Dostarcza ona wiedzy o stanach umysłu, nie korzystając groźnych energii §HWoalu§!."
 shroud.4260.a: "$shroud.mindwarden.back$"
 shroud.4260.b: "Rekrutacja: §I$decision_thought_police$§!."
 mindwarden_decision_cooldown_tt: "§RKolejny raz będziemy mogli o to poprosić dopiero po §Y[root.mindwarden_decision_timer]§!.§!"
 mindwarden_decision_explanation: "Odblokowuje jedną £decision£ §Ydecyzję planetarną§!: §Y$decision_thought_police$§!"
 shroud.4262.desc: "Doskonale. Przekonacie się, że ich metody są niezwykle skuteczne."
 shroud.4265.desc: "W rzeczy samej. Nasza współpraca już pokazała, że można poprawić wasze strategie rozmieszczania wojsk.\n\nOczywiście, nie chcemy nikogo urazić, po prostu te dziedziny to nasza specjalność. Bylibyśmy zaszczyceni, gdybyśmy mogli pomóc w tej kwestii tak ważnemu partnerowi, jeśli odpowiednio nas wynagrodzicie."
 shroud.4265.a: "$shroud.mindwarden.back$"
 shroud.4265.b: "Umowa stoi."
 mindwarden_logistics_cooldown_tt: "§RNie możemy zwracać się do strażników umysłu o dalszą pomoc logistyczną aż do: §Y[root.mindwarden_logistics_timer]§!.§!"
 shroud.4267.desc: "Witajcie, ważni partnerzy.\n\nWygasła nasza umowa o pomocy w działaniach logistycznych waszych flot. Chętnie przedłużymy to partnerstwo, jeśli uznacie, że warto to zrobić."
 shroud.4267.a: "Kontynuujmy nasze partnerstwo."
 shroud.4267.b: "Na razie odmawiamy."
 shroud.4266.desc: "Bardzo dobrze. Niezwłocznie zaczniemy działania wspierające flotę."
 shroud.4270.desc: "Nasi $NAME_Mindwarden_Army$ to doskonałe jednostki uderzeniowe. Są wyposażeni do zwalczania różnych zagrożeń, w szczególności przeciwników posługujących się psioniką.\n\nWydaje nam się, że nie pożałujecie wynajęcia ich."
 shroud.4270.a: "$shroud.mindwarden.back$"
 shroud.4270.b: "Zatrudnij: §I$mindwarden_army$§!"
 mindwarden_army_cooldown_tt: "§RO kolejną armię strażników umysłu będziemy mogli poprosić dopiero po §Y[root.mindwarden_army_timer]§!.§!"
 mindwarden_army_explanation: "Zwerbuj armię (§Y$mindwarden_army$§!), którą $transport$ dostarczy do naszego układu stołecznego."
 shroud.4271.desc: "Poszczęściło się wam, bo właśnie mamy kompanię gotową do działania. Wkrótce dotrze do was ich okręt transportowy."
 shroud.4280.desc: "Bardzo byśmy tego chcieli.\n\nSkuteczne przywództwo ma kluczowe znaczenie w walce z §HWoalem§!, a nasi strażnicy mają duże doświadczenie w tłumieniu działalności psionicznej poprzez twarde zarządzanie."
 shroud.4280.a: "$shroud.mindwarden.back$"
 shroud.4280.b: "Zatrudnij: §I$subclass_commander_governor$§!"
 mindwarden_commander_explanation: "\nZatrudnimy strażnika umysłu 5. poziomu $subclass_commander_governor$."
 unlocks_mindwarden_council_position: "\n§EPozwala odblokować miejsce w radzie:§!\n§H$t$$councilor_mindwarden$§!\n$tt$$COUNCIL_POSITION_MODIFIER_BASE$\n$ttt$$mod_country_unity_produces_mult$: §G+1%§!\n$ttt$$planet_crime$: §G-1%§!\n$ttt$$MOD_PSIONIC_AURA_RESISTANCE_MULT$: §G+5%§!\n$COUNCIL_POSITION_AVAILABLE_FOR$$t$$commander_with_icon$\n\n$COUNCIL_POSITION_REQUIREMENTS$$councilor_mindwarden_conditional_tooltip$"
 mindwarden_commander_already_bought: "§ROpłaciliśmy już usługi strażnika umysłu: $subclass_commander_governor$.§!"
 mindwarden_commander_conflicted_leader: "§RNie może mieć przywódcy z: [event_target:shroudwalker_enclave_country.GetName].§!"
 mindwarden_commander_cooldown_tt: "§RO kolejnego przywódcę od strażników umysłu będziemy mogli poprosić dopiero po §Y[root.mindwarden_commander_timer]§!.§!"
 mindwarden_commander_desc: "Ten przywódca, którego przekazała nam $gov_mindwarden_enclave$, opowiada się za nieugiętą postawą wobec działalności psionicznej, w celu ochrony populacji przed szkodliwymi skutkami oddziaływania Woalu."
 mindwarden_commander_catch_phrase: "Tam, gdzie przesącza się Woal, trzeba wypalić ranę."
 shroud.4281.desc: "Mądra decyzja. Oby ich zarządzanie zapewniło na wiele lat bezpieczeństwo waszej populacji."
 shroud.4286.name: "Atak na imperium [FROM.GetName]"
 mindwarden_farewell: "§L\"$gov_mindwarden_enclave$ została niedawne przez was zaatakowana, nie ma usprawiedliwienia dla takiego czynu. Działanie na waszym terytorium, w dowolnej roli, byłoby moralnie i etycznie nie do obrony. Z całą mocą zalecam zatrzymanie bezsensownych walk, ale cokolwiek postanowicie, nie zostanę tu, by wam pomagać\".§!"
 shroud.4286.desc: "$enclave.8000.start$\n\n$mindwarden_farewell$\n\n$enclave.8000.end$"
 shroud.4286.desc.councilor: "$enclave.8000.start$\n\n$mindwarden_farewell$\n\n$enclave.8000.councilor_end$"
 shroud.4290.desc: "To naprawdę poważna sprawa. Nic nie zagraża galaktyce bardziej niż $end_of_the_cycle_color_article$."
 shroud.4290.a: "$marauder.31.e$"
 shroud.4290.b: "Czym jest $end_of_the_cycle_color_article$?"
 shroud.4290.b.response: "Według naszego wywiadu, $end_of_the_cycle_color_article$ to katastrofalna siła pochodząca z §HWoalu§!. Jego moc może manifestować się w rzeczywistości materialnej dzięki współpracy psionicznych intruzów spragnionych władzy.\n\nKoniec sieje zniszczenie w galaktyce poprzez §R$NAME_Reckoning$§! - brutalną istotę zbudowaną z energii psionicznej. Jego ostatecznym celem jest całkowita anihilacja istnienia."
 shroud.4290.c: "Jak pokonać §R$NAME_Reckoning$§!?"
 shroud.4290.d: "§Y$mindwarden_tactics_modifier$§! to coś, czego chętnie się nauczymy."
 shroud.4291.desc: "Obyście zwyciężyli to wielkie zagrożenie dla wszystkiego, co żyje w tej galaktyce."
 shroud.4292.desc: "Stworzyliśmy algorytm, który może wzmocnić wasze ataki na §R$NAME_Reckoning$§!. Zwiększa on skuteczność waszych systemów celowania przeciwko tej istocie psionicznej.\n\nW jego obecnym stanie, każde wykorzystanie kodu wymaga dogłębnej restrukturyzacji w poszczególnych elementach infrastruktury wojskowej. Zatem jest to usługa premium, ale z pewnością uznacie, że warto za nią zapłacić."
 mindwarden_tactics_modifier: "Taktyka strażników umysłu"
 shroud.4295.desc: "$shroud.4205.common$\n\nPoczątkowo zaniepokoiły nas doniesienia, które przekazują $building_materiality_engine_plural$. Ale po bliższej analizie doszliśmy do wniosku, że te urządzenia to obiecujący sposób na niepsioniczną eksploatację tak zwanego §H\"Woalu\"§!.\n\nZachęcamy was do dalszego użytkowania tej technologii i cieszymy się na naszą dalszą współpracę."
 mindwarden_opinion_materiality_engine_tt: "Opinia: £opinion£ §G+$@mindwarden_opinion_materiality_engine|0$§!"
 shroud.4300.desc: "Przeze mnie przemawia do was [mindwarden_enclave_country.GetName].\n\nW oparciu o wskazania naszych czujników psionicznych, całe imperium [Root.GetName] zostało nieodwracalnie zainfekowane przez §HWoal§!.\n\nWasze działania przypieczętowały wasz koniec, a my go przyspieszymy."
 shroud.4300.a: "Dlaczego boicie się Woalu?"
 shroud.4310.desc: "Nie boimy się ani jego, ani jego spaczonych sługusów, ponieważ wiemy, jak z nimi walczyć.\n\nNie oczekuję, że zrozumie to wasze społeczeństwo, oszalałe od jego wpływów."
 shroud.4320.desc.psionic: "Czy zatrucie galaktyki psioniką nie wystarczyło?"
 shroud.4320.desc.default: "Jesteśmy siłą porządku w tej galaktyce, co zyskacie, atakując nas? Nie będziemy bezczynnie przyglądać się waszej wojowniczości."
 shroud.4320.desc.common: "Nie będziemy rozmawiać, dopóki nie potwierdzicie bezwarunkowego zaprzestania ataków."
 shroud.4340.desc: "Wiemy, że macie konszachty z: §H[shroudwalker_enclave_country.GetName]§!. Waszymi czynami nie tylko legitymizujecie ich występki, ale też pomagacie roznosić zarazę §HWoalu§!.\n\nNie zamierzamy świadczyć wam żadnych usług, dopóki będziecie z nimi współpracować."
 shroud.4350.desc: "§HOd czasu zniszczenia ich placówki nie zdołaliśmy odzyskać kontaktu z: [mindwarden_enclave_country.GetName].\n\nProwadząc nasłuch na ich kanale, odbieramy tylko ciszę kosmicznej pustki.§!"
 enclave_opinion_tt: "Opinia: £opinion£ §G+$@positive_opinion|0$§!"
 mindwarden_rival_opinion_tt: "Opinia o [event_target:shroudwalker_enclave_country.GetName]: £opinion£ §R$@negative_opinion|0$§!"
 shroudwalker_rival_opinion_tt: "Opinia o [event_target:mindwarden_enclave_country.GetName]: £opinion£ §R$@negative_opinion|0$§!"
 shroud.4405.title: "Zniszczono: $gov_mindwarden_enclave$"
 shroud.4405.desc_common: "Nasza ofensywa w układzie [mindwarden_enclave_system.GetName] powiodła się. §H[mindwarden_enclave_country.GetName]§! już nie istnieje."
 shroud.4405.desc.default: "$shroud.4405.desc_common$ Chociaż obyczaje, którymi gardzili, nie miały dla nas większego znaczenia, ich krucjata przeciwko §HWoalowi§! była odzwierciedleniem pseudonaukowego dogmatyzmu, dla którego w naszej galaktyce nie powinno być miejsca."
 shroud.4405.desc.psionic: "$shroud.4405.desc_common$ Nie będą dłużej rozpowszechniać swoich prymitywnych dogmatów dotyczących zagrożeń płynących z §HWoalu§!, a tłumiki psioniczne ich stacji są już złomem."
 shroud.4405.desc_end: "Nasze zwycięstwo to podwójny sukces, bo z wraku ich stacji pozyskaliśmy dużą ilość zasobów."
 shroud.4406.title: "Zniszczono: $gov_mindwarden_enclave$"
 shroud.4406.desc_common: "Otrzymaliśmy doniesienia, że §H[mindwarden_enclave_country.GetName]§! z układu [mindwarden_enclave_system.GetName] już nie istnieje. Ta $gov_mindwarden_enclave$ nie oparła się uderzeniu potężnego §H[mindwarden_destroyer.GetName]§!, który zamienił ich stację w złom. Prawdopodobnie żaden wróg nie ocalał."
 shroud.4406.desc.psionic: "Galaktyka jest już wolna od cierpień wywoływanych przez ich antypsioniczną krucjatę, przynajmniej dopóki nikt nie zajmie ich miejsca."
 shroud.4406.desc.default: "W najbliższym czasie galaktyka musi sobie poradzić bez ich usług antypsionicznych."
 shroud.4406.a: "Nie będziemy po nich płakać."
 shroud.6855.desc: "Ogłoście to wszem i wobec. Cieszymy się z dalszej, bliskiej współpracy z imperium [root.GetName]. Nasze cele oraz historia łączą nas na zawsze."
 shroud.6855.desc.1: "Jesteśmy wam ogromnie wdzięczni za wsparcie udzielone imperium [mindwarden_enclave_country.GetName]. Dopóki nie zniknie zagrożenie psioniczne, nasza więź będzie silna i niezłomna."
 shroud.6855.desc.2: "Możecie być pewni, że następna dywidenda zostanie wypłacona błyskawicznie."
 shroud.6855.b: "Chcemy pomóc wam rozbudować waszą enklawę."
 shroud.6855.b.timeout: "Enklawa werbuje obecnie nowych oficerów i załogę. Rozpoczęcie kolejnych ulepszeń operacyjnych będzie możliwe dopiero po: §Y[mindwarden_enclave_country.upgraded_station_timer]§!."
 shroud.6855.c: "Chcemy podzielić się z wami naszą technologią."
 shroud.6855.c.timeout: "Enklawa nadal wykorzystuje dostarczoną przez nas starszą technologię. Możemy podzielić się z nią nowymi technologiami za §Y[mindwarden_enclave_country.updating_databanks_timer]§!."
 shroud.6855.d: "Potrzebna jest nam §Yflota§!, która pozwoli nam zrealizować nasze cele."
 shroud.6855.e: "$enclave.205.b$"
 shroud.6855.f: "Chcemy zwiększyć pojemność naszej enklawy strażników umysłu."
 shroud.6855.f.timeout: "Wciąż wprowadzamy zmiany w infrastrukturze powiązanej z enklawą. Nie możemy ponownie powiększyć pojemności enklawy strażników umysłu aż do §Y[mindwarden_enclave_country.mindwarden_enclave_capacity_bought_timer]§!."
 shroud.6860.1.desc: "Dzięki dodatkowym pieniądzom moglibyśmy znacznie rozszerzyć zakres naszych działań. Możemy zwiększyć zdolności i liczbę naszych flot, a także zatrudnić więcej badaczy, którzy rozwiną nasze technologie ochrony umysłu. Wasz patronat przyniósłby korzyści całej galaktyce."
 shroud.6860.2.desc: "Musimy zachować czujność, gdyż zagrożenie psioniczne nieustannie ewoluuje. Wasz hojny wkład pozwoli nam znacznie powiększyć zakres naszych działań mających na celu walkę z tym wyzwaniem."
 shroud.6860.3.desc: "Wiele osiągnęliśmy, ale jeszcze nie czas na odpoczynek. Gdybyśmy mieli więcej zasobów, floty imperium [mindwarden_enclave_country.GetName] mogłyby docierać do jeszcze dalszych zakątków galaktyki, chronić jeszcze więcej umysłów nękanych przez psioników."
 shroud.6860.4.desc: "Dzięki waszemu patronatowi mogliśmy wyruszyć w tę wielką podróż, a nasze wspólne cele pozostają niezmienne: dbałość o dobrostan umysłowy poprzez całkowitą likwidację psioniki. Dzięki waszej pomocy coraz bardziej zbliżamy się do realizacji tego celu."
 shroud.6860.5.desc: "Jeżeli uznacie, że warto ponownie zainwestować w naszą działalność, staniemy się największą siłą antypsioniczną w galaktyce. Najpotężniejszym bastionem walczącym z inwazją na umysły wszystkich nacji mieszkających wśród gwiazd."
 shroud.6860.b: "Zatem mamy porozumienie."
 shroud.6861.desc: "Dziękujemy. Jesteśmy dumni, że możemy współpracować z wami na rzecz ochrony spójności psychicznej wszystkich istot żywych."
 shroud.6865.desc: "To dobre przedsięwzięcie. $ENCLAVE_MINDWARDEN_PLURAL$ są potrzebne w całej galaktyce, by chroniły wszystkie umysły przed inwazją.\n\nMożemy doradzać wam w kwestii usprawniania wydajności waszej infrastruktury, co pozwoli zakładać kolejne enklawy i zarządzać nimi."
 shroud.6865.b.tt: "$mindwarden_enclave_capacity$: §G+1§!"
 shroud.6870.desc: "Dziękujemy wam za chęć dzielenia się owocami waszych badań. Wszelka przekazana nam wiedza wzmocni ochronę galaktyki przed zagrożeniami psionicznymi."
 shroud.6875.desc: "Będziemy zaszczyceni. Floty imperium [mindwarden_enclave_country.GetName] są liderami na polu technologii i taktyki antypsionicznej. Nie ma z nimi szans żaden agresor atakujący umysły. Każda z nich posiada dowódcę przeszkolonego do walki z przeciwnikami posługującymi się psioniką."
 mindwarden_tt_hirefleet: "Przejmij dowodzenie §Yflotą strażników umysłu§! z tej enklawy na 10 lat."
 shroud.6876.desc: "Wierzymy, że §H[mercenary_fleet.GetName]§! okaże się skutecznym narzędziem do walki z tymi, którzy igrają z niszczycielską mocą psioniki."
 mindwarden_tt_managefleet: "Anuluj lub przedłuż swój kontrakt na §Yflotę strażników umysłu§!."
 shroud.6880.desc: "Oczywiście. Mamy nadzieję, że §H[mercenary_fleet.GetName]§! sprawdza się jako cenne wzmocnienie waszych wojsk. Chcecie zerwać, czy przedłużyć nasz kontrakt?"
 shroud.6880.a: "$marauder.31.e$"
 shroud.6881.desc: "Dobrze więc. Kontrakt został unieważniony, a §H[mercenary_fleet.GetName]§! niezwłocznie do nas wróci. Możecie znowu wynająć nasze floty, gdy tylko będą wam potrzebne."
 #======================
 # Mindwardens origin
 #======================
 origin_mindwardens: "$MINDWARDEN_plural$"
 origin_mindwardens_desc: "$CHALLENGING_ORIGIN$§ROSTRZEŻENIE: Blokuje dostęp do: ['concept_psionic_ascension'].§!\n\nPrzodkowie tej cywilizacji byli nękani przez siły z innego świata, które wdzierały się do ich umysłów, dlatego poświęcili wiele sił i środków na opracowanie technologii antypsionicznej.\n\nIch pradawne urządzenia nadal działają, ale nie zostały wypróbowane na psionicznych zagrożeniach z innych zakątków galaktyki."
 origin_tooltip_mindwardens_effects: "- $ADDITIONAL_TECHNOLOGIES_STRING$ £engineering£ ['technology:tech_starbase_3']\n- $HOME_SYSTEM$ Zaczniesz z: §H$tech_starbase_3$§!.\n- $HOMEWORLD$ £building£ ['building:building_ancient_ward_1']\n- Otrzymasz dostęp do §Hcasus belli§! §Y$casus_belli_cb_psionics_containment$§! przeciwko imperiom posługującym się psioniką.\n- §Y$FE_GUARANTEED_COLONIES$§! nie pojawiają się.\n- §Y$ENCLAVE_MINDWARDEN_PLURAL$§! nie są generowane na początku gry."
 SPECIES_CLASS_MUST_USE_ORIGIN_MINDWARDENS: "Wymaga pochodzenia §Y['civic:origin_mindwardens']§!"
 START_SCREEN_MINDWARDENS: "Archiwa naszych przodków wspominają o zarazie psionicznej, która kiedyś zniszczyła świat [GetHomeWorldName]. Siły z innego świata zaatakowały ich umysły, a niszczycielskie promieniowanie rozeszło się w atmosferze. Dokonało się to za sprawą psioników w społeczeństwie [GetSpeciesAdj&genitive].\n\nW odpowiedzi na te niebezpieczeństwa nasi przodkowie zbudowali $building_ancient_ward_1$, aby bronić się przed siłami wnikającymi w umysły. Wystarczyła tylko rutynowa konserwacja, by wszyscy [GetSpeciesNamePlural] byli chronieni przez tę wiekową budowlę przed groźnymi wpływami psionicznymi, a w oparciu o jej podstawowe technologie powstały inne elementy chroniące jaźń.\n\nNasza cywilizacja szykuje się do podróży poza orbitę świata [capital_scope.System.GetName], zatem przyjdzie nam zmierzyć się z nieznanym. Czy napotkamy jakieś nieznane niebezpieczeństwa psioniczne?"
 mindwarden_system_init_NAME: "$origin_mindwardens$"
 mindwarden_system_init_DESC: "To zawsze będzie układ początkowy w przypadku pochodzenia: $origin_mindwardens$.\n\n$system_initializer_DESC$"
 mindwarden_sol_system_init_NAME: "$origin_mindwardens$ (Sol)"
 mindwarden_sol_system_init_DESC: "Opcjonalny układ początkowy dla pochodzenia: $origin_mindwardens$. Ich bazą jest Sol.\n\n$system_initializer_DESC$"
 building_ancient_ward_1: "Pradawna bariera"
 building_ancient_ward_1_desc: "Ta pradawna budowla wykorzystuje tłumiki psioniczne, by izolować całą planetę od sił próbujących wdzierać się do umysłów."
 building_ancient_ward_2: "Wielka bariera"
 building_ancient_ward_2_desc: "Ta pradawna budowla została wzbogacona o silniejsze tłumiki psioniczne, które chronią cały układ słoneczny przed oddziaływaniami, które generuje $PSIONIC_AURA_PLURAL$."
 psionic_auras_immunity: "Sprawia, że §Y$PSIONIC_AURA_PLURAL$§! w układzie stopniowo znikają"
 mindwarden_aura_immunity: ""
 war_goal_wg_end_threat_psionics: "$war_goal_wg_end_threat$"
 war_goal_wg_end_threat_psionics_desc: "Trwa wojna w obronie galaktyki przed zagrożeniami zarazy psionicznej."
 casus_belli_cb_psionics_containment: "Skażenie psioniczne"
