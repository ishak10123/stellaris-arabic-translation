 # End of the Cycle
 situation_end_of_the_cycle: "$name_eotc$"
 situation_end_of_the_cycle_desc: "Zawarliśmy pakt z: $end_of_the_cycle_color_article$. Dzięki temu zyskaliśmy potężną siłę. Nasi [Owner.GetTelepathPlural] przypuszczają, że koszt tego porozumienia można przesunąć w czasie poprzez wejście w kolektywny trans psioniczny - ale na krótko.\n\nSilna $PSIONIC_AURA$ jest manifestacją woli naszego patrona. Jeżeli chcemy wywołać Koniec, musimy dążyć do szerzenia tej aury. Gdy nas przybywa i zwiększa się siła naszych umysłów, rosną też zasięg i siła aury.\n\nUkłady do podbicia: §Y[Owner.GetEndCycleGalaxySystemsLeft]§!"
