 psionic_painkillers_machine_gestalt_desc: "$psionic_painkillers_machine_desc$"
 psi_fighting_conscription: "Konskrypcja psionicznych wojowników"
 psi_fighting_conscription_desc: "Uczestnicy nielegalnych psionicznych walk wzmocnili nasze armie, lecz nie wszyscy zwykli rekruci chcą walczyć u ich boku."
 psi_fighting_conscription_gestalt: "$psi_fighting_conscription$"
 psi_fighting_conscription_gestalt_desc: "Podziemni wojownicy psioniczni wzmocnili nasze armie, jednak integracja tych odszczepieńców to nieustające wyzwanie dla naszego wojska."
 psi_fighting_research: "Badania nad psionicznymi wojownikami"
 psi_fighting_research_desc: "Uczestnicy nielegalnych psionicznych walk okazali się fascynującymi przedmiotami badań."
 psi_fighting_prohibition: "Zakaz walk psionicznych"
 psi_fighting_prohibition_desc: "Zakończenie mody na nielegalne psioniczne walki uczyniło nasze kolonie bezpieczniejszymi."
 psi_fighting_competitions: "Turnieje walk psionicznych"
 psi_fighting_competitions_desc: "Walki psioniczne okazują się być ogromnie popularnym sportem."
 psi_fighting_competitions_gestalt: "$psi_fighting_competitions$"
 psi_fighting_competitions_gestalt_desc: "Walki psioniczne stanowią akceptowalną formę rekreacji dla kolektywu."
 shroudfall: "Opad Woalu"
 shroudfall_desc: "Woal pochłonął część tego terenu. Badacze poszukują sposobów na przywrócenie na nim dawnych warunków."
 add_shroudfall_concept: "Dodanie ['concept_shroudfall', opadu Woalu] do imperium [This.GetName]"
 impulse_mitigation: "Negacja impulsów"
 impulse_mitigation_desc: "Istnieją psioniczne byty wpływające na nasze czyny. Poświęciliśmy zasoby naukowe na poszukiwanie metod tłumienia tych impulsów."
 shroud_influence: "Nasłuchiwanie głosów"
 shroud_influence_desc: "Nasze umysły pozostają pod wpływem bytów komunikujących się z nami psionicznie."
 shroud_suppression: "Tłumienie impulsów"
 shroud_suppression_desc: "Istnieją psioniczne byty próbujące wpłynąć na nasze czyny. Musimy stłumić te obce impulsy."
 psionic_inhibitors: "Inhibitory psioniczne"
 psionic_inhibitors_desc: "Inwestujemy w rozwój implantu mającego powstrzymać psychiczne zaburzenia powodowane przez aktywność psioniczną."
 psionic_inhibitors_machine: "$psionic_inhibitors$"
 psionic_inhibitors_machine_desc: "Inwestujemy w rozwój ulepszenia mającego powstrzymać obliczeniowe zaburzenia powodowane przez aktywność psioniczną."
 psionic_meditation: "Medytacja psioniczna"
 psionic_meditation_desc: "Aby zażegnać psychicznym zaburzeniom powodowanym przez aktywność psioniczną, badamy ulepszone metody medytacji dla naszej populacji."
 psionic_meditation_machine: "$psionic_meditation$"
 psionic_meditation_machine_desc: "Aby zażegnać zaburzeniom obliczeniowym powodowanym przez aktywność psioniczną, badamy ulepszone metody medytacji dla naszej populacji."
 psionic_training: "Trening psioniczny"
 psionic_training_desc: "Psioniczne zakłócenia działania naszego umysłu to okazja do wzrostowej psynergii. Nasze proaktywne podejście do sprawy pozwoli na stworzenie skutecznych, skupionych na psionice strategii optymalizujących całościowe rezultaty."
 sleep_disturbance_research: "Badania nad zaburzeniami snów"
 sleep_disturbance_research_desc: "Energia psioniczna zaburza nasze cykle snu. Zainwestowaliśmy zasoby w znalezienie sposobu na uwolnienie się od koszmarów."
 night_terrors: "Nocne mary"
 night_terrors_desc: "Energia psioniczna zaburza nasze cykle snu straszliwymi koszmarami."
 night_terrors_gestalt: "$night_terrors$"
 night_terrors_gestalt_desc: "$night_terrors_desc$"
 shroud_portal: "Portal do Woalu"
 shroud_portal_desc: "Próba przebicia Woalu wywołała falę ataków ze strony miejscowych dzikich zwierząt. To cena, jaką płacimy za dbanie o nasz psioniczny rozwój."
 shroud_portal_gestalt: "$shroud_portal$"
 shroud_portal_gestalt_desc: "$shroud_portal_desc$"
 mindwarden_enclave_capacity: "$gov_mindwarden_enclave$ - limit"
 mindwarden_enclave_capacity_desc: "Zwiększając nasz limit budowy, dzięki któremu powstaną kolejne niezależne $ENCLAVE_MINDWARDEN_PLURAL$, przyspieszymy realizację naszej misji zakończenia toczącej galaktykę psionicznej zarazy."
 mindwarden_logistics: "Logistyka strażników umysłu"
 mindwarden_logistics_desc: "Wsparcie logistyczne ze strony strażników umysłu ułatwia działania naszej floty."
 survivors_of_the_end_modifier: "Ci, którzy przetrwali Koniec"
 survivors_of_the_end_modifier_desc: "Potężna $PSIONIC_AURA$ zadała nam ogromne straty, ale przetrwaliśmy."
 penal_experimental_sentencing: "Doskonałe warunki do testów"
 penal_experimental_sentencing_desc: "Założona przez nas kolonia karna to doskonałe miejsce do prowadzenia intensywnych eksperymentów."
