 policy_psionic_choir: "Chór psioniczny"
 policy_psionic_choir_desc: "Telepaci gromadzą się, żeby harmonizować z energiami Woalu. Ich melodie rezonują wśród populacji psioników w imperium, skupiając i udoskonalając ich wysiłki."
 song_of_calming: "Pieśń ukojenia"
 song_of_calming_desc: "Psioniczna, kojąca umysł ballada.\n\n"
 song_of_plenty: "Pieśń obfitości"
 song_of_plenty_desc: "Psioniczna oda do bogactwa natury.\n\n"
 song_of_steel: "Pieśń stali"
 song_of_steel_desc: "Psioniczny hymn ku chwale przemysłu.\n\n"
 song_of_luxury: "Pieśń luksusu"
 song_of_luxury_desc: "Psioniczna ballada o beztroskim hedonizmie.\n\n"
 song_of_knowing: "Pieśń poznania"
 song_of_knowing_desc: "Psioniczne echo skomplikowanych wzorów i rytmów.\n\n"
 policy_psionic_suppression_policy: "Tłumienie psioniczne"
 policy_psionic_suppression_policy_desc: "Ta polityka określa, czy po przejęciu kontroli nad danym układem będziemy rozbierać urządzenia, przez które jest tłumiona $PSIONIC_AURA_PLURAL$."
 psionic_suppression_dismantle: "Rozbiórka"
 psionic_suppression_dismantle_name: "$psionic_suppression_dismantle$"
 psionic_suppression_dismantle_desc: "Urządzenia, za pomocą których jest tłumiona $PSIONIC_AURA_PLURAL$, będą automatycznie rozbierane."
 psionic_suppression_allow: "Dozwolone"
 psionic_suppression_allow_name: "$psionic_suppression_allow$"
 psionic_suppression_allow_desc: "Urządzenia, za pomocą których jest tłumiona $PSIONIC_AURA_PLURAL$, zostaną nienaruszone."
 shroud.80.title: "Rozebrano urządzenia tłumiące psionikę"
 shroud.80.desc: "Przejąwszy kontrolę nad układem §H[from.GetName]§!, odkryliśmy - a następnie rozebraliśmy - maszyny, przez które była tłumiona nasza $PSIONIC_AURA$."
 shroud.80.a: "Nasze umysły zostały wyzwolone."
