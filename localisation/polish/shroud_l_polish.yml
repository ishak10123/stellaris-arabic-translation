l_polish:
 ##################################
 # ENGLISH LOCALISATION - Shroud #
 ##################################
 SHROUD_TITLE: "Shadows of the Shroud"
 ap_interdimensional_processing: "Kalkulacje międzywymiarowe"
 ap_interdimensional_processing_desc: "Nasz potencjał kalkulacyjny jest ograniczony, dopóki zamyka się w jedynie trzech fizycznych wymiarach. Wiele zyskamy na ekspansji naszej sieci do przestrzeni położonych daleko poza granicami otchłani."
 requires_not_ap_interdimensional_processing: "$TRIGGER_FAIL$Niedopuszczalna korzyść z rozwoju: §Y$ap_interdimensional_processing$§!."
 vo_psionic_voice: "Psionik"
 #==========================
 # Advanced Governments
 #==========================
 shroud.7099.name: "Reakcje psioniczne"
 shroud.7099.desc: "Nasze myśli mkną przez §HWoal§! z nową siła. My napieramy, on nas odpycha. Z początku uznaliśmy to za opieranie się naszej obecności, ale teraz rozumiemy: Woal zadaje nam pytania.\n\nChoć są one niejasne, nie można ich nazwać trywialnymi. Nasi [GetTelepathPlural] uważają, że odpowiedzi, których udzielimy, wpłyną na przyszłość naszego społeczeństwa."
 shroud.7099.a: "Musimy odpowiedzieć."
 # Shroud Songs events
 shroud.7100.title: "Pieśń Woalu: [GetRolledShroudSongName]"
 shroud.7100.desc.common: "Nasz [GetMindEyeLoc] ukazuje obraz. Widzimy §H[GetRolledShroudSongName]§!.\n\n§P[GetRolledShroudSongDesc]§!"
 shroud.7100.desc: "Nasze połączenie z §HWoalem§! jest silne: jesteśmy gotowi na jego wezwanie. Nadchodzi wiadomość nadana rytmicznymi wersami. Woal niesie nam swą pieśń.\n\n$shroud.7100.desc.common$"
 shroud.7100.a: "[GetRolledShroudSongOptionA]"
 shroud.7100.b: "[GetRolledShroudSongOptionB]"
 shroud.7100.tt: "Woal czeka na naszą odpowiedź..."
 shroud.7105.desc: "Coś niewidocznego się przemieszcza, słychać szept i rodzi się kolejna myśl.\n\n$shroud.7100.desc.common$"
 shroud.7105.tt: "Woal jest ciekaw naszej odpowiedzi..."
 shroud.7110.desc: "W naszych myślach rozbrzmiewa chór! Coś wybranego nieprzypadkowo, lecz przez coś starszego.\n\n$shroud.7100.desc.common$"
 shroud.7110.tt: "Cały Woal drży, wyczekując naszej odpowiedzi..."
 shroud_song.1.name: "Gwiazdy"
 shroud_song.1.desc: "Dla tych, którzy szukają wiedzy, już sam proces istnienia stanowi drogę do zrozumienia."
 shroud_song.1.a: "Pojmowanie leży poza naszymi zmysłami."
 shroud_song.1.b: "Pojmowanie jest w zasięgu ręki."
 shroud_song.2.name: "Światło"
 shroud_song.2.desc: "Pogranicze to tafla oceanu, nieskończenie cienka pustka, która oddziela nas od Woalu. To tutaj można ujrzeć prawdę."
 shroud_song.2.a: "Prawda leży w głębinach."
 shroud_song.2.b: "Na powierzchni widać jej odbicie."
 shroud_song.3.name: "Życie"
 shroud_song.3.desc: "Gdziekolwiek rozkwita, życie szybko przemija.\nGdziekolwiek wzrastają, istoty żywe pozostają kruche."
 shroud_song.3.a.default: "W Woalu nie będzie ni życia, ni śmierci."
 shroud_song.3.a.machine: "Nasze istnienie wykracza poza życie."
 shroud_song.3.b.default: "To dlatego jesteśmy tak wartościowi."
 shroud_song.3.b.machine: "Nasze narodziny jeszcze nie nadeszły."
 shroud_song.3.b.homicidal: "To, co kruche, jest jednorazowe."
 shroud_song.4.name: "Umysł"
 shroud_song.4.desc: "Umysł jest niczym źródło, a myśl płynie przez czas i przestrzeń. Przelewamy się do innych wymiarów."
 shroud_song.4.a: "Podążajmy z prądem tej rzeki."
 shroud_song.4.b: "Wykopmy zatem głęboką studnię."
 shroud_song.5.name: "Linie"
 shroud_song.5.desc: "Skutek każdej przyczyny można zawczasu przepowiedzieć. Aby poznać wszelkie losy, wystarczy jedynie przewidzieć, gdzie przebiegną linie."
 shroud_song.5.a: "Wytyczamy te linie w snach."
 shroud_song.5.b: "Te linie należy dokładnie obliczyć."
 shroud_song.6.name: "Śmierć"
 shroud_song.6.desc: "U progu śmierci, gwiazdy mogą świecić jaśniej od samych galaktyk. One też z czasem zgasną."
 shroud_song.6.a.default: "Śmierć nie będzie już naszym zmartwieniem."
 shroud_song.6.a.machine: "Nie wiemy co to śmierć."
 shroud_song.6.b.default: "Wszystko kiedyś umiera. Lecz mało co żyje."
 shroud_song.6.b.machine: "Wpierw musimy żyć, zanim będziemy mogli umrzeć."
 shroud_song.7.name: "Pustka"
 shroud_song.7.desc: "Chaos rządzi tam, gdzie galaktyki skupiają się w gromady. Pustka obiecuje ciszę."
 shroud_song.7.a: "Jesteśmy ciszą."
 shroud_song.7.b: "Jesteśmy chaosem."
 shroud_song.8.name: "Zakrzywienie"
 shroud_song.8.desc: "Most może zniwelować każdą odległość, a każdy most może zostać zburzony."
 shroud_song.8.a: "Przekraczamy go, by dotrzeć na drugi brzeg."
 shroud_song.8.b: "Przekraczamy go w nadziei na powrót."
 shroud_song.9.name: "Grawitacja"
 shroud_song.9.desc: "Każdej akcji towarzyszy reakcja. Każde odpychanie rodzi przyciąganie."
 shroud_song.9.a: "Odpychanie."
 shroud_song.9.b: "Przyciąganie."
 shroud_song.10.name: "Mgławica"
 shroud_song.10.desc: "Gwiazda umiera, wyrzucając pył; pył zbija się w obłok.\nZ obłoku powstaje gwiazda; losem gwiazdy jest obrócić się w pył."
 shroud_song.10.a: "Cykl ten nie ma końca."
 shroud_song.10.b: "Wszystko ma swój koniec."
 shroud_song.11.name: "Kometa"
 shroud_song.11.desc: "Odkrywcy szukają tego, co nieznane. Odkrycia ich zaślepiają."
 shroud_song.11.a: "Woal nie ma granic."
 shroud_song.11.b: "Woal poszerza nasze granice."
 shroud_song.12.name: "Czarna dziura"
 shroud_song.12.desc: "Nie sposób poznać tego, co kryje się w środku. Cokolwiek tam zanurkuje, już stamtąd nie ucieknie."
 shroud_song.12.a: "Niechaj nas pochłonie."
 shroud_song.12.b: "Trzymajmy się z dala."
 shroud_song.13.name: "Energia"
 shroud_song.13.desc: "Przedmiot w ruchu postanawia się zatrzymać. Jak należałoby go ukarać?"
 shroud_song.13.a: "Kim jesteśmy, by ferować wyroki?"
 shroud_song.13.b: "Równa, lecz przeciwna reakcja."
 shroud.7120.name: "Transcendencja psioniczna"
 shroud.7120.desc.common: "§HWoal§! milknie, ale nasze społeczeństwo odczuwa obciążenie psychiczne. Udzielone przez nas odpowiedzi przyniosły nam nowe możliwości, z których możemy skorzystać."
 shroud.7120.desc: "$shroud.7120.desc.common$\n\nNasze wywyższone umysły są gotowe do dalszej transformacji. Naczynia działające jako wsparcie dla materialnych potrzeb umysłu mogą bardzo stracić na znaczeniu.\n\nJeśli podążymy dalej tą drogą, nasza populacja zdoła wznieść się ponad sprawy materialne i poświęcić się w pełni częściowej egzystencji wewnątrz Woalu. Częściowa utrata zdolności do pracy fizycznej będzie niewielką ceną za pogłębienie bystrości umysłu."
 shroud.7120.a.default: "Osiągnijmy psioniczną transcendencję."
 shroud.7120.a.gestalt: "Psioniczna transcendencja jest optymalna dla kolektywu."
 shroud.7120.a.tt: "$change_auth_tt$ [GetTranscendedAuthority]"
 shroud.7120.b.default: "Możemy kwitnąć bez tego rodzaju zmian."
 shroud.7120.b.machine: "Zmiany operacyjne zostały odrzucone."
 shroud.7121.name: "Pieśni Woalu"
 shroud.7121.desc: "$shroud.7120.desc.common$\n\nNasze wywyższone formy mają ogromny potencjał w tym wymiarze materialnym. Wciąż stajemy się silniejsi dzięki zastrzykom energii psionicznej i możemy wykorzystać tę moc na rzecz naszego społeczeństwa.\n\nNie śpiewalibyśmy wówczas wyłącznie pieśni Woalu – [GetGovBehaviourLoc] też na tym skorzysta."
 shroud.7121.a: "Niech pieśni Woalu nas prowadzą."
 shroud.7121.a.tt: "$change_auth_tt$ [GetCorporealAuthority]"
 # Transcendent
 transcendent_trait_common_tt: "Cecha gatunkowa §Y$trait_psionic$§! daje dodatkowe efekty:$TABBED_NEW_LINE$- $pop_cat_ruler_plural$ i wydajność pracy, którą wykonuje [GetSpecialist]: §G+10%§!$TABBED_NEW_LINE$- [GetWorker] - wydajność pracy: §R-10%§!"
 transcendent_trait_tt: "$mod_psionic_aura_hyperlane_range_add$: §G+2§!\n$transcendent_trait_common_tt$\nCecha przywódcy ['concept_leader_trait_psionic'] daje dodatkowe efekty: $TABBED_NEW_LINE$- §G+$@transcendent_psionic_leader_speed_mult|0%$§! Szybkość agendy rady $TABBED_NEW_LINE$- $MOD_LEADER_LIFESPAN_ADD$: §G+60§! $TABBED_NEW_LINE$- Efekty nietranscendentalne rosną o §G50%§!"
 auth_shroud_democratic_transcendent: "Demokracja transcendentalna"
 auth_shroud_democratic_transcendent_desc: "Wszelkie umysły po transcendencji mają w Woalu taki sam status, wybory jednak zapewniają równość również w świecie fizycznym. Głosując psionicznie, obywatele wybierają swoich reprezentantów w rządzącym konklawe dążącym do konsensusu poprzez kontemplację telepatyczną."
 transcendent_democratic_tt: "$transcendent_trait_tt$\n$mod_pop_factions_produces_mult$: §G+40%§!\n$MOD_LEADER_LIFESPAN_ADD$: §G+20 lat§!\n$mod_negative_traits_leader$: §G-1§!"
 gov_shroud_transcendent_democracy: "$auth_shroud_democratic_transcendent$"
 gov_shroud_transcendent_democracy_desc: "$auth_shroud_democratic_transcendent_desc$"
 auth_shroud_oligarchic_transcendent: "Arystokracja transcendentalna"
 auth_shroud_oligarchic_transcendent_desc: "Najgłębsze zakątki Woalu są przeznaczone dla naszych największych umysłów. Czas potrzebny na dostrojenie do tych wymiarów jest ujmowany w długości kadencji tych jednostek."
 transcendent_oligarchic_tt: "$transcendent_trait_tt$\n$MOD_LEADER_SKILL_ADD$: §G+1§!\n$MOD_LEADER_COUNCILOR_EXP_GAIN$: §G+25%§!\n$mod_leaders_upkeep_mult$: §G-25%§!\n$MOD_ELECTION_TERM_YEARS_ADD$: §Y+20§!\n$mod_planet_telepaths_produces_mult$: $@transcendent_oligarchic_telepath|0=+%$ przez §Y5§! lat po każdych wyborach."
 gov_shroud_transcendent_oligarchy: "$auth_shroud_oligarchic_transcendent$"
 gov_shroud_transcendent_oligarchy_desc: "$auth_shroud_oligarchic_transcendent_desc$"
 transcendent_oligarchic_election_modifier: "$auth_shroud_oligarchic_transcendent$"
 auth_shroud_dictatorial_transcendent: "Teokracja transcendentalna"
 auth_shroud_dictatorial_transcendent_desc: "Czas pogodzić się z prawdą: wielki władca to wyniesiony bóg. Dzięki mocy Woalu widzi i wie wszystko."
 auth_shroud_dictatorial_transcendent_tt: "$transcendent_trait_tt$\n[telepath.GetName] §H$EDICT_FUND$§!: +1\n£job_politician£ $job_politician_plural$ zostają zastąpieni przez ['concept_high_priest', najwyższego kapłana]\n$mod_planet_bureaucrats_produces_mult$: §G+15%§!\n$mod_planet_enforcers_produces_mult$: §G+15%§!\n$mod_pop_ethic_spiritualist_attraction_mult$: §G+50%§!"
 gov_shroud_transcendent_dictatorial: "$auth_shroud_dictatorial_transcendent$"
 gov_shroud_transcendent_dictatorial_desc: "$auth_shroud_dictatorial_transcendent_desc$"
 auth_shroud_imperial_transcendent: "Imperium transcendentalne"
 auth_shroud_imperial_transcendent_desc: "Władca przenosi naszą obecność do wyższego wymiaru. Czysta moc Woalu wylewa się z rodu imperialnego i trafia do otwartych umysłów populacji."
 auth_shroud_imperial_transcendent_tt: "$transcendent_trait_tt$\n$imperial_heir$ zyskuje dodatkowe efekty:$TABBED_NEW_LINE$$scientist_plural_with_icon$ - §YArcheologiczne§! i §Yumiejętność eksploracji gwiezdnych szczelin§!: $@transcendent_imperial_heir_skill|0=+$$TABBED_NEW_LINE$$official_plural_with_icon$ - $i_stability$: $@transcendent_imperial_heir_stability|0=+$$TABBED_NEW_LINE$$commander_plural_with_icon$ - §Y$HITPOINTS$§! i §Y$MOD_SHIP_SPEED_MULT$§!: $@transcendent_imperial_heir_mult|0=+%$\nKiedy £leader£ §Y$imperial_ruler$§! albo §Ydziedzic§! awansuje, zyskasz $i_unity$\n$MOD_ENVOY_IMPROVE_RELATIONS_MULT$: §G+50%§!\n$MOD_ENVOY_HARM_RELATIONS_MULT$: §G+50%§!\n$MOD_ENVOY_ATTUNEMENT_MULT$: §G+50%§!\n$MOD_PLANET_CRIME_ADD$: §R+20§!"
 gov_shroud_transcendent_imperial: "$auth_shroud_imperial_transcendent$"
 gov_shroud_transcendent_imperial_desc: "$auth_shroud_imperial_transcendent_desc$"
 councilor_ruler_imperial_transcendent: "$imperial_ruler$"
 councilor_ruler_imperial_transcendent_desc: "$imperial_ruler_desc$"
 auth_shroud_corporate_transcendent: "Przedsiębiorstwo transcendentalne"
 auth_shroud_corporate_transcendent_desc: "Transcendentalna korporacja nadal realizuje swoje kluczowe cele. Poprzez cienie Woalu skanuje umysły partnerów i konkurentów, zapewniając sobie szanse na realizację psionicznej strategii zarządczej."
 auth_shroud_corporate_transcendent_tt: "$transcendent_trait_tt$\n[telepath.GetName] $i_trade_value$: §G+$@corporate_government_telepaths_trade_value_mult|0%$§!\n$MOD_INTEL_DECRYPTION_ADD$: §G+1§!\n$mod_operations_influence_cost_mult$: §G-20%§!\n$MOD_BRANCH_OFFICE_VALUE_MULT$: §G+20%§!\n$MOD_COUNTRY_ENVOYS_ADD$: §G+1§!"
 gov_shroud_transcendent_corporate: "$auth_shroud_corporate_transcendent$"
 gov_shroud_transcendent_corporate_desc: "$auth_shroud_corporate_transcendent_desc$"
 auth_shroud_hive_transcendent: "Eteryczny umysł transcendentalny"
 auth_shroud_hive_transcendent_desc: "Ten kolektyw porusza się w Woalu jako jedność. Wydaje się czuć w nim obecnie swobodniej niż w swojej fizycznej formie. Każda podróż poza zasłonę zwiększa połączoną mądrość tego nowego eterycznego umysłu."
 transcendent_hive_mind_tt: "$transcendent_trait_tt$\n§YPrzywódcy§! zyskują §Y$@transcendent_hive_mind_leader_exp|0$§! doświadczenia za każde $DELVE$.\n$MOD_PLANET_STABILITY_MULT$: §G+10%§!\n$mod_planet_jobs_complex_drone_produces_mult$: §G+10%§!\n$MOD_EMPIRE_SIZE_MULT$: §G-10%§!\n$MOD_POP_ENVIRONMENT_TOLERANCE$: §R-10%§!"
 gov_shroud_transcendent_hive: "$auth_shroud_hive_transcendent$"
 gov_shroud_transcendent_hive_desc: "$auth_shroud_hive_transcendent_desc$"
 auth_shroud_machine_transcendent: "Centralny komputer transcendentalny"
 auth_shroud_machine_transcendent_desc: "Większość mocy obliczeniowej sieci została przeniesiona do wnętrza Woalu, gdzie obliczenia można prowadzić z ogromną szybkością. Działania systemu w zwyczajnej domenie wydają się teraz niezgrabne i przestarzałe."
 transcendent_machine_tt: "$transcendent_trait_tt$\n$@transcendent_machine_research_per_attunement|2=+%$ szybkości badań za każdy punkt dostrojenia\nZyskaj £physics_research£ £society_research£ £engineering_research£ losowych badań za każde §Y$DELVE$§!\nUtrzymanie §Ypodprogramu§! za $pop_group_unit$ $job_telepath_swap_plural_with_icon$: $@transcendent_machine_calculator_upkeep|0=-%$\n$MOD_COUNCIL_AGENDA_PROGRESS_SPEED$: §G+25%§!\n£pop£ populacje z cechą ['trait:trait_robot_psionic'] zyskują $@transcendent_machine_pop_upkeep|0=-%$ utrzymania\n$mod_station_researchers_produces_mult$: §R-20%§!"
 gov_shroud_transcendent_machine: "$auth_shroud_machine_transcendent$"
 gov_shroud_transcendent_machine_desc: "$auth_shroud_machine_transcendent_desc$"
 transcendent_machine_research_modifier: "$auth_shroud_machine_transcendent$"
 AUTH_HIVE_MIND_GENEMODDING_ASCENDED: "Można modyfikować £pop£ §Hpopulacje§!, by stały się kompatybilne z §Humysłem zbiorowym§!"
 MOD_ENVOY_ATTUNEMENT_MULT: "Dostrojenie posła do Woalu"
 REMOVE_FROM_EMPIRE_COUNCIL_EFFECT: "Usuń z rady"
 # Corporeal
 corporeal_trait_tt: "$MOD_PSIONIC_AURA_EFFECTIVENESS_MULT$: §G+25%§!\n$AVAILABLE_POLICIES$ ['policy:psionic_choir',$policy_psionic_choir$]"
 auth_shroud_democratic_corporeal: "Jedność duchowa"
 auth_shroud_democratic_corporeal_desc: "Energie Woalu roznoszone są demokratycznie po imperium, zmniejszając ciężar życia cielesnego i zapewniając wszystkim obywatelom jeszcze większe poczucie fizycznej jedności."
 corporeal_democratic_tt: "$corporeal_trait_tt$\nZadowolenie populacji psioników: $@corporeal_democratic_psionic_happiness|0=+%$\n$mod_pop_factions_produces_mult$: §G+10%§!\n$MOD_EMPIRE_SIZE_PSIONIC_POPS_MULT$: §G-10%§!\n$mod_planet_jobs_unity_produces_mult$: §G+10%§!\n$MOD_POP_POLITICAL_POWER$: §G+50%§!"
 gov_shroud_corporeal_democracy: "$auth_shroud_democratic_corporeal$"
 gov_shroud_corporeal_democracy_desc: "$auth_shroud_democratic_corporeal_desc$"
 auth_shroud_oligarchic_corporeal: "Prodigokracja"
 auth_shroud_oligarchic_corporeal_desc: "Jeśli będziemy rozpoczynać szkolenie psioniczne naszych przywódców, gdy są młodzi, będziemy mogli zbudować kadrę elitarnych telepatów, posiadających zdolności psioniczne, o których obecnie możemy tylko marzyć."
 corporeal_oligarchic_tt: "$corporeal_trait_tt$\n$MOD_LEADER_INITIAL_SKILL$: §G+2§!\n$mod_leaders_upkeep_mult$: §G-25%§!\n$mod_leader_recruitment_age$: §G-15§!\n§YPrzywódcy§! zaczynają z dodatkową §Rnegatywną cechą§!."
 gov_shroud_corporeal_oligarchy: "$auth_shroud_oligarchic_corporeal$"
 gov_shroud_corporeal_oligarchy_desc: "$auth_shroud_oligarchic_corporeal_desc$"
 auth_shroud_dictatorial_corporeal: "Wyświęcona autokracja"
 auth_shroud_dictatorial_corporeal_desc: "Wielki władca ucieleśnia sobą moc Woalu, przemieniając energię psioniczną w moc zarządzającą. Nic nie stanie na przeszkodzie do realizacji jego wielkiej wizji."
 auth_shroud_dictatorial_corporeal_tt: "$corporeal_trait_tt$\n+1 §H$EDICT_FUND$§! za każdego telepatę\n$MOD_COUNCIL_AGENDA_PROGRESS_SPEED$: §G+25%§!\n$MOD_COUNCIL_AGENDA_COOLDOWN_MULT$: §G-25%§!\n$mod_planet_bureaucrats_upkeep_mult$: §G-25%§!"
 gov_shroud_corporeal_dictatorial: "$auth_shroud_dictatorial_corporeal$"
 gov_shroud_corporeal_dictatorial_desc: "$auth_shroud_dictatorial_corporeal_desc$"
 auth_shroud_imperial_corporeal: "Imperium Vitalis"
 auth_shroud_imperial_corporeal_desc: "Ród imperialny to kanał przesyłowy witalności z Woalu. Ta moc trafia do zmodyfikowanych materialnych postaci władcy i jego dziedziców, dzięki szczodrości naszej ochoczej populacji."
 auth_shroud_imperial_corporeal_tt: "$corporeal_trait_tt$\n§Y$imperial_heir$§! zyskuje $@corporeal_imperial_heir_xp|0+$ §YPD§! zawsze, gdy przejmuje tron\n$MOD_PSIONIC_AURA_EFFECTIVENESS_MULT$ za: $pop_group_unit$ $job_telepath_swap_plural_with_icon$ - $@corporeal_imperial_telepath_effectiveness|0=+%$\n$MOD_ENVOY_IMPROVE_RELATIONS_MULT$: §G+50%§!\n$MOD_ENVOY_HARM_RELATIONS_MULT$: §G+50%§!\n$MOD_ENVOY_ATTUNEMENT_MULT$: §G+50%§!\n$MOD_RULER_SKILL_ADD$: §G+2§!\n$MOD_COUNCILOR_SKILL_ADD$: §G+1§!\n$MOD_LEADER_LIFESPAN_ADD$: §G+10 lat§!\n$mod_psionic_pop_bonus_workforce_mult$: §R-20%§!\n$MOD_LOGISTIC_GROWTH_MULT$: §R-5%§!\n$MOD_PLANET_POP_ASSEMBLY_MULT$: §R-5%§!"
 gov_shroud_corporeal_imperial: "$auth_shroud_imperial_corporeal$"
 gov_shroud_corporeal_imperial_desc: "$auth_shroud_imperial_corporeal_desc$"
 auth_shroud_corporate_corporeal: "Rada telepatów"
 auth_shroud_corporate_corporeal_desc: "Zmarnowanie korzyści umysłowych, które przynosi Wal byłoby nierozważne. Ta korporacja często zakłada $building_psionic_offices$ na terytorium sąsiednich cywilizacji, co zwiększa dochodowość zagranicznych umów handlowych."
