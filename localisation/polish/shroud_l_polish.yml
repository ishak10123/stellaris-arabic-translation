 tr_psionics_endbringers_cult_delayed: "Kiedy już usłyszy się głos, nie można go zignorować. Wykonujemy jego wolę."
 building_chamber_of_silence: "Komora milczenia"
 building_chamber_of_silence_desc: "Sprowadzamy tu psioników z całego imperium, by porozumiewali się z Woalem w komorach zapewniających bezpieczną ciszę."
