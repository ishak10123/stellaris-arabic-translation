 COUNTRY_ON_SHROUD_PLANE_INSIGHT_TT: "§HPozycja w Woalu§!\nOznacza przynależność imperium §H$PLAYER_COUNTRY$§! do Woalu, zgodnie z §Hdostrojeniem§! do istot zamieszkujących Woal."
