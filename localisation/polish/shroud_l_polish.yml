 necrocognition_research_desc: "Prywatna praktyka, w ramach której martwe [Owner.GetSpeciesBrainPlural] były przedmiotem prób nawiązania komunikacji, jest teraz regulowaną formą publicznych badań."
 resurrectionism: "Resurekcjonizm"
 resurrectionism_desc: "Martwe [Owner.GetSpeciesBrainPlural] są powszechnie wykorzystywane jako eksperymentalny przedmiot prób nawiązania komunikacji, mimo uczynienia tej praktyki przestępstwem."
 regulated_transformation: "Regulowana transformacja"
 regulated_transformation_desc: "Części z naszej populacji psioników wyrastają dziwne nowe kończyny. Dzięki uważnej regulacji ich rozwoju, pozwalają one na wzrost produktywności."
 forced_amputation: "Przymusowe amputacje"
 forced_amputation_desc: "Gdy części z naszej populacji psioników wyrosły dziwne nowe kończyny, postanowiliśmy uczynić ich amputację obowiązkową"
 forced_amputation_gestalt: "$forced_amputation$"
 forced_amputation_gestalt_desc: "$forced_amputation_desc$"
 unregulated_transformation: "Nieregulowana transformacja"
 unregulated_transformation_desc: "Części z naszej populacji psioników wyrastają dziwne nowe kończyny. Wzrosły ich wymogi energetyczne, lecz także ogólny dobrostan."
 unregulated_transformation_gestalt: "$unregulated_transformation$"
 unregulated_transformation_gestalt_desc: "$unregulated_transformation_desc$"
 telekinetic_resentment: "Telekinetyczna frustracja"
 telekinetic_resentment_desc: "Przemysłowa telekineza może wywoływać nieco ogólnego niezadowolenia, nie da się jednak ukryć, że zwiększa produktywność."
 telekinetic_displacement: "Telekinetyczne przesiedlenia"
 telekinetic_displacement_desc: "$telekinetic_resentment_desc$"
 telekinetic_assembly: "Telekinetyczny montaż"
 telekinetic_assembly_desc: "Przemysłowa telekineza może wywoływać nieco ogólnego niezadowolenia, ale stanowi wielką korzyść dla naszego militarnego kompleksu fabrycznego."
 telekinetic_assembly_gestalt: "$telekinetic_assembly$"
 telekinetic_assembly_gestalt_desc: "$telekinetic_assembly_desc$"
 telekinetic_skepticism: "Telekinetyczny sceptycyzm"
 telekinetic_skepticism_desc: "Wykorzystanie przemysłowej telekinezy zostało ograniczone w celu uniknięcia niepokojów społecznych."
 telekinetic_skepticism_gestalt: "$telekinetic_skepticism$"
 telekinetic_skepticism_gestalt_desc: "$telekinetic_skepticism_desc$"
 psionic_migraines: "Psioniczne migreny"
 psionic_migraines_desc: "Nigdy nie było przewidziane, że nasze psioniczne wywyższenie będzie procesem bezbolesnym."
 psionic_migraines_machine: "Psioniczne usterki"
 psionic_migraines_machine_desc: "Nigdy nie było przewidziane, że nasze psioniczne wywyższenie będzie procesem bezproblemowym."
