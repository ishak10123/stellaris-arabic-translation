 #==========================
 abomination_army: "Ohydztwa"
 abomination_army_desc: "Zniewoleni żołnierze, których poddano drastycznym, eksperymentalnym zabiegom mającym zwiększyć ich agresję i zdolności bojowe oraz zmienić ich w żywą broń. Równie ulegli wobec swoich panów, jak nieustraszeni w boju."
 seq_abomination_army: "$ORD$ Armia - $abomination_army$"
 mindwarden_army: "Wartownicy szturmowi"
 mindwarden_army_desc: "Te specjalistyczne jednostki przeszły gruntowne szkolenie w zakresie zwalczania psioniki, posiadają też odpowiednie wyposażenie, co czyni je potężnymi przeciwnikami w starciu z celami atakującymi umysły."
