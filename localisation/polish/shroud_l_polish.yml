 ACTION_START_PROXY_WAR_TITLE: "Rozpocznij wojnę zastępczą"
 ACTION_START_PROXY_WAR_DESC: "Sprowokuj inne imperia do rozpoczęcia wojny, w której stroną przeciwną będzie §H[Recipient.GetName]§!."
 ACTION_START_PROXY_WAR_OFFER_DESC: "§H[Actor.GetName]§! rozpoczyna wojnę zastępczą. Przeciwnik: §H[Recipient.GetName]§!."
 ACTION_START_PROXY_WAR_NO_ATTACKERS: "§R$TRIGGER_FAIL$ Należy wybrać odpowiednich atakujących§!"
 NO_RELATION_CAN_DECLARE_WAR: "§R$TRIGGER_FAIL$ Żaden z naszych kontaktów nie jest w stanie wypowiedzieć wojny temu imperium§!"
 PROXY_WAR_ON_COOLDOWN: "§R$TRIGGER_FAIL$Musimy poczekać do §Y[this.proxy_war_cooldown_timer]§!, zanim zaczniemy nową wojnę zastępczą.§!"
 SEND_TO_PROXY_WAR_NO_WAR_GOALS: "§R$COUNTRY|H$ - brak dostępnych celów wojny, dla których przeciwnik to $WHO|H$.§!"
 SEND_TO_PROXY_WAR_MISSING_REQUIREMENTS: "§RPotrzeba co najmniej: $@proxy_war_min_trust|Y0$ $opinion_trust$ lub $@proxy_war_min_infiltration|Y0$ $spy_network$, żeby wysłać państwo $COUNTRY|H$ na wojnę.§!"
 PROXY_WAR_VIEW_DESC: "Zadeklaruj atakujących o stosownym celu wojny, aby rozpocząć konflikt."
 PROXY_WAR_VIEW_ATTACKERS_DESC: "§GDodaj lub usuń proponowanych napastników, klikając ich na listach po lewej.§!"
 START_PROXY_WAR_COST: "$ACTION_START_PROXY_WAR_TITLE$ $CLAIMS_COST$"
 CASUS_BELLI_COST_TT: "Koszt tego §Hcasus belli§!:"
 casus_belli_cb_proxy_war: "Wojna zastępcza"
 war_goal_wg_proxy_war: "Wojna zastępcza"
 war_goal_wg_proxy_war_desc: "Wojna toczy się poprzez wrogie plotki i ciche szepty. Zwyciężywszy, atakujący przejmie kontrolę nad wszelkimi przejętymi układami i generuje o §Y33%§! mniej §Yzagrożenia§! za każdy podbity układ."
 shroud.5055.title: "$proxy_war_busted_modifier$"
 shroud.5055.desc.common: "Zostaliśmy oszukani.\n\nAgenci naszego wywiadu przechwycili tajną korespondencję z imperium §H[from.GetName]§!. Planowano w niej wciągnięcie nas w wojnę zastępczą.\n\nDruga strona stanowczo wyparła się jakiegokolwiek zaangażowania, ale nasze stosunki i tak ucierpiały."
 shroud.5055.desc.galactic: "$shroud.5055.desc.common$ Wieść o ich dwulicowości szybko się rozeszła, co zaszkodziło reputacji imperium [from.GetName] w całej galaktyce."
 shroud.5060.title: "$proxy_war_busted_modifier$"
 shroud.5060.desc.common: "Chociaż udało nam się doprowadzić do wybuchu konfliktu, operacja nie do końca potoczyła się zgodnie z planem. Przechwycono korespondencję jednego z naszych agentów, która dowodziła prowadzenia przez nas tajnych działań.\n\nNasze próby wytłumaczenie całej sprawy okazały się nieskuteczne."
 shroud.5060.desc.galactic: "$shroud.5060.desc.common$ Ten skandal zaszkodził naszym stosunkom z walczącymi stronami, a w dodatku nadszarpnął naszą reputację na arenie galaktyki."
 shroud.5060.desc.default: "$shroud.5060.desc.common$ To wydarzenie poważnie zaszkodziło naszym stosunkom z walczącymi stronami."
 shroud.5060.a.tt: "Opinia imperiów uczestniczących w §Ywojnie zastępczej§! zmieniła się o §R-200§!."
 proxy_war_busted_modifier: "Ujawniono podżeganie do wojny zastępczej"
 proxy_war_busted_modifier_desc: "Machinacje, które doprowadziły do wybuchu wojny zastępczej zostały wykryte przez strony konfliktu. To poważny cios dla naszej reputacji."
 opinion_proxy_war_busted: "$proxy_war_busted_modifier$"
 PROXY_WAR_BUSTED_MESSAGE_TYPE_TITLE: "$proxy_war_busted_modifier$"
 PROXY_WAR_BUSTED_MESSAGE_TYPE_DESC: "Walczące strony odkryły, że to my wywołaliśmy wojnę zastępczą.\n$shroud.5060.a.tt$"
 PROXY_WAR_REVEALED_MESSAGE_TYPE_TITLE: "$proxy_war_busted_modifier$"
 PROXY_WAR_REVEALED_MESSAGE_TYPE_DESC: "Odkryliśmy, że imperium §H$INSTIGATOR$§! spiskowało, by wciągnąć nas w wojnę zastępczą.\nNasza opinia o imperium §H$INSTIGATOR$§! zmieniła się o: §R-200§!"
