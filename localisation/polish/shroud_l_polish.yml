 civic_tankbound_negative_effects: "$t$Zaczniesz z £pop£ populacją mniejszą o 2 tys. niż normalnie"
 civic_tankbound_corporate: "Thinktank korporacyjny"
 civic_tankbound_corporate_desc: "Społeczeństwo to powszechnie stosuje eksperymentalny produkt - wyspecjalizowane zbiorniki podtrzymujące życie. W rezultacie jego członkowie nie mogą istnieć bez sprzętu wspomagającego i nie są w stanie wykonywać żadnej pracy fizycznej."
