 SHROUD_SEAL: "Pieczęć Woalu"
 SHROUD_SEAL_PLURAL: "Pieczęci Woalu"
 SHROUD_SEAL_IN_SYSTEM: "W układzie znajduje się $SHROUD_SEAL$ sprawiająca, że pobliskie §Y$PSIONIC_AURA_PLURAL$§! są słabsze. Tylko właściciel układu może ją rozmontować."
 shroud_seal: "$SHROUD_SEAL$"
 shroud_seal_DESC: "Ta wyrafinowana maszyneria emituje fale o niskiej częstotliwości, zdolne znosić energię psioniczną. Wskutek tego $PSIONIC_AURA_PLURAL$ ulegają rozproszeniu i ostatecznie całkowitemu zniesieniu."
 shroud_seal_MEGASTRUCTURE_DETAILS: "§Y$SHROUD_SEAL$§! osłabia pobliskie §Y$PSIONIC_AURA_PLURAL$§! i zmniejsza skuteczność §Ypsionicznego wyposażenia okrętów§!."
