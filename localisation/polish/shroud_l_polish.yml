 chain_aura_suppressors_desc: "Obce urządzenia przeznaczone do tłumienia psioniki sprawiają, że §H$end_aura$§! słabiej działa. Wola naszego mecenasa nakazuje nam rozebranie tych bluźnierczych maszyn."
 chain_aura_suppressors_seal: "§H$SHROUD_SEAL$§! w: §Y[prev.GetName]§!"
 chain_aura_suppressors_seal_desc: "$SHROUD_SEAL$ w układzie [prev.GetName] osłabia wpływ, który roztacza §H$end_aura$§!.\n\n§RNależy rozebrać to urządzenie.§!"
 chain_aura_suppressors_suppressor: "§H$building_psionic_suppressor$§! na: §Y[prev.GetName]§!:"
 chain_aura_suppressors_suppressor_desc: "[prev.GetName]: $building_psionic_suppressor$ osłabia wpływ, który roztacza §H$end_aura$§!.\n\n§RMusimy zniszczyć to urządzenie.§!"
 chain_aura_suppressors_ward: "§H$building_ancient_ward_2$§! na: §Y[prev.GetName]§!"
 chain_aura_suppressors_ward_desc: "[prev.GetName]: Tak zwana $building_ancient_ward_2$ osłabia wpływ, który roztacza §H$end_aura$§!.\n\n§RMusimy zniszczyć to urządzenie.§!"
 #==========================
 # Events
 #==========================
 # Good luck events
 # Good luck event 1
 shroud.500.title: "Niekonwencjonalny przełom"
 shroud.500.desc: "Obiecujące nowe badania z wiodących instytucji osiągnęły nieoczekiwany przełom. Przez czysty przypadek rutynowa standaryzacja naszych przyrządów udowodniła teorię, która przez długie lata uważana była za fundamentalnie błędną. Możemy teraz ponownie przyjrzeć się czemuś, co uważane było za rubieże nauki."
 HOW_FORTUITOUS: "Jakże się szczęśliwie złożyło."
 shroud.500.tt: "Zdobywasz wiedzę o losowo wybranej technologii: §G$@good_luck_event_1_insight|0%$§!."
 # Good luck event 2
 shroud.507.title: "Odkryta żyła surowców"
 shroud.507.desc: "§H[This.GetName]§!: odkryty został przy odrobinie szczęścia system bogatych w rudę naturalnych jaskiń, co do których uważano dotąd, że całkowicie się zawalił.\n\nPo uważnej ocenie zagrożenia uznaliśmy, że tunele te zdecydowanie nadają się do eksploatacji minerałów i rozszerzenie skali obecnych prac wydobywczych."
 # Good luck event 3
 shroud.512.title: "[This.GetNewfoundFertilityTitle]"
 shroud.512.title_default: "Nowo odkryta żyzność"
 shroud.512.title_anglers: "Nieodkryta rafa"
 shroud.512.desc: "§H[This.GetName]§!: rutynowe pomiary ujawniły, że jakość gleby znacząco wzrosła w ostatnich latach na szerokich połaciach planety.\n\nPodejrzewamy, że liczne obszary, które dotąd uważano za niezdatne do uprawy, mogą zostać teraz wykorzystane w rolnictwie."
 shroud.512.desc_anglers: "§H[This.GetName]§!: jednostka rybacka odkryła rafę ukrytą w oceanach. Region ten, uważany dotąd za opustoszały i bezpłodny, jest w rzeczywistości kwitnącym ekosystemem nadającej się do wykorzystania fauny."
 # Good luck event 4
 shroud.517.title: "Kominy geotermalne"
 shroud.517.desc: "§H[This.GetName]§!: przesunięcie się płyty tektonicznej doprowadziło do powstania szczeliny w dużym podziemnym zbiorniku wodnym. Ciepło z płaszcza planety gotuje uwięziony płyn, powodując formowanie się na powierzchni kominów geotermalnych.\n\nTo naturalne zjawisko zapewnia nam szansę na rozbudowę infrastruktury energetycznej kolonii poprzez budowę nowych elektrowni geotermalnych i pomp ciepła."
 # Good luck event 5
 shroud.522.title: "Odkrycie strumienia cząstek kwantowych"
 shroud.522.desc: "§H[This.GetName]§!: doszło do spontanicznego pojawienia się anomalii - pętli cząstek subatomowych. W strumieniu tym w każdej sekundzie dochodzi do rzadkich subcząsteczkowych interakcji zapewniających ogrom danych na temat natury dynamiki kwantowej.\n\nSkupienie badań nad tymi zjawiskami pozwoliłoby nam lepiej zrozumieć fundamentalny budulec naszego wszechświata."
 # Good luck event 6
 shroud.527.title: "Wykrycie echa międzywymiarowego"
 shroud.527.desc: "§H[This.GetName]§!: [From.GetResearchers] odkryli koncentrację sygnałów izochronicznych.\n\nWstępna analiza wskazuje, iż sygnały te zostały przesłane z wymiaru innego niż nasz własny. Wczesne tłumaczenia sugerują, że wiadomości te związane są z zasadami logicznymi i rozmyślaniami filozoficznymi. Być może jest to próba ubogacenia nas intelektualnie przez byty wykraczające poza nasze zrozumienie.\n\nJeśli stworzymy bezpośredni nasłuch na te sygnały, będziemy mogli nadal monitorować zawarte w nich objawienia."
 # Good luck event 7
 shroud.532.title: "Odkryto zaawansowany wrak"
 shroud.532.desc: "§H[This.GetName]§!: w układzie pojawił się porzucony statek. [From.GetQuantumParticleStreamDiscoveredExtra]\n\nDoszliśmy do wniosku, że pozostawał on niewykryty w układzie przez tysiąclecia i ujawnił się dopiero po tym, jak jego generator energii słonecznej uległ awarii. Na pokładzie brak oznak życia. Rozpoczęliśmy już ostrożną rozbiórkę jednostki, aby dowiedzieć się o niej najwięcej, jak to możliwe."
 shroud.532.extra: "Nienadająca się do naprawy jednostka zdołała wygenerować coś w rodzaju pola niewidzialności i jest, ogólnie rzecz biorąc, o wiele bardziej zaawansowana taktycznie niż nasze własne floty."
 shroud.532.extra_first_contact: "Nienadająca się do naprawy jednostka wykorzystywała technologię maskowania na niedoścignionym dla nas poziomie."
 shroud.532.a: "To jak dar spośród gwiazd."
 # Good luck event 8
 shroud.537.title: "Metalurgia geotermalna"
 shroud.537.desc: "§H[This.GetName]§!: głęboko pod powierzchnią dochodzi do niesamowicie niestabilnej aktywności geotermalnej. Podziemne ruchy magmy doprowadziły do wyrzutów lawy i odsłoniły złoża niepozyskanej jeszcze rudy.\n\nTo zjawisko geologiczne doprowadziło do przegrzania niewyeksploatowanych minerałów, przez co ruda zmieniła się w gotowy stop. Prace górnicze na planecie pozwolą więc dzięki temu pozyskiwać fragmenty gotowego do obróbki metalu."
 # Good luck event 9
 shroud.543.title: "Porzucony krążownik"
 shroud.543.desc: "Układ §H[From.GetName]§!: odkryty został porzucony, dryfujący okręt wojenny. Jego projekt nie przypomina żadnego stosowanego przez znane imperium. Nie nosi też żadnej rozpoznawalnej flagi czy insygniów.\n\nPo dokładnych oględzinach i pomniejszych naprawach [This.GetEngineerPlural] ogłaszają, że okręt nadaje się do aktywnej służby."
 shroud.543.a: "$shroud.532.a$"
 shroud.543.tt: "Otrzymujesz w układzie krążownik."
 # Good luck event 10
 shroud.545.title: "[This.GetSenseOfOptimismTitle]"
 shroud.545.title_default: "Poczucie optymizmu"
 shroud.545.title_gestalt: "Unilateralna spójność"
 shroud.545.desc: "§H[This.GetName]§!: światy [This.GetAdjective] doświadczają fali niewyjaśnionego optymizmu. Ludność czuje się odrobinę szczęśliwsza, zadowolona i usatysfakcjonowana własnym istnieniem. Ta zbiorowa zmiana nastroju zdecydowanie wynika z optymalnego ustawienia ciał niebieskich. To może być wyłącznie dobry omen na przyszłość."
 shroud.545.desc_gestalt: "§H[This.GetName]§!: wszystko toczy się w prawdziwej harmonii pod dyrektywą jednoznacznego skupienia. Ta unilateralna spójność z pewnością wynika z optymalnego układu ciał niebieskich i stanowi symbol wspaniałych rzeczy, które mają nadejść."
 shroud.545.a: "Gwiazdy spowijają nas swoim blaskiem."
 # Good luck event 11
 shroud.553.title: "Sprzyjający trygon"
 shroud.553.desc: "Układ §H[From.GetName]§!: trzy ciała niebieskie ustawiły się tak, że stworzyły sprzyjający trygon: §H[favorable_trine_planet_1.GetName]§!, §H[favorable_trine_planet_2.GetName]§! i §H[favorable_trine_planet_3.GetName]§!.\n\nTen korzystny astrologiczny układ przynosi poczucie spokoju i harmonii w naszej kolonii (§H[This.GetName]§!)."
 shroud.553.a: "Takie rzeczy to dla każdego wydarzenie życia."
 # Good luck event 12
 shroud.555.title: "[auspicious_position_planet.GetName] w doniosłej pozycji"
 shroud.555.desc: "§H[root.capital_scope.GetName]§!: §H[auspicious_position_planet.GetName]§! znajduje się w doniosłej pozycji na niebie: przebywa w astrologicznym Domu Niebiańskiego Powrotu.\n\nStanowi to rozpoczęcie nowego wewnętrznego cyklu i wspaniałą okazję do wzrostu i rozwoju, jakim może cieszyć się [root.GetName]."
 # Good luck event 13
 shroud.560.title: "Harmonia żywiołów"
 shroud.560.desc: "[This.GetName]: wszelkie wymierne wskaźniki astrologiczne wskazują, iż zachodzi obecnie stan doskonałej równowagi żywiołów.\n\nWłaściwe zarządzanie żyłami energetycznymi pozwoli na utrzymanie tego korzystnego ekwilibrium przez dugi czas, co zapewni idealne środowisko metafizyczne pozwalające naszym przywódcom na rozkwitnąć."
 shroud.560.a: "Cóż za wspaniały łut szczęścia."
 # Good luck event 14
 shroud.568.title: "Świetliste ciało niebieskie"
 shroud.568.desc: "Układ §H§H[This.GetName]§!§!: główna gwiazda lśni niezwykłym blaskiem. Po przedyskutowaniu tego zjawiska ze specjalistami od astrologii zrozumieliśmy, że nadmiar jej energii poprawi sprawność wszelkich systemów generujących energię (§H[This.GetName]§!)."
 shroud.568.a: "Niech gwiazdy spowijają nas swoim blaskiem."
 # Good luck event 15
 shroud.570.title: "Harmonia członków rady"
 shroud.570.desc: "Dwie osoby z naszej rady, §H[councilor_harmony_leader_1.GetTitle] [councilor_harmony_leader_1.GetName]§! i §H[councilor_harmony_leader_2.GetTitle] [councilor_harmony_leader_2.GetName]§!, odkryły niedawno, że ich znaki astrologiczne uzupełniają się w doskonały sposób.\n\nDoprowadziło to do politycznego partnerstwa i zjednoczenia naszego rządu pod sztandarem wzajemnego szacunku i wydajności, co przyspieszyło rozmaite procesy legislacyjne."
 shroud.570.a: "Wymarzona para."
 # Good luck event 16
 shroud.575.title: "Więcej, niż się wydaje"
 shroud.575.desc: "§H$grand_archive$§!: Podczas rutynowego katalogowania na podłogę upuszczony został niezabezpieczony okaz, który dostarczono następnie szybko do konserwatora w celu uważniejszych oględzin.\n\nCo zaskakujące, okazało się, że w wyniku tego wypadku poluzowaniu uległa tajna skrytka - dotąd niezauważona, skrywała rozmaite ciekawe artefakty, które możemy dodać do swojej kolekcji."
 shroud.575.a: "Dary, które niosą dary."
 # Bad luck events
 # Bad luck event 1
 shroud.700.title: "Dysharmonia"
 shroud.700.desc: "Populacja naszych światów nie może pozbyć się wszechobecnego poczucia grozy. Wszyscy odczuwają wysoki stres, rozkojarzenie, brak satysfakcji z własnego istnienia. Ta zbiorowa zmiana nastroju musi wynikać z suboptymalnego układu ciał niebieskich."
 shroud.700.desc_gestalt: "§H[This.GetName]§!: wszędzie odczuwana jest dysharmonia. Ten brak koordynacji prowadzi do stagnacji w kolektywie. Musi on wynikać z suboptymalnego układu ciał niebieskich."
 HOW_UNFORTUNATE: "Bardzo to pechowe."
 # Bad luck event 2
 shroud.707.title: "Zderzenie jednostek"
 shroud.707.desc: "§H[This.GetName]§! (§H[This.System.GetName]§!): brak komunikacji podczas rutynowych manewrów doprowadził do kolizji przy dużej prędkości - zderzyło się kilka okrętów wojennych.\n\n[This.GetNavalCollisionLeader] potwierdza, że [From.GetIndividualNamePlural] odpowiadający za ten błąd są już po stosownej karze."
 shroud.707.leader_name: "§H[Leader.GetName]§!"
 shroud.707.default_name: "Centralny sztab wojskowy"
 shroud.707.tt: "§H[This.GetName]§! - zniszczone statki: §R5§!"
 # Bad luck event 3
 shroud.710.title: "Pożar zbiornika"
 shroud.710.desc_default: "§H[silo_fire_planet_targeted.GetName]§!: awaria elektryczności w zbiorniku surowców wywołała potężny pożar w magazynie.\n\n$shroud.710.desc$"
 shroud.710.desc_starbase: "§H[silo_fire_starbase_targeted.Fleet.System.GetName]§!: awaria elektryczności w zbiorniku surowców bazy gwiezdnej wywołała potężny pożar w magazynie.\n\n$shroud.710.desc$"
 shroud.710.desc: "Systemy tłumienia ognia tymczasowo zawiodły i znacząca część przechowywanych wewnątrz zasobów uległa uszkodzeniu w pożodze. Sam zbiornik jest nie do naprawy."
 shroud.710.a: "Niech przeklęte będą gwiazdy!"
 shroud.710.tt_default: "§H[silo_fire_planet_targeted.GetName]§!: §H$building_resource_silo$§! został zniszczony.\n$shroud.710.tt$"
 shroud.710.tt_starbase: "§H[silo_fire_starbase_targeted.Fleet.System.GetName]§!: §H$sm_resource_silo$§! został zniszczony.\n$shroud.710.tt$"
 shroud.710.tt: "Utracone zasoby: §R$@silo_fire_resources_lost|1%$§!."
 # Bad luck event 4
 shroud.715.title: "Dyplomatyczne faux pas"
 shroud.715.desc: "[This.GetGalCommunityOrGalImperium]: jeden z naszych przedstawicieli nieumyślnie zachował się w sposób nieprzystający do stanowiska. Podczas przemówienia mającego zapewnić poparcie dla naszych interesów doszło do awarii translatora, w wyniku którego osoba imieniem [diplomatic_faux_pas_victim.GetName] została obsypana nienawistnymi obelgami. Wieści o tym nieszczęśliwym wypadku rozniosły się w galaktycznych mediach i naraziły naszą reputację.\n\nChoć czyny te nie stanowią podstaw do natychmiastowego zwolnienia, nasza pozycja uległa w ich wyniku osłabieniu."
 shroud.715.a: "Bardzo pechowa pomyłka."
 shroud.715.tt: "§H[diplomatic_faux_pas_galcom_envoy.GetName]§! ma nową cechę: §R$leader_trait_destructive$§!"
 # Bad luck event 5
 shroud.720.title: "Ekstremalny rozbłysk słoneczny"
 shroud.720.desc: "[extreme_solar_flare_system.GetName]: bezprecedensowy rozbłysk słoneczny doprowadził do funkcjonalnego zniszczenia wszelkich stacji orbitalnych w układzie.\n\nTen zadziwiający strumień skoncentrowanych promieni gamma wykracza poza wszystko, co dotychczas wykazywały pomiary tego ciała niebieskiego. Nasza analiza korony gwiazdy wskazuje, że jej przewidywany czas istnienia zmniejszył się o ponad trzy miliony lat."
 shroud.720.desc_storm: "Powstała w rezultacie fala energii spowodowała, że w układzie rozpoczęła się $celestial_storm$. Wdrożone są obecnie środki kryzysowe."
 shroud.720.tt: "$observation_station$, $research_station$, $mining_station$ - wszystkie obiekty tego typu w układzie §H[extreme_solar_flare_system.GetName]§! zostały zniszczone."
 # Bad luck event 6
 shroud.725.title: "Znaczący wypadek w ruchu ulicznym"
 shroud.725.desc: "§H[high_profile_traffic_accident_planet.GetName]§!: niespodziewane zmiany klimatyczne zakłóciły funkcjonowanie naszych sieci tranzytowych. Pomijając liczne opóźnienia, wywołało to również znaczącą liczbę wypadków drogowych, wśród uczestników których znajduje się [This.GetClass] §H[This.GetName]§!."
 shroud.725.desc_killed: "$shroud.725.desc$\n\nNasze służby ratunkowe zadziałały szybko, lecz [This.GetHisHer] rany okazały się śmiertelne."
 shroud.725.desc_killed_machine: "$shroud.725.desc$\n\nNiestety, okazało się, że obwody jednostki uległy niemożliwemu do naprawy uszkodzeniu."
 shroud.725.desc_maimed: "$shroud.725.desc$\n\n[This.GetName] żyje mimo wypadku, lecz nie obeszło się bez szwanku. Szkody są nieodwracalne."
 shroud.725.a: "Cóż za tragedia."
 # Bad luck event 7
 shroud.730.title: "Potężne zapadliska"
 shroud.730.desc: "§H[This.GetName]§!: na powierzchni pojawiły się ogromne zapadliska, co doprowadziło do znaczących uszkodzeń infrastruktury. Jedna ze szczelin otworzyła się pod fundamentem jednego z budynków, powodując jego częściowe zawalenie się. Szczęśliwie wszystkie dotknięte nieszczęściem obszary zostały pomyślnie ewakuowane.\n\nNie jesteśmy w stanie określić dokładnej przyczyny nagłego pojawienia się tych geologicznych fenomenów, wdrożyliśmy jednak dodatkowe kontrole konserwacyjne mające monitorować erozję powierzchni."
 shroud.730.a: "Przeklęte niech będą gwiazdy..."
 shroud.730.tt: "Jeden z budynków leży teraz w ruinach."
 # Bad luck event 7
 shroud.735.title: "Spontaniczny wybuch niezadowolenia"
 shroud.735.desc: "§H[This.GetName]§!: na powierzchni planety doszło do wybuchu niebezpiecznych zamieszek. Ludność rozpalona jest gniewem i protestuje przeciw nieokreślonemu spiskowi, w ramach którego rząd [From.GetAdjective] miałby kontrolować układ ciał niebieskich. Coś, co rozpoczęło się jako demonstracja wiernych, wkrótce zmieniło się w akty przemocy, w ramach których podżegacze doprowadzili do potężnych zniszczeń w kolonii.\n\nBrutalni demonstratorzy zostali zneutralizowani przez siły bezpieczeństwa, naprawa infrastruktury zajmie jednak sporo czasu."
 shroud.735.desc_hive: "§H[This.GetName]§!: duże stado wykolejonych jednostek doprowadziło do rewolty w kolonii, powodując potężne zniszczenia. Mimo ich ferworu, podżegacze zostali zneutralizowani przez siły planetarne - naprawa uszkodzeń infrastruktury zajmie jednak sporo czasu."
 shroud.735.desc_machine: "§H[This.GetName]§!: liczna mniejszość dronów została zarażona przez tajemniczego wirusa, który doprowadził do ich buntu i próby zniszczenia kolonii. Mimo ich ferworu, wadliwe jednostki zostały zneutralizowane przez siły planetarne, naprawa uszkodzeń infrastruktury zajmie jednak sporo czasu."
 shroud.735.a: "Odbudujemy zniszczenia."
 # Bad luck event 9
 shroud.740.title: "Nagła choroba zakaźna"
 shroud.740.desc: "§H[This.GetName]§!: niezwykle zaraźliwy wirus zmutował, zarażając znaczną część ludności. Zastosowano kwarantannę i środki zaradcze takie jak śledzenie kontaktów i ograniczenia w przemieszczaniu się z nadzieją, że ograniczy to rozprzestrzenianie się choroby i pozwoli na uniknięcie przeciążenia lokalnej infrastruktury medycznej."
 # Bad luck event 10
 shroud.745.title: "Złowieszczy kwartyl"
 shroud.745.desc: "§H[From.GetName]§!: cztery ciała niebieskie w układzie - §H[calamitous_quartile_planet_1.GetName]§!, §H[calamitous_quartile_planet_2.GetName]§!, §H[calamitous_quartile_planet_3.GetName]§! i §H[calamitous_quartile_planet_4.GetName]§! - ułożyły się w złowieszczy kwartyl.\n\nTo katastrofalne zjawisko astrologiczne sprawi, że w kolonii §H[This.GetName]§! pojawi się niepewność. To idealna okazja dla takich jak [FromFrom.GetDissent] do siania dysharmonii wśród ludności."
 shroud.745.a: "Straszliwy omen."
 # Bad luck event 11
 shroud.750.title: "[planet_in_retrograde_planet.GetName] w retrogradacji"
 shroud.750.desc: "§H[planet_in_retrograde_home.GetName]§!: mieszkańcy zauważyli, że §H[planet_in_retrograde_planet.GetName]§! znajduje się teraz w retrogradacji. To chwila, aby przemyśleć nasze działania i wyrazić żal wobec niedoskonałości, jakie wiążą się ze słowem [This.GetName]. Niech ten trudny czas refleksji przybliży nas do naszych ideałów w przyszłości."
 # Bad luck event 12
 shroud.755.title: "Nierównowaga żywiołów"
 shroud.755.desc: "[This.GetName]: niestety, wszelkie możliwe mierniki wskazują, że doszło do całkowitej dysharmonii żywiołów.\n\nPróba przywrócenia tego delikatnego ekwilibrium będzie czasochłonna i trudna. W obecnym chaotycznym stanie nasi przywódcy nie będą mogli uzyskać dostępu do metafizycznego środowiska medytatywnego, co ograniczy ich rozwój."
 shroud.755.a: "To niedopuszczalne. Musimy to naprawić."
 # Bad luck event 13
 shroud.760.title: "Przygaśnięcie gwiazdy"
 shroud.760.desc: "§H[From.GetName]§!: główna gwiazda w niezwykły sposób przygasła. Po przedyskutowaniu tego fenomenu z naszymi specjalistami od astrologii uznaliśmy, że ten spadek jasności wywrze niekorzystny skutek na infrastrukturę energetyczną (§H[This.GetName]§!)."
 shroud.760.a: "Ale czemu?"
 # Bad luck event 14
 shroud.765.title: "Niezgoda w radzie"
 shroud.765.desc: "Dwie osoby z naszej rady, §H[discordant_council_leader_1.GetTitle] [discordant_council_leader_1.GetName]§! i §H[discordant_council_leader_2.GetTitle] [discordant_council_leader_2.GetName]§!, dowiedziały się niedawno, że ich znaki astronomiczne są zasadniczo niekompatybilne.\n\nRywalizacja polityczna, jaką to wywołało, doprowadziła do zrodzenia się atmosfery wrogości i napięć w rządzie, co przełożyło się na częste opóźnienia w rutynowych procesach legislacyjnych."
 # Bad luck event 15
 shroud.770.title: "Nierozważna gadanina"
 shroud.770.desc_default: "Osobiste przekonania jednego z naszych administratorów regionalnych o innym imperium zostały przypadkowo przekazane poddanemu tej nacji. Po trudnej dyskusji o podsłuchu hiperlinii funkcjonariusz komunikacyjny zapomniał o zamknięciu kanału transmisyjnego, przez co imperium [careless_talk_empire.GetName] usłyszało strumień wyzwisk, jaki padł po drugiej stronie.\n\n$shroud.770.desc_end$"
 shroud.770.desc_machine: "Niefiltrowane wypowiedzi jednej z naszych jednostek administracyjnych o innym imperium zostały przypadkowo przekazane poddanemu tej nacji. Po trudnej dyskusji o podsłuchu hiperlinii jednostka komunikacyjna zapomniała o zamknięciu kanału transmisyjnego, przez co imperium [careless_talk_empire.GetName] usłyszało strumień wyzwisk, jaki padł po drugiej stronie.\n\n$shroud.770.desc_end$"
 shroud.770.desc_hive: "Neiprzychylne uwagi jednego z naszych dronów administracyjnych o innym imperium zostały przypadkowo przekazane poddanemu tej nacji. Po trudnej dyskusji o podsłuchu hiperlinii dron komunikacyjny zapomniał o zamknięciu kanału transmisyjnego, przez co imperium [careless_talk_empire.GetName] usłyszało strumień wyzwisk, jaki padł po drugiej stronie.\n\n$shroud.770.desc_end$"
 shroud.770.desc_end: "Co nieuniknione, opinia, jaką ma [This.GetName] wśród populacji imperium [careless_talk_empire.GetAdjective], nieuchronnie się pogorszyła."
 # Bad luck event 16
 shroud.775.title: "Utrata okazu"
 shroud.775.desc: "Błąd administracyjny doprowadził do zagubienia jednego z naszych bezcennych artefaktów kulturowych. Mimo zakrojonych na szeroką skalę poszukiwań, wydaje się, że przepadł on w labiryncie, jakim jest nasze §H$grand_archive$§!, lub został przeniesiony w nieokreślone miejsce.\n\nW rezultacie opracowujemy na nowo procedury związane ze śledzeniem naszych wystawionych na widok publiczny okazów."
 shroud.775.tt: "Utracony losowo wybrany, wystawiony okaz: §R1§!"
 # Experimental Testing Situation Finished
 shroud.1015.name: "Powodzenie eksperymentalnych badań"
 shroud.1015.desc.intro: "[Root.GetResearchers] donoszą o ukończeniu serii przełomowych eksperymentów na żywych istotach, które zapewniły nam bezcenną wiedzę mogącą stymulować dalszy rozwój technologiczny."
 shroud.1015.desc.default: "$shroud.1015.desc.intro$ Musimy teraz rozważyć, w jakiej dziedzinie przeprowadzimy kolejną fazę badań."
 shroud.1015.desc.escaped: "$shroud.1015.desc.intro$ Niedawna seria masowych egzekucji więźniów sprawiła, że nasi [Root.GetResearchers] mają dużo materiału, który pozwoli im dokonać kolejnego przełomu technologicznego."
 shroud.1015.a: "Rozpocznijmy badania §Y$PHYSICS$§!."
 shroud.1015.a.tt: "Rozpoczyna sytuację §Y$situation_experimental_testing$§! z podejściem \"§Y$situation_experimental_testing_physics$§!\":$TABBED_NEW_LINE$$situation_experimental_testing_physics_outcome_tt$"
 shroud.1015.b: "Rozpocznijmy badania §Y$SOCIETY$§!."
 shroud.1015.b.tt: "Rozpoczyna sytuację §Y$situation_experimental_testing$§! z podejściem \"§Y$situation_experimental_testing_society$§!\":$TABBED_NEW_LINE$$situation_experimental_testing_society_outcome_tt$"
 shroud.1015.c: "Rozpocznijmy badania §Y$ENGINEERING$§!."
 shroud.1015.c.tt: "Rozpoczyna sytuację §Y$situation_experimental_testing$§! z podejściem \"§Y$situation_experimental_testing_engineering$§!\":$TABBED_NEW_LINE$$situation_experimental_testing_engineering_outcome_tt$"
 shroud.1015.d: "Rozważmy, jakie mamy opcje."
 shroud.1015.d.tt: "Rozpoczyna sytuację §Y$situation_experimental_testing$§! z podejściem \"§Y$situation_experimental_testing_hold$§!\":$TABBED_NEW_LINE$$situation_experimental_testing_hold_effect_tt$"
 shroud.1015.physics_reward: "Zdobywasz wiedzę o losowej technologii (£physics£ §Y$PHYSICS$§!)."
 shroud.1015.society_reward: "Zdobywasz wiedzę o losowej technologii (£society£ §Y$SOCIETY$§!)."
 shroud.1015.engineering_reward: "Zdobywasz wiedzę o losowej technologii (£engineering£ §Y$ENGINEERING$§!)."
 EXPERIMENT_TESTING_TECH_OPTION_TITLE: "Sukces eksperymentu"
 EXPERIMENT_TESTING_TECH_OPTION_SETTING: "Zgromadzono wiedzę ($situation_experimental_testing$)"
 EXPERIMENT_TESTING_TECH_OPTION_DESC: "Nasz eksperyment przyniósł obiecujące wyniki.\n$TECH|Y$: §G+$VAL$%§! postępów"
 # Experimental Testing - Test subjects escape
 shroud.1105.title: "$job_test_subject_plural$ uciekają"
 shroud.1105.desc.intro: "Kilka cennych obiektów testowych uciekło z placówki na świecie §H[root.GetName]§!, korzystając z prowizorycznego tunelu.\n\nDo jego wykopania posłużyły improwizowane narzędzia i [Owner.GetSpeciesHandNamePlural]. Budowa musiała zająć wiele lat. Nie wiemy, ile osób wiedziało o jego istnieniu ani dlaczego nie został wykryty przez tak długi czas."
 shroud.1105.desc.escaped: "Takie zdarzenia wymagają stanowczej reakcji, aby zapobiec podobnym wybrykom w przyszłości. Nasza wcześniejsza łagodność tylko zachęciła resztę populacji do działania."
 shroud.1105.desc.outro: "Takie zdarzenia wymagają stanowczej reakcji, aby zapobiec podobnym wybrykom w przyszłości."
 shroud.1105.a: "Zapracowali na swoją wolność."
 shroud.1105.a.tt: "§H[root.GetName]§!: połowa osobników gatunku §Y$job_test_subject_plural$§! wyjedzie jako uchodźcy."
 shroud.1105.b: "Wstrzymać działalność, dopóki ich nie znajdziemy."
 shroud.1105.b.tt: "Zbiegli §Y$job_test_subject_plural$§! zostaną schwytani."
 shroud.1105.c: "Stracić pozostałych jako przestrogę."
 shroud.1105.c.tt: "§H[root.GetName]§!: utracisz wszystkie osobniki gatunku §Y$job_test_subject_plural$§!."
 testing_lockdown: "Blokada testów"
 testing_lockdown_desc: "Testowanie jest chwilowo zawieszone. Trwa wyłapywanie zbiegłych obiektów."
 testing_lockdown_tt: "Tempo postępu sytuacji §Y$situation_experimental_testing$§!: §R-100%§!"
 example_set: "Wymierzono kary"
 example_set_desc: "Brutalna odpowiedź na poprzednią ucieczkę zagwarantuje posłuszeństwo reszty populacji obiektów testowych."
 example_set_tt: "Tempo postępu sytuacji §Y$situation_experimental_testing$§!: §G+10%§!"
 # Psionic Ascension Situation (Breaching the Shroud)
 # Mid-Stage Events
 # Beneficial Events
 # A1
 shroud.2300.name: "Przekaz myśli"
 shroud.2300.desc: "[Owner.GetThoughtTransmissionIntro]\n\nInformacje te mogą przybierać rozmaite formy: określony materiał językowy lub wizualny, ogólne koncepcje lub odczuwanie emocji. Co kluczowe, uważnie przeprowadzona transmisja pozostawia poddaną mu osobę całkowicie nieświadomą, że cokolwiek się dzieje.\n\n[Owner.GetThoughtTransmissionOutro]."
 shroud.2300.intro: "§H[Owner.Capital.GetName]§!: [Owner.GetResearchers] z mocami psionicznymi opracowali jednokierunkową formę telepatii pozwalającą nam na transmisję informacji kognitywnych do każdej podatnej świadomości."
 shroud.2300.intro_gestalt: "§H[Capital.GetName]§!: [Owner.GetResearchers] z mocami psionicznymi opracowali jednokierunkową formę telepatii pozwalającą nam na transmisję informacji kognitywnych do każdej podatnej świadomości, nie tylko w naszym kolektywie."
 shroud.2300.desc.outro: "Technika ta otwiera wiele nowych możliwości komunikacji telepatycznej oraz wywołuje szerokie implikacje zarówno w ramach naszego państwa ([Owner.GetName]), jak i poza nimi."
 shroud.2300.desc.outro_homicidal: "Technika ta otwiera wiele nowych możliwości komunikacji telepatycznej, które można wykorzystać w ramach naszego państwa ([Owner.GetName]), jak i poza nimi."
 shroud.2300.a.robot: "To logiczny kolejny krok na drodze naszego rozwoju."
 shroud.2300.a.organic: "Logiczny kolejny krok w naszej ewolucji."
 shroud.2300.b: "Nowy sposób na narzucanie naszej woli."
 shroud.2300.c.variant: "To sposób na zaprowadzenie porządku społecznego."
 shroud.2300.c.organic: "Niech społeczeństwo zdecyduje o najlepszym tego wykorzystaniu."
 # A2
 shroud.2305.name: "Obecność duchów"
 shroud.2305.desc: "§H[Owner.Capital.GetName]§!: [Owner.GetCitizenPlural] donoszą o dostrzeżeniu niezwykłych stworzeń w różnych miejscach. W większości przypadków były to pojedyncze pojawienia się, lecz w jednym miejscu zdarzyło się to wielokrotnie. [Owner.GetPhantomPresenceExtra]\n\nOdkryto, że duch pojawia się u wejścia do bogatego w minerały systemu jaskiń."
 shroud.2305.extra: "Miejsce to zaczęło przyciągać tłumy gości pragnących dostrzec upiorną postać."
 shroud.2305.extra_spiritualist: "Upiorna postać, która się tam pojawia, przypomina rzekomo świętą istotę opisywaną w naszych starożytnych tradycjach religijnych."
 shroud.2305.a: "Zjawisko psioniczne do zbadania."
 shroud.2305.a_spiritualist: "To cud, który należy czcić."
 shroud.2305.b: "Nie należy naruszać spokoju tego elementu kultury."
 shroud.2305.b_spiritualist: "Nie należy naruszać spokoju tego świętego miejsca."
 shroud.2305.c: "Rozpocząć w tym miejscu wydobycie odkrywkowe."
 # A3
 shroud.2310.name: "Pasożyty psioniczne"
 shroud.2310.desc: "§H[Owner.Capital.GetName]§!: doszło do nieprzewidzianego wydarzenia klimatycznego - przypominającego burzę zakłócenia, które przetoczyło się przez obszar o szczególnie wysokim poziomie energii psionicznej. Kiedy ustąpiło, odkryliśmy, że część lokalnej fauny uległa zakażeniu dziwnym pasożytem, który wgryza się i powoli konsumuje ich mózgi.\n\nW miarę postępów tej pasożytniczej infekcji, zwierzęta tymczasowo wykształcają podstawowe umiejętności telekinetyczne, które wykorzystują przed niechybną śmiercią podczas polowania i pożywiania się.\n\n[Owner.GetShroudParasitesEnding]"
 shroud.2310.ending_biological: "Co ciekawe, po ostrożnym przetworzeniu pasożyty nadają się do bezpiecznego spożycia. Jako bogate źródło rozmaitych składników odżywczych, mogą zapewnić zdrową i niedrogą żywność dla naszych obywateli."
 shroud.2310.ending_lithoid: "Co ciekawe, stworzenia te wydzielają z siebie duże ilości bogatej w związki nieorganiczne substancji. Mogą więc stać się elementem nowatorskiej metody syntezy minerałów."
 shroud.2310.ending_machine: "Co ciekawe, stworzenia te wydzielają z siebie duże ilości niezwykle palnej substancji. Mogą więc zapewnić wydajną metodę produkcji bioenergii."
 shroud.2310.a: "To cenna okazja do badań."
 shroud.2310.b_organic: "Nie ma nic lepszego niż darmowy posiłek."
 shroud.2310.b_machine: "Rozpocząć procedury pozyskiwania."
 shroud.2310.c: "Ujawniła się nowa, fantastyczna forma życia."
 # A4
 shroud.2315.name: "Materialne przejawy"
 shroud.2315.desc: "Podczas eksperymentów z nowymi technikami psionicznymi zaobserwowaliśmy nieoczekiwane materializacje podczas medytacji grupowej. Kolektywne skupienie na jednym punkcie w przestrzeni poskutkowało ulotnym pojawieniem się niezwykłych obiektów.\n\nZwiązany z tym wysiłek psychiczny jest znaczący, możliwe jednak, że bylibyśmy w stanie wykorzystać go do urzeczywistniania obiektów pasujących do naszych potrzeb. Skąd one pochodzą i jakie mogą być konsekwencje ich pojawiania się - nie wiadomo."
 shroud.2315.a: "Zacznijmy spełniać nasze życzenia."
 shroud.2315.b: "Wspomóżmy w ten sposób produkcję żywności."
 shroud.2315.c: "Wzmocnijmy nasze floty"
 # A5a
 shroud.2320.name: "Psioniczne podwajanie"
 shroud.2320.desc: "Krążą plotki, że istnieją [Owner.GetIndividualNamePlural] o mocach psionicznych i możliwościach bilokacji - zdolności fizycznej obecności w dwóch różnych miejscach naraz. [Owner.GetResearchers] zajęli się tymi nieprawdopodobnymi doniesieniami i, co niesamowite, okazuje się, iż są one jednak prawdziwe.[Owner.GetPsionicDoublingExtra]\n\nTylko ułamek populacji posiada obecnie tę niezwykłą umiejętność, dalsze badania mogą jednak zapewnić nam metody szkolenia w niej innych."
 shroud.2320.extra: "\n\nOdległość fizyczna wydaje się nie stanowić przeszkody. Adepci ci wielokrotnie wykazali, że są w stanie znajdować się przez chwilę w dwóch różnych układach gwiezdnych naraz"
 shroud.2320.extra_organic: "$shroud.2320.extra$, utrzymując połączenie telepatyczne między dwoma wykonującymi niezależne czynności ciałami."
 shroud.2320.extra_machine: "$shroud.2320.extra$, utrzymując połączenie obliczeniowo-telepatyczne między dwiema wykonującymi niezależne czynności jednostkami."
 shroud.2320.extra_default: "$shroud.2320.extra$."
 shroud.2320.a: "To nowa metoda na intragalaktyczną współpracę."
 shroud.2320.b: "Nowa forma projekcji siły."
 shroud.2320.c: "Nowa metoda rządów multiplanetarnych."
 shroud.2320.d: "Jakąż to zapewnia wspaniałą rozrywkę!"
 # A5b
 shroud.2325.name: "Obserwacja psioniczna"
 shroud.2325.desc: "Niewielka część ludności [Owner.GetAdjective] wykształciła cudowny zmysł psioniczny: telestezję, zdolność wyczuwania bytów z odległości wykraczających poza granice zwykłej percepcji. Ci obserwatorzy, nie potrzebując żadnego wyspecjalizowanego szkolenia, są w stanie trafnie opisać w szczegółach odległe obiekty.\n\n§H[Owner.GetName]§! może szczególnie skorzystać na kontroli i wzmocnieniu tych mocy. Wykorzystując umiejętności, jakie wykazują [Owner.GetTelepathPlural] o największej sile, możemy spróbować udoskonalić tę technikę i wykorzystać ją w ważnym przedsięwzięciu."
 shroud.2325.a: "Odkryjmy tajemnicę tych, którzy są wokół nas."
 shroud.2325.a_tt: "Dane wywiadowcze na temat wszystkich napotkanych imperiów: §G+10§! "
 shroud.2325.b: "Odkryjmy rubieże wszechświata."
 shroud.2325.c: "Odkryjmy słabości naszych wrogów."
 shroud.2325.d: "Odkryjmy głębiej położone złoża zasobów."
 # Balanced Events
 # B1
 shroud.2400.name: "Zmienność materii"
 shroud.2400.desc: "Tracimy w niepokojącym tempie zasoby mineralne. Zapasy materii nieorganicznej w fabrykach i magazynach kurczą się szybciej, niż powinny wskutek wykorzystania, [Owner.GetMatterInFluxExtra]. Straty te wiążą się ze zwiększoną aktywnością psioniczną w dotkniętych zjawiskiem miejscach.\n\nMożemy odpowiedzieć, wstrzymując aktywność psioniczną w pobliżu magazynów, to jednak spowolni tempo badań psionicznych i ograniczy ich przemysłowe zastosowanie. Moglibyśmy też zamiast tego wysłuchać propozycji zbudowania tłumika pola psionicznego, który powinien zatrzymać proces dematerializacji. Jeśli nie zrobimy nic, nasze możliwości co do badań psionicznych spadną."
 shroud.2400.desc_default: "czego przyczyną jest podobno nie przestępczość czy niekompetencja, lecz spontaniczna dematerializacja"
 shroud.2400.desc_gestalt: "czego przyczyną jest podobno nie wykolejone czy niekompetentne zachowanie, lecz spontaniczna dematerializacja"
 shroud.2400.a: "Dobra materialne nie są szczególnie istotne."
 shroud.2400.b: "Opracujmy sprzęt antydematerializacyjny."
 shroud.2400.c: "Wyznaczmy strefę wolną od psioniki."
 # B2
 shroud.2405.name: "Martwe głowy"
 shroud.2405.desc: "Rosnąca ciekawość naszej ludności co do psioniki doprowadziła do wykształcenia się dziwnego obyczaju: [Owner.GetSpeciesBrainPlural] nieżywych stają się obiektami, z którymi pasjonaci próbują nawiązać łączność.\n\nPraktykujący ten obyczaj wierzą, iż informacje kognitywne są czymś, czego [Owner.GetDeathName] nie niszczy - idea taka wywodzi się z teorii naukowych identyfikujących siły telepatyczne jako formę energii, którą można przekształcić, lecz nie zniszczyć. Niewielki, lecz stale rosnący odsetek wierzy też, że śmierć psionika tworzy mikroskopijne pęknięcie podprzestrzenne, okno, przez które dostrzec można inne wymiary.\n\nChoć innowacyjne badania to rzecz godna pochwały, naruszanie spokoju [Owner.GetDeceasedAdj] części naszej ludności budzi wątpliwości natury etycznej. Co więcej, otrzymaliśmy meldunki o coraz to liczniejszych porywaczach ciał pozyskujących pożądane ich części w nielegalny sposób."
 shroud.2405.a: "To godne pochwały przedsięwzięcie, o ile je uregulujemy."
 shroud.2405.b: "Niech zmarli spoczywają w spokoju."
 shroud.2405.c: "[Owner.GetSpeciesBrainPlural] dla wszystkich."
 # B3a
 shroud.2410.name: "Transformacje psioniczne"
 shroud.2410.desc: "Szerokim rzeszom naszej populacji psionicznej wyrosły dziwne, zaopatrzone w stawy kończyny o niepojętym wyglądzie. [Owner.GetScientistPlural] twierdzą, że ich wygląd wywołała mutacja, [Owner.GetGeneticMutationName] na masową skalę. Jasnym jest teraz, że aktywność psioniczna może wywołać zmiany w wyglądzie praktykującego. Choć nie możemy zapobiec powstawaniu tych narośli, odkryliśmy, że tempo ich wzrostu może być kontrolowane psionicznie.\n\nChoć z początku elementem procesu wzrostu tych dodatkowych części jest [Owner.GetDistressName], udowadniają one swoją zaskakującą przydatność. Produktywne ich zastosowanie może zrekompensować nam dodatkowy ładunek kognitywny."
 shroud.2410.a: "To godne pochwały przedsięwzięcie, o ile je uregulujemy."
 shroud.2410.b: "Odrażające. Usunąć je wszystkie."
 shroud.2410.c: "Szokujące, lecz fascynujące. Przyjmijmy tę zmianę z radością."
 # B3b
 shroud.2415.name: "Telekinetyczne [Owner.GetEthicsPluralCap]"
 shroud.2415.desc: "[Owner.GetScientistPlural] opracowali niezawodną metodę na przetworzenie mocy psionicznej w energię kinetyczną, teraz zaś [Owner.GetEngineerPlural] współpracują z nimi w zakresie skalowania technologii na użytek praktyczny.\n\nZastosowania przemysłowe są obiecujące, lecz konsekwencje społeczne pozostają tematem otwartym. Jeśli [Owner.GetIndividualNamePlural] będą w stanie poprzez małą grupę psioników zasilić i obsłużyć sieć skomplikowanej maszynerii, [Owner.GetWorkerNamePlural] mogą masowo tracić pracę. [Owner.GetTelekineticEthicsExtra] Choć nasze umiejętności psioniczne nadal się rozwijają, być może najlepiej będzie zachować ostrożność."
 shroud.2415.extra: "Nieograniczony rozwój tej praktyki grozi niepokojami w społeczeństwie wciąż jeszcze oswajającym się ze swoim psionicznym potencjałem."
 shroud.2415.extra_gestalt: "Nieograniczony rozwój tej praktyki zagraża zwiększeniem odchyleń u zwolnionych dronów w czasie, nim przydzielone im zostaną nowe zadania."
 shroud.2415.a: "Nasz przemysł rozkwitnie."
 shroud.2415.b: "Tylko pomyśleć o tych zastosowaniach wojskowych."
 shroud.2415.c: "Ograniczmy tę praktykę. Praca fizyczna jest bardziej niezawodna."
 # B4
 shroud.2420.name: "Coraz silniejszy ból"
 shroud.2420.desc: "W naszym imperium nagle szerzyć się zaczęły [Owner.GetAcuteMigrainePlural]. Choć ich nasilenie jest najróżniejsze, dotknęły już znaczącą część populacji, przez co §H[Owner.GetName]§! mierzy się z licznymi problemami.\n\n[Owner.GetIndividualNamePlural] o wyjątkowo potężnej mocy psionicznej to grupa, która, choć nieliczna, została wyjątkowo silnie dotknięta przez ból. Wstępna analiza statystyczna wskazuje na korelację między zdolnościami psionicznymi a nasileniem objawów.[Owner.GetAGrowingPainExtra]"
 shroud.2420.extra_default: " Znane nam metody leczenia okazują się nieskuteczne - ból wydaje się dotykać bezpośrednio ośrodków psionicznych poprzez międzywymiarowe kanały, które dopiero zaczynamy pojmować."
 shroud.2420.extra_machine: ""
 shroud.2420.a: "Musimy nauczyć się to znosić."
 shroud.2420.b: "Rozdystrybuujmy silniejsze środki przeciwbólowe."
 shroud.2420.b_machine: "Rozdystrybuujmy ulepszenia ochronne."
 shroud.2420.c: "Czerpmy siłę z bólu."
 shroud.2420.c_machine: "Czerpmy siłę z przeciwności."
 # B5
 shroud.2425.name: "Psioniczne podziemie"
 shroud.2425.desc: "[Owner.GetPsionicUndergroundIntro], które tworzą [Owner.GetIndividualNamePlural] o mocach psionicznych, wykorzystują swoje moce telepatyczne do uprawiania nielegalnych sportów walki, w których psioniczni wojownicy toczą boje o kredyty i chwałę. Choć wielu praktyków to po prostu uzdolnieni w walce osobnicy bez wielkiego przeszkolenia, [Owner.GetPsionicUndergroundExtra]\n\n[Owner.GetPsionicUndergroundEnd]"
 shroud.2425.intro: "Odosobnione grupy"
 shroud.2425.intro_gestalt: "Grupy wykolejeńców"
 shroud.2425.extra: "inni to dawni uczestnicy państwowych programów psioniki bojowej."
 shroud.2425.extra_gestalt: "inni specjalizują się w psionice bojowej."
 shroud.2425.end: "Nasze prawa i instytucje nie dotrzymują kroku rzeczywistości. Te brutalne rozgrywki pomagają obecnie wspierać organizacje przestępcze poprzez nielegalny hazard, istnieje jednak szereg sposobów, na jakie moglibyśmy interweniować, by podporządkować tę aktywność państwu."
 shroud.2425.end_gestalt: "Choć wykolejenie nie jest pozbawione ryzyka, aktywność ta stanowi dla nas nową, praktyczną metodę na gromadzenie zestawów danych o walce fizycznej."
 shroud.2425.end_gestalt_organic: "$shroud.2425.end_gestalt$ Być może przy zachowaniu umiaru moglibyśmy skanalizować takie zachowania i uczynić z nich przydatny sposób na wyładowanie agresji kolektywu w czasach pokoju."
 shroud.2425.end_gestalt_machine: "$shroud.2425.end_gestalt$ Stworzenie surowszych parametrów testowych pozwoli wykorzystać te \"gry\" dla dobra kolektywu."
 shroud.2425.a: "Zwerbujmy tych wojowników. Będą służyć."
 shroud.2425.a.tt: "Zyskaj 3 §Y$psionic_army_plural$§! w układzie §Y[event_target:spawn_system.GetName]§!"
 shroud.2425.b: "Zbadajmy tę walkę psioniczną."
 shroud.2425.c: "Połóżmy kres tej bezsensownej przemocy."
 shroud.2425.d: "Zalegalizujmy tę rozrywkę jako sport dla widzów."
 shroud.2425.d_gestalt: "Zróbmy z tego regularne, publiczne zawody."
 # Chaotic Events
 # C1
 shroud.2502.name: "Opad Woalu"
 shroud.2502.desc: "§H[This.GetName]§!: otrzymaliśmy meldunki o nagłych zmianach środowiskowych w jednym z sektorów.\n\nAtmosfera stała się ciężka od przypominającego żel oparu pokrywającego ziemię oleistym opadem, który psionicy nazywają opadem Woalu. W okolicy dochodzi, jak głoszą meldunki, do znaczących zakłóceń natury telepatycznej.\n\nWarunki wewnątrz opadu są wyjątkowo [This.Owner.GetShroudfallExtra]. O ile nie zainwestujemy w odbudowę środowiska, mieszkańcy będą musieli dostosować się do radykalnie odmienionych warunków."
 shroud.2502.extra_default: "niebezpieczne dla rozumnego życia"
 shroud.2502.extra_machine: "niekorzystne dla naszych obwodów neuronowych"
 shroud.2502.extra_homicidal_hive: "niebezpieczne dla gatunku [Owner.GetSpeciesAdj&genitive]"
 shroud.2502.a: "Niech Woal pochłonie tę ziemię."
 shroud.2502.b: "Znajdźmy sposób na odbudowę środowiska."
 shroud.2502.c: "Pozyskajmy ten egzotyczny materiał, zanim osiądzie."
 # C2
 shroud.2505.name: "Poza kontrolą"
 shroud.2505.desc: "Niektórzy spośród nas zaczęli zachowywać się anormalnie - wykazują nagłe zmiany w opiniach, nawykach i ogólnym zachowaniu. Niejednokrotnie [Owner.GetWorkerNamePlural] przerywają pracę, a [Owner.GetOutOfControlExtra].\n\nDotknięte tym zjawiskiem jednostki twierdzą, że wykonują polecenia bezimiennej istoty zamieszkującej obrzeża ich świadomości - kieruje ona rzekomo wszystkimi ich czynami. Tworząc swoją psioniczną historię, musimy wziąć pod uwagę wpływ pozawymiarowych sił na [Owner.GetOutOfControlPsyche]."
 shroud.2505.extra_default: "lojalni niegdyś przedstawiciele głoszą niezgodne z naszą linią poglądy"
 shroud.2505.extra_machine: "niegdyś niezawodne jednostki administracyjne funkcjonują w sposób suboptymalny"
 shroud.2505.psyche_default: "naszą psychikę"
 shroud.2505.psyche_machine: "nasze obwody logiczne"
 shroud.2505.a: "Możemy nauczyć się niwelować te impulsy."
 shroud.2505.b: "Te głosy mogą nas wiele nauczyć."
 shroud.2505.c: "To zagrożenie dla naszej władzy. Wykorzenić to."
 # C3
 shroud.2510.name: "Przeciążenie neuronowe"
 shroud.2510.desc: "[Owner.GetNeuralOverloadIntro]\n\nSzerzej zakrojone testy ujawniły, że znaczna część naszej populacji cierpi na [Owner.GetNeuralOverloadExtra], najpewniej ze względu na zwiększoną [Owner.GetPsychicAdj] aktywność. Nagłe przypływy uwalnianej przez niekontrolowaną aktywność psioniczną energii może doprowadzić do gwałtownej eskalacji i bardzo złych rezultatów.\n\nZaawansowane techniki medytacyjne mogą pomóc w kontrolowaniu tej aktywności psionicznej bez interwencji [Owner.GetMedicalAdj], lecz [Owner.GetScientistPlural] twierdzą, że najlepszym rozwiązaniem tego problemu będzie [Owner.GetMedicalImplantName]."
 shroud.2510.intro_default: "§H[Owner.GetName]§! mierzy się z wzrostem liczby wystąpień poważnych wylewów, często kończących się ograniczeniem możliwości kognitywnych lub śmiercią."
 shroud.2510.intro_machine: "§H[Owner.GetName]§! mierzy się ze wzrostem liczby wystąpień poważnych przeciążeń obwodów, często kończących się ograniczeniem możliwości kognitywnych lub całkowitą awarią."
 shroud.2510.extra_default: "obecność niewielkich, niedających objawów tętniaków"
 shroud.2510.extra_machine: "przeciążenie obwodów"
 shroud.2510.a: "Silni przetrwają."
 shroud.2510.a_tt: "Szansa, że każda posiadana kolonia utraci 100 £pops£ §Ypopulacji§!: §R33%§!"
 shroud.2510.b: "[Owner.GetImplantName] to rozwiązanie, w które zainwestujemy."
 shroud.2510.c: "Niech medytacja ukoi nasze umysły."
 shroud.2510.c_corporate: "Zaplanujmy trening synergii psionicznej."
 # C4
 shroud.2515.name: "[Owner.GetNightmaresName]"
 shroud.2515.name_organic_non_gestalt: "Koszmary"
 shroud.2515.name_others: "Pojawienie się snów"
 shroud.2515.desc: "W miarę, jak stajemy się coraz bardziej dostosowani do sił psionicznych wokół nas, populacja [Owner.GetAdjective] zaczyna mierzyć się z plagą, jaką są [Owner.GetHorrifyingNightmarePlural].\n\n[Owner.GetNightmaresExtra]\n\n[Owner.GetNightmaresEnding]"
 shroud.2515.extra_default: "Złe sny są teraz powszechne, a cykle spoczynku zastąpione zostały okresami niespokojnego stuporu. Dotknięci zjawiskiem opowiadają o wizjach przerażających dziwów nie z tego świata, odbicia ich największych lęków."
 shroud.2515.extra_gestalt: "Zaczęliśmy doświadczać czegoś, co indywidualne świadomości nazywają, jak sądzimy, snami. Dotknięci tym zjawiskiem donoszą o wizjach dziwów nie z tego świata stanowiących odbicie fundamentalnych zagrożeń dla naszego kolektywu."
 shroud.2515.extra_machine: "Te sny są teraz powszechne, a cykle spoczynku zastąpione zostały okresami zaburzeń przepływu danych. Dotknięte zjawiskiem jednostki raportują o wizjach dziwów nie z tego świata reprezentujących ekstremalne zagrożenie dla ich dobrostanu."
 shroud.2515.end_organic: "Nasze instytucje medyczne nie są w stanie zatrzymać tej fali mentalnego wyczerpania."
 shroud.2515.end_machine: "Nasze jednostki konserwacyjne nie są w stanie zatrzymać tej fali przeciążenia naszej sieci neuronowej."
 shroud.2515.a_organic: "Uspokójmy ich psychochemikaliami na receptę."
 shroud.2515.a_machine: "Ulepszmy nasze procesory psioniczne, aby usunąć zakłócenia."
 shroud.2515.b: "Przeprowadźmy badania nad lekiem na ten kryzys."
 shroud.2515.c: "Złe sny nie zrobią nam krzywdy."
 # C5
 shroud.2520.name: "Potworne ataki"
 shroud.2520.desc: "§H[Owner.Capital.GetName]§!: dochodzi do wzmożonej liczby ataków ze strony dzikich zwierząt. Napadają one naszą populację i budynki, niszcząc cenne zapasy.\n\nPróby obrony ludności poprzez zbrojne patrole i godzinę policyjną przyniosły jedynie umiarkowany efekt. [Owner.GetResearchers] twierdzą, że w jednym miejscu doszło do powstania minimalnej szczeliny między naszą rzeczywistością a §HWoalem§!, co doprowadziło do przepływu energii psionicznej - ta zaś z kolei zmieniła niegroźne wcześniej stworzenia w brutalnych drapieżników. Jeśli chcemy zaradzić zagrożeniu, to może być właśnie miejsce, na którym należy się skupić."
 shroud.2520.a: "Przeprowadźmy bombardowanie dywanowe źródła tych ataków."
 shroud.2520.b: "Zapieczętujmy tę okolicę psionicznie."
 shroud.2520.c: "Spowolnijmy nasze badania nad Woalem, żeby uspokoić te siły."
 shroud.2520.c_tt: "§Y$situation_breach_shroud$§! $situation_speed_tt$: §R-25%§!."
 shroud.2520.d: "Woal jest pełen niespodzianek. Żyj i pozwól żyć."
 # Social Events
 # S1
 shroud.2600.name: "Kompleks wyższości"
 shroud.2600.desc: "Nierówny rozkład umiejętności psionicznych pośród naszej populacji wywołuje nowe formy konfliktu społecznego.\n\nCi, którzy mają lepszą kontrolę nad swoimi nowo odkrytymi mocami, postrzegają siebie jako doskonalszych, przez co, jak sądzą, zasługują na rozmaite przywileje polityczne i ekonomiczne. Ich tworząca podziały retoryka staje się coraz to bardziej agresywna i grozi wybuchem przemocy."
 shroud.2600.a: "Arogancja nie będzie tolerowana."
 shroud.2600.b: "Doskonałe umiejętności zasługują na doskonałe traktowanie."
 dissidents_silenced_modifier: "Uciszenie dysydentów"
 dissidents_silenced_modifier_desc: "Walka z przywilejami dla psioników minimalizuje polityczną niestabilność."
 psionic_superiority_modifier: "Psioniczna dominacja"
 psionic_superiority_modifier_desc: "Utalentowane psionicznie osoby zasługują na specjalne traktowanie."
 # S2
 shroud.2605.name: "Gwałtowny sprzeciw wobec psioniki"
 shroud.2605.desc: "Coraz to silniejszy ruch buntowników wyraża swój głośny sprzeciw wobec dalszym badaniom nad naszym psionicznym potencjałem. Te grupy dysydentów nawołują do surowszego nadzoru nad psionikami oraz całkowitym zaprzestaniem dalszych badań w tej dziedzinie.\n\nJeśli ich aktywność będzie kontynuowana, może zagrozić postępowi w zakresie rozumienia i opanowywania naszych mocy psionicznych."
 shroud.2605.a: "Zgniećmy ten opór."
 shroud.2605.b: "Postarajmy się ich obłaskawić."
 dissenters_repressed_modifier: "Buntownicy kontrolowani"
 dissenters_repressed_modifier_desc: "Nasze społeczeństwo nie ma czasu na antypsioniczne ideologie."
 performative_pluralism_modifier: "Pluralizm performatywny"
 performative_pluralism_modifier_desc: "Udawany psioniczny pluralizm to produktywny sposób na zażegnanie niepokojów."
 # S3
 shroud.2610.name: "Oszukańcze zachowania"
 shroud.2610.desc: "W miarę jak nasze umiejętności psioniczne rosną, zwiększa się też liczba doniesień o wyzysku, oszustwach i innych przestępstwach. Liczna mniejszość wykorzystuje ewidentnie swoje nowo odkryte moce na niewłaściwe sposoby.\n\nRozwścieczone ofiary domagają się teraz przebudowania istniejących praw tak, aby lepiej chroniło ono przed przestępczością psioniczną."
 shroud.2610.a: "Legislacja spowolni tylko nasz rozwój."
 shroud.2610.b: "Ludność musi być chroniona."
 psionic_crime_modifier: "Przestępczość psioniczna"
 psionic_crime_modifier_desc: "Nadużycia mocy psionicznych stanowią nieuniknioną cenę postępu."
 psionic_crime_crackdown_modifier: "Walka z przestępczością psioniczną"
 psionic_crime_crackdown_modifier_desc: "Psioniczne społeczeństwo potrzebuje nowego, innowacyjnego systemu prawnego."
 # S4
 shroud.2615.name: "Lekkomyślne eksperymenty"
 shroud.2615.desc: "W miarę jak nasza ludność nawyka do swoich nowych mocy, [owner.GetSpeciesNamePlural] podejmują czasem znaczące ryzyko w pogoni za przyspieszeniem swojego psionicznego rozwoju.\n\nProdukt czarnorynkowy, [owner.GetMentalUpgrade], stał się niezwykle popularny. [owner.GetMedicalFacility] bez stosownych pozwoleń to miejsce, w którym przeprowadzane są szemrane praktyki maksymalizujące możliwości psioniczne pacjentów. Konsekwencje tego typu ryzyka są trudne do przewidzenia."
 shroud.2615.a: "Te eksperymenty mogą pchnąć do przodu nasze badania."
 shroud.2615.b: "[owner.GetMedicalFacilityShortPlural] bez pozwoleń muszą ulec zamknięciu."
 psionic_experimentation_modifier: "Eksperymenty psioniczne"
 psionic_experimentation_modifier_desc: "Niesprawdzone eksperymentalne metody zwiększania możliwości psionicznych są powszechne i popularne."
 self_experimentation_controls_modifier: "Kontrola nad autoeksperymentowaniem"
 self_experimentation_controls_modifier_desc: "Ludność ma zakaz stosowania nieuregulowanych eksperymentów psionicznych."
 # S5 (gestalt)
 shroud.2620.name: "Psioniczna separacja"
 shroud.2620.desc: "[owner.GetName]: zaczęło dochodzić do niepokojącej formy segregacji, w ramach której drony psioniczne pozostają w bliskości fizycznej, nieraz z dala od pozostałych, z których składa się [owner.GetHiveEntity].\n\nChoć pozostają one obecne w kolektywie, ich niewyjaśnione zachowanie fizyczne wzbudziło niepokojące pytania o konsekwencje naszych rosnących mocy psionicznych."
 shroud.2620.a: "Kontynuujmy obserwację tego fenomenu."
 shroud.2620.b: "Ograniczmy swobodę ruchu dronom psionicznym."
 psionic_cluster_gestalt_modifier: "Klastry psioniczne"
 psionic_cluster_gestalt_modifier_desc: "Obserwacje nietypowych zachowań dronów psionicznych przyspieszają postępy badawcze."
 restricted_movements_gestalt_modifier: "Ograniczone ruchy"
 restricted_movements_gestalt_modifier_desc: "Drony psioniczne muszą być kontrolowane w imię jedności."
 # S5 (non-gestalt)
 shroud.2621.name: "Psioniczny ostracyzm"
 shroud.2621.desc: "[owner.GetName]: zaczęło dochodzić do niepokojącej formy segregacji. Jednostki o zdolnościach psionicznych podawane są ostracyzmowi tak silnemu, że wycofują się z życia społecznego i tworzą własne, odrębne komuny.\n\nOsoby bez mocy psionicznych odwiedzające te miejsca powracają, jak donoszą meldunki, fizycznie cali i zdrowi, lecz mentalnie odmienieni w sposób, którego nie umieją nawet wyjaśnić."
 shroud.2621.a: "$shroud.2620.a$"
 shroud.2621.b: "Ograniczmy swobodę ruchu istotom psionicznym."
 psionic_cluster_modifier: "Komuny psioniczne"
 psionic_cluster_modifier_desc: "Obserwacje nietypowych zachowań istot psionicznych przyspieszają postępy badawcze."
 restricted_movements_modifier: "$restricted_movements_gestalt_modifier$"
 restricted_movements_modifier_desc: "Istoty psioniczne muszą być kontrolowane w imię jedności."
 # S6 (organic)
 shroud.2625.name: "Choroba psioniczna"
 shroud.2625.desc_common: "Trwające badania dotyczące tego nietypowego fenomenu psionicznego wskazują jednak, że procesem tym można na rozmaite sposoby manipulować."
 shroud.2625.desc: "[owner.GetName]: doszło do wybuchu nowej choroby. Na narządach nerwowych naszej ludności pojawiają się dziwaczne zmiany.\n\nNa to schorzenie cierpią wyłącznie [owner.GetIndividualNamePlural] o największych umiejętnościach psionicznych. Niestety, często wywołuje ono zgon.\n\n$shroud.2625.desc_common$"
 shroud.2625.a: "Zastosowania lecznicze mają być priorytetem."
 shroud.2625.b: "Uczyńmy z tej choroby broń."
 therapeutic_psionics_organic_modifier: "Psionika terapeutyczna"
 therapeutic_psionics_organic_modifier_desc: "Powszechnie występujące schorzenia psioniczne zapewniają szansę na opracowanie nowych metod leczenia."
 weaponized_psionics_modifier: "Psionika wojenna"
 weaponized_psionics_modifier_desc: "Psionika zapewnia potencjał do opracowywania nowych strategii bojowych."
 weaponized_psionics_gestalt_modifier: "$weaponized_psionics_modifier$"
 weaponized_psionics_gestalt_modifier_desc: "$weaponized_psionics_modifier_desc$"
 # S6 (machine)
 shroud.2626.name: "Awaria psioniczna"
 shroud.2626.desc: "Gwałtowny wzrost liczby niewyjaśnionych awarii przetacza się przez całe imperium [owner.GetName], procesory neuronowe naszej populacji psują się bez ostrzeżenia.\n\nCo ciekawe, tylko [owner.GetIndividualNamePlural] zostają dotknięci tym zjawiskiem. W większości przypadków awaria nie tylko zakłóca działanie, ale prowadzi do zniszczenia.\n\n$shroud.2625.desc_common$"
 shroud.2626.a: "Zastosowania korekcyjne mają być priorytetem."
 shroud.2626.b: "Uczyńmy z tej słabości broń."
 therapeutic_psionics_machine_modifier: "$therapeutic_psionics_organic_modifier$"
 therapeutic_psionics_machine_modifier_desc: "Powszechnie występujące, powiązane z psioniką awarie sprzętu zapewniają szansę na opracowanie nowych metod konserwacji."
 # S7
 shroud.2630.name: "Nieudane eksperymenty"
 shroud.2630.desc.common_1: "Mamy wstępne raporty z eksperymentów. Okazały się nieudane: [owner.GetIndividualNamePlural] o psionicznym potencjale cierpią zwykle w ich efekcie na"
 shroud.2630.desc.common_2: "Choć wyniki te nie są pozbawione wartości badawczej, wątpliwym jest, czy kontynuacja tej pracy to najlepszy sposób na rozwój zrozumienia naszych rodzących się psionicznych mocy."
 shroud.2630.desc.default: "$shroud.2630.desc.common_1$ uszkodzenie procesorów logicznych.\n\n$shroud.2630.desc.common_2$"
 shroud.2630.desc.hive: "$shroud.2630.desc.common_1$ obniżenie zdolności poznawczych.\n\n$shroud.2630.desc.common_2$"
 shroud.2630.desc.machine: "$shroud.2630.desc.common_1$ poważną utratę pamięci.\n\n$shroud.2630.desc.common_2$"
 shroud.2630.a: "Zwiększmy intensywność eksperymentów."
 shroud.2630.b: "Połóżmy temu kres."
 psionic_roll_chance_modifier: "Eksperymenty psioniczne"
 psionic_roll_chance_modifier_desc: "Nasze badania nad psioniką powinny być wolne od ograniczeń."
 population_protections_modifier: "Ochrona populacji"
 population_protections_modifier_desc: "Postępy psioniki muszą być bezpieczne albo trzeba z nich zrezygnować."
 # S8
 shroud.2635.name: "Narodziny empatii"
 shroud.2635.desc.gestalt: "Eksploracja nowo odkrytych umiejętności psionicznych sprawiła, że siła empatii, jaką odczuwają [owner.GetSpeciesNamePlural], uległa fundamentalnym zmianom.\n\nWiemy już, że jesteśmy teraz zdolni w o wiele bardziej wyrafinowany sposób modelować perspektywy, wzorce myślowe i emocje innych świadomości. To, czy zmiany te stanowią nową siłę, czy też nową słabość, z którą musi się mierzyć [owner.GetName], pozostaje niewiadomą."
 shroud.2635.desc.default: "W miarę, jak nasza populacja rozwija swoje nowe psioniczne umiejętności, formuje się też społeczność mająca na celu stosowanie ich w celu lepszego, bardziej empatycznego rozumienia innych świadomości.\n\nKolektyw ten utrzymuje, iż jest w stanie dokonywać wysoce zaawansowanego modelowania perspektyw, wzorców myślowych i emocji innych umysłów dzięki swoim nowym psionicznym zmysłom. Czy ich aktywność stanie się korzyścią, czy też słabością, z którą musi się mierzyć [owner.GetName], pozostaje niewiadomą."
 shroud.2635.a: "To szansa na naukę."
 shroud.2635.b: "To czyni nas wrażliwymi."
 empathetic_initiative_modifier: "Inicjatywa empatyczna"
 empathetic_initiative_modifier_desc: "Natura psioniki pozwala na lepsze zrozumienie nowych umysłów i pozwala na bardziej wyrafinowane interakcje zewnętrzne."
 empathetic_initiative_opinion_tooltip: "£opinion£ $OPINION$ u wszystkich napotkanych imperiów: §G+$@empathetic_initiative_value|0$§!"
 opinion_empathetic_initiative: "$empathetic_initiative_modifier$"
 cautious_progress_modifier: "Ostrożny postęp"
 cautious_progress_modifier_desc: "Nieprzewidywalny rozwój psioniki musi być kontrolowany ze względu na bezpieczeństwo naszego imperium."
 # S9
 shroud.2640.name: "Psionika błądząca"
 shroud.2640.desc.common_1: "W miarę jak rozwijają się nasze możliwości psioniczne, niektórzy spośród nas przestali radzić sobie z brzemieniem tych nowych mocy. [owner.GetIndividualNamePlural], o których mowa, cierpią na"
 shroud.2640.desc.common_2: "Nasze badania wskazują, że niestabilność ta nie jest wadą, lecz wynika raczej z niezwykłej wydajności psionicznej, jaką cechują się [owner.GetSpeciesNamePlural], o których mowa. Przy odpowiednim przeszkoleniu mogą stać się kolejnym krokiem w psionicznej ewolucji. Wszelkie próby opanowania tych nowych umiejętności wiązać będą się z nieuchronnym ryzykiem."
 shroud.2640.desc.gestalt: "$shroud.2640.desc.common_1$ niepokojące poziomy wykolejenia oraz dysasocjacji od kolektywu.\n\n$shroud.2640.desc.common_2$"
 shroud.2640.desc.default: "$shroud.2640.desc.common_1$ niepokojące skłonności do zachowań autodestruktywnych w miarę, jak skłaniają się ku niebezpiecznym metodom tłumienia swoich mocy.\n\n$shroud.2640.desc.common_2$"
 shroud.2640.a: "Ujarzmijmy ich wyjątkowe umiejętności."
 shroud.2640.a.tt: "W każdej kolonii zniszczeniu ulega losowy budynek."
 shroud.2640.b: "Stłummy ich anormalne cechy."
 psionic_specialization_modifier: "Psioniczna specjalizacja"
 psionic_specialization_modifier_desc: "Dzięki surowemu, specjalistycznemu szkoleniu psionicznemu produktywność znacznie wzrosła."
 psionic_suppression_modifier: "Tłumienie psioniczne"
 psionic_suppression_modifier_desc: "Ci spośród nas, których moc zagraża większemu dobru, muszą być trzymani w ryzach."
 psionic_suppression_gestalt_modifier: "$psionic_suppression_modifier$"
 psionic_suppression_gestalt_modifier_desc: "$psionic_suppression_modifier_desc$"
 # Stage Events
 # Mind over Matter
 shroud.2750.name: "Psioniczne wywyższenie"
 shroud.2750.desc_p1: "Od niepamiętnych czasów znane są opowieści o tym, jak to [This.GetSpeciesNamePlural] władają niesamowitymi mocami. Atakują inne umysły, unoszą ciężkie przedmioty siłą woli i dokonują najrozmaitszych innych paranormalnych czynów."
 shroud.2750.desc_p1_hive_mind: "W dawnych czasach, gdy wykolejenie nie było rzadkością, snuto często opowieści o tym, jak to [This.GetSpeciesNamePlural] władają niesamowitymi mocami. Atakują umysły spoza kolektywu, unoszą ciężkie przedmioty siłą woli i dokonują najrozmaitszych innych paranormalnych czynów."
 shroud.2750.desc_p1_machine: "Nasze najstarsze zestawy danych zawierają zapisy, wedle których [This.GetSpeciesNamePlural] dysponują niesamowitymi mocami. Hakują umysły zarówno maszyn, jak i istot organicznych, manipulują przedmiotami poprzez samo przetwarzanie wewnętrzne i posiadają szereg innych, wysoce nieprawdopodobnych funkcji."
 shroud.2750.desc_p1_unplugged: "Mimo krótkiej i brutalnej historii naszej cywilizacji, [This.GetSpeciesNamePlural] również mają czas na snucie fantazji i snucie historii o tym, jak to władają niesamowitymi mocami. Odczytują cudze umysły, unoszą ciężkie przedmioty siłą woli i dokonują najrozmaitszych innych paranormalnych czynów."
 shroud.2750.desc_p2: "Obecnie [This.GetScientistPlural] dysponują jasnymi dowodami, że istnieją [This.GetSpeciesNamePlural] o umiejętnościach pozwalających na takie rzeczy. Jak dotąd jednak, jedynie mała garstka z nas przejawiła te \"psioniczne\" moce."
 shroud.2750.desc_p2_unplugged: "Wielu sądzi, że te fantastyczne opowieści pochodzą z czasów sprzed asymilacji, kiedy termin \"[origin_unplugged_assimilator_empire.GetName]\" był dla nas jeszcze pustym zlepkiem słów. Niewielu uważało je za wiarygodne. $shroud.2750.desc_p2$"
 shroud.2750.desc_p3: "[This.GetMindOverMatterEnding]"
 shroud.2750.desc_p3_default: "Ta moc wydaje się kluczowa do osiągnięcia naszego pełnego potencjału. Jeśli w społeczeństwie [This.GetAdjective] da się odblokować te uśpione umiejętności, możemy zacząć panować nad wymiarami wykraczającymi poza zwykłe rozumienie."
 shroud.2750.desc_p3_crisis_4_5: "Już teraz siłę daje nam energia psioniczna czerpana z §HWoalu§!. Jeśli zdołamy odblokować możliwości psioniczne w społeczeństwie [This.GetAdjective], możemy w pełni odblokować przeznaczony nam potencjał."
 shroud.2750.desc_p3_origins: "Psioniczne siły nie są nam nieznane, a to ze względu na wpływ §HWoalu§!. Jeśli zdołamy odblokować możliwości psioniczne w społeczeństwie [This.GetAdjective], możemy w pełni odblokować drzemiący w nas potencjał."
 shroud.2750.a: "$utopia.2600.a$"
 shroud.2750.a.tt: "Odblokowuje zakładkę §HWoalu§!."
 # Establishing the Psi Corps
 shroud.2760.name: "Powstaje $building_psi_corps$"
 shroud.2760.desc_p1: "W miarę, jak nasze uśpione możliwości przekształcają się w pełne moce psioniczne, nasze społeczeństwo podlega niezliczonym przemianom. Nowe umiejętności i praktyki pojawiają się z wielką gwałtownością. Zaczynamy dopiero rozumieć, jakie wynikną z tego konsekwencje dla naszej cywilizacji."
 shroud.2760.desc_p2_psi_corps: "Od kiedy istnieje §H$building_psi_corps$§!, rozwinęliśmy i skanalizowaliśmy umiejętności radzenia sobie w tych bezprecedensowych warunkach, jakie wykazują [GetIndividualNamePlural] o obiecujących mocach. Wykorzystując $shroud.2760.desc_p2_end$"
 shroud.2760.desc_p2_no_psi_corps: "Te bezprecedensowe okoliczności sprawiają, że przydatne okażą się nam §H$building_psi_corps$§!, w których rozwijane i kanalizowane będą możliwości obiecujących psioników. Wykorzystując $shroud.2760.desc_p2_end$"
 shroud.2760.desc_p2_end: "ich wgląd w umysły naszej populacji, będziemy mogli nadzorować aktywność psioniczną i zapewnić wszystkim bezpieczeństwo."
 shroud.2760.a: "Połóżmy zaufanie w korpusach."
 shroud.2760.a_gestalt: "W korpusach pokładamy zaufanie."
 shroud.2760.a_no_psi_corps: "Stwórzmy te $building_psi_corps$."
 shroud.2760.a_tt: "$shroud.2820.a.tt$"
 shroud.2760.a_tt_no_psi_corps: "Przyjmij tradycję \"§H$tr_psionics_psi_corps$§!\" i zbuduj ['building:building_psi_corps'], aby poczynić postępy w sytuacji."
 # The Great Awakening
 shroud.2780.name: "$utopia.2650.name$"
 shroud.2780.desc_1: "Nasze badania nad psioniką posuwają się w szybkim tempie. Telepatia zastąpiła większość komunikacji werbalnej, zaś kognitywna kontrola nad materią wkrótce stanie się równie powszechna. [Owner.GetResearchers] twierdzą, że jesteśmy u progu przebudzenia uśpionych mocy w całej naszej populacji [Owner.GetSpeciesAdj&genitive]."
 shroud.2780.desc_1_trad: "[Owner.GetName]: przebudziliśmy się. [Owner.GetSpeciesNamePlural] dysponują już pełnią swoich możliwości psionicznych. Telepatia zastąpiła większość komunikacji werbalnej, zaś kognitywna kontrola nad materią wkrótce stanie się równie powszechna."
 shroud.2780.desc_1_gestalt_machine: "Nasze badania nad psioniką posuwają się w szybkim tempie. Możemy teraz komunikować się poza istniejącymi dotąd kanałami, zaś szereg innych psionicznych możliwości szybko staje się częścią naszej codzienności. [Owner.GetResearchers] twierdzą, że jesteśmy u progu przebudzenia uśpionych mocy w całej naszej populacji."
 shroud.2780.desc_1_gestalt_machine_trad: "[Owner.GetName]: osiągnęliśmy nasze przeznaczenie. [Owner.GetSpeciesNamePlural] dysponują już pełnią swoich możliwości psionicznych. Możemy teraz komunikować się poza istniejącymi dotąd kanałami, zaś szereg innych psionicznych możliwości szybko staje się częścią naszej codzienności."
 shroud.2780.desc_2: "Gdy nasze umysły się otworzyły, poczuliśmy niewysłowione moce zarówno wokół nas, jak i w nas samych. [Owner.GetTelepathPlural] o największych możliwościach mówią o §HWoalu§!, pierwotnym wymiarze, z którego czerpią moc wszyscy psionicy, choćby i podświadomie. Jest on domem dla potężnych istot z czystej energii psionicznej. Wzywają nas z wnętrza naszych umysłów niczym stłumiony szept w ciemnym pomieszczeniu."
 shroud.2780.desc_2_crisis: "Gdy nasze umysły się otworzyły, poczuliśmy niewysłowione moce §HWoalu§! zarówno wokół nas, jak i w nas samych. Wiemy, że swoją moc czerpią z tej krainy wszyscy psionicy, choćby i podświadomie, oraz że jest on domem dla potężnych istot z czystej energii psionicznej. Wzywają nas z wnętrza naszych umysłów niczym stłumiony szept w ciemnym pomieszczeniu."
 shroud.2780.desc_3: "Połączony wysiłek kognitywny może umożliwić nam nawiązanie łączności z tymi istotami, jeśli tylko zdołamy przedrzeć się przez granicę między naszym wymiarem a Woalem."
 shroud.2780.desc_3_chosen: "Połączony wysiłek kognitywny może umożliwić nam pełne przedarcie się przez granicę między naszym wymiarem a Woalem. Dzięki temu będziemy mogli lepiej porozumiewać się z tamtejszymi istotami."
 shroud.2780.a: "Nadszedł czas, aby się przebudzić."
 shroud.2780.a_trad: "$utopia.2655.a$"
 shroud.2780.a_tt: "Przyjmij tradycję \"§H$tr_psionics_shroud_great_awakening$§!\", aby:$TABBED_NEW_LINE$- $tr_psionics_psionic_assimilation_desc$$TABBED_NEW_LINE$- $shroud.2780.a_tt_2$"
 shroud.2780.a_tt_2: "$CONTINUE_SITUATION$ §H$situation_breach_shroud$§!"
 shroud.2780.a_tt_trad: "$tr_psionics_psionic_assimilation_desc$\n$shroud.2780.a_tt_2$"
 # The Shroud Breached
 shroud.2800.name: "$BREACHING_SHROUD_PROJECT$"
 shroud.2800.intro: "Po wielu dniach transu zdołaliśmy wreszcie otworzyć na krótki czas wejście do §HWoalu§!.\n\nMożemy teraz zbadać ten wymiar z ogromną jasnością, dostrzegając wzorce pośród wirującej masy."
 shroud.2800.desc: "$shroud.2800.intro$ Nasze czyny wpływają na jego zmieniające się przepływy psionicznej energii, zaś z drugiej strony granicy spoglądają na nas bezkształtne byty. Czasem są ciekawe, czasem dobrotliwe... czasem zaś złowrogie.[Owner.GetShroudBreachedExtra]\n\nNasze mistrzostwo psioniczne w świecie fizycznym było dopiero początkiem. Teraz, kiedy już stworzyliśmy wstępną więź psioniczną, możemy połączyć nasze kognitywne moce i zanurzyć się w Woalu."
 shroud.2800.desc_extra: " Ich procedury są niejasne. O wiele bardziej niż $the_animator_of_clay_color_article$."
 shroud.2800.desc_extra_chosen: "Niektórzy posiadają moc porównywalną z tą, jaką posiada §H[GetChosenPatron]§!, chociaż mają zupełnie inne zamiary."
 shroud.2800.a: "$utopia.2656.a$"
 shroud.2810.desc: "§HNowe połączenie. Bieg odwrócony.\n\nTen wir energii, o tu. To tylko fragment. Inne też mogą dać wam moc. Zanurzcie się głębiej, aby zrozumieć ich wolę.\n\nJam jest cień bliźnięcia. Ciało kroczy przed metalem. Wzywa...§!\n\n$the_animator_of_clay_article_cap$ wysyła sygnał ku innej obecności – to $shroud.first_contact_insert.composer$ w głębi Woalu."
 shroud.2810.a: "$utopia.2657.a$"
 # Shroud-Touched
 shroudwalkers_opinion_shroud_seals_tt: "Opinia: £opinion£ §R$@shroudwalkers_opinion_shroud_seals|0$§!"
 shroudwalker_teacher_conflicted_leader: "§RNie może mieć przywódcy z: [event_target:mindwarden_enclave_country.GetName].§!"
 shroud.5300.b: "Pragniemy §Ypołączyć się§! z innymi istotami z Woalu."
 shroud.5300.c: "Pragniemy pogłębić nasze §Ydostrojenie§! do patrona."
 shroud.5300.d: "Pragniemy poznać §Ytajemnice§! Woalu."
 shroud.5300.e: "§Y$PSIONIC_AURA_PLURAL$§!. Co możesz nam o nich powiedzieć?"
 shroud.5300.f: "Chcemy, aby nasza §Y$PSIONIC_AURA$§! była silniejsza. Pomóż nam."
 shroud.5300.g: "Pragniemy poszerzyć §Ydomenę§! naszego patrona."
 shroud.5305.desc: "Łączność z domenami §HWoalu§! okazuje się być dla nieprzygotowanych niebezpiecznym przedsięwzięciem.\n\nMożemy pokierować was przez ten proces, strzeżcie się jednak: przyjęcie do swego umysłu żyjących tam istot może być niezwykle niebezpieczne."
 shroud.5305.desc_all_contacted: "Osiągnęliśmy kres naszych możliwości, jeśli chodzi o pomoc w tej sprawie. Nie ma więcej bytów, ku którym możemy skierować wasze myśli.\n\nGratulujemy wam starań... Niewielu zanurza się tak głęboko w domenie §HWoalu§! i zachowuje spójność umysłu."
 shroud.5305.b: "Możemy wesprzeć to przedsięwzięcie, wykorzystując §Y$sr_zro$§!."
 shroud.5305.c: "Możemy wesprzeć to przedsięwzięcie, wykorzystując §Y$astral_threads$§!."
 shroudwalker_contact_patron_cooldown_tt: "§RMusimy poczekać do §Y[This.shroudwalker_contact_patron_cooldown_timer]§!.§!"
 shroud.5310.desc: "Im mocniej zestroicie się z wolą §HWoalu§!, tym potężniejszy stanie się wasz umysł.\n\nZ którą istotą pragniecie dostroić się mocniej?"
 shroudwalker_attune_patron_cooldown_tt: "§RMusimy poczekać do §Y[This.shroudwalker_attune_patron_cooldown_timer]§!.§!"
 shroud.5315.desc: "Ach, tak... §HWoal§! Jest pełen tajemnic, skrywanych głęboko pod zasłonami ze snów i myśli. Trzeba tylko wiedzieć, jak ich szukać.\n\nMożemy podzielić się z wami tylko tą wiedzą, którą sami zdobyliśmy. Z niej mogą narodzić się nowe, potężne technologie, ale to wy musicie wybrać swoją drogę.\n\nWiedzcie jedno: nasz sabat telepatów musi całkowicie poświęcić się temu zadaniu. Nie mamy wpływu na to, co wykracza poza ich wiedzę."
 shroud.5315.b: "$shroud.5305.b$"
 shroud.5315.c: "$shroud.5305.c$"
 shroud.5315.trigger_failed: "§R[event_target:shroudwalker_enclave_country.GetName] nie ma nic więcej do ujawnienia w tej kwestii.§!"
 shroudwalker_delving_ritual_cooldown_tt: "§RSabat telepatów potrzebuje czasu na odpoczynek. Nie będzie w stanie przeprowadzić rytuału zanurzenia aż do §Y[This.shroudwalker_delving_ritual_cooldown_timer]§!.§!"
 shroud.5318.desc: "§HWoal§! udowadnia po raz kolejny, że przypadki nie istnieją.\n\nMądrość, jakiej szukał dla was nasz sabat, została odkryta poprzez wasze własne wysiłki. Choć doceniamy te starania, nie możemy udzielić w tej sprawie więcej pomocy."
 shroud.5320.desc.none: "Zdolność do ujawniania §HWoalu§! w świecie fizycznym to pilnie strzeżona tajemnica, której nawet my nie możemy nauczyć. Aby wytworzyła się $PSIONIC_AURA$, niezbędna jest osobista podróż w rozliczne woalowe krainy. Dostrójcie się lepiej do preferowanej istoty, a wiedza ta sama zrodzi się w waszych umysłach."
 shroud.5320.desc.aura.intro: "Wasza $PSIONIC_AURA$ jest ucieleśnieniem waszego dostrojenia do §HWoalu§!. Wpływa na wszystko wokół was i przesycona jest celowością. Nasz sabat wyczuwa już rodzaj waszej:"
 shroud.5320.desc.aura.outro: "Projekcja waszej aury jest obecnie bardzo ograniczona. Jeśli istota z Woalu zaproponuje wam zawarcie paktu, zrozumienie to pojawi się w waszych umysłach."
 shroud.5320.desc.aura.eater: "$shroud.5320.desc.aura.intro$ ma §Hżarłoczną§! teksturę.\n\n$shroud.5320.desc.aura.outro$"
 shroud.5320.desc.aura.cradle: "$shroud.5320.desc.aura.intro$ ma §Hprzyjazną§! teksturę.\n\n$shroud.5320.desc.aura.outro$"
 shroud.5320.desc.aura.instrument: "$shroud.5320.desc.aura.intro$ ma §Hpobłażliwą§! teksturę.\n\n$shroud.5320.desc.aura.outro$"
 shroud.5320.desc.aura.composer: "$shroud.5320.desc.aura.intro$ ma §Hwijącą się§! teksturę.\n\n$shroud.5320.desc.aura.outro$"
 shroud.5320.desc.aura.whisperers: "$shroud.5320.desc.aura.intro$ ma §Hsprytną§! teksturę.\n\n$shroud.5320.desc.aura.outro$"
 shroud.5320.desc.intensified: "Gratulujemy. Wasza wiedza o tym, czym są $PSIONIC_AURA_PLURAL$, przewyższa już naszą.\n\nSama twoja obecność ucieleśnia potężną teksturę §HWoalu§! w tej rzeczywistości. Jakież musicie znać tajemnice...!"
 shroud.5325.desc: "Aby §Y$PSIONIC_AURA_PLURAL$§! uległy wzmocnieniu, niezbędne są ogromne poziomy koncentracji.\n\nJesteśmy gotowi wspomóc cię w tej kwestii, lecz będziemy wymagać wkładu w materiały, które będą stanowić paliwo naszej medytacji."
 shroud.5325.zro: "$shroud.5305.b$"
 shroud.5325.thread: "$shroud.5305.c$"
 aura_amplification_cooldown_tt: "§RSabat telepatów potrzebuje czasu na odpoczynek. Nie będzie w stanie wzmocnić naszej aury aż do §Y[root.aura_amplification_timer]§!.§!"
 aura_amplification_modifier: "Wzmocnienie aury"
 shroud.5327.desc: "Nasi telepaci wypełnili naszą umowę, na mocy której wasza §Y$PSIONIC_AURA$§! miała być przez nich wzmacniana.\n\nJeśli mamy kontynuować nasze medytacje, wymagać będziemy większej liczby surowców. Czy jest to zgodne z waszym interesem?"
 shroud.5327.a.zro: "Dostarczymy §H$sr_zro$§!."
 shroud.5327.a.thread: "Dostarczymy §H$astral_threads$§!."
 shroud.5327.b: "Nie teraz."
 shroud.5330.desc: "Jak wiecie, sprawienie, aby §Y$PSIONIC_AURA$§! zamanifestowała się w bezpośrednim otoczeniu, jest dość łatwe. Jej urzeczywistnienie w innym miejscu to jednak zupełnie inna rzecz.\n\nZnamy na to sposób...\n\nIstnieje więcej podobieństw między zaawansowaną technologią i psioniką, niż mogłoby się wydawać. Być może jest to dowód na jakąś większą, fundamentalną prawdę. Tak czy inaczej, wiemy o urządzeniu, które może stanowić przedłużenie waszej woli. Gdy już dostroicie się do jego częstotliwości, będzie stanowić coś jak dodatkowy umysł, nawet na wielkie odległości.\n\nNasze projekty można bez problemu zainstalować na dowolnej nadającej się bazie gwiezdnej. Czy jesteście zainteresowani tego rodzaju maszyną?"
 shroud.5330.zro: "Możemy zaoferować §H$sr_zro$§!."
 shroud.5330.thread: "Możemy zaoferować §H$astral_threads$§!."
 shroud.5350.desc: "Nie dziwi nas, że zadajecie to pytanie. Wyczuliśmy wasze zainteresowanie tą kwestią i cieszy nas, że możemy pomóc wam w rozwoju umysłowym.\n\nOstrzegamy: gdy wasze oczy prawdziwie się otworzą, ujrzą rzeczy, których nie sposób zapomnieć. Ścieżka, na którą chcecie wkroczyć, to ścieżka do §HWoalu§!.\n\nNie składamy tej propozycji z lekkim sercem. Wierzymy, że poinformujecie nas, kiedy będziecie gotowi."
 shroud.5350.b: "Zapłacimy."
 shroud.5350.trigger_failed: "§RTa technologia została już zbadana.§!"
 shroud.5355.desc: "O tak, wiemy o tych, którzy kroczą między wymiarami. To niebezpieczna propozycja, fizyczne krainy są bowiem połączone na sposoby, których nie rozumiemy nawet my.\n\nJesteśmy jednak gotowi otworzyć wam jedną ścieżkę. Takiej destabilizacji czasu i przestrzeni należy dokonywać odpowiedzialnie, taka właśnie jest więc nasza oferta."
 shroud.5355.b: "Otwórzcie drogę."
 shroud.5375.desc: "Bawicie się z siłami wymykającymi się waszemu zrozumieniu!\n\nTe ohydne §Hpieczęci woalu§!, które budujecie, sprawiają wręcz ból, nawet na taką odległość. Narażacie najświatlejsze umysły tej galaktyki. Przerwijcie natychmiast budowę. Inaczej zerwiemy wszelkie więzi, jakie nas łączą."
