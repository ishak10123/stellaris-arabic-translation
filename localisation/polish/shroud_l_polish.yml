 SPECIES_TRAIT_PSIONIC: "['concept_psionic_phenotype_traits']"
 concept_psionic_phenotype_traits: "Psioniczne cechy gatunkowe"
 concept_psionic_phenotype_traits_desc: "- ['trait:trait_uncanny_intuition']\n- ['trait:trait_cranial_hypertrophy']\n- ['trait:trait_cranial_megatrophy']\n- ['trait:trait_haunting_visions']"
 trait_uncanny_intuition: "Niezwykła intuicja"
 trait_uncanny_intuition_desc: "Gatunek wykazuje się niewyjaśnioną niemal umiejętnością radzenia sobie ze złożonymi problemami już przy pierwszej próbie."
 trait_uncanny_intuition_portrait_override_tt: "Wymaga obdarzonego psionicznie gatunku"
 trait_cranial_hypertrophy: "Hipertrofia czaszki"
 trait_cranial_hypertrophy_desc: "Puszka mózgowa tego gatunku uległa powiększeniu do stopnia, w którym ogranicza nieco jego fizyczne możliwości."
 trait_cranial_hypertrophy_portrait_override_tt: "$trait_uncanny_intuition_portrait_override_tt$"
 trait_cranial_megatrophy: "Megatrofia czaszki"
 trait_cranial_megatrophy_desc: "Puszka mózgowa tego gatunku uległa powiększeniu do maksymalnego biologicznego limitu."
 trait_cranial_megatrophy_portrait_override_tt: "$trait_uncanny_intuition_portrait_override_tt$"
 trait_haunting_visions: "Niepokojące wizje"
 trait_haunting_visions_desc: "Istoty z innych wymiarów wysyłają do umysłów tego gatunku przyprawiające o obłęd wizje, które wpływają na jego zdolność do wykonywania skomplikowanych zasad."
 trait_haunting_visions_portrait_override_tt: "$trait_uncanny_intuition_portrait_override_tt$"
 concept_leader_trait_psionic: "$leader_trait_psionic$"
 concept_leader_trait_psionic_desc: "§CCecha przywódcy§!\n\nTen przywódca przemienia swoją energię w dodatkowe korzystne efekty zależne od jego roli."
