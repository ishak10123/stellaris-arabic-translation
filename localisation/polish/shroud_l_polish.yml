 #======================
 # Endbringers origin
 #======================
 origin_endbringers: "Heroldzi Końca"
 origin_endbringers_desc: "$CHALLENGING_ORIGIN$§RUWAGA: blokuje wszystkie drogi rozwoju, pozostaje tylko ['concept_psionic_ascension'].§!\n\nTa cywilizacja od dawna miała obsesję tajemniczego nieszczęścia, które spowodowało, że sąsiednia planeta zamieniła się w jałowy świat spowity Woalem. Teraz wyruszyli ku gwiazdom, więc mogą zbadać jej tajemnice i ustalić, czy czeka ich podobny los."
 origin_tooltip_endbringers_negative_effects: "- Imperium zaczyna z modyfikatorem ['concept_paranoia_modifier']\n- Nie może tworzyć ani dołączać do ['concept_federation', federacji]"
 concept_paranoia_modifier: "$endbringers_paranoia$"
 concept_paranoia_modifier_desc: "Cywilizacja ta była świadkiem pradawnej katastrofy, przez co jej kolejne pokolenia cierpią na coraz silniejszy strach przed podobnym kataklizmem.\n\nModyfikator zadowolenia pogarsza się stopniowo: od §R-5%§! do §R-50%§!"
 endbringers_paranoia: "Paranoja"
 endbringers_paranoia_desc: "Cywilizacja ta była świadkiem pradawnej katastrofy, przez co jej kolejne pokolenia cierpią na wszechogarniający strach przed podobnym kataklizmem. Kto jako następny doświadczy podobnego losu?"
 endbringers_paranoia_tt: "$chamber_of_silence_negative_effects_reduction$"
 START_SCREEN_ENDBRINGERS: "Jesteśmy heroldami kataklizmu.\n\nU zarania cywilizacji [GetSpeciesAdj&genitive] nasz najbliższy niebiański sąsiad został dotknięty tajemniczą katastrofą. Jego nagła i brutalna przemiana napełniła nieboskłon złowieszczym, fioletowym światłem, które budziło w naszym społeczeństwie potężne obawy, że spotka nas ten sam los. Z każdym kolejnym pokoleniem ten przytłaczający lęk przed ewentualną anihilacją coraz mocniej zaciskał się wokół nas.\n\nTeraz, gdy [GetSpeciesNamePlural] wyruszają ku gwiazdom, czujemy pokusę zbadania, czym jest $pc_shrouded$. Odpowiedzi, których od wieków łakniemy, są w naszym zasięgu. Ale wielu z nas przestrzega, że nasza obsesyjna fascynacja źródłem tej niszczycielskiej mocy może doprowadzić do naszej zagłady.\n\nNiebawem usuniemy ostatnią zasłonę."
 shroud.8010.title: "Misja na świecie [shrouded_planet.GetName]"
 shroud.8010.desc: "Satelity rozpoznawcze na orbicie świata §H[shrouded_planet.GetName]§! znalazły obiecujący cel naszej pierwszej załogowej misji na powierzchnię tego \"$pc_shrouded$\". Ze strefy lądowania emanuje dziwne promieniowanie, które przetacza się przez całą planetę, niesione przez ultrafioletowe wiatry.\n\nWielu [Root.GetSpeciesAdj&genitive] sprzeciwia się tej misji, ponieważ obawiają się uwolnienia tej samej klątwy na naszym świecie macierzystym. Ich obawy nie są nieuzasadnione, ale niepohamowana chęć zrozumienia tego odległego zjawiska musi zwyciężyć.\n\nGdyby w przyszłości spadła na nas ta sama katastrofa, będziemy przynajmniej wiedzieć, czemu giniemy."
 shroud.8010.a: "Zaczynamy poszukiwanie odpowiedzi."
 the_shrouded_world_site: "$pc_shrouded$"
 the_shrouded_world_site_desc: "\"$pc_shrouded$\" o nazwie §H[planet.GetName]§! jest w naszym zasięgu. Coś przywołuje nas tam, teraz ten głos jest silniejszy niż kiedykolwiek.\n\nTajemnice kataklizmu, który spadł na ten świat, ujawnią nam dużą część historii naszego własnego układu, a może także złagodzą obsesję naszego społeczeństwa na punkcie jego zniszczenia w przyszłości. Skanowanie z orbity ukazało potężne wiry energetyczne szalejące w pewnej ograniczonej przestrzenia na półkuli południowej. To spoglądające na nas złowieszcze oko."
 shroud.8100.name: "Koniec jest bliski"
 shroud.8100.desc: "Zgodnie z przewidywaniami, teren świata §H[shrouded_planet.GetName]§! jest zdradziecki. Potężne wiry rozbłyskujących cząstek przecinają powietrze, co spowalnia początkowe postępy załogi, którą dowodzi §H[Leader.GetName]§!.\n\nCo niepokojące, nasz zespół badawczy donosi o różnych doznaniach zmysłowych, takich jak niesione wiatrem odległe wycia oraz ciemne postacie przemykające we mgle. Czy przybycie tutaj naprawdę było błędem?\n\nPierwsza publiczna transmisja lądowania wywołała powszechną panikę na świecie §H[Owner.GetHomeWorldName]§!. Wielu obawia się, że igramy z tajemniczymi niszczycielskimi siłami, które niegdyś przybyły na planetę [shrouded_planet.GetName]. Przez cały nasz świat macierzysty przetacza się fala protestów zorganizowanych pod hasłem \"Koniec jest bliski\". Spowodowały one zamknięcie dużej części naszej infrastruktury.\n\nSkanowanie telemetryczne wykazało, że głęboko pod pobliskim łańcuchem górskim znajduje się pusta przestrzeń, emitująca promieniowanie o dużym natężeniu. Zamierzamy przeć dalej, niezależnie od ceny, którą przyjdzie nam zapłacić."
 shroud.8100.a: "Przebić się przez powierzchnię. Musimy sprawdzić, co nas tam czeka."
 the_end_is_nigh: "Koniec jest bliski"
 the_end_is_nigh_desc: "Przeczucie nadchodzącej zagłady ogarnia nasze społeczeństwo."
 shroud.8105.name: "Obca konstrukcja"
 shroud.8105.desc: "Nie jesteśmy pierwsi.\n\nPrzebiwszy się do górskiej jaskini na planecie §H[shrouded_planet.GetName]§!, natrafiliśmy na porzuconą, obcą konstrukcję, która została zniszczona przez kataklizm. Lepiej nie ujawniajmy tej informacji, gdyż mogłaby pogłębić panikę.\n\nWstępne analizy wykazały, że materiały wykorzystane do budowy tej placówki nie pasują do struktury molekularnej minerałów występujących na tej planecie, co pozwala przypuszczać, że ta instalacja to dzieło cywilizacji podróżującej w kosmosie. Trudno powiedzieć, jaką rolę pełniło to miejsce, ale prawdopodobnie działało w większości automatycznie.\n\nTymczasem, w ekipie nasilają się objawy pogorszenia zdrowia psychicznego. Niektórzy jej członkowie mówią, że słyszą głosy szepczące na zaszyfrowanych częstotliwościach, a inni opisują zniekształcone postrzeganie otoczenia materialnego. Wybuchy niekontrolowanego śmiechu stają się niepokojąco częste.\n\nZaszliśmy za daleko, by się teraz wycofać."
 shroud.8110.name: "Obserwatorzy"
 shroud.8110.desc: "Wszyscy nie żyją.\n\nNa fotelu każdego stanowiska w sercu tego obiektu spoczywają zasuszone zwłoki przedstawicieli nieznanej, obcej rasy, a ich rozliczne białe oczy wpatrują się w sufit. Mimo ich przerażającego wyglądu, §H[Leader.GetName]§! uważa, że te postacie nie są wytworem halucynacji. Zdjęcia tych organizmów zostały utajnione.\n\nNie znaleziono żadnej broni, co prowadzi do przypuszczenia, że obecność tych obcych na planecie §H[shrouded_planet.GetName]§! nie była aktem wrogości. Prawdopodobnie był to punkt obserwacyjny, wyposażony w zaawansowany sprzęt monitorujący, stworzony bezpośrednio na świecie §H[Owner.GetHomeWorldName]§!. Datowanie radiowęglowe wskazuje, że działali oni tutaj na długo przed nadejściem kataklizmu.\n\nOdszyfrowaliśmy dużą część ich archiwów. Nie licząc rutynowych rejestrów łączności, dotyczą one głównie wczesnej historii naszej cywilizacji."
 shroud.8110.a: "Obserwowali nas?"
 shroud.8115.name: "Niepojęte siły"
 shroud.8115.desc: "Baza danych na planecie §H[shrouded_planet.GetName]§! została rozszyfrowana, co dowodzi, że wiele z naszych lekceważonych legend było prawdziwych. Byliśmy obiektami doświadczenia nauki badającej umysł, zwanej \"$tech_psionic_theory$\".\n\nUstalono, że nasz gatunek posiada ten uśpiony potencjał. Wielu naszych przodków odbierało te komunikaty w snach lub jako odległe głosy, co w innych okolicznościach mogło być uznane za objawy choroby umysłowej lub paranoi. Jednak eksperyment został gwałtownie przerwany. W ostatnich dniach działania tej placówki nie była ona punktem obserwacyjnym, lecz schronem.\n\nIch raporty na temat naszego społeczeństwa przestały być wysyłane po katastrofalnym eksperymencie przeprowadzonym na ich świecie stołecznym, polegającym na nierozważnym manipulowaniu barierą pomiędzy rzeczywistościami, zwaną §H„Woalem\"§!. Ich uczeni nazwali to zdarzenie \"Obrachunkiem\", przypuszczamy, że to ono było prawdziwym źródłem kataklizmu.\n\nCokolwiek się stało, wpływ tej katastrofy przeniósł się szybko na planetę §H[shrouded_planet.GetName]§!. Ostatnie chwile ich życia podsumowuje jeden wpis w rejestrze:\n\n§LKoniec nadszedł.§!"
 shroud.8115.a: "Czy przyjdzie też do nas?"
 shroud.8120.name: "$fragment_of_reckoning$"
 shroud.8120.desc: "Znaleźliśmy ostateczne dowody wskazujące na źródło kataklizmu. Nietrudno było je znaleźć. §H[Leader.GetName]§! twierdzi, że słyszy jego zew.\n\nW głębi placówki znaleziono pulsującą, trudną do opisania masę, którą nie sposób analizować konwencjonalnymi metodami. Nie jest materią, ani energią, §H[Leader.GetName]§! opisuje ją jako uporczywie powracający żal wchłoniętych umysłów, mówiąc na to §H\"$fragment_of_reckoning$\"§!.\n\nW czasie niefortunnej próby okiełznania i ukierunkowania eterycznej energii §HWoalu§!, obiekt ten miał służyć jako obrona przed Obrachunkiem. Jednak sukces był tylko częściowy. W ostatnich chwilach istnienia tego świata, złowroga istota została siłą wypędzona z tego wymiaru, ale zabrała ze sobą przerażone umysły naukowców. Zachował się tylko ten fragment.\n\nTen obiekt wzmacnia wizje i halucynacje naszych badaczy, daje im wgląd poza tę ograniczoną rzeczywistość. To niebezpieczna, ale obiecująca propozycja."
 shroud.8120.a: "Wciąż możemy się wiele nauczyć..."
 ENDBRINGERS_RESEARCH_PSIONIC_THEORY: "$tech_psionic_theory$"
 ENDBRINGERS_RESEARCH_PSIONIC_THEORY_DESC: "Fragment energii psionicznej, który znaleźliśmy na planecie §H[shrouded_planet.GetName]§!, skrywa tajemnice, które musimy poznać.\n\nHamują nas ograniczenia naszego umysłu."
 ENDBRINGERS_PSIONIC_THEORY_PROJECT_TOOLTIP: "Żeby ukończyć, opracuj: §H£society_research£ $tech_psionic_theory$§!."
