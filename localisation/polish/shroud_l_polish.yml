 #==========================
 # Tutorials
 #==========================
 TUTORIAL_SHROUD_TAB_TITLE: "Samouczek: $THE_SHROUD_TITLE$"
 TUTORIAL_SHROUD_TAB_DESC: "To zakładka §SWoalu§!. Lewy panel ukazuje pozycję naszego imperium w Woalu, odzwierciedloną przez §Sdomeny§! czterech istot psionicznych zwanych §Spatronami§!.\n\nO naszej pozycji decyduje §S$concept_attunement$§!, które zdobywa się, gdy jakieś działania w wymiarze materialnym zyskają aprobatę patrona. Zdobądź $concept_attunement$, by zacząć proces odkrywania tożsamości patrona. Kiedy już ją poznasz, kliknij jego domenę, aby otworzyć panel.\n\nKliknij §S$DELVE$§! albo na środku lewego panelu, żeby wejść do Woalu i eksplorować wymiar psioniczny. W czasie tej wyprawy nasza pozycja ($concept_attunement$) w domenach może wpływać na to, co odkryjemy."
 TUTORIAL_SHROUD_PATRON_TITLE: "Samouczek: patroni z Woalu"
 TUTORIAL_SHROUD_PATRON_DESC: "W panelu §Spatronów§! znajdują się informacje i opcje związane z patronem z Woalu. Realizuj cele, które stawiają §S$concept_callings$§! i §S$concept_deeds$§!, aby zyskać §S$concept_attunement$§! z tą istotą.\n\nZwiększ $concept_attunement$, by odblokować: §S$PASSIVE_ACCORDS$§!. Przyniesie to naszemu imperium korzyści. Zgromadź duże $concept_attunement$ do patrona, by rozpocząć proces budowy §Spaktu§!, który przyniesie jeszcze bardziej wymierne efekty."
 TUTORIAL_SHROUD_COVENANT_TITLE: "Samouczek: pakty"
 TUTORIAL_SHROUD_COVENANT_DESC: "Potwierdzenie §Spaktu§! z patronem z Woalu daje dostęp do: §S$ACTIVE_ACCORDS$§!. $tutorial.shroud_covenant.shared$"
 tutorial.shroud_covenant.shared: "Kliknij ikonę $ACTIVE_ACCORD$, by aktywować efekty, płacąc £sr_zro£ §S$sr_zro$§!. Można to zrobić w głównym panelu Woalu lub panelu danego patrona.\n\nPo aktywacji, $ACTIVE_ACCORD$ potrzebuje trochę czasu na ponowne naładowanie i przygotowanie do kolejnego użycia."
 TUTORIAL_SHROUD_SHAPING_TITLE: "Samouczek: kształtowanie Woalu"
 TUTORIAL_SHROUD_SHAPING_DESC: "Posiadamy teraz możliwości pozyskania określonych mocy, które zwykle wymagają zawarcia §Spaktu§! z §Spatronem§!.\n\nKiedy oba §S$PASSIVE_ACCORDS$§! zostaną odblokowane, otrzymamy dostęp do: §S$ACTIVE_ACCORD$§!. $tutorial.shroud_covenant.shared$"
 tutorial.2600.name: "Samouczek: $PSIONIC_AURA_PLURAL$"
 tutorial.2600.desc: "Nasze kolonie z populacjami psioników mają teraz zdolność, dzięki której powstaje §S$PSIONIC_AURA$§!. Ta aura powstaje dzięki §Spatronowi z Woalu§!, do którego mamy obecnie największe §S$concept_attunement$§!.\n\n$PSIONIC_AURA_PLURAL$ mają różne efekty w naszym imperium i mogą wpływać na sojusznicze oraz wrogie mocarstwa. Żeby rozszerzyć aurę na większą liczbę układów, musimy bardziej dostroić się do patrona, co pozwoli odblokować technologię £research£ §S$tech_aura_intensification$§!.\n\nŻeby zobaczyć, jakie efekty wywołuje nasza $PSIONIC_AURA$, otwórz zakładkę §SWoalu§! albo naprowadź kursor na ikonę aury w środkowym panelu dolnej części £interface£ §Swidoku układu§!."
 tutorial.2610.name: "Samouczek: $tech_aura_intensification$"
 tutorial.2610.desc: "Nasza §S$PSIONIC_AURA$§! ma teraz zdolność zwiększania swojej §Sintensywności§! i rozprzestrzeniania się do innych układów.\n\n$PSIONIC_AURA_PLURAL$ mogą osiągnąć trzy poziomy intensywności o coraz silniejszych efektach. Jeżeli $PSIONIC_AURA$ osiągnie nowy lub maksymalny poziom intensywności, podejmie próbę rozprzestrzenienia się do sąsiednich układów. $PSIONIC_AURA_PLURAL$ w większości mają maksymalny zasięg, na który mogą rozciągnąć się od swojego źródła.\n\nIntensywność aury można zwiększyć różnymi sposobami, na przykład dzięki dużym populacjom z cechą $trait_psionic$, wysokim poziomom £happiness£ §Szadowolenia§!, miejscom pracy (£job_telepath£ [GetTelepathCap]) i zarządcom psionicznym lub £leader£ przywódcom £sector£ sektorów."
 tutorial.2620.name: "Samouczek: zderzenia aur"
 tutorial.2620.desc: "Nasza §S$PSIONIC_AURA$§! napotkała inną aurę w sąsiednim, połączonym układzie. Gdy dochodzi do takiego zdarzenia, obie aury mogą ze sobą konkurować o to, która rozprzestrzeni się na dany układ.\n\nTen proces zależy od miesięcznego przyrostu §Sintensywności§! każdej z aur, co można sprawdzić, naprowadzając kursor na ikonę aury na środkowym panelu u dołu £interface£ §Swidoku układu§!."
 #==========================
 # Technologies
 #==========================
 tech_psionic_aura: "$PSIONIC_AURA$"
 tech_psionic_aura_desc: "Psioniczne emanacje Woalu przynoszą łaskę bytu w świat cielesny. W imperium dostrojonym do patrona Woalu z miejsc skupienia jego populacji psionicznej dobywać się będzie $PSIONIC_AURA$."
 feature_unlock_psionic_aura: "$PSIONIC_AURA_PLURAL$"
 feature_unlock_psionic_aura_desc: "Pozwala, aby w imperium dostrojonym do patrona Woalu z miejsc skupienia jego populacji psionicznej rozpościerała się $PSIONIC_AURA$."
 psionic_aura_delve_success_tt: "Szansa powodzenia przy wchodzeniu w Woal: §G+$@delve_success_tier_1|0$%§!"
 tech_aura_intensification: "$PSIONIC_AURA$ - intensyfikacja"
 tech_aura_intensification_desc: "Psioniczne emanacje z Woalu pragną się rozprzestrzeniać. Dzięki temu nowemu zrozumieniu $PSIONIC_AURA_PLURAL$ imperium mogą zwiększyć swoją intensywność i roznosić się po układach słonecznych, przynosząc korzyści sojusznikom i szkodząc wrogom."
 feature_allow_psionic_aura_intensity_spread: "$PSIONIC_AURA$ - rozprzestrzenianie"
 feature_allow_psionic_aura_intensity_spread_desc: "Pozwól, aby $PSIONIC_AURA_PLURAL$ rozprzestrzeniały się w sąsiednich układach, aż do hiperlinii §Y[Owner.GetAuraHyperlaneRange]§! od źródła emisji."
 feature_allow_psionic_aura_intensity_growth: "$PSIONIC_AURA$ - rozwój"
 feature_allow_psionic_aura_intensity_growth_desc: "Pozwól, aby $PSIONIC_AURA_PLURAL$ zwiększyły swoją intensywność."
 aura_intensification_delve_success_tt: "Szansa powodzenia przy wchodzeniu w Woal: §G+$@delve_success_tier_2|0$%§!"
 tech_psionic_suppression: "Tłumienie psioniczne"
 tech_psionic_suppression_desc: "Urządzenia tłumiące energię psioniczną są równie trudne w budowie, jak w zrozumieniu. Obcowanie z siłami pozawymiarowymi jest niezwykle skomplikowane."
 tech_psionic_suppression_feature_tt: "$i_unlocks_feature$ Odblokowuje zdolność budowy §Ypieczęci Woalu§! i §Ytłumików psionicznych§!."
 tech_aura_resonation: "Rezonans aury"
 tech_aura_resonation_desc: "Jest sposób na sprawienie, aby $PSIONIC_AURA_PLURAL$ rozpościerały się poza zaludnione światy. Dodany do bazy gwiezdnej $sm_aura_emitter$ sprawia, że nawet ona może być przewodnikiem dla psionicznych emanacji z Woalu."
 tech_materiality_engine: "$building_materiality_engine$"
 tech_materiality_engine_desc: "$building_materiality_engine_desc$"
 tech_psionic_bombers: "Bombowce psioniczne"
 tech_psionic_bombers_desc: "Te małe i zwinne jednostki specjalizują się w dostarczaniu skoncentrowanych ładunków energii psionicznej. Im większy cel, tym większy rezonans wywołują eksplozje."
 tech_bio_psionic_bombers: "$tech_psionic_bombers$"
 tech_psionic_lightning: "Psioniczny grom"
 tech_psionic_lightning_desc: "Wytworzenie tymczasowego połączenia psionicznego między statkami pozwala na uwolnienie bezpośredniego, niszczycielskiego ładunku mocy mentalnej. Taka nieokiełznana energia jest zdolna zdezorientować systemy jednostek i wpłynąć na umysły ich załóg."
 tech_bio_psionic_lightning: "$tech_psionic_lightning$"
 ship_terrify_tt: "Szansa na ['concept_terrify'] okrętów wojennych na £time£ §Y5-10§! dni, w zależności od wielkości okrętu wskazanego jako cel."
 concept_terrify: "Przerażenie"
 concept_terrify_desc: "Przerażone okręty przestaną atakować i będą uciekać przed agresorem."
 tech_psionic_disruptor: "Dezintegratory psioniczne"
 tech_psionic_disruptor_desc: "Te wysoce zaawansowane dezintegratory strzelają przebijającą kadłuby potężną lancą energii psionicznej, co pozwala na celowane wyłączanie wrogiej broni."
 tech_bio_psionic_disruptor: "$tech_psionic_disruptor$"
 tech_zro_launcher: "Wyrzutnie zra"
 tech_zro_launcher_desc: "Te silnie skoncentrowane kule $zro_lower$ mogą bez przeszkód przenikać wrogie tarcze poprzez przechodzenie między rzeczywistościami. Kontakt z obiektem fizycznym powoduje wykładniczo rosnące zniszczenie."
