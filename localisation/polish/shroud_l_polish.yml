 shroud.4950.title: "Złośliwa aura"
 shroud.4950.desc.1: "Według naszych danych ta aura ma ekstremalnie szkodliwe oddziaływanie. Jeśli nie podejmiemy przeciwdziałania, może szybko rozprzestrzenić się po galaktyce."
 shroud.4950.desc.2: "Potężna $PSIONIC_AURA$ została wykryta w układzie §H[from.GetName]§!"
 shroud.4950.desc.3.intro: "$shroud.4950.desc.2$. Nasi [GetTelepathPlural] twierdzą, że jej emisja z §HWoalu§! jest wywoływana przez aktywność psioniczną, którą podejmuje:"
 shroud.4950.desc.3.default: "$shroud.4950.desc.3.intro$ obca cywilizacja."
 shroud.4950.desc.3.contact: "$shroud.4950.desc.3.intro$ §H[fromfrom.GetName]§!"
 shroud.4950.desc.4: "$shroud.4190.desc.intro$ Taka §H\"$PSIONIC_AURA$\"§!, nazywana tak ze względu na prawdopodobne miejsce jej pochodzenia, została wykryta w układzie §H[from.GetName]§!."
 shroud.4950.desc.5.intro: "$shroud.4950.desc.2$, udało się ustalić, że pochodzi z obszaru, którego właścicielem jest:"
 shroud.4950.desc.5.default: "$shroud.4950.desc.5.intro$ obca cywilizacja."
 shroud.4950.desc.5.contact: "$shroud.4950.desc.5.intro$ §H[fromfrom.GetName]§!"
 shroud.4950.a: "$grand_archive.1100.a$"
 shroud.4955.title: "Uczucie grozy"
 shroud.4955.desc.1: "Przez naszą populację przetacza się świadomość nadchodzącego zagrożenia."
 shroud.4955.desc.1.gestalt: "$shroud.4955.desc.1$ [GetTelepathPlural] donoszą o wykryciu równoczesnego zakłócenia energii §HWoalu§!."
 shroud.4955.desc.1.non_gestalt: "$shroud.4955.desc.1$ [GetTelepathPlural] twierdzą, że nawet §HWoal§! wydaje się być dziwnie niespokojny, jakby jego siły drżały w cichym lęku."
 shroud.4955.desc.2.intro: "W ostatnich latach przez galaktykę przetacza się coraz więcej groźnych zdarzeń."
 shroud.4955.desc.2.outro: "Wykrywamy coraz dziwniejsze zjawiska, a [GetResearchers] przewidują jeszcze gorsze zdarzenia w najbliższej przyszłości."
 shroud.4955.desc.2.contact_aura: "$shroud.4955.desc.2.intro$ Dostrzegliśmy, że §H[from.GetName]§! rozwija się w niewyjaśniony sposób. Widzieliśmy, jak wtargnęła nieprzyjazna §H$PSIONIC_AURA$§!. $shroud.4955.desc.2.outro$"
 shroud.4955.desc.2.contact_no_aura: "$shroud.4955.desc.2.intro$ Dostrzegliśmy, że §H[from.GetName]§! rozwija się w niewyjaśniony sposób. $shroud.4955.desc.2.outro$"
 shroud.4955.desc.2.no_contact_aura: "$shroud.4955.desc.2.intro$ Widzieliśmy, jak wtargnęła nieprzyjazna §H$PSIONIC_AURA$§!. $shroud.4955.desc.2.outro$"
 shroud.4955.desc.2.no_contact_no_aura: "$shroud.4955.desc.2.intro$ $shroud.4955.desc.2.outro$"
 shroud.4955.desc.3: "Nie wiemy dokładnie, co nadchodzi, ale wyczuwamy, że bez wątpienia nadejdzie."
 shroud.4955.a: "Musimy przygotować się na najgorsze."
 shroud.4955.a.tt: "Jeżeli §H$end_aura$§! obejmie galaktykę, gra zakończy się."
 shroud.4960.title: "Zagrożenie psioniczne"
 shroud.4960.desc.1.intro: "Złośliwa §H$PSIONIC_AURA$§!, którą emituje:"
 shroud.4960.desc.1.outro: "rozchodzi się po galaktyce w alarmującym tempie. Sądząc po obserwacjach, które prowadzą [GetResearchers], ma negatywny wpływ na wiele układów słonecznych."
 shroud.4960.desc.1.contact: "$shroud.4960.desc.1.intro$ §H[from.GetName]§! $shroud.4960.desc.1.outro$"
 shroud.4960.desc.1.no_contact: "$shroud.4960.desc.1.intro$ nieznana nam obca cywilizacja $shroud.4960.desc.1.outro$"
 shroud.4960.desc.2: "Według najnowszych danych objęła już połowę galaktyki połączonej hiperliniami. Stojąca za nią siła prawdopodobnie zamierza siać zniszczenie w galaktycznej skali. Jeśli jej nie powstrzymamy, może się jej udać."
 shroud.4960.a: "Trzeba ją powstrzymać."
 shroud.4960.a.tt: "§H[from.GetName]§!: wypowiedziana może zostać ['concept_total_war'].\n$shroud.4955.a.tt$"
 shroud.4965.title: "Nadciągająca zagłada"
 shroud.4965.desc.1.intro: "Niszczycielska §H$PSIONIC_AURA$§!, którą emituje:"
 shroud.4965.desc.1.outro: "wciąż rozprzestrzenia się po galaktyce. Teraz zajmuje większość układów słonecznych naszej galaktyki."
 shroud.4965.desc.1.contact: "$shroud.4960.desc.1.intro$ §H[from.GetName]§! $shroud.4960.desc.1.outro$"
 shroud.4965.desc.1.no_contact: "$shroud.4960.desc.1.intro$ nieznana nam obca cywilizacja $shroud.4960.desc.1.outro$"
 shroud.4965.desc.2: "Jeśli nie podejmiemy szybkich i zdecydowanych działań, dojdzie do galaktycznej katastrofy."
 shroud.4965.a: "To ostatni bastion."
 the_reckoning_chain_title: "Obrachunek"
 the_reckoning_chain_desc: "Nasze przymierze z imperium $end_of_the_cycle_color_article$ doprowadziło do zniszczenia: §H[this.GetName]§!. Po naszym niegdyś potężnym imperium pozostał zaledwie jego cień.\n\nNiszczycielskie zamiary naszego dawnego patrona przyjęły postać olbrzymiej istoty energetycznej - nazwaliśmy ją §R$NAME_Reckoning$§!. Przemieszcza się on między światami i odzyskuje siły, pożerając ich populacje."
