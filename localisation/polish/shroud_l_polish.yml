 # Carceral Test Facility
 building_carceral_test_facility: "Biuro ds. eksperymentów"
 building_carceral_test_facility_desc: "Biuro kolonialne promujące możliwości franczyzowe potencjalnym współpracownikom oraz dające im możliwości tworzenia własnych programów tekstów eksperymentalnych. Ogranicz przestępczość, wesprzyj obronność!"
 building_psionic_offices: "Biura psioniczne"
 building_psionic_offices_desc: "Po złożonych obcych umysłach można przemieszczać się wydajniej, będąc fizycznie w ich pobliżu, dzięki czemu zawierane są umowy handlowe najbardziej korzystne dla obu stron."
 building_psionic_offices_tt: "\nEfekty układu:\n$t$- Tworzy: §Y$PSIONIC_AURA$§! dla: $TRIGGER_BRANCH_OFFICE_OWNER$, o $@psionic_offices_intensity|0+$ miesięcznej intensywności\n$t$- §RWszelkie metody, dzięki którym powstaje $PSIONIC_AURA$ właściciela kolonii, mają priorytet przed tym budynkiem§!"
 job_shroud_trader: "Empatyczny handlarz"
 job_shroud_trader_plural: "Empatyczni handlarze"
 job_shroud_trader_plural_with_icon: "£job_telepath£ $job_shroud_trader_plural$"
 job_shroud_trader_desc: "Ci eksperci dostrajają się do emocjonalnej atmosfery lokalnych rynków, zawierają transakcje i prowadzą seminaria o obecnych trendach w przywództwie myśli."
