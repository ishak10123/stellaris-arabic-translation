 shroud.4015.title: "$the_cradle_of_souls_article_cap$ wyłania się"
 shroud.4015.desc.default: "§H[Root.Patron:the_cradle_of_souls.GetPreCommunicationName]§! rozsiewa swą moc w całym §HWoalu§!, ale nie sposób namierzyć jej źródła. Miotamy się po wymiarze psionicznym, nieustannie zmieniamy kurs, wątpiąc w naszą zdolność orientacji.\n\n$shroud.4015.desc.default.end$"
 shroud.4015.desc.hive: "§H[Root.Patron:the_cradle_of_souls.GetPreCommunicationName]§! rozsiewa swą moc w całym §HWoalu§!, ale nie sposób namierzyć jej źródła. Miotamy się po wymiarze psionicznym, nieustannie zmieniamy kurs, wątpiąc w nasze obliczenia.\n\n$shroud.4015.desc.default.end$"
 shroud.4015.desc.default.end: "Gdy zatrzymaliśmy się, by pomyśleć, pojawiła się istota. Niczego nie usłyszeliśmy, niczego nie zauważyliśmy, ale zrobiło się nam cieplej niż kiedykolwiek.\n\nPoczuliśmy moc drzemiącą w najgłębszym wnętrzu tego stworzenia, węzeł energii pochodzących z całego Woalu i spoza niego. Amalgamat myśli emitujący ciepło. Gdy wróciliśmy z podróży, otuliła nas głucha cisza.\n\nTeraz wiemy, czego pragnie ta istota. [GetCradleEmergesEnding]"
 shroud.4015.desc.gestalt_machine: "§H[Root.Patron:the_cradle_of_souls.GetPreCommunicationName]§! rozsiewa swą moc w całym §HWoalu§!, ale nie sposób namierzyć jej źródła. Miotamy się po wymiarze psionicznym, nieustannie zmieniamy kurs, wątpiąc w nasze obliczenia.\n\nGdy zatrzymaliśmy się, by przetworzyć informacje, pojawiła się istota. Nie mogliśmy rozszyfrować jej wiadomości, ale ta uruchomiła głębszą część naszego kodu.\n\nPoczuliśmy moc drzemiącą w najgłębszym wnętrzu tego stworzenia, węzeł energii pochodzących z całego Woalu i spoza niego. Amalgamat pojęć emitujący ciepło. Gdy wróciliśmy z podróży, spowiła nas głucha cisza.\n\nTeraz wiemy, czego pragnie ta istota. [GetCradleEmergesEnding]"
 shroud.4015.desc.individual_machine: "$shroud.4015.desc.gestalt_machine$"
 shroud.4015.desc_outro_homicidal: "Nasze umysły natychmiast odrzucają te fałszywe pojęcia porządku i harmonii. Dalsze dostrajanie z tą istotą ($the_cradle_of_souls_color_article$), osłabiłoby naszą determinację."
 shroud.4015.desc_outro_robot: "Znamy jej wizję porządku i harmonii. Kiedy nasi [GetTelepathPlural] naładują się, możemy skontaktować się i porozumieć z tym stworzeniem zwanym $the_cradle_of_souls_color_article$."
 shroud.4015.desc_outro_organic: "Znamy jej wizję porządku i harmonii. Kiedy nasi [GetTelepathPlural] odpoczną, możemy skontaktować się i porozumieć z tym stworzeniem zwanym $the_cradle_of_souls_color_article$."
 shroud_is_homicidal: "§RNasze gwałtowne i drapieżne skłonności nie pozwalają na to.§!"
 shroud.4015.a.default: "Obyśmy zbliżyli się jeszcze bardziej."
