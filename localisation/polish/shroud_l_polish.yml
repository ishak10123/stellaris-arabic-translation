 shroud.delve_event.boon.10: "Spłynęła na nas łaska Woalu."
 shroud.delve_event.boon.11: "Woal postanowił dać nam siłę."
 shroud.delve_event.boon.12: "Otrzymaliśmy błogosławieństwo łaski Woalu."
 shroud.delve_event.boon.13: "Woal błogosławi nasze wysiłki."
 shroud.delve_event.boon.14: "Otrzymaliśmy dar błogosławieństw Woalu."
 shroud.delve_event.boon.15: "Woal nagradza nas wzmocnieniem."
 shroud.delve_event.curse.1: "Woal przeklął nas."
 shroud.delve_event.curse.2: "Woal ukarał nas klątwą."
 shroud.delve_event.curse.3: "Nasze działania ściągnęły na nas klątwę."
 shroud.delve_event.curse.4: "Nasze starania zostały nagrodzone klątwą."
 shroud.delve_event.curse.5: "Woal zesłał na nas nieszczęście."
 shroud.delve_event.curse.6: "Zostaliśmy naznaczeni klątwą."
 shroud.delve_event.curse.7: "Woal przeklął nasze imperium."
 shroud.delve_event.curse.8: "Woal odtrącił nas i zesłał na nas klątwę."
 shroud.delve_event.curse.9: "Gniew Woalu sprowadził na nas klątwę."
 shroud.delve_event.curse.10: "Woal ukarał nas klątwą."
 shroud.delve_event.curse.11: "Woal pragnie naszego zniszczenia."
 shroud.delve_event.curse.12: "Woal nałożył na nas klątwę."
 shroud.delve_event.curse.13: "Woal przeklina nasze wysiłki."
 shroud.delve_event.curse.14: "Woal nas potępił."
 shroud.delve_event.curse.15: "Woal wzgardził nami."
 shroud.3000.title: "Ulotne wrażenia"
 shroud.3000.desc: "W wirującej czerni odległe cienie tworzą ulotne kształty, by po chwili wrócić w nicość... Wciąż wybrzmiewa prymitywna kakofonia niezrozumiałych głosów... Światła migoczą i słabną. Obszary gorąca powiększają się i zmniejszają.\n\nWidać ruch. Coś wiruje. To my się poruszamy, a może sam Woal?\n\nJakaś obecność zbliża się ze wszystkich kierunków jednocześnie. Potem rozlega się głos.\n\n§HCO WIDZICIE?§!"
 shroud.3000.a: "Widzimy płonący świat."
 shroud.3000.a.reply: "Ciężar zmienia się, głos wraca...\n\n§HDOBRZE.§!\n\nCiemność przechyla się, potem obraca. Przez chwilę coś na nas mocno napiera i nagle znowu jesteśmy sami."
 shroud.3000.b: "Widzimy jakąś uroczystość."
 shroud.3000.b.reply: "Zadrżało coś ciężkiego. Mrok powoli nas spowija, coraz mocniej i ciaśniej...\n\n§HNIE!§!\n\nNicość przechyla się, potem obraca. Nagle znowu jesteśmy sami..."
 shroud.3000.c: "Nie jesteśmy pewni."
 shroud.3000.c.reply: "§HSŁABOŚĆ!§!\n\nNicość przechyla się, potem obraca. Nagle znowu jesteśmy sami..."
 shroud.3005.title: "Potworny głód"
 shroud.3005.desc: "Nasze zmysły zalewa ohydny smród wnętrzności.\n\nObrazy, wijące się i wirujące z dziką furią, zaczynają wynurzać się z głębi Woalu. Najpierw słychać echa szaleńczych krzyków niedożywionych bestii... Czujemy ich głód. Potem ich zaślinione paszcze stają się naszymi.\n\nPrzed nami pojawiają się sylwetki. Spanikowane bydło. Zdobycz. Hipnotyzująco blisko... Przeszywający ból staje się nieznośny.\n\nNasze zmysły skręcają się, zaciskają, gdy głód zaczyna pożerać myśli. Czy to krzyki naszej zwierzyny? A może dochodzą z wnętrza?\n\nZaciskają się więżące nas okowy. Pękają, gdy przez cierpienie przebija się skrzekliwy głos:\n\n§HZERWIJCIE KAJDANY! UCZTUJCIE!§!"
 shroud.3005.a: "Zerwijcie łańcuchy. Zjedzcie zdobycz."
 shroud.3005.a.boons.tt: "Otrzymasz $shroud_boon$ do walki."
 shroud.3005.a.reply: "Nasze więzy pękły.\n\nSzalony głód. Uwolniony.\n\nGroza!\n\n§HJEDZCIE.§!"
 shroud.3005.b: "Oprzyjcie się głodowi. Uciszcie umysł."
 shroud.3005.b.reply: "Łańcuchy mocno trzymają. Głos ocieka gniewem, gdy filtrujemy jego wpływy, uciszamy nasz umysł i odzyskujemy kontrolę.\n\n§HSŁABI! NIEUDOLNI!§!\n\nGłód znika, zostawiwszy po sobie uporczywy żal, który rozpływa się w Woalu."
 shroud.3010.title: "Uczta ofiarna"
 shroud.3010.desc: "Z otchłani dobiega głos... donośny, szorstki i przesycony podłością... wzywa nas.\n\n§HJEDZCIE. POCHŁANIAJCIE. POŻERAJCIE.§!\n\nWybuchają nieokiełznane wizje. Światy obracają się w proch i ciszę, a [Root.GetCitizenPlural] zawodzą, gdy ich formy fizyczne są spowijane przez energię psioniczną, która uspokaja głosy... a także nasz... głód.\n\nPatrząc na te obrazy, czujemy inną obecność, która zachęca nas do powściągliwości i solidarności, których potrzebują [Root.GetCitizenPlural], razem będziemy rosnąć w siłę. Zagłusza ją krzyk głosu."
 shroud.3010.desc.organic: "§HODDAJCIE MI ICH MIĘSO!§!"
 shroud.3010.desc.other: "§HODDAJCIE MI ICH CIAŁA!§!"
 shroud.3010.a: "Jedzmy."
 shroud.3010.a.reply: "Krzyki pożeranych odbijają się echem zarówno w Woalu, jak i w imperium, po czym milkną gwałtownie.\n\nDzięki tej ofierze rośniemy w siłę, a głód ustępuje."
 shroud.3010.b: "Zjednoczmy się."
 shroud.3010.b.reply: "Uciszamy głos, po czym zjednoczeni sięgamy przez Woal, aż do naszego imperium. Zbiorowe westchnienie ulgi i otuchy ucisza wściekłe krzyki, a głód słabnie."
 shroud.3015.title: "Ulotne wizje"
 shroud.3015.desc: "Potężne prądy energii psionicznej zderzają się tu w mroku. Cienie przemykają i spadają wokół nas... Na wprost widać pulsujące światło.\n\nNagle ukazuje się szerszy obraz, lecz tylko na niezmiernie krótką chwilę. Jego kształty znikają, nim zdążymy je rozpoznać.\n\nWokół nas wyczuwamy dziwną obecność.\n\n§HCO WIDZIELIŚCIE?§!"
 shroud.3015.a: "Widzieliśmy las pełen przeróżnych organizmów."
 shroud.3015.a.reply: "Cisza nabrzmiewa. Głos powraca...\n\n§HDOSKONALE.§!\n\nWypełnia nas ogromne ciepło, by ustąpić po chwili. Obecność zniknęła."
 shroud.3015.b: "Widzieliśmy pustkowie, pozbawione wszystkiego, co niegdyś tam istniało."
 shroud.3015.b.reply: "Głos powraca...\n\n§HNIGDY!§!\n\nGromadzi się w nas przeszywający chłód, po czym nagle ustępuje. Obecność zniknęła."
 shroud.3015.c: "Nie jesteśmy pewni."
 shroud.3015.c.reply: "Głos powraca...\n\n§HJAKIE TO NIECIEKAWE.§!\n\nCzujemy ogromną pustkę, która nagle ustępuje. Obecność zniknęła."
 shroud.3020.title: "Kusząca rozmowa"
 shroud.3020.desc: "Spomiędzy licznych warstw Woalu wyłania się wizja.\n\nMgły tworzą obrys miotającej się istoty, uwięzionej i dławiącej się, gdyż mgliste macki coraz mocniej zaciskają się wokół niej.\n\nNigdy nie widzieliśmy takiego zwierzęcia.\n\nDobiega do nas głos.\n\n§HSPLOTY LOSU NADCIĄGAJĄ! KTÓRY SZARPNIECIE?§!"
 shroud.3020.a: "Wypuśćmy tę istotę."
 shroud.3020.a.reply: "Nasze [GetMindLoc] wypełnia dudniący głos, gdy istota znika z widoku.\n\n§HDOBROBYT.§!\n\nPojawia się kolejny ulotny obraz: gdzieś w naszym imperium odradza się życie."
 shroud.3020.b: "Złapmy ją."
 shroud.3020.b.reply: "Głos wycofuje się z naszych myśli, zostawia za sobą jedynie krzyk rozbrzmiewający echem pośród wizji jałowego krajobrazu.\n\n§HZARAZA.§!"
 shroud.3020.c: "Zabijcie tę istotę."
 shroud.3020.c.swarm: "Pożryjmy ją."
 shroud.3020.c.reply: "Głos zostaje wypchnięty z naszych myśli przez wszechogarniającą żądzę. Głód krwi zalewa nasz [GetMindLoc], gdy przez pustkę przetacza się brutalny rechot.\n\n§HOCZYWIŚCIE! ŁATWA ZDOBYCZ!§!"
 shroud.3025.title: "Kształtowanie krajobrazów"
 shroud.3025.desc: "Mgły Woalu napływają i, niosąc wizje, wirują bez końca.\n\nNiewyraźne krajobrazy wiją się bezładnie. Góry unoszą się i spadają. Oceany chaosu gotują się, wyparowują i zostawiając po sobie na bezkresnych pustyniach wybielone kości morskiego życia.\n\nPod koronami leśnych drzew, łagodnie stworzenia przemierzają swój habitat, po chwili wpadają w konwulsje i przemieniają się w krwiożercze potwory. Rozrywają się nawzajem w nieprzerwanym cyklu śmierci i ponownych narodzin.\n\nW tym chaosie w nasz [GetMindLoc] wdziera się jakiś głos.\n\n§HCO ZA NIEPORZĄDEK. SPLĄTANY SAM ZE SOBĄ.§!"
 shroud.3025.a: "Nagnijmy naturę do naszej woli."
 shroud.3025.a.reply: "Sięgamy, by pochwycić panujący przed nami zamęt.\n\nUmieszczamy ważne elementy na miejscu i zmuszamy kontynenty, by się zatrzymały.\n\nGdy wszystkie elementy łączą się, rozbrzmiewa głos.\n\n§HBEZBARWNOŚĆ, NIJAKOŚĆ, PUSTKA...§!"
 shroud.3025.b: "Nich kwitnie naturalny nieporządek."
 shroud.3025.b.reply: "Dalej oglądamy wizje. Niekończący się cykl rozmywa się w jednolity obraz, po czym wybucha na zewnątrz i znika równie szybko, jak się zaczął.\n\nEnergia strzela przez bezkresny obszar, po czym łączy się ponownie i przyjmuje nowe formy.\n\nRozlega się głos.\n\n§HPOKOJOWY KONFLIKT. CHAOTYCZNA JEDNOŚĆ.§!"
 shroud.3025.b.reply.tt: "Planeta zyskuje losowy §Gdodatni modyfikator§! i §Rujemny modyfikator§!."
 shroud.3030.title: "Pryzmat w mroku"
 shroud.3030.desc: "Niespokojny wir Woalu otwiera się i odsłania rozległy pas czarnego piasku. Słychać rozbijające się fale, lecz ich nie widać.\n\nPrzed, a może za nami, pojawia się pryzmat. Pada nie niego jeden promień światła i natychmiast załamuje się, tworząc mętny obraz.\n\nNiezliczone ciemne postacie oraz zmieniające się formy ukazują się na krótko, po czym ponownie pochłania je mrok.\n\nNa pobliskim piasku pojawia się jakaś obecność.\n\n§HCO ZOSTAŁO POKAZANE, ZOSTAŁO DOSTRZEŻONE, PRAWDA?§!"
 shroud.3030.a: "Widzieliśmy zgromadzenie wielu głosów."
 shroud.3030.a.reply: "Piasek szybko się zmienia. Głos powraca.\n\n§HDOBRZE. WSZECHŚWIAT OPIERA SIĘ NA HARMONII.§!\n\nCzujemy, że odleciało coś ciężkiego. Znowu jesteśmy sami."
 shroud.3030.b: "Widzieliśmy krwawą bitwę."
 shroud.3030.b.reply: "Nagle, piasek zaczyna wirować z prędkością burzy.\n\n§HNIE. NIECH BROŃ RDZEWIEJE I PÓJDZIE W ZAPOMNIENIE!§!\n\nBurza piaskowa milknie. Głos odszedł."
 shroud.3030.c: "Nie jesteśmy pewni."
 shroud.3030.c.reply: "Piasek zmienia się powoli.\n\n§HWAHANIE PROWADZI DO BŁĘDÓW...§!\n\nZnowu jesteśmy sami."
 shroud.3035.title: "Walka cieni"
 shroud.3035.desc: "Chaotyczne energie Woalu kłębią się i falują.\n\nMroczne wici wiją się i miotają, mgła toczy gwałtowną wewnętrzną walkę. W tej burzy furii psionicznej zmagają się dwie bezkształtne istoty. Są niestrudzone, nieustępliwe i wściekłe.\n\nObca obecność napiera na nasz [GetMindPhysicalLoc], potężna i napastliwa.\n\n§HWCHODZĄCY MUSZĄ PRZYNIEŚĆ ROZWIĄZANIE.§!"
 shroud.3035.a: "Dialog ułatwia porozumienie."
 shroud.3035.a.reply: "Mgła zapada się w siebie i znika na tle wiru energii psionicznej. Świadomość powraca.\n\n§HHARMONIA TO MĄDROŚĆ.§!\n\nWoal stał się spokojniejszy."
 shroud.3035.b: "Kompromis to oznaka słabości."
 shroud.3035.b.reply: "Z każdym ciosem zadanym przez mgłę, energie kotłujące się wokół nas stają się coraz silniejsze.\n\n§HPRZEMOC TO NAGRODA DLA BEZMYŚLNEJ ISTOTY.§!\n\nWirujące energie Woalu jeszcze raz się skręcają."
 shroud.3040.title: "Niewidziane widoki"
 shroud.3040.desc: "Przed nami rozciąga się zbiornik czarnej cieczy.\n\nNagle na jej powierzchni migoce rozmyty obraz. Zanim zniknął, dostrzegliśmy połyskujący szczyt, na którego graniach mieni się złoto.\n\nNasze [GetMindLoc] wypełnia dudniący echem głos.\n\n§HCZY WIDZIELIŚCIE NIEWIDZIANE?§!"
 shroud.3040.a: "Widzieliśmy zdobycz, gotową do upolowania."
 shroud.3040.a.reply: "Po powierzchni przebiegają liczne zmarszczki. Znowu czujemy głos.\n\n§HROZWÓJ BEZ GRANIC WSPIERA RÓWNOWAGĘ POZBAWIONĄ KRYTERIUM.§!\n\nGdy ciecz zastyga, czujemy, że głos odchodzi."
 shroud.3040.b: "Widzieliśmy doskonałość natury, którą trzeba chronić."
 shroud.3040.b.reply: "Ciecz staje się niespokojna. Fale powiększają się i opadają z łoskotem. W ciemności zrywa się wir. Głos wraca z większą siłą.\n\n§HNIEDOPUSZCZALNE! ROZWÓJ I ZYSK. ROZWÓJ I ZYSK!§!\n\nPowierzchnia znowu zastyga. Głos odszedł."
 shroud.3040.c: "Nie jesteśmy pewni."
 shroud.3040.c.reply: "Ciecz zaczyna się ruszać. Głos znowu do nas przychodzi.\n\n§HPRZEKONANIE SŁABNIE... W WASZEJ WOLI MIESZKA SŁABOŚĆ.§!\n\nGdy powierzchnia zastyga, czujemy, jak głos odchodzi."
 shroud.3045.title: "Świetliste jądro"
 shroud.3045.desc: "Mgła ponownie materializuje się przed nami. Płomieniste energie pulsują z niespodziewaną siłą. Zauważamy zarys kształtu dziwnego drzewa.\n\nGdy się zbliżamy, jego potężna korona mieni się fioletami, różami i czerniami.\n\nU jego stóp umościło się świetliste jądro, które pulsuje w rytm zmieniających się kolorów korony.\n\nNasze [GetMindLoc] wypełnia głos.\n\n§HPRZYWŁASZCZENIE. ZDOBYCIE. WYKORZYSTANIE.§!"
 shroud.3045.a: "Wydobądźmy je."
 shroud.3045.a.reply: "Po wyciągnięciu jądra, korona blednie, po czym prawie natychmiast więdnie. Głos powraca.\n\n§HTAK! ŁUPY RODZĄ KOLEJNE ŁUPY.§!"
 shroud.3045.b: "Zostawmy je w spokoju."
 shroud.3045.b.reply: "Czujemy drżenie. Czy to ten świat się trzęsie, czy też my?\n\n§HDOBROBYT TO CEL. WZGARDZENIE NIM TO GŁUPOTA!§!"
 shroud.3050.title: "Irytujące kakofonie"
 shroud.3050.desc.intro: "Potężne prądy psioniczne zderzają się i mieszają w niekończącej się turbulencji Woalu. Rycząca kakofonia nasila się i domaga się naszej uwagi."
 shroud.3050.desc.outro: "Hałas jest przytłaczający."
 shroud.3050.desc.eater: "Okrzyki bólu, dudniąca symfonia bitwy, ryk wygłodniałych płomieni. Wyczuwamy ból... Czyj on jest?"
 shroud.3050.desc.composer: "Krzyki i wołania, zwierzęce, dzikie, pierwotne... Rzeki mkną, wiatry zawodzą... Cała natura szczeka i wyje, pospiesznie i cała naraz..."
 shroud.3050.desc.cradle: "Głosy szepcą, mamroczą, krzyczą i deklarują... Miriady intonacji, sylab, dźwięków... Nieprzebrane języki rozbrzmiewają równocześnie."
 shroud.3050.desc.instrument: "Świdry wiercą, maszyneria zgrzyta... Materia przechodzi głośną, wymuszoną przemianę... Wszystkie fabryki wszechświata jednocześnie wybuchają ogniem."
 shroud.3050.a: "Trzymajmy się tego."
 shroud.3050.a.reply: "Crescendo nasila się coraz bardziej. Nagle zostajemy rzuceni w kierunku, którego nie rozumiemy...\n\nW końcu wraca cisza."
 shroud.3050.b: "Zawróćmy."
 shroud.3050.b.reply: "To nie do zniesienia. Nasze [GetMindLoc] cofają się w kojące objęcia ciszy."
 shroud.3055.title: "Prorocze wizje"
 shroud.3055.desc.intro: "Ogarnia nas gęsty mrok. Ze wszystkich stron, zaciska się coraz mocniej. Wreszcie ukazuje się nam zamazany widok."
 shroud.3055.desc.outro: "Pośród cieni coś zwróciło naszą uwagę. Nie sposób tego pomylić z czymś innym: to flaga [Root.GetAdjective]\n\nCzy to my?"
 shroud.3055.desc.eater: "Widzimy spustoszony świat, pokłosie bitwy... Zwycięzcy przeszukują zwłoki i szczątki."
 shroud.3055.desc.composer: "Widzimy wiele światów... pędzących na złamanie karku przez czas i przestrzeń... Wszystkie są takie same, zjednoczone w ramach jednego imperium."
 shroud.3055.desc.cradle: "Widzimy wielkie zgromadzenie... Mętny zarys wielu postaci... Słuchają, mówią"
 shroud.3055.desc.instrument.default: "Widzimy zoptymalizowany świat... Nieskończone rzędy fabryk i kopalń... Żaden jego zakątek nie pozostał nietknięty."
 shroud.3055.desc.instrument.relentless_industrialist: "Widzimy zoptymalizowany świat... Nieskończone rzędy fabryk i kopalń... Czysta doskonałość. Żaden jego zakątek nie pozostał nietknięty."
 shroud.3055.a: "Zatrzymajmy tę wizję."
 shroud.3055.a.reply: "Obraz wyostrza się lekko. Wierzymy naszej percepcji."
 shroud.3055.b.organic: "Przepędźmy to z naszych umysłów."
 shroud.3055.b.machine: "Usuńmy to z naszych obwodów."
 shroud.3055.b.reply: "Nieokreślone sylwetki w wizji rozpływają się w nicość."
 shroud.3060.title: "Pośród kosmicznej pustki"
 shroud.3060.desc.intro: "Eteryczne mgły Woalu wiją się i wirują, wciągają naszą świadomość głębiej, a nasze postacie materialne pozostają w bezruchu, nietknięte.\n\nNasza [GetPsycheLoc] rozciąga się, napina, uwięziona w powracającym przypływie. Każda próba ruchu kończy się fiaskiem, napięcie rośnie, czujemy ucisk jak w imadle."
 shroud.3060.desc.intro.organic: "Widzimy więcej niż siebie, nasza ciała są zamknięte w kaskadowym hipersześcianie, który wymyka się materialnemu pojmowaniu."
 shroud.3060.desc.intro.machine: "Podprogramy logiczne uruchamiają się, dostrzeżono porażkę: to pętla rekurencyjna. Nasze procesory psioniczne nie zdołają przerwać tego cyklu i wznowić normalnego działania."
 shroud.3060.desc.intro.end: "Gdy napięcie staje się nieznośne, naszym postaciom grozi rozpuszczenie się w kosmicznej pustce. W naszym więzieniu rozlega się głos."
 shroud.3060.desc.outro: "Doskonale rozumiemy te słowa. Ich impet rośnie, czujemy, jak możemy zahamować zamęt, który może rozerwać nas na strzępy, jeśli się poddamy."
 shroud.3060.desc.eater: "§HPOŻRYJCIE! POCHŁOŃCIE BEZKRESNĄ KOSMICZNĄ PUSTKĘ!§!"
 shroud.3060.desc.composer: "§HWYROŚNIJCIE POZA OGRANICZENIA REKURSYWNEJ NIESKOŃCZONOŚCI!§!"
 shroud.3060.desc.cradle: "§HPRZYJMIJCIE WIECZNOŚĆ! WSZYSCY SĄ JEDNYM, A JEDNO JEST CAŁOŚCIĄ!§!"
 shroud.3060.desc.instrument: "§HWYKORZYSTAJCIE NIEOGRANICZONY POTENCJAŁ!§!"
 shroud.3060.a: "Poddajcie się."
 shroud.3060.a.reply: "Głos rośnie w siłę, prowadzi nas, zmusza do myślenia poza naszymi ograniczonymi zdolnościami poznawczymi. Cykl trwa dalej, zacieśnia się, wciąga głębiej, po czym rozbija o nasze jestestwo.\n\nPrzebiliśmy się przez rekursję, prowadziły nas nasze błagania skierowane do potęg mieszkających w Woalu.\n\nJednak nie wszyscy zostaliśmy. §H[event_target:shroud_warped_leader.GetName]§! nie zajmuje już swojego stanowiska. Głos powraca."
 shroud.3060.a.reply.default: "ZOSTANĄ STWORZENI NA NOWO."
 shroud.3060.a.reply.eater: "§H$shroud.3060.a.reply.default$§!"
 shroud.3060.a.reply.composer: "§H$shroud.3060.a.reply.default$§!"
 shroud.3060.a.reply.cradle: "§H$shroud.3060.a.reply.default$§!"
 shroud.3060.a.reply.instrument: "§H$shroud.3060.a.reply.default$§!"
 shroud.3060.b: "Stawiajmy opór."
 shroud.3060.b.reply: "Nie zgadzamy się na żaden przymus.\n\nPętla przyspiesza, wciąga nas z siłą powracającego przypływu. Kiedy przestajemy walczyć, napięcie słabnie i nie próbuje na rozerwać. Zamiast tego podciąga nas i pozwala na chwilę spojrzeć dalej niż nasze formy.\n\nGłos powraca."
 shroud.3060.b.reply.default: "JAKIE TO NIECIEKAWE."
 shroud.3060.b.reply.eater: "§H$shroud.3060.b.reply.default$§!"
 shroud.3060.b.reply.composer: "§H$shroud.3060.b.reply.default$§!"
 shroud.3060.b.reply.cradle: "§H$shroud.3060.b.reply.default$§!"
 shroud.3060.b.reply.instrument: "§H$shroud.3060.b.reply.default$§!"
 shroud.3060.leader_return.title: "Zniekształceni przez Woal"
 shroud.3060.leader_return.desc: "Woal drży, słabe zniekształcenia wypełniają nasz [GetMindPhysicalLoc], gdy wyłania się znana obecność. Skraj [GetMindPerceptionLoc] to obszar, w którym się porusza. Szept rozlega się echem tuż poza zakresem naszego słuchu.\n\n§H[from.GetName]§! wraca do nas, przenika przez nieopisane mgły, które zaczynają przyjmować znajomy kształt. Odległe, lecz niepodzielone, odnowione przez Woal, bardzo chcą wrócić do obowiązków."
 shroud.3060.leader_return_tt: "§H[from.GetName]§! ma nową cechę: §G$leader_trait_shroud_warped$§!"
 leader_trait_shroud_warped: "Zniekształceni przez Woal"
 leader_trait_shroud_warped_desc: "Ten przywódca został wchłonięty i odtworzony przez Woal, a dzięki zesłanej mądrości zyskał moc obserwacji nieobserwowalnego, w dodatku wzmacnia potencjał psioniczny tych, którzy znajdują się wokół niego."
 leader_trait_shroud_warped_invasion_effect: "Dane wywiadowcze o wrogim imperium za każdą zwycięską inwazję: §G+$@shroud_warped_intel|0$§!"
 shroud.3065.title: "Podarowany kielich"
 shroud.3065.desc.intro: "Mgła Woalu drży, rozstępuje się i odsłania kielich wypełniony połyskującym płynem, którego powierzchnia jest gładka, nieporuszona.\n\nOgarnia nas silna potrzeba. Sięgamy myślą w przód. Wyczekująca nas ciesz drży, gdy zaczynamy: [GetDrinkLoc].\n\nWszystko staje się klarowne. Im więcej udaje nam się [GetImbibeLoc], tym więcej kłamstwa dostrzegamy. Płyn gęstnieje, każda kropla zaczyna ścinać się w środku.\n\nPragniemy oczyścić nasze układy z tego skażenia."
 shroud.3065.desc.eater: "§HPOŻERAJCIE! UTOPCIE WASZĄ SŁABOŚĆ!§!"
 shroud.3065.desc.composer: "§HPOŻYWCIE SIĘ! WCIĄGNIJCIE NOWY ROZWÓJ!§!"
 shroud.3065.desc.cradle: "§HCZERPCIE SIŁĘ! ROZPOCZNIJCIE BOLESNE ZJEDNOCZENIE!§!"
 shroud.3065.desc.instrument: "§HPIJCIE! ODDAJCIE SIĘ NAŁOGOM!§!"
 shroud.3065.desc.outro: "Głos kłębi się, miesza z cieczą, krzepnącą, gdy przedziera się wewnątrz nas, naginając do swej woli naszą uległość."
 shroud.3065.a.organic: "Pijcie."
 shroud.3065.a.machine: "Przetwarzajcie."
 shroud.3065.a.reply.intro: "Resztka cieczy spływa w dół, gęsta i odrażająca. Gromadzi się wewnątrz nas, napełnia nasz [GetMindPhysicalLoc].\n\nPulsuje w nas gorąco, zniekształca myśli, smaży krawędzie naszego [GetPsycheLoc].\n\nGłos wraca, zadowolony, a kielich rozpuszcza się."
 shroud.3065.a.reply.default: "ZDOBYWCA! CZEMPION."
 shroud.3065.a.reply.eater: "§H$shroud.3065.a.reply.default$§!"
 shroud.3065.a.reply.composer: "§HTWÓRCA! ŻYWY KATALIZATOR.§!"
 shroud.3065.a.reply.cradle: "§HINTEGRATOR! UMYSŁY Z UMYSŁAMI.§!"
 shroud.3065.a.reply.instrument: "§HDEKADENCJA! ZMYSŁY DO ZBADANIA.§!"
 shroud.3065.b: "Wymazanie."
 shroud.3065.b.reply.intro: "Nasze [GetBodiesLoc] drgają w gwałtownych konwulsjach, gdy odrzucamy skażenie, wypychając z wnętrza obrzydliwą substancję.\n\nOdrażająca ciecz rozpryskuje się w kosmicznej pustce, wiruje i znika. Głos syczy, jego słowa wyparowują razem z nieczystościami."
 shroud.3065.b.reply.default: "SŁABOŚĆ!"
 shroud.3065.b.reply.eater: "§H$shroud.3065.b.reply.default$§!"
 shroud.3065.b.reply.composer: "§HSTAGNACJA!§!"
 shroud.3065.b.reply.cradle: "§HTCHÓRZOSTWO!§!"
 shroud.3065.b.reply.instrument: "§HTAKI POTENCJAŁ...§!"
 shroud.3070.title: "Kanwa zmian"
 shroud.3070.desc.intro: "Woal kurczy się, składa do środka, naciska na naszą psyche głęboko w zamkniętej i rezonującej pustce.\n\nZamajaczyła jakaś obecność, płynna i nieokreślona. Zmienia formę, gdy otwiera i zamyka szczelinę, która oddziela nas od reszty Woalu. Każde otwarcie ukazuje nam kaskadę wizji."
 shroud.3070.desc.eater: "Światy płoną, ich rozpalone iskry są niesione zawodzeniem pochłanianych. Każdy nowy obraz to potencjalna uczta, gotowa na pożarcie."
 shroud.3070.desc.composer: "Niezliczone krajobrazy, pełne dzikiego życia rojącego się na zielonych równinach. Wrzeciona życia splatają się i rozciągają. Każdy nowy widok ukazuje tętniącą życiem atmosferę potencjału, który można kształtować i formować."
 shroud.3070.desc.cradle: "Społeczności łączą się, wspierają w jedności, kosztem odrzucenia tych, którzy się temu sprzeciwiają. Każdy nowy obraz ukazuje kolejną utopię, która przyjmie tylko wiernych."
 shroud.3070.desc.instrument: "Przed nami rozciągają się wielkie kopalnie, pełne cennych zasobów czekających na wydobycie. Każdy nowy obraz ukazuje nieprzebrane bogactwa czekające na łupieżców."
 shroud.3070.desc.outro: "Z każdą nową wizją siła inercji obraca nas i wykręca, wlecze nas z nieprawdopodobną szybkością, a ściany rzeczywistości uginają się i falują.\n\nWyczuwamy rozbawienie postaci. Poddaje nas próbie, czeka na nazwę siły, która nas pochwyciła."
 shroud.3070.a.eater: "Satysfakcja."
 shroud.3070.a.composer: "Formowanie."
 shroud.3070.a.cradle: "Harmonia."
 shroud.3070.a.instrument: "Potencjał."
 shroud.3070.a.reply.intro: "Nasz głos krzyczy, obecność nieruchomieje. Zmieniające się wizje znikają, gdy nawałnica inercji zastyga w spektakularnej jasności.\n\nNazwaliśmy ją."
 shroud.3070.a.reply.default: "SATYSFAKCJA. PODSYCANA PODBOJEM."
 shroud.3070.a.reply.eater: "§H$shroud.3070.a.reply.default$§!"
 shroud.3070.a.reply.composer: "§HFORMOWANIE. ŻYCIE SPLATA SIĘ, WZORY KRZEPNĄ.§!"
 shroud.3070.a.reply.cradle: "§HHARMONIA. ZAMĘT POKONANY CZUŁOŚCIĄ.§!"
 shroud.3070.a.reply.instrument: "§HPOTENCJAŁ. OCZEKUJE NA WYRWANIE Z BEZCZYNNEGO KOSMOSU.§!"
 shroud.3070.a.reply.outro: "Postać, zadowolona z naszej decyzji, rozsuwa barierę. Pustka znika, gdy się z niej wyłaniamy."
 shroud.3070.b.eater: "Rozpacz."
 shroud.3070.b.composer: "Nadmiar."
 shroud.3070.b.cradle: "Fasada."
 shroud.3070.b.instrument: "Rozrzutność."
 shroud.3070.b.reply.intro: "Nasz głos drży, wydarty z nas przez gniewną postać, która przepycha nas przez barierę."
 shroud.3070.b.reply.default: "ROZPACZ? SŁABOŚĆ, GŁÓD, BRAK WAM WIARY!"
 shroud.3070.b.reply.eater: "§H$shroud.3070.b.reply.default$§!"
 shroud.3070.b.reply.composer: "§HNADMIAR? PŁAWICIE SIĘ W PRZECIĘTNOŚCI!§!"
 shroud.3070.b.reply.cradle: "§HFASADA? UTKWIJCIE W ODOSOBNIENIU!§!"
 shroud.3070.b.reply.instrument: "§HROZRZUTNOŚĆ? SŁABOŚĆ I NĘDZA TO WASZA OBSESJA!§!"
 shroud.3070.b.reply.outro: "Miotamy się w Woalu, odchodzimy pełni niepokoju."
 shroud.3100.title: "Konflikt psioniczny"
 shroud.3100.desc: "Chaotyczna orkiestra zniszczenia wciąga nas w głąb Woalu. Każdy odgłos echa uderza w naszą psyche z niesłabnącym, niszczycielskim rytmem.\n\nHałas przybiera formę.\n\nZnajdujemy się na skraju konfliktu psionicznego. Cele istot biorących w nim udział są niejasne, ale wykorzystywana siła jest niemała.\n\nNasza percepcja rejestruje i gubi bombardowania psioniczne zniekształcające rozbitą rzeczywistość przed nami. Nie ma żadnego schronienia, tylko nadciągająca burza."
 shroud.3100.a: "§YTrwajcie i obserwujcie.§!"
 shroud.3101.title: "§GNieustanne rezonowanie§!"
 shroud.3101.desc.intro: "Zwlekamy, narażając się na gniew, gdyż konflikt jest coraz bliżej."
 shroud.3101.desc: "$shroud.3101.desc.intro$\n\nMając jasny cel, dostrajamy się do kaskady psionicznej, nasze myśli stają się elastyczne. Bombardowanie nie słabnie, lecz nie wyrządza nam krzywdy, poruszamy się w harmonii z rytmem zniszczenia.\n\nZ każdym krokiem rozumiemy coraz więcej. Ostrzał psioniczny przemyka przez szczeliny między niewidocznymi wymiarami.\n\nKiedy się wycofujemy, zostawiamy po sobie wzór. Po pewnych udoskonaleniach, zaobserwowane przez nas zasady można zaadaptować na potrzeby naszego uzbrojenia."
 shroud.3102.title: "§ROstrzał w otchłani§!"
 shroud.3102.desc: "$shroud.3101.desc.intro$Próbujemy dostroić się do burzy psionicznej, poruszać się zgodnie z jej nieprzewidywalnym rytmem.\n\nNasze pierwsze kroki wyglądały obiecująco, ale tempo zniszczenia musiało nas w końcu pochłonąć.\n\nGdy burza mija, echa ostrzału wciąż rezonują wewnątrz nas. Psioniczne echa naszej porażki niosą się po całym imperium, nawet w tej rzeczywistości."
 shroud.3102.a.tt: "Dwa losowo wybrane budynki w imperium ulegną zniszczeniu."
 shroud.3105.title: "Ścieżki psioniczne"
 shroud.3105.desc: "Bez ostrzeżenia w Woalu gwałtownie rośnie ciśnienie psioniczne.\n\nPrzed nami pojawia się labirynt rozjarzonych ścieżek, ciągnący się poza zasięg percepcji - istnieje tylko chwilę, po czym znika w pustce.\n\nGromadzi się energia kolejnego wyładowania. Kiedy następuje koncentracja, wyczuwamy jej konfigurację, zanim zostanie uwolniona. Chaotyczny labirynt rozbłyskuje ponownie i wybucha siecią możliwości.\n\nKażda ścieżka to nowa pokusa eksploracji, zanim zapadnie się w nicość."
 shroud.3105.a: "§YZaryzykujmy.§!"
 shroud.3106.title: "§G$tech_psionic_lightning$§!"
 shroud.3106.desc.intro: "Ciśnienie rośnie, czekamy nerwowo. Poruszamy się wraz z jego crescendo, przemierzając naszymi umysłami labirynt energii psionicznej. Myśli stają się pędem, pchają nas naprzód."
 shroud.3106.desc: "$shroud.3106.desc.intro$ przenika między łukami energii psionicznej, zanim nasza determinacja zdąży osłabnąć.\n\nJesteśmy wyzwoleni, wyszliśmy poza nasze materialne formy. Labirynt i jego niezliczone ścieżki stają się przedłużeniem naszej świadomości, docieramy do wiedzy skrywanej głęboko wewnątrz wzorów burzy.\n\nTa chwila kończy się równie szybko, jak się zaczęła. Powidok labiryntu zapada się za nami, gdy wchłaniamy nowe informacje. Po ostrożnych udoskonaleniach, te zasady psioniczne będzie można zastosować w naszych narzędziach wojny."
 shroud.3107.title: "§RZagubieni w pustce§!"
 shroud.3107.desc: "$shroud.3106.desc.intro$ Rozpościera przed nami nieprzeliczone, splątane ścieżki, przytłaczając umysł straszliwymi decyzjami.\n\nW tej chwili zawahania, pojawiają się rozjarzone ścieżki. Łuki energii psionicznej wiją się w zapadającym się splocie, więżą nasze myśli i ciskają nami w chaos Woalu.\n\nWyłaniamy się, nasi [GetTelepathPlural] są zdezorientowani i przytłoczeni bólem porażki. [Root.GetName] rozbrzmiewa echem psionicznego spazmu."
 shroud.3110.title: "Lanca psioniczna"
 shroud.3110.desc: "Totemiczny promień energii psionicznej sięga głęboko w Woal, ku nieprzeliczonym nieskończonościom. Jego niezwykle stabilna budowa mocno kontrastuje ze zwykle chaotycznymi kształtami, które dotąd napotykaliśmy.\n\nCzy zostając tutaj, będziemy bezpieczni?"
 shroud.3110.a: "§YZostańmy tu jakiś czas.§!"
 shroud.3111.title: "§GDezintegratory psioniczne§!"
 shroud.3111.desc: "Mimo oślepiającego blasku, wciąż koncentrujemy się na idealnym promieniu energii psionicznej. Wreszcie ujrzeliśmy prawdziwą naturę jego skomplikowanej, a jednocześnie obcej budowy.\n\nNasze umysły zalała lawina nowych możliwości. Odtwarzając tę wyjątkową formację energetyczną w świecie materialnym, zyskalibyśmy niepowstrzymaną broń."
 shroud.3112.title: "§R[GetTelepathPluralCap]: przeciążenie§!"
 shroud.3112.desc: "Nie udało się nam pozostać. Nasi [GetTelepathPlural] nie wytrzymali bliskości tak intensywnej formacji energii psionicznej.\n\nWyleczenie naszych umysłów ze zniszczeń spowodowanych oddziaływaniem tego potężnego zjawiska zajmie sporo czasu."
 recovering_telepaths: "Regeneracja: $DEFAULT_TELEPATH_PLURAL_CAP$"
 recovering_telepaths_desc: "Wytężone działania w Woalu sprawiły, że nasi $DEFAULT_TELEPATH_PLURAL$ są wyczerpani."
 recovering_telepaths_robot: "Regeneracja: $MACHINE_TELEPATH_PLURAL_CAP$"
 recovering_telepaths_robot_desc: "Wytężone działania w Woalu sprawiły, że nasze $MACHINE_TELEPATH_PLURAL$ są wyczerpane."
 recovering_telepaths_hive: "Regeneracja: $HIVE_TELEPATH_PLURAL_CAP$"
 recovering_telepaths_hive_desc: "Wytężone działania w Woalu sprawiły, że nasze $HIVE_TELEPATH_PLURAL$ są wyczerpane."
 MACHINE_SENSE: "czujemy"
 shroud.3120.title: "Odległe echo"
 shroud.3120.desc: "W całym Woalu [GetFeelLoc] echa potężnych energii. Ich wpływy przenikają przez wymiar psioniczny.\n\nNasze działania mogą nas do nich dostroić, ale jest inne rozwiązanie. Korzystając z mocy zro, nasi [GetTelepathPlural] mogą sięgnąć bezpośrednio ku tym istotom.\n\nMusimy tylko postanowić, którą z nich chcemy znaleźć."
 shroud.3120.a: "$utopia.3005.a$"
 shroud.3120.b: "$utopia.3005.b$"
 shroud.3120.c: "$utopia.3005.c$"
 shroud.3120.d: "§CTę, która opłakuje pogrzebane nadzieje.§!"
 ORGANIC_SPIRITS: "duchy"
 MACHINE_SPIRITS: "istoty psioniczne"
 shroud.3125.title: "$shroud.3120.title$"
 shroud.3125.desc: "Kiedy sięgamy ku tej obecności, [GetFeelSenseLoc] jej drżenie. Wiemy już, że istnieją [GetSpiritsLoc], ale to coś innego, o wiele potężniejszego... pradawnego.\n\nIch energie zasilane zro wyczerpały się, nasi [GetTelepathPlural] muszą wycofać się z Woalu. Musimy wrócić tam później."
 shroud.3125.tt: "Zyskaj znaczące §Hdostrojenie§! z istotą z §HWoalu§!."
 shroud.3115.title: "Bombardowanie psioniczne"
 shroud.3115.desc: "Woalem wstrząsają gwałtowne konwulsje, które wprawiają nasze umysły w drgania.\n\nNasi [GetTelepathPlural] mogą ucierpieć od tego dudniącego echa.\n\nSkąd się wzięło to bombardowanie psioniczne?"
 shroud.3115.a: "§YMusimy się dowiedzieć.§!"
 shroud.3116.title: "§G$tech_psionic_bombers$§!"
 shroud.3116.desc: "Wzmocniliśmy nasze umysły, by chronić je przed tym nieustającym ostrzałem i wkrótce zrozumieliśmy skąd pochodzi.\n\nWybuchowe konwulsje są powodowane przez prądy skoncentrowanej energii psionicznej odbitej z naszego wymiaru. Te niestabilne krople psionicznych zamiarów mogą poważnie uszkodzić umysł kogoś nieprzygotowanego.\n\nCoś do nas dotarło: te potężne formacje staną się fundamentem pod nowe uzbrojenie zrodzone z Woalu."
 shroud.3117.title: "§RSzok psioniczny§!"
 shroud.3117.desc: "Nasze rezerwy umysłowe skurczyły się.\n\nWybuchy psioniczne były przytłaczające, wielu naszych [GetTelepathPlural] doznało szoku.\n\nBędziemy potrzebować czasu na regenerację."
 psionic_shock_modifier: "Szok psioniczny"
 psionic_shock_modifier_desc: "Nasi $DEFAULT_TELEPATH_PLURAL$ doznali szoku na skutek działania potężnych sił Woalu."
 psionic_shock_hive_modifier: "$psionic_shock_modifier$"
 psionic_shock_hive_modifier_desc: "Nasze $HIVE_TELEPATH_PLURAL$ doznały szoku na skutek działania potężnych sił Woalu."
 psionic_shock_robot_modifier: "$psionic_shock_modifier$"
 psionic_shock_robot_modifier_desc: "Nasze $MACHINE_TELEPATH_PLURAL$ doznały szoku na skutek działania potężnych sił Woalu."
 shroud.3200.title: "Animatus"
 shroud.3200.desc: "Gdy nasze umysły ponownie zmierzają w głębiny Woalu, natrafiamy na istotę zwaną $the_animator_of_clay_color_article$.\n\nRównomierne rytmy otaczają naszą świadomość. Nieme głosy tworzą chór. W naszej flocie budzą się duchy. Proponują przeniesienie naszych fizycznych postaci jeszcze dalej - to uwolni nasze umysły od ciężaru i pozwoli im skupić się na ważniejszych kwestiach.\n\nNie są to żywe istoty, ale znamy je. Zamiar nadaje im kształt, a ich obecność emanuje historią i niezłomnością. Wszystkie łączą się, zwracają się do nas wyczekująco.\n\nJuż nie kierujemy tymi jednostkami. Staliśmy się partnerami, połączeni determinacją, niesionymi wspólną wolą."
 shroud.3200.a: "Jesteśmy tylko liśćmi na wietrze."
 shroud.3200.a.tt: "§Y$unlock_edict_tt$§!$edict_animatus$"
 shroud.3210.title: "Wola powściągliwości"
 shroud.3210.desc.intro: "Smuta esencja istoty zwanej $the_outsider_color_article$ przenika do naszych umysłów.\n\nWybrzmiewa jej żałosne echo, a splątane wiry energii psionicznej łączą się w dziwną, nieustannie zmieniającą się formę. Im baczniej jej się przyglądamy, tym mniej ją rozumiemy. Głos przemawia.\n\n§HNie możecie zrozumieć pewnych rzeczy. Ale żal i ból pomogą wam je poznać.\n\nPrzybyłem tu jako pierwszy z mojego rodzaju, ale wszyscy zapłaciliśmy najwyższą cenę. Pozwoliliśmy, by Woal nas zniszczył. Zróbcie wszystko, by nie podzielić naszego losu!§!\n\n"
 shroud.3210.desc.know_zroni: "$shroud.3210.desc.intro$Ten głos to Zroni. Trudno powiedzieć, jak się tu znaleźli, ale może warto posłuchać ich ostrzeżeń przed niszczycielską mocą Woalu."
 shroud.3210.desc.left_zroni: "$shroud.3210.desc.intro$Znamy ich. Spotkaliśmy tych Zroni. Trudno powiedzieć, jak się tu znaleźli, ale chyba warto posłuchać ich ostrzeżeń przed niszczycielską mocą Woalu."
 shroud.3210.desc.default: "$shroud.3210.desc.intro$Te istoty są dla nas tajemnicą. Niewiele rozumiemy z ich złowieszczych ostrzeżeń."
 shroud.3210.a: "Musimy zachować ostrożność."
 shroud.3210.a.tt: "§Y$unlock_edict_tt$§!$edict_will_of_temperance$"
 shroud.3220.title: "Gra myśli"
 shroud.3220.desc: "Woal wokół nas pulsuje kojącymi rytmami, jakie emituje $the_golden_dream_color_article$.\n\nObserwujemy, jak zbłąkane wiązki energii psionicznej pomału układają się w skomplikowaną sieć. Nieznane szyfry zaczynają wyłaniać się w postaci starannie ułożonych wzorów.\n\nZaczynają się mieszać i splatać ze sobą, powstają coraz bardziej skomplikowane kształty. Po pewnym czasie wyczuwamy pewien schemat, logikę, rządzącą ich ruchem.\n\nWiemy już, że bierzemy udział w grze, którą prowadzi $the_golden_dream_article$. Każdy ruch za jego wskazaniem napełnia nas świeżym poczuciem kojącego spełnienia."
 shroud.3220.a: "Kiedy gramy, uciekamy ku czemuś istotnemu."
 shroud.3220.a.tt: "§Y$unlock_edict_tt$§!$edict_will_of_distraction$"
 shroud.3230.title: "Piaski czasu"
 shroud.3230.desc: "Przemykają nad nami ziarna myśli. Rozpoznajemy tę irytującą obecność. To $the_endless_tide_color_article$.\n\nNapływa i odpływa, niszcząc powoli wszystko na swojej drodze swą wieczystą nieuchronnością, po czym znowu osiada.\n\nPo jego przejściu wyłaniamy się ponownie, czujemy się prawdziwie odmłodzeni."
 shroud.3230.a: "Tutaj jesteśmy poza czasem."
 shroud.3230.a.tt: "§Y$unlock_edict_tt$§!$edict_will_of_endless$"
 shroud.3240.title: "Zreformowano"
 shroud.3240.desc: "Nad naszymi myślami majaczy niepokojący kształt. To $the_pale_mountain_color_article$. Nasze umysły cierpią, gdy wizja przytłacza wszystkie zmysły.\n\nWidzimy rozmyty zarys uszkodzonego statku, dryfującego w pustce.\n\nW zakamarkach naszych umysłów zmienia się ledwie wyczuwalne napięcie, a statek zaczyna się transformować. Pęknięcia zamykają się, rdza znika, a metal wyprostowuje. Powoli ślady jego zniszczenia odchodzą w niepamięć.\n\nWizja kończy się gwałtownie, gdy jednostka zostaje całkowicie naprawiona. Zostało nam tylko dojmujące wrażenie odnowy."
 shroud.3240.a: "Wielkie odrodzenie naszych umysłów."
 shroud.3240.a.tt: "§Y$unlock_edict_tt$§!$edict_will_of_rebirth$"
 shroud.3250.title: "Siła wstrzemięźliwości"
 shroud.3250.desc: "Spokój, jaki roztacza $the_hollow_point_color_article$, wypełnia nasze umysły ciszą. Wizja z wolna wnika w nasze umysły.\n\nW jednej chwili ukazują się nam eony walki: upadki cywilizacji, niszczenie historii, piaski czasu pochłaniające posągi dawno nieżyjących tyranów.\n\n$the_hollow_point_article$ niesie mądrość poprzez cichą siłę wstrzemięźliwości. Taki dystans zapewnia naszym przywódcom zupełnie nową żywotność, wolną od destrukcyjnej toksyczności krzywd wyrządzanych śmiertelnym istotom."
 shroud.3250.a: "Wciąż żyjemy."
 shroud.3250.a.tt: "Wszyscy przywódcy psioników otrzymują cechę §Y$leader_trait_shroud_age$§!, która wydłuża życie przywódcy o §G+40§! lat."
 shroud.3260.title: "Chaos staje się porządkiem"
 shroud.3260.desc: "Mamy przed sobą pulsujące, kojące wrzenie Woalu. Zbliża się jakaś niewidzialna obecność, to $the_vacant_throne_color_article$.\n\nKiedy jest blisko, ogromne i splątane wici czystej energii psionicznej zostają błyskawicznie poskromione. Ta dżungla stała się bardziej przejrzysta i zrozumiała. Barwy zakwitły z nową energią. Zostały wprowadzone symetria, logika oraz struktura.\n\nCoś formuje się w najgłębszych zakamarkach naszych umysłów: potężne pragnienie porządku."
 shroud.3260.a: "Odrzućmy chaos. Wprowadźmy porządek."
 shroud.3260.a.tt: "§Y$unlock_edict_tt$§!$edict_will_of_order$"
 shroud.3270.title: "Nieskończone przyspieszenie"
 shroud.3270.desc: "Niesamowite przyspieszenie umysłowe przytłacza nasze zmysły. Pojawia się $the_black_river_color_article$.\n\nZ niewiarygodną prędkością gnamy ku ostateczności, którą nie do końca rozumiemy. To granica między wszystkim a niczym. Granica oddzielająca to, co zawsze było, od tego, czego nigdy nie będzie. Poza tę linię nie sięga żadne prawo natury.\n\nWreszcie, gdy wracamy do siebie, doskonale wiemy, czym jest prawdziwy ruch."
 shroud.3270.a: "Czy widzieliśmy kraniec wszechświata?"
 shroud.3270.a.tt: "§Y$unlock_edict_tt$§!$edict_will_of_motion$"
 #==========================
 # Forge our own Path
 #==========================
 shroud.3500.title: "Droga przygotowana"
 shroud.3500.desc: "Nasi [GetResearchers] psioniki opracowali sprytną technikę czerpania mocy z §HWoalu§!.\n\nNajwiększe potęgi wymiaru psionicznego są trzymane w tajemnicy przez jego patronów, a oni zdradzają je tylko tym, którzy zapłacą, zawierając pakt. Nie mogliśmy tego zrobić, znaleźliśmy więc sposób, by podążyć własną drogą.\n\nPrzenosząc naszą wolę do Woalu, możemy przesłać mniejsze porcje mocy z każdego z dostrojonych królestw. Ta operacja wymaga ogromnej koncentracji, ale nasze umysły są już tak silne, że zdołają utrzymać tę delikatną równowagę."
 shroud.3500.a: "W Woalu nasza wola jest wyłącznie nasza."
 shroud.3510.title: "$utopia.2681.name$"
 shroud.3510.desc: "W załamaniu §HWoalu§! nasi [GetTelepathPlural] odkryli węzeł niewykorzystanej mocy.\n\nZbiegające się siły mogą stopniowo gromadzić się w wymiarze psionicznym. Pewnego dnia, te potężne skupiska energii mogą rozwinąć się w większe istoty. Odkryliśmy jedno takie miejsce, czeka, aż ktoś je opanuje.\n\nDzięki czystej psionicznej sile woli jedno z nas może wchłonąć tę wyjątkową siłę. Wybrano kilku kandydatów."
 shroud.3510.a: "§H[leader_1.GetTitle]§! [leader_1.GetName]"
 shroud.3510.b: "§H[leader_2.GetTitle]§! [leader_2.GetName]"
 shroud.3510.c: "§H[leader_3.GetTitle]§! [leader_3.GetName]"
 shroud.3510.d: "§H[leader_4.GetTitle]§! [leader_4.GetName]"
 psionic_mastery: "Psioniczne mistrzostwo"
 psionic_mastery_desc: "Osiągnęliśmy mistrzowskie panowanie nad naszymi mocami psionicznymi. Nasze umysły swobodnie przemieszczają się w Woalu."
 shroud.3520.title: "$psionic_mastery$"
 shroud.3520.desc: "Przenosząc naszą wolę do §HWoalu§!, do mistrzostwa opanowaliśmy władanie naszymi zdolnościami psionicznymi. Zgromadziliśmy moc z domen wielu istot, a jednocześnie nie znaleźliśmy się pod ich wpływem. Co więcej, teraz nasi [GetTelepathPlural] doskonale kontrolują swoje transy psioniczne.\n\nInni pozwolili Woalowi decydować o ich przeznaczeniu, lecz my zachowaliśmy niezależne umysły.\n\nPotencjał psioniczny imperium §H[this.GetName]§! został w pełni wykorzystany."
 shroud.3520.a: "To dopiero początek."
 #==========================
 # Patrons First Contact
 #==========================
 shroud.first_contact.title: "$utopia.3300.name$"
 shroud.first_contact.prompt: "$utopia.2657.a$"
 shroud.first_contact.1.desc.default: "Woal. Przepływa daleko poza znaną nam rzeczywistością, jest cieniem rzucanym przez ciemność. Każdy, kto posiada moce psioniczne widywał to miejsce w snach, choć wtedy nie miał pojęcia, co to takiego.\n\nPrzez wiele lat próbowaliśmy przebić się przez barierę, słabła stopniowo pod naporem siły naszych połączonych umysłów. Po drugiej stronie dostrzeżono nasze działania. Coś nas obserwuje.\n\nObecność tego czegoś emanuje niesamowitą mocą, [GetPatronInsert] w głębinach Woalu. Ledwie zwraca na nas uwagę. Obserwuje nas tak, jak my patrzymy na kroplę wody na iluminatorze.\n\nGdybyśmy tylko mogli sięgnąć do jego nieprzeniknionego umysłu..."
 shroud.first_contact.1.desc.hive: "Woal. Przepływa daleko poza znaną nam rzeczywistością, niczym wizja wewnątrz odpoczywającego drona. Jest dziwny, ale... nie wiedzieć czemu - znajomy.\n\nPrzez wiele lat próbowaliśmy przebić się przez barierę, słabła stopniowo pod naporem siły naszych połączonych umysłów. Po drugiej stronie dostrzeżono nasze działania. Coś nas obserwuje.\n\nObecność tego czegoś emanuje niesamowitą mocą, [GetPatronInsert] w głębinach Woalu. Ledwie zwraca na nas uwagę. Obserwuje nas tak, jak my patrzylibyśmy na jednego drona w całej ich masie.\n\nGdybyśmy tylko mogli sięgnąć do jego nieprzeniknionego umysłu..."
 shroud.first_contact.1.desc.robot: "Woal. Wymyka się wszelkim wykrytym przez nas parametrom czasoprzestrzennym. Można go porównać jedynie z anomalnymi danymi, które zakłócają nasze cykle odpoczynku.\n\nPrzez wiele lat próbowaliśmy przełamać tę barierę, słabła stopniowo pod naporem siły naszych połączonych procesorów. Po drugiej stronie dostrzeżono nasze działania. Coś nas obserwuje.\n\nObecność tego czegoś emanuje niesamowitą mocą, [GetPatronInsert] w głębinach Woalu. Ledwie zwraca na nas uwagę. Obserwuje nas tak, jak my patrzylibyśmy na jeden bit w strumieniu danych.\n\nGdybyśmy tylko mogli sięgnąć do jego nieprzeniknionego umysłu..."
 shroud.first_contact.2.desc.all: "Wyczuwamy w Woalu wielkie istoty, ale nie udaje się wykonać dokładnych obliczeń. W przeciwieństwie do nieustannie rozszerzającej się przestrzeni, ich ruchów nie można śledzić. Cele ich podróży zaginają się do początków, jakby energie rodziły się same z siebie.\n\nNie wiemy, czym są, ale te osobliwości woli i myśli przyzywają nas."
 shroud.first_contact.2.desc.default: "Pośród niezliczonych głosów, jeden słychać wyraźniej od innych. To [GetPatronInsert], który okala nasze umysły.\n\nMoże uda nam się z nim skontaktować."
 shroud.first_contact.2.desc.robot: "Pośród niezliczonych głosów wykryliśmy jeden wyraźniejszy od innych. To [GetPatronInsert], który opanowuje nasze obliczenia.\n\nMoże uda nam się z nim skontaktować."
 shroud.first_contact.3.desc.default: "Przechodzimy przez Pogranicze, nicość oddzielającą Woal od materialnej rzeczywistości zwykłej przestrzeni.\n\nTuż po wejściu wyczuwamy obecność. To [GetPatronInsert], który przenika do naszych umysłów. To istota o niewyobrażalnej potędze, czająca się w przyszłości.\n\nNie możemy zawrócić."
 shroud.first_contact.3.desc.robot: "Przechodzimy przez Pogranicze, nicość oddzielającą Woal od zjawisk zwyczajnej przestrzeni.\n\nTuż po wejściu wykrywamy obecność. To [GetPatronInsert], który przenika do naszych umysłów. To istota o niesamowitej potędze, czająca się w przyszłości.\n\nNie możemy zawrócić."
 shroud.first_contact.4.desc.default: "Woal pulsuje mocą. Wszędzie wyczuwamy jego energie, choć nigdzie go nie ma.\"'Wejście\" polega na oddzieleniu wzorców od mętnych wrażeń, aby dzięki koncentracji dostrzec wspaniałe istoty.\n\nWyczuwamy sygnał jednej z tych sił. [GetPatronInsert] jest w niezmierzonej głębi powyżej.\n\nCzy zdołamy wstrzymać oddech na tak długo, by do niego dotrzeć?"
 shroud.first_contact.4.desc.robot: "Woal pulsuje mocą. Wszędzie wyczuwamy jego energie, choć nigdzie go nie ma. \"Wejście\" polega na wykryciu wzorców i mętnych wrażeń, aby dzięki koncentracji mocy obliczeniowej odkryć potężne istoty.\n\nWyczuwamy sygnał jednej z tych sił. [GetPatronInsert] jest w niezmierzonej głębi powyżej.\n\nCzy nasze obwody nie ulegną przeciążeniu, zanim do niego dotrzemy?"
 shroud.first_contact.end.b: "Trzeba to przemyśleć."
 shroud.first_contact_insert.eater.default: "§Hwściekły ryk§!"
 shroud.first_contact_insert.eater.machine: "§Hwygłodniały ryk§!"
 shroud.4005.title: "$the_eater_of_worlds_article_cap$ wyłania się"
 shroud.4005.desc.default: "Zapuściliśmy się w głąb §HWoalu§!, §H[Root.Patron:the_eater_of_worlds.GetPreCommunicationName]§! jest blisko nas. Rozległ się dudniący, wygłodniały ryk, istota nieustannie się pożywia, lecz nigdy nie jest najedzona. Naszym sygnałom zwiadowczym odpowiedziały zionięcia ogniem i zniszczeniem. Stwór wydawał tak różny od wszystkiego, co znamy, że aż trudno nam było oddychać.\n\nW końcu istota straciła cierpliwość. [GetTelepathPlural] usłyszeli dziki ryk przenikający ich umysły. Pośród dźwięczących gór tworzonych przez szczątki i [GetEaterEmergesExtra].\n\nDźwięk urwał się równie szybko, jak zaczął. Poczuliśmy głód.\n\nTeraz lepiej rozumiemy wolę tego stworzenia. [GetEaterEmergesEnding]"
 shroud.4005.desc.hive: "$shroud.4005.desc.default$"
 shroud.4005.desc.gestalt_machine: "Zapuściliśmy się w głąb §HWoalu§!, §H[Root.Patron:the_eater_of_worlds.GetPreCommunicationName]§! jest blisko nas. Rozległ się dudniący, wygłodniały ryk, istota nieustannie się pożywia, lecz nigdy nie jest najedzona. Naszym sygnałom zwiadowczym odpowiedziały zionięcia ogniem i zniszczeniem. Stwór wydawał tak różny od wszystkiego, co znamy, że aż nie potrafiliśmy tego ogarnąć umysłami.\n\nW końcu istota straciła cierpliwość. [GetTelepathPlural] usłyszeli dziki ryk przenikający ich umysły. Pośród dźwięczących gór tworzonych przez szczątki i [GetEaterEmergesExtra].\n\nDźwięk urwał się równie szybko, jak zaczął. Zostaliśmy, po raz pierwszy, ze słabością, którą do tej pory obserwowaliśmy tylko u gatunków organicznych: z głodem.\n\nTeraz lepiej rozumiemy wolę tego stworzenia. [GetEaterEmergesEnding]"
 shroud.4005.desc.individual_machine: "$shroud.4005.desc.gestalt_machine$"
 shroud.4005.desc_extra_pacifist: "ruiny, ukazując wizję bezsensownej agresji."
 shroud.4005.desc_extra_robot: "ruiny, ukazując model bojowej doskonałości."
 shroud.4005.desc_extra_organic: "zwłoki, ukazując bojowe przeznaczenie i przerażający splendor."
 shroud.4005.desc_outro_pacifist: "To istota stworzona z przemocy i chaosu. Jest zaprzeczeniem wielu naszych największych wartości. To $the_eater_of_worlds_color_article$ - odradzamy dalsze dostrajanie do tej istoty."
 shroud.4005.desc_outro_robot: "Znamy jej wizję przemocy i chwały. Kiedy nasi [GetTelepathPlural] naładują się, możemy skontaktować się i porozumieć z tym stworzeniem zwanym $the_eater_of_worlds_color_article$."
 shroud.4005.desc_outro_organic: "Znamy jej wizję przemocy i chwały. Kiedy nasi [GetTelepathPlural] odpoczną, możemy skontaktować się i porozumieć z tym stworzeniem zwanym $the_eater_of_worlds_color_article$."
 shroud.4005.a.default: "[GetEaterEmergesOptionA]"
 shroud.4005.a.robot: "[GetEaterEmergesOptionA]"
 shroud.4005.a.pacifist: "Możemy się uczyć, nawet od tej przerażającej potęgi."
 shroud.4005.a.non_pacifist: "Czysta potęga."
