 shroud.4040.title: "$utopia.3300.name$"
 shroud.4040.desc: "Znamy liczne głosy z §HWoalu§!, ich echa są wszechobecne i liczne. Po niedawnych transach, nasi [GetTelepathPlural] donoszą o obecności wyjątkowej istoty, to §Hnić wielorakości§! znajdująca się w samym centrum Woalu.\n\nUżywając dostatecznej ilości energii psionicznej, możemy spróbować podążyć śladem psionicznym tego potężnego stworzenia, które [GetTelepathPlural] nazywają §H[Root.Patron:whisperers_in_the_void.GetPreCommunicationName]§!."
 shroud.4040.a: "$utopia.2657.a$"
 shroud.4045.title: "$whisperers_in_the_void_article_cap$"
 shroud.4045.desc.intro: "Podczas próby porozumienia, istota znana jako §H[Root.Patron:whisperers_in_the_void.GetPreCommunicationName]§! wciągnęła nas w najgłębsze warstwy Woalu. W tym wewnętrznym wymiarze Woal obraca się w bezruchu. Odbicia każdej myśli, z każdego cyklu, zbierają się w pierwotną siłę. Słyszymy głosy tych, którzy głosu nie mają, niesione w wiecznej kipieli: to $whisperers_in_the_void_color_article$.\n\nOtacza nas zgrzytliwa kakofonia. Staramy się usłyszeć ich niezliczone wiadomości, aż wreszcie pojedyncza myśl przesącza się i odbierają ją nasi [GetTelepathPlural].\n\n§HSłuchanie to poświęcenie.§!\n\nŻeby zaczerpnąć tej wielkiej mocy, musimy pomóc istocie w zajęciu"
 shroud.4045.desc.covenant: "$shroud.4045.desc.intro$ domeny [GetCovenantPatronColor]. Taki czyn spowodowałby zastąpienie obecności naszego patrona i zniszczył ustanowiony pakt.$shroud.4045.desc.outro$"
 shroud.4045.desc.no_covenant: "$shroud.4045.desc.intro$ domeny innego patrona, co spowodowałoby całkowite zastąpienie znanej nam obecności.$shroud.4045.desc.outro$"
 shroud.4045.desc.outro: "\n\nTo może mieć poważne skutki."
 shroud.4045.a: "Wpuśćmy szepczących."
 shroud.4045.a.covenant.tt: "§RZakończy nasz pakt z: [GetCovenantPatronColor].§!\nCałkowicie usuwa domenę [GetCovenantPatronColor], a w jej miejsce pojawiają się $whisperers_in_the_void_color_article$.\n§RTo będzie miało konsekwencje.§!"
 shroud.4045.a.no_covenant.tt: "Wybierzemy domenę $major_patron$, którą zastąpią $whisperers_in_the_void_color_article$.\n§RTo będzie miało konsekwencje.§!"
 shroud.4045.b: "Lepiej nie zaburzajmy równowagi Woalu."
 shroud.4046.title: "Zmiany w Woalu"
 shroud.4046.desc.1: "Tuż po dokonaniu wyboru, nasi [GetTelepathPlural] wyłonili się z §HWoalu§! wśród gwałtownych"
 shroud.4046.desc.2: "Ich umysły pływały w morzu ech niezliczonych głosów.\n\nNasz wybór nieodwracalnie zmienił sposób, w jaki postrzegamy królestwo psioniczne. Gdy $whisperers_in_the_void_color_article$ przesączają się do naszych umysłów, [GetCovenantPatronColor] wywołuje w nas inne odczucia niż dotychczas. Nie mamy już dostępu do tej domeny.\n\nPowoli zaczynamy rozumieć wolę Szepczących. Wyczuwamy ich wizję nieograniczonej wiedzy. Kiedy nasi [GetTelepathPlural]"
 shroud.4046.desc.3: "możemy ponownie porozumieć się z tą potężną istotą."
 shroud.4046.desc.robot: "$shroud.4046.desc.1$ budzi się. $shroud.4046.desc.2$ odzyskał siły, $shroud.4046.desc.3$"
 shroud.4046.desc.organic: "$shroud.4046.desc.1$ aktywuje się. $shroud.4046.desc.2$ naładowany, $shroud.4046.desc.3$"
 shroud.whispers_in_the_shroud.title: "Szepty w Woalu"
 shroud.whispers_in_the_shroud.a: "$utopia.2657.a$"
 minor_patron_instrument_cradle_intro: "Znajdujemy się pomiędzy domenami istot $the_instrument_of_desire_article$ i $the_cradle_of_souls_article$."
 minor_patron_cradle_composer_intro: "Znajdujemy się pomiędzy domenami istot $the_cradle_of_souls_article$ i $the_composer_of_strands_article$."
 minor_patron_composer_eater_intro: "Znajdujemy się pomiędzy domenami istot $the_composer_of_strands_article$ i $the_eater_of_worlds_article$."
 minor_patron_eater_instrument_intro: "Znajdujemy się pomiędzy domenami istot $the_eater_of_worlds_article$ i $the_instrument_of_desire_article$."
 minor_patron_default_intro: "Znajdujemy się pomiędzy domenami potężnych istot z Woalu."
 shroud.4050.desc: "[This.GetMinorPatronCradleComposerIntro]\n\nOdkryliśmy, że pośród menażerii pozbawionych życia konstruktów jest §H$code_name_animator$§!. Wola tego stworzenia nadaje kształt gęstym energiom i tworzy z nich nowe, ciekawe formy.\n\nPrzeszkodziliśmy mu, zbliża się do nas, rozpraszając nieprzejrzystą mgłę Woalu. Chce nam coś dać.\n\nCo się stanie, jeśli spróbujemy to wziąć?"
 shroud.4055.title: "$the_animator_of_clay_article_cap$ wyłania się"
 shroud.4055.desc: "Gdy zanurzyliśmy nasze umysły w niespokojnych energiach Woalu, nasze [GetSpeciesBodyPlural] niespodziewanie zaczęły drgać. §H$code_name_animator$§! błyskawicznie przejmuje nad nami kontrolę. Prowadzi nas, byśmy obserwowali.\n\nWymowny półmrok osłabł i odsłonił gestykulującą postać. Jej kończyny zostały gwałtownie ściągnięte przez widmowe struny, najpierw w jedną, potem w drugą stronę, po czym więzy rozpłynęły się w przestrzeni. Postać upadła.\n\nPowoli wróciła do życia. Wstała, kończyna po kończynie, i wróciła do hipnotycznego tańca."
 shroud.4055.desc.know_animator: "Wtedy dotarło do nas, że już spotkaliśmy tę istotę. $the_animator_of_clay_color_article_cap$ bawił się doskonale. Gdziekolwiek budzi się coś nieożywionego, a tępa materia zyskuje duszę, można na niego natrafić."
 shroud.4055.a: "Marionetka tańczy uwolniona ze sznurków."
 shroud.4060.desc: "[This.GetMinorPatronCradleComposerIntro].\n\nCzujemy, że nie jesteśmy sami. §H$code_name_outsider$§! wdziera się w nasze umysły, uspokaja otaczającą nas burzę energii psionicznej.\n\nW naszej zbiorowej jaźni pojawia się głębokie uczucie żalu i tęsknoty. Widzimy obrazy znajomych układów słonecznych sprzed tysięcy lat.\n\nCzymkolwiek jest ta istota, prawdopodobnie dobrze zna naszą galaktykę. Czy kiedyś była jej częścią?"
 shroud.4065.title: "$the_outsider_article_cap$ wyłania się"
 shroud.4065.desc.intro: "Odległa moc zwana §H$code_name_outsider$§! poraziła nasze umysły cierpieniem pochodzącym z głębi §HWoalu§!. Nic nie powiedziała, ale niewątpliwie przekazała nam ostrzeżenie:\n\n§HUważajcie na siebie w tych domenach. Nie rozumiecie, z jakimi mocami igracie. Jesteście krok od zniszczenia...§!"
 shroud.4065.desc.outro_default: "Cokolwiek to oznacza, wiemy już, czym jest $the_outsider_color_article$. Dopiero się przekonamy, jak splatają się nasze losy."
 shroud.4065.desc.outro_know_zroni: "Ta istota zna naszą galaktykę. Ma w sobie charakterystyczny ślad cywilizacji Zroni, na którą kiedyś natrafiliśmy. Jak to możliwe?\n\nCokolwiek to oznacza, wiemy już, czym jest $the_outsider_color_article$. Dopiero się przekonamy, jak splatają się nasze losy."
 shroud.4065.desc.outro_left_zroni: "Rozpoznaliśmy tę istotę. To Dalekowidząca, którą spotkaliśmy po drugiej stronie §Hgwiezdnej szczeliny§!. Czy spotkał ją właśnie taki los? Czy teraz to $the_outsider_color_article$?"
 shroud.4065.a.default: "Jakiej grozy doświadczyła?"
 shroud.4065.a.know_zroni: "Czy Zroni nadal żyją?"
 shroud.4065.a.left_zroni: "Obyśmy uniknęli takiego losu."
 shroud.4070.desc: "[This.GetMinorPatronComposerEaterIntro].\n\nKotłująca się masa myśli oblepiła nasze umysły. Spłynął na nas dokuczliwy ciężar i zmienił nasze postrzeganie czasu. Każde ziarno myśli zgrzyta, ocierając się o teksturę tej nowej domeny.\n\nKiedy to uczucie mija, §H$code_name_tide$§! odpełza i zostawia po sobie trwałe znaki.\n\nTe ślady majaczą przed nami, zapraszają, abyśmy po nich ruszyli."
 shroud.4075.title: "$the_endless_tide_article_cap$ wyłania się"
 shroud.4075.desc: "Istota §H$code_name_tide$§! wyłoniła się z §HWoalu§!. Bezkształtna, a przy tym ogromna, jej obecność rozciąga się poza zasięg naszej percepcji.\n\nChropawy szept przepływa przez nas gwałtownie i ukazuje dawno zapomniane opowieści. Widzimy imperia, o których nikt już nie pamięta, zmielone na proch przez nieustanny upływ czasu. Każde ziarno, które przez nas przechodzi, to jedno wspomnienie.\n\nWewnątrz tego bezkresnego archiwum wyłaniają się wzory, cykle ambicji i zniszczenia, triumfu i rozkładu. W tej otchłani kryje się mądrość.\n\nIstota $the_endless_tide_color_article_cap$ rozciąga się poza czas, krusząc niewiedzę i zostawiając tylko to, co posiada wolę dalszego trwania."
 shroud.4075.a: "Teraz ta mądrość należy do nas."
 shroud.4080.desc: "[This.GetMinorPatronComposerEaterIntro].\n\nWaga naszych działań wciąga nas coraz głębiej w przytłaczający cień gargantuicznej postaci.\n\nZ jej poszarzałych szczytów w nasze umysły wdziera się nieugięte spojrzenie. Trudno nam pojąć, jak wielkie rozmiary ma §H$code_name_mountain$§!.\n\nJednak wzywa nas najwyższy z wierzchołków, musimy się na niego wspiąć."
 shroud.4085.title: "$the_pale_mountain_article_cap$ wyłania się"
 shroud.4085.desc: "Wspinając się na przyprawiające o zawrót głowy wysokości §HWoalu§!, dotarliśmy na z pozoru nieosiągalny szczyt. §H$code_name_mountain$§! poddaje nas próbie, podobnie jak tych, którzy zjawili się tu przed nami.\n\nPotężne mauzoleum zapomnianych imperiów wyśpiewuje nam odbijający się echem refren zapomnianej historii. Wszystkie warstwy porażek i chybionych ambicji stały się fundamentami tego, co niebawem nadejdzie.\n\nJednak nie jest to nieruchomy grób, to tygiel. Cykl zniszczenia i odnowy przekuwa dawne porażki w podwaliny przyszłych zwycięstw. Destrukcja to nie koniec, lecz nowy początek.\n\n$the_pale_mountain_color_article_cap$ wznosi się w naszych umysłach."
 shroud.4085.a: "Góra urośnie."
 shroud.4090.desc: "[This.GetMinorPatronInstrumentCradleIntro].\n\nKojący ciężar spowalnia gonitwę naszych myśli do leniwego, niespiesznego tempa. Nieznane wcześniej napięcia znikają, zastępuje je pełzający, ogromny spokój.\n\nZanurzając się głębiej w jego cudowne objęcia, widzimy, że zbliża się §H$code_name_dream$§!. Jego przytłaczająca natura otula nas i wyszeptuje obietnice niezmiernego zadowolenia.\n\nKusi nas swą aurą leniwej przyjemności."
 shroud.4095.title: "$the_golden_dream_article_cap$ wyłania się"
 shroud.4095.desc: "Gdy postanowiliśmy odprężyć się w enklawie nieruchomego spokoju wewnątrz §HWoalu§!, zaczęły przyciągać nas skrzące się korytarze tworzące §H$code_name_dream$§!.\n\nJedwabiste pokusy przemykały przez nasze umysły, ukazując bogaty kalejdoskop przepychu. Leniwa niedbałość omal nie sparaliżowała naszych myśli ciężarem jej obfitego brzemienia.\n\n$the_golden_dream_color_article_cap$ proponuje nam niepojęte luksusy."
 shroud.4095.a: "Budzi się sen."
 shroud.4100.desc: "[This.GetMinorPatronInstrumentCradleIntro].\n\nChaotyczna kipiel Woalu zmienia się w szalejący wir energii psionicznej. Nagle pojawiają się niezliczone fale, które łączą się, okiełznane przez jakąś niewidzialną siłę. Wszystko się uspokaja i zwija w nowe, łagodne kształty.\n\nPrzyglądając się temu, uświadamiamy sobie, że to §H$code_name_point$§! synchronizuje te ruchy i zamienia chaos w porządek.\n\nPrzyciąga nas ten spokój."
 shroud.4105.title: "$the_hollow_point_article_cap$ wyłania się"
 shroud.4105.desc: "Nasi [GetTelepathPlural] agresywnie sięgnęli w niespokojny zamęt Woalu, lecz nic to nie dało. Dopiero gdy porzucili swe wysiłki, poczuli, że §H$code_name_point$§! bierze ich w objęcia.\n\nW naszych umysłach pojawiły się obrazy przerażającej serii konfliktów wypełnionych furią i chaosem.\n\nPośród tego wszystkiego wyczuliśmy uważną i nieskończoną obecność. To $the_hollow_point_color_article$. Cierpliwie czeka, aż wreszcie skończą się nieustanne galaktyczne spory."
 shroud.4105.desc.outro_homicidal: "Wbrew naszym najprymitywniejszym impulsom, nasze umysły zmierzyły się z ciekawym sposobem myślenia."
 shroud.4105.a.default: "Cierpliwość przetrwa konflikt."
 shroud.4105.a.homicidal: "Tęskny sen... znamy nasz prawdziwy cel."
 shroud.4110.desc: "[This.GetMinorPatronEaterInstrumentIntro].\n\nZ chaotycznego hałasu rodzi się przytłaczająca ciemność. Czujemy, że nasze zamiary są sprawdzane, badane, oceniane.\n\nGłęboko w nas kiełkuje silne pragnienie porządku, niepodważalnego i niezmiennego. §H$code_name_throne$§! osądza nasze zamiary.\n\nJego wzrok prześliznął się po nas, ciemność zniknęła. Zaraźliwa skrupulatność mówi nam, że mamy się podporządkować."
 shroud.4115.title: "$the_vacant_throne_article_cap$ wyłania się"
 shroud.4115.desc: "Widząc §H$code_name_throne$§!, padliśmy na kolana.\n\nNasze umysły zostały zbadane z chłodną obojętnością bezkompromisowej władzy, musieliśmy pozostać w miejscu, w którym nas osądzano.\n\n$the_vacant_throne_color_article$ wytwarza wokół siebie przytłaczającą próżnię, bezlitosną, a przy tym nie przysparzającą cierpień. Oczekuje jedynie porządku i pewności, wprowadza je tam, gdzie ich brakuje.\n\nTeraz niesiemy ten ciężar."
 shroud.4115.a: "Osąd trwa nieustannie."
 shroud.4120.desc: "[This.GetMinorPatronEaterInstrumentIntro].\n\nNagle ogarnia nas poczucie przyspieszenia, a nasza percepcja zostaje zalana falami niezrozumiałych informacji. Zostajemy rzuceni ku bezkresnym horyzontom.\n\nWraz z nami porusza się jakaś istota. Ta §H$code_name_river$§! jest widoczna przez chwilę, po czym jej szybkość sprawia, że umyka poza granice naszego pojmowania.\n\nMusimy za nią podążyć."
 shroud.4125.title: "$the_black_river_article_cap$ wyłania się"
 shroud.4125.desc: "Dopiero gdy zostaliśmy w §HWoalu§! siłą rzuceni poza nasze wygodne ograniczenia, możemy wreszcie dotrzeć tam, gdzie czeka na nas §H$code_name_river$§!.\n\nOgarnęło nas poczucie ruchu w wielu kierunkach i z nielogiczną szybkością, przeczącą wszelkiemu zwyczajnemu pojmowaniu. Odnieśliśmy wrażenie, że w krótkiej chwili przemierzyliśmy ogromną odległość.\n\nW końcu rozumiemy, czym jest $the_black_river_color_article$ i jej niekończąca się podróż. Bezmiar galaktyki stoi przed nami otworem."
 shroud.4125.a: "Szybkość w najczystszej postaci."
 shroud.4135.title: "$end_of_the_cycle_article_cap$"
 shroud.4135.desc: "Bez ostrzeżenie zostajemy rzuceni w Woal. Przyczajona obecność atakuje nasze umysły.\n\nTo $end_of_the_cycle_color_article$, który zawsze na nas czekał. Nasi [GetTelepathPlural] odzywają się nagle równocześnie, tuzin głosów w idealnym chórze: §R\"TO JESZCZE NIE WASZ CZAS\"§! Przerwa. §R\"ALE MÓGŁBY NIM BYĆ\"§!.\n\nNie mówią nic więcej, ale została złożona jakaś propozycja - przynajmniej tyle rozumiemy. Niezmierzona potęga, wiedza i bogactwo są na wyciągnięcie ręki.\n\n§RJeśli tylko wywołamy Koniec.§!"
 shroud.4135.a: "$utopia.3308.a$"
 shroud.4135.a.tt: "$end_of_the_cycle_color_article$ zastępuje domeny wszystkich znanych patronów.\nOtrzymamy przynajmniej 50 lat, by jego §H$end_aura$§! wchłonęła galaktykę. Jeżeli nam się uda, gra dobiegnie końca.\n$covenant.cycle.tooltip$$shroud.8450.a.tech_tooltip$\n$shroud.4135.psionic_components_insight$\n\nPrzywróć porozumienia reszty patronów\n$eotc_opinion_modifier_tooltip$"
 shroud.4135.b: "Opuśćmy Woal i spróbujmy zapomnieć."
 shroud.4135.b.forging_our_own_path: "Wybraliśmy drogę. Podążamy nią sami."
 shroud.4135.psionic_components_insight: "Wszystkie ['concept_psionic_components'|e] zyskują postęp technologiczny: §G+10%§!"
 concept_psionic_components: "Elementy psioniczne"
 concept_psionic_components_desc: "$tech_psionic_bombers$\n$tech_psionic_lightning$\n$tech_psionic_disruptor$\n$tech_zro_launcher$\n$tech_psionic_shield$\n$tech_precognition_interface$\n$tech_psi_jump_drives$"
 triggered_opinion_eotc_situation_stage1: "Przywołanie Końca"
 shroud.4140.title: "Wszystko albo nic"
 shroud.4140.desc: "$end_of_the_cycle_color_article$ zdecyduje o naszym losie. Gdziekolwiek rozwija się aura, to samo dzieje się z populacją. Doszliśmy do prostego wniosku: wszystko co przeszkadza aurze, przeszkadza też imperium [This.GetName] - dlatego należy usunąć każdą taką przeszkodę.\n\nJeśli zechcemy, możemy odrzucić ograniczenia nałożone na nasze cele wojskowe i bezlitośnie podbić naszych wrogów. Nic nie zatrzyma Końca w drodze do całkowitej dominacji."
 shroud.4140.a: "Niech wypełni się przeznaczenie."
 shroud.4140.a.tooltip: "Uzyskanie dostępu do §Hcasus belli§! ['concept_total_war', wojny totalnej]\n$eotc_opinion_modifier_2_tooltip$"
 triggered_opinion_eotc_situation_stage2: "Zwiastuni Końca"
 shroud.4145.title: "Anihilacja"
 shroud.4145.desc_1.common_1: "W miarę jak §R$end_aura$§! zalewa galaktykę, wyczuwamy rosnący opór."
 shroud.4145.desc_1.common_2: "Nic to, nie będziemy czekać, aż inni zaakceptują $end_of_the_cycle_color_article$."
 shroud.4145.desc_1.default: "$shroud.4145.desc_1.common_1$ Nasi odlegli sąsiedzi błyskawicznie zwrócili się przeciwko nam. $shroud.4145.desc_1.common_2$"
 shroud.4145.desc_1.homicidal: "$shroud.4145.desc_1.common_1$ Antypatia naszych wrogów staje się jeszcze bardziej zajadła. $shroud.4145.desc_1.common_2$"
 shroud.4145.desc_2: "Natchnieni wolą naszego patrona, opracowaliśmy nowe metody zużywania energii i materii do zasilania aury. Esencję wszechświata można poświęcić, by przyspieszyć Koniec."
 shroud.4145.a: "Musimy podjąć wszelkie niezbędne działania."
 shroud.4145.a.tooltip: "$eotc_opinion_modifier_3_tooltip$\nOdblokowuje edykty:\n$t$- ['edict:annihilation_of_matter', $edict_annihilation_of_matter$]\n$t$- ['edict:annihilation_of_energy', $edict_annihilation_of_energy$][GetDimensionalCollapseEdictGain]"
 shroud.4145.dimensional_collapse: "\n$t$- ['edict:dimensional_collapse', $edict_dimensional_collapse$]"
 triggered_opinion_eotc_situation_stage3: "$triggered_opinion_eotc_situation_stage2$"
 shroud.4150.title: "Nadejście Końca"
 shroud.4150.desc: "Nasz patron mówi cicho. Wyczuwamy nieuchronność końca cyklu, a odnowiona energia przetacza się przez imperium [This.GetName]. Zostajemy błyskawicznie wzmocnieni.\n\nJeśli chcemy wypełnić wolę Końca, połączona energia wszystkich przedstawicieli gatunku [This.GetSpeciesAdj&genitive] musi być spożytkowana w jednym celu. Trzeba pokazać moc naszego patrona i zakończyć rozprzestrzenianie jego aury aż po najdalsze zakątki galaktyki."
 shroud.4150.a: "Nadszedł nasz czas."
