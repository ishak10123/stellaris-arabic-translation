 # Shroud
 THE_SHROUD_TITLE: "Woal"
 SHROUD_HEADER_INSIGHT_TT: "$SHROUD_HEADER_TT$\n\nPoznaj ich patronów dzięki zgromadzeniu odpowiedniej ilości §Hdostrojenia§!, aby zyskać ich przychylność."
 SHROUD_HEADER_TT: "§HWoal§! zamieszkują przeróżne istoty."
 SHROUD_HEADER_DESC: "Woal jest podzielony na nieustannie zmieniający się krąg domen pojęciowych, a każdą z nich zamieszkuje potężna istota. Mówi się, że nasze działania w świecie materialnym mogą wpłynąć na naszą pozycję w innym."
