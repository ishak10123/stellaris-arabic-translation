 civic_tankbound: "Do zbiornika"
 civic_tankbound_desc: "Członkowie tego społeczeństwa żyją w anabiozie, zanurzeni w zbiorniku wypełnionym specjalnymi płynami biologicznymi. Istoty te nie mogą istnieć bez sprzętu wspomagającego i nie są w stanie wykonywać żadnej pracy fizycznej."
 civic_tankbound_effects_base: "Dodaje cechę ['trait:trait_tankbound'].\n$job_farmer_plural_with_icon$, $job_miner_plural_with_icon$ i $job_technician_plural_with_icon$ są w pełni §Yzautomatyzowani§!.\nMiejsca pracy: ['concept_colonist', $job_colonist$] to $SPECIALISTS$.\n£district£ Dzielnice §Ymiejskie§! mają dodatkowe miejsca pracy: §Y$job_production_overseer_with_icon$§!."
