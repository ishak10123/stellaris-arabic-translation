 # Experimentation Chambers
 building_experimentation_chambers_1: "Centrum eksperymentalne"
 building_experimentation_chambers_1_desc: "Ściśle tajny obiekt, w którym recydywiści poddawani są eksperymentom. Składa się w większości z cel więziennych i laboratoriów badawczych."
 building_experimentation_chambers_2: "Kompleks eksperymentalny"
 building_experimentation_chambers_2_desc: "Kampus wypełniony ściśle tajną technologią i więzieniami, gdzie [Owner.GetIndividualNamePlural] z kartoteką przestępczą stanowią przedmioty eksperymentów, nad którymi czuwają [Owner.GetResearchers] o najlepszych dokonaniach w imperium."
 building_experimentation_chambers_3: "Węzeł eksperymentalny"
 building_experimentation_chambers_3_desc: "Sieć najściślej strzeżonych technologii i zakładów karnych. [Owner.GetResearchers] - sama elita - przeprowadzają pionierskie eksperymenty, których przedmiotami są [Owner.GetIndividualNamePlural] z imperialnego półświatka."
 # Lifecrypt
 # Lifecrypt (Normal)
 building_lifecrypt_1: "Wieża ssąca"
 building_lifecrypt_1_desc: "Te olbrzymie urządzenia zdolne są do pozyskiwania nadmiaru energii z przeznaczonych specjalnie do tego populacji przebywających nieopodal. Przydzielone jednostki mają na sobie wyspecjalizowany sprzęt kierujący ich energię witalną do centralnego przewodu, z którego może trafiać ona do osób o wyższym statusie."
 building_lifecrypt_2: "Syfon dusz"
 building_lifecrypt_2_desc: "Choć nazwa może sugerować inaczej, działanie syfonu dusz opiera się na praktycznej nauce. Są skalibrowane konkretnie w celu pozyskiwania energii z żywych istot poprzez fizyczną kotwę. Są zdolne do pozyskiwania ogromnych ilości energii metabolicznej z organizmów, nie zagrażając przy tym ich życiu."
 building_lifecrypt_3: "Przewód esencjonalny"
 building_lifecrypt_3_desc: "Granice przewodów esencjonalnych muszą być wyraźnie oznaczane, gdyż przebywanie w ich pobliżu może być śmiertelnie niebezpieczne dla osób bez odpowiedniego wyposażenia. Przydzielone osoby są szkolone w regulacji własnego metabolizmu tak, aby nie przekazać zbyt dużo własnej energii naraz."
 # Lifecrypt (Machine)
 building_lifecrypt_machine_1: "Akumulator syfonowy"
 building_lifecrypt_machine_1_desc: "Te olbrzymie urządzenia zdolne są do pozyskiwania nadmiaru energii obliczeniowej z przeznaczonych specjalnie do tego dronów przebywających nieopodal. Przydzielone jednostki mają na sobie wyspecjalizowany sprzęt kierujący ich energię elektryczną do centralnego przewodu, z którego może trafiać ona do osób o wyższym przeznaczeniu."
 building_lifecrypt_machine_2: "Kompleks akumulatorowy"
 building_lifecrypt_machine_2_desc: "Te urządzenia skalibrowano z myślą o pozyskiwaniu energii z dronów za pomocą fizycznych kotw. Są zdolne do wykorzystywania ogromnych ilości mocy obliczeniowej bez wywoływania krytycznych błędów."
 building_lifecrypt_machine_3: "Węzeł akumulatorowy"
 building_lifecrypt_machine_3_desc: "Granice węzłów akumulatorowych muszą być wyraźnie oznaczane, gdyż przebywanie w ich pobliżu może być niszczycielskie dla jednostek bez odpowiedniej izolacji."
 # Lifecrypt (Hive Mind)
 building_lifecrypt_hive_mind_1: "Wieża ssąca"
 building_lifecrypt_hive_mind_1_desc: "Te olbrzymie urządzenia zdolne są do pozyskiwania nadmiaru energii z przeznaczonych specjalnie do tego dronów przebywających nieopodal. Przydzielone jednostki mają na sobie wyspecjalizowany sprzęt kierujący ich energię witalną do centralnego przewodu, z którego może trafiać ona do wyższych kast."
 building_lifecrypt_hive_mind_2: "Syfon dusz"
 building_lifecrypt_hive_mind_2_desc: "Choć nazwa może sugerować inaczej, działanie syfonu dusz opiera się na praktycznej nauce. Są skalibrowane konkretnie w celu pozyskiwania energii z dronów poprzez fizyczną kotwę. Są zdolne do pozyskiwania ogromnych ilości energii metabolicznej z organizmów, nie zagrażając przy tym ich życiu."
 building_lifecrypt_hive_mind_3: "Przewód esencjonalny"
 building_lifecrypt_hive_mind_3_desc: "Granice przewodów esencjonalnych muszą być wyraźnie oznaczane, gdyż przebywanie w ich pobliżu może być śmiertelnie niebezpieczne dla dronów bez odpowiedniego wyposażenia. Przydzieleni robotnicy są szkoleni w regulacji własnego metabolizmu tak, aby nie przekazać zbyt dużo własnej energii naraz."
 # Lifecrypt (Corporate)
 building_lifecrypt_corporate_1: "Synergetyczna kwatera główna"
 building_lifecrypt_corporate_1_desc: "Te olbrzymie urządzenia zdolne są do pozyskiwania nadmiaru energii z przeznaczonych specjalnie do tego stażystów przebywających nieopodal. Przydzielone jednostki mają na sobie wyspecjalizowany sprzęt kierujący ich energię witalną do centralnego przewodu, z którego może trafiać ona do osób na wyższych stanowiskach."
 building_lifecrypt_corporate_2: "Administracja synergetyczna"
 building_lifecrypt_corporate_2_desc: "Skalibrowane konkretnie w celu pozyskiwania energii z żywych istot poprzez fizyczną kotwę budynki administracji synergetycznej są zdolne do pozyskiwania ogromnych ilości energii metabolicznej ze stażystów, nie zagrażając przy tym zbytnio ich życiu."
 building_lifecrypt_corporate_3: "Węzeł synergetyczny"
 building_lifecrypt_corporate_3_desc: "Granice węzłów synergetycznych muszą być wyraźnie oznaczane, gdyż przebywanie w ich pobliżu może być śmiertelnie niebezpieczne dla stażystów bez odpowiedniego wyposażenia. Przydzielone osoby są szkolone w zaawansowanych technikach synergii, aby zapewnić sobie przetrwanie procesu."
 # Psionic Suppressor
 building_psionic_suppressor: "Tłumik psioniczny"
 building_psionic_suppressor_desc: "Kompleks ten obsługuje zestaw dalekosiężnych tłumików psionicznych, wskutek działania których $PSIONIC_AURA_PLURAL$ w układzie ulegają rozproszeniu i nie rozszerzają swoich wpływów."
 building_psionic_suppressor_tt: "Codzienna redukcja §Hintensywności§!, jakiej podlega w tym układzie §Y$PSIONIC_AURA$§!: $@building_psionic_suppressor_decrease|0$"
 # Materiality Engine
 building_materiality_engine: "Silnik materialności"
 building_materiality_engine_plural: "Silniki materialności"
 building_materiality_engine_desc: "Psioniczna energia Woalu łączy ze sobą wszystkie punkty fizycznej galaktyki. $building_materiality_engine$ wykorzystuje te powiązania, umożliwiając sięganie poprzez wymiary i materializację cennych komponentów i zasobów."
 building_materiality_engine_tt: "Aktywuje §Yprojekt specjalny§! pozwalający na pozyskanie technologii ['concept_component', elementu] psionicznego z §HWoalu§!. Kiedy projekt zostanie ukończony, zwiększy wydajność tego budynku. §H$building_materiality_engine_plural$§! będą mogły też zostać zbudowane w większej liczbie."
 biology_unit_is_observator_tt: "$t$£job_calculator_biologist£ $job_calculator_biologist_plural$ stają się: $job_observator_drone_plural_with_icon$"
