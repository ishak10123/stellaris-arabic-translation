 ENDBRINGERS_PSIONICS_TRADITION_PROJECT_TOOLTIP: "Żeby ukończyć, przyjmij tradycję \"§H$tradition_psionics_shroud$§!\"."
 shroud.8200.title: "Domena szaleństwa"
 shroud.8200.desc: "Badania w niedawno odkrytej dziedzinie psioniki potwierdziły istnienie nieznanych dotąd wymiarów rzeczywistości, do których bramami mogą być nasze umysły. Za tą zasłoną znajduje się domena chaosu, którego jeszcze nie potrafimy zrozumieć.\n\nGdzieś z głębin dobiega §RGłos§!. Nie obiecuje zbawienia, lecz nowy początek. Posiadanie niepojętej mocy oznaczałoby porzucenie wszystkiego, czym byliśmy i wybranie losu wyrytego w osnowie szaleństwa.\n\n§R\"JUŻ CZAS\".§!"
 shroud.8200.a: "Co też uczyniliśmy?"
 shroud.8200.a.tt: "Odblokowuje drzewko tradycji: §H$tradition_psionics_shroud$§!."
 chamber_of_silence_negative_effects_reduction: "Każda ['building:building_chamber_of_silence'] zmniejsza negatywne efekty o §G$@chamber_of_silence_effect_mult|0%$§!"
 endbringers_madness_1: "Szaleństwo"
 endbringers_madness_1_desc: "Nasze imperium jest napędzane jednym celem: pogonią za §RGłosem§!. Nasze umysły nie spoczną, dopóki nie znajdziemy rozwiązania."
 endbringers_madness_1_tt: "$chamber_of_silence_negative_effects_reduction$"
 endbringers_madness_2: "$endbringers_madness_1$"
 endbringers_madness_2_desc: "Nasze imperium coraz bardziej zbliża się do §RGłosu§!. Napędzające nas impulsy osłabły."
 endbringers_madness_2_tt: "$endbringers_madness_1_tt$"
 endbringers_madness_3: "$endbringers_madness_1$"
 endbringers_madness_3_desc: "Nasze imperium już prawie słyszy §RGłos§!. Niebawem zrozumiemy."
 endbringers_madness_3_tt: "$endbringers_madness_1_tt$"
