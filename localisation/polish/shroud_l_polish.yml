 shroud.first_contact_insert.composer: "§Hdźwięczny akord§!"
 shroud.4025.title: "$the_composer_of_strands_article_cap$ wyłania się"
 shroud.4025.desc.default: "§H[Root.Patron:the_composer_of_strands.GetPreCommunicationName]§! wydziela zapach, za którym podążyliśmy - wciągnął nas jeszcze głębiej w §HWoal§!. Zostawił dla nas znaki, tu jakiś obraz, tam melodię. Zapraszał nas coraz bliżej, ale poruszaliśmy się bardzo wolno.\n\nW końcu dotarliśmy do celu. Powitała nas panoplia wizji: pełne życia układy słoneczne, kolosalne zniekształcenia postaci [Root.GetSpeciesAdj&genitive]. Przemieniając się w jego objęciach, zagubiliśmy się w plątaninie gryzących projektów.\n\nChwyciliśmy wątki i wici i powiązaliśmy ich końce. Przeróżne znaki ułożyły się we wzory. Nasze energie wyczerpały się, pławiliśmy się w majestacie form i figur. Obecność wycofała się w ciszę.\n\nZamiary istoty stały się dla nas jaśniejsze. Widzieliśmy jej wizje niepohamowanego wzrostu. Kiedy nasi [GetTelepathPlural] odpoczną, możemy skontaktować się i porozumieć z tym stworzeniem zwanym $the_composer_of_strands_color_article$."
 shroud.4025.desc.hive: "$shroud.4025.desc.default$"
 shroud.4025.desc.gestalt_machine: "§H[Root.Patron:the_composer_of_strands.GetPreCommunicationName]§! zostawia ślady molekularne, po których podążyliśmy - wciągnął nas jeszcze głębiej w §HWoal§!. Zostawił dla nas znaki, tu jakiś obraz, tam melodię. Zapraszał nas coraz bliżej, ale poruszaliśmy się bardzo wolno.\n\nW końcu dotarliśmy do celu. Powitała nas panoplia wizji: pełne życia układy słoneczne, kolosalne zniekształcenia postaci [Root.GetSpeciesAdj&genitive]. Przemieniając się w jego objęciach, zagubiliśmy się w plątaninie niekompatybilnych projektów.\n\nChwyciliśmy wątki i wici i powiązaliśmy ich końce. Przeróżne znaki ułożyły się we wzory. Nasze energie wyczerpały się, przetworzyliśmy ogromną porcję danych. Obecność wycofała się w ciszę.\n\nZamiary istoty stały się dla nas jaśniejsze. Widzieliśmy jej wizje niepohamowanego wzrostu. Kiedy nasi [GetTelepathPlural] naładują się, możemy skontaktować się i porozumieć z tym stworzeniem zwanym $the_composer_of_strands_color_article$."
 shroud.4025.desc.individual_machine: "$shroud.4025.desc.gestalt_machine$"
 shroud.4025.a.default: "Jej moc jest wspaniała."
 shroud.4025.a.robot: "Jej moc jest nieprzewidywalna."
 shroud.4025.b.default: "$shroud.first_contact.end.b$"
 shroud.4025.b.robot: "$shroud.first_contact.end.b$"
