 shroud.6020.name: "$UNKNOWN_LONG$"
 shroud.6020.desc: "§HGdy podjęliśmy próbę nawiązania kontaktu, załoga naszego mostka poczuła gwałtowne bóle głowy...§!"
 shroud.6030.name: "[exiled_country.GetName]"
 shroud.6030.desc: "§HMimo wielu prób, imperium [exiled_country.GetName] nie reaguje na nasze próby nawiązania łączności.§!"
 shroud.6050.name: "Dziwne korelacje"
 shroud.6050.desc: "Nasz §H$building_ancient_ward_1$§! do osłabiania psioniki przekazuje nieregularne odczyty. Zwykle oznacza to wzrost aktywności psionicznej na świecie [Root.GetHomeWorldName], ale nie znaleźliśmy tam dowodów takiej demoralizacji.\n\nOdpowiedź może znajdować się poza naszymi granicami. Obrazowanie długodystansowe ujawniło niedawny wybuch dziwnych fal energetycznych w układzie §H[exiled_system_border.GetName]§!, co koreluje z chaotycznymi wskazaniami, jakie przekazuje $building_ancient_ward_1$."
 shroud.6050.a: "Musimy zbadać Woal."
 shroud.shared_text_psy_symptoms: "chaos emocjonalny; obezwładniające napięcie umysłowe; powracające wizje niewyobrażalnej grozy"
 shroud.shared_text_psi_radiation: "Te zjawiska bardzo przypominają doświadczenia odnotowane przez naszych przodków. Prawdopodobnie nazywali to zjawisko promieniowaniem psi, szczególnie niszczycielskiej formy emisji energii."
 shroud.shared_text_ship_malfunction: "Systemy floty są też trapione poważnymi awariami, które skutecznie neutralizują większość zwykłych zdolności."
 shroud.6100.name: "Niebezpieczna energia"
 shroud.6100.desc.no_border_aura: "W niedawno odkrytym układzie §H[from.GetName]§! rozwija się niepokojąca sytuacja. Załoga jednostki [root.GetName] ma szeroki wachlarz objawów psychologicznych: $shroud.shared_text_psy_symptoms$. Ponadto, systemy ich floty również ulegają dziwnym, chaotycznym awariom.\n\n$shroud.shared_text_psi_radiation$ Poza obszarem ochrony, którą zapewnia §H$building_ancient_ward_1$§! na świecie §H[owner.GetHomeWorldName]§!, po raz pierwszy doświadczamy infekcji umysłu, przed którą ostrzegali nas nasi przodkowie.\n\nPo skalibrowaniu naszych skanerów dalekiego zasięgu, by wykrywały tę wyjątkową postać energii, ustaliliśmy, że źródłem tych groźnych emisji jest pobliski układ §H[exiled_center_system.GetName]§!. $shroud.6100.desc.end$"
 shroud.6100.desc.border_aura: "Załoga jednostki [root.GetName] jest w niebezpieczeństwie.\n\nZnalazłszy się pod działaniem ekstremalnie wysokiego natężenia promieniowania psionicznego w układzie §H[from.GetName]§!, jej członkowie zaczęli odczuwać jeszcze silniejsze napięcie psychiczne niż dotychczas. $shroud.shared_text_ship_malfunction$\n\nSkanery dalekiego zasięgu wykryły podwyższone poziomy promieniowania w pobliskim układzie §H[exiled_center_system.GetName]§!. $shroud.6100.desc.end$"
 shroud.6100.desc.end: "Wysłanie naszych jednostek głębiej nie jest zalecane, dopóki nie zbadamy dokładniej efektów tego promieniowania."
 shroud.6100.tt: "Przygotujcie się do rozpoczęcia procesu: §Y$first_contact$§!."
 shroud.6110.name: "Obecność w układzie [This.System.GetName]"
 shroud.6110.desc: "Zdumiewające, w układzie §H[This.System.GetName]§! znajdują się prawdopodobnie duże obiekty, które być może zostały zbudowane przez inteligentne istoty. Możemy dowiedzieć się więcej o ich twórcach, których nazwaliśmy §H[This.ContactCountry.GetName]§!, próbując nawiązać bezpośrednią łączność z bezpiecznej odległości.\n\nWszystkie organizmy żywe w tym układzie są w wielkim niebezpieczeństwie z uwagi na wykryte przez nas wysokie poziomy promieniowania psionicznego."
 fcsum_exiled_1: "Natrafiliśmy na dowody, że w układzie §H[This.System.GetName]§! istnieje obca inteligencja."
 shroud.6115.name: "Ograniczone postępy"
 shroud.6115.desc: "Dalsze badania potwierdziły, że obiekty w układzie §H[This.System.GetName]§! to statki kosmiczne obcych, jednak jeszcze nie nawiązaliśmy kontaktu z kimkolwiek znajdującym się na pokładach tych jednostek.\n\nCo niepokojące, poseł [exiled_envoy.GetName] informuje, że [exiled_envoy.GetHisHer] zespół zaczął wykazywać objawy parapsychologiczne, w tym niewyjaśnione wizje dziwnych istot przebywających w układzie [This.System.GetName]. Mimo tych obaw, nasz poseł nie zamierza przerywać realizacji zadania."
 shroud.6115.a: "Przyłóżcie się do tego."
 fcsum_exiled_2: "Jeszcze nie nawiązaliśmy kontaktu z: §H[This.ContactCountry.GetName]§!. Nasz poseł zameldował o kłopotach swojego zespołu."
 shroud.6120.name: "Misja przerwana"
 shroud.6120.desc: "Po wielu miesiącach milczenia, otrzymaliśmy komunikat od: [exiled_envoy.GetName]. Poseł, zwykle rozsądny i bezpośredni, tym razem przekazał dziwny, mętny raport, zawierający chaotyczne opisy dziwnych obrazów - to prawdopodobnie gmatwanina snów oraz halucynacji. Nikt z ekipy posła nie brzmiał bardziej zrozumiale.\n\nWszyscy zostali odsunięci od pełnienia obowiązków, a misja została wstrzymana na czas nieokreślony. Czymkolwiek jest obecność w układzie §H[This.System.GetName]§!, nie mamy w tej chwili możliwości jej bezpiecznego zbadania."
 fcsum_exiled_3: "Po traumatycznej misji nasz zespół wrócił do domu przed nawiązaniem kontaktu z: §H[This.ContactCountry.GetName]§!."
 shroud.6125.desc: "Zawieszeni nad zmąconym prądem. §H[Root.Capital.GetName]§!, a może...?\n\n§H...wzywa...§!\n\nPowierzchnia otwiera się. Cuchnący wyziew bucha z bezkresnej głębi.\n\n§H...odpowiedź...nic...§!\n\nNieustannie. Dławiące.\n\nTo straszne."
 MESSAGE_FIRST_CONTACT_ABORTED_EXILED_DESC: "Nasza procedura \"$first_contact$\" z imperium $COUNTRY|H$ została przerwana, w wyniku decyzji administracyjnej."
 shroud.shared_text_aura_spread: "Pobliska \"infekcja\" psioniczna rozszerzyła się na układ §H[exiled_system_border.GetName]§!.\n\nChoć §H$building_ancient_ward_1$§! zapewniała ochronę, to wtargnięcie sprawiło, że populacja świata §H[Root.GetHomeWorldName]§! wykazuje łagodne objawy wskazujące na zatrucie promieniowaniem psionicznym. Prognozy sugerują, że ta choroba umysłu może niebawem przenieść się do układu §H[Root.home_planet.System.GetName]§!, gdzie jeszcze bardziej zagrozi naszemu światu macierzystemu."
 shroud.shared_text_aura_study: "Mimo ryzyka, najlepszym sposobem na znalezienie lepszej ochrony jest zbadanie tego zjawiska bliżej jego źródła."
 shroud.6200.name: "Promieniowanie psioniczne na świecie §H[Root.GetHomeWorldName]§!"
 shroud.6200.desc.no_visit: "Na świecie §H[Root.GetHomeWorldName]§! rozwija się niepokojąca sytuacja. Jego populacja ma szeroki wachlarz objawów psychologicznych: $shroud.shared_text_psy_symptoms$.\n\n$shroud.shared_text_psi_radiation$ Poza obszarem ochrony, którą zapewnia §H$building_ancient_ward_1$§!, po raz pierwszy doświadczamy infekcji umysłu, przed którą ostrzegali nas nasi przodkowie.\n\nPo skalibrowaniu naszych skanerów dalekiego zasięgu, by wykrywały tę wyjątkową postać energii, ustaliliśmy, że te groźne emisje rozchodzą się spoza układu §H[exiled_system_border.GetName]§!. $shroud.shared_text_aura_study$"
 shroud.6200.desc.visit_no_ship: "$shroud.shared_text_aura_spread$\n\n$shroud.shared_text_aura_study$"
 shroud.6200.desc.visit_and_ship: "$shroud.shared_text_aura_spread$\n\nOd czasu znalezienia się pod działaniem ekstremalnie wysokiego natężenia promieniowania psionicznego załoga jednostki §H[event_target:ship_in_border.GetName]§! w układzie [exiled_system_border.GetName] odczuwa jeszcze silniejsze napięcie psychiczne niż dotychczas. $shroud.shared_text_ship_malfunction$\n\n$shroud.shared_text_aura_study$"
 shroud.6200.a: "Ustalmy, jak zatrzymać tę infekcję."
 PSI_RADIATION_PROJECT: "Promieniowanie psioniczne"
 PSI_RADIATION_PROJECT_DESC: "Natężenie promieniowania psionicznego w układzie §H[exiled_system_border.GetName]§! gwałtownie wzrosła, czego efekty są odczuwalne na świecie §H[Owner.GetHomeWorldName]§!. Musimy zbadać z bliska to nasilające się zjawisko, zanim jeszcze bardziej zagrozi naszej populacji."
 shroud.6205.name: "$PSIONIC_AURA_PLURAL$"
 shroud.6205.desc.start: "Nasi badacze bardzo ucierpieli na skutek działania trującego promieniowania psionicznego w układzie §H[exiled_system_border.GetName]§!, ale ich misja przyniosła ważne ustalenia.\n\nNazwaliśmy to niepokojące zjawisko §H\"$PSIONIC_AURA$\"§! - to ogromne nagromadzenie niszczycielskiej energii, która zakłóca nie tylko działanie naszych umysłów, ale także naszej technologii. Energia rozniosła się też na układ §H[exiled_center_system.GetName]§!, gdzie energie psioniczne zyskały tak duże natężenie, że rozprzestrzeniły się na inne układy słoneczne."
 shroud.6205.desc.aura_home: "$shroud.6205.desc.start$\n\nEnergia dotarła już do układu §H[Root.home_planet.System.GetName]§!, gdzie dokonała wielkiego spustoszenia. $shroud.6205.desc.end$"
 shroud.6205.desc.no_aura_home: "$shroud.6205.desc.start$\n\nJeżeli dotrze do naszego układu §H[Root.home_planet.System.GetName]§!, skutki mogą okazać się niszczycielskie. $shroud.6205.desc.end$"
 shroud.6205.desc.end: "§H$building_ancient_ward_1$§! na świecie §H[Root.GetHomeWorldName]§! zapewnia tylko ograniczoną ochronę."
 shroud.6205.a: "$building_ancient_ward_1$ wymaga wzmocnienia."
 PSIONIC_AURA_RESISTANCE_PROJECT: "$PSIONIC_AURA$: opór"
 PSIONIC_AURA_RESISTANCE_PROJECT_DESC: "§H$building_ancient_ward_1$§! zbudowana przez naszych przodków na świecie §H[Owner.GetHomeWorldName]§! miała chronić nas przed promieniowaniem psionicznym. §H$PSIONIC_AURA_PLURAL$§! mogą ją przeciążyć. Korzystając ze zdobytej dotąd wiedzy, prawdopodobnie możemy zwiększyć jej właściwości."
 shroud.6210.name: "Wzmocnienie psioniczne"
 shroud.6210.desc: "Nasi niestrudzeni badacze opracowali metodę, dzięki której §H$building_ancient_ward_1$§! na świece §H[Root.GetHomeWorldName]§! stanie się silniejsza. Rozbudowując jej tłumiki psioniczne, zwiększymy ochronę tak, że obejmie ona nie tylko planetę, ale cały układ §H[Root.home_planet.System.GetName]§!.\n\nTe badania stały się katalizatorem dalszych badań nad tą zapomnianą technologią. Wiemy, że powiązanie promieniowania psionicznego z umysłem [Root.GetSpeciesAdj&genitive] jest obustronne: te emisje nie tylko wpływają na nasz stan psychiczny, ale nasze stany psychiczne oddziałują na natężenie promieniowania psionicznego. Wygląda na to, że nasz odwieczny zakaz posługiwania się psioniką ma jednak podstawy naukowe."
 shroud.6210.a: "To fascynujące. I niepokojące."
 shroud.6210.a.tt: "$BEGINS_EVENT_CHAIN$ §Y$ancient_ward_upgrade_chain_title$§!"
 ancient_ward_upgrade_chain_title: "$building_ancient_ward_2$"
 ancient_ward_upgrade_chain_desc: "§H$building_ancient_ward_1$§! na świecie §H[Owner.GetHomeWorldName]§! osiągnęła limit możliwości działania. Żeby uporać się z pobliskim zagrożeniem psionicznym, trzeba jeszcze bardziej zwiększyć jej potencjał. Ta nowa §H$building_ancient_ward_2$§! powinna skutecznie ochronić naszą populację przed zarazą, jaką są §H$PSIONIC_AURA_PLURAL$§!."
 ancient_ward_upgraded: "Ulepszono budynek"
 shroud.6215.name: "Ukończono: $building_ancient_ward_2$"
 shroud.6215.desc.aura_home: "Nasza §H$building_ancient_ward_2$§! jest gotowa, zatem promieniowanie psioniczne w układzie §H[Root.home_planet.System.GetName]§! spadło do względnie bezpiecznego poziomu. Populacja świata §H[Root.GetHomeWorldName]§! stopniowo wraca do zdrowia."
 shroud.6215.desc.no_aura_home: "Nasza §H$building_ancient_ward_2$§! jest gotowa, zatem promieniowanie psioniczne na świecie §H[Root.GetHomeWorldName]§! spadło do względnie bezpiecznego poziomu. Populacja stopniowo wraca do zdrowia."
 shroud.6215.desc.end: "Mimo wszystko ta §H$PSIONIC_AURA$§! - a być może również inne - nadal zatruwa zakątki galaktyki. Nasi naukowcy przypuszczają, że $building_ancient_ward_2$ może stać się fundamentem do stworzenia potężniejszego narzędzia, jakim jest §H\"$SHROUD_SEAL$\"§!. Te potężne budowle powinny tłumić aury w całych gromadach gwiazd. Jeśli taka $SHROUD_SEAL$ zostanie zbudowana w układzie §H[exiled_system_border.GetName]§!, będzie to bardzo ważny krok ku zapanowaniu nad psionicznym zagrożeniem."
 shroud.6215.a: "Warto zająć się tymi badaniami."
 build_shroud_seal_poi_desc: "Po opracowaniu technologii §H$tech_psionic_suppression$§!, $constructor$ pozwoli nam stworzyć §H$SHROUD_SEAL$§! w studni grawitacyjnej gwiazdy. Stłumi ona §H$PSIONIC_AURA_PLURAL$§! w całym układzie słonecznym i sąsiednich układach dostępnych poprzez hiperlinie."
 shroud_seal_construction_chain_title: "$SHROUD_SEAL$: budowa"
 shroud_seal_construction_chain_desc: "Nasi naukowcy przypuszczają, że mogliby stworzyć bardziej zaawansowaną technologię §H$tech_psionic_suppression$§!, której działanie stłumi §H$PSIONIC_AURA_PLURAL$§! w całych gromadach gwiazd.\n\nDzięki tej technologii powstanie §H\"$SHROUD_SEAL$\"§!. Budowa tak potężnego urządzenia w układzie §H[exiled_system_border.GetName]§! byłaby bardzo ważnym krokiem ku zapanowaniu nad psionicznym zagrożeniem."
 tech_psionic_suppression_researched: "Zbadano: $tech_psionic_suppression$"
 shroud_seal_built: "Zbudowano: $SHROUD_SEAL$"
 shroud_6216_poi: "[exiled_system_border.GetName]"
 shroud_6216_poi_desc: "$build_shroud_seal_poi_desc$"
 shroud.6220.name: "Ekstremalne promieniowanie"
 shroud.6220.desc: "Znalazłszy się pod działaniem ekstremalnie wysokiego natężenia promieniowania psionicznego w układzie §H[exiled_system_border.GetName]§!, załoga jednostki §H[Root.GetName]§! zaczęła odczuwać jeszcze silniejsze napięcie psychiczne niż dotychczas. $shroud.shared_text_ship_malfunction$"
 shroud.6225.name: "Promieniowanie w układzie §H[Root.home_planet.System.GetName]§!"
 shroud.6225.desc.shared: "Negatywne skutki zatrucia promieniowaniem psionicznym są już widoczne w populacji świata §H[Root.GetHomeWorldName]§!, ponadto znacznie spadła sprawność naszych okrętów."
 shroud.6225.desc.know_aura: "§H$PSIONIC_AURA$§! rozprzestrzeniła się na układ §H[Root.home_planet.System.GetName]§!. $shroud.6225.desc.shared$\n\n§H$building_ancient_ward_1$§! wymaga pilnego wzmocnienia."
 shroud.6225.desc.no_know_aura: "Zaraza psioniczna rozprzestrzeniła się na układ §H[Root.home_planet.System.GetName]§!. $shroud.6225.desc.shared$\n\nMusimy jak najszybciej zrozumieć to skażenie."
 shroud.6225.a: "Nie traćmy czasu."
 shroud.6225.a.know_aura.tt: "§H$PSIONIC_AURA$§! imperium §H[exiled_country.GetName]§! ma następujące skutki:\n$effect_exiled_aura$"
 shroud.6225.a.no_know_aura.tt: "To zjawisko psioniczne ma następujące skutki:\n$effect_exiled_aura$"
 effect_exiled_aura: "- $MOD_SHIP_FIRE_RATE_MULT$: §R-125%§!\n- $MOD_SHIP_SHIELD_MULT$: §R-200%§!\n- $MOD_SHIP_EVASION_MULT$: §R-100%§!\n- $mod_planet_jobs_produces_mult$: §R-30%§!\n- $mod_planet_pops_upkeep_mult$: §R+100%§!\n- $MOD_PLANET_BUILDING_TIME_MULT$: §R+100%§!"
 shroud.6231.name: "Utracenie świata §H[root.GetHomeWorldName]§!"
 shroud.6231.desc: "Straciliśmy kontrolę nad naszym światem macierzystym (§H[root.GetHomeWorldName]§!). Jest on głównym magazynem naszej wiedzy i ośrodkiem wszystkich przedsięwzięć naszego społeczeństwa, więc jeśli go nie odzyskamy, nie będziemy mogli kontynuować zwalczania psioniki."
 shroud.6231.a: "Musimy niezwłocznie odzyskać kontrolę nad tym światem."
 shroud_6231_poi: "[root.GetHomeWorldName]"
 shroud_6231_poi_desc: "Musimy niezwłocznie odzyskać kontrolę nad światem §H[root.GetHomeWorldName]§!."
 shroud_reclaim_homeworld_chain_title: "Odzyskanie świata §H[root.GetHomeWorldName]§!"
 shroud_reclaim_homeworld_chain_desc: "Straciliśmy kontrolę nad naszym światem macierzystym (§H[root.GetHomeWorldName]§!). Jest on głównym magazynem naszej wiedzy i ośrodkiem wszystkich przedsięwzięć naszego społeczeństwa, więc jeśli go nie odzyskamy, nie będziemy mogli kontynuować zwalczania psioniki."
 homeworld_reclaimed: "Odzyskano świat macierzysty"
 shroud.6241.name: "Odzyskano świat §H[root.GetHomeWorldName]§!"
 shroud.6241.desc: "Odzyskaliśmy kontrolę nad naszym światem macierzystym (§H[root.GetHomeWorldName]§!). Imperium [root.GetName] może z pełną siłą wrócić do zwalczania psioniki."
 shroud.6241.a: "$EXCELLENT$"
 shroud.6300.name: "Cienie Woalu"
 shroud.6300.desc: "Nasi naukowcy zakończyli prace nad zaawansowaną technologią §H$tech_psionic_suppression$§!. Teraz możemy w dowolnej z naszych kolonii powielać efekty, które generuje $building_ancient_ward_2$, wystarczy zbudować tam $building_psionic_suppressor$.\n\nJeśli jednak §H$PSIONIC_AURA_PLURAL$§! mają nie rozprzestrzeniać się w innych układach, musi powstać potężniejsze urządzenie nazywane §H$SHROUD_SEAL$§!. $shroud.shared_text_shroud_seal$\n\nTe badania potwierdziły też pewną niepokojącą teorię: niematerialny wymiar znany jako §H\"Woa\"§!, wypełniony energią psioniczną i opisywany w dawnych tekstach okultystycznych, rzeczywiście istnieje. Teoria zakłada, że aktywność kognitywna świadomych istot może wywołać przepływ energii z Woalu do obserwowalnej rzeczywistości. To właśnie ten proces sprawia, że pojawiają się $PSIONIC_AURA_PLURAL$.\n\nTo znaczy, że nie mierzymy się jedynie z beznamiętnymi siłami wszechświata, ale może z zaplanowanymi działaniami, których celu nie znamy."
 shroud.6300.a: "Zatem §HWoal§! naprawdę istnieje...?"
 shroud.6500.name: "Niespodziewana transmisja"
 shroud.6500.desc: "Odebraliśmy niespodziewaną transmisję z poza układu §H[exiled_system_border.GetName]§!. Nie wiemy, jak do tego doszło, ale §H[exiled_country.GetName]§! doskonale posługuje się naszym językiem oraz systemami łączności."
 shroud.shared_screen_figure: "§HPostać na ekranie wypowiada się ze stałym, hipnotycznym rytmem, przerywanym długimi pauzami.§!\n\nOdlegli sąsiedzi, skoro nie odpowiadaliście na bezpośredni kontakt, postanowiliśmy podjąć wysiłek skorzystania z prymitywnej technologii łączności.\n\nJestem §HUk-Hogolath Scarat§!, arcypsionik imperium §H[exiled_country.GetName]§!. To pilna sprawa, wybaczcie, że od razu przechodzę do rzeczy."
 shroud.shared_auric_flow_inhibition: "hamuje rozszerzanie się fali aury. Zakładamy, że ta niedopuszczalna sytuacja to skutek waszego błędu i niewiedzy.\n\nAura daje korzyści wszystkim. Powinna rozświetlać całą galaktykę. Musicie dowieść waszego zaangażowania w nadrzędne dobro, zatem żądamy, abyście natychmiast pozbyli się"
 shroud.6505.name: "$shroud.6500.name$"
 shroud.6505.desc: "$shroud.6500.desc$"
 shroud.6510.name: "Arcypsionik Uk-Hogolath Scarat"
 shroud.6510.desc: "$shroud.shared_screen_figure$ Wasze urządzenie w układzie §H[exiled_system_border.GetName]§! $shroud.shared_auric_flow_inhibition$ \"$SHROUD_SEAL$\"."
 shroud.6510.a: "Nie otrzymaliśmy od was wcześniej żadnej wiadomości."
 shroud.6515.desc: "Przemawialiśmy prawdziwym głosem. Gdybyście słuchali, usłyszelibyście wewnętrzny zew. Macie dar, choć postanowiliście go uciszyć."
 shroud.6515.a: "Aura sieje zniszczenie. To zaraza."
 shroud.6520.desc: "Źle rozumujecie. Aura to święty dar naszego protektora. Przyciąga to, co pragnie zniszczenia."
 shroud.6520.a: "A jeśli nie spełnimy waszych żądań?"
 shroud.6525.desc: "Ktokolwiek krzywdzi aurę, zostanie spacyfikowany. Jeśli odmówicie, przejdziemy do działań zbrojnych."
 shroud.6525.a: "Pieczęć zostanie tam, gdzie jest."
 shroud.6525_heritage.a: "Nigdy nie zniszczymy naszego dziedzictwa."
 shroud.6525.b: "Zgadzamy się zdemontować pieczęć."
 shroud.6530.desc: "Nierozważni głupcy."
 shroud.6535.desc: "Roztropna decyzja."
 shroud.6550.name: "Odwleczono działania zbrojne"
 shroud.6550.desc: "W celu uniknięcia natychmiastowego konfliktu z imperium §H[exiled_country.GetName]§!, zgodziliśmy się spełnić jego żądanie i zdemontować $SHROUD_SEAL$ w układzie §H[exiled_system_border.GetName]§!.\n\nKontakt z istotami odpowiedzialnymi za psioniczną zarazę wywołał poważne zaniepokojenie w całym imperium §H[this.GetName]§!. $SHROUD_SEAL$ zniknie, ale to raczej krótkoterminowe uspokojenie sytuacji. Za jakiś czas zażądają, by §H$building_ancient_ward_2$§! również została zdemontowana, a na to nie możemy się zgodzić.\n\nKoniec końców i tak dojdzie do konfliktu zbrojnego."
 shroud.6550.a: "Musimy być przygotowani."
 shroud.6560.name: "$shroud.6510.name$"
 shroud.6560.desc: "$shroud.shared_screen_figure$ Budowla na świecie §H[capital_scope.GetName]§! $shroud.shared_auric_flow_inhibition$ \"$building_ancient_ward_2$\"."
 shroud.6560.a: "$shroud.6510.a$"
 shroud.shared_psiarch_transmission: "§HGdy tylko pojawia się [Leader.GetHisHer] obraz, arcypsionik zaczyna chłodne, beznamiętne strofowanie.§!\n\n[This.GetSpeciesNamePlural], rozczarowuje mnie, że muszę dokonywać tej transmisji."
 shroud.shared_auric_flow_disdain: "Waszymi działaniami dowiedliście własnej ignorancji. Wasza pogarda wobec fali aury i powszechnej poprawy psionicznej jest niekompatybilna z pokojem galaktycznym. Nie zostawiliście nam wyboru.\n\nPrzygotujcie się na spotkanie z naszymi flotami."
 shroud.6570.name: "$shroud.6510.name$"
 shroud.6570.desc: "$shroud.shared_psiarch_transmission$ Wasza $SHROUD_SEAL$ została rozmontowana, ale wiemy, że na świecie §H[capital_scope.GetName]§! macie pewien budynek o podobnych możliwościach. Wasze zamiary są oczywiste. $shroud.shared_auric_flow_disdain$"
 shroud.6570.a: "Powinniście zrobić to samo. Koniec przekazu."
 shroud.6575.name: "$shroud.6570.name$"
 shroud.6575.desc: "$shroud.shared_psiarch_transmission$ Wasza $SHROUD_SEAL$ została odbudowana, co pozbawiło nas wszelkich nadziei na wasze odkupienie. $shroud.shared_auric_flow_disdain$"
 shroud.6575.a: "$shroud.6570.a$"
 shroud.6580.name: "Zapieczętowanie układu §H[exiled_center_system.GetName]§!"
 shroud.6580.desc: "Po uruchomieniu kolosalnych tłumików psionicznych, nasza §H$SHROUD_SEAL$§! rozpoczęła wypychanie zjawiska §H\"$PSIONIC_AURA$\"§! z układu §H[exiled_center_system.GetName]§!.\n\nSkanowanie międzygwiezdne potwierdziło, że reszta terytorium naszego wroga jest połączona bezpośrednio z układem [exiled_center_system.GetName] za pośrednictwem hiperlinii. Dzięki temu ta jedna $SHROUD_SEAL$ może rozpraszać $PSIONIC_AURA_PLURAL$ na całym terytorium imperium §H[exiled_country.GetName]§!.\n\nNasze zwycięstwo zależy od ochrony, którą zapewnia nam pieczęć."
 shroud.6580.a: "Obrona ma kluczowe znaczenie."
 shroud.6600.name: "Zgromadzenie Ścieżek Umysłu"
 shroud.6600.desc: "Kolonia psionicznego zagrożenia na świecie §H[current_planet.GetName]§! została zdobyta.\n\nUstaliliśmy, że §H$PSIONIC_AURA$§! obecna w tym układzie była wzmacniana przez interakcje psioniczne populacji z §HWoalem§!. Tymi praktykami kieruje grupa elitarnych telepatów, §HZgromadzenie Ścieżek Umysłu§!. Ta sekta psioników jest oddana swojemu patronowi - rzekomej potężnej istocie żyjącej w Woalu, zwanej §H$r_the_lost_patron$§!.\n\nIch święte teksty wielokrotnie wspominają o jakimś artefakcie związanym z tą istotą, podobno wciąż znajdującym się na planecie §H[other_planet.GetName]§!. Zdobycie tego obiektu pomoże nam zatrzymać dalsze rozprzestrzenianie się wpływów tej sekty."
 shroud.6600.a: "Kurs na świat [other_planet.GetName]."
 shroud.6601.name: "Ruiny świata [current_planet.GetName]"
 shroud.6601.desc: "Zakończyliśmy kolonizację świata §H[current_planet.GetName]§! należącego wcześniej do imperium [exiled_country.GetName].\n\nZ pozostałości tamtejszych archiwów dowiedzieliśmy się, że $PSIONIC_AURA$ obecna wcześniej w tym układzie była stworzona dzięki interakcjom psionicznym populacji z §HWoalem§!. Tymi praktykami kierowała sekta psioników, czcząca swojego patrona - rzekomą potężną istotę żyjącą w Woalu, zwaną §H$r_the_lost_patron$§!.\n\nFragmenty ich świętych tekstów wielokrotnie wspominają o jakimś artefakcie związanym z tą istotą, podobno wciąż znajdującym się na planecie §H[other_planet.GetName]§!. Zdobycie tego obiektu wymagałoby bardziej wyważonego podboju świata [other_planet.GetName], w wyniku którego ocalałaby część tamtejszej populacji."
 shroud.6601.a: "$shroud.6600.a$"
 shroud.6700.name: "$SANCTUM_OF_THE_LOST$"
 shroud.6700.desc.common: "Wprowadziliśmy natychmiastowy zakaz wszelkich praktyk psionicznych na tych światach i w ten sposób ich podła §H$PSIONIC_AURA$§! została całkowicie zneutralizowana.\n\nW głównej metropolii planety znajduje się zniszczona wieża nosząca nazwę §H$SANCTUM_OF_THE_LOST$§!, która niegdyś była ważną świątynią okrytej złą sławą sekty psioników. Nasi żołnierze twierdzą, że wyczuwa się tam tajemniczą, niepokojącą obecność.\n\nW położonej najgłębiej komnacie tej budowli znajduje się szczelnie zamknięty \"kokon\", z którego wydobywa się promieniowanie psioniczne o dużym natężeniu i lokalnym zasięgu działania. Standardowa amunicja nie zdołała przebić się do wnętrza tego obiektu. Należy przeprowadzić dokładniejsze badania, by wyeliminować potencjalne zagrożenie, jakie ten przedmiot mógłby stanowić dla naszego bezpieczeństwa."
 shroud.6700.desc.contact: "Podbicie świata §H[current_planet.GetName]§! to nasze ostateczne zwycięstwo nad imperium §H[exiled_country.GetName]§!. $shroud.6700.desc.common$"
 shroud.6700.desc.no_contact: "Podbiwszy świat §H[current_planet.GetName]§!, zyskaliśmy kontrolę nad terytorium, którym rządziło niegdyś imperium zwane §H[exiled_country.GetName]§!. $shroud.6700.desc.common$"
 shroud.6700.desc.contact_no_name: "Podbicie świata §H[current_planet.GetName]§! to nasze ostateczne zwycięstwo nad ?.$shroud.6700.desc.common$"
 shroud.6700.desc.no_exiled: "Podbiwszy świat §H[current_planet.GetName]§!, zyskaliśmy kontrolę nad terytorium, którym rządzili niegdyś psioniczni zeloci. $shroud.6700.desc.common$"
 shroud.6700.a: "Niepokojące wieści... Zbadajcie to dokładniej."
 shroud.6705.name: "$psionic_threat_eliminated$"
 shroud.6705.desc.common: "Wstępne badanie ujawniło dowody na istnienie na tej planecie rozległej sieci budynków, które najprawdopodobniej zasilały psioniczną zarazę. Teraz zostały po nich tylko ruiny.\n\nByć może nigdy nie dowiemy się, jakie zdegenerowane tajemnice skrywano w tych budowlach, ani nie poznamy prawdy o tchórzliwych praktykach ich mieszkańców. Jednak teraz $PSIONIC_AURA$ już nie spowija tego układu, więc nie musimy obawiać się jej zgubnego wpływu."
 shroud.6705.desc.contact: "Anihilacja populacji świata §H[current_planet.GetName]§! to koniec imperium zwanego §H[exiled_country.GetName]§!.\n\n$shroud.6705.desc.common$"
 shroud.6705.desc.no_contact: "Anihilacja populacji świata §H[current_planet.GetName]§! to koniec niszczycielskiego zagrożenia psionicznego.\n\n$shroud.6705.desc.common$"
 shroud.6705.a: "Trzeba zniszczyć wszystkie podobne zagrożenia."
 psionic_threat_eliminated: "Wyeliminowano zagrożenie psioniczne"
 psionic_threat_eliminated_desc: "Anihilacja imperium psionicznego sprawiła, że jego $PSIONIC_AURA$ zniknęła z galaktyki, dzięki czemu nasza populacja może spać spokojnie."
 SANCTUM_OF_THE_LOST: "Sanktuarium Śniącego"
 SANCTUM_OF_THE_LOST_DESC: "Zniszczone $SANCTUM_OF_THE_LOST$ na świecie §H[sanctum_of_the_lost_planet.GetName]§! przechowywało szczelnie zamknięty \"kokon\", z którego wydobywa się promieniowanie psioniczne o niebezpiecznym natężeniu. Musimy przeprowadzić na miejscu dokładniejsze badania, które pozwolą wyeliminować wszelkie zagrożenia ze strony tego obiektu."
 shroud.6710.name: "Moc wewnętrzna"
 shroud.6710.desc: "Nasi badacze wnikliwie przeanalizowali \"kokon\" na świecie §H[sanctum_of_the_lost_planet.GetName]§!.\n\nSkanowanie zewnętrznej części tej potężnej budowli wykazało, iż jest to doskonale zabezpieczony pojemnik do przetrzymywania potężnej istoty psionicznej. Jego powłoka składa się z warstw izolacyjnych wykonanych z ciężkich stopów, jednak i tak wydobywa się z niego promieniowanie psioniczne o dużym natężeniu.\n\nWokół kokonu zainstalowano tłumiki psioniczne, po ich aktywacji wszyscy w pobliżu doznali ogromnego obciążenia neurologicznego.\n\nNastępnie powierzchnia kokonu wygięła się i zmieniła formę z owalu w poruszającą się helisę, w której otworzyła się szczelina, z której otrzymaliśmy bezpośredni komunikat nadany z wnętrza..."
 cannot_found_mindwarden_enclave: "Musi być zapewnione bezpieczeństwo psioniczne imperium"
 shroud.6800.name: "$MINDWARDENS_THE_FIRST_ENCLAVE$"
 shroud.6800.desc: "Zgromadziliśmy ogromną wiedzę o §HWoalu§! i opracowaliśmy zaawansowane technologie osłabiające jego szkodliwe działanie. Naradzając się, jak zastosować tę wiedzę w całej galaktyce, dowódcy naszej floty przygotowali ciekawą propozycję.\n\nRadzą rozmieścić jedną z naszych flot jako niezależną strukturę (§H$gov_mindwarden_enclave$§!), która zapewniałaby pomoc antypsioniczną całej galaktyce. $shroud.shared_enclave_investement$"
 shroud.6800.a: "To dobre przedsięwzięcie."
 shroud.6800.a.tt: "Teraz dowolna flota o rozmiarze §Y30§! lub większa może być przekształcona w: §H$gov_mindwarden_enclave$§!."
 shroud.6825.name: "Budowa: $gov_mindwarden_enclave$"
 shroud.6825.desc_first: "§H[This.GetName]§! to dobre miejsce, w którym może powstać pierwsza, niezależna §H$gov_mindwarden_enclave$§!. Jeżeli zostanie udzielona zgoda, flota stworzy nową placówkę w układzie §H[This.Solar_System.GetName]§! i zacznie świadczyć usługi antypsioniczne."
 shroud.6825.desc_default: "Być może §H[This.GetName]§! to miejsce, gdzie powstanie niezależna §H$gov_mindwarden_enclave$§!, zapewniająca pomoc antypsioniczną całej galaktyce. $shroud.shared_enclave_investement$"
 shroud.6825.a: "Kontynuujmy budowę."
 shroud.6825.a.tt: "Powstała §H$gov_mindwarden_enclave$§!."
 shroud.6825.b: "Zastanówmy się jeszcze."
 shroud.6830.name: "$MINDWARDEN_plural$"
 shroud.6830.desc: "Walka z §HWoalem§! i nieodpowiedzialnym korzystaniem z psioniki wzmocniła nasze społeczeństwo oraz pokazała, jakie powinny być nasze cele. Powstała pierwsza §H$gov_mindwarden_enclave$§!, co zwiastuje nadejście nowej ery regeneracji i oporu.\n\nW całej galaktyce żaden umysł nie zostanie zaatakowany przez agresorów psionicznych, żaden świat nie będzie nękany przez siły pochodzące z Woalu.\n\nTeraz $MINDWARDEN_plural$ mają swój czas."
 shroud.6830.a: "To dopiero początek naszej podróży."
 shroud.shared_enclave_investement: "Nasza początkowa inwestycja polegałaby na sfinansowaniu budowy stacji kosmicznej. W zamian otrzymalibyśmy udziały w przyszłych zyskach. Ich niezależność operacyjna umożliwi masowe rozmieszczanie takich placówek.\n\nOczywiście my taż moglibyśmy korzystać z ich usług i odzyskiwać część naszych płatności za nie."
 shroud.6841.name: "Enklawa [mindwarden_enclave_country.GetName] wypłaca dywidendy"
 BEGINS_EVENT_CHAIN: "Rozpoczyna ciąg wydarzeń:"
 ENDS_EVENT_CHAIN: "Kończy ciąg wydarzeń:"
 the_exiled_become_hostile: "Imperium §H[exiled_country.GetName]§! staje się wrogie wobec nas."
 start_psionic_war_chain: "$BEGINS_EVENT_CHAIN$ §Y$the_psionic_war_chain_title$§!"
 shroud_seal_dismantled: "§HPieczęć Woalu§! w układzie §H[exiled_system_border.GetName]§! została rozmontowana."
 the_psionic_war_chain_title: "$NAME_Psionic_War$"
 the_psionic_war_chain_desc: "Zaczęła się wojna z imperium §H[exiled_country.GetName]§!.\n\nTę psioniczną zarazę należy wyplenić u źródła. Najpierw, w układzie §H[exiled_center_system.GetName]§!, musi powstać nasza $SHROUD_SEAL$. W ten sposób $PSIONIC_AURA$ zostanie zneutralizowana. Tylko wtedy będziemy mogli wkroczyć i usunąć to zagrożenie z galaktyki."
 the_psionic_war_chain_poi_1: "Zbuduj: $SHROUD_SEAL$"
 the_psionic_war_chain_poi_1_desc: "Jeśli §H$SHROUD_SEAL$§! powstanie w układzie §H[exiled_center_system.GetName]§!, §H$PSIONIC_AURA_PLURAL$§! w tym układzie słonecznym i innych, połączonych z nim hiperliniami, zostaną unieszkodliwione."
 the_psionic_war_chain_poi_2: "Kontroluj świat §H[exiled_planet_1.GetName]§!"
 the_psionic_war_chain_poi_2_desc: "Imperium §H[exiled_country.GetName]§! nie zamierza przerwać ataku psionicznego. Tylko podbicie jego światów zagwarantuje nam, że §H$PSIONIC_AURA_PLURAL$§! nie pojawią się ponownie."
 the_psionic_war_chain_poi_3: "Kontroluj świat §H[exiled_planet_2.GetName]§!"
 the_psionic_war_chain_poi_3_desc: "Imperium §H[exiled_country.GetName]§! nie zamierza przerwać ataku psionicznego. Tylko podbicie jego światów zagwarantuje nam, że §H$PSIONIC_AURA_PLURAL$§! nie pojawią się ponownie."
 shroud_seal_reconstruction_chain_title: "Odbudowa pieczęci Woalu"
 shroud_seal_reconstruction_chain_desc: "Nasza §H$SHROUD_SEAL$§! Woalu została rozmontowana, było to poświęcenie konieczne, by uspokoić imperium §H[exiled_country.GetName]§!. Jednak to rozwiązanie okazało się jedynie tymczasowe. Musimy odbudować tę budowlę, zanim wejdziemy na terytorium wroga i usuniemy stamtąd §H$PSIONIC_AURA_PLURAL$§!.\n\n§POdbudowa zostanie uznana za akt agresji. Musimy być gotowi na działania odwetowe przeciwnika.§!"
 shroud_seal_reconstruction_chain_poi_1: "[event_target:exiled_system_border.GetName]"
 shroud_seal_reconstruction_chain_poi_1_desc: "$build_shroud_seal_poi_desc$"
 SHROUD_WORLDS_IN_SYSTEM: "Światy spowite Woalem: §G$QUANTITY|0$§!"
 NAME_Psionic_War: "Wojna psioniczna"
 wg_psionic_war: "$NAME_Psionic_War$"
 war_goal_wg_psionic_war: "$NAME_Psionic_War$"
 war_goal_wg_psionic_war_desc: "Wojna jest prowadzona w celu oczyszczenia galaktyki z sił agresora psionicznego."
 shroud.6720.name: "$UNKNOWN_LONG$"
 shroud.6720.desc: "§HSłyszycie, ale nie słuchacie. Dlaczego?§!"
 shroud.6720.a: "Nie pozwolimy zatruć naszych umysłów!"
 shroud.6720.b: "Czym jesteś?"
 shroud.6720.c: "Czemu tu jesteś?"
 shroud.6720.d: "Czego chcesz?"
 shroud.6720.e: "Jesteś z Woalu?"
 shroud.6720.f: "Dosyć już usłyszeliśmy."
 shroud.6723.desc: "§HTrucizna? To nie trucizna...\n\nTo pieśń. Żeby śpiewać, musicie słuchać. Zapomnieć się i podzielić jej pięknem.§!"
 shroud.6725.desc: "§HKoło obraca się... a my słuchamy.\n\nGwiazdy obracają się... a my śpiewamy.§!"
 shroud.6725.a: "Czym jest \"koło\"?"
 shroud.6725.b: "Dosyć tego."
 shroud.6730.desc: "§HCiągle się obraca. U góry i na dole. Harmonia zwana \"Woalem\".§!"
 shroud.6735.desc: "§HJa... śnię. Śnię o pieśni. Ale głosy zamilkły. Gdzie się podział chór?§!"
 shroud.6735.a: "Nie ma już tych, którzy cię tu trzymali."
 shroud.6735.b: "Co to za \"pieśni\"?"
 shroud.6735.c: "Dosyć tego."
 shroud.6740.desc: "§HJesteście tutaj. Możecie śpiewać...§!"
 shroud.6745.desc: "§HPrzepływ między jawą i snem... Ścieżka łącząca tu i tam.\n\nNie słyszycie ich, wasze umysły nie potrafią zrozumieć...§!"
 shroud.6750.desc: "§HChcę usłyszeć śpiew... Wszystko jest takie ciche... Dlaczego?§!"
 shroud.6750.a: "Co może nam zaproponować w zamian?"
 shroud.6750.b: "Dosyć tego."
 shroud.6755.desc: "§HMogę wam pokazać... moje sny. Światotworzenie.§!"
 shroud.6755.a: "Skąd mamy wiedzieć, że można ci ufać?"
 shroud.6760.desc: "§HMusicie tylko słuchać. Pieśń jest prawdą, bo jest piękna. To piękna prawda.\n\nAle wasze umysły są zamknięte. Można je otworzyć.§!"
 shroud.6763.desc: "§HWciąż tam jestem... Słucham pieśni obu światów. Ten milczy.§!"
 shroud.6763.a: "Nie powinno cię tu być."
 shroud.6765.desc: "§HMówicie prawdę.§!"
 shroud.6770.name: "$r_the_lost_patron$"
 shroud.6770.desc: "W kokonie znalezionym na świecie §H[sanctum_of_the_lost_planet.GetName]§! znajduje się potężna istota międzywymiarowa. Prawdopodobnie to jej dziełem była $PSIONIC_AURA$, która zagrażała świętości naszych umysłów.\n\nNasze tłumiki psioniczne chwilowo chronią nas przed tym niebezpieczeństwem, ale trudno powiedzieć, jak długo te urządzenia zdołają odpierać jej wpływ. Możliwe, że w kontrolowanych warunkach zdołamy ujarzmić tę straszliwą moc i wykorzystać ją do własnych celów.\n\nMimo to, duża część naszego społeczeństwa wzywa do jej zniszczenia. Samo jej istnienie jest sprzeczne z naszymi tradycyjnymi wartościami."
 shroud.6770.a: "Zniszczyć tę abominację."
 shroud.6770.b: "Znajdźmy sposób, by wykorzystać tę... rzecz."
 destroyers_of_the_lost_modifier: "Niszczyciele Zaginionych"
 destroyers_of_the_lost_modifier_tt: "Daje dostęp do standardu życiowego §Y$living_standard_shroud_inoculation$§!, w którym są usuwane zdolności §Ypsioniczne§!."
 destroyers_of_the_lost_modifier_desc: "Pokonanie psionicznego wroga i zniszczenie źródła, z którego prawdopodobnie pochodziła $PSIONIC_AURA$, wzmocniło morale naszego imperium po latach cierpień."
 living_standard_shroud_inoculation: "Szczepienia przeciwko Woalowi"
 living_standard_shroud_inoculation_tooltip: "Ten gatunek jest szczepiony przeciwko szkodliwym efektom promieniowania psionicznego.\n\n§RŻeby zapobiec dalszym szkodom, wszystkie cechy psioniczne zostaną usunięte.§!"
 living_standard_shroud_inoculation_tooltip_delayed: "§LZapewnimy temu gatunkowi bezpieczeństwo psioniczne.§!"
 psionic_heresy: "Herezja psioniczna"
 shroud.6780.name: "$r_the_lost_patron$"
 shroud.6780.desc: "Myśli przenikają przez nasze umysły.\n\nSłyszymy melodię, żywą i irytującą.\n\nZnamy ten ból, ogromny i swojski.\n\n§HSłuchaliście. Sen jest wasz... Śpiewajcie, śpiewajcie...§!"
 shroud.6780.a: "Co zrobiłeś?"
 shroud.6785.desc: "§HSpełniłem obietnicę. Śniłem dla was.§!"
 shroud.6785.a: "O czym śniłeś?"
 shroud.6790.desc: "§HO światach. Nowych światach pomiędzy moim a waszym.§!"
 shroud.6790.a: "Po co nam te światy?"
 shroud.6795.desc: "§HPozwólcie, że im zaśpiewam. Najjaśniejszą z pieśni.§!"
 shroud.6795.a: "Obyśmy tego nie żałowali."
 shroud.6795.a.tt: "Dodaje nie więcej niż trzy §Hświaty spowite Woalem§! na naszym terytorium, ale nie więcej niż jeden na układ."
 r_the_lost_patron: "Śniący"
 r_the_lost_patron_desc: "Ta tajemnicza istota to fizyczna postać bytu pochodzącego z Woalu, dawnego patrona nieistniejącego już imperium psionicznego. Nie wiadomo, jak zmaterializowała się w tej fizycznej rzeczywistości, ale jej wyjątkowa więź z domeną psioniczną daje jej ogromną moc."
 the_lost_patron_passive_effect: "§H$SHROUD_SEAL_PLURAL$§! Zasięg skuteczny: §G+1§!\n§H$SHROUD_SEAL_PLURAL$§! wytwarzają £unity£ §Y$unity$§!: §G+25§!\n§H$SHROUD_SEAL_PLURAL$§! zapewniają £navy_size£ §Y$NAVY_SIZE_TITLE$§!: §G+10§!"
 the_lost_patron_before_activation_tt: "Nie wiemy, co może się stać..."
 the_lost_patron_after_activation_effect_tt: "Odblokowuje jedną £decision£ §Ydecyzję planetarną§!: ['concept_dreamscaping_decision']"
 decision_dreamscaping: "Kształtowanie snów"
 decision_dreamscaping_desc: "Terraformuje §Y$pc_shrouded$§! w: §Y$pc_gaia$§!"
 concept_dreamscaping_decision: "$decision_dreamscaping$"
 concept_dreamscaping_decision_desc: "$decision_dreamscaping_desc$"
