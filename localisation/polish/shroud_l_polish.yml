 # Entropy Drinkers
 civic_tooltip_not_entropy_drinkers: "NIE ma etosu ['concept_entropy_drinkers_civics']"
 civic_entropy_drinkers: "Połykacze entropii"
 civic_entropy_drinkers_desc: "$civic_ap_blockade_tt$\n\nTo społeczeństwo pozyskuje cenny metabolizm od bezczynnej ludności poprzez pasożytnicze połączenia telepatyczne. Energię tę można po pozyskaniu przydzielić ważniejszym klasom."
 civic_entropy_drinkers_effects: "- Wprowadza następujące §H$EDICTS$§!:$TABBED_NEW_LINE$- ['edict:energy_drain',$edict_energy_drain$]$TABBED_NEW_LINE$- ['edict:sanguine_council',$edict_sanguine_council$]$TABBED_NEW_LINE$- ['edict:psychic_feast',$edict_psychic_feast$]\n- Można zbudować: £building£['building:building_lifecrypt_1'].\n- Przywódcy zaczynają z cechą ['concept_leader_trait_psionic']."
 civic_entropy_drinkers_psionic_modifier: "- $energy_with_icon$ za każde $pop_group_unit$ £pop£ pop. psioników: §G+0,5§!"
 civic_entropy_drinkers_machine: "Ekstraktory energii"
 civic_entropy_drinkers_machine_desc: "$civic_ap_blockade_tt$\n\nOdpowiedni rozdział energii jest kluczowy dla maksymalnej wydajności wielkiej maszyny. Wszelkie jednostki są zaprojektowane z tą właśnie myślą, co pozwala na okresowe przeciążanie krytycznie istotnych węzłów, jeśli zajdzie taka potrzeba."
 civic_entropy_drinkers_machine_effects: "- Wprowadza następujące §H$EDICTS$§!:$TABBED_NEW_LINE$- ['edict:energy_drain',$edict_energy_drain$]$TABBED_NEW_LINE$- ['edict:sanguine_council_machine',$edict_sanguine_council_machine$]$TABBED_NEW_LINE$- ['edict:psychic_feast',$edict_psychic_feast$]\n- Można zbudować: £building£['building:building_lifecrypt_machine_1'].\n- Przywódcy zaczynają z cechą ['concept_leader_trait_psionic']."
 civic_entropy_drinkers_hive_mind: "Kasta pasożytnicza"
 civic_entropy_drinkers_hive_mind_desc: "$civic_ap_blockade_tt$\n\nTen kolektyw pozyskuje cenny metabolizm od pomniejszych dronów poprzez pasożytnicze połączenia telepatyczne. Energię tę można po pozyskaniu przydzielić ważniejszym kastom."
 civic_entropy_drinkers_hive_mind_effects: "- Wprowadza następujące §H$EDICTS$§!:$TABBED_NEW_LINE$- ['edict:energy_drain',$edict_energy_drain$]$TABBED_NEW_LINE$- ['edict:sanguine_council',$edict_sanguine_council$]$TABBED_NEW_LINE$- ['edict:psychic_feast',$edict_psychic_feast$]\n- Można zbudować: £building£['building:building_lifecrypt_hive_mind_1'].\n- Przywódcy zaczynają z cechą ['concept_leader_trait_psionic']."
 civic_entropy_drinkers_corporate: "Wampiry korporacyjne"
 civic_entropy_drinkers_corporate_desc: "$civic_ap_blockade_tt$\n\nTa $gov_megacorporation$ pozyskuje cenny metabolizm od bezczynnej ludności poprzez pasożytnicze połączenia telepatyczne. Energię tę można po pozyskaniu przydzielić kierownictwu wyższego szczebla."
 civic_entropy_drinkers_corporate_effects: "- Wprowadza następujące §H$EDICTS$§!:$TABBED_NEW_LINE$- ['edict:energy_drain',$edict_energy_drain$]$TABBED_NEW_LINE$- ['edict:sanguine_council',$edict_sanguine_council$]$TABBED_NEW_LINE$- ['edict:psychic_feast',$edict_psychic_feast$]\n- Można zbudować: £building£['building:building_lifecrypt_corporate_1'].\n- Przywódcy zaczynają z cechą ['concept_leader_trait_psionic'].\n- £building£ §Y$building_executive_retreat$§! $megacorp_civic_branch_office_building_effect$"
 has_not_begun_non_psionic_ascension: "NIE ma ścieżki innej niż §Ypsioniczne wywyższenie§!"
 has_not_begun_non_psionic_ascension_success: "$TRIGGER_PASS$$has_not_begun_non_psionic_ascension$"
 has_not_begun_non_psionic_ascension_fail: "$TRIGGER_FAIL$$has_not_begun_non_psionic_ascension$"
 # Superstitious Beliefs
 civic_tooltip_not_superstitious_beliefs: "NIE ma etosu \"['concept_superstitious_beliefs_civics']\""
 civic_superstitious_beliefs_desc_common: "Przed każdą istotną decyzją należy przeprowadzić odpowiednie ceremonie, aby wejść w harmonię z niewidzialnymi siłami kształtującymi przeznaczenie."
 civic_superstitious_beliefs_common_effects: "Wprowadza ['edict:galactic_dowsing',$edict_galactic_dowsing$]\nCo trzynaście lat zmienia się ['concept_sb_cycle'].\nWydarzenia losowe będą co jakiś czas przynosiły twojemu imperium szkody lub korzyści."
 civic_superstitious_beliefs: "Zabobonne przekonania"
 civic_superstitious_beliefs_desc: "To społeczeństwo twierdzi, iż odkryło rytualny mechanizm przewidywania przyszłości wykorzystujący rozpoznawanie ezoterycznych wzorów i analizę cyklicznych anomalii. $civic_superstitious_beliefs_desc_common$"
 civic_superstitious_beliefs_effects: "Zamienia: \n$t$- £job_priest£ $job_priest_plural$ -> £job_superstitious_beliefs_priest£ $job_superstitious_beliefs_priest_plural$\n$t$- £job_high_priest£ $job_high_priest_plural$ -> £job_superstitious_beliefs_high_priest£ $job_superstitious_beliefs_high_priest_plural$\n$civic_superstitious_beliefs_common_effects$"
 civic_machine_superstitious_beliefs: "Poszukiwacze wzorców"
 civic_machine_superstitious_beliefs_desc: "To imperium maszyn twierdzi, iż jest w stanie rozwiązywać równania bez znajomości wartości zmiennych, wykorzystując do tego rozpoznawanie ezoterycznych wzorców i analizę cyklicznych anomalii. Przed każdą istotną decyzją analizuje układ ciał niebieskich w celu zapewnienia sobie najlepszego możliwego przewidywanego rezultatu."
 civic_machine_superstitious_beliefs_effects: "$civic_superstitious_beliefs_common_effects$"
 civic_hive_superstitious_beliefs: "Sieć zodiaku"
 civic_hive_superstitious_beliefs_desc: "Ten kolektyw twierdzi, iż odkrył rytualny mechanizm przewidywania przyszłości, wykorzystujący rozpoznawanie ezoterycznych wzorów i analizę cyklicznych anomalii. $civic_superstitious_beliefs_desc_common$"
 civic_hive_superstitious_beliefs_effects: "$civic_superstitious_beliefs_common_effects$"
 civic_corporate_superstitious_beliefs: "Przedsiębiorstwo szczęścia"
 civic_corporate_superstitious_beliefs_desc: "Ta korporacja twierdzi, iż odkryła rytualny mechanizm przewidywania przyszłości wykorzystujący rozpoznawanie ezoterycznych wzorów i analizę cyklicznych anomalii. W celu maksymalizacji wyników, przyszłe przychody i straty brane są pod uwagę łącznie z kluczowymi wskaźnikami efektywności, wynikającymi z idealnych układów ciał niebieskich."
 civic_corporate_superstitious_beliefs_effects: "Zamienia: \n$t$- £job_priest£ $job_priest_plural$ -> £job_superstitious_beliefs_priest_corporate£ $job_superstitious_beliefs_priest_corporate_plural$\n$t$- £job_high_priest£ $job_high_priest_plural$ -> £job_superstitious_beliefs_high_priest_corporate£ $job_superstitious_beliefs_high_priest_corporate_plural$\n$civic_superstitious_beliefs_common_effects$"
 # Twisted Experimenters
 civic_twisted_experimenters: "Eksperymentalne wyroki"
 civic_twisted_experimenters_desc: "Wymiar sprawiedliwości i żądza wiedzy zlewają się w tym społeczeństwie w jedność. Pracując w absolutnej tajemnicy, naukowcy przeprowadzają brutalne eksperymenty na obiektach doświadczalnych pozyskiwanych z przestępczego półświatka. Co jakiś czas dochodzi do zgonów, lecz uznaje się je za cenę postępu."
 civic_twisted_experimenters_effects: "Rozpoczyna z sytuacją \"['concept_experimental_testing']\", zapewniającą po ukończeniu wiedzę o technologii.\nMoże budować i rozpoczyna z: £building£['building:building_experimentation_chambers_1'].\nWszyscy niemaszynowi niewolnicy otrzymują dostęp do niewolniczego miejsca pracy: ['concept_slave_orderly'].\nDostęp do ['concept_slave_army', armii niewolniczej]: §Y$abomination_army$§!"
 civic_twisted_experimenters_hive_mind: "Świadomość korekcyjna"
 civic_twisted_experimenters_hive_mind_desc: "Jednostki z tego kolektywu wykazujące odchylenia wykorzystywane są jako obiekty doświadczalne w pionierskich badaniach naukowych, w których nie są stosowane żadne ograniczenia co do stosowanych metod. Sprawia to, że problematyczne drony zachowują namiastkę swojej wartości przed utylizacją."
 civic_twisted_experimenters_hive_mind_effects: "Rozpoczyna z sytuacją \"['concept_experimental_testing_hive_mind']\", zapewniającą po ukończeniu wiedzę o technologii.\nMoże budować i rozpoczyna z: £building£['building:building_experimentation_chambers_1']."
 civic_twisted_experimenters_corporate: "Dział Badań, Rozwoju i Sądownictwa"
 civic_twisted_experimenters_corporate_desc: "Ta $gov_megacorporation$ wdrożyła interesującą inicjatywę redukcji niewydajności sądownictwa poprzez powiązanie go z innowacyjnością naukową. Problematyczni obywatele są przydzielani do eksperymentalnych projektów naukowych i wykorzystywani w rygorystycznych testach prowadzących do przełomów technologicznych. Współczynnik zgonów jest utrzymywany w wyznaczonych widełkach."
 civic_twisted_experimenters_corporate_effects: "Rozpoczyna z sytuacją \"['concept_experimental_testing_corporate']\", zapewniającą po ukończeniu wiedzę o technologii.\nMoże budować i rozpoczyna z: £building£['building:building_experimentation_chambers_1'].\nMożna zbudować: £building£ ['concept_building_carceral_test_facility'] $BRANCH_OFFICE_BUILDING$.\nWszyscy niemaszynowi niewolnicy otrzymują dostęp do niewolniczego miejsca pracy: ['concept_slave_orderly'].\nDostęp do ['concept_slave_army', armii niewolniczej]: §Y$abomination_army$§!"
 experimenters_we_will_learn_1: "Wiele się dzięki temu nauczymy."
 experimenters_we_will_learn_2: "Nowy sposób na eksperymenty."
 experimenters_we_will_learn_3: "Nowe parametry testowe. Ależ ekscytujące."
 experimenters_tragic_lesson_1: "Ta tragedia wiele nas nauczy."
 experimenters_tragic_lesson_2: "Wielka tragedia... ale i okazja do nowych eksperymentów."
 experimenters_tragic_lesson_3: "To tragiczna lekcja. Ale te dane się przydadzą."
 experimenters_ermerging_crime_1: "Takie środowisko sprawi, że [GetExperimentalEngineerPlural] będą mieć wiele możliwości do przeprowadzania nowych eksperymentów."
 experimenters_ermerging_crime_2: "Przestępczość tego rodzaju zapewnia nam przynajmniej wiele okazji do eksploracji nowych kierunków badań naukowych."
 experimenters_ermerging_crime_3: "Te nowe warunki zapewnią tam ogrom nowych szans na eksperymenty."
 experimenters_ermerging_crime_4: "Środowiska takie jak to stanowią bogate źródło obiektów badawczych. [GetExperimentalEngineerPlural] będą się bardzo cieszyć."
 # Secret Societies
 civic_tooltip_not_secret_societies: "Nie ma etosu ['concept_secret_societies_civics']"
 civic_secret_societies: "Tajne stowarzyszenia"
 civic_secret_societies_desc: "W tym społeczeństwie klika tajemniczych osób z elity potajemnie snuje skomplikowane polityczne intrygi, łączące sprawy wewnętrzne ze sprawami innych światów."
 civic_secret_societies_effects: "Kontakty z innymi imperiami ujawniać będą obecność tajnych ['concept_ss_factions', frakcji].\nZaczyna ze zdolnością do prowadzenia ['concept_proxy_wars', wojen zastępczych].\n$job_bureaucrat_plural_with_icon$ wytworzą $i_unity$ za każdą aktywną i udaną §Ywojnę zastępczą§!.\nZaczyna, mając ['concept_first_contact'] z dwoma sąsiednimi imperiami.\n$INFILTRATION_LEVEL$ otrzymany dla wybranych imperiów po tym, jak nastąpił §Y$first_contact$§!: §G+$@secret_society_infiltration_gain|0$§!"
 civic_secret_societies_corporate: "Wpływowy kartel"
 civic_secret_societies_corporate_desc: "Najpotężniejsze biura, którymi kieruje ta $gov_megacorporation$, prowadzą działania pozaplanetarne, udzielając informacji tylko osobom, które powinny je znać. Jeśli musisz o nie pytać, to znaczy, że nie są przeznaczone dla ciebie."
 civic_secret_societies_corporate_effects: "Kontakty z innymi imperiami ujawniać będą obecność tajnych ['concept_ss_factions', frakcji].\nZaczyna ze zdolnością do prowadzenia ['concept_proxy_wars', wojen zastępczych].\n$job_bureaucrat_plural_with_icon$ wytworzą $i_unity$ za każdą aktywną i udaną §Ywojnę zastępczą§!.\nZaczyna, mając ['concept_first_contact'] z dwoma sąsiednimi imperiami.\n$INFILTRATION_LEVEL$ otrzymany dla wybranych imperiów po tym, jak nastąpił §Y$first_contact$§!: §G+$@secret_society_infiltration_gain|0$§!\n£building£ §Y$building_corporate_embassy$§! $megacorp_civic_branch_office_building_effect$"
 shroud.5012.title: "Ujawniają się tajne stowarzyszenia"
 shroud.5012.desc: "Nasze podejrzenia okazały się słuszne. Cywilizacje [first_neighbor.GetAdjective] i [second_neighbor.GetAdjective] potwierdziły, że nawiązano z nimi kontakt nieoficjalnymi kanałami, zanim zaczęły się bardziej formalne rozmowy.\n\nTe §Hfrakcje§! wyłaniają się z naszego cienia i ujawniają swoje istnienie. Nazywają się §H$pft_the_curtain$§!, §H$pft_the_masquerade$§! i §H$pft_the_grand_dance$§!. Teraz te wcześniej tajne organizacje otwarcie domagają się formalnych rozmów z nami.\n\nByć może nigdy nie zrozumiemy, czego chcą i skąd wiedzą to, co wiedzą. Być może będzie dla nas lepiej, jeśli zastosujemy się do ich żądań."
 shroud.5012.a: "I oto rozpoczyna się taniec..."
 shroud.5012.tt: "Wkrótce pojawią się §Yfrakcje tajnych stowarzyszeń§!:\n$t$§H$pft_the_curtain$§!\n$t$§H$pft_the_masquerade$§!\n$t$§H$pft_the_grand_dance$§!"
 shroud.5013.title: "Dziwne kontakty"
 shroud.5013.desc: "Są wśród nas tacy, którzy działają poza obrębem dyplomacji. Przypuszczamy, że mogą teraz sięgnąć nawet poza nasz świat macierzysty.\n\nChoć dopiero niedawno wzbiliśmy się ku gwiazdom, to z łatwością nawiązaliśmy łączność z innymi organizmami. To chyba coś więcej niż przypadek. Podejrzewamy, że te międzygwiezdne więzi zadzierzgane są za zamkniętymi drzwiami przez szereg tajnych §Hfrakcji§!, które zakorzeniły się mocno w tkance naszego społeczeństwa.\n\nMoże kiedy poszerzymy naszą wiedzę o tych istotach, ujawnią się ci, którzy skrywają się w naszych cieniach."
 shroud.5013.a: "Są z nami czy przeciw nam?"
 # Chosen
 civic_ap_blockade_tt: "§RUWAGA: blokuje wszystkie drogi rozwoju, pozostaje tylko ['concept_psionic_ascension'].§!"
 civic_chosen: "Wybrańcy"
 civic_chosen_desc: "$civic_ap_blockade_tt$\n\nTo społeczeństwo zostało poddane wpływowi Woalu na wczesnym etapie swojej historii i jest związane paktem patronatu z potężnym bytem."
 civic_chosen_effects: "- Rozpoczyna grę w kontakcie z §Ipatronem Woalu§!.\n- $ADDITIONAL_TECHNOLOGIES_STRING$ £society£ ['technology:tech_psionic_aura']"
 civic_chosen_effects_additional: "- Zdobywa $i_unity$ skalowania dzięki ['concept_attunement', dostrojeniu] do Woalu."
 civic_hive_chosen: "Grono wybrańców"
 civic_hive_chosen_desc: "$civic_ap_blockade_tt$\n\nTen kolektyw został poddany wpływowi Woalu na wczesnym etapie swojej historii i jest związany paktem patronatu z potężnym bytem."
 civic_machine_chosen: "Sieć apostolska"
 civic_machine_chosen_desc: "$civic_ap_blockade_tt$\n\nTe maszyny zostały poddane wpływowi Woalu na wczesnym etapie swojego rozwoju i mają ujęty w swoim oprogramowaniu pakt patronatu z potężnym bytem."
 civic_corporate_chosen: "Dyrektoriat wybrańców"
 civic_corporate_chosen_desc: "$civic_ap_blockade_tt$\n\nTa korporacja od swojego założenia zawdzięcza sukces tajemniczej istocie z Woalu - operuje od tego czasu w ramach łączącego ją z tym bytem patronatu."
 civic_corporate_chosen_effects: "$civic_chosen_effects$\n- £building£ §Y$building_psionic_offices$§! $megacorp_civic_branch_office_building_effect$"
 civic_tooltip_not_chosen: "NIE ma etosu \"['concept_chosen_civics']\""
 concept_chosen_civics: "Wybrańcy"
 concept_chosen_civics_desc: "Na etosy typu $concept_chosen_civics$ składają się:\n- ['civic:civic_chosen']$NEW_LINE$- ['civic:civic_hive_chosen']$NEW_LINE$- ['civic:civic_machine_chosen']$NEW_LINE$- ['civic:civic_corporate_chosen']"
 shroud.5105.title: "Wybrańcy"
 shroud.5105.desc: "Wiedzieliśmy to od początku... nadnaturalna łączność z bytem, który nie sposób zdefiniować ni zrozumieć.\n\n[This.GetTheChosenP2]\n\nTak daleko, jak daleko sięgają zapisy historyczne, ten tajemniczy byt był wśród nas. Oczywistym jest, że nas wybrał... nie wiemy tylko, do czego.\n\nNa jakie miano zasługuje [This.GetSensation]?"
 shroud.5105.desc_p2: "Czujemy tę obecność w naszych najgłębszych myślach. Jest blisko, lecz jakimś cudem zawsze poza zasięgiem. Jest w naszych umysłach jednocześnie pewnością i niemożliwością."
 shroud.5105.desc_p2_machine: "Wykrywamy tę obecność w naszych najbardziej skomplikowanych obliczeniach. Jest blisko, lecz jakimś cudem zawsze poza zasięgiem. Jest w naszych obwodach jednocześnie pewnością i niemożliwością."
 shroud.5105.a: "$the_composer_of_strands_article_cap$"
 shroud.5105.b: "$the_eater_of_worlds_article_cap$"
 shroud.5105.c: "$the_cradle_of_souls_article_cap$"
 shroud.5105.d: "$the_instrument_of_desire_article_cap$"
 shroud.5110.title: "[GetChosenPatron] wzywa"
 shroud.5110.desc_common: "Nieomylna istota, którą znamy pod mianem §H[GetChosenPatron]§!, była z nami przez całą nasza historię. Teraz, kiedy otwiera się przed nami bezkres galaktyki, jej obecność odczuwa jak nigdy dotąd [GetMindPhysicalLoc] każdego z nas.\n\nJest wciąż z nami, przyciąga nas. Wyczuwamy dzięki temu - po raz pierwszy - prawdziwy kształt głębokiej, tajemniczej pustki, jaką skrywa [GetMindLogicLoc]. [GetChosenPatron] zaprasza nas do jej wnętrza"
 shroud.5110.desc_common_2: "Rozumiemy nareszcie, jak z własnej woli odwiedzić tę bezcielesną domenę."
 shroud.5110.desc_organic: "$shroud.5110.desc_common$, kusząc doświadczeniami niedostępnymi naszemu pojmowaniu.\n\n$shroud.5110.desc_common_2$"
 shroud.5110.desc_robot: "$shroud.5110.desc_common$, dostosowując nasze parametry do pewnych nieznanych nam jeszcze dotąd zasad.\n\n$shroud.5110.desc_common_2$"
 shroud.5110.a: "Nasze horyzonty wewnętrzne się poszerzają."
 shroud.5110.a.tt: "§YDostrojenie§! z tą istotą wzrasta: $@chosen_patron_attunement_gift|0G$\nPanel §YWoalu§! jest dostępny poprzez menu §Ykontaktów§!."
 shroud.5115.title: "[GetChosenPatron]"
 shroud.5115.desc.intro: "Woal. Faluje daleko poza znaną nam rzeczywistością, jest cieniem rzucanym przez ciemność.\n\nChoć od dawna podróżujemy po tej krainie psionicznej, nasze wcześniejsze wypady były jedynie próbami. Teraz, po latach spędzonych na osłabianiu przez nasze połączone umysły zasłony międzywymiarowej, czujemy się na tyle silni, że możemy rozpocząć dokładniejszą eksploracją.\n\nZ drugiej strony, nasze działania nie przeszły niezauważone. Czeka na nas §H[GetChosenPatron]§!."
 shroud.5115.desc.outro: "W tym tyglu niezliczonych jaźni, jego klarowność jest jak obietnica."
 shroud.5115.desc.composer: "$shroud.5115.desc.intro$\n\n§HROZWIŃ. ODWIŃ. WYSUŃ.§!\n\n$shroud.5115.desc.outro$"
 shroud.5115.desc.eater: "$shroud.5115.desc.intro$\n\n§HPOCZUJ PRAWDZIWY GŁÓD.§!\n\n$shroud.5115.desc.outro$"
 shroud.5115.desc.cradle: "$shroud.5115.desc.intro$\n\n§HZBIERZCIE I PRZYJMIJCIE.§!\n\n$shroud.5115.desc.outro$"
 shroud.5115.desc.instrument: "$shroud.5115.desc.intro$\n\n§HODDAJCIE SIĘ POŻĄDANIU.§!\n\n$shroud.5115.desc.outro$"
 shroud.5115.a: "Powrócimy."
