 building_chamber_of_silence_destroyed_tt: "§RTen budynek zostanie zniszczony, jeśli utracisz tę kolonię.§!"
 shroud.8310.name: "$shroud.2750.name$"
 shroud.8310.desc: "Zostaliśmy wezwani na wyższy poziom istnienia. Ci z nas, którzy wciąż stawiają bezsensowny opór są poddawani czystce, byśmy zachowali świętość naszego awansu. Nasz los został przypieczętowany, droga za nami została pochłonięta przez cień, rzucany przez $pc_shrouded$.\n\n§RGłos§! przemawia do nas teraz z dojmującą jasnością.\n\n§R\"DROGA ZOSTAŁA WYZNACZONA\".§!\n\nPragnie dobrowolnej ofiary."
 shroud.8310.a: "To nieuniknione."
 shroud.8310.a.tt: "Każda kolonia traci 100-300 £pop£ §Hpopulacji§!."
