 auth_shroud_machine_corporeal: "Sieć psioniczna"
 auth_shroud_machine_corporeal_desc: "Dzięki rozciągnięciu swoich sieci pośród skrytych prądów Woalu, te maszyny mogą przesyłać dane praktycznie bez żadnego opóźnienia. Każdy bajt jest wzmocniony potężną wolą psioniczną, co umożliwia tej konfiguracji silne wpływanie na otaczającą ją przestrzeń materialną."
