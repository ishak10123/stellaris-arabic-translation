 # Establishing the Chamber of Silence
 shroud.2820.name: "Powstaje $building_chamber_of_silence$"
 shroud.2820.desc.1: "W miarę jak coraz lepiej posługujemy się psioniką, jesteśmy bombardowani gradem szeptów zza zasłony. §RGłos§!, potężniejszy i wyraźniejszy niż wcześniej, przenika przez te strumienie myśli wprost w cienie naszych umysłów.\n\n§R\"OTWÓRZCIE DROGĘ\".§!"
 shroud.2820.desc.2.intro: "Musimy przefiltrować ten hałas."
 shroud.2820.desc.2.chamber: "$shroud.2820.desc.2.intro$ Zakończyliśmy budowę $shroud.2820.desc.2.outro$"
 shroud.2820.desc.2.no_chamber: "$shroud.2820.desc.2.intro$ Sporządzono plany $shroud.2820.desc.2.outro$"
 shroud.2820.desc.2.outro: "odizolowanej placówki, gdzie nasi najpotężniejsi psionicy będą mogli niesamowicie wyraźnie słyszeć polecenia §RGłosu§!."
 shroud.2820.a.chamber: "Nasze umysły jeszcze bardziej się otwierają."
 shroud.2820.a.no_chamber: "Zbudujmy budynek \"$building_chamber_of_silence$\"."
 CONTINUE_SITUATION: "Kontynuuj §Ysytuację§!:"
 shroud.2820.a.tt: "$CONTINUE_SITUATION$ §H$situation_breach_shroud$§!"
 shroud.2820.a.tt_no_chamber: "Przyjmij tradycję \"§H$tr_psionics_endbringers_cult$§!\" i zbuduj budynek§H$building_chamber_of_silence$§!, aby poczynić postępy w sytuacji."
 # The Great Awakening
 shroud.2830.name: "$utopia.2650.name$"
 shroud.2830.desc: "$building_chamber_of_silence$ pozwoliła nam wyraźnie usłyszeć wiadomość od §RGłosu§!.\n\n§R\"WSZYSCY SIĘ ODRODZĄ\".§!\n\nTeraz rozumiemy. Koniec to odrodzenie. Nie musimy się go obawiać. Powstaniemy na nowo. Lepsi i potężniejsi, niż kiedykolwiek sobie wyobrażaliśmy.\n\nŻeby zrealizować to przeznaczenie, musimy poznać domenę umysłową zwaną §HWoalem§!. Nie powtórzymy błędów tych, których znaleźliśmy na świecie $pc_shrouded$. Oni odrzucili swój strach, my zamierzamy go wykorzystać."
 shroud.2830.desc.outro.awakening: "Widzimy wszystko wyraźnie."
 shroud.2830.desc.outro.no_awakening: "Widzimy wszystko prawie wyraźnie."
 shroud.2830.a.awakening: "Klucz znajduje się w Woalu."
 shroud.2830.a.no_awakening: "$shroud.2780.a$"
 shroud.2830.a.tt: "$tr_psionics_psionic_assimilation_desc$\n$CONTINUE_SITUATION$ §H$situation_breach_shroud$§!"
 shroud.2830.a.tt_no_awakening: "Przyjmij tradycję \"§H$tr_psionics_shroud_great_awakening$§!\", aby uzyskać postępy sytuacji."
 # Blind the Willing - First select event
 shroud.8320.name: "Widzimy wyraźnie."
 shroud.8320.desc: "§H[blinded_leader.GetName]§! wskazuje nam drogę. Nasze jakże zbędne zmysły tłumią zew §RGłosu§!. Pozbywając się jednego z nich, możemy jeszcze bardziej wzmocnić nasze psychiczne umiejętności.\n\n[Species.GetEyeNamePlural] - to ich usunięcie będzie pod tym względem najskuteczniejsze. Nasz wzrok w świecie fizycznym przesłania nam §HWoal§!. [Root.GetSpeciesNamePlural] już teraz w wielkiej liczbie idą za przykładem, jakim świeci §H[blinded_leader.GetName]§!, usuwając bez wahania swoje [Species.GetEyeNamePlural].\n\nCi, którzy to robią, donoszą o wielkim szczęściu, jakie wyraża w ich umysłach §RGłos§!."
 shroud.8320.a: "Sięgać, gdzie wzrok nie sięga."
 leader_trait_blinded: "Oślepienie"
 leader_trait_blinded_desc: "Tyleż jest widoków do zobaczenia."
 # A Leap of Faith - First select event
 shroud.8330.name: "Akt wiary"
 shroud.8330.desc: "Frustracja ograniczeniami ciała sprawia, że §H[forsaken_leader.GetName]§! stara się przyspieszyć swoją psioniczną transformację, spożywając w dramatycznym, publicznym pokazie śmiercionośną toksynę.\n\nUmierające ciało zostało pochłonięte przez jaskrawą, fioletową mgiełkę i rozsypało się w drobny proch czystej psionicznej energii. Takie właśnie cuda umożliwia §RGłos§!.\n\nUznaliśmy to za oczywisty znak: gdzie prowadzi §H[forsaken_leader.GetName]§!, muszą zmierzać też inni."
 shroud.8330.a: "Nasza forma materialna nie może być dla nas hamulcem."
 # Mid-stage events
 shroud.8350.name: "Meldunki z lobotomii"
 shroud.8350.desc: "[owner.GetSpeciesNamePlural] miewają czasem problemy z życiem w harmonii z obecnością §RGłosu§!.\n\nDesperacko pragnąc spokoju, najsłabsi spośród nas uciekają się do prymitywnych, niesankcjonowanych lobotomii. Jeśli nic z tym nie zrobimy, istnieje zagrożenie, że tego rodzaju praktyki staną się powszechne."
 shroud.8350.a: "Niech słabi robią, co muszą."
 shroud.8350.b: "§RGłos§! jest darem. Zakazać tej praktyki."
 endbringers_voice_plague: "Nękani głosami"
 endbringers_voice_plague_desc: "Kiedy głosy przemawiają, my musimy słuchać."
 shroud.8360.name: "Eksperymenty psioniczne na własnym ciele"
 shroud.8360.desc: "Coraz bardziej jednoczymy się z §RGłosem§!. Przemawia do nas prostymi prawdami, którym nie da się zaprzeczyć.\n\n[owner.GetSpeciesNamePlural] szukają dalszych sposobów na wzmocnienie §RGłosu§! i bardziej bezpośrednie czerpanie z jego mądrości.\n\nWykorzystanie czarnorynkowych narkotyków dramatycznie wzrosło. Niesankcjonowane kliniki oferują eksperymentalne usługi mające pomóc w maksymalizacji wrażliwości psionicznej.\n\nDokąd nas to zaprowadzi?"
 shroud.8360.a: "Róbmy, co tylko możemy, żeby szerzyć §RGłos§!."
 shroud.8360.b: "Musimy zapobiec całkowitej anarchii."
 shroud.8370.name: "Apokaliptyczne koszmary"
 shroud.8370.desc: "Rozwój naszych psionicznych umiejętności sprawia, że populacja [owner.GetSpeciesAdj&genitive] coraz częściej zmaga się ze straszliwymi koszmarami wieszczącymi upadek wszechświata.\n\nNasze sny stały się apokaliptycznymi proroctwami, które jeszcze bardziej zwiększają egzystencjalny lęk wśród naszego ludu. Sen stał się niespokojnym stuporem, wskutek którego wielu nie jest w stanie wieść normalnie codziennego życia.\n\nW tych snach §RGłos§! do nas przemawia.\n\n§R\"POGÓDŹCIE SIĘ Z ENTROPIĄ\".§!"
 shroud.8370.a: "Z każdym początkiem wiąże się koniec."
 shroud.8370.b: "$building_chamber_of_silence$ może zapewnić schronienie."
 endbringers_apocalyptic_nightmares: "Apokaliptyczne koszmary"
 endbringers_apocalyptic_nightmares_desc: "Głos zaburza nasze cykle snu wizjami kataklizmów."
 endbringers_nightmare_shelter: "Schronienie przed koszmarami"
 endbringers_nightmare_shelter_desc: "$building_chamber_of_silence$ zapewnia schronienie dla tych, którzy cierpią wskutek koszmarów o kataklizmach."
 shroud.8380.name: "Znak Końca"
 shroud.8380.desc: "Coraz powszechniejsze stają się wśród ludności przypadki samookaleczania.\n\nNajbardziej oddani wyznawcy §RGłosu§! oznaczają swoje ciała znakiem \"Końca\". Twierdzą, że wzór ten obdarza każdego, kto go nosi, straszliwym błogosławieństwem.\n\nCzy to prawda, czy nie, liczba praktykujących takie rytuały gwałtownie wzrasta. Czy to naprawdę może być wola §HWoalu§!?"
 shroud.8380.a: "Nosimy ten symbol z dumą."
 shroud.8380.a.tt: "Połowa naszej populacji zyskuje cechę \"['trait:trait_marked']\"."
 shroud.8380.b: "To niesłuszna praktyka."
 approach_blind_selected_tt: "Podejście $approach_situation_breach_shroud_endbringers_blind$ nie zostało wybrane."
 approach_forsake_selected_tt: "Podejście $approach_situation_breach_shroud_endbringers_forsake_flesh$ nie zostało wybrane."
 trait_marked: "Oznaczenie"
 trait_marked_desc: "Brutalnie demonstrując swoje oddanie, gatunek ten oznaczył swoje ciało znakiem Końca."
 trait_marked_unity_bonus: "£unity£ - wytworzona przez każde 100 £pops£ populacji: §G+0,06§!"
 endbringers_sanity: "Rozsądek pośród szaleństwa"
 endbringers_sanity_desc: "Potężna determinacja, by zachować zdrowie psychiczne, pozwala nam nie wpaść w pułapkę szaleństwa."
 # Breach the Shroud
 shroud.2840.name: "$BREACHING_SHROUD_PROJECT$"
 shroud.2840.desc: "$shroud.2800.intro$ Spośród bezkształtnych głębin rodzi się złowrogi byt o niezmierzonej mocy. To §RGłos§!. Przebija głębię naszej psychiki z druzgocącą siłą.\n\n§R\"ZNAJCIE MOJE IMIĘ\".§!\n\nDopiero teraz wyczuwamy, jak bardzo odległe od §RGłosu§! są nasze małe umysły. Pieczęć uległa złamaniu i wkrótce pełnia tego, kim jesteśmy, objawi się światu.\n\nNasi telepaci są już gotowi zanurzyć się w sercu Woalu i odkryć prawdziwe imię naszego wielkiego patrona."
 shroud.2840.a: "Nadszedł czas się z nim połączyć."
 ENDBRINGERS_COMMUNE_WITH_THE_VOICE: "Połącz się z §RGłosem§!"
 ENDBRINGERS_COMMUNE_WITH_THE_VOICE_DESC: "[capital_scope.GetName]: zebraliśmy się tu w jednym tylko celu.\n\nSięgniemy głęboko w §HWoal§! i zmusimy powalającą moc §RGłosu§!, aby nas dostrzegła i się z nami połączyła.\n\nZnamy ją jako Kataklizm. Inni zwali ją Obrachunkiem. Teraz zaś ujawni przed nami swoje prawdziwe imię. I dzięki tej wiedzy osiągniemy wielkość."
 ENDBRINGERS_COMMUNE_WITH_THE_VOICE_PROJECT_TOOLTIP: "Aby ukończyć: §Hzanurz§! się 3 razy w Woalu. ([GetEndbringersDelveCount]/3)"
 # EotC Delve Events
 shroud.8420.title: "Próba milczenia"
 shroud.8420.desc: "Zanurzamy się w Woalu. Nasza zjednoczona wola pomaga uciszyć chaotyczny hałas, który odciągałby nas od naszego celu, jakim jest §R[Root.Patron:end_of_the_cycle.GetPreCommunicationName]§!.\n\nSamo jednak poczucie misji nas nie ochroni. Głosy szepczą puste słowa, rozpraszają nas rzeczami bez znaczenia, choć niezwykle kuszącymi.\n\nGdy zaczynamy już upadać, istota powraca. W nicości rozlega się prosty rozkaz:\n\n§R\"MILCZEĆ\".§!"
 shroud.8420.a: "Zamilknijmy i przetrwajmy."
 shroud.8420.a.reply: "Polecenie rozcina chaos, ucisza dysharmonijny wrzask, oczyszcza potworny nieporządek, który próbował nas pochłonąć. Nasza psychika wytrzymuje, przetrwaliśmy to rozbicie.\n\n§R[Root.Patron:end_of_the_cycle.GetPreCommunicationName]§! cofa się głębiej w Woal. Jasność myślenia, jaka później następuje, jest niemal równie ogłuszająca. Wdziera się w szczeliny naszych umysłów, napełniając je niezłomnością.\n\nI darami. Jakże wspaniałymi."
 shroud.8420.a.tooltip: "§Y$endbringers_madness_1$§! traci następujący efekt:\n$t$$MOD_POP_AMENITIES_USAGE_MULT$: $@madness_base_pop_amenities_usage_mult|0=-%$"
 shroud.8430.title: "Próba czystości"
 shroud.8430.desc: "W miarę jak zanurzamy się coraz głębiej w Woalu, dostrzegamy spaczenie rozumnego chaosu.\n\nJątrzące się, bezczynne umysły wytwarzają warstwy psionicznych turbulencji, zanieczyszczają Woal cuchnącą zgnilizną. W tym nieznośnym chaosie zaczynamy odczuwać przytłaczającą obecność. To nasza zdobycz: §R[Root.Patron:end_of_the_cycle.GetPreCommunicationName]§!.\n\nPodłością swoich zamiarów przesyca naszą psychikę, gdy rzuca się na panujący tu chaos. Szykujemy się do nadchodzącego zbawienia, gdy w pustce rozlega się rozkaz:\n\n§R\"SPOKÓJ. JEDNOŚĆ\".§!"
 shroud.8430.a: "Wytrzymać!"
 shroud.8430.a.reply: "Rozkaz przesyca żywiący podłe zamiary chaos.\n\nNiezliczone głosy wykrzykują z bólu, gdy §R[Root.Patron:end_of_the_cycle.GetPreCommunicationName]§! zmywa rozumne deformacje brukające Woal. Pozostaje po nich kraina wybawionych niedoskonałości.\n\nGdy byt zanurza się głębiej w Woalu, możemy przyjrzeć się i zbadać to, co pozostało po tym oczyszczeniu absolutnym."
 shroud.8430.a.tooltip: "§Y$endbringers_madness_2$§! traci następujący efekt:\n$t$$mod_planet_pops_upkeep_mult$: $@madness_base_planet_pops_upkeep_mult|0=-%$"
 shroud.8440.title: "Próba płomienia"
 shroud.8440.desc: "Wkraczając w Woal, czujemy wyłącznie ból. Obecne tam zwykle wiry psionicznej mgiełki są jak pożoga, podpalają wręcz esencję naszych umysłów.\n\nPośród tego cierpienia dostrzegamy miasta rozpadające się w roztopioną ruinę, planety pochłonięte przez ogień, całe ludy wyjące w agonii, gdy upiorne płomienie zmieniają ich cielesne kształty w dymiący popiół.\n\nPośrodku stosu wykrywamy obecność. To §R[Root.Patron:end_of_the_cycle.GetPreCommunicationName]§!. Gdy swoją mocą zamierza już pochłonąć rzeczywistość, byt wydaje rozkaz:\n\n§R\"WYZWOLENIE\".§!"
 shroud.8440.a: "Poddajmy się wybawieniu."
 shroud.8440.a.reply: "Płomienie psioniczne spowijają nasze umysły i wypalają próżniactwo. Pozostaje po nich tylko czysta gotowość do działania.\n\nWidzimy teraz chwalebne przeznaczenie, jakim cechuje się §R[Root.Patron:end_of_the_cycle.GetPreCommunicationName]§!. I wspaniała prostota, jaką oferuje."
 shroud.8450.title: "$utopia.3310.name$"
 shroud.8450.desc: "Rozlega się deklaracja:\n\n§R\"ZNACIE MOJE IMIĘ\".§!\n\nKulminacja naszych podróży w gwiazdy, odpowiedź na stulecia pytań, nadeszła. $end_of_the_cycle_color_article_cap$ nas przyciąga. Nasz pakt zostaje zawarty.\n\n§R\"ROZPOCZYNA SIĘ KONIEC\".§!\n\nBól. Cierpienie. Pewność. Gdy słowa gasną, nasz los zostaje przypieczętowany.\n\nTeraz już to widzimy. Galaktykę, która zamilkła. Galaktykę, w której §R$end_aura$§! jest nieuchronnością."
 shroud.8450.a: "Nieuchronność czeka."
 shroud.8450.a.homicidal: "Jakież czekają nas piękne potworności."
 shroud.8450.a.tech_tooltip: "Uzyskane technologie:\n£society£['technology:tech_psionic_aura']\n£society£['technology:tech_aura_intensification']"
 embracing_the_end: "W zgodzie z Końcem"
 embracing_the_end_desc: "Dostrzegamy nareszcie piękno, jakie niesie Koniec. Niech nadejdzie."
 MOD_SHIP_PSIONIC_AURA_SPEED_MULT: "Dowolna $PSIONIC_AURA$: $MOD_SHIP_SPEED_MULT$"
 MOD_SHIP_PSIONIC_AURA_FIRE_RATE_MULT: "Dowolna $PSIONIC_AURA$: $MOD_SHIP_FIRE_RATE_MULT$"
 end_of_the_cycle_endbringers: "$end_of_the_cycle_article_cap$"
 situation_end_of_the_cycle_endbringers_desc: "$end_of_the_cycle_color_article$ swoim paktem zapewnia nam olbrzymią moc, lecz także nadaje nam wspaniały cel.\n\nWola naszego patrona domaga się całkowitej anihilacji tej rzeczywistości. Wraz z każdym układem, który pochłonie §H$end_aura$§!, zbliżać się będzie litościwa nicość.\n\nWszyscy będziemy świadkami nieuniknionego.\n\nUkłady, które pozostały do podbicia: [Owner.GetEndCycleGalaxySystemsLeft]"
 end_of_the_cycle_endbringers_monthly_change_tooltip: "$end_of_the_cycle_monthly_change_tooltip$"
 situation_end_of_the_cycle_endbringers_finish_effects: "§RObrachunek czeka.§!"
 approach_situation_end_of_the_cycle_bring_the_inevitable: "Nie odwlekajmy nieuniknionego"
 approach_situation_end_of_the_cycle_stall_for_time: "Spróbujmy zyskać na czasie"
 approach_situation_end_of_the_cycle_delay_your_destiny: "Opóźnijmy, co nam przeznaczono"
 shroud.8460.title: "Odwrócenie klepsydry"
 shroud.8460.desc: "$end_of_the_cycle_color_article$ zapewnia nam swoją moc nie za darmo. Kończy nam się czas.\n\nGalaktyka pozostaje nienasycona oczyszczającą aurą naszego patrona. I dlatego też nasze starania pozostają nieistotne.\n\nAby pomóc nam w dokończeniu tego monumentalnego dzieła, zza Woalu dociera do nas przypływ energii. To obiecane błogosławieństwo!"
 shroud.8460.a: "Nadal możemy osiągnąć sukces."
 shroud.8470.title: "Koniec jest bliski"
 shroud.8470.desc: "Potęga naszego patrona jest olbrzymia, ale prawie już skończył nam się czas. Tak bezczelna niekompetencja nie będzie tolerowana przez dobrotliwą pustkę, jaką niesie $end_of_the_cycle_color_article$.\n\nPozostaje odrobina nadziei: $end_aura$ musi spowić galaktykę, bez względu na koszt. [GetTelepathPlural] pozyskują teraz w desperacji każdą cząstkę energii, jaką oferuje §HWoal§!."
 shroud.8470.a: "Nie zawiedziemy!"
 shroud.8480.title: "$GALACTIC_FOCUS$ - odrzucono"
 shroud.8480.desc: "Rezolucja uznająca, że emitent, od którego pochodzi niszczycielska §H$PSIONIC_AURA$§!, powinien być cel naszych wysiłków obronnych - została odrzucona przez senat galaktyczny. Na skutek tego wszyscy członkowie Wspólnoty mają natychmiast przerwać wszystkie operacje wojskowe, którego celem jest §H[former_malevolent_aura.GetName]§!. Na razie w tym zakątku galaktyki będzie panował spokój."
 shroud.8481.desc: "Senat galaktyczny odrzucił rezolucję uznającą nas za cel ich wysiłków \"obronnych\". Wszyscy członkowie Wspólnoty otrzymali polecenie przerwania działań militarnych przeciwko nam... na razie."
 shroud.8481.homicidal: "$shroud.8480.desc$\n\n$crisis.4111.nasty$"
 shroud.8500.title: "Zwiastuni Końca"
 shroud.8500.desc.intro: "Nieunikniona wola naszego patrona ogarnia całą galaktykę. Wiemy teraz, w jaki sposób nadejdzie koniec.\n\n§R$end_aura$§! musi szerzyć się w galaktyce. Kiedy świat fizyczny połączy się z tą nieokiełznaną energią §HWoalu§!, niedługo potem dojdzie do prawdziwej anihilacji."
 shroud.8500.desc.outro: "To będzie nasze magnum opus i brama do ostatecznego zbawienia."
 shroud.8500.desc.homicidal: "$shroud.8500.desc.intro$\n\nWymazanie wszelkiego życia w tej galaktyce będzie miłym skutkiem ubocznym. $shroud.8500.desc.outro$"
 shroud.8500.desc.default: "$shroud.8500.desc.intro$\n\n$shroud.8500.desc.outro$"
 shroud.8500.a: "Nie możemy zawieść."
 shroud.8600.title: "$shroud.4970.title$"
 shroud.8600.desc.intro: "Takie było nasze przeznaczenie.\n\n§R$end_aura$§! spowija galaktykę. [Root.GetHomeWorldName] to miejsce, w którym wszyscy wpadają w stan szaleńczej euforii ku chwale"
 shroud.8600.desc.outro: "Oto nadchodzi nasze chwalebne odrodzenie, obiecane nam od czasów naszego wielkiego przebudzenia.\n\nNa naszych oczach wszelkie istnienie zostaje pochłonięte przez pustkę. Zniszczenie, anihilacja - oto ostatnie pozostałe prawa galaktyki. Jeden po drugim, całe światy zapadają się w nicość, z której się niegdyś wyłoniły.\n\nMy zostaniemy zabrani jako ostatni. To... piękne. Widzimy to już w delikatnej formie tego, co nowe. Koniec nadszedł. Za nim zaś kroczy początek."
 shroud.8600.desc.homicidal: "$shroud.8600.desc.intro$ zniszczenia wszystkiego, co nie jest nami. $shroud.8500.desc.outro$"
 shroud.8600.desc.default: "$shroud.8600.desc.intro$ naszego litościwego zbawienia. $shroud.8600.desc.outro$"
 shroud.8600.a: "Ostateczność jest... niemożliwa."
 shroud.8610.title: "Cena słabości"
 shroud.8610.desc.intro: "Zawiedliśmy. Wskutek naszej słabości $end_of_the_cycle_color_article$ nie jest chwalebnym przeznaczeniem świata. Teraz zaś przyszło nam zapłacić cenę za naszą niekompetencję.\n\nStraciliśmy wszystko, co mamy. W mgnieniu oka imperium [Root.GetName]... przepadło. Tam, gdzie wcześniej rozkwitały kolonie, pozostały tylko ruiny. Tam, gdzie wcześniej potężne floty przemierzały kosmos, pozostały tylko cisza i zniszczenie. Wszystko zostało pochłonięte przez Koniec. Wszystko zabrał §HWoal§!."
 shroud.8610.desc.outro: "Tak więc się stało, iż nasz patron zmaterializował się tam, gdzie [former_capital.GetName]. Niezwykle potężny po pochłonięciu świadomości naszych psioników, przemierza teraz galaktykę, pragnąc dokończyć dzieła, które dla nas okazało się zbyt trudne."
 shroud.8610.desc.a: "$shroud.8610.desc.intro$\n\n$shroud.8610.desc.outro$"
 shroud.8610.desc.b: "$shroud.8610.desc.intro$\n\n[Root.GetSpeciesNamePlural] z radością wyczekują tego przeznaczenia, niewielka grupa niewiernych jednak nie chce poddać się wielkiej woli naszego patrona. To wygnańcy, na czele których stoi §H[Root.GetRulerName]§!, potężna psioniczna osobowość, która wiedziała od początku, co nadejdzie. Ukryli się oni na świecie pozostającym poza wpływem Końca.\n\n$shroud.8610.desc.outro$ Kiedy się to dokona, ruszy również po wygnańców."
 shroud.8610.a: "Być może taki właśnie był od początku nasz los..."
 shroud.8610.b: "Czy wygnańcy rzeczywiście zdołają oprzeć się jego potędze?"
 shroud.8710.title: "Przetrwanie apokalipsy"
 shroud.8710.desc: "Dokonało się. §RObrachunek§! został zniszczony.\n\n$end_of_the_cycle_color_article_cap$ powraca w głębiny §HWoalu§!. Zagrożenie, jakie stanowi dla naszego fizycznego świata, zostało na razie zażegnane.\n\nGdy ciało awatara tej potężnej istoty rozpłynęło się w nicość, odzyskaliśmy z powodzeniem fizyczną pozostałość jego ucieleśnienia. Nawet śmierć nie ukróciła emisji wyczuwanych przez naszych telepatów niesamowitych ilości energii psionicznej, o wiele większej niż ta, którą emituje fragment znaleziony na świecie zwanym §H[shrouded_planet.GetName]§!.\n\nTen rdzeń skoncentrowanej nieuchronności może posłużyć do odbudowy z popiołów galaktyki, która przetrwała Obrachunek.\n\nKoniec nadszedł i przeminął, my jednak trwamy dalej."
 shroud.8710.a: "Czy taki był od początku nasz los?"
 r_core_of_the_reckoning: "Rdzeń Obrachunku"
 r_core_of_the_reckoning_desc: "Ten odzyskany ze szczątków Obrachunku rdzeń wciąż promieniuje wysokimi poziomami energii psionicznej."
 core_of_reckoning_active_effect_tt: "Odblokowuje jedną £decision£ §Ydecyzję planetarną§!: ['concept_banish_decision']"
 decision_banish: "Wygnaj"
 decision_banish_desc: "Pozwalając Woalowi pochłonąć to miejsce, przywróciliśmy równowagę rdzeniowi Obrachunku."
 decision_banish_effects_tt: "Wygnaj tę planetę poza Woal."
 concept_banish_decision: "$decision_banish$"
 concept_banish_decision_desc: "Dodano modyfikator $decision_banish_desc$\n$decision_banish_effects_tt$\n§Y$shroud_surge$§! na §Y10§! lat:\n$shroud_surge_effects$."
 shroud_surge: "Wzmożenie Woalu"
 shroud_surge_desc: "$r_core_of_the_reckoning$ odzyskuje tymczasowo równowagę."
 shroud_surge_effects: "§Y$r_core_of_the_reckoning$§!: podwojenie pasywnych efektów."
 #======================
 # Shroud Leaders
 #======================
 ganthuata: "Ganthuata"
 ganthuata_desc: "$the_cradle_of_souls_article$ ma w tej osobie oddanego ucznia, który pragnie odkryć i ujawnić głębokie prawdy wszystkim, którzy są w stanie je pojąć."
 ganthuata_catch_phrase: "Rzucamy się w objęcia Kolebki."
 leader_trait_disciple_of_the_cradle: "Uczeń Kolebki"
 leader_trait_disciple_of_the_cradle_desc: "Im więcej widzimy, tym więcej wiemy. $the_cradle_of_souls_article$ zyskuje na bezpieczeństwie, kiedy obserwujemy naszych sąsiadów."
 leader_trait_disciple_of_the_cradle_envoys_zro: "$t$- Posłowie przydzieleni do patronów generują §G+0,5§! £zro£ §Y$sr_zro$§! na miesiąc"
 shroud.12010.desc: "§HNasza łączność z Woalem przyciągnęła kolejny głos, który do nas przemówił. Jego ciepłe, kojące tony odbijają się echem w świecie fizycznym i mentalnym.§!\n\nWitajcie. Jestem Ganthuata i przybywam szukać podobnie myślących, którzy pojęli prawdziwą ścieżkę. Czy znany jest wam przekaz, jaki niesie $the_cradle_of_souls_article$?"
 shroud.12010.name: "$ganthuata$"
 shroud.12010.a: "$the_cradle_of_souls_article$ do nas przemawia. Dlaczego pytasz?"
 shroud.12010.a.response: "Czemu? Co nakazuje jakiemukolwiek wędrowcowi nagabywać tych, których spotyka na swej drodze? Aby lepiej zrozumieć tego, od kogo pragną odpowiedzi, przyjaciele. Kiedy wy przemawiacie, ja się uczę."
 shroud.12010.b: "Czego od nas chcesz?"
 shroud.12010.b.response: "A czego pragną ci, którym siłę dała Kolebka? Na dobry początek - szukam waszej przyjaźni. Całą epokę już próbuję znaleźć umysły zestrojone ze splendorem Kolebki. A teraz w jej świetle kąpie się cała cywilizacja."
 shroud.12010.c: "Jak możesz nam pomóc?"
 shroud.12010.c.response: "Poniosę wasz przekaz w gwiazdy. Razem pchnijmy galaktykę w łagodne objęcia Kolebki."
 shroud.12010.hire_custom_tooltip: "§Y$ganthuata$§! dołącza do naszego imperium jako §Hprzywódca§!."
 koborokra: "Koborok'Ra"
 koborokra_desc: "Dawny żołnierz, ofiara ekstremalnych psionicznym tortur zadanych dawno temu. Obecnie admirał o wywołanym udręką nienasyconym apetycie na zniszczenie."
 koborokra_catch_phrase: "Krew czeka na rozlanie."
 leader_trait_disciple_of_the_eater: "Krwawa ofiara"
 leader_trait_disciple_of_the_eater_desc: "Ten przywódca złożył przysięgę, iż $the_eater_of_worlds_article$ otrzyma niezbędną krew."
 leader_trait_disciple_of_the_eater_attunement_effect: "$the_eater_of_worlds_article$: §G+$@disciple_of_the_eater_combat_attunement$§! dostrojenia na każdą wygraną bitwę kosmiczną"
 leader_trait_disciple_of_the_eater_zro_fleet_attack_effect: "$t$- §G+$@disciple_of_the_eater_zro_fleet_attack|1$§! $i_zro$ na każdy 1% zniszczenia spowodowanego bombardowaniem orbitalnym"
 leader_trait_disciple_of_the_eater_zro_army_attack_effect: "$t$- §G+$@disciple_of_the_eater_zro_army_attack|0$§! $i_zro$ na każdy 1% zniszczenia spowodowanego przez armie uderzeniowe"
 shroud.12020.name: "$koborokra$"
 shroud.12020.desc: "§HZnoszony w boju pancerz i splamiona krwią peleryna ukrywają zamaskowaną postać. Milczenie przecina szorstki warkot.§!\n\nTa galaktyka zasługuje na cierpienie. Czuję, że myślicie to samo.\n\n§HKiedy admirał przemawia, gładzi rękojeść ozdobnej broni białej.§!\n\nPrzyzwano mnie do was, lecz to $the_eater_of_worlds_color_article$ prawdziwie mną włada."
 shroud.12020.desc.covenant: "$shroud.12020.desc$ Tak jak i wami."
 shroud.12020.desc.no_covenant: "$shroud.12020.desc$ Być może zawładnie i wami."
 shroud.12020.a: "Czemu chcesz do nas dołączyć?"
 shroud.12020.a.response: "Razem możemy zadusić gwiazdy w każdym zakątku tej galaktyki. Są granice cierpienia, jakie można zadać samodzielnie."
 shroud.12020.b: "Czy możemy ci ufać?"
 shroud.12020.b.response: "$the_eater_of_worlds_article_cap$ włada każdym moim oddechem. Ma moją przysięgę wierności, ten moment zaś pokazuje się w moich snach. Służę wam nie ze swojej woli. Jeśli mnie odrzucicie, przypieczętujecie mój los."
 shroud.12020.c: "Czemu służysz komuś takiemu jak $the_eater_of_worlds_article$?"
 shroud.12020.c.response: "Zdradzono mnie, złamano, pozostawiono cierpieniu. $the_eater_of_worlds_article_cap$ to głos, który do mnie przemówił. Pobłogosławił tym, co było mi potrzebne do przetrwania. Zakrwawionym bandażem na zakrwawione rany. Mocą, aby odciąć ręce, które zadały mi cierpienie. Teraz zaś spłacam ten dług."
 shroud.12020.d: "Co możesz nam zaoferować?"
 shroud.12020.d.response: "Razem skąpiemy niezliczone układy w oczyszczającym płomieniu i nasycimy uszy symfonią wrzasków. Będziemy patrzeć na płonące światy. Razem pokażemy galaktyce rzeczy nie do zapomnienia. Oto nasze przeznaczenie."
 shroud.12020.hire_custom_tooltip: "§Y$koborokra$§! dołącza do naszego imperium jako §Hprzywódca§!."
 morr: "Morr"
 morr_desc: "Ta istota parała się niegdyś zwykłym poszukiwaniem surowców, lecz wystawienie na długotrwałe działanie żył niestabilnego $zro_lower$ sprawiło, że $the_instrument_of_desire_article$ ma z nią silną, szaleńczą więź. I wykorzystuje ją do pozyskiwania absurdalnego wręcz bogactwa. Eksploatuje odkrywkowo całe światy i sprzedaje zdobycz po horrendalnych cenach."
 morr_catch_phrase: "Co migocze, to nasze."
 leader_trait_disciple_of_the_instrument: "Serce Zachłanności"
 leader_trait_disciple_of_the_instrument_desc: "$the_instrument_of_desire_article$ ma z tym przywódcą silną więź. Potrafi on wykrywać obecność zasobów w najbardziej nawet niegościnnych zakątkach galaktyki."
 leader_trait_disciple_of_the_instrument_planetary_decision_effect: "Zapewnia dostęp do decyzji planetarnej: §Y$decision_divine_deposits$§!"
 decision_divine_deposits: "Wywieszczenie złóż"
 decision_divine_deposits_desc: "$the_instrument_of_desire_article$ wykorzystuje swe tajemnicze moce, by zarządca tej planety odkrył złoża zasobów uważanych za dawno wyczerpane."
 decision_divine_deposits_tt: "Dodaje losowe zasoby do cech planetarnych."
 shroud.12030.name: "$morr$"
 shroud.12030.desc: "§H$morr$ ma niezwykle niespokojne spojrzenie, przeskakujące między cieniem a blaskiem, jakby stale tropiące.§!\n\nTy też to czujesz, prawda? $the_instrument_of_desire_article_cap$ nigdy nie śpi. Pożąda. Pożera. Oczekuje.\n\nCo widzę, to biorę. Żaden dar natury nie oparł się mojej woli. Oferuję ci moją służbę nie z wierności, lecz dlatego, że razem możemy zburzyć gwiazdy i dać nicości, co jej się należy."
 shroud.12030.a: "Czemu chcesz do nas dołączyć?"
 shroud.12030.a.response: "$the_instrument_of_desire_article_cap$ nie zna opamiętania. [root.species.GetHandNamePlural] muszą licznie pracować, aby je zadowolić."
 shroud.12030.b: "Co możesz nam zaoferować?"
 shroud.12030.b.response: "Mogę pomóc wam pozyskać każdą dającą się sprzedać molekułę natury, co do ostatka. Nie ostanie się jeden atom, który byłby niepozyskany, nieoznaczony, niesprzedany.\n\nCi, którzy szepczą \"dość\", to tchórze. Żałośni. Niech gniją. Razem zdobędziemy wszystko."
 shroud.12030.c: "Czemu służysz komuś takiemu jak $the_instrument_of_desire_article$?"
 shroud.12030.c.response: "Moją pracą było niegdyś poszukiwanie zasobów, podążanie za każdą gorączką, którą zesłały gwiazdy. Gęste od pyłu powietrze, zniszczone skanery, wyeksploatowane złoża. A potem przemówiło $the_instrument_of_desire_article$.\n\nObiecało bogactwo nie do pojęcia. A w zamian oczekiwało tylko uległości.\n\nWięc służę. Pozyskuję. Dostarczam. Dług jest wiekuisty. Ale bogactwa? Och, nigdy się nie kończą."
 shroud.12030.hire_custom_tooltip: "§Y$morr$§! dołącza do naszego imperium jako §Hprzywódca§!."
 kronen: "Kronen Schorzały"
 kronen_desc: "Niegdyś wizjonerski umysł, teraz cień dawnej chwały. Wypaczenie geniuszu nauki, które spowodował $the_composer_of_strands_article$. Pozostał już - niczym ginąca w ciemności gwiazda - tylko niewiarygodnie potężny intelekt."
 kronen_catch_phrase: "Tyle zostało do odkrycia..."
 leader_trait_disciple_of_the_composer: "Tkackie schorzenie"
 leader_trait_disciple_of_the_composer_desc: "Im więcej ukształtuje ciała, tym słabsze ma swoje własne. $the_composer_of_strands_article_cap$ przekształca każdego, kto śmie nauczyć się jego zakazanej sztuki."
 shroud.12040.name: "$kronen$"
 shroud.12040.desc: "§HNasze czujniki wykrywają wlatującą w nasze granice jednostkę. Pośród Woalu rozlega się znękany głos. Pełen zmęczenia, przeszywający, lecz niepokojąco znajomy, niczym szum, który wydaje z siebie $the_composer_of_strands_article$.§!\n\n[GetKronenFlesh]? Nowa odmiana? Ciekawe. TTo jest tak miękkie. Tak... podatne na zmiany. A może i nie? Trudno powiedzieć. Tyle ruchomych węzłów skrywa [GetKronenSkin]. Co wysnuł dziś dla mnie $the_composer_of_strands_article$?\n\n§HŁączność w końcu się stabilizuje. Ukazuje nam się istota złożona z czystych, stale zmieniających formę mięśni. Drżąca, nerwowo coś zapisująca.§!\n\nWidzicie mnie, oto jestem. Być może wciąż można o mnie mówić \"$kronen$\". Być może nie. Ale czuję, że jesteście, jak ja, płótnem czekającym, aż Tkacz położy na was farbę. Chodźcie. Rozpocznijmy rozpad."
 shroud.12040.a: "Rozpocznijmy? Co rozpocznijmy?"
 shroud.12040.a.response: "Och, wylinkę, rzecz jasna. Zrzucanie tych prymitywnych, niedoskonałych skorup. Rozplecenie nici, które nas kształtują, które narzucają pewność. I wy zostaliście dotknięci przez Tkacza. To się już zaczęło. Nie czujecie tego wibrowania? To [GetSkinType], gotowa, by ją porzucić."
 shroud.12040.b: "Dlaczego chcesz do nas dołączyć?"
 shroud.12040.b.response: "Nie czujecie tego? Znaku odciśniętego na każdej drżącej nici? Muszę się rozpleść, zrzucić to, czym byłem, stać się świadkiem własnego zniknięcia w miarę, jak rozerwę szwy, które spajają mnie z ciałem. Ale wy... jesteście imperium. Rozległym. Pełnym możliwości. Razem możemy pociągnąć za nici o wiele mocniejsze, niż ktokolwiek z nas mógłby uchwycić samodzielnie."
 shroud.12040.c: "Jak możesz nam pomóc?"
 shroud.12040.c.response: "Proponuję więcej niż pomoc. Moje ciało to dar, eksperyment bólu i celu, dzieło, które stworzył $the_composer_of_strands_article$. Każda cząstka mnie krzyczy w cierpieniu, lecz ja trwam dalej. Badam. Uczę się. A to, co daje moje cierpienie... wy możecie kształtować. Pod warunkiem, że zrobicie to wspólnie ze mną."
 shroud.12040.hire_custom_tooltip: "§Y$kronen$§! dołącza do naszego imperium jako §Hprzywódca§!."
 shroud.12045.desc: "§HW miarę, jak rośnie liczebność naszej ludności, $kronen$ wpada w coraz większy szał. Mówi coraz bardziej drżącym głosem, a ciało ma dygoczące, nerwowe, pełne frustracji.§!\n\nNici nie mają końca... Wiją się, a ja ciągnę je, szarpię, lecz splot trzyma! Jak długo jeszcze muszę znosić ten przeklęty kształt? Ile jeszcze skóry muszę zrzucić, zanim objawi mi się wzór?"
 shroud.12045.a: "Z czym masz problem?"
 shroud.12045.a.response: "Problem? Jeden? Och, to przeurocze. Z każdym fragmentem, który odrzucę, z każdą lśniącą nicią, którą oderwiemy, splot tylko się zacieśnia! A $the_composer_of_strands_article$ przez cały ten czas nuci swoją ohydną, przeszywającą do cna melodię..."
 shroud.12045.a.response_2: "$shroud.12045.a.response$\n\n$shroud.12045.desc_2$"
 shroud.12045.b: "Potrzebujesz przerwy?"
 shroud.12045.b.response: "Przerwy? Nie, nigdy. Stagnacja jest niedopuszczalna. Nie możemy pozwolić temu podłemu ciału gnić w przeciętności... Potrzebuję obiektów doświadczalnych. Materiału do kształtowania, rzeźbienia, nadawania formy."
 shroud.12045.b.response_2: "$shroud.12045.b.response$\n\n$shroud.12045.desc_2$"
 shroud.12045.c: "Możemy ci jakoś pomóc?"
 shroud.12045.c.response: "Możecie mi przypomnieć... moją przeszłość? Powiedzcie, czy podczas pierwszej rozmowy moje kończyny miały ten sam kolor? Czy moje rogówki były równie zamglone? Kiedy próbuję sobie przypomnieć, moje ciało odmienia się tylko bardziej.\n\nNie... Pamięć nie ma tu wartości. Objawienie drzemie w samej zmianie. $the_composer_of_strands_article$ nie dba już o to, co było kiedyś. Odejdźcie. Muszę... pomyśleć."
 shroud.12045.c.response_2: "$shroud.12045.c.response$\n\n$shroud.12045.desc_2$"
 shroud.12045.desc_2: "§HKronen doznaje potężnych konwulsji. Zaczyna świecić białkami oczu. Ciało pulsuje, jakby pod jego powierzchnią pękały bąbelki, a potem... nieruchomieje. Groteskowa przemiana kończy się równie nagle, jak się zaczęła.§!\n\nAch... Witajcie. Potrzeba wam czegoś?"
 shroud.12045.d: "Wszystko w porządku?"
 shroud.12045.d.response: "Oczywiście. Skąd to pytanie? Nici otworzyły mój umysł jeszcze szerzej, przekształciły to niewydajne ciało, aby było bardziej takie, jak życzy sobie tego $the_composer_of_strands_article$. A teraz zechciejcie wybaczyć. Wciąż wiele nici czeka na sprucie. Zbyt wiele pustych skorup czeka na porzucenie.\n\n§HGdy transmisja dobiega końca, w Woalu rozbrzmiewa rezonans. Na jakąkolwiek przypadłość cierpi teraz Kronen... nie jest ona przypadkowa. To wola, jaką żywi $the_composer_of_strands_article$.§!"
 shroud.12045.end: "Daru od Tkacza nie wolno lekceważyć."
 zulyn: "Zulyn Słuchacz"
 zulyn_desc: "Uczona istota, która porzuciła ograniczenia konwencjonalnej nauki, aby gonić za tajemnicami, jakie objawiają szaleńczym echem $whisperers_in_the_void_article$."
 zulyn_catch_phrase: "Musimy tylko słuchać..."
 shroud.12050.name: "$zulyn$"
 shroud.12050.desc: "§HTrzeszcząc, układ komunikacyjny budzi się do życia. Dobiega z niego mamroczący, lecz pełen upiornego pośpiechu głos.§!\n\nWitaj. Widzę, że ty też nasłuchujesz. Słyszałem twój głos... Nie. Głosy. Słyszałem je pośród kakofonii. Też go teraz słyszycie, prawda? Chór, w którym śpiewają $whisperers_in_the_void_color_article$? Ich przyciszone dary, ich wymruczaną histerię?\n\nTakie tajemnice są niebezpieczne dla tych, którzy nie umieją ich pojąć. Mogę jednak pomóc je odsłonić. Oferuję swoje wsparcie w starciu z ogromną powodzą paradoksów nękających myśli. To nie ma być obelga. Nawet ja nie umiałem niegdyś pojąć ich prawdziwych znaczeń."
 shroud.12050.a: "I czemu sądzisz, że jesteś w stanie pomóc?"
 shroud.12050.a.response: "Przebiliście §HWoal§!, nieprawdaż? Powiedzcie jednak - czy nim zawładnęliście? Mam za sobą całe życie tworzenia map jego głębin, opisywania niepojętego dryfu jego bytów i echa, jakie tworzą w naszej delikatnej krainie.\n\nSzepczący prowadzą mnie już od dawna. Mogę pomóc zrozumieć każde przyprawiające o obłęd słowo, które kłębi się teraz w waszych myślach."
 shroud.12050.b: "Skąd wiesz o Szepczących?"
 shroud.12050.b.response: "Kataloguję ich szepty od lat, czekając na ten właśnie moment. Teraz i wy jesteście połączeni z jego różnorodnym chórem. I nie zmarnuję tej szansy na poznanie ukrytych w jego słowach prawd."
 shroud.12050.c: "Co nam proponujesz?"
 shroud.12050.c.response: "Spędzone na badaniach życie nauczyło mnie skupienia, odkrywania struktur naszej fizycznej rzeczywistości i bezgranicznych głębin §HWoalu§!.\n\nRazem uwolnimy się od ograniczeń tej sfery rzeczywistości. Tajemnice wszechświata będą czekać, aż je odkryjemy. To obiecuję wam z absolutną pewnością."
 shroud.12050.hire_custom_tooltip: "§Y$zulyn$§! dołącza do naszego imperium jako §Hprzywódca§!."
 leader_trait_disciple_of_the_whisperers: "Szepty pośród Woalu"
 leader_trait_disciple_of_the_whisperers_desc: "Ten przywódca słyszy, jak $whisperers_in_the_void_article$ rozbrzmiewają pośród Woalu, co zapewnia niespotykany naukowy wgląd w ukryte mechanizmy fizycznego wszechświata."
 leader_trait_disciple_of_the_whisperers_effects: "$t$- $@disciple_of_the_whisperers_tech_zro|0=+$ $i_zro$ po odkryciu §Yrzadkiej§! lub §Ypsionicznej§! technologii"
 ouwron: "Ouw'ron"
 ouwron_desc: "Po wygnaniu z jego wędrownego klanu przez ujrzenie, jak odbywa się $end_of_the_cycle_article$, Ouw'ron przemierza gwiazdy, poszukując jego łaski. Teraz, gdy na horyzoncie pojawia się $NAME_Reckoning$, płonie żądzą działania i nie pozwoli, żeby cokolwiek stanęło mu na drodze."
 ouwron_catch_phrase: "Nadejdzie dzień Obrachunku..."
 shroud.12060.name: "$ouwron$"
 shroud.12060.desc_1: "§HUkład komunikacyjny zostaje zalany falą niezrozumiałych sygnałów. Pośród tego chaosu przebija się w końcu jeden głos.§!\n\nNareszcie jesteście. Nie na czas, ale też nie nazbyt spóźnieni. Bez obaw, umiem spojrzeć poza wąskie granice więzienia, które zwiemy rzeczywistością. Ofiara została złożona. Moja droga jest jasna."
 shroud.12060.desc_blind: "\n§HWtedy właśnie pojmujemy: istota ta, podobnie jak my, poświęciła swój wzrok w służbie sprawie.§!"
 shroud.12060.desc_default: "\n§HWtedy właśnie dostrzegamy: oczodoły istoty są puste. Wzrok porzuciła dawno temu.§!"
 shroud.12060.desc_2: "\nNo już, nie ma powodu do wstydu. Wiem, że znana wam jest wysublimowana prostota, jaką niesie $end_of_the_cycle_color_article$. Dołączcie do mnie w jedności. Razem wymusimy jego nadejście."
 shroud.12060.a: "Od jak dawna wiesz, czym jest $end_of_the_cycle_article$?"
 shroud.12060.a.response: "Dłużej, niż sięga moja świadomość. Jak w przypadku wszystkich umysłów, moja wiedza pozostaje uśpiona, dopóki §HWoal§! nie uchyla jej rąbka. Wtedy też jego zamiary stają się jasne. Nasz cel jest prosty: doprowadzić do nadejścia końca."
 shroud.12060.b: "Czemu chcesz nam pomóc?"
 shroud.12060.b.response: "Pytasz o coś, co już wiesz. I ja, i wy dostrzegliśmy nieuchronność tego, co się stanie. Rozpad już się rozpoczął. Nie ma innej drogi niż przez niego. Wspólnie spadamy w korkociągu ku zakończeniu."
 shroud.12060.c: "Co nam oferujesz?"
 shroud.12060.c.response: "Jestem ledwie pyłem tego umierającego cyklu, jak my wszyscy. Co mogę prawdziwie zaoferować? Umysły gasną w galaktyce, a moim zadaniem jest prowadzić je jak najszybciej. Tę samą litościwość chcę okazać i wam."
 shroud.12060.hire_custom_tooltip: "§Y$ouwron$§! dołącza do naszego imperium jako §Hprzywódca§!."
 leader_trait_disciple_of_the_end: "Apostoł końca"
 leader_trait_disciple_of_the_end_desc: "Oddany apostoł, $end_of_the_cycle_article$ jest dla niego wszystkim. Niezłomna wiara, że nadejdzie $NAME_Reckoning$, odbija się echem w każdej toczonej przez niego walce."
 leader_trait_disciple_of_the_end_effects: "$t$- $@disciple_of_the_end_aura_intensity|0=+$ do intensywności aury na każdy zniszczony w układzie okręt$TABBED_NEW_LINE$- $@disciple_of_the_end_jumpdrive_range|0=+%$ $MOD_SHIP_FTL_JUMPDRIVE_RANGE_MULT$ podczas przebywania w: §H$end_aura$§!"
 shroud.12155.name: "Czysta pewność"
 shroud.12155.desc: "§HWszystkie czyny mają swoje konsekwencje. Gdy nasz układ łączności budzi się do życia, $ouwron$ zsyła na nas potęgę swojego świętego gniewu.§!\n\nHeretycy! Głupcy! Oszuści! Powinniśmy byli wiedzieć. Powinniśmy byli was zniszczyć w chwili, kiedy wasza przeklęta esencja ośmieliła się wkroczyć w §HWoal§!.\n\nPrzez was nieuniknione, przepowiedziany koniec, uległo opóźnieniu! Co waszym zdaniem da ten opór? Wszystko, co mogliście zyskać, właśnie przepadło.\n\nKoniec jest tylko jeden. Więc śpiewajcie... i pogrążcie się w nicości!"
 shroud.12155.tt: "$ouwron$ obraca się przeciwko nam!"
 NAME_Ouwron_Battleship: "$battleship$"
 NAME_Ouwron_Destroyer: "$destroyer$"
 shroud.12160.title: "Wypowiedziano wojnę"
 shroud.12160.desc: "Imperium [global_event_country.GetGalCommunityOrGalImperium] przyjęło rezolucję, która uznaje nas za cel wojskowy. Wszyscy członkowie organizacji [global_event_country.GetGalCommunityOrGalImperium] są teraz w stanie wojny z imperium [this.GetName]. Spodziewamy się, że ich floty uderzą lada chwila."
 shroud.12160.a: "$extreme_frontiers.1531.i$"
