 shroud.first_contact_insert.instrument: "§Hoszalały impuls§!"
 shroud.4035.title: "$the_instrument_of_desire_article_cap$ wyłania się"
 shroud.4035.desc.all.start: "Po wielu miesiącach daremnych wezwań, §H[Root.Patron:the_instrument_of_desire.GetPreCommunicationName]§! wyłania się wreszcie z otchłani §HWoalu§!."
 shroud.4035.desc.default: "$shroud.4035.desc.all.start$\n\nWiadomość od istoty była jak potop. Myśli z ogromną siłą wdarły się w nasze umysły, mówiły o naszych najśmielszych pragnieniach. Słowa przepływały przez nas, energiczne i niezliczone, wyparły wszystko z naszego jestestwa. Wiadomość była kusząca: wizja potęgi oraz spełnienia.\n\n$shroud.4035.desc.default.end$"
 shroud.4035.desc.default.end: "Fala zelżała, stała się niewielkim strumieniem. Obecność nie oczekiwała odpowiedzi. Jeszcze. Zostawiła nas z pragnieniem, którego nie sposób ugasić.\n\nTeraz wiemy, czego chce ta istota. Znamy jej wizję nieograniczonego bogactwa. Kiedy nasi [GetTelepathPlural] odpoczną, możemy skontaktować się i porozumieć z tym stworzeniem zwanym $the_instrument_of_desire_color_article$."
 shroud.4035.desc.hive: "$shroud.4035.desc.all.start$\n\nWiadomość od istoty była jak potop. Myśli z ogromną siłą wdarły się w nasze umysły, mówiły o naszych najśmielszych pragnieniach. Słowa przepływały przez nas, energiczne i niezliczone, wyparły wszystko z naszego jestestwa. Wiadomość była ożywcza: wizja niemierzalnej produkcji.\n\n$shroud.4035.desc.default.end$"
 shroud.4035.desc.gestalt_machine: "$shroud.4035.desc.all.start$\n\nWiadomość od istoty była jak potop. Dane z ogromną siłą wdarły się w nasze obwody, przewyższając ilościowo wszystkie otrzymane dotąd dane. Egzotyczny kod przepływał przez nas, pełen energii i ogromny, wyparł wszytko z naszych systemów. Wiadomość była ożywcza: wizja niemierzalnej produkcji.\n\n$shroud.4035.desc.machine.end$"
 shroud.4035.desc.machine.end: "Fala zelżała, stała się niewielkim strumieniem. Obecność nie oczekiwała odpowiedzi. Jeszcze. Zostawiła nas z podzieloną pustką, która domaga się eleganckich danych.\n\nTeraz wiemy, czego chce ta istota. Znamy jej wizję nieograniczonego bogactwa. Kiedy nasi [GetTelepathPlural] naładują się, możemy skontaktować się i porozumieć z tym stworzeniem zwanym $the_instrument_of_desire_color_article$."
 shroud.4035.desc.individual_machine: "$shroud.4035.desc.all.start$\n\nWiadomość od istoty była jak potop. Myśli z ogromną siłą wdarły się w nasze umysły, mówiły o naszych najśmielszych pragnieniach. Słowa przepływały przez nas, energiczne i niezliczone, wyparły wszystko z naszego jestestwa. Wiadomość była ożywcza: wizja niemierzalnej produkcji.\n\n$shroud.4035.desc.machine.end$"
