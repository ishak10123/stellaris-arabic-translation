 decision_thought_police_desc: "$decision_thought_police$ wykrywa [GetCriminalDeviant] zamiary, zanim przerodzą się one w działanie. Wykorzystuje techniki naukowe do monitorowania kognitywnej aktywności populacji i dostarcza dzięki temu wiedzy o stanach umysłu, nie korzystając groźnych energii §HWoalu§!."
