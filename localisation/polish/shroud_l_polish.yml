 CLEAR_PATRON_FIRST_CONTACT: "Odrzućmy wszelką wiedzę o tym, czym jest $PATRON$, i ukryjmy ją w §YWoalu§!."
 START_PATRON_FIRST_CONTACT: "Rozpocznijmy proces komunikacji i dowiedzmy się, co ma do powiedzenia $PATRON$."
 COMPLETE_PATRON_FIRST_CONTACT: "Ujawnij: $PATRON$ w §YWoalu§!. Dostępny poprzez menu §Ykontaktów§!."
 shroud.11225.title: "Nagłe zniknięcie"
 shroud.11225.desc.common_1: "Wszystko zniknęło w jednej chwili.\n\nZłośliwa §R$end_aura$§! znajdująca się w naszych układach nagle zniknęła i wszystko ze sobą zabrała. Całe gwiazdy zapadły się w czarne dziury, planety zniknęły - została po nich tylko głucha cisza."
 shroud.11225.desc.common_2: "Być może nigdy nie dowiemy się, jakie szaleństwo przywołało tę niszczycielską moc."
 shroud.11225.desc.default: "$shroud.11225.desc.common_1$\n\n$shroud.11225.desc.common_2$"
 shroud.11225.desc.mitigated: "$shroud.11225.desc.common_1$ Wygląda na to, że nasze działania mające odeprzeć aurę odniosły pewne łagodzące skutki, ocaliliśmy, co się dało.\n\n$shroud.11225.desc.common_2$"
 shroud.11225.a: "Jak to możliwe?"
 SPECIAL_PROJECT_CALLING: "Zew wiedzy"
 SPECIAL_PROJECT_CALLING_DESC: "$whisperers_in_the_void_color_article_cap$ pragną wiedzy wykraczającej poza ograniczenia konwencjonalnej myśli. [Owner.GetResearchers] otrzymują od nas pozwolenie na skupienie się na ezoterycznych obszarach wiedzy. Pozwoli nam to zaspokoić pragnienia Szepczących."
 physics_technology_CALLING_PROJECT: "$SPECIAL_PROJECT_CALLING$"
 physics_technology_CALLING_PROJECT_DESC: "$SPECIAL_PROJECT_CALLING_DESC$"
 society_technology_CALLING_PROJECT: "$SPECIAL_PROJECT_CALLING$"
 society_technology_CALLING_PROJECT_DESC: "$SPECIAL_PROJECT_CALLING_DESC$"
 engineering_technology_CALLING_PROJECT: "$SPECIAL_PROJECT_CALLING$"
 engineering_technology_CALLING_PROJECT_DESC: "$SPECIAL_PROJECT_CALLING_DESC$"
 RECKONING_ARRIVAL_PROJECT: "Pojedynek z Obrachunkiem"
 RECKONING_ARRIVAL_PROJECT_DESC: "Galaktyce zagraża niezmiernie potężna istota zwana §R$NAME_Reckoning$§!. Składa się ona z czystej energii, zmaterializowała się niespodziewanie i rozpoczęła kampanię zniszczeń.\n\nWszystkie dostępne dane wskazują, że mamy do czynienia z przeciwnikiem, jakiego nigdy wcześniej nie spotkaliśmy. Jeżeli chcemy zmierzyć się z tym zagrożeniem, powinniśmy pilnie rozpocząć badania nad skuteczniejszymi metodami walki."
 shroud.11235.title: "$RECKONING_ARRIVAL_PROJECT$"
 shroud.11235.desc: "Nasi [GetScientistPlural] zakończyli wnikliwe badania potężnej istoty zwanej §R$NAME_Reckoning$§!.\n\nIch ustalenia pozwoliły nam znaleźć skuteczną metodę walki z tym wrogiem za pomocą posiadanej przez nas technologii. Energię, z której składa się $NAME_Reckoning$, można osłabić za pomocą zmodyfikowanych wersji uzbrojenia przeznaczonego do przebijania osłon energetycznych.\n\nChoć to potężny wróg, teraz mamy większe szanse w walce z nim."
 shroud.11235.a: "$extreme_frontiers.1531.i$"
 RECKONING_VULNERABILITY_PROJECT: "Na pewno ma jakąś słabość"
 RECKONING_VULNERABILITY_PROJECT_DESC: "Choć nam się nie udało, to starcie z istotą zwaną §R$NAME_Reckoning$§! dostarczyło nam bezcennych danych do badań.\n\nDogłębne badanie tej istoty energetycznej pozwoli znaleźć jej słabości i opracować skuteczniejsze metody ataku."
 shroud.11240.title: "Nauka po porażce"
 shroud.11240.desc: "§R$NAME_Reckoning$§! to potęga, z którą nasze floty nie mogą się równać. Mimo porażki, konfrontacja przyniosła nam ogromną ilość danych o tej tajemniczej istocie energetycznej. Tych informacji nie zdobylibyśmy bez kontaktu bezpośredniego.\n\nWczesna analiza wskazuje, że zebraliśmy dostatecznie dużo punktów danych, by stworzyć model budowy tej istoty. W toku dalszych badań możemy spróbować znaleźć jej słabe punkty i w oparciu o tę wiedzę usprawnić nasze ataki."
 shroud.11240.a: "Na pewno ma jakąś słabość."
 shroud.11245.title: "$NAME_Reckoning$: słabość"
 shroud.11245.desc.1: "Nasi [GetScientistPlural] dokonali przełomu w badaniach istoty energetycznej zwanej §R$NAME_Reckoning$§!."
 shroud.11245.desc.2.intro: "Ta istota nie tylko wyłoniła się z"
 shroud.11245.desc.2.outro: "Wykorzystując lasery należące do klasy posiadającej właściwości tłumienia psioniki, nasze floty mogą zakłócić to połączenie i odsłonić tę istotę na atak psioniczny."
 shroud.11245.desc.2.psionic: "$shroud.11245.desc.2.intro$ §HWoalu§!, ale dzięki międzywymiarowemu połączeniu z wymiarem psionicznym wciąż posiada moc obronną. $shroud.11245.desc.2.outro$"
 shroud.11245.desc.2.non_psionic: "$shroud.11245.desc.2.intro$ innego wymiaru rzeczywistości, ale dzięki tajemniczemu połączeniu międzywymiarowemu wciąż posiada moc obronną. $shroud.11245.desc.2.outro$"
 reckoning_insight_modifier: "Informacje o Obrachunku"
 reckoning_insight_modifier_desc: "Dzięki skrupulatnym badaniom poznaliśmy skuteczną metodę zadawania uszkodzeń istocie zwanej $NAME_Reckoning$, używając zmodyfikowanych wersji naszego uzbrojenia."
 reckoning_vulnerability_modifier: "Słabość Obrachunku"
 reckoning_vulnerability_modifier_desc: "Dzięki danym z naszego poprzedniego spotkania z Obrachunkiem, znaleźliśmy sposób na zadanie mu większych uszkodzeń za pomocą laserów tłumiących psionikę."
