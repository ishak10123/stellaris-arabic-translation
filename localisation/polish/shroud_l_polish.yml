 PATRON_REVENGE_PROJECT: "Awatar zemsty"
 PATRON_REVENGE_PROJECT_DESC: "zsyła na nas swój niepohamowany gniew. $SHROUD_TUNNEL_GALACTIC$ pojawia się w układzie [event_target:selected_planet_for_revenge.solar_system.GetName]. Nasi [GetTelepathPlural] czują szybko zbliżającą się złą wolę naszego dawnego patrona.\n\nMusimy przygotować się do obrony."
