 # Eater of Worlds
 shroud.4500.title: "$utopia.3304.name$"
 shroud.4500.desc.default: "[GetEaterCovenantProposedEvent]"
 shroud.4500.desc.hive: "$shroud.4500.desc.default$"
 shroud.4500.desc.gestalt_machine: "$shroud.4500.desc.default$"
 shroud.4500.desc.individual_machine: "$shroud.4500.desc.default$"
 shroud.4500.desc.1: "Sięgając w Woal, wyczuwamy nienasycony głód złowrogiej istoty."
 shroud.4500.desc.pacifist: "$shroud.4500.desc.1$$utopia.3306.desc.2$\n\nTa niecierpliwość jest groźna. Czy nasze umysły zdołają przyjąć takiego potwora?"
 shroud.4500.desc.non_pacifist: "$shroud.4500.desc.1$$utopia.3306.desc.2$\n\nChyba bardzo chce zaczynać."
 shroud.4500.a: "Zawrzyjmy pakt z: $the_eater_of_worlds_color_article$."
 shroud.4505.desc.intro: "Stało się. Zawarliśmy pakt z: $the_eater_of_worlds_color_article$. Wola tej istoty przepływa przez: §H[Root.GetName]§!."
 shroud.4505.desc.outro: "Kiedy zbudowaliśmy naszą więź, Pożeracz odebrał swoją daninę: nagle zniknęła cała populacja jednego z naszych miast. To niewielka cena, chyba że Pożeracz znowu zgłodnieje."
 shroud.4505.desc.default: "$shroud.4505.desc.intro$\n\n[GetEaterCovenantFormedDesc]\n\n$shroud.4505.desc.outro$"
 shroud.4505.desc.hive: "$shroud.4505.desc.intro$\n\n[GetEaterCovenantFormedDesc]\n\n$shroud.4505.desc.outro$"
 shroud.4505.desc.gestalt_machine: "$shroud.4505.desc.hive$"
 shroud.4505.desc.individual_machine: "$shroud.4505.desc.intro$\n\nW naszym społeczeństwie już zaszły wykrywalne zmiany. Nasze jednostki wojskowe są bardziej skoncentrowane na walce, muszą uczestniczyć w wymagających symulacjach bojowych, w przeciwnym razie ich zapał zamieni się w barbarzyństwo.\n\n$shroud.4505.desc.outro$"
 shroud.4505.desc_2_pacifist: "Nasze społeczeństwo już zaczęło się zmieniać. Nasze umysły zmagają się z pragnieniem walki. Ten dysonans poznawczy wywołuje wielki dyskomfort w naszej zwykle pokojowo nastawionej populacji. Czy dokonaliśmy właściwego wyboru?"
 shroud.4505.desc_2_organic_non_gestalt: "W naszym społeczeństwie już zaszły widoczne zmiany. Nasi wojskowi są spragnieni walki, w czasie pokoju trzeba ich intensywnie szkolić, by ich zapał nie zamienił się w barbarzyństwo."
 shroud.4505.desc_2_machine_non_gestalt: "W naszym społeczeństwie już zaszły wykrywalne zmiany. Nasze jednostki wojskowe są bardziej skoncentrowane na walce, muszą uczestniczyć w wymagających symulacjach bojowych, w przeciwnym razie ich zapał zamieni się w barbarzyństwo."
 shroud.4505.desc_2_gestalt: "W naszym społeczeństwie już zaszły wykrywalne zmiany. Nasze wojskowe [GetIndividualNamePlural] są bardziej skoncentrowane na walce, muszą uczestniczyć w wymagających symulacjach bojowych, w przeciwnym razie ogarnie je ślepa agresja."
 shroud.4505.a.default: "Oby nie."
 shroud.4505.a.gestalt: "Warto zapłacić tę cenę."
 shroud.4510.desc.intro: "Minął już jakiś czas, odkąd stworzyliśmy fundamenty paktu z:"
 shroud.4510.desc.outro: ". Nasza więź nadal jest słaba, zatem wciąż mamy szansę ją zerwać lub wzmocnić.\n\nNasi [GetTelepathPlural] ustalili, że zatwierdzenie zobowiązania pozwoli nam aktywnie korzystać z mocy dostarczanych przez naszego patrona, a także ulepszyć nasze floty. Również $PSIONIC_AURA$ stanie się silniejsza."
 shroud.4510.desc: "$shroud.4510.desc.intro$$the_eater_of_worlds_color_article$$shroud.4510.desc.outro$"
 shroud.4510.b: "$the_eater_of_worlds_color_article$ nie ma z nami nic wspólnego."
 shroud_eater_covenant_chain_title: "$eater_covenant_chain_title$"
 shroud_eater_covenant_chain_desc.intro: "Zbudowaliśmy więź z istotą z Woalu nazywaną $the_eater_of_worlds_color_article$. Jest nienasycona, daje nam ona okruchy swej potęgi, jednak za pewną cenę.\n\nNasi [GetTelepathPlural] przypuszczają, że tę więź można wzmocnić, jeśli zacieśnimy współpracę z naszym patronem."
 shroud_eater_covenant_chain_desc: "$shroud_eater_covenant_chain_desc.intro$\n\nGłodny Pożeracz robi się niecierpliwy. Pragnie wojny, słodkiego smaku lamentów i cierpień."
 shroud_eater_covenant_chain_begin: "$eater_covenant_chain_begin$"
 shroud_eater_covenant_chain_end: "$eater_covenant_chain_end$"
 robot_shroud_eater_covenant_chain_title: "$shroud_eater_covenant_chain_title$"
 robot_shroud_eater_covenant_chain_desc: "$shroud_eater_covenant_chain_desc.intro$\n\nGłodny Pożeracz robi się niecierpliwy. Pragnie wojny, słodkiego smaku zniszczeń i pożogi."
 # Instrument of Desire
 shroud.4550.title: "$utopia.3304.name$"
 shroud.4550.desc.default: "Gdy tylko zanurzyliśmy się w Woalu, obecność sięgnęła ku nam. Nasi [GetTelepathPlural] czują, jak jej myśli zwijają się i skręcają wokół ich umysłów, targując się i przypochlebiając. To $the_instrument_of_desire_color_article$, które da nam bogactwo, władzę, prestiż... wszystko, czego zawsze pragnęliśmy. Wszystko, czego kiedykolwiek zapragniemy.\n\nCena? Błahostka, jedynie pokrycie kosztów. Ucieleśnienie chce tylko tego, co dla nas najlepsze. Pomoże nam, poprowadzi nas, pokieruje naszymi ambicjami i marzeniami.\n\n§HJeśli tylko przyjmiemy je do naszych serc.§!\n\nJest pewne naszej zgody. Jakże moglibyśmy odrzucić taką ofertę?"
 shroud.4550.desc.hive: "$shroud.4550.desc.default$"
 shroud.4550.desc.gestalt_machine: "Gdy tylko zanurzyliśmy się w Woalu, obecność sięgnęła ku nam. Nasi [GetTelepathPlural] czują, jak jej myśli zwijają się i skręcają wokół ich obwodów, targując się i przypochlebiając. To $the_instrument_of_desire_color_article$, które da nam bogactwo, władzę, prestiż... wszystko, czego zawsze pragnęliśmy. Wszystko, czego kiedykolwiek zapragniemy.\n\nCena? Błahostka, jedynie pokrycie kosztów. Ucieleśnienie chce tylko tego, co dla nas najlepsze. Pomoże nam, poprowadzi nas, pokieruje naszymi ambicjami i marzeniami.\n\n§HJeśli tylko przyjmiemy je do naszych jednostek centralnych.§!\n\nJest pewne naszej zgody. Jakże moglibyśmy odrzucić taką ofertę?"
 shroud.4550.desc.individual_machine: "$shroud.4550.desc.gestalt_machine$"
 shroud.4550.a: "Zawrzyjmy pakt z: $the_instrument_of_desire_color_article$."
 shroud.4555.desc.intro: "Stało się. Zawarliśmy pakt z: $the_instrument_of_desire_color_article$. Wola tej istoty przepływa przez: §H[Root.GetName]§!."
 shroud.4555.desc.outro: "To cena naszej więzi. Nasi [GetTelepathPlural] twierdzą, że największe błogosławieństwa Ucieleśnienia są jeszcze przed nami."
 shroud.4555.desc.default: "$shroud.4555.desc.intro$\n\nKoszt tego porozumienia jest już dobrze widoczny. Kiedy czekamy na obiecaną złotą erę bogactwa i dobrobytu, populacji nie cieszą już zwykłe ułatwienia życia. [Root.GetSpeciesNamePlural] chcą teraz wszelkiego rodzaju dóbr materialnych, to nowe obciążenie dla naszej gospodarki.\n\n$shroud.4555.desc.outro$"
 shroud.4555.desc.hive: "$shroud.4555.desc.intro$\n\nKoszt tego porozumienia jest już dobrze wykrywalny. Kiedy czekamy na obiecaną złotą erę niezrównanej produkcji, wzrosły podstawowe potrzeby naszych dronów. Wszystkie osobniki [Root.GetSpeciesAdj&genitive] potrzebują teraz przeróżnych, zbędnych towarów. To nowe obciążenie dla naszej gospodarki.\n\n$shroud.4555.desc.outro$"
 shroud.4555.desc.gestalt_machine: "$shroud.4555.desc.hive$"
 shroud.4555.desc.individual_machine: "$shroud.4555.desc.default$"
 shroud.4555.a.default: "Oby mieli rację."
 shroud.4555.a.gestalt: "Wierzymy, że się nie mylą."
 shroud.4560.desc: "$shroud.4510.desc.intro$$the_instrument_of_desire_color_article$$shroud.4510.desc.outro$"
 shroud.4560.b: "$the_instrument_of_desire_color_article$ nie ma z nami nic wspólnego."
 shroud_instrument_covenant_chain_title: "$instrument_covenant_chain_title$"
 shroud_instrument_covenant_chain_desc.intro: "Zbudowaliśmy więź z istotą z Woalu nazywaną §HUcieleśnieniem Żądzy§!. Jest rozpieszczona, daje nam ona okruchy swej potęgi, jednak za pewną cenę. Na pewno będzie ich więcej.\n\nNasi [GetTelepathPlural] przypuszczają, że tę więź można wzmocnić, jeśli zacieśnimy współpracę z naszym patronem."
 shroud_instrument_covenant_chain_desc: "$shroud_instrument_covenant_chain_desc.intro$\n\nUcieleśnienie pożąda przyjemności. Nakręcają je wyuzdane przyjemności, dekadencja i niewolnictwo."
 shroud_instrument_covenant_chain_begin: "$instrument_covenant_chain_begin$"
 shroud_instrument_covenant_chain_end: "$instrument_covenant_chain_end$"
 robot_shroud_instrument_covenant_chain_title: "$shroud_instrument_covenant_chain_title$"
 robot_shroud_instrument_covenant_chain_desc: "$shroud_instrument_covenant_chain_desc.intro$\n\nUcieleśnienie pożąda przyjemności. Nakręcają je niepohamowana konsumpcja, wyzysk i niewolnictwo."
 # Cradle of Souls
 shroud.4600.title: "$utopia.3304.name$"
 shroud.4600.desc.default: "[GetCradleCovenantProposedDesc]"
 shroud.4600.desc.hive: "$shroud.4600.desc.default$"
 shroud.4600.desc.gestalt_machine: "$shroud.4600.desc.default$"
 shroud.4600.desc.individual_machine: "$shroud.4600.desc.default$"
 shroud.4600.desc_homicidal: "Gdy zanurzamy się w Woalu, jakaś obecność wdziera się do naszej wewnętrznej wizji. Potężny blask przesłania wszystko. To $the_cradle_of_souls_color_article$ płonie wewnątrz nas.\n\nDomaga się kompromisu na galaktyczną skalę, żałosnego pokoju niekompatybilnych istot. Obiecuje, że czeka na nas wielka moc, jeśli zgodzimy się zrealizować tę ohydną wizję.\n\n§HMusimy tylko pozwolić jej ukształtować nowe horyzonty.§!\n\nŚwiatło Kolebki jest niestrudzone, a jej moc bezsprzeczna. Czy nasze umysły zdołają objąć coś takiego? Czy to nie osłabi naszej determinacji?"
 shroud.4600.desc_non_homicidal: "Gdy nasze umysły zanurzają się w Woalu, kiełkuje w nas jakaś obecność. Wyczuwamy blask, który dotyka wszystkiego, emanując równowagą i porządkiem. Ta istota to $the_cradle_of_souls_color_article$ i poruszyła nas do głębi.\n\nNie chce niczego innego niż trwałego pokoju, galaktyki wyleczonej z chaosu. Jeśli zaakceptujemy jej wizję, uczyni nas heroldami harmonii. Obiecuje stworzenie więzi niezłomnego zaufania.\n\n§HJeśli tylko pozwolimy, by ta istota kształtowała nasze horyzonty.§!\n\nSpływają na nas nadzieje Kolebki."
 shroud.4600.a: "Zawrzyjmy pakt z: $the_cradle_of_souls_color_article$."
 shroud.4605.intro: "Stało się. Zawarliśmy pakt z: $the_cradle_of_souls_color_article$. Wola tej istoty przepływa przez: §H[Root.GetName]§!."
 shroud.4605.desc.default: "$shroud.4605.desc.non_gestalt$"
 shroud.4605.desc.gestalt: "$shroud.4605.intro$\n\n[GetCradleCovenantFormedDesc]"
 shroud.4605.desc.non_gestalt: "$shroud.4605.intro$\n\n[GetCradleCovenantFormedDesc]"
 shroud.4605.desc.hive: "$shroud.4605.desc.gestalt$"
 shroud.4605.desc.gestalt_machine: "$shroud.4605.desc.gestalt$"
 shroud.4605.desc.individual_machine: "$shroud.4605.desc.non_gestalt$"
 shroud.4605.desc_outro_homicidal: "Wpływ na jestestwo [Root.GetSpeciesAdj&genitive] jest już niezaprzeczalny. [Root.GetIndividualPlural] mają umysły zatrute myślami o pokoju galaktycznym, co wywołuje ogromny dysonans w całym naszym społeczeństwie.\n\nNasi [GetTelepathPlural] uważają, że korzyści z tego układu są dopiero przed nami. Do tego czasu, nasze umysły zatruwa straszliwy konflikt. Co myśmy sobie zrobili?"
 shroud.4605.desc_outro_gestalt: "Wpływ na jestestwo [Root.GetSpeciesAdj&genitive] jest już wykrywalny. Ponieważ chcemy pokojowych stosunków w całej galaktyce, wszelkie nieporozumienia z naszymi sąsiadami wywołują zamęt w świadomości zbiorowej.\n\nTo niewielkie zakłócenie to cena naszej więzi. Nasi [GetTelepathPlural] twierdzą, że największe błogosławieństwa Kolebki są dopiero przed nami."
 shroud.4605.desc_outro_non_gestalt: "Wpływ na jestestwo [Root.GetSpeciesAdj&genitive] jest już wyraźny. Ponieważ pragniemy pokojowych stosunków w całej galaktyce, wszelkie nieporozumienia z naszymi sąsiadami wywołują niepokój w całej populacji.\n\nTo niewielkie zakłócenie to cena naszej więzi. Nasi [GetTelepathPlural] twierdzą, że największe błogosławieństwa Kolebki są dopiero przed nami."
 shroud.4605.a.default: "[GetCradleCovenantFormedOption]"
 shroud.4605.a.gestalt: "[GetCradleCovenantFormedOption]"
 shroud.4605.opt.a.default: "Oby mieli rację."
 shroud.4605.opt.a.gestalt: "Wierzymy, że się nie mylą."
 shroud.4605.opt.a.homicidal: "Póki co, możemy tylko trwać."
 shroud.4610.desc: "$shroud.4510.desc.intro$$the_cradle_of_souls_color_article$$shroud.4510.desc.outro$"
 shroud.4610.b: "$the_cradle_of_souls_color_article$ nie ma z nami nic wspólnego."
 shroud_cradle_covenant_chain_title: "$the_cradle_of_souls$"
 shroud_cradle_covenant_chain_desc: "Zbudowaliśmy więź z istotą z Woalu nazywaną $the_cradle_of_souls_color_article$. Jest zgodna, daje nam okruchy swej potęgi, jednak za pewną cenę.\n\nNasi [GetTelepathPlural] przypuszczają, że tę więź można wzmocnić, jeśli zacieśnimy współpracę z naszym patronem.\n\nKolebka pragnie galaktyki wolnej od konfliktów i chaosu, której wszyscy mieszkańcy są zjednoczeni w pracy na rzecz pokoju. Musi zapanować doskonała równowaga."
 shroud_cradle_covenant_chain_begin: "$BEGINS_EVENT_CHAIN$ §Y$shroud_cradle_covenant_chain_title$§!"
 shroud_cradle_covenant_chain_end: "$ENDS_EVENT_CHAIN$ §Y$shroud_cradle_covenant_chain_title$§!"
 robot_shroud_cradle_covenant_chain_title: "$shroud_cradle_covenant_chain_title$"
 robot_shroud_cradle_covenant_chain_desc: "$shroud_cradle_covenant_chain_desc$"
 # Composer of Strands
 shroud.4650.title: "$utopia.3304.name$"
 shroud.4650.desc.default: "Jakaś obecność czeka na nas w Woalu i wita nas ciepło. Porozumiewa się nie za pomocą słów, lecz wizji, pojęć i idei. Nasi [GetTelepathPlural] czują, jak wnika w ich umysły tak płynnie i delikatnie, że można pomyśleć, iż zawsze tam była. Przed nimi przewija się lawina obrazów.\n\nTa obecność nazywa się $the_composer_of_strands_color_article$ i z wielką ciekawością obserwuje nasze organiczne formy. Pokazuje nam różne sposoby, dzięki którym można je rozwinąć, zmienić. Ulepszyć. Udoskonalić.\n\n§HMusimy tylko przyjąć go do naszego ciała.§!\n\nCierpliwie czeka na naszą odpowiedź. Jest czuły jak kochający rodzic, czekający na swoje ulubione dziecko."
 shroud.4650.desc.hive: "$shroud.4650.desc.default$"
 shroud.4650.desc.gestalt_machine: "Jakaś obecność czeka na nas w Woalu i wita nas ciepło. Porozumiewa się nie za pomocą słów, lecz wizji, pojęć i idei. Nasi [GetTelepathPlural] czują, jak wnika w ich obwody tak płynnie i delikatnie, że można pomyśleć, iż zawsze tam była. Przed nimi przewija się lawina obrazów.\n\nTa obecność nazywa się $the_composer_of_strands_color_article$ i z wielką ciekawością obserwuje nasze mechaniczne formy. Pokazuje nam różne sposoby, dzięki którym można je zaadaptować, zmienić. Ulepszyć. Udoskonalić.\n\n§HMusimy tylko przyjąć go do naszych części.§!\n\nCierpliwie czeka na naszą odpowiedź. Jest czuły jak kochający rodzic, czekający na swoje ulubione dziecko."
 shroud.4650.desc.individual_machine: "$shroud.4650.desc.gestalt_machine$"
 shroud.4650.a: "Zawrzyjmy pakt z: $the_composer_of_strands_color_article$."
 shroud.4655.desc.intro: "Stało się. Zawarliśmy pakt z: $the_composer_of_strands_color_article$. Wola tej istoty przepływa przez: §H[Root.GetName]§!."
 shroud.4655.desc.outro: "To oczywiste, że oddaliśmy częściową kontrolę nad formą [Root.GetSpeciesAdj&genitive], teraz nasz patron może ją dowolnie zmieniać.\n\nTo niewielkie poświęcenie w zamian za naszą nową więź. Nasi [GetTelepathPlural] twierdzą, że największe błogosławieństwa Tkacza dopiero nadejdą."
 shroud.4655.desc.default: "$shroud.4655.desc.intro$\n\nNasi [GetScientistPlural] już wykryli anomalne wzory w strukturze genetycznej próbek materiału [Root.GetSpeciesAdj&genitive], wygląda to, jakby z dnia na dzień zaszły w nich zmiany, na które zwykle trzeba wielu pokoleń. $shroud.4655.desc.outro$"
 shroud.4655.desc.hive: "$shroud.4655.desc.default$"
 shroud.4655.desc.individual_machine: "$shroud.4655.desc.intro$\n\nNasi [GetScientistPlural] już wykryli anomalne wzory w strukturze molekularnej obwodów testowych [Root.GetSpeciesAdj&genitive], jakby z dnia na dzień dokonano w nich ulepszeń, na które zwykle trzeba wielu pokoleń. $shroud.4655.desc.outro$"
 shroud.4655.desc.gestalt_machine: "$shroud.4655.desc.individual_machine$"
 shroud.4655.a.default: "$covenant.composer.option$"
 shroud.4655.a.gestalt: "Za potęgę trzeba zapłacić."
 shroud.4660.desc: "$shroud.4510.desc.intro$$the_composer_of_strands_color_article$$shroud.4510.desc.outro$"
 shroud.4660.b: "$the_composer_of_strands_color_article$ nie ma z nami nic wspólnego."
 shroud_composer_covenant_chain_title: "$composer_covenant_chain_title$"
 shroud_composer_covenant_chain_desc.intro: "Zbudowaliśmy więź z istotą z Woalu nazywaną $the_composer_of_strands_color_article$. Jest opiekuńcza, daje nam okruchy swej potęgi, jednak za pewną cenę. Na pewno będzie ich więcej.\n\nNasi [GetTelepathPlural] przypuszczają, że tę więź można dodatkowo wzmocnić, jeśli zacieśnimy współpracę z naszym patronem."
 shroud_composer_covenant_chain_desc: "$shroud_composer_covenant_chain_desc.intro$\n\nTkacz chce dokonywać manipulacji genetycznych, by wyzwolić ciało z kajdan ewolucji. Opowiada nam o szacunku dla życia i natury, a także o świętości ciała."
 shroud_composer_covenant_chain_begin: "$composer_covenant_chain_begin$"
 shroud_composer_covenant_chain_end: "$composer_covenant_chain_end$"
 robot_shroud_composer_covenant_chain_title: "$shroud_composer_covenant_chain_title$"
 robot_shroud_composer_covenant_chain_desc: "$shroud_composer_covenant_chain_desc.intro$\n\nTkacz chce manipulować formą materialną i umożliwić rozwój wolny od konwencjonalnych ograniczeń. Opowiada nam o szacunku dla życia i natury, a także o świętości ciała."
 # Whisperers in the Void
 shroud.4700.title: "$utopia.3304.name$"
 shroud.4700.desc: "$utopia.3304.desc.shroud$"
 shroud.4700.a: "Zawrzyjmy pakt z: $whisperers_in_the_void_color_article$."
 shroud.4700.b: "$shroud.reject_covenant$"
 shroud_whisperers_in_the_void_covenant_formed_effect: "$t$£unity£ $mod_country_base_unity_produces_add$: §R-15%§!"
 shroud.4705.desc.intro: "Stało się. Zawarliśmy pakt z: $whisperers_in_the_void_color_article$. Wola tej istoty przepływa przez: §H[root.GetName]§!.\n\nWpływy naszego patrona szybko zaczęły działać."
 shroud.4705.desc.outro: "To cena tej potężnej więzi. Nasi [GetTelepathPlural] twierdzą, że największe błogosławieństwa Szepczących są jeszcze przed nami. Bezpośrednia komunikacja z taką wspaniałą istotą psioniczną z pewnością jest tego warta."
 shroud.4705.desc.gestalt: "$shroud.4705.desc.intro$ Nasz kolektyw czeka na falę ukrytej wiedzy, czujemy, jak nasze myśli rozchodzą się w różne wzory. Niezmienna harmonia z jaką działa [GetNetworkName] została zakłócona narastającą kakofonią wewnętrznych głosów.\n\n$shroud.4705.desc.outro$"
 shroud.4705.desc.non_gestalt: "$shroud.4705.desc.intro$ Pragniemy ukrytej wiedzy, przez co opinie i idee w naszym społeczeństwie stały się bardziej różnorodne. Kakofonia wewnętrznych głosów niszczy nasze jaźnie i zagraża umysłowemu dobrostanowi wszystkich przedstawicieli gatunku [root.GetSpeciesAdj&genitive].\n\n$shroud.4705.desc.outro$"
 shroud.4705.desc.default: "$shroud.4705.desc.non_gestalt$"
 shroud.4705.desc.hive: "$shroud.4705.desc.gestalt$"
 shroud.4705.desc.gestalt_machine: "$shroud.4705.desc.gestalt$"
 shroud.4705.desc.individual_machine: "$shroud.4705.desc.non_gestalt$"
 shroud.4705.a.default: "Poradzimy sobie."
 shroud.4705.a.gestalt: "$shroud.4705.a.default$"
 shroud.4710.title: "$utopia.2658.name$"
 shroud.4710.desc: "$shroud.4510.desc.intro$$whisperers_in_the_void_color_article$$shroud.4510.desc.outro$"
 shroud.4710.a: "$utopia.2658.a$"
 shroud.4710.b: "$whisperers_in_the_void_color_article$ nie mają z nami nic wspólnego."
 shroud_whisperers_in_the_void_covenant_accepted_effect: "$t$ £research£ Badań miesięcznie za: $pop_group_unit$ $telepath_type_plural_with_icon$: $@telepath_whisperers_research|0=+$"
 # End of the Cycle
 shroud.4715.desc.intro: "Stało się. Zawarliśmy pakt z: $end_of_the_cycle_color_article$. Gdy przyjęliśmy propozycję tej istoty, nasi [GetTelepathPlural] ponownie przemówili: §R\"TO POCZĄTEK KOŃCA\"§!."
 shroud.4715.desc.default: "$shroud.4715.desc.intro$\n\nPotem zapadła cisza. Niezgłębiona cisza, która wypełniła umysły wszystkich [root.GetSpeciesAdj&genitive]. Tam, gdzie w naszych świadomościach kiedyś kłębiły się niezliczone energie §HWoalu§!, królestwo psioniczne jest teraz ciche, jakby było wymarłe.\n\nPozostaje nam tylko zastanowić się nad konsekwencjami tego, co na siebie ściągnęliśmy."
 shroud.4715.desc.hive: "$shroud.4715.desc.intro$\n\nPotem zapadła cisza. Niezgłębiona cisza, która wypełniła umysły wszystkich [root.GetSpeciesAdj&genitive]. Tam, gdzie nasz [GetBrainName] kipiał niezliczonymi energiami §HWoalu§!, królestwo psioniczne jest teraz bezwładne, jakby nie istniało.\n\nPozostaje nam tylko oszacować konsekwencje tego, co na siebie ściągnęliśmy."
 shroud.4715.desc.gestalt_machine: "$shroud.4715.desc.default$"
 shroud.4715.desc.individual_machine: "$shroud.4715.desc.default$"
 shroud.4715.a.default: "Niech jego wola będzie łaskawa."
 shroud.4715.a.gestalt: "$shroud.4715.a.default$"
 shroud_whisperers_covenant_chain_title: "$whisperers_covenant_chain_title$"
 shroud_whisperers_covenant_chain_desc: "Zbudowaliśmy więź z istotą z Woalu nazywaną $whisperers_in_the_void_color_article$. Jest niezgłębiona, obiecuje dać nam okruchy swej potęgi, jednak za pewną cenę.\n\nNasi [GetTelepathPlural] przypuszczają, że tę więź można wzmocnić, działając zgodnie z wolą naszego patrona.\n\nSzepczący lubią zdobywać nową wiedzę, poznawać ciche tajemnice i spiski. Czerpią przyjemność z zapełniania umysłu aż do granic możliwości tak, że zaczyna pękać w szwach."
 shroud_whisperers_covenant_chain_begin: "$whisperers_covenant_chain_begin$"
 shroud_whisperers_covenant_chain_end: "$whisperers_covenant_chain_end$"
 robot_shroud_whisperers_covenant_chain_title: "$shroud_whisperers_covenant_chain_title$"
 robot_shroud_whisperers_covenant_chain_desc: "$shroud_whisperers_covenant_chain_desc$"
 shroud.11110.title: "Cykl trwa"
 shroud.11110.desc: "§HSzepczący§! zmieniają się gwałtownie, ich głosy zagłuszają wszystko w naszych umysłach. Chcą się z nami porozumiewać i zalać nasze umysły wiedzą.\n\nPrzed nami nieodwracalny wybór."
 shroud.11110.a: "Wchłoń: $the_eater_of_worlds_article$"
 shroud.11110.b: "Wchłoń: $the_cradle_of_souls_article$"
 shroud.11110.c: "Wchłoń: $the_instrument_of_desire_article$"
 shroud.11110.d: "Wchłoń: $the_composer_of_strands_article$"
 shroud.11120.title: "[GetBetrayedPatronColour] mści się"
 shroud.11120.title.eater: "$the_eater_of_worlds_color_article$ mści się"
 shroud.11120.title.cradle: "$the_cradle_of_souls_color_article$ mści się"
 shroud.11120.title.instrument: "$the_instrument_of_desire_color_article$ mści się"
 shroud.11120.title.composer: "$the_composer_of_strands_color_article$ mści się"
 shroud.11120.desc: "Gdy nasi [GetTelepathPlural] wyłonili się z §HWoalu§!, przekonaliśmy się, że po naszej zdradzie istota [GetBetrayedPatronColour] wpadła w gniew.\n\n$SHROUD_TUNNEL_GALACTIC$ wyłania się w pobliżu świata §H[event_target:selected_planet_for_revenge.GetName]§!, który jest teraz bezkresnym pustkowiem - [GetFeltLoc] namacalną furię po drugiej stronie tunelu. Nasz dawny patron z pewnością planuję zemstę."
 shroud.11120.a: "Musimy przygotować się do obrony."
 shroud.11120.a.tt: "§H[event_target:selected_planet_for_revenge.GetName]§! zamienia się w: §Y$pc_shrouded$§!.\nW pobliżu tej planety pojawia się $SHROUD_TUNNEL_GALACTIC$."
 shroud_tunnel_object: "$SHROUD_TUNNEL_GALACTIC$"
 shroud.11130.title: "Gniewna zemsta"
 shroud.11130.desc_common: "W układzie [event_target:spawn_system.GetName] §Y$NAME_Psionic_Avatar$§! wyłania się z: $SHROUD_TUNNEL_GALACTIC$. Jest ucieleśnieniem gniewu, którym pała [GetBetrayedPatronColour], a teraz zmierza w stronę: [capital_scope.GetName]."
 shroud.11130.desc_success: "Udało nam się zebrać siły do walki z nadciągającym zagrożeniem. Nasze okręty wyemitowały fale energii psionicznej, ich celem był $SHROUD_TUNNEL_GALACTIC$. Wroga istota została osłabiona, gdy wtargnęła do naszej rzeczywistości."
 shroud.11130.success_tt: "$NAME_Psionic_Avatar$ wyłania się i ma połowę siły."
 shroud.11250.title: "Koniec"
 shroud.11250.desc: "Kiedy wchodzimy w trans, nasze umysły błyskawicznie ogarnia cisza. Nigdy nie doświadczyliśmy takiego spokoju w Woalu.\n\nPustka jest bezgłośna.\n\nWszystko zniknęło."
 shroud.11250.a: "To musi być koniec."
 shroud.11255.title: "[owner.GetName]: odrodzenie"
 shroud.11255.desc: "Ciężko pracowaliśmy po tym, jak $end_of_the_cycle_color_article$ spowodował spustoszenia. W tym celu w układzie §H[solar_system.Star.GetStarName]§! powstała §H$starbase_outpost$§! - to nowy początek imperium [owner.GetName]."
 ACCEPT_COVENANT: "Zawrzyjmy pakt z: $PATRON$.\n§CEfekty:§!\n$EFFECTS$"
 REFUSE_COVENANT: "Odrzućmy pakt z: $PATRON$."
 CONFIRM_COVENANT: "Potwierdźmy pakt z: $PATRON$."
 RENOUNCE_COVENANT: "Wypowiedzmy pakt z: $PATRON$."
 CREATE_RELATION: "Tworzy relację z patronem $PATRON$"
 CRADLE_MARK: "Znamię Kolebki"
 CRADLE_MARK_DESC: "$COMPOSER_MARK_DESC$"
 tech_covenant_cradle: "$CRADLE_MARK$"
 tech_covenant_cradle_desc: "$tech_covenant_composer_desc$"
 leader_trait_cradle_chosen: "Wybrańcy Kolebki"
 leader_trait_cradle_chosen_desc: "$leader_trait_whisperers_chosen_desc$"
 leader_trait_shroudshaper: "Twórca Woalu"
 leader_trait_shroudshaper_desc: "Ten przywódca to wieczna istota o niewiarygodnej mocy psionicznej, która pomaga kształtować Woal zgodnie z naszą wolą."
 COVENANT_EFFECTS: "§EEfekty paktu:§!"
 COVENANT_EATER: "§HPakt Pożeracza§!"
 covenant_eater_desc: "Pakt, który zawarł z nami $the_eater_of_worlds_article$, budzi w nas niezaspokojony apetyt podboju i zniszczenia."
 COVENANT_CRADLE: "§HPakt Kolebki§!"
 covenant_cradle_desc: "Pakt, który zawarła z nami $the_cradle_of_souls_article$, emanuje na całą galaktykę i sprawia, że inni ciepło się do nas odnoszą."
