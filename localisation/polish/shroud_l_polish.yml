 shroud.3.diplo_title: "$utopia.3000.name$"
 shroud.10.name: "Sojusznik w walce z królową"
 shroud.10.desc.intro: "W Woalu rozbrzmiewa niesamowity łoskot. Ogromne spirale energii wiją się i zderzają w eterze.\n\nW tym rozbłyskującym chaosie widzimy echa psioniczne królowej syntetyków. Nieskończona i wszechwiedząca, galaktyka to zabawka w jej dłoni."
 shroud.10.desc.outro: "Dlaczego? Czy zna słabość, o której nic nie wiemy? Czy nam pomoże, jeśli spróbujemy nawiązać kontakt?\n\nKoncentrując nasze umysły na Animatorze, wyczuwamy zniecierpliwienie. Bardzo prawdopodobne, że otrzymamy tylko jedną możliwość poproszenie go o pomoc w tej sprawie. To działanie pochłonie ogromne ilości §Henergii§! i §H$sr_zro$§!."
 shroud.10.desc: "$shroud.10.desc.intro$\n\nNie tylko my ją obserwujemy. Z ukrycia, w dogodnym miejscu, istota znana jako $the_animator_of_clay_color_article$ przygląda się, a bezkresna moc królowej nie robi na niej wrażenia.\n\n$shroud.10.desc.outro$"
 shroud.10.desc.1: "$shroud.10.desc.intro$\n\nNie tylko my ją obserwujemy. Z ukrycia, w dogodnym miejscu, $the_animator_of_clay_color_article$ przygląda się, a bezkresna moc królowej nie robi na nim wrażenia.\n\n$shroud.10.desc.outro$"
 shroud.10.a: "$animator.shroud$"
 shroud.10.b: "Nie potrzebujemy pomocy."
 shroud.10.b.tt: "To jedyna okazja, żeby poprosić Animatora o pomoc w pokonaniu Cetany."
