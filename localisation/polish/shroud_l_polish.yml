 the_composer_of_strands_REVENGE_PROJECT_DESC: "$the_composer_of_strands_color_article_cap$ $PATRON_REVENGE_PROJECT_DESC$"
 DELVING_RITUAL: "Rytuał zanurzenia"
 DELVING_RITUAL_DESC: "§Y[shroudwalker_enclave_country.GetName]§! jest w gotowości do odprawienia rytuału zanurzenia, by sięgnąć w §HWoal§! w naszym imieniu. Trudno powiedzieć, jaką dostarczy nam wiedzę."
 MINDWARDENS_THE_FIRST_ENCLAVE: "Pierwsza enklawa"
 MINDWARDENS_THE_FIRST_ENCLAVE_DESC: "Jesteśmy gotowi rozpocząć budowę. Powstanie niezależna §H\"$gov_mindwarden_enclave$\"§!, która pomoże nam w misji zakończenia psionicznej infekcji nękającej galaktykę.\n\nKiedy ta placówka powstanie, będzie wykonywała usługi antypsioniczne dla tych, którzy ich potrzebują, a jednocześnie będzie nam przekazywać część pozyskanych przez nią dochodów oraz materiałów."
 MINDWARDENS_THE_FIRST_ENCLAVE_NOTE: "W kontrolowanym przez nas układzie, §Y$FLEET$§! wielkości 30 lub większa, na czele której stoi §Y$commander$§!, może być zamieniona w: §Y$gov_mindwarden_enclave$§!."
 SHROUD_SHAPING_PROJECT: "Kształtowanie Woalu"
 SHROUD_SHAPING_PROJECT_DESC: "W §HWoalu§! żyje wiele istot, każda z nich jest niezwykle potężna. Oczekują nawiązania nierozerwalnej więzi, zanim obdarzą kogoś swoimi największymi błogosławieństwami.\n\nAle widzimy, że możemy podążyć własną drogą. Zamiast łączyć nasze umysły z jednym patronem, nasi [GetResearchers] psioniki mogą opracować sposób ukierunkowania mniejszych ilości energii od wszystkich. To pozwoli nam kształtować Woal zgodnie z naszą wolą."
 EXPLORE_BORDER_SYSTEM: "Eksploracja: [exiled_system_border.GetName]"
 EXPLORE_BORDER_SYSTEM_DESC: "Obrazowanie dalekiego zasięgu wykryło niedawno gwałtowną emisję fal energetycznych w układzie §H[exiled_system_border.GetName]§!, co pokrywa się z nieregularnymi odczytami, których dostarcza $building_ancient_ward_1$ ze świata [owner.GetHomeWorldName].\n\nJeśli chcemy zrozumieć to zjawisko, musimy zbadać układ [exiled_system_border.GetName]."
 EXPLORE_BORDER_SYSTEM_TOOLTIP: "Wyślijmy §Ystatek§! lub §Yflotę§! do zbadania układu §Y[exiled_system_border.GetName]§!."
 #==========================
 # Traits
 #==========================
 trait_tankbound: "Do zbiornika"
 trait_tankbound_desc: "Ten gatunek żyje w anabiozie - zanurzony w zbiorniku wypełnionym specjalnymi płynami biologicznymi. Istoty te nie mogą istnieć bez sprzętu wspomagającego i nie są w stanie wykonywać żadnej pracy fizycznej."
 trait_tankbound_effects: "Utrzymanie populacji - żywność lub jej odpowiedniki: §G-50%§! $TABBED_NEW_LINE$- §RNie mogą zajmować miejsc pracy dla robotników§!$TABBED_NEW_LINE$- §RNie mogą znaleźć się w armii§!"
 trait_tankbound_portrait_override_tt: "Wymagane są gatunki żyjące w specjalnych zbiornikach."
 trait_robot_latent_psionic: "$trait_latent_psionic$"
 trait_robot_latent_psionic_desc: "§LTen gatunek ma ukryte procesory psioniczne, uśpione u większości jego jednostek. Choć również rzadko, moce te aktywują się u niektórych jego przywódców.§!\n"
 trait_robot_psionic: "$trait_psionic$"
 trait_robot_psionic_desc: "§LWszystkie jednostki tego gatunku posiadają potężne oprzyrządowanie psioniczne. Mogą manipulować światem materialnym i niematerialnym, posługując się tylko procesami kognitywnymi.§!\n"
 trait_default_psionic_desc: "§LWszyscy przedstawiciele tego gatunku mają potężne zdolności psioniczne. Zazwyczaj porozumiewają się ze sobą telepatycznie.§!\n"
 trait_hive_psionic_desc: "§LWszyscy członkowie tego gatunku posiadają potężne zdolności psioniczne. Mogą manipulować światem materialnym i niematerialnym, posługując się mocą własnych umysłów.§!\n"
