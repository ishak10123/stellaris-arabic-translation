 shroud.1510.title: "Ścierająca się $PSIONIC_AURA$"
 shroud.1510.desc: "[from.GetName]: nasza §H$PSIONIC_AURA$§! zmaga się z inną, której źródłem jest układ [fromfrom.GetName]. [GetResearchers] posiadają modele takich zachowań, lecz po raz pierwszy mamy okazję zaobserwować to zjawisko na żywo.\n\nJeśli wierzyć teorii, potężniejsza aura - projektowana z większą intensywnością - będzie powoli osłabiać przeciwną. Jeśli te zmagania doprowadzą do całkowitego rozpadu, aura, która przetrwa, może przedostać się do opróżnionego układu.\n\nTo prawdziwa walka umysłów."
 shroud.1510.a: "Nasza wola zatriumfuje."
 shroud.1550.title: "Potęga woli"
 shroud.1550.desc.common_1: "Nasze wyprawy w §HEoal§! sprawiły, że jego energie wpłynęły na możliwą do postrzegania przestrzeń. Choć efekty te są znaczące, pozostają tymczasowe i raczej sporadyczne."
 shroud.1550.desc.common_2: "Nasze działania wywierają wpływ na Woal i kierują nas coraz bliżej istot o wielkiej mocy. Jeśli zdobędziemy ich względy, będziemy mogli skierować ich psioniczną energię ku cielesnej rzeczywistości. [GetTelepathPlural] teoretyzują, że powstała w ten sposób \"aura\" wzmocniłaby nasze imperium"
 shroud.1550.desc_1.knows: "$shroud.1550.desc.common_1$ §H\"$PSIONIC_AURA_PLURAL$\"§! stanowią sposób na przemianę tego wpływu w ciągły."
 shroud.1550.desc_1.default: "$shroud.1550.desc.common_1$ Teoria, że istnieją §H\"$PSIONIC_AURA_PLURAL$\"§!, stanowi sposób na przemianę tego wpływu w ciągły."
 shroud.1550.desc.knows: "$shroud.1550.desc_1.knows$\n\n$shroud.1550.desc.common_2$ oraz naszych sojuszników, osłabiając tych, którzy stają przeciw nam - tak, jak wcześniej zaobserwowaliśmy."
 shroud.1550.desc.knows.homicidal: "$shroud.1550.desc_1.knows$\n\n$shroud.1550.desc.common_2$, osłabiając tych, którzy stają przeciw nam - tak, jak wcześniej zaobserwowaliśmy."
 shroud.1550.desc.default: "$shroud.1550.desc_1.default$\n\n$shroud.1550.desc.common_2$ oraz naszych sojuszników, osłabiając tych, którzy stają przeciw nam."
