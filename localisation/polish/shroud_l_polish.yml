 resolution_galactic_focus_repeal_crisis_malevolent_aura_desc: "Dość tego. Wskazane imperium nie powinno być dłużej wspólnym celem naszych wysiłków obronnych. Starcia z członkami Wspólnoty muszą się natychmiast zakończyć."
 resolution_galactic_focus_crisis_malevolent_aura: "Cel: Złośliwa aura"
 resolution_galactic_focus_crisis_malevolent_aura_desc: "Złośliwa aura psioniczna rozprzestrzenia się w galaktyce i zagraża nam wszystkim. Musimy się zjednoczyć, skoordynować działania obronne oraz walczyć z emitującym ją imperium. To powinien być nasz priorytet galaktyczny."
