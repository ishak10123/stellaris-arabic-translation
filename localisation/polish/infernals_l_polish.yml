 volcanic_asteroid_impacts: "$asteroid_impacts$"
 volcanic_asteroid_impacts_desc: "$asteroid_impacts_desc$"
 volcanic_asteroid_belt: "$asteroid_belt$"
 volcanic_asteroid_belt_desc: "$asteroid_belt_desc$"
 volcanic_crystal_lake: "Kryształowe jezioro"
 volcanic_crystal_lake_desc: "Z tego jeziora lawy wynurzają się ogromne kryształy, od których biją fale gorąca i ciepłego światła."
 volcanic_hollow_planet: "Wydrążona planeta"
 volcanic_hollow_planet_desc: "Głęboko pod powierzchnią pozostały olbrzymie jaskinie - rozbrzmiewające echami puste trzewia planety ukształtowanej przez ogień."
 volcanic_lavafall: "Kaskady lawy"
 volcanic_lavafall_desc: "Lawa płynie tu swobodnym strumieniem, spadając kaskadami z urwiska - cała scena wygląda niczym naturalny pokaz pirotechniczny."
 volcanic_oasis: "Piekielna oaza"
 volcanic_oasis_desc: "Niewielki zielony kontynent, osłonięty przed szalejącą pożogą przez łańcuch wysokich gór. Tutejsza wyjątkowa fauna i flora mocno kontrastuje z wyniszczonym jałowym pustkowiem rozciągającym się tuż za górami."
 fractalized_entropy_category: "Fraktalna entropia"
 fractalized_entropy_category_desc: "Czujniki wykryły osobliwy obiekt dryfujący przez pas asteroid. Nie wiemy, skąd pochodzi, ale jego trajektoria jest stabilna, więc zapewne da się go przechwycić i zbadać."
 infernals.3205.name: "Fraktalna entropia"
 infernals.3205.desc: "[Leader.GetName] melduje odkrycie stałego konstruktu o kanciastym kształcie, zawieszonego na stabilnej orbicie gwiezdnej. Obiektu nie dało się zbadać żadnymi metodami analizy składu - na razie wiadomo jedynie, że jest zbudowany z nieznanego materiału, a jego powierzchnię tworzą liczne skośne płaszczyzny, przypominające krystaliczne struktury. Cały czas pozostaje ustawiony w jednym kierunku, zwrócony w stronę gwiazdy, dookoła której orbituje, przy czym oparł się wszelkim próbom zmiany kursu lub obrócenia.\n\nW trakcie kontrolowanego eksperymentu statek badawczy wystawił obiekt na działanie skoncentrowanego impulsu energetycznego. Konstrukt pękł idealnie wzdłuż, rozpadając się na doskonale symetryczne połówki, po czym każda uległa rekonfiguracji, przekształcając się w mniejszą kopię oryginału. Kolejne impulsy wywołały identyczne reakcje: podział, replikację i stopniową miniaturyzację.\n\nOstatecznie powstała rozproszona chmura miniaturowych konstruktów, które ustabilizowały swoją orbitę. Każdy fragment precyzyjnie zachował ustawienie oraz geometrię swego protoplasty, a cały \"rój\" swoim kształtem przypominał pierwotną sylwetkę struktury.\n\nNigdy wcześniej nie spotkaliśmy się z takim fenomenem i dotąd nie jesteśmy w stanie go wyjaśnić. Wszelkie zebrane dane telemetryczne zostały zarchiwizowane do dalszych analiz."
 infernals.3205.a: "Zabezpieczcie i monitorujcie te fragmenty."
 # Archaeological Sites
 from_the_ashes_site: "Z popiołów"
 from_the_ashes_site_desc: "Powierzchnia planety [Planet.GetName] jest ekstremalnie gorąca i nieprzyjazna dla wszelkiego życia. Stąd też nasi [GetScientistPlural] od razu zwrócili uwagę na zarejestrowane tam obrazy ruin, które są wyraźnymi śladami cywilizacji. Być może badania archeologiczne pozwolą nam wyjaśnić, kim byli tutejsi budowniczowie i co się z nimi stało."
 infernals.2700.name: "Zapomniane imperium"
 infernals.2700.desc: "Choć ruiny na planecie [From.Planet.GetName] na pierwszy rzut oka wydawały się zbudowane z kamienia, to analizy przeprowadzone w toku wykopalisk wskazują raczej, że to miasto widmo zostało wzniesione ze skamieniałej materii organicznej porównywalnej do drewna. Do dziś na planecie nie zachowały się żadne źródła owego budulca. Znaleziono również drobne artefakty wykonane z surowych metali, szkła oraz podobnej skamieniałej materii. [GetScientistPlural] znaleźli również skamieniałe szczątki miejscowych form życia, które dawno temu wyginęły. \n\nZdaje się, że tutejsza cywilizacja zamieszkiwała planetę w czasach, gdy miejscowy klimat był dużo bardziej umiarkowany. Pytanie tylko, czy wymarła, zanim na planecie zapanowały obecne warunki czy też w swoich ostatnich latach istnienia jej przedstawiciele na własne oczy ujrzeli gwałtowne zmiany klimatu."
 infernals.2705.name: "Świadkowie zagłady"
 infernals.2705.desc: "Wykopaliska prowadzone w ruinach miasta na planecie [From.Planet.GetName] odsłoniły miejsca o dużym znaczeniu kulturowym - są ozdobione misternymi wzorami, które mogą być zachowanym pismem wymarłej cywilizacji. Co więcej, ekipy archeologiczne odnalazły podziemną komnatę pełną półek, na których złożono cienkie blachy z brązu, gęsto zapisane symbolami. Choć brąz nie stanowi najlepszego nośnika informacji, to zdaje się, że to miejsce stanowiło archiwum tekstów tutejszej wspólnoty. \n\nPodjęliśmy już pierwsze próby tłumaczenia zapisków, podczas gdy zespoły archeologiczne dalej badają ruiny miasta. Wciąż nie poznaliśmy ostatecznego losu jego mieszkańców."
 infernals.2710.name: "Nadciągająca apokalipsa"
 infernals.2710.desc: "Zespół badaczy na planecie [From.Planet.GetName] natrafił na ponure katakumby. Tworzy je sieć głęboko wykopanych tuneli, gdzie w wysokich niszach spoczywają zmumifikowane szczątki obcych. Są ustawione po trzy lub cztery osobniki jeden nad drugim. Odkryte na miejscu rozmaite dary grobowe dają nam wgląd w rozwój technologiczny tej cywilizacji. Wśród nich znajduje się prymitywna broń palna, proste szklane teleskopy i tkaniny wyszywane zawiłymi zdobieniami. \n\nMiejsc, gdzie krzyżują się tunele katakumb, strzegą posągi dawno wymarłych miejscowych zwierząt. Istoty te mają okrągłe skorupy, cztery przysadziste łapy i niewielkie, tępo zakończone głowy. Na lepiej zachowanych płaskorzeźbach widać, jak te zwierzęta kulą się, jak gdyby próbowały schronić się pod swymi skorupami przed przypominającymi płomienie wzorami wyrytymi powyżej ich sylwetek. \n\nPrawdziwe znaczenie tych dzieł być może przepadło w mrokach dziejów, lecz możliwe też, że są one świadectwem tego, jak bardzo tutejsze społeczeństwo było świadome nadciągającej ognistej zagłady. Dalsze wykopaliska mogą rzucić więcej światła na doświadczenia tej dawnej cywilizacji."
 infernals.2715.name: "Upadek w blasku ognia"
 infernals.2715.desc: "Dokładne badania ruin miasta na planecie [From.Planet.GetName] dowodzą, że tutejsza cywilizacja na własne oczy ujrzała zapaść ekosystemu i doskonale zdawała sobie sprawę z nadchodzącej ognistej zagłady. Tubylcy korzystali z papierowych kronik do czasu, aż opady gorących wulkanicznych popiołów zmusiły ich, by zaczęli wykorzystać do swych zapisków arkusze z brązu, natomiast sztuka przedstawiająca zwierzęta kryjące się przed płomieniami stanowiła próbę pogodzenia się z nieuchronnym końcem. \n\nWykopaliska odsłoniły również niemal nienaruszoną rzeźbę strażnika katakumb, na tyle dobrze zachowaną, że z wyrytych powyżej płomieni dotąd bije wewnętrzny blask. Z pewnością warto będzie zabezpieczyć i zakonserwować to imponujące dzieło sztuki. \n\nZnaleźliśmy również ślady prób powstrzymania aktywności wulkanicznej. Zachowane drogi i szczątki wozów świadczą o tym, że tubylcy masowo transportowali kamienie i żwir nad brzeg najbliżej kaldery i zrzucali je w głąb krateru, próbując zatkać wulkan. Niestety, nie byli w stanie odwrócić swego losu. Do naszych czasów na planecie nie przetrwały żadne organizmy wielokomórkowe. \n\nTa historia przypomina nam jak kruchy bywa los wszelkiej cywilizacji - wszak o jej upadku może przesądzić problem przerastający narzędzia, którymi dysponuje."
 infernals.2715.a: "Tragiczne zakończenie."
 infernals.2715.b: "Powinniśmy uczyć się na ich błędach."
 inferno_temple_site: "Piekielna świątynia"
 inferno_temple_site_desc: "Z dala od historycznych skupisk cywilizacji na planecie [Planet.GetName], wśród pasma aktywnych wulkanów wznoszą się zapomniane ruiny starożytnej świątyni. Zbadanie jej historii być może pozwoli nam lepiej zrozumieć lokalną kulturę."
 infernals.2720.name: "Starożytne symbole"
 infernals.2720.desc: "Mury świątyni noszą ślady walki, a w bezpośredniej okolicy odkryliśmy pogrzebane starożytne szczątki miejscowych istot rozumnych. Zdaje się, że świątynia została celowo podpalona i porzucona. Zespoły sił bezpieczeństwa doniosły nam, że tubylcy trzymają się od tego miejsca z daleka, wierząc że jest ono przeklęte. \n\nMury świątyni ognia uchroniły jej wnętrza przed zniszczeniem - znaleźliśmy tam wiele misternie wykonanych malowideł naściennych i rzeźb. Powtarza się wśród nich motyw ognistego kręgu z widniejącą pośrodku ciemną szramą, przywodzącą na myśl źrenicę. Na jednym z przedstawień widać, jak dwunożna postać wyłupuje jedno z owych „oczu” i ciska nim w świat, z czego rodzi się owy centralny motyw. Postanowiliśmy określać ten symbol mianem \"Piekielnego Oka\". \n\nDalsze wykopaliska zapewne pozwolą nam odkryć, jakie wierzenia były związane z tym osobliwym znakiem."
 infernals.2725.name: "Ofiary dla Oka"
 infernals.2725.desc: "Prace archeologiczne prowadzone w świątyni Piekielnego Oka ujawniły ślady składanych tu licznych ofiar. Odkryliśmy szereg szerokich dołów ofiarnych z centralnymi podestami, przypominających kształtem symbol Piekielnego Oka oraz jego źrenicy. Na ich dnie spoczywają grube warstwy popiołów i zwęglonej materii organicznej. Analiza molekularna wykazała, że mamy do czynienia z pozostałościami po spalonych tkankach zwierzęcych. \n\nNa razie nie możemy określić, czy składano tu w ofierze zwierzęta dzikie czy gospodarskie - czy też może i samych tubylców. \n\nWysłaliśmy agentów do obecnych skupisk populacji w poszukiwaniu pośrednich dowodów i przekazów historycznych, a tymczasem nasi archeolodzy przeczesują ruiny w poszukiwaniu dalszych odpowiedzi."
 infernals.2725.a: "Oto zagadka, która tylko czeka, by ją rozwikłać!"
 infernals.2725.b: "Wysłać drony, by rozwikłały tę zagadkę."
 infernals.2730.name: "Mroczne rytuały"
 infernals.2730.desc: "Odkryliśmy ciężkie kamienne wrota blokujące przejście do najgłębiej położonej części świątyni. Po przebiciu się na drugą stronę, archeolodzy ujrzeli okrągłą komnatę z położonym pośrodku szybem ofiarnym, usytuowanym tuż nad naturalnym podziemnym zbiornikiem magmy. Pomarańczowa łuna bijąca od rozżarzonej magmy sprawia, że pomieszczenie skąpane jest w czerwonym blasku, w którym ledwo można dostrzec inskrypcje ciągnące się wzdłuż ścian osobliwej sali. Sklepienie powyżej wysadzane jest mrowiem rozpalonych ślepi.\n\nNa skraju szybu ofiarnego wznosi się ołtarz przypominający kształtem Piekielne Oko, na którym leżą rozpostarte zasuszone zwłoki jednego z przedstawicieli tubylczej rasy. Zdaje się, że tutejszy lud faktycznie składał swych pobratymców w ofierze, aby obłaskawić ogniste bóstwo.\n\nZapisane na ścianach teksty mogą okazać się kluczowe dla zrozumienia roli, jaką w tutejszej kulturze odgrywała ta świątynia, stąd też należy je niezwłocznie przetłumaczyć."
 infernals.2735.name: "Spazmatyczne przepowiednie"
 infernals.2735.desc: "Analiza pism z najgłębszej komnaty świątyni wykazała, że mamy do czynienia z serią proroctw przepowiadających powrót Piekielnego Oka. Teksty przestrzegają, iż nieposłuszeństwo wyznawców w końcu rozgniewa Piekielne Oko, które za karę okryje niebo całunem cieni, doprowadzi do erupcji pewnej określonej świętej góry i sprawi, że konkretny gatunek roślin uprawnych zupełnie obumrze. Proroctwo jasno stwierdza, że wydarzenia te będą oznaczać koniec cywilizacji, który zdołają przetrwać jedynie ci, którzy ukorzą się przed wolą Piekielnego Oka. \n\nNasi agenci wmieszani w miejscową populację szukali pewnych etnograficznych odniesień do owych legend i odkryli, że proroctwo zainspirowało rozmaite ludowe porzekadła i filozoficzne aforyzmy wśród różnych kultur planety, a także było źródłem wielu późniejszych opowieści i mitów. Wysłannicy sądzą również, że współczesne obrzędy religijne praktykowane w tubylczych świątyniach nie tylko odnoszą się na rozmaite sposoby do starożytnego proroctwa, ale też niekiedy mają mu przeciwdziałać. \n\nZa sprawą naszej technologii możemy potencjalnie odtworzyć wszelkie przepowiedziane kataklizmy - albo przynajmniej zasymulować je na tyle wiarygodnie - by miejscowi nie zorientowali się, co się naprawdę dzieje. Jeżeli objawimy się im jako ucieleśnienia Piekielnego Oka, udowadniając, że pierwotne proroctwo od początku mówiło prawdę, to zapewne zmusimy ich do znacznych ustępstw i zapewnimy sobie ich posłuszeństwo. Dzięki temu na dłuższą metę będzie nam łatwiej ich zasymilować."
 infernals.2735.a: "Odtworzyć proroctwo."
 infernals.2735.a.tt: "Prymitywne społeczeństwo planety §Y[From.Planet.GetName]§! wkrótce przekona się do naszej etyki."
 infernals.2735.a.fail: "Nie ma wybranej polityki: §Y$interference_not_allowed$§!."
 infernals.2735.b: "Nie interweniujcie."
 infernals.2735.c: "Ich pradawna historia przepadła na wieki."
 infernal_figurine: "Piekielny posąg"
 infernal_figurine_desc_short: "Tęgi stwór o kopulastej skorupie i czterech przysadzistych łapach schyla się pod stylizowaną rzeźbą płomieni."
 infernal_figurine_desc_details: "Płomienie wyryto w nieznanym minerale, ze żłobień bije czerwony blask. Artefakt wydobyto z katakumb wymarłej cywilizacji i być może symbolizuje on płonną nadzieję jego twórców na przetrwanie wulkanicznego kataklizmu, który nieubłaganie niszczył biosferę ich planety."
