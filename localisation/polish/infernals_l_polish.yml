 # Civic - Fire Cult
 civic_pyrolatry: "Kult ognia"
 civic_pyrolatry_desc: "To zahartowane przez całe pokolenia ekstremalnych trudów społeczeństwo wierzy, że kluczem do przetrwania jest jedność, a kluczem do osiągnięcia jedności - wspólna walka o przetrwanie. Tylko dzięki swym więziom wykutym w ogniu lud ten przetrwa pośród zimnej, nieczułej galaktyki."
 civic_pyrolatry_effects: "- Produkcja zas.: £unity£ §Y$unity$§! z miejsc pracy rośnie proporcjonalnie do niższej wartości określającej $HABITABILITY$ (do §G500%§!).\n- Wkrótce po rozpoczęciu gry zostanie założona frakcja ['concept_fire_cult'].\n- Zastępuje miejsca pracy: £job_priest£ §Y$job_priest_plural$§! miejscami pracy: £job_fire_dancer£ ['concept_inf_fire_dancers'].\n- Zastępuje miejsca pracy: £job_politician£ §Y$job_politician_plural$§! miejscami pracy: £job_fire_oracle£ ['concept_inf_fire_oracles'] na planetach o wartości wyznaczającej $HABITABILITY$ poniżej §R50%§!.\n- Umożliwia werbowanie armii: §Y$ember_legion$§! na planetach o wartości wyznaczającej $HABITABILITY$ poniżej §R20%§!.\n- Zapewnia dostęp do planetarnych decyzji: §Y$decision_blazing_scourge$§!, które tworzą: £blocker£ ['concept_dec_blazing_scourge'].\n- Dobrze współgra z etosami: $civic_superstitious_beliefs$, $civic_exalted_priesthood$, $civic_death_cult$, $civic_aristocratic_elite$ oraz $civic_merchant_guilds$."
