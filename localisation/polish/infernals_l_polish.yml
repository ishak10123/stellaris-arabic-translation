 job_offworld_prospector: "Kosmiczny poszukiwacz"
 job_offworld_prospector_plural: "Kosmiczni poszukiwacze"
 job_offworld_prospector_desc: "Przedsiębiorczy poszukiwacze udają się w kosmos, gdzie na światach stopionych szukają zasobów: $r_volatile_motes$ i $r_living_metal$."
 mod_job_offworld_prospector_add: "Miejsca pracy: $job_offworld_prospector$"
