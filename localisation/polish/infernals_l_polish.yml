 building_volcanic_forge_1: "$tech_volcanic_forge$"
 building_volcanic_forge_1_desc: "Ten kompleks przemysłowy został zaprojektowany w celu prowadzenia odwiertów w głąb planetarnej skorupy. Jego praca pobudzi aktywność wulkaniczną na całej planecie, terraformując każdy jej biom w spalone żarem pustkowia."
