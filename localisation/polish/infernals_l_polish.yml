 lm_imbued_army: "Mimetyczny regiment szturmowy"
 seq_lm_imbued_army: "$ORD$ $lm_imbued_army$"
 lm_imbued_army_desc: "Ta armia została wyposażona w zaawansowaną technologię wykorzystującą $r_living_metal$. Jest w stanie dynamicznie się transformować w zależności od warunków panujących na polu bitwy."
 concept_inf_lm_armor: "$INF_Regen$ pancerz"
 concept_inf_lm_armor_desc: "Premie za każdy komponent pancerza:\n- $mod_weapon_type_energy_weapon_fire_rate_mult$: §G+2%§! \n- $MOD_SHIP_HULL_REGEN_ADD_PERC$: §G+1%§! \n- $MOD_SHIP_ARMOR_REGEN_ADD_PERC$: §G+1%§! \n\nDodaje §Y$INF_Regen$§! typ standardowych komponentów pancerza okrętów. Ich koszt w zas.: $r_alloys$ zostaje zastąpiony zas.: $r_living_metal$. \n\nObejmuje odblokowane komponenty następujących technologii £engineering_research£: $TABBED_NEW_LINE$- ['technology:tech_ship_armor_1'] $TABBED_NEW_LINE$- ['technology:tech_ship_armor_2'] $TABBED_NEW_LINE$- ['technology:tech_ship_armor_3'] $TABBED_NEW_LINE$- ['technology:tech_ship_armor_4'] $TABBED_NEW_LINE$- ['technology:tech_ship_armor_5']"
 INF_Regen: "Regeneracyjny"
 LM_ARMOR_1: "$ARMOR_1$ - $INF_Regen$"
 LM_ARMOR_1_DESC: "Ten pancerz wykorzystujący $r_living_metal$ został ukształtowany w stoczniowych hutach. Jego sekcje nawet po poważnych uszkodzeniach z czasem odrosną, odzyskując pierwotny kształt."
 LM_ARMOR_2: "$ARMOR_2$ - $INF_Regen$"
 LM_ARMOR_2_DESC: "Zagęszczenie stopu opartego o $r_living_metal$ poprawia zarówno jego podstawowe właściwości obronne, jak i powiększa warstwę, która może się regenerować."
 LM_ARMOR_3: "$ARMOR_3$ - $INF_Regen$"
 LM_ARMOR_3_DESC: "Kompozyty, które zwiększają wytrzymałość na rozciąganie stopów opartych o $r_living_metal$, umożliwiają tworzenie znacznie odporniejszych pancerzy."
 LM_ARMOR_4: "$ARMOR_4$ - $INF_Regen$"
 LM_ARMOR_4_DESC: "Wysokoenergetyczne procesy hartowania sprawiają, że ten regeneracyjny pancerz wykorzystujący $r_living_metal$ jest dużo wytrzymalszy od poprzednich wariantów."
 LM_ARMOR_5: "$ARMOR_5$ - $INF_Regen$"
 LM_ARMOR_5_DESC: "Postępy w naukach badających $r_living_metal$ umożliwiły stworzenie pancerza na tyle wytrzymałego i zdolnego do regeneracji, na ile tylko pozwalają prawa fizyki."
