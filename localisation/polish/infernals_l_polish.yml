l_polish:
 INFERNALS_TITLE: "Infernals Species Pack" # Do not translate
 vo_infernal_voice: "Termofil"
 # Traits
 trait_pc_volcanic_preference: "Preferowany teren: wulkaniczny"
 trait_pc_volcanic_preference_short: "Wulkaniczny"
 trait_pc_volcanic_preference_desc: "$trait_pc_savannah_preference_desc$"
 trait_volcanic_planet_preference: "$trait_pc_volcanic_preference$" #robotic
 trait_volcanic_planet_preference_desc: "$trait_dry_planet_preference_desc$" #robotic
 trait_infernal: "Termofil"
 trait_infernal_plural: "Termofile"
 trait_infernal_desc: "Ten gatunek na drodze ewolucji rozwinął tkanki zbudowane ze związków metali i przystosował się do życia na gorących planetach, gdzie zwykłe istoty organiczne dosłownie by się ugotowały. Ich komórki z naturalnych stopów ulegają wolniejszej degeneracji i są rzadziej zastępowane nowymi, co spowalnia występowanie objawów chorób powiązanych z procesami starzenia. Jednak struktury te tak sprawnie odprowadzają ciepło, że w zimniejszych klimatach narażają ich organizmy na wychłodzenie."
 TRAIT_INFERNAL_EFFECT: "Utrzymanie ($r_alloys$) $pop_group_unit$ £pop£ populacji: §R+$@living_standard_alloys_normal$§!$TABBED_NEW_LINE$- $HABITABILITY$ ($pc_volcanic$): §G+20%§! $TABBED_NEW_LINE$- Min. $HABITABILITY$ (§H$pc_volcanic$§!): §Y+50%§! $TABBED_NEW_LINE$- $HABITABILITY$ na §Yzimnych§! światach: §R-30%§! $TABBED_NEW_LINE$- Długość życia przywódcy: §G+10 lat§!"
 trait_unbreakable_resolve: "Niewzruszona determinacja"
 trait_unbreakable_resolve_desc: "Obdarzone skomplikowanymi sieciami neuronów lustrzanych, te istoty posiadają wrodzoną zdolność do synchronizowania swej zbiorowej woli. Obowiązki nie stanowią dla nich uporczywego brzemienia, lecz wspólny cel, a wszelkim trudnościom stawiają czoła, zachowując niezachwianą solidarność."
 trait_unbreakable_resolve_tooltip: "Każde $pop_group_unit$ £pop£ §Hpopulacji§! na planecie z tą cechą dodaje §G+0,2§! £stability£ $PLANET_STABILITY_TITLE$ (maks.: §G+15§!) \n- §RNie obejmuje niewolników ani niższych warstw populacji.§!"
 trait_shell_slag: "Żużlowa skorupa"
 trait_shell_slag_desc: "Skomplikowana symbioza z surowcem $r_living_metal$ sprawia, że ten gatunek nie rośnie w tradycyjnym sensie, lecz poprzez akumulację i asymilację biometalicznych struktur."
 trait_shell_slag_tooltip: "Każde $pop_group_unit$ £pop£ §Hpopulacji§! z tą cechą pracujące jako niewolnicy lub pracownicy wyższej rangi wytwarza §G$@shell_slag_trait_resource_production|3$§! §Y$r_living_metal$§! na miesiąc."
 trait_robot_assembly_slag: "Żużlowy montaż"
 trait_robot_assembly_slag_desc: "Skomplikowany proces integracji surowca $r_living_metal$ sprawia, że ten gatunek maszyn nie konstruuje nowych jednostek w sposób tradycyjny, lecz poprzez akumulację i autoasymilację mechametalicznych szkieletów."
 trait_pyroclastic: "Piroklastyczna kineza"
 trait_pyroclastic_desc: "Ten gatunek ukształtowany przez bezlitosną furię światów wulkanicznych nie lęka się sił piroklastycznych - wszak potrafią nimi kierować i manipulować, przekształcając niszczycielskie żywioły w kluczowe źródło zasobów i energii."
 trait_pyroclastic_tooltip: "$MOD_LOGISTIC_GROWTH_MULT$ na planetach typu \"$pc_volcanic_plural$\": §G+10%§!"
 trait_crucible_community: "Zahartowana wspólnota"
 trait_crucible_community_desc: "Ten gatunek został zahartowany przez ciężkie warunki i zjednoczony przez wspólną walkę z przeciwnościami, dzięki czemu jego przedstawiciele utworzyli niezłomną wspólnotę. Ich kolektywna wola wspomaga procesy zarządzania, a każdy członek społeczności stanowi kluczowe ogniwo w łańcuchu jedności."
 trait_crucible_community_tooltip: "Każde $pop_group_unit$ £pop£ §Hpopulacji§! na planecie z tą cechą dodaje §G+0,25§! §Y$MOD_COUNTRY_EDICT_FUND_ADD$§!"
 trait_ductile: "Plastyczność"
 trait_ductile_desc: "§LTen gatunek został tak zmodyfikowany, by tworzył zapasowe organy z naturalnych stopów, które można pozyskiwać i ponownie wykorzystywać.§!\n"
 # Volcanic World
 pc_volcanic: "Świat wulkaniczny"
 pc_volcanic_plural: "Światy wulkaniczne"
 pc_volcanic_desc: "Skalisty świat z atmosferą bogatą w siarkę i z częściowo płynną litosferą. Powierzchnia pokryta warstwami popiołów i bazaltu, poprzecinana jest obszarami o zwiększonej aktywności wulkanicznej, jeziorami i rzekami lawy. Jedynymi lokalnymi formami życia bywają ekstremofile."
 mod_pc_volcanic_habitability: "Bazowa możliwość zamieszkania świata wulkanicznego"
 mod_pc_volcanic_max_districts_add: "Maksymalna liczba dzielnic ($pc_volcanic$)"
 concept_pc_volcanic: "$pc_volcanic$"
 concept_pc_volcanic_desc: "- $mod_planet_jobs_alloys_produces_mult$: §G+5%§! \n\n§L$pc_volcanic_desc$§!"
 district_geothermal: "Elektrownia geotermalna"
 district_geothermal_plural: "Elektrownie geotermalne"
 district_geothermal_desc: "Wykorzystuje olbrzymie ilości ciepła we wnętrzu planety, aby produkować energię na potrzeby kolonii."
 district_melting: "Kumulator magmowy"
 district_melting_plural: "Kumulatory magmowe"
 district_melting_desc: "System elektromagnetycznych filtrów wydobywających cenne minerały z planetarnych warstw magmy."
 district_melting_uncapped: "$district_melting$"
 district_melting_uncapped_plural: "$district_melting_plural$"
 district_melting_uncapped_desc: "$district_melting_desc$"
 mod_district_melting_max: "Maks. $district_melting_plural$"
 district_polytechnic: "Forum termotechniczne"
 district_polytechnic_plural: "Fora termotechniczne"
 district_polytechnic_desc: "To centrum interdyscyplinarnej współpracy i edukacji pomaga kolonii w sterowaniu dynamiką geologiczną planety."
 mod_district_polytechnic_max_add: "Maks. $district_polytechnic_plural$"
 thermotechnic_default: "Centra pomocnicze"
 thermotechnic_hive: "Sploty synaptyczne"
 thermotechnic_machine: "Centrale wsparcia"
 melt_extractor: "$job_melt_extractor$"
 job_melt_extractor: "Termohutnik"
 job_melt_extractor_plural: "Termohutnicy"
 job_melt_extractor_desc: "Ten nawykły do ekstremalnego gorąca robotnik specjalizuje się w tworzeniu nowych stopów z określonych mieszanek minerałów."
 mod_job_melt_extractor_add: "Miejsca pracy: $job_melt_extractor$"
 job_melt_extractor_effect: "£job_miner£ $job_melt_extractor_plural$ wytwarzają zasób: £minerals£ §Y$minerals$§!."
 melt_extractor_drone: "$job_melt_extractor_drone$"
 job_melt_extractor_drone: "Dron termohutniczy"
 job_melt_extractor_drone_plural: "Drony termohutnicze"
 job_melt_extractor_drone_desc: "Ten skonstruowany, by wytrzymać ekstremalne gorąco dron przeznaczony jest do tworzenia nowych stopów z określonych mieszanek minerałów."
 mod_job_melt_extractor_drone_add: "Miejsca pracy: $job_melt_extractor_drone$"
 job_melt_extraction_drone_effect: "£job_mining_drone£ $job_melt_extractor_drone_plural$ wytwarzają zasób: £minerals£ §Y$minerals$§!."
 job_polytechnic_mentor: "Termotechniczny mentor"
 job_polytechnic_mentor_plural: "Termotechniczni mentorzy"
 job_polytechnic_mentor_desc: "Ten biegły w rozmaitych dziedzinach mentor pomaga koordynować wysiłki różnych dyscyplin naukowych, by zwiększać produktywność wyspecjalizowanych robotników."
 mod_job_polytechnic_mentor_add: "Miejsca pracy: $job_polytechnic_mentor$"
 job_polytechnic_mentor_effect: "£job_polytechnic_mentor£ $job_polytechnic_mentor_plural$ - ulepszenie przez inne miejsca pracy. \n\n$job_polytechnic_job_tt$"
 concept_polytechnic_mentor: "$job_polytechnic_mentor_plural$"
 concept_polytechnic_mentor_desc: "Dodatkowe zasoby wytworzone przez $pop_group_unit$ £pop£ §Hpop.§!\n(Limit: §Y4000§! £job£ miejsc pracy na kategorię):\n- £job_miner£ ['concept_planet_miners']: §G+$@polytechnic_output$§! £unity£ $unity$\n- £job_technician£ ['concept_planet_technician']: §G+$@polytechnic_output$§! £physics_research£ $physics_research$\n- £job_foundry£ ['concept_planet_metallurgists']: §G+$@polytechnic_output$§! £engineering_research£ $engineering_research$\n- £job_artisan£ ['concept_planet_artisans']: §G+$@polytechnic_output$§! £society_research£ $society_research$"
 job_polytechnic_job_tt: "$concept_polytechnic_mentor_desc$"
 job_polytechnic_drone: "Dron piroklastyczny"
 job_polytechnic_drone_plural: "Drony piroklastyczne"
 job_polytechnic_drone_desc: "Ten biegły w rozmaitych dziedzinach dron pomaga koordynować wysiłki różnych dyscyplin naukowych, by zwiększać produktywność wyspecjalizowanych robotników."
 mod_job_polytechnic_drone_add: "Miejsca pracy: $job_polytechnic_drone$"
 job_polytechnic_drone_effect: "£job_polytechnic_drone£ $job_polytechnic_drone_plural$ - ulepszenie przez inne miejsca pracy. \n\n$job_polytechnic_job_tt$"
 concept_polytechnic_drone: "$job_polytechnic_drone_plural$"
 concept_polytechnic_drone_desc: "$concept_polytechnic_mentor_desc$"
 # Origin - Red Giant
 origin_red_giant: "Czerwony olbrzym"
 origin_red_giant_desc: "Ta cywilizacja znalazła się na rozstajach historii: czerwony olbrzym w sercu zamieszkiwanego przez nią układu stopniowo podnosi temperaturę na jej planecie, a jej mieszkańcom ostatecznie grozi ugotowanie żywcem.\n\nCzy ta cywilizacja zdoła dostosowywać się do nieprzyjaznych warunków na tyle długo, by znaleźć i naprawić przyczynę problemu czy może postanowi wejść w symbiozę z gorącem, wykorzystując te osobliwe i być może nienaturalne zmiany?"
 origin_tooltip_red_giant_effects: "- $HOMEWORLD$ ['concept_pc_volcanic'] (Rozmiar: £planetsize£ 20)"
 START_SCREEN_RED_GIANT: "Wpierw prawdę odkrywaliśmy powoli, lecz potem nadszedł przełom.\n\nNasza gwiazda wchodzi w fazę błyskawicznej i nietypowej ewolucji. Emitowane przez nią ilości energii przekroczyły wszelkie oczekiwane parametry. Zmiany w widmie światła wskazują na chaotyczne procesy konwekcji, a tempo syntezy jądrowej zdaje się rosnąć bez jednoczesnego spadku masy gwiazdy.\n\nNa razie ewoluujemy wraz ze wzrostem globalnego ocieplenia, lecz naturalna ewolucja biologiczna ma swoje ograniczenia.\n\nJeżeli zmiany w gwieździe [capital_star.GetName] będą zachodzić dalej, nasz świat macierzysty w końcu zapłonie. Pytanie już nie brzmi „czy?” tylko „kiedy?”."
 red_giant_start_NAME: "Układ czerwonego olbrzyma"
 red_giant_start_DESC: "To gwarantowany układ początkowy dla imperiów o pochodzeniu: §Y$origin_red_giant$§!."
 tech_starfire_cannon: "$starfire_cannon$"
 tech_starfire_cannon_desc: "Jak każde potencjalne zagrożenie, niebezpieczne promieniowanie towarzyszące transformacji naszej gwiazdy może zostać okiełznane i wykorzystane jako użyteczne narzędzie. Skupienie go za pomocą energetycznej broni strumieniowej umożliwiłoby nam przegrzewanie i neutralizację wrogich okrętów. \n\nOdblokowuje decyzję planetarną o budowie na orbicie obiektu: §Y$starfire_cannon$§!."
 SOLARFLARE_EMITTER: "Emiter rozbłysków słonecznych"
 SOLARFLARE_EMITTER_DESC: "Potężny promień energetyczny, który może przebijać się nawet przez najsilniejsze środki obrony i neutralizować wrażliwe systemy okrętów."
 starfire_cannon_cap: "$starfire_cannon$"
 starfire_cannon: "Działo astroogniowe"
 starfire_cannon_plural: "Działa astroogniowe"
 NAME_Starfire_Cannon: "$starfire_cannon$"
 starfire_cannon_key: "$starfire_cannon$ - rdzeń"
 sfe_on_hit_stun_tt: "§YNeutralizuje§! cel na §G5§! dni, obniżając jego prędkość, szybkostrzelność i siłę osłon.\n\n$ION_CANNON_FLEET_EFFECT$"
 sfe_weapon_stun_effect: "§RTrafienie - $starfire_cannon$§!"
 sfe_weapon_stun_effect_desc: "   " # not visible
 decision_starfire_cannon: "Skonstruuj: $starfire_cannon$"
 decision_starfire_cannon_desc: "Naśladując silne promieniowanie błyskawicznie starzejącego się czerwonego olbrzyma, to działo orbitalne emituje strumień cząstek wywołujący jonizację hipertermiczną. Ta broń nie tylko uszkadza cele, ale również smaży wrażliwe systemy okrętów - i tym samym wyłącza je z walki."
 decision_starfire_cannon_effects: "Buduje na orbicie planety obiekt: §Y$starfire_cannon$§! - to broń dalekiego zasięgu, która może dezaktywować systemy wielu okrętów naraz."
 decision_starfire_cannon_limit: "$TRIGGER_FAIL$Limit w układzie: §Y3§!"
 # Origin - Cosmic Dawn
 origin_cosmic_dawn: "Kosmiczny świt"
 origin_cosmic_dawn_desc: "Ta cywilizacja nie powstała w sposób standardowy, lecz przebudziła się po wiekach. Gdy otworzyły się kapsuły hibernacyjne, przebudzeni ujrzeli, że upływ czasu odmienił ich świat nie do poznania. Lecz nie wszystko przepadło. Ślady ich przeszłości przetrwały w galaktyce, pogrzebane pod warstwami popiołów i ruin - czekając na ponowne odkrycie."
 origin_tooltip_cosmic_dawn_effects: "- $HOMEWORLD$ $TABBED_NEW_LINE$- ['concept_pc_volcanic'] (Rozmiar: £planetsize£ 14) $TABBED_NEW_LINE$- ['concept_inf_cd_deposit']: +5\n- Zaczyna z sytuacją: §HGłębokie wykopaliska§!"
 origin_tooltip_cosmic_dawn_negatives: "- $INITIAL_POPS$ §R-600§!"
 START_SCREEN_COSMIC_DAWN: "Przebudziliśmy się niemal nieświadomi, że kiedykolwiek zapadliśmy w sen. Nawet teraz największym świadectwem dawnych czasów nie są nasze wspomnienia, lecz skomplikowana technologia, która zachowała nas w hibernacji.\n\nNiezliczone tysiące kapsuł, olbrzymie systemy odprowadzania ciepła, tygle tłoczące roztopioną skałę. Oprócz tych surowych mechanizmów, wskazówki co do naszego pochodzenia stanowiły inskrypcje na ścianach: floty okrętów porzucające oziębiające się światy w poszukiwaniu ciepła pośród gwiazd. Spragnieni odpowiedzi, opuściliśmy tę „komorę odrodzenia”. Na powierzchni planety §Y[owner.Capital.GetName]§! odkryliśmy przydatną technologię i użyteczne zasoby. Znaleźliśmy również ślady kolejnych obiektów skrytych w skorupie tego globu. Część z nich zawiera jeszcze więcej naszych zahibernowanych rodaków, których będziemy mogli powitać wśród nas.\n\nA co kryje się wśród gwiazd? Czy są jeszcze inni tacy jak my, wciąż pogrążeni we śnie? Jeśli istnieją, to być może pomogą nam odpowiedzieć na najbardziej palące z naszych pytań: kim jesteśmy?"
 cosmic_dawn_start_NAME: "Nowy dom"
 cosmic_dawn_start_DESC: "To gwarantowany układ początkowy dla pochodzenia: $origin_cosmic_dawn$."
 concept_inf_cd_deposit: "$d_stasis_pods$"
 concept_inf_cd_deposit_desc: "Wytwarza: £society_research£ 3,0\nPo oczyszczeniu: \n$d_stasis_pods_tt$ \n\n§L$d_stasis_pods_desc$§!"
 cosmic_dawn_districtsize: "$MOD_PLANET_MAX_DISTRICTS_ADD$: §G+1§!"
 cosmic_dawn_districtsize2: "$MOD_PLANET_MAX_DISTRICTS_ADD$: §G+2§!\n   $d_cd_ancient_tunnels$ §G+2§!"
 cosmic_dawn_tunnel_foundry: "$foundry_jobs_bonus_workforce_mult$ na $d_cd_ancient_tunnels$: §G+1%§!"
 cosmic_dawn_tunnel_bureaucrat: "$bureaucrat_jobs_bonus_workforce_mult$ na $d_cd_ancient_tunnels$: §G+1%§!"
 cosmic_dawn_tunnel_researcher: "$researcher_jobs_bonus_workforce_mult$ na $d_cd_ancient_tunnels$: §G+1%§!"
 cosmic_dawn_tunnel_worker: "$mod_pop_cat_worker_bonus_workforce_mult$ na $d_cd_ancient_tunnels$: §G+1%§!"
 d_stasis_pods: "£blocker£ Pradawne kapsuły hibernacyjne"
 d_stasis_pods_desc: "Te kapsuły to starożytne urządzenia naszego zaginionego ludu. Korzystają z zaawansowanej technologii kriogenicznej, by utrzymywać uśpionych w stanie hibernacji. Przy pomocy odpowiedniej technologii zapewne będziemy w stanie ich przebudzić."
 d_stasis_pods_tt: "[GetStasisPodOwner]"
 d_stasis_pods_tt_inf: "- Powstaje §G100§! £pop£ $POPS$\n- $MOD_PLANET_MAX_DISTRICTS_ADD$: §G+1§!"
 d_stasis_pods_tt_other: "- Zyskano £society_research£ §Y$society_research$§!: §G+350§!\n- $MOD_PLANET_MAX_DISTRICTS_ADD$: §G+1§!"
 d_cd_ancient_tunnels: "Pradawne tunele"
 d_cd_ancient_tunnels_desc: "Te rozległe tunele były niegdyś wykorzystywane do przechowywania masy komór hibernacyjnych. Teraz są puste i mogą posłużyć za nową przestrzeń mieszkalną."
 d_galvanic_living_metal: "Warstwy osadowe: $sr_living_metal$"
 d_galvanic_living_metal_desc: "Ta planeta posiada naturalne złoża surowca: $r_living_metal$. Miejscowe gatunki ewoluowały w stałym kontakcie z tym fascynującym zasobem, co zaowocowało ich wyjątkowym rozwojem biologicznym i naukowym."
 # Civic - Scorched World Heralds
 civic_scorched_earth: "Heroldowie spalonych światów"
 civic_scorched_earth_desc: "Gorąco stanowi fundament wszelkich aspektów kultury tego społeczeństwa: od tradycji i rytuałów po samą technologię. To rasa supremacjonistów, uważających się za ognistych zbawców galaktyki, którzy postrzegają słabsze gatunki jako zwykłe przeszkody na drodze do stworzenia idealnego kosmosu, który byłby rajem dla termofili."
 civic_scorched_earth_effects: "Nie może nawiązywać §Ystosunków dyplomatycznych§! z gatunkami innymi niż §Y$trait_infernal_plural$§!.\nNie ma dostępu do §Yrynku galaktycznego§!.\nPosiada casus belli §Y\"$casus_belli_cb_blaze$\"§! wobec innych gatunków.\nZyskuje £unity£ §Y$unity$§! w trakcie bombardowań w postawie bombardowania: §Y$bombardment_firestorm$§!.\nTworzy specjalne przeszkody terenowe na bombardowanej planecie, korzystając z postawy bombardowania: §Y$bombardment_seismic_bombing$§!.\nGatunki niebędące pieklikami mogą mieć wyłącznie status §Yniewolników§! lub gorszy."
 SCORCHED_HERALDS_ONLY_INF: "$TRIGGER_FAIL$§Y$civic_scorched_earth$§! tolerują w swojej społeczności tylko £pop£ $POPS$ typu ['trait:trait_infernal']."
 civic_hive_scorched_earth: "Instynkt piromanów"
 civic_hive_scorched_earth_desc: "Nasze spalone światy stanowią ukoronowanie planetarnej ewolucji. Podpalimy całą galaktykę i będziemy rosnąć w siłę pośród pożogi!"
 # Civic - World Forgers
 civic_world_forgers: "Kowale planet"
 civic_world_forgers_desc: "Członkowie tego społeczeństwa wyśmienicie radzą sobie w środowiskach wulkanicznych. Są gotowi tworzyć je sztucznymi metodami, jeśli natura im nie sprzyja."
 civic_world_forgers_effects: "- Odblokowuje planetę początkową: ['concept_pc_volcanic']. \n- $GUARANTEED_RESEARCH_OPTION_STRING$ £society_research£ ['concept_volcanic_forge']. \n- Umożliwia budowę: £building£ §Y$building_volcanic_forge_1$§!, które zapewniają miejsca pracy: £job_polytechnic_mentor£ ['concept_polytechnic_mentor']. \n- Planety z budynkiem: £building£ §Y$building_volcanic_forge_1$§! będą stopniowo przekształcane w: §Y$pc_volcanic$§!. \n- ['concept_guaranteed_colonies'] będą światami typu: §Y$climate_dry$§!."
 civic_corporate_world_forgers: "Planetarni architekci"
 civic_corporate_world_forgers_desc: "$civic_world_forgers_desc$"
 civic_hive_world_forgers: "Wulkaniczne lęgowiska"
 civic_hive_world_forgers_desc: "$civic_world_forgers_desc$"
 civic_world_forgers_gestalt_effects: "- Odblokowuje planetę początkową: ['concept_pc_volcanic']. \n- $GUARANTEED_RESEARCH_OPTION_STRING$ £society_research£ ['concept_volcanic_forge']. \n- Umożliwia budowę: £building£ §Y$building_volcanic_forge_1$§!, które zapewniają miejsca pracy: £job_polytechnic_drone£ ['concept_polytechnic_drone']. \n- Planety z budynkiem: £building£ §Y$building_volcanic_forge_1$§! będą stopniowo przekształcane w: §Y$pc_volcanic$§!. \n- ['concept_guaranteed_colonies'] będą światami typu: §Y$climate_dry$§!."
 civic_machine_world_forgers: "Termalni optymalizatorzy"
