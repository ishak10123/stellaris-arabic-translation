 job_offworld_prospector_drone_plural: "Kosmiczne drony poszukiwawcze"
 job_offworld_prospector_drone_desc: "Drony dalekiego zasięgu są wysyłane na pobliskie światy stopione, gdzie mają za zadanie lokalizować i wydobywać zasoby: $r_volatile_motes$ i $r_living_metal$."
 mod_job_offworld_prospector_drone_add: "Miejsca pracy: $job_offworld_prospector_drone$"
 # Councilors
 councilor_infernal_scorcher: "Naczelny podpalacz"
 councilor_infernal_scorcher_desc: "$TITLE$ rozpala ducha walki sił zbrojnych, dzięki czemu jednostki pozostają w pełni zaangażowane w swoje operacje wojskowe."
 councilor_thermal_engineer: "Termoinżynier"
 councilor_thermal_engineer_desc: "$TITLE$ zajmuje się rozwiązywaniem problemów technicznych przy budowie infrastruktury w wyjątkowo gorącym środowisku."
 councilor_corporate_thermal_engineer: "Główny $councilor_thermal_engineer$"
 councilor_corporate_thermal_engineer_desc: "$TITLE$ za odpowiednią opłatą zajmuje się rozwiązywaniem problemów technicznych przy budowie infrastruktury w wyjątkowo gorącym środowisku."
 councilor_pyromanic_priest: "Kapłan piromanii"
 councilor_pyromanic_priest_desc: "$TITLE$ uczy wiernych ascezy, dzięki czemu pomaga ograniczać dekadencki konsumpcjonizm."
 councilor_imbuement_officer: "Mimetyczny nadzorca"
 councilor_imbuement_officer_desc: "$TITLE$ korzysta ze swej ekspertyzy w dziedzinie dynamicznych materiałów stałych, aby wspomagać badania techniczne i fizyczne."
 councilor_synth_imbuement_officer: "Mimetyczny megaprocesor"
 councilor_synth_imbuement_officer_desc: "$TITLE$ korzysta ze swej ekspertyzy w dziedzinie dynamicznych materiałów stałych, aby wspomagać badania techniczne i fizyczne."
 councilor_corporate_imbuement_officer: "Dyrektor agencji mimetycznej"
 councilor_corporate_imbuement_officer_desc: "$TITLE$ koordynuje współpracę między partnerami biznesowymi, aby wspomagać badania techniczne i fizyczne."
 # Bombardment Stances
 bombardment_firestorm: "Burza ognia"
 bombardment_firestorm_desc: "Bombardowanie typu \"Burza ognia\" podpala połacie planety. Wywołane pożary są niczym triumfalne ogniska, których widok hartuje naszego ducha i jednoczy nasze społeczeństwo."
 bombardment_seismic_bombing: "Sejsmiczne bombardowanie dywanowe"
 bombardment_seismic_bombing_desc: "$bombardment_seismic_bombing$ oddziałuje na tektonikę planety, niszcząc infrastrukturę oraz powodując pęknięcia skorupy, co prowadzi do powstawania i erupcji gigantycznych wulkanów."
 # Policies
 orbital_bombardment_devastation: "Spustoszenie"
 orbital_bombardment_devastation_name: "Spustoszenie"
 orbital_bombardment_devastation_desc: "Pozwala korzystać z całego arsenału orbitalnego w celu kompletnego wyniszczenia powierzchni planety.\n\n§EUmożliwia tryb bombardowania orbitalnego \"Spustoszenie\".§!"
 diplo_stance_devastators: "Pustoszyciele"
 diplo_stance_devastators_desc: "To imperium pragnie kompletnie wyniszczać obce planety."
 # Opinion Modifiers
 triggered_infernals_opinion_of_others: "Nie termofile"
 triggered_infernals_opinion_of_infernals: "Inne termofile"
 # Casus Belli & War Goal
 casus_belli_cb_blaze: "Oczyszczająca pożoga"
 war_goal_wg_blaze: "Spustoszenie"
 war_goal_wg_blaze_desc: "Wojny prowadzone są, aby oczyścić galaktykę ogniem. Celem mogą być dowolni rywale."
 # Personalities
 personality_scorching_infernals: "Ogniści pustoszyciele"
 personality_scorching_infernals_desc: "$personality_scorching_infernals$ postrzegają obce światy jako doskonałe cele do przeprowadzania niszczycielskich ognistych rytuałów. Obecność miejscowych istot rozumnych jest dla nich tylko przejściową niedogodnością."
 # Melting District Deposits
 d_volcanic_ore_veins: "Wulkaniczne żyły rudy"
 d_volcanic_ore_veins_desc: "Niedawno ostygłe wulkaniczne żyły są bogatym źródłem rud metali."
 d_volcanic_rich_mountain: "Wulkaniczna $d_rich_mountain$"
 d_volcanic_rich_mountain_desc: "$d_rich_mountain_desc$"
 d_volcanic_mineral_fields: "Wulkaniczne $d_mineral_fields$"
 d_volcanic_mineral_fields_desc: "$d_mineral_fields_desc$"
 d_volcanic_ore_caverns: "Wulkaniczne $d_ore_rich_caverns$"
 d_volcanic_ore_caverns_desc: "$d_ore_rich_caverns_desc$"
 d_volcanic_mineral_layers: "Wulkaniczne warstwy mineralne"
 d_volcanic_mineral_layers_desc: "Pradawna aktywność geologiczna pozostawiła tu bogatą w minerały warstwę skalną, posadowioną głęboko pod powierzchnią."
 d_volcanic_weak_crust: "Słaba skorupa"
 d_volcanic_weak_crust_desc: "Tutejsze płyty tektoniczne zostały skruszone szeregiem poprzednich erupcji, dzięki czemu dużo łatwiej będzie dowiercić się do bogatych złóż mineralnych."
 d_volcanic_mineral_hills: "Rudonośne wzgórza"
 d_volcanic_mineral_hills_desc: "Widoczny z daleka metaliczny błysk świadczy o tym, że tuż pod powierzchnią tych wzgórz leżą bogate złoża rud."
 d_volcanic_lava_river: "Rzeki lawy"
 d_volcanic_lava_river_desc: "Brzegi tych ognistych rzek skąpane są w ciepłym, czerwonawym blasku płynącej swobodnie lawy."
 # Thermotechnic District Deposits
 d_volcanic_stable_plateaus: "Stabilne płaskowyże"
 d_volcanic_stable_plateaus_desc: "Te płaskowyże są geologicznie stabilne w porównaniu z okolicznymi terenami."
 d_volcanic_tranquil_flatlands: "Spokojne równiny"
 d_volcanic_tranquil_flatlands_desc: "Te lekko pagórkowate równiny w większości pozostają nietknięte chaosem targającym resztą planety."
 d_volcanic_intraplate: "Stabilny obszar tektoniczny"
 d_volcanic_intraplate_desc: "Ten oddalony od wszelkich uskoków tektonicznych region jest chroniony przed geologicznymi kataklizmami."
 d_volcanic_basalt_plains: "Bazaltowe równiny"
 d_volcanic_basalt_plains_desc: "Połyskujący płaskowyż z zastygłego bazaltu, popękany i podziurawiony przez pradawne wulkaniczne siły."
 d_volcanic_sulfur_lava: "Siarkowa lawa"
 d_volcanic_sulfur_lava_desc: "Ten stały wpływ lawy wydziela osobliwą mieszankę lotnych substancji chemicznych."
 d_volcanic_dried_lavariver: "Wyschnięta rzeka lawy"
 d_volcanic_dried_lavariver_desc: "Pradawna rzeka lawy, która ostygła dawno temu, pozostawiając jedynie wypalony pas przecinający okoliczne ziemie."
 d_volcanic_tunnels: "Odizolowane tunele"
 d_volcanic_tunnels_desc: "Pod górą biegną długie, kręte tunele. Ich ściany zostały wypalone i zeszklone przez pradawne rzeki magmy."
 # Misc Deposits
 d_volcanic_fumarole: "Fumarole"
 d_volcanic_fumarole_desc: "Z tych kominów wulkanicznych buchają rozgrzane $exotic_gases$ pochodzące z głębi planety." # an opening in or near a volcano, through which hot sulphurous gases emerge
 d_volcanic_stifling_atmosphere: "Dusząca atmosfera"
 d_volcanic_stifling_atmosphere_desc: "Wulkaniczny popiół gęsto wypełnia atmosferę, przez co cała planeta pogrążona jest w dusznym półmroku."
 d_andisol_soil: "Dolina pełna andisoli"
 d_andisol_soil_desc: "Ciemne, bogate w związki mineralne gleby powstałe z nagromadzenia popiołów wulkanicznych - to jedno z nielicznych miejsc nadających się do uprawy roślin."
 d_red_giant_unstable: "£energy£ §Y+5§!" # star deposit
 d_red_giant_unstable_desc: "$d_red_giant_dm$"
 d_red_giant_dm: "£sr_dark_matter£ §Y+8§!" # star deposit
 d_red_giant_dm_desc: "$d_red_giant_dm$"
 # Blockers
 d_seismic_bombing_crater: "£blocker£ Wulkaniczny krater"
 d_seismic_bombing_crater_desc: "Ten region został rozerwany sejsmicznym bombardowaniem dywanowym, co wyzwoliło tam wzmożoną aktywność wulkaniczną."
 d_large_volcano: "£blocker£ Wielki wulkan"
 d_large_volcano_desc: "$d_active_volcano_desc$"
 d_ash_storms: "£blocker£ Burze popiołów"
 d_ash_storms_desc: "Ten region spowijają chmury duszącego popiołu."
 d_charged_atmosphere: "£blocker£ Naładowana atmosfera"
 d_charged_atmosphere_desc: "Powietrze w tym regionie aż skrzy się od niebezpiecznych wyładowań energii, które potencjalnie mogą również zapewnić zasilanie."
 d_lava_flooding: "£blocker£ Sezonowe wylewy lawy"
 d_lava_flooding_desc: "Ten region jest cyklicznie zalewany przez powodzie rozgrzanej lawy."
 d_toxic_atmosphere: "£blocker£ Toksyczna atmosfera"
 d_toxic_atmosphere_desc: "Atmosfera w tym regionie niemal nie nadaje się do oddychania. Przetrwają tu tylko najwytrzymalsze organizmy."
 d_raging_lavafalls: "£blocker£ Rozszalałe kaskady lawy"
 d_raging_lavafalls_desc: "Te kaskady rwącej lawy przecinające krajobraz stanowią imponujący widok."
 d_rugged_landscape: "£blocker£ Postrzępiony krajobraz"
 d_rugged_landscape_desc: "Szerokie połacie terenu bez przerwy pustoszone przez aktywność tektoniczną i erupcje wulkanów."
 # Planet Modifiers
 volcanic_critters: "Organizmy ekstremofilne"
 volcanic_critters_desc: "Życie zawsze sobie radzi - nawet na planecie zalanej śmiercionośną lawą, gdzie panują ekstremalnie wysokie temperatury."
