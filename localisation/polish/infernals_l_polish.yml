 building_offworld_expedition_hub: "Pozaplanetarna centrala ekspedycyjna"
 building_offworld_expedition_hub_desc: "To centrum koordynuje niezależne ekspedycje na pobliski świat stopiony, gdzie przedsiębiorczy poszukiwacze mogą odkryć cenne zasoby: $r_volatile_motes$ i $r_living_metal$."
