 job_fire_dancer_plural: "Tancerze ognia"
 job_fire_dancer_desc: "Tancerze ognia to doskonale wyćwiczeni mistrzowie płomieni. Wykonują ogniste rytuały, które łączą całą społeczność, wprawiając widzów w nabożny zachwyt i przepełniając ich wspólnym zapałem."
