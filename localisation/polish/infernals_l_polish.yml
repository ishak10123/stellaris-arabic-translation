 infernals.35.name: "Potop płomieni"
 infernals.35.desc: "Powierzchnia planety §H[from.GetName]§! została rozerwana - jej skorupa popękała pod naporem fali morderczego gorąca. Transformacja okazała się równie gwałtowna, co całkowita: góry zapadły się, oceany zawrzały a niebo zasnuł całun rozżarzonych obłoków.\n\nPo tętniących niegdyś życiem biomach planety nie pozostał ślad. Teraz to miejsce może być domem jedynie dla organizmów ekstremofilnych."
