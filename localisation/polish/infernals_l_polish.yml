 BIO_LM_ARMOR_NAME: "Pancerz Ferrodermalny"
 BIO_LM_ARMOR_1: "Nanokompozytowy $BIO_LM_ARMOR_NAME$"
 BIO_LM_ARMOR_1_DESC: "Kadłub okrętu pokryty grubymi ochronnymi łuskami, które mogą odrastać po uszkodzeniu."
 BIO_LM_ARMOR_2: "Ceramicznochitynowy $BIO_LM_ARMOR_NAME$"
 BIO_LM_ARMOR_2_DESC: "Zwiększony metabolizm stopów opartych o $r_living_metal$ znacznie poprawił możliwości regeneracyjne tego pancerza."
 BIO_LM_ARMOR_3: "Plastalowy $BIO_LM_ARMOR_NAME$"
 BIO_LM_ARMOR_3_DESC: "Ferroderma wyhodowana we wzajemnie wzmacniających się strukturach jeszcze bardziej poprawia możliwości obronne pancerza."
 BIO_LM_ARMOR_4: "Durastalowy $BIO_LM_ARMOR_NAME$"
 BIO_LM_ARMOR_4_DESC: "Różnicowanie tkanek wzdłuż warstw ferrodermalnych umożliwia specjalizację pancerza zarówno pod kątem odporności, jak i regeneracji, znacznie zwiększając jego skuteczność w obu tych aspektach."
 BIO_LM_ARMOR_5: "Neutronowy $BIO_LM_ARMOR_NAME$"
 BIO_LM_ARMOR_5_DESC: "Zaawansowane biokompozyty oparte o $r_living_metal$ czynią z tego materiału najsilniejszy pancerz, który można sztucznie wyhodować."
