 job_cremator_desc: "Krematorzy nadzorują uświęcony rytuał płomieni, prowadząc zmarłych przez ogień do ostatecznego misterium. Powszechnie szanowani jako opiekunowie tej religijnej tradycji, czuwają nad sferą, w której śmierć spotyka transcendencję."
