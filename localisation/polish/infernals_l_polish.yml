 edict_centrifugal_siphoning: "Wirówkowe pompowanie"
 edict_centrifugal_siphoning_desc: "Wirówki o dużej mocy pomagają separować ciekłe stopy, przygotowując je do rekombinacji w $r_living_metal$."
 edict_modular_growth_compounds: "Modułowe mieszanki wzrostowe"
 edict_modular_growth_compounds_desc: "Molekularne techniki modyfikujące $r_living_metal$ umożliwiają tworzenie mieszanek przyspieszających wzrost."
 concept_inf_lm_weapon: "$LM_ACCELERATOR$"
 concept_inf_lm_weapon_desc: "Silniejsza wersja broni: §Y$KINETIC_ARTILLERY_2$§!, której koszt w zas.: $r_alloys$ zostaje zastąpiony przez zas.: $r_living_metal$. \n\nOdblokowana po opracowaniu technologii £engineering_research£ ['technology:tech_kinetic_artillery_2']."
 LM_ACCELERATOR_SET: "$LM_ACCELERATOR$"
 LM_ACCELERATOR_SET_DESC: "Artyleria skonstruowana z użyciem technologii opartej o $r_living_metal$. Broń ta jest w stanie samodzielnie regenerować uszkodzenia powstające przy eksploatacji i transformować się, by optymalizować swoje parametry - dzięki temu może używać znacznie potężniejszej amunicji."
