 building_living_metal_clinic_desc: "Ta klinika sprzedaje lokalnej populacji chemiczne wspomagacze oparte o $r_living_metal$, generując zyski i pozyskując przydatne produkty uboczne."
 concept_offworld_expedition_hub: "$building_offworld_expedition_hub$"
