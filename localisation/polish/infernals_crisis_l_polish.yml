l_polish:
 # Ascension Perk
 ap_galactic_hyperthermia: "Galaktyczna hipertermia"
 ap_galactic_hyperthermia_desc: "Wszechświat zrodził się z ognia, ale ostygł - stał się nieprzyjaznym i ciemnym miejscem. Żeby się rozwijać, musimy go ogrzać, choćby inni mieli przez to zginąć."
 must_be_infernals: "$TRIGGER_FAIL$Wymaga, by naszą populację tworzyły termofile."
 # UI
 entropy_crystals: "Skrystalizowana entropia"
