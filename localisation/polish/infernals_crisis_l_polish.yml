 crisis_hyperthermia_already_ongoing: "Kolejne imperium już przejmuje kontrolę nad jądrem galaktyki."
 crisis_hyperthermia_already_happened: "Kolejne imperium już kontroluje galaktyczne jądro i z powodzeniem odmieniło galaktykę."
