 # MPerks Level 1
 menp_hyperthermia_crystals: "$entropy_crystals$"
 menp_hyperthermia_crystals_desc: "§Y$entropy_crystals$§! to przełom w dziedzinie kontrolowanej destabilizacji energii. Mając do dyspozycji ten niestabilny zasób, możemy zmienić galaktyczny porządek."
 unlocks_entropy_objectives: "Umożliwia gromadzenie: £entropy_crystals£ §Y$entropy_crystals$§! dzięki realizacji §Hcelów kryzysowych§!."
 menp_hyperthermia_harnessing: "Ujarzmienie entropii"
 menp_hyperthermia_harnessing_desc: "§Y$entropy_crystals$§! może być poddawana syntezie, dzięki czemu nasz przemysł będzie wydajniej wykorzystywał ten niestabilny zasób, a nasze cele strategiczne będą szły w parze z priorytetowym podejściem do techniki."
 unlocks_entropy_edict: "§HOdblokowuje edykt:§! $edict_entropy_harnessing$"
 menp_hyperthermia_crucible: "Kolebka galaktyczna"
 menp_hyperthermia_crucible_desc: "Ta kolebka miałaby stać się głównym narzędziem w procesie ujarzmiania entropii gwiazd. Dzięki możliwości krystalizacji i transportowania tego zasobu, kolebka stanie się świadectwem naszej ognistej mocy rozprzestrzeniającej się wśród gwiazd."
 unlocks_galactic_crucible: "§HOdblokowuje superkonstrukcję:§! $galactic_crucible_0$"
 # MPerks Level 2
 menp_hyperthermia_conc_entropy: "Skoncentrowana entropia"
 menp_hyperthermia_conc_entropy_desc: "W tej chwili $entropy_conduit_plural$ mają kluczowe znaczenie dla wzmocnienia naszej potęgi. Zwiększenie produkcji kolebki przyspieszy nasz marsz ku jaśniejszej, płonącej przyszłości."
 unlocks_conduit_spawn: "§H$UNLOCKS_SHIP_TYPE$:§! $entropy_conduit$ \n- §Y$entropy_conduit_plural$§! automatycznie wytwarza §Y$galactic_crucible_4$§! i przemieszczają się one do pobliskich układów słonecznych. \n- Kolonie we wskazanym układzie otrzymują premie. \n- Posiadają broń (£ship_xl_slot£ §Y$LENS_FLARE_BEAM$§!), która po trafieniu unieszkodliwia wrogów na kilka dni. \n\n"
 menp_hyperthermia_radiant: "Olśniewające ambicje"
 menp_hyperthermia_radiant_desc: "Jeśli chcemy być iskrą, która podpali całą galaktykę, nie mamy czasu na wątpliwości czy biurokrację. Nie możemy tracić czasu na przebudowę niezliczonych układów. Żeby zrealizować nasze cele, musimy dramatycznie zwiększyć naszą wydajność budowy."
 menp_hyperthermia_ignition: "Przymusowy zapłon"
 menp_hyperthermia_ignition_desc: "Czasami nie wystarczy mocniej naciskać. Musimy osiągnąć kolejny poziom rozwoju technologicznego i w pełni wykorzystać jego potencjał. Czas ograniczyć zabezpieczenia i zmaksymalizować produkcję."
 unlocks_crucible_overclocking: "Pozwala przyspieszyć §Hsuperkonstrukcję§! §Y$galactic_crucible_1$§!."
 # MPerks Level 3
 menp_hyperthermia_cruiser: "$ember_cruiser$"
 menp_hyperthermia_cruiser_desc: "Te jednostki, wyposażone w najnowocześniejsze technologie, zamieniają niestabilny gorący strumień w ukierunkowaną dezintegrację, by spopielić naszych wrogów."
 unlocks_ember_cruiser: "§H$UNLOCKS_SHIP_TYPE$:§! $ember_cruiser$"
 menp_hyperthermia_flames: "Wszechogarniające płomienie"
 menp_hyperthermia_flames_desc: "W naszej wizji utopii nie ma miejsca na sprzeciw wobec naszych celów. Każdy, kto spróbuje nas zatrzymać, szybko przekona się, że na opór odpowiemy morzem ognia zesłanym na ich światy macierzyste."
 unlocks_firestorm_stance: "§HOdblokowuje terraformowanie:§! $pc_volcanic$ \n§HOdblokowuje postawę bombardowania:§! $bombardment_firestorm$\n\n"
 menp_hyperthermia_coronal: "Odprowadzanie dookólne"
 menp_hyperthermia_coronal_desc: "W tej chwili nasze $entropy_conduit_plural$ odprowadzają ogromne ilości ciepła, by zachować stabilność. Kierując to ciepło w okoliczną przestrzeń możemy sprawić, że $entropy_conduit_plural$ staną się niszczycielską bronią do pognębienia naszych wrogów."
 unlocks_conduit_damage: "§Y$entropy_conduit_plural$§! zadają pasywne uszkodzenia wrogim okrętom i stacjom. \n\n"
 # MPerks Level 4
 menp_hyperthermia_reactors: "Reaktory heliofuzyjne"
 menp_hyperthermia_reactors_desc: "§Y$entropy_crystals$§! wykorzystywana w sprzęcie wojskowym odblokowuje systemy napędowe o niedoścignionej mocy. Nasze okręty będą mknąć między gwiazdami, jak nigdy dotąd."
 menp_hyperthermia_solarflare: "Sztuczny rozbłysk słoneczny"
 menp_hyperthermia_solarflare_desc: "Był taki czas, kiedy część galaktyki znajdowała się poza naszym zasięgiem. Ta iluzja przestaje istnieć. Niebawem nasze $entropy_conduit_plural$ całymi rojami obsiądą gwiazdy i precyzyjnie zniszczą każdego, kto ośmieli się nam sprzeciwić."
 unlocks_conduit_borders: "§Y$entropy_conduit_plural$§! automatycznie przekraczają granice i wchodzą na terytorium wroga. \n\n"
 menp_hyperthermia_armada: "Armada Ognia"
 menp_hyperthermia_armada_desc: "Galaktyka jednoczy się przeciwko nam, więc musimy się zmobilizować. Teraz każdy obywatel musi pomóc na froncie energetycznym, podsycić ogień naszej dominacji."
 unlocks_blazing_navalcap: "§Y[GetAlloyProducerPlural]§! i §Y[GetResearcherPlural]§! zwiększają: £navy_size£ §Y$MOD_COUNTRY_NAVAL_CAP_ADD$§!.\n\n"
 # MPerks Level 5
 menp_hyperthermia_battleship: "$ember_battleship$"
 menp_hyperthermia_battleship_desc: "Dzięki lufom dział gorącym niczym ognista burza, która niebawem ogarnie galaktykę, te duże okręty staną się podstawą naszych sił obronnych zgromadzonych wokół kolebki."
 unlocks_ember_battleship: "§H$UNLOCKS_SHIP_TYPE$:§! $ember_battleship$ \n- Może używać broni: £ship_xl_slot£ §Y$LENS_FLARE_BEAM$§!."
 menp_hyperthermia_critical_mass: "Masa krytyczna"
 menp_hyperthermia_critical_mass_desc: "Nasilająca się aktywność entropii w zewnętrznej warstwie gwiazdy sprawia, że wyrzuca ona fale promieniowania. Prowadzi to do błyskawicznego rozgrzania całych układów."
 unlocks_conduit_boost: "§Y$entropy_conduit_plural$§! stają się mocniej uzależnione od liczby zajętych układów.\n\n$hyperthermia_map_perc$\n\n"
 hyperthermia_map_perc: "§G20%§! galaktyki: $TABBED_NEW_LINE$- $entropy_conduit_plural$ sieją zniszczenie w pobliskich koloniach $TABBED_NEW_LINE$- Porażone kolonie będą powoli tracić £pop£ $POPS$ $TABBED_NEW_LINE$- Działa tylko na imperia gatunków niebędących §Ytermofilami§! $TABBED_NEW_LINE$- Niezbędne układy: §Y[root.hyperthermia_own_systems_var]§!/§Y[root.hyperthermia_systems_var]§!"
 menp_hyperthermia_ammunition: "Wzmocniona amunicja"
 menp_hyperthermia_ammunition_desc: "Udoskonalona konstrukcja amunicji: obecnie standardowa amunicja jest wzmacniania mikroskopijnymi rdzeniami entropii, które w chwili uderzenia uwalniają niestabilne fale cieplne. Powoduje to większe zniszczenia."
 # Misc
 entropy_crystals_deficit: "$entropy_crystals$ - niedobór"
 edict_entropy_harnessing: "Ujarzmienie entropii"
 edict_entropy_harnessing_desc: "Dzięki temu, że $entropy_crystals$ jest produkowana przez naszą infrastrukturę, możemy czynić pełny użytek z naszych zdolności technicznych i wykorzystywać cały potencjał tego nowego zasobu."
