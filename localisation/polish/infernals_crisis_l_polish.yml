 # Weapon
 LENS_FLARE_BEAM: "Paralizator soczewkowy"
 LENS_FLARE_BEAM_DESC: "Promień tej broni jest skalibrowany tak, by zakłócał najważniejsze systemy sterowania. Zapewni to krótki czas na przeprowadzenie ataków, które nie napotkają oporu."
 lfb_on_hit_stun_tt: "§YUnieszkodliwia§! cel na §G7§! dni. W tym czasie nie może się on poruszać ani odpowiadać ogniem."
 lf_weapon_stun_effect: "§RTrafienie - $LENS_FLARE_BEAM$§!"
 lf_weapon_stun_effect_desc: "   " # not visible
 # Megastructure
 galactic_crucible_0: "Szkielet kolebki galaktycznej"
 galactic_crucible_0_DESC: "Podstawa konstrukcji, na której powstaje $galactic_crucible_4$. Wokół niego nadbudowuje się resztę stacji."
 galactic_crucible_0_MEGASTRUCTURE_DETAILS: "Ta ogromna stacja pobiera energię z pobliskiej gwiazdy i wykorzystuje ją do zasilania automatycznych stoczni, w których powstają §Y$entropy_conduit_plural$§!, okręty mogące wpływać na losy gwiazd."
 galactic_crucible_1: "$galactic_crucible_4$ - kadłub"
 galactic_crucible_1_DESC: "$galactic_crucible_4$ ma już podstawową infrastrukturę i jest działającą stacją. Trwa budowa systemów krystalizacji entropii."
 galactic_crucible_2: "$galactic_crucible_4$ - rdzeń"
 galactic_crucible_2_DESC: "$galactic_crucible_4$ jest już w pełni sprawna i może powstawać tam §Y$entropy_crystals$§!. Wszystkie kolejne ulepszenia będą opierać się na tym fundamencie.\n\n§HUkończ projekt specjalny, żeby odblokować następy etap.§!"
 galactic_crucible_3: "$galactic_crucible_4$ - węzeł"
 galactic_crucible_3_DESC: "Rosnąca $galactic_crucible_4$ posiada już modułowe systemy entropii, które mogą być swobodnie powiększane oraz rozbudowywane. Technicy mogą zwiększyć jej pojemność i ograniczyć braki wydajności."
 galactic_crucible_4: "Kolebka galaktyczna"
 galactic_crucible_4_DESC: "W pełni uzbrojona i sprawna $galactic_crucible_4$ może zacząć siać ognistą pożogę w całej galaktyce. Systemy przepływu entropii działają z pełną wydajnością teoretyczną."
 galactic_crucible_5: "$galactic_crucible_4$ - instytut"
 galactic_crucible_5_DESC: "$galactic_crucible_4$ została nieodwracalnie zmodyfikowana, by zapobiec nadmiernej i groźnej produkcji energii. Pozostanie stabilnym oraz bezpiecznym źródłem dobrobytu imperium."
 galactic_crucible_ruined: "Zniszczona $galactic_crucible_4$"
 galactic_crucible_ruined_DESC: "Zniszczona stocznia, która niegdyś służyła realizacji ognistych ambicji upadłego imperium."
 galactic_crucible_ruined_MEGASTRUCTURE_DETAILS: "W tych ogromnych ruinach wciąż znajdują się gorące obszary, pulsujące nieprzewidywalnym ogniem wśród rozrzuconych szczątków."
 SPAWN_CONDUITS: "$entropy_conduit_plural$"
 SPAWN_CONDUITS_DESC: "$galactic_crucible_4$ automatycznie wytwarza $entropy_conduit_plural$, które polecą do gwiazdy, z której może powstać §Y$pc_m_giant_star$§!."
 megastructure_overclocking_desc: "Dzięki strategicznemu przyspieszeniu ta superkonstrukcja może przekroczyć zwykłe limity operacyjne i odblokować wyjątkowe efekty."
 overclock_mode: "Tryb:"
 overclock_gc_default: "$overclock_mode$ §HDomyślny§!"
 overclock_gc_default_desc: "Wytwarza stały, niewielki zapas skrystalizowanej entropii.\n"
 overclock_gc_high: "$overclock_mode$ §HPrzeciążenie§!"
 overclock_gc_high_desc: "Wykorzystuje ogromne zapasy energii, aby przyspieszyć budowę przewodu.\n"
 overclock_gc_eco: "$overclock_mode$ §HProdukcja§!"
 overclock_gc_eco_desc: "Duży wydatek stopów pozwala wytwarzać większe ilości skrystalizowanej entropii.\n"
 overclock_gc_war: "$overclock_mode$ §HCentrum koordynacji§!"
 overclock_gc_war_desc: "$galactic_crucible_4$ może dostarczać pobliskim okrętom spore ilości energii, co maksymalizuje siłę bojową flot obronnych.\n"
 # Event Chain
 galactic_hyperthermia_chain_title: "$ap_galactic_hyperthermia$"
 galactic_hyperthermia_chain_desc: "Uznaliśmy, że ogień ukształtuje przyszłość, zatem podpalimy całą galaktykę."
 # Special Projects
 INF_CRISIS_ENTROPY: "Nowe źródło zasilania"
 INF_CRISIS_ENTROPY_DESC: "Ogień od dawna odgrywa istotną rolę w naszym społeczeństwie, ale może znaleźliśmy nowatorskie sposoby na ujarzmienie jego chaotycznej potęgi. Spełnia się marzenie naszych naukowców: źródło energii, które może nie tylko zasilać naszą obecną cywilizację, ale także umożliwi nam podróżowanie wśród gwiazd.\n\n§HEfekt:§! Odblokowuje nowy zasób: £entropy_crystals£ §Y$entropy_crystals$§!."
 INF_CRISIS_ENTROPY_EVIL: "Zaprojektowana burza ogniowa"
 INF_CRISIS_ENTROPY_EVIL_DESC: "Kolebka wskazała naszemu gatunkowi nową drogę. Tylko głupcy mogliby nią nie podążyć, a my nie tolerujemy głupców. Czas odmienić galaktykę na nasze ogniste podobieństwo i spalić każdego, kto odmówi przyjęcia naszej wizji.\n\n§HEfekty:§!\n- Odblokowuje następne ulepszenie dla: §Y$galactic_crucible_4$§!.\n- §Y$entropy_conduit_plural$§! mogą teraz zmieniać gwiazdy na terytorium wroga.\n\n" # Crystallized Entropy is used to its full potential
 INF_CRISIS_ENTROPY_GOOD: "Nieprzewidziana korelacja"
 INF_CRISIS_ENTROPY_GOOD_DESC: "Potęga kolebki jest olbrzymia, a przy tym niestabilna. Jeżeli trwale ograniczymy jej zdolności, uzyskamy skromne źródło dobrobytu, które nie zagrozi galaktyce i nie pogorszy naszych stosunków z sąsiadami." # Crystallized Entropy can be used for the economy
 # Countdown Situation
 situation_galactic_hyperthermia_timer: "Mobilizacja"
 situation_galactic_hyperthermia_timer_type: "$situation_galactic_hyperthermia_timer$"
 situation_galactic_hyperthermia_timer_desc: "Niebawem §Y$entropy_crystals$§! umożliwi nam radykalną transformację galaktyki. W okolicach jądra galaktyki otworzyliśmy sześć tuneli czasoprzestrzennych.\nJeżeli w każdym z nich znajdą się §Y$entropy_conduit_plural$§! i będziemy bronić ich przed każdym, kto chciałby pokrzyżować nasze plany, będziemy mogli podpalić całą galaktykę."
 situation_galactic_hyperthermia_timer_monthly_change_tooltip: "Obecny poziom entropii przedostający się do jądra galaktyki. Kiedy osiągnie szczyt, galaktyka stanie w ogniu."
 situation_gh_timer_outcome: "Według raportów wywiadu różne państwa chcą pokrzyżować nasze plany i prawdopodobnie szykują się do wojny. Jeżeli nie przygotujemy się na tę ewentualność, nasze przedsięwzięcie skończy się, jeszcze zanim się zaczęło."
 situation_gh_approach_timer: "Zmierzmy się ze skutkami"
 situation_gh_approach_timer_tt: "Nadszedł czas. Niebawem galaktykę ogarnie nieuchronna wojna o epickiej skali."
 situation_gh_difficulty_progress: "Poziom trudności"
 situation_gh_opponent_progress: "§G-0,1§! za każde przeciwne imperium"
 # Crisis Situation
 situation_galactic_hyperthermia: "Galaktyczna burza ognia"
 situation_galactic_hyperthermia_type: "$situation_galactic_hyperthermia$"
 situation_galactic_hyperthermia_monthly_change_tooltip: "Szybkość, z jaką galaktyka zbliża się do wielkiego pożaru."
 situation_hyperthermia_desc_perp: "§LMarzymy o ognistej utopii, ale żeby ją stworzyć, musimy spalić wszystko, co znajdzie się na naszej drodze. Rozpaliliśmy pierwsze iskry, a teraz trzeba podsycać płomienie, aż ogarną nawet najdalsze zakątki galaktyki.§!\n\n$situation_hyperthermia_stats$"
 situation_hyperthermia_desc: "§L§Y[event_target:hyperthermia_empire.GetName]§! sprawia, że gwiazdy płoną. Teraz to my musimy walczyć z największym pożarem w dziejach galaktyki. Nie będzie drugiego podejścia. Jeśli zawiedziemy, wszystkie nasze osiągnięcia obrócą się w popiół.§!\n\n$situation_hyperthermia_stats$"
 situation_hyperthermia_stats: "§HZdobyte główne układy:§! [event_target:hyperthermia_empire.gh_crisis_core_var]"
 situation_galactic_hyperthermia_outcome: "[GetHyperthermiaOutcome]"
 situation_gh_outcome_perp: "Jeżeli nam się uda, pożoga ogarnie galaktykę, a pośród jej popiołów ostaną się jedynie ci, którzy poszli drogą ognia. Nawet gwiazdy nie są odporne, po miliardach lat zostaną przeobrażone na podobieństwo naszej gwiazdy macierzystej."
 situation_gh_outcome_other: "Jeżeli §Y[hyperthermia_empire.GetName]§! zwycięży, cała galaktyka spłonie na popiół i stanie się miejscem, w którym przetrwają tylko organizmy termofilne."
 situation_galactic_hyperthermia_progress: "Liczba galaktycznych układów głównych, które są okupowane przez §Y$entropy_conduit_plural$§! określa miesięczne postępy. \n$TABBED_NEW_LINE$- Mniej niż §Y3§! układy: §R-3§! $TABBED_NEW_LINE$- Okupowanie §Y3§! układów: §Y0§! $TABBED_NEW_LINE$- Więcej niż §Y3§! układy: §G+3§! do \n\nbieżących postępów"
 situation_galactic_hyperthermia_stage1: "Osiągnięto minimum ($stage_1$)"
 situation_gh_approach_perp: "Karmienie ognia"
 situation_gh_approach_perp_tt: "Teraz albo nigdy. Musi się nam udać, w przeciwnym razie stracimy wszystko, co osiągnęliśmy."
 situation_gh_approach_other: "Gaszenie ognia"
 situation_gh_approach_other_tt: "To imperium stanowi zagrożenie egzystencjalne dla stabilności galaktyki. Otwarte starcie to już nie wybór, lecz konieczność."
 # Events
 # NOTE: Remove most #comments below after texts are done
 infernals.1000.name: "Nowa potęga"
 infernals.1000.desc: "[GetHyperthermiaIntroIfRedGiant]"
 infernals.1000.descNormal: "Nasi [GetScientistPlural] opracowali nową metodę gromadzenia i przechowywania entropii poprzez umieszczenie jej w matrycy wysokoenergetycznych kryształów. §Y$entropy_crystals$§! może służyć do przechowywania oraz transportu dużej ilości energii cieplnej, którą można wykorzystać w działalności przemysłowej, gospodarczej i międzygwiezdnej.\n\nModelowanie wykazało, że można też wykorzystać ją do terraformowania planet, by ocieplić ich klimat, a nawet do przyspieszenia ewolucji gwiazd w czerwone olbrzymy. Wolna entropia z całej galaktyki może zostać zebrana i przekształcona w przydatną energię cieplną, która napędzi złożoną ekspansję termiczną w galaktycznej skali.\n\n§HRozpoczyna projekt specjalny:§! §Y$INF_CRISIS_ENTROPY$§!"
 infernals.1000.descRedGiant: "Nasi [GetScientistPlural] przeanalizowali substancję o nazwie §Y$entropy_crystals$§!, która niegdyś posłużyła do rozpalenia czerwonego olbrzyma, co omal nie zakończyło istnienia naszej cywilizacji, zanim jeszcze się ono zaczęło. Teraz możemy odtworzyć jej niestabilną strukturę, by wiązać i transportować ogromne ilości energii cieplnej oraz wykorzystywać ją do celów przemysłowych, gospodarczych - a nawet w skali gwiazd.\n\nSymulacje wykazały, że może ona umożliwić terraformowanie do cieplejszych klimatów albo przyspieszać ewolucję gwiazd w czerwone olbrzymy. Teoretycznie entropia wypełniająca galaktykę może być pozyskiwana i zamieniana w ciepło, które zasili systematyczną ekspansję termiczną.\n\n§HRozpoczyna projekt specjalny:§! §Y$INF_CRISIS_ENTROPY$§!" # Intro if you've learned about entropy from the Red Giant Miners
 infernals.1005.name: "Osiągnięto krystalizację"
 infernals.1005.desc1: "Ukończyliśmy naszą pierwszą infrastrukturę, która zbiera energię i przetwarza ją w zasób znany nam teraz jako §Y$entropy_crystals$§!. Przechowuje ona ogromne ilości energii cieplnej i umożliwia naszemu przemysłowi przechowywanie oraz transportowanie zasilania o wiele wydajniej niż konwencjonalnymi metodami.\n\nCzerwone olbrzymy, dzięki rozległym powierzchniom emisji i produkcji ogromnych ilości ciepła, doskonale nadają się do tego procesu. Jesteśmy już gotowi do użycia tej technologii w kontrolowanym przez nas układzie.\n\nNasi technicy rozpoczęli też adaptację tego procesu do celów przemysłowych - prowadzą doświadczenia, w których $entropy_crystals$ powstaje w skutek syntezy entropii otoczenia. Rozkwita nowa gałąź gospodarki, za tym przyjdą potęga i bogactwo. Nasi [GetScientistPlural] już szukają możliwości zwiększenia produkcji.\n\n§HOdblokowuje superkonstrukcję:§! §Y$galactic_crucible_0$§!" # Reaching lv1
 infernals.1005.desc2: "Posiadane przez nas próbki zasobu znanego nam jako §Y$entropy_crystals$§! pozwolą zbierać entropię i syntetyzować ją, nie powodując zagrożenia dla naszej gwiazdy macierzystej. Te kryształy przechowują ogromne ilości energii cieplnej i pozwalają naszemu przemysłowi przechowywanie oraz transportowanie zasilania o wiele wydajniej niż konwencjonalnymi metodami.\n\nCzerwone olbrzymy, dzięki rozległym powierzchniom emisji i produkcji ogromnych ilości ciepła, doskonale nadają się do tego procesu. Jesteśmy już gotowi do użycia tej technologii w kontrolowanym przez nas układzie.\n\nNasi technicy rozpoczęli też adaptację tego procesu do celów przemysłowych - prowadzą doświadczenia, w których $entropy_crystals$ powstaje w skutek syntezy entropii otoczenia. Rozkwita nowa gałąź gospodarki, za tym przyjdą potęga i bogactwo. Nasi [GetScientistPlural] już szukają możliwości zwiększenia produkcji.\n\n§HOdblokowuje superkonstrukcję:§! §Y$galactic_crucible_0$§!" # Reaching lv1
 infernals.1005.a: "Musimy rozpocząć budowę."
 infernals.1005.a.tt: "$constructor$ sprawi, że §Y$galactic_crucible_0$§! powstanie na orbicie gwiazdy."
 infernals.1005.b: "Polećmy dronom rozpoczęcie budowy."
 infernals.1005.b.tt: "$constructor$ sprawi, że §Y$galactic_crucible_0$§! powstanie na orbicie gwiazdy."
 infernals.1006.name: "Termofilna ewolucja"
 infernals.1006.desc: "Wyruszamy podpalić galaktykę, ale nasze formy muszą być przygotowane na działanie ciepła. Adaptacja naszej populacji do wysokich temperatur pomoże nam rozwijać się w naszej nowej, ognistej przyszłości."
 infernals.1006.descRedGiant: "Pracujemy niestrudzenie nad odwróceniem zmian naszej gwiazdy, a jednocześnie nasze formy muszą być przygotowane na działanie ciepła. Adaptacja naszej populacji do wysokich temperatur pomoże nam rozwijać się w nowej, ognistej przyszłości kreowanej przez naszą gwiazdę."
 infernals.1010.name: "$entropy_conduit_plural$ - wystrzelenie"
 infernals.1010.desc: "$galactic_crucible_1$ już może wysłać §Y$entropy_conduit_plural$§!: automatyczne systemy przeznaczone do przesyłania i wzmacniania entropii gwiezdnej. Kiedy zostaną wysłane, będą prowadzić recykling oraz zwiększać produkcję energii przez gwiazdę, co przemieni ją w czerwonego olbrzyma ogrzewającego całe układy, na których umieścimy rozwijającą się infrastrukturę naszego imperium.\n\nTe §Y$entropy_conduit_plural$§! można wytwarzać regularnie, działają one autonomicznie, co jest bardzo wygodne. Na razie pozostaną na naszym terytorium, ale za jakiś czas moglibyśmy rozesłać je po całej galaktyce. Przecież nasze imperium ciągle rośnie.\n\n§HDostępne ulepszenia superkonstrukcji:§! §Y$galactic_crucible_2$§!" # Reaching lv2
 infernals.1010.a: "$entropy_crystals$ - produkcja przyspieszy."
 infernals.1010.b: "Musimy podbić więcej gwiazd."
 infernals.1015.name: "Jak gorąco będzie?"
 infernals.1015.desc: "§Y$entropy_crystals$§! Ma niesamowity potencjał, który właśnie odkryliśmy: przy dużej koncentracji może zasilać broń o niewiarygodnej sile rażenia, zdolną niszczyć całe planety. W obliczu takiej potęgi cała galaktyka znalazłaby się na naszej łasce.\n\nAle testowanie takich militarnych zastosowań zniszczyłoby resztki zaufania, jakim darzą nas sąsiedzi. I kto zagwarantuje, że taka broń nigdy nie zostałaby użyta przeciwko nam?\n\nPuste słowa o pokoju to za mało. Jeśli chcemy dowieść naszych intencji, $galactic_crucible_2$ musi być unieruchomiona, by nigdy nie mogła wyprodukować takiej broni. W przeciwnym razie za jakiś czas ta technologia zostanie zmilitaryzowana przez nas lub kogoś innego.\n\n§HTa decyzja odblokowuje projekt specjalny.§!" # Reaching lv3 & decision
 infernals.1015.a: "Podsyćmy płomień wojny!" # evil path
 infernals.1015.a.desc: "Odblokowuje $crisis_hyperthermia_level_4$ poziom kryzysu.\n" #\n\n§HIssues Special Project:§! §Y$INF_CRISIS_ENTROPY_EVIL$§!
 infernals.1015.b: "Ostudźmy nasze ambicje." # good path
 infernals.1015.b.desc: "Uniemożliwia dostęp do $crisis_hyperthermia_level_4$ poziomu kryzysu. \n\n§HRozpoczyna projekt specjalny:§! §Y$INF_CRISIS_ENTROPY_GOOD$§!, by §Y$galactic_crucible_2$§! zamieniła się w: §Y$galactic_crucible_5$§!."
 infernals.1020.name: "W ogień"
 infernals.1020.desc: "Badając zasób, znany nam jako §Y$entropy_crystals$§! i §Yprojekt $INF_CRISIS_ENTROPY_EVIL$§! potwierdziliśmy nasze podejrzenia: naprawdę możemy stworzyć niszczycielską broń. Dysponując taką potęgą, nie będziemy musieli hamować się dla dobra stosunków dyplomatycznych.\n\n$galactic_crucible_3$ będzie rozbudowywana szybciej, a szczególny nacisk zostanie położony na jej... agresywne zastosowania. Im prędzej uruchomimy tę broń, tym mniej będziemy musieli się liczyć ze zdaniem reszty galaktyki.\n\n§HDostępne ulepszenia superkonstrukcji:§! §Y$galactic_crucible_4$§!" # Finishing special project for evil path
 infernals.1020.a: "Musimy przygotować się do wojny."
 infernals.1020.a.tt: "- §Y$galactic_crucible_4$§! będzie priorytetowo rozbudowywana.\n- $unlocks_conduit_damage$"
 infernals.1020.b: "Nasi rywale staną się rozpałką dla wielkiego pożaru."
 infernals.1020.b.tt: "- §Y$galactic_crucible_4$§! będzie priorytetowo rozbudowywana.\n- $unlocks_conduit_damage$"
 infernals.1021.name: "Trwały blask"
 infernals.1021.desc: "$galactic_crucible_3$ została uszkodzona, dzięki czemu nigdy nie zostanie wykorzystana do niszczycielskich celów. Utrata jej pełnego potencjału jest przykra, ale dalsze podążanie tą drogę mogło doprowadzić do katastrofy i zerwania kontaktów dyplomatycznych ze wszystkimi imperiami.\n\nNa szczęście nawet w tej ograniczonej formie $galactic_crucible_5$ pozostanie potężnym źródłem energii i dobrobytu. Cofnęliśmy się, zanim przekroczyliśmy pewną granicę, dzięki czemu w przyszłości będziemy mogli współpracować ze Wspólnotą Galaktyczną, a jednocześnie czerpać korzyści z tego niesamowitego osiągnięcia naukowego.\n\n§HDostępne ulepszenia superkonstrukcji:§! §Y$galactic_crucible_5$§!" # Finishing special project for good path
 infernals.1021.a: "Wszyscy skorzystamy na współpracy."
 infernals.1021.b: "Harmonia przynosi dobrobyt."
 infernals.1025.name: "Otoczenie jądra"
 infernals.1025.desc: "Badamy §Y$entropy_conduit_plural$§! oraz transformacje gwiazd w czerwone olbrzymy, dzięki czemu ustaliliśmy, że możemy wzmocnić nasze oddziaływanie tak, by doprowadzić do przegrzania jądra galaktyki. To uwolni kaskadę energii cieplnej w całej galaktyce i uczyni ją miejscem przyjaźniejszym dla naszego gatunku.\n\nWskazaliśmy sześć układów w pobliżu jądra, które mogą stać się centrami operacyjnymi tego przedsięwzięcia. Te układy znajdują się poza siecią galaktycznych hiperlinii, ale trwają prace nad stworzeniem stabilnych tuneli czasoprzestrzennych, które umożliwią dostęp do tych miejsc." # Reaching lv4
 infernals.1025.a: "Tylko my potrafimy przetrwać w ogniu."
 infernals.1025.a.tt: "Inne gatunki będą chciały nas powstrzymać. Szykujmy się na galaktyczną wojnę."
 infernals.1025.b: "Cała galaktyka zapłonie w doskonałej harmonii."
 infernals.1025.b.tt: "Inne gatunki będą chciały nas powstrzymać. Szykujmy się na galaktyczną wojnę."
 infernals.1030.name: "Wyścig w stronę ognia"
 infernals.1030.desc: "$galactic_crucible_4$ jest już w pełni uzbrojona i sprawna. Tunele czasoprzestrzenne są gotowe, dzięki czemu mamy dostęp do wszystkich sześciu układów koncentracji sił wokół jądra galaktyki.\n\nMożemy zacząć pracę nad przegrzaniem jądra. Inne imperia mogą odkryć nasze działania i spróbować dotrzeć do tych układów, ale na razie mamy przewagę, a jądro zachowuje się zgodnie z naszą wolą.\n\n§HUżyjmy tunelu czasoprzestrzennego, żeby opanować układy wokół układów jądra galaktyki.§!" # Reaching lv5, lanes open in 3 years!
 infernals.1030.a: "Rozpocznijmy instalację w układach jądra."
 infernals.1030.a.tt: "§Y$entropy_conduit_plural$§! rozmieszczone w sześciu układach jądra galaktyki pozwolą nam przegrzać całą galaktykę na raz. Musimy rozpocząć przygotowania."
 infernals.1030.b: "Ogień rozświetla naszą przyszłość."
 infernals.1030.b.tt: "$infernals.1030.a.tt$"
 infernals.1035.name: "Galaktyczny alarm pożarowy"
 infernals.1035.desc: "Imperia rywali siłą otworzyły hiperlinie do naszych obszarów koncentracji sił wokół jądra galaktyki. Nadal rozgrzewamy jądro, ale musimy przygotować się do walki.\n\nJednak nic nas nie zatrzyma. Zimna przestrzeń zniknie, a w jej miejsce pojawi się ognista chwała naszej wielkiej przyszłości."
 # core is now connected with the galaxy!
 infernals.1035.a: "Nigdy nie ugaszą naszego ognia."
 infernals.1035.b: "Niech rzucą się w niszczycielski ogień."
 infernals.1040.name: "Nadchodząca burza"
 infernals.1040.desc: "Jądro galaktyki stało się aktywniejsze. Poziom entropii wokół supermasywnej czarnej dziury gwałtownie rośnie i uwalnia fale promieniowania cieplnego w stronę pobliskich układów.\n\nPojawiła się panika, ale zespół odważnych naukowców przybyłych z wielu światów, odkrył nowe hiperlinie prowadzące do sześciu układów otaczających jądro. Wygląda na to, że znajdują się tam placówki, którymi zarządza §Y[hyperthermia_empire.GetName]§!, aktywnie podgrzewające jądro. To nieodpowiedzialne działanie może wywołać potężną burzę ognia w całej galaktyce, która spali wszystkich, którzy spróbują przeciwstawić się tym piromanom.\n\nJeżeli chcemy przetrwać, musimy przebić się do tych układów i przejąć nad nimi kontrolę. Kryzys trwa, a temperatura wciąż rośnie." # other empires learn about the core, forming a coalition war
 infernals.1040.a: "Musimy to zatrzymać!" # generic reply (declares war)
 infernals.1040.a.tt: "§LNiebawem w galaktyce rozgorzeje kryzys o niespotykanych rozmiarach. Mogą nas uratować tylko połączone siły nowopowstałego sojuszu.§! \n\nStworzymy §Ykoalicję§! imperiów walczących z tym kryzysem, co wywoła konflikt obejmujący całą galaktykę. §RWypowiemy wojnę§! imperium §Y[hyperthermia_empire.GetName]§!."
 infernals.1040.b: "Palcie się, słabeusze!" # Genocidals reply
 infernals.1040.b.tt: "§LW czasie kryzysu każdy gatunek musi radzić sobie sam. Mamy siłę, by poradzić sobie z tym samodzielnie.§!"
 infernals.1040.c: "Oni są tacy sami jak my." # Infernals reply
 infernals.1040.c.tt: "§L§Y[hyperthermia_empire.GetName]§! posługują się metodami współgrającymi z naszą wizją odnowy galaktyki. W świetle tego zbliżenia może nie uderzy w nas pełna siła tego, co dla innych będzie katastrofą.§!"
 infernals.1040.d: "To nie nasze zmartwienie." # neutral reply
 infernals.1040.d.tt: "§LImperium igrające z ogniem to żadna nowość. Ten zamęt przeminie, jak wszystko. Nie ma sensu mieszać się w to.§!"
 infernals.1042.name: "Eskalacja: §Rogłoszono kryzys§!"
 infernals.1042.desc: "Największe przemiany w historii zawsze wymagały poświęceń. Jednak Wspólnota Galaktyczna widzi nasze działania jako zagrożenie, a nie konieczność, więc zareagowała utworzeniem wymierzonej w nas koalicji wojskowej.\n\nPostawili sobie za cel eksterminację, zatem nie mamy innego wyjścia: jeśli jądro galaktyki lub $galactic_crucible_4$ będą zagrożone, odpowiemy przytłaczającą siłą.\n\nNasza wizja rozpaliła gwiazdy. Czas, żeby ci, którzy się jej sprzeciwiają, zmierzyli się z wywołaną przez nas burzą.\n\n§HŻeby zwyciężyć, musimy obronić układy jądra galaktyki!§!"
 infernals.1042.a: "To zakończenie jest nieuniknione."
 infernals.1043.name: "Wezwanie do broni: §ROgłoszono kryzys§!"
 infernals.1043.desc: "W świetle narastających zagrożeń w jądrze galaktyki, Wspólnota Galaktyczna zareagowała na działania imperium §Y[hyperthermia_empire.GetName]§!, które, próbując podnieść temperaturę w całej galaktyce, zagraża wszystkim organizmom.\n\nJeżeli te ambicje nie spotkają się z odpowiedzią, niezliczone cywilizacje mogą wyginąć. Tak zwane imperium §Y[hyperthermia_empire.GetName]§! to obecnie jawny przeciwnik koalicji powstałej z konieczności.\n\nZaczęła się bitwa, w której stawką są biliony istnień.\n\n§HZdobądźmy układy jądra galaktyki albo wszystko przepadnie!§!"
 infernals.1043.a: "Zmobilizować floty!"
 infernals.1045.name: "Wyścig z czasem"
 infernals.1045.desc1: "Nadciąga potężna burza ogniowa. Jądro galaktyki wkrótce wybuchnie, zmiecie naszych wrogów i przypieczętuje nasze panowanie wśród gwiazd.\n\nAle galaktyka nie zgadza się na naszą wizję świetlanej przyszłości. Korzystając z nowopowstałych hiperlinii, chcą uderzyć na nasze rejony koncentracji sił i zniszczyć wszystko, co zbudowaliśmy. Dlaczego? Żeby ocalić swoją zimną, zastygłą ciemność?\n\nNie pozwolimy im się wtrącać. Musimy utrzymać pozycje w rejonie jądra, dopóki nie zacznie się burza ognia, która spali ich na popiół." # last stage of global situation - crisis
 infernals.1045.desc2: "Jądro galaktyki staje się coraz gorętsze, ponieważ imperium §Y[hyperthermia_empire.GetName]§! realizuje swoją fanatyczną obsesję na punkcie rozpalania gwiazd. W tym tempie, ich burza ognia spopieli wszystkich przeciwników i ogołoci galaktykę prawie ze wszystkiego, co żyje.\n\nNie zdołamy przemówić im do rozsądku. Jeśli chcemy przetrwać, musimy uderzyć w źródło problemu: w układy jądra galaktyki, gdzie wróg zgromadził swoją największą potęgę. Tylko tak można zatrzymać imperium §Y[hyperthermia_empire.GetName]§!.\n\nStawką jest los całej galaktyki. §Y[hyperthermia_empire.GetName]§! musi się przekonać, że kto igra z ogniem... może się poparzyć." # last stage of global situation - others
 infernals.1045.a: "Nie cofniemy się."
 infernals.1045.a.tooltip: "Musimy zachować kontrolę nad sześcioma głównymi układami, żeby zwyciężyć."
 infernals.1045.b: "Musimy zdusić ich na zawsze."
 infernals.1045.b.tooltip: "Musimy zaatakować sześć głównych układów i zniszczyć znajdujące się tam przewody imperium §Y[hyperthermia_empire.GetName]§!, w przeciwnym razie spłoniemy."
 infernals.1055.name: "Galaktyka należy do nas!"
 infernals.1055.desc: "Dzięki nam płomienie zwycięstwa rozlały się z jądra galaktyki aż do najbardziej oddalonych gwiazd. Burza ognia spopieliła naszych wrogów. Zabrakło im wyobraźni i odwagi, by wejść z nami w świetlaną przyszłość. Galaktyka należy do nas.\n\nW tym nowym porządku pod znakiem ognistej furii na planetach wrze magma, rozlewa się światło rozpalone żarem rosnących czerwonych olbrzymów. Entropia wzrasta gwałtownie we wszystkich układach, możemy ją zebrać i nagiąć do naszej woli. Z każdym dniem nasze imperium staje się bogatsze, silniejsze... niepowstrzymane.\n\nWchłonęliśmy galaktykę i uczyniliśmy ją płonącym symbolem naszej władzy nad kosmiczną pustką. I może pewnego dnia rzucimy w ogień także inne galaktyki." # crisis won
 infernals.1055.a: "Ta nowa galaktyka należy do nas."
 infernals.1055.b: "W końcu wszystkie płomienie łączą się w jeden pożar."
 infernals.1055.c: "Nasz ognisty dom nie potrzebuje chłodnych słabeuszy." #Scorched world heralds (genocidal Infernal)
 infernals.1055.d: "Nasza wytrwałość wreszcie została nagrodzona." #Infernal Fire Cult
 infernals.1055.e: "Nareszcie przepędziliśmy z tej galaktyki zimne ciemności." #Other Infernals
 infernals.1055.f: "Nasi żałośni rywale wreszcie obrócili się w proch." #Generic Genocidal
 infernals.1052.name: "Zdobyto cel: $galactic_crucible_4$"
 infernals.1052.desc: "Wraz ze zdobyciem układu §H[crucible_system.GetName]§!, w ręce naszych sił trafia również $galactic_crucible_4$, która była konstruowana wokół miejscowej gwiazdy. \n\nUtrata tej superkonstrukcji pogrzebała wszelkie nadzieje jej budowniczych na przejęcie galaktyki siłą."
 infernals.1052.a: "Zniszczcie ją!"
 infernals.1052.a.tt: "§Y$galactic_crucible_4$§! zostanie bezpowrotnie zniszczona."
 infernals.1052.b: "Możemy to wykorzystać."
 infernals.1052.b.tt: "Sprawia, że §Y$galactic_crucible_4$§! zamienia się w §Y$galactic_crucible_5$§!, by produkować zasób: $r_alloys$."
 infernals.1053.name: "Zdobyto cel: $galactic_crucible_4$"
 infernals.1053.desc: "Po podbiciu układu §H[crucible_system.GetName]§! odkryliśmy złowrogie plany imperium §H[crucible_builders.GetName]§!, które zakładały dokonanie masowej eksterminacji życia w całej galaktyce poprzez wywołanie olbrzymiej burzy ognia. \n\nNa razie zatrzymaliśmy działanie tej potencjalnej broni masowego rażenia. Gdy tylko wojna dobiegnie końca powinniśmy skierować nasze pozostałe zasoby i siły do prac, by na zawsze zneutralizować tę superkonstrukcję."
 infernals.1053.a: "Musimy czym prędzej zakończyć tę wojnę!"
 infernals.1053.b: "Fascynująca konstrukcja."
 infernals.1056.name: "Galaktyczne odrodzenie"
 infernals.1056.desc: "Gdy byliśmy zajęci rozpalaniem iskry, która podpaliłaby niezliczone światy, imperium §Y[hyperthermia_empire.GetName]§! już udało się przemienić gwiazdy w broń masowego rażenia i na zawsze odmienić galaktykę. \n\nNa razie możemy nacieszyć się tą nowopowstałą utopią, lecz powinniśmy bacznie obserwować ich kolejne poczynania, gdy będą zacieśniać swoją kontrolę nad galaktyką."
 infernals.1056.a: "Olbrzymia potęga prowadzi do konfliktów."
 infernals.1056.b: "Pojawiło się nowe zagrożenie."
 infernals.1056.c: "Zaskakujący obrót zdarzeń."
 # Relic
 r_crystallized_singularity: "Skrystalizowana osobliwość"
 r_crystallized_singularity_desc: "Wykrzywiona przez płonącą galaktykę, ta osobliwość buzuje kuszącym żarem. Jeśli nie zostanie dokładnie zapieczętowana, w zagadkowy sposób przyciągnie pielgrzymów, nawet z najbardziej oddalonych światów. Ci, którzy ją ujrzą, zapragną prostszego życia... bliżej płomieni."
 r_crystallized_singularity_effect_tt: "\n- §G10%§! albo wygenerowane przez nas £physics_research£ §Y$physics_research$§! wytworzą również: $r_energy$."
 r_crystallized_singularity_ls_effect_tt: "- Odblokowanie decyzji §Y$decision_gh_life_seeding$§! na światach nadających się do kolonizacji, by stworzyć nową prymitywną cywilizację."
 crystallized_singularity_mod: "$r_crystallized_singularity$"
 crystallized_singularity_mod_desc: "$r_crystallized_singularity_desc$"
 decision_gh_life_seeding: "Rozsiewanie życia"
 decision_gh_life_seeding_desc: "Nasz sukces z kształtowaniu galaktyki doprowadził do śmierci gatunków na większości planet. Teraz mamy przywilej odtworzenia życia na nasze podobieństwo."
 decision_gh_life_seeding_limit: "$TRIGGER_FAIL$§RNa tej planecie już jest prymitywna cywilizacja.§!"
 decision_gh_life_seeding_colony: "$TRIGGER_FAIL$§RNie można tego zrobić w układzie, w którym jest kolonia.§!"
 decision_gh_life_seeding_effect: "Stworzenie prymitywnej cywilizacji na nasze podobieństwo. \n\n§HLimit aktywacji:§! [from.gh_life_seeder_var] / 3"
 # Grand Archive Specimen
 infernal_burning_gem: "Płonący klejnot"
 infernal_burning_gem_desc_short: "Jeden z pierwszych działających prototypów stworzonych dzięki wysiłkom imperium [GetName], mającym na celu ujarzmienie entropii"
 infernal_burning_gem_desc_details: "Zwodniczo matowy dla większości systemów optycznych, słaby, biały blask tego odłamka kryształu skrywa niewiarygodną ilość przechowywanej w nim energii. Można go zastąpić nowszymi technikami, ale jego właściwości i budowa wciąż mogą nas wiele nauczyć."
 # Timeline
 TIMELINE_EVENT_GH_START: "Burza ognia\n§L[GetDate]§!"
 TIMELINE_EVENT_GH_START_TOOLTIP: "§HJam jest kryzys§!\n§YWydarzenie kryzysowe§!\n\n[EVENT_TARGET_0.GetName] rozpala swoje panowanie, zaczyna przejmować kontrolę nad losami galaktyki. Ci, którzy nie chcę przyjąć tej wizji, znajdą się w ognistej smudze podboju i zostanie po nich jedynie popiół."
 TIMELINE_EVENT_GH_END: "Wszechogarniające płomienie\n§L[GetDate]§!"
 TIMELINE_EVENT_GH_END_TOOLTIP: "§HGalaktyka pokonana§!\n§YWydarzenie kryzysowe§!\n\nTo, co początkowo było ognistą ambicją, stało się iskrą, która podpaliła całą galaktykę. Ci, którzy stanęli nam na drodze, zostali obróceni w popiół, wraz z ich historiami."
