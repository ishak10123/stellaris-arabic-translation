 entropy_crystals_gaining: "Ukończ §Hcele kryzysowe§!, aby zdobyć więcej zasobu £entropy_crystals£ §Y$entropy_crystals$§!."
 entropy_crystals_desc: "Ta postrzępiona, połyskująca matryca czystej energii jest na tyle stabilna, że można ją transportować jako paliwo lub umieszczać wewnątrz wyposażenia."
