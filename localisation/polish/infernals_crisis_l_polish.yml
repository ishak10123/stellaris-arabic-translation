 entropy_crystals_crisis_level_desc: "Aby przechodzić na kolejne poziomy kryzysu, zbieraj zasób $entropy_crystals$ i zbuduj: §Y$galactic_crucible_4$§!."
 entropy_crystals_crisis_level_unlock: "Ma: £entropy_crystals£ §Y$CURRENCY$§! $entropy_crystals$"
 entropy_crystals_current_value: "Bieżąca wartość: §Y$VALUE|0$§!"
 entropy_crystals_crisis_description_title: "$ap_galactic_hyperthermia$"
 entropy_crystals_crisis_description: "$menace_crisis_description_intro$\n\nNowy sposób manipulowania energią pozwoli nam znacznie zwiększyć naszą potęgę. Musimy ujarzmić ogień samych gwiazd, by rozpalić nową erę."
 entropy_crystals_crisis_howto_title: "Źródło mocy"
 entropy_crystals_crisis_howto: "Realizowanie §Hcelów kryzysowych§! wytwarza zasób £entropy_crystals£ §H$entropy_crystals$§!, dzięki któremu może być ulepszana $galactic_crucible_4$ oraz mogą być odblokowywane następne poziomy kryzysu."
