 BYPASS_DESC_UNKNOWN_ENTROPY_WORMHOLE: "Nigdy dotąd nie widzieliśmy takiej formacji."
 ENTROPY_WORMHOLE_GALACTIC: "Dziwny tunel czasoprzestrzenny"
 ENTROPY_WORMHOLE_DESC: "Ten układ zawiera §Ytunel czasoprzestrzenny§!, który prowadzi do: $DEST|Y$."
 ENTROPY_WORMHOLE_DESC_UNEXPLORED: "Ten układ zawiera §Rniezbadany§! §Ytunel czasoprzestrzenny§!."
 ENTRY_BYPASS_ENTROPY_WORMHOLE: "$BYPASS_TYPE$"
 EXIT_BYPASS_ENTROPY_WORMHOLE: "Wyjście: $BYPASS_TYPE$"
 personality_hyperthermia_empire: "Termarchia"
 personality_hyperthermia_empire_desc: "Imperium termarchicznym rządzi ideologia wychwalająca energię, entropię i gwiezdny ogień. Ono nie prowadzi podbojów, lecz wypala i kształtuje galaktykę za pomocą ciepła oraz siły woli."
 triggered_opinion_hyperthermia_empire: "Imperium $personality_hyperthermia_empire$"
 mod_job_metallurgist_naval_cap_add: "£mod_country_naval_cap_add£ $MOD_COUNTRY_NAVAL_CAP_ADD$ ze źródła: £job_foundry£ [GetAlloyProducer]"
