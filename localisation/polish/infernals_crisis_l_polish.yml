 crisis_conduit_stop: "$mod_conduit_spawnrate_switch$" # modifier is hidden
 crisis_conduit_stop_desc: ""
 sm_gravitational_centrifuge: "Wirówka grawitacyjna"
 sm_gravitational_centrifuge_desc: "Ta budowla wykorzystuje silne gradienty grawitacyjne, by rozrywać odpady na poziomie molekularnym i w ten sposób tworzyć plazmę entropii, którą można skrystalizować i użyć w przyszłości."
 gravitational_centrifuge_tt: "Kończy cel kryzysowy: §H$crisobj_entropy_starbase_name$§!"
 requires_multiple_stars_or_or_bh: "§RWymaga układu §Ybinarnego§!, §Ypotrójnego§! albo: §Y$pc_black_hole$§!.§!"
 # Conduit Starforming
 crisis_conduit_buff: "Gwiezdny nadzór"
 crisis_conduit_buff_desc: "Atmosfera lokalnej gwiazdy przechodzi błyskawiczne zmiany, a cały system jest zalewany potężnymi rozbłyskami słonecznymi. Dla innych to katastrofalne warunki, dla nas - doskonałe do dalszego rozwoju."
 TERRAFORM_ORDER: "Transformacja gwiazdy"
 TERRAFORM_ORDER_DESC: "Sprawi, że wskazana gwiazda zamieni się w: §Y$pc_m_giant_star$§!."
 TERRAFORM_ORDER_RESEARCH: "Wykorzystując potencjał scalający energii skrystalizowanej entropii, można zamieniać mniejsze gwiazdy w potężne czerwone olbrzymy."
 FLEETORDER_TERRAFORM_BUTTON: "$TERRAFORM_ORDER$"
 FLEETORDER_TERRAFORM: "Gwiazdotworzenie: $PLANET|Y$ ($PROGRESS|Y%0$)"
 FLEETORDER_BOOST_STAR: "Rozpalanie gwiazdy"
 CAN_NOT_TERRAFORM_STAR: "$TRIGGER_FAIL$Musi być gwiazdą główną."
 CAN_NOT_CRISIS_TERRAFORM_STAR_CLASS: "$TRIGGER_FAIL$Gwiazda tej klasy nie nadaje się do transformacji."
 CAN_NOT_CRISIS_TERRAFORM_STAR_MEGASTRUCTURE: "$TRIGGER_FAIL$Superkonstrukcja na orbicie uniemożliwia transformację."
 VALID_TERRAFORM_STAR: "Można terraformować gwiazdę."
 STATION_CAN_NOT_TERRAFORM_STAR: "Stacja przewodząca musi znajdować się na orbicie."
 # Objectives
 crisobj_own_volcanics_name: "Posiadaj światy wulkaniczne"
 crisobj_own_volcanics_desc: "Zwiększenie ciepła układu nasila zjawiska wulkaniczne, a to doskonałe warunki do realizacji naszej ognistej misji. Powinniśmy podejść priorytetowo do kolonizacji §Yświatów wulkanicznych§!, by mieć przewagę nad wrogami.\n\nZapewnia co roku dochód pasywny (§Y$entropy_crystals$§!), którego wysokość zależy od liczby posiadanych kolonii typu: §Y$pc_volcanic$§!."
 crisobj_create_volcanics_name: "Stwórz światy wulkaniczne"
 crisobj_create_volcanics_desc: "Rozprzestrzenianie zjawisk wulkanicznych w galaktyce da paliwo naszej gospodarce skrystalizowanej entropii. Dzięki odpowiednim technikom terraformowania możemy wywołać trwałą aktywność wulkaniczną w dowolnym miejscu.\n\nTerraformujmy planetę w typ: §Y$pc_volcanic$§!"
 crisobj_own_red_stars_name: "Posiadaj czerwone gwiazdy"
 crisobj_own_red_stars_desc: "Powinniśmy zasiedlać głównie układy z czerwonymi gwiazdami. Ich ogromne powierzchnie emitujące promieniowanie nadają się idealnie do gromadzenia energii termicznej.\n\n§Y$entropy_crystals$§! jest dostarczana jako dochód pasywny, który zwiększa każda §Y$pc_m_star$§! albo §Y$pc_m_giant_star$§! znajdujące się na naszym terytorium."
 crisobj_create_red_stars_name: "Twórz czerwone gwiazdy"
 crisobj_create_red_stars_desc: "Dzięki skrystalizowanej entropii możemy powiększać gwiazdy do czerwonych olbrzymów, które napędzą rozwój naszego nowego, ognistego imperium.\n\nGwiazdy terraformowane przez §Y$entropy_conduit_plural$§! stają się: §Y$pc_m_giant_star$§!."
 crisobj_planet_firestorm_name: "Podpalenie planety"
 crisobj_planet_firestorm_desc: "Czas pokazać naszym przeciwnikom, jak wygląda prawdziwa dominacja. Bombardowanie ognistymi burzami spali ich światy na popiół.\n\nKolonia, w którą uderzy twoja §Y$bombardment_firestorm$§!, otrzyma §R100% zniszczeń§!"
 crisobj_lens_beam_impact_name: "Zakłócenie działania okrętów"
 crisobj_lens_beam_impact_desc: "Chłodne i umiarkowane światy nie są nam do niczego potrzebne. Musimy je przeobrazić, przetopić ich powierzchnie w formy, które bardziej odpowiadają naszym potrzebom.\n\nBroń £ship_xl_slot£ §Y$LENS_FLARE_BEAM$§!, którą posiadają §Y$entropy_conduit_plural$§! i §Y$ember_battleship_plural$§!, może posłużyć do bombardowania wrogich światów."
 crisobj_entropy_starbase_name: "Posiadaj wirówki grawitacyjne"
 crisobj_entropy_starbase_desc: "Dzięki wirówkom grawitacyjnym będziemy zdobywać więcej zasobu: $entropy_crystals$. \n\nZbuduj bazę gwiezdną §Y$sm_gravitational_centrifuge$§! w układzie §Ybinarnym§!, §Ypotrójnym§! lub takim, w którym jest §Y$pc_black_hole$§!."
