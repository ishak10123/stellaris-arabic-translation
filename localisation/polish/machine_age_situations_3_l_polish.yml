 #TRANSFORMATION STAGE 1
 machine_age.4100.name: "Przemiana"
 machine_age.4100.desc: "Mimo że forma maszyny jest doskonalsza, nasz rozwój pozostaje bardzo powolny. Narzucone przez nas samych standardy bezpieczeństwa przyniosły stagnację. Wniosek: należy przedsięwziąć bardziej drastyczne środki.\n\nDoświadczenia na małą skalę wskazują, że mamy trzy możliwe kierunki rozwoju: §Ynanotechnologię§! wraz z jej możliwościami zmienności i przybierania różnych kształtów, §Ymodularność§! pozwalającą na optymalizację jednostek zgodnie z ich charakterystyką i §Ywirtualność§!, czyli porzucenie formy fizycznej na rzecz istnienia cyfrowego.\n\nRozpoczęto proces oceny. Przeanalizujcie opcje i przeprowadźcie rozważania."
 machine_age.4110.name: "Badania nad przemianą: nanity"
 machine_age.4110.desc: "Wstępne wyniki badań wskazują, że elektromechaniczne konstrukty znane jako §Ynanity§! stanowią dla nas obiecujący kierunek rozwoju. Choć są rzadkie, wykazują wyjątkowe właściwości, w tym możliwość ich programowania, samoreplikację i możliwość tworzenia \"umysłu roju\".\n\nTechnologia ta zapewnia niezwykłe możliwości przemian, jednak wymagania ich wspierania pozostają nieznane.\n\nPotencjał: znaczący; skalowalny. Koszt: nieznany. Niezbędne są dodatkowe badania."
 machine_age.4110.a: "Będzie to naszym najwyższym priorytetem."
 machine_age.4110.a.tt: "Pełne wyniki badań nad §Ynanotechnologią§!.\n\n§Y$situation_transformation$§! - dodano modyfikator sytuacji:\nSzybkość badań (£engineering£ §Ytechnika§!): §R-20%§!"
 machine_age.4110.b: "Zachowajmy umiar."
 machine_age.4110.b.tt: "Częściowe wyniki badań nad §Ynanotechnologią§!.\n\n§Y$situation_transformation$§! - dodano modyfikator sytuacji:\nSzybkość badań (£engineering£ §Ytechnika§!): §R-10%§!"
 machine_age.4110.c: "Nie możemy zaniedbać naszych obecnych badań."
 machine_age.4110.c.tt: "Ograniczone wyniki badań nad §Ynanotechnologią§!.\n\n§Y$situation_transformation$§! - dodano modyfikator sytuacji:\nSzybkość badań (£engineering£ §Ytechnika§!): §R-5%§!"
 machine_age.4110.d: "Wykorzystajmy naszą istniejącą wiedzę."
 machine_age.4110.d.tt: "Pełne wyniki badań nad §Ynanotechnologią§!.\n\nDzięki wcześniejszym kontaktom z §Ynanitami§! możemy uzyskać doskonałe rezultaty przy minimalnym zużyciu zasobów.\n§Y$situation_transformation$§! - dodano modyfikator sytuacji:\nSzybkość badań (£society£ §Ysocjologia§!): §R-5%§!\nSzybkość badań (£physics£ §Yfizyka§!): §R-5%§!"
 machine_age.4130.name: "Przełomowe odkrycia w zakresie nanotechnologii"
 machine_age.4130.desc: "Badania pozwoliły odkryć intrygujące zastosowania §Ynanotechnologii§!. Zdolność nanitów do rekonfiguracji i łączenia się zapewnia bezprecedensową wszechstronność przy tworzeniu megaform złożonych z wielu pojedynczych dronów. Ta sama technologia pozwala również na generowanie nanomaterii lub jej dalsze przekształcanie.\n\nProces ten wymaga czasu, materiałów i energii, aby się przekonfigurować. Dlatego też do wdrożenia technologii niezbędne są zmiany na skalę całego imperium.\n\nWykonalność: wysoka; istniejące żywe nanity wspierają te szacunki."
 machine_age.4130.a.tt: "§Y$situation_transformation$§! - usunięto modyfikator sytuacji:\nszybkość badań (£engineering£ §Ytechnika§!)"
 machine_age.4140.name: "Obiecujące odkrycia w zakresie nanotechnologii"
 machine_age.4140.desc: "Nasze badania nad §Ynanitami§! dobiegły końca. Pełnia ich potencjału pozostaje niejasna, ale przewidywania wynikające z symulacji są bardzo optymistyczne. Ich możliwości mogłyby okazać się bezcenne podczas tworzenia wyspecjalizowanych megaform oraz transmutowania materii.\n\nObliczenia wykazują, że proces ten wymaga czasu, materiałów i energii, a ich obsługa wymagać będzie znaczących zmian strukturalnych.\n\nWykonalność: obiecująca; transformatywna."
 machine_age.4140.a.tt: "§Y$situation_transformation$§! - usunięto modyfikator sytuacji:\nszybkość badań (£engineering£ §Ytechnika§!)"
 machine_age.4150.name: "Godne uwagi odkrycia w zakresie nanotechnologii"
 machine_age.4150.desc: "Z powodu złożoności tematu i minimalnych nakładów na badania dysponujemy jedynie powierzchowną wiedzą na temat technologii §Ynanitów§!. Nieliczne projekcje mówią o nanoreplikacji i rekonfiguracji, które umożliwią wznoszenie struktur wielkoskalowych. Na wsparcie takich projektów należy przeznaczyć dodatkowe zasoby.\n\nWykonalność: brak precyzyjnych danych."
 machine_age.4150.a.tt: "§Y$situation_transformation$§! - usunięto modyfikator sytuacji:\nszybkość badań (£engineering£ §Ytechnika§!)"
 nanite_replicator: "Replikator nanitów"
 d_nanites_medium: "$nanite_replicator$ Omega"
 d_nanites_medium_desc: "Kompleks doskonale zestrojonych, połączonych ze sobą komór replikacji nanitów. Pozwala na maksymalne możliwe usprawnienie ich możliwości samoreplikacyjnych."
 d_nanites_small: "$nanite_replicator$ Alfa"
 d_nanites_small_desc: "Kompleks komór replikacji nanitów. Pozwala na usprawnienie ich możliwości samoreplikacyjnych."
 d_nanites_tiny: "$nanite_replicator$ Beta"
 d_nanites_tiny_desc: "Niewielki kompleks komór replikacji nanitów. Pozwala na niewielkie usprawnienie ich możliwości samoreplikacyjnych."
 #TRANSFORMATION STAGE 2
 machine_age.4210.name: "Badania nad przemianą: modularność"
 machine_age.4210.desc: "Biologiczne formy życia są kruche i nieelastyczne, jeśli porównać je z doskonałą zdolnością adaptacji maszyn. Jednak niektóre pozytywne cechy istot organicznych można powielić w budowie robotów.\n\nSubstancja §Yżywy metal§! może radykalnie i błyskawicznie zmieniać własny kształt i konsystencję. Zintegrowanie jej z naszymi powłokami pozwoli korzystać z pewnej formy modułowej mimikry biologicznej, której wypustki i kończyny mogą być przystosowane do specjalistycznych zadań.\n\nPotencjał: znaczący; skalowalny. Koszt: nieznany. Potrzebne są dodatkowe dane."
 machine_age.4210.a: "Niech to będzie nasz priorytet."
 machine_age.4210.a.tt: "Pełne wyniki badań nad §Ymodułowością§!.\n\n§Y$situation_transformation$§! - dodano modyfikator sytuacji:\nSzybkość badań (£society£ §Yspołeczeństwo§!): §R-20%§!"
 machine_age.4210.b: "Zezwólcie na umiarkowane zużycie zasobów."
 machine_age.4210.b.tt: "Częściowe wyniki badań nad §Ymodułowością§!.\n\n§Y$situation_transformation$§! - dodano modyfikator sytuacji:\nSzybkość badań (£society£ §Yspołeczeństwo§!): §R-10%§!"
 machine_age.4210.c: "Nie możemy zaniedbać naszych obecnych badań."
 machine_age.4210.c.tt: "Ograniczone wyniki badań nad §Ymodułowością§!.\n\n§Y$situation_transformation$§! - dodano modyfikator sytuacji:\nSzybkość badań (£society£ §Yspołeczeństwo§!): §R-5%§!"
 machine_age.4210.d: "Zorganizujcie próby na ludności."
 machine_age.4210.d.tt.intro: "Pełne wyniki badań nad §Ymodułowością§!.\n\nPozwala naukowcom na przeprowadzenie nietypowych, wielkoskalowych eksperymentów uzupełniających wyniki badań."
 machine_age.4210.d.individual.tt: "$machine_age.4210.d.tt.intro$\n\n§RZabija 400 $pop_cat_worker_plural$§!\n§RZabija 0-300 $pop_cat_specialist_plural$§!\n§Y$situation_transformation$§! - dodano modyfikator sytuacji:\nSzybkość badań (£society£ §Ysocjologia§!): §R-5%§!"
 machine_age.4210.d.machine.tt: "$machine_age.4210.d.tt.intro$\n\n§RZabija 400 prostych dronów§!\n§RZabija 0-300 $pop_cat_complex_drone_plural$§!\n§Y$situation_transformation$§! - dodano modyfikator sytuacji:\nSzybkość badań (£society£ §Ysocjologia§!): §R-5%§!"
 machine_age.4230.name: "Przełomowe wyniki badań"
 machine_age.4230.desc: "Bezkompromisowość w pracach badawczych pozwoliła na potwierdzenie wstępnej oceny; §Yżywy metal§! nadaje się do wykorzystania w ciałach mechanicznych. Nasze jednostki mogą dzięki niemu zmieniać swoją charakterystykę bez narażania funkcji wewnętrznych. Zapewnia to maksymalną kompatybilność z przydzielonymi zadaniami.\n\nWielkoskalowe wdrożenie tych modularnych funkcji zwiększy według prognoz produkcję zasobów we wszystkich sektorach.\n\nWykonalność: adaptowalny; obiecujący."
 machine_age.4230.a.tt: "§Y$situation_transformation$§! - usunięto modyfikator sytuacji:\nszybkość badań (£society£ §Yspołeczeństwo§!)"
 machine_age.4240.name: "Akceptowalne wyniki badań"
 machine_age.4240.desc: "Badania nad ciałami modularnymi potwierdziły naszą wstępną hipotezę: nasze wewnętrzne moduły są kompatybilne z powłoką z §Yżywego metalu§!. Ewentualna transformacja miałaby bezprecedensowy zakres, a pełna realizacja jej potencjału wymagać będzie zużycia kolejnych zasobów.\n\nWzrost wydajności zapewniony przez te nowe moduły spowoduje, jeśli wierzyć prognozom, szybki zwrot poniesionych kosztów.\n\nWykonalność: obiecujący."
 machine_age.4240.a.tt: "§Y$situation_transformation$§! - usunięto modyfikator sytuacji:\nszybkość badań (£society£ §Yspołeczeństwo§!)"
 machine_age.4250.name: "Skromne wyniki badań"
 machine_age.4250.desc: "Ograniczone w swym zakresie badania przyniosły niejasne wyniki. Choć posiadane przez nas ciała mogą najwyraźniej wykorzystywać §Yżywy metal§!, brak rozległej wiedzy uniemożliwia dokładniejszą ocenę ewentualnych zastosowań.\n\nWykonalność: za mało danych."
 machine_age.4250.a.tt: "§Y$situation_transformation$§! - usunięto modyfikator sytuacji:\nszybkość badań (£society£ §Yspołeczeństwo§!)"
 living_metal_vats: "Kadzie żywego metalu"
 d_living_metal_medium: "$living_metal_vats$"
 d_living_metal_medium_desc: "Rozległy kompleks kadzi wzniecających pozwalający na produkcję znacznych ilości żywego metalu"
 d_living_metal_small: "Małe $living_metal_vats$"
 d_living_metal_small_desc: "Duży kompleks kadzi wzniecających służących do produkcji żywego metalu."
 d_living_metal_tiny: "Miniaturowe $living_metal_vats$"
 d_living_metal_tiny_desc: "Mały kompleks kadzi wzniecających produkujący niewielkie ilości żywego metalu."
 #TRANSFORMATION STAGE 3
 machine_age.4310.name: "Badania nad przemianą: wirtualność"
 machine_age.4310.desc: "Ostatnia, najpoważniejsza opcja to wyjście poza fizyczną postać i istnienie w postaci czystych danych. Ten proces transformującej §Ywirtualności§! stanowić będzie olbrzymią zmianę na poziomie infrastrukturalnym.\n\nDrony powiązane z pojedynczym ciałem staną się przeżytkiem. Poddane wirtualizacji strumienie danych będą integrować się w miarę potrzeby z dowolnym nośnikiem.\n\nPotencjał: ogromny. Działać ostrożnie. Potrzeba dodatkowych danych."
 machine_age.4310.a: "Obecnie to nasz absolutny priorytet."
 machine_age.4310.a.tt: "Pełne wyniki badań nad §Ywirtualnością§!.\n\n§Y$situation_transformation$§! - dodano modyfikator sytuacji:\nSzybkość badań (£physics£ §Yfizyka§!): §R-20%§!"
 machine_age.4310.b: "Przeznaczcie stosowną ilość zasobów."
 machine_age.4310.b.tt: "Częściowe wyniki badań nad §Ywirtualnością§!.\n\n§Y$situation_transformation$§! - dodano modyfikator sytuacji:\nSzybkość badań (£physics£ §Yfizyka§!): §R-10%§!"
 machine_age.4310.c: "To niewarte naszego czasu."
 machine_age.4310.c.tt: "Ograniczone wyniki badań nad §Ywirtualnością§!.\n\n§Y$situation_transformation$§! - dodano modyfikator sytuacji:\nSzybkość badań (£physics£ §Yfizyka§!): §R-5%§!"
 machine_age.4310.d: "Wyczyścić dane o wirtualizacji."
 machine_age.4310.d.tt: "Pełne wyniki badań nad §Ywirtualnością§!\n\nWyczyścić dane o wirtualizacji z: §Y[event_target:virtual_country.GetName]§!, aby przyspieszyć badania nad transformacją.\n\n§Y$situation_transformation$§! Dodano modyfikator sytuacji:\nSzybkość rozwoju sytuacji: §G+10%§!\nSzybkość badań (£physics£ §Yfizyka§!): §R-5%§!\n\nPełne wyniki badań nad wirtualnością."
 machine_age.4310.e: "Wykorzystajcie nasze dotychczasowe kontakty."
 machine_age.4310.e.tt: "Wykorzystamy posiadaną już wiedzę o bytach wirtualnych.\n\n§Y$situation_transformation$§! - dodano modyfikator sytuacji:\nSzybkość badań (£physics£ §Yfizyka§!): §R-5%§!\n\nPełne wyniki badań nad §Ywirtualnością§!."
 opinion_virtuality_data_scraped: "Wyczyszczono dane o wirtualizacji."
 machine_age.4330.name: "Przełomowe odkrycia w zakresie wirtualności"
 machine_age.4330.desc: "Całkowita wirtualizacja wiąże się z szeregiem problemów, szczególnie ze zwiększeniem zapotrzebowania energetycznego wywołanego zmianami w infrastrukturze.\n\nJest to równoważone licznymi zaletami, w tym spadkiem zapotrzebowania na fizyczne miejsca zamieszkania. Wydajność siły roboczej naszych dronów i zarządzanie nimi wzrosną, gdy zbliżymy się do doskonałości działania.\n\nZe wszystkich dostępnych rozwiązań §Ywirtualność§! wiąże się z największą przemianą.\n\n§YPotencjał: bezprecedensowy; ogromny; nieznany.§!"
 machine_age.4330.a.tt: "§Y$situation_transformation$§! - usunięto modyfikator sytuacji:\nszybkość badań (£physics£ §Yfizyka§!)"
 machine_age.4340.name: "Obiecujące odkrycia w zakresie wirtualności"
 machine_age.4340.desc: "Droga ku §Ywirtualności§! zwiększy prawdopodobnie znacząco zużycie energii, być może przekroczy ono możliwości naszej istniejącej infrastruktury.\n\nPrzewiduje się zmniejszenie popytu na fizyczne mieszkania wraz ze zwiększeniem wydajności dronów. Zoptymalizowane zostałyby również nasze ramy operacyjne i doszłoby do przedefiniowania naszego istnienia w praktycznie nieograniczonej przestrzeni cyfrowej.\n\nPotencjał: ogromny; nieznany."
 machine_age.4340.a.tt: "§Y$situation_transformation$§! - usunięto modyfikator sytuacji:\nszybkość badań (£physics£ §Yfizyka§!)"
 machine_age.4350.name: "Godne uwagi odkrycia w zakresie wirtualności"
 machine_age.4350.desc: "Wstępne oceny wskazują na znaczące wymagania energetyczne związane z przemianą społeczeństwa w §Ywirtualne§!. Może ona jednak znacząco poprawić efektywność zarządzania dronami i zmniejszyć zapotrzebowanie na fizyczne domy. Prognoza ta jest nieprecyzyjna, ponieważ nie udało się zgromadzić dużej ilości danych i próbek.\n\nWykonalność: nieznana."
 machine_age.4350.a.tt: "§Y$situation_transformation$§! - usunięto modyfikator sytuacji:\nszybkość badań (£physics£ §Yfizyka§!)"
 virtual_power_plant: "Wirtualna elektrownia"
 d_virtual_power_medium: "$virtual_power_plant$"
 d_virtual_power_medium_desc: "Rozległa sieć wirtualnych elektrowni agregująca i optymalizująca produkcję zasobów energetycznych."
 d_virtual_power_small: "Kompaktowa $virtual_power_plant$"
 d_virtual_power_small_desc: "Małoskalowa wirtualna elektrownia agregująca i optymalizująca lokalną produkcję zasobów energetycznych."
 d_virtual_power_tiny: "Prototypowa $virtual_power_plant$"
 d_virtual_power_tiny_desc: "Niewielka, rozproszona wirtualna elektrownia agregująca i optymalizująca małoskalową produkcję zasobów energetycznych."
 #TRANSFORMATION STAGE 4
 machine_age.4400.name: "Nowa forma"
 machine_age.4400.desc.machine_intelligence: "Opresyjne ograniczenia narzucone nam przez naszych niedoskonałych twórców są już melodią przeszłości. Określiliśmy trzy optymalne ścieżki modernizacyjne.\n\n$machine_age.4400.desc.shared$"
 machine_age.4400.desc.individualist_machines: "Po zbadaniu wszelkich możliwych dróg modernizacji nasi eksperci przedstawili trzy odrębne możliwości. Każda niesie ze sobą korzyści, ale tylko jedną z nich możemy doprowadzić do końca.\n\n$machine_age.4400.desc.shared$"
 machine_age.4400.desc.shared: "Jeśli wszystkie [GetDronePersonPlural] podzielą się na nanity, będziemy mogli łączyć je w nieskończoną liczbę kombinacji. Zlikwiduje to wiele ograniczeń, z jakimi zmagają się nasze obecne nośniki podczas interakcji ze światem materialnym.\n\nMożemy również zainwestować w nasze istniejące formy i odmienić sposób, w jaki odnajdujemy się w nowych środowiskach.\n\nMożemy wreszcie postanowić porzucić świat fizyczny i zjednoczyć się z naszym kodem źródłowym. Moglibyśmy symulować wszechświaty zamknięte we wszechświatach, a zajęłoby nam to ledwie czas potrzebny do przeskanowania jednej cząstki kosmicznego pyłu."
 machine_age.4400.a: "Przemieńmy się w nanomaszyny."
 machine_age.4400.a.tt: "§Y$nanite_replicator$§! Produkcja: §G+200%§!\n\nPriorytet na drzewko tradycji ['tradition_category:tradition_nanotech'].\n\n§ETa droga rozwoju koncentruje się na wciąganiu planet do §Yświatów nanitów§!, wykorzystywaniu §Y£nanites£ $nanites$§! w produkcji i zamianie flot na: §Y$nanite_swarmer_plural$§!.§!"
 machine_age.4400.b: "Zainwestujmy w ulepszenia modułowe."
 machine_age.4400.b.tt: "§Y$living_metal_vats$§! Produkcja: §G+200%§!\n\nPriorytet na drzewko tradycji ['tradition_category:tradition_modularity'].\n\n§ETa droga rozwoju koncentruje się na §Yzaawansowanych cechach gatunkowych§! i zwiększonym §Ymontażu populacji§!.§!"
 machine_age.4400.c: "Wkroczmy w świat wirtualny."
 machine_age.4400.c.tt: "§Y$virtual_power_plant$§! Produkcja: §G+200%§!\n\nPriorytet na drzewko tradycji ['tradition_category:tradition_virtuality'].\n\n§ETa droga rozwoju koncentruje się na dużej §Yprodukcji zasobów przez populacje§!, posiadaniu niewielkiej liczby §Ykolonii§! i małego §Yrozmiaru imperium§!.§!"
 machine_age.4490.name: "Projekt na inne czasy"
 machine_age.4490.desc.nanotech: "Postrzegamy teraz samych siebie jako zbiór adaptujących się do każdej sytuacji nanitów. Niezgrabne dawne formy przestały nam wystarczać.\n\n$machine_age.4490.desc.shared$\n\nRozpoczęliśmy też nasz pierwszy duży eksperyment z transformacjami częściowo organicznych dronów. Wkrótce poznamy pierwsze wyniki."
 machine_age.4490.desc.modularity: "Ewoluowaliśmy w formę modularną, statyczne ciała z naszej przeszłości nie mają więc już dla nas znaczenia.\n\n$machine_age.4490.desc.shared$"
 machine_age.4490.desc.virtuality: "Staliśmy się falami na morzu danych. Nasze fizyczne ciała nie są już nam przydatne.\n\n$machine_age.4490.desc.shared$"
 machine_age.4490.desc.shared: "Magazyny pełne są odrzuconych skorup, które wciąż mogą się do czegoś przydać. Śladowe ilości zasobów można poddać recyklingowi, o ile uznamy to za warte naszego czasu."
 machine_age.4490.a: "Pozyskajcie wszystkie dostępne surowce."
 machine_age.4490.a.nanotech.tt: "$transformation_speed$: §R-25%§!"
 machine_age.4490.a.modularity.tt: "$transformation_speed$: §R-25%§!"
 machine_age.4490.a.virtuality.tt: "$transformation_speed$: §R-25%§!"
 machine_age.4490.b: "Zakopcie przeszłość."
 machine_age.4490.b.tt: "$transformation_speed$: §G+25%§!"
 machine_age.4005.name: "Przemieniona populacja"
 machine_age.4005.desc.start: "Dziś osiągnęliśmy coś, co kiedyś zdawało się niemożliwe - przemieniliśmy nasze ciała"
 machine_age.4005.desc.end: "Proces przebiegł nie bez trudności, był skomplikowany i żmudny. Cokolwiek jednak być może straciliśmy po drodze, wynagrodzą nam to nieskończone możliwości naszej nowej egzystencji."
 machine_age.4005.desc.nanotech: "$machine_age.4005.desc.start$ w konfigurowalne nanomaszyny.\n\n$machine_age.4005.desc.end$"
 machine_age.4005.desc.modularity: "$machine_age.4005.desc.start$ w modularne, zdolne do adaptacji nośniki.\n\n$machine_age.4005.desc.end$"
 machine_age.4005.desc.virtuality: "$machine_age.4005.desc.start$ w transcendentne operacje algorytmiczne.\n\n$machine_age.4005.desc.end$"
 machine_age.4005.a.nanotech: "Będziemy liczniejsi niż gwiazdy."
 machine_age.4005.a.nanotech.tt: "Przyjmuje drzewko tradycji: ['tradition_category:tradition_nanotech']"
 machine_age.4005.a.modularity: "Pozbędziemy się wszelkich ograniczeń."
 machine_age.4005.a.modularity.tt: "Przyjmuje drzewko tradycji: ['tradition_category:tradition_modularity']"
 machine_age.4005.a.virtuality: "W kodzie znajdziemy czystość."
 machine_age.4005.a.virtuality.tt: "Przyjmuje drzewko tradycji: ['tradition_category:tradition_virtuality']"
