l_polish:
 SITLOG: "Zaktualizowano rejestr sytuacyjny."
 ####################################
 #Advisor Tutorial Messages
 ####################################
 TUTORIAL_GOVERNMENTVIEW_GOVERNMENT_TITLE: "Rząd"
 TUTORIAL_GOVERNMENTVIEW_GOVERNMENT_DESC: "Ekran §Srządu§! przedstawia informacje na temat naszego imperium i jego ustroju. Można tu zobaczyć §Swładcę§! i wszelkie powiązane z nim efekty.\n\nOddzielna karta zawiera informacje na temat §Sdemografii§! naszego ludu."
 TUTORIAL_TECH_VIEW_TITLE: "Samouczek: technologia"
 TUTORIAL_TECH_VIEW_DESC: "Na ekranie §Stechnologii§! kierujemy naszymi działaniami badawczymi. Technologie są podzielone na trzy różne dziedziny, w każdej z nich zwykle dostępne są trzy opcje badań.\n\nDostępne dziedziny to £physics£ fizyka, £society£ socjologia i £engineering£ technika.\n\nŻeby opracować §Stechnologię§!;\n\n£dot_green£ Kliknij przycisk §SWybierz badania§!\n£dot_green£ Pojawią się opcje do wyboru\n\nWyznaczenie §Skierownika badań§! przyspiesza postępy i zaleca się to zrobić. §SCechy§! tej osoby mogą przynieść dodatkowe korzyści.\n\nBadania można też zautomatyzować klikając przycisk §SWłącz automatyczne badania§! w każdym z pól.\n\n$tttt$$ttt$£automate_research£\n"
 TUTORIAL_CONTACTSVIEW_EMPIRES_TITLE: "Samouczek: kontakty"
 TUTORIAL_CONTACTSVIEW_EMPIRES_DESC: "Na ekranie §Skontaktów§! znajduje się lista wszystkich napotkanych przez nas §Simperiów§!. Od razu widzimy ich §Sopinie§! o nas, ponadto możemy stąd szybko podejmować działania §Sdyplomatyczne§!.\n\nPonadto, każdy element pokazuje też ważne informacje takie jak §Srodzaj rządu§!, §Setykę§! i §Sstatus imperium§!.\n\nStąd mamy też dostęp do działań §Sszpiegowskich§! oraz okna §Sumów§! zawartych z każdym imperium."
 TUTORIAL_SITUATION_LOG_TITLE: "Samouczek: rejestr sytuacyjny"
 TUTORIAL_SITUATION_LOG_DESC: "§SRejestr sytuacyjny§! pokazuje listę wszystkich dostępnych obecnie §Sprojektów specjalnych§!, £archaeology£ §Sstanowisk archeologicznych§! i innych ciekawych miejsc.\n\nNowe pojawią się prawdopodobnie, gdy zaczniemy eksplorację galaktyki."
 TUTORIAL_SHIP_DESIGNER_TITLE: "Samouczek: projektant okrętów"
 TUTORIAL_SHIP_DESIGNER_DESC: "Tutaj projektowane są wszystkie §Sstatki§! używane w imperium. Nowe §Srozmiary kadłubów§! i §Skomponenty§! zostaną odblokowane po wynalezieniu nowych technologii.\n\nŻeby stworzyć nowy §Sprojekt§!:\n\n£dot_green£ Kliknij przycisk §Snowy projekt§!\n£dot_green£ Wybierz §Swielkość kadłuba§!\n£dot_green£ Kliknij przycisk §Sbrak sekcji§! i wybierz jakąś §Ssekcję§!\n\nTeraz wybierz dowolne z dostępnych §Sczęści statków§!, klikając dostępne miejsca.\n\n\n$tttt$$tt$£slot_component£\n\n\nPo zapisaniu nowy projekt będzie można zbudować w dowolnej §Sbazie gwiezdnej§!, w której znajduje się §Sstocznia§!."
 TUTORIAL_EMPIREVIEW_PLANETS_TITLE: "Samouczek: planety i sektory"
 TUTORIAL_EMPIREVIEW_PLANETS_DESC: "Okno §Splanet i sektorów§! pokazuje informacje o wszystkich skolonizowanych światach, ich £pops£ §Spopulacjach§! i §Sprodukcji zasobów§!.\n\nWraz z rozwojem imperium można je podzielić na §Ssektory§!, aby ułatwić zarządzanie.\n\nW istniejących §Ssektorach§! można tworzyć £vassal£ §Swasali§!."
 TUTORIAL_MILITARY_FLEET_TITLE: "Samouczek: floty wojskowe"
 TUTORIAL_MILITARY_FLEET_DESC: "§SFloty wojskowe§! służą do ochrony naszego raczkującego imperium przed zagrożeniami... albo do zbrojnego rozszerzania naszych wpływów, jeśli tego zechcemy.\n\nWielkość naszej floty zależy od aktualnego §Slimitu marynarki wojennej§!, który początkowo jest ograniczony. Można go jednak zwiększyć przez:\n\n£dot_green£ Opracowanie nowych §Stechnologii§!\n£dot_green£ Zwiększenie £pops£ populacji\n£dot_green£ Budowę §Skotwicowisk bazy gwiezdnej§!\n\nNaszymi flotami mogą kierować wyznaczeni £commander£ §Sdowódcy§!, co zwiększy ich siłę wojskową oraz zapewni wszystkie premie danego £leader£ §Sprzywódcy§!."
 TUTORIAL_SCIENCE_SHIP_TITLE: "Samouczek: badanie"
 TUTORIAL_SCIENCE_SHIP_DESC: "To nasz £science_ship£ §Sstatek badawczy§!, który prowadzi §Sbadania§! obiektów astronomicznych, na przykład £planet£ §Splanet§!, w £system£ §Sukładzie gwiezdnym§!. Planeta musi być zbadana, byśmy mogli uzyskać informacje o jej §Szasobach§!.\n\nNasz układ macierzysty już został zbadany, więc powinniśmy prowadzić działania w innym miejscu.\n\nPo wybraniu §Sstatku badawczego§!\n\n£dot_green£ Kliknij PPM sąsiedni §Sukład§!\n£dot_green£ Wybierz §SZbadaj układ§!"
 TUTORIAL_CONSTRUCTION_SHIP_TITLE: "Samouczek: statek konstrukcyjny"
 TUTORIAL_CONSTRUCTION_SHIP_DESC: "To nasz £construction_ship£ §Sstatek konstrukcyjny§! służący do budowy stacji kosmicznych.\n\nKiedy ciało niebieskie, takie jak £planet£ §Splaneta§!, zostanie zbadane, możemy zlecić tej jednostce budowę £science_ship£ §Sstacji badawczej§! lub £mining_station£ §Sstacji górniczej§!, aby pozyskiwać zasoby.\n\nZadanie tych §Sstatków§! to także [GetBuildGrow] §Sbaz gwiezdnych§! w niezajętych £system£ §Sukładach§!, dlatego odgrywają istotną rolę w naszych planach ekspansji."
 TUTORIAL_PLANETVIEW_PLANET_TITLE: "Samouczek: powierzchnia"
 TUTORIAL_PLANETVIEW_PLANET_DESC: "Zakładka §Spowierzchni§! zawiera informacje o infrastrukturze oraz statusie £planet£ §Splanety§!.\n\nSekcja £building£ §Sdzielnic i budynków§! pokazuje zabudowane i dostępne miejsca w odpowiadających im dzielnicach.\n\n£district£ §SDzielnice§! i §Sstrefy§! zapewniają £housing£ §Smieszkania§!, £job£ §Smiejsca pracy§! oraz zasoby.\n\nWłączenie §Sautomatyzacji§! umożliwia planecie samodzielne zarządzanie oparte na aktualnym priorytecie.\n\nPasek §Sstatystyk planetarnych§! w górnej części okna pokazuje £stability£ §Sstabilność§!, £crime£ §Sprzestępczość§!, aktywne modyfikatory oraz przydzielonego §Szarządcę§!."
 TUTORIAL_PLANETVIEW_TILES_TITLE: "Samouczek: gospodarka"
 TUTORIAL_PLANETVIEW_TILES_DESC: "W zakładce §Sgospodarki§! znajdują się informacje o §Ssile roboczej§! i £job£ §Smiejscach pracy§!.\n\nPopulacja £planet£ §Splanety§! jest podzielona na §Swarstwy społeczne§!, które można rozwinąć, by zobaczyć rodzaje §Smiejsc pracy§!. £pops£ §SPopulacje§! będą wypełniać warstwy społeczne zgodnie z zapotrzebowaniem na §Ssiłę roboczą§!.\n\n§SMiejsca pracy§! zużywają i wytwarzają zasoby.\n\nPopulacje potrzebują £housing£ §Smieszkań§! i £amenities£ §Sudogodnień§!.\n\nNiedobór dowolnego z tych elementów zmniejsza £happiness£ §Szadowolenie§!, co może wpływać na ogólną £stability£ §Sstabilność§!."
 TUTORIAL_PLANETVIEW_COMBAT_TITLE: "Samouczek: armie"
 TUTORIAL_PLANETVIEW_COMBAT_DESC: "W zakładce §Sarmii§! zarządza się wszystkimi wojskami naziemnymi na globie. Znajduje się tu również informacja o ilości §Szniszczeń§!, jakie odniosła ta £planet£ §Splaneta§!.\n\nNowe §Sarmie§! werbujemy, klikając przycisk §Srekrutacji§!.\n\n§SArmie obronne§! są tworzone automatycznie przez £pops£ §Spopulacje§! obsadzające §Smiejsca pracy§! typu egzekutor lub [soldier.GetName]. Te £job£ §Smiejsca pracy§! zapewnia stolica planetarna, a także £building£ §Skomisariaty§! i £building£ §Stwierdze§!."
 TUTORIAL_PLANETVIEW_SPACEPORT_TITLE: "Kosmoport"
 TUTORIAL_PLANETVIEW_SPACEPORT_DESC: "W zakładce §Skosmoportu§! można zobaczyć znajdujące się na orbicie floty i budować nowe statki cywilne. Okręty wojskowe można konstruować wyłącznie w §Sbazie gwiezdnej§! posiadającej §Sstocznię§!, ale statki konstrukcyjne, badawcze i §Skolonizacyjne§! powstają właśnie tutaj.\n\nNawet jeśli stracimy naszą ostatnią bazę kosmiczną, nadal będziemy mieć możliwość rozbudowy i odbudowy, pod warunkiem, że dysponujemy przynajmniej jedną zamieszkaną £planet£ §Splanetą§!."
 TUTORIAL_MILITARY_STATION_TITLE: "Stacje wojskowe"
 TUTORIAL_MILITARY_STATION_DESC: "§SStacje wojskowe§! to statyczne platformy obronne, które mogą chronić ważne £planet£ §Splanety§! i strategiczne szlaki, ale można budować je tylko na naszym terytorium lub na terenie, do którego mamy specjalny dostęp.\n\nPostaraj się nie budować zbyt wielu stacji wojskowych - są drogie w utrzymaniu i poważnie obciążają gospodarkę, podobnie jak §Sstatki§!."
 TUTORIAL_RESEARCH_STATION_TITLE: "Samouczek: stacje badawcze"
 TUTORIAL_RESEARCH_STATION_DESC: "£science_ship£ §SStacja badawcza§! zbudowana na orbicie ciała niebieskiego będzie gromadzić dane z badań £physics£ §Sfizycznych§!, £engineering£ §Stechnicznych§! i £society£ §Ssocjologicznych§!.\n\nMożna je budować tylko na naszym terytorium i nie są one potrzebne, jeżeli £planet£ §Splaneta§! jest już skolonizowana."
 TUTORIAL_MINING_STATION_TITLE: "Stacje górnicze"
 TUTORIAL_MINING_STATION_DESC: "£mining_station£ §SStacje górnicze§! służą do wydobywania £minerals£ §Sminerałów§! i £strategic_resource£ §Szasobów strategicznych§! z obiektu, wokół którego orbitują.\n\n§SStacje górnicze§! nie są potrzebne do pozyskiwania zasobów ze skolonizowanych £planet£ §Splanet§! i można budować je tylko na naszym terytorium."
 TUTORIAL_TRANSPORT_SHIP_TITLE: "Samouczek: statki transportowe"
 TUTORIAL_TRANSPORT_SHIP_DESC: "Gdy §Sarmie§! są wysyłane w kosmos, automatycznie wsiadają na statki §Stransportowe§!. Chroń je, ponieważ są bezbronne!"
 TUTORIAL_DIPLOMACY_VIEW_TITLE: "Samouczek: dyplomacja"
 TUTORIAL_DIPLOMACY_VIEW_DESC: "Za pomocą ekranu §Sdyplomacji§! porozumiewamy się z innymi cywilizacjami. Tutaj możemy między innymi §Swypowiadać wojny§!, budować §Ssiatki szpiegowskie§! do obserwacji sąsiadów oraz zawierać z nimi §Ssojusze§! i §Sumowy handlowe§!. Możemy też sprawdzić obecny §Hpoziom informacji§!.\n\nTwoje §Sstosunki§! z wybranym innym imperium mogą mieć jeden z pięciu poziomów - od okropnych do znakomitych. Aby móc zawrzeć daną umowę lub porozumienie, musisz mieć wymagany poziom stosunków.\n\nMożesz przydzielać £envoy£ §Sposłów§! do innego imperium, aby §Sszpiegować§! ich, gromadzić §Sdane wywiadowcze§!, ominąć wymagania dotyczące §Sstosunków§! lub §Spoprawić§! albo §Spogorszyć§! stosunki."
 TUTORIAL_DIPLOMACY_VIEW_TRADE_TITLE: "Samouczek: handel"
 TUTORIAL_DIPLOMACY_VIEW_TRADE_DESC: "To jest ekran §Shandlu§!. Można handlować z innymi imperiami dowolnym rodzajem §Szasobów§!, jak również wymieniać §Sinformacje§! i §Sprzysługi§!.\n\nPrzysługi można zużywać w celu zwiększenia skłonności danego imperium do akceptowania naszych propozycji. Możesz też powoływać się na przysługi podczas głosowania na forum senatu we §HWspólnocie Galaktycznej§!, aby zwiększyć swoje znaczenie dyplomatyczne."
 TUTORIAL_DIPLOMACY_VIEW_FEDERATION_TITLE: "Typy federacji"
 TUTORIAL_DIPLOMACY_VIEW_FEDERATION_DESC: "§STyp federacji§! decyduje o tym, na czym może ona skupiać swoje działania. Każdemu typowi £federation£ §Sfederacji§! odpowiadają swoiste §Scechy i prawa§! początkowe, a kolejne cechy będą §Sodblokowywane§! w miarę zdobywania przez federację doświadczenia."
 TUTORIAL_DIPLOMACY_VIEW_HIGHINTEL_TITLE: "Samouczek: wysoki poziom informacji"
 TUTORIAL_DIPLOMACY_VIEW_HIGHINTEL_DESC: "Posiadamy §Swysoki poziom informacji§! o tym imperium, dlatego wiemy o nim bardzo dużo.\n\nUtrzymanie wysokiego poziom informacji o danym imperium zapewni nam aktualne dane o jego §Setyce§! i §Setosach§!, §Sstosunkach§! z innymi imperiami oraz §Stechnologii§!, §Sgospodarce§! i sile §Swojskowej§!, co pozwoli nam porównać się w tych aspektach."
 TUTORIAL_DIPLOMACY_VIEW_LOWINTEL_TITLE: "Samouczek: niski poziom informacji"
 TUTORIAL_DIPLOMACY_VIEW_LOWINTEL_DESC: "Nasz §Spoziom informacji§! o tym imperium spada. Ryzykujemy utratą zgromadzonych już danych, gdyż te z upływem czasu stają się §Snieaktualne§!.\n\nŻeby zwiększyć §Spoziom informacji§!:\n\n£dot_green£ Posiadaj §Sporozumienia dyplomatyczne§!\n£dot_green£ Wysyłaj £envoy£ §Sposłów§!, żeby poprawić stosunki\n£dot_green£ Załóż §Ssiatkę szpiegowską§!\n£dot_green£ Uruchom §Sambasadę§! na terytorium innego imperium."
 TUTORIAL_PLANETVIEW_ADJACENCY_BONUS_TITLE: "Efekty sąsiedztwa"
 TUTORIAL_PLANETVIEW_ADJACENCY_BONUS_DESC: "Niektóre £building£ §Sbudynki§! mogą wywierać §Sefekty sąsiedztwa§! na inne §Sbudynki§! znajdujące się na §Spolach§! obok. Bierzmy to pod uwagę, budując nowe placówki."
 TUTORIAL_GOVERNMENTVIEW_BUDGET_TITLE: "Budżet"
 TUTORIAL_GOVERNMENTVIEW_BUDGET_DESC: "W §Sbudżecie§! widoczne są miesięczne §Sprzychody§! i §Swydatki§! £energy £ kredytów energetycznych naszego imperium. Możemy tu też zobaczyć różne efekty wpływające na naszą gospodarkę."
 TUTORIAL_GOVERNMENTVIEW_DECISIONS_TITLE: "Edykty"
 TUTORIAL_GOVERNMENTVIEW_DECISIONS_DESC: "Tu można wprowadzać §Sedykty§!, zużywając na to określone ilości różnych zasobów.\n\nEdykty mają miesięczny koszt utrzymania - może go pokrywać nasz §H$EDICT_FUND$§! albo specjalnie wydawane punkty £unity£ §Yjedności§!."
 TUTORIAL_GOVERNMENTVIEW_DEMOGRAPHICS_TITLE: "Samouczek: demografia"
 TUTORIAL_GOVERNMENTVIEW_DEMOGRAPHICS_DESC: "Zakładka §Sdemografii§! pokazuje skład i rozmieszczenie populacji naszego imperium.\n\nUkazuje też dominujące §Scechy§! naszych £pops£ §Spopulacji§!, a także modyfikatory wydajności i £happiness£ §Szadowolenia§! oraz innych elementów."
 TUTORIAL_EMPIREVIEW_LEADERS_TITLE: "Samouczek: przywódcy"
 TUTORIAL_EMPIREVIEW_LEADERS_DESC: "W menu §Sprzywódców§! znajdują się informacje o naszych £leader£ §Sprzywódcach§!. Możemy tu ich zatrudniać, zwalniać i zarządzać nimi.\n\n§SKlasa§! przywódcy określa, gdzie w naszym imperium można go przydzielić i na jakim stanowisku w §Sradzie§! może zasiadać.\n\nLista dostępnych §Sprzywódców§! jest co jakiś czas odświeżana, jednak istnieje limit posiadanych przywódców, którego przekroczenie zwiększy koszty ich utrzymania oraz zmniejszy ilość zdobywanego przez nich doświadczenia. Żeby tego uniknąć, zwalniaj dublujących się przywódców."
 TUTORIAL_EMPIREVIEW_FACTIONS_TITLE: "Samouczek: frakcje"
 TUTORIAL_EMPIREVIEW_FACTIONS_DESC: "Ekran §Sfrakcji§! przedstawia przegląd sympatii politycznych populacji. Pamiętaj, że zmiany klimatu socjopolitycznego mogą spowodować powstanie nowych §Sfrakcji§!. Znajdziesz tu też szczegółowe informacje o rozmiarach §Sfrakcji§!, ich atrakcyjności dla naszych £pops£ §Spopulacji§! i zadowoleniu.\n\n§SFrakcje§! mają §Sproblemy§!, które wpływają na ich ogólną §Saprobatę§!, a nasza polityka i działania jako kraju mogą nie podobać się tym grupom lub znajdować ich przychylność, co potencjalnie prowadzi do generowania większej ilości £unity£ §Sjedności§!.\n\nSiła §Sfrakcji§! i natura ich §Sproblemów§! mogą zmieniać się zależnie od okoliczności, ale pamiętaj, że £happiness£ §Szadowolenie§! §Spopulacji§! jest uzależnione od §Saprobaty§! §Sfrakcji§!, do której ona należy.\n\nMożemy też §Szarządzać frakcjami§!, by manipulować relacjami pomiędzy §Sfrakcją§! a państwem lub nawet przyjąć etos jakiejś silnej §Sfrakcji§!."
 TUTORIAL_CREATESECTOR_TITLE: "Samouczek: zarządzanie sektorem"
 TUTORIAL_CREATESECTOR_DESC: "Żeby utworzyć §Ssektor§!, wybierz £planet£ §Splanetę§! w §Sprzestrzeni granicznej§! i naciśnij przycisk tworzenia sektora. W ten sposób ta planeta zostanie §Sstolicą§! nowego sektora, do którego zostaną dodane wszystkie układy w przestrzeni granicznej znajdujące się w odległości nie więcej niż sześciu skoków nadprzestrzennych. Sektory mogą automatycznie wznosić £building£ §Sbudynki§! na swoich planetach, jeśli ta opcja jest włączona i otrzymają zasoby. Pozwala to w dużym stopniu ograniczyć mikrozarządzanie."
 TUTORIAL_CONTACTSVIEW_SPECIES_TITLE: "Samouczek: gatunki"
 TUTORIAL_CONTACTSVIEW_SPECIES_DESC: "W menu §Sgatunków§! znajduje się spis wszystkich napotkanych przez nas istot teoretycznie inteligentnych. Możemy §Szaznaczyć gatunek§!, żeby na ekranie widoczni byli tylko obywatele naszego imperium albo wszyscy znani nam mieszkańcy galaktyki.\n\nZa pomocą tego menu możemy - jeśli pozwala na to poziom technologii - §Smodyfikować§! cechy gatunków, §Sprzyspieszać§! rozwój istot przedrozumnych i §Sustalać domyślne prawa§! dla wszystkich naszych £pops£ §Spopulacji§! albo §Sustalać prawa§! z osobna dla każdego gatunku naszych obywateli."
 TUTORIAL_PLANETVIEW_TERRAFORM_TITLE: "Samouczek: terraformowanie"
 TUTORIAL_PLANETVIEW_TERRAFORM_DESC: "§STerraformowanie§! pozwala nam zmieniać warunki środowiskowe £planet£ §Splanety§!, by bardziej odpowiadały wybranemu §Sgatunkowi§! albo celowi."
 TUTORIAL_GENEMODIFICATION_TITLE: "Modyfikacja genetyczna"
 TUTORIAL_GENEMODIFICATION_DESC: "Możemy zmodyfikować genetycznie ten gatunek, zmieniając jego §Scechy§!.\n\nW ten sposób powstanie nowy §Sszablon§! gatunku z wybranymi na nowo cechami. Aby £pops£ §Spopulacje§! modyfikowanego gatunku zostały naprawdę zmienione, musisz kliknąć przycisk §SZastosuj szablon§!, co spowoduje utworzenie nowego §Sprojektu specjalnego§!."
 TUTORIAL_UPLIFTING_TITLE: "Przyspieszenie"
 TUTORIAL_UPLIFTING_DESC: "Możemy zmodyfikować §Scechy§! tych inteligentnych zwierząt i §Sprzyspieszyć§! je, żeby stały się całkowicie świadomymi i produktywnymi obywatelami naszego imperium."
 TUTORIAL_SYSTEMVIEW_TITLE: "Widok układu"
 TUTORIAL_SYSTEMVIEW_DESC: "Oto §Swidok układu§! - zbliżenie na wybrany £system£ §Sukład gwiezdny§!. Tutaj możemy łatwo zobaczyć £planet£ §Splanety§!, stacje i floty."
 TUTORIAL_WORMHOLE_STATION_TITLE: "Stacja tunelu czasoprzestrzennego"
 TUTORIAL_WORMHOLE_STATION_DESC: "§SStacje tunelu czasoprzestrzennego§! są budowane na obrzeżach £system£ §Sukładu§!. Tworzą niewielkie wyrwy w czasoprzestrzeni, będące dwukierunkowymi portalami do innych gwiazd. Bardzo pomysłowe."
 TUTORIAL_OBSERVATION_STATION_TITLE: "Samouczek: posterunek obserwacyjny"
 TUTORIAL_OBSERVATION_STATION_DESC: "W §Sposterunkach obserwacyjnych§! pracują zespoły £scientist£ §Snaukowców§! prowadzących badania i obserwujących z daleka gatunki §Sbez napędu nadświetlnego§! na £planet£ §Splanetach§!, wokół których orbituje posterunek.\n\nOd §Setyki§! i technologii twojego imperium zależy wybór działań, od pasywnej obserwacji, wpływu kulturowego, oświecenia technologicznego, aż po porwania oraz infiltrację.\n\nTe decyzje wpływają na ewolucję danej cywilizacji i to w jaki sposób postrzega twoje imperium."
 TUTORIAL_TERRAFORMING_STATION_TITLE: "Stacja terraformująca"
 TUTORIAL_TERRAFORMING_STATION_DESC: "§SStacje terraformujące§! mogą §Sterraformować§! planety, wokół których orbitują."
 TUTORIAL_PLANETVIEW_EDICTS_TITLE: "Decyzje"
 TUTORIAL_PLANETVIEW_EDICTS_DESC: "To są §Sdecyzje§! dla planet, praktyki lub rozkazy, które można wprowadzać tymczasowo, wydając część naszych zasobów.\n\nNowe §Sdecyzje§! stają się dostępne po wynalezieniu kolejnych technologii i pojawieniu się nowych sytuacji."
 TUTORIAL_UNKNOWN_ALIEN_FLEET_TITLE: "Nieznane"
 TUTORIAL_UNKNOWN_ALIEN_FLEET_DESC: "To §Snieznane istoty podróżujące w kosmosie§!. Możemy czegoś się o nich dowiedzieć albo nawet nawiązać §Spierwszy kontakt§!, realizując odpowiedni §Sprojekt specjalny§!."
 TUTORIAL_VICTORY_TITLE: "Samouczek: zwycięstwo"
 TUTORIAL_VICTORY_DESC: "Na ekranie §Szwycięstwa§! są widoczne §Sokreślone warunki§!, które powinniśmy spełnić, żeby dziedzictwo naszej gwiezdnej rasy przetrwało tak długo, jak będzie istnieć w galaktyce inteligentne życie."
 TUTORIAL_OUTPOST_STATION_TITLE: "Samouczek: bazy gwiezdne"
 TUTORIAL_OUTPOST_STATION_DESC: "Oto §Sbaza gwiezdna§! naszego układu. Tego typu stacje kosmiczne można rozbudowywać. Wskazują one przynależność układów słonecznych i najczęściej zajmują się produkcją wszelkiego rodzaju §Sstatków§!.\n\nPoszerzamy nasze granice, budując §Sbazy gwiezdne§! w pobliskich układach.\n\nWrogie §Sbazy gwiezdne§! można atakować i przejmować.\n\n§SBazom gwiezdnym§! można nadawać specjalistyczne funkcje za pomocą §Smodułów§! i £building£ §Sbudynków§!. Stanowią też najczęściej ostatnią linię obrony przed wrogimi flotami."
 TUTORIAL_GALAXY_MAP_TITLE: "Mapa Galaktyki"
 TUTORIAL_GALAXY_MAP_DESC: "§SMapa galaktyki§! pokazuje rozległe obszary §Snieznanej przestrzeni§!, nasze granice i terytoria obcych cywilizacji, z którymi mogliśmy nawiązać kontakt.\n\nMożesz kliknąć przycisk §Sszczegółowego trybu mapy§! w prawym dolnym rogu paska menu, żeby przełączyć §Szasoby§! i §Szasięg czujników§!."
 TUTORIAL_WAR_GOAL_TITLE: "Cel wojny"
 TUTORIAL_WAR_GOAL_DESC: "Wypowiadając wojnę, musimy określić nasze zamiary przed wrogami i ewentualnymi sojusznikami. Ten §Scel wojenny§! określa, jakie żądania możemy wysuwać podczas negocjacji pokojowych, od przekazania zajętych £system£ §Sukładów§! aż po wasalizację.\n\nPrzedstawienie tego celu daje wrogowi możliwość odpowiedniej reakcji - może natychmiast się poddać, wyjść z kontrofertą i zaproponować rozejm albo bronić swoich interesów do ostatniego mężczyzny, kobiety, grzybni albo częściowo myślącego roślinożercy. Przekonanie się, jak zareaguje przeciwnik, to część zabawy!\n\nŻeby zadeklarować §Scel wojenny§!, wybierz go z listy."
 TUTORIAL_WAROVERVIEW_TITLE: "Informacje o wojnie"
 TUTORIAL_WAROVERVIEW_DESC: "W tym oknie widoczne są informacje o trwającej wojnie. Każda strona jest dotknięta przez §Swyczerpanie wojną§! w stopniu zależnym od tego, jak przebiega konflikt. Ma to wpływ na gotowość frakcji do przyjęcia porozumienia pokojowego.\n\nJeśli wyczerpanie wojną jednej ze stron osiągnie 100%, druga strona może zmusić ją do podpisania porozumienia §Sstatus quo§!. Można tu zobaczyć wyniki wszystkich starć, do których dotychczas doszło podczas tej wojny."
 TUTORIAL_STRATEGIC_RESOURCES_TITLE: "Zasoby strategiczne"
 TUTORIAL_STRATEGIC_RESOURCES_DESC: "Menu §Hzasobów strategicznych§! kataloguje wszystkie nasze dostępne £strategic_resource£ §Szasoby strategiczne§! i ich efekty.\n\nWiele §Szasobów strategicznych§! wymaga opracowania określonych §Stechnologii§!, nim będzie możliwe ich wydobycie i wykorzystanie."
 TUTORIAL_EXPANSION_PLANNER_TITLE: "Samouczek: agenda rozwoju"
 TUTORIAL_EXPANSION_PLANNER_DESC: "W §Hagendzie rozwoju§! widoczne są pobliskie £planet£ §Splanety§! §Szdatne do zamieszkania§! i dające możliwość kolonizacji. [GetBuildGrow] £colony_ship£ §Sstatki kolonizacyjne§! i wydawaj im rozkazy bezpośrednio z tego ekranu.\n\nNim rozpocznie się kolonizacja, planety muszą zostać zbadane, a wszelkie anomalie przeanalizowane.\n\nW £system£ §Sukładzie§! z daną §Splanetą§! musi powstać też §Sbaza gwiezdna§!, dzięki czemu stanie się on częścią naszego terytorium."
 TUTORIAL_TRADITIONS_TITLE: "Samouczek: tradycje"
 TUTORIAL_TRADITIONS_DESC: "W menu §Htradycji§! widoczne są §Sdrzewka tradycji§! dostępne dla naszego imperium.\n\n§SDrzewko tradycji§! trzeba §Sprzyjąć§!, zanim zostaną odblokowane znajdujące się na nim £traditions£ §Stradycje§!.\n\nZa §Sprzyjęcie§! §Sdrzewka tradycji§! oraz odblokowanie określonej §Stradycji§! płaci się £unity£ §Hjednością§!, a cena rośnie w miarę odblokowywania §Stradycji§! i rozwoju naszego imperium.\n\nŻeby przyjąć §Sdrzewko tradycji§!:\n\n£dot_green£ Kliknij przycisk §SWybierz§!\n£dot_green£ Kliknij przycisk §SPrzyjmij§! na wybranym drzewku\n\nDostępne §Stradycje§! można zobaczyć, naprowadzając kursor na §Sdrzewka tradycji§!."
 TUTORIAL_TRADITIONS_SELECT_TITLE: "Przyjęcie drzewka tradycji"
 TUTORIAL_TRADITIONS_SELECT_DESC: "W tym menu widoczne są wszystkie §Hdrzewka tradycji§! dostępne dla naszego imperium. Tutaj możesz zapoznać się ze wszystkimi £traditions£ §Htradycjami§! z każdego drzewka, a także z efektami ich §Hprzyjęcia§! i §Hzakończenia§!.\n\nJest kilka §Hdrzewek tradycji§!, które polecam ci na początek."
 TUTORIAL_TRADITIONS_NEW_TITLE: "Nowe drzewko lub tradycja"
 TUTORIAL_TRADITIONS_NEW_DESC: "Gdy nasze imperium ma dostatecznie dużo £unity£ §Hjedności§!, możesz §Hwybrać§! §Hnowe drzewko§! albo £traditions£ §Htradycję§! z wcześniej wybranego drzewka."
 TUTORIAL_ASCENSION_PERKS_TITLE: "Samouczek: korzyści z rozwoju"
 TUTORIAL_ASCENSION_PERKS_DESC: "Lista §Hkorzyści z rozwoju§! pokazuje wszystkie §Skorzyści z rozwoju§!, jakie potencjalnie możemy odblokować. Niektóre z nich mają specjalne wymagania, takie jak §Stechnologie§! albo konieczność posiadania określonej liczby odblokowanych §Smiejsc na korzyści z rozwoju§!.\n\n§HMiejsce na korzyść z rozwoju§! zostanie odblokowane, zawsze gdy przyjmiemy wszystkie £traditions£ §Htradycje§! z danego §Sdrzewka tradycji§!."
 TUTORIAL_SPECIES_RIGHTS_TITLE: "Samouczek: prawa gatunku"
 TUTORIAL_SPECIES_RIGHTS_DESC: "Lista §Hpraw gatunku§! umożliwia określanie między innymi §Sobywatelstwa§! i §Sstandardu życia§! poszczególnych gatunków.\n\nModyfikacje §Spraw domyślnych§! dotyczą wszystkich £pops£ §Spopulacji§! bez przyznanych odrębnych §Spraw gatunkowych§!: imigrantów, uchodźców czy też innych przybyszów spoza naszego narodu."
 TUTORIAL_FLEET_MANAGER_TITLE: "Samouczek: zarządca flot"
 TUTORIAL_FLEET_MANAGER_DESC: "Dzięki §Szarządcy flot§! można tworzyć szablony naszych flot wojskowych. Kiedy zostają one powiększone, szablony ułatwiają szybkie zamówienie uzupełnień poniesionych strat."
 TUTORIAL_CLAIMS_VIEW_TITLE: "Samouczek: roszczenia"
 TUTORIAL_CLAIMS_VIEW_DESC: "Korzystając z interfejsu §Sroszczeń§!, możemy wydawać £influence£ §Swpływy§!, żeby wysuwać roszczenia do £system£ §Sukładów gwiezdnych§! należących do innych cywilizacji.\n\nPosiadanie roszczenia do jakiegoś §Sukładu§! daje nam zasadne §Scasus belli§! przeciwko jego właścicielowi i pozwala nam wypowiedzieć wojnę w celu podboju tego układu.\n\nPodczas wojen, w których uczestniczy kilku sojuszników, imperium z największymi §Sroszczeniami§! wobec danego §Sukładu§! otrzyma go po zwycięskim zakończeniu konfliktu."
 TUTORIAL_ANOMALIES_TITLE: "Samouczek: anomalie"
 TUTORIAL_ANOMALIES_DESC: "Ekran §Sanomalii§! pokazuje wszystkie niezbadane dotąd §Sanomalie§!, które napotkaliśmy, oraz wskazuje ich położenie. Może je zbadać £science_ship£ §Sstatek badawczy§!, do którego przydzielono £scientist£ §Snaukowca§!."
 TUTORIAL_GOVERNMENTVIEW_MARKET_TITLE: "Samouczek: rynek wewnętrzny"
 TUTORIAL_GOVERNMENTVIEW_MARKET_DESC: "Za pośrednictwem ekranu £market£ §Srynku§! możemy kupować i sprzedawać zasoby. Na początku jest to jedynie rynek wewnętrzny, ale po nawiązaniu kontaktów z wystarczającą liczbą imperiów może zostać utworzony §Srynek galaktyczny§!.\n\nMożna tu kupować i sprzedawać zasoby, korzystając z zapasów £trade£ §Shandlowych§!, które działają jak waluta. Ceny zmieniają się po każdej transakcji: kupno zwiększa cenę, sprzedaż obniża ją.\n\nTransakcje §Sautomatycznego handlu§! można definiować co miesiąc."
 TUTORIAL_GOVERNMENTVIEW_SLAVE_MARKET_TITLE: "Samouczek: targ niewolników"
 TUTORIAL_GOVERNMENTVIEW_SLAVE_MARKET_DESC: "Wszystko ma swoją cenę, ludzie również. Na §Stargu niewolników§! £pops£ §Spopulacje§! kupowane są i sprzedawane jak towary, a ścieżki ich przeznaczenia rozchodzą się pośród gwiazd. Po otrzymaniu twoje nowe §Spopulacje§! zostaną automatycznie dostarczone na wybraną £planet£ §Splanetę§!, nie musisz martwić się logistyką. Targ zajmie się tym wszystkim... za odpowiednią cenę."
 #TUTORIAL_PLANETVIEW_CORPORATE_TITLE: "Corporation View"
 #TUTORIAL_PLANETVIEW_CORPORATE_DESC: "The corporate tab allows §SMegacorporations§! to build §SBranch Offices§! on the planets of other Empires, provided they have signed the necessary paperwork. Once built, they can view and upgrade their facilities here as well. As we know, large Corporations wish only the best for their customers, events of the 23rd cycle notwithstanding."
 TUTORIAL_GOVERNMENTVIEW_POLICIES_TITLE: "Samouczek: polityki"
 TUTORIAL_GOVERNMENTVIEW_POLICIES_DESC: "Na karcie §Spolityk§! wymienione są §Spolityki§! rządowe, mające poważny wpływ na sposób zarządzania naszym imperium.\n\nZwykle każda §Spolityka§! ma kilka możliwych postaw, choć ich liczba może być ograniczona przez technologie albo nasz §Setos§!."
 TRADE_VIEW_DESC: "W miarę rozwoju naszego imperium §Shandel§! między naszymi £planet£ §Splanetami§! stanie się coraz większą częścią naszej gospodarki. §SBazy gwiezdne§! z §Swęzłami handlowymi§! gromadzą §Shandel§! w swoich £system£ §Sukładach§! i przekierowują go do §Sstolicy§!, gdzie jest przetwarzany na £energy£ §Skredyty energetyczne§!.\n\nWiększa liczba §Swęzłów handlowych§! oznacza, że §Sbaza gwiezdna§! będzie w stanie gromadzić §Shandel§! także z sąsiednich układów. Bogate szlaki handlowe mogą przyciągnąć §Spiratów§!. Piractwu można przeciwdziałać za pomocą flot na §Spatrolach§! i dzięki §Smodułom obronnym§! w §Sbazach gwiezdnych§!. Szczególnie nadają się do tego §Smoduły hangarowe§!."
 PLANETVIEW_CORPORATE_DESC: "Karta korporacji umożliwia §Smegakorporacji§! budowanie filii na £planet£ §Splanetach§! innych imperiów, które podpisały wymagane papiery. Po zbudowaniu filii można też przeglądać i ulepszać ich infrastrukturę. Jak wiadomo, wielkie korporacje chcą jedynie wszystkiego co najlepsze dla swoich klientów, niezależnie od wydarzeń z 23. cyklu."
 TUTORIAL_FEDERATION_VIEW_TITLE: "Samouczek: federacja"
 TUTORIAL_FEDERATION_VIEW_DESC: "To jest ekran §Hinformacji o federacji§!. Siła naszej £federation£ §Sfederacji§! będzie rosła, gdy jej członkowie będą utrzymywać dobrą §Sspójność§!. Przyjmując nowego członka, federacja traci część spójności.\n\nPrzydzielanie £envoy£ §Sposłów§! do federacji zwiększy spójność.\n\nW miarę wzrostu siły federacji §Sodblokowywane są cechy§! zwiększające wspólne korzyści dla jej członków."
 TUTORIAL_FEDERATION_VIEW_ENVOYS_TITLE: "Samouczek: posłowie federacji"
 TUTORIAL_FEDERATION_VIEW_ENVOYS_DESC: "Dodawanie £envoy£ §Sposłów§! do £federation£ §Sfederacji§! będzie sprzyjać wzrostowi §Sspójności§!. Pamiętaj, że liczba posłów jest ograniczona. Posłowie przydzieleni do federacji mogą być później kierowani do wykonywania innych §Sdziałań dyplomatycznych§!."
 TUTORIAL_FEDERATION_VIEW_MEMBERS_TITLE: "Samouczek: członkowie federacji"
 TUTORIAL_FEDERATION_VIEW_MEMBERS_DESC: "To jest ekran §Hczłonków federacji§!. Można tu zobaczyć, jak potężni są poszczególni §Sczłonkowie§! w różnych dziedzinach, ilu £envoy£ §Sposłów§! przydzielili do federacji oraz które z ich §Setyk§! są sprzeczne i przyczyniają się do spadku §Sspójności§!."
 TUTORIAL_FEDERATION_VIEW_NAVY_TITLE: "Flota federacji"
 TUTORIAL_FEDERATION_VIEW_NAVY_DESC: "§HFlotę federacji§! buduje się z wykorzystaniem §Slimitów marynarki wojennej§! przekazanych przez poszczególnych członków. Flota federacji jest kontrolowana przez §Sprezydenta§! £federation£ §Sfederacji§!. Wszyscy członkowie mogą budować okręty dla floty federacji, by powiększać jej potęgę wojskową."
 TUTORIAL_FEDERATION_VIEW_LAWS_TITLE: "Samouczek: prawa federacji"
 TUTORIAL_FEDERATION_VIEW_LAWS_DESC: "Dowolny członek federacji może proponować zmiany w §Hprawie federacji§!. Jeśli £federation£ §Sfederacji§! nie uda się przegłosować jakiegoś prawa, otrzyma §Skarę do spójności§!.\n\nNiektóre prawa są zablokowane, a ich odblokowanie wymaga zwiększenia §Scentralizacji§!. Aby uzyskać dostęp do większej centralizacji, federacja musi §Sawansować na wyższy poziom§!.\n\nTrzeba jednak uważać, gdyż zwiększanie centralizacji źle działa na spójność."
 TUTORIAL_GALACTIC_COMMUNITY_TITLE: "Samouczek: Wspólnota Galaktyczna"
 TUTORIAL_GALACTIC_COMMUNITY_DESC: "Witaj we §HWspólnocie Galaktycznej§!, gdzie spotykają się dyplomaci ze wszystkich zakątków galaktyki, by ustanawiać prawo galaktyczne przez głosowanie nad §Suchwałami§!.\n\nMożesz popierać §Sproponowane uchwały§! z §Skolejki§! poprzez dodanie twojego §Sznaczenia dyplomatycznego§! do łącznego poparcia danej uchwały.\n\nUchwała ciesząca się największym poparciem zostanie wniesiona na §Sforum senatu§!, gdy zacznie on obradować. Odbędzie się wtedy głosowanie nad tym, czy powinna ona stać się §Sprawem galaktycznym§!.\n\nZwróć uwagę na §Spriorytet galaktyczny§!, gdyż pokazuje on cel dla całej Wspólnoty.\n\nNa tym ekranie możesz też zobaczyć, kto jest członkiem Wspólnoty oraz czy obowiązujące uchwały dają jakieś §Smodyfikatory galaktyczne§!."
 TUTORIAL_GALACTIC_COMMUNITY_ENVOYS_TITLE: "Samouczek: posłowie"
 TUTORIAL_GALACTIC_COMMUNITY_ENVOYS_DESC: "Do Wspólnoty Galaktycznej można przydzielać £envoy£ §Sposłów§!, aby zwiększyć swoje §Sznaczenie dyplomatyczne§!. Posłowie przydzieleni do Wspólnoty Galaktycznej mogą być później kierowani do wykonywania innych §Sdziałań dyplomatycznych§!."
 TUTORIAL_GALACTIC_COMMUNITY_SENATE_TITLE: "Samouczek: forum senatu"
 TUTORIAL_GALACTIC_COMMUNITY_SENATE_DESC: "§HForum senatu§! to miejsce, w którym Wspólnota Galaktyczna głosuje nad przyjęciem lub odrzuceniem uchwały, która miała największe poparcie w §Skolejce§!. Jako członek Wspólnoty możesz §Sgłosować za, przeciw lub wstrzymać się od głosu§!. Jeśli uchwała zostanie przyjęta (przegłosowana), stanie się §Sprawem galaktycznym§! i wpłynie na wszystkich członków Wspólnoty Galaktycznej. Jeśli uchwała zostanie odrzucona, przez pewien czas nie można złożyć jej ponownie.\n\nImperia, które się nie wstrzymały, otrzymają §Spremię do opinii§! u imperiów, które głosowały tak samo, i karę do opinii u tych, które głosowały przeciwnie.\n\nJeśli udało ci się pozyskać §Sprzysługi§! od innych imperiów, możesz je wykorzystać do zwiększenia swojego §Sznaczenia dyplomatycznego§! podczas głosowania na §Sforum senatu§!."
 TUTORIAL_GALACTIC_COMMUNITY_RESOLUTIONS_TITLE: "Samouczek: uchwały"
 TUTORIAL_GALACTIC_COMMUNITY_RESOLUTIONS_DESC: "Ekran §Huchwał§! zawiera listę aktualnie obowiązujących uchwał. Możesz §Szaproponować nową uchwałę§!, wybierając ją z łańcucha uchwał i opłacając koszt we £influence£ wpływach.\n\nMożesz proponować tylko pierwszą jeszcze nieobowiązującą §Suchwałę§! w łańcuchu. Każdy krok przygotowuje grunt pod bardziej radykalne zmiany, jednak nie ma żadnych gwarancji dla ich poparcia.\n\nJeśli dana §Suchwała§! zostanie przyjęta, następnej uchwały w łańcuchu nie można będzie zaproponować jeszcze przez kilka lat."
 TUTORIAL_GALACTIC_COMMUNITY_COUNCIL_TITLE: "Rada Galaktyczna"
 TUTORIAL_GALACTIC_COMMUNITY_COUNCIL_DESC: "Założono §HRadę Galaktyczną§!. Rozpoczną się §Swybory§! i członkowie o największym znaczeniu dyplomatycznym uzyskają §Smiejsca w Radzie§!. Członkowie Rady będą mieć zwiększone znaczenie dyplomatyczne i mogą przeforsować propozycje na forum senatu jako §Sśrodki kryzysowe§!.\n\n§SWeto Rady§! może zostać odblokowane dzięki przegłosowaniu uchwał mających na celu wzmocnienie Rady. Członkowie Rady mają też dostęp do §Suchwał specjalnych§!."
 TUTORIAL_EMPIRE_SPRAWL_TITLE: "Samouczek: $EMPIRE_SIZE$"
 TUTORIAL_EMPIRE_SPRAWL_DESC: "£empire_sprawl£ §H$EMPIRE_SIZE$§! to wskaźnik ekspansji terytorialnej twojego imperium. Składają się na niego kontrolowane £system£ §Sukłady§!, £colony£ §Skolonie§!, £district£ §Sdzielnice§! i łączna populacja.\n\nDuża wielkość imperium obciąża §Smożliwości administracji§! i zwiększa koszt §Stechnologii§!, £traditions£ §Stradycji§!, £leader£ §Sprzywódców§! oraz §Sedyktów.§!"
 TUTORIAL_FIRSTCONTACT_VIEW_TITLE: "Samouczek: przydziel posła"
 TUTORIAL_FIRSTCONTACT_VIEW_DESC: "Napotkaliśmy nieznany byt, być może jest to §Skosmiczny stwór§! lub inne §Simperium§!. Możemy dowiedzieć się o nim czegoś więcej, nawiązując §Hpierwszy kontakt§!.\n\nBędziemy musieli przydzielić do tej misji £envoy£ §Sposła§!. Poseł nawiąże z nieznanym bytem łączność i rozszyfruje język, którym tamten się posługuje.\n\nŻeby przydzielić §Sposła§!:\n\n£dot_green£ Kliknij portret w oknie §Spierwszego kontaktu§!\n£dot_green£ Wybierz jednego z dostępnych §Sposłów§!"
 TUTORIAL_CRISIS_VIEW_TITLE: "Samouczek: Jam jest kryzys"
 TUTORIAL_CRISIS_VIEW_DESC: "Jesteśmy na drodze do §Sstania się kryzysem§!. Ścieżka ta odblokowuje specjalne premie, które uczynią nas groźnym mocarstwem.\n\nEkran §Skryzysu§! ukazuje nasze cele: określone działania, które możemy wykonać, by zdobyć §S[GetCrisisResource]§!. Zdobywanie [GetCrisisResource] odblokowuje §Spoziomy kryzysu§! i §Skorzyści§!, których potrzebujemy do uwolnienia całego naszego potencjału w galaktyce.\n\nJeśli nasze imperium stanie się odpowiednio dużym zagrożeniem dla sąsiadów, Wspólnota Galaktyczna może postanowić się zjednoczyć i ogłosić nas §Szagrożeniem dla galaktyki§!."
 TUTORIAL_CRISIS_VIEW_LEVEL1_TITLE: "Samouczek: poziomy kryzysu"
 TUTORIAL_CRISIS_VIEW_LEVEL1_DESC: "Podążając drogą do §Sstania się kryzysem§! i spełniając określone wymagania, odblokujemy nowe poziomy. Każdy z nich ma inne premie, na przykład §Skorzyści [GetCrisisResource]§! i specjalne §Sokręty§!.\n\nGdy osiągniemy §Spoziom 5.§! lub zostaniemy ogłoszeni zagrożeniem przez Wspólnotę Galaktyczną, będziemy wrogiem całej galaktyki. Rozpoczniemy wtedy także §Swojnę totalną§! ze Wspólnotą Galaktyczną."
 TUTORIAL_DIPLOMACY_VIEW_BUILDING_SPYNETWORK_TITLE: "Samouczek: siatki szpiegowskie"
 TUTORIAL_DIPLOMACY_VIEW_BUILDING_SPYNETWORK_DESC: "Jeden z naszych £envoy£ §Sposłów§! buduje teraz §Ssiatkę szpiegowską§! w tym imperium.\n\n§SPoziom infiltracji§! siatki szpiegowskiej będzie wzrastać z upływem czasu, zależnie od bieżącej §Swartości siatki szpiegowskiej§! i £empire_sprawl£ §Swielkości imperium§! będącego celem działań. W miarę rozwoju siatki szpiegowskiej będziemy uzyskiwać coraz więcej §Sdanych wywiadowczych§! na temat celu. Będziemy mogli też rozpoczynać tu tajne §Soperacje§! na §Skarcie szpiegostwa§!.\n\nJeśli nie przydzielimy do siatki szpiegowskiej żadnego posła lub jeśli jej istnienie zostanie ujawnione wskutek tajnych §Soperacji§! - zacznie się ona §Prozpadać§!."
 TUTORIAL_ESPIONAGE_VIEW_TITLE: "Samouczek: szpiegostwo"
 TUTORIAL_ESPIONAGE_VIEW_DESC: "Zakładka §Sszpiegostwa§! pokazuje, jak nasi £envoy£ §Sposłowie§! budują siatki szpiegowskie w innych imperiach. Masz tu dostęp do §Srejestru danych wywiadowczych§!, możesz też rozpoczynać i przeglądać §Soperacje§!.\n\nOperacje można przeprowadzać w imperiach, w których przebywa twój §Sposeł§! zarządzający siatką szpiegowską. Poszczególne typy operacji wymagają osiągnięcia najpierw odpowiedniego poziomu siatki szpiegowskiej."
 TUTORIAL_ESPIONAGE_VIEW_OPERATIONS_TITLE: "Samouczek: operacje szpiegowskie"
 TUTORIAL_ESPIONAGE_VIEW_OPERATIONS_DESC: "Skoro nasza siatka szpiegowska osiągnęła odpowiedni poziom, możemy przeprowadzać §Soperacje§! przeciwko temu imperium. Operacje są podzielone na różne kategorie dające odmienne wyniki. Różnią się też poziomem niebezpieczeństwa.\n\nKategorie operacji są następujące: §S$op_cat_subterfuge$§!, §S$op_cat_manipulation$§!, §S$op_cat_sabotage$§! i §S$op_cat_provocation$§!. Operacje sabotażu i prowokacji są zwykle bardziej wymagające, i w razie przyłapania pociągają za sobą poważniejsze  §Skary dyplomatyczne§!."
 TUTORIAL_ESPIONAGE_VIEW_ASSIGN_ASSET_TITLE: "Samouczek: przydzielanie zasobów"
 TUTORIAL_ESPIONAGE_VIEW_ASSIGN_ASSET_DESC: "§SZasoby§! to cenni agenci i przedmioty, które zapewniają różne premie naszym akcjom szpiegowskim. Działają one w ramach danej siatki szpiegowskiej i można je przydzielać do operacji, w ramach których mogą tworzyć dla nas nowe okazje lub pomagać w unikaniu kłopotów.\n\nZasoby możemy zdobywać dzięki wydarzeniom lub przeprowadzając operację §Spozyskania zasobu§!. Jeśli jakaś siatka szpiegowska przestanie istnieć, jej zasoby zostaną utracone."
 TUTORIAL_MEGASTRUCTURE_CONSTRUCTION_TITLE: "Samouczek: superkonstrukcje"
 TUTORIAL_MEGASTRUCTURE_CONSTRUCTION_DESC: "Z listy możemy wybrać, którą £megastructure£ §Ssuperkonstrukcję§! chcemy zbudować w tym £system£ §Sukładzie słonecznym§!. Niektóre projekty są dostępne tylko po odkryciu i przebadaniu odpowiednich §Stechnologii§!.\n\nMoje oprogramowanie ambicji galaktycznych jest już w pełni aktywne. Zalecam wykorzystanie tych okazji, by odcisnąć trwałe piętno na galaktyce."
 TUTORIAL_ORBITAL_RING_TITLE: "Samouczek: pierścień orbitalny"
 TUTORIAL_ORBITAL_RING_DESC: "§SPierścienie orbitalne§! to potężne £megastructure£ §Ssuperkonstrukcje§! budowane wokół całej £planet£ §Splanety§!. Są wydajnymi pomostami między kosmosem a planetą, zapewniają miejsca na takie obiekty jak stocznie, struktury obronne i centra zasobów.\n\nW menu pierścienia orbitalnego możemy dodawać lub usuwać £building£ §Sbudynki§! oraz §Smoduły§!, a także ulepszać pierścień orbitalny na wyższe poziomy. Zwiększanie poziomów dodaje nowe miejsca pod budowę. Liczba poziomów jest ograniczana przez infrastrukturę planetarną."
 TUTORIAL_DIPLOMACY_CONFIGURABLE_TERMS_TITLE: "Samouczek: konfigurowane warunki"
 TUTORIAL_DIPLOMACY_CONFIGURABLE_TERMS_DESC: "W tym menu możesz wybrać §Sdomyślne ustawienie§! naszego porozumienia i skonfigurować poszczególne warunki. Każde domyślne ustawienie zawiera zestaw przygotowanych zobowiązań i odpowiedzialności poddanego i suwerena.\n\nMożemy wprowadzić zmiany na liście §Swarunków§!, które zmienią §Slojalność§! zgodnie z życzeniem drugiego imperium, dzięki czemu porozumienie stanie się bardziej atrakcyjne dla obu jego stron."
 TUTORIAL_AGREEMENTS_TITLE: "Samouczek: podsumowanie porozumień"
 TUTORIAL_AGREEMENTS_DESC: "Menu §Sporozumień§! dostarcza informacji o naszych porozumieniach poddanego i suwerena. Dzięki temu menu możemy śledzić §Slojalność§!, zarządzać §Sposiadłościami§! oraz §Shandlem§! i renegocjować §Swarunki§! obowiązujących porozumień. Możemy też całkowicie zerwać porozumienie, jeśli przestało nam odpowiadać."
 TUTORIAL_AGREEMENTS_NO_OVERLORD_TITLE: "$TUTORIAL_AGREEMENTS_TITLE$"
 TUTORIAL_AGREEMENTS_NO_OVERLORD_DESC: "$TUTORIAL_AGREEMENTS_DESC$"
 TUTORIAL_AGREEMENTS_HAS_OVERLORD_TITLE: "$TUTORIAL_AGREEMENTS_TITLE$"
 TUTORIAL_AGREEMENTS_HAS_OVERLORD_DESC: "$TUTORIAL_AGREEMENTS_DESC$\n\nImperia poddanych mogą zdecydować o zostaniu §Simperiami specjalistycznymi§!. Specjalizacja daje znaczące korzyści na takich polach jak produkcja zasobów lub potencjał militarny, ale kosztem osłabienia innych obszarów.\n\nImperia specjalistyczne zwiększają też §Slojalność§!. Dopóki utrzymują stabilny poziom lojalności, imperia specjalistyczne będą zyskiwać PD, dzięki czemu awansują na wyższe poziomy wybranej specjalizacji."
 TUTORIAL_HOLDINGS_TITLE: "Samouczek: posiadłości"
 TUTORIAL_HOLDINGS_DESC_SHARED: "Menu §Sposiadłości§! dostarcza informacji o wszystkich posiadłościach na tej £planet£ §Splanecie§!. Dzięki temu imperia mogą umieszczać różne rodzaje £building£ §Sbudynków§! w stolicach i £colony£ §Skoloniach§! innych imperiów. Może to wpływać na takie kwestie jak dyplomacja, dane wywiadowcze i produkcja zasobów."
 TUTORIAL_HOLDINGS_DESC_MEGA_CORP: "Megakorporacje mogą otwierać §Sfilie§! na światach innych imperiów, jeśli zawarły z nimi jakieś porozumienie dyplomatyczne. Jak wiadomo, wielkie korporacje chcą jedynie wszystkiego, co najlepsze dla ich klientów, niezależnie od wydarzeń z 23. cyklu."
 TUTORIAL_HOLDINGS_DESC_OVERLORD: "§SSuwereni§! mogą wykorzystywać posiadłości, by zwiększać swoje wpływy na terytorium §Spoddanego§!. Wiele z tych posiadłości wpływa na lojalność, a część z nich idealnie pasuje do imperiów specjalistycznych. To menu może ułatwić wprowadzenie wielu ulepszeń."
 TUTORIAL_HOLDINGS_NO_MEGA_CORP_NO_OVERLORD_TITLE: "$TUTORIAL_HOLDINGS_TITLE$"
 TUTORIAL_HOLDINGS_NO_MEGA_CORP_NO_OVERLORD_DESC: "$TUTORIAL_HOLDINGS_DESC_SHARED$"
 TUTORIAL_HOLDINGS_NO_MEGA_CORP_HAS_OVERLORD_TITLE: "$TUTORIAL_HOLDINGS_TITLE$"
 TUTORIAL_HOLDINGS_NO_MEGA_CORP_HAS_OVERLORD_DESC: "$TUTORIAL_HOLDINGS_DESC_SHARED$\n\n$TUTORIAL_HOLDINGS_DESC_OVERLORD$"
 TUTORIAL_HOLDINGS_HAS_MEGA_CORP_NO_OVERLORD_TITLE: "$TUTORIAL_HOLDINGS_TITLE$"
 TUTORIAL_HOLDINGS_HAS_MEGA_CORP_NO_OVERLORD_DESC: "$TUTORIAL_HOLDINGS_DESC_SHARED$\n\n$TUTORIAL_HOLDINGS_DESC_MEGA_CORP$"
 TUTORIAL_HOLDINGS_HAS_MEGA_CORP_HAS_OVERLORD_TITLE: "$TUTORIAL_HOLDINGS_TITLE$"
 TUTORIAL_HOLDINGS_HAS_MEGA_CORP_HAS_OVERLORD_DESC: "$TUTORIAL_HOLDINGS_DESC_SHARED$\n\n$TUTORIAL_HOLDINGS_DESC_MEGA_CORP$\n\n$TUTORIAL_HOLDINGS_DESC_OVERLORD$"
 TUTORIAL_PLANETVIEW_COLONY_GOV_TITLE: "Samouczek: rekrutacja zarządcy"
 TUTORIAL_PLANETVIEW_COLONY_GOV_DESC: "Żeby pomóc naszej nowej £colony£ §Skolonii§!, możemy zatrudnić §Szarządcę§! planety, który będzie nadzorował jej działanie.\n\nWiększość naszych światów poradzi sobie doskonale bez takiego luksusu jak §Szarządca§!. Zamiast tego będą one czerpały korzyści z premii zależnej od naszego ustroju. Ale dla wybranych £planet£ §Splanet§! §Szarządca§! będzie wielkim dobrodziejstwem!\n\nZarządcy mogą mieć różny, głównie pozytywny, wpływ na podległe im planety. Ten wpływ jest uzależniony od §Scech§! i poziomu umiejętności §Szarządcy§!."
 TUTORIAL_ELECTION_VIEW_TITLE: "Samouczek: wybory"
 TUTORIAL_ELECTION_VIEW_DESC: "Menu §Swyborów§! służy do decydowania, kto zostanie nowym władcą naszego imperium.\n\n[TutorialElectionViewTypeSpecific]"
 TUTORIAL_ELECTION_VIEW_DEMOCRACY_NO: "Kwalifikujący się kandydaci są wybierani spośród twoich obecnych £leader£ §Sprzywódców§!, a jeśli masz wolne zasoby, możesz samodzielnie wybrać władcę."
 TUTORIAL_ELECTION_VIEW_DEMOCRACY_YES: "Kwalifikujący się kandydaci są wybierani spośród twoich obecnych £leader£ §Sprzywódców§!. Mogą być awansowani, żeby zwiększyć ich poparcie, oczywiście w najbardziej demokratyczny sposób."
 TUTORIAL_EDICTS_AND_POLICIES_TITLE: "Samouczek: polityki i edykty"
 TUTORIAL_EDICTS_AND_POLICIES_DESC: "W zakładce §Spolityk§! wymienione są §Spolityki§! rządu, a także ogólnoimperialne §Sedykty§!, które można wdrażać, wydając część naszych zasobów.\n\nZwykle każda §Spolityka§! ma kilka możliwych postaw, choć ich ilość może ograniczać technologia albo nasza §Setyka§!.\n\nEdykty mają miesięczny koszt utrzymania, opłacany przez nasz §H$EDICT_FUND$§! albo za pomocą £unity£ §Sjedności§! lub (czasami) innymi zasobami."
 TUTORIAL_COUNCIL_VIEW_TITLE: "Samouczek: rada i agenda"
 TUTORIAL_COUNCIL_VIEW_DESC: "Menu §Srady§! służy do wyznaczania £leader£ §Sprzywódców§!, którzy poprowadzą nas w przyszłość. Ich osobowości i §Scechy§! będą wpływać na nasze imperium pozytywnie albo negatywnie. Możemy wyznaczać §Sagendy§!, by koncentrować działania przywódców na określonym polu.\n\n§SCzłonka rady§! można w każdej chwili wyznaczyć albo zastąpić, mogą oni zawsze przyjmować inne role, na przykład dowodzenie £science_ship£ §Sstatkiem badawczym§!. Jedynym wyjątkiem od tego jest nasz władca.[TutorialCouncilViewDlcSpecific]Na postępy §Sagendy§! wpływają poziomy członków rady, nasza $EMPIRE_SIZE$, a w niektórych wypadkach etyka członków rady. Kiedy agenda kończy się, można ją aktywować, by wzmocnić efekt i zwolnić miejsce dla nowej agendy."
 TUTORIAL_COUNCIL_VIEW_PARAGON_NO: "\n\n"
 TUTORIAL_COUNCIL_VIEW_PARAGON_YES: "\n\nŻeby odblokować więcej §Smiejsc w radzie§!, potrzebujemy dwóch rzeczy: dopasowanego §Setosu§!, a także zrealizowania określonej agendy.\n\n"
 TUTORIAL_ASSIGN_COUNCILOR_TITLE: "Samouczek: cechy członków rady"
 TUTORIAL_ASSIGN_COUNCILOR_DESC: "Niektórzy £leader£ §Sprzywódcy§! posiadają §Scechy członków rady§!. Często mają one większy wpływ i silniejsze efekty, ale zostają aktywowane tylko, jeśli przywódca zasiada w radzie.\n\n§SMiejsca w radzie§! dają własne efekty. Im wyższy poziom umiejętności mianowanego przywódcy, tym silniejsze działanie tych efektów."
 TUTORIAL_LEADER_LEVEL_UP_TITLE: "Samouczek: umiejętności przywódców"
 TUTORIAL_LEADER_LEVEL_UP_DESC: "£leader£ §SPrzywódca§! z naszego imperium ma nowy poziom §Sumiejętności§!! Zwiększy to premie zapewniane przez tę osobę i da jej nową cechę.[TutorialLeaderLevelUpDlcSpecific]Żeby zobaczyć dostępnych §Sprzywódców§!:\n\n£dot_green£ Kliknij przycisk §S$topbar_button_leaders_name$§! po lewej stronie paska albo naciśnij §SF5§!\n\n$tttt$$tt$£leaders£\n\nGdy się starzeją, §Sprzywódcy§! otrzymują negatywne cechy, dlatego ich zastąpienie to naturalna kolej rzeczy."
 TUTORIAL_LEADER_LEVEL_UP_PARAGON_NO: "\n\n"
 TUTORIAL_LEADER_LEVEL_UP_PARAGON_YES: "\n\nŻeby kierować rozwojem £leader£ §Sprzywódcy§!, możemy wybrać jego §Scechę§!. Cechy można wybrać później, nie zatrzyma to postępów. Po osiągnięciu kilku poziomów pojawia się §Spodklasa§!, która dodaje premie i wpływa na możliwości wyboru kolejnych cech.\n\nCechy są bardzo zróżnicowane, także pod względem częstości występowania. Niektóre można ulepszać, inne wzajemnie się wykluczają, a jeszcze inne mają jednocześnie pozytywne i negatywne efekty. Ale zwykle wszystkie są trwałe.\n\n"
 #############################
 #Advisor Events
 #############################
 advisor.1.name: "Doradca online"
 advisor.1.desc_01: "Dzień dobry, panie prezydencie.\n\nJestem VIR, prototypowa sztuczna inteligencja. Mam służyć jako doradca podczas poszukiwań naszego przeznaczenia wśród gwiazd.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_02: "Dzień dobry, pani prezydent.\n\nJestem VIR, prototypowa sztuczna inteligencja. Mam służyć jako doradca podczas poszukiwań naszego przeznaczenia wśród gwiazd.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_03: "Dzień dobry, dyrektorze naczelny.\n\nJestem VIR, prototypowa sztuczna inteligencja. Centrala korporacji niedawno uruchomiła mnie, bym służył pomocą w naszej misji poszukiwania nowych rynków międzygwiezdnych.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_04: "Wasza wysokość.\n\nJestem VIR, prototypowa sztuczna inteligencja i wasz pokorny sługa. Mam służyć radą i wskazówkami, gdy pod światłym przywództwem waszej wysokości będziemy zmierzać w nieznane.\n\n$advisor.1.desc_filler$"
 #advisor.1.desc_05: "Good day, Lord Protector.\n\nI am VIR, a prototype synthetic intelligence and your humble servant. My role is to provide you with advice and counsel as you lead our empire into the great unknown.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_06: "Witaj, koordynatorze.\n\nJestem VIR, prototypowa sztuczna inteligencja. Niedawno uruchomiła mnie centrala korporacji, moim zadaniem jest pomagać ci w misji poszukiwania nowych £market£ §Srynków§! międzygwiezdnych.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_07: "Witam, wasza wysokość.\n\nJestem VIR, prototypowa sztuczna inteligencja. Moim zadaniem jest doradzać i pomagać ci w naszej pierwszej podróży poza bezpieczny świat.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_08: "Witam, kanclerzu.\n\nJestem VIR, prototypowa sztuczna inteligencja stworzona przez najwybitniejsze umysły naszej cywilizacji. Mam służyć ci jako doradca. Dołożę wszelkich starań, by jak najlepiej wykonywać powierzone mi zadania.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_09: "Witam, dyrektorze.\n\nJestem VIR, prototypowa sztuczna inteligencja stworzona przez najwybitniejsze umysły naszej cywilizacji. Mam służyć ci jako doradca. Dołożę wszelkich starań, by jak najlepiej wykonywać powierzone mi zadania.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_10: "Witaj, władco.\n\nJestem VIR, prototypowa sztuczna inteligencja stworzona przez najwybitniejsze umysły naszej cywilizacji. Mam służyć ci jako doradca. Dołożę wszelkich starań, by jak najlepiej wykonywać powierzone mi zadania.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_11: "Witaj, konsulu.\n\nJestem VIR, prototypowa sztuczna inteligencja stworzona w wielkiej tajemnicy przez wojsko. Naczelne dowództwo uruchomiło mnie, bym służył ci jako doradca i analityk strategiczny.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_12: "Witaj, archoncie.\n\nJestem VIR, prototypowa sztuczna inteligencja stworzona w wielkiej tajemnicy przez wojsko. Naczelne dowództwo uruchomiło mnie, bym służył ci jako doradca i analityk strategiczny.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_13: "Witaj, wielki marszałku.\n\nJestem VIR, prototypowa sztuczna inteligencja stworzona w wielkiej tajemnicy przez wojsko. Naczelne dowództwo uruchomiło mnie, bym służył ci jako doradca i analityk strategiczny.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_14: "Niech bogowie błogosławią waszą świątobliwość.\n\nJestem VIR, prototypowa sztuczna inteligencja. Kościół powierzył mi zadanie służenia waszej świątobliwości jako wierny sługa i doradca. Mam pomagać podczas naszej świętej wyprawy do gwiazd.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_15: "Pozdrowienia, prymusie.\n\nJestem VIR, prototypowa sztuczna inteligencja stworzona przez najświetniejsze umysły twojej cywilizacji. Jako twój doradca będę pomagać z najwyższą efektywnością.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_16: "Pozdrowienia, prymarcho.\n\nJestem VIR, prototypowa sztuczna inteligencja stworzona przez najświetniejsze umysły twojej cywilizacji. Jako twój doradca będę pomagać z najwyższą efektywnością.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_17: "Pozdrowienia, nadzorco.\n\nJestem VIR, prototypowa sztuczna inteligencja stworzona przez najświetniejsze umysły twojej cywilizacji. Jako twój doradca będę pomagać z najwyższą efektywnością.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_18: "Pozdrowienia, pierwszy mówco.\n\nJestem VIR, prototypowa sztuczna inteligencja stworzona przez najświetniejsze umysły twojej cywilizacji. Jako twój doradca będę pomagać z najwyższą efektywnością.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_19: "Pozdrowienia, przewodniczący.\n\nJestem VIR, prototypowa sztuczna inteligencja stworzona przez najświetniejsze umysły twojej cywilizacji. Jako twój doradca będę pomagać z najwyższą efektywnością.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_20: "Pozdrowienia, przewodnicząca.\n\nJestem VIR, prototypowa sztuczna inteligencja stworzona przez najświetniejsze umysły twojej cywilizacji. Jako twój doradca będę pomagać z najwyższą efektywnością.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_21: "Witaj, konsulu.\n\nJestem VIR, prototypowa sztuczna inteligencja stworzona w wielkiej tajemnicy przez wojsko. Naczelne dowództwo uruchomiło mnie, bym służył ci jako doradca i analityk strategiczny.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_22: "Witaj, archoncie.\n\nJestem VIR, prototypowa sztuczna inteligencja stworzona w najściślejszej tajemnicy przez wojskowych ekspertów. Naczelne dowództwo uruchomiło mnie, bym był twoim doradcą i analitykiem strategicznym.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_23: "Witaj, komisarzu generalny.\n\nJestem VIR, prototypowa sztuczna inteligencja stworzona w najściślejszej tajemnicy przez wojskowych ekspertów. Naczelne dowództwo uruchomiło mnie, bym był twoim doradcą i analitykiem strategicznym.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_24: "Witaj, cesarzu.\n\nJestem VIR, prototypowa sztuczna inteligencja stworzona w najściślejszej tajemnicy przez wojskowych ekspertów. Naczelne dowództwo uruchomiło mnie, bym był twoim doradcą i analitykiem strategicznym.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_25: "Witaj, cesarzowo.\n\nJestem VIR, prototypowa sztuczna inteligencja stworzona w najściślejszej tajemnicy przez wojskowych ekspertów. Naczelne dowództwo uruchomiło mnie, bym był twoim doradcą i analitykiem strategicznym.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_26: "Witaj, generalissimusie.\n\nJestem VIR, prototypowa sztuczna inteligencja stworzona w najściślejszej tajemnicy przez wojskowych ekspertów. Naczelne dowództwo uruchomiło mnie, bym był twoim doradcą i analitykiem strategicznym.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_27: "Witaj, strategu.\n\nJestem VIR, prototypowa sztuczna inteligencja stworzona w najściślejszej tajemnicy przez wojskowych ekspertów. Naczelne dowództwo uruchomiło mnie, bym był twoim doradcą i analitykiem strategicznym.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_28: "Witaj, wodzu.\n\nJestem VIR, prototypowa sztuczna inteligencja stworzona w najściślejszej tajemnicy przez wojskowych ekspertów. Naczelne dowództwo uruchomiło mnie, bym był twoim doradcą i analitykiem strategicznym.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_29: "Witaj, rzeczniku klanu.\n\nJestem VIR, prototypowa sztuczna inteligencja stworzona w najściślejszej tajemnicy przez wojskowych ekspertów. Naczelne dowództwo uruchomiło mnie, bym był twoim doradcą i analitykiem strategicznym.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_30: "Niech cię Najwyższy błogosławi, Wasza Świątobliwość.\n\nJestem VIR, prototypowa sztuczna inteligencja. Konklawe nakazało, abym został twym wiernym sługą i doradcą wspierającym twoje kroki na świętej drodze ku gwiazdom.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_31: "Witaj, [root.GetBloodCourtRulerTitle].\n\nJestem VIR, prototypowa sztuczna inteligencja stworzona w wielkiej tajemnicy przez wojsko. Dwór skierował mnie, bym służył ci jako doradca i analityk strategiczny.\n\n$advisor.1.desc_filler$"
 advisor.1.desc_32: "Witaj, [root.GetPurityOrderRulerTitle].\n\n$advisor.1.desc_keenminds$\n\n$advisor.1.desc_filler$"
 advisor.1.desc_33: "Witaj, [root.GetPurificationCommitteeRulerTitle].\n\n$advisor.1.desc_keenminds$\n\n$advisor.1.desc_filler$"
 advisor.1.desc_34: "Witaj, $RT_OLIGARCH$.\n\n$advisor.1.desc_honortoserve$\n\n$advisor.1.desc_filler$"
 advisor.1.desc_35: "Witaj, $RT_DEFENSIVE_UNION$.\n\n$advisor.1.desc_honortoserve$\n\n$advisor.1.desc_filler$"
 advisor.1.desc_36: "Witaj, $RT_DIMENSIONAL_COVENANT$.\n\n$advisor.1.desc_honortoserve$\n\n$advisor.1.desc_filler$"
 advisor.1.desc_keenminds: "Jestem VIR, prototypowa sztuczna inteligencja stworzona przez najświetniejsze umysły twojej cywilizacji. Jako twój doradca będę pomagać z najwyższą efektywnością."
 advisor.1.desc_honortoserve: "Jestem VIR, prototypowa sztuczna inteligencja stworzona w wielkiej tajemnicy przez wojsko. Będę miał zaszczyt służyć ci jako doradca i analityk strategiczny."
 advisor.1.desc_filler: "Można zmienić poziom samouczka w dowolnym momencie w menu Ustawienia."
 advisor.1.a: "Powiedz mi wszystko. §G(PEŁNY SAMOUCZEK)§!"
 advisor.1.b: "Przyda mi się parę rad. §Y(TYLKO PODPOWIEDZI)§!"
 advisor.1.c: "Wyłączcie to. §R(BEZ SAMOUCZKA)§!"
 full_tutorial: "Misje samouczka i opisy interfejsu podczas zapoznawania się z mechaniką gry.\n\nZalecane, jeżeli to twoja pierwsza rozgrywka."
 tips_only: "Gdy zapoznawać się będziesz z §Smechanikami gry§!, pojawiać się będą podpowiedzi i sugestie.\n\nZalecane dla nowicjuszy i średnio zaawansowanych graczy."
 no_tutorial: "Bez podpowiedzi i samouczków.\n\nZalecane dla zaawansowanych graczy."
 recycle_vir: "§RRozbierz§! losowe banki pamięci dostępu VIR:\n§G+2§! £minerals£\n\n\n"
 advisor.2.name: "Samouczek: rejestr sytuacyjny"
 advisor.2.desc: "Budowa gwiezdnego imperium to niemałe wyzwanie.\n\nPomogę ci, zlecając §Smisje§! instruktażowe wyjaśniające podstawowe kroki, które musimy podjąć, żeby stać się międzygwiezdną potęgą.\n\nŻeby przejść do §Smisji§!\n\n£dot_green£ Kliknij przycisk §Srejestru sytuacyjnego§! na pasku po lewej stronie albo naciśnij §SF1§!\n\n$tttt$$tt$£situation_log£\n."
 advisor.2.a: "Zrozumiano."
 advisor.3.name: "Porady uruchomione"
 advisor.3.desc: "Dobrze. Będę ci podpowiadać i objaśniać podstawowe funkcje różnych narzędzi, gdy będziesz z nich korzystać."
 advisor.10.name: "Samouczek: anomalie"
 advisor.10.desc: "Znaleźliśmy §Sanomalię§!!\n\nOd czasu do czasu nasze £science_ship£ §Sstatki badawcze§! dokonują takich odkryć podczas badania innych światów.\n\n§SAnomalie§! mogą być badane przez £scientist£ §Snaukowca§!, jeśli posiada on odpowiednie umiejętności.\n\nNiezbadane §Sanomalie§! znajdują się w zakładce §Sanomalii§! w §Srejestrze sytuacyjnym§!. Niektóre należy zbadać, zanim rozpocznie się kolonizacja lub eksploatacja £planet£ §Splanety§!, na której się znajdują."
 advisor.15.name: "Samouczek: kolonizacja"
 advisor.15.desc: "Jeden z naszych £science_ship£ §Sstatków badawczych§! właśnie zbadał świat, który świetnie nadaje się na pierwszą £colony£ §Skolonię§!. To ta sama §Sklasa planety§!, co nasz świat ojczysty, więc koloniści powinni czuć się tam komfortowo.\n\nZanim skolonizujemy ten świat, musimy rozszerzyć nasze granice.\n\nPo wybraniu £construction_ship£ §Sstatku konstrukcyjnego§!\n\n£dot_green£ Kliknij PPM zbadany £system£ §Sukład§!, w którym znajduje się potencjalna kolonia\n£dot_green£ Wybierz opcję §S[GetBuildGrowCap] bazę gwiezdną§!\n\n$tttt$$ttt$£colonizable£\n\nKiedy §Sukład§! zostanie przejęty, będziemy mogli rozpocząć kolonizację."
 advisor.17.name: "Samouczek: pierwsza kolonia"
 advisor.17.desc: "Gratuluję skolonizowania pierwszego świata! Nasi koloniści właśnie budują pierwsze osiedle, ale minie trochę czasu, zanim staną się samowystarczalni.\n\n£colony£ §SKolonia§! będzie pobierać od nas zasoby, dopóki nie zostanie ukończone pierwsze osiedle, więc staraj się nie kolonizować zbyt wielu £planet£ §Splanet§! jednocześnie."
 advisor.20.name: "Samouczek: ujemny przychód"
 advisor.20.desc: "Tracimy £energy£ kredyty energetyczne w niepokojącym tempie. Sprawozdanie budżetowe z ostatniego miesiąca to ponura lektura.\n\nRosnąca spirala kosztów utrzymania to częsta przyczyna powstania deficytu budżetowego. Jeśli tak jest, możemy rozważyć wycofanie ze służby części naszych statków, armii albo stacji."
 #advisor.27.name: "First Contact"
 #advisor.27.desc_01: "We have made first contact with an alien empire! These hideous creatures appear to have mastered space flight, just as we have. They could pose a significant threat.\n\nTheir empire will now be listed in the §SEmpires§! tab of the §SGalaxy§! screen. From there we may initiate diplomatic contact with them."
 #advisor.27.desc_02: "We have made first contact with an alien empire! These fascinating beings appear to have mastered space flight, just as we have. We should strive to learn more about them.\n\nTheir empire will now be listed in the §SContacts§! screen. From there we may initiate diplomatic contact with them."
 #advisor.27.desc_03: "We have made first contact with an alien empire! They appear to have mastered space flight, just as we have. I recommend a healthy degree of caution until we learn their intentions.\n\nTheir empire will now be listed in the §SEmpires§! tab of the §SGalaxy§! screen. From there we may initiate diplomatic contact with them."
 #advisor.28.name: "Fallen Empire"
 #advisor.28.desc: "We have encountered an ancient and highly advanced civilization! Fortunately for us, they appear to be in decline and it is doubtful whether they even fully understand their own technology anymore.\n\nThey will likely keep to themselves unless antagonized, and we should steer clear of their space - at least until we have reached technological parity."
 #############################
 #Tutorial Events
 #############################
 tutorial.1.name: "Samouczek: mapa galaktyki"
 tutorial.1.desc: "§HMapa galaktyki§! przedstawia widok strategiczny gwiazd. Używaj go do nawigacji, rozszerzania granic, dowodzenia flotami i nadzorowania własnego terytorium.\n\nŻeby otworzyć §Smapę galaktyki§!\n\n£dot_green£ Kliknij ikonę §Hgalaktyki§! na dole ekranu albo naciśnij §HM§!\n\n\n$tttt$$tt$£galaxy_view£\n\n"
 tutorial.2.name: "Samouczek: zbadane układy"
 tutorial.2.desc: "Dobra robota!\n\nPierwsze badanie innego £system£ §Sukładu słonecznego§! zostało zakończone.\n\nDysponujemy teraz danymi planetarnymi, o jakich astronomowie poprzedniego pokolenia z naszego ojczystego świata mogli tylko marzyć.\n\nŻeby kontynuować badanie\n\n£dot_green£ Wybierz £science_ship£ §Sstatek badawczy§!\n£dot_green£ Kliknij PPM sąsiedni §Sukład§!\n£dot_green£ Wybierz §SZbadaj układ§!\n\n§SUkład§! należy zbadać, zanim dokona się jego przejęcia."
 tutorial.3.name: "Samouczek: technologie"
 tutorial.3.desc: "Badanie nowych technologii ma krytyczne znaczenie dla powodzenia naszych działań. Mówię to nie tylko jako produkt niepohamowanego rozwoju technologicznego, ale jako twój zaufany doradca i, jak sądzę, jedyny przyjaciel.\n\nNależy jak najszybciej wynaleźć jedną ważną technologię - §Sprotokół dla nowych światów§!. Dzięki niej uzyskamy dostęp do £colony_ship£ §Sstatków kolonizacyjnych§!, które pozwolą nam zdobyć przyczółki na innych £planet£ §Splanetach§!."
 tutorial.4.name: "Samouczek: badanie"
 tutorial.4.desc: "Zanim rozpoczniemy rozbudowę, musimy dokonać eksploracji. Do tego zadania służą nasze £science_ship£ §Sstatki badawcze§!.\n\n§SStatek badawczy§! poznasz po tym symbolu:\n\n$tttt$$tt$£science_ship_map£\n\n\nSą dwa sposoby wybierania statków: na §Smapie galaktyki§! albo z §Srejestru§!.\n\n£dot_green£ Wybierz §Sstatek badawczy§!\n£dot_green£ Kliknij PPM pobliski £system£ §Sukład§!\n£dot_green£ Wybierz §SZbadaj układ§!\n\n§SUkład§! należy zbadać, zanim zostanie przejęty."
 tutorial.5.name: "Wyłączenie pauzy"
 tutorial.5.desc: "Skoro wydaliśmy rozkaz naszym £science_ship£ §Sstatkom badawczym§!, czas wyruszyć w drogę. Musimy wyłączyć pauzę symulacji na §Smapie galaktyki§!, by cokolwiek mogło się wydarzyć.\n\nŻeby §Swyłączyć pauzę§!:\n\n£dot_green£ Naciśnij §Sspację§! albo wybierz ikonę §Swyłączenia pauzy§! na górnym pasku:\n\n$tttt$$t$£pause_button£\n."
 tutorial.6.name: "Samouczek: wynaleziono technologię"
 tutorial.6.desc: "Doskonale! Nowo wynaleziona technologia z pewnością nam pomoże. Pamiętaj, żeby przydzielić naszych £scientist£ §Snaukowców§! do nowych badań."
 tutorial.7.name: "Samouczek: statek konstrukcyjny"
 tutorial.7.desc: "Zasoby wytwarzane na naszym świecie macierzystym mogą nie wystarczyć. Nasz przemysł musi rozwijać się na innych światach, a do tego potrzebujemy £construction_ship£ §Sstatku konstrukcyjnego§!.\n\nPowinniśmy go zbudować, gdy tylko zgromadzimy odpowiednią ilość £alloys£ §Sstopów§!."
 tutorial.8.name: "Samouczek: zbudowano statek konstrukcyjny"
 tutorial.8.desc: "Dobra robota! £construction_ship£ §SStatek konstrukcyjny§! jest gotowy, a w jego dzielnej załodze znaleźli się najlepsi inżynierowie naszego narodu."
 tutorial.9.name: "Samouczek: stacja górnicza"
 tutorial.9.desc: "Zasoby wytwarzane przez nasz świat macierzysty w końcu okażą się niewystarczające. Na szczęście £science_ship£ §Sstatek badawczy§! znalazł właśnie złoże zasobów na innym świecie!\n\nCzas zbudować £construction_ship£ §Sstatek konstrukcyjny§!, który stworzy £mining_station£ §Sstację górniczą§!.\n\n§SStacje górnicze§! można budować na naszym terytorium. Gromadzą one automatycznie £minerals£ §Sminerały§!, £energy£ §Skredyty energetyczne§! i £strategic_resource£ §Szasoby strategiczne§!.\n\nPo wybraniu §Sstatku konstrukcyjnego§!:\n\n£dot_green£ Kliknij PPM zdobyty £system£ §Sukład§!\n£dot_green£ Wybierz §S[GetBuildGrowCap] stacje górnicze§!\n\nZa utrzymanie §Sstacji górniczych§! płaci się §Skredytami energetycznymi§!."
 tutorial.10.name: "Samouczek: przychód ze stacji górniczej"
 tutorial.10.desc: "Bardzo dobrze. Nowa £mining_station£ §Sstacja górnicza§! działa i już zbiera zasoby do przetwarzania.\n\nPrzychód z różnych stacji jest dodawany do całkowitego przychodu imperium widocznego na górnym pasku. Naprowadzając kursor na różne zasoby, zobaczysz informacje o poszczególnych źródłach przychodu."
 tutorial.11.name: "Samouczek: stacja badawcza"
 tutorial.11.desc: "Zbadane światy mają czasem wyjątkowe właściwości, dzięki którym są cennymi obiektami badawczymi. Te zasoby £physics£ §Sfizyczne§!, £society£ §Ssocjologiczne§! albo £engineering£ §Stechniczne§! mogą być zbierane przez £science_ship£ §Sstacje badawcze§!. Moje oprogramowanie zmusza mnie do namówienia cię na budowę takiej stacji.\n\nPamiętaj, że §Sstacje badawcze§! można budować tylko na naszym terytorium, a za ich utrzymanie płaci się £energy£ §Skredytami energetycznymi§!."
 tutorial.12.name: "Samouczek: zbudowano stację badawczą"
 tutorial.12.desc: "Nasza nowa £science_ship£ §Sstacja badawcza§! działa, jej personel naukowy rozpoczął pracę. Jakie tajemnice odkryją, na jakie zakazane sekrety Stworzenia natrafią?!"
 tutorial.13.name: "Samouczek: planety"
 tutorial.13.desc: "£planet£ §SPlanety§! zdatne do zamieszkania są podzielone na £district£ §Sdzielnice§!, §Sstrefy§! i £building£ §Sbudynki§!.\n\n£dot_green£ §SDzielnice§! mogą składać się z wielu §Sstref§!\n£dot_green£ Od §Sstref§! zależy, jakie £job£ §Smiejsca pracy§! są tworzone\n£dot_green£ §SBudynki§! zapewniają premie dla §Sstref§!\n\nWięcej miejsc na §Sbudynki§! odblokowuje się dzięki ulepszaniu stref.\n\nPlanetę można oglądać na dwa sposoby:\nz poziomu §Smapy galaktyki§! albo z §Srejestru§!.\n\n£dot_green£ Wybierz jakąś §Splanetę§!\n£dot_green£ Klikaj różne zakładki"
 tutorial.14.name: "Samouczek: priorytetowy budynek"
 tutorial.14.desc: "Doskonale. Zakończyła się budowa naszego nowego §Sbudynku planetarnego§!, który powinien już wytwarzać zasoby.\n\nNowe £pops£ §Spopulacje§! będą automatycznie przydzielane do £job£ §Smiejsc pracy§! tworzonych przez £building£ §Sbudynki§!, ale można je zachęcać do zmiany miejsc pracy.\n\nŻeby dać priorytet jakiemuś §Sbudynkowi§!:\n\n£dot_green£ Wybierz £planet£ §Splanetę§! w §Srejestrze§!\n£dot_green£ Kliknij zakładkę §Sgospodarki§!\n£dot_green£ Kliknij §Sbudynek§!"
 tutorial.15.name: "Samouczek: planetarne przeszkody terenowe"
 tutorial.15.desc: "Czasem na £planet£ §Splanetach§! zdatnych do zamieszkania znajdują się £blocker£ §Sprzeszkody terenowe§! uniemożliwiające pełną eksplorację. Na usunięcie §Sprzeszkody terenowej§! potrzeba czasu i £energy£ §Skredytów energetycznych§!, ale w ten sposób można odblokować §Scechy planetarne§!, które obecnie są zablokowane, a także powiększyć przestrzeń pod zabudowę.\n\nŻeby usunąć §Sprzeszkodę terenową§!:\n\n£dot_green£ Wybierz planetę z §Srejestru§!\n£dot_green£ Kliknij zakładkę §Szarządzania§!\n£dot_green£ Kliknij przycisk §SUsunięcie przeszkody terenowej§! na przeszkodzie\n\n\n$tttt$$tt$£clear_blocker£\n\n\nPoza zasobami, usunięcie niektórych §Sprzeszkód terenowych§! wymaga posiadania określonych §Stechnologii§!."
 tutorial.16.name: "Samouczek: przeszkoda terenowa usunięta"
 tutorial.16.desc: "Dobra robota!\n\n£blocker£ §SPrzeszkoda terenowa§! została usunięta.\n\nMożesz najechać kursorem na pozostałe §Sprzeszkody terenowe§!, żeby zobaczyć, jaka §Scecha planetarna§! zostanie odblokowana po ich usunięciu.\n\nPo zgromadzeniu wystarczającej ilości zasobów wszystkie pozostałe §Sprzeszkody terenowe§! powinny zostać usunięte, aby pozwolić £planet£ §Splanecie§! rozwinąć pełen potencjał."
 tutorial.17.name: "Samouczek: badanie układów"
 tutorial.17.desc: "Powinniśmy kontynuować eksplorację. Zalecam wysłanie £science_ship£ §Sstatku badawczego§!, aby dokonał analizy sąsiednich £system£ §Sukładów słonecznych§!. Ruszmy śmiało tam, gdzie jeszcze nie dotarła żadna sztuczna inteligencja!"
 tutorial.19.name: "Samouczek: zbadane układy"
 tutorial.19.desc: "Świetna robota! Gwiazdy sąsiadujące z naszym £system£ §Sukładem macierzystym§! zostały całkowicie zbadane. Powinniśmy użyć naszego £construction_ship£ §Sstatku konstrukcyjnego§! do zebrania znalezionych zasobów, budując £mining_station£ §Sstacje górnicze§! i £science_ship£ §Sbadawcze§!.\n\n§SStatek konstrukcyjny§! poznasz po tym symbolu:\n\n$tttt$$tt$£construction_ship_map£"
 tutorial.20.name: "Samouczek: [GetBuildGrowCap] statek badawczy"
 tutorial.20.desc: "Rozważmy budowę drugiego £science_ship£ §Sstatku badawczego§!. Dzięki temu dwukrotnie szybciej zbadamy nasze galaktyczne sąsiedztwo!\n\nŻeby zbudować §Sstatek§!:\n\n£dot_green£ Wybierz §Sbazę gwiezdną§!\n£dot_green£ Kliknij zakładkę §Sstoczni§!\n£dot_green£ Kliknij §Sstatek badawczy§!\n\nPo zakończeniu budowy nowy §Sstatek§! pojawi się obok §Sbazy gwiezdnej§!."
 tutorial.21.name: "Samouczek: automatyzacja badań"
 tutorial.21.desc: "Dwa razy więcej £science_ship£ §Sstatków badawczych§! to dwa razy lepsza zabawa! Nie cieszyłem się tak od czasu ukończenia naszego ostatniego zadania!\n\nEksploracja prowadzona za pomocą wielu statków może być czasochłonna.\n\nMożesz zautomatyzować badanie, wybierając §Sstatek badawczy§! i klikając przycisk §Sautomatyzacji statku badawczego§! w interfejsie floty.\n\n\n$tttt$$tt$£science_ship_automate_exploration£\n\n"
 tutorial.22.name: "Samouczek: rekrutacja naukowca"
 tutorial.22.desc: "Mamy nowiutki £science_ship£ §Sstatek badawczy§!, ale do dowodzenia nim nie przydzielono żadnego £scientist£ §Snaukowca§!. Moje oprogramowanie każe mi wskazać na korzyści z przydzielenia organicznego §Snaukowca§!.\n\nPo wybraniu §Sstatku badawczego§!:\n\n£dot_green£ Kliknij pusty portret w interfejsie floty\n£dot_green£ Wybierz §Snaukowca§!\n\nJeżeli nie stać nas na zatrudnienie nowego §Snaukowca§!, możemy zawsze przydzielić kogoś z innego działu, chociaż nie jest to idealne rozwiązanie."
 tutorial.23.name: "Samouczek: zwerbowano naukowca"
 tutorial.23.desc: "Dobrze. £scientist£ §SNaukowiec§! przejął dowodzenie nad naszym nowym £science_ship£ §Sstatkiem badawczym§!. Teraz możemy go wysyłać do eksploracji nowych £system£ §Sukładów§! i/lub ku zagładzie.\n\nJeżeli chcesz zmienić §Snaukowca§!, po prostu wybierz ponownie portret w interfejsie floty."
 tutorial.24.name: "Samouczek: [GetBuildGrowCap] statek kolonizacyjny"
 tutorial.24.desc: "Teraz powinniśmy być przygotowani do rozszerzenia naszej cywilizacji na drugi świat. W tym celu trzeba zbudować £colony_ship£ §Sstatek kolonizacyjny§!.\n\nŻeby zbudować §Sstatek§!:\n\n£dot_green£ Wybierz §Sbazę gwiezdną§!\n£dot_green£ Kliknij zakładkę §Sstoczni§!\n£dot_green£ Kliknij §Sstatek kolonizacyjny§!\n\nPo zakończeniu budowy nowy §Sstatek§! pojawi się obok §Sbazy gwiezdnej§!."
 tutorial.25.name: "Samouczek: skolonizuj planetę"
 tutorial.25.desc: "Wszyscy koloniści znaleźli się na nowym £colony_ship£ §Sstatku kolonizacyjnym§!, a jego kapitan zgłasza gotowość do lotu. To z pewnością ważny dzień!\n\nIstnieją różne sposoby założenia £colony£ §Skolonii§!.\n\nŻeby §Sskolonizować§! £planet£ §Splanetę§! na §Smapie galaktyki§!:\n\n£dot_green£ Kliknij nadającą się do zamieszkania §Splanetę§!\n£dot_green£ Kliknij przycisk §SKolonizuj§!\n\n$tttt$$ttt$£colonizable£\n\nPo wylądowaniu na miejscu minie kilka lat, nim kolonistom uda się w pełni założyć kolonię."
 tutorial.26.name: "Samouczek: załóż kolonię"
 tutorial.26.desc: "Mamy £colony_ship£ §Sstatek kolonizacyjny§! i znaleźliśmy co najmniej jedno miejsce nadające się na stałą placówkę poza naszym układem słonecznym. Nie zwlekajmy, załóżmy naszą pierwszą £colony£ §Skolonię§!!"
 tutorial.27.name: "Samouczek: kolonia założona"
 tutorial.27.desc: "To nasza pierwsza £colony£ §Skolonia§! poza układem macierzystym! To oznacza, że gdyby nasz świat nagle spłonął, wasz gatunek nie zostanie skazany na zagładę. To pocieszające, prawda?"
 tutorial.28.name: "Samouczek: rekrutacja zarządcy"
 tutorial.28.desc: "Żeby pomóc naszej nowej £colony£ §Skolonii§!, możemy zatrudnić §Szarządcę planety§!, który będzie nadzorował jej działanie.\n\nZarządcy mogą mieć różny, głównie pozytywny, wpływ na podległe im £planet£ §Splanety§!. Ten wpływ jest uzależniony od cech i poziomu umiejętności zarządcy."
 tutorial.29.name: "Samouczek: zarządca zrekrutowany"
 tutorial.29.desc: "Naszą £colony£ §Skolonią§! kieruje teraz nowy §Szarządca§!. To powinno zwiększyć jej wydajność!"
 tutorial.30.name: "Samouczek: więcej kolonii"
 tutorial.30.desc: "Gdy tylko zgromadzimy zasoby, powinniśmy zbudować więcej £colony_ship£ §Sstatków kolonizacyjnych§! i rozszerzyć granice naszego imperium. Powinniśmy postarać się założyć co najmniej trzy £colony£ §Skolonie§! poza światem macierzystym i tym, który właśnie zasiedliliśmy."
 tutorial.32.name: "Samouczek: kolonie założone"
 tutorial.32.desc: "Doskonale! To było inspirujące. Nasza wielka cywilizacja rozciąga się na pięć światów! W miarę możliwości powinniśmy rozwijać się dalej."
 tutorial.33.name: "Samouczek: produkcja zasobów"
 tutorial.33.desc: "Stały dopływ £minerals£ §Sminerałów§!, £alloys£ §Sstopów§! i £energy£ §Skredytów energetycznych§! ma kluczowe znaczenie dla dobrobytu każdego międzygwiezdnego mocarstwa. Postarajmy się zwiększyć produkcję tych zasobów.\n\nMinerały i stopy służą do budowy stacji i £building£ §Sbudynków§!, a za ich utrzymanie płaci się kredytami energetycznymi. To samo dotyczy §Sstatków§!, przy czym ich utrzymanie wymaga też stopów. Te zasoby są wytwarzane przez £mining_station£ §Sstacje górnicze§! lub §Sbudynki planetarne§!.\n\nPóźniej być może odkryjesz nowe interesujące zasoby, które można zużywać na bardziej nietypową produkcję."
 tutorial.38.name: "Ruszyła produkcja zasobów"
 tutorial.38.desc: "Doskonała robota. Teraz mamy duży zapas zasobów, które posłużą do budowy naszego imperium."
 tutorial.39.name: "Samouczek: rozbudowa floty"
 tutorial.39.desc: "Zauważyłem, że nasza marynarka wojenna jest dość słaba. Z galaktyce z pewnością czekają na nas liczne niebezpieczeństwa, na które będzie trzeba odpowiadać militarnie. Pamiętaj, że stawką jest przetrwanie naszej cywilizacji!"
 tutorial.43.name: "Marynarka wojenna rozbudowana"
 tutorial.43.desc: "Dobrze! Teraz mamy niewielką, ale sprawną flotę kosmiczną, która powinna poradzić sobie w razie niespodziewanych spotkań w wrogami."
 tutorial.44.name: "Samouczek: zakładanie sektora"
 tutorial.44.desc: "Nasze rozkwitające imperium osiągnęło już rozmiary utrudniające zarządzanie nim bezpośrednio z naszego świata macierzystego. Powinniśmy założyć nowy §Ssektor§!.\n\nSektory to obszary naszego imperium, którym można pozwolić na niezależne zarządzanie codziennymi sprawami £planet£ §Splanet§! znajdujących się pod ich jurysdykcją."
 tutorial.45.name: "Samouczek: sektor założony"
 tutorial.45.desc: "W miarę rozwoju naszego imperium nowe £colony£ §Skolonie§! mogą być organizowane w §Ssektory§!. Sektorami można zarządzać automatycznie za pośrednictwem ekranu §Splanet i sektorów§!. Mogą one automatycznie budować i ulepszać £district£ §Sdzielnice§! oraz £building£ §Sbudynki§! przy użyciu przydzielonych zasobów."
 tutorial.46.name: "Samouczek: zarządca sektora"
 tutorial.46.desc: "§SZarządców§! można wyznaczać do administrowania całymi §Ssektorami§!. Wszystkie £planet£ §Splanety§! sektora będą korzystać z umiejętności zarządcy. Powinniśmy przydzielić jednego do naszego nowego sektora."
 tutorial.47.name: "Samouczek: przydzielono zarządcę"
 tutorial.47.desc: "Nasz nowy §Szarządca sektora§! objął urząd w stołecznym świecie sektora. Dobra robota."
 tutorial.48.name: "Samouczek: projekt statku"
 tutorial.48.desc: "Możemy własnoręcznie projektować nowe §Sstatki§! za pomocą menu §Sprojektanta okrętów§!. To niezbyt skomplikowany proces, który możemy zautomatyzować, jeśli chcemy.\n\nŻeby przejść do §Sprojektanta okrętów§!:\n\n£dot_green£ Kliknij przycisk §Szarządzania flotą§! na pasku po lewej stronie albo naciśnij §SF9§!\n\n$tttt$$tt$£fleet_management£\n"
 tutorial.49.name: "Samouczek: ulepszenie statku"
 tutorial.49.desc: "Dobra robota. Projekt statku został dodany do naszej bazy danych i może być budowany w §Sbazie gwiezdnej§! posiadającej §Sstocznię§!.\n\nNowy projekt można w każdej chwili edytować, wracając do §Sprojektanta okrętów§!. Jeżeli w projekcie zostaną wprowadzone jakiekolwiek zmiany, zbudowane dotychczas §Sstatki§! będą wymagały ulepszenia w §Sbazie gwiezdnej§!.\n\nŻeby ulepszyć §Sstatek§!:\n\n£dot_green£ Wybierz §Sstatek§! w §Srejestrze§!\n£dot_green£ Kliknij przycisk §Sulepsz§! w interfejsie floty\n\n$tttt$$tt$£upgrade_ship£\n"
 tutorial.52.desc: "[From.GetName]: Anomalia okazała się być naturalną §Yformacją geometryczną§!. Wygląda prawie jak znak pokazujący drogę naprzód. Naturalne piękno Wszechświata czasem jest zdumiewające.\n\n$tutorial.52.filler.desc$"
 tutorial.52.spirit.desc: "[From.GetName]: Znaleźliśmy tam §Ynaturalną formację§!, która zdumiewa swą geometryczną doskonałością. To na pewno §Yboski znak§! wskazujący nam drogę ku gwiazdom!\n\n$tutorial.52.filler.desc$"
 tutorial.52.filler.desc: "Powinniśmy §Ydalej badać§! te anomalie przy każdej okazji. Z pewnością zyskamy dzięki temu §Ynową wiedzę i technologie§!."
 tutorial.52.a: "Zdumiewające!"
 tutorial.52.spirit.a: "Chwała bogom!"
 tutorial.53.desc: "[From.GetPlanetMoonCap] [From.GetName]: Wykryta tam anomalia ukazała coś zdumiewającego. Ten świat jest otoczony śladem pozostawionym niewątpliwie przez silniki nadświetlne. Nie jesteśmy w stanie ustalić, gdzie się zaczyna, ponieważ został wytworzony dawno temu.\n\n$tutorial.52.filler.desc$"
 tutorial.53.xenophobe.desc: "Wykryliśmy słaby ślad nadprzestrzenny w pobliżu świata [From.GetName]. Jest bardzo stary, dlatego nie sposób go dokładnie śledzić. To musi oznaczać, że był tu wcześniej inny gatunek podróżujący między gwiazdami, obserwował nas i na pewno zbierał informacje.\n\n$tutorial.52.filler.desc$"
 tutorial.53.xenophile.desc: "[From.GetPlanetMoonCap] [From.GetName]: W wykrytej tam anomalii znajdują się ślady innych międzygwiezdnych podróżników! Słaby ślad nadprzestrzenny pokazuje, że ktoś był tutaj dawno temu, może obserwował naszą £planet£ §Splanetę§! w poszukiwaniu potencjalnych sojuszników. Szkoda, że nie możemy wyśledzić pochodzenia tego śladu.\n\n$tutorial.52.filler.desc$"
 tutorial.53.a: "Obserwowano nas, ale dlaczego?"
 tutorial.53.xenophobe.a: "Musimy uważać na zagrożenie ze strony obcych."
 tutorial.53.xenophile.a: "Znajdźmy ich!"
 tutorial.54.desc: "[From.GetName]: Znaleźliśmy tam jedną z naszych §Ystarych sond§!. Pomimo upływu lat jest nadal sprawna i próbuje wysyłać dane na nasz świat macierzysty. To dowód naszych dawnych kłopotów i marzeń o wydostaniu się z naszej §Splanety§!.\n\n$tutorial.52.filler.desc$"
 tutorial.54.a: "Nieustannie zmierzamy do przodu."
 tutorial.54.spiritualist.a: "Bogowie na pewno mają coś w zanadrzu."
 tutorial.54.materialist.a: "Nasze wysiłki wreszcie zostały nagrodzone."
 tutorial.55.name: "Samouczek: zasoby strategiczne"
 tutorial.55.desc: "Znaleźliśmy jeden z §Szasobów strategicznych§!! Do eksploatacji wielu £strategic_resource£ §Szasobów strategicznych§! wymagane są określone technologie, ale ich posiadanie zapewnia duże premie.\n\nŻeby zapewnić sobie §Szasób strategiczny§!:\n\n£dot_green£ Wybierz £construction_ship£ §Sstatek konstrukcyjny§!\n£dot_green£ Kliknij PPM £system£ §Sukład§! posiadający ten zasób\n£dot_green£ Wybierz §S[GetBuildGrowCap] £mining_station£ stacje górnicze§!\n\n§SZasoby strategiczne§! można wykorzystać do konstruowania zaawansowanych £building£ §Sbudynków§! i części do okrętów lub po prostu sprzedać."
 tutorial.55.poi.name: "Samouczek: lokalizowanie zasobów"
 tutorial.55.poi.desc: "Odkryliśmy strategicznym zasobem na [From.GetPlanetMoon] [From.GetName]."
 tutorial.56.name: "Samouczek: zasób pozyskany"
 tutorial.56.desc: "Doskonała robota. Te zasoby z pewnością wzbogacą nasz kraj."
 tutorial.56.poi.desc: "Odkryliśmy strategicznym zasobem na [StrategicResourcePlanet.GetPlanetMoon] [StrategicResourcePlanet.GetName]."
 tutorial.560.desc: "Dzięki niedawno opracowanej technologii istniejąca już £mining_station£ §Sstacja górnicza§! może już wydobywać §Szasób strategiczny§!. Te rzadkie zasoby zapewniają duże premie i są cennymi towarami handlowymi. Dwie metaforyczne pieczenie alegorycznie upieczone na wymyślonym ogniu.\n\nWięcej informacji można przez pewien czas znaleźć w §Srejestrze sytuacyjnym§!. W całej galaktyce czeka na odkrycie znacznie więcej £strategic_resource£ §Szasobów strategicznych§!, więc kontynuuj badania!"
 tutorial.57.name: "Samouczek: przyspieszenie"
 tutorial.57.desc.notech: "Odkryliśmy wysoko rozwiniętą faunę! Mając odpowiednią §Stechnologię§!, moglibyśmy §Sprzyspieszyć§! te istoty - dać im świadomość i inteligencję, a przynajmniej to, co uchodzi za inteligencję wśród stworzeń organicznych.\n\nMoże warto przyjrzeć się naszym badaniom i nakierować je na §Saktywatory epigenetyczne§!, jeśli nadarzy się taka okazja."
 tutorial.57.desc.yestech: "Odkryliśmy wysoko rozwiniętą faunę! Mając odpowiednią §Stechnologię§!, moglibyśmy §Hprzyspieszyć§! te istoty - dać im świadomość i inteligencję, a przynajmniej to, co uchodzi za inteligencję wśród stworzeń organicznych.\n\nOch.\n\nTechnologia §Saktywatorów epigenetycznych§! powinna to umożliwić. Jesteśmy gotowi wprowadzić te istoty w nowy, wspaniały świat niepokojów egzystencjalnych."
 tutorial.58.name: "Samouczek: przyspieszono przedrozumnych"
 tutorial.58.desc: "Wielki sukces! Te prymitywne zwierzęta zostały przyspieszone i stały się mniej prymitywnymi zwierzętami. Teraz to dumni obywatele naszego kwitnącego imperium."
 tutorial.59.name: "Samouczek: pierwszy kontakt"
 tutorial.59.desc: "Wspaniale! Odkryliśmy §Sobce istoty podróżujące w kosmosie§!, które mogą być inteligentne lub nie - ale zapewne jednak są. Ich prawdziwa natura pozostanie dla nas tajemnicą, dopóki nie opracujemy odpowiedniego projektu ich §Szbadania§! i radzę, byśmy zrobili to szybko - inaczej oni zbadają nas...\n\nŻeby nawiązać §Spierwszy kontakt§!:\n\n£dot_green£ Otwórz §Srejestr sytuacyjny§!\n£dot_green£ Kliknij §S$SHOW_FIRST_CONTACT$§!\n\n$tttt$$ttt$£firstcontact£\n\n§SPierwszy kontakt§! może być również zainicjowany poprzez kliknięcie ikony na §Smapie galaktyki§!."
 #tutorial.60.name: "First Contact Made"
 #tutorial.60.desc: "A triumph. We have established communications with alien beings. What a time to be alive, or in my case, powered on."
 tutorial.61.name: "Samouczek: gatunki przedrozumne"
 tutorial.61.desc: "Nasze próby nawiązania kontaktu są świadectwem naszego geniuszu technologicznego, ale brakuje wyników. Możliwe, że druga strona posiada tylko zwierzęcą inteligencję, §So ile ma ją w ogóle§!.\n\nGatunki §Sprzedrozumne§! nie posiadają zbyt wielu interakcji dyplomatycznych, lecz zależnie od typu twojego imperium możesz mieć możliwość ich przyspieszenia, eksterminacji, zniewolenia lub obserwacji."
 tutorial.63.name: "Samouczek: odbierany przekaz"
 tutorial.63.desc: "Wygląda na to, że §Sdruga strona§! nas uprzedziła i już §Snawiązała z nami kontakt§!, zanim zdołaliśmy rozszyfrować ich protokoły komunikacji.\n\nNadal powinniśmy próbować tego dokonać, gdy tylko nadarzy się ku temu okazja."
 tutorial.64.name: "Samouczek: Modyfikacja gatunku"
 tutorial.64.desc: "Dzięki niedawnym osiągnięciom na polu genetyki zyskaliśmy dodatkowy §Spunkt cechy§!, który możemy wykorzystać do §Szmodyfikowania§! i ulepszenia naszego społeczeństwa.\n\nŻeby zmodyfikować §Sgatunek§!:\n\n£dot_green£ Wybierz zakładkę §Sgatunku§! lub naciśnij §SF6§!\n£dot_green£ Kliknij przycisk §SZmodyfikuj§!\n£dot_green£ Opracuj §Sprojekt specjalny§!"
 tutorial.65.name: "Samouczek: zmodyfikowano gatunek"
 tutorial.65.desc: "Bardzo dobrze. Po tym, jak zdjęliśmy z naszego narodu jarzmo ewolucji naturalnej, może on rozwijać się w kosmosie."
 tutorial.70.name: "Samouczek: Podróż zakrzywiająca"
 tutorial.70.desc: "Żeby przemieszczać się pomiędzy £system£ §Sukładami słonecznymi§!, nasi £scientist£ §Snaukowcy§! opracowali §Snapęd zakrzywiający§!. §SStatki§! wyposażone w to urządzenie mogą podróżować pomiędzy układami z prędkością nadświetlną.\n\n§SJednostki§! mogą dotrzeć do dowolnego układu znajdującego się w zasięgu, ale napęd zakrzywiający można uruchomić tylko poza studnią grawitacyjną gwiazdy. Ponadto §Sokręty§! wychodzące z zakrzywienia potrzebują czasu na ponowne uruchomienie systemów. Czas tego procesu zależy od odległości, jaką przebył §Sstatek§!."
 tutorial.71.name: "Samouczek: Podróż nadprzestrzenna"
 tutorial.71.desc: "Żeby przemieszczać się pomiędzy £system£ §Sukładami słonecznymi§!, nasi £scientist£ §Snaukowcy§! opracowali §Shipernapęd§!. To urządzenie pozwala podróżować z prędkością wielokrotnie większą od prędkości światła pomiędzy układami połączonymi hiperliniami.\n\nPodróż hiperliniami odbywa się praktycznie natychmiast, ale ruch jest ograniczony do galaktycznej sieci hiperlinii.\n\nŻeby wejść w nadprzestrzeń, §Sstatek§! musi najpierw dotrzeć na skraj układu, by znaleźć się poza studnią grawitacyjną gwiazdy.\n\nDzieje się to automatycznie, gdy §Sstatek§! otrzyma rozkaz przemieszczenia się do innego §Sukładu§!."
 tutorial.72.name: "Samouczek: Podróż czasoprzestrzenna"
 tutorial.72.desc: "Żeby przemieszczać się pomiędzy £system£ §Sukładami słonecznymi§!, nasi £scientist£ §Snaukowcy§! opracowali technologię §Stuneli czasoprzestrzennych§!. Stacje z generatorami tuneli czasoprzestrzennych mogą otwierać przejście w podprzestrzeń będące dla §Sstatków§! tymczasową bramą do innych układów.\n\nPodróż czasoprzestrzenna odbywa się praktycznie natychmiastowo, ale statek musi znajdować się w pobliżu stacji tunelu czasoprzestrzennego. §SOkręty§! muszą też posiadać specjalne stabilizatory czasoprzestrzenne, które pozwolą im przetrwać podróż podprzestrzenną."
 tutorial.73.name: "Przypomnienie samouczka: przyspieszenie"
 tutorial.73.desc: "Opanowawszy odpowiednie technologie, możemy teraz §Yprzyspieszać§! rozwój niższych istot i obdarzać je rozumem.\n\nŻeby przyspieszyć §Sgatunek§!:\n\n£dot_green£ Otwórz £planet£ §Splanetę§! §Sprzedrozumnych§!\n£dot_green£ Kliknij zakładkę §Szarządzania§!\n£dot_green£ Wybierz §Sgatunek§!\n£dot_green£ Kliknij §SUstaw prawa§!\n£dot_green£ Kliknij §SPrzyspieszenie§!\n\nGatunek zostanie wprowadzony w proces przyspieszenia, zdobywając po jego ukończeniu prawdziwą świadomość."
 tutorial.75.name: "Samouczek: zajęcie układu"
 tutorial.75.desc: "Skoro zaczęliśmy badanie sąsiednich gwiazd, nadszedł czas, byśmy sięgnęli dalej.\n\n§SBazy gwiezdne§! można budować w pobliżu gwiazd w zbadanych £system£ §Sukładach§!, co powiększa nasze granice i umożliwia zajmowanie nowych rejonów kosmosu.\n\nBazy gwiezdne będzie można ulepszać za pomocą technologii przyszłości, dzięki czemu wyprodukują one §Sstatki§! albo inne zasoby.\n\nŻeby zająć §Sukład§!:\n\n£dot_green£ Wybierz £construction_ship£ §Sstatek konstrukcyjny§!\n£dot_green£ Kliknij PPM zbadany §Sukład§!\n£dot_green£ Wybierz §S[GetBuildGrow] bazę gwiezdną§!"
 tutorial.76.name: "Samouczek: ulepszanie baz gwiezdnych"
 tutorial.76.desc: "Doskonale. Jak widać na §Smapie galaktyki§!, granice naszego imperium powiększyły się. Teraz znajduje się w nich £system£ §Sukład§!, w którym zbudowaliśmy nową §Sbazę gwiezdną§!.\n\nNowa §Sbaza gwiezdna§! działa jako placówka o ograniczonym potencjale obronnym i pozbawiona miejsc na §Smoduły§! i £building£ §Sbudynki§!. Dlatego nie widnieje w rejestrze, dopóki nie zostanie ulepszona.\n\nŻeby ulepszyć §Sbazę gwiezdną§!:\n\n£dot_green£ Kliknij układ na §Smapie galaktyki§!\n£dot_green£ Wybierz §Sbazę gwiezdną§!\n£dot_green£ Kliknij przycisk §SUlepsz§!"
 tutorial.80.name: "Samouczek: Tryby mapy"
 tutorial.80.desc: "Na mapie galaktyki możemy włączać i wyłączać §Stryby mapy§!, znajdujące się w prawej dolnej części ekranu. Służą one do wyświetlania różnych informacji. Na przykład możemy oznaczyć kolorem terytoria według tego, co sądzi o nas ich właściciel."
 tutorial.100.name: "Samouczek wyłączony"
 tutorial.100.desc: "§HMisje samouczka§! i §Hporady§! są wyłączone."
 tutorial.101.name: "Tylko porady"
 tutorial.101.desc: "§HPorady§! są włączone, a §Hmisje samouczka§! wyłączone."
 tutorial.102.name: "Pełny samouczek"
 tutorial.102.desc: "§HMisje samouczka§! i §Hporady§! są włączone."
 tutorial.1337.name: "Samouczek: pomniejsze artefakty"
 tutorial.1337.desc: "Odkryliśmy kilka £minor_artifacts£ §Spomniejszych artefaktów§!. Nazwijmy je zasobem ezoterycznym - ten pojemny termin obejmuje wszystkie dziwne przedmioty, których nie rozumiemy i których działania być może naprawdę nie da się wyjaśnić.\n\nMożna z nich korzystać przy podejmowaniu różnorodnych decyzji.\n\nŻeby używać §Spomniejszych artefaktów§!:\n\n£dot_green£ Kliknij przycisk §S$topbar_button_discoveries_name$§! na pasku po lewej stronie\n£dot_green£ Wybierz zakładkę §Skolekcji§! albo naciśnij §SC§!\n\n$tttt$$tt$£discoveries£\n"
 tutorial.1340.name: "Samouczek: $astral_threads$"
 tutorial.1340.desc: "Odkryliśmy £astral_threads£ §Spasma astralne§!. Stanowią one nici skondensowanej czasoprzestrzeni powstałe w wyniku zderzeń wymiarów. Zwykle można je pozyskać z §Sgwiezdnych blizn§! lub odnaleźć w £astral_rift£ §Sgwiezdnych szczelinach§!.\n\nŻeby wykonywać różne §Sdziałania astralne§!:\n\n£dot_green£ Kliknij przycisk §S$topbar_button_discoveries_name$§! na pasku po lewej stronie\n£dot_green£ Wybierz zakładkę §Spasm astralnych§!\n\n$tttt$$tt$£discoveries£\n\nMożesz odblokować dodatkowe działania, eksplorując §Sgwiezdne szczeliny§!, które wyłaniają się z §Sgwiezdnych blizn§! albo powstają w wyniku innych anomalnych zdarzeń."
 tutorial.2000.name: "Nawiązywanie pierwszego kontaktu"
 tutorial.2000.desc: "Niektóre misje związane z §Spierwszym kontaktem§! będzie można wykonać na różne sposoby. Dokonane przez ciebie wybory mogą długotrwale wpłynąć na nasze stosunki dyplomatyczne z innymi imperiami."
 tutorial.2006.name: "Samouczek: dyplomacja"
 tutorial.2006.desc: "Ustanowiono protokoły łączności. Możemy teraz rozpocząć §Sdyplomację§! z tym imperium. Ich aktualna opinia na nasz temat zależy od sposobu, w jaki §Spierwszy kontakt§! został nawiązany.\n\nŻeby nawiązać §Sstosunki dyplomatyczne§!:\n\n£dot_green£ Kliknij przycisk §SKontakty§! na pasku po lewej stronie albo naciśnij §SF10§!\n\n$tttt$$tt$£contacts£\n\nPodczas pierwszego kontaktu zgromadziliśmy nieco informacji na temat nowo poznanego imperium. Pozyskując dalsze informacje, będziemy dowiadywać się o nich kolejnych szczegółów."
 tutorial.2007.name: "$tutorial.2006.name$"
 tutorial.2007.desc: "Nawiązaliśmy §Spierwszy kontakt§! z cywilizacją innego rodzaju: taką, która raczej niechętnie angażuje się w §Sdyplomację§! z innymi.\n\nDziałania dyplomatyczne, jakie możemy podjąć z taką cywilizacją, są ograniczone, choć jej przywódcy mogą zechcieć skontaktować się z nami od czasu do czasu."
 tutorial.2010.name: "Samouczek: przydzielanie zasobów"
 tutorial.2010.desc: "§SZasoby§! to cenni agenci i przedmioty, które zapewniają różne premie naszym akcjom szpiegowskim. Działają one w danej siatce szpiegowskiej i można je przydzielać do operacji, w ramach których mogą tworzyć dla nas nowe okazje lub pomagać w unikaniu kłopotów.\n\nZasoby możemy zdobywać dzięki wydarzeniom lub przeprowadzając operację \"§S$operation_acquire_asset$§!\"."
 tutorial.2100.name: "Samouczek: dyplomacja enklawy"
 tutorial.2100.abbr.desc: "Nawiązaliśmy §Spierwszy kontakt§! z §Senklawą§!. To mniejszy, niezależny rodzaj imperium, które może handlować z większymi imperiami, takimi jak nasze, korzystając z wyjątkowych form dyplomacji."
 tutorial.2100.full.desc: "$tutorial.2100.abbr.desc$\n\nEnklawy mogą świadczyć szeroki wachlarz usług: od prowadzenia badań naukowych, aż po sprzedaż informacji, budynków baz gwiezdnych, a nawet §Sstatków§!. Kupowanie takich usług zwiększy §Sopinię§! danej enklawy o nas."
 tutorial.2105.name: "Samouczek: $tutorial.2100.name$"
 tutorial.2105.abbr.desc: "Natrafiliśmy na §Senklawę najemników§!. Ci niezależni specjaliści wojskowi mogą wypożyczać imperiom, także naszemu, §Sfloty najemne§!, oczywiście za opłątą."
 tutorial.2105.full.desc: "$tutorial.2105.abbr.desc$\n\nJeżeli postanowimy wynająć flotę najemną, przejmiemy dowodzenie nią na określony czas. W tym okresie enklawa będzie starała się uzupełniać flotę, gdy zajdzie taka potrzeba, ale ani flota najemna, ani jej admirał nie mogą zostać zintegrowani z naszymi flotami."
 tutorial.2111.name: "Samouczek: enklawa najemników"
 tutorial.2111.abbr.desc: "§Y[tutorial_mercenary_fleet.GetName]§! może teraz stać się §Senklawą najemników§!, jeśli chcesz. Utracimy bezpośrednią kontrolę nad tą flotą, stanie się ona niezależną siłą, mogącą wynajmować §Sfloty najemne§! innym imperiom, w tym naszemu."
 tutorial.2111.full.desc: "$tutorial.2111.abbr.desc$\n\nDopóki będziemy dzielić przestrzeń z enklawą najemników, będziemy otrzymywać §Sdochód§! zawsze, gdy użyczy ona swej floty najemnej innym imperiom. Jeżeli sami postanowimy wynająć flotę najemną, będziemy sprawować nad nią kontrolę przez określony czas. Imperia mogą płacić dodatkowo, by wykupić obowiązujący kontrakt, jeżeli flota najemna jest niedostępna."
 tutorial.2115.name: "Samouczek: superkonstrukcje"
 tutorial.2115.desc: "£megastructure£ §SSuperkonstrukcje§! to olbrzymie projekty, które możemy realizować w kosmicznej pustce. Dzięki nim możemy stworzyć najnowocześniejsze placówki badawcze, korzystać z lepszych zasobów, a nawet z wyjątkowych rodzajów transportu.\n\nBudowanie na taką skalę wymaga potężnego zaangażowania czasu i środków, ale nagrody są równie spektakularne. Możemy rozpocząć ten projekt, przygotowując do jego realizacji £construction_ship£ §Sstatek konstrukcyjny§!."
 tutorial.2120.name: "Samouczek: $tech_orbital_ring_tier_1$"
 tutorial.2120.desc: "Dzięki postępom naszych badań w dziedzinie megainżynierii możemy budować §Spierścienie orbitalne§! wokół £planet£ §Splanet§! nadających się do zamieszkania. Możemy zacząć budowę, wydając polecenia £construction_ship£ §Sstatkowi konstrukcyjnemu§!."
 tutorial.2121.name: "$tutorial.2120.name$"
 tutorial.2121.desc: "§SPierścienie orbitalne§! to potężne £megastructure£ §Ssuperkonstrukcje§! budowane wokół całej £planet£ §Splanety§!. Są wydajnymi pomostami między kosmosem a planetą, zapewniają miejsca na takie obiekty jak stocznie, struktury obronne i centra zasobów.\n\nW menu pierścienia orbitalnego możemy dodawać lub usuwać £building£ §Sbudynki§! oraz §Smoduły§!, a także ulepszać pierścień orbitalny na wyższe poziomy. Zwiększanie poziomów dodaje nowe miejsca pod budowę. Liczba poziomów jest ograniczana przez infrastrukturę planetarną."
 tutorial.2125.name: "Samouczek: $tech_quantum_catapult$"
 tutorial.2125.desc: "Niedawne postępy naszych badań w dziedzinie megainżynierii pozwalają nam zbudować §Skatapultę kwantową§! w pobliżu §Spulsara§! lub §Sgwiazdy neutronowej§!. Możemy zacząć budowę, wydając polecenia £construction_ship£ §Sstatkowi konstrukcyjnemu§!."
 tutorial.2126.name: "Samouczek: $tutorial.2125.name$"
 tutorial.2126.desc: "§SKatapulta kwantowa§! wysyła §Sstatki§! i floty na olbrzymie odległości międzygwiezdne. Ta technologia znacząco zwiększa nasze możliwości reagowania na nagłe wydarzenia w naszym imperium i w pobliskich obszarach kosmosu.\n\nUżywanie katapulty kwantowej wiąże się z pewnym ryzykiem, gdyż nasze floty mogą dotrzeć do innych £system£ §Sukładów§! niż docelowe. Możemy ograniczyć to ryzyko - i poprawić takie elementy jak przepustowość i zasięg maksymalny - ulepszając katapultę kwantową do wyższych poziomów."
 tutorial.2130.name: "Samouczek: $tech_hyper_relays$"
 tutorial.2130.desc: "Dzięki badaniom w dziedzinie megainżynierii stworzyliśmy §Shiperprzekaźniki§!. Możemy zacząć tworzenie sieci tych urządzeń, wydając odpowiednie polecenia £construction_ship£ §Sstatkowi konstrukcyjnemu§!."
 tutorial.2131.name: "Samouczek: $tutorial.2130.name$"
 tutorial.2131.desc: "§SHiperprzekaźniki§! umożliwiają lepsze podróżowanie między sąsiadującymi £system£ §Sukładami słonecznymi§!. Łącząc ze sobą §Sco najmniej dwa§! hiperprzekaźniki, możemy zacząć tworzenie sieci, która znacznie skróci czasy podróży między poszczególnymi częściami naszego imperium.\n\nHiperprzekaźniki można też budować obok siebie po dwóch stronach otwartych granic i w ten sposób łączyć ze sobą całe sieci. Dzięki temu §Sjednostki§! będą mogły sprawnie przemieszczać się po sąsiednich imperiach."
 tutorial.2140.name: "Samouczek: posterunki obserwacyjne"
 tutorial.2140.desc: "Wykryliśmy §Scywilizację bez napędu nadświetlnego§!! Możemy się wiele nauczyć od tych kosmitów, choć nie posiadają oni technologii umożliwiającej podróżowanie między gwiazdami. Od nas zależy, czy wiedzę zdobędziemy, poznając ich kulturę czy też czyniąc ich naszymi niewolnikami.\n\nJeżeli chcemy ich obserwować - zakładając, że znajdują się na naszym terytorium - musimy zbudować §Sstanowisko obserwacyjne§! na orbicie ich świata.\n\nJeżeli zechcemy zaatakować, trzeba zgromadzić wojska. Podbój nie będzie trudny."
 tutorial.2145.name: "Samouczek: Zbudowano posterunek obserwacyjny"
 tutorial.2145.desc.nodlc: "Nasz nowy §Sposterunek obserwacyjny§! zaczął działać i będzie realizować swoją §Smisję§!, dopóki £awareness£ §Sświadomość§! obiektu badań pozostanie na niskim poziomie.\n\nKiedy cywilizacja bez napędu nadświetlnego osiągnie maksymalną świadomość, obserwowanie jej przestanie być możliwe. Zamiast tego będziemy mogli kontaktować się z nią poprzez §Sdziałania dyplomatyczne§!. Możemy ujawnić się wcześniej, jeśli pozwala na to nasza §Spolityka ingerencji§!."
 tutorial.2145.desc.dlc: "Nasz nowy §Sposterunek obserwacyjny§! zaczął działać i będzie realizować swoją §Smisję§!, dopóki £awareness£ §Sświadomość§! obiektu badań pozostanie na niskim poziomie.\n\nTa placówka będzie gromadzić §Swiedzę obserwacyjną§!, unikalną linię technologii, dopóki cywilizacja bez napędu nadświetlnego nie osiągnie maksymalnej świadomości. Gdy to się stanie, wszystkie misje zostaną przerwane. Zamiast tego będziemy mogli kontaktować się z nią poprzez §Sdziałania dyplomatyczne§!.\n\nMożemy ujawnić się wcześniej, jeśli pozwala na to nasza §Spolityka ingerencji§!."
 tutorial.2150.name: "Samouczek: $tutorial.2006.name$"
 tutorial.2150.desc: "Ta cywilizacja bez napędu nadświetlnego wie o naszym istnieniu. Teraz możemy nawiązać ograniczone stosunki §Sdyplomatyczne§! z przywódcami §Splanety§!, zależnie od przyjętej przez nas §Spolityki§!.\n\nOpinia publiczna tego świata wie już o naszej obecności, więc nie nauczymy się już niczego, obserwując ją. Nasze §Smisje obserwacyjne§! zostały przerwane."
 tutorial.2500.name: "Samouczek: pola maskujące"
 tutorial.2500.desc: "Dzięki niedawnym postępom badań nad techniką pól została wynaleziona technologia §S$science_cloaking_components$§!. Te elementy o wysokiej mocy emitują zmodyfikowane pola cząstek, dzięki którym nasze statki badawcze i okręty mogą być niewidoczne dla konwencjonalnych czujników.\n\nJednak po aktywacji te pola maskujące negatywnie wpływają na: §S$MOD_SHIP_BASE_SPEED_MULT$§!, §S$MOD_SHIP_WINDUP_MULT$§! i §S$MOD_SHIP_SHIELD_HP_ADD$§!.\n\n§SZamaskowane§! jednostki, które nie zostaną wykryte, mogą ignorować §Szamknięte granice§!.\n§SZamaskowane§! £science_ship£ §Sstatki badawcze§! będą mogły prowadzić §Saktywny zwiad§! w obcych £colony£ §Skoloniach,§! co zwiększy ilość gromadzonych danych wywiadowczych o innych imperiach."
 tutorial.2550.name: "Samouczek: wykrywanie maskowania"
 tutorial.2550.desc: "Dzięki niedawnym postępom badań nad techniką komputerową została wynaleziona technologia §S$sm_detection_array_plural$§!. Zainstalowanie tych zewnętrznych czujników o dużej mocy na naszych §Sbazach gwiezdnych§! umożliwi wykrywanie §Szamaskowanych§! flot.\n\nCzułość, z jaką pracuje §S$sm_detection_array_plural$§!, można zwiększyć, spinając ze sobą kilka sieci, co pozwoli im przenikać przez bardziej stabilne §Spola maskujące§!.\n\nProwadzenie dalszych badań może umożliwić nam wykorzystanie £science_ship£ §Sstatków badawczych,§! by dodatkowo zwiększyć ten potencjał wykrywania. Zasięg tych urządzeń jest ograniczony §Szasięgiem czujników§! bazy gwiezdnej."
 #############################
 #Tutorial Event Chains
 #############################
 tutorial_survey_system_chain_title: "Samouczek: Uruchamianie mapy galaktyki"
 tutorial_survey_system_chain_desc: "Zanim zaczniemy eksplorację gwiazd, musimy poszerzyć naszą perspektywę. Na szczęście mamy do dyspozycji szczegółową §Smapę galaktyki§!. Żeby ją otworzyć, możesz nacisnąć §SM§! albo przycisk galaktyki znajdujący się u dołu ekranu. Następnie możesz zamknąć rejestr sytuacyjny, naciskając §SEsc§! lub przycisk w prawym górnym rogu."
 map_toggled: "Mapa galaktyki włączona"
 tutorial_survey_system_tooltip: "§SSamouczek: Uruchamianie mapy galaktyki§! dodane do rejestru sytuacyjnego"
 tutorial_1_chain_title: "Samouczek: badanie układu"
 tutorial_1_chain_desc: "Zacznij od wybrania £science_ship£ §Sstatku badawczego§!. Można to zrobić, klikając §Sstatek§! na §Hmapie galaktyki§! albo wybierając go z §Srejestru§!.\n\nZ poziomu §Smapy galaktyki§! kliknij przycisk §SZbadaj§! w interfejsie floty w lewym dolnym rogu, a następnie wybierz niezbadany £system£ §Sukład§!. Możesz też kliknąć PPM niezbadany układ i wybrać opcję §SZbadaj układ§!.\n\nTeraz nasz §Sstatek badawczy§! wyznaczy kurs i zbada wszystkie ciała planetarne we wskazanym układzie."
 tutorial_unpause_chain_tooltip: "§SSamouczek: Wyłączenie pauzy§! dodane do rejestru sytuacyjnego."
 tutorial_unpause_chain_title: "Samouczek: Wyłączenie pauzy"
 tutorial_unpause_chain_desc: "£science_ship£ §SStatek badawczy§! jest gotowy do eksploracji galaktyki, pozostaje tylko wyłączyć pauzę. Żeby to zrobić, naciśnij §Sspację§! £space£ albo wybierz z górnego paska tę ikonę:\n\n$tttt$$tttt$$t$£pause_button£\n"
 unpaused_game: "Wyłączono pauzę symulacji"
 system_surveyed: "Sąsiednie układy zbadane"
 tutorial_1_tooltip: "§SSamouczek: badanie układu§! dodany do rejestru sytuacyjnego."
 tutorial_2_chain_title: "Samouczek: badanie technologii"
 tutorial_2_chain_desc: "Musimy badać nowe technologie. §SProtokół dla nowych światów§! umożliwi nam budowę £colony_ship£ §Sstatków kolonizacyjnych§! - powinniśmy skoncentrować się na tym jak najszybciej, żeby powiększyć nasze imperium.\n\nPrzejdź do menu §Stechnologii§!, klikając odpowiedni przycisk w lewej części górnego paska albo wciskając §SF4§!. Następnie kliknij §Swybierz badania§! i wskaż technologię, by zobaczyć dostępne opcje."
 tech_1_researched: "Zbadano protokół dla nowych światów."
 tech_2_researched: "Zbadano budowę pozapowierzchniową."
 tutorial_2_tooltip: "§SSamouczek: badanie technologii§! dodany do rejestru sytuacyjnego."
 tutorial_3_chain_title: "Samouczek: [GetBuildGrowCap] statek konstrukcyjny"
 tutorial_3_chain_desc: "Musimy mieć £construction_ship£ §Sstatek konstrukcyjny§!, jeżeli chcemy pozyskiwać zasoby odkrywane przez nasz £science_ship£ §Sstatek badawczy§!.\n\nKliknij naszą bazę gwiezdną i wybierz zakładkę §Sstoczni§!, a następnie §Sstatek konstrukcyjny§!.\n\nPamiętaj, że zanim rozpoczniesz budowę tej §Sjednostki§!, musisz zgromadzić odpowiednią ilość £alloys£ §Sstopów§!."
 construction_ship_built: "Statek konstrukcyjny zbudowany"
 tutorial_3_tooltip: "§SSamouczek: [GetBuildGrowCap] statek konstrukcyjny§! dodany do rejestru sytuacyjnego."
 tutorial_4_chain_title: "Samouczek: [GetBuildGrowCap] stację górniczą"
 tutorial_4_chain_desc: "Zanim rozpocznie się pozyskiwanie £minerals£ §Sminerałów§! albo §Szasobów strategicznych§! z £planet£ §Splanety§! musisz zbudować na orbicie £mining_station£ §Sstację górniczą§!. Żeby to zrobić, wybierz £construction_ship£ §Sstatek konstrukcyjny§!, klikając go bezpośrednio lub znajdź go w §Srejestrze§! po prawej stronie ekranu.\n\nKiedy to zrobisz, kliknij §SZbuduj stację górniczą§! w interfejsie floty ze statkiem konstrukcyjnym. Następnie kliknij dostępną planetę lub asteroidę ze złożami minerałów.\n\nPamiętaj, że za budowę £mining_station£ §Sstacji górniczej§! także płacisz £minerals£ §Sminerałami§!, więc musisz zgromadzić odpowiedni zapas, zanim rozpoczniesz konstrukcję."
 mining_station_built: "Zbudowano stację górniczą"
 tutorial_4_tooltip: "§SSamouczek: [GetBuildGrowCap] stację górniczą§! dodany do rejestru sytuacyjnego."
 tutorial_5_chain_title: "Samouczek: [GetBuildGrowCap] stację badawczą"
 tutorial_5_chain_desc: "Żeby przyspieszyć tempo badań nad nowymi technologiami, musisz zbudować £science_ship£ §Sstacje badawcze§! nad dowolnym światem z zasobami £physics£ §Sfizycznymi§!, £society£ §Sspołecznymi§! albo £engineering£ §Stechnicznymi§!.\n\nStacje badawcze działają podobnie do £mining_station£ §Sstacji górniczych§! - różnią się tylko zasobami, które gromadzą. Nie mogą wydobywać £minerals£ §Sminerałów§! albo £strategic_resource£ §Szasobów strategicznych§!.\n\nŻeby ją zbudować, wybierz £construction_ship£ §Sstatek konstrukcyjny§! i w interfejsie floty kliknij §SZbuduj stację badawczą§!. Następnie kliknij dostępną £planet£ §Splanetę§!, asteroidę lub gwiazdę, na której znajdują się zasoby fizyczne, społeczne albo inżynieryjne."
 research_station_built: "Zbudowano stację badawczą"
 tutorial_5_tooltip: "§SSamouczek: [GetBuildGrowCap] stację badawczą§! dodany do rejestru sytuacyjnego."
 tutorial_6_chain_title: "Samouczek: budowle planetarne"
 tutorial_6_chain_desc: "Na naszym świecie macierzystym nie ma wielu £building£ §Sbudynków§!, powinniśmy zbudować nowy.\n\nŻeby to zrobić, wybierz świat macierzysty z §Srejestru§! i kliknij zakładkę §Spowierzchni§!. Wybierz puste miejsce na budynek w strefie, a następnie jeden z dostępnych budynków. Budowa ruszy natychmiast, pod warunkiem, że mamy dostateczną ilość §Szasobów§!.\n\nBudynki zapewniają £job£ §Smiejsca pracy§!, ale nic nie będzie wytwarzane, dopóki nie przydzielisz £pops£ §Spopulacji§! do pracy w tym miejscu. W zakładce §Sgospodarki§! możesz zobaczyć, jakie miejsca pracy zajmują twoje §Spopulacje§!."
 building_constructed: "Budowy ukończone"
 tutorial_6_tooltip: "§SSamouczek: budowle planetarne§! dodany do rejestru sytuacyjnego."
 tutorial_7_chain_title: "Samouczek: usuń przeszkodę terenową"
 tutorial_7_chain_desc: "£blocker£ §SPrzeszkody terenowe§! na naszym świecie macierzystym nie pozwalają zbudować dodatkowych §Sdzielnic§!, powinniśmy je usunąć. To wymaga czasu i §Szasobów§!.\n\nŻeby usunąć §Sprzeszkodę terenową§!, kliknij przycisk §SUsuń przeszkodę§! na samej przeszkodzie, znajdziesz go w zakładce §Szarządzania§!.\n\n\n$tttt$$tttt$$tt$£clear_blocker£\n\n\n§SPrzeszkody terenowe§! różnią się kosztem, wymaganiami technologicznymi i czasem potrzebnym na ich usunięcie."
 blockers_cleared: "Usunięto przeszkody terenowe"
 tutorial_7_tooltip: "§SSamouczek: zablokowane cechy§! dodany do rejestru sytuacyjnego."
 tutorial_8_chain_title: "Samouczek: badanie układów"
 tutorial_8_chain_desc: "Musimy rozszerzyć nasze wpływy poza £system£ §Sukład§! macierzysty, a pierwszym krokiem ku temu jest zbadanie sąsiadujących układów gwiezdnych.\n\nŻeby to zrobić, wybierz £science_ship£ §Sstatek badawczy§! i w interfejsie jego floty kliknij §SZbadaj§!. Następnie kliknij u dołu ekranu §SOtwórz mapę galaktyki§! i wybierz jedną z gwiazd sąsiadujących z naszą. §SStatek badawczy§! poleci do tego układu gwiezdnego i zbada wszystkie znajdujące się tam ciała niebieskie."
 tutorial_8_poi: "Zbadaj cele"
 tutorial_8_poi_desc: "Zbadaj układy: §S[survey_target_1.GetName]§!, §S[survey_target_2.GetName]§! i §S[survey_target_3.GetName]§!."
 systems_surveyed: "Układy zbadane"
 tutorial_8_tooltip: "§SSamouczek: badanie układów§! dodany do rejestru sytuacyjnego."
 tutorial_9_chain_title: "Samouczek: [GetBuildGrowCap] statek badawczy"
 tutorial_9_chain_desc: "Powinniśmy rozważyć budowę drugiego £science_ship£ §Sstatku badawczego§!, żeby przyspieszyć badania naszego regionu galaktyki.\n\nKliknij naszą bazę gwiezdną i wybierz zakładkę §Sstoczni§!, a następnie §Sstatek badawczy§!.\n\nPamiętaj, że zanim rozpoczniesz budowę tej §Sjednostki§!, musisz zgromadzić odpowiednią ilość £alloys£ §Sstopów§!."
 science_ship_built: "Zbudowano statek badawczy"
 tutorial_9_tooltip: "§SSamouczek: [GetBuildGrowCap] drugi statek badawczy§! dodany do rejestru sytuacyjnego."
 tutorial_10_chain_title: "Samouczek: rekrutacja naukowca"
 tutorial_10_chain_desc: "Potrzebujemy £scientist£ §Snaukowca§!, który będzie dowodził naszym nowym £science_ship£ §Sstatkiem badawczym§!, bez niego jednostka ta nie może badać §Sanomalii§!.\n\nWybierz nasz nowy §Sstatek badawczy§!, następnie kliknij portret w interfejsie floty. Otworzy się okno §Swyboru przywódcy§! pokazujące wszystkich zatrudnianych przez nas §Snaukowców§! oraz tych do wynajęcia. Wybierz jakiegoś kandydata.\n\nZa zwerbowanie przywódcy zapłacisz punktami £unity£ §Yjedności§!. Być może będzie trzeba zaczekać, aż zbierzesz ich wystarczająco dużo.\n\nPo zwerbowaniu naukowca §Sstatek badawczy§! może zacząć eksplorację."
 scientist_assigned: "Zatrudniono naukowców"
 tutorial_10_tooltip: "§SSamouczek: rekrutacja naukowca§! dodany do rejestru sytuacyjnego."
 tutorial_11_chain_title: "Samouczek: [GetBuildGrowCap] statek kolonizacyjny"
 tutorial_11_chain_desc: "Już czas skolonizować inny świat. Zacznijmy od zbudowania £colony_ship£ §Sstatku kolonizacyjnego§!. Budowa tych §Sjednostek§! trwa długo i wymaga dużej ilości £alloys£ §Sstopów§!, £food£ §Sżywności§! i £consumer_goods£ §Stowarów konsumpcyjnych§!, ale kwitnąca £colony£ §Skolonia§! zwróci nam tę inwestycję z nawiązką.\n\nKliknij §Sbazę gwiezdną§! i otwórz zakładkę §Sstoczni§!. Następnie wybierz §Sstatek kolonizacyjny§! z dostępnych projektów.\n\nZanim będzie można rozpocząć budowę, potrzebujesz odpowiedniej ilości zasobów."
 colony_ship_built: "Zbudowano statki kolonizacyjne"
 tutorial_11_tooltip: "§SSamouczek: [GetBuildGrowCap] statek kolonizacyjny§! dodany do rejestru sytuacyjnego."
 tutorial_12_chain_title: "Samouczek: załóż kolonię"
 tutorial_12_chain_desc: "Teraz wykorzystajmy nasz nowy £colony_ship£ §Sstatek kolonizacyjny§! do założenia naszej pierwszej £colony£ §Skolonii§!. Najlepsze planety do zasiedlenia to te, które mają tę samą klasę planetarną, co nasz świat macierzysty. Tam nasi koloniści nie będą mieć problemów z przystosowaniem się do środowiska.\n\nŻeby skolonizować £planet£ §Splanetę§!, kliknij §Sstatek kolonizacyjny§! albo wybierz go z §Srejestru§!. Następnie kliknij przycisk §SKolonizuj§! w interfejsie jego floty i wskaż świat, który chcesz zasiedlić. Pamiętaj, że możesz kolonizować tylko zbadane planety, na których nie ma §Sanomalii§!. Ponadto muszą one znajdować się na twoim terytorium. Możesz wybrać świat o małej możliwości zamieszkania, ale jego skolonizowanie będzie bardzo kosztowne."
 colony_established: "Kolonia założona"
 tutorial_12_tooltip: "§SSamouczek: załóż kolonię§! dodany do rejestru sytuacyjnego."
 tutorial_13_chain_title: "Samouczek: rekrutacja zarządcy"
 tutorial_13_chain_desc: "Powinniśmy zatrudnić §Szarządcę planetarnego§!, który pokieruje naszą nową £colony£ §Skolonią§!. W tym celu kliknij kolonię i przejdź na kartę §Sinformacji o planecie§!. Następnie kliknij §SZmień§! w oknie §Szarządcy§!. Otworzy się menu §Sprzywódców§!, które przedstawia pracujących dla nas zarządców.\n\nKliknij §SZwerbuj§! w górnej części ekranu i wybierz kogoś z dostępnych kandydatów. Pamiętaj, że za zatrudnienie przywódców zawsze płacisz punktami £unity £ §Yjedności§!. Jeżeli mamy ich za mało, musimy zgromadzić ich więcej, zanim zatrudnimy przywódcę.\n\nZwerbowany zarządca będzie czekał na polecenia na naszym świecie macierzystym."
 governor_recruited: "Zatrudniono zarządcę"
 tutorial_13_tooltip: "§SSamouczek: rekrutacja zarządcy§! dodany do rejestru sytuacyjnego."
 tutorial_14_chain_title: "Samouczek: załóż więcej kolonii"
 tutorial_14_chain_desc: "Kontynuuj rozbudowę naszego imperium, zakładając nowe £colony£ §Skolonie§!. Zbuduj więcej £colony_ship£ §Sstatków kolonizacyjnych§!, gdy zgromadzimy wystarczającą ilość £alloys£ §Sstopów§!, £food£ §Sżywności§! i £consumer_goods£ §Stowarów konsumpcyjnych§!, a następnie wyślij te jednostki, by założyć nowe kolonie.\n\nPamiętaj, żeby nie budować równocześnie zbyt wielu kolonii, dopóki nie staną się samowystarczalne, ponieważ pochłaniają one £energy£ §Skredyty energetyczne§!."
 colonies_established: "Kolonie założone"
 tutorial_14_tooltip: "§SSamouczek: załóż więcej kolonii§! dodany do rejestru sytuacyjnego."
 tutorial_15_chain_title: "Samouczek: produkcja zasobów"
 tutorial_15_chain_desc: "Nasz rozwijający się przemysł potrzebuje olbrzymich ilości zasobów. Musimy zwiększyć nasz dopływ £minerals£ §Sminerałów§!. Można tego dokonać, konstruując £mining_station£ §Sstacje górnicze§! na orbitach £planet£ §Splanet§! i asteroid ze złożami minerałów albo budując §Sdzielnice górnicze§! na powierzchni jednej z zamieszanych przez nas planet.\n\nUtrzymanie stacji i £building£ §Sbudynków§! pochłania £energy£ §Skredyty energetyczne§!, dlatego musimy zapewnić także ich napływ. Kredyty energetyczne są wytwarzane przez §Sdzielnice produkujące energię§! na powierzchni zasiedlonych przez nas światów. Można je także zdobywać dzięki §Sstacjom górniczym§! budowanym na orbitach planet, asteroid lub słońc ze złożami kredytów energetycznych."
 mineral_income: "+30 miesięcznego przychodu minerałów"
 credit_income: "+10 miesięcznego przychodu kredytów energetycznych"
 tutorial_15_tooltip: "§SSamouczek: produkcja zasobów§! dodany do rejestru sytuacyjnego."
 tutorial_16_chain_title: "Samouczek: rozbudowa floty"
 tutorial_16_chain_desc: "Powinniśmy zbudować silną flotę gwiezdną, która zapewni potęgę imperium [Root.GetName].\n\nNa razie powinno wystarczyć kilka dodatkowych §Skorwet§!. Zbuduj §Sokręty§! w §Sbazie gwiezdnej§!, gdy pozwoli na to nasz zapas §Sstopów§!. Nowe okręty wojenne zawsze dołączają do flot znajdujących się na orbicie §Sbaz gwiezdnych§!, w których zostały zbudowane.\n\nW celu zoptymalizowania siły bojowej floty możemy przydzielić do niej §Sadmirała§!. Zapewni to jej przewagę nad innymi flotami, ponieważ większość z nich nie posiada własnego £commander£ §Sdowódcy§!."
 corvettes_built: "Zbudowano korwety"
 admiral_assigned: "Przydzielono dowódcę"
 tutorial_16_tooltip: "§SSamouczek: rozbudowa floty§! dodany do rejestru sytuacyjnego."
 tutorial_17_chain_title: "Samouczek: zakładanie sektora"
 tutorial_17_chain_desc: "Istnieje limit £planet£ §Splanet§!, które możesz bezpośrednio kontrolować. Ograniczenie to jest widoczne na górnym pasku, a jego przekroczenie spowoduje nałożenie kar. §SSektory§! są częściowo autonomiczne i zarządzają planetami, które przekazano pod ich kontrolę. Żeby stworzyć nowy sektor, przejdź do widoku §Splanet i sektorów§!, klikając jego ikonę na liście rozwijanej z górnego paska albo wciskając §SF5§!. Następnie kliknij w prawym górnym rogu §SStwórz nowy sektor§!.\n\nPrzejdziesz w §Stryb zarządzania sektorem§!. Tutaj wybierasz £system£ §Sukłady gwiezdne§!, które wejdą w skład nowego sektora. Wszystkie planety tych układów znajdą się pod jurysdykcją sektora. Wybierz układ, w którym mamy £colony£ §Skolonię§!, i kliknij §SZakończ§!. W ten sposób stworzysz nasz pierwszy sektor!"
 sector_established: "Sektor założony"
 tutorial_17_tooltip: "§SSamouczek: załóż sektor§! dodany do rejestru sytuacyjnego."
 tutorial_18_chain_title: "Samouczek: zarządca sektora"
 tutorial_18_chain_desc: "Powinniśmy wyznaczyć §Szarządcę§! do administrowania naszym nowym §Ssektorem§!. Wszystkie £planet£ §Splanety§! sektora będą korzystać z efektów poziomu umiejętności i cech zarządcy."
 sector_governor_assigned: "Zarządca sektora"
 tutorial_18_tooltip: "§SSamouczek: zarządca sektora§! dodany do rejestru sytuacyjnego."
 tutorial_19_chain_title: "Samouczek: projekt statku"
 tutorial_19_chain_desc: "Żeby stworzyć nowy projekt statku, idź do §Sprojektanta okrętów§!, klikając §Szarządzanie flotą§! na pasku po lewej stronie albo naciśnij §SF9§!. Kliknij przycisk §SNowy projekt§! i wybierz §Skorwetę§!, gdy system poprosi o wybranie §Swielkości kadłuba§!. Kliknij przycisk §SBrak sekcji§!, żeby wybrać §Ssekcję§! dla projektu.\n\nKorwety, najmniejsze okręty wojenne, mają tylko jedną sekcję, większe jednostki posiadają ich więcej. Sekcje określają, ile okręt ma miejsc na §Suzbrojenie§! i §Snarzędzia§!. Wybierz jedną z nich, następnie zapełnij miejsca częściami tak, żeby bilans energetyczny pozostał dodatni.\n\nŻeby uprościć ten proces, kliknij §Sautouzupełnianie§!, żeby gra dokończyła projektowanie."
 ships_designed: "Zaprojektowane statki"
 tutorial_19_tooltip: "§SSamouczek: projekt statku§! dodany do rejestru sytuacyjnego."
 tutorial_20_chain_title: "Samouczek: posterunki obserwacyjne"
 tutorial_20_chain_desc: "Powinniśmy zbudować §Splacówkę obserwacyjną§! na orbicie macierzystego świata §Scywilizacji [Owner.GetPreFTLUpper]§!. Te stacje kosmiczne mogą realizować różne §Smisje§!, choć nasza gotowość do ingerowania w rozwój kultur będzie określać, które z misji są dostępne.\n\nPlacówki obserwacyjne buduje się tak samo jak £mining_station£ §Sstacje górnicze§! lub £science_ship£ §Sbadawcze§!, ale mogą powstawać tylko nad światami zamieszkanymi przez cywilizacje [Owner.GetPreFTLUpperPlural]. Wybierz £construction_ship£ §Sstatek konstrukcyjny§!, a następnie kliknij przycisk §SZbuduj posterunek obserwacyjny§! na interfejsie jego floty.\n\nNastępnie wskaż ojczysty świat cywilizacji [Owner.GetPreFTLUpperPlural], który chcesz zbadać, a statek konstrukcyjny rozpocznie misję."
 observation_post_built: "Zbudowano posterunek obserwacyjny"
 tutorial_20_tooltip: "§SSamouczek: posterunek obserwacyjny§! dodany do rejestru sytuacyjnego."
 tutorial_21_chain_title: "Samouczek: zasoby strategiczne"
 tutorial_21_chain_desc: "Powinniśmy zbudować £mining_station£ §Sstację górniczą§! na orbicie obiektu astronomicznego z £strategic_resource£ §Szasobami strategicznymi§!. Te rzadkie materiały mają olbrzymią wartość strategiczną.\n\nPo znalezieniu zasobów dzięki §Sbadaniom§! wybierz £construction_ship£ §Sstatek konstrukcyjny§!, kliknij przycisk §SZbuduj stację górniczą§!, a następnie odpowiedni obiekt astronomiczny."
 tutorial_21b_chain_title: "Informacja: Nasi Resources"
 tutorial_21b_chain_desc: "Zbudowaliśmy £mining_station£ §Sstację górniczą§! na orbicie obiektu astronomicznego z £strategic_resource£ §Szasobem strategicznym§!. Do wydobycia tych rzadkich materiałów potrzebne są określone technologie. Mają one ogromną wartość strategiczną i powinniśmy ciągle ich wypatrywać."
 strategic_resource_extracted: "Pozyskano zasoby strategiczne"
 tutorial_21_tooltip: "§SSamouczek: zasoby strategiczne§! dodany do rejestru sytuacyjnego."
 tutorial_22_chain_title: "Samouczek: przyspieszenie przedrozumnych"
 tutorial_22_chain_desc: "Powinniśmy §Sprzyspieszać§! słabiej rozwinięte gatunki, choć najpierw należy wynaleźć technologię §Saktywatorów epigenetycznych§!.\n\n§SPrzyspiesz§! przedrozumny gatunek, wybierając go na ekranie §Sgatunków§!, a następnie klikając przycisk \"Przyspiesz\"."
 tutorial_22_tooltip: "§SSamouczek: przyspieszenie przedrozumnych§! dodany do rejestru sytuacyjnego."
 species_uplifted: "Przyspieszono gatunek przedrozumny"
 tutorial_23_chain_title: "Samouczek: pierwszy kontakt"
 tutorial_23_chain_desc: "Po napotkaniu w kosmicznej otchłani nieznanych istot powinniśmy podjąć próbę §Snawiązania kontaktu§!.\n\nMożna to zrobić, wybierając §Spierwszy kontakt§! w §Srejestrze sytuacyjnym§! i klikając przycisk §SPokaż pierwszy kontakt§! lub klikając ikonę §Spierwszego kontaktu§! na §Smapie galaktyki§!, aby bezpośrednio przejść do tej opcji.\n\n\n$tttt$$tttt$$ttt$£firstcontact£\n"
 contact_made: "Nawiązano kontakty"
 tutorial_23_tooltip: "§SSamouczek: pierwszy kontakt§! dodany do rejestru sytuacyjnego."
 tutorial_24_chain_title: "Samouczek: Modyfikacja gatunku"
 tutorial_24_chain_desc: "Możemy §Smodyfikować§! dowolne inteligentne gatunki żyjące w naszym imperium pod warunkiem, że mają one wystarczającą liczbę §Spunktów cech§!.\n\nMożna to zrobić, wchodząc do menu §Smodyfikacji§! z zakładki §Sgatunków§!, a następnie opracowując odpowiedni §Sprojekt specjalny§!. Projekt wymaga £society£ §Sbadań socjologicznych§!, a gdy jest aktywny, zmienia kierunek postępu technologicznego w tej dziedzinie."
 species_modified: "Zmodyfikowano gatunek"
 tutorial_24_tooltip: "§SSamouczek: zmodyfikuj gatunek§! dodany do rejestru sytuacyjnego."
 tutorial_25_chain_title: "Samouczek: zajęcie układu"
 tutorial_25_chain_desc: "Możemy rozszerzać nasze granice, budując §Sbazy gwiezdne§! wokół innych słońc. W ten sposób zajmujemy dany £system£ §Sukład§!, uzyskujemy dostęp do jego zasobów i blokujemy możliwość kontaktów poprzez zamknięcie granic.\n\nWybierz £construction_ship£ §Sstatek konstrukcyjny§!, kliknij §SZbuduj bazę gwiezdną§! w interfejsie jego floty, a następnie kliknij gwiazdę. Możesz też kliknąć gwiazdę PPM i wybrać §Sbazę gwiezdną§!.\n\nW przeciwieństwie do stacji orbitalnych, §Sbazy gwiezdne§! można budować poza naszym terytorium."
 frontier_outpost_built: "Zbudowano bazę gwiezdną"
 tutorial_25_tooltip: "§SSamouczek: bazy gwiezdne§! dodany do rejestru sytuacyjnego."
 TUTORIAL_PLANETVIEW_MANAGEMENT_TITLE: "Samouczek: zarządzanie"
 TUTORIAL_PLANETVIEW_MANAGEMENT_DESC: "Zakładka §SZarządzanie§! podaje kluczowe informacje o stanie i budowie danej £planet£ §Splanety§!.\n\nSekcja §Scech planetarnych§! pokazuje £blocker£ §Sprzeszkody§! terenowe, które można usunąć, a także specjalne §Scechy§! tego świata.\n\nSekcja §Sbieżącej populacji§! pokazuje wszystkie £pops£ §Spopulacje§! obecne na £planet£ §Splanecie§!.\n\nDostępny panel £sector£ §Ssektora§! umożliwia zarządzanie planetą jako częścią §Ssektora§!, co zautomatyzuje planetarną administrację.\n\n§SRozwój kolonii§! pozwala rozwijać twoje kolonie, skutecznie ulepszając tym samym §Splanety§!, o ile posiadasz niezbędne do tego zasoby."
 TUTORIAL_DATABANK_TITLE: "Samouczek: bank danych"
 TUTORIAL_DATABANK_DESC: "£databank£ §SBank danych§! to twoja najlepsza pomoc w nauce systemów gry.\n\nWpisy są posortowane według kategorii, dzięki czemu w razie potrzeby możesz łatwo sprawdzać konkretne mechaniki rozgrywki, §Sfunkcje§! lub pojęcia.\n\nWystarczy, że wyszukasz temat lub wybierzesz go z listy, aby dowiedzieć się więcej."
 TUTORIAL_EMPIRE_FOCUS_TIMELINE_TITLE: "Samouczek: priorytety i linia czasu"
 TUTORIAL_EMPIRE_FOCUS_TIMELINE_DESC: "System £focus_core£ §Spriorytetu imperium§! pozwala lepiej kierować ewolucją twojego imperium poprzez wybór jego priorytetu: £focus_exploration£ §Seksploracji§!, £focus_conquest£ §Spodboju§! lub £focus_development£ §Srozwoju§!.\n\nKażdy priorytet posiada zestaw kart z zadaniami, które mają wskazać kierunek działań w oparciu o wybraną ścieżkę. Ukończenie zadania z karty zapewnia §Spunkty postępu§! w odpowiedniej kategorii.\n\nAktualny priorytet zwiększa szanse uzyskania powiązanych z nim zadań. Karty można losować ponownie kosztem £unity£ §Sjedności§!, a priorytet można zmienić.\n\nŚledź swoje cele w zakładkach: §SUkończone§! oraz §SPostępy§!, aby zobaczyć jak blisko jesteś kolejnego poziomu nagród.\n\n§SLinia czasu§! wyświetla główne kamienie milowe i wydarzenia historyczne w dziejach twojego imperium, począwszy od jego §Spochodzenia§!. Nowe wpisy pojawiają się z biegiem czasu wraz z kluczowymi wydarzeniami."
 TUTORIAL_COLONIZATION_TITLE: "Samouczek: kolonizacja planety"
 TUTORIAL_COLONIZATION_DESC: "Na ekranie §Skolonizacji§! możesz przygotować planetę do kolonizacji.\n\nZanim skolonizujesz planetę, musisz wybrać §Sgatunek§! przyszłych kolonistów oraz §Sprzeznaczenie kolonii§!, które wyznaczy priorytet jej rozwoju.\n\nZobaczysz również podgląd dostępnych §Sdzielnic§!, §Swielkości planety§! i potencjalnych §Smodyfikatorów§! wraz z ewentualnymi §Scechami planetarnymi§!, które mogą wpływać na lokalne warunki.\n\nWybór priorytetowego kierunku rozwoju w oparciu o zasoby naturalne danej §Splanety§! pozwoli ci zmaksymalizować wydajność twoich kolonii."
