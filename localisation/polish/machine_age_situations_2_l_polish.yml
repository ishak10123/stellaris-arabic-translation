 identity_initialization_name: "Inicjalizacja tożsamości"
 identity_initialization: "$identity_initialization_name$"
 identity_initialization_desc: "$tech_identity_initialization_desc$\n\n$TECH_UNLOCK_IDENTITY_INITIALIZATION_DESC$\n\n§E$identity_initialization_name$ $can_enable_mind_creation$§!"
 can_enable_mind_creation: "jest używana przy tworzeniu syntetyków"
 policy_computation_core_allocation: "Skupienie na głównych celach obliczeniowych"
 policy_computation_core_allocation_desc: "Syntetyczne korporacje mogą przekierowywać cykle obliczeniowe ze swoich głównych systemów w celu optymalizacji wysokowartościowych sektorów społecznych przy zerowym opóźnieniu."
 computation_core_production_name: "Usprawnianie procesu produkcji"
 computation_core_production: "$computation_core_production_name$"
 computation_core_production_desc: "Wykorzystajcie zbędne cykle przetwarzania do usprawnienia procesów produkcyjnych.$computation_core_production_tt$"
 computation_core_production_tt: "\n\n$EFFECTS_HEADER$ $NEW_LINE$- Każde $pop_group_unit$: £job_roboticist£ $job_roboticist_plural$ i $job_identity_designer_plural_with_icon$ zwiększa §Y$BONUS_WORKFORCE_FOR$ dla: £job_foundry£ $job_foundry_plural$§! i §Y£job_artisan£ $job_artisan_plural$§! o §G+2,5%§!"
 computation_core_stability_name: "Analiza stabilności"
 computation_core_stability: "$computation_core_stability_name$"
 computation_core_stability_desc: "Przeznaczcie zasoby na monitorowanie przepływu informacji społecznej w poszukiwaniu nieprawidłowości.$computation_core_stability_tt$"
 computation_core_stability_tt: "\n\n$EFFECTS_HEADER$ $NEW_LINE$- Każde $pop_group_unit$: £job_roboticist£ $job_roboticist_plural$ i $job_identity_designer_plural_with_icon$ zwiększa §Y$BONUS_WORKFORCE_FOR$ dla: £job_bureaucrat£ $job_bureaucrat_plural$§! o §G+2,5%§!"
 computation_core_research_name: "Procesy badawcze"
 computation_core_research: "$computation_core_research_name$"
 computation_core_research_desc: "Wyznaczcie dodatkowe cykle obliczeniowe do wysokowydajnych serwerów badawczych.$computation_core_research_tt$"
 computation_core_research_tt: "\n\n$EFFECTS_HEADER$ $NEW_LINE$- Każde $pop_group_unit$: £job_roboticist£ $job_roboticist_plural$ i $job_identity_designer_plural_with_icon$ zwiększa §Y$BONUS_WORKFORCE_FOR$ dla: £job_physicist£ $job_physicist_plural$§!, §Y£job_biologist£ $job_biologist_plural$§! i §Y£job_engineer£ $job_engineer_plural$§! o §G+2,5%§!"
 #Technologies
 tech_identity_copy: "Kopie tożsamości"
 tech_identity_copy_desc: "Będziemy mogli skopiować tożsamość i wspomnienia syntetyka do nowego ciała mechanicznego. Kopie te będą miały przewidywalny zestaw umiejętności, ale trudno będzie z nimi o ciekawą rozmowę."
 TECH_UNLOCK_IDENTITY_COPY_TITLE: "Zapewnia dostęp do polityki: $TABBED_NEW_LINE$§H$policy_synthetic_identities_policy$§! - $identity_copy_name$"
 TECH_UNLOCK_IDENTITY_COPY_DESC: "£pop£ §HPopulacje mechaniczne§!$TABBED_NEW_LINE$Zadowolenie: §R-5%§!"
 tech_identity_fusion: "Fuzja tożsamości"
 tech_identity_fusion_desc: "Scalenie tożsamości i wspomnień dwóch lub więcej syntetyków w mechanicznym ciele pozwoli na tworzenie nowych, dość wyjątkowych jednostek."
 TECH_UNLOCK_IDENTITY_FUSION_TITLE: "Zapewnia dostęp do polityki: $TABBED_NEW_LINE$§H$policy_synthetic_identities_policy$§! - $identity_fusion_name$"
 TECH_UNLOCK_IDENTITY_FUSION_DESC: "£pop£ §HPopulacje mechaniczne§!$TABBED_NEW_LINE$Kosz montażu: §R+10%§!"
 tech_identity_initialization: "Inicjalizacja tożsamości"
 tech_identity_initialization_desc: "Będziemy mogli inicjalizować jądro tożsamości i zapewnić mu wirtualne dzieciństwo. Choć proces ten jest drogi, pozwala na symulację optymalnych doświadczeń i generowanie produktywnych osobowości."
 TECH_UNLOCK_IDENTITY_INITIALIZATION_TITLE: "Zapewnia dostęp do polityki: $TABBED_NEW_LINE$§H$policy_synthetic_identities_policy$§! - $identity_initialization_name$"
 TECH_UNLOCK_IDENTITY_INITIALIZATION_DESC: "£pop£ §HPopulacje mechaniczne§!$TABBED_NEW_LINE$Zadowolenie: §G+5%§!$TABBED_NEW_LINE$Zasoby z £job£ §Hmiejsc pracy§!: §G+5%§!$TABBED_NEW_LINE$Koszt montażu: §R+20%§!"
 #DIGITIZATION STAGE 1
 synth.100.name: "Uruchamianie" #Stage 1 - Start event
 synth.100.desc: "Nadszedł czas na odrzucenie naszych biologicznych ciał i przemianę w stopy metali i elektryczność. Supernowoczesne ciała i wydajne umysły pozwolą nam dziarsko wkroczyć w przyszłość. [Owner.Species.GetFleshTypeCyberCreed] nieraz zawodzi, maszynę jednak można udoskonalić.\n\nProces przemiany nie będzie jednak łatwy. Społeczność badaczy twierdzi, że potrzebny jest co najmniej jeden $building_identity_complex$, aby stanowił centrum dla rozwoju syntetycznego. Przeznaczenie czeka."
 synth.100.a: "Bierzemy los w swoje ręce."
 synth.100.a.tt: "§RWymagane działanie:§!\nBudynek - $building_identity_complex$ - pozwoli na wznowienie sytuacji §Y$situation_digitization$§!."
 synth.105.name: "Lepsze wersje"
 synth.105.desc: "Dzięki zwiększonej mocy obliczeniowej syntetycznego mózgu możemy przekroczyć nawet nasze biologiczne ograniczenia. Ta dodatkowa moc nadal jednak ma ograniczenia, musimy więc określić swój priorytet.$synth.105.end$"
 synth.105.end: "\n\nMożemy skupić się na usprawnieniu procesu decyzyjnego, zwiększeniu zasobów pamięci lub poprawieniu koordynacji umysł-kończyny - wszystko to wzmocniłoby wydajność różnych typów pracy. Możemy również zwiększyć wytrzymałość wszystkich ciał.\n\nFunkcje te wymagają stałej obsługi i będą dostępne jedynie na planetach, na których znajduje się fabryka robotów. Informacje zdobyte podczas tworzenia projektu zapewnią jednak natychmiastowe korzyści produkcyjne."
 synth.105.a: "Zoptymalizujcie proces decyzyjny."
 build_better_synths: "Dodano modyfikator budynku montażu robotów:"
 synth.105.a.tt: "$build_better_synths$\nProdukcja zasobów przez populację elity: §G+15%§!\n\n"
 synth.105.b: "Skupcie się na zwiększeniu zasobów pamięci."
 synth.105.b.tt: "$build_better_synths$\nProdukcja zasobów przez populację specjalistów: §G+5%§!\n\n"
 synth.105.c: "Usprawnijcie funkcje motoryczne."
 synth.105.c.tt: "$build_better_synths$\nProdukcja zasobów przez populację robotników: §G+10%§!\n\n"
 synth.105.d: "Zwiększcie wytrzymałość."
 synth.105.d.tt: "$build_better_synths$\n$mod_planet_jobs_upkeep_mult$: §G-5%§!\n\n"
 #Stage 1 Opportunities - Research
 synth.120.name: "Mikrofuzja kinestetyczna"
 synth.120.desc: "\"Modyfikacje mikrofuzyjne pozwalają ci podnieść nawet czołg!\" - obwieszcza duży serwis recenzji konsumenckich. I nie jest to hiperbola. Niedawne odkrycia w zakresie technologii mikrofuzji mają szansę znacząco usprawnić nasze maszynowe ciała.\n\nChoć proces jest nieco ryzykowny, montaż maleńkich, osobistych reaktorów pozwala na eksplozywny transfer mocy i poprawę prędkości. Zmusiłoby to nas, rzecz jasna, do zmiany grafików produkcyjnych - generatory stanowią znaczące rozszerzenie zakresu projektu."
 synth.120.a: "Musimy dążyć do doskonałości!"
 synth.120.a.tt: "Tempo postępu sytuacji §Y$situation_digitization$§! przez §Y1§! rok: §R-50%§!"
 situation_kinesthetic_microfusion_tt: "Konfiguracja mikrofuzji kinestetycznej"
 synth.120.b: "To zbędna funkcja."
 synth.120.c: "Skupcie się na poprawie naszych możliwości bojowych."
 #Stage 1 Challenges - Research
 synth.160.name: "Zła prasa"
 synth.160.desc: "Niezwykle popularny nowy serial porwał wyobraźnię publiczności. Fabuła skupia się na syntetycznym robotniku, który doświadcza odcięcia się od własnego ciała.\n\nPrzyjaciele i rodzina głównego bohatera mogą tylko patrzeć z przerażeniem, jak ten traci nad sobą kontrolę. Tragiczne zakończenie serialu postrzegane jest jako słabo ukrywana krytyka naszej planowanej zamiany ciał na maszynowe.\n\nDyskusja publiczna tocząca się wokół tego wielkiego hitu powoduje opór wobec naszych planów i może spowolnić nasze postępy."
 synth.160.a: "To minie."
 synth.160.b: "Przekierujcie fundusze badawcze do działu BR."
 synth.160.c: "Aresztujcie reżysera."
 synth.160.d: "Zablokujcie wszelkie wzmianki w mediach."
 #DIGITIZATION STAGE 2
 synth.200.name: "Filozofia umysłu" #Stage 2 - Start event
 synth.200.desc: "Zakładaliśmy, że korzyści płynące z posiadania w pełni cyfrowego umysłu są na tyle oczywiste, że nie napotkamy na żaden opór. Byliśmy, być może, naiwni. Sprzeciw wobec pełnej syntetyzacji jest bardzo silny i trzeba się nim zająć.\n\nNajbardziej krytykowana jest nasza niemożność udowodnienia, że mająca swoją ciągłość tożsamość może zostać przeniesiona bezpiecznie i w całości. Niektórzy obawiają się - nie całkiem bez powodu - że zdołaliśmy jak dotąd stworzyć co najwyżej cyfrową kopię. Pytanie brzmi: czy te umysły są naprawdę naszymi?"
 synth.200.a: "Powiedzcie prawdę: nie wiemy."
 synth.200.a.tt: "Przeprowadźcie kampanię informacyjną dla §Hminimalnego§! sprzeciwu wobec syntetyzacji\n\n"
 synth.200.b: "Powiedzcie im to, co chcą usłyszeć."
 synth.200.b.tt: "Przeprowadźcie kampanię informacyjną dla §Humiarkowanego§! sprzeciwu wobec syntetyzacji\n\n"
 synth.200.c: "Kilku malkontentów nie zburzy naszych planów."
 synth.200.c.tt: "Zignorujcie głosy sprzeciwu - prowadzi to do §Hmaksymalnego§! sprzeciwu wobec syntetyzacji"
 synth.200.c.material: "Kwestie świadomości nas nie interesują."
 synth.200.c.material.tt: "Czysto naukowe podejście spowoduje §Humiarkowany§! sprzeciw wobec syntetyzacji.\n\n"
 synth.205.name: "Uwiązanie do przeszłości"
 synth.205.desc: "Projekt syntetyzacji naszego społeczeństwa natyka na ciągły opór objawiający się pełnymi niepokojów demonstracjami, które nasze służby policyjne z ledwością są w stanie opanować. Protestujący obawiają się utraty wszystkiego, co nadaje ich życiu znaczenie. Jaki jest cel syntetyzacji, jeśli traci się w jej trakcie fizyczne przyjemności czy poczucie braterstwa?\n\nSkrajni radykałowie wśród protestujących nawołują, aby określone miasta zostały obwołane miejscami dziedzictwa. Pozwoliłoby to przeciwnikom cyfryzacji kontynuować swoje biologiczne życia."
 synth.205.a.regular: "W pełni popieramy istnienie tych miejsc dziedzictwa."
 synth.205.a.spiritualist: "Przeszłość musi zostać zachowana."
 synth.205.a.memorialist: "Przeszłości trzeba oddać należny szacunek."
 synth.205.b: "Musimy zostawić przeszłość za sobą."
 #Stage 2 Opportunities - Objectors
 synth.220.name: "Drugie życie"
 synth.220.desc: "Celebryta o silnych poglądach antysyntetycznych miał wypadek i znajduje się obecnie w stanie wegetatywnym. Wszyscy opłakują utratę uwielbianej osobowości, nasi prosyntetyczni doradcy dostrzegają zaś wyjątkową szansę.\n\nDigitalizacja umysłu celebryty i zapewnienie mu nowego życia w syntetycznym ciele z pewnością uczyniłyby z części fanów gorących zwolenników syntetyzacji. Choć proces jest całkowicie legalny, pozostaje problem zgody: gdyby celebryta miał w tej sprawie coś do powiedzenia, nigdy by jej nie wyraził. Jeśli źle to rozegramy, ten PR-owy projekt może zmienić się w medialną katastrofę."
 synth.220.a: "Syntetyzacja nie jest przestępstwem."
 synth.220.a.tt.negative: "Tempo postępu sytuacji §Y$situation_digitization$§! przez §Y6§! miesięcy: §R-30%§!"
 synth.220.a.tt.positive: "Tempo postępu sytuacji §Y$situation_digitization$§! przez §Y6§! miesięcy: §G+30%§!"
 synth.220.b: "Nie ryzykujmy."
 synth.220.c: "Oszukajcie ludność za pomocą SI."
 synth.220.c.tt: "Obraz celebryty stanie się aktorem w naszej opowieści."
 #Stage 2 Challenges - Objectors
 synth.260.name: "Utracone umysły"
 synth.260.desc: "Eksperymenty nad digitalizacją bilionów połączeń synaptycznych, które składają się na biologiczną świadomość, zakończyły się katastrofalnym niepowodzeniem. Prosty błąd składni poskutkował natychmiastowym wymazaniem ścieżek neuronowych naszych obiektów badawczych. Niektórzy nazywają to morderstwem.\n\nWszyscy uczestnicy badań byli ochotnikami, lecz ich pogrążeni w rozpaczy bliscy domagają się zaciekle sprawiedliwości. Dodatkowo problemem jest to, jak trudno znaleźć teraz nowych ochotników."
 synth.260.a: "Wypłaćcie rodzinom rekompensatę i kontynuujcie badania."
 synth.260.b: "Nowi ochotnicy zostaną wyłonieni w drodze losowania."
 synth.260.b.tt: "Tempo postępu sytuacji §Y$situation_digitization$§! przez §Y1§! rok: §R-25%§!"
 situation_test_subject_lottery_tt: "Loteria obiektów doświadczalnych"
 synth.260.c: "Znaleźć ochotników. Jeśli będzie trzeba, to przymusowo."
 #DIGITIZATION STAGE 3
 synth.300.name: "Masowy przesył tożsamości" #Stage 3 - Start event
 synth.300.desc: "Na całym naszym terytorium, w każdym dużym centrum miejskim, postawiliśmy budki syntetyzujące - [owner.species.GetName] mogą już z nich korzystać. Cyfrowe wzorce świadomości, które zaprojektowali nasi $job_identity_designer_plural$, zapewnią identyczność komputerowej kopii z biologicznym oryginałem.\n\nNadszedł wreszcie dzień, w którym odrzucimy biologiczną przeszłość i wkroczymy w syntetyczną przyszłość."
 synth.300.a: "Syntetyzacja!"
 synth.300.a.resistance.tt: "$unlock_edict_tt$ ['concept_edict_subsidized_identity_backups']\n\nPrzenosi: §Y[Owner.GetNumSynthOpposition] [Owner.GetBiologicalPopOrPops]§! do: §Y$d_biological_enclaves$§! na planecie [root.owner.capital_scope.GetName]\nUsunięcie przeszkody terenowej przywraca: §Y[Owner.GetNumSynthOpposition] [Owner.GetMechanicalPopOrPops]§!\n\nModyfikator §Y$synth_mass_demonstrations$§! usunięty z planety [root.owner.capital_scope.GetName]\n\nSzybkość syntetyzacji zależy od podejścia do sytuacji i liczby budynków montażu robotów."
 synth.300.a.heritage.tt: "$unlock_edict_tt$ ['concept_edict_subsidized_identity_backups']\n\nPrzenosi: §Y[Owner.GetNumSynthOpposition] [Owner.GetBiologicalPopOrPops]§! do: §Y$d_old_towns$§! na planecie [root.owner.capital_scope.GetName]\nUsunięcie przeszkody terenowej przywraca: §Y[Owner.GetNumSynthOpposition] [Owner.GetMechanicalPopOrPops]§!\n\nSzybkość syntetyzacji zależy od podejścia do sytuacji i liczby budynków montażu robotów."
 synth.305.name: "Turystyka syntetyczna"
 synth.305.desc: "[root.owner.capital_scope.GetName]: obywatele z przychylnością przyjęli powstanie miejsc dziedzictwa, lecz inicjatywa odniosła chyba nieco zbyt wielki sukces. Niesione nostalgią tłumy syntetycznych turystów zaczęły odwiedzać wyznaczone terytoria i zaczynają utrudniać życie ich biologicznym mieszkańcom.\n\nJeśli chcemy utrzymać w tych miejscach atmosferę autentyczności, niezbędne może okazać się ograniczenie liczby turystów. Z drugiej strony, interakcje turystów i mieszkańców mogą prowadzić do intrygujących socjologicznych wniosków."
 synth.305.a: "Ograniczyć liczbę turystów."
 synth.305.b: "Zachęcenie do podróży większej liczby gości może okazać się dochodowe."
 synth.305.c: "Zbadajcie wpływ turystyki na te miejsca."
 synth.305.d: "Wymiana kulturowa zapewnia wzajemne zrozumienie."
 synth.310.name: "Opór"
 synth.310.desc: "[root.owner.capital_scope.GetName]: ruch sprzeciwiający się syntetyzacji stosuje coraz to bardziej radykalne taktyki i wykazuje się coraz większą ambicją. Służby porządkowe zanotowały również wzrost przemocy, a także pojawienie się broni wśród członków co bardziej ekstremalnych oddziałów ruchu.\n\nNiektórzy z dysydentów obwołali się \"przywódcami ruchu oporu\" i wycofali się do kryjówek, w których przygotowują bardziej już jawne działania antyrządowe."
 synth.310.a: "Aresztujcie przywódców."
 synth.310.a.tt: "Tempo postępu sytuacji §Y$situation_digitization$§! przez §Y1§! rok: §G+25%§!\n\n"
 synth.310.b: "Spróbujcie rozładować sytuację."
 synth.310.b.tt: "Tempo postępu sytuacji §Y$situation_digitization$§! przez §Y1§! rok: §R-25%§!\n\n"
 #Stage 3 Opportunities - Mind Upload
 synth.320.name: "21 386 732 184 jednostki pamięci"
 synth.320.desc: "21 386 732 184 jednostki pamięci. Taka jest przeciętna pojemność mózgu, jaki posiadają [root.owner.GetSpeciesNamePlural]. A jednak nie wszystkie umysły stworzone są równymi.\n\nW miarę postępów w procesie syntetyzacji podnoszą się głosy, że nie wszyscy godni są sztucznego ciała. Kwestia tego, kto powinien otrzymać je priorytetowo, jest jednak trudna. A może mniej udane umysły dałoby się po cyfryzacji... ulepszyć? Przeprogramować."
 synth.320.a: "Każdy umysł wart jest zachowania."
 synth.320.b: "Nie ma nic złego w majsterkowaniu..."
 synth.320.c: "Cyfryzujcie cyfrowo najbystrzejsze umysły."
 synth.320.d: "Przeprogramujcie \"problematycznych\"."
 #Stage 3 Challenges - Mind Upload
 synth.360.name: "Złośliwe oprogramowanie bezprzewodowe"
 synth.360.desc: "Chcąc, aby [roboticist.GetNamePlural] pracowali z maksymalną wydajnością, menedżerowie zgodzili się, aby otrzymywali niezabezpieczone aktualizacje tożsamości drogą bezprzewodową. W zamierzeniu miało to wzbogacić ich wiedzę o optymalizacji procesów, zamiast tego jednak osobowość i wspomnienia pechowców częściowo przepadły.\n\nZespół kierowniczy twierdzi, że dokładne testy aktualizacji tożsamości przed ich wdrożeniem trwałyby zbyt długo i że łatwiej jest po prostu zmienić przydział pracowników, którzy stracili pamięć."
 synth.360.a: "Optymalizacja produkcji jest warta tej ceny."
 synth.360.a.tt: "Dodano modyfikator budynku montażu robotów:\n$MOD_PLANET_POP_ASSEMBLY_MULT$: §G+10%§!\n\n§Y[roboticist.GetNamePlural]§! - bazowy koszt utrzymania: £alloys£§R3,00§!"
 synth.360.b: "Wprowadźcie powolne, lecz bezpieczne procesy aktualizacji."
 synth.360.b.tt: "Dodano modyfikator budynku montażu robotów:\n$MOD_PLANET_POP_ASSEMBLY_MULT$: §R-10%§!\nStabilność: §G+5§!"
 #DIGITIZATION STAGE 4
 synth.400.name: "Kopia doskonała" #Stage 4 - Start event
 synth.400.desc: "Kiedy zmieniliśmy nasze umysły w cyfrowe dane, które wgraliśmy do syntetycznych ciał, utraciliśmy zdolność do biologicznej reprodukcji. Musimy tworzyć nowe osobniki poprzez kopiowanie istniejących umysłów.\n\nNasi $job_identity_designer_plural$ badają sprawę, bez wątpienia więc zdołamy usprawnić ten proces. W końcu nawet doskonała kopia to zwykłe odtworzenie. Stworzenie nowego umysłu, nowej tożsamości - oto, co stanowi wyzwanie."
 synth.400.a: "Pozwólcie, aby każdy mógł otrzymać darmowe kopie tożsamości."
 synth.400.pop.tt: "$unlock_edict_tt$ ['concept_edict_optimized_identity_creation']\n\nKażdy §Y$job_identity_designer$§! zapewnia teraz w całym imperium:$TABBED_NEW_LINE$£mod_planet_pop_assembly_mult£ $MOD_POP_ASSEMBLY_SPEED$: §G+1§!\n\n"
 synth.400.b: "Pobierajcie od użytkowników opłaty za każdą kopię."
 synth.405.name: "Dywersyfikacja tożsamości"
 synth.405.desc: "Nasi $job_identity_designer_plural$ odkryli dwa sposoby na stworzenie bardziej zróżnicowanych tożsamości cyfrowych.\n\nJedną opcją jest połączenie charakterystyk dwóch lub więcej istniejących już tożsamości w celu stworzenia nowej. Możemy przy tym wybierać cechy, które preferujemy, lub przeprowadzać proces losowo. Tak czy inaczej nowa tożsamość z pewnością będzie ciekawsza niż obecne kopie.\n\nDrugą metodą jest inicjalizacja nowej tożsamości ze sztucznego źródła i przeprowadzenie jej przez przyspieszone (i symulowane) dzieciństwo. Sposób ten pozwala zaprojektować tożsamość idealną."
 synth.405.a: "Wymieszamy nasze tożsamości."
 synth.405.a.vault: "Wymieszajcie z naszymi cyfrowymi przodkami."
 synth.405.a.tt: "Uzyskana możliwość badań: £engineering£§Y$tech_identity_fusion$§!\n\nMożliwość przyszłych badań: £engineering£§Y$tech_identity_initialization$§!"
 synth.405.b: "Optymalnie będzie stworzyć wirtualny żłobek."
 synth.405.b.tt: "Uzyskana możliwość badań: £engineering£§Y$tech_identity_initialization$§!\n\nMożliwość przyszłych badań: £engineering£§Y$tech_identity_fusion$§!"
 synth.4.name: "Syntetyczna populacja" #Digitization - Last event
 synth.4.desc: "Z wielkim wysiłkiem dokonaliśmy czegoś, co wydawało się niemożliwe - przemieniliśmy naszą świadomość w kod, a ciała w maszyny.\n\nProces przebiegł nie bez trudności, był skomplikowany i żmudny. Cokolwiek jednak być może straciliśmy po drodze, wynagrodzą nam to nieskończone możliwości naszej nowej konfiguracji."
 synth.4.desc.unplugged: "Z wielkim wysiłkiem dokonaliśmy czegoś, co kiedyś wydawało się niemożliwe, może nawet bluźniercze. Rozwinęliśmy się bardziej, niż może pojąć [origin_unplugged_assimilator_empire.GetName]. Przemieniliśmy naszą świadomość w kod, a ciała w maszyny.\n\nProces przebiegł nie bez trudności, był skomplikowany i żmudny. Cokolwiek jednak być może straciliśmy po drodze, wynagrodzą nam to nieskończone możliwości naszej nowej konfiguracji."
 synth.4.a: "Będziemy wyjątkowi."
 synth.4.a.tt: "Odblokowuje pełne efekty drzewka tradycji: ['tradition_category:tradition_synthetics']"
 ### DIGITIZATION SITUATION END ###
 ### SOCIETAL EFFECTS EVENT CHAIN START ###
 synthshock_chain_title: "Cyfrowa refaktoryzacja"
 synthshock_chain_desc: "Syntetyzacja całego społeczeństwa to przedsięwzięcie monumentalne. Nie obejdzie się bez problemów. Wraz z adaptacją do nowej normalności natykać się będziemy na nieprzewidywalne trudności, a nowe możliwości bez wątpienia wpłyną na nasze życie codzienne.\n\nTo, jak stawimy czoła tym zmianom, określi wygląd naszego społeczeństwa na długie lata."
 synth_keep_auth_option: "Syntetyzacja nie zmienia tego, kim jesteśmy."
 ### AUTHORITIES ###
 #DEMOCRATIC
 #Synth Democratic Physical
 auth_synth_democratic_physical: "Demokratyczne przeniesienie"
 auth_synth_democratic_physical_desc: "Ta forma rządów zapewnia bezprecedensową swobodę przenoszenia się z jednego syntetycznego ciała do innego. Gotowa jest na poniesienie związanych z tym dodatkowych kosztów."
 auth_synth_democratic_physical_tt: "$auth_democratic_election_tt$\nWydajność pracy za specjalistów: §G+1%§! za każdą £district£ dzielnicę\nUtrzymanie dzielnicy: §R+1%§! za każdą £district£ dzielnicę"
 concept_auth_synth_democratic_physical: "$auth_synth_democratic_physical$"
 gov_synth_democracy_physical: "$auth_synth_democratic_physical$"
 gov_synth_democracy_physical_desc: "$auth_synth_democratic_physical_desc$"
 #Synth Democratic Virtual
 auth_synth_democratic_virtual: "Demokratyczna surogacja"
 auth_synth_democratic_virtual_desc: "Zastąpienie żołnierzy wyrafinowanymi, obsługiwanymi zdalnie surogatami zmniejsza wpływ wojny na populację. Pozwala to również na budowę mniejszych okrętów, załoga nie wymaga już bowiem kwater ani kokpitów."
 auth_synth_democratic_virtual_tt: "$auth_democratic_election_tt$"
 concept_auth_synth_democratic_virtual: "$auth_synth_democratic_virtual$"
 gov_synth_democracy_virtual: "$auth_synth_democratic_virtual$"
 gov_synth_democracy_virtual_desc: "$auth_synth_democratic_virtual_desc$"
 #OLIGARCHIC
 auth_cyber_oligarch_ruler_enforcers_tt: "Produkcja zasobów władcy na jednostkę ([enforcer.GetIcon] [enforcer.GetName]): §G+10%§!"
 #Synth Oligarchic Physical
 auth_synth_oligarchic_physical: "Oligarchiczne przekierowanie"
 auth_synth_oligarchic_physical_desc: "Syntetyczne oligarchie pozwalają najwyższego stopnia biurokratom tymczasowo przejmować ciała nie spisujących się wystarczająco dobrze kolegów, aby zapobiegać katastrofalnym błędom w zarządzaniu."
 concept_auth_synth_oligarchic_physical: "$auth_synth_oligarchic_physical$"
 gov_synth_oligarchy_physical: "$auth_synth_oligarchic_physical$"
 gov_synth_oligarchy_physical_desc: "$auth_synth_oligarchic_physical_desc$"
 #Synth Oligarchic Virtual
 auth_synth_oligarchic_virtual: "Oligarchiczny nadzór"
 auth_synth_oligarchic_virtual_desc: "Holistyczne protokoły zarządzania projektami i dodatkowe zasoby obliczeniowe pozwalają wysokiego stopnia urzędnikom monitorować wiele wdrożonych w całym imperium edyktów z bezprecedensową wydajnością."
 concept_auth_synth_oligarchic_virtual: "$auth_synth_oligarchic_virtual$"
 gov_synth_oligarchy_virtual: "$auth_synth_oligarchic_virtual$"
 gov_synth_oligarchy_virtual_desc: "$auth_synth_oligarchic_virtual_desc$"
 #DICTATORIAL
 #Synth Dictatorship Physical
 auth_synth_dictatorial_physical: "Dyktatorska rozmaitość"
 auth_synth_dictatorial_physical_desc: "Zsynchronizowane neuropołączenia i obsługująca je infrastruktura pozwalają jednej osobie na jednoczesne kontrolowanie wielu syntetycznych ciał naraz. Ma to ogromny, pozytywny wpływ na produktywność robotników."
 concept_auth_synth_dictatorial_physical: "$auth_synth_dictatorial_physical$"
 gov_synth_dictatorship_physical: "$auth_synth_dictatorial_physical$"
 gov_synth_dictatorship_physical_desc: "$auth_synth_dictatorial_physical_desc$"
 #Synth Dictatorship Virtual
 auth_synth_dictatorial_virtual: "Dyktatorska indoktrynacja"
 auth_synth_dictatorial_virtual_desc: "Istniejemy teraz we w pełni wirtualnym świecie. Nic nie jest prawdą. Wszystkim można manipulować.\n\nCałkowita kontrola nad otoczeniem mieszkańców pozwala nam na kierowanie opinią publiczną. Wszyscy będą wierzyć w to, w co będziemy chcieli, żeby wierzyli."
 concept_auth_synth_dictatorial_virtual: "$auth_synth_dictatorial_virtual$"
 gov_synth_dictatorship_virtual: "$auth_synth_dictatorial_virtual$"
 gov_synth_dictatorship_virtual_desc: "$auth_synth_dictatorial_virtual_desc$"
 #IMPERIAL
 #Synth Imperial Physical
 auth_synth_imperial_physical: "Imperialna informacja zwrotna"
 auth_synth_imperial_physical_desc: "Możemy przyspieszyć nasze wysiłki naukowe, rozkładając na czynniki zapisane w imperialnych archiwach zapisy umysłów naszych zmarłych przywódców. Będą mogli dzięki temu nadal wspierać nasze imperium tak, jak z pewnością by sobie tego życzyli.\n\nTron imperialny dziedziczony jest po śmierci władcy przez wskazanego następcę."
 auth_synth_imperial_physical_tt: "Zmarli przywódcy zapewniają $r_research$: $TABBED_NEW_LINE$$scientist_plural_with_icon$ - $r_physics$ $TABBED_NEW_LINE$$official_plural_with_icon$ - $r_society$$TABBED_NEW_LINE$$commander_plural_with_icon$ - $r_engineering$ $NEW_LINE$ Zyskiwane $r_research$ zależą od §Ypoziomu umiejętności przywódcy§!"
 concept_auth_synth_imperial_physical: "$auth_synth_imperial_physical$"
 gov_synth_imperial_physical: "$auth_synth_imperial_physical$"
 gov_synth_imperial_physical_desc: "$auth_synth_imperial_physical_desc$"
 #Synth Imperial Virtual
 auth_synth_imperial_virtual: "Imperialna transmisja"
 auth_synth_imperial_virtual_desc: "Technologia szybkiego transferu umysłów daje nam szansę na odsyłanie zmarłych żołnierzy z powrotem w bój w nowych mechanicznych ciałach. Ta sama technika pozwala naszym robotnikom wykonywać wysoce niebezpieczne naprawy okrętów w przestrzeni kosmicznej.\n\nTron imperialny dziedziczony jest po śmierci władcy przez wskazanego następcę."
 auth_synth_imperial_virtual_tt: "Nasze armie robotów mają §Y33%§! szansy na odzyskanie sprawności, gdy zostaną pokonane"
 concept_auth_synth_imperial_virtual: "$auth_synth_imperial_virtual$"
 gov_synth_imperial_virtual: "$auth_synth_imperial_virtual$"
 gov_synth_imperial_virtual_desc: "$auth_synth_imperial_virtual_desc$"
 #CORPORATE
 #Synth Corporate Physical
 auth_synth_corporate_physical: "Korporacyjna rozumność"
 auth_synth_corporate_physical_desc: "Ograniczone syntetyczne umysły mogą być umieszczane w martwych obiektach w celu tworzenia prowizorycznych żywych istot, by stanowiły one niezmordowane sługi, lojalnych towarzyszy lub nawet wartościowych członków rodziny czy pracowników firmy.\n\nRządy korporacyjne to potężne przedsięwzięcia handlowe, które całkowicie przejęły rolę władz państwowych."
 auth_synth_corporate_physical_tt: "$AVAILABLE_POLICIES$ §Y$policy_computation_core_allocation$§!\n$AVAILABLE_HOLDINGS$ ['building:building_ai_emporium']"
 concept_auth_synth_corporate_physical: "$auth_synth_corporate_physical$"
 gov_synth_corporate_physical: "$auth_synth_corporate_physical$"
 gov_synth_corporate_physical_desc: "$auth_synth_corporate_physical_desc$"
 #Synth Corporate Virtual
 auth_synth_corporate_virtual: "Korporacyjne wspomnienia"
 auth_synth_corporate_virtual_desc: "Ta korporacja zajmuje się skupem wspomnień i trwałym wymazywaniem ich z mózgów klientów. Barwne i intensywne doznania są warte więcej niż zwykłe i przyziemne. Korporacja skanuje następnie dane w poszukiwaniu przydatnych informacji, a następnie integruje je w procesie tworzenia syntetycznych umysłów.\n\nRządy korporacyjne to potężne przedsięwzięcia handlowe, które całkowicie przejęły rolę władz państwowych."
 auth_synth_corporate_virtual_tt: "$AVAILABLE_POLICIES$ §Y$policy_computation_core_allocation$§!\n$AVAILABLE_HOLDINGS$ ['building:building_clear_thought_clinic']"
 concept_auth_synth_corporate_virtual: "$auth_synth_corporate_virtual$"
 gov_synth_corporate_virtual: "$auth_synth_corporate_virtual$"
 gov_synth_corporate_virtual_desc: "$auth_synth_corporate_virtual_desc$"
 ### EDICTS ###
 edict_subsidized_identity_backups: "Subsydiowane kopie zapasowe tożsamości"
 edict_subsidized_identity_backups_desc: "Rząd zapewnia ogromną przestrzeń magazynową na serwerach wymaganą do stałego tworzenia kopii zapasowych tożsamości."
 edict_subsidized_identity_backups_effect: "$MOD_LEADER_LIFESPAN_ADD$: §G+20 lat§!\n$MOD_LEADER_SPECIES_EXP_GAIN$: §G+10%§!"
 concept_edict_subsidized_identity_backups: "$edict_subsidized_identity_backups$"
 edict_optimized_identity_creation: "Zoptymalizowane tworzenie tożsamości"
 edict_optimized_identity_creation_desc: "Zaawansowane algorytmy osobowości i techniki kompresji pamięci kluczowej zwiększają tempo generowania tożsamości."
 concept_edict_optimized_identity_creation: "$edict_optimized_identity_creation$"
 ### EVENTS ###
 synth.social_consequences.tt: "Wpływa na trwającą §Ysyntetyczną przemianę społeczną§!.\n\n" #Standard tooltip to indicate that the Physical/Virtual focus variables has changed
 #FIRST EVENT #
 #DEMOCRATIC
 synth.505.name: "$synthshock_chain_title$"
 synth.505.desc: "Dzięki wysiłkom naszego rządu świadomość każdego chętnego obywatela została zamieniona na formę cyfrową. Syntetyzacja otworzyła przed nami niewyobrażalne jeszcze dla nas drogi, prowadzi nas ku nowym wyzwaniom i możliwościom.\n\nSkupiając swoje wysiłki na świecie fizycznym, moglibyśmy przenosić nasze cyfrowe umysły na wielkie odległości, ku nowym, przygotowanym już dla nas ciałom. Możemy też wymyślić sposób na stworzenie zdalnie sterowanych żołnierzy-surogatów, którzy zmniejszyliby dotkliwość wojen."
 synth.505.a: "Powinniśmy się skupić na swobodzie przemieszczania się."
 synth.505.a.tt: "Nacisk na przesiedlenia i dzielnice."
 synth.505.b: "Musimy przygotować się na potworności wojny."
 synth.505.b.tt: "Nacisk na wyczerpanie wojną i podróże podświetlne."
 #OLIGARCHIC
 synth.510.name: "$synthshock_chain_title$"
 synth.510.desc: "Choć syntetyzacja już teraz wpłynęła na nasze społeczeństwo na sposoby, których nie bylibyśmy w stanie przewidzieć, wszyscy twierdzą, że możemy posunąć się jeszcze dalej. Nasze obecne syntetyczne ciała można ulepszyć lub nawet całkowicie odrzucić i rozpocząć całkowicie wirtualną egzystencję.\n\nJeśli postanowimy przydzielić każdemu syntetyczne ciało, może to pozwolić urzędnikom na tymczasowe przejmowanie ciał nieskutecznych członków rządu. Alternatywą jest porzucenie tworzonych na wymiar fizycznych form na rzecz w pełni wirtualnego, wspólnego doświadczenia - pozwoli nam to wydawać decyzje wydajniej niż kiedykolwiek wcześniej."
 synth.510.a: "Koncentracja na przejmowaniu nieskutecznych ciał."
 synth.510.a.tt: "Nacisk na wydajność biurokratyczną."
 synth.510.b: "Badania opcji holistycznego nadzoru wirtualnego."
 synth.510.b.tt: "Nacisk na edykty i wielkość imperium."
 #DICTATORIAL
 synth.515.name: "$synthshock_chain_title$"
 synth.515.desc: "Całkowita syntetyzacja społeczeństwa okazała się oszałamiającym sukcesem. Nasza organiczna przeszłość przeszła do historii, lecz aby wyznaczyć dalszą drogę naprzód, §Y[From.GetRulerTitle] [From.GetRulerName]§! potrzebuje zarówno bezwzględnego posłuszeństwa naszych najbystrzejszych umysłów, jak i podjęcia decyzji.\n\nUlepszenie naszych syntetycznych ciał pozwoli jednostkom kontrolować wielu gospodarzy naraz. Alternatywą jest całkowite porzucenie przestrzeni fizycznej i kontrola publicznych sentymentów poprzez w pełni wirtualne środowisko."
 synth.515.a: "Koncentracja na neurozsynchronizowanych ciałach."
 synth.515.a.tt: "Nacisk na robotników i dzielnice."
 synth.515.b: "Koncentracja na wirtualnej manipulacji."
 synth.515.b.tt: "Nacisk na budynki i etykę rządu."
 #IMPERIAL
 synth.520.name: "$synthshock_chain_title$"
 synth.520.desc: "Choć syntetyzacja już teraz wpłynęła na nasze imperium na nieprzewidywalne sposoby, jego mieszkańcy wydają się gotowi na posunięcie się jeszcze dalej. Nasze syntetyczne ciała mogłyby stać się przedłużeniami naszej tożsamości lub zwykłymi narzędziami, które moglibyśmy kontrolować zdalnie dzięki naszej wirtualnej tożsamości. Nie wybraliśmy jeszcze dalszej drogi.\n\nMożemy zbadać sposoby na szybkie przenoszenie świadomości z jednego łatwego do zastąpienia ciała do innego. Możemy również skupić się na pozyskiwaniu wiedzy z niedawno zmarłych, by przyspieszyć prace badawcze."
 synth.520.a: "Analiza technik pozyskania wiedzy od zmarłych."
 synth.520.a.tt: "Nacisk na przywódców i badania naukowe."
 synth.520.b: "Badania nad szybkim transferem świadomości."
 synth.520.b.tt: "Nacisk na armie i statki."
 #CORPORATE
 synth.525.name: "$synthshock_chain_title$"
 synth.525.desc: "Syntetyzacja całej naszej społeczności wymaga dokładnej analizy ryzyka i korzyści. Otwierając nowy, dochodowy front syntetycznej przyszłości, pozostawiamy za sobą również naszą bardziej materialistycznie zorientowaną bazę klientów. W doskonałym świecie najlepiej byłoby zachować w jakimś stopniu oba te segmenty.\n\nPrzełomy w powiązanych z syntetyzacją dziedzinach badań, jak sztuczna inteligencja, pozwoliłyby uczynić zwykłe przedmioty częściowo żywymi i stworzyć nowe linie produktów. Dokładniejsza eksploracja przestrzeni wirtualnej pozwoliłaby nam opracować nowy typ towaru ze wspomnień osób gotowych się z nimi rozstać."
 synth.525.a: "Badania nad wykorzystaniem SI."
 synth.525.a.tt: "Nacisk na produkcję i zysk."
 synth.525.b: "Badania nad zarabianiem na wspomnieniach."
 synth.525.b.tt: "Nacisk na handel, towary i dane wywiadowcze."
 ### EVENT POOL 1: IDENTITY ###
 synth.610.name: "Proweniencja syntetyków"
 synth.610.desc: "Odczuć można już pierwsze fundamentalne zmiany społeczne rozpoczęte przez syntetyzację. Brak ograniczeń, jakie cechowała cielesna forma, radykalnie przedefiniowaliśmy kategorie płci, rasy czy autonomii cielesnej. Choć dla niektórych jest to wyzwoleniem, tradycjonaliści nie chcą porzucić starych ram myślowych - potrzebują z góry zdefiniowanej tożsamości, w ramach której mogliby operować.\n\nAby ich obłaskawić, moglibyśmy zachować w syntetycznej formie część z naszego organicznego dziedzictwa. Z drugiej strony, możemy też chcieć pozwolić ludności na swobodniejsze wyrażanie własnej tożsamości."
 synth.610.a: "Zachowajcie nasze pierwotne kształty."
 synth.610.b: "Pozwólcie na nieograniczone modyfikacje ciał."
 synth.610.c: "Wprowadźcie umiarkowane ograniczenia w związku z personalizacją tożsamości."
 synth.610.d: "Widoczne symbole statusu muszą pozostać."
 synth.610.e: "To można, rzecz jasna, zmonetyzować...?"
 synth.620.name: "Organiczne żądze"
 synth.620.desc: "Niektórzy z nas nie podzielają entuzjazmu do syntetyzacji i tęsknią za organiczną przeszłością. Twierdzą, że krótsze życia i wrodzona niedoskonałość naturalnego ciała czyniła życie bardziej wartościowym.\n\nGrupa zatwardziałych zwolenników tej myśli, twierdząc, że ich syntetyczne lub wirtualne podobizny wydają się puste i niepowiązane z nimi samymi, rozpoczęli oddawać organicznym ciałom boską niemal cześć.\n\nByć może powinniśmy zapewnić im mniej doskonałą symulację, w której mogliby istnieć. A może woleliby niedoskonałe nośniki?"
 synth.620.a: "Wprowadźcie w syntetycznych ciałach umyślne niedoskonałości."
 synth.620.b: "Zapewnijcie im niedoskonały świat."
 synth.620.c: "Głupotą jest romantyczne wspominanie przeszłości."
 synth.620.d: "Ból przypomni im, jaka jest wartość ich życia."
 synth.620.d.tt: "Niech rozpoczną się wirtualne walki!!!\n\n"
 synth.630.name: "Architektura serwera domowego"
 synth.630.desc: "Syntetyzacja całego gatunku §Y[root.GetSpeciesAdj&genitive]§! oznaczała również drastyczną przemianę naszych obyczajów mieszkaniowych. Kiedy umysły odpoczywają na potężnych farmach serwerów, syntetyczne ciała można przechowywać na półkach. Choć jest to tanie rozwiązanie, niektóre grupy wskazują na rzeczywiste związane z nim problemy.\n\nLukratywny dotąd rynek nieruchomości mógłby całkowicie się zapaść, co znacząco nadszarpnęłoby naszą gospodarkę. Jeszcze bardziej szkodliwy, przynajmniej z perspektywy psychologicznej, jest fakt, że nasi obywatele nie będą mieli już istniejącego realnie miejsca, które mogliby nazywać domem."
 synth.630.a: "Scentralizowane serwery są najwydajniejsze."
 synth.630.b: "Indywidualne serwery można przechowywać w istniejących domach."
 synth.630.c: "Rozpocznijcie sprzedaż cyfrowych domów."
 ### EVENT POOL 2: POSSIBILITIES ###
 synth.1010.name: "Macierz nieskończonych możliwości"
 synth.1010.desc: "Przemysł cyfrowy rozkwita. Od emocji, jakie niesie oglądana z perspektywy pierwszej osoby przygoda, po relaks w cyfrowym kurorcie - rozrywka wirtualna nigdy nie była równie ekscytująca. Ani równie uzależniająca. Choć stała się kluczową gałęzią gospodarki, produkcja w świecie fizycznym zaczyna cierpieć - obywatele spędzają coraz to więcej czasu w swoich cyfrowych utopiach. Niektórzy są zagrożeni całkowitą utratą łączności z prawdziwym życiem, mogliby jednak wciąż działać na korzyść społeczeństwa poprzez udział w cyfrowej gospodarce.\n\nCzy powinniśmy zakazać uzależniających światów wirtualnych, promować je jako nową formę dochodowej rozrywki czy też znaleźć złoty środek poprzez regulacje rynkowe?"
 synth.1010.a: "Zakażcie silnie uzależniających wirtualnych światów."
 synth.1010.b: "Promujcie te wirtualne raje."
 synth.1010.b.hedonist: "Nareszcie! Raj doskonały!"
 synth.1010.c: "Uregulujcie branżę."
 synth.1020.name: "Syntetyczne leki"
 synth.1020.desc: "Nasze nowe, syntetyczne formy uwolniły nas od cierpień i urazów organicznego ciała. Niestety, przyniosły ze sobą cały nowy zestaw problemów, od prostych mechanicznych awarii po zagrażającą życiu niestabilność serwerów, problemy z łącznością i cyfrowe wirusy.\n\nCzy powinniśmy się skupić na chronieniu naszych cyfrowych umysłów i uznać ciało za łatwy do zastąpienia towar, czy też zapewnić mu więcej uwagi jako przedłużeniu naszej tożsamości?"
 synth.1020.a: "Musimy nadal chronić ciało."
 synth.1020.a.spiritual: "Ciało to święty nośnik duszy."
 synth.1020.b: "Skupcie się na ochronie umysłu."
 synth.1020.b.spiritual: "Wyszliśmy już poza granice naszej fizycznej formy."
 synth.1020.c: "Kluczem jest równowaga."
 synth.1020.d: "Te nowe schorzenia zapewniają duży potencjał do rozwoju..."
 synth.1030.name: "Odrodzenie"
 synth.1030.desc: "Staliśmy się szybsi, lepsi, silniejsi. Ale wystawianie syntetycznych ciał na niebezpieczne sytuacje wciąż niesie ze sobą koszt mentalny. Świadomość, że umysł można przywrócić, może zmniejszać traumę, nie usuwa jej jednak całkowicie, zwłaszcza że pomyślność tego procesu nie jest gwarantowana. Podobnie nowych ciał nie da się wziąć ot, tak, znikąd.\n\nMożemy zlekceważyć traumę psychologiczną, aby wycisnąć maksimum z syntetyków, lub poskromić nasze ambicje, by nie zaszkodzić zdrowiu umysłowemu ludności."
 synth.1030.a: "Działajcie nadal na granicy możliwości."
 synth.1030.b: "Zachowajcie ostrożność."
 synth.1030.c: "Elita nie powinna być narażona na ryzyko."
 #FINAL EVENT #
 synth_virtual_trait: "\n[owner.species.GetNamePlural] otrzymują cechę: §Y$trait_robot_digital_1$§!\nCechę §Y$leader_trait_synthetic$§! przywódców zastępuje cecha §Y$leader_trait_virtual$§!"
 synth_physical_traits: "\nOdblokowuje cechy §Yzaawansowane§! w modyfikacjach gatunku."
 #DEMOCRATIC
 synth.1505.name: "Syntetyczne społeczeństwo"
 synth.1505.desc.physical: "Nie jest naszym zamiarem kompletna eliminacja indywidualności. Możemy korzystać ze zdobyczy syntetyzacji bez nieodwracalnej utraty naszej tożsamości.\n\nZmiana, jaka zaszła, czyni swobodę przemieszczania się łatwiejszą niż kiedykolwiek. Możemy przenosić wielką liczbę naszych tożsamości do wyspecjalizowanych ciał, co pozwala obywatelom mieszkać i pracować tam, gdzie są najbardziej potrzebni."
 synth.1505.desc.virtual: "Nasze społeczeństwo wyzwoliło się od świata fizycznego i spogląda w przyszłość z mieszanką ekscytacji i lęku. Przemieniliśmy się na sposoby, które nie do końca jeszcze rozumiemy, rozpoczynamy jednak tę wielką podróż wszyscy razem.\n\nNasi obywatele mogą teraz wykorzystywać maszyny w sposób nienarażający naszej świadomości na szwank. To duża zmiana w kwestiach zarządzania wojną lub podróżami w obojętnej na nasz los kosmicznej próżni."
 synth.1505.desc.neutral: "Wahanie jest rzeczą zrozumiałą w obliczu niemożliwej do pojęcia zmiany. Wielu z nas bardziej obawia się tego, co może stracić, niż cieszy się tym, co może zdobyć. Nie możemy jednak stać bezczynnie na rozstajach - musimy poprowadzić nasze społeczeństwo ku przyszłości.\n\nMoże to oznaczać stworzenie rozmaitych, wyspecjalizowanych ciał, do których każdy będzie mógł przenosić się na żądanie, lub też wykorzystanie naszej całkowicie syntetycznej formy do łatwiejszego znoszenia trudów podróży kosmicznych czy wojen."
 synth.1505.a: "Ułatwmy przenoszenie się między fizycznymi ciałami."
 synth.1505.a.tt: "$change_auth_tt$ ['concept_auth_synth_democratic_physical'] $synth_physical_traits$"
 synth.1505.b: "Niech walczą za nas surogaci."
 synth.1505.b.tt: "$change_auth_tt$ ['concept_auth_synth_democratic_virtual'] $synth_virtual_trait$"
 synth.1505.c: "$synth_keep_auth_option$"
 synth.1505.c.tt: "$keep_auth_tt$ ['concept_auth_democratic']"
 #OLIGARCHIC
 synth.1510.name: "Syntetyczne społeczeństwo"
 synth.1510.desc.physical: "Nasze syntetyczne społeczeństwo, ulepszone syntetyczne ciała i powszechny sentyment kierują nas na bardziej konserwatywną ścieżkę syntetyzacji. Nasza ludność zachowa szytą na miarę fizyczną formę i będzie mogła wymieniać się ciałami z niemal całkowitą swobodą.\n\nPozwoli to naszym co bardziej doświadczonym urzędnikom tymczasowo przejmować kontrolę nad ich mniej wydajnymi kolegami, co znacząco poprawi sprawność biurokracji."
 synth.1510.desc.virtual: "Jesteśmy gotowi wykonać kolejny logiczny krok w syntetycznej rewolucji - jest nim rozpoczęcie w pełni wirtualnego istnienia.\n\nTymczasowe ciała mogą wykonywać zadania w świecie fizycznym, większość ludności chce jednak przejść w bardziej niematerialny stan istnienia.\n\nPozwoli to na szybkie i wydajne wykonywanie rozkazów. Zmniejszy też znacząco potrzebę nadzoru rządowego."
 synth.1510.desc.neutral: "Dostosowaliśmy wszystkie aspekty naszego społeczeństwa do syntetycznego życia. Dane dotyczące korzyści z dalszej specjalizacji nie dostarczają jednak definitywnego rozstrzygnięcia.\n\nMożemy stworzyć tylne furtki tożsamościowe, które pozwolą nadzorującym urzędnikom przejmować ciała nieefektywnych podwładnych, lub też opracować sieciowy interfejs wirtualny, który pozwoli nadzorować wiele projektów rządowych naraz bez żadnych opóźnień."
 synth.1510.a: "Pozwólcie urzędnikom przejmować kontrolę nad niewydajnymi kolegami."
 synth.1510.a.tt: "$change_auth_tt$ ['concept_auth_synth_oligarchic_physical'] $synth_physical_traits$"
 synth.1510.b: "Wdrożcie całkowity nadzór wirtualny."
 synth.1510.b.tt: "$change_auth_tt$ ['concept_auth_synth_oligarchic_virtual'] $synth_virtual_trait$"
 synth.1510.c: "$synth_keep_auth_option$"
 synth.1510.c.tt: "$keep_auth_tt$ ['concept_auth_oligarchic']"
 #DICTATORIAL
 synth.1515.name: "Syntetyczne społeczeństwo"
 synth.1515.desc.physical: "Nasi obywatele nie boją się uczciwej, fizycznej pracy. Robotnicy zostali połączeni w sieć i mogą teraz zdalnie kontrolować wiele ciał, co znacząco zwiększy normy produkcyjne.\n\nStanowi to wyraźny sygnał, że nasz najwyższy władca, §Y[From.GetRulerTitle] [From.GetRulerName]§!, słusznie cieszy się naszym szacunkiem."
 synth.1515.desc.virtual: "Obywatele gotowi są odrzucić swoją fizyczną formę na rzecz świadomości cyfrowej. Skłonni są kontynuować swoje istnienie w całkowicie wirtualnym środowisku.\n\nPonieważ odrzucili w ten sposób niezależne postrzeganie świata, mamy całkowitą kontrolę nad ich rzeczywistością, co zwiększa pozytywne nastawienie do rządu. Populacja zgadzająca się z przywódcami to filar silnego narodu."
 synth.1515.desc.neutral: "Populacja §Y[root.GetSpeciesAdj&genitive]§! pozostaje niezdecydowana co do tego, jaką formę powinna przybrać nasza cyfrowa świadomość. Co bardziej konserwatywne głosy nawołują, abyśmy pozostali silnie związani z naszymi fizycznymi ciałami, inni zaś gardzą tym rozwiązaniem, twierdząc, że to zatrzymanie się w połowie drogi między starym a nowym.\n\nDecyzję musimy zatem podjąć my. Skupienie się na świecie fizycznym pozwoliłoby pojedynczemu robotnikowi kontrolować wiele ciał, lecz istnienie wirtualne umożliwiłoby nam kontrolę społeczeństwa na bezprecedensową skalę."
 synth.1515.a: "Stwórzcie neurozsynchronizowane ciała robotnicze."
 synth.1515.a.tt: "$change_auth_tt$ ['concept_auth_synth_dictatorial_physical'] $synth_physical_traits$"
 synth.1515.b: "Manipulujcie opinią społeczną w wirtualnej przestrzeni."
 synth.1515.b.tt: "$change_auth_tt$ ['concept_auth_synth_dictatorial_virtual'] $synth_virtual_trait$"
 synth.1515.c: "$synth_keep_auth_option$"
 synth.1515.c.tt: "$keep_auth_tt$ ['concept_auth_dictatorial']"
 #IMPERIAL
 synth.1520.name: "Syntetyczne społeczeństwo"
 synth.1520.desc.physical: "Imperium popiera ulepszanie naszych nowych, syntetycznych ciał.\n\nTe nowe formy umożliwią rozmontowanie pozytronowych mózgów w celu pozyskania śladów wiedzy naszej niedawno zmarłej elity. Jako słudzy imperium z pewnością tego by chcieli."
 synth.1520.desc.virtual: "Obywatele §Y[From.GetSpeciesAdj&genitive]§! chcą iść jeszcze dalej i wolą całkowicie wirtualną egzystencję od półśrodków materialnego świata. To doniosłe wydarzenie poniesie się głośnym echem, które zabrzmi w naszej dalekiej przyszłości. Poprawiając szybkość i zasięg transferu tożsamości, jesteśmy w stanie szybko zastępować zniszczone syntetyczne ciała podczas niebezpiecznych misji.\n\nTe nowe metody działania z pewnością zwiększą naszą wydajność w rozmaitych sytuacjach bojowych i pozwolą nam demonstrować chwałę §Y[From.GetSpeciesAdj&genitive]§! imperium!"
 synth.1520.desc.neutral: "Imperium §Y[From.GetSpeciesAdj&genitive]§! jest na rozstajach. Niektórzy twierdzą, że szyte na miarę fizyczne ciała zapewnią nam bezpieczeństwo i wewnętrzny spokój, inni zaś uważają, że należy w pełni wykorzystać syntetyzację i wszystko, co z nią związane.\n\nSkupienie się na fizycznych aspektach pozwoli nam wykorzystać wiedzę zniszczonych niedawno dygnitarzy w badaniach naukowych. Alternatywą jest ścieżka wirtualnej egzystencji i masowe zastępowanie zniszczonych syntetycznych ciał drogą gwałtownego transferu tożsamości."
 synth.1520.a: "Wykorzystajcie umysły zmarłych przywódców."
 synth.1520.a.tt: "$change_auth_tt$ ['concept_auth_synth_imperial_physical']"
 synth.1520.b: "Stwórzcie łatwe do zastąpienia fizyczne ciała."
 synth.1520.b.tt: "$change_auth_tt$ ['concept_auth_synth_imperial_virtual']"
 synth.1520.c: "$synth_keep_auth_option$"
 synth.1520.c.tt: "$keep_auth_tt$ ['concept_auth_imperial']"
 #CORPORATE
 synth.1525.name: "Syntetyczne społeczeństwo"
 synth.1525.desc.physical: "Nasze działy: marketingu i badawczy opracowały innowację w zakresie zastosowania sztucznej inteligencji dla dobra naszych klientów. Zrównoważone podejście do nowego, syntetycznego istnienia pozwala nam na opracowanie produktów wykorzystujących świat wirtualny do generowania korzyści w świecie fizycznym.\n\nMożemy teraz umieszczać w przedmiotach ograniczoną SI, co w efekcie czyni je żywymi. Ten nowy segment produktów można specjalizować na rzecz określonych konsumentów, sektora prywatnego i innych zainteresowanych z całej galaktyki."
 synth.1525.desc.virtual: "Nasze oddanie sprawie tworzenia przestrzeni wirtualnej doprowadziło do powstania zupełnie nowej linii produktów zbudowanych na bazie wspomnień. Technicy z naszych filii są w stanie pozyskiwać elementy pamięci od ochotników niezależnie od fenotypu.\n\nZapisy te są następnie dokładnie badane przez nasz wydział szpiegowski, co pozwala nam zdobyć przewagę w tym zakresie nad innymi imperiami. Na koniec wspomnienia te są wykorzystywane w procesach tworzenia naszych syntetycznych umysłów i znakomicie zwiększają ich wydajność."
 synth.1525.desc.neutral: "Przeprowadziliśmy uważną analizę kosztów i korzyści, lecz w wyborze między fizyczną a wirtualną specjalizacją procesu syntetyzacji nie ma wyraźnego faworyta. Nie możemy jednak stale zwlekać z decyzją - musimy przedstawić akcjonariuszom wyraźną drogę naprzód.\n\nSkupienie na świecie fizycznym zapewnia możliwość umieszczania w przedmiotach ograniczonej SI i sprzedawania ich jako uproszczonych form życia. Inwestycja w świat wirtualny pozwoliłaby nam uczynić towar ze wspomnień i wzorców myślowych."
 synth.1525.a: "Rozpocznijcie sprzedaż bytów z ograniczoną SI."
 synth.1525.a.tt: "$change_auth_tt$ ['concept_auth_synth_corporate_physical'] $synth_physical_traits$"
 synth.1525.b: "Uczyńcie wspomnienia towarem."
 synth.1525.b.tt: "$change_auth_tt$ ['concept_auth_synth_corporate_virtual'] $synth_virtual_trait$"
 synth.1525.c: "$synth_keep_auth_option$"
 synth.1525.c.tt: "$keep_auth_tt$ ['concept_auth_corporate']"
