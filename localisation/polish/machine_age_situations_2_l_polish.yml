 #Buildings
 building_identity_complex: "Kompleks tożsamościowy"
 building_identity_complex_desc: "Supernowoczesne centrum badań nad rozwojem syntetycznych tożsamości."
 building_identity_complex_speed: "§G+100§! £pop£ §Hpopulacji§!"
 building_identity_complex_effect_desc: "Populacje przesyłane na miesiąc: $building_identity_complex_speed$."
 building_ai_emporium: "Świat SI"
 building_ai_emporium_desc: "Megakompleks, w którym kupisz wszystko, czego możesz potrzebować w związku z SI. Niech samoświadoma sztuczna inteligencja przemieni zwykłe przedmioty w sprytnych towarzyszy w twoim domu lub filmie. SI stała się nieco zbyt samoświadoma? Przynieś ją do nas, a nasi utalentowani technicy zresetują ją szybciej, niż okręt opuszcza podświetlną."
 building_ai_emporium_fail_tt: "$TRIGGER_FAIL$ §Y[planet.owner.GetName]§! - jest tu już §Y$building_ai_emporium$§!."
 building_ai_emporium_outlawed_robots_tt: "$TRIGGER_FAIL$§Y[planet.owner.GetName]§! posiada zakazane roboty"
 building_clear_thought_clinic: "Klinika czystej myśli"
 building_clear_thought_clinic_desc: "Masz niepotrzebne już wspomnienia? Zmień je w kredyty energetyczne! Nasz wyszkolony zespół usunie je bezpiecznie i bez ryzyka wycieków! Im radośniejsze wspomnienie, tym większa wypłata!\n\nOperacja jest nieodwracalna - wzorce myślowe nie mogą zostać przywrócone po ekstrakcji."
