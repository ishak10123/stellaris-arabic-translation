 #Modifiers
 synth_opposition_truth: "Kampania informacyjna o syntetyzacji"
 synth_opposition_truth_desc: "Zgodne z prawdą informacje o wszelkich aspektach syntetyzacji."
 synth_opposition_deception: "Kampania propagandowa o syntetyzacji"
 synth_opposition_deception_desc: "Wpływająca na publiczną narrację kampania podkreślająca pozytywne aspekty syntetyzacji umysłów."
 synth_tinkering_with_minds: "Majstrowanie przy umysłach"
 synth_tinkering_with_minds_desc: "Nowo scyfryzowane umysły przechodzą umiarkowane przeprogramowanie zgodne z naszą wizją przyszłości."
 synth_brightest_minds: "Najmądrzejsi są najważniejsi"
 synth_brightest_minds_desc: "Tylko najbardziej wyjątkowe osoby zostają wybrane do naszego programu syntetyzacji."
 synth_reprogram_minds: "Opresyjne przeprogramowywanie"
 synth_reprogram_minds_desc: "Rząd na szeroką skalę przeprogramowuje \"niepasujące\" jednostki w miarę ich cyfryzacji."
 victim_compensation: "Rekompensata dla ofiar"
 victim_compensation_desc: "Rekompensata dla rodzin osób, których umysły nie przetrwały procesu syntetyzacji."
 synth_mandatory_volunteers: "Przymusowi ochotnicy"
 synth_mandatory_volunteers_desc: "Obiekty badawcze zmuszane są do uczestnictwa w eksperymentach nad cyfryzacją świadomości biologicznej."
 synth_mass_demonstrations: "Masowe demonstracje"
 synth_mass_demonstrations_desc: "Siła robocza planety zajęta jest masowymi protestami przeciwko planowanej przemianie w maszyny."
 synth_fund_heritage_sites: "Finansowanie miejsc dziedzictwa"
 synth_fund_heritage_sites_desc: "Stworzone zostaną specjalne miejsca dziedzictwa, które ograniczą wpływ przemian w syntetyki na biologicznych członków naszego gatunku."
 synth_revere_the_past: "Cześć wobec przeszłości"
 synth_revere_the_past_desc: "Rytuały religijne zrodzone z naszego biologicznego istnienia wciąż są dla nas ważne. Musimy chronić te miejsca czci."
 synth_preserve_the_past: "Troska o przeszłość"
 synth_preserve_the_past_desc: "Pełne oddanie się nowemu istnieniu nie oznacza, że powinniśmy niszczyć miejsca i obiekty, które nadały naszej biologicznej przeszłości sens."
 synth_resistance_fight: "Obława na przywódców ruchu oporu"
 synth_resistance_fight_desc: "Wysłanie naszych zespołów maszynowych w miejsce, w którym znajdują się przywódcy ruchu oporu - $d_biological_enclaves_no_icon$ - szybko stłumi wszelkie głosy sprzeciwu."
 synth_resistance_diplomacy: "Dyplomacja wobec przywódców ruchu oporu"
 synth_resistance_diplomacy_desc: "$d_biological_enclaves_no_icon$ to miejsce pobytu przywódców ruchu oporu. Odwiedziny u nich pozwolą nam na wzajemne zrozumienie."
 synth_character_force: "Imitacja dawnej organicznej formy"
 synth_character_force_desc: "Tradycyjne kształty naszego gatunku pozostają zachowane również w świecie cyfrowym."
 synth_character_customize: "Nieograniczona modyfikacja syntetycznych ciał"
 synth_character_customize_desc: "Poszczególne osobniki mogą swobodnie modyfikować swój nowy, cyfrowy wygląd."
 synth_character_customize_elite: "Ograniczona modyfikacja syntetycznych ciał"
 synth_character_customize_elite_desc: "W celu zachowania jasnej hierarchii społecznej tylko najwyższa warstwa ma prawo do modyfikacji wyglądu."
 synth_character_customize_corpo: "Zmonetyzowana modyfikacja syntetycznych ciał"
 synth_character_customize_corpo_desc: "Każdy ma prawo zmodyfikować swój cyfrowy wygląd - o ile go na to stać."
 synth_cravings_imperfections: "Umyślnie wprowadzone syntetyczne niedoskonałości"
 synth_cravings_imperfections_desc: "W celu uniknięcia pustego, bezosobowego istnienia syntetyczne ciała posiadają celowo niedoskonałe funkcje."
 synth_cravings_simulation: "Życie w symulacji"
 synth_cravings_simulation_desc: "Pragniemy zapewnić osobom zamieszkałym w symulacji możliwie autentyczne istnienie - wliczając w to codzienne trudy."
 synth_cravings_stop: "Ignorowanie organicznych twardogłowych"
 synth_cravings_stop_desc: "Z czasem nasz lud doceni swoje doskonałe życie wolne od organicznych trudów."
 synth_cravings_pain: "Wirtualna arena bitewna"
 synth_cravings_pain_desc: "Udział w bolesnych walkach wirtualnych zapewnia znajome doznania zarówno uczestnikom, jak i widzom."
 synth_health_physical: "Skupienie na zdrowiu fizycznym syntetyków"
 synth_health_physical_desc: "Nasza opieka zdrowotna dla syntetyków skupi się na usuwaniu lokalnych awarii."
 synth_health_virtual: "Skupienie na zdrowiu psychicznym syntetyków"
 synth_health_virtual_desc: "Zapewnienie bezpieczeństwa naszych umysłów poprzez stałe aktualizacje oprogramowania jest kluczowe dla naszego zdrowia."
 synth_health_both: "Zrównoważona opieka zdrowotna nad syntetykami"
 synth_health_both_desc: "Dla dobra naszego ludu istotna jest naprawa zarówno niestabilności sprzętowych, jak i programowych."
 synth_health_corporate: "Medycyna syntetyków"
 synth_health_corporate_desc: "Poszerzenie specjalizacji naszej korporacji poza tradycyjne kwestie medyczne jest kluczowe w leczeniu wirusów cyfrowych."
 synth_virtual_world_outlaw: "Zakazane wirtualne światy"
 synth_virtual_world_outlaw_desc: "Wysoce uzależniające centra zostały zakazane - stanowią zagrożenie dla społeczeństwa."
 synth_virtual_world_promote: "Promowane wirtualne światy"
 synth_virtual_world_promote_desc: "Nasz lud może swobodnie korzystać z nieograniczonych właściwie rozrywek cyfrowej utopii."
 synth_virtual_world_regulate: "Regulowane wirtualne światy"
 synth_virtual_world_regulate_desc: "Wysoce uzależniające wirtualne centra podlegają ścisłej regulacji w celu zapewnienia, że ludność pozostanie w łączności z rzeczywistością."
 synth_home_centralized: "Scentralizowane farmy serwerów"
 synth_home_centralized_desc: "Każda cyfrowa świadomość przechowywana jest na rządowych centralnych farmach serwerów. Zapewnia to maksymalne obniżenie kosztów."
 synth_home_distributed: "Dystrybuowane serwery domowe"
 synth_home_distributed_desc: "Cyfrowe świadomości przechowywane są w tradycyjnych prywatnych posiadłościach."
 synth_digital_homes: "Nieruchomości cyfrowe"
 synth_digital_homes_desc: "Przypominające tradycyjne domy nieruchomości cyfrowe zapewniają niemal identyczny przychód przy ułamku kosztów."
 synth_respawn_push: "Rozluźnione standardy bezpieczeństwa dla syntetyków"
 synth_respawn_push_desc: "Obniżone standardy bezpieczeństwa zapewniają siłę gospodarce."
 synth_respawn_caution: "Standardy bezpieczeństwa dla syntetyków"
 synth_respawn_caution_desc: "Ochrona syntetycznych ciał i umysłów jest możliwa tylko przy obecności ścisłych rządowych wytycznych."
 synth_respawn_elite: "Przywilej bezpieczeństwa dla syntetyków"
 synth_respawn_elite_desc: "Górna warstwa społeczna nie ma pozwolenia na pracę przy zadaniach stanowiących ryzyko dla ciała lub umysłu."
 synth_cultural_exchange: "Kulturowe zrozumienie"
 synth_cultural_exchange_desc: "Programy wymiany kulturowej z naszymi miejscami dziedzictwa pozwalają mieszkańcom naszego imperium rozumieć się nawzajem."
 synth_combat_reactors: "Reaktory bojowe"
 synth_combat_reactors_desc: "Do naszych maszynowych ciał dodana została nowa technologia mikrofuzji zapewniająca znacznie większą skuteczność w walce."
 synth_AI_actor: "Rzecznik z SI"
 synth_AI_actor_desc: "Używamy korzystającej z SI kopii zmarłego celebryty do budowania wsparcia dla naszej trwającej akcji syntetyzacji."
 #Deposits
 d_old_towns_no_icons: "Stare miasta"
 d_old_towns: "£blocker£ $d_old_towns_no_icons$"
 d_old_towns_desc: "Region ten zdominowany jest przez dobrze zachowane miasta, które zamieszkują osobniki naszego pierwotnego gatunku. Wydatkując odpowiednio zasoby, możemy przekonać te niedobitki do przemiany w maszyny."
 d_old_towns_custom_tooltip: "Stworzono: §Y[Owner.GetNumSynthOpposition] [Owner.GetMechanicalPopOrPops]§!"
 d_biological_enclaves_no_icon: "Biologiczne enklawy"
 d_biological_enclaves: "£blocker£ $d_biological_enclaves_no_icon$"
 d_biological_enclaves_desc: "Region ten zdominowany jest przez miasta, które zamieszkują osoby niegodzące się na przemianę w syntetyki."
 d_biological_enclaves_custom_tooltip: "Stworzono: §Y[Owner.GetNumSynthOpposition] [Owner.GetMechanicalPopOrPops]§!"
 #Policies
 policy_synthetic_identities_policy: "Tożsamości syntetyczne"
 policy_synthetic_identities_policy_desc: "Jeśli mamy się rozmnażać, stworzone zostać muszą nowe syntetyczne tożsamości."
 identity_copy_name: "Kopia tożsamości"
 identity_copy: "$identity_copy_name$"
 identity_copy_desc: "$tech_identity_copy_desc$\n\nKopie doświadczają jedynie lekkiego smutku spowodowanego brakiem wyjątkowości.\n\n$TECH_UNLOCK_IDENTITY_COPY_DESC$\n\n§E$identity_copy_name$ $can_enable_mind_creation$§!"
