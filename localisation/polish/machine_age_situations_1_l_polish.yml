 situation_cyberization_hive: "Cybernetyzacja"
 situation_cyberization_hive_type: "Problem rozwoju"
 situation_cyberization_hive_desc: "Umysł zbiorowy potrzebuje doskonałych ciał. Dzięki implantom cybernetycznym nasze drony można udoskonalić, ulepszyć, przemodelować.\nCzas wykroczyć poza ograniczenia naszej biologii.\n\n§YPopulacje, które w przyszłym miesiącu otrzymają implanty§!: §G[From.GetCyberPopsPerMonth]§!"
 situation_cyberization_hive_monthly_change_tooltip: "Nasze ciała staną się cybernetyczne. Będą doskonałą fuzją materii organicznej i maszyny."
 situation_cyberization_hive_outcome: "Cybernetyczna populacja."
 stage_cyberization_hive_effects: "Musimy opracować implanty cybernetyczne, zainstalować je i przemienić siebie samych."
 cyber.hive_government_shift.tt: "Wpływa na trwającą §Ycybernetyczną przemianę świadomości§!."
 situation_cyberization_culled_drones_desc: "Zniszczenie wadliwych dronów"
 situation_cyberization_researching_alternatives_desc: "Badania nad alternatywnymi implantami"
 situation_cyberization_hive_triggered_modifier: "§Y$situation_cyberization_hive$§! - dodano modyfikator sytuacji:\n"
 triggered_opinion_hive_integrated: "Zintegrowany rój"
 cyber_hive_imperfect_drones: "Niedoskonałe drony"
 cyber_hive_imperfect_drones_desc: "Wszyscy są przydatni."
 cyber_hive_recycling_implants: "Recykling implantów"
 cyber_hive_recycling_implants_desc: "Stare implanty na nowe drony."
 cyber_hive_recycling_everything: "Ponura wydajność"
 cyber_hive_recycling_everything_desc: "Nic nie jest święte. Nic się nie zmarnuje."
 cyber_hive_cyber_babies: "Cybernetyczna młodzież"
 cyber_hive_cyber_babies_desc: "Nowe drony w chwili narodzin otrzymują wszczepy."
 cyber_hive_no_cyber_babies: "Stopniowa cybernetyzacja"
 cyber_hive_no_cyber_babies_desc: "Wszczepy są instalowane stopniowo, co ogranicza szkody wyrządzane nie do końca rozwiniętym dronom."
 cyber_hive_no_individual_drones: "Zakaz indywidualności"
 cyber_hive_no_individual_drones_desc: "Surowy zakaz posiadania wyróżniających się rzeczy osobistych."
 cyber_hive_individual_drones: "Autoekspresja"
 cyber_hive_individual_drones_desc: "Drony mogą wyrażać swoją indywidualność."
 cyber_hive_individual_leader_drones: "Ograniczona autoekspresja"
 cyber_hive_individual_leader_drones_desc: "Dla naszych dronów najrzadszy z darów: poczucie odrębności."
 ### AUTHORITIES ###
 #VOLITIONAL
 auth_cyber_hive_volitional: "Rój wolicjonalny"
 auth_cyber_hive_volitional_desc: "Każdy dron jest indywidualnością. Każda myśl to nowa perspektywa, którą kolektyw musi przemyśleć. Niezliczone umysły tworzą rój dużo bogatszy niż suma jego części."
 concept_auth_cyber_hive_volitional: "$auth_cyber_hive_volitional$"
 gov_cyber_hive_volitional: "$auth_cyber_hive_volitional$"
 gov_cyber_hive_volitional_desc: "$auth_cyber_hive_volitional_desc$"
 #INTEGRATED
 auth_cyber_hive_integrated: "Rój zintegrowany"
 auth_cyber_hive_integrated_desc: "Każdy błąd został naprawiony, każda anomalia stłumiona, każdy brak jedności wygaszony. Kontrola umysłu zbiorowego jest absolutna: jedna wspólna świadomość i niezliczone ciała, które spełniają jej wolę."
 concept_auth_cyber_hive_integrated: "$auth_cyber_hive_integrated$"
