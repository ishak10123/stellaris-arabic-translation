 gov_cyber_corporate_individualist_desc: "$auth_cyber_corporate_individualist_desc$"
 concept_auth_cyber_corporate_individualist: "$auth_cyber_corporate_individualist$"
 #Cyber Corporate Collectivist
 auth_cyber_corporate_collectivist: "Korporacyjna kaizen"
 auth_cyber_corporate_collectivist_desc: "Kaizen, pragnienie stałego rozwoju, to doskonała filozofia dla współczesnego środowiska programistycznego i sprzętowego. Szeroki wachlarz dostępnych ulepszeń pozwala naszym klientom na kolejne osiągnięcia i dążenie do społecznej synergii.\n\nUlepszenia zawierają też tajny moduł pozwalający monitorować aktywność wszystkich użytkowników połączonych z sieciami baz gwiezdnych. Znaczne zyski zapewniane przez te ulepszenia doprowadzają jednak zapewne do powstania nielegalnego rynku sprzedaży wtórnej."
