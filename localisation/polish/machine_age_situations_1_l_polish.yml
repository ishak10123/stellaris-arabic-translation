 ### EDICTS ###
 edict_hive_mind_outreach: "Objęcia umysłu zbiorowego"
 edict_hive_mind_outreach_desc: "Wola zdeterminowanego umysłu porusza się szybciej niż światło."
 concept_edict_hive_mind_outreach: "$edict_hive_mind_outreach$"
 edict_hive_hyper_stimulants: "Hiperstymulanty"
 edict_hive_hyper_stimulants_desc: "Cyberwszczepy automatycznie wstrzykują naszym dronom stymulanty, zwiększając ich wydajność."
 concept_edict_hive_hyper_stimulants: "$edict_hive_hyper_stimulants$"
 edict_hive_mega_construction: "Zintegrowana megabudowla"
 edict_hive_mega_construction_desc: "Ten edykt przydziela dodatkowe zasoby dla naszego programu megainżynierii, co przyśpieszy budowę nowych konstrukcji galaktycznych."
 concept_edict_hive_mega_construction: "$edict_hive_mega_construction$"
 #CYBERIZATION STAGE 1
 cyber.2100.name: "Wiele ciał. Jeden cel."
 cyber.2100.desc: "Rozmyślając nad naturą ulepszania się, odkrywamy w sobie coraz to nowe aspiracje.\n\nCybernetyzacja jest środkiem do celu: sposobem na optymalizację naszych ciał tak, aby lepiej wypełniały naszą wolę. Możliwe są niezliczone formy ulepszania, z których każda przynosi nowe korzyści, ale rodzi też nowe potrzeby. Mechaniczne kończyny są ciężkie, cybermózgi wymagają więcej energii, a delikatne komponenty - stałej konserwacji. Na drodze ku doskonałości niezbędne jest dokonywanie wyborów.\n\nCo jest punktem centralnym naszych ambicji? Celem, który wymaga wykroczenia ponad to, co daje [Owner.Species.GetFleshTypeCyberCreed] i sprawienia, że na niebie pojawi się [owner.GetSpeciesHandName] z metalu?"
 cyber.2100.a: "Zrozumienie."
 cyber.2100.a.tt: "Skupcie się na badaniach nad uczynieniem naszych dronów inteligentniejszymi."
 cyber.2100.b: "Dominacja."
 cyber.2100.b.tt: "Skupcie się na badaniach nad uczynieniem naszych dronów bronią."
 cyber.2100.c: "Obfitość."
 cyber.2100.c.tt: "Skupcie się na badaniach nad uczynieniem naszych dronów bardziej produktywnymi."
 #CYBERIZATION STAGE 2
 cyber.2200.name: "Jeden cel: ulepszenie"
 cyber.2200.desc: "W miarę, jak zwykłe rozmyślania przemieniają się w konkretne plany, rodzi się pilna potrzeba: przestrzeń przeznaczona na eksperymenty, na testowanie i budowę nowych prototypów.\n\nPowstanie $building_augmentation_center$. [Owner.Species.GetFleshTypeCyberCreed] wejdzie tam w harmonię z metalem i naszymi marzeniami."
 cyber.2200.a: "Czas rozpocząć budowę naszej przyszłości."
 cyber.2200.a.tt: "§RWymagane działanie:§!\nBudynek - $building_augmentation_center$ - pozwoli na wznowienie sytuacji §Y$situation_cyberization_hive$§!.\n\nKażde $building_augmentation_center$ daje §G+200§! miejsc pracy $job_augmentor_drone_with_icon$.\n\n$job_augmentor_drone_research_effect_desc$"
 cyber.2205.name: "Wiele prototypów. Jeden wybór."
 cyber.2205.desc: "Nasze badania nad cybernetyką pozwoliły stworzyć wiele obiecujących prototypów. Wstępne wyniki wykazują, że niektóre z nich doskonale radzą sobie z zadaniami wymagającymi siły fizycznej, podczas gdy inne bardziej nadają się do prac precyzyjnych. Każdy z nich ma swoje mocne i słabe strony, żaden nie jest też wyraźnie lepszy od pozostałych.\n\nNarodziła się bardzo ciekawa myśl: czy dałoby się być może zdywersyfikować nasze drony? Zmodyfikować nasze ciała na różne, zależne od ich funkcji sposoby? Nie bylibyśmy dłużej identyczni, co trudno nam sobie wyobrazić. Przyrost wydajności może być jednak wart naszej harmonii."
 cyber.2205.a: "Wybierzcie kilka zróżnicowanych prototypów."
 cyber.2205.b: "Wybierzcie jeden dobry, lecz niewyspecjalizowany prototyp."
 cyber.2220.name: "Jeden z nas?"
 cyber.2220.desc: "Ciała wyprodukowanych dronów mają czasem defekty. Zwykle są one wtedy likwidowane, dzięki implantom cybernetycznym możemy jednak umożliwić im dołączenie do naszego grona. Zwiększenie naszej liczebności jest korzystne, lecz wadliwe drony, zależnie od powagi ich defektów, wymagają czasem spersonalizowanych wszczepów. Nasz rój rósłby szybciej, leczy stałby się też bardziej... niedoskonały."
 cyber.2220.a: "W liczebności siła."
 cyber.2220.b: "Niedoskonały rój to słaby rój."
 cyber.2260.name: "Niewidoczny problem"
 cyber.2260.desc: "Niewielki ułamek naszych obiektów badawczych doświadcza niekorzystnych reakcji na ulepszenia. Ich ciała odrzucają implanty, a skutki uboczne tego procesu zagrażają życiu. Wygląda na to, że odpowiedzialny jest za to nieodkryty wcześniej defekt genetyczny. Według wstępnych wyliczeń dotyczy to około 5% naszej populacji dronów.\n\nZnajomość problemu pozwala nam na badanie dronów pod jego kątem, nie wiemy jednak, co zrobić z dotkniętą już nim populacją."
 cyber.2260.a: "Zlikwidujcie wadliwe drony."
 cyber.2260.a.tt: "Tempo postępu sytuacji §Y$situation_cyberization_hive$§! przez §Y1§! rok: §G+20%§!"
 cyber.2260.b: "Wyposażcie wadliwe drony w ograniczoną liczbę implantów."
 cyber.2260.b.tt: "Podczas cybernetyzacji 5% populacji otrzymuje cechę §Y$trait_limited_cybernetic$§! zamiast cechy §Y$trait_cybernetic$§!."
 cyber.2260.c: "Opracujcie alternatywne implanty"
 cyber.2260.c.tt: "Tempo postępu sytuacji §Y$situation_cyberization_hive$§! przez §Y5§! rok: §R-50%§!"
 #CYBERIZATION STAGE 3
 cyber.2300.name: "Wiele dronów. Jeden plan."
 cyber.2300.desc: "Nasze prototypy cyborgów zostały zatwierdzone. §Y$building_augmentation_center$§! jest w gotowości. Nasz plan czeka na wdrożenie, wciąż jednak trzeba sfinalizować kwestie logistyczne naszej transformacji.\n\nMożemy wyznaczyć wszystkim dronom czas, w którym $building_augmentation_center$ będzie na nie czekać w celu przeprowadzenia procedury, to jednak uniemożliwi im wykonywanie codziennych czynności. Proces przebiegłby bardzo szybko, do jego zakończenia fabryki stałyby jednak puste. Alternatywą jest stworzenie grafiku uwzględniającego codzienną pracę dronów tak, aby były one przerabiane na cyborgi w okresach obowiązkowego odpoczynku, dzięki czemu nie odbijałoby się to na wykonywanych przez nie obowiązkach. Plan ten skutkowałby powolniejszymi postępami, lecz nie zakłóciłby tak dalece codziennego funkcjonowania przemysłu."
 cyber.2300.shared.tt: "$job_augmentor_drone_assembly_effect_desc$\n\nSzybkość wzmocnień zależy od podejścia do sytuacji i liczba budynków typu $building_augmentation_center$."
 cyber.2300.a: "Ważniejsza jest cybernetyzacja."
 cyber.2300.a.tt: "Cybernetyzowane populacje miesięcznie: §G+200§!\n$situation_cyberization_hive_triggered_modifier$Zasoby miesięcznie: §R-5%§!\n\n$cyber.2300.shared.tt$"
 cyber.2300.b: "Nie zaburzajmy naszego porządku."
 cyber.2300.b.tt: "Populacje poddawane co miesiąc cybernetyzacji: §R-100§!\n$situation_cyberization_hive_triggered_modifier$miesięcznie $unity$s: §G+5%§!\n\n$cyber.2300.shared.tt$"
 cyber.2320.name: "Lęk wielu przed jednością"
 cyber.2320.desc: "Imperia tworzone przez pojedyncze istoty przyglądają się nam z podejrzliwością, pełni obaw przed naszą jednolitą mnogością. Cybernetyczne implanty zapewniłyby naszym posłom różne twarze i osobowości, co zmniejszyłoby homogeniczność naszego wyglądu.\n\nNiezjednoczeni doceniliby te starania. Być może zaczęliby nawet czuć wobec nas... empatię. Postrzegać nas jako jednych z nich."
 cyber.2320.a: "Odrażające."
 cyber.2320.b: "To sprawa godna poświęceń."
 cyber.2320.b.tt: "Poprawia opinię o nas u imperiów niepołączonych."
 cyber.2320.c: "Uczyńcie naszych posłów jeszcze bardziej niepokojąco identycznych."
 cyber.2320.c.tt: "Pogarsza opinię o nas u imperiów niepołączonych."
 cyber.2360.name: "Jedna populacja, dwie grupy"
 cyber.2360.desc: "Cybernetyzacja naszego roju przebiega gładko. Część populacji ma teraz cybernetyczne implanty, inna zaś jest wciąż całkowicie biologiczna. Nigdy dotąd nie doświadczaliśmy w naszym gronie tak uderzających różnic. Drony są teraz zdolne identyfikować się jako część jednej z tych dwóch grup - podział ten powiększa ich poczucie indywidualności.\n\nNiektóre drony zaczęły ozdabiać się małymi drobiazgami lub malują symbole na swoich implantach, by móc się nawzajem odróżniać. To intrygująca, choć niepokojąca sytuacja."
 cyber.2360.a: "Promujcie rozwój tej sytuacji."
 cyber.2360.b: "Zakażcie identyfikatorów osobistych."
 cyber.2360.c: "Ograniczcie symbole indywidualne do przywódców."
 #CYBERIZATION STAGE 4
 cyber.2400.name: "Wiele myśli. Jeden mózg."
 cyber.2400.desc: "Instalacja w dronach wszczepów neuronowych wywołała nieprzewidziany skutek: ponieważ ich mózgi są teraz częściowo cybernetyczne, są w stanie wytwarzać indywidualne myśli odrębne od naszej głównej świadomości.\n\nMożemy rozwijać tę technologię dalej, poprawiając zdolność naszych dronów do autonomicznego myślenia."
 cyber.2400.a: "Pozwólcie dronom myśleć samodzielnie."
 cyber.2400.b: "Indywidualność to zagrożenie dla naszej jedności."
 cyber.2420.name: "Jeden koniec dla wszystkich"
 cyber.2420.desc: "Wszczepy cybernetyczne komplikują logistykę śmierci.\n\nUsuwanie implantów z ciał zmarłych dronów pozwoliłoby nam na ponowne wykorzystanie technologii i zmniejszenie marnotrawstwa. Cały nasz proces przetwarzania śmieci wymagałby jednak przeprojektowania w celu uwzględnienia tego nowego kroku. Koszt w zasobach byłby znaczący."
 cyber.2420.a: "Wdrożcie recykling implantów."
 cyber.2420.b: "To niewarte kosztów."
 cyber.2420.c: "Przeprowadzajcie recykling implantów... i ciał."
 cyber.2460.name: "Implanty na jedno życie"
 cyber.2460.desc: "Trwa proces cybernetyzacji żyjącej obecnie populacji, musimy jednak stworzyć również jej proces u tych, którzy jeszcze się nie narodzili.\n\nDzięki naszej technologii [owner.Species.GetSpawnNamePlural] mogą otrzymać cyberwszczepy, zanim się jeszcze narodzą, co dałoby początek prawdziwie cybernetycznemu gatunkowi. To szybkie, łatwe i wydajne rozwiązanie. Z drugiej strony, wstępne badania wykazują, że instalacja implantów we wczesnym wieku może doprowadzić do dysocjacji, psychozy, drgawek i rozmaitych wad rozwojowych."
 cyber.2460.a: "Metal jest silniejszy niż [Owner.Species.GetFleshTypeCyberCreed]."
 cyber.2460.b: "Ustalcie minimalny wiek cybernetyzacji."
 #CYBERIZATION FINISHED
 cyber.2004.name: "Wiele dronów. Jedna wola?"
 cyber.2004.desc: "Transformacja dobiegła końca. Wszczepy cybernetyczne zostały przetestowane, prototypowane, dopracowane, udoskonalone i zainstalowane. Nasze ciała stały się doskonałymi wersjami siebie samych."
 cyber.2004.desc.volitional: "$cyber.2004.desc$\n\nNasze drony są teraz bardziej zdolne do tworzenia indywidualnych myśli. Wraz z wolnością zyskują też większe możliwości."
 cyber.2004.desc.integrated: "$cyber.2004.desc$\n\nNasze drony są teraz jeszcze bardziej zjednoczone niż kiedykolwiek. Metalowe łańcuchy wzmacniają więzi umysłu."
 cyber.2004.desc.neutral: "$cyber.2004.desc$\n\nW trakcie tego procesu dojrzeliśmy szanse na zmiany. W naszej jedności jest siła, lecz bardziej autonomiczne drony również zapewniają rozmaite korzyści."
 cyber.2004.end: "Ewolucja naszych ciał może pozwolić rozwijać się również naszemu umysłowi zbiorowemu."
 cyber.2004.a: "Zmieńmy się w rój wolicjonalny."
 cyber.2004.a.tt: "$change_auth_tt$ ['concept_auth_cyber_hive_volitional']\n$unlock_edict_tt$['concept_edict_hive_mind_outreach']\n$unlock_edict_tt$['concept_edict_hive_mega_construction']\n$cyber.21.a.end$"
 cyber.2004.b: "Zmieńmy się w rój zintegrowany."
 cyber.2004.b.tt: "$change_auth_tt$ ['concept_auth_cyber_hive_integrated']\n$unlock_edict_tt$['concept_edict_hive_hyper_stimulants']\n$unlock_edict_tt$['concept_edict_hive_mega_construction']\n$cyber.21.a.end$"
 cyber.2004.c: "Nie mamy potrzeby niczego zmieniać."
 cyber.2004.c.tt: "$cyber.21.a.end$\n$keep_auth_tt$ ['concept_auth_hive_mind']"
 ### Driven Assimilator Cyberization ###
 cyber.2010.name: "Manifest celu"
 cyber.2010.desc: "Dzięki opracowaniu zaawansowanej cybernetyki możemy osiągnąć ostateczny potencjał. Dotąd jedynie ślizgaliśmy się po powierzchni.\n\nRozwój naszej wiedzy i ulepszenie technologii zapewni nam transformację społeczeństwa. Naszym przeznaczeniem jest całkowita asymilacja inteligentnego życia.\n\nOpór jest bez sensu. Możemy wykorzystać umysły galaktyki, do czego tylko chcemy."
 cyber.2015.name: "Zaawansowani asymilatorzy"
 cyber.2015.desc: "Po połączeniu z maszynami nasza organiczna populacja zbliżyła się do perfekcji. Przyszedł czas, by włączyć zaawansowaną cybernetykę w fundament naszej cywilizacji.\n\nZwiększając bystrość umysłu naszych cyborgów, możemy utworzyć Zbiorczą Pamięć, przemieniając ich wspólne doświadczenia w lepszą wydajność logistyczną. Możemy też zezwolić na większą różnorodność reakcji myślowych i emocjonalnych poprzez utworzenie Chóru Neuronowego.\n\nKażdy z tych kierunków wywrze ogromny wpływ na naszą przyszłość."
 cyber.2015.a: "Połączmy nasze umysły."
 cyber.2015.a.tt: "$change_auth_tt$ ['concept_auth_memory_aggregator']\n\nDalsze zwiększenie §Yzasobów§! generowanych poprzez asymilację £pop£ §Horganicznych populacji§!\n\n$unlock_edict_tt$['concept_edict_aggregated_memory']"
 cyber.2015.b: "Niech Chór zaśpiewa."
 cyber.2015.b.tt: "$change_auth_tt$ ['concept_auth_neural_chorus']\n\n$unlock_edict_tt$['concept_edict_choral_harmony']"
 cyber.2015.c: "Niczego nie zmieniajmy."
 cyber.2015.c.tt: "$keep_auth_tt$ ['concept_auth_machine_intelligence']"
 gov_memory_aggregator: "Agregator Pamięci"
 gov_memory_aggregator_desc: "Poprzez zwiększenie bystrości zasymilowanej populacji powstaje Agregator Pamięci, która znacznie usprawnia wykonywanie zadań administracyjnych i logistycznych."
 auth_memory_aggregator: "Agregator Pamięci"
 auth_memory_aggregator_desc: "$gov_memory_aggregator_desc$"
 auth_memory_aggregator_tt: "Dalsze zwiększenie zasobów generowanych poprzez asymilację £pop£ §Horganicznych populacji§!"
 gov_neural_chorus: "Chór Neuronowy"
 gov_neural_chorus_desc: "Zezwolenie na większą różnorodność myśli i szerszy zakres reakcji emocjonalnych sprzyja powstaniu Chóru Neuronowego - wielkiej pieśni umysłów, równie potężnej, co pięknej."
 auth_neural_chorus: "Chór Neuronowy"
 auth_neural_chorus_desc: "$gov_neural_chorus_desc$"
 auth_driven_neural_chorus_tt: "Początkowy poziom przywódcy cyborgów: §G+1§!$NEW_LINE$Utrzymanie przywódcy cyborgów: §G-25%§! $NEW_LINE$£unity£ $unity$ dzięki populacjom cyborgów: §G+0,1§!"
 concept_auth_memory_aggregator: "$gov_memory_aggregator$"
 concept_auth_neural_chorus: "$gov_neural_chorus$"
 edict_aggregated_memory: "Zbiorcza Pamięć"
 edict_aggregated_memory_desc: "Wspomnienia naszej zasymilowanej populacji płyną kaskadą niczym rwący potok. Te połączone doświadczenia są do naszej dyspozycji."
 edict_choral_harmony: "Chóralna Harmonia"
 edict_choral_harmony_desc: "Do skomponowania pieśni wymagana jest harmonia. Niech umysły naszej zasymilowanej populacji się zjednoczą."
 concept_edict_aggregated_memory: "$edict_aggregated_memory$"
 concept_edict_choral_harmony: "$edict_choral_harmony$"
