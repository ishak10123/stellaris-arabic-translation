 #IMPERIAL
 edict_levied_experience: "Pozyskane doświadczenie"
 edict_levied_experience_desc: "Pozyskując wiedzę naszej populacji za pomocą wszczepów, możemy zwiększyć doświadczenie naszego przywódcy bez marnowania jego czasu na trywialne zajęcia."
