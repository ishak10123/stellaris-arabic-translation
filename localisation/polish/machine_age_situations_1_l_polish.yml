 #CYBERIZATION STAGE 1
 cyber.100.name: "Kontrola nad przyszłością" #Stage 1 - Start event
 cyber.100.desc.shared: "Niedawny przełom w badaniach nad zaawansowanymi wszczepami cybernetycznymi pozwoli kiedyś przebudować społeczeństwo. Likwidacja wszelkich biologicznych słabości może uczynić nas mądrzejszymi, szybszymi, silniejszymi."
 cyber.100.desc.shared_unplugged: "Niedawny przełom w badaniach nad zaawansowanymi wszczepami cybernetycznymi pozwoli kiedyś przebudować społeczeństwo, tym razem na naszych warunkach. Likwidacja biologicznych słabości i defektów posiadanych przez nas ulepszeń może uczynić nas mądrzejszymi, szybszymi, silniejszymi."
 cyber.100.desc: "$cyber.100.desc.shared$\n\nKorporacje zapewniły propozycje biznesowe i prognozy dotyczące sprzedaży, lecz urzędnicy rządowi twierdzą, że dostęp do tej potencjalnej technologii powinien być gwarantowany przez państwo."
 cyber.100.desc.unplugged: "$cyber.100.desc.shared_unplugged$\n\nKorporacje zapewniły propozycje biznesowe i prognozy dotyczące sprzedaży, lecz urzędnicy rządowi twierdzą, że dostęp do tej potencjalnej technologii powinien być gwarantowany przez państwo."
 cyber.100.desc.megacorp: "$cyber.100.desc.shared$\n\nPodwykonawcy zapewnili propozycje biznesowe i prognozy dotyczące sprzedaży w przypadku zlecenia produkcji firmom trzecim, lecz nasza rada dyrektorska twierdzi, że dostęp do tak ważnej technologii powinien pozostać zmonopolizowany przez nas."
 cyber.100.desc.megacorp_unplugged: "$cyber.100.desc.shared_unplugged$\n\nPodwykonawcy zapewnili propozycje biznesowe i prognozy dotyczące sprzedaży w przypadku zlecenia produkcji firmom trzecim, lecz nasza rada dyrektorska twierdzi, że dostęp do tak ważnej technologii powinien pozostać zmonopolizowany przez nas."
 cyber.100.a: "Znacjonalizujemy przemysł implantacyjny."
 cyber.100.a.megacorp: "Pozostańcie przy produkcji wewnętrznej."
 cyber.100.a.tt: "$situation_cyberization_triggered_modifier$$cyber_control_government_effects$"
 cyber.100.b: "Sprywatyzujemy dystrybucję."
 cyber.100.b.megacorp: "Powierzcie produkcję naszym spółkom zależnym."
 cyber.100.b.tt: "$situation_cyberization_triggered_modifier$$cyber_control_corporate_effects$"
 cyber.105.name: "Od ludu dla ludu"
 cyber.105.desc: "Amatorzy samoulepszania się wpadli we wściekłość, że wiele z naszych planowanych projektów cyberulepszeń będzie niedostępnych dla przeciętnego zjadacza chleba.\n\nTwierdzą, że publiczne udostępnienie schematów i poluzowanie regulacji środowiskowych umożliwi niemal każdemu budowę i naprawianie własnych wszczepów."
 cyber.105.desc.megacorp: "Niezależni podwykonawcy nie są zadowoleni z faktu, że wiele z naszych planowanych projektów cyberulepszeń jest dla nich niedostępnych.\n\nTwierdzą, że udostępnienie schematów i poluzowanie regulacji patentowych usprawniłoby proces produkcyjny."
 cyber.105.a: "Regulacje istnieją nie bez powodów."
 cyber.105.a.megacorp: "To nasza własność intelektualna."
 cyber.105.a.tt: "§Y$situation_cyberization$§! - modyfikator sytuacji pozostaje niezmieniony."
 cyber.105.b: "Czas na deregulację branży."
 cyber.105.b.crafters: "Niech wszyscy budują, co chcą."
 cyber.105.b.megacorp: "Niech schematy będą publicznie dostępne."
 cyber.105.b.gov.tt: "§Y$situation_cyberization$§! - zaktualizowano modyfikator sytuacji:\n§GDodano:§! $cyber_control_independent_effects$\n§RUsunięto:§! $cyber_control_government_effects$"
 cyber.105.b.cor.tt: "§Y$situation_cyberization$§! - zaktualizowano modyfikator sytuacji:\n§GDodano:§! $cyber_control_independent_effects$\n§RUsunięto:§! $cyber_control_corporate_effects$"
 #Stage 1 Opportunities - Research
 cyber.120.name: "Redukcja obciążenia mentalnego"
 cyber.120.desc: "Zespół naukowców wysunął innowacyjną propozycję zintegrowania z naszymi urządzeniami mobilnymi nadzorujących SI. Później można wprowadzić je bezpośrednio do sprzętu cybernetycznego.\n\nNadzorujące SI przekierowywałyby naszych obywateli od słabo wydajnych zadań do bardziej intelektualnych przedsięwzięć. Choć wiązałoby się to z częściową utratą autonomii, bezprecedensowy potencjał zwiększenia naszej produktywności nie powinien zostać zlekceważony."
 cyber.120.a: "Produktywność nade wszystko."
 cyber.120.a.spiritual: "Musimy przyjąć to jako błogosławieństwo."
 cyber.120.b: "Utrata autonomii byłaby zbyt duża."
 cyber.120.b.spiritual: "Nie zejdziemy jeszcze bardziej z drogi świętości."
 cyber.120.c: "To dopuszczalne pod warunkiem, że dostępny byłby wyłącznik."
 cyber.120.d: "Poziom kontroli, jaką by nam to zapewniło..."
 #Stage 1 Challenges - Research
 cyber.160.name: "Cybernetyczna dysocjacja"
 cyber.160.desc: "Niezwykle popularny nowy serial przemówił do zbiorowej wyobraźni obywateli.\n\nW świecie, w którym cyberwszczepy są publicznie dostępne, ulepszony robotnik przeżywa traumatyczną dysocjację, mentalne oddzielenie od własnego ciała. Tragiczne zakończenie historii stanowi słabo ukrywaną krytykę cybernetyzacji i powodowanego przez nią nieuchronnego wymazania [Owner.Species.GetAdj&genitive] tożsamości.\n\nWskutek swojej popularności dzieło wywołało znaczący opór wobec naszej inicjatywy - od czasu premiery liczba dostępnych obiektów doświadczalnych spadła o 60%."
 cyber.160.a: "Rozpocznijcie kampanię PR-ową."
 cyber.160.b: "Uszczelnijcie regulacje związane z implantami."
 cyber.160.c: "To chwilowy problem, który wkrótce minie."
 cyber.160.d: "Ocenzurujcie serial."
 cyber.160.e: "Zablokujcie wszelkie wzmianki w mediach."
 #CYBERIZATION STAGE 2
 cyber.200.name: "Centra ulepszeniowe"
 cyber.200.desc.gov: "Po krótkim okresie wewnętrznych sporów politycznych odpowiedzialność za produkcję wszczepów cybernetycznych została podzielona pomiędzy rozmaite departamenty rządowe. Fakt, że każdemu dostał się kawałek tego tortu, pozwoli trzymać się nawzajem w szachu.\n\nPlany należy jednak wdrażać. Przynajmniej 1 $building_augmentation_center$ pozwoli społeczności badawczej stworzyć centrum rozwoju cybernetyki."
 cyber.200.desc.cor: "To, co było niegdyś marzeniem, teraz jest na wyciągnięcie ręki. Kto zaś zarobi na marzeniach lepiej niż rozmaite korporacje istniejące w obrębie naszych granic? Korzyścią z kiełkującego przemysłu cybernetycznego będą nowe produkty udostępniane konsumentom jeszcze szybciej.\n\nPlany należy jednak wdrażać. Przynajmniej 1 $building_upload_center$ pozwoli korporacyjnym lobbystom stworzyć centrum rozwoju cybernetyki."
 cyber.200.desc.ind: "Nasze sieci komunikacyjne aż huczą od pomysłów na projekty, od wzmocnień neurosynaptycznych po cybernetyczne kubki smakowe. Większość byłaby niezwykle niepraktyczna i bardzo trudna do wdrożenia, na szczęście niektóre wydają się obiecujące.\n\nPlany należy jednak wdrażać. Przynajmniej 1 $building_augmentation_center$ pozwoli społeczności badawczej stworzyć centrum rozwoju cybernetyki."
 cyber.200.a.gov: "Wydajcie pozwolenia na budowę."
 cyber.200.a.cor: "Zatwierdzam."
 cyber.200.a.ind: "Zgoda."
 cyber.200.a.tt: "§RWymagane działanie:§!\nBudynek - $building_augmentation_center$ - pozwoli na wznowienie sytuacji §Y$situation_cyberization$§!.\n\nKażde $building_augmentation_center$ daje §G+200§! miejsc pracy $job_augmentor_with_icon$.\n\n$job_augmentor_research_effect_desc$"
 cyber.205.name: "Projekty pilotowe" #Stage 2 - Start event
 cyber.205.desc.shared: "Nadszedł czas na wdrożenie szerzej zakrojonych projektów pilotowych. Wymagają one stałego wsparcia i będą dostępne tylko na planetach, na których znajduje się $building_augmentation_center$, lecz nasze odkrycia zapewnią natychmiastową poprawę produktywności."
 cyber.205.desc.gov: "Małoskalowe testy przeprowadzone przez rządowe projekty badawcze potwierdziły poprawę produktywności po zastosowaniu ulepszeń mechanicznych.\n\n$cyber.205.desc.shared$"
 cyber.205.desc.cor: "Małoskalowe testy przeprowadzone na ochotnikach z grup fokusowych potwierdziły poprawę produktywności po zastosowaniu ulepszeń mechanicznych.\n\n$cyber.205.desc.shared$"
 cyber.205.desc.ind: "Meldunki otrzymane od amatorów samoulepszania się potwierdziły poprawę produktywności po zastosowaniu ulepszeń mechanicznych.\n\n$cyber.205.desc.shared$"
 cyber.205.a: "Ulepsz elity."
 cyber.205.a.tt: "Produkcja zasobów $pop_cat_ruler$: §G+10%§!, jeśli istnieje $building_augmentation_center$"
 cyber.205.b: "Udoskonalcie specjalistów."
 cyber.205.b.tt: "Produkcja zasobów $pop_cat_specialist$: §G+10%§!, jeśli istnieje $building_augmentation_center$"
 cyber.205.c: "Wzmocnijcie robotników."
 cyber.205.c.tt: "Produkcja zasobów $pop_cat_worker$: §G+10%§!, jeśli istnieje $building_augmentation_center$"
 cyber.205.d: "Ulepszenia dla wszystkich."
 cyber.205.d.tt: "Zasoby z £job£ §Hmiejsc pracy§!: §G+5%§!, jeśli istnieje $building_augmentation_center$"
 cyber.210.name: "Rozwój równoległy"
 cyber.210.desc.gov.rival: "Dziennikarze odkryli dowody na finansowane przez rząd eksperymenty z monitorującymi myśli mikrochipami. Jeśli urządzenia te zostałyby w pełni rozwinięte, mogłyby być instalowane w umysłach mieszkańców w celu gromadzenia szczegółowych informacji nt. bezpieczeństwa i osobowości."
 cyber.210.desc.cor.rival: "Dowody sądowe związane z dysputą dotyczącą spraw autorskich wykazały, że korporacje eksperymentują z implantami rzeczywistości rozszerzonej, które mają łączyć się bezpośrednio z nerwem wzrokowym konsumenta. W schemacie opisano zarówno korzyści dla użytkownika, jak i możliwości wykradania informacji wizualnych przez producenta wszczepu."
 cyber.210.desc.ind.rival: "Amatorzy samodoskonalenia rozpoczęli już wymianę swoich kończyn na prymitywne mechaniczne alternatywy. Nie ma sposobu na zapewnienie bezpieczeństwa komukolwiek, kto podejmuje się tego samodzielnie. Istnieją też podejrzenia, że nieregulowane wykorzystanie implantów może przynieść więcej złego niż dobrego."
 cyber.210.a: "Możemy to wykorzystać."
 cyber.210.a.tt: "Tempo postępu sytuacji §Y$situation_cyberization$§! przez §Y1§! rok: §G+25%§!\n\n"
 cyber.210.b: "Dość tego."
 cyber.210.b.tt: "Tempo postępu sytuacji §Y$situation_cyberization$§! przez §Y1§! rok: §R-25%§!"
 #Stage 2 Opportunities - Test Results and Rival Sector
 cyber.220.name: "Koordynacja wielokończynowa"
 cyber.220.desc: "Dokonał się znaczący przełom w dziedzinie implantów neuronowych. Wzmacniacz sygnału mózgowego mógłby zapewnić użytkownikom łatwą kontrolę nad wieloma rozmaitego typu sztucznymi kończynami. Później można zintegrować go z cybermózgiem bez potrzeby korzystania z urządzenia zewnętrznego.\n\nPodczas początkowej fazy testów osoby, na których przeprowadzano doświadczenia, wykazały się zwiększoną zręcznością i umiejętnością manipulacji obiektami, a nawet zwiększonymi możliwościami bojowymi. Problemy związane z kosztami produkcji sprawiają jednak, że musimy zdecydować, kto jako pierwszy uzyska dostęp do tej pionierskiej technologii."
 cyber.220.a: "[owner.species.GetHandNamePlural] - oto, czego potrzeba naszym naukowcom."
 cyber.220.b: "Skupcie się na wzmacnianiu armii."
 cyber.220.c: "Na początku pomóżmy tym, którzy mają ograniczone możliwości ruchowe."
 cyber.220.d: "Żadnego rozdawnictwa! Sprzedać temu, kto da najwięcej."
 cyber.220.e: "Uzbroić klasę robotniczą!"
 cyber.220.f: "Elita powinna zawsze mieć przewagę."
 #Stage 2 Challenges - Test Results and Rival Sector
 cyber.260.name: "Pomieszanie z poplątaniem"
 cyber.260.desc: "Testy nowego wszczepu kręgowego zakończyły się katastrofalną porażką. Nadmiarowa moc wygenerowana przez silniki implantu spowodowała u wielu biorących udział w doświadczeniach osób trwałe uszkodzenia rdzenia kręgowego.\n\nDoszło do wycieku wstrząsających zdjęć ujawniających ten koszmarny rezultat testów, który radykalnie zmniejszył liczbę zgłoszeń do przyszłych eksperymentów."
 cyber.260.a: "Przerwać wszelkie testy, dopóki nie znajdziemy rozwiązania."
 cyber.260.a.tt: "Tempo postępu sytuacji §Y$situation_cyberization$§! przez §Y6§! miesięcy: §R-50%§!"
 cyber.260.b: "Wypłacić rekompensatę rodzinom ofiar."
 cyber.260.c: "Znaleźć ochotników. Jeśli będzie trzeba, to przymusowo."
 #CYBERIZATION STAGE 3
 cyber.300.name: "Premiera" #Stage 3 - Start event
 cyber.300.desc: "Na całym naszym terytorium, w każdym dużym centrum miejskim, zgromadziliśmy mechaniczne implanty dla naszej populacji - [Owner.Species.GetName] otrzymają wszczepy. Urządzenia, które zaprojektowali nasi $job_augmentor_plural$, znacząco usprawnią nasze biologiczne formy.\n\nNadszedł wreszcie dzień, w którym odrzucimy przeszłość i wkroczymy w cybernetyczną przyszłość."
 cyber.300.a: "Czas na cybernetyzację."
 cyber.300.a.tt: "Przywódcy otrzymują cechę: §Y$leader_trait_cyborg$§!\nPopulacje otrzymują cechę: §Y$trait_cybernetic$§!\n\n$job_augmentor_growth_effect_desc$\n\nSzybkość wzmocnień zależy od podejścia do sytuacji i liczby budynków typu $building_augmentation_center$."
 cyber.305.name: "Cybernetyczni oponenci" #Spiritualists are Cybernetic Objectors
 cyber.305.desc.shared: "Nie posiadają nawet najprostszych wszczepów, co znacząco utrudnia im funkcjonowanie w naszej coraz mocniej połączonej ze sobą społeczności.\n\nWymóg instalacji pełnego zestawu implantów pomógłby im lepiej zintegrować się ze społeczeństwem, bez wątpienia jednak wzbudziłby też ich gniew."
 cyber.305.desc: "Grupy religijne, według których [Owner.Species.GetFleshTypeCyberCreed] i maszyna nie mogą być łączone, postanowiły nie brać udziału w naszych staraniach scybernetyzowania populacji. $cyber.305.desc.shared$"
 cyber.305.desc.spiritualist: "Wierni, którzy, jak można było oczekiwać, uważają, że [Owner.Species.GetFleshTypeCyberCreed] i maszyna nie mogą być łączone, postanowiły nie brać udziału w naszych staraniach scybernetyzowania populacji. $cyber.305.desc.shared$"
 cyber.305.desc.none: "Moralność połączenia, jakiemu mieliby ulec [Owner.Species.GetFleshTypeCyberCreed] i maszyny, od dawna jest tematem wielu dyskusji. Z powodu zwiększenia wydajności zapewnianego przez cybernetyzację jej przeciwnicy mogą, niestety, być na gorszej pozycji.\n\nZmuszenie wszystkich do zainstalowania wszczepów sprawi, że nikt nie zostanie z tyłu, lecz niewątpliwie doprowadzi też do niechęci."
 cyber.305.desc.unplugged: "Moralność ponownego połączenia, jakiemu mieliby ulec [Owner.Species.GetFleshTypeCyberCreed] i maszyny, od dawna jest tematem wielu dyskusji. Jednakże zaprojektowane przez nas ulepszenia nie są już uzależnione od kaprysów maszyn, które nas zasymilowały, dzięki czemu stały się wyjątkowo skuteczne. Ich przeciwnicy mogą być na gorszej pozycji.\n\nZmuszenie wszystkich do zainstalowania wszczepów sprawi, że nikt nie zostanie z tyłu, lecz niewątpliwie doprowadzi też do niechęci."
 cyber.305.a: "Muszą się dostosować."
 cyber.305.a.materialist: "Wiara nie ma znaczenia. Kroczymy naprzód."
 cyber.305.a.spiritualist: "Wiara musi się dostosować."
 cyber.305.a.tt: "$cyberization_standards_full_effect$\n\nZapewnia dostęp do polityki: §Y$policy_cyberization_standards$§!\n"
 cyber.305.b: "Wypracujemy kompromis."
 cyber.305.b.spiritualist: "Znajdźmy wspólny grunt."
 cyber.305.b.tt: "$cyberization_standards_limited_effect$\n\nZapewnia dostęp do polityki: §Y$policy_cyberization_standards$§!\n"
 #Stage 3 Opportunities - Treatment of Non-Cyborgs
 cyber.320.name: "Niemowlęcy potencjał"
 cyber.320.birth.desc: "Nowo odkryta możliwość instalacji wszczepów noworodkom spowodowała nagły impas. Te pionierskie ulepszenia mogą na zawsze odmienić więzi łączące nas z technologią, odblokować zaraz po narodzinach utajony cybernetyczny potencjał i pchnąć naszą cywilizację na nieznane dotąd wyżyny.$cyber.320.end.desc$"
 cyber.320.metamorphosis.desc: "Dokonaliśmy niedawno niesamowitego przełomu, który pozwala nam wszczepiać mikrochipy młodym osobnikom gatunku. Podczas metamorfozy nasze larwy w naturalny sposób wchłaniają układy mechaniczne. Wszczepy dokonane przed przepoczwarzeniem mogą uwolnić ich utajony cybernetyczny potencjał i pchnąć naszą cywilizację ku nowym, niesamowitym wyżynom.$cyber.320.end.desc$"
 cyber.320.lithoid.desc: "Gdy odkryliśmy technologię umieszczania implantów w naszych świeżo skrystalizowanych młodych, doszło do nagłego impasu. Tego rodzaju ulepszenia mogą pozwolić naszemu potomstwu tworzyć naturalne więzi z minerałami mechanicznymi, odblokowując od wczesnej młodości utajony cybernetyczny potencjał i pchnąć naszą cywilizację na nieznane dotąd, niesamowite wyżyny.$cyber.320.end.desc$"
 cyber.320.root.desc: "Gdy odkryliśmy technologię umieszczania implantów cybernetycznych w naszych sadzonkach, doszło do nagłego impasu. Tego rodzaju ulepszenia mogą pozwolić naszemu potomstwu na przesyłanie impulsów elektrycznych przez ulepszoną sieć strzępków, odblokowując od wczesnej młodości jego utajony cybernetyczny potencjał.$cyber.320.end.desc$"
 cyber.320.egg.desc: "Nowo odkryta możliwość instalacji wszczepów świeżo wyklutym młodym spowodowała nagły impas. Te pionierskie ulepszenia mogą na zawsze odmienić więzi łączące je z technologią, odblokować zaraz po narodzinach utajony cybernetyczny potencjał i pchnąć naszą cywilizację na nieznane dotąd wyżyny.$cyber.320.end.desc$"
 cyber.320.other.desc: "Nowo odkryta możliwość instalacji wszczepów noworodkom spowodowała, że doszło do nagłego impasu. Te pionierskie ulepszenia mogą na zawsze odmienić więzi łączące nas z technologią, odblokować zaraz po narodzinach utajony cybernetyczny potencjał i pchnąć naszą cywilizację na nieznane dotąd wyżyny.$cyber.320.end.desc$"
 cyber.320.end.desc: "\n\nZależność od cybernetycznych ulepszeń od tak wczesnego wieku może jednak sprawić, że nasz gatunek utraci po pewnym czasie zdolność przetrwania w swoim naturalnym stanie."
 cyber.320.a: "Naturalnym jest przechodzić ewolucję."
 cyber.320.b: "Musimy dbać, aby dzieciństwo było zgodne z naturą."
 #Stage 3 Challenges - Treatment of Non-Cyborgs
 cyber.360.name: "Bóle konwersyjne"
 cyber.360.desc: "Pewna grupa zaczęła niedawno publicznie wyrażać żal po decyzji poddania się eksperymentalnym modyfikacjom ciała. Wymiana pnia mózgu na mechaniczny zamiennik rozbudziła w nich stały lęk egzystencjalny, niektórzy zaś opisują swoje przeżycia wręcz jako ciągły cykl nieznośnej agonii.\n\nJako że podnoszą się coraz liczniejsze głosy o wypłatę odszkodowań, musimy przedstawić nasze stanowisko w kwestii odpowiedzialności rządu."
 cyber.360.a: "Zakażcie ekstremalnych modyfikacji."
 cyber.360.a.tt: "Tempo postępu sytuacji §Y$situation_cyberization$§! przez §Y6§! miesięcy: §R-50%§!"
 cyber.360.b: "Ofiara zakończy ich cierpienia."
 cyber.360.c: "Zapewnijcie silniejsze środki przeciwbólowe."
 cyber.360.d: "Szukajcie obiektów doświadczalnych wśród najniższych warstw społecznych."
 cyber.360.e: "Nie bierzemy żadnej odpowiedzialności."
 #CYBERIZATION STAGE 4
 cyber.405.name: "Podatek implantacyjny" #Government rival
 cyber.405.desc: "Dostrzegając zyski, jakie zapewnia słabo uregulowana branża ulepszeniowa, lokalni urzędnicy rządowi starają się za wszelką cenę nadążać za rozwojem sytuacji. Na każdym etapie produkcji implantów - od pozyskiwania surowców po instalację - pobierane są rozmaite podatki.\n\nDodatkowa biurokracja i koszty spowolniły proces ulepszania i utrudniły naszą drogę ku pełnej cybernetyzacji."
 cyber.405.a: "Zaakceptujcie podatki."
 cyber.405.b: "Znieście podatki."
 cyber.405.b.tt: "Tempo postępu sytuacji §Y$situation_cyberization$§!: §G+25%§!\n\n"
 cyber.405.c: "Zreformujcie opodatkowanie ulepszeń."
 cyber.405.c.tt: "Tempo postępu sytuacji §Y$situation_cyberization$§! przez §Y1§! rok: §R-10%§!"
 cyber.410.name: "Wojny sądowe" #Government rival escalation
 cyber.410.desc: "Nasi prawodawcy, nie nadążając za adaptacją przez społeczeństwo cybernetycznych implantów, robią wszystko, co mogą, aby uregulować niektóre aspekty instalacji wszczepów.\n\nNajnowszy proponowany zestaw regulacji zawiera wzmianki o \"implantacyjnej obsesji\" i o tym, że \"każdy wszczep oddala nas od tego, czym mają być [Owner.Species.GetName]\". Składają się na niego regulacje dotyczące maksymalnego ulepszenia na osobę mierzonego w procentach - po jego przekroczeniu tracono by ochronę prawną. Jest w końcu punkt, w którym ryzykujemy, że stajemy się raczej maszyną niż biologicznym bytem."
 cyber.410.a: "Powstrzymajcie wdrożenie tego prawa."
 cyber.410.a.tt: "Tempo postępu sytuacji §Y$situation_cyberization$§! przez §Y1§! rok: §G+25%§!"
 cyber.410.b: "Znajdźcie kompromis."
 cyber.410.b.tt: "Tempo postępu sytuacji §Y$situation_cyberization$§! przez §Y1§! rok: §R-25%§!"
 cyber.415.name: "Żadnych gwarancji" #Corporate rival
 cyber.415.desc: "Pęd ku zyskom sprawił, że rynek implantacyjny zalany został tanimi wszczepami niskiej jakości, których producenci nie oferują żadnego wsparcia po tym, jak ich urządzenia w nieunikniony sposób ulegają zepsuciu.\n\nW niedawnym, szeroko komentowanym przypadku wszczep pewnej popularnej artystki doznał awarii, kiedy występowała ona na scenie. Niestety, z wybuchowym rezultatem."
 cyber.415.a: "Rynek sam się ureguluje."
 cyber.415.a_industrial: "To nic niezwykłego."
 cyber.415.a.tt: "Tempo postępu sytuacji §Y$situation_cyberization$§!: §G+25%§!"
 cyber.415.b: "Musimy zadbać o bezpieczeństwo użytkowników."
 cyber.415.c: "Ukarać największych winowajców."
 cyber.415.c.tt: "Tempo postępu sytuacji §Y$situation_cyberization$§!: §R-25%§!"
 cyber.420.name: "Z zamierzenia niebezpieczne" #Corporate rival escalation
 cyber.420.desc: "Na popularności zyskuje ostatnio nowy typ cyberwszczepów zaprojektowanych nie z myślą o pomocy użytkownikowi, lecz krzywdzeniu innych - rozpylacze toksyn, nanogaroty czy zakłócacze cybermózgów zalewają ulice.\n\nZwolennicy tego typu urządzeń twierdzą, że są one niezbędne do samoobrony, przeciwnicy z kolei twierdzą, że dostępność takich technologii nie ma prawa przynieść niczego dobrego."
 cyber.420.a: "Niech się zbroją."
 cyber.420.b: "To zbyt niebezpieczne."
 cyber.420.b.tt: "Tempo postępu sytuacji §Y$situation_cyberization$§!: §R-25%§!"
 cyber.420.b_pacifist: "Wszelkie implanty służące do stosowania przemocy mają zostać rozebrane."
 cyber.420.b.tt_pacifist: "Wykorzystajcie te materiały do budowy czegoś bardziej... rozsądnego.\n\n"
 cyber.425.name: "Włamanie do systemu kontroli" #Independent rival
 cyber.425.desc: "Liczne grupy hakerskie dokonały skoordynowanego ataku i zdobyły dostęp do oprogramowania sterującego wszystkimi cybernetycznymi wszczepami. Grożą, że opublikują kod, jeśli nie spełnimy ich żądań.\n\nNie dali nam jak dotąd powodu, żeby wątpić, czy się tego dopuszczą. Opublikowanie kodu nie pozostawi nam innego rozwiązania niż napisanie go na nowo - opóźnienie to będzie miało katastrofalny wpływ na nasze ulepszeniowe starania."
 cyber.425.a: "Zapłaćcie, ile chcą."
 cyber.425.b: "Napiszcie oprogramowanie od nowa."
 cyber.425.b.tt: "Tempo postępu sytuacji §Y$situation_cyberization$§! przez §Y1§! rok: §R-25%§!"
 cyber.425.c: "No, dalej, niech próbują."
 cyber.425.c.tt: "Dobrze, że najlepsi hakerzy są opłacani przez nas."
 cyber.430.name: "Zawodne ulepszenia" #Independent rival escalation
 cyber.430.desc.demands: "Choć zapłaciliśmy potężny okup odpowiedzialnym za naruszenie bezpieczeństwa grupom, zeszłej nocy nasz kod źródłowy został przesłany do wszystkich publicznych sieci informacyjnych. Dołączono do niego obsceniczny obrazek kpiący z naszej nieumiejętności powstrzymania ataków.\n\nPubliczne komentarze już teraz pełne są goryczy, a wielu nabywców zaczęło żałować kupna cyberwszczepów."
 cyber.430.desc.protest: "Napisanie oprogramowania sterującego na nowo wymagało wiele czasu i pracy. Produkcja uległa spowolnieniu.\n\nLudność stała się o wiele bardziej zależna od najnowszych ulepszeń - wiele osób wyszło na ulicę, aby oprotestować opóźnienia w premierze nowych produktów."
 cyber.430.a: "Nowe produkty ukażą się wkrótce."
 cyber.430.b: "Zignorujcie ich."
 cyber.430.c.demands: "Rozpocznijcie działania kontrhakerskie."
 cyber.430.c.protest: "Rozpędźcie protestujących."
 cyber.21.name: "Ulepszona populacja" #Situation 1 - Last event
 cyber.21.desc: "Ten dzień jest punktem zwrotnym dla naszej społeczności. Możemy ulepszać nasze ciała w pełni zintegrowanymi częściami maszynowymi.\n\nProces przebiegł nie bez trudności, był skomplikowany i żmudny. Cokolwiek jednak być może straciliśmy po drodze, wynagrodzą nam to nieskończone możliwości naszej nowej egzystencji."
 cyber.21.a: "Będziemy silniejsi."
 cyber.21.a.start: "Dodano modyfikator §Y$building_augmentation_center$§!: $TABBED_NEW_LINE$"
 cyber.21.a.end: "Odblokowuje pełne efekty drzewka tradycji: ['tradition_category:tradition_cybernetics']"
 cyber.21.a.gov.tt: "$cyber.21.a.start$$cyber_control_government_effects$\n$cyber.21.a.end$"
 cyber.21.a.cor.tt: "$cyber.21.a.start$$cyber_control_corporate_effects$\n$cyber.21.a.end$"
 cyber.21.a.ind.tt: "$cyber.21.a.start$$cyber_control_independent_effects$\n$cyber.21.a.end$"
 ### CYBERIZATION SITUATION END ###
