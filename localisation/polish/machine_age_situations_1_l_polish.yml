 #CORPORATE
 edict_customer_insights: "Wrażenia klientów"
 edict_customer_insights_desc: "Szeroko zakrojone ankiety i analiza danych w czasie rzeczywistym pozwalają nam oceniać zmiany rynkowe i reagować na nie szybciej niż kiedykolwiek. Zasoby przekierowywane są do funkcji i produktów o najwyższym potencjale zysków."
 concept_edict_customer_insights: "$edict_customer_insights$"
