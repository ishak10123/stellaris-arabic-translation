 auth_cyber_imperial_individualist: "Chip imperialny"
 auth_cyber_imperial_individualist_desc: "Wyznaczony następca tronu imperium dziedziczy nie tylko pozycję, lecz również wyspecjalizowany implant przekazywany z pokolenia na pokolenie. Skrywa on mnóstwo bezcennej wiedzy przodków na temat skutecznych rządów. Ta sama technologia wykorzystywana jest w mniej zaawansowanej formie w całym imperium - pozwala każdemu przekazywać swoje doświadczenie następnym pokoleniom."
