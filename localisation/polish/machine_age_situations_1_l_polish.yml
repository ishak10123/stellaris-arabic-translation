 #Cyber Corporate Individualist
 auth_cyber_corporate_individualist: "Korporacyjny neurohandel"
 auth_cyber_corporate_individualist_desc: "Niemodyfikowane narzędzia takie jak billboardy czy urządzenia przenośne nie zdołały w pełni przyciągnąć uwagi konsumenta. Możemy teraz skanować umysły potencjalnych klientów i przesyłać im prosto do mózgu określone wiadomości i wezwania do działania.\n\nInnowacja ta pozwala nam również kontrolować aktywność piratów wokół naszych baz gwiezdnych, zwiększy jednak zapewne czarnorynkowe zapotrzebowanie na blokery sygnałów."
