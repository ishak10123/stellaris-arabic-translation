 ### EVENTS ###
 cyber.social_consequences.tt: "Wpływa na trwającą §Ycybernetyczną przemianę społeczną§!.\n\n" #Standard tooltip to indicate that the Individualism/Collectivism variables are changed
 #FIRST EVENT #
 #DEMOCRATIC
 cyber.505.name: "Szok przyszłości"
 cyber.505.desc.gov: "Ulepszanie naszej ludności okazało się triumfem doskonalenia procesów produkcyjnych i decyzyjności. Głosy podnoszące rozmaite problemy zostały wysłuchane, a ich niepokoje uśmierzone. Ludność §Y[root.GetSpeciesAdj&genitive]§! może teraz czerpać korzyści z tych odmieniających życie implantów.\n\nKolejnym logicznym krokiem będzie zbadanie szerszych implikacji istnienia tej technologii. Czy lepiej będzie wykorzystać ją dla dobra procesów demokratycznych? A może poprawić życie naszych robotników poprzez synchronizację doświadczenia?"
 cyber.505.desc.cor: "Przeprowadzony we współpracy z korporacjami partnerskimi proces ulepszania został pomyślnie ukończony. Wszczepy zostały wyprodukowane, przetransportowane i zainstalowane z oszałamiającą szybkością. Liczne głosy społeczeństwa §Y[root.GetSpeciesAdj&genitive]§! zostały wysłuchane, a uzasadnione niepokoje uśmierzone. Jesteśmy gotowi spojrzeć w przyszłość z nową determinacją.\n\nRząd jest teraz gotów podjąć kolejny krok. Możemy wykorzystać nasze technologiczne zaawansowanie do usprawnienia procesów demokratycznych lub zsynchronizować implanty dla dobra robotników."
 cyber.505.desc.ind: "Wbrew obawom żywionym przez urzędników rządowych zdecentralizowany model dystrybucji implantów zadziałał. Niewielkie kliniki i zakłady usługowe pojawiają się na rogu każdej ulicy, dzięki czemu wszyscy mogą ulepszać się bez potrzeby przemierzania wielkich dystansów.\n\nNasz rząd również musi być gotów do działania. Możemy wykorzystać implanty do usprawnienia procesu demokratycznego lub zsynchronizować za ich pomocą doświadczenie naszych robotników, co poprawi ich i naszą jakość życia."
 cyber.505.a: "Powinniśmy usprawnić proces demokratyczny."
 cyber.505.a.tt: "Nacisk na zwiększone zadowolenie, jedność i specjalistów."
 cyber.505.b: "Musimy połączyć nasze umysły."
 cyber.505.b.tt: "Nacisk na zwiększone zadowolenie, produktywność robotników i stabilność."
 #OLIGARCHIC
 cyber.510.name: "Restrukturyzacja władzy"
 cyber.510.desc.gov: "Ogrom zmian, jakie zajdą w społeczeństwie, potrafi zrozumieć i odpowiednio wdrożyć tylko najwyższa jego warstwa - w innym wypadku może dojść do nieporozumień i kłótni wśród naszych poddanych. Podczas gdy obywatele §Y[root.GetSpeciesAdj&genitive]§! otrzymują swoje zapewnione przez rząd cyberwszczepy, mamy wyjątkową możliwość przyjrzeć się niewykorzystanym dotąd możliwościom, jakie te urządzenia zapewniają.\n\nCzy powinniśmy stworzyć społeczeństwo, w którym zaciekła rywalizacja pozwala robotnikom osiągać nowe wyżyny? A może lepiej będzie wykorzystać marnującą się moc obliczeniową śpiących mózgów?"
 cyber.510.desc.cor: "Wskazane przez rząd korporacje produkują coraz to nowe, lepsze biochipy, my zaś musimy podjąć decyzję, jak najlepiej będzie wykorzystać tę niezwykłą zmianę społeczną.\n\nCzy powinniśmy naśladować naturę, w której przeżywają tylko najsilniejsi? A może przyjrzeć się niewykorzystanemu potencjałowi śpiącego mózgu?"
 cyber.510.desc.ind: "Jakkolwiek się to skończy, ludność będzie mieć możliwość udowodnienia swoich zdolności w projektowaniu i dystrybucji sprzętu do cyberulepszeń, dzięki czemu możemy spojrzeć na sprawę z dystansu i przemyśleć, jak najlepiej wykorzystać tę nieprzewidzianą zmianę społeczną.\n\nCzy lepiej będzie nakłonić obywateli do wyrabiania wyższych norm? A może lepiej sprawić, że będą pracować dla nas również we śnie?"
 cyber.510.a: "Niech lizusy pracują dla nas w trudzie i znoju."
 cyber.510.a.tt: "Nacisk na zwiększenie produkcji kosztem zadowolenia."
 cyber.510.b: "Okiełznajcie potęgę snu."
 cyber.510.b.tt: "Nacisk na wyciąganie z frakcji dodatkowych zasobów."
 #DICTATORIAL
 cyber.515.name: "Kontrola tłumów"
 cyber.515.desc.gov: "Nasz program ulepszeń zapewnił liczne szanse na poprawę stabilności i kontroli. Produkcja i montaż zapewnianych przez rząd implantów pozwalają na łatwe zainstalowanie tajnych algorytmów, które skłonią populację do działań w wyznaczonym przez nas kierunku.\n\nMożemy zwiększyć skuteczność obserwacji podwładnych, dodając narzędzia monitorujące i dodatkowe ścieżki dostępu. Możemy też napisać kod, dzięki któremu §Y[Ruler.GetTitle]§! będzie wpływać na tłumy dzięki swojej wspaniałej osobowości."
 cyber.515.desc.cor: "Nasze korporacje partnerskie gotowe są do produkcji, dystrybucji i instalacji implantów cybernetycznych na skalę społeczną. Zbliżająca się aktualizacja oprogramowania staje się dla nas wyjątkową szansą.\n\nMożemy zainstalować w ulepszeniach ukryte narzędzia obserwacyjne, dzięki którym łatwo namierzymy problematycznych obywateli. Inną opcją jest stworzenie funkcji nadpisania osobowości, która wymusi na tłumach robienie tego, co zechce §Y[Ruler.GetTitle]§!."
 cyber.515.desc.ind: "Szpitale, sklepy i społeczności hakerskie są już gotowe do dystrybucji i instalacji cyberwszczepów wśród ludności. Nie ma jednak powodu, abyśmy całkowicie zdecentralizowali naszą władzę nad tą nową, pasjonującą technologią.\n\nMożemy zapewnić niestandardowe modyfikacje wszczepów, w której ukryjemy narzędzia obserwacyjne pozwalające śledzić poczynania problematycznych obywateli. Inną opcją jest instalacja nadpisujących osobowość algorytmów, dzięki którym §Y[Ruler.GetTitle]§! będzie swoją wolą wpływać na podświadomość naszego ludu i kierować go ku wielkości."
 cyber.515.a: "Ukryjcie narzędzia obserwacyjne w implantach osobistych."
 cyber.515.a.tt: "Nacisk na stabilność imperium i redukcję przestępczości."
 cyber.515.b: "Przyjrzyjcie się tematowi nadpisania osobowości."
 cyber.515.b.tt: "Nacisk na produktywność robotników i przesiedlenia."
 #IMPERIAL
 cyber.520.name: "Szok przyszłości"
 cyber.520.desc.gov: "Rząd przeznaczył ogrom zasobów na wydajne udoskonalenie populacji. Wyznaczone centra ulepszeniowe instalują wszczepy dniem i nocą, obywatele zaś uczeni są właściwego ich wykorzystywania i konserwacji.\n\nPozostaje wciąż pytanie, czy faktyczna wartość implantów powinna leżeć w ulepszeniu naszych i tak wspaniałych już przywódców, czy też w możliwości zapewniania rozrywki i absorbowania uwagi tych, którzy pracują pod ich przewodnictwem.\n\nDostarczenie naszej dynastii sprawi, że przywódcy będą mogli zachowywać swoją wiedzę dla dalszych pokoleń, co poskutkuje niesamowitym wzrostem stabilności. Imperium może też uczynić swoją stolicę prawdziwie wspaniałą - stworzyć w niej centrum, w którym cybernetycznie ulepszeni sportowcy uczestniczyć będą w niezwykłych, krwawych imprezach sportowych."
 cyber.520.desc.cor: "Oficjalnie wyznaczone korporacje wykonały zadanie zgodnie z dyrektywami operacyjnymi. Cała populacja została ulepszona cyberwszczepami i jest gotowa do służenia nam jeszcze wydajniej niż dotąd.\n\nOtwartą pozostaje kwestia, co powinniśmy uznać za faktyczną wartość tych implantów.\n\nDostarczenie naszej dynastii sprawi, że przywódcy będą mogli zachowywać swoją wiedzę dla dalszych pokoleń, co poskutkuje niesamowitym wzrostem stabilności. Imperium może też uczynić swoją stolicę prawdziwie wspaniałą - stworzyć w niej centrum, w którym cybernetycznie ulepszeni sportowcy uczestniczyć będą w niezwykłych, krwawych imprezach sportowych."
 cyber.520.desc.ind: "Mimo wątpliwości żywionych przez imperialnych urzędników zdecentralizowana dystrybucja i instalacja implantów cybernetycznych zakończyła się powodzeniem. Liczne, niewielkie kliniki na naszych planetach pracują niezmordowanie nad ulepszaniem naszej populacji.\n\nPozostaje odpowiedzieć na pytanie, co powinniśmy uznać za faktyczną wartość tych implantów. Może to oznaczać zachowywanie imperialnej wiedzy za pomocą implantów międzypokoleniowych lub dostarczenie rozrywki tłumom poprzez krwawe sporty cyborgów - takie, których nigdy dotąd nie widział żaden wszczep wzrokowy."
 cyber.520.a: "Zachowajcie wiedzę imperium."
 cyber.520.a.tt: "Nacisk na dobro władcy imperium."
 cyber.520.b: "Zapewnijcie rozrywkę tłumom."
 cyber.520.b.tt: "Nacisk na produktywność planety stołecznej i zadowolenie."
 #CORPORATE
 cyber.525.name: "Implanty sp. z o.o."
 cyber.525.desc.gov: "Szeroko zakrojony, choć mało efektywny rządowy program implantacji dobiega końca, co daje nam okazję do dalszego rozszerzenia źródeł dochodu powiązanego z tą bezprecedensową premierą produktu. Nasz zespół analityków proponuje dwa potencjalne źródła zysku, z których oba niosą ze sobą ryzyko, ale i korzyści.\n\nCzy rząd powinien wymagać wyświetlania reklam na wszystkich implantach ocznych? A może oczekiwać od ulepszonej populacji regularnych ulepszeń sprzętu?"
 cyber.525.desc.cor: "Produkcja i instalacja implantów przebiega tak sprawnie, jak można tego oczekiwać po naszej wysoce zoptymalizowanej infrastrukturze korporacyjnej. Możliwości biznesowe, jakie zapewniają wszczepy, są właściwie nieograniczone.\n\nZarysowały się dwa szczególnie obiecujące sposoby na dodatkowy dochód. Choć wzajemnie się wykluczają, każda zapewnić może ogromne zyski.\n\nPozostaje rozstrzygnąć: czy powinniśmy wymagać wyświetlania reklam na wszystkich implantach ocznych? A może oczekiwać od ulepszonej populacji regularnych ulepszeń sprzętu?"
 cyber.525.desc.ind: "Jak można było się spodziewać, chaotyczna \"społeczna\" implementacja cyberwszczepów dobiega litościwego końca. Pojawiła się przed nami szansa, aby wpłynąć na kierunek, w jakim rozwinie się ta nowa, obiecująca technologia, co zwiększy jednocześnie nasze zyski.\n\nCzy wszczepy oczne powinny od teraz zawierać reklamy? A może lepiej będzie nakazać populacji stałe ulepszanie oprogramowania i sprzętu?"
 cyber.525.a: "Stwórzcie prototypy wszczepów obsługujących reklamy."
 cyber.525.a.tt: "Nacisk na wzrost handlu i obniżenie kosztów możliwości gospodarczych."
 cyber.525.b: "Opracujcie schematy ulepszeń implantów."
 cyber.525.b.tt: "Nacisk na agendy produktywnościowe, szpiegostwo i koszt utrzymania udogodnień."
 ### EVENT POOL ###
 cyber.610.name: "Natychmiastowa rozkosz"
 cyber.610.desc: "Wśród robotników coraz popularniejsza staje się stworzona nielegalnie modyfikacja implantów stymulująca mózg w celu wytwarzania na żądanie neuroprzekaźników chemicznych. Narzędzie to ma liczne zastosowania: od rozbudzania silnej przyjemności po zwiększenie wytrzymałości na ból. Opracowanie na bazie nielegalnego wszczepu jego stabilnej wersji wymagałoby znaczących inwestycji, a efekt stymulacji z pewnością szybko by mijał.\n\nCzy powinniśmy stworzyć wersję handlową, zacząć sprzedawać nielegalny prototyp, czy też po prostu uregulować zasady jego używania?"
 cyber.610.a: "Stwórzcie stabilny implant."
 cyber.610.b: "Wykorzystajcie nielegalny prototyp."
 cyber.610.c: "Uregulujcie ten typ modyfikacji."
 cyber.615.name: "Życie prywatne a zawodowe"
 cyber.615.desc: "Coraz więcej firm wymaga, aby wszelkie doświadczenia, jakie mają miejsce w godzinach pracy, przechowywane były w niedostępnej poza zakładem obszarze pamięci cybermózgu.\n\nTwierdzą, że funkcja ta wykorzystywana jest wyłącznie w przypadku wysoce poufnych zadań i ma zapobiegać szpiegostwu korporacyjnemu. Niektóre wymagają nawet, aby pracownicy odcinali się w pracy od doświadczeń prywatnych, aby uniemożliwić przekonaniom etycznym wpływanie na produktywność."
 cyber.615.a: "Użytkownicy muszą mieć nad wszystkim pełną kontrolę."
 cyber.615.b: "Zdrowo jest zostawiać pracę w biurze."
 cyber.615.c: "Rozdzielajcie wspomnienia w obu przypadkach."
 cyber.625.name: "Monetyzacja poprzez subskrypcję"
 cyber.625.desc: "Cyberwszczepy stały się tak integralną częścią naszego życia, że zmiana modelu ich monetyzacji wpływa w dramatyczny sposób na całe nasze społeczeństwo. Niedawno wśród producentów implantów pojawił się trend blokowania kluczowych funkcji poprzez model subskrypcyjny. Pominięcie płatności sprawia, że nagle twoje cyberkończyny się blokują, a wszczepy optyczne przestają działać. Organizacje konsumenckie nalegają, abyśmy położyli kres tym praktykom."
 cyber.625.a: "Zakażcie subskrypcji cyberwszczepów."
 cyber.625.b: "Jeśli kogoś na coś nie stać, nie powinien tego kupować."
 cyber.625.c: "Ograniczcie subskrypcje do funkcji niekluczowych."
 cyber.625.d: "To doskonały pomysł! Wykorzystajmy go."
 cyber_subscription_ban: "Zakaz subskrypcji cyberwszczepów"
 cyber_subscription_ban_desc: "Uniemożliwiliśmy producentom cyberwszczepów blokowanie funkcji implantów poprzez model subskrypcyjny."
 cyber_subscription_limited: "Ograniczone subskrypcje cyberwszczepów"
 cyber_subscription_limited_desc: "Uniemożliwiliśmy producentom cyberwszczepów blokowanie kluczowych funkcji implantów poprzez model subskrypcyjny."
 cyber_subscription: "Dodaje następujące modyfikatory do cechy gatunkowej §Y$trait_cybernetic$§!:\n$t$Zadowolenie: §R-5%§!\n$t$$BONUS_WORKFORCE_FOR$ ['concept_planet_traders']: §G+25%§!"
 cyber_subscription_megacorp: "Dodaje następujące modyfikatory do cechy gatunkowej §Y$trait_cybernetic$§!:\n$t$Zadowolenie: §R-5%§!\n$t$$BONUS_WORKFORCE_FOR$ ['concept_planet_traders']: §G+50%§!"
 cyber.655.name: "Nieprzewidziana awaria mechaniczna"
 cyber.655.desc: "Nasi inżynierowie cybernetyczni przybyli do nas z informacją o możliwym sposobie na zysk. Lekkie tylko obniżenie trwałości wszczepów pozwoliłoby znacząco zwiększyć zyski - użytkownicy musieliby wymieniać najważniejsze elementy.\n\nWykorzystując słabszy biostop w sekcjach najbardziej podatnych na zmęczenie materiału, sprawilibyśmy, że implanty psułyby się w sposób minimalnie tylko szkodliwy dla użytkownika, wymagający jednak wymiany części."
 cyber.655.a: "Oburzający pomysł!"
 cyber.655.a.tt: "Nie będziemy dostarczać naszym obywatelom niskiej klasy komponentów!\n\n"
 cyber.655.b: "Intrygujące. Zacznijcie robić słabsze cyberwszczepy."
 cyber.655.c: "Tak! Połączcie to przy okazji z podniesieniem cen."
 cyber.655.d: "Wykorzystajcie te dane do usprawnienia procesu cybernetyzacji."
 worse_parts: "Słabsze części"
 worse_parts_desc: "Z rozmysłem postanowiliśmy dostarczyć naszym obywatelom gorszej klasy komponenty cybernetyczne, przez co muszą oni częściej kupować nowe części."
 worse_parts_effect_tt: "$r_trade$ za: $pop_group_unit$ £pop£ §Hpopulacje§! z cechą §Y$trait_auto_mod_cyborg$§!: §G+0,5§!"
 optimized_parts: "Zoptymalizowane części"
 optimized_parts_desc: "Dzięki dalszym innowacjom i ulepszeniom naszych cybernetycznych komponentów proces instalacji stał się szybszy i mniej skomplikowany."
 optimized_parts_effect_tt: "$r_energy$ - utrzymanie za £pop£ §Hpopulacje§! z cechą §Y$trait_auto_mod_cyborg$§!: §R+0,1§!"
 cyber.660.name: "Nieprzewidziana katastrofa społeczna"
 cyber.660.desc: "Wygląda na to, że ktoś z naszych obywateli dowiedział się o inicjatywie zaplanowanych awarii.\n\n[Owner.GetSpeciesNamePlural] stoją na ulicach, rozwścieczeni niedawnymi zmianami, jakie wprowadziliśmy w zakresie jakości i kosztów cyberwszczepów. Domagają się, abyśmy odwrócili te zmiany."
 cyber.660.a: "No dobrze, byliśmy trochę zbyt chciwi."
 cyber.660.b: "Że co? Nic nie słyszymy!!!"
 cyber.660.c: "Nie będziemy musieli..."
 discontent: "Niezadowolenie"
 discontent_desc: "Nasi obywatele buntują się przeciw niedawnym podwyżkom cen i obniżce jakości cyberwszczepów. Dochodzi do zamieszek."
 cyber.805.name: "Kontrola rodzicielska"
 cyber.805.desc: "Opiekunowie noworodków, które mają zainstalowane implanty mózgowe, proszą o zapewnienie im większej kontroli nad dzieckiem. Możliwość sterowania funkcjami motorycznymi jest obecnie dostępna wyłącznie dla sił policyjnych, niektórzy chcą jednak rozszerzyć dostępność tej opcji również na opiekunów prawnych.\n\nChoć stanowi to jawne naruszenie nietykalności cielesnej, dozwolone są już inne formy przymusu rodzicielskiego. Alternatywą byłoby zapewnienie częściowej kontroli, jak możliwość spowolnienia lub redukcji głośności niegrzecznego dziecka."
 cyber.805.a: "Pozwólcie dorosłym kontrolować ich dzieci."
 cyber.805.b: "Pozwólcie na ograniczoną kontrolę."
 cyber.805.c: "Pozostawcie zdalną kontrolę nad ciałem policjantom."
 cyber.810.name: "Transfer wiedzy"
 cyber.810.desc: "Opracowanie cybernetycznych implantów mózgowych zapewnia nam kuszącą szansę. Zamiast polegać na subiektywnych i powolnych metodach nauczania, moglibyśmy kopiować kluczową wiedzę bezpośrednio z jednego mózgu do innego. Wymaga to sterylnych warunków laboratoryjnych, nie byłoby więc możliwe na szeroką skalę. Otrzymane informacje zastępują też częściowo fragmenty podobnego rodzaju wspomnień odbiorcy.\n\nNajbardziej istotnym zastosowaniem byłaby możliwość dzielenia się wiedzą przez naukowców. Mogłoby to posłużyć do zniwelowania części długu technicznego powstałego w skutek procesu cybernetyzacji lub zostać wykorzystane w inny sposób."
 cyber.810.a: "Przekażcie wiedzę techniczną."
 cyber.810.b: "Przekażcie wiedzę fizyczną."
 cyber.810.c: "Przekażcie wiedzę socjologiczną."
 cyber.810.d: "Niech każdy ma swój własny rozum."
 cyber.815.name: "Zdecentralizowana miłość"
 cyber.815.desc: "Choć [root.GetSpeciesNamePlural], ogólnie rzecz biorąc, chętnie wiodą życie codzienne i utrzymują stosunki z innymi za pomocą dostępnych w sklepach cyberwszczepów, coraz większa liczba gospodarstw, zwłaszcza wielopartnerskich, zaczęła tworzyć sieci prywatne za pomocą produkowanego na zamówienie sprzętu. Te domowe grupy postanowiły żyć w szytej na miarę izolacji, dzieląc się między sobą uczuciami i doświadczeniami w wyjątkowo intymny sposób.\n\nNiektóre grupy zajmujące się opieką społeczną, a także uczeni, pochwalają to zjawisko, sugerując, że każdy może skorzystać na spersonalizowanym ulepszeniu związków i więzi rodzinnych. Inni z kolei wyrazili zaniepokojenie tego typu społecznym wycofaniem. Niektórzy zasugerowali nawet, że praktyka ta może spowodować zamknięcie się poszczególnych osób w ich własnych, miniaturowych \"miłosnych światach\"."
 cyber.815.a: "To, w jaki sposób chcą żyć i kochać, nie jest naszą sprawą."
 cyber.815.a.tt: "Będziemy dalej pozwalać na dostęp do niestandardowego sprzętu i prywatnych przestrzeni cyfrowych."
 decentralized_families: "Zdecentralizowane rodziny"
 decentralized_families_desc: "Partnerstwa domowe wszelkiego typu mogą ubogacać swoje więzi za pomocą \"szytego na miarę\" oprogramowania i ulepszeń."
 cyber.815.b: "Włączcie te rodziny z powrotem do naszego grona."
 cyber.815.b.tt: "Będziemy zniechęcać obywateli do przygotowywanych na zamówienie ulepszeń, a promować ściślej uregulowane rozwiązania."
 centralized_families: "Scentralizowane rodziny"
 centralized_families_desc: "Surowsza kontrola nad ulepszeniami cybernetycznymi oraz oprogramowaniem zniechęcą rodziny do tworzenia zamkniętych cyfrowych ogrodów." #as in a richly decorated but enclosed space
 cyber.820.name: "Radykalny obraz"
 cyber.820.desc: "Subkultury outsiderów istniały na przestrzeni całej historii [root.GetSpeciesAdj&genitive], sytuacja jednak uległa zmianie wraz z pojawieniem się ulepszeń cybernetycznych: grupy o radykalnych poglądach zaczęły tak dalece odmieniać swoje jestestwo, że nie wydają się już przedstawicielami naszego gatunku. Zwłaszcza młodzi sprawiają, że przepaść pokoleniowa staje się coraz głębsza, a to za sprawą ich potrzeby, aby mieć silnie zmodyfikowane [root.GetSpeciesHandNamePlural], trójwymiarowe tatuaże i inne ozdoby.\n\nZwolennicy takich zachowań twierdzą, że wyrażają w ten sposób swoje prawdziwe jestestwo, a odrzucenie jednorodności [root.GetSpeciesAdj&genitive] jest po prostu sposobem na przejęcie kontroli nad własnym życiem. Poglądów tych nie podziela coraz większa grupa zaniepokojonych rodziców i działaczy społecznych, którzy twierdzą, że tego typu osoby to nikczemnicy pragnący zniszczyć nasze społeczeństwo."
 cyber.820.a: "Wprowadźcie surowsze zasady dotyczące modyfikacji ciała."
 cyber.820.b: "To tylko faza. Minie, jak każda."
 radical_image: "Radykalny obraz"
 radical_image_desc: "Młodzież z naszego społeczeństwa odważnie eksperymentuje z własnym wyglądem."
 cyber.820.c: "Możliwe, że czegoś się od tej młodzieży nauczymy."
 radical_insights: "Radykalna wiedza"
 radical_insights_desc: "Idąc za przykładem modyfikujących swoje ciała zwolenników popkultury, społeczeństwo to eksperymentuje z własnym wyglądem poprzez nowy typ ulepszeń estetycznych."
 cyber.821.name: "Radykalne protesty"
 cyber.821.desc: "Zaniepokojona młodzież, aktywiści i artyści zebrali się tysiącami, aby zażądać swobody cybernetycznego samoulepszania się. Wachlarz protestujących jest bardzo szeroki - są wśród nich [root.GetSpeciesNamePlural] bez modyfikacji wyglądu, ale i osoby o niestandardowych kończynach, odmienionych korpusach i innych obco wyglądających formach. Wszyscy deklarują solidarność z [root.GetAdj&genitive] obywatelami narażonymi na dyskryminację z powodu osobistych wyborów związanych z cybernetycznymi ulepszeniami."
 cyber.821.a: "Nie damy się do niczego zmusić."
 cyber.821.a.tt: "Będziemy dalej stosować podejście kolektywistyczne do cybernetyki."
 radical_image_denied: "Radykalny obraz odrzucony"
 radical_image_denied_desc: "Doszło do eskalacji protestów dotyczących prawa do swobody wyrażania siebie poprzez ulepszenia cybernetyczne."
 cyber.821.b: "Rozważymy ich żądania."
 cyber.821.b.tt: "Każdy otrzyma stosunkowo wolny wybór, jeśli chodzi o ulepszenia cybernetyczne."
 radical_image_upheld: "Radykalny obraz utrzymany"
 radical_image_upheld_desc: "Protestujący wywalczyli sobie ograniczone prawo do autoekspresji poprzez widoczne cyberwszczepy."
 cyber.822.name: "Radykalna fizjologia"
 cyber.822.desc: "Pracownicy medyczni skarżą się na dziwaczne, bezprecedensowe przeszkody, na jakie natykają się przy leczeniu pacjentów z bardzo odmiennymi ulepszeniami cybernetycznymi.\n\nWiele z tych misternie wyrzeźbionych osobników wymaga specjalnych procedur leczenia, jak niestandardowe narzędzia czy skomplikowana rozbiórka, nawet w przypadku drobnych schorzeń. Koszty interwencji medycznych u takich pacjentów są dalece wyższe niż te u niezmodyfikowanych, nie[root.GetSpeciesAdj&genitive] pacjentów."
 cyber.822.a: "To uzasadnione koszty."
 cyber.822.b: "Błędem było pozwolić na tak szeroką personalizację."
 #Cold Metal
 cyber.830.name: "Dreszcze"
 cyber.830.desc: "Część z naszych ulepszonych obywateli zgłasza bóle, gdy zostają wystawieni na działanie niskich temperatur. Sprawa jest szczególnie poważna na planecie §H[cold_planet.GetName]§!, gdzie mróz jest normą.\n\nMetalowe implanty rzeczywiście dostarczają w niskich temperaturach nieprzyjemnych doznań, nie powinny jednak powodować tak poważnej reakcji. Sytuacja ta wpływa negatywnie na naszą siłę roboczą."
 cyber.830.a: "Zorganizować badania medyczne."
 cyber.830.b: "Nie jesteśmy odpowiedzialni za ich cierpienie."
 cyber.830.tooltip: "Dodaje następujące modyfikatory cechy gatunkowej §Y$trait_cybernetic$§!:$TABBED_NEW_LINE$Bazowa możliwość zamieszkania światów górzystych/arktycznych/tundrowych: §R-20%§!"
 COLD_METAL_PROJECT: "Chłód metalu"
 COLD_METAL_PROJECT_DESC: "Ludność żyjąca w mroźnych klimatach donosi o przypadkach silnego bólu związanego z implantami cybernetycznymi. Próby kliniczne pozwolą nam zgromadzić więcej danych."
 cyber.835.name: "Raport medyczny"
 cyber.835.desc: "Testy kliniczne nie pozwoliły ustalić jasnego związku między wystawieniem cyberwszczepów na zimno a wiekiem, płcią, zajęciem i typem implantów używanym przez pacjentów dotkniętych dolegliwościami.\n\nNiektórzy pracownicy medyczni twierdzą, że ból ma podłoże psychosomatyczne, a jego leczenie powinno ograniczać się do podawania środków przeciwbólowych i terapii behawioralnej. Inni nalegają, aby nie lekceważyć problemu i sfinansować zamiast tego program rozszerzający możliwości leczenia."
 cyber.835.a: "Ten ból jest tylko w ich głowach."
 cyber.835.b: "Wdrożyć program badawczy."
 cyber.835.c: "Przesiedlić dotkniętych problemem na cieplejszą planetę."
 cyber.835.tooltip: "Usuwa następujące modyfikatory cechy gatunkowej §Y$trait_cybernetic$§!:$TABBED_NEW_LINE$Bazowa możliwość zamieszkania światów górzystych/arktycznych/tundrowych: §R-20%§!"
 cyber.840.name: "Dokąd poniosą nas serca"
 cyber.840.desc: "Przedstawiciele naszego gatunku zawsze byli podróżnikami. Nomadami. Wędrowcami. Choć dla niektórych podróże to sposób na dotarcie do jakiegoś celu, dla nas celem jest droga. Ulepszanie ciał ułatwiło nam docieranie na nowe światy, ale pozwoliło też tropić tych, którzy zapuścili się zbyt daleko. Nie każdego cieszy ta zmiana.\n\nCoraz więcej osób majstruje przy swoich implantach, aby zniknąć z radaru i zapewnić sobie prywatność. Na razie jest to trend raczej niszowy, może jednak spowodować kłopoty."
 cyber.840.a: "Mają rację. Zakazać technologii śledzących."
 cyber.840.b: "To nie powód do niepokoju."
 cyber.840.c: "Zaproponujcie im implanty bez funkcji tropienia... za odpowiednią cenę."
 cyber.840.d: "Postawić ich do pionu. Technologia śledząca nigdzie nie zniknie."
 cyber_wanderers: "Niespokojni wędrowcy"
 cyber_wanderers_desc: "Trudni do wytropienia. Łatwi do znalezienia, gdziekolwiek są."
 cyber_wanderers_tracked: "Na smyczy"
 cyber_wanderers_tracked_desc: "Nasi ludzie cieszą się wolnością i stanowczo sprzeciwiają się stosowaniu jakiejkolwiek technologii śledzącej."
 cyber.855.name: "Reforma edukacji" #Idiom: if you achieve a required score, you 'make the grade'; similar to 'make the cut'
 cyber.855.intro.desc: "Mikroprocesory kognitywne, ulepszeni nauczyciele SI, enzymy zaprojektowane w celu regeneracji neuroplastycznej. A wszystko to tylko dla dzieci w wieku przedszkolnym."
 cyber.855.gov.desc: "$cyber.855.intro.desc$\n\nNadążanie za zmianami technologicznymi okazało się ogromnym obciążeniem naszych sponsorowanych przez państwo programów edukacyjnych. Coraz bardziej zarysowuje się różnica między tymi, którzy polegają na publicznych ulepszeniach, a dziećmi z domów, które stać na najnowocześniejsze technologie.\n\nStworzenie zapewniającego równe szanse systemu wymagać będzie znaczącej, pięcioletniej inwestycji zasobów."
 cyber.855.corp.desc: "$cyber.855.intro.desc$\n\nWysokiej klasy edukacja bywa droga. Wielu osobom coraz trudniej jest dotrzymać kroku reszcie. Coraz bardziej zarysowuje się różnica między tymi, których stać na najnowocześniejsze ulepszenia, a tymi, którzy muszą polegać na starszych, używanych lub będących podróbkami modelach.\n\nAby zapobiec dalszemu rozwarstwianiu się społeczeństwa, niezbędna będzie znacząca, pięcioletnia inwestycja w nasz system edukacji."
 cyber.855.a: "Koszt jest zbyt wysoki."
 cyber.855.b: "Edukacja musi pozostać dostępna dla wszystkich."
 cyber_education: "Ulepszona edukacja"
 cyber_education.tt: "Rozpoczniemy pięcioletni program rozwoju solidnego, w pełni opartego o ulepszenia systemu edukacji."
 cyber.860.name: "Egalitarna doskonałość"
 cyber.860.desc: "Nasza inwestycja w ulepszenia edukacyjne bardzo się opłaciła.\n\nPubliczny dostęp do wysokiej klasy cybernetyki stworzył prawdziwą akademicką merytokrację, w której każdy, niezależnie od klasy społecznej, może rozwinąć swój pełen potencjał. Korzyści z tego systemu widoczne są szczególnie w naukach ścisłych. Innowacje i tempo badań poprawiły się pod każdym względem."
 egalitarian_excellence: "Egalitarna doskonałość"
 egalitarian_excellence.tt: "Dobrze wykształcona i w pełni ulepszona ludność to klucz do postępu społecznego i materialnego."
 cyber.865.name: "Wyjątkowi liderzy"
 cyber.865.desc: "Decyzja powstrzymania się przed publicznym finansowaniem ulepszeń edukacyjnych okazała się słuszna.\n\nNasze społeczeństwo wierzy w indywidualne dokonania. Choć pojawiły się nieliczne głosy krytykujące coraz większe podziały społeczne, rywalizacja w świecie nauki dała owoc w postaci doskonale wykształconych i produktywnych przywódców, jakich zazdrości nam cała galaktyka."
 exceptional_leaders: "Wyjątkowi przywódcy"
 exceptional_leaders.tt: "Praca nad najlepszymi talentami na poziomie indywidualnym pozwoliła nam wykształcić wyjątkowej klasy przywódców."
 cyber.1005.name: "Przełamując ograniczenia"
 cyber.1005.desc: "[Species.GetName] biją kolejny rekord - tego typu nagłówki stały się pospolite w sportowym życiu [Owner.GetAdjective]. [GetAthletePlural] robią, co w ich mocy, aby pokonywać przeciwników za pomocą coraz to nowszych i bardziej wyrafinowanych modyfikacji, a granice ich możliwości są coraz dalej przesuwane.\n\nChoć fani tej ulepszonej atletyki są zachwyceni rezultatem zmian, coraz liczniejsze grono staroświeckich kibiców oczekuje, że osoby z wszczepami konkurować będą mogły tylko między sobą. Jeszcze inna grupa chce ograniczenia liczby zmodyfikowanych sportowców w sportach drużynowych, aby osoby z naturalnym ciałem też miały miejsce dla siebie w świetle jupiterów."
 cyber.1005.a: "Czas niezmodyfikowanych minął."
 cyber.1005.a.tt: "Zachęćcie zmodyfikowanych graczy do dalszych zmian, napędzając innowację."
 cyber.1005.b: "Przenieście ulepszonych zawodników do ich własnej ligi."
 cyber.1005.c: "[GetAthletePlural] mają mieć ograniczoną liczbę miejsc w każdej drużynie."
 cyber_athletes: "Cybernetyczni sportowcy"
 cyber_athletes_desc: "Promując modyfikowanych sportowców, możemy sprawdzić w trudnych warunkach najnowocześniejsze cyberwszczepy."
 cyber_athlete_leagues: "Cybernetyczne ligi sportowe"
 cyber_athlete_leagues_desc: "Oddzielanie sportowców \"naturalnych\" od ulepszonych zapewnia uczciwą rywalizację dla wszystkich."
 limited_cyber_athletes: "Limit cybernetycznych sportowców"
 limited_cyber_athletes_desc: "Regulacje dotyczące liczby zmodyfikowanych sportowców sprawiają, że każdy zespół ma prawdziwą szansę na sukces."
 athlete_plural: "sportowcy"
 cyber.1010.name: "Niebo na sprzedaż"
 cyber.1010.desc: "Korporacja §Y[sky_megacorp.GetName]§! zaproponowała nam lukratywny kontrakt. Chcą zareklamować swój najnowszy produkt, napój energetyczny Plazmowe Upojenie.\n\nReklamy napoju będą przesyłane prosto do wszczepów ocznych naszych obywateli, kiedy tylko spojrzą oni w niebo. Wygenerowany w ten sposób zysk można przeznaczyć na dowolne projekty obywatelskie.\n\nChoć reklamy miałyby inwazyjną naturę, zostaliśmy zapewnieni, że sam napój jest przepyszny i całkowicie nietoksyczny."
 cyber.1010.a: "Pijcie Plazmowe Upojenie!" #Feel free to localize Plasma Quench to sound like a slimy energy drink. No need to make it word for word.
 cyber.1010.b: "Niebo nie jest na sprzedaż!"
 cyber.1010.c: "Negocjujmy warunki."
 cyber.1010.d: "Nie jesteśmy zainteresowani."
 cyber.1015.desc: "§Y[sky_megacorp.GetName]§! powraca z nową ofertą co do ulubionego napoju energetycznego w galaktyce, Plazmowego Upojenia. Jako że sprzedaż widoku na niebo naszej zmodyfikowanej ludności powiodła się tak dobrze, korporacja zaproponowała umieszczenie kolejnych reklam w świecie fizycznym.\n\n\"[most_populous.GetName] to idealne miejsce na reklamę\" - deklaruje rzecznik korporacji [sky_megacorp.GetName]. W końcu czyż to nie uczciwe, żeby każdy miał dostęp do tak niesamowitych okazji?"
 cyber.1015.a: "Niech popłynie plazma!"
 cyber.1015.a.tt: "§Y[most_populous.GetName]§! ulega przyozdobieniu gigantycznymi billboardami."
 cyber.1015.b: "Cyfrowe niebo wystarczy."
 cyber.1015.c: "Niech nasz lud może znów swobodnie się rozglądać!"
 sold_sky_1: "Cyfrowe billboardy"
 sold_sky_1_desc: "Sprzedaż wirtualnej uwagi naszych obywateli była świetną decyzją!"
 sold_sky_1_mega: "$sold_sky_1$"
 sold_sky_1_mega_desc: "$sold_sky_1_desc$"
 sold_sky_2: "Billboardy planetarne"
 sold_sky_2_desc: "Elity tej planety postanowiły sprzedać niebo swoich obywateli, aby zdobyć dodatkowe zasoby."
 sold_sky_2_mega: "$sold_sky_2$"
 sold_sky_2_mega_desc: "$sold_sky_2_desc$"
 cyber.1030.name: "Zakazane wspomnienia"
 cyber.1030.desc: "Dzięki dostępności licznych implantów zdolnych do kontrolowania doświadczeń sensorycznych i emocjonalnych ulepszone osoby zaczęły używać wirtualnych doświadczeń życiowych jako sposobu na rozrywkę i eskapizm. Choć engramowi artyści mogą w teorii wyzwalać dowolne emocje, praktyka okazuje się mroczniejsza.\n\nKluby engramów pamięciowych płacą ogromne pieniądze za własne nagrania intensywnie emocjonalnych doświadczeń, jak śluby czy rytuały godowe, ale także samobójstwa, napaści czy morderstwa. Spowodowało to wzrost przestępczości - złoczyńcy zarówno nagrywają siebie popełniających zbrodnie, jak i wykradają implanty ofiar po traumatycznym przeżyciu.\n\nJak powinniśmy zająć się tym niepokojącym szaleństwem?"
 cyber.1030.a: "Zdelegalizujcie tę branżę. Jest zbyt niebezpieczna."
 cyber.1030.a.tt: "Rozrywka engramowa zostanie zakazana."
 cyber.1030.b: "Opodatkujcie produkcję."
 cyber.1030.b.tt: "Rozrywka engramowa zostanie wykorzystana jako źródło dochodu."
 cyber.1030.c: "Uwięźcie każdego, kto posiada takie nagrania."
 cyber.1030.c.tt: "Organy ścigania wezmą na cel każdego, kto nagrywa zachowania przestępcze."
 cyber.1030.d: "Brzmi dekadencko. Zareklamujmy to."
 cyber.1030.d.tt: "Wszelkie formy przyjemności będą pochwalane przez rząd."
 cyber.1030.e: "Niekończące się doświadczenie śmierci? Brzmi bosko."
 cyber.1030.e.tt: "Pozwoli to naszym kapłanom śmierci zrozumieć doświadczenia naszych śmiertelnych akolitów i kierować nimi."
 entertainment_crackdown: "Obława na engramy"
 entertainment_crackdown_desc: "Rejestracja engramów rozrywkowych została zakazana w celu uniknięcia zachowań przestępczych."
 endorsed_entertainment: "Poparcie dla engramów"
 endorsed_entertainment_desc: "Engramy rozrywkowe zyskały znacząco na popularności po tym, jak poparły je władze."
 illicit_entertainment: "Nielegalne engramy"
 illicit_entertainment_desc: "Nowe prawa regulujące korzystanie z engramów znacząco zmniejszyły popyt na tę usługę."
 decadent_entertainment: "Dekadenckie engramy"
 decadent_entertainment_desc: "Nasi obywatele pławią się w ekstremalnej rozkoszy zapewnianej przez engramy - zapewne do czasu, aż nadejdzie kolejna przejściowa moda."
 deadly_entertainment: "Śmiercionośne engramy"
 deadly_entertainment_desc: "Nasi kapłani śmierci mogą teraz doświadczać odbierania życia i umierania. Pomaga im to kierować innymi, zwłaszcza naszymi śmiertelnymi akolitami."
 cyber.1055.name: "Rozgrywki szpiegów"
 cyber.1055.desc: "Pewien kadet floty, wykazując się porażającą głupotą, doprowadził do wycieku tajnych informacji. Jako oddany fan sieciowych symulatorów walki wdał się w kłótnię z innymi graczami na temat prędkości kątowej wieżyczek na naszych niszczycielach.\n\nAby udowodnić swoją rację, przesłał rozmówcom szereg zastrzeżonych schematów naszych okrętów - dokumenty szybko rozeszły się po galaktycznej sieci. Choć sprawa winowajcy została już rozwiązana, w radzie pojawiły się głosy optujące za całkowitym zakazem sprzedaży gier sieciowych."
 cyber.1055.a: "I tak był już najwyższy czas na modernizację floty."
 cyber.1055.b: "Wzmocnijcie nasze zabezpieczenia sieciowe."
 cyber.1055.c: "Rada ma rację. Zakazać tych gier!"
 cyber.1055.d: "Uczyńcie dane nieprzydatnymi, publikując sprzeczne raporty."
 cyber_breach_overcome: "Rozgrywki szpiegów: modernizacja floty"
 cyber_breach_overcome_desc: "Co się stało, to się nie odstanie. Zmodernizujemy nasze floty i sprawimy, że opublikowane schematy staną się bezużyteczne."
 cyber_breach_forgive: "Rozgrywki szpiegów: aktualizacje zabezpieczeń"
 cyber_breach_forgive_desc: "W odpowiedzi na wyciek zaktualizowaliśmy nasze protokoły bezpieczeństwa. Niemniej gracze nie stanowią zagrożenia dla bezpieczeństwa narodowego. Nie ma sensu reagować zbyt gwałtownie na głupią pomyłkę."
 cyber_breach_ban: "Rozgrywki szpiegów: całkowity zakaz"
 cyber_breach_ban_desc: "Poza wzmocnieniem bezpieczeństwa operacyjnego wprowadziliśmy też zakaz rozgrywek sieciowych."
 cyber.1055.leak.tt: "Każdy członek §YWspólnoty Galaktycznej§! zdobywa §Humiarkowane§! §Ywojskowe§! dane wywiadowcze (§Y[Root.GetName]§!) na §Y720§! dni."
 cyber.1055.minorleak.tt: "Każdy członek §YWspólnoty Galaktycznej§! zdobywa §Rskromne§! §Ywojskowe§! dane wywiadowcze (§Y[Root.GetName]§!) na §Y360§! dni."
 has_tradition_subterfuge_tt: "Opcja ta jest dostępna, bo ukończyliśmy drzewko tradycji §Yforteli§!."
 cyber.1205.name: "Cenzura zmysłów"
 cyber.1205.desc: "Najnowsza generacja cyberwszczepów sensorycznych pozwala użytkownikom blokować niechciane wrażenia, od nieprzyjemnych zapachów po nieskromne obrazy - wszystko można stonować, zamaskować albo nawet całkowicie wymazać z percepcji użytkownika. Co bardziej konserwatywne grupy w naszym społeczeństwie podnoszą obawy, że tego typu cenzura wpłynie negatywnie na sumienie naszych obywateli."
 cyber.1205.a: "Nie możemy odwracać wzroku od prawdy naszego życia."
 cyber.1205.b: "Każdy ma prawo do błogiej niewiedzy."
 cyber.1205.c: "Zmiany kosmetyczne to nic złego, ale cenzura jest ryzykowna."
 cyber.1205.d: "Sami zdecydujemy, co dotrze do ich zmysłów."
 cyber_censure_truth: "Cenzura zmysłów: zakazana"
 cyber_censure_truth_desc: "Nie wolno pozwolić obywatelom na stosowanie filtrów, które blokowałyby elementy prawdziwego życia. Prawda musi być zawsze widoczna."
 cyber_censure_total: "Cenzura zmysłów: totalna"
 cyber_censure_total_desc: "Jeśli rzeczywistość jest niekomfortowa, czemu po prostu nie zablokować tego, co nam przeszkadza? Nie trzeba oglądać zbrodni, biedy czy uprzedzeń."
 cyber_censure_partial: "Subtelne zmiany postrzegania"
 cyber_censure_partial_desc: "Pozwoliliśmy obywatelom na wprowadzanie zmian w percepcji za pomocą implantów. Mogą wzbogacić swoje nużące życie o jaskrawe kolory i efekty."
 cyber_censure_authoritarian: "Cenzura zmysłów sterowana przez państwo"
 cyber_censure_authoritarian_desc: "Decydujemy o tym, jak nasi obywatele postrzegają rzeczywistość. Blokując dysydenckie wiadomości i osobowości z żyć naszych wiernych poddanych, chronimy ich przed tymi, którzy pragną ich zwieść na manowce."
 cyber.1210.name: "Wiadomości hackingu podprogowego"
 cyber.1210.desc: "Nielegalne ruchy i ambitne korporacje znalazły nowy sposób reklamowania się: umieszczają skierowane do nieświadomości informacje w cyberwszczepach. Fałszywe wspomnienia, wyselekcjonowane mieszanki hormonów czy sugestie podsuwane podczas snu stają się wszechobecne. Zaniepokojeni politycy zwrócili się w tej sprawie do nas - apelują o zakazanie lub chociaż uregulowanie rynku tych inwazyjnych wiadomości."
 cyber.1210.a: "Nie możemy tolerować tego typu praktyk."
 cyber.1210.b: "Sprytne! Pozwólcie na to."
 cyber.1210.c: "Nakażcie wykupienie licencji na takie praktyki."
 cyber.1210.d: "Użyjmy tego do szerzenia wiary."
 cyber_subliminhack_banned: "Wiadomości hackingu podprogowego: zakazane"
 cyber_subliminhack_banned_desc: "Zakazaliśmy praktyki przesyłania podstępnych wiadomości podprogowych za pośrednictwem cyberwszczepów."
 cyber_subliminhack_allowed: "Wiadomości hackingu podprogowego: dozwolone"
 cyber_subliminhack_allowed_desc: "Zezwoliliśmy na praktykę przesyłania podstępnych wiadomości podprogowych za pośrednictwem cyberwszczepów. Na rynku wszystko jest uczciwe."
 cyber_subliminhack_licensed: "Wiadomości hackingu podprogowego: licencjonowane"
 cyber_subliminhack_licensed_desc: "Sprzedajemy licencje pozwalające na przesyłanie podstępnych wiadomości podprogowych za pośrednictwem cyberwszczepów."
 cyber_subliminhack_hallowed: "Ewangelizacja podprogowa"
 cyber_subliminhack_hallowed_desc: "Wykorzystujemy wiadomości podprogowe przesyłane przez cyberwszczepy do szerzenia naszej wiary."
 cyber.1255.name: "Naruszenie cyberbezpieczeństwa"
 cyber.1255.intro: "Ze zdalnego serwera pobrano niedawno szereg zastrzeżonych dokumentów. Nasi agenci bezpieczeństwa gorąco zapewniają, że wszystkie główne i dodatkowe zapory nie zostały naruszone i nie ma żadnych śladów cyberataku z zewnątrz.\n\n"
 cyber.1255.gov.desc: "$cyber.1255.intro$Nie da się uniknąć tego wniosku: mamy jakiś przeciek, a biorąc pod uwagę wrażliwy charakter wykradzionych danych, musi pochodzić on od kogoś o wysokim poziomie dostępu."
 cyber.1255.hack.desc: "$cyber.1255.intro$Nie da się uniknąć tego wniosku: mamy jakiś przeciek. I stawia on pod znakiem zapytania słuszność naszej decyzji o zastosowaniu otwartoźródłowych ulepszeń cybernetycznych."
 cyber.1255.a: "Przeprowadzić dochodzenie."
 leak_investigation: "Dochodzenie dotyczące przecieku"
 leak_investigation_desc: "Aby odkryć przeciek, będziemy musieli przyjrzeć się wszystkim osobom posiadającym cybernetyczne implanty. Proces będzie najpewniej... inwazyjny."
 cyber.1260.name: "Neuromancja"
 cyber.1260.desc: "Śledztwo w sprawie cyberwycieku zostało zakończone.\n\nPewni ulepszeni urzędnicy rządowi wysokiego szczebla zostali obrani za cel, a ich neurologiczne wszczepy zostały zhakowane. Agenci z zewnątrz zmusili ich do działania wbrew ich własnej woli - żadna z zaatakowanych osób nie pamięta, co robiła.\n\nChoć znamy już przyczynę wycieku, nie zbliżyło nas to ani trochę do odkrycia, kto lub co był za to odpowiedzialny. Podkładając w umysłach urzędników fałszywe dane, możemy jednak dotrzeć do sprawców."
 leak_distrust: "Marionetki wśród nas"
 leak_distrust_desc: "Jak możemy oczekiwać, że nasz lud będzie pokładał wiarę w naszym przywództwie, jeśli każdy z nas może być marionetką?"
 leader_trait_hacked: "Cybermarionetka"
 leader_trait_hacked_desc: "Ten przywódca stanowi zagrożenie - jego wszczep neurologiczny został zhakowany przez nieznanego sprawcę."
 hacked_leaders.tt: "Losowa liczba przywódców będących cyborgami otrzymała cechę §Y$leader_trait_hacked$§!."
 cyber.1265.name: "Kasiarze umysłów" #Playing on the word 'hijacker'
 cyber.1265.desc: "Mamy ich.\n\nPrzestępcy stojący za bezprecedensowymi cyberatakami zostali odnalezieni. Ci samozwańczy kasiarze umysłów, niemający celu innego niż sianie chaosu, zdołali ominąć nasze zabezpieczenia z przynoszącą nam wstyd łatwością. Choć ich przywódcy zostali już aresztowani, musimy jeszcze zdecydować, co zrobić z naszymi zaatakowanymi urzędnikami.\n\nNajprościej będzie zainstalować w ich implantach spersonalizowaną zaporę. Bardziej eleganckim, lecz bardziej ryzykownym rozwiązaniem będzie twardy reset: dostęp do podstawowych funkcji poznawczych pozwoli na wymuszone \"wyłączenie\" urzędników i zainstalowanie im nowego systemu operacyjnego."
 cyber.1265.a: "Zbudujcie zaporę."
 cyber.1265.b: "Zresetujcie urzędników."
 cyber.1265.c: "Wzięli nas na cel. Zbudujcie zaporę."
 cyber.1270.name: "Reset i renowacja"
 cyber.1270.desc: "Twardy reset naszych zaatakowanych urzędników miał nieoczekiwane konsekwencje: wszelkie ślady włamania neurologicznego zostały usunięte, wraz z nimi zniknęła jednak duża część zgromadzonej przez nich wiedzy i doświadczenia.\n\nMimo to jednak ten \"nowy początek\" wyzwolił w urzędnikach, jak sami twierdzą, silne poczucie zawodowej i osobistej odnowy. Zmuszając nas do podjęcia tak drastycznych środków, hakerzy mogli niezamierzenie wyświadczyć nam przysługę."
 rebooted_leaders: "Usuwa wszystkie §Hnegatywne cechy§! u przywódców z cechą §Y$leader_trait_hacked$§!.\nZa każdą usuniętą cechę przywódca traci §R300§! punktów doświadczenia."
 leader_hack_resolution: "Niezłomna czujność"
 cyber.1275.name: "Zapory neurologiczne"
 cyber.1275.desc: "Nasze umysły są bezpieczne.\n\nTechnikom udało się zaprojektować neurologiczny firewall. Aby zapewnić nam zbiorowe bezpieczeństwo, program zostanie natychmiast zainstalowany wszystkim obecnym i przyszłym urzędnikom. Choć będzie to miało negatywny wpływ na podstawowe funkcje poznawcze naszej klasy przywódców, projekt zapewnił nam znaczący wgląd w nauki o bezpieczeństwie danych."
 cyber.1275.a: "Bezpieczeństwo przede wszystkim."
 leader_trait_firewalled: "Zapora neurologiczna"
 leader_trait_firewalled_desc: "Choć nasi przywódcy są bezpieczni przed cyberatakami, nie uczą się równie łatwo jak dotąd."
 hacked_and_firewalled_leaders.tt: "Usuwa cechę §Y$leader_trait_hacked$§! i nakłada cechę §Y$leader_trait_firewalled$§! na wszystkich przywódców będących cyborgami."
 #FINAL EVENT #
 #DEMOCRATIC
 cyber.1505.name: "Społeczeństwo 2.0"
 cyber.1505.desc.individualist: "Nasze społeczeństwo zbudowane zostało na fundamencie procesu demokratycznego. Jego wzmacnianie jest więc dla nas rzeczą naturalną. Nasze nowe cyberwszczepy pozwalają głosować we wszelkich sprawach - drobnych czy poważnych - i zapewniają każdemu bezprecedensową szansę na wyrażenie własnej opinii. Bogactwo danych, jakie zapewnia nam ten fakt, jest wręcz niewyobrażalne. Możliwości wydają się bezgraniczne."
 cyber.1505.desc.collectivist: "Jawne transmitowanie własnych myśli tak, że widzą je inni §Y[Species.GetNamePlural]§!, to przerażająca wizja. Początkowy szok szybko zostaje jednak zastąpiony poczuciem pewności siebie i własnego otoczenia. Wiemy, co robi osoba obok, tak, jak ona wie, co robimy my. Komunikacja odbywa się natychmiastowo, bez słów - ledwie myślami. Aby ochronić tę jasność umysłu, cybermózg otrzymał polecenie tłumienia emocji tak, by nie przesłoniły one tego, co najistotniejsze."
 cyber.1505.desc.neutral: "Mimo niekończących się konsultacji, licznych głosowań i ożywionej dyskusji nasz kraj nie może podjąć decyzji w kwestiach związanych z cyberulepszonym społeczeństwem. Zanim proces zmieni się w niosący podziały konflikt, wkroczyć muszą nasi przywódcy.\n\nMożemy wykorzystać tę szansę do zmodyfikowania naszych wszczepów tak, aby służyły one procesowi demokratycznemu, lub podejść do sprawy bardziej zdecydowanie i pozwolić wszystkim dzielić się własnymi myślami. To drugie rozwiązanie wymagałoby od cybermózgu tłumienia podstawowych emocji, aby uniemożliwić silnym, spontanicznym porywom wpływanie na bezpośrednie otoczenie."
 cyber.1505.a: "Pozwólcie na głosowanie cybermózgiem w czasie rzeczywistym."
 cyber.1505.a.tt: "$change_auth_tt$ ['concept_auth_cyber_democratic_individualist']\n$unlock_edict_legislative_chorus$"
 cyber.1505.b: "Połączcie cybermózgi, by dzieliły się doświadczeniami."
 cyber.1505.b.tt: "$change_auth_tt$ ['concept_auth_cyber_democratic_collectivist']\n$unlock_edict_self_preservation_override$"
 cyber.1505.c: "$cyber_keep_auth_option$"
 cyber.1505.c.tt: "$keep_auth_tt$ ['concept_auth_democratic']"
 #OLIGARCHIC
 cyber.1510.name: "Restrukturyzacja władzy"
 cyber.1510.desc.individualist: "Jasnym stało się, że nasza ludność pragnie mierzyć się ze sobą nawzajem. Nasz plan, który zachęcałby ją do takich hiperrywalizacyjnych zachowań systemem przypominającym grę i zapewniającym ruchliwość społeczną oraz drobne nagrody w zamian za zwiększoną produktywność, dobrze zaspokajałby to pragnienie."
 cyber.1510.desc.collectivist: "Poczucie wspólnoty wśród ludności jest ważniejsze niż ruchliwość społeczna poszczególnych osób. Zamiast zachęcać do rywalizacji, wykorzystamy więc potencjał śpiących ulepszonych umysłów. Ich moc obliczeniowa połączona jest bezprzewodowo do stacji bazowej poprzez łącze cybernetyczne, które przesyła do osoby w fazie odpoczynku zadania do rozwiązania."
 cyber.1510.desc.neutral: "Nasi poddani nie zdołali zdecydować, czy wolą społeczeństwo oparte na rywalizacji, czy też na wspólnocie. Jako ich władcy podejmiemy więc najlepszą dla nich decyzję.\n\nMożemy stworzyć silnie rywalizacyjny, przypominający grę system, w którym osiąganie lepszych wyników niż innych może poprawić perspektywy pod kątem kariery, lub też uzyskać dostęp do mocy obliczeniowej całego społeczeństwa poprzez cybernetyczne łącze, które podpinałoby śpiące mózgi do naszych banków serwerów."
 cyber.1510.a: "Niech walczą o względy."
 cyber.1510.a.tt: "$change_auth_tt$ ['concept_auth_cyber_oligarchic_individualist']\n$unlock_edict_battle_royale$"
 cyber.1510.b: "Niech pracują nawet we śnie."
 cyber.1510.b.tt: "$change_auth_tt$ ['concept_auth_cyber_oligarchic_collectivist']\n$unlock_edict_stately_acclaim$"
 cyber.1510.c: "$cyber_keep_auth_option$"
 cyber.1510.c.tt: "$keep_auth_tt$ ['concept_auth_oligarchic']"
 #DICTATORIAL
 cyber.1515.name: "Kontrola tłumów"
 cyber.1515.desc.individualist: "Lud §Y[Species.GetAdj&genitive]§! cieszy się światem, w którym ulepszeni mogą wyrażać swoją tożsamość na zupełnie nowe sposoby.\n\nTa swoboda jest jednak jedynie fasadą - zastosowane w implantach ulepszone algorytmy śledzące monitorują teraz każdą jednostkę i wykrywają dysydenckie myśli już w chwili przeskoku ładunku między synapsami."
 cyber.1515.desc.collectivist: "W liczebności i jej jednoczącym pędzie w obliczu przeciwności tkwi wielka siła. Każdy cyberulepszony członek społeczeństwa §Y[Species.GetAdj&genitive]§! walczy wspólnie ku lepszej przyszłości, ufając, że wszyscy inni robią to samo.\n\nNasz lud może spać spokojnie, wiedząc, że §Y[Ruler.GetTitle] [Ruler.GetName]§! dzięki swojej wiedzy, osobowości i żelaznej sile woli prowadzi ich ku jasnej przyszłości."
 cyber.1515.desc.neutral: "Podczas gdy mieszkańcy kraju tkwią niespokojnie na rozstajach dróg, §Y[Ruler.GetTitle] [Ruler.GetName]§! musi wykorzystać wyjątkową szansę, jaką zapewniają wszczepy, i podjąć decyzję.\n\nCzy nasz lud powinien otrzymać pewną osobistą wolność, a jednocześnie być monitorowany przez implanty, czy też należy poddać go wpływowi wspaniałej osobowości naszego przywódcy?"
 cyber.1515.a: "Kontrolujcie wolność poprzez monitorowanie."
 cyber.1515.a.tt: "$change_auth_tt$ ['concept_auth_cyber_dictatorial_individualist']\n$unlock_edict_self_indictment_protocol$"
 cyber.1515.b: "Poprowadzi nas nasz przywódca."
 cyber.1515.b.official.tt: "$change_auth_tt$ ['concept_auth_cyber_dictatorial_collectivist_official']\n$unlock_edict_love_letter_virus$"
 cyber.1515.b.commander.tt: "$change_auth_tt$ ['concept_auth_cyber_dictatorial_collectivist_commander']\n$unlock_edict_love_letter_virus$"
 cyber.1515.b.scientist.tt: "$change_auth_tt$ ['concept_auth_cyber_dictatorial_collectivist_scientist']\n$unlock_edict_love_letter_virus$"
 cyber.1515.b.vacant.tt: "$change_auth_tt$ ['concept_auth_cyber_dictatorial_collectivist_vacant']\n$unlock_edict_love_letter_virus$"
 cyber.1515.c: "$cyber_keep_auth_option$"
 cyber.1515.c.tt: "$keep_auth_tt$ ['concept_auth_dictatorial']"
 #IMPERIAL
 cyber.1520.name: "Niech żyje imperium"
 cyber.1520.desc.individualist: "Tron cesarski nakazał, aby nasze wysiłki skupiły się na dynastii władcy. Każdy przyszły rządzący otrzyma §Y$r_the_rulerchip$§!, co pozwoli mu na rejestrowanie i przenoszenie swoich doświadczeń jako [root.GetRulerTitle] imperium §Y[root.GetName]§!. Chip ten zostanie w chwili śmierci zamontowany w ciele następcy tronu.\n\nNa przestrzeni pokoleń $r_the_rulerchip$ wraz ze swoją bogatą biblioteką doświadczeń stanie się fundamentem naszego społeczeństwa. Możemy też wykorzystać wiedzę naszej ludności dla dobra przywódców."
 cyber.1520.desc.collectivist: "Aby nasi imperialni obywatele mogli odetchnąć od trudów codzienności, §Y[root.Capital.GetName]§! musi stać się miejscem, w którym powstanie §Y$building_cyberdome$§!. Posłuży jako wspaniała arena dla najrozmaitszego typu cybersportów, w ramach których ulepszeni sportowcy będą konkurować o nasze względy i podziw. Tak zaciekłe starcia z pewnością rozbudzą entuzjazm mas - §Y[root.GetName]§! będzie cieszyć się podziwem.\n\nCo więcej, pokazy te można poprzez neuronadawanie przesyłać bezpośrednio do cybermózgu. [root.Capital.GetName] stanie się celem podróży wielkich tłumów pragnących osobiście poczuć pierwotne sportowe emocje."
 cyber.1520.desc.neutral: "Na drodze rozwoju społecznego poprzez cybernetykę trafiliśmy na rozstaja. Możemy skupić nasze wysiłki na korzyściach dla nielicznych lub na dobru ogółu. W obu przypadkach §Y[root.GetName]§! na tym skorzysta.\n\nOpracowanie wyspecjalizowanego implantu pozwoli nam przenieść doświadczenia, jakie [root.GetRulerTitle] gromadzi podczas sprawowania władzy, na następcę. Opracowanie systemu cybersportu i technologii nadawczych pozwoli z kolei na organizację wielkich wydarzeń, których sercem będzie nasza stolica, [root.Capital.GetName]."
 cyber.1520.a: "Zachowajcie wiedzę imperium."
 cyber.1520.a.tt: "$change_auth_tt$ ['concept_auth_cyber_imperial_individualist']\n$create_relic_the_rulerchip$\n$unlock_edict_levied_experience$"
 cyber.1520.b: "Urządźcie fetę cybersportową w stolicy i transmitujcie ją na cały kraj."
 cyber.1520.b.tt: "$change_auth_tt$ ['concept_auth_cyber_imperial_collectivist']\n$unlock_building_cyberdome$\n$unlock_edict_neurocasted_spectacles$"
 cyber.1520.c: "$cyber_keep_auth_option$"
 cyber.1520.c.tt: "$keep_auth_tt$ ['concept_auth_imperial']"
 #CORPORATE
 cyber.1525.name: "Implanty sp. z o.o."
 cyber.1525.desc.individualist: "Grupy fokusowe §Y[Species.GetAdj&genitive]§! pochlebnie wypowiadają się o swoich nowych implantach ocznych. Nasz dział analityczny sugeruje, że może to poskutkować znaczącym wzrostem skuteczności reklam i obiecującym skokiem sprzedaży wszystkich naszych produktów. Dowodzi to ogromnego potencjału produktu, jaki niedługo będzie miał swoją premierę.\n\nEpoka cybernetyki nadeszła, my zaś w pełni wykorzystamy ją poprzez ulepszoną strategię korporacyjną."
 cyber.1525.desc.collectivist: "Nasze oddanie sprawie holistycznego samodoskonalenia znajduje oddźwięk wśród ogółu społeczeństwa.\n\nZajmowanie się sprawami socjoekonomicznymi idzie w parze z naszą wizją korporacyjną - pozwoli nam to stale opracowywać implanty, które koniecznie trzeba posiadać."
 cyber.1525.desc.neutral: "Biorąc pod uwagę, jak znacząco odmieniła nasze społeczeństwo technologia cybernetyczna, nie powinno być chyba zaskoczeniem, że przeciętny konsument nie wie, w jakim kierunku się udać. Czy standardem stanie się różnicowanie według osoby? A może nacisk powinien być kładziony na dobro ogółu?\n\nTa kluczowa decyzja z pewnością będzie mieć dalekosiężne konsekwencje, lecz niezdecydowanie to śmierć zysków. Trzeba dokonać wyboru."
 cyber.1525.a: "Rozpocznijcie sprzedaż wszczepów obsługujących reklamy."
 cyber.1525.a.tt: "$change_auth_tt$ ['concept_auth_cyber_corporate_individualist']\n$unlock_edict_customer_insights$"
 cyber.1525.b: "Nakażcie okresowe ulepszanie wszczepów."
 cyber.1525.b.tt: "$change_auth_tt$ ['concept_auth_cyber_corporate_collectivist']\n$unlock_edict_rolling_updates$\n$unlock_agenda_augmentation_product_launch$"
 cyber.1525.c: "$cyber_keep_auth_option$"
 cyber.1525.c.tt: "$keep_auth_tt$ ['concept_auth_corporate']"
