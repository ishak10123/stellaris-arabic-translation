 edict_neurocasted_spectacles: "Neuronadawane igrzyska"
 edict_neurocasted_spectacles_desc: "Neuronadawanie brutalnych igrzysk ze stołecznej cyberkopuły prosto do cybermózgów sprawia, że mieszkańcy imperium ściągają tłumnie do stolicy. Ciesząc się bezpieczeństwem kapsuł, widzowie doznają przeżyć gladiatorów z ich perspektywy. Cały rok igrzysk!"
