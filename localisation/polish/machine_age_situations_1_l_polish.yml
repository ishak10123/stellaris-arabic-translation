 auth_cyber_dictatorial_individualist: "Dyktatorska cyberwizja"
 auth_cyber_dictatorial_individualist_desc: "Obowiązkowa implantacja zapewnia dostęp do szerokich narzędzi kontroli i zapewniania porządku, które wzmacniają władzę reżimu nad poddanymi. Chipy, które zyskały sobie miano dyktatorskich, monitorują swoich posiadaczy i automatycznie informują władze w razie kłopotów."
