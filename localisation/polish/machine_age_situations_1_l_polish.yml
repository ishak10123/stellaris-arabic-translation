 auth_cyber_imperial_collectivist_desc: "Sieć imperialna zapewnia całej populacji dostęp do zupełnie nowych odmian masowej rozrywki. $building_cyberdome$ w stolicy stanie się po zbudowaniu miejscem, w którym ulepszeni sportowcy mierzyć się będą w transmitowanych na żywo w wielu światach cybersportach."
