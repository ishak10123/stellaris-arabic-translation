 futureshock_chain_title: "Szok przyszłości"
 futureshock_chain_desc: "Odmawiamy ograniczania się do tego, co dała nam natura - zamierzamy przekroczyć ograniczenia organicznych ciał. Nasza pełnoskalowa dystrybucja implantów spotkała się z jedynie drobnymi problemami, z których wszystkie można łatwo rozwiązać. Znakomita większość ludności jest zachwycona możliwościami swoich nowych cyberwszczepów.\n\nOto stoimy o krok od wielkości. Co stanie się teraz - pokaże czas."
