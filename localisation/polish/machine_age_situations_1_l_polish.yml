 building_cyberdome: "Cyberkopuła"
 building_cyberdome_desc: "Arena, na której ulepszeni atleci mierzą się w brutalnych cybersportach ku rozrywce obywateli imperium. Wzmocnieni gladiatorzy, sportowcy i sprinterzy rywalizują o nasze względy, dopóki nie zostaną uszkodzeni lub nie zginą."
