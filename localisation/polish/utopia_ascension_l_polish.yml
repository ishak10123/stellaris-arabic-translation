 venture.shroud.tooltip: "Zużywa energię, aby zagłębić się w Woal. Jej koszt będzie tym mniejszy, im więcej źródeł §Hzra§! kontrolujemy (do maksymalnie 4).\n\n"
 exit.shroud.tooltip: "Opuścić Woal i powrócić do normalnej przestrzeni."
 shroud.avatar: "Jeśli to się uda, w naszym Wszechświecie pojawi się Awatar z czystej energii psychicznej. Będzie całkowicie pod naszą kontrolą."
 shroud.boon: "Jeśli to się uda, energie Woalu zostaną przekształcone w potężne błogosławieństwo, które wywrze pozytywny wpływ na całe nasze imperium."
 shroud.unknown: "Jeśli to się uda, to... cóż... kto wie, co się stanie?"
