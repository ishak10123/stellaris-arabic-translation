 utopia.3000.name: "Woal"
 utopia.3000.a: "Sięgnąć do Woalu."
 utopia.3000.intro.desc: "Woal. Niewiarygodnie obcy i niepokojący, ale... także bardzo znajomy. Każda osoba posiadająca moce psioniczne widywała to miejsce w swoich snach, choć zapewne wtedy go nie rozpoznała.\n\nUtrzymujemy się teraz nad granicą tej krainy, niedaleko od ziejącej pustki Pogranicza, które oddziela tamten świat od normalnej przestrzeni - czyli tego, co nazwalibyśmy światem rzeczywistym.\n\nJeśli zachcemy zapuścić się głębiej w Woal, będzie to wymagało wielkiego wysiłku naszych telepatów, jak również ogromnej ilości energii. Nie możemy jednak zwlekać... przez cały czas coś nas obserwuje."
 utopia.3000.1.desc: "Woal jest dziś spokojny."
 utopia.3000.2.desc: "Coś nas obserwuje."
 utopia.3000.3.desc: "Po tej stronie wszystko wygląda inaczej."
 utopia.3000.4.desc: "Powinni tu wysłać jakiegoś poetę..."
 utopia.3000.5.desc: "Nadciąga coś mrocznego."
 utopia.3000.6.desc: "Czy my wciąż śnimy?"
 utopia.3000.7.desc: "Udało się... jesteśmy w środku!"
 utopia.3000.8.desc: "W pobliżu można poczuć jakąś... obecność. Wzywa nas głębiej w Woal..."
 utopia.3000.9.desc: "Czy wy też słyszycie te głosy?"
 utopia.3000.10.desc: "Woal pulsuje energią. Czujemy się jak... w domu."
 utopia.3000.11.desc: "Wydaje wam się, że oddychacie teraz powietrzem?"
 utopia.3000.12.desc: "Patrzymy, ale nie widzimy. Jeszcze tyle musimy się dowiedzieć o tym miejscu."
 utopia.3000.13.desc: "Jakich zmysłów nam brak, że nie możemy dostrzec ani usłyszeć innego świata, który nas otacza?"
 utopia.3000.14.desc: "Zachowajcie daleko posuniętą ostrożność. Nawet zbłąkana myśl może się w tym miejscu zmaterializować... i najczęściej zwrócić przeciw nam."
 utopia.3000.15.desc: "To nigdy nie było miejsce dla nas."
 utopia.3000.16.desc: "Tak... wiele... mocy..."
 utopia.3000.17.desc: "Trzeba się... skupić..."
 utopia.3000.18.desc: "Czy to tu wszystko się zaczęło?"
 utopia.3000.19.desc: "Lęk... lęk zyskał twarz."
 utopia.3000.b: "§MSkontaktujmy się z siłą wyższą.§!"
 utopia.3005.desc: "Wiemy, że gdzieś tam istnieją wielkie siły. Zwykle pozostajemy niezauważeni, ale możemy spróbować skontaktować się z nimi, korzystając z mocy zro. Nasi telepaci wyczuwają wpływ tych istot w całym Woalu. Którą powinniśmy odszukać?"
 utopia.3005.a: "§GTę, która cuchnie nieskrępowanym ciałem.§!"
 utopia.3005.b: "§PTę, która wrzeszczy o nienasyconej pustce.§!"
 utopia.3005.c: "§HTę, która szepcze o tęsknocie i opętaniu.§!"
 utopia.3005.d: "§BTę, która smakuje jak zawiedzione zaufanie.§!"
 utopia.3010.desc: "Zgromadzenie Telepatów nie zregenerowało jeszcze sił psychicznych po poprzednich odwiedzinach Woalu. Bez połączonych mocy psionicznych telepatów wychwytujemy tylko krótkie przebłyski tego ulotnego świata - niczym niewyraźne kontury utraconych wspomnień.\n\nNie możemy tu nic więcej zrobić. Trzeba wrócić później."
 boon.bestowed: "§GOtrzymano błogosławieństwo§!"
 curse.bestowed: "§ROtrzymano klątwę§!"
 boon.psi.link.machine: "Potężne energie §HWoalu§! zalały węzeł przetwarzania psionicznego, który dzielą wszyscy [Root.GetSpeciesNamePlural]."
 boon.psi.link.organic_non_gestalt: "Potężne energie §HWoalu§! zalały wspólne połączenie psioniczne, jakie dzielą wszyscy [Root.GetSpeciesNamePlural]."
 boon.psi.link.hive: "Potężne energie §HWoalu§! zalały wspólne połączenie psioniczne, które pulsuje w całym nadumyśle [Root.GetAdjective]."
 boon.psi.link: "[GetBoonPsiLink]"
 boon.ship.link: "Nasi [GetTelepathPlural] zdołali stworzyć tymczasowy kanał między §HWoalem§! a naszymi okrętami."
 utopia.3030.desc.gestalt: "$boon.psi.link$\n\nTe energie krążą w naszej kolektywnej sieci, stabilizują ją, a nasze drony wykonują wyznaczone im zadania."
 utopia.3030.desc.organic_non_gestalt: "$boon.psi.link$\n\nPo całym imperium [Root.GetName] rozchodzi się uczucie głębokiego spokoju, oddziałujące nawet na osoby pozbawione zdolności psionicznych."
 utopia.3030.desc.machine_non_gestalt: "$boon.psi.link$\n\nPo całym imperium [Root.GetName] rozchodzi się uczucie operacyjnej ciszy, oddziałujące nawet na jednostki pozbawione elementów psionicznych."
 utopia.3031.desc: "$boon.ship.link$\n\nNasze floty nie wykazują objawów zużycia, niezależnie od dotychczasowego przebiegu ich służby. W rezultacie nasze koszty utrzymania znacznie zmalały."
 utopia.3032.desc.non_gestalt: "$boon.psi.link$\n\nPowstała kolektywna baza danych, z której wszyscy nasi [GetScientistPlural] mogą czerpać wiedzę telepatycznie. Znacznie zwiększy to wydajność ich pracy."
 utopia.3032.desc.organic_gestalt: "$boon.psi.link$\n\nNasze badania skoncentrowane na węzłach nadumysłu gatunku [Root.GetSpeciesAdj&genitive] działają w idealnej synchronizacji, co zwiększa naszą wydajność kognitywną."
 utopia.3032.desc.machine_gestalt: "$boon.psi.link$\n\nPsioniczne pętle odtwarzające sprawiają, że nasza matryca badawcza działa powyżej swojej maksymalnej wydajności, co znacznie poprawia wydajność uczenia."
 utopia.3033.desc: "$boon.ship.link$\n\nZałogi naszych okrętów mogą teraz wzmacniać systemy osłon za pomocą swoich mocy psionicznych."
 utopia.3034.desc: "$boon.ship.link$\n\nZałoga naszego okrętu może teraz wykorzystywać swoje moce psioniczne do wzmacniania systemów uzbrojenia."
 utopia.3035.desc: "$boon.ship.link$\n\nZałoga naszego okrętu może teraz wykorzystywać swoje moce psioniczne do zwiększenia szybkostrzelności."
 utopia.3036.desc.organic_non_gestalt: "$boon.psi.link$\n\nW sercach i umysłach naszych obywateli powstało nowe poczucie solidarności, dzięki któremu chętniej współpracują w dążeniu do wspólnych celów wskazywanych przez nasz rząd."
 utopia.3036.desc.machine_non_gestalt: "$boon.psi.link$\n\nW rdzeniach obliczeniowych naszych obywateli powstało nowe poczucie solidarności, dzięki któremu chętniej współpracują w dążeniu do wspólnych celów wskazywanych przez nasz rząd."
 utopia.3036.desc.gestalt: "$boon.psi.link$\n\nTe energie utrzymują się w kolektywie, zwiększają wydajność naszych dronów, zmniejszają przewlekłe dewiacje, które zakłócały naszą uwagę."
 utopia.3037.desc.organic_non_genocidal: "$boon.psi.link$\n\nNasi empaci są silniejsi niż kiedykolwiek, dzięki czemu mają większy wpływ na politykę."
 utopia.3037.desc.machine_non_genocidal: "$boon.psi.link$\n\nNasze jednostki dyplomatyczne działają z maksymalną wydajnością empatii, co zwiększa nasze wpływy polityczne."
 utopia.3037.desc.genocidal: "$boon.psi.link$\n\nZ zupełnie nową siłą narzucimy galaktyce naszą wolę."
 utopia.3038.desc.gestalt: "$boon.psi.link$\n\nNigdy nie doświadczyliśmy takiej jasności i jedności w realizacji celów."
 utopia.3038.desc.non_gestalt: "$boon.psi.link$\n\nJeszcze nigdy nie mieliśmy tak silnego poczucia jedności."
 utopia.3039.desc: "$boon.ship.link$\n\nZałoga naszego okrętu może teraz wykorzystywać swoje moce psioniczne do przyspieszenia ruchu jednostek, co zwiększa szanse na uniknięcie wrogiego ostrzału."
 utopia.3040.desc.organic: "$boon.ship.link$\n\nZałoga naszego okrętu może teraz wykorzystywać swoje moce psioniczne do wykonywania napraw polowych i reperować pęknięcia kadłubów samą siłą umysłu."
 utopia.3040.desc.machine: "$boon.ship.link$\n\nZałoga naszego okrętu może teraz wykorzystywać swoje moce psioniczne do wykonywania napraw polowych i reperować pęknięcia kadłubów samą siłą neuroprocesorów."
 utopia.3041.desc.machine: "$boon.psi.link$\n\nNasi [GetTelepathPlural] wykorzystali tę energię, by błyskawicznie poprawić wydajność funkcjonalną naszych najważniejszych jednostek przywódczych, co opóźni ich zużycie o dziesięciolecia. Niestety, energii psionicznej nie wystarczyło, by wywołać ten efekt w całej populacji."
 utopia.3041.desc.organic_gestalt: "$boon.psi.link$\n\nNasi [GetTelepathPlural] wykorzystali tę energię, by błyskawicznie spowolnić starzenie się naszych najważniejszych dronów przywódczych, co wydłuży ich życia o dziesięciolecia. Niestety, energii psionicznej nie wystarczyło, by wywołać ten efekt w całej populacji."
 utopia.3041.desc.organic_non_gestalt: "$boon.psi.link$\n\nNasi [GetTelepathPlural] wykorzystali tę energię, by błyskawicznie spowolnić starzenie się naszych najważniejszych przywódców, co wydłuży ich życia o dziesięciolecia. Niestety, energii psionicznej nie wystarczyło, by wywołać ten efekt w całej populacji."
 utopia.3041.tooltip: "Wszyscy przywódcy otrzymują cechę §Y$leader_trait_shroud_age$§!, która wydłuża życie przywódcy o §G40§! lat."
 utopia.3042.desc: "$boon.ship.link$\n\nZałoga naszego okrętu może teraz wykorzystywać swoje moce psioniczne do wzmacniania silników manewrowych, co znacznie zwiększa szybkość podświetlną."
 utopia.3043.desc.organic: "$boon.psi.link$\n\nWzmocniło to umysły naszych żołnierzy, którzy potrafią teraz stawić czoła każdemu niebezpieczeństwu na polu walki. Ich morale jest niezrównany."
 utopia.3043.desc.machine_or_gestalt: "$boon.psi.link$\n\nWzmocniło to zaangażowanie naszych dronów bojowych w prowadzone działania i zwiększyło ich skuteczność na polu walki."
 utopia.3044.desc: "$boon.psi.link$\n\nMożemy teraz wyczuwać jednostki przemierzające kosmos z dużo większej odległości niż jakikolwiek zwykły czujnik."
 utopia.3045.name: "Wyrzuceni z Woalu"
 utopia.3045.1.desc: "Kanał, za którego pomocą nasi [GetTelepathPlural] łączyli się z Woalem, zapadł się, gdy kilka warstw energii psychicznego świata uległo nagłemu przesunięciu bez żadnego ostrzeżenia.\n\nW rezultacie jesteśmy wypychani z powrotem do normalnej przestrzeni."
 utopia.3045.2.desc: "Nasi [GetTelepathPlural] załamali się pod ogromnym napięciem, jakie odczuwali podczas naszego złączenia z Woalem.\n\nNie są w stanie utrzymywać tego łącza."
 utopia.3045.3.desc_organic: "Początkowo powoli, a potem coraz szybciej i szybciej Woal zaczyna wymykać się z naszego chwytu. Nasi [GetTelepathPlural] krzyczą w cierpieniu, tracąc punkt oparcia i wypadając z powrotem do normalnej przestrzeni."
 utopia.3045.3.desc_machine: "Początkowo powoli, a potem coraz szybciej i szybciej Woal zaczyna wymykać się z naszego chwytu. Nasi [GetTelepathPlural] zaczynają szwankować, tracąc punkt oparcia i wypadając z powrotem do normalnej przestrzeni."
 curse.psi.link.organic: "Potężne psychiczne szarpnięcie wstrząsnęło kanałem łączącym nas z Woalem, a potem połączeniem psionicznym, jakie dzielą wszyscy [Root.GetSpeciesNamePlural]."
 curse.psi.link.machine: "Potężne neuronowe szarpnięcie wstrząsnęło kanałem łączącym nas z Woalem, a potem połączeniem psionicznym, jakie dzielą wszyscy [Root.GetSpeciesNamePlural]."
 curse.psi.link: "[GetCursePsiLink]"
 curse.ship.link: "Potężne psioniczne szarpnięcie wstrząsnęło kanałem łączącym nas z Woalem i najwyraźniej oddziałuje też na nasze jednostki."
 utopia.3050.desc.gestalt: "$curse.psi.link$\n\nDoprowadziło to do zakłóceń w kolektywie imperium [Root.GetName], a w konsekwencji do destabilizacji na całym terytorium."
 utopia.3050.desc.non_gestalt: "$curse.psi.link$\n\nWywarło to silny wpływ na zadowolenie naszych obywateli i całe imperium [Root.GetName] jest teraz przygnębione."
 utopia.3051.desc.gestalt: "$curse.psi.link$\n\nFale uderzeniowe przetoczyły się przez cały kolektyw i wywołały zachowania dewiacyjne naszych dronów."
 utopia.3051.desc.non_gestalt: "$curse.psi.link$\n\nTa negatywna energia zasiała ziarno wątpliwości w umysłach naszych obywateli. Wielu z nich zwraca się ku nowym radykalnym ideom odbiegającym od zamiarów rządu. Wpływ ten rozprzestrzenia się nawet wśród osób nieposiadających zdolności parapsychicznych!"
 utopia.3052.desc: "$curse.ship.link$\n\nIch pancerz stał się kruchy i nie wytrzymuje już tylu trafień, co niegdyś."
 utopia.3053.desc.machine: "$curse.psi.link$\n\nObciążenie naszej sieci neuronowej doprowadziło do zauważalnego spadku budowy jednostek w całym imperium [Root.GetName]."
 utopia.3053.desc.organic_gestalt: "$curse.psi.link$\n\nBól odczuwalny przez cały kolektyw wywołał znaczny spadek naszej zdolności wytwarzania nowych dronów materialnych."
 utopia.3053.desc.organic_non_gestalt: "$curse.psi.link$\n\nZ jakiegoś powodu wywarło to negatywny wpływ na dzietność w całym imperium [Root.GetName]. Efekt ten odczuwają nawet ci z obywateli, którzy nie mają wrodzonych zdolności psionicznych!"
 utopia.3054.desc.machine_gestalt: "$curse.psi.link$\n\nPojawiły się pętle psioniczne, które uniemożliwiają naszej matrycy badawczej wydajne działanie przy pełnej mocy."
 utopia.3054.desc.machine_non_gestalt: "$curse.psi.link$\n\n[GetMindPhysicalLoc] naszych badaczy zostały przeciążone, przez co nie mogą odpowiednio skoncentrować się na zleconych im zadaniach."
 utopia.3054.desc.organic_gestalt: "$curse.psi.link$\n\nNasze węzły badawcze znajdujące się w kolektywie [Root.GetSpeciesAdj&genitive] są przeciążone. Nie możemy przez to wydajnie przetwarzać najnowszych odkryć."
 utopia.3054.desc.organic_non_gestalt: "$curse.psi.link$\n\n[GetMindPhysicalLoc] naszych badaczy zostały przytępione, przez co nie mogą odpowiednio skoncentrować się na zleconych im zadaniach."
 utopia.3055.desc: "$curse.psi.link$\n\nSzybkość gromadzenia wpływów politycznych uległa poważnemu zmniejszeniu."
 utopia.3056.desc.organic_non_gestalt: "$curse.psi.link$\n\nPoczucie jedności, które łączyło niegdyś naszych obywateli, zanikło."
 utopia.3056.desc.machine_or_gestalt: "$curse.psi.link$\n\nPoczucie jedności, które łączyło niegdyś naszych całe imperium [Root.GetName] zostało naruszone, co doprowadziło do powszechnej utraty koordynacji."
 utopia.3057.desc: "$curse.ship.link$\n\nNasze okręty poruszają się, jak gdyby hamowała je jakaś niewidzialna siła. Spowodowało to znacznie spowolnienie lotów podświetlnych."
 utopia.3058.desc.organic_non_gestalt: "$curse.psi.link$\n\nTa negatywna energia podkopała morale naszych wojsk planetarnych - przez pewien czas będą one znacznie mniej skuteczne w walce."
 utopia.3058.desc.machine_or_gestalt: "$curse.psi.link$\n\nPętle zwrotne wywołane przez ten wzrost natężenia energii spowodowały uszkodzenie wydajności operacyjnej naszych wojsk lądowych."
 utopia.3059.desc: "Potężne psioniczne szarpnięcie wstrząsnęło kanałem łączącym nas z Woalem i najwyraźniej zakłóca też działanie naszych czujników międzygwiezdnych.\n\nRozdzielczość wszystkich czujników znacznie zmalała, co silnie zredukowało ich zasięg."
