 covenant_composer_of_strands_desc: "Zawarliśmy Pakt z potężną istotą z Woalu i cieszymy się teraz jej dobrodziejstwem.\n\n§YBędziemy jednak musieli za to zapłacić.§!"
 covenant_composer_of_strands_0_desc: "$covenant_composer_of_strands_desc$"
