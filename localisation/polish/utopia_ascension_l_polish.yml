 opinion_invaded_mind: "Próba inwazji na umysł"
 utopia.3100.name: "Pożoga i zniszczenie"
 utopia.3100.desc_prefix: "[Root.Capital.GetName]... wizja jest zamglona i niewyraźna, ale nie ma wątpliwości - to [Root.Capital.GetName], nasz stolica. "
 utopia.3100.desc_suffix: "\n\n§HNIE JEDNĄ Z WIELU. ONA NADEJDZIE. TO TAK PEWNE, JAK WSCHÓD SŁOŃCA. TO WASZE PRZEZNACZENIE.§!\n\nWizja znika równie szybko, jak się pojawiła, pozostawiając po sobie miazmaty wirującej energii psionicznej."
 utopia.3100.desc_default: "$utopia.3100.desc_prefix$Wielkie miasta wyglądają inaczej, lecz znajomo, nawet przez zasłaniające widok ściany płomieni i dymu. Tysiące... nie, miliony okaleczonych ciał zaściełają ulice, a wszystkie należą do [Root.GetSpeciesAdj&genitive]. Odór rozkładu jest nie do zniesienia.\n\n§HTO WASZA PRZYSZŁOŚĆ.§!\n\nW ruinach nie pozostało nic żywego. Na niebie ponad miastami wielkie instalacje orbitalne, ciągnąc za sobą warkocze dymu, zaczęły powolny, acz nieunikniony upadek na powierzchnię. Czy widzimy jedną z wielu możliwych przyszłości?$utopia.3100.desc_suffix$"
 utopia.3100.desc_hive: "$utopia.3100.desc_prefix$Wielkie miasta wyglądają inaczej, lecz znajomo, nawet przez zasłaniające widok ściany płomieni i dymu. Tysiące... nie, miliony okaleczonych ciał zaściełają ulice, a wszystkie należą do [Root.GetSpeciesAdj&genitive]. Odór rozkładu jest wszechobecny.\n\n§HTO WASZA PRZYSZŁOŚĆ.§!\n\nW ruinach nie pozostało nic żywego. Na niebie ponad miastami wielkie instalacje orbitalne, ciągnąc za sobą warkocze dymu, zaczęły powolny, acz nieunikniony upadek na powierzchnię. Czy widzimy jedną z wielu możliwych przyszłości?$utopia.3100.desc_suffix$"
 utopia.3100.desc_machine: "$utopia.3100.desc_prefix$Duże miasta wyglądają inaczej, lecz daje się je rozpoznać, nawet przez zasłaniające widok ściany płomieni i dymu. Tysiące... nie, miliony rozmontowanych jednostek zaściełają ulice, a wszystkie należą do [Root.GetSpeciesAdj&genitive]. Otacza nas totalne zniszczenie.\n\n§HTO WASZA PRZYSZŁOŚĆ.§!\n\nW ruinach nie pozostało nic działającego. Na niebie ponad miastami wielkie instalacje orbitalne, ciągnąc za sobą warkocze dymu, zaczęły powolny, acz nieunikniony upadek na powierzchnię. Czy rejestrujemy jedną z wielu możliwych przyszłości?$utopia.3100.desc_suffix$"
 utopia.3100.a: "§GPrzekierujcie energie do Awatara.§!"
 utopia.3100.b: "§YBłogosławieństwo - zwiększony zasięg czujników.§!"
 utopia.3100.c: "§RBłogosławieństwo - zwiększona siła osłon.§!"
 utopia.3110.name: "Walczące widma"
 utopia.3110.desc: "Woal jest tu bardzo niespokojny. Pędzą poprzez niego ogromne prądy czystej, psionicznej energii, a z gwałtownych reakcji rodzą się na wpół inteligentne widma.\n\nTe zdezorientowane widma często ścierają się ze sobą, wyzwalając potężne ilości mocy psychicznej w bitwach, które mogą trwać całe tysiąclecia. Zdaje się, że kilka takich pojedynków obecnie się toczy.\n\nPowinniśmy postępować z rozwagą."
 utopia.3120.name: "Goście psioniczni"
 utopia.3120.desc_suffix: "Są tu gośćmi tak jak my - potężna sonda psioniczna stworzona przez umysły skrajnie obce tak dla nas, jak i dla Woalu.\n\nGdy ich psioniczne echo dotyka naszego, dostrzegamy ulotny obraz: w gęstej gazowej atmosferze unoszą się wielkie organiczne istoty, którym towarzyszą roje drobniejszych stworów."
 utopia.3120.desc_machine: "W głębi Woalu wyczuwamy jakąś obecność. $utopia.3120.desc_suffix$"
 utopia.3120.desc_default: "Nagle, w głębi Woalu wyczuwamy jakąś obecność. $utopia.3120.desc_suffix$"
 utopia.3130.name: "Bezkresne piaski"
 utopia.3130.desc: "Przed nami rozciąga się pustynia bez końca. Już tu kiedyś byliśmy.\n\n§H\"Shala'kul milem zunak?\"§!\n\nCoś wyłania się spod piasku, lecz trudno to dojrzeć wyraźnie.\n\n§H\"Zharabi, melasuk\".§!\n\nTe słowa są niczym pioruny, wypowiadane przez usta, dla których nigdy nie był przeznaczone. Jesteśmy zmuszeni odpowiedzieć."
 utopia.3130.a: "Shashka malak."
 utopia.3130.b: "Tirit nali dasumara!"
 utopia.3130.c: "Kunak de'Kirak."
 utopia.3140.name: "Wielość"
 utopia.3140.desc_common: "obnażona zostaje natura naszego bytu. Wieloświat, w którym tysiące galaktyk jak nasza pozostają uwięzione w nieskończonych cyklach konfliktu.\n\nWalka zaczyna się, kończy, a potem zaczyna ponownie. Za każdym razem biliony"
 utopia.3140.desc_suffix: "§H\"Tak jest\",§! szepcze jakiś głos, §H\"i zawsze tak będzie\".§!"
 utopia.3140.desc_default: "Nagły ból przynosi jasność, stawką są życia ($utopia.3140.desc_common$).\n\n$utopia.3140.desc_suffix$"
 utopia.3140.desc_machine: "Nagle przychodzi przerażająca jasność, stawką są zmienne ($utopia.3140.desc_common$).\n\n$utopia.3140.desc_suffix$"
 utopia.3150.name: "Głosy poległych"
 utopia.3150.desc: "Spoglądamy z wysoka na naszą galaktykę, z odległości setek tysięcy lat świetlnych. Bez żadnego ostrzeżenia psioniczny prąd wypluwa nas w dół, ku miriadom gwiazd. Śmigamy z niewiarygodną szybkością ku obszarowi kosmosu, który niegdyś należał do jednego z upadłych imperiów - władali nim [fallen_empire.GetName].\n\nZ lewa i prawa przemykają gwiazdy, potem planety, aż w końcu wizja osiada przy mieście [fallen_empire.GetSpeciesAdj&genitive]. Niezwykłe iglice pną się ku niebu wspomagane technologią antygrawitacyjną, która wyprzedza naszą naukę o wiele pokoleń. Nurt niesie nas ku jednej z nich przez kolejne ściany, aż docieramy do jakiejś wielkiej sali posiedzeń. Znajdują się w niej [fallen_empire.GetSpeciesNamePlural], dwie osoby unoszące się wygodnie w fotelach antygrawitacyjnych i rozmawiające ze sobą cichym głosem.\n\nNie zauważają naszej obecności."
 utopia.3150.a: "§YPoszukać tajemnic w ich umysłach.§!"
 utopia.3151.name: "§GTajemnice technologii§!"
 utopia.3151.v1.desc: "$utopia.3151.a.desc$\n\n$utopia.3151.1.desc$\n\n$utopia.3151.b.desc$\n\n$utopia.3151.4.desc$\n\n$utopia.3151.c.desc$"
 utopia.3151.v2.desc: "$utopia.3151.a.desc$\n\n$utopia.3151.2.desc$\n\n$utopia.3151.b.desc$\n\n$utopia.3151.5.desc$\n\n$utopia.3151.c.desc$"
 utopia.3151.v3.desc: "$utopia.3151.a.desc$\n\n$utopia.3151.3.desc$\n\n$utopia.3151.b.desc$\n\n$utopia.3151.6.desc$\n\n$utopia.3151.c.desc$"
 utopia.3151.a.desc: "[fallen_empire.GetSpeciesNamePlural] są najwyraźniej jakimiś dygnitarzami omawiającymi sprawy państwowe. Wizja zbliża się do nich powoli, ale pewnie, a ich obca mowa przekształca się stopniowo w zrozumiałe dla nas słowa."
 utopia.3151.b.desc: "Poświata, jaką otoczeni są [fallen_empire.GetSpeciesNamePlural], jest wręcz przytłaczająca. Ich umysły otwierają się niczym rozkwitające pąki i stają się całkowicie odsłonięte. Bardzo łatwo będzie je spenetrować."
 utopia.3151.c.desc: "I już. Technologiczne tajniki ukryte w zakątkach ich umysłów - zupełnie, jak gdyby kopiować plik z niezabezpieczonego komputera. [fallen_empire.GetSpeciesNamePlural] pozostają nieświadomi kradzieży, która miała miejsce w ich umysłach."
 utopia.3151.1.desc: "§H\"...kompletnie zwariowała. Jeśli sądzi, że ludzie zaakceptowaliby choć chwilowe obniżenie swojej stopy życiowej, do której przywykli, to...\"§!"
 utopia.3151.2.desc: "§H\"...kompromitacja. Wyobraź sobie, co by było, gdyby młodsze cywilizacje odkryły, że sami nie rozumiemy już w pełni własnej technologii! Musimy...\"§!"
 utopia.3151.3.desc: "§H\"...stają coraz potężniejsze. Pewne elementy w Radzie są przekonane, że jeśli nie zaczniemy działać...\"§!"
 utopia.3151.4.desc: "§H\"...co mówi Rada, jest bez znaczenia. Ci parweniusze są wciąż całe tysiąclecia za nami, a ich żałosne floty nie zagrażają nam bardziej niż gazuriański giez ognistemu jaszczurowi z Hilaxi. Nie ma potrzeby...\"§!"
 utopia.3151.5.desc: "§H\"...nadal uważam, że operacje karne to przesada. Są młodzi i nieostrożni, ale my też kiedyś tacy byliśmy. Mają jeszcze czas, aby...\"§!"
 utopia.3151.6.desc: "§H\"...i że być może powinniśmy podjąć jakieś działania w celu przetrzebienia młodszych cywilizacji, zanim staną się zbyt potężne. Muszę powiedzieć, że się z nim zgadzam, ale Rada ma wrażenie, że jest już za późno na...\"§!"
 utopia.3152.name: "Niesłychane tajemnice"
 utopia.3152.desc: "[fallen_empire.GetSpeciesNamePlural] są najwyraźniej jakimiś dygnitarzami omawiającymi sprawy państwowe. Wizja zbliża się do nich powoli, ale pewnie, a ich obca mowa przekształca się stopniowo w zrozumiałe dla nas słowa.\n\nNagle kosmici milkną i nieruchomieją.\n\n§H- Czujesz to?\n\n- Tak. Ktoś nas obserwuje.§!\n\nPrzeszukują pomieszczenie, aż w końcu wzrok obu rozmówców skupia się dokładnie na nas.\n\n§H- Interesujące. Sonda psioniczna.§!\n\n§H- Chyba zbudowana przez [Root.GetSpeciesAdj&genitive]... Szybko, włączyć osłonę międzysferyczną.§!\n\nWizja gwałtownie się kończy."
 utopia.3153.desc: "[Root.GetSpeciesNamePlural].\n\nNie myślcie, że wasza ohydna próba opanowania umysłów naszych przywódców pozostała niezauważona.\n\nPoniesiecie konsekwencje."
 utopia.3153.a: "A-ale... możemy to wyjaśnić!"
 utopia.3153.b: "Możemy to logicznie wyjaśnić..."
 utopia.3160.name: "Błysk w kosmicznej pustce"
 utopia.3160.desc: "Wewnątrz Woalu materializuje się migocząca, mknąca z niewiarygodną szybkością gwiazda. Przez sekundę możemy dostrzec, że jest to statek obcych o nieznanej konstrukcji, lecz potem znika on w chmurze energii psionicznej, równie szybko, jak się pojawił.\n\nJak to możliwe? Czy rzeczywiście da się wkroczyć do Woalu fizycznie, a potem wynurzyć z niego w całkowicie innym punkcie normalnej przestrzeni?"
 utopia.3160.a: "§YZaczekać chwilę.§!"
 utopia.3161.desc: "Zupełnie nagle pojawia się kolejna migocząca gwiazda, tym razem jednak jesteśmy przygotowani. To rzeczywiście statek obcej cywilizacji... jakiej jeszcze nigdy nie widzieliśmy w naszej galaktyce. Gdy nas mija, wyczuwamy poświatę umysłów jego załogi, a ich tajemnice padają naszym łupem.\n\nPsioniczny napęd międzygwiezdny. Genialne."
 utopia.3161.name: "§GPsioniczny napęd międzygwiezdnys§!"
 utopia.3162.desc: "Zupełnie nagle pojawia się kolejna migocząca gwiazda, tym razem jednak jesteśmy przygotowani. To rzeczywiście statek obcej cywilizacji... jakiej jeszcze nigdy nie widzieliśmy w naszej galaktyce. Gdy nas mija, próbujemy połączyć się z poświatą umysłów jego załogi, ale ich intelekt jest mroczniejszy i bardziej obcy niż wszystko, co dotąd znaliśmy.\n\nZostajemy wypchnięci z ich statku, a na domiar złego psioniczny efekt tego gwałtownego odrzucenia utrzymuje się po opuszczeniu Woalu! Szybkość podświetlna naszych jednostek ulega chwilowemu zmniejszeniu."
 utopia.3170.name: "Osłonięta istota"
 utopia.3170.desc: "Podążywszy za słabym echem w Woalu, napotkaliśmy ducha, który otoczył się jakąś potężną osłoną psioniczną.\n\n§HPRECZ.§!"
 utopia.3170.a: "§YSpróbujcie przeniknąć przez tę osłonę.§!"
 utopia.3171.name: "§GOsłony psioniczne§!"
 utopia.3171.desc_suffix: "gdyż operacja przebijania osłony nauczyła nas, jak wytwarzać podobne pole siłowe. Jeśli zdołamy udoskonalić tę technikę, być może zdołamy wytwarzać na tyle duże osłony psioniczne, aby otaczać nimi całe okręty..."
 utopia.3171.desc_machine_gestalt: "Nie po to zapuściliśmy się tak głęboko w Woal, aby teraz dać się odprawić. Po skupieniu całej swojej mocy psionicznej nasi telepaci zdołali wytworzyć szczelinę w osłonie i część z nich zdołała zerknąć do środka.\n\nNie rozumiemy, co za nią zobaczyli, lecz wystarczyło to, aby krytycznie przeciążyć wiele naszych procesorów psionicznych, $utopia.3171.desc_suffix$"
 utopia.3171.desc_organic: "Nie po to zapuściliśmy się tak głęboko w Woal, aby teraz dać się odprawić. Po skupieniu całej swojej mocy psionicznej nasi telepaci zdołali wytworzyć szczelinę w osłonie i część z nich zdołała zerknąć do środka.\n\nNie wiemy, co za nią zobaczyli, lecz wystarczyło to, aby nieodwracalnie postradali umysły. Ich poświęcenie nie poszło jednak na marne, $utopia.3171.desc_suffix$"
 utopia.3172.name: "Nie przebito osłony"
 utopia.3172.desc_machine_gestalt: "Nasi [GetTelepathPlural], przeciążeni po tak dalekiej podróży w głąb Woalu, nie zdołali skupić wystarczającej ilości siły psionicznej, aby zrobić wyrwę w osłonie. Po naszej porażce odebraliśmy poniższy komunikat."
 utopia.3172.desc_machine_non_gestalt: "Nasi [GetTelepathPlural], przeciążeni po tak dalekiej podróży w głąb Woalu, nie zdołali skupić wystarczającej ilości siły psionicznej, aby zrobić wyrwę w osłonie. Wygląda na to, że nasza nieudana próba sprowokowała ducha."
 utopia.3172.desc_organic_gestalt: "Nasi [GetTelepathPlural], wyczerpani po tak dalekiej podróży w głąb Woalu, nie zdołali skupić wystarczającej ilości siły psionicznej, aby zrobić wyrwę w osłonie. Po naszej porażce odebraliśmy poniższy komunikat."
 utopia.3172.desc_organic_non_gestalt: "Nasi [GetTelepathPlural], wyczerpani po tak dalekiej podróży w głąb Woalu, nie zdołali skupić wystarczającej ilości siły psionicznej, aby zrobić wyrwę w osłonie. Wygląda na to, że nasza nieudana próba sprowokowała ducha."
 utopia.3180.name: "Oczekiwanie na przyszłość"
 utopia.3180.desc.intro: "Znana nam idea czasu nie obowiązuje w Woalu. Możemy tu spędzić całe stulecia, ale w świecie rzeczywistym upłyną wtedy jedynie godziny albo minuty."
 utopia.3180.desc_gestalt: "$utopia.3180.desc.intro$ Skoro wiemy, w którą stronę patrzeć, może uda się nam zerknąć w przyszłość.\n\nTaka zdolność wiąże się z ryzykiem dla naszego kolektywu, jeśli pójdziemy tą drogą, musimy zachować ostrożność."
 utopia.3180.desc_machine_non_gestalt: "$utopia.3180.desc.intro$ Jeśli wiadomo, w którą stronę patrzeć, można zerknąć w przyszłość...\n\nKoncepcja prekognicji może poważnie przeciążyć nasze procesory psioniczne, dlatego musimy zachować ostrożność."
 utopia.3180.desc_organic_non_gestalt: "$utopia.3180.desc.intro$ Jeśli jednak wiadomo, w którą stronę patrzeć, może zdoła się nawet zerknąć w przyszłość...\n\nPrekognicja jest mimo wszystko dla telepaty prostą drogą wiodącą ku szaleństwu, więc musimy zachować ostrożność."
 utopia.3180.a: "§YMedytować tu przez chwilę.§!"
 utopia.3181.desc_gestalt: "Możemy utrzymywać ograniczone połączenie prekognicyjne z Woalem bez ryzykowania przeciążenia jednostki, lecz ogromny napływ danych jest zbyt oszałamiający, aby dało się go wykorzystać w praktyce.\n\nJednak nasze węzły badawcze znalazły pomniejsze zastosowania dla tych danych, przekazanie ich do naszych flot, aby poprawić ich skuteczność bojową."
 utopia.3181.desc_machine_non_gestalt: "Możemy utrzymywać ograniczone połączenie prekognicyjne z Woalem bez ryzykowania przeciążenia jednostki, lecz ogromny napływ danych jest zbyt oszałamiający, aby dało się go wykorzystać w praktyce.\n\nMimo to, jeśli zdołamy stworzyć cyfrowy interfejs do interpretacji tych danych, być może za jego pomocą ulepszymy działanie naszych pokładowych komputerów bojowych..."
 utopia.3181.desc_organic_non_gestalt: "Możemy utrzymywać ograniczone połączenie prekognicyjne z Woalem bez ryzykowania obłędu, lecz ogromny napływ danych jest zbyt oszałamiający, aby dało się go wykorzystać w praktyce.\n\nMimo to, jeśli zdołamy stworzyć cyfrowy interfejs do interpretacji tych danych, być może za jego pomocą ulepszymy działanie naszych pokładowych komputerów bojowych..."
 utopia.3181.name: "§GInterfejs prekognicji§!"
 utopia.3182.name: "§RSzaleństwo Woalu§!"
 utopia.3182.desc_gestalt: "Tak jak się obawialiśmy, próba zrozumienia niepojętej liczby możliwości i prawdopodobieństw istniejących w przeszłości oraz przyszłości wywołała wiele przypadków katatonii naszych dronów psionicznych.\n\nSpowodowało to ich odłączenie od umysłu naczelnego i pozbawiło celu istnienia. Jeżeli chcemy znowu sięgnąć do Woalu, musimy dokonać recyklingu tych wadliwych skorup oraz odzyskać siłę naszego kolektywu."
 utopia.3182.desc.non_gestalt.1: "niepojętą wielość możliwości i prawdopodobieństw istniejących tak w przeszłości, jak i w przyszłości.\n\nKażda zmiana oraz scenariusz, niezależnie od tego, jak znacząca lub marginalna jest różnica między nimi, jest powtarzana w nieskończoność przez ich [GetSpeciesBrainPlural]. Telepaci popadli w trwałą katatonię.\n\n"
 utopia.3182.desc.non_gestalt.2: " nowi [GetTelepathPlural], minie jakiś czas zanim zgromadzimy siłę psioniczną potrzebną, by ponownie sięgnąć do Woalu."
 utopia.3182.desc_machine_non_gestalt: "Zgodnie z przewidywaniami, nasze procesory psioniczne nie zdołały przetworzyć $utopia.3182.desc.non_gestalt.1$Będą nam potrzebni$utopia.3182.desc.non_gestalt.2$"
 utopia.3182.desc_organic_non_gestalt: "Tak jak się obawialiśmy, nasi telepaci popadli w szaleństwo. Wszyscy na raz, ich umysły otwarły się na $utopia.3182.desc.non_gestalt.1$Będą nam potrzebni$utopia.3182.desc.non_gestalt.2$"
 utopia.3190.name: "Skoncentrowana energia"
 utopia.3190.desc.intro: "Odkryliśmy wewnątrz Woalu malutką przestrzeń, w której skupia się niespotykana dotąd ilość energii psionicznej."
 utopia.3190.desc_gestalt: "$utopia.3190.desc.intro$ Taka energia psioniczna, odpowiednio ukierunkowana, może rozejść się po naszym kolektywie nie wywołując poważnych skutków. Możemy jednak wyznaczyć pojedynczego drona \"wybrańca\", który posłuży za bezpośredni przewodnik tej energii, a przy tym stanie się niezwykle potężny. \n\nNie wiadomo, czy takie ilości energii nie wpłyną zabójczo na jego samotną formę. Przygotowaliśmy listę kandydatów."
 utopia.3190.desc_non_gestalt: "$utopia.3190.desc.intro$ Każdy [GetPsychicNoun], który zdołałby podłączyć się do tego źródła surowej mocy, stałby się niezwykle potężny... ale energii tej wystarczy tylko dla jednego, a cały proces nie jest wolny od ryzyka.\n\nW całym imperium [Root.GetName] istnieją nieliczne osoby, które dysponują wystarczającą siłą psioniczną, aby podłączyć się do tego źródła i mieć nadzieję na przetrwanie. Kto zatem to zrobi?"
 utopia.3190.1.a: "§G[leader_1.GetTitle] [leader_1.GetName]§!"
 utopia.3190.2.a: "§Y[leader_1.GetTitle] [leader_1.GetName]§!"
 utopia.3190.3.a: "§R[leader_1.GetTitle] [leader_1.GetName]§!"
 utopia.3190.1.b: "§G[leader_2.GetTitle] [leader_2.GetName]§!"
 utopia.3190.2.b: "§Y[leader_2.GetTitle] [leader_2.GetName]§!"
 utopia.3190.3.b: "§R[leader_2.GetTitle] [leader_2.GetName]§!"
 utopia.3190.1.c: "§G[leader_3.GetTitle] [leader_3.GetName]§!"
 utopia.3190.2.c: "§Y[leader_3.GetTitle] [leader_3.GetName]§!"
 utopia.3190.3.c: "§R[leader_3.GetTitle] [leader_3.GetName]§!"
 utopia.3190.1.d: "§G[leader_4.GetTitle] [leader_4.GetName]§!"
 utopia.3190.2.d: "§Y[leader_4.GetTitle] [leader_4.GetName]§!"
 utopia.3190.3.d: "§R[leader_4.GetTitle] [leader_4.GetName]§!"
 utopia.3191.name: "[GetChosenName]"
 utopia.3191.desc_organic_non_gestalt: "$utopia.3191.desc_machine_non_gestalt$ Oby duchy ulitowały się nad naszymi duszami."
 utopia.3191.desc_machine_non_gestalt: "Udało się... Wydaje się, że cały Woal aż drży, gdy źródło jest opróżniane z energii psionicznej, a [chosen_leader.GetName] wchłania ją do ostatniego kwantu.\n\nJedynie garstka psioników w historii całej galaktyki została obdarzona tak wielką potęgą."
 utopia.3191.desc_gestalt: "Udało się nam przekierować pełną moc ze źródła energii psionicznej do wybranego przez nas celu, którym jest [chosen_leader.GetName].\n\nTo, co w innych warunkach byłoby zaledwie kroplą w oceanie naszego kolektywu, może posłużyć za potężne narzędzie imperium [Root.GetName], gdyż [chosen_leader.GetName] włada tą potęgą dla dobra całego gatunku [Root.Species.GetName]."
 utopia.3192.name: "§RŚmierć przywódcy§!"
 utopia.3192.desc_gestalt: "Wydaje się, że cały Woal aż drży, gdy potężne źródło jest opróżniane z energii psionicznej, a [chosen_leader.GetName] wchłania ją do ostatniego kwantu.\n\nJednak, zgodnie z przypuszczeniami, taka moc wykracza poza możliwości pojedynczej istoty. [chosen_leader.GetName] (postać materialna) wybucha energią psioniczną, która sprawia, że głos i [GetBrainName] zostają rozdzielone."
 utopia.3192.desc_non_gestalt: "Wydaje się, że cały Woal aż drży, gdy potężne źródło jest opróżniane z energii psionicznej, a [chosen_leader.GetName] wchłania ją do ostatniego kwantu.\n\nNiestety, wybrany [GetSpeciesBrain] okazał się niezdolny do zniesienia tego stresu. Być może taka potęga nie była nigdy przeznaczona żadnej istocie materialnej. [chosen_leader.GetName] znika w wielkim wybuchu energii psionicznej, która zabija wszystkich znajdujących się w pobliżu."
 utopia.3193.name: "§RTransformacja psioniczna§!"
 utopia.3193.desc.intro: "Wydaje się, że cały Woal aż drży, gdy potężne źródło jest opróżniane z energii psionicznej, a [chosen_leader.GetName] wchłania ją do ostatniego kwantu.\n\nChoć przesył zakończył się powodzeniem, [chosen_leader.GetName] zmienia się..."
 utopia.3193.desc.outro: "\n\n§HŻAŁOSNE MŁOKOSY... CO... CO WY MI... ZROBILIŚCIE... §!\n\n§HWSZYSCY... ZAPŁACICIE... ZA TĘ... PYCHĘ...§!"
 utopia.3193.desc_gestalt: "$utopia.3193.desc.intro$ i oddziela od kolektywu, stając się zupełnie obcą istotą, która zamieszkuje tę postać.$utopia.3193.desc.outro$"
 utopia.3193.desc_non_gestalt: "$utopia.3193.desc.intro$ a w ciele zamieszkuje konstrukt złożony z czystej energii.$utopia.3193.desc.outro$"
 utopia.3200.name: "Wizja"
 utopia.3200.1.desc_organic: "Pustka w tym miejscu jarzy się od mocy. Odpocznijmy chwilę."
 utopia.3200.1.desc_machine: "Pustka w tym miejscu jarzy się od mocy. Doładujmy się trochę."
 utopia.3200.2.desc: "Droga, którą podążaliśmy, raptownie się urywa. Nie możemy iść dalej."
 utopia.3200.3.desc_organic: "Coś tu do nas przemawia. Coś cudownego."
 utopia.3200.3.desc_machine: "Coś tu do nas przemawia. Coś nadzwyczajnego."
 utopia.3200.4.desc: "Zostaliśmy przyciągnięci do tej żyły energii w Woalu z powodów, których nie pojmujemy. O co chodzi?"
 utopia.3200.5.desc.outro: "na myśl o tym, że będziemy musieli spędzić w Woalu całą wieczność. Potem odzyskaliśmy orientację i przerażenie minęło."
 utopia.3200.5.desc_organic: "Na ulotną chwilę całkowicie się zagubiliśmy. Ogarnęło nas uczucie straszliwej paniki $utopia.3200.5.desc.outro$"
 utopia.3200.5.desc_machine: "Na ulotną chwilę całkowicie się zagubiliśmy. Ogarnęło nas uczucie narastającej niepewności $utopia.3200.5.desc.outro$"
 utopia.3200.6.desc.intro: "Gdy wchodzimy w głąb Woalu, gromada duchów tańczy wokół nas przez wiele godzin. Lśnią przy tym oślepiającymi barwami, jakich nigdy nie widzieliśmy w normalnej przestrzeni.\n\n"
 utopia.3200.6.desc_organic: "$utopia.3200.6.desc.intro$Widowisko jest godne podziwu, ale nagle zdajemy sobie sprawę, że zapędzają nas one, jak gdybyśmy byli zwierzętami stadnymi."
 utopia.3200.6.desc_machine: "$utopia.3200.6.desc.intro$Widowisko jest fascynujące, ale nagle zdajemy sobie sprawę, że zapędzają nas one, jak gdybyśmy byli zwierzętami stadnymi."
 utopia.3200.7.desc: "Kawałek idealnego kryształu wiruje tu powoli wokół osi. Gdy się zbliżamy, rozpryskuje się na tysiąc odłamków."
 utopia.3200.8.desc_organic: "Zwłoki przedstawiciela [Root.GetSpeciesAdj&genitive] powoli płyną przez pustkę. Zgniły trup wydaje z siebie przeraźliwy pisk, a potem znika z pola widzenia."
 utopia.3200.8.desc_machine: "Skorupa zepsutego przedstawiciela [Root.GetSpeciesAdj&genitive] powoli płyną przez pustkę. Sponiewierany wrak wydaje z siebie przeraźliwy pisk, a potem znika z pola widzenia."
 utopia.3200.9.desc.intro: "Nie mamy pewności, czy to się dzieje naprawdę. Czy na pewno jesteśmy w Woalu, czy"
 utopia.3200.9.desc_hive: "$utopia.3200.9.desc.intro$ też zostaliśmy dotknięci potężną awarią czujników?"
 utopia.3200.9.desc_organic_non_hive: "$utopia.3200.9.desc.intro$ też jeden z nas doświadcza poważnego załamania psychicznego?"
 utopia.3200.9.desc_machine_non_hive: "$utopia.3200.9.desc.intro$ też doświadczamy rozległej awarii procesorów?"
 terraforming_candidate_category: "Pradawne ślady życia"
 terraforming_candidate_category_desc: "Ten pusty, pozbawiony życia glob skrywa ślady świadczące o tym, że niegdyś istniała na nim biosfera."
 MESSAGE_TERRAFORM_FOUND_TITLE: "$anomaly.2575.name$"
 MESSAGE_TERRAFORM_FOUND_DESC: "[From.GetName] uznano za kandydata do terraformowania. Księżyc [From.GetPlanetMoon] będzie obserwowany jako potencjalny cel kolonizacji."
 anomaly.2575.name: "Odkryto kandydata do terraformowania"
 anomaly.2575.desc.intro: "Nasze szczegółowe badanie obiektu [From.GetName] ujawniło, że w odległej przeszłości mogło istnieć na nim życie. Na biegunach, a także pod jego powierzchnią znajdują się znaczne pokłady lodu wodnego. Istnienie dolin sugeruje, że kiedyś woda mogła tu płynąć swobodnie."
 anomaly.2575.desc.1: "$anomaly.2575.desc.intro$\n\nTerraformowanie globu jest teoretycznie możliwe, ale na razie nie dysponujemy odpowiednią technologią, by wykonać to monumentalne zadanie w rozsądnym czasie."
 anomaly.2575.desc.2: "$anomaly.2575.desc.intro$\n\nKoszt energetyczny jest zniechęcający, jednak dysponujemy odpowiednią technologią, dzięki której [From.GetPlanetMoon] może ponownie zmienić się w siedlisko życia."
 anomaly.2575.desc.3: "$anomaly.2575.desc.intro$\n\nNiestety §Ysfera Dysona§! w tym układzie uniemożliwia odbudowę planety."
 anomaly.2575.a: "Być może z czasem zdołamy dokonać jej przebudzenia."
 utopia.3300.name: "Obecność w Woalu"
 utopia.3300.desc: "Cały ten region Woalu zajmuje jakaś... istota. Spotykaliśmy tu już duchy, ale to jest coś innego, o wiele potężniejszego... bardziej starożytnego.\n\nJak dotąd chyba nas nie zauważyło. Być może śpi. Być może uważa nas za niegodnych uwagi.\n\nA być może powinniśmy stąd zniknąć."
 utopia.3300.1.a: "§GSpróbujcie porozumieć się z tą istotą.§!"
 utopia.3300.1.b: "§YSpróbujcie porozumieć się z tą istotą.§!"
 utopia.3300.1.c: "§RSpróbujcie porozumieć się z tą istotą.§!"
 utopia.3300.1.d: "§G[chosen_one.GetName] porozmawia z tą istotą§!"
 utopia.3301.name: "§ROdrzucono Wspólnotę§!"
 utopia.3301.desc: "Gdy sięgamy ku istocie, czujemy, jak kipi, a jej uwaga skupia się teraz w pełni na nas. Chyba nie podoba się jej to zakłócenie spokoju.\n\nFala energii uderza w naszych telepatów, przez co niektórzy z nich zwijają się w bólu, a inni tracą przytomność. Nie mamy innego wyboru, jak chwilowo wycofać się z Woalu."
 utopia.3302.desc: "Gdy sięgamy ku istocie, czujemy, jak kipi, a jej uwaga skupia się teraz w pełni na nas. Chyba nie podoba się jej to zakłócenie spokoju.\n\nObecność razi nas potężną falą energii psionicznej, oszałamiając zmysły naszych telepatów. Gdy dochodzą do siebie, zauważają, że jednego z nich brakuje. §Y[leader_to_kill.GetName]§! nie znajduje się nigdzie w pobliżu, a w ostatnim miejscu [leader_to_kill.GetSheHe] pobytu istnieje tylko psioniczny ślad małej wyrwy, jakby jakaś istota sięgnęła tam do naszego świata z Woalu... cóż, kto może wiedzieć, z jakiego powodu.\n\nNiezależnie jednak od przyczyn, dla których porwano wspomnianą osobę, wydaje się wątpliwe, że [leader_to_kill.GetName] kiedykolwiek do nas powróci."
 utopia.3304.name: "Zaproponowani pakt"
 utopia.3304.desc.start.default: "Gdy próbujemy skontaktować się z obecnością,"
 utopia.3304.desc.start.shroud: "Gdy sięgamy do Woalu,"
 utopia.3304.desc.common: "w umysłach naszych telepatów rozbrzmiał chór głosów. Z początku były to tylko łagodne szepty, jednak kakofonia nasilała się, tysiące głosów przemawiały jednocześnie.\n\nGłosy te przedstawiły się jako $whisperers_in_the_void_color_article$. Pojedynczy członkowie chóru przedstawili się: Szelest Tajemnic,"
 utopia.3304.desc.throne.default: "Cień Tronu"
 utopia.3304.desc.throne.shroud: "$the_vacant_throne$"
 utopia.3304.desc.end: ", Władca Marionetek, wszyscy dołączyli do chóru Szepczących. On - oni - twierdzą, że znają każdą tajemnicę przekazywaną sobie przez śmiertelników, i proponują, że podzielą się z nami częścią tych sekretów...\n\n§HMusimy tylko pozwolić im wniknąć do naszej świadomości.§!\n\nZapewniają nas, że to śmieszna cena. Nawet nie zauważymy ich obecności.\n\nW ich głosie daje się wyczuć pośpiech."
 utopia.3304.desc: "$utopia.3304.desc.start.default$, $utopia.3304.desc.common$ $utopia.3304.desc.throne.default$$utopia.3304.desc.end$"
 utopia.3304.desc.shroud: "$utopia.3304.desc.start.shroud$, $utopia.3304.desc.common$ $utopia.3304.desc.throne.shroud$$utopia.3304.desc.end$"
 utopia.3304.a: "§YZawrzeć pakt z Szepczącymi w Pustce.§!"
 utopia.3305.desc: "Obecność powitała nas ciepło. Porozumiewa się nie za pomocą słów, lecz wizji, pojęć i idei. Wnika w umysły naszych telepatów tak płynnie i delikatnie, że można pomyśleć, iż zawsze tam była. Przed nimi przewija się lawina obrazów.\n\nObecność nazywa się $the_composer_of_strands_color_article$ i z wielką ciekawością obserwuje nasze organiczne formy. Pokazuje nam różne sposoby, dzięki którym można je rozwinąć, zmienić. Ulepszyć. Udoskonalić.\n\n§HMusimy tylko przyjąć go do naszego ciała.§!\n\nCierpliwie czeka na naszą odpowiedź. Jest czuły jak kochający rodzic, czekający na swoje ulubione dziecko. Za nim znajduje się jego bliźniak, Animator Gliny. Nie interesują go nasze organiczne umysły. Pragnie stworzyć dusze, by połączyć obwody z duchem.\n\nTkacz czeka na naszą odpowiedź."
 utopia.3305.a: "§YZawrzeć pakt ze Splatającym Nici.§!"
 utopia.3306.desc.1: "Gdy próbujemy skontaktować się z obecnością, wyczuwamy ogromny głód."
 utopia.3306.desc.2: "Obecność nie marnuje czasu ani słów. To $the_eater_of_worlds_color_article$, który pragnie nas pochłonąć.\n\nJednak... tylko część z nas. Zaledwie tylu, ilu możemy poświęcić. W zamian obdarzy nas wielkimi mocami. Nauczy nas swego głodu, swego gniewu. Zmieni w psioniczną broń, która pokona każdego wroga.\n\n§HJeśli tylko pozwolimy mu się pożreć.§!"
 utopia.3306.desc.3: "$utopia.3306.desc.2$\n\nChyba bardzo chce zaczynać."
 utopia.3306.desc: "$utopia.3306.desc.1$$utopia.3306.desc.3$"
 utopia.3306.a: "§YZawrzeć pakt z Pożeraczem Światów.§!"
 utopia.3307.desc: "Zanim namierzyliśmy obecność, ona sięgnęła ku nam. Jej myśli zwijają się i skręcają wokół umysłów naszych telepatów, targując się i przypochlebiając im. To $the_instrument_of_desire_color_article$. Da nam bogactwo, władzę, prestiż... wszystko, czego zawsze pragnęliśmy. Wszystko, czego kiedykolwiek zapragniemy.\n\nCena? Błahostka, jedynie pokrycie kosztów. Narzędzie chce tylko tego, co dla nas najlepsze. Pomoże nam, poprowadzi nas, pokieruje naszymi ambicjami i marzeniami.\n\n§HJeśli tylko przyjmiemy je do naszych serc.§!\n\nJest pewne naszej zgody. Jakże moglibyśmy odrzucić taką ofertę?"
 utopia.3307.a: "§YZawrzeć pakt z Narzędziem Pożądania.§!"
 utopia.3308.desc: "Istota na nas czekała. To §RKoniec Cyklu§!, który zawsze na nas czekał. Nasi telepaci odzywają się nagle równocześnie, tuzin głosów w idealnym chórze: §R\"TO JESZCZE NIE WASZ CZAS\"§!... §R\"ALE MÓGŁBY NIM BYĆ\"§!.\n\nNie mówią nic więcej, ale została złożona jakaś propozycja - przynajmniej tyle rozumiemy. Niezmierzona potęga, wiedza i bogactwo są na wyciągnięcie ręki.\n\n§RJeśli tylko wywołamy Koniec.§!"
 utopia.3308.a: "§RZawrzeć pakt z Końcem Cyklu.§!"
 utopia.3310.name: "Pakt zawarty"
 utopia.3320.name: "Koniec Cyklu - §Rrozrachunek§!"
 utopia.3320.desc.intro: "Nasz czas upłynął. Przez krótki czas korzystaliśmy z ogromnej potęgi, jaką obdarzył nas $end_of_the_cycle_color_article$. Wiedzieliśmy, że trzeba będzie za to zapłacić, ale myśleliśmy, że cena będzie akceptowalna albo że znajdziemy sposób, aby uniknąć rozrachunku.\n\nNie była i nie znaleźliśmy.\n\nMusieliśmy zapłacić wszystkim, co mamy. W mgnieniu oka imperium [Root.GetName]... przepadło. Tam, gdzie wcześniej rozkwitały kolonie, pozostały tylko ruiny. Tam, gdzie wcześniej potężne floty przemierzały kosmos, pozostały tylko cisza i zniszczenie. Wszystko zostało pochłonięte przez Koniec. Wszystko zabrał §HWoal§!."
 utopia.3320.desc.outro: "materializuje się z pobliżu: [former_capital.GetName]. nasi [GetPsychicNounPlural] zostali pożarci, dzięki czemu istota stała się niezwykle potężna i teraz przemierza galaktykę w poszukiwaniu kolejnej ofiary."
 utopia.3320.desc.a.1.gestalt: "Po naszym imperium została tylko grupka wygnańców, której przewodzi §H[Root.GetRulerName]§!, potężny [GetPsychicNoun], który opuścił kolektyw i stanął na czele grupy ([GetIndividualPlural]) ukrywającej się na świecie, którego nie dotknął Koniec."
 utopia.3320.desc.a.1.non_gestalt: "Po naszym imperium została tylko grupka wygnańców, której przewodzi §H[Root.GetRulerName]§!, potężny [GetPsychicNoun], który wiedział, co nadchodzi, stanął na czele niewielkiej części populacji ukrywającej się na świecie, którego nie dotknął Koniec."
 utopia.3320.desc.a.outro: "Jakby błyskawiczne zniszczenie naszego imperium nie wystarczyło, potężna istota psioniczna $utopia.3320.desc.outro$"
 utopia.3320.desc.a.gestalt: "$utopia.3320.desc.intro$\n\n$utopia.3320.desc.a.1.gestalt$\n\n$utopia.3320.desc.a.outro$"
 utopia.3320.desc.a.non_gestalt: "$utopia.3320.desc.intro$\n\n$utopia.3320.desc.a.1.non_gestalt$\n\n$utopia.3320.desc.a.outro$"
 utopia.3320.desc.b: "$utopia.3320.desc.intro$\n\nNasze imperium nie tylko zostało całkowicie zniszczone, ale potężna istota psioniczna zmaterializowała się z pobliżu: [former_capital.GetName]. nasi [GetPsychicNounPlural] zostali pożarci, dzięki czemu istota stała się niezwykle potężna i teraz przemierza galaktykę w poszukiwaniu kolejnej ofiary. Przynajmniej nie będzie nas tam i nie zobaczymy końca tego, co zaczęliśmy."
 utopia.3320.opt.a: "Co też uczyniliśmy...?"
 utopia.3320.opt.a.shroud.tt: "$BEGINS_EVENT_CHAIN$ §Y$the_reckoning_chain_title$§!"
 utopia.3321.desc.1: "Od wielu lat wiedzieliśmy, że coś jest nie tak z imperium §H[From.GetName]§!. Lata temu ich przemysł, ich nauka... wszystko doznało nagłego i niewytłumaczalnego wzrostu wydajności oraz skuteczności, zupełnie jakby pobłogosławiła ich jakaś niewidzialna moc.\n\nOkazuje się jednak, że nie było to błogosławieństwo, a klątwa. [From.GetName] zaprzedali swoją przyszłość, a teraz musieli spłacić dług.\n\nW mgnieniu oka imperium [Root.GetAdj&genitive]... przepadło. Tam, gdzie wcześniej rozkwitały kolonie, pozostało tylko zniszczenie. Tam, gdzie wcześniej potężne floty przemierzały kosmos, pozostały tylko cisza i szczątki."
 utopia.3321.desc.2: "A teraz w pobliżu ich dawnej stolicy zmaterializowała się potężna istota energetyczna."
 utopia.3321.desc.3: "Kilkadziesiąt lat temu wykryliśmy niecodzienną aktywność w odległych układach gwiezdnych. Nasi [GetResearchers] przypuszczają, że wzrost promieniowania oraz ruchu wskazują, że jakaś obca cywilizacja osiągnęła ogromny wzrost produktywności. Nie mamy z nią kontaktu, więc nie możemy potwierdzić tej teorii.\n\nNagle, praktycznie w jednej chwili, aktywność ustała. Teraz, w tym niegdyś tętniącym życiem zakątku kosmosu, panuje głucha cisza."
 utopia.3321.desc.4: "Czujniki dalekiego zasięgu wykryły dziwne zjawisko w tych odległych układach. Jeśli wierzyć raportom, można je opisać tylko jako niesamowicie potężną istotę zbudowaną z czystej energii, przemierzającą kosmos i siejącą ogromne zniszczenie."
 utopia.3321.desc.a.contact: "$utopia.3321.desc.1$ Katastrofa dotknęła też naszego terytorium, została zniszczona część naszych światów, którymi wcześniej władało imperium [From.GetAdj&genitive].\n\n$utopia.3321.desc.2$\n\nWygląda na to, że jest głodna."
 utopia.3321.desc.a.no_contact: "$utopia.3321.desc.3$ Z jeszcze nieznanych powodów, część światów znajdujących się na naszym terytorium została w jednej chwili zniszczona.\n\n$utopia.3321.desc.4$"
 utopia.3321.desc.b.contact: "$utopia.3321.desc.1$\n\n$utopia.3321.desc.2$ Przemieszcza się od świata do świata i niszczy wszystko, co znajdzie się na jej drodze."
 utopia.3321.desc.b.no_contact: "$utopia.3321.desc.3$\n\n$utopia.3321.desc.4$"
 utopia.3321.opt.a.contact: "Cóż oni uczynili!?"
 utopia.3321.opt.a.no_contact: "Co to może oznaczać?!"
 utopia.3325.name: "Koniec Cyklu - §Ropanowani przez Woal§!"
 utopia.3325.desc.organic: "Nie zdołaliśmy powstrzymać tej potwornej istoty energetycznej przed ogarnięciem imperium §H[Root.GetName]§!. Cała planeta i jej cała populacja, zostały pochłonięte przez §HWoal§!."
 utopia.3325.desc.machine: "Nie zdołaliśmy powstrzymać tej ogromnej istoty energetycznej przed ogarnięciem imperium §H[Root.GetName]§!. Cała planeta i jej cała populacja, zostały pochłonięte przez §HWoal§!."
 utopia.3325.opt.a.organic_non_gestalt: "To straszne!"
 utopia.3325.opt.a.machine_or_gestalt: "Katastrofa."
 utopia.3331.name: "Szepczący w Pustce - §Rzmagania§!"
 utopia.3331.desc.intro: "Choć tajemnice ujawnione naszemu ludowi przez §HSzepczących§! są niezwykle przydatne, część z nich jest też dość niepokojąca"
 utopia.3331.desc: "$utopia.3331.desc.intro$. Stres związany ze zbyt rozległą wiedzą może być natomiast trudny do pokonania i próbując sobie z nim poradzić, coraz większa liczba naszych obywateli - także §H[leader_target.GetTitle] [leader_target.GetName]§! - zaczęła nadużywać substancji psychoaktywnych."
 utopia.3331.opt.a: "To niefortunne."
 utopia.3332.name: "Szepczący w Pustce - §Rsamobójstwo§!"
 utopia.3332.desc.intro: "$utopia.3331.desc.intro$, zwłaszcza te, które ujawniono ważnym osobistościom. §H[leader_target.GetTitle] [leader_target.GetName]§!, nie mogąc"
 utopia.3332.desc.organic_non_gestalt: "$utopia.3332.desc.intro$ dłużej wytrzymać tego napięcia nerwowego, popełnia samobójstwo."
 utopia.3332.desc.machine_non_gestalt: "$utopia.3332.desc.intro$ przetworzyć wydajnie tych szczegółów, dokonuje samozniszczenia i ulega wyłączeniu na zawsze."
 utopia.3332.desc.gestalt: "Choć tajemnice ujawnione nam przez §HSzepczących§! są niezwykle przydatne, część z nich wynika z ich dość niepokojącej, indywidualistycznej natury. Dłuższy kontakt z taką dewiacją sprawił, że §H[leader_target.GetTitle] [leader_target.GetName]§! oddziela się od kolektywu i zostawia po sobie tylko rozpadającą się skorupę."
 utopia.3332.opt.a.non_gestalt: "Co za tragedia."
 utopia.3332.opt.a.gestalt: "Dokonamy recyklingu."
 utopia.3333.name: "Szepczący w Pustce - §Rszaleństwo§!"
 utopia.3333.desc.intro: "Odkąd pozwoliliśmy na bezpośrednią łączność §HSzepczący§!-[GetBrainName], zauważamy w naszym kolektywie niepokojący wzrost dewiacji."
 utopia.3333.desc.gestalt: "$utopia.3333.desc.intro$\n\nDrony rzucają się na siebie podczas wykonywania standardowych czynności, a w dodatku korzystają z udogodnień z taką intensywnością, jakby stały się indywidualistami.\n\nMusimy dokonać czystki tych chorych jednostek, jeśli chcemy przywrócić porządek."
 utopia.3333.desc.outro: "i niewyjaśnionych aktów przemocy wśród naszych psioników wzrosła. W większości problemy te nie sprawiały większych trudności, ale od niedawna sprawy wymykają nam się spod kontroli. W całym imperium pojawiają się przeróżne, radykalne frakcje toczące ze sobą brutalne walki."
 utopia.3333.desc.organic_non_gestalt: "Odkąd zaprosiliśmy do naszych umysłów §HSzepczących§!, liczba przypadków choroby psychicznej $utopia.3333.desc.outro$"
 utopia.3333.desc.machine_non_gestalt: "Odkąd zaprosiliśmy do naszych umysłów §HSzepczących§!, liczba przypadków dziwnych błędów oprogramowania $utopia.3333.desc.outro$"
 utopia.3333.opt.a: "Musimy przywrócić porządek!"
 utopia.3334.name: "Szepczący w Pustce - §Rpsychoza§!"
 utopia.3334.desc.gestalt: "$utopia.3333.desc.intro$\n\nCo gorsza, zaczyna słabnąć nasze poczucie jedności. Kolektyw nie może się skutecznie porozumiewać, ponieważ ingerencja psioniczna wywołała nasilenie indywidualistycznych dewiacji.\n\nMusimy dokonać czystki tych przypadków, jeśli chcemy przywrócić porządek."
 utopia.3334.desc.outro: "i niewyjaśnionych aktów przemocy. W większości przypadków udało się nad tym zapanować, ale od niedawna sytuacja eskaluje i wymyka nam się spod kontroli. W całym imperium pojawiają się tajne stowarzyszenia. Niektóre są nieszkodliwe, ale część ma nikczemne cele. W naszym społeczeństwie zaczyna dominować nieufność."
 utopia.3334.desc.organic_non_gestalt: "Odkąd zaprosiliśmy do naszych umysłów §HSzepczących§!, liczba przypadków choroby psychicznej $utopia.3334.desc.outro$"
 utopia.3334.desc.machine_non_gestalt: "Odkąd zaprosiliśmy do naszych umysłów §HSzepczących§!, liczba przypadków dziwnych błędów oprogramowania $utopia.3334.desc.outro$"
 utopia.3334.opt.a: "To straszne!"
 utopia.3335.name: "Pożeracz Światów: §RPrzekąska§!"
 utopia.3335.desc.common: "§H[devoured_leader.GetTitle] [devoured_leader.GetName]§! nagle znika, pozostawiając po sobie tylko echa aktywności psionicznej."
 utopia.3335.desc.gestalt: "$utopia.3335.desc.common$ Wygląda na to, że $the_eater_of_worlds_color_article$ uznał za stosowne urządzić sobie taki właśnie posiłek. Choć inni przywódcy zostali oszczędzeni, nie możemy mieć pewności, kiedy pożeracz powróci po więcej."
 utopia.3335.desc.non_gestalt: "$utopia.3335.desc.common$ Wygląda na to, że $the_eater_of_worlds_color_article$ uznał za stosowne urządzić sobie taki właśnie posiłek. Udało nam się ukryć ten fakt i możemy tylko mieć nadzieję, że Pożeracz na jakiś czas się nasycił."
 utopia.3335.opt.a: "To niewielka cena."
 utopia.3336.name: "Pożeracz Światów - §Rgłodny§!"
 utopia.3336.desc.intro: "§HPożeracz§! powrócił po raz kolejny, aby odebrać swoją daninę"
 utopia.3336.desc.gestalt: "$utopia.3336.desc.intro$ i pożarł dużą część naszej populacji na świecie §Y[planet_target.GetName]§!.\n\nWiemy, jakie korzyści przynosi nam przymierze z Pożeraczem, ale takie niepohamowane trzebienie naszego kolektywu zaczyna siać ziarna niepokoju i destabilizacji, przez co stajemy się bardziej podzieleni."
 utopia.3336.desc.non_gestalt: "$utopia.3336.desc.intro$, pochłaniając znaczną część populacji świata §Y[planet_target.GetName]§!.\n\nChoć zdołaliśmy utrzymać nasz pakt z nim w tajemnicy przed większością populacji, pozostali mieszkańcy globu są - co zrozumiałe - przerażeni i rozwścieczeni tymi \"tajemniczymi zniknięciami\" i domagają się od rządu wyjaśnień."
 utopia.3336.opt.a: "To było godne pożałowania, acz nieuniknione."
 utopia.3337.name: "Pożeracz Światów - §Rwygłodniały§!"
 utopia.3337.desc: "Pożeracz powrócił, by odebrać swoją daninę. Nie zaspokoiło go zjedzenie tylko części naszej populacji, więc pochłonął całą planetę. Świat §Y[planet_target.GetName]§! spowiła gęsta mgła psioniczna, nie powróciła stamtąd żadna z wysłanych sond. Na szczęście nikt tam nie mieszkał, jednak przechodzi nas dreszcz na samą myśl, że następna może być jedna z naszych wspaniałych kolonii."
 utopia.3337.desc.shadows: "$utopia.3336.desc.intro$, tym razem pochłaniając całą planetę.\n\nŚwiat §H[planet_target.GetName]§! spowija teraz gęsta mgła psioniczna, a wszystkie próby przebicia się przez jego atmosferę zakończyły się niepowodzeniem. Ten świat był niezamieszkany, ale jeśli kolejnym celem będzie kwitnąca kolonia, skutki będą katastrofalne."
 utopia.3337.opt.a: "Jak daleko to zajdzie?"
 utopia.3337.opt.tt: "[shrouded_planet.GetName] zmienia się w §Y$pc_shrouded$§!"
 #utopia.3338.name: "Instrument of Desire: §RParticularism§!"
 #utopia.3338.desc: "The desires inflicted upon our people by the Instrument are strong. The people of §Y[planet_target.GetName]§! have become convinced that their own particular customs are of distinct and paramount importance over those of our society as a whole. Alternative political movements are springing up like wildfire, and the political situation on the planet has become unpredictable, to say the least."
 utopia.3338.opt.a: "To niedobrze."
 #utopia.3339.name: "Instrument of Desire: §RDeviance§!"
 #utopia.3339.desc: "The desires inflicted upon our people by the Instrument are strong. As if overnight, the population of our empire appear to have turned against both the government and the very traditions of our people, questioning ages-old customs and breaking social taboos. Support for government positions are rapidly dropping, and it seems we may be in for a period of considerable political turmoil."
 #utopia.3339.opt.a: "Terrible!"
 utopia.3340.name: "Narzędzie Pożądania - §Rdekadencja§!"
 utopia.3340.desc.gestalt: "[GetBrainName] wyczuwa wpływy §HUcieleśnienia§! w swojej całości, a jego żądze z innego świata plugawią nasz kolektyw abstrakcyjnymi, indywidualistycznymi myślami, takimi jak \"ekskluzywność\", \"dekadencja\" i \"bogactwo\".\n\nPojęcia tego typu wywołują u naszych dronów chorobę, która sprawia, że przestają one realizować jednoczące nas cele. Być może będziemy musieli oddać się tej rozpuście, by się otrząsnąć."
 utopia.3340.desc.organic_non_gestalt: "Pragnienia wywołane przez §HUcieleśnienie§! są bardzo silne. Naszą populację ogarnął szał konsumpcji i dekadencji, domagają się oni coraz bardziej ekskluzywnych towarów oraz coraz rzadszego i bardziej egzotycznego pożywienia. W kilku dzielnicach handlowych już doszło do zamieszek.\n\nByć może masy uspokoją się, jeśli na rynku pojawi się §H[GetInstrumentCraving]§! w większej ilości. W tym celu trzeba będzie zwiększyć produkcję."
 utopia.3340.desc.machine_non_gestalt: "Pragnienia wywołane przez wpływ §HUcieleśnienia§! na nasze oprogramowanie zaczynają zastępować ośrodki logiczne naszej populacji.\n\nKonsumpcja i dekadencja zaczęły obniżać wydajność operacyjną, jednostki pragną dokonywać retromodyfikacji swoich części głównie ze względów estetycznych, nie patrząc przy tym na funkcjonalność. Wywołało to niedobory najpotrzebniejszych części, a to z kolei doprowadziło do niewielkich starć przy liniach montażowych.\n\nMusimy zwiększyć produkcję (§H[GetInstrumentCraving]§!), by rozwiązać ten problem."
 utopia.3340.opt.a.organic_non_gestalt: "Ale czemu?"
 utopia.3340.opt.a.machine_or_gestalt: "Za sukces trzeba zapłacić."
 instrument_cravings: "Dzikie żądze"
 instrument_cravings_tooltip: "§RNasze £pops£ populacje wymagają teraz utrzymania w postaci:§! [GetInstrumentCravingIconAndName]"
 instrument_cravings_desc: "$the_instrument_of_desire_color_article_cap$ wywołało w naszej populacji nową modę. Wszyscy pragną tego samego, w dużej mierze jest to zachcianka bardziej niż realna potrzeba."
 instrument_cravings_gestalt: "$instrument_cravings$"
 instrument_cravings_gestalt_desc: "$the_instrument_of_desire_color_article_cap$ sprawiło, że odczuwamy kompulsywną żądzę - nasz kolektyw nigdy wcześniej nie znał tego uczucia. Wszyscy pragniemy tych samych rzeczy niezależnie od ich przeznaczenia."
 utopia.3341.name: "[GetComposerMutationName]"
 utopia.3341.name.organic: "$name_composer$: §RMutacja§!"
 utopia.3341.name.machine: "$name_composer$: §RRekonfiguracja§!"
 utopia.3341.desc.machine: "$the_composer_of_strands_color_article_cap$ pobłogosławił nas i bezpośrednio zmienił nasze podstawowe elementy. Obwody połączyły się w nowe konfiguracje. Twardy metal rozpuścił się i stworzył zupełnie nowe formy. Co ciekawe, nasze neuroprocesory nadal działają bez najmniejszych problemów."
 utopia.3341.desc.organic_gestalt: "$the_composer_of_strands_color_article_cap$ obdarzył nas swoimi błogosławieństwami, ingerując bezpośrednio w kod genetyczny gatunku §H[Root.GetSpeciesAdj&genitive]§!. Co dziwne, szybkie i nieprzewidywalne mutacje wywołały raczej milczącą reakcję. Wygląda na to, że tego typu losowe i nieprzewidywalne zmiany można uznać za zwykły element życia, niewart gniewu czy zaniepokojenia."
 utopia.3341.desc.organic_non_gestalt: "$the_composer_of_strands_color_article_cap$ obdarzył nas swoimi błogosławieństwami, ingerując bezpośrednio w kod genetyczny gatunku §H[Root.GetSpeciesAdj&genitive]§!. Co dziwne, szybkie i nieprzewidywalne mutacje wywołały raczej milczącą reakcję. Wygląda na to, że nasi obywatele zaczęli traktować te przypadkowe zmiany jako w zasadzie zwykły element życia, niewart ich gniewu, a nawet dyskusji."
 utopia.3341.opt.a: "Zobaczymy, jakie będą następstwa..."
 utopia.3342.name: "Pożeracz Światów: §RGłodny§!"
 utopia.3342.desc.intro: "§HPożeracza§! nie da się całkowicie zaspokoić. Tym razem zjadł część jednej z naszych kolonii."
 utopia.3342.desc.outro: "został jedynie niewyobrażalnych rozmiarów krater, w którym kłębią się obłoki fioletowej mgły."
 utopia.3342.desc.gestalt: "$utopia.3342.desc.intro$ Tam, gdzie niegdyś mieszkała znaczna część naszego kolektywu, $utopia.3342.desc.outro$"
 utopia.3342.desc.non_gestalt: "$utopia.3342.desc.intro$ Znaczna część świata zniknęła z naszej rzeczywistości - $utopia.3342.desc.outro$"
 utopia.3342.opt.a.non_gestalt: "Trudno będzie to ukryć..."
 utopia.3342.opt.a.gestalt: "Taka jest cena potęgi."
 utopia.3343.name: "Pożeracz Światów: §RGłodnawy§!"
 utopia.3343.desc.gestalt: "§HPożeracz§! znowu wrócił odebrać swoją daninę i pożarł całe miasto na świecie §Y[planet_target.GetName]§!. Utrata tak wielu dronów to wysoka cena, jaką zapłacił kolektyw za pakt z Pożeraczem."
 utopia.3343.desc.organic_non_gestalt: "§HPożeracz§! powrócił, żeby odebrać swoją daninę. Tym razem pochłonął całe miasto świata §Y[planet_target.GetName]§!. Udało nam się utrzymać w tajemnicy przed większością populacji nasz pakt z Pożeraczem, ale pozostali mieszkańcy planety są przerażeni i rozgniewani z powodu tych \"tajemniczych zaginięć\", dlatego domagają się wyjaśnień ze strony rządu."
 utopia.3343.desc.machine_non_gestalt: "§HPożeracz§! powrócił, żeby odebrać swoją daninę. Tym razem pochłonął całe miasto świata §Y[planet_target.GetName]§!. Udało nam się utrzymać w tajemnicy przed większością populacji nasz pakt z Pożeraczem, ale pozostali mieszkańcy planety są niezadowoleni z powodu tych \"tajemniczych zaginięć\", dlatego domagają się wyjaśnień ze strony rządu."
 utopia.3343.opt.a.organic_non_gestalt: "To tragiczne, ale nieuniknione."
 utopia.3343.opt.a.machine_or_gestalt: "To było godne pożałowania, acz nieuniknione."
 utopia.3345.name: "[GetComposerDegenerationName]"
 utopia.3345.name.organic: "$name_composer$: §RDegeneracja§!"
 utopia.3345.name.machine: "$name_composer$: §RNieodwracalna degradacja§!"
 utopia.3345.desc.organic_1: "Błogosławieństwa, jakie niesie $the_composer_of_strands_color_article$, są nieprzewidywalne. Jeden z naszych przywódców przeżył coś nieprzyjemnego: jego"
 utopia.3345.desc.organic_2: "zyskało własną wolę. W ciągu kilku chwil zamienił się w nierozpoznawalną, wijącą się masę. Nie potrafimy odwrócić tego procesu, więc uważamy tego przywódcę za"
 utopia.3345.desc.organic_3: "zmarłego."
 utopia.3345.desc.organic_individual_lithoid: "$utopia.3345.desc.organic_1$ forma materialna $utopia.3345.desc.organic_2$ $utopia.3345.desc.organic_3$"
 utopia.3345.desc.organic_hive_lithoid: "$utopia.3345.desc.organic_1$ forma materialna $utopia.3345.desc.organic_2$ dron $utopia.3345.desc.organic_3$"
 utopia.3345.desc.organic_individual_non_lithoid: "$utopia.3345.desc.organic_1$ ciało $utopia.3345.desc.organic_2$ $utopia.3345.desc.organic_3$"
 utopia.3345.desc.organic_hive_non_lithoid: "$utopia.3345.desc.organic_1$ ciało $utopia.3345.desc.organic_2$ dron $utopia.3345.desc.organic_3$"
 utopia.3345.desc.machine_non_gestalt: "Błogosławieństwa, jakie zapewnia nam $the_composer_of_strands_color_article$, są nieprzewidywalne. Jeden z naszych przywódców doznał spektakularnej, krytycznej awarii, gdy jego elementy materialne uzyskały własną wolę, zaczęły spontanicznie scalać się i mieszać, by stworzyć nową, dziwaczną formę. Ten przywódca to teraz tylko zepsuty, nienadający się do naprawy kawał metalu, więc imperium [Root.GetName] nie ma z niego żadnego pożytku."
 utopia.3345.desc.machine_gestalt: "Błogosławieństwa, jakie zapewnia nam $the_composer_of_strands_color_article$, są nieprzewidywalne. Jeden z naszych węzłów przywódczych doznał spektakularnej, krytycznej awarii, gdy jego elementy materialne uzyskały własną wolę, zaczęły spontanicznie scalać się i mieszać, by stworzyć nową, dziwaczną formę. Ten węzeł to teraz tylko zepsuty, nienadający się do naprawy kawał metalu, więc imperium [Root.GetName] nie ma z niego żadnego pożytku."
 utopia.3345.opt.a.organic: "Teraz ma łatwiejsze życie."
 utopia.3345.opt.a.machine: "Każdy sprzęt staje się kiedyś przestarzały."
 utopia.3346.name: "Tkacz Życia: §RRegresja§!"
 utopia.3346.desc: "$the_composer_of_strands_color_article$ zesłał swoje szczodre dary na świat [devolved_species_planet.GetName], gdzie wiele z naszych populacji przeszło poważne mutacje i cofnęło się do poziomu istot przedrozumnych."
 utopia.3346.opt.a.non_gestalt: "Fascynujące, a jednocześnie przykre."
 utopia.3346.opt.a.gestalt: "To niedobrze."
 utopia.3346.opt.a.tt: "§Y500§! £pop£ §Hpopulacji§! świata [devolved_species_planet.GetName] zamieniło się w istoty §Yprzedrozumne§!.\n\nGdy posiada się odpowiednią technologię, można je §Yprzyśpieszyć§! w zakładce gatunku."
 utopia.3347.name: "$name_cradle$: §RDemilitaryzacja§!"
 utopia.3347.desc: "§HKolebka§! pragnie równowagi na wszystkich polach, nasi [GetTelepathPlural] uważają, że dotyczy to też sił zbrojnych adekwatnych do potrzeb pokoju. Wielkość naszej marynarki wojennej musiała wzbudzić gniew naszego patrona, ponieważ część okrętów floty §H[demilitarized_fleet.GetFleetName]§! zniknęła nagle w gwałtownym wybuchu energii psionicznej."
 utopia.3347.opt.a: "$UNFORTUNATE$"
 utopia.3347.opt.a.tt: "Losowo wybrana flota, którą kontrolujemy, straci 12 pkt. §Hlimitu marynarki wojennej§!."
 utopia.3348.name: "[GetCradleChaoticAnguishName]"
 utopia.3348.name.organic_non_gestalt: "$name_cradle$: §RNiepokój§!"
 utopia.3348.name.machine_or_gestalt: "$name_cradle$: §RZakłócenie§!"
 utopia.3348.desc.intro: "[GetCradleAnguishIntro]"
 utopia.3348.desc.organic_non_gestalt: "$utopia.3348.desc.intro$ niepokoje egzystencjalne."
 utopia.3348.desc.machine_or_gestalt: "$utopia.3348.desc.intro$ zakłócenia kognitywne."
 utopia.3348.desc_intro_homicidal: "Zestrojona z §HKolebką§! psychika [root.GetSpeciesAdj&genitive] jest nękana przez dysonans, rozmyślania nad absurdem harmonijnego współistnienia wszystkich umysłów. W reakcji na obecny zamęt na arenie galaktycznej fala zakłóceń psionicznych dotknęła całą populację i wywołała powszechne"
 utopia.3348.desc_intro_default: "Zestrojony z §HKolebką§!, gatunek [root.GetSpeciesAdj&genitive] przedkłada harmonijne współistnienie wszystkich umysłów. W reakcji na obecny zamęt na arenie galaktycznej, fala zakłóceń psionicznych dotknęła całą populację i wywołała powszechne"
 utopia.3348.opt.a: "Musimy wytrwać."
 anguish_of_the_cradle: "Niepokój Kolebki"
 anguish_of_the_cradle_desc: "$the_cradle_of_souls_article_cap$ wysłała falę zakłóceń psionicznych, która objęła naszą populację."
 anguish_of_the_cradle_gestalt: "$anguish_of_the_cradle$"
 anguish_of_the_cradle_gestalt_desc: "$anguish_of_the_cradle_desc$"
 utopia.3349.name: "$name_cradle$: §ROgraniczenie§!"
 utopia.3349.desc: "Zdolność wspierania i utrzymywania naszych flot bojowych pogorszyła się w całym imperium §H[root.GetName]§!.\n\nNasi [GetTelepathPlural] wyczuli, że to zakłócenie wywołała §HKolebka§!, która pragnie zaprowadzić galaktyczny porządek. Musi być niezadowolona z powodu naszych inwestycji w infrastrukturę wojskową, nieważne jak małych."
 utopia.3349.opt.a: "Powinniśmy ograniczyć naszą obecność w kosmicznej pustce."
 limit_of_the_cradle: "Ograniczenie Kolebki"
 limit_of_the_cradle_desc: "$the_cradle_of_souls_article$ osłabiła naszą wojskową infrastrukturę pomocniczą."
 utopia.3350.name: "[GetLavishLifestyleEventName]"
 utopia.3350.name.individual: "$name_instrument$: §RWystawny styl życia§!"
 utopia.3350.name.gestalt: "$name_instrument$: §RPrzesadna konsumpcja§!"
 utopia.3350.desc.individual: "Nasza więź z §HUcieleśnieniem§! sprawia, że część z przywództwa [Root.GetSpeciesAdj&genitive] wykształciła pochłaniające znaczne sumy nawyki konsumpcyjne.\n\n[lavish_leader.GetName], jak się okazuje, wydaje ogromne sumy w kredytach energetycznych na ekstrawaganckie przedmioty i toczy coraz to bardziej hedonistyczne życie."
 utopia.3350.desc.gestalt: "Nasza więź z §HUcieleśnieniem§! powoduje zwiększone zużycie zasobów przez niektóre drony dowódcze [Root.GetSpeciesAdj&genitive].\n\n[lavish_leader.GetName] wykorzystuje więcej energii niż potrzeba do utrzymania bazowej funkcjonalności. Nie znaleziono żadnej fizycznej przyczyny takiego stanu rzeczy, co każe nam uznać, że ta rozrzutność jest efektem osobistych preferencji."
 utopia.3350.opt.a: "Taki jest koszt żądzy."
 utopia.3351.name: "$name_instrument$: §RRozproszenie pracowników§!"
 utopia.3351.desc.individual: "W miarę, jak [Root.GetName] staje się miejscem coraz większych wpływów naszego patrona, nowo odkryte rozproszenia w postaci wygód obniżają produktywność naszej populacji.\n\nW obliczu spadku motywacji osiąganie podobnych wyników produkcyjnych wymaga teraz większych nakładów niż wcześniej."
 utopia.3351.desc.gestalt: "W miarę, jak [Root.GetName] staje się miejscem coraz większych wpływów naszego patrona, w kolektywie [Root.GetSpeciesAdj&genitive] pojawia się coraz więcej wynaturzeń.\n\nTe chwilowe, indywidualistyczne żądze i skłonność do rozpraszania się są szczególnie widoczne podczas pracy. Utrzymanie spójności i dyscypliny wśród siły roboczej wymaga teraz większych nakładów."
 utopia.3351.opt.a: "To chwilowy kaprys §HUcieleśnienia§!."
 distracted_workforce: "Rozproszona siła robocza"
 distracted_workforce_desc: "Ta siła robocza jest skłonna do rozpraszania się i wymaga stałego nadzoru."
 utopia.200.name: "Nowa istota w Woalu"
 utopia.200.desc.a: "[target_species.GetNamePlural] żyjący w naszym imperium zostali odmienieni. Wszystko zaczęło się od niewielkiego zawirowania w Woalu. Teraz przedstawiciele tego gatunku uzyskali jakby wyższy poziom energetyczny. Wszyscy czujemy, że [target_species.GetNamePlural] już wkrótce rozwiną swoje utajone zdolności psioniczne, podobne do naszych.\n\nByć może przyczyną jest to, że żyją tak blisko nas, a może po prostu Woal sam ich wybrał. Zgromadzenie Telepatów, nasi czołowi specjaliści od psioniki, ostrzega, że to może być nasza jedyna okazja do interwencji. Możemy zdusić to w zarodku albo pomóc im się przebudzić. Bez naszej pomocy nie zajdą daleko."
 utopia.200.desc.b: "Niezwykła aktywność w Woalu sugeruje, że kolejny gatunek w naszym imperium, [target_species.GetNamePlural], zaczyna przejawiać utajone dotąd zdolności psioniczne. Znowu musimy podjąć tę decyzję - czy postaramy się im przeszkodzić, czy też pomożemy im wyzwolić pełnię mocy?"
 utopia.200.a: "Pomożemy im rozwinąć te zdolności."
 utopia.200.a.tooltip: "Wszystkie populacje [target_species.GetAdj&genitive] uzyskają cechę §Y$trait_latent_psionic$§!."
 utopia.200.b: "Nie są tego godni."
 utopia.203.name: "Przebudzenie"
 utopia.203.desc.a: "Pod przewodem Zgromadzenia Telepatów [target_species.GetNamePlural] wykształcili silniejszą więź z Woalem, niż mogliśmy oczekiwać. Zupełnie jakby byli do tego przeznaczeni od początku.\n\nTeraz twierdzą, że są gotowi w pełni rozwinąć swoje zdolności psioniczne. Jednak opinie w Zgromadzeniu są podzielone. Niektórzy jego członkowie obawiają się, że ta zmiana odbyła się zbyt szybko i że umysły nowych psioników staną się niestabilne. Inni z kolei ostrzegają, że woda sodowa uderzy nowicjuszom do głowy. Lecz jeśli nie wkroczymy teraz, możemy już nie mieć drugiej szansy."
 utopia.203.desc.b: "[target_species.GetNamePlural] również twierdzą, że są gotowi do odblokowania pełni swojego psionicznego potencjału."
 utopia.203.a: "Są gotowi."
 utopia.203.a.tooltip: "Wszystkie populacje [target_species.GetAdj&genitive] uzyskają cechę §Y$trait_psionic$§!."
 utopia.203.b: "Nie są tego godni."
 utopia.203.c: "To zbyt niebezpieczne."
 utopia.204.name: "Brutalne przebudzenie"
 utopia.204.desc.a: "Ostatnio nasi naukowcy z zaskoczeniem odkryli nagłe pojawienie się zdolności psionicznych u niektórych przedstawicieli [original_species.GetSpeciesAdj&genitive]. Dochodzenie wykazało, że przemiana ta zbiegła się z wielkim psionicznym przebudzeniem ich braci w imperium [target_country.GetName] - ludu, który od dawna słynął z biegłości w dziedzinie psioniki.\n\nMożemy jedynie zakładać, że część ich nowo odkrytych mocy przeniknęła do ich dalekich krewnych w naszym państwie, choć na razie nie rozumiemy, w jaki sposób."
 utopia.204.desc.b: "Ostatni nasi naukowcy z zaskoczeniem odkryli nagłe pojawienie się zdolności psionicznych u niektórych przedstawicieli [original_species.GetSpeciesAdj&genitive]. Po dokładniejszym zbadaniu sprawy okazało się, że psionicy ci są połączeni telepatycznie ze swymi braćmi w nieznanym dotąd imperium [target_country.GetName], z którym właśnie nawiązaliśmy łączność. Najwyraźniej zmiany, które obserwujemy w naszym państwie, zostały wywołane psioniczną falą spowodowaną wielkim przebudzeniem [original_species.GetSpeciesAdj&genitive] w imperium [target_country.GetName]."
 utopia.204.a.tooltip: "Maksymalnie 4 populacje [original_species.GetSpeciesAdj&genitive] uzyskają cechę §Yutajeni psionicy§!."
 utopia.205.name: "Niespodziewane przebudzenie"
 utopia.205.desc: "Od czasu psionicznego przebudzenia [target_species.GetAdj&genitive] nasi informatorzy donoszą, że niektórzy przedstawiciele tego gatunku zamieszkujący inne imperia zaczynają wykazywać te same utajone zdolności. Zupełnie jakby wspólne dziedzictwo łączyło ich z Woalem, niezależnie od rzeczywistej odległości.\n\nJednak w przeciwieństwie do swoich dalekich krewnych, utajeni psionicy poza naszymi granicami są nieliczni i rozproszeni. Raczej nie osiągną pełnego przebudzenia."
 whisperers_madness: "Woal - szaleństwo"
 whisperers_madness_desc: "Populacja naszego imperium jest podzielona na skutek szaleństwa, które wywołali $whisperers_in_the_void_color_article$."
 whisperers_madness_gestalt: "$whisperers_madness$"
 whisperers_madness_gestalt_desc: "Nasze drony są podzielone na skutek zbiorowej manii, którą wywołali $whisperers_in_the_void_color_article$."
 whisperers_psychosis: "Woal - psychoza"
 whisperers_psychosis_desc: "Nasze imperium padło ofiarą wewnętrznych sporów wywołanych przez szaleństwo, jakie sprowadzili $whisperers_in_the_void_color_article$."
 whisperers_psychosis_gestalt: "$whisperers_psychosis$"
 whisperers_psychosis_gestalt_desc: "Nasze imperium padło ofiarą wewnętrznej niezgody wywołanej przez nierównowagę, jaką wywołali $whisperers_in_the_void_color_article$."
 eater_unhappiness_planet_1: "Woal - pożarta ludność"
 eater_unhappiness_planet_1_desc: "Część ludności tego świata skonsumował $the_eater_of_worlds_color_article$."
 eater_unhappiness_planet_1_gestalt: "$eater_unhappiness_planet_1$"
 eater_unhappiness_planet_1_gestalt_desc: "$eater_unhappiness_planet_1_desc$"
