 covenant_instrument_of_desire: "Pakt - Narzędzie Pożądania"
 covenant_instrument_of_desire_0: "$covenant_instrument_of_desire$"
 covenant_instrument_of_desire_desc: "Zawarliśmy Pakt z potężną istotą z Woalu i cieszymy się teraz jej dobrodziejstwem.\n\n§YBędziemy jednak musieli za to zapłacić.§!"
 covenant_instrument_of_desire_desc_0: "$covenant_instrument_of_desire_desc$"
 covenant_end_of_the_cycle: "Pakt - Koniec Cyklu"
 covenant_end_of_the_cycle_desc: "Zawarliśmy pakt z Końcem Cyklu.\n\n§RPrzyjdzie czas na rozrachunek.§!"
 whisperers_covenant_chain_title: "Szepczący w Pustce"
 whisperers_covenant_chain_desc: "Zbudowaliśmy więź z istotą z Woalu, która mówi o sobie \"$whisperers_in_the_void_color_article$\". Jest niezgłębiona - dała nam ona okruchy swej potęgi, jednak nie za darmo. I to najpewniej nie koniec.\n\nNasi [GetTelepathPlural] przypuszczają, że tę więź można z łatwością wzmocnić, jeśli ściślej dostosujemy nasze czyny do woli naszego patrona.\n\nSzepczący lubią zdobywać nową wiedzę, poznawać ciche tajemnice i spiski. Czerpią przyjemność z zapełniania umysłu aż do granic możliwości tak, że zaczyna pękać w szwach."
 whisperers_covenant_chain_begin: "$BEGINS_EVENT_CHAIN$ §Y$whisperers_covenant_chain_title$§!"
 whisperers_covenant_chain_end: "$ENDS_EVENT_CHAIN$ §Y$whisperers_covenant_chain_title$§!"
 eater_covenant_chain_title: "Pożeracz Światów"
 eater_covenant_chain_desc.intro: "Zbudowaliśmy więź z istotą z Woalu, która mówi o sobie \"$the_eater_of_worlds_color_article$\". Jest nienasycona - dała nam ona okruchy swej potęgi, jednak nie za darmo. I to najpewniej nie koniec.\n\nNasi [GetTelepathPlural] przypuszczają, że tę więź można wzmocnić, jeśli zacieśnimy współpracę z naszym patronem."
 eater_covenant_chain_desc: "$eater_covenant_chain_desc.intro$\n\nGłodny Pożeracz robi się niecierpliwy. Pragnie wojny, słodkiego smaku lamentów i cierpień."
 eater_covenant_chain_begin: "$BEGINS_EVENT_CHAIN$ §Y$eater_covenant_chain_title$§!"
 eater_covenant_chain_end: "$ENDS_EVENT_CHAIN$ §Y$eater_covenant_chain_title$§!"
 composer_covenant_chain_title: "Tkacz Życia"
 composer_covenant_chain_desc.intro: "Zbudowaliśmy więź z istotą z Woalu, która mówi o sobie \"$the_composer_of_strands_color_article$\". Jest opiekuńcza - dała nam ona okruchy swej potęgi, jednak nie za darmo. I to najpewniej nie koniec.\n\nNasi [GetTelepathPlural] przypuszczają, że tę więź można jeszcze wzmocnić, jeśli zacieśnimy współpracę z naszym patronem."
 composer_covenant_chain_desc: "$composer_covenant_chain_desc.intro$\n\nTkacz chce dokonywać manipulacji genetycznych, by wyzwolić ciało z kajdan ewolucji. Opowiada nam o szacunku dla życia i natury, a także o świętości ciała."
 composer_covenant_chain_begin: "$BEGINS_EVENT_CHAIN$ §Y$composer_covenant_chain_title$§!"
 composer_covenant_chain_end: "$ENDS_EVENT_CHAIN$ §Y$composer_covenant_chain_title$§!"
 instrument_covenant_chain_title: "Ucieleśnienie Żądzy"
 instrument_covenant_chain_desc.intro: "Zbudowaliśmy więź z istotą z Woalu, która mówi o sobie \"$the_instrument_of_desire_color_article$\". Jest pieszczotliwa - dała nam ona okruchy swej potęgi, jednak nie za darmo. I to najpewniej nie koniec.\n\nNasi [GetTelepathPlural] przypuszczają, że tę więź można jeszcze wzmocnić, jeśli zacieśnimy współpracę z naszym patronem."
 instrument_covenant_chain_desc: "$instrument_covenant_chain_desc.intro$\n\nUcieleśnienie pożąda przyjemności. Nakręcają je wyuzdane przyjemności, dekadencja i niewolnictwo."
 instrument_covenant_chain_begin: "$BEGINS_EVENT_CHAIN$ §Y$instrument_covenant_chain_title$§!"
 instrument_covenant_chain_end: "$ENDS_EVENT_CHAIN$ §Y$instrument_covenant_chain_title$§!"
 utopia.2671.name: "Nasza więź zacieśnia się"
 utopia.2671.desc: "Coraz lepiej rozumiemy naszego patrona. Dla niego istniejemy jedynie gdzieś na skraju percepcji. Jesteśmy insektami w jego domu. Jednak polubił nas i dlatego znowu przekazał nam kroplę swojej mocy.\n\nNasi telepaci są teraz jeszcze silniej zestrojeni z naszym patronem i postanowili stworzyć pomnik na cześć naszego paktu. W tym miejscu najlepsi z naszych telepatów mogą spróbować porozumieć się z istotą zwaną §Y[GetShroudPatron]§!."
 utopia.2671.a: "W objęciach Tkacza czujemy się bezpieczniej."
 utopia.2671.a.tt: "Teraz nasi telepaci wytwarzają dodatkowy £pop£ §Yprzyrost populacji§!.\n\nNa jednej z naszych planet możemy zbudować £building£ §YSanktuarium Tkacza§!."
 utopia.2671.b: "My też jesteśmy głodni. Wojna nas nasyci."
 utopia.2671.b.tt: "Teraz nasi telepaci wytwarzają dodatkowy £mod_country_naval_cap_add£ limit marynarki wojennej.\n\nNa jednej z naszych planet możemy zbudować £building£ §YSanktuarium Pożeracza§!."
 utopia.2671.c: "Nie ma piękniejszego pragnienia."
 utopia.2671.c.tt: "Teraz nasi telepaci wytwarzają dodatkowe £amenities£ udogodnienia.\n\nNa jednej z naszych planet możemy zbudować £building£ §YSanktuarium Ucieleśnienia§!."
 utopia.2671.d: "W pełnym umyśle nie ma miejsca na wątpliwości."
 utopia.2671.d.tt: "Teraz nasi telepaci wytwarzają dodatkowe $r_research$.\n\nNa jednej z naszych planet możemy zbudować £building£ §YSanktuarium Szepczących§!."
 utopia.2676.name: "Osiągnięto potencjał"
 utopia.2676.desc: "Tajemnice §HWoalu§! są dla nas tak obce, że nie potrafimy ich rozwikłać, jednak my i §Y[GetShroudPatron]§! staliśmy się bardziej dopasowani. Gdziekolwiek się znajdujemy, wyczuwamy tę istotę w głębi naszych umysłów, a jej moc przenika do naszej rzeczywistości poprzez szczeliny w naszej psyche."
 utopia.2676.a: "Wola ciała jest święta."
 utopia.2676.b: "Konflikt to poświęcenie."
 utopia.2676.c: "Nie pożądajcie."
 utopia.2676.d: "Tajemnica to bezpieczeństwo."
 utopia.2681.name: "Okruchy mocy"
 utopia.2681.desc: "Wygląda na to, że nasz patron, §H[GetShroudPatron]§!, zostawił część swojej energii w zagięciu §HWoalu§! i teraz można ją wykorzystać. Nasza bliska więź pozwoli jednemu z nas bezpiecznie wchłonąć tę moc.\n\nWybrano kilkoro kandydatów, ale tylko jedna z tych osób może dostąpić zaszczytu władania mocą naszego patrona. Musimy postanowić, kto to będzie."
 utopia.2681.a: "§H[leader_1.GetTitle]§! [leader_1.GetName]"
 utopia.2681.b: "§H[leader_2.GetTitle]§! [leader_2.GetName]"
 utopia.2681.c: "§H[leader_3.GetTitle]§! [leader_3.GetName]"
 utopia.2681.d: "§H[leader_4.GetTitle]§! [leader_4.GetName]"
 utopia.2682.name: "Wyniesieni"
 utopia.2682.desc.intro: "Stało się. [chosen_leader.GetName] przyjmuje moc, dookoła wyczuwa się jej psioniczną obecność. Jest potężna i budzi szacunek. [chosen_leader.GetName] zyskuje przydomek [GetImmortalLoc]"
 utopia.2682.desc.patron_champion: "$utopia.2682.desc.intro$ i miano obrońcy: §H[GetShroudPatron]§!."
 utopia.2682.desc.shroudshaper_champion: "$utopia.2682.desc.intro$ i cechę $leader_trait_shroudshaper$ w §H[This.GetName]§!."
 utopia.2682.desc.previous_chosen_killed: "§H[previous_chosen_leader.GetName]§!, niegdyś wybrana postać naszego dawnego patrona, w swojej herezji znosi to wydarzenie bardzo źle. Umiera po cichu w swoim miejscu wygnania, utraciwszy ostatnie ślady psionicznej mocy."
 utopia.2682.desc.previous_chosen_lost_patron: "Wydarzenie miało widoczny wpływ na imperium §H[chosen_leader_lost_patron.GetName]§!. Choć nadal posiada znaczny poziom energii psionicznej, to [chosen_leader_lost_patron.GetHasHave] nie ma już mocy otrzymanej niegdyś od byłego patrona."
 utopia.2682.a: "Przeznaczenie Wybrańca dopełniło się."
 utopia.2682.a.shroudshaper: "Wypełnia swoje przeznaczenie."
 utopia.2686.name: "Błogosławione uzbrojenie"
 utopia.2686.desc: "Zgromadzenie Telepatów dokonało przełomu w ujarzmianiu mocy naszego patrona, istoty zwanej §H[GetShroudPatron]§!. Wcześniej tylko osoby obdarzone zdolnościami psionicznymi mogły w pełni znać warunki Paktu, jednak znaleźliśmy sposób umożliwiający, by moc na niespotykaną dotąd skalę płynęła przez całe statki.\n\nJeśli zechcemy, znak, którego źródłem jest §H[GetShroudPatron]§!, umożliwi naszym statkom dotarcie o wiele dalej niż dotąd."
 utopia.2686.a: "Czymże jest kadłub, jeśli nie ciałem?"
 utopia.2686.b: "Nasze statki też są głodne."
