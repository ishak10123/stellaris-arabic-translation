 covenant.tooltip: "§YZapłacimy za to.§!\n\n"
 covenant.cycle.tooltip: "§RNie róbcie tego.§!\n\n"
 covenant.whisperers.desc: "Dokonało się. $whisperers_in_the_void_color_article$ zawarli z nami pakt i już zaczęli przekazywać swoje sekrety naszym naukowcom i przywódcom. Ta wiedza przyniesie nam ogromne korzyści.\n\nJedynym minusem tej sytuacji jest nagły wzrost liczby chorych psychicznie i samobójców wśród ludności... Na niektórych naszych światach dochodzi do rozlicznych niewyjaśnionych morderstw oraz napadów popełnianych przez stabilnych dotąd psychicznie, rozsądnych obywateli. Nasze kliniki i szpitale psychiatryczne mają pewne problemy z przyjmowaniem tak dużego napływu pacjentów."
 covenant.whisperers.option: "Poradzimy sobie."
 covenant.eater.desc: "Dokonało się. $the_eater_of_worlds_color_article$ zawarł z nami przymierze i skutki tego są już odczuwalne wśród naszej armii i floty. Nasi żołnierze walczą teraz z zajadłością, która ociera się o pierwotną dzikość, i nawet lufy dział naszych okrętów zdają się same łaknąć krwi naszych wrogów.\n\nBez wątpienia wiąże się z tym nagłe i tajemnicze zniknięcie całej populacji miasta w jednej z naszych kolonii, którego obywatele zostali zabrani przez Pożeracza w ramach obiecanej daniny.\n\nWydaje się to niewielką ceną, zakładając oczywiście, że Pożeracz nie zgłodnieje ponownie..."
 covenant.eater.option: "Oby nie."
 covenant.instrument.desc: "Dokonało się. $the_instrument_of_desire_color_article$ zawarło z nami przymierze. Nie musieliśmy długo czekać na efekty: raporty o bogatych złożach kruszców w naszych kopalniach, rozkwit firm, które chyliły się ku upadkowi, rzadkie i cenne zasoby odnajdywane na asteroidach, na których wcześniej nie było nic prócz lodu i skał.\n\nZdaje się, że nasze imperium wkracza w złotą erę dobrobytu i bogactwa, zgodnie z zapowiedzią Ucieleśnienia. Ale co miało na myśli, mówiąc o cenie do zapłacenia...?"
 covenant.instrument.option: "To na pewno nic takiego."
 covenant.composer.desc: "Dokonało się. $the_composer_of_strands_color_article$ zawarł z nami przymierze. Nie musieliśmy długo czekać na efekty: nagły i znaczny wzrost wskaźnika narodzin bez wątpienia jest dziełem Tkacza. Jednak oprócz tych pozytywnych skutków zauważamy nagłe pojawienie się nowych, dziwnych mutacji: dzieci rodzą się z dodatkowymi kończynami i organami, z których niektóre nie przypominają żadnych uprzednio skatalogowanych części anatomicznych.\n\nNa szczęście zwiększony wskaźnik narodzin i wyraźna poprawa witalności naszych obywateli znacznie rekompensują nieznaczną liczbę zgonów wynikających z tych mutacji."
 covenant.composer.option: "Postąpiliśmy słusznie."
 covenant.cycle.desc: "Dokonało się. Zawarliśmy przymierze z §RKresem Cyklu§!. Gdy zgodziliśmy się na jego warunki, usłyszeliśmy tylko dwa słowa: §R\"PIĘĆDZIESIĄT LAT\"§!. Potem nastąpiła cisza, w trakcie której rozważaliśmy przyszłe konsekwencje, które właśnie sobie zagwarantowaliśmy."
 covenant.cycle.option: "Oby duchy miały litość dla nas wszystkich."
 covenant_shroud_marked: "Naznaczony przez Woal"
 covenant_shroud_marked_desc: "Ten świat jest naznaczony przez Woal.\n\n§RKiedyś stanie się tu coś bardzo złego.§!"
 covenant_whisperers_in_the_void: "Pakt - Szepczący w Pustce"
 covenant_whisperers_in_the_void_0: "$covenant_whisperers_in_the_void$"
 covenant_whisperers_in_the_void_desc: "Zawarliśmy Pakt z potężną istotą z Woalu i cieszymy się teraz jej dobrodziejstwem.\n\n§YBędziemy jednak musieli za to zapłacić.§!"
 covenant_whisperers_in_the_void_0_desc: "$covenant_whisperers_in_the_void_desc$"
 covenant_whisperers_in_the_void_0_fircon: "Płaszcz zaklinacza"
 covenant_whisperers_in_the_void_fircon: "Płaszcz zaklinacza"
 covenant_composer_of_strands: "Pakt - Splatający Nici"
