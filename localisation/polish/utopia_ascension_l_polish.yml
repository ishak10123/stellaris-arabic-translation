 triggered_opinion_both_hive_mind: "Inny umysł zbiorowy"
 triggered_opinion_both_wilderness: "Podobna nam dzicz"
 triggered_opinion_hive_mind: "Umysł zbiorowy"
 utopia.2700.name: "Ewolucja planowana"
 utopia.2700.desc: "Niekiedy ewolucja potrzebuje delikatnego popchnięcia w odpowiednim kierunku. Dysponujemy obecnie technologią umożliwiającą genetyczne modyfikowanie naszych ciał i umysłów, aby mogły sprostać wyzwaniom ze strony coraz bardziej zmiennego środowiska."
 utopia.2703.name: "Ewolucyjne mistrzostwo"
 utopia.2703.desc: "Przeminęły już dni, gdy przetrwanie naszego gatunku zdane było na łaskę losu. Gdy dzieje [Root.GetSpeciesAdj&genitive] zależały od kaprysów natury, genetycznej loterii.\n\nInżynierowie naszych czasów budują nie ze stali i betonu, ale z genów - cegiełek samego życia. Zaawansowana inżynieria genetyczna umożliwia zapewnienie przyszłości naszemu narodowi."
 utopia.2600.name: "Triumf umysłu nad materią"
 utopia.2600.desc: "Od zarania naszej cywilizacji rozkwitały talenty potężnych czarowników władających mocami, które można było określić jedynie jako nadnaturalne. Ci rzadcy [Root.GetSpeciesNamePlural] potrafili jakoby opanowywać umysły innych osób, podnosić ciężkie przedmioty samymi myślami i wykonywać mnóstwo innych \"magicznych sztuczek\". Do niedawna uważaliśmy takie opowieści za bajki...\n\nTeraz jednak nasi naukowcy uzyskali wreszcie niepodważalne dowody psionicznego potencjału niektórych przedstawicieli [Root.GetSpeciesAdj&genitive]. Choć najwyraźniej tylko bardzo mały ułamek naszego społeczeństwa jest obdarzony mocami psionicznymi, procent ten wyraźnie wzrósł w ciągu kilku ostatnich wieków.\n\nNa razie naukowcy nie wiedzą, czy jest to spowodowane nagłym wzrostem liczby ewolucyjnych mutacji, czy też jakimś innym czynnikiem, który obudził uśpione zdolności psioniczne od zawsze ukryte w naszym kodzie genetycznym."
 utopia.2600.desc.unplugged: "Mimo krótkiej i brutalnej historii naszej młodej cywilizacji, my, [root.GetSpeciesNamePlural], mieliśmy wiele okazji, by popuścić wodze wyobraźni i poświęcić czas na tworzenie fantastycznych opowieści. Wśród często powracających idei są opowieści o potężnych czarodziejach posługujących się mocami, które można określić jako nadnaturalne: czytanie w myślach, podnoszenie ciężkich przedmiotów siłą umysłu i inne \"magiczne sztuczki”.\n\nWielu uważa, że te historie pochodzą z czasu sprzed naszej asymilacji i na trwałe zapisały się w zbiorowym umyśle naszego gatunku. [root.GetSpeciesNamePlural] w większości uważali to za myślenie życzeniowe, przynajmniej do niedawna. Teraz jednak nasi naukowcy uzyskali wreszcie niepodważalne dowody psionicznego potencjału niektórych osobników (gatunek [Root.GetSpeciesAdj&genitive]).\n\nChoć najwyraźniej tylko bardzo mały ułamek naszego społeczeństwa jest obdarzony mocami psionicznymi, badania genetyczne wykazały, że odsetek ten wyraźnie wzrósł w ciągu kilku ostatnich wieków. Na razie naukowcy nie wiedzą, czy jest to spowodowane nagłym wzrostem liczby ewolucyjnych mutacji, czy interwencją imperium [origin_unplugged_assimilator_empire.GetName]."
 utopia.2600.a: "To być może zwiastun czekającej nas przyszłości."
 utopia.2602.name: "[From.GetSpeciesNamePlural] wykazują potencjał psioniczny"
 utopia.2602.1.desc.1.non_gestalt_intro: "Utajone moce psioniczne zaczęły się ujawniać u niektórych osobników"
 utopia.2602.1.desc.1.non_gestalt_outro: "co stwierdzono w przechwyconym raporcie władz świata §H[From.GetName]§!. To musi być całkiem nowe wydarzenie, gdyż nie mamy w archiwach żadnych informacji o tym, by [From.GetSpeciesNamePlural] kiedykolwiek wykazywali takie zdolności."
 utopia.2602.1.desc.1.organic_non_gestalt: "$utopia.2602.1.desc.1.non_gestalt_intro$ należących do gatunku [From.GetSpeciesAdj&genitive], $utopia.2602.1.desc.1.non_gestalt_outro$"
 utopia.2602.1.desc.1.machine_non_gestalt: "$utopia.2602.1.desc.1.non_gestalt_intro$ mechanotypu [From.GetSpeciesAdj&genitive], $utopia.2602.1.desc.1.non_gestalt_outro$"
 utopia.2602.1.desc.1.gestalt_intro: "U niektórych osobników zaczęły ujawniać się utajone moce psioniczne, co stwierdzono w przechwyconym raporcie władz świata §H[From.GetName]§!. To"
 utopia.2602.1.desc.1.gestalt_outro: "zdolności paranormalne nie występują w posiadanych przez nas informacjach o tym gatunku."
 utopia.2602.1.desc.1.organic_gestalt: "$utopia.2602.1.desc.1.gestalt_intro$ połączenie kognitywne przedstawicieli ich gatunku to nic nowego, ale raporty wskazują $utopia.2602.1.desc.1.gestalt_outro$"
 utopia.2602.1.desc.1.machine_gestalt: "$utopia.2602.1.desc.1.gestalt_intro$ komunikacja przedstawicieli ich gatunku poprzez sieć neuronową to nic nowego, ale raporty wskazują $utopia.2602.1.desc.1.gestalt_outro$"
 utopia.2602.1.desc.2.intro: "Te moce posiada na razie tylko niewielka mniejszość"
 utopia.2602.1.desc.2.outro: "Meldunki nie podają wyjaśnienia tego zjawiska."
 utopia.2602.1.desc.2.organic: "$utopia.2602.1.desc.2.intro$ całego gatunku [From.GetSpeciesAdj&genitive]. $utopia.2602.1.desc.2.outro$"
 utopia.2602.1.desc.2.machine: "$utopia.2602.1.desc.2.intro$ [From.GetSpeciesAdj&genitive]. $utopia.2602.1.desc.2.outro$"
 utopia.2602.1.desc.machine_gestalt: "$utopia.2602.1.desc.1.machine_gestalt$\n\n$utopia.2602.1.desc.2.machine$"
 utopia.2602.1.desc.machine_non_gestalt: "$utopia.2602.1.desc.1.machine_non_gestalt$\n\n$utopia.2602.1.desc.2.machine$"
 utopia.2602.1.desc.organic_gestalt: "$utopia.2602.1.desc.1.organic_gestalt$\n\n$utopia.2602.1.desc.2.organic$"
 utopia.2602.1.desc.organic_non_gestalt: "$utopia.2602.1.desc.1.organic_non_gestalt$\n\n$utopia.2602.1.desc.2.organic$"
 utopia.2602.2.desc: "Populacja [From.GetSpeciesAdj&genitive] zamieszkująca nasze terytorium również zaczęła wykazywać podobne zmiany, więc to, co dzieje się z tymi istotami, nie jest bynajmniej ograniczone do konkretnego regionu kosmosu."
 utopia.2602.a.organic_non_gestalt: "Jakże osobliwe."
 utopia.2602.a.hive_or_machine_non_gestalt: "Specjalne moce? To wątpliwe."
 utopia.2602.a.machine_gestalt: "Coś tu nie gra."
 utopia.2602.b: "Moce psychiczne? Co za bujda!"
 utopia.2602.c: "Te czary ich nie uratują."
 utopia.2602.d.organic: "Tak... tak, my też wyczuwamy ich psychiczne emanacje."
 utopia.2602.d.machine: "Tak... zarejestrowaliśmy ich częstotliwości psioniczne."
 utopia.2605.name.organic_non_gestalt: "[psionic_leader.GetTitle] okazuje się telepatą"
 utopia.2605.name.machine_non_gestalt: "[psionic_leader.GetTitle] okazuje się psionikiem"
 utopia.2605.name.gestalt: "[psionic_leader.GetName] okazuje się psionikiem"
 utopia.2605.desc.organic_non_gestalt: "Choć uzyskanie mocy psychicznych w wieku dorosłym jest rzadkie, czasem się zdarza. [psionic_leader.GetTitle] [psionic_leader.GetName] wykazuje ostatnio zdolności, które można podejrzewać o psioniczny charakter. Po dokładnym teście na zdolności pozazmysłowe ustalono, że ma [psionic_leader.GetSheHe] talent psioniczny klasy 4."
 utopia.2605.desc.machine_non_gestalt: "Choć rzadko się to zdarza, czasami zdolności psioniczne pojawiają się u jednostek, które nigdy wcześniej ich nie obsługiwały. [psionic_leader.GetTitle] [psionic_leader.GetName] od niedawna wykazuje funkcjonalności, które można uznać za psioniczne. Po dokładnych testach okazało się, że jest jednostką psioniczną 4. klasy."
 utopia.2605.desc.gestalt: "Z każdym dniem wzrasta wpływ naszych nowo odkrytych mocy. Nośnik, w którym znajduje się [GetBrainName], [psionic_leader.GetName], od niedawna wykazuje zdolności, które można uznać za psioniczne. Po dokładnych testach okazało się, że jest to [GetPsychicNoun] 4. klasy."
 utopia.2605.a: "Te nowe zdolności będą dla nas wielce korzystne."
 utopia.2652.name: "[This.GetSpeciesNamePlural] uzyskują zdolności psioniczne"
 utopia.2652.desc.1.intro: "Wszyscy przedstawiciele gatunku [This.GetSpeciesAdj&genitive] w galaktyce przeszli ogromną zmianę. Wcześniej ich utajona moc psioniczna"
 utopia.2652.desc.1.outro: "teraz ujawnił się ich pełny potencjał psioniczny."
 utopia.2652.desc.1.organic: "$utopia.2652.desc.1.intro$ rozkwitła u niewielkiej mniejszości, to u całego gatunku $utopia.2652.desc.1.outro$"
 utopia.2652.desc.1.machine: "$utopia.2652.desc.1.intro$ ujawniła się u niewielkiej mniejszości, to u całego gatunku $utopia.2652.desc.1.outro$"
 utopia.2652.desc.2.non_gestalt: "Choć te zmiany zaczęły się na świecie [From.GetName], teraz objawiły się u wszystkich członków gatunku [GetSpeciesWord], niezależnie od ich miejsca pobytu."
 utopia.2652.desc.2.organic_non_gestalt: "$utopia.2652.desc.2.non_gestalt$\n\nPoza ujawnianiem szeregu potężnych zdolności psionicznych [This.GetSpeciesNamePlural] zaczęli rezygnować z porozumiewania się między sobą głosem na rzecz telepatii."
 utopia.2652.desc.2.machine_non_gestalt: "$utopia.2652.desc.2.non_gestalt$\n\n$utopia.2652.desc.2.machine_gestalt$"
 utopia.2652.desc.2.gestalt.intro: "Poza ujawnianiem szeregu potężnych zdolności psionicznych, wszyscy przedstawiciele gatunku [This.GetSpeciesAdj&genitive] mogą teraz porozumiewać się"
 utopia.2652.desc.2.organic_gestalt: "$utopia.2652.desc.2.gestalt.intro$ niewerbalnie, poza ich dotychczasowymi kanałami."
 utopia.2652.desc.2.machine_gestalt: "$utopia.2652.desc.2.gestalt.intro$ poza ich dotychczasowymi, kolektywnymi kanałami."
 utopia.2652.desc.organic_non_gestalt: "$utopia.2652.desc.1.organic$\n\n$utopia.2652.desc.2.organic_non_gestalt$"
 utopia.2652.desc.machine_non_gestalt: "$utopia.2652.desc.1.machine$\n\n$utopia.2652.desc.2.machine_non_gestalt$"
