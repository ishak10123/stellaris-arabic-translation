 building_composer_sanctum: "Sanktuarium Tkacza"
 building_composer_sanctum_desc: "Sanktuarium to miejsce przeznaczone do obcowania z Tkaczem. [GetComposerSanctumDesc]"
 building_composer_sanctum_desc_default: "Tutaj ciało jest wolne niczym myśli, dzięki czemu Woal może zmieniać nas w nieznany nam sposób."
 building_composer_sanctum_desc_machine: "Tutaj obwody działają bez ograniczeń narzucanych przez czynniki fizyczne. Woal może zoptymalizować nasze procesory w sposób wykraczający poza nasze konwencjonalne parametry."
 building_eater_sanctum: "Sanktuarium Pożeracza"
 building_eater_sanctum_desc: "Sanktuarium to miejsce przeznaczone do obcowania z Pożeraczem. Tutaj Woal przygotowuje nas do wojny, a my planujemy [GetEaterSanctumDesc]."
 building_eater_sanctum_desc_machine: "podbój"
 building_eater_sanctum_desc_default: "ucztę"
 building_instrument_sanctum: "Sanktuarium Ucieleśnienia"
 building_instrument_sanctum_desc: "Sanktuarium to miejsce przeznaczone do obcowania z Ucieleśnieniem. [GetInstrumentSanctumDesc]"
 building_instrument_sanctum_desc_gestalt: "Gromadzi się tu nadmiary, oczyszcza i dokonuje ich redystrybucji, by wspierać stabilność naszego kolektywu."
 building_instrument_sanctum_desc_default: "Tutaj gromadzi się bogactwa, a potem wydaje się je w konsumpcyjnym szaleństwie, które nie przybliża nas do spełnienia."
 building_whisperers_sanctum: "Sanktuarium Szepczących"
 building_whisperers_sanctum_desc: "Sanktuarium to miejsce przeznaczone do obcowania z Szepczących. [GetWhisperersSanctumDesc]"
 building_whisperers_sanctum_desc_machine: "Tutaj potajemnie wymienia się sekretami, gromadzi i ukrywa nową wiedzę, a nasze sygnały dołączają do tego chóru."
 building_whisperers_sanctum_desc_default: "Tutaj przyciszonymi głosami wymienia się tajemnicami, gromadzi i ukrywa nową wiedzę, a nasze szepty dołączają do tego chóru."
