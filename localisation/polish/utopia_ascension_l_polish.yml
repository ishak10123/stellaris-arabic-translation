 utopia.3401.name: "[From.Capital.GetName]: [chosen_one.GetTitle] - koronacja"
 utopia.3401.desc.intro: "Niezwykle potężny przedstawiciel [chosen_one_species.GetAdj&genitive], [GetPsychicNoun], przejął kontrolę nad imperium §H[From.GetName]§!! Ta"
 utopia.3401.desc.outro: "istota, szeptem nazywana przez swoich wyznawców \"Wybrańcem\", została dziś rano koronowana w trakcie wystawnej ceremonii na świecie [From.Capital.GetName]. Zaraz potem do wszystkich międzygwiezdnych rządów wysłano komunikat sławiący wieczne rządy, które będzie sprawować §H[chosen_one.GetRulerTitle] [chosen_one.GetRegnalName]§!."
