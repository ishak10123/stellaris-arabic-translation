 utopia.2652.b: "Na pewno da się to logicznie wyjaśnić."
 utopia.2652.c.organic: "Zachowajcie ostrożność."
 utopia.2652.c.machine: "Sytuacja nie rozwija się po naszej myśli."
 utopia.2652.d.organic: "Odczuliśmy spore psioniczne zakłócenie wywołane ich przebudzeniem."
 utopia.2652.d.machine: "To wyjaśnia zakłócenia psioniczne, które wykryliśmy."
 utopia.2650.name: "Wielkie Przebudzenie"
 utopia.2650.desc: "Gatunek [Root.GetSpeciesAdj&genitive] doznał czegoś, co można określić jedynie jako Wielkie Przebudzenie. Od pewnego już czasu byliśmy świadomi wielkiego wrodzonego potencjału psionicznego naszego ludu, lecz moce te objawiały się jedynie u niewielu osób... do teraz.\n\nW ciągu właściwie jednej nocy [Root.GetSpeciesNamePlural] w całej galaktyce uzyskali dostęp do pełni swoich możliwości psionicznych, zupełnie jakby swego rodzaju połączona energia psychiczna [Root.GetSpeciesAdj&genitive] przekroczyła punkt krytyczny, budząc kolektywnie uśpione zdolności naszych mózgów.\n\n[Root.GetSpeciesNamePlural] zrezygnowali już z większości komunikacji głosowej między sobą, preferując telepatię, a to zaledwie jeden mały przykład niezliczonych zmian, którym musi stawić czoła nasze społeczeństwo. Jesteśmy odtąd związani ze sobą w sposób, jakiego wcześniej nie bylibyśmy w stanie sobie nawet wyobrazić."
 utopia.2650.a: "Zasłona się uniosła."
 utopia.2655.name: "Woal"
 utopia.2655.desc: "Woal wzywa nas w głębi umysłów niczym stłumiony szept w ciemnym pokoju. To pierwotne królestwo czystej energii psychicznej, które powstało u zarania czasu. Wszystkie istoty obdarzone zdolnościami psionicznymi w jakiś sposób czerpią z niego swoją moc, choćby podświadomie.\n\nOd naszej przemiany zaczęliśmy postrzegać Woal wyraźniej. Kryją się w nim wzory, które nawet nasi najpotężniejsi telepaci mogą ujrzeć jedynie jako bezpostaciową masę wirującej energii. Są też... inne rzeczy. Swego rodzaju duchy, które patrzą na nas z tamtej strony. Czasem z ciekawością, czasem z dobrocią... a niekiedy ze złością.\n\nNadal dopiero poznajemy zakres naszych nowych mocy, ale być może zdołamy się połączyć z tymi duchami. Będzie to wymagać wspólnych wysiłków naszych najpotężniejszych telepatów."
 utopia.2655.a: "Musimy zbadać Woal."
 BREACHING_SHROUD_PROJECT: "Wdarcie do Woalu"
 BREACHING_SHROUD_PROJECT_DESC: "Jeśli mamy się porozumieć z mieszkańcami psychicznego świata znanego jako Woal, będziemy musieli uwolnić niewiarygodną ilość energii psionicznej. Rozpoczęliśmy już przygotowania do wielkiego seansu z udziałem naszych najpotężniejszych psioników należących do właśnie założonego Zgromadzenia Telepatów, którego siedzibą jest [Root.Capital.GetName]."
 utopia.2656.name: "Seans"
 utopia.2656.desc: "Po wielu dniach hipnotycznego transu nasi psionicy ze Zgromadzenia Telepatów zdołali otworzyć nietrwałe przejście do Woalu.\n\nTeraz, gdy udało się nam nawiązać wstępne połączenie psioniczne, będziemy w stanie kontaktować się z tym miejscem za pośrednictwem menu §Hkontaktów§!. Aby jednak dokonać znaczącej penetracji i spotkać się z istotami, które zamieszkują Woal, prawdopodobnie będziemy musieli zastosować specjalne nadajniki psioniczne zwiększające zasięg naszej telepatii. Zużyje to ogromną ilość energii."
 utopia.2656.a: "Pora sięgnąć tam i sprawdzić, co znajdziemy."
 utopia.2657.name: "Przez szkło powiększające"
 utopia.2657.desc: "Chociaż jeszcze nie przebiliśmy się przez zasłonę, czujemy, że pod naporem naszych połączonych umysłów staje się ona coraz cieńsza. Jednak nasze próby wejścia w §HWoal§! zostały dostrzeżone. Coś nas obserwuje.\n\nObecność tego czegoś emanuje fenomenalną mocą, trudno pojąć, czego chce. Przesącza się przez pęknięcia w naszej psychice.\n\nLedwie zwraca na nas uwagę. Obserwuje nas tak, jak my patrzymy na kroplę wody na iluminatorze. Może wpuści nas do swego nieprzeniknionego umysłu, jeśli tylko zdołamy do niego dotrzeć."
 utopia.2657.a: "Spróbujmy się z tym porozumieć."
 utopia.2657.a.tt: "§GTo pozwoli nam stworzyć pakt.§!"
 utopia.2657.b: "Wejdziemy tam sami."
 utopia.2657.c: "To był fatalny pomysł! Musimy działać ostrożniej."
 utopia.2658.name: "Potwierdzenie"
 utopia.2658.desc: "Minął już jakiś czas, odkąd my i §H[GetShroudPatron]§! stworzyliśmy fundamenty paktu. Nasza więź nadal jest słaba, zatem wciąż mamy szansę ją zerwać lub wzmocnić."
 utopia.2658.a: "Potwierdźmy pakt."
 utopia.2658.b: "§Y[GetShroudPatron]§! nie ma z nami nic wspólnego."
 utopia.2659.name: "Wejście"
 utopia.2659.desc: "Nasi telepaci pracowali niestrudzenie, by przebić się przez §HWoal§!, nie mając pomocy od jego mieszkańców. Wreszcie znaleźli jakieś wejście. Ta otchłań nas wzywa. Musimy tylko odważyć się na ten skok."
 utopia.2659.a: "Wchodzimy w głębiny spowite woalem."
 FORM_COVENANT_PROJECT: "Komunikacja z nienazwanym"
 FORM_COVENANT_PROJECT_DESC: "[Root.Capital.GetName]: Zgromadzenie Telepatów przygotowuje potężne połączenie, by skontaktować się z istotą zamieszkującą Woal."
 utopia.3020.name: "§GWezwano awatara psionicznego§!"
 utopia.3020.desc: "Udało nam się skupić potężne energie §HWoalu§! w psionicznym Awatarze pod naszą kontrolą!\n\nPo przeniesieniu do naszego wymiaru Awatar przekształcił się w kosmiczną istotę na orbicie świata [Root.Capital.GetName]."
 utopia.3021.desc: "Udało nam się skupić potężne energie §HWoalu§! w psionicznym Awatarze pod naszą kontrolą!\n\nPo przeniesieniu do naszego wymiaru Awatar przekształcił się w gigantycznego wojownika na powierzchni świata [Root.Capital.GetName]."
 utopia.3022.name: "§RPrzyzwanie nie powiodło się§!"
 utopia.3022.desc: "Ukierunkowanie mocy psionicznej niezbędnej do przywołania Awatara i sprowadzenia go do naszego wymiaru po prostu przekracza nasze możliwości. Energie §HWoalu§! reagują na nasze niepowodzenie pełnym niepokoju sykiem."
 utopia.3023.name: "Istota psioniczna atakuje"
 utopia.3023.desc: "Próba przywołania psionicznego Awatara zakończyła się częściowym sukcesem. Istota przyjęła odpowiednią postać i przeniosła się do naszego wymiaru, jednak nasi [GetTelepathPlural] nie zdołali jej opanować!\n\nMusimy teraz stawić czoła agresywnemu psionicznemu stworowi, który niszczy wszystko, na co się natknie."
 utopia.3024.name: "Intruz z Woalu"
 utopia.3024.desc: "Istota z §HWoalu§! przedarła się przez tkaninę przestrzeni i zmaterializowała w układzie [shroud_spawn_system.GetName]! Mściwy Awatar zgromadził kolosalną ilość energii psionicznej i wykorzystuje ją do rażenia wszystkiego, co ma nieszczęście znajdować się na jego drodze."
 utopia.3024.a: "Trzeba to powstrzymać!"
 utopia.3026.name: "Awatar z Woalu wygnany"
 utopia.3026.desc: "Nieustanna atrofia istnienia w normalnej przestrzeni osłabiła Awatara w układzie §H[shroud_spawn_system.GetName]§!.\n\nNie mogąc już utrzymywać materialnej postaci, wycofał się do §HWoalu§!."
 utopia.3026.a.default: "Nie będziemy po nich płakać."
 utopia.3026.a.machine_or_hive: "To miło."
 exit.shroud: "Opuścić Woal."
 shroud_army: "Awatar psioniczny"
 shroud_army_desc: "Gigantyczny wojownik z Woalu wytworzony z czystej energii psionicznej."
