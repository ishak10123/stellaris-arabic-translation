 utopia.3400.name: "Boska władza"
 utopia.3400.desc: "[GetImmortalLoc] istota §H[chosen_one.GetName]§!, niegdyś [chosen_one_species.GetName], a teraz coś znacznie więcej, zyskała wielu gorliwych wyznawców w imperium [Root.GetName]. Wielu uważa ją za najważniejsze bóstwo, pojawił się nawet wniosek o mianowanie jej wiecznym władcą naszego wielkiego imperium."
 utopia.3400.a: "To potężny telepata, ale bóg? Nie sądzę."
 utopia.3400.b: "Niech rządzi wiecznie... a nawet dłużej!"
