 living_standard_symbiotic_drone: "Symbioza"
 living_standard_symbiotic_drone_tooltip: "Populacje tego gatunku mogą pracować jako §Yrobotnicy§!."
 living_standard_symbiotic_drone_tooltip_delayed: "$citizenship_symbiotic_drone_tooltip_delayed$"
 living_standard_exploited_drone: "Wyzysk"
 living_standard_exploited_drone_tooltip: "Populacje mogą pracować jako §Y$SLAVES$§! w koloniach, gdzie znajduje się £building£ §Y$building_slave_processing$§!"
 living_standard_exploited_drone_tooltip_delayed: "$citizenship_exploited_drone_tooltip_delayed$"
 job_disconnected_drone: "Odłączony dron"
 job_disconnected_drone_plural: "Odłączone drony"
 job_disconnected_drone_desc: "Te drony, oddzielone od ich zbiorowej świadomości, kierują się niczym więcej, jak prymitywnym instynktem."
 job_disconnected_drone_effect_desc: "£job_synapse_drone£ $job_disconnected_drone_plural$ wytwarzają zasoby zależnie od ich §Ycech gatunkowych§!."
