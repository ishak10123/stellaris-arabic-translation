 ### Hive Fallen Empire #
 RT_INCOMPLETE_OVERMIND: "Niepełny umysł naczelny"
 gov_war_splinter: "Frakcja wojenna"
 gov_war_splinter_desc: "Wojownicze i agresywne instynkty, które były jednymi z licznych impulsów roju. Teraz próbują przejąć kontrolę nad innymi fragmentami, gdy nie walczą same ze sobą."
 gov_growth_splinter: "Frakcja rozwojowa"
 gov_growth_splinter_desc: "Dążenie do ewolucji i zmiany upadłego roju. Ponieważ koncentruje się na nieustannym poszukiwaniu nowych idei, frakcja ta ma problemy z uzyskaniem kontroli nad innymi."
 gov_control_splinter: "Frakcja kontrolująca"
 gov_control_splinter_desc: "Obsesyjny instynkt zwalczania dewiacji i promowania jednorodności to natura tej frakcji. Chce ona przede wszystkim kontrolować pozostałe frakcje, ale ciągle przeszkadza jej w tym nieustający chaos, panujący w naszym wszechświecie."
 gov_fused_ascendancy: "Połączona dominacja"
 gov_fused_ascendancy_desc: "Niegdyś rozbici, teraz zjednoczeni. Blizny rozdzielenia nie czynią tego przebudzonego imperium kruchym, ale nowym. Stary umysł zbiorowy zawiódł. Ten zamierza rządzić wiecznie."
 civic_fragmented_command: "Podzielone dowództwo"
 civic_fragmented_command_desc: "Posiadając jedynie fragmenty tego, co niegdyś było całością, to upadłe imperium nie ma najważniejszych cech niezbędnych do zarządzania imperium gwiezdnym."
 civic_hyper_aggressive_drones: "Hiperagresywne drony"
 civic_hyper_aggressive_drones_desc: "Drony w tym upadłym imperium ciągle ze sobą walczą, co prowadzi do poważnych niedoborów zasobów."
 civic_unstable_drones: "Niestabilne drony"
 civic_unstable_drones_desc: "Drony tego upadłego imperium są ciągle zmuszane do rozwoju. Rzadko mają kończyny potrzebne w pracach, do których je wyznaczono."
 civic_stunted_drones: "Hamowane drony"
 civic_stunted_drones_desc: "Drony tego upadłego imperium są mikrozarządzane do tego stopnia, że pod żadnym pozorem nie mogą odstąpić od wykonywanego zadania. Nawet gdy fabryka płonie."
 civic_restored_mind: "Odnowiony umysł"
 civic_restored_mind_desc: "Pradawna świadomość wreszcie została odnowiona i teraz napędzają ją współczesne instynkty."
 civic_ancient_memories_of_war: "Pradawne wspomnienia wojny"
 civic_ancient_memories_of_war_desc: "Za sprawą tego przebudzonego imperium dawno zapomniane taktyki i formacje wróciły na arenę galaktyki. Jego floty przysłonią gwiazdy."
 civic_ancient_memories_of_growth: "Pradawne wspomnienia rozwoju"
 civic_ancient_memories_of_growth_desc: "To przebudzone imperium wykorzystuje dawno zapomniane metody rozwoju i zdobywania dobrobytu. Jego drony będą liczniejsze niż gwiazdy."
 civic_ancient_memories_of_control: "Pradawne wspomnienia kontroli"
 civic_ancient_memories_of_control_desc: "To przebudzone imperium ponownie wykorzystuje dawno zapomniane narzędzia władzy i przepisy. Jego wpływy sięgną nawet gwiazd."
