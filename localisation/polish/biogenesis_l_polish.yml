 crisis_behemoth_level_4_desc: "Poziom 4. kryzysu"
 crisis_behemoth_level_5: "§HZagrożenie egzystencjalne§!"
 crisis_behemoth_level_5_desc: "Poziom 5. kryzysu"
 behemoth_crisis_level_5_req_tooltip: "£trigger_no£ Ma ukończony projekt specjalny: §Y$BEHEMOTH_CRISIS_SPECIAL_PROJECT_4$§! §H$become_the_crisis_chain$§!"
 feral_insight: "Wiedza o dzikich stworzeniach"
 feral_insight_name: "$feral_insight$:"
 feral_insight_value: "£feral_insight£ $VAL|0$"
 feral_insight_current_value: "Bieżąca wartość: §Y$VALUE|0$§!"
 feral_insight_gaining: "Ukończ §Hcele kryzysowe§!, aby zdobyć więcej £feral_insight£ §Y$feral_insight$§!."
 feral_insight_desc: "Badany cykle żywieniowe i behawioralne megaorganizmów."
 feral_insight_crisis_objective: "Cele kryzysowe"
 feral_insight_crisis_objective_gained: "Zyskano: $feral_insight$"
 feral_insight_crisis_objective_reward: "$REWARD$"
 feral_insight_crisis_objective_progress: "Zyskaliśmy £feral_insight£ $AMOUNT$ z tego celu kryzysowego."
 feral_insight_crisis_description_title: "Kryzys behemotów"
 feral_insight_crisis_description: "$menace_crisis_description_intro$\n\nLewiatany żyjące w próżni to potężne istoty o niezrównanej sile, ale nie mające żadnych celów i ambicji. Połączenie ich monumentalnych ciał z potęgą naszego intelektu da początek nowej generacji fauny kosmicznej i wprowadzi nas na szczyt dominacji w galaktyce."
 feral_insight_crisis_howto_title: "Narodziny behemotów"
 feral_insight_crisis_howto: "Realizacja §Hcelów kryzysowych§! wytwarza £feral_insight£§Hwiedzę o dzikich stworzeniach§!, co pozwoli nam uwolnić nasz pełny potencjał biologiczny."
 feral_insight_crisis_level_unlocked: "$LEVEL$ zapewnia następujące nagrody:\n"
 feral_insight_crisis_level_locked: "Wymagania do odblokowania tego poziomu:\n"
 feral_insight_crisis_level_unlock: "Ma £feral_insight£ §Y$CURRENCY$§! wiedzy o dzikich stworzeniach"
 feral_insight_crisis_level_desc: "Aby przechodzić na kolejne poziomy kryzysu, zbieraj £feral_insight£§Hwiedzę o dzikich stworzeniach§!, opracowuj specjalne projekty kryzysowe i wyhoduj behemota."
 #Crisis Perks
 menp_behemoth_objectives: "Wiedza o dzikich stworzeniach"
 unlocks_behemoth_objectives: "Umożliwia gromadzenie: £feral_insight£ §Y$menp_behemoth_objectives$§! dzięki realizacji §Hcelów kryzysowych§!.\n"
 menp_behemoth_objectives_desc: "Badanie zachowań behemota pomoże nam osiągnąć ostateczny cel transcendencji. Zerwiemy biologiczne kajdany ograniczające organizmy rodzące się na planetach."
 menp_behemoth_bioship_1: "Twardsze chitynowe pancerze"
 menp_behemoth_bioship_1_desc: "Przetrwanie w bezlitosnej kosmicznej pustce wymaga posiadania grubej skorupy. Wytrzymałość powłok zewnętrznych pozwoli nam przeżyć nawet w najgorszych warunkach."
 menp_behemoth_society_1: "Przyspieszone próby polowe"
 menp_behemoth_society_1_desc: "Doświadczenia laboratoryjne to dobry początek, ale prawdziwy postęp wymaga praktycznych, bardzo ryzykownych prób polowych."
 menp_behemoth_food_1: "Powiększone zboża"
 menp_behemoth_food_1_desc: "Zaspokojenie ogromnego apetytu behemota to trudna walka. Warto zacząć od produkowania genetycznie zmodyfikowanej żywności."
 menp_behemoth_egg: "Monumentalne wylęgarnie"
 unlocks_behemoth_egg: "Odblokowuje superkonstrukcję §Yjajo behemota§!.\n"
 menp_behemoth_egg_desc: "Kolosalne jajo potrzebuje gigantycznej wylęgarni. Ta orbitalna wylęgarnia musi znajdować się w odpowiedniej odległości od gwiazdy, aby behemot mógł rosnąć w odpowiednich warunkach."
 menp_behemoth_bioship_2: "Lepsza stymulacja gruczołów"
 menp_behemoth_bioship_2_desc: "Dzięki specjalistycznym sondom możemy sztucznie stymulować gruczoły dokrewne behemota, aby wytwarzały hormony wzrostu i w ten sposób przyspieszały jego rozwój."
 menp_behemoth_society_2: "Badania interdyscyplinarne"
 menp_behemoth_society_2_desc: "Na styku doboru naturalnego i bioinżynierii narodziła się niezrównana siła."
 menp_behemoth_food_2: "Nadmiar składników odżywczych"
 menp_behemoth_food_2_desc: "Zaspokojenie ogromnego apetytu behemota może okazać się niemożliwe. Produkowanie genetycznie zmodyfikowanej żywności to dopiero początek."
 menp_behemoth_hatchling: "Gargantuiczne stado"
 unlocks_behemoth_hatchling: "Umożliwia §Ywykluwanie§! superkonstrukcji jaja behemota.\n"
 menp_behemoth_hatchling_desc: "Miot behemotów znajduje się w wielu układach gwiezdnych. Nasi galaktyczni sąsiedzi uszanują autonomię naszego potomstwa albo zostaną jego pożywieniem."
 menp_behemoth_bioships_3: "Szybsze cykle rozwoju"
 menp_behemoth_bioships_3_desc: "Przyspieszenie rozwoju gigantycznej fauny kosmicznej ma kluczowe znaczenie w realizacji naszego ostatecznego celu. Zadbamy, żeby nasza infrastruktura rozwijała się w podobnym tempie."
 menp_behemoth_society_3: "Mistrzostwo bioinżynierii"
 menp_behemoth_society_3_desc: "Dzięki rygorystycznej metodzie prób i błędów, zdobyliśmy wielką wiedzę naukową. Teraz jesteśmy najlepszymi bioinżynierami w galaktyce."
 menp_behemoth_mind_control: "Kształtowanie głębokich myśli"
 unlocks_behemoth_mind_control: "Pozwala nam wpływać na myśli §Ybehemotów§!.\n"
 menp_behemoth_mind_control_desc: "Nasza inteligencja zbiorowa jest poruszona, pragnie czegoś większego i lepszego. Nasza ambicja nie ma granic."
 menp_behemoth_hatchling_2: "Nieposkromiony rozwój"
 unlocks_behemoth_hatchling_2: "Pozwala najedzonym §Ybehemotom§! przepoczwarzać się, dzięki czemu te stworzenia rosną i stają się potężniejsze.\n"
 menp_behemoth_hatchling_2_desc: "Bestia jest nieokiełznana. Istota, która kiedyś była zaledwie pisklakiem, szybko zamienia się w dziką, niepowstrzymaną siłę natury."
 menp_behemoth_bioship_4: "Silniejsze organizmy"
 menp_behemoth_bioship_4_desc: "Behemoty, napędzane potężnym głodem i nieokiełznanym szałem, osiągają chaotyczny poziom siły. Ich biologiczna broń jest gotowa dziesiątkować wrogów i przypadkowe ofiary."
 menp_behemoth_mutation_research: "Mutacje behemota"
 unlocks_behemoth_mutation_research: "Odblokowanie §Yprojektu specjalnego§!, który pozwala kształtować rozwój genetyczny §Ybehemotów§!.\n"
 menp_behemoth_mutation_research_desc: "Zmienimy materiał genetyczny rosnących behemotów, aby uzyskać najkorzystniejsze cechy fizjologiczne."
 menp_behemoth_mind_control_2: "Wysłanie najlepszego okazu"
 unlocks_behemoth_mind_control_2: "Nawiążemy silniejsze więzi psychiczne z naszymi §Ybehemotami§!.\n"
 menp_behemoth_mind_control_2_desc: "Szczyt doskonałości genetycznej nie będzie ograniczany naszymi granicami. Musimy podzielić się nim z resztą galaktyki."
 menp_behemoth_mind_meld: "Scalenie umysłów"
 unlocks_behemoth_mind_meld: "Przejmijcie pełną kontrolę nad potężnym §Ybehemotem IV klasy§!, który może zdominować galaktykę.\n"
 menp_behemoth_mind_meld_desc: "Nasz umysł dla behemota, umysł behemota dla nas. Jego szał staje się naszym. Pozwalamy się pożreć, a gdy bestia ucztuje na naszej świadomości zbiorowej, czujemy jej gniew. Ona staje się nami, a my bestią."
 menp_behemoth_primal_roar: "Pierwotny ryk"
 unlocks_behemoth_primal_roar: "Wezwijcie największą bestię i rzućcie jej wyzwanie w walce o dominację nad próżnią.\n"
 menp_behemoth_primal_roar_desc: "Płynie przez nas, gorzeje, rozdziera, płonie. Szał, pierwotny ryk. Galaktyka spłonie w ogniu naszej furii."
 menp_behemoth_ever_hungry: "Nieustanny głód"
 unlocks_behemoth_ever_hungry: "Odblokowuje sytuację $behemoth_finale_situation$. Ucztuj w tej galaktyce, aby rosnąć i zwiększać swoją potęgą i w końcu stać się najgroźniejszym gwiezdnym drapieżnikiem.\n"
 menp_behemoth_ever_hungry_desc: "Jesteśmy w agonii, nieustająca potrzeba jedzenia to jedyne, co nadaje sens naszemu istnieniu. Mamy w sobie pustkę, której nie sposób zapełnić, choćbyśmy nie wiem ile zjedli. Ten ból ukoi tylko uczta na galaktyczną skalę."
 menp_behemoth_egg_2: "Drapieżne potomstwo"
 unlocks_behemoth_egg_2: "Umożliwia §Ybehemotom IV klasy§! znoszenie §Yjaj§! i kontynuację gatunku.\n"
 menp_behemoth_egg_2_desc: "Nasz pomiot pożywi się ścierwem galaktyki. Jego głód nie ma granic. Będzie ucztować aż po kres czasu."
 mod_shipclass_military_hull_mult: "Kadłuby okrętów wojskowych"
 mod_country_resource_max_food_add: "Maksymalny zapas żywności"
 mod_starbase_shipyard_build_alloys_cost_mult: "Koszt stopów przeznaczonych na okręty"
