 behemoth_cocoon_activity_key: "Przygotowania do przepoczwarzenia"
 behemoth_cocoon_menu_title: "Dojrzewanie i rozwój"
 behemoth_cocoon_effect: "Dobrze nakarmiony §Ybehemot§! może zamieszkać na gazowym olbrzymie na §Y3 lata§!, żeby przeobrazić się w jeszcze silniejszą istotę."
 behemoth_cocoon_progress_activity_key: "W kokonie"
 behemoth_cocoon_tt: "§RMusimy odblokować korzyść kryzysową §H$menp_behemoth_hatchling_2$§!.§!"
 MESSAGE_BEHEMOTH_GROWTH_TITLE: "Większy i wścieklejszy"
