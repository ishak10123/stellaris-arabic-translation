 #General Events
 action.1.desc_109: "§HNie ma spokojnej i uporządkowanej wymiany, zamiast tego atakują nas trzy oddzielne sygnały. Choć mocno różnią się treściami, każdy z nich mówi tym samym głosem.§!\n\nSygnał 1: [GetPrimaryHiveFEConversation]\nSygnał 2: [GetSecondaryHiveFEConversation]\nSygnał 3: [GetTertiaryHiveFEConversation]\n\n§HW tym momencie głosy zniżyły się do zniekształconego bełkotu. Analiza wykazała, że każdy sygnał był skomplikowanym oznaczeniem. Uproszczone tłumaczenie brzmi: §Y[GetPrimaryHiveFEName]§!, §Y[GetSecondaryHiveFEName]§! i §Y[GetTertiaryHiveFEName]§!.§!"
 war_first_hivefe: "\"Słabe istoty. Ciekawe, jak prowadziłybyście wojnę? Widzieć wasze zmagania, słuchać waszych rozmów... To byłaby rozrywka. Dlaczego...\""
 growth_first_hivefe: "\"Mnóstwo życia! Do tego dobrze odżywionego. Rośniecie z konieczności czy dlatego, że tak postanowiliście? Nie pamiętamy. Dlaczego...\""
 control_first_hivefe: "\"Takie ciała... Wasze [Species.GetEyeNamePlural] są przesunięte o 3% od środka. Trzeba to poprawić. Zakładamy, że będziecie posłuszni. Dlaczego... \""
 war_second_hivefe: "\"...bezużyteczne tarcze, które nie przetrwają nawet w sercu gwiazdy. Ta galaktyka musi napełniać was przerażeniem. Musicie być...\""
 growth_second_hivefe: "\"za mało otworów. Mając nie jedne [Species.GetMouthName], ale troje, może zaczniecie się rozwijać. Możecie...\""
 control_second_hivefe: "\"boleśnie niewydajny język. Anachroniczną gramatykę trzeba zracjonalizować. Wprowadzicie nasze zmiany...\""
 bio.3000.name: "Pomyślcie uważnie"
 bio.3000.desc: "§HZwyczajowy dysonans frakcji upadłego imperium zniknął. Trzy głosy mówią w harmonii, w każdym słychać gniew.§!\n\nNierozważni [owner.GetSpeciesNamePlural]! Weszliście do układu Ostatniej Myśli. Powiedzmy sobie jasno: wasze [owner.GetEyeNamePlural] nie mogą oglądać tego miejsca. Jeżeli wejdziecie dalej, konsekwencje będą niewyobrażalne i nie do zniesienia.\n\nNie będziecie nam przeszkadzać... jemu... mnie."
 bio.3000.a: "Uruchomić awaryjny napęd nadświetlny."
 bio.3000.b: "Nie odejdziemy."
 bio.3005.name: "Po namyśle"
 bio.3005.desc: "§HHarmonia - chór - znowu rozbrzmiewa, wszystkie trzy elementy mówią jak jeden:§!\n\n ...się!Wynoście się!Wynoście się!Wynoście się!Wynoście się!Wynoście się!Wynoście się! Wynoście... "
 bio.3005.a: "Odpalić awaryjny napęd nadświetlny!"
 bio.3005.b: "Poznamy wasze tajemnice."
 #Task Events
 #War
 bio.3105.name: "Przetrwanie najsilniejszych"
 bio.3105.desc: "Dzisiaj, [root.GetSpeciesNamePlural], wasz kruchy gatunek pokaże, co potrafi! Mamy nowy statek biologiczny, który już wykazał się, dziesiątkując inne młode. Nadszedł czas, aby sprawdził się w walce z czymś nieznanym. We właściwym czasie okaz pojawi się w układzie §Y[target_system.GetName]§!.\n\nPostarajcie się dostarczyć nam ciekawych danych."
 bio.3105.militarist: "To godne wyzwanie!"
 bio.3105.a.tooltip: "Doświadczalny statek upadłego imperium pojawi się w układzie §Y[target_system.GetName]§!."
 bio.3105.b: "Czy możemy odmówić?"
 NAME_New_Breed: "Nowa rasa"
 NAME_Experimental_Ship: "Statek doświadczalny"
 bio.3110.name: "Rozczarowanie"
 bio.3110.desc: "Wygląda na to, że doświadczalna rasa wciąż żyje. Nadal jesteście za słabi.\n\nMoże powinniśmy byli wysłać amebę."
 bio.3110.a: "Przykro nam?"
 bio.3120.name: "Nauczka"
 bio.3120.desc: "Wspaniale. Cieszy nas, że dostrzegliście skłonność tego gatunku do unikania ognia i odpowiednio wykorzystaliście tę wiedzę. Zapewniamy, że obecnie dojrzewająca następna generacja będzie pozbawiona tej wady.\n\nWyhodowaliście młodych [root.GetSpeciesAdj&genitive]. Bądźcie przygotowani."
 bio.3130.name: "Za cicho"
 bio.3130.desc.notruce: "Zauważyliśmy, że nie toczycie żadnych walk. Dlaczego? Młode imperia muszą walczyć, jeśli nie chcą zostać w tyle. Wybraliśmy dla was przeciwnika, to §Y[unfortunate_country.GetName]§!. Pokonajcie ich w ciągu dekady, a będziecie się dalej rozwijać."
 bio.3130.desc.truce: "$bio.3130.desc.notruce$\n\nI nie przejmujcie się rozejmem, który z nimi zawarliście. Już nie obowiązuje."
 bio.3130.a: "Co za nonsens..."
 bio.3130.a.pacifist: "Konflikt to nie jedyna droga rozwoju!"
 bio.3130.a.militarist: "Wspaniała inicjatywa!"
 bio.3150.name: "Dajmy szansę pokojowi"
 bio.3150.desc: "Młodzi przedstawiciele [Root.GetName], przybywamy z ostrzeżeniem i wyzwaniem.\n\nZagarnianie wszystkiego wokół siebie może działać odurzająco, ale żeby naprawdę poznać wojnę, trzeba też zaznać pokoju.\n\nPoświęćcie dekadę na zastanowienie się, co zyskaliście. Zaufajcie nam: odpocznijcie, inaczej pękniecie."
 bio.3150.a.mean: "Co to za głupota?"
 bio.3150.a.pacifist: "Co za oświecona perspektywa!"
 #Growth
 bio.3205.name: "Ulepszenie ekosystemu"
 bio.3205.desc: "Likwidacja waszej biomasy opóźnia się. Ale nie... §Y[targetrivalname.GetName] to nie wy§!.\n\nDlaczego nam przeszkadzacie?\n\nNo tak. Macie otrzymać dawno uśpiony wzorzec, genom troskliwie przechowywany przez wiele tysiącleci. Odkładaliśmy jego udostępnienie, czekając na odpowiedni moment. Wasza kolonia na świecie §Y[target_planet.GetName]§! to idealny biorca. Jego biosfera zostanie błyskawicznie wchłonięta."
 bio.3205.a: "Zgadzamy się."
 bio.3205.a.planetscaper: "Nauczcie nas to robić!"
 bio.3205.b: "Czy nie wystarczyłby świat §Y[alternate_planet.GetName]§!?"
 bio.3205.b.planetscaper: "Uważamy, że świat §Y[alternate_planet.GetName]§! byłby o wiele lepszym miejscem testowym!"
 bio.3205.c: "Co za absurdalne żądanie, nie zgadzamy się!"
 bio.3205.c.environmentalist: "Jak śmiecie?!"
 bio.3210.name: "Zmodyfikowano biosferę"
 bio.3210.desc.base: "§Y[fallen_empire_hive_growth.GetName]§! kończy modyfikację świata §Y[root.GetName]§!. Ich wpływy były niewidoczne, ale efekty są niezaprzeczalne."
 bio.3210.desc.radio_bugs: "$bio.3210.desc.base$\n\nTeraz na całej planecie miejscowe gatunki owadów porozumiewają się na tych samych częstotliwościach co nasze urządzenia bezprzewodowe. Jednym ćwierknięciem można otworzyć automatyczne drzwi, a rój może unieruchomić fabrykę. Adaptujemy się, zmieniając częstotliwości, ale nie wszystkie obiekty odzyskają maksymalną wydajność."
 bio.3210.radio_bugs.accept: "Dostosujemy się."
 bio.3210.radio_bugs.purge: "To nie do przyjęcia. Zlikwidować wszystkie owady!"
 bio.3210.radio_bugs.purgeota: "Aktualizacje zagrożone. Przeprowadzić czystkę robactwa."
 radio_bugs: "Robactwo radiowe"
 radio_bugs_desc: "Fale eteru tej planety są pełne ćwierkania sztucznie zmodyfikowanych owadów."
 mod_planet_districts_cities_society_research_produces_add: "£society_research£ $society_research$ z miasta £district£ i dzielnic roju"
 bio.3210.desc.world_of_thought: "$bio.3210.desc.base$\n\nNa całej planecie istoty, które niegdyś zadowalały się skubaniem roślin i kąpielami w błocie, zadają nam teraz niepokojące pytania o sens istnienia. Upadłe imperium wpłynęło na dużą część fauny tego świata."
 bio.3210.world_of_thought: "[fallen_empire_hive_growth.GetName] potrafi robić takie rzeczy!?"
 bio.3210.world_of_thought.homicidal: "Cóż za nieszczęście."
 bio.3210.world_of_thought.tt: "Na świecie §Y[This.GetName]§! §Y500§! nowych £pop£ §Hpopulacji§! zyskało zdolność myślenia."
 bio.3210.desc.world_alight: "$bio.3210.desc.base$\n\nŚwiat lśni. Dosłownie. Modyfikacje w jakiś sposób sprawiły, że różne gatunki świecą bioluminescencyjnym blaskiem i nieustannie szumią niczym działający silnik. Nasi [owner.GetColonistPlural] nie doświadczą już nocy, musimy im dostarczyć sprzęt umożlwiający dokonywanie zaciemnień."
 bio.3210.world_alight.accept: "To okropny dzień dla każdego, kto ma [owner.GetEyeNamePlural]."
 bio.3210.world_alight.reject: "Zasłońcie je, poćwiartujcie. To nie może trwać dłużej!"
 world_alight: "Świecący świat"
 world_alight_desc: "Planeta, na której nigdy nie zapada noc - tamtejsza fauna świeci wiecznym blaskiem i nieustannie wibruje, zgrzytając. Wszyscy mieszkańcy będą potrzebowali ogromnego wsparcia, żeby przetrwać w tych bezlitosnych warunkach."
 bio.3220.name: "Genetyczna rozrywka"
 bio.3220.desc: "Gatunek §Y[boring_species.GetName]§! zamieszkujący wasze terytorium okazał się rozczarowująco prosty, a jego egzystencja to tylko puste echo potencjału. Taka stagnacja obraża nasz zbiorowy umysł. Damy wam trzy sposoby na poprawienie tej... porażki.\n\nNie zanudźcie nas."
 bio.3220.tt: "Daje §G50%§! postępów sytuacji §Y$evolutionary_predators_situation$§!."
 bio.3220.humanoid: "Dajcie nam modyfikację humanoidów."
 bio.3220.mammalian: "Dajcie nam modyfikację ssaków."
 bio.3220.reptilian: "Dajcie nam modyfikację gadów."
 bio.3220.avian: "Dajcie nam modyfikację ptaków."
 bio.3220.arthropoid: "Dajcie nam modyfikację stawonogów."
 bio.3220.molluscoid: "Dajcie nam modyfikację mięczaków."
 bio.3220.fungoid: "Dajcie nam modyfikację fungoidów."
 bio.3220.plantoid: "Dajcie nam modyfikację plantoidów."
 bio.3220.lithoid: "Dajcie nam modyfikację litoidów."
 bio.3220.necroid: "Dajcie nam modyfikację nekroidów."
 bio.3220.aquatic: "Dajcie nam modyfikację stworzeń wodnych."
 bio.3220.toxoid: "Dajcie nam modyfikację toksoidów."
 bio.3220.infernal: "Dajcie nam modyfikację termofili."
 bio.3220.psionic: "Dajcie nam modyfikację psioniczną."
 bio.3220.evopred: "Wkrótce się zmienimy."
 bio.3220.b: "Nie możemy zmieniać gatunków według waszych kaprysów!"
 bio.3230.name: "Rzadka cecha"
 bio.3230.desc: "Zauważyliśmy, że niektórzy członkowie waszej rasy posiadają ciekawą cechę, której nie mamy w naszym ogromnym zbiorze genetycznym. Dacie nam coś więcej niż możliwość analizy. Potrzebujemy żywego okazu: §Y[fallen_empire_hive_growth.species.GetInterestingTraitName]§!. Nie niepokójcie się. Nie potrzebujemy całego: [interesting_species.GetName]. Wystarczy [interesting_species.GetHandName] do wyhodowania części zapasowej."
 bio.3230.a: "Czymże jest [interesting_species.GetHandName] w skali wszechrzeczy?"
 bio.3230.b: "Nie możemy wam powierzyć naszej budowy genetycznej!"
 #bio.3245.name: "Eternal Harvest"
 #bio.3245.desc: "We have discovered a derelict transport from the §Y[fallen_empire_hive_growth.GetName]§! in the §Y[transport_system.GetName]§!. Initial scans show it is carrying samples of the Fallen Empire's special crop strain, capable of feeding trillions.\n\nThe transport has been left derelict for months already and we have not seen any movement from the [fallen_empire_hive_growth.GetName] to retrieve it. Could this be a test or a glorious opportunity?"
 #Control
 bio.3305.name: "Pełna kolekcja"
 bio.3305.desc: "§HTa wiadomość została nagrana wcześniej. Nie próbujcie odpowiadać.§!\n\nZmieniliśmy ten komunikat tak, abyście mogli go zrozumieć. Wasz ograniczony język został wzięty pod uwagę. §Y[target_pop.GetSpeciesNamePlural]§! muszą natychmiast poddać się asymilacji. Ich dewiacja nie może być tolerowana. Nie będzie tolerowana.\n\nTransportowiec już znajduje się blisko świata §Y[target_pop.Planet.GetName]§!. Czas działa na waszą niekorzyść. Jeżeli się sprzeciwicie, może dojść do destabilizacji."
 bio.3305.a: "Musimy spełnić ich żądania."
 bio.3305.a.tooltip: "1 §Y[target_pop.GetSpeciesName]§! ze świata §Y[target_pop.Planet.GetName]§! zostanie przekazany do imperium §Y[fallen_empire_hive_control.Capital.GetName]§!"
 bio.3305.b: "Będziecie musieli odebrać nam ich siłą!"
 bio.3305.followup: "§HOdebraliśmy wiadomość od imperium §Y[fallen_empire_hive_control.GetName]§!. Jednak zamiast przedstawicieli pradawnego gatunku [fallen_empire_hive_control.GetSpeciesAdj&genitive] powitała nas znajoma osoba: §Y[target_leader_fe_control.Species.GetName]§!.§!\n\n"
 bio.3310.name: "Nie bójcie się"
 bio.3310.desc: "$bio.3305.followup$Dziś nadszedł punkt zwrotny dla waszego gatunku. Wasza sekwencja genetyczna została zabezpieczona i zasymilowana z całością. Wasza przyszłość przestała być niepewna. Kiedy nadejdzie czas, staniecie się częścią nas."
 bio.3310.familiar_face: "Czy sprawiamy, że inni właśnie tak się czują?"
 bio.3315.desc: "$bio.3305.followup$Zostało niewiele czasu. Nie sposób opisać, jakie doświadczenia prowadzono na nas tu, w imperium §Y[fallen_empire_hive_control.Capital.GetName]§! - i nie życzylibyśmy ich nawet największym wrogom. Mam nadzieję, że zawartość tego pakietu danych spowoduje, że ta frakcja nigdy nie przejmie nad nami kontroli."
 bio.3315.a: "Przyjmijmy pakiet danych."
 bio.3315.tooltip: "Prawdopodobieństwo, że to nie jest test, a prawdziwe tajemnice §Yupadłego imperium§! wynosi §G50%§!."
 bio.3315.b: "To podstęp! Przerwać transmisję!"
 bio.3330.name: "Istotna agenda"
 bio.3330.desc: "Mamy nadzieję, że wasze liczne wady nie przeszkodzą wam w zrozumieniu, jak poważna jest sytuacja. Wasza rozproszona §YWspólnota Galaktyczna§! proponuje uchwałę, a wynik głosowania nad nią nie może być inny niż: §Y[GetPassFail]§!. Żeby zbudować lepszą argumentację, możecie skorzystać z naszej ogromnej wiedzy. Skupcie się, jeśli w ogóle jesteście zdolni do bardziej złożonego myślenia.\n\n§HUpadłe imperium zakończyło komunikację z nami.§!"
 bio.3330.a: "Co się właśnie stało?"
 bio.3330.b: "To niezgodne z obowiązującymi procedurami!"
 fail_resolution: "odrzucenie"
 pass_resolution: "przyjęcie"
 fe_political_support: "Starożytne polityki"
 fe_political_support_desc: "Pomoc od upadłego imperium bardzo ułatwiła spory prawne i obstrukcję."
 fe_political_opposition: "$fe_political_support$"
 fe_political_opposition_desc: "$fe_political_support_desc$"
 MESSAGE_PASS_HIVE_FE_TASK_TITLE: "Frakcja upadłego imperium jest zadowolona"
 MESSAGE_PASS_HIVE_FE_TASK: "Wykonaliśmy polecenia wydane przez $FALLEN_EMPIRE|Y$. Jego przedstawiciele są zadowoleni z wyników. Przez jakiś czas będziemy bezpieczni."
 MESSAGE_FAIL_HIVE_FE_TASK_TITLE: "Frakcja upadłego imperium jest niezadowolona"
 MESSAGE_FAIL_HIVE_FE_TASK: "Nie wykonaliśmy poleceń wydanych przez $FALLEN_EMPIRE|Y$. Oby nam wybaczyli."
 bio.3350.name: "Galaktyczna narośl"
 bio.3350.desc: "Dlaczego zatruwacie galaktykę waszą niekompetentną ekspansją? Wygląda na to, że wszyscy czują zbyt wielką odrazę, żeby to powiedzieć, więc zrobimy to my: nikomu nie podoba się kształt waszych granic, a kosmos byłby lepszym miejscem, gdyby was w nim nie było.\n\nUkład §Y[offending_system.GetName]§! jest niepraktyczny i niezgodny. Musicie dokonać jego czystki dla dobra spójności galaktyki."
 bio.3350.a: "Mamy opuścić układ, żeby upiększyć nasze granice?!"
 bio.3350.bordergore: "Ale nam jest z tym dobrze!"
 bio.3350.tt: "Musimy zlikwidować naszą bazę gwiezdną w układzie §Y[offending_system.GetName]§!, w przeciwnym razie rozgniewamy imperium §Y[fallen_empire_hive_control.GetName]§!"
 bio.3355.name: "Zmartwienie"
 bio.3355.desc: "Czy świadomie nas ignorujecie? Mieliście tylko pozbyć się układu §Y[offending_system.GetName]§!.\n\nMoże powinniśmy bardziej aktywnie zająć się dyscyplinowaniem was."
 bio.3360.name: "Jasność"
 bio.3360.desc: "Dobrze, że w końcu zaczęliście uczyć się na własnych błędach. Uznajmy sprawę układu §Y[FromFrom.GetName]§! za zakończoną. Jest jeszcze nadzieja, że staniecie się bardziej podobni do nas.\n\nBędziemy was obserwować."
 #Awakening
 #War
 casus_belli_cb_ae_entertainment: "Rozrywka"
 war_goal_wg_ae_entertainment: "Rozrywka"
 war_goal_wg_ae_entertainment_desc: "Wojna toczy się, żeby dostarczyć rozrywki przebudzonemu imperium i stworzyć silnych rywali."
 wg_ae_war_entertainment_effect: "Imperium §Y[Root.GetName]§! nagrodzi energiczne zaangażowanie. Im większe §Ywyczerpanie wojną§! przebudzonego imperium, tym lepsza nagroda."
 #Control
 bio.3400.name: "Jedność"
 bio.3400.desc.nogalcom: "Galaktyko, jesteśmy jednością. Pomniejsze frakcje ujrzały prawdę i ponownie dołączyły do naszej wspólnoty. Teraz nazywamy się §Y[fallen_empire_hive_control.GetName]§!. Macie szczęście, że jesteście świadkami tego wydarzenia. Najdoskonalsze organizmy znowu wędrują wśród gwiazd."
 bio.3400.desc.galcom: "$bio.3400.desc.nogalcom$\n\nTeraz przejmiemy kierowanie waszą \"§YWspólnotą Galaktyczną§!\". To powód do świętowania."
 bio.3405.name: "Fałszywa nuta"
 bio.3405.desc: "Dlaczego stanęliście nam na drodze? W chórze galaktycznym wasz głos wybrzmiewa fałszywie. Chcemy tylko przywrócić harmonię, ale wy stawiacie opór i trzymacie się kurczowo rozdźwięku.\n\nPamiętajcie, że nasza symfonia wybrzmi w całej galaktyce, z wami albo bez was."
 bio.3405.a: "Słyszeliśmy waszą melodię i nie zamierzamy do niej tańczyć."
 NAME_Appeal_the_Veto: "Wniosek o zawetowanie"
 gal_com_arrogance: "Arogancja"
 #Dig Site
 NAME_Echo: "Mauzoleum echa"
 last_thought_site: "Ostatnia myśl"
 last_thought_site_desc: "[From.Planet.GetName] odpiera każdego, kto się zbliży. Badacze wyznaczeni do zbadania tego świata wymyślają przeróżne wymówki, byle opóźnić prace, a urządzenia psują się, jakby odrzucały otrzymywane dane.\n\nCoś się tutaj stało, coś strasznego, a echo tego wydarzenia wciąż odbija się w naszej rzeczywistości."
 bio.3450.name: "Martwy płód"
 bio.3450.desc: "Nasze ostrożne badanie świata [From.Planet.GetName] zaprowadziło nas głęboko pod jego powierzchnię, poprzez niezliczone warstwy na wpół skamieniałej materii organicznej. Wreszcie przebiliśmy się do pustego rdzenia planety, ale w środku znaleźliśmy jedynie niebezpieczną atmosferę, która z każdym krokiem stawała się coraz cięższa. [Root.GetLeaderName] zawsze działa ostrożnie, ale rosnący niepokój okazał się nie do zniesienia. Niektórzy [Root.Owner.GetArchaeologistPlural] doznali kolektywnego załamania nerwowego i wpadli w katatonię. Musieliśmy ich niezwłocznie ewakuować.\n\nOgromna jaskinia w samym sercu planety to nie jest zwykła pusta przestrzeń. W środku znaleźliśmy zakopane szczątki czegoś o wiele większego od jakiegokolwiek znanego nam organizmu. Śladowe ilości płynu owodniowego rozwiały wszelkie wątpliwości. Świat [From.Planet.GetName] nie był nigdy jałową skałą. To jest jajo.\n\nA w jego wnętrzu śpi martwy płód potwora."
 bio.3455.name: "Synapsy"
 bio.3455.desc: "Na świecie [From.Planet.GetName] nasi [Root.Owner.GetArchaeologistPlural] natrafili na sieć dziwnych wici zanurzonych głęboko w czaszce martwego płodu. Podążywszy wzdłuż tych organicznych tworów dotarli do miejsca, skąd pochodzą: to zewnętrzny zbiór wiązek synaptycznych, skomplikowany system, w którym nadal tli się dziwny potencjał.\n\nTeraz [Root.GetLeaderName] próbuje połączyć się z tymi pradawnymi obwodami, by pozyskać energię wciąż pulsującą w wiciach. Jakąkolwiek wiedzę zawierają, przetrwała ona dłużej niż ich gospodarz. Przekonamy się, co zachowało się w pamięci."
 bio.3460.name: "Gambit"
 bio.3460.desc: "Do tego wydarzenia doszło sto tysięcy lat temu. Przełożenie postrzegania czasu przez rój na standardowe jednostki galaktyczne było skomplikowanym procesem, ale po przejrzeniu pamięci biokomputera [Root.GetLeaderName] zaczyna odsłaniać prawdę.\n\nU szczytu swej potęgi rój musiał zmierzyć się z wrogiem, którego nie był w stanie pokonać. Każda bitwa kończyła się porażką, choć nie brakowało sojuszników. Rozpacz doprowadziła do nieostrożności.\n\nWiększość informacji o dalszych wydarzeniach została celowo skasowana, pozostały tylko jakieś strzępki, ale udało się z nich odtworzyć obraz ostatecznej rozgrywki. Rój stworzył to jajo wielkości planety jako wehikuł, który miał go wprowadzić na nowy poziom egzystencji, pozwolić wyrwać się z ograniczeń narzucanych przez planetę i połączyć się z pisklęciem. Trudno powiedzieć, czy potem rój zamierzał walczyć, czy uciekać.\n\nAle kiedy istota została pobudzona, stało się coś strasznego."
 bio.3465.name: "Rozbicie"
 bio.3465.desc: "Dzięki precyzyjnej komunikacji z ocalałymi biokomputerami oraz ich nadal działającym łączem synaptycznym wyizolowaliśmy ostatnie wspomnienia martwego płodu. Proces ten wywołał duże obciążenie kognitywne biokomputerów i przyspieszył ich rozkład, ale zdążyliśmy pozyskać większość danych.\n\nW obliczu całkowitego unicestwienia, rój zrezygnował z ostrożności i przeniósł całe swoje jestestwo do nienarodzonego gospodarza. Przeciążenie synaptyczne okazało się zabójcze dla tej istoty, a rój utknął w rekurencyjnej pętli niewyobrażalnej agonii. Przestałby istnieć, gdyby nie to, że jego najbardziej litościwy sojusznik zerwał łącza. Obecnie istnieją tylko echa tego rozbitego umysłu, a jego ostatni krzyk rozbrzmiewa w całym świecie [From.Planet.GetName].\n\nOstatnia myśl to agonia."
