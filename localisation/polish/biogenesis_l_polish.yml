 #Mutation
 auth_mutation_habitability_tt: "Gatunki organiczne mogą osiągnąć §G175%§! bazowej możliwości zamieszkania"
 auth_bio_democratic_mutation: "Bioróżnorodna wolność"
 auth_bio_democratic_mutation_desc: "To społeczeństwo wierzy w zasadę, że ciało każdej osoby jest świątynią, nad którą sprawuje ona pełną kontrolę. W ramach wolności oraz niezachwianego wsparcia obywatele mogą realizować swój wyjątkowy potencjał i wedle własnej woli kształtować siebie i swój potencjał."
 auth_bio_oligarchic_mutation: "Katalityczne dowodzenie"
 auth_bio_oligarchic_mutation_desc: "Władzę sprawują elity posiadające najdoskonalsze mutacje genetyczne, dzięki którym cieszą się niezrównanym autorytetem. Te osoby, działając poza ramami zwykłego prawa, korzystają ze swych zdolności, aby chronić społeczeństwo oraz wskazywać mu drogę. Robią wszystko, żeby zapewnić mu przetrwanie i dobrobyt."
 auth_bio_dictatorial_mutation: "Mandat hybrydowy"
 auth_bio_dictatorial_mutation_desc: "To społeczeństwo uznaje mutację za fundament własnego rozwoju. Osoby pragnące pozostać takimi, jakimi stworzyła je natura, są internowane lub likwidowane, dzięki czemu tylko jednostki najdoskonalsze genetycznie mają wkład w nieustanne dążenie tego gatunku do doskonałości."
 auth_bio_dictatorial_mutation_tt: "\n£crime£ Przestępczość od [enforcer.GetIcon] [enforcer.GetName]: §G-5§!\n$auth_mutation_habitability_tt$"
 auth_bio_imperial_mutation: "Ekspansjonizm genomowy"
 auth_bio_imperial_mutation_desc: "Wykorzystując nieprzewidywalną moc losowych mutacji, to imperium posiada niewyobrażalny potencjał oraz wspiera innowacje i zdolności, do których nie dałoby się dotrzeć tradycyjnymi metodami. W wyścigu o dominację, chaos mutacji to ich największa przewaga, dzięki której sięgają po niewyobrażalną władzę."
 auth_bio_corporate_mutation: "Finansowanie organów"
 auth_bio_corporate_mutation_desc: "Pod tą władzą wszyscy mają dostęp do elastycznych planów finansowania organów i części ciała. Niepłacenie rat skutkuje szybkim odebraniem przedmiotu kredytowania albo przejęciem uzgodnionego zastawu. Ten system gwarantuje płynne działanie cyklu podaży i popytu, w którym każda część ciała jest jednocześnie towarem oraz zobowiązaniem."
 auth_bio_corporate_mutation_tt: "$organic_leaders_have_trade_upkeep$\n$r_trade$ za: $pop_group_unit$ £pop£ pop. ze źródła: ['trait:trait_spare_organs']: §G+0,5§!\n$auth_mutation_habitability_tt$"
 auth_bio_democratic_evopred: "Elektorat genetyczny"
 auth_bio_democratic_evopred_desc: "Choć trudno nim zarządzać, to społeczeństwo uzyskało częściową kontrolę nad swoim elastycznym genomem. Obywatele decydują, jak mają działać ich mutacje."
 auth_bio_democratic_evopred_tt: "$auth_bio_evopred_tt$\nDodaje ['concept_genetic_electorate_effect', efekt elektoratu genetycznego] do: ['trait:trait_malleable_genes']. Zależy to od tego, która ['concept_faction'] jest najsilniejsza\nZwiększenie postępu ['concept_adaptive_evolution', ewolucji adaptacyjnej] przez obce §Ygatunki§!, które są niewolnikami lub mają wyższy standard: §G+100%§!"
 auth_bio_oligarchic_evopred: "Biomagnaci"
 auth_bio_oligarchic_evopred_desc: "Temu społeczeństwu udało się pokonać czas. Skwapliwie dobierając tylko najczystszy inwentarz genetyczny, elity władzy stały się nieśmiertelne. Jednak jeden niewłaściwy krok może zaprzepaścić życie wieczne, a dla osób z niższych klas ambicja i ewolucja to dwie strony tego samego medalu..."
 auth_bio_oligarchic_evopred_tt: "$auth_bio_evopred_tt$\nDoradcy są §Ynieśmiertelni§!."
 auth_bio_dictatorial_evopred: "Największy pryncypat"
 auth_bio_dictatorial_evopred_desc: "Cywilizacja stworzona dzięki nieustannej ewolucji, rządzona przez nadrzędny, największy umysł. Żadna rada ani konstytucja nie może być ważniejsza od dominującej woli pryncypatu. Tutaj każde zwycięstwo genetyczne pomaga wstąpić na tron."
 auth_bio_dictatorial_evopred_tt: "$auth_bio_evopred_tt$\nCecha władcy: ['leader_trait:trait_ruler_apex_predator']"
 apex_predator_male: "$trait_ruler_apex_predator$"
 apex_predator_female: "$trait_ruler_apex_predator$"
 auth_bio_imperial_evopred: "Nieśmiertelna dynastia"
 auth_bio_imperial_evopred_desc: "$auth_bio_imperial_evopred$: Przeszłość nie odchodzi, lecz jest konsumowana. Każde pokolenie staje się pokarmem następnego, a szczątki zmarłych przywódców podtrzymują nieśmiertelne rządy imperium. Służba to ofiara, a po śmierci wszyscy poddani zasilają dziedzictwo swoich przodków."
 eternal_ancestor_male: "$eternal_ancestor_female$"
 eternal_ancestor_female: "Wieczny przodek"
 auth_bio_imperial_evopred_tt: "$auth_bio_evopred_tt$\nPozwala władcy konsumować zmarłych wielkich przywódców."
 auth_bio_corporate_evopred: "BioPredation GLC" #Galactic Limited Incorporated
 auth_bio_corporate_evopred_desc: "BioPredation GLC rozwija się dzięki adaptacji, zarówno ekonomicznej, jak i genetycznej. Każdy nowy genom dodany do portfolio tej megakorporacji umacnia jej pozycję rynkową, pozwala dostosować produkty i taktykę negocjacyjną do wyjątkowej biologii każdego gatunku. Przecież zrozumienie natury klienta sprawia, że dobicie targu osiąga się praktycznie... instynktownie."
 auth_bio_corporate_evopred_tt: "$auth_bio_evopred_tt$\n$organic_leaders_have_trade_upkeep$\nSkuteczność traktatu handlowego na cechę gatunkową: §G+1%§!\nZwiększa postęp: ['concept_adaptive_evolution'] od §Ytraktatów handlowych§! o §G+100%§!"
 auth_bio_hive_mind_evopred: "Chimeryczna świadomość"
 auth_bio_hive_mind_evopred_desc: "Ten umysł zbiorowy ma już dość prostej autotransformacji. Każda nowa kolonia może stać się częścią jego żywego kalejdoskopu w ciągle zmieniającej się mieszance krajobrazu i ciała. Kiedy granice znikają w chimerycznej świadomości, stworzenia i światy stają się jednością."
 auth_bio_hive_mind_evopred_tt: "$auth_bio_evopred_tt$\nAutomatycznie terraformuje kolonie w §Yświaty roju§!\nZwiększa postępy ['concept_adaptive_evolution', ewolucji adaptacyjnej] wynikające z czystek obcych §Ygatunków§! o §G100%§!"
 auth_bio_evopred_tt: "$EMPIRE_SIZE$ dzięki populacjom za każdą cechę gatunkową: §G-1%§!\n$auth_mutation_habitability_tt$"
 #Hive Advanced Authorities
 auth_bio_hive_purity: "Paradygmat czystości"
 auth_bio_hive_purity_desc: "Rój rozkwita dzięki niesłabnącej czystości genetycznej, każdy klon jest zgodny z idealnym szablonem biologicznym. Precyzyjna manipulacja genetyczna umacnia jedność i zwiększa siłę wspólnoty, dzięki czemu powstaje niepowstrzymana siła przystosowana do wydajności i przetrwania."
