 bio.40.name: "Osobliwość biologiczna" #FINAL STAGE - TRADITION TREE CHOICE
 bio.40.desc: "Niezależnie od tego, czy dążymy do osiągnięcia najczystszej formy, sukcesu dzięki klonowaniu czy modyfikacji genetycznej poprzez celowe mutacje, ta chwila to punkt, z którego nie ma już powrotu."
 bio.40.desc.evopred: "$bio.20.desc.evopred$"
 bio.40.a: "$bio.20.a$"
 bio.40.b: "$bio.20.b$"
 bio.40.c: "$bio.20.c$"
 #Random Events (Hives)
 bio.110.name: "Podział pracy"
 bio.110.desc: "Skoro [target.GetGestaltEntityName] rozpoczyna dzięki nam przyspieszenie biologiczne, musimy postawić tylko na te ulepszenia, na których nasza cywilizacja skorzysta najbardziej.\n\nSelektywna manipulacja genetyczna pozwala nam tworzyć specjalistów o pożądanych cechach fizycznych, którzy najlepiej sprawdzą się w określonych branżach.\n\nDzięki tym nowym zdolnościom możemy zmodyfikować drony pracujące przy wytwarzaniu energii lub w sektorze obronnym."
 bio.110.a: "Energia zawsze się przyda."
 bio.110.b: "Powinniśmy postawić na obronę."
 bio.115.name: "Redundancja pokoleniowa"
 bio.115.desc: "Wprowadzając nowy wzór biologiczny dla naszych dronów, musimy zdecydować, co zrobimy z osobnikami, które nie są kompatybilne z tym ulepszeniem genetycznym.\n\nNiektóre starsze drony są zbyt słabe, żeby wytrzymać takie zmiany. Możemy zatrzymać je jako siłę roboczą do końca ich życia albo przerobić na biomaterię, która uzupełni zasoby roju."
 bio.115.a: "Dokonajmy przetworzenia starych dronów."
 bio.115.b: "Nadal są przydatne."
 bio.120.name: "Szybkość albo wytrzymałość"
 bio.120.desc: "W przełomowych badaniach genetycznych odkryto sposób na zwiększenie wydajności przekaźników neuronowych, dzięki czemu [target.GetIndividualName] uzyskają znacznie większą produktywność.\n\nJednak takie zwiększenie potencjału mózgu nie może trwać długo, tym samym prowadzi do skrócenia życia.\n\nMusimy postanowić, czy chcemy zachować naszą długość życia, czy też zwiększyć wydajność kosztem długowieczności."
 bio.120.a: "Niech priorytetem zostanie zachowanie obecnej długości życia."
 bio.120.b: "Podkręćmy [target.GetIndividualNamePlural] i zwiększmy produktywność."
 bio.125.name: "Przeciążenie synaptyczne"
 bio.125.desc: "Świeżo zmodyfikowane [target.GetIndividualNamePlural] i [target.GetGestaltEntityName] są już po integracji - dzięki inżynierii biologicznej przyspieszono ich rozwój neurologiczny i procesy kognitywne. Kluczowe węzły synaptyczne, które posiada [target.GetGestaltEntityName] działają teraz z niesamowitą szybkością.\n\nJednak przez to przyspieszenie [target.GetIndividualName] mają mniejszą stabilność, co może prowadzić do katastrofalnego przeciążenia synaptycznego. Możemy też zlecić więcej zadań koordynacyjnych, którymi zajmą się [target.GetIndividualNamePlural]."
 bio.125.a: "Zwolnijmy tempo i zachowajmy stabilność."
 bio.125.b: "Żyj szybko i płoń jasnym światłem."
 bio.130.name: "Zjawiska częstotliwości"
 bio.130.desc: "Od czasu integracji z rojem nowej partii klonów odnotowujemy nieprzyjemne problemy audiowibracyjne. Błąd w procesie klonowania mógł upośledzić rozwój ich transmiterów biologicznych, co doprowadziło do zakłóceń częstotliwości.\n\nKiedy te klony komunikują się z resztą roju, wszystkie pobliskie drony słyszą w umysłach głośne i niepokojące dzwonienie. Powoduje ono dekoncentrację, co może doprowadzić do obniżenia produktywności."
 bio.130.a: "To nieprzyjemne, ale do zniesienia."
 bio.130.b: "Zlikwidujcie kłopotliwe drony."
 bio.135.name: "Ruchomy problem"
 bio.135.desc: "Niedawne eksperymenty na polu klonowania przyniosły niecodzienne wyniki. Wygląda na to, że niektóre klony są połączone neurologicznie ze swoimi dawcami genów, co powoduje, że mimowolnie poruszają się one w tandemie.\n\nTo zjawisko występuje niezależnie od odległości, pojedyncze drony naśladują działania swoich odpowiedników przebywających w innym rejonie galaktyki. Otwiera to wiele ciekawych możliwości.\n\nMożemy wdrożyć inicjatywę polegającą na połączeniu dronów i dawców w tandemy pracujące w identycznych środowiskach. Inny pomysł to ekstrakcja neuroprzekaźników w celu dokładniejszego zbadania tego zjawiska."
 bio.135.a: "Przygotujmy identyczne stanowiska pracy dla klonów i dawców."
 bio.135.b: "Przerwijmy chirurgicznie te synchroniczne połączenia."
 bio.140.name: "Niekompatybilne klony"
 bio.140.desc: "Dążąc do wzmocnienia roju, stworzyliśmy partię klonów w oparciu o materiał genetyczny dawców i sztucznie przyspieszyliśmy ich rozwój. To dobre okazy biologiczne, jednak są niekompatybilne.\n\nTen błąd, choć problematyczny, daje nam wyjątkową okazję. Te wyodrębnione drony posiadają teraz pojedyncze tożsamości i myślą niezależnie, więc mogą lepiej współdziałać z istotami pochodzącymi spoza kolektywu. Ich zdolność do autonomicznego myślenia może wypełnić luki, z którymi słabo radzi sobie jednorodny głos roju. Jednak te korzyści mają swoją cenę: budząca się w tych osobnikach świadomość indywidualności prowadzi do niepokoju, co wpływa część naszych wyższych funkcji kognitywnych."
 bio.140.a: "Wymuśmy integrację."
 bio.140.b: "Wykorzystajmy ich potencjał."
 bio.145.name: "Obawy związane z tworzeniem"
 bio.145.desc: "Nasza świadomość zbiorowa jest zaniepokojona. Posiedliśmy zdolność tworzenia kopii nas samych, ale wahamy się, wątpimy w skuteczność (a nawet moralność) takich działań.\n\nProcesy klonowania wymagają dużych ilości zasobów. Może lepiej zainwestować je gdzie indziej, szczególnie że naturalna prokreacja może tworzyć większą różnorodność genetyczną?\n\nW przeszłości nie rozmnażaliśmy się w taki sposób i nie mamy pewności, czy jesteśmy gotowi na taką fundamentalną przemianę naszego gatunku."
 bio.145.a: "Nie możemy ignorować wydajności klonowania."
 bio.145.b: "Różnorodność genetyczna ma kluczowe znaczenie."
 bio.150.name: "Wypalenie roju"
 bio.150.desc: "Nasze eksperymenty z mutacjami doprowadziły do pewnych zaburzeń w roju. Zadania, które niegdyś realizowano z łatwością, teraz wymagają świadomego wysiłku, ponieważ sprzeczne dyrektywy przeciążają umysł zbiorowy.\n\nSpowodowane tym zmęczenie może doprowadzić do wypalenia naszych najbardziej wydajnych dronów, ale to także okazja.\n\nPowinniśmy zdecydować, czy zatrzymamy się, aby odzyskać siły, czy też spróbujemy przełamać własne ograniczenia?"
 bio.150.a: "Zasłużyliśmy na odpoczynek."
 bio.150.b: "Odpoczniemy, gdy umrzemy."
 bio.151.name: "Odświeżeni i odnowieni"
 bio.151.desc: "Nasza decyzja o odpoczynku przyniosła owoce. Wcześniejsze niepożądane impulsy ustały, połączyły się w harmonijny przepływ myśli, który teraz napędza kolektyw z nową przejrzystością.\n\nDrony, które kiedyś znajdowały się na skraju wypalenia, obecnie pracują z niezachwianą precyzją. Ten okres refleksji nie tylko zmniejszył zmęczenie naszego kolektywu, ale także umocnił nas przed kolejnymi wyzwaniami."
 bio.151.a: "Wręcz tryskamy energią!"
 bio.155.name: "Specjalizacja albo generalizacja"
 bio.155.desc: "Mutacje wiążą się z licznymi korzyściami, a dzięki selektywnym ulepszeniom możemy zaadaptować rój do wydajniejszego funkcjonowania. Specjalizację w produkcji minerałów można teraz uzyskać dzięki wzmocnionym, chitynowym kończynom.\n\nMoglibyśmy też ulepszyć wszystkie drony poprzez bardziej ogólne mutacje, które pozwolą realizować szeroki wachlarz działań."
 bio.155.a: "Uniwersalność jest bardziej przydatna."
 bio.155.b: "Zacznijmy kopać."
 bio.160.name: "Dryf fenotypowy"
 bio.160.desc: "Prowadzone doświadczenia doprowadziły do niespodziewanego zagmatwania sytuacji roju. Pojawiają się drony o wyjątkowych charakterystykach fizycznych: kolczastych egzoszkieletach, nienaturalnie dużych kończynach albo wyjątkowo czułych organach zmysłów.\n\nTe odchylenia niewątpliwie przynoszą korzyści, ale zwiększają obciążenie metaboliczne. Rój ma kłopoty z uzyskaniem równowagi u tej rozprzestrzeniającej się odmiany. Rodzi się pytanie: jaki zakres mutacji akceptujemy?"
 bio.160.a: "Postawmy na dynamikę."
 bio.160.b: "Trzeba zachować spójność."
 bio.165.name: "Tęsknota za przeszłością"
 bio.165.desc: "Rój przechodzi zmiany. Zauważyliśmy, że modyfikacje naszych genomów doprowadziły do wyraźnej poprawy stanu zdrowia. Jednak spadła nasza odporność na obciążenia psychologiczne.\n\nWcześniej akceptowaliśmy siebie, teraz, chociaż stajemy się silniejsi oraz bardziej rozwinięci kognitywnie, brakuje nam swojskości naszych dawnych schematów myślowych.\n\nW całym roju panuje niepokojące przeświadczenie, że nasze ciała nie pasują do naszej złożonej psychiki. Czyżbyśmy rozwinęli się ponad nasze możliwości?"
 bio.165.a: "Życie to zmiana."
 bio.165.b: "Nie możemy zatracić naszej natury."
