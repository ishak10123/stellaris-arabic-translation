 concept_genetic_purity_desc: "Władze, które przyjęły koncepcję ['tradition_category:tradition_purity'] mają skalowane efekty i modyfikatory, z których korzystają ich £pop£ §Hpopulacje organiczne§! oraz £leader£ §Hprzywódcy§!.$TABBED_NEW_LINE$- Zwiększane za pomocą punktów cech wydawanych na §Gpozytywne§! cechy gatunkowe.$TABBED_NEW_LINE$- Zmniejszane za pomocą punktów cech zyskanych dzięki §Rnegatywnym§! cechom gatunkowym."
 trait_leader_genetic_purist: "Purysta genetyczny"
 trait_leader_genetic_purist_desc: "Ten przywódca działa, kierując się niezachwianą wizją genetycznej doskonałości i nie toleruje żadnej postaci niedoskonałości."
 auth_bio_democratic_purity: "Autonomia fenotypowa"
 auth_bio_democratic_purity_tt: "$pop_effects_from_purity_header$ $TABBED_NEW_LINE$- £mod_pop_happiness£ $MOD_POP_HAPPINESS$: $plus_minus_icon$§Y$@purity_traits_happiness|1%$§! $DOUBLE_NEW_LINE$$authority_grants_genetic_purist_tt$ $TABBED_NEW_LINE$- $mod_leaders_upkeep_mult$ $minus_plus_icon$§Y2,5%§! $TABBED_NEW_LINE$- $MOD_LEADER_SPECIES_EXP_GAIN$ $plus_minus_icon$§Y2,5%§!"
 auth_bio_democratic_purity_desc: "Decydowanie o własnym ciele to prawo. Państwo pozwala jednostkom modyfikować ich skorupy. Ograniczeniem jest tylko wyobraźnia, a ciało staje się najlepszym płótnem malarskim."
 auth_bio_oligarchic_purity: "Hierarchia eugeniczna"
 auth_bio_oligarchic_purity_tt: "$eugenic_political_power_effects$"
 auth_bio_oligarchic_purity_desc: "Władzę absolutną należy powierzyć genetycznie przygotowanej elicie, najczystszym i najzdolniejszym jednostkom zarządzającym przeznaczeniem tej cywilizacji. Niżej od nich są obywatele pełniący wyznaczone role, skrojeni dokładnie pod ich potencjał genetyczny. Zadowolenie nie płynie z ambicji, ale z akceptacji celu istnienia."
 eugenic_political_power_effects: "$pop_effects_from_purity_header$ $TABBED_NEW_LINE$- $MOD_POP_BONUS_WORKFORCE_MULT$: $plus_minus_icon$§Y$@purity_traits_bonus_workforce_mult|2%$§! $DOUBLE_NEW_LINE$$authority_grants_genetic_purist_tt$ $TABBED_NEW_LINE$- $MOD_COUNCIL_AGENDA_PROGRESS_SPEED$: $plus_minus_icon$§Y$@purity_traits_council_speed|Y1%$§!"
 auth_bio_dictatorial_purity: "Nukleionowe sądownictwo"
 auth_bio_dictatorial_purity_tt: "$pop_effects_from_purity_header$ $TABBED_NEW_LINE$£society£ Badania socjologiczne wytworzone przez każde $pop_group_unit$ £pop£ populacji: $plus_minus_icon$§Y$@purity_traits_resource$§! $DOUBLE_NEW_LINE$$authority_grants_genetic_purist_tt$ $TABBED_NEW_LINE$- Planetarne $MOD_PLANET_CRIME_ADD$: $minus_plus_icon$§Y5,0§! $TABBED_NEW_LINE$- Sektor $MOD_PLANET_CRIME_ADD$: $minus_plus_icon$§Y2,5§! $TABBED_NEW_LINE$- Planetarne $MOD_PLANET_STABILITY_ADD$: $plus_minus_icon$§Y5,0§! $TABBED_NEW_LINE$- Sektor $MOD_PLANET_STABILITY_ADD$: $plus_minus_icon$§Y2,5§!"
 auth_bio_dictatorial_purity_desc: "Ten rząd posiada dane genetyczne i biometryczne wykorzystywane jako narzędzia wymiaru sprawiedliwości działającego z wyprzedzeniem - dokonuje się badań kodu genetycznego każdego obywatela pod kątem skłonności przestępczych. Interwencje przed popełnieniem przestępstw gwarantują porządek. Prawdziwy wymiar sprawiedliwości nie działa reaktywnie, tylko prewencyjnie, i chroni społeczeństwo poprzez usuwanie korzeni przestępczości."
 auth_bio_imperial_purity: "Królestwo biotyczne"
 auth_bio_imperial_purity_tt: "Efekty £leader£ §Y$imperial_ruler$§! i §Ydziedzic§! wynikające z ['concept_genetic_purity', czystości genetycznej]:$TABBED_NEW_LINE$- $MOD_LEADER_SKILL_ADD$: $plus_minus_icon$§Y$@purity_traits_imperial_level|2$§! $DOUBLE_NEW_LINE$£leader£ przywódcy §Ygatunku tego samego co [Ruler.GetTitle]§! zyskują cechę §Y$imperial_bloodline$§!\n£leader£ Efekty §Yrodu imperialnego§! z ['concept_genetic_purity', czystością genetyczną]: $TABBED_NEW_LINE$- $MOD_LEADER_LIFESPAN_MULT$: $plus_minus_icon$§Y$@purity_traits_imperial_bloodline|1%$§! $TABBED_NEW_LINE$- $MOD_LEADER_SPECIES_EXP_GAIN$: $plus_minus_icon$§Y$@purity_traits_imperial_bloodline|1%$§!"
 auth_bio_imperial_purity_desc: "Walcząc o doskonałość genetyczną, ten rząd przedłuża życia swoich przywódców, a jednocześnie dąży do perfekcji biotycznej. Dobrobyt społeczeństwa zależy od przetrwania i rozpowszechniania tylko najlepszych genów, które zapewnią przyszłą dominację. Nieustanny nadzór nad pulą genetyczną to gwarancja rozwoju, a ostatecznymi celami są długowieczność i doskonałość."
 auth_bio_corporate_purity: "Syndykat organiczny"
 auth_bio_corporate_purity_tt: "$organic_leaders_have_trade_upkeep$\n\n$pop_effects_from_purity_header$ $TABBED_NEW_LINE$- $r_trade$ wytworzony przez każde $pop_group_unit$ £pop£ pop.: $plus_minus_icon$§Y$@purity_traits_resource$§! $DOUBLE_NEW_LINE$"
 auth_bio_corporate_purity_desc: "Ta megakorporacja doszła do perfekcji w utowarowieniu życia, hodując organy dla zysku. Organy najwyższej jakości osiągają ogromne ceny, a \"nadmiarowe aktywa\" mogą trafić na czarny rynek. Szemrani pośrednicy i czarnorynkowi chirurdzy zarabiają krocie na obsługiwaniu zrozpaczonych klientów, dbając jednocześnie, żeby żadne aktywa się nie marnowały."
 #Cloning
 auth_bio_democratic_cloning: "Zgodna wielorakość"
 auth_bio_democratic_cloning_tt: "$ENABLES_BACKUP_CLONES$\n§Y$leader_trait_backup_clone_default$§! Utrzymanie: §G$@cordant_multiplicity_clone_upkeep|0%$§!\n§Y$leader_trait_backup_clone_default_plural$§! mają mniejszą ['concept_clone_leader_degradation', degradację] i nie mogą posiadać: §Y$leader_trait_has_backup_clone_plural$§!"
 auth_bio_democratic_cloning_desc: "Ten rząd uważa technologię klonowania za dowód równości i rozwoju. Klony stoją ramię w ramię z jednostkami urodzonymi naturalnie, głosy obu grup mają tę samą wartość. Wola ludu została ubogacona dzięki różnym perspektywom."
 auth_bio_oligarchic_cloning: "Kopiowanie regencji"
 auth_bio_oligarchic_cloning_tt: "$ENABLES_BACKUP_CLONES$\nCecha §Y$leader_trait_has_backup_clone$§! daje dodatkowe efekty członkom rady\n§Y$leader_trait_backup_clone_default_plural$§! mają mniejszą ['concept_clone_leader_degradation', degradację], gdy zasiadają w radzie\n"
 auth_bio_oligarchic_cloning_desc: "To społeczeństwo zapewnia swoim elitom wieczne rządy, dając władzę najdoskonalszym klonom. Technologia klonowania zachowuje i udoskonala ich dziedzictwo genetyczne, pozwalając na bezproblemową kontynuację przywództwa. Każde wpływowe stanowisko jest zajmowane przez ulepszone wcielenie tej samej, doskonałej linii, co utrzymuje jej dominację przez wiele pokoleń."
 auth_bio_dictatorial_cloning: "Jednolite podporządkowanie"
 auth_bio_dictatorial_cloning_tt: "$ENABLES_BACKUP_CLONES$\n$AVAILABLE_POLICIES$ §Y$policy_homogenous_class$§!"
 auth_bio_dictatorial_cloning_desc: "Absolutną lojalność zapewnia skrupulatna selekcja genetyczna, do klonowania wyznacza się tylko jednostki skłonne do niezachwianego posłuszeństwa. W ten sposób powstaje trwałe społeczeństwo, w którym bunt jest nie tylko nieprawdopodobny, ale wręcz biologicznie niemożliwy. Niezachwiana harmonia powstaje dzięki dokładnemu zaprojektowaniu obywateli."
 auth_bio_imperial_cloning: "Dziedziczna ciągłość"
 auth_bio_imperial_cloning_tt: "$ENABLES_BACKUP_CLONES$\nCecha §Y$leader_trait_backup_clone_imperial$§! nie może powiększać kar."
 auth_bio_imperial_cloning_desc: "Niekwestionowana prawowitość rządów władcy jest gwarantowana przez klonowanie - każde wcielenie wielkiego przywódcy dziedziczy mądrość i triumfy ze swoich wcześniejszych istnień. Ta niezakłócona ciągłość władzy zapewnia społeczeństwu ciągły rozwój i trwanie złotej ery."
 auth_bio_corporate_cloning: "Wspólnota replikacji"
 auth_bio_corporate_cloning_tt: "$organic_leaders_have_trade_upkeep$\n$ENABLES_BACKUP_CLONES$\n$mod_planet_jobs_trade_produces_mult$ ze źródła: £building£ ['building:building_clone_vats']: §G+$@replicatory_association_trade_mult|0%$§!\n£mod_planet_amenities_add£ Udogodnienia planetarne ze źródła: £building£ §Y$building_clone_vats$§!: §G+$@replicatory_association_amenities_add|0$§!\n$AVAILABLE_POLICIES$ §Y$policy_replicatory_association_insurance$§!"
 auth_bio_corporate_cloning_desc: "Bezprecedensowe udogodnienia i wygoda są w zasięgu ręki. Stwórz własnego klona jako źródło części zamiennych lub zamów replikę kogoś bliskiego. Ta megakorporacja gwarantuje 93% zgodności każdej kopii, dzięki połączeniu najnowocześniejszej technologii i obietnicy pociechy poprzez precyzyjną replikację."
 AUTHORITY_HAS_CLONE: "$t$Po §Yśmierci władcy§! §Y$leader_trait_backup_clone_imperial$§! zostaje nowym władcą. $TABBED_NEW_LINE$§Y$leader_trait_backup_clone_imperial_plural$§! mają mniejszą ['concept_clone_leader_degradation', degradację]."
 policy_replicatory_association_insurance: "Ubezpieczenie replikantów"
 policy_replicatory_association_insurance_desc: "Priorytetowy dostęp do klonów przyznaje się członkom rady nadzorczej i innym ważnym pracownikom jako część ich wynagrodzenia."
 replicatory_association_insurance_stellar: "Gwiezdne ubezpieczenie"
 replicatory_association_insurance_stellar_name: "$replicatory_association_insurance_stellar$"
 replicatory_association_insurance_stellar_desc: "$leader_upkeep_skill_header_energy$ §R+$@replicatory_association_insurance_upkeep|0$§!\n§Y$leader_trait_has_backup_clone_plural$§! §Yprzywódców§! mają mniejszą ['concept_clone_leader_degradation', degradację]"
 replicatory_association_insurance_platinium: "Platynowe ubezpieczenie"
 replicatory_association_insurance_platinium_name: "$replicatory_association_insurance_platinium$"
 replicatory_association_insurance_platinium_desc: "$councilor_upkeep_skill_header_energy$ §R+$@replicatory_association_insurance_upkeep|0$§!\n§Y$leader_trait_has_backup_clone_plural$§! §Yczłonków rady§! mają mniejszą ['concept_clone_leader_degradation', degradację]"
 replicatory_association_insurance_basic: "Podstawowe ubezpieczenie"
 replicatory_association_insurance_basic_name: "$replicatory_association_insurance_basic$"
 replicatory_association_insurance_basic_desc: "$ruler_upkeep_skill_header_energy$ §R+$@replicatory_association_insurance_upkeep|0$§!\n§Y$leader_trait_has_backup_clone_plural$§! §Ywładcy imperium§! mają mniejszą ['concept_clone_leader_degradation', degradację]"
 leader_upkeep_skill_header_energy: "Utrzymanie ($i_energy$) £leader£ przywódcy za każdy poziom umiejętności:"
 councilor_upkeep_skill_header_energy: "Utrzymanie ($i_energy$) £leader£ członka rady za każdy poziom umiejętności:"
 ruler_upkeep_skill_header_energy: "Utrzymanie ($i_energy$) £leader£ władcy za każdy poziom umiejętności:"
 policy_homogenous_class: "Modyfikowanie genomu"
 policy_homogenous_class_desc: "Ostrożne modyfikowanie podstawowego genomu używanego do podtrzymywania klonów naszych przywódców pozwala zoptymalizować wybraną kadrę."
 homogenous_class_scientists: "Kodeks naukowy"
 homogenous_class_scientists_name: "$homogenous_class_scientists$"
 homogenous_class_scientists_desc: "Efekty dla: §Y$leader_trait_has_backup_clone_plural$§! ($scientist_plural_with_icon$): $TABBED_NEW_LINE$- $society_upkeep_skill_header$ §R+$@homogenous_clone_upkeep|0$§! $TABBED_NEW_LINE$- Mają mniejszą ['concept_clone_leader_degradation', degradację]"
 homogenous_class_officials: "Archiwa administracyjne"
 homogenous_class_officials_name: "$homogenous_class_officials$"
 homogenous_class_officials_desc: "Efekty dla: §Y$leader_trait_has_backup_clone_plural$§! ($official_plural_with_icon$): $TABBED_NEW_LINE$- $society_upkeep_skill_header$ §R+$@homogenous_clone_upkeep|0$§! $TABBED_NEW_LINE$- Mają mniejszą ['concept_clone_leader_degradation', degradację]"
 homogenous_class_commanders: "Protokół bojowy"
 homogenous_class_commanders_name: "$homogenous_class_commanders$"
 homogenous_class_commanders_desc: "Efekty dla: §Y$leader_trait_has_backup_clone_plural$§! ($commander_plural_with_icon$): $TABBED_NEW_LINE$- $society_upkeep_skill_header$ §R+$@homogenous_clone_upkeep|0$§! $TABBED_NEW_LINE$- Mają mniejszą ['concept_clone_leader_degradation', degradację]"
