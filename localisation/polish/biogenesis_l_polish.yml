 #Species traits localized tags
 SPECIES_TRAIT_CATEGORY_HEADER: "§HKategorie cechy§!\nTa cecha należy do następujących kategorii:"
 SPECIES_TRAIT_HUMANOID: "['concept_humanoid_phenotype_traits']"
 SPECIES_TRAIT_MAMMALIAN: "['concept_mammalian_phenotype_traits']"
 SPECIES_TRAIT_REPTILIAN: "['concept_reptilian_phenotype_traits']"
 SPECIES_TRAIT_ARTHROPOID: "['concept_arthropoid_phenotype_traits']"
 SPECIES_TRAIT_AVIAN: "['concept_avian_phenotype_traits']"
 SPECIES_TRAIT_MOLLUSCOID: "['concept_molluscoid_phenotype_traits']"
 SPECIES_TRAIT_PLANTOID: "['concept_plantoid_phenotype_traits']"
 SPECIES_TRAIT_FUNGOID: "['concept_fungoid_phenotype_traits']"
 SPECIES_TRAIT_LITHOID: "['concept_lithoid_phenotype_traits']"
 SPECIES_TRAIT_NECROID: "['concept_necroid_phenotype_traits']"
 SPECIES_TRAIT_AQUATIC: "['concept_aquatic_phenotype_traits']"
 SPECIES_TRAIT_TOXOID: "['concept_toxoid_phenotype_traits']"
 SPECIES_TRAIT_INFERNAL: "['concept_infernal_phenotype_traits']"
 SPECIES_TRAIT_VOCATIONAL: "['concept_vocational_traits']"
 SPECIES_TRAIT_OVERTUNED: "['concept_overtuned_traits']"
 SPECIES_TRAIT_FLEETING_EXCELLENCE: "['concept_fleeting_excellence_traits']"
 SPECIES_TRAIT_CYBORG: "['concept_cybernetic_traits']"
 SPECIES_TRAIT_UNIVERSAL_AUGMENTATIONS: "['concept_universal_augmentations_traits']"
 SPECIES_TRAIT_ADAPTIVE_FRAMES: "['concept_adaptive_frames_traits']"
 trait_egg_laying: "Składanie jaj"
 trait_egg_laying_desc: "Młode osobniki tego gatunku nie rozwijają się wewnątrz ciała rodzica, ale w skorupie ochronnej jaja. Umożliwia to szybki rozwój w czasach dobrobytu."
 trait_egg_laying_effect: "Szybkość przyrostu populacji: §G+15%§!, zamieszkując planetę, gdzie występuje lokalna §Gnadwyżka produkcji§! ($r_food$ lub odpowiednik)"
 trait_egg_laying_portrait_override_tt: "Lub dowolny jajorodny gatunek"
 trait_seasonal_dormancy: "Hibernacja sezonowa"
 trait_seasonal_dormancy_desc: "Ten gatunek ewoluował na planecie, gdzie zmieniające się pory roku sprzyjają hibernacji. W dzisiejszych czasach te czynniki sezonowe można sztucznie wytwarzać, aby skutecznie przechowywać mniej produktywnych członków społeczeństwa."
 trait_seasonal_dormancy_effect: "Utrzymanie pracującej populacji: §G-15%§!\n    - Utrzymanie populacji niepracującej oraz ['concept_denizen', obywateli]: §G-75%§!"
 trait_seasonal_dormancy_portrait_override_tt: "Lub dowolny hibernujący gatunek"
 trait_hollow_bones: "Puste kości"
 trait_hollow_bones_desc: "Kruche kości tego gatunku ułatwiają jego przedstawicielom eleganckie poruszanie się. Jednak grawitacja ich świata silniej na nich oddziałuje."
 trait_hollow_bones_effect: "$BONUS_WORKFORCE_FOR$ $pop_cat_worker_plural$, $pop_cat_simple_drone_plural$ i miejsca pracy dla żołnierzy w zależności od wielkości planety: §R-0,67%§!"
 trait_rooted: "Zakorzenieni"
 trait_rooted_desc: "Ten gatunek dosłownie zapuszcza korzenie w każdym środowisku, w jakim się znajdzie. Usuwanie tych osobników to dla nich bardzo traumatyczne doświadczenie."
 AUTO_MIGRATE_ROOTED: "§RZakorzenione populacje nie mogą migrować.§!"
 trait_rooted_effect: "§RPopulacje nie będą automatycznie przesiedlane§!\n    -  Koszt przesiedlenia: §R+200%§!"
 trait_rooted_portrait_override_tt: "Lub dowolny zależny od konkretnego środowiska gatunek"
 trait_acidic_vascularity: "Kwasowe unaczynienie"
 trait_acidic_vascularity_desc: "Płyny ustrojowe tego gatunku to jednocześnie jego najpotężniejsza obrona. Są bardzo żrące i zabójcze, więc każdy wróg pożałuje, jeśli zrobi w tej istocie dziurę."
 trait_acidic_vascularity_effect: "Armie §Ywybuchają w chwili śmierci§! i zadają wrogom §G250§! uszkodzeń\n    - Produkcja zasobów przez populację poddaną czystce: §R-75%§!"
 DAMAGE_ARMY: "Zadaje uszkodzenia: $ARMY|Y$"
 trait_shelled: "Skorupa"
 trait_shelled_desc: "Ten gatunek nosi domy ze sobą, czy to powstające naturalnie, czy też znalezione (albo zbudowane). Te skorupy służą za schronienie i zawsze dostępne miejsce na nocny odpoczynek."
 trait_shelled_portrait_override_tt: "Lub dowolny gatunek mający skorupy"
 trait_camouflage: "Kamuflaż"
 trait_camouflage_desc: "Ten gatunek opanował do mistrzostwa sztukę kamuflażu, jego przedstawiciele doskonale wtapiają się w tło, stając się praktycznie niewidoczni dla swoich ofiar, a także drapieżników. Ich wrodzona znajomość optyki daje im przewagę w wojnie partyzanckiej."
 trait_camouflage_portrait_override_tt: "Lub dowolny gatunek ze zdolnością kamuflażu"
 trait_chromalogs: "Chromalogi"
 trait_chromalogs_desc: "Ten gatunek ujarzmił barwy do tego stopnia, że trudno nazwać to zwykłym kamuflażem. Jego przedstawiciele porozumiewają się za pomocą żywych, skomplikowanych wzorów ukazujących się na ich ciałach."
 trait_chromalogs_portrait_override_tt: "Lub dowolny gatunek korzystający z barw ciała w celu komunikacji"
 trait_brittle: "Kruchość"
 trait_brittle_desc: "Przedstawiciele tego gatunku, trapionego wrodzoną delikatnością, muszą bardzo uważać nawet podczas najprostszych codziennych czynności, aby uniknąć urazów."
 trait_familial: "Przyjacielskość"
 trait_familial_desc: "Przedstawiciele tego gatunku tworzą trwałe i głębokie więzi z najbliższymi krewnymi, dzięki czemu budują wydajne, spójne zbiorowości."
 trait_familial_effect: "Zadowolenie za każde §Y100§! £pop£ populacji z tą cechą znajdujących się na tej samej planecie: §G+0,1%§! (maks.: §G+20%§!)"
 trait_familial_portrait_override_tt: "Lub dowolny przyjacielski gatunek"
 trait_permeable_skin: "Przepuszczalna skóra"
 trait_permeable_skin_desc: "Przedstawiciele tego gatunku posiadają specjalnie zaprojektowaną skórę, która wymaga idealnych warunków otoczenia. Dopóki przebywają w naturalnym dla siebie klimacie, nie powinni mieć żadnych problemów."
 trait_permeable_skin_effect: "Bazowa możliwość zamieszkania światów, których ['concept_climate_category'] odbiega od naszych preferencji: §R-20%§!"
 concept_climate_category: "Kategoria klimatyczna"
 concept_climate_category_desc: "Planety zdatne do zamieszkania są podzielone na trzy kategorie klimatyczne:\n- Wilgotne:\n$t$- Kontynentalne\n$t$- Oceaniczne\n$t$- Tropikalne\n- Zimne:\n$t$- Górzyste\n$t$- Arktyczne\n$t$- Tundra\n- Suche:\n$t$- Jałowe\n$t$- Pustynne\n$t$- Stepowe"
 trait_genetic_memory: "Pamięć genetyczna"
 trait_genetic_memory_desc: "Przekazywanie wiedzy i nauk z pokolenia na pokolenie dało początek wielu cywilizacjom. Ten gatunek poszedł o krok dalej, wprowadzając do swojego kodu genetycznego informacje istotne dla przetrwania. Dzięki temu każde pokolenie przychodzi na świat, posiadając całą mądrość jego przodków."
 trait_genetic_memory_effect: "Możliwość zamieszkania dzięki wiekowi kolonii: §G+0,5%§! rocznie (maks. §G+25%§!)"
 trait_genetic_memory_portrait_override_tt: "Lub dowolny gatunek dziedziczący instynkty przetrwania"
 trait_nascent_stage: "Etap niemowlęcy"
 trait_nascent_stage_desc: "Przedstawiciele tego gatunku przychodzą na świat, będąc we wczesnej fazie rozwoju, przez co młode przez dłuższy czas nie pracują na rzecz społeczeństwa. W tym okresie są całkowicie nieświadome obowiązków oraz obciążeń wynikających z posiadania świadomości."
 trait_nascent_stage_effect: "Nowonarodzone populacje z tą cechą spędzają pierwsze §Y5§! lat życia jako osobniki przedrozumne."
 trait_nascent_stage_portrait_override_tt: "Lub dowolny gatunek z wydłużonym etapem niemowlęcym"
 trait_presapient_stage: "Przedrozumni"
 trait_presapient_stage_desc: "Po krótkim okresie życia bez świadomych myśli, przedstawiciele tego gatunku szybko rozwijają się i stają w pełni świadomymi istotami."
 trait_flight: "Latający"
 trait_flight_desc: "Przedstawiciele tego gatunku szybują nad ziemią i swobodnie przemierzają przestworza. Ich miasta są wyjątkowe, mają gęstą zabudowę przystosowaną dla latających mieszkańców. W walce są nieuchwytnymi i trudnymi celami."
 trait_flight_portrait_override_tt: "Lub dowolny gatunek przystosowany do życia w przestworzach"
 trait_spatial_mastery: "Władza nad przestrzenią"
 trait_spatial_mastery_desc: "Przedstawiciele tego gatunku nie tylko potrafią latać, ale mają też wyjątkowe struktury mózgowe, dzięki którym instynktownie przetwarzają i nawigują w trójwymiarowej przestrzeni. Te zdolności czynią z nich doskonałych taktyków, badaczy planet i zarządców miast."
 trait_spatial_mastery_portrait_override_tt: "Lub dowolny gatunek zdolny do swobodnego poruszana się w trzech wymiarach"
 trait_spare_organs: "Zapasowe organy"
 trait_spare_organs_desc: "Przedstawiciele tego gatunku mają dodatkowe organy, dzięki którym mogą przeżyć nawet po odniesieniu straszliwych obrażeń. To udana adaptacja, czego dowodzi nieustanne istnienie tych istot."
 trait_spare_organs_effect: "Przywódcy przeżyją swoją pierwszą śmierć\n    - Śmierć armii ofensywnej: §G20%§! szans na pojawienie się armii zastępczej\n    - £job_livestock£ §Y$job_livestock$§! Produkcja: §G+50%§!"
 mod_planet_livestock_produces_mult: "Produkcja: £job_livestock£ §Y$job_livestock$§!"
 trait_leader_second_chanced: "Druga szansa"
 trait_leader_second_chanced_desc: "Ten przywódca uniknął pewnej śmierci dzięki wyjątkowości jego organizmu. To się więcej nie powtórzy."
 #################################
 #Evolutionary Predators Origin #
 #Written by Victor Haeggman  #
 #################################
 #Origin and Start of Game
 origin_evolutionary_predators: "Ewolucyjne drapieżniki"
 origin_evolutionary_predators_desc: "§RUWAGA: Blokuje wszystkie drogi rozwoju oprócz ['concept_mutation_ascension'].§!\n\nPrzedstawiciele tego gatunku zawsze polowali na najbardziej wyjątkowe istoty, kierowani instynktem, który nie do końca rozumieli. Dzięki rzadkiej zdolności integrowania genetyki zdobyczy, stali się najgroźniejszymi drapieżnikami tego świata - wykorzystują wszystkie dostępne przewagi genetyczna. Teraz głód sprawił, że ruszyli ku gwiazdom."
 origin_tooltip_evolutionary_predators_effects: "- $SPECIES_TRAITS$ ['concept_malleable_genes']\n- Sytuacja: ['concept_adaptive_evolution']\n- Świat macierzysty: ['concept_genetic_soup']"
 START_SCREEN_EVOLUTIONARY_PREDATORS_BASE: "[GetSpeciesNamePlural] od zawsze są łowcami. Ciągle szukamy zdobyczy, nawet w najbardziej ekstremalnych warunkach, jeśli dzięki temu możemy poznać nowe smaki. Kiedy jest się tym, co się zjada, warto się czasem wysilić.\n\n"
 START_SCREEN_EVOLUTIONARY_PREDATORS_REGULAR: "$START_SCREEN_EVOLUTIONARY_PREDATORS_BASE$Od zawsze wiemy, że kształtuje nas mięso naszych zdobyczy. Każde polowanie, każda ofiara czyniły nas silniejszymi.\n\nNasza pełna przemocy przeszłość nie jest ciężarem, lecz esencją naszego istnienia. Udoskonaleni dzięki nowoczesnej nauce nie musimy już ucztować, żeby ewoluować. Wystarczy śladowa ilość materiału genetycznego, aby połączyć jego siłę z naszą.\n\nWciąż szaleje w nas głód ewolucji, a [GetStartingDrive] daje nam sposobność polowania w całej galaktyce i poznawania bogactwa jej smaków."
 START_SCREEN_EVOLUTIONARY_PREDATORS_HIVE: "$START_SCREEN_EVOLUTIONARY_PREDATORS_BASE$Nasza połączona inteligencja zawsze rozumiała, jaki potencjał drzemie w naszej genetyce. Możemy wchłaniać i adaptować esencję naszych zdobyczy, integrować ich siłę z naszą wspólnotą.\n\nWciąż mamy ten pradawny instynkt drapieżników, ale teraz jest on bardziej zrównoważony i potrafimy nad nim panować. Nie musimy już polować, aby ewoluować, nasze laboratoria mogą wytworzyć dowolny materiał genetyczny i bez kłopotu rozprowadzić go w całym roju.\n\nA [GetStartingDrive] pozwoli nam rozprzestrzenić się po całej galaktyce i delektować wszystkim, co może nam ona zaoferować."
 START_SCREEN_EVOLUTIONARY_PREDATORS_DEVOURING_SWARM: "$START_SCREEN_EVOLUTIONARY_PREDATORS_BASE$Dopiero po skonsumowaniu ostatniego organizmu na świecie [GetHomeWorldName] zdaliśmy sobie sprawę z własnej głupoty. Jak mielibyśmy zdobywać kolejne adaptacje? I spojrzeliśmy w niebo.\n\nJesteśmy najpotężniejszymi drapieżnikami. Inne polują, żeby przeżyć, my polujemy, żeby się doskonalić.\n\nA [GetStartingDrive] pozwoli nam znowu ruszyć na łowy. Galaktyka jest ogromna i pełna pożywienia."
 #Traits
 trait_malleable_genes: "Elastyczne geny"
 trait_malleable_genes_desc: "§LPrzedstawiciele tego gatunku nie mają wyraźnie odróżnialnych cech i organów jak większość innych gatunków. Zamiast tego potrafią wytworzyć część ciała najlepiej nadającą się do stojącego przed nimi zadania. Ta niestabilność ma jednak pewne wady.§!"
 trait_malleable_genes_cant_modify: "§RGatunki z tą cechą nie mogą być modyfikowane genetycznie§!\n$automodding_trait_tooltip_all$ §Y$trait_malleable_genes$§! wybiera modyfikatory z: ['concept_automodding_malleable']"
 CANNOT_MODIFY_MALLEABLE_GENES_SPECIES: "$TRIGGER_FAIL$Niestabilna budowa genetyczna tego gatunku sprawia, że nie można modyfikować jego genów."
 concept_malleable_genes: "$trait_malleable_genes$"
 concept_malleable_genes_desc: "$trait_malleable_genes_cant_modify$"
 concept_automodding_malleable: "Lista automatycznych modyfikacji cech: elastyczne geny"
 concept_automodding_malleable_desc: "- ['trait:trait_malleable_minerals']\n- ['trait:trait_malleable_energy']\n- ['trait:trait_malleable_food']\n- ['trait:trait_malleable_research']\n- ['trait:trait_malleable_unity']\n- ['trait:trait_malleable_forge']\n- ['trait:trait_malleable_trade']\n- ['trait:trait_malleable_ameneties']"
 concept_adaptive_evolution: "Ewolucja adaptacyjna"
 concept_adaptive_evolution_desc: "Sytuacja rozwija się wraz z pochłanianiem DNA innych organizmów.\n§GPo zakończeniu:§!\n$t$- Wybierz nową cechę gatunku, zależną od tego, jaki gatunek został niedawno pochłonięty\n§YPostępy dzięki:§!\n$t$- Kolonizacji nowych planet\n$t$- Czystkom lub utrzymywaniu innych gatunków jako bydła\n$t$- Trzymaniu innych gatunków w twoim imperium jako niewolników lub w wyższym standardzie\n$t$- Zatrudnianiu w Radzie obcych przywódców\n$t$- Utrzymywanie wasali biologicznych\n$t$- Zawieranie traktatów handlowych jako megakorporacja\n$t$- Spotykaniu obcych organizmów w trakcie wydarzeń"
 concept_genetic_soup: "$genetic_soup$"
 concept_genetic_soup_desc: "$fresh_biosphere_tt$\n\n§L$genetic_soup_desc$§!"
 trait_malleable_minerals: "Elastyczne szpony"
 trait_malleable_minerals_desc: "§LPalce twarde jak diament - ta adaptacja ułatwia wydobywanie minerałów.§!"
 trait_malleable_energy: "Elastyczne izolatory"
 trait_malleable_energy_desc: "§LGruba warstwa izolacyjna chroni przed wypadkami, szczególnie w środowiskach, gdzie występuje silna energia.§!"
 trait_malleable_food: "Elastyczne pługi"
 trait_malleable_food_desc: "§LDodatkowa kończyna ze wzmocnionym palcem przypominającym łopatę przyspiesza orkę i sadzenie roślin. Te elastyczne pługi dostosowują się do różnych rodzajów terenu i zawsze są wydajnym narzędziem.§!"
 trait_malleable_research: "Elastyczna kora mózgowa"
 trait_malleable_research_desc: "§LNabrzmiała kora mózgowa sprawia pewien dyskomfort, ale w ogromnym stopniu przyspiesza rozwiązywanie problemów i tworzenie innowacji.§!"
 trait_malleable_unity: "Elastyczne organy zmysłowe"
 trait_malleable_unity_desc: "§LUlepszone organy zmysłowe ułatwiają głębsze zrozumienie i poszanowanie dla innych punktów widzenia. Zanim zaczniesz się rozwijać, musisz zacząć od obserwacji.§!"
 trait_malleable_forge: "Elastyczne odciski"
 trait_malleable_forge_desc: "§LPrzy obchodzeniu się z gorącymi albo żrącymi materiałami, wyjątkowo grube odciski bywają niezastąpione.§!"
 trait_malleable_trade: "Elastyczne feromony"
 trait_malleable_trade_desc: "§LDoskonale adaptujące się feromony mogą okazać się niezwykle przydatne w czasie negocjacji.§!"
 trait_malleable_ameneties: "Elastyczna harmonika"
 trait_malleable_ameneties_desc: "§LUkład doskonale skalibrowanych otworów pozwala przedstawicielom tego gatunku wydawać kojące i harmonijne dźwięki podczas poruszania się.§!"
 #Democratic Effects
 concept_genetic_electorate_effect: "Efekt elektoratu genetycznego"
 concept_genetic_electorate_effect_desc: "$trait_malleable_imperialist_effect$\n$trait_malleable_isolationist_effect$\n$trait_malleable_progressive_effect$\n$trait_malleable_prosperity_effect$\n$trait_malleable_supremacist_effect$\n$trait_malleable_technologist_effect$\n$trait_malleable_totalitarian_effect$\n$trait_malleable_traditionalist_effect$\n$trait_malleable_xenoist_effect$\n$trait_malleable_manifesti_effect$"
 trait_malleable_imperialist_effect: "Efekt §Yfrakcji dominującej§! (imperialistyczna):\n$t$$mod_planet_jobs_alloys_produces_mult$: §G+10%§!"
 trait_malleable_isolationist_effect: "Efekt §Yfrakcji dominującej§! (izolacjonistyczna):\n$t$$mod_planet_jobs_unity_produces_mult$: §G+10%§!"
 trait_malleable_progressive_effect: "Efekt §Yfrakcji dominującej§! (postępowa):\n$t$£happiness£ Zadowolenie: §G+10%§!"
 trait_malleable_prosperity_effect: "Efekt §Yfrakcji dominującej§! (dobrobytu):\n$t$$r_trade$ z £job£ miejsc pracy: §G+20%§!"
 trait_malleable_supremacist_effect: "Efekt §Yfrakcji dominującej§! (zwierzchnictwa):\n$t$$mod_planet_jobs_ruler_produces_mult$: §G+5%§!\n$t$$mod_planet_jobs_specialist_produces_mult$: §G+5%§!"
 trait_malleable_technologist_effect: "Efekt §Yfrakcji dominującej§! (technologiczna):\n$t$£research£ badania naukowe z £job£ miejsc pracy: §G+10%§!"
 trait_malleable_totalitarian_effect: "Efekt §Yfrakcji dominującej§! (totalitarna):\n$t$£pop_cat_worker£ $mod_pop_cat_worker_bonus_workforce_mult$: §G+15%§!"
 trait_malleable_traditionalist_effect: "Efekt §Yfrakcji dominującej§! (tradycjonalistyczna):\n$t$£pop£ $MOD_POP_HOUSING_USAGE_ADD$: §G-0,5§!"
 trait_malleable_xenoist_effect: "Efekt §Yfrakcji dominującej§! (ksenoentuzjastyczna):\n$t$Bazowa możliwość zamieszkania: §G+15%§!"
 trait_malleable_manifesti_effect: "Efekt §Yfrakcji dominującej§! (Manifesti):\n$t$£pop£ $MOD_POP_AMENITIES_USAGE_BASE$: §G-1§!"
 #Dictatorial Effects
 trait_ruler_apex_predator: "Największy drapieżnik"
 trait_ruler_apex_predator_desc: "Narody kierujące się drapieżnictwem ewolucyjnym chcą, żeby rządzili nimi najlepiej przystosowani. Ten najpotężniejszy władca nie tylko gromadzi genomy pokonanych wrogów, ale także wykorzystuje ich spryt i determinację, aby każde zwycięstwo było krokiem ku doskonałości."
