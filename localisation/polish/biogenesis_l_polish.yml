 SHIP_BEHEMOTH_RAGE: "Gruczoły agresji"
 SHIP_BEHEMOTH_RAGE_DESC: "Behemoty to uparte, nieposkromione tytany, nad którymi nie da się długo panować. Prędzej czy później drzemiąca w nich furia wybuchnie w postaci nieokiełznanej burzy kosmicznej. Może mądrość nie polega na czekaniu, ale na wywołaniu reakcji, uwolnieniu burzy w chwili wybranej przez nas, a nie za nas."
 behemoth_rage_ship_button: "§HRozwścieczenie§!\n\nWypuszczenie §Ybehemota§!.\nSzalejący behemot ruszy w kierunku najbliższej §Ykolonii§! albo §Yjaja behemota§! i spróbuje je zniszczyć.\nSzał trwa zwykle §Y180 dni§!, ale na czas jego trwania może wpłynąć kilka czynników.$TABBED_NEW_LINE$- Behemot nie uspokoi się podczas §Rwalki§! albo §Rbombardowania§!.$TABBED_NEW_LINE$- Jeżeli §Gpokonamy§! szalejącego behemota, odzyskamy nad nim kontrolę."
 behemoth_rage_activity_key: "Szał"
 behemoth_rage_menu_title: "Rozwścieczenie"
 behemoth_rage_progress_activity_key: "Szał"
 MESSAGE_BEHEMOTH_RAGE_TITLE: "Rozwścieczony behemot"
 MESSAGE_BEHEMOTH_RAGE_DESC: "Behemot wpadł w szał! Mamy nadzieję, że uspokoi się za kilka miesięcy."
 MESSAGE_BEHEMOTH_CALM_TITLE: "Szał minął"
 MESSAGE_BEHEMOTH_CALM_DESC: "Behemot uspokoił się i znowu mamy nad nim kontrolę."
 SHIP_BEHEMOTH_COCOON: "Holometaboliczny przędzacz"
 SHIP_BEHEMOTH_COCOON_DESC: "§YBehemoty§! mogą wczepiać się w niespokojne warstwy gazowego olbrzyma i odżywiać jego gęstą atmosferą, pełną ciężkich pierwiastków i złożonych związków molekularnych. Taka dieta sprzyja rozwojowi behemotów oraz zwiększa ich ogromną siłę."
