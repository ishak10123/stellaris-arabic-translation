 ### BIOMORPHOSIS (GENETIC ASCENSION) SITUATION(S)
 ## REGULAR EMPIRE SITUATION
 #SET-UP / PREAMBLE
 genetic_ascension_situation: "Biomorfia"
 genetic_ascension_situation_type: "$genetic_ascension_situation$"
 genetic_ascension_situation_desc: "Selekcja naturalna i dryf genetyczny nie są już dla nas przeszkodą na drodze do dominacji biologicznej. Jako cywilizacja jesteśmy o krok od zdefiniowania na nowo przyszłości naszego gatunku. [Owner.Species.GetFleshTypeCyberCreed] to glina, a my jesteśmy rzeźbiarzami."
 genetic_ascension_situation_monthly_change_tooltip: "Nasi genetycy prowadzą coraz bardziej zaawansowane badania."
 genetic_ascension_situation_outcome: "Odblokujemy pełny potencjał manipulacji genetycznej i zapewnimy naszemu gatunkowi dalszy rozwój.\n\nWybierzemy ostateczną ekspresję biomorfii."
 genetic_ascension_situation_pause_desc: "Sytuacja przerwana"
 genetic_ascension_approach_selected: "$TRIGGER_FAIL$Już dokonaliśmy wyboru na ten etap."
 situation_gene_tailoring_needed_desc: "$TRIGGER_FAIL$NIE ma technologii ['concept_gene_tailoring']"
 mod_biomorphosis_progress_mult: "Miesięczny postęp: $genetic_ascension_situation$"
 #STAGE EVENTS
 bio.5.name: "Zmiana esencji" #STAGE ONE
 bio.5.desc.no_options: "Żeby przyspieszyć ewolucję gatunku, musimy jasno określić kierunek, który zdefiniuje naszą podróż. Kiedy zaczynamy poznawać nasz pełny potencjał, wiemy doskonale, że to przedsięwzięcie może fundamentalnie zmienić naszą naturę.\n\nSterowanie ewolucją to zadanie o ogromnym znaczeniu. Wprowadzane przez nas zmiany nadadzą nowy kształt naszej przyszłości."
 bio.5.desc.has_options: "$bio.5.desc.no_options$\n\nŻeby rozpocząć własne przyspieszenie, musimy wybrać drogę, na której zaczniemy naszą podróż."
 bio.5.a: "Droga czystości."
 bio.5.b: "Droga klonowania."
 bio.5.c: "Droga mutacji."
 bio.10.name: "Punkt krytyczny" #STAGE TWO
 bio.10.desc.no_options: "Sterowanie ewolucją przyniosło nam wielkie osiągnięcia. Obecnie mamy większą wiedzę o cechach genetycznych, reprodukcji i sekwencjonowaniu DNA.\n\nPunkt kulminacyjny naszego postępu jest w zasięgu ręki. Za kilka lat poznamy pełny potencjał naszego gatunku."
 bio.10.desc.has_options: "$bio.10.desc.no_options$\n\nObecnie możemy podążać obraną wcześniej drogą albo skoncentrować się na innym aspekcie następnego etapu naszego rozwoju."
 bio.10.a: "Koncentracja na czystości."
 bio.10.b: "Koncentracja na klonowaniu."
 bio.10.c: "Koncentracja na mutacji."
 bio.15.name: "Ewolucyjne rozdroże" #STAGE THREE
 bio.15.desc.no_options: "Nasze działania spowodowały, że znaleźliśmy się o krok od wielkiej zmiany ewolucyjnej. Wkrótce musimy podjąć istotną decyzję co do drogi, którą podążymy, aby poznać nasz pełny potencjał ewolucyjny."
 bio.15.desc.has_options: "$bio.15.desc.no_options$\n\nMusimy ponownie zdecydować, gdzie skoncentrujemy nasze działania."
 bio.15.a: "Wybierzmy czystość."
 bio.15.b: "Opanujmy klonowanie."
 bio.15.c: "Mutacja poprowadzi nas w przyszłość."
 genetic_ascension_approach_purity: "Czystość"
 genetic_ascension_approach_cloning: "Klonowanie"
 genetic_ascension_approach_mutation: "Mutacja"
 genetic_ascension_approach_purity_desc: "Skoncentrujemy nasze działania na osiągnięciu czystości."
 genetic_ascension_approach_cloning_desc: "Badania nad klonowaniem ułatwią nam rozwój."
 genetic_ascension_approach_mutation_desc: "Mutacje genetyczne to nasza przyszłość."
 bio.20.name: "Wybrana droga" #FINAL STAGE - TRADITION TREE CHOICE
 bio.20.desc: "Niezależnie od tego, czy dążymy do osiągnięcia najczystszej formy, sukcesu dzięki klonowaniu czy modyfikacji genetycznej poprzez celowe mutacje, ta chwila to punkt, z którego nie ma już powrotu."
 bio.20.desc.evopred: "Z natury zawsze byliśmy ulegli. Jesteśmy najbardziej skomplikowanymi organizmami w tym wszechświecie, a dzięki naszym badaniom nie przestaniemy się zmieniać.\n\nPrzyszłość jest w ruchu i to nam odpowiada."
 bio.20.a: "Dowiemy się, co oznacza być czystymi."
 bio.20.b: "Sklonujemy się i odniesiemy sukces."
 bio.20.c: "Ujarzmimy potęgę mutacji."
 #Random Events
 bio.50.name: "Niektórzy są równiejsi"
 bio.50.desc: "Ponieważ skoncentrowaliśmy się na dążeniu do czystości genetycznej, zmodyfikowani obywatele zaczęli uważać się za lepszych od reszty populacji. Domagają się krótszego dnia pracy, większej liczby udogodnień i większej władzy politycznej. Organizują coraz bardziej agresywne wiece i sieją coraz większy ferment społeczny."
 bio.50.a: "Ukrócić działania demonstrujących."
 bio.50.b: "Należy im się uprzywilejowanie."
 bio.55.name: "Mitoza społeczna"
 bio.55.desc: "W serwisach informacyjnych dominuje retoryka prowadząca do podziałów, a niezgoda rozdziera komórki społeczne. Zaczyna się nowy rodzaj walki klasowej, ponieważ przed osobami z modyfikacjami genetycznymi pojawia się coraz więcej możliwości.\n\nGenetycznie ulepszeni uważają się za przyszłość naszego gatunku, natomiast tradycjonaliści twierdzą, że posunęliśmy się za daleko wbrew naturze."
 bio.55.a: "Lepsze istoty dla lepszego świata."
 bio.55.b: "Może za bardzo się spieszymy."
 bio.60.name: "Toksyczna dysproporcja"
 bio.60.desc: "W niektórych branżach obowiązkowe testy czystości stały się powszechne. Osoby uznane za posiadające lepsze geny mogą liczyć na preferencyjne traktowanie w pracy, szkole oraz łatwiejszy dostęp do wysokich stanowisk.\n\nNiektórzy argumentują, że osoby z bioulepszeniami są rzeczywiście silniejsze i zdrowsze, jednak inni twierdzą, że takie podejście wywołuje niesłuszną dyskryminację tych, którzy nie chcą lub nie mogą zmienić swojego genomu w imię dążenia do doskonałości genetycznej."
 bio.60.a: "Musimy zapewnić wszystkim równe możliwości."
 bio.60.b: "Tak wygląda przetrwanie najlepiej przystosowanych."
 bio.65.name: "Bohaterowie i łotry"
 bio.65.desc: "Nasze dążenie do czystości ośmieliło niektórych do odgrywania istotnej roli na polu bezpieczeństwa publicznego. Dzięki modyfikacjom są o wiele silniejsi, zwinniejsi i wytrzymalsi, niewielkie grupy samozwańczych dobroczyńców pozują na bohaterów, biorą prawo w swoje [owner.species.GetHandNamePlural].\n\nJednak ta odwaga spotkała się z oporem. Z mroku wyłaniają się podobnie zmodyfikowani przeciwnicy, których podłe zamiary są napędzane marzeniem o wyrównaniu sił. Starcia między oboma obozami doprowadziły do poważnych zniszczeń nieruchomości, a nawet sprowadziły niebezpieczeństwo na cywili."
 bio.65.a: "Na naszych ulicach nie ma miejsca dla mścicieli."
 bio.65.b: "Niech walczą."
 MAVERICK_CITIZENS_MOD: "[enforcer.GetIcon] §Y[enforcer.GetNamePlural]§! wytwarzają §G+2§! $r_stability$ i §G+2§! $r_unity$ za każde 100 miejsc pracy."
 bio.66.name: "Ogromne ograniczenia"
 bio.66.desc: "Ukróciliśmy działalność osób dysponujących supersiłą. Nałożono na nie surowe ograniczenia i przepisy. Dzięki działaniom wywiadowczym obserwujemy i ograniczamy działalność tych jednostek.\n\nDokładamy wszelkich starań, żeby wykorzystywały one swoje zdolności wyłącznie na rzecz naszego imperium, jednak wśród osób z supermocami i tych nie posiadających modyfikacji zaczyna panować narastający strach i pogarda."
 bio.66.a: "Zamówmy pułki z supermocami."
 bio.66.b: "Przywróćmy prawa wykluczonym."
 bio.67.name: "Uzależnienie od jednostek z supermocami"
 bio.67.desc: "Nasze rosnące korzystanie z genetycznie zmodyfikowanych mścicieli okazało się bronią obosieczną. Istoty te dają nam poczucie bezpieczeństwa i spokój ducha, ale staliśmy się od nich bardzo zależni.\n\nSpołeczeństwo jest wdzięczne, ale coraz częściej szuka wsparcia i rady osób z supermocami, pomijając władzę sądowniczą oraz ignorując urzędników. Granica między bohaterami i rządem zatarła się. Równowaga władzy została zachwiana."
 bio.67.a: "Powołajmy radę z supermocami!"
 bio.67.b: "Ograniczmy udział „bohaterów” w funkcjonowaniu rządu."
 bio.70.name: "Dwóch za jednego"
 bio.70.desc: "Okazało się, że pewien prominentny przywódca, słynący w całej galaktyce z niestrudzonej pracy, to nie jedna, lecz dwie osoby.\n\nWyszło na jaw, że ta osoba pozyskała swojego doskonałego klona, dzięki czemu oboje mogli pracować na zmianę. Kiedy jeden klon zajmował się obowiązkami publicznymi i administracyjnymi, drugi w tajemnicy odpoczywał i odzyskiwał siły.\n\nTo odkrycie wywołało zamęt na scenie politycznej, poddając w wątpliwość prawdziwy sens przywództwa oraz ograniczenia etyczne dotyczące technologii klonowania."
 bio.70.a: "To skuteczne zastosowanie klonowania."
 bio.70.b: "Zwolnijmy obu za to oszustwo."
 bio.75.name: "Bunt klonów"
 bio.75.desc: "Praktyka zamawiania klonów jako źródeł organów już wywołuje komplikacje. Część klonów, które najwyraźniej uzyskały świadomość, buntuje się, przechodząc długotrwały strajk głodowy.\n\nWiele osób argumentuje, że zdrowie i długowieczność oryginalnych osobników powinny być ważniejsze, a inni twierdzą, iż każda istota myśląca ma prawo do autonomii i samostanowienia. Ta kontrowersyjna sprawa stała się tematem gorącej debaty."
 bio.75.a: "Zakażmy tych transplantacji."
 bio.75.b: "Prawa oryginalnych osobników są najważniejsze."
 bio.80.name: "Ciężar dowodu"
 bio.80.desc: "Organy ścigania są w trudnej sytuacji. Rośnie przestępczość w naszej stolicy, jednak coraz mniej osób staje przed obliczem sprawiedliwości. Podejrzani coraz częściej twierdzą, że są niewinni, a przestępstwa zostały popełnione przez ich klony.\n\nW przypadkach, gdy sprawców nie ujęto na gorącym uczynku, praktycznie nie ma możliwości dowiedzenia winy. Niektórzy prawnicy wzywają do dekryminalizacji większości nielegalnych czynów."
 bio.80.a: "Wzmocnijmy nasze systemy monitorujące."
 bio.80.b: "Mniej prawa oznacza mniej przestępczości."
 bio.85.name: "Uderzające podobieństwo"
 bio.85.desc: "Na naszym terytorium wykryto nielegalną fabrykę klonów, znajdowały się tam tysiące sobowtórów, każdy z nich wygląda dokładnie jak [Owner.Leader.GetTitle], [Owner.Leader.GetName]. Cywilni naukowcy, którzy znajdowali się na miejscu, zostali zatrzymani, ale żaden z nich nie współpracuje - wszyscy twierdzą, że nie mają pojęcia, kto zamówił klony.\n\nNieliczne dowody wskazują, że za tą operacją może stać [Owner.Leader.GetName] [Owner.Leader.GetHerselfHimself]. Niestety, nie mamy pojęcia, gdzie obecnie przebywa."
 bio.85.a: "Dokonajcie eutanazji klonów."
 bio.85.b: "Przejęliśmy armię klonów."
 bio.85.b.tt: "([owner.capital_scope.GetName]):\nPowstaje jedna §Y$clone_army$§!."
 bio.85.c: "Uwolnijcie klony."
 bio.85.c.tt: "Zyskamy grupę §Ypopulacji§!."
 bio.86.name: "Niespodziewanie gwałtowna reakcja"
 bio.86.desc: "Eutanazja tak dużej liczby klonów wywołała oburzenie i poważną debatę. Niezadowoleni aktywiści na rzecz praw [Owner.GetSpeciesAdj&genitive] oraz grupy religijne przygotowują się do masowych protestów.\n\nJednocześnie pojawiły się plotki, że części klonów udało się uciec i teraz kryją się pośród obywateli."
 bio.86.a: "Niech to będzie dla nas nauczką..."
 bio.86.b: "Wyślijcie siły bezpieczeństwa, niech uciszą tę tłuszczę."
 bio.86.b.tt: "([owner.capital_scope.GetName]):\nStworzono trzy §Y$assault_army_plural$§!."
 bio.90.name: "Mutancka wspólnota"
 bio.90.desc: "Wiele osób z widocznymi albo niekonwencjonalnymi mutacjami genetycznymi cierpi z powodu ostracyzmu społecznego. Ci mutanci musieli zejść pod ziemię, gdzie stworzyli własne enklawy.\n\nCi, którzy zapuszczają się w te miejsca, rzadko wracają."
 bio.90.a: "Usuńcie te enklawy."
 bio.90.b: "Obserwujcie ich rozwój. Z daleka."
 bio.95.name: "Rebelia transgeniczna"
 bio.95.desc: "Niezadowolona młodzież znalazła sobie nową rozrywkę: zmienia drastycznie swój wygląd.\n\nOstatnie trendy to mania na punkcie złożonych oczu i współzawodnictwo w tym, ile dodatkowych kończyn da się umieścić w jednym ciele - aktualny rekord to 156.\n\nCi biohakerzy przyciągnęli uwagę opinii publicznej, pojawiły się wątpliwości dotyczące bezpieczeństwa takich modyfikacji. Podnoszą się coraz głośniejsze żądania nałożenia surowych ograniczeń na mutacje genetyczne, zatem musimy zająć oficjalne stanowisko."
 bio.95.a: "To tylko niegroźna zabawa."
 bio.95.b: "156 kończyn to stanowczo za dużo."
 bio.100.name: "Nieoczekiwane kłopoty"
 bio.100.desc: "Powszechne stosowanie manipulacji genetycznych przez naszą cywilizację dało początek zdumiewającej liczbie zmian fizycznych.\n\nPrzewidywalne niegdyś procesy biologiczne przechodzą niespodziewane modyfikacje, co praktycznie uniemożliwia stworzenie jakiegokolwiek standardu.\n\nZanika poczucie fizycznej wspólnoty, które łączyło nasz gatunek, zamiast jednolitości mamy kalejdoskop form i funkcji, co źle wpływa na spójność społeczeństwa."
 bio.100.a: "Wspierajmy różnorodność."
 bio.100.a.tt: "§Y400§! losowych £pop£ §Hpopulacji§! otrzyma cechę: ['trait:trait_bioadaptability'], ['trait:trait_social_pheromones'] albo ['trait:trait_limited_regeneration']."
 bio.100.b: "Wprowadźcie standardowy wzór genetyczny."
 bio.105.name: "Amorfizm komórkowy"
 bio.105.desc: "Eksperyment transgeniczny przyniósł opłakane skutki. Naukowcy próbowali splicingu DNA obiektów testowych z materiałem genetycznym innych organizmów wielokomórkowych, aby wywołać reakcję hiperimmunologiczną, która zapewniłaby odporność na wszystkie wirusy.\n\nZamiast tego powstała istota, która rozpuszcza ściany komórkowe wszystkich istot, z którymi się zetknie, przemieniając je w ten sposób w wielką, amorficzną masę materiału biologicznego.\n\nTen twór przemieszczał się po placówce badawczej, wchłaniając wszystko, co znalazło się na jego drodze. Udało się go zatrzymać, ale gdyby znowu uciekł, stałby się poważnym zagrożeniem zdrowotnym. Na szczęcie chyba jest jadalny..."
 bio.105.a: "Zneutralizować tę masę!"
 bio.105.b: "Warto zaryzykować zbadanie tej masy."
