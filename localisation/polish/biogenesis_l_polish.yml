 metaphysics_rejected_desc: "Pytania metafizyczne rozpraszają samotne umysły, naszym celem nie jest zastanawianie się nad istnieniem, ale życie jako jedność."
 boosted_neurology: "Wzmocniona neurologia"
 boosted_neurology_desc: "Zbyt wiele czasu poświęciliśmy na rozważania. Musimy przeprowadzić transformację naszego gatunku, niezależnie od jej negatywnych skutków."
 balanced_advancement: "Zrównoważony rozwój"
 balanced_advancement_desc: "Nasze eksperymenty z mutacjami nie mogą zmienić tego, jak jesteśmy ze sobą połączeni."
 rage_quitting: "Odrzucenie agresji"
 rage_quitting_desc: "W roju nie ma miejsca na nierozważną brawurę."
 fury_embracing: "Oswojenie furii"
 fury_embracing_desc: "Jesteśmy otwarci na nieznany chaos przyszłości."
 decisive_meditation: "Stanowcza medytacja"
 decisive_meditation_desc: "Postanowiliśmy zacząć od pogodzenia się z burzliwą naturą naszej świadomości i wspólnie działamy na rzecz bardziej zrównoważonej ogólne perspektywy."
 meteorological_adaptations: "Adaptacje meteorologiczne"
 meteorological_adaptations_desc: "Musimy poświęcić czas i środki na przyspieszenie naszej odporności klimatologicznej."
 body_builders: "Kulturyści"
 body_builders_desc: "Siła fizyczna to szczyt ewolucji."
 deep_thinkers: "Wielcy myśliciele"
 deep_thinkers_desc: "Napędza nas zdolność do głębokiej zadumy."
 sensible_supremacy: "Rozsądna dominacja"
 sensible_supremacy_desc: "Możemy jednocześnie być śmiali i ostrożni."
 decisive_termination: "Zdecydowane likwidacje"
 decisive_termination_desc: "Żeby walczyć z epidemią, będziemy likwidować zakażonych."
 survival_study: "Badania nad przetrwaniem"
 survival_study_desc: "Należy dogłębnie zbadać chore osobniki ([GetIndividualNamePlural]) i dzięki temu opracować lek na zarazę."
 survival_study_wilderness: "$survival_study$"
 survival_study_wilderness_desc: "$survival_study_desc$"
 uncorrected_blunders: "Niepoprawione błędy"
 uncorrected_blunders_desc: "Możliwe, że nie sprawdziliśmy naszych obliczeń."
 maverick_citizens: "Niezależni obywatele"
 maverick_citizens_desc: "Kto nie uczynił nic złego, nie musi się obawiać."
 #Advanced Governments
 #Purity
 bio.170.name: "Czystość: Reformacja rządu?"
 bio.170.desc: "Nasz gatunek dotarł do kolejnej, ważnej granicy. Przed nami wybór.\n\nCzy wypełnimy nasze przeznaczenie, oczyszczając nasz rodowód genetyczny, aby nasza cywilizacja wspięła się na kolejne wyżyny doskonałości genetycznej? A może wyciągniemy naukę z przeszłości i będziemy trwać w naszej obecnej, nieudoskonalonej formie?"
 bio.170.a: "Postawmy na czystość i wejdźmy na kolejne wyżyny!"
 bio.170.a.tt: "$change_auth_tt$[GetPurityAuthority]"
 bio.170.b: "Nie musimy zmieniać sposobu rządzenia naszą cywilizacją."
 #Cloning
 bio.175.name: "Klonowanie: Reformacja rządu?"
 bio.175.desc: "Znaleźliśmy się w kluczowym momencie historii naszego gatunku. Przed nami decyzja.\n\nCzy wypełnimy nasze przeznaczenie, ujarzmiając moc klonowania, co nieodwracalnie przemieni nas w cywilizację kopiowanej doskonałości? A może wyciągniemy naukę z naszej dotychczasowej podróży i pozostaniemy przy naszym niepotrzebnym zróżnicowaniu?"
 bio.175.a: "Uważamy klonowanie za kluczowy element naszej przyszłości."
 bio.175.a.tt: "$change_auth_tt$[GetCloningAuthority]\n$LEADERS_GAIN_CLONES$"
 bio.175.b: "$bio.170.b$"
 #Mutation
 bio.180.name: "Mutacja: Reformacja rządu?"
 bio.180.desc: "Znaleźliśmy się u progu przekroczenia istotnej granicy biologicznej. Przed nami ważny wybór.\n\nMożemy wypełnić nasze przeznaczenie, ujarzmiając potęgę zaawansowanych mutacji biologicznych, co nieodwracalnie zmieni naszą cywilizację poprzez zaplanowaną ewolucję naszego kodu genetycznego. Możemy też wyciągnąć wnioski z naszych wcześniejszych dokonań i istnieć dalej w obecnej, zwyczajnej formie."
 bio.180.a: "Możemy być kim i czym chcemy."
 bio.180.a.tt: "$change_auth_tt$[GetMutationAuthority]"
 bio.180.b: "$bio.170.b$"
