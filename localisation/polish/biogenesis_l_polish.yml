 ### ADDITIONAL RANDOM EVENTS
 ## NON-HIVE
 #PURITY
 bio.200.name: "Uznanie naszej spuścizny"
 bio.200.desc: "Dzięki koncentracji na oczyszczeniu naszych genów, dowiadujemy się, co buduje wielkość naszej cywilizacji.\n\nStajemy się czyści jak nigdy wcześniej, więc jesteśmy dumni z naszego wyjątkowego pochodzenia.\n\nEksperci ze wszystkich dziedzin: sztuki, nauki i biznesu, każdy chwali wysiłki naszej wspólnoty i liczy, że okryjemy się chwałą."
 bio.200.a: "Uczcimy to wielkie osiągnięcie, finansując sztuki piękne!"
 bio.200.b: "Badania naukowe zawsze są najważniejsze."
 bio.200.c: "Konsumpcja to fundament gospodarki."
 bio.210.name: "Nie damy się oczyścić!"
 bio.210.desc: "W naszych miastach słychać skandowanie protestujących. Zbuntowana frakcja w naszym imperium postanowiła wyrzec się naszej sprawy i zejść ze ścieżki czystości.\n\nCi mąciciele wychwalają rzekomą potrzebę różnorodności genetycznej i integracji kulturowej.\n\nJeżeli nic nie zrobimy w sprawie ich działalności, możemy zatrzymać się na naszej drodze do osiągnięcia czystości."
 bio.210.a: "Wyplenić dysydentów!"
 bio.210.b: "Udobruchajmy ich pustymi obietnicami."
 bio.215.name: "Tajemnice przeszłości"
 bio.215.desc: "Archeolodzy odkryli dowody istnienia cywilizacji pochodzącej z naszego pradawnego świata macierzystego.\n\nZnaleziono dawno zasypany skarbiec, a w nim przerażające dowody dawnych eksperymentów genetycznych.\n\nGdyby ta informacja dotarła do opinii publicznej, mogłaby osłabić nasze współczesne argumenty na rzecz czystości genetycznej."
 bio.215.a: "Zintegrujmy te badania z naszymi. Budujmy na fundamentach z przeszłości."
 bio.215.b: "Zniszczmy te dowody. Nikt nie może się o tym dowiedzieć."
 bio.220.name: "Dziwna nauka"
 bio.220.desc: "Zbuntowany genetyk, [event_target:rogue_geneticist.GetName], prowadzi nielegalne doświadczenia biologiczne. Nie przestrzega żadnych zasad bezpieczeństwa i chce stworzyć rasę istot wyższych - byłaby ona ucieleśnieniem ideałów czystości, które chcielibyśmy osiągnąć. Ale zamiast tego powstała abominacja.\n\nPodgatunek krótko żyjących istot, których profil genetyczny jest częściowo zgodny z naszym, ale które w większości są toczonymi chorobą potworami. I które teraz umierają w naszej niewoli. Badanie ich genomu przyniosło pewne owoce, jednak wszystkie te jednostki z pewnością zginą. [event_target:rogue_geneticist.GetName] nie ma żadnych wyrzutów sumienia."
 bio.220.a: "Usunąć tego drania ze stanowiska!"
 bio.220.a.tt: "[event_target:rogue_geneticist.GetName] przechodzi na przymusową emeryturę."
 bio.220.b: "[event_target:rogue_geneticist.GetName] musi \"zamilknąć\"."
 bio.220.c: "Dokładnie takiej inicjatywy potrzebujemy!"
 bio.225.name: "Co za skandal!"
 bio.225.desc: "Po wprowadzeniu regularnych testów genetycznych mających przyspieszyć osiągnięcie przez nas czystości i odnalezienie nieprzystających elementów genomu, DNA \"wysokiej jakości\" stało się naszą chlubą.\n\nPojawiły się informacje, że niektórzy członkowie rządu kłamali na temat swojej budowy biologicznej i fałszowali wyniki tak, aby wykazywały cechy bardziej pożądane od tych, które rzeczywiście posiadają. Jeżeli informacje o tych kłamstwach wyjdą na jaw, wywołają oburzenie opinii publicznej."
 bio.225.a: "Potrzebujemy dokładniejszych i mniej zawodnych testów."
 bio.225.b: "Może ten urzędnik popełnił błąd..."
 ### ADDITIONAL RANDOM EVENTS
 ## NON-HIVE
 #CLONING
 bio.230.name: "Dylemat klonowania"
 bio.230.desc: "Klony są wśród nas. Mieszkają w naszych miastach, pracują w naszych fabrykach. Niektóre z nich zajmują ważne stanowiska i wpływają na polityki regulujące nasze życie.\n\nPo zintegrowaniu sklonowanych osób z naszym społeczeństwem wiele pytań wciąż pozostaje bez odpowiedzi. Jakie prawa dotyczą tych osób? Czy są one takie same jak prawa nie-klonów, czy też powinniśmy traktować te jednostki jak podwładnych?"
 bio.230.a: "Pełne prawa obywatelskie dla wszystkich klonów!"
 bio.230.b: "Są co najwyżej obywatelami drugiej klasy."
 bio.235.name: "Sabotaż w fabryce klonów!"
 bio.235.desc: "Produkcja klonów w jednej z naszych najwydajniejszych fabryk została nagle wstrzymana na skutek zdarzenia, które spowodowało znaczne szkody.\n\nPonieważ wiele naszych działań zostało zautomatyzowanych w celu maksymalizacji wydajności, na miejscu nie było nikogo, kto mógłby zapobiec zakłóceniom funkcjonowania.\n\nJeden ze świeżo powstałych klonów ześliznął się z taśmociągu, wpadł do mechanizmu, został zmiażdżony, a szczątki zatrzymały maszynerię, a co za tym idzie - całą produkcję."
 bio.235.a: "Trzeba przeprowadzić dokładne śledztwo!"
 bio.235.a.tt: "Tempo postępu sytuacji §Y$genetic_ascension_situation$§! przez §Y12§! miesięcy: §R-50%§!"
 biomorphosis_stalled_tt: "Tempo postępu sytuacji §Y$genetic_ascension_situation$§! przez §Y12§! miesięcy:"
 bio.235.b: "Trzeba jak najszybciej wznowić produkcję!"
 bio.240.name: "Kryzys tożsamości"
 bio.240.desc: "Klony z całego imperium zgłaszają problemy ze zrozumieniem własnej tożsamości.\n\nPragną być kimś więcej niż kopiami swoich dawców genetycznych. Szukają sensu swojego istnienia, pragną mieć jakieś życiowe cele i aspiracje."
 bio.240.a: "To się często zdarza. Niech idą na terapię."
 bio.240.b: "Powinni szukać realizacji w wykonywanej pracy."
 bio.240.b.tt: "Każdy §Y£leader£ przywódca§! głównego gatunku imperium otrzymuje §G+200§! doświadczenia."
 bio.250.name: "Klony są wszędzie!"
 bio.250.desc: "W miarę jak coraz więcej klonów integruje się z naszą populacją, dodatkowe zasoby potrzebne na ich utrzymanie stają się obciążeniem dla naszej gospodarki.\n\nPrzed nami trudne wyzwania, jednak przyspieszenie gospodarcze uzyskane dzięki większej sile roboczej i bazie konsumenckiej może stworzyć fundamenty pod długotrwały dobrobyt - ale tylko pod warunkiem, że uda nam się skutecznie zarządzać zachodzącymi zmianami."
 bio.250.a: "Nasza infrastruktura musi się rozwijać, żeby obsłużyć rosnący popyt."
 bio.250.b: "Mogą cieszyć się życiem w koloniach na innych światach."
 ### ADDITIONAL RANDOM EVENTS
 ## NON-HIVE
 #MUTATION
 bio.260.name: "Niekontrolowane mutacje"
 bio.260.desc: "Kończyny wyrastające w przypadkowych miejscach. Fluktuacje stanów skupienia. Nagłe metamorfozy. To tylko kilka oddalonych od siebie w czasie doniesień, ale nie wolno nam ich zignorować.\n\nNasze doświadczenia z mutacjami przynoszą mniej pożądane efekty w skali całej cywilizacji. Może uwolnienie narzędzi do swobodnej manipulacji własnymi genami wywołało poważniejsze konsekwencje, niż początkowo zakładaliśmy."
 bio.260.a: "Nietypowe mutacje mogą nam pomóc w badaniach naukowych."
 bio_260_opinion_tt: "Opinia imperiów §Yduchowych§! o nas zmieni się o §R-50§!."
 bio.260.b: "Pozbyć się abominacji."
 bio.260.b.tt: "Każdy §Yautorytarny £leader£ przywódca§! zyskuje cechę: §Y$leader_trait_eager$§!."
 bio.265.name: "Doskonałe mutanty"
 bio.265.desc: "Poprzez prowadzone na sobie doświadczenia z mutacjami niewielki odsetek naszej populacji uzyskał niezwykłe zdolności i przeszedł zmiany fizyczne.\n\nTe wyjątkowo silne i uzdolnione osoby budują własną społeczność oraz stają się obiektami zainteresowania opinii publicznej."
 bio.265.a: "Ich sukces może stać się zachętą dla innych."
 bio.265.b: "Chyba są dobrym materiałem na żołnierzy."
 bio.265.b.tt: "§Y$gene_warrior_army$§! powstanie na świecie: §Y[Owner.capital_scope.GetName]§!."
 bio_265_opinion_tt: "Opinia imperiów §Ymilitarystycznych§! o nas zmieni się o §G+50§!."
 bio.265.c: "Dowiedzmy się, jak to zrobili, i odtwórzmy ten proces."
 bio.270.name: "Materializacja miejskich legend"
 bio.270.desc: "Prowadzone rozpoznanie potwierdziło istnienie populacji genetycznie zmodyfikowanych osób, które mieszkają w kanałach. To niepokojąco przypomina dawno zdyskredytowane miejskie legendy.\n\nOwo odkrycie zwiększyło napięcia społeczne, narasta strach przed nieznanym - w związku z tym obywatele z widocznymi mutacjami coraz częściej skarżą się na dyskryminację. Niemniej odkryte w kanałach istoty wykazały się niezwykłą pomysłowością: produkują zasoby, wykorzystując występujące w ich środowisku gazy i w zaskakujący sposób zmieniają swoje otoczenie."
 bio.270.a: "Oczyścić kanały!"
 bio.270.b: "Możliwe, że ci mutanci wpadli na coś ciekawego..."
 bio.280.name: "Epidemia wśród mutantów"
 bio.280.desc: "Przez całe imperium przetacza się fala epidemiczna nowej choroby. Wywołuje ona nieprzyjemne objawy u zakażonych, są to między innymi: mimowolne uwalnianie powietrza oraz płynów, wyniszczające osłabienie, a w niektórych przypadkach nawet śmierć.\n\nCo ciekawe, na tę chorobę zapadają tylko osoby, które w określony sposób zmieniły swoją fizjologię za pomocą mutacji genetycznych. Przeprowadzone badania ich zmodyfikowanego genomu przyniosły zaskakujące wnioski."
 bio.280.a: "Znajdźmy jakieś zastosowanie lecznicze."
 bio.280.b: "Wykorzystajmy tę chorobę jako broń."
 bio_280_opinion_tt: "Opinia imperiów §Ymaterialistycznych§! o nas zmieni się o §R-50§!."
 ### ADDITIONAL RANDOM EVENTS
 ## NON-HIVE
 #ANY APPROACH
 bio.295.name: "Zbuntowana komórka"
 bio.295.desc: "Dzięki placówkom badań genomu cała nasza cywilizacja może zmieniać się fizycznie w sposób, jakiego wcześniej nie doświadczyliśmy.\n\nJednak obywatele imperium chcą czegoś więcej. Niektórzy wzywają do odejścia od centralizacji zasobów i umożliwienia tak zwanym \"biohakerom\" swobodnego dostępu do technologii genowej."
 bio.295.a: "Dajmy biohakerom większą autonomię."
 bio.295.b: "Zwykli obywatele i tak cieszą się już zbyt dużą wolnością."
 bio_295_opinion_tt: "Opinia imperiów §Yegalitarnych§! o nas zmieni się o §G+50§!."
 bio.300.name: "Genialny genetyk"
 bio.300.desc: "[Owner.GetScientist] [event_target:genius_geneticist.GetName] to autor pracy badawczej, dzięki której można gwałtownie przyspieszyć nasze eksperymenty genetyczne i zwiększyć ich wydajność.\n\nNowa metoda to czysta teoria, której jeszcze nie przetestowano w praktyce, zatem należy dokładnie zaplanować metodologię, aby wszystkie procesy przebiegały bezpiecznie."
 bio.300.a: "[event_target:genius_geneticist.GetName] musi otrzymać uznanie za swoją pracę."
 bio.300.b: "Niepoważne idee - i osoby - nie będą tolerowane."
 bio.300.c: "Niech wszyscy wracają do pracy."
 ### ADDITIONAL RANDOM EVENTS
 ## HIVE
 #PURITY
 bio.310.name: "[target.GetGestaltEntityName]: utrata czystości"
 bio.310.desc: "Nasz gatunek został zanieczyszczony fragmentem dzikiego kodu genetycznego, to skutek naszych nieustannych doświadczeń na polu modyfikacji genetycznej. Nasz stan pogarsza się w niepokojącym tempie, destabilizowany przez niezatwierdzoną interakcję tej obcej sekwencji z naszym materiałem genetycznym.\n\nMusimy rozwiązać problem tego anomalnego zachowania biologicznego, zanim będzie za późno."
 bio.310.a: "Usunąć to skażenie."
 bio.310.b: "Zbadajmy tę anomalię."
 bio.315.name: "Zaangażowanie w sprawę"
 bio.315.desc: "Jeżeli nasza cywilizacja ma się stać czysta, musimy zadbać o dobrostan roju. Proces modyfikacji genetycznej musi prowadzić do adaptacji, dzięki którym [target.GetGestaltEntityName] uzyska większą wytrzymałość.\n\nPójście złą drogą, wprowadzenie zmian wywołujących niestabilność albo zaburzających jedność, może przynieść katastrofalne skutki i zagrozić fundamentom naszej jedności."
 bio.315.a: "Skoncentrujmy się na odporności fizycznej."
 bio.315.b: "Wydajność kognitywna jest kluczowa."
 bio.325.name: "Dalej niż teraźniejszość"
 bio.325.desc: "W celu zagwarantowania długowieczności i czystości naszego gatunku, musimy rozmnażać się bardziej selektywnie oraz wprowadzić surowsze protokoły badań genetycznych.\n\nTylko dokładnie dobierając drony godne niesienia naszego rodowodu wyjdziemy poza ramy naturalnej ewolucji."
 bio.325.desc.wilderness: "W celu zagwarantowania długowieczności i czystości naszej symbiotycznej różnorodności, musimy rozmnażać się bardziej selektywnie oraz wprowadzić surowsze protokoły badań genetycznych.\n\nTylko dokładnie dobierając odpowiednie symbionty posiadające cechy przydatne dla zbiorowości, wyjdziemy poza ramy naturalnej ewolucji."
 bio.325.a: "Wyodrębnimy najinteligentniejsze jednostki."
 bio.325.b: "Rozmnażamy się, aby powiększać nasze imperium."
 bio.330.name: "Umiejętny rozwój"
 bio.330.desc: "Korzyści płynące z modyfikacji genetycznych zapewnią nam przyszłość, ale każdy [target.GetIndividualName], jego rola i najmniejsze działania muszą być zgodne z naszą wizją czystości.\n\nPrzed nami krytyczna decyzja: chcemy optymalizowania w celu osiągnięcia doskonałości, ale kosztem zdolności adaptacji? A może przyjmiemy szerszą strategię i postawimy na infrastrukturę niezbędną do prowadzenia tych działań?"
 bio.330.a: "Naszym jedynym celem musi być osiągnięcie czystości."
 bio.330.b: "Musimy poświęcić czas na rozwój infrastruktury."
 bio.335.name: "Usuwanie niedoskonałości"
 bio.335.desc: "Wyodrębniliśmy zbiór niedoskonałości genetycznych oraz anomalii, którymi charakteryzuje się [target.GetGestaltEntityName].\n\nDążąc do wyższych celów, musimy usunąć te wadliwe cechy i odebrać ewolucji naturalnej kontrolę nad naszym rozwojem fizycznym."
 bio.335.a: "Wytrzebienie słabych wzmocni całość."
 bio.335.b: "Zmodyfikujmy wadliwe osobniki."
 bio_335_opinion_tt: "Opinia imperiów §Yżyczliwych§! o nas zmieni się o §R-50§!."
 ### ADDITIONAL RANDOM EVENTS
 ## HIVE
 #CLONING
 bio.340.name: "Za dużo klonów!"
 bio.340.desc: "Nasze placówki klonowania działają wydajniej niż początkowo zakładaliśmy, więc obecnie mamy nadmiar klonów.\n\nIntegracja tak wielu dronów przysparza wielu problemów."
 bio.340.a: "Nowe osobniki w roju powinny migrować."
 bio.340.b: "Zwiększmy produkcję. Wykorzystajmy te klony."
 bio.350.name: "Puste skorupy"
 bio.350.desc: "Awaria w jednym z naszych głównych centrów klonowania wpłynęła na wiele dronów. W jakiś sposób w procesie powielania pojawiły się zanieczyszczenia genetyczne, które doprowadziły do powstania partii klonów nie posiadających zdolności myślenia.\n\nWłaściwie były to przedmioty biologiczne, pozbawione świadomości i wyższych funkcji kognitywnych. Placówka będzie pracowała ze zmniejszoną wydajnością, do czasu usunięcia problemu."
 bio.350.a: "To... Kojące."
 bio.350.a.tt: "§Y[owner.capital_scope.GetName]§!: powstało 100 £pop£ §Hpopulacji przedrozumnych§!."
 bio.350.b: "Wyhodujmy nową partię."
 bio.365.name: "Metafizyka roju"
 bio.365.desc: "Świadomość zadała pytanie: Czy pewnego dnia klony zastąpią nas wszystkich?\n\nNasze pierwsze działania na polu powielania genetycznego idą tak dobrze, że zaczęliśmy się zastanawiać, czy ta bardziej wydajna metoda rozmnażania może kiedyś zastąpić naszą naturalną.\n\nJeżeli tak, to pewnego dnia w roju nie będzie już żadnych oryginalnych dawców, a same klony klonów klonów... Co to oznacza dla naszego gatunku? To pytanie bez odpowiedzi, ale budzące niepokoje. Niemniej musimy je sobie zadać."
 bio.365.a: "Nawet to pytanie ma jakąś wartość."
 bio.365.b: "Takie pytania niepotrzebnie nas rozpraszają."
 ### ADDITIONAL RANDOM EVENTS
 ## HIVE
 #MUTATION
 bio.375.name: "Pogłębiona więź"
 bio.375.desc: "Dokonaliśmy odkrycia. Manipulując określonymi genami, możemy poszerzyć naszą świadomość tak, aby nasze zmysły stały się o wiele ostrzejsze, przekraczając ograniczenia naszego gatunku.\n\nWprowadzenie tych mutacji w całym roju będzie wymagało dużych ilości energii, ale dzięki temu pogłębimy naszą wiedzę o wszechświecie i naszym w nim miejscu."
 bio.375.a: "Koszt jest znikomy. Działajmy."
 bio.375.b: "Nie możemy się spieszyć."
 mod_planet_evaluators_physics_research_produces_add: "£physics_research£ $physics_research$ za: $pop_group_unit$ x [evaluator.GetIcon] [evaluator.GetNamePlural]"
 bio.380.name: "Emocjonalne przeciążenie"
 bio.380.desc: "Całe sekcje roju doświadczają niekontrolowanych wybuchów złości i emocji, które odbijają się na całej świadomości zbiorowej, co zwiększa frustrację oraz ból odczuwane przez całą wspólnotę.\n\nNiedawno wprowadzona mutacja doprowadziła prawdopodobnie do przebodźcowania neurocytów w ośrodkach kontroli agresji naszych dronów, co zachwiało równowagą emocjonalną roju. Częściej dochodzi do konfliktów, niektóre drony przestają wykonywać swoje zadania i atakują inne osobniki."
 bio.380.a: "Jako jedność powinniśmy być uważni."
 bio.380.b: "Wykorzystajmy ten gniew."
 bio.385.name: "Nietolerancja środowiskowa"
 bio.385.desc: "Choć niektóre mutacje pobudzają nas i rozwijają, inne przynoszą nieprzyjemne skutki uboczne.\n\nUlepszenia mające zwiększyć naszą długowieczność są wprowadzane z powodzeniem, jednak te same mutacje zmniejszają naszą tolerancję na ekstremalne warunki klimatyczne.\n\nCi z nas, którzy przeszli te modyfikacje biologiczne, mają problemy z dostrajaniem wewnętrznych układów termoregulacyjnych, a cały rój odczuwa związany z tym dyskomfort."
 bio.385.a: "Musimy ulepszyć nasze systemy ochrony pogodowej."
 bio.385.b: "Kiedy się zmieniamy, zmieniają się też nasze preferencje środowiskowe."
 uncomfortable_drones: "Złe samopoczucie dronów"
 uncomfortable_drones_desc: "Nasze drony zmagają się z dyskomfortem wywołanym przez mutację."
 bio.390.name: "Mięśnie albo umysł"
 bio.390.desc: "Odkryliśmy dwie mutacje. Jedna wersja zwiększa siłę pomniejszych dronów, co przekłada się na wzrost wydajności ich pracy. Druga zwiększa inteligencję zaawansowanych dronów, dzięki czemu stają się lepszymi strategami i sprawniej rozwiązują problemy.\n\nRój musi zdecydować, którą drogą podąży."
 bio.390.a: "Siła to rozwój."
 bio.390.b: "Myślimy, więc się rozwijamy."
 ### ADDITIONAL RANDOM EVENTS
 ## HIVE
 #ANY APPROACH
 bio.405.name: "Chory genom"
 bio.405.desc: "Ledwie udało się nam zatrzymać niespodziewaną epidemię choroby genetycznej.\n\nManipulowanie własną biologią doprowadziło do niepożądanych mutacji naszego DNA, przez co [target.GetIndividualNamePlural] mają uszkodzenia fizyczne.\n\n[target.GetIndividualNamePlural] są na kwarantannie, teraz musimy postanowić, co dalej."
 bio.405.a: "Jeśli [target.GetIndividualNamePlural] znikną, tym samym zniknie epidemia."
 bio.405.b: "Zbadajmy zakażonych."
 bio.410.name: "Rozkład komórek"
 bio.410.desc: "Błąd w obliczeniach spowodował degradację genetycznej spójności dużej części naszych dronów. Niestety nie wiemy jeszcze, kiedy doszło do tej pomyłki.\n\nPo ponownym sprawdzeniu obliczeń biologicznych wykorzystywanych w przyspieszaniu naszego gatunku i zmianie niektórych potencjalnie kłopotliwych procedur, możemy działać dalej.\n\nAle jeszcze nie mamy pewności, czy rzeczywiście naprawiliśmy błąd, czy - co gorsza - wprowadziliśmy kolejne."
 bio.410.desc.wilderness: "Błąd w obliczeniach spowodował degradację genetycznej spójności dużej liczby naszych symbiontów. Niestety nie wiemy jeszcze, kiedy doszło do tej pomyłki.\n\nPo ponownym sprawdzeniu obliczeń wykorzystywanych do adaptacji naszych elementów i zmianie niektórych źle zrównoważonych mazi zawiesin enzymatycznych, możemy działać dalej.\n\nAle jeszcze nie mamy pewności, czy rzeczywiście naprawiliśmy błąd, czy - co gorsza - wprowadziliśmy kolejne."
 bio.410.a: "Dowiemy się z kolejnych wydarzeń."
 bio.410.b: "Wstrzymajmy eksperymenty."
 bio.410.b.tt: "$bio.235.a.tt$"
