 death_world: "Świat śmierci"
 death_world_desc: "Choć technicznie nadaje się do zamieszkania, życie na tym świecie to prawdziwy koszmar. Każdy miejscowy organizm, od fauny po florę, przez niepozorne stworzenia, jest bardziej zabójczy niż większość przerażających drapieżników na naszej ojczystej planecie."
 d_lethal_ecosphere_blocker: "£blocker£ Zabójcza ekosfera"
 d_lethal_ecosphere_blocker_desc: "Obiekty eksperymentów i osobniki będące wynikami tych badań, których pozbyła się frakcja wojenna, nieustannie walczą o przetrwanie w ramach krwawej selekcji nienaturalnej. Ten niezwykle wrogi poligon jest zabójczy dla większości żołnierzy, ale ocaleni z tej jatki z pewnością stają się niezłomnymi maszynami do zabijania."
