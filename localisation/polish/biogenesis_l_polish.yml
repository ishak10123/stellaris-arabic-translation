 ###Starlit Citadel
 origin_starlit_citadel: "Cytadela Gwiezdnego Blasku"
 origin_starlit_citadel_desc: "Na skraju ojczystego układu tej cywilizacji znajduje się tajemniczy portal - brama, przez którą wlatują kolejne fale wrogich istot. Te inwazje są równie nieprzewidywalne co nieuchronne - to zmusza społeczność do posługiwania się jej największym osiągnięciem technologicznym, którym jest §H$dsc_name$§!."
 origin_tooltip_starlit_citadel_effects: "- $HOME_SYSTEM$ $TABBED_NEW_LINE$- ['concept_deep_space_bastion'] na skraju studni grawitacyjnej $TABBED_NEW_LINE$- ['concept_wormhole', $BYPASS_STARLIT_WORMHOLE$] prowadzi do nieznanego układu $NEW_LINE$- $HOMEWORLD$ $TABBED_NEW_LINE$- £building£ ['building:building_citadel_uplink'] $TABBED_NEW_LINE$- ['concept_bioship_remains', £blocker£ $d_bioship_remains$] $TABBED_NEW_LINE$- ['concept_invasion_site', £blocker£ $d_invasion_site$]: +2 $NEW_LINE$- $ADDITIONAL_TECHNOLOGIES_STRING$ ['concept_deep_space_citadel_tech',£engineering_research£ $tech_deep_space_citadel$]"
 START_SCREEN_STARLIT_CITADEL: "Nie zawsze byliśmy tak czujni.\n\n[Capital.GetName] to bogaty świat, kiedyś byliśmy pokojowym i zadowolonym ludem. Ale wszystko zmieniło się, gdy pojawił się ten portal.\n\n[GetInvadersLower] zjawili się bez ostrzeżenia. Zniszczyli nasze miasta, splądrowali ziemie i zniknęli równie szybko, jak przybyli. Mieliśmy nadzieję, że już nigdy nie wrócą. Ale inwazje powtarzały się raz za razem, każdy atak był brutalniejszy od poprzedniego.\n\nTeraz przygotowujemy się do wyruszenia w galaktykę, nasi $job_skywatcher_plural$ są gotowi. Wysoko nad naszym światem czeka $dsc_name$, niezłomna zapora, z którą będą musieli zmierzyć się [GetInvadersLower] i każdy, kto chciałby nas zniszczyć."
