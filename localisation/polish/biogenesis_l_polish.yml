 voidspawn_colony_mod: "Niepokoje kolonialne"
 voidspawn_colony_mod_desc: "Światy ulegają rozkładowi w cieniu starszego pomiotu próżni."
 VOIDSPAWN_FORCE_DECLINE: "§RMalejąca populacja§!"
 elder_voidspawn_chain_title: "Rozszalały pomiot próżni"
 elder_voidspawn_chain_desc: "Galaktykę przemierza duży pomiot próżni. Chce zabijać duże behemoty, być może zostawi nas w spokoju, jeśli zabijemy je za niego.\n\nCel: Znaleźć i zabić wszystkie behemoty 4. poziomu w galaktyce."
 behemoth_victory_chain_title: "Król potworów"
 behemoth_victory_chain_desc: "Po zakończeniu scalenia umysłów do realizacji celów zostało już tylko kilka kroków. Musimy przywyknąć do naszego nowego, wspólnego ciała i dalej przenosić do niego umysły naszego ludu. Ale najważniejsze jest, byśmy zmiażdżyli każdego rywala, kimkolwiek by nie był.\n\n§HCELE§!:\n- Znajdź w galaktyce i zabij wszelkie inne behemoty poziomu IV.\n- Ukończ sytuację: bóle rozwojowe.\n- Zgładź starszy pomiot próżni."
 behemoth_transference: "Przeniesienie behemota"
 behemoth_transference_desc: "Więź, która teraz łączy bestię z naszą populacją rzuciła nowe światło na życie planetarne. Jest ono daremne, jeśli porównać je z zespoleniem z bestią. Teraz wszyscy pragną się z nią zjednoczyć, a ona czuje... głód."
