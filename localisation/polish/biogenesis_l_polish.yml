 ### NEW CIVICS ###
 civic_genetic_identification: "Identyfikacja genetyczna"
 civic_genetic_identification_desc: "To społeczeństwo wymaga zarejestrowania każdego urodzonego obywatela w indeksie genetycznym, którego używa się na każdym poziomie biurokracji."
 civic_corporate_genetic_identification: "Sekwencyjne zabezpieczenia"
 civic_corporate_genetic_identification_desc: "Sekwencje genetyczne wszystkich klientów i pracowników są zapisywane w bazie danych, z której może korzystać każdy, kto uiści niewielką opłatę. Agencje organów ścigania szeroko korzystają z tej usługi, aby wykrywać niegodziwców poprzez zbadanie nawet śladowych ilości materiału genetycznego."
 civic_corporate_genetic_identification_effects: "- £building£ §Y$building_private_security$§! $megacorp_civic_branch_office_building_effect$"
 councilor_genetic_identification: "Indeksator"
 councilor_genetic_identification_desc: "$TITLE$ odpowiada za utrzymanie i bezpieczeństwo indeksu genetycznego, który gwarantuje szybkie oraz wydajne działanie biurokracji."
 councilor_corporate_genetic_identification: "Broker sekwencji"
 councilor_corporate_genetic_identification_desc: "$TITLE$ ma za zadanie oceniać wnioski o dostęp oraz plany monetyzacji. Może uzyskać identyfikator genetyczny dowolnej osoby."
 civic_crowdsourcing: "Wspólnota źródeł"
 civic_crowdsourcing_desc: "To społeczeństwo uwierzyło, że indywidualna inspiracja to źródło prawdziwych innowacji. Otwarte źródła patentów, otwarte umysły, spontaniczna współpraca i nagrody za innowację budują drogę do rozwoju."
 civic_crowdsourcing_effects: "$t$- Frakcje wytwarzają $r_research$, a nie $r_unity$ $TABBED_NEW_LINE$- Frakcje powstaną w twoim imperium wkrótce po rozpoczęciu gry, lecz produkcja frakcji jest przez pierwszych dziesięć lat zmniejszona"
 civic_corporate_crowdsourcing: "Zdecentralizowane badania i rozwój"
 civic_corporate_crowdsourcing_desc: "Regularne międzywydziałowe konkursy innowacyjności napędzają działalność tej korporacji w dziedzinie badań i rozwoju."
 civic_corporate_crowdsourcing_effects: "$civic_crowdsourcing_effects$ $TABBED_NEW_LINE$- £building£ §Y$building_private_research_initiative$§! $megacorp_civic_branch_office_building_effect$"
 civic_tooltip_not_crowdsourcing: "Nie ma etosu ['concept_crowdsourcing_civics']."
 concept_crowdsourcing_civics: "Wspólnota źródeł"
 concept_crowdsourcing_civics_desc: "Na etosy typu \"$concept_crowdsourcing_civics$\" składają się:$NEW_LINE$- ['civic:civic_crowdsourcing']$NEW_LINE$- ['civic:civic_corporate_crowdsourcing']"
 councilor_crowdsourcing: "Koordynator innowacyjności"
 councilor_crowdsourcing_desc: "$TITLE$ ma za zadanie nadzorować uczciwe korzystanie z patentów i zachęcać do prowadzenia badań zgodnych z technologicznymi celami rządu."
 councilor_corporate_crowdsourcing: "Arbiter idei"
 councilor_corporate_crowdsourcing_desc: "Nie wszystkie projekty są warte inwestowania w nie, a $TITLE$ ma za zadanie oceniać ich przydatność rynkową oraz potencjalne zyski."
 civic_civil_education: "Edukacja cywilna"
 civic_civil_education_desc: "W tym imperium edukacja zastąpiła organy ścigania. Dzięki dogłębnym przygotowaniom i ścisłym korektom działań, wszyscy obywatele są kształceni. Nie ma złych obywateli, tylko źli nauczyciele."
 civic_civil_education_effects: "$t$- Wszyscy £job_enforcer£ ['concept_enforcer', policjanci] zamieniani są na £job_educator£ ['concept_educator', edukatorów] $TABBED_NEW_LINE$Zamienia £building£ ['building:building_precinct_house', komisariaty] na £building£ ['building:building_state_academy', akademie państwowe]"
 councilor_head_of_education: "Kierownik edukacji"
 councilor_head_of_education_desc: "$TITLE$ ma przekazywać wszystkim obywatelom wiedzę niezbędną nie tylko w ich pracy, ale także pomagać im w skomplikowanych sytuacjach życiowych. Dobrzy pedagodzy to gwarancja dobrobytu społeczeństwa."
 educator: "$job_educator$"
 job_educator: "Edukator"
 job_educator_plural: "Edukatorzy"
 job_educator_desc: "Ci czempioni wiedzy zajmują się przygotowywaniem młodzieży - wykonują niezastąpioną pracę, dzięki której każdy obywatel może zmierzyć się z tym, co czeka nas w galaktyce."
 job_educator_effect_desc: "£job_educator£ $job_educator_plural$ zamieniają $r_consumer_goods$ na $r_unity$, zmniejszają £crime£ §Y$PLANET_CRIME_TITLE$§!, zwiększają §Yatrakcyjność etyki imperium§! i tworzą £defense_army£ §Yarmie obronne§!"
 mod_job_educator_add: "Miejsca pracy: $job_educator$"
 building_state_academy: "Akademia państwowa"
 building_state_academy_desc: "Tutaj naucza się rzeczy fundamentalnych dla budowy zdrowego społeczeństwa."
 concept_state_academy: "$building_state_academy$"
 concept_state_academy_desc: "Miejsca pracy: $job_educator$ §G+200§!\n\n$job_educator_effect_desc$\n$h_line$§L$building_state_academy_desc$§!"
 building_center_of_guidance: "Centrum doradcze"
 building_center_of_guidance_desc: "Ten ogromny kompleks zajmuje się każdym aspektem życia społecznego. Znajdujące się tam szkoły oraz obiekty szkoleniowe pozwalają skorygować każde odstępstwo."
 mod_planet_jobs_citizen_produces_mult: "Produkcja zasobów przez populację z pełnymi prawami obywatelskimi"
 civic_hive_familiar_face: "Znajoma twarz"
 civic_hive_familiar_face_desc: "Współpraca jest lepsza niż bezpośrednia konfrontacja. Ten umysł zbiorowy wytworzył drony dyplomatyczne, które naśladują wygląd i zachowania swoich rozmówców."
 civic_wilderness_familiar_face: "$civic_hive_familiar_face$"
 civic_wilderness_familiar_face_desc: "Współpraca jest lepsza niż bezpośrednia konfrontacja. Ta dzicz wytworzyła awatary dyplomatyczne, które naśladują wygląd i zachowania swoich rozmówców."
 civic_hive_familiar_face_effects: "Posłowie i urzędnicy przyjmują formy fizyczne imperiów, do których są przydzielani.\n§YZaufanie§! potrzebne do wykonywania §Ydziałań dyplomatycznych§!: §G-50%§!"
 #Bioship Civics
 civic_hive_shared_genetics: "Wspólna genetyka"
 civic_hive_shared_genetics_desc: "Zmutowany genom tego roju posłużył za fundament do budowy jego statków biologicznych. Jego floty są bezpośrednio połączone z dronami i czerpią siłę z wyjątkowości tego gatunku."
 civic_wilderness_shared_genetics: "$civic_hive_shared_genetics$"
 civic_wilderness_shared_genetics_desc: "Genom tej dziczy zmutował tak, że stanowi odpowiedni fundament do hodowania statków biologicznych. Jej floty są nierozłącznie połączone z innymi symbiontami, dzięki czemu każdy gatunek czerpie siłę od pozostałych."
 civic_hive_shared_genetics_effects: "- Za każdą §Gpozytywną§! główną cechę gatunkową: §G+2,5%§! do kadłubów statków, §R+0,5%§! do utrzymania.\n- Za każdą §Rnegatywną§! główną cechę gatunkową: §G+1,5%§! do szybkostrzelności okrętów, §R+0,5%§! do utrzymania."
 shared_genetics_fire_rate: "$civic_hive_shared_genetics$: szybkostrzelność"
 shared_genetics_fire_rate_desc: "Nasze okręty posiadają przebodźcowane ośrodki agresji, zasilane mocną mieszanką złości i hormonów."
 shared_genetics_hull: "$civic_hive_shared_genetics$: kadłub"
 shared_genetics_hull_desc: "Masa mięśniowa i kostna naszych statków to odbicie genetycznej dominacji naszego gatunku."
 civic_hive_aerospace_adaptation: "Adaptacja powietrzna i kosmiczna"
 civic_hive_aerospace_adaptation_desc: "Biologiczne statki tego kolektywu wyjątkowo dobrze radzą sobie podczas lotów w atmosferze. Mogą realizować zadania bezpośredniego wsparcia powietrznego, a nawet wspomagać logistykę planetarną."
 civic_hive_aerospace_adaptation_effects: "- §YStatki biologiczne§! na orbicie §Gsojuszniczych§! kolonii są o §G50%§! tańsze w utrzymaniu.\n- §GSojusznicze§! kolonie z §Ybiologicznymi statkami§! na orbicie mają większą §Yszybkość budowy§!, §Yudogodnienia§!, §Yszybkość usuwania przeszkód§! i potencjalnie §Ywydajność§!, zależnie od rozmiaru floty.\n- §YStatki biologiczne§! na orbicie §Rwrogich§! kolonii są tańsze w utrzymaniu o §G85%§!."
 aa_ship_upkeep_friendly: "$civic_hive_aerospace_adaptation$"
 aa_ship_upkeep_bombing: "$civic_hive_aerospace_adaptation$"
 aa_ship_planet_support_1: "$civic_hive_aerospace_adaptation$"
 aa_ship_planet_support_1_desc: "Biologiczne statki na orbicie tej planety rutynowo wlatują w atmosferę i opuszczają ją, żeby odpocząć, pożywić się i pomóc dronom na powierzchni."
 aa_ship_planet_support_2: "$civic_hive_aerospace_adaptation$"
 aa_ship_planet_support_2_desc: "$aa_ship_planet_support_1_desc:$"
 aa_ship_planet_support_3: "$civic_hive_aerospace_adaptation$"
 aa_ship_planet_support_3_desc: "$aa_ship_planet_support_1_desc:$"
 aa_ship_planet_support_4: "$civic_hive_aerospace_adaptation$"
 aa_ship_planet_support_4_desc: "$aa_ship_planet_support_1_desc:$"
 civic_machine_stalwart_network: "Niezłomna sieć"
 civic_machine_stalwart_network_desc: "Ta mechaniczna inteligencja specjalizuje się w wojskowych procedurach wojskowych, łączy twardą obronę z protokołami uderzeń i odskoków."
 defensive_stations_tracking_add: "$t$- Namierzanie przez stacje obronne i bazy gwiezdne"
 defensive_stations_tracking_add_tt: "$defensive_stations_tracking_add$: $VARIABLE|0=+$"
 defensive_stations_weapon_range_mult: "Zasięg broni stacji obronnych i baz gwiezdnych:"
 defensive_stations_weapon_range_mult_tt: "$defensive_stations_weapon_range_mult$: $VARIABLE|1%=+$"
 #Bodysnatcher
 civic_hive_bodysnatcher: "Porywacz ciał"
 civic_hive_bodysnatcher_desc: "Liczy się wnętrze. Ten rój specjalizuje się w infiltracji i przejmuje ciała pechowych istot organicznych. W miarę jak rośnie liczba marionetek, cywilizacja gospodarzy zostaje nieuchronnie wchłonięta przez kolektyw."
 civic_hive_bodysnatcher_effects: "Zaczniesz grę z §Y1000§! zasymilowanych £pop£ populacji i zdolnością §Yasymilacji§! istot organicznych z umysłem zbiorowym.\nMa dostęp do misji szpiegowskiej: ['concept_operation_bodysnatcher_prepare_invasion']\nOtrzymuje dodatkowe £pop£ populacje za misję szpiegowską: ['concept_operation_smuggle_pops']"
 civic_hive_bodysnatcher_secondary_species: "Oszuści"
 NAME_Bodysnatchers: "Porywacze ciał"
 operation_bodysnatcher_prepare_invasion: "Przygotowanie inwazji"
 operation_bodysnatcher_prepare_invasion_desc: "Nasi sąsiedzi mają bardzo plastyczne umysły. Łatwiej włączymy ich do naszej wspólnoty, jeśli wyślemy tam przygotowane ciała, już zintegrowane z naszą świadomością."
 operation_bodysnatcher_prepare_invasion_on_success: "$IF_SUCCESSFUL|E$\nOtrzymamy pomoc agentów działających w szeregach wroga, gdy następnym razem wypowiemy wojnę imperium §Y[Target.GetName]§!."
 operation_invasion_prepared: "$TRIGGER_FAIL$ §RJuż przygotowaliśmy inwazję na ten kraj. Żeby ją rozpocząć, musimy wypowiedzieć wojnę.§!"
 operation_invasion_impossible: "$TRIGGER_FAIL$ §RTen kraj jest zbyt dobrze przygotowany do prób infiltracji. Nie możemy rozpocząć tej operacji!§!"
 concept_operation_bodysnatcher_prepare_invasion: "$operation_bodysnatcher_prepare_invasion$"
 concept_operation_bodysnatcher_prepare_invasion_desc: "Operacja, w której zasymilowane populacje gatunków przeciwnika przenikają do imperium i po wybuchu wojny dokonają masowego sabotażu."
 bio.800.name: "Nowe miejsce pracy"
 bio.800.desc: "Przejęte ciała trzeba umieścić w strategicznych miejscach, nim zaczniemy realizację naszego wielkiego planu. Dzięki pozyskanym wcześniej danym wywiadowczym, wiemy o słabo obsadzonych bazach i kiepsko bronionych planetach, które mogą stać się pierwszymi celami. Niebawem weźmiemy się do pracy."
 bio.805.name: "Dodatkowy personel"
 bio.805.desc: "Prace przebiegają bez zakłóceń, nasze ciała znalazły więcej gospodarzy i umocniły swoje zaangażowanie w funkcjonowanie imperium [Target.GetName]. Nasze drony powinny niebawem przejąć wszystkie dociekliwe umysły."
 bio.810.name: "Nowe wakaty"
 bio.810.desc: "Osobniki gatunku [Target.GetSpeciesAdj&genitive], których nie mogliśmy zastąpić, zostały usunięte z zajmowanych stanowisk, dzięki czemu w strukturach imperium §Y[Target.GetName]§! powstało sporo wakatów. Nasze marionetki są gotowe, by otworzyć nam drzwi do pełnej infiltracji, czekają tylko na nasz sygnał."
 bio.815.name: "Nowi rekruci"
 bio.815.desc: "Imperium §Y[From.Target.GetName]§! zostało osłabione. Grunt pod inwazję został przygotowany, musimy tylko określić, ilu tajnych agentów tam wyślemy, by jeszcze bardziej pogłębić infiltrację. Wkrótce wszystko będzie [Owner.GetAdj&genitive]."
 bio.815.tt: "Mamy za mało populacji wrogiego gatunku, by wykonać tę akcję."
 bio.815.a: "Wysłaliśmy tam wszystko, co mogliśmy."
 bio.815.b: "Musimy przejąć ich placówki."
 bio.815.b.tt: "Wyślij §Y100§! £pop£ §Hpopulacji§!.\n$bio.815.reminder$"
 bio.815.c: "Przygotować inwazję na ich planety."
 bio.815.c.tt: "Wyślij §Y300§! £pop£ §Hpopulacji§!.\n$bio.815.reminder$"
 bio.815.d: "Przeniknijmy do ich fortec!"
 bio.815.d.tt: "Wyślij §Y500§! £pop£ §Hpopulacji§!.\n$bio.815.reminder$"
 bio.815.e: "Niech wszyscy staną się nami!"
 bio.815.e.tt: "Wyślij §Y2 tysiące§! £pop£ §Hpopulacji§!.\n$bio.815.reminder$"
 bio.815.reminder: "W następnej wojnie, którą wypowiemy imperium §Y[From.Target.GetName]§! albo którą ono wypowie nam w najbliższych §G10§! latach, wykorzystamy naszych uśpionych agentów."
 bio.825.name: "Inwazja: [From.GetSpeciesNamePlural]"
 bio.825.desc.small: "Zdradzieckie imperium [From.GetName] przeniknęło do naszego państwa. Nasze stacje kosmiczne są osłabione, a wróg już napadł na nasze kolonie. Musimy pozbyć się agentów wroga!"
 bio.825.desc.large: "Początkowo wydawało się, że to jakaś drobna usterka. Wysiadła połowa naszej sieci łączności.\n\nOkazało się jednak, że to podłe imperium [From.GetName] zastąpiło cale sektory naszego kluczowego personelu. Nasze imperium jest podzielone, a kolonie zostały najechane.\n\nNie ufajcie nikomu!"
 #Smuggle pops operation
 operation_smuggle_pops: "Przemyt populacji"
 operation_smuggle_pops_desc: "Nasi agenci przeprowadzą masową ewakuację odizolowanych elementów na terenie imperium [target.GetName]"
 operation_smuggle_pops_on_success: "$IF_SUCCESSFUL|E$\nPrzenieś część £pops£ populacji do swojego imperium."
 smuggle_pops_also_fanatic_egalitarians: "$TRIGGER_FAIL$ §R[Target.GetName] to także fanatyczni egalitarianie, ich lud jest już wolny§!"
 smuggle_pops_not_enough_pops: "$TRIGGER_FAIL$ §R[Target.GetName] mają za mało £pops£ populacji wartych kradzieży§!"
 mod_operation_smuggle_pops_difficulty_add: "Poziom trudności operacji $operation_smuggle_pops$"
 concept_operation_smuggle_pops: "$operation_smuggle_pops$"
 concept_operation_smuggle_pops_desc: "Operacja uprowadzenia populacji celu."
 bio.900.name: "Pozyskiwanie talentów"
 bio.900.desc: "Nasi agenci utworzyli wiele przykrywek i kryjówek, z których monitorują populację imperium [target.GetName]. Dysydenci, samotnicy albo wyjątkowo doświadczone osoby zostaną poddane ocenie i wyznaczone do ewakuacji."
 bio.905.name: "Przypadki zniknięć"
 bio.905.desc: "Nasi agenci zaczęli porywać cele i ukrywać je w dyskretnych miejscach. Kiedy jest to możliwe, organizuje się incydenty odwracające uwagę miejscowych władz i ułatwiające zatarcie śladów."
 bio.910.name: "Promy"
 bio.910.desc: "Operacja weszła w fazę krytyczną, wszystkich porwanych należy dyskretnie przetransportować na orbitę. Aktualny plan zakłada synchronizację startów ze wszystkich placówek i przeciążenie sił bezpieczeństwa za pomocą wabików oraz działań dywersyjnych."
 bio.915.name: "Przemyceni"
 bio.915.desc: "Udało się nam wywieźć wiele z naszych celów, ale operacja nie przebiegła gładko, wiele statków z obiecującymi osobami nie zdołało się wydostać."
 bio.915.desc.detected: "$bio.915.desc$\n\nTakie duże migracje populacji nie przeszły niezauważone."
 bio.915.desc.cosmogenesis: "Udało się nam ewakuować wiele z naszych celów, które już zmierzają na Lathe. Ale operacja nie przebiegła gładko, wiele statków z obiecującymi osobami nie zdołało się wydostać."
 bio.915.desc.cosmogenesis.detected: "$bio.915.desc.cosmogenesis$\n\nTakie duże migracje populacji nie przeszły niezauważone."
 bio.915.a: "Zrobiliśmy, co w naszej mocy."
 bio.915.b: "Skoncentrujmy się na uwolnieniu innych [Root.GetSpeciesAdj&genitive]."
 bio.915.c: "Musimy wydostać więcej osób!"
 bio.915.d: "Przecież [GetSpeciesNamePlural] nie zostawiają swoich."
 bio.915.tt: "Ewakuujmy niepilnowane £pop£ §Hpopulacje§! na odpowiednie światy."
 bio.915.asset.tt: "$bio.915.tt$\nJeżeli imperium §Y[From.Target.GetName]§! nie wiedziało o nas wcześniej, §Rto teraz na pewno się to zmieniło.§!"
 MESSAGE_POPS_SMUGGLED_TITLE: "Skradzione populacje"
 MESSAGE_POPS_SMUGGLED_DESC: "Zdradzieckie imperium $COUNTRY|Y$ przeniknęło na nasze terytorium i porwało naszych obywateli!"
 opinion_smuggled_pops: "Skradziono nam populacje!"
 #Disconnected Drones #
 disconnected_drones_name: "$policy_disconnected_drones$"
 policy_disconnected_drones: "Odłączone drony"
 policy_disconnected_drones_desc: "Możemy postanowić, czy drony odłączone od ich centralnej świadomości będą mogły mieszkać w naszych koloniach."
 disconnected_drones_sustain: "Podtrzymywanie"
 disconnected_drones_sustain_name: "Podtrzymywanie odłączonych dronów"
 disconnected_drones_sustain_desc: "Te drony, choć oddzielone od zbiorowej świadomości, można utrzymać przy życiu.\n\n§EOdblokowuje §Yrodzaje obywatelstwa§! dla odłączonych dronów§!"
 disconnected_drones_purge: "Eksterminacja"
 disconnected_drones_purge_name: "Eksterminujmy odłączone drony"
 disconnected_drones_purge_desc: "Prawa istot świadomych nie dotyczą istot pozbawionych własnego rozumu. Bez kierującej nimi centralnej świadomości te drony to praktycznie tylko zwierzęta, a zwierzęta wchodzące nam w drogę to szkodniki.\n\n§EWszystkie odłączone drony mieszkające w naszych koloniach zostaną poddane §Rczystce§!.§!"
 disconnected_drones_purged_citizenship: "$TRIGGER_FAIL$W naszym imperium dokonujemy czystek odłączonych dronów."
 disconnected_drones_kill_themselves_purge_type: "$TRIGGER_FAIL$Populacje tego gatunku oddzielone od ich wspólnej świadomości umierają."
 citizenship_protected_drone: "Chronione drony"
 citizenship_protected_drone_tooltip: "$living_standard_disconnected_drone_tooltip$"
 citizenship_protected_drone_tooltip_delayed: "§L$job_disconnected_drone_desc$§!"
 citizenship_symbiotic_drone: "Symbiotyczne drony"
 citizenship_symbiotic_drone_tooltip: "$living_standard_symbiotic_drone_tooltip$"
 citizenship_symbiotic_drone_tooltip_delayed: "§LTe drony, oddzielone od ich zbiorowej świadomości, mogą nas wspomagać w naszych koloniach.§!"
 citizenship_exploited_drone: "Wykorzystywane drony"
 citizenship_exploited_drone_tooltip: "$living_standard_exploited_drone_tooltip$"
 citizenship_exploited_drone_tooltip_delayed: "§LTe drony, oddzielone od ich zbiorowej świadomości, są podatne na manipulację i można zmusić je do uległości.§!"
 living_standard_disconnected_drone: "Ochrona"
 living_standard_disconnected_drone_tooltip: "Populacje tego gatunku mogą pracować w £building£ §Ykosmicznych zoo§!"
