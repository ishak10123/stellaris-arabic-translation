 unlocks_ship_2_bio: "Odblokowuje technologię statków §Ydręczyciel§! i §Ytkacz§! upadłego imperium.\n"
 menp_cosmo_ship_2_desc_bio: "Zniekształcając relację czasu i przestrzeni, te jednostki przełamują zwyczajne ograniczenia. Ich niewielkie konstrukcje skrywają zdolności, którym nie dorówna żaden statek działający w zgodzie z prawami fizyki."
 menp_cosmo_ship_3_desc_bio: "$tech_cosmogenesis_harbinger_desc$"
 unlocks_ship_3_bio: "Odblokowuje technologię statku §Yzwiastun§! upadłego imperium"
 menp_cosmo_ship_4_desc_bio: "$tech_cosmogenesis_stinger_desc$"
 unlocks_ship_4_bio: "Odblokowuje technologię statku §Ytytana grotu§! upadłego imperium"
 tech_cosmogenesis_mauler: "Szyfrowy dręczyciel"
 tech_cosmogenesis_mauler_desc: "Dzięki organicznemu transcendentalizmowi wymiarowo-czasoprzestrzennemu ten dręczyciel jest większy w środku, a jego niewielka konstrukcja skrywa gęstą plątaninę mięśni. Może kąsać bardziej zabójczo, niż pozwalają prawa fizyki."
 TECH_UNLOCK_COSMO_MAULER_CONSTRUCTION_TITLE: "§HOdblokowuje typ statku:§! szyfrowy dręczyciel"
 TECH_UNLOCK_COSMO_MAULER_CONSTRUCTION_DESC: "§HSzyfrowy dręczyciel§!\n$tech_cosmogenesis_mauler_desc$"
 tech_cosmogenesis_weaver: "Tkacz dylematu"
 tech_cosmogenesis_weaver_desc: "Tkacz dylematu, wyposażony w baterie broni wsparcia, które prześcigają jego widoczną anatomię, zmienia normy obowiązujące w przestrzeni. Ta jednostka może w pojedynkę odmieniać losy bitew."
 TECH_UNLOCK_COSMO_WEAVER_CONSTRUCTION_TITLE: "§HOdblokowuje typ statku:§! tkacz dylematu"
 TECH_UNLOCK_COSMO_WEAVER_CONSTRUCTION_DESC: "§HTkacz matrycy§!\n$tech_cosmogenesis_weaver_desc$"
 tech_cosmogenesis_harbinger: "Zwiastun labiryntu"
 tech_cosmogenesis_harbinger_desc: "Te zwiastuny umieszczają swoje pojazdy szturmowe w połączonych ze sobą wymiarach kieszonkowych, każdy statek jest labiryntem niesamowitych hangarów, które mogą wygenerować siłę ognia porównywalną z całą flotą."
 TECH_UNLOCK_COSMO_HARBINGER_CONSTRUCTION_TITLE: "§HOdblokowuje typ statku:§! zwiastun labiryntu"
 TECH_UNLOCK_COSMO_HARBINGER_CONSTRUCTION_DESC: "§HZwiastun labiryntu§!\n$tech_cosmogenesis_harbinger_desc$"
 tech_cosmogenesis_stinger: "Nieodgadniony grot"
 tech_cosmogenesis_stinger_desc: "Ten grot posiada tyle systemów uzbrojenia, że jego źródło zasilania nie powinno radzić sobie z ich zapotrzebowaniem. A jednak ta jednostka działa i strzela. Bez przerwy."
 TECH_UNLOCK_COSMO_STINGER_CONSTRUCTION_TITLE: "§HOdblokowuje typ statku:§! nieodgadniony grot"
 TECH_UNLOCK_COSMO_STINGER_CONSTRUCTION_DESC: "§HNieodgadniony grot§!\n$tech_cosmogenesis_stinger_desc$"
