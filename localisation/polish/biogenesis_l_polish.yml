 ### Behemoth Crisis ###
 ap_behemoths: "Furia behemota"
 ap_behemoths_desc: "Najgroźniejsze drapieżniki w galaktyce nie podlegają takim żałosnym ograniczeniom. Zgodnie z tą zasadą odrzucimy ograniczające nas słabości biologiczne i staniemy się siłą natury."
 must_use_bioships: "£trigger_no£ Wymaga zestawu okrętów §Ybiologicznych§!."
 behemoth_crisis_chain_title: "Kryzys behemotów"
 behemoth_crisis_chain_desc: "Gwiazdy to nic więcej jak paliwo dla naszego gniewu, a spokój to gleba, na której rozkwita nasza ambicja. Sprzeciwimy się naturalnemu porządkowi, stworzymy potężną i niepowstrzymaną bestię, która zmieni kształt kosmosu."
 crisis_behemoth_level_1: "§HObawa§!"
 crisis_behemoth_level_1_desc: "Poziom 1. kryzysu"
 crisis_behemoth_level_2: "§HRyzyko§!"
 crisis_behemoth_level_2_desc: "Poziom 2. kryzysu"
