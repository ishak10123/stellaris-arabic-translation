 incubating_behemoth_modifier_desc: "Trwa wielka metamorfoza."
 voidspawn_boss_invincible: "Nieustraszony władca bestii"
 voidspawn_boss_invincible_desc: "Ponoć nigdy nie zabito dojrzałego pomiotu próżni. Największe szanse zatrzymania go mamy, zabijając jego zdobycz."
