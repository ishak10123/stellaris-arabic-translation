 #Siege of the Citadel Event Chain
 bio.2005.name: "Nietypowe fluktuacje"
 bio.2005.desc: "Nasi $job_skywatcher_plural$ poinformowali o niepokojącym zdarzeniu.\n\nWykryli niedawno subtelne, ale jednoznaczne fluktuacje portalu w układzie §Y[Root.Capital.System.GetName]§!. W przeszłości podobne zakłócenia miały miejsce tuż przed pojawieniem się wrogich okrętów biologicznych.\n\nJeżeli te wskazania się potwierdzą, w najbliższych miesiącach możemy spodziewać się następnego ataku. Przetrwanie naszego społeczeństwa ponownie zależy od niezłomności naszych obrońców."
 abandoned_hatchery_chain_1: "Oblężenie cytadeli"
 abandoned_hatchery_chain_1_title: "$abandoned_hatchery_chain_1$"
 abandoned_hatchery_chain_1_desc: "Od dziesięcioleci atakują nas [GetInvadersLower]. Nasza $starbase_deep_space_citadel_1$ stanowi pierwszą linię obrony, ale prawdziwe bezpieczeństwo osiągniemy poznając prawdę o naszych wrogach.\n\nKażde odkrycie przybliża nas do dnia, w którym będziemy mogli uderzyć na ich terytorium i raz na zawsze zakończyć oblężenie."
 bio.2015.name: "Szczątki wroga"
 bio.2015.desc: "Szczątki pozostałe po zniszczonej flocie biologicznej dryfują złowieszczo przez układ §Y[Root.Capital.System.GetName]§!. Są powykręcane i osmalone, ale i tak zachowało się tam sporo materiału organicznego, co daje nam rzadką okazję do przeprowadzenia badań.\n\nDzięki dokładnej analizie poznamy tajemnice groteskowej budowy tych jednostek, a może nawet dowiemy się czegoś o enigmatycznym portalu, z którego przybywają."
 PROJECT_HATCHERY_SHIP_REMAINS: "Badanie szczątków statku biologicznego"
 PROJECT_HATCHERY_SHIP_REMAINS_DESC: "Szczątki floty najeźdźców ([GetInvadersLower]) to rzadka okazja do przeprowadzenia badań. Możemy uzyskać z nich wiele informacji, które ułatwią nam przetrwanie."
 bio.2015.a: "W końcu jakiś postęp."
 bio.2020.name: "Wróg przeanalizowany"
 bio.2020.desc: "Po drobiazgowych badaniach wraków biologicznych w układzie §Y[Root.Capital.System.GetName]§!, nasi [Root.GetScientistPlural] uważają, że znaleźli klucz do zrozumienia portalu, który czai się na skraju naszego układu.\n\nGłęboko w tkankach istot znaleziono pewien wzór organiczny, który zdaje się rezonować z fluktuacjami portalu. Odtwarzając tę częstotliwość, powinniśmy zdołać przedostać się przez ową tajemniczą szczelinę.\n\nNależy kontynuować badania, ale już wiemy, że po raz pierwszy mamy w zasięgu ręki możliwość uderzenia na terytorium wroga."
 abandoned_hatchery_chain_2: "$abandoned_hatchery_chain_1$"
 abandoned_hatchery_chain_2_title: "$abandoned_hatchery_chain_1$"
 abandoned_hatchery_chain_2_desc: "Jesteśmy o krok bliżej do poznania tajemnic portalu. Przejście na drugą stronę wciąż jest niemożliwe, ale mamy wiedzę potrzebną do stworzenia niezbędnej technologii.\n\nTym, czego potrzebujemy, żeby uderzyć na terytorium wroga jest §Y$tech_wormhole_stabilization$§!."
 bio.2025.name: "Kolebka wroga"
 bio.2025.desc: "Dzięki niedawnemu przełomowi naukowemu (§Y$tech_wormhole_stabilization$§!) mogliśmy zajrzeć do układu §Y[event_target:starlit_sealed_system.GetName]§!.\n\nPo drugiej stronie czeka na nas agresywna flota okrętów biologicznych oraz potężnie umocniona baza gwiezdna. Należy zachować szczególną ostrożność.\n\nZnaleźliśmy kolebkę wroga."
 abandoned_hatchery_chain_3: "$abandoned_hatchery_chain_1$"
 abandoned_hatchery_chain_3_title: "$abandoned_hatchery_chain_1$"
 abandoned_hatchery_chain_3_desc: "Znaleźliśmy kolebkę naszego wroga, ale jeżeli chcemy poznać jego tajemnice, musimy zmierzyć się z siłami obronnymi.\n\nTo nie będzie łatwa walka, ale po jej zakończeniu wreszcie będziemy mogli zbadać układ §Y[event_target:starlit_sealed_system.GetName]§!."
 bio.2027.name: "Zmierzch strachu"
 bio.2027.desc: "Flota strzegąca układu §Y[starlit_sealed_system.GetName]§! została zniszczona. Tuż przed końcem walki odebraliśmy przerażającą transmisję z tamtejszej bazy gwiezdnej, którą właśnie przetłumaczyliśmy:\n\n§H\"...całkowicie utraciliśmy kontrolę! Statki same się rozmnażają! Prosimy, kimkolwiek jesteście, uratujcie nas!\"§!\n\nOd tamtego czasu nie było kolejnych prób połączenia. Jeżeli rzeczywiście zwyciężyliśmy, to miejsce koncentracji sił wroga otwiera przed nami ogromne możliwości strategiczne. Nowa $starbase_deep_space_citadel_1$ może pewnego dnia zalśnić w świetle, które emituje §Y[starlit_sealed_system.GetName]§!, dzięki czemu takie zagrożenie już nigdy nie zawiśnie nad naszą cywilizacją."
 bio.2027.a: "Wreszcie nie jesteśmy oblegani."
 citadel_siege_lifted: "Koniec oblężenia"
 citadel_siege_lifted_desc: "Nasi nieustraszeni obrońcy pokonali wroga ([GetInvadersLower]); wreszcie skończyło się długie oblężenie."
 citadel_siege_lifted_machine: "$citadel_siege_lifted$"
 citadel_siege_lifted_machine_desc: "$citadel_siege_lifted_desc$"
 abandoned_hatchery_chain_4: "$abandoned_hatchery_chain_1$"
 abandoned_hatchery_chain_4_title: "$abandoned_hatchery_chain_1$"
 abandoned_hatchery_chain_4_desc: "Przeklęci [GetInvadersLower] zostali usunięci z układu §Y[starlit_sealed_system.GetName]§!, ale sytuacja tutaj wygląda zupełnie inaczej, niż oczekiwaliśmy.\n\nZdaje się, że po naszych ciemiężcach został tylko jakiś zdziesiątkowany świat."
 PROJECT_BIOMECHANICAL_WORLD: "Ojczyzna wroga"
 PROJECT_BIOMECHANICAL_WORLD_DESC: "Świat macierzysty naszych wrogów ([GetInvadersLower]). Kim oni byli i czego od nas chcieli?"
 bio.2030.name: "Biomechaniczna zaraza"
 bio.2030.desc: "§Y[event_target:biomechanical_world_target.GetName]§! to otwarty grób.\n\nDominujący gatunek tej planety został zdziesiątkowany przez dziwne, agresywne organizmy. Dalsze badania wykazały, że nie były to naturalne formy życia, ale maszyny biologiczne, które najprawdopodobniej są hodowane, a nie budowane.\n\nCzy to możliwe, że ci, którzy stworzyli te istoty, zostali zniszczeni przez własne dzieło? Czy nasz wróg mógł nie mieć pojęcia o atakach na nas, bo były prowadzone przez te organizmy? A może nawet nie wiedział o naszym istnieniu?\n\nJedno jest pewne: cokolwiek przedsięwzięli, żeby zahamować epidemię, zniszczyło ich oraz ich automatyczne abominacje."
 bio.2030.a: "Zatem nie byliśmy jedynymi ofiarami..."
 smarter_hatchery: "Ulepszone floty"
 smarter_hatchery_desc: "Uczą się... Adaptują... Nadchodzą..."
 bio.2030.tt: "\n§EOdblokowuje miejsce w radzie:§!\n§H$t$$councilor_warden_of_the_citadel$§!\n$tt$$COUNCIL_POSITION_MODIFIER_BASE$\n$ttt$$MOD_SHIP_FRIENDLY_TERRITORY_ARMOR_MULT$: §G+1%§!\n$ttt$$mod_shipsize_starbase_deep_space_citadel_1_hull_mult$: §G+2%§!\n$ttt$$mod_starbases_upkeep_mult$: §G-5%§!\n$COUNCIL_POSITION_AVAILABLE_FOR$$t$$commander_with_icon$"
 councilor_warden_of_the_citadel: "Strażnik cytadeli"
 councilor_warden_of_the_citadel_desc: "$TITLE$ to nasz niezłomny opiekun, ma za zadanie umacniać obronę, nadzorować gotowość wojsk i zadbać, żeby cywilizacja nie ugięła się z obliczu żadnego zagrożenia."
 mod_shipsize_starbase_deep_space_citadel_1_hull_mult: "$starbase_deep_space_citadel_1$ $HITPOINTS$"
 mod_shipsize_starbase_deep_space_citadel_2_hull_mult: "$starbase_deep_space_citadel_2$ $HITPOINTS$"
 mod_shipsize_starbase_deep_space_citadel_3_hull_mult: "$starbase_deep_space_citadel_3$ $HITPOINTS$"
 siege_node: "Łącze oblężnicze"
 siege_node_desc: "Nauczyliśmy się. Zaadaptowaliśmy. Nasza obrona wytrzyma."
 bio.2036.name: "Uczą się"
 bio.2036.desc: "Zauważyliśmy niepokojący trend ataków okrętów biologicznych. Każda fala wykazuje się lepszą koordynacją oraz dostosowaną taktyką i metodycznie bada naszą obronę. Według danych z czujników dochodzi do zmian śladów energetycznych i doboru celów, co wskazuje na ewoluujące strategie.\n\nTe istoty, czy to instynktownie, czy też dzięki zbiorowej inteligencji, stają się coraz trudniejszymi przeciwnikami. Jeżeli ten schemat nie ulegnie zmianie, odparcie następnej fali będzie jeszcze trudniejsze."
 bio.2036.a: "Módlmy się za obrońców."
 bio.2036.b: "Niech obrońcy będą silni."
 bio.2036.tt: "Z każdą kolejną falą wroga, którą wyrzuca §Y$STARLIT_WORMHOLE_GALACTIC$§!, nieprzyjacielskie floty są coraz silniejsze."
 bio.2040.name: "Wróg przepadł"
 bio.2040.desc: "Dane telemetryczne pozyskane z portalu wskazują na ważne zdarzenie w układzie §Y[event_target:starlit_sealed_system.GetName]§!: zarówno flota okrętów biologicznych, jak i ich wylęgarnia zostały zniszczone przez nieznaną siłę.\n\nCieszymy się, że [GetInvadersLower] przestali istnieć, ale nie możemy zignorować ryzyka, że jakaś inna siła mogła przejąć układ [event_target:starlit_sealed_system.GetName].\n\nMusimy działać szybko, żeby zająć to strategiczne miejsce, zanim znowu ktoś zacznie nas oblegać."
 bio.2040.a: "Przyjaciele... A może nowi wrogowie?"
 citadel_siege_cancelled: "Koniec oblężenia"
 citadel_siege_cancelled_desc: "Siły wroga ([GetInvadersLower]) zostały zniszczone. Czy to koniec długiego oblężenia?"
