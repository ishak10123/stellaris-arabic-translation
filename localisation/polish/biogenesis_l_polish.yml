 fresh_biosphere: "Świeża biosfera"
 fresh_biosphere_desc: "Nowy świat do smakowania i asymilacji. Osadnicy właśnie katalogują i poznają wszystko, co może dać nam ta planeta."
 fresh_biosphere_tt: "Miesięczny §Y$evolutionary_predators_situation$§! postęp sytuacji: §G+10§!"
 exhausted_biosphere: "Wyczerpana biosfera"
 exhausted_biosphere_desc: "Tutaj już nic nie odkryjemy, osadnicy zajrzeli pod każdy kamień w poszukiwaniu wyjątkowych okazów biologicznych i teraz są zadowoleni."
 exhausted_biosphere_tt: "Miesięczny §Y$evolutionary_predators_situation$§! postęp sytuacji: §G+1§!"
 genetic_soup: "Zupa genetyczna"
 genetic_soup_desc: "Od niepamiętnych czasów na tym świecie powstawały dziwactwa genetyczne. Całe ich rzesze zamieszkują te tereny."
 turtle_world_modifier_evopred: "Świat Nemma: Katologowanie"
 turtle_world_modifier_evopred_desc: "Mieszkańcy tego świata szybko obserwują i zbierają okazy genetyczne miejscowej fauny."
