 bio.1005.name: "Zachowano zdolność"
 bio.1005.desc: "Nasz gatunek staje się coraz bardziej złożony. Przeczesawszy gwiazdy w poszukiwaniu nowego materiału genetycznego, jesteśmy gotowi przyjąć nowy aspekt. Nasi [Owner.GetScientistPlural] ciężko pracowali, dzięki czemu mamy teraz wybór.\n\nPodjęta przez nas decyzja wpłynie na przyszłe pokolenia gatunku [Owner.GetSpeciesAdj&genitive]."
 bio.1005.tt: "Dodanie nowej cechy gatunkowej naszego głównego gatunku"
 bio.1005.pop_growth: "Nasz gatunek musi się szybciej rozwijać!"
 bio.1005.pop_output: "Czy można sprawić, że staniemy się wydajniejsi?"
 bio.1005.leader: "Nasi przywódcy potrzebują wszystkiego, co może dać im przewagę."
 bio.1005.habitability: "Musimy przystosować się do zmieniających się warunków klimatycznych."
 bio.1005.upkeep: "Zmniejszmy koszta utrzymania naszego społeczeństwa."
 bio.1005.humanoid: "Cechy humanoidów mogą zwiększyć naszą wszechstronność."
 bio.1005.mammalian: "DNA ssaków skrywa więcej tajemnic."
 bio.1005.reptilian: "Gady są wyjątkowe."
 bio.1005.avian: "Ptaki mogą dać nam niedoścignioną zwinność."
 bio.1005.arthropoid: "Stawonogi są cudownie chrupkie."
 bio.1005.molluscoid: "Nawet mięczaki mogą nas czegoś nauczyć."
 bio.1005.fungoid: "Fungoidy szybko się rozprzestrzeniają, my też byśmy mogli."
 bio.1005.plantoid: "Wydajność energetyczna plantoidów może okazać się przydatna."
 bio.1005.lithoid: "Litoidy są trudne do wchłonięcia, ale ich DNA otwiera wyborne możliwości."
 bio.1005.necroid: "Nekrotyczne mięso to nadal mięso."
 bio.1005.aquatic: "Adaptacje istot wodnych pozwalają przetrwać nie tylko w morzu."
 bio.1005.toxoid: "Toksoidy są §Gzgorzkniałe§!."
 bio.1005.infernal: "Termofile §Rpłoną§!, ale teraz jesteśmy w stanie sobie z tym poradzić."
 bio.1005.plasmic: "Ustabilizowanie plazmowego DNA byłoby wielkim osiągnięciem."
 bio.1005.leviathan: "Czego moglibyśmy się nauczyć od galaktycznych tytanów?"
 bio.1005.psionic: "Jaki element psionicznego genomu napędza takie zaawansowane zdolności poznawcze?"
 bio.1005.random: "Uwierzmy w chaos, niech prowadzi nas instynkt!"
 bio.1005.no_reward: "Jesteśmy wystarczająco skomplikowani."
 bio.1005.unnatural_selection: "Niech mutacja odblokuje zdolności przekraczające nasze naturalne ograniczenia!"
