 bio.1050.name: "Polowanie"
 bio.1050.desc: "Nasi agenci polują w osadach gatunku [Target.GetSpeciesAdj&genitive] i niebawem uzyskają dostęp do tamtejszych budowli. Wszystko w swoim czasie. Jesteśmy cierpliwą nacją, najlepiej poluje się bez pośpiechu."
 bio.1055.name: "Gotowość"
 bio.1055.desc: "Wytropiliśmy zdobycz. Łowcy, którym poleciliśmy przeniknięcie to tej społeczności ([Target.GetName]), są przekonani, że niebawem dostaną się do dormitorium gatunku [Target.GetSpeciesAdj&genitive] i znajdującego się tam cennego DNA."
 bio.1060.name: "Skok"
 bio.1060.desc: "Nasi agenci są gotowi. Uzyskali dostęp do dormitorium gatunku [Target.GetSpeciesAdj&genitive] i zdobyli odpowiednie przebrania. Oczywiście, jak wszyscy dobrzy łowcy, przygotowali kilka dróg ucieczki, niektóre mniej przyjemne od innych. Przecież wolelibyśmy nie korzystać z kanałów."
 bio.1065.name: "Skradziono geny"
 bio.1065.desc: "Stało się! Nasi agenci uciekli z ogromną ilością materiału genetycznego. Nasza następna mutacja niewątpliwie przyniesie nam ogromne korzyści. Może nawet uznamy, że [From.Target.GetSpeciesNamePlural] to przysmak."
