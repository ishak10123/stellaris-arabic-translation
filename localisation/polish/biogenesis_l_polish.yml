 #STAGE EVENTS
 bio.25.name: "Rozwój zbiorowy" #STAGE ONE
 bio.25.desc.no_options: "[owner.GetGovernmentName] się zmienia. Niebawem poznamy jego pełny potencjał. Wiemy doskonale, że to przedsięwzięcie może dogłębnie zmienić naszą naturę. Zaprojektowanie własnej ewolucji to zadanie o fundamentalnym znaczeniu. Wprowadzone teraz zmiany wpłyną na naszą odległą przyszłość."
 bio.25.desc.has_options: "$bio.25.desc.no_options$\n\nMusimy teraz wybrać priorytet na pierwszy etap naszego rozwoju."
 bio.25.a: "$bio.5.a$"
 bio.25.b: "$bio.5.b$"
 bio.25.c: "$bio.5.c$"
 bio.30.name: "Konwergencja roju" #STAGE TWO
 bio.30.desc.no_options: "Sterowanie naszą ewolucją przyniosło istotną zmianę. Obecnie mamy większą wiedzę o cechach genetycznych, reprodukcji i sekwencjonowaniu DNA.\n\nPunkt kulminacyjny naszej pracy jest w zasięgu ręki.\n\nWkrótce staniemy się istotami, którymi zawsze mieliśmy być."
 bio.30.desc.has_options: "$bio.30.desc.no_options$ Możemy dalej podążać obecną drogą albo wybrać nowy priorytet."
 bio.30.a: "$bio.10.a$"
 bio.30.b: "$bio.10.b$"
 bio.30.c: "$bio.10.c$"
 bio.35.name: "Połączenie ewolucyjne" #STAGE THREE
 bio.35.desc.no_options: "Jesteśmy o krok od wielkiego przełomu ewolucyjnego. Wkrótce musimy podjąć istotną decyzję co do drogi, którą podążymy, aby poznać nasz pełny potencjał ewolucyjny."
 bio.35.desc.has_options: "$bio.35.desc.no_options$\n\nMusimy ponownie określić nasze priorytety."
 bio.35.a: "$bio.15.a$"
 bio.35.b: "$bio.15.b$"
 bio.35.c: "$bio.15.c$"
 genetic_ascension_hive_approach_one: "$genetic_ascension_approach_purity$"
 genetic_ascension_hive_approach_two: "$genetic_ascension_approach_cloning$"
