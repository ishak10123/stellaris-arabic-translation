 district_mindlink: "Metropolia połączenia umysłów"
 district_mindlink_plural: "$district_mindlink$"
 district_mindlink_desc: "Wysokie wieżowce przyćmiewają ośrodki populacji, dając ochotnikom możliwość bezpośredniego porozumiewania się z bestią."
 planet_building_buffer: "Konwersja metropolii"
 planet_building_buffer_desc: "Choć hodowanie wieżowców umysłu, żeby porozumiewać się z bestią, przebiega szybko, musieliśmy przygotować plany awaryjne, aby infrastruktura planety była nieprzerwanie obsługiwana."
 mod_job_transference_volunteer_add: "Miejsca pracy: $job_transference_volunteer$"
 planet_transference_volunteers: "$job_transference_volunteer_plural$"
 job_transference_volunteer: "Przeniesieni ochotnicy"
 job_transference_volunteer_plural: "$job_transference_volunteer$"
 job_transference_volunteer_desc: "Dla wielu umysłowe połączenie z bestią to tylko ulotna myśl. Stała, ale odległa. Jednak dla niektórych potrzeba zjednoczenia się z nią jest nieodparta. Ci ochotnicy stają się przewodnikami, gdy ich umysły są powoli wchłaniane przez zbiorowość bestii."
 job_transference_volunteer_effect_desc: "\n£job_transference_volunteer£ [GetTransferenceVolunteerDrone] wytwarzają £unity£ §Yjedność§!, zwiększają $r_stability$ planety i wzmacniają nasze §Yokręty§!.\n§Y10%§! populacji działających w tym miejscu pracy będzie §Yprzenoszonych§! co 6 miesięcy. Będą ginąć, ale pomnożą produkcję zasobów.\n\n§GPrzeniesione populacje§!: [num_tranferred_pops]"
 mod_job_transference_drone_add: "Miejsca pracy: [GetTransferenceVolunteerDrone]"
 job_transference_drone: "Przeniesienie drona"
 job_transference_drone_plural: "$job_transference_drone$"
 job_transference_drone_desc: "Połączenie naszych umysłów z bestią jest trwałe, ale przeniesienie to powolny proces. Jeżeli nie zachowamy środków ostrożności możemy zniszczyć oba jestestwa i wszystko legnie w gruzach."
 MESSAGE_POPS_TRANSFERRED_TITLE: "Przeniesiono populację."
 MESSAGE_POPS_TRANSFERRED_DESC: "Przeniesiono $VALUE|Y$ pop. Ich umysły żyją teraz w bestii."
 #Crisis Events
 biocrisis.50.name: "Poziom 1: Doświadczenia na embrionach"
 biocrisis.50.desc: "Istniejemy w symbiozie z naszymi biologicznymi nośnikami, lecz zawsze umykało nam coś kluczowego...\n\nInspirując się większymi istotami z próżni, podejmujemy nasze najśmielsze jak dotąd przedsięwzięcie: zrodzić największą, jaka kiedykolwiek istniała. Ten behemot będzie czymś nowym. Szczytową formą życia uformowaną przez celowość raczej niż ewolucję.\n\nNaszym pierwszym wyzwaniem będzie stworzenie ogromnego jaja, zdolnego do wytworzenia życia na bezprecedensową skalę. Pomijając składniki odżywcze, jakie będzie zawierać, potrzebujemy też jego skorupy, aby pochłaniać światło i ciepło oraz przetwarzać gazy na dodatkowe pożywienie."
 biocrisis.50.a: "Nasze dzieło przyćmi nawet gwiazdy."
 biocrisis.55.name: "Poziom 2: samoaktualizacja"
 biocrisis.55.desc: "Podczas gdy statki konstrukcyjne pracowały nad budową zygoty i skorupy na orbicie gazowego olbrzyma, nasz przemysł żywnościowy przetwarzał składniki odżywcze niezbędne do stworzenia białka jaja behemota. Wytworzenie odpowiedniego, zapłodnionego żółtka okazało się jednak znacznie trudniejsze.\n\nZużyliśmy ogromne ilości biomasy ze statków biologicznych i fauny kosmicznej, zanim wreszcie sformowaliśmy odpowiedni fundament DNA, który zamknęliśmy w przełomowej komórce zapłodnieniowej. Próby w skali mikro okazały się udane. Jesteśmy gotowi dokonać skalowania. Wykładniczego. Pozostało tylko zapłodnić nasze olbrzymie jajo.\n\nWkrótce wykluje się najpotężniejsza forma życia, jaką widziała ta galaktyka!"
 biocrisis.55.a: "Oto nadciąga szczytowe osiągnięcie ewolucji."
 biocrisis.60.name: "Pycha i głód"
 biocrisis.60.desc: "Nasze mistrzostwo genomu nie ma sobie równych, zaś dokonaniami przewyższamy pomniejsze imperia tej galaktyki.\n\nMimo to jednak, nasze dzieło, behemot, nie rozumie ogromu naszej dominacji. Kieruje się żarłocznym instynktem i nawet potężne ilości jedzenia, jakie mu zapewniamy, nie sycą jego głodu. Z czasem z pewnością się opanuje i zacznie stosować się do naszych poleceń, czas jednak jest tu kluczowy: w każdej chwili możemy stracić kontrolę i wystawić na ryzyko miliardy istnień."
 biocrisis.60.a: "Znajdziemy jakieś rozwiązanie."
 BEHEMOTH_CRISIS_SPECIAL_PROJECT_3: "Próby połączenia mózgowego"
 BEHEMOTH_CRISIS_SPECIAL_PROJECT_3_DESC: "Prowadzimy doświadczenia z neurotechnologią, która miałaby umożliwić połączenie naszych umysłów z układem nerwowym behemota. Uważamy, że w tej chwili to jedyny sposób na poskromienie tej bestii."
 biocrisis.15.name: "Synaptyczna symfonia"
 biocrisis.15.desc: "Nasza nowoczesna neurotechnologia w końcu pozwoliła odkryć metodę pokonania bariery komunikacyjnej między nami a naszym potężnym dziełem. Nie zadziała nic innego, jak połączenie z bestią naszych umysłów. Nie jednego, indywidualnego, lecz całej mentalnej potęgi naszego gatunku. Jeśli zrobimy to zbyt szybko, zaryzykujemy przeciążenie układu nerwowego behemotów. Zalecana jest daleko posunięta ostrożność."
 biocrisis.15.a: "Biologiczna doskonałość ma wysoką cenę."
 biocrisis.65.name: "Poziom 4: Wcielenie bestii"
 biocrisis.65.desc: "Choć podwaliny teoretyczne dla stworzenia mentalnej więzi z behemotem są już gotowe, wymagania logistyczne są olbrzymie. Główne centrum łączności zamierzamy zbudować w stolicy, dzięki czemu będziemy mogli przetworzyć populację, łącząc umysły z bestią.\n\nCo więcej, niedawne dokonania naukowe mogą wkrótce pozwolić nam jeszcze bardziej ulepszyć nasze dzieła dzięki projektowi pojedynczej, eksperymentalnej mutacji."
 biocrisis.65.a: "Staniemy się jednością."
 BEHEMOTH_CRISIS_SPECIAL_PROJECT_4: "Scalenie umysłów"
 BEHEMOTH_CRISIS_SPECIAL_PROJECT_4_DESC: "Świadomość behemota jest o wiele potężniejsza i złożona, niż przewidywaliśmy. Rozumiemy już, że umysł jednej osoby nie wystarczy do integracji. Nasze umysły, choć doskonalsze od większości, nie zostały stworzone do istnienia w takim ciele.\n\nPierwszym krokiem będzie połączenie poszczególnych umysłów naszej populacji z behemotem. Z początku będzie to wątła strużka myśli, która z czasem stanie się wielkim potokiem. Powodzią, która ugasi szalejący płomień furii behemota."
 BEHEMOTH_CRISIS_SPECIAL_PROJECT_4_DESC_HIVE: "W roju nie ma miejsca na odstępstwa. Koncentracja nigdy wcześniej nie miała tak kluczowego znaczenia. Pojedynczy dron nie może stać się łącznikiem między nami a behemotem, dlatego musimy wejść w umysł tej bestii jako całkowicie zbiorowa świadomość.\n\nTo nas zmieni. Nasze umysły połączą się w jeden, staniemy się jedną istotą. To wręcz niepojęta koncepcja, ale nie powinna nas niepokoić, ponieważ wkrótce staniemy się najpotężniejszym bytem w galaktyce!"
 BEHEMOTH_CRISIS_SPECIAL_PROJECT_4_DESC_MACHINE: "Myśl o zamieszkaniu w biologicznym nosicielu zawsze była niepokojąca. Nasz gatunek kształtował się przez wiele pokoleń dronów o twardych ciałach. Ci, którzy istnieli przed nami, nawet sobie nie wyobrażali drogi, którą właśnie podążamy. Zamierzamy porzucić nasze mechaniczne ramy i ukryć się w ciele żywej bestii.\n\nCzy po połączeniu z mięsem wciąż będziemy maszynami? Odpowiedź to zdecydowane <<BŁĄD: NIE ZNALEZIONO>>.\n\nLogika podpowiada, że jedyna droga naprzód to zaakceptowanie niepewności, co często czynią istoty biologiczne. W ciele behemota znajdziemy odpowiedzi. Połączymy się z tą istotą w jedno. Przetrwanie zawsze było naszą nadrzędną dyrektywą, teraz zamierzamy się rozwijać."
 biocrisis.20.name: "Jedność z bestią"
 biocrisis.20.desc: "Udało się! Naprawdę się udało! Stworzyliśmy więź z behemotem i pracujemy nad jej wzmocnieniem, przenosząc do niego pierwsze nasze umysły. Bestia pozostaje spokojna, witając nas w nowej przestrzeni, która od początku była nasza. Czujemy w niej ducha każdej innej istoty pod naszą kontrolą, a cała nasza populacja odczuwa teraz gdzieś w głębi swoich umysłów ogrom behemota.\n\nNie ma wątpliwości: jesteśmy najbardziej śmiercionośną i niepowstrzymaną siłą w galaktyce. W naszym nowym kształcie ześlemy furię na naszych przerażonych wrogów. Cała galaktyka jest na wyciągnięcie ręki!"
 biocrisis.20.a: "Będziemy się żywić!"
 biocrisis.70.name: "Poziom 5: Dziki głód"
 biocrisis.70.desc: "Przeniesiona została już wystarczająca część naszej populacji - mamy teraz bezpośrednią kontrolę nad behemotem i jego ciałem. Bestia stale rośnie, a jej genetyczny potencjał jest w znacznej mierze uśpiony - odblokowuje go jedynie stały dopływ umysłów i składników odżywczych. Tętni w nas teraz pierwotny szał, a żądza krwi, jaką odczuwamy, nie zna granic. Musimy się pożywiać. Musimy pożerać. Musimy pochłaniać galaktykę i się nią sycić.\n\nZrzućmy z siebie okowy cywilizacji niczym wylinkę. Wszystko, co się teraz liczy, to nasze życie pośród gwiazd."
 biocrisis.70.a: "Jesteśmy zbyt wielcy, by przegrać."
 biocrisis.105.name: "Potworna agonia"
 biocrisis.105.desc: "Jedna z naszych bestii zginęła. Taki los spotyka słabe stworzenia, natura pozbywa się ich. Choć nie opłakujemy istoty, która nie zdołała przetrwać boju, to powinniśmy podjąć działania, dzięki którym jej rodzeństwo nie skończy podobnie. Musimy dać naszym tworom długowieczność, w przeciwnym razie czeka nas porażka."
 biocrisis.105.a: "Ta śmierć nie pójdzie na marne."
 biocrisis.105.b: "Przykro nam z powodu tej ofiary."
 biocrisis.130.name: "Bestia z gwiazd"
 biocrisis.130.desc: "Mimo przeciwności losu wyhodowaliśmy behemota, który właśnie wyłonił się z kokonu, w którym inkubował.\n\nJest większy, potężniejszy, głodniejszy. Przemierza próżnię w poszukiwaniu pożywienia.\n\nTa bestia to duma stada, która sprowadzi nieopisane zniszczenia na każdego, kto ośmieli się wejść jej w drogę."
 biocrisis.130.a: "Kolejny raz pokonaliśmy ograniczenia natury."
 biocrisis.150.name: "Odpowiedź na wyzwanie"
 biocrisis.150.desc: "Wygląda na to, że nasze wywyższenie nie pozostanie wolne od przeszkód. Wyczuwamy niepoliczalną masę w układzie [event_target:voidspawn_spawn_location.GetName]. To pomiot próżni, pradawny potwór, którego obecność przyćmiewa nawet najpotężniejsze dzieła ambicji śmiertelników.\n\nJego niesamowita forma wymyka się konwencjonalnemu rozumowaniu, rzuca na galaktykę ponure przyćmione światło, zupełnie jakby jego przyjścia obawiały się nawet gwiazdy.\n\nZamiary pomiotu próżni są jasne jak jego trajektoria: idzie po nas, po behemota, umysł zbiorowy, który ośmielił się wyjść poza mięso, żeby rządzić w kosmicznej pustce. To nie jest zwyczajna konfrontacja potęgi materialnej. To próba, której zostaje poddane to, czym się staliśmy.\n\nNie ma wątpliwości, iż jeśli rozpoczniemy teraz walkę, zginiemy. Musimy na razie uniknąć wroga i rosnąć dalej w siłę, nim nasze kły staną się dość ostre, by przebić to, co nie do przebicia."
 biocrisis.150.desc.b: "$biocrisis.150.desc$"
 biocrisis.150.a: "Możemy uciekać, ale nie zdołamy się ukryć."
 biocrisis.155.desc: "To wiadomość najwyższej wagi. §Y$NAME_Boss_Voidspawn$§!, istota o niewyobrażalnej potędze, wyłoniła się z kosmicznej otchłani. Przyciąga ją [event_target:behemoth_empire.GetName] - imperium, które wyrwało się z kajdan śmiertelności i połączyło z bestią. Te dwa tytany są swoimi przeciwnościami i zagrażają całej galaktyce.\n\nJeżeli behemot zginie, pomiot próżni może się zatrzymać. Jeśli behemot zwycięży, jego potęga na zawsze zachwieje równowagą w galaktyce. Szykujcie się, gdyż nasze dzisiejsze wybory wpłyną na kolejne eony."
 biocrisis.155.a: "Jak możemy temu zapobiec?"
 biocrisis.155.b: "Kto nas ocali?"
 biocrisis.155.c: "Jak to się stało?"
 biocrisis.155.d: "Co możemy zrobić?"
 biocrisis.156.desc: "Nie rozumiemy się. Na zapobiegliwość może sobie pozwolić tylko ten, kto ma czas. My już nie mamy tego luksusu.\n\nBestia jest tutaj. W przeszłości nasz starożytny zakon mierzył się z niebezpieczeństwami, ale powiedzmy to sobie otwarcie: znajdujemy się w krytycznej sytuacji."
 biocrisis.157.desc: "To zrozumiałe pytanie. Naiwne, ale zrozumiałe. Akceptacja przychodzi wraz z mądrością. Wiemy, że nikt nas nie ocali.\n\nNasz zakon jest mały, więc nie mogliśmy wiele zdziałać. Jednak wy mogliście działać wcześniej, żeby to zatrzymać. Jeżeli teraz [event_target:behemoth_empire.GetName] was pokona, postaramy się nie obarczać was winą za rozpad galaktyki."
 biocrisis.158.desc: "Imperia mają tendencję do rozrastania się ponad własne możliwości. Szczególnie [event_target:behemoth_empire.GetName] stawia na arogancję i ambicję, zamiast na mądrość i ostrożność.\n\nPosiedli moce, których nie rozumieli, nadali swoim ciałom formy, których nie potrafili kontrolować. Prawdopodobnie przez to przypieczętowali zgubę nas wszystkich."
 biocrisis.159.desc: "W oparciu o wstępną analizę waszego potencjału bojowego uważamy, że walka źle by się dla was skończyła. Wedle naszej oceny waszych flot ucieczka to równie daremne rozwiązanie. Nie da się wyjść obronną ręką z obecnej sytuacji.\n\nDwie potężne bestie szykują się do starcia wśród gwiazd. Może przetrwacie, jeśli szczęście się do was uśmiechnie.\n\nJeżeli jesteście mądrzy, wyciągniecie wnioski z tego szaleństwa. Ale wiedzcie jedno: galaktyka zmieni się, gdy ta bitwa dobiegnie końca. Kto doczeka tej zmiany, to już zupełnie inna sprawa.\n\nHipotetycznie, gdybyście chcieli podjąć próbę ocalenia galaktyki, zgładzenie behemota mogłoby zakończyć polowanie pomiotu próżni."
 biocrisis.162.name: "Przeszkoda"
 biocrisis.162.desc: "Na nasze terytorium wtargnął $NAME_Boss_Voidspawn$. Ta starożytna istota jest, jak się twierdzi, nieśmiertelna i nietykalna. Jej oczy lśnią nieznaną mądrością, ruchy zaś skrywają w sobie ciężar eonów.\n\nNasze [species.GetEyeNamePlural] nie nadążają za tymi szczątkowymi sygnałami. Drżą w nas chaos, zaburzenia i najgłębszy kosmiczny strach.\n\nNie do pomyślenia jest, abyśmy mogli przetrwać starcie z taką bestią, możemy jednak powstrzymać jej szał, jeśli pomożemy jej zabić ofiarę. Znalezienie §Ybehemota§! i jego zabicie to nasza jedyna szansa na przetrwanie."
 biocrisis.162.a: "Musimy za wszelką cenę uniknąć kontaktu z tym potworem!"
 biocrisis.175.name: "Pomiot nie żyje"
 biocrisis.175.desc: "Pomiot próżni przestał istnieć. Olbrzym, który przyćmił gwiazdy, został zgładzony. Szczątki jego niesamowitej formy dryfują teraz w pustce, powoli rozpływając się w nicość.\n\nKolejne imperium pokazało siłę ognia i koordynację, które przekraczają wszelkie wyobrażenia. Galaktyka jest inna, niż mogło się wydawać. Równowaga sił zmieniła się, podobnie jak nasze miejsce w niej.\n\nCo napędza tych zabójców bestii? Czy to był pokaz siły, wiadomość dla wszystkich, którzy chcieliby się im sprzeciwić, a może wstęp do czegoś o wiele gorszego?"
 biocrisis.175.desc.kaiju: "Jeżeli w tej galaktyce są siły zdolne zniszczyć $NAME_Boss_Voidspawn$, to mogą zniszczyć też nas. Nie różnimy się zbytnio od bestii, która zginęła.\n\nSiła ognia, która rozerwała jej ciało, może być kiedyś zwrócona przeciwko nam. Galaktyka zmieniła się, a my musimy dostosować się do tej zmiany.\n\nNasze przetrwanie wymagać będzie więcej niż ślepego szału. Próżnia ujrzała śmierć drapieżnika szczytowego. Lecz jego miejsce może zająć inny."
 biocrisis.175.a: "Musimy działać ostrożnie."
 biocrisis.180.name: "Próżniowi zabójcy"
 biocrisis.180.desc: "Rzekoma nieśmiertelność starszego pomiotu próżni okazała się ostatecznie zwykłym mitem, który obaliła potęga naszych flot. Starożytne zagrożenie przestało istnieć, a galaktyka może odetchnąć z ulgą."
 biocrisis.180.desc.kaiju: "Choć $NAME_Boss_Voidspawn$ nie żyje, w jego ciele krążą pozostałości energii. Jest ona pradawna i silna, dla nas to po prostu czysty potencjał.\n\nMięśnie i szpik bestii zostaną wchłonięte, a jej obca esencja połączy się z naszą. Pomiot próżni ma niezmierzoną moc, która teraz należy do nas."
 biocrisis.180.a: "Nie będziemy zwierzyną dla żadnej bestii."
 biocrisis.180.b: "To dopiero początek uczty."
 biocrisis.185.name: "Może być tylko jeden"
 biocrisis.185.desc: "Objawienie w kosmicznej pustce: nie tylko my się rozwijamy. Pojawił się inny behemot, naśladowca pełen tego samego groteskowego majestatu, pragnący naśladować naszą doskonałość. Tak nie może być.\n\nNie ma miejsca dla innego najpotężniejszego drapieżnika. Pokój nie wchodzi w grę. Jest tylko mięso do pożarcia. Zaczyna się polowanie."
 biocrisis.185.a: "Będziemy ucztować na jego sercu!"
 biocrisis.187.name: "Ostrzeżenie przed behemotem IV klasy"
 biocrisis.187.desc: "Coś się dzieje w kosmicznej otchłani.\n\nWśród gwiazd jakieś imperium rozpoczęło ostatni etap swojej groteskowej przemiany, hoduje potworne behemoty, ale nie tylko jako broń, ale jako statki. Nie chcą władzy nad nimi, lecz zjednoczenia. Połączenie ciała i umysłu, imperium i grozy.\n\nJeżeli im się uda, przestaną być ludem, przeobrażą się w jeden, wielki głód.\n\nNie można na to pozwolić. Jeżeli mają być zatrzymani, trzeba zrobić to teraz, zanim przekroczą ostatnią granicę."
 biocrisis.187.a: "Upolujmy tę bestię!"
 biocrisis.190.name: "Największy organizm próżni"
 biocrisis.190.desc: "Ostatnie przeszkody zostały usunięte. Konkurenci, pretendenci, rozpaczliwe chłostanie słabszych istot: wszystko umilkło. Nawet gwiazdy drżą, gdyż stanęliśmy u progu prawdziwej przemiany.\n\nNie ogranicza nas już krucha postać naszych przodków. Planety to klatki. Imperia są ulotne. Iluzja indywidualności wkrótce rozpłynie się w ogromnej, doskonałej jedności behemota. Umysł i groza, inteligencja i głód, jedność.\n\nPrzenosiny już prawie się dokonały. Kiedy dobiegną końca, przestaniemy tak po prostu istnieć.\n\nRozkwitniemy."
 biocrisis.190.a: "DOKOŃCZYĆ PRZENOSZENIE!"
 biocrisis.190.tt: "Wygramy tę grę w 30 dni."
 biocrisis.190.b: "Zaczekaj, jeszcze nie jesteśmy gotowi."
 biocrisis.190.b.tt: "Graj dalej twoim aktualnym imperium."
 BEHEMOTH_TRANSFERENCE_PROJECT: "Dokończ przenoszenie"
 BEHEMOTH_TRANSFERENCE_PROJECT_DESC: "Dostatecznie długo porozumiewaliśmy się z bestią. Przeniesienie zostało przygotowane, wystarczy wydać rozkaz. Jesteśmy u progu wielkiego awansu, porzucimy żałosne popioły naszego planetarnego królestwa i zerwiemy okowy ciała oraz grawitacji."
 biocrisis.191.name: "Zwycięstwo behemota"
 biocrisis.191.desc: "Połączenie dobiegło końca!\n\nNie jesteśmy już tym, czym byliśmy. Nie wiążą nas ograniczenia słabszych stworzeń. Jesteśmy połączeniem myśli i głodu, potężną wolą rozciągającą się w kosmicznej pustce.\n\nGórujemy nad galaktyką, ulotną i kruchą. Ale mamy coś więcej niż władzę. Jesteśmy wolni. Możemy zostać. Możemy odejść. Możemy polować.\n\nCo zrobimy z naszym nowym, wiecznym istnieniem?"
 biocrisis.191.a: "Zostańmy w tej galaktyce... na razie."
 biocrisis.191.a.tt: "Behemoty pozostaną dzikimi stworzeniami i nie będzie można nimi dłużej grać."
 biocrisis.191.b: "Odejdźmy. Pustka wzywa."
 biocrisis.191.b.tt: "Imperium behemotów zniknie z galaktyki i nie będzie można nim dłużej grać."
 biocrisis.191.c: "Tak zwani łowcy dowiedzą się, czym jest prawdziwy strach."
 biocrisis.192.name: "Niepowstrzymana groza"
 biocrisis.192.desc: "To koniec. [behemoth_winner.GetName] stał się czymś więcej niż ciałem, więcej niż imperium, więcej niż tym, co można nazwać cywilizacją. Nie jest już narodem. Stał się siłą.\n\nŚwiaty drżą na jego widok. Floty płoną. Ostatnie schronienia dawnych potęg rozpryskują się jak iskry w pustce. Nie ma dyplomacji, nie ma błagań, nie ma ostatniego bastionu.\n\nNie walczymy o przetrwanie, lecz tylko odwlekamy konsumpcję. Nadszedł koniec."
 biocrisis.192.tt: "[behemoth_winner.GetName] niedługo wygra"
 biocrisis.196.name: "Połknięci w całości"
 biocrisis.196.desc: "Lata temu, behemot i jego krewniacy uciekli z naszej galaktyki. Przyglądaliśmy się poczuciem ulgi, jak bestia, która mogła zakończyć nasze istnienie, znikała w bezgwiezdnej pustce. A potem... nic. Przemierzywszy setki tysięcy lat świetlnych, po prostu zniknął. Żadnego promieniowania. Żadnego powidoku. Żadnej fali grawitacyjnej. Jakby nigdy nie istniał."
 biocrisis.196.a: "Musimy to rozgryźć."
 UNSETTLING: "To niepokojące."
 biocrisis.197.name: "Quis Venabitur Ipsos Venatori"
 biocrisis.197.desc: "Poznawanie losów behemota trwa od wielu lat, lecz nadal błądzimy w ciemności. Hiperlinie nie sięgają tak daleko, więc opieraliśmy się na teorii i trochę szalonej nauce, żeby odgadnąć, co się stało w jego ostatnich chwilach.\n\nTa istota nie okazała strachu. Po prostu poleciała dalej. I wtedy, w jednej chwili, jej forma uległa deformacji, zaczęła wirować do środka, niczym poskręcana tkanina, po czym zniknęła.\n\nPojawiło się wiele teorii: nowy rodzaj napędu nadświetlnego? Ukrywa się w kosmicznej szczelinie albo anomalii? Albo, co bardziej niepokojące, została odesłana w niebyt przez jakąś siłę zewnętrzną? Prawda, jaka by nie była, znajduje się poza naszym zasięgiem... i pewnie poza naszą zdolnością pojmowania."
 biocrisis.197.a: "Może lepiej o tym nie myślmy."
 biocrisis.197.b: "Nasi pojmani pretoryni robią się niespokojni."
 biocrisis.265.name: "Ryk agonii"
 biocrisis.265.desc: "Agonia behemota jest nie do zniesienia. Zbyt wiele naszego jestestwa znajduje się w tej istocie, więc gaśniemy wraz z echem jej świadomości."
 biocrisis.265.a: "!! - ... "
 biocrisis.520.name: "Pusty tytan"
 biocrisis.520.desc: "Behemot nie żyje.\n\nJego pozbawiona życia, tytaniczna forma dryfuje w kosmicznej pustce, niczym pomnik naszego triumfu, ale i ograniczeń pojmowania. [Root.GetScientistPluralCapital] rzucili się, by analizować jego szczątki, z zapałem ograbić ten niepojęty umysł z tajemnic. Ale każda próba ożywienia go, czy to z pomocą maszyn, czy nekromancji, a nawet najbardziej rozpaczliwymi inwokacjami, zakończyła się niepowodzeniem.\n\nTeraz boleśnie przekonaliśmy się dlaczego: mózg behemota nie był jedynie siecią komórek, lecz splotem organicznych nadprzewodników splecionych tak, że żadna znana nam inteligencja - sztuczna, biologiczna czy też magiczna - nie potrafiłaby go odtworzyć. Po śmierci jego struktura neuronowa zapadła się niczym nieodwracalnie rozerwany obwód. Żadna energia, żadna wola, żadna siła nie naprawi tego, co przepadło.\n\nNajwspanialszy umysł galaktyki zamilkł na wieczność."
 biocrisis.520.a: "Nic nie zostało."
 biocrisis.520.b: "Nawet bogowie mogą umrzeć."
 BEHEMOTH_MUTATION_PROJECT: "$menp_behemoth_mutation_research$"
 BEHEMOTH_MUTATION_PROJECT_DESC: "Niedawne przełomy w badaniach genetycznych behemota mogą, teoretycznie, posłużyć także do wywołania dalszych mutacji naszych dzieł. Stabilność genetyczna może stanowić pewien problem, ale jeśli poświęcimy na to dostatecznie dużo czasu i zasobów, na pewno stworzymy kolejne modyfikacje biologiczne."
 BEHEMOTH_FATE_PROJECT: "Los behemota"
 BEHEMOTH_FATE_PROJECT_DESC: "Po opuszczeniu naszej galaktyki, behemot podryfował w pustkę, a następnie zniknął. Możemy spróbować zbadać tę tajemnicę, ale z tej odległości możemy korzystać tylko z niekonwencjonalnych metod. Odpowiedzi są zapewne równie mgliste, co sama kosmiczna pustka."
 behemoth_mutation_a: "$menp_behemoth_mutation_research$: Agresja"
 behemoth_mutation_a_tt: "Behemot $MOD_SHIP_FIRE_RATE_MULT$: §G+$@behemoth_mutation_a_fire_rate_mult|0%$§!\nBehemot $MOD_SHIP_ARMOR_MULT$: §R$@behemoth_mutation_a_armor_mult|0%$§!\nBehemot $MOD_SHIP_SPEED_MULT$: §R$@behemoth_mutation_a_speed_mult|0%$§!"
 behemoth_mutation_a_desc: "Rozbudowane mięśnie pozwalają wykonywać niszczycielskie ataki."
 behemoth_mutation_b: "$menp_behemoth_mutation_research$: Powściągliwość"
 behemoth_mutation_b_desc: "Radiotropiczny szczep genetyczny wprowadzony do naszych organizmów kosmicznych powoduje, że potrzebują one znacznie mniej składników odżywczych."
 behemoth_mutation_c: "$menp_behemoth_mutation_research$: Zwinność"
 behemoth_mutation_c_tt: "Behemot $MOD_SHIP_SPEED_MULT$: §G+$@behemoth_mutation_c_speed_mult|0%$§!\nBehemot $MOD_SHIP_EVASION_MULT$: §G+$@behemoth_mutation_c_evasion_mult|0%$§!"
 behemoth_mutation_c_desc: "Potężniejsze gruczoły podprzestrzenne sprawiają, że nasze behemoty stają się zwinniejsze."
 behemoth_mutation_bio: "$menp_behemoth_mutation_research$: Precyzja"
 behemoth_mutation_bio_tt: "Behemot $MOD_SHIP_WEAPON_RANGE_MULT$: §G+$@behemoth_mutation_bio_weapon_range_mult|0%$§!\nBehemot $MOD_SHIP_ACCURACY_MULT$: §G+$@behemoth_mutation_bio_accuracy_mult|0%$§!"
 behemoth_mutation_bio_desc: "Adaptacja w postaci wielu organów wzrokowych pozwala oddawać precyzyjne strzały na niewiarygodne odległości."
 behemoth_mutation_synth: "$menp_behemoth_mutation_research$: Wytrzymałość"
 behemoth_mutation_synth_tt: "Behemot $MOD_SHIP_ARMOR_MULT$: §G+$@behemoth_mutation_synth_armor_mult|0%$§!\nBehemot $MOD_SHIP_ARMOR_REGEN_ADD_PERC$: §G+$@behemoth_mutation_synth_armor_regen_add_perc|0%$§!"
 behemoth_mutation_synth_desc: "Z połączenia stopów z chityną powstają wielowarstwowe pancerze chroniące najważniejsze organy."
 behemoth_mutation_corpo: "Gadżety behemota"
 behemoth_mutation_corpo_tt: "Miesięczna transakcje: §G+$@behemoth_mutation_corpo_trade_produces_mult|0%$§! za każdego behemota"
 behemoth_mutation_corpo_desc: "Nasi akcjonariusze byli trochę zaniepokojeni Projektem Behemot, ale zwiększenie dywidendy szybko rozwiało ich obawy."
 behemoth_mutation_psi: "$menp_behemoth_mutation_research$: Bariera"
 behemoth_mutation_psi_tt: "Behemot $MOD_SHIP_SHIELD_REGEN_ADD_PERC$: §G+$@behemoth_mutation_psi_shield_regen_add_perc|0%$§! za $pop_group_unit$ £job_telepath£ $job_telepath_plural$ albo $job_transference_volunteer$\nBehemot $MOD_SHIP_SHIELD_HARDENING_ADD$: §G+$@behemoth_mutation_psi_shield_hardening_add|0%$§! za $pop_group_unit$ £job_telepath£ $job_telepath_plural$ albo $job_transference_volunteer$\nObecna liczba ze 100 pracujących £job_telepath£ $job_telepath_plural$ i $job_transference_volunteer$: §Y[GetNumTelepathsAndTransference]§!"
 behemoth_mutation_psi_desc: "Choć behemoty nie są powiązane z Woalem, to wychowaliśmy je tak, żeby nasi telepaci mogli zapewniać im obronne bariery psioniczne."
 behemoth_mutation_psi_2: "$menp_behemoth_mutation_research$: Psionika"
 behemoth_mutation_psi_2_desc: "Bestie, weźcie naszą potęgę!"
 behemoth_mutation_cyber: "$menp_behemoth_mutation_research$: Cybernetyka"
 behemoth_mutation_cyber_desc: "Żeby ujarzmić dziką moc behemotów, stworzymy najbardziej zaawansowany sprzęt cybernetyczny."
 behemoth_cyber_rage: "$BLANK_STRING$"
 edict_behemoth_nanite_augmentation: "Ulepszenie behemota: Nanity"
 edict_behemoth_nanite_augmentation_desc: "Skorupy behemotów, w które wprowadzono nanity, mogą błyskawicznie zregenerować nawet najgorsze obrażenia."
 behemoth_nanite_augmentation_tt: "Behemot $MOD_SHIP_ARMOR_REGEN_ADD_PERC$: §G+$@behemoth_edict_armor_regen_add_perc|0%$§!"
 edict_behemoth_living_metal_augmentation: "Ulepszenie behemota: Żywy metal"
 edict_behemoth_living_metal_augmentation_desc: "Umieszczenie warstw żywego metalu między warstwami chityny tworzy pancerz reaktywny posiadający lepsze właściwości ablacyjne."
 behemoth_living_metal_augmentation_tt: "Behemot $MOD_SHIP_ARMOR_HARDENING_ADD$: §G+$@behemoth_edict_armor_hardening_add|0%$§!"
 edict_behemoth_alloys_augmentation: "Ulepszenie behemota: Stopy"
 edict_behemoth_alloys_augmentation_desc: "Mocowanie na pancerzach płyt ze stopów to prymitywne, ale skuteczne rozwiązanie."
 behemoth_alloys_augmentation_tt: "Behemot $MOD_SHIP_ARMOR_MULT$: §G+$@behemoth_edict_armor_mult|0%$§!"
 concept_edict_behemoth_nanite_augmentation: "$edict_behemoth_nanite_augmentation$"
 concept_edict_behemoth_living_metal_augmentation: "$edict_behemoth_living_metal_augmentation$"
 concept_edict_behemoth_alloys_augmentation: "$edict_behemoth_alloys_augmentation$"
 biocrisis.280.name: "$menp_behemoth_mutation_research$"
 biocrisis.280.desc: "Opracowaliśmy wiele formuł mutagenicznych, które wzmocnią nasze behemoty. Każda z nich ma odblokować nowe mocne strony i adaptacje. Jednak niesamowite organizmy tych stworzeń mogą przetrwać tylko pojedynczą iniekcję, jakakolwiek próba połączenia kilku formuł prowadzi do katastrofalnej zapaści komórkowej. Linia pomiędzy ewolucją a unicestwieniem jest cienka jak ostrze skalpela, zatem musimy mądrze wybierać nasze ulepszenia."
 biocrisis.280.a: "Niech będą agresywniejsze!"
 biocrisis.280.b: "Niech będą... mniej żarłoczne."
 biocrisis.280.c: "Niech będą szybsze!"
 biocrisis.280.psi: "Moc Woalu będzie je utrzymywać."
 biocrisis.280.bio: "Niech będą bardziej zabójcze!"
 biocrisis.280.cyber: "Ukierunkujmy ich szał."
 biocrisis.280.cyber.tt: "Nasze behemoty zyskują §G25%§! szans na oparcie się szałowi.\nKiedy wpadają w szał, otrzymują §G+$@behemoth_cyber_rage_fire_rate_mult|0%$§! do szybkostrzelności, §G+$@behemoth_cyber_rage_shield_penetration_add|0%$§! do przebijalności pancerza i §G+$@behemoth_cyber_rage_armor_penetration_add|0%$§! do przebijalności osłon"
 biocrisis.280.synth: "Ich pancerze będą nie do przebicia."
 biocrisis.280.corp: "Do diabła z tym. Zróbmy z nich pluszaki!"
 biocrisis.280.machine: "Połączmy ciało ze stalą."
 biocrisis.280.machine_tt: "Odblokowuje trzy edykty o §Yulepszaniu behemotów§! \n$t$['concept_edict_behemoth_nanite_augmentation']\n$t$['concept_edict_behemoth_living_metal_augmentation']\n$t$['concept_edict_behemoth_alloys_augmentation']"
 #Crisis Objectives
 crisobj_build_bioships_name: "Budowa statków biologicznych"
 crisobj_build_bioships_desc: "Po zdobyciu umiejętności hodowli statków biologicznych, możemy teraz udoskonalić i rozszerzyć ten proces. Ta trwająca symbioza przynosi coraz więcej korzyści, wzmacnia nasze floty i panowanie nad żywą częścią kosmosu."
 crisobj_breed_fauna_name: "Hodowla fauny kosmicznej"
 crisobj_breed_fauna_desc: "Po zdobyciu umiejętności hodowli fauny kosmicznej możemy udoskonalić i rozszerzyć ten proces. Ta trwająca symbioza przynosi coraz więcej korzyści, wzmacnia nasze floty i panowanie nad żywą częścią kosmosu."
 crisobj_kill_bioships_name: "Zniszczyć statki biologiczne"
 crisobj_kill_bioships_desc: "Wrogie statki biologiczne utrudniają nam biologiczną dominację. Musimy podjąć zdecydowane działania i zniszczyć je, aby dłużej nie zagrażały naszej dominacji."
 crisobj_kill_space_fauna_name: "Zabić faunę kosmiczną"
 crisobj_kill_space_fauna_desc: "Wroga fauna kosmiczna utrudnia nam biologiczną dominację. Musimy podjąć zdecydowane działania i zniszczyć ją, aby dłużej nie zagrażała naszej dominacji."
 crisobj_cap_fauna_name: "Schwytać faunę kosmiczną"
 crisobj_cap_fauna_desc: "Nieokiełznana fauna kosmiczna działa nieprzewidywalnie i jest wyjątkowym wyzwaniem. Musimy podjąć zdecydowane działania, schwytać te stworzenia, aby osiągnąć dominację, wykorzystując ich potencjał."
 crisobj_build_behemoth_egg_name: "Wyhoduj jaja behemotów"
 crisobj_build_behemoth_egg_desc: "Hodowanie ogromnych zygot to kluczowy krok na naszej drodze do wyjścia poza trywialne życie planetarne."
 crisobj_birth_behemoth_name: "Wyhoduj behemoty"
 crisobj_birth_behemoth_desc: "Pod naszą troskliwą opieką w bezkresnym kosmosie rodzą się ogromne organizmy. Te behemoty, zrodzone z naszej ambicji i biegłości, staną się tytanicznymi potęgami, które zmienią równowagę sił na naszą korzyść."
 crisobj_behemoth_rage_name: "Rozjuszone behemoty"
 crisobj_behemoth_rage_desc: "Po wypuszczeniu na wolność nasze behemoty sieją spustoszenie i niszczą wszystko, co znajdzie się na ich drodze. Ich niekontrolowany gniew to świadectwo naszej potęgi, to siła natury, która wypełnia tylko naszą wolę, gdy postanowimy z niej skorzystać."
 behemoth_mutation_reward: "Wybierz mutację"
 biocrisis.210.desc.base: "Coś się wydarzy. Nasz głód nie jest bezmyślny, lecz elastyczny. Pojawiają się nowe elementy pulsujące potencjałem.\n\n" #Introduction
 biocrisis.210.desc: "$biocrisis.210.desc.base$Nasze jaja to dosłownie fundament naszego dziedzictwa. Trzeba je za wszelką cenę pielęgnować i chronić. Pokierujmy naszą ewolucją tak, żeby przyniosła korzyści przyszłym pisklętom." #Egg
 biocrisis.210.a: "Przyspieszenie rozwoju jaj"
 biocrisis.210.a.tt: "$behemoth_fast_egg_tt$\n\n§HOdblokowuje politykę§!: $behemoth_egg_policy$\n$policy_behemoth_egg_policy_desc$"
 biocrisis.210.b: "Dajmy naszym pisklętom siłę."
 biocrisis.210.b.tt: "$behemoth_slow_egg_tt$\n\n§HOdblokowuje politykę§!: $behemoth_egg_policy$\n$policy_behemoth_egg_policy_desc$"
 biocrisis.210.c: "Wzmocnijmy skorupy."
 biocrisis.210.c.tt: "$behemoth_strong_egg_tt$"
 biocrisis.215.desc: "$biocrisis.210.desc.base$Pływanie na falach słonecznych i przemierzanie próżni to umiejętność znana nielicznym gatunkom podróżującym w kosmosie. Nasze taktyczne przewagi to furia i potęga, ale czy nie warto poprawić też naszej mobilności?" #Mobility
 biocrisis.215.a: "Przemierzajmy próżnię."
 biocrisis.215.a.tt: "Nasz §Y$behemoth_04$§! zyskuje: §Y$BIO_JUMP_DRIVE_1$§!."
 biocrisis.215.b: "Strzelajmy szybko, poruszajmy się jeszcze szybciej."
 biocrisis.215.b.tt: "$behemoth_turbo_tt$"
 biocrisis.215.c: "Połóżmy nacisk na refleks."
 biocrisis.215.c.tt: "$behemoth_reflexes_tt$"
 biocrisis.215.d: "Zostańmy łowcami w mroku."
 biocrisis.215.d.tt: "Nasz §Y$behemoth_04$§! zyskuje: $@cloaking_high_strength|0+$ $MOD_SHIP_CLOAKING_STRENGTH_ADD$."
 biocrisis.220.desc: "$biocrisis.210.desc.base$Wzmocnienie naszej obrony biologicznej pozwoli nam wytrwać pod zmasowanym ostrzałem bez odnoszenia bolesnych ran."
 biocrisis.220.a: "Moglibyśmy mieć grubszą skórę."
 biocrisis.220.a.tt: "Nasz §Y$behemoth_04$§! zyskuje: $@behemoth_1_hull_add|0+*$ $HITPOINTS$."
 biocrisis.220.b: "Nasz pancerz bojowy powinien być mocniejszy."
 biocrisis.220.b.tt: "Nasz §Y$behemoth_04$§! zyskuje $@behemoth_1_armor_add|0+*$ $MOD_SHIP_ARMOR_ADD$ i $@behemoth_1_armor_hardening_add|%0+$ $MOD_SHIP_ARMOR_HARDENING_ADD$."
 biocrisis.220.c: "Nikt nas nie tknie, jeśli wzmocnimy nasze osłony."
 biocrisis.220.c.tt: "Nasz §Y$behemoth_04$§! zyskuje $@behemoth_1_shield_add|0*+$ $MOD_SHIP_SHIELD_ADD$, $@behemoth_1_shield_regen_add_perc|%1+$ $MOD_SHIP_SHIELD_REGEN_ADD_PERC$ i $@behemoth_1_shield_hardening_add|%0+$ $MOD_SHIP_SHIELD_HARDENING_ADD$."
 biocrisis.225.desc: "$biocrisis.210.desc.base$Podbojów dokonamy, atakując naszych wrogów. Mamy możliwość zwiększenia naszego potencjału bojowego."
 biocrisis.225.a: "Mając do dyspozycji odpowiednią ilość energii, można ignorować osłony."
 biocrisis.225.a.tt: "Nasz §Y$behemoth_04$§! zyskuje $@behemoth_shield_pen_add|%0+$ $MOD_SHIP_SHIELD_PENETRATION_ADD$ i £exotic_gases£ $@behemoth_shield_pen_upkeep|0*-$ do miesięcznego utrzymania."
 biocrisis.225.b: "Nasze pociski przebiją nawet najgrubszy pancerz."
 biocrisis.225.b.tt: "Nasz §Y$behemoth_04$§! zyskuje $@behemoth_armor_pen_add|%0+$ $MOD_SHIP_ARMOR_PENETRATION_ADD$ i £volatile_motes£ $@behemoth_armor_pen_upkeep|0*-$ do miesięcznego utrzymania."
 biocrisis.225.c: "Komary nie będą nas niepokoić."
 biocrisis.225.c.tt: "Nasz §Y$behemoth_04$§! zyskuje $@behemoth_tracking_add|0*+$ $MOD_SHIP_TRACKING_ADD$, $@behemoth_point_defense_weapon_fire_rate_mult|%0+$ $mod_weapon_type_point_defense_weapon_fire_rate_mult$ i £rare_crystals£ $@behemoth_tracking_upkeep|0*-$ do miesięcznego utrzymania."
 biocrisis.230.desc: "$biocrisis.210.desc.base$W ogniu walki liczy się każda sekunda. Zadawane przez nas obrażenia to rytuał śmierci, ostatnie doświadczenie naszych wrogów, zanim zgasną światła ich żałosnych istnień."
 biocrisis.230.a: "Przytrzymać ich. Doświadczą naszej obecności."
 biocrisis.230.a.tt: "$behemoth_drain_tt$"
 biocrisis.230.b: "Zniszczyć ich z daleka."
 biocrisis.230.b.tt: "$behemoth_spike_tt$"
 biocrisis.230.c: "Poćwiartować ich strategicznie."
 biocrisis.230.c.tt: "$behemoth_burst_tt$"
 biocrisis.235.desc: "$biocrisis.210.desc.base$Większa wytrzymałość przyniesie korzyści takiej niezłomnej galaktycznej sile jak my." #Tanky 2
 biocrisis.235.a: "Regeneracja tkanek daje nam długowieczność."
 biocrisis.235.a.tt: "Nasz §Y$behemoth_04$§! zyskuje: $@behemoth_2_hull_regen_add|%1+$ $MOD_SHIP_HULL_REGEN_ADD_PERC$."
 biocrisis.235.b: "Nigdy się nie poddamy."
 biocrisis.235.b.tt: "Nasz §Y$behemoth_04$§! zyskuje: $@behemoth_2_damage_reduction_mult|%1+$ $MOD_SHIP_DAMAGE_REDUCTION_MULT$."
 biocrisis.235.c: "Brutalna siła to jedyny sposób."
 biocrisis.235.c.tt: "Nasz §Y$behemoth_04$§! zyskuje $@behemoth_2_damage_reduction_static|1+$ $MOD_SHIP_DAMAGE_REDUCTION_ADD$, $@behemoth_2_armor_hardening_add|%0+$ $MOD_SHIP_ARMOR_HARDENING_ADD$ i $@behemoth_2_shield_hardening_add|%0+$ $MOD_SHIP_SHIELD_HARDENING_ADD$."
 biocrisis.240.desc: "$biocrisis.210.desc.base$Wyślemy roje naszych pomiotów, które spustoszą planety i ogołocą układy ze wszystkiego, co nadaje się do zjedzenia, czyli praktycznie ze wszystkiego. Powinniśmy zadać sobie pytanie, jakie wsparcie będzie najlepsze dla naszego potomstwa?" #Support Ability
 biocrisis.240.a: "Pozwolimy, żeby były szybkie."
 biocrisis.240.a.tt: "$behemoth_buff_tt$"
 biocrisis.240.b: "Będą rosnąć w naszym świetle." #Summon a fleet
 biocrisis.240.b.tt: "$behemoth_summon_tt$"
 biocrisis.240.c: "Pomożemy im stać się silnymi." #Regen friendly bioships
 biocrisis.240.c.tt: "$behemoth_healing_tt$"
 biocrisis.245.desc: "$biocrisis.210.desc.base$Musimy pokazać niezłomną siłę wszystkim mieszkańcom tej galaktyki. Kolejnym etapem naszej ewolucji będzie zwiększanie umiejętności bojowych."
 biocrisis.245.a: "Sięgnijmy po wewnętrzny gniew."
 biocrisis.245.a.tt: "Po wejściu do walki nasz §Y$behemoth_04$§! zyskuje §Y$behemoth_frenzy_modifier$§! na £time£ §Y$@behemoth_frenzy_duration|0$ dni§!.\n\n§Y$behemoth_frenzy_modifier$§!:$behemoth_frenzy_modifier_tt$"
 biocrisis.245.b: "Nauczmy się panować nad naszym gniewem."
 biocrisis.245.b.tt: "Nasz §Y$behemoth_04$§! zyskuje \n$t$$MOD_SHIP_FIRE_RATE_MULT$: §G+$@behemoth_tempered_fire_rate_mult|0%$§! \n$t$$MOD_SHIP_SPEED_MULT$: §G+$@behemoth_tempered_speed_mult|0%$§! \n$t$$MOD_SHIP_HULL_REGEN_ADD_PERC$: $@behemoth_tempered_hull_regen_add_perc|%1+$ \n$t$$MOD_SHIP_ARMOR_REGEN_ADD_STATIC$: $@behemoth_tempered_armor_regen_add_static|0+$"
 biocrisis.245.c: "Wykorzystajmy naszą furię tak, by stała się natchnieniem dla innych."
 biocrisis.245.c.tt: "Po wejściu do walki nasz §Y$behemoth_04$§! daje §Y$behemoth_inspiration_modifier$§! przez £time£ §Y$@behemoth_inspiration_duration|0$ dni§! każdemu sojuszniczemu okrętowi biologicznemu w tym układzie.\n\n§Y$behemoth_inspiration_modifier$§!:$behemoth_inspiration_modifier_tt$"
 biocrisis.250.name: "Bezpośrednia kontrola"
 biocrisis.250.desc: "$biocrisis.210.desc.base$Możemy teraz uwolnić niszczycielską falę krioklastycznej i piroklastycznej furii, której siła może rozerwać rzeczywistość. Krótko mówiąc, posiadamy broń, która może spalić galaktykę.\n\nAle nasza władza nie zakończy się na zniszczeniu. Czujemy każde ścięgno behemota, każdy jego impuls, każdy tytaniczny mięsień wykonujący naszą wolę, jakbyśmy kierowali własnym ciałem. Cała wielka postać wykonuje nasze polecenia: jej kończyny, paszcza, potężne serce powstałe w kosmicznej pustce bije zgodnie z naszą wolą. To nie jest zwykły okręt, teraz jesteśmy behemotem." #Behemoth Superweapon
 biocrisis.250.a: "Teraz kosmos należy do nas."
 biocrisis.250.a.tt: "§HUsuwa modyfikator:§!\n§R$voidspawn_boss_invincible$§!\n$mod_damage_vs_country_type_voidspawn_boss_mult$ §R-1954%§!\n\n$behemoth_superweapon_tt$\n\n"
