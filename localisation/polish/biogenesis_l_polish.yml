 behemoth_incubation_poi_name: "Inkubacja behemota"
 behemoth_incubation_poi_desc: "Jeden z naszych behemotów inkubuje na gazowym olbrzymie §H[incubation_planet.GetName]§!. Spodziewany termin osiągnięcia pełnej dojrzałości: §H[incubation_planet.behemoth_incubation_timer]§!."
