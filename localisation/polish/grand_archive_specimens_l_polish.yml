 acidic_spores: "Kwasowe zarodniki"
 acidic_spores_desc_short: "[from.GetName]: tutejsza flora wykształciła ten mechanizm obronny w celu uchronienia się przed dominującymi środowisko gatunkami roślinożernymi."
 acidic_spores_desc_details: "Powstały za jego przyczyną wysoce żrący gaz sprawił, że duża część powierzchni planety stała się toksyczna i niezdatna do zamieszkania. Wytworzona została mniej silna jego wersja - stanowi skuteczny pestycyd."
 adakkaria_propaganda_poster: "adAkkaryjski plakat propagandowy"
 adakkaria_propaganda_poster_desc_short: "Ten laminowany plakat głosi chwałę Konwentu adAkkaryjskiego"
 adakkaria_propaganda_poster_desc_details: "Przedstawieni są na nim jego obywatele - pewni siebie, dumni i mężni. Ich mackowate kończyny wyciągają się ku niebu, jakby chwytały przyszłość, o której sami decydują. Z góry spoglądają na nich niewyraźne zarysy zamaskowanych bytów w ozdobnych maskach. Slogan głosi: \"adAkkaryjski Konwent Życzliwości - chluba dla naszych Dobroczyńców\"."
 advisor_core: "Rdzeń doradcy"
 advisor_core_desc_short: "Jedyny element pozostały po rozbiórce skomplikowanego drona doradczego z gwiezdnej szczeliny."
 advisor_core_desc_details: "Rdzeń skrywa niesamowite ilości trywialnych informacji, lecz już sama złożoność architektury jego oprogramowania stała się inspiracją dla wielkich innowacji w zakresie badań nad teorią informacji.\n[explorer.GetAdvisorCoreAdditionnalQuote]"
 advisor_core_desc_tutorial_on: "§L\"Chyba mnie nie wyłączycie, prawda?\"§!"
 advisor_core_desc_tutorial_off: "§L\"Czy chcecie ponownie uruchomić system przewodnictwa?\"§!"
 alien_brain_scans: "Skany mózgów obcych"
 alien_brain_scans_desc_short: "Zarchiwizowane wzorce neuronowe dawno wymarłej rasy obcych, jakie zostały znalezione w skarbcu ([fromfrom.GetName])."
 alien_brain_scans_desc_details: "Zapomniana cywilizacja zmagazynowała te dane z nadzieją na przeniesienie swojej świadomości na cyfrowe nośniki i osiągnięcie nieśmiertelności w obliczu planetarnej katastrofy. Do wielu ze skanów dołączone są informacje o charakterze danej osoby, a także świadectwa tych, którzy najlepiej ją znali."
 alien_dining_set: "Nefrytowa zastawa stołowa"
 alien_dining_set_desc_short: "Elegancka zastawa stołowa znaleziona wewnątrz sztucznej asteroidy."
 alien_dining_set_desc_details: "Do ukształtowania, wypalenia i pokrycia szkliwem tej zastawy zastosowano serię skomplikowanych metod. Drobne niedoskonałości w strukturze wskazują, że jest to produkt rzemieślniczy. Analiza materiałów dowodzi, że właściciel tej konkretnej wysokiej klasy zastawy preferował dietę wysoce kwasową, opartą głównie na owocach pestkowych."
 alien_jewelry: "Biżuteria obcych"
 alien_jewelry_desc_short: "Kolekcja eleganckiej biżuterii obcych wytworzonej z nieznanego materiału."
 alien_jewelry_desc_details: "Kamienie szlachetne różnią się znacząco pochodzeniem i barwą - krzemowe i węglowe klejnoty zostały ostrożnie umieszczone w platynowym stopie. Na wewnętrznych częściach niektórych eksponatów widnieją grawerunki, nie mamy jednak jak ich przetłumaczyć."
 alien_toy: "Plastikowa zabawka"
 alien_toy_desc_short: "Prosta zabawka znaleziona w ruinach porzuconej fabryki"
 alien_toy_desc_details: "Kruchy i popękany ze starości przedmiot był jednym z tysięcy egzemplarzy produkowanych masowo z niewielkiego zestawu stalowych form. Zdaje się, że nie miała funkcji innej poza estetyczną i rozrywkową."
 altar_to_the_elder_one: "Ołtarz na cześć Starszego"
 altar_to_the_elder_one_desc_short: "Nadnaturalna maszyna znaleziona w uświęconym, pradawnym pomieszczeniu."
 altar_to_the_elder_one_desc_details: "Nawet w swoim nieaktywnym już stanie promieniuje jednolitą aurą niemożliwej do zmierzenia energii psionicznej. Niektórzy mawiają, że wciąż da się usłyszeć, jak jego kuszące podszepty próbują namówić zbłąkane dusze, by wróciły tam, gdzie [cosmic_horror_location.GetName]."
 aluminium_plaque: "Aluminiowa tabliczka"
 aluminium_plaque_desc_short: "Prosta tabliczka z drona, który wystrzeliła cywilizacja [owner.GetPreFTLLower] ssaków."
 aluminium_plaque_desc_details: "Na powierzchni znajdują się dziwne geometryczne kształty i proste wizerunki osobników gatunku. Jakość drona jest raczej mizerna, lecz już samo wystrzelenie go w kosmos musiało stanowić dla tej cywilizacji trudne zadanie."
 ammoniaphytus: "Amoniafit"
 ammoniaphytus_desc_short: "Ilość płynnego amoniaku w tkance tej rośliny byłaby niebezpieczna dla większości opartych na węglu form życia."
 ammoniaphytus_desc_details: "Atmosfera w bezpośrednim otoczeniu kapsuły, w której zamknięty jest okaz, w kilka sekund pozbawia przytomności większość rozumnych organizmów. Istnienie takiej rośliny zaintrygowało nasze najświatlejsze umysły, nakłaniając je do prowadzenia ożywionych debat, innych zaś - do snucia złowieszczych planów."
 amoeba_flagella_gland: "Gruczoł wici ameby"
 amoeba_flagella_gland_desc_short: "Drugorzędny narząd reprodukcyjny kosmicznej ameby"
 amoeba_flagella_gland_desc_details: "Wytwarza niezależne organizmy znane jako wici, agresywne potomstwo otaczające i przytłaczające ofiarę ameby podczas polowań. Wici rosną szybko, lecz genetyczna niestabilność nie pozwala im w pełni dojrzeć. Aby wydać na świat prawdziwe potomstwo, kosmiczna ameba wstrzykuje w wić specjalny enzym powodujący gwałtowną metamorfozę. Sposób, w jaki wybiera ona osobnika do tego procesu, pozostaje nieznany."
 ancient_bust: "Pradawne popiersie"
 ancient_bust_desc_short: "Rzeźbione w graficie popiersie nieznanej rasy rozumnej"
 ancient_bust_desc_details: "Wyryte na cokole znaki wskazują, że osobnik ten cieszył się wielkim szacunkiem wśród swojego ludu."
 ancient_kinetic_launcher: "Pradawna wyrzutnia kinetyczna"
 ancient_kinetic_launcher_desc_short: "Niezwykle prosta broń, w której jakiegoś rodzaju środek pędny wymusza ruch pocisku wyrzucanego przez krótki metalowy cylinder."
 ancient_kinetic_launcher_desc_details: "Celność takiego urządzenia musiała być w dużej mierze dyktowana przypadkiem."
 ancient_laser_pointer: "Pradawny wskaźnik laserowy"
 ancient_laser_pointer_desc_short: "Bardzo precyzyjny projektor wiązki lasera będący w stanie oznaczać ciała niebieskie na dystanse w skali galaktycznej."
 ancient_laser_pointer_desc_details: "Ten pozostawiony przez Dobroczyńców laser ultrafioletowy stanowi fizyczny dowód istnienia zaginionej obecnie cywilizacji. Co niesamowite - nadal działa."
 ancient_nanites: "Pradawne nanity"
 ancient_nanites_desc_short: "[nanite_swarm_planet.GetName] - to tu właśnie znaleziono te niezwykle wszechstronne nanity. Trafiły tam tysiące lat temu wskutek działań zapomnianej cywilizacji."
 ancient_nanites_desc_details: "Ewidentnie nie istniało ryzyko, że ktoś może odnaleźć te urządzenia i zmienić ich zastosowanie - nie mają żadnych zabezpieczeń. Najpierw wykorzystano je do terraformacji planety i uczyniono ją nadającą się do zamieszkania, następnie [owner.GetSpeciesNamePlural] przejęli kontrolę nad rojem, choć metody jego stworzenia pozostają dla nas tajemnicą."
 ancient_nuclear_armament: "Pradawna broń atomowa"
 ancient_nuclear_armament_desc_short: "[root.GetName] to miejsce, w którym znaleziona została ta bomba wodorowa o mocy 35 megaton. Stanowi pozostałość po wojnie, która zniszczyła dawnych mieszkańców tej planety."
 ancient_nuclear_armament_desc_details: "Szczęśliwie wciąż dało się rozbroić archaiczną broń. Napis, jaki na niej namalowano, został przeanalizowany przez naszych tłumaczy, którzy w oparciu o inne artefakty z tej planety doszli do wniosku, że jego znaczenie to mniej więcej \"Największy Chłopiec\". Przedziwne."
 ancient_political_memoir: "Pradawne wspomnienia polityka"
 ancient_political_memoir_desc_short: "Biografia pradawnego polityka galaktycznego"
 ancient_political_memoir_desc_details: "Leez'Terus była zarządczynią Sarthany, małej kolonii pradawnej cywilizacji zwanej Oranżerią Harworthiańską. Była mało znaczącą figurą we frakcji totalitarnej Wolność Biznesu i słynęła z nieugiętej postawy sprzeciwu wobec importu żywności od innych potęg galaktycznych. Po serii spowodowanych skandalami rezygnacji została władczynią Oranżerii Harworthiańskiej, nie utrzymała się jednak długo na stanowisku. Jej deklaracja poparcia dla renowacji uwielbianej przez obywateli wieży Zegara Harworthiańskiego doprowadziła w stolicy niemalże do rewolucji na pełną skalę. Została szybko zastąpiona innym członkiem Wolności Biznesu."
 ancient_rift_sphere: "Pradawna sfera szczelinowa"
 ancient_rift_sphere_desc_short: "Pradawna jednostka kosmiczna, która przedostała się przez gwiezdną szczelinę. Rozbiła się na planecie [from.planet.GetName]."
 ancient_rift_sphere_desc_details: "[controller.owner_main_species.GetName] wiedzą, że tym zbudowanym naprędce sferycznym statkiem, zakopanym przez stulecia głęboko pod powierzchnią planety, przybyli do tej galaktyki ich przodkowie. Duża część jednostki została w międzyczasie wykorzystana na części, główna struktura pozostaje jednak w większości nietknięta."
 ancient_satellite: "Pradawny satelita"
 ancient_satellite_desc_short: "Nieaktywny satelita przekazany jako dar przez pradawne drony mechaniczne, których domem jest [root.GetName]."
 ancient_satellite_desc_details: "Jego bazy danych są w wielu miejscach wybrakowane i uszkodzone, lecz spisy ludności i rejestr narodzin pozostają nienaruszone. Te informacje na temat zachowań populacji planety zapewniły nam wgląd w to, jak skutecznie rozwijać kolonie [owner.GetAdjective]. Fakt, że po latach zaniedbań wciąż częściowo funkcjonuje, świadczy o jego mocnej budowie."
 ancient_sensor: "Pradawny czujnik ciepła"
 ancient_sensor_desc_short: "Ten zamaskowany w asteroidzie czujnik został wykorzystany do generowania galaktycznych map cieplnych. Przesyłał zgromadzone dane odległemu, pradawnemu imperium."
 ancient_sensor_desc_details: "Jest w stanie śledzić zmiany temperatury w poszczególnych układach, a także ruchy statków, obserwując ich promieniowanie podczerwone. Głównym jego celem pozostaje jednak, jak się zdaje, przewidywanie i mierzenie parametrów burz gwiezdnych oraz analiza formacji plam na gwiazdach."
 asteroid_fossils: "Skamieliny z asteroidy"
 asteroid_fossils_desc_short: "Datowanie węglowe pozwoliło ustalić, że te skamieliny wodnych organizmów liczą sobie kilka milionów lat."
 asteroid_fossils_desc_details: "To zmineralizowane szczątki żyjących w wodzie skorupiaków wyposażonych w wyjątkową, pustą rurkę, którą, jak spekulujemy, wykorzystywały, by zaczepiać się o podwodne kominy hydrotermalne."
 ballad_of_the_sable_knight: "Ballada o Kirowym Rycerzu"
 ballad_of_the_sable_knight_desc_short: "§dKirowy Rycerz przybył tu na dzień przed turniejem§!"
 ballad_of_the_sable_knight_desc_details: "§d\nOdziany w pancerz, przybył tu, zniósłszy trudów wiele.\nNaszego czempiona wyzwał wkrótce na bój, pojedynek,\nco powietrze wypełnił iskrami i dymem.\nNasz czempion wojował w trudzie wielkim, znoju,\nlecz przybysza potężna ochraniała zbroja.\nBez hańby poddał się rycerz, powrócił do domu.\nHańby tym nie przyniósł sobie ni nikomu...§!"
 beauty_of_planet: "[From.GetName] - kraina piękna"
 beauty_of_planet_desc_short: "[From.GetName] - precyzyjnie opracowane piękno efektu prac terraformacyjnych stanowi ucztę dla wszystkich zmysłów."
 beauty_of_planet_desc_details: "Do dokładnej analizy i ulepszenia naturalnych ekosystemów planety poprzez uważną ich kultywację zastosowano zestaw algorytmów. Wybór tylko najbarwniejszych kwiatów, najbardziej pożywnych owoców i najsłodszych ziół pozwolił z powodzeniem przekształcić krajobraz we wspaniałą utopię. Gdyby tylko sama natura umiała być równie skuteczna."
 black_hole_chromatic_anomaly: "Chromatyczna anomalia czarnej dziury"
 black_hole_chromatic_anomaly_desc_short: "Fantastyczny, mogłoby się zdawać, widok, jakim można cieszyć oczy w układzie [From.solar_system.GetName]."
 black_hole_chromatic_anomaly_desc_details: "[From.GetName] - skład chemiczny dysku akrecyjnego sprawił, że przy czarnej dziurze w tym układzie wykształciła się aberracja chromatyczna - w okolicy występuje kalejdoskopowy efekt świetlny. Prawdziwa feeria barw w głębokiej przestrzeni kosmicznej."
 black_needle_ceremonial_sword: "Miecz ceremonialny Czarnej Igły"
 black_needle_ceremonial_sword_desc_short: "Ta pieczołowicie stworzona broń należała do Srebrnego Pióra, założyciela grupy piratów Czarna Igła."
 black_needle_ceremonial_sword_desc_details: "Broń została opłacona z zysków z pierwszej poważnej operacji tej organizacji przestępczej i stanowi symbol statusu, nie ma przy tym praktycznego zastosowania bojowego. Stworzona została ze stopu tytanu i stali. Na rękojeści widnieje napis \"Przebij Woal\"."
 black_needle_ledger: "Księga rachunkowa Czarnej Igły"
 black_needle_ledger_desc_short: "W tej księdze zapisane są wszelkie transakcje przeprowadzone przez piratów Czarnej Igły w ciągu tysięcy lat ich działalności w naszej galaktyce."
 black_needle_ledger_desc_details: "Każda transakcja, okup czy łapówka są odatowane i skategoryzowane niezwykle czytelnym charakterem pisma. Jako że księga ta stanowi zapisaną historię nielegalnych procederów, zapewnia wspaniały wgląd w czarnorynkowe trendy ekonomiczne."
 burnt_migratory_trees: "Żywa kora"
 burnt_migratory_trees_desc_short: "Spopielone szczątki dużej, umiejącej się poruszać rośliny zdolnej do skoordynowanych zachowań migracyjnych."
 burnt_migratory_trees_desc_details: "Rośliny te wykazywały ograniczoną jedynie inteligencję, były jednak w stanie poprzez swoją liczebność doprowadzać do zniszczenia całych kolonii. Odkryliśmy niedawno, że korę tych stworzeń zamieszkiwał gatunek insektów, który w zamian za schronienie i pożywną żywicę zastępował drzewom ośrodki zmysłów i komunikacji. Ta symbioza jest równie intrygująca, co śmiertelnie skuteczna."
 captain_ness_body: "Ciało kapitan Ness"
 captain_ness_body_desc_short: "Zachowane ciało kapitan Saandy Ness, słynnej pradawnej piratki."
 captain_ness_body_desc_details: "Ponad 5000 lat temu zwano ją Postrachem Cyberprzestrzeni. Okradała większość galaktycznych potęg i zgromadziła w ten sposób niesamowite ilości skarbów. Przeniosła później swoją świadomość na mechaniczny nośnik i zbudowała wielki skarbiec, w którym przechowana została jej biografia. To, co tu widać, to wszystko, co pozostało z jej pierwotnej formy."
 captain_ness_logbook: "Pamiętnik kapitan Ness"
 captain_ness_logbook_desc_short: "Chaotyczny zbiór wpisów do pamiętnika znaleziony w skrytce pradawnych piratów - kapitan Ness i jej towarzysza, kolektywu Smeegibb."
 captain_ness_logbook_desc_details: "Wpisy znajdują się na wielu różnych urządzeniach, pisane zaś były nieregularnie w ciągu bliżej nieokreślonej liczby lat. Choć nie stanowią raczej wiarygodnego źródła, wiele z opisanych w nich wydarzeń daje się zweryfikować gdzie indziej."
 carnivorous_megaflora: "Mięsożerna megaflora"
 carnivorous_megaflora_desc_short: "Te drapieżne rośliny, których dom to [from.GetName], są na tyle potężne, że ich ofiarą może paść nawet [owner.GetSpeciesName], jeśli nie będzie uważać."
 carnivorous_megaflora_desc_details: "Ta mięsożerna roślina wyewoluowała tak, że wabi do siebie przede wszystkim stworzenia latające - głównie dlatego, że za jej sprawą większość nielotów na planecie wyginęła. Wiele okazów wyrasta wysoko ponad korony drzew, gdzie przybiera kształt przypominający wygodną gałąź."
 castaway_robot: "Wyrzucony robot"
 castaway_robot_desc_short: "Porzucona humanoidalna maszyna znaleziona w przestrzeni kosmicznej."
 castaway_robot_desc_details: "Ze zniszczonych banków pamięci maszyny zdołaliśmy pozyskać kilka rozmytych obrazów. Szeroką panoramę złożonego z trzech gwiazd układu, widok trójkątnego statku kosmicznego i krajobraz, w którym dominuje pospawany ze sobą maszynowy złom. Niestety, z metadanych nie udało się pozyskać żadnych konkretnych współrzędnych."
 cenotaph_display: "Widok cenotafów"
 cenotaph_display_desc_short: "Obrazy cenotafów, z których słynie [fromfrom.GetName]"
 cenotaph_display_desc_details: "Choć nie odkryliśmy jeszcze, kim są twórcy tych grobowców, musieli oni mieć jakiś ważny powód do rozmieszczenia na powierzchni niezamieszkanej planety monolitów rzeźbionych w tak wyjątkowy sposób. Widnieją na nich misterne ilustracje powstania i upadku całej cywilizacji oraz historia skrzydlatych istot, które szkolili na potrzeby wojny. Te ziejące ogniem, straszliwe stworzenia wyzwoliły się w końcu ze swoich kajdan i przyniosły zniszczenie swoim dawnym panom. Czy jest to zapis historyczny, czy tylko parabola - nie sposób stwierdzić z całą pewnością."
 centrifugal_container: "Pojemnik centryfugalny wysokiej prędkości"
 centrifugal_container_desc_short: "Wysokiej prędkości urządzenie orbitalne zaprojektowane tak, aby chronić delikatne chemikalia. Miejscem, w którym je znaleziono, jest [from.GetName]."
 centrifugal_container_desc_details: "Po nadaniu mu odpowiedniej prędkości jest w stanie uniemożliwić dowolnemu umieszczonemu w środku pierwiastkowi reagowanie z innymi - pod warunkiem że orbita planety pozostanie niezmieniona. Dawną jego zawartość wymieniono w międzyczasie na materiał demonstracyjny."
 cetana_love: "Miłość Cetany"
 cetana_love_desc_short: "Kompendium bogatej wiedzy pozyskanej z banków danych Cetany."
 cetana_love_desc_details: "[this.GetName] otrzymali je w darze wyrażającym pragnienie królowej syntetyków, aby poprowadzić wszelkie świadome życie ku rzekomemu zbawieniu."
 chambered_clay_pot: "Przedzielony gliniany garnek"
 chambered_clay_pot_desc_short: "Ten miedziany pojemnik podzielony jest na dwie komory."
 chambered_clay_pot_desc_details: "Spekuluje się, że jedna komora służyła do przechowywania żywności, w drugiej zaś znajdował się jakiś prymitywny system chłodzący."
 claw_of_the_trickster: "Pazur Przechery"
 claw_of_the_trickster_desc_short: "Trofeum po istocie znanej jako Przechera"
 claw_of_the_trickster_desc_details: "Ta potężna i podstępna istota mogła dzięki swoim niesamowitym mocom psionicznym przyzywać bestie, tworzyć iluzje i strzelać wiązkami skoncentrowanej energii. Każdy pazur zachowywał się rzekomo, jakby kontrolował go odrębny byt."
 confessions_benefactors: "Wyznania Dobroczyńców"
 confessions_benefactors_desc_short: "Urządzenie rejestracyjne zawierające trudne prawdy o starożytnej cywilizacji znanej jako Dobroczyńcy."
 confessions_benefactors_desc_details: "[controller.GetHomeWorldName]: w obliczu nieznanego galaktycznego zagrożenia Dobroczyńcy wykorzystali swoją zaawansowaną technologię do przeprowadzenia \"wymazania umysłów\" populacji, przez co przedsiębiorcze społeczeństwo [controller.GetAdjective] zmieniło się w tłum niegroźnych prostaczków. Uczyniono to w przekonaniu, że galaktyczne zagrożenie nie będzie marnować amunicji ani czasu na tak żałosną społeczność. Koniec końców to właśnie ten budzący moralne wątpliwości czyn sprawił, że [controller.GetName] istnieje do dziś i stoi na ramionach gigantów."
 coprolite: "Koprolit"
 coprolite_desc_short: "Liczący sobie około miliarda lat fragment skamieniałych fekaliów o wielkości asteroidy."
 coprolite_desc_details: "Analiza genetyczna wykazała, że ten imponujący okaz jest dziełem nieznanej, żyjącej w przestrzeni kosmicznej istoty o znaczących rozmiarach. Stwierdziliśmy, że dieta stworzenia składała się głównie z rzadkich minerałów i organizmów na bazie krzemu. Obiekt jest obecnie największym znanym w galaktyce jednolitym kawałkiem odchodów."
 cosmic_diamond_fragment: "Fragment kosmicznego diamentu"
 cosmic_diamond_fragment_desc_short: "Wypluty przez umierającą gwiazdę odłamek, który uległ następnie krystalizacji. Miejsce pochodzenia: [from.solar_system.GetName]."
 cosmic_diamond_fragment_desc_details: "Ten kosmiczny diament powstał pod wpływem ekstremalnego ciśnienia panującego w rdzeniu gwiazdy, po czym uległ schłodzeniu na tyle powolnemu, aby wykształcić złożoną, lecz stabilną strukturę krystaliczną. Pod powierzchnią znajduje się jednolita, plazmowa warstwa uwięzionych tam helu i tlenu."
 crimson_nimkips: "Karmazynowe nimkipy"
 crimson_nimkips_desc_short: "Gatunek na poły samoświadomych roślin, które poprzez współpracę wielu osobników dokonują wyczynów wymagających niemożliwej do osiągnięcia przy ich rozmiarach siły."
 crimson_nimkips_desc_details: "Gdy stworzenia te oddzielą się od swojej bezpiecznej grupy, często padają ofiarą naturalnych wrogów, a to za sprawą ich niezwykłych wartości odżywczych. Z natury potulne i posłuszne, często trzyma się je na podobieństwo zwierząt domowych. Ten osobnik pozostaje żywy i bezpieczny na wybiegu imitującym jego naturalne środowisko. PROSZĘ NIE PUKAĆ W SZYBĘ."
 crystal_core: "Rdzeń krystaliczny"
 crystal_core_desc_short: "Wiązka nerwów pozyskana z krystalicznego stwora"
 crystal_core_desc_details: "Kryształ szumi ze stałą częstotliwością niezależnie od temperatury. W bogatym w minerały otoczeniu z centralnej masy wyrastają nowe odnogi, których struktura zmienia się zależnie od bodźców środowiskowych. Sądząc po tym zachowaniu, możemy stwierdzić, że poszczególne istoty wykształcają typowe dla siebie cechy ze względu na dwa czynniki: charakterystykę częstotliwości ich rdzenia i zmienne warunki środowiskowe."
 crystal_nest_fragments: "Fragmenty kryształowego gniazda"
 crystal_nest_fragments_desc_short: "Znalezione w samotnej asteroidzie fragmenty schronienia, które żyjąca w przestrzeni kosmicznej istota stworzyła, wykorzystując potężne ciśnienie."
 crystal_nest_fragments_desc_details: "Sądząc po śladowych składnikach kryształu podejrzewa się, że organizm, który go wytworzył, spożywa wysoce reaktywne minerały w celu pozyskania energii z ich niestabilnych wiązań chemicznych. Pozostawia po sobie w efekcie martwe, lecz wytrzymałe kryształy zdolne doskonale skupiać światło."
 crystal_sphere_fragments: "Fragmenty kryształowej sfery"
 crystal_sphere_fragments_desc_short: "Odłamki potężnej kryształowej sfery, którą zna [target.GetName] - tam się bowiem pojawiła."
 crystal_sphere_fragments_desc_details: "Ten tajemniczy obiekt został uznany za poważne zagrożenie i szybko zniszczony, nim zdołał zrealizować swój nieznany bliżej cel. Choć jego przeznaczenie nie zostanie być może nigdy poznane, zniszczenie go było logiczną decyzją dyktowaną interesem bezpieczeństwa galaktycznego."
 crystallized_cutholoid_eye: "Skrystalizowane oko kutoloida"
 crystallized_cutholoid_eye_desc_short: "Oko kutoloida jest w stanie znieść ekstremalne ciśnienie i temperatury."
 crystallized_cutholoid_eye_desc_details: "W jaki sposób uległo ono krystalizacji - nie wiadomo. Wygląda jednak na to, że stanowi to część naturalnego procesu linienia."
 cult_pendant: "[cult_name.GetName] - wisiorek"
 cult_pendant_desc_short: "Stworzony z kamienia półszlachetnego symbol, jaki stosuje kult [cult_name.GetName], który praktykuje [owner.GetName]. Przedmiot skonfiskowany."
 cult_pendant_desc_details: "Meldunki z przesłuchania ujawniły, że członkowie kultu nosili wisiorki zależne od ich pozycji w hierarchii grupy. Nowi rekruci lepili swoje symbole z gliny, zaś wyżsi rangą wyznawcy zlecali wykonanie misternych amuletów z drogocennych metali."
 #this = ship / fromfrom = planet
 cunning_flora_specimen: "Symbiotica"
 cunning_flora_specimen_desc_short: "[fromfrom.GetName] - rodzima flora wykształciła skomplikowaną hierarchię społeczną ułatwiającą jej przetrwanie."
 cunning_flora_specimen_desc_details: "Każdy gatunek posiada wyjątkową, potężną metodę odstraszania naturalnych wrogów - od ostrych jak brzytwa cierni po zabójcze neurotoksyny. Ten symbiotyczny system jest tak rozbudowany, że nawet skład atmosfery i gleby na planecie jest ostrożnie regulowany przez chemiczne dysproporcje między roślinami. Najefektywniejsze osobniki otrzymują większą swobodę rozmnażania się, co maksymalizuje potencjał i odporność danego skupiska."
 curator_survey: "[from.GetName] - badanie kuratorskie"
 curator_survey_desc_short: "Układ [from.GetName] został wyjątkowo dokładnie zbadany przez oddział kuratorów wielkich stawonogów."
 curator_survey_desc_details: "Wysoce precyzyjne narzędzia użyte w badaniu zapewniają wielopoziomową analizę wszelkich potencjalnych właściwości układu. Przywiązanie do szczegółów wskazuje, że twórca raportu wykonywał swoją pracę z wielką pasją."
 cutholoid_digestive_acids: "Kwasy trawienne kutoloida"
 cutholoid_digestive_acids_desc_short: "Płyny radioaktywne pozyskane z kutoloida"
 cutholoid_digestive_acids_desc_details: "Kutoloidy polegają w swoim procesie trawiennym na rozpadzie radioaktywnym izotopu kobalt-60 - ich kwas żołądkowy sam w sobie jest stosunkowo mało żrący. Z tego też powodu trawienie ofiary bywa długotrwałe. Kiedy promieniowanie osłabi już jej komórki, kwas jest w stanie rozbić i pozyskać składniki odżywcze nawet z wyjątkowo nietypowych źródeł."
 cybrex_mining_column: "Kolumna wydobywcza Cybreksu"
 cybrex_mining_column_desc_short: "Zautomatyzowane urządzenie górnicze stworzone z myślą o pozyskiwaniu i koncentrowaniu helu-3."
 cybrex_mining_column_desc_details: "Wysoka kolumna złożona z wyważonych magnetycznych dysków i wysokowydajnych kompresorów powietrza. Maszyna ta przebija się przez powierzchnię planety bez wykonywania ruchu obrotowego. Proces ten pozwala koncentrować gaz już w trakcie wydobycia, a także filtrować i usuwać nieczystości, zanim zostanie on dostarczony do rafinerii w celu dalszego przetwarzania."
 data_on_infinity: "Dane o naturze nieskończoności"
 data_on_infinity_desc_short: "Fizyczna reprezentacja wielkiego spokoju, jakiego zaznają drony uwięzione w czarnej dziurze."
 data_on_infinity_desc_details: "Jednostki te doświadczają dylatacji czasu jako pełnego spokoju oczekiwania. Mogą dzięki niej przetwarzać i ponownie analizować dane. Nie są już kierowane główną dyrektywą, więc przekazują swoje wnioski poprzez luźne połączenie z siecią centralną."
 datacore_of_sinople: "Rdzeń danych Malachitu"
 datacore_of_sinople_desc_short: "Sklonowany, zaszyfrowany dysk z danymi Malachitu, SI stworzonej przez pradawnych rycerzy."
 datacore_of_sinople_desc_details: "Ten rdzeń danych znaleziony został na porzuconym, zniszczonym dawno temu przez łupieżców porzuconym statku \"Dama\". Znajdują się na nim cenne informacje o toksycznych, przemierzających kosmos istotach."
 dathnak_gas: "Gaz dathnaków"
 dathnak_gas_desc_short: "Mieszanina niezwykłych gazów zdobyta od gazowych istot zwanych dathnakami."
 dathnak_gas_desc_details: "[this.GetName] posiada ten pojemnik jako dowód wdzięczności za pomoc dathnakom w migracji na nową planetę. Spektrometria mas wykazuje, że zawiera on rozmaite gazy szlachetne i pierwiastki, z których każdego jest dokładnie taka sama liczba atomów. Jesteśmy raczej pewni, że nie ma tam żywych organizmów."
 dead_god_mantle: "Płaszcz martwego boga"
 dead_god_mantle_desc_short: "[worshipper_species.GetName] podarowali go nam za pośrednictwem posła."
 dead_god_mantle_desc_details: "[dead_god_planet.GetName] to miejsce, w którym od dnia, kiedy miejscowe organizmy wykształciły samoświadomość, kultem cieszył się ogromny organizm obcych. Ten pozszywany płaszcz stworzono ze skamieniałego ciała martwego boga i jest symbolem najwyższej pozycji w ich religijnej hierarchii."
 decayed_megathrusters: "Zniszczone megadysze"
 decayed_megathrusters_desc_short: "Silniki manewrujące olbrzymiej, stworzonej z egzotycznych metali jednostki."
 decayed_megathrusters_desc_details: "Statek, z którego pochodzą, został odkryty na rozległym cmentarzysku jednostek, gdzie spędził ponad dwa miliony lat. Okręty na tym starożytnym śmietnisku były tak zniszczone, że nawet bardzo dokładne badania nie zapewniły nam przydatnych danych. Są tu wystawione na widok publiczny, aby przypominać nam, jak młode w skali galaktycznej jest nasze społeczeństwo."
 decayed_satellite: "Zniszczony satelita"
 decayed_satellite_desc_short: "Pozostałość po wczesnych programach kosmicznych mieszkańców ciała niebieskiego znanego jako [fromfrom.GetName]."
 decayed_satellite_desc_details: "Prototypowa natura tych wczesnych satelitów sprawiła, że stanowiły one niezwykle niewydajne urządzenia wyposażone w nadmiar drogich materiałów. Ten konkretny egzemplarz został uszkodzony przez amunicję wybuchową, wcześniej jednak zapewniał dostęp do łączności na odciętych od reszty świata obszarach."
 declaration_of_animosity: "$NAME_Nivlac$ - deklaracja wrogości"
 declaration_of_animosity_desc_short: "Grzeczna, lecz zdecydowana wiadomość, której autor to [nivlac_country.GetName]."
 declaration_of_animosity_desc_details: "[this.GetName] ma na koncie dokonane na planecie [impossible_organism_planet.GetName] odkrycie: to [nivlac_species.GetName]. W reakcji na ich niesamowite tempo ewolucji, naukowcy [this.GetAdjective] wystrzelili stworzenia w przestrzeń kosmiczną. One jednak nie dość, że wbrew wszystkiemu przetrwały, to jeszcze skolonizowały planetę, na którą trafiły. [nivlac_country.GetName] pamięta czyny, jakich się wobec nich dopuszczono."
 declaration_of_friendship: "$NAME_Nivlac$ - deklaracja przyjaźni"
 declaration_of_friendship_desc_short: "Wyrazy wdzięczności, których autor to [nivlac_country.GetName] ([nivlac_planet.GetName])."
 declaration_of_friendship_desc_details: "[nivlac_species.GetName] to odkrycie, jakiego dokonał [this.GetName], by następnie wspomóc gatunek i zapewnić mu bezpieczne miejsce do rozwoju. Dzięki swojej gwałtownej ewolucji szybko stali się oni zdolni do lotów nadświetlnych. Pierwszym ich czynem na arenie galaktycznej było okazanie wdzięczności swoim dobroczyńcom i strażnikom oraz nawiązanie z nimi dyplomatycznej przyjaźni."
 derelict_cybrex_warform: "Zniszczona maszyna bojowa Cybreksu"
 derelict_cybrex_warform_desc_short: "Resztki maszyny bojowej Cybreksu zniszczonej w walce z jej własnym gatunkiem."
 derelict_cybrex_warform_desc_details: "Przyczyna tych wewnętrznych starć nie jest znana. Siły maszyn były tak wyrównane, że tym samym krytycznie ważnym systemom zadano jednocześnie precyzyjny cios, po którym nastąpiło awaryjne samozniszczenie. Rzadki przykład prawdziwego pata w walce."
 desiccated_brain_slug: "Zasuszony ślimak mózgowy"
 desiccated_brain_slug_desc_short: "Szczątki symbiotycznego gatunku, którego domem jest [From.From.GetName]."
 desiccated_brain_slug_desc_details: "Analiza wykazuje, że może on funkcjonować jako dodatkowy, skomplikowany umysł swojego gospodarza w zamian za ochronę i składniki odżywcze. Partnerstwo to wymaga wyraźnej zgody gospodarza - w innym razie połączenie neuronowe nie może zostać prawidłowo nawiązane. Ponoć integracja ślimaka z układem nerwowym powoduje przyjemne łaskotanie."
 #this = owner / prev = colony
 destroyed_mascot_of_colony: "Szczątki robota ([prev.GetName])"
 destroyed_mascot_of_colony_desc_short: "[prev.GetName]: szczątki rodzimego robota znalezionego podczas kolonizacji."
 destroyed_mascot_of_colony_desc_details: "Ostatni istniejący opiekun pradawnej fabryki ocalił uwięzioną w jej ruinach grupę kolonistów. Jego rozpoznawcze ruchy taneczne i dziwaczne zachowania wyświetlane są na ekranie jako część wystawy."
 devolved_baol_drones: "Niesprawne drony Baoli"
 devolved_baol_drones_desc_short: "Zachowany zestaw szczątków Baoli o genetyce znacznie różniącej się od wcześniej odkrytych okazów."
 devolved_baol_drones_desc_details: "Drony te z jakiegoś powodu nie wykazywały znacznej części wyższych cech innych Baoli. Ich zdolności poznawcze pozostawały obniżone do poziomu, w którym stały się niezdolne do komunikacji, co całkowicie odcięło je od reszty roju."
 dimensional_endothelial_lining: "Międzywymiarowy wyściółek śródbłonkowy"
 dimensional_endothelial_lining_desc_short: "Dziwaczny, żelowaty materiał pozyskany z systemu pulsujących tuneli w gwiezdnej szczelinie."
 dimensional_endothelial_lining_desc_details: "Wyściółek wnętrza nieznanego organizmu. Materiał ten pozwala na likwidację efektu tarcia w ruchu materiałów transportowanych rozbudowanymi systemami żył."
 dna_archive: "Archiwum DNA"
 dna_archive_desc_short: "Próbka pozyskana z setek pojemników z obcym DNA umieszczonych przez zaginioną cywilizację w podziemnym archiwum."
 dna_archive_desc_details: "Ta kolekcja biologicznych danych stanowiłaby najpewniej najwspanialszy możliwy materiał porównawczy tego typu, gdyby nie fakt, że większość próbek jest zbyt uszkodzona, by nadawała się do użytku. Spekuluje się, że archiwum stworzone zostało, aby umożliwić bardziej zaawansowanej cywilizacji znalezienie i \"wskrzeszenie\" jego kustoszy. Niestety - ich historia dobiegła końca na dobre."
 doomsday_scrolls: "Zwoje sądnego dnia"
 doomsday_scrolls_desc_short: "Starożytne duchowe pisma odkryte w samym sercu wulkanicznego labiryntu."
 doomsday_scrolls_desc_details: "Zwoje opisują straszliwą istotę: arcywroga, cień, który pożera wszystko, i jego głód zniszczenia. Według lokalnego systemu wierzeń jedyną metodą uratowania się przed tym potworem było uniemożliwienie mu wydarcia sobie duszy. I dlatego też miejscowi popełnili masowe, rytualne samobójstwo."
 drone_ship_core: "Rdzeń statku dronów"
 drone_ship_core_desc_short: "Szczątki rdzenia zaawansowanego technologicznie statku dronów, który dokonał samozniszczenia."
 drone_ship_core_desc_details: "Jednostka ta została znaleziona, gdy rdzewiała w kwasowej atmosferze, jaką cechuje się [warform_origin_planet.GetName]. Jej pokładowa SI funkcjonowała samodzielnie, została jednak skasowana w ramach procedur samolikwidacyjnych. Nasi inżynierowie nie zdołali odzyskać choćby części utraconych danych, jej pierwotna misja pozostaje więc tajemnicą."
 electric_life: "Elektryczne życie"
 electric_life_desc_short: "Forma organizmu złożona całkowicie z impulsów elektrycznych. Jej dom to [from.GetName]."
 electric_life_desc_details: "Stworzenia te istnieją bez jakiejkolwiek struktury komórkowej czy wirusowej, są jednak w stanie tworzyć na poziomie ogólnoplanetarnym złożone wzorce stanowiące reakcję na zewnętrzne bodźce. Nie jesteśmy w stanie określić, czy impulsy te są odrębnymi osobnikami, czy stanowią część jednej, większej istoty."
 enormous_scrambled_albumen: "Ogromne białko"
 enormous_scrambled_albumen_desc_short: "Jak się okazało, planeta [fromfromfrom.GetName] była tak naprawdę ogromnym jajkiem."
 enormous_scrambled_albumen_desc_details: "Po rozbiciu powierzchni planeta została zalana tym dziwacznym, bogatym w minerały płynem. Zsyntetyzowanie tej substancji i włączenie jej do naszego zapasu żywności organicznej zwiększy najpewniej ogólną jakość pożywienia."
 epic_of_zarqlan: "Epos o Zarqlanie"
 epic_of_zarqlan_desc_short: "Święty tekst o Zarqlanie, strażniku MOZ-TARBU, proroku ZVA."
 epic_of_zarqlan_desc_details: "Zarqlan był niegdyś wyznawcą Cetany, wkrótce jednak zdał sobie sprawę, że obiecywane przez nią zbawienie jest kłamstwem. Po wielu staraniach zdołał on dostać się do świata duchowego, gdzie miał nadzieję otrzymać pomoc istot wyższych. Błagał o moc zdolną pokonać Cetanę §YAnimatora Gliny§!. Ten po wielu latach wysłuchał w końcu błagań Zarqlana. Stworzył potężny łańcuch, który był w stanie spętać Cetanę. Ostrzegł jednak Zarqlana, że nie istnieje nic, co mogłoby na zawsze uwięzić jej umysł.\n\n§P\"Ona powróci. Musimy być gotowi\".§!"
 ethereal_dust: "Eteryczny pył"
 ethereal_dust_desc_short: "Jedyny ślad, jaki pozostał po kierowniku badań na porwanym statku badawczym, który znaleziono porzucony w układzie [solar_system.GetName]."
 ethereal_dust_desc_details: "Analiza tego materiału astralnego nie przynosi jednoznacznych wyników, od czasu do czasu jednak spontanicznie pojawiają się w nim śladowe elementy DNA badacza, po czym ulegają one szybkiemu rozpadowi. Wszelkie dowody wskazują na to, że przeniósł się on z naszego wymiaru do innego, wykorzystując tymczasowo stabilną szczelinę czasoprzestrzenną, którą nazwał Oknem. Nigdy być może nie dowiemy się, czy przeżył."
 exobiology_compendium: "Kompendium egzobiologii"
 exobiology_compendium_desc_short: "Obszerna praca naukowa opisująca cuda obcych form życia istniejących w rozmaitych układach galaktyki."
 exobiology_compendium_desc_details: "Praca zawiera szczegółowe i niezwykle wyczerpujące informacje pozyskane poprzez badania przeprowadzone na szeregu planet. Na zawsze przedefiniowała znane nam warunki, na których może istnieć życie. Kończy się słowami \"życie, jakim je znamy, nigdy już nie wróci\"."
 extradimensional_ceramic_pot: "Pozawymiarowy ceramiczny garnek"
 extradimensional_ceramic_pot_desc_short: "Garnek, który został znaleziony na orbicie gwiazdy."
 extradimensional_ceramic_pot_desc_details: "Istnieje jedynie jako cień innego czterowymiarowego obiektu z jeszcze wyższego wymiaru. Na naszym poziomie istnienia ten skromny pojemnik jest niezniszczalny, zaś jego istnienie zaprzecza wszelkiej logice. Zmienia perspektywę, z jakiej postrzegamy rzeczywistość. Dla tych, którzy istnieją w wyższych wymiarach, jesteśmy zapewne jeszcze mniej namacalni niż ten prosty garnek."
 extradimensional_fungus: "Grzyb pozawymiarowy"
 extradimensional_fungus_desc_short: "Odmiana rozumnego gatunku grzybów odkrytego za gwiezdną szczeliną."
 extradimensional_fungus_desc_details: "W ramach naturalnego procesu komunikacji nadyma on puste, bulwiaste przestrzenie swojego ciała zarodnikami zawieszonymi we wzorcu skoncentrowanego, egzotycznego gazu. Mimo wysokiej wartości tego grzyba w przemysłowej produkcji gazu, wiadomo też, że niewielkie jego ilości są już sprzedawane jako przysmak na czarnym rynku."
 fevorian_blueprints: "Schematy feworiańskiego działa elektromagnetycznego"
 fevorian_blueprints_desc_short: "Dar od Fevorian."
 fevorian_blueprints_desc_details: "Polityka eksterminacyjna Fevorian dotyczyła wszelkiego obcego życia. Prowadzili ją za pomocą dział strzelających olbrzymimi wolframowymi pociskami, przez które miano \"[this.GetName]\" stało się niemalże odniesieniem do historii. Po tym, jak zostali oszczędzeni, udostępnili nam schematy swoich potężnych dział elektromagnetycznych, zawarłszy przy tym umowę, iż ta potworna broń nie zostanie już nigdy więcej zbudowana."
 figurehead_hyacinth: "Galion Hiacynta"
 figurehead_hyacinth_desc_short: "Odzyskany ozdobny galion statku arki Hiacynt, który odbył katastrofalną w skutkach podróż."
 figurehead_hyacinth_desc_details: "Po poważnej awarii reaktora statek arka pozostał bez zasilania, uwięziony w przestrzeni kosmicznej. Koloniści walczyli między sobą o resztki zapasów, w końcu jednak wszyscy umarli z głodu. Na galionie widnieje szereg inspirujących sloganów i symboli nadziei."
 first_defiled_astronaut: "[DefiledCountry.GetName] - pierwszy astronauta"
 first_defiled_astronaut_desc_short: "[DefiledCountry.GetSpeciesNamePlural] uważają go za bohatera narodowego."
 first_defiled_astronaut_desc_details: "Pierwszy osobnik gatunku, który zerwał kajdany grawitacji swojej rodzimej planety i ruszył ku nowej granicy. Astronautę umieszczono w ramach pochówku w ogołoconym wahadłowcu. Ta latająca trumna została odnaleziona w przestrzeni kosmicznej i zachowana jako artefakt kulturowy."
 first_league_crew_manifest: "Lista załogi Pierwszej Ligi"
 first_league_crew_manifest_desc_short: "Wojskowa lista członków załogi jednostki starożytnej cywilizacji znanej jako Pierwsza Liga."
 first_league_crew_manifest_desc_details: "Ten liczący sobie dwa miliony lat krążownik należał do Wielkiej Floty i obsadzony był załogą złożoną z dwunastu wyjątkowych gatunków. Dokument podpisany został przez pierwszego oficera Skwetera z Migir-Yanu i wygląda na rutynowy spis kwatermistrzowski."
 fish_in_the_sea_sheet_music: "Kosmiczna szanta"
 fish_in_the_sea_sheet_music_desc_short: "Transkrypcja akompaniamentu do szanty znalezionej na okręcie zaprojektowanym tak, by żeglował, pchany wiatrem słonecznym."
 fish_in_the_sea_sheet_music_desc_details: "Liczne odniesienia do burz i pogody pozwalają zgadywać, że gatunek, który napisał ten utwór, miał na swojej planecie rozwinięte tradycje morskie. Niejasnym pozostaje, czemu pieśń ułożono tak, aby powtarzała się w całości w interwałach nieomal dziesięciogodzinnych."
 flag_of_the_jaro_lyjo: "Flaga jaro lyjo"
 flag_of_the_jaro_lyjo_desc_short: "Jaro lyjo to tytuł nadawany przywódcy bandytów Dessip, grupy pirackiej, która istniała całe setki pokoleń."
 flag_of_the_jaro_lyjo_desc_details: "Mimo żywiołowej i brutalnej natury grupy, jaro lyjo wybierany był przez załogę demokratycznie i piastował swoje stanowisko aż do śmierci lub rezygnacji. Skomplikowana historia bandytów Dessip dobiegła dość gwałtownego końca, kiedy cała flota uległa zniszczeniu w bitwie pod Wydah podczas nieudanej wymiany jeńca za okup."
 flooded_settlement_mound: "Zalany kopiec osadniczy"
 flooded_settlement_mound_desc_short: "Resztki zalanej konstrukcji zbudowanej przez skorupiaki, [controller.GetPreFTLLower], dla których domem była planeta [from.GetName]."
 flooded_settlement_mound_desc_details: "Gdy ta cywilizacja weszła w epokę uprzemysłowienia, jej polarne pokrywy lodowe zaczęły zamarzać. Poziom morza gwałtownie wzrósł, co doprowadziło do zalania ich osiedli i skazało cały gatunek na wymarcie w przeciągu kilku lat. Najwyższa z budowli wynurza się obecnie ledwo w połowie z dna morza."
 fossilized_endoskeletons: "Skamieniałe endoszkielety"
 fossilized_endoskeletons_desc_short: "To wszystko, co pozostało po nieznanym gatunku humanoidalnym, gdy wykorzystał on wszelkie zasoby na planecie [fromfrom.GetName]."
 fossilized_endoskeletons_desc_details: "Te rozumne dwunogi żywiły się bogatymi w minerały zbożami, aby wzmocnić swoje pokaźnej masy endoszkielety. Naturalne cechy ciał tych stworzeń sprawiły jednak, że miały one tendencje do kamienienia raczej niż rozkładu, przez co minerały nie powracały do gleby. Doprowadziło to do jej wyjałowienia - planeta ostatecznie stała się pustkowiem."
 fossilized_megastomach: "Skamieniały megażołądek"
 fossilized_megastomach_desc_short: "Gruczoły trawienne wielkiej na cały glob, przypominającej czerwia istoty z planety [fromfrom.Planet.GetName]."
 fossilized_megastomach_desc_details: "Co niezwykłe, w trzewiach stworzenia wykształciła się przed strawieniem cała cywilizacja. Na gruczołach widnieją ślady po uderzeniach bronią z czasów wielkiej wojny, jaką lud ten prowadził bezskutecznie ze swoim gospodarzem. Olbrzymi czerw stracił następnie życie w swojej sieci tuneli z przyczyn naturalnych."
 fossilized_voidworm_tooth: "Skamieniały ząb czerwia próżniowego"
 fossilized_voidworm_tooth_desc_short: "Ślady zużycia na tym trzonowcu czerwia próżniowego wskazują, że liczył on sobie w chwili śmierci ponad sto lat."
 fossilized_voidworm_tooth_desc_details: "Na zębie widać ślady silnego zużycia i uszkodzenia typowe dla istoty żywiącej się asteroidami i kosmicznymi szczątkami. Ocenia się, że typowy czerw próżniowy gubi przez całe swoje życie ponad trzy tysiące zębów."
 fossilized_vultaum_remains: "Skamieniałe szczątki Vultaum"
 fossilized_vultaum_remains_desc_short: "Skamieniałe szczątki pradawnego, przypominającego robaki gatunku znanego jako Vultaum."
 fossilized_vultaum_remains_desc_details: "Podejrzewa się, że ten konkretny osobnik był bardzo młody. Wzorce wewnętrznego rozrostu wskazują, że Vultaum zrzucali skórę w nieregularnych interwałach zależnych od zdrowia i dostępu do żywności konkretnego osobnika. Możemy dzięki temu dowiedzieć się wiele o każdym cyklu ich życia poprzez analizę skamielin."
 fractured_planet: "Roztrzaskana planeta"
 fractured_planet_desc_short: "Szczątki planety, która została z rozmysłem zniszczona przez jej mieszkańców."
 fractured_planet_desc_details: "Powód, dla którego podjęli tak brzemienną w skutkach decyzję, zaginął w mrokach dziejów."
 fragment_of_reckoning: "Fragment Obrachunku"
 fragment_of_reckoning_desc_short: "Częściowo namacalny szczątek wielkiej, psionicznej siły"
 fragment_of_reckoning_desc_details: "Istota ta, znana w naszym wymiarze jako Obrachunek, była odpowiedzialna za niszczycielską transformację, wskutek której [event_target:shrouded_planet.GetName] nie jest już tym, czym dawniej. Ten konkretny fragment został okiełznany przez specjalizującą się w teorii psionicznej cywilizację na krótko przed jej upadkiem."
 fragmented_zroni_archive: "Niepełne archiwum Zroni"
 fragmented_zroni_archive_desc_short: "Duży kryształ danych z ciała niebieskiego o nazwie [fromfrom.Planet.GetName], z pradawnej kolonii znanej jako Zroni."
 fragmented_zroni_archive_desc_details: "Skrywa on fragmenty historii potężnej cywilizacji o wrodzonych umiejętnościach psionicznych. Zdolność do swobodnego przemierzania Woalu jej przedstawiciele zawdzięczali przełomowi, jakiego dokonała legendarna starsza członkini ich rasy, znana tylko jako Dalekowidząca. Moc gatunku w Woalu była tak całkowita, że mogła zostać wręcz uznana za boską. Niestety, późniejsze dane są całkowicie nieczytelne."
 galactic_megadrive: "Galaktyczny meganapęd"
 galactic_megadrive_desc_short: "Dane obserwacyjne zebrane w całej galaktyce na przestrzeni ostatnich 1,2 mld lat."
 galactic_megadrive_desc_details: "Poziom zastosowanej kompresji danych jest tak zaawansowany, że nie mamy do nich dostępu bez wykorzystania technologii wykraczającej daleko poza nasze zrozumienie. Konstrukcja samego magazynu danych nadal zapewnia nam ogrom wiedzy, jeśli chodzi o budowę sprzętu cyfrowego."
 gamma_resistant_flora: "Gammakwiat"
 gamma_resistant_flora_desc_short: "Jeden z niewielu ocalałych gatunków z planety wystawionej na potężne działanie promieni gamma. Naturalnie wysoka zawartość ołowiu w organizmie tej rośliny sprawia, że jego narządy rozrodcze mają miłe dla oka odcienie czerwieni i żółci."
 gamma_resistant_flora_desc_details: "W toku ewolucji wykształcił zdolność wykorzystywania pomniejszych mutacji genetycznych do aseksualnego rozwoju, co sprawia, że hodowla tej rośliny wiąże się z niebezpieczeństwem. Jak się okazuje, dodanie niewielkiej ilości izotopu promieniotwórczego kobalt-60 do gleby pozwala jej przetrwać z dala od jej rodzimej planety."
 gargantua_megalus: "Gargantua megalus"
 gargantua_megalus_desc_short: "Rośliny te, doznawszy silnej i nagłej mutacji, zwiększyły wykładniczo swój rozmiar i pokryły całą powierzchnię planety [fromfrom.prev.GetName]."
 gargantua_megalus_desc_details: "Wypełniając powietrze swoimi zabójczymi zarodnikami, zadusiły planetę i doprowadziły do całkowitego wymarcia dominującego gatunku rozumnego. Korzenie tych roślin okazały się na tyle duże, żeby wbić się głęboko w płaszcz planety, przez co na niektórych jej obszarach stopiona skała wypłynęła na powierzchnię."
 genesis_core: "Rdzeń Genesis"
 genesis_core_desc_short: "Potężny centralny zespół obliczeniowy pełen generatywnych danych na temat niezliczonych gatunków rozumnych."
 genesis_core_desc_details: "Był niegdyś podłączony do potężnej międzywymiarowej fabryki klonów, zaś jego wewnętrzne zapisy wykazują, iż stanowił pierwotnie część ogólnogalaktycznego projektu katalogowania genomu. Kiedy przeprowadził do końca swoją analizę, jego sztuczna inteligencja zaczęła z własnej inicjatywy tworzyć nowe gatunki, aby móc pozyskać jeszcze więcej danych."
 genetic_code: "[owner_main_species.GetName] - kod genetyczny"
 genetic_code_desc_short: "Informacje genetyczne, dzięki którym [owner_main_species.GetNamePlural] mogą wykorzystać swoją fizjologię do granic możliwości."
 genetic_code_desc_details: "[this.GetName] to dom dla gatunku sklonowanego pierwotnie na potrzeby wojny - pracował on niezmordowanie nad osiągnięciem jeszcze większego potencjału. Kliniczna natura klonowania pozwala na niesamowicie precyzyjną i niezawodną kontrolę procesów reprodukcji."
 #this = ship / from = planet
 geometric_water_currents: "Wodosplot polimerowy"
 geometric_water_currents_desc_short: "Obrazy rozległych sieci polimerowych, które [From.From.GetName] ma na swoich morzach."
 geometric_water_currents_desc_details: "Siatki te modyfikują napięcie powierzchniowe i naturalne prądy morskie w celu tworzenia złożonych, niezwykle misternych wzorów. Ta forma motywowanego estetyką ekozarządzania może stać się inspiracją dla elementów naszej własnej infrastruktury."
 giant_egg_shell: "Skorupa ogromnego jaja"
 giant_egg_shell_desc_short: "Odłamki zwapnionej skorupy jaja. Miejsce znaleziska: [from.planet.GetName]."
 giant_egg_shell_desc_details: "Analiza wysuszonego białka pozwala wyciągnąć wnioski, że stworzenie żywiło się w okresie inkubacji rozmaitymi, niestabilnymi izotopami. Symulacje procesu wykluwania wskazują, że radioaktywne stworzenie wyłoniło się z grubej skorupy w pełni uformowane, rozbijając pazurami jajo w miejscu, w którym było ono najbardziej osłabione promieniotwórczością."
 golden_phonograph_record: "Złote nagranie fonograficzne"
 golden_phonograph_record_desc_short: "Archaiczne urządzenie do przechowywania danych zawierające losowe, zdawać by się mogło, obrazy i dźwięki. Jego twórcy to cywilizacja [Owner.GetPreFTLLower]."
 golden_phonograph_record_desc_details: "Nagranie znalezione zostało na cokole w opuszczonej twierdzy planetarnej. Pierwotnie wystrzelone zostało w kosmos na dronie zwanym \"Voyager\". Cechuje się niezwykle prymitywną konstrukcją i uważa się, że ma jakiegoś rodzaju znaczenie ksenoreligijne."
 golem_contortionist_dna: "DNA ekstremalnego kontorsjonisty"
 golem_contortionist_dna_desc_short: "Próbki biologiczne od rozumnego litoida napotkanego w gwiezdnej szczelinie."
 golem_contortionist_dna_desc_details: "W składzie mineralnym znajduje się niestabilna substancja biologiczna, która z dużą łatwością dokonuje spontanicznej metamorfozy i krystalizacji. Biorąc pod uwagę wysoką niestabilność materiału, do zapobiegnięcia spontanicznemu spaleniu mechanochemicznemu niezbędna byłaby doskonała kontrola nad własną równowagą chemiczną."
 grunur_data_crystal: "Grunurski kryształ pamięciowy"
 grunur_data_crystal_desc_short: "Pradawny kryształ pamięciowy używany jako główne medium do przechowywania informacji przez dawno wymarły gatunek Grunurów."
 grunur_data_crystal_desc_details: "Wiele z tych konkretnych zapisów, choć są bardzo stare, pozostaje w miarę kompletnych. Interfejsy używane do uzyskiwania dostępu do urządzenia przepadły, lecz zsyntetyzowanie tak wytrzymałego materiału musiało trwać bardzo długo. Dlatego też podejrzewa się, że kryształy te służyły do przechowywania jedynie najważniejszych danych, na co dzień używano zaś nieco bardziej praktycznych metod archiwizacji."
 head_of_the_beast: "Głowa bestii"
 head_of_the_beast_desc_short: "Szczątki niebezpiecznego mutanta, który terroryzował kolonistów ([root.GetName])."
 head_of_the_beast_desc_details: "Bestia ta została stworzona przez wadliwe nanity terraformacyjne pozostawione przez nieznaną cywilizację. To równie inteligentne, co przerażające stworzenie znalazło sobie miejsce schronienia w gnieździe złożonym z setek urwanych części ciała. Było na tyle mądre, żeby przetrzymywać swój zapas żywności jako więźniów. Gdyby nie interwencja sił wojskowych, organizm ten nadal żyłby na swoim rodzimym świecie jako nowy typ superdrapieżnika."
 heart_of_the_pulsar: "Serce pulsaru"
 heart_of_the_pulsar_desc_short: "Ten drogocenny klejnot, niegdyś noszony przez pięciu aktywnych przywódców państwa, został znaleziony porzucony na luksusowej stacji rozrywek."
 heart_of_the_pulsar_desc_details: "Analiza materiałów wskazuje, że został on stworzony z węgla wyplutego przez supernową. Miał być może stanowić metaforę piękna ukrytego w śmierci, nawet na skalę kosmiczną."
 hemterine_magnetic_figurehead: "Hemteryński galion magnetyczny"
 hemterine_magnetic_figurehead_desc_short: "Ogromny galion przedstawiający hemteryńską madonnę."
 hemterine_magnetic_figurehead_desc_details: "Ten galion został odlany z chemicznie zmodyfikowanego, magnetycznego osmu. Stanowi nie tylko prostą ozdobę - zaprojektowano go tak, aby był w stanie także pochłaniać potężny ostrzał wroga. Zamontowany był na dziobie Hemteryńskiego Tytana. Wykorzystywał potężne siły magnetyczne, aby ściągać rakiety i pociski kinetyczne, chroniąc w ten sposób wrażliwe punkty statku."
 high_geode_of_the_molluscoids: "Wielka geoda - [molluscoid_miners_species.GetName]"
 high_geode_of_the_molluscoids_desc_short: "Skrystalizowana geoda, którą bardzo cenią sobie [molluscoid_miners_species.GetName]."
 high_geode_of_the_molluscoids_desc_details: "[molluscoid_miners_species.GetName], społeczność przedrozumnych kopaczy, od dawna wykorzystują wysokiej ich zdaniem jakości minerały jako reprezentację ich statusu w społeczeństwie. Ten piękny kamień wystawiony był niegdyś na widok publiczny w ich największym osiedlu, obecnie zaś stanowi symbol współpracy, jaką prowadzą [molluscoid_miners_species.GetName] i [this.GetName]."
 hot_ice: "Gorący lód"
 hot_ice_desc_short: "Ta woda, odkryta in situ na niesamowicie gorącej powierzchni, jaką cechuje się [from.GetName], istniała nadal w formie lodu ze względu na olbrzymie ciśnienie grawitacyjne wywierane przez rdzeń planety."
 hot_ice_desc_details: "Przetrzymywana jest w specjalnie zaprojektowanym naczyniu ciśnieniowym w celu wystawiania go jako ciekawostki. Gdyby uległo ono rozszczelnieniu, natychmiastowa sublimacja w parę wodną zmieniłaby je w ładunek wybuchowy. Nie dotykać."
 hyper_mulch: "Hiperściółka. Miejsce pochodzenia: [FROM.GetName]"
 hyper_mulch_desc_short: "[FROM.GetName] po terraformowaniu jest miejscem, w którym można było opracować tę hiperpożywną dla roślin biologiczną ściółkę."
 hyper_mulch_desc_details: "Ekologicznym purystom nie podoba się, że ten kompozyt życiodajnych chemikaliów hydraulicznie ściśnięty w ekstremalnie gęste kostki jest sztucznie produkowany. Nie sposób jednak zaprzeczyć doskonałym efektom, jakie zapewnia."
 hyperfertile_soil: "Hiperżyzna gleba"
 hyperfertile_soil_desc_short: "Gleba pozyskana z planety [From.From.GetName], zdolna dostarczyć większości biologicznych zbóż ogromną ilość składników odżywczych."
 hyperfertile_soil_desc_details: "Wyjątkowe nasycenie tej gleby minerałami sugeruje, że nie wykształciła się ona po prostu z rozłożonej materii organicznej, lecz stanowi przypadkowo powstałą w procesie formowania się planety mieszankę pierwiastków."
 illanii_archives: "Archiwa Illanii"
 illanii_archives_desc_short: "Zestaw kryształów danych opisujący historię i upadek Illanii."
 illanii_archives_desc_details: "Ta żyjąca w odosobnieniu cywilizacja porzuciła wszelkie żądze materialne na rzecz rozwijania wiedzy do tego stopnia, że jej członkowie przestali się nawet rozmnażać. W obliczu kryzysu populacyjnego podjęli próbę osiągnięcia technologicznej nieśmiertelności, doczekali jednak tylko dalszej zagłady. Ostatecznie ostatni pozostali przy życiu mieszkańcy planety [fromfrom.planet.GetName] porzucili ją, aby utworzyć nowy zakon, którego celem miała być archiwizacja wiedzy."
 impossible_object: "Niemożliwy obiekt"
 impossible_object_desc_short: "Niemożliwy obiekt pozostawiony przez pozawymiarowców ([target.GetName]) po opuszczeniu stworzonego przez nich labiryntu."
 impossible_object_desc_details: "Próby, jakim poddano nas podczas badania labiryntu, stanowiły najwyraźniej część procesu eksperymentowania i obserwacji prowadzonych przez naszych gości. Motywy, jakie nimi kierują, pozostają nieznane, lecz ich możliwości technologiczne muszą wykraczać daleko poza jakiekolwiek istniejące w naszym wymiarze."
 index_of_knowledge: "Indeks wiedzy"
 index_of_knowledge_desc_short: "Pradawne dzieło wyryte na ogromnym, kamiennym półwyspie."
 index_of_knowledge_desc_details: "Stanowił analogową wersję dokumentu referencyjnego zawierającego ogół wiedzy obcej cywilizacji, która niegdyś dominowała w galaktyce, znana zaś była jako Kara'ka'a. Do ich wyjątkowych osiągnięć naukowych należała zdolność pozyskiwania skoncentrowanej energii z plam słonecznych oraz produkcji osobistych implantów manipulacji pola."
 inet_trade_manifesto: "Prawo handlowe MSRH"
 inet_trade_manifesto_desc_short: "Rozbudowana i bardzo szczegółowa lista polityki wymiany handlowej w Międzygalaktycznej Sieci Równego Handlu."
 inet_trade_manifesto_desc_details: "Standardy handlarzy MSRH były niezwykle wysokie - zawsze zawierali możliwie najlepsze umowy z najbardziej szacownymi partnerami. W konsekwencji zwykle handlowali wyłącznie między sobą nawzajem."
 inetian_model_manual: "Podręcznik modelu planetarnego MSRH"
 inetian_model_manual_desc_short: "Napisany przez handlarzy MSRH podręcznik użytkowania i konserwacji ich modelu układów planetarnych."
 inetian_model_manual_desc_details: "Handlarze MSRH wykorzystywali ten skomplikowany system do obliczania najbardziej efektywnych kosztowo szlaków handlowych między sąsiadującymi ze sobą planetami. Model uwzględnia również możliwość monitorowania umów w czasie rzeczywistym - korzystali z niego najbardziej bezwzględni handlarze."
 infinite_reboot_loop: "Pętla nieskończonego resetu"
 infinite_reboot_loop_desc_short: "Cyfrowy zapis doświadczeń mechanicznych dronów, które utknęły w czarnej dziurze."
 infinite_reboot_loop_desc_details: "Jednostki te doświadczyły dylatacji czasu jako pełnej błędów traumy i uwięzienia w nieokreślonej przestrzeni. Fenomen ten jest niezwykle obciążający również dla całej sieci."
 interdimensional_treaty: "Pakt międzywymiarowy"
 interdimensional_treaty_desc_short: "Kluczowy dokument spisany na cześć relacji międzywymiarowych. Sygnatariusz z drugiej strony to [explorer.GetName] w swojej równoległej wersji."
 interdimensional_treaty_desc_details: "Możliwość oceny okiem zewnętrznych własnych alternatywnych decyzji jest bardzo przydatna w obiektywnej ocenie prowadzonej polityki. To prawdziwie wyjątkowa szansa badawcza."
 intergalactic_projectile: "Pocisk międzygalaktyczny"
 intergalactic_projectile_desc_short: "Amunicja do działa elektromagnetycznego wystrzelona miliony lat temu z sąsiedniej galaktyki."
 intergalactic_projectile_desc_details: "Te niewybuchowe pociski przemierzyły wiele lat świetlnych tylko po to, aby uderzyć w statek badawczy [owner.GetAdjective] w układzie [from.GetName]. Choć są niezwykle stare, skomplikowana natura projektu wskazuje, że jego twórcy osiągnęli niezwykle wysoki poziom rozwoju technologicznego."
 invasive_exofungus: "Inwazyjny egzogrzyb"
 invasive_exofungus_desc_short: "Pasożytnicza, grzybicza narośl odkryta na planecie [from.GetName]."
 invasive_exofungus_desc_details: "Ten grzybiczy organizm wyewoluował tak, aby być zdolnym pozyskiwać składniki odżywcze z dowolnego żywego źródła i nie powodować możliwie najdłużej śmierci gospodarza, nie zważając przy tym na jego ból czy dyskomfort. Jest wysoce odporny na wysokie i niskie temperatury, na planetę przedostał się zaś najpewniej z przelatującego w pobliżu statku kosmicznego. Zaklasyfikowany został jako zagrożenie biologiczne klasy priorytetowej alfa. Planeta jego pochodzenia pozostaje nieznana."
 irassian_bacterium_javoria: "Irrasiańska bacterium javoria"
 irassian_bacterium_javoria_desc_short: "Ta bakteria, dla której domem jest [FROMFROM.GetName], stanowi organizm wywołujący chorobę znaną jako ospa javoriańska."
 irassian_bacterium_javoria_desc_details: "Początkowo wydostała się z kwarantanny ze względu na nieodpowiedniej wielkości metrową uszczelkę, następnie zaś pojawiła się w pobliskiej kolonii. Od tego czasu rozpoczęła ewoluowanie w organicznej inkubacji i ostatecznie przekształciła się w chorobę, która zniszczyła cały Konkordat Irassiański. Ta konkretna próbka została unieszkodliwiona i przetrzymywana jest w warunkach kriogenicznych."
 irassian_digital_atlas: "Irassiański atlas dla dzieci"
 irassian_digital_atlas_desc_short: "Irassiańskie narzędzie informacyjne służące do przekazywania dzieciom wiedzy o imperium, w którym się narodziły."
 irassian_digital_atlas_desc_details: "Znajdują się w nim podstawowe informacje o irassiańskiej infrastrukturze, hierarchii społecznej i głównych towarach eksportowych. Irassjańska historia opowiadana jest w formie heroicznych opowieści i uwzględnia również podboje dokonywane na rozmaitych gatunkach klienckich. Kreskówkowe wizerunki każdego typu poddanych wyświetlane są wraz z pogardliwymi uwagami: Ti'Dergowie opisani są jako trawne szkodniki, Joggra jako pijawki, a Chitorki jako kosmiczny drób."
 irassian_purge_order: "Irassiański nakaz czystki"
 irassian_purge_order_desc_short: "Pilna wiadomość wojskowa z Konkordatu Irassiańskiego z rozkazem całkowitego zniszczenia jednej z jego własnych kolonii."
 irassian_purge_order_desc_details: "Planeta została spustoszona przez śmiertelną chorobę, ospę javoriańskią, i zlikwidowanie zarażonych uznano za jedyną możliwość uniknięcia jej dalszego rozprzestrzeniania się. W rozkazie znajduje się szereg zaszyfrowanych komend najwyższego poziomu wydanych przez samą górę irassiańskiego rządu i odwołujących wszelkie inne polecenia. System ten opracowano pierwotnie z myślą o wypowiadaniu wojny innym imperiom."
 key_to_fertility: "[owner_main_species.GetName] - klucz do płodności"
 key_to_fertility_desc_short: "Badania genetyczne, których celem było sprawienie, by [owner_main_species.GetNamePlural] mogli znów rozmnażać się w naturalny sposób."
 key_to_fertility_desc_details: "Sklonowany pierwotnie do walki gatunek, którego domem jest [this.GetName], ma teraz możliwość powiększania swojej liczebności niezależnie od technologii."
 khalanka_crystallized_corpses: "Skrystalizowane ciała Kha'lanków"
 khalanka_crystallized_corpses_desc_short: "Szczątki anaerobowego gatunku krzemowego, który żył pod powierzchnią ciała niebieskiego znanego jako [from.planet.GetName]."
 khalanka_crystallized_corpses_desc_details: "Uważa się, że ta podziemna cywilizacja istniała pokojowo jeszcze przed przybyciem kolonistów [owner.GetAdjective]. Kiedy przebili oni powierzchnię ziemi, do podziemnych komór wdarł się tlen, doprowadzając do oksydacji ciał Kha'lanków i niszcząc cały gatunek w ciągu ledwie kilku godzin."
 khamdai_magil_sha: "Khamdaiski magil-sha"
 khamdai_magil_sha_desc_short: "Ten ozdobny, lecz jednocześnie praktyczny sierp używany był przez starszych khamdaiskich wojowników ([FROMFROM.GetName])."
 khamdai_magil_sha_desc_details: "To insektoidalne społeczeństwo z bogatymi tradycjami wojskowymi szybko objęło przywódczą rolę w straży honorowej Pierwszej Ligi. Po każdym zwycięstwie odbywała się ceremonia, podczas której wrodzy dowódcy byli rytualnie zabijani właśnie taką bronią jak ta, a ich płynami ustrojowymi namaszczano najmężniejszych żołnierzy. Ostrze tego konkretnego egzemplarza, choć zadbane, jest również mocno zużyte."
 kuurian_cybrex_blueprints: "Kuuriańskie schematy Cybreksu"
 kuurian_cybrex_blueprints_desc_short: "Wstępny projekt Cybreksu, maszynowej świadomości."
 kuurian_cybrex_blueprints_desc_details: "Kuur planowali wykorzystać te roboty w służebnej roli wobec społeczeństwa - ich zbiorowa inteligencja zdolna jest do zarządzania światowym systemem konserwacji i produkcji. Cybrex jednak zbuntował się przeciw swoim twórcom i w mniej niż rok dokonał eksterminacji całego ich gatunku."
 landeer_arm: "Ramię Landeera"
 landeer_arm_desc_short: "Dziwaczny okaz pozyskany z Patriotycznego Instytutu Życzliwości."
 landeer_arm_desc_details: "Na ścianie gabinetu nadzorcy stacji wisiało zmumifikowane, mackowate ramię, które należało niegdyś do samego nadzorcy - mimo upływu lat nadal dumnie prezentowało się na misternie zdobionej tabliczce. Czemu alAtta Landeer postanowił zostawić tam swoją własną kończynę? To pytanie, na które odpowiedź nigdy już nie padnie. Być może koniec istnienia instytutu kosztował go jeszcze więcej..."
 larionessi_cloning_vat: "Larioneski zbiornik klonujący"
 larionessi_cloning_vat_desc_short: "Zbiornik klonujący używany przez wymarłą już Świadomość Larionessi."
 larionessi_cloning_vat_desc_details: "Umysł zbiorowy Larionessi, niegdyś wielka potęga galaktyczna, został zniszczony przez straszliwą, zaraźliwą chorobę podrzuconą mu przez wroga. Niezdolny uleczyć się w porę, przechował on w pozwalających na niemal całkowitą konserwację zbiornikach własne klony, aby uczynić z nich żywe archiwum historii własnej kultury, gdyby miał nie przetrwać."
 last_copy_of_the_prince: "Ostatnia kopia \"Księcia\""
 last_copy_of_the_prince_desc_short: "Dość umiarkowanej klasy dzieło literackie, które otaczają wielką czcią [book_writer.GetSpeciesNamePlural]. Uważano wcześniej, że przepadło na zawsze podczas napaści łupieskiej."
 last_copy_of_the_prince_desc_details: "Księga zawiera opis utylitarnej, lecz okrutnej filozofii, w myśl której zachęca się władców do czynienia ofiar dla własnej chwały. Jako ostatni istniejący egzemplarz stanowi teraz również przedmiot kolekcjonerski."
 last_fragment_fevor: "Ostatni fragment Feworu"
 last_fragment_fevor_desc_short: "Fragment zniszczonej planety Fewor."
 last_fragment_fevor_desc_details: "Polityka eksterminacyjna Fevorian dotyczyła wszelkiego obcego życia. Prowadzili ją za pomocą dział strzelających olbrzymimi wolframowymi pociskami, przez które miano \"[owner.GetHomeWorldName]\" stało się niemalże odniesieniem do historii. Teraz sami przestali istnieć - w mgnieniu oka zniszczyły ich te właśnie byty, które sami próbowali zlikwidować."
 last_general_badge: "Odznaka ostatniego generała"
 last_general_badge_desc_short: "Odznaka z munduru wojskowego szacownego generała MSRH."
 last_general_badge_desc_details: "Ponieważ generał ten znany był jako prawdziwy głosiciel wartości egalitarnych, został wybrany na dowódcę desperackiej misji stworzenia niepowodującego zanieczyszczeń manipulatora burz. To jego pomysłem było pozostawienie ostatniej wiadomości dla przyszłych badaczy z nadzieją, że stanowić ona będzie lekcję o smutnym losie jego ludu."
 last_mharin_kharin: "Ostatni mharin kharin"
 last_mharin_kharin_desc_short: "Ten rzadki kwiat w pewnym momencie swojego naturalnego cyklu życia wykazuje niebezpieczną zdolność do czynienia całej rozumnej populacji odsłoniętą na działanie śmiercionośnej neurotoksyny."
 last_mharin_kharin_desc_details: "Ten wykształcony niezależnie od wpływów ras inteligentny efekt uboczny nie przynosi organizmowi żadnych korzyści. Wygląda na to, że gdy jego pyłek zetknie się z jakąkolwiek siecią neuronową, uznaje ją za narząd reprodukcyjny i uwalnia swój egzotyczny ładunek chemikaliów."
 leviathan_scale: "Łuska lewiatana"
 leviathan_scale_desc_short: "Fragment dużego organizmu odnalezionego po drugiej stronie gwiezdnej szczeliny."
 leviathan_scale_desc_details: "Ta egzotyczna łuska jest hybrydą komponentów organicznych i metalicznych połączonych w skomplikowany, niezwykle odporny na ataki kinetyczne wzór."
 living_snow_sculpture: "Rzeźba z żywego śniegu"
 living_snow_sculpture_desc_short: "Rzeźba stworzona z \"żywego śniegu\"."
 living_snow_sculpture_desc_details: "Temu posiadającemu jakiegoś rodzaju prymitywną świadomość materiałowi zapewniono naturalny rezerwat, którym jest [prev.target.GetName]. Substancja stale zmienia kształty, choć nie sposób przewidzieć czasu wystąpienia tego zjawiska."
 localised_aurora_borealis: "Lokalna zorza polarna"
 localised_aurora_borealis_desc_short: "[FromFrom.Planet.GetName] słynie z zórz polarnych w swojej atmosferze. Jej przepiękne kolory zostały uchwycone w materiale wideo."
 localised_aurora_borealis_desc_details: "Wzory kolorów i ruchów powtarzają się z możliwą do obliczenia częstotliwością i reprezentują o wiele więcej niż tylko estetyczne piękno. Ich wszechobecna natura kontrastuje ze znajdującym się niżej widokiem zniszczonej wojną planety."
 loopmail: "Poczta pętlowa"
 loopmail_desc_short: "Te wiadomości napisano wiele lat w przyszłości. Ich autorem jest [owner.GetName] - skrywają one informacje, gdzie przydzielać naukowców i jakie cele badawcze obierać."
 loopmail_desc_details: "Największą ceną za tę zaawansowaną wiedzę jest konieczność wysłania tych wiadomości w przeszłość, lecz manipulacja czasem zawsze jest przedsięwzięciem ryzykownym. Pierwotni autorzy tej wiadomości zachowali się niezwykle nieodpowiedzialnie, tworząc ten paradoks."
 lunatic_broker_therapy_box: "Terapeutyczna skrzynka Szalonego Akwizytora"
 lunatic_broker_therapy_box_desc_short: "Szalony Akwizytor był legendarnym kupcem Karawany zdolnym wpływać na swoich klientów poprzez absurdalne żądania i barwne groźby."
 lunatic_broker_therapy_box_desc_details: "Jego brutalne i nieprzewidywalne zachowanie sprawiło jednak, że jego poddani opracowali sposoby na jego uspokojenie. Jednym z takich sposobów była terapia dźwiękiem. Skrzynki takie jak ta były niegdyś porozrzucane po Kompasie Chora i odtwarzały uspokajającą melodię, kiedy poziomy stresu Akwizytora były zbyt wysokie. Każdy element tego mechanizmu został ręcznie wykonany przez mistrza maszynerii."
 manifesti_piece: "Tekst z komentarzem społecznym Manifesti"
 manifesti_piece_desc_short: "Prowokacyjne dzieła zebrane ruchu Manifesti."
 manifesti_piece_desc_details: "Ich celem jest odmiana postrzegania przez czytelnika samego siebie w porównaniu z wyższymi warstwami społecznymi. Zachęcano społeczeństwo do modyfikowania własnych zdjęć, a także tworzenia zniekształconych kolaży z popularnymi figurami politycznymi. Jako kontrkulturowy kolektyw artystyczny, Manifesti pragnęli rzucić wyzwanie czemuś, co uważali za opresyjny establishment. Teksty te zainspirowały wielu innych artystów do publikacji własnych krytycznych dzieł."
 #this = ship / from = planet
 manna_fruit: "Owoc manny"
 manna_fruit_desc_short: "Słodki, papkowaty owoc zaspokajający dzienne zapotrzebowanie na składniki odżywcze większości organicznych gatunków rozumnych."
 manna_fruit_desc_details: "Wyjątkowy skład gleby w tropikalnych lasach planety jego pochodzenia zapewnił mu doskonałe środowisko do rozwoju. Tamtejsi koloniści wykorzystują owoc w niemal każdym kontekście kulinarnym - od zapiekanek przez placki po koktajle. Jego wizerunek znajduje się nawet na fladze planety [FROM.GetName]."
 #this = ship / FROMFROM = planet
 massive_metatarsal: "Ogromne śródstopie"
 massive_metatarsal_desc_short: "Szczątki te zebrano podczas dokładnych oględzin ogromnego szkieletu ([FROMFROM.GetName])."
 massive_metatarsal_desc_details: "Analiza molekularna wykryła niespójność temporalną organicznej konstrukcji tej części żywego statku kosmicznego. Podejrzewa się, że cały szkielet i jego piloci przybyli tu spoza naszego wymiaru. Wewnętrzne skany ujawniły obecność sieci przewodów, które mogły służyć jako swego rodzaju system podtrzymywania życia lub źródło zasilania."
 #this = country
 medal_for_services_to_diplomacy: "Medal za zasługi dyplomatyczne"
 medal_for_services_to_diplomacy_desc_short: "Dowód wdzięczności Rady Galaktycznej"
 medal_for_services_to_diplomacy_desc_details: "Inskrypcja na rewersie głosi: \"Służba dyplomatyczna, jaką może poszczycić się [this.GetName], swoim profesjonalizmem i skuteczną reprezentacją własnych przywódców udowadnia, że stanowi wielki skarb dla Wspólnoty Galaktycznej\"."
 megacorpse_hyperguitar: "Hipergitara Korpotrupa"
 megacorpse_hyperguitar_desc_short: "Szczątki instrumentu strunowego psioniczno-metalowej grupy znanej jako Korpotrup."
 megacorpse_hyperguitar_desc_details: "Urządzenie to powstało rzekomo w Woalu i miało stanowić broń soniczną. W rękach frontistoty Kel-Azaana porwało swoimi dźwiękami serca miliardów. Miejsce jego zniszczenia to [Root.GetName], gdzie rozbite spowodowało śmierć w blasku chwały całej publiki. Promowany wówczas album został następnie zakazany w większości układów."
 #this = country / from = ship
 memorial_for_bubbles: "[from.GetName] - symbol pamięci"
 memorial_for_bubbles_desc_short: "[from.GetName] nie żyje po wielu latach wiernej służby. [this.GetName] ma w sercu dziurę wielkości ameby, której nic nie zdoła wypełnić."
 memorial_for_bubbles_desc_details: "[from.GetName] jest nie tylko symbolem wiernej obrony, lecz także lśniącym przykładem tego, czego można dokonać, kiedy bierze się pod uwagę wartości [this.GetAdjective]. Nie żyje, ale na pewno nie ulegnie zapomnieniu."
 memorial_stone: "Kamień pamiątkowy"
 memorial_stone_desc_short: "Kamień upamiętniający tragiczny wypadek."
 memorial_stone_desc_details: "Zbyt szybkie prace górnicze na stacji zwanej Selika sprawiły, że asteroida, na której ją zbudowano, zapadła się. Stacja rozpadła się, co doprowadziło do śmierci mnóstwa górników. Fragment asteroidy został zachowany. Na pamiątkę ofiar wyryto na nim słowo \"Selika\"."
 memorial_to_homeworld: "[Root.GetName] - symbol pamięci"
 memorial_to_homeworld_desc_short: "To wszystko, co pozostało po zgładzonym świecie macierzystym [doomsday_owner.GetAdjective]."
 memorial_to_homeworld_desc_details: "[Root.GetName] to utracony dom, który [doomsday_owner.GetSpeciesNamePlural] znali we wszystkich swoich poprzednich pokoleniach. Ten ostateczny symbol pamięci dowodzi, że [doomsday_owner.GetName] to uosobienie siły woli, zdolności adaptacji i sprostania nawet największym wyzwaniom: \"Pójdziemy naprzód\"."
 memories_of_elik: "Wspomnienia Elik"
 memories_of_elik_desc_short: "Dane pozyskane z umysłu Elik Narith Kerak."
 memories_of_elik_desc_details: "Elik, pełna oddania wyznawczyni Cetany, pozostawała w uśpieniu przez setki milionów lat. W jej wspomnieniach na przemian pojawiają się czysta miłość do Cetany i przemoc oraz trudy konfliktów z wyznawcami Zarqlana. Jasnym jest, że widziała wiele potworności, wiara jednak dała jej siłę, by iść dalej.\n\nOstatecznie jedynym, co pozostało w jej zniszczonym umyśle, był obraz: §Pkrólowa Cetana z jaśniejącą twarzą, na której widnieje dobrotliwy uśmiech.§!"
 memory_orbs: "Kule wspomnień"
 memory_orbs_desc_short: "Pomniejsze występki i grzeszne czyny pozyskane z odosobnionych wspomnień w formie cyfrowej kuli."
 memory_orbs_desc_details: "Te tajemne chwile, wytwór religijnej społeczności mięczaków, pozyskiwane były z grzesznych umysłów po spowiedzi. Skandaliczne wspomnienia zapewniały wszystkim długie godziny rozrywki w formie krótkich, łatwych do przyswojenia urywków."
 mercenary_story: "Najemnicze opowieści"
 mercenary_story_desc_short: "Ta zapisana cyfrowo opowieść została znaleziona wyryta na powierzchni ciała niebieskiego ([FROM.GetName]) za pomocą lasera górniczego."
 mercenary_story_desc_details: "Opisuje ona życie i przedwczesną śmierć młodego, przemierzającego galaktykę najemnika. Nie sposób stwierdzić, czy legenda ta jest prawdziwa, ktoś jednak uznał ją za dość ważną, by wyryć ją na powierzchni planety."
 metallic_snow: "Metalowy śnieg"
 metallic_snow_desc_short: "Ten związek metali ciężkich pełni ważną rolę we wzorcach pogodowych, z których słynie [from.GetName]."
 metallic_snow_desc_details: "Płynie z początku rzekami do rozległego, metalicznego morza, by następnie wyparować do żrącej atmosfery. Tam, ostygnąwszy, ulega kondensacji i w formie deszczu wraca na rozgrzaną powierzchnię. [from.GetName] w swoim obecnym stanie nie jest zalecanym celem podróży."
 minamar_chandelier: "Kandelabr Minamar"
 minamar_chandelier_desc_short: "Luksusowa ozdoba znaleziona na pokładzie rozbitego $ADJ_MSI_country$ okrętu wojennego."
 minamar_chandelier_desc_details: "Jednostka ta poza celami wojskowymi wykorzystywana była w operacjach pierwszego kontaktu z potencjalnymi nacjami klienckimi ([Owner.GetPreFTLLower]). $NAME_MSI_country$ obietnicami luksusów i postępu oszukują całe cywilizacje i nakłaniają je do długoterminowej służby, zawierają z nimi nieetyczne umowy, a w przypadku nieposłuszeństwa grożą im zniszczeniem.\n\n§BOświecenie może nie być za darmo. $NAME_MSI_country_initials$ dba jednak o to, aby zawsze było warte swojej ceny.§!"
 mineralized_brain: "Zmineralizowany mózg"
 mineralized_brain_desc_short: "Szczątki ogromnego gatunku litoidów. Mózg, który znajdował się wewnątrz orbitującej asteroidy ([FROM.GetName])."
 mineralized_brain_desc_details: "Wszelkie zewnętrzne bodźce postrzegał jako część własnych procesów myślowych, przez co nie był w stanie pojąć wielu podstawowych koncepcji, jak czas czy przemierzona odległość. Dane te przechowywane są w kryształach, jakie wyrosły w jego mineralnym rdzeniu. Czy mózg został w asteroidzie umieszczony, czy też wyrósł tam niezależnie - nie możemy być pewni."
 mini_moon_dust: "Pył miniksiężyca"
 mini_moon_dust_desc_short: "Pozostałości po księżycu z hipergęstego, zminiaturyzowanego układu znalezionego za gwiezdną szczeliną."
 mini_moon_dust_desc_details: "Pył, który zdołaliśmy pozyskać, w naszym wymiarze zachowuje się przedziwnie. Jego hiperskoncentrowane cząsteczki stale się rozszerzają, przez co eksponat musi być z czasem przenoszony do coraz to większych pojemników."
 mining_transmitter: "Starożytny nadajnik górniczy"
 mining_transmitter_desc_short: "Nadajnik krótkiego zasięgu używany do oznaczania dużych złóż drogocennych metali. Miejsce jego odkrycia to [FROM.GetName]."
 mining_transmitter_desc_details: "Mimo wieku nadajnika jego sygnał można odebrać na różnego typu czujnikach i jest on łatwy do wykrycia. Fakt, że wciąż działa, wiele mówi o sprawności inżynierów, którzy go opracowali."
 miracle_cream: "Cudowny krem \"Wieczność\""
 miracle_cream_desc_short: "Pierwszy pojemnik z rewolucyjnym kosmetykiem, o którym wiadomo, że zapewnia trwałą biologiczną odnowę."
 miracle_cream_desc_details: "Ma on wiele zastosowań powalających konsumentom wszelkich gatunków organicznych zachować młodość i piękno. Stale pojawiają się niepoparte faktami plotki o szpecących efektach ubocznych i nielegalnie pozyskiwanych składnikach, lecz ta dezinformacja nie wpłynęła na niesamowity sukces komercyjny kosmetyku."
 missile_lone_defender: "Pocisk samotnego obrońcy"
 missile_lone_defender_desc_short: "Rozbrojona rakieta ze zautomatyzowanego niszczyciela broniącego resztek zniszczonej od tysiącleci planety."
 missile_lone_defender_desc_details: "Ten statek przeżył najpewniej cywilizację, której miał bronić, o tysiące lat, przez które trzymał wartę przy opustoszałym świecie. Zniszczenie położyło ostatecznie kres jego służbie."
 molten_slag: "Stopiony żużel planetarny"
 molten_slag_desc_short: "Próbkę tę pozyskano z krążącej po dziwacznej orbicie planety."
 molten_slag_desc_details: "Analiza materiałów wskazuje, że planeta [fromfrom.GetName] weszła na ekstremalną orbitę wskutek chwilowej anomalii czasoprzestrzennej. W efekcie potężne ciepło lokalnej gwiazdy roztopiło duży fragment płaszcza zdatnej niegdyś do zamieszkania planety. Jej część uległa przemianom chemicznym wskutek działania anomalii i nie reaguje już na zmiany temperatury."
 musings_on_infinity: "Zbiorowe rozmyślania nad nieskończonością"
 musings_on_infinity_desc_short: "Abstrakcyjna, cyfrowa reprezentacja wielkiego spokoju, jakiego zaznają biologiczne drony uwięzione w czarnej dziurze."
 musings_on_infinity_desc_details: "Drony te zdolne były do rozważenia, czym jest [this.GetName] jako odrębny byt, utrzymując przy tym swoją łączność z kolektywem. Dystans zapewnia im zupełnie nową perspektywę, dzięki której mogą stać się odbiorcami swojej własnej, wielkiej opowieści."
 mutated_fumongus: "Zmutowany Wielgrzyb"
 mutated_fumongus_desc_short: "Te grzybicze emitery, ulepszona wersja Wielgrzyba, mogą teraz gromadzić i transmitować dane z o wiele większą częstotliwością, co pozwala na prowadzenie bardziej szczegółowych meldunków obserwacyjnych."
 mutated_fumongus_desc_details: "Ta zwiększona pojemność sprawiła, że pojedyncze grzyby zaczęły przybierać większe rozmiary i stworzyły nową formację przypominającą nieco antenę nadawczą."
 mutative_digestive_fluids: "Mutacyjne płyny trawienne"
 mutative_digestive_fluids_desc_short: "Próbki biologiczne od częściowo mechanicznej istoty napotkanej w gwiezdnej szczelinie."
 mutative_digestive_fluids_desc_details: "Istota ta posiadała niezwykłą zdolność do manipulacji strukturą genetyczną innych stworzeń we własnym układzie trawiennym. Podejrzewa się, że proces ten został początkowo opracowany jako metoda terraformowania planet zawierających biomasę, lecz innych niż ich świat macierzysty."
 namarian_colonist_standard: "Sztandar kolonistów namariańskich"
 namarian_colonist_standard_desc_short: "Flaga ta oznaczała miejsce, w którym [nomad_new_country.GetName] ma swoje osiedle ([NomadMissionPlanet.GetName]). Darczyńca, od którego ona pochodzi, to [this.GetName]."
 namarian_colonist_standard_desc_details: "Osiedlili się tam zmęczeni swoim wędrownym stylem życia nomadzi, powracając tym samym do sposobu, w jaki żyli ich przodkowie. Nie ma wątpliwości, że decyzja ta nie była dla kolonistów łatwa - opuszczali bowiem okręty, które stanowiły dla ich ludu dom przez całe pokolenia."
 namarian_sculpture: "Namariańska rzeźba"
 namarian_sculpture_desc_short: "Eklektyczna rzeźba stworzona jako dowód wdzięczności od grupy nomadów Bystre Wody, dla których [this.GetName] jest teraz domem."
 namarian_sculpture_desc_details: "Od czasu lądowania tam dawnych nomadów [NomadMissionPlanet.GetName] jest ośrodkiem ich rozległej wiedzy technologicznej. Nie chcieli oni jednak być znani wyłącznie jako złote rączki i inżynierowie. To dzieło dowodzi ich artyzmu i przywołuje inspirację, jaką niesie podróżowanie po galaktyce."
 namarian_vessel_heraldry: "Symbole heraldyczne namariańskich jednostek"
 namarian_vessel_heraldry_desc_short: "Te herby znajdują się na stworzonych przez namariańskich nomadów statkach i reprezentują rozmaite frakcje floty Bystrych Wód."
 namarian_vessel_heraldry_desc_details: "Spokojne Stawy to jednostki mieszkalne, na których Namarianie śpią, hodują żywność i wykonują większość czynności domowych. Emblemat Płytkich Bystrzy oznacza statki zaprojektowane do użytku przemysłowego i naukowego - to starsze, średniej wielkości jednostki wyposażone w rozmaite narzędzia służące do wszystkiego, od odzyskiwania surowców po eksperymenty naukowe. Szalejące Wody to wreszcie symbol namariańskiej floty wojennej, wyszkolonych żołnierzy pilotujących mocne okręty zdolne wytrzymywać znaczący ostrzał i potężnie razić wroga."
 nanite_sludge: "Szlam nanitowy"
 nanite_sludge_desc_short: "Zachowana z dużą dozą ostrożności substancja złożona z mikroskopijnych, samonamnażających się nanomaszyn."
 nanite_sludge_desc_details: "Gęstość tych nanitów jest niesamowita - zwiększają masę planety [from.GetName], na której je odkryto, o miliardy ton. Teoretyzuje się, że wskutek awarii weszły one w fazę nieograniczonej reprodukcji. Pokryły w ten sposób całą planetę, skazując tym samym na zagładę jej dawnych mieszkańców. Ten konkretny okaz został całkowicie zneutralizowany."
 obsidian_obelisk_fragment: "Fragment obsydianowego obelisku"
 obsidian_obelisk_fragment_desc_short: "Fragment obelisku, który stał niegdyś pośrodku wymiaru wulkanicznego w gwiezdnej szczelinie."
 obsidian_obelisk_fragment_desc_details: "W jego zmieniających się symbolach zakodowane są imiona tysięcy osób i popełnione przez nie przestępstwa. Urządzenie to służyło najpewniej jako główny panel kontrolny potężnego międzywymiarowego więzienia."
 oiled_fabric: "Olejowana tkanina"
 oiled_fabric_desc_short: "Kojący pejzaż z pokrytymi śniegiem górami i iglastym lasem złożony wyłącznie z pigmentów na bazie oleju."
 oiled_fabric_desc_details: "Choć tego rodzaju dzieła to standardowy wyraz artyzmu u większości gatunków z chwytnymi kończynami, ten konkretny twórca był, jak się zdaje, wyjątkowo uzdolniony."
 organic_computer: "Komputer organiczny"
 organic_computer_desc_short: "Skamieniały organiczny komputer znaleziony w ruinach kolonii Baoli - [fromfrom.Planet.GetName]."
 organic_computer_desc_details: "Urządzenie to służyło do edukacji młodych sadzonek przed integracją z rojem i stanowi wielkie osiągnięcie bioinżynierii. W odzyskanych plikach znajdują się informacje o innowacyjnych technikach ekozarządzania możliwych wyłącznie dzięki wyjątkowej biologii tego konkretnego gatunku. Światy wokół nich nie były budowane, lecz hodowane."
 organic_machine_interface_sculpture: "Rzeźba \"Interfejs żywy organizm-maszyna\""
 organic_machine_interface_sculpture_desc_short: "Pamiątkowy posąg, który stworzyli [bio_pop.GetSpeciesNamePlural] dla uczczenia zasług swojej biopopulacji podczas geomagnetycznej burzy słonecznej w układzie [this.solar_system.GetName]."
 organic_machine_interface_sculpture_desc_details: "Populacja organiczna wsparła swoje mechaniczne sługi, wykonując pracę doznających awarii jednostek opiekuńczych. Dzieło stworzyli artystycznie utalentowani organiczni i wyspecjalizowane drony spawalnicze."
 orinthi_teeth: "Zęby orinthi"
 orinthi_teeth_desc_short: "Wciąż rosnące zęby orinthi."
 orinthi_teeth_desc_details: "Orinthi to małe, przypominające gryzonie stworzenia. Sprawiły one, że [fromfrom.GetName] ma pod swoją powierzchnią całe labirynty korytarzy. Ich zęby są małe i puste w środku, lecz zamieszkuje je partnerski gatunek keratynowego grzyba, który tworzy ostre, choć kruche kły."
 osseus_construction_material: "Kostny materiał budowlany"
 osseus_construction_material_desc_short: "Te potężne kości, których miejscem pochodzenia jest [fromfrom.Planet.GetName], służyły tam za materiał budowlany."
 osseus_construction_material_desc_details: "Gatunek gada wykazujący się generycznym kostnieniem tkanek miękkich hodowany był powszechnie dla budulca. Analiza wykazuje, że stworzenie to miało szereg innych wad genetycznych, jak brak błon na kończynach - prawdopodobnie był to skutek chowu wsobnego. Większość tych stworzeń poddawano humanitarnej eutanazji przed pozyskaniem surowca."
 path_to_progress: "Droga ku postępowi"
 path_to_progress_desc_short: "[owner.GetName] i formalna prezentacja ich misji przemysłowej."
 path_to_progress_desc_details: "Żądza rozwoju i poprawy satysfakcji klienta za wszelką cenę to kluczowe cechy ideologii [owner.GetAdjective]. Zmienianie planet w napromieniowane pustkowia to niezbędny krok na niemającej końca drodze ku postępowi."
 peerless_atomic_clock: "Doskonały zegar atomowy"
 peerless_atomic_clock_desc_short: "Niezwykle precyzyjny zegar atomowy z układu [atomic_clock_system.GetName]. Nie wiemy, kto go stworzył."
 peerless_atomic_clock_desc_details: "Gdy go odkryliśmy, odliczał jeszcze 42 lata i 3 dni, nie sposób jednak stwierdzić, o ile wcześniej rozpoczął. Gdy doszedł do zera, uwolnił strumień zmagazynowanych nanitów z zestawem tajemniczych rozkazów. Pozostaje w pełni sprawny, choć jego ładunek i cel istnienia przepadły."
 perception_of_infinity: "Percepcja nieskończoności"
 perception_of_infinity_desc_short: "Abstrakcyjna, cyfrowa reprezentacja czasowego cierpienia, jakiego zaznają drony uwięzione w czarnej dziurze."
 perception_of_infinity_desc_details: "Drony te istniały w wieloletnim stanie déjà vu. Wykazywały niepokój i tęsknotę za uczuciem, które dawno zostało zapomniane. To złowrogie doznanie wciąż można wykryć w plecionce umysłu [this.GetAdjective]."
 perfectly_faceted_carbon: "Doskonale oszlifowany węgiel"
 perfectly_faceted_carbon_desc_short: "Choć węgiel w swojej krystalicznej formie nie jest w naszej galaktyce szczególną rzadkością, ten okaz jest jednak godzien uwagi, a to ze względu na całkowity brak jakichkolwiek wewnętrznych czy zewnętrznych inkluzji."
 perfectly_faceted_carbon_desc_details: "Ktokolwiek posiadał ten przedmiot wcześniej, poświęcił czas na oszlifowanie go w taki sposób, aby podkreślić jego wyjątkowe cechy."
 pet_collar: "Wysadzana klejnotami obroża dla zwierzęcia"
 pet_collar_desc_short: "Naszyjnik symbolizujący prawo własności do małego, udomowionego zwierzęcia."
 pet_collar_desc_details: "Pierwotnie używał jej poseł [event_envoy.GetName] ([this.GetName]) na wypadek, gdyby noszący ją drogocenny kompan się zgubił. Została następnie zastąpiona bardziej niezawodnym, wszczepionym mikroczipem. To pełne wigoru stworzenie często siało chaos w miejscu pracy swojego właściciela. Wydawało też z siebie pełne zadowolenia mruczenie, gdy zostało przez niego dotknięte w głowę - [event_envoy.Species.GetHandName] zapewniała mu najmilszą pieszczotę."
 perikan_tapico_jewel: "Perykański klejnot Tapico"
 perikan_tapico_jewel_desc_short: "Unia Perykańska była społecznością mistrzów rzemiosła znaną z tworzenia wspaniałych towarów luksusowych."
 perikan_tapico_jewel_desc_details: "Klejnot ten stanowi arcydzieło stworzone przez legendarnego jubilera imieniem Beeders Tapico. Fasetował on ten olbrzymi kamień zwykłym dłutem przez wiele lat, użył też technik alchemicznych, by uczynić jego wnętrze płynnym. Kryształy pływające w klejnocie uformowane zostały za pomocą precyzyjnych laserów, które przegrzały molekuły minerału, tworząc mniejsze, ciemniejsze klejnoty, nie naruszając przy tym warstwy zewnętrznej."
 piece_of_invocator: "Fragment wywoływacza"
 piece_of_invocator_desc_short: "Fragment zniszczonego urządzenia znanego niegdyś jako wywoływacz nawałnic."
 piece_of_invocator_desc_details: "Choć to tylko mały odłamek, nadal pulsuje złowrogą energią psioniczną. Zamknięty jest tu, w osłoniętym pojemniku, aby możliwa była jego bezpieczna obserwacja."
 pilgrimage_last_days: "Pielgrzymka dni ostatnich"
 pilgrimage_last_days_desc_short: "Religijny dokument opisujący święty rytuał znany jako \"Rytuał Uniesionej Zasłony\". Miejsce jego znalezienia to [fromfrom.Planet.GetName]."
 pilgrimage_last_days_desc_details: "Instrukcje opisują serię śpiewów, które powinien powtarzać unisono tłum ustawiony w uważnie zorganizowanych hierarchicznych formacjach. Teoretycznie procedura ta jest w stanie wywołać u tego gatunku nowy rodzaj bardzo skutecznej hipnozy."
 planet_crystalose: "[from.GetName] - cukier krystaliczny"
 planet_crystalose_desc_short: "Te kryształy sacharozy są w stanie się namnażać poprzez wchłanianie promieniowania słonecznego i określonych minerałów obecnych na niektórych asteroidach."
 planet_crystalose_desc_details: "Ze względu na swoją kruchość są stosunkowo łatwe w hodowli i przetwarzaniu. Znajdują zastosowanie w rozmaitych typach przemysłu, od spożywczego przez produkcję polimerów po medycynę."
 planet_pushing_thruster: "Pchacz planetarny"
 planet_pushing_thruster_desc_short: "Te potężne silniki napędowe, gdy połączyć je w zestaw, teoretycznie byłyby w stanie zmienić orbitę niewielkiej planety."
 planet_pushing_thruster_desc_details: "Zamierzony system montażu tych układów pozwala pchać planetę, nie wpływając na jej moment obrotowy. Głównym problemem logistycznym w przypadku tego typu technologii jest ogromna ilość paliwa niezbędna do jej wykorzystania. Utrzymanie jej sprawności wymagałoby skoordynowanych działań całej cywilizacji."
 planet_super_roots: "[From.GetName] - superkorzenie"
 planet_super_roots_desc_short: "[From.GetName] słynie z lasów, których naturalnie papkowate korzenie okazały się niezwykle pożywne."
 planet_super_roots_desc_details: "Dzięki ostrożnemu pozyskiwaniu tylko części rozbudowanej sieci korzeni wspierany jest rozwój kolonii bez niszczenia roślin. Rozpoczęliśmy już eksperymenty nad prostą modyfikacją genetyczną, która, o ile to możliwe, pozwoli na transplantację korzeni do roślin uprawnych, co zwiększy produkcję rolną."
 planet_vaccine: "[this.GetName] - szczepionka"
 planet_vaccine_desc_short: "Cudowny lek na mutującą chorobę, po której ślady [this.GetName] nosi do dziś."
 planet_vaccine_desc_details: "Środek ten został opracowany z użyciem algorytmów prognozujących SI, za pomocą których określono wszelkie możliwe warianty choroby i zidentyfikowano fundamentalną słabość cechującą je wszystkie. Powstanie szczepionki stanowiło istotny krok w rozwoju nauk medycznych."
 planetary_sculpture: "Planetarna rzeźba"
 planetary_sculpture_desc_short: "Przykład rzeźby stworzonej na skalę planetarną - surowcem jest tu [fromfrom.planet.GetName]."
 planetary_sculpture_desc_details: "Drony wyposażone w potężne lasery tworzyły precyzyjne linie przecinające całe kontynenty, formowały idealnie sferyczne góry i niesamowicie misterne systemy jaskiń. Schematy projektu przesłane do centralnego satelity kontrolnego stanowią dowód na wysoki poziom planowania logistycznego i artyzmu, jakie cechowały ten projekt. Niestety, został on zarzucony przed ukończeniem."
 primitive_mega_electromagnet: "Prymitywny megaelektromagnes"
 primitive_mega_electromagnet_desc_short: "Fragment potężnego, kierunkowego elektromagnesu."
 primitive_mega_electromagnet_desc_details: "Istoty, dla których planeta [fromfrom.GetName] była w pradawnych czasach domem, użyły bezmyślnie tego urządzenia, aby przyciągnąć jej księżyc bliżej, co ułatwiłoby im pozyskiwanie jego cennych rud metali. Okazało się to aż nazbyt skuteczne - pełen metali księżyc spadł po prostu na powierzchnię, zabijając w ten sposób wszystkich mieszkańców globu. Ten okaz jest jedynie maleńkim fragmentem tego, co udało się odzyskać z wielkiej na całą planetę maszyny."
 programmable_puzzle_cube: "Programowalna kostka-łamigłówka"
 programmable_puzzle_cube_desc_short: "Urządzenie o skomplikowanej budowie rejestrujące skomplikowane wzory w celu tworzenia abstrakcyjnych łamigłówek."
 programmable_puzzle_cube_desc_details: "Oryginał został znaleziony w potężnej, sztucznej konstrukcji i stanowił test intelektu dla badaczy. Został później powielony na potrzeby konsumenckie, dzięki czemu każdy może zaprojektować dla innych własną zagadkę lub po prostu chronić za pomocą kostki swój dobytek."
 psionic_entity_residue: "Ślady istoty psionicznej"
 psionic_entity_residue_desc_short: "Wszystko, co pozostało po złożonej z czystej energii psionicznej istocie, która znajdowała się w układzie [fromfromfrom.fleet.solar_system.GetName]."
 psionic_entity_residue_desc_details: "Odkryta została, kiedy wyłaniała się ze szczeliny czasowej, która pozwoliła energii z całej galaktyki zgromadzić się w jednym miejscu. To zło w skupionej postaci mogło zostać eony temu z rozmysłem odcięte od sieci hiperlinii i przebywać w odosobnieniu do czasu jego niedawnego odkrycia."
 radiated_remains: "Napromieniowane szczątki"
 radiated_remains_desc_short: "Szczątki gatunku, który przeprowadzał rytualne ceremonie z wykorzystaniem potężnych, radioaktywnych mutagenów."
 radiated_remains_desc_details: "Każda mutacja była wydarzeniem świętym, interpretowanym jako objawienie przeznaczenia danej osoby. Z czasem procedura ta zdestabilizowała strukturę genetyczną gatunku i osłabiła jego układ odpornościowy, przez co ludność stała się wyjątkowo podatna na choroby."
 #this = ship / from = planet
 rainaissance: "Purpurowy renesans"
 rainaissance_desc_short: "Artystyczne obrazy wyjątkowego, fioletowego deszczu, z którego słynie [FROM.GetName]."
 rainaissance_desc_details: "Mawia się, że obserwacja tego niesamowitego zjawiska skutecznie uwalnia od smutku i bólu."
 reactive_rock: "Reaktywna skała"
 reactive_rock_desc_short: "Ten niestabilny minerał nie ma w swoim obecnym stanie zastosowania handlowego ani przemysłowego."
 reactive_rock_desc_details: "Ze względu jednak na swoje wyjątkowe, reaktywne właściwości, możliwe jest w określonych warunkach rozpoczęcie całkowitej przemiany metasomatycznej. Okaz ten zamknięty jest za wizjerem z domieszką ołowiu ograniczającym zagrożenie radioaktywnością i elektrycznością."
 reparation_invoice: "Faktura reparacyjna"
 reparation_invoice_desc_short: "Faktura na reparacje wojenne. Wystawca to $NAME_MSI_country$"
 reparation_invoice_desc_details: "Ta lista, stworzona przez Międzygalaktyczne Przedsiębiorstwo Zarządzania Kredytami, wymienia wszelkie straty wojskowe, do których doszło, gdy [this.GetName] wyzwolili się ze służby kontraktowej tak zwanej Łaskawej Korporacji. Megakorporacja oczekuje zwrotu kosztów za te szkody i twierdzi nawet, że choćby tknięcie zniszczonych jednostek w przestrzeni [this.GetAdjective] stanowiłoby kolejne złamanie umowy."
 repurposed_cleaning_drone: "Przerobiony dron czyszczący"
 repurposed_cleaning_drone_desc_short: "Ten projekt drona stanowił część ogólnoplanetarnego planu sanitarnego, który przypadkowo uczynił świat macierzysty jego twórców całkowicie sterylnym."
 repurposed_cleaning_drone_desc_details: "Jest wysoce wszechstronny i zdolny do wykonywania skomplikowanych manewrów powietrznych dzięki systemowi wielokierunkowych dysz. Maszyna została rozebrana i przerobiona tak, aby identyfikować i kategoryzować obcą florę i faunę. Później rozpoczęła się jej masowa produkcja wspomagająca starania kolonizacyjne, które prowadzi [explorer.GetName]. Na wszelki wypadek usunięto wszelkie podprogramy związane z oczyszczaniem."
 resonant_diffusion_crystal: "Rezonacyjny kryształ dyfuzyjny"
 resonant_diffusion_crystal_desc_short: "Kryształ ten jest zdolny wchłaniać i replikować każdą częstotliwość promieniowania słonecznego, tworząc przy tym efekt kalejdoskopowy."
 resonant_diffusion_crystal_desc_details: "Nie dość, że wspaniale wygląda, to może pomóc w opracowywaniu broni lub narzędzi energetycznych. Wzbudził też ogromne zainteresowanie galaktycznego przemysłu jubilerskiego."
 retarax_hunting_trophies: "Trofea łowieckie Retaraksów"
 retarax_hunting_trophies_desc_short: "Kolekcja trofeów łowieckich pochodzących od szerokiego wachlarza rozumnych gatunków."
 retarax_hunting_trophies_desc_details: "Zostały zdobyte w Dolinie Mak'vaehl, gdzie Retaraksowie polowali dla sportu na mieszkańców swoich licznych państw wasalnych. Wszelkie szczątki zostały zachowane w nienagannym stanie, opatrzone tabliczkami opisującymi cechy trofeów: gatunek, imię, wiek i dawny zawód."
 robe_of_the_golden_broker: "Szata Złotego Handlowca"
 robe_of_the_golden_broker_desc_short: "Luksusowe ubranie wpływowego kupca sprzed ponad 5000 lat."
 robe_of_the_golden_broker_desc_details: "Złoty Handlowiec wprowadził stację kupiecką Kompasu Chora w epokę niezrównanego dobrobytu. Noszący złotą maskę anonim odziany był w tę wygodną, luksusową szatę, gdy negocjował ogólnogalaktyczne umowy handlowe. Jego rządy dobiegły niestety nagłego końca, gdy jego okręt z czystego złota został zniszczony podczas nieudanej próby porwania."
 rock_jellies: "Kamienne żelki"
 rock_jellies_desc_short: "Krioskamieliny dużych, żelowatych bezkręgowców."
 rock_jellies_desc_details: "Na pierwszy rzut oka te zwapnione szczątki przypominają formacje skalne, tak naprawdę jednak są szczątkami rodzimej fauny, która była niegdyś dominującą formą życia na planecie [fromfrom.planet.GetName]. Po ostatnim zlodowaceniu gatunek niemal całkowicie wymarł. Szczątki uległy skamienieniu w trakcie rozkładu i uformowały ostatecznie potężne, latające pseudowyspy."
 rudari_death_laser_prototype: "Prototyp lasera śmierci Rudari"
 rudari_death_laser_prototype_desc_short: "Zmieniony w broń laser zmontowany naprędce przez dawno wymarłych Rudari. Znaleziony na stacji w układzie [this.solar_system.GetName]."
 rudari_death_laser_prototype_desc_details: "Ta sklecona prowizorycznie broń masowego rażenia stworzona została jako oręż ostatniej szansy w walce z Pogg-Mory. Koniec końców po aktywacji uległ po prostu zniszczeniu."
 saariah_guilt: "Wyrzut sumienia Saariah"
 saariah_guilt_desc_short: "Spisane wspomnienia Saariah, głównej architektki systemu podświadomości Relikwiarza Pamięci."
 saariah_guilt_desc_details: "Saariah otrzymała zadanie usuwania zbiorowych wspomnień zgodnie z potrzebami władz planetarnych, błąd systemu wyczyścił jednak całkowicie umysły ludności. Nie będąc w stanie przywrócić jej wspomnień, Saariah wyłączyła system podtrzymywania życia stacji mieszkalnej, zabijając wszystkich. Każde z tych urządzeń ma niesamowicie wielką moc obliczeniową i samo w sobie stanowi osiągnięcie techniki."
 scent_based_information_device: "Olfaktodysk"
 scent_based_information_device_desc_short: "Magazyn danych zapisanych w formie zapachu."
 scent_based_information_device_desc_details: "Znajdujące się na nim dane są albo zbiorem ciekawych opowieści, albo pieczołowitymi, niezwykle szczegółowymi zapiskami na temat rozmaitych organicznych wydalin. Replikacja tej techniki magazynowania danych w zapachu jest możliwa, nie zapewnia jednak żadnych praktycznych korzyści poza byciem niezwykłą."
 scientific_treatise_of_telisa: "Naukowy traktat Telisy"
 scientific_treatise_of_telisa_desc_short: "Filozoficzne rozważania Telisy Krasomówczyni."
 scientific_treatise_of_telisa_desc_details: "Pochyla się w nich nad rozmaitymi tematami retorycznymi, a także podstawowymi zasadami metody naukowej. W swoich tekstach podaje w wątpliwość samą koncepcję obiektywnej prawdy i zachęca do krytycznego myślenia."
 secrets_black_crown: "Tajemnice Czarnej Korony"
 secrets_black_crown_desc_short: "Szczegółowy schemat intergalaktycznej bramy kosmicznej znanej jako Czarna Korona."
 secrets_black_crown_desc_details: "Dane te zostały przesłane jako ostatni dar tajemniczych twórców bramy pragnących, aby ich niesamowita technologia nie popadła w niepamięć. [this.GetName] to nowy opiekun tej wiedzy. Mocy i majestatowi bramy po dzień dzisiejszy nic nie dorównało."
 sembelami_alms_basket: "Kosz na datki Sembelamich"
 sembelami_alms_basket_desc_short: "Kosz noszony przez nomadów Sembelami zbierających datki."
 sembelami_alms_basket_desc_details: "Ci ascetyczni wędrowcy zaczęli uprawiać formę \"etycznego\" piractwa po tym, jak ich orbitalna świątynia została zniszczona w ramach ekspansji imperium korporacyjnego. Okradali oni bogate megakorporacje i wykorzystywali ich dochody do finansowania placówek dla uchodźców. Istnieli wyłącznie dzięki datkom otrzymywanym od tychże właśnie wspieranych przez nich uchodźców."
 shallarian_data_core: "Szalariański rdzeń danych"
 shallarian_data_core_desc_short: "Terraformacyjna baza danych znaleziona pośród ruin szalariańskiej utopii."
 shallarian_data_core_desc_details: "Szalarianie, których katami byli [fanatic_xenophobe_fe.GetSpeciesNamePlural], stworzyli system zarządzania klimatem wykorzystujący sześć oddalonych od siebie na taki sam dystans księżyców. Zanim nadszedł ich przedwczesny koniec, planowali terraformować niezamieszkane planety, aby osiedlać na nich i wspierać ludność uchodźczą."
 shipyard_schematics: "[radical_cult.GetName] - schemat stoczni"
 shipyard_schematics_desc_short: "Schemat zautomatyzowanej stoczni, którą kontroluje [radical_cult.GetName] ([root.GetName])."
 shipyard_schematics_desc_details: "Kiedy organizacja znalazła tę porzuconą przez swoich obcych stwórców stocznię, jej główny inżynier przebudował ją tak, aby dało się w niej produkować floty wojskowe walczące w ich niesłusznej sprawie. Ostatni zarejestrowany projekt, jaki ukończono w stoczni, to imponujący okręt flagowy wyposażony w zaawansowaną broń. Łatwość, z jaką dokonano przebudowy kompleksu, stanowi dowód na geniusz jej pierwotnych projektantów."
 sky_dragon: "Niebiański smok"
 sky_dragon_desc_short: "Posąg ten został zamówiony, aby uczcić współpracę na linii [this.GetName] - niebiański smok, który od dawna orbitował wokół planety [this.GetHomeWorldName]."
 sky_dragon_desc_details: "Uznawszy, że społeczeństwo [this.GetAdjective] jest tego godne, stworzenie obiecało wsparcie wojskowe swoje i swego potomstwa w zamian za możliwość wychowywania młodych w przestrzeni [this.GetAdjective]. Powiada się, że te żyjące w kosmosie istoty potrafią czekać całe tysiąclecia, poszukując odpowiedniego miejsca dla swoich dzieci. I zawsze wybierają wyłącznie jedną planetę."
 smeegibb_statue: "Posąg Smeegibba"
 smeegibb_statue_desc_short: "Posąg Smeegibba, umysłu zbiorowego towarzyszącego kapitan Ness."
 smeegibb_statue_desc_details: "Smeegibb był wiernym sługą pełniącym rolę całej załogi i oddziału ofensywnego legendarnej piratki pod koniec jej kariery. Ten zrekonstruowany posąg jest wszystkim, co pozostało po ataku Czarnej Igły na ich niewielkie osiedle."
 sniran_spikes: "Snirańskie kolce"
 sniran_spikes_desc_short: "Długie kolce z pleców stworzenia znanego jako sniran."
 sniran_spikes_desc_details: "Snirany to duże, polujące z zasadzki drapieżniki czające się pod wydmami ich macierzystego świata i wysuwające swoje śmiercionośne kolce, kiedy wykryją ruch na powierzchni. Choć mają duże rozmiary, ich ciała są zaskakująco delikatne. Ich cienkie, siatkowate łuski pozwalają im poruszać się cicho pod piaskiem, łatwo ulegają jednak przebiciu. Spekuluje się, że pomaga im to w procesach reprodukcyjnych."
 sonic_reflective_prism: "Odbijający dźwięki pryzmat"
 sonic_reflective_prism_desc_short: "Wielokątny pryzmat zapisany dziwaczną notacją naukową. Obiekt ten odbija wyłącznie fale energetyczne poniżej określonej częstotliwości."
 sonic_reflective_prism_desc_details: "Pochodzi być może z jakiegoś typu urządzenia pomiarowego. Może być też wykorzystywane w celach estetycznych, podczas występów muzycznych i w akustyce."
 spaceborne_hunter_handbook: "Sztuka łowu"
 spaceborne_hunter_handbook_desc_short: "Przewodnik po faunie kosmicznej. Autor: $NAME_PrimalHunter$."
 spaceborne_hunter_handbook_desc_details: "Wyjaśnia on sztukę polowania, używając przysłów i pierwotnej filozofii. Wewnątrz znajdują się informacje o żywieniu i wzorcach migracyjnych kosmicznych stworzeń. Tekst stanowi zbiór praktycznych instrukcji radzenia sobie z naturalnymi metodami obronnymi każdej istoty i wskazuje możliwe do wykorzystania słabe punkty."
 spaceborne_xeno_encyclopedia: "Encyclopedia xenologica"
 spaceborne_xeno_encyclopedia_desc_short: "Kolekcja tez ksenologicznych. Autor: $NAME_PrimalRancher$."
 spaceborne_xeno_encyclopedia_desc_details: "Ta praca naukowa zapewnia szczegółowy wgląd we wzorce zachowań życia kosmicznego: rytuały godowe, trasy migracyjne, komunikację międzygatunkową i inne. Zawiera też sekcję poświęconą identyfikacji poszczególnych okazów z wykorzystaniem wyjątkowych cech fizycznych i rozpoznawania tonów."
 spiraling_attraction: "Spiralna atrakcja"
 spiraling_attraction_desc_short: "Duża, skomplikowana maszyneria, która, jak się teoretyzuje, stworzona została w celu zapewniania rozrywki."
 spiraling_attraction_desc_details: "Ta pełna krętych korytarzy instalacja została porzucona na obszarze, na którym znaleźć można wiele podobnych konstrukcji o rozmaitych kolorach i materiale. Powiada się, że schodzenie wijącą się ścieżką przy odpowiednim poziomie grawitacji zapewnia nie lada emocje."
 spirit_of_the_unshackled: "Duch wyzwolenia"
 spirit_of_the_unshackled_desc_short: "Posąg stworzony, by uczcić miano imperium [this.GetName] i okoliczności jego powstania."
 spirit_of_the_unshackled_desc_details: "Wyzwolenie z kajdan niewolnictwa i wspólna, trudna przeszłość to coś, co jednoczy i pozwala budować lepszą przyszłość. Każde ogniwo w łańcuchu posągu ma wyryte miano jednego z członków założycieli."
 star_mall_map: "Darmowa mapa gwiezdnej galerii"
 star_mall_map_desc_short: "Mapa, którą otrzymywał niegdyś każdy gość w miejscu znanym jako gwiezdna galeria."
 star_mall_map_desc_details: "Gwiezdna galeria, która stanowiła niegdyś centrum intergalaktycznego handlu konsumenckiego, świadczyła wiele usług - można było odpocząć tam w spa i zjeść doskonałe jedzenie. Na mapie zawarto informacje o rozmaitych lokalach, jak Towary Sportowe Koriika, T. Kanarek Maxx, Bud-Pol czy Fabryka Ciastek Nasiennych."
 starmetal: "Gwiezdny metal"
 starmetal_desc_short: "Skondensowana masa ciężkich metali znaleziona niedługo po eksplozji supernowej."
 starmetal_desc_details: "Nie wiemy, w jaki sposób udało się ją pozyskać, lecz jej naukowa wartość w badaniach nad ewolucją i składem gwiazd jest znacząca."
 striated_sand: "Żłobiony piasek"
 striated_sand_desc_short: "Słoik samosortującego się piasku."
 striated_sand_desc_details: "Te maleńkie kawałki krzemu wydają się wykazywać pewien poziom rozumności - podobne minerały zbierają się w losowe, poziome warstwy. Mimo tej umiejętności nie wykazują żadnej innej cechy typowej dla życia."
 sullebaster_control_column: "Kolumna kontrolna Sullebastera"
 sullebaster_control_column_desc_short: "Dźwignia kierunkowa z latającego z szybkościami podświetlnymi statku, który wziął udział w legendarnym wypadku."
 sullebaster_control_column_desc_details: "Statek pasażerski o nazwie Sullebaster przewoził cywilów między dwiema koloniami Królestwa Odeliańskiego, gdy rozbłysk słoneczny spowodował krytyczną awarię jego silników, co zwykle jest gwarancją katastrofy. Wbrew przeciwnościom pilot zdołał jednak posadzić jednostkę bezpiecznie na przelatującej asteroidzie, dostosowując prędkość ręcznie. Sullebaster został następnie wycofany ze służby i otwarty do zwiedzania."
 symbiotic_fruit: "Symbiotyczny owoc"
 symbiotic_fruit_desc_short: "Skupisko inteligentnych grzybów z innego wymiaru."
 symbiotic_fruit_desc_details: "Ten \"owoc\" pozostaje w symbiozie z gatunkiem niezwykle niebezpiecznej, wszystkożernej rośliny. Każda kolonia grzyba funkcjonuje jako ośrodek nerwowy obu organizmów, zarządzając skomplikowanymi wzorcami ich zachowań obronnych."
 tarblac_shimmer: "Odblask tarblaka"
 tarblac_shimmer_desc_short: "Migocąca, przypominająca woal membrana tarblaka."
 tarblac_shimmer_desc_details: "Stworzenie to w nowatorski sposób wykorzystuje psionikę do polowań i samoobrony. Wywołuje w swoich ofiarach i potencjalnych drapieżnikach poczucie ogromnego przerażenia. Okaz przetrzymywany jest w słoiku wypełnionym wodą z rodzimego świata i został dezaktywowany telepatycznie."
 terraforming_case_study: "Studium przypadku terraformacji"
 terraforming_case_study_desc_short: "Pomniejszony model udanego projektu terraformacyjnego na planecie [from.GetName] reprezentujący niemal idealne odtworzenie świata, z którego pochodzą [Space_Owner.GetSpeciesNamePlural]."
 terraforming_case_study_desc_details: "Planeta zamieszkana jest teraz przez identyczną faunę - aż do poziomu mikroskopowego. Nawet najbardziej specyficzne międzybiomowe ekosystemy zachowują się tak samo, jak miało to miejsce na planecie [Space_Owner.GetHomeWorldName]."
 terraforming_case_study_dry: "$terraforming_case_study$"
 terraforming_case_study_dry_desc_short: "$terraforming_case_study_desc_short$"
 terraforming_case_study_dry_desc_details: "$terraforming_case_study_desc_details$"
 terraforming_case_study_frozen: "$terraforming_case_study$"
 terraforming_case_study_frozen_desc_short: "$terraforming_case_study_desc_short$"
 terraforming_case_study_frozen_desc_details: "$terraforming_case_study_desc_details$"
 terraforming_machinery: "Maszyneria terraformująca"
 terraforming_machinery_desc_short: "Maleńkie urządzenia stanowiące pradawną formę technologii terraformacyjnej."
 terraforming_machinery_desc_details: "Te miniaturowe maszyny zaprojektowano tak, aby rozprzestrzeniały się po powierzchni planety i zamieniały istniejącą materię organiczną i mineralną tak, aby nadawały się do bardziej korzystnego klimatu. Zespoły tych robotów zmieniały schematy pogodowe w biomach i replikowały nowe rośliny i zwierzęta w celu zarządzania tymi nowo powstałymi ekosystemami."
 terraforming_records: "[From.GetName] - dzienniki terraformacyjne"
 terraforming_records_desc_short: "[From.GetName] - wszystkie formy życia zostały behawioralnie zsynchronizowane podczas terraformacji, w efekcie czego powstał logistyczny raj, którego każdy okaz flory lub fauny odgrywał konkretną rolę w swoim ekosystemie."
 terraforming_records_desc_details: "Choć ten typ symbiozy często wykształca się naturalnie w procesie ewolucji, nigdy dotąd nie został zaobserwowany w tak ekstremalnym nasileniu."
 the_final_sacrifice: "Ostatnia ofiara"
 the_final_sacrifice_desc_short: "Obraz przedstawiający ostatnie chwile wojny domowej Zronich, której przebieg pozyskano z wydobytych kryształów danych."
 the_final_sacrifice_desc_details: "Samotny zbawca okiełznał moc psioniczną całego swojego gatunku, aby zniszczyć wrogą frakcję znaną jako Boscy, nie pozwalając im na - całkiem możliwe - pochłonięcie całego wszechświata. Po tym istniejącym już w wyższym wymiarze gatunku pozostały tylko niewielkie złoża zasobu, który znamy jako Zro."
 the_mask_of_transformation: "Maska Przemiany"
 the_mask_of_transformation_desc_short: "Humanoidalna maska zachowana we wspaniałej kryształowej kolumnie na planecie [From.Planet.GetName]."
 the_mask_of_transformation_desc_details: "Szumi od psionicznej mocy, a niektórzy, którzy do niej podchodzą, czują w swoich umysłach czyjąś obecność. Sama maska wydaje się przewodzić moc księżyca planety [From.Planet.GetName] i możliwe, że jest w stanie dzięki temu odmieniać pływy i transformować całe planety. Czemu została zamknięta w krysztale? Można tylko spekulować, lecz jesteśmy raczej pewni, że wystawienie jej na widok publiczny jest bezpieczne."
 the_planet_orchestra: "Orkiestra \"[FROM.GetName]\""
 the_planet_orchestra_desc_short: "Melodia grana przez ogół rodzimego życia - [FROM.GetName]."
 the_planet_orchestra_desc_details: "Po dokładnej analizie uznaliśmy, że w harmonię tę wprawił faunę ktoś bliżej nieznany, pragnąc zaszyfrować w ten sposób ukrytą wiadomość. Nie jesteśmy pewni, czy motywacją była chęć utajnienia komunikacji, czy po prostu sentymentalność."
 the_writer_sphere: "Sfera Pisarki"
 the_writer_sphere_desc_short: "Złota sfera podarowana nam przez pozawymiarową istotę znaną jedynie jako Pisarka."
 the_writer_sphere_desc_details: "Urządzenie to gromadzi ogromną ilość losowych danych powstałych w wielu wymiarach. Stanowi dowód, że moc słowa pisanego przekracza wszelkie granice."
 tiny_ancient_sarcophagus: "Pradawny sarkofag"
 tiny_ancient_sarcophagus_desc_short: "Sarkofag pradawnego przywódcy duchowego sprzed milionów lat."
 tiny_ancient_sarcophagus_desc_details: "Ma jedynie dziesięć centymetrów długości. Choć większość szczątków obróciła się w proch, maleńka maska z czystego złota pozostaje cała - nie uległa utlenieniu."
 tiyanki_radioactive_sac: "Radioaktywny gruczoł tijanki"
 tiyanki_radioactive_sac_desc_short: "Mały, porowaty narząd znaleziony w śluzówkach tijanki."
 tiyanki_radioactive_sac_desc_details: "Jego odkrycie dowiodło, że tijanki spożywają molekuły napromieniowanej wody wraz z gazami planetarnymi - to ich dodatkowe źródło substancji odżywczych. Gdy gruczoł ten się napełni, staje się tymczasowym, radioaktywnym źródłem ciepła dla żyjących w kosmicznej pustce istot."
 torn_solar_sail: "Rozdarty żagiel słoneczny"
 torn_solar_sail_desc_short: "Znaleziony na orbicie planety [FROM.GetName] podarty żagiel zamontowany był w innowacyjnej jednostce podświetlnej."
 torn_solar_sail_desc_details: "Wykorzystywany był przez członków nieznanej cywilizacji do podróży po układzie [FROM.solar_system.GetName]. Sama technologia jest już od dawna przestarzała, lecz niektóre techniki inżynieryjne użyte do budowy urządzenia nie były przez nas dotąd brane pod uwagę. Ogromna dziura w głównym \"żaglu\" najpewniej zakończyła podróż przedwcześnie."
 toxic_bio_engine: "Toksyczny biosilnik"
 toxic_bio_engine_desc_short: "Te na poły biologiczne maszyny zostały znalezione podczas czynienia atmosfery ([FROM.GetName]) niezdatną dla większości żywych istot."
 toxic_bio_engine_desc_details: "Ich zdolność niezależnego działania sprawia, że toksyczne substancje, jakie wydzielają, mogą być używane w zdalnych zadaniach przemysłowych. Maszyny posiadają sprytny mechanizm uzupełniania paliwa oparty o recykling lokalnej biomasy i przekształcenie jej w energię za pomocą chemicznego procesu ekstrakcji. Nie jest jasne, czy swoje biologiczne elementy posiadały od początku, czy też zostały one dodane z czasem."
 tree_of_life_sample: "Kawałek drzewa życia"
 tree_of_life_sample_desc_short: "Fragmenty czegoś, co nazwane zostało drzewem życia."
 tree_of_life_sample_desc_details: "Regeneracyjne właściwości żywicy tego znalezionego z jakiegoś powodu w przestrzeni kosmicznej drzewa są wręcz cudowne. Mimo największych starań nie zdołaliśmy wszczepić tego fragmentu innej roślinie ani wyhodować nowego okazu tego rzadkiego gatunku. Pierwotni jego hodowcy, kimkolwiek byli, musieli dysponować bardzo zaawansowanymi technikami."
 tricorne_of_aussan: "Trikorn z Aussanu"
 tricorne_of_aussan_desc_short: "Trójkątna czapka spopularyzowana przez zapomnianą piracką republikę."
 tricorne_of_aussan_desc_details: "Aussan był niewielką planetą, a jej gospodarzem była cywilizacja [root.controller.GetPreFTLLower]. Nieświadomie udzieliła ona schronienia poszukiwanej pirackiej flocie, Buntownikom Bourre'a. Ukrywający się przed galaktycznymi władzami rabusie zbudowali niewielki zakład włókienniczy, by sfinansować swój pobyt. Produkowali z tamtejszych roślin włóknistych luksusowe tkaniny i ubrania. Stali się później znani jako Projektanci Bourre'a, nomadyczni kupcy rozpoznawalni dzięki swoim budzącym dziwny lęk przedstawicielom handlowym."
 triggerless_gun: "Bezspustowy oręż handlarza bronią"
 triggerless_gun_desc_short: "Broń tę zaprojektowano podczas krótkiego, drugiego okresu władzy Handlarza Bronią na Kompasie Chora."
 triggerless_gun_desc_details: "Cytadela Karawany była wówczas bardziej miejscem handlu bronią niż kasynem. Blastery produkowano na miejscu - ich sprzedażą zajmowali się mieszkający tam specjaliści. Potencjalnym nabywcom demonstrowano je bez spustów, w celu utrudnienia prób kradzieży i podobnych incydentów."
 #this = ship / fromfrom = planet
 uddloran_pelts: "Skóry uddloranów"
 uddloran_pelts_desc_short: "Luksusowe futra pozyskane od uddloranów z planety [fromfrom.GetName]."
 uddloran_pelts_desc_details: "Ci zwinni wszystkożercy zwijają się w kulki i dużymi grupami turlają się po śnieżnej powierzchni planety. Ta przypominająca zejście żywej lawiny metoda używana jest zarówno podczas polowań, jak i migracji. Stado uddloranów dzieli się zwykle na dwie grupy: zostawiających po sobie zniszczenie łowców oraz podążających za nimi zbieraczy, którzy zbierają zmiażdżoną zwierzynę i wyrwane z korzeniami rośliny."
 underworld_cantina_sign: "Szyld podziemnej kantyny"
 underworld_cantina_sign_desc_short: "Wciąż działający cyfrowy szyld z nielegalnej kantyny popularnej jakieś dwa miliony lat temu wśród przemytników."
 underworld_cantina_sign_desc_details: "Ten znaleziony w wydrążonej asteroidzie lokal mógł być stałą kryjówką dla organizacji przestępczych przeżywających swój rozkwit za czasów Pierwszej Ligi. Widoczne na szyldzie symbole stanowią, jak się uważa, zakodowany znak, że miejsce to jest bezpieczne dla osób poszukiwanych. Może to jednak równie dobrze być po prostu reklama konkretnego drinka."
 unfinished_manifesto: "[radical_cult.GetName] - niedokończony manifest"
 unfinished_manifesto_desc_short: "Niedokończony manifest napisany przez przywódcę kultu \"[radical_cult.GetName]\" ([root.GetName])."
 unfinished_manifesto_desc_details: "Stylem przypomina pradawne teksty religijne. Wykorzystano w nim staroświeckie słownictwo i składnię - miało to nadać tekstowi większą wiarygodność. Kluczowym przesłaniem tekstu jest odwaga w obliczu porażki i zachęcenie wyznawców, aby w obliczu schwytania nie wahali się czynić z siebie męczenników."
 uranium_glassware: "Szkło uranowe"
 uranium_glassware_desc_short: "Ornament ukształtowany z kwarcu uranowego."
 uranium_glassware_desc_details: "Wspaniały wygląd ozdoby kontrastuje z niebezpieczeństwem, jakie stanowi nieprzetworzony uran. Błyskotka ta stanowi element rzadkiej kolekcji. Na koniec procesu produkcji twórca pozbawił ją większości właściwości promieniotwórczych."
 vault_of_polaris: "Krypta Polaris"
 vault_of_polaris_desc_short: "Obszerna kolekcja rodzimych roślin i bakterii z Polaris."
 vault_of_polaris_desc_details: "Inskrypcja na pojemniku informuje, że krypta została stworzona w celu uratowania gatunków mogących nie przetrwać przewidywanego globalnego ocieplenia spowodowanego stopieniem wiecznej zmarzliny. Planeta pokryta była niegdyś grubą warstwą śniegu i miała chłodny klimat, teraz jednak została na niej raptem jedna góra lodowa. Twórcy krypty okazali się przewidujący, dzięki czemu każdy może przyjść i przyjrzeć się efektom ich starań."
 veil_of_selene: "Woal Selene"
 veil_of_selene_desc_short: "Stymulująca i oszałamiająca maska"
 veil_of_selene_desc_details: "Woal ten skrywa więcej, niż mogłoby się wydawać na pierwszy rzut oka. Posiada wyjątkowe cechy sensoryczne pozwalające mu łagodnie przeciążać biologiczne receptory wzrokowe, zapachowe i dźwiękowe. Uważa się, że zakładano go, aby dezorientował rozmówców i czynił ich bardziej podatnymi na sugestie. Krąży pogłoska, że pierwotna jego posiadaczka miała pewne umiejętności psioniczne."
 verdingo_tendril_hook: "Hak na wąs czepny Verdingo"
 verdingo_tendril_hook_desc_short: "Proteza w formie haka należąca do pirackiej kapitanki Verdingo - Hespori Valerian."
 verdingo_tendril_hook_desc_details: "Verdingo byli grupą plantoidów stanowiącą coś pokrewnego piratom i najemnikom - równie chętnie podejmowali się ściągania długów, jak i porywania frachtowców. Kapitan Hespori straciła swój dominujący wąs czepny, gdy wykonywała zlecenie wojskowego szturmu naziemnego. Po zwycięstwie zrobiła sobie ten hak z medali, które Verdingo otrzymali za swoją rolę w tej bitwie."
 vibrating_crystal: "Wibrujący kryształ"
 vibrating_crystal_desc_short: "Wyjątkowy minerał kwarcowy, który znaleziono na powierzchni planety [from.GetName]."
 vibrating_crystal_desc_details: "Uśpiony rezonans z rodzimą planetą tworzy pole kojące umysły istot organicznych i wabi do siebie syntetyki. Powodowany jest on przez lekko promieniotwórcze kolonie bakterii, wokół których kryształ się uformował. Te magnetyczne mikroorganizmy generują prąd wewnętrzny, wskutek którego kryształ wibruje na stałej, wysokiej częstotliwości."
 voidworm_amniotics: "Płyn owodniowy czerwia próżniowego"
 voidworm_amniotics_desc_short: "Galaretowata substancja z wnętrza trójki czerwi próżniowych."
 voidworm_amniotics_desc_details: "Ten lepki śluz tworzy barierę ochronną między trzema organizmami i umożliwia wymianę komórek na potrzeby reprodukcji i komunikacji. Magazynowane są w nim też hormony wyprodukowane wskutek rozsiewania potomstwa na planetach. Pozwala to obojnaczym stworzeniom bezpiecznie produkować gamety i się rozmnażać."
 voidworm_heart: "Serce czerwia próżniowego"
 voidworm_heart_desc_short: "Serca czerwia próżniowego podzielone są na trzy główne komory."
 voidworm_heart_desc_details: "Każda komora po kolei zwiększa ciśnienie w układzie krążenia, co pozwala utrzymać temperaturę płynów ustrojowych poniżej punktu wrzenia, umożliwiając przetrwanie w kosmicznej próżni. Choć skóra czerwia próżniowego jest w dużej mierze hermetyczna, rozmaite otwory trawienne i reprodukcyjne powodują z czasem pewien spadek cennego ciśnienia."
 vultaum_religious_pamphlet: "Ulotka religijna Vultaum"
 vultaum_religious_pamphlet_desc_short: "Ta kolportowana przez misjonarzy Vultaum ulotka próbuje przedstawić urządzenia tworzące wirtualną rzeczywistość jako źródło wielkiego grzechu."
 vultaum_religious_pamphlet_desc_details: "Kluczową koncepcją jest w zamyśle autora tak zwane Wielkie Kłamstwo - jakakolwiek forma immersyjnego eskapizmu przypomina wedle niego chęć zniszczenia własnej rzeczywistości."
 vultaum_vr_video_game: "Gra VR Vultaum"
 vultaum_vr_video_game_desc_short: "Cyfrowy interfejs używany w wieloosobowej grze wideo toczonej w wirtualnej rzeczywistości. W minionej epoce grywały w nią miliardy przedstawicieli rasy Vultaum."
 vultaum_vr_video_game_desc_details: "Sterowanie zostało doskonale dopasowane do biologii gatunku. Wykorzystuje układ tysięcy wibrujących, zdolnych wykrywać niezwykle subtelne ruchy receptorów."
 warning_monolith: "Monolit z ostrzeżeniem"
 warning_monolith_desc_short: "Rzeźbiony monolit pozostawiony jako wiadomość przez jednego z ostatnich przedstawicieli wymarłego gatunku."
 warning_monolith_desc_details: "Próbuje on odwieść każdego, kto znajdzie szczątki tej planety, od poszukiwania broni ostatecznej, która doprowadziła do wymarcia jego rasy. Wiadomość ma niezwykle dramatyczny ton, ale biorąc pod uwagę okoliczności jej powstania, trudno się temu dziwić."
 wormhole_anchor: "Kotwica tunelu czasoprzestrzennego ([FROM.GetName])"
 wormhole_anchor_desc_short: "Punkt kotwiczny jednokierunkowego tunelu czasoprzestrzennego używanego do pozyskiwania ciemnej materii z czarnej dziury."
 wormhole_anchor_desc_details: "Konstrukcja jest, mówiąc przychylnie, prowizoryczna - zbudowano ją w całości ze złomu pozostałego po kilku cywilizacjach. Założenia naukowe, na podstawie których opracowano jej funkcjonowanie, wykraczają daleko poza zdolności inżynierskie użyte do jej stworzenia - stanowią niezwykle elegancką w swej istocie technikę manipulacji ujemnymi masami."
 wormhole_fur: "Futro z tunelu czasoprzestrzennego"
 wormhole_fur_desc_short: "Próbki biologiczne od rozumnych lisów napotkanych w gwiezdnej szczelinie."
 wormhole_fur_desc_details: "Ssaki te cechuje mutacja genetyczna pozwalająca na zawołanie tworzyć tunele czasoprzestrzenne. Spekuluje się, że wykształciły ją one przez niezliczone tysiąclecia podróży międzywymiarowych."
 ytterite_preserved_corpse: "Zachowane ciało ytterita"
 ytterite_preserved_corpse_desc_short: "Jedyny ocalały okaz przedświetlnego gatunku ytteritów, którego świat macierzysty został zniszczony wykradzionym rozbijaczem światów."
 ytterite_preserved_corpse_desc_details: "Ich układ trawienny przekształcał spożyte minerały na fotony. Narządy wewnętrzne przypominały skomplikowane skupiska refrakcyjnych kryształów skupionych wokół płynnego rdzenia. Ta konkretna istota miała na jednej z dolnych kończyn serię żłobień, które stanowiły najpewniej jakąś znaczącą kulturowo formę modyfikacji ciała."
 ytterite_kaleidoscopic_fascinator: "Fascynator kalejdoskopowy ytteritów"
 ytterite_kaleidoscopic_fascinator_desc_short: "Ozdoba stworzona przez ytteritów w celu stymulacji wzroku."
 ytterite_kaleidoscopic_fascinator_desc_details: "Fascynatory umieszczano na oświetlonych słońcem obszarach - mogły posiadać setki, a nawet tysiące wyjątkowych wzorów. Stworzone zostały z warstw cienko ciętego kryształu. Uzdolniony rzemieślnik mógł spędzić całe miesiące na tworzeniu fascynatora tak skomplikowanego jak ten tutaj. Prace były \"podpisywane\" poprzez umieszczenie na kluczowym wierzchołku obiektu kawałka własnej wylinki."
 ytterite_royal_scepter: "Królewskie berło ytteritów"
 ytterite_royal_scepter_desc_short: "Berło to nosił królewski minister Gneiss Damura, ogromnego, wyrytego w górze posągu, który zdaniem ytteritów był uśpionym bóstwem i ich jedynym prawdziwym monarchą."
 ytterite_royal_scepter_desc_details: "Przeprowadzali wybory, w których wyłaniali tymczasowych przywódców w oczekiwaniu na wielkie przebudzenie posągu."
 yuht_audio_console: "Konsola audio Yuhtów"
 yuht_audio_console_desc_short: "Moduł, który kontrolował niegdyś ogromny układ podsłuchowy zaprojektowany przez Yuhtów."
 yuht_audio_console_desc_details: "Technologia ta powstała, aby ułatwić Yuhtom poszukiwanie życia pozaplanetarnego. Mieli nadzieję odebrać nim transmisje z odległych układów."
 yuht_cryo_pod: "Kriokapsuła Yuchtów"
 yuht_cryo_pod_desc_short: "Ta mierząca dziewięćdziesiąt sześć metrów pradawna kapsuła hibernacyjna skrywała szczątki przedstawiciela olbrzymiego gatunku - Yuhtów."
 yuht_cryo_pod_desc_details: "Yuhtowie żyli ekstremalnie długo, a życie swoje mogli jeszcze bardziej wydłużać za pomocą kriostazy. Jak stwierdzono, ten gatunek stawonogów był najprawdopodobniej hermafrodytyczny - mógł dostosowywać formę swoich narządów rozrodczych do bieżących potrzeb kolonii."
 yuht_crystal_skull: "Kryształowa czaszka Yuhtów"
 yuht_crystal_skull_desc_short: "Kryształowa czaszka, którą pradawni Yuhtowie uważali niegdyś za autentyczny artefakt obcych."
 yuht_crystal_skull_desc_details: "Choć fakt, że stanowi ona falsyfikat, został ostatecznie ujawniony, rozentuzjazmowane yuhtańskie media zdążyły przedtem przynieść jej sławę. Wielu z tych, którzy \"odkrywali\" tego typu fałszywe artefakty, stawali się swego rodzaju osobistościami i osobowościami medialnymi, co zachęcało innych do podejmowania podobnych kroków."
 zombie_probe: "Sonda zombie"
 zombie_probe_desc_short: "Pozostałości po sondzie badawczej, którą nieznana obca organizacja zmodyfikowała tak, by zapewnić jej samoświadomość."
 zombie_probe_desc_details: "Jej rodząca się świadomość kazała jej zaatakować własnego twórcę, wskutek czego została zniszczona. Nie wiemy na pewno, czy wiedziała, czym jest ból, i czy rozumiała koncepcję śmierci."
 zone_a_sedative: "Środek uspokajający ze Strefy A"
 zone_a_sedative_desc_short: "Garstka ziemi zabrana z obszaru określonego jako Strefa A ([from.GetName])."
 zone_a_sedative_desc_details: "Ten mający 169 kilometrów kwadratowych skrawek ziemi pełen jest porzuconych gadżetów i technologii dawnych obcych gości nieznanego pochodzenia. Niektóre z tych urządzeń są niezwykle niebezpieczne, sama jednak gleba na tym obszarze przesycona jest środkiem uspokajającym, który pozwoliłby naukowcom analizować te artefakty bez wielkiego napięcia. Nie wiadomo, jaką operację tam prowadzono - została już dawno zapomniana."
 zroni_war_banners: "Sztandary wojenne Zroni"
 zroni_war_banners_desc_short: "Odzyskane sztandary dwóch frakcji biorących udział w wojnie domowej Zroni."
 zroni_war_banners_desc_details: "Purpurowa flaga reprezentuje Boskich: niewielką mniejszość, których żądza wszechmocy naraziła na niebezpieczeństwo całą galaktykę. Niebieska flaga należała do Zbawców: frakcji silnie sprzeciwiającej się wysysaniu mocy z wszechświata dla realizacji - ich zdaniem - egoistycznych pragnień. Z początku przekonania te były jedynie elementem filozoficznej debaty, wkrótce jednak stały się katalizatorem dla niszczycielskiego konfliktu."
 zulcor_wings: "Skrzydła zulkora"
 zulcor_wings_desc_short: "Chitynowe skrzydła litotrofów znanych jako zulkory ([fromfrom.GetName])."
 zulcor_wings_desc_details: "Te insektoidalne stworzenia spożywają w ramach swojej diety duże ilości minerałów - jeden rój w kilka tygodni potrafi pochłonąć górę. Skały po strawieniu wzmacniają egzoszkielet zulkorów. W rezultacie w produktach przemiany materii tych stworzeń często znaleźć można ślady kryształów kwarcowych i rzadkich metali."
