 TECH_UNLOCK_DIPLOMATIC_ACTION_CREATE_ALLIANCE_TITLE: "§HOdblokowuje Odblokowuje opcję dyplomatyczną:§! Utworzenie sojuszu"
 TECH_UNLOCK_DIPLOMATIC_ACTION_CREATE_ALLIANCE_DESC: "§HUtworzenie sojuszu§!\nUmożliwia nam zawiązanie sojuszu z innymi imperiami."
 TECH_UNLOCK_DIPLOMATIC_ACTION_CREATE_FEDERATION_TITLE: "§HOdblokowuje Odblokowuje opcję dyplomatyczną:§! Utworzenie federacji"
 TECH_UNLOCK_DIPLOMATIC_ACTION_CREATE_FEDERATION_DESC: "§HUtworzenie federacji§!\nUmożliwia nam stworzenie federacji z innymi imperiami."
 TECH_UNLOCK_DIPLOMATIC_ACTION_CREATE_VASSAL_TITLE: "§HOdblokowuje Odblokowuje opcję dyplomatyczną:§! Państwa wasalne"
 TECH_UNLOCK_DIPLOMATIC_ACTION_CREATE_VASSAL_DESC: "§HWasalstwo§!\nUmożliwia wasalizację innych imperiów przez zaproponowanie im bezpieczeństwo pod naszymi rządami. Jeśli będziemy potrzebować ochrony, możemy też sami zostać wasalami."
 TECH_UNLOCK_SURVEY_INTEL_TITLE: "§HOdblokowuje dane wywiadowcze:§! Wyniki badań kosmosu"
 TECH_UNLOCK_SURVEY_INTEL_DESC: "§HWyniki badań kosmosu§!\nUmożliwiają nam przeglądanie posiadanych przez inne imperia danych pochodzących z badania planet znajdujących się na ich terytoriach."
 TECH_UNLOCK_BORDER_EXTRUDER_2_TITLE: "§HOdblokowuje komponent:§! Wzmocniony nadajnik graniczny"
 TECH_UNLOCK_BORDER_EXTRUDER_2_DESC: "§HWzmocniony nadajnik graniczny§!\nPoszerza i wytycza nasze granice w przestrzeni międzygwiezdnej."
 TECH_UNLOCK_BORDER_EXTRUDER_3_TITLE: "§HOdblokowuje komponent:§! Zaawansowany nadajnik graniczny"
 TECH_UNLOCK_BORDER_EXTRUDER_3_DESC: "§HZaawansowany nadajnik graniczny§!\nNasze przeznaczenie to niekwestionowana władza. Musimy to pokazać tym, którzy nam się opierają!"
 TECH_UNLOCK_COMBAT_COMPUTER_PRECOG_TITLE: "§HOdblokowuje komponent:§! Interfejs prekognicji"
 TECH_UNLOCK_COMBAT_COMPUTER_PRECOG_DESC: "§HInterfejs prekognicji§!\n$tech_precognition_interface_desc$\n"
 TECH_UNLOCK_TERRAFORMING_TEMP_CHANGE_TITLE: "§HOdblokowuje funkcję:§! Manipulacja atmosferyczna"
 TECH_UNLOCK_TERRAFORMING_TEMP_CHANGE_DESC: "§HManipulacja atmosferyczna§!\nUmożliwia nam zmianę klimatu terraformowanych planet."
 TECH_UNLOCK_VOLCANO_TERRAFORM_TITLE: "§H Opcja badawcze:§! terraformowanie wulkaniczne"
 TECH_UNLOCK_VOLCANO_TERRAFORM_DESC: "Umożliwia terraformowanie światów wulkanicznych w światy umiarkowane."
 TECH_UNLOCK_VOLCANIC_TERRAFORM_TITLE: "§HOdblokowuje funkcję:§! terraformowanie wulkaniczne"
 TECH_UNLOCK_VOLCANIC_TERRAFORM_DESC: "$TECH_UNLOCK_VOLCANO_TERRAFORM_DESC$"
 TECH_UNLOCK_TERRAFORMING_GAIA_CHANGE_TITLE: "§HOdblokowuje funkcję:§! tworzenie światów gajańskich"
 TECH_UNLOCK_TERRAFORMING_GAIA_CHANGE_DESC: "§HManipulacja atmosferyczna§!\nUmożliwia nam przekształcanie globów w światy gajańskie."
 TECH_UNLOCK_TERRAFORMING_NUKED_CHANGE_TITLE: "§HOdblokowuje funkcję:§! przywracanie klimatu"
 TECH_UNLOCK_TERRAFORMING_NUKED_CHANGE_DESC: "§HPrzywracanie klimatu§!\nUmożliwia terraformowanie zniszczonych światów."
 TECH_UNLOCK_SPACEPORT_CONSTRUCTION_TITLE: "§HOdblokowuje stację:§! Kosmoport"
 TECH_UNLOCK_SPACEPORT_CONSTRUCTION_DESC: "§HKosmoport§!\nKosmoport jest potrzebny do budowy dowolnego typu statku przemieszczającego się w kosmosie. Port można rozbudowywać o dodatkowe funkcje, ma też podstawowe uzbrojenie obronne."
 TECH_UNLOCK_SCIENCE_SHIP_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! statek badawczy"
 TECH_UNLOCK_SCIENCE_SHIP_CONSTRUCTION_DESC: "§HStatek badawczy§!\nStatek badawczy służy za bazę operacyjną głównego naukowca, gotowego do eksploracji bezmiaru kosmosu."
 TECH_UNLOCK_CONSTRUCTION_SHIP_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! statek konstrukcyjny"
 TECH_UNLOCK_CONSTRUCTION_SHIP_CONSTRUCTION_DESC: "§HStatek konstrukcyjny§!\nStatek konstrukcyjny pozwala budować różne stacje kosmiczne za pomocą nowoczesnych dronów spawaczy."
 TECH_UNLOCK_COLONY_SHIP_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! statek kolonizacyjny"
 TECH_UNLOCK_COLONY_SHIP_CONSTRUCTION_DESC: "§HStatek kolonizacyjny§!\nStatki kolonizacyjne to jednostki jednorazowego użytku służące do osiedlania się na innych światach. Po dokonaniu kolonizacji statek zostaje zamieniony w lądowe schronienie i nasz przyczółek."
 TECH_UNLOCK_CORVETTE_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! korweta"
 TECH_UNLOCK_CORVETTE_CONSTRUCTION_DESC: "§HKorweta§!\nKorweta to podstawowy typ okrętu wojskowego, uzbrojony i gotowy do kontaktu z wrogiem."
 TECH_UNLOCK_DESTROYER_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! niszczyciel"
 TECH_UNLOCK_DESTROYER_CONSTRUCTION_DESC: "§HNiszczyciel§!\nNiszczyciel to większa, dwuczęściowa konstrukcja wyposażona w szeroki wachlarz uzbrojenia strategicznego."
 TECH_UNLOCK_CRUISER_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! krążownik"
 TECH_UNLOCK_CRUISER_CONSTRUCTION_DESC: "§HKrążownik§!\nKrążownik to pierwsza trzyczęściowa konstrukcja o dużych możliwościach konfiguracji modułów dla każdego, kto może sobie na nie pozwolić."
 TECH_UNLOCK_BATTLESHIP_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! pancernik"
 TECH_UNLOCK_BATTLESHIP_CONSTRUCTION_DESC: "§HPancernik§!\nPancernik to największa dostępna zwyczajna konfiguracja kadłuba o olbrzymiej sile ognia, którą przewyższa tylko cena tej jednostki. Ponadto ma bardzo słabą zwrotność."
 TECH_UNLOCK_TITAN_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! tytan"
 TECH_UNLOCK_TITAN_CONSTRUCTION_DESC: "§HTytan§!\nTe olbrzymie statki wojenne są dumą floty. Posiadają potężne uzbrojenie i zwykle pełnią rolę okrętów flagowych."
 TECH_UNLOCK_JUGGERNAUT_CONSTRUCTION_TITLE: "§H$UNLOCKS_SHIP_TYPE$:§! behemot"
 TECH_UNLOCK_JUGGERNAUT_CONSTRUCTION_DESC: "§HBehemot§!\nTe gigantyczne konstrukcje są nie tyle okrętami, co stacjami kosmicznymi. Behemot stanowi ogromną ruchomą stocznię, która może naprawiać i budować jednostki, dzięki czemu może służyć jako wysunięta baza operacyjna podczas kampanii ofensywnych."
 TECH_UNLOCK_DEFENSE_PLATFORM_TITLE: "§HOdblokowuje stację:§! Platforma obronna"
 TECH_UNLOCK_DEFENSE_PLATFORM_DESC: "§HPlatforma obronna§!\n$tech_space_defense_station_1_desc$"
 TECH_UNLOCK_DEFENSE_STATION_TITLE: "§HOdblokowuje stację:§! Stacja obronna"
 TECH_UNLOCK_DEFENSE_STATION_DESC: "§HStacja obronna§!\n$tech_space_defense_station_2_desc$"
 TECH_UNLOCK_FORTRESS_TITLE: "§HOdblokowuje stację:§! Forteca"
 TECH_UNLOCK_FORTRESS_DESC: "§HForteca§!\n$tech_space_defense_station_3_desc$"
 TECH_UNLOCK_MINING_STATION_TITLE: "§HOdblokowuje stację:§! Stacja górnicza"
 TECH_UNLOCK_MINING_STATION_DESC: "§HStacja górnicza§!\nStacja górnicza może eksploatować z orbity planetarne złoża minerałów i cennych zasobów."
 TECH_UNLOCK_RESEARCH_STATION_TITLE: "§HOdblokowuje stację:§! Stacja badawcza"
 TECH_UNLOCK_RESEARCH_STATION_DESC: "§HStacja badawcza§!\nStacja badawcza może z orbity badać różne zjawiska planetarne i gromadzić cenne dane naukowe."
 TECH_UNLOCK_AFTERBURNER_1_TITLE: "§HOdblokowuje komponent:§! Dopalacze"
 TECH_UNLOCK_AFTERBURNER_1_DESC: "§HDopalacze§!\nTe potężne silniki zapewniają dodatkową prędkość bojową, ale zużywają wiele mocy."
 TECH_UNLOCK_AFTERBURNER_2_TITLE: "§HOdblokowuje komponent:§! Zaawansowane dopalacze"
 TECH_UNLOCK_AFTERBURNER_2_DESC: "§HZaawansowane dopalacze§!\nTa ulepszona wersja zwykłych dopalaczy dodatkowo zwiększa prędkość bojową statku."
 TECH_UNLOCK_THRUSTER_1_TITLE: "§HOdblokowuje komponent:§! Chemiczny silnik manewrowy"
 TECH_UNLOCK_THRUSTER_1_DESC: "§HChemiczny silnik manewrowy§!\nProste i umiarkowanie wydajne chemiczne silniki manewrowe wytwarzające ciąg poprzez spalanie propelentu."
 TECH_UNLOCK_THRUSTER_2_TITLE: "§HOdblokowuje komponent:§! Jonowy silnik manewrowy"
 TECH_UNLOCK_THRUSTER_2_DESC: "§HJonowy silnik manewrowy§!\nTe elektryczne silniki manewrowe wytwarzają ciąg bez potrzeby zużywania paliwa."
 TECH_UNLOCK_THRUSTER_3_TITLE: "§HOdblokowuje komponent:§! Plazmowy silnik manewrowy"
 TECH_UNLOCK_THRUSTER_3_DESC: "§HPlazmowy silnik manewrowy§!\nPlazmowe silniki manewrowe to zaawansowany rodzaj napędu elektrycznego pozwalający statkom rozwijać większe prędkości podświetlne i zwiększający ich zwrotność."
 TECH_UNLOCK_THRUSTER_4_TITLE: "§HImpulsowy silnik manewrowy:§! Impulsowy silnik manewrowy"
 TECH_UNLOCK_THRUSTER_4_DESC: "§HImpulsowy silnik manewrowy§!\nTe niezwykle zaawansowane termojądrowe silniki manewrowe zapewniają statkom niezrównaną zwrotność i umożliwiają rozwijanie dużych prędkości podświetlnych."
