 TECH_BASE_COST: "Koszt podstawowy"
 TECH_STARTING: "Wstępna tech."
 RESEARCH_EFFICIENCY: "Szybkość badań"
 RESEARCH_EFFICIENCY_DESC: "Szybkość badań pokazuje, jak skutecznie jest wykorzystywany potencjał naukowy naszego imperium, zwiększając lub zmniejszając tempo odblokowania technologii. Ta wartość zależy głównie od kompetencji przydzielonego naukowca, ale mogą wpływać na nią także inne czynniki."
 REASEARCH_SCIENTIST_EFFICIENCY: "Naukowiec $LEADER$: $VALUE$"
 TECH_UNLOCK_OUTPOST_CONSTRUCTION_TITLE: "§HOdblokowuje bazę gwiezdną:§! placówkę"
 TECH_UNLOCK_OUTPOST_CONSTRUCTION_DESC: "§HPlacówka§!\nNajbardziej podstawowy typ bazy gwiezdnej - lekko uzbrojona stacja budowana na orbicie wokół gwiazdy, wspomagająca ekspansję terytorialną imperium. Placówki nie mogę mieć żadnych budynków ani modułów i nie są wymienione w Rejestrze."
 TECH_UNLOCK_STARPORT_CONSTRUCTION_TITLE: "§HOdblokowuje ulepszenie bazy gwiezdnej:§! port gwiezdny"
 TECH_UNLOCK_STARPORT_CONSTRUCTION_DESC: "§HPort gwiezdny§!\nUlepszenie placówki - może mieścić jeden budynek i dwa moduły."
 TECH_UNLOCK_STARHOLD_CONSTRUCTION_TITLE: "§HOdblokowuje ulepszenie bazy gwiezdnej:§! gwiezdna twierdza"
 TECH_UNLOCK_STARHOLD_CONSTRUCTION_DESC: "§HGwiezdna twierdza§!\nUlepszenie portu gwiezdnego - może mieścić dwa budynki i cztery moduły."
 TECH_UNLOCK_STAR_FORTRESS_CONSTRUCTION_TITLE: "§HOdblokowuje ulepszenie bazy gwiezdnej:§! gwiezdna forteca"
 TECH_UNLOCK_STAR_FORTRESS_CONSTRUCTION_DESC: "§HGwiezdna forteca§!\nUlepszenie gwiezdnej twierdzy - może mieścić trzy budynki i pełny zestaw sześciu modułów."
 TECH_UNLOCK_CITADEL_CONSTRUCTION_TITLE: "§HOdblokowuje ulepszenie bazy gwiezdnej:§! cytadela"
 TECH_UNLOCK_CITADEL_CONSTRUCTION_DESC: "§HCytadela§!\nUlepszenie gwiezdnej fortecy - jest największym i najsilniej umocnionym typem bazy gwiezdnej, może mieścić cztery budynki i pełny zestaw sześciu modułów."
 UNITY_COST_MULT: "Mnożnik kosztu jedności dla edyktu - $VALUE|=2%-$"
 TECH_UNLOCK_FIRE_CONTROL_1_TITLE: "§HOdblokowuje komponent:§! $FIRE_CONTROL_1$"
 TECH_UNLOCK_FIRE_CONTROL_1_DESC: "§H$FIRE_CONTROL_1$§!\n$FIRE_CONTROL_1_DESC$"
 TECH_UNLOCK_ION_CANNON_CONSTRUCTION_TITLE: "§HOdblokowuje stację:§! $ion_cannon$"
 TECH_UNLOCK_ION_CANNON_CONSTRUCTION_DESC: "§H$ion_cannon$§!\nDziała jonowe to potężne platformy obronne, które można budować na orbicie bazy gwiezdnej. Są zdolne niszczyć okręty wroga morderczym ogniem z dużej odległości."
