 purge_neutering: "Kastracja"
 purge_neutering_tooltip: "Wskazane populacje nie powiększają się i z czasem wymierają, ale otrzymują tylko umiarkowaną karę do §Rzadowolenia§!."
 purge_neutering_tooltip_delayed: "§LTo po prostu stopniowe wycofywanie ludności. Nasz naród wyrusza na spotkanie przyszłości, ale niektórzy nie dotrą tam z nami.§!"
 purge_labor_camps: "Przymusowe roboty"
