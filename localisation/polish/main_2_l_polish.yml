 MACRO_BUILDER_TITLE: "§ECentrum armii uderzeniowych§!"
 MACRO_BUILDER_DESC: "§YCentrum armii uderzeniowych§! umożliwia łatwe zgromadzenie dużej liczby armii uderzeniowych. Armie będą tworzone na dostępnych planetach w tym sektorze.\n\nPo zakończeniu wzmocni dowolną §Yarmię§! z działającym §Yzgrupowaniem wojsk§! lub zebranych w tej bazie gwiezdnej."
 MACRO_BUILDER_CAPACITY_DESC: "Liczba dostępnych £planet£§Yplanet§! określa, ile armii można tworzyć równocześnie. Planety można wyłączyć z §Ycentrum armii uderzeniowych§!, korzystając z zakładki armii w menu planety."
