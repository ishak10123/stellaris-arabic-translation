 purge_processing: "Przetwarzanie"
 purge_processing_tooltip: "Ze wskazanych populacji powstaje aż do ich wymarcia [Root.GetPurgeProcessingResource]."
 purge_processing_tooltip_delayed: "§LTo smutne, a jednocześnie oczywiste, że przeznaczenie niektórych polega na staniu się pożywką dla ambicji lepszych od siebie.§!"
 purge_matrix: "Przetwarzanie chemiczne"
 purge_matrix_tooltip: "Fizjologia modyfikowanych populacji jest przygotowana do wbudowania w sieć energetyczną. Tam reakcje chemiczne podtrzymujące ich istnienie zostaną przekierowane do naszych zasobów energetycznych. Proces ten kończy się śmiercią, ale powolną."
 purge_matrix_tooltip_delayed: "§LWkrótce zyskają bardziej wydajną formę.§!"
 purge_necrophage: "Nekrofagi"
 purge_necrophage_tooltip: "Wskazane populacje zostają stopniowo wchłonięte przez gatunek [From.GetSpeciesAdj&genitive], czy tego chcą, czy nie."
 purge_necrophage_tooltip_delayed: "§LW nieprzyjaznej galaktyce przetrwają tylko najsilniejsi. Dzięki temu mogą kontynuować swą drogę jako [From.GetSpeciesNamePlural].§!"
 slavery_matrix: "Wtopienie w sieć"
 slavery_matrix_tooltip: "Długoterminowa alternatywa dla przetwarzania chemicznego. Dzięki niej proces ten przetrwa taka część populacji organicznej, która zapewni nieograniczone zasilanie naszej sieci energetycznej."
 slavery_matrix_tooltip_delayed: "§LDzięki tej swoistej fuzji zdobędziemy wszelką energię, jakiej będziemy potrzebować.§!"
 migration_control_yes: "Kontrola migracji uruchomiona"
 migration_control_yes_tooltip: "§HKontrola migracji§! nie pozwala populacjom tego gatunku przemieszczać się pomiędzy naszymi światami."
 migration_control_yes_tooltip_delayed: "§LSwobodny przepływ populacji pozwala skutecznie dysponować zasobami, ale czasami to, co jest konieczne, nie jest skuteczne.§!"
 migration_control_no: "Brak kontroli migracji"
