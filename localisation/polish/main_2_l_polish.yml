 slavery_domestic_tooltip: "§HSłudzy krajowi§!, którzy nie mają innej pracy, będą zatrudniani jako słudzy, co zwiększy £amenities£ $PLANET_AMENITIES_TITLE$. Nie mogą pracować jako £pop_cat_ruler£ §Y$pop_cat_ruler$§! ani £pop_cat_specialist£ §Y$pop_cat_specialist$§!; wyjątkiem jest praca jako [entertainer.GetIcon] §Y[entertainer.GetNamePlural]§!."
 slavery_domestic_tooltip_delayed: "§LSłudzy krajowi spędzają większość czasu na zaspokajaniu potrzeb wolnych populacji. Niektórzy są przydzielani do indywidualnych domostw, a inni zajmują się miejscami publicznymi. Zwykle mieszkają ze swymi panami i dlatego nie potrzebują własnych mieszkań.§!"
 slavery_military: "Walczący niewolnicy"
 slavery_military_tooltip: "§HWalczący niewolnicy§! nie mają premii do produkcji zasobów, ale są doskonałymi żołnierzami dla lokalnych §Harmii§!. Nie mogą pracować jako [enforcer.GetIcon] §Y[enforcer.GetNamePlural]§!, [soldier.GetIcon] §Y[soldier.GetName]§! ani £pop_cat_worker£ §Y$pop_cat_worker$§!."
 slavery_military_tooltip_delayed: "§LWalczący niewolnicy to uzbrojeni poddani, często od dziecka uczący się sztuki walki i całkowitego posłuszeństwa. W zamian za służbę wojskową otrzymują o wiele większą swobodę od innych niewolników i mogą zajmować więcej miejsc pracy.§!"
 slavery_livestock: "Bydło"
 slavery_livestock_tooltip: "£pop£ §HPopulacje bydła§! nie mogą wytwarzać zasobów, ale są utrzymywane w celu zwiększenia zapasów £food£ §Hżywności§!.\n\nZamiast tego litoidy utrzymywane jako bydło wytwarzają £minerals£ §Hminerały§!, a termofile utrzymywane jako bydło wytwarzają £alloys£ §Hstopy§!.\n\nBydło może być hodowane w §Hkosmicznych zoo§!, by dostarczało: $r_amenities$."
 slavery_livestock_tooltip_delayed: "§LBydło to populacja!§!"
 slavery_indentured: "Służący długoterminowi"
 slavery_indentured_tooltip: "§HDługoterminowi służący§! mogą być zatrudniani jako: £pop_cat_worker£ §Y$pop_cat_worker$§! lub £pop_cat_specialist£ §Y$pop_cat_specialist$§! i zachowują większą siłę polityczną niż inni niewolnicy. Nie mogą pracować jako [entertainer.GetIcon] §Y[entertainer.GetNamePlural]§! lub [enforcer.GetIcon] §Y[enforcer.GetNamePlural]§!. Premie do produkcji oparte na niewolnictwie działają tylko, jeśli niewolnicy są zatrudniani jako: £pop_cat_worker£ §Y$pop_cat_worker_plural$§!."
 slavery_indentured_tooltip_delayed: "§LTeoretycznie mogą spłacić swe długi i odzyskać wolność, ale ich umowy celowo sporządzono w ten sposób, by to uniemożliwić.§!"
 living_standard_utopian: "Utopijny dostatek"
 living_standard_utopian_tooltip: "$living_standard_utopian$ gwarantuje każdemu przedstawicielowi tego gatunku dostęp do prawie wszystkich możliwych luksusów.\n\n$UTOPIAN_ABUNDANCE_POP_EFFECTS$\n\n$CIVILIANS_PRODUCE_UNITY_RESEARCH$"
 living_standard_utopian_tooltip_delayed: "§LNie możemy realnie usunąć wszystkich potrzeb poprzez spełnienie każdej zachcianki. Ale warto spróbować.§!"
 living_standard_shared_burden: "Wspólne obciążenia"
 living_standard_shared_burden_tooltip: "$living_standard_shared_burden$ gwarantuje równą dystrybucję zasobów pomiędzy wszystkich członków społeczeństwa.\n\n$SHARED_BURDEN_POP_EFFECTS$\n\n$UNEMPLOYED_PRODUCE_UNITY$"
 living_standard_shared_burden_tooltip_delayed: "§LOd każdego według możliwości. Każdemu według potrzeb.§!"
 living_standard_academic_privilege: "Przywileje akademickie"
 living_standard_academic_privilege_tooltip: "$living_standard_academic_privilege$ to nacisk na wykształconą populację, co daje ogólne korzyści nauce\n\n$ACADEMIC_PRIVILEGE_POP_EFFECTS$"
 living_standard_academic_privilege_tooltip_delayed: "§LWiedza to klucz do władzy.§!"
 living_standard_good: "Dobry"
 living_standard_good_tooltip: "$living_standard_good$ to poprawa życia biedniejszych warstw społecznych poprzez hojną politykę socjalną.\n\n$SOCIAL_WELFARE_POP_EFFECTS$\n\n$UNEMPLOYED_PRODUCE_UNITY$"
 living_standard_good_tooltip_delayed: "§LZaspokajanie potrzeb obywateli to najważniejsza z powinności państwa.§!"
 living_standard_normal: "Przyzwoite warunki"
 living_standard_normal_tooltip: "$living_standard_normal$ gwarantują większości przedstawicieli gatunku wszystko, czego potrzeba do zadowalającej jakości życia.\n\n$DECENT_LIVING_STANDARDS_POP_EFFECTS$"
 living_standard_normal_tooltip_delayed: "§LZaniedbanie potrzeb naszych obywateli to na dłuższą metę droga ku katastrofie.§!"
 living_standard_stratified: "Rozwarstwiona gospodarka"
 living_standard_stratified_tooltip: "$living_standard_stratified$ faworyzuje klasy rządzące kosztem zubożałych mas.\n\n$STRATIFIED_LIVING_STANDARDS_POP_EFFECTS$"
 living_standard_stratified_tooltip_delayed: "§LJeżeli chcą poprawić swój los, muszą na to zapracować.§!"
 living_standard_hive_mind: "Dron"
 living_standard_hive_mind_tooltip: "Populacja dronów rzadko korzysta z luksusów, ale nadal potrzebuje do życia olbrzymiej ilości zasobów."
 living_standard_hive_mind_tooltip_delayed: "§LNie ma różnicy między potrzebami jednostki a potrzebami roju.§!"
 living_standard_subsistence: "Nędza"
 living_standard_subsistence_tooltip: "$living_standard_subsistence$ zapewnia populacjom tego gatunku tylko najpotrzebniejsze towary.\n\n$SUBSISTENCE_POP_EFFECTS$"
 living_standard_subsistence_tooltip_delayed: "§LJak najmniej naszych poddanych powinno głodować. Nie interesuje nas nic ponadto.§!"
 living_standard_none: "Nieistniejący"
 living_standard_none_tooltip: "Ten gatunek jest poddawany czystce, a jego populacje nie będą miały kosztów utrzymania."
 living_standard_none_tooltip_delayed: "§LNie płacimy na umarłych.§!"
 living_standard_deassimilation: "Rozpad Roju"
 living_standard_deassimilation_tooltip: "Ten gatunek przechodzi trudną izolację fizjologiczną od umysłu zbiorowego."
 living_standard_deassimilation_tooltip_delayed: "§LWitajcie poza stadem.§!"
 living_standard_ego_assimilation: "Sublimacja tożsamości"
 living_standard_ego_assimilation_tooltip: "Ten gatunek staje się jednością z umysłem zbiorowym."
