 civic_tooltip_machine_assimilator_effects: "Rozpoczęcie gry z §Y1K§! £pop£ populacjami cyborgów i zdolnością §Yasymilacji§! istot organicznych jako cyborgów.\nAsymilacja £pop£ §Hpopulacji organicznych§! wytwarza niewielką ilość £unity£ §Yjedności§! i £society£ §Ybadań socjologicznych§!.\nNieasymilujące się £pop£ §Hpopulacje organiczne§! zostają z czasem poddane §Yczystkom§!.\nPosiada casus belli §YAsymilacja§! wobec wszystkich pozostałych imperiów.\nPogorszenie §Yopinii§! u większości pozostałych imperiów.\nUmożliwia dostęp do §Ycybernetycznej§! drogi rozwoju."
