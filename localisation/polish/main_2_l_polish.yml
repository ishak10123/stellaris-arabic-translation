 gunship: "Kanonierka"
 gunship_desc: "Kanonierki są przeznaczone do zwalczania innych okrętów o podobnej do nich wielkości. Montuje się na nich jak najwięcej uzbrojenia średniego zasięgu."
 explosive: "Oblężenie"
 explosive_desc: "Okręty oblężeniowe używają broni kierowanej, by zadawać olbrzymie uszkodzenia dużym jednostkom, bazom gwiezdnym i planetom."
 carrier: "Lotniskowiec"
 carrier_desc: "Lotniskowce są bazami, z których startują pojazdy szturmowe."
 screen: "Eskortowiec"
 screen_desc: "Eskortowce posiadają broń do obrony bezpośredniej i przeciwlotniczą. Chronią resztę floty przed pociskami, torpedami oraz pojazdami szturmowymi."
 artillery: "Artyleria"
 artillery_desc: "Okręty artyleryjskie są uzbrojone w pociski dalekiego zasięgu i broń prowadzącą ogień bezpośredni. Zwykle mają kłopoty ze zwalczaniem mniejszych jednostek, a także tych, które za bardzo się do nich zbliżą."
 brawler: "Uderzeniowiec"
 brawler_desc: "Uderzeniowce są przeznaczone do walki bezpośredniej, używają uzbrojenia o krótkim zasięgu, ale zadającego duże obrażenia, takiego jak działka automatyczne i dezintegratory."
 energy_torpedoes: "Torpeda energetyczna"
 energy_torpedoes_desc: "Okręty z torpedami energetycznymi przenoszą torpedy neutronowe i protonowe w miejscach na broń kierowaną. Zadają dodatkowe uszkodzenia dużym jednostkom. Są podatne na ataki okrętów, którym uda się do nich zbliżyć."
 buffer_role: "Wsparcie"
 buffer_role_desc: "Wyspecjalizowane komponenty okrętu wsparcia zapewniają pomoc i przewagę walczącym flotom."
 debuffer_role: "Szykanator"
 debuffer_role_desc: "Wyposażone w komponenty zakłócające szykanatory utrudniają wrogim flotom działanie w ogniu walki."
 stealth: "(Maskowanie)"
