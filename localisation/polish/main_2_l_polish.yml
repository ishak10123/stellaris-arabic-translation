 living_standard_organic_trophy: "Obowiązkowe rozpieszczanie"
 living_standard_organic_trophy_tooltip: "Ten standard życia czyni z małej populacji istot organicznych okazy wystawowe poprzez niezmordowane i nieustępliwe rozpieszczanie.\n\n$ORGANIC_TROPHY_POP_EFFECTS$"
 living_standard_organic_trophy_tooltip_delayed: "§LKto jest dobrym biotrofeum? Wy! Tak, wy!§!"
 living_standard_chemical_bliss: "Chemiczny błogostan"
 living_standard_chemical_bliss_tooltip: "Media rozrywkowe są powszechnie dostępne, a podawane leki wywołują euforyczne odurzenie. Populacje są zadowolone, ale bezużyteczne.\n\n$living_standard_chemical_bliss_happiness_tooltip$"
 living_standard_chemical_bliss_tooltip_delayed: "§LWszyscy lubią zabawy i rozrywki. Niektórzy z początku opierają się przyjmowaniu leków.§!"
 living_standard_decadent: "Dekadencki styl życia"
 living_standard_decadent_tooltip: "$living_standard_decadent$ oznacza przeznaczenie większych ilości zasobów i produktów luksusowych dla uprzywilejowanych członków społeczeństwa.\n\n$DECADENT_LIVING_STANDARDS_POP_EFFECTS$"
 living_standard_decadent_tooltip_delayed: "§LNależy się nam wszystko, co najlepsze. Oni muszą służyć, my mamy się weselić.§!"
 living_standard_dystopian_society: "Społeczeństwo dystopijne"
 living_standard_dystopian_society_tooltip: "$living_standard_dystopian_society$ uznaje klasę rządzącą za jedynego właściwego odbiorcę artykułów pierwszej potrzeby, całkowicie zaniedbując klasy niższe.\n\n$DYSTOPIAN_LIVING_STANDARDS_POP_EFFECTS$"
 living_standard_dystopian_society_tooltip_delayed: "§LMotłoch musi wiedzieć, gdzie jego miejsce. A jak nie, to my mu to miejsce pokażemy.§!"
 living_standard_worker_ownership: "Własność pracownicza"
 living_standard_worker_ownership_tooltip: "$living_standard_worker_ownership$ gwarantuje każdemu pracownikowi demokratyczny udział w miejscu zatrudnienia. Koszta życia i obowiązki społeczne obciążają równomiernie wszystkich członków."
 living_standard_worker_ownership_tooltip_delayed: "§LKażdemu głos, udział i zyski w społeczeństwie zbudowanym trudem naszej pracy.§!"
