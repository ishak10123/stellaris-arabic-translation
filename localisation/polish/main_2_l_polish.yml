 purge_normal: "Eksterminacja"
 purge_normal_tooltip: "Wskazane populacje są systematycznie likwidowane. To najszybszy z dostępnych rodzajów czystki."
 purge_normal_tooltip_delayed: "§LSzwadrony śmierci są skuteczne. Niszczenie całych populacji oczywiście pochłania czas, ale sprawdza się doskonale.§!"
