 mod_building_clone_vats_max: "Limit planety: $planet_buildings_clone_vats$"
 building_slave_processing: "Centrum kontroli niewolników"
 building_slave_processing_desc: "Ta wielka i imponująca placówka służy do korzystania z pracy niewolniczej i dławienia wszelkich przejawów wolnej woli."
 building_slave_processing_migrate_effect_desc: "§YAutomatyczne przesiedlenie§! do innych kolonii jest włączone. Podlegają mu miejscowi bezrobotni §Y$SLAVES$§! i nierozumne roboty."
 building_slave_processing_slave_army_effect_desc: "Umożliwienie werbunku armii §Y$slave_army_plural$§!.\n\n"
 building_robotics_assembly_plant: "Fabryka robotów I"
 building_robotics_assembly_plant_desc: "Fabryka robotów jest potrzebna do tworzenia armii robotów.\nDodaje §Y100§! £pop£ §H$ROBOT_POP_SPECIES_1$ populacji§! rocznie.\nUtrzymanie populacji: £energy£ §Y1§!"
 building_robotics_assembly_plant_2: "Fabryka robotów II"
 building_robotics_assembly_plant_2_desc: "Fabryka robotów jest potrzebna do tworzenia armii robotów.\nDodaje §Y100§! £pop£ §H$ROBOT_POP_SPECIES_2$ populacji§! rocznie.\nUlepsza populacje §H$ROBOT_POP_SPECIES_1$§! do §H$ROBOT_POP_SPECIES_2$§!\nUtrzymanie populacji: £energy£ §Y2§!"
 building_robotics_assembly_plant_3: "Fabryka robotów III"
 building_robotics_assembly_plant_3_desc: "Fabryka syntetyków jest potrzebna do tworzenia armii robotów.\nDodaje §Y100§! £pop£ §H$ROBOT_POP_SPECIES_3$ populacji§! rocznie.\nUlepsza populacje §H$ROBOT_POP_SPECIES_2$§! do §H$ROBOT_POP_SPECIES_3$§!\nUtrzymanie populacji: £energy£ §Y5§!"
 building_colony_shelter: "Zaimprowizowany schron"
 building_colony_shelter_desc: "Pozostałości statku kolonizacyjnego, przebudowane tak aby podtrzymać młodą kolonię przy życiu."
 building_capital: "Administracja planetarna"
 building_capital_desc: "Siedziba miejscowych elit rządzących."
 building_major_capital: "Stolica planetarna"
 building_major_capital_desc: "Rozległy kompleks biurowców będący centrum administracyjnym dużej kolonii."
 building_system_capital: "Kompleks stolicy układu"
 building_system_capital_desc: "Górujący nad otoczeniem zespół biur administracyjnych i obiektów infrastruktury, który umożliwia budowę i działanie bardzo wymagających obiektów."
 building_ancient_factory: "Fabryki autonomiczne"
 building_ancient_factory_desc: "§LTen starożytny kompleks został wzniesiony całe wieki temu dzięki dawno zaginionej technologii.§!"
 building_ancient_archives: "Archiwa prekursorów"
 building_ancient_archives_desc: "§LOgromne zbiory pradawnej wiedzy.§!"
 building_dark_matter_power_plant: "Elektrownia na ciemną materię"
 building_dark_matter_power_plant_desc: "§LTen starożytny kompleks został wzniesiony całe wieki temu dzięki dawno zaginionej technologii.§!"
 building_agri_processing_complex: "Kompleks rolno-przetwórczy"
 building_agri_processing_complex_desc: "§LTen starożytny kompleks został wzniesiony całe wieki temu dzięki dawno zaginionej technologii.§!"
 building_primitive_farm: "Prymitywne farmy"
 building_primitive_farm_desc: "Prymitywne gospodarstwa uprawiające ziemię i uzyskujące słabe plony"
 building_primitive_factory: "Podstawowe fabryki"
 building_primitive_factory_desc: "Prymitywne, mało wydajne fabryki zanieczyszczające środowisko podczas produkcji"
 building_primitive_offices: "Podstawowe biura"
 building_primitive_offices_desc: "W tych biurach znajdują się na pozór niezliczone boksy, z których dobiegają dźwięki bezsensownej pracy."
 building_primitive_mine: "Prymitywna kopalnia"
 building_primitive_mine_desc: "Toporne tunele górnicze wijące się pod ziemią."
 building_primitive_power_plant: "Prymitywna elektrownia"
 building_primitive_power_plant_desc: "Archaiczna i dość zawodna elektrownia oparta na węglu lub wczesnej technice jądrowej, zatruwająca atmosferę."
 building_mutant_landfill: "Wysypisko mutantów"
 building_mutant_landfill_desc: "Masa rozkładających się martwych, zmutowanych potworów. Ich lotna materia organiczna połączyła się, tworząc coś na kształt budowli."
 building_vault: "Podziemny schron"
 building_vault_desc: "Te namioty znajdują się przy wejściu do olbrzymiego podziemnego schronu, w którym jego pierwsi mieszkańcy skryli się przed bombami. Gdy wyczerpały się zapasy żywności, zaczęli zabijać się między sobą."
 building_vault_2: "Podziemny schron"
 building_vault_2_desc: "Te namioty znajdują się przy wejściu do olbrzymiego podziemnego schronu, w którym jego pierwsi mieszkańcy skryli się przed bombami. Znajduje się tam olbrzymi park maszynowy i magazyny sprzętu górniczego."
 building_particle_accelerator: "Akcelerator cząstek"
 building_particle_accelerator_desc: "Stary akcelerator cząstek został zbudowany na podstawie przełomowego projektu, a ocalałe terminale znajdujące się w budynku zawierają olbrzymie ilości danych badawczych zebranych przez genialnego fizyka teoretycznego."
 building_odd_factory: "Dziwna fabryka"
 building_odd_factory_desc: "Dobrze przygotowana placówka produkująca niezwykle cenne zasoby. Zostawiła ją na tej planecie inna cywilizacja."
 building_quarantine: "Stacja badania zarazy"
 building_quarantine_desc: "Tymczasowy szpital zajmujący się badaniem zakażonych w celu znalezienia lekarstwa."
 building_plague_memorial: "Pomnik zarazy"
 building_plague_memorial_desc: "Monument upamiętniający straszliwą chorobę, która kiedyś spustoszyła ten świat. Stanowi świadectwo woli przetrwania narodu."
 building_energy_grid: "Węzeł energetyczny"
 building_energy_grid_plural: "Węzły energetyczne"
 building_energy_grid_desc: "Dokładnie skalibrowana sieć energetyczna maksymalizująca ilość energii wytwarzanej przez generatory."
 building_energy_grid_effect_desc: "Zwiększa o §G1§! podstawową wydajność miejsc pracy wytwarzających £energy£ §Yenergię§!."
 building_energy_nexus: "Węzeł energetyczny II"
 building_energy_nexus_desc: "Ta olbrzymia placówka centralizuje wszystkie sieci energetyczne na planecie i poprawia ich wydajność."
 building_mineral_purification_plant: "Oczyszczalnie minerałów"
 building_mineral_purification_plant_desc: "Minerały, które przeszły przez te oczyszczalnie, to materiał najwyższej jakości."
 building_mineral_purification_hub: "Centra oczyszczania minerałów"
 building_mineral_purification_hub_desc: "Olbrzymie centra, do których dostarcza się minerały, a następnie przesyła do potężnych oczyszczalni."
 building_medical_1: "Centrum medyczne"
 building_medical_1_desc: "$job_healthcare_desc$"
 building_medical_2: "Kliniki genetyczne"
 building_medical_2_desc: "Klinika genetyczna dysponuje nowoczesnymi rodzajami terapii, które prowadzą do wzrostu poziomu zdrowia i długości życia populacji."
 building_medical_3: "Ośrodki rewitalizacji komórkowej"
 building_medical_3_desc: "Ośrodek rewitalizacji komórkowej dysponuje nowoczesnymi rodzajami terapii dla większej populacji. Kuracja na poziomie komórkowym znacznie zwiększa poziom zdrowia i długość życia."
 building_mineral_silo_1: "Silos minerałów I"
 building_mineral_silo_1_desc: "Silosy minerałów zwiększają maksymalną wielkość zapasu minerałów w naszym imperium."
 building_mineral_silo_2: "Silos minerałów II"
 building_mineral_silo_2_desc: "$building_mineral_silo_1_desc$"
 building_mineral_silo_3: "Silos minerałów III"
 building_mineral_silo_3_desc: "$building_mineral_silo_1_desc$"
 building_planetary_shield_generator: "Generator osłon planetarnych"
 building_planetary_shield_generator_desc: "$tech_planetary_shield_generator_desc$"
 building_autochthon_monument: "Pomnik autochtonów"
 building_autochthon_monument_plural: "Pomniki autochtonów"
 building_autochthon_monument_desc: "Pomnik pionierów podróży kosmicznych."
 building_autochthon_monument_effect: "Wytwarza §G1 pkt§!£unity£ za każdą §Ykorzyść z rozwoju§! przyjętą przez nasze imperium.\n\n"
 building_heritage_site: "Miejsce dziedzictwa"
 building_heritage_site_desc: "Teren poświęcony początkom historii naszego imperium i jego mieszkańców."
 building_heritage_site_effect: "Wytwarza §G2 pkt§!£unity£ za każdą §Ykorzyść z rozwoju§! przyjętą przez nasze imperium.\n\n"
 building_hypercomms_forum: "Forum hiperłączności"
 building_hypercomms_forum_desc: "Olbrzymia placówka wyposażona w najnowocześniejszy sprzęt łączności interpersonalnej, umożliwia wymianę wielozmysłowych idei w zwyczajnych rozmowach i szybkie osiąganie konsensusu podczas debat."
 building_hypercomms_forum_effect: "Wytwarza §G3 pkt§!£unity£ za każdą §Ykorzyść z rozwoju§! przyjętą przez nasze imperium.\n\n"
 building_autocurating_vault: "Muzeum z Autokustoszem"
 building_autocurating_vault_desc: "Wysoce wyspecjalizowana sieć komputerowa nieustannie pozyskuje, analizuje, ocenia i wystawia przedmioty, które uznaje za istotne. W ten sposób powstaje żyjące muzeum teraźniejszości."
 building_temple: "Świątynia"
 building_temple_desc: "Świątynie to proste budowle wznoszone do niepamiętnych czasów, służą do cichej kontemplacji i obcowania z tym, co jednoczy nas wszystkich."
 building_holotemple: "Holoświątynia"
 building_holotemple_desc: "To ulepszona wersja archaicznych pierwowzorów, najnowsza technologia duchowości tworząca zmienną rzeczywistość wewnątrz holoświątyni. Dzięki temu możliwa jest głębsza medytacja i intensywniejsze modlitwy."
 building_sacred_nexus: "Święty splot"
 building_sacred_nexus_desc: "Najnowsze osiągnięcia w dziedzinie technologii pola umożliwiają wiernym bezpośrednie odczuwanie boskiego wpływu świętej ziemi."
 building_citadel_of_faith: "Cytadela wiary"
 building_citadel_of_faith_desc: "Olbrzymi kompleks dający wszystkim, którzy tam trafią, schronienie i odosobnienie od świata materialnego."
 building_stronghold: "Twierdza"
 building_stronghold_desc: "Twierdza planetarna z silnym garnizonem do ochrony świata przed inwazją i buntem."
 building_fortress: "Forteca"
 building_fortress_desc: "Potężna forteca z powiększonym garnizonem i obiektami szkoleniowymi dla żołnierzy."
 building_bio_reactor: "Bioreaktor"
 building_bio_reactor_desc: "Obiekt, w którym materia organiczna jest z dużą wydajnością przetwarzana w energię."
 tech_bio_reactor: "$building_bio_reactor$"
 tech_bio_reactor_desc: "$building_bio_reactor_desc$"
 building_bio_reactor_2: "Zaawansowany bioreaktor"
 building_bio_reactor_2_desc: "Obiekt, w którym materia organiczna jest bardzo wydajnie przetwarzana w energię. Usprawnienie zbierania odpadów pozwala gromadzić przydatne gazowe produkty uboczne."
 tech_bio_reactor_2: "$building_bio_reactor_2$"
 tech_bio_reactor_2_desc: "$building_bio_reactor_2_desc$"
 building_hab_stronghold: "Strefa bezpieczeństwa"
 building_hab_stronghold_desc: "Ta sekcja stacji mieszkalnej jest przeznaczona dla sił bezpieczeństwa i zapewnia zbrojny oddział ochrony, strzegący stacji przed zagrożeniami wewnętrznymi i zewnętrznymi."
 building_crude_huts: "Prymitywne chaty"
 building_crude_huts_desc: "Prymitywne schronienia zbudowane z kamieni, gliny i innych dostępnych materiałów."
 building_primitive_dwellings: "Prymitywne osiedla"
 building_primitive_dwellings_desc: "Te niewielkie budynki zapewniają minimalne schronienie, ale chronią przed najgorszymi warunkami pogodowymi."
 building_stone_palace: "Kamienne pałace"
 building_stone_palace_desc: "Prymitywne pałace wzniesione z kamienia. Mieszka w nim miejscowa elita rządząca."
 building_primitive_capital: "Stolice regionalne"
 building_primitive_capital_desc: "Budynki stolic regionalnych różnych państw narodowych tego prymitywnego świata."
 building_urban_dwellings: "Osiedla miejskie"
 building_urban_dwellings_desc: "Zatłoczone i często zanieczyszczone betonowe dżungle."
 building_pre_ftl_radio_telescope: "Radioteleskopy"
 building_pre_ftl_radio_telescope_desc: "Radioteleskopy poszukujące inteligentnych organizmów kosmicznych."
 awareness_gain_desc: "Zwiększenie szans na uzyskanie przez tę cywilizację £awareness£ §Yświadomości§!."
 building_hive_crude_huts: "Zwykłe gniazda"
 building_hive_crude_huts_desc: "Te gniazda powstają z najprostszych dostępnych materiałów, nocami ledwie chronią drony przed zamarznięciem."
 building_hive_primitive_dwellings: "Wczesna kolonia"
 building_hive_primitive_dwellings_desc: "Dzięki próbom optymalizacji dostępnej przestrzeni te sześciokątne budynki mogą pomieścić społeczność, którą można nazwać kolonią."
 building_hive_stone_palace: "Kamienny ul"
 building_hive_stone_palace_desc: "W świecie, w którym trzeba walczyć o przetrwanie z przedstawicielami własnego gatunku, posiadanie kamiennych ścian daje przewagę."
 building_hive_primitive_capital: "Węzeł kontynentalny"
 building_hive_primitive_capital_desc: "Typowy centralny punkt kontynentu, w którym znajdują się roje walczące o zawładnięcie tym światem."
 building_hive_urban_dwellings: "Magazyn dronów"
 building_hive_urban_dwellings_desc: "Użytkowe rozwiązanie mieszkalne dla odpoczywających dronów. Oddzielne wejścia i wyjścia optymalizują proces ładowania roju."
 building_hive_primitive_factory: "$building_primitive_factory$"
 building_hive_primitive_factory_desc: "$building_primitive_factory_desc$"
 building_hive_primitive_mine: "$building_primitive_mine$"
 building_hive_primitive_mine_desc: "$building_primitive_mine_desc$"
 building_hive_primitive_power_plant: "$building_primitive_power_plant$"
 building_hive_primitive_power_plant_desc: "$building_primitive_power_plant_desc$"
 building_hive_primitive_farm: "$building_primitive_farm$"
 building_hive_primitive_farm_desc: "$building_primitive_farm_desc$"
 building_hive_primitive_node: "Prosty węzeł synaptyczny"
 building_hive_primitive_node_desc: "Dzięki temu prymitywnemu węzłowi synaptycznemu wola umysłu zbiorowego stanie się silniejsza."
 building_machine_primitive_node: "Proste łącze sieci"
 building_machine_primitive_node_desc: "Prymitywne łącze sieci zmniejsza opóźnienia w łączności planetarnej."
 building_farming_districts_1: "Ośrodek rozwoju upraw"
 building_farming_districts_1_desc: "Skromne centrum biurokratyczne, którego zadaniem jest badanie gruntów nadających się do uprawy i inicjowanie rozwoju planetarnego rolnictwa."
 building_farming_districts_2: "Centrum rekultywacji gleby"
 building_farming_districts_2_desc: "To centrum skupia się na rekultywacji gruntów o niskiej przydatności rolnej i polepszaniu plonów, co umożliwia większy rozwój dzielnic rolniczych."
 building_farming_districts_3: "Zautomatyzowany kompleks rolny"
 building_farming_districts_3_desc: "Zmechanizowane kombajny, floty dronów i pola o kontrolowanym klimacie stymulują szybką ekspansję dzielnic rolniczych."
 building_farming_districts_4: "Planetarna sieć upraw"
 building_farming_districts_4_desc: "Ogromny zintegrowany kompleks, który nadzoruje intensywne operacje rolne o dużym natężeniu, maksymalizując liczbę dzielnic rolniczych wspieranych na planecie."
 building_mine_generic: "Powierzchniowy skład odkrywkowy"
 building_mine_generic_desc: "Koordynując płytkie wydobycie i gromadzenie rudy, skład ten umożliwia wczesną ekspansję dzielnic górniczych."
 building_mining_districts_1: "Przemysłowy zakład wydobywczy"
 building_mining_districts_1_desc: "Urządzenia wydobywcze, systemy przenośników i sortowniki działają w tandemie, aby utrzymać niezawodną produkcję i umożliwić początkową ekspansję dzielnic górniczych."
 building_mining_districts_2: "Rdzeniowa macierz wiertnicza"
 building_mining_districts_2_desc: "Obiekt, który umożliwia głębsze operacje wydobywcze dzięki ciężkim wiertłom i wzmocnieniom strukturalnym, odblokowując dodatkowe złoża minerałów."
 building_mining_districts_3: "Stacja tunelowania sejsmicznego"
 building_mining_districts_3_desc: "Kompleks umożliwiający wysoce wydajne drążenie tuneli i podziemną stabilizację, co pozwala uzyskać dostęp do nieosiągalnych w inny sposób pokładów surowców mineralnych."
 building_mining_districts_4: "Głębinowa sieć wydobywcza"
 building_mining_districts_4_desc: "Ten rozległy kompleks działający na maksymalnych głębokościach planetarnych zarządza w pełni uprzemysłowionymi strefami wydobywczymi i umożliwia największą możliwą ekspansję dzielnic górniczych."
 building_generator_generic: "Woltaiczna stacja produkcyjna"
 building_generator_generic_desc: "Obiekt ten przeznaczony do wytwarzania dużych ilości energii mieści w sobie ogniwa energetyczne, przewody plazmowe i układy generatorów o dużej mocy."
 building_generator_districts_1: "Kompleks dystrybucji energetycznej"
 building_generator_districts_1_desc: "Kompleks wspiera tworzenie nowych dzielnic produkujących energię poprzez dystrybucję podstawowej infrastruktury energetycznej i systemów przesyłu energii."
 building_generator_districts_2: "Kompleks podstacji przekaźnikowych"
 building_generator_districts_2_desc: "Umożliwiając większe wsparcie dla rozwoju dzielnic produkujących generatory, obiekt ten rozbudowuje planetarną infrastrukturę energetyczną poprzez wdrażanie przekaźników o dużej mocy, stacji transformatorowych i węzłów stabilizujących sieć."
 building_generator_districts_3: "Układ regulacji plazmy"
 building_generator_districts_3_desc: "Kompleks, w którym ustabilizowane przepływy plazmy i kontrola rezonansu obwodu pozwalają na intensyfikację rozwoju generatorów na całej planecie."
 building_generator_districts_4: "Węzeł planetarny"
 building_generator_districts_4_desc: "Ten zintegrowany węzeł energetyczny koordynuje działanie generatorów na skalę planetarną, umożliwiając największą możliwą rozbudowę dzielnic produkujących energię."
 ####################################
 #Wonders
 ####################################
 building_xeno_zoo: "Kosmiczne zoo"
 building_xeno_zoo_plural: "Kosmiczne zoo"
 building_xeno_zoo_desc: "Rezerwat przeznaczony do ochrony i badania miejscowej fauny."
 building_fe_xeno_zoo: "Ksenorezerwat"
 building_hab_capital: "Administracja stacji mieszkalnej"
 building_hab_capital_desc: "Centrum administracyjne stacji mieszkalnej, pełniące rolę stolicy i siedziby miejscowego rządu."
 building_hab_capital_tooltip: "£mod_planet_max_districts_add£ Maks. miejsc na dzielnicę za duże ciała niebieskie: §G+0,25§!\n"
 building_hab_solar_power_processor: "Przetwornik energii słonecznej"
 building_hab_solar_power_processor_desc: "Przetworniki energii słonecznej rozprowadzają energię zgromadzoną w gigantycznych panelach słonecznych znajdujących się na zewnątrz kadłuba stacji mieszkalnej."
 building_hab_astro_mining_facility: "Stanowisko astrogórnicze"
 building_hab_astro_mining_facility_desc: "Stacje mieszkalne nie mają własnych zasobów naturalnych, więc korzystają z tych placówek, żeby wydobywać i przetwarzać minerały z pobliskich asteroid i planetoid."
 building_hab_agri_bay: "Strefa rolnicza"
 building_hab_agri_bay_desc: "Część stacji mieszkalnej przeznaczona pod uprawę różnych roślin i hodowlę zwierząt potrzebnych miejscowej populacji."
 building_hab_cultural_center: "Dzielnica wypoczynkowa"
 building_hab_cultural_center_desc: "Ten rozległy kompleks zaspokaja kulturowe i społeczne potrzeby mieszkańców stacji mieszkalnej."
 building_hab_laboratory_module: "Kompleks laboratoryjny"
 building_hab_laboratory_module_desc: "Część stacji mieszkalnej w całości przeznaczona do badań naukowych."
 building_fe_xeno_zoo_desc: "Supernowoczesny rezerwat, który idealnie utrzymuje naturalne warunki życia chronionych obcych gatunków."
 building_paradise_dome: "Rajska kopuła"
 building_paradise_dome_desc: "Całkowicie zamknięta kopuła mieszkalna z samodzielnym ekosystemem. Istny prywatny raj dla mieszkających tam bogaczy albo szczęściarzy."
 building_monument: "Pomnik"
 building_monument_desc: "Pomnik na cześć wielkiego władcy."
 building_monument_proper: "Pomnik: [GetRulerName]"
 building_monument_desc_proper: "Olbrzymi pomnik ku czci: [GetRulerName]."
 building_grand_mausoleum: "Wielkie mauzoleum"
 building_grand_mausoleum_desc: "Olbrzymie mauzoleum zbudowane jako grobowiec dla wielkiego władcy"
 building_grand_mausoleum_proper: "Wielkie mauzoleum: [GetRulerName]"
 building_grand_mausoleum_desc_proper: "Święte mauzoleum ku czci wielkiej postaci ([GetRulerName])."
 building_grand_mausoleum_allowed_tooltip: "Musi mieć §Ywładcę§!\nNa planecie musi być wybudowana\n§Yadministracja planetarna§!,\n§Ystolica planetarna§! albo\n§Yimperialny kompleks stołeczny§!.\n"
 building_royal_gardens: "Ogrody królewskie"
 building_royal_gardens_desc: "Olbrzymi ogród wypoczynkowy, w którym ludność może się zbierać i radować, myśląc o wielkim władcy."
 building_royal_gardens_proper: "Ogrody królewskie. Patron: [GetRulerName]"
 building_royal_gardens_desc_proper: "Fantastyczny ogród stworzony przez wielkiego władcę ([GetRulerName])."
 building_galactic_stock_exchange: "Giełda galaktyczna"
 building_galactic_stock_exchange_desc: "Zajmując się swobodnym handlem towarami i usługami, tworzymy bardziej wyspecjalizowaną gospodarkę, w której osoba prywatna może zajmować się tym, w czym jest dobra, i zaspokajać potrzeby innych."
 building_ministry_production: "Ministerstwo Produkcji"
 building_ministry_production_desc: "Ministerstwo Produkcji pracuje niestrudzenie na rzecz organizacji i optymalizacji wytwórstwa na całej planecie."
 building_production_center: "Centrum przetwarzania zasobów"
 building_production_center_desc: "Rozległy obiekt, który centralizuje zarządzanie zasobami i produkcją na całym globie."
 building_supercomputer: "Superkomputer planetarny"
 building_supercomputer_desc: "Jeden wielki superkomputer, który może wykonywać niesamowicie skomplikowane obliczenia, co zwiększa wydajność badań na całym globie."
 building_hyper_entertainment_forum: "Fora hiperrozrywki"
 building_hyper_entertainment_forum_desc: "Te olbrzymie kompleksy rozrywkowe to miejsca, w których spełniają się marzenia. Galerie handlowe, restauracje, parki rozrywki, wirtualne gry zręcznościowe i znacznie więcej. Jesteśmy tym, o czym marzysz!"
 building_institute: "Instytut badawczy"
 building_institute_desc: "Instytut badawczy to ogromny kompleks gromadzący najwybitniejszych specjalistów z różnych dziedzin, aby dzięki ich bezprecedensowej synergii zwiększyć wydajność badań naukowych całej planety."
 building_virtual_combat_arena: "Arena walk wirtualnych"
 building_virtual_combat_arena_desc: "Arena wirtualnej walki zapewnia rozrywkę i równocześnie zwiększa poczucie jedności w społeczeństwie. Miejscowe armie mogą wykorzystywać ją do wirtualnych manewrów."
 building_monument_purity: "Pomnik Czystości Kultury"
 building_monument_purity_desc: "$tech_purity_campaigns_desc$"
 building_orillium_factory: "Fabryka materiałów wybuchowych z orillium"
 building_orillium_factory_desc: "Wyjątkowe właściwości rudy orillium pozwalają uzyskać z niej uniwersalny materiał wybuchowy, idealnie nadający się do kontrolowanych wybuchów w kopalniach."
 building_pitharan_plant: "Fabryka nawozu pitarańskiego"
 building_pitharan_plant_desc: "Fabryki nawozu pitarańskiego wytwarzają nawóz z domieszką pyłu pitarańskiego, zwiększający plony zbierane z upraw."
 building_military_academy: "Akademia wojskowa"
 building_military_academy_desc: "Akademie wojskowe zwiększają lokalne współczynniki werbunkowe i zapewniają wyższy standard szkolenia."
 building_symbol_unity: "Symbol jedności"
 building_symbol_unity_desc: "$tech_symbol_unity_desc$"
 building_visitor_center: "Ośrodek turystyczny"
 building_visitor_center_desc: "$tech_visitor_center_desc$"
 building_alien_sanctuary: "Rezerwat obcych"
 building_alien_sanctuary_desc: "$tech_alien_sanctuary_desc$"
 building_psi_corps: "Korpus psioniczny"
 building_psi_corps_desc: "[GetIndividualNamePlural] posiadające dar psioniczny są sprowadzane tu z całego imperium, by szlifować swoje umiejętności.\n\n§YKorpus psioniczny to twój [GetPsiCorpFriend]. Zaufaj korpusowi.§!"
 psionic_bonus_workforce_from_telepaths_tt: "$mod_psionic_pop_bonus_workforce_mult$ zmienia się wraz z liczbą miejsc pracy ([telepath.GetIcon] [telepath.GetName])"
 building_hive_synapse: "Synapsa umysłu zbiorowego"
 building_hive_synapse_desc: "Dzięki wzmocnieniu sygnału naszego umysłu zbiorowego trutnie pracują wydajniej."
 building_xenology_center: "Ośrodek ksenologii"
 building_xenology_center_desc: "Zebranie członków słabszego gatunku w jednym miejscu umożliwia ich dokładne badanie i eksponowanie jako dowodu naszej wyższości."
 building_symbol_purity: "Symbol czystości"
 building_symbol_purity_desc: "$tech_symbol_unity_desc$"
 building_control_center: "Centralna sterownia"
 building_control_center_desc: "Dzięki budowie potężnych węzłów przetwórczych możemy zoptymalizować wydajność działania naszych trutni."
