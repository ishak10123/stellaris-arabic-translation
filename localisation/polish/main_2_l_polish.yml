 TECH_UNLOCK_COMBAT_COMPUTERS_1_TITLE: "§HOdblokowuje komponent:§! Podstawowe zadania bojowe"
 TECH_UNLOCK_COMBAT_COMPUTERS_1_DESC: "§HPodstawowe zadania bojowe§!\nNiedawny rozwój teorii behawioralnej SI pozwala nam przekazywać określone zadania bojowe naszym komputerom pokładowym."
 TECH_UNLOCK_COMBAT_COMPUTERS_2_TITLE: "§HOdblokowuje komponent:§! Zaawansowane zadania bojowe"
 TECH_UNLOCK_COMBAT_COMPUTERS_2_DESC: "§HZaawansowane zadania bojowe§!\nDalszy rozwój adaptacyjnych algorytmów bojowych pozwala naszym pokładowym SI wypełniać ich zadania o wiele skuteczniej."
 TECH_UNLOCK_COMBAT_COMPUTERS_3_TITLE: "§HOdblokowuje komponent:§! Rozumna SI bojowa"
 TECH_UNLOCK_COMBAT_COMPUTERS_3_DESC: "§HRozumna SI bojowa§!\nWykorzystanie instynktu przetrwania albo lęku przed śmiercią u naszych rozumnych SI może znacznie zwiększyć ich skuteczność bojową."
 TECH_UNLOCK_COMBAT_COMPUTERS_AUTONOMOUS_TITLE: "§HOdblokowuje komponent:§! Inteligencja autonomicznych statków"
 TECH_UNLOCK_COMBAT_COMPUTERS_AUTONOMOUS_DESC: "§HInteligencja autonomicznych statków§!\nWyposażenie naszych statków w częściowo autonomiczną inteligencję znacznie przyspieszy ich czas reakcji w walce."
