 civic_tooltip_fanatic_purifiers_effects: "Nie może nawiązywać §Ystosunków dyplomatycznych§! z innymi gatunkami!\nNie ma dostępu do §Yrynku galaktycznego§!.\nPosiada casus belli §YOczyszczenie§! wobec innych gatunków.\n§YPopulacje obcych§! będą zawsze poddawane czystkom.\nZyskuje £unity£ §Yjedność§! za czystki £pop£ §Hpopulacji obcych§!.\nMoże używać postawy bombardowania §Y$bombardment_armageddon$§!\n."
