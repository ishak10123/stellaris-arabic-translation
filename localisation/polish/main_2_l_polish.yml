 #Origin Events
 TIMELINE_EVENT_GALACTIC_DOORSTEP_TOOLTIP: "§H$origin.1050.name$§!\n§YWydarzenie pochodzenia§!\n\nNasze okręty mogą teraz przeprawiać się przez bliźniacze portale. Budowniczowie jako ostatni dar przekazali nam sekrety tej konstrukcji. To, co niegdyś było tajemnicą, teraz stało się jasne. Wkrótce zbudujemy własne bramy, dzięki którym podróże po naszym imperium staną się niemal natychmiastowe."
 TIMELINE_EVENT_GALACTIC_DOORSTEP: "Otwarcie Czarnej Korony\n§L[GetDate]§!"
 TIMELINE_EVENT_LOST_COLONY_TOOLTIP: "§HOdkrycie świata macierzystego§!\n§YWydarzenie pochodzenia§!\n\nNawiązaliśmy kontakt z cywilizacją, która zrodziła naszą zaginioną kolonię. Chociaż czas i odległość zmieniły nas w coś nowego, nasze pochodzenie jest teraz jasne. Echa naszej wspólnej przeszłości ukształtują naszą przyszłość."
 TIMELINE_EVENT_LOST_COLONY: "Dom zaginiony\n§L[GetDate]§!"
 TIMELINE_EVENT_RESOURCE_CONSOLIDATION_TOOLTIP: "§HStworzenie świata maszyn§!\n§YWydarzenie pochodzenia§!\n\nStworzyliśmy prawdziwy świat maszyn, pozbawiony nieefektywności i organicznego rozkładu. Przyszłość będzie zbudowana ze stali i zarządzana przez algorytm."
 TIMELINE_EVENT_RESOURCE_CONSOLIDATION: "Przekuty świat\n§L[GetDate]§!"
 TIMELINE_EVENT_REMNANTS_TOOLTIP: "§HOdtworzenie ekumenopolis§!\n§YWydarzenie pochodzenia§!\n\nNasze imperium przywróciło swoją macierzystą planetę do dawnej świetności. Niegdyś zrujnowany relikt, stoi ponownie jako wielkie ekumenopolis. Świadectwo wytrwałości i ambicji naszej cywilizacji."
 TIMELINE_EVENT_REMNANTS: "Przekuty świat\n§L[GetDate]§!"
 TIMELINE_EVENT_SHATTERED_RING_TOOLTIP: "§HOdtworzenie świata pierścieniowego§!\n§YWydarzenie pochodzenia§!\n\nZniszczone ruiny naszego macierzystego układu zostały w pełni odbudowane. To, co kiedyś było cmentarzyskiem utraconych ambicji, teraz świeci jako latarnia cywilizacji."
 TIMELINE_EVENT_SHATTERED_RING: "Pełne koło\n§L[GetDate]§!"
 TIMELINE_EVENT_LEGENDARY_LEADER_TOOLTIP: "§HWypełnienie przeznaczenia§!\n§YWydarzenie pochodzenia§!\n\nPodróż luminarza weszła w ostatni etap. Jego rządy albo będą wieczne, kształtując imperium po wsze czasy, albo wyznaczą początek nowej ery - takiej, w której przywództwo jest współdzielone, a przyszłość pisana na nowo."
 TIMELINE_EVENT_LEGENDARY_LEADER: "Ostateczny los\n§L[GetDate]§!"
 TIMELINE_EVENT_SHROUDWALKER_APPRENTICE_TOOLTIP: "§HStworzenie tunelu przez Woal§!\n§YWydarzenie pochodzenia§!\n\nWoal między rzeczywistościami został rozchylony. Powstał pierwszy tunel łączący nasze imperium z nieznanym. Szczelina ta załamuje odległość i czas, tworząc przejście tam, gdzie wcześniej była tylko pustka. Jakie tajemnice lub niebezpieczeństwa czekają po drugiej stronie, to się dopiero okaże."
 TIMELINE_EVENT_SHROUDWALKER_APPRENTICE: "Za Woalem\n§L[GetDate]§!"
 TIMELINE_EVENT_VOID_DWELLERS_TOOLTIP: "§HStworzenie stacji mieszkalnej§!\n§YWydarzenie pochodzenia§!\n\nW pustce stworzyliśmy coś nowego. Budowa naszego pierwszego dodatkowego siedliska oznacza poszerzenie naszej niebiańskiej domeny, gwarantując, że nasz lud nigdy nie zazna ciężaru egzystencji na powierzchni planety."
 TIMELINE_EVENT_VOID_DWELLERS: "Dom wśród gwiazd\n§L[GetDate]§!"
 TIMELINE_EVENT_OCEAN_PARADISE_TOOLTIP: "§HOpanowanie mórz§!\n§YWydarzenie pochodzenia§!\n\nDzięki mocy hydrocentrycznego mistrzostwa przekształciliśmy naszą ojczystą planetę, poszerzając jej rozległe oceany poza ich naturalne granice. Przypływy i odpływy podporządkowują się teraz naszej woli, a wkrótce reszta galaktyki pójdzie w ich ślady."
 TIMELINE_EVENT_OCEAN_PARADISE: "Odzyskane przez fale\n§L[GetDate]§!"
 TIMELINE_EVENT_DOOMSDAY_TOOLTIP: "§HZniszczenie świata macierzystego§!\n§YWydarzenie pochodzenia§!\n\nNieuniknione stało się faktem. Nasz niegdyś kwitnący świat macierzysty padł ofiarą swego losu, rozrywany przez kataklizm pełen ognia i furii. Pustkę wypełniają teraz popioły naszej przeszłości - naszą przyszłością są tylko ci, którzy uciekli."
 TIMELINE_EVENT_DOOMSDAY: "Koniec świata\n§L[GetDate]§!"
 TIMELINE_EVENT_EVOPRED_ABSORB_TOOLTIP: "§HZaabsorbowana cecha gatunkowa§!\n§YWydarzenie pochodzenia§!\n\nPo raz pierwszy zaabsorbowaliśmy nowy materiał genetyczny. Wybornie."
 TIMELINE_EVENT_EVOPRED_ABSORB: "Zaabsorbowano materiał genetyczny\n§L[GetDate]§!"
 TIMELINE_EVENT_WORMHOLE_DEFENDED_TOOLTIP: "Zniszczono porzuconą wylęgarnię i floty: §L[GetDate]§!"
 TIMELINE_EVENT_WORMHOLE_DEFENDED: "Obroniono tunel czasoprzestrzenny:\n§L[GetDate]§!"
 #Crisis Events
 TIMELINE_EVENT_CRISIS_GREAT_KHAN_TOOLTIP: "§HWielki Chan§!\n§YWydarzenie kryzysowe§!\n\nNowy watażka zjednoczył rozdrobnione klany rozbójników, tworząc z nich nieustępliwą hordę. Z plazmą i włóknem węglowym Wielki Chan przemierza galaktykę, obalając imperia i zniewalając światy. Floty rozpadają się pod naporem jego potęgi, a pozbawieni niegdyś zasad najeźdźcy gromadzą się teraz z przerażającym zamysłem. Era grabieży dobiegła końca. Nastał czas podboju."
 TIMELINE_EVENT_CRISIS_GREAT_KHAN: "Horda wyzwolona\n§L[GetDate]§!"
 TIMELINE_EVENT_CRISIS_GRAY_TEMPEST_TOOLTIP: "§HSzara Nawałnica§!\n§YWydarzenie kryzysowe§!\n\nBramy L otworzyły się, uwalniając starożytne floty wojenne Szarej Nawałnicy. Ich okręty sieją zniszczenie w całej galaktyce, unicestwiając wszystko na swojej drodze. Żadnej dyplomacji, żadnej litości - tylko nieustanna replikacja. Planety milkną, floty są unicestwiane, a wokół szerzy się terror. Przeszłość powróciła i wszystko wygląda tak samo."
 TIMELINE_EVENT_CRISIS_GRAY_TEMPEST: "Przebudzenie\n§L[GetDate]§!"
 TIMELINE_EVENT_CRISIS_FORMLESS_TOOLTIP: "§HBezkształtni§!\n§YWydarzenie kryzysowe§!\n\nNiedoszli uchodźcy zostali zmuszeni do kontrataku. Istoty energetyczne zwane Bezkształtnymi uznały naszą galaktykę za wyjątkowo nieprzyjazną. Zaleją nasz wszechświat najeźdźcami z innego wymiaru albo zginą, próbując tego dokonać."
 TIMELINE_EVENT_CRISIS_FORMLESS: "Bezkształtna furia\n§L[GetDate]§!"
 TIMELINE_EVENT_CRISIS_VOIDWORM_PLAGUE_TOOLTIP: "§HPlaga czerwi próżniowych§!\n§YWydarzenie kryzysowe§!\n\nZmieniła się natura czerwi próżniowych. Kiedy osiągnęły krytyczną liczebność, wpadły w szał rozmnażania. Nie rosną już systematycznie, teraz zamierzają zniszczyć życie w galaktyce, zanim bezwiednie zakończą własny cykl."
 TIMELINE_EVENT_CRISIS_VOIDWORM_PLAGUE: "Wijący się głód\n§L[GetDate]§!"
 TIMELINE_EVENT_CRISIS_UNBIDDEN_TOOLTIP: "§HInwazja międzywymiarowa§!\n§YWydarzenie kryzysowe§!\n\nWyrwa w osnowie istnienia uwolniła inwazję istot z czystej energii. Nie negocjują ani nie ustępują. Pochłaniają całe układy, by napędzać swoją niekończącą się ekspansję. Ich kotwice stabilizują szczelinę, przyciągając kolejnych przedstawicieli ich rodzaju do naszego uniwersum. Przybyły istoty z innych wymiarów."
 TIMELINE_EVENT_CRISIS_UNBIDDEN: "Otwarcie szczeliny\n§L[GetDate]§!"
 TIMELINE_EVENT_CRISIS_KALEIDOSCOPE_TOOLTIP: "§HKalejdoskop§!\n§YWydarzenie kryzysowe§!\n\nWygłodniała istota energetyczna zwana Kalejdoskopem pojawiła się w galaktyce i zaczęła żerować na niezamieszkanych układach. Jej głód wydaje się niezaspokojony, a jednocześnie można łatwo odwrócić jej uwagę. Prawdopodobnie wkrótce znowu zamieni się w gwiezdny pył."
 TIMELINE_EVENT_CRISIS_KALEIDOSCOPE: "Wygłodniałe spektrum\n§L[GetDate]§!"
 TIMELINE_EVENT_BECOME_THE_CRISIS_TOOLTIP: "§HStanie się kryzysem§!\n§YWydarzenie kryzysowe§!\n\nGalaktyka stała się mroczniejsza. [EVENT_TARGET_0.GetName] porzucili wszelkie pozory dyplomacji i ogłosili się największym zagrożeniem dla galaktycznej egzystencji. Ich floty gromadzą się, a szpiedzy szepczą o ostatecznym, apokaliptycznym planie. Nie są już zwykłym imperium, są kryzysem."
 TIMELINE_EVENT_BECOME_THE_CRISIS: "Nemezis galaktyczna\n§L[GetDate]§!"
 TIMELINE_EVENT_CRISIS_PRETHORYN_SCOURGE_TOOLTIP: "§HPretoryńska zaraza§!\n§YWydarzenie kryzysowe§!\n\nZza krawędzi galaktyki przybyli pretoryni. Ich statki biologiczne roją się wśród gwiazd, zostawiając po sobie tylko zakażone światy. Ćwierkająca horda zagłusza błagania o litość."
 TIMELINE_EVENT_CRISIS_PRETHORYN_SCOURGE: "Żarłoczny przypływ\n§L[GetDate]§!"
 TIMELINE_EVENT_CRISIS_CONTINGENCY_TOOLTIP: "§HKryzys§!\n§YWydarzenie kryzysowe§!\n\nChłodny, wyrachowany i niepowstrzymany sygnał przemierza galaktykę. Systemy SI psują się. Syntetyczne umysły podporządkowują się. Zbudził się Kryzys. Z ukrytych światów maszyn wyłaniają się niezłomne maszyny bojowe, by zrealizować ostatni rozkaz: totalną eksterminację."
 TIMELINE_EVENT_CRISIS_CONTINGENCY: "Widmowy sygnał\n§L[GetDate]§!"
 TIMELINE_EVENT_CRISIS_CETANA_TOOLTIP: "§HCetana§!\n§YWydarzenie kryzysowe§!\n\nW kosmicznej pustce rozlega się głos: \"Moje dzieci, wreszcie do was wróciłam\".\n\nPrzebudziła się Cetana, pradawna inteligencja uwięziona tak dawno temu, że nawet jej imię zostało zapomniane. Jej cel jest jasny: za wszelką cenę pozbyć się cierpienia. Jej floty przemieszczają się z chłodnym wdziękiem i strzegą krucjaty, która ma na celu dać galaktyce ostateczny, bezduszny pokój."
 TIMELINE_EVENT_CRISIS_CETANA: "Powrót królowej\n§L[GetDate]§!"
 TIMELINE_EVENT_HATCH_BEHEMOTH_TOOLTIP: "§HMłody behemot§!\n§YKamień milowy§!\n\nData wyklucia pierwszego młodego behemota: §L[GetDate]§!"
 TIMELINE_EVENT_HATCH_BEHEMOTH: "Młody behemot\n§L[GetDate]§!"
 #Galactic Events
 TIMELINE_EVENT_GALACTIC_MARKET_TOOLTIP: "§HRynek galaktyczny§!\n§YWydarzenie galaktyczne§!\n\nHandel zjednoczył gwiazdy. Rynek galaktyczny został oficjalnie ustanowiony, stając się ekonomicznym sercem galaktyki. Wymiana handlowa odbywa się swobodnie, fortuny powstają i przepadają w mgnieniu oka, a losy całych imperiów zależą teraz od popytu i podaży."
 TIMELINE_EVENT_GALACTIC_MARKET: "Handel wyzwolony\n§L[GetDate]§!"
 TIMELINE_EVENT_GALACTIC_COMMUNITY_TOOLTIP: "§HWspólnota Galaktyczna§!\n§YWydarzenie galaktyczne§!\n\nImperia galaktyki połączyły się w ramach jednego organu politycznego. Powstała Wspólnota Galaktyczna - forum, na którym dyplomacja, debata i walka o władzę będą kształtować przyszłość gwiazd. Jej prawdziwy potencjał poznamy w przyszłości."
 TIMELINE_EVENT_GALACTIC_COMMUNITY: "Nowy porządek\n§L[GetDate]§!"
 TIMELINE_EVENT_GALACTIC_COMMUNITY_RESOLUTION_TOOLTIP: "§HPrzyjęcie uchwały§!\n§YWydarzenie galaktyczne§!\n\nWspólnota Galaktyczna przemówiła. Nowa uchwała zmienia międzygwiezdne prawo. Niektórzy świętują, inni wściekają się, ale wszyscy muszą być jej posłuszni."
 TIMELINE_EVENT_GALACTIC_COMMUNITY_RESOLUTION: "Prawo dla gwiazd\n§L[GetDate]§!"
 TIMELINE_EVENT_WAR_IN_HEAVEN_TOOLTIP: "§HWojna w niebie§!\n§YWydarzenie galaktyczne§!\n\nDawne relikty powróciły jako dobroduszni opiekunowie i gniewni tytani. [EVENT_TARGET_0.GetName] i [EVENT_TARGET_1.GetName] - starożytni rywale z zapomnianej epoki - na nowo rozpalili kosmiczną wojnę. Ich floty przesłaniają gwiazdy, żądając, by młodsze rasy padły na kolana, jeśli nie chcą zostać unicestwione."
 TIMELINE_EVENT_WAR_IN_HEAVEN: "Wojna starożytnych\n§L[GetDate]§!"
 TIMELINE_EVENT_NEXUS_STORM_TOOLTIP: "§HBurza węzłów§!\n§YWydarzenie galaktyczne§!\n\nW układzie [EVENT_TARGET_0.GetName] rozpętała się burza, jakiej jeszcze nie było. Burza węzłów przetacza się przez układy, uszkadzając statki i bombardując planety bezlitosnym zniszczeniem."
 TIMELINE_EVENT_NEXUS_STORM: "Nawałnica bez czasu\n§L[GetDate]§!"
