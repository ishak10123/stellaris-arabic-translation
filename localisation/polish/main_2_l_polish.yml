 building_clone_vats: "Zbiorniki klonujące"
 building_clone_vats_desc: "Zbiorniki klonujące rozkładają proste materiały, by wytwarzać z nich przyrost populacji."
 tooltip_organic_and_artificial_assembly_warning: "§RUwaga: montaż populacji organicznych i montaż populacji mechanicznych wykluczają się wzajemnie i nie sumują.§!"
 planet_buildings_clone_vats: "$building_clone_vats$"
