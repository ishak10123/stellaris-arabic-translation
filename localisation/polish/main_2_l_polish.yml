 MACRO_BUILDER_QUEUE: "Kolejka budowy armii"
 DEPLOY_IN_ORBIT: "Umieść na orbicie"
 DEPLOY_IN_ORBIT_DESC: "Określa, czy nowo powstałe §Yarmie§! powinny pojawiać się na §Yorbicie§!, czy na §Yplanecie§!.\n\n§YArmie§! budowane dzięki §Ybudowniczemu armii baz gwiezdnych§! będą pojawiały się na §Yorbicie§!."
