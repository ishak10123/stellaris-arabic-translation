 tech_fe_administration_2: "Kwantowe procesy administracyjne"
 tech_fe_administration_2_desc: "Nasza technologia przekracza już wszelkie możliwe wymogi administracyjne. Wiedza niezbędna do bezproblemowego zarządzania imperium galaktycznym jest na wyciągnięcie ręki."
