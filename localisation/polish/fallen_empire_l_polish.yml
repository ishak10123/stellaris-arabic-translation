 ### FE Civics
 civic_antediluvian_mind: "Starszy umysł"
 civic_antediluvian_mind_desc: "Czas nie był łaskawy dla tego zbiorowego umysłu. Przedłużony pobyt w chronobańce stępił jego niezłomną dotąd wolę przetrwania."
 civic_sluggish_drones: "Niezarządzane drony"
 civic_sluggish_drones_desc: "Rozluźniony umysł naczelny nie wywiera dużej presji, przez co drony imperium wydają się niemalże apatyczne, kiedy powoli wypełniają swoje obowiązki."
 ### FE Buildings
 building_fe: "Budynek upadłego imperium"
 building_ancient_control_center: "Starożytna centralna sterownia"
 building_ancient_control_center_desc: "Dzięki niestrudzonym wysiłkom legionu mechanicznych dronów starożytna centralna sterownia świata pierścieniowego jakimś cudem jeszcze działa."
 building_ancient_palace: "Pradawny pałac"
 building_ancient_palace_desc: "Ten rozległy kompleks pałacowy stanowi wspomnienie dawno minionej ery. Choć dostojna fasada nie daje się nadgryźć zębowi czasu, wiele ze skrzydeł budynku stoi porzuconych i w mniejszym lub większym stopniu zniszczonych."
 building_ancient_hive_capital: "Szacowne jądro"
 building_ancient_hive_capital_desc: "To pradawne centrum władzy roju jest miejscem, w którym niezliczone pokolenia dronów bez szemrania wykonywały wydane im polecenia."
 building_affluence_emporium: "Skład bogactwa"
 building_affluence_emporium_desc: "Centrum przewidujące i spełniające materialne pragnienia poprzez wykorzystanie zaawansowanego algorytmu pozyskiwania. Zapewnia ludności satysfakcję, zanim ta zda sobie nawet sprawę, czego chce."
 building_affluence_center: "Centrum bogactwa"
 building_affluence_center_desc: "Centrum bezproblemowo materializujące w moment najbardziej wydumane pragnienia."
 building_nourishment_complex: "Kompleks żywieniowy"
 building_nourishment_complex_desc: "Technologa replikacji na żądanie generuje nowe smaki."
 building_nourishment_center: "Centrum żywieniowe"
 building_nourishment_center_desc: "W tych murach stworzyć można każdy możliwy do wyobrażenia sobie smak."
 building_dimensional_replicator: "Replikator międzywymiarowy"
 building_dimensional_replicator_desc: "Technologia tego wytwórcy zapewnia bezstratną konwersję energii w materię."
 building_dimensional_fabricator: "Fabrykator międzywymiarowy"
 building_dimensional_fabricator_desc: "Ten zaawansowany wytwórca pozyskuje cenne zasoby poprzez tunele w tkance przestrzeni wymiarowej."
 building_class_3_singularity: "Osobliwość klasy III"
 building_class_3_singularity_desc: "Pozyskiwanie całej generowanej przez tę osobliwość energii stanowi cud techniki."
 building_class_4_singularity: "Osobliwość klasy IV"
 building_class_4_singularity_desc: "Generowana przez tę osobliwość moc łamie prawa fizyki, lecz pola przechwytujące działają z niewzruszoną stabilnością."
 building_micro_forge: "Hiperkuźnia"
 building_micro_forge_desc: "Tempo pracy tej kuźni ogranicza jedynie ilość umieszczanych w niej zasobów."
 building_nano_forge: "Nanohuta"
 building_nano_forge_desc: "Potężne komory nanoreplikatorów tej kuźni z wielką wydajnością przetwarzają surowce na zaawansowane stopy."
 building_fe_sky_dome: "Niebieska kopuła"
 building_fe_sky_dome_desc: "To latające, napędzane supernowoczesną technologią antygrawitacji miasto zapewnia swoim mieszkańcom idylliczne schronienie."
 building_fe_dome: "Empirejska kopuła"
 building_fe_dome_desc: "Te kopuły, zawieszone w powietrzu dzięki technice zerowania grawimetrycznego, wykraczają poza fizyczne ograniczenia, zaś zaawansowane systemy podtrzymywania życia stale zaspokajają wszelkie potrzeby mieszkańców."
 building_fe_fortress: "Aspisowy bastion"
 building_fe_fortress_desc: "Ten potężny kompleks obrony planetarnej posiada liczne zbrojownie i warstwy ochronne. Tylko wysoce wyspecjalizowana siła oblężnicza zdoła wedrzeć się do środka."
 building_fe_stronghold: "Kompleks \"Egida\""
 building_fe_stronghold_desc: "Ten potężny kompleks obrony planetarnej posiada liczne zbrojownie i warstwy ochronne. Łatwiej skruszyć góry na planecie niż mury tej bazy."
 building_master_archive: "Archiwum główne"
 building_master_archive_desc: "W tym repozytorium znajduje się wiedza z wielu galaktycznych epok, utraciliśmy jednak zdolność obsługi jego tajemniczego systemu bibliotecznego. Pozyskane szczątkowe dane okazują się zawsze bezcenne."
 building_empyrean_shrine: "Międzywymiarowa empirejska kapliczka"
 building_empyrean_shrine_desc: "Ta świątynia, używana wyłącznie do łączności z duchami Woalu, widoczna jest w naszym wymiarze jedynie częściowo."
 building_ancient_cryo_chamber: "Pradawna kriokomora"
 building_ancient_cryo_chamber_desc: "Całą tę konstrukcję wypełniają niezliczone rzędy kriozasobników zawierających zamrożone pradawne szczątki miliardów dawno zmarłych istot rozumnych."
 building_fe_administration_1: "Wszechwidząca administracja"
 building_fe_administration_1_desc: "Ten stanowiący nieodłączny element galaktycznego systemu biurokratycznego kompleks połączony jest z rozległą siecią administracyjną."
 building_fe_administration_2: "Wszechwiedząca administracja"
 building_fe_administration_2_desc: "Ten rozległ kompleks, centralny element obejmującego całą galaktykę systemu biurokratycznego, pozwala zarządzać potężną i zaawansowaną siecią administracyjną."
 building_fe_administration_hive_1: "Klaster efaptyczny"
 building_fe_administration_hive_1_desc: "Ta sieć węzłów efaptycznych, ostrożnie zarządzana przez wysoce wyspecjalizowane drony, umacnia władzę roju nad jego rozległą domeną poznawczą."
 building_fe_administration_hive_2: "Akson efaptyczny"
 building_fe_administration_hive_2_desc: "Ta rozległa sieć węzłów efaptycznych, ostrożnie zarządzana przez wysoce wyspecjalizowane drony, umacnia władzę roju nad galaktyką."
 building_fe_administration_machine_1: "Fraktalny punkt koordynacyjny"
 building_fe_administration_machine_1_desc: "Zaawansowana sieć fraktalna. Bezbłędnie przetwarza i przesyła biliony sygnałów z wielką szybkością i precyzją."
 building_fe_administration_machine_2: "Kwantowy punkt koordynacyjny"
 building_fe_administration_machine_2_desc: "Zaawansowane centrum splątania kwantowego. Przetwarza i przesyła tryliony sygnałów z wielką szybkością i precyzją."
 building_fe_temple_1: "Niebiańskie sanktuarium"
 building_fe_temple_1_desc: "Najnowocześniejsze zdobycze technologii metafizycznej zapewniają wiernym bezpośrednią łączność z boską esencją."
 building_fe_temple_2: "Niebiańska katedra"
 building_fe_temple_2_desc: "Wykorzystanie technologii metafizycznej w psionicznych kazaniach wzmacnia rezonans duchowy. Ten rozległy kompleks pozwala wiernym łączyć się w intymny sposób z boską esencją na skalę całych układów."
 building_fe_assembly_1: "Sieć produkcji robotów"
 building_fe_assembly_1_desc: "Awangardowy kompleks konstrukcyjny, w którym pracują eksperci od robotyki. Obiekt ten wykracza poza tradycyjne ramy, aby móc stać na czele innowacji w swojej dziedzinie."
 building_fe_assembly_2: "Kwantowe centrum produkcji robotów"
 building_fe_assembly_2_desc: "Kwantowa linia produkcyjna w tym obiekcie, prawdziwy cud techniki, wykorzystuje konwertery splątania, aby wytwarzać części maszynowe z doskonałą dokładnością. Ani jeden atom nie znajduje się w niewłaściwym miejscu."
 building_fe_clinic_1: "Instytut rewitalizacji molekularnej"
 building_fe_clinic_1_desc: "Instytuty rewitalizacji molekularnej badają szczegółowo pracę komórek w celu zwiększenia skuteczności leczenia. Znacząco poprawia to jakość i długość życia populacji."
 building_fe_clinic_2: "Instytut bioregeneracji"
 building_fe_clinic_2_desc: "Instytut bioregeneracji, szczyt medycznej technologii, opracowuje przełomowe terapie bioregeneracyjne, stale przesuwając granice możliwej długości życia."
 building_fe_security_1: "Kompleks sprawiedliwości"
 building_fe_security_1_desc: "Ten potężny gmach stanowi siedzibę sądów oraz służb porządkowych."
 building_fe_security_2: "Ziggurat sprawiedliwości"
 building_fe_security_2_desc: "Ten kolosalny budynek, szczytowa forma instytucji prawnych, stanowi pomnik na ku czci sprawiedliwości. Znajdują się w nim sądy, areszty oraz więzienia, które zrehabilitują nawet najbardziej zatwardziałych przestępców."
 building_fe_market_1: "Galaktyczne centrum handlu"
 building_fe_market_1_desc: "Te potężne wieże dominują krajobraz i rzucają cień na gwarne dzielnice handlowe leżące u ich stóp."
 building_fe_market_2: "Międzygwiezdne jądro handlu"
 building_fe_market_2_desc: "Te kolosalne wieże, centrum galaktycznej gospodarki, górują nad dzielnicą handlową tak bardzo, że widać je z orbity."
 building_fe_silo_1: "Skład małoprzestrzenny"
 building_fe_silo_1_desc: "W magazynie tym wykorzystywany jest fragment podprzestrzeni, w którym odległość między molekułami jest zmniejszona - w efekcie wszystko, co jest tam przechowywane, ulega zmniejszeniu. Żywym istotom nie wolno do niego wchodzić."
 building_fe_silo_2: "Skład pozawymiarowy"
 building_fe_silo_2_desc: "Tworząc lokalny wymiar kieszonkowy, kształtujemy miejsce składowania dla niemal nieograniczonej ilości zasobów."
 building_fe_entertainment_1: "Plac wirtualnej błogości"
 building_fe_entertainment_1_desc: "Te rozległe sektory rozrywkowe stanowią ośrodek zabawy i odpoczynku. Czytniki fal mózgowych pozwalają na natychmiastowe tworzenie spersonalizowanych, wirtualnych miejsc relaksu."
 building_fe_entertainment_2: "Sieć wszechbłogości"
 building_fe_entertainment_2_desc: "Szczytowe osiągnięcie w dziedzinie rozrywki. Sieć ta wykracza poza znane nam limity. Sny urzeczywistniają się tu szybciej, niż zdajemy sobie z nich sprawę."
 building_fe_lab_1: "Sieć innowacji kwantowej"
 building_fe_lab_1_desc: "Obiekt ten może pochwalić się supernowoczesnym wyposażeniem i bezprecedensową liczbą pracowników. Staje się pomnikiem ery, w której teorie kwantowe są nie tylko badane, ale też ujarzmiane dla dobra przełomowych innowacji."
 building_fe_lab_2: "Dział innowacji transcendentalnej"
 building_fe_lab_2_desc: "Budynek ten stanowi najdoskonalsze możliwe centrum badawcze, jak również dowód, że innowacja nie zna ograniczeń."
 building_fe_mine_1: "Kwantowa placówka odwiertowa"
 building_fe_mine_1_desc: "Ta kopalnia jest w stanie znajdować minerały w dowolnym punkcie płaszcza planety. Wykorzystuje technologię tunelowania kwantowego do przebijania się przez ciała stałe, nie wchodząc z nimi w kontakt."
 building_fe_mine_2: "Kwantowe centrum odwiertowe"
 building_fe_mine_2_desc: "To centrum jest w stanie pozyskiwać minerały w dowolnym punkcie aż do zewnętrznego rdzenia planety. Wykorzystuje technologię tunelowania kwantowego do przebijania się przez ciała stałe i płynne, nie wchodząc z nimi w kontakt."
 ### FE Jobs
 job_fe_overseer: "Nadzorca"
 job_fe_overseer_plural: "Nadzorcy"
 job_fe_overseer_desc: "Garstka mocarzy odrzuciła życie w luksusie na rzecz służby publicznej. Ich celem jest nadzorowanie pozostałości po pradawnej cywilizacji."
 mod_job_fe_overseer_add: "Miejsca pracy: $job_fe_overseer$"
 job_fe_maintenance_bot: "Opiekun"
 job_fe_maintenance_bot_plural: "Opiekunowie"
 job_fe_maintenance_bot_desc: "Te starożytne maszyny niestrudzenie konserwują i naprawiają rozlatującą się maszynerię świata pierścieniowego, który zamieszkują."
 mod_job_fe_maintenance_bot_add: "Miejsca pracy: $job_fe_maintenance_bot$"
 mod_job_fe_maintenance_bot_per_pop: "§G+1§! miejsce pracy ($job_fe_maintenance_bot$) na $VALUE$ populacji."
 mod_job_fe_maintenance_bot_per_pop_short: "\n§G+1§! £mod_job_maintenance_drone_add£ na $VALUE$ £pop£"
 job_fe_guardian_bot: "Strażnik"
 job_fe_guardian_bot_plural: "Strażnicy"
 job_fe_guardian_bot_desc: "Te starożytne maszyny trzymają nieustanną straż nad zamrożonymi szczątkami zmarłych istot rozumnych."
 mod_job_fe_guardian_bot_add: "Miejsca pracy: $job_fe_guardian_bot$"
 fe_hedonist: "$job_fe_hedonist$"
 job_fe_hedonist: "Hedonista"
 job_fe_hedonist_plural: "Hedoniści"
 job_fe_hedonist_desc: "Życie w absolutnej obfitości - żadna materialna potrzeba ani żądza nie pozostaje niezaspokojona."
 mod_job_fe_hedonist_add: "Miejsca pracy: $job_fe_hedonist$"
 job_fe_archivist: "Archiwista"
 job_fe_archivist_plural: "Archiwiści"
 job_fe_archivist_effect_desc: "£job_archivist£ $job_fe_archivist_plural$ zmieniają $r_consumer_goods$ w: $r_research$"
 job_fe_archivist_desc: "Każdy fragment danych należy wciągnąć do akt, skatalogować i włączyć do indeksu dokładnie według pradawnych rytuałów ustanowionych przed eonami przez Pierwszego Bibliotekarza."
 mod_job_fe_archivist_add: "Miejsca pracy: $job_fe_archivist$"
 job_fe_acolyte_farm: "Akolita lemiesza"
 job_fe_acolyte_farm_plural: "Akolici lemiesza"
 job_fe_acolyte_farm_plural_with_icon: "£job_fe_acolyte_farm£ $job_fe_acolyte_farm_plural$"
 job_fe_acolyte_farm_desc: "Albowiem czyż to nie pług - owo najszlachetniejsze z narzędzi - stał się bronią, za pomocą której Kazargiel odciął jadowity ogon po trzykroć przeklętego demona i odegnał głód?"
 job_fe_acolyte_farm_effect_desc: "£job_fe_acolyte_farm£ $job_fe_acolyte_farm_plural$ wytwarzają £food£ §Y$food$§!."
 mod_job_fe_acolyte_farm_add: "Miejsca pracy: $job_fe_acolyte_farm$"
 job_fe_acolyte_mine: "Akolita młota"
 job_fe_acolyte_mine_plural: "Akolici młota"
 job_fe_acolyte_mine_plural_with_icon: "£job_fe_acolyte_mine£ $job_fe_acolyte_mine_plural$"
 job_fe_acolyte_mine_desc: "A wonczas święta Mazakudal jednym potężnym ciosem płonącego młota rozszczepiła czaszkę Pierwszego Upiora na dwoje, otwierając drogę ku kryształom."
 job_fe_acolyte_mine_effect_desc: "£job_fe_acolyte_mine£ $job_fe_acolyte_mine_plural$ wytwarzają £minerals£ §Y$minerals$§!."
 mod_job_fe_acolyte_mine_add: "Miejsca pracy: $job_fe_acolyte_mine$"
 job_fe_acolyte_generator: "Akolita hiperklucza"
 job_fe_acolyte_generator_plural: "Akolici hiperklucza"
 job_fe_acolyte_generator_plural_with_icon: "£job_fe_acolyte_generator£ $job_fe_acolyte_generator_plural$"
 job_fe_acolyte_generator_desc: "Pamiętajcie też o hiperkombinerkach i o tym, jak Bazagg Lśniący użył ich do okiełznania Słońca, gdy wydawało się, że mrok zapanuje nad światem."
 job_fe_acolyte_generator_effect_desc: "£job_fe_acolyte_generator£ $job_fe_acolyte_generator_plural$ wytwarzają £energy£ §Y$energy$§!."
 mod_job_fe_acolyte_generator_add: "Miejsca pracy: $job_fe_acolyte_generator$"
 job_fe_acolyte_artisan: "Akolita warsztatu"
 job_fe_acolyte_artisan_plural: "Akolici warsztatu"
 job_fe_acolyte_artisan_desc: "I tak Aznakha rzekł swym akolitom: \"Idźcie do warsztatów i swoim rzemiosłem twórzcie przyszłość, jakiej pragniecie\"."
 job_fe_acolyte_artisan_effect_desc: "£job_fe_acolyte_artisan£ $job_fe_acolyte_artisan_plural$ wytwarzają £consumer_goods£ §Y$consumer_goods$§!."
 mod_job_fe_acolyte_artisan_add: "Miejsca pracy: $job_fe_acolyte_artisan$"
 job_fe_protector: "Protektor"
 job_fe_protector_plural: "Protektorzy"
 job_fe_protector_desc: "Aby zatem większość mogła odpoczywać spokojnie i cieszyć się ekstrawaganckim życiem, te szorstkie jednostki trwają na straży każdej nocy, gotowe razić przemocą każdego, kto chciałby czynić krzywdę."
 mod_job_fe_protector_add: "Miejsca pracy: $job_fe_protector$"
 job_fe_augur: "Augur Woalu"
 job_fe_augur_plural: "Augurzy Woalu"
