 pft_cyber_creed_war: "$CYBERCREED_war$"
 pft_cyber_creed_war_desc: "Templariusze Stali chronią nasze święte ciała, cybernetykę i dusze. Modyfikacje wspomagają ich ciężkie treningi i zwiększają sprawność bojową.\n\n§LEtos duchowości§!"
