 machine_age.1100.name: "Przyszłość wiary"
 machine_age.1100.desc: "Dzisiaj jesteśmy już całkowicie połączeni, nie tylko ciałami i duszami, ale także wiarą. Dogmatyczne kreda nie mają już władzy. Boska fuzja to osobista podróż wszystkich wiernych.\n\n$machine_age.govswapnotice$\n\n$machine_age.1090.pray$"
 machine_age.1100.a: "Nasze [Owner.Species.GetFleshTypeCyberCreed] przeszły fuzję, która odzwierciedla jedność naszej wiary."
