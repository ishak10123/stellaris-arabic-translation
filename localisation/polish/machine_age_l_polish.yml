 civic_tooltip_pleasure_seekers_effects_machines: "Umożliwia standard życiowy §Y$living_standard_decadent$§!, w którym wszystkie odpowiednie £pop£ §Hpopulacje§! mają zwiększone £happiness£ §Yzadowolenie§! i utrzymanie (£consumer_goods£ §Y$consumer_goods$§!).\nMontaż populacji mechanicznych pochodzący od komików: §G+1%§!\n£job_servant£ §Y$job_servant_plural$§! wytwarzają §Y5§! dodatkowych £amenities£ §Yudogodnień§!."
