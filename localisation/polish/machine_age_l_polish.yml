 MACHINEAGE_TITLE: "The Machine Age" #Do not translate
 #### Cosmogenesis Crisis ####
 ap_cosmogenesis: "Kosmogeneza"
 ap_cosmogenesis_desc: "Czas, grawitacja i przestrzeń to fundamentalne zębatki tworzące mechanizm rzeczywistości. Jeśli nauczymy się nimi manipulować, wszechświat i jego tajemnice będą nasze."
 cosmogenesis_chain_title: "Kosmogeneza"
 cosmogenesis_chain_desc: "Niewiedza jest dla nas jak kajdany, przez nią tajemnice wszechświata pozostają poza naszym zasięgiem.\n\nMusimy się wyzwolić za wszelką cenę.\n\n§RUpadłe imperia próbują nas powstrzymać!§!"
 cosmogenesis_level_reached: "Osiągnięty poziom kryzysu"
 cosmogenesis_aborted_tt: "\n£trigger_no£ §ROdrzuciliśmy swoje kosmogenetyczne ambicje.§!"
 ### Crisis Stage Techs
 tech_cosmogenesis_crisis_1: "Teoria uczenia wykładniczego"
 tech_cosmogenesis_crisis_1_desc: "Radykalna zmiana perspektywy konieczna, by pojąć nieskończone warstwy rzeczywistości to wyzwanie nawet dla najgenialniejszych umysłów."
 cosmogenesis_level_1_tech_title: "Odblokowanie kryzysu §Hkosmogenezy§! §HPoziom 2§!"
 cosmogenesis_level_1_tech_desc: "§H$tech_cosmogenesis_crisis_1$§!\nŻeby odkryć tajemnice działania rzeczywistości, musimy otworzyć nasze umysły na myślenie w większej skali."
 tech_cosmogenesis_crisis_2: "Pędzel grawitacyjny"
 tech_cosmogenesis_crisis_2_desc: "Grawitacja i czasoprzestrzeń nadają kształt wszechświatowi. Począwszy od grawitacji, opanujemy narzędzia, które pomogą nam w rozwoju."
 cosmogenesis_level_2_tech_title: "Odblokowanie kryzysu §Hkosmogenezy§! §HPoziom 3§!"
 cosmogenesis_level_2_tech_desc: "§H$tech_cosmogenesis_crisis_2$§!\nGrawitacja to zaledwie jeden pędzel, którym możemy malować na płótnie rzeczywistości."
 tech_cosmogenesis_crisis_3: "Teoria o hipotetycznej nieskończoności"
 tech_cosmogenesis_crisis_3_desc: "Precyzyjne i niewiarygodnie małe zmiany grawitacji pozwolą nam wprowadzać polecenia do kodu rzeczywistości. Musimy bardzo uważać, ponieważ najważniejsze jest poznanie zastosowań tego nowego, niesamowitego narzędzia."
 cosmogenesis_level_3_tech_title: "Odblokowanie kryzysu §Hkosmogenezy§! §HPoziom 4§!"
 cosmogenesis_level_3_tech_desc: "§H$tech_cosmogenesis_crisis_3$§!\nJedno po drugim, ukłucia siły grawitacji umożliwią nam przebicie się przez czasoprzestrzeń."
 tech_cosmogenesis_crisis_4: "Zasady rzeczywistości"
 tech_cosmogenesis_crisis_4_desc: "Niedawne doświadczenia potwierdziły, że dokonane przez nas zmiany rzeczywistości są tylko tymczasowe. Poważniejsze modyfikacje są niezbędne, by uczynić je stałymi."
 cosmogenesis_level_4_tech_title: "Odblokowanie kryzysu §Hkosmogenezy§! §HPoziom 5§!"
 cosmogenesis_level_4_tech_desc: "§H$tech_cosmogenesis_crisis_4$§!\nRzeczywistość jęknęła. Protestuje i warczy, uparcie zmieniając swój kształt, mimo wprowadzonych przez nas zmian. Nie przewidzieliśmy tego, ale nie możemy pozwolić, aby trwało to dalej."
 tech_cosmogenesis_crisis_5: "Młode wszechświaty"
 tech_cosmogenesis_crisis_5_desc: "Wielkoskalowa podróż do innych wszechświatów to trudne przedsięwzięcie. Musimy skonstruować statek kosmiczny, który nie tylko przebije się przez osnowę czasoprzestrzeni, ale także przetrwa tę podróż.\n\n§RUpadłe imperia próbują nas powstrzymać!§!"
 cosmogenesis_level_5_tech_title: "§HOdblokowuje superkonstrukcję -§! Igła Horyzontu"
 cosmogenesis_level_5_tech_desc: "§HIgła Horyzontu§!\nTen cud technologii to cywilny statek mogący zakrzywiać rzeczywistość. Znajdzie się w nim nasza populacja i zgromadzona przez nas wiedza, które odbędą bezpieczną podróż między wszechświatami."
 requires_capital: "£trigger_no£ Należy budować na orbicie naszej stolicy."
 ### Crisis Tab
 crisobj_research_tech_name: "Badania nad nowymi technologiami"
 crisobj_research_tech_desc: "Z każdym nowym odkryciem, nieważne jak małym, dowiadujemy się, jak działa rzeczywistość.\n\nBadajcie technologie, aby otrzymać tę nagrodę zaawansowanej logiki."
 crisobj_research_thesis_name: "Badania nad stosowanymi teoriami nieskończoności"
 crisobj_research_thesis_desc: "Wielkie eksperymenty nad wpływaniem na zasady rządzące działaniem rzeczywistości dostarczą cennych danych.\n\nBadajcie te rzadkie technologie, aby otrzymać tę nagrodę zaawansowanej logiki."
 crisobj_have_scholarium_vassals_name: "Utrzymuj wasali scholarium"
 crisobj_have_scholarium_vassals_desc: "Poddani koncentrujący się na badaniach pomogą nam w poszukiwaniach wiedzy absolutnej.\n\nUtrzymuj §Ywasali scholarium§!, żeby zdobyć tę §Ydoroczną§! nagrodę zaawansowanej logiki."
 crisobj_neural_chips_name: "Zastosuj czipy neuronowe"
 crisobj_neural_chips_desc: "Skala naszych badań jest tak duża, że ich realizacja wymaga poświęceń.\n\nUżywaj populacji jako §Yczipów neuronowych§! w §Ykrośnie synaptycznym§!, aby zyskać zaawansowaną logikę.\n\nWydajność §Yczipów neuronowych§! zmienia się zależnie od liczby populacji w §Ykrośnie synaptycznym§!, można ją dodatkowo zwiększać dzięki dzielnicom i budynkom."
 crisobj_have_science_nexuses_name: "Kontroluj węzły naukowe"
 crisobj_have_science_nexuses_desc: "Ta nowoczesna placówka badawcza, położona z dala od jakichkolwiek anomalii grawitacyjnych, służy do gromadzenia niezakłóconych danych o czasoprzestrzeni.\n\nKontroluj w pełni zmodyfikowane superkonstrukcje §Ywęzłów naukowych§!, żeby zdobyć tę §Ydoroczną§! nagrodę zaawansowanej logiki."
 crisobj_galcom_science_resolution_name: "Zyskaj poparcie Wspólnoty Galaktycznej"
 crisobj_galcom_science_resolution_desc: "Przekonanie członków Wspólnoty Galaktycznej, że nasze badania mają kluczowe znaczenie, bardzo pomogłoby w realizacji naszych planów.\n\nNiech §YWspólnota Galaktyczna§! przyjmie §Yuchwały§! o wiedzy wyzwolonej, żeby zdobyć tę §Ydoroczną§! nagrodę zaawansowanej logiki."
 crisis_cosmogenesis_level_1: "§UObawa§!"
 crisis_cosmogenesis_level_1_desc: "Poziom 1. kryzysu"
 crisis_cosmogenesis_level_2: "§URyzyko§!"
 crisis_cosmogenesis_level_2_desc: "Poziom 2. kryzysu"
 crisis_cosmogenesis_level_3: "§UNiebezpieczeństwo§!"
 crisis_cosmogenesis_level_3_desc: "Poziom 3. kryzysu"
 crisis_cosmogenesis_level_4: "§UZagrożenie§!"
 crisis_cosmogenesis_level_4_desc: "Poziom 4. kryzysu"
 crisis_cosmogenesis_level_5: "§UZagrożenie egzystencjalne§!"
 crisis_cosmogenesis_level_5_desc: "Poziom 5. kryzysu"
 menp_cosmo_objectives: "Zaawansowana logika"
 unlocks_cosmo_objectives: "Umożliwia gromadzenie: £advanced_logic£ §Y$menp_cosmo_objectives$§! (dzięki realizacji §Hcelów kryzysowych§!).\n\nOdblokowuje technologię §Y$tech_cosmogenesis_crisis_1$§!, która przybliży nas do realizacji naszych celów.\n"
 menp_cosmo_objectives_desc: "Zaawansowana logika to poziom naszego zrozumienia praw rządzących rzeczywistością i nasz potencjał wpływania na nie."
 menp_cosmo_buildings_1: "Idealne arkologie"
 unlocks_buildings_1: "Zwykłe budynki upadłego imperium mogą teraz pojawiać się w opcjach badań.\n"
 menp_cosmo_buildings_1_desc: "Upadłe imperia mogły zapomnieć, jak replikować ich zaawansowane technologie, ale nasze umysły odkryją zapomniane tajemnice ich złotej ery."
 menp_cosmo_techs_1: "Energia niebarionowa"
 unlocks_techs_1: "Odblokowuje technologię części statku: §Y$tech_dark_matter_power_core$§!.\n"
 menp_cosmo_techs_1_desc: "Ujarzmienie energii cząstek antybarionowych to kolejny krok w ewolucji ultrakompaktowego wytwarzania energii."
 menp_cosmo_features_1: "Materia organiczna"
 unlocks_features_1: "Odblokowuje technologię superkonstrukcji §Ykrosna synaptycznego§!.\n"
 menp_cosmo_features_1_desc: "Kolosalne krosno synaptyczne to komputer rezerwuar. Moc obliczeniowa sieci tworzonej przez nasze umysły służy do przeliczania i magazynowania danych. Korzyści są oczywiste, ale niektóre źle poinformowane gatunki uważają transmutację pojedynczych osobników w czipy obliczeniowe za wątpliwą moralnie."
 menp_cosmo_ship_2: "Zagadkowe eskortowce"
 unlocks_ship_2: "Odblokowuje technologię statku §Yeskortowego§! upadłego imperium.\n"
 menp_cosmo_ship_2_desc: "[Get_menp_cosmo_ship_2]"
 menp_cosmo_ship_2_desc_regular: "Niewielki statek optymalizujący naszą wiedzę o czasoprzestrzeni, aby umożliwić transcendencję międzywymiarową, dzięki czemu wnętrze jest większe, niż wydaje się, patrząc na zewnętrzny kształt jednostki. Zaawansowany potencjał siły ognia mniej obciąża logistykę niż w przypadku klasycznych typów statków."
 menp_cosmo_buildings_2: "Zaawansowane górnictwo"
 unlocks_buildings_2: "Zaawansowane budynki upadłego imperium mogą teraz pojawiać się w opcjach badań.\n"
 menp_cosmo_buildings_2_desc: "Możliwości pozyskiwania zasobów przez upadłe imperia zadziwiały nas od dawna. Ale to już przeszłość."
 menp_cosmo_techs_2: "Unowocześnienie antybarionowe"
 unlocks_techs_2: "Odblokowuje technologię części statku: §Y$tech_enigmatic_decoder$§! i §Y$tech_dark_matter_propulsion$§!.\n"
 menp_cosmo_techs_2_desc: "Nasze postępujące rozumienie ciemnej materii oraz jej zastosowań otworzy nowe drogi rozwoju technologicznego."
 menp_cosmo_features_2: "Narzędzia grawitacyjne"
 unlocks_features_2: "Odblokowuje technologię §Y$tech_cosmogenesis_crisis_2$§!, która przybliży nas do realizacji naszych celów.\n"
 menp_cosmo_features_2_desc: "$tech_cosmogenesis_crisis_2_desc$\n"
 menp_cosmo_ship_3: "Tajemnicze krążowniki"
 unlocks_ship_3: "Odblokowuje technologię §Yokrętu liniowego§! upadłego imperium.\n"
 menp_cosmo_ship_3_desc: "[Get_menp_cosmo_ship_3]"
 menp_cosmo_ship_3_desc_regular: "Kolejny zoptymalizowany statek kosmiczny, tym razem większych rozmiarów. Przy nim współczesne pancerniki będą wyglądały jak zabawki."
 menp_cosmo_buildings_3: "Skomplikowana infrastruktura"
 unlocks_buildings_3: "Skomplikowane budynki upadłego imperium mogą teraz pojawiać się w opcjach badań.\n"
 menp_cosmo_buildings_3_desc: "Skoro już zaczęliśmy usuwać aurę tajemnicy otaczającą upadłe imperia, musimy działać dalej. Z czasem poznamy sekrety ich technologii."
 menp_cosmo_techs_3: "Egzotyczne antybariony"
 unlocks_techs_3: "Odblokowuje technologię części statku: §Y$tech_enigmatic_encoder$§! i §Y$tech_dark_matter_deflector$§!.\n"
 menp_cosmo_techs_3_desc: "Zastosowanie ciemnej materii w technologii obronnej i szyfrującej pozwoli nam wytwarzać pola zakłócające oraz odporne kanały łączności."
 menp_cosmo_features_3: "Wieczna ekspansja"
 unlocks_features_3: "Odblokowuje technologię §Y$tech_cosmogenesis_crisis_3$§!, która przybliży nas do realizacji naszych celów.\n"
 menp_cosmo_features_3_desc: "$tech_cosmogenesis_crisis_3_desc$\n"
 menp_cosmo_ship_4: "Niepokonane okręty flagowe"
 unlocks_ship_4: "Odblokowuje technologię statku §Ytytan§! upadłego imperium.\n"
 menp_cosmo_ship_4_desc: "[Get_menp_cosmo_ship_4]"
 menp_cosmo_ship_4_desc_regular: "Te potężne okręty bardziej przypominają ruchome fortece i tylko najbardziej zmasowane ataki mają szanse je uszkodzić."
 menp_cosmo_buildings_4: "Złoty wiek"
 unlocks_buildings_4: "Wyjątkowe budynki upadłego imperium mogą teraz pojawiać się w opcjach badań.\n"
 menp_cosmo_buildings_4_desc: "Wiedza upadłych imperiów o manipulacji wymiarami jest zdumiewająca. Z każdym odkryciem nawet ich najbardziej tajemnicza technologia zaczyna wydawać się prosta."
 menp_cosmo_techs_4: "Pancerz i uzbrojenie"
 unlocks_techs_4: "Odblokowuje technologię części statku: §Y$tech_energy_lance_2$§! i §Y$tech_dragon_armor$§!.\n"
 menp_cosmo_techs_4_desc: "Nasze ostatnie postępy technologiczne pozwolą nam budować bardziej zabójczą broń i mocniejsze pancerze dla naszych okrętów."
 menp_cosmo_features_4: "Łamanie zasad"
 unlocks_features_4: "Odblokowuje technologię §Y$tech_cosmogenesis_crisis_4$§!, która przybliży nas do realizacji naszych celów.\nOdblokowuje też technologię powtarzalną §Y$tech_cosmogenesis_thesis$§!, która może zapewnić znaczne ilości §Yzaawansowanej logiki§!.\n"
 menp_cosmo_features_4_desc: "$tech_cosmogenesis_crisis_4_desc$"
 menp_cosmo_buildings_5: "Pamięć i tworzenie"
 unlocks_buildings_5: "Tajemnicze budynki upadłego imperium mogą teraz pojawiać się w opcjach badań.\n"
 menp_cosmo_buildings_5_desc: "Tajemnice upadłych imperiów, w końcu odkryte, wprowadzą nasze społeczeństwo w nową epokę."
 menp_cosmo_techs_5: "Nanoroje"
 unlocks_techs_5: "Odblokowuje technologię części statku: §Y$tech_nanite_repair_system$§!, §Y$tech_nanite_autocannon$§! i §Y$tech_nanite_flak_batteries$§!.\n"
 menp_cosmo_techs_5_desc: "Po każdej zmianie perspektywy pojawiają się nowe możliwości. Zmiana w najmniejszej skali może mieć dalekosiężne skutki."
 menp_cosmo_features_5: "Próżniowy podróżnik"
 unlocks_features_5: "Odblokowuje technologię §Y$tech_cosmogenesis_crisis_5$§!, która pozwoli nam zbudować §YIgłę Horyzontu§! i zrealizować nasze cele."
 menp_cosmo_features_5_desc: "$tech_cosmogenesis_crisis_5_desc$"
