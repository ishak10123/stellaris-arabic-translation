 pft_cyber_creed_general: "Zjednoczone Kreda"
 pft_cyber_creed_general_desc: "Zjednoczone Kreda, kierowane przez koalicję Świętych Technofantów, dokonały czystki wszystkich ekstremalnych wierzeń. Mimo wszystko ich oddanie sprawie świętej fuzji jest niewzruszone, wolne od dogmatów przeszłości, które miały na celu ograniczenie jej chwały.\n\n§LEtos duchowości§!"
