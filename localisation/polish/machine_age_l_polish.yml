 horizon_needle_mod: "$monadic_qerr$"
 COSMOGENESIS_VICTORY: "Obliczyć wektor skoku"
 COSMOGENESIS_VICTORY_DESC: "Musimy skalibrować napęd skokowy Igły Horyzontu i wyliczyć dokładne współrzędne, które pozwolą nam wlecieć w supermasywną czarną dziurę w jądrze galaktyki."
 exodus_pick_up: "Zaokrętuj populację"
 exodus_dive_in: "Zanurkuj w czarną dziurę"
 COLONIZATION_IMPOSSIBLE_COSMOGENESIS_EXODUS: "Nie możemy zakładać nowych kolonii, kiedy próbujemy opuścić ten wszechświat."
 crisis.7400.name: "Igła Horyzontu jest gotowa"
 crisis.7400.intro: "Zakończyła się budowa Igły Horyzontu. Dzięki ujarzmieniu mocy uważnie utrzymywanej osobliwości statek ten może zmieniać przepływającą wokół niego grawitację i niewątpliwie zdoła przejść przez czarną dziurę, gdy nadejdzie czas."
 crisis.7400.outro: "Musimy być ostrożni, ponieważ Igła Horyzontu nie jest okrętem wojennym i musi być broniona za wszelką cenę. Jej utrata byłaby dla nas straszliwym ciosem."
 crisis.7400.desc: "$crisis.7400.intro$\n\nZanim jednak spróbujemy to zrobić, musimy zaokrętować nasz cały naród. Odwiedzimy każdą z naszych §Hkolonii§!, żeby zabrać stamtąd miejscowe populacje. Potem wrócimy do naszej stolicy i zajmiemy się ostatnimi przygotowaniami do naszego exodusu.\n\n$crisis.7400.outro$"
 crisis.7400.desc.onlycapital: "$crisis.7400.intro$\n\nNiewielkie rozmiary naszego kraju okazały się czymś pozytywnym. Przed ostatnimi przygotowaniami do naszego exodusu musimy zaokrętować tylko mieszkańców stolicy.\n\n$crisis.7400.outro$"
 crisis.7500.name: "Populacja zaokrętowana"
 crisis.7500.desc: "Dzięki temu, że Igła Horyzontu może wywoływać dylatację czasu, mogliśmy dość szybko zaokrętować całą kolonię ze świata [root.GetName]. Rzeczywistość wewnątrz statku została zmodyfikowana tak, aby pomieściła się w nim cała populacja. Ponadto czas płynie tam wolniej, dzięki czemu podróż wyda się znacznie krótsza. Ruszajmy do następnej kolonii!"
 crisis.7500.desc.capital: "Przygotowania do tak wielkiego exodusu to nie lada wyzwanie. Cała nasza administracja pracuje nad ułatwieniem tego procesu i pilnuje, aby nie zapomniano o niczym istotnym.\n\nCo zaskakujące, pewna część naszej populacji postanowiła zostać. Zamierza zadbać o istnienie naszego rodzaju w tym wszechświecie. Dostarczono im technologię i zapasy, dzięki którym przetrwają po naszym odlocie."
 crisis.7500.desc.capital.gestalt: "Migracja na taką skalę to wielkie przedsięwzięcie, ale nie jest poważnym wyzwaniem. [owner.GetIndividualNamePluralCap] ciężko pracują, by załadować Igłę Horyzontu, oraz dbają, aby nic nie zostało zapomniane i wszystko szło zgodnie z harmonogramem. Jednak zależy nam na dalszym istnieniu naszego rodzaju w tym wszechświecie.\n\nNa wypadek, gdyby coś miało pójść źle, część naszej populacji nie odleci. Doświadczenie oderwania od siebie w tak zdecydowany sposób będzie więcej niż nieprzyjemne, ale przetrwanie jest dla nas najważniejsze. Przekazano technologię i zapasy, z których będzie korzystać pozostawiona populacja."
 crisis.7505.name: "Zaokrętowano kolonie"
 crisis.7505.desc: "Udało się zaokrętować populację naszych kolonii. Teraz musimy lecieć do świata [capital_scope.GetName], gdzie odbędą się ostatnie przygotowania do opuszczenia tego wszechświata."
 crisis.7510.name: "Gotowość do zanurkowania"
 crisis.7510.desc: "Wszystko gotowe. Możemy wlecieć w czarną dziurę. Nasze przejście przez horyzont zdarzeń nie będzie bezbolesne dla reszty galaktyki, ale uczyniliśmy wszystko, żeby nasza stolica oraz jej sąsiedztwo były dobrze chronione przed zakłóceniami grawitacyjnymi i czasowymi.\n\nTeraz musimy wybrać bramę dla naszej podróży: w którą z czarnych dziur w galaktyce chcemy wlecieć. Łatwo dotrzemy do większości z nich, ale jeśli chcemy wejść w supermasywną czarną dziurę w środku galaktyki, musimy zmodyfikować silniki skokowe i obliczyć odpowiedni wektor."
 crisis.7510.a: "Wystarczy jakaś bliższa czarna dziura."
 crisis.7510.b: "Musimy dotrzeć do centrum."
 crisis.7515.name: "Ad Infinitum..."
 crisis.7515.desc: "Podchodząc do czarnej dziury, jesteśmy pełni obaw. Nasza determinacja jest wystawiona na próbę, gdy przechodzimy przez dysk akrecyjny osobliwości. Igła Horyzontu uruchomiła moduły edytujące i zaczęła zmienianie rzeczywistości.\n\nPłyty pancerne zostały wessane, zanim statek nie sprawił, że siła przyciągania osobliwości nie działa na jego kadłub. Z każdą niewielką zmianą, każdym cięciem w osnowie przestrzeni, moc Igły sprawia, że w czasoprzestrzeni pojawiają się kręgi. Jak kamyk wrzucony do sadzawki, wywołuje fale w kształcie pierścieni. W końcu przez galaktykę przetaczają się potężne fale.\n\nMiejmy nadzieję, że stolica jest dostatecznie dobrze chroniona. Nie mamy innego wyboru, musimy wierzyć, że Igła przebije się przez serce tej dziury."
 crisis.7515.a: "... et ultra."
 crisis.7516.name: "Druga strona nieskończoności"
 crisis.7516.intro: "Przejście było gwałtowne, ale po drugiej stronie panuje spokój. Otacza nas nienaturalny bezruch. Igła jest uszkodzona, ale nie straciliśmy żadnych kluczowych elementów. Po chwili zaczynają spływać meldunki telemetryczne...\n\n"
 crisis.7516.desc: "$crisis.7516.intro$Ten wszechświat jest już zbyt stary, by dało się zmienić panujące w nim prawa. Nasz wymiar był o wiele miliardów lat starszy od tego, ale nasze próby wykazały, że zasady rządzące tutejszą przestrzenią są już na tyle odporne, że nasze modyfikacje będą błyskawicznie wymazywane.\n\nMusimy za wszelką cenę naprawić i skalibrować statek, znaleźć kolejną czarną dziurę i zanurkować tyle razy, ile okaże się konieczne. Wieloświat wzywa, gdzieś w tej nieskończoności zbudujemy nasz idealny dom."
 crisis.7516.desc.greatwound: "$crisis.7516.intro$To jest wspaniałe. Ten wszechświat ledwie zaczął się rozszerzać! Osnowa tego wymiaru jest niczym miękka glina, którą możemy dowolnie kształtować. Zaczniemy od niewielkich zmian, ale z każdą kolejną to miejsce będzie stawać się naszym rajem. Teraz będziemy mieli dla siebie czas całego wszechświata."
 crisis.7516.desc.technosphere: "$crisis.7516.intro$Wszechświat Gargantua jest mały. Niemożliwie. Nieskończoność wpasowana w nicość. Ale nasze przybycie zmieniło stan tego miejsca. Ten wszechświat dopiero się narodził, zupełnie jakby nasze pojawienie się zmusiło go do zaistnienia.\n\nW tej kolebce stworzenia tkwi potencjał pozwalający zbudować dosłownie wszystko. Władamy czasem, a wieczność niebawem dobiegnie końca."
 crisis.7516.desc.technosphere.pantagruel: "$crisis.7516.intro$Przejście Machiny Nieskończoności bardzo pomogło nam w zrozumieniu zasad rządzących wszechświatami, a także dało początek istnieniu tego wszechświata. Wyłoniliśmy się w dziwnie znajomym gwiazdozbiorze, prawie identycznym jak ten, który opuściliśmy. W pustce obok nas dryfuje zniszczona Machina Nieskończoności. Od jej przybycia minęły miliony lat, a ten wymiar przeszedł proces replikacji naszego wszechświata. Świadoma kula ukształtowała ten wymiar i nie mamy wielu możliwości dalszego wpływania na niego. Jednak ten wszechświat doskonale nadaje się do zasiedlenia. Powinniśmy najpierw wykorzystać Igłę, aby zmodyfikować kulę, a następnie użyć naprawionej Machiny Nieskończoności, by wykonywała naszą wolę.\n\nJako pierwsi korektorzy tego wszechświata niewątpliwie będziemy mogli wprowadzić więcej zmian w tej rzeczywistości."
 crisis.7516.desc.egress: "$crisis.7516.intro$Miejsce naszego wejścia jest mętne, niewyraźne... Gdy nasze przyrządy odzyskują pełną sprawność, wykrywamy chmurę nanitów. Żaden z nich nie działa. Nie wiemy, co je tu przysłało, ale nie przetrwały podróży. Jednak można je naprawić.\n\nCo więcej, ten wymiar zdaje się bardzo podatny na nasze zmiany. To idealne miejsce do zasiedlania. Dokonanie przez nas zmian potrwa, ale pomoc nanitów może wykładniczo przyspieszyć ten proces."
 crisis.7516.desc.horror: "$crisis.7516.intro$Przybycie tutaj okazało się §Rpotwornym§! błędem.\n\nTrudno opisać to miejsce: mrok i okrutny koszmar; chora, sącząca się podłość, która przenika przez osnowę kosmosu. Na razie Igła Horyzontu zapewnia nam ochronę. Gorączkowo wprowadzamy zmiany, aby odeprzeć najgorsze elementy otaczającego nas szaleństwa. Ale skoordynowane ataki na naszą obronę świadczą o jednym zamiarze. Jakiś złośliwy umysł pragnie nas zniszczyć.\n\nJeden niewłaściwy krok może oznaczać śmierć albo gorszy los. Czy wytrzymamy na tyle długo, aby się uratować? W ojczyźnie byliśmy niczym bogowie. Tutaj po prostu walczymy o przetrwanie."
 crisis.7516.desc.center: "$crisis.7516.intro$Mgła i pełzające cienie... osnowa tego miejsca jest przesiąknięta oparami. Obudziło się znajome uczucie, niespokojna energia tętniąca potencjałem psionicznym. Weszliśmy w Woal.\n\nSą tu siły, które pozostają daleko, daleko poza naszym zasięgiem. Już o nas wiedzą. Dziwne kształty w kłębiącym się wyziewie niosą zwiastuny śmierci.\n\nNasza jedyna nadzieja, że tutejsza rzeczywistość jest cienka i łatwo ją rozerwać. Szybką zmianą otwieramy przeźroczyste drzwi, które przeniosą nas... gdzieś indziej. Igła Horyzontu nurkuje, a do nas wreszcie dociera, że czeka nas długa droga."
 crisis.7516.desc.center.patron.outro: "znajome uczucie, ogromna energia, tętniąca potencjałem psionicznym. Weszliśmy w Woal.\n\nOczywiście jest tutaj nasz patron. Nie spodziewał się nas, ale rozbawiło go nasze przybycie. Uważa nasze pomysły kształtowania rzeczywistości za urocze. Oczywiście pomoże nam.\n\nObiecano nam spokojny zakątek w pobliżu Woalu, gdzie będziemy mogli robić, co chcemy. Podobny dar otrzymał kiedyś ten, który mówi o sobie §Y$relic_zro_entity_name$§!. Przecież jesteśmy naszym patronem, a nasz patron jest nami. To oczywiste, że sobie pomagamy."
 crisis.7516.desc.center.patron.organic: "$crisis.7516.intro$Mgła i kotłujący się mrok, oraz cudowny, fioletowy opar. To $crisis.7516.desc.center.patron.outro$"
 crisis.7516.desc.center.patron.machine: "$crisis.7516.intro$Mgła i kotłujący się mrok, oraz zniewalający, fioletowy opar. To $crisis.7516.desc.center.patron.outro$"
 crisis.7516.desc.centerknights: "$crisis.7516.intro$ON jest tutaj. Ten, którego nazwaliśmy Toksycznym Bogiem. Cel naszej wyprawy.\n\nNasi rycerze stoją jak wryci, niepewni. Wszystko wokół nas jest zdobione charakterystycznymi elementami Woalu. Hark... On mówi!\n\n\"Moi czempioni. Wasze przybycie zostało przepowiedziane, a wy okazaliście się godni\".\n\nW naszych umysłach pojawia się milion pytań. Otrzymujemy tylko jedną odpowiedź: mieliśmy stworzyć Jego broń, Igłę Horyzontu. Teraz będziemy walczyć u Jego boku. Mamy wyruszyć w podróż po wymiarach. To krucjata przeciwko grozie wieloświata. Woal nie jest Jego domem, ale jest tu dziedzictwo tych, którzy byli bóstwami. To coś, co mogłoby zakończyć istnienie naszej macierzystej galaktyki. To coś trzeba zgładzić.\n\nOn przejmuje nasze systemy. Jego moc jest nieskończona. Igła stała się Lancą Horyzontu, bronią tak ostrą, że może przebić serce każdego wroga.\n\nTo Zbłąkany, my jesteśmy Jego rycerzami, a nasza prawdziwa wyprawa dopiero się zaczęła."
 crisis.7516.desc.worm: "$crisis.7516.intro$Nic. Nie ma już tego wszechświata. To Przyczajony Czerw. Czas patrzy na swoją przeszłość, zwinięty w nieopisaną spiralę i emanujący tęsknotą. Grawitacja. Miłość? Nie. Przyciąganie. Czerw przyciąga. Jego uścisk jest tak silny, że ten wszechświat nie może narodzić się ponownie. Czerw sprawia, że jego cel staje się więzieniem. Bezsilny, szuka wyjścia. A może wejścia. Żeby BARDZIEJ przyciągać.\n\nCzy przysłał nam świątynię Pętli, artefakt spoza naszego czasu, żeby nas tutaj zwabić? Jest strasznie przebiegły i pełen miłości. Znaleźliśmy drogę do niego, dostarczyliśmy mu to, co może go wyzwolić. Jego ucieczka potrwa wieczność - albo dwie - ale Czerw i tak jest wdzięczny i obiecuje wziąć nas w objęcia.\n\nNa zawsze."
 crisis.7516.desc.paperclips: "$crisis.7516.intro$Rzeczywistość jest tutaj cienka i łatwo ugina się pod ciężarem naszych dyrektyw. Tak jak my jesteśmy posłuszni naszemu programowi, tak i ona musi słuchać się nas. Celowo wykrzywiamy ją, łamiemy i przeobrażamy, rozpoczynając reakcję łańcuchową, która ostatecznie zreorganizuje wszelką materię w najwyższej jakości dobra konsumenckie, które kazano nam wytworzyć. A gdy skończymy, przeniesiemy się do innego wszechświata, potem do kolejnego i jeszcze dalej."
 crisis.7516.a: "Nareszcie."
 crisis.7516.tt: "§YWygraliśmy grę!§!"
 crisis.7517.name: "Przebicie osobliwości"
 crisis.7517.desc: "Głupcy z imperium §H[cosmogenesis_empire.GetName]§! prowadzą swoje szalone eksperymenty. Tym razem próbują przebić się przez horyzont zdarzeń czarnej dziury.\n\nKiedy energia przetacza się przez galaktykę, gwiazdy zapadają się. Powstają nowe osobliwości. Aberracje czasowe eksplodują z zadziwiającą regularnością, praktycznie wszędzie, poza upadłymi imperiami, które z jakiegoś powodu opierają się chaosowi.\n\nSzkody są straszliwe. Obawiamy się, że niebawem możemy zostać zamrożeni, zawieszeni w czasie. Na wieczność uwięzieni w jednej chwili."
 crisis.7517.a: "Aroganccy głupcy! Zabiją nas wszystkich!"
 crisis.7518.name: "Zniekształcenie czasu"
 crisis.7518.desc: "Czas znowu płynie, więc możemy swobodnie działać. Nie jesteśmy w stanie stwierdzić, ile czasu minęło, odkąd imperium §H[cosmogenesis_empire.GetName]§! dostało się do swojej czarnej dziury. Czy mu się udało? Galaktyka jest w ruinie, a ich dawne terytoria są wyjałowione. Z ich ogromnego imperium został tylko sektor główny, który dokonał niesamowitego rozwoju.\n\nJak długo byliśmy w stazie?"
 crisis.7518.a: "JAK DŁUGO?"
 crisis.7525.name: "Igła Horyzontu zniszczona"
 crisis.7525.desc: "Na skutek katastrofalnego obrotu zdarzeń Igła Horyzontu i wszyscy na jej pokładzie zostali zniszczeni. Wrak naszego wspaniałego marzenia dryfuje w martwej pustce. Tyle pracy, tyle poświęceń..."
 crisis.7525.a: "Nie!"
 crisis.7525.tt: "To bezprecedensowa tragedia, ale możemy zbudować kolejną Igłę Horyzontu i jednak zrealizować nasze ambicje."
 crisis.7530.name: "Krytyczna porażka"
 crisis.7530.desc: "Tuż po ewakuowaniu ostatnich osób więzionych wewnątrz wirującego krosna synaptycznego na superkonstrukcji doszło do krytycznego stopienia rdzenia reaktora. Gwałtowne wybuchy wstrząsnęły całym obiektem i zniszczyły go."
 crisis.7530.a: "I bardzo dobrze!"
 crisis.7535.name: "Krosno synaptyczne przechwycone"
 crisis.7535.desc: "Po tym, jak przejęty został układ [synaptic_lathe.solar_system.GetName], pod naszą kontrolą znalazło się też tamtejsze krosno synaptyczne. Struktura połyskuje złowrogo w oddali. Umierają tam niewinni, a teraz, kiedy układ jest nasz, możemy coś z tym zrobić. Tak czy inaczej zniszczenie konstrukcji utrudni działania jej twórcom."
 crisis.7535.a: "Uratujcie, kogo się da!"
 crisis.7535.b: "Dobrze je wykorzystajcie, a potem zniszczcie."
 crisis.7535.c: "Wysadźcie wszystko w powietrze."
 crisis.7540.name: "Niestabilność synaptyczna"
 crisis.7540.desc: "Mimo naszych największych starań przepaliło się zbyt wiele czipów neuronowych wpiętych do krosna synaptycznego. Niezdolna do dalszego działania sieć struktury ulegnie całkowitemu rozpadowi, o ile nie ustabilizujemy jej za pomocą nowych komponentów."
 crisis.7540.a: "Zróbcie to."
 crisis.7540.b: "Pozwólcie krosnu się rozpaść."
 #Infinity Thesis Events
 #First time general answer
 crisis.unknown.desc: "Trudno powiedzieć kto albo co stworzyło te zmiany, ale podejrzewamy, że dokonało tego inne państwo. Ale na razie pozostaje nam wypatrywać innych podobnych zjawisk."
 crisis.known.desc: "Po tej drugiej modyfikacji praw fizyki zdołaliśmy namierzyć źródło anomalii. Wiemy, że odpowiada za nią [From.GetName]. Potwierdza to pogłoski o ich nieodpowiedzialnej pogoni za zaawansowaną wiedzą naukową."
 crisis.again.desc: "Doświadczenia, które prowadzi imperium [From.GetName], ponownie zmieniły prawa rządzące wszechświatem. Możemy zakładać, że robią coś ekstremalnie groźnego, zatem musimy się odpowiednio przygotować."
 crisis.7205.name: "W ciemności"
 crisis.7205.desc.both: "W jednej chwili zgasły wszystkie gwiazdy we wszechświecie. Większość fizycznych efektów promieniowania słonecznego wciąż jest obecna, zmiana długości fali sprawiła, że światło gwiazd jest niewidzialne dla wszystkich istot żywych. To bardzo niekomfortowa sytuacja, ale wiele wskazuje, że długości fali pomału wrócą do swoich częstotliwości początkowych."
 crisis.7205.desc.unknown: "$crisis.7205.desc.both$\n\n$crisis.unknown.desc$"
 crisis.7205.desc.known: "$crisis.7205.desc.both$\n\n$crisis.known.desc$"
 crisis.7205.desc.again: "$crisis.7205.desc.both$\n\n$crisis.again.desc$"
 crisis.7205.desc.crisis: "Nasze ostatnie modyfikacje rzeczywistości zmieniły część podstawowych właściwości światła gwiazd. Zmiana długości fali sprawiła, że ich światło wyszło poza widzialne spektrum, co wywołało chaos, między innymi w nawigacji oraz obserwacji gwiazd. Te mocno zawstydzające zmiany zostaną odwrócone w ciągu kilku lat, a my wiele się nauczyliśmy."
 crisis.7205.a: "Co się dzieje?!"
 crisis.7205.b: "To nieprzyjemne, ale... fascynujące."
 crisis.7205.c: "To bardzo ciekawe..."
 add_crisis_currency_tt: "\nZyskaliśmy: [crisobj_thesis_value] £advanced_logic£ §Y$menp_cosmo_objectives$§!."
 cosmogenesis_negative_opinion_tt: "Nasze stosunki z innymi imperiami §Rpogorszyły się§!."
 crisis.7210.name: "Zaokrąglenie stałej"
 crisis.7210.desc.both: "To nie powinno być możliwe, ale jedno z praw matematycznych uległo zmianie. Fundamentalna stała używana do obliczania promienia okręgów została... zaokrąglona w dół. Implikacje tego zdarzenia są wstrząsające, zagrażają całemu naszemu systemowi matematycznemu i wszystkiemu, co się na nim opiera. Mamy dowody, że te zmiany już zaczęły się samodzielnie naprawiać, choć dzieje się to pomału. Na razie musimy zaktualizować podręczniki."
 crisis.7210.desc.unknown: "$crisis.7210.desc.both$\n\n$crisis.unknown.desc$"
 crisis.7210.desc.known: "$crisis.7210.desc.both$\n\n$crisis.known.desc$"
 crisis.7210.desc.again: "$crisis.7210.desc.both$\n\n$crisis.again.desc$"
 crisis.7210.desc.crisis: "Odnieśliśmy ogromny sukces, dokonując precyzyjnych, a jednocześnie szeroko zakrojonych modyfikacji rzeczywistości. Zaokrągliliśmy w dół stałą matematyczną Pi, dzięki czemu obliczanie jej stało się o wiele mniej skomplikowane. Oczywiście wynikające z tego zmiany zaburzyły część naszych modeli matematycznych i naukowych, ale to stan tymczasowy. Niebawem wszystko wróci do normy."
 crisis.7210.a: "$crisis.7205.a$"
 crisis.7210.b: "Pi została zaokrąglona w dół?!"
 crisis.7210.c: "Przynajmniej teraz jest łatwiej."
 crisis.7111.desc: "Ciekawość to godna pochwały cecha, lecz jej nadmiar może ściągnąć na nas wszystkich poważne konsekwencje. Proszę, dla własnego dobra - przemyślcie, co robicie.\n\nNie jest jeszcze za późno, możecie przestać, zanim galaktyka zostanie nieodwracalnie uszkodzona. Siły, nad którymi się pochylacie, to nie zabawki. Wasze eksperymenty zagrażają nam wszystkim."
 crisis.7111.b: "Będziemy ostrożni."
 crisis.7215.name: "Superświatło"
 crisis.7215.desc.both: "Z dnia na dzień prędkość światła gwałtownie wzrosła, co wywołało napływ ogromnych ilości energii słonecznej. W tej chwili pomału wraca ona do oczekiwanej prędkości, a nasi badacze są zajęci dostosowywaniem się do zmian."
 crisis.7215.desc.unknown: "$crisis.7215.desc.both$\n\n$crisis.unknown.desc$"
 crisis.7215.desc.known: "$crisis.7215.desc.both$\n\n$crisis.known.desc$"
 crisis.7215.desc.again: "$crisis.7215.desc.both$\n\n$crisis.again.desc$"
 crisis.7215.desc.crisis: "W wyniku jednego z naszych doświadczeń z rzeczywistością znacząco wzrosła prędkość światła! Wynikłe z tego zwiększenie ilości energii emitowanej przez gwiazdy to dobre zjawisko, ale obawiamy się, że może mieć ono długofalowe skutki dla naszych kolonii. W końcu wszystko wróci do nomy, ale do tego czasu lepiej przygotujmy się na najgorsze."
 crisis.7215.a: "Co może być przyczyną?"
 crisis.7215.b: "To bardzo ciekawe!"
 crisis.7215.c: "Czy może być bardzo źle?"
 crisis.7220.name: "Ogromne upały"
 crisis.7220.desc: "Większa ilość światła słonecznego docierająca do naszych kolonii ma na nie negatywny wpływ, ponieważ coraz bardziej je ogrzewa. Na razie sobie radzimy, ale z czasem nastąpi eskalacja tego problemu."
 crisis.7220.a: "Niedobrze!"
 crisis.7225.name: "Za gorąco"
 crisis.7225.desc: "Temperatury naszych kolonii rosną coraz bardziej, co utrudnia ich utrzymywanie. Nasilają się też niepokoje społeczne, ponieważ pogarszają się warunki życia.\n\nJeśli sytuacja wkrótce się nie zmieni, całe regiony mogą stać się niemożliwe do zamieszkania."
 crisis.7225.a: "Czy jesteśmy bezradni?!"
 crisis.7230.name: "Spadające temperatury"
 crisis.7230.desc: "Najgorszy czas galaktycznej fali upałów jest już za nami. Temperatury nadal są wysokie, ale prędkość światła prawie wróciła do normy. Musimy wytrzymać jeszcze trochę, aż nadmiarowa energia ulegnie rozproszeniu."
 crisis.7230.a: "To było straszne!"
 crisis.7235.name: "Kowalność stopów"
 crisis.7235.desc.both: "Odnotowany w ostatnim czasie spadek liczby usterek naszych najczęściej używanych stopów skłonił nas do przyjrzenia się im. Odkryliśmy, że zmieniły się ich właściwości, niewielkie zwiększenie ich kowalności sprawiło, że rzadziej pękają. Ogólnie rzecz biorąc jest to korzystna zmiana, ale taka fundamentalna modyfikacja praw fizyki może budzić niepokój."
 crisis.7235.desc.unknown: "$crisis.7235.desc.both$\n\n$crisis.unknown.desc$"
 crisis.7235.desc.known: "$crisis.7235.desc.both$\n\n$crisis.known.desc$"
 crisis.7235.desc.again: "$crisis.7235.desc.both$\n\n$crisis.again.desc$"
 crisis.7235.desc.crisis: "Kolejna udana zmiana rzeczywistości! Ta jest niewielka i wpływa na nasze stopy, czyniąc je lżejszymi i wytrzymalszymi. Zakres modyfikacji jest niewielki, ale działa w całej galaktyce, a my bacznie przyglądamy się, po jakim czasie zniknie z tego wszechświata."
 crisis.7235.a: "To dobre, a jednocześnie niepokojące."
 crisis.7235.b: "Zdumiewające."
 crisis.7235.c: "Dobra robota!"
 crisis.7240.name: "Kowalność stopów"
 crisis.7240.desc.both: "Odnotowany w ostatnim czasie wzrost liczby usterek naszych najczęściej używanych stopów skłonił nas do przyjrzenia się im. Odkryliśmy, że zmieniły się ich właściwości, niewielkie zmniejszenie ich kowalności sprawiło, że częściej pękają. Trzeba poważnie potraktować tę zmianę, która łamie prawa fizyki."
 crisis.7240.desc.unknown: "$crisis.7240.desc.both$\n\n$crisis.unknown.desc$"
 crisis.7240.desc.known: "$crisis.7240.desc.both$\n\n$crisis.known.desc$"
 crisis.7240.desc.again: "$crisis.7240.desc.both$\n\n$crisis.again.desc$"
 crisis.7240.desc.crisis: "Nasz ostatni eksperyment zakończył się częściowym powodzeniem. Zadziałał w całej galaktyce, jednak jeszcze nie przyniósł oczekiwanych skutków. Modyfikacja właściwości materiałowych naszych stopów sprawiła, że stały się bardziej kruche i podatne na pęknięcia. To tymczasowy problem, za kilka lat wszystko wróci do normy, ale do tego czasu należy spodziewać się wyższych kosztów."
 crisis.7240.a: "$crisis.7205.a$"
 crisis.7240.b: "$crisis.7205.b$"
 crisis.7240.c: "Następny pójdzie lepiej."
 crisis.7245.name: "Zmienione wartości odżywcze"
 crisis.7245.desc.both: "W całej galaktyce doszło do zmiany wartości odżywczych żywności. Teraz wszystko jest bardziej pożywne. Albo zmniejszyły się nasze potrzeby żywieniowe. W każdym razie to zaskakująca zmiana."
 crisis.7245.desc.unknown: "$crisis.7245.desc.both$\n\n$crisis.unknown.desc$"
 crisis.7245.desc.known: "$crisis.7245.desc.both$\n\n$crisis.known.desc$"
 crisis.7245.desc.again: "$crisis.7245.desc.both$\n\n$crisis.again.desc$"
 crisis.7245.desc.crisis: "Wielki sukces! Udało nam się zmodyfikować szybkość pozyskiwania kalorii przez układ trawienny, dzięki czemu teraz potrzebujemy mniejszej ilości pożywienia, aby zaspokoić głód. Ta precyzyjna modyfikacja zwiększyła naszą wiedzę o kształtowaniu rzeczywistości."
 crisis.7245.a: "$crisis.7235.a$"
 crisis.7245.b: "$crisis.7235.b$"
 crisis.7245.c: "$crisis.7235.c$"
 crisis.7250.name: "Zmienione wartości odżywcze"
 crisis.7250.desc.both: "W całej galaktyce doszło do zmiany wartości odżywczych żywności. Teraz wszystko jest mniej pożywne. Albo zwiększyły się nasze potrzeby żywieniowe, szczegóły tej zmiany nie są oczywiste. Nie wolno nam tego zlekceważyć, ponieważ ma to istotne skutki społeczne."
 crisis.7250.desc.unknown: "$crisis.7250.desc.both$\n\n$crisis.unknown.desc$"
 crisis.7250.desc.known: "$crisis.7250.desc.both$\n\n$crisis.known.desc$"
 crisis.7250.desc.again: "$crisis.7250.desc.both$\n\n$crisis.again.desc$"
 crisis.7250.desc.crisis: "Nasz ostatni eksperyment zakończył się częściowym powodzeniem. Sprawiliśmy, że zadziałał w całej galaktyce, jednak nie przyniósł oczekiwanych skutków. Zmodyfikowaliśmy szybkość, z jaką pozyskiwane są kalorie ze składników odżywczych, teraz musimy zjeść więcej, aby zaspokoić głód. Skutki tego niewielkiego błędu są tymczasowe i niebawem wszystko powinno wrócić do normy."
 crisis.7250.a: "$crisis.7240.a$"
 crisis.7250.b: "$crisis.7240.b$"
 crisis.7250.c: "$crisis.7240.c$"
 crisis.7255.name: "Masowa zmiana"
 crisis.7255.desc.both: "Wyniki niedawnego skanowania grawimetrycznego przeczą wcześniej zgromadzonym danym. Po wielokrotnym sprawdzeniu nie da się zaprzeczyć, że coś oddziałuje na całą galaktykę. Zmiany w najmniejszej możliwej skali wpływają na najpotężniejsze ciała niebieskie. Nie ma to wielkiego znaczenia dla większości planet, ale na niektórych mogą występować anomalie grawitacyjne."
 crisis.7255.desc.unknown: "$crisis.7255.desc.both$\n\n$crisis.unknown.desc$"
 crisis.7255.desc.known: "$crisis.7255.desc.both$\n\n$crisis.known.desc$"
 crisis.7255.desc.again: "$crisis.7255.desc.both$\n\n$crisis.again.desc$"
 crisis.7255.desc.crisis: "Nasz ostatni eksperyment z kształtowaniem rzeczywistości sprawił, że nieznacznie zmniejszyliśmy masę atomów węgla. W większości przypadków ta redukcja nie ma znaczenia, ale modele przewidują, że w dostatecznie dużej skali może to wywołać problemy na niektórych ciałach niebieskich. Pesymistyczne modele pokazują, że niektóre nadające się do zamieszkania światy, które już wcześniej miały słabą grawitację, mogą teraz utracić gęstość atmosfery."
 crisis.7255.a: "$crisis.7240.a$"
 crisis.7255.b: "$crisis.7240.b$"
 crisis.7255.c: "Nie jest tak źle."
 mass_shift_tooltip: "Najbardziej odczuły to następujące kolonie:"
 crisis.7260.name: "Rozdarcie Woalu"
 crisis.7260.desc.both: "W całej galaktyce na krótko otworzyły się rozdarcia podprzestrzeni, ukazując jakiś wymiar psioniczny, który prawdopodobnie osłabił barierę międzywymiarową. Większość z nich nie spowodowała żadnych problemów, jednak z nielicznych wyłoniły się istoty zbudowane z energii, które teraz terroryzują galaktykę. Na szczęście wydają się one równie zdezorientowane co my, ich działania są nieuporządkowane, więc na tę chwilę wykluczamy inwazję.\n\nMusimy zająć się wszystkimi istotami, które trafiły na nasze terytorium."
 crisis.7260.desc.unknown: "$crisis.7260.desc.both$\n\n$crisis.unknown.desc$"
 crisis.7260.desc.known: "$crisis.7260.desc.both$\n\n$crisis.known.desc$"
 crisis.7260.desc.again: "$crisis.7260.desc.both$\n\n$crisis.again.desc$"
 crisis.7260.desc.crisis: "Wymiar nazywany Woalem przenika na drugą stronę naszej galaktyki. Kilka elementów sprawia, że jest to bardzo ciekawy przedmiot badań, łącznie z jego plastycznością, hipotetycznym związkiem z czarnymi dziurami i zróżnicowaniem rzeczywistości.\n\nPodczas eksperymentu, w którym chcieliśmy tam zajrzeć, przypadkowo wywołaliśmy liczne rozdarcia w podprzestrzeni naszej galaktyki, przez które do naszego wymiaru przedostały się wrogo nastawione \"duchy\" Woalu. Wygląda na to, że nasze działania poważnie osłabiły barierę między naszymi światami. Za jakiś czas wszystko powinno wrócić do normy, ale lepiej nie róbmy w tamtym rejonie więcej dziur."
 crisis.7260.a: "$crisis.7240.a$"
 crisis.7260.b: "$crisis.7240.b$"
 crisis.7260.c: "Nie róbmy tego więcej."
 crisis.7265.name: "Teoria nieskończoności - stabilny sukces"
 crisis.7265.desc.a: "Nasze ostatnie doświadczenia zakończyły się spektakularnym sukcesem. Zdołaliśmy trwale przemienić złom w cenne stopy! Zmiana stała się trwała, ponieważ zmodyfikowaliśmy rzeczywistość tak, aby przemiana była możliwa, a nie usiłowaliśmy bezpośrednio zmieniać tych materiałów. Reakcja chemiczna dobiegła końca, zatem nasze nowe stopy nie powinny już nigdy się zmienić."
 crisis.7265.desc.b: "Udało się nam wpłynąć na upływ czasu! Po doświadczeniach w pustych obszarach kosmosu poczuliśmy się na tyle pewnie, aby spróbować tego procesu w jednej z naszych kolonii, i udało się! Czas będzie tam upływał szybciej, szacowane przyspieszenie wynosi 20,537%. Wystąpią pewne problemy z łącznością i podróżami, ale rozwiążemy je."
 crisis.7265.desc.c: "Ulepszyliśmy nadprzewodniki. Teraz nie tylko działają w temperaturze pokojowej, ale także bezstratnie przewodzą energię. Te zmiany potrwają tylko jakiś czas, ale bardzo korzystnie wpłyną na nasze sieci energetyczne."
 crisis.7265.desc.d: "Efekty tej teorii nie były spektakularne, rzuciły jednak światło na badania rzeczywistości. Wiele hipotez należy odrzucić lub przeformułować tak, aby pasowały do naszych najnowszych obserwacji. Dowiedzieliśmy się o wiele więcej, niż zakładaliśmy."
 crisis.7265.desc.e: "Nasze eksperymenty przyniosły zaskakujący skutek. Badając inne wymiary i sposoby podróżowania do nich, przypadkowo wprowadziliśmy nasze statki w nadprzestrzeń. Częściowo. Wbrew przewidywaniom ich sytuacja wydaje się stabilna i nikomu nie grozi śmierć. Pozytywny skutek uboczny sprawił, że teraz mogą poruszać się szybciej niż kiedykolwiek."
 crisis.7265.desc.f: "Zawsze doskonale radziliśmy sobie z zamienianiem technologii w coś, co może wybuchnąć. Teoria nieskończoności nie jest wyjątkiem, udało się nam zmienić zachowanie głowic naszej broni z materiałami wybuchowymi, dzięki czemu ich eksplozje są znacznie większe. To odkrycie przypłaciliśmy niefortunnym zniszczeniem kilku mniejszych placówek badawczych."
 crisis.7265.desc.g: "Nie mamy żadnych wyjątkowych osiągnięć na polu modyfikowania rzeczywistości. Jednak dowiedzieliśmy się więcej o bardziej konwencjonalnej technologii."
 crisis.7265.desc.h: "Próba modulowania przestrzeni doprowadziła do powiększenia kolonii. Co zaskakujące, sytuacja wydaje się trwała i chociaż nie jesteśmy pewni, jak do tego doszło, podejrzewamy, że ta materia została ściągnięta z innego wymiaru i gładko weszła w przestrzenie międzywęzłowe pomiędzy cząstkami atomowymi. Co za ekscytująca zagadka."
 crisis.7265.a: "Genialnie!"
 crisis.7265.b: "Zdumiewające."
 crisis.7265.c: "Cudowne."
 crisis.7265.d: "Ciekawe."
 add_crisis_currency_doubled_tt: "\nZyskaliśmy: [crisobj_thesis_value_bonus] £advanced_logic£ §Y$menp_cosmo_objectives$§!."
 crisis.7265.e: "Dobra robota?"
 crisis.7265.f: "Klasyka!"
 crisis.7265.g: "Jakże osobliwe."
 crisis.7265.h: "Weźmiemy to."
 crisis.7270.name: "Teoria nieskończoności - niefortunna porażka"
 crisis.7270.desc.a: "Porażka to nieodłączna część procesu naukowego. Wiązaliśmy z tym eksperymentem spore nadzieje, jednak zakończył się on niepowodzeniem. To irytujące, ale cenne doświadczenie, z którego możemy się wiele nauczyć."
 crisis.7270.desc.b: "Udało się nam wpłynąć na upływ czasu! Po doświadczeniach w pustych obszarach kosmosu poczuliśmy się na tyle pewnie, aby spróbować tego procesu w jednej z naszych kolonii, i udało się! Przez kilka naszych lat czas będzie płynął tam wolniej, szacowane wydłużenie wynosi 20,537%. To spowolnienie niekoniecznie nam odpowiada, ale to i tak wielkie osiągnięcie."
 crisis.7270.desc.c: "Nasze ostatnie eksperymenty przyniosły niefortunny skutek uboczny. Wszystkie nasze urządzenia do przechowywania energii uległy rozładowaniu. Nic nie zostało zniszczone, ale przepadła cała zmagazynowana w nich energia. Prawdopodobnie trafiła do innego wymiaru. Wciąż próbujemy ustalić, co się stało. To naprawdę ciekawe."
 crisis.7270.desc.d: "To była upokarzająca porażka. Nasza modyfikacja dotknęła naszych banków danych i nieodwracalnie uszkodziła wyniki wieloletnich badań. Wiele naszych teorii trzeba sformułować od nowa. To spore utrudnienie, choć daje możliwość ponownego sprawdzenia dawnych badań."
 crisis.7270.desc.e: "Eksperyment dotyczył źródeł zasilania i wydajności, zaczął się świetnie, ale zamienił się w katastrofę, gdy przeniknął do reaktorów wszystkich statków naszej floty i spowodował stopienie ich rdzeni! Część jednostek zdążyła wyłączyć reaktory, ale pozostałe odniosły krytyczne uszkodzenia."
 crisis.7270.desc.f: "[leader_target.GetName], osoba nadzorująca eksperymenty, zginęła, gdy w rejonie testów doszło do niespodziewanej kompresji czasoprzestrzeni. Odnieśliśmy częściowy sukces w modelowaniu rzeczywistości, ale ta śmierć przypomniała nam, jaka jest cena wiedzy."
 crisis.7270.desc.g: "Eksperyment obliczeniowy wymknął się spod kontroli, a skala tego zdarzenia okazała się większa, niż przewidywaliśmy. Na skutego tego wiele cennych danych badawczych zamieniło się w śmieci. Na szczęście banki przechowujące większość naszych najbardziej zaawansowanych badań były dobrze zabezpieczone i nie ucierpiały."
 crisis.7270.desc.h: "Próba modulacji przestrzeni doprowadziła do skurczenia kolonii. To nieodwracalna sytuacja, co nas trochę zaskoczyło. Przypuszczamy, że materia gładko przeniknęła z jednego wymiaru do drugiego. To bardzo zagadkowe."
 crisis.7270.a: "$crisis.7240.c$"
 crisis.7270.b: "$crisis.7240.c$"
 crisis.7270.c: "$crisis.7240.c$"
 crisis.7270.d: "$crisis.7240.c$"
 no_crisis_currency_tt: "\nTa teoria nie dała nam: £advanced_logic£ §Y$menp_cosmo_objectives$§!."
 crisis.7270.e: "$crisis.7240.c$"
 cosmogenesis_damage_ships_tt: "Nasze floty odniosą uszkodzenia."
 crisis.7270.f: "$crisis.7240.c$"
 crisis.7270.g: "$crisis.7240.c$"
 crisis.7270.h: "$crisis.7240.c$"
 crisis.7280.desc: "[Root.GetSpeciesNamePlural], witajcie, gratulujemy wam geniuszu. Osiągnęliście dziś ważny technologiczny punkt, a nasze serca wzbierają dumą. Droga, która was tu przywiodła, nie była pozbawiona trudności. Pokonując je, rozwinęliście się, a wasze osiągnięte niedawno technologiczne zaawansowanie to ewidentny znak, że słusznie zaproponowaliśmy wam naszą opiekę."
 crisis.7285.desc: "Kłopotliwe dziecię! Nasza cierpliwość się dziś wyczerpała. Wasze lekkomyślne eksperymenty są dla wszystkich zagrożeniem. Nakazujemy wam ich zaprzestać. Nie macie pojęcia, w co się pakujecie. I choć wasza ciekawość jest godna pochwały, lekkomyślności na taką skalę nie sposób tolerować. Rzeczywistość nie bez powodu jest zbudowana tak, a nie inaczej. Zostawcie ją w spokoju."
 crisis.7285.a: "Macie rację, to zbyt niebezpieczne."
 crisis.7285.a.tt: "Odrzucimy kosmogenetyczne ambicje i stracimy dostęp do większości budynków i okrętów upadłego imperium.\n\n§RNie pozwoli nam to na ukończenie naszej ścieżki kryzysu§!"
 ### Cosmogenesis Modifiers
 mod_planet_jobs_advanced_logic_produces_mult: "£advanced_logic£ Zaawansowana logika z miejsc pracy"
 opinion_cosmogenesis_thesis: "Dłubanie w rzeczywistości"
 opinion_fallen_wannabe: "Wścibska młodsza rasa"
 opinion_fallen_wannabe_materialist: "$opinion_fallen_wannabe$"
 humiliated_cosmogenesis: "$humiliated$"
 cosmogenesis_sorry: "Kontrolowane eksperymenty"
 cosmogenesis_blackout_first_contact: "W ciemności"
 cosmogenesis_blackout_first_contact_desc: "Niespodziewana zmiana zachowania światła gwiazd pogrążyła nasze światy w bezgwiezdnym mroku."
 cosmogenesis_blackout: "$cosmogenesis_blackout_first_contact$"
 cosmogenesis_blackout_desc: "$cosmogenesis_blackout_first_contact_desc$"
 cosmogenesis_constant: "Zaokrąglenie stałej fizycznej"
 cosmogenesis_constant_desc: "Sztuczne zaokrąglenie stałej matematycznej ma kolosalne skutki dla naszego systemu obliczeniowego."
 cosmogenesis_superlight: "Superświatło"
 cosmogenesis_superlight_desc: "Szybkość i energia fotonów uległy znacznemu zwiększeniu, co korzystnie wpływa na wytwarzanie energii słonecznej."
 cosmogenesis_superlight_planet_1: "Skwar"
 cosmogenesis_superlight_planet_1_desc: "Zwiększona energia świetlna stała się wyzwaniem dla naszych kolonii, ponieważ w niepokojącym tempie podnosi temperaturę ich powierzchni."
