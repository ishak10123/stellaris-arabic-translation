 #Counters
 the_synth_queen_chain_title: "Cetana: królowa syntetyków"
 the_synth_queen_chain_desc: "Pojawiła się tajemnicza i potężna Cetana, głosząca zbawienie, a jednocześnie otoczona mgłą tajemnicy.\nCzy za jej miłymi słowami kryje się jakiś wielki plan?\n\n§LProjekty specjalne i wydarzenia związane z Cetaną zapewnią ci wiedzę zwiększającą twoje postępy.§!"
 the_synth_queen_chain_insights: "Wiedza"
 the_synth_queen_war_chain_title: "Cetana: Ruch oporu"
 the_synth_queen_war_chain_desc: "Wreszcie poznaliśmy prawdziwe zamiary Cetany. Dążąc do zakończenia fizycznego cierpienia, zamierza ona przesłać świadomość wszystkich istot świadomych i zniszczyć życie w znanej nam postaci. Musimy jakoś znaleźć siłę, aby pokrzyżować jej szalone plany."
