 tr_nanotech_finish: "Tradycje nanotechnologiczne zakończone"
 tr_nanotech_1_delayed: "Galaktyka pozostaje nieświadoma, że stanowi już teraz przedłużenie naszego jestestwa, które wkrótce w pełni zrealizuje się poprzez wszechogarniające objęcia nanitów."
 tr_nanotech_2_delayed: "Wszystko w kosmosie musi dążyć ku rojowi. Sięgamy ku galaktyce i zmieniamy ją na nasze podobieństwo."
 tr_nanotech_3_delayed: "Każdy świat włączony do roju poszerza nasze kolektywne możliwości, wzbogaca tkankę naszego zjednoczonego istnienia."
 tr_nanotech_4_delayed: "Wraz z każdą transformacją posuwamy się naprzód, nasza wydajność osiąga coraz to nowe szczyty."
 tr_nanotech_5_delayed: "Każdy z nas jest fabryką, okrętem, bronią i tarczą. Ledwie kroplą w ogromnej powodzi naszej kolektywnej potęgi."
 tradition_nanotech_delayed: "Jesteśmy niekończącym się potopem. Stale w ruchu, stale wszędzie wokół. Niech wszystko zespoli się w nas. Niech możemy zmieniać się we wszystko."
