 civic_corporate_toxic_baths_individual_machine: "Luksusowe baseny smarów"
 civic_corporate_toxic_baths_individual_machine_desc: "Stwórcy niech będą dzięki! Luksusowa, uzależniająco miękka tekstura tych smarów ma kluczowy wpływ na zmniejszenie zużycia starzejących się powłok. Specjalnie przygotowany zastrzyk aktywowanych ciepłem olejów premium sprawia, że populacja tego imperium maszyn wygląda i czuje się, jakby była \"fabrycznie nowa\". Działa idealnie we wszystkich modelach i typach."
