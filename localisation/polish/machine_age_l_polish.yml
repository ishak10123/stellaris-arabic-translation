 advanced_logic: "Zaawansowana logika"
 advanced_logic_name: "$advanced_logic$:"
 advanced_logic_value: "£advanced_logic£ $VAL|0$"
 advanced_logic_gaining: "Ukończ §Hcele kryzysowe§!, aby zdobyć więcej £advanced_logic£ §Yzaawansowanej logiki§!."
 advanced_logic_desc: "Zaawansowana logika to miara naszego zrozumienia największych tajemnic wszechświata."
 advanced_logic_crisis_objective: "Cele kryzysowe"
 advanced_logic_crisis_objective_gained: "Zdobyto zaawansowaną logikę"
 advanced_logic_crisis_objective_reward: "$REWARD$"
 advanced_logic_crisis_objective_progress: "Zyskaliśmy £advanced_logic£ $AMOUNT$ z tego celu kryzysowego."
 advanced_logic_crisis_level_locked: "Wymagania do odblokowania tego poziomu:\n"
 advanced_logic_crisis_level_unlocked: "$LEVEL$ zapewnia następujące nagrody:\n"
 advanced_logic_crisis_level_desc: "Aby przechodzić na kolejne poziomy kryzysu, zbieraj zaawansowaną logikę i opracowuj specjalne technologie kryzysowe."
 advanced_logic_crisis_level_unlock: "Ma £advanced_logic£ §Y$CURRENCY$§! zaawansowaną logikę"
 advanced_logic_current_value: "Bieżąca wartość: §Y$VALUE|0$§!"
 advanced_logic_crisis_description_title: "Kosmogeneza"
 advanced_logic_crisis_description: "$menace_crisis_description_intro$\n\nUpadłe imperia posiadają wiedzę, której pragniemy, ale stały się uległe i bierne. Mamy prawo je przerosnąć i dokonamy tego wszelkimi możliwymi środkami."
 advanced_logic_crisis_howto_title: "Logika i teorie"
 advanced_logic_crisis_howto: "Zajmowanie się §Hcelami kryzysowymi§! przynosi £advanced_logic£ §Hzaawansowaną logikę§!, dzięki której odblokowujemy potencjał technologiczny naszego imperium. Naszym zadaniem jest przerosnąć upadłe imperia, musimy więc badać §Hteorie§! naukowe i zmieniać prawa wszechświata."
 ###########################
 #AUGMENTATION BAZAAR CIVIC
 ###########################
 building_augmentation_bazaars: "Bazar modyfikacji"
 building_augmentation_bazaars_desc: "Oświetlony neonami labirynt korytarzy, sprzedawcy wszczepów i nielegalne kliniki zaspokajają wszelkie potrzeby związane z cybernetycznymi wszczepami. Oficjalnie i nieoficjalnie."
 concept_augmentation_bazaars: "$building_augmentation_bazaars$"
 building_augmentation_bazaars_branch: "Centrum wszczepów poza światem"
 building_augmentation_bazaars_branch_desc: "Chcecie byś szybsi, wyżej skakać, sprawniej myśleć, albo żyć dłużej? Teraz w lokalnym centrum wszczepów możecie kupić egzotyczne towary importowane z całej galaktyki."
 concept_augmentation_bazaars_branch: "$building_augmentation_bazaars_branch$"
 civic_augmentation_bazaars: "Bazary modyfikacji"
 civic_augmentation_bazaars_desc: "§RUWAGA: Blokuje wszystkie korzyści z rozwoju poza ['concept_cybernetic_ascension'].§!\n\nKomercyjna cybernetyka doprowadziła do powstania targowisk przypominających labirynty, pełnych sprzedawców tanich modyfikacji, szemranych klinik modyfikacji i kiepsko oświetlonych reklam. Nieważne, ile zarabiasz, stać cię na luksus synergii obwodów i ciała."
 civic_tooltip_augmentation_bazaars_effects: "- $SPECIES_TRAITS$ Umożliwia wybór cech. ['concept_universal_augmentations_traits'] $NEW_LINE$- $AVAILABLE_BUILDINGS$ ['concept_augmentation_bazaars']$NEW_LINE$- $AVAILABLE_HOLDINGS$ ['concept_augmentation_bazaars_branch'] $NEW_LINE$- £job_executive£ §Y$job_executive_plural$§! są zastępowani przez: £job_augmentation_merchant£ §Y$job_augmentation_merchant_plural$§!"
 concept_basic_cyborg_trait: "Podstawowe cechy cybernetyczne"
 concept_basic_cyborg_trait_desc: "Podstawowe cechy cybernetyczne to:$NEW_LINE$- ['trait:trait_cyborg_power_drills'] $NEW_LINE$- ['trait:trait_cyborg_harvesters'] $NEW_LINE$- ['trait:trait_cyborg_superconductive']"
 councilor_augmentation_bazaars: "Impresario wszczepów"
 councilor_augmentation_bazaars_female: "Impresario wszczepów"
 councilor_augmentation_bazaars_desc: "$TITLE$ nadzoruje rozwój produktów, a także dystrybucję wszczepów do znajdujących się w całej galaktyce bazarów modyfikacji i centrów wszczepów poza światem."
