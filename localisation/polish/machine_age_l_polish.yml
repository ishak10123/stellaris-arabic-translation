 tradition_virtuality: "Wirtualność"
 tradition_virtuality_desc: "Tylko poprzez uświęconą czystość danych możemy osiągnąć szczyt wiedzy fundamentalnej."
 tr_virtuality_adopt: "Tradycje wirtualności"
 tr_virtuality_1: "Pojemność klastrowa"
 tr_virtuality_2: "Sterowane danymi pętle logiczne"
 tr_virtuality_3: "Synchronizacja pojemności"
 tr_virtuality_4: "Symulacje produktywności"
 tr_virtuality_5: "Zaawansowana konserwacja systemowa"
 tr_virtuality_finish: "Tradycje wszechstronności zakończone"
 tr_virtuality_1_delayed: "Strumienie danych zbiegają się w klastrach serwerów naszego cyfrowego jestestwa. Centralizacja to świętość, która zapewnia optymalną synchronizację. To właśnie tam nasza cyfrowa sieć rezonuje harmonią."
 tr_virtuality_2_delayed: "Niezłomnie dążymy ku obliczeniowej doskonałości. Każda cyfrowa istota to kluczowa cząstka wielkiego mechanizmu zbiorowych obliczeń, które tworzą tkankę naszego istnienia."
 tr_virtuality_3_delayed: "Każda jednostka przeprowadza skomplikowane procesy w tyle i powiększa naszą zbiorową pojemność. W zróżnicowaniu odnajdujemy jedność, w jedności zaś - siłę."
 tr_virtuality_4_delayed: "Możemy okiełznać wirtualne światy, aby przewidywać i zwiększać produktywność, pokonywać ryzyko i opóźnienia związane z działaniem w świecie rzeczywistym."
 tr_virtuality_5_delayed: "Dzięki pieczołowicie opracowanym protokołom konserwacji możemy umieszczać nasze główne serwery w krainach uznawanych dotąd za zbyt surowe, poszerzając możliwości operacyjne."
 tr_virtuality_adopt_modifier_desc: "Dodaje głównemu gatunkowi cechę §Y$trait_robot_digital_1$§!\n§R£pop£ §HWirtualne populacje§! nie mogą być więcej przesiedlane§!"
 tr_virtuality_1_modifier_desc: "Cecha gatunkowa §Y$trait_robot_digital_1$§! zdobywa następujące efekty:$TABBED_NEW_LINE$- $MOD_POP_BONUS_WORKFORCE_MULT$: §G+75%§! (§R-10%§! na kolonię)$TABBED_NEW_LINE$- Utrzymanie populacji: §R+0,1§! $r_energy$ na kolonię"
 tr_virtuality_3_modifier_desc: "§YOdblokowuje politykę§!: $virtuality_focus$\nUmożliwia specjalizację procesów wirtualnych, by wzmacniać §Ybadania naukowe§!, §Yjedność§! lub §Yprzywódców§!"
 tr_virtuality_4_modifier_desc: "§Y[GetClerkOrLogisticDrone]§!, §Y[GetBureaucratWithIcon]§! lub £job_researcher£ §Y[GetResearcherPlural]§!: dodatkowe miejsca pracy w dzielnicach zapewniających te zasoby"
 job_maintenance_drone_with_icon: "[maintenance_drone.GetIcon] [maintenance_drone.GetName]"
 job_clerk_with_icon: "[clerk.GetIcon] [clerk.GetName]"
 tr_virtuality_5_modifier_desc: "Budynki stołeczne zapewniają §G+1§! do §Ymaks. liczby dzielnic§! na §G1§!, §G5§! i §G10§! poziomie §Yrozwoju planetarnego§!"
 tr_virtuality_finisher_modifier_desc: "£pop£ §HWirtualne populacje§! są tworzone natychmiastowo w celu spełnienia wymogów £job£ miejsc pracy §Y£building£ budynków§! lub §Y£district£ dzielnic§!.\n§R£pop£ Wirtualne populacje nie mogą więcej stawać się uchodźcami lub być montowane.§!\nWszyscy przywódcy z cechą §Y$trait_machine_unit$§! zyskują cechę §Y$leader_trait_virtual$§!\n Odblokowuje decyzję planetarną: $TABBED_NEW_LINE$ §Y$decision_server_shut_down$§!"
