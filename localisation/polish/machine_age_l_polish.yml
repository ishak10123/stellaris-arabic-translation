 building_lathe_capital: "Jednostka przetwarzająca"
 building_lathe_capital_desc: "Kwantowa natura jednostek przetwarzających krosna synaptycznego pozwala prowadzić równoległe obliczenia w wielu warstwach wymiarowych."
 building_lathe_major_capital: "Jednostka przetwarzająca: Równoległa"
 building_lathe_major_capital_desc: "Ta ulepszona jednostka przetwarzająca teraz radzi sobie lepiej w prowadzeniem działań równoległych, odbijając kognitywne echa czipów neuronowych w zamkniętych obszarach przestrzeni gamma."
 building_lathe_super_capital: "Jednostka przetwarzająca: Wektorowa"
 building_lathe_super_capital_desc: "Ta ulepszona jednostka przetwarzająca przyspiesza obliczenia dzięki wytwarzaniu negatywnych wektorów przestrzennych. Ta wymiarowa segmentacja procesów doskonale wpływa na wydajność i stabilność."
 building_lathe_resonator: "Rezonator synaptyczny"
 building_lathe_resonator_desc: "Rezonatory ujarzmiają i przekierowują potencjał kognitywny zbłąkanych myśli oraz systemów autonomicznych. Dzięki temu każdy czip zwiększa wydajność swoich sąsiednich jednostek przetwarzających."
 lathe_resonator_tt: "§Y$job_neural_chip_plural$§! Wydajność: §G+1%§! za §Y$job_neural_chip_plural$§!\n(Obecne wartość: §G+[num_neural_chips]%§!)"
 building_lathe_stabilisator: "Stabilizator neuronowy"
 building_lathe_stabilisator_desc: "Systemy stabilizujące odfiltrowują szumy obliczeniowe powstające, gdy czipy neuronowe odczuwają fizyczny dyskomfort. Redukcja zakłóceń zwiększa ogólną wydajność."
 building_lathe_overclocker: "Akcelerator synaptyczny"
 building_lathe_overclocker_desc: "Krosno zostało zaprojektowane tak, aby chroniło zainstalowane czipy neuronowe i jak najdłużej zachowywało ich produktywność. Akcelerator może zastępować te polecenia, dzięki czemu wydajność jest większa i szybsza, jednak kosztem częstszych awarii."
 building_lathe_preserver: "Konserwator synaptyczny"
 building_lathe_preserver_desc: "Organiczne elementy sieci są szczególnie wrażliwe na fluktuacje energetyczne, które mogą doprowadzić do szybkiej degeneracji aksonowej. Konserwator ma za zadanie ograniczać te fluktuacje, aby chronić najdelikatniejsze części krosna synaptycznego."
 building_lathe_reactor: "Powiększony reaktor"
 building_lathe_reactor_desc: "Im więcej czipów wpiętych do sieci, tym więcej energii potrzeba na jej utrzymanie. Zainstalowanie dodatkowych reaktorów ułatwi logistykę zasilania krosna synaptycznego."
 building_lathe_life_support: "Wspornik synaptyczny"
 building_lathe_life_support_desc: "Specjalne obiekty organizują serwisowanie najistotniejszych elementów krosna, co pozwala wykorzystywać większą liczbę czipów i poprawia jakość środowiska sieciowego."
 building_lathe_cogitator: "Analizator synaptyczny"
 building_lathe_cogitator_desc: "Obliczenia związane z nadprzestrzennymi łańcuchami zaopatrzenia są skomplikowane. Przekierowanie do tego zadania części mocy obliczeniowej pozwoli nawet największej flocie wedrzeć się głębiej na terytorium wroga."
 building_lathe_cogitator_tt: "§YLimit marynarki wojennej§!: §G+1%§! z §Y$job_neural_chip_plural$§!\n(Obecna wartość: §G+[num_neural_chips]%§!)\n§YGromadzenie doświadczenia statku§!: §G+2%§! za §Y$job_neural_chip_plural$§!\n(Obecna wartość: §G+[num_neural_chips_double]%§!)"
 building_lathe_validator: "Ratyfikator synaptyczny"
 building_lathe_validator_desc: "Głównym zadaniem specjalistycznych funkcji ratyfikatora jest wspomaganie teorii nieskończoności, jednak może on też udzielać bardziej ogólnej pomocy obliczeniowej."
 building_lathe_validator_tt: "$mod_category_computing_research_speed_mult$: §G+1%§! za §Y$job_neural_chip_plural$§!\n(Obecne wartość: §G+[num_neural_chips]%§!)"
 ### Synaptic Lathe UI
 SYNAPTIC_LATHE_STABILITY_DESC: "§E$r_stability$ to miara stabilności globalnej sieci krosna synaptycznego. Zależy ona głównie od £happiness£ §Yzadowolenia§! czipów neuronowych.\n\nMoże być osłabiona przez takie warunki jak £housing£ §Rprzeludnienie§! i £amenities£ §Rmało udogodnień§!. Świat mający wysoką $PLANET_STABILITY_TITLE$ będzie produkować więcej zasobów, a ten o niskiej wytworzy ich mniej. W przeciwieństwie do innych kolonii krosno synaptyczne nie może być ogarnięte §Ybuntami§! na dużą skalę.§!"
 SYNAPTIC_LATHE_RESISTANCE_DESC: "§E§YOpór§! to miara ogólnego poziomu zakłóceń powodowanych przez czipy neuronowe. Wysoki poziom £crime£ §Yoporu§! prowadzi do zwiększenia §Yspadku ludności§! i zwiększa szanse jej ucieczki. Zwykle występuje w dużych populacjach planetarnych, można ją ograniczyć, zwiększając £happiness£ §Yzadowolenie populacji§! albo budując £building£ §Ystabilizatory neuronowe§!.§!"
 SYNAPTIC_LATHE_HOUSING_DESC: "§E§Y$PLANET_HOUSING_TITLE$§! odzwierciedla infrastrukturę przeznaczoną do przechowywania czipów neuronowych. Brak miejsca do odpowiedniej akomodacji i utrzymania czipów neuronowych spowoduje, że $r_stability$ zostanie zmniejszona. Możesz zwiększyć liczbę §Ymieszkań§!, budując dodatkowe £district£ §Ydzielnice§!, ulepszając §Yjednostkę przetwarzającą§! albo budując £building£ §Ywsporniki synaptyczne§!.§!"
 SYNAPTIC_LATHE_AMENITIES_DESC: "§E§Y$PLANET_AMENITIES_TITLE$§! odzwierciedla infrastrukturę przeznaczoną do podtrzymywania życia czipów neuronowych. Planeta, której $PLANET_AMENITIES_TITLE$ są produkowane w zbyt małej ilości dla swojej populacji, otrzyma kary do £happiness£ §Yzadowolenia§!. Możesz zwiększyć liczbę §Yudogodnień§!, ulepszając §Yjednostkę przetwarzającą§! albo budując £building£ §Ywsporniki synaptyczne§!.§!"
 SYNAPTIC_LATHE_RESISTANCE_TITLE: "Opór"
 POP_BASE_RESISTANCE: "Opór podstawowy: $VALUE|2Y$"
 TOOLTIP_RESISTANCE: "Opór: £crime£ $VALUE|Y1$"
 lathe_cant_colossus: "Nie można użyć na §Ykrośnie synaptycznym§!"
