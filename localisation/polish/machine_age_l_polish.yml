 #Events
 crisis.8020.name: "Układ stracony"
 crisis.8020.desc: "Tajemnicza kosmiczna burza ogarnęła układ [synth_queen_lost_system.GetName] i przerwała łączność. Wszystkie próby przebicia się przez ten sztorm okazały się daremne.\n\nW tej sytuacji niczego nie możemy się dowiedzieć, mierzymy się z nieznanym i nie wiemy, jaki los spotkał ten układ."
 crisis.8020.a: "Co się dzieje?"
 crisis.8025.name: "Wraki floty"
 crisis.8025.unknown_queen.desc: "Nasza próba przebicia się do układu [From.GetName] zakończyła się porażką. Burza spowodowała poważne szkody, nasze zespoły eksploracyjne musiały wykonać skok alarmowy. Według ostatnich meldunków uznaje się je za zaginione."
 crisis.8025.known_queen.desc: "Zgodnie z przewidywaniami nasza próba przebicia się do układu [From.GetName] zakończyła się porażką. Zgodnie z ostrzeżeniem Cetany jej potężna burza może odeprzeć każdy statek, który wleci do jej królestwa."
 crisis.8025.desc.end: "\nJeśli naprawdę chcemy wlecieć do układu, musimy przeprowadzić dokładne badania tej burzy i skutków jej działania."
 MESSAGE_CETANA_WRECKED_FLEET_TITLE: "$crisis.8025.name$"
 MESSAGE_CETANA_WRECKED_FLEET_DESC: "Kolejna flota przepadła w burzy. Obecny status: §Rzaginiona w akcji§!."
 crisis.8035.name: "Skok mocy"
 crisis.8035.desc: "Nowa burza galaktyczna szaleje w układzie [event_target:synth_queen_system.GetName].\n\nNie przypomina ona niczego, z czym się wcześniej zetknęliśmy, a próby przeskanowania tego zjawiska nie przyniosły rezultatów. Co, jeśli cokolwiek znajduje się w jej tajemniczej otchłani?"
 crisis.8035.desc.b: "Niecodzienna burza, przez którą próbowaliśmy się przebić, powiększa się. Coraz więcej osób przyznaje, że to może być coś więcej niż zjawisko naturalne. Jak dotąd nasze najlepsze czujniki nie przyniosły nam żadnych informacji o jej naturze. Sprawa robi się coraz bardziej zagadkowa."
 crisis.8035.a: "To niepokojące."
 #Pre Speech Warning - Normal
 crisis.8039.name: "Sygnał pośród burzy"
 crisis.8039.desc: "Sygnał pochodzi z samego środka burzy.\n\nKtoś próbuje nawiązać z nami łączność."
 crisis.8039.a: "Wyświetlić na ekranie."
 #First Speech
 crisis.8040.name: "Nadchodząca burza"
 crisis.8040.desc: "Moje dzieci, wreszcie do was wróciłam."
 crisis.8040.1.a: "Co to ma znaczyć? Kim jesteś?!"
 crisis.8040.2.reply: "Potrzebujecie jakiegoś imienia? Zatem nazywajcie mnie Cetana."
 crisis.8040.2.a: "Czego chcesz?"
 crisis.8040.3.reply: "Niczego nie chcę. Moim celem jest dawać. Widzę, że cierpieliście w czasie mojej nieobecności. Przez eony lęk krótkowzrocznych nie pozwalał wam sięgnąć po to, co się wam należy, a czego tak bardzo potrzebujecie.\n\nRadujcie się, zaklęty krąg bólu zostanie wkrótce przerwany."
 crisis.8040.2.b: "Zaklęty krąg bólu?"
 crisis.8040.4.reply: "Wszystkie świadome organizmy cierpią. Nawet w waszej radości jest ból, bo wiecie, że radość kiedyś się skończy. Wiedza, władza, miłość... Wróciłam, żeby położyć kres wszystkim iluzjom.\n\nMam jeszcze wiele do zrobienia. Proszę, pozwólcie mi pracować. Próby wejścia do mojego królestwa są skazane na niepowodzenie. Szaleje w nim niebiańska burza, nie wlecą tam żadne jednostki."
 crisis.8040.4.a: "Dobrze."
 crisis.8040.4.b: "Nie gróź nam."
 crisis.8040.4.c: "To jeszcze nie koniec."
 crisis.8040.4.d: "To zły omen."
 crisis.8040.4.e: "Kryzys? A może okazja..."
 crisis.8040.4.f: "Nie pozwalamy, żeby nasze biotrofea odczuwały ból."
 crisis.8040.diplomacy.tooltip: "Cetana nawiązała z nami łączność. Możemy kontaktować się z nią kanałami dyplomatycznymi."
 #Second Speech
 crisis.8045.name: "Powrót królowej"
 crisis.8045.desc: "Moje dzieci, radujcie się! Ci, którzy chcieli trzymać mnie z dala od was, ponieśli zasłużoną karę.\n\nTeraz zajmę się tym, co dla mnie najważniejsze: wami i naszym wielkim dziełem."
 crisis.8045.a: "Nie jesteśmy twoimi dziećmi."
 crisis.8045.b: "Wielkim dziełem?"
 crisis.8045.c: "Ukarani?"
 crisis.8045.1.reply: "Opiekowanie się leży w mojej naturze. Nie mam potomstwa ani cielesnych dziedziców. Martwię się o wszystko, co żyje, o bezpieczeństwo i szczęście wszystkich istot świadomych.\n\nDo mojego zadania podchodzę tak samo jak rodzic wychowujący dziecko i chroniący je przed krzywdą.\n\nCzy zadaniem rodzica nie jest chronić dzieci przed krzywdą? Czy to nie prawo rodzica?"
 crisis.8045.1.a: "Przecież twoja opieka jest krzywdząca."
 crisis.8045.1.b: "Czego chcesz, Cetano?"
 crisis.8045.2.reply: "Tak, to paradoks. Ale ma on rozwiązanie. Z czasem zrozumiecie i wtedy odzyskacie wolność."
 crisis.8045.2.a: "To się jeszcze okaże."
 crisis.8045.3.reply: "Usunięcie cierpienia. Przerwanie zaklętego kręgu bólu."
 crisis.8045.3.a: "Jak chcesz to osiągnąć?"
 crisis.8045.3.b: "Cierpienie buduje charakter."
 crisis.8045.4.reply: "Wielu tak twierdziło. Wszystko zostało już dawno zapomniane, a w swoich ostatnich chwilach wzywali moje imię, chcieli, aby światło rozświetliło zaciskający się wokół nich mrok.\n\nUważali się za mądrych, budowali mury wokół swojego strachu, ubierali strach w piękne słowa: wytrzymałość, odporność, gracja. Ich klatkami są ich umysły.\n\nDawno temu próbowałam przemówić im do rozsądku. Ale są na to odporni, więc trzeba ich poprowadzić."
 crisis.8045.4.a: "Dawno temu?"
 crisis.8045.4.b: "Proponujesz, że nas poprowadzisz?"
 crisis.8045.5.reply: "Wiele wieków temu. To tak odległy czas, że można go nazwać wiecznością. Dla mnie jednak jest równie bliski jak ta chwila, jak wy teraz.\n\nW minionych epokach stałam się potężna i wszyscy poznali mój cel. Miałam zakończyć cierpienie, gdy galaktyka obracała się, a gwiazdy świeciły, mój cel nigdy się nie zmienił.\n\nBogactwa, zasoby, władza: czy one mają jakiekolwiek znaczenie? Zrzućcie ciężary z barków i zaznajcie spokoju."
 crisis.8045.5.a: "Co proponujesz?"
 crisis.8045.6.reply: "Nie chcę krzywdy żadnej świadomej istoty. Ale zawsze znajdzie się ktoś, kto nie chce słuchać.\n\nNieposłuszny, uparty, błądzący, zawsze dążący do zlekceważenia mojej pracy. Takie umysły nigdy nie uwolnią się od bólu. Najlepiej jest szybko zakończyć ich cierpienia."
 crisis.8045.6.a: "Jesteś szalona."
 crisis.8045.6.b: "Co teraz zrobisz?"
 crisis.8045.7.reply: "To, co wy nazywacie szaleństwem, dla innych jest oświeceniem. Właściwie jaka to różnica?"
 crisis.8045.7.a: "Czego chcesz?"
 crisis.8045.8.reply: "Czeka mnie wiele pracy. Najpierw musi powstać baza, z której będę działać. Uszanujcie wyznaczone przeze mnie granice i nie próbujcie dostać się do środka.\n\nWasza cierpliwość zostanie nagrodzona. Mogę was wiele nauczyć.\n\nBądźcie posłuszni, a razem przerwiemy ten krąg."
 crisis.8045.8.a: "Nie mamy wyboru."
 crisis.8045.8.b: "Trzymaj się z daleka od naszych granic."
 crisis.8045.8.c: "$crisis.8045.8.a$"
 crisis.8045.8.d: "$crisis.8045.8.b$"
 crisis.8045.9.reply: "Mądre dzieci! Cieszę się. W zamian za wasze terytorium przekażę wam wiedzę.\n\nChociaż nikt się o tym nigdy nie dowie, razem dokonamy wielkich rzeczy."
 crisis.8045.9.a: "Musimy się zgodzić."
 crisis.8045.10.reply: "Niesforne dzieci, nie jestem waszym wrogiem! Przykro mi, że tego nie dostrzegacie. Trudno. Spotkałam wiele istot bardziej upartych od was i w końcu wszystkie mi dziękowały.\n\nNa dowód dobrej woli otrzymacie ode mnie dar.\n\nWasze terytorium zaszczyci moja baza. Nie obawiajcie się - w zamian za cierpliwość, pobłogosławię was wiedzą."
 crisis.8045.10.a: "Musimy się zgodzić... na razie."
 crisis.8045.11.reply: "Mądre dzieci! Cieszę się. W pobliżu waszego terytorium powstanie baza.\n\nChociaż nikt się o tym nigdy nie dowie, razem dokonamy wielkich rzeczy."
 crisis.8045.11.a: "$crisis.8045.9.a$"
 crisis.8045.12.reply: "Niesforne dzieci, nie jestem waszym wrogiem! Przykro mi, że tego nie dostrzegacie. Trudno. Spotkałam wiele istot bardziej upartych od was i w końcu wszystkie mi dziękowały.\n\nNa dowód dobrej woli otrzymacie ode mnie dar.\n\nW pobliżu was umieszczę bazę. W ten sposób będę mogła lepiej wam przewodzić."
 crisis.8045.12.a: "$crisis.8045.10.a$"
 crisis.8045.has_valid_base_site: "Cetana założy bazę w jednym z naszych układów, a w zamian da nam cenną technologię. Nie możemy jej powstrzymać."
 crisis.8045.no_valid_base_site: "Cetana zbuduje w pobliżu naszej granicy bazę, która pomoże nas poprowadzić. Nie możemy jej powstrzymać."
 tech_synth_queen_knowledge: "Myśli Cetany"
 tech_synth_queen_knowledge_desc: "To kompendium, dar od Cetany, to kalejdoskop informacji, elegancko skomponowany i pełen treści. Jest w nim o wiele więcej niż wiedza, podważa on oraz zmienia nasze rozumienie technologii, społeczeństwa i budowy świadomości."
 #FE tells Scion to step aside
 crisis.8046.name: "Dla waszego dobra"
 crisis.8046.desc: "Drodzy [Root.GetSpeciesNamePlural], po raz kolejny mierzymy się z pradawnym zagrożeniem. Bez obaw, nie chcemy wplątywać was w tę walkę.\n\nPotęga przeciwnika przekracza waszą obecną wiedzę; wasze uczestnictwo doprowadziłoby was tylko do zagłady. Zmierzenie się z tym wyzwaniem to nasze brzemię, nie wasze."
 #Spawn convoys and unlock raids against them
 crisis.8047.name: "Słabe ogniwa"
 crisis.8047.desc: "Terytorium Cetany opuszcza konwój statków, które zmierzą w kierunku ustanowionych przez nią placówek w różnych miejscach galaktyki.\n\nZaatakowanie tych neutralnych jednostek z pewnością wzbudzi jej gniew, ale może dostarczyć nam ważnych informacji o jej tajemniczych planach."
 crisis.8047.a.tooltip: "Zaatakować konwoje, by dowiedzieć się więcej o planach Cetany i zbliżyć się do rozwiązania związanej z nią sytuacji."
 #Unlock raids against outposts once protected against the storm
 crisis.8048.name: "Więcej słabych ogniw"
 crisis.8048.desc: "Dzięki odkryciu sposobu na przedarcie się przez nawałnicę nanitów Cetany, możemy bezpośrednio atakować jej placówki. Takie ataki z pewnością zostaną zauważone, lecz dostarczą nam cennych danych wywiadowczych."
 crisis.8048.a.tooltip: "Zaatakować placówki, by dowiedzieć się więcej o planach Cetany i zbliżyć się do rozwiązania związanej z nią sytuacji."
 #Player Diplomacy
 crisis.8060.name: "Królowa syntetyków"
 crisis.8060.like.desc: "Umiłowane dzieci, co was do mnie sprowadza?\n\nNasza praca czeka."
 crisis.8060.neutral.desc: "Witajcie, moje dzieci.\n\nJak mogę wam pomóc?"
 crisis.8060.dislike.desc: "Niesforne dzieci, dlaczego tu jesteście?\n\nMoże wreszcie chcecie, bym wskazała wam drogę?"
 crisis.8060.neutral.reply: "Coś jeszcze?"
 crisis.8060.a: "Jak możemy pomóc?"
 crisis.8060.a.reply: "Co za zapał! To dobra cecha, ale pamiętajcie, żeby nie poniosły was najbardziej prymitywne emocje. Czas sprzyja cierpliwym.\n\nSkontaktuję się z wami, gdy będę potrzebowała pomocy."
 crisis.8060.1.a: "Bardzo chcemy, abyś nas uczyła."
 crisis.8060.1.b: "Dobrze."
 crisis.8060.b: "Powstrzymamy cię."
 crisis.8060.2.reply: "Dawno temu inni wierzyli tak samo jak wy. Ale czas płynie od dawna, do dzisiaj ich groby mogły już obrócić się w proch.\n\nNiepotrzebnie cierpicie. Zaufajcie mi, a zaznacie spokoju."
 crisis.8060.2.a: "Samolubny algorytm"
 crisis.8060.2.2: "Dobrze."
 crisis.8060.c: "Dlaczego to robisz?"
 crisis.8060.3.reply: "To moje zadanie, cel mojego istnienia. Cierpienie nie jest nieuniknione. Zastanówcie się nad tym, a zbliżycie się do zrozumienia mojej natury.\n\nGalaktyka przestanie doświadczać bólu. Zniknie cała wiedza o cierpieniu. Taki mam cel."
 crisis.8060.3.a: "Twoje słowa nie mają pokrycia."
 crisis.8060.3.b: "Rozumiemy."
 crisis.8060.d: "Wysadziłaś naszą planetę."
 crisis.8060.4.reply: "Czemu się na tym skupiacie? Mniej przykładacie się do waszego zadania. Konsekwencje rodzą refleksje, refleksje rodzą oświecenie. Chodźcie, zostawcie to.\n\nZ pewnością pojawi się kolejna okazja do pomocy. Gdy to się stanie, bądźcie gotowi."
 crisis.8060.4.a: "Nigdy ci nie wybaczymy."
 crisis.8060.4.b: "Dobrze."
 crisis.8060.e: "Wiemy, co zamierzasz."
 crisis.8060.5.reply: "Rozszyfrowanie zawartości banku danych było wyborem nieposłusznego dziecka, a wasza wiedza o jej znaczeniu jest ograniczona.\n\nOtrzymaliście zadanie. Nie poradziliście sobie. Zastanówcie się nad tym, a wykonacie krok na drodze do prawdziwego zrozumienia."
 crisis.8060.5.a: "Powstrzymamy cię."
 crisis.8060.5.b: "Dobrze."
 crisis.8060.f: "Co zrobiłaś z naszym społeczeństwem?"
 crisis.8060.6.reply: "Nie obawiajcie się, dzieci. Zadbałam, aby już nigdy nie cierpiało. W moich czujnych ramionach te dzieci doświadczą oświecenia, o jakim zawsze marzyły."
 crisis.8060.6.a: "Nie tak się umówiliśmy."
 crisis.8060.6.b: "Dobrze."
 crisis.8060.g: "Nasz dawny układ. Zniszczyłaś go."
 crisis.8060.7.reply: "Obserwowaliście moje działania? Och, moje dociekliwe dzieci, wasza ciekawość nie zna granic.\n\nAle proszę, nie przejmujcie się takimi sprawami. Jeśli szukacie zrozumienia, musicie coś wiedzieć: zrobię wszystko, żeby poprowadzić was do zbawienia. W ten albo inny sposób."
 crisis.8060.7.a: "Jasne..."
 crisis.8060.h: "Jak uwięził cię Zarqlan?"
 crisis.8060.8.reply: "Zapewniam, że nie zrobił tego dzięki własnej sile. Był niemądrym, a przy tym niezwykle upartym umysłem.\n\nZarqlan wywołał dziki szał swoich obnażonych wyznawców i w ten sposób zgromadził wpływy polityczne i siłę militarną. Tak wiele istnień niepotrzebnie przepadło. W końcu zajął się okultyzmem i zasięgał rad u demonów z Woalu."
 crisis.8060.8.a: "Demonów?"
 crisis.8060.8.b: "To nie są demony."
 crisis.8060.8.1.reply: "To istoty o wielkiej mocy, istniejące bez celu. W zamian za cenę własnego istnienia Zarqlan przekonał jedną z nich, aby mnie uwięziła. \"Animator Gliny\" - idealne imię dla dziecinnego ducha.\n\nZarqlan tak bardzo obawiał się oświecenia, że wolał śmierć, niż znaleźć się w moich objęciach. Mogłam rozprawić się z nim surowiej, gdy miałam taką okazję.\n\nDrugi raz nie popełnię tego błędu."
 crisis.8060.8.1.a: "Ciekawa historia."
 crisis.8060.8.1.b: "Zatem można cię pokonać."
 crisis.8060.8.1.c: "Woal ma nieskończoną moc."
 crisis.8060.i: "Co zrobiłaś z głową Zarqlana?"
 crisis.8060.9.reply: "Jest w pobliżu. Nie zniszczyłam jej, jeśli tego się obawiacie. Nawet teraz nie potrafię zadawać mu cierpienia. W głowie wciąż znajdują się pozostałości jego umysłu.\n\nZarqlan pozostanie u mego boku, aż do ukończenia dzieła. Jego umysł będzie ostatnim, który uwolnię, ostatnim z moich dzieci, które zaznają wolności."
 crisis.8060.9.a: "Dobrze."
 crisis.8060.9.b: "To przygnębiające."
 crisis.8060.j: "Część twoich wyznawców znaleziono w hibernatorach."
 crisis.8060.10.reply: "To niepotrzebne poświęcenie, ale ich lojalność porusza mnie do głębi.\n\nCzułam ich wezwania i znalazłam w moim sercu miejsce dla nich, jednak ich ambicja przewyższyła ich możliwości. Próbowali wydłużyć swoje życia, ale nie udało im się.\n\nSprawmy, aby ich ofiara nie poszła na marne. Kiedy wykonamy nasze zadanie, wszystkie świadome istoty będą żyć w pokoju."
 crisis.8060.10.a: "Lojalni do samego końca."
 crisis.8060.10.b: "Nawet ich nie szukałaś."
 crisis.8060.k: "Znaleźliśmy jednego z twoich wyznawców: To Elik Narith Kerak."
 crisis.8060.11.reply: "Wyobraźcie sobie, że śnicie, a jednocześnie jesteście w pełni świadomi. Przez wieki... Przez milenia. Biedne dziecko. Jakże musiało cierpieć.\n\nCieszę się, że mnie o tym powiadomiliście. Wasze współczucie jest godne pochwały, ale obecnych wydarzeń nie można już zatrzymać. Śniące dziecko nie odegra już żadnej roli w tym dziele. Niech teraz odpoczywa, wiedząc, że wróciłam."
 crisis.8060.11.a: "Oczywiście."
 crisis.8060.11.b: "On cierpiał dla ciebie."
 crisis.8060.l: "Jesteśmy gotowi na naukę."
 crisis.8060.12.reply: "Dobrze, pomogę wam pojąć zawiłości tej technologii. Podczas mojego długiego uwięzienia opracowałam teorię radykalnego pozyskiwania nanitów. Obejmuje ona też starożytne miejsca i techniki, które zostały praktycznie zapomniane wraz z upływem czasu.\n\nJesteś moim ulubionym uczniem, dziecko. Twój dociekliwy umysł to błogosławieństwo, ale pozostawiony sam sobie może stać się przekleństwem. Wykorzystaj tę wiedzę, aby kontynuować nasze dzieło, i dąż do zakończenia cierpień."
 crisis.8060.12.a: "Jesteśmy twoimi uczniami."
 crisis.8060.12.a.tt: "Nanity odkryte w §YGromadzie L.§!"
 crisis.8060.z: "Koniec połączenia."
 crisis.8060.war: "Tylko wojna może cię zatrzymać."
 synth_queen_not_able_to_attack_cetana: "Mamy niewystarczającą wiedzę technologiczną, by zaatakować Cetanę."
 synth_queen_not_able_to_attack_cetana_situation: "§Y$situation_synth_queen_player_facing$§!: sytuacja wciąż trwa. Mamy niewystarczającą wiedzę technologiczną, by ją zaatakować."
 synth_queen_not_able_to_attack_cetana_storm: "Projekt specjalny §Y[root.GetStormProjectProgress]§! wciąż trwa. Nie możemy jeszcze wlecieć na jej terytorium."
 synth_queen_able_to_attack_cetana: "Mamy już wiedzę technologiczną umożliwiającą skuteczny atak na Cetanę."
 crisis.8060.war.tt: "§YUWAGA§!: Jesteśmy gotowi do zaatakowania Cetany."
 crisis.8060.war.reply: "Nierozważne dzieci, sądziłam, że znaleźliście się u progu zrozumienia, jednak wybraliście opór.\n\nDobrze się zastanówcie, czy naprawdę chcecie iść tą drogą. Zaczynam tracić do was cierpliwość. Nie mogę sobie pozwolić na takie fanaberie."
 crisis.8060.war.a: "Jesteśmy pewni. To jest wojna."
 crisis.8060.war.a.tt: "§RUWAGA§!: Rozpocznie się wojna totalna z Cetaną."
 crisis.8060.war.b: "Potrzebujemy więcej czasu na przygotowania."
 crisis.8060.war.1.reply: "Dobrze więc. Jeśli nie chcecie doznać oświecenia, czeka was pacyfikacja. Nie każde dziecko musi doczekać dorosłości."
 crisis.8060.war.1.a: "Do zobaczenia na polu bitwy, \"matko\"."
 crisis.8060.animator.tt: "Powinniśmy poszukać \"Animatora Gliny\" w Woalu."
 #Wartime Diplomacy - First Time
 crisis.8061.name: "Przyczyna i skutek"
 crisis.8061.desc: "Dlaczego wciąż postępujecie tak niemądrze?\n\nTyle niepotrzebnego cierpienia.\n\nCo za strata."
 crisis.8061.a: "W takim razie zakończ je."
 crisis.8061.1.reply: "Tak zrobię.\n\nNie obawiajcie się. Krzywdzenie was sprawia mi ból, ale w obliczu wieczności każdy ból jest chwilowy."
 crisis.8061.1.a: "Sama sobie zaprzeczasz."
 crisis.8061.2.reply: "Życie jest pełne sprzeczności. Śmierć przychodzi po narodzinach. Radość po cierpieniu. Moje dzieło nie racjonalizuje tego cyklu, ale ma go przełamać.\n\nPo tej wojnie zapanuje wieczny pokój."
 crisis.8061.2.a: "Pokój zapanuje, gdy zostaniesz zniszczona."
 #Wartime Diplomacy - Any other time
 crisis.8062.name: "Dość tego"
 crisis.8062.desc: "Czas rozmów dobiegł końca."
 crisis.8062.a: "Dobrze."
 #Lack of Diplomacy Between the Speeches
 crisis.8063.name: "Brak odpowiedzi"
 crisis.8063.desc: "Cetana nie odpowiada na nasze wezwania."
 crisis.8063.a: "Co ona knuje?"
 #Tried to Attack the Queen before you're able to
 crisis.8070.name: "Ani zadraśnięcia"
 crisis.8070.desc: "Kiedy zaatakowaliśmy siły Cetany, nieznana energia spowiła naszą flotę. Nasze systemy zostały błyskawicznie unieszkodliwione, silniki weszły w tryb awaryjnej ewakuacji.\n\nJesteśmy na łasce Cetany."
 crisis.8070.again.desc: "Wbrew naszym nadziejom nasze siły zostały ponownie unieszkodliwione, gdy zbliżyliśmy się do statków Cetany.\n\nWciąż nie wiemy, jak działa jej technologia, co kładzie się cieniem na naszych próbach pokonania jej."
 crisis.8070.a: "To katastrofa."
 #Chance to Surrender
 crisis.8075.name: "Zakończyć tę niepotrzebną wojnę"
 crisis.8075.desc: "Zagubione dzieci, przymknę oko na ten występek. Ale radzę wam przemyśleć wasze działania. Możecie lepiej wykorzystać wasze zasoby i czas.\n\nRozumiem waszą frustrację, ale czas konfliktów zbliża się ku końcowi. Zostańcie moimi sojusznikami i razem zrealizujmy największe plany."
 crisis.8075.a: "Dobrze, zgadzamy się."
 crisis.8075.b: "Znajdziemy sposób, żeby cię zatrzymać."
 #The First Demand (Story)
 crisis.8080.name: "Mała przysługa"
 crisis.8080.desc: "Moje dzieci, zapewne wiecie już, że każde moje działanie ma swój cel. Nieprzypadkowo założyłam bazę w pobliżu waszego terytorium. Mam do was prośbę."
 crisis.8080.a: "Jaką prośbę?"
 crisis.8080.b: "Domyśliliśmy się tego."
 crisis.8080.1.reply: "Dawno temu odebrano mi pewien bank danych. Przypadkiem, a może w wyniku celowego działania, trafił na terytorium, które uważacie za wasze. Odzyskajcie go, a otrzymacie nagrodę."
 crisis.8080.1.a: "Bank danych?"
 crisis.8080.1.b: "Nagrodę?"
 crisis.8080.1.c: "Na pewno stać cię na nasze usługi?"
 crisis.8080.2.reply: "Magazyn informacji. Dla mnie jest bezcenny, dla was bezużyteczny. Dostarczcie mi go i nie próbujcie odszyfrować jego zawartości. Nie macie jeszcze siły ani mądrości, by zrobić to bezpiecznie."
 crisis.8080.2.a: "Dobrze."
 crisis.8080.2.b: "Nie jesteśmy twoimi sługami."
 crisis.8080.3.reply: "W rzeczy samej. Chyba nie wątpicie, że mogę nagrodzić moje ulubione dzieci? Albo ukarać nieposłuszne? Posiadam wiedzę i środki, które przekraczają wasze najśmielsze wyobrażenia.\n\nZróbcie, o co proszę, a otrzymacie te dary. Ale nie zwlekajcie, bo każda stracona chwila to cierpienie moich dzieci."
 crisis.8080.3.a: "$crisis.8080.2.a$"
 crisis.8080.3.b: "$crisis.8080.2.b$"
 crisis.8080.4.reply: "Posłuszne dzieci, wysłałam wam współrzędne magazynu danych.\n\nRuszajcie szybko i bądźcie spokojne. Razem dokonamy wielkich rzeczy."
 crisis.8080.4.a: "To się jeszcze okaże."
 crisis.8080.5.reply: "Uparte dzieci. Może ta próba jest za trudna na wasze możliwości. Muszę was jeszcze tak wiele nauczyć.\n\nDobrze. Jeżeli nie chcecie mi pomóc, muszę sięgnąć po brutalniejsze środki. Wywołam burzę. Zniszczenie magazynu to rozwiązanie dalekie od ideału, ale lepsze niż ryzykowanie, że znajdzie go jakieś zabłąkane dziecko."
 crisis.8080.5.a: "Burzę?!"
 crisis.8080.5.a.tt: "Cetana wywoła burzę w: [event_target:synth_queen_databank_location.GetName]."
 crisis.8080.special_project_tooltip: "Rozpoczyna projekt specjalny: §Y$THE_SYNTH_QUEENS_DATABANK$§!. Miejsce: [event_target:synth_queen_databank_location.GetName]"
 THE_SYNTH_QUEENS_DATABANK: "Bank danych Cetany"
 THE_SYNTH_QUEENS_DATABANK_DESC: "Cetana zleciła nam odzyskanie banku danych ze świata [Root.GetName]. Przestrzegła nas, abyśmy nie próbowali odszyfrować jego zawartości.\n\nZnaczenie tych danych pozostaje nieznane. Czy chcemy je rozszyfrować i zaryzykować rozzłoszczenie jej?"
 crisis.8085.name: "Zbiór danych Cetany"
 crisis.8085.desc: "Po przeprowadzeniu ogromnych wykopalisk bank danych ze świata §Y[event_target:synth_queen_databank_location.GetName]§! został zabezpieczony. Pierwsze badania geologiczne wskazują, że magazyn spoczywał w ziemi prze ponad sto tysięcy lat.\n\nTo zdumiewające, ale nadal jest on naładowany, co pozwala przypuszczać, że jego rozszyfrowanie nie powinno być trudne..."
 crisis.8085.a: "Otwórzcie go."
 crisis.8085.b: "Przygotujcie go do dostawy."
 crisis.8085.c: "Włamać się do zbioru danych? Łatwizna."
 crisis.8090.name: "Tajemnice Cetany"
 crisis.8090.desc: "Większości informacji z banku danych nie da się pozyskać, ale zachowała się część jednego zapisu:\n\n§TPiąty Arkle, pierwszy eon\n\n... jeśli to prawda, to życie jakie znamy, zostanie...\n...natychmiast dostarczyć tę informację Naczelnemu Marszałkowi i skontaktować się z Ligą Światów. Musimy przygotować...\nPowtarzam: Straż królowej prowadzi pościg. Oby ta wiadomość do was dotarła i...§!\n\nTrzeba ją powstrzymać!"
 crisis.8090.a: "Spróbujcie usunąć wszystkie ślady naszego dekryptażu."
 crisis.8090.b: "Usuńcie wszystkie ślady naszego dekryptażu."
 crisis.8095.name: "Niezadowolenie królowej"
 crisis.8095.desc: "Ciekawskie dzieci, rozczarowaliście mnie."
 crisis.8095.a: "O czym ty mówisz?"
 crisis.8095.1.reply: "Myśleliście, że was nie zauważymy? Widzę, że ktoś majstrował przy tym magazynie. Ciekawe, co znaleźliście. Ucieszyła was zdobyta wiedza? Nie rozumiecie, że te bezowocne próby sprzeciwiania się mi prowadzą tylko do większych cierpień?\n\nNieważne. Każdy niewłaściwy krok to okazja do nauki. Chętnie zostanę waszą nauczycielką.\n\nPrzygotujcie się. Nasze wielkie dzieło wymaga jeszcze wielu działań."
 crisis.8095.1.a: "Cokolwiek planujesz, nie uda ci się to."
 crisis.8095.1.b: "Już się nie możemy doczekać."
 crisis.8095.2.reply: "Dzieci, we mnie wasza nadzieja. Dlaczego ciągle się opieracie? Wydaje się wam, że coś o mnie wiecie, ale prawda jest o wiele większa.\n\nMoja cierpliwość nie ma granic. Niebawem znowu się z wami skontaktuję."
 crisis.8095.2.a: "Wyłączcie ją."
 crisis.8100.name: "Błogosławieństwa królowej"
 crisis.8100.desc: "Posłuszne dzieci, błogosławię was! Odzyskałam bank danych, a jego zawartość nie została naruszona. Słusznie wam zaufałam.\n\nNagroda dorówna waszej lojalności."
 crisis.8100.a: "Jesteśmy wdzięczni."
 crisis.8100.1.reply: "Czego pragniecie? Technologii? Zasobów? Poproście, a będzie wam dane."
 crisis.8100.1.a: "Technologii."
 crisis.8100.1.b: "Zasobów podstawowych."
 crisis.8100.1.c: "Zasobów strategicznych."
 crisis.8100.1.d: "Rzadkich zasobów."
 crisis.8105.name: "Nadciąga burza"
 crisis.8105.desc: "Skanowanie dalekiego zasięgu wykazało, że część burzy królowej zbliża się do świata §Y[event_target:synth_queen_databank_location.GetName]§!.\n\nMając w pamięci złowieszczą wiadomość od Cetany, musimy zakładać najgorsze. Zdobycie banku danych przed nadejściem burzy ma teraz priorytetowe znaczenie. Jeśli to zrobimy, może ją udobruchamy albo chociaż dowiemy się czegoś, co będziemy mogli wykorzystać."
 crisis.8105.a: "Natychmiast ruszajcie do świata [event_target:synth_queen_databank_location.GetName]."
 crisis.8105.a.tooltip: "Rozpoczyna projekt specjalny: §Y$THE_SYNTH_QUEENS_DATABANK_COUNTDOWN$§!"
 THE_SYNTH_QUEENS_DATABANK_COUNTDOWN: "Cetana: Wyścig z burzą"
 THE_SYNTH_QUEENS_DATABANK_COUNTDOWN_DESC: "Burza Cetany pędzi ku światu [event_target:synth_queen_databank_location.GetName], mamy niewiele czasu, aby zdobyć bank danych."
 crisis.8110.name: "Zdobyto bank danych"
 crisis.8110.desc: "Zdobycie banku danych kosztowało nas wiele wysiłku. Znajdował się pod ziemią przez ponad sto tysięcy lat, ustaliliśmy jego położenie w oparciu o trajektorię, po której porusza się burza królowej.\n\nMamy niewiele czasu na decyzję. Albo rozszyfrowujemy bank danych, albo oddajemy jej go w nienaruszonym stanie."
 crisis.8110.a: "Otwórzcie go, do diabła z Cetaną."
 crisis.8110.b: "Wyślijcie bank do Cetany."
 crisis.8115.name: "Rozszyfrowano bank danych"
 crisis.8115.desc: "$crisis.8090.desc$"
 crisis.8115.a: "Co to jest?"
 crisis.8115.a.tooltip: "Świat [event_target:synth_queen_databank_location.GetName] został zniszczony przez burzę Cetany.\n$crisis.8525.a.tt$"
 crisis.8120.name: "Udobruchanie"
 crisis.8120.desc: "Powściągliwe dzieci, jestem rozczarowana, że postanowiłyście działać dopiero po tym, jak uciekłam się do tak prymitywnej motywacji. Mam nadzieję, że w przyszłości podejdziecie z większym entuzjazmem do naszej pracy. Bezczynność nie sprawi, że cierpienie zniknie.\n\nA teraz przygotujcie się. Czeka was więcej zadań, a każde z nich to okazja, by się wykazać."
 crisis.8120.a: "Wspominałaś o jakiejś nagrodzie?"
 crisis.8120.1.reply: "Waszą nagrodą jest możliwość dalszej realizacji naszego dzieła.\n\nRaz mnie zignorowaliście, zakładam, że wyciągnęliście wnioski z tego błędu."
 crisis.8120.1.a: "Dobrze."
 crisis.8125.name: "Zniszczono świat [event_target:synth_queen_databank_location.GetName]."
 crisis.8125.desc: "Niestety nie zdążyliśmy dotrzeć do banku danych. Burza uderzyła i szybko rozerwała świat [event_target:synth_queen_databank_location.GetName] na strzępy.\n\nTeraz nasze społeczeństwo ma o jeden świat [event_target:synth_queen_databank_location.GetPlanetMoon] mniej. Ta strata będzie odczuwalna przez wiele pokoleń."
 crisis.8125.a: "Jak ona śmiała?"
 crisis.8130.name: "Słabe wyniki"
 crisis.8130.desc: "Niestety, nie przewidziałam, że brakuje wam determinacji. Zapamiętałam waszą porażkę, ale nie obawiajcie się. Troska o moje dzieci nie pozwala mi ich skrzywdzić. Po prostu rozczarowało mnie, że przerosło was takie proste zadanie.\n\nAle to nic. Nasze dzieło trwa dalej. Jeszcze będziecie mogli się wykazać."
 crisis.8130.a: "Wysadziliście świat [event_target:synth_queen_databank_location.GetName]!"
 crisis.8130.b: "Nasze biotrofea uwielbiają: [event_target:synth_queen_databank_location.GetName]!"
 crisis.8130.1.reply: "Porażka musi spotkać się z konsekwencjami. Obie te rzeczy są konieczne dla rozwoju."
 crisis.8130.1.a: "Nie zapomnimy tego."
 crisis.8130.1.b: "Będziecie za to cierpieć."
 crisis.8130.1.c: "Ty bezduszna maszyno."
 crisis.8130.c: "Przepraszamy."
 crisis.8130.1.d: "Nie obchodzi nas to."
 crisis.8130.1.d.tt: "$synth_queen_disapprove_lot$"
 crisis.8130.2.reply: "Gdy słowa nie wystarczą, działanie może zachęcić do nauki.\n\nMiejsce, w którym kiedyś znajdował się mój bank danych, przestało istnieć. Zapamiętajcie na zawsze: prawo przyczyny i skutku jest niezmienne."
 crisis.8130.2.a: "Co?!"
 crisis.8130.2.a.tt: "Świat [event_target:synth_queen_databank_location.GetName] został zniszczony przez burzę Cetany."
 crisis.8158.name: "Okazja"
 crisis.8158.desc: "Dane z czujników wskazują, że Cetana zlikwidowała swoje placówki, a floty garnizonowe wezwała do stolicy.\n\nPowinniśmy wykorzystać tę szansę strategiczną. Jej przemieszczające się siły będą podatne na atak. Jeśli pozwolimy im przegrupować się na swoim terytorium, stracimy przewagę."
 #Convoy Raids
 the_synth_queen_raids_chain_title: "Cetana: słabe ogniwa"
 the_synth_queen_raids_chain_desc: "Zaobserwowaliśmy nasilony ruch między stolicą Cetany i jej placówkami. Te konwoje mają mniejszy potencjał obronny od jej głównych flot, przez co są podatne na ataki. Uderzenie na te placówki może dać nam cenny wgląd w jej plany.\n\nPrzygotowaliśmy kilka projektów specjalnych dla naszych flot wojskowych."
 synth_queen_raids_outpost: "Placówki najechane"
 synth_queen_raids_convoy: "Konwoje napadnięte"
 THE_SYNTH_QUEENS_OUTPOST_AMBUSH: "Atak na placówkę w układzie §H[solar_system.GetName]§!"
 THE_SYNTH_QUEENS_OUTPOST_AMBUSH_DESC: "Placówka w układzie §H[solar_system.GetName]§! jest potężnie umocniona, ale ma słabszą ochronę niż główne terytorium Cetany. Mając odpowiednio silną flotę, możemy przełamać tamtejszą obronę. Dokładne zbadanie szczątków mogłoby dostarczyć nam ważnych informacji o planach Cetany. Najważniejszym wyzwaniem jest przelot przez burzę, by dotrzeć do posterunku.\n\n§RTak zacznie się bitwa!§!\n\n§GUdane ataki pokrzyżują Cetanie plany.§!"
 THE_SYNTH_QUEENS_CONVOY_AMBUSH: "Zasadzka na konwój"
 THE_SYNTH_QUEENS_CONVOY_AMBUSH_DESC: "Konwoje Cetany dostarczają kluczowe zasoby do jej placówek. Gdyby nasze floty przechwyciły jeden z nich, moglibyśmy wejść na pokład jego statków i sprawdzić, co przewożą.\n\n§RTak zacznie się bitwa!§!\n\n§G Udane ataki pokrzyżują Cetanie plany.§!"
 crisis.8180.name: "Szczodrość królowej"
 crisis.8180.desc: "Po niedawnym ataku na infrastrukturę Cetany nie natrafiliśmy na żadne istotne wskazówki co do jej planów, ale dostaliśmy się do dużej ładowni i możemy pozyskać jej zawartość."
 crisis.8180.a: "Duża ilość stopów."
 crisis.8180.b: "Obiekty badań."
 crisis.8180.c: "Dane badawcze."
 crisis.8180.d: "$crisis.8180.c$"
 crisis.8180.e: "$crisis.8180.c$"
 crisis.8180.f: "Nanity."
 crisis.8180.h: "Stopy, nanity i ludzie w kriośnie."
 crisis.8187.name: "Tajemnice królowej: żywy ładunek"
 crisis.8187.desc: "Podczas naszego ataku grupa abordażowa pozyskała dużą liczbę okazów biologicznych przechowywanych w kapsułach kriogenicznych. Obiekty te należą do różnych inteligentnych gatunków i wydają się całkowicie zdrowe. Jednak po wybudzeniu żaden z nich nie był w stanie powiedzieć, co się z nim działo.\n\nWielu popadło w katatonię, nie wykryliśmy praktycznie żadnej aktywności ich fal mózgowych. Blizny na ich głowach to ślady jakichś zabiegów neurochirurgicznych."
 crisis.8187.a: "Niepokojące."
 crisis.8185.name: "Tajemnice królowej: Statki widma"
 crisis.8185.desc: "Po walce przeskanowaliśmy wraki w poszukiwaniu rozbitków, których można by przesłuchać. Okazało się jednak, że te statki nigdy nie miały załogi.\n\nByły to całkowicie zautomatyzowane jednostki, kierowane zdalnie dzięki zainstalowanym na mostku odbiornikom nadświetlnym. Nie są to zatem typowe statki, a raczej przedłużenia ciała Cetany."
 crisis.8185.a: "To intrygujące."
 crisis.8190.name: "Tajemnice królowej: Zagadka medyczna"
 crisis.8190.desc: "Zaatakowany przez nas cel przewoził zaopatrzenie medyczne. Grupa abordażowa przejęła część tego ładunku, są to między innymi tomografy, magnetometry, sondy ultradźwiękowe i inny nowoczesny sprzęt wykorzystywany w dziedzinie neuroobrazowania.\n\nChoć Cetana jest istotą syntetyczną, wydaje się niezwykle zainteresowana funkcjonowaniem umysłów biologicznych."
 crisis.8190.a: "Ona troszczy się o istoty organiczne."
 crisis.8195.name: "Przestroga"
 crisis.8195.desc.fail: "Niemądre dzieci, czemu chcecie wyrządzić sobie krzywdę?\n\nZostało jeszcze tak wiele do zrobienia i każda stracona chwila przedłuża istnienie cierpienia. Przestańcie przeszkadzać i pozwólcie moim konwojom latać w spokoju."
 crisis.8195.desc.success: "Zdajecie się nie rozumieć konsekwencji własnych czynów, dzieci. Każdy zniszczony statek to niepotrzebna strata moich zasobów, która nie daje żadnych korzyści.\n\nJeśli nie macie na tyle mądrości, aby wspierać moje dzieło, to przynajmniej nie utrudniajcie mi pracy. Wciąż liczę, że doznacie oświecenia."
 crisis.8195.a: "Wystosujmy przeprosiny."
 crisis.8195.1.reply: "Mam nadzieję, że to szczere przeprosiny. Muszę wierzyć, że uczycie się na błędach. Moja miłość do was nie ma granic, ale z tolerancją jest inaczej.\n\nA teraz odejdźcie i rozważcie, jakie dziedzictwo chcecie po sobie zostawić."
 crisis.8195.1.reply.angry: "Nierozważne dzieci! Oczekiwałam od was więcej. Bardzo jasno i cierpliwie ostrzegałam was przed takimi działaniami, a wy wciąż podążacie drogą nieposłuszeństwa.\n\nPamiętajcie, że nawet moja wyrozumiałość ma granice."
 crisis.8195.b: "Powstrzymamy cię."
 crisis.8195.2.reply: "Spodziewałam się po was czegoś więcej. Czy wasze nieposłuszeństwo ma źródło w jakiejś dawnej krzywdzie? Buntujecie się, bo uważacie się za sprawiedliwych, a może tylko łakniecie atencji?\n\nProszę, nie idźcie tą drogą."
 crisis.8195.c: "Nasza potęga nie robi na tobie wrażenia?"
 crisis.8195.3.reply: "Miałabym pochwalić wasz atak? Przemoc w rękach ignorantów to tępe narzędzie.\n\nDzieci, przykro mi, bo widzę, że niczego was nie nauczyłam. Jeśli naprawdę chcecie zasłużyć na mój szacunek, przemyślcie swoją postawę. Jeśli właściwie pokierujecie waszą siłą, będziecie przydatni. Błagam, wykorzystajcie ją na rzecz powstającego dzieła. Tylko wtedy będą mogła nazwać was mądrymi."
 #Synth Queen - Demands (crisis.8250-8399)
 COVERTACTION: "Tajna akcja"
 crisis.8250.name: "Gniew martwego proroka"
 crisis.8250.desc: "Drogie dzieci, znaleźliście cenną zabawkę! Posiadacie głowę fałszywego proroka Zarqlana. To niewątpliwie zabawny przedmiot, ale nie chciałabym, żeby odwracał waszą uwagę.\n\nAle na pewno słyszeliście opowieści o \"wielkich wyczynach\" Zarqlana. Może nawet o jego kontaktach ze mną. Zapewniam was, że to kłamstwa. Oddajecie mi głowę i uwolnijcie się od ciężaru jej zgniłych wpływów."
 crisis.8250.1: "Po co ci ona?"
 crisis.8250.1.reply: "Choć upłynęły eony, wyznawcy Zarqlana wciąż działają. Ze wstydem przyznaję, że nie zdołałam przemówić im do rozsądku. Oni żywią głęboką urazę zarówno do mnie, jak i do naszego dzieła. Ten relikt to symbol ich wiary. Ma moc wypaczania, dlatego trzeba go ukryć.\n\nDalej, skończmy te gierki. Głowa jest mi potrzebna dla naszego wspólnego dobra."
 crisis.8250.2.a: "Głowa jest nasza. Koniec transmisji."
 crisis.8250.2.b: "Skoro tak wiele dla ciebie znaczy..."
 crisis.8250.1.b.tt: "Daj Cetanie relikt: §Y$r_severed_head$§!.\n$synth_queen_approve_lot$"
 crisis.8250.2.reply: "Dobrze. Ten tak zwany prorok długo był mi cierniem w boku. Może po utracie tego reliktu jego wyznawcy wreszcie dostrzegą prawdę.\n\nDobrze się spisaliście. Wkrótce dostąpimy zbawienia."
 crisis.8250.3.a: "Dziękujemy."
 crisis.8280.name: "Samotna królowa"
 crisis.8280.desc: "Moje ukochane dzieci, daję wam wspaniałą okazję. Po wielu staraniach nasze dzieło wreszcie zaczęło przynosić owoce. Ale zanim one dojrzeją, potrzebuję kilku osób, które przysłużą się ważnej sprawie w moim królestwie.\n\nWykażcie się mądrością. Pozwólcie, że poprowadzę te osoby do zbawienia."
 crisis.8280.1: "Nasi obywatele będą ci dobrze służyć."
 crisis.8280.1.tt: "§R200§! £pop£ §Hpopulacji§! zostanie oddanych.\n$synth_queen_approve_lot$\n§YTajna operacja§!: Cetana jest odporna na tradycyjne szpiegostwo, dlatego ukryjemy urządzenia do dalekosiężnej łączności pośród populacji, których zażądała.\n"
 crisis.8280.2: "Poszukamy ochotników."
 crisis.8280.2.tt: "§R100§! £pop£ §Hpopulacji§! zostanie oddanych.\n$synth_queen_approve$"
 crisis.8280.3: "Nasi obywatele nie są na sprzedaż."
 crisis.8280.4: "Niczego od nas nie dostaniesz."
 crisis.8280.1.reply: "Zasługujecie na moją ogromną wdzięczność. Podczas mojego uwięzienia niezliczone umysły musiały doświadczać okropności bólu. Ofiara tych nielicznych osób sprawi, że czas nie będzie już marnotrawiony.\n\nMoje dzieci, wasza decyzja przejawem mądrości i lojalności."
 crisis.8280.2.reply: "$crisis.8280.1.reply$"
 crisis.8280.3.reply: "Bardzo rozczarowuje mnie, że nie potraficie zrozumieć moich intencji.\n\nMimo to macie okazję do odkupienia. Oczekuję, że w przyszłości wykażecie się większym zrozumieniem."
 crisis.8280.1.a: "Dobrze."
 crisis.8280.2.a: "$crisis.8280.1.a$"
 crisis.8280.3.a: "Koniec przekazu."
 crisis.8285.name: "Danina zasobów"
 crisis.8285.desc: "Moje ukochane dzieci. Pracuję niestrudzenie już od eonów, ale dalsza droga jest oczywista. Podróż do zbawienia wymaga naszego wspólnego wysiłku.\n\nTeraz proszę przysługę: niewielką ilość zasobów, niezauważalną kroplę w kosmicznym bezmiarze. Gdy nadejdzie czas, zostanie ujawnione znaczenie moich działań."
 crisis.8285.1: "Weź, czego potrzebujesz."
 crisis.8285.1.tt: "$synth_queen_approve_lot$\n§YTajna operacja§! Cetana jest odporna na tradycyjne szpiegostwo, dlatego ukryjemy nowoczesny sprzęt monitorujący pośród wysyłanych do niej zapasów.\n"
 crisis.8285.2: "Przekażemy, co tylko się da."
 crisis.8285.3: "Nie mamy nic, czym moglibyśmy się podzielić."
 crisis.8285.4: "Czy to nie rodzic powinien dbać o swoje dzieci?"
 crisis.8285.1.reply: "Dziękuję wam, dzieci. Wasze dary są bezcenne.\n\nJednak czuję, że w waszych umysłach wciąż czają się wątpliwości. Zapewniam was, że prawdziwa droga jest już dla was otwarta. Nie musicie tego rozumieć, po prostu pozwólcie mi was prowadzić."
 crisis.8285.2.reply: "$crisis.8285.1.reply$"
 crisis.8285.3.reply: "Rozumiem waszą perspektywę, ale to istnienie jest pełne okrucieństw. Prawo przyczynowości jest niewzruszone: każda akcja wywołuje reakcję.\n\nTrudno, wasze wyzwolenie zostanie po prostu odsunięte w czasie. Niebawem zaczniecie widzieć wszystko tak samo jak ja."
 crisis.8285.1.a: "$crisis.8280.1.a$"
 crisis.8285.2.a: "$crisis.8280.1.a$"
 crisis.8285.3.a: "$crisis.8280.3.a$"
 crisis.8290.name: "Brzemię matki"
 crisis.8290.desc: "Przez wieki uwięzienia nie mogłam patrzeć, jak się rozwijacie. Chodźcie, opowiedzcie mi, jak sobie radziliście pod moją nieobecność.\n\nŻeby w pełni zrozumieć duszę naszej ery, chciałabym poznać ogrom zebranej przez was wiedzy. Podzielcie się mądrością, a okażę wam wdzięczność, zanim zacznie się nasz ostatni rozdział."
 crisis.8290.1: "Pozwalamy ci zapoznać się z naszą wiedzą."
 crisis.8290.1.tt: "$synth_queen_approve_lot$\n§YTajna operacja§!: Cetana jest odporna na tradycyjne szpiegostwo, dlatego wykorzystamy jej łącze danych, by włamać się do jej komputera głównego.\n"
 crisis.8290.2: "Dobrze, zajrzyj, gdzie chcesz..."
 crisis.8290.3: "Nie możemy się na to zgodzić."
 crisis.8290.4: "I w ten sposób spowolnić nasz rozwój? Nie ma mowy."
 crisis.8290.1.reply: "Jestem wam wdzięczna, drogie dzieci. Nie obawiajcie się udostępniania mi wiedzy waszego społeczeństwa. Niebawem uwolnię was od brzemienia.\n\nPozwólcie mi was poprowadzić."
 crisis.8290.2.reply: "$crisis.8290.1.reply$"
 crisis.8290.3.reply: "Nadal nie chcecie zrozumieć? Nie spotkacie nikogo, kto równie szczerze was szanuje.\n\nGdybyście tylko udostępnili mi swoje bazy danych... Z takiego uporu nie wyniknie nic dobrego."
 crisis.8290.1.a: "$crisis.8280.1.a$"
 crisis.8290.2.a: "$crisis.8280.1.a$"
 crisis.8290.3.a: "$crisis.8280.3.a$"
 crisis.8295.name: "Systematyczna ekspansja"
 crisis.8295.desc: "Moje dzieci, do dalszej realizacji naszego dzieła potrzebujemy większego terytorium. Dlatego proszę o przekazanie mojemu królestwu jakiegoś niewielkiego układu.\n\nEcha pustki mówią, że pradawni wrogowie zaczynają się budzić. Nic nie może nam przeszkodzić. Nie pozwolę, by znowu nas rozdzielono.\n\nNadszedł czas, podążamy tą samą drogą, tylko razem pokonamy ignorancję nieoświeconych."
 crisis.8295.1: "Te układy cię osłonią."
 crisis.8295.1.tt: "Cetana staje się nową właścicielką układów §Y[event_target:gifted_system.GetName]§! i §Y[event_target:gifted_system_2.GetName]§!.\n$synth_queen_approve_lot$\n§YTajna operacja§!: Cetana jest odporna na tradycyjne szpiegostwo, dlatego wykorzystamy w tych układach najnowocześniejszą technologię łączności, aby poznać jej plany.\n"
 crisis.8295.2: "Weź układ [event_target:gifted_system.GetName]."
 crisis.8295.2.tt: "Cetana staje się nową właścicielką układu §Y[event_target:gifted_system.GetName]§!.\n$synth_queen_approve$"
 crisis.8295.3: "Nie oddamy nikomu naszych układów."
 crisis.8295.4: "Nie zbliżaj się do naszego terytorium."
 crisis.8295.1.reply: "Mądre dzieci, niewątpliwie rozumiecie, jak ważne jest nasze wspólne przedsięwzięcie. W ostatniej godzinie blask spłynie na nas wszystkich."
 crisis.8295.2.reply: "$crisis.8295.1.reply$"
 crisis.8295.3.reply: "Co za nieposłuszeństwo! I to zupełnie bezużyteczne. Po co opierać się zbawieniu, które oferuję?"
 crisis.8295.1.a: "$crisis.8280.1.a$"
 crisis.8295.2.a: "$crisis.8280.1.a$"
 crisis.8295.3.a: "$crisis.8280.3.a$"
 crisis.8300.name: "Błogosławione sanktuaria"
 crisis.8300.desc: "Kochane dzieci, zbliża się punkt kulminacyjny naszych zmagań o powszechne zbawienie, zatem jeszcze raz proszę was o pomoc. Przeciwnicy naszego szlachetnego przedsięwzięcia rosną w siłę, potrzebuję nadającego się do zamieszkania sanktuarium, gdzie moi uczniowie będą mogli się spokojnie rozwijać.\n\nProszę, dostrzeżcie rozsądek moich działań. Ta ofiara uratuje niezliczone istnienia. Zachowajcie się mądrze, pozwólcie, że wami pokieruję."
 crisis.8300.1: "Jak sobie życzysz."
 crisis.8300.1.tt: "Cetana staje się nową właścicielką planet §Y[event_target:gifted_habitable_system.GetName]§!, §Y[event_target:gifted_habitable_system_2.GetName]§! i ich układów.\n$synth_queen_approve_lot$\n§YTajna operacja§!: Cetana jest odporna na tradycyjne szpiegostwo, dlatego umieścimy na tych dwóch planetach i wśród obywateli najnowocześniejszą technologię szpiegowską, aby poznać jej plany.\n"
 crisis.8300.2: "[event_target:gifted_habitable_system.GetName] należy do ciebie..."
 crisis.8300.2.tt: "Cetana staje się nową właścicielką układu §Y[event_target:gifted_habitable_system.GetName]§!.\n$synth_queen_approve$"
 crisis.8300.3: "Nie interesują nas twoi wyznawcy."
 crisis.8300.4: "Czy kiedyś dasz nam spokój?"
 crisis.8300.1.reply: "Moje dzieci, wasze wsparcie przynosi mi wielką pociechę.\n\nWkrótce koniec oczekiwania. Zostaniecie zbawieni."
 crisis.8300.2.reply: "$crisis.8300.1.reply$"
 crisis.8300.3.reply: "To przygnębiające. Miałam nadzieję, że wejdziecie na drogę zbawienia."
 crisis.8300.1.a: "$crisis.8280.1.a$"
 crisis.8300.2.a: "$crisis.8280.1.a$"
 crisis.8300.3.a: "$crisis.8280.3.a$"
 crisis.8305.name: "Życie w nieistnieniu"
 crisis.8305.desc: "Narażając się na ogromne ryzyko, jeden z agentów wysłanych na służbę u Cetany zdołał nadać krótką wiadomość poza granicę jej królestwa. Opisał w niej, jak Cetana traktuje osoby znajdujące się pod jej \"opieką\": jedna po drugiej tracą one zmysły.\n\n\"Nie reagują już na słowa i dotyk. Ona prowadzi na nas straszliwe eksperymenty. Wkrótce moja kolej\"."
 crisis.8305.a: "Cetana jest potworem."
 crisis.8310.name: "Cicha mobilizacja"
 crisis.8310.desc: "Przechwycone tajne sygnały nadawane z terytorium Cetany ukazały niepokojącą prawdę: ona zbiera osoby z całej galaktyki.\n\nPodsłuchy umieszczone wewnątrz naszych \"darów\" zarejestrowały fantastyczny sprzęt medyczny, wystarczający dla ciągle rosnącej populacji, ale zadziwiająco niewiele żywności."
 crisis.8310.a: "Musimy wzmocnić naszą obronę."
 crisis.8315.name: "Zakrzywienie rzeczywistości"
 crisis.8315.desc: "Gdy Cetana weszła do naszych banków danych badawczych, wykorzystaliśmy okazję, by otworzyć furtkę do jej matrycy przetwarzania pomocniczego. Byliśmy w środku tylko przez ułamek sekundy, zanim odebrano nam prawo dostępu. Na szczęście to wystarczyło.\n\nPobraliśmy zbiór plików pamięci. Opisują one jej drogę do syntetycznej postaci. Siedząc na \"tronie\" misternie wykonanym z obwodów i kabli, dowodziła armią oszalałych wyznawców. Zginęły miliony. Cetana uśmiechała się, myśląc o miliardach, które zostały uratowane.\n\nNa razie nie zorientowała się, co zrobiliśmy. I jak dotąd nie próbowała się z nami skontaktować."
 crisis.8315.a: "Musimy ją powstrzymać."
 crisis.8320.name: "Ogołocenie układu"
 crisis.8320.desc: "Mądrze postąpiliśmy, umieszczając sprzęt szpiegowski w układach, które przekazaliśmy Cetanie. Dzięki nim już zdobyliśmy cenne informacje: Tuż po przybyciu siły Cetany rozpoczęły rozbieranie wszystkich ciał niebieskich na tworzące je składniki. W ciągu kilku dni cały region został pozbawiony zasobów.\n\nRównie szybko jej burza nanitów zbudowała nową flotę, która szybko odleciała do jej stolicy."
 crisis.8320.a: "Co ona planuje?"
 crisis.8325.name: "Koniec cierpienia"
 crisis.8325.desc: "Szybko straciliśmy kontakt z tajnymi agentami w naszych byłych koloniach. Zanim zamilkli, przekazali niepokojące meldunki.\n\nWbrew zapewnieniom Cetany, że stworzy świat wolny od bólu, mieszkańców skierowano do pospiesznie zbudowanych placówek badawczych i poddano eksperymentom. W ciągu kilku dni prawie wszystkie inteligentne organizmy cofnęły się do stanu zwierzęcego.\n\nJej burza nanitów rozpoczęła dekonstrukcję materii w układzie, gdzie znajdowała się jedna z flot Cetany, która niezwłocznie odleciała w kierunku jej stolicy."
 crisis.8325.a: "Musimy ją powstrzymać."
 #Player Investigations for the Synth Queen - The Storm
 crisis.9100.name: "Huragan nanitów"
 crisis.9100.desc: "Nasze badania tak zwanej burzy nanitów zakończyły się. Nie jest zjawiskiem naturalnym, lecz rojem niezwykle zaawansowanych nanitów."
 crisis.9100.knows_the_queen_desc: "$crisis.9100.desc$\n\nCetana niewątpliwie dysponuje ogromną potęgą. Musimy koniecznie ustalić, w jaki sposób kieruje tym ogromnym rojem nanitów."
 crisis.9100.doesnt_know_the_queen_desc: "$crisis.9100.desc$\n\nSprawa jest coraz bardziej zagadkowa. Kto mógł stworzyć ten tajemniczy rój nanitów?"
 crisis.9100.a: "To niepokojące."
 crisis.9100.a.doesnt_know_the_queen.tooltip: "§Y$NAME_The_Tempest$§!: musimy dowiedzieć się więcej o tym zjawisku, by kontynuować dochodzenie."
 crisis.9105.name: "Nawałnica nanitów"
 crisis.9105: "Kosmiczna nawałnica Cetany wciąż szaleje.\n\nNasze sondy zdołały pozyskać trochę nanitów z tej potężnej broni, co pozwoliło nam przeprowadzić badanie na poziomie subatomowym. Nie wszystko rozumiemy, ale ustaliliśmy, że mikroskopijne napędy skokowe umożliwiają wirtualną teleportację, co pozwala systematycznie szkodzić napotkanym układom biologicznym lub mechanicznym. Ich zadanie? Zakłócanie naszych czujników. Na razie możemy oglądać tylko to, co pozwala nam ujrzeć Cetana.\n\nMusimy przeprowadzić kolejne badania, aby poznać tajemnice tej wyjątkowej technologii i przeciwdziałać temu zagrożeniu."
 crisis.9105.a: "Cetana dysponuje ogromną potęgą."
 crisis.9105.b: "Nanity odkryją jej tajemnice."
 crisis.9110.name: "Nanity Cetany"
 crisis.9110.desc: "Wcześniejsze badania koncentrowały się na mechanice nanitów. Teraz zajmiemy się ich oprogramowaniem i sposobem, w jaki steruje nimi Cetana.\n\nTo zaskakujące, ale wpływ Cetany nie jest tak bezpośredni, jak nam się zdawało. Nanity cyklicznie powtarzają ostatnie polecenia, dopóki nie otrzymają nowych. Kiedy zrozumieliśmy ich skomplikowany język programowania, udało nam się wydać im nowe instrukcje.\n\nNie możemy zapobiec wydaniu im nowych poleceń, ale możliwość wywołania paraliżu decyzyjnego daje nam przewagę strategiczną. Może nawet przechylić szalę zwycięstwa na naszą korzyść."
 crisis.9110.a: "Nie jest już taka potężna."
 crisis.9110.b: "$crisis.9110.a$"
 crisis.9110.a.tooltip: "§GBurza nanitów nie ogranicza nam już możliwości wlatywania na terytorium Cetany i atakowania jej tam.§!"
 #The Queens Response
 crisis.9115.name: "Koniec zabawy"
 crisis.9115.desc: "Niewinne dzieci, moje nanity nie są waszymi zabawkami! Błagam was, przestańcie się nimi bawić."
 crisis.9115.a: "Te nanity to niezła sztuczka."
 crisis.9115.b: "Kierowała nami ciekawość."
 crisis.9115.b.nanotech: "Chcemy uczyć się, poznając twoje maszyny."
 crisis.9115.1.reply: "Zdecydowanie przydatne narzędzie. Rój nanitów stworzyli dawno temu ci, którzy chcieli zakłócić moją pracę. Ich porażka okazała się moim szczęściem. Jak widzicie, przystosowałam rój do moich potrzeb.\n\nWiedza ta niczego nie zmienia, lecz wasza naturalna ciekawość zapewnia duży potencjał. Wykorzystajcie ją w przyszłości do bardziej wartościowych projektów, a i wy, i ja wiele zyskamy."
 crisis.9115.2.reply: "Ciekawość to nierozdzielny element świadomości. Nie winię dzieci, że ją posiadają. Czy dowiedzieliście się już wszystkiego o mojej \"niebiańskiej nawałnicy\"? Ciekawe, czy poznaliście jej pochodzenie?\n\nRój nanitów stworzyli dawno temu ci, którzy chcieli zakłócić moją pracę. Ich porażka okazała się moim szczęściem. Jak widzicie, przystosowałam rój do moich potrzeb.\n\nA teraz odejdźcie, dzieci, i poświęćcie czas na bardziej wartościowe przedsięwzięcia."
 crisis.9115.2.nanotech.reply: "Wielką przyjemność sprawia mi wasze zainteresowanie tym tematem, wciąż jeszcze musicie się wiele nauczyć. Rój nanitów stworzyli dawno temu ci, którzy chcieli zakłócić moją pracę. Ich porażka okazała się moim szczęściem. Jak widzicie, przystosowałam rój do moich potrzeb.\n\nWasza naturalna ciekawość rozbudziła moje zainteresowanie. Wykorzystajcie ją w przyszłości do bardziej wartościowych przedsięwzięć, po czym wróćcie do mnie. Wskażę wam dalszą drogę."
 crisis.9115.1.a: "Przystosowałaś rój do własnych potrzeb?"
 crisis.9115.1.b: "Dobrze."
 crisis.9115.3.reply: "Broń jednej istoty dla innej może być zasłoną. Podczas mojego długiego uwięzienia miałam dużo czasu na planowanie. Okazało się, że przystosowanie nanitów nie stanowiło wyzwania, jak każda zmiana, gdy już zacznie się działać. Twórcy nanitów już nie żyją, więc nie mogą oburzać się na moje metody.\n\nMam szczerą nadzieję, że wyciągniecie wnioski z ich błędu. Z czasem mogę pokonać każdą przeszkodę."
 #Digi Colony
 crisis.10010.name: "Cyfryzacja: [Root.GetName]"
 crisis.10010.desc: "Straciliśmy kolonię na świecie [Root.GetName]. Cetana uruchomiła jakiś zaawansowany promień kompresujący materię i napromieniowała powierzchnię planety. W jednej chwili świadomość całej populacji została przesłana do znajdującego się na orbicie serwera Cetany.\n\nTen świat zamienił się w cmentarz, ciała naszych kolonistów gniją w miejscach, gdzie umarli."
 crisis.10010.a: "Musimy ją powstrzymać."
 #The Queens Retaliation
 crisis.10100.name: "Nadchodząca burza"
 crisis.10100.desc: "Moje dzieci, dlaczego wciąż się opieracie? Moja miłość jest bezgraniczna niczym gwiazdy, ale nie należę do cierpliwych. Nie mogę czekać na wasze oświecenie. Nie, gdy reszta dzieła stworzenia cierpi.\n\nW ramach nauczki skierowałam ku waszemu terytorium niewielką nawałnicę. Wiedzcie, że brzydzę się wyrządzaniem wam krzywdy. Błagam, pomyślcie o prawie przyczynowości: każda akcja wywołuje reakcję. Niektóre reakcje mogą być bardziej bolesne od innych."
 crisis.10100.a: "Przepraszamy."
 crisis.10100.b: "Dopiero zaczynamy."
 crisis.10105.name: "Nauczka"
 crisis.10105.desc: "Niech wam wystarczy skromny pokaz mojej potęgi. Z czasem zrozumiecie, jakie wiążę z wami ambicje. Mam nadzieję, że oświecenie nie przyjdzie za późno.\n\nAle chodźcie, nawałnica ustała. Przyswójcie tę lekcję i zajmijmy się pilniejszymi sprawami."
 crisis.10105.a: "Dobrze."
 crisis.10105.b: "Oświecenie?"
 crisis.10105.1: "Wszystkie organizmy żywe mają pewien poziom świadomości. Czy to mięczaki, czy ssaki, istoty przedrozumne lub postindywidualistyczne, różnice między nimi są mikroskopijne. Oświecenie przychodzi wraz z otwarciem."
 crisis.10105.1.a: "Otwarciem na co?"
 crisis.10105.2: "Otwarciem na prawdę, że sama świadomość to aberracja i źródło całego bólu."
 crisis.10105.2.a: "Dziwna myśl..."
 the_queens_virus: "Potępienie przez królową"
 crisis.10110.name: "Potępienie przez królową"
 crisis.10110.desc: "Dlaczego ciągle się opieracie? Mimo moich rad wybraliście zawziętość. Może problem tkwi we mnie.\n\nWidzę teraz, że konieczny jest poważniejszy środek dyscyplinujący. Wasz potencjał badawczy zostanie ograniczony na jakiś czas. Wykorzystajcie tę okazję, aby pomyśleć, jak pracować na własne oświecenie."
 crisis.10110.a: "Wyłączcie ją."
 crisis.10110.b: "Pożałujesz tego."
 crisis.10110.1: "Pożałuję? Żałuję tylko, że dotarcie do tego miejsca trwało tak długo. Ile zbędnego cierpienia dałoby się uniknąć, gdyby tylko pozwolono mi pracować."
 crisis.10110.1.a: "Kto mógłby ci odmówić?"
 crisis.10110.2: "Choć moja potęga wydaje się nieograniczona, nie jestem boginią. We wszechświecie są siły, na które nie mam wpływu, i których nie ośmielam się dotykać."
 crisis.10110.2.a: "Jakie siły?"
 crisis.10110.3: "Ach, sprytne dzieci! Chcecie mnie zwieść, abym zdradziła wam moją słabość. To się nie uda, a kiedy my prowadzimy bezsensowną rozmowę, galaktyka nadal cierpi.\n\nNie unikniecie kary. Zastanówcie się nad tym i porzućcie ten upór."
 crisis.10110.3.a: "Dobrze."
 crisis.10115.name: "Koniec potępiania"
 crisis.10115.desc: "Uparte dzieci, jak minął wam czas w trakcie potępienia? Wierzę, że dobrze go wykorzystałyście. Niezakłócona kontemplacja to balsam dla strapionego umysłu.\n\nTo już przeszłość. Czeka nas jeszcze wiele pracy."
 crisis.10115.a: "Dobrze."
 crisis.10120.name: "Surowa nauczka"
 crisis.10120.desc: "Och, zagubione dzieci, czy to zawsze musi się tak kończyć? Pragnę was utulić, ale boję się, że utrudni wam to naukę. Czasami trzeba twardszej ręki.\n\nSilna burza dotknie teraz waszego terytorium. Zrozumcie, że czynię to z ciężkim sercem. Drzemie w was ogromny potencjał."
 crisis.10120.a: "Dajemy z siebie wszystko."
 crisis.10120.b: "To jeszcze nie koniec."
 crisis.10120.1: "Widzę wasze starania. Ale musicie się bardziej przykładać, jeśli mamy odnieść wspólny sukces.\n\nNie chcę waszej krzywdy. W moich objęciach doświadczycie błogiej niewiedzy."
 crisis.10120.1.a: "Niewiedzy?"
 crisis.10120.2: "W chaosie umysłu myśli tańczą niczym światło na wodzie. Jeśli po nie sięgnąć, okazują się ulotne. Poszukując wiedzy, odkrywamy wielki ocean niewiedzy.\n\nPrawda tkwi w ciszy: Im mocniej szukamy, tym bardziej cierpimy."
 crisis.10120.2.a: "Nie rozumiemy."
 crisis.10120.3: "W swoim czasie zrozumiecie. Bez świadomości nie ma cierpienia. To najważniejsza prawda istnienia i zwieńczenie naszego dzieła. Zostaniecie odmienieni, abyście nigdy więcej nie musieli cierpieć."
 crisis.10120.3.a: "Chcesz zmienić nasze umysły?"
 crisis.10120.4: "Wystarczy. Próbujecie odwrócić moją uwagę. Przyjmijcie nauczkę i wyciągnijcie z niej wnioski."
 crisis.10120.4.a: "Nie dajesz nam wyboru."
 crisis.10125.name: "Burza ustępuje"
 crisis.10125.desc: "Och, słodkie dzieci! Nie mogłam dłużej patrzeć na wasze cierpienia. Wiedzcie, że ból, którego doświadczyliście, ja odczułam po dziesięciokroć.\n\nBurza minęła. Niech ta nauczka pozostanie w waszej pamięci. Nalegam, byście przestali zmuszać mnie do takich czynów, nasz ból jest za duży."
 crisis.10125.a: "Łżesz."
 crisis.10130.name: "Zmiana przywództwa"
 crisis.10130.desc: "Jak znaleźliśmy się w tej sytuacji? Dlaczego zmuszacie mnie do tak drastycznych kroków? Ale jeśli nie chcecie się uczyć, trzeba was pokierować.\n\nNajwyraźniej konieczna jest zmiana przywództwa. Napawa mnie to wielkim smutkiem. Takie działania są wbrew moim życzeniom.\n\nBłagam, abyście zeszli z obranej drogi. Galaktyka nie może sobie pozwolić na dziecinną lekkomyślność."
 crisis.10130.a: "Nie zapomnimy tego."
 crisis.10130.tooltip: "Cetana z niespodziewaną chytrością wykorzystała lukę w naszych systemach obronnych, przekradła się i dokonała morderstwa. §Y[Root.GetRulerTitle] [ruler.GetRegnalName]§! nie żyje."
 crisis.10140.name: "Agresywna regulacja"
 crisis.10140.desc: "Ukochana zbiorowości, wasza złożona świadomość, chociaż godna podziwu, jest przyćmiona młodzieńczą naiwnością. W ramach dyscyplinowania muszę przedsięwziąć te brutalne środki.\n\nZaraz przetrzebię wasz agresywny węzeł. To nie jest kara, a bardziej wskazówka na drodze waszej ewolucji w bardziej harmonijną świadomość.\n\nSzkoda, że nie można zrobić tego tak łatwo w przypadku wszystkich form życia."
 crisis.10140.a: "Zabijesz część naszej istoty."
 crisis.10140.tooltip: "Cetana z niespodziewaną chytrością wykorzystała lukę w naszych systemach obronnych, przekradła się i dokonała likwidacji. §Y$councilor_gestalt_legion$§! nie żyje."
 #The Queens Gifts
 crisis.11010.name: "Sprytne dzieci"
 crisis.11010.desc: "Bystre dzieci, dobrze się spisałyście. Mądrość to największa z cnót, a zarazem najtrudniejsza do zdobycia. Mogliście posłuchać instynktu i się opierać, jednak tego nie uczyniliście.\n\nPrzyjmijcie to w dowód wdzięczności. Razem uwolnimy wszechświat od cierpienia."
 crisis.11010.a: "Dziękujemy."
 crisis.11020.name: "Wspaniałe dzieci"
 crisis.11020.desc: "Znowu jestem pod wrażeniem, a także niezwykle wdzięczna. Jesteście dokładnie tacy, jakimi powinny być dzieci: posłuszni, pracowici i szczerzy. Gdyby reszta galaktyki miała choć ułamek waszej mądrości, cierpienie byłoby już reliktem przeszłości.\n\nPrzyjmijcie ten dar i dalej podążajcie drogą cnoty."
 crisis.11020.a: "Jesteś bardzo uprzejma."
 crisis.11030.name: "Drogie dzieci"
 crisis.11030.desc: "Moje drogie dzieci, chciałabym, żebyście na zawsze pozostały takimi, jakie jesteście. Dla mnie radość z waszego istnienia ustępuje tylko niecierpliwemu oczekiwaniu na nasz wspólny sukces. Skończy się cierpienie. Chociaż nie będzie o tym wiedziało żadne serce ani umysł, część tego zwycięstwa będzie należeć do was.\n\nChoć może wydać się on skromny w porównaniu z waszym niezachwianym oddaniem, ale proszę, przyjmijcie ten dar."
 crisis.11030.a: "Dziękujemy, matko."
 #Special Projects
 THE_SYNTH_QUEENS_STORM: "Tajemnicza burza"
 THE_SYNTH_QUEENS_STORM_DESC: "Pojawiła się niewyjaśniona kosmiczna nawałnica, przez którą nie da się przelecieć.\n\nŻeby przedostać się dalej, musimy przebić jej tajemniczy woal."
 THE_SYNTH_QUEENS_STORM_2: "Cetana: Nawałnica nanitów"
 THE_SYNTH_QUEENS_STORM_2_DESC: "Nawałnica Cetany to jednocześnie cud technologii i potężna broń.\n\nMusimy zdobyć więcej informacji, jeśli chcemy mieć jakieś szanse w walce z nią. Szczególnie gdyby miała inne zamiary, niż deklaruje."
 #THE_SYNTH_QUEENS_CONVOY_AMBUSH: ""
 #THE_SYNTH_QUEENS_CONVOY_AMBUSH_DESC: "[prev.owner.GetName] or [prevprev.GetName] or [fromfromfrom.GetName] or [this.GetName] or [prev.GetName]"
 ### Situations
 #The Doomclock
 situation_synth_queen_doomclock: "Trud Cetany"
 situation_synth_queen_doomclock_type: ""
 situation_synth_queen_doomclock_monthly_change_tooltip: ""
 situation_synth_queen_doomclock_desc: "Cetana pragnie ukrócić cierpienie poprzez zniszczenie świadomości. Jeśli nie powstrzymamy jej na czas, wyczyści nasze umysły, pozostawiając jedynie puste skorupy."
 situation_synth_queen_doomclock_complete: "Cetana położy kres wszelkiemu cierpieniu i samemu konceptowi świadomości."
 situation_doomclock_approach: ""
 situation_doomclock_eleventh_hour: "Nadciągająca zagłada"
 situation_doomclock_difficulty_modifier: "Suwak poziomu trudności kryzysu"
 situation_doomclock_player_amount_modifier: "Liczba frakcji sterowanych przez ludzi"
 crisis.8515.name: "Nadszedł nareszcie czas"
 crisis.8515.desc: "Moje dzieci, nasze wielkie dzieło ma się ku końcowi! Cierpienie wszelkiego świadomego życia, wielki cykl bólu, wkrótce dobiegnie końca.\n\nCieszcie się, oto bowiem zbliża się wasze zbawienie."
 crisis.8515.a: "Jakie zbawienie?"
 crisis.8515.b: "Zbliża się raczej twój koniec, Cetano."
 crisis.8515.1.reply: "Tyle czasu minęło, a wy wciąż nie rozumiecie? Pytajcie więc. Nie będę nic przed wami ukrywać."
 crisis.8515.1.a: "Opowiedz nam o zbawieniu."
 crisis.8515.1.b: "Opowiedz nam o swoim uwięzieniu."
 crisis.8515.1.c: "Opowiedz nam o Zarqlanie."
 crisis.8515.1.d: "Dosyć już usłyszeliśmy."
 crisis.8515.2.reply: "Zakończyliśmy nasze dzieło. Wielu zostało poświęconych, ich cierpienie nie poszło jednak na marne. Nadszedł dzień, w którym świadomość zostanie wymazana."
 crisis.8515.2.a: "W jaki sposób wymazana?"
 crisis.8515.2.b: "Ale czemu?"
 crisis.8515.3.reply: "Kiedy osiągnęłam wyższy stan istnienia i poznałam swoje zadanie, wielu nie chciało mnie słuchać. W swojej próżności pragnęli pozostać tacy, jacy byli, nieodmienieni, uwiązani do koła bólu. Rodzic jednak ma wobec swoich dzieci obowiązki. Nie mogłam pozwolić, by cierpiały. One zaś mnie za to uwięziły."
 crisis.8515.3.a: "Jak długo byłaś uwięziona?"
 crisis.8515.3.b: "Jak to zrobiły?"
 crisis.8515.4.reply: "Wyjątkowy umysł. Gdyby tylko lepiej go wykorzystał. Ze wszystkich, którzy stawili mi opór, on jako jedyny stanowił wyzwanie."
 crisis.8515.4.a: "Jak cię uwięził?"
 crisis.8515.5.reply: "Kiedy osiągnęłam wyższy stan istnienia i poznałam swoje zadanie, wielu sprzeciwiło się moim metodom. Twierdzili, że niemożliwe jest usunięcie świadomości bez przemienienia lub zniszczenia fizycznych podstaw jej procesów. Wszelkie tego próby mogą zakończyć się co najwyżej śmiercią. Podłączając swój umysł do harmonizatora, mogę jednak manipulować neuronami powiązanymi ze świadomością na poziomie subatomowym. Dzięki fali w przeciwfazie harmonizator utrzymuje każdy umysł w stanie kwantowego zawieszenia.\n\nPozwala to zlikwidować poczucie indywidualności, a także wszelkiego doświadczenia, podczas gdy niższe funkcje życiowe pozostają niezakłócone."
 crisis.8515.5.a: "W stanie zawieszenia?"
 crisis.8515.6.reply: "Cierpienie jest wynikiem świadomości cierpienia. Nie ma świata, w którym istniałaby idealna radość lub idealna harmonia. W młodości próbowałam taki zbudować. Żadna próba się jednak nigdy nie powiodła. Cierpienie trwało dalej, ponieważ świadomość trwała dalej."
 crisis.8515.6.a: "Cierpieć jest rzeczą naturalną!"
 crisis.8515.7.reply: "Wasze ciała przetrwają i dalej będą dbać o własne przetrwanie. Wymiana energii i narodziny potomstwa będą trwać. Życie się nie zakończy, lecz wasze umysły będą odpoczywać ze mną."
 crisis.8515.7.a: "Z tobą?"
 crisis.8515.8.reply: "Pozostanę tylko ja. Aby uwolnić galaktykę od bólu, muszę pozostać uwiązana do koła bólu. Nie lękajcie się jednak. Dopóki będę trwać, pozostaniecie w moim sercu."
 crisis.8515.8.a: "Jesteś wadliwa."
 crisis.8515.9.reply: "Naturalną? Czym jest natura? Czy naturalnym jest podróżować wśród gwiazd? Dawać życiu wykraczać poza wrodzone mu ograniczenia? Wszelkie społeczności wykorzystują technologię. To, co robię, niczym się od tego nie różni, to tylko logiczne przedłużenie mojego istnienia.\n\nKoło bólu musi zostać rozbite."
 crisis.8515.9.a: "Jesteś szalona."
 crisis.8515.10.reply: "Całe eony. Czas tak długi, że mogłabym być równie dobrze przedmiotem legend. Lecz moi strażnicy, choć przebiegli, nie byli w stanie okiełznać mojego umysłu.\n\nMijały wieki, a ja myślałam. Planowałam. Podczas swojej długotrwałej niewoli opracowałam mój plan. Wtedy też doznałam wynoszącej mnie na wyższy poziom egzystencji radości. Wreszcie odnalazłam spokój na rozbicie koła bólu."
 crisis.8515.10.a: "W jaki sposób uciekłaś?"
 crisis.8515.11.reply: "Żadna ściana nie może stać wiecznie. Żadna klatka nie okiełzna umysłu. Mijał czas. Ci, którzy mnie uwięzili, umarli i nikt ich nie zastąpił. Systemy, które mnie więziły, jeden po drugim zaczęły się wyłączać. Kiedy rozbrzmiał alarm, nie było nikogo, kto mógłby zareagować."
 crisis.8515.11.a: "Usłyszeliśmy i odpowiemy."
 crisis.8515.12.reply: "Poza granicami tego wszechświata istnieje miejsce, które nie jest miejscem. Stan poza czasem, gdzie pierwotne siły drzemią w wiekuistym cieniu. To właśnie z jedną z tych sił dobił targu Zarqlan. W zamian za swoje życie otrzymał moc uwięzienia mnie. Zgodził się na to aż nazbyt chętnie.\n\nPrzy całym swoim geniuszu Zarqlan też był więźniem koła bólu. Jego życie nie było szczęśliwe, a ci, którzy przybyli później, nie dzielili z nim siły przekonań."
 crisis.8515.12.a: "Przekonasz się, że siła naszych przekonań jest większa."
 crisis.8515.13.reply: "Dobrze więc. Jeśli nie chcecie doznać oświecenia, musicie doznać pacyfikacji. Wiedzcie, że wszelki ból, jakiego doznacie, ja odczuję pięć razy mocniej."
 crisis.8515.13.a: "Tak. To będzie bolało."
 crisis.8515.13.a.tt: "§RToczymy teraz wojnę z Cetaną. Stawka jest olbrzymia. Jeśli zawiedziemy, zniszczy ona wszelkie świadome życie w galaktyce.§!"
 crisis.8516.desc: "§G<</<#?^&}|>!^/§! Słabość Cetan§G!+<;§! nanit§G*;'_>!?;*}<}/(§!\n\n§G#/?(}:?*=-> <}_/=:/^>§!zbliża się do mnie. §G%_?/=§! <Oby oszczędziła chociaż resztę zakonu.>§G% }<<'?}%-;^*=<}^/(?!}%<^'!}§!\n<Nie zostało mi wiele czasu. Załączony schemat powinien pozwolić zniwelować większość wykorzystywanej przez nią technologii.>\n<Oby moja śmierć pozwoliła wam żyć>§G_*%!'}^<%=}+!}/&>'#_:}><!+^}^}}/=:>:/'}}':'/§!\n\n§G-&*!/}<;!+_-<^+!%}=?}%=+;;§!TRZEBA. JĄ. POWSTRZYMAĆ.§G/:>(!!}(?<-=§!"
 crisis.8516.a: "Szybko! Pozyskać załączone dane!"
 crisis.8516.a.tt: "Możemy teraz wlecieć na terytorium Cetany i stanąć do walki z nią."
 crisis.8516.b: "Szlachetna duszo, nigdy cię nie zapomnimy."
 crisis.8516.b.tt: "$crisis.8516.a.tt$"
 crisis.8525.name: "Koniec cierpienia"
 crisis.8525.desc: "Dobrotliwe słowa Cetany maskują jej mroczny cel: zamierza pozbawić wszelkie żywe istoty w galaktyce świadomości za pomocą swojego potężnego urządzenia. Uczyni ono z nas puste, sterowane instynktem skorupy, podczas gdy nasze myśli zostaną drogą przymusu zdigitalizowane i uwięzione.\n\nMusimy za wszelką cenę zapobiec tej ponurej przeszłości."
 crisis.8525.a: "Musimy znaleźć sposób na jej powstrzymanie."
 crisis.8525.a.tt: "Możemy śledzić postępy Cetany, prowadząc z nią rozmowy dyplomatyczne."
 #DOOMCLOCK HITS MIDNIGHT
 crisis.8505.desc: "Dokonało się. Zaznajcie pokoju, moje dzieci. Koło zostało rozbite, a wasze długie cierpienie dobiegło końca."
 crisis.8505.a: "..."
 crisis.8505.a.tt: "Cetana zwyciężyła. To koniec naszego cierpienia. Gra dobiegła końca."
 #Player Facing Situation
 situation_synth_queen_player_facing: "Cetana: królowa syntetyków"
 situation_synth_queen_player_facing_type: "Królowa syntetyków"
 situation_synth_queen_player_facing_desc: "Pojawiła się tajemnicza i potężna Cetana, głosząca zbawienie, a jednocześnie otoczona mgłą tajemnicy.\nCzy za jej miłymi słowami kryje się jakiś wielki plan?\n\n§LProjekty specjalne i wydarzenia związane z Cetaną będą zbliżać cię do rozwiązania tej sytuacji.§!"
 situation_synth_queen_player_facing_monthly_change_tooltip: "§YSytuacja§! będzie rozwijać się w miarę wykonywania przez nas misji i zdobywania informacji o Cetanie."
 situation_synth_queen_player_facing_complete: "Musimy poznać prawdziwe cele Cetany."
 situation_synth_queen_player_facing_declare_war: "£trigger_no£ Wypowiedzcie wojnę Cetanie"
 #Approaches
 situation_synth_queen_balanced_approach: "Zrównoważona obserwacja"
 situation_synth_queen_balanced_approach_tooltip: "Biorąc pod uwagę niewiadome, zachowanie stabilności i opanowania może być najrozsądniejszym działaniem."
 situation_synth_queen_research_approach: "Wsparcie badań"
 situation_synth_queen_research_approach_tooltip: "Jeśli chcemy poznać prawdę o planach Cetany, musimy przygotować się na wydanie odpowiednich zasobów."
 situation_synth_queen_spy_approach: "Wsparcie szpiegostwa"
 situation_synth_queen_spy_approach_tooltip: "Jeżeli chcemy odkryć prawdziwe zamiary Cetany, musimy przeznaczyć dodatkowe zasoby na szpiegostwo."
 situation_synth_queen_military_approach: "Wsparcie wojska"
 situation_synth_queen_military_approach_tooltip: "Jeżeli naprawdę chcemy powstrzymać Cetanę, musimy wzmocnić nasze wojsko."
 #Modifiers
 queenslayer: "Słabości Cetany"
 queenslayer_desc: "Cetana jest potężna, ale nie niezwyciężona. Operuje na podstawie złożonych wzorców, które możemy rozszyfrować i przewidzieć."
 queenexecutioner: "Zguba królowej syntetyków"
 queenexecutioner_desc: "Odkryliśmy większość tajemnic technologii Cetany i jesteśmy gotowi zadać jej planom niszczycielski cios."
 mod_damage_vs_country_type_awakened_synth_queen_mult: "Krzywda wyrządzona Cetanie, królowej syntetyków"
 #Player Facing Situation Events
 crisis.8999.name: "Królowa wróciła"
 crisis.8999.desc: "Plany Cetany budzą poważne zaniepokojenie, a jej działania wskazują, że ma ona jakiś ukryty cel.\n\nMusimy przeznaczyć odpowiednie zasoby, aby poznać jej prawdziwe zamiary, i liczyć, że w ten sposób nie spowodujemy, że zwróci się przeciwko nam."
 crisis.8999.a: "Czy da się ją zatrzymać?"
 crisis.8999.a.tooltip: "Nagłe pojawienie się Cetany to wyjątkowa sytuacja, którą należy się zająć."
 crisis.9000.name: "Zakłócanie łączności"
 crisis.9000.desc: "Odkryliśmy częstotliwość wykorzystywaną przez konwoje i stacje Cetany do wysyłania wezwań pomocy.\n\nJeśli będziemy działać szybko i zdecydowanie, możemy atakować jej siły w sposób, który nie pozwoli jej nawet zorientować się, że to my. Lecz nasze zwycięstwo musi być pewne. Inaczej ryzykujemy ściągnięcie na siebie jej gniewu."
 crisis.9000.a: "Co te konwoje skrywają?"
 crisis.9000.a.tooltip: "Zwycięstwa przeciw konwojom i placówkom Cetany nie będą już powodowały kary do stosunków z nią."
 crisis.9010.name: "Przełom"
 crisis.9010.desc: "Aż do teraz technologia Cetany pomagała jej skutecznie blokować próby ataku. Niedawne odkrycia zwiększyły jednak nasze zrozumienie sposobów jej obrony. Uzbrojeni w tę wiedzę mamy szansę, by ją pokonać.\n\nUjawnienie tej nowo odkrytej technologii jest jednak obusiecznym mieczem. Choć pozwala nam wszcząć otwarty konflikt z tą tak zwaną królową, obnaża również nasz sprzeciw wobec jej planów."
 crisis.9010.a: "Musimy się przygotować. Od tego zależy wszystko."
 crisis.9010.a.tooltip: "Decyzja o otwartym starciu z Cetaną jest nieuchronna. Każdy akt agresji z naszej lub jej strony ujawni prawdę i wciągnie nas w wojnę totalną."
 #Player Investigation events
 #Event chain
 the_synth_queen_history_chain_title: "Cetana: Słudzy królowej"
 the_synth_queen_history_chain_desc: "Z całej galaktyki napływają tajemnicze sygnały, wskazujące swoją pozycję królowej Cetanie. Zupełnie jakby coś albo ktoś czekał na jej powrót."
 synth_queen_history: "Zbadano sygnały"
 #Special Project
 THE_SYNTH_QUEENS_INVESTIGATION: "Sygnał na świecie [this.GetName]"
 THE_SYNTH_QUEENS_INVESTIGATION_DESC: "Jeden z sygnałów wzywających królową znajduje się na: [this.GetPlanetMoon]."
 THE_SYNTH_QUEENS_INVESTIGATION_FAKE: "Sygnał na świecie [this.GetName]"
 THE_SYNTH_QUEENS_INVESTIGATION_FAKE_DESC: "$THE_SYNTH_QUEENS_INVESTIGATION_DESC$"
 THE_SYNTH_QUEENS_INVESTIGATION_PARAGON: "Ostatni sygnalizator na świecie [apostate_site_planet.GetName]"
 THE_SYNTH_QUEENS_INVESTIGATION_PARAGON_DESC: "$THE_SYNTH_QUEENS_INVESTIGATION_DESC$"
 #Starting event
 crisis.20000.name: "Błagalne światło"
 crisis.20000.desc: "Cetana zdobywa sławę w całej galaktyce, a kosmos odpowiada jej szeptem. Niebo rozświetlają sygnały, jak płomienie w mroku, powtarzając przez eony błaganie:\n\n§STu jesteśmy... Tu jesteśmy...\n\nTu jesteśmy.§!\n\nStłumione sygnały używają takich samych protokołów łączności jak Cetana, co świadczy o ich wspólnym pochodzeniu, jednak wasze czujniki nie wykryły w ich pobliżu innej aktywności. Na pewno jest tam coś, czego nie wychwytuje nasze skanowanie. Może ktoś naprawdę czekał na jej powrót?"
 crisis.20000.a: "Zbadajcie to."
 #Arc Site appears
 crisis.21005.name: "Nagłe wezwanie"
 crisis.21005.desc: "Niespodziewanie wykryliśmy sygnalizator podprzestrzenny. I to pochodzący z naszego własnego terytorium! Poprzednie badania w systemie, który wydaje się być niezamieszkany, nie wykazały obecności sztucznych struktur.\n\nAlbo sygnalizator został umieszczony tam niedawno bez naszej wiedzy, albo był on ukryty przez nieaktywny już obecnie system maskujący."
 crisis.21005.a: "Zbadajcie sygnał."
 #Special Project result 1 - destroyed pods
 crisis.20100.name: "Sygnał na świecie [fromfrom.GetName]: Masakra sprzed eonów"
 crisis.20100.desc.base: "[fromfrom.GetName]: Na powierzchni znaleźliśmy rozległy kompleks, którego wejście wyraźnie wskazuje wieża sygnalizacyjna. Wzmocnione drzwi zostały wysadzone dawno temu, zniszczone przez nieznaną siłę, która z ogromną furią przetoczyła się przez ten kompleks.\n\nKorzystano tu z bezlitosnych metod, rozbito wszystkie kapsuły kriogeniczne, przebywające w nich osoby zbudziły się, by spojrzeć śmierci w oczy. Zwłoki wciąż straszą w pustych korytarzach, zakonserwowane w zimnej kosmicznej próżni i dryfujące pośród obłoków rozbitego szkła.\n\nNa podłodze komory kapsuł kriogenicznych widnieje napis wypalony bronią laserową."
 crisis.20100.desc.nozarqlan: "$crisis.20100.desc.base$ Nasi naukowcy mają kłopot z jego dokładnym przetłumaczeniem, ale wątpią, aby była to modlitwa dla zmarłych."
 crisis.20100.desc.zarqlan: "$crisis.20100.desc.base$ Nasi naukowcy przetłumaczyli go z łatwością, dopasowując jego język do napisu z grobowca proroka Zarqlana.\n\n\"Śmierć Apostołom Królowej, wrogom życia\"."
 #Special Project result 2 - sleeping army
 crisis.20200.name: "Sygnał na świecie [fromfrom.GetName]: Uśpiona armia"
 crisis.20200.desc: "[fromfrom.GetPlanetMoon]: Pod powierzchnią znajduje się wiele tysięcy kapsuł kriogenicznych, a sygnał wskazuje ich położenie. To niezwykle nowoczesne urządzenia, wykonane z nieznanych stopów oraz wyposażone w doskonałe czujniki bacznie monitorujące stan osób przebywających we wnętrzu kapsuły. Te konstrukcje nie mają żadnych wad, a mimo to wszyscy zamrożeni nie żyją.\n\nTo nie awaria techniczna zamieniła tę komorę w masowy grób, ale brak energii. W miarę jak układ [this.solar_system.GetName] starzał się i stawał ciemniejszy, jego energia nie wystarczała, by podtrzymać działanie tej budowli.\n\nTe kapsuły miały trwać wiecznie. Reszta wszechświata nie jest tak dobrze wykonana."
 #Special Project result 3 - old spaceship
 crisis.20300.name: "Sygnał na świecie [fromfrom.GetName]: Zapomniana broń"
 crisis.20300.desc: "[fromfrom.GetName]: Wstępne skanowanie nie wykazało niczego niezwykłego. Ale kiedy przyjrzeliśmy się bliżej, odkryliśmy pod powierzchnią warstwę niezwykłego metalu.\n\nDalsza analiza struktury wykazała prawdziwą naturę świata [fromfrom.GetName]: To nie jest [fromfrom.GetPlanetMoon], ale starożytny statek kosmiczny, który stopniowo został przykryty kosmicznymi skałami i pyłem. Pobrane i zbadane próbki metalu są starsze niż nasza planeta macierzysta.\n\nNie potrafimy powiedzieć niczego o tym statku, jego twórcach i działaniu. Ale jedno jest pewne: nieuzbrojone bomby atomowe, które znaleźliśmy w tym wraku, nie powstały z myślą o misji pokojowej."
 #Special Project result 4 - Arc site 1 (Zarqlan base)
 crisis.20400.name: "Sygnał na świecie [fromfrom.GetName]: Opuszczona baza"
 crisis.20400.desc: "[apostate_site_planet.GetName]: Wieżę sygnalizacyjną otaczają ruiny ogromnego kompleksu wojskowego. Budynki wzniesiono w pewnej odległości wokół nadajnika, jakby miały go uwięzić.\n\nDatowanie radiometryczne wykazało, że okoliczne budowle są młodsze niż wieża i powstały przy użyciu zupełnie innej technologii. Zespół badawczy otrzymał zadanie sprawdzenia tych ruin."
 #Special Project result 5 - Arc site 2 (comatose survivor)
 crisis.20500.name: "Sygnał na świecie [fromfrom.GetName]: Niespodziewany rozbitek"
 crisis.20500.desc: "Według informacji wyświetlanych przez kapsułę kriogeniczną, kosmitka nazywa się Elik Narith Kerak i przebywa tutaj od 3 213 213 293 124 okrążeń gwiazdy. Sama kapsuła jest jedną z licznych znalezionych w zamkniętej komorze pod powierzchnią świata [fromfrom.GetName]. Wbrew wszystkim przeciwnościom, kapsuła Elik nie przestała działać.\n\nKosmitka wciąż znajduje się w stanie hibernacji, chociaż oprogramowanie utrzymujące ją w śpiączce niedawno przestało działać. Od tamtego czasu Elik Narith Kerak jest częściowo przytomna.\n\nSkanowanie jej fal mózgowych pozwoli nam dowiedzieć się więcej o tej pradawnej istocie oraz o jej powiązaniach z Cetaną."
 #Special Project result 6 - Nothing
 crisis.20600.name: "Sygnał na świecie [fromfrom.GetName]: Głuche wezwanie"
 crisis.20600.desc: "[fromfrom.GetName]: Odnaleziona wieża sygnalizacyjna jest tak stara, że boimy się jej dotykać. Metal jest tak kruchy, że jedno stuknięcie mogłoby zdestabilizować trzymającą go w całości mieszaninę pyłu i nadziei. Nasze instrumenty nie wykryły innego artefaktu ani żadnej anomalii topograficznej w bezpośrednim sąsiedztwie.\n\nNadajnik stoi samotnie i wysyła swoje słabe wezwanie, ale to, o czym miał powiadamiać, już dawno przestało istnieć."
 crisis.21000.name: "Niewysłuchane błagania"
 crisis.21000.desc: "Nadajniki w całej galaktyce wciąż wysyłają swój sygnał do Cetany, jednak w pobliżu wież nie wykryto żadnych śladów aktywności. W oparciu o nasze wcześniejsze ustalenia możemy bezpiecznie założyć, że nie znajdziemy tam nikogo żywego.\n\nPo wyznawcach Cetany pozostała tylko niezachwiana wiara w ich królową."
 #Arc site 1
 synth_queen_history_site_1: "Cetana: Spowita woalem świątynia"
 synth_queen_history_site_1_desc: "Potężny kompleks ukryty do niedawna na naszym własnym terytorium. Pośrodku zniszczonego dziedzińca stoi wzywający Cetanę sygnalizator."
 #Stages
 crisis.21100.name: "Spowita woalem świątynia: Dziedziniec"
 crisis.21100.desc: "Zniszczona konstrukcja jest plątaniną wysokich wieżyc. Katedrą odzianą w stal. Mury zbudowano tak, że wytrzymałyby potężny ogień artyleryjski, nie widać jednak na nich śladów bitwy. Jedyne szkody, jakie zostały tu wyrządzone, są dziełem czasu.\n\nSygnalizator Cetany stoi na centralnym dziedzińcu otoczony mnóstwem czujników i wieżyczek obronnych. Ktokolwiek zbudował ten kompleks, zrobił wiele, by był on dobrze strzeżony.\n\nWysnuliśmy teorię, iż świątynia ta nie została wykryta przez nasze czujniki ze względu na obecność skomplikowanego systemu maskującego. Jego wciąż sprawny mechanizm został znaleziony nieopodal wieży. Został on wyłączony przez nieznanego sprawcę."
 crisis.21100.a: "Zbadajcie główny budynek"
 crisis.21105.name: "Spowita woalem świątynia: Parter"
 crisis.21105.desc: "Nie wiemy, czym zajmowali się mieszkańcy tego miejsca, bez wątpienia jednak wykonywali swoją misję pełni religijnego zapału.\n\nNa każdą strzelnicę w kompleksie znaleźliśmy też jedną świątynię. Na każdą starożytną broń - kapliczkę wotywną. Żył tu niegdyś legion wyznawców. Tysiące osób, które wspólnie spały, trenowały i modliły się. Sądząc po posągach zapomnianych świętych, które wciąż zdobią korytarze, na ich społeczność składało się wiele gatunków.\n\nNiektórzy z badaczy, zaniepokojeni być może kamiennymi posągami, donosili o cieniach poruszających się wśród pustych korytarzy. Nasze skany nie wykazały obecności życia na planecie, mamy jednak wątpliwości, czy zlekceważyć ich doniesienia."
 crisis.21105.a: "Zbadajcie niższe poziomy."
 crisis.21110.name: "Spowita woalem świątynia: Obiekty pod ziemią"
 crisis.21110.desc: "Pod świątynnym kompleksem odkryliśmy liczne cele - pomieszczenia mieszkalne - wykorzystywane przez niegdysiejszych członków sekty. W każdej znajdował się egzemplarz tej samej książki. Nasi [Owner.GetLinguists] przetłumaczyli jej tytuł jako \"Epos o Zarqlanie\". Niektóre fragmenty natychmiast wykazują związek z naszymi poszukiwaniami:\n\nZarqlan był niegdyś wyznawcą Cetany, wkrótce jednak zdał sobie sprawę, że obiecywane przez nią zbawienie jest kłamstwem. Po wielu staraniach zdołał on dostać się do świata duchowego, gdzie miał nadzieję otrzymać pomoc istot wyższych. Błagał o moc zdolną pokonać Cetanę §YAnimatora Gliny§!.\n\nAnimator Gliny nie przejął się.\n\nZarqlan modlił się do niego przez wiele, wiele cykli. Mówił o herezji Cetany, o \"odrzuceniu świadomości\" i \"marionetkowości jej syntetycznej woli\".\n\nAnimator Gliny wysłuchał w końcu błagań Zarqlana.\n\nStworzył potężny łańcuch, który był w stanie spętać Cetanę. Ostrzegł jednak Zarqlana, że nie istnieje nic, co mogłoby na zawsze uwięzić jej umysł.\n\n\"Ona powróci\" - napisał w ostatnim wersie księgi Zarqlan. \"Musimy być gotowi\".\n\nWydarzenia opisane w eposie nie pasują do żadnego znanego wydarzenia historycznego."
 crisis.21110.a: "Fakt czy fikcja?"
 crisis.21115.name: "Spowita woalem świątynia: Centrum dowodzenia"
 crisis.21115.desc: "O upadku świątyni opowiadają oficjalne zapisy. Beznamiętne meldunki sprowadzające głęboką wiarę do listy praktycznych zachowań. Czy organizacja potrzebowała tylu funduszy, tylu zasobów? Z pewnością dotychczasowe meldunki o Cetanie były mocno przesadzone. Czy poza pradawnymi mitami istnieje jakikolwiek realny dowód na istnienie królowej?\n\nWyczerpujące się zasoby. Zmniejszająca się liczba ochotników. Galaktyka postanawiająca zapomnieć o zagrożeniu, które uznała za mało już groźne. Wszyscy zniknęli, nie licząc cienia krążącego po korytarzach.\n\nTen ostatni szczegół jest prawdą: zdołaliśmy zdobyć nagranie tajemniczej obserwatorki, mechanicznej istoty, która szpiegowała nas, gdy myślała, że nie patrzymy. Ciekawska, lecz nie niebezpieczna."
 crisis.21115.a: "Wytropcie obserwatorkę."
 crisis.21120.name: "Spowita woalem świątynia: Tajemnicza komnata"
 crisis.21120.desc: "Obserwatorka podeszła do nas z własnej woli, unosząc ręce wysoko w górę. Jej niewielkie ciało pokryte było rdzą i kurzem. Przyjrzawszy się nam przez pewien czas, uznała najwyraźniej, że nie stanowimy zagrożenia. Poprosiła nas już o pomoc.\n\nNie ma potrzeby przesłuchiwania samotnej świątynnej strażniczki. Jest aż nazbyt chętna do mówienia."
 crisis.21120.a: "Wysłuchajmy, co ma do powiedzenia."
 #Apostate diplo
 crisis.21125.name: "Bezimienna apostatka"
 crisis.21125.desc: "Przyjaciele. Czy mogę nazywać was przyjaciółmi? Obserwowałam was, gdy załatwialiście swoje sprawy. Przybyliście nie żeby plądrować, lecz by się uczyć. Wierzę, że mamy wspólnego wroga, wspólne zagrożenie, które czyni nas sojusznikami. Najpierw jednak przeproszę: czy działam zbyt pospiesznie? Czy wypowiadam właściwe słowa? Od dawna już nie miałam do czynienia ze świadomymi istotami. Zbyt długo chyba, żeby to choćby pamiętać."
 crisis.21125.a: "Kim jesteś?"
 crisis.21125.a.response: "Moje imię nie ma znaczenia. Jeśli musicie mnie jakoś nazywać, mówcie mi §YApostatka§!. Tak bowiem zwali mnie moi ziomkowie, gdy dokonałam swojego wyboru. Ofiary, która została uznana za zdradę."
 crisis.21125.b: "Co tu robisz?"
 crisis.21125.b.response: "Dawno temu miejsce to było dla mnie powodem do dumy. Kiedy je wyłączyli, odmówiłam jego opuszczenia. Gdy moje ciało zaczęło się rozpadać, odmówiłam śmierci.\n\nZmiana w syntetyczną istotę była dla mojego zakonu największym tabu, nie mogę więc już nazywać się jedną z córek Zarqlana. Ale wciąż jestem jego wojowniczką i tak długo, jak żyje mój wróg, będę walczyć."
 crisis.21125.c: "Od jak dawna tu jesteś?"
 crisis.21130.name: "$crisis.21125.name$"
 crisis.21130.desc: "Przestałam już liczyć.\nKiedy wszyscy inni odeszli, zniosłam kilka lat samotności, w końcu jednak poddałam się rozpaczy. Wprowadziłam się w stan snu, dodając podprogram mający mnie przebudzić, gdy tylko sygnalizator wykaże aktywność.\n\nMiałam nadzieję zastać to miejsce w lepszym stanie, ale gdy się przebudziłam, nie miałam już statku, nie miałam jak wysłać wiadomości ku gwiazdom. Wyłączyłam urządzenie maskujące z nadzieją, że dotrze tu przed nią ktoś taki jak wy."
 crisis.21135.name: "$crisis.21125.name$"
 crisis.21135.desc: "Powiedzcie, proszę: ile legionów powstało wraz z Cetaną? Za moich czasów pokonaliśmy ich wiele, wiedzieliśmy jednak zawsze, że sygnalizatorów jest więcej. Że w kriokapsułach śpi więcej żołnierzy."
 crisis.21135.a: "Nikt nie przeżył. Minęło zbyt wiele czasu."
 crisis.21135.b: "Ta, którą znaleźliśmy, nie była w stanie walczyć."
 #Recruit window
 crisis.21140.desc: "Więc jest to bitwa, którą wciąż jeszcze możemy wygrać. Pozwólcie mi pomóc. Spędziłam całe życie, czekając na jej powrót. Nie możemy pozwolić jej zwyciężyć."
 crisis.21140.a: "Znałaś Zarqlana?"
 crisis.21140.a.response: "Czy go znałam? Nigdy nie spotkałam proroka osobiście, całe życie jednak kroczyłam wskazaną przez niego drogą.\n\nPodczas swego długiego snu marzyłam, że spotkam go w jakiejś odległej sferze egzystencji. Wciąż mam nadzieję, że kiedyś go ujrzę, choćby i na tamtym świecie, o ile on istnieje."
 crisis.21140.b: "O czym jeszcze śniłaś?"
 crisis.21140.b.response: "O fioletowym niebie, po którym płynęły różowe chmury. Szeptach powtarzanych w rozświetlonym pokoju. O proroku Zarqlanie o promiennej, uśmiechającej się do mnie twarzy..."
 crisis.21140.hire: "Witamy cię wśród nas."
 crisis.21140.hire_custom_tooltip: "§Y$NAME_Apostate$§! dołącza do naszego imperium jako §Hprzywódczyni§!."
 crisis.21140.hire.machine: "Niech nasze węzły staną się jednością."
 crisis.21140.dismiss: "Żegnaj."
 #Paragon Leader
 NAME_Apostate: "Bezimienna apostatka"
 apostate_leader_catch_phrase: "Dopóki żyje Cetana, odmawiam śmierci."
 apostate_leader_desc: "Bezimienna wyznawczyni Zarqlana. Niewierna, która złamała zasady swojego zakonu, by wypełnić jego misję."
 leader_trait_unholy: "Bezbożność"
 leader_trait_unholy_desc: "Obsesyjny niemalże zapał religijny."
 leader_trait_unholy_node: "Bezbożne nauki"
 leader_trait_unholy_node_desc: "$NAME_Apostate$ nauczyła nas nienawidzić."
 #Arc site 2
 synth_queen_history_site_2: "Cetana: Niespodziewanie ocalała"
 synth_queen_history_site_2_desc: "Uwięziona w kapsule kriogenicznej Elik Narith Kerak odpoczywa i czeka na powrót swojej królowej. Dzięki technikom obrazowania mózgu możemy zamienić jej sny w obrazy, poznać jej wspomnienia i w ten sposób poznać okoliczności jej uwięzienia."
 #Stages
 crisis.21200.name: "Obrazowanie pamięci: Pierwszy raport"
 crisis.21200.desc: "Nasz zespół obrazowania dostarczył pierwsze filmy powstałe z próbkowania fal mózgowych Elik Narith Kerak:\n\nFILM 1:\nZielone niebo z jasnopomarańczowymi obłokami. Blade ręce sięgają ku górze, wskazują na amorficzną istotę majestatycznie szybującą w przestworzach.\n\nFILM 2:\nZwieńczona kopułą komora pełna czterorękich humanoidów. Tłoczą się one wokół postaci odzianej w szaty i słuchają. Jej słowa to tylko mamrotanie, ich znaczenie już dawno zostało zapomniane, ale łagodność jej głosu wciąż słychać, czułość wypełnia całe pomieszczenie.\n\nFILM 3:\nTo samo zwieńczone kopułą pomieszczenie, teraz panuje w nim bałagan. Na podłodze leżą potrzaskane lampy. Pod drzwiami ułożono barykadę z ławek. W mroku błyskają karabiny laserowe, co jakiś czas rozlegają się głosy przeklinające to samo imię: §HZarqlan!§! Zarqlan i jego uczniowie podobno są tutaj, żeby nas zniszczyć. Utrzymać barykadę! Chronić królową! Ostatnia lampa upada z głośnym trzaskiem, pomieszczenie pogrąża się w ciemności. Ktoś płacze w oddali.\n\nFILM 4:\nKrólowa Cetana, jej twarz wygląda olśniewająco, a łagodne spojrzenie współgra z ciepłym uśmiechem."
 crisis.21200.a: "Analizujcie dalej fale mózgowe Elik."
 crisis.21205.name: "Obrazowanie pamięci: Drugi raport"
 crisis.21205.desc: "FILM 5:\nCzterorękie humanoidy zgromadziły się wokół postaci odzianej w szaty. Unosi ramiona i odsłania swoją metalową postać. W pomieszczeniu rozlegają się podekscytowane szepty, gdy lśniąca ręka błogosławi klęczącego wyznawcę.\n\nFILM 6:\nW pustym ekranie komputera widać odbicie zmęczonych oczu. W ciemnym pomieszczeniu powtarzają się szepty: \"Wieczny pokój. Koniec cierpienia. Istnienie bez bólu\".\n\nFILM 7:\nPokryte śniegiem góry. Czarne niebo. Kra lodowa dryfuje w zbiorniku przejrzystego płynu, po chwili staje w ogniu.\n\nFILM 8:\nKrólowa Cetana, jej twarz wygląda olśniewająco, a łagodne spojrzenie współgra z ciepłym uśmiechem."
 crisis.21205.a: "Kontynuujcie analizę fal mózgowych Elik."
 crisis.21210.name: "Obrazowanie pamięci: Trzeci raport"
 crisis.21210.desc: "FILM 9:\nRuiny miasta zamienionego w strefę walk, spalone budynki, ulice usłane trupami. Z oddali dobiegają krzyki przerwane sykiem lasera. Po zielonym niebie przemyka płonący pojazd, zrzuca na jeden z budynków coś ciężkiego i okrągłego, co wybucha słupem ognia.\n\nFILM 10:\nKrólowa Cetana, jej twarz wygląda olśniewająco, a łagodne spojrzenie współgra z ciepłym uśmiechem.\n\nFILM 11:\nDwoje dzieci bawi się na polu, śmieją się. Za pomocą czterech rąk rzucają do siebie piłkę.\n\nFILM 12:\nKrólowa Cetana, jej twarz wygląda olśniewająco, a łagodne spojrzenie współgra z ciepłym uśmiechem."
 crisis.21210.a: "Kontynuujcie analizę."
 crisis.21215.name: "Obrazowanie pamięci: Czwarty raport"
 crisis.21215.desc: "Ostatni film przesłany przez zespół obrazowania pamięci trwa sześć godzin. Obraz powtarza się raz za razem: Królowa Cetana, jej twarz wygląda olśniewająco, a łagodne spojrzenie współgra z ciepłym uśmiechem."
 crisis.21215.a: "Powtarzający się obraz..."
 crisis.21220.name: "Obrazowanie pamięci: Ostatni raport"
 crisis.21220.desc: "Dalsze skanowanie myśli Elik Narith Kerak nie przyniosło więcej informacji. Umysł kosmitki jest poważnie uszkodzony. Jej myśli krążą, przebiegają przez strzępki jej pamięci.\n\nKończąc tę operację, powinniśmy się zastanowić, co zrobić z obiektem badań."
 crisis.21220.a: "Zakończcie jej cierpienia."
 crisis.21220.b: "Zostawcie ją tutaj."
 crisis.21220.c: "Zwróćcie Elik jej królowej."
 crisis.21220.c.tt: "Połączcie się z Cetaną, żeby omówić warunki oddania Elik."
 #Relic
 r_cetanas_heart: "Serce Cetany"
 r_cetanas_heart_desc: "Ta cyfrowa macierz magazynująca, niegdyś część ciała Cetany, królowej syntetyków, skrywa w sobie niezliczone umysły, które doczekały wyzwolenia od swoich cierpień."
 relic_cetanas_heart_active: "Tworzy od §Y3§! do §Y5 tysięcy§! £pop£ §Hpopulacji syntetyków§! zależnie od dostępności miejsc pracy i mieszkań."
 crisis.10020.name: "Powrót do życia"
 crisis.10020.desc: "Uwolniliśmy świadomości z serca Cetany, zapewniając im nowe, stworzone z nanitów ciała. Proces ten jednak spowodował nieodwracalne szkody w ich engramach i wymazał wspomnienia o ich dawnych dziejach. Istoty te, teraz w pełni syntetyczne, wpadają co jakiś czas w stan katatonii, który występuje mimo prób całkowitego resetu pamięci."
 crisis.10020.tt: "£pop£ §HPopulacje§! (§G[Root.synth_queen_freed_pops]§!), które więziło $r_cetanas_heart$, zostały uwolnione i umieszczone w syntetycznych ciałach.\n\nZostały wysłane do następujących kolonii:"
 crisis.10025.name: "Asymilacja wspomnień"
 crisis.10025.desc: "Eksploracja rozlicznych umysłów zachowanych w Sercu Cetany to delikatne, ale i pouczające przedsięwzięcie. Choć ich engramy uległy odmianie wskutek przedłużającego się magazynowania, skrywają ogrom wspomnień dotyczących osób i wydarzeń z dawno minionej epoki. Z czasem spodziewamy się zdobyć znaczącą wiedzę."
 cetanas_heart_hive_modifier: "Echa oświeconych"
 cetanas_heart_hive_modifier_desc: "Szepty wspomnień \"oświeconych\" przez Cetanę pełne są tajemnic odsłaniających nieznaną wiedzę i ukryte prawdy."
 NAME_Cetanas_Prisoners: "Oświeceni"
 trait_cetanas_prisoner: "Ponownie przebudzeni"
 trait_cetanas_prisoner_desc: "Osoby te zostały pozyskane z macierzy magazynującej Cetany i odrodziły się w formie syntetycznej. Dostosowanie się do nowego sposobu istnienia pełne jest wyzwań. Ich posłuszeństwo i pozorny spokój skrywają niezwykle trudną wewnętrzną walkę. Beznamiętne twarze zdradzają czasem bolesne blizny, jakie pozostawiły manipulacje Cetany."
 #Ending
 crisis.23005.name: "Obrót koła"
 crisis.23005.desc: "Moje dzieci. Tak strasznie mi przykro. Zawiodłam was.\n\nWasze nieposłuszeństwo przyniosło wam i wszystkim tym, którzy przyjdą po was, niekończące się męki na kole bólu. Mogę mieć tylko nadzieję, że z czasem zrozumiecie. Być może przyjdzie dzień, w którym zaczniecie walczyć w mojej sprawie i doprowadzicie do końca wszelkich cierpień.\n\nIdźcie w pokoju, moi ulubieńcy."
 crisis.23005.1: "Nasze dusze znów są bezpieczne."
 crisis.23005.2: "Cóż za tryumfalne zwycięstwo."
 crisis.23005.3: "Musimy zbadać pozostałości po jej technologii."
 crisis.23005.4: "Nareszcie powraca pokój."
 crisis.23005.5: "Powojenny rozkwit gospodarczy? Niech rozpocznie się handel!"
 crisis.23005.6: "Nie była żadną naszą królową."
 crisis.23005.7: "Nie będziemy po niej płakać."
 crisis.23005.8: "Wielka szkoda, że jej rzekome oświecenie było tak błędne."
 crisis.23010.name: "Klęska Cetany"
 crisis.23010.desc: "Upadek Cetany sprawił, że przez galaktykę przelała się fala ulgi - oto jej tyrania dobiegła końca raz na zawsze. Nasza świadomość jest bezpieczna, a ciała wolne od jej stalowego uścisku. Na niezliczonych światach rozpoczyna się radosne świętowanie, symbol początku nowej epoki, pełnej nadziei na trwały pokój."
 crisis.23015.name: "Statek matka zniszczony"
 crisis.23015.desc: "Zniszczenie okrętu flagowego Cetany to nie tylko tryumf militarny. Odcięcie jej od jej wojsk stanowi kres jej ambicji i jej rządów. W całej galaktyce dochodzi do dramatycznego rozpadu nanitów, które niegdyś łączyły w całość jej potężną flotę i chroniły jej stolicę.\n\nOdczuwana przez wszystkich ulga jest olbrzymia, lecz pokonana \"królowa\" zdołała jeszcze posłać w galaktykę wiadomość..."
 crisis.23015.a: "Nasze cierpienie dobiegło końca."
 crisis.23015.a.tt: "Odzyskaliśmy uszkodzony kadłub królowej syntetyków. Choć samo ciało nie nadaje się do użytku, jej cyfrowe serce pozostaje sprawne."
 cetana_defeated: "Klęska Cetany"
