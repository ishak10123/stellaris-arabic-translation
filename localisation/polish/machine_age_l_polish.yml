 #Fallen Empire Reactions
 action.1.desc_111: "Niemądre dziecko, twierdzisz, że znasz boga, a jednak plugawisz swoje [Owner.Species.GetFleshTypeCyberCreed]. Jesteśmy imperium [contact_empire.GetName], wybranym ludem galaktyki. Trzymajcie wasze nieczyste ciała z daleka od naszych świętych miejsc. Jeśli nie posłuchacie, zostaniecie natychmiast zniszczeni."
 action.1.desc_110: "Jesteśmy imperium [contact_empire.GetName], wybranym ludem galaktyki. Przez wiele stuleci zaniedbywaliśmy duchowe potrzeby pomniejszych gatunków. Wy i wasze nieczyste powłoki jesteście doskonałym przykładem naszej omyłki. Przyjmijcie nasze doktryny, nawróćcie się, bo zostaniecie starci w proch."
 #Cybernetic Situation Events
 machine_age.90.name: "Boskie wszczepy"
 machine_age.90.desc: "Wierni pokazali wszystkim tajemnice cybernetyki. Jednak dzisiaj zaczyna się nasza podróż, musimy otworzyć serca na boskie połączenie."
 machine_age.90.a: "Już czas."
 machine_age.90.a.tooltip: "Musimy przyjąć drzewko tradycji \"['tradition_category:tradition_cybernetics']\", aby rozpocząć boską fuzję."
 machine_age.100.name: "Konklawe Fuzji"
 machine_age.100.desc: "W przeszłości podjęliśmy nierozważne próby, które miały zmodyfikować: [Owner.Species.GetFleshTypeCyberCreed]. Doprowadziły one do nieodwracalnego okaleczenia wielu boskich powłok, co wywołało sprzeczne interpretacje boskiej fuzji przez różne kreda.\n\nTechnologia wreszcie umożliwia pełną modyfikację, dlatego święci przywódcy naszej wiary, technofanci, zwołali konklawe. Ma ono ustalić przykazania naszego kościoła, łącząc pojedyncze kreda w jednolity dogmat."
 machine_age.100.a: "Niech bogowie ich prowadzą."
 machine_age.1000.name: "Fuzja wiary"
 machine_age.1000.desc: "Zwołanie Konklawe Technofantów było trudne, ponieważ wszystkie ważne kreda domagały się posiadania tam swoich przedstawicieli. W wyniku negocjacji zaproszono: §Y$CYBERCREED_construction$§!, §Y$CYBERCREED_war$§!, §Y$CYBERCREED_research$§! i §Y$CYBERCREED_labor$§!.\n\nTeraz konklawe z ognistym zaangażowaniem zaczyna realizację swego boskiego zadania. W pierwszym dekrecie domagają się wyższych danin albo większych nakładów obowiązkowych prac społecznych wykonywanych przez całą populację."
 machine_age.1000.a: "Musimy zdecydować, jak wesprzeć konklawe."
 machine_age.1000.a.tooltip: "W tej sytuacji będzie dostępnych więcej opcji działania."
 machine_age.1010.name: "Kodeks modyfikacji"
 machine_age.1010.desc: "Drugim dekretem Konklawe Technofantów jest wezwanie do formalizacji wiary. Zbyt długo różnice między kredami prowadziły do tarć w naszym społeczeństwie.\n\nWszystkie wielkie kreda przedstawiły przekonujące argumenty za zjednoczeniem wiary, jednak bardziej umiarkowane głosy domagają się obrania naprawdę otwartej i inkluzywnej drogi."
 machine_age.1010.a: "Bractwo Młota zbuduje lepszą przyszłość."
 machine_age.1010.a.tooltip: "§Y$CYBERCREED_construction$§! stanie się podstawą dogmatu. $machine_age.1010.shared.tooltip$"
 machine_age.1010.b: "Nasze [Owner.Species.GetFleshTypeCyberCreed] będzie chronione przez Templariuszy Stali."
 machine_age.1010.b.tooltip: "Kredo §Y$CYBERCREED_war$§! stanie się podstawą dogmatu.\n$machine_age.1010.shared.tooltip$"
 machine_age.1010.c: "Chór Umysłu zaśpiewa o rozwoju."
 machine_age.1010.c.tooltip: "Kredo §Y$CYBERCREED_research$§! stanie się podstawą dogmatu.\n$machine_age.1010.shared.tooltip$"
 machine_age.1010.d: "Wspólnota Harówki nada sens życiu naszych robotników."
 machine_age.1010.d.tooltip: "Kredo §Y$CYBERCREED_labor$§! stanie się podstawą dogmatu.\n$machine_age.1010.shared.tooltip$"
 machine_age.1010.e: "Powinniśmy skończyć z dzielącymi nas dogmatami."
 machine_age.1010.e.tooltip: "Kreda zostaną zreformowane tak. Powstanie §Y$pft_cyber_creed_general$§!, co pozwoli modyfikować każdą wierną powłokę.\n$machine_age.1010.shared.tooltip$"
 machine_age.1010.shared.tooltip: "Wszystkie budynki związane z innymi kredami zostaną zastąpione §Yświątyniami§!.\nTo kredo pozostanie jedyną §Yfrakcją duchowości§!.\nBędą mogły powstawać frakcje należące do etyk §Ynieduchowych§!."
 machine_age.1020.name: "Fałszywe wiary"
 machine_age.1020.desc.pickedacreed: "Kiedy wybrano kredo §Y[GetCyberCreed]§!, pozostałe kreda zaprotestowały. Wielu uważa, że konklawe zwróciło się przeciwko prawdziwej wierze. \n\n$machine_age.1020.both$"
 machine_age.1020.desc.nocreed: "Kreda protestują, twierdzą, że Konklawe wyrzekło się wiary.\n\n$machine_age.1020.both$"
 machine_age.1020.both: "Jak na razie protesty są głośne, ale pokojowe. Czas pokaże, czy te iskry wywołają pożar.\n\nCokolwiek się stanie, musimy zdecydować o losach pozostałych kred. Niektóry wzywają do niezwłocznej ekskomuniki, uznania ich dogmatów za herezję, a wywołanego przez nie zamętu za dowody na bluźnierstwo. Są też głosy opowiadające się za litością i okazaniem tolerancji dla błądzących wyznawców naszej wiary."
 machine_age.1020.a: "Może być tylko jedna wiara."
 machine_age.1020.a.tooltip: "Technofanci będą zwalczać inne kreda, co może prowadzić do niepokojów."
 machine_age.1020.b: "W naszej wierze jest miejsce dla każdego."
 machine_age.1020.b.tooltip: "Będziemy mieli oficjalne dogmaty, ale technofanci będą tolerować praktykowanie innych kred."
 machine_age.1030.name: "Zaniepokojeni wierni"
 machine_age.1030.desc: "Na wszystkich naszych planetach rozpoczęły się protesty mniejszości, w których potępia się za rzekome odejście od przykazań świętej fuzji. Technofanci uważają, że niepokoje są tylko tymczasowe, ponieważ większość naszych obywateli popiera jednolite dogmaty, zatem to tylko kwestia czasu, dopóki bardziej zapalczywi protestujący nie pogodzą się z boską prawdą."
 machine_age.1030.a: "Będzie tylko jedna wiara."
 machine_age.1030.a.tooltip: "Decyzja o zwalczaniu konkurencyjnych kred wywołała niepokoje."
 machine_age.1040.name: "Dobrowolne nawrócenie"
 machine_age.1040.desc: "Obywatele masowo zaakceptowali jednolite dogmaty, większość osób praktykujących różne kreda wyrzekła się swoich dawnych tradycji.\n\nWszyscy, poza prawdziwymi fanatykami, są gotowi, aby ich boskie [Owner.Species.GetFleshTypeCyberCreed] przeszły ostateczną transformację."
 machine_age.1040.a: "Prawda naszej boskiej fuzji zwyciężyła."
 machine_age.1040.a.tooltip: "Udało się nam zjednoczyć wiarę."
 machine_age.1050.name: "Zadowolone kreda"
 machine_age.1050.desc: "Zapewnienie wolności wyznania innym kredom było bardzo zrównoważoną decyzją: doszło do nielicznych protestów, w których uczestniczyli najbardziej fanatyczni wyznawcy kred.\n\nWiększość wiernych przyjęła nasze oficjalne dogmaty, zatem jesteśmy gotowi skoncentrować się na boskiej fuzji."
 machine_age.1050.a: "Nasza wiara jest niepodzielna."
 machine_age.1050.a.tooltip: "Tolerancja wobec innych kred zapobiegła niepokojom."
 machine_age.1060.name: "Nierozważny kompromis"
 machine_age.1060.desc: "Postawienie twardych warunków zaniepokoiło większość umiarkowanych osób. Wiele z nich twierdzi, że każde kredo ma długą historię walk z innymi wyznaniami, więc zapewnienie swobody pomniejszym religiom było niewłaściwą decyzją.\n\nWiększość wzywa do oficjalnej reformacji kred, co doprowadzi do odebrania im niezależności."
 machine_age.1060.a: "Wierni muszą być tolerancyjni."
 machine_age.1060.a.tooltip: "Tolerancja okazana kredom zdenerwowała bardziej umiarkowane frakcje naszej wiary i prowadzi do niepokojów."
 machine_age.1060.b: "Zacznijcie reformę kred."
 machine_age.1060.b.tooltip: "Wiara zasymiluje inne kreda i zakończy ich żałosne doktrynalne spory."
 machine_age.1070.name: "Danina czasu"
 machine_age.1070.desc: "W miarę jak zbliża się wielka fuzja, wracamy do starej tradycji wiary: do daniny czasu.\n\nPrzez niezliczone pokolenia każdy wierny w naszym społeczeństwie oddawał kościołowi część swojego czasu i energii. Podobnie jak boska fuzja, ta służba wzmacnia całą wiarę.\n\nJak wierni mogą najlepiej wspierać boską modyfikację?"
 machine_age.1070.intro: "Co roku wierni w naszym społeczeństwie poświęcą część swojego czasu"
