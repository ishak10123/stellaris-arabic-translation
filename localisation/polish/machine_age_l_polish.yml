 trait_robot_history_warbot: "Machina wojenna"
 trait_robot_history_warbot_desc: "Te maszyny, stworzone początkowo na potrzeby wojny i bezpieczeństwa, cechują wyjątkowo krótkie czasy reakcji, wzmocnione pancerze i rozbudowane systemy zapasowe."
 trait_robot_history_artbot: "Nianiobot"
 trait_robot_history_artbot_desc: "Te zaprojektowane jako pomoc domowa droidy cechuje precyzja ruchów, wydajne zarządzanie zasobami i wyjątkowa wielozadaniowość."
 trait_robot_history_explorebot: "Generator sztuki"
 trait_robot_history_explorebot_desc: "Te maszyny nie zostały zaprojektowane z myślą o zastosowaniach praktycznych, specjalizują się w przedsięwzięciach artystycznych i kulturalnych. Cechują je imponujące algorytmy kreatywne, skomplikowane procesy projektowe i ekspresyjność danych wyjściowych."
 trait_robot_history_researchbot: "Asystenci badawczy"
 trait_robot_history_researchbot_desc: "Te maszyny zostały zaprojektowane z myślą o pomocy w badaniach, wykazują się wysokimi umiejętnościami analitycznymi, szybką asymilacją informacji i niezłomnością w pracy nad rozwojem nauki."
 trait_robot_history_resourcebot: "Boty robocze"
 trait_robot_history_resourcebot_desc: "Maszyny te opracowano z myślą o pozyskiwaniu surowców. Wyspecjalizowane narzędzia, wzmocnione stawy i modularność systemów czynią je pracownikami idealnymi."
 trait_robot_history_chatbot: "SI towarzysząca"
 trait_robot_history_chatbot_desc: "Maszyny te zaprojektowano początkowo z myślą o uwolnieniu ich twórców od samotności. Posiadają zaawansowane algorytmy empatii i doskonałe umiejętności komunikacyjne, co czyni z nich doskonałych towarzyszy."
 individual_machine_assault_1: "Armia androidów bojowych"
 individual_machine_assault_1_desc: "Te wyspecjalizowane androidy bojowe posiadają zaawansowany pancerz i supernowoczesne czujniki optyczne, co czyni je wysoce przydatnymi podczas inwazji planetarnych."
