 ##########################
 #ARC WELDERS ORIGIN
 ##########################
 origin_arc_welders: "Spawarki łukowe"
 origin_arc_welders_desc: "Ich planeta jest jałowa, ale ich układ macierzysty to prawdziwa skarbnica. Żeby do niej sięgnąć, te maszyny wznosiły budowle większe niż kiedykolwiek. Potężny §H$tech_orbital_arc_furnace$§! przesłania ich niebo, ale ci mistrzowie inżynierii wciąż nie są zadowoleni.\n\nGalaktyka czeka, a możliwości są nieskończone. Wystarczy trochę pomysłowości, żeby je wykorzystać."
 origin_tooltip_arc_builders_effects: "- $HOMEWORLD$ Początkowa ['concept_mining_district', £district£ $district_mining_plural$] zostanie zastąpiona przez: ['concept_generator_district', £district£ $district_generator_plural$] $NEW_LINE$- $HOME_SYSTEM$ ['concept_arc_furnace'] w pobliżu: ['concept_pc_molten'] $NEW_LINE$- $ADDITIONAL_TECHNOLOGIES_STRING$ ['concept_orbital_arc_furnace',£engineering_research£ $tech_orbital_arc_furnace$] $NEW_LINE$- $GUARANTEED_RESEARCH_OPTION_STRING$ ['concept_mega_engineering', £engineering_research£ $tech_mega_engineering$] po zbudowaniu drugiego pieca łukowego"
 origin_tooltip_arc_builders_negative_effects: "- $INITIAL_POPS$ §R-300§! $NEW_LINE$- $HOMEWORLD$ Rozmiar: £planetsize£ 15"
 START_SCREEN_ARC_WELDERS: "Po latach eksploatacji świat [Root.Capital.GetName] jest jałowy. Ale niebo nad nią jest pełne zasobów, dzięki naszym ambicjom i dorównującej im pomysłowości, szukamy właśnie źródeł utrzymania w kosmosie.\n\n$tech_orbital_arc_furnace$ to ogromne przedsięwzięcie budowlane, ale ma ogromny potencjał. Uzyskanie jego pełnej sprawności to oczywisty kolejny krok, podobnie jak konieczność pozyskiwania zasobów w całym układzie. Ale co znajduje się poza naszymi granicami? Jakie niesamowite okazje czekają na sprawnego inżyniera?\n\nDzięki pojawieniu się napędu nadświetlnego nasze plany nie muszą ograniczać się tylko do jednego układu. Galaktyka to nasza tablica kreślarska, czas zabrać się do pracy."
 concept_arc_furnace: "$orbital_arc_furnace_1$"
 concept_arc_furnace_desc: "§EEfekty:§!$NEW_LINE$$orbital_arc_furnace_1_mod_tooltip$\n\n§L$tech_orbital_arc_furnace_desc$§!"
 concept_orbital_arc_furnace: "$tech_orbital_arc_furnace$"
 concept_orbital_arc_furnace_desc: "§IOdblokowuje superkonstrukcję:§! $orbital_arc_furnace_4$ $DOUBLE_NEW_LINE$§L$tech_orbital_arc_furnace_desc$§!"
 concept_mega_engineering: "$tech_mega_engineering$"
 concept_mega_engineering_desc: "- $MOD_COUNTRY_RESOURCE_MAX_ADD$: §G+20000§! $NEW_LINE$- §I$UNLOCKS_FEATURE$§! Odnowienie superkonstrukcji $DOUBLE_NEW_LINE$§L$tech_mega_engineering_desc$§!"
 machine_age.3400.name: "Paliwo dla kuźni"
 machine_age.3400.desc: "Nawet z odległości [From.GetName] wygląda na idealnego kandydata. Zakończyliśmy badanie układu i nie mamy już żadnych wątpliwości. Świat stopiony i gazowy olbrzym, mnóstwo asteroid i księżyców: to idealne miejsce na kolejny piec łukowy.\n\nZlecenie statkowi konstrukcyjnemu rozpoczęcia pracy to kolejne logiczne posunięcie. Czas rozpalić palenisko w kuźni."
 ideal_furnace_system_poi: "Idealny układ dla pieca"
 ideal_furnace_system_name: "[From.GetName]"
 ideal_furnace_system_desc: "Idealny układ, w którym mógłby powstać $tech_orbital_arc_furnace$."
 ideal_furnace_system: "Znaleziono idealny układ"
 ideal_furnace_chain_title: "Paliwo dla kuźni"
 ideal_furnace_chain_desc: "Znaleźliśmy idealny układ, w którym może powstać drugi $tech_orbital_arc_furnace$."
 machine_age.3405.name: "Zaspawany horyzont"
 machine_age.3405.desc: "Piec łukowy w naszym układzie macierzystym był doskonałym dowodem koncepcji, świadectwem naszej ambicji i pomysłowości. Teraz, w układzie [from.GetName] kosmiczną pustkę rozświetla kolejny piec.\n\nPoza dostarczanymi przez niego zasobami nasza praca otworzyła też drzwi dla projektów tytanicznych rozmiarów i skali. Teraz możemy patrzeć dalej, jakbyśmy stali na skraju rozległego horyzontu.\n\nOgranicza nas tylko nasza wyobraźnia."
 ##########################
 #SYNTHETIC FERTILITY
 ##########################
 #Event Chain
 synthetic_fertility_chain_title: "$origin_synthetic_fertility$"
 synthetic_fertility_chain_desc: "Utraciliśmy zdolność prokreacji. Nasz świat macierzysty jest usiany opuszczonymi centrami edukacji. Place zabaw są puste. Śmierć ostatniego z nas to tylko kwestia czasu. Na razie naszą nadzieją jest cyfrowe przechowywanie w Archiwum Tożsamości.\n\nMusimy stworzyć syntetyczne ramy i mózg pozytronowy o odpowiednim stopniu złożoności, jeśli chcemy kiedykolwiek wrócić do świata materialnego."
 #Origin Text
 origin_synthetic_fertility: "Płodność syntetyków"
 origin_synthetic_fertility_desc: "§RUWAGA: Blokuje wszystkie drogi rozwoju oprócz: ['concept_synthetic_ascension'].§!\n\nTo imperium posiadało niegdyś kwitnące społeczeństwo, jednak nowa choroba genetyczna sprawiła, że ten gatunek nie może się rozmnażać. Widząc kurczące się możliwości i będąc w obliczu wyginięcia, zaczął szukać cyfrowego zbawienia."
 origin_tooltip_synthetic_fertility_effects: "- $INITIAL_POPS$ §G+900§! $NEW_LINE$- $SPECIES_TRAITS$ ['concept_pathogenic_genes']\n- Świat macierzysty: $TABBED_NEW_LINE$- Rozmiar: £planetsize£ 20 $TABBED_NEW_LINE$- ['concept_abandoned_cities', £blocker£ $concept_abandoned_cities$]: +2 $TABBED_NEW_LINE$- ['concept_identity_repository',£building£ $concept_identity_repository$] $TABBED_NEW_LINE$- ['concept_abandoned_gene_clinic',£building£ $concept_abandoned_gene_clinic$] $NEW_LINE$- Sytuacja: ['concept_identity_rescue'] $NEW_LINE$- $ADDITIONAL_TECHNOLOGIES_STRING$ ['concept_synth_ai'] $NEW_LINE$- $GUARANTEED_RESEARCH_OPTION_STRING$ ['concept_robotic_workers', £engineering_research£ $tech_robotic_workers$]"
 origin_tooltip_synthetic_fertility_negative_effects: "- £pop£ §HPopulacje§!: zmniejszają się"
 START_SCREEN_SYNTHETIC_FERTILITY: "Pierwsze próby ze sztuczną świadomością okazały się rewolucyjne, stworzyły całkowicie cyfrowe społeczeństwo i zatarły linie między światem wirtualnym i materialnym. Sukces był tak duży, że staliśmy się beztroscy, uwierzyliśmy, że mamy niezliczone pokolenia na dalsze innowacje oraz eksplorację.\n\nMyliliśmy się.\n\nKiedy nowa choroba zaatakowała nasz kod genetyczny, utraciliśmy zdolność prokreacji. Najlepsi uczeni nie potrafili znaleźć na nią lekarstwa, a wraz ze starzeniem się i zmniejszaniem populacji rosła panika.\n\nZdesperowani, powiększyliśmy nasze magazyny cyfrowe, tworząc w nich na tyle miejsca, by pomieściły się tam nasze świadomości. Ale czy naprawdę chcemy takiego życia? Powinniśmy skoncentrować się teraz na stworzeniu tak zaawansowanych syntetycznych ciał oraz pozytronowego mózgu, abyśmy mogli pozostać w świecie materialnym."
 #Concepts
 concept_synthetic_ascension: "Rozwój syntetyków"
 concept_synthetic_ascension_desc: "$ap_synthetic_evolution_desc$"
 concept_pathogenic_genes: "$trait_pathogenic_genes$"
 concept_pathogenic_genes_desc: "- §RNie może kolonizować planet ani przesiedlać się§! $NEW_LINE$- §RNie może się rozmnażać w sposób naturalny§!\n\n§L$trait_pathogenic_genes_desc$§!"
 concept_identity_rescue: "$situation_synthetic_fertility_digitization$"
 concept_identity_rescue_desc: "Nagradza technologie, które odblokowują: $concept_synthetic_ascension$ \n\n§L$situation_synthetic_fertility_digitization_desc$§!"
 concept_identity_repository: "$building_identity_repository$"
 concept_identity_repository_desc: "- Wytwarza:$TABBED_NEWLINE$ £physics£ 6,00 £society£ 6,00 £engineering£ 6,00 £unity£ 6,00 $NEW_LINE$- Utrzymanie: £energy£ 6,00 $NEW_LINE$- £trade£: §G+6§!\n\nW tym repozytorium znajduje się §Y300§! tożsamości. $building_identity_repository_scaling$\n\n§L$building_identity_repository_desc$§!"
 concept_abandoned_gene_clinic: "$building_abandoned_gene_clinic$"
 concept_abandoned_gene_clinic_desc: "- $building_abandoned_gene_clinic_tt$\n\n§L$building_abandoned_gene_clinic_desc$§!"
 concept_abandoned_cities: "$d_abandoned_cities$"
 concept_abandoned_cities_desc: "- $MOD_PLANET_MAX_DISTRICTS_ADD$: §R-1§! $NEW_LINE$- Czas oczyszczania: £time£- 360 §Idni§!$NEW_LINE$- Koszt oczyszczania: $TABBED_NEW_LINE$- 750 $i_energy$$TABBED_NEW_LINE$- 250 $i_minerals$\n\n§L$_abandoned_cities_desc$§!"
 concept_synth_ai: "Technologie SI"
 concept_synth_ai_desc: "- ['concept_powered_exoskeletons', £engineering_research£ $tech_powered_exoskeletons$] $NEW_LINE$- ['concept_administrative_ai', £physics_research£ $tech_administrative_ai$] $NEW_LINE$- ['concept_self_aware_logic', £physics_research£ $tech_self_aware_logic$] $NEW_LINE$- ['concept_sapient_ai', £physics_research£ $tech_sapient_ai$]"
 concept_administrative_ai: "$tech_administrative_ai$"
 concept_administrative_ai_desc: "$MOD_COUNTRY_ALL_TECH_RESEARCH_SPEED$: §G+5%§!\n$job_researcher_plural_with_icon$ Utrzymanie: §R+5%§!\n\n§L$tech_administrative_ai_desc$§!"
 concept_self_aware_logic: "$tech_self_aware_logic$"
 concept_self_aware_logic_desc: "$MOD_COUNTRY_NUM_TECH_ALTERNATIVES_ADD$: §G+1§!\n\n§L$tech_self_aware_logic_desc$§!"
 concept_sapient_ai: "$tech_sapient_ai$"
 concept_sapient_ai_desc: "$MOD_COUNTRY_ALL_TECH_RESEARCH_SPEED$: §G+5%§!\n$job_researcher_plural_with_icon$ Utrzymanie: §R+5%§!\n\n§L$tech_sapient_ai_desc$§!"
 #Traits
 trait_pathogenic_genes: "Patogeniczne geny"
 trait_pathogenic_genes_desc: "Nowa choroba genetyczna uniemożliwia temu gatunkowi wydawanie potomstwa. Okazała się ona odporna na wszystkie znane rodzaje terapii genowej."
 PATHOGENIC_GENES_FORCE_DECLINE: "§RGatunek zanika§!, czego przyczyną są §Y$trait_pathogenic_genes$§!"
 pathogenic_genes_tooltip: "§RNie może kolonizować planet ani przesiedlać się§!"
 pathogenic_genes_warning: "$TRIGGER_FAIL$§YPopulacje z cechą §R$trait_pathogenic_genes$§! nie mogą być przesiedlane§!"
 leader_trait_robotic_surrogate: "Robot zastępca"
 leader_trait_robotic_surrogate_desc: "Ten duży i powolny robot służy jako ciało cyfrowego przywódcy w: $building_identity_repository$."
 #Buildings
 building_identity_repository: "Archiwum Tożsamości"
 building_identity_repository_tt: "W tym archiwum znajduje się następująca liczba tożsamości: §Y[Owner.GetTotalIdentities]§!. $building_identity_repository_scaling$"
 building_identity_repository_scaling: "\n\nKażda tożsamość zwiększa produkcję i utrzymanie archiwum. Efekt dzieli się na wszystkie $building_identity_repository$ na naszych planetach.\n"
 building_identity_repository_desc: "Umysł zostanie ucyfrowiony, zanim ciało umrze. W tym bezpiecznym schronieniu będziemy kontynuować pracę na rzecz społeczeństwa."
 building_abandoned_gene_clinic: "Opuszczona klinika genetyczna"
 building_abandoned_gene_clinic_tt: "§RNie można zburzyć, zastąpić ani naprawić§!"
 building_abandoned_gene_clinic_desc: "Gdy straciliśmy zdolność naturalnej prokreacji, społeczność medyczna pokładała nadzieje w tej ultranowoczesnej klinice genowej. Teraz stoi pusta, podobnie jak duża część naszej infrastruktury i nieustannie przypomina nam o naszej niedoli i potrzebie znalezienia innych rozwiązań."
 #Situation Events
 machine_age.3100.name: "Cyfrowe zbawienie"
 machine_age.3100.desc: "Nie znaleźliśmy rozwiązania medycznego, zatem największą szansę przetrwania daje nam ucyfrowienie naszej populacji i zapisanie jej w §Yarchiwum tożsamości§!. Jest to jednak rozwiązanie tymczasowe, wdrożyliśmy już plan stworzenia dostatecznie rozbudowanych syntetycznych ciał i mózgu pozytronowego. Szacujemy, że jeśli skoncentrujemy nasze wysiłki, zdążymy zakończyć badania.\n\nZ pomocą nowoczesnej SI nasi najlepsi eksperci sporządzili już schematy robotycznych ciał, to pierwszy krok ku naszemu syntetycznemu zbawieniu."
 machine_age.3100.a: "To musi się udać."
 machine_age.3110.name: "Robotyczni pracownicy"
 machine_age.3110.desc: "Nasze badania nad robotycznymi ciałami dobiegły końca. $building_abandoned_gene_clinic$ zamieniono w: $building_robot_assembly_plant$. Prototypy ulepszono i wdrożono. Te prymitywne systemy nie posiadają mocy obliczeniowej potrzebnej do przechowania świadomości pojedynczej osoby, ale mogą zastąpić część utraconej siły roboczej. Dzięki łączu pozytronowemu osoby przebywające w świecie cyfrowym mogą wnosić swoją wiedzę i doświadczenie do codziennego funkcjonowania tych robotów, co zwiększa ich wydajność.\n\nJednocześnie nasze systemy SI opracowały projekt bardziej zaawansowanych androidów. Nasi starzejący się technicy są gotowi zabrać się do pracy."
 machine_age.3110.a: "Jeden etap zakończony."
 machine_age.3110.a.tooltip: "[Root.Capital.GetName]:\n- §Y$building_robot_assembly_plant$§!: §G+1§! \n- £pop£ §HPopulacje mechaniczne§!: §G+300§!"
 machine_age.3115.name: "Produkcja droidów"
 machine_age.3115.desc: "Dzięki ogromnemu rozwojowi naszych technologii robotycznych możemy kolonizować inne planety, a nasza zmechanizowana populacja jest w stanie wykonywać bardziej skomplikowane zadania.\n\nNasze systemy SI uważają, że kolejny logiczny etap to odtworzenie ich matryc pozytronowych w sztucznych ciałach. Taki potężny projekt badawczy powinien umożliwić naszym cyfrowym świadomościom powrót do świata naturalnego."
 machine_age.3115.a: "Teraz nie możemy się poddać."
 machine_age.3120.name: "Ostatni krok"
 machine_age.3120.desc: "Dzięki niestrudzonej pracy wreszcie osiągnęliśmy sukces. Zaprojektowaliśmy w pełni funkcjonalny mózg pozytronowy na tyle rozwinięty, że może przyjąć nasze świadomości.\n\nNie jesteśmy w stanie wygrać ze śmiercią, ale niebawem pozbędziemy się ograniczeń biologicznego istnienia."
 machine_age.3120.a: "Czas na nasze syntetyczne przebudzenie."
 machine_age.3120.a.tooltip: "Żeby przejść do tych wydarzeń, musimy przyjąć §Ytradycję syntetyków§!."
 machine_age.3125.name: "Cyfrowe marzenie"
 machine_age.3125.both: "Nasze montażownie i eksperci syntetyzacji są gotowi rozpocząć monumentalne przedsięwzięcie przenoszenia tożsamości do mózgów pozytronowych i syntetycznych ciał."
 machine_age.3125.desc: "$machine_age.3125.both$\n\nRozpoczniemy działania od osób, które wciąż znajdują się w świecie materialnym, z zamiarem wymazania tej choroby genetycznej raz na zawsze. Dzięki zwiększonej mocy obliczeniowej syntetycznego mózgu możemy przekroczyć nawet nasze biologiczne ograniczenia.$synth.105.end$"
 machine_age.3125.nobody.desc: "$machine_age.3125.both$\n\nNie jesteśmy fizycznie obecni w świecie materialnym, dlatego musimy szybko stworzyć pierwszy prototyp nowego ciała. Dzięki zwiększonej mocy obliczeniowej syntetycznego mózgu możemy przekroczyć nawet nasze biologiczne ograniczenia.$synth.105.end$"
 machine_age.3125.a: "Rozpocznijmy przenoszenie świadomości."
 machine_age.3125.a.tooltip: "Jeśli pozostały jeszcze jakieś populacje biologiczne, zaczną one przenosić się do syntetycznych ciał."
 machine_age.3200.name: "Cyfrowy czyściec"
 machine_age.3200.desc: "Ziściły się nasze największe obawy.\n\nZmarło ostatnie z naszych materialnych ciał. Nasze cyfrowe świadomości są bezpieczne w Archiwum Tożsamości, ale nie mamy technologii, które pozwoliłyby umieścić nasze umysły w sztucznym mózgu.\n\nDopóki nie zakończymy badań, nasi cyfrowi przywódcy muszą prowadzić interakcje ze światem naturalnym poprzez robotycznych pośredników."
 machine_age.3305.name: "Wirtualne zbawienie"
 machine_age.3305.desc: "Z powodzeniem przenieśliśmy wszystkie tożsamości do nowych, syntetycznych powłok lub do Archiwum Tożsamości, co zapewniło naszemu społeczeństwu przetrwanie.\n\nPojawiło się jednak nowe wyzwanie. Cyfrowa \"przestrzeń\", którą stworzyliśmy do przechowywania naszych cyfrowych tożsamości, miała być jedynie tymczasowym magazynem, ale mieszkańcy przyzwyczaili się do tego życia i nie palą się do powrotu do świata fizycznego.\n\nMożemy pozwolić im tam zostać, a alternatywnym rozwiązaniem jest zmuszenie ich do przeniesienia do nowych robotycznych ciał."
 machine_age.3305.a: "Pozwólmy im cieszyć się nirwaną."
 machine_age.3305.a.tooltip: "§Y$building_identity_repository$§! Pozostanie domem dla pozostałych tożsamości cyfrowych, które stamtąd będą nadal pomagały naszemu społeczeństwu."
 machine_age.3305.b: "Będziemy silniejsi, trzymając się razem."
 machine_age.3305.b.tooltip: "Umieścimy resztę tożsamości cyfrowych w obecnie posiadanych ciałach syntetycznych, a dla pozostałych zbudujemy nowe powłoki. §Y$building_identity_repository$§! zostanie zniszczone."
 machine_age.3310.name: "Odrodzenie syntetyków"
 machine_age.3310.desc: "Minęło kilkadziesiąt lat, odkąd [Root.Owner.GetSpeciesNamePlural] trzymali w ramionach dziecko. Być może już nigdy nie zaznamy tego uczucia, ale dzisiaj nasze społeczeństwo odzyskało nadzieję.\n\nStworzyliśmy §Ykompleksy tożsamości§!, zaawansowane centra, gdzie możemy kopiować istniejące tożsamości, co w zasadzie równa się tworzeniu nowych obywateli.\n\nMożemy losowo wymieszać cechy osobowości wielu osób, w ten sposób, dzięki nieskończonej liczbie kombinacji, powstaną nowe tożsamości. Możemy też wybrać naśladowanie procesów naturalnych, hodując jądra umysłów w otwartym środowisku wirtualnym."
 machine_age.3310.a: "Wymieszamy nasze umysły."
 machine_age.3310.building_tooltip.a.tt: "$unlock_edict_tt$ ['concept_edict_subsidized_identity_backups']\n$unlock_edict_tt$ ['concept_edict_optimized_identity_creation']\n\n$synth.405.a.tt$\n§YOdblokowuje budynek:§! $building_identity_complex$"
 machine_age.3310.b: "Niektóre systemy naturalne dobrze działają."
 machine_age.3310.building_tooltip.b.tt: "$unlock_edict_tt$ ['concept_edict_subsidized_identity_backups']\n$unlock_edict_tt$ ['concept_edict_optimized_identity_creation']\n\n$synth.405.b.tt$\n§YOdblokowuje budynek:§! $building_identity_complex$"
 machine_age.3315.name: "Świt ery syntetyków"
 machine_age.3315.desc: "Dzisiaj kończy się nasza cyfrowa podróż. Nie sposób zaprzeczyć doniosłości naszych dokonań i ofiar poniesionych w celu ich osiągnięcia.\n\nTeraz staniemy się w pełni cyfrowym i syntetycznym społeczeństwem. Nie musimy już drżeć ze strachu przed chorobami. Niestabilna genetyka nie będzie nas już ograniczać.\n\nMożemy stworzyć dowolną rzeczywistość."
 machine_age.3315.a: "Wiwat era syntetyków."
 machine_age.3315.a.tooltip: "Kończy ciąg wydarzeń: §Y$origin_synthetic_fertility$§!."
 machine_age.3315.a.tt: "§Y[This.Owner.GetSpeciesNamePlural]§! otrzymują cechę ['concept_synthetic_dawn']"
 synthetic_dawn: "Syntetyczny świt"
 synthetic_dawn_desc: "Osiągnęliśmy doskonałość jako w pełni zdigitalizowany, syntetyczny lud gotów stworzyć taką rzeczywistość, jakiej tylko sobie zażyczymy."
 trait_robot_synthetic_dawn: "Syntetyczne zbawienie"
 trait_robot_synthetic_dawn_desc: "Ten syntetyczny gatunek porzucił swoje biologiczne pochodzenie i rozkwitł w swoim nowym, cyfrowym istnieniu."
 concept_synthetic_dawn: "$trait_robot_synthetic_dawn$"
 #Situations
 situation_synthetic_fertility_digitization: "Szybka ochrona tożsamości"
 situation_synthetic_fertility_digitization_type: "Szybka ochrona tożsamości"
 situation_synthetic_fertility_digitization_monthly_change_tooltip: "Badamy technologię potrzebną do odbudowania fizycznej populacji."
 situation_synthetic_fertility_digitization_desc: "Nie możemy mieć potomstwa, ale możemy ocalić nasze umysły. To powolny, ale konieczny proces.\n\nMoże z czasem będziemy mogli wrócić do świata fizycznego, ale w tym celu musimy stworzyć syntetyczne ciała zastępcze."
 situation_synthetic_fertility_approach_none: "Priorytet gospodarczy"
 situation_synthetic_fertility_approach_none_desc: "Musimy zrównoważyć potrzeby tego projektu z kondycją naszej gospodarki."
 situation_synthetic_fertility_approach_tech_low: "Dodatkowe finansowanie"
 situation_synthetic_fertility_approach_tech_low_desc: "Przeznaczymy pewne środki na nasze placówki badawcze."
 situation_synthetic_fertility_approach_tech_high: "Priorytet badawczy"
 situation_synthetic_fertility_approach_tech_high_desc: "Jeśli chcemy przetrwać, musimy podjąć trudne decyzje gospodarcze."
 situation_synthetic_fertility_approach_unity_low: "Projektowanie wirtualne"
 situation_synthetic_fertility_approach_unity_low_desc: "Zapewnimy naszym najlepszym tożsamościom cyfrowym więcej energii, aby mogły pracować nad syntetycznymi ciałami."
 situation_synthetic_fertility_approach_unity_high: "Środki kryzysowe"
 situation_synthetic_fertility_approach_unity_high_desc: "Główne źródła energii zostaną przekierowane do cyfrowych tożsamości, aby zakończyć proces zastępowania ciał naszego gatunku."
 situation_synthetic_fertility_complete: "Do tego czasu nasze formy fizyczne umrą. Nasza populacja zostanie w pełni ucyfrowiona."
 stage_synthetic_fertility_problem_effects: "Żeby pozostać w świecie fizycznym, musimy stworzyć nowoczesne syntetyczne ciała ze złożonymi mózgami pozytronowymi."
 stage_synthetic_fertility_danger_effects: "Skoro straciliśmy ponad połowę naszej populacji, musimy przeznaczyć większe środki na badania nad syntetykami."
 stage_synthetic_fertility_crisis_effects: "Zostało nas tak mało, że musimy zrobić wszystko co w naszej mocy, aby stworzyć odpowiednio zaawansowany mózg pozytronowy."
 situation_synthetic_fertility_synthesization_outcome: "Nie spoczniemy, dopóki nie zapewnimy nam bezpiecznej przyszłości."
 situation_no_synthetics_adopt: "£trigger_no£ Musi przyjąć $tr_synthetics_adopt$"
 situation_no_robot_research: "£trigger_no£ Musi badać §Ytechnologię robotów§!."
 situation_synthetic_fertility_synthesization: "Syntetyzacja"
 situation_synthetic_fertility_synthesization_type: "Syntetyzacja"
 situation_synthetic_fertility_synthesization_monthly_change_tooltip: "Ruszyła budowa naszych cyfrowych ciał. Przed nami syntetyczna przyszłość."
 situation_synthetic_fertility_synthesization_desc: "Posiadamy już wiedzę techniczną niezbędną do przeprowadzania syntetyzacji naszego społeczeństwa.\n\n\n§YPopulacje, które w przyszłym miesiącu otrzymają syntetyczne ciała§!: §G[From.GetSynthFertPopsPerMonth]§!"
 stage_1_synthetic_fertility_synthesization_effects: "Istniejące roboty zostaną wykorzystane jako syntetyczne ciała dla naszej cyfrowej populacji."
 stage_2_synthetic_fertility_synthesization_effects: "Zbudujemy nowe robotyczne ciała dla reszty naszej cyfrowej populacji."
 situation_synthetic_fertility_synthesization_careful: "Ostrożne podejście"
 situation_synthetic_fertility_synthesization_careful_desc: "$situation_synthetic_fertility_synthesization_careful$"
 situation_synthetic_fertility_synthesization_careful_tooltip: "Szybkość przesyłania: §Y100§! £pop£ §Hpopulacji miesięcznie§!"
 situation_synthetic_fertility_synthesization_full_speed: "Szybkość maksymalna"
 situation_synthetic_fertility_synthesization_full_speed_desc: "$situation_synthetic_fertility_synthesization_full_speed$"
 situation_synthetic_fertility_synthesization_full_speed_tooltip: "Szybkość przesyłania: §Y200§! £pop£ §Hpopulacji miesięcznie§!"
