 tech_cosmogenesis_world: "Skalowana rezerwuarowa technika komputerowa"
 tech_cosmogenesis_world_desc: "$menp_cosmo_features_1_desc$"
 TECH_UNLOCK_COSMOWORLD_CONSTRUCTION_TITLE: "§HOdblokowuje superkonstrukcję:§! Krosno synaptyczne"
 TECH_UNLOCK_COSMOWORLD_CONSTRUCTION_DESC: "§HKrosno synaptyczne§!\n$menp_cosmo_features_1_desc$"
 tech_cosmogenesis_thesis: "Stosowana teoria nieskończoności"
 tech_cosmogenesis_thesis_desc: "Dokonując dalszych zmian zasad rządzących rzeczywistością możemy lepiej obserwować jej reakcje. W tej skali wciąż trudno przewidzieć skutki. Mogą one wpłynąć na całą galaktykę."
 cosmogenesis_thesis_tech_title: "Spróbuj nagiąć §Hzasady rzeczywistości§!"
 cosmogenesis_thesis_tech_desc: "Te niebezpieczne doświadczenia będą miały nieprzewidywalne skutki."
 triggered_opinion_cosmogenesis_crisis_empire: "$triggered_opinion_crisis_empire$"
