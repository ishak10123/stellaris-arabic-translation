 ### Synaptic Lathe
 no_abandon_capital_for_unviable_planet: "$TRIGGER_FAIL$Nie można przesiedlić naszej ostatniej populacji do krosna synaptycznego."
 no_unfueled_lathe: "$TRIGGER_FAIL$Nie można przesiedlić ostatniej populacji z krosna synaptycznego."
 NO_BRANCH_OFFICE_ON_SYNAPTIC_LATHE: "$pc_cosmogenesis_world$: nie można otworzyć filii."
 pc_cosmogenesis_world: "Krosno synaptyczne"
 col_cosmogenesis_world: "$pc_cosmogenesis_world$"
 pc_cosmogenesis_world_desc: "Ogromny rezerwuarowy system obliczeniowy zaprojektowany do łączenia miliardów świadomych istot, organicznych i syntetycznych, za pomocą skomplikowanej sieci przewodów, tranzystorów oraz kapsuł podtrzymujących życie. Intensywne obciążenie organów obliczeniowych pojedynczej istoty nieuchronnie doprowadzi do uszkodzenia mózgu dowolnego elementu sieciowego."
 col_cosmogenesis_world_desc: "$pc_cosmogenesis_world_desc$"
 trait_pc_cosmogenesis_world_preference: "Preferencje krosna synaptycznego"
 trait_pc_cosmogenesis_world_preference_short: "Krosno synaptyczne"
 trait_pc_cosmogenesis_world_preference_desc: "Ten gatunek nie przetrwa poza kapsułami podtrzymującymi życie znajdującymi się na pokładzie krosna synaptycznego. Istoty te pragną błogiej śpiączki, a nie nieustających ataków rzeczywistości."
 mod_pc_cosmogenesis_world_habitability: "Możliwość zamieszkania: $pc_cosmogenesis_world$"
 job_neural_chip: "Czip neuronowy"
 job_neural_chip_plural: "Czipy neuronowe"
 job_neural_chip_desc: "Jeden czip neuronowy nic nie znaczy. Kiedy zostaną one połączone, ich potencjał obliczeniowy rośnie wykładniczo."
 job_neural_chip_processing: "$job_neural_chip$: oprogramowanie"
