 mod_planet_jobs_robot_worker_produces_mult: "Produkcja zasobów przez populację: [GetWorker] robot"
 trait_robot_ancient_dreadnought: "Pradawny pancernik"
 trait_robot_ancient_dreadnought_desc: "Wyposażony w zminiaturyzowane moduły energetyczne, wyraźnie zwiększa wydajność przemysłu i uszkodzenia zadawane przez broń zintegrowaną ze szkieletem."
 trait_robot_enigmatic_fortress: "Zagadkowa forteca"
 trait_robot_enigmatic_fortress_desc: "Tajemnicze programy samonaprawy mogą pozyskiwać materiały bezpośrednio z podprzestrzeni, co znacząco obniża wydatki na materiały potrzebne do napraw."
 trait_robot_infinity_sphere: "Sfera nieskończoności"
 trait_robot_infinity_sphere_desc: "Hiperwydajne, odporne na grawitacje obwody obliczeniowe, które minimalizują straty energii i znacznie obniżają koszty przetwarzania."
 trait_robot_scavenger_bot: "Robot złomiarz"
 trait_robot_scavenger_bot_desc: "Nowoczesne pozyskiwanie molekularne może zamienić dowolną substancję w materiały potrzebne do budowy szkieletów robotów."
