 cybercreed_tithe_cybernetics: "Danina modyfikacji"
 cybercreed_tithe_cybernetics_desc: "$machine_age.1070.intro$ badaniom boskiej cybernetyki."
 cybercreed_tithe_research: "Danina wiedzy"
 cybercreed_tithe_research_desc: "$machine_age.1070.intro$ badaniu tajemnic wszechświata."
 cybercreed_tithe_labor: "Danina pracy"
 cybercreed_tithe_labor_desc: "$machine_age.1070.intro$ produkcji towarów konsumenckich."
 cybercreed_tithe_wealth: "Danina bogactwa"
 cybercreed_tithe_wealth_desc: "$machine_age.1070.intro$ handlowi."
 cybercreed_tithe_craft: "Danina rzemiosła"
 cybercreed_tithe_craft_desc: "$machine_age.1070.intro$ wytwarzaniu towarów luksusowych."
 cyber_creed_flesh_rock: "kamień"
 cyber_creed_flesh_plant: "tkanina"
 cyber_creed_flesh_arthropod: "chityna"
 cyber_creed_flesh_default: "mięso"
 cyber_creed_flesh_machine: "konstrukty"
 building_amphitheater_of_the_mind: "Amfiteatr umysłu"
 building_amphitheater_of_the_mind_desc: "Lokalna kaplica przetwarzania umożliwia częściowo połączonemu Chórowi Umysłów debatowanie, udostępnianie i poznawanie tajemnic wymiaru materialnego. Dzieje się to z prędkością światła."
 building_grand_concert_hall_of_the_mind: "Wielka Filharmonia Umysłów"
 building_grand_concert_hall_of_the_mind_desc: "Najnowocześniejszy zestaw łączności znajdujący się w tych rezonujących salach umożliwia Chórowi Umysłów porozumiewanie się i wspólne poszukiwanie boskości. Dzięki sprzętowi cybernetycznemu ich śpiew odnajdzie ukryte melodie wszechświata."
 building_forge_of_the_fellowship: "Huta Bractwa"
 building_forge_of_the_fellowship_desc: "Tutaj pierwsza huta Bractwa Młota wytwarza materiały budowlane najwyższej jakości. Muzyka dźwięku uderzeń młotów rozlega się, gdy wierni wykonują boskie dzieło."
 building_grand_forge_of_the_fellowship: "Wielka huta Bractwa"
 building_grand_forge_of_the_fellowship_desc: "Głęboko w Wielkiej Hucie wierni słyszą litanię nieustannie pracujących narzędzi Bractwa. Nocą, piękny blask huty-katedry przyćmiewa światło gwiazd na niebie, a nasze święte iskry jarzą się na cześć boskości."
 building_battlement_of_steel: "Stalowe blanki"
 building_battlement_of_steel_desc: "W kościele fortecy znajduje się zbrojownia i poligon dla gotowych do walki Templariuszy Stali, którzy nieustannie stoją na straży naszego boskiego ciała."
 building_grand_battlements_of_steel: "Wielkie stalowe blanki"
 building_grand_battlements_of_steel_desc: "Niech te wspaniałe mury wielkiej fortecy katedry nigdy się nie zawalą. Jej zbrojownia jest pełna świętych wszczepów Templariuszy Stali, każdy z nich czeka na swojego czempiona. W tych wnętrzach boskość objawia się w połączeniu stali i ciała."
 building_sanctuary_of_toil: "Sanktuarium harówki"
 building_sanctuary_of_toil_desc: "To sanktuarium koordynuje, naprawia i odświeża ciało oraz modyfikacje Wspólnoty Harówki."
 building_grand_cathedral_of_toil: "Wielka katedra harówki"
 building_grand_cathedral_of_toil_desc: "Błogosławieni ci, którzy zaspokajają potrzeby wiernych. Niech ich strudzone dusze odpoczną w wielkiej katedrze Harówki. Znajdujące się tam warsztaty i ośrodki koordynacyjne wspierają oraz żywią wiernych robotników i ich święte modyfikacje, gdy ci wypełniają swoje boskie obowiązki."
 building_the_sanctum_of_augmentation: "Sanktuarium modyfikacji"
 building_the_sanctum_of_augmentation_desc: "W duchu wspólnej wiary to święte sanktuarium jest symbolem jedności. W tych uświęconych komnatach wierni opiekują się duszami i modyfikacjami swojego zgromadzenia."
 building_the_united_sanctum_of_augmentation: "Zjednoczone sanktuarium modyfikacji"
 building_the_united_sanctum_of_augmentation_desc: "To majestatyczne sanktuarium to żywy testament powstały na cześć najświętszej fuzji. W tych uświęconych komnatach gromadzą się wierni, niezłomnie oddani szlachetnej sprawie boskiej fuzji."
 #Advanced Cyber Creed Authorities
 auth_cyber_creed_democratic: "Demokratyczna modyfikracja"
 auth_cyber_creed_democratic_desc: "Demokratyczne rządy cybernetyczne posiadają święte prawa głosu, które umożliwiają zmodyfikowanym obywatelom zabieranie głosu w kwestiach politycznych. W ten sposób dokonuje się rozmowa z bogami."
 concept_auth_cyber_creed_democratic: "$auth_cyber_creed_democratic$"
 auth_cyber_creed_oligarchic: "Oligarchiczna cyberkracja"
 auth_cyber_creed_oligarchic_desc: "Oligarchiczne rządy cybernetyczne mają grupę uprzywilejowanych i silnie zmodyfikowanych osób, które posiadają całkowitą władzę polityczną oraz z niezrównaną precyzją kierują społeczeństwem."
 concept_auth_cyber_creed_oligarchic: "$auth_cyber_creed_oligarchic$"
 auth_cyber_creed_dictatorial: "Dyktatura syntodoksja"
 auth_cyber_creed_dictatorial_desc: "Dyktatorskie rządy cybernetyczne wybierają dożywotnich władców, którzy sprawują całkowitą kontrolę za pomocą nowoczesnych wszczepów cybernetycznych i kierują losami naszego społeczeństwa."
 concept_auth_cyber_creed_dictatorial: "$auth_cyber_creed_dictatorial$"
 auth_cyber_creed_imperial: "Imperialny cybernat"
 auth_cyber_creed_imperial_desc: "Imperialne rządy cybernetyczne posiadają najwyższego władcę i jego następcę, co umożliwia płynne przekazanie władzy. Jednoczą duchowość i zaawansowaną cybernetykę, by twardo sprawować władzę."
 concept_auth_cyber_creed_imperial: "$auth_cyber_creed_imperial$"
 auth_cyber_creed_corporate: "Korporacyjna Święta Technika"
 auth_cyber_creed_corporate_desc: "Korporacyjne rządy cybernetyczne wychodzą poza tradycyjne role państwa dzięki nowoczesnym wszczepom i połączeniu wiary z technologią, aby szukać boskich możliwości finansowych."
 concept_auth_cyber_creed_corporate: "$auth_cyber_creed_corporate$"
 #Advanced Cyber Creed Government Types
 gov_cyber_creed_monarchy: "Cybernetyczne królestwo"
 gov_cyber_creed_monarchy_desc: "Ten ustrój to monarchia techospirytualistyczna, w której władca i jego potomstwo są boskimi symbolami świętej fuzji. Kościół bezpośrednio wspiera aparat państwowy."
 gov_cyber_creed_dictatorship: "Boska technokracja"
 gov_cyber_creed_dictatorship_desc: "Ten ustrój to dyktatura technospirytualistyczna, w której władzę sprawuje jedna zmodyfikowana osoba z hierarchicznej struktury władzy wspierana przez oficjalne wyznanie."
 gov_cyber_creed_oligarchy: "Rada technofantów"
 gov_cyber_creed_oligarchy_desc: "Ten ustrój to oligarchia spirytualistyczna, w której władza polityczna spoczywa w rękach najpotężniejszych frakcji religijnych kraju."
 gov_cyber_creed_democracy: "Republika transcendentalna"
 gov_cyber_creed_democracy_desc: "Ten ustrój to technospirytualistyczna forma demokracji, gdzie rada religijna, złożona ze zmodyfikowanych osób, nadzoruje procesy demokratyczne."
 gov_cyber_creed_divine_empire: "Boskie imperium modyfikacji"
 gov_cyber_creed_divine_empire_desc: "Ten ustrój to forma autokracji technospirytualistycznej. Oficjalna wiara państwowa przenika do każdego aspektu życia publicznego, a obywatele uważają swojego zmodyfikowanego władcę za nieomylnego, żyjącego boga."
 gov_cyber_creed_holy_tribunal: "Trybunał technofantów"
 gov_cyber_creed_holy_tribunal_desc: "Ten ustrój to forma oligarchii technospirytualistycznej, w której kierowana boską wolą rada duchowieństwa kontroluje wszystkie aspekty działania państwa."
 gov_cyber_creed_megachurch: "Zmodyfikowany megakościół"
 gov_cyber_creed_megachurch_desc: "Ten ustrój to oligarchia oparta na połączeniu wartości technospirytualistycznych i komercyjnych, gdzie stanowiska wyświęconego pastora i urzędnika korporacyjnego zostały połączone w jedną rolę."
 gov_cyber_creed_subversive_cult: "Kult maszyn"
 gov_cyber_creed_subversive_cult_desc: "Ten rząd to kult religijny oparty na różnorodnych przedsięwzięciach kryminalnych i korporacyjnych związanych z cybernetyką."
 #Advanced Government Edicts
 edict_cybernetic_creed_construction_edict: "Cnotliwe młoty"
 edict_cybernetic_creed_construction_edict_desc: "Aby stworzyć boskie społeczeństwo, musimy w pełni poprzeć Bractwo Młota. Jego praca stanowi klucz do przyszłości prowadzącej ku niebu."
 edict_cybernetic_creed_war_edict: "Krucjata stali"
 edict_cybernetic_creed_war_edict_desc: "Aby bronić się przed fanatykami atakującymi nasze boskie ciało, musimy w pełni poprzeć Templariuszy Stali i dopilnować, by nasi wojownicy byli zawsze gotowi."
 edict_cybernetic_creed_research_edict: "Pieśń wiedzy"
 edict_cybernetic_creed_research_edict_desc: "Tylko poprzez dźwięczną pieśń wiedzy nasi ludzie w pełni zaznają boskości. Musimy wspierać nasz mądry Chór Umysłu we wszystkich przedsięwzięciach."
 edict_cybernetic_creed_construction_labor: "Strudzone masy"
 edict_cybernetic_creed_construction_labor_desc: "Nasza prawdziwa siła drzemie w sile roboczej. Jeśli zabraknie nam mocy, aby zapewnić im wsparcie, nie będą w stanie ponieść nas ku przyszłości."
 edict_cybernetic_creed_general_edict: "Lekcje harmonii"
 edict_cybernetic_creed_general_edict_desc: "Zjednoczenie Kościoła wiele nas nauczyło. Dzięki niemu nasza wiara jest mocniejsza i bardziej refleksyjna niż kiedykolwiek."
 #Intro Events
 machine_age.2150.name: "Kreda"
 machine_age.2150.desc: "Różne kreda naszej wiary, kierowane przez bóstwa ku gwiazdom, chcą mieć wpływ na nowe rządy.\n\nKażde z nich ma przemożny wpływ na wiernych i zabiega o ważne stanowiska dla swoich członków oraz zaspokaja ich potrzeby duchowe.\n\nCzas pokaże, który z tych prądów przybliży nas do boskości albo pogrąży w chaosie."
 machine_age.2150.a: "Oby okazały się pomocne."
 machine_age.2150.a.tooltip: "§YUtworzone frakcje§!:\n- $cyber_creed_labor$\n- $cyber_creed_war$\n- $cyber_creed_research$\n- $cyber_creed_construction$"
 cyber_creed_please_labor: "To ucieszy kredo §Y$cyber_creed_labor$§!\nTo rozgniewa inne kreda."
 cyber_creed_displease_labor: "To rozgniewa kredo §Y$cyber_creed_labor$§!\nTo ucieszy inne kreda."
 cyber_creed_please_war: "To ucieszy kredo §Y$cyber_creed_war$§!\nTo rozgniewa inne kreda."
 cyber_creed_displease_war: "To rozgniewa kredo §Y$cyber_creed_war$§!\nTo ucieszy inne kreda."
 cyber_creed_please_construction: "To ucieszy kredo §Y$cyber_creed_construction$§!\nTo rozgniewa inne kreda."
 cyber_creed_displease_construction: "To rozgniewa kredo §Y$cyber_creed_construction$§!\nTo ucieszy inne kreda."
 cyber_creed_please_research: "To ucieszy kredo §Y$cyber_creed_research$§!\nTo rozgniewa inne kreda."
 cyber_creed_displease_research: "To rozgniewa kredo §Y$cyber_creed_research$§!\nTo ucieszy inne kreda."
 machine_age.2205.name: "Pisanie historii na nowo"
 machine_age.2205.desc: "§YTemplariusze Stali§! rozpoczęli niedawno kampanię mającą na celu zakazanie opisywania porażek militarnych w dokumentach historycznych i religijnych.\n\nTo kredo uważa, że takie informacje demoralizują osoby służące w wojsku, a także osłabiają poparcie opinii publicznej. Nasi historycy nie zgadzają się z tą opinią i przypominają, że ten, kto nie uczy się historii, jest skazany na jej powtarzanie.\n\nCzy zgodzimy się na to bardziej pozytywne spojrzenie na przeszłość?"
 machine_age.2205.a: "Żeby zwyciężyć, musimy myśleć jak zwycięzcy."
 machine_age.2205.a.tooltip: "$cyber_creed_please_war$"
 machine_age.2205.b: "To nieakceptowalne. Musimy uczyć się na własnych błędach."
 machine_age.2205.b.tooltip: "$cyber_creed_displease_war$"
 machine_age.2210.name: "Ogień zgasł"
 machine_age.2210.desc: "Wielki Kowal, przywódca §YBractwa Młota§!, zmarł niespodziewanie.\n\nSłynął ze szczerości i zdecydowanych poglądów, miał jednak poparcie członków kreda. Bractwo zawnioskowało o zorganizowanie oficjalnego państwowego pogrzebu. Taki honor jest zwykle zarezerwowany dla naszych najbardziej uwielbianych przywódców.\n\nNic dziwnego, że inne kreda protestują, twierdząc, że państwo nie powinno brać udziału w pochówku głośnego przywódcy duchowego.\n\nJak odpowiemy na żądania kred?"
 machine_age.2210.a: "Wyprawcie ten pogrzeb."
 machine_age.2210.a.tooltip: "$cyber_creed_please_construction$"
 machine_age.2210.b: "Nie warto narażać się innym kredom."
 machine_age.2210.b.tooltip: "$cyber_creed_displease_construction$"
 machine_age.2215.name: "Kontrowersyjne relikty"
 machine_age.2215.desc: "Niedawno nasi archeolodzy odkryli starożytne miejsce kultu religijnego. Jego istnienie uważano dotąd za mit, teraz musimy zmienić część naszych zapisów historycznych.\n\nNajbardziej zaskakuje fakt, że wiele odnalezionych artefaktów historycznych nosi wyraźną ikonografię §YWspólnoty Harówki§!. To dowodzi, że Wspólnota była pierwszą interpretacją naszej religii, co było częstym przedmiotem rozważań naszej wiary.\n\nOficjalne ogłoszenie tego odkrycia zadowoliłoby §YWspólnotę Harówki§!, ale jego strategiczne przemilczenie ucieszyłoby pozostałe kreda."
 machine_age.2215.a: "Nie możemy obawiać się prawdy."
 machine_age.2215.a.tooltip: "$cyber_creed_please_labor$"
 machine_age.2215.b: "Zakopano to nie bez powodu. Zignorujmy to odkrycie."
 machine_age.2215.b.tooltip: "$cyber_creed_displease_labor$"
 machine_age.2221.name: "Tajny agent kreda"
 machine_age.2221.desc: "Odkryliśmy, że §Y[cyber_creed_undercover_leader.GetName]§! ma powiązania z kredo §Y[GetCyberCreed]§! i sprzeniewierza fundusze oraz przydziela projekty do strefy wpływów tego kreda.\n\nPozostałe kreda są rozwścieczone, że do tak oczywistego nadużycia władzy doszło za obecnych rządów, i twierdzą, że §Y[cyber_creed_undercover_leader.GetName]§! musi niezwłocznie odejść ze stanowiska.\n\nCo mamy zrobić z tą krnąbrną osobą?"
 machine_age.2221.a: "Ta osoba musi stracić stanowisko."
 machine_age.2221.a.tooltip: "[cyber_creed_undercover_leader.GetName] traci stanowisko."
 machine_age.2221.b: "Ta osoba uczyniła więcej dobrego niż złego."
 machine_age.2225.name: "Jubileuszowy młot"
 machine_age.2225.desc: "Niebawem rozpocznie się jubileuszowa pielgrzymka §YBractwa Młota§!, niezliczeni wyznawcy wyruszą z lokalnych hut, a celem ich wędrówki będzie §Y$building_forge_of_the_fellowship$§! w stolicy.\n\nTo wydarzenie wywołuje zwykle liczne problemy logistyczne i kończy się wybuchem przemocy, ponieważ Bractwo ściera się z wyznawcami innych kred.\n\nPojawiły się głosy, aby ukrócić ten obyczaj. Chcą tego pozostałe kreda i mieszkańcy stolicy."
 machine_age.2225.a: "Raz na zawsze zakażmy organizowania tej pielgrzymki."
 machine_age.2225.a.tooltip: "$cyber_creed_displease_construction$"
 machine_age.2225.b: "Wolność wyznania to prawo."
 machine_age.2225.b.tooltip: "$cyber_creed_please_construction$"
 machine_age.2230.name: "Oskarżenia o słaby rozwój"
 machine_age.2230.desc: "W ostatnim czasie Wielkiemu Mistrzowi §YChóru Umysłu§! zarzucono publicznie, że nasi wierni nie są zainteresowani łożeniem na badania naukowe.\n\nZakładamy, że to podstęp mający na celu pozyskanie większych funduszy dla członków ich kredo. Spełnienie tych żądań mogłoby zostać odebrane jako preferencyjne traktowanie §YChóru Umysłu§!.\n\nCzy powinniśmy zwiększyć wydatki na badania naukowe?"
 machine_age.2230.a: "Niech Mistrz Chóru śpiewa, dopóki nie straci głosu."
 machine_age.2230.a.tooltip: "$cyber_creed_displease_research$"
 machine_age.2230.b: "Umiarkowanie zwiększmy finansowanie, dopóki sprawa nie przycichnie."
 machine_age.2230.b.tooltip: "$cyber_creed_please_research$"
 machine_age.2230.c: "Znacząco zwiększymy finansowanie."
 machine_age.2230.c.tooltip: "$cyber_creed_please_research$"
 cyber_creed_history_rewritten: "Historia napisana od nowa"
 cyber_creed_history_rewritten_desc: "Usunęliśmy z naszych archiwów wszystkie wzmianki o porażkach militarnych, ku niezadowoleniu historyków."
 cyber_creed_history_repeating: "Historia się powtarza"
 cyber_creed_history_repeating_desc: "Zachowaliśmy w naszych archiwach wszystkie wzmianki o porażkach militarnych. Ta decyzja rozzłościła Templariuszy Stali."
 cyber_creed_no_choirmaster_funding: "Zignorowano Mistrza Chóru"
 cyber_creed_no_choirmaster_funding_desc: "Zignorowaliśmy żądania Chóru Umysłu o zwiększenie wydatków na naukę."
 cyber_creed_low_choirmaster_funding: "Wysłuchano Mistrza Chóru"
 cyber_creed_low_choirmaster_funding_desc: "Nieznacznie zwiększyliśmy wydatki na badania naukowe, aby zadowolić Chór Umysłu."
 cyber_creed_high_choirmaster_funding: "Spełniono prośbę Mistrza Chóru"
 cyber_creed_high_choirmaster_funding_desc: "W całości zaspokoiliśmy żądania Chóru Umysłu dotyczące finansowania nauki."
 cyber_creed_state_funeral: "Pogrzeb Wielkiego Kowala"
 cyber_creed_state_funeral_desc: "Zorganizowaliśmy pogrzeb państwowy zmarłego przywódcy Bractwa Młota."
 cyber_creed_no_state_funeral: "Bez pogrzebu państwowego"
 cyber_creed_no_state_funeral_desc: "Odmówiliśmy zorganizowania pogrzebu państwowego przywódcy Bractwa Młota."
 cyber_creed_relics_truth: "Ujawniono prawdę"
 cyber_creed_relics_truth_desc: "Pozwoliliśmy, aby opinia publiczna poznała prawdę o czasie istnienia Wspólnoty Harówki. To rozwścieczyło inne kreda."
 cyber_creed_relics_hidden: "Ukryto prawdę"
 cyber_creed_relics_hidden_desc: "Zignorowanie reliktu ucieszyło większość kred, jednak wywołało też osłabienie zaufania wobec przywództwa wiary."
 cyber_creed_leader_removed: "Usunięto błądzącego przywódcę"
 cyber_creed_leader_removed_desc: "Nasz przywódca, który potajemnie współpracował z jednym z kred, został pozbawiony stanowiska."
 cyber_creed_leader_stayed: "Błądzący przywódca zachował stanowisko"
 cyber_creed_leader_stayed_desc: "Przywódca, który potajemnie współpracował z jednym z kred, zachował stanowisko, choć wzywano do jego usunięcia."
 cyber_creed_pilgrimage_allowed: "Zezwolono na pielgrzymkę Bractwa"
 cyber_creed_pilgrimage_allowed_desc: "Zezwolono na zorganizowanie pielgrzymki Bractwa Młota. Zgodnie z przewidywaniami, po procesji doszło do starć i protestów."
 cyber_creed_pilgrimage_canceled: "Odwołano pielgrzymkę Bractwa"
 cyber_creed_pilgrimage_canceled_desc: "Nie zezwolono na zorganizowanie pielgrzymki Bractwa Młota, dzięki czemu udało się uniknąć spodziewanych starć. Ta decyzja rozzłościła wiernych."
 POP_ATTRACTION_CYBER_CREED_WAR: "§G+ £empire£ do etyki wyznawanej przez: $CYBERCREED_war$§!"
 POP_ATTRACTION_CYBER_CREED_RESEARCH: "§G+ £empire£ do etyki wyznawanej przez: $CYBERCREED_research$§!"
