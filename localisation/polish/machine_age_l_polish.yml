 ### Cosmogenesis Events
 crisis.7100.name: "Niezaspokojona ciekawość"
 crisis.7100.desc: "Nauka niewątpliwie jest drogą postępu. Jeśli chcemy wykorzystać nasz prawdziwy potencjał, możemy obrać tylko jedną drogę. Nasze wspaniałe technologie mówią same za siebie, ale nie rozumiemy jeszcze zbyt wielu rzeczy: zwyczajów upadłych imperiów, potęgi lewiatanów, tajemnic psioniki...\n\nPoznanie fundamentów rzeczywistości wymaga nowej nauki, nowego rodzaju komputera. Krosno synaptyczne to ogromny, pierwszy krok w podróży do nieograniczonej wiedzy."
 crisis.7100.a: "Wiedza to potęga."
 new_cosmogenesis_tech_tt: "§YKorzyść kryzysowa§!: Odblokowano nowe opcje badań naukowych."
 crisis.7105.name: "Poziom 2. kryzysu"
 crisis.7105.desc: "Odkrywając kolejne tajemnice wszechświata potwierdziliśmy, że grawitacja odgrywa fundamentalną rolę w kształtowaniu rzeczywistości we wszystkich wymiarach. Jej wpływ na czasoprzestrzeń jest ograniczony, ale to o wiele bardziej skomplikowana układanka.\n\nKażda nowa informacja otwiera przed nami kolejne możliwości. Niektóre z nich można bezpośrednio zastosować w przemyśle albo wojsku, a inne otwierają drzwi do wcześniej niewyobrażalnych teorii. Musimy się jeszcze wiele nauczyć."
 crisis.7105.a: "Wiemy, że nic nie wiemy."
 crisis.7110.name: "Poziom 3. kryzysu"
 crisis.7110.desc: "Waga grawitacji jest po prostu zdumiewająca. Poznaliśmy nowe sposoby manipulowania nią, ale jeszcze nie wiemy, jakie skutki przyniosą nasze działania. Jesteśmy przekonani, że grawitacja to najlepsza z możliwości przebicia się poza naszą obecną rzeczywistość, w podobny sposób jak czarna dziura wpływa na wszechświat wokół niej.\n\nWysunęliśmy hipotezę, że dostęp do tego, co można nazwać odwrotną stroną rzeczywistości, mógłby nam pomóc zmienić zasady po tej stronie. To niebezpieczny obszar badań, ale ostrożność nie może stanąć na drodze rozwoju."
 crisis.7110.a: "Grawitacja rządzi wszystkim... Na razie."
 crisis.7115.name: "Poziom 4. kryzysu"
 crisis.7115.desc: "Mieliśmy rację! Jeśli ktoś miał wątpliwości dotyczące naszej pracy, może teraz o nich zapomnieć.\n\nGrawitacja może służyć do naginania zasad rzeczywistości. Ale czy odpowiednie zmiany złamią je całkowicie? Jak na razie nasze doświadczenia były prowadzone w najmniejszej skali, a wszelkie wprowadzane przez nas zmiany szybko znikały, ponieważ rzeczywistość wracała do swoich ustawień \"domyślnych\". Przypuszczamy, że ten problem wiąże się tylko z wielkością. Wprowadzając paradoksy energetyczne na o wiele wyższych poziomach, możemy drastycznie zmniejszyć koszt tych zmian... Przynajmniej w naszym wymiarze.\n\nRyzyko nie ma znaczenia, nie możemy już zawrócić. Tylko ci, którzy ośmielą się łamać zasady, będą kiedyś mogli napisać je od nowa."
 crisis.7115.a: "Jesteśmy gotowi zaryzykować wszystko."
 crisis.7120.name: "Poziom 5. kryzysu"
 crisis.7120.desc: "To niemożliwe, a jednak się dzieje. Nieważne, czego próbujemy, nasze zmiany rzeczywistości nie przestają być tymczasowe. Wszechświat jest zwyczajnie zbyt stary, by te zmiany się zachowały. Ale wśród ogromnej frustracji czasami pojawia się okazja - jedno z nowych doświadczeń przyniosło nieoczekiwane wyniki. Od dawna wiedzieliśmy o istnieniu innych wymiarów, ale nie posiedliśmy możliwości dostania się tam.\n\nTo już przeszłość. W nieskończonej grawitacji osobliwości znajdują się młodsze wszechświaty. I wydają się bardziej elastyczne.\n\nMamy technologię pozwalającą wysłać sondy do czarnej dziury. Po przekroczeniu horyzontu zdarzeń zaczną one wywierać nacisk i naginać te młode wymiary do naszej woli. Tam, gdzie kosmos zagina się w wieczność, znajdują się drzwi do innego wszechświata, w którym znajdują się inne, młodsze wszechświaty. Głęboko w otchłani wieloświata znajdziemy elastyczną rzeczywistość, którą ukształtujemy w coś wyjątkowego.\n\nWąsko myślący mieszkańcy tej galaktyki mogą chcieć nas powstrzymać, ale to zacofani durnie. Nie sprostają naszemu geniuszowi."
 crisis.7120.a: "Musi się ugiąć, bo my się nie złamiemy."
 cosmogenesis_war: "Wojna rzeczywistości"
 cosmogenesis_materialist_war: "Wojna o przechwycenie wiedzy"
 crisis.7125.name: "Zwycięstwo na horyzoncie"
 crisis.7125.desc: "Ta rzeczywistość ma wiele wad. Jest pogrążona w entropii, potrzebach fizycznych i przemocy. Nie możemy jej zmienić, ale możemy ją opuścić. Wyruszmy w nieznane i znajdźmy jakiś młody wszechświat, w którym zachowają się nasze zmiany rzeczywistości. Nadajmy mu idealny kształt, niech stanie się bezpieczną przystanią, na jaką zasługuje nasza cywilizacja.\n\nZaprojektowaliśmy niezwykły statek: §YIgłę Horyzontu§!. Ta ruchoma superkonstrukcja nie posiada wyposażenia bojowego, ale ma zdolność naginania praw fizyki, dzięki czemu na jego pokładzie znajdzie się cała nasza cywilizacja. Razem zanurkujemy w wybraną przez nas czarną dziurę i porzucimy tę rzeczywistość dla takiej, którą stworzymy sami."
 crisis.7125.a: "Musimy zbudować §YIgłę Horyzontu§!!"
 needle_to_win_tt: "Zbuduj superkonstrukcję §YIgła Horyzontu§!, żeby odblokować ostatni akt kryzysu."
 cosmogenesis_planet_pickup_chain_title: "Kosmogeneza - Exodus"
 cosmogenesis_planet_pickup_chain_desc: "Już czas wyruszyć w podróż. W ramach przygotowań do wielkiego exodusu Igła Horyzontu poleci i przyjmie naszych obywateli na pokład.\n\nŻeby przyjąć całą cywilizację, §HIgła Horyzontu§! musi:$TABBED_NEW_LINE$ - Odwiedzić każdą posiadaną przez nas kolonię i §Hzaokrętować§! jej populację.$TABBED_NEW_LINE$ - Wrócić do naszej stolicy, aby §Hzaokrętować§! resztę naszego społeczeństwa.$TABBED_NEW_LINE$ - Polecieć do czarnej dziury i §Hzanurkować§! w nią.\n\n§ROSTRZEŻENIE§!: Igła Horyzontu nie ma uzbrojenia i musi być silnie strzeżona.\n\n§gŻeby zaokrętować kolonię lub zanurkować w czarną dziurę, wybierz Igłę Horyzontu, następnie kliknij PPM na kolonii/czarnej dziurze i wybierz odpowiednią akcję statku.§!"
 SHIP_COSMOGENESIS_EXODUS: "Moduł exodusu"
 SHIP_COSMOGENESIS_EXODUS_DESC: "Moduł exodusu to wysoce wyspecjalizowane narzędzie do edycji, dzięki któremu pasażerom nigdy nie zabraknie przestrzeni i czasu. Ma on kluczowe znaczenie dla bezpiecznej podróży Igły Horyzontu do innych wymiarów."
 cosmogenesis_exodus_tt: "Musimy przeprowadzić w naszym układzie macierzystym badania projektu specjalnego."
 exodus_ship_button: "§H[GetExodusShipAction]§!"
