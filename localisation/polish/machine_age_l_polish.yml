 cosmogenesis_needle_DESC: "Ten statek jawnie przeczy prawom wszechświata, posiada zdolność zmieniania rzeczywistości. Zaprojektowano go, by przebił się przez horyzont zdarzeń czarnej dziury i wleciał w samo serce osobliwości, gdzie nieskończona gęstość wytwarza nieskończoną grawitację."
 cosmogenesis_needle_MEGASTRUCTURE_DETAILS: "Żeby przejść do stworzonej przez nas rzeczywistości, musimy umieścić całą naszą cywilizację na pokładzie Igły Horyzontu, zanim na dobre opuścimy ten wszechświat."
