 paperclip_stockpile_reset_tt: "Nadmierne $r_consumer_goods$ zostaną wystrzelone w gwiazdę §Y[capital_star.GetName]§!. Pozostaną £consumer_goods£ w ilości §Y1000§!."
 d_consumer_goods_obsessional_directive: "Wieża towarów"
 d_consumer_goods_obsessional_directive_desc: "Ta ogromna wieża znajduje się na planecie i można z niej skorzystać w przyszłości."
