 trait_cyborg_creed_of_war: "Modyfikacje Templariuszy"
 trait_cyborg_creed_of_war_desc: "Boskie modyfikacje Stalowych Templariuszy sprawiają, że święci wojownicy są niepokonani w walce."
 trait_cyborg_creed_of_research: "Modyfikacje Chóru"
 trait_cyborg_creed_of_research_desc: "Częściowo połączona świadomość Chóru Umysłu umożliwia natychmiastową komunikację między badaczami."
 trait_cyborg_creed_of_labor: "Modyfikacje Wspólnoty"
 trait_cyborg_creed_of_labor_desc: "Boskie modyfikacje Wspólnoty Harówki pod każdym względem przewyższają tradycyjne narzędzia."
 trait_cyborg_ritualistic_implants: "Rytualne wszczepy"
