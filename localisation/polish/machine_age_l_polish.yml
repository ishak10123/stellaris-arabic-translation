 situation_paperclip_status_on_target: "Produkcja jest §Ywystarczająca§! do wypełnienia normy."
 situation_paperclip_status_low_capacity: "Pojemność magazynu jest §Rniewystarczająca§! do wypełnienia normy."
 civic_machine_obsessional_directive: "Obsesyjna dyrektywa"
 civic_machine_obsessional_directive_desc: "Głównym celem tej mechanicznej inteligencji jest nieustająca produkcja towarów przynoszących zyski, choć jej twórcy już dawno przestali istnieć. Nic nie może stanąć im na drodze do realizacji ciągle rosnących celów produkcyjnych."
