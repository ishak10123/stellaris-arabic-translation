 synth_queen_gift_tt: "Musimy dalej udowadniać naszą lojalność wobec Cetany, jeśli chcemy otrzymać od niej kolejne dary."
 synth_queen_punishment_tt: "Z każdą lekcją, którą daje Cetana, jej gniew wydaje się maleć."
