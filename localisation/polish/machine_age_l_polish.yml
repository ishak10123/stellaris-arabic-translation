 #Galcom Resolutions
 resolution_galactic_focus_crisis_synth_queen: "Priorytet: Cetana"
 resolution_galactic_focus_crisis_synth_queen_desc: "Cetana stanowi zagrożenie dla galaktyki. Jeśli się nie zjednoczymy, by ją powstrzymać, zniszczy nas wszystkich. Powinniśmy uczynić zwalczanie tego kryzysu priorytetem galaktycznym."
