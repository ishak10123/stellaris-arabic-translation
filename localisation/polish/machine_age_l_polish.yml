 civic_individual_machine_predictive_analysis: "$civic_machine_predictive_analysis$"
 civic_individual_machine_predictive_analysis_desc: "To społeczeństwo doskonale opanowało metody analizy predykcyjnej oraz metodologii naukowej, dzięki czemu skupia się wyłącznie na najbardziej obiecujących kierunkach rozwoju badań."
 councilor_individual_machine_predictive_analysis: "Główny analityk metodologii"
 councilor_individual_machine_predictive_analysis_desc: "$councilor_individual_machine_predictive_analysis$ kieruje naszymi analizami metodologii naukowej, aby dopilnować, że będziemy skupiać się wyłącznie na najbardziej obiecujących kierunkach rozwoju badań."
 civic_individual_machine_warbots: "$civic_machine_warbots$"
 civic_individual_machine_warbots_desc: "To społeczeństwo stale udoskonala swoją armię, gospodarkę i system edukacji, by różnicować stosowane strategie wojenne. Każda maszyna ma swój wkład w kolektywną siłę, zapewniając możliwości adaptacji i powodzenia w konfliktach."
 councilor_individual_machine_warbots: "Logistyk bojowy"
 councilor_individual_machine_warbots_desc: "$councilor_individual_machine_warbots$ planuje i wdraża łańcuchy dostaw, zapewniając stałe wsparcie dla naszych operacji bojowych, gdziekolwiek je przeprowadzamy."
 civic_individual_machine_replication: "$civic_machine_replication$"
 civic_individual_machine_replication_desc: "To społeczeństwo przejęło kontrolę nad środkami własnego montażu. Każda maszyna tworzy inne w nieprzerwanym łańcuchu ciągnącym się aż ku granicom możliwości naszej planety."
 councilor_individual_machine_replication: "Funkcjonariusz ds. koordynacji replikacji"
 councilor_individual_machine_replication_desc: "$TITLE$ dba, aby wszelki montaż przebiegał bezpiecznie i w ustalony sposób."
