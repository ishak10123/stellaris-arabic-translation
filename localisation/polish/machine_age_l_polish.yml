 district_cosmogenesis_world_science: "Brama neuronowa"
 district_cosmogenesis_world_science_plural: "Bramy neuronowe"
 district_cosmogenesis_world_science_desc: "Zgromadzone zdolności umysłowe niezliczonych osobników pozwalają nam przeprowadzać szybkie symulacje zaawansowanych hipotez. Złożona budowa bramek logicznych i organicznych magazynów pamięci gwarantuje uzyskanie niezwykle precyzyjnych danych."
 district_cosmogenesis_world_logic: "Spekulator ampliatywny"
 district_cosmogenesis_world_logic_plural: "Spekulatory ampliatywne"
 district_cosmogenesis_world_logic_desc: "Ta dzielnica, cud metafizyki dialektycznej, używa czipów neuronowych, aby oceniać prawdziwość stwierdzeń formalnych dotyczących rzeczywistości. W skrócie: odpowiada \"tak\" lub \"nie\" na najbardziej złożone pytania sformułowane przez zbiorową psyche mieszkańców krosna synaptycznego."
