 ##########################
 origin_cybernetic_creed: "Kredo cybernetyczne"
 origin_cybernetic_creed_desc: "§RUWAGA: Blokuje wszystkie drogi rozwoju poza: ['concept_cybernetic_ascension'].§!\n\nTo imperium podąża za boskim powołaniem, pragnie połączyć boskie ciało ze świętą cybernetyką. Modyfikacje to oddawanie czci."
 origin_tooltip_cybernetic_creed_effects: "- $HOMEWORLD$: budynki początkowe zostają zastąpione przez: ['concept_cybernetic_creed_infrastructure'] $NEW_LINE$- Frakcje typu ['concept_cybernetic_creed'] formują się wkrótce po rozpoczęciu gry\n- $SPECIES_TRAITS$ ['trait:trait_cyborg_ritualistic_implants']\n- $GUARANTEED_RESEARCH_OPTION_STRING$ ['concept_integrated_cybernetics', £engineering£ $tech_integrated_cybernetics$]\n- Miejsca pracy: ['concept_cybernetic_creed_jobs']"
 START_SCREEN_CYBERNETIC_CREED: "Nasze ciche powołanie to połączenie gatunku [Owner.Species.GetFleshTypeCyberCreed] i maszyn. Nasza historia jest pełna nieudanych prób, jednak kierowani wolą bożą, wreszcie osiągnęliśmy pierwszy etap świętej symbiozy z naszymi rytualnymi wszczepami.\n\nDopiero zaczęliśmy odkrywać nieskończony potencjał cybernetyki. Wkrótce pojawią się bardziej zaawansowane modyfikacje.\n\nMimo to nasza wiara jest podzielona, konkurujące ze sobą przykazania wskazują inne cele świętych modyfikacji. Kiedy rozwiążemy tę kwestię, idealny związek świętego gatunku [Owner.Species.GetFleshTypeCyberCreed] i błogosławionej technologii pozwoli nam poprawić ograniczenia tego, co stworzyła ewolucja.\n\n$machine_age.1090.pray$"
 concept_cybernetic_creed_traits: "$trait_cyborg_ritualistic_implants$"
 concept_cybernetic_creed_traits_desc: "- §GAutomatycznie przyznawane £pop£ §Hpopulacjom duchowości§!§! $NEW_LINE$- $TRAIT_IMPROVES_LEADERS$ $NEW_LINE$-§RNie można modyfikować genetycznie§!$NEW_LINE$- Wydajność pracy robotników: §G+5%§!$NEW_LINE$- $mod_pop_foundry_bonus_workforce_mult$: §G+5%§!$NEW_LINE$- $mod_pop_engineer_bonus_workforce_mult$: §G+5%§!$NEW_LINE$- $mod_pop_bureaucrat_bonus_workforce_mult$: §G+5%§!$NEW_LINE$- Uszkodzenia armii: §G+5%§! $NEW_LINE$- Cecha zmienia się wraz z dominującym: §Y$origin_cybernetic_creed$§!\n\n§L$trait_cyborg_ritualistic_implants_desc$§!"
