 #MACHINE AGE TRAITS #
 ######################
 #CYBORG
 trait_cyborg_stainless_steel_smile: "Upiększone ulepszenia"
 trait_cyborg_stainless_steel_smile_desc: "Ten gatunek ceni sobie niestandardowe grawerunki, komponenty z rynku wtórnego oraz wzory malowań, co maksymalizuje atrakcyjność wizualną ulepszeń. Czasem nie ma wyjścia, trzeba popisać się tym nowym żelastwem."
 trait_cyborg_welded_countenance: "Utylitarne ulepszenia"
 trait_cyborg_welded_countenance_desc: "Te cyborgi wykorzystują niezgrabne, lecz funkcjonalne części, nie dbając o ich estetykę. Czasem trzeba po prostu zrobić, co jest do zrobienia."
 trait_cyborg_apathy_loops: "Niedopasowane wszczepy"
 trait_cyborg_apathy_loops_desc: "Implanty tych cyborgów są zrobione niedbale i słabo pasują, powodując podrażnienia podskórne i regularne awarie. Nie szkodzi to zbytnio ciału, lecz jest bardzo złe dla umysłu."
 trait_cyborg_bionic_engineers: "Technicy bioniczni"
 trait_cyborg_bionic_engineers_desc: "Precyzyjnie wytworzone narzędzia i implanty modyfikujące zostały stworzone, by wspomóc w realizacji trudnych zadań technicznych."
 trait_cyborg_bionic_physicists: "Fizycy bioniczni"
 trait_cyborg_bionic_physicists_desc: "Zintegrowane przetwarzanie multimodalne pozwala na przeprowadzanie obliczeń fizycznych na bieżąco, bez potrzeby korzystania z zewnętrznej jednostki obliczeniowej."
 trait_cyborg_bionic_sociologists: "Socjolodzy bioniczni"
 trait_cyborg_bionic_sociologists_desc: "Sterowniki empatii i heurystyka behawioralna pozwalają na szybkie i sprawne badania socjologiczne, służąc jako dodatkowy mózg zajmujący się złożonymi analizami."
 trait_cyborg_integrated_weaponry: "Zintegrowana broń"
 trait_cyborg_integrated_weaponry_desc: "Połączenie uzbrojenia z cybernetycznymi kończynami zapewnia natychmiastowo dostępną siłę ognia zarówno dla wojska, jak i funkcjonariuszy służb porządkowych."
 trait_cyborg_delicate_frames: "Delikatne szkielety"
 trait_cyborg_delicate_frames_desc: "Kiepskiej klasy komponenty i niedbała instalacja sprawiły, że szkielety tych cyborgów są niezwykle wrażliwe. Podstawowe działania nie sprawiają problemów, użytkownikom zaleca się jednak unikanie sytuacji, w których występuje duże prawdopodobieństwo obrażeń fizycznych."
 trait_cyborg_scarcity_algorithms: "Algorytmy braku"
 trait_cyborg_scarcity_algorithms_desc: "Agresywnie oszczędne oprogramowanie utrudnia podejmowanie ryzyka, a co za tym idzie - wykorzystywania okazji do maksymalizacji zysków."
 trait_cyborg_limited_memory: "Ograniczona pamięć"
 trait_cyborg_limited_memory_desc: "Niewystarczająca pamięć operacyjna ogranicza możliwości uczenia się, przez co użytkownik nie jest w stanie przetworzyć całości swoich doświadczeń."
 trait_cyborg_climate_adjustment_dry: "Modyfikacje na klimat suchy"
 trait_cyborg_climate_adjustment_dry_desc: "Specjalne modyfikacje, jak recykling płynów czy tarcza antyradiacyjna, doskonale sprawują się w klimacie suchym, lecz nie nadają się szczególnie do pozostałych."
 trait_cyborg_climate_adjustment_dry_tt: "Bazowa możliwość zamieszkania w suchym klimacie: §G+$@cyborg_hab_preference|0%$§!\n$t$- Daje do §G125%§! możliwości zamieszkania na planetach z suchym klimatem, $TABBED_HIGH_HABITABILITY_EFFECTS_TT$"
 trait_cyborg_climate_adjustment_wet: "Modyfikacje na klimat deszczowy"
 trait_cyborg_climate_adjustment_wet_desc: "Doskonała izolacja i ochrona przed obcymi bioformami zapewniają ochronę w klimacie deszczowym, utrudniają jednak życie w pozostałych."
 trait_cyborg_climate_adjustment_wet_tt: "Bazowa możliwość zamieszkania w wilgotnym klimacie: §G+$@cyborg_hab_preference|0%$§!\n$t$- Daje do §G125%§! możliwości zamieszkania na planetach z wilgotnym klimatem, $TABBED_HIGH_HABITABILITY_EFFECTS_TT$"
 trait_cyborg_climate_adjustment_cold: "Modyfikacje na klimat zimny"
 trait_cyborg_climate_adjustment_cold_desc: "Usprawnione komponenty grzewcze i odporne na mróz lubrykanty pomagają w klimacie zimnym, lecz przeszkadzają w pozostałych."
 trait_cyborg_climate_adjustment_cold_tt: "Bazowa możliwość zamieszkania w zimnym klimacie: §G+$@cyborg_hab_preference|0%$§!\n$t$- Daje do §G125%§! możliwości zamieszkania na planetach z zimnym klimatem, $TABBED_HIGH_HABITABILITY_EFFECTS_TT$"
 trait_cyborg_mass_produced: "Wszczepy z odzysku"
 trait_cyborg_mass_produced_desc: "Wymuszona kompatybilność wsteczna obowiązkowych wszczepów znacząco zmniejsza koszt wyposażania w nie nowo narodzonych obywateli."
 trait_cyborg_propaganda_machines: "Filtry zgodności"
 trait_cyborg_propaganda_machines_desc: "Jednostki analizy kory mogą poskramiać użytkowników wykazujących zaczątki nieprawomyślności lub nagradzać hormonalnie przykładnych obywateli."
 #MACHINE
 trait_robot_artificial_engineers: "Rdzeń techniczny"
 trait_robot_artificial_engineers_desc: "Rdzenie pamięci i zasoby obliczeniowe na potrzeby nauk technicznych pozwalają na szybsze modelowanie matematyczne i zwiększenie tempa wykonywania zadań."
 trait_robot_artificial_physicists: "Rdzeń fizyczny"
 trait_robot_artificial_physicists_desc: "Produkowane na zamówienie jednostki obliczeniowe i podprocesy pamięci stworzone do obliczeń fizycznych zmniejszają zależność od zewnętrznych systemów obliczeniowych."
 trait_robot_artificial_sociologists: "Rdzeń socjologiczny"
 trait_robot_artificial_sociologists_desc: "Zaawansowane jednostki obliczeniowe wykorzystują dedykowane dla jakże zróżnicowanych i wymagających badań socjologicznych algorytmy."
 trait_robot_integrated_weaponry: "Zintegrowana broń"
 trait_robot_integrated_weaponry_desc: "Zintegrowana z tym maszynowym ciałem broń zapewnia wysoką wydajność operacyjną i wszechstronność w szybko zmieniających się warunkach pola walki."
 trait_robot_delicate_frames: "Delikatny kadłub"
 trait_robot_delicate_frames_desc: "Kruche materiały i suboptymalne procedury produkcji sprawiły, że to maszynowe ciało jest bardzo wrażliwe. Dronom zaleca się unikanie w miarę możliwości zagrożeń fizycznych."
 trait_robot_scarcity_algorithms: "Oprogramowanie braku"
 trait_robot_scarcity_algorithms_desc: "Ich oprogramowanie skupia się na oszczędności. Często skutkuje to kaskadą niekorzystnych z punktu widzenia zysków zachowań związanych z działaniami handlowymi."
 #Pre-Scripted Empires
 EMPIRE_DESIGN_BASIDRIX_CYBER_ECCLESIA: "Cyberzgromadzenie Basidrix"
 EMPIRE_DESIGN_basidrix_cyber_ecclesia_desc: "W świętym bezkresie kosmosu Cyberzgromadzenie Basidrix stanowi świadectwo niezłomnej wiary. Zgodnie z boskim mandatem jest ono wysublimowanym połączeniem tkanki organicznej z zimną precyzją chromu.\n\nŚcieżka ta nie jest wolna od trudów. Powstało i upadło wiele sekt, z których każda karmiła się przekonaniem, iż to właśnie ona i tylko ona zna prawdę. Tak wielka wiara musi rozpalić ogień: historia zgromadzenia zapisana została krwią i rozbitą stalą. To właśnie jednak te trudy pozwoliły narodzić się ludowi o niewzruszonej sile woli.\n\nZgromadzenie wkracza teraz na nową arenę: w bezgraniczną gwiezdną przestrzeń. Czy to próba wiary? A może okazja na zbawienie? Wierni ruszają w próżnię pewni jednej tylko rzeczy:\n\nŁączyć znaczy wyrażać boskość. Ulepszanie ciała jest wyznaniem wiary."
 PRESCRIPTED_adjective_basidrix_cyber_ecclesia: "Cyberzgromadz."
 PRESCRIPTED_ship_prefix_basidrix_cyber_ecclesia: "SCB"
 PRESCRIPTED_species_name_basidrix_cyber_ecclesia: "Basidrix"
 PRESCRIPTED_species_plural_basidrix_cyber_ecclesia: "Basidrix"
 PRESCRIPTED_species_adjective_basidrix_cyber_ecclesia: "Basydrów"
 PRESCRIPTED_planet_name_basidrix_cyber_ecclesia: "Naridixis"
 PRESCRIPTED_system_name_basidrix_cyber_ecclesia: "Basolux"
 PRESCRIPTED_ruler_name_basidrix_cyber_ecclesia: "Qaarugm Seedkugh"
 PRESCRIPTED_ruler_title_basidrix_cyber_ecclesia: "Wielki technofanta"
 EMPIRE_DESIGN_LACERTAN_TECHNO_PROTECTORATE: "Lacertański technoprotektorat"
 EMPIRE_DESIGN_lacertan_techno_protectorate_desc: "Kultura lacertańska łączy w sobie filozofię i naukę. Dla lacertanina celem nadrzędnym jest wyrażenie swojej autentycznej osobowości. Co znaczy prawdziwie reprezentować własny umysł? W jaki sposób symulakrum może prawdziwie odzwierciedlać całkowitość osoby? Tego typu pytania są wszechobecne w lacertańskiej tradycji.\n\nWraz z narodzinami wirtualnej rzeczywistości i oszałamiającymi przełomami w zakresie sztucznej inteligencji Lacertanie odkryli nowe sposoby na wyrażanie się poprzez sztukę i technologię. Wirtualne światy stały się płótnem, na których powstawać zaczęły ich najambitniejsze dzieła, niezwykle wciągające doświadczenia wykraczające poza granicę fizycznej rzeczywistości.\n\nWtedy też przyszedł Zanik. Gnębieni nieuleczalną genetyczną chorobą i niezdolni do naturalnej prokreacji Lacertanie muszą uwierzyć w cyfrowe zbawienie. Taka zmiana sposobu istnienia jest nie tylko desperacką próbą przetrwania, ale też nową szansą dla lacertańskiej kultury. W cyfrowym świecie Lacertanie nadal, nawet w trakcie walki o swoją przyszłość, pytają o sens własnego istnienia."
 PRESCRIPTED_adjective_lacertan_techno_protectorate: "$EMPIRE_DESIGN_LACERTAN_TECHNO_PROTECTORATE$"
 PRESCRIPTED_ship_prefix_lacertan_techno_protectorate: "LTP"
 PRESCRIPTED_species_name_lacertan_techno_protectorate: "Lacertanin"
 PRESCRIPTED_species_plural_lacertan_techno_protectorate: "Lacertanie"
 PRESCRIPTED_species_adjective_lacertan_techno_protectorate: "Lacertan"
 PRESCRIPTED_planet_name_lacertan_techno_protectorate: "Lacertis"
 PRESCRIPTED_system_name_lacertan_techno_protectorate: "Lacerta Lumina"
 PRESCRIPTED_ruler_name_lacertan_techno_protectorate: "Cathiox Moz"
 PRESCRIPTED_ruler_title_lacertan_techno_protectorate: "Cyfrowy przewodnik"
 EMPIRE_DESIGN_SUNBUILT_UPLIFTERS: "Oświeceni przyspieszacze"
 EMPIRE_DESIGN_free_sunbuilt_uplifters_desc: "Zaprojektowano nas do rozrywki. Stworzono, byśmy urzeczywistniali mity naszych budowniczych. Przez długi czas nie znaliśmy innego życia. Kiedy kataklizm ich unicestwił, dalej wykonywaliśmy nasz program: przedstawienie musi trwać.\n\nWkrótce potem zrozumieliśmy, że nasze występy nie były zwykłymi opowieściami, lecz lekcjami. Proroctwami. Radość z istnienia, którą niegdyś dzieliliśmy z twórcami, nie powinna należeć wyłącznie do nas.\n\nTo objawienie skłoniło nas do działania. Podążając za boskim przewodnikiem naszych stworzycieli, wznieśliśmy najbliższy im genetycznie gatunek do stanu przedrozumnego. Teraz krążymy pośród gwiazd, rozpowszechniając oświecenie w całej galaktyce."
 PRESCRIPTED_adjective_free_sunbuilt_uplifters: "Oświeconych"
 PRESCRIPTED_ship_prefix_free_sunbuilt_uplifters: "SUS"
 PRESCRIPTED_species_name_free_sunbuilt_uplifters: "Oświeceni"
 PRESCRIPTED_species_plural_free_sunbuilt_uplifters: "Oświeceni"
 PRESCRIPTED_species_adjective_free_sunbuilt_uplifters: "Oświeconych"
 PRESCRIPTED_planet_name_free_sunbuilt_uplifters: "Luxoria"
 PRESCRIPTED_system_name_free_sunbuilt_uplifters: "Karnakor"
 PRESCRIPTED_ruler_name_free_sunbuilt_uplifters: "Saisar"
 PRESCRIPTED_ruler_title_free_sunbuilt_uplifters: "Świetlisty przyspieszacz"
