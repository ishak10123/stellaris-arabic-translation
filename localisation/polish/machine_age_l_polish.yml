 pft_cyber_creed_labor: "$CYBERCREED_labor$"
 pft_cyber_creed_labor_desc: "Wspólnota Harówki ściśle nadzoruje wszystkich zwykłych pracowników i ich modyfikacje. Jej działaniami kieruje głęboka wiara w boskość ciężkiej pracy. Tylko osoby zajmujące się korzeniami mogą zrozumieć boskość.\n\n§LEtos duchowości§!"
