 trait_auto_mod_biological: "Genomika branżowa"
 trait_auto_mod_biological_desc: "Funkcja zaawansowanych linii genetycznych wykorzystuje aktywatory epigenetyczne do adaptacji do wymagań danego zawodu - pozwala na dynamiczną optymalizację ekspresji genów na potrzeby środowiska pracy gospodarza."
 trait_auto_mod_cyborg: "Uniwersalne ulepszenia"
 trait_auto_mod_cyborg_desc: "Uniwersalne połączenie typu plug-and-play pozwala na wymianę ulepszeń wedle potrzeb, co umożliwia dostosowanie możliwości użytkownika do bieżących wymogów operacyjnych."
 trait_auto_mod_robotic: "Szkielety adaptatywne"
 trait_auto_mod_robotic_desc: "Ten system dynamicznie zmienia konfigurację sprzętu tak, aby dostosować ją do wymogów operacyjnych i zoptymalizować wydajność realizacji wszystkich wyznaczonych zadań."
 trait_auto_mod_overtuned: "Ulotna doskonałość"
 trait_auto_mod_overtuned_desc: "Zaawansowane aktywatory epigenetyczne poprawiają wydajność fizyczną i kognitywną w miejscu pracy, znacząco skracając oczekiwaną długość życia. Ale przecież o wiele lepiej jest szybko spłonąć, niż powoli zaniknąć."
 concept_automodding_trait: "Automatyczna modyfikacja cechy"
 concept_automodding_traits: "Automatyczna modyfikacja cech"
 concept_automodding_trait_desc: "- Modyfikatory są automatycznie łączone z cechami z określonej listy, by dopasować się do miejsca pracy.\n- Efekty cech są proporcjonalne do odsetka grupy populacji posiadającego daną cechę.\n- $pop$ §HPopulacje§! z cechą §Y$concept_automodding_traits$§! sprawdzane co miesiąc, na kolonię: §G100§!\n- Przyrost populacji i £building£ budynki montażu zwiększają liczbę £pop£ §Hautomatycznie modyfikowanych populacji§! (aktualizowane co miesiąc)."
