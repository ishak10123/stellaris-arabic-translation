 SYNAPTIC_LATHE_EFFICENCY_TITLE: "Wydajność"
 SYNAPTIC_LATHE_EFFICENCY_DESC: "§EDzięki każdemu §Yczipowi neuronowemu§! wpiętemu w krosno rośnie wydajność pozostałych §Yczipów neuronowych§! w całej strukturze. Osiedlając tu liczniejszą populację, możemy znacząco zwiększyć wydajność produkcji tej struktury.§!"
 pop_cat_chip_slave: "Element obliczeniowy"
 pop_cat_chip_slave_desc: "Te osobniki służą za czipy gigantycznego komputera. Są pogrążone w głębokiej, sztucznie wywołanej śpiączce, a kapsuły podtrzymywania życia zapewniają im długowieczność. W końcu ogromne obciążenie obliczeniami prowadzi do awarii organów kognitywnych."
 pop_cat_chip_slave_plural: "$pop_cat_chip_slave$"
 purge_cosmogenesis: "Przeciążenie kognitywne"
 purge_cosmogenesis_tooltip: "Wskazane populacje są automatycznie przenoszone do §Ykrosna synaptycznego§!, a ich rola to $job_neural_chip$."
 purge_cosmogenesis_tooltip_delayed: "§LTryb w maszynie.§!"
 cosmogenesis_world_0: "$pc_cosmogenesis_world$"
 cosmogenesis_world_0_DESC: "Komputer o niesamowitych rozmiarach, który wykorzystuje świadome istoty jako czipy obliczeniowe generujące badania naukowe i zaawansowaną logikę, co w końcu prowadzi do śmierci tych osobników. Wydajność tego komputera ogromnie rośnie, gdy podłącza się do niego kolejne jednostki."
 cosmogenesis_world_0_MEGASTRUCTURE_DETAILS: "Struktura obliczeniowa, która pochłania populacje, aby wytwarzać §Ybadania naukowe§! i §Yzaawansowaną logikę§!."
 cosmogenesis_world_ruined: "Zniszczony $pc_cosmogenesis_world$"
 cosmogenesis_world_ruined_DESC: "Szczątki krosna synaptycznego. Kiedyś był to wielki komputer, wykorzystujący świadome istoty jako czipy, aby odkrywać tajemnice wszechświata."
 cosmogenesis_world_ruined_MEGASTRUCTURE_DETAILS: "$cosmogenesis_world_ruined_DESC$"
