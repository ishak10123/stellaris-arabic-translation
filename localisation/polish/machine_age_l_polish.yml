 machine_age.1075.name: "Krew i obwody"
 machine_age.1075.desc: "Wreszcie nadszedł czas boskiej fuzji.\n\nCzas, żeby święty §Y$building_augmentation_center$§! znalazł się na każdym z naszych światów."
 machine_age.1075.a: "$machine_age.1090.pray$"
 machine_age.1075.a.tooltip: "Zaczyna się proces pełnej modyfikacji cybernetycznej wiernych. Pozostałe działania Konklawe zostały wstrzymane do czasu zakończenia boskiej fuzji.\n\n§RWymagane działanie:§!\nZbuduj $building_augmentation_center$, aby wznowić sytuację §Y$situation_cybernetic_creed_cyberization$§!."
 machine_age.1090.name: "Przyszłość ciała"
 machine_age.1090.desc: "Po zakończeniu naszej boskiej podróży nasze powłoki wreszcie osiągną świętą fuzję, której elementami będą maszyny i [Owner.Species.GetFleshTypeCyberCreed]. Dla wiernych ostatnim krokiem będzie zainstalowanie świętych modyfikacji."
 machine_age.1090.construction: "$machine_age.1090.desc$ §Y$CYBERCREED_construction$§! wymaga, aby nasze ciała stały się boskimi narzędziami.\n\n$machine_age.govswapnotice$\n\n$machine_age.1090.pray$"
 machine_age.1090.war: "$machine_age.1090.desc$ §Y$CYBERCREED_war$§! wymaga, aby wierni stali się świętą bronią.\n\n$machine_age.govswapnotice$\n\n$machine_age.1090.pray$"
 machine_age.1090.research: "$machine_age.1090.desc$ §Y$CYBERCREED_research$§! odkryje tajemnice wszechświata dzięki populacji umysłów połączonych w sieć.\n\n$machine_age.govswapnotice$\n\n$machine_age.1090.pray$"
 machine_age.1090.labor: "$machine_age.1090.desc$ §Y$CYBERCREED_labor$§! obiecuje, że nasze talerze i magazyny nigdy nie będą puste.\n\n$machine_age.govswapnotice$\n\n$machine_age.1090.pray$"
 machine_age.1090.pray: "Fuzja jest boska. Modyfikacja to wiara."
