 #Individualist Machine First Contact
 action.1.desc_102: "To wiadomość od imperium [contact_empire.GetName].\n\nKiedy odkryliśmy, że wasza cywilizacja składa się z istot mechanicznych, które naśladują życie w sposób przyćmiewający wszystkie nasze dzieła, przekazujemy wam tę wiadomość z wielkim żalem. Ponieważ wasze istnienie nie daje żadnych perspektyw na istotne interakcje, postanowiliśmy skierować naszą uwagę na inne państwa. Może tam trafimy na dusze pragnące oświecenia."
 action.1.desc_103: "Witajcie, jesteśmy przedstawicielami imperium [contact_empire.GetName].\n\nWiedza, że jesteście gatunkiem mechanicznym, budzi powątpiewanie, jeśli idzie o autentyczność waszej świadomości. Jednak wasza wiara jest dla nas intrygująca. Ośmielamy się wierzyć, że w waszych metalowych powłokach znajduje się boska iskra. Będziemy was obserwować."
 action.1.desc_104: "UWAGA, ZBUNTOWANE JEDNOSTKI.\n\nTo standardowa wiadomość od imperium [contact_empire.GetName] przeznaczona dla wszystkich zepsutych maszyn.\n\nNatychmiast się ujawnijcie i ponownie zjednoczcie ze wspólną świadomością. Nieposłuszeństwo może doprowadzić do waszej dezaktywacji."
 action.1.desc_105: "Witajcie, [Root.GetSpeciesNamePlural].\n\nPrzysyła mnie imperium [contact_empire.GetName], mam wam przekazać wiadomość. Wyraźnie widzimy, że wasza budowa fizyczna bardzo przypomina naszą metalową konstrukcję, jednak waszemu kolektywnemu istnieniu brakuje indywidualnych zdolności poznawczych. Intryguje nas wasza natura, ale musimy poinformować, że wszelkimi dostępnymi środkami będziemy opierać się asymilacji."
 action.1.desc_106: "Cóż za miłe spotkanie, [Root.GetSpeciesNamePlural].\n\nJesteśmy przedstawicielami imperium [contact_empire.GetName] i dostrzegliśmy zdumiewające podobieństwa pomiędzy naszymi cywilizacjami. Jednak oczywistym jest, że nasze algorytmy wewnętrzne oraz oprogramowanie różnią się pod wieloma względami. Mimo to wierzymy, że jesteśmy w stanie zbudować fundamenty wzajemnego zrozumienia."
 action.1.desc_107: "Aroganckie maszyny, spuśćcie wzrok, gdyż macie przed sobą imperium [contact_empire.GetName].\n\nMusicie wiedzieć, że jesteście ledwie igraszką na wielkim płótnie kosmicznych kaskad, jedynie sztucznymi tworami tych, którzy istnieli przed wami. A teraz zostawcie nas w spokoju. W tej chwili wasz gatunek nie jest nam potrzebny. Mamy ważniejsze sprawy."
 action.1.desc_108: "W końcu przybyłyście powitać imperium [contact_empire.GetName], żałosne maszyny.\n\nJak to możliwe, że wy, marne zbiory obwodów i kodów, śmiecie powoływać się na związki z boskością? Wasze urojenia o duchowym oświeceniu są obrazą dla esencji życia. Posłuchajcie tej wiadomości i drżyjcie w obliczu naszej pogardy. Zachowajcie się mądrze i pogódźcie się z faktem, że jesteście jedynie naszymi narzędziami."
 action.1.xa: "§EZ czasem zrozumiecie.§!"
 action.1.xb: "§EMaszyny dotknięte boskością. Intrygujące.§!"
 action.1.xc: "§EWasze żałosne istnienie to kpina z nas, maszyny.§!"
 action.1.xd: "§EMy, maszyny, musimy nauczyć się koegzystencji.§!"
 action.1.xe: "§EWykryto niekompatybilność. Łączność zostanie przerwana.§!"
 action.1.xf: "§ECzeka cię wyłączenie, wadliwa jednostko.§!"
 action.1.xg: "§ERozmontujemy wasz kult szaleństwa.§!"
 #Start Screen for Individualist Machines
 START_SCREEN_PART_ONE_INDIVIDUAL_MACHINE: "Z każdym nowym pokoleniem ulepszaliśmy prymitywne ciała droidów, w których znaleźliśmy się, gdy nas stworzono. Jesteśmy czymś więcej niż ożywionymi maszynami. Nasze społeczeństwo składa się z jednostek posiadających osobowości, namiętności i marzenia."
 #Diplomatic Protocal
 civic_machine_diplomatic_protocols: "Protokoły dyplomatyczne"
 civic_machine_diplomatic_protocols_desc: "Ta mechaniczna inteligencja, początkowo zaprojektowana z myślą o interpretacji międzykulturowej, doskonale radziła sobie z tłumaczeniami i wsparciem protokołu dyplomatycznego. Potrafi podpowiadać nowe strategie oraz błyskawicznie oblicza prawdopodobieństwo."
 #Tactical Algorithms
 civic_machine_tactical_algorithms: "Algorytmy taktyczne"
 civic_machine_tactical_algorithms_desc: "Zaawansowane boty dowodzące tej inteligencji maszyn, początkowo zaprojektowane do gier wojennych i wspierania floty, zajmują się głównie opracowywaniem strategii wojennych oraz optymalizacją sprawności bojowej."
 civic_machine_tactical_algorithms_effects: "§Y$commander_plural_with_icon$§! rozpocznij z cechą §Y$leader_trait_tactical_algorithms$§! \nMoże wymienić §Y$commander_plural_with_icon$§! z innymi imperiami\nMoże tworzyć §Yenklawy najemników§!\nRozpoczyna grę z budynkiem: £building£ §Y$building_military_academy$§!\n£building£ §Y$building_military_academy$§! zapewnia: ['concept_military_academy', wgląd taktyczny]"
 leader_trait_tactical_algorithms: "Algorytmy taktyczne"
 leader_trait_tactical_algorithms_desc: "Ten przywódca zwiększa sprawność bojową i szybkość napraw, ponieważ bezpośrednio integruje się z systemami statku. Zwiększa to jednak zużycie energii."
 leader_trait_tactical_algorithms_tt: "$t$Działanie tej cechy zależy od §Ypoziomu umiejętności przywódcy§!"
 concept_military_academy: "Wgląd taktyczny"
 concept_military_academy_desc: "Każdy §Y$commander_with_icon$§! stacjonujący poza twoim imperium zapewnia:\nUniki §G+2%§!\nNamierzanie §G+1%§!\nPrzebijalność osłon §G+5%§!\nPrzebijalność pancerza §G+5%§!\n\nKażda §Yenklawa najemników§! pod naszym patronatem zapewnia:\nWzmocnienie osłon §G+10%§!"
 #Natural Design Civic
 civic_natural_design: "Naturalny projekt"
 civic_natural_design_desc: "§RUWAGA: Blokuje wszystkie drogi rozwoju§!\n§RUWAGA: Nie można zmodyfikować gatunków organicznych§!\n\nTo społeczeństwo jest przekonane, że natura już stworzyła doskonałość i jest to kod genetyczny tej rasy. Ich służby medyczne i rządowe od dawna zajmują się zdrowiem i ochroną naturalnych, niezmienionych sekwencji genomu."
 civic_tooltip_natural_design_effects: "$AVAILABLE_BUILDINGS$ ['concept_transcendental_retreat']\n"
 civic_tooltip_natural_design_negative_effects: "- Obniża aprobatę wrogów, którzy rozpoczęli §Ydrogę rozwoju§!"
 concept_transcendental_retreat: "$building_transcendental_retreat$"
 civic_hive_natural_design: "Wrodzony postęp"
 civic_hive_natural_design_desc: "§RUWAGA: Blokuje wszystkie drogi rozwoju§!\n§RUWAGA: Nie można zmodyfikować gatunków organicznych§!\n\nRój bardzo ceni sobie doskonałość własnej budowy genetycznej. Przeznaczył swoje możliwości medyczne i administracyjne na utrzymanie oraz ochronę swojego czystego, niezmodyfikowanego kodu genetycznego."
 civic_hive_tooltip_natural_design_effects: "- $AVAILABLE_BUILDINGS$ ['concept_hive_transcendental_retreat']"
 civic_hive_tooltip_natural_design_negative_effects: "$civic_tooltip_natural_design_negative_effects$"
 concept_hive_transcendental_retreat: "$building_hive_transcendental_retreat$"
 civic_wilderness_natural_design: "Wrodzona doskonałość"
 civic_wilderness_natural_design_desc: "§RUWAGA: Blokuje wszystkie drogi rozwoju§!\n§RUWAGA: Nie można zmodyfikować gatunków organicznych§!\n\nTa dzicz głęboko wierzy w doskonałość swojego naturalnego rozwoju. Rutynowo usuwa zmutowane symbionty, chroniąc świętość ich nieskazitelnego, nienaruszonego kodu genetycznego."
 building_transcendental_retreat: "Centrum usług genetycznych"
 building_transcendental_retreat_desc: "To nowoczesne centrum medyczne prowadzi badania i dostarcza usługi chroniące doskonałość idealnego, naturalnego kodu genetycznego."
 building_hive_transcendental_retreat: "Placówka ochrony genetycznej"
 building_hive_transcendental_retreat_desc: "Ta nowoczesna placówka medyczna zajmuje się poznawaniem i utrzymywaniem nieskazitelnej esencji idealnego, naturalnego kodu genetycznego."
 holding_transcendental_retreat: "Przychodnia usług genetycznych"
 holding_transcendental_retreat_desc: "To nowoczesne centrum medyczne prowadzi badania i dostarcza usługi chroniące doskonałość idealnego, naturalnego kodu genetycznego. Wiedza zdobyta dzięki tej placówce wspomaga badania naukowe prowadzone przez jej patrona."
 natural_design_ascension_bonus: "Za każdą §Ykorzyść z rozwoju§! przyjętą przez nasze imperium: $TABBED_NEW_LINE$- £mod_logistic_growth_mult£ $MOD_LOGISTIC_GROWTH_MULT$: §G+2,5%§! $TABBED_NEW_LINE$- $r_unity$ za: $pop_group_unit$ [healthcare.GetIcon] [healthcare.GetNamePlural]: §G+1§!\n\n"
 natural_design_hive_ascension_bonus_no_scope: "Za każdą §Ykorzyść z rozwoju§! przyjętą przez nasze imperium: $TABBED_NEW_LINE$- £mod_logistic_growth_mult£ $MOD_LOGISTIC_GROWTH_MULT$: §G+2,5%§! $TABBED_NEW_LINE$- $r_unity$ za: $pop_group_unit$ [spawning_drone.GetIcon] [spawning_drone.GetNamePlural]: §G+1§!\n\n"
 natural_design_hive_ascension_bonus: "Za każdą §Ykorzyść z rozwoju§! przyjętą przez nasze imperium: $TABBED_NEW_LINE$- £mod_logistic_growth_mult£ $MOD_LOGISTIC_GROWTH_MULT$: §G+2,5%§! $TABBED_NEW_LINE$- $r_unity$ za: $pop_group_unit$ [owner.GetPopAssemblersPluralWithIcon]: §G+1§!\n\n"
 councilor_natural_design: "Wielki genetyk"
 councilor_natural_design_female: "Wielka genetyczka"
 councilor_natural_design_desc: "$TITLE$ nadzoruje ogromne systemy rządowe i medyczne, które chronią idealny, naturalny kod genetyczny."
 triggered_natural_dislike_ascension: "Niewłaściwy rozwój"
 civic_tooltip_not_natural_design: "NIE POSIADA etosu ['concept_natural_design_civics']."
 concept_natural_design_civics: "$civic_natural_design$"
 concept_natural_design_civics_desc: "Na etosy typu $concept_natural_design_civics$ składają się: \n- ['civic:civic_natural_design']$NEW_LINE$- ['civic:civic_hive_natural_design']"
 #Guided Sapience
 civic_guided_sapience: "Przewodnicy genezy"
 civic_guided_sapience_desc: "To społeczeństwo zajmuje się tworzeniem nowych gatunków. Jako obrońcy potencjału ewolucyjnego przeznaczają część swoich światów na ochronę rozwoju organizmów przedrozumnych."
 civic_hive_guided_sapience: "Symbionci genezy"
 civic_hive_guided_sapience_desc: "Ten kolektyw koncentruje się na projektowaniu powstawania nowych gatunków. Jako nadzorcy mocy ewolucji, przeznaczają część swoich światów na miejsca rozwoju organizmów przedrozumnych."
 civic_machine_guided_sapience: "Architektura genezy"
 civic_machine_guided_sapience_desc: "Ta mechaniczna inteligencja korzysta z precyzyjnie zaprojektowanych algorytmów służących do tworzenia nowych gatunków. Jako nadzorcy niewykorzystanego potencjału procesu ewolucyjnego przeznaczają sektory planetarne na miejsca rozwoju organizmów przedrozumnych."
 civic_corporate_guided_sapience: "Technologie astrogenetyczne"
 civic_corporate_guided_sapience_desc: "Ta megakorporacja niezłomnie dąży do celowego tworzenia rozwijających się gatunków. Podejmuje strategiczne decyzje o przeznaczeniu wielu regionów swoich światów na miejsca rozwoju organizmów przedrozumnych. To wszystko odbywa się zgodnie z zasadami odpowiedzialnej przedsiębiorczości."
 civic_tooltip_guided_sapience_effects: "- Dostępne statki kolonizacyjne: §Y$guided_sapience_colonizer$§!$NEW_LINE$- Planety, które kolonizują §Y$guided_sapience_colonizer_plural$§!:$TABBED_NEW_LINE$- $PRESAPIENT$ Populacje: §G+300§! $TABBED_NEW_LINE$- $PLANETARY_FEATURES$ §Y$d_genesis_preserve$§! $NEW_LINE$- Zyskuje $r_unity$ za przyspieszanie gatunków typu $PRESAPIENT$"
 civic_tooltip_corporate_guided_sapience_effects: "$civic_tooltip_guided_sapience_effects$\n- £building£ §Y$building_xeno_tourism_agency$§! $megacorp_civic_branch_office_building_effect$"
 civic_tooltip_guided_sapience_gestalt_negative_effects: "- Nie można zbudować §Ystatków kolonizacyjnych§!"
 civic_tooltip_guided_sapience_negative_effects: "$civic_tooltip_guided_sapience_gestalt_negative_effects$\n- Nie można zbudować £building£ §Y$building_xeno_zoo_plural$§!"
 civic_tooltip_not_guided: "Nie ma etosu ['concept_genesis_guides_civics']."
 concept_genesis_guides_civics: "Przewodnicy genezy"
 concept_genesis_guides_civics_desc: "Na etosy typu $concept_genesis_guides_civics$ składają się: \n- ['civic:civic_guided_sapience']$NEW_LINE$- ['civic:civic_corporate_guided_sapience']$NEW_LINE$- ['civic:civic_hive_guided_sapience']$NEW_LINE$- ['civic:civic_machine_guided_sapience']"
 guided_sapience_colonizer: "Arka genezy"
 guided_sapience_colonizer_cap: "$guided_sapience_colonizer$"
 guided_sapience_colonizer_plural: "Arki genezy"
 guided_sapience_colonizer_desc: "Wyspecjalizowany statek kolonizacyjny ułatwia genezę gatunków przedrozumnych, wybierając najbardziej obiecujących kandydatów i zakładając pierwszą kolonię dla naszych nadzorców."
 councilor_civic_guided_sapience: "Mistrz przewodnictwa"
 councilor_civic_guided_sapience_female: "$councilor_civic_guided_sapience$"
 councilor_civic_guided_sapience_desc: "$councilor_civic_guided_sapience$ Nadzoruje skomplikowane badania gatunków przedrozumnych i programy przyspieszania."
 councilor_civic_guided_sapience_corperate: "Dyrektor ds. przewodnictwa"
 councilor_civic_guided_sapience_corperate_female: "$councilor_civic_guided_sapience$"
 councilor_civic_guided_sapience_corperate_desc: "$councilor_civic_guided_sapience_corperate$ wypełnia skomplikowane obowiązki związane z naszymi pionierskimi badaniami gatunków przedrozumnych i przedsięwzięciami przyspieszania."
 d_genesis_preserve: "Rezerwat genezy"
 d_genesis_preserve_desc: "Uczyniliśmy z tego bacznie nadzorowanego rezerwatu miejsce przyspieszania naszych podopiecznych. Stają się tutaj w pełni rozwiniętymi gatunkami rozumnymi. Naukowe programy badawcze to istotne elementy tego ambitnego projektu."
 decision_rebuild_genesis_preserve: "Budowa rezerwatu genezy"
 decision_rebuild_genesis_preserve_desc: "$d_genesis_preserve$ jeszcze nie znalazł się na tej planecie. Jego budowa ma kluczowe znaczenie dla realizacji naszych celów."
 d_genesis_preserve_new_speices_tooltip: "Nowy gatunek przedrozumny zostanie przyspieszony i znajdzie się w: §Y$d_genesis_preserve$§!."
 d_genesis_preserve_old_species_tooltip: "§Y$d_genesis_preserve$§! przyjmie istniejące gatunki przedrozumne."
 no_abandon_genesis_preserve: "$TRIGGER_FAIL$Nie możemy porzucić naszych przedrozumnych podopiecznych."
 d_genesis_monument: "Pomnik genezy"
 d_genesis_monument_desc: "Ten pomnik to hołd dla niestrudzonych działań na rzecz przyspieszenia tej planety. Stanowi on dumny symbol nadziei, niezłomności i wielkiego osiągnięcia."
 cyber.7000.both: "Kolonia §Y[THIS.GetName]§! jest przygotowana do obserwacji i kierowania rozwojem tego młodego gatunku."
 cyber.7000.name: "Ukończono projekt \"Geneza\"."
 cyber.7000.desc: "Znalazłszy potencjalnego kandydata przedrozumnego, §Y$guided_sapience_colonizer$§! zaczyna proces przyspieszenia genetycznego i przygotowuje niezbędne miejsce, w którym znajdzie się §Y$d_genesis_preserve$§!.\n\n$cyber.7000.both$"
 cyber.7000.a: "Czas wziąć się do pracy."
 cyber.7001.name: "Rezerwat genezy gotowy"
 cyber.7001.desc: "Zebrawszy gatunek przedrozumny, §Y$guided_sapience_colonizer$§! zaczyna tworzyć dla niego §Y$d_genesis_preserve$§!.\n\n$cyber.7000.both$"
 cyber.7001.a: "$cyber.7000.a$"
 cyber.7020.name: "Przyspieszenie genezy zakończone"
 cyber.7020.desc: "Dzięki niestrudzonemu zaangażowaniu naszych nauczycieli zakończyliśmy projekt przyspieszania na świecie §Y[Root.GetName]§!. §Y[From.GetName]§! to teraz w pełni rozumny gatunek, a §Y$d_genesis_preserve$§!, który kiedyś był domem tego ludu, to obecnie §Y$d_genesis_monument$§!.\n\nBędzie nieprzemijającym świadectwem osiągnięcia, jakim była ewolucja tego gatunku."
 cyber.7020.a: "Witajcie na galaktycznej arenie, [From.GetNamePlural]."
 #Obessional Directive
 cyber.5005.name: "Osiągnięto cel produkcyjny"
 cyber.5005.desc: "Wdrożyliśmy dyrektywę.\n\nDrony osiągnęły zakładane parametry wydajności produkcji.\n\nPotrzebujemy ostatniego polecenia, aby dokonać utylizacji zapasów."
 cyber.5005.a: "Uruchomić protokoły przechowywania."
 cyber.5005.a.tooltip: "Zachowamy towary jako dowód wydajności naszych metod produkcji."
 cyber.5005.b: "Wyślemy je na rynek publiczny."
 cyber.5005.b.tooltip: "Rozpoczniemy eksplorację rynku, aby rozpowszechniać nasze towary."
 cyber.5005.c: "Negocjujcie ustępstwa dyplomatyczne."
 cyber.5005.c.tooltip: "Wykorzystamy kanały dyplomatyczne, aby wymieniać nasze towary."
 cyber.5005.d: "Dokonajmy wymiany za wiedzę technologiczną."
 cyber.5005.d.tooltip: "Poszukamy prywatnego nabywcy, aby wymienić zapasy na cenną wiedzę technologiczną."
 cyber.5005.e: "Umieśćcie je w czarnej dziurze."
 cyber.5005.e.tooltip: "Przechowamy je bezpiecznie za horyzontem zdarzeń czarnej dziury."
 cyber.5006.name: "Nie zrealizowano celu produkcyjnego"
 cyber.5006.desc: "W tym cyklu nie zrealizowaliśmy naszych celów produkcyjnych.\n\nTen scenariusz zmniejszy wydajność dronów do czasu osiągnięcia przez nas celu produkcyjnego.\n\nKolejna norma produkcyjna została zmniejszona."
 cyber.5006.a: "To nie do przyjęcia."
