 mod_pop_replicator_workforce_mult: "Wydajność pracy - $job_replicator_plural_with_icon$"
 cyber_hive_node_booster: "Szał asymilacji"
 cyber_hive_node_booster_desc: "Dodawanie nowych dronów do kolektywu budzi silną reakcję emocjonalną na najgłębszym poziomie."
