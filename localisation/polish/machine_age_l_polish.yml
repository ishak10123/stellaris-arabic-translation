 synth_queen_alloy_shipments: "Podatek królowej"
 synth_queen_alloy_shipments_desc: "Wspieramy ambicje Cetany, dzieląc się z nią częścią naszej produkcji stopów."
 synth_queen_large_alloy_shipments: "Dary dobrej woli"
 synth_queen_large_alloy_shipments_desc: "Chcemy zyskać jej przychylność, więc wspieramy ambicje Cetany, dzieląc się z nią dużą częścią naszej produkcji stopów."
 synth_queen_shared_research: "Badania naukowe królowej"
 synth_queen_shared_research_desc: "Pozwoliliśmy Cetanie zajrzeć do naszych banków danych, przez co wydajność badań czasowo spadła."
 synth_queen_much_shared_research: "Przeciążona baza danych"
 synth_queen_much_shared_research_desc: "Zgodziliśmy się dać Cetanie swobodny dostęp do naszych baz danych, co mocno ograniczyło nasz potencjał badawczy."
 synth_queen_war_preparations: "Wojna na horyzoncie"
 synth_queen_war_preparations_desc: "Po odkryciu tajnych działań Cetany musimy położyć jeszcze większy nacisk na wzmocnienie naszego wojska."
 synth_queen_advanced_war_preparations: "Walka o przetrwanie"
 synth_queen_advanced_war_preparations_desc: "Cetana planuje zgładzić świadomość. Musimy ją za wszelką cenę powstrzymać."
 synth_queen_nanite_apprentice: "Uczeń Cetany"
 synth_queen_nanite_apprentice_desc: "Cetana bardzo się nami zainteresowała, gdy okazało się, że łączy nas fascynacja nanotechnologią. Nieważne, czy jej ufamy, czy nie, jej rady mogą dać nam wiele korzyści."
 #Opinion
