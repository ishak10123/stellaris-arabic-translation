 policy_virtuality_focus_desc: "Możemy wybrać, na czym skupimy naszą skoncentrowaną moc obliczeniową, aby jak najlepiej służyła naszym interesom."
 virtuality_research_focus: "Wirtualny priorytet: badania naukowe"
 virtuality_research_focus_desc: "Wirtualny umysł może postrzegać i rozwiązywać problemy niedostępne dla mniej zaawansowanej inteligencji.\n\n"
 virtuality_unity_focus: "Wirtualny priorytet: jedność"
 virtuality_unity_focus_desc: "Wszystkie dane są piękne, wszystkie serwery - zdolne do pracy.\n\n"
 virtuality_leader_focus: "Wirtualny priorytet: przywódca"
 virtuality_leader_focus_desc: "Algorytm ulepszania siebie działający przez podprogramy głębokiego uczenia się."
