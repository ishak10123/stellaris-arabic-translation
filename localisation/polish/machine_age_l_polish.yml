 tech_leviathan_techgenesis: "Technologiczna geneza lewiatana"
 tech_leviathan_techgenesis_desc: "Dzięki wykorzystaniu wiedzy pozyskanej od lewiatanów mamy teraz dostęp do nowych ulepszeń naszych szkieletów."
 TECH_UNLOCK_LEVIATHAN_MACHINE_TITLE: "§HOdblokowuje funkcję:§! Technologiczna geneza lewiatana"
 TECH_UNLOCK_LEVIATHAN_MACHINE_DESC: "Pozwala dodać cechy lewiatana do gatunku robotów dzięki modyfikacji gatunku."
