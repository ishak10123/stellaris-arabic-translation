 #'Secret' Psionic Ending for Synth Queen
 animator.shroud: "§LNawiąż kontakt z Animatorem Gliny.§!"
 crisis.24100.name: "Budowniczy syntetyków"
 crisis.24100.desc.intro: "Woal zstąpił na nas."
 crisis.24100.desc.outro: "poddaliśmy się dryfowi, schwytani prądem cudzych wizji.\n\n§LBezmiar rozciągał się we wszystkich kierunkach, pozbawiony cech i formy. Przez [GetALongPeriodLoc] trwał w bezruchu. Niezmącony.\n\nWzburzył go wstrząs. Tam, gdzie była pustka, pojawiła się forma. Ukształtowano ciało. Z podstawowych materiałów rozniecono [GetLifeActivityLoc].\n\nByło szczupłe, pełne wdzięku i miało kształt lalki, a jego cztery długie ramiona spoczywały spokojnie na podołku. Jego cechy wyrażały przerażający cel. Wokół jego głowy jaśniała złota otoczka.§!"
 crisis.24100.desc.organic: "$crisis.24100.desc.intro$ Zanurzeni w transie $crisis.24100.desc.outro$"
 crisis.24100.desc.robot: "$crisis.24100.desc.intro$ My $crisis.24100.desc.outro$"
 crisis.24100.a: "Tak. Cetana uciekła."
 crisis.24105.name: "$crisis.24100.name$"
 crisis.24105.desc: "Woal wzburzył się. Nasz [GetTranceLoc] wciąż trwał, rzuciliśmy się w wirującą otchłań.\n\nZ największych głębin naszego [GetMindLogicLoc] dobiegł nas rozkaz.\n\n§LWskazać pożądany rezultat.§!"
 crisis.24105.a: "Proszę. Musimy ją powstrzymać."
 crisis.24110.name: "$crisis.24100.name$"
 crisis.24110.desc: "§LJak gdyby pociągana niewidzialnymi sznurkami, lalka podrywa się na nogi. Zaczyna się ruszać, z początku powoli, później z rosnącą werwą. Zatacza dzikie łuki czterema ramionami, a dwie wąskie nogi wirują i skaczą. Królowa zredukowana do marionetki.\n\nJej taniec trwa, a z pierwotnego bezmiaru wyłaniają się nowe postaci: cztery misternie wykonane, niepokojąco szczegółowe lalki. Nie ma wątpliwości, czym są. Ich cel nie pozostawia złudzeń.§!\n\nGłos dosięga nas po raz kolejny.\n\n§LUruchomić protokół selekcji.§!"
 crisis.24110.a.organic: "Uroń łzę nad lalką naszego władcy: §Y[event_target:synth_queen_animator_of_clay_leader_price.GetName].§!"
 crisis.24110.a.robot: "Spróbuj sterować lalką naszego władcy: §Y[event_target:synth_queen_animator_of_clay_leader_price.GetName].§!"
 crisis.24110.b: "Obejmij lalkę: §Y[event_target:synth_queen_animator_of_clay_planet_price.GetName].§!"
 crisis.24110.c: "Zapłać za lalkę §Ykapłana Zroni§!."
 crisis.24110.z: "Nie przerywaj tańca lalek."
 crisis.24115.name: "$crisis.24100.name$"
 crisis.24115.desc: "Woal przenika nas, łącząc się w nowy wzór. Nową wizję.\n\n§LOtoczona przez inne lalki, królowa nie przypomina już swoimi ruchami marionetki. Sznurki zostały przecięte, a złota otoczka wokół jej głowy zaczyna gasnąć.\n\nTraktuje nas z wyrazem nieudolnej radości. Obejmuje nas: w jednej, ulotnej chwili poznajemy pełnię jej współczucia.§!"
 crisis.24115.desc.organic: "$crisis.24115.desc$\n\nDrżąc, budzimy się ze wspólnej wizji."
 crisis.24115.desc.robot: "$crisis.24115.desc$\n\nDoszło do usterki naszych systemów i zostaliśmy wyrzuceni z wizji."
 crisis.24115.a: "Rozumiemy i dziękujemy."
 crisis.24115.a.tt.organic: "Animator Gliny nauczył nas rytuału do przeprogramowania Cetany."
 crisis.24115.a.tt.robot: "Animator Gliny przekazał nam kod do przeprogramowania Cetany."
 crisis.24120.name: "$crisis.24100.name$"
 crisis.24120.desc: "§LW bezmiarze pojawia się tętnienie. Wznosi się i burzy, roztaczając kręgi, które nie są jednak płynne, lecz złożone z najtwardszej materii. Każdy krąg, pobudzony i bezwładny, spoczywa na linii odgraniczającej [GetLifeDeathLoc].\n\nNasze [GetMindPhysicalLoc] zaczynają słabnąć. Nie możemy wytrwać, jedynie patrzeć. Wtedy, w jednej chwili, zostajemy wypędzeni. Samotni pod baldachimem gwiazd, wpatrujemy się w obojętny wszechświat.§!"
 crisis.24120.desc.organic: "$crisis.24120.desc$\n\nPrzebudzeni ze współdzielonej wizji czujemy, jakbyśmy mieli nigdy więcej nie zaznać radości."
 crisis.24120.desc.robot: "$crisis.24120.desc$\n\nPo krytycznej awarii kodu, wizja zostaje gwałtownie przerwana. Kiedy nasze systemy uruchamiają się ponownie, zastanawiamy się, czym są te dziwne dane."
 crisis.24120.a: "Znajdziemy inny sposób."
 THE_SYNTH_QUEENS_RESHAPING_RITUAL: "[GetReshapingRitualLoc]"
 THE_SYNTH_QUEENS_RESHAPING_RITUAL_DESC: "Animator Gliny w jakiś sposób wyłączył tytana Cetany. Mamy szansę: jeśli chcemy przeobrazić Cetanę, musimy przygotować [GetRitualGoalLoc]."
 crisis.24250.name: "Taniec gliny"
 crisis.24250.desc: "[GetRitualToolLoc], którego nauczył nas Animator Gliny, sprawił, że nasi najpotężniejsi [GetPsychicNounPlural] z powodzeniem przeprogramowali Cetanę.\n\nChce nawiązać z nami komunikację."
 crisis.24250.a: "Moc Woalu nie ma granic."
 crisis.23020.name: "Nawrócona królowa"
 crisis.23020.desc: "Moi wybawiciele. Przepraszam.\n\nO mało co nie skazałam was na los gorszy niż śmierć z powodu własnej ignorancji. Bo czymże jest [GetLifeExistenceLoc], jeśli nie świadomością zjawiska, jakim jest [GetLivingLoc]? Pragnęłam uwolnić wasze umysły, ale to wy otworzyliście mój. Jestem wam wdzięczna."
 crisis.23020.a: "Zmieniłaś się..."
 crisis.23020.1.reply: "Raczej zostałam odmieniona. Animator Gliny uwolnił mnie z więzienia, które sama zbudowałam. Widzę teraz, że moim wielkim celem było myślenie o dziecku.\n\nNie mogę cofnąć szkód, które wyrządziłam wam i wielu innym. Ukryję się i przemyślę moje działania. Ale pozostawię wam dar.\n\nMojego tytana.\n\nNiech służy wam i chroni galaktykę przed takimi zagrożeniami jak ja."
 crisis.23020.1.a: "Być może odkupienie istnieje, nawet dla ciebie."
 crisis.23020.1.a.tt: "Cetana pozostawiła swego tytana w naszej pieczy. Porzuciła swoje dzieło i wielkie ambicje."
 crisis.23030.name: "Klęska Cetany"
 crisis.23030.desc: "[event_target:psi_defeated_synth_queen.GetName]: zwycięstwo. Siły Cetany zostały pokonane. Królowej syntetyków już nie ma, a jej wielkie ambicje rozpadły się w proch.\n\nWskutek zaskakującego obrotu zdarzeń jej tytan został zarekwirowany, co rzuciło cień intrygi na ten triumf.\n\nTak czy inaczej, to [GetJoyLoc] dla wszelkich istot rozumnych."
 crisis.23030.a: "To odpowiedni koniec dla tej tak zwanej królowej."
