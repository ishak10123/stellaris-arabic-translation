 situation_paperclips: "Konsolidacja towarów"
 situation_paperclips_type: "Konsolidacja towarów"
 situation_paperclips_monthly_change_tooltip: "Wyznaczono cel produkcyjny. Wysłano drony. Realizacja zadania."
 situation_paperclips_desc: "Nasza nadrzędna dyrektywa i cel to maksymalizacja wydajności. Osiągnięcie wyznaczonych norm jest obowiązkowe.\nCzas realizacji to §Y[owner.situation_paperclips_timer]§!\nAktualny cel produkcyjny to: §Y[Owner.paperclips_once_again]§!\nObecny zapas to §Y[Owner.paperclips_current_amount]§!\n[Owner.GetPaperclipStatus]"
