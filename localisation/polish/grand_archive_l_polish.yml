 NAME_Treasure_Trove_Pirate_Ship: "Bandyci z układu [event_target:pirate_system.GetName]"
 NAME_Treasure_Trove_Pirate_Ship_Design: "Szmugler"
 grand_archive.6025.name: "Piracka zasadzka"
 grand_archive.6025.desc: "W trakcie poszukiwań obiektu §Y$TREASURE_TROVE$§! na świecie [from.GetName], [fromfromfrom.Leader.GetName] wpada w zasadzkę pirackiej floty!\n\nCi bandyci w jakiś sposób śledzili nasze działania i chcą zdobyć skarb dla siebie. Jeżeli chcemy zdobyć ten łup, musimy pokonać ich flotę, zanim przejmie kosztowności."
 grand_archive.6025.a: "Przygotować się do walki."
 TREASURE_TROVE_PIRATES: "Pokonaj: $NAME_Treasure_Trove_Pirate_Ship$"
 TREASURE_TROVE_PIRATES_DESC: "Flota piracka chce przejąć obiekt §Y$TREASURE_TROVE$§! na świecie [this.GetName]!"
 TREASURE_TROVE_EVENT_TOOLTIP: "§RMusimy pokonać tych oportunistów, zanim przejmą cenne zasoby.§!"
 grand_archive.6031.name: "Pokonano piratów"
 grand_archive.6031.desc: "Rozbiwszy piratów możemy spokojnie przejąć skrytkę skarbu na świecie [event_target:treasure_trove_planet.GetName]."
 grand_archive.6031.a: "Zasłużyliśmy na tę nagrodę."
 grand_archive.6035.name: "Skrytka skarbu stracona"
 grand_archive.6035.desc: "§Y$TREASURE_TROVE$§! na świecie [event_target:treasure_trove_planet.GetName] została splądrowana przez piratów.\n\nNie znajdziemy tam już nic wartościowego."
 grand_archive.6035.a: "Bywa i tak."
 #################
 #Leader Traits #
 #################
 leader_trait_buccaneer: "Bukanier"
 leader_trait_buccaneer_desc: "Ten przywódca to mistrz pozyskiwania materiałów z pola bitwy, nawet najbardziej uszkodzone wraki potrafi wycisnąć do ostatniej kropli."
 leader_trait_trailblazer: "Innowator"
 leader_trait_trailblazer_desc: "Ten przywódca, oczarowany perspektywą wielkich zysków czekających na galaktycznym pograniczu, chce dotrzeć do najdalszych zakątków kosmosu."
 leader_trait_treasure_hoarder: "Kolekcjoner skarbów"
 leader_trait_treasure_hoarder_desc: "Żaden łup nie jest w stanie zaspokoić ambicji tego przywódcy. Gromadzenie cennych zasobów to jego najważniejszy cel."
 mod_enemy_ship_destroyed_energy_add: "$r_energy$ za rozmiar zniszczonego okrętu wroga"
 mod_deposit_increase_on_survey_chance_mult: "Po zakończeniu badań:\n$t$Szansa zwiększenia wielkości złoża zasobu"
 ##########
 #Civics #
 ##########
 civic_galactic_curators: "Galaktyczni kuratorzy"
 civic_galactic_curators_desc: "Tę cywilizację zawsze fascynowało drobiazgowe kolekcjonowanie i ochrona artefaktów historycznych. Ale teraz, gdy tajemnice galaktyki stają przed nią otworem, może nauczyć się wszystkiego."
 civic_galactic_curators_effects: "$civic_galactic_curators_effects_common$\n- $entertainers_are_curators_tt$"
 civic_corporate_galactic_curators: "Doświadczenie antykwaryczne"
 civic_corporate_galactic_curators_desc: "Na antykach i przedmiotach kolekcjonerskich można zarobić, o czym to społeczeństwo wie lepiej niż ktokolwiek. Ma ogromne doświadczenie w handlu materiałami, a teraz spogląda w niebo i wypatruje okazji inwestycyjnych."
 civic_corporate_galactic_curators_effects: "$civic_galactic_curators_effects_common$\n- $entertainers_are_curators_tt$\n- The £building£ §Y$building_public_relations_office$§! $megacorp_civic_branch_office_building_effect$"
 civic_hive_galactic_curators: "Sieć opiekunów"
 civic_hive_galactic_curators_desc: "W tej zbiorowości wykształcił się nieokiełznany impuls zbierania, trzymania i serwisowania. W przeszłości to zachowanie pomagało jej przetrwać, a teraz sprawia, że prezentuje zgromadzone eksponaty na wielkiej wystawie."
 civic_hive_galactic_curators_effects: "$civic_galactic_curators_effects_common$"
 civic_machine_galactic_curators: "Sieć opiekunów"
 civic_machine_galactic_curators_desc: "Mechaniczna inteligencja posiada w swoim kodzie źródłowym podstawową dyrektywę: zbierać i chronić."
 civic_machine_galactic_curators_effects: "$civic_galactic_curators_effects_common$"
 civic_galactic_curators_effects_common: "- $GUARANTEED_RESEARCH_OPTION_STRING$ ['technology:tech_galactic_archivism', £society_research£$tech_galactic_archivism$]\n- Początkowe ['concept_specimen', okazy]: Jeden §0$common$§! z każdej kategorii kolekcji \n- Zyskujesz $r_unity$ za każdym razem, gdy znajdziesz §Yokaz§! albo zakończysz pracę w: §Y$ARCHAEOLOGICAL_SITE$§! \n- Zakupy z §Yenklawy kuratorów§!: §G$@galactic_curators_curator_enclave_purchase_cost|%0$§!\n- Udostępnia edykt §Y$edict_decentralized_research$§!, który zwiększa produkcję §Ystacji badawczej§!, ale zmniejsza produkcję z miejsca pracy: £job_researcher£ §Y[GetResearcher]§!"
 edict_decentralized_research: "Zdecentralizowane badania"
 edict_decentralized_research_desc: "Największa wiedza znajduje się poza naszą cywilizacją. Koncentrując się na galaktyce jako całości, możemy lepiej zrozumieć samych siebie."
 MOD_COUNTRY_SPECIMEN_ACQUIRE_CHANCE_MULT: "Większa szansa odkrycia okazów."
 councilor_galactic_curators: "Najdoskonalszy kurator"
 councilor_galactic_curators_desc: "$TITLE$ nadzoruje ochronę jakości wszystkich okazów."
 councilor_corporate_galactic_curators: "Oficer ds. przechowywania"
 councilor_corporate_galactic_curators_desc: "$TITLE$ zarządza wystawą i sprzedażą okazów."
 civic_beastmasters: "Treser zwierząt"
 civic_beastmasters_desc: "Osiągając pełną technologiczną dojrzałość w układzie będącym pastwiskiem kosmicznych ameb, to społeczeństwo posiadło dogłębną wiedzę o ich cyklu rozrodczym. Teraz hodują, wychowują i wreszcie klonują te stworzenia, co przynosi korzyści obu stronom."
 civic_machine_beastmasters: "Biodrony"
 civic_machine_beastmasters_desc: "Ta mechaniczna inteligencja miała bezpośredni kontakt z organizmami biologicznymi żyjącymi w próżni w jej układzie macierzystym, dzięki czemu zintegrowała te potężne stworzenia ze swoimi najważniejszymi funkcjami. Skorzystały na tym obie strony."
 civic_hive_beastmasters: "Dziki rój"
 civic_hive_beastmasters_desc: "Ten umysł zbiorowy to świetnie adaptująca się kolonia, która w wyniku ewolucji wytworzyła symbiotyczny związek z organizmami biologicznymi żyjącymi w próżni w jej układzie macierzystym. Oddzielne umysły współpracują na rzecz wspólnego celu."
 civic_wilderness_beastmasters: "$civic_hive_beastmasters$"
 civic_wilderness_beastmasters_desc: "Dzicz otworzyła się na symbiozę z fauną kosmiczną pochodzącą z jej układu macierzystego. Nie doszło do pełnej integracji z mutualistyczną inteligencją, jednak te organizmy współpracują, by realizować wspólne cele."
 civic_corporate_beastmasters: "Kosmiczni ranczerzy"
 civic_corporate_beastmasters_desc: "Początkowo ta megakorporacja była elitarną gildią ranczerów, która opracowała technologię hodowli i opieki nad stworzeniami żyjącymi w próżni w je układzie macierzystym."
 civic_beastmasters_common_effects_1: "$t$- $ADDITIONAL_TECHNOLOGIES_STRING$$TABBED_NEW_LINE$$t$- ['technology:tech_gravity_wells', £physics£$tech_gravity_wells$]$TABBED_NEW_LINE$$t$- ['technology:tech_alien_cloning', £society£$tech_alien_cloning$]$TABBED_NEW_LINE$- $AVAILABLE_STARBASE_BUILDINGS$ ['concept_beastport', Beastports]$TABBED_NEW_LINE$- $HOME_SYSTEM$ Rozpocznij ze ['concept_beastport', zwierzoportem]"
 civic_beastmasters_ships: "$t$- Początkowe §Yokręty wojenne§! zostają zastąpione przez: §Ykosmiczne ameby§!"
 civic_beastmasters_common_effects_2: "$t$- Początkowe £genetic_material£ ['concept_dna']:$TABBED_NEW_LINE$$t$- §0Powszechna§! kosmiczna ameba"
 civic_beastmasters_effects: "$civic_beastmasters_common_effects_1$\n$civic_beastmasters_ships$\n$civic_beastmasters_common_effects_2$"
 civic_corporate_beastmasters_effects: "$civic_beastmasters_common_effects_1$\n$civic_beastmasters_ships$\n$civic_beastmasters_common_effects_2$\n$t$- £building£ §Y$building_food_conglomerate$§! $megacorp_civic_branch_office_building_effect$"
 civic_cordyceptic_beastmasters_effects: "$civic_beastmasters_common_effects_1$$TABBED_NEW_LINE$- Zacznie ze §Ysklonowaną kosmiczną amebą§! zamiast z §Ynieumarłą kosmiczną amebą§!\n$civic_beastmasters_common_effects_2$"
 councilor_beastmasters: "Władca zwierząt"
 councilor_beastmasters_desc: "$TITLE$ to wysoce wyspecjalizowana i prestiżowa rola, zorientowana głównie na zarządzanie oraz strategiczne rozmieszczanie okrętów fauny kosmicznej."
 councilor_corporate_beastmasters: "Główny ranczer"
 councilor_corporate_beastmasters_desc: "$TITLE$ dba o zdrowie i nieprzerwane zaopatrywanie okrętów fauny kosmicznej. Ta dynamiczna rola wymaga wyjątkowego połączenia znajomości logistyki, ekologii oraz hodowli zwierząt."
 civic_tooltip_not_beastmasters: "NIE MA etosu: ['concept_beastmasters_civic']"
 concept_beastmasters_civic: "$civic_beastmasters$"
 concept_beastmasters_civic_desc: "Na etosy typu \"$concept_beastmasters_civic$\" składają się: $NEW_LINE$- ['civic:civic_beastmasters']$NEW_LINE$- ['civic:civic_hive_beastmasters'] $NEW_LINE$- ['civic:civic_machine_beastmasters'] $NEW_LINE$- ['civic:civic_corporate_beastmasters']"
