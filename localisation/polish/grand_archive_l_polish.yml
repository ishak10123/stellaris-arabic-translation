 berserker_glands_modifier: "Otrzymywane obrażenia wytrzymałości i pancerza zwiększają szybkostrzelność o §Y$@unique_mutation_berserker_glands_fire_rate|0%$§! na $@unique_mutation_berserker_glands_days|0$ dni."
 BERSERKER_GLANDS_TOOLTIP: "$berserker_glands_modifier$"
 REPAIR_ARMOR_PERCENTAGE_EFFECT: "Naprawa $VALUE|Y%$ pancerza"
 space_amoeba_UNIQUE_MUTATION_PROJECT: "Projekt mutacji - kosmiczna ameba"
 space_amoeba_UNIQUE_MUTATION_PROJECT_DESC: "Podczas procesu szkolenia nowo sklonowanych organizmów ranna kosmiczna ameba zastosowała nowatorską technikę do pokonania swojego przeciwnika. Jej wici były w stanie wyssać składniki odżywcze i materiały z naturalnych układów obronnych swojego sparingpartnera, aby wykorzystać je do załatania dziur we własnym pancerzu i odzyskać siłę do walki.\n\nDodatkowe badania nad tym fenomenem mogą ujawnić nowy element biologii kosmicznych ameb, którego usprawnienie pozwoli opracować nową, typową dla gatunku mutację."
 tiyanki_UNIQUE_MUTATION_PROJECT: "Projekt mutacji - tijanki"
 tiyanki_UNIQUE_MUTATION_PROJECT_DESC: "Zaobserwowano, że sklonowana niedawno flota tijanek komunikowała się ze sobą. Stworzenia wyemitowały serię skomplikowanych dźwięków, które, choć ledwo wykrywalne, zdawały się nieść ukojenie i spokój wszystkim innym istotom wokół.\n\nDodatkowe badania nad tym fenomenem mogą ujawnić nowy element biologii tijanek, którego usprawnienie pozwoli opracować nową, typową dla gatunku mutację."
 voidworm_UNIQUE_MUTATION_PROJECT: "Projekt mutacji - czerw próżniowy"
 voidworm_UNIQUE_MUTATION_PROJECT_DESC: "Zauważyliśmy, że niektóre z naszych czerwi próżniowych po dorośnięciu wytwarzają małe, przypominające cysty narośle. Dalsze obserwacje wykazały, że okazy z takimi brzydkimi naroślami są zwykle płodniejsze od pozostałych osobników.\n\nDodatkowe badania nad tym fenomenem mogą ujawnić nowy element biologii czerwi próżniowych, którego usprawnienie pozwoli opracować nową, typową dla gatunku mutację."
 cutholoid_UNIQUE_MUTATION_PROJECT: "Projekt mutacji - kutoloid"
 cutholoid_UNIQUE_MUTATION_PROJECT_DESC: "Zaobserwowaliśmy, jak jeden z naszych sklonowanych kutoloidów wskutek przekarmienia zaczął gwałtownie opróżniać swój żołądek. Płyny trawienne, które z siebie wydalił, okazały się działać niczym śmiercionośny pocisk, a ich promieniotwórczość utrzymywała się jeszcze przez długi czas po opuszczeniu ciała stworzenia.\n\nDodatkowe badania nad tym fenomenem mogą ujawnić nowy element biologii kutoloidów, którego usprawnienie pozwoli opracować nową, typową dla gatunku mutację."
 crystalline_entity_UNIQUE_MUTATION_PROJECT: "Projekt mutacji - krystaliczny stwór"
 crystalline_entity_UNIQUE_MUTATION_PROJECT_DESC: "Podczas prób bojowych kilka z naszych krystalicznych stworów po zniszczeniu rozpadło się idealnie na dwoje. Obie połówki zachowały kluczowe oznaki życia i przez pewien czas nie umierały."
 tiyanki_matriarch_UNIQUE_MUTATION_PROJECT: "Projekt mutacji - $NAME_Elderly_Tiyanki$"
 tiyanki_matriarch_UNIQUE_MUTATION_PROJECT_DESC: "Genetyczny materiał, jaki pozostawiła po sobie $NAME_Elderly_Tiyanki$, zapewnił nam wyjątkowe informacje, które pozwolą nam zrealizować projekt eksperymentalnej mutacji nadający się dla każdego typu fauny kosmicznej."
 voidspawn_UNIQUE_MUTATION_PROJECT: "Projekt mutacji - pomiot próżni"
 voidspawn_UNIQUE_MUTATION_PROJECT_DESC: "Genetyczny materiał, jaki pozostawił po sobie $NAME_Voidspawn$, zapewnił nam wyjątkowe informacje, które pozwolą nam zrealizować projekt eksperymentalnej mutacji nadający się dla każdego typu fauny kosmicznej."
 unique_mutation_project_unlock_desc: "Nasz [From.GetShipCategoryName] dzięki swoim badaniom nad klonowaniem zapewnił nam genetyczny przełom. Możliwe, że uda się wykorzystać wyjątkową anatomię tego stworzenia dzięki naszej wiedzy na temat manipulacji genami, tworząc w ten sposób wyjątkowy rodzaj mutacji."
