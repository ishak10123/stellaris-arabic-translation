 concept_space_fauna_ship_component: "Komponent okrętu fauny kosmicznej"
 concept_space_fauna_ship_component_desc: "Komponenty okrętu fauny kosmicznej pozyskiwane są dzięki opracowywaniu specjalnych projektów dotyczących różnych kosmicznych istot. Związane z nimi premie są też zapewniane, gdy na stworzeniach zostaną wykorzystywane jako §Hmutacje§!. Przykładami takich komponentów są m.in.:\n- §H$SPACE_WHALE_WEAPON_1$§!\n- §H$AMOEBA_STRIKE_CRAFT$§!"
 MOD_ATTACHED_SPACE_FAUNA_COMPONENT_DAMAGE_MULT: "Uszkodzenia ['concept_space_fauna_ship_component', komponentów okrętu fauny kosmicznej]"
