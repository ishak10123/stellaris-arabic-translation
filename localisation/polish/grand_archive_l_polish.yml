 leader_trait_pirate_queen: "Piracka królowa"
 leader_trait_pirate_queen_desc: "Lata piractwa i niezwykłych wyczynów stworzyły przywódczynię, która nigdy nie kończy przygody, mając mniej niż na jej początku."
 captain_ness_leader_desc: "Świadomość pradawnej pirackiej królowej w mechanicznej formie. Rozesłała skarby na rozliczne światy."
 captain_ness_leader_catch_phrase: "Zbudujmy wspólnie nasze dziedzictwo."
