 crystallinus_diffuser_modifier: "$r_crystallinus_diffuser$: Triumf"
 r_everchanging_stone: "Dynamiczny kamień"
 r_everchanging_stone_desc: "Sztucznie stworzony klejnot, który zmienia kolor i skład chemiczny w zależności od otoczenia, w którym się znajduje. Kiedy umieści się go obok dowolnego obiektu, naśladuje elementy jego materiału i pozwala nam lepiej zrozumieć budowę molekularną danego obiektu."
 everchanging_stone_modifier: "$r_everchanging_stone$: Triumf"
 everchanging_stone_modifier_tt: "$EXHIBITION_XENO_GEOLOGY$: Każdy prezentowany ['concept_specimen'] zwiększa wydajność dwóch pozostałych kategorii o §G+$@everchanging_stone_modifier|0%$§!."
 r_pulsestone: "Pulskamień"
 r_pulsestone_desc: "Silnie radioaktywny kamień wytwarzający niebezpieczne fale siły magnetycznej. Może zrewolucjonizować nasze rozumienie manipulacji polem, ale praktycznie nie ma sposobu na zatrzymanie emitowanej przez niego energii."
 pulsestone_modifier: "$r_pulsestone$"
 mod_scientist_lifespan_add: "Długość życia naukowców"
 r_gavel_of_the_tribunal: "Młotek Trybunału"
 r_gavel_of_the_tribunal_desc: "Na trzonku tego młotka zapisano nazwiska triumwiratu pradawnych myślicieli, którzy zarządzali nieistniejącą już galaktyką. Jest za duży, aby mógł posługiwać się nim przedstawiciel naszego gatunku, ale sama jego obecność budzi szacunek."
