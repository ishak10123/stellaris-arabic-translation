 grand_archive_0_DESC: "Specjalna budowla orbitalna przeznaczona do przechowywania i prezentacji ciekawych ['concept_specimen', okazów], które zebraliśmy z całej galaktyki. Jest wśród nich §Yfauna kosmiczna§!."
 grand_archive_0_MEGASTRUCTURE_DETAILS: "§Y$grand_archive$§! chroni i prezentuje najcenniejsze artefakty, które zebraliśmy w całej galaktyce. Znajduje się tam też specjalne wiwarium do przechowywania i obserwacji §Yfauny kosmicznej§!."
