 grand_archive.10010.name: "Projekt mutacji: kosmiczna ameba - zakończony"
 grand_archive.10010.desc: "Nasz projekt eksperymentalnej mutacji §Ykosmicznych ameb§! dobiegł końca i pozwolił na wytworzenie interesujących nowych organelli. To §Y$tech_unique_mutation_space_amoeba$§!.\n\nTe symbiotyczne organizmy są w stanie wysysać energię z pobliskich obiektów i wracać do swojego gospodarza, zwiększając jego zdolności przetrwania i regeneracji."
 grand_archive.10015.name: "Projekt mutacji: tijanki - zakończony"
 grand_archive.10015.desc: "Nasz projekt eksperymentalnej mutacji §Ytijanek§! dobiegł końca i pozwolił na wprowadzenie interesujących ulepszeń: to §Y$tech_unique_mutation_tiyanki$§!.\n\nWzmocniliśmy do maksymalnego możliwego poziomu naturalne wibracje wykorzystywane przez te stworzenia do porozumiewania się w obrębie stada. Wytwarzają dzięki temu możliwe do kontrolowania pole wzmacniające tkanki pobliskich istot."
 grand_archive.10020.name: "Projekt mutacji: czerw próżniowy - zakończony"
 grand_archive.10020.desc: "Nasz projekt eksperymentalnej mutacji §Yczerwi próżniowych§! dobiegł końca i pozwolił na wprowadzenie interesujących zmian w ich cyklu reprodukcyjnym: to §Y$tech_unique_mutation_voidworm$§!.\n\nZdołaliśmy zwiększyć płodność pasożytniczych cyst, którymi stworzenia te zasypują planety gospodarzy. Zwiększa to liczbę nowych nimf."
 grand_archive.10025.name: "Projekt mutacji: kutoloid - zakończony"
 grand_archive.10025.desc: "Nasz projekt eksperymentalnej mutacji §Ykutoloidów§! dobiegł końca i dostarczył interesujących wyników: to §Y$tech_unique_mutation_cutholoid$§!.\n\nZnaleźliśmy sposób na wykorzystanie ich rozbudowanego układu trawiennego do strzelania niezwykle szybkimi i dalekosiężnymi pociskami. Niestety, ta znacząca biologiczna modyfikacja oznacza, że nie będą już w stanie połykać wrogich flot."
 grand_archive.10030.name: "Projekt mutacji: krystaliczny stwór - zakończony"
 grand_archive.10030.desc: "Nasz projekt eksperymentalnej mutacji §Ykrystalicznych stworów§! dobiegł końca i dostarczył interesujących wyników: to §Y$tech_unique_mutation_crystalline_entity$§!.\n\nModyfikacja genetyczna sprawia, że każde ze stworzeń po odniesieniu poważnych ran może rozpaść się na dwa niezależne organizmy. Powinno to zwiększyć znacząco ich możliwości bojowe."
 grand_archive.10030.a: "$FASCINATING$"
 leviathan_unique_mutation_project_unlock_name: "Projekt mutacji - [FromFromFrom.GetShipSizeName]"
 leviathan_unique_mutation_project_unlock_desc: "[FromFrom.solar_system.GetName]: [FromFromFrom.GetShipSizeName] staje się dla nas źródłem materiału genetycznego.\n\nChoć nie wiemy, w jaki sposób sklonować taką istotę, możemy mimo wszystko być w stanie pozyskać cenne informacje na temat jej wyjątkowej biologii."
 grand_archive.10055.name: "$leviathan_unique_mutation_project_unlock_name$"
 grand_archive.10055.desc: "$leviathan_unique_mutation_project_unlock_desc$"
 grand_archive.10060.name: "Projekt mutacji: matriarchini - zakończony"
 grand_archive.10060.desc: "Nasz eksperymentalny projekt mutacji z wykorzystaniem materiału genetycznego, jaki zapewniła nam $NAME_Elderly_Tiyanki$, dobiegł końca i dostarczył interesujących wyników: to §H$restorative_enzymes$§!.\n\nEnzymy naprawcze obecne w materiale genetycznym matriarchini mogą zostać odtworzone w gruczołach innych stworzeń. Przekształca to ich tkankę strukturalną w materiał regeneracyjny, co może okazać się niezwykle przydatne w ciasnych formacjach podczas eksplozji."
 grand_archive.10075.name: "$leviathan_unique_mutation_project_unlock_name$"
 grand_archive.10075.desc: "$leviathan_unique_mutation_project_unlock_desc$"
 grand_archive.10080.name: "Projekt mutacji: pomiot próżni - zakończony"
 grand_archive.10080.desc: "Nasz eksperymentalny projekt mutacji z wykorzystaniem materiału genetycznego, jaki zapewnił nam $NAME_Voidspawn$, dobiegł końca i dostarczył interesujących wyników: to §H$starborne_biology$§!.\n\nTkanka tych stworzeń reaguje silnie na światło gwiazd, a ponadto może być też wszczepiana innym organizmom. Wymaga to niewielkich ilości energii, znacząco jednak przyspiesza rozwój fauny w pobliżu najjaśniejszych gwiazd."
