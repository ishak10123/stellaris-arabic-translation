 grand_archive.2053.name: "Wytępiono czerwie próżniowe"
 grand_archive.2053.desc: "Ostatnie z układów macierzystych czerwi próżniowych zostały zniszczone, a sam gatunek wytępiony.\n\nNie musimy już się przejmować pasożytniczymi bombardowaniami."
 grand_archive.2054.name: "Zniszczono kryjówkę czerwia próżniowego"
 grand_archive.2054.desc: "Układ macierzysty czerwi próżniowych został oczyszczony.\n\nCzerwie nie mogą już tam tworzyć i wychowywać młodych."
