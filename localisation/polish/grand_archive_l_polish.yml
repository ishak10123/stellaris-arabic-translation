 grand_archive.9005.name: "Pojmano: [From.GetName]"
 grand_archive.9005.desc: "§H[fromfrom.GetClass]§! §Y[fromfrom.GetName]§! znajduje się w niewoli. Nasz wróg, [from.GetName], schwytał go podczas bitwy (w: [fromfromfrom.GetName]). Żąda teraz okupu."
 grand_archive.9005.desc.second: "Jak już informowaliśmy, nasz dowódca [fromfrom.GetName] znajduje się w niewoli. Nasz wróg, [from.GetName], gotów jest przyjąć płatność w zamian za uwolnienie pojmanej jednostki."
 grand_archive.9005.a: "Zapłaćcie okup."
 grand_archive.9005.a.tt: "[fromfrom.GetName] wróci po uwolnieniu w nasze szeregi."
 grand_archive.9005.b: "Musimy to przemyśleć."
 grand_archive.9005.c: "Nie zapłacimy."
 grand_archive.9010.name: "Skazaniec"
 grand_archive.9010.desc: "[from.GetName] nie chce zapłacić za uwolnienie jeńca, [fromfrom.GetName] pozostaje więc w naszej niewoli. Co mamy w związku z tym zrobić?"
 grand_archive.9010.a: "Publiczna egzekucja."
 grand_archive.9010.b: "Uwolnijcie jeńca - miejscem niech będzie [this.GetHomeWorldName]."
 grand_archive.9010.c: "Jeniec pozostanie w niewoli."
 MESSAGE_LEADER_CAPTURED_TITLE: "Schwytanie wrogiego dowódcy"
 MESSAGE_LEADER_CAPTURED_DESC: "Schwytaliśmy w boju wrogiego dowódcę. $COUNTRY$ już o tym wie - zażądaliśmy w zamian okupu."
 MESSAGE_LEADER_RANSOM_PAID_TITLE: "Okup zapłacony"
 MESSAGE_LEADER_RANSOM_PAID_DESC: "[this.GetName]: okup został zapłacony, [fromfrom.GetName] bezpiecznie powróci do domu."
 alert_mia_ship_stolen_title: "Przejęcie wrogiego okrętu"
 alert_mia_ship_stolen_instant: "Przejęliśmy jednostkę wroga. Jest już ona w drodze do naszej stolicy i niedługo będzie dostępna do użytku."
