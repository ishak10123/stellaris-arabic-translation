 VOIDLURE_ATTRACTED_FAUNA_TITLE: "Nowe organizmy kosmiczne"
 VOIDLURE_ATTRACTED_FAUNA_DESC: "Jedna z naszych przynęt próżniowych zwabiła faunę kosmiczną."
 NAME_Lured_Fauna: "Fauna zwabiona tymczasowo"
 wildlife_ranch: "Ranczo dzikich organizmów"
 wildlife_ranch_desc: "Rdzenne istoty są dla nas partnerami, z największą pieczołowitością chronimy ich habitat i dbamy o ich samowystarczalny rozwój."
 wildlife_ranch_2: "Bezkres natury"
 wildlife_ranch_2_desc: "Rozważne zarządzanie ekosystemem poprawia warunki bytowania rdzennych istot oraz ułatwia działalność hodowlaną."
 wildlife_ranch_3: "Centrum natury"
 wildlife_ranch_3_desc: "Ogromny obiekt, gdzie zwierzęta żyją na wolności. Mają komfortowe - wręcz luksusowe - warunki, co ma na celu maksymalizację jakości dostarczanych przez nie zasobów."
 hunting_grounds: "Tereny łowieckie"
 hunting_grounds_desc: "Kompleks szkoleniowy służący do nauki wszelkich technik polowania. Od nowoczesnej broni energetycznej, aż po narzędzia z tradycyjnych materiałów - pokonanie straszliwych drapieżników i zdobycie trofeów wymaga nadzwyczajnej zręczności oraz umiejętności."
 hunting_grounds_2: "Obszar łowiecki"
 hunting_grounds_2_desc: "Obiekt szkoleniowy i obserwacyjny zapewniający optymalne warunki do polowania na miejscową faunę. Technologia wykrywania ciepła pozwala namierzać świeże tropy zwierząt i pozyskiwać najokazalsze trofea."
 hunting_grounds_3: "Centrum łowieckie"
 hunting_grounds_3_desc: "Ogromny obszar obsługujący ekipy łowieckie działające w skali całej planety. W placówce znajduje się najnowocześniejsza broń oraz sprzęt do tropienia, a myśliwi przechodzą gruntowne szkolenie, co prowadzi do zwiększenia ilości i jakości zabijanej zdobyczy."
 wildlife_sanctuary: "Rezerwat przyrody"
 wildlife_sanctuary_desc: "Chroniony rezerwat, w którym bada się zwierzęta w ich naturalnym środowisku. Zastosowano w nim zabezpieczenia zapobiegające destabilizacji populacji oraz nadmiernemu rozprzestrzenianiu się chorób. Badanie tych istot to ważne przedsięwzięcie akademickie, a ponadto pozwala nam dowiedzieć się więcej o naszej własnej naturze."
 wildlife_sanctuary_2: "Zaawansowany rezerwat"
 wildlife_sanctuary_2_desc: "Przebywające tu stworzenia mają zapewnioną indywidualną opiekę, ich wyjątkowe potrzeby żywieniowe i medyczne są zaspokajane przy minimalnej ingerencji w ich naturalne siedliska. Wyspecjalizowane ekosystemy umożliwiają rozmnażanie oraz odbudowę populacji zagrożonych gatunków."
 wildlife_sanctuary_3: "Rezerwat centralny"
 wildlife_sanctuary_3_desc: "Przebywające tu zwierzęta są monitorowane i otrzymują opiekę dzięki pieczołowicie zaprojektowanej infrastrukturze, której istnienie jest praktycznie niezauważalne. Badacze nie mogą ingerować w naturalne zachowania badanych osobników, co gwarantuje najwyższą możliwą jakość pozyskiwanych danych badawczych."
 primal_arena: "Pierwotna arena"
 primal_arena_desc: "Koloseum, gdzie nasi najsilniejsi wojownicy toczą brutalne walki z dzikimi stworzeniami. Nie ma lepszej rozrywki niż oglądanie bohaterów triumfujących nad potwornymi bestiami albo ginących w epickich starciach."
 primal_arena_2: "Pierwotny stadion"
 primal_arena_2_desc: "Na tym ogromnym stadionie doświadczeni opiekunowie uczą stada zwierząt skoordynowanych ataków. Pogromcy zwierząt nie mogą już polegać wyłącznie na sile, aby pokonać swoje ofiary. Jeżeli chcą przetrwać, muszą przechytrzyć ich trenerów."
 primal_arena_3: "Pierwotne koloseum"
 primal_arena_3_desc: "Zapierająca dech w piersiach arena, na której odbywają się monumentalne bitwy ze zwierzętami. Każde starcie jest przygotowywane przez wiele tygodni, a widownia może liczyć miliony uczestników."
 symbiosis_nexus: "Ośrodek symbiozy"
 symbiosis_nexus_desc: "Rezerwat natury, w którym dzicy partnerzy są przyjmowani do naszej społeczności. Każda istota może wnieść coś wyjątkowego do plecionki umysłu."
 symbiosis_nexus_2: "Bezkres symbiozy"
 symbiosis_nexus_2_desc: "Rezerwat centralny, który grupuje dzikich partnerów w samowystarczalne stada. Koordynowanie ich słabych zdolności umysłowych gwarantuje stabilność myśli wielkiej plecionki umysłu."
 symbiosis_nexus_3: "Węzeł symbiozy"
 symbiosis_nexus_3_desc: "Drogi obiekt łączący umysły wszystkich istot, by zasilały nasze zbiorowe myślenie."
 edict_space_fauna_exhibition: "Wystawa fauny kosmicznej"
 space_fauna_exhibition: "$edict_space_fauna_exhibition$"
 edict_space_fauna_exhibition_desc: "Ranczerzy z całej galaktyki prezentują swoje cenne bydło i współzawodniczą w prestiżowym konkursie o laur wystawy."
 edict_beasts_burden: "Zwierzęta pociągowe"
 beasts_burden: "$edict_beasts_burden$"
 edict_beasts_burden_desc: "Nasze najsilniejsze bydło powinno wykonywać najcięższe prace fizyczne."
 edict_creature_welfare: "Opieka nad stworzeniami"
 creature_welfare: "$edict_creature_welfare$"
 edict_creature_welfare_desc: "Spoczywa na nas obowiązek zapewnienia jak najlepszej jakości życia istotom, którymi się opiekujemy."
 edict_crack_the_whip: "Trzask bicza"
 crack_the_whip: "$edict_crack_the_whip$"
 edict_crack_the_whip_desc: "Niezależnie od gatunku, każdy organizm podobnie reaguje na ból. Sztuka polega na tym, aby nauczyć się go prawidłowo zadawać."
 edict_exotic_network: "Egzotyczna sieć neuronowa"
 exotic_network: "$edict_exotic_network$"
 edict_exotic_network_desc: "Umysły prymitywniejszych organizmów pod naszą kuratelą mają przepustowość, którą możemy wykorzystać do pomocy w bardziej skomplikowanych obliczeniach."
 edict_defensive_instincts: "Instynkty samozachowawcze"
 defensive_instincts: "$edict_defensive_instincts$"
 edict_defensive_instincts_desc: "Jesteśmy jednością. Niech nasze instynkty splatają się z zimnej pustce kosmosu."
 edict_biological_overdrive: "Przeciążenie biologiczne"
 biological_overdrive: "$edict_biological_overdrive$"
 edict_biological_overdrive_desc: "Dzięki zainstalowaniu odpowiednich receptorów neuronowych możemy maksymalnie wykorzystać wydajność naszych rozwiniętych istot."
 grand_archive.1060.name: "[from.GetSpaceFaunaName]: padlinożerca"
 grand_archive.1060.desc: "Po nawiązaniu kontaktu z gatunkiem [from.GetSpaceFaunaNamePlural], wykryliśmy gnijące ciało jednego z osobników w układzie [fromfrom.GetName]. Szczątki są wysuszone i zamarznięte na skutek długiego przebywania w otwartej przestrzeni kosmicznej.\n\nPodejrzewamy, że to te zwłoki zwabiły innych przedstawicieli tego gatunku. Może szukali zaginionego towarzysza. To rzadka okazja, aby zbadać biologię okazu gatunku [from.GetSpaceFaunaName], który zmarł w próżni z przyczyn naturalnych."
 TIYANKI_GROUP_NAME: "stado"
 SPACE_AMOEBA_GROUP_NAME: "sfora"
 CRYSTAL_GROUP_NAME: "zgrupowanie"
 VOIDWORM_GROUP_NAME: "miot"
 CUTHOLOID_GROUP_NAME: "gromada"
 voidworm_carcass_01_object: "Szczątki czerwia próżniowego"
 carcass_01_object: "Zwłoki fauny kosmicznej"
 CARRION_DEBRIS_PROJECT: "[met_critter.GetSpaceFaunaName]: sekcja zwłok"
 CARRION_DEBRIS_PROJECT_DESC: "Ciało przedstawiciela gatunku [met_critter.GetSpaceFaunaName] zostało znalezione w układzie [contact_system.GetName]. Zbadanie tych szczątków w naturalnych warunkach poszerzy naszą wiedzę o tych kosmicznych stworzeniach."
 grand_archive.1065.name: "Sekcja zwłok ukończona"
 grand_archive.1065.desc: "Zakończyła się sekcja zwłok przedstawiciela gatunku [met_critter.GetSpaceFaunaName] w układzie [contact_system.GetName]. Pozyskaliśmy ze szczątków dobrze zachowane próbki biologiczne, które pozwolą nam dokładniej poznać fizjologię tych organizmów."
 grand_archive.1065.specimen_tt: "Fauna: §Mepicki§! ['concept_specimen']"
 NAME_BoneShip: "Kościany statek"
 NAME_BoneShip_desc: "Statek jest ozdobiony mackami dojrzałych tijanek, rzędami zębów czerwi próżniowych oraz czaszką istoty, jakiej jeszcze nigdy nie widzieliśmy. Jednostka jest najeżona bronią precyzyjną."
 grand_archive.1069.name: "$NAME_BoneShip$"
 grand_archive.1069.desc: "W układzie [from.GetName] skontaktował się z nami dziwnie zmodyfikowany statek. $NAME_BoneShip_desc$\n\nPilot okazał się na tyle naiwny, że przyjął nasze zaproszenie do rozmów, po czym został [GetExecuted]. Przejęliśmy tę niecodzienną jednostkę i wdrożyliśmy ją do służby w naszych siłach zbrojnych. Wśród rzeczy pilota znaleźliśmy przydatny poradnik myśliwego."
 grand_archive.1069.a: "To cenny dar."
 EXECUTED: "stracony"
 DEVOURED: "pożarty"
 grand_archive.1070.name: "$NAME_BoneShip$"
 grand_archive.1070.desc: "W układzie [from.GetName] skontaktował się z nami dziwnie zmodyfikowany statek kosmiczny. $NAME_BoneShip_desc$\n\nWywołuje nas na wszystkich częstotliwościach."
 grand_archive.1070.a: "Nawiąż komunikację."
 NAME_PrimalHunter: "Ceriz t'Xal"
 primal_hunter_desc: "Doświadczony myśliwy, który przemierza galaktykę w poszukiwaniu wielkiej zdobyczy."
 primal_hunter_catchphrase: "§L\"Szukam kolejnego trofeum do kolekcji\".§!"
 grand_archive.1075.name: "$grand_archive.1070.name$"
 grand_archive.1075.desc: "§HPonury głos Ceriza jest suchy i łamiący się, jakby nie odzywał się od wielu tygodni. Zachowuje się bezpośrednio, utrzymuje niewzruszony kontakt wzrokowy, co wzbudza jednocześnie szacunek i niepokój.§!\n\nJestem łowcą trofeów, więc trudno mi zaimponować. Wam się to udało.\n\nChętnie dołączę do waszych wypraw łowieckich. Współdziałając, wiele się nauczymy i będziemy skuteczniejsi."
 grand_archive.1075.a: "Kim jesteś?"
 grand_archive.1075.a.reply: "Jestem $NAME_PrimalHunter$. Od wielu lat poluję w tych układach. Szukam nowej zdobyczy, a wy chyba jesteście sprawnymi tropicielami.\n\nPragnę tylko jednego: emocji polowania."
 grand_archive.1075.b: "Co to za czaszka na twoim statku?"
 grand_archive.1075.b.reply: "Należała od ostatniego przedstawiciela tego gatunku. To była trudna walka."
 grand_archive.1075.c: "Od jak dawna nas obserwujesz?"
 grand_archive.1075.c.reply: "To oczywiste, że musicie się jeszcze wiele nauczyć.\n\nDobry myśliwy może niezauważenie tropić zdobycz tak długo, jak trzeba. Żeby być naprawdę zabójczo skutecznym, trzeba pozostać niewidocznym aż do chwili oddania strzału. Nieważne, ile czasu spędziłem w mroku, liczy się chwila, w której postanowiłem się ujawnić."
 grand_archive.1075.d: "Dlaczego chcesz się do nas przyłączyć?"
 grand_archive.1075.d.reply: "Nie interesuje mnie współzawodnictwo w terenie. Chociaż niechętnie dzielę się terytorium, wolałbym współpracować z waszymi myśliwymi niż walczyć o tę samą zdobycz.\n\nZabiję wszystko, co wytropicie."
 grand_archive.1075.hire: "Zwerbuj"
 grand_archive.1075.hire_tt: "§Y$NAME_PrimalHunter$§! dołącza do naszego imperium jako §Hprzywódca§!."
 grand_archive.1075.dismiss: "Zwolnij"
 grand_archive.1080.name: "Wędrowna ksenolożka"
 grand_archive.1080.desc: "Z naszą bazą gwiezdną w układzie [from.GetName] skontaktowała się niezależna jednostka badawcza, wyposażona w szeroki wachlarz urządzeń chwytających oraz narzędzi analitycznych. Statek ten przygotowano z myślą o łapaniu i badaniu stworzeń żyjących w przestrzeni kosmicznej.\n\nWywołuje nas na wszystkich częstotliwościach."
 grand_archive.1080.a: "Nawiąż komunikację."
 NAME_PrimalRancher: "Ruuk Qabruuk"
 primal_rancher_desc: "Ksenolożka uwielbiająca pracę w terenie, badała rozmaite zwierzęta żyjące w kosmosie."
 primal_rancher_catchphrase: "§L\"Każda istota może opowiedzieć jakąś historię, a ja jestem uważną słuchaczką!\"§!"
 grand_archive.1085.desc: "§HRuuk jest dociekliwa i analityczna, nieustannie spogląda na małe, ręczne urządzenie. Zdaje się, że robiła notatki, nawet kiedy się z nami witała. Mimo to zachowuje się uprzejmie oraz profesjonalnie, a jednocześnie zachowuje dystans.§!\n\nWidzę, że nie tylko ja interesuję się stworzeniami żyjącymi w kosmosie. Przejrzałam wyniki badań, które prowadzi [root.GetName] i okazały się one bardzo pouczające. Chętnie pomogę wam kontynuować te działania, pracując w waszym wydziale naukowym. Oczywiście, jeśli mnie przyjmiecie."
 grand_archive.1085.a: "Kim jesteś?"
 grand_archive.1085.a.reply: "Przepraszam, rozpędziłam się.\n\nNazywam się Ruuk. Jestem badaczką, moja specjalność to badania fauny kosmicznej. Razem z moim zespołem gromadzę dane o szlakach migracyjnych, budowie ciała oraz bioróżnorodności na poziomie galaktyki.\n\nOd najmłodszych lat kocham zwierzęta. Nigdzie się nie ruszam bez Fuluffa."
 grand_archive.1085.b: "Kim jest Fuluff?"
 grand_archive.1085.b.reply: "To moje ulubione stworzenie w galaktyce!\n\nPokazałabym go na ekranie, ale właśnie śpi. Na mojej ojczystej planecie hodujemy ten gatunek jako zwierzęta domowe. Zaadoptowałam go, kiedy byłam tam ostatnio. Jest przeuroczy, dźwięk jego malutkich kopytek uderzających o metalową podłogę, to jak skubie moje pióra, kępek wełny między jego oczkami. Na pewno też podbije wasze serca, gdy... jeśli zaczniemy współpracować."
 grand_archive.1085.c: "Jak nas znalazłaś?"
 grand_archive.1085.c.reply: "Jeden z tropionych przez nas okazów dziwnie się zachowywał, więc ruszyliśmy jego tropem. Tak natknęliśmy się na wasz zespół naukowy kontaktujący się z naszym obiektem. Troska z jaką podchodziliście do tej istoty wskazuje, że naprawdę szanujecie kosmiczne życie, a to zachęciło mnie do zapoznania się z waszymi badaniami, które zrobiły na mnie jeszcze większe wrażenie. Nieustannie szukam profesjonalistów, którzy myślą podobnie jak ja."
 grand_archive.1085.d: "Dlaczego chcesz się do nas przyłączyć?"
 grand_archive.1085.d.reply: "Szczerze mówiąc, niezależne badania naukowe to niestabilne źródło dochodu. Wierzę w moją pracę, ale nieustanne zajmowanie się poszukiwaniem finansowania pochłania za dużo czasu, który mogłabym poświęcić nauce.\n\nJeśli [root.GetName] i ja połączymy siły, będę mogła przeznaczyć wszystkie moje siły na to, co robię najlepiej: na badania kosmicznego życia. Miałabym dostęp do większych zasobów i mogła współpracować z waszym zespołem naukowym, aby realizować nasze wspólne cele."
 grand_archive.1085.hire: "Zwerbuj"
 grand_archive.1085.hire_tt: "§Y$NAME_PrimalRancher$§! dołącza do naszego imperium jako §Hprzywódca§!."
 grand_archive.1085.dismiss: "Zwolnij"
 grand_archive.1100.name: "Zwierzęcy pisk"
 grand_archive.1100.desc: "Wykryliśmy ogromne natężenie dziwnych fal elektromagnetycznych napływających z nieznanej nam części kosmosu.\n\nPoczątkowa analiza wykazała podobieństwo do sygnałów, którymi porozumiewają się §Yczerwie próżniowe§!, są one jednak bardziej nieregularne oraz mają znacznie większą amplitudę. Będziemy dokładniej badać to zjawisko."
 grand_archive.1100.a: "To niepokojące."
 grand_archive.1105.name: "Piszczące czerwie próżniowe"
 grand_archive.1105.desc: "Wykryliśmy źródło tych zwierzęcych pisków. To ukryty układ zamieszkany przez §Yczerwie próżniowe§! w pobliżu układu [frenzied_voidworms_target.solar_system.GetName].\n\nCzerwie próżniowe w tym rejonie nie przypominają tych, które wcześniej napotkaliśmy. Te istoty są zmutowane, nie tworzą trójek, a pojedyncze dorosłe osobniki zajmują się czymś, co można nazwać jedynie brutalnym szałem godowym.\n\nTo niepokojące: takie niepasożytnicze zachowanie oznacza, że ten rój może rozmnażać się niezależnie i nie potrzebuje do tego gospodarzy znajdujących się na powierzchni planety."
 grand_archive.1105.desc_no_homicidal: "\nGdyby pozwolić tej odmianie na swobodne rozprzestrzenianie, mogłaby zachwiać równowagą całego ekosystemu galaktycznego. Obserwując rosnącą agresję tych stworzeń, uważamy, że przygotowują się do ataku, którego celem będzie [frenzied_voidworms_target.GetName]."
 grand_archive.1105.desc_2: "\nMusimy przygotować naszą obronę."
 grand_archive.1105.a: "Czerwony alarm!"
 situation_frenzied_voidworms: "Rozjuszone czerwie próżniowe"
 situation_frenzied_voidworms_type: "$situation_frenzied_voidworms$"
 situation_frenzied_voidworms_desc: "Odkryliśmy duży rój mocno zmutowanych czerwi próżniowych. Są bardziej agresywne i prawdopodobnie potrafią rozmnażać się w sposób niepasożytniczy.\n\nNasza obecność chyba niepokoi ich gniazda. Musimy zachować ostrożność.\n\n[GetVoidwormsHostility]"
 situation_frenzied_voidworms_monthly_change_tooltip: "$situation_monthly_change_tooltip_approaches_dependent$"
 finisher_effects_frenzied_voidworms: "Agresywne czerwie próżniowe mogą zaatakować naszą stolicę."
 approach_frenzied_voidworms_do_nothing: "Nic nie róbmy"
 approach_frenzied_voidworms_do_nothing_tt: "Nie podejmiemy żadnych szczególnych kroków."
 approach_frenzied_voidworms_hide_presence: "Nie ujawniajmy naszej obecności"
 approach_frenzied_voidworms_hide_presence_tt: "Wszystkie prace budowlane w naszym układzie znajdującym się najbliżej ich układu macierzystego zostały wstrzymane."
 approach_frenzied_voidworms_stir_nests: "Potrząśnijmy gniazdami"
 approach_frenzied_voidworms_stir_nests_tt: "Sprowokowanie tych stworzeń zwiększy ich agresję wobec nas."
 approach_frenzied_voidworms_feed_nests: "Nakarmmy gniazda"
 approach_frenzied_voidworms_feed_nests_tt: "Jeśli dostatecznie obniżymy ich agresję, być może zyskamy ich zaufanie."
 #Strings for GetVoidwormsHostility trigger loc script
 voidworms_hostility_hostile: "Zmutowane czerwie próżniowe wyglądają na §Pbardzo agresywne§!."
 voidworms_hostility_neutral: "Zmutowane czerwie próżniowe wyglądają na §Sagresywne§!."
 voidworms_hostility_pacified: "Zmutowane czerwie próżniowe wyglądają na §Bspokojne§!."
 hide_presence_modifier: "$approach_frenzied_voidworms_hide_presence$"
 hide_presence_starbase_modifier: "$approach_frenzied_voidworms_hide_presence$"
 frenzied_voidworms_killed.desc.common: "Największe gniazdo tych dziwnych mutantów ocalało. Mając nad nim kontrolę, możemy stworzyć więcej tych wyjątkowych stworzeń, nie ryzykując ich nieograniczonego rozprzestrzeniania się w galaktyce."
 grand_archive.1165.name: "Zmutowane czerwie próżniowe zostały zniszczone"
 grand_archive.1165.desc.common: "Nie zamierzając czekać na ich nieuchronny atak, rozpoczęliśmy udaną kampanię militarną przeciwko zmutowanym czerwiom próżniowym w ich układzie macierzystym. Zagrożenie ze strony tych istot nie będzie dłużej wisiało nad układem [frenzied_voidworms_target.GetName] i nie osłabi bezpieczeństwa naszej planety."
 grand_archive.1165.desc.default: "Zabezpieczono $grand_archive.1165.desc.common$ i galaktyczny ekosystem.\n\n$frenzied_voidworms_killed.desc.common$"
 grand_archive.1165.desc.homicidal: "Zabezpieczono $grand_archive.1165.desc.common$.\n\n$frenzied_voidworms_killed.desc.common$"
 grand_archive.1165.a: "Zwycięstwo."
 grand_archive.1170.name: "Zmutowane czerwie próżniowe zostały zlikwidowane"
 grand_archive.1170.desc.common: "Zmutowane czerwie próżniowe zostały zlikwidowane. Zagrożenie ze strony tych istot nie będzie dłużej wisiało nad układem [frenzied_voidworms_target.GetName] i nie osłabi bezpieczeństwa naszej planety."
 grand_archive.1170.desc.default: "Zabezpieczono $grand_archive.1170.desc.common$ i galaktyczny ekosystem.\n\n$frenzied_voidworms_killed.desc.common$"
 grand_archive.1170.desc.homicidal: "Zabezpieczono $grand_archive.1170.desc.common$.\n\n$frenzied_voidworms_killed.desc.common$"
 grand_archive.1170.a: "$grand_archive.1165.a$"
 grand_archive.1180.name: "Znaleziono zmutowane czerwie próżniowe"
 grand_archive.1180.desc: "Po zlikwidowaniu zgrupowania czerwi próżniowych w pobliżu ich gniazd odkryliśmy, że te istoty przeszły wyjątkową mutację.\n\nWygląda na to, że mogły rozmnażać się w sposób niepasożytniczy i miały podwyższony poziom agresji, co tłumaczyłoby ich nadnaturalną wytrzymałość i siłę.\n\nNa szczęście zachowaliśmy jedno z ich gniazd jako trofeum. Mając nad nim kontrolę, możemy stworzyć więcej tych wyjątkowych stworzeń, nie ryzykując ich nieograniczonego rozprzestrzeniania się w galaktyce."
 grand_archive.1180.a: "To zaskakujące, ale mile widziane."
 grand_archive.1185.name: "Eksterminowano czerwie próżniowe"
 grand_archive.1185.desc: "Ustaliliśmy, że zmutowane czerwie próżniowe zagrażające naszej kolonii zostały zlikwidowane.\n\nTo nieoczekiwane, ale mile widziane zakończenie. Możemy czerpać pocieszenie z faktu, że te stworzenia nie zagrażają już naszym światom."
 grand_archive.1185.a: "Galaktyka jest bezpieczniejsza."
 grand_archive.1200.name: "Atak czerwi próżniowych"
 grand_archive.1200.desc: "Rozjuszone czerwie próżniowe zaatakowały układ [frenzied_voidworms_target.solar_system.GetName]!\n\nIch agresja sięga zenitu, a główny rój zmierza właśnie wprost ku układowi [frenzied_voidworms_target.GetName].\n\nNie wydaje nam się, aby zamierzały oszczędzić kogokolwiek."
 grand_archive.1200.a: "Przygotować naszą obronę."
 grand_archive.1205.name: "Najwyższa cena"
 grand_archive.1205.desc_common: "Mimo naszych usilnych starań, zmutowane czerwie próżniowe całkowicie opanowały układ [this.GetName]. Rozjuszone stworzenia przeprowadziły tak gwałtowne bombardowanie, że pękł rdzeń planety, co spowodowało, że się rozpadła. Nikt nie ocalał.\n\nNastępnie istoty te wróciły do swoich gniazd, a nasza obecność już ich nie irytuje. Jeśli dobrze pójdzie, już tam zostaną."
 grand_archive.1205.desc.default: "$grand_archive.1205.desc_common$\n\nW obliczu tej tragedii nie pozostaje nam nic innego, jak żyć dalej i uczyć się na własnych błędach."
 grand_archive.1205.desc.gestalt: "$grand_archive.1205.desc_common$\n\nUtrata głównego roju to cios dla imperium [event_target:victim_country.GetName], ale musimy żyć dalej."
 grand_archive.1205.a: "Pora na odbudowę."
 grand_archive.1210.name: "Zmutowane czerwie próżniowe zostały zlikwidowane"
 grand_archive.1210.desc: "Zmutowane czerwie próżniowe znalezione w układzie [From.GetName] zostały zlikwidowane. Zniszczenie świata [avenged_homeworld.GetName] zostało pomszczone.\n\nNajwiększe gniazdo tych dziwnych mutantów ocalało. Mając nad nim kontrolę, możemy stworzyć więcej tych wyjątkowych stworzeń, nie ryzykując ich nieograniczonego rozprzestrzeniania się w galaktyce.\n\nDzięki temu przetrwa dziedzictwo świata, który utraciliśmy."
 grand_archive.1210.a: "$grand_archive.1165.a$"
 grand_archive.1220.name: "Spacyfikowano czerwie próżniowe"
 grand_archive.1220.desc.common: "Po dostarczeniu znacznej ilości składników mineralnych bezpośrednio do gniazd zmutowanych czerwi próżniowych w układzie [frenzied_home_system.GetName] zdołaliśmy zbudować więź z tymi istotami. Zagrożenie ze strony tych istot nie będzie dłużej wisiało nad układem [frenzied_voidworms_target.GetName]. Bezpieczeństwo naszej planety zostało zapewnione."
 grand_archive.1220.desc.common_2: "Nasi najbardziej doświadczeni treserzy zwierząt ciężko pracowali nad ujarzmieniem tych stworzeń, teraz wreszcie zrodziła się między nimi prawdziwa współpraca.\n\nPrzejęliśmy jedno z ich największych gniazd. Dzięki temu możemy hodować więcej tych zmutowanych czerwi próżniowych, które bez tego mieszkałyby w dziczy."
 grand_archive.1220.desc.default: "Zabezpieczono $grand_archive.1220.desc.common$ i galaktyczny ekosystem.\n\n$grand_archive.1220.desc.common_2$"
 grand_archive.1220.desc.homicidal: "Zabezpieczono $grand_archive.1220.desc.common$.\n\n$grand_archive.1220.desc.common_2$"
 grand_archive.1220.a: "To dobry dodatek dla naszych flot."
 grand_archive.1220.tt: "Wszystkie floty rozjuszonych czerwi próżniowych przechodzą pod kontrolę twojego imperium."
 grand_archive.7010.name: "Opracowano próżniowe przynęty"
 grand_archive.7010.desc.common: "Nasza wiedza o organizmach kosmicznych umożliwiła opracowanie czegoś, co nazywamy §Ypróżniowymi przynętami§!."
 grand_archive.7010.desc: "$grand_archive.7010.desc.common$\n\nTe struktury bazy gwiezdnej należy budować w układach macierzystych każdego z rodzajów fauny kosmicznej. Kiedy już powstaną, będą czasami wabić floty stworzeń do naszej bazy gwiezdnej.\n\nPowinniśmy uważać, ponieważ niektóre z tych istot mogą okazać się agresywne."
 grand_archive.7010.desc.primal_calling: "$grand_archive.7010.desc.common$\n\nTe urządzenia wysyłają sygnały ku dzikim zakątkom kosmosu i wabią organizmy zamieszkujące próżnię. Nie wiemy dokładnie, co zostanie przywołane, ale nasze obecne częstotliwości nadawania spotykają się z regularnymi, lustrzanymi odpowiedziami.\n\nCoś zmierza w naszą stronę."
 grand_archive.7020.name: "Wielorybi śpiew"
 grand_archive.7020.desc: "Opracowana przez nas wcześniej §Ypróżniowa przynęta§! zwabiła grupę kosmicznych wielorybów, które pochodzą z układów z §Ygazowymi olbrzymami§!, przypominających układ [This.Capital.System.GetName].\n\nWygląda na to, że aby nasze urządzenia działały poprawnie, musimy budować je w tych układach. Jeżeli natrafimy na inne okazy dzikiej fauny, prawdopodobnie będziemy w stanie zbudować próżniowe przynęty także w pobliżu ich naturalnych habitatów."
 ### Treasure Hunters
 origin_treasure_hunters: "Łowcy skarbów"
 origin_treasure_hunters_desc: "Ta cywilizacja poczuła zew przygody i jest gotowa wyruszyć na swoją największą, najtrudniejszą ekspedycję. Jej przedstawiciele mają tylko tajemniczą mapę i pędzą właśnie poprzez gwiazdy, aby zdobyć legendarny skarb piratów."
 origin_tooltip_treasure_hunters_effects: "- Gwiazdy, koło których znajduje się nieaktywna ['r_celestial_chart_0_desc', $celestial_chart$]\n- Każdy zwerbowany przywódca ma dodatkową cechę ['concept_adventurous_spirit_trait']$NEW_LINE$- Cechy władcy:$TABBED_NEW_LINE$- ['leader_trait:leader_trait_buccaneer']$TABBED_NEW_LINE$- ['leader_trait:leader_trait_trailblazer']$TABBED_NEW_LINE$- ['leader_trait:leader_trait_treasure_hoarder']"
 START_SCREEN_TREASURE_HUNTERS: "Naszą cywilizację napędza zew przygody.\n\nOdnajdowanie dawno zaginionych skarbów, eksploracja prastarych ruin, wykopywanie artefaktów z dawno minionych epok; takie wydarzenia są sławione w naszych najwspanialszych opowieściach, które od pokoleń stanowią inspirację dla naszego społeczeństwa.\n\nZatem czy to przypadek, czy przeznaczenie, że nasza pierwsza wyprawa kosmiczna zrodziła zew przygody? Na orbicie naszej planety została odkryta tajemnicza kapsuła nieznanego pochodzenia. Zawierała zaszyfrowaną mapę gwiezdną.\n\nPo latach ciężkiej pracy wreszcie posiedliśmy technologię mogącą odczytać tę mapę i wyznaczyć kurs w nieznane. Gdy wyruszamy ku galaktycznemu pograniczu, jednoczy nas chęć przeżycia największej i najbardziej wymagającej przygody w naszej historii."
 d_treasure_planet: "Skarbiec"
 d_treasure_planet_desc: "Bezpieczny magazyn, w którym można przechowywać, organizować i odnawiać kosztowności."
 concept_treasure_vault: "$d_treasure_planet$"
 concept_treasure_vault_desc: "$d_treasure_planet_desc$"
 job_treasure_gatherer: "Kustosz skarbca"
 job_treasure_gatherer_plural: "Kustosze skarbca"
 job_treasure_gatherer_desc: "Wyszkoleni do wyceniania wszelkich rzadkich i cennych towarów, potrafią uzyskać najwyższą możliwą cenę za skarby znajdowane w całej galaktyce."
 mod_job_treasure_gatherer_add: "$job_treasure_gatherer_plural$"
 mod_job_treasure_gatherer_per_pop: "§G+1§! miejsce pracy ($job_treasure_gatherer$) na $VALUE$ popul."
 mod_job_treasure_gatherer_per_pop_short: "\n§G+1§! $job_treasure_gatherer$ na $VALUE$ £pop£"
 job_treasure_gatherer_gestalt: "Dron skarbnik"
 job_treasure_gatherer_gestalt_plural: "Drony skarbnicy"
 job_treasure_gatherer_gestalt_desc: "Są w stanie wycenić wszelkie rzadkie i cenne towary i uzyskać największą możliwą użyteczność skarbów znajdowanych w całej galaktyce."
 mod_job_treasure_gatherer_gestalt_add: "$job_treasure_gatherer_gestalt_plural$"
 mod_job_treasure_gatherer_gestalt_per_pop: "§G+1§! miejsce pracy ($job_treasure_gatherer_gestalt$) na $VALUE$ popul."
 mod_job_treasure_gatherer_gestalt_per_pop_short: "\n§G+1§! $job_treasure_gatherer_gestalt$ na $VALUE$ £pop£"
 planet_treasure_gatherers: "$job_treasure_gatherer_plural$"
 mod_planet_treasure_gatherers_produces_mult: "Produkcja: £job_treasure_gatherer£ $planet_treasure_gatherers$"
 grand_archive.5015.name: "Założenie skarbca"
 grand_archive.5015.desc: "§Y$celestial_chart$§! dostarczyła nam archiwalnych wycen, które pozwolą uzyskać wyższe ceny za odkryte przez nas skarby. Powinniśmy zbudować §Yskarbiec§! na jednej z naszych planet, moglibyśmy przechowywać w nim cenne drobiazgi, a także odnawiać je i chronić. Patrząc na nasze obecne możliwości logistyczne, nową budowlę można wznieść na następujących planetach."
 grand_archive.5015.a: "$d_treasure_planet$ powstanie na świecie §Y[event_target:treasure_planet_candidate_1.GetName]§!."
 grand_archive.5015.b: "$d_treasure_planet$ powstanie na świecie §Y[event_target:treasure_planet_candidate_2.GetName]§!."
 grand_archive.5015.c: "$d_treasure_planet$ powstanie na świecie §Y[event_target:treasure_planet_candidate_3.GetName]§!."
