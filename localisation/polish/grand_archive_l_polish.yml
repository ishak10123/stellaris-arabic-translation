 #Homicidal considerations #
 #Fanatic Purifiers
 grand_archive.4135.name: "Drobiazgi od słabszych istot"
 grand_archive.4135.desc: "W miarę jak działamy na rzecz oczyszczenia tego świata z ohydnego ksenościerwa, powiększa się nasza kolekcja trofeów ([GetCollectionRewardCategory]).\n\nNiech te wystawy pokazują trupa skażonej galaktyki i dają nam siłę do realizacji naszej misji."
 grand_archive.4135.desc.geology: "$grand_archive.4135.desc$"
 grand_archive.4135.desc.aesthetic: "$grand_archive.4135.desc$"
 grand_archive.4135.a: "Niech żyje [this.GetName]!"
 grand_archive.4140.name: "Zgromadzone ozdoby"
 grand_archive.4140.desc.geology: "Nadal gromadzimy przedmioty ([GetCollectionRewardCategory]), ozdoby i drobiazgi z tej ohydnej galaktyki.\n\nPoświęćmy chwilę na podziwianie naszych trofeów, ale pamiętajmy, że możemy zdobyć ich tu jeszcze więcej."
 grand_archive.4140.desc.aesthetic: "Nadal gromadzimy drobiazgi ([GetCollectionRewardCategory]), pozostałości po skażeniu rozsiewanemu przez mniej rozwinięte organizmy.\n\nKiedy wytępimy wszystkich obcych pośród gwiazd, te przedmioty będą przypominały nam o ich podrzędnej naturze."
 grand_archive.4140.a: "Tę galaktykę trzeba oczyścić."
 grand_archive.4145.name: "Gablota z trofeami zapełniona"
 grand_archive.4145.desc.geology: "Zapełniliśmy nasze magazyny przedmiotami ([GetCollectionRewardCategory]), które dawniej współtworzyły ciało galaktyki.\n\nUważamy tę wielką kolekcję za kronikę zniszczenia przez nas tego ciała. Oglądajmy nasze triumfy."
 grand_archive.4145.desc.aesthetic: "Zapełniliśmy nasze magazyny osobliwościami ([GetCollectionRewardCategory]), to mnóstwo bezsensownych ozdób stworzonych przez obcych.\n\nPatrzymy na tę ogromną kolekcję i bawi nas żałosna natura istot gorszych od nas. Kiedy wszystkie zostaną wytępione, zostaną po nich tylko te gabloty."
 grand_archive.4145.a: "Toast za śmierć!"
 #Devouring Swarm
 grand_archive.4136.name: "Pożywne ozdoby"
 grand_archive.4136.desc: "Głód nie słabnie. Nasza kolekcja osobliwości ([GetCollectionRewardCategory]) rozrosła się w trakcie naszej kampanii konsumpcji.\n\nNiech te wystawy będą ostatnimi wspomnieniami o galaktyce, którą pożarliśmy."
 grand_archive.4136.desc.geology: "$grand_archive.4136.desc$"
 grand_archive.4136.desc.aesthetic: "$grand_archive.4136.desc$"
 grand_archive.4136.a: "Nieustanny głód."
 grand_archive.4141.name: "$grand_archive.4136.name$"
 grand_archive.4141.desc.common: "Podczas ucztowania te przedmioty będą nam przypominać niezliczone potrawy, które zjedliśmy."
 grand_archive.4141.desc.geology: "Nadal gromadzimy okazy ([GetCollectionRewardCategory]), pradawne elementy ciała tej galaktyki.\n\n$grand_archive.4141.desc.common$"
 grand_archive.4141.desc.aesthetic: "Nadal gromadzimy drobiazgi ([GetCollectionRewardCategory]), osobliwości, cenione niegdyś przez gorsze formy życia.\n\n$grand_archive.4141.desc.common$"
 grand_archive.4141.a: "Uczta trwa."
 grand_archive.4146.name: "Wspomnienia naszego posiłku"
 grand_archive.4146.desc: "W trakcie ucztowania w tej galaktyce zapełniliśmy magazyny różnymi osobliwościami ([GetCollectionRewardCategory]).\n\nTa ogromna kolekcja ma nam tylko przypominać o głodzie, którego nie sposób zaspokoić. Kiedy cała galaktyka zostanie pożarta, będziemy spoglądać na te przedmioty i wspominać związane z nimi smaki."
 grand_archive.4146.desc.geology: "$grand_archive.4146.desc$"
 grand_archive.4146.desc.aesthetic: "$grand_archive.4146.desc$"
 grand_archive.4146.a: "Pyszne."
 #Determined Exterminators
 grand_archive.4137.name: "Drobiazgi o zauważalnej wartości"
 grand_archive.4137.desc: "Zebraliśmy wiele przedmiotów ([GetCollectionRewardCategory]), które według istot organicznych mają jakąś wartość jako wyjątkowe artefakty.\n\nPod naszym nadzorem te przedmioty przetrwają dłużej niż życie organiczne, które zostanie wytępione w tej galaktyce."
 grand_archive.4137.desc.geology: "$grand_archive.4137.desc$"
 grand_archive.4137.desc.aesthetic: "$grand_archive.4137.desc$"
 grand_archive.4137.a: "Niegroźne kurioza."
 grand_archive.4142.name: "Zgromadzone kurioza"
 grand_archive.4142.desc: "Nadal gromadzimy trofea ([GetCollectionRewardCategory]) pozyskiwane w trakcie usuwania z tej galaktyki zarazy życia organicznego.\n\nTe przedmioty będą nam przypominać o braku logiki u organizmów żywych i przydadzą się do opracowania nowych protokołów eksterminacyjnych."
 grand_archive.4142.desc.geology: "$grand_archive.4142.desc$"
 grand_archive.4142.desc.aesthetic: "$grand_archive.4142.desc$"
 grand_archive.4142.a: "Zmodyfikowano protokoły."
 grand_archive.4147.name: "Zapełniono przestrzeń pamięci"
 grand_archive.4147.desc: "Oczyszczając tę galaktykę, zapełniliśmy nasze banki pamięci przydzielone do okazów [GetCollectionRewardCategory].\n\nTa kolekcja dostarcza danych o tym, co jest ważne dla istot organicznych. Posłuży to ich dalszej eksterminacji i stanie się punktem zwrotnym w historii tej zainfekowanej galaktyki."
 grand_archive.4147.desc.geology: "$grand_archive.4147.desc$"
 grand_archive.4147.desc.aesthetic: "$grand_archive.4147.desc$"
 grand_archive.4147.a: "Fanaberie życia organicznego."
