 CAPTURE_CHANCE: "Szansa udanego schwytania: $VALUE|Y%0$"
 CAPTURE_AMOUNT: "Jedne §Y$gravity_snare$§! pozwalają schwytać nie więcej niż konkretną liczbę okazów ($VALUE|0G$) §Yfauny kosmicznej§! naraz."
 CAPTURE_AMOUNT_FULL_FLEET: "Jedne §Y$gravity_snare$§! pozwalają schwytać całą flotę §Yfauny kosmicznej§!."
 GRAVITY_SNARE_1: "$gravity_snare$"
 GRAVITY_SNARE_STANDARD: "$gravity_snare$"
 GRAVITY_SNARE_STANDARD_TOOLTIP: "Sidła grawitacyjne wywołują miejscowe skoki grawitacji kwantowej, które uniemożliwiają ucieczkę wszystkim obiektom nieposiadającym hipernapędu. Te siły można podtrzymywać na tyle długo, aby schwytać §Yfaunę kosmiczną§! i dostarczyć ją do naszych układów celem dokładniejszego zbadania."
