 mineral_insight: "Wiedza o minerałach"
 void_mining: "Górnictwo w próżni"
 cultural_enrichment: "Wzbogacenie kulturowe"
 auctioneering_curation: "Organizacja aukcji"
 historical_insight: "Wiedza historyczna"
 lessons_from_the_past: "Lekcje przeszłości"
 grand_archive.4105.name: "$leviathans.500.name$"
 grand_archive.4105.desc.common.aesthetic_wonder: "[GetCuratorsDesignation] zauważyli wasze próby zgromadzenia i ochrony okazów: §Y$EXHIBITION_AESTHETIC_WONDERS$§!. Piękno istnieje w każdym zakątku galaktyki, wystarczy tylko bacznie się rozejrzeć."
 grand_archive.4105.desc.common.historical_item: "[GetCuratorsDesignation] zauważyli wasze próby zgromadzenia i ochrony okazów: §Y$EXHIBITION_GALACTIC_HISTORY$§!. Ofiarujecie nieśmiertelność tym, których przedmioty chronicie."
 grand_archive.4105.desc.common.xeno_geology: "[GetCuratorsDesignation] zauważyli wasze próby zgromadzenia i ochrony okazów: §Y$EXHIBITION_XENO_GEOLOGY$§!. Historia naszej galaktyki często skrywa się w jej skałach i kamieniach."
 grand_archive.4105.desc.1.common: "[GetStage1Description]\n\nNiech to was zachęci do kontynuowania waszego wspaniałego dzieła."
 CURATORS_STAGE_1_DESC: "Wasza początkowa kolekcja jest imponująca, chcielibyśmy zaproponować wam nasze usługi. W interesie ochrony galaktyki przyślemy specjalistę, który pomoże wam w dziedzinie, którą wskażecie."
 DEAD_CURATORS_STAGE_1_DESC: "Mimo zniszczenia naszej enklawy, nadal chcemy zaproponować wam nasze usługi w interesie ochrony galaktyki. Możemy wam pomóc w dziedzinie, którą wskażecie."
 grand_archive.4105.desc.1.xeno_geology: "$grand_archive.4105.desc.common.xeno_geology$\n\n$grand_archive.4105.desc.1.common$"
 grand_archive.4105.desc.1.aesthetic_wonder: "$grand_archive.4105.desc.common.aesthetic_wonder$\n\n$grand_archive.4105.desc.1.common$"
 grand_archive.4105.desc.1.historical_item: "$grand_archive.4105.desc.common.historical_item$\n\n$grand_archive.4105.desc.1.common$"
 grand_archive.4105.1.mineral_insight: "Pomóżcie nam w wydobyciu w naszych koloniach."
 grand_archive.4105.1.void_mining: "Pomóżcie nam w wydobyciu pośród gwiazd."
 grand_archive.4105.1.cultural_enrichment: "Pomóżcie nam dzielić się ich chwałą."
 grand_archive.4105.1.auctioneering_curation: "Pomóżcie nam znaleźć odpowiednie domy dla tych okazów."
 grand_archive.4105.1.historical_insight: "Skierujcie nasze oczy tam, gdzie możemy się czegoś nauczyć."
 grand_archive.4105.1.lessons_from_the_past: "Wspomóżcie naszych przywódców mądrością z przeszłości."
 grand_archive.4105.1.no: "Nie teraz."
