 ###################
 #Treasure Troves #
 ###################
 TREASURE_TROVE: "Skrytka skarbu"
 TREASURE_TROVE_DESC: "Dawno zaginiona §Y$TREASURE_TROVE$§! piratów została wykryta gdzieś na świecie [this.GetName]. Kto wie, jakie kryje bogactwa...?"
 treasure_troves_chain_title: "Skrytki skarbów"
 treasure_troves_chain_desc: "W całej historii galaktyki piraci ukrywali nielegalne zdobycze w dokładnie wybranych skrytkach skarbów. Wiele z nich porzucono i uznano za zaginione, ale teraz możemy je zdobyć."
 mod_treasure_trove_reward_mult: "Nagrody ze skrytki skarbu"
 grand_archive.6010.name: "Odkrycie: $TREASURE_TROVE$"
 grand_archive.6010.desc: "Wykryliśmy słaby sygnał nadawany gdzieś ze świata [event_target:treasure_trove_planet.GetName]. Przeprowadziliśmy wstępną deszyfrację i ustaliliśmy, że sygnał emituje dawno zaginiona piracka §Y$TREASURE_TROVE$§!.\n\nBędzie to wymagało pewnego wysiłku, ale na pewno zdołamy odkryć jej tajemnice."
 grand_archive.6010.a: "Ustalmy jej położenie."
 grand_archive.6015.name: "Odzyskano skarb"
 grand_archive.6015.common.1: "Po uważnym unieszkodliwieniu zabezpieczeń, za którymi znajdowała się ukryta piracka §Y$TREASURE_TROVE$§! na świecie [event_target:treasure_trove_planet.GetName]"
 grand_archive.6015.desc: "$grand_archive.6015.common.1$, odkryliśmy magazyn cennych zasobów.\n\nDobrze wykorzystamy tę niespodziewaną zdobycz."
 grand_archive.6015.desc.specimen: "$grand_archive.6015.common.1$, odkryliśmy starożytny piracki artefakt zachowany w zapieczętowanym pojemniku. Ten kawałek historii piractwa zostanie dodany do naszej kolekcji."
 grand_archive.6015.desc.specimen_extra: "Ponadto, odkryliśmy, że ogromna §Y$TREASURE_TROVE$§! skrywa starożytny piracki artefakt. Po uważnej renowacji ten kawałek historii piractwa stanie się wspaniałym dodatkiem do naszej kolekcji."
 grand_archive.6015.desc.pirate_ship: "§Y$TREASURE_TROVE$§! została uważnie otwarta, a w środku znaleźliśmy analogowe wskazówki kierujące nas na planetę poniżej. Znaleźliśmy tam niesamowity piracki pancernik chroniony przez urządzenia zagłuszające.\n\nOkręt ten, noszący nazwę [treasure_trove_pirate_ship.GetName], został przejęty przez nasze wojsko."
 grand_archive.6015.desc.tech: "$grand_archive.6015.common.1$, odkryliśmy bank danych zawierający rzadkie i cenne prace naukowe.\n\nNie wiadomo, jak się tam znalazły, ale możemy je dobrze wykorzystać."
 grand_archive.6015.a: "$GOOD$"
 treasure_trove_specimen_tt: "$t$Odzyskaj: ['concept_specimen']."
 treasure_trove_pirate_ship_tt: "$t$Odzyskaj okręt piracki."
