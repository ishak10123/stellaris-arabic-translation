 ### Primal Calling
 origin_primal_calling: "Pierwotny zew"
 origin_primal_calling_desc: "Szelest trawy. Przytłaczająca cisza nocy. Umysł myśliwego, bystry i zimny jak światło gwiazd...\n\nTa cywilizacja ma pierwotną więź z dziką naturą. Jej przedstawiciele uważają się za strażników różnorodnego (i często zabójczego) dzikiego życia na ich świecie, a teraz spoglądają w niebo. Są mistrzami opieki i hodowli zwierząt, a ich związek z fauną rozwijał się zgodnie z przyjętą etyką. Trudno przewidzieć, jak rozwinie się ta więź w skali galaktycznej."
 origin_tooltip_primal_calling_effects: "- $HOMEWORLD$$TABBED_NEW_LINE$- $PLANETARY_MODIFIERS$ ['concept_untamed_wilds_mod']\n- $HOME_SYSTEM$ §YFauna kosmiczna§! w sąsiednim układzie\n- $AVAILABLE_BUILDINGS$ ['concept_wildlife_ranch', £building£ $wildlife_ranch$]\n- Może wybrać ['concept_primal_calling_stance'] w kwestii §Yfauny kosmicznej§! po pierwszym kontakcie\n- $ADDITIONAL_TECHNOLOGIES_STRING$ ['technology:tech_genome_mapping', £society_research£$tech_genome_mapping$]\n- $GUARANTEED_RESEARCH_OPTION_STRING$ ['technology:tech_alien_life_studies', £society£$tech_alien_life_studies$]\n- Zdobycie wiedzy o: ['technology:tech_gravity_wells', £physics_research£$tech_gravity_wells$] po pierwszym kontakcie z fauną kosmiczną\n- Zdobycie wiedzy o: ['technology:tech_alien_cloning', £society_research£$tech_alien_cloning$] po schwytaniu fauny kosmicznej\n- Zdobycie wiedzy o: ['technology:tech_controlled_mutations', £society_research£$tech_controlled_mutations$] po sklonowaniu fauny kosmicznej"
 START_SCREEN_PRIMAL_CALLING: "Mimo szybkiego postępu technologicznego wciąż jesteśmy związani z dzikimi stworzeniami zamieszkującymi nasz świat. To nasi niezłomni towarzysze w procesie ewolucji, są naszymi nauczycielami, a my jesteśmy ich opiekunami. Nie bierzemy od nich więcej, niż mogą nam dać, a ich poświęcenia są otoczone czcią.\n\nW nieokiełznanym bezkresie kosmosu możemy trafić na inne dzikie istoty. Jeżeli do tego dojdzie, będziemy traktować je z takim samym szacunkiem jak te, które zamieszkują nasz świat. Dowiedzą się, gdzie jest ich miejsce, a my znajdziemy nasze, razem będziemy rosnąć w siłę.\n\nUsłyszeliśmy zew gwiazd, płonie w nas pierwotne pragnienie. Cokolwiek nas tam czeka, jesteśmy gotowi na spotkanie."
 leader_trait_trophy_hunter: "Łowca trofeów"
 leader_trait_trophy_hunter_desc: "Zahartowany trudami życia i posiadający ogromne doświadczenie, ten dowódca doskonale rozumie faunę kosmiczną. Kluczem do udanego polowania jest myślenie jak zwierzyna, ale oczywiście tylko idealny strzał przyniesie idealne trofeum."
 leader_trait_gifted_trapper: "Uzdolniony traper"
 leader_trait_gifted_trapper_desc: "Doświadczony badacz, który kładzie ogromny nacisk na bezpieczne chwytanie i transport żywych okazów. Oddanie tego przywódcy kwestii dobrostanu stworzeń zachęca innych do poprawiania standardów badawczych we wszystkich dziedzinach."
 leader_trait_void_hunter: "Próżniowy myśliwy"
 leader_trait_void_hunter_desc: "Doświadczony myśliwy, mistrz polowania na grubego zwierza. Cierpliwie podchodzi zdobycz i precyzyjnie uderza."
 leader_trait_void_hunter_2: "$leader_trait_void_hunter$ II"
 leader_trait_void_hunter_2_desc: "$leader_trait_void_hunter_desc$"
 leader_trait_void_tracker: "Próżniowy tropiciel"
 leader_trait_void_tracker_desc: "Ten przywódca ma niezrównany talent do skutecznego i bezpiecznego chwytania fauny kosmicznej."
 leader_trait_void_tracker_2: "$leader_trait_void_tracker$ II"
 leader_trait_void_tracker_2_desc: "$leader_trait_void_tracker_desc$"
 #First Contacts
 first_contact_critters.15.desc.primal_calling: "Warto powiedzieć, że centrum każdego stada §Htijanek§! ma matriarchalną hierarchię, w danym momencie grupie przewodzi jedna krowa. Samice mają pierwszeństwo korzystania ze wszystkich źródeł pożywienia, dzięki czemu wytwarzają matczyne gazy dla swoich młodych oraz kierują migracjami stada. Natomiast byki rezygnują z posiłków, kiedy brakuje zasobów, zamiast tego zajmują się poszukiwaniem żywności, gdy reszta stada odpoczywa."
 first_contact_critters.25.desc.primal_calling: "Wszystkim okazom, poza najmłodszymi, towarzyszą częściowo niezależne organizmy kontrolowane poprzez wydzieliny zawierające RNA. Te \"wici\" uderzają według skomplikowanych schematów ataku, zatem mimo widocznego braku świadomości §Hkosmiczne ameby§! są świetnymi naturalnymi drapieżnikami."
 first_contact_critters.35.desc.primal_calling: "Prawdopodobnie te istoty porozumiewają się ze sobą za pomocą zmian chromatycznych załamywanego przez nie światła. Ten sposób komunikacji ma duży potencjał do wyrażania skomplikowanych myśli, ale te częściowo świadome organizmy wykorzystują go tylko w podstawowym stopniu. Zmiany koloru mogą wyrażać status społeczny, agresję, a nawet stany płodności."
 grand_archive.2005.desc.primal_calling: "Te pasożytnicze stworzenia nie mają naturalnej zdolności rozmnażania się i muszą uciekać się do pozyskiwania gospodarzy z powierzchni planety. Odpowiednia ilość materii organicznej musi być zbierana na zamieszkanych planetach, aby §Hczerwie próżniowe§! mogły wytworzyć w swoich trójkach godowych niezbędny hormon. Są one hermafrodytami, a dobór partnerów opiera się głównie na uzupełniających się cechach fizycznych oraz porównywalnych rozmiarach."
 grand_archive.2900.desc.primal_calling: "Uważamy, że te istoty wybierają swoje asteroidy w oparciu o ich skład mineralny, a także rozmiary. Substancją, którą biologicznie preferuje pierwszy napotkany przez nas okaz jest [GetCommonMineral], ale prawdopodobnie każdy osobnik wytwarza tę adaptację z czasem zależnie od środowiska, które obecnie zamieszkuje. Skanowanie wykazało, że w asteroidzie-gospodarzu znajdują się śladowe ilości tego metalu, podobnie jak w układzie nerwowym oraz układzie trawiennym samego §Hkutoloida§!."
 COMMON_MINERAL_1: "kobalt"
 COMMON_MINERAL_2: "platyna"
 COMMON_MINERAL_3: "złoto"
 COMMON_MINERAL_4: "srebro"
 COMMON_MINERAL_5: "żelazo"
 COMMON_MINERAL_6: "nikiel"
 crystalline_entity_plural: "Krystaliczne stwory"
 grand_archive.1002.name: "Życie wśród gwiazd"
 grand_archive.1002.desc.default: "Próżnia jest pełna życia. Wiemy już, że [from.GetSpaceFaunaNamePlural] istnieją, ale czy znajdziemy jeszcze kogoś?\n\nNasze bliskie relacje z dzikimi organizmami świata [capital_scope.GetName] może nie sprawdzić się w skali galaktycznej. Kosmiczna pustka to zupełnie nowy ekosystem, zatem znaleźliśmy się na rozdrożu.\n\nCzym są dla nas te stworzenia?\n\nNiezależnie, co postanowimy, konsekwencje będą odczuwalne w kolejnych latach."
 grand_archive.1002.desc.homicidal: "Może okazać się, że próżnia jest pełna życia, które moglibyśmy niszczyć albo wykorzystywać. Wiemy już, że [from.GetSpaceFaunaNamePlural] istnieją, zatem chcemy znaleźć też inne istoty. Świeżą zdobycz albo nowe zwierzęta pociągowe, wybór należy do nas."
 grand_archive.1002.a: "Okazy na wystawę."
 grand_archive.1002.b: "Bydło do hodowli."
 grand_archive.1002.c: "Organizmy, które trzeba chronić."
 grand_archive.1002.d: "Nowa zdobycz dla myśliwych."
 grand_archive.1002.d.purifier: "Trupy na stos."
 grand_archive.1002.e: "Kolejne umysły do asymilacji."
 grand_archive.1002.f: "Partnerzy w symbiozie."
 grand_archive.1002.g: "Zdobycz i zwierzyna."
 untamed_wilds: "Nieokiełznana natura"
 untamed_wilds_desc: "Ogromne połacie terenów chronionych, gdzie dzikie organizmy mogą rozkwitać, będąc odnawialnym zasobem rdzennych stworzeń."
 grand_archive.1010.desc: "[Root.GetName]: Nasza kolonia nauczyła się szanować granice naturalnego terytorium rdzennych §Ytytanów§!.\n\nTe potężne bestie dadzą naszej osadzie wielkie korzyści, gdy zaczniemy poszerzać nasze granice i uprawiać ziemię."
 grand_archive.1010.a: "Nasi [owner.GetWranglerJobNamePlural] świetnie tu sobie poradzą."
