 #Grand Archive Destruction Events #
 ####################################
 grand_archive.4510.name: "[fromfrom.GetName]: $grand_archive$ zniszczone"
 grand_archive.4510.desc.common: "[fromfrom.GetName]: $grand_archive$ należące do imperium [from.GetName] zostało przez nas zniszczone."
 grand_archive.4510.stolen: "Możemy wydostać stamtąd jakieś cenne okazy."
 grand_archive.4510.ancrel: "Wydobyliśmy ze szczątków niewielką ilość: $r_minor_artifacts$."
 grand_archive.4510.nothing: "Niestety, nie znaleźliśmy tam niczego cennego."
 grand_archive.4510.freed: "Ponadto, chyba uwolniliśmy z wiwarium niewielką liczbę okazów fauny kosmicznej. Możliwe, że na wolności będą one zmieszane i agresywne."
