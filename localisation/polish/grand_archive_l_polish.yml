 tr_archivism_frontier_archaeology: "Archeologia pogranicza"
 tr_archivism_frontier_archaeology_delayed: "Powinniśmy sięgać poza granice naszych układów, jeżeli chcemy naprawdę zrozumieć otaczającą nas historię."
 tr_archivism_frontier_archaeology_tt: "Sprawia, że $science_plural$ mogą działać na ['concept_archaeology_site',stanowiskach archeologicznych] w §Yukładach, które nie są niczyją własnością§!.\nNagrodą będzie losowy §Y$EXHIBITION_XENO_GEOLOGY$§! ['concept_specimen']."
