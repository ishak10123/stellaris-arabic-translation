 pc_cutholoid: "$pc_asteroid$"
 pc_cutholoid_desc: "$pc_asteroid_desc$"
 resolution_cutholoid_eradication: "$cutholoids$: Eksterminacja"
 resolution_cutholoid_eradication_desc: "Kutoloidy pożerające statki nie powinny żyć na wolności w cywilizowanych układach. Należy za wszelką cenę eksterminować te stworzenia."
 resolution_cutholoid_eradication_tooltip: "Każde imperium mające §Y$cutholoids_plural$§! na swoim terytorium będzie uznawane za §Rłamiące prawo galaktyczne§! do momentu zniszczenia tych stworzeń."
 resolution_repeal_cutholoid_eradication: "§R$resolution_cutholoid_eradication$ - uchylenie§!"
 resolution_repeal_cutholoid_eradication_desc: "[global_event_country.GetGalCommunityOrGalImperium] nie jest po to, żeby prowadzić bezmyślną eksterminację gatunku kutoloidów."
 resolution_repeal_cutholoid_eradication_effect_success: "Uchyla uchwałę \"§Y$resolution_cutholoid_eradication$§!\"."
 fcsum_cutholoids_1: "$fcsum_critters_1$"
 further_fc_cutholoids_completed: "$further_fc_amoebas_completed$"
 grand_archive.3103.name: "$resolution_cutholoid_eradication$"
 grand_archive.3103.desc: "[global_event_country.GetGalCommunityOrGalImperium] ogłasza, że żadne kutoloidy nie mogą już przebywać w układach należących do tego imperium.\n\nJeżeli te istoty nie będą niszczone po wykryciu, imperium [this.GetName] będzie §Rłamać prawo galaktyczne§!."
 grand_archive.3105.name: "$cutholoids_plural$ na terytorium gatunku [this.GetSpeciesAdj&genitive]"
 grand_archive.3105.desc: "W układzie [from.GetName] wykryto kutoloida. Odkąd gatunek ten uznano za niebezpieczne szkodniki, wszyscy członkowie imperium [global_event_country.GetGalCommunityOrGalImperium] są prawnie zobowiązani do niezwłocznej eutanazji każdego kutoloida znajdującego się w ich przestrzeni.\n\nImperium [Root.GetName] będzie traktowane jako §Rłamiące prawo galaktyczne§!, dopóki kutoloid nie opuści naszych układów lub nie zostanie zlikwidowany."
 grand_archive.3107.desc: "Dalsza obecność kutoloida w należącym do nas układzie [invaded_system.GetName] to poważne §Rnaruszenie prawa galaktycznego§! w postaci uchwały $resolution_cutholoid_eradication$. Spowodowało to, że [global_event_country.GetGalCommunityOrGalImperium] pozwala członkom przegłosować nałożenie sankcji na imperium [Root.GetName]."
 grand_archive.3011.name: "Zaginięcie statku badawczego"
 grand_archive.3011.desc: "Utraciliśmy kontakt ze statkiem badawczym sprawdzającym dziwną asteroidę w układzie [cutholoid_under_radar.solar_system.GetName].\n\nWykryliśmy słabe sygnały alarmowe nadawane z jego ostatniej znanej lokalizacji. Powinniśmy to zbadać, jeżeli chcemy odzyskać zaginioną jednostkę."
 grand_archive.3011.a: "Niedobrze."
 grand_archive.3012.name: "Odkrycie istoty asteroidalnej"
 grand_archive.3012.desc: "W trakcie eksploracji układu §H[from.solar_system.GetName]§! odkryto kolejne dziwne istoty asteroidalne.\n\nNasze §Hstatki badawcze§! powinny omijać ten układ, dopóki nie dowiemy się czegoś więcej o tych groźnych obiektach."
 grand_archive.3012.a: "Kontynuujcie badania."
 grand_archive.3016.name: "Nieprzyjemna niespodzianka"
 grand_archive.3016.desc.default: "[fromfrom.GetName]: Asteroida okazała się tylko skorupą ogromnego organizmu żyjącego w jej wnętrzu.\n\nZniszczyliśmy ją i pozyskaliśmy: [this.GetName]. Dalsze badania asteroid wymagają zachowania ostrożności.\n\nMoże istnieć więcej takich istot, które czają się na łatwą zdobycz."
 grand_archive.3016.desc.leader_killed: "$grand_archive.3016.desc.default$ Niestety, [leader.GetName] ma obrażenia, których nie da się naprawić."
 grand_archive.3018.name: "Z trzewi bestii"
 grand_archive.3018.desc: "Nasz statek badawczy, który zaginął w układzie §H[current_system.GetName]§!, powrócił!\n\n§H[leader.GetName]§! raportuje, że jednostka została w całości połknięta przez kosmiczne stworzenie kryjące się wewnątrz asteroidy. Statek znajdował się o krok od utraty szczelności kadłuba, gdy niespodziewanie został wydalony. Wygląda na to, że coś innego zaskoczyło istotę, nim zdążyliśmy zadziałać.\n\nPowinniśmy ostrożnie podchodzić do niektórych pasów asteroid, dopóki nie dowiemy się czegoś więcej."
 grand_archive.3018.a: "Na szczęście."
 grand_archive.3020.name: "Utrata statku badawczego"
 grand_archive.3020.desc: "Sygnały alarmowe z układu [from.GetName] zamilkły. Możemy tylko zakładać, że statek badawczy [from.GetName] przepadł na dobre."
 alert_mia_fleet_eaten_title: "$alert_mia_title$"
 alert_mia_fleet_eaten_instant: "Utraciliśmy kontakt ze statkiem badawczym sprawdzającym asteroidę. Wykryliśmy słabe sygnały alarmowe nadawane z jego ostatniej znanej lokalizacji."
 cutholoid_discovered_chain_title: "Odzyskanie: [this.GetName]"
 cutholoid_discovered_chain_desc: "Utraciliśmy łączność z naszym statkiem badawczym [this.GetName] w układzie [cutholoid_under_radar.solar_system.GetName].\n\nJego ostatni komunikat wskazywał, że rozpoczyna badanie pobliskiej asteroidy, [cutholoid_under_radar.GetName].\n\nZaleca się ostrożność podczas ponownego wejścia do tego układu."
 HIDDEN_CUTHOLOID_ATTACK_PROJECT: "Zniszczyć asteroidę"
 HIDDEN_CUTHOLOID_ATTACK_PROJECT_DESC: "Asteroida [cutholoid_under_radar.GetName] nie jest tym, czym się wydaje. Powinniśmy wysłać tam znaczne siły militarne i podjąć próbę odzyskania naszego statku badawczego [this.GetName], zanim stracimy go na zawsze."
 HIDDEN_CUTHOLOID_CAPTURE_PROJECT: "Przechwycić asteroidę"
 HIDDEN_CUTHOLOID_CAPTURE_PROJECT_DESC: "Asteroida [cutholoid_under_radar.GetName] nie jest tym, czym się wydaje. Mając odpowiednią technologię moglibyśmy przechwycić ją w całości i z łatwością odzyskać nasz statek badawczy [this.GetName], zanim stracimy go na zawsze."
 grand_archive.2800.name: "Fałszywa asteroida"
 grand_archive.2800.desc: "Niecodzienna asteroida, na którą trafiliśmy w układzie §H[This.System.GetName]§!, prawdopodobnie posiada świadomość. Wchodzenie na orbity takich obiektów jest skrajnie niebezpieczne, a statki badawcze powinny natychmiast opuścić takie układy, dopóki nie dowiemy się czegoś więcej o tych istotach."
 grand_archive.2800.a: "Kontynuujcie badania."
 grand_archive.2900.name: "Kutoloidy"
 grand_archive.2900.desc: "Odkryliśmy kosmiczny organizm zamieszkujący wnętrza asteroid. Nazwaliśmy je §Hkutoloidami§!. Te stworzenia są drapieżnikami atakującymi z zasadzki. Mogą czaić się na zdobycz przez wiele lat i połykać statki w całości, dlatego powinniśmy bardzo ostrożnie podchodzić do niezbadanych pasów asteroid, gdyż istoty te są skrajnie niebezpieczne.\n\nDobra wiadomość jest taka, że występują bardzo rzadko, a ich bezpłciowy proces rozrodczy trwa setki lat."
 grand_archive.2900.a: "Powinniśmy dokładniej zbadać te stworzenia."
 grand_archive.2900.b: "Zróbcie zasadzkę na drapieżniki. Zniszczcie je wszystkie."
 grand_archive.2900.b.homicidal: "Drapieżnik staje się zwierzyną."
 grand_archive.2905.name: "Skorupy kutoloidów"
 grand_archive.2905.desc: "Skorupa kutoloida składa się nie tylko z minerałów, ale także z mocnych włókien biologicznych, które ciągle rosną. Niektóre ze skorup składają się w ponad pięćdziesięciu procentach z biomasy.\n\nKiedy kutoloid wyrośnie ze swojej asteroidy, wyrusza na poszukiwania nowego domu i ponownie zaczyna proces integracji. Zwykle są to bardzo terytorialne istoty, widywano liczne kutoloidy orbitujące wokół asteroid będących atrakcyjnym materiałem na skorupy. Takie obiekty są przejmowane przez największe z tych stworzeń, a pozostałe kutoloidy ustawiają się według wielkości i wymieniają swoimi domami. Dlatego zamieszkiwane przez nie asteroidy były często używane przez inne organizmy.\n\nKoniec końców, najmniejsze z asteroid posiadają największe wzmocnienie biologiczne, ponieważ najczęściej zmieniały właścicieli. Te próbki mają dużą wartość naukową."
 grand_archive.2905.a: "Wzmocnijmy naszą faunę kosmiczną."
 grand_archive.2905.b: "Ulepszmy nasze statki."
 cutholoids_hunting_buff: "Łowca kutoloidów"
 cutholoids_hunting_buff_desc: "Bogate w minerały skorupy kutoloidów są zbierane po każdej bitwie, co daje nam §G$@cutholoids_hunting_buff_mineral_reward|0$§! £minerals£ za każdą zniszczoną flotę."
 grand_archive.2900.b.cutholoidhunt: "§G+$@cutholoids_hunting_buff_mineral_reward|0$§! £minerals£ za każdą zniszczoną flotę kutoloidów"
 mod_damage_vs_country_type_cutholoids_mult: "Uszkodzenia kutoloidów"
 RESEARCH_CUTHOLOIDS_PROJECT: "Badania kutoloidów"
 RESEARCH_CUTHOLOIDS_PROJECT_DESC: "Struktura asteroidalnej skorupy kutoloida to imponujący przykład inżynierii biologicznej. Możemy się od nich wiele nauczyć."
 cutholoid_debris_01_object: "Szczątki kutoloida"
 CUTHOLOID_DEBRIS_PROJECT: "$cutholoid_debris_01_object$"
 CUTHOLOID_DEBRIS_PROJECT_DESC: "Zniszczyliśmy olbrzymią istotę kryjącą się we wnętrzu asteroidy. Zebranie szczątków może przynieść nam pewne korzyści."
