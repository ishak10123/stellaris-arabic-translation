 sm_voidlure: "Próżniowa przynęta"
 sm_voidlure_desc: "Próżniowe przynęty emitują w kosmos sygnały mogące zwabić organizmy żyjące w próżni."
 sm_voidlure_desc_know_fauna: "Próżniowe przynęty emitują w kosmos sygnały mogące zwabić określone gatunki fauny kosmicznej. Każda instalacja musi powstać w układzie należącym do rodzaju preferowanego przez daną istotę. Zwabione istoty będą zachowywać się łagodnie przez rok."
