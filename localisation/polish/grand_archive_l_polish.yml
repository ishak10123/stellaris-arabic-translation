 tr_domestication_bio_repurposing: "Biomodyfikacja"
 tr_domestication_bio_repurposing_delayed: "Nic się nie marnuje."
 tr_domestication_bio_repurposing_blocker_tt: "Zyskasz §G$@bio_repurposing_blocker_clear_food|0$§!$r_food$, gdy usuniesz £blocker£ §Yorganiczną przeszkodę terenową§!"
 tr_domestication_bio_repurposing_tt: "Po twojej pokonanej §Yfaunie kosmicznej§! zostają szczątki, które możesz zbadać, aby odzyskać część ich kosztu. (§G10%§!)\n$tr_domestication_bio_repurposing_blocker_tt$"
 tr_domestication_bio_repurposing_reanimator_tt: "$tr_domestication_bio_repurposing_blocker_tt$"
 tr_domestication_astrozoology: "Astrozoologia"
 tr_domestication_astrozoology_delayed: "Wszystkie stworzenia żyjące w próżni mają wyjątkowe schematy rozrodcze i potrzeby żywieniowe. Hodowanie ich w odizolowanym środowisku tak, aby osiągały swój maksymalny potencjał, wymaga poświęcania im ogromnej ilości uwagi."
 tr_domestication_astrozoology_tt: "Po schwytaniu lub wyhodowaniu fauny kosmicznej: $NEW_LINE$$t$- Zasoby uzyskane z uboju: §G200%§!"
 tr_domestication_metabolic_regulation: "Regulacja metaboliczna"
 tr_domestication_metabolic_regulation_delayed: "Możemy sztucznie wpływać na dojrzewanie hodowanych gatunków, regulując poziom wielu kluczowych enzymów i białek oddziałujących na ich metabolizmy."
 tr_domestication_metabolic_regulation_tt: "Odblokowuje polityki: §Y$policy_metabolic_regulation$§!."
 tr_domestication_metabolic_regulation_machine_tt: "$tr_domestication_metabolic_regulation_tt$"
 tr_domestication_killer_instinct: "Instynkt zabójcy"
 tr_domestication_killer_instinct_delayed: "Istoty zdolne przetrwać w kosmicznej pustce muszą same dbać o własne bezpieczeństwo, w przeciwnym razie ich gatunek przestanie istnieć."
 tr_domestication_killer_instinct_homicidal_delayed: "Mogą nam służyć tylko najbardziej bezwzględne istoty."
