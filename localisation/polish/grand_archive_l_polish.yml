 VOIDWORMS_PROJECT: "Badania czerwi próżniowych"
 VOIDWORMS_PROJECT_DESC: "Biologia i schematy reprodukcyjne czerwi próżniowych wymagają dalszych badań."
 tech_voidworm_immunity: "Odporność czerwi próżniowych"
 tech_voidworm_immunity_desc: "Możemy stworzyć lekarstwo przeciwko pasożytniczej infekcji czerwia próżniowego. Wszystkie nasze kolonie stałyby się odporne na bombardowanie obecnym szczepem zarodników."
 tech_voidworm_immunity_effect: "Kolonie są odporne na bombardowanie czerwi próżniowych.\n$mod_damage_vs_country_type_voidworms_mult$: §G+$@vaccine_damage_vs_country_type_voidworms_mult|0%$§!"
 tech_voidworm_immunity_effect_during_situation: "§ROdporność na bombardowanie jest nieskuteczna w trakcie plagi czerwi próżniowych.§!\n$mod_damage_vs_country_type_voidworms_mult$: §G+$@vaccine_damage_vs_country_type_voidworms_mult|0%$§!\nRozwija sytuację §Y$situation_voidworm_plague$§! o §G+$@vaccine_situation_advancement|0$§!"
