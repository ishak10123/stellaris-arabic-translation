 #Technologies #
 ################
 tech_galactic_archivism: "Archiwum galaktyczne"
 tech_galactic_archivism_desc: "Historia naszej galaktyki powinna być należycie pielęgnowana, abyśmy mogli uczyć się od poprzednich pokoleń. To zadanie mogłoby realizować ogromne archiwum."
 tech_gravity_wells: "Sidła grawitacyjne"
 tech_gravity_wells_desc: "Punktowa koncentracja masy kwantowej może służyć do wytarzania krótkich skoków ekstremalnej grawitacji. Teoretycznie odpowiednia manipulacja taką siłą grawitacyjną mogłaby służyć do chwytania i ograniczania ruchów istoty dowolnej wielkości, nie czyniąc jej krzywdy."
 tech_containment_vessel: "Protokoły bezpieczeństwa kuratorów"
 tech_containment_vessel_desc: "Sidła grawitacyjne łapią dwukrotnie więcej §Yfauny kosmicznej§!."
 TECH_UNLOCK_CONTAINMENT_VESSEL_TITLE: "$TECH_UNLOCK_COMPONENT_LINE$ $tech_containment_vessel$"
 TECH_UNLOCK_CONTAINMENT_VESSEL_DESC: "$tech_containment_vessel_desc$"
 tech_asteroidal_carapace: "Skorupa asteroidy"
 tech_asteroidal_carapace_desc: "Skorupa kutoloida nie składa się wyłącznie z minerałów, wzmacniają ją też mocne włókna organiczne. Możemy dokonać syntezy tego procesu, korzystając z zaawansowanych technik metalurgicznych."
 ASTEROIDAL_CARAPACE_ARMOR: "$tech_asteroidal_carapace$"
 ASTEROIDAL_CARAPACE_ARMOR_DESC: "$tech_asteroidal_carapace_desc$"
 tech_gravity_snare_capacity_desc: "Zwiększa ilość §Yfauny kosmicznej§! chwytanej przez sidła grawitacyjne o §G1§!."
 tech_gravity_snare_capacity_1: "Ulepszenia mikroosobliwości"
 tech_gravity_snare_capacity_1_desc: "$tech_gravity_snare_capacity_desc$"
 tech_gravity_snare_capacity_2: "Optymalizacja manipulacji grawitacją"
 tech_gravity_snare_capacity_2_desc: "$tech_gravity_snare_capacity_desc$"
 tech_gravity_snare_capacity_3: "Ulepszenie systemu ograniczającego"
 tech_gravity_snare_capacity_3_desc: "$tech_gravity_snare_capacity_desc$"
 gateway_snare_capacity: "Pojemność sideł grawitacyjnych"
 gateway_gravity_snare_capacity: "§HŚcieżka pojemności sideł grawitacyjnych§!\n§ETa technologia doprowadzi do dalszego rozwoju pojemności sideł grawitacyjnych.§!"
 tech_alien_cloning: "Sztuczne rozmnażanie"
 tech_alien_cloning_beastmasters: "$tech_alien_cloning$"
 tech_alien_cloning_desc: "W ściśle kontrolowanych warunkach $genetic_material$ pozyskany z zabitej fauny kosmicznej może służyć do hodowania i wytwarzania nowych osobników każdego gatunku, nad którym sprawujemy władzę."
 feature_alien_cloning_unlocked: "Polityki: §Y$policy_space_fauna_growth$§!"
 feature_alien_cloning_unlocked_desc: "$policy_space_fauna_growth_desc$"
 tech_alien_cloning_tt: "§HOdblokowuje funkcję:§! Klonowanie fauny kosmicznej wielkości korwety"
 tech_improved_incubators: "Ulepszone inkubatory"
 tech_improved_incubators_beastmasters: "$tech_improved_incubators$"
 tech_improved_incubators_desc: "Możemy usprawnić procesy sztucznego rozwoju stosowane w naszych wylęgarniach, co przyspieszy początkowe etapy rozwoju i pozwoli tworzyć bardziej dojrzałe klony."
 tech_improved_incubators_tt: "§HOdblokowuje funkcję:§! Klonowanie fauny kosmicznej wielkości niszczyciela"
 tech_improved_incubators_tt_desc: "Wylęgarnie mogą teraz klonować większe okazy §Yfauny kosmicznej§!, dorównujące rozmiarami zwykłym niszczycielom."
 tech_metabolic_gases: "Gazy metaboliczne"
 tech_metabolic_gases_beastmasters: "$tech_metabolic_gases$"
 tech_metabolic_gases_desc: "Ulepszenia gazów metabolicznych w naszych hodowlach dodatkowo przyspieszy rozwój każdego okazu, zanim przyjdzie on na świat."
 tech_metabolic_gases_tt: "§HOdblokowuje funkcję:§! Klonowanie fauny kosmicznej wielkości pancernika"
 tech_metabolic_gases_tt_desc: "Wylęgarnie mogą teraz klonować statki fauny kosmicznej o dowolnym poziomie dojrzałości lub rozmiarach."
 BOARDING_CABLES: "Liny abordażowe"
 BOARDING_CABLES_MODULES: "$BOARDING_CABLES$"
 BOARDING_CABLES_TOOLTIP: "Dają niewielką szansę na kradzież wrogiego okrętu lub porwania wrogiego dowódcy dla okupu."
 BOARDING_CABLES_DESC: "$BOARDING_CABLES_TOOLTIP$"
 tech_boarding_cables: "$BOARDING_CABLES$"
 tech_boarding_cables_desc: "Zmodyfikowana artyleria małokalibrowa, która miota haki przebijające zamontowane na wytrzymałych linach z włókna węglowego. Służy do unieruchamiania i abordażu wrogich okrętów."
 tech_controlled_mutations: "Kontrolowane mutacje"
 tech_controlled_mutations_desc: "Możemy zwiększyć wydajność naszych statków fauny kosmicznej modyfikując ich genomy, co pozwoli zintegrować sztuczną technologię z ich biomasą."
 tech_controlled_mutations_2: "Zaawansowane kontrolowane mutacje"
 tech_controlled_mutations_2_desc: "Możemy pójść o krok dalej. Zaawansowana manipulacja genetyką fauny kosmicznej pozwala integrować szerszy wachlarz specjalistycznych elementów."
