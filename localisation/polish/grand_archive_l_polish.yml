 ##########
 r_the_modularium: "Modularium"
 r_the_modularium_desc: "Modularny system rafineryjny, który samodzielnie wytwarza cenne zasoby w coraz większych ilościach. Do sprawnego działania potrzebuje dużego źródła energii."
