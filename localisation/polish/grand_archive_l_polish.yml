 pirate.1.desc.black_needle: "Prawdopodobnie to §Y$NAME_BlackNeedle$§! stoi za tą nielegalną działalnością, być może nawet wspiera tych oportunistycznych korsarzy."
 pirate.2.k: "Parszywe kundle!"
 pirate.25.desc.black_needle: "Ponadto, znaleźliśmy skład kosztowności należących do byłych członków floty §Y$NAME_BlackNeedle$§!."
 #Events
 grand_archive.8000.name: "Pradawna kapsuła"
 grand_archive.8000.desc: "Dokonaliśmy przełomu w badaniach pradawnej kapsuły znalezionej na orbicie świata [this.GetHomeWorldName]. Nasi [this.GetScientistPlural] pracowali niestrudzenie, dzięki czemu możemy teraz rozszyfrować ostatnią warstwę zabezpieczeń cyfrowych i odczytać mapę, która od tak dawna budzi nasze zainteresowanie."
 grand_archive.8000.a: "Co zawiera?"
 TREASURE_HUNTERS_ANCIENT_CAPSULE_PROJECT: "Analiza pradawnej kapsuły"
 TREASURE_HUNTERS_ANCIENT_CAPSULE_PROJECT_DESC: "Wstępna analiza mapy znajdującej się w kapsule orbitalnej pozwoliła ujawnić położenie kilku ciał niebieskich, których nie ma w naszym układzie macierzystym. Wyliczenie dokładnych współrzędnych potrwa jakiś czas."
 grand_archive.8005.name: "Przeanalizowano pradawną kapsułę"
 grand_archive.8005.desc: "Ta mapa jest niekompletna!\n\nDane z kapsuły orbitalnej są poszatkowane, każda luka to brakujący fragment układanki. Jednak dzięki niej poznaliśmy wcześniej nieznany układ słoneczny, ale nie wiemy, czego możemy się tam spodziewać.\n\nMapa pokazuje też stabilne punkty wejścia, które ułatwiają dostanie się tam poprzez hiperlinie."
 grand_archive.8005.a.lom: "Wszystkie ręce na pokład!"
 grand_archive.8015.name: "Mapa gwiezdna"
 grand_archive.8015.desc.common: "Nasze okręty są przygotowane, a ich załogi rwą się do kolejnej przygody naszej cywilizacji."
 grand_archive.8015.desc.default: "Populacja świata [this.GetHomeWorldName] jest oczarowana niedawno odszyfrowaną mapą nieba. Ta \"§Y$celestial_chart$§!\" jak na razie przyniosła więcej pytań niż odpowiedzi. Skąd się wzięła? Kto i w jakim celu ją stworzył? I, co chyba najważniejsze, czy zwabi nas w pułapkę?\n\n$grand_archive.8015.desc.common$"
 grand_archive.8015.desc.gestalt: "Mapa znaleziona w kapsule wzbudziła zainteresowanie naszego społeczeństwa. Kiedy wiemy już, że to tylko jeden z wielu fragmentów, zastanawiamy się, dokąd może prowadzić i co tam znajdziemy. Zrobimy wszystko, żeby \"§Y$celestial_chart$§!\" znowu była całością.\n\n$grand_archive.8015.desc.common$"
 grand_archive.8015.a.default: "Naprzód, ku przygodzie!"
 grand_archive.8015.a.lom: "Cumy wciągnięte!"
 grand_archive.8020.name: "Niespodziewane spotkanie"
 grand_archive.8020.desc: "Napotkaliśmy silnie uzbrojoną flotę działającą pod nieznaną banderą. Jej jednostki lecą w zorganizowanej formacji, ale nie są to jednolite konstrukcje. Wiele z nich posiada wyrzutnie kinetyczne podłączone do kołowrotów z grubymi linami, które są zakończone harpunami oraz hakami ze stali węglowej. Ponadto, w centrum tej floty znajduje się grupa opancerzonych holowników. Można przypuszczać, że te okręty należą do grupy piratów albo najemników.\n\nStatek prowadzący ugrupowanie próbuje się z nami połączyć."
 grand_archive.8020.a.lom: "Zatem porozmawiajmy..."
 grand_archive.8025.name: "$NAME_CaptainHoo$ z floty $NAME_BlackNeedle$"
 grand_archive.8025.desc: "§HDystyngowany i wyniosły, ten wyjęty spod prawa kapitan udaje brak zainteresowania. Kiedy mówi, spogląda znad dzioba i unika patrzenia w oczy, jakbyśmy nie zasługiwali na jego pełną uwagę. Gestykuluje piórami, co wygląda komicznie, choć na pewno nie taki efekt chciałby uzyskać.§!\n\nCo za pech, dopadła was §Y$NAME_BlackNeedle$§!!\n\nDotarły do nas pogłoski, że wasze rozwijające się społeczeństwo zamierza eksplorować ten układ. Znaleźliście mapę, która należy do nas. Oddajcie ją, jeśli nie chcecie, żebyśmy użyli przemocy."
 grand_archive.8025.a: "Kim jesteś?"
 grand_archive.8025.a.reply: "Hoo, kim jestem?! Nazywam się Glimarhoo Zelmendrion, ale możecie nazywać mnie §Y$NAME_CaptainHoo$§!. Jestem kapitanem Silverwinga i drugim matem we wspaniałej pirackiej flocie §Y$NAME_BlackNeedle$§!. Od tysięcy lat maczamy pióra we wszystkich nielegalnych przedsięwzięciach, a ja jestem jedynie marną nitką w ogromnej tkaninie naszego dziedzictwa.\n\nRadzę wam zapamiętać moje imię, bo spodziewam się niezwykłej nagrody za dostarczenie tej mapy naszemu wspaniałemu przywódcy."
 grand_archive.8025.b: "Co wiesz na temat tej mapy?"
 grand_archive.8025.b.reply: "Zdolny i bardzo drogi handlarz informacji powiedział nam, że niedawno natknęliście się na dziwną kapsułę... Ponoć są w niej informacje o ukrytym układzie, który bardzo nas interesuje.\n\nMy też zdobyliśmy fragment tej mapy, ale jest on zupełnie nieprzydatny bez danych z waszej kapsuły. Nie wiem, dlaczego §Y$NAME_CaptainNess$§! dała wam klucz do swojego dziedzictwa, ale zamierzamy wam go odebrać."
 grand_archive.8025.c: "Dlaczego tak bardzo chcesz zdobyć tę mapę?"
 grand_archive.8025.c.reply: "Naprawdę jesteście tacy naiwni? [this.GetCaptainHooSnarkyInsult] Jeśli muszę, to wam to wyłożę.\n\nMapa działa jako pomoc nawigacyjna, kierująca w określone miejsce. Chcemy tam dotrzeć i zdobyć dawno zaginiony skarb, który ukryła tam §Y$NAME_CaptainNess$§!."
 grand_archive.8025.d: "Kim jest $NAME_CaptainNess$?"
 grand_archive.8025.d.reply: "Myśleliśmy, że jesteście lepiej poinformowani. To ona stworzyła tę mapę. Może urzekła ją ignorancja waszego gatunku, sama była bezmyślną siewczynią grozy.\n\nAle to nie wasza sprawa. Przekażcie nam te informacje, a my dokończymy sprawę."
 grand_archive.8025.e: "Zatrzymamy naszą mapę."
 grand_archive.8025.e.reply: "Tak przypuszczałem. Szykujcie się na spotkanie z przeznaczeniem.\n\nOddajcie skarb!"
 grand_archive.8025.f.lom: "Chodź i weź go sobie, rdzojadzie!"
 CAPTAIN_HOO_INSULT_MACHINE: "Myślałem, że mechaniczna inteligencja będzie naprawdę inteligentna, ale chyba się myliłem."
 CAPTAIN_HOO_INSULT_HIVE: "Wiele umysłów powinno ułatwiać pracę, ale wasza kolektywna inteligencje zupełnie tego nie potwierdza."
 CAPTAIN_HOO_INSULT_HUM: "Wasz grubokostny, gładkoskóry gatunek opracował technologię podróży międzygwiezdnych, jednak nadal nie wiecie, co to zdrowy rozsądek."
 CAPTAIN_HOO_INSULT_MAM: "Takie bestie jak wy nie dorównują naszemu wielkiemu przywódcy inteligencją i wyrafinowaniem."
 CAPTAIN_HOO_INSULT_REP: "Jednak nie oczekuję od takich prostaczków jak wy zrozumienia takich podstawowych pojęć."
 CAPTAIN_HOO_INSULT_AVI: "Może twoi przodkowie byli za często dziobani w czaszkę."
 CAPTAIN_HOO_INSULT_ART: "Nie dziwi mnie, że zdolność do krytycznego myślenia nie przeniknęła przez twardy egzoszkielet waszego gatunku."
 CAPTAIN_HOO_INSULT_MOL: "To prawda, że mięczaki nie mają wyodrębnionego mózgu. Wasz gatunek jest tego dowodem."
 CAPTAIN_HOO_INSULT_FUN: "Zdaje się, że od grzybów dzieli was zaledwie kilka zarodników."
 CAPTAIN_HOO_INSULT_PLANT: "Coraz wyraźniej widać, dlaczego na większości światów u roślin nie rozwinęła się inteligencja."
 CAPTAIN_HOO_INSULT_LITHOID: "Przedstawiciele waszego gatunku są doprawdy głupi jak kamienie."
 CAPTAIN_HOO_INSULT_NECROID: "Zapewne jesteście odpadami po niegdyś inteligentnym gatunku."
 CAPTAIN_HOO_INSULT_AQUATIC: "Widać, że nie jesteście w swoim żywiole."
 CAPTAIN_HOO_INSULT_TOX: "Być może życie w brudzie osłabiło wasze umysły."
 CAPTAIN_HOO_INSULT_ROBOT: "Może wasze moduły indywidualności pochłaniają większość mocy obliczeniowej."
 CAPTAIN_HOO_INSULT_DEFAULT: "Być może niedobory intelektualne waszego gatunku dorównują waszej przerażającej szpetocie."
 grand_archive.8045.name: "$grand_archive.8025.name$"
 grand_archive.8045.desc: "Ja i §Y$NAME_BlackNeedle$§! staliśmy się przez was obiektem kpin. Tak nie może być!\n\nWasza niechęć do współpracy nie zostanie prędko zapomniana. $NAME_BlackNeedle$ uderzy w was z całą swoją mocą. Wasza raczkująca cywilizacja nie przetrwa naszego gniewu.\n\nNie spoczniemy, dopóki nie zdobędziemy tej mapy! A teraz życzę wam miłego dnia!"
 grand_archive.8045.a.lom: "Następnym razem mniej gadajcie i więcej walczcie!"
 TREASURE_HUNTERS_CHART_PIECE_2_PROJECT: "Planeta w ośmiu kawałkach"
 TREASURE_HUNTERS_CHART_PIECE_2_PROJECT_DESC: "§H$celestial_chart$§! doprowadziła nas do zniszczonego świata. W największym kawałku skorupy planetarnej wykryliśmy tunel. Uważamy, że znajduje się w nim kolejny fragment naszej mapy, ale dotarcie do niego wymaga ostrożnego wydobycia.\n\nStatek konstrukcyjny może zbudować sprzęt niezbędny do pozyskania tego fragmentu."
 grand_archive.8055.name: "Udane wydobycie"
 grand_archive.8055.desc: "Z dryfujących szczątków planety udało się wydobyć kapsułę, a wraz z nią pewną ilość minerałów. W środku znajdowała się kolejna §Y$celestial_chart$§! (czy też jej fragment) i zbiór wyjątkowych artefaktów kulturowych. Ponadto pozyskaliśmy też notatkę sporządzoną w wielu językach, co ma ułatwić jej przetłumaczenie.\n\n\"Te szczątki to nieistniejąca już $NAME_Soropegma$, świat macierzysty ytteritów. Ytterici byli gatunkiem istniejącym przed wynalezieniem napędu nadświetlnego. Wyginęli w wyniku tragicznego wypadku. Nie zdając sobie sprawy z nieuchronnych konsekwencji, przypadkowo uwolniliśmy niszczycielską moc skradzionego kolosa. Prosimy, zachowajcie i szanujcie pamięć o tej cywilizacji\"."
 TREASURE_HUNTERS_ANCIENT_CAPSULE_2_PROJECT: "Odczytajcie fragment mapy."
 TREASURE_HUNTERS_ANCIENT_CAPSULE_2_PROJECT_DESC: "Po wydobyciu kapsuły ze szczątków zniszczonej planety musimy odczytać zawarte w niej dane nawigacyjne. Ten proces wymaga porównania z naszą kartograficzną bazą danych i zestawić ciała niebieskie widoczne na mapie ze znanymi nam układami."
 grand_archive.8060.name: "Mapa odczytana"
 grand_archive.8060.desc: "Po złamaniu wielowarstwowego szyfrowania, §Y$celestial_chart$§! została bez większych problemów zaktualizowana o nowe dane. Połączone fragmenty ujawniły istnienie kolejnego układu. Przed nami następny przystanek podróży. Wlatując to tego nieznanego zakątka kosmosu, należy zachować ostrożność."
 grand_archive.8075.name: "Wielkie Archiwum"
 grand_archive.8075.desc: "§Y[This.GetLastAcquiredSpecimenName]§! jest w rękach naszych naukowców. Uważają oni, że §Y$grand_archive$§! powinno prezentować publicznie ten obiekt w ramach szerzej zakrojonego projektu. Do archiwum trafiłaby nasza raczkująca kolekcja rzadkich artefaktów, co przyniosłoby znaczące korzyści naukowe i kulturowe. Początkowa inwestycja napędziłaby badania nad technikami oraz technologiami potrzebnymi do ochrony i prezentowania zróżnicowanych i delikatnych okazów z całej galaktyki.\n\nPonadto, schemat znaleziony przy artefakcie ytteritów przedstawia zaawansowany projekt gabloty z innowacyjną technologią monitorowania atmosfery. Dalsze prace nad rozwojem tego pomysłu zwiększą możliwości ochronne całego archiwum."
 grand_archive.8076.name: "Okaz yttericki"
 grand_archive.8076.desc: "Ostatni ślad po cywilizacji ytteritów zasługuje na odrębną wystawę.\n\nNa szczęście schemat znaleziony przy ytterickim artefakcie przedstawia zaawansowany projekt gabloty z innowacyjną technologią monitorowania atmosfery. Dalsze prace nad rozwojem tego pomysłu zwiększą możliwości ochronne całego archiwum."
 grand_archive.8076.a: "To dobra okazja."
 TREASURE_HUNTERS_EXHIBITION_PROJECT: "Schemat ulepszenia wystawy"
 TREASURE_HUNTERS_EXHIBITION_PROJECT_DESC: "Wraz z okazem ytteritów znaleźliśmy zaawansowany projekt rozbudowanej gabloty, która pomoże go zachować.\n\nZbadanie technik używanych w tym schemacie zwiększy nasze możliwości wystawiania na widok publiczny i konserwacji eksponatów."
 TREASURE_HUNTERS_EXHIBITION_PROJECT_TOOLTIP: "Użyj §Ystatku konstrukcyjnego§!, aby zbudować §YWielkie Archiwum§! na orbicie planety mającej 2,5 tysiąca lub więcej £pop£ §Hpopulacji§!.\nWymaga: §H£society_research£$tech_galactic_archivism$§!."
 grand_archive.8080.name: "Ulepszenie wystawy"
 grand_archive.8080.desc: "Po dokładnym przeanalizowaniu schematu ytteritów zbudowaliśmy zaawansowany pojemnik, w którym atmosfera jest monitorowana na poziomie pojedynczego atomu. Kuratorzy mogą więc niezwykle precyzyjnie obserwować warunki atmosferyczne oddziałujące na delikatny okaz ytteritów i wykryć oznaki ewentualnego rozkładu. Dzięki temu na zawsze zachowa się w idealnym stanie.\n\nMożemy zastosować te techniki, aby dodatkowo poprawić warunki przechowywania wszystkich eksponatów w naszej kolekcji."
 TREASURE_HUNTERS_BUILD_GRAND_ARCHIVE: "Zbuduj Wielkie Archiwum"
 TREASURE_HUNTERS_BUILD_GRAND_ARCHIVE_DESC: "W trakcie eksploracji kosmosu zgromadziliśmy niezliczone artefakty i ciekawostki kulturowe. Te okazy będą inspiracją dla populacji, a nasza wystawa jako pierwsza będzie prezentowała i chroniła wszystkie dziedziny wiedzy o galaktyce.\n\nW tym celu powinno powstać §H$grand_archive$§!."
 grand_archive.8090.name: "Otwarcie Wielkiego Archiwum"
 grand_archive.8090.desc: "[fromfrom.GetName]: §Y$grand_archive$§! zostało otwarte, to wielki dzień dla imperium [this.GetName]. Ta wystawa skarbów z całej galaktyki zachęca do eksploracji i czerpania wiedzy z przeszłości."
 d_black_needle_base: "Ukryta baza Czarnej Igły"
 d_black_needle_base_desc: "Tajna baza piratów Czarnej Igły, która służy do prowadzenia nielegalnej działalności i ukrywania skradzionych dóbr."
 d_abandoned_black_needle_base: "Opuszczona baza Czarnej Igły"
 d_abandoned_black_needle_base_desc: "Kiedyś piraci z Czarnej Igły wykorzystywali tę bazę jako wysuniętą placówkę, kryjówkę dla poszukiwanych przestępców oraz magazyn skradzionych dóbr."
 d_abandoned_black_needle_base_naval_cap: "Limit marynarki wojennej za miejsca pracy dla żołnierzy: §G+$@abandoned_black_needle_base_naval_cap_from_soldier_job|0$§!"
 d_abandoned_black_needle_base_naval_cap_short: "£mod_country_naval_cap_add£ z £job_soldier£ miejsc pracy: §G+$@abandoned_black_needle_base_naval_cap_from_soldier_job|0$§!"
 black_needle_base_system_poi: "Podążaj za mapą gwiezdną"
 black_needle_base_system_poi_desc: "§H$celestial_chart$§! wskazała ukryty układ - [Prev.GetName]. Musimy tam polecieć i zobaczyć, co na nas czeka."
 grand_archive.8100.name: "Wykryto kryjówkę piratów"
 grand_archive.8100.desc: "Na świecie [From.GetName] znaleźliśmy tajną podziemną bazę oznaczoną symbolami §YCzarnej Igły§!. Uważamy, że z tej placówki korzystała grupa piratów, odizolowana od działań reszty organizacji. Na pewno jest tutaj §Y$celestial_chart$§!, a raczej jej kolejny fragment, oraz inne bogactwa.\n\nMoglibyśmy z łatwością zbombardować to miejsce z orbity, ale mogłoby to dać Czarnej Igle czas na wezwanie posiłków. Natomiast błyskawiczny desant naszych wojsk naziemnych pozwoliłby szybko opanować bazę i nie dałby wrogom wiele czasu na reakcję.\n\nBardziej skryte podejście to włamanie do systemów komputerowych bazy i śmiały napad, po którym $celestial_chart$ znajdzie się w naszych rękach."
 grand_archive.8100.a: "Trzeba to przemyśleć."
 COLONIZATION_IMPOSSIBLE_DEFENDED_PLANET: "$TRIGGER_FAIL$§RTa planeta jest silnie broniona i nie można jej skolonizować.§!"
 BLACK_NEEDLE_BASE_BOMBARD: "Zbombardujmy bazę Czarnej Igły"
 BLACK_NEEDLE_BASE_BOMBARD_DESC: "[This.GetName]: Prawdopodobnie podziemna baza może oprzeć się bombardowaniu orbitalnemu, ale mając dostatecznie dużo czasu oraz siły ognia, da się ją zniszczyć tylko z wykorzystaniem naszej floty. Po unieszkodliwieniu bazy przeszukamy ruiny, sprawdzimy czy jest tam §H$celestial_chart$§! (fragment) i inne cenne rzeczy.\n\nDoradcy ds. taktyki ostrzegają, że takie podejście może dać Czarnej Igle czas na wezwanie posiłków."
 BLACK_NEEDLE_BASE_BOMBARD_REINFORCEMENTS_KILLED: "$BLACK_NEEDLE_BASE_BOMBARD$"
 BLACK_NEEDLE_BASE_BOMBARD_REINFORCEMENTS_KILLED_DESC: "$BLACK_NEEDLE_BASE_BOMBARD_DESC$"
 grand_archive.8103.name: "Kontratak Czarnej Igły"
 grand_archive.8103.desc: "Zgodnie z przewidywaniami, Czarna Igła wysłała flotę do obrony bazy na świecie [FromFrom.GetName].\n\nMusimy rozprawić się z tymi okrętami, żeby zabezpieczyć układ [FromFrom.System.GetName]."
 grand_archive.8105.name: "Zgliszcza i ruiny"
 grand_archive.8105.desc: "Prowadzony z orbity ostrzał bazy piratów wreszcie obrócił ją w gruzy - razem z jej poprzednimi mieszkańcami. Zagrożenia przestały istnieć, możemy zatem wysłać naukowca, który zbada zniszczoną bazę, na pewno jest tam §Y$celestial_chart$§! - musimy zdobyć ten fragment."
 grand_archive.8105.a.custom_tooltip: "Czarna Igła została zniszczona. §Y[FromFrom.GetName]§! czeka na eksplorację."
 grand_archive.8105.a.lom: "Zbierać łupy!"
 project_type_research: "$RESEARCH$"
 project_type_bombardment: "Bombardowanie"
 BLACK_NEEDLE_BASE_DEPLOY_ARMIES: "Zaatakujmy bazę Czarnej Igły"
 BLACK_NEEDLE_BASE_DEPLOY_ARMIES_DESC: "[FromFrom.GetName]: Podziemnej bazy strzeże znaczna liczba żołnierzy i dronów ochronnych. Desant armii na powierzchnię tej planety pozwoli nam szybko przejąć bazę, a §YCzarna Igła§! będzie miała niewiele czasu na reakcję.\n\nPo zajęciu bazy wydostaniemy stamtąd kapsułę z mapą oraz inne kradzione towary zgromadzone przez piratów."
 grand_archive.8110.name: "Obrona zlikwidowana"
 grand_archive.8110.desc: "Nasze siły naziemne zajęły bazę §YCzarnej Igły§! i właśnie zabezpieczają budynek oraz zasoby znajdujące się w okolicy. Zagrożenia zostały usunięte, możemy więc wysłać tam naukowca - §Y$celestial_chart$§! czeka, musimy zdobyć ten fragment."
 grand_archive.8110.a.custom_tooltip: "Siły naziemne Czarnej Igły zostały zneutralizowane. §Y[FromFromFrom.GetName]§! czeka na eksplorację."
 grand_archive.8110.a.lom: "Czas podzielić łupy."
 BLACK_NEEDLE_BASE_HACK: "Hakowanie piratów"
 BLACK_NEEDLE_BASE_HACK_DESC: "Piraci za bardzo polegali na skradzionym i dostosowanym sprzęcie, co ułatwia przeniknięcie do ich bazy. Pojedynczy statek badawczy mógłby zhakować z orbity sieć na świecie [FromFrom.GetName], udając jednostkę transportową §YCzarnej Igły§! dowodzoną przez kapitana Hoo. To może przekonać ich do przekazania kapsuły z mapą bez niepotrzebnego rozlewu krwi."
 grand_archive.8115.name: "Udany manewr"
 grand_archive.8115.desc.1: "Po wielomiesięcznych przygotowaniach naukowiec [Leader.GetName] zdołał przeniknąć do sieci łączności i podał się za jednostkę §YCzarnej Igły§!. Dzięki sfałszowanym rozkazom kapitana Hoo, kierownictwo bazy zgodziło się przygotować kapsułę do pilnego wywiezienia poza ten świat."
 grand_archive.8115.desc.slippery: "Statek, w którym znajduje się naukowiec [Leader.GetName], wylądował w miejscu idealnie nadającym się do pospiesznej ucieczki w przypadku, gdyby nasz podstęp został wykryty."
 grand_archive.8115.desc.charismatic: "Dzięki swojemu urokowi osobistemu i charyzmie [Leader.GetName] potrafi unikać trudnych pytań, co właśnie okazało się niezwykle skuteczne."
 grand_archive.8115.desc.psionic_organic: "Naukowiec [Leader.GetName] wykonuje ruch kończyną i w ten sposób manipuluje umysłami strażników, aby pozbawić ich wszelkich podejrzeń."
 grand_archive.8115.desc.psionic_machine: "Dzięki psionicznej perswazji, [Leader.GetName] z łatwością manipuluje słabszymi umysłami strażników, aby uniknąć dalszych podejrzeń."
 grand_archive.8115.desc.2: "Kapsuła została przejęta bez ofiar. Piraci jeszcze nie wiedzą, że dali się oszukać."
 grand_archive.8115.a: "$EXCELLENT$"
 grand_archive.8120.name: "Wykrycie na gorącym uczynku"
 grand_archive.8120.desc: "Niestety, jeden ze strażników przejrzał nasz podstęp, gdy ładowaliśmy kapsułę na statek. Doszło do krótkiej strzelaniny, zostaliśmy zmuszeni do ucieczki wraz z cennym ładunkiem. Udało się zdobyć kapsułę, ale naukowiec [Leader.GetName] nie żyje."
 grand_archive.8120.a: "$TERRIBLE$"
 grand_archive.8125.name: "Piraci opuścili bazę"
 grand_archive.8125.common: "Po ujawnieniu tych słabych punktów piraci postanowili opuścić bazę na świecie [FromFromFromFrom.GetName]. Przeprowadzili natychmiastową ewakuację i zabezpieczyli przechowywane tam cenne dobra. Ten nadający się do zamieszkania księżyc jest teraz pusty i można go skolonizować."
 grand_archive.8125.desc.alive: "§YCzarna Igła§! wreszcie wykryła luki w swojej zamkniętej sieci zabezpieczeń i zorientowała się, że została oszukana.\n\n$grand_archive.8125.common$"
 grand_archive.8125.desc.dead: "Po tym, jak uciekliśmy z twierdzy §YCzarnej Igły§!, piraci odkryli wszystkie szczegóły naszej skrytej operacji.\n\n$grand_archive.8125.common$"
 grand_archive.8125.a: "Logiczna decyzja."
 grand_archive.8125.a.custom_tooltip: "Armie imperium §Y[FromFromFromFrom.GetName]§! opuściły planetę. Można ją teraz skolonizować."
 grand_archive.8130.name: "Splądrowanie bazy Czarnej Igły"
 grand_archive.8130.desc.common: "W zabezpieczonym pomieszczeniu znajdowało się wiele cennych przedmiotów, a także pamiątek związanych z historią tej pirackiej organizacji. Wśród skradzionych dzieł sztuki, spersonalizowanej biżuterii oraz zaszyfrowanych portfeli cyfrowych znajdowała się kapsuła z mapą.\n\nPrzypuszczamy, że trudno będzie sprzedać wiele ze znalezionych tu rzeczy. Dzieła sztuki można zidentyfikować, biżuterię należałoby przetopić, a transakcje za pomocą portfeli cyfrowych można namierzyć. Być może część wcześniejszych właścicieli tych dóbr od dawna nie żyje, ale pozostali mogą nadal poszukiwać swojej skradzionej własności."
 grand_archive.8130.desc.bombarded: "Przemierzając ruiny bazy §YCzarnej Igły§!, znaleźliśmy podziemną kryptę. Po jej otwarciu okazało się, że umieszczono w niej nielegalnie zdobyte dobra.\n\n$grand_archive.8130.desc.common$"
 grand_archive.8130.desc.landed: "Przemierzając zdewastowaną bazę §YCzarnej Igły§!, znaleźliśmy schemat tej placówki, na którym znajdował się podziemny skarbiec. Zjechaliśmy windą techniczną głęboko pod powierzchnię, podaliśmy kod dostępu, aby dostać się do niewielkiego magazynu nielegalnie zdobytych dóbr.\n\n$grand_archive.8130.desc.common$"
 grand_archive.8130.a: "Spróbujmy przenieść skradzione przedmioty."
 grand_archive.8130.b: "Sprzedajmy to wszystko."
 grand_archive.8130.c.default: "Zatrzymajmy skradzione przedmioty."
 grand_archive.8130.c.lom: "Znalezione, niekradzione."
 black_needle_base_sold_stolen_items: "Sprzedano skradzione przedmioty z bazy Czarnej Igły"
 opinion_black_needle_base_repatriate_stolen_items: "Przeniesiono skradzione przedmioty"
 opinion_black_needle_base_repatriate_stolen_items_tt: "§G+$@opinion_black_needle_base_repatriate_stolen_items_value|0$§! £opinion£ opinii u każdego niezabójczego imperium, z którym nie prowadzimy wojny."
 DECODE_THIRD_MAP_PIECE: "Odczytajcie fragment mapy."
 DECODE_THIRD_MAP_PIECE_DESC: "Po zabraniu kapsuły z bazy §YCzarnej Igły§! musimy odczytać znajdujące się w niej dane i sprawić, że §H$celestial_chart$§! zostanie o nie zaktualizowana."
 grand_archive.8135.name: "Mapa odczytana"
 grand_archive.8135.desc: "Zdołaliśmy złamać szyfrowanie cyfrowe, a §Y$celestial_chart$§! została zaktualizowana o nowe informacje. Dzięki temu odkryliśmy kolejne miejsce do eksploracji, a mapa jest prawie cała. Uważamy, że brakuje nam już tylko jednego kawałka tej układanki i z ostrożnym optymizmem możemy powiedzieć, że nasza wyprawa zbliża się ku końcowi.\n\nW trakcie dekodowania danych nawigacyjnych uznano, że warto zbadać też nienaruszoną powłokę kapsuły. Wytrzymałość i siła tego pojemnika okazały się zaskakujące. Gdybyśmy zdołali odtworzyć ten materiał, otworzyłyby się dla nas kolejne kierunki badań."
 grand_archive.8135.a: "$GOOD$"
 d_hive_dwelling: "Siedziba umysłu zbiorowego"
 d_hive_dwelling_desc: "Odizolowane osiedle zamieszkiwane przez kolektyw Smeegibb, dawnego towarzysza kapitan Ness."
 d_ruined_hive_dwelling: "Zniszczona siedziba umysłu zbiorowego"
 d_ruined_hive_dwelling_desc: "Spalone osiedle kolektywu Smeegibb, dawnego towarzysza kapitan Ness."
 COLONIZATION_IMPOSSIBLE_SMEEGIBB_PLANET: "§RTa planeta należy do: $NAME_Smeegibb$.§!"
 grand_archive.8200.name: "Ukryta osada"
 grand_archive.8200.desc.common_1: "[FROM.GetName]: Natrafiliśmy na niewielką osadę zamieszkaną przez mniej niż tysiąc świadomych mięczaków. Wstępna analiza gatunku wykazała, że posiada on zdolność do podprzestrzennego porozumiewania się za pośrednictwem efaps, co pozwala przypuszczać, że mamy do czynienia z umysłem zbiorowym. Poza tym jednym miejscem planeta nie jest zamieszkana przez inne świadome stworzenia."
 grand_archive.8200.desc.common_2: "Nie wiemy, dlaczego §Y$celestial_chart$§! doprowadziła nas w to miejsce, musimy przeprowadzić dalsze badania."
 grand_archive.8200.desc: "$grand_archive.8200.desc.common_1$\n\n$grand_archive.8200.desc.common_2$"
 grand_archive.8200.desc.alt: "$grand_archive.8200.desc.common_1$\n\nMoże ten gatunek wie, kim jest \"§Y$NAME_CaptainNess$§!\", o której słyszeliśmy.\n\n$grand_archive.8200.desc.common_2$"
 grand_archive.8205.desc.common_1: "§HWęzeł umysłu zbiorowego znalezionego w układzie [FROM.GetName], $NAME_Smeegibb$ wierci się niespokojnie. Kiedy się do niego mówi, spuszcza wzrok, jakby przywykł do uległości.§!"
 grand_archive.8205.desc.common_2: "Jestem $NAME_Smeegibb$. Zastanawiam się, jak nas znajdujecie. Ten układ jest od tysięcy lat ukryty przed resztą galaktyki.\n\nTylko §Ykapitan§! zna to miejsce. Czego szukacie?"
 grand_archive.8205.desc.default: "$grand_archive.8205.desc.common_1$\n\nSmarak! Rozmowa z jednoumysłowcami zajmie dwa razy więcej czasu.\n\n$grand_archive.8205.desc.common_2$"
 grand_archive.8205.desc.gestalt: "$grand_archive.8205.desc.common_1$\n\nSmarak! Rozmowa z innym umysłem zbiorowym zajmie dwa razy więcej czasu.\n\n$grand_archive.8205.desc.common_2$"
 grand_archive.8205.a: "Co to za miejsce?"
 grand_archive.8205.a.reply: "Smarak! Ta planeta to nasza siedziba. Żyjemy dwubezpiecznie, z dala od brutalnej galaktyki. Wcześniej łączy nas przemoc. Zabijanie, przestępczość, piractwo, robimy to wszystko. Ale już nie. Zajmujemy się hydroponiką.\n\nWcześniej jesteśmy uchodźcami. Nikt nas nie przyjmuje, dopiero §Ykapitan§!. Ona ratuje nas przed złym losem i pozwala dołączyć do swojej załogi. Kapitan daje nam nowe imię, a my w zamian opiekujemy się statkiem.\n\nSprzątamy, gotujemy, dbamy o amunicję, hydroponikę i ładunek. Pracujemy. Potem dołączamy do oddziału abordażowego. Chronimy kapitan, kiedy ona kradnie skarb albo kogoś porywa. Nigdy nie zdradzamy kapitan. Zawsze jesteśmy lojalni."
 grand_archive.8205.b: "Wiecie może, czym jest §Y$celestial_chart$§!?"
 grand_archive.8205.b.reply: "Smarak! Nie znamy żadnej mapy, nie opuszczamy naszej siedziby. Jeśli §Ykapitan§! robi mapę, która was tu doprowadzi, to na pewno nie bez powodu... Chce nam pomóc albo nas skrzywdzić. Nigdy nie mamy pewności. Kapitan to zagadka.\n\nKiedyś przysyła nam wiadomość. Kapitan dostarcza nam wielki posąg jej ulubionego drona, nazywa się $NAME_Smeegibb$, ona go pamięta i ratuje wcześniej. Jest imponujący, ale my nie wiemy, czemu ona go przysyła. Może chce przeprosić, ale nie dołącza listu."
 grand_archive.8205.c: "Opowiedzcie nam coś więcej o §Ykapitan§!."
 grand_archive.8205.c.reply: "Smarak! Wcześniej §Ykapitan§! nas ratowała. Wcześniej ona jest naszą mentorką i przywódczynią. Uczy nas opiekować się statkiem. Mówi \"$NAME_Smeegibb$, pracujecie jako kwatermistrz, mechanik i robotnik, macie wspaniałą wartość\".\n\nKapitan ma dwie zasady: \"Bogactwo to niezależność\" i \"Życie istnieje dla dziedzictwa\". Razem polujemy na bogatych i biednych. Zabieramy okrutnej galaktyce, co chcemy.\n\nAle wtedy kapitan robi się dwa razy chciwsza i nierozważna. Poświęca członków załogi albo zdradza ich za nagrodę. Kapitan traci wszystkich, ale $NAME_Smeegibb$ zostali. Zawsze jesteśmy wierni.\n\nOna pokazuje nam, jak brutalna jest galaktyka. Teraz wolimy trzymać się z dala."
 grand_archive.8205.d: "Dlaczego mapa doprowadziła nas tutaj?"
 grand_archive.8205.d.reply: "Smarak! Nie jesteśmy pewni, czemu §Ykapitan§! was tu sprowadziła. Ona nic nam nie mówi.\n\nJest jedna myśl. Jest miejsce, gdzie §Ykapitan§! i my chowamy się przed psami gończymi. Bezpieczna siedziba. Może coś tam znajdziecie."
 grand_archive.8210.name: "Znaleziono kryjówkę"
 grand_archive.8210.desc: "Istota, którą spotkaliśmy na świecie [from.GetName], $NAME_Smeegibb$, przekazała nam współrzędne opuszczonej kryjówki, którą zajmowała razem z §Y$NAME_CaptainNess$§!. Sprawdźmy to miejsce, może jest tam kolejna §Y$celestial_chart$§! albo przynajmniej wskazówka, która skieruje nas na właściwą drogę."
 grand_archive.8210.a: "Zacznijmy kopać."
 smeegibb_digsite_poi: "Sprawdźmy kryjówkę"
 smeegibb_digsite_poi_desc: "Na tym stanowisku archeologicznym może znajdować się klucz, dzięki któremu kolejna §H$celestial_chart$§! znajdzie się w naszych rękach. Musimy zbadać tę opuszczoną kryjówkę, jeśli chcemy znaleźć $TREASURE_TROVE$ §H$NAME_CaptainNess$§!."
 NAME_Bemat_cruiser_inax_01: "Hebehr"
 #Treasure Hunters Origin - Smeegibb
 smeegibb_digsite: "Stara kryjówka"
 smeegibb_digsite_desc: "Na lodowatych pustkowiach świata [fromfrom.planet.GetName] wykryliśmy niewielki schron wyposażony w uśpione systemy podtrzymywania życia i pomieszczenia mieszkalne. Obiekt jest mocno podniszczony i częściowo zakopany po tysiącleciach burz lodowych."
 grand_archive.8220.name: "Dziennik kapitan"
 grand_archive.8220.desc: "W odkopanej budowli znaleziono dowody na okresowe długotrwałe użytkowanie. Niegdyś nie brakowało tam podstawowych udogodnień. W całym budynku natrafiono na drobiazgi i błyskotki. Na stercie chaotycznie ułożonych papierów znajdował się wpis z dziennika, który osobiście sporządziła §Y$NAME_CaptainNess$§!.\n\n§LDokonaliśmy abordażu kolejnego perykańskiego transportowca i uprowadziliśmy go. Zginęło więcej przypadkowych osób, niż bym sobie życzyła, ale bywało gorzej. Nieźle zarobiliśmy, ale wciąż nie mamy klejnotu Tapico. Niestety, teraz Perykanie ponownie podnieśli nagrodę i zwrócili się o pomoc do Federacji. Robi się gorąco. Może powinniśmy się przyczaić na jakiś czas.§!"
 grand_archive.8220.a: "Szukajmy dalej."
 grand_archive.8225.name: "Zabijanie czasu"
 grand_archive.8225.desc: "Kopiąc pod budowlą, natrafiliśmy na niewielki magazyn kosztowności i podstawowe systemy sanitarne. Niestety, po dokładnym przeczesaniu terenu okazało się, że nie była tam przechowywana §Y$celestial_chart$§!.\n\nZgromadziliśmy notatniki i dokumenty, być może znajdziemy wskazówkę w gmatwaninie wpisów z dziennika §Y$NAME_CaptainNess$§!.\n\n§LZ takim partnerem jak $NAME_Smeegibb$ czas płynie szybciej, ale czy warto dzielić się chwałą? Jasne, praca z umysłem zbiorowym ma ogromne zalety. Dostęp do setek dronów w zamian za jeden udział w zyskach? Doskonały układ! Ale może ich praca umniejsza moje osiągnięcia? Nie wiem, czy jestem gotowa podzielić się moim dziedzictwem. Muszę to jeszcze przemyśleć.§!"
 grand_archive.8225.a: "$grand_archive.8220.a$"
 grand_archive.8230.name: "Coś do udowodnienia"
 grand_archive.8230.desc: "W szybie wentylacyjnym znaleźliśmy ukryty ostatni wpis z dziennika §Y$NAME_CaptainNess$§!.\n\n§LNie tak chciałam być zapamiętana. $NAME_Smeegibb$ to wierny towarzysz, ale nigdy nie przyznam, że jest mi potrzebny. Sama mogę zmierzyć się z całą galaktyką. Odcisnę MOJE piętno, to ja okryję się chwałą. I zdobędę bogactwa.\n\nZapamiętać: Żeby $NAME_Smeegibb$ o tobie nie zapomniał, lepiej mu coś wyślij.§!\n\nNic więcej nie znaleźliśmy. Nie ma innych śladów po kapitan, nie znalazła się też §Y$celestial_chart$§!.\n\nMoże wspomniany dar, który otrzymał $NAME_Smeegibb$, zawiera jakąś wskazówkę, gdzie znajduje się ostatni fragment. Musimy ponownie się z nim porozumieć."
 grand_archive.8230.a: "Miejsce oczyszczone."
 grand_archive.8236.name: "$NAME_Smeegibb$ zaginął."
 grand_archive.8236.desc.default: "$smeegibb_shelter_system_2_poi_desc$"
 grand_archive.8236.desc.xenophile: "$smeegibb_shelter_system_2_poi_desc$\n\nMamy nadzieję, że nasz nowy przyjaciel jest bezpieczny."
 grand_archive.8236.a: "Do układu [smeegibb_system.GetName]"
 grand_archive.8241.name: "$NAME_BlackNeedle$ powraca"
 grand_archive.8241.desc: "Duża flota pod banderą pirackiej organizacji §Y$NAME_BlackNeedle$§! została wykryta na orbicie świata [smeegibb_shelter.GetName]. Przypuszczamy, że ci piraci śledzili nasze działania i zniszczyli osiedle, w którym znajdował się umysł zbiorowy zwany $NAME_Smeegibb$. Zapewne §Y$celestial_chart$§! jeszcze nie wpadła w ich ręce i prowadzą poszukiwania.\n\nNa planecie nie ma śladu świadomych istot.\n\nIch jednostka flagowa próbuje nawiązać z nami łączność."
 grand_archive.8245.name: "$NAME_CaptainInax$ z floty $NAME_BlackNeedle$"
 grand_archive.8245.desc.inax.1: "§HTen stawonóg jest dumny, a jego oczy lśnią jasno. Powściągliwe zachowanie kontrastuje z nieustannie poruszającymi się żuwaczkami, które nieregularnie klikają i drżą z emocji.§!\n\nWreszcie się spotykamy. W jaki sposób wy, miękkopowłoczni, zdołaliście pokonać §Yk-k-kapitana Hoo§!? Nawet ten stary kretyn powinien był z łatwością zniszczyć waszą żałosną flotę. Zapłacicie za"
 grand_archive.8245.desc.inax.2: "Dz-dzi-dziękujemy za doprowadzenie nas tutaj. §Y$NAME_SilverQuill$§! poluje na kolektyw $NAME_Smeegibb$ od ponad stu cyklów. Zakończenie jednego z jego dawnych zatargów oznacza, że otrzymam wysoką nagrodę... Gdy tylko skończę z wami."
 grand_archive.8245.desc.ransacked: "$grand_archive.8245.desc.inax.1$ zniszcze-cze-nie naszej bazy na świecie [black_needle_base.GetName].\n\n$grand_archive.8245.desc.inax.2$"
 grand_archive.8245.desc.stolen: "$grand_archive.8245.desc.inax.1$ okradnięcie §YCz-cz-czarnej Igły§!.\n\n$grand_archive.8245.desc.inax.2$"
 grand_archive.8245.a: "Kim jesteś?"
 grand_archive.8245.a.reply: "M-m-mówcie mi Inax, jestem kontradmirałem §YCz-cz-czarnej Igły§!.\n\nPoznaliście imię tego, kto was z-z-zabije. To honorowa śmierć. Radzę się z tym pogodzić.\n\nZgodnie ze z-z-zwyczajem możecie nawet oddać pierwszy strzał."
 grand_archive.8245.b: "Zabiłeś $NAME_Smeegibb$..."
 grand_archive.8245.b.reply.common: "Nie byli żadnym wyzwaniem. Zbryzgaliśmy ich norę niebieską krwią mięczak-k-ka. Nie mieli floty, nie mieli broni... Prędzej czy później i tak k-k-toś by ich załatwił. Nikt przebity §YCzar-r-rną Igłą§! nie uchodzi z życiem.\n\nPrzyjaźniliście się? U-u-uroczo. Niebawem do nich dołączycie. Dzięki nam §Y$NAME_SilverQuill$§! zdobędzie tę mapę,"
 grand_archive.8245.b.reply.default: "$grand_archive.8245.b.reply.common$ wyrwiemy ją z waszych ciał drgających w konwulsjach."
 grand_archive.8245.b.reply.robot: "$grand_archive.8245.b.reply.common$ a wasze światła zamigocą i zgasną."
 grand_archive.8245.c: "Kim jest $NAME_SilverQuill$?"
 grand_archive.8245.c.reply: "Kim jest §Y$NAME_SilverQuill$§!? Cóż to za p-p-pytanie. To nasz legendarny założyciel i genialny przywódca. Zaczynał od jednego okrętu i zbudował potęgę §YCzar-r-rnej Igły§! obejmującą całą galaktykę.\n\nCzar-r-rna Igła niesie jego spuściznę dalej. Wasza śmierć stanie się kolejną nutą w naszej pieśni."
 grand_archive.8245.d: "Po co ci $celestial_chart$?"
 grand_archive.8245.d.reply: "Nie wiecie, co macie? To mapa do skarbu §Ykapitan Ness§!! To wszystkie k-k-kredyty i klejnoty, jakie zgromadziła.\n\nTe bogactwa należą do nas. Kiedy już je zdobędziemy, nasze imiona przejdą do historii. Każdy układ będzie drżeć przed §YCzar-r-rną Igłą§!... A dzięki wam uczynimy pierwszy k-k-krok. Czyż nie jesteśmy szczodrzy?"
 grand_archive.8245.e: "Tak łatwo się nie poddamy."
 grand_archive.8245.e.reply: "Zatem do dzieła! Wasze [this.species.GetRemnantNamePlural] będą moimi trofeami, które ofiaruję mojemu d-d-dowódcy."
 grand_archive.8265.name: "$grand_archive.8245.name$"
 grand_archive.8265.desc: "Pamiętna bitwa! Nie jesteście tacy s-s-słabi, na jakich wyglądacie! Dwukrotnie was zlekceważyliśmy, ale już nigdy nie popełnimy tego błędu. Kiedy znów się spotkamy, §YCz-cz-czarna Igła§! nie będzie się hamować.\n\nTo nie jest ostrzeżenie. To wyrok śmierci."
 grand_archive.8265.a.scared: "To niepokojące..."
 grand_archive.8265.a.homicidal: "Tylko spróbujcie."
 grand_archive.8265.a.gestalt: "Połączenie zakończone."
 gateway_to_ness_treasure_system_poi: "Prosto do mapy"
 gateway_to_ness_treasure_system_poi_desc: "§H$celestial_chart$§! jest już cała. Dzięki temu poznaliśmy położenie ostatniego ukrytego układu [Prev.GetName]. Nasze długie poszukiwania dobiegają końca. Udajmy się na miejsce i odkryjmy, co tam na nas czeka!"
 TREASURE_HUNTERS_CHART_PIECE_3_PROJECT: "Ukryta kapsuła"
 TREASURE_HUNTERS_CHART_PIECE_3_PROJECT_DESC: "Nasze śledztwo wykazało, że kolejna §H$celestial_chart$§! została ukryta gdzieś w zniszczonym osiedlu na świecie [this.GetName].\n\nBiorąc pod uwagę wytrzymałą konstrukcję pozostałych kapsuł, możemy śmiało założyć, że i ta przetrwała niedawne bombardowanie."
 grand_archive.8270.name: "Tajemnica posągu"
 grand_archive.8270.desc: "Czwarta §Y$celestial_chart$§!, a dokładnie czwarty fragment, został znaleziony na świecie [from.GetName]. Kapsuła była umieszczona w kamiennym posągu drona pochodzącego z nieistniejącego już umysłu zbiorowego zwanego $NAME_Smeegibb$. Napis na pomniku głosi:\n\n§L\"Dla mojego wiernego członka załogi w dowód wdzięczności. Niech twoja samotność będzie długa i spokojna\".§!\n\nPo odczytaniu czwartego kawałka mapy możemy kontynuować poszukiwania skarbu §Y$NAME_CaptainNess$§!."
 TREASURE_HUNTERS_ANCIENT_CAPSULE_4_PROJECT: "Ostatni fragment mapy"
 TREASURE_HUNTERS_ANCIENT_CAPSULE_4_PROJECT_DESC: "Po wydobyciu kapsuły z ruin osady, którą zamieszkiwał umysł zbiorowy $NAME_Smeegibb$, pozostaje nam tylko odszyfrować zawarte w niej dane, dzięki temu §H$celestial_chart$§! stanie się kompletna. Niebawem dowiemy się, co nas czeka na końcu szlaku §H$NAME_CaptainNess$§!."
 grand_archive.8280.name: "Mapa kompletna"
 grand_archive.8280.desc: "Odczytaliśmy ostatni fragment danych. §Y$celestial_chart$§! została skompletowana. W różnych węzłach rozbłysły punkty świetlne oznaczające miejsca, które do tej pory odkryliśmy. Następnie cztery światła równocześnie zamigotały i wskazały kolejny ukryty układ.\n\nDodanie ostatniego fragmentu danych odblokowało dodatkowe możliwości. To nie jest zwykła §Ymapa§! - przedstawia ona informacje o zaginionych bogactwach i nielegalnych skarbcach, które §Y$NAME_CaptainNess$§! posiadała w całej galaktyce. Część danych może być nieaktualna, ale to urządzenie prawdopodobnie może wykryć magazyny cennych skarbów ukryte we wszystkich naszych układach.\n\nPonadto §Ymapa§! zawiera wyceny każdego łupu, jaki kapitan zdobyła w trakcie swojej kariery. Te szczegółowe zapiski wyjaśniają, jak rozpoznać, wycenić i zaprezentować pozyskane kosztowności potencjalnym nabywcom, aby osiągnąć maksymalny zysk. Reaktywując urządzenie, poznamy projekt wyjątkowego skarbca, dzięki któremu nasze kolonie skorzystają z ogromnej wiedzy kapitan i stworzą wartość dodaną dla naszego imperium."
 grand_archive.8280.a.lom: "Bezcenny skarb."
 grand_archive.8285.name: "Prosto do mapy"
 grand_archive.8285.desc: "Cała §Y$celestial_chart$§! to wspaniała zdobycz imperium [this.GetName]. Poznawszy wszystkie jej tajemnice, zostaliśmy skierowani w jedno miejsce: do układu [gateway_to_ness_treasure_system.GetName].\n\nPokonawszy liczne przeszkody, znaleźliśmy się wreszcie o krok od celu. Pozostaje jedno pytanie: co czeka nas na końcu §Ymapy§!?\n\nNie ma gwarancji powodzenia, ale to zrozumiałe. Ruszajmy zakończyć tę przygodę!"
 grand_archive.8285.a.default: "Lećmy dalej."
 grand_archive.8285.a.lom: "Naprzód!"
 councilor_head_treasure_hunter: "Główny łowca skarbów"
 councilor_head_treasure_hunter_female: "$councilor_head_treasure_hunter$"
 councilor_head_treasure_hunter_desc: "§Y$celestial_chart$§!: $TITLE$ analizuje ją dokładnie. Udało się odnaleźć na niej ukryte magazyny i wycenić kosztowne artefakty."
 councilor_corporate_head_treasure_hunter: "$councilor_head_treasure_hunter$"
 councilor_corporate_head_treasure_hunter_female: "$councilor_head_treasure_hunter$"
 councilor_corporate_head_treasure_hunter_desc: "$councilor_head_treasure_hunter_desc$"
 prospect_of_treasure_modifier: "Potencjalny skarb"
 prospect_of_treasure_modifier_tt: "Daje §G+$@prospect_of_treasure_treasure_trove_reward|0%$§! $mod_treasure_trove_reward_mult$, §G+$@prospect_of_treasure_treasure_gatherers_produces|0%$§! $mod_planet_treasure_gatherers_produces_mult$ i §G+$@prospect_of_treasure_energy_produces|0$§! $mod_country_base_energy_produces_add$ za poziom $ruler$:\n\n"
 grand_archive.8290.name: "Przedsmak skarbów"
 grand_archive.8290.desc.chart: "Po stworzeniu skarbca na świecie [from.GetName] uważamy, że §Y$celestial_chart$§! ma potencjał do znaczącego wzmocnienia naszej gospodarki."
 grand_archive.8290.desc.trove: "$TREASURE_TROVE$ znaleziona na świecie [from.GetName] zawierała wiele zasobów, które właśnie dystrybuujemy. Teraz wiemy, że §Y$celestial_chart$§! ma potencjał do znaczącego wzmocnienia naszej gospodarki."
 grand_archive.8290.desc.default: "Żeby najlepiej wykorzystać możliwości §Ymapy§!, stworzyliśmy nowe stanowisko w Radzie, odpowiadające za nasze działania mające na celu znalezienie i pozyskanie skarbu."
 grand_archive.8290.desc.gestalt: "Żeby najlepiej wykorzystać możliwości §Ymapy§!, podjęliśmy działania, które umożliwią zwiększenie alokacji zasobów na rzecz znalezienia i pozyskania skarbu."
 grand_archive.8290.desc.chart.default: "$grand_archive.8290.desc.chart$\n\n$grand_archive.8290.desc.default$"
 grand_archive.8290.desc.chart.gestalt: "$grand_archive.8290.desc.chart$\n\n$grand_archive.8290.desc.gestalt$"
 grand_archive.8290.desc.trove.default: "$grand_archive.8290.desc.trove$\n\n$grand_archive.8290.desc.default$"
 grand_archive.8290.desc.trove.gestalt: "$grand_archive.8290.desc.trove$\n\n$grand_archive.8290.desc.gestalt$"
 grand_archive.8290.tt: "\n§EPozwala odblokować miejsce w radzie:§!\n§H$t$$councilor_head_treasure_hunter$§!\n$tt$$COUNCIL_POSITION_MODIFIER_BASE$\n$ttt$$mod_treasure_trove_reward_mult$: §G+$@councilor_head_treasure_hunter_treasure_trove_reward|0%$§!\n$ttt$$mod_planet_treasure_gatherers_produces_mult$: §G+$@councilor_head_treasure_hunter_treasure_gatherers_produces|0%$§!\n$ttt$$mod_country_base_energy_produces_add$: §G+$@councilor_head_treasure_hunter_energy_produces|0$§!\n$COUNCIL_POSITION_AVAILABLE_FOR$$t$$scientist_with_icon$ $commander_with_icon$"
 grand_archive.8300.name: "Brama pełna czerwi"
 grand_archive.8300.desc.common: "Ta brama zapewne doprowadzi nas do skarbu, którego od tak dawna szukamy."
 grand_archive.8300.desc.did_encounter_voidworms: "Mapa doprowadziła nas do nieznanej nam wcześniej czarnej dziury i układu zamieszkanego przez liczne $NAME_Voidworms$. Największe z nich założyły gniazdo w starej bramie kosmicznej, krążą wokół porzuconej budowli i strzegą jej zazdrośnie.\n\n$grand_archive.8300.desc.common$ Jeżeli chcemy dotrzeć do celu naszej wyprawy, te $NAME_Voidworms$ muszą zniknąć, po czym musimy naprawić bramę kosmiczną."
 grand_archive.8300.desc.didnt_encounter_voidworms: "Mapa doprowadziła nas do nieznanej nam wcześniej czarnej dziury i układu zamieszkanego przez liczne dziwne stworzenia. Największe z nich zebrały się w starej bramie kosmicznej, krążą wokół porzuconej budowli i strzegą jej zazdrośnie.\n\nTe ogromne istoty, przypominające czerwie nie znajdują się w naszych bazach fauny kosmicznej. W tej chwili próbujemy nawiązać z nimi łączność. $grand_archive.8300.desc.common$ Jeżeli chcemy dotrzeć do celu naszej wyprawy, musimy pozbyć się tych istot i naprawić bramę kosmiczną."
 grand_archive.8300.a: "Żadna przeszkoda nas nie zatrzyma."
 grand_archive.8300.a.pacifist: "Skoro to konieczne."
 grand_archive.8300.a.lom: "Salwa burtowa!"
 GATEWAY_VOIDWORMS_KILL_PROJECT: "$grand_archive.8300.name$"
 GATEWAY_VOIDWORMS_KILL_PROJECT_DESC: "§H$celestial_chart$§! doprowadziła nas do zasiedlonej §Hbramy gwiezdnej§! w układzie [this.solar_system.GetName]. Musimy pozbyć się tych stworzeń, zanim ponownie uruchomimy bramę kosmiczną i przekonamy się, co znajduje się po drugiej stronie."
 GATEWAY_VOIDWORMS_KILL_PROJECT_TT: "§RPokonaj stworzenia w układzie [this.solar_system.GetName]§!"
 GATEWAY_VOIDWORMS_DEBRIS_PROJECT: "$NAME_Voidworms$: Szczątki"
 GATEWAY_VOIDWORMS_DEBRIS_PROJECT_DESC: "Szczątki czerwi próżniowych w układzie [this.solar_system.GetName] dają niecodzienne odczyty na naszych czujnikach. W jednej z rozkładających się trójek wykryliśmy ślady życia. Powinniśmy wysłać tam statek badawczy, który to sprawdzi."
 grand_archive.8310.name: "Zgrupowanie czerwi próżniowych"
 grand_archive.8310.desc.did_encounter_voidworms: "W truchle jednego z czerwi próżniowych znaleziono gniazdo nimf. Mimo utraty pobratymców, zbliżyły się do naszych jednostek i zaczęły dryfować posłusznie obok naszej floty.\n\n$grand_archive.8310.desc.common$"
 grand_archive.8310.desc.didnt_encounter_voidworms: "W truchle jednego z wężowych stworzeń znaleziono gniazdo młodych. Mimo utraty pobratymców, zbliżyły się do naszych jednostek i zaczęły dryfować posłusznie obok naszej floty.\n\n$grand_archive.8310.desc.common$"
 grand_archive.8310.desc.common: "Gdybyśmy chcieli, możemy wykorzystać ich instynktowne przywiązanie: kiedy to zgrupowanie istot żyjących w próżni dojrzeje, może stać się dowodzoną przez nas imponującą flotą organiczną."
 grand_archive.8310.a: "Niesamowite znalezisko."
 grand_archive.8310.a.tt: "Zyskamy flotę: §Y$@gateway_voidworm_nymph_reward_count|0$ §2$epic$§!$voidworms_small_plural$§!."
 grand_archive.8310.b: "Łatwy łup."
 grand_archive.8315.name: "Zbadajcie technologię bramy kosmicznej"
 grand_archive.8315.desc: "Brama kosmiczna w układzie [FromFromFrom.System.GetName] jest nieaktywna. Podczas podejścia do tej pradawnej budowli §Y$celestial_chart$§! dostarczyła nam wielu informacji o tej zapomnianej technologii. Zrozumienie tej starożytnej metody transportu może okazać się przydatne w innych naszych przedsięwzięciach."
 RESEARCH_GATEWAY_ACTIVATION_PROJECT: "$grand_archive.8315.name$"
 RESEARCH_GATEWAY_ACTIVATION_PROJECT_DESC: "$grand_archive.8315.desc$"
 RESEARCH_GATEWAY_ACTIVATION_PROJECT_TT: "Wynalezienie technologii £physics£§Y$tech_gateway_activation$§!"
 grand_archive.8325.name: "Włączenie bramy kosmicznej"
 grand_archive.8325.desc.common: "Kiedy przywróciliśmy połączenie między układami, mapa nie pokazała niczego więcej. Niebawem poznamy skrywane przez nią tajemnice."
 grand_archive.8325.desc.tech: "Po wynalezieniu odpowiedniej technologii możemy ponownie uruchomić pradawną bramę kosmiczną w układzie [gateway_to_ness_treasure_system.GetName].\n\n$grand_archive.8325.desc.common$"
 grand_archive.8325.desc.kill.known: "Pozbyliśmy się tych stworzeń, teraz pozostaje ponownie uruchomić pradawną bramę kosmiczną w układzie [gateway_to_ness_treasure_system.GetName].\n\n$grand_archive.8325.desc.common$"
 grand_archive.8325.desc.kill.unknown: "$NAME_Voidworms$ nie są już problemem, teraz pozostaje ponownie uruchomić pradawną bramę kosmiczną w układzie [gateway_to_ness_treasure_system.GetName].\n\n$grand_archive.8325.desc.common$"
 ACTIVATE_GATEWAY_PROJECT: "$grand_archive.8325.name$"
 ACTIVATE_GATEWAY_PROJECT_DESC: "§H$celestial_chart$§! wskazuje nieaktywną §Hbramę kosmiczną§! w układzie [this.solar_system.GetName] jako ostatni cel podróży. Prawdopodobnie stamtąd można dostać się w jakieś bardzo ważne miejsce."
 ACTIVATE_GATEWAY_PROJECT_TT: "§HWłączenie bramy kosmicznej§!"
 grand_archive.8400.name: "Skarb!"
 grand_archive.8400.desc: "Po uruchomieniu bramy kosmicznej w miejscu, które wskazała §Y$celestial_chart$§!, odkryliśmy układ [ness_treasure_system.GetName]. Rozmieszczenie tamtejszych ciał niebieskich pasuje do rysunków znajdujących się w dzienniku §Y$NAME_CaptainNess$§!.\n\nNasza długa podróż prawie dobiegła końca."
 grand_archive.8400.a: "Lećmy dalej."
 ness_treasure_system_poi: "Przelećmy przez bramę kosmiczną w układzie [from.solar_system.GetName] "
 ness_treasure_system_poi_desc: "§H$celestial_chart$§! doprowadziła nas do ostatniego celu podróży, po drodze walczyliśmy z piratami i potworami. Brama kosmiczna jest już aktywna, pozostaje nam tylko przekonać się, co znajduje się po drugiej stronie."
 #Megastructure
 gateway_ness_ruined: "$gateway_ruined$"
 gateway_ness_ruined_DESC: "$gateway_ruined_DESC$"
 gateway_ness_ruined_MEGASTRUCTURE_DETAILS: "$gateway_ruined_MEGASTRUCTURE_DETAILS$"
 gateway_ness_restored: "$gateway_final$"
 gateway_ness_restored_DESC: "$gateway_final_DESC$"
 gateway_ness_restored_MEGASTRUCTURE_DETAILS: "$gateway_final_MEGASTRUCTURE_DETAILS$"
 NESS_GRAND_ARCHIVE: "Skarb $NAME_CaptainNess$"
 NESS_GRAND_ARCHIVE_HOARDED: "$NESS_GRAND_ARCHIVE$"
 grand_archive.8405.name: "Zasadzka!"
 grand_archive.8405.desc: "Byliśmy śledzeni.\n\nWłaśnie mamy przed sobą ogromną flotę, którą §Y$NAME_BlackNeedle$§! przysłała do układu [ness_treasure_system.GetName]. W porównaniu do naszego ostatniego spotkania, liczebność sił przeciwnika znacznie wzrosła, w formacji są teraz także przywrócone do działania stare okręty wojskowe i jednostki cywilne uzbrojone w nowoczesną broń. Wygląda na to, że zgromadzili do tego starcia większość swoich sił rezerwowych. Pośrodku floty znajduje się okręt flagowy, potężna jednostka klasy $titan$.\n\nWróg jest gotowy do walki, ale większość jego okrętów jeszcze nie aktywowała uzbrojenia. Wygląda na to, że chcą negocjować.\n\nOkręt flagowy próbuje się z nami połączyć."
 grand_archive.8405.a.lom: "Negocjujmy."
 grand_archive.8410.name: "Kapitan $NAME_CobaltQuill$, $NAME_BlackNeedle$"
 grand_archive.8410.desc: "§HMimo niewielkiego wzrostu, kapitan piratów emanuje pewnością siebie. Jego spojrzenie jest wyrachowane, skupione na nas jak na skomplikowanym równaniu.§!\n\nWreszcie się spotykamy. $NAME_CobaltQuill$, do usług. Jestem kapitanem wielkiej organizacji §Y$NAME_BlackNeedle$§! i skromnym potomkiem naszego założyciela zwanego $NAME_SilverQuill$. Od wielu lat byliście mi cierniem w boku, ale potrafię zachować rozsądek i dlatego mam dla was propozycję.\n\nOtrzymacie od nas sporą nagrodę za waszą kompletną mapę, a także pozwolimy wam zachować wasze nic nieznaczące życia.\n\nJeśli odmówicie, odbierzemy wam mapę siłą. Nie dość, że mamy przytłaczającą przewagę militarną, to przeniknęliśmy do waszego imperium w wielu kluczowych miejscach. Wystarczy mój rozkaz, aby obrócić wszystko w ruinę."
 grand_archive.8410.a: "Co proponujesz?"
 grand_archive.8410.a.reply: "Choć byliście źródłem wielu frustracji, jestem gotów zaproponować wam sowitą nagrodę w zamian za cały relikt §Y$NAME_CaptainNess$§!.\n\nJeżeli przyjmiecie tę szczodrą ofertę, przebaczę wam wasze wcześniejsze postępki. Nasz konflikt nie musi ciągnąć się dalej. Albo eskalować..."
 grand_archive.8410.b: "Grozisz nam..."
 grand_archive.8410.b.reply.common_1: "Wiem wszystko o imperium [this.GetName]. Znam wasze łańcuchy dostaw, położenie silosów z zasobami, rozmieszczenie waszych baz gwiezdnych. Wszystko zostało dokładnie skatalogowane."
 grand_archive.8410.b.reply.common_2: "Moi ludzie przeprowadzili dokładne analizy, więc dokładnie wiem, jak rozmontować wasze imperium. Zagłodzę wasze planety, ukradnę zapasy i zniszczę to, co zostanie. Oczywiście nie dojdzie do tego, jeśli dacie mi to, czego chcę..."
 grand_archive.8410.b.reply.default: "$grand_archive.8410.b.reply.common_1$\n\nObserwuję wszystkie zaufane osoby z waszego przywództwa, a także ich bliskich...\n\n$grand_archive.8410.b.reply.common_2$"
 grand_archive.8410.b.reply.hive_mind: "$grand_archive.8410.b.reply.common_1$\n\nŚledzę każdy ważny węzeł waszego umysłu zbiorowego i dowiaduję się, kiedy powstaje jakiś nowy.\n\n$grand_archive.8410.b.reply.common_2$"
 grand_archive.8410.b.reply.machine: "$grand_archive.8410.b.reply.common_1$\n\nMam tylne wejście do waszej matrycy lokalizacji, śledzę pozycję wszystkich ważnych węzłów waszej sieci.\n\n$grand_archive.8410.b.reply.common_2$"
 grand_archive.8410.c: "Zatem po co zawracać sobie głowę negocjacjami?"
 grand_archive.8410.c.reply: "Operacja sabotażowa na taką skalę wiąże się z ogromnymi kosztami. Utrzymanie statków, wynagrodzenia, łapówki... To drogie rzeczy, a ja nie zostałem bogaczem, szastając pieniędzmi na lewo i prawo. Jest też znaczny koszt alternatywny związany ze zniszczeniem, które mógłbym na was sprowadzić naciśnięciem jednego przycisku.\n\nZnam lepsze sposoby na wydawanie moich ciężko zarobionych pieniędzy. Proszę, uniknijmy dalszego, bezsensownego rozlewu krwi. Zatrzymajcie wasze nowe bogactwa, a piractwo zostawcie ekspertom."
 grand_archive.8410.d: "Nie chodzi tylko o kredyty, prawda?"
 grand_archive.8410.d.reply: "5000 lat temu mój przodek, wielki $NAME_SilverQuill$, był pierwszym oficerem u $NAME_CaptainNess$. Przez wiele lat wiernie jej służył, a jak ona mu się odpłaciła?\n\nZdradą!\n\nWydała go władzom i zgarnęła za to nagrodę! Ale oczywiście wspaniały $NAME_SilverQuill$ nie dałby się zamknąć na długo w żadnym więzieniu.\n\nPo brawurowej ucieczce powstał z popiołów i sprawił, że jego załoga ze zwykłej bandy stała się legendą noszącą nazwę $NAME_BlackNeedle$. To z nią macie dziś do czynienia. Przysiągł zemścić się na zdradzieckiej $NAME_CaptainNess$, poświęcił swe życie na grabienie jej skarbów i zakopanie jej dziedzictwa pod ogromem swoich sukcesów.\n\nJa tylko kończę to, co on zaczął. Ta mapa ma kluczowe znaczenie dla odzyskania naszej prawowitej własności.\n\nZatem proszę, oddajcie mi ją."
 grand_archive.8415.name: "Odważna propozycja"
 grand_archive.8415.desc: "Przywódca organizacji §Y$NAME_BlackNeedle$§! złożył nam propozycję, chce przekazać nam dużą nagrodę, jeśli §Y$celestial_chart$§! trafi w jego ręce. Gdybyśmy się zgodzili, oddamy mu klucz do skarbu §Y$NAME_CaptainNess$§!.\n\nOdrzucenie tej oferty sprowadzi na nas gniew tych piratów. Nie wiemy, w jakim stopniu udało im się przeniknąć w nasze szeregi, ale grożą, że całkowicie rozmontują od środka imperium [this.GetName]. Trudno powiedzieć, czy nie są to groźby bez pokrycia."
 grand_archive.8415.a: "Odrzućcie ich propozycję."
 grand_archive.8415.b: "§Y$celestial_chart$§! zostanie sprzedana."
 grand_archive.8415.b.effect_tt: "Strata: §Y$celestial_chart$§!\nZyskasz §G+$@max_credit_mult|0%$§! twojej maksymalnej $r_energy$\n§Y$NAME_BlackNeedle$§! przekaże ci okręt."
 grand_archive.8500.name: "Zawarto porozumienie"
 grand_archive.8500.desc: "§Y$celestial_chart$§! została oddana w zamian za sporą sumę ($MONEY$) oraz wyjątkowy okręt flagowy o nazwie §YUcho Igielne§!. Możemy uznać, że nasz spór z organizacją §Y$NAME_BlackNeedle$§! został raz na zawsze zażegnany.\n\nUniknęliśmy wielkiego starcia z pełną potęgą jej flot i zapobiegliśmy sabotażowi na galaktyczną skalę.\n\nLepiej zostawmy piractwo piratom."
 grand_archive.8500.a: "Teraz nic tu po nas."
 grand_archive.8500.a.tt: "Wszystkie okręty zostały wyrzucone z układu $TREASURE_TROVE$."
 HOARD_LOOTED_BY_PIRATES: "Ta budowla została złupiona przez piratów i nie ma w niej niczego wartościowego."
 grand_archive.8505.name: "Sabotaż!"
 grand_archive.8505.desc: "§Y$NAME_BlackNeedle$§! rozpoczęła zmasowany atak, wywołując chaos w naszych układach. Linie montażowe stanęły, generatory spaliły się, a administracyjna infrastruktura krytyczna została wyłączona. Dostawy znikają, wyczyszczono dane na stacjach badawczych, a w kopalniach dochodzi do zawalisk pięciokrotnie częściej niż zwykle.\n\nZniszczenia są wszędzie, to wynik podstępnych działań tysięcy współpracujących ze sobą agentów. W naszych koloniach ukrywa się ogromna sieć sabotażystów, która wydaje się wyprzedzać nas o krok."
 grand_archive.8505.a: "Czerwony alarm!"
 situation_sabotage: "Sabotażyści Czarnej Igły"
 situation_sabotage_type: "$situation_sabotage$"
 situation_sabotage_desc: "W naszych koloniach działa rozległa, tajna siatka sabotażystów z organizacji §Y$NAME_BlackNeedle$§! i sieje zamieszanie w całym imperium [owner.GetName]. Jeżeli nie pozbędziemy się tych agentów, dojdzie do zerwania naszych łańcuchów zaopatrzenia."
 situation_sabotage_monthly_change_tooltip: "$situation_monthly_change_tooltip_approaches_dependent$"
 approach_sabotage_do_nothing: "Nic nie róbmy"
 approach_sabotage_do_nothing_tt: "Nie podejmiemy żadnych szczególnych kroków."
 approach_sabotage_purge: "Zlikwidować sabotażystów"
 approach_sabotage_purge_tt: "Wykrycie agentów działających w naszych szeregach doprowadzi do nieuchronnych szkód ubocznych."
 approach_sabotage_mitigate: "Ograniczenie szkód"
 approach_sabotage_mitigate_tt: "Możemy podjąć działania mające na celu odbudowę infrastruktury z nadzieją, że prędzej wyczerpie się potencjał ataku sabotażystów."
 finisher_effects_sabotage: "Usuniemy sabotażystów z Czarnej Igły i uniemożliwimy im wzmocnienie blokady wokół skarbca Kapitan Ness."
 finisher_effects_sabotage_fail: "Nasza infrastruktura zostanie nieodwracalnie uszkodzona, a Czarna Igła wzmocni blokady wokół skarbca kapitan Ness."
 grand_archive.8520.name: "Wykryto siatkę sabotażystów"
 grand_archive.8520.desc.common: "Przechwyciliśmy tajną częstotliwość łączności, której §Y$NAME_BlackNeedle$§! używa w naszych koloniach. Po odszyfrowaniu ich wiadomości zdołaliśmy namierzyć wszystkich zdradzieckich spiskowców i sabotażystów."
 grand_archive.8520.desc.machine: "$grand_archive.8520.desc.common$\n\nIch agenci potajemnie infekowali nasze systemy operacyjne złośliwym oprogramowaniem, tworząc w ten sposób uśpioną armię zbuntowanych jednostek zajmujących różne stanowiska w naszych układach.\n\nOperacja ze złośliwym oprogramowaniem zaszła tak daleko, że wrogowi udało się zarazić jeden z najważniejszych węzłów imperium [root.GetName], §Y[traitor_leader.GetClass] [traitor_leader.GetName]§!."
 grand_archive.8520.desc.hive: "$grand_archive.8520.desc.common$\n\nIch agenci dosłownie zalewali stacje mieszkalne feromonami dysocjacyjnymi, przez co u wielu naszych dronów wykształciły się pewne skryte wykolejenia. Następnie piraci zorganizowali nasze drony w komórki uśpionych agentów, które w tej chwili niszczą naszą infrastrukturę.\n\nTa operacja miała tak wielki zasięg, że wrogowi udało się zakłócić działanie jednego z najważniejszych niezależnych węzłów imperium [root.GetName], §Y[traitor_leader.GetClass] [traitor_leader.GetName]§!."
 grand_archive.8520.desc.default: "$grand_archive.8520.desc.common$\n\nUstaliliśmy, że ich agenci od lat werbowali niezadowolonych obywateli, przygotowując ten potężny atak uśpionych komórek i innych jednostek gotowych zwrócić się przeciwko nam.\n\nJednym ze zdrajców jest §Y[traitor_leader.GetClass] [traitor_leader.GetName]§!, co stanowi poważne zagrożenie dla naszego bezpieczeństwa. Musimy zająć się tym spiskowcem, a jednocześnie nie możemy wywołać destabilizacji. Jeśli opinia publiczna pozna ten poziom korupcji, konsekwencje dla naszego rządu mogą być poważne."
 grand_archive.8520.a.default: "Stracić zdrajców."
 grand_archive.8520.a.machine: "Wyłączyć wykolejone jednostki."
 grand_archive.8520.a.hive: "Usunąć wykolejone jednostki."
 grand_archive.8520.a.tt: "Na każdej zasiedlonej planecie zostaje zabitych §R100§! £pop£ §Hpopulacji§!."
 grand_archive.8520.b.default: "Wysłać zdrajców na reedukację."
 grand_archive.8520.b.machine: "Przeprogramować wykolejone jednostki."
 grand_archive.8520.b.hive: "Ponownie zasymilować wykolejone jednostki."
 grand_archive.8520.c: "Ujawnić tożsamość zdrajców."
 grand_archive.8525.name.default: "Stracono zdrajcę"
 grand_archive.8525.name.hive: "Wyeliminowano wykolejoną jednostkę"
 grand_archive.8525.name.machine: "Zlikwidowano jednostkę"
 grand_archive.8525.desc.common: "Po wykryciu powiązań tej osoby z piratami z organizacji §Y$NAME_BlackNeedle$§!"
 grand_archive.8525.desc.default: "$grand_archive.8525.desc.common$, została ona stracona ([traitor_leader.GetName]).\n\nNie ujawniono dokładnych okoliczności śmierci."
 grand_archive.8525.desc.hive: "$grand_archive.8525.desc.common$, [traitor_leader.GetName]: zlikwidowano."
 grand_archive.8525.desc.machine: "$grand_archive.8525.desc.common$, [traitor_leader.GetName]: zgładzono."
 grand_archive.8525.a: "To było konieczne."
 grand_archive.8530.name.default: "Reedukowano zdrajcę"
 grand_archive.8530.name.hive: "Reedukowano wykolejoną jednostkę"
 grand_archive.8530.name.machine: "Przeprogramowano jednostkę"
 grand_archive.8530.desc.default: "$grand_archive.8525.desc.common$, [traitor_leader.GetName] jest już po skorygowaniu.\n\nNiestety, ten proces reedukacji zostawił trwałe, negatywne wrażenie na: [traitor_leader.GetName]."
 grand_archive.8530.desc.hive: "$grand_archive.8525.desc.common$, [traitor_leader.GetName] jest już po skorygowaniu.\n\nNiestety, ten proces ponownej asymilacji zostawił trwałe, negatywne wrażenie na: [traitor_leader.GetName]."
 grand_archive.8530.desc.machine: "$grand_archive.8525.desc.common$, [traitor_leader.GetName] jest już po przeprogramowaniu.\n\nNiestety, ten proces ponownego formatowania zostawił trwałe, negatywne wrażenie na: [traitor_leader.GetName]."
 grand_archive.8530.a.tt: "[traitor_leader.GetName] zyskuje 2 poziomy negatywnych cech."
 grand_archive.8535.name: "[traitor_leader.GetName] nie żyje"
 grand_archive.8535.desc: "$grand_archive.8525.desc.common$, wściekli obywatele imperium [root.GetName] zebrali się na zorganizowanych protestach. Tłum zaatakował dom tej osoby. Przybyłe służby znalazły ją martwą."
 grand_archive.8536.name: "Zdrajca odpokutowuje"
 grand_archive.8536.desc: "$grand_archive.8525.desc.common$, osoba ta wygłosiła publiczne oświadczenie, w którym wyraziła głęboki żal za swoje działania. Sprawa odcisnęła się piętnem na jej zdolnościach przywódczych.\n\nMimo wcześniejszych uczynków [traitor_leader.GetName] może liczyć na przebaczenie ze strony obywateli imperium [root.GetName]."
 grand_archive.8536.a: "To miłe wydarzenie."
 grand_archive.8536.a.tt: "[traitor_leader.GetName] zyskuje poziom negatywnych cech."
 grand_archive.8545.name: "Zapaść infrastruktury"
 grand_archive.8545.desc: "Niestety, nie udało nam się pokrzyżować niszczycielskich planów organizacji §Y$NAME_BlackNeedle$§!. Sabotażyści uszkodzili naszą infrastrukturę logistyczną tak poważnie, że nie da się jej już naprawić, a odbudowa łańcuchów dostaw potrwa wiele lat. Szkody wyrządzone w naszych układach są tak ogromne, że nie zdołamy ich ograniczyć.\n\nJednak §Y$NESS_GRAND_ARCHIVE$§! i tak znajdzie się w naszych rękach. Wystarczy tylko pokonać piratów w bitwie, a będzie nasz."
 grand_archive.8545.a: "Walka jeszcze się nie skończyła."
 grand_archive.8550.name: "Silniejsi niż sabotaż"
 grand_archive.8550.desc: "Choć §Y$NAME_BlackNeedle$§! dołożyła ogromnych starań, aby sabotować naszą infrastrukturę, podnieśliśmy się i ustabilizowaliśmy sytuację. Agenci zostali wyeliminowani, pozostaje tylko zmierzyć się z ich flotą zgromadzoną w układzie [hoard_system.GetName] i przejąć §Y$NESS_GRAND_ARCHIVE$§! na rzecz imperium [root.GetName]."
 grand_archive.8550.a: "Niech się stanie."
 grand_archive.8555.name: "$NAME_BlackNeedle$ pokonana"
 grand_archive.8555.desc: "§Y$NAME_BlackNeedle$§! nie miała żadnych szans z naszą potęgą militarną. Zgromadzone floty nieprzyjaciela zostały pokonane, więc nie może on dłużej prowadzić działań sabotażowych w naszych układach. Teraz możemy przejąć §Y$NESS_GRAND_ARCHIVE$§! na rzecz imperium [root.GetName]."
 grand_archive.8555.a: "Żałosny wysiłek."
 grand_archive.8555.a.lom: "Żałosne szczury lądowe."
 TREASURE_HUNTERS_BLACK_NEEDLE_PROJECT: "Ostatnia reduta organizacji $NAME_BlackNeedle$"
 TREASURE_HUNTERS_BLACK_NEEDLE_PROJECT_DESC: "Po zmasowanych atakach sabotażowych na układy imperium [root.GetName] $NAME_BlackNeedle$ utrzymuje blokadę, przez co §H$NESS_GRAND_ARCHIVE$§! jest niedostępny. Przeciwnik wykorzystał większość swoich zasobów i jest osłabiony. Jeżeli tutaj go pokonamy, ich organizacja z pewnością zadrży w posadach, a to pozwoli nam przejąć skarb."
 TREASURE_HUNTERS_BLACK_NEEDLE_PROJECT_TOOLTIP: "§RPokonaj organizację $NAME_BlackNeedle$ w układzie [solar_system.GetName].§!"
 grand_archive.8560.name: "$grand_archive.8410.name$"
 grand_archive.8560.desc: "Dzieci Ness... co za ironia.\n\nWiecie, że ona was wybrała?\n\nMiała do dyspozycji setki gatunków... a wybrała was. Może dostrzegła w was coś wyjątkowego, a może to kompletny przypadek. W każdym razie jest, jak jest.\n\nWygraliście... na razie. Nie lekceważcie skutków tego zwycięstwa. Staliśmy się waszymi potężnymi wrogami. §Y$NAME_BlackNeedle$§! nie wybacza i nie zapomina.\n\nPrzetrwamy, podobnie jak moi przodkowie. Kawałek po kawałku odbudujemy to, co straciliśmy. Nawet jeśli zajmie to tysiąc albo i milion lat, wrócimy i odzyskamy wszystko, co nam odebraliście.\n\n$NAME_BlackNeedle$ będzie istnieć wiecznie! Wiecznie!"
 grand_archive.8560.a: "Czas pokaże."
 grand_archive.8560.a.lom: "Spadajcie, głąby."
 CAPTAIN_NESS_HOARD_PROJECT: "Skarbiec kapitan Ness"
 CAPTAIN_NESS_HOARD_PROJECT_DESC: "§H$NESS_GRAND_ARCHIVE$§! jest w zasięgu ręki.\n\nChociaż wygląda na opuszczony, wiele systemów w budynku wciąż działa. Znając opowieści o charakterze §H$NAME_CaptainNess$§!, powinniśmy uważać na nieoczekiwane zabezpieczenia.\n\nJedyne wejście do skarbca ma wgłębienie na głównym włazie. Pasuje do niego §H$celestial_chart$§!, zapewne w ten sposób otworzymy tę tajemniczą placówkę."
 grand_archive.8565.name: "Skarb $NAME_CaptainNess$"
 grand_archive.8565.desc: "§Y$celestial_chart$§! to klucz, a skarbiec był zamkiem. Umieściliśmy mapę w głównym włazie superkonstrukcji.\n\nAktywowała się, przesuwając w swoim wnętrzu pojedynczą wiązkę światła ku każdej gwieździe z naszej podróży. Starożytna maszyneria obudziła się do życia i wkrótce znaleźliśmy się w środku.\n\nPodłogę i ściany zdobią niesamowite skarby złupione z tysięcy światów. Delikatne posągi kontrastują z bronią szturmową stworzoną z drogocennych metali. Przepiękna biżuteria zwisa z kończyn starożytnych skamielin, skomplikowane urządzenia leżą zaś rzucone na bezładny stos.\n\nW centralnym korytarzu rozlegają się metaliczne kroki. Podchodzi do nas wypełniona płynem metaliczna maszyna, uniósłszy ręce w geście poddania się. Jej obwody mowy uruchamiają się, trzeszcząc:\n\n§L\"A więc... znaleźliście moją mapę. Proszę, jacy jesteście sprytni!\"§!"
 grand_archive.8565.a: "Nawiąż komunikację."
 grand_archive.8565.a.lom: "Ahoj, pani kapitan!"
 grand_archive.8570.desc: "§HChoć robotyczna forma maszyny znanej jako kapitan Ness jest w stanie wyrażać emocje jedynie w ograniczony sposób, czuć, że traktuje nas z niejaką wyższością. Jej metaliczne ciało nie wykazuje żadnych oznak zużycia, jak gdyby było niedawno stworzone. Mówi tonem cierpliwym, lecz mentorskim, jakby zwracała się do kogoś niższego stanu.§!\n\nPodejrzewam, że powinnam się wam przedstawić, choć być może odgadliście już, kim jestem.\n\nZwę się - a w każdym razie zwałam - Saanda Ness. Dawna piracka królowa galaktyki, obecnie zaś lokatorka tego składowiska złomu.\n\n§HMaszyna urywa na moment i przygląda się nam badawczo.§!\n\nDawno już nie widziałam nikogo waszego gatunku. Taki był prymitywny, a jak ładnie dorósł!\n\nMuszę przyznać, że jestem pod wrażeniem, że tu dotarliście."
 grand_archive.8570.a: "Jakim cudem żyjesz?"
 grand_archive.8570.a.reply_fallen_empire: "Nieśmiertelność nie jest rzeczą tanią. [fallen_empire.GetRealName], a właściwie ich naukowcy, wzięli kilka milionów kredytów za dyskretny transfer mojej świadomości. Poszło im to nieźle, choć nie jestem już w stanie tańczyć równie dobrze, jak kiedyś.\n\n$grand_archive.8570.a.reply$"
 grand_archive.8570.a.reply_curator: "Nieśmiertelność nie jest rzeczą tanią. $NAME_Curator_Order$, a właściwie ich naukowcy, wzięli kilka milionów kredytów za dyskretny transfer mojej świadomości. Poszło im to nieźle, choć nie jestem już w stanie tańczyć równie dobrze, jak kiedyś.\n\n$grand_archive.8570.a.reply$"
 grand_archive.8570.a.reply: "§HMaszyna aktywuje konsolę, ujawniając ukryte w ścianie pomieszczenie. Znajduje się tam niezwykle stara kriokapsuła, wewnątrz niej zaś - szczątki organicznej istoty.§!\n\nOto ja. To już tylko bezużyteczna ozdoba, ale jestem nieco sentymentalna. Ładna byłam, czyż nie?\n\nKiedy sprawdziłam, czy wszystko jest na miejscu, zamknęłam skarbiec i wyłączyłam się na kilka tysięcy lat. Następne, co pamiętam, to jak otworzyliście wejście. A teraz sobie rozmawiamy. Czuję się, jakbym ledwie wczoraj poszła spać..."
 grand_archive.8570.b: "Skąd masz cały ten skarb?"
 grand_archive.8570.b.reply: "Większość ukradłam. Albo wymieniłam za inne nieuczciwie pozyskane towary. Swego czasu okradałam wszystkich dużych graczy w galaktyce. Frachtowce, broń klasy Kolos, wymieńcie cokolwiek - porywałam wszystko. Uważałam, że jeśli mogę coś komuś z łatwością zabrać, to znaczy, że temu komuś na tym nie zależy.\n\nCzasami robiło się... nieprzyjemnie. Wiecie, co stało się z ytteritami. To mi otworzyło oczy.\n\nZabawa jest przednia, dopóki nie przestanie być zabawnie..."
 grand_archive.8570.c: "Dlaczego wybrałaś właśnie nas?"
 grand_archive.8570.c.reply: "Uwierzycie, jeśli powiem, że czułam się samotna?\n\n§HObwody mowy maszyny wydają z siebie trzeszczenie, które jest być może śmiechem.§!\n\nMiałam całą masę skarbów, ale co z tego? Co mi właściwie po nich? Zdałam sobie sprawę, że nie potrzebuję bogactwa, a spuścizny. Tyle że tej się nie da ukraść. Więc jak ją zdobyć?\n\nNo i nadarzyła się okazja. Znalazłam kilka najbardziej obiecujących prymitywnych gatunków i podrzuciłam na ich świat skarb. I jesteśmy tu teraz.\n\nMoże wasz rodzaj zdoła zrobić to, co nie udało się mnie - dobrze to wszystko wykorzystać."
 grand_archive.8570.d: "Dlaczego to wszystko oddajesz?"
 grand_archive.8570.d.reply: "Już mówiłam. Przekazuję pałeczkę. Nie jestem dobra w wydawaniu pieniędzy, a w ich zabieraniu.\n\nTyle że nie mogłam ich dać ot tak, byle komu. To musiał być ktoś na tyle sprytny, żeby znaleźć to miejsce. Załoga, z której mogłabym być dumna. Której mogłabym opowiedzieć swoją historię..."
 grand_archive.8570.e: "Jaka jest twoja historia?"
 grand_archive.8570.e.reply: "Cóż, skoro pytacie...\n\n§HMaszyna aktywuje konsolę i na ścianie zaczynają wyświetlać się cyfrowe nagrania.§!\n\nCały ten skarbiec jest moją biografią. Zapłaciłam masę pieniędzy zespołowi twórców, aby nagrali każdą chwilę mojego życia, którą dało się zapamiętać. Myślę, że zrobili niezłą robotę.\n\n§HNa ścianie pojawia się widok obsadzonego przez piracką załogę kokpitu. Dowodzi nią biologiczna forma kapitan Ness. Z obwodów mowy maszyny wyrywa się krótki trzask; wydaje się, że był on westchnieniem.§!\n\nByłam niegdyś budzącą największy w galaktyce strach piratką. Bankrutowały przeze mnie megakorporacje, wymuszałam okupy od planet i obracałam całe imperia w ruinę. Każdy głupi na tyle, żeby stawić mi czoła, przekonywał się szybko, że jego [root.GetSpeciesOrganName] jest celem dla mojego ostrza. Albo był sprzedawany za solidną gotówkę. Nagroda za moją głowę? Była astronomiczna."
 grand_archive.8570.f: "Mów dalej, proszę."
 grand_archive.8570.f.reply: "§HNa ścianie wyświetlają się w towarzystwie podniosłej muzyki najróżniejsze napady, włamania i śmiałe ucieczki.§!\n\nNa początku dobierałam swoje cele bardzo uważnie i znajdowałam sobie usprawiedliwienia, czemu zasługiwały na swój los. Każda robota była bardziej ekscytująca od poprzedniej. To był cykl: planowanie, demonizowanie, okradanie, wreszcie świętowanie. Rzecz w tym, że szukanie \"niegrzecznych\" celów było zbyt czasochłonne. Musiałam poszerzyć horyzonty.\n\nNa sam koniec, gdy czegoś chciałam, po prostu sobie to brałam. Lubiłam patrzeć, jak rosną liczby - zarówno cena za moją głowę, jak i wartość mojego łupu. Odciskałam w świecie swoje piętno i miałam pozostać niezapomniana. Nic innego się dla mnie nie liczyło."
 grand_archive.8570.g: "I co się zmieniło?"
 grand_archive.8570.g.reply: "§HNa ścianie pojawia się zniszczony świat ytteritów.§!\n\nPóźniej wydarzył się incydent yttericki... Widzieliście ich świat, prawda? Wciąż pamiętam krzyki przez radio, kiedy umierali ostatni z nich. Sprawy posunęły się za daleko. Nadszedł czas na zmiany.\n\nPodczas swojej kariery odkryłam pewien wzorzec: historia i lekcje, jakich udziela, zostają zapomniane. A na twoje miejsce zjawia się ktoś inny. Chciałam móc po prostu wybrać, kto znajdzie się na moim.\n\nBędziecie to wy, [root.GetSpeciesNamePlural]. Zdaliście test. A co będzie dalej - to już wasza rzecz."
 grand_archive.8575.name: "Niezmierzone bogactwa"
 grand_archive.8575.desc.default: "§Y$NESS_GRAND_ARCHIVE$§! skrywa niesamowite bogactwa. Musimy jednak rozważyć konsekwencje ich przejęcia.\n\nKażdy kredyt tego skarbu został zdobyty nielegalnie. Pozyskanie tych zasobów oznaczałoby, że jesteśmy gotowi przymknąć oko na zbrodnie, jakich dopuściła się $NAME_CaptainNess$, dla własnych materialnych korzyści.\n\nTo powiedziawszy, wielu z tych, którzy zostali przez nią skrzywdzeni, już dawno nie żyje. Zabierając te bogactwa dla siebie, nie przysparzamy światu nowych ofiar. Co więcej, dzięki nam §Y$NAME_BlackNeedle$§! uległa zdziesiątkowaniu, co uczyniło galaktykę o wiele bezpieczniejszą. Można uznać, że po przebyciu tak długiej i niebezpiecznej drogi zasługujemy na pokaźną nagrodę za wszelkie trudy.\n\nMusimy podjąć decyzję, co zrobić z zawartością skarbca."
 grand_archive.8575.desc.lom: "§Y$NESS_GRAND_ARCHIVE$§! skrywa wspaniały skarb, który z chęcią weźmiemy dla siebie.\n\nTo zasłużona nagroda za to, że §Y$NAME_BlackNeedle$§! już nie istnieje. Niech żyje [this.GetName]!\n\nOpróżnijmy ten skarbiec. [This.Species.GetHandNamePlural] - do pracy!"
 grand_archive.8575.a.default: "Przejmijcie go dla nas."
 grand_archive.8575.a.lom: "Przejmijmy nagrodę, na którą zapracowaliśmy."
 grand_archive.8575.b: "Zwróćcie właścicielom rzeczy, których pochodzenie można ustalić."
 grand_archive.8575.c: "Rozdystrybuujcie to bogactwo po całej galaktyce."
 grand_archive.8580.name: "Nasz patron"
 grand_archive.8580.desc.1: "§HMaszyna znana obecnie jako §Y$NAME_CaptainNess$§! była pod wrażeniem tego, jak szybko opróżniliśmy jej skarbiec.§!\n\nNie krępujcie się, należy wam się to wszystko. Ten skarb jest okupiony krwią, potem i łzami. Nie wydajcie wszystkiego w jednym miejscu."
 grand_archive.8580.desc.2: "§HMaszyna znana jako §Y$NAME_CaptainNess$§! wyraziła zaniepokojenie naszą chęcią oddania właścicielom części jej z trudem zdobytego skarbu.§!\n\nCo za rozczarowanie. Czyli jakiś dziedzic w piętnastym pokoleniu otrzyma stare klejnoty swojego przodka. Cóż, miejmy nadzieję, że to, co zostanie, wykorzystacie na godniejszy projekt. Mimo wszystko ufam, że zrobicie to, jak trzeba."
 grand_archive.8580.desc.3: "§HMaszyna znana jako §Y$NAME_CaptainNess$§! nie kryła obrzydzenia, usłyszawszy, że chcemy rozdać cały jej skarb.§!\n\nI to jest wasz wielki plan? Pieniądze za nic dla wszystkich? Co oni zrobili, żeby na nie zasłużyć? Marnotrawstwo!\n\nMiałam was za lepszych... Dajcie mi chociaż do dyspozycji część swojej floty, żebym mogła spróbować zacząć od nowa."
 grand_archive.8580.desc.default: "§HPozostaje wciąż pytanie, jakiego losu ma doczekać sama $NAME_CaptainNess$. Jako doświadczona pilotka, która przetrwała mnóstwo niebezpiecznych starć, stanowiłaby doskonały dodatek do naszej floty jako komandorka. Mogłaby również przyjąć rolę bardziej pomocniczą i zająć się szkoleniem nowego pokolenia pilotów.§!"
 grand_archive.8580.desc.no_lom: "§HO ile, rzecz jasna, po prostu jej nie zamkniemy, udowadniając tym samym naszym obywatelom, że żadne przestępstwo nie pozostanie nieukarane. Miałaby wiele czasu na przemyślenie sobie tego, co zrobiła.§!"
 grand_archive.8580.desc.gestalt: "§HPozostało już tylko zdecydować, jakiego losu ma doczekać sama $NAME_CaptainNess$. Jako potężny, niezależny umysł zapewniłaby nam jako komandorka wielkie korzyści, zna się bowiem na kreatywnych strategiach, jakie pozwoliłyby nam zaskoczyć przeciwników. Możemy też wykorzystać jej szerokie doświadczenie bojowe i włączyć je do naszej zbiorowej wiedzy, aby dzięki temu poszerzyć nasze ogólne zrozumienie spraw wojennych.\n\nO ile, rzecz jasna, po prostu jej nie uwięzimy, aby jasnym było, że [this.GetName] nie toleruje przestępczości i odszczepieństwa.§!"
 grand_archive.8580.a: "Przydałabyś się nam jako pilotka."
 grand_archive.8580.a.tt: "Zapewnia §Ynieśmiertelnego admirała§! 10 poziomu."
 grand_archive.8580.b: "§YZintegrujemy twoją wiedzę z naszą świadomością.§!"
 grand_archive.8580.c: "§YPomóż nam w szkoleniu naszych nowych pilotów.§!"
 grand_archive.8580.d: "§RZgnijesz w więzieniu.§!"
 grand_archive.8585.desc: "I to tyle?\n\nTak po prostu mnie odrzucacie?\n\nCo za rozczarowanie... Czas mi zatem ruszać w drogę.\n\nŻyczę wam powodzenia. Chyba."
 grand_archive.8585.a: "Nie jesteśmy ci nic winni."
 grand_archive.8590.desc: "W waszych pustych głowach słychać tylko echo! Ja daję wam świat, a wy mi w zamian - kajdanki? Nie zasługujecie na to, co wam zaoferowałam! Nie jesteście godni czyścić mi butów!\n\n[this.GetName] się tym plami. Przeklinam was wszystkich!\n\nNiech wasze [this.species.GetRemnantNamePlural] uschną pośród pustki, a wasze imię zostanie zapomniane."
 grand_archive.8590.a: "Żadna zbrodnia nie pozostaje bez kary."
 grand_archive.8595.name: "$NAME_CaptainNess$ zdezaktywowana"
 grand_archive.8595.desc: "Przetrzymywana przez nas maszyna, §Y$NAME_CaptainNess$§!, została znaleziona nieaktywna w swojej celi. Podejrzewamy, że umyślnie spowodowała ona krytyczną awarię swoich obwodów, co spowodowało wyłączenie kluczowych systemów i usunięcie wszelkich danych przechowywanych w jej przeniesionej świadomości. Na ścianie celi znaleźliśmy wiadomość:\n\n§LNiech was wszystkich pustka...§!"
 grand_archive.8595.a: "Koniec godny jej."
 grand_archive.8600.name: "Na końcu tęczy"
 grand_archive.8600.desc.common: "Nadszedł czas, abyśmy zdecydowali o własnym losie. Nie mamy mapy, więc kierować nami mogą już tylko same gwiazdy.\n\nCo zdołamy osiągnąć? Jak zostaniemy zapamiętani?"
 grand_archive.8600.desc.default: "Ta przygoda dobiegła już końca. Poszukiwania skarbu §Hkapitan Ness§! zakończyły się sukcesem.\n\n$grand_archive.8600.desc.common$\n\nTu właśnie [this.GetName] rozpoczyna swoją historię na dobre."
 grand_archive.8600.desc.lom: "Jakież opowieści będą krążyć o tej przygodzie! Odkryliśmy ukryty skarb kapitan Ness i nie pozwoliliśmy, żeby jakakolwiek załoga stanęła nam na drodze.\n\n$grand_archive.8600.desc.common$\n\n[this.GetName] ma wielkie powody do dumy. Nasza historia rozpoczyna się na dobre!"
 grand_archive.8600.a.default: "Naprzód!"
 grand_archive.8600.a.lom: "Ju-hu!"
 valuable_insight: "Bardzo cenna widza."
 grand_archive.9960.name: "$tech_alien_cloning$"
 grand_archive.9960.desc: "[from.solar_system.GetName]: pierwszy schwytany przez nas okaz fauny kosmicznej pozwala nam sądzić, że odpowiednia inwestycja w badania pozwoli sklonować więcej tych istot."
 grand_archive.9960.a: "$valuable_insight$"
 grand_archive.9970.name: "Potencjał mutacyjny"
 grand_archive.9970.desc: "[from.solar_system.GetName]: stworzono pierwszy pomyślnie sklonowany okaz fauny kosmicznej.\n\nNasze badania nad ksenobiologią wskazują, że można zrobić jeszcze więcej dla usprawnienia fizjologii tych stworzeń, jeśli byśmy zechcieli. Pozwoli to wyposażać nasze biologiczne floty w wyspecjalizowane elementy bojowe."
 grand_archive.9970.a: "$valuable_insight$"
