 r_celestial_resonator: "Niebiański rezonator"
 r_celestial_resonator_desc: "Dziwne urządzenie tworzące ogromne, zachwycające pokazy świetlne i zwiększające ich natężenie, gdy znajduje się blisko okazów."
 celestial_resonator_tt: "Wytwarza 10 $r_unity$ za każdy ['concept_specimen'] na wystawie"
 celestial_resonator_triumph_tt: "Zyskaj §G+$@celestial_resonator_happiness|0%$§! £happiness£ §Yzadowolenia§! i §G+$@celestial_resonator_diplo_weight|0%$§! £diplo_weight£ §Yznaczenia dyplomatycznego§! za każdy ['concept_specimen'] na wystawie."
 celestial_resonator_modifier: "$r_celestial_resonator$"
 r_entangled_relay: "Splątany przekaźnik"
 r_entangled_relay_desc: "Ten pradawny obiekt może łączyć odległe informacyjne sieci przesyłowe za pomocą splątania kwantowego, co pozwala na płynną łączność z całą galaktyką."
 entangled_relay_modifier: "$r_entangled_relay$"
 r_prototype_vir_core: "Prototypowy kod VIR"
 r_prototype_vir_core_desc: "Ta odizolowana sztuczna inteligencja jest szczególnie wydajną nauczycielką i mentorką, potrafiącą udzielić pomocy praktycznie w każdej sytuacji. Świetnie przedstawia skomplikowane problemy w prostych słowach, jasno przekazuje informacje, dzięki czemu użytkownik może podejmować bardziej świadome decyzje."
 prototype_vir_core_modifier: "$r_prototype_vir_core$"
 r_propagandosphere: "Propagandosfera"
 r_propagandosphere_desc: "Ta holograficzna kula zawiera archiwum filmów propagandowych wymarłej cywilizacji. Oglądanie ich jest wręcz hipnotyzujące, są niezwykle pomysłowe, możemy nakręcić takie same w naszej rzeczywistości, aby wpłynąć na naszych żołnierzy oraz obywateli."
 r_executus_compendium: "Kompendium zarządzania"
 r_executus_compendium_desc: "Te potężne archiwa rady pradawnej cywilizacji zachowały się w zapieczętowanej kapsule. Na trylionach stron znajdują się dokładne opisy biurokratycznych optymalizacji i przełomowych narzędzi organizacyjnych. Możemy wykorzystać wiele z tych usprawnień w naszych procedurach zarządzania."
 executus_compendium_triumph_tt: "Uruchom agendę za 10% początkowego kosztu jej uruchomienia. (Minimalny koszt £unity£3000)"
 r_the_pattern_maker: "Generator schematów"
 r_the_pattern_maker_desc: "Ten pradawny kalkulator posiada niezrównaną zdolność monitorowania dynamicznych trajektorii i przewidywania zachowania takich obiektów jak okręty wroga. Schematy danych wygenerowane przez jego algorytmy prognostyczne mają tyle warstw co projekty mistrza architektury. Jeśli otrzyma odpowiednią ilość mocy i zasobów, może stworzyć specjalistyczny statek zwiadowczy, wyposażony w silne czujniki."
 r_the_pattern_maker_effect_tt: "Tworzy statek zwiadowczy klasy §YSchemat§!.\n - Jest bardzo szybki i ma duży zasięg wykrywania hiperlinii."
 NAME_Patternwalker: "Schemat"
 NAME_Patternwalker_Cloak: "$NAME_Patternwalker$"
 SENSOR_PATTERNWALKER: "Czujniki przewidywania schematów"
 r_vaporous_mega_orchid: "Parująca megaorchidea"
 r_vaporous_mega_orchid_desc: "Ta wyjątkowa i ogromna orchidea kwitnie raz na 50 lat. Jej zapach działa uspokajająco, czasowo blokuje synapsy umysłowe odpowiadające za agresję i brak zaufania."
 r_vaporous_mega_orchid_effect_tt: "§G+$@vaporous_mega_orchid_opinion|0$§! £opinion£ opinii u każdego niezabójczego, nieupadłego, nienależącego do maszyn imperium na §Y$@vaporous_mega_orchid_opinion_duration_years|0$§! lat(a)."
 opinion_vaporous_mega_orchid: "$r_vaporous_mega_orchid$"
 r_tiyanki_matriarch_nerve_core: "Rdzeń nerwowy Matriarchini Tijanek"
 r_tiyanki_matriarch_nerve_core_desc: "Tkanka mózgowa tego pradawnego kosmicznego wieloryba zawiera w swoich neuronach dane ewolucyjne gromadzone przez wiele wieków. Dekodując tę sieć, możemy odszukać słabe punkty innych superdrapieżników, a także poznać tajemnice ich przetrwania."
 tiyanki_matriarch_nerve_core: "$r_tiyanki_matriarch_nerve_core$"
 celestial_chart: "Mapa gwiezdna"
 r_celestial_chart_0: "Tajemnicza kapsuła orbitalna"
 r_celestial_chart_0_desc: "Nietypowa kapsuła, która przez tysiące lat znajdowała się na orbicie naszego świata macierzystego. Jeszcze nie ustaliliśmy, jakie informacje zawiera."
 r_celestial_chart_1: "$celestial_chart$"
 r_celestial_chart_1_desc: "Pierwszy fragment wielkiej mapy znaleziony w pradawnej kapsule."
 r_celestial_chart_2: "$celestial_chart$"
 r_celestial_chart_2_desc: "Częściowo kompletna mapa znaleziona w pradawnej kapsule."
 r_celestial_chart_3: "$celestial_chart$"
 r_celestial_chart_3_desc: "Prawie kompletna mapa znaleziona w pradawnej kapsule."
 r_celestial_chart_4: "$celestial_chart$"
 r_celestial_chart_4_desc: "Wielka mapa gwiezdna i bank danych, które stworzył legendarny pirat, $NAME_CaptainNess$."
 r_celestial_chart_4_effect_tt: "Sprawia, że na jednej z naszych kolonii powstaje ['concept_treasure_vault']."
 celestial_chart_upgraded_tt: "§Y$celestial_chart$§! otrzymuje nowe, zaktualizowane informacje."
 r_mutated_voidworm_nest: "Gniazdo zmutowanych czerwi próżniowych"
 r_mutated_voidworm_nest_desc: "Gniazdo zmutowanych czerwi próżniowych, które wyewoluowały tak, że rozmnażają się z pominięciem etapu infekcji pasożytniczej. Część tego pomiotu dojrzewa zaledwie w ciągu kilku dni."
 r_mutated_voidworm_nest_effect_tt: "W układzie stołecznym pojawia się flota złożona z dojrzałych $NAME_Frenzied_Voidworms$"
 ######################################
 #Collection - Curators Interactions #
 ######################################
 CURATORS_DESIGNATION: "My"
 DEAD_CURATORS_DESIGNATION: "My, ostatni członkowie naszego zakonu,"
 grand_archive.4121.name: "$leviathans.500.name$"
 grand_archive.4121.desc.common: "otrzymaliśmy informację, że musicie stworzyć §Y$grand_archive$§! mogące przyjąć ogromną liczbę odwiedzających. To godna pochwały inicjatywa podzielenia się historią naszej galaktyki ze wszystkimi, którzy poszukują takiej wiedzy. Mamy podobne cele na tym polu.\n\nJesteśmy zainteresowani realizacją tego przedsięwzięcia."
 grand_archive.4121.desc.default: "My $grand_archive.4121.desc.common$ Ciągle powiększajcie waszą §Ykolekcję§!, a w zamian udzielimy wam wszelkiego możliwego wsparcia."
 grand_archive.4121.desc.dead: "Niedobitki naszego zakonu $grand_archive.4121.desc.common$ Chociaż nasz zakon został niedawno rozbity, wykorzystamy pozostałe nam aktywa, aby pomóc wam w rozbudowie waszej §Ykolekcji§!."
 leviathans.4100.desc: "Oczywiście!\n\nDostrzegliśmy wasze wysiłki. Patrząc na waszą obecną §Ykolekcję§!, możemy zaproponować następujące wsparcie - w zamian za niewielką darowiznę."
 leviathans.4100.a: "Opowiedz nam coś więcej o:"
 leviathans.4100.a.aesthetic_wonder: "$leviathans.4100.a$ §Y$EXHIBITION_AESTHETIC_WONDERS$§!"
 leviathans.4100.a.historical_item: "$leviathans.4100.a$ §Y$EXHIBITION_GALACTIC_HISTORY$§!"
 leviathans.4100.a.xeno_geology: "$leviathans.4100.a$ §Y$EXHIBITION_XENO_GEOLOGY$§!"
 leviathans.4100.tooltip.no_pending_reward: "Musicie powiększyć waszą kolekcję, aby otrzymać większą pomoc kuratorów."
 leviathans.4100.tooltip.no_reward: "Już zwróciliście się o wszelką możliwą pomoc w:"
 leviathans.4100.tooltip.no_reward.aesthetic_wonder: "$leviathans.4100.tooltip.no_reward$ $EXHIBITION_AESTHETIC_WONDERS$"
 leviathans.4100.tooltip.no_reward.historical_item: "$leviathans.4100.tooltip.no_reward$ $EXHIBITION_GALACTIC_HISTORY$"
 leviathans.4100.tooltip.no_reward.xeno_geology: "$leviathans.4100.tooltip.no_reward$ $EXHIBITION_XENO_GEOLOGY$"
 leviathans.4105.desc: "Oczywiście.\n\nCzego się dowiedzieliście?"
 leviathans.4105.a: "Jesteśmy zainteresowani waszą wiedzą w pewnych dziedzinach."
 leviathans.4105.b.common: "Chcemy kupić plany:"
 leviathans.4105.b.aesthetic_wonder: "$leviathans.4105.b.common$ Muzeum: §Y$EXHIBITION_AESTHETIC_WONDERS$§!."
 leviathans.4105.b.historical_item: "$leviathans.4105.b.common$ Muzeum: §Y$EXHIBITION_GALACTIC_HISTORY$§!."
 leviathans.4105.b.xeno_geology: "$leviathans.4105.b.common$ Muzeum: §Y$EXHIBITION_XENO_GEOLOGY$§!."
 leviathans.4105.c: "Jesteśmy zainteresowani zakupem §Yreliktu§!."
 leviathans.506.g: "Jak jeszcze możecie pomóc naszej §Ykolekcji§!?"
 leviathans.4110.desc: "Możemy przekazać wam wiedzę tylko z jednej dziedziny. Nas jest niewielu, a galaktyka duża.\n\nW czym możemy wam pomóc?"
 leviathans.4111.desc: "$leviathans.4110.desc$"
 leviathans.4112.desc: "$leviathans.4110.desc$"
 leviathans.4115.desc: "Właśnie. Musielibyśmy powierzyć wam przedmiot z naszej kolekcji.\n\nProsicie nas o wiele, więc w zamian spodziewamy się szczodrej darowizny."
 leviathans.4116.desc: "$leviathans.4115.desc$"
 leviathans.4117.desc: "$leviathans.4115.desc$"
 REWARD_NOT_AVAILABLE: "Ta nagroda jeszcze nie jest dostępna."
