 tr_archivism_finish_tt: "Każda ukończona §Ykategoria§!, którą zawiera twoja §Y$COLLECTION$§! daje: §G$@archivism_finisher_relics_cost_mult|0%$§! $mod_relics_cost_mult$"
 tr_archivism_xeno_paleontology: "Ksenopatologia"
 tr_archivism_xeno_paleontology_delayed: "Odkrycie tajemnic skrywanych pośród gwiazd pozwoli nam uczyć się na błędach popełnionych przez innych."
 tr_archivism_expert_negociation: "Eksperckie negocjacje"
 tr_archivism_expert_negociation_delayed: "Znajomość odpowiedniego kolekcjonera to klucz do znalezienia odpowiedniego domu dla określonych cennych przedmiotów."
 tr_archivism_expert_negociation_tt: "Zyskasz §G+$@archivism_expert_negociation_diplo_weight|0%$§! £diplo_weight£ §Y$diplomatic_weight$§! za każdy ['concept_specimen'] na wystawie."
 tr_archivism_expert_negociation_homicidal: "Galaktyczne żniwa"
