 FEDERATION_CREATURE_FLEET_DESC: "§HFloty federacji§! to specjalne floty kontrolowane przez prezydenta federacji. Narzędziem ich projektowania jest §H$CREATURE_DESIGNER$ federacji§! i mogą one wykorzystywać każdą technologię znaną dowolnemu członkowi federacji. Floty federacji nie wymagają utrzymania, ale nie mogą przekroczyć §Hlimitu marynarki wojennej federacji§!. Każdy członek federacji wnosi do niej §Y$PERC|0%$§! swojego §Hlimitu marynarki wojennej§!. Jeśli floty fauny kosmicznej urosną na tyle, że przekroczą §Hlimit marynarki wojennej federacji§!, nadmiarowe stworzenia zostaną przekazane jej prezydentowi."
