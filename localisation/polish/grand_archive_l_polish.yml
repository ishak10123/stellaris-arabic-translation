 voidworms_hunting_buff_desc: "Mięso czerwi próżniowych, bogate w substancje odżywcze, jest zbierane po każdej bitwie, co przynosi §G$@voidworms_hunting_buff_food_reward|0$§! £food£ za każdą zniszczoną flotę."
