 starborne_biology: "Biologia gwiezdnych wędrowców"
 starborne_biology_desc: "Główne źródło energii dużych istot żyjących w przestrzeni kosmicznej pochodzi ze światła. Im bliżej są jasnych gwiazd, tym szybciej się rozwijają."
