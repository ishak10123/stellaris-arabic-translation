 treasure_hunters_origin_story_chain_title: "Podążaj według tajemniczej mapy"
 treasure_hunters_origin_story_chain_desc: "Po odkryciu tajemniczej mapy do gwiazd wyruszyliśmy na naszą największą przygodę. Kto wie, co czeka nas na końcu ścieżki, którą wskazuje §H$celestial_chart$§! i na jakie niebezpieczeństwa możemy natknąć się po drodze."
 treasure_hunters_hidden_system_1_poi: "Poszukaj: [prev.GetName]"
 treasure_hunters_hidden_system_1_poi_desc: "Mapa znaleziona w pradawnej kapsule orbitalnej pokazuje ukryty układ - [prev.GetName]. Żeby zdobyć więcej informacji, musimy sami się tam udać."
 treasure_hunters_explore_system_1_poi: "Badanie: [treasure_hunters_hidden_system_1.GetName]"
 treasure_hunters_explore_system_1_poi_desc: "Flota §Y$NAME_BlackNeedle$§! została pokonana, więc możemy wznowić poszukiwania. §H$celestial_chart$§! doprowadziła nas do tego układu, możemy przypuszczać, że znajduje się tu następny fragment mapy."
 black_needle_fleet_poi: "Flota Czarna Igła"
 black_needle_fleet_poi_desc: "Wpadliśmy w zasadzkę w układzie [from.GetName], przygotowaną przez flotę świetnie zorganizowanych piratów. Ich celem jest nasza §H$celestial_chart$§!, byli przygotowani na nasze przybycie."
 smeegibb_shelter_system_1_poi: "Poszukaj: [prev.GetName]"
 smeegibb_shelter_system_1_poi_desc: "§H$celestial_chart$§! wskazała kolejny nowy, ukryty układ - [prev.GetName]. Musimy tam polecieć i zobaczyć, co na nas czeka."
 smeegibb_shelter_system_2_poi: "Leć do układu [smeegibb_system.GetName]"
 smeegibb_shelter_system_2_poi_desc: "Nie udało nam się wznowić łączności ze $NAME_Smeegibb$. Nikt inny nie może nam powiedzieć, gdzie jest §H$celestial_chart$§!, a raczej jej kolejny fragment, zatem powinniśmy wrócić do układu [smeegibb_system.GetName] i ustalić, co się stało. W tej chwili nie wiemy, dlaczego kontakt nagle się urwał."
 black_needle_fleet_2_poi: "Pokonaj: $NAME_CaptainInax$"
 black_needle_fleet_2_poi_desc: "§Y$NAME_BlackNeedle$§! znowu nas znalazła, teraz $NAME_Smeegibb$ nie żyje, a układ [from.GetName] został zablokowany. Uważamy, że §H$celestial_chart$§! (czy też jej czwarty fragment) ukryto gdzieś na powierzchni świata [smeegibb_shelter.GetName].\n\nMusimy pokonać flotę wroga, żeby móc rozpocząć poszukiwania kapsuły."
