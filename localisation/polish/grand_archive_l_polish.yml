 frenzied_voidworms_pacified_modifier: "Pacyfikacja: $NAME_Frenzied_Voidworms$"
 resolution_voidworm_eradication: "Tępienie czerwi próżniowych"
 resolution_voidworm_eradication_desc: "Pasożytnicze czerwie próżniowe są zakałą galaktyki i zagrożeniem dla zamieszkanych światów. Ich naturalny cykl życia zagraża równowadze galaktycznych ekosystemów i należy je wszystkie zlikwidować."
 resolution_voidworm_eradication_tooltip: "Każde imperium mające §Y$NAME_Voidworms$§! na swoim terytorium będzie uznawane za §Rłamiące prawo galaktyczne§! do momentu zniszczenia tych stworzeń lub dopóki nie odejdą one same."
 resolution_repeal_voidworm_eradication: "§R$resolution_voidworm_eradication$ - uchylenie§!"
 resolution_repeal_voidworm_eradication_desc: "[global_event_country.GetGalCommunityOrGalImperium] nie może mieć prawa do unicestwiania gatunku czerwi próżniowych."
 resolution_repeal_voidworm_eradication_effect_success: "Uchyla uchwałę \"§Y$resolution_voidworm_eradication$§!\"."
 grand_archive.2103.name: "$resolution_voidworm_eradication$"
 grand_archive.2103.desc: "[global_event_country.GetGalCommunityOrGalImperium] ogłasza, że żadne czerwie próżniowe nie mogą już przebywać w układach należących do tego imperium.\n\nDopóki nie zostaną zlikwidowane albo z własnej woli nie opuszczą naszej przestrzeni, [this.GetName] będzie §Rłamać prawo galaktyczne§!."
 grand_archive.2105.name: "$NAME_Voidworms$ na terytorium gatunku [this.GetSpeciesAdj&genitive]"
 grand_archive.2105.desc: "Flota czerwi próżniowych weszła w naszą przestrzeń w układzie [from.GetName]. Jako członkowie imperium [global_event_country.GetGalCommunityOrGalImperium] mamy prawny obowiązek dokonania natychmiastowej eutanazji czerwi próżniowych znajdujących się na naszym terytorium.\n\nImperium [this.GetName] będzie uznawane za winne §Rnaruszenia prawa galaktycznego§!, dopóki czerwie próżniowe nie odlecą lub nie zostaną zlikwidowane."
 grand_archive.2107.desc: "Dalsza obecność czerwia próżniowego w należącym do nas układzie [invaded_system.GetName] to poważne §Rnaruszenie prawa galaktycznego§! w postaci uchwały $resolution_voidworm_eradication$. Spowodowało to, że [global_event_country.GetGalCommunityOrGalImperium] pozwala członkom przegłosować nałożenie sankcji na imperium [this.GetName]."
 bombardment_damage_moderate: "§YŚrednie§!"
 bombardment_damage_massive: "§ROgromne§!"
 bombardment_voidworm_invasion_desc_common: "$bombardment_voidworm_invasion$ niszczy populację i tworzy nowe nimfy czerwia próżniowego.\n- §YŚrednie§! uszkodzenia zadane §Yarmiom§!\n- [GetVoidwormFleetBombardmentDamageIntensity] uszkodzenia zadane §Yplanecie§!, aż do osiągnięcia poziomu §Y25%§! zniszczeń\n- §YŚrednie§! uszkodzenia zadane §Ypopulacjom§!"
 bombardment_voidworm_invasion: "Zarodniki czerwia próżniowego"
 bombardment_voidworm_invasion_desc: "$bombardment_voidworm_invasion_desc_common$\n- §RNIE§! zabije ostatnich §Y$MIN_POPS$§! £pop£ §Hpopulacji§!"
 bombardment_voidworm_invasion_crisis: "$bombardment_voidworm_invasion$ (kryzys)"
