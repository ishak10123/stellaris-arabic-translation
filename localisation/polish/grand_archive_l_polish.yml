 grand_archive.4510.desc.none: "$grand_archive.4510.desc.common$\n\n$grand_archive.4510.nothing$"
 grand_archive.4515.name: "$grand_archive$ stracone"
 grand_archive.4515.desc.common_1: "Nasze $grand_archive$ w imperium [fromfrom.GetName] zostało zniszczone przez siły [from.GetAdjective]"
 grand_archive.4515.desc.common_2: "$grand_archive$ trzeba odbudować w innym układzie, aby dalej wystawiać nasze okazy."
 grand_archive.4515.stolen: "Niestety, nie udało się nam odzyskać części naszych cennych okazów."
 grand_archive.4515.freed: "Część schwytanej przez nas fauny kosmicznej została wypuszczona na wolność. Wiele osobników jest zmieszanych i agresywnych."
 grand_archive.4515.desc.stolen_freed: "$grand_archive.4515.desc.common_1$\n\n$grand_archive.4515.stolen$\n$grand_archive.4515.freed$\n\n$grand_archive.4515.desc.common_2$"
 grand_archive.4515.desc.stolen: "$grand_archive.4515.desc.common_1$\n\n$grand_archive.4515.stolen$\n\n$grand_archive.4515.desc.common_2$"
 grand_archive.4515.desc.none_freed: "$grand_archive.4515.desc.common_1$\n\n$grand_archive.4515.freed$\n\n$grand_archive.4515.desc.common_2$"
 grand_archive.4515.desc.none: "$grand_archive.4515.desc.common_1$\n\n$grand_archive.4515.desc.common_2$"
 grand_archive.4520.name: "$grand_archive.4515.name$"
 grand_archive.4520.desc.common_1: "Nasze $grand_archive$ w imperium [fromfrom.GetName] zostało zniszczone."
 grand_archive.4520.desc.freed: "$grand_archive.4520.desc.common_1$\n\n$grand_archive.4515.freed$\n\n$grand_archive.4515.desc.common_2$"
 grand_archive.4520.desc.default: "$grand_archive.4520.desc.common_1$\n\n$grand_archive.4515.desc.common_2$"
 grand_archive.4555.name: "$grand_archive$ zdemontowane"
 grand_archive.4555.desc: "$grand_archive$ należące do imperium [from.GetName] w układzie [fromfrom.GetName] zostało zdemontowane po zakupie tego układu.\n\nZajmowane przez nie miejsce zostało nam zwrócone."
 grand_archive.4560.name: "$grand_archive.4555.name$"
 grand_archive.4560.desc.common_1: "Nasze $grand_archive$ w imperium [from.GetName] zostało zdemontowane po tym, jak opuściliśmy ten układ."
 grand_archive.4560.desc.common_2: "Udało się nam odzyskać większość stopów użytych do jego budowy. Musimy całkowicie odbudować ten obiekt w innym układzie, aby dalej prezentować nasze wystawy."
 grand_archive.4560.desc.specimen: "Wszystkie okazy zostały odzyskane i są odpowiednio przechowywane w oczekiwaniu, aż powstanie nowe $grand_archive$."
 grand_archive.4560.desc.fauna: "Wszystkie okazy fauny kosmicznej zostały przetworzone na zasoby."
 grand_archive.4560.desc.specimen_fauna: "$grand_archive.4560.desc.common_1$\n\n$grand_archive.4560.desc.specimen$\n$grand_archive.4560.desc.fauna$\n\n$grand_archive.4560.desc.common_2$"
 grand_archive.4560.desc.specimen_nofauna: "$grand_archive.4560.desc.common_1$\n\n$grand_archive.4560.desc.specimen$\n\n$grand_archive.4560.desc.common_2$"
 grand_archive.4560.desc.nospecimen_fauna: "$grand_archive.4560.desc.common_1$\n\n$grand_archive.4560.desc.fauna$\n\n$grand_archive.4560.desc.common_2$"
 grand_archive.4560.desc.none: "$grand_archive.4560.desc.common_1$\n\n$grand_archive.4560.desc.common_2$"
 grand_archive.4580.name: "Projekt ponownego zasiedlenia wiwarium"
 grand_archive.4580.desc: "Skoro w układzie [from.GetName] jest już nowe $grand_archive$, mamy możliwość odnowienia większości tego, co straciliśmy w naszym wiwarium.\n\nMateriał genetyczny wszystkich hodowanych przez nas gatunków fauny kosmicznej został zachowany, a mając dostateczną ilość zasobów, moglibyśmy klonować nowe młode."
 grand_archive.4580.a: "Nie, te zasoby są nam potrzebne."
 grand_archive.4580.b: "Sklonujmy nową faunę kosmiczną."
