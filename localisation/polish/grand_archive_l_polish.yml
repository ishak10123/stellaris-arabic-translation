 bombardment_frenzied_voidworm_invasion: "Zmutowane $bombardment_voidworm_invasion$"
 bombardment_frenzied_voidworm_invasion_desc: "- Zniszczone planety zamienią się w §Y$pc_shattered$§!"
 alert_space_fauna_bombardment_title: "Czerwie próżniowe bombardują naszą kolonię!"
 alert_space_fauna_bombardment_instant: "Galaktyczne pasożyty bombardują naszą kolonię!\nPosiadają one ograniczoną liczbę zarodników, które zrzucą na zamieszkane kolonie, po czym odlecą."
 ALERT_SPACE_FAUNA_BOMBARDMENT_DETAIL: "$PLANET_NAME|Y$ w $SYSTEM_NAME|Y$. Populacje, które zostaną wchłonięte: §Y$POPS_TO_KILL$§!."
 grand_archive.2195.name: "Pasożyty galaktyczne"
 grand_archive.2195.desc.common_1: "[from.GetName] jest celem ataku.\n\nDuża grupa czerwi próżniowych znajduje się na orbicie kolonii i zrzuca na nią pasożytnicze cysty."
 grand_archive.2195.desc.common_2: "Analiza biologiczna wykazała, że każde zgrupowanie czerwi próżniowych ma ograniczone zapasy cyst i prawdopodobnie odleci po ich wyczerpaniu. Do tego czasu nasza populacja będzie się gwałtownie kurczyć."
 grand_archive.2195.desc.default: "$grand_archive.2195.desc.common_1$\n\nW każdej cyście znajduje się trujący zarodnik, który jest ekstremalnie zabójczy nie tylko dla naszych kolonistów, ale dla wszystkiego, co żyje. Kiedy zostanie połknięty, szybko przeobraża się w nimfę, która gwałtownie opuści ciało gospodarza, niszcząc je. Te nimfy posiadają pęcherz ze sprężonymi gazami, który pozwala im wznosić się w górne warstwy atmosfery, skąd instynktownie kierują się w określone miejsce.\n\n$grand_archive.2195.desc.common_2$"
 grand_archive.2195.desc.rocks: "$grand_archive.2195.desc.common_1$\n\nW każdej cyście znajduje się trujący zarodnik, który jest ekstremalnie zabójczy dla całej rdzennej fauny. Kiedy zostanie połknięty, szybko przeobraża się w nimfę, która gwałtownie opuści ciało gospodarza, niszcząc je. Dla nimf, które zwykle odżywiają się na asteroidach, z których czerpią metale szlachetne, czasami źródłem pożywienia stają się nasi [this.GetColonistPlural] - nimfy polują na słabsze osobniki i je zjadają. Wszystkie młode posiadają pęcherz ze sprężonymi gazami, który pozwala im wznosić się w górne warstwy atmosfery, skąd instynktownie kierują się w określone miejsce.\n\n$grand_archive.2195.desc.common_2$"
 grand_archive.2195.a: "To niepokojące."
 grand_archive.2195.a.homicidal: "Czeka je śmierć."
 ap_galactic_contender_voidworms_tt: "$MOD_DIPLO_WEIGHT_MULT$: §G+20%§!\n$mod_damage_vs_country_type_fallen_empire_mult$: §G+$@ap_galactic_contender_dmg_mult|0%$§!\n$mod_damage_vs_country_type_awakened_fallen_empire_mult$: §G+$@ap_galactic_contender_dmg_mult|0%$§!\n$mod_damage_vs_country_type_gate_builders_mult$: §G+$@ap_galactic_contender_dmg_mult|0%$§!\n$mod_damage_vs_country_type_voidworms_mult$: §G+$@ap_galactic_contender_dmg_mult|0%$§!"
