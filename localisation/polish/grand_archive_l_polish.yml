 FLEETORDER_GRAVITY_SNARE_NO_COMMUNICATIONS: "§R$TRIGGER_FAIL$ Nie zgromadziliśmy dostatecznej ilości informacji o tej faunie kosmicznej, aby móc ją schwytać.§!"
