 nutrient_rationing: "Racjonowanie składników odżywczych"
 nutrient_rationing_desc: "Ograniczenie diety kontrolowanej przez nas fauny kosmicznej ograniczy szybkość jej rozwoju i pozwoli przekierować zaoszczędzone środki do innych przedsięwzięć.\n\nSklonowana fauna kosmiczna przestaje rosnąć."
