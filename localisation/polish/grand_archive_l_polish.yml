 feature_unlock_gravity_snares: "Sidła grawitacyjne"
 feature_unlock_gravity_snares_desc: "Umożliwiają bezkrwawe pochwycenie i transport §Yfauny kosmicznej§!. Jeżeli zostanie zbudowane §Y$grand_archive$§!, to urządzenie dostarczy schwytane istoty do wiwarium."
 feature_unlock_containment_vessels: "Pojemniki przechowujące"
 feature_unlock_containment_vessels_desc: "Sidła grawitacyjne łapią dwukrotnie więcej §Yfauny kosmicznej§!."
 gravity_snare: "Sidła grawitacyjne"
