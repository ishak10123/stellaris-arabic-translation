 r_flowmetal_alloy: "Stop elastometalu"
 r_flowmetal_alloy_desc: "Ten materiał samoreplikujący wzmacnia wiązania chemiczne w dowolnym metalu, z którym ma kontakt. Zintegrowanie elastometalu w naszym procesie montażu może znacznie zwiększyć wielkoskalową produkcję maszyn."
 flowmetal_alloy_active_effect_tt: "Stwórz §G300§! §Y£pop£ populacji robotów§! w twojej stolicy."
 r_crystallinus_diffuser: "Dyfusor kryształów"
 r_crystallinus_diffuser_desc: "Maszyna konwertująca zsyntetyzowane kryształy w niezwykle silny narkotyk pobudzający. W czystej postaci ten związek chemiczny jest biologicznie niestabilny i może spowodować niewydolność wielonarządową u niewielkiego odsetka użytkowników."
 crystallinus_diffuser_active_effect_tt: "Populacje biologiczne w twoim imperium zwiększają produkcję o 100% na okres 10 lat. Po upływie tego czasu, 20% z nich umrze."
 crystallinus_diffuser_machine_empire_active_effect_tt: " §G+100§! $r_energy$ na 10 lat."
