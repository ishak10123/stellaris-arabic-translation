 ################################
 grand_archive.4105.desc.2.common: "Jesteśmy pod wrażeniem. [GetStage2Description]"
 CURATORS_STAGE_2_DESC: "Chcielibyśmy pomóc wam w budowie specjalnego muzeum w jednej z waszych kolonii."
 DEAD_CURATORS_STAGE_2_DESC: "Schematy budowy muzeów przetrwały zniszczenie naszej ojczyzny. Chcemy się nimi z wami podzielić."
 grand_archive.4105.desc.2.xeno_geology: "$grand_archive.4105.desc.common.xeno_geology$\n\n$grand_archive.4105.desc.2.common$"
 grand_archive.4105.desc.2.aesthetic_wonder: "$grand_archive.4105.desc.common.aesthetic_wonder$\n\n$grand_archive.4105.desc.2.common$"
 grand_archive.4105.desc.2.historical_item: "$grand_archive.4105.desc.common.historical_item$\n\n$grand_archive.4105.desc.2.common$"
 collection_stage_2_reward_xeno_geology_tt: "Odblokowanie: ['concept_xeno_geology_holomuseum']."
 collection_stage_2_reward_aesthetic_wonder_tt: "Odblokowanie: ['concept_aesthetic_wonders_holomuseum']."
 collection_stage_2_reward_historical_item_tt: "Odblokowanie: ['concept_galactic_history_holomuseum']."
 grand_archive.4105.2.no: "Raczej nie."
 ################################
 #Collection - Stage 3 Rewards #
 ################################
 grand_archive.4105.desc.3.common: "Jesteście bardzo zaangażowani w sprawę ochrony spuścizny. Chcielibyśmy powierzyć wam wyjątkowy przedmiot. [GetStage3Description]"
 grand_archive.4105.desc.3.common_2: "Oczywiście w zamian za taki cenny przedmiot chcielibyśmy otrzymać sowitą darowiznę..."
 CURATORS_STAGE_3_DESC: "Możecie wybrać potężny przedmiot z naszej najcenniejszej kolekcji. Jesteśmy pewni, że trafi w dobre ręce.\n\n$grand_archive.4105.desc.3.common_2$"
 DEAD_CURATORS_STAGE_3_DESC: "Te potężne przedmioty były przechowywane w tajnych składach w całej galaktyce, dzięki czemu nie zostały zniszczone wraz z naszą stacją.\n\n$grand_archive.4105.desc.3.common_2$: nie da się budować wyłącznie w oparciu o dobrą wiarę."
 grand_archive.4105.desc.3.xeno_geology: "$grand_archive.4105.desc.common.xeno_geology$\n\n$grand_archive.4105.desc.3.common$"
 grand_archive.4105.desc.3.aesthetic_wonder: "$grand_archive.4105.desc.common.aesthetic_wonder$\n\n$grand_archive.4105.desc.3.common$"
 grand_archive.4105.desc.3.historical_item: "$grand_archive.4105.desc.common.historical_item$\n\n$grand_archive.4105.desc.3.common$"
 grand_archive.4105.desc.3.no_relic.common: "W innych okolicznościach powierzylibyśmy wam jeden z naszych najcenniejszych artefaktów, ale inni mieszkańcy galaktyki zjawili się wcześniej i go otrzymali.\n\nW ramach pocieszenia, możecie wziąć jeden z tych przedmiotów."
 grand_archive.4105.desc.3.no_relic.xeno_geology: "Wasze zaangażowanie w ochronę §Yksenogeologii§! nie ma sobie równych.\n\n$grand_archive.4105.desc.3.no_relic.common$"
 grand_archive.4105.desc.3.no_relic.aesthetic_wonder: "Wasze zaangażowanie w ochronę §Ycudów estetyki§! nie ma sobie równych.\n\n$grand_archive.4105.desc.3.no_relic.common$"
 grand_archive.4105.desc.3.no_relic.historical_item: "Wasze zaangażowanie w ochronę §Yprzedmiotów historycznych§! nie ma sobie równych.\n\n$grand_archive.4105.desc.3.no_relic.common$"
 grand_archive.4105.3.no_relic.resources: "Odbierzcie podarunki."
 grand_archive.4105.3.no_relic.faction_modifier.xeno_geology: "Skorzystajcie ze wsparcia dla wystawy."
 grand_archive.4105.3.no_relic.faction_modifier.aesthetic_wonder: "$grand_archive.4105.3.no_relic.faction_modifier.xeno_geology$"
 grand_archive.4105.3.no_relic.faction_modifier.historical_item: "$grand_archive.4105.3.no_relic.faction_modifier.xeno_geology$"
 grand_archive.4105.3.common: "Podarujemy"
