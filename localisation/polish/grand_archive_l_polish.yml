 gavel_of_the_tribunal_galcom_tt: "Znaczenie dyplomatyczne £diplo_weight£ §G+$@gavel_of_the_tribunal_galcom_diplo_weight|0%$§! do czasu przyjęcia następnej §Yuchwały§!."
