 grand_archive.2000.name: "Wiele głosów"
 grand_archive.2000.desc: "Czujniki wykryły w układzie [This.System.GetName] coś, co wysyła na całą galaktykę prymitywne sygnały. Skanery dalekiego zasięgu zarejestrowały takie same wzorce nadawane z nieznanych zakątków. Ustalenie, czy zostały wyemitowane celowo, wymaga przeprowadzenia dokładniejszych badań."
 grand_archive.2000.a: "Ustalmy coś więcej."
 fcsum_voidworms_2: "Imperium §H[This.ContactCountry.GetName]§! zostało zidentyfikowane jako galaktyczne pasożyty zwane \"czerwiami próżniowymi\"."
 grand_archive.2005.name: "$NAME_Voidworms$"
 grand_archive.2005.desc: "Odkryliśmy, że dalekosiężne sygnały pochodzą od prostego organizmu kosmicznego, który otrzymał od nas przydomek §H\"$NAME_Voidworms$\"§!. Wygląda na to, że w galaktyce roi się od tych stworzeń. Sądząc po różnorodności długości fal sygnałów, istoty te muszą przechodzić kilka etapów rozwoju, zanim osiągną dojrzałość. Nie wyglądają na agresywne, a schematy ich komunikacji wskazują na koordynację w skali całej galaktyki."
 grand_archive.2005.a.homicidal: "To bezmózgie bestie, które trzeba zgładzić."
 grand_archive.2015.name: "Enzymy czerwi próżniowych"
 grand_archive.2015.desc: "Czerwie próżniowe odbywają gody w grupach zwanych \"trójkami\". Te istoty na całe życie łączą się w niekończącym się rytuale godowym. Jednak do wydania potomstwa potrzebują zewnętrznego organicznego gospodarza.\n\nTo pasożyty.\n\nPo osiągnięciu dojrzałości każdy czerw próżniowy wytwarza cysty w swoim układzie rozrodczym. Wewnątrz tych ochronnych cyst znajdują się niezwykle żrące gamety, które po połączeniu z innymi należącymi do trójki są wysyłane na planety, gdzie znajduje się odpowiednia biomasa umożliwiająca narodziny co najmniej jednej nimfy. Ich gospodarze umierają. Widzieliśmy dowody wskazujące, że czerwie próżniowe koordynują swoje bombardowania, aby utrzymać niezbędną liczbę gospodarzy w całej galaktyce.\n\nUważamy, że moglibyśmy opanować moc ich enzymów reprodukcyjnych i wykorzystać ją na naszą korzyść. Możemy nawet wytworzyć na nie odporność."
 grand_archive.2015.a: "Ujarzmijmy ich płodność do naszych celów."
 grand_archive.2015.b: "Obrzydliwe. Znajdźmy lekarstwo."
