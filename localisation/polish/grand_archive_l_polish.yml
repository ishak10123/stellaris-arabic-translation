 ###########################
 #Space Fauna Description #
 ###########################
 space_amoeba_desc: "Kosmiczne ameby to samotnicze drapieżniki, nastawione agresywnie wobec wszystkiego, co napotkają. Wspomaga je częściowo ukształtowane potomstwo zwane wiciami. Stworzenia te doskonale radzą sobie ze ściganiem swoich ofiar."
 tiyanki_desc: "Tijanki, zwane też kosmicznymi wielorybami, to spokojne zwykle stworzenia pożywiające się gazami atmosferycznymi. Są wybitnie nastawione na współpracę, a ich dzikie stada zorganizowane są w sztywną hierarchię."
 voidworm_desc: "Czerwie próżniowe to pasożytnicze organizmy, które, aby się rozmnażać, muszą rozrzucać zarodniki na zamieszkałych planetach o właściwej biomasie. Dorosłe osobniki łączą się podczas rozmnażania w trzyosobowe grupy zwane trójkami. Potomstwo wychowują w budowanych przy czarnych dziurach gniazdach."
 cutholoid_desc: "Kutoloidy to potężne organizmy, które wykorzystują asteroidy do ochrony swoich miękkich ciał. Stworzenia te połykają zwierzynę w całości - ich radioaktywne płyny trawienne powoli rozkładają następnie ofiarę."
 crystalline_entity_desc: "Krystaliczne stwory to wyjątkowa forma krzemowych istot zdolnych swobodnie przemieszczać się w próżni. Odcień każdego z nich jest inny nie ze względu na wiek, lecz na uśpiony w nich wewnętrzny ładunek."
 wild_tiyanki_ox_modifier: "Dziki byk tijanki"
 fauna_disengagement_modifier: "Wycofanie fauny kosmicznej"
