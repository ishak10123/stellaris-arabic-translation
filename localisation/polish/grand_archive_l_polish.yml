 tr_domestication_containment_protocols: "Protokoły bezpieczeństwa"
 tr_domestication_containment_protocols_delayed: "Transportowanie i zabezpieczanie dużych organizmów zawsze wiąże się z ryzykiem odniesienia przez nie obrażeń. Dzięki odpowiednim gazom uspokajającym i protokołom, możemy zminimalizować ten problem."
