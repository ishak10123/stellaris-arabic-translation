 tradition_archivism: "Archiwizowanie"
 tradition_archivism_desc: "Dzięki odpowiedniemu przechowywaniu i ochronie artefaktów tej galaktyki przyszłe pokolenia zrozumieją, skąd naprawdę pochodzą."
 tr_archivism_adopt: "Tradycje: $tradition_archivism$"
