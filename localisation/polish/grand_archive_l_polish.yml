 GRAVITY_SNARE_CLOAKING_DARK_MATTER: "$SCIENCE_CLOAKING_DARK_MATTER$"
 GRAVITY_SNARE_CLOAKING_PSI: "$SCIENCE_CLOAKING_PSI$"
 GRAVITY_SNARE_NO_EMERGENCY_FTL: "Sidła grawitacyjne nie są przeznaczone do wykonywania awaryjnych skoków w nadświetlną."
 FLEET_CANNOT_TAKE_ORDERS: "§RTa flota nie może przyjąć dowolnego rozkazu.§!"
 MESSAGE_SPACE_CRITTER_CAPTURE_SUCCESS_TITLE: "Schwytano faunę kosmiczną"
 MESSAGE_SPACE_CRITTER_CAPTURE_SUCCESS_DESC: "Próba schwytania w układzie $SYSTEM|Y$ powiodła się! $gravity_snare$ dostarczyły okaz do wiwarium.\n\nZdobywasz nową faunę kosmiczną:\n$CAPTURED_LIST$$RESOURCES_LIST$"
 MESSAGE_SPACE_CRITTER_CAPTURE_SUCCESS_NO_VIVARIUM_DESC: "Próba schwytania w układzie $SYSTEM|Y$ powiodła się! Nie masz wolnych miejsc w §Hwiwarium§!, więc zdobyta fauna została poddana eutanazji i podzielona na zasoby.\n$CULLED_LIST$$RESOURCES_LIST$"
 MESSAGE_SPACE_CRITTER_CAPTURE_FAILURE_TITLE: "Nieudana próba schwytania"
 MESSAGE_SPACE_CRITTER_CAPTURE_FAILURE_DESC: "Próba schwytania w układzie $SYSTEM|Y$ nie powiodła się. Przepadły $gravity_snare$ wystrzelone z jednostki $SHIP_NAME|Y$."
 MESSAGE_CAPTURED_SPACE_CRITTER_RETURNED_TITLE: "Nowa fauna kosmiczna"
 MESSAGE_CAPTURED_SPACE_CRITTER_RETURNED_DESC: "Do wiwarium trafiła nowa fauna kosmiczna.\n$NEWBORN_LIST$$CULLED_LIST$$RESOURCES_LIST$"
 MESSAGE_CAPTURED_SPACE_CRITTER_RETURNED_DESC_CULLED: "\n\nPoniższe okazy schwytanej fauny kosmicznej zostały przetworzone na zasoby:\n$CULLED_LIST$"
 CULLED_CREATURES_RESOURCE_OUTPUT_DESC: "\n\nPozyskane zasoby:\n  $RESOURCES_LIST$"
 mod_gravity_snare_cooldown_mult: "Odnawianie sideł grawitacyjnych"
 MOD_GRAVITY_SNARE_COST_MULT: "Koszt sideł grawitacyjnych"
 MOD_SPACE_FAUNA_CULLING_REWARD_MULT: "Zasoby z uboju"
 grand_archive.7210.name: "Sidła grawitacyjne"
 grand_archive.7210.desc.common: "Po tym jak niedawno odkryto §Y$tech_gravity_wells$§!, statki badawcze [root.GetAdjective] mogą teraz wystrzeliwać $gravity_snare_plural$."
 grand_archive.7210.desc.vivarium: "Te pociski nie ranią, ale bezpiecznie chwytają i przewożą faunę kosmiczną do naszego §Ywiwarium§!, gdzie okazy mogą dalej się rozmnażać.\n\nUbój i przetworzenie tych istot pozwoli zebrać ich §Y$genetic_material$§! do celów klonowania, a także pozyskać inne zasoby."
 grand_archive.7210.desc.no_vivarium: "Te pociski nie ranią, ale bezpiecznie chwytają i przewożą faunę kosmiczną na badania oraz przetwarzanie. W ten sposób pozyskujemy ich §Y$genetic_material$§!, a także zasoby.\n\nJeżeli chcielibyśmy utrzymać je przy życiu i prowadzić hodowlę, musielibyśmy stworzyć §Ywiwarium§!. Aby to zrobić należy zbudować w naszych bazach gwiezdnych §Y$grand_archive$§! albo §Y[GetHatcheryPlural]§!."
 grand_archive.7220.name: "Bestie pretorynów"
 grand_archive.7220.desc: "Nasze §Y$gravity_snare_plural$§! mają kłopoty z namierzaniem i chwytaniem okazów gatunku §Y$NAME_Prethoryn_Scourge$§!. Po analizie przemieszczania się tych istot przypuszczamy, że są one kontrolowane przez jakąś nadrzędną świadomość i nie są indywidualnymi osobnikami.\n\nPróba zamknięcia jednego z tych organizmów w wiwarium naraziłaby na niebezpieczeństwo inne okazy, a nawet cały obiekt [this.GetName].\n\nZawiesiliśmy na czas nieokreślony operacje wyłapywania tych organizmów."
 grand_archive.7220.a: "Słuszna ostrożność."
