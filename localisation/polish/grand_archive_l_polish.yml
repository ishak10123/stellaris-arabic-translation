 tech_thrusters_bio_integration_desc: "Sztuczne silniki manewrowe mogą zostać zintegrowane z kosmicznymi organizmami, o ile weźmie się pod uwagę kwestie zapasu energii i połączeń z neuronowymi centrami motorycznymi."
 tech_thrusters_bio_integration_effect: "§HOdblokowuje funkcję:§! ulepszenie silników manewrowych dla fauny kosmicznej."
 tech_hyper_drive_bio_integration: "Biointegracja hipernapędów"
 tech_hyper_drive_bio_integration_desc: "Podróż hiperliniami bywa niebezpieczna dla życia kosmicznego, ale jesteśmy w stanie zwiększyć ich możliwości."
 tech_hyper_drive_bio_integration_effect: "§HOdblokowuje funkcję:§! ulepszenie hipernapędów dla fauny kosmicznej"
 tech_sensors_bio_integration: "Biointegracja czujników"
 tech_sensors_bio_integration_desc: "Zróżnicowane narządy żyjących pośród gwiazd stworzeń mogą zostać ulepszone dzięki naszej rozwiniętej technologii przy minimalnej dla nich szkodzie."
 tech_sensors_bio_integration_effect: "§HOdblokowuje funkcję:§! ulepszenie czujników dla fauny kosmicznej"
 tech_combat_computers_bio_integration: "Biointegracja komputerów bojowych"
 tech_combat_computers_bio_integration_desc: "Możemy opracować wyspecjalizowane neuroczipy wpływające na zachowania fauny kosmicznej związane z walką flot na szeroką skalę."
 tech_combat_computers_bio_integration_effect: "§HOdblokowuje funkcję:§! ulepszenie komputerów bojowych dla fauny kosmicznej"
