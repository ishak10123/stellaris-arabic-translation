 production_surge_modifier: "Skok produkcji"
 public_distrust_modifier: "Brak zaufania publicznego"
 test_subject_unwilling_modifier: "Obiekty badań"
 test_subject_volunteer_modifier: "$test_subject_unwilling_modifier$"
 test_subject_gestalt_modifier: "$test_subject_unwilling_modifier$"
 grand_archive.2310.name: "Plaga czerwi próżniowych"
 grand_archive.2310.desc.default: "$NAME_Voidworms$ stworzyły ogromną populację w skali galaktyki. Ich zachowanie ulega zauważalnej zmianie.\n\nTypowy etap ich cyklu życia, w którym populacje gospodarzy nie umierały, został zakłócony. Wygląda na to, że czerwiom nie zależy już na zachowaniu miejsc rozrodu.\n\nWe wszystkich naszych koloniach ogłoszono czerwony alarm. Należy zachować daleko posuniętą ostrożność, jeśli $NAME_Voidworms$ pojawią się w jakimkolwiek układzie.\n\nCzekają nas szaleńcze gody na galaktyczną skalę."
 grand_archive.2310.desc.tech: "$grand_archive.2310.desc.default$\n\nOdporność na te pasożyty, którą wcześniej uzyskaliśmy, działa już w tylko w ograniczonym stopniu. Musimy wrócić do fazy planowania."
 grand_archive.2310.desc.nocontact: "W całej galaktyce przechwytujemy niepokojące doniesienia o tym, że nieznany wcześniej gatunek fauny kosmicznej, zwany czerwiami próżniowymi, rozmnaża się w szaleńczym tempie. Podobno stworzenia te są poważnym zagrożeniem dla planet, które nie posiadają odpowiednich systemów obronnych. Ogłosiliśmy czerwony alarm we wszystkich naszych koloniach."
 grand_archive.2310.a: "$DISTURBING$$DOTDOTDOT$"
 situation_voidworm_plague: "Plaga czerwi próżniowych"
 situation_voidworm_plague_type: "$situation_voidworm_plague$"
 situation_voidworm_plague_desc: "$NAME_Voidworms$ są już prawdziwą epidemią.\n\nTe istoty nie oszczędzają planet gospodarzy, aby uczynić je miejscami rozrodu. Musimy działać i wytępić te istoty, w przeciwnym razie nasze kolonie będą zagrożone.\n\n§YKażdy zniszczony czerw próżniowy przyspiesza postęp sytuacji.§!"
 situation_voidworm_plague_monthly_change_tooltip: "$situation_monthly_change_tooltip_approaches_dependent$"
 finisher_effects_voidworm_plague: "Twoim koloniom przestanie zagrażać zbombardowanie przez czerwie próżniowe."
 approach_voidworm_plague_do_nothing: "Nic nie róbmy"
 approach_voidworm_plague_do_nothing_tt: "Nie podejmiemy żadnych szczególnych kroków."
 approach_voidworm_plague_support_fleets: "Wesprzyjmy nasze floty"
 approach_voidworm_plague_support_fleets_tt: "Możemy poświęcić niewielką część jakości życia, aby wesprzeć nasze floty w walce z zagrożeniem ze strony czerwi próżniowych.\nSytuacja $SITUATION_MONTHLY_CHANGE$: §G+0,5§!"
 approach_voidworm_plague_purge_infected_pops: "Czystka zakażonych"
 approach_voidworm_plague_purge_infected_pops_tt: "Gdy $NAME_Voidworms$ bombardują twoje kolonie, nowe $NAME_Voidworms$ nie będą już tworzone.\nSytuacja $SITUATION_MONTHLY_CHANGE$: §G+0,7§!"
 approach_voidworm_plague_search_for_cure: "Poszukajcie leku"
 approach_voidworm_plague_search_for_cure_tt: "Jeżeli uda nam się przełamać ich cykl biologiczny, $NAME_Voidworms$ przestaną rozmnażać się w całej galaktyce.\nSytuacja $SITUATION_MONTHLY_CHANGE$: §G+1,0§!"
 change_approach_will_temporarily_lock: "§STakie podejście zablokuje inne podejścia na §Y$@voidworm_plague_approach_cooldown_years|0$ l§!.§!"
 too_early_to_change_approach: "§SZa wcześnie na ponowną zmianę podejścia do sytuacji.§!"
 voidworm_crisis_eradicate_chain_title: "Wytępić $NAME_Voidworms$"
 voidworm_crisis_eradicate_chain_desc: "Populacja czerwi próżniowych w galaktyce przekroczyła poziom krytyczny i trzeba ją wytępić.\n\nNamierzyliśmy wszystkie pozostałe §Ygniazda czerwi próżniowych§!, które należy zniszczyć."
 voidworm_system_poi_title: "Zniszczyć: [prev.GetName]"
 voidworm_system_poi_desc: "W tym układzie wykryto §Ygniazda czerwi próżniowych§!.\n\nZniszczmy je, zanim powstaną kolejne pasożyty."
 #Voidworms Plague Crisis Random Events #
 grand_archive.2400.name: "Nadmiar elementów"
 grand_archive.2400.desc: "Wsparcie floty w zwalczaniu zagrożenia, jakim są $NAME_Voidworms$, przyniosło niespodziewane zdobycze w postaci dodatkowych elementów pozyskanych dzięki lepszym protokołom konserwacji. Mamy możliwość zainwestowania tych materiałów w usprawnienie krótkoterminowego wytwarzania nowych flot."
 grand_archive.2400.a: "Zainwestujmy we wzmocnienie."
 grand_archive.2400.b: "Zachowajmy rezerwy."
 grand_archive.2405.name: "Wezwanie do broni"
 grand_archive.2405.desc.default: "Trwające przygotowania do walki z czerwiami próżniowymi dały początek nowemu pokoleniu dowódców. Doświadczeni obywatele imperium [this.GetName] postanowili użyczyć swych talentów w celu eliminacji tego galaktycznego zagrożenia."
 grand_archive.2405.desc.gestalt: "Trwające przygotowania do walki z czerwiami próżniowymi sprawiły, że powstały dodatkowe węzły przywódcze klasy dowódców. Zapewniając naszym flotom dodatkowe wsparcie, daliśmy tym węzłom bojowym większe zasoby, które ułatwią ich szybką integrację z naszymi wojskami."
 grand_archive.2405.a: "Inspirujące."
 grand_archive.2405.tt: "Odśwież: §H$RECRUITABLE_LEADERS$§! i dodaj 3 kolejnych §Hkomandorów§! z dodatkowym poziomem."
 grand_archive.2410.name: "Rozwój na linii frontu"
 grand_archive.2410.desc.default: "[random_shipyard.GetName]: Pewien inżynier opracował schemat koncepcyjny obrony okrętów. Prowadził rutynowe naprawy w czasie walk z czerwiami próżniowymi, gdy wpadł na pomysł stworzenia nowego elementu, który zwiększy wytrzymałość naszych jednostek. Nasz dział rozwoju zapoznał się z tym projektem i uznał, że ma on spory potencjał."
 grand_archive.2410.desc.gestalt: "[random_shipyard.GetName]: Stacjonujący tam [root.GetIndividualName] naprawczy zapoczątkował nowe badania, które pozwoliły ulepszyć obronę okrętów. Po błędzie komunikacyjnym w trakcie rutynowych napraw, wspomniany [root.GetIndividualName] wykorzystał niecodzienne połączenie metod i materiałów, aby stworzyć nowy element ochronny. Po sprawdzeniu potencjału dalszych badań okazało się, że po pewnych udoskonaleniach to przypadkowe odkrycie ma spory potencjał."
 grand_archive.2420.name: "[infected_leader.GetName]: Infekcja"
 grand_archive.2420.desc: "W trakcie pełnienia swoich obowiązków [infected_leader.GetName] został zainfekowany przez aktywne zarodniki czerwia próżniowego. Niebawem narodzą się nowe nimfy, które zniszczą swojego gospodarza.\n\nByć może to stracona sprawa, ale nasz personel medyczny przypuszcza, że larwę można wydobyć, zanim w pełni połączy się z układem nerwowym ofiary. To ryzykowny zabieg, ale [infected_leader.GetName] chce zaryzykować."
 grand_archive.2420.a: "Zlikwidować."
 grand_archive.2420.b: "Wydobyć larwę."
 grand_archive.2425.name: "Złamanie kwarantanny"
 grand_archive.2425.desc.common: "Niewielka grupa zakażonych przedstawicieli gatunku [infected_planet_pop.species.GetName] uciekła przed czystką prowadzoną na świecie [infected_planet.GetName] i rozpierzchła się po naszych układach. Jeśli nic z tym nie zrobimy, infekcja czerwi próżniowych może rozszerzyć się na całe imperium [this.GetName]."
 grand_archive.2425.desc.default: "$grand_archive.2425.desc.common$ Trzeba zająć się uciekinierami, zanim sprowadzą zagrożenie na nas wszystkich."
 grand_archive.2425.desc.rogue: "$grand_archive.2425.desc.common$ Trzeba zająć się uciekinierami, zanim zagrożą innym naszym biotrofeom."
 grand_archive.2425.desc.gestalt: "$grand_archive.2425.desc.common$ Trzeba zająć się uciekinierami, zanim sprowadzą zagrożenie na cały kolektyw."
 grand_archive.2425.desc.robot: "Próbki zakażonej fauny i flory przeznaczone do analizy zostały omyłkowo przetworzone na zwyczajną żywność. W wyniku tego błędu duża ilość materii organicznej została skażona pasożytniczymi czerwiami próżniowymi i trzeba się jej pozbyć."
 grand_archive.2425.a.default: "Wytropić ich."
 grand_archive.2425.a.default.tt: "-1 populacja organiczna w każdej posiadanej kolonii"
 grand_archive.2425.a.robot: "Spalić zapasy żywności."
 grand_archive.2425.a.robot.tt: "$@infected_devastation|0$: zniszczenia na wszystkich niezakażonych planetach"
 grand_archive.2425.b: "Nie róbcie nic."
 grand_archive.2425.b.tt: "Dodatkowe nimfy czerwi próżniowych mogą się pojawić w pobliżu naszych kolonii!"
 grand_archive.2430.name: "Zaniedbanie obowiązków"
 grand_archive.2430.desc: "Chociaż ustalono, że czystki zainfekowanych to najrozsądniejsze działanie, wielu żołnierzy niechętnie wykonuje rozkazy. Mimo zagrożenia ze strony pasożytniczego czerwia próżniowego, wielu z nich nie potrafi zgładzić współobywateli w imię większego dobra.\n\nNależy coś zrobić, aby infekcja czerwi próżniowych nie rozprzestrzeniała się w naszych koloniach. Być może uda się nam zautomatyzować niektóre elementy procesu dokonywania czystek i w ten sposób ograniczymy liczbę potrzebnych do tego żołnierzy. Inne rozwiązanie to krótka kampania reklamowa promująca etyczne standardy czystek oraz potwierdzająca ich konieczność."
 grand_archive.2430.a: "Zautomatyzujmy czystki."
 grand_archive.2430.b: "Rozpocznij kampanię PR."
 grand_archive.2440.name: "Marginalny przełom"
 grand_archive.2440.desc: "Nasze poszukiwania leku na plagę czerwi próżniowych umożliwiły równoległe zwiększenie postępów innych badań w dziedzinie biologii. Pasożyty wciąż są naszym priorytetem, a ten nowy przełom ma ogromny potencjał do dalszych badań."
 grand_archive.2445.name: "Wczesny etap testów"
 grand_archive.2445.desc.common: "Nasza wiedza o pladze czerwi próżniowych rośnie, mamy już podwaliny pod stworzenie lekarstwa."
 grand_archive.2445.desc.default: "$grand_archive.2445.desc.common$ Jednak nasze badania mogłyby postępować szybciej, gdybyśmy na wczesnym etapie prowadzili testy na żywych przedstawicielach gatunku [owner_main_species.GetAdj&genitive]\n\nPoza kwestiami etycznymi, może dla większego dobra powinniśmy ominąć niektóre przepisy bezpieczeństwa."
 grand_archive.2445.desc.gestalt: "$grand_archive.2445.desc.common$ Jednak testowanie pochłania wiele czasu, głównie ze względu na nieustające zapotrzebowania na wolne [root.GetIndividualNamePlural], które można wykorzystać jako obiekty testowe. Gdyby można było po prostu wyznaczać je do takiej roli, prace nad lekarstwem postępowałyby szybciej.\n\nKonsekwencje takiego działania byłyby odczuwalne w całej zbiorowości, ponieważ przeniesione [root.GetIndividualNamePlural] zostawiłyby chaos w swoim wcześniejszym miejscu pracy."
 grand_archive.2445.a.default: "Prowadzić testy na nieświadomych osobnikach gatunku [owner_main_species.GetNamePlural]."
 grand_archive.2445.a.gestalt: "Połóżmy nacisk na testowanie."
 grand_archive.2445.b.default: "Prowadzić testy tylko na ochotnikach."
 grand_archive.2445.b.gestalt: "Kontynuować badania bez żadnych zmian."
 grand_archive.2445.c: "Żadnego nieetycznego testowania."
 grand_archive.2450.name: "Gruczoły czerwia próżniowego"
 grand_archive.2450.desc: "Odkryliśmy wzór cyklu reprodukcyjnego czerwi próżniowych, co może doprowadzić do ogromnego przełomu w badaniach nad stworzeniem lekarstwa na plagę.\n\nŻeby potwierdzić tę hipotezę musimy pozyskać do analizy gruczoły, które posiada dziki $voidworms_titan$. Ważne, aby ta istota została zabita w trakcie bombardowania planety, bo tylko wtedy zachowają się aktywne gamety rozrodcze."
 grand_archive.2450.a: "Nie mamy na to czasu."
 grand_archive.2450.b: "Dostaniecie te gruczoły."
 VOIDWORM_GLANDS_PROJECT: "Gruczoły rozrodcze trójki"
 VOIDWORM_GLANDS_PROJECT_DESC: "Dokonaliśmy przełomowego odkrycia na polu poszukiwań leku na plagę czerwi próżniowych. Potrzebujemy tylko gruczołów rozrodczych trójki czerwi próżniowych w aktywnym stanie płodności."
 VOIDWORM_GLANDS_PROJECT_TOOLTIP: "§RZbierz szczątki trójki aktywnie bombardującej jakiś świat.§!"
 VOIDWORM_TITAN_DEBRIS_PROJECT: "$NAME_Voidworms_Troika$: Szczątki"
 VOIDWORM_TITAN_DEBRIS_PROJECT_DESC: "Szczątki tej trójki czerwi próżniowych można zebrać i pozyskać z nich płodne gruczoły rozrodcze.\n\nDzięki tym organom znacznie pogłębilibyśmy nasze zrozumienie biologii tych istot oraz pomogliśmy w ostatecznym wyplenieniu plagi czerwi próżniowych."
 grand_archive.2455.name: "Pozyskano gruczoły"
 grand_archive.2455.desc: "Gruczoły pozyskane od płodnej trójki czerwi próżniowych dostarczyły nam nowych informacji o ich cyklach reprodukcyjnych.\n\nPołączone w rytuale godowym aż do śmierci, wszystkie trzy osobniki w reprodukcyjnym uścisku dzielą się po równo materiałem genetycznym, przez co praktycznie stają się nowym organizmem.\n\nTe procesy elastyczności genetycznej możemy wykorzystać przeciwko czerwiom próżniowym."
 grand_archive.2500.name: "Odkrycie lekarstwa"
 grand_archive.2500.desc.default: "Zakończyliśmy prace nad stworzeniem ostatecznego lekarstwa na pasożytniczą infekcję czerwia próżniowego. Nasze kolonie nie muszą już się obawiać bombardowania zarodnikami tych istot, a my nie musimy dłużej przejmować się ich obecnością w galaktyce."
 grand_archive.2500.desc.tech: "$grand_archive.2500.desc.default$\n\nJesteśmy pewni, że tym razem stworzone przez nas lekarstwo poradzi sobie także z przyszłymi mutacjami organizmów tych istot."
 #########################################
 #Voidworm Plague Crisis Galactic Focus #
 #########################################
 resolution_galactic_focus_crisis_voidworm_plague: "Priorytet: Plaga czerwi próżniowych"
 resolution_galactic_focus_crisis_voidworm_plague_desc: "Pasożytnicze czerwie próżniowe stanowią zagrożenie dla galaktyki. Jeśli się nie zjednoczymy, by je powstrzymać, pochłoną nas wszystkich. Powinniśmy uczynić zwalczanie tego kryzysu priorytetem galaktycznym."
 resolution_galactic_focus_crisis_voidworm_plague_effect_success: "$resolution_galactic_focus_crisis_effect_success$"
 galactic_focus_crisis_voidworm_plague: "Uporaj się z plagą czerwi próżniowych"
 galactic_focus_crisis_voidworm_plague_desc: "Plaga czerwi próżniowych zagraża całej galaktyce. Musimy się zjednoczyć i uporać z tym pasożytniczym zagrożeniem."
 gal_com_crisis_voidworm_pop_victims: "Czerwie próżniowe wyrządziły poważne szkody populacjom na swoim terytorium."
