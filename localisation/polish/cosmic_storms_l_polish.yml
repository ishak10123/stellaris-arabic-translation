 solar_storm_aftermath_modifier: "Radioaktywna blokada"
 solar_storm_aftermath_modifier_tooltip: "$STORM_AFTERMATH_DESC$\n$t$- §H$solar_storm_aftermath_modifier$§!:\n$tt$- $MOD_LOGISTIC_GROWTH_MULT$: §R-40%§! do §R-60%§! \n$tt$- $MOD_POP_AMENITIES_USAGE_MULT$: §R+10%§! do §R+30%§!\n$tt$- $MOD_ARMY_DEFENSE_DAMAGE_MULT$: §G+20%§! do §G+40%§!"
 solar_storm_aftermath_modifier_severity_desc: "Wysoki poziom promieniowania, który powoduje $solar_storm$, wymusza niemalże stałą blokadę obiektów. Ścisła kontrola przestrzeni życiowej ułatwia zbrojne panowanie nad planetą kosztem niezadowolenia populacji."
