 #Civics
 civic_astrometeorology: "Astrometeorologia"
 civic_astrometeorology_desc: "Wykazując się wielkim szacunkiem dla sił natury, ten gatunek zadaje sobie wiele trudu, aby poznać działanie zjawisk środowiskowych. Kiedy wyruszają ku gwiazdom, zabierają ze sobą szczególne zainteresowanie astrometeorologią. Najważniejszym obiektem ich zainteresowań są najbardziej fantastyczne i potencjalnie niszczycielskie ze wszystkich zdarzeń astronomicznych, czyli burze kosmiczne.\n"
 civic_astrometeorology_effect_tooltip: "$t$- $AVAILABLE_BUILDINGS$ £building£ ['building:building_astrometeorology_observation_center']$TABBED_NEW_LINE$- $ADDITIONAL_BUILDINGS_STRING$ £building£ §Y$building_astrometeorology_observation_center$§!"
 civic_astrometeorology_hive: "Modelowanie klimatu"
 civic_astrometeorology_hive_desc: "Gdy kolektyw sięgnął ku gwiazdom, jego świadomość została zauroczona widokiem zjawisk astrometeorologicznych. Te drony powiększają swój dom dla naszego szlachetnego celu: chcemy badać efekty środowiskowe i zachwycać się nawet burzami kosmicznymi."
 civic_astrometeorology_hive_effect_tooltip: "$civic_astrometeorology_effect_tooltip$"
 civic_astrometeorology_machine: "Modelowanie klimatu"
 civic_astrometeorology_machine_desc: "Rozumiejąc potężny wpływ sił natury na imperium maszyn, ten kolektyw robi wiele, aby te siły badać. Jego modele z najdrobniejszymi szczegółami opisują każde ciekawe zdarzenie astronomiczne. Szczególnie interesują go najbardziej fantastyczne i potencjalnie niszczycielskie ze wszystkich zdarzeń astronomicznych - burze kosmiczne."
 civic_astrometeorology_machine_effect_tooltip: "$civic_astrometeorology_effect_tooltip$"
 civic_astrometeorology_megacorp: "Wykorzystanie pogody"
 civic_astrometeorology_megacorp_desc: "Czymże są efekty środowiskowe, jeśli nie kolejnym darmowym zasobem, który można wykorzystać? Ta megakorporacja specjalizuje się w pozyskiwaniu jak największej wiedzy o zjawiskach astrometeorologicznych, którą potem sprzedaje temu, kto zaproponuje najlepszą cenę."
 civic_astrometeorology_megacorp_effect_tooltip: "$civic_astrometeorology_effect_tooltip$ $TABBED_NEW_LINE$- £building£ §Y$building_private_research_initiative$§! $megacorp_civic_branch_office_building_effect$"
 civic_storm_callers: "Oddanie burzom"
 civic_storm_callers_desc: "To społeczeństwo od niepamiętnych czasów potrafi przyciągać nawałnice za pomocą odprawianych rytuałów. Z biegiem lat połączyli je z innowacjami technicznymi, aby zwiększyć ich skuteczność. Wraz z nastaniem ery kosmicznej, chcą zabrać tę wiedzę do gwiazd."
 civic_storm_callers_effect_tooltip: "- $AVAILABLE_BUILDINGS$ £building£ ['building:building_storm_summoning_theater']\n- Zastępuje miejsca pracy - [entertainer.GetIcon] §H[entertainer.GetName]§! - następującymi: £job_storm_dancer£ §H$job_storm_dancer$§!\n- $SPECIES_TRAITS$ ['trait:trait_storm_touched']"
 civic_storm_callers_megacorp: "Treserzy burz"
 civic_storm_callers_megacorp_desc: "To, co z początku było zwykłą transmisją świętych rytuałów, przemieniło się w potężny konglomerat medialny. Prorocy i kapłani zostali zastąpieni charyzmatycznymi artystami, konkurującymi o odrobinę uwagi, odwołując się do burz kosmicznych."
 civic_storm_callers_megacorp_effect_tooltip: "$civic_storm_callers_effect_tooltip$\n- £building£ Gmach korporacyjny §Y$building_amusement_megaplex$§! generuje dodatkową §Ywartość filii§! i dodaje §G+50§! miejsc pracy dla £job_merchant£ §Ykupców§! w naszej stolicy."
 mod_capital_storm_diplo_weight_mult: "$MOD_DIPLO_WEIGHT_MULT$, kiedy na stolicę oddziałuje §Yburza kosmiczna§!"
 storm_devotion_diplo_weight_modifier: "$civic_storm_callers$"
 storm_devotion_corporate_diplo_weight_modifier: "$civic_storm_callers_megacorp$"
 civic_environmental_architects: "Ogrodnicy planetarni"
 civic_environmental_architects_desc: "To społeczeństwo, po eonach rozważnego pielęgnowania doskonałej równowagi swojego świata macierzystego, jest gotowe zaopiekować się nawet najbardziej niegościnnymi środowiskami wśród gwiazd. Ten lud szczerze wierzy, że naturę można kształtować, kontrolować i udoskonalać. Nie, żeby ją ujarzmić, ale w imię piękna doskonałego."
 civic_environmental_architects_negative_effect_tooltip: "- $HOMEWORLD$ rozpoczyna z dwoma £blocker£ §Hnaturalnymi przeszkodami terenowymi§!"
 civic_environmental_architects_effect_start: "- $ADDITIONAL_TECHNOLOGIES_STRING$ £society£ §HTechnologie§!, które usuwają £blocker£ ['concept_natural_blockers'] w twoim §Hświecie macierzystym§!\n- £society£ §HTechnologie§! do usuwania £blocker£ §Hnaturalnych przeszkód terenowych§! są przyznawane jako §Htrwałe opcje badawcze§! przy kolonizacji\n- ['concept_ascension_perk'] §Hmistrzostwa natury§! jest zastąpiona ['concept_decision', decyzją] planetarną §H$decision_cultivated_worldscaping$§!\n- Za każdą £blocker£ §Hnaturalną przeszkodę terenową§! na skolonizowanej £planet£ ['concept_planets', planecie]:"
 civic_environmental_architects_effect_tooltip: "$civic_environmental_architects_effect_start$\n$t$Zasoby z miejsc pracy: §R-10%§!\n$t$Szybkość przyrostu populacji: §R-10%§!\n$t$Utrzymanie populacji: §R+15%§!"
 civic_environmental_architects_hive: "Drony rolnicze"
 civic_environmental_architects_hive_desc: "Dzięki temu, że te drony są częścią wielkiego organizmu, mogą dostrzegać możliwości drzemiące w największym ze wszystkich organizmów: w naturze. Chcą kontrolować i kształtować naturalne systemy zgodnie z pragnieniem zbiorowości."
 civic_environmental_architects_hive_effect_tooltip: "$civic_environmental_architects_effect_start$\n$t$- Zasoby z miejsc pracy: §R-10%§!\n$t$Montaż populacji: §R-10%§!\n$t$Utrzymanie populacji: §R+15%§!"
 civic_environmental_architects_machine: "Protokoły ogrodnicze"
 civic_environmental_architects_machine_desc: "Chociaż nie ma już organicznych prekursorów, stworzone przez nich maszyny wciąż preferują dawną estetykę. Świat naturalny to urodzajna gleba dla zaprogramowanego perfekcjonizmu."
 civic_environmental_architects_machine_effect_tooltip: "$civic_environmental_architects_hive_effect_tooltip$"
 civic_environmental_architects_megacorp: "Geo-Engineering Inc."
 civic_environmental_architects_megacorp_desc: "Pracownicy tej megakorporacji przywykli do życia w złotej klatce. Dlatego korporacja buduje taką, gdziekolwiek ich wysyła."
