 shroud_storm_aftermath_modifier_tooltip: "$STORM_AFTERMATH_DESC$\n$t$- §H$shroud_storm_aftermath_modifier$§!:\n$tt$- $mod_pop_non_psionic_happiness$: §R-5%§! do §R-15%§!\n$tt$- $mod_psionic_pop_bonus_workforce_mult$: §G+25%§! do §G+75%§!"
