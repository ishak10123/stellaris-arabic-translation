 #Storm in a Box
 cstorms.1816.name: "Dryfująca kapsuła"
 cstorms.1816.desc: "W układzie §H[this.GetName]§! dryfuje tajemnicza kapsuła. Nie ma żadnych oczywistych zdolności ofensywnych i nie reaguje na nasze sygnały.\n\nWstępne skany wykazały, że jej uszkodzona powłoka zewnętrzna została zbudowana przy użyciu zaawansowanych materiałów i nieznanych technik inżynieryjnych. Potrzebna jest dalsza analiza."
 cstorms.1816.a: "Zbadajmy to."
 STORM_IN_A_BOX_INVESTIGATE_PROJECT: "Badania kapsuły"
 STORM_IN_A_BOX_INVESTIGATE_PROJECT_DESC: "Tajemnicza i wyraźnie uszkodzona kapsuła dryfuje przez układ §H[this.GetName]§!. Nie znamy ani jej pochodzenia, ani funkcji. Nie ma żadnego widocznego uzbrojenia i jesteśmy przekonani, że dalsza analiza jej zaawansowanej konstrukcji byłaby bezpiecznym i opłacalnym przedsięwzięciem."
 cstorms.1820.name: "Pułapka na burze"
 cstorms.1820.desc: "[this.leader.GetName] wierzy, że tajemnicza kapsuła dryfująca przez układ [solar_system.GetName] jest starożytną \"pułapką na burze\", która niegdyś mogła być elementem większej sieci ochronnej.\n\nPort wlotowy urządzenia jest szczelnie zamknięty, ale nasze odczyty sugerują, że wewnątrz znajduje się skompresowana energia i materia uwięzionej burzy kosmicznej.\n\nZnalezienie sposobu na otwarcie tego niezwykłego zasobnika może nas wiele nauczyć na temat łagodzenia skutków burz, choć wiąże się to z ryzykiem uwolnienia uwięzionych w nim energii."
 cstorms.1820.a: "Możemy się dzięki temu wiele nauczyć."
 cstorms.1820.b: "To zbyt niebezpieczne. Należy zostawić urządzenie w spokoju."
 STORM_IN_A_BOX_TRAP_PROJECT: "Otwarcie pułapki na burze"
 STORM_IN_A_BOX_TRAP_PROJECT_DESC: "Starożytna \"pułapka na burzę\" dryfuje swobodnie w przestrzeni kosmicznej, niosąc w sobie skompresowaną kosmiczną burzę. Otwarcie jej dostarczyłoby cennych informacji na temat zarządzania burzami i łagodzenia ich skutków, lecz wiąże się z ryzykiem uwolnienia uwięzionych w niej energii."
 cstorms.1826.name: "Uwolniona burza"
 cstorms.1826.desc: "[leader.GetName] kończy analizę działania starożytnej pułapki na burzę i jest w stanie otworzyć jej mechanizm wlotowy. Gdy porty otwierają się, uwięziona we wnętrzu urządzenia §H[from.GetStormType]§! wydostaje się do przestrzeni układu [solar_system.GetName].\n\nBadanie złożonej konstrukcji pułapki przyniosło fascynujące spostrzeżenia na temat materiałów i struktur odpornych na burze, choć nadal nie rozumiemy, w jaki sposób urządzenie jest w stanie więzić burze w swoim wnętrzu. Wiedza ta znacznie pomoże nam w radzeniu sobie z przyszłymi kosmicznymi kataklizmami."
 cstorms.1826.storm_tt: "Mała, niskopoziomowa §Y$default_storm$§! pojawia się w układzie [solar_system.GetName]"
 storm_trap_insight_modifier: "Wiedza o pułapkach na burze"
 storm_trap_insight_modifier_tt: "Zmniejsza negatywne efekty §Yburz kosmicznych§! o §G10%§!."
 cstorms.1835.desc: "Wyrazy współczucia, [this.GetSpeciesNamePlural]! Zauważyliśmy wielką burzę siejącą zamęt w układzie [this.GetName].\n\nOczywiście wieści o poczynionych tam zniszczeniach bardzo nas zasmuciły. Płakaliśmy rzewnie! Przyjmijcie naszą pomoc... wraz ze specjalną, jednorazową ofertą!\n\nSpecjalizujemy się w gadżetach - i to pierwszej klasy. Mamy najlepszy towar! Dzięki nim będziecie gotowi na nadejście następnej burzy. Ubijemy interes?"
 cstorms.1835.a: "Zgadzamy się."
 cstorms.1835.b: "Nie jesteśmy zainteresowani."
