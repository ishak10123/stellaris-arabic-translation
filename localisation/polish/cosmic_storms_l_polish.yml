 #Storm Visible Events
 MESSAGE_COSMIC_STORM_SPOTTED_DESC: "Skanery wykryły burzę kosmiczną typu $TYPE|Y$. Nazwaliśmy ją $NAME|Y$.\n\n"
 MESSAGE_COSMIC_STORM_SPOTTED_EVENT_CONFIRM: "Ciekawe."
 MESSAGE_STORM_INTRO: "Ta burza spowoduje niszczycielskie skutki dla kolonii i uniemożliwi naszym flotom dostęp do awaryjnego skoku w nadświetlną. Podjęcie środków zapobiegawczych jest gorąco zalecane.\n\n"
 MESSAGE_ELECTRIC_STORM_COSMIC_STORM_SPOTTED_DESC: "$MESSAGE_COSMIC_STORM_SPOTTED_DESC$$MESSAGE_STORM_INTRO$Ekstremalne ładunki elektryczne w obrębie tej burzy stanowią zagrożenie dla osłon naszych statków. Dzięki nim odnotowujemy jednak też znaczny wzrost produkcji w kolonii oraz prędkości statków."
 MESSAGE_SOLAR_STORM_COSMIC_STORM_SPOTTED_DESC: "$MESSAGE_COSMIC_STORM_SPOTTED_DESC$$MESSAGE_STORM_INTRO$Promieniowanie tej burzy sprawi, że statki w jej zasięgu będą widoczne dla każdego, kto akurat skanuje burzę. Choć stanowi to pewne zagrożenie, nasze stacje będą w tych warunkach funkcjonować dużo wydajniej."
 MESSAGE_CELESTIAL_STORM_COSMIC_STORM_SPOTTED_DESC: "$MESSAGE_COSMIC_STORM_SPOTTED_DESC$$MESSAGE_STORM_INTRO$Burza tego rodzaju zakłóci nasze czujniki, przez co nie będziemy mogli wykrywać innych flot w tych układach, oraz spowolni podróże kosmiczne. Niezależnie od ryzyka, będziemy mogli w jej trakcie wykorzystać te warunki na naszą korzyść i zwiększyć produkcję niektórych miejsc pracy."
 MESSAGE_NEXUS_STORM_COSMIC_STORM_SPOTTED_DESC: "$MESSAGE_COSMIC_STORM_SPOTTED_DESC$$MESSAGE_STORM_INTRO$Burza tego rodzaju stanowi ekstremalne zagrożenie dla naszych kolonii, flot i stacji. Dopóki nie minie, będzie wyrządzać im znaczne szkody."
 MESSAGE_SHROUD_STORM_COSMIC_STORM_SPOTTED_DESC: "$MESSAGE_COSMIC_STORM_SPOTTED_DESC$$MESSAGE_STORM_INTRO$Silne skupienie energii psionicznej w tej burzy znacznie zmniejszy stabilność naszych kolonii, lecz zwiększy uniki floty."
 MESSAGE_SHROUD_STORM_COSMIC_STORM_SPOTTED_SHROUD_BREACHED_DESC: "$MESSAGE_COSMIC_STORM_SPOTTED_DESC$$MESSAGE_STORM_INTRO$Silne skupienie energii psionicznej w tej burzy znacznie zmniejszy stabilność naszych kolonii, lecz nasza wiedza o poruszaniu się po Woalu zwiększy efektywność naszych flot i telepatów.\n\nWoal się burzy... Musimy być gotowi na wszystko."
 MESSAGE_GRAVITY_STORM_COSMIC_STORM_SPOTTED_DESC: "$MESSAGE_COSMIC_STORM_SPOTTED_DESC$$MESSAGE_STORM_INTRO$Silne oddziaływanie grawitacyjne tej burzy będzie stopniowo utrudniać operacje floty, najbardziej zagrażając największym statkom.\n\nPomimo tych problemów, nasze kolonie będą w stanie wykorzystać to ekstremalne środowisko, zwiększając efektywność niektórych zadań."
 MESSAGE_MAGNETIC_STORM_COSMIC_STORM_SPOTTED_DESC: "$MESSAGE_COSMIC_STORM_SPOTTED_DESC$$MESSAGE_STORM_INTRO$Ekstremalne siły magnetyczne tej burzy rozpętają chaos wśród naszej floty i systemów serwisowania strukturalnego.\n\nMagnetyczne siły tej burzy stworzyły niespodziewaną synergię z naszymi zaawansowanymi technikami metalurgicznymi. Powinno to zmniejszyć koszty powodowane przez naszych metalurgów w trakcie tego zdarzenia galaktycznego."
 MESSAGE_PARTICLE_STORM_COSMIC_STORM_SPOTTED_DESC: "$MESSAGE_COSMIC_STORM_SPOTTED_DESC$$MESSAGE_STORM_INTRO$Zagęszczenie szczątków w obrębie tej burzy spowoduje niszczycielskie skutki dla statków i stacji, całkowicie niwelując regenerację ich osłon. Floty, które odważą się pozostać w jej zasięgu, powinny przygotować się na niezwykle niebezpieczne warunki."
