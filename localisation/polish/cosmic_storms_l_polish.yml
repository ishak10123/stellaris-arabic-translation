 #Weather Manipulator
 r_weather_manipulator: "Niwelator anomalii"
 r_weather_manipulator_desc: "Zaawansowana wersja maszyny, za pomocą której handlarze MSRH manipulowali burzami kosmicznymi. Domyślnie, urządzenie to zwiększy wydajność wszystkich technologii związanych z burzami, ale odpowiednio zastosowana może nawet wypchnąć wszystkie burze z naszego terytorium."
 storm_relic_repelling_field_modifier: "Uruchomienie niwelatora anomalii"
 storm_relic_repelling_field_modifier_tt: "Tworzy §Mbardzo duże§! pole odpychające burzę (typ: §Y$default_storm$§!) wokół stolicy imperium na 36 miesięcy."
 #Temporary effect used by the Inetian Precursor Digsite C
 storm_timed_repelling_field_modifier: "Aktywacja sektorowych hamulców anomalii"
 storm_timed_repelling_field_modifier_tt: "Tworzy §Hśrednie§! pole odpychające burzę (typ: §Y$default_storm$§!) wokół stolicy imperium na 18 miesięcy."
 #The Tempest Invocator
 r_the_tempest_invocator: "Wywoływacz nawałnic"
 r_the_tempest_invocator_desc: "Potencjał tego urządzenia jest wyczuwalny nawet, gdy jest ono wyłączone. Czy ośmielimy się przywołać furię nawałnicy wewnątrz jednego z naszych najlepszych i najgenialniejszych? Chwała narodu wymaga ofiar."
 r_the_tempest_invocator_active_effect_tt: "Stwórz ['concept_nexus_storm'] w wybranym układzie.\n$t$Po wskazaniu układu $scientist_with_icon$ zostanie §Ppoświęcony§!."
 r_the_tempest_invocator_requirement_fail_tt: "$TRIGGER_FAIL$§RŻaden $scientist_with_icon$ nie może zostać poświęcony.§!"
 r_the_tempest_invocator_started_placing_fail_tt: "$TRIGGER_FAIL$§RSystem umieszczenia burzy już działa.§!"
 tempest_invocator_active_modifier: "Odpychanie nawałnic"
