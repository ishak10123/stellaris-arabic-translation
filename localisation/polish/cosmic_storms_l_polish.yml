 #Planetary Decisions
 decision_hunker_down: "Przygotowanie"
 decision_hunker_down_desc: "Obawiając się najgorszego, mieszkańcy tej planety zrobią wszystko, aby uchronić się przed efektami burz kosmicznych."
 decision_stop_hunker_down: "$decision_hunker_down$ - zakończenie"
 decision_stop_hunker_down_desc: "Kiedy minie zagrożenie burzami kosmicznymi, będziemy mogli zrezygnować z niektórych środków ostrożności. Ale czy sytuacja kiedykolwiek wróci do normy?"
 decision_cultivated_worldscaping: "Kształtowanie świata"
 decision_cultivated_worldscaping_desc: "Uczyńmy ten świat hołdem oddanym doskonałej symetrii. Obserwacja czystej geometrii krajobrazu przyniesie ukojenie."
