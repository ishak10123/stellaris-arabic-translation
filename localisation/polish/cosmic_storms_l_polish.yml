 cstorms.2010.name: "Kalibracja burzy"
 cstorms.2010.desc_irradiate_only: "Przygotowania, jakie wymusza na nas $default_storm$ w układzie §H[target.solar_system.GetName]§!, osiągnęły kluczowy etap. Kolejne działania wymagają intensywnego skupienia i zaangażowania nowych zasobów, dzięki czemu poprzez napromieniowanie wiatru słonecznego gwiazdy §H[target.GetName]§! powstanie §Y$solar_storm$§!."
 cstorms.2010.desc_others: "Przygotowania, jakie wymusza na nas $default_storm$ w układzie §H[target.solar_system.GetName]§!, osiągnęły krytyczny etap. Kolejne działania są kluczowe i wymagają bardziej skoncentrowanego zaangażowania nowych zasobów."
 cstorms.2010.a: "Zintensyfikować wiatry słoneczne."
 cstorms.2010.a.tt: "$approach_situation_initiate_storm_irradiate_tt$\nMiesięczny koszt: $@irradiate_alloy_upkeep|0$ $r_alloys$, Miesięczne postępy: $@default_monthly_progress$"
 cstorms.2010.b: "Rozdzielić pola elektronowe."
