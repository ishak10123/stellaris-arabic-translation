 #The tempest invocator relic UI localisations
 CLICK_TO_SELECT_LEADER: "§GKliknij, aby wybrać przywódcę§!"
 LEADER_SELECTION: "Wybierz przywódcę"
 TEMPEST_INVOCATOR_VIEW_HEADER: "Stwórz burzę"
 TEMPEST_INVOCATOR_VIEW_BODY: "Potencjał tego urządzenia można wyczuć nawet, gdy jest wyłączone. Jeśli odważymy się go użyć, okiełznamy moc burz.\n\nWybierz miejsce, gdzie powstanie $nexus_storm_color_tooltip$."
 #Tutorial Localisation
 cstorms_tutorial.a: "Zrozumiano"
 cstorms_tutorial.1.name: "Samouczek: manipulowanie burzą"
 cstorms_tutorial.1.desc: "Możemy §Smanipulować§! §Sdrogą§! zjawiska o nazwie §Y$default_storm$§! dla własnych korzyści. Na przykład w celu §Soddalenia§! ich od naszych układów lub §Szwabienia§! i wykorzystania ich pozytywnych efektów."
 TUTORIAL_STORM_FORECAST_MAP_MODE_TITLE: "Samouczek: prognoza pogody"
 TUTORIAL_STORM_FORECAST_MAP_MODE_DESC: "Ten tryb mapy oferuje wizualizację każdej §Sburzy kosmicznej§! w galaktyce, a także informacje o jej efektach.\n\n£storm_forecast_map£\n\nAby uzyskać dostęp do trybu mapy przewidywania pogody, kliknij ikonę mapy w prawym dolnym rogu.\n\nKorzystając z zaawansowanej technologii, można ulepszyć mapę, aby uzyskiwać coraz dokładniejsze prognozy dotyczące nie tylko lokalizacji i kierunku, jaki obiera §S$default_storm$§!, ale także tego, jakiego typu burzy można się spodziewać."
 concept_weather_forecasting_mode: "Tryb przewidywania pogody"
 concept_weather_forecasting_mode_desc: "$TUTORIAL_STORM_FORECAST_MAP_MODE_DESC$"
 TUTORIAL_STORM_PROTECTION_TITLE: "Samouczek: burze kosmiczne"
 TUTORIAL_STORM_PROTECTION_DESC: "§SBurze kosmiczne§! to potężne siły natury. Mogą mieć niszczycielski wpływ na nasze floty, gospodarkę, a nawet populację. Jednak mogą również stwarzać wspaniałe możliwości.\n\nBadania nad §Stechnologią burz kosmicznych§! zapewniają nam budynki i technologie, które znacznie §Szmniejszają§! negatywne §Sefekty§! burzy. Dzięki §Sdodatkowym badaniom§! powinniśmy móc je nawet §Swykorzystać§!."
