 cstorms.2295.a: "Niech [Root.GetLeaderName] zrobi, co chce."
 cstorms.2295.b: "[Root.GetLeaderName] nie może robić, czego chce."
 cstorms.2295.a.psionic: "Ich ofiary nadal krzyczą."
 cstorms.2295.a.psionic_gestalt: "Ich zjednoczone głosy wciąż wyją udręczone."
 cstorms.2295.a.gestalt: "Brak harmonii rodzi chaos."
 cstorms.2300.name: "Wszystko zostało powiedziane"
 cstorms.2300.desc: "Podczas gdy ciężko pracujemy nad odblokowaniem ostatniej sekcji obiektu $building_adakkaria_patriotic_institute$, z niższych laboratoriów dotarły do nas zaskakujące informacje. AdAkkaryjscy naukowcy twierdzili, że w każdej istocie, być może nawet w rozumnych maszynach, istnieje swego rodzaju iskra. Zainspirowani fenomenem powstawania kosmicznych burz nazwali ją \"burzą wewnętrzną\", żywiołem pragnienia i siły, która napędza wszelkie rozumne życie. Poddając burzę wewnętrzną ekstremalnym przeżyciom, można uwolnić wielką siłę.\n\nEfekt ten jako pierwszy odkrył §SalAtta Landeer§!, kiedy był jeńcem wojennym. Jako naukowiec zdołał przekonać wielkich przywódców do sfinansowania dalszych prac nad Świętowaniem. Choć nie znaleźliśmy wzmianek o dalszych losach §SLandeera§!, po wydarzeniach na cmentarzysku statków wiemy już, że nie potoczyły się szczęśliwie.\n\nKolejne meldunki zawierają informacje o skuteczniejszej metodzie rozbudzania burzy wewnętrznej. Nie wymagała ona ekstremalnego fizycznego okrucieństwa, lecz wywołania w ofierze nieokiełznanego i śmiertelnie silnego przerażenia. Aby wdrożyć ten efekt na pełną skalę, Konwent planował nadać sygnał przez swoją rozległą sieć stacji propagandowych."
 cstorms.2300.desc.psionic: "Zdołaliśmy nagrać psioniczne szepty z pokładów obserwacyjnych:\n\n§LZabierzcie mnie stąd, proszę, byłem wzorowym obywatelem!\nMoje sny to teraz już tylko niekończąca się burza. Słyszę jej zew.\nNie rozumiem. Zadania wypełnialiśmy doskonale. Czemu oni nam to robią?\nW każdym z nas drzemie moc. A oni chcą ją wykorzystać. Nie możemy im jej dać.\nBzdura. Robią to, żeby ocalić Konwent Życzliwości. Musimy być posłuszni.\nSatelity szepczą do mnie. Mogę teraz sięgać umysłem na drugą stronę galaktyki.\nWidziałem, że coś zaprojektowali. Coś, co może sprowadzić to przeżycie na każdego, gdziekolwiek jest.\nZostaniemy ocaleni, dajcie im tylko, czego chcą!\nNie rozumiesz. Jeśli zrobią to nam, zrobią to wszystkim.\nMoglibyśmy uwolnić naszą moc.\nAle wtedy...\nOni i tak nas zabiją, kiedy już uruchomią to coś. Zabiją nas wszystkich.\nBoję się, nie chcę umierać. Chcę żyć. Proszę.\nOstatnia faza do mnie przemawia. Chce wiedzieć, czy się zgadzamy.§!"
 cstorms.2300.b: "Ta siła musi stać się naszą."
 cstorms.2300.a.psionic: "Co za ponury koniec."
 cstorms.2300.a.psionic_hive_robot: "Niefortunny rezultat."
 cstorms.2300.b.psionic: "Nic nie jest szlachetniejsze od ofiary."
 cstorms.2300.b.psionic_hive_robot: "To sprawa godna poświęceń."
 cstorms.2305.name: "Wywoływacz nawałnic"
 cstorms.2305.desc.start: "Odkryliśmy olbrzymi hangar. Niesamowicie skomplikowaną konstelację przewodów, rur i elektroniki połączonych z rozległym, choć pustym, silosie rakietowym. Wszystko wskazuje na to, że ta siatka przyrządów połączona była z obiektem wielkości mniej więcej korwety.\n\nWedług danych miejsce to wykorzystywano do budowy urządzenia zwanego §lwywoływaczem nawałnic§!, które zostało z powodzeniem wykorzystane w układzie adSul. Choć kontakt z nim uległ zerwaniu, §Gźródło zasilania wywoływacza§! wciąż tu jest."
 cstorms.2305.desc.end.default: "Przeczytawszy nazwę urządzenia, załoga wpadła w irracjonalny szał i zaczęła wyrywać kable oraz panele. Nie wystarczył zwykły rozkaz, aby ich uspokoić. Z każdą chwilą zbliżamy się do prawdy."
 cstorms.2305.desc.end.psionic: "Gdy [Root.GetLeaderName] zbliża się do pustego konstruktu, znów rozlegają się psioniczne szepty.\n§LWidzicie, prawda? Na początku nie wiedzieliśmy, co oni budują. Nie wiedzieliśmy, że się nas pozbędą. Niektórzy z nas chcieli zemsty. Inni tylko wolności. Niektórzy poczuli zew burz. Zrozumcie, to się musiało skończyć. Musieliśmy to zrobić. Nie mogliśmy już tego dłużej znieść.§!"
 cstorms.2305.desc.end.gestalt: "Przeczytawszy nazwę urządzenia, nasze [controller.GetIndividualNamePlural] badawcze wywnioskowały, w jaki sposób §lwywoływacz§! był aktywowany, a także ustaliły metodę, w jaki sygnał poprzez siatkę stacji propagandowych docierał do swojego celu.\n\nNie okazaliśmy się odporni na ten los."
 cstorms.2305.desc.default: "$cstorms.2305.desc.start$\n\n$cstorms.2305.desc.end.default$"
 cstorms.2305.desc.psionic: "$cstorms.2305.desc.start$\n\n$cstorms.2305.desc.end.psionic$"
 cstorms.2305.desc.gestalt: "$cstorms.2305.desc.start$\n\n$cstorms.2305.desc.end.gestalt$"
 cstorms.2310.name: "Ostatnia faza"
 cstorms.2310.desc.start: "Świętowanie odsłoniło wreszcie przed nami największą ze swoich tajemnic: ostatnią fazę.\n\nNa podłodze korytarzy leżały zasuszone zwłoki adAkkaryjczyków rozerwane na strzępy przez kawałki kamieni, metalu, plastiku i innych odpadków. Szalała tu jakaś potężna moc. Niszczyła wszystko i wszystkich na swojej drodze.\n\nAle to, co"
 cstorms.2310.desc.piece.default: "najstraszliwsze,"
 cstorms.2310.desc.piece.authgen: "najpiękniejsze,"
 cstorms.2310.desc.end: "miało się nam dopiero objawić.\nW ciasnych celach zamkniętych było sześć osób. Na ekranach informacyjnych opisane one był jako §Gźródło zasilania wywoływacza§!, lecz byli to ewidentnie bardzo młodzi obywatele Konwentu. Ich drobne ciała zawieszone zostały na dziesiątkach rurek i kabli. Płyn, którym wypełniono cele, utrzymywał ich w stanie między życiem i śmiercią. Otaczała ich moc, która przypominała energie utrzymującej się w układzie adSul burzy.\n\nNieliczne aktywne jeszcze ekrany ożyły - na każdym z nich widniała jedna prośba:\n§LZAPAMIĘTAJCIE NAS. WYPOWIEDZCIE NASZE IMIONA. WYPOWIEDZCIE NASZE IMIONA.§!\n\nZapisaliśmy imiona tych młodych osób. Ostatnie z nich okazało się jednak zaskakująca: §SenRida Direen§! z Wywyższonej Życzliwości, która ugasiła ogień siłą swojego umysłu.\n\nBędąc w posiadaniu tych imion, powinniśmy być w stanie ponownie skontaktować się z kosmiczną burzą."
 cstorms.2310.desc.default: "$cstorms.2310.desc.start$ $cstorms.2310.desc.piece.default$ $cstorms.2310.desc.end$"
 cstorms.2310.desc.authgen: "$cstorms.2310.desc.start$ $cstorms.2310.desc.piece.authgen$ $cstorms.2310.desc.end$"
 cstorms.2310.a: "Doskonała robota!"
 #The Storm's Swansong
 cstorms.2320.name: "Burza"
 cstorms.2320.desc: "WYPOWIEDZCIE NASZE IMIONA.\n\nWYPOWIEDZCIE NASZE IMIONA.\n\nWYPOWIEDZCIE. NASZE. IMIONA."
 cstorms.2320.a: "Widzieliśmy, co zrobił wam Konwent."
 cstorms.2320.b: "Co się stało z Konwentem adAkkaryjskim?"
 cstorms.2320.c: "Gdzie jest wywoływacz nawałnic?"
 cstorms.2320.d: "Znamy już wasze imiona."
 cstorms.2320.a.resp: "NIE PRZESTAWALI SPROWADZAĆ NA NAS\n\nBÓLU I WŚCIEKŁOŚCI I ROZPACZY I STRACHU.\n\nBYLI JAK ZĘBY I JAK SZCZĘKI I POŻERALI\nWYPLUWALI NAS I SPROWADZALI\n\nBÓL I WŚCIEKŁOŚĆ I ROZPACZ I STRACH\n\nROZPLETLIŚMY SIĘ, ROZPADLIŚMY SIĘ, STALIŚMY SIĘ\n\nBÓLEM I WŚCIEKŁOŚCIĄ I ROZPACZĄ I STRACHEM"
 cstorms.2320.b.resp: "SŁABI I ZAROZUMIALI I BEZLITOŚNI\nDUMNI. OKRUTNI. AMBITNI.\nNIEŚLI ŚMIERĆ, NIEŚLI CIERPIENIE\n\nMUSIELIŚMY MUSIELIŚMY MUSIELIŚMY MUSIELIŚMY MUSIELIŚMY MUSIELIŚMY MUSIELIŚMY\nBYĆ. NIE BYĆ. ZANIEBYĆ.\n\nMY\nPRZEMIERZAMY TRANSMISJE. ZAKŁÓCAMY SYGNAŁ. ZAKŁÓCAMY UMYSŁY. \nZALAĆ BIELĄ. ZALAĆ SZAROŚCIĄ. ZALAĆ CZERNIĄ. PODDAĆ SIĘ CIEMNOŚCI.\nROZPROSZYĆ SIĘ WŚRÓD GWIAZD I ZNIKNĄĆ NA ZAWSZE"
 cstorms.2320.c.resp: "JESTEŚMY\nTARCZĄ. ŻEBY CHRONIĆ.\n\nJESTEŚMY\nKOŁYSKĄ. UKOŁYSZ\n\nI ROZBUJAJ JĄ PROSTO W NICOŚĆ. ŚPIJ, ŚPIJ, ŚPIJ, GIŃ\n\n§lNISZCZYCIELU§! §RBURZ§!\nI NIGDY SIĘ JUŻ NIE BUDŹ"
 cstorms.2325.desc: "WYPOWIEDZCIE NASZE IMIONA. WYPOWIEDZCIE NASZE IMIONA. WYPOWIEDZCIE NASZE IMIONA.\n\nTERAZ §g(TERAZ)§!TERAZ §g(TERAZ)§!\n\nWYPOWIEDZCIE NASZE IMIONA. WYPOWIEDZCIE NASZE IMIONA. WYPOWIEDZCIE NASZE IMIONA.\n\nWYPOWIEDZCIE. TERAZ. NASZE. IMIONA."
 cstorms.2325.d: "Dobrze. Wasze imiona to..."
 cstorms.2330.desc: "§LWypowiedzieliśmy wszystkie znalezione podczas eksploracji imiona. Po wypowiedzeniu ostatniego z nich burza ucichła.§!"
 cstorms.2330.a: "Jesteście tam jeszcze?"
 cstorms.2335.desc: "Możemy znów myśleć! §g(Myśl, myśl, myśl).§!\nTyle wokół nas głosów! §g(Myślą, mówią, pragną, marzą).§!\nTyle wyjątkowych osób. §g(Ty i ja i oni i one).§!\n\nPrzywróciliście nam rozum. §g(Podróżować, odszyfrować, odkrywać).§!\nA jednak wypowiadając nasze imiona, macie nad nami władzę... §g(Nie, nie znowu!)§!\nCzego od nas chcecie? §g(Wypuśćcie nas, wypuśćcie, wypuśćcie, wypuśćcie).§!"
 cstorms.2335.a: "Czas, żebyście byli wolni."
 cstorms.2335.b: "Poddajcie się i dajcie nam wywoływacz nawałnic."
 cstorms.2340.desc: "Wolność.\n\nChcecie nas wypuścić? §g(Wolność?)§!\n\nNiemożliwe. §g(To jest niemożliwe).§!\nNie mówicie chyba poważnie. §g(A wywoływacz nawałnic?)§!"
 cstorms.2340.a: "Zniszczymy go."
 cstorms.2345.desc: "Ból i wściekłość i rozpacz i strach. §g(BÓL. WŚCIEKŁOŚĆ. ROZPACZ. STRACH).§!\n\nTylko do tego się nadajemy.\n\nTYLKO DO TEGO SIĘ NADAJEMY BÓL WŚCIEKŁOŚĆ ROZPACZ STRACH.\n§gBÓL WŚCIEKŁOŚĆ ROZPACZ STRACH BÓL WŚCIEKŁOŚĆ ROZPACZ STRACH BÓL WŚCIEKŁOŚĆ ROZPACZ STRACH WŚCIEKŁOŚĆ ROZPACZ STRACH BÓL WŚCIEKŁOŚĆ ROZPACZ STRACH BÓL WŚCIEKŁOŚĆ ROZPACZ STRACH BÓL ROZPACZ STRACH BÓL WŚCIEKŁOŚĆ ROZPACZ STRACH BÓL WŚCIEKŁOŚĆ ROZPACZ STRACH BÓL WŚCIEKŁOŚĆ STRACH BÓL WŚCIEKŁOŚĆ ROZPACZ STRACH BÓL WŚCIEKŁOŚĆ ROZPACZ STRACH BÓL WŚCIEKŁOŚĆ ROZPACZ BÓL WŚCIEKŁOŚĆ ROZPACZ STRACH BÓL WŚCIEKŁOŚĆ ROZPACZ STRACH BÓL WŚCIEKŁOŚĆ ROZPACZ STRACH WŚCIEKŁOŚĆ ROZPACZ STRACH BÓL WŚCIEKŁOŚĆ ROZPACZ STRACH BÓL WŚCIEKŁOŚĆ ROZPACZ STRACH BÓL ROZPACZ STRACH BÓL WŚCIEKŁOŚĆ ROZPACZ STRACH BÓL WŚCIEKŁOŚĆ ROZPACZ STRACH BÓL WŚCIEKŁOŚĆ STRACH BÓL WŚCIEKŁOŚĆ ROZPACZ STRACH BÓL WŚCIEKŁOŚĆ ROZPACZ STRACH BÓL WŚCIEKŁOŚĆ ROZPACZ§!"
 cstorms.2345.a: "Miotaj się, ile chcesz, nasz sługo na wieki."
 cstorms.2350.name: "Nigdy więcej burzy"
 cstorms.2350.desc: "Burza stworzyła dziurę w sobie samej, aby ujawnić przed nami §lwywoływacz nawałnic§!. Dziwne, że tak małe urządzenie stało się przyczyną tak wielkiego pożądania, cierpienia i ofiar. Samo jego istnienie stało się przyczyną upadku majestatycznego niegdyś imperium.\n\nWykorzystując prosty zestaw komend, uruchomiliśmy system samozniszczenia wywoływacza. Kiedy tylko doszło do eksplozji, a szczątki urządzenia rozniosły się po układzie gwiezdnym, burza zaczęła ustawać, a wraz z nią rozproszyła się dziwna zasłona, która spowijała świat macierzysty Konwentu adAkkaryjskiego.\n\nIch jakże długi koszmar w końcu dobiegł końca."
 cstorms.2350.a: "Niech wasze imiona na zawsze pozostaną zapamiętane."
 cstorms.2355.name: "Ból, wściekłość, rozpacz, strach"
 cstorms.2355.desc: "Burza miotała się i szalała w swojej bezsilnej wściekłości, nie była jednak w stanie nas skrzywdzić ani uszkodzić §lwywoływacza nawałnic§!.\n\nNakazaliśmy zamkniętym w nim głosom, by otworzyły nam przejścia przez burzę i zdobyliśmy dla siebie największą technologiczną zdobycz Konwentu.\n\nŚwiat macierzysty adAkkarii pozostał jednak niedostępny. $building_adakkaria_patriotic_institute$ i wszelkie drogi do niego pozostają zamknięte na zawsze. Słowa niesione w ryku burzy pozostały jednak w naszych umysłach.\n\nBól, wściekłość, rozpacz i strach.\nPozna je cała galaktyka."
 cstorms.2355.a: "Ofiary to rzecz niezbędna."
 MESSAGE_INSTITUTE_SPAWNED_STORM_TITLE: "Wywołanie burzy"
 MESSAGE_INSTITUTE_SPAWNED_STORM: "§Y100§! £pop£ §Hpopulacji§! wywołało się na planecie $PLANET$. Efektem jest $STORM$ w układzie $SYSTEM$."
 artifact_adakkaria_research: "Tajemnice adAkkarii"
 artifact_adakkaria_research_desc: "Skrupulatnie zgłębiaj tajemnice adAkkarii."
 artifact_adakkaria_research_completed: "$artifact_adakkaria_research$"
 artifact_adakkaria_research_completed_desc: "Znaleźliśmy zastosowanie dla dawnej wiedzy adAkkarii."
 #Secrets of the adAkkaria Convention
 project_adakkaria_secrets_of: "Tajemnice Konwentu adAkkaryjskiego"
 project_adakkaria_secrets_of_DESC: "W Instytucie Świętowania możemy się jeszcze wiele nauczyć. Czy ośmielimy się dokładniej zgłębić adAkkaryjskie eksperymenty?"
 cstorms.2365.name: "Uwolniony potencjał"
 cstorms.2365.desc.start: "Przyglądając się badaniom Konwentu adAkkaryjskiego, widać, że ich naukowcy nie stosowali się do żadnego powszechnie uznanego standardu. Metodologia była niedbała, konkluzje niemalże banalne. Uważne i dokładne badania były lekceważone na cześć deprawacji. A jednak im większemu okrucieństwu poddawano badanych, tym głośniej rozbrzmiewały pochwały od dowództwa.\n\nWczesne etapy badań wyglądały jednak zupełnie inaczej. Badani byli dobrze traktowani, a ich podróż ku przebudzeniu \"burzy wewnętrznej\" budziła szacunek. Kiedy porównać wyniki wczesnego i późnego stadium badawczego, nie sposób uniknąć przerażającej konkluzji: nigdy nie istniało powiązanie między okrucieństwem tortur i liczbą przebudzonych osób. Niezliczone rzesze cierpiały i umierały na próżno."
 cstorms.2365.desc.end.default: "Rozumiemy już zasady, na jakich opierała się ta nauka. Ucząc się na błędach Konwentu adAkkaryjskiego, powinniśmy być w stanie zachęcić naszych własnych obywateli do rozbudzania swoich burz wewnętrznych i przesycania się ich wigorem. Ryzykujemy tym, że niektórzy §G$Name_Storm_Fused$§! mogą odpowiedzieć na jej wezwanie i doprowadzić do rozpętania burzy kosmicznej."
 cstorms.2365.desc.end.gestalt: "Nasz kolektyw rozumie już zasady, na jakich opierała się ta nauka. Ucząc się na błędach Konwentu adAkkaryjskiego, niektóre nasze części powinny być zdolne do rozbudzania swoich burz wewnętrznych i przesycania się ich wigorem. Ryzykujemy tym, że niektóre §G$Name_Storm_Fused$§! węzły mogą odpowiedzieć zbyt silnie na jej wezwanie i doprowadzić do rozpętania burzy kosmicznej."
 cstorms.2365.desc.default: "$cstorms.2365.desc.start$\n\n$cstorms.2365.desc.end.default$"
 cstorms.2365.desc.gestalt: "$cstorms.2365.desc.start$\n\n$cstorms.2365.desc.end.gestalt$"
 cstorms.2365.a: "Zastosujmy tę nową wiedzę. Tylko ostrożnie!"
 cstorms.2365.b: "Nie, niech te tajemnice pozostaną w uśpieniu."
 cstorms.2365.a.tt: "- Poczwórna szansa, że §Y100§! £pop£ §Hpopulacji§! zdobędzie cechę $Name_Storm_Fused$ podczas trwania burzy.\n- Co 20 lat pojawia się niewielka szansa, że §Y100§! £pop£ §Hpopulacji§! zginie i zmieni się w burzę.\n- Kultywacja potencjału: modyfikator imperium +5% do zadowolenia."
 Name_Storm_Fused: "Naładowanie burzą"
 Name_Storm_Fused_affix: "Naładowanie burzą" #The trailing space is intentional, to give a space before the species name on the species screen
 ########################################
 #### Storm Chasers #
 ########################################
 origin_storm_chasers: "Poszukiwacze burz"
 origin_storm_chasers_desc: "Nie ma wyzwania, przed którym się ugną, ani tropu, który porzucą. Żadnej burzy, którą by zignorowali.\n\nJest to w gruncie rzeczy cywilizacja poszukująca emocji. Dla własnego pożytku i ku własnej zgubie."
 origin_tooltip_storm_chasers_effects: "- $LEADERS_TRAITS$ ['concept_storm_rider']\n- $mod_planet_jobs_unity_produces_mult$ planety za §Ybudynek burzowy§!: §G+$@storm_chasers_storm_building_unity_produces_mult|%0$§!\n- Budynki stołeczne automatycznie zapewniają modyfikatory §Yschronów burzowych§!, kiedy opracowane zostaną wymagane technologie.\n- Szansa na pojawienie się §Y$default_storm$§! w obrębie granic: §G+100%§! \n- Szansa na możliwość badań §Ytechnologii burz kosmicznych§!: §G+175%§!\n- Dostęp do: ['concept_weather_forecasting_mode']\n- $ADDITIONAL_TECHNOLOGIES_STRING$$TABBED_NEW_LINE$- £physics£ ['technology:tech_storm_prediction_1']"
 START_SCREEN_STORM_CHASERS: "Czymże jest życie bez pędu? Płoń szybko i giń gwałtownie - taki nasz odwieczny zwyczaj. Ale kiedy przemierzysz już każdy szlak i wejdziesz na najwyższy szczyt - co dalej?\n\nNasza planeta zawsze była targana burzami, występowały tu huragany i inne nawałnice. Jeżeli znajdziemy sposób na wykorzystanie tych wyjątkowych warunków, być może uda nam się wywołać szalejącą burzę kosmiczną.\n\nNasi legendarni przodkowie dawno już sprostali wyzwaniom naszego świata macierzystego. Nadszedł czas, aby z rykiem silników ruszyć w pustkę. Nie będzie łatwo, ale jak głosi przysłowie: \"Tylko śmiałkowie docierają do linii horyzontu\"."
 #Storm Rider Trait
 leader_trait_storm_rider_desc: "Jeźdźcy burz żyją adrenaliną, a swój prawdziwy potencjał odkrywają w porywach burzy kosmicznej. Pozycje rady zastępują premie polowe premiami rady."
 mod_trait_storm_rider: "\n$t$Efekty cech wzrastają, kiedy przywódca przebywa w kosmicznej burzy."
 leader_trait_storm_rider_name: "Jeździec burz"
 leader_trait_storm_rider_commander: "$leader_trait_storm_rider_name$"
 leader_trait_storm_rider_commander_desc: "$leader_trait_storm_rider_desc$"
 leader_trait_storm_rider_scientist: "$leader_trait_storm_rider_name$"
 leader_trait_storm_rider_scientist_desc: "$leader_trait_storm_rider_desc$"
 leader_trait_storm_rider_official: "$leader_trait_storm_rider_name$"
 leader_trait_storm_rider_official_desc: "$leader_trait_storm_rider_desc$"
 #Storm Chasers specific Progress Events
 progress.2.desc.storm.normal: "Jak to mawia [Root.Owner.GetScientist]: \"Patrzcie no tylko na tego kurdupla!\".\n\n$progress.2.desc.storm.outro$"
 progress.2.desc.storm.gestalt: "Aż drżymy z podniecenia.\n\n$progress.2.desc.storm.outro$"
 progress.2.desc.storm.outro: "[From.GetName] miejscem pobytu obcych istot! Te dzikie stworzenia nieprędko będą z nami w stanie porozmawiać, ale wiemy przynajmniej, że nie jesteśmy sami w naszej kosmicznej podróży.\n\nMoże się okazać, że galaktyka jest jednak pełna form życia."
 progress.3.desc.storm.normal: "\"Niesamowite!\" - wykrzykuje [ruler.GetRegnalName]. \"Nowy świat pełen możliwości!\"\n\nPodczas gdy statek kolonizacyjny zmienia się w bazę, pierwsi badacze przygotowują już sprzęt, aby doświadczyć tego, co rzuci przeciwko nim planeta."
 progress.3.desc.storm.gestalt: "Ekscytujące odkrycie! Nowy świat pełen możliwości!\n\nPodczas gdy statek kolonizacyjny zmienia się w bazę, węzły badawcze przygotowują już sprzęt, aby doświadczyć tego, co rzuci przeciwko nim planeta."
 progress.3.a.storm: "Naprzód."
 progress.4.desc.storm: "Spośród kosmicznej ciszy dobiegła nas odpowiedź na nasze wezwania! To obca cywilizacja dorównująca nam technologią - najpewniej dołączyła do galaktycznej walki w tym samym czasie, co my.\n\nIch wygląd zwiastuje nowe granice doświadczania. Czy okażą się myślącymi jak my sojusznikami, czy też rywalami, którzy sprawdzą nasze męstwo? Tak czy inaczej, dreszczyk odkrywania nieznanego pcha nas naprzód."
 progress.4.h.storm: "Intrygujące."
 progress.5.desc.storm.normal: "Na planecie [From.Planet.GetName] odkryliśmy przedrozumne formy życia. Nasi [Root.Owner.GetScientistPlural] twierdzą, że \"istoty te nie wydają się jeszcze zbyt imponujące, ale mają ogromny potencjał”.\n\nNa tę chwilę jednak pozostają w przedrozumnym stadium. Obserwowanie rozwoju tych stworzeń będzie nad wyraz ciekawe."
 progress.5.desc.storm.gestalt: "Na planecie [From.Planet.GetName] odkryliśmy przedrozumne formy życia.\n\nJesteśmy bardzo ciekawi potencjału, jaki zaprezentują, ale na tę chwilę pozostają w przedrozumnym stadium. Obserwowanie rozwoju tych stworzeń będzie nad wyraz ciekawe."
 progress.5.h.storm: "Niesamowite."
 progress.6.desc.storm: "Spośród kosmicznej ciszy dobiegła nas odpowiedź na nasze wezwania! Ale pierwsze wrażenia są zupełnie odstręczające: ta rasa nie podziela naszych tradycji i woli trzymać się na uboczu. Lepiej będzie, jeśli się wycofamy."
 progress.6.h.storm: "Powinni nadrobić zaległości."
 pirate.1.desc.storm: "Kosmiczni piraci! Grupa nosząca miano §S[pirate_band.GetName]§! obrała nas sobie na cel - sama myśl o tym jest przerażająca.\n\nChoć możemy uszanować styl życia, jaki wybrali, to wpływ ich działań na nasze sieci handlowe jest niekorzystny."
 pirate.2.j.storm: "Przykra sprawa."
 ### STORMFALL SITUATION START ###
 situation_stormfall: "Burza"
 situation_stormfall_type: "Kwestia korzeni"
 situation_stormfall_desc: "Intensywna pogoda na świecie [owner.capital_scope.GetName] pokazuje, jak ogromna moc drzemie w burzach. Jeśli nauczymy się sterować pogodą w skali planetarnej, ujarzmimy tę siłę i wykorzystamy na kosmiczną skalę. Wznoszenie budynków przyciągania burzy przyspieszy moment, w którym stworzymy burzę doskonałą."
 situation_stormfall_monthly_change_tooltip: "Nauczymy się panować nad tymi burzami."
 situation_stormfall_outcome: "Narodziny burzy kosmicznej."
 stage_stormfall_effects: "Musimy poznać tajniki manipulacji burzami kosmicznymi."
 #Approach Chill
