 ### Green Skies
 site_green_skies: "Zielone niebo"
 site_green_skies_intro: "Nasze skanery wychwyciły serię intrygujących sygnałów pochodzących z tego obszaru planety. Po amalizie ich składu uważamy, że jest wysoce prawdopodobne, że znajduje się tam czekająca na odkrycie pozostałość starożytnej cywilizacji."
 cstorms.1400.name: "Ciekawa mieszanka"
 cstorms.1400.desc: "Niedaleko naszego obozu przywitały nas osobliwe ruiny miasta.\n\nArchitektura wykazywała cechy charakterystyczne dla każdej cywilizacji, którą do tej pory napotkaliśmy - w tym naszej własnej!\n\nJednak skład materiałowy jest podobny do tego, którego używamy do zakładania obozów podczas kolonizacji planet. To dziwne, ponieważ materiały te nigdy nie wytrzymałyby wielu dziesięcioleci, nie mówiąc już o czasie od jakiego istnieją te ruiny, jeśli wierzyć wskazaniom naszych czujników.\n\nJest mało prawdopodobne, aby pozostałości te należały do tajemniczego prekursora, jednak skanery upierają się przy swoim wniosku. Co się tu dzieje?"
 cstorms.1405.name: "Pogorszenie sytuacji"
 cstorms.1405.desc: "Ślad sygnałów wiódł do ścieżki prowadzącej na niższe poziomy ruin miasta. Zazwyczaj tego typu stanowiska archeologiczne posiadają podziemną sieć transportową lub system schronów. Zamiast tego znaleźliśmy system małych jaskiń zaśmiecony skrawkami tkanin, pojemnikami polimerowymi, a nawet odpadami organicznymi. Wygląda na to, że nie jesteśmy pierwszymi, którzy zbadali o to stanowisko archeologiczne.\n\nCo niepokojące, [Root.GetLeaderName] informuje nas, że niebo na zewnątrz zmienia kolor na zielony; w układzie gwiezdnym [Fromfrom.getName] niebawem zacznie się burza kosmiczna. Mimo to podążamy w kierunku punktu, z którego nadawano sygnały."
 cstorms.1410.name: "Szaleństwo"
 cstorms.1410.desc: "Nasz postęp został na chwilę zatrzymany przez poważnie uszkodzone metalowe drzwi. Bez większego wysiłku pokonaliśmy tę przeszkodę i naszym oczom ukazał się prymitywny magazyn.\n\nJego półki były wypełnione po brzegi asortymentem przestarzałych technologii. Pudełka znanych korporacji były starannie ułożone pod ścianami. I wreszcie źródło sygnału, za którym tak długo goniliśmy: komputer z transponderem, podobny do naszego.\n\nGdy zalogowaliśmy się do urządzenia i przeszukaliśmy jego bazy danych, nasi [Root.Owner.GetEngineerPlural] wysnuli szalony wniosek: sygnał został celowo skonstruowany tak, aby wyglądał tak tajemniczo i intrygująco, jak to tylko możliwe - naśladując i łącząc cechy innych cywilizacji.\n\nCo więcej, wewnątrz skrzyń znaleźliśmy zestawy konstrukcyjne ruin, które napotkaliśmy nad ziemią.\n\nSkontaktowaliśmy się z naszą bazą, aby zgłosić te odkrycia, ale burza kosmiczna już zaczęła zakłócać łączność. Otrzymaliśmy tylko niepokojące rozkazy, [Root.GetLeaderName] twierdzi, że nasz obóz jest atakowany!"
 cstorms.1410.a: "Przygotować naszą odpowiedź!"
 cstorms.1415.name: "Piraci!"
 cstorms.1415.desc: "[Fromfrom.getName]: Szalejąca wewnątrz burza kosmiczna okazała się skrywać piracką flotę! To jej załoga zaatakowała naszą bazę. Piraci poprosili nas, abyśmy przekazali wam tę wiadomość:\n\n§LDrodzy absolutni głupcy,\n\ndziękujemy za dołączenie do nas w naszej najtajniejszej kryjówce.\n\nCzy to nie zadziwiające, jak szybko pozornie inteligentne istoty porzucają wszelki rozsądek, gdy tylko wyczują najmniejszy powiew starożytnych artefaktów i pokrętnych relikwii? Być może liczyliście, że znajdziecie sposób na zniszczenie wielkiego wroga? Zbudować floty tak wielkie, że sięgałyby aż po horyzont zdarzeń? A może po prostu chcieliście być mili dla swoich ludzi? Jakie to osobliwe.\n\nProszę, nie miejcie do siebie pretensji - przed wami wielu innych było w tej sytuacji, a nasz model biznesowy zakłada, że inni pójdą w wasze ślady.\n\nTeraz, za skromną sumę 2000 kredytów energetycznych zwrócimy wam coś, co straciliście.\n\nOdrzućcie naszą ofertę, a kto wie, jakie straszne rzeczy mogą się przydarzyć waszej słabo uzbrojonej załodze, która wciąż jest uwięziona na planecie.\n\nWybierzcie mądrze.§!\n\nNa razie jesteśmy bezpieczni w tych jaskiniach, ale nie wiemy, jak długo. Czy spełnimy żądania tych bandytów?"
 cstorms.1415.a: "Zapłacimy."
 cstorms.1415.b: "Niech zgniją w zapomnieniu!"
 cstorms.1415.b.tt: "[Root.GetLeaderName] jest zakładnikiem."
 cstorms.1416.name: "Opór"
 cstorms.1416.desc: "Otrzymaliśmy nową wiadomość:\n\n§LWstyd. Jest wiele fajnych rzeczy, które moglibyśmy zrobić z tymi zasobami.\n\nPoinformujemy przywódcę i załogę, że ich życie nie było warte wysiłku ani kredytów. Może jakiś pobliski handlarz niewolników lub bardzo zdeterminowany asymilator byłby zainteresowany. Słyszeliśmy, że zszywanie nerwów to nowy, gorący trend.\n\nPrecz z przedsiębiorcami.§!\n\nUżyliśmy wszystkiego, co mogliśmy znaleźć, aby się zabarykadować, i mamy wystarczająco dużo zapasów, aby zapewnić nam bezpieczeństwo na jakiś czas. Ale flota piratów w końcu przełamie naszą obronę!"
 cstorms.1420.name: "Nie damy się ponownie oszukać"
 cstorms.1420.desc: "Ci piraci nie potrafili poprzeć swoich buńczucznych wypowiedzi umiejętnościami. Niebawem to, co pozostało z ich floty, stało się częścią galaktycznego ekosystemu.\n\nWkrótce potem ponownie nawiązaliśmy kontakt z załogą na powierzchni. Byli raczej wstrząśnięci tym doświadczeniem, ale nie ucierpieli.\n\nChociaż nie odkryliśmy tutaj żadnych informacji o starożytnych cywilizacjach, nasze doświadczenie zaszczepiło w nas potrzebę czujności. Lider wyprawy nie dostrzegł nadchodzącego niebezpieczeństwa - nie popełnimy ponownie tego samego błędu."
 cstorms.1420.a: "Niech to będzie nauczka dla nas wszystkich."
 cstorms.1420.b: "Ten przywódca już nigdy nas nie zawiedzie."
 cstorms.1425.name: "Przyjemności z prowadzenia biznesu"
 cstorms.1425.desc: "Otrzymaliśmy odpowiedź:\n\n§LWspaniały wybór, jeśli można tak powiedzieć!\n\nInformujemy, że wasza wpłata na nasz \"Fundusz dla przedsiębiorców w niekorzystnej sytuacji, potrzebujących planety wypoczynkowej\" została otrzymana i przekazana.\n\nWkrótce wasi przywódca i załoga znowu będą z wami.\n\nI polećcie nas wszystkim swoim partnerom handlowym.§!\n\nWkrótce potem udało nam się ponownie nawiązać kontakt z załogą na powierzchni. Jej członkowie donieśli, że są bardzo wstrząśnięci tym przeżyciem, ale nie ucierpieli.\n\nChociaż nie odkryliśmy tutaj żadnych informacji o starożytnych cywilizacjach, to doświadczenie wzbudziło w nas czujność. Przywódca wyprawy nie dostrzegł nadchodzącego niebezpieczeństwa - nie popełnimy ponownie tego samego błędu."
 cstorms.1425.a: "$cstorms.1420.a$"
 cstorms.1425.b: "$cstorms.1420.b$"
 NAME_green_skies_pirate_country: "Ośrodek wypoczynkowy"
 NAME_green_skies_pirate_fleet: "Ekscentryczni przedsiębiorcy"
 KILL_EXILED_LEADER_EFFECT: "$LEADER$ ginie za niekompetencję."
 FREE_HOSTAGED_LEADER_EFFECT: "$LEADER$ wraca."
 green_skies_outcome_modifier: "Teraz jeszcze uważniej wypatrujemy niebezpieczeństw."
 requires_cosmic_storms: "$dlc_requirement_string$ §ICosmic Storms§!"
 ### Hold the Line
 site_hold_the_line: "Nie cofać się"
 site_hold_the_line_intro: "Przechodząca burza kosmiczna pozostawiła po sobie ciekawy prezent: kompleks orbitalny ze starego systemu stacji mieszkalnych. Może uda się go ponownie uruchomić, jeśli wejdziemy na pokład."
 cstorms.1275.name: "Zupełnie nowa konsternacja"
 cstorms.1275.desc: "Kompleks orbitalny doznał bardzo niewielkich uszkodzeń, choć został przeciągnięty przez całą galaktykę przez kosmiczną burzę. Pomieszczenia mieszkalne i komercyjne stacji mieszkalnej były w niemal idealnym stanie. Na powierzchni nie było ani odrobiny kurzu, który zdradzałby wcześniejsze użytkowanie.\n\nWewnątrz centrum sterowania przywitał nas oszałamiający system wprowadzania danych: pokrętła bez oznaczeń, dźwignie z niespójnymi ustawieniami i ogromna liczba przycisków migających całym spektrum barw w pozornie losowych odstępach czasu. Na szczęście w końcu natknęliśmy się na instrukcję obsługi. Po jej pomyślnym przetłumaczeniu na pewno uda nam się reaktywować tę stację mieszkalną."
 cstorms.1280.name: "Obejście ręczne"
 cstorms.1280.desc: "Niestety, nasze wcześniejsze szacunki okazały się optymistyczne: instrukcja okazała się równie niezrozumiała jak system sterowania. Okazało się, że brakuje połowy stron, a obrazkowe objaśnienia zawierają istotne założenia semiotyczne. Druga połowa instrukcji jest napisana trudnymi do zinterpretowania hieroglifami.\n\nJednak ostatnia strona wyświetlała częstotliwość radiową, której towarzyszył zestaw znaków przetłumaczonych jako \"help desk\". Właśnie sprawdzamy tę częstotliwość."
 cstorms.1285.name: "Kontakt z wami jest dla nas ważny"
 cstorms.1285.desc: "Częstotliwość łączności podana w podręczniku połączyła nas z głównym komputerem pomocy technicznej podmiotu komercyjnego znanego jako Niebiański Ogród.\n\nPrzyjaznym, choć neutralnym tonem, sztuczna inteligencja pomocy technicznej poinformowała nas, że dziękuje za skontaktowanie się z nią i zapytała, czy może nam w czymś pomóc. Wśród wymienionych opcji były \"odpowiedzi na pytania dotyczące subskrypcji\", \"zapoznanie się z nową linią inteligentnych systemów obronnych\" i dowiedzenie się więcej o \"inicjatywach odpowiedzialności społecznej\" korporacji.\n\nJednak kolejne opcje nadal kierowały nas do zupełnie niepowiązanych tematów. Co gorsza, często powodowało to zawieszenie połączenia lub jego całkowitego zerwania. Najwyraźniej usługa SI nie przetrwała upływu czasu tak dobrze, jak reszta środowiska.\n\nNiemniej jednak będziemy nadal próbować znaleźć drogę przez ten tajemniczy układ."
 cstorms.1290.name: "Labirynt możliwości"
 cstorms.1290.desc: "Nasi [Root.Owner.GetEngineerPlural] donoszą, że niezależnie od tego, co powiedzieli sztucznej inteligencji, po przejściu przez kilka menu system po prostu powracał do poprzedniej instrukcji.\n\nPróbowaliśmy przeprowadzić kilka symulacji, aby dokładnie odwzorować drzewo menu, ale nasze wysiłki wywołały błędy rekurencyjne i niezdolność zarówno do rozwiązania, a jednocześnie sprawdzenia rozwiązania. Nawet uruchomienie modelu kwantowego nie przyniosło pożądanych rezultatów. Podejrzewamy, że przypadkowo załamaliśmy kilka funkcji falowych w tym procesie.\n\nJesteśmy zagubieni."
 cstorms.1290.a: "Powiedzcie SI, że to §ROCENZUROWANO§! i §ROCENZUROWANO§!."
 cstorms.1290.b: "Zachowajcie ciszę na linii."
 cstorms.1290.c: "Po prostu naciśnijcie wszystkie przyciski."
 cstorms.1295.name: "Przestrzeganie protokołu"
 cstorms.1295.desc.a: "Wreszcie przełom! Sztuczna inteligencja upomniała nas za używanie nieodpowiedniego języka i stwierdziła, że powinniśmy poczekać, aż skontaktuje się z nami przedstawiciel obsługi klienta.\n\n$cstorms.1295.desc.followup$"
 cstorms.1295.desc.b: "Wreszcie przełom! Sztuczna inteligencja była najwyraźniej zdezorientowana naszym przedłużającym się milczeniem i skieruje nas do przedstawiciela obsługi klienta.\n\n$cstorms.1295.desc.followup$"
 cstorms.1295.desc.c: "Wreszcie przełom! Sztuczna inteligencja upomniała nas za nadużywanie panelu sterowania i stwierdziła, że powinniśmy poczekać, aż skontaktuje się z nami przedstawiciel obsługi klienta.\n\n$cstorms.1295.desc.followup$"
 cstorms.1295.desc.followup: "Przez chwilę czekaliśmy, po czym linia została ponownie otwarta. Osoba po drugiej stronie przedstawiła się jako archiwistka Korporacji Niebiański Ogród. Sam dział pomocy był programem sztucznej inteligencji, który odziedziczyła po poprzedniej archiwistce. O ile jej wiadomo, stacja komunikacyjna nie była używana od czasu bankructwa Niebiańskiego Ogrodu wiele dekad temu. Kiedy zapytaliśmy, dlaczego nadal pracuje dla upadłej organizacji, odpowiedziała po prostu, że tak stanowi jej kontrakt.\n\nWyjaśniając naszą sytuację, archiwistka odkopała starą skróconą instrukcję obsługi stacji mieszkalnej. Wkrótce przekaże nam cyfrowe kopie stron."
 cstorms.1300.name: "Buduje się latami, a traci w sekundy"
 cstorms.1300.desc: "Z nową instrukcją, ponowne uruchomienie stacji mieszkalnej nie wymagało wielkiego wysiłku.\n\nPo tym, jak hałas aktywowanej maszynerii powoli ucichł, postanowiliśmy jeszcze raz skontaktować się z archiwistką, aby jej podziękować.\n\nPowiedziała nam, że odzyskała pewne informacje na temat tej stacji. Najwyraźniej została ona zbudowana ponad pięć wieków temu jako prototyp, ale zaginęła w astrologicznym chaosie po szczególnie paskudnej kosmicznej burzy. Straty materialne i koszty budowy były wystarczające, by doprowadzić Niebiański Ogród do bankructwa.\n\nPomaganie nam było pierwszym pożytecznym zadaniem archiwistki od lat.\n\nPoza tym... - powiedziała. - Miło było znów usłyszeć głos mojej prababci na linii, nawet jeśli była to tylko sztuczna inteligencja."
 ### Repowered Complex
 site_repowered_complex: "Kompleks odzyskał zasilanie"
 site_repowered_complex_intro: "Niedawna §Y$electric_storm$§! spowodowała, że na powierzchni świata §H[From.Planet.GetName]§! wykryto niecodzienny wzrost zasilania. Dalsze skanowanie wykryło stary, podziemny kompleks, którego generatory zostały reaktywowane w czasie burzy, przywracając funkcjonowanie tego obiektu."
 cstorms.1845.name: "Wzmocnione wejście"
 cstorms.1845.desc: "Wejście do odizolowanego kompleksu na świecie §H[From.Planet.GetName]§! jest niezwykle wytrzymałe. Placówkę zbudowano z myślą o trwałości, więc została wyposażona w potężne opancerzenie, osłony przeciwradiacyjne oraz liczne czujniki atmosferyczne. §H[Leader.GetName]§! uważa, że budowla ta miała przetrwać nawet w najsurowszych warunkach.\n\nSkanowanie wykazało, że do dużego, podziemnego pomieszczania można dostać się przez kilka szczelnie zamkniętych drzwi."
 cstorms.1850.name: "Schron"
 cstorms.1850.desc: "Po dostaniu się do wnętrza placówki §H[Leader.GetName]§! donosi, że odkryliśmy niecodzienny schron, który zbudowano dawno temu dla jakiegoś nieznanego gatunku organicznego.\n\nBudowla posiada dobrze zaopatrzone kwatery mieszkalne z komorami sypialnymi, strefami rozrywki oraz ambulatorium. W szafkach na każdym piętrze znajdują się nienaruszone pakiety żywnościowe, baterie i narzędzia. Wszystko w tym schronie jest w idealnym stanie.\n\nJedne drzwi nie zostały jeszcze otwarte. Przypuszczamy, że za nimi znajduje się centrum dowodzenia tego obiektu."
 cstorms.1850.a: "Kontynuujcie."
 cstorms.1855.name: "Luksusowy pakiet ze schronu"
 cstorms.1855.desc: "Centrum dowodzenia schronu posiana imponujący system monitorowania burz (§Y$default_storm$§!), pozyskujący informacje z czujników umieszczonych na powierzchni. Przez wiele wieków pozostawania w trybie gotowości zgromadził on ogromną ilość danych historycznych o burzach, które pozwolą nam pogłębić wiedzę na temat astrometeorologii.\n\n§H[Leader.GetName]§! informuje, że był tam niewielki, mocno zużyty holoprojektor. Po uruchomieniu wyświetla on trójwymiarową postać mięczaka, która wygłasza formułkę handlową, stojąc na tle logo jakiejś korporacji.\n\nTrudno powiedzieć, czy ten służący przetrwaniu produkt znalazł nabywcę, ale niewątpliwie leżał tu nieużywany od wielu lat."
 cstorms.1855.desc.megacorp: "Nasz dział marketingu już analizuje, jaki błąd popełnili."
 ###############################
 #### The Weather Manipulators #
 ###############################
 STORMS_PREC_WM_ONE: "Pradawne schronienie"
 STORMS_PREC_WM_ONE_DESC: "Zidentyfikowaliśmy kilka ukrytych podziemnych struktur na świecie [From.Planet.GetName], które wydają się pochodzić sprzed bardzo dawna. Powinniśmy skorzystać z okazji i je zbadać."
 cstorms.105.name: "Pradawne schronienia"
 cstorms.105.desc: "Planeta [From.Planet.GetName] w układzie [From.GetStarName] jest zrujnowanym światem, najwyraźniej pozostałością po imperium, które upadło w starożytności. Podziemne budowle, które nas interesowały, są równie stare i stosunkowo nienaruszone.\n\nRezonans sonarowy ujawnił złożoną podziemną strukturę pomieszczeń magazynowych, a także schronów zaprojektowanych tak, aby oprzeć się działaniu sił natury. Zniszczenia na powierzchni planety są bez wątpienia skutkiem działania burz kosmicznych, co wyjaśniałoby potrzebę budowy takiego schronienia.\n\nJednak ilość gruzu utrudnia dalsze badania. Wykopaliska archeologiczne mogłyby powiedzieć nam więcej."
 #arcsite The Ancient Storm Shelters
 site_weathermanipulators_the_ancient_storm_shelters: "Pradawne schronienia"
 site_weathermanipulators_the_ancient_storm_shelters_intro: "Schronienie pogrzebane pod gruzami zniszczonego przez burzę świata; zniszczenia utrudniają badanie, ale wnętrze wydaje się nienaruszone."
 cstorms.110.name: "Od prochu do zniszczenia"
 cstorms.110.desc: "Podejście do schronu z poziomu gruntu ujawniło niewielki otwór pod dwiema zawalonymi wieżami, przez który dało się dostrzec słaby blask działającej maszynerii.\n\nOtwór stanowi punkt zaczepienia, dzięki któremu nasi [Root.Owner.GetScientistPlural] dokonają oceny rozmiarów kompleksu i być może znajdą sposób na jego otwarcie bez uszkodzenia delikatnej integralności strukturalnej.\n\nRuiny, pod którymi znajduje się to miejsce, mają wszystkie cechy charakterystyczne uszkodzeń spowodowanych przez burze kosmiczne. Co ciekawe, nie ma żadnych oznak, że mieszkańcy miasta próbowali się chronić.\n\nWygląda to tak, jakby znosili przemoc tak długo, jak to możliwe, tylko po to, by ewakuować się w wielkim pośpiechu. Być może odpowiedzi kryją się pod zrujnowaną powierzchnią świata [From.Planet.GetName]."
 cstorms.110.a: "Rozumiemy."
 cstorms.115.name: "Pod wieżami"
 cstorms.115.desc: "Po usunięciu wielu warstw gruzu i pyłu, otwór pod wieżami stał się wystarczająco duży, aby nasi [Root.Owner.GetScientistPlural] mogli wejść do schronienia.\n\nSchronienie jest proste i funkcjonalne, z wieloma dodatkowymi pomieszczeniami, z których większość jest pusta. Właściwie, to wydaje się zbyt proste. To na pewno jakiś rodzaj schronienia, ale nie przetrwałoby burz kosmicznych. Ściany są zbyt cienkie, zapewniają słabe podparcie, a sufity i podłogi nie są wzmocnione. Ta przestrzeń została uratowana dzięki czystemu szczęściu. Gdyby nie dwie wieże powyżej i osuwisko, które za jednym zamachem przeniosło kompleks, ten \"burzowy\" schron już dawno przestałby istnieć.\n\nBlask widoczny z zewnątrz pochodzi z kilku nieprawidłowo działających systemów alarmowych, a w głębi schronu znajduje się kilka sprawnych terminali. Może to być doskonała okazja, aby dowiedzieć się więcej o poprzednich właścicielach tego obiektu, a także o ciekawych zdarzeniach, które się tu rozegrały."
 cstorms.120.name: "Podniszczone transkrypcje"
 cstorms.120.desc: "Terminale były trudniej dostępne niż przewidywano, częściowo blokowały je zawaliska. Niektóre z nich powstały niedawno, co wskazuje na krytyczną awarię schronu. Zaleca się ostrożność.\n\nNiestety, starożytne procesory danych nie zdradzają łatwo swoich sekretów. Wszystko zostało zapisane w zapomnianym języku, choć dzienniki komunikacji międzygalaktycznej pozostawione w interfejsie mogą nam pomóc. Łącząc je z porzuconymi nośnikami fizycznymi rozrzuconymi po schronie, powinniśmy być w stanie wykonać pobieżne tłumaczenie. Dodatkowo, jest jeszcze więcej pomieszczeń do zbadania, o ile schron się nie zawali."
 cstorms.120.a: "Zachowajcie ostrożność."
 cstorms.120.b: "Możemy przyspieszyć pracę."
 cstorms.120.c: "Działajcie szybciej. Zostawcie wszystko inne."
 cstorms.125.name: "Ubezpieczenie aktywów"
 cstorms.125.desc: "Pokoje i komory znajdujące się dalej nie wyglądają tak bardzo na opuszczone, jak wejście. Pudła z towarami wypełniają je od góry do dołu, wszystkie starannie zapakowane i ułożone w stosy. Początkowe tłumaczenia opisują nieprzetworzone materiały i niedokończone komponenty elektryczne, z których żaden nie jest niezbędny do przetrwania. Lista zawiera również szczegółowe informacje na temat liczby przedmiotów w tym miejscu oraz przewidywanych zysków, jakie wygenerowałyby one w czymś, co nazywa się Międzygalaktyczną Siecią Równego Handlu, w skrócie MSRH.\n\nJęzyk opisujący tę ogromną giełdę handlową jest niemal ekstatyczny, ze skrupulatnymi notatkami na temat transakcji i szczegółowymi zapisami zysków. W rzeczywistości wygląda na to, że ta martwa cywilizacja oparła swoją nazwę na giełdzie, nazywając siebie handlarzami MSRH.\n\nSchron ten nie został zbudowany w celu ochrony ogółu populacji, ale raczej jako ekskluzywny magazyn towarów. Rodzi to pytanie, dlaczego ich schrony były tak żałośnie słabo wyposażone pod względem ochrony przed burzami?\n\nDalsze tłumaczenie powinno dostarczyć więcej informacji, ale mamy coraz mniej czasu, o czym świadczy niepokojący dźwięk skrzypiącej konstrukcji."
 cstorms.125.a: "Uważajcie na siebie."
 cstorms.125.b: "Najważniejsze jest zdobycie danych."
 cstorms.125.c: "Możemy pomóc w badaniu."
 cstorms.130.name: "Machinacje na rynku"
 cstorms.130.desc: "Odgłosy rozdzierania i pękania nasiliły się. Niemniej jednak wysiłki tłumaczeniowe w schronie na świecie [From.Planet.GetName] trwają nadal. Podczas gdy zgromadzone towary okazały się nieprzydatnym źródłem informacji, działające terminale ujawniły wiele.\n\nZestaw zakodowanych współrzędnych wskazuje na lokalizację urządzenia o \"wielkiej mocy\" znajdującego się na pobliskiej planecie. Z tego co zrozumieliśmy, urządzenie to posiadało zdolność \"manipulowania\" burzą kosmiczną, co byłoby niewiarygodne.\n\nBiorąc pod uwagę pogarszającą się stabilność schronu i to, że kopia współrzędnych trafiła już na nasz statek na orbicie, ewakuowaliśmy się z tego miejsca. Wiele pytań pozostaje bez odpowiedzi, ale polowanie trwa."
 cstorms.130.a: "Nie można przepuścić takiej okazji."
 #Special Project Descramble the Coordinates
 INETIAN_PROJECTS_01: "Rozszyfrujcie współrzędne"
 INETIAN_PROJECTS_01_DESC: "Zbiór zakodowanych współrzędnych został pozyskany ze świata [wm_storm_shelter_planet.GetName], zanim doszło do zawalenia schronu. Mamy powody, by sądzić, że jedna z nich może prowadzić do maszyny, której handlarze MSRH używali do manipulowania burzami kosmicznymi. Może to być technologia warta swojej ceny."
 #Special project completed
 cstorms.135.name: "Bogaty układ"
 cstorms.135.desc: "Na szczęście nasi [Root.Owner.GetScientistPlural] wydostali się z walącego się schronu na świecie [wm_storm_shelter_planet.GetName], zabrawszy ze sobą zbiór zakodowanych współrzędnych. Od tego czasu dane te zostały przywrócone i dały nam trzy lokalizacje do zbadania:\n\n[wm_digsite_A.GetName], [wm_digsite_B.GetName] i [wm_digsite_C.GetName]. Dalsza analiza wskazuje, że każda z planet odgrywała kluczową rolę w sieci handlarzy MSRH, na tyle ważną, że została opisana w schronie na planecie [wm_storm_shelter_planet.GetName]."
 #Precursors Event Chain
 cs_inetian_chain_title: "Prekursorzy - handlarze MSRH"
 cs_inetian_chain_desc: "Znaleźliśmy pozostałości starożytnego schronienia, należącego do cywilizacji, która rozwijała się miliony lat temu - cywilizacji, która nie pojawia się nigdzie indziej w naszych zapisach, jakby została skrupulatnie wymazana z historii. Jeśli to zbadamy, być może uda nam się dowiedzieć dlaczego."
 #Arcsite Coordinates A
 site_weathermanipulators_CoordinatesA_Residential_Planet: "Współrzędne A: Skolonizowana planeta"
 site_weathermanipulators_CoordinatesA_Residential_Planet_intro: "Jeden z trzech zbiorów współrzędnych znalezionych w starożytnym schronie burzowym doprowadził nas do świata [From.Planet.GetName]. Biorąc pod uwagę rozległość ruin, jasne jest, że planeta ta szczyciła się niegdyś wieloma ogromnymi ośrodkami miejskimi. Prawdopodobnie to tutaj żyli obywatele handlarzy MSRH eony temu. Konieczne będzie zbadanie, dlaczego te współrzędne były bezpiecznie przechowywane w schronie przeciwburzowym."
 cstorms.140.name: "Przeznaczenie religijne"
 cstorms.140.desc: "Niewiele pozostało z miast świata [From.Planet.GetName]. Większość imponujących struktur rozsianych po powierzchni została spustoszona nie tylko przez upływ czasu, ale też przez burze. Cechy architektoniczne, które wciąż można zauważyć, są zgodne z tymi widzianymi na planecie [wm_storm_shelter_planet.GetName] - jest to wyraźny brak gotowości do reagowania na katastrofy pomimo licznych dowodów na gwałtowne oddziaływanie burz. Rozległe zniszczenia utrudnią znalezienie czegokolwiek przydatnego, ale miejmy nadzieję, że nie będzie to niemożliwe.\n\nNasi [Root.Owner.GetScientistPlural] wskazali trzy interesujące punkty w pobliżu miejsca lądowania: stosunkowo nienaruszoną budowlę usług publicznych, świątynię i ogromny plac centralny. Powinny one stanowić dobre miejsce do dalszego zgłębiania tajemnic handlarzy MSRH."
 cstorms.145.name: "Ośrodek gospodarczy"
 cstorms.145.desc: "Wiele zespołów wyruszyło zbadać trzy najbardziej obiecujące lokalizacje. Budowla usługowa i plac publiczny były interesujące jako przykłady kulturowe i architektoniczne, ale to miejsce czci było szczególnie godne uwagi.\n\nJego rozpadająca się fasada kryje przepastną salę. Wewnątrz znajduje się 521 terminali obliczeniowych ułożonych w koncentryczne okręgi, w których centrum znajduje się imponujący - i w pełni funkcjonalny - model tego układu gwiezdnego. Wrażliwe nanokomponenty w modelu są dostrojone do pól elektromagnetycznych planety. Pomimo swojego niewiarygodnego wieku, model pozostaje dokładnym odwzorowaniem ciał niebieskich tego systemu.\n\nPonadto, wzdłuż jego okrągłej podstawy biegnie interfejs widoczny z każdego stanowiska z terminalem. W elementach obrazu tego interfejsu wypalona jest lista podmiotów korporacyjnych i wartości akcji. Nie jest to MSRH.\n\nLogiczne jest stwierdzenie, że kiedyś w tym budynku znajdowały się ważne dane. Trzeba je odnaleźć."
 cstorms.145.a: "Przewróćcie to miejsce do góry nogami."
 cstorms.150.name: "Księga referencyjna"
 cstorms.150.intro: "Po dokładniejszym zbadaniu sprawy okazało się, że centrum handlowe na świecie [From.Planet.GetName] zostało ogołocone. Terminale nie działają, a poza obrazem wypalonym w interfejsie modelu nie można znaleźć żadnych informacji handlowych.\n\nJednak ukryty w rogu hali schowek zawierał coś, co wygląda na instrukcje obsługi. Dzięki podstawowym kluczom tłumaczeniowym opracowanym podczas naszych wykopalisk na świecie [wm_storm_shelter_planet.GetName] dokonano wstępnej interpretacji tych instrukcji.\n\nSą tam zasady dotyczące obsługi terminali, dostrajania modelu systemu i wzywania pomocy z maszyny zwanej sektorowym hamulcem anomalii. Szczegóły dotyczące obsługi, celowania i aktywacji tej maszyny są jasne.\n\nTo musi być urządzenie wspomniane w starożytnym schronie przeciwburzowym i może być dokładnie tym, czego szukamy."
 cstorms.150.outro: "Jesteśmy o krok bliżej do zrozumienia intencji handlarzy MSRH i być może wykorzystania mocy tej maszyny dla siebie."
 cstorms.150.desc.a: "$cstorms.150.intro$ To oznacza, że $cstorms.150.outro$"
 cstorms.150.desc.b: "$cstorms.150.intro$ Instrukcja opisuje jeden z komponentów, który znaleźliśmy w: [wm_digsite_B.GetName]. Opisano też, jak go zainstalować. Oznacza to, że $cstorms.150.outro$"
 cstorms.150.desc.c: "$cstorms.150.intro$ Instrukcja opisuje maszynę, którą znaleźliśmy w: [wm_digsite_C.GetName]. Ale wciąż brakuje nam krytycznego komponentu. Niezależnie od tego, $cstorms.150.outro$"
 cstorms.150.desc.d: "$cstorms.150.intro$ Instrukcja opisuje maszynę, którą znaleźliśmy w: [wm_digsite_C.GetName]. Omówiono w niej też, jak zainstalować część z: [wm_digsite_B.GetName]. Ostatnim krokiem jest aktywacja sektorowego hamulca anomalii. Wtedy będziemy mogli w końcu wykorzystać jego moc!"
 cstorms.150.a: "Naprzód."
 #Arcsite Coordinates B
 site_weathermanipulators_CoordinatesB_Industrial_Planet: "Współrzędne B: Planeta przemysłowa"
 site_weathermanipulators_CoordinatesB_Industrial_Planet_intro: "Jedna z trzech współrzędnych znalezionych w starożytnym schronie burzowym doprowadziła nas do przemysłowego świata [From.Planet.GetName] z imperium handlarzy MSRH. Sądząc po istniejącej architekturze, na pewno nie była to planeta mieszkalna. Nie wiadomo jednak, co dokładnie miała produkować jej przemysłowa potęga."
 cstorms.155.name: "Wydajność przemysłu"
 cstorms.155.desc: "Trudno było dostrzec powierzchnię świata [From.Planet.GetName] przez gęsty smog wciąż unoszący nad tamtejszymi fabrykami. Znaczna część powierzchni planety została spustoszona przez kosmiczne burze, które pozostawiły duże szczeliny w jednorodnym krajobrazie przemysłowym. Jedna z nich okazała się doskonałym miejscem do lądowania dla naszego statku.\n\nNie ma żadnego śladu, że podjęto jakąkolwiek próbę demontażu tych zakładów produkcyjnych. Zostały one po prostu porzucone, a wiele z nich nadal zawiera materiały produkcyjne. Analiza może pozwoli nam zrozumieć, do jakich celów służyła planeta w infrastrukturze handlowej starożytnej cywilizacji. Może również powiedzieć nam więcej o tej słynnej maszynie, o której wspomniano na świecie [wm_storm_shelter_planet.GetName]."
 cstorms.160.name: "Przekazywanie krytycznych ładunków"
 cstorms.160.desc: "Wczesne analizy materiałów przemysłowych używanych na świecie [From.Planet.GetName] wskazują na ich wysoce niestabilny skład. Produkty te były częścią większego procesu i nie mogły być używane samodzielnie. Substancje były ostatecznie transportowane przez system taśmociągów do scentralizowanego magazynu.\n\nZe śladów spalenizny wokół struktury jasno wynika, że magazyn ten był stale używany przez transport międzyplanetarny. Pytanie brzmi, gdzie dostarczano produkt? Biorąc pod uwagę wybuchowe właściwości ładunku, nie mogło to być daleko.\n\nW pobliżu odkryliśmy kilka skrzyń transportowych. Najwyraźniej dołożono starań, aby bezpiecznie zapakować zawartość, ponieważ na bokach pozostały resztki etykiet ostrzegawczych. Tylko jedno słowo jest wciąż czytelne: \"Krytyczny\"."
 cstorms.165.name: "Brakujące ogniwo"
 cstorms.165.intro: "Nasi [Root.Owner.GetScientistPlural] szybko zdemontowali niepewnie zapakowane skrzynie.\n\nGdy otworzyliśmy pierwszą z nich, głośny syk zwiastował obecność kontrolowanej klimatycznie komory wewnętrznej. To wywołało chwilową panikę, że zawartość może się zdestabilizować. Na szczęście pozostała ona nieuszkodzona.\n\nBliższa inspekcja ujawniła wspaniale wykonany i starannie umieszczony element maszyny, wewnątrz którego znajdowała się pewna ilość niestabilnego materiału produkowanego przez fabrykę."
 cstorms.165.outro: "\n\nW związku z tym zabierzemy tę część na pokład w celu przeprowadzenia dalszych badań. Nasi [Root.Owner.GetScientistPlural] nie powinni spędzać więcej czasu na bezlitosnej powierzchni świata [From.Planet.GetName], niż to konieczne."
 cstorms.165.desc.a: "$cstorms.165.intro$\n\nEtykieta transportowa na wewnętrznej stronie skrzyni wspomina o czymś, co nazywa się „sektorowymi hamulcami anomalii\". Nasi [Root.Owner.GetScientistPlural] nie są pewni, co to oznacza, ale biorąc pod uwagę ciężki pojemnik do przechowywania i ostrzeżenia umieszczone na zewnątrz skrzyni, musiało to być coś ważnego.$cstorms.165.outro$" #A & C sites not yet visited
 cstorms.165.desc.b: "$cstorms.165.intro$\n\nCzęść od razu wydała się znajoma i załoga sięgnęła po instrukcję znalezioną na: [wm_digsite_A.GetName]. Okazuje się, że ten misternie wykonany przedmiot znajdujący się w skrzyni jest istotnym elementem sektorowych hamulców anomalii.$cstorms.165.outro$" #A site visited & C site not visited
 cstorms.165.desc.c: "$cstorms.165.intro$\n\nJego unikalny kształt i wypełniony cieczą rdzeń wskazywały, że może to być dokładnie ta część, która jest potrzebna do ukończenia instalacji na: [wm_digsite_C.GetName]. Znajdująca się w nim substancja musi być używana do zasilania sektorowych hamulców anomalii. Wygląda jednak na to, że jego bezpieczna instalacja będzie wymagała specjalistycznej wiedzy.$cstorms.165.outro$" #A site not visited & C site visited
 cstorms.165.desc.d: "$cstorms.165.intro$\n\nTa część wydaje się być brakującym elementem sektorowych hamulców anomalii, z których słynie już [wm_digsite_C.GetName]. Jako że [wm_digsite_A.GetName] skrywa instrukcję obsługi, jesteśmy teraz w stanie poprawnie zamontować część i być może w końcu uruchomić urządzenie.$cstorms.165.outro$" #A & C sites visited
 cstorms.165.a: "Dobra robota."
 #Arcsite Coordinates C
 site_weathermanipulators_CoordinatesC_Barren_Planet: "Współrzędne C: Opustoszała planeta"
 site_weathermanipulators_CoordinatesC_Barren_Planet_intro: "Jeden z trzech zestawów współrzędnych ze starożytnego schronu burzowego doprowadził nas tutaj. Oto [From.Planet.GetName]. Na powierzchni znaleźć można co najwyżej śnieg i pył, wstępny skan wykazuje jednak, że planeta nadawała się kiedyś do zamieszkania. Czy była ważna dla handlarzy MSRH przed czy też po jej upadku?"
 cstorms.170.name: "Nieprzerwane i nieubłagane"
 cstorms.170.desc: "[From.Planet.GetName] to miejsce, w którym zamiecie śnieżne nie mają końca. Jakby tego było mało, na pokrytej śniegiem powierzchni skrywała się dziwaczna niespodzianka.\n\nZnajdowały się tam warstwy pyłu, pod nimi zaś dowody na istnienie form życia, które niegdyś zamieszkiwały ten świat. Wszystkie poniosły śmierć w tym samym czasie, co wskazywałoby na jednokrotne, masowe wymarcie. Rozpad ekosystemów planety musiał doprowadzić do znaczącego rozrzedzenia się atmosfery, wskutek czego zapanowała niszczycielska dla globu epoka lodowcowa.\n\nMusi się tu znajdować coś więcej niż tylko piach i połacie lodu, powierzchnia jednak ewidentnie nie przyniesie więcej odpowiedzi. [Root.Owner.GetScientistPlural] doradzają sprawdzić, co jest pod nią."
 cstorms.170.a: "Zacznijcie szukać."
 cstorms.171.name: "Korzenie życia"
 cstorms.171.desc: "Nasi [Root.Owner.GetScientistPlural], wyposażywszy się w ubrania ochronne i odporną na zimno ciężką maszynerię, szybko poradzili sobie z uciążliwym, lecz prostym procesem usuwania warstw śniegu i drobnego pyłu. Wkrótce doszło do odkrycia dziwacznych wzorów, czegoś w rodzaju rowów ułożonych w kształt przypominający korzenie. Pokrywają one rozległy teren.\n\nW szczelinach tych znaleźliśmy wysuszone szczątki najróżniejszych organizmów. Wszystkiego, co dało się ściągnąć z powierzchni planety. Rośliny, zwierzęta i wszystko pomiędzy. Rowy te w jakiś sposób mielą materię organiczną, miażdżąc ją swoimi kamienistymi ścianami, pozyskując wszelkie substancje odżywcze i transportując je do miejsca, w którym się zbiegają. Proces ten przypomina trawienie. [From.Planet.GetName] ma teraz powierzchnię pokrytą wypluwanym przez nie następnie pyłem.\n\nRodzi się pytanie, kogo lub co karmiły te szczeliny."
 cstorms.171.a: "Znajdźcie ich punkt początkowy."
 cstorms.172.name: "Maszyny z dawnych czasów"
 cstorms.172.intro: "Sieć podziemnych rowów jest bardzo rozległa. [Root.Owner.GetScientistPlural], zanurzywszy się głębiej, zauważyli, że stopniowo się one zbiegają, by wreszcie zetknąć na jednej z ostatnich gór, jakimi może jeszcze poszczycić się [From.Planet.GetName]. Na jej szczycie znajduje się ewidentnie nienaturalny płaskowyż, na którym znajdują się trzy oddalone od siebie o taki sam dystans duże maszyny. Wygląda na to, że pochodzą z MSRH. Są pokryte językiem handlarzy, a sposób, w jaki je zaprojektowano, pasuje do tego, co wiemy o ich społeczeństwie. Mimo swojego wieku i potężnych wiatrów, jakie smagają płaskowyż, maszyny pozostają w doskonałym stanie."
 cstorms.172.outro: "\n\nTak czy inaczej znaleźliśmy to, czego szukaliśmy. Jesteśmy o krok od niesamowitego odkrycia."
 cstorms.172.desc.a: "$cstorms.172.intro$ To muszą być maszyny, o których wspominano na planecie [wm_storm_shelter_planet.GetName]. Niestety, nie posiadamy wiedzy niezbędnej do zrozumienia skomplikowanej wewnętrznej struktury tych urządzeń. Nie dość tego, w konsoli sterującej u podstawy jednej z maszyn ewidentnie brakuje kluczowych komponentów. Na małej tabliczce napisane są słowa \"sektorowe hamulce anomalii\".\n\nJeśli uruchomimy te maszyny, odkryjemy w końcu być może cel, w jakim je zbudowano. Aby to zrobić, musimy odwiedzić miejsca wskazane przez pozostałe współrzędne. $cstorms.172.outro$" #A&B not visited
 cstorms.172.desc.b: "$cstorms.172.intro$ \n\nSchematy, które znaleźliśmy w instrukcji na stanowisku wykopalisk [wm_digsite_A.GetName], wydają się opisywać instrumenty, jakie mamy przed sobą. Oznaczałoby to, że są to sektorowe hamulce anomalii i że to właśnie ta konstrukcja wspomniana była w schronie burzowym na planecie [wm_storm_shelter_planet.GetName].\n\nWedług instrukcji maszyny te wymagają do obsługi panelu sterowania. [Root.Owner.GetScientistPlural] widzą go u podstawy jednej z maszyn, wydaje się jednak, że brakuje w nim istotnej części. Mamy jednak jeszcze jeden nieodwiedzony zestaw współrzędnych. Być może skrywa on sposób na rozwiązanie tego problemu. $cstorms.172.outro$" #A visited & B not visited
 cstorms.172.desc.c: "$cstorms.172.intro$ \n\nTo muszą być maszyny, które wspomniane były na planecie [wm_storm_shelter_planet.GetName], sektorowe hamulce anomalii! Pochodząca ze stanowiska [wm_digsite_B.GetName] część maszyny z łatwością wsunęła się do panelu sterowania u podstawy jednego z urządzeń.\n\nWszelkie próby dalszej naprawy są jednak ryzykowne, biorąc pod uwagę złożoność i wiek komponentów. [Root.Owner.GetScientistPlural] zalecają, aby przed podjęciem dalszych działań zgromadzić więcej informacji. $cstorms.172.outro$" #A not visited & B visited
 cstorms.172.desc.d: "$cstorms.172.intro$ \n\nTo bez wątpienia maszyny, które wspomniane były na planecie [wm_storm_shelter_planet.GetName], a także urządzenia, do których instrukcję skrywa [wm_digsite_A.GetName] - czyli sektorowe hamulce anomalii. Pozostało tylko zainstalować część z [wm_digsite_B.GetName] i mieć nadzieję, że ten sprzęt jest wciąż sprawny. Tylko wtedy zdołamy w końcu odkryć jego przeznaczenie. $cstorms.172.outro$" #A&B visited
 cstorms.172.a: "Czas zobaczyć, co te maszyny potrafią." #Finished sites A and B
 cstorms.172.b: "Nie teraz." #Did not finish sites A and B
 #Special Project 2
 INETIAN_PROJECTS_02: "Znaczenie maszyny"
 INETIAN_PROJECTS_02_DESC: "[wm_storm_shelter_planet.GetName]: trzy znajdujące się tam zestawy współrzędnych pozwoliły rozwiązać starożytną zagadkę. Pozostało tylko uruchomić sektorowe hamulce anomalii. Nadszedł czas na odkrycie ich przeznaczenia."
 cstorms.176.name: "Znaczenie maszyny"
 cstorms.176.desc: "Odkrycie ostatniej części układanki sprawiło, że nasi [Root.Owner.GetScientistPlural] mogli w końcu zabrać się do pracy. Komponent, którego miejscem pochodzenia jest [wm_digsite_B.GetName], wpasował się elegancko do konsoli kontrolnej. A [wm_digsite_A.GetName]? Znaleziona tam instrukcja pozwoliła na prawidłową instalację części. Kiedy to zrobiliśmy, wszystkie trzy maszyny nagle ożyły.\n\nPotężne wibracje strząsnęły pył i śnieg z płaskowyżu. Rozległ się trzask przypominający błyskawicę. W miejscu, w którym stał wcześniej [Root.Owner.GetScientist], pozostała tylko chmurka pyłu, która, wciągnięta w szczeliny, została przesłana do sektorowych hamulców anomalii.\n\nOto wyjaśnienie wydarzeń, których niemym świadkiem jest [wm_digsite_C.GetName]: rowy wiodące do podstawy maszyny to przewody paliwowe pozyskujące ze swojego otoczenia materię organiczną. Rezultatem jest panujące na planecie zniszczenie.\n\nSektorowe hamulce anomalii są teraz w pełni sprawne. Zostało im dość paliwa, aby użyć ich jednokrotnie. Pozostało tylko wcisnąć guzik."
 cstorms.176.a: "Uruchomcie maszynę."
 cstorms.176.b: "Nie wciskajcie tego przycisku."
 #Delayed Event 1
 cstorms.180.name: "Odkryte ponownie pozostałości"
 cstorms.180.desc: "Po tym, jak odkryliśmy sektorowe hamulce anomalii, trop wiodący ku rozwikłaniu zagadki losu handlarzy MSRH urwał się. Dokładna ponowna analiza danych przyniosła jednak nowe wnioski.\n\n[wm_digsite_A.GetName] - tutejsze zapisy wykazują, że żywili oni egalitarne przekonania. Na poparcie tej konkluzji przytoczyć można ich wysoki standard życia i wciąż obecne na planecie liczne obiekty luksusowe. Każdy obywatel mógł cieszyć się podobnym poziomem wygody i możliwości, niezależnie od zawodu, statusu społecznego czy pochodzenia.\n\n[wm_digsite_B.GetName] - tu znajdowały się z kolei indeksy opisujące sposób wykorzystania każdej z fabryk. Wszystkie stanowiły część o wiele większych łańcuchów produkcyjnych przygotowanych tak, aby zaopatrywały rozległe imperium w środki niezbędne do zapewnienia tak luksusowego życia. Równomierne rozdzielanie tych korzyści wymagało absolutnie oszałamiającej konsumpcji materiałów i żywności, a także ich szaleńczo szybkiej produkcji.\n\n[wm_digsite_C.GetName] - sektorowe hamulce anomalii również pozwoliły nam dowiedzieć się nieco więcej, zanim ostatecznie nie dezaktywowaliśmy. Choć ich dokładne przeznaczenie pozostaje tajemnicą, odkryty został możliwy do wyśledzenia sygnał przenoszący dane. Maszyny nie były wycelowane w poruszający się swobodnie obiekt.\n\n[Root.Owner.GetScientistPlural] zalecają poszukanie w pobliskich sektorach czegoś, co mogłoby stanowić odpowiedź na ten sygnał."
 cstorms.180.a: "Znajdźmy ten obiekt."
 #Digsite 5
 site_weathermanipulators_storm_formation: "U źródła"
 site_weathermanipulators_storm_formation_intro: "W konsoli dowodzenia sektorowego hamulca anomalii zapisany był sygnał danych. Choć nie było to łatwe, zdołaliśmy sklonować jego wzorzec i odszukać w galaktyce pasujący sygnał. Trop doprowadził nas do niezamieszkałej planety. Czas odkryć, co i dlaczego obrali za cel handlarze MSRH."
 cstorms.181.name: "Niepozorne równiny"
 cstorms.181.desc: "[From.Planet.GetName] - na pierwszy rzut oka wszystko jest tu na swoim miejscu. To planeta jak setki innych w galaktyce. Nic nie wskazuje też, skąd dokładnie pochodzi sygnał. Brak widocznego nadajnika czy urządzenia na tyle potężnego, aby jego wezwania dało się odczytać z innych układów.\n\nKontynuujemy nasze poszukiwania."
 cstorms.182.name: "Koncentracja katastrofy"
 cstorms.182.desc: "Wkrótce po przybyciu na powierzchnię odkryliśmy, że sygnał stawał się silniejszy lub słabszy zależnie od naszej pozycji. Na podstawie tego prostego wzorca dotarliśmy wreszcie do potężnego pasma górskiego na drugim końcu planety.\n\nW miarę jak zbliżaliśmy się do masywu, krajobraz stawał się coraz bardziej zniszczony, spustoszony, zrujnowany, jak gdyby przez tę część świata przetoczyła się niszczycielska siła. Sądząc po wzorcach tych uszkodzeń, podejrzewamy, że przeszła tędy kiedyś kosmiczna burza pyłowa. Gdyby to jednak było prawdą, logicznym byłoby uznać, że dotknęła całą planetę. Nie spotkaliśmy się nigdy z tak skupionymi w jednym miejscu zniszczeniami wynikającymi z tego typu kataklizmu. Jeśli mamy dowiedzieć się więcej, niezbędne będzie wejście na te ogromne szczyty."
 cstorms.183.name: "Ulotna energia"
 cstorms.183.desc: "Na zniszczone pasmo górskie składały się liczne szczyty i doliny, naszą uwagę od początku zwrócił jednak jeden krater o dziwacznym kształcie. Jego ściany były gładkie, w centrum zaś wyryte były w ziemi koncentryczne kręgi.\n\nW miarę jak schodziliśmy w głąb, zaczęliśmy odczuwać działanie potężnej mocy, przed którą nie dało się uciec. Bez wątpienia pochodziła z kręgów. Unosiły się z nich wstęgi migocącej energii – niektóre oddalały się tak daleko, że opuszczały atmosferę planety. To właśnie one stanowiły źródło sygnału.\n\n[Root.Owner.GetScientistPlural] radzą przeanalizować krater i jego energetyczne fluktuacje w celu lepszego zrozumienia, co tu się stało."
 cstorms.184.name: "Niepewne początki"
 cstorms.184.desc: "Zebrane dane środowiskowe i szczegółowe symulacje pozwalają nam bezpiecznie stwierdzić, że przez szczyty rzeczywiście przetoczyła się kosmiczna burza pyłowa. Co więcej, powstała ona dokładnie tutaj! Jeśli chodzi o pytanie, czemu nie pochłonęła przy tym całej planety, zgadujemy, że była po prostu za mała – wedle analiz jej rozmiar był ledwie ułamkiem średniej wartości.\n\nSądząc po tym, że handlarze MSRH opisywali sektorowe hamulce anomalii jako \"maszynę manipulacyjną\", zaś ten konkretny sygnał energii burzowej przechowywany był w ich bazach danych, najprawdopodobniej próbowali przejąć kontrolę nad kosmiczną burzą. Obliczając trajektorię, po jakiej opuściła ona to miejsce, możemy dowiedzieć się wielu przydatnych rzeczy."
 cstorms.184.a: "Kontynuujmy."
 #Special Project 3
 INETIAN_PROJECTS_03: "Na tropie handlarzy"
 INETIAN_PROJECTS_03_DESC: "Znaleźliśmy punkt formowania się pradawnej kosmicznej burzy pyłowej, dowody wskazują jednak na to, że była ona o wiele mniejsza niż typowe tego rodzaju kataklizmy. Biorąc pod uwagę jej rozmiar, dziwne wydaje się, że handlarze MSRH czuli potrzebę kontrolowania jej za pomocą sektorowych hamulców anomalii.\n\nJeśli prześledzimy drogę burzy, możemy odkryć, czemu poświęcili temu projektowi tak wiele czasu."
 cstorms.186.name: "Na tropie handlarzy"
 cstorms.186.desc: "Prześledzenie toru burzy pyłowej okazało się o wiele bardziej skomplikowane, niż przewidywaliśmy. Ledwie kilka układów od punktu powstania z jej siłą, rozmiarem i kierunkiem stało się coś gwałtownego. [Root.Owner.GetScientistPlural] podejrzewają, że wtedy właśnie burza została poddana działaniu sektorowych hamulców anomalii. Wytrąciły ją z równowagi i zanieczyściły wewnętrzny wir pozostałościami stworzeń poderwanymi z powierzchni stanowiska [wm_digsite_C.GetName].\n\nW miarę jak burza przemieszczała sę po galaktyce, ogarnęła kilka układów z niszczycielskimi skutkami.\n\nWszystko to tylko po to, aby zmienić kurs niewielkiego zaburzenia i oddalić je od określonego układu... Czujniki wykryły w nim obecność porzuconej stacji kosmicznej. Dla jej ochrony handlarze MSRH doprowadzili do szeregu masowych wymierań.\n\nStacja ta może nie być światem stołecznym, jaki mieliśmy nadzieję znaleźć, musi być jednak równie ważna, skoro podjęto dla niej takie środki."
 cstorms.186.a: "Ustalcie na nią kurs."
 #Digsite 6
 site_weathermanipulators_last_shelter: "Przed upadkiem"
 site_weathermanipulators_last_shelter_intro: "Handlarze MSRH próbowali ochronić stację kosmiczną w tym układzie przed niewielką kosmiczną burzą pyłową. Wskutek nieprzewidzianych konsekwencji burza stała się tak wielka, że zniszczeniu uległo kilka innych układów. Dlaczego tak desperacko starali się ochronić ten obiekt?"
 cstorms.190.name: "Stabilna orbita"
 cstorms.190.desc: "Stacja kosmiczna krążąca wokół planety [From.Planet.GetName] jest o wiele większa, niż początkowo przewidywaliśmy. Wygląda na to, że to coś więcej niż tylko stacja - znajdują się na niej instrumenty badawcze, a także wyrafinowane systemy podtrzymywania życia oraz potężne czujniki dalekiego zasięgu. Może to wskazywać, że obiekt był raczej długookresową kolonią niż pomniejszym punktem nawigacyjnym.\n\nJest jednak w fatalnym stanie. Kadłub został uszkodzony, a katastrofalna w skutkach dekompresja zniszczyła całe sektory. Nie sposób stwierdzić z pewnością, czy szkody powstały od wewnątrz, czy z zewnątrz. Kontrola orbity i stabilizacja osi pozostają na szczęście aktywne, co wyjaśniałoby, czemu struktura nie wpadła w gwiazdę ani nie zaczęła się w niekontrolowany sposób obracać.\n\nDostanie się do środka bez burzenia tej równowagi nie będzie łatwe."
 cstorms.191.name: "Imponujące ciśnienie"
 cstorms.191.desc: "[This.System.GetName]: dostanie się do wnętrza stacji wymagało wyważenia nieuszkodzonej śluzy bez powodowania przy tym dalszych implozji. Wnętrze obiektu było nadal pod ciśnieniem - mimo jego znaczącego wieku zachowana została atmosfera przypominająca typową dla planet.\n\nCałe dnie zajęło stworzenie idealnej uszczelki między naszym statkiem a stacją oraz uważne wyrównywanie ciśnienia. Ostatecznie zdołaliśmy bezpiecznie otworzyć wejście. Niestety, natychmiast stanęła nam na drodze kolejna przeszkoda - korytarz zablokowany poskręcanymi wspornikami i gruzem powstałym w wyniku utraty ciśnienia. Nieco czasu minie, zanim będziemy mogli kontynuować."
 cstorms.192.name: "Wewnętrzny grobowiec"
 cstorms.192.desc: "Po oczyszczeniu drogi rozpoczęliśmy badanie wnętrza stacji w poszukiwaniu odpowiedzi.\n\nDokładne śledztwo ujawniło, że obiekt powstał nie w celu obserwacji kosmosu, lecz raczej by coś chronić - znaczna część skomplikowanych urządzeń skanujących skierowana jest do wewnątrz. Znalezione zostały rzeczy osobiste obywateli państwa handlarzy MSRH, a także dzienniki opisujące życie na stacji. Wspomniany był w nich ważny ładunek przechowywany w ściśle strzeżonym pomieszczeniu gdzieś na głównym pokładzie. Choć jego znalezienie nie zajęło wiele czasu, okazało się ono być grobowcem.\n\nWewnątrz znajdowały się zasuszone, zmumifikowane niemal szczątki mieszkańców imperium handlarzy MSRH. Biorąc pod uwagę ich pozy, wygląda na to, że nie toczyli walki - siedzieli po prostu, czekając na śmierć. Co tu się wydarzyło?"
 cstorms.193.name: "Pycha"
 cstorms.193.desc: "Ładunek, zgodnie z opisami obywateli, znajdował się w centralnej części pomieszczenia. To pojedyncze urządzenie - jak się zdaje, fabrycznie nowe i nieużywane. Bez wątpienia pochodzi z MSRH, jest jednak bardziej zaawansowane niż cokolwiek, co dotąd widzieliśmy.\n\nOtaczające obiekt terminale wyświetlają kilka powtarzających się bez końca akapitów tego samego tekstu. Tłumaczenie nie trwało długo:\n\n§LNajdroższy gościu. Jeśli to czytasz, jesteś świadkiem naszej pychy. W szlachetnym pościgu za równością, zapomnieliśmy o tym, co czyni nas prawdziwie równymi: tworzenie i niszczenie.\n\nPragnąc uwolnić nasze szlaki handlowe od niebezpieczeństw kosmicznych burz, zadarliśmy z prawami natury. To, co wcześniej stanowiło niewielkie zaburzenia, urosło tak, że nie dało się nad tym zapanować. Kosmiczne kataklizmy spustoszyły nasze światy. Nie był to przypadek, lecz zemsta. Zamknęliśmy się na tej stacji. Stała się naszym ostatnim szańcem, za późno już było bowiem na cokolwiek innego. Choć nie używaliśmy już naszych hamulców, powstawały nowe burze, coraz to silniejsze i niszczycielskie. Nasza ostatnia misja stała się oczywistością.\n\nGorączkowo pracowaliśmy nad budową tej maszyny. Powstała z myślą o tobie, gościu. Ocali cię przed kosmicznymi burzami, nie budząc przy tym ich dalszego gniewu. Nasza śmierć to nasze wybawienie. Nie musi być jednak twoim.§!\n\nhandlarze MSRH zamknęli w tym pomieszczeniu swój los. Ich hojność była równie wielka, jak ich nierozwaga. Opuszczając stację, zabraliśmy ich pożegnalny dar."
 cstorms.193.a: "Niech spoczywają w spokoju."
 cstorms.193.b: "Godny koniec dla ludu głupców."
 #Artifact action
 artifact_inetian_research: "Tajemnice handlarzy MSRH"
 artifact_inetian_research_desc: "Poznaj dokładniej tajemnice handlarzy MSRH."
 artifact_inetian_research_completed: "$artifact_inetian_research$"
 artifact_inetian_research_completed_desc: "Wykorzystaliśmy starożytną wiedzę handlarzy MSRH do własnych celów."
 INETIAN_PROJECTS_04: "Poznaj tajemnice handlarzy MSRH"
 INETIAN_PROJECTS_04_DESC: "Po odkryciu miejsca ostatniego spoczynku handlarzy MSRH wciąż mamy więcej do nauczenia się o ich rozległym imperium. Chcielibyśmy przyjrzeć się ich cywilizacji po raz kolejny."
 cstorms.195.name: "Poznaj tajemnice handlarzy MSRH"
 cstorms.195.desc: "Miejsce ostatniego spoczynku handlarzy MSRH okazało się być bardzo zaawansowaną technologicznie stacją kosmiczną. Zbudowali ją jako miejsce schronienia przed straszliwymi kosmicznymi burzami, które sami sprowadzili na świat. Ta wyjątkowa stacja mieszkalna stanowi prawdziwy szczyt techniki MSRH. Jest niesamowicie dogodnym i wyjątkowo dobrze chronionym miejscem do życia. Nawet to jednak nie zapewniło im ratunku na zawsze.\n\nDlatego też, choć stacja nie nadaje się już do zamieszkania ze względu na eony procesu rozpadu, [Root.Owner.GetScientistPlural] byli w stanie pozyskać z jej systemów ogrom wiedzy. Ponadto okazało się, że w banku danych znajdowały się informacje o najważniejszych szlakach handlowych dawnych mieszkańców oraz delikatnych prototypach wydajniejszych, mniej niszczycielskich dla planet maszyn kontroli klimatu. Znajdowały się one ot tak, w jednej ze stacji roboczych.\n\nWygląda na to, że przynajmniej część wytrwałości MSRH przetrwała i będzie nadal wspomagać nas w walce z tymi burzami."
 secrets_of_the_inetian_traders: "Tajemnice handlarzy MSRH"
 secrets_of_the_inetian_traders_hive_mach: "Tajemnice handlarzy MSRH"
 secrets_of_the_inetian_traders_desc: "Po raz kolejny zdołaliśmy wykorzystać na własne potrzeby starożytną wiedzę handlarzy MSRH. Nasze opłaty rynkowe są dzięki ich wpływom niższe."
 secrets_of_the_inetian_traders_hive_mach_desc: "Po raz kolejny zachowane dane handlarzy MSRH pomogły kolektywowi. Weszły w życie obniżki opłat targowych."
 #Hyperlane Detailer - Secrets Of Inetian Traders Reward
 sm_hyperlane_detailer: "Uszczegóławiacz hiperlinii"
 NAME_inetian: "Handlarze MSRH"
 ###########################################
 #The adAkkaria Convention of Benevolence #
 ###########################################
 cs_adAkkaria_chain_title: "Prekursorzy - adAkkaria"
 cs_adAkkaria_chain_desc: "Aby zrozumieć los tej dziwnej, pradawnej cywilizacji, musimy podążyć za szeregiem tropów. Gdziekolwiek nas poprowadzą."
 #Anomaly: Ancient Signals
 STORMS_PREC_ONE: "Starożytne sygnały"
 STORMS_PREC_ONE_DESC: "W układzie wykryliśmy serię dziwnych elektronicznych sygnałów. Wstępna analiza danych wykazuje, że transmisje te muszą liczyć sobie tysiące lat. Nasza załoga nie może się doczekać, aż pozna ich źródło."
 cstorms.205.name: "Sygnał życzliwości"
 cstorms.205.desc: "Dziwne sygnały, jakie wykryliśmy w tym układzie, pochodzą ze starożytnej stacji komunikacyjnej orbitującej wokół gwiazdy [FromFrom.GetName]. Wiadomości wydają się być starymi transmisjami od zapomnianej cywilizacji.\n\nSprawia to, że [Root.Owner.GetScientistPlural] mają kłopoty z ich odszyfrowaniem. Zalecają wejście na pokład stacji, aby postarać się pozyskać je bezpośrednio z głównego komputera."
 #Digsite: The Propaganda Station
 site_adakkaria_the_propaganda_station: "Stacja propagandowa"
 site_adakkaria_the_propaganda_station_intro: "Pradawna stacja komunikacyjna jest nadal aktywna. Po wejściu na pokład i bezpośrednim wykorzystaniu jej systemów możemy zdołać odszyfrować dawne transmisje."
 cstorms.215.name: "Interfejs kontaktu z przeszłością"
 cstorms.215.desc: "Wejście na pokład stacji nie nastręczyło problemów, choć poruszanie się po niej nie było łatwe. Jest zaskakująco dobrze zachowana - również dzięki skomplikowanej budowie zewnętrznych osłon - ale wąskie korytarze i niskie sufity nie ułatwiły naszemu zespołowi badań.\n\nWnętrze placówki niewiele zdradza na temat natury jej dawnych właścicieli, pomijając zdobiące ściany duże arkusze mieszanki papieru i plastiku. Na plakatach tych widnieją stylizowane obrazy postaci nieznanego gatunku organicznego. Ich wygląd zwraca uwagę: są wysokie, stoją pewnie na tle scen podboju i świętowania. Obrazy te bez wątpienia mają za zadanie rozbudzać poczucie dumy i braterstwa.\n\nGłówny komputer komunikacyjny stanowi równie wielką tajemnicę. [Root.Owner.GetEngineerPlural] myśleli z początku, że jest w swojej naturze analogowy - coś jak urządzenia typowe dla cywilizacji takich jak [Root.Owner.GetPreFTLLowerPlural]. Pod przyciskami i pokrętłami odkryliśmy jednak skomplikowane układy obwodów elektronicznych zbudowanych z nieznanego nam stopu. [Root.Owner.GetScientistPlural] podejrzewają, że cywilizacja ta mogła przeskoczyć kilka kroków rozwoju technologii informatycznych, co wyjaśniałoby tę anachroniczną mieszankę technik.\n\nTak czy inaczej, [Root.Owner.GetLinguists] po wielu próbach i błędach mogą przedstawić nam treść pierwszej z wielu nagranych transmisji."
 cstorms.220.name: "Od wielkich przywódców"
 cstorms.220.desc: "Po udanym użyciu pradawnego komputera nadawczego [Root.Owner.GetLinguists] dysponują już transkrypcją pierwszej transmisji:\n\n§LLudu adAkkaryjskiego Konwentu Życzliwości!\n\nPrzemawiam do was nie jako przywódca, lecz jako przyjaciel i mentor.\n\nNie umknęło wam z pewnością, że dni ciemnieją, a niebo przybiera odcień goryczy. Nawet gwiazdy stają się nam wrogie.\n\nJa jednak mam wiarę. Tak, jak żywili ją wobec nas nasi dobroczyńcy, tak ja żywię ją wobec naszego celu. Żywię ją wobec was.\n\nPrzez stulecia nasz lud chronił gwiazdy przed potwornymi hordami barbarzyńców. Naszym przeznaczeniem jest strzec galaktyki przed tymi złowrogimi siłami. Przeznaczenia zaś nie da się zmienić jedną porażką. Nie damy się pokonać podłym legionom, które spiskują przeciw nam.\n\nWierzę w naszą misję. AdAkkaryjski Konwent Życzliwości niesie prawdę i wolność wszystkim cywilizacjom. Nasza misja jest gwarantem naszego przetrwania. Nasze przeznaczenie pozwala nam tryumfować i rozkwitać!\n\nI dlatego właśnie, drodzy przyjaciele, nie możemy poddawać się zwątpieniu. Opłakujmy straty, tak. Oddawajmy cześć poległym. A potem łączmy siły, jak czyniliśmy to zawsze. Dla naszych dobroczyńców. Dla Konwentu adAkkaryjskiego. Dla Życzliwości!§!"
 cstorms.225.name: "Ultimatum UniComu"
 cstorms.225.desc: "[Root.Owner.GetLinguists] mają ogrom problemów z przekopywaniem się przez dane odkryte na starożytnej stacji. Kilka transmisji zostało jednak oznaczonych jako wyjątkowo pouczające. Część z nich zapewnia wgląd w nagrane rozmowy:\n\n§SilSapne Tuerthi - prowadzący§!\n§L- W ramach dyskusji na temat niedawnego zamętu w Uniwersalnej Społeczności wypowiedzą się teraz wielce chwalebna profesor akMani Sando i doktor wszechpostrzeganej rzeczywistości emEk Inna. Wielce chwalebna profesor, jak interpretuje pani żądania UniComu?§!\n\n§SakMani Sando - wielce chwalebna profesor§!\n§LTe żądania są skandaliczne! Uniwersalna Społeczność wciąż traktuje nierozwinięte do końca światy z najwyższą pogardą. Pozwólcie jednak, że spytam tych samozwańczych strażników galaktycznej moralności: czyż nie jest bardziej nieetycznym odbierać dostęp do ratujących życie technologii? Do sprzeniewierzania się ideałom, które tworzą podwaliny naszego wspaniałego społeczeństwa? Jakże podli się staliśmy, jeśli gotowi jesteśmy pozwolić światu dokonać własnego zniszczenia i nie próbujemy go ocalić?§!\n\n§SilSapne Tuerthi - prowadzący§!\n§LDoskonale powiedziane! Doktorze wszechpostrzeganej rzeczywistości, podejrzewam, że jest pan równie oburzony wtrącaniem się UniComu w nasze przeznaczenie.§!\n\n§SemEkku Inna - doktor wszechpostrzeganej rzeczywistości§!\n§LTo, co powiem, może wydać się szokujące. Mimo uporu organizacji, uważam, że należy podjąć wysiłek przyjrzenia się uwagom UniComu...§!\n\n§TWygląda na to, że transmisja została w tym momencie przerwana.§!"
 cstorms.225.a: "Byli dogmatycznym narodem."
 cstorms.225.a.hive: "Zbyt wiele głosów prowadzi do chaosu."
 cstorms.225.a.machine: "Życie rodzi wiele kłótni."
 cstorms.230.name: "Święci i psionicy"
 cstorms.230.desc: "Kolejna transmisja została oznaczona jako wartościowa. Widać, że to fabularyzowane dzieło, jednak dostarcza nam kontekstu do naszego dochodzenia:\n\n§SakTamian Riwan§!\n§LPoinformowano mnie, że zeszłej nocy ponownie odwiedziłeś enTulla Saman. Myślałem, że porzuciłeś go na rzecz naszej miłości.§!\n\n§SinElka Utae§!\n§LZapewniam cię, że była to jedynie kurtuazyjna wizyta. Jestem oddany tobie i nikomu innemu!§!\n\n§SakTamian Riwan§!\n§LTak twierdzą twe usta, ale twój umysł mówi coś innego. Zupełnie innego.§!\n\n§SinElka Utae§!\n§LNie! Nie mów, że i ty...!§!\n\n§SakTamian Riwan§!\n§LTak, ja też! Odkryłem swoje dary psioniczne ledwie wczorajszej nocy! I to, co miało być radosną wędrówką po naszych najgłębszych uczuciach, stało się rozpaczą! Zdradą obecną w twoich myślach!§!\n\n§SinElka Utae§!\n§LNie rozumiesz! Nie mogę odmienić swojego umysłu. Nic nie poradzę, że tylko ta droga wydaje mi się racjonalna. Och, Riwan, gdyby tylko twój nowy, psioniczny dar pozwolił ci czytać w moim sercu, nie zaś w umyśle!§!"
 cstorms.230.a: "Zdolności psioniczne? Ciekawe."
 cstorms.230.b: "Bezużyteczne brednie!"
 cstorms.230.b.hive: "Zadziwiająco indywidualistyczna forma rozrywki."
 cstorms.230.b.machine: "Ach, te dramaty istot organicznych."
 dramatic_enthusiasm: "Miłośnicy kosmicznych dramatów"
 melodramatic_much: "Hejterzy kosmicznych dramatów"
 cstorms.235.name: "Przekaz z przeszłości"
 cstorms.235.desc: "Nasi [Root.Owner.GetLinguists] przetłumaczyli również kilka materiałów z kanałów informacyjnych. Za szczególnie wartą uwagi uważają tę transmisję:\n\n§LMeldunki z systemu Haliios przybierają coraz to bardziej ponury ton. Tchórze z władz Solphani wzięli w zasadzkę nasze mężne Siły Oświecenia w Punkcie enYpsal! Nasi wielcy przywódcy ogłosili jednak, że Proces mimo to nie zostanie przerwany. Cytujemy: \"Nasi patroni nas nie porzucili. I tak samo my nie porzucimy żadnej niedostatecznie rozwiniętej cywilizacji\".\n\nKrążą plotki, że możliwa jest współpraca podłych barbarzyńskich władz z przedstawicielami UniComu. Ambasador tych ostatnich zaprzecza jednak, jakoby społeczność międzygwiezdna komunikowała się jakkolwiek z barbarzyńskimi ciemiężcami i twierdzi, że to kolejny przypadek \"wygodnej paranoi\" naszych wielkich przywódców.\n\nCzy nasz przeciwnik ma potężnych sojuszników, czy też nie, proces oświecenia Solphanich znalazł się w punkcie krytycznym. Niełatwo będzie odmienić sytuację, lecz...§!\n\n§TNiestety, reszta transmisji jest w zbyt kiepskim stanie, żeby dało się ją odcyfrować. [Root.Owner.GetEngineerPlural] stworzyli już kopię bazy danych. Mamy nadzieję z czasem poznać więcej informacji o tej dawno zapomnianej cywilizacji.§!"
 cstorms.235.a: "Wyczekujemy przyszłych odkryć."
 #Event: A Site Barren and Bare
 cstorms.245.name: "Odkrycie na pustkowiu"
 cstorms.245.desc: "[planet_windswept_fates.GetName]: kosmiczna burza w układzie [planet_windswept_fates.System.GetName] odsłoniła obszar o możliwym znaczeniu archeologicznym.\n\nWstępne skany planety §Y[planet_windswept_fates.GetName]§! ujawniły obecność niszczycielsko niestabilnej atmosfery - nieustannie szaleją tam rozległe burze. [Root.Owner.GetScientistPlural] nie przypuszczali, że na takim świecie uda się odkryć szczątki cywilizacji. Sądzą, że możemy wiele się nauczyć, prowadząc tutaj badania."
 cstorms.245.a: "Przygotować zespół badawczy!"
 #Digsite: Windswept Fates
 site_adakarria_windswept_fates: "Smagany wichrem los"
 site_adakarria_windswept_fates_intro: "Burze kosmiczne bywają niszczycielskie, ta jednak odsłoniła szczątki obcej cywilizacji. Choć atmosfera planety jest niesamowicie niestabilna, zespół badawczy zdoła być może odkryć, jaki straszliwy los spotkał tę starożytną kulturę."
 cstorms.2105.name: "Ekstremalne warunki"
 cstorms.2105.desc: "[From.Planet.GetName]: nasza ekipa przybyła bezpiecznie na miejsce i szybko zabrała się do pracy nad badaniem swojego otoczenia.\n\nJak się zdaje, niedawna potężna burza kosmiczna, która nawiedziła ten układ, zdarła też dość pyłu i gleby, aby odsłonić szczątki dawnej cywilizacji.\n\nKiedy nasi naukowcy przyjrzeli się im dokładniej, uderzył ich fakt, że warstwa piasku bezpośrednio pokrywająca ruiny miała zupełnie inny skład niż gleba wokół. Skany planetarne wykazały, że złoża te pochodzą z położonej setki kilometrów dalej pustyni i mogła je tu przynieść wyłącznie jakaś potężna siła, jak na przykład wyjątkowo silna burza planetarna."
 cstorms.2105.a: "Kontynuujcie badania."
 cstorms.2110.name: "To, co przepadło"
 cstorms.2110.desc: "Mimo dręczących tę planetę dziwnych warunków pogodowych, [Root.Owner.GetScientistPlural] czynią duże postępy. Odkrycia każdego kolejnego dnia stają się jednak coraz bardziej zaskakujące i niepokojące.\n\nWszystko rozpoczęło się od szczątków kamiennych konstrukcji i zwapnionej materii organicznej. Później objawiły się podarte tkaniny, skóra, podszyte polimerami kamizelki, aż wreszcie organiczne szczątki dawnych mieszkańców planety.\n\nOdkryte zostały kolejne ciała. Zasuszone narządy pełne były piasku, paznokcie zaś pozdzierane od drapania. Każde ciało wyposażone było w [Root.Owner.GetPreFTLLowerPlural] sprzęt wojskowy i uzbrojone w broń dystansową. To, co wzięliśmy za porzucone miasto, było tak naprawdę masowym grobem.\n\nMożliwe, że te znaleziska liczą sobie całe eony, lecz całkowite osłonięcie przed promieniowaniem ultrafioletowym i chemikaliami, z którymi mogłyby zareagować, zarówno materia organiczna, jak i wyposażenie zostały doskonale zachowane. Co się tu wydarzyło - pozostaje zagadką."
 cstorms.2110.a: "Cóż za okrutna śmierć."
 cstorms.2115.name: "Przemoc z przestworzy"
 cstorms.2115.desc: "[From.Planet.GetName]: znaleziska na planecie nie przestają budzić grozy. [Root.GetLeaderName] sądzi, że miejsce to nie było najprawdopodobniej miejscem pochówku, obcy wydawali się bowiem być w dobrej kondycji fizycznej do momentu, w którym zadusił ich piach.\n\nCo więcej, odkryliśmy też liczne obiekty bojowe zdolne do obsługi ciężkiej amunicji. Co zaskakujące, nie są one wycelowane w powierzchnię, lecz w przestrzeń kosmiczną.\n\nKimkolwiek był wróg, z którym mierzył się ten lud, przybył on najpewniej spośród gwiazd."
 cstorms.2120.name: "Nieustająca burza"
 cstorms.2120.desc: "[From.Planet.GetName]: nasze teorie dotyczące dziwacznego masowego grobu nie potwierdziły się. Jedyny pozostały trop związany był z pochodzeniem piachu, który pochłonął tę armię w całości.\n\nPo wykonaniu serii niesamowicie skomplikowanych obliczeń i symulacji stwierdziliśmy, że burza, która przyniosła tutaj te piachy, wciąż szaleje w innych miejscach na planecie. Wysłaliśmy do jej zbadania niewielką ekspedycję.\n\nPowitała ją potężna burza, której bezlitosne wichry wyryły w ziemi głęboką bruzdę. Jeśli znajdziemy tu jakiekolwiek odpowiedzi, to będą one skrywać się właśnie w tej czeluści. Właśnie tu, gdzie oko tego cyklonu wybrało sobie siedzibę."
 cstorms.2120.a: "Podejmijcie wszelkie niezbędne środki ostrożności!"
 cstorms.2125.name: "Ciało"
 cstorms.2125.desc: "Dotarcie na miejsce okazało się trudne, wymagało ogromu umiejętności i uwagi. W centrum krateru, pośród szalejącej burzy, znaleźliśmy jednak niezwykle nietypowy szkielet. Szczątki są tak stare, jak te w masowym grobie, choć zarówno fenotyp, jak i genotyp zwłok były zupełnie inne niż w przypadku znalezionych tam ciał.\n\nMundur szkieletu był zaskakująco dobrze zachowany - on również różnił się znacząco projektem od tego, co widzieliśmy wcześniej. Dało się również zobaczyć, że niektóre odnóża zostały z rozmysłem usunięte...\n\nNajdziwniejsze okazały się jednak odczyty z naszych czujników: wykryliśmy fluktuacje energetyczne wokół ciała i w jego wnętrzu. Sygnatury te były zaskakująco podobne do tych, które znaleźliśmy wewnątrz tej rozległej burzy, a także tych, które obecne były w burzy kosmicznej, jaka odsłoniła masowy grób.\n\nZaczęła kształtować się nowa teoria: czy ten osobnik miał jakiś związek z burzami, na jakie się dotąd natknęliśmy? Czy mógł być wręcz odpowiedzialny za zasypanie tamtej armii? Dziwacznie było nawet o tym myśleć, na to jednak wskazywałyby fakty."
 cstorms.2130.name: "I ponownie w proch"
 cstorms.2130.desc: "Porównanie symboli na mundurze z informacjami z naszej bazy danych przyniosły zadziwiający wynik: ciało należało do obywatela Konwentu adAkkaryjskiego! Tej samej cywilizacji, której stację nadawczą nie tak dawno temu badaliśmy. Co jeszcze bardziej zaskakujące, mundur, wiek ciała i informacje z transmisji tworzą zadziwiająco spójny obraz. Podejrzewamy teraz, że to właśnie o tym świecie wspominano w znalezionych przez nas materiałach.\n\nDzięki pozyskanej na stacji propagandowej wiedzy lingwistycznej [Root.GetLeaderName] jest w stanie odczytać imię ofiary: §ShaToor Gailon§!.\n\nLedwie kilka chwil później burza wokół gwałtownie przybrała na rozmiarze i intensywności. Ze względu na wysoce nieprzewidywalną naturę burzy, pobyt tutaj stał się zbyt niebezpieczny - musieliśmy zostawić ten świat na łaskę żywiołu. Trop adAkkaryjskiego Konwentu Życzliwości znów się urwał."
 #Storm to Signal
 cstorms.2140.name: "Sztormowanie ku sygnałowi"
 cstorms.2140.desc: "§Y[planet_windswept_fates.GetName]§!: sygnatury energetyczne ciała obcego i niszczycielskiej planetarnej burzy są takie same, jak w przypadku kosmicznej burzy odpowiedzialnej za odsłonięcie zasypanej armii. W dzienniku skanu znalazł się zbadany już wcześniej układ, w którym dochodzi do podobnych fluktuacji. Są one identyczne z transmisjami Konwentu adAkkaryjskiego!\n\nNależy wysłać tam statek badawczy, aby to sprawdzić."
 #Fleets of the Trice Damned
 site_adakkaria_fleets_of_the_thrice_damned: "Floty po trzykroć przeklętych"
 site_adakkaria_fleets_of_the_thrice_damned_intro: "Dziwne fluktuacje energii w okolicy ujawniły obecność rozległego wrakowiska. Nekropolia polimerów i metali może skrywać ważne wskazówki, które pozwoliłyby na zrozumienie Konwentu adAkkaryjskiego."
 cstorms.2150.name: "Poszatkowane resztki"
 cstorms.2150.desc: "Swój wieczny spoczynek mają tu najróżniejszego typu statki, od podłużnych jednostek drewnianych po krystaliczne, kosmiczno-eteryczne arki. Wiele z nich wykazuje podobieństwa z obrazami znalezionymi w transmisjach i dziennikach z adAkkaryjskiej stacji nadawczej.\n\nPodejrzewamy, że doszło tu do konfrontacji między flotami Konwentu i UniComu, galaktycznych sił porządkowych sprzed tysiącleci.\n\nA jednak choć statki te nie nadają się do naprawy, nie wyglądają na uszkodzone zwykłą bronią, przez awarię czy inne tego typu nieszczęścia. Kadłuby i wnętrza wydają się być rozerwane, niczym wrzucone w olbrzymią szatkownicę."
 cstorms.2155.name: "Granice obowiązku"
 cstorms.2155.desc: "Nasi [Root.Owner.GetEngineerPlural] ostrożnie pozyskali banki danych z jednostek na cmentarzysku. Choć dużą część z nich zniszczył czas, jedna adAkkaryjska baza przetrwała:\n\n§L- Wpadliśmy w zasadzkę. Powtarzam, wpadliśmy w zasadzkę. UniCom domaga się, abyśmy zaniechali wywyższenia prymitywnych istot z Rokukora pod groźbą eliminacji. Odpowiedzcie, proszę. Jeśli się nie wycofamy, zostaniemy zniszczeni! Proszę, przyślijcie chociaż posiłki!\n\n- Odmawiamy. Wasza ofiara zostanie zapamiętana.§!"
 cstorms.2155.a: "Obowiązek przedłożyli ponad życie!"
 cstorms.2160.name: "Szczątkowe informacje"
 cstorms.2160.desc: "Gdy nasi [Root.Owner.GetLinguists] przetłumaczyli kolejne transmisje, dokonaliśmy kolejnego zaskakującego odkrycia: pośrodku cmentarzyska znajdowało się zamarznięte ciało!\n\nChoć większa jego część uległa rozpadowi, ma ono na sobie strój oficera Konwencji.\n\nCo ciekawe, wokół ciała orbitowało nieco niewielkich śmieci, jak gdyby miało ono wystarczającą siłę przyciągania. Szczątki zostały zabrane na pokład w celu dalszej analizy."
 cstorms.2165.name: "Głos umarłych"
 cstorms.2165.desc.intro: "Tłumaczenie nieśmiertelnika zamarzniętego ciała ujawniło, że był to niegdyś adAkkaryjczyk imieniem §SalAtta Landeer§!. Podobnie jak w przypadku ciała z planety [planet_windswept_fates.GetName], część odnóży zostało chirurgicznie usuniętych przed śmiercią. alAtta Landeer uległ jednak również ciężkiemu poparzeniu. Zwłaszcza korpus nosi ślady uszkodzeń od ekstremalnego ciepła oraz powolnego - i bez wątpienia bolesnego - powrotu do zdrowia.\n\nNasi [Root.Owner.GetScientist] doszli do smutnego wniosku, że rany te wskazują na [Root.Owner.GetPreFTLLowerPlural] metody pozyskiwania informacji od nieskorych do współpracy osobników. Czy to był weteran wojenny? A może spotkał go jakiś bardziej złowrogi los?"
 cstorms.2165.desc.def: "$cstorms.2165.desc.intro$\n\nKiedy tylko zidentyfikowaliśmy naturę tych ran, w przyrządach naszej jednostki doszło do gwałtownego przepięcia, jednocześnie rozległ się krzyk - okazało się, że [Root.GetLeaderName] leży na podłodze.\n\nDużo później poznaliśmy opis przeżyć, które to spowodowały: potężne światło, a chwilę później fala nieznośnego bólu. Jakby coś próbowało siłą otworzyć umysł ofiary... od wewnątrz."
 cstorms.2165.desc.psio: "$cstorms.2165.desc.intro$\n\nKiedy tylko zidentyfikowaliśmy naturę tych ran, w przyrządach naszej jednostki doszło do gwałtownego przepięcia, jednocześnie rozległ się krzyk psionicznie uzdolnionych członków naszej załogi.\n\nDużo później opisali oni to przeżycie jako moment niezwykłej jasności umysłu, po której zaczęły nadciągać fale gorącego niczym lawa, palącego umysł gniewu. [Root.GetLeaderName] twierdzi, że głęboko pod warstwą szału skrywały się przerażenie, zaskoczenie i wszechogarniające poczucie zdrady. Pojawiła się jedna myśl: §Lwywołali mnie!§!"
 cstorms.2165.desc.psio_robot: "$cstorms.2165.desc.intro$\n\nKiedy tylko zidentyfikowaliśmy naturę tych ran, w aparaturze naszego statku doszło do gwałtownego przepięcia, a jednocześnie nasze jednostki wyposażone w procesory psioniczne odnotowały nagłe skoki mocy w swoich układach.\n\nDużo później jednostki zameldowały, że przez krótką chwilę ich procesory psioniczne wykryły przypływ emocji skatalogowanej jako ekstremalnie silny gniew. [Root.GetLeaderName] twierdzi, że owej fali emocji towarzyszyła jedna myśl, której zapis brzmiał: §LWywołali mnie!§!"
 cstorms.2165.desc.gestalt: "$cstorms.2165.desc.intro$\n\nChwilę po tym odkryciu banki danych naszej załogi zostały uszkodzone przez niemożliwą do wytropienia siłę. Niektóre [controller.GetIndividualNamePlural] pamiętają chwilowe, obezwładniające przepięcie, inne zaś - zniekształcone i niejasne obrazy, które sprowokowały ich modulatory głosowe do wyemitowania przenikliwego dźwięku o natężeniu ponad 120 decybeli."
 cstorms.2165.a: "-- Sygnał utracony --"
 cstorms.2170.name: "Dziedzictwo Landeera"
 cstorms.2170.desc.def: "Kiedy tylko zdołaliśmy odzyskać łączność ze statkiem badawczym §Y[Root.GetFleetName]§!, usłyszeliśmy przypominające skowyt krzyki załogi. Po dłuższym czasie, kiedy zapanował względny spokój, okazało się, że przyczyną incydentu było sprowadzone na pokład ciało obcego.\n\nZwłoki wywierały na ich umysły jakiś dziwaczny wpływ. Niewielkie obiekty uniosły się w powietrze i zaczęły orbitować wokół ciała. Ciśnienie sprawiło, że całe sekcje wewnętrznych ścian uległy wypaczeniu i pokrzywieniu.\n\nW ostatniej chwili udało się wyrzucić ciało w przestrzeń - dokonaniem tym może poszczycić się §Y[Root.GetLeaderName]§!. Gdyby nie ta szybka reakcja, statek badawczy nie uciekłby też przed kosmiczną burzą, która nagle się rozpętała. O mały włos, a na cmentarzysku zostałaby kolejna jednostka.\n\n[Root.GetLeaderName] w ramach tej opowieści wspomina o czymś jeszcze: czymkolwiek jest źródło dziwnej mocy ciała, spowodowało ono również wyświetlenie się na ekranach dowodzenia statku bardzo specyficznego wzoru. Czy była to próba nawiązania łączności? Krzyk zza grobu?\n\nNa razie nie znamy odpowiedzi na to pytanie."
 cstorms.2170.desc.gestalt: "[controller.GetIndividualNamePlural] w swojej pamięci przechowują niejasne obrazy, niektóre zdołaliśmy rozszyfrować. Stanowiły one wizję starożytnej stacji mieszkalnej. [controller.GetScientistCapital] czuje zaniepokojenie po zapoznaniu się z obrazami i dźwiękami doświadczanych przez istotę poddawaną coraz to okrutniejszym zabiegom. Jej ciało było palone, narządy - żywcem gotowane.\n\nNiektóre [controller.GetIndividualNamePlural] zdołały uniknąć audiowizualnego ataku. Zameldowały, że wokół ciała zaczęły krążyć niewielkie obiekty. Organiczne szczątki w jakiś sposób wygenerowały własne pole grawitacyjne.\n\nTa nieznana siła stężała do tego stopnia, że wewnętrzne ściany uległy w jej skutek wypaczeniu i powyginaniu. Wtedy też aktywowały się systemy bezpieczeństwa, a ciało zostało wyrzucone z powrotem w kosmos.\n\nNiedługo później w układzie rozpętała się kosmiczna burza. Nasza jednostka ledwo zdołała przed nią umknąć.\n\nCokolwiek się tam wydarzyło, przyniosło nam więcej pytań niż odpowiedzi."
 #Special Project: Assembling the Past
 cstorms.2180.name: "Składanie w całość przeszłości"
 cstorms.2180.desc: "Po wydarzeniach, które, jak twierdzi [FromFrom.Leader.GetName], miały miejsce w układzie §Y[planet_assembling_the_past.System.GetName]§!, nasi naukowcy jeszcze bardziej chcą dowiedzieć się, co dokładnie wydarzyło się z Konwentem adAkkaryjskim. Na podstawie informacji zgromadzonych na planecie [planet_windswept_fates.GetName] oraz kosmicznym cmentarzysku doszliśmy do wniosku, że galaktyka pełna była adAkkaryjskich stacji propagandowych.\n\nCo więcej, w trakcie zażartych dyskusji ustaliliśmy, że wzór, o którym wspomina w swoim raporcie [Root.GetName], to współrzędne nieodkrytego dotąd układu!\n\nRozpoczęty został projekt specjalny, który pozwoli na jego zbadanie."
 project_adakkaria_tracing_history: "Śledząc historię"
 project_adakkaria_tracing_history_DESC: "Współrzędne prowadzą na planetę w układzie [planet_assembling_the_past.System.GetName]. Należy wysłać tam jednostkę badawczą, która mogłaby odkryć, jakie znaczenie miała ona dla Konwentu adAkkaryjskiego."
 NAME_adSalivul: "adSalivul"
 NAME_Patriotic_Institute_of_Exalted_Benevolence: "Wywyższona Życzliwość"
 cstorms.2185.name: "Starożytna stacja mieszkalna"
 cstorms.2185.desc: "Obawialiśmy się z początku, że nasze badania układu [From.solar_system.GetName] stanowiły ślepą uliczkę. Współrzędne wskazywały planetę o tak niestabilnym polu magnetycznym, że jego powierzchnia była właściwie pustkowiem. Mało prawdopodobnym było, aby cokolwiek wartego uwagi przetrwało równie trudne warunki.\n\nWokół planety orbitowała jednak starożytna stacja mieszkalna przypominająca pod względem architektonicznym adAkkaryjską placówkę nadawczą. Choć była ona hermetycznie zamknięta od zewnątrz, zdołaliśmy wygenerować sygnał wejściowy w oparciu o informacje z adAkkaryjskich baz danych.\n\nMinęły eony, od kiedy ktokolwiek wszedł na pokład tej stacji. Nie sposób przewidzieć, na co natkniemy się w środku."
 cstorms.2185.a: "Zachowajcie ostrożność."
 #The Patriotic Institute of Exalted Benevolence
 site_adakkaria_the_patriotic_institute: "Instytut Wywyższonej Życzliwości"
 site_adakkaria_the_patriotic_institute_intro: "Ta starożytna, orbitująca wokół opustoszałej planety stacja mieszkalna została zbudowana przez Konwent adAkkaryjski. Wysokiej jakości materiały budowlane pozwoliły konstrukcji pozostać do dziś w niemal nienaruszonym stanie.\n\nNasłuch na częstotliwości nadawczej pozwolił nam odebrać pojedynczą wiadomość w towarzystwie energetycznej linii melodycznej: §LWitajcie w Patriotycznym Instytucie Wywyższonej Życzliwości§!."
 cstorms.2200.name: "Wkraczając w życzliwość"
 cstorms.2200.desc: "Za śluzą znajdowała się niewielka sieć tuneli. Dotarliśmy nimi ostatecznie do ogromnego, oświetlonego sztucznym słońcem placu. Co dziwne, architektura stacji przypominała bardziej przedmieścia niektórych światów mieszkalnych niż ważny obiekt naukowy. Stację zbudowano tak, aby pomieściła całe kompleksy apartamentowców, centrów handlowych i szkół, ale też rekreacyjne ogrody, parki i im podobne. Miejsce to przeznaczone było do luksusowego życia.\n\nTeraz jednak jest całkowicie porzucone. Na całej stacji nie wykryliśmy ani jednej organicznej formy życia. Podczas eksploracji naszą uwagę zwróciła pustka tego miejsca i jego ponura atmosfera.\n\nŚwiatło sztucznego słońca co jakiś czas przygasało, pogrążając stację w ciemności. Inne urządzenia, choć w większości sprawne, również co jakiś czas przestawały działać. Najciekawsza jednak okazała się dla nas sieć urządzeń obserwacyjnych obecnych w kwaterach mieszkalnych stacji. Wygląda na to, że wszyscy tutejsi mieszkańcy byli bardzo uważnie inwigilowani. Być może znalezienie jakiegoś rodzaju biura ochrony pozwoliłoby nam zrozumieć coś więcej."
 cstorms.2205.name: "Awarie na dobre"
 cstorms.2205.desc.intro: "Wiele dni zajęło nam przemierzenie i dokładne opisanie miasta na stacji oraz zbadanie jego urządzeń obserwacyjnych. Biuro ochrony okazało się być całkowicie oddzielone od reszty obiektu - aby do niego wejść, niezbędny był całkowicie odrębny kod dostępu.\n\nZnaleźliśmy tam całe rzędy monitorów, wciąż podpiętych do rozległego systemu inwigilacji. Te, które wciąż działały, pozwalały zajrzeć w każdy zakamarek stacji. One również jednak przestawały co jakiś czas działać."
 cstorms.2205.desc.mach: "$cstorms.2205.desc.intro$\n\nNasze drony doniosły o zaniepokojeniu odczuwanym na widok tych zakłóceń - przypominały im one o poprzednim zetknięciu się z Konwentem adAkkaryjskim na starożytnym cmentarzysku statków.\n\n$cstorms.2205.desc.outro$"
 cstorms.2205.desc.def: "$cstorms.2205.desc.intro$\n\n[Root.GetLeaderName] donosi o niepokoju odczuwanym na widok tych zakłóceń - przypominają one o naszym poprzednim zetknięciu się z Konwentem adAkkaryjskim na cmentarzysku statków.\n\n$cstorms.2205.desc.outro$"
 cstorms.2205.desc.outro: "Największy niepokój wzbudziło jednak odkrycie z centralnego ośrodka ochrony: według pełnych niepokoju wiadomości wyświetlanych na ekranie, stacja jest w trakcie procedury samozniszczenia!\n\nNasi [Root.Owner.GetEngineerPlural] uznali, że to nękające miasto awarie uniemożliwiły jej przeprowadzenie. Szybko anulowaliśmy procedurę autodestrukcji - [Root.Owner.GetLinguists] mogą odszyfrować teraz wszelkie wiadomości, jakie tu odzyskamy. Co ciekawe, najnowsze raporty znalezione na stacji są o niemal rok starsze od ostatnich zapisów pozyskanych na stacji propagandowej."
 cstorms.2210.name: "Wywyższone zapytania"
 cstorms.2210.desc: "[From.Planet.GetName]: nasi [Root.Owner.GetLinguists] szybko odkryli przyczynę, dla której zbudowano stację orbitalną. Dzienniki i wiadomości od mieszkańców i personelu opisują badania nad nowo ujawnionymi mocami psionicznymi obywateli adAkkarii. Wszyscy, którzy tu mieszkali, otrzymali zaproszenie od \"wielkich przywódców\" Konwentu, aby mogli cieszyć się luksusem i swobodą autoekspresji na pokładzie stacji. W zamian musieli wyrazić zgodę na udział w trwających w obiekcie eksperymentach.\n\nWiększość uczestników programu dołączyła do niego z wielką chęcią. Według informacji ochrony wielu z nich było okaleczonymi weteranami wojennymi. Obiecano im opiekę, wsparcie finansowe i odstąpienie od kary za wszelkie ewentualne dotychczasowe występki.\n\nCo więcej, na liście personelu stacji znajdowało się bardzo znajome nazwisko: §SalAtta Landeer§!, naukowiec i okaleczony weteran, którego poznaczone amputacjami ciało odnaleźliśmy na cmentarzysku statków."
 cstorms.2210.a: "W końcu jakiś postęp."
 cstorms.2215.name: "Słowo od naszych badanych"
 cstorms.2215.desc: "Odszyfrowaliśmy jedną z ostatnich przesłanych ze stacji wiadomości:\n\n§gWiadomość - Data 02100363 - Nadawca: §SsiDani Itempeer§! - Adresat: siZul Itempeer§!\n§LCześć! Wciąż żyję! Wybacz zwłokę. Od kiedy (…) stacja zachowuje się dziwnie, więc wysyłanie wiadomości nie jest łatwe. Mówią, że jedno nie ma związku z drugim, ale myślimy, że jednak był psionicznie uzdolniony. Co do mnie, to, jak wspominałem, nie czyniłem żadnych postępów. Biorąc pod uwagę wszystkie poprzednie (…), więc zasugerowali coś bardziej radykalnego: (…) w burzach kosmicznych. Wiem, co sobie myślisz, ale to tylko jeden palec. I może nawet odrośnie. Ale odczucia, do jakich uzyskałem dostęp, kiedy (…)!\nBuziaki! siDani\n- TRANSMISJA§! §YOCENUROWANA (Masz pytania? Skieruj je do swojego nadzorującego)§!\n\n§gWiadomość - Data 02100365 - Nadawca: §ShaToor Gailon§! - Adresat: aeDal Asduur§!§L\nDroga aeDal,\nżycie nie jest złe. Poznałem kilku innych weteranów. Nie rozmawiamy. Ale wszyscy wiemy. Miło jest nie musieć nic mówić.\nDziś musiałem tylko pomyśleć o uniesieniu kubka. I się uniósł. Wciąż tęsknię za prawą kończyną, ale może to nowe życie nie będzie takie złe, jak myślałem. Słyszałem, jak rozmawiają o wysłaniu mnie do (…). Podobno jestem psionicznym cudownym dzieckiem... I... chciałbym znowu dostać przydział.\nMam nadzieję, że na Dzień Patriotów będę w domu. Spotkajmy się.\nTwój haToor\n-TRANSMISJA§! §YOCENUROWANA (Masz pytania? Skieruj je do swojego nadzorującego)§!\n\n§gWiadomość - Data 02100367 - Nadawca: §SenRida Direen§! - Adresat: enRida Direen§!\n§LZDUSIŁAM POŻAR WŁASNYM UMYSŁEM!!!!\nJeden z pozostałych badanych wpadł z jakiegoś powodu w histerię i wywołał pożar w mesie. Wszyscy zaczęli panikować, ale nie mogliśmy nigdzie uciec! Ja też się STRASZNIE bałam, ale potem coś się we mnie stało i po prostu zgasiłam ten ogień!\nWSZYSTKICH URATOWAŁAM!! Powiedz starszym, że nie jestem zupełnie do niczego, dobra?\n- TRANSMISJA§! §RZABLOKOWANA (NATYCHMIAST ZGŁOŚ SIĘ DO NADZORUJĄCEGO)§!\n\nSzczególną uwagę zwraca druga transmisja: ciało §ShaToora Gailona§! zostało odkryte podczas naszej archeologicznej misji na [Root.Owner.GetPreFTLLowerPlural] świecie."
 cstorms.2215.a: "Doskonała robota!"
 cstorms.2220.name: "Konsekwencje awarii"
 cstorms.2220.desc: "Te wiadomości wysłane zostały na kilka dni przed ewakuacją stacji:\n\n§gWiadomość - Data 02100359 - Nadawca: Najwyższy lekarz - Adresat: Szacowna admirał§!\n§LPani ostatnia wiadomość wzbudziła tu nieco niepokojów. Czy będzie Pani tak dobra i wyjaśni, czemu po wspieraniu nas bez słowa przez tak wiele lat, nagle grozicie zamknięciem obiektu?\n- TRANSMISJA§! §GWYSŁANA§!\n\n§gWiadomość - Data 02100360 - Nadawca: Szacowna admirał - Adresat: Najwyższy lekarz§!\n§LChyba Pan sobie żartuje. Wysyłamy ostrzeżenia już od miesięcy, ale najwyraźniej orbitowanie wokół niespokojnego świata spowodowało atak niezwykle dogodnej amnezji. Wiecie chyba, że UniCom zagraża naszemu istnieniu, prawda? A wojna staje się coraz bardziej zaciekła. Nie mam jak dłużej uzasadniać wydawania ogromnych sum tylko po to, żeby Wasi badani gapili się całymi dniami na bydło. Potrzebuję namacalnych, praktycznych wyników. NATYCHMIAST.\n- TRANSMISJA§! §GODEBRANA§!\n\n§gWiadomość - Data 02100360 - Nadawca: Najwyższy lekarz - Adresat: Szacowna admirał§!\n§LProszę o wybaczenie, nie otrzymaliśmy Pani wcześniejszych wiadomości. Stację nękają problemy techniczne, które musiały wpłynąć również na nasze systemy łączności. Tak czy inaczej, potrzebujemy więcej czasu. Mamy tu wdrożone procesy i procedury, których nie możemy ot tak zarzucić!\n- TRANSMISJA§! §GWYSŁANA§!\n\n§gWiadomość - Data 02100361 - Nadawca: Szacowna admirał - Adresat: Najwyższy lekarz§!\n§LMacie tydzień. Inaczej rozpoczniemy natychmiastowe wyłączenie stacji. Żadnych \"jeśli\", żadnych \"ale\", żadnych kolejnych szans. REZULTATY!\n- TRANSMISJA§! §GODEBRANA§!\n\n§gWiadomość - Data 02100368 - Nadawca: Najwyższy lekarz - Adresat: Szacowna admirał§!\n§LW załączniku przesyłam meldunek z naszych najnowszych osiągnięć. Nagrania te stanowią dowód, że nasi obdarzeni psionicznie badani są w stanie wpływać na burze kosmiczne. Może to mieć niezwykłe znaczenie militarne. Jeśli dostaniemy dość czasu, możemy dokonać przeciążenia ich ekspresji psionicznej bez wystawiania na ryzyko traumy psychicznej i fizycznej.\n- TRANSMISJA§! §RNIEWYSŁANA (przyczyna: uszkodzenie macierzy nadawczej)§!"
 cstorms.2220.a: "Ostatnia wiadomość nigdy nie opuściła stacji."
 cstorms.2225.name: "Los niedokończony"
 cstorms.2225.desc: "Oto ostatnia odzyskana wiadomość:§L\n\nDrodzy współpracownicy,\n\nzwracam się do was z ciężkim sercem. Wielcy przywódcy postanowili, że Patriotyczny Instytut Wywyższonej Życzliwości przestanie funkcjonować.\n\nNie traktujcie tego jako potępienie Was samych czy też Waszej pracy tutaj. Zaszczytem było służyć u boku każdego z Was. Wiem, że macie wiele pytań, mówiąc jednak krótko, oczekiwania wielkich przywódców okazały się niezgodne z naszymi celami badawczymi.\n\nCo się tyczy naszych obywateli, wielcy przywódcy zaprosili ich do udziału w programie, który prowadzi $building_adakkaria_patriotic_institute$ na adSul. Poniżej znajdziecie pełną listę personelu. Poinformujcie swoich podopiecznych.\n\nCo się tyczy pozostałych... Niestety, tajna natura naszych badań oznacza, że uczestnicy badań nie będą mogli powrócić na łono społeczeństwa. Wielcy przywódcy obiecali przysłać specjalną jednostkę, która się nimi zajmie. Nie będziecie musieli robić tego sami, co jest na swój sposób błogosławieństwem. Ich bliscy otrzymają pełną rekompensatę.\n\nDo zobaczenia! \nNajwyższy lekarz §!§SalAtta Landeer§!\n\nDołączona lista, choć częściowo uszkodzona, wymienia badanych §ShaToora Gailona§! i §SenRidę Direen§!. Wygląda na to, że zostali oni przeniesieni na stołeczną planetę Konwentu adAkkaryjskiego, adSul. Jesteśmy teraz w posiadaniu współrzędnych tego świata."
 cstorms.2225.a: "Ustalcie kurs na świat macierzysty Konwentu."
 #Special Project: Eye of the Convention / The Void Calls
 cstorms.2240.name: "Oko Konwentu"
 cstorms.2240.desc: "Współrzędne skrywały układ ukryty dotąd przed naszymi skanerami. Nadszedł czas złożyć wizytę Konwentowi adAkkaryjskiemu, zanim zrobi to ktokolwiek inny.\n\nUruchomiono nowy projekt specjalny."
 cstorms.2245.name: "Zew pustki"
 cstorms.2245.desc: "W kilka ledwie chwil po opuszczeniu stacji mieszkalnej [event_target:leader_patriotic_institute.GetName] podejmuje nagłą i zadziwiającą decyzję. Jakby pod wpływem zewnętrznej siły nakazuje statkowi otworzyć kanał łączności na częstotliwości wiązanej zwykle z masowymi wydarzeniami psionicznymi lub przelotnymi burzami kosmicznymi.\n\nCelem transmisji są współrzędne układu macierzystego Konwentu adAkkaryjskiego. Po krótkiej ledwie chwili od wysłania wiadomości nadeszła odpowiedź."
 cstorms.2245.desc.gestalt: "Kilka chwil po opuszczeniu stacji mieszkalnej w naszą zbiorową świadomość wdarły się nietypowe wibracje, jakby coś próbowało nawiązać z nami łączność na dużą odległość. Sygnał pochodził ze współrzędnych świata macierzystego Konwentu adAkkaryjskiego, nadany zaś został na częstotliwości powiązanej zwykle z masowymi wydarzeniami psionicznymi lub przelotnymi burzami kosmicznymi.\n\nNasza reakcja na sygnał wywołała natychmiastową odpowiedź."
 cstorms.2250.name: "Zew burzy"
 cstorms.2250.desc: "Zrobiliśmy, co w naszej mocy, lecz dotarcie na adSul okazało się o wiele większym wyzwaniem, niż przewidywaliśmy. Cały układ spowity jest nieznanego typu burzą kosmiczną, która uniemożliwia nam dostanie się bliżej planety.\n\nWygląda na to, że burza ta próbuje... nawiązać z nami łączność?"
 #The Storm
 cstorms.2260.name: "Burza"
 cstorms.2260.desc: "WYPOWIEDZCIE NASZE IMIONA.\n\nWYPOWIEDZCIE NASZE IMIONA.\n\nWYPOWIEDZCIE. NASZE. IMIONA."
 cstorms.2260.a: "Kim jesteście?"
 cstorms.2260.b: "Co tu się stało?"
 cstorms.2260.c: "Imiona?"
 cstorms.2260.a.resp: "BYĆ. NIE BYĆ. ZANIEBYĆ.\n\nRYCZĄCA BURZA I FURIA.\n\nBÓL I WŚCIEKŁOŚĆ I ROZPACZ I LĘK.\n\nWYPOWIEDZCIE NASZE IMIONA."
 cstorms.2260.b.resp: "PROWOKACJA. EWOKACJA. INWOKACJA.\n\nWYPOWIEDZCIE NASZE IMIONA."
 cstorms.2265.name: "$cstorms.2260.name$"
 cstorms.2265.desc: "NIE MOŻEMY MYŚLEĆ. MÓWIĆ. MARZYĆ. ŚNIĆ\n\nNASZE IMIONA NAS WYWOŁUJĄ. PRZYWRACAJĄ NAM JA. JESTEŚMY ZAPOMNIANI.\n\nWYPOWIEDZCIE NASZE IMIONA."
 cstorms.2265.c.resp: "$cstorms.2265.desc$"
 cstorms.2265.d: "Gdzie znajdziemy wasze imiona?"
 cstorms.2265.e: "Pokażcie nam to świętowanie."
 cstorms.2270.name: "$cstorms.2260.name$"
 cstorms.2270.desc: "TO JEST ŚWIĘTOWANIE.\n\nTO JEST ŚWIĘTOWANIE.\n\nBÓL. WŚCIEKŁOŚĆ. ROZPACZ. STRACH.\n\nŚWIĘTOWANIE\n\nWYPOWIEDZCIE NASZE IMIONA."
 NAME_adSul: "adSul"
 project_adakkaria_benevolent_grounds: "Przestrzeń Życzliwości"
 project_adakkaria_benevolent_grounds_DESC: "Zdobyliśmy współrzędne planety macierzystej Konwentu adAkkaryjskiego.\n\nEksploracja systemu i planety może ujawnić w końcu przed nami losy cywilizacji adAkkaryjczyków."
 #Celebration
 site_adakkaria_celebration: "Świętowanie"
 site_adakkaria_celebration_intro: "Po rozmowie z kosmiczną burzą ujawniła się przed nami niewielka część adSul. Pośród pozostałych chmur odsłonił się przed nami potężny kompleks - dziwacznie nietknięty przez czas, choć porzucony. Skany ujawniły obecność wewnątrz materii organicznej.\n\nPrzed ogromnym budynkiem łopocze szereg sztandarów, na każdym z których widnieje następująca deklaracja: Nadszedł czas na świętowanie."
 cstorms.2285.name: "Wymuszony nihilizm"
 cstorms.2285.desc: "Puste korytarze Patriotycznego Instytutu Świętowania skrywały jedynie pył wieków. Plakaty propagandowe wychwalające na wieki chwałę Konwentu adAkkaryjskiego to jedyne, co pozostało po tym kwitnącym niegdyś i budzącym lęk imperium.\n\nNasze lingwistyczne badania przynoszą już jednak owoce - zabezpieczenia były żałośnie słabe, a główny komputer bez oporów ujawnił swoje tajemnice.\n\nOdkryte przez nas dzienniki pełne były aktywności aż do ostatniej transmisji stacji propagandowej.\n\nI pewnego dnia adAkkaryjski Konwent Życzliwości po prostu przestał istnieć."
 cstorms.2290.name: "Zejście do krainy potępionych"
 cstorms.2290.desc: "Z grozą, ale i zaciekawieniem zeszliśmy do podziemnej części kompleksu. Powitała nas tam rozległa, uważnie rozplanowana sieć laboratoriów. Grupa rozdzieliła się na połowy: jedna otrzymała zadanie poszukania w pomieszczeniach badawczych informacji na temat przeznaczenia Świętowania, druga zaś ruszyła dalej w głąb kompleksu.\n\nSkany stale wykazywały obecność materii organicznej - już wkrótce przekonaliśmy się dlaczego. Na niższych poziomach znajdowały się wyłącznie cele obserwacyjne. W ciasnych klitkach wciąż znajdowały się uwięzione, zmumifikowane szczątki obywateli adAkkarii. Na cyfrowym interfejsie obok każdego z pomieszczeń widniało imię badanego, faza eksperymentu, którymu był on poddawany, oraz notatki obserwatora.\n\nW tym samym czasie odnaleźliśmy w innym miejscu następującą wiadomość:\n§LNasze próby w układzie Haliios okazały się kompletnym fiaskiem. Wystawienie do walki badanego imieniem §ShaToor Gailon§! przebiegało z początku zgodnie z planem. Ale kiedy stanęły przeciw nam barbarzyńskie siły Solphani, utracił on nad sobą kontrolę. Burza zniszczyła wprawdzie prymitywne wojska wroga, ale zdziesiątkowała również nasze.\n\nPrzede wszystkim należy pamiętać, że ci badani to podłe, spaczone istoty. Im szybciej uruchomimy wywoływacz, tym lepiej.§!"
 cstorms.2290.a: "Co oni tu robili?"
 cstorms.2290.a.gen: "Tyle śmierci. Inspirujące."
 cstorms.2295.name: "Jakiegoś rodzaju święto"
 cstorms.2295.desc.start.authgen: "Eksperymenty przeprowadzone przez Konwent adAkkaryjski były fascynujące. Każdy więzień miał przydzieloną fazę badań. W miarę przechodzenia do kolejnych faz rosła też brutalność traktowania. Uwagę zwraca szczególnie kilka wyjątkowo innowacyjnych metod: użycie ognia i elektryczności do przyspieszenia przyrostu mocy psionicznych; usuwanie kluczowych narządów w celu rozbudzenia mocy; stosowanie substancji odmieniających postrzeganie w celu doprowadzenia obiektu badań do stanu bliskiego śmierci.\n\nZdecydowanie jest tu czym się inspirować. Ci eksperci pracowali w imię dobrze rozumianego przez nas celu - zaprowadzeniu w galaktyce adAkkaryjskiej supremacji.\n\nMeldunki wykazują jednak, że to nie brutalne traktowanie mogło być przyczyną śmierci badanych. Wielu z nich, jak §ShaToor Gailon§!, wygląda, jakby po prostu się poddali."
 cstorms.2295.desc.start.default: "Groza i zdumienie, jakie towarzyszyły nam podczas oględzin szczątków ofiar, były przytłaczające. Ale to samo można było powiedzieć o naszej żądzy zrozumienia rozmachu i celu eksperymentów, które prowadził Konwent.\n\nAdAkkarscy naukowcy rzeczowym, wyzutym z uczuć tonem meldowali, co robią z badanymi. Każdy więzień miał przydzieloną fazę badań. W miarę przechodzenia do kolejnych faz rosła też brutalność traktowania. Ogień, elektryczność, okaleczanie, deprywacja sensoryczna i głodzenie - niczego nie uznano za nazbyt brutalne. A wszystko to w imię wielkiej misji utrzymania w galaktyce adAkkaryjskiej supremacji. Według raportów jednak to wcale nie te podłości mogły ostatecznie zabić badanych. Wielu z nich, jak §ShaToor Gailon§!, wygląda, jakby po prostu się poddali."
 cstorms.2295.desc.end.default: "Ledwie chwilę po tym, jak dokonaliśmy naszych obserwacji, usłyszeliśmy łupnięcie i zobaczyliśmy, że [Root.GetLeaderName] leży na podłodze i, jęcząc z bólu, wykrzykuje, że ma rozdzierany umysł!\n\nChoć sytuacja po chwili się ustabilizowała, wygląda na to, że była to próba umieszczenia w jaźni radykalnych myśli przez jakiś agresywny byt. [Root.GetLeaderName] chce spróbować ponownie, twierdząc, że doświadczenie to mogło wywrzeć silny wpływ."
 cstorms.2295.desc.end.psionic: "Obserwując ciała, [Root.GetLeaderName] słyszy dziwne szepty, pozbawiony ciała głos, który zakrzyknął, pełen tęsknoty:\n§LByliśmy wierni! Czciliśmy Konwent i wierzyliśmy w jego misję.\nBurze wciąż nas wzywały. Spowiły nas, pragnęły nas!\nZrobiliśmy, co nam kazano. Byliśmy uzdolnieni i wytrwali!\nMówią, że jesteśmy źli. Że jesteśmy zdrajcami. Zabijają naszych przyjaciół!\n\nTO MIAŁO BYĆ ŚWIĘTOWANIE!§!\n\nSzepty doprowadziły nas do korytarza z tabliczką o treści \"Ostatnia faza\", zaawansowane systemy ochrony nie pozwoliły nam jednak wejść do środka."
 cstorms.2295.desc.end.psionic_individual_robot: "Analizując ciała, [Root.GetLeaderName] wykrywa i rejestruje psioniczną transmisję:\n§LByliśmy wierni! Czciliśmy Konwent i wierzyliśmy w jego misję.\nBurze wciąż nas wzywały. Spowiły nas, pragnęły nas!\nZrobiliśmy, co nam kazano. Byliśmy uzdolnieni i wytrwali!\nMówią, że jesteśmy źli. Że jesteśmy zdrajcami. Zabijają naszych przyjaciół!\n\nTO MIAŁO BYĆ ŚWIĘTOWANIE!§!\n\nTransmisja doprowadziła nas do korytarza z tabliczką o treści \"Ostatnia faza\", zaawansowane systemy ochrony nie pozwoliły nam jednak wejść do środka."
 cstorms.2295.desc.end.psionic_gestalt: "Gdy badaliśmy ciała, nowy głos rozbrzmiał wśród myśli kolektywu. [Root.GetLeaderName] służy jako przekaźnik dla tego osobliwego komunikatu:\n§LByliśmy wierni! Czciliśmy Konwent i wierzyliśmy w jego misję.\nBurze wciąż nas wzywały. Spowiły nas, pragnęły nas!\nZrobiliśmy, co nam kazano. Byliśmy uzdolnieni i wytrwali!\nMówią, że jesteśmy źli. Że jesteśmy zdrajcami. Zabijają naszych przyjaciół!\n\nTO MIAŁO BYĆ ŚWIĘTOWANIE!§!\n\nGłos doprowadził nas do korytarza z tabliczką o treści \"Ostatnia faza\", zaawansowane systemy ochrony nie pozwoliły nam jednak wejść do środka."
 cstorms.2295.desc.end.gestalt: "Procesy poznawcze, z których korzystają nasze [controller.GetIndividualNamePlural] znów uległy dziwacznym zaburzeniom - pojawiły się myśli nienależące do nas. Dowiedzieliśmy się dzięki nim, że badani z instytutu rozmawiali ze sobą w pozafizyczny sposób - używali niemal natychmiastowego przekazu myśli, podobnego do współistnienia nowego umysłu zbiorowego.\n\nChoć nie zdołaliśmy rozszyfrować dokładnego znaczenia słów, cel dyskusji był jasny: w Świętowaniu szykował się bunt."
