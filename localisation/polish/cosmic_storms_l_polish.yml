 magnetic_storm_aftermath_modifier: "Zakłócenia biegunowe"
 magnetic_storm_aftermath_modifier_tooltip: "$STORM_AFTERMATH_DESC$\n$t$- §H$magnetic_storm_aftermath_modifier$§!:\n$tt$- $mod_planet_metallurgists_upkeep_mult$: §G-10%§! do §G-30%§!\n$tt$- $MOD_PLANET_BUILDING_BUILD_SPEED_MULT$: §R-5%§! do §R-20%§!"
 magnetic_storm_aftermath_modifier_severity_desc: "Zakłócenia magnetyczne, które pozostawia po sobie $magnetic_storm$, wzniecają jasne atmosferyczne wyładowania świetlne. Pozostałe po nich pola magnetyczne wpływają też na prędkość projektów konstrukcji planetarnych."
