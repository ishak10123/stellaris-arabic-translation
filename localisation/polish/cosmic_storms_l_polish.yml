 ###########################################
 #Anomalies #
 ###########################################
 STORMS_ANOM_ANTS: "Organiczna kometa"
 STORMS_ANOM_ANTS_DESC: "Po burzy kosmicznej została kometa o niecodziennym składzie. Prawdopodobnie powstała z materiału organicznego. Nasi [solar_system.Owner.GetScientistPlural] chcą ją koniecznie zbadać."
 cstorms.5020.name: "Mrówkoida"
 cstorms.5020.desc: "Kometa okazała się być ogromnym gniazdem pełnym małych owadów. Jej ogon to nie uwalniający się lód, lecz gazy wydzielane przez reakcje chemiczne zachodzące w głębi mrowiska.\n\nZewnętrzna warstwa gniazda składa się z martwych osobników, jej zadaniem jest ochrona przebywających w środku istot przed bezlitosną kosmiczną próżnią. Znaleźliśmy w gnieździe także kilka gatunków grzybów. Mamy tu do czynienia ze skomplikowaną symbiozą, grzyby odżywiają się wydzielanymi gazami, a owady grzybami."
 cstorms.5020.a: "Pozyskajmy to gniazdo."
 cstorms.5020.b: "Przyjrzyjmy się, ale niczego nie dotykajmy."
 STORMS_ANOM_STAT: "Niecodzienny skład"
 STORMS_ANOM_STAT_DESC: "Ten orbitujący obiekt został tu po przejściu burzy kosmicznej. Wygląda jak stacja kosmiczna, ale skanowanie jego struktury dało bardzo niecodzienne wyniki. Zalecamy bliższe badanie."
 cstorms.5030.name: "Apokalipsa na stacji"
 cstorms.5030.desc: "[Root.Owner.GetScientistPluralCapital] donoszą, że duża część tej stacji kosmicznej powstała ze stacjonarnych przedmiotów codziennego użytku i ledwo trzyma się w kupie. W głębi tej struktury materiały przechodzą ze stopów metali w tworzywa sztuczne i inne substancje.\n\nW samym sercu budowli znaleźliśmy maszynę, wciąż wydajnie rozkładającą materię organiczną i wytwarzającą z niej przedmioty, na które już się natknęliśmy.\n\nPo uruchomieniu modelu symulacji DNA nasi [Root.Owner.GetScientistPlural] doszli do wniosku, że materiał ten musi pochodzić z dawnych mieszkańców tej placówki."
 cstorms.5030.evopred: "Spróbujmy jakoś to wykorzystać."
 STORMS_ANOM_BRAIN: "Dyssypacja egzystencjalna"
 STORMS_ANOM_BRAIN_DESC: "Odkąd $shroud_storm$ przeszła przez ten układ, odbieramy dziwne sygnały. Gdy tylko nasi [Root.Owner.GetScientistPlural] próbują odpowiedzieć na tę kakofonię połączeń, wszystko znowu cichnie. Zalecono wysłanie statku badawczego."
 cstorms.5025.name: "Burza mózgów"
 cstorms.5025.desc: "Nie spodziewaliśmy się takiego odkrycia: mózgi. Organiczne, gąbczaste centralne organy obliczeniowe, pochodzące od różnych gatunków. Są ich dosłownie setki, wszystkie połączone ze sobą i zawieszone wewnątrz dużej kapsuły przypominającej balon. Prawdopodobnie została opuszczona i dryfuje przez kosmiczną pustkę, odkąd zniknęła niedawna $shroud_storm$.\n\nW kapsule znajduje się niewiarygodny zestaw czujników podłączonych do mózgów i balonu, jest tam też moduł łączności, umożliwiający komunikację ze statkami oraz przesyłanie informacji, jak było w naszym przypadku.\n\nBardzo prawdopodobne, że to właśnie mózgi skontaktowały się z nami, stąd taka kakofonia wiadomości. Nasi [Root.Owner.GetScientistPlural] przypuszczają, że konstrukcja ta służyła do mierzenia reakcji organicznych na działania, które wywołuje $shroud_storm$. Biorąc pod uwagę niestabilny ślad psioniczny w tych dryfujących umysłów, próba połączenia się z nimi zakończyłaby się katastrofą."
 #Terrestrial Telescopes
 terrestial_telescope_category: "Ziemskie teleskopy"
 terrestial_telescope_category_desc: "Flota [fleetGetName] przeprowadziła skanowanie, które wykryło obecność opuszczonej stacji kosmicznej w układzie [From.GetStarName].\n\nWygląda na to, że przyniosła ją tam przechodząca tamtędy burza kosmiczna. Nie ma na niej żadnych śladów życia, nie wykryto też żadnej energii. Z obu stron stacji wystają dwa ogromne teleskopy. Te instrumenty optyczne wyglądają na zaawansowane i o wiele za duże jak na rozmiary tej stacji. Jeszcze nigdy nie zetknęliśmy się z taką technologią i architekturą.\n\nMożemy podjąć próbę reaktywacji tych teleskopów, może dzięki temu dowiemy się czegoś ciekawego."
 cstorms.1605.name: "Ziemskie teleskopy"
 cstorms.1605.desc: "Nasi [Root.Owner.GetScientistPlural] trochę się napracowali, aby wejść na pokład stacji i reaktywować teleskopy. Ale poradzili sobie. Jednak zakątek galaktyki, na który były skierowane te instrumenty, wyglądał na pusty.\n\nNa stacji znaleziono różne interesujące przedmioty: szczegółowe obrazy zgrane z teleskopów, umieszczone w eleganckich ramkach. Każde z ujęć przedstawia burzę kosmiczną, która przeszła przez ten układ. Operator teleskopu zmieniał ustawienia, powiększenie, korzystał nawet z artystycznych filtrów, aby przedstawić burze w jak najlepszym świetle.\n\nPo dokładnym przeszukaniu okazało się, że poza tymi pięknymi zdjęciami na opuszczonej stacji nie ma niczego ciekawego. Zarchiwizujemy je, aby przyszłe pokolenia mogły zachwycać się ich wyjątkowym pięknem i mocą."
 STORMS_ANOM_POLYCHROMATIC: "Gwiazda polichromatyczna"
 STORMS_ANOM_POLYCHROMATIC_DESC: "Przejście burzy kosmicznej przez układ [from.solar_system.GetName] zmieniło wygląd jego gwiazdy - jej warstwa wieńcowa stanowi teraz wir zmiennych kolorów, który wystrzeliwuje we wszystkich kierunkach polichromatyczne błyski. To zjawisko należy dogłębniej zbadać."
 cstorms.5035.name: "$STORMS_ANOM_POLYCHROMATIC$"
 cstorms.5035.desc: "[root.leader.GetName] donosi o fascynujących zmianach reakcji jądrowych gwiazdy [From.GetStarName], które wywołała [from.GetAffectedStormType].\n\nWygląda na to, że burza spowodowała w rdzeniu gwiazdy niespodziewane reakcje jądrowe, przez co z jej stref konwekcyjnych strumieniem wydobywają się zasoby, a konkretniej: [fromGetEarnedResources].\n\nTe złożone i specyficzne reakcje wzbudzają niezwykłe, zaobserwowane przez nas błyski. Tak czy inaczej, warto poświęcić czas na dalsze badania tego zjawiska."
 cstorms.5035.a: "Zbadajcie te nowe procesy."
 cstorms.5035.b: "Pozyskajcie te nowe zasoby."
 STORMS_ANOM_TRIPLETS: "Potrójna asteroida"
 STORMS_ANOM_TRIPLETS_DESC: "Przechodząca burza kosmiczna pozostawiła w układzie [from.solar_system.GetName] trzy nowe asteroidy. Te ciała niebieskie podlegają niewyjaśnionym zmianom kierunku, co uniemożliwia przewidzenie ich trajektorii. Potrzebne są dalsze badania."
 cstorms.5040.name: "$STORMS_ANOM_TRIPLETS$"
 cstorms.5040.desc: "[root.leader.GetName] donosi, że asteroidy znajdujące się w układzie [from.solar_system.GetName] posiadają silnie niestabilne pola magnetyczne, co powoduje ich przypadkowe rykoszetowanie od istniejących magnetosfer układu.\n\nUstabilizowano je poprzez doczepienie do każdej magnetycznych kompensatorów, co reguluje ich trajektorię i pozwala pozyskiwać z nich surowce."
 STORMS_ANOM_TRAVELLERS: "Pokłosie: sygnał alarmowy"
 STORMS_ANOM_TRAVELLERS_DESC: "Po tym, jak przeszła §H[from.GetAffectedStormType]§!, w układzie §H[from.solar_system.GetName]§! wykryto niezidentyfikowany sygnał alarmowy."
 cstorms.5050.name: "Zagubieni podróżnicy"
 cstorms.5050.desc: "Zidentyfikowaliśmy źródło sygnału alarmowego w układzie §H[from.solar_system.GetName]§!: to mocno uszkodzony, lecz wciąż funkcjonujący statek kupiecki.\n\nJego załoga twierdzi, że §H[from.GetAffectedStormType]§! mocno zepchnęła ich z kursu. Burza spaliła też ich silniki, unieruchamiając statek i jego zawartość w naszej przestrzeni.\n\nProponują nam część ładunku w zamian za pomoc."
 cstorms.5050.a: "Udzielmy im pomocy."
 cstorms.5050.evopred: "Pomożemy w zamian za trochę próbek DNA."
 cstorms.5050.b: "Życzcie im powodzenia."
 cstorms.5050.c.genocide: "Odebrać im życie i ładunek."
 cstorms.5050.d.devouring_swarm: "Darmowy posiłek."
 STORMS_COSMIC_SLUDGE: "Kosmiczny szlam"
 STORMS_COSMIC_SLUDGE_DESC: "Czujniki masy nadzorujące układ §H[from.solar_system.GetName]§! dają zmienne odczyty po tym, jak przeszła tamtędy §H[from.GetAffectedStormType]§!.\n\nDiagnostyka systemu nie wykazała technicznych usterek wyposażenia. Trzeba dokładniej zbadać te odczyty."
 cstorms.5060.name: "$STORMS_COSMIC_SLUDGE$"
 cstorms.5060.desc: "Zmienne odczyty czujników w układzie §H[from.solar_system.GetName]§! mają swoje źródło w zbiorowisku szczątków, które pozostawiła §H[from.GetAffectedStormType]§!.\n\nTen dryfujący stwór to amorficzna masa kosmicznego szlamu, która powstała w wyniku oddziaływania ekstremalnych ciśnień panujących we wnętrzu burzy. Jego niepoliczalne pierwiastki wytworzyły niezwykle reaktywny związek chemiczny.\n\nDokładne zbadanie jego składu chemicznego może przynieść nam cenną wiedzę o warunkach, w których powstał."
 cstorms.5060.a: "Poznajmy budowę tej istoty."
 cstorms.5060.b: "Rozbierzmy to."
 STORMS_SHATTERED_SATTELITE: "Zniszczony satelita"
 STORMS_SHATTERED_SATTELITE_DESC: "Po tym, jak przeszła §H[from.GetAffectedStormType]§!, w układzie §H[from.solar_system.GetName]§! wykryto niezidentyfikowany obiekt. Dalsza analiza tych szczątków mogłaby dostarczyć nam cennych informacji."
 cstorms.5070.name: "$STORMS_SHATTERED_SATTELITE$"
 cstorms.5070.desc: "Obiekt w układzie §H[from.solar_system.GetName]§! to wrak starożytnego satelity wyposażonego w złożony system czujników astrometeorologicznych. Przypuszczamy, że §H[from.GetAffectedStormType]§! spowodowała, że przemierzył ogromną odległość przez całą galaktykę.\n\nNie da się go naprawić, ale jego centralna baza danych zawiera ogromną ilość informacji, które moglibyśmy wykorzystać.\n\nReszta satelity nadaje się tylko na złom."
 STORMS_EVISCERATED_FAUNA: "Nieznany obiekt"
 STORMS_EVISCERATED_FAUNA_DESC: "Czujniki w układzie §H[from.solar_system.GetName]§! wykryły nieznany obiekt, który przyniosła §H[from.GetAffectedStormType]§!.\n\nSprecyzowanie natury tej anomalii wymaga jej dokładniejszego zbadania."
 cstorms.5080.name: "Szczątki organiczne"
 cstorms.5080.desc.common: "Nieznany obiekt w układzie §H[from.solar_system.GetName]§! okazał się być ogromną masą szczątków organicznych pochodzących od jakiegoś rodzaju fauny kosmicznej. Jego wszelkie cechy charakterystyczne zostały zniszczone przez burzę kosmiczną, więc nie możemy prawidłowo skatalogować tych bioodpadów."
 cstorms.5080.desc.swarm: "Na szczęście większość jest jadalna."
 cstorms.5080.desc.default: "[leader.GetName] nie ma wątpliwości, że dokładniejsza analiza szczątków tej istoty ujawni więcej informacji o jej pochodzeniu i o tym, jak §Y[from.GetAffectedStormType]§! wpływa na podobne organizmy kosmiczne."
 cstorms.5080.a: "Jesteśmy głodni."
 cstorms.5080.b: "Przeprowadźmy na miejscu sekcję zwłok."
 cstorms.5080.c: "Pozbądźmy się tych szczątków."
 FORENSIC_DISSECTION_PROJECT: "Sekcja zwłok"
 FORENSIC_DISSECTION_PROJECT_DESC: "Znaleźliśmy szczątki nieznanej istoty w układzie §H[solar_system.GetName]§!, które burza kosmiczna niosła przez galaktykę. Sekcja zwłok powinna przynieść nam więcej informacji."
 cstorms.5085.name: "$FORENSIC_DISSECTION_PROJECT$"
 cstorms.5085.desc: "Po ostrożnej sekcji zwłok nadal nie wiemy, do jakiego gatunku należy ta masa organiczna. Niesamowite obrażenia odniesione w epicentrum burzy pozbawiły to stworzenie wszelkich rozpoznawalnych cech i markerów genetycznych.\n\nJednak podczas tego badania zdobyliśmy wiedzę na temat budowy §Yburz kosmicznych§! oraz ich niszczycielskiego wpływu na materię ksenobiologiczną."
 cstorms.5085.evopred: "Fascynujący posiłek."
 STORMS_DISPLACED_TIYANKI: "Porwane tijanki"
 STORMS_DISPLACED_TIYANKI_DESC: "Kiedy $default_storm$ minęła, nasze czujniki wykryły obecność trzech tijanek w układzie §H[solar_system.GetName]§!."
 cstorms.5090.name: "$STORMS_DISPLACED_TIYANKI$"
 cstorms.5090.desc.common: "Trzy tijanki wykryte w układzie §H[solar_system.GetName]§! to porwane i niedożywione cielęta.\n\n§Y$default_storm$§! oddzieliła je od większego stada, więc musiały radzić sobie same.\n\nRaczej nie przetrwają długo w otwartej przestrzeni kosmicznej. Nasze czujniki wykryły, że młode wzywają swoje stado, ale bezskutecznie."
 cstorms.5090.desc.swarm: "Możemy wzmocnić ich wołania o pomoc i w ten sposób zwabić większą zdobycz."
 cstorms.5090.desc.default: "Nasze systemy łączności mogą wzmocnić ich wołania o pomoc i zwabić ich stado do tego układu."
 cstorms.5090.a.default: "Wzmocnijmy ich sygnał."
 cstorms.5090.a.swarm: "Zastosujmy przynętę."
 cstorms.5090.b.default: "Natura jest okrutna."
 cstorms.5090.b.machine: "Uruchomić protokoły eksterminacji."
 cstorms.5090.b.swarm: "Darmowy posiłek."
 cstorms.5090.c: "Dajmy im nowy dom."
 cstorms.5090.c.tt: "Dodaj 3 §Y$NAME_Tiyanki_Hatchling$§! losowej rzadkości do twojego ['concept_vivarium']"
 REUNITE_POD_PROJECT: "Ponowne spotkanie ze stadem"
 REUNITE_POD_PROJECT_DESC: "Trójka cieląt tijanek zagubiła się i wędruje przez układ [this.solar_system.GetName]. Kosmiczna burza sprawiła, że oddaliły się od swojego stada. Możemy im pomóc do niego wrócić, wzmacniając ich nawoływania, aby zwabić do układu resztę ich grupy."
 cstorms.5095.name: "Ponowne spotkanie z tijankami"
 cstorms.5095.desc.common: "Krowa i byk tijanek pojawiły się w układzie §H[solar_system.GetName]§!, usłyszawszy wzmocnione nawoływania trzech zaginionych cieląt.\n\nMłode tijanki wróciły do stada, dzięki czemu już wyglądają na zdrowsze i szczęśliwsze.\n\nKrowa zostawiła mnóstwo szczątków w pobliżu naszego statku badawczego, prawdopodobnie chciała nam w ten sposób podziękować. Ku naszemu zdziwieniu ten niecodzienny dar zawiera wiele przydatnych materiałów."
 cstorms.5095.desc.swarm: "Oczywiście te większe zwierzęta są prawdziwą nagrodą. Dojrzałe mogą od razu pójść na rzeź."
 ###########################################
 #Event Chains #
 ###########################################
 ### Collided Planet Event Chain
 collided_planets_category: "Planeta Zderzenia"
 collided_planets_category_desc: "Eony temu doszło do zderzenia dwóch planet. Z ich zagłady zrodził się wyjątkowy świat."
 cs_collided_planet_chain_title: "Planeta Zderzenia"
 cs_collided_planet_chain_desc: "Katastrofa może zniszczyć delikatną równowagę tej wyjątkowej planety."
 cstorms.1200.name: "Opowieść o dwóch planetach"
 cstorms.1200.desc: "Od chwili jego odkrycia świat [From.Planet.GetName] stał się źródłem fascynacji.\n\nZderzenie dwóch obiektów to oczywiście nic niezwykłego, w końcu galaktyka to bezkresne i chaotyczne miejsce. Jednak we wszystkich znanych przypadkach takiej kolizji, jeden lub oba biorące w niej udział obiekty ulegały zniszczeniu.\n\nZderzenie, w wyniku którego powstał świat [From.Planet.GetName] miało miejsce miliony lat temu, a mimo to oba światy pozostają w dziwnej równowadze, a po drodze wytworzyły nawet atmosferę umożliwiającą istnienie życia."
 cstorms.1205.name: "Niecodzienna równowaga"
 cstorms.1205.desc: "Sytuacja na tak zwanej Planecie Zderzenia okazała się o wiele ciekawsza, niż przewidywaliśmy. W wyniku niedawnej serii trzęsień ziemi w strefie zderzenia otworzyły się dawne blizny, co doprowadziło do erupcji magmy. Część biomów planetarnych już odczuwa skutki globalnego wzrostu temperatury i obecności na niebie chmur pyłu wulkanicznego.\n\nCo gorsza, jeżeli połączone planety nie zostaną ustabilizowane w ciągu najbliższych 50 lat, przewidujemy, że aktywność tektoniczna będzie się nasilać, co w końcu doprowadzi do całkowitej dezintegracji świata [From.Planet.GetName]!"
 cstorms.1210.name: "Uwolnienie metamorfozy"
 cstorms.1210.desc: "Nasi najlepsi geolodzy połączyli siły i stworzyli dwa plany ewentualnościowe mające uchronić świat [From.Planet.GetName] od pogrążenia się w tektonicznej grozie.\n\nPierwszy plan opiera się na ustabilizowaniu zderzenia. Zaleczenie rany wulkanicznej wokół miejsca uderzenia zajmie wiele wieków. Prowadząc ostrożne wiercenia powierzchni planety, możemy zmniejszyć ciśnienie oddziałujące na jej skorupę i w ten sposób zapobiec dalszej destabilizacji tektonicznej. Powstałe wulkaniczne produkty uboczne zostaną wykorzystane do terraformowania planety w stabilny biom.\n\nDrugi plan jest o wiele bardziej ambitny. Zamiast zmniejszać ciśnienie działające na skorupę planety, energię i materiały pochodzące z erupcji wulkanicznej można wykorzystać w specjalnie zaprojektowanym procesie terraformowania.\n\nTakie podejście pozwoli stworzyć wiele biomów gościnnych dla wszystkich rodzajów organizmów, co uczyniłoby ten świat prawdziwym rajem. Jednakże szansa niepowodzenia tego działania jest wysoka, może nawet dojść do całkowitego zniszczenia tego wyjątkowego ciała niebieskiego."
 cstorms.1210.a: "Ustabilizujemy zderzenie."
 cstorms.1210.b: "Wykorzystamy emisje."
 cstorms.1210.c: "Ograniczymy się do obserwacji."
 collided_planet_collapsing: "Dezintegracja planety"
 collided_planet_collapsing_desc: "Niszczycielska aktywność tektoniczna rozerwie Planetę Zderzenia, co doprowadzi do zagłady obu światów."
 collided_planet_collapsing_tt: "Ten świat ulegnie zniszczeniu po upływie 50 lat."
 project_cosmic_storms_collidedplanet_stabilize: "Ustabilizujcie zderzenie"
 project_cosmic_storms_collidedplanet_stabilize_DESC: "Ustabilizowanie Planety Zderzenia jest konieczne, jeśli chcemy zapobiec zniszczeniu tego świata."
 project_cosmic_storms_collidedplanet_harmonize: "Dostrójcie zderzenie"
 project_cosmic_storms_collidedplanet_harmonize_DESC: "Realizacja ambitnego planu dostrojenia biomów Planety Zderzenia. Stworzymy świat dla każdego albo doprowadzimy do jego zagłady."
 cstorms.1220.name: "Zderzenie ustabilizowane"
 cstorms.1220.desc: "Nasze wysiłki mające na celu ustabilizowanie Planety Zderzenia przyniosły skutek! Wstrząsy, które wcześniej zagrażały istnieniu świata [From.Planet.GetName] zostały zatrzymane, pojawia się coraz mniej wulkanicznych produktów ubocznych, planeta wraca do stanu kruchej równowagi.\n\nPrzed ostatnim etapem terraformowania musimy odpowiedzieć sobie na jedno pytanie: jaką klasą planety stanie się [From.Planet.GetName]?"
 cstorms.1220.a: "Zachowajcie klasę kontynentalną."
 cstorms.1220.b: "Stwórzmy świat stepowy."
 cstorms.1220.c: "Stwórzmy świat górzysty."
 cstorms.1225.name: "Świat dla wszystkich"
 cstorms.1225.desc.stabalize: "Wspaniale! Myśleliśmy, że nasze działania ograniczą się jedynie do ustabilizowania świata [collided_planets.GetName], jednak stał się on czymś znaczenie więcej!\n\n$cstorms.1225.desc.def$"
 cstorms.1225.desc.def: "A oto raj, planeta, na której może żyć prawie każdy rodzaj organizmów.\n\nOcalenie planety skazanej na zagładę i uczynienie z niej czegoś tak inspirującego - czy ktokolwiek dokonał większego osiągnięcia? Szczęście naprawdę nam sprzyja."
 cstorms.1230.name: "Fliperzy"
 cstorms.1230.desc: "Na szczęście świat udało się uratować, jednak nasze działania mające terraformować Planetę Zderzenia w raj zakończyły się niepowodzeniem.\n\nNasze próby zmodyfikowania biomu zakłóciła potężna aktywność sejsmiczna planety, jednak okres najgorszej destabilizacji mamy za sobą. Aktywność wulkaniczna wróciła do poziomów sprzed ostatniego zamieszania. Jej oddziaływanie pozostaje znaczące, ale w najbliższym czasie nie nasili się.\n\nNajgorsze chyba minęło. Przed nami wyzwanie odbudowy tego świata."
 cstorms.1235.name: "Rozdarta planeta"
 cstorms.1235.desc: "Próbowaliśmy ratować Planetę Zderzenia przed nadchodzącą zagładą, ale ponieśliśmy kompletną porażkę. Nasi naukowcy zachowali wszelkie środki ostrożności, jednak ich modele nie mogły przewidzieć każdej ewentualności.\n\nPozostałości światów dryfują w bezkresnej pustce, a galaktyka opłakuje stratę tego wyjątkowego zjawiska."
 cstorms.1240.name: "Zderzenie i zniszczenie"
 cstorms.1240.desc: "Zniszczenie Planety Zderzenia nastąpiło dokładnie w momencie, który przewidywały nasze modele. W miejscu, które niegdyś wzbogacało galaktykę o wyjątkowe zjawisko, są teraz tylko skały."
 collided_planets_destroyed_tt: "Planeta [collided_planets.GetName] została zniszczona."
 ### Crimson crawlers Event Chain
 cs_crimson_crawlers_chain_desc: "Karmazynowe robactwo"
 cs_crimson_crawlers_chain_title: "Znaleźliśmy planetę, po której powierzchni pełzają tryliony czerwonych owadów. To plaga czy może okazja?"
 crimson_crawlers_category: "Karmazynowa pokrywa"
 crimson_crawlers_category_desc: "W układzie [From.GetStarName] odkryto szkarłatną planetę. Intensywność jej barwy jest niezwykła. Powinniśmy ją zbadać."
 cstorms.1255.name: "Karmazynowe robactwo"
 cstorms.1255.desc: "Z oddali świat [From.GetName] lśnił niczym cenny karmazynowy klejnot. Najczęściej za taką anomalię geograficzną odpowiada glina albo inne rodzaje gleby bogatej w twarde metale, ale prawda okazała się o wiele bardziej niecodzienna.\n\nRobaki. Tryliony trylionów robaków. Pokrywają powierzchnię świata [From.GetName] dywanem organizmów o licznych odnóżach.\n\nTe bezkręgowce, które szybko zyskały miano karmazynowego robactwa, mają ciekawy cykl rozrodczy. Nie są one szkodliwe dla miejscowego środowiska, ale sprawiają, że [From.GetName] nie nadaje się do kolonizacji.\n\nPojawiła się niezwykle ciekawa propozycja uporania się z tymi owadami. Według wstępnych badań stworzenia te są jadalne, więc może trafiliśmy właśnie na nowe źródło żywności? Zalecamy dokładniejsze sprawdzenie tej możliwości."
 project_cosmic_storms_crimson_crawlers: "Żywność za myśli"
 project_cosmic_storms_crimson_crawlers_DESC: "[From.Planet.GetName] to świat w całości pokryty czerwonymi owadami. Ta planeta nadawałaby się do zamieszkania, gdyby udało się usunąć robactwo. Jednocześnie wydają się one być dobrym źródłem pożywienia. Może to jest rozwiązanie tej sytuacji."
 cstorms.1260.name: "Niecodzienna kuchnia"
 cstorms.1260.desc: "Z początku pomysł odżywiania się karmazynowymi robakami wydawał się niedorzeczny, ale stał się o wiele bardziej realny, gdy na pokład trafiły pierwsze okazy.\n\nOwady to zadziwiające stworzenia, mają niezwykle rozwinięty układ nerwowy, jednak bez głównego organu przetwarzającego informacje. Co więcej, ich mięso jest zadziwiająco wilgotne i delikatne. Rubinowy egzoszkielet jedzony na surowo jest pyszny i chrupiący.\n\nPozostaje pytanie, czy te owady powinny być materiałem badawczym, czy też źródłem smacznego pożywienia. Gotowanie może wzbogacić ich smak i być rozrywką, ale jedzenie ich na surowo będzie szybsze i łatwiejsze, szczególnie po odpowiednim przyprawieniu."
 cstorms.1260.a: "Zbadajcie te robaki."
 cstorms.1260.b: "Jedzmy je na surowo!"
 cstorms.1260.c: "Gotujmy je!"
 ### Stormbound Event Chain
 cs_stormbound_chain_title: "Więzień burzy"
 cs_stormbound_chain_desc: "Nasze czujniki wykryły złowieszczy statek, porusza się on wyłącznie w burzach kosmicznych. Cóż to takiego?"
 letters_of_the_manifold: "Listy spomiędzy rozmaitości"
 stormbound_event_ship_object: "$cs_stormbound_chain_title$"
 cstorms.1310.name: "Więzień burzy nadciąga"
 cstorms.1310.desc: "Z układu [This.GetName] docierają dziwne meldunki. Wygląda na to, że ostatnia burza kosmiczna w tym sektorze ujawniła obecność nieznanego statku. Nie posiada on żadnego znaku wywoławczego, w jakiś sposób przemieszczał się przez szalejącą nawałnicę, nie odnosząc żadnych uszkodzeń.\n\nNie odpowiedział na wywołania i zniknął wraz z burzą. Można było wziąć to za błędne wskazanie przyrządów, ale dowody wizualne mówiły same za siebie.\n\nCzy właśnie widzieliśmy pokaz działania niezwykle zaawansowanej technologii, a może dzieje się coś bardziej złowieszczego? Z pewnością będziemy wypatrywać i odnotowywać kolejne pojawienia się tej tajemniczej jednostki."
 cstorms.1313.name: "Więzień burzy powraca"
 cstorms.1313.desc: "Jedna ze stacji badawczych w układzie [This.GetName] przekazała nam niepokojący meldunek: podczas ostatniej burzy kosmicznej, jakiś dziwny statek omal nie zderzył się z tą placówką. Materiały wizualne potwierdziły, że była to ta sama złowieszcza jednostka, z którą zgłoszono spotkanie jakiś czas temu.\n\nWedług personelu stacji badawczej kadłub tego statku wykonano z dziwnego połączenia substancji organicznych, wapnia oraz stopów metali.\n\nNa pokładzie nie wykryto organicznego życia, co pozwala przypuszczać, że mamy do czynienia ze zautomatyzowanym lub zbuntowanym pojazdem.\n\nJednak coś zaskoczyło nas jeszcze bardziej: wiele elementów jego napędu zostało zniszczonych przez kosmiczne szczątki. Ten statek powinien dryfować.\n\nJeżeli wyznaczymy statek badawczy do obserwacji następnej burzy kosmicznej, być może uda się zdobyć więcej informacji o tej tajemniczej jednostce."
 cstorms.1313.a: "Nie mamy czasu na takie bzdury."
 cstorms.1316.name: "Szepty w nawałnicy"
 cstorms.1316.desc: "[stormbound_science.GetName] melduje o pojawieniu się w oddali złowieszczego statku pomiędzy dwoma warstwami burzy. Kiedy przelatywał, odebraliśmy zdumiewające odczyty z kosmicznej osnowy.\n\nDzięki temu wreszcie ustaliliśmy, dlaczego nasze czujniki nie wykrywały tego statku: jego forma fizyczna rozciągała się poza rozmaitość, jakby równocześnie wchodził i nie wchodził do tunelu czasoprzestrzennego. Zdołał wrócić do naszej przestrzeni prawdopodobnie dzięki hiperwymiarowej naturze burz kosmicznych.\n\nDzięki tej wiedzy powinno nam się udać wykryć jego kolejne przybycie i być może ściągnąć go z powrotem do naszej rzeczywistości."
 cstorms.1317.name: "Zauważono więźnia burzy"
 cstorms.1317.desc: "W układzie §Y[this.GetName]§! zauważono złowieszczy statek."
 cstorms.1320.name: "Powrót do domu"
 cstorms.1320.desc: "Jest! Złowieszczy statek ustawił się na trasie floty [Root.Fleet.GetName] i nawiązał z nami łączność. Na ekranie pojawiła się mechaniczna istota w ozdobnej masce. Przedstawiła się jako B'Tiin i opowiedziała nam fascynującą historię.\n\nNiegdyś była cenioną oficerką, niedoścignionym wzorem w organizacji nazywanej Kongresem Dobroczyńców. Podczas patrolu ona i jej załoga znaleźli się w burzy kosmicznej. Aby przetrwać, B'Tiin postanowiła przeciążyć \"napęd przebijający\" statku. Ta eksperymentalna technologia nie była wcześniej testowana, jednostka i jej załoga utknęli w polu międzywymiarowym burzy.\n\nKiedy istota zakończyła swoją opowieść, z uszkodzonego statku wyleciał niewielki pojemnik. Wewnątrz były dokumenty. B'Tiin kazała nam \"zabrać je do domu\", po czym połączenie zakończyło się, a statek zniknął w kosmicznej rozmaitości.\n\nDokumenty napisano w nieznanym języku, ich odczytanie zajmie jakiś czas."
 cstorms.1320.a: "Rozpocząć tłumaczenie."
 cstorms.1321.name: "Listy z rozmaitości"
 cstorms.1321.desc: "Odczytaliśmy treść dokumentów z pojemnika. Jeden z nich zawierał schemat tak zwanego napędu przebijającego zainstalowanego w niezwykłym statku. Dalece wyprzedza on naszą technologię, jednak dokładne zbadanie jego budowy pozwoliło nam poszerzyć wiedzę w dziedzinie podróży nadprzestrzennych.\n\nPrzekłady pozostałych listów nie przyniosły tylu korzyści, ale miały ogromne znaczenie. Każdy zaadresowano do kogoś bliskiego, mówią o czułości, nadziei i żalu.\n\nZdaje się, że B'Tiin chciała dać swojej załodze ostatnią okazję do kontaktu z bliskimi. Niestety, nie mamy pojęcia, gdzie powinny trafić te listy. Udostępnienie ich naszym ludziom przynajmniej pozwoli ocalić pamięć o załodze tej jednostki. Możemy też je zniszczyć. Wiedza o dziwnych statkach i znajomość treści ponurych listów mogą być niepokojące."
 cstorms.1321.a: "Zachowajmy te listy dla potomności."
 cstorms.1321.b: "Pozbądźmy się tych listów."
 project_cosmic_storms_stormbound: "Duchy burzy"
 project_cosmic_storms_stormbound_DESC: "Ustaliliśmy, że złowieszczy statek pojawi się wewnątrz tej burzy.\n\nWyślijmy tam jednostkę badawczą, aby go wyciągnąć i natychmiast przechwycić!"
 ### But They're Cute Event Chain
 cs_but_they_are_cute_chain_title: "Ależ to urocze!"
 cs_but_they_are_cute_chain_desc: "W czasie badania świata [From.Planet.GetName] odkryto dziwną istotę. Co z nią zrobimy?"
 but_they_are_cute_category: "Ależ to urocze!"
 but_they_are_cute_category_desc: "W czasie badania świata [From.Planet.GetName] odkryto dziwną istotę. Chociaż przebywa wśród nas od niedawna, wszyscy bardzo chcą się nią opiekować i ją chronić. Zaleca się przeprowadzenie dalszych badań."
 cstorms.1500.name: "Ależ to urocze!"
 cstorms.1500.desc: "Od chwili jej odkrycia istota ta wywierała na nas ogromne wrażenie, wzbudzała w nas miłość i oddanie. Dwie pary jej ogromnych oczu sprawiały, że wyglądała niewinnie, a każdy chciał głaskać jej sierść, miękką niczym obłoczek pary. [Root.GetLeaderName] cieszy się jej szczególną sympatią, spędzają ze sobą wiele czasu, istota pozwala się pieścić i nie wykazuje żadnych oznak agresji czy zagrożenia. Wygląda, jakby została stworzona jako doskonałe ucieleśnienie łagodności.\n\nJednak niektórzy sceptycy wskazują, że trzymanie na pokładzie statku przedstawiciela świeżo odkrytego gatunku bez uprzedniego sprawdzenia jest nieodpowiedzialne. [Root.GetLeaderName] ręczy, że stworzenie prawdopodobnie nie jest groźne, ale zgadza się na przeprowadzenie formalnego badania."
 cstorms.1500.a: "Dowiedzmy się, co to takiego."
 cstorms.1500.b: "Wniosek odrzucony. Pozbądźcie się tego."
 cstorms.1500.evopred: "Prośba odrzucona. Zjedzcie to stworzenie."
 project_cosmic_storms_but_they_are_cute: "Cud biologiczny"
 project_cosmic_storms_but_they_are_cute_DESC: "Na pokładzie jednego z naszych statków badawczych znaleziono wyjątkowo intrygujące, przeurocze zwierzę. Należy dokładnie zbadać cechy biologiczne tego stworzenia, zanim postanowimy, czy z nami zostanie."
 cstorms.1505.name: "Cud biologiczny"
 cstorms.1505.desc: "Zbadanie i przeskanowanie łagodnego sześcionoga nie wymagało podania mu środków uspokajających ani użycia siły. Był dziwnie posłuszny. Załoga nadała mu imię Gurr, bo kiedy go głaskano, wydawał z siebie podobny dźwięk.\n\nUstaliliśmy, że Gurr jest wszystkożerny, a jego sierść składa się ze znanych nam, bardzo miękkich włosków zawierających keratynę. Ale prawdziwe tajemnice i cuda dzieję się wewnątrz tego uroczego stworzenia: co miesiąc odnawiają się wszystkie komórki jego ciała. Dotyczy to układu nerwowego, a to pozwala na odbudowanie w pełni sprawnych części ciała w zaledwie kilka dni.\n\nMało prawdopodobne, żeby coś o tak skomplikowanej budowie biologicznej było dziełem naturalnej ewolucji. Nigdy nie spotkaliśmy się z czymś takim i nie wiemy, jakie naprawdę ma usposobienie. Mimo pozornej łagodności, może nas w każdej chwili zaatakować. Jednak od czasu pojawienia się tej istoty [Root.GetLeaderName] ma większy zapał do pracy niż kiedykolwiek.\n\nCo zrobimy z Gurrem? Może z nami zostać?"
 cstorms.1505.a: "Pod warunkiem, że będziecie po nim sprzątać."
 cstorms.1505.b: "Pozbądźcie się tego."
 cstorms.1510.name: "Gurr wsparcia emocjonalnego"
 cstorms.1510.desc: "Uroczemu stworzeniu pozwolono zostać na statku badawczym i zadomowiło się tam. [Root.GetLeaderName] docenia kojący wpływ tego zwierzaka, ten słodziak poprawia nastrój, gdziekolwiek podrepcze, morale załogi nigdy nie było tak wysokie!\n\nMiejmy nadzieję, że ten niesamowity cud \"natury\" pozostanie uroczy, łagodny i przyjacielski. Zostanie z nami już na zawsze i będzie się wabił Gurr."
 cstorms.1510.a: "Wyśmienicie!"
 cstorms.1515.name: "Koniec Gurra"
 cstorms.1515.desc: "Ta istota miała niezwykłe i zapewne genetycznie zmodyfikowane ciało, zatem nie mogła zostać na pokładzie statku badawczego. Ryzyko, że negatywnie wpłynie na załogę albo że zjawi się rozzłoszczony właściciel domagający się jej zwrotu, było po prostu za duże. Wszystko odbyło się szybko i bez zadawania zbędnego cierpienia. W jednej chwili urocze \"gurr\" zamilkło na zawsze.\n\nChociaż była to zrozumiała decyzja, załoga i [Root.GetLeaderName] zareagowali emocjonalnie. Potrzebują trochę czasu, aby pogodzić się ze stratą tego uroczego wybryku natury."
 cstorms.1515.a: "Nie mieliśmy innego wyboru."
 cstorms.1515.evopred: "Zachowajmy próbkę DNA."
 cstorms.1520.name: "Koniec Gurra?"
 cstorms.1520.desc: "Neutralizacja tego uroczego stworzenia miała zakończyć sprawę, ale jego niesamowite zdolności regeneracyjne okazały się większe, niż ktokolwiek przypuszczał.\n\nKrótko po jego śmierci, z pozornie martwych tkanek, wyłoniły się dwie identyczne kopie stworzenia. Nawet po naszej decyzji o zakończeniu życia ich przodka, nowe organizmy nie wykazują żadnych oznak agresji.\n\nNie podejmiemy kolejnych działań, lepiej nie ryzykować stworzenia całej armii Gurrów. [Root.GetLeaderName] i załoga ucieszyli się na wieść, że mogą zatrzymać oba zwierzaki."
 cstorms.1520.a: "Dostaliśmy nauczkę."
 ### The Imitator Event Chain
 cstorms.1550.name: "Naśladowca"
 cstorms.1550.desc: "Kapsuła odkryta na świecie [From.Planet.GetName] została zostawiona na łaskę burzy. Chociaż sygnatura danych, z której korzysta, wygląda jak jedna z naszych, sama kapsuła jest niewątpliwie obcego pochodzenia. Ostrożnie odpowiedzieliśmy na próbę kontaktu, ale mieszkaniec kapsuły zareagował bardzo entuzjastycznie.\n\nTwierdzi, że znajduje się tam na skutek burzy, która porwała statek, którym podróżuje. Potrzebuje pomocy, ponieważ niebawem przestaną działać systemy podtrzymywania życia.\n\nObcy, zapytany o tożsamość, stwierdził, że jest członkiem naszej załogi. To oczywiste kłamstwo, ponieważ nie brakuje nam nikogo na pokładzie."
 cstorms.1550.a: "Koniec cackania się. Zniszczyć tę kapsułę."
 cstorms.1550.b: "Ściągnijcie kapsułę na pokład."
 cstorms.1555.name: "Naśladowca"
 cstorms.1555.desc: "Ściągnęliśmy kapsułę ratunkową na pokład naszego statku. Podstęp wydał się, gdy tylko otwarto właz kapsuły, a siedzący w niej kosmita od razu zaczął rozpaczliwe wyjaśnienia.\n\nPodczas rutynowej kontroli kapsuł ratunkowych na statku matce, obca istota została uwięziona w jednej z nich i wystrzelona w kosmos. Niestety, nikt na pokładzie nie zauważył jej zaginięcia.\n\nW czasie wielomiesięcznej podróży wykorzystała dostępne na pokładzie maszyny, aby naśladować sygnatury energetyczne przelatujących statków, żeby zwrócić na siebie uwagę. Jednak nawet to nie sprawiło, że przybyła pomoc. Co gorsza, burza kosmiczna porwała kapsułę i przeniosła ją wiele lat świetlnych od jej układu macierzystego. Istota, cierpiąca ze strachu i samotności, postanowiła udawać zaginionego członka załogi jakiegoś napotkanego statku. Teraz przeprasza nas za ten podstęp, ale cieszy się, że żyje."
 cstorms.1555.a: "Taka zaradność może okazać się przydatna."
 cstorms.1555.b: "Zawieźmy tę istotę na najbliższą zamieszkaną planetę."
 cstorms.1555.c: "Zostawmy tę istotę. Zabierzmy kapsułę."
 the_imitator_category_desc: "W czasie niedawnego rozpoznania wykryliśmy pojedynczą kapsułę ratunkową. Dziwne, bo kapsuła wywołała nas za pomocą sygnatury danych identycznej z naszą. Wygląda na to, że kapsułę przyniosła burza kosmiczna, przechodząca niedawno przez ten układ. Zaleca się dalsze zbadanie tej sytuacji."
 #The Imitator Leader
 the_imitator_category: "Naśladowca"
 the_imitator_catch_phrase: "Tak się cieszę, że tu jestem!"
 the_imitator_leader_desc: "Sprowadzony na pokład po tym, jak został wciągnięty przez burzę kosmiczną, ten przebiegły, ale ekscentryczny geniusz wie, jak wykaraskać się z każdej sytuacji, zwykle z korzyścią dla siebie."
