 cstorms.2010.c: "Namagnesować jony."
 cstorms.2010.c.tt: "$approach_situation_initiate_storm_magnetize_tt$\nMiesięczny koszt: $@magnetize_mineral_upkeep|0$ $r_minerals$, miesięczne postępy: $@default_monthly_progress$"
 cstorms.2010.d: "Porzucić projekt."
 cstorms.2015.name: "$cstorms.2010.name$"
 cstorms.2015.desc_one_tech_only: "Przygotowania, jakie wymusza na nas $default_storm$ w układzie §H[target.solar_system.GetName]§!, osiągnęły kluczowy etap. Kolejne działania, które podejmie [storm_researcher.GetName], wymagają intensywnego skupienia i zaangażowania nowych zasobów, aby wykorzystać stan gwiazdy [target.GetName]."
 cstorms.2015.desc_others: "Przygotowania, jakie wymusza na nas $default_storm$ w układzie §H[target.solar_system.GetName]§!, osiągnęły krytyczny etap. Kolejne działania, które podejmie [storm_researcher.GetName], są kluczowe i wymagają bardziej skoncentrowanego zaangażowania nowych zasobów, jeśli chcemy właściwie wykorzystać stan gwiazdy [target.GetName]."
 cstorms.2015.a: "Pobudzić cząstki."
 cstorms.2015.a.tt: "$approach_situation_initiate_storm_agitate_tt$\nMiesięczny koszt: $@rare_resource_upkeep|0$ $r_volatile_motes$, miesięczne postępy: $@default_monthly_progress$"
 cstorms.2015.b: "Zdestabilizować pola grawitacyjne."
 cstorms.2015.b.tt: "$approach_situation_initiate_storm_destabilize_tt$\nMiesięczny koszt: $@rare_resource_upkeep|0$ $r_dark_matter$, miesięczne postępy: $@default_monthly_progress$"
 cstorms.2015.c: "Zamącić gwiezdny pył."
 cstorms.2015.c.tt: "$approach_situation_initiate_storm_scramble_tt$\nMiesięczny koszt: $@rare_resource_upkeep|0$ $r_rare_crystals$, miesięczne postępy: $@default_monthly_progress$"
 cstorms.2015.d: "$cstorms.2010.d$"
 cstorms.storm_gathered.final_word: "Zaczerpnięcie mocy, jaką dysponuje $default_storm$, było nie lada wyzwaniem. Wreszcie możemy cieszyć się wyczekanym zyskiem z naszego przedsięwzięcia."
 cstorms.storm_gathered.a: "Doskonała robota."
 cstorms.2020.name: "Uwolnienie burzy"
 cstorms.2020.desc: "§H[target.GetName]§!: zintensyfikowane wiatry słoneczne osiągnęły masę krytyczną.\n\nLada moment §Y$solar_storm$§! zostanie uwolniona.\n\n$cstorms.storm_gathered.final_word$"
 cstorms.2025.name: "$cstorms.2020.name$"
 cstorms.2025.desc: "§H[target.GetName]§!: pola elektronowe zostały rozdzielone.\n\nLada moment §Y$electric_storm$§! zostanie uwolniona.\n\n$cstorms.storm_gathered.final_word$"
 cstorms.2030.name: "$cstorms.2020.name$"
 cstorms.2030.desc: "§H[target.GetName]§!: jony zostały skutecznie namagnesowane.\n\nLada moment §Y$magnetic_storm$§! zostanie uwolniona.\n\n$cstorms.storm_gathered.final_word$"
 cstorms.2035.name: "$cstorms.2020.name$"
 cstorms.2035.desc: "§H[target.GetName]§!: nasycone cząstki osiągnęły punkt krytyczny.\n\nLada moment §Y$particle_storm$§! zostanie uwolniona.\n\n$cstorms.storm_gathered.final_word$"
 cstorms.2040.name: "$cstorms.2020.name$"
 cstorms.2040.desc: "§H[target.GetName]§!: pola grawitacyjne zostały zdestabilizowane.\n\nLada moment §Y$gravity_storm$§! zostanie uwolniona.\n\n$cstorms.storm_gathered.final_word$"
 cstorms.2045.name: "$cstorms.2020.name$"
 cstorms.2045.desc: "§H[target.GetName]§!: gwiezdny pył został zmącony.\n\nLada moment §Y$celestial_storm$§! zostanie uwolniona.\n\n$cstorms.storm_gathered.final_word$"
 ### Aftermath Deposits ###
 d_magnetic_storm_1_minerals: "Namagnesowana ruda"
 d_magnetic_storm_1_minerals_desc: "Przechodząca burza kosmiczna namagnesowała ogromne ilości niewydobytych dotąd złóż minerałów, dzięki czemu nasi górnicy mają teraz wyjątkowo łatwy dostęp do tych nowych zasobów."
 d_magnetic_storm_2_alloys: "Odlewnia zrodzona w burzy"
 d_magnetic_storm_2_alloys_desc: "Przechodząca burza kosmiczna, która spustoszyła tę planetę, w dziwny sposób naładowała części wyposażenia odlewni. Choć nie do końca rozumiemy ten mechanizm, nasza produkcja stopów znacznie wzrosła."
 d_magnetic_storm_3_mix: "Podniebne płaskowyże"
 d_magnetic_storm_3_mix_desc: "Efekty grawitacyjne przechodzącej kosmicznej burzy namagnesowały masy lądu, które obecnie majestatycznie dryfują w powietrzu i mogą zostać przemieszczone nad kompleksy przemysłowe."
 cstorms.8000.title: "Kosmiczna alteracja"
 cstorms.8000.desc: "Przechodząca kosmiczna burza pozostawiła po sobie nie tylko zniszczenie. Na planecie [Planet.GetName] stworzyła zupełnie nową formację geograficzną."
 cstorms.8000.a: "Fascynujące."
 d_electric_storm_1_engineering: "Trafione piorunem ruiny"
 d_electric_storm_1_engineering_desc: "Przechodząca burza kosmiczna o niezwykłej sile zmieniła niegdyś tętniące życiem osiedle w trafione piorunem ruiny, przeistaczając nasze prozaiczne materiały budowlane w rzadkie i niezwykłe związki."
 d_electric_storm_2_unity: "Blizna planetarna"
 d_electric_storm_2_unity_desc: "Przechodząca burza kosmiczna poczyniła na powierzchni planety tak wielkie zniszczenia, że pozostawiła po sobie widoczną z przestrzeni kosmicznej bliznę."
 d_electric_storm_3_physics: "Cicha armada"
 d_electric_storm_3_physics_desc: "Przechodząca burza kosmiczna wyrządziła spustoszenie wśród systemów nawigacyjnych niezliczonych statków cywilnych. Tam, gdzie uderzyła najmocniej, widnieją teraz upiorne cmentarzyska rozbitych kadłubów i poszatkowanej maszynerii."
 d_particle_storm_1_society: "Zniszczone burzą przedmieścia"
 d_particle_storm_1_society_desc: "Burza kosmiczna przemieniła nasze niektóre przedmieścia w ruiny, w których możemy już tylko badać szczątki."
 d_particle_storm_2_unity: "Wielka Nawałnica"
 d_particle_storm_2_unity_desc: "Burza kosmiczna pozostawiła na tej planecie olbrzymi krater, który brutalnie przypomina o obojętności kosmosu na nasze istnienie."
 d_particle_storm_3_motes: "Niestabilne wymiary"
 d_particle_storm_3_motes_desc: "Burza kosmiczna przemieniła kilka rozległych wymiarów w obszary o wysokiej aktywności tektonicznej. Jak się okazuje, wraz ze wzrostem zagrożenia zwiększyła się także ilość lotnych pyłków."
 particle_storm_aftermath_1_tt: "Szybkość montażu robotów: §R-40%§!\n£minerals£ §YMinerały§! z miejsc pracy: §R-10%§!\n£volatile_motes£ §YLotne pyłki§! z populacji: §G+0,02§!"
 particle_storm_aftermath_2_tt: "Szybkość montażu robotów: §R-50%§!\n£minerals£ §YMinerały§! z miejsc pracy: §R-20%§!\n£volatile_motes£ §YLotne pyłki§! z populacji: §G+0,04§!"
 particle_storm_aftermath_3_tt: "Szybkość montażu robotów: §R-60%§!\n£minerals£ §YMinerały§! z miejsc pracy: §R-30%§!\n£volatile_motes£ §YLotne pyłki§! z populacji: §G+0,06§!"
 d_solar_storm_1_energy: "Degradacja warstwy ozonowej"
 d_solar_storm_1_energy_desc: "Burza kosmiczna utworzyła dziurę w warstwie ozonowej atmosfery tej planety. Choć bardzo mocno wpływa to na jakość naszego życia, zwiększa również jakość produkcji."
 d_solar_storm_2_districts: "Napromieniowane wyżyny"
 d_solar_storm_2_districts_desc: "Burza kosmiczna skąpała wyżyny tego świata w promieniowaniu, tworząc dla nas doskonałe warunki do produkcji energii."
 d_solar_storm_3_output: "Świecąca pustynia"
 d_solar_storm_3_output_desc: "Po przejściu burzy kosmicznej cała pustynia zaczęła świecić. To zabójczy widok, lecz dzięki odpowiednim środkom bezpieczeństwa możemy zmienić go w dochodową atrakcję turystyczną."
 d_celestial_storm_1_mines: "Krystaliczne kolce"
 d_celestial_storm_1_mines_desc: "Pustoszące uderzenia przechodzącej burzy kosmicznej pozostawiły po sobie krajobraz najeżony ostrymi, poszarpanymi kryształami, tworząc zabójczy, lecz potencjalnie zyskowny krajobraz."
 d_celestial_storm_2_society: "Historyczna sedymentacja"
 d_celestial_storm_2_society_desc: "Przechodząca burza kosmiczna zdmuchnęła całe warstwy osadu, odkrywając ślady epok, których nigdy dotąd nie mieliśmy możliwości zbadać."
 d_celestial_storm_3_crystal: "Wydmy gwiezdnego pyłu"
 d_celestial_storm_3_crystal_desc: "Przechodząca burza kosmiczna omiotła ten świat niczym fala. Pozostawiła po sobie nieziemski krajobraz połyskujących wydm z gwiezdnego pyłu."
 celestial_storm_aftermath_1_tt: "Przestępczość planetarna: §R+10%§!\n£food£ §YŻywność§! z miejsc pracy: §R-10%§!\n£rare_crystals£ §YRzadkie kryształy§! z populacji: §G+0,02§!"
 celestial_storm_aftermath_2_tt: "Przestępczość planetarna: §R+20%§!\n£food£ §YŻywność§! z miejsc pracy: §R-20%§!\n£rare_crystals£ §YRzadkie kryształy§! z populacji: §G+0,04§!"
 celestial_storm_aftermath_3_tt: "Przestępczość planetarna: §R+30%§!\n£food£ §YŻywność§! z miejsc pracy: §R-30%§!\n£rare_crystals£ §YRzadkie kryształy§! z populacji: §G+0,06§!"
 d_gravity_storm_1_districts: "Sprasowane równiny"
 d_gravity_storm_1_districts_desc: "Miażdżący wpływ grawitacyjny przechodzącej kosmicznej burzy sprasował obszary dawniej nienadające się pod zabudowę, zapewniając nam wolne działki budowlane."
 d_gravity_storm_2_unity: "Zmiażdżone pomniki"
 d_gravity_storm_2_unity_desc: "Przechodząca burza kosmiczna wywarła olbrzymie ciśnienie na niektóre z naszych najbardziej wrażliwych pomników, zmieniając je w pył i gruz. To lekcja pokory przypominająca o panujących tu siłach."
 d_gravity_storm_3_engineering: "Jaskinie grawitacyjne"
 d_gravity_storm_3_engineering_desc: "Przechodząca burza kosmiczna zmieniła niektóre z naszych kompleksów górniczych w zniszczone szyby pełne wysoce skompresowanego materiału. Choć próby ponownego ich otwarcia doprowadziły nas do nowych teorii w inżynierii i wiertnictwie, nie poczyniono dużych postępów w odzyskaniu kontroli nad kopalniami."
 d_shroud_storm_1_society: "Pasożyty Woalu"
 d_shroud_storm_1_society_desc: "Przechodząca burza kosmiczna rozprzestrzeniła pasożyty wśród naszego bydła. Migocze ono między naszą rzeczywistością a Woalem i okazuje się jadalne, zdrowe i zaskakująco pyszne."
 d_shroud_storm_2_zro: "Pola zro"
 d_shroud_storm_2_zro_desc: "Przechodząca burza kosmiczna przemieniła najbardziej bujne biomy tej planety w niestabilne pola zro. To najczystsze złoża, na jakie kiedykolwiek natrafiliśmy."
 d_shroud_storm_3_happy: "Byt z jeziora"
 d_shroud_storm_3_happy_desc: "Przechodząca burza kosmiczna obdarzyła nas czymś dziwnym i cudownym. Na powierzchni największego akwenu planety powstają zmarszczki tworzące wzory i symbole, które ewidentnie coś znaczą i potrafią odpowiadać na pytania z zaskakującą mądrością."
 ### Shroud Storm Events
 shroud_switched: "Spowicie Woalem"
 shroud_switched_tt: "To ciało niebieskie spowiły zasłony Woalu. Ich nienaturalna obecność sugeruje znaczne naruszenie zasad lub jest skutkiem katastrofalnej burzy Woalu."
 cstorms.8510.title: "Psioniczna zamiana"
 cstorms.8510.desc: "W chaosie aktywności psionicznej gwiazda [from.GetName] została zastąpiona przez nieznane ciało o nazwie [from.GetClassName]."
 cstorms.8510.a: "Dziwny los."
 cstorms.8515.title: "Masowa transfiguracja"
 cstorms.8515.desc: "Wyładowanie psionicznej energii omiotło planetę [from.GetName], odmieniając część populacji w sposób, który przeczy prawom natury. Całe grupy uległy transformacji, przybierając obce i nieznajome formy, jak gdyby coś przekraczającego nasze pojmowanie przetworzyło strukturę ich istnienia."
 cstorms.8515.a: "Nieznane siły wirują..."
 cstorms.8520.title: "Gwiezdna transmutacja"
 cstorms.8520.desc: "Wyładowanie psionicznej energii odmieniło naturę gwiazdy [from.GetName]. Teraz [from.GetClassName] rzuca dziwne światło na układ [from.solar_system.GetName], jak gdyby sama rzeczywistość uległa transformacji."
 cstorms.8520.a: "Nawet gwiazdy nie są odporne..."
 ### Building custom requirements
 storm_repellent_allow: "$TRIGGER_FAIL$Nie można zbudować, jeśli w układzie istnieje budynek §Yprzyciągania burzy§!"
 storm_attracting_allow: "$TRIGGER_FAIL$Nie można zbudować, jeśli w układzie istnieje budynek §Yprzyciągania burzy§!"
 TOO_IMPERIAL: "Ma frakcję imperialistyczną"
 executive: "$job_executive$"
 noble: "$job_noble$"
 merchant: "$job_merchant$"
 head_researcher: "$job_head_researcher$"
 high_priest: "$job_high_priest$"
 technophant: "$job_technophant$"
 warden: "$job_warden$"
 noble_researcher: "$job_noble_researcher$"
 job_noble_researcher: "Naukowiec arystokrata"
 job_noble_researcher_plural: "Naukowcy arystokraci"
 job_noble_researcher_desc: "Najmędrsi i najbardziej szlachetnie urodzeni kształcą się zarówno w etykiecie, jak i metodzie naukowej, by lepiej móc wyjaśniać swoją supremacyjną pozycję."
 sacred_noble: "$job_sacred_noble$"
 job_sacred_noble: "Święty arystokrata"
 job_sacred_noble_plural: "Święci arystokraci"
 job_sacred_noble_desc: "Boskość przez dziedziczenie to jedyna słuszna droga. Dziedziczenie przez boskość to sposób działania. Tak oto zostaliśmy pobłogosławieni szlachectwem."
 augmentation_merchant: "$job_augmentation_merchant$"
 job_augmentation_merchant: "Handlarz modyfikacji"
 job_augmentation_merchant_plural: "Handlarze modyfikacji"
 job_augmentation_merchant_desc: "Kto może poprowadzić nasze imperium, jeśli nie osoby, które oferują samodoskonalenie w tak przystępnych cenach i z rozszerzoną gwarancją."
 visionary: "$job_visionary$"
 job_visionary: "Wizjoner technologiczny"
 job_visionary_plural: "Wizjonerzy technologiczni"
 job_visionary_desc: "Nieskrępowani precedensami i pokorą, ci marzyciele przemieniają śmiałe przemyślenia w rynkową rzeczywistość. Dla prawdziwego wizjonera postęp to nie tylko zasada, lecz produkt."
 noble_merchant: "$job_noble_merchant$"
 job_noble_merchant: "Patrycjusz"
 job_noble_merchant_plural: "Patrycjusze"
 job_noble_merchant_desc: "Prawo do rządów determinowane jest nie dziedzictwem, lecz miarą czyjejś wartości. A jak określić czyjąś wartość lepiej niż sumą wartości jego dobytku?"
