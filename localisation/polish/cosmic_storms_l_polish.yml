 resolution_cosmic_storms_galactic_emergency_relief_tooltip: "Odblokowanie §Yfunduszu nadzwyczajnego§!, który wymaga od wszystkich podmiotów, z których składa się [global_event_country.GetCommunityOrImperium], wpłacania §R5%§! ich produkcji $r_energy$.\n\nKażdy członek takiego ciała, na którego oddziałuje §Y$default_storm$§!, otrzyma §G+3§! $r_energy$ za każdy poszkodowany układ co miesiąc.\n\n$storm_tech_cost$ §R+30%§!"
