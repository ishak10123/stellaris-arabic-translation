 cstorms.2000.name: "Przygotowania do burzy"
 cstorms.2000.desc_common_1: "§H[target.solar_system.GetName]§!: zajęliśmy pozycje i jesteśmy gotowi, by rozpocząć niezbędne przygotowania, aby mogła powstać §Y$default_storm$§!.\n\nPrzeładowując tymczasowo gwiazdę [target.GetName], możemy stworzyć idealne warunki do przeprowadzania pożądanej reakcji astrometeorologicznej."
 cstorms.2000.desc_tech: "\nUżywając zaawansowanych metod manipulacji energią, możemy przesycić gwiazdę [target.GetName] nieprzetworzonymi materiałami, by utworzyć bardziej złożoną strukturalnie burzę."
 cstorms.2000.desc_common_2: "\n[owner.GetName]: to przedsięwzięcie zajmie dużo czasu, lecz jego rezultat będzie dla nas dużym osiągnięciem. Struktura gwiazdy po ukończeniu operacji pozostanie niezmienna."
