 #Modifiers for Stormfall event chain
 cs_storm_chasers_storm_fruition: "Owoce burzy"
 cs_storm_chasers_storm_fruition_desc: "Przebudzenie własnej burzy kosmicznej napędziło nasz lud na wiele lat."
 cs_storm_chasers_storm_fruition_gestalt: "$cs_storm_chasers_storm_fruition$"
 cs_storm_chasers_storm_fruition_gestalt_desc: "Przebudzenie własnej burzy kosmicznej napędziło naszą świadomość na wiele lat."
 cs_storm_chasers_homeworld_storm_attraction: "Ekstremalna pogoda"
 cs_storm_chasers_homeworld_storm_attraction_desc: "Nieustanne burze szalejące na tej planecie zmusiły tutejsze organizmy do podążania jedną z dwóch dróg: jedne szukają schronienia przed chaosem, a inne uwielbiają nawałnice."
 cs_storm_chasers_homeworld_storm_attraction_tt: "Intensywność przyciągania (§Y$default_storm$§!): §Pniska§!"
 #Special project
 PROJECT_TEMPEST_BREWING: "Nawałnica narasta"
 PROJECT_TEMPEST_BREWING_DESC: "Ten niepowtarzalny układ burzowy na świecie [Owner.Capital.GetName] posiada specjalne właściwości, dzięki którym jest gotowy do modulacji. Ale najpierw musimy lepiej zrozumieć jego podstawowy skład. Kto wie, jak cudowną osobliwość możemy ożywić?"
 #Events
 cstorms.3100.name: "Burza"
 cstorms.3100.desc: "Burze, które naturalnie występują na świecie §Y[owner.capital_scope.GetName]§!, pokazały nam zadziwiającą potęgę natury: zarówno w postaci nieokiełznanych nawałnic, jak i odbudowy ze spowodowanych przez nie zniszczeń.\n\nNiedawno stacje pogodowe na całej planecie wykryły niesamowite zjawisko: sieć superburz, która przetoczy się po całym globie.\n\nNasi [Root.Owner.GetScientistPlural] nazywają to \"sprawiedliwie przypadkowym odkryciem\". Te rzadko występujące nawałnice tworzą doskonałe warunki do obserwacji prawdziwych skrajności."
 cstorms.3100.a: "Bierzcie sprzęt!"
 cstorms.3105.name: "Nawałnica narasta"
 cstorms.3105.desc: "Nasi [Root.Owner.GetScientistPlural] odkryli tajemnicę manipulacji burzami. Prognozy natężenia burzy wychodzą poza skalę, wszyscy na to czekaliśmy. Przejdziemy próbę i pokażemy, że nikt nie jest godniejszy od nas.\n\nBudynki specjalne mogą służyć za centra koordynacji tworzących się burz. Budynek znajdujący się na świecie §Y[owner.capital_scope.GetName]§!, który zwiększa przyciąganie burz, przyspieszy nasze postępy w przywołaniu najpotężniejszej z burz."
 cstorms.3105.a: "Miodzio."
 cstorms.3105.a.tt: "§YBudynek przyciągania burzy§! na planecie stołecznej:\n$situation_speed_tt$: §G+10%§!A §Y$sm_storm_attraction_computer$§! w stacji w układzie stołecznym:\n$situation_speed_tt$: §G+10%§!\n\n\n\n"
 cstorms.3110.name: "Nadejście"
 cstorms.3110.desc.outro: "Wprowadzając energię do naturalnych burz, możemy wytworzyć warunki dla powstania burz elektrycznych.\n\nManipulacja rdzeniem planety może spowodować reorientację pola magnetycznego świata [owner.capital_scope.GetName], co może zapoczątkować burze magnetyczne.\n\nI wreszcie, poprzez odwrócenie polaryzacji tachionów w określonych rejonach globu, zmiany pola mogą wywołać burze grawitacyjne."
 cstorms.3110.desc.regular: "Odkryliśmy, w jaki sposób wywoływać burzowe wibracje na świecie [owner.capital_scope.GetName] i tworzyć z nich najpotężniejsze zjawisko. Pozostaje jedynie określić, który rodzaj burzy jest najwspanialszy.\n\n$cstorms.3110.desc.outro$"
 cstorms.3110.desc.hive: "Odkryliśmy, w jaki sposób wywoływać burzowe wibracje na świecie [owner.capital_scope.GetName] i tworzyć z nich najpotężniejsze zjawisko. Musimy jeszcze określić, który rodzaj burzy jest najwspanialszy.\n\n$cstorms.3110.desc.outro$"
 cstorms.3110.desc.machine: "Odkryliśmy, w jaki sposób wywoływać burzowe wibracje na świecie [owner.capital_scope.GetName] i tworzyć z nich najpotężniejsze zjawisko. Jednak nasze procesy oceny wartości weszły w rekurencyjne pętle, gdy próbowaliśmy określić, który rodzaj burzy jest najwspanialszy.\n\n$cstorms.3110.desc.outro$"
 cstorms.3110.a: "Naładujcie chmury."
 cstorms.3110.a.tt: "Niech narodzi się §Y$electric_storm$§!."
 cstorms.3110.b: "Wpłyńcie na pole magnetyczne rdzenia."
 cstorms.3110.b.tt: "Niech narodzi się §Y$magnetic_storm$§!."
 cstorms.3110.c: "Stwórzcie fale grawitacyjne."
 cstorms.3110.c.tt: "Niech narodzi się §Y$gravity_storm$§!."
 cstorms.3130.name: "Ruszajcie"
 cstorms.3130.desc.electric: "Z nieba dobywa się huk. Błyskawice uderzają wokół nas!\n\nTe potężne wyładowania nie tylko naelektryzowały powierzchnię planety, ale sprawiły też, że jesteśmy naprawdę pobudzeni! Rolnictwo ucierpi przez burze elektryczne, jednak niezaprzeczalnie zyskaliśmy potencjał do wytwarzania energii."
 cstorms.3130.desc.magnetic: "Kompasy szaleją, gdy zakrzywia się pole magnetyczne świata [owner.capital_scope.GetName].\n\nPrzewiercając skorupę naszego świata macierzystego, mogliśmy wtłoczyć namagnesowaną materię bezpośrednio do rdzenia, a naturalne burze wzmocniły wywołane fluktuacje pola. Utrudni to produkcję energii, ale zwiększy możliwości wykrywania złóż minerałów."
 cstorms.3130.desc.gravity: "Zwykłe poruszanie się nigdy dotąd nie było tak wyczerpujące! Grawitacja rośnie i zmniejsza się w mgnieniu oka.\n\nPlacówki manipulowania cząstkami rozsiane po świecie [owner.capital_scope.GetName] odwróciły polaryzację tachionów i skupiły je w kule energii. Obiekty te szybko zniknęły, a [Root.Owner.GetScientistPlural] uważają, że cofnęły się w czasie, natomiast fale grawitacyjne rozeszły się we wszystkich kierunkach.\n\nPowstałe fluktuacje utrudnią pracę na powierzchni planety, ale mogą ułatwić działanie na stacjach orbitalnych."
 cstorms.3130.a: "Niezła jazda."
 cstorms.3130.a.tt.regular: "W czasie burzy planetarnej:\n$MOD_POP_HAPPINESS$: §G+20%§!"
 cstorms.3130.a.tt.gestalt: "W czasie burzy planetarnej:\n$mod_country_unity_produces_mult$: §G+5%§!"
 cstorms.3140.name: "Dobre wibracje"
 cstorms.3140.desc.intro: "Nasi [Root.Owner.GetScientistPlural] są przekonani, że idee, które wykorzystaliśmy do wzbudzania burz planetarnych, można wykorzystać w o wiele większej skali, skoro cały układ tętni energią nawałnic."
 cstorms.3140.desc.electric: "$cstorms.3140.desc.intro$\n\nMożemy wykorzystać posiadaną wiedzę oraz infrastrukturę, żeby powstała $electric_storm$, albo też stworzyć coś całkowicie nowego i ekscytującego.\n\nWykorzystanie pewnych minerałów wzmocni rezonans magnetyczny burzy, a zastosowanie stopów przekształci burzę w studnię grawitacyjną."
 cstorms.3140.desc.magnetic: "$cstorms.3140.desc.intro$\n\nMożemy wykorzystać posiadaną wiedzę oraz infrastrukturę, żeby powstała $magnetic_storm$, albo też stworzyć coś całkowicie nowego i ekscytującego.\n\nNaładowanie naszego słońca wzmocni potencjał elektryczny burzy, a zastosowanie stopów przekształci burzę w studnię grawitacyjną."
 cstorms.3140.desc.gravity: "$cstorms.3140.desc.intro$\n\nMożemy wykorzystać posiadaną wiedzę oraz infrastrukturę, żeby powstała $gravity_storm$, albo też stworzyć coś całkowicie nowego i ekscytującego.\n\nWykorzystanie pewnych minerałów wzmocni rezonans magnetyczny burzy, a naładowanie naszego słońca spotęguje jej potencjał elektryczny."
 cstorms.3140.a: "Naładujcie słońce."
 cstorms.3140.a.tt: "Niech powstanie kosmiczna §Y$electric_storm$§!.\nPrzez §Y2§! lata:$TABBED_NEW_LINE$$mod_country_energy_produces_mult$ : §R-50%§!$TABBED_NEW_LINE$$mod_country_unity_produces_mult$ : §G+20%§!"
 cstorms.3140.a.infra: "Wykorzystajmy istniejącą infrastrukturę."
 cstorms.3140.a.tt.electric: "Niech powstanie kosmiczna §Y$electric_storm$§!.\nPrzez §Y2§! lata:$TABBED_NEW_LINE$$mod_country_unity_produces_mult$ : §G+5%§!"
 cstorms.3140.b: "Wykorzystajmy namagnetyzowane minerały."
 cstorms.3140.b.tt: "Niech powstanie kosmiczna §Y$magnetic_storm$§!.\nPrzez §Y2§! lata:$TABBED_NEW_LINE$$mod_country_minerals_produces_mult$ : §R-50%§!$TABBED_NEW_LINE$$mod_country_unity_produces_mult$ : §G+20%§!"
 cstorms.3140.b.tt.magnetic: "Niech powstanie kosmiczna §Y$magnetic_storm$§!.\nPrzez §Y2§! lata:$TABBED_NEW_LINE$$mod_country_unity_produces_mult$ : §G+5%§!"
 cstorms.3140.c: "Wykorzystajmy specjalne stopy."
 cstorms.3140.c.tt: "Niech powstanie kosmiczna §Y$gravity_storm$§!.\nPrzez §Y2§! lata:$TABBED_NEW_LINE$$mod_country_alloys_produces_mult$ : §R-25%§!$TABBED_NEW_LINE$$mod_country_unity_produces_mult$ : §G+20%§!"
 cstorms.3140.c.tt.gravity: "Niech powstanie kosmiczna §Y$gravity_storm$§!.\nPrzez §Y2§! lata:$TABBED_NEW_LINE$$mod_country_unity_produces_mult$ : §G+5%§!"
 cstorms.3160.name: "Po burzy"
 cstorms.3160.desc: "Kiedy burza planetarna minęła, na świecie [owner.capital_scope.GetName] pojawił się nowy, trwały element. Nawałnica ponownie doprowadziła do zmiany i kolejnych narodzin.\n\nTo lokalne zjawisko było potężne, więc możemy sobie tylko wyobrażać, jaki potencjał drzemie w prawdziwej kosmicznej burzy. Dlaczego to tak długo trwa?"
 cstorms.3160.a: "Co za pamięć!"
 cstorms.3160.a.tt.electric: "Po przejściu burzy przez świat [owner.capital_scope.GetName] pozostały naelektryzowane §Y$d_buzzing_plains$§!."
 cstorms.3160.a.tt.magnetic: "Po przejściu burzy przez świat [owner.capital_scope.GetName] pozostał nowy §Y$d_geothermal_vent$§!."
 cstorms.3160.a.tt.gravity: "Po przejściu burzy przez świat [owner.capital_scope.GetName] została znaleziona§Y$d_rich_mountain$§!."
 cstorms.3170.name: "Kosmiczne kształty"
 cstorms.3170.desc.intro: "Możemy przyspieszyć pojawienie się potężnej kosmicznej burzy w okolicach świata [owner.capital_scope.GetStarName], ale trzeba zadać sobie pytanie: czy naprawdę jesteśmy na to gotowi?\n\n"
 cstorms.3170.desc.scientist.snippet: "Schemat działania wczesnej kosmicznej burzy mogą zbadać nasi [Root.Owner.GetScientistPlural], którymi kieruje §Y[event_target:storm_scientist.GetName]§!. Być może znajdą optymalny sposób na manipulowanie powstawaniem tych zjawisk.\n\n"
 cstorms.3170.desc.commander.snippet: "Jeżeli wyślemy wojska, na których czele stanie §Y[event_target:storm_commander.GetName]§!, być może przebiją się przez powstającą burzę i uwolnią kaskadę energii.\n\n"
 cstorms.3170.desc.outro: "Ten zespół z przywódcą może nie wrócić. Z drugiej strony, mógłby dokonać czegoś niesamowitego!"
 cstorms.3170.desc.both: "$cstorms.3170.desc.intro$$cstorms.3170.desc.scientist.snippet$$cstorms.3170.desc.commander.snippet$$cstorms.3170.desc.outro$"
 cstorms.3170.desc.scientist: "$cstorms.3170.desc.intro$$cstorms.3170.desc.scientist.snippet$$cstorms.3170.desc.outro$"
 cstorms.3170.desc.commander: "$cstorms.3170.desc.intro$$cstorms.3170.desc.commander.snippet$$cstorms.3170.desc.outro$"
 cstorms.3170.desc.none: "Pozostaje tylko czekać na pojawienie się burzy kosmicznej.\n\nOczekiwanie jest nie do zniesienia, ale dzięki temu osiągnięcie będzie smakowało jeszcze lepiej."
 cstorms.3170.a: "Niech zajmą się tym [Root.Owner.GetScientistPlural]."
 cstorms.3170.a.tt: "Naukowiec §Y[event_target:storm_scientist.GetName]§! zagubił się i może umrzeć."
 cstorms.3170.b: "Niech wojsko rusza."
 cstorms.3170.b.tt: "Dowódca §Y[event_target:storm_commander.GetName]§! zagubił się i może umrzeć."
 cstorms.3170.c: "Bądźmy ostrożni i zaczekajmy."
 cstorms.3190.name: "Pierwsza z wielu"
 cstorms.3190.desc.intro: "Zaczęło się od zmarszczki w strukturze kosmosu. Tańca energii, które zderzyły się i połączyły. Odrobina egzotycznych cząstek, szczypta masy, a na koniec nowo narodzona burza krążąca wokół naszej gwiazdy przyspieszyły powstanie bestii, którą obserwujemy.\n\nTen ukształtowany wedle naszych zachcianek dar natury i talentu dominuje na niebie."
 cstorms.3190.desc.success: "$cstorms.3190.desc.intro$ Nasz przywódca, przebiwszy się przez burzę, wzbudził ogromne emocje.\n\nUdało się. Sami tego dokonaliśmy. Wlećmy w tę burzę i przeżyjmy coś wyjątkowego!"
 cstorms.3190.desc.failure: "$cstorms.3190.desc.intro$ Nasz przywódca zaginął w burzy, ale odszedł w wielkim stylu!\n\nUdało się. Sami tego dokonaliśmy. Wlećmy w tę burzę i przeżyjmy coś wyjątkowego!"
 cstorms.3190.desc.wait: "$cstorms.3190.desc.intro$ Długo na to czekaliśmy, ale w końcu nadszedł ten dzień.\n\nUdało się. Sami tego dokonaliśmy. Wlećmy w tę burzę i przeżyjmy coś wyjątkowego!"
 cstorms.3190.a.success: "Jazda!"
 cstorms.3190.a.failure: "Patrzcie!"
 cstorms.3190.a.failure.tt: "\nNasz przywódca odszedł w blasku chwały."
 cstorms.3190.a.wait: "Czystość!"
 ### Storm Fever ###
 #Modifiers for Storm Fever event chain
 cs_storm_chasers_bad_vibes: "Złe wibracje"
 cs_storm_chasers_bad_vibes_desc: "Odczuwamy nagły przypływ znudzenia."
 cstorms.3205.name: "Dla furii"
 cstorms.3205.normal: "Kosmiczne wibracje dziwnie się zachowują, a zwyczajne wyczyny nie wywołują już takich emocji jak kiedyś. Niewątpliwie dokonaliśmy wielkich rzeczy, ale czujemy, że czegoś nam brakuje. Osiągnięcia naszych przodków, legendarne pod względem skali oraz ambicji, rzucają długi cień.\n\n\"To czysto egzystencjalne zmagania!”, jak napisał niedawno jeden z naszych największych umysłów. \"Czy przemierzając pustkę, otworzyliśmy pustkę w nas samych?\".\n\nTa obawa jest realna, czas działać. Żeby zacząć od nowa, wrócimy do początku: do serii wyzwań zaprojektowanych tak, aby maksymalnie podnieść poziom adrenaliny!"
 cstorms.3205.gestalt: "Kosmiczne wibracje dziwnie się zachowują, a zwyczajne wyczyny nie wywołują już takich emocji jak kiedyś. Niewątpliwie dokonaliśmy wielkich rzeczy, ale czujemy, że czegoś nam brakuje.\n\nDręczą nas pytania: czy wiemy, kim naprawdę jesteśmy? Czy dni naszej chwały przeminęły? Jako kolektyw jesteśmy odpowiedzialni za stanie się najdoskonalszymi wersjami siebie.\n\nTa obawa jest realna, czas działać. Żeby zacząć od nowa, wrócimy do początku: do serii wyzwań zaprojektowanych tak, aby maksymalnie podnieść poziom adrenaliny!"
 cstorms.3205.a: "To dopiero początek emocji."
 cstorms.3205.tooltip: "Odszukajcie wyzwania z przeszłości w rejestrze sytuacyjnym."
 cstorms.3215.name: "Gorączka pokonana"
 cstorms.3215.intro: "Udało się!\n\nObraliśmy na cel pogoń za ekscytacją i pokonaliśmy każde wyzwanie. Zobaczcie, co osiągnęliśmy przez ostatnie lata!"
 cstorms.3215.desc: "$cstorms.3215.intro$\n\nTak jak najdoskonalsi pionierzy naszego świata macierzystego, pokonujemy własne ograniczenia.\n\nTo nie wszystko – dzięki obcowaniu z furią natury zdobyliśmy niesamowitą wiedzę o sensie naszego istnienia."
 cstorms.3215.a: "Wracamy w chwale!"
 ### Storm Frenzy ###
 cs_storm_chasers_storm_frenzy_1: "Szaleństwo burzy"
 cs_storm_chasers_storm_frenzy_1_desc: "Nadejście Wielkiej Nawałnicy utrzymuje nas w rozgorączkowaniu."
 cs_storm_chasers_storm_frenzy_2: "$cs_storm_chasers_storm_frenzy_1$"
 cs_storm_chasers_storm_frenzy_2_desc: "$cs_storm_chasers_storm_frenzy_1_desc$"
 cs_storm_chasers_storm_frenzy_3: "$cs_storm_chasers_storm_frenzy_1$"
 cs_storm_chasers_storm_frenzy_3_desc: "$cs_storm_chasers_storm_frenzy_1_desc$"
 cs_storm_chasers_storm_frenzy_1_gestalt: "$cs_storm_chasers_storm_frenzy_1$"
 cs_storm_chasers_storm_frenzy_1_gestalt_desc: "Nadejście Wielkiej Nawałnicy rozpala naszą świadomość."
 cs_storm_chasers_storm_frenzy_2_gestalt: "$cs_storm_chasers_storm_frenzy_1$"
 cs_storm_chasers_storm_frenzy_2_gestalt_desc: "$cs_storm_chasers_storm_frenzy_1_gestalt_desc$"
 cs_storm_chasers_storm_frenzy_3_gestalt: "$cs_storm_chasers_storm_frenzy_1$"
 cs_storm_chasers_storm_frenzy_3_gestalt_desc: "$cs_storm_chasers_storm_frenzy_1_gestalt_desc$"
 cs_storm_chasers_the_code: "Kodeks"
 cs_storm_chasers_the_code_desc: "Nie motywuje nas chęć dominacji ani materialnego zysku. Żyjemy, by testować własne ograniczenia, niczym apostołowie najnowocześniejszej egzystencji."
 cs_storm_chasers_the_code_gestalt: "Kodeks"
 cs_storm_chasers_the_code_gestalt_desc: "$cs_storm_chasers_the_code_desc$"
 every_empire_opinion_hit: "§Y[global_event_country.GetGalCommunityOrGalImperium]§! zmienia swoją opinię o nas o:"
 nexus_opinion_first_hit: "Niepokój węzłów"
 nexus_opinion_first_hit_tt: "$every_empire_opinion_hit$ §R$@first_hit_opinion_change$§!"
 nexus_opinion_second_hit: "Konsternacja węzłów"
 nexus_opinion_second_hit_tt: "$every_empire_opinion_hit$ §R$@second_hit_opinion_change$§!"
 nexus_opinion_third_hit: "Lęk węzłów"
 nexus_opinion_third_hit_tt: "$every_empire_opinion_hit$ §R$@third_hit_opinion_change$§!"
 nexus_opinion_summon_hit: "Gniew węzłów"
 nexus_opinion_summon_hit_tt: "$every_empire_opinion_hit$ §R$@nexus_hit_opinion_change$§!"
 nexus_opinion_the_code: "Pojednanie węzłów"
 cs_stormfrenzy_chain_title: "Szaleństwo burzy"
 cs_stormfrenzy_chain_desc: "Od zawsze przesuwamy granice. Zainspirowani dokonaniami przodków mamy teraz możliwość na ukształtowanie burzy naszych marzeń."
 cstorms.3220.name: "Kredo Dążącego"
 cstorms.3220.desc: "Nasza rasa nigdy nie przestanie poszukiwać ekscytacji. Każdego dnia odkrywamy niesamowite sytuacje i mierzymy się z coraz to większymi wyzwaniami, lecz [ruler.GetRegnalName] uważa, że możemy posunąć się jeszcze dalej:\n\n\"W sercu burzy kosmicznej drzemie czysty potencjał, ostateczna przewaga technologiczna, która pozwoli znieść status quo i wzbudzić niezaznane dotąd emocje\".\n\nNadszedł czas, by sprowokować burzę epickiego rozmiaru, serce radosnego pandemonium: Wielką Nawałnicę. Musimy rozważyć jeszcze dwie kwestie: Jak wywołać idealną burzę i jak zareaguje reszta galaktyki, jeśli zdecydujemy się to zrobić.\n\nStworzenie czegoś takiego na pewno wywoła oburzenie."
 PROJECT_SOW_THE_BIG_ONE: "Zachęta dla Wielkiej Nawałnicy"
 PROJECT_SOW_THE_BIG_ONE_DESC: "Posiadamy odpowiednią technologię, lecz bez narastającej burzy w pobliżu musimy znaleźć sposób na wzniecenie jej, by móc ją kształtować."
 cstorms.3222.name: "Uprawa ciemnej materii"
 cstorms.3222.desc: "Dzięki swoim unikalnym właściwościom ciemna materia doskonale nadaje się do rozpętania Wielkiej Nawałnicy. Wtłoczymy ten ulotny materiał do przestrzennej struktury otaczającej nasz układ stołeczny i zaczekamy na pojawienie się pierwszych oznak burzy.\n\nTe działania przyciągnęły już jednak niechcianą uwagę: nasi sąsiedzi zaczynają protestować. \"Nie wszyscy są tak podekscytowani jak my na ujeżdżanie tej konkretnej fali\", skarżą się nasi [Root.Owner.GetScientistPlural]."
 cstorms.3222.a: "Czas zaczynać."
 cstorms.3222.b: "Musimy odłożyć nieco zasobów."
 PROJECT_DARK_SEEDING: "Egzotyczne pokusy"
 PROJECT_DARK_SEEDING_DESC: "Po ostrożnym wstrzyknięciu ciemnej materii w strukturę przestrzenną w układzie zostanie wywołana podatna na manipulacje burza."
 cstorms.3224.name: "Nadejście Wielkiej Nawałnicy"
 cstorms.3224.desc: "Niesamowite! Narastające wibracje nadciągającej burzy są już odczuwalne. Nasi [Root.Owner.GetScientistPlural] wciąż się trudzą, lecz jesteśmy o krok bliżej do przywołania Wielkiej Nawałnicy.\n\nNasi sąsiedzi są jednak mniej zadowoleni. Twierdzą, że ingerujemy w siły, których nie jesteśmy w stanie pojąć, co wpływa na nasze stosunki."
 cstorms.3224.a: "Jest jak jest."
 cstorms.3225.name: "Pokarm dla Wielkiej Nawałnicy"
 cstorms.3225.desc: "Dane są jasne: jeśli nakarmimy burzę jakimś materiałem, odda nam coś podobnego. To znaczy, że jeśli poślemy w nią właściwe zasoby, przyjmie cechy - i gigantyczne rozmiary - burzy każdego rodzaju naraz.\n\nMieszkańcy galaktyki wciąż wyrażają zaniepokojenie, lecz przejażdżka stulecia już czeka, by się narodzić. Nakarmmy ją wszystkim, co mamy!"
 cstorms.3225.a: "Nakarmić burzę!"
 cstorms.3225.b: "Przyda nam się więcej zasobów."
 cstorms.3226.name: "Ostateczna uczta"
 cstorms.3226.desc: "Musimy dostarczyć rosnącej burzy różnorodne pożywienie, jeśli chcemy stworzyć zjawisko epickich rozmiarów. To niesamowite osiągnięcie wymaga określonych próbek zasobów, którymi dysponujemy."
 PROJECT_EVERY_ITEM_ON_THE_MENU: "Coś spoza menu"
 PROJECT_EVERY_ITEM_ON_THE_MENU_DESC: "Wiemy już, że burzę kosmiczną można modyfikować przy pomocy odpowiedniej diety. Aby nakarmić tę, potrzebujemy konkretnych próbek."
 PROJECT_EVERY_ITEM_ON_THE_MENU_REPEAT: "Powtórzenie: $cstorms.3225.name$"
 PROJECT_EVERY_ITEM_ON_THE_MENU_REPEAT_DESC: "Stworzenie burzy doskonałej będzie wymagało ostrożnie dobranych próbek zasobów."
 cstorms.3227.name: "Ostateczny krok"
 cstorms.3227.desc: "Ekscytacja jest wręcz namacalna. Ścieżka przed nami rysuje się jasno: przedzierać się naprzód, agresywnie i stanowczo. Zjednoczmy się z kosmiczną gorączką! Wszystko jest już gotowe na nadejście Wielkiej Nawałnicy. Musimy tylko zrobić ostatni krok.\n\nNasi sąsiedzi są już rozwścieczeni do granic i twierdzą, że $nexus_storm$ spustoszy galaktykę. Lecz czy pozwolimy tym nudziarzom zniweczyć projekt tak epickich rozmiarów? Nadszedł czas decyzji."
 cstorms.3227.a: "Wielka Nawałnica to nasze przeznaczenie!"
 cstorms.3227.a.tt: "$nexus_storm$ przybędzie za 40 dni.\n$nexus_opinion_third_hit_tt$"
 cstorms.3227.b: "Nie, nie posuniemy się do tego!"
 cstorms.3227.b.tt: "Przerwano projekt: $nexus_storm$.\n§Y[global_event_country.GetGalCommunityOrGalImperium]§! będzie mieć o nas lepsze zdanie za 40 dni."
 cstorms.3230.name: "Początek Wielkiej Nawałnicy"
 cstorms.3230.desc: "Oto stoimy u progu nowego doświadczenia. Nadszedł dzień ostatecznego kataklizmu. Nie ma zagrożenia, z którym nie zmierzyliby się nasi jeźdźcy burz. Nie ma wyzwania, którego by nie przyjęli.\n\nNiech galaktyka będzie im świadkiem!"
 cstorms.3230.a: "Do dzieła."
 has_spawned_nexus_storm_tt: "$TRIGGER_FAIL$Wyzwolono: §Y$nexus_storm$§!"
 cstorms.3235.name: "Kodeks burzy"
 cstorms.3235.desc: "Dużo się nauczyliśmy. Rozumiemy już, że galaktyka nie jest zabawką, lecz przygodą, którą należy przeżyć.\n\nJak mówi [ruler.GetRegnalName]: \"W tym życiu nie brakuje ekscytacji. Nigdy nie przestaniemy dążyć do kolejnego wyzwania, lecz musimy czynić to z szacunkiem. Oto nasz wybór. Oto, kim naprawdę musimy się stać\"."
 cstorms.3235.a: "Zachować spokój!"
 cstorms.3235.a.tt: "$every_empire_opinion_hit$ §G+$@the_code_total_change$§!"
 #Storm Fever Challenges
 cs_stormfever_chain_title: "Burzowa gorączka"
 cs_stormfever_chain_desc: "Aby osiągnąć nowe wyżyny, zaznać radości i sprawdzić własne ograniczenia, wyruszamy, by poddać się serii prób. Niechaj zacznie się zabawa!"
 challenges_completed: "Wyzwania ukończone"
 MISSION_CS_STORM_FEVER_CHALLENGE_1: "Pokonaj flotę wewnątrz burzy"
 MISSION_CS_STORM_FEVER_CHALLENGE_1_DESC: "Bitewny zgiełk od zawsze jest poligonem doświadczalnym. Wyobraźmy go sobie w sercu szalejącej burzy kosmicznej! Pokażmy galaktyce naszą prawdziwą dzikość.\n\nAktualne wyzwanie polega na pokonaniu floty wroga wewnątrz burzy."
 fleets_defeated_in_storm: "Floty pokonane wewnątrz burzy"
 MISSION_CS_STORM_FEVER_CHALLENGE_2: "Zbadaj skraj galaktyki"
 MISSION_CS_STORM_FEVER_CHALLENGE_2_DESC: "Wyruszyć poza granice własnego terytorium, balansować na krawędzi gwiazd, szukać najdalszych krańców kosmosu – czyż jest coś bardziej pobudzającego?\n\nMusimy wysłać statek badawczy do wyznaczonego układu – w jakikolwiek możliwy sposób."
 far_edge_explored: "Daleki skraj zbadany"
 MISSION_CS_STORM_FEVER_CHALLENGE_3: "Okiełznaj burzę"
 MISSION_CS_STORM_FEVER_CHALLENGE_3_DESC: "Najlepsi z najlepszych pragną ekscytacji burzą. Niech wyruszą i poczują zew życia!\n\nNaszym kolejnym wyzwaniem jest pomóc jeźdźcy burz nawigować pośród burzy kosmicznej przez ponad 180 dni."
 days_storm_rider_spend_in_storm: "Dni spędzone pośród burzy"
 MISSION_CS_STORM_FEVER_CHALLENGE_4: "Zbadaj zakopane tajemnice"
 MISSION_CS_STORM_FEVER_CHALLENGE_4_DESC: "Galaktyka pełna zakopanych skarbów i pradawnych sekretów - i nieposkromiony wicher, który nimi wszystkimi wstrząśnie! Wyruszmy na poszukiwania.\n\nZmierzmy się z wyzwaniem zbadania anomalii lub stanowiska archeologicznego odsłoniętego przez burzę."
 storm_unraveled_event_investigated: "Zbadano anomalie lub wykopaliska"
 MISSION_CS_STORM_FEVER_CHALLENGE_5: "Dziel się radością"
 MISSION_CS_STORM_FEVER_CHALLENGE_5_DESC: "Dlaczego tylko my mamy brać udział w zabawie? Przygody są zawsze lepsze w towarzystwie.\n\nKolejnym wyzwaniem jest skierowanie burzy kosmicznej w kierunku naszych sąsiadów, aby nie poczuli się wykluczeni."
 send_storm_to_other_empire: "Burze posłane do innych imperiów"
 MISSION_CS_STORM_FEVER_CHALLENGE_6: "Poddaj się nawałnicy"
 MISSION_CS_STORM_FEVER_CHALLENGE_6_DESC: "Starzenie się i przemijanie nie są w naszym stylu. Lepiej jest spłonąć w blasku chwały!\n\nKolejne wyzwanie wymaga, aby jeździec burz doświadczył ostatnich chwil pośród burzy kosmicznej."
 rider_died_in_storm: "Jeźdźcy burz zabici lub zaginieni w burzach"
 #Challenge completed intro
 challenge_completed_intro: "Osiągnięto nowe wyżyny i pokonano ograniczenia! Właśnie te rzeczy wywołują odpowiednie emocje. Ukończyliśmy próbę!"
 #Challenge 1 completed
 challenge_completed: "Wyzwanie ukończone"
 cstorms.305.name: "$challenge_completed$ $MISSION_CS_STORM_FEVER_CHALLENGE_1$"
 cstorms.305.desc: "$challenge_completed_intro$\n\nTa flota nie miała żadnych szans w walce. Kto odważy się rzucić nam wyzwanie?"
 cstorms.305.a: "Wspaniałe uczucie!"
 #Challenge 2 completed
 cstorms.310.name: "$challenge_completed$ $MISSION_CS_STORM_FEVER_CHALLENGE_2$"
 cstorms.310.desc: "$challenge_completed_intro$\n\nGalaktyka ma tak wiele do zaoferowania! Nigdy nie jest nudno i nie ma sensu się teraz zatrzymywać. Dalej, ku następnemu wyzwaniu!"
 cstorms.310.a: "Słusznie!"
 #Challenge 3 completed
 cstorms.315.name: "$challenge_completed$ $MISSION_CS_STORM_FEVER_CHALLENGE_3$"
 cstorms.315.desc.normal: "$challenge_completed_intro$\n\nRaport naszego jeźdźcy burz wyraża wyłącznie okrzyki radości. Burze kosmiczne to zupełnie nowy poziom ekscytacji!"
 cstorms.315.desc.gestalt: "$challenge_completed_intro$\n\nPrzepełnia nas euforia. Burze kosmiczne wywołują podekscytowanie na zupełnie nowym poziomie."
 cstorms.315.a: "Ani chwili nudy!"
 #Challenge 4 completed
 cstorms.320.name: "$challenge_completed$ $MISSION_CS_STORM_FEVER_CHALLENGE_4$"
 cstorms.320.desc: "$challenge_completed_intro$\n\nZgłębianie pradawnych tajemnic i wykopywanie skarbów zawsze jest ekscytujące. Kto wie, jakie sekrety czekają, by je odnaleźć?"
 cstorms.320.a: "Nieskończone możliwości!"
 #Challenge 5 completed
 cstorms.325.name: "$challenge_completed$ $MISSION_CS_STORM_FEVER_CHALLENGE_5$"
 cstorms.325.desc: "$challenge_completed_intro$\n\nTa burza przedarła się przez ich przestrzeń, wywołując podekscytowanie i chaos zarazem! Możemy spokojnie uznać, że dostarczyliśmy sąsiadom niesamowitych doświadczeń.\n\nMoże w tej chwili tego nie doceniają, ale kiedyś nam podziękują."
 cstorms.325.a: "Jesteśmy hojni!"
 #Challenge 6 completed
 cstorms.330.name: "$challenge_completed$ $MISSION_CS_STORM_FEVER_CHALLENGE_6$"
 cstorms.330.desc.normal: "$challenge_completed_intro$\n\nWielka burza zawołała po imieniu, a jej zew spotkał się z radością. Jeźdźcze burzy, absolutna legendo! Niech twoja podróż w zaświaty będzie równie epicka, co twe odejście."
 cstorms.330.desc.gestalt: "$challenge_completed_intro$\n\nWielka burza wezwała część z nas do dołączenia do niej w radosnej rzezi. Utrata węzła nigdy nie była tak znacząca i pobudzająca! To niesamowite doświadczenie ukształtuje nasz gatunek na wiele nadchodzących lat."
 cstorms.330.a: "Jazda!"
 cstorms.331.desc.normal: "$challenge_completed_intro$\n\nWielka burza zawołała po imieniu, a jej zew spotkał się z radością. Jeźdźcze burzy, absolutna legendo!"
 cstorms.331.desc.gestalt: "$challenge_completed_intro$\n\nWielka burza wezwała część z nas do dołączenia do niej w radosnej rzezi. Poważna groźba utraty węzła nigdy nie była tak znacząca i pobudzająca! To niesamowite doświadczenie ukształtuje nasz gatunek na wiele nadchodzących lat."
 electric_storm_desc: "Zderzenie pól elektromagnetycznych nasyca tę burzę kosmiczną niemalże niebezpiecznie wysokim ładunkiem elektrycznym. Stanowi to zagrożenie dla osłon, lecz sprzyja produkcji planetarnej."
 particle_storm_desc: "Te burze wydają się niemal żywe. Przemieszczają się wśród struktury galaktyki, nie polując na statki kosmiczne, lecz także ich nie omijając. Są niebezpieczne i niestabilne, a sama ich obecność wystarczy, by zjednoczyć cywilizację przeciwko żywiołom."
 gravity_storm_desc: "Gdy olbrzymie gwiezdne ciała zderzają się ze sobą, grawitacyjne fale rozchodzą się po całej galaktyce. Gdy one z kolei zanikną, rodzi się burza grawitacyjna. Negatywnie wpływa to na okrętowe układy namierzające, a fluktuacje grawitacji zmuszają praktycznie wszystkich do pozostania w domach."
 magnetic_storm_desc: "Gdy wędrujące pasy metalicznych asteroid wchodzą w kontakt z silnym oddziaływaniem grawitacyjnym, wewnątrz tworzą się pola magnetyczne. Tego typu burze rozrywają statki i zakłócają budowę przemysłu, ale za to wspomagają wydobywanie cennych minerałów spod skorupy planety."
 solar_storm_desc: "Zjawisko o nazwie $solar_storm$ tworzy połyskującą fluktuację w obrębie struktury galaktyki. Jego obecność sprawia, że z gwiazd wydobywają się niewidziane dotąd błyski. Wynikające z tego promieniowanie jest niszczycielskie, lecz nadzwyczajnie wzmacnia wydajność stacji kosmicznej, a statkom utrudnia pozostanie niezauważonymi."
 celestial_storm_desc: "Pył z milionów planet nieustannie dryfuje poprzez galaktykę. Te ziarenka gromadzą się czasem w tak dużych ilościach, że tworzą w ten sposób burzę pyłową. Zakłóca ona łączność na całej planecie, ale przyniesione przez nią pierwiastki chemiczne zwiększają produkcję zasobów. Nasi naukowcy twierdzą, że obiekty, które znajdą się w obrębie takiej nawałnicy, można równie dobrze uznać za nieistniejące."
 shroud_storm_desc: "W rzadkich sytuacjach zdarza się, że Woal szepcze poprzez świat fizyczny. Te niespotykane burze sprawiają, że inteligentne istoty doznają wzniosłych i groteskowych zarazem wizji. Ci, którzy obcowali już z Woalem, mogą nawet zaznać niestabilnej synergii."
 nexus_storm_desc: "Przy odpowiednim układzie gwiazd nawet niewielka burza kosmiczna może nadnaturalnie urosnąć. To rzadkie zdarzenie powoduje apokaliptyczną wręcz grozę. Wewnątrz takiej potworności nie ma życia, a jedyną opcją jest przetrwanie."
 FROM_STORM: "Z burzy"
 #Planetary modifiers
 hyper_ecosystem: "Hiperekosystem"
 hyper_ecosystem_desc: "Gleba tej planety zawiera niezwykle wysokie stężenie azotu i fosforu, wchłoniętych ponownie z minerałów, które naturalnie ukształowały się w skorupie. Skutkuje to niespotykanie szybkim wzrostem roślin, który bardzo sprzyja rolnictwu, lecz utrudnia wszelkie projekty budowlane."
 docile_fauna: "Potulna fauna"
 docile_fauna_desc: "Wśród organizmów żyjących na tej planecie i porastających ją roślin brakuje naturalnych drapieżników, co czyni je niezwykle potulnymi i miłymi towarzyszami. Populację kształtują bardziej szkody wyrządzane przez burzę, niż zasada przetrwania najsilniejszych."
 obsidian_lakes: "Obsydianowe jeziora"
 obsidian_lakes_desc: "Z powodu aktywności tektonicznej jeziora magmy wystygły, tworząc olbrzymie połacie obsydianu i zapewniając łatwiejszy dostęp do cennych zasobów z powierzchni."
 obsidian_lakes_volcanic: "$obsidian_lakes$"
 obsidian_lakes_volcanic_desc: "$obsidian_lakes_desc$"
 crimson_crawlers: "Karmazynowe robactwo"
 crimson_crawlers_tt: "§R$COLONIZATION_IMPOSSIBLE_CRIMSON_CRAWLERS$§!"
 crimson_crawlers_desc: "Powierzchnia tej planety przypomina karmazynowy dywan z powodu obecności trylionów maleńkich, czerwonych insektów. Choć tak niesamowicie liczne, wydają się nieszkodliwe i tkwią w wątłej równowadze z ekosystemem planety."
 metal_planet: "Metalowa planeta"
 metal_planet_desc: "Ta planeta jest całkowicie pokryta surowymi, naturalnie występującymi metalami. Brak tam elementów niezbędnych do przeżycia, takich jak woda lub zdatna do oddychania atmosfera, lecz zawiera mnóstwo użytecznych zasobów!"
 terraform_fail_is_metal_planet: "Tej planety nie można terraformować z powodu jej metalicznej skorupy."
 previously_terraformed_planet: "Uprzednio terraformowana planeta"
 previously_terraformed_planet_desc: "Skalisty świat z azotowo-tlenową atmosferą i mnogością oceanów. Istnieją dowody na to, że starsze imperia dotarły do tej planety i skolonizowały ją, lecz obecnie ich już nie ma. Oznacza to wiele od odkrycia i ujawnienia, lecz także fakt, iż planeta ta jest przygotowaną już kandydatką na kolonię!"
 previously_terraformed_planet_tt: "Uprzednie próby terraformowania znacznie ułatwiają przemianę tej planety w świat gajański."
 has_patriotic_institute: "$building_adakkaria_patriotic_institute$"
 has_patriotic_institut_desc: "Ta planeta była niegdyś kolebką adAkkaryjskiego Konwentu adAkkaryjskiego. Jedyne, co pozostało po tej potężnej cywilizacji to $building_adakkaria_patriotic_institute$."
 has_patriotic_institute_tt: "Posiada budynek: $building_adakkaria_patriotic_institute$. Skolonizuj tę planetę, aby posiąść ją na własność."
 adakkaria_patriotic_institute_desc.supercharged: "Szansa co roku na powstanie burzy w układzie kosztem §Y100§! £pop£ §Hpopulacji§!."
 #Planet Modifiers
 crimson_crawlers_sashimi_style: "Karmazynowe robactwo: spożycie na surowo"
 crimson_crawlers_sashimi_style_desc: "Powierzchnia tej planety przypomina karmazynowy dywan z powodu obecności trylionów maleńkich, czerwonych insektów. Nawet konsumowane na surowo są one źródłem wyśmienitego pożywienia."
 crimson_crawlers_bbq_them: "Karmazynowe robactwo: spożycie po obróbce"
 crimson_crawlers_bbq_them_desc: "Powierzchnia tej planety przypomina karmazynowy dywan z powodu obecności trylionów maleńkich, czerwonych insektów. Ludność uwielbia je spożywać po upieczeniu."
 COLONIZATION_IMPOSSIBLE_CRIMSON_CRAWLERS: "§RTej planety nie mogą kolonizować imperia maszyn i ziemiożerców.§!"
 #New planet types modifiers
 collided_planet: "Planeta Zderzenia"
 collided_planet_desc: "Dwie planety zderzyły się ze sobą i splotły, zamiast ulec zniszczeniu. Choć ten świat posiada znacznie zwiększoną powierzchnię, życie i budowanie na nim stwarza unikalne trudności."
 wooden_planet: "Świat drzewny"
 wooden_planet_desc: "Przez tysiące lat skorupa tej planety stała się gęstą warstwą korzeni o grubości kilku kilometrów, tworząc jeden tytaniczny żywy organizm."
 wooden_planet_tt: "Koszt budowy i utrzymania domu wynosi $w_food$.\nKoszt budowy farmy wynosi $w_food$."
 #Eruption Event
 recent_eruption: "Niedawno wystąpiła erupcja"
 eruption_report_tooltip: "\nRaporty zostaną dostarczone w ciągu 30 dni."
 colony_mod.31.name: "Erupcja!"
 colony_mod.31.desc: "[Root.GetName]: aktywność tektoniczna spowodowała pęknięcie warstw obsydianu na jednej z gigantycznych płyt. Lawa rozlewa się po powierzchni, niszcząc ją. Raporty z kolonii są tragiczne."
 colony_mod.31.a: "Wysłuchajmy ich."
 colony_mod.32.name: "Raport o szkodach po erupcji"
 colony_mod.32.desc: "[Root.GetName]: Niedawna erupcja na Obsydianowych Polach, która wstrząsnęła naszą kolonią, okazała się aktywnym wulkanem! Wszystko, co kiedyś tam istniało, jest teraz pogrzebane pod stopioną skałą."
 colony_mod.33.desc: "[Root.GetName]: Niedawna erupcja na Obsydianowych Polach, która wstrząsnęła naszą kolonią, cudem nie spowodowała żadnych szkód. Szczęśliwym trafem roztrzaskała również obsydian, ułatwiając jego zbieranie!"
 colony_mod.34.desc: "[Root.GetName]: Niedawna erupcja na Obsydianowych Polach, która wstrząsnęła naszą kolonią, cudem nie spowodowała żadnych szkód!"
