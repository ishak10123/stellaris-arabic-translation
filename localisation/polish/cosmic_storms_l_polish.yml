 celestial_storm_aftermath_modifier_severity_desc: "Chociaż pył międzygwiezdny, który wznieca $celestial_storm$, składa się z rzadkich materiałów, jego silna aktywność przenika głęboko do gleby, wstrzymując wydobycie."
