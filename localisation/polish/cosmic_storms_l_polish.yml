 #Storm Tech Insight events
 cstorms.505.name: "W obliczu nawałnicy"
 cstorms.505.desc: "Wskutek zniszczeń, jakich dokonała §H[this.GetAffectedStormType]§!, zdobyliśmy unikalną wiedzę o tym galaktycznym zjawisku.\n\nStudiując astrometeorologię, możemy lepiej się chronić w przyszłości. Ta nowa dziedzina badań może kiedyś zapewnić nam środki do zapanowania nad tymi burzami."
 #Storm Buildings
 building_storm_attraction_center: "Centrum przyciągania burz"
 building_storm_attraction_center_desc: "Dzięki uważnej manipulacji siłami grawitacyjnymi te placówki przyciągają pobliskie burze kosmiczne."
 building_advanced_storm_attraction_center: "Zaawansowane centrum przyciągania burz"
 building_advanced_storm_attraction_center_desc: "Zaawansowana wiedza o ciemnej energii pomaga nam dodatkowo ładować $building_storm_attraction_center$ i jeszcze skuteczniej przechwytywać burze kosmiczne."
 building_storm_repellent_center: "Centrum odpychania burz"
 building_storm_repellent_center_desc: "Im dalej jest burza, tym bezpieczniejsza nasza populacja. I spokojniejsza. Skomplikowane instrumenty astrometeorologiczne w tych ośrodkach odpychają nadciągające burze."
 building_advanced_storm_repellent_center: "Zaawansowane centrum odpychania burz"
 building_advanced_storm_repellent_center_desc: "Każda manipulacja czasoprzestrzenią jest dopuszczalna, jeśli tylko chroni nasz świat przed nawałnicami kosmicznymi. To centrum zajmuje się właśnie tym."
 building_storm_resistant_production: "Centrum usuwania skutków burz"
 building_storm_resistant_production_desc: "To centrum pomocy wspiera lokalne działania mające na celu ograniczyć wpływ burzy kosmicznej na produkcję planetarną. Dzięki skutecznej koordynacji i komunikacji $building_storm_resistant_production$ ułatwia szybkie wysłanie zespołów ratowniczych, a także poprawia warunki dla handlu na planecie."
 building_storm_resistant_production_tt: "Negatywne efekty, które wywołuje §Y$default_storm$§!, a które wpływają na produkcję planetarną, zostają zmniejszone o §G30%§!.\n\nGdy §Y$default_storm$§! jest obecna:$TABBED_NEW_LINE$$mod_planet_miners_minerals_produces_add$: §G+0,5§! $TABBED_NEW_LINE$$mod_planet_farmers_food_produces_add$: §G+0,5§! $TABBED_NEW_LINE$$mod_planet_technician_energy_produces_add$: §G+0,5§! \n\nUmożliwia decyzję planetarną §Y$decision_hunker_down$§!"
 building_advanced_storm_resistant_production: "Pochłaniacz burz"
 building_advanced_storm_resistant_production_desc: "Jeśli każdy $building_storm_resistant_production$ zostanie wzbogacony o systemy kontroli pogody, znacząco osłabi to efekty burz kosmicznych. Ponadto, zespoły ratunkowe są wysyłane jeszcze sprawniej, a lokalna pogoda praktycznie nie ma wpływu na handel planetarny."
 building_advanced_storm_resistant_production_tt: "Negatywne efekty, które wywołuje §Y$default_storm$§!, a które wpływają na produkcję planetarną, zostają zmniejszone o §G45%§!.\n\nGdy §Y$default_storm$§! jest obecna:$TABBED_NEW_LINE$$mod_planet_miners_minerals_produces_add$: §G+1§! $TABBED_NEW_LINE$$mod_planet_farmers_food_produces_add$: §G+1§! $TABBED_NEW_LINE$$mod_planet_technician_energy_produces_add$: §G+1§! \n\nUmożliwia decyzję planetarną §Y$decision_hunker_down$§!"
 building_adakkaria_patriotic_institute: "Patriotyczny Instytut Świętowania"
 building_adakkaria_patriotic_institute_desc: "$building_adakkaria_patriotic_institute$ to skarbnica zaawansowanej wiedzy o kondycji istot świadomych. Dajemy tutaj obywatelom narzędzia niezbędne do pielęgnowania ich wewnętrznej nawałnicy, a także unikania kuszącej pieśni o okrucieństwie Konwentu."
 building_adakkaria_patriotic_institute_effect_desc: "Jeżeli przez ten układ przejdzie burza kosmiczna, £pop£ §Hpopulacje§! będą mieć 10% szans na uzyskanie cechy $Name_Storm_Fused$."
 building_adakkaria_patriotic_institute_effect_upgrade_desc: "Jeżeli przez ten układ przejdzie burza kosmiczna, £pop£ §Hpopulacje§! będą mieć 40% szans na uzyskanie cechy $Name_Storm_Fused$. Ponadto, co 10 lat jest 20% szans, że §Y100§! £pop£ §Hpopulacji§! zamieni się w burzę kosmiczną."
 building_astrometeorology_observation_center: "Obserwatorium astrometeorologiczne"
 building_astrometeorology_observation_center_desc: "Dzięki delikatnym czujnikom to centrum obserwacyjne bada rozmaite warunki środowiskowe, aby powiększyć naszą wiedzę o naturalnym wszechświecie."
 concept_building_astrometeorology_observation_center: "$building_astrometeorology_observation_center$"
 building_storm_summoning_theater: "Teatr przyzywania burz"
 building_storm_summoning_theater_desc: "Połączenie technologii ze sztuką - nasi $job_storm_dancer_plural$ wirują, pełni emocji, pomagając zwabić burze kosmiczne."
 building_storm_holo_theater: "Holosala burz"
 building_storm_holo_theater_desc: "Nasza $building_storm_holo_theater$ nadaje na całą planetę i poza nią, dzięki czemu nasi hipnotyzujący $job_storm_dancer_plural$ docierają do szerszej publiczności."
 building_storm_grand_theater: "Wielki teatr burz"
