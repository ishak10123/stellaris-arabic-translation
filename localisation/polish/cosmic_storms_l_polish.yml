 #Storm Technology
 tech_storm_manipulation: "Manipulowanie burzą"
 tech_storm_manipulation_desc: "Opanowując zasady rządzące technologiami negacji burz, możemy rozpocząć manipulowanie astrometeorologiczną naturą galaktyki, aby zaczęła służyć naszym potrzebom."
 tech_advanced_storm_manipulation: "Zaawansowane manipulowanie burzą"
 tech_advanced_storm_manipulation_desc: "Dalsze badania astrometeorologiczne dają nam możliwość precyzyjniejszego modyfikowania §Yburz kosmicznych§! i manipulowania nimi w celu realizacji naszych potrzeb."
 tech_industrial_storm_protection: "Niwelowanie burzy planetarnej"
 tech_industrial_storm_protection_desc: "Ten ośrodek komunikacji pogodowej zmniejsza szkody wywołane przez kosmiczne katastrofy pogodowe. Produkcja mniej ucierpi w skutek przechodzącej nawałnicy galaktycznej."
 tech_advanced_industrial_storm_protection: "Rozproszenie burzy planetarnej"
 tech_advanced_industrial_storm_protection_desc: "Łącząc lokalne systemy kontroli pogody, można manipulować planetarnymi schematami pogodowymi, aby znacznie ograniczyć większość szkodliwych skutków burz kosmicznych, które dotykają produkcji."
 tech_storm_prediction_1: "Modele pogody kosmicznej"
 tech_storm_prediction_1_desc: "Dzięki wykorzystaniu naukowych modeli pogodowych możemy śledzić ruchy i powstawanie zbliżających się §Yburz kosmicznych§!."
 tech_storm_prediction_1_title: "§HOdblokowuje funkcję§!: Prognoza pogody kosmicznej"
 tech_storm_prediction_1_tooltip: "Odblokowanie możliwości zapoznawania się z §Yprognozami powstawania burz kosmicznych§! i §Yprognozami tras burz kosmicznych§! w §Ytrybie mapy prognozy pogody§!"
 tech_storm_prediction_2: "Trend prawdopodobieństwa"
 tech_storm_prediction_2_desc: "Dzięki wykorzystaniu prądów prawdopodobieństwa w naszych naukowych modelach pogodowych mamy znacznie większe możliwości śledzenia ruchów i powstawania zbliżających się §Yburz kosmicznych§!."
 tech_storm_prediction_2_title: "§HUlepsza funkcję§!: Prognoza pogody kosmicznej"
 tech_storm_prediction_2_tooltip: "Maksymalizacja zasięgu §Yprognoz powstawania burz kosmicznych§! i §Yprognoz tras burz kosmicznych§! w §Ytrybie mapy prognozy pogody§!"
 tech_ship_hull_storm_breaker_1: "Generatory osłabiania burz"
 tech_ship_hull_storm_breaker_1_desc: "Te generatory pola osłabiającego zapewniają niezbędną ochronę statkom przelatującym przez burze kosmiczne."
 tech_ship_hull_storm_breaker_2: "Powłoki przeciwburzowe"
 tech_ship_hull_storm_breaker_2_desc: "Te specjalne powłoki naładowują zewnętrzne elementy statku, tworząc pole osłabiające, które zapewnia skuteczniejszą ochronę przed burzami."
 tech_ship_storm_weapons_1: "Ekranowanie uzbrojenia"
 tech_ship_storm_weapons_1_desc: "Nowe podejście do korzystania ze stopów w zastosowaniach wojskowych znacznie ogranicza zdolność burz kosmicznych do zakłócania broni energetycznej i materiałów wybuchowych."
 tech_ship_storm_weapons_2: "Architektura klatki burzowej"
 tech_ship_storm_weapons_2_desc: "To nowatorskie podejście do architektury okrętów znacznie ograniczy negatywny wpływ burz kosmicznych na nasze systemy uzbrojenia."
 feature_sustain_cosmic_storm_unlocked: "Podtrzymywanie burz kosmicznych"
 feature_sustain_cosmic_storm_unlocked_desc: "Umożliwia twoim statkom badawczym zatrzymywanie i dowolne podtrzymywanie: §Y$default_storm$§!."
 FLEETORDER_SUSTAIN_COSMIC_STORM: "Podtrzymywanie burzy kosmicznej $STORM|Y$ w układzie $SYSTEM|Y$"
 FLEETORDER_SUSTAIN_COSMIC_STORM_BUTTON: "Podtrzymaj §Yburzę kosmiczną§!"
 FLEETORDER_SUSTAIN_COSMIC_STORM_CANCELLED: "§RŚledzona burza kosmiczna zniknęła.§!"
 #Map Mode
 storm_map_mode: "Tryb mapy prognozy pogody"
 storm_map_mode_desc: "Tryb mapy prognozy pogody pokazuje burze, przewidywania i pola oddziaływania na mapie galaktyki."
 #Cosmic Storm Gateway Tech
