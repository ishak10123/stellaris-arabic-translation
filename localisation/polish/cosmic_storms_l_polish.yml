 MESSAGE_STORM_AFTERMATH_DESC: "Planeta §H$PLANET$§! zgłasza ciągłe zakłócenia atmosferyczne."
 electric_storm_aftermath_custom_desc: "§Y$electric_storm$§! wpłynęła na prędkość konstrukcji, ale zwiększy produkcję energii."
 particle_storm_aftermath_custom_desc: "§Y$particle_storm$§! pozostawiła na planecie korozyjne cząstki."
 gravity_storm_aftermath_custom_desc: "§Y$gravity_storm$§! przeminęła, pozostawiając za sobą anomalie grawitacyjne w jednej z naszych kolonii."
 magnetic_storm_aftermath_custom_desc: "§Y$magnetic_storm$§! przeminęła. Nasza kolonia zgłasza zakłócenia elektromagnetyczne w okolicy biegunów."
 solar_storm_aftermath_custom_desc: "§Y$solar_storm$§! pozostawiła na planecie radioaktywne skażenie o niebezpiecznym nasileniu."
 celestial_storm_aftermath_custom_desc: "§Y$celestial_storm$§! pokryła planetę grubą warstwą kosmicznego pyłu."
 shroud_storm_aftermath_custom_desc: "§Y$shroud_storm$§! wywołała wzrost paranormalnych zjawisk na planecie."
