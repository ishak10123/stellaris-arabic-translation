 gov_storm_chasers: "Rada starszych"
 gov_storm_chasers_desc: "Członkowie czcigodnej rady rządzącej są niesamowicie sprawni fizycznie. Wchodząc na najwyższe szczyty lub płynąc na największych falach, poświęcają życia niestrudzonej pogoni za czystymi doświadczeniami. W ten sposób zyskali zaufanie swojej społeczności oraz prawo do decydowania, jakim kursem ona podąży.\n\nCzłonkowie rady są nazywani starszymi niezależnie od wieku, ponieważ ich czyny uznaje się za legendarne. Ich imiona na długo zachowają się w pamięci."
