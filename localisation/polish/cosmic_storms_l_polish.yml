 #Magnetized Planetary Core
 pm_magnetized_planetary_core: "Hipernamagnetyzowane jądro planetarne"
 pm_magnetized_planetary_core_desc: "Aktywność elektromagnetyczna w głębokim płaszczu planety sprawia, że można stosować na niej magnetyczne metody wydobycia zasobów, ale jednocześnie zakłóca ona infrastrukturę techniczną."
 cstorms.1705.name: "$pm_magnetized_planetary_core$"
 cstorms.1705.desc: "Niedawna §Y$magnetic_storm$§! wywołała nietypowe skutki na planecie [this.GetName]. Pola energetyczne burzy zwiększyły niestabilność magnetyczną płynnego jądra planety, powodując globalną awarię infrastruktury technologicznej.\n\nJednak sytuacja ta stanowi również wyjątkową możliwość wydobywania zasobów naturalnych. Bogate w metale strumienie magmy płynące pod płaszczem planety są teraz elektromagnetycznie naładowane, dzięki czemu zawarte w nich zasoby mogą być teraz wydobywane za pomocą magnesów górniczych."
 #Electrified Oceans
 d_electrified_oceans: "Zelektryzowane oceany"
 d_electrified_oceans_desc: "Przez rozległy ocean planety przepływa nieustanny prąd elektryczny."
 GLACIAL_OCEANS: "oceany podlodowcowe"
 DEFAULT_OCEANS: "oceany"
 cstorms.1715.name: "$d_electrified_oceans$"
 cstorms.1715.desc.common: "Na planecie [this.GetName] zaobserwowano niezwykłe zjawisko, którego przyczyną jest niedawna §Y$electric_storm$§!. [GetOceansState] planety zostały naładowane ciągłym prądem elektrycznym, który krąży teraz w wodzie, stanowiąc śmiertelne zagrożenie dla zamieszkujących ją organizmów."
 cstorms.1715.desc.aquatic: "Stanowi to poważne zagrożenie dla przyszłości naszej kolonii i należy natychmiast się tym zająć."
 cstorms.1715.desc.non_aquatic: "Zjawisko to nie stanowi dla nas bezpośredniego zagrożenia, ale stanowi wyzwanie dla przyszłego rozwoju naszej kolonii."
 cstorms.1715.a: "Rozładuj prąd."
 cstorms.1715.b: "Pogódź się z istnieniem zjawiska."
 #Ghostly Apparitions
 d_ghostly_canyon: "Upiorny kanion"
 d_ghostly_canyon_desc: "Osoby odwiedzające ten kanion donoszą o spotkaniach z eterycznymi zjawami."
 cstorms.1725.name: "Upiorne zjawy"
 cstorms.1725.desc.common: "Niedawna §Y$shroud_storm$§! w układzie [this.solar_system.GetName] sprawiła, że [owner.GetColonistPlural] donoszą o niewytłumaczalnych obserwacjach eterycznych zjaw w leżącym na uboczu kanionie. Upiornie błękitne postacie pojawiają się na krótko, ale nie wchodzą z nikim w interakcję. Wędrują bez celu, po czym zanikają."
 cstorms.1725.desc.psionic: "Zjawy mają psioniczną naturę, ale nie udało nam się nawiązać z nimi żadnej mentalnej komunikacji. Odkryliśmy jednak, że ich obecność zapewnia pasywne wzmocnienie naszych telepatycznych umiejętności."
 cstorms.1725.desc.psionic_robot: "Zjawy mają psioniczną naturę, ale nie udało nam się nawiązać z nimi żadnej psionicznej komunikacji. Kontrole systemów wykazały jednak, że ich obecność zapewnia pasywne wzmocnienie naszych telepatycznych zdolności."
 cstorms.1725.desc.spiritualist: "To niezwykłe zjawisko stanowi cenne przypomnienie o niematerialnych cudach naszej egzystencji."
 cstorms.1725.desc.gestalt: "Jak dotąd nie zgłoszono żadnych obrażeń fizycznych ani agresywnych zachowań."
 cstorms.1725.desc.default: "Jak dotąd nie zgłoszono żadnych obrażeń fizycznych ani szkód. Niemniej jednak dziwne zjawisko powoduje powszechne zaniepokojenie."
 cstorms.1725.a: "Wypełnić kanion ziemią. Martwi pozostaną pogrzebani."
 #Volcanic Inactivity
 cstorms.1735.name: "Uśpienie aktywności wulkanicznej"
 cstorms.1735.desc: "Niedawna §Y[this.GetAffectedStormType]§! minęła, ale pozostało po niej szczątkowe promieniowanie, które wywołało nieregularną aktywność geologiczną na planecie §H[this.GetName]§!.\n\nCo najbardziej zauważalne, wpływ burzy spowodował wygaśnięcie aktywnego wulkanu, odcinając go od jego geologicznej plamy gorąca i dopływu magmy.\n\nZmiany te dają nam nowe możliwości dalszego rozwoju planety, ponieważ stygnąca magma otwiera dostęp do nowych obszarów."
 #Mountain in the Sky
 d_sky_mountain: "Góry na niebie"
 d_sky_mountain_desc: "W rzadkim powietrzu górnej warstwy atmosfery planety wisi olbrzymi łańcuch górski, ukazując świeże złoża rudy."
 unlocks_zone_minerals_physics: "$t$Odblokowuje specjalizację dzielnicy: §Y$zone_minerals_physics$§!"
 cstorms.1745.name: "$d_sky_mountain$"
 cstorms.1745.desc: "Silna §Y$gravity_storm$§! wywołała niezwykłą transformację krajobrazu planety §H[this.GetName]§!. Potężne wahania grawitacyjne burzy wyrwały największy łańcuch górski planety z półki tektonicznej i uniosły go nad jej powierzchnię.\n\nŁańcuch wisi w górnej warstwie atmosfery, podtrzymywany jedynie przez efekty grawitacyjne burzy. To niesamowite wyniesienie odkryło niedostępne wcześnie złoża rudy w skale macierzystej. Sprawiło też, że [owner.GetResearchers] mają mnóstwo materiału do analizy."
 #Melting Glaciers
 cstorms.1755.name: "Topnienie lodowców"
 cstorms.1755.desc.common: "Niedawna §Y[this.GetAffectedStormType]§! wywarła niespodziewany wpływ na klimat planety [this.GetName]."
 cstorms.1755.desc.electric: "Zwiększenie ładunku elektrycznego atmosfery doprowadziło do drastycznej zmiany temperatury w okolicy biegunów, $cstorms.1755.desc.common_2$"
 cstorms.1755.desc.particle: "Korozyjny efekt cząstek burzy silnie wpłynął na okolice biegunów, $cstorms.1755.desc.common_2$"
 cstorms.1755.desc.gravity: "Wahania grawitacyjne wywołane przez burze roztrzaskały kilka warstw podwodnego lodu, $cstorms.1755.desc.common_2$"
 cstorms.1755.desc.magnetic: "Zakłócenia pół magnetycznych planety doprowadziły do drastycznych wahań sejsmicznych, $cstorms.1755.desc.common_2$"
 cstorms.1755.desc.solar: "Ekstremalne ciepło burzy podniosło na czas jej trwania temperaturę na całej planecie, $cstorms.1755.desc.common_2$"
 cstorms.1755.desc.celestial: "Duże skupiska nagrzanego gwiezdnego pyłu intensywnie wpłynęły na okolice biegunów, $cstorms.1755.desc.common_2$"
 cstorms.1755.desc.common_2: "powodując odwilż niedostępnej wcześnie zamarzniętej tundry.\n\nMożemy teraz zagospodarować tę nową ziemię."
 #Dusty Drink
 cstorms.1761.name: "Zator kosmiczny"
 cstorms.1761.desc.common: "Nasi [Owner.GetEngineerPlural] z planety §H[this.GetName]§! zgłaszają, że §Y$celestial_storm$§! wywiera szkodliwy wpływ na systemy filtrujące wodę. Nawarstwianie się cząstek w źródłach wody gruntowej powoduje mineralną zawiesinę, która zatyka kluczowe punkty infrastruktury."
 cstorms.1761.desc.default: "Usterki hydroponiczne silnie wpływają na rolnictwo na planecie i prowadzą do braków bezpiecznej do picia wody.\n\nTen problem może wywołać długotrwałe konsekwencje dotyczące naszych zapasów, jeśli go nie rozwiążemy. Na szczęście nasi [owner.GetEngineerPlural] są pewni, że zdołają stworzyć bardziej wytrzymały system filtracji, który temu zaradzi."
 cstorms.1761.desc.lithoid: "Badając blokady hydroponiczne, nasi [Owner.GetColonistPlural] odkryli, że zmineralizowana zawiesina jest jednocześnie pyszna i odżywcza dla istot o litoidzkiej fizjologii. Po dokonaniu kilku drobnych poprawek w systemach filtrujących kolonii wyprodukowali masowo nowy, sezonowy napój, który pomoże nam przeczekać burzę."
 cstorms.1761.a: "Kontynuować."
 cstorms.1761.b: "Niespodziewana gratka."
 pm_satured_filtration: "Nasycona filtracja"
 pm_satured_filtration_desc: "Miejscowe źródła wody są nasycone gwiezdnym pyłem, co powoduje blokady w sieci hydroponicznej."
 filtration_insight_modifier: "Wiedza o filtracji hydroponicznej"
 CLEAR_DUSTY_PIPES_PROJECT: "Czyszczenie rur"
 CLEAR_DUSTY_PIPES_PROJECT_DESC: "Wpływ zjawiska o nazwie §Y$celestial_storm$§! na planetę §H[this.GetName]§! sprawił, że tamtejsze systemy filtrowania wody zostały zapchane nierozpuszczalną, mineralną zawiesiną. Musimy zaprojektować od nowa wytrzymalszy system filtrowania, by rozwiązać ten problem."
 cstorms.1765.name: "Odetkanie filtrów"
 cstorms.1765.desc: "[Owner.GetEngineerPlural] zaradzili blokadom hydroponicznym i brakom wody na planecie §H[this.GetName]§!. Kolonia odzyskała zapasy wody i może teraz filtrować złożone nieczystości, takie jak te, którymi źródłem jest $celestial_storm$.\n\nTe usprawnienia infrastruktury wodnej można wykorzystać do poprawienia wydajności nawadniania w całym imperium [Owner.GetName]."
 #Flightless Fauna
 cstorms.1771.name: "Nielotna fauna"
 cstorms.1771.desc.common: "[Owner.GetScientistPlural] na planecie [this.GetName] zaobserwowali drastyczne skutki zjawiska o nazwie §Y$gravity_storm$§! pośród lokalnego ptactwa.\n\nWahania grawitacyjne spowodowane przez burzę wywołują nieobliczalne warunki atmosferyczne, przez co kilka gatunków ptaków nie jest w stanie latać."
 cstorms.1771.desc.default: "To nie tylko uniemożliwia tym stworzeniom normalne polowanie, lecz także wystawia je na ataki drapieżników.\n\nJeśli nie zainterweniujemy, istnieje ryzyko, że gatunki te zostaną doprowadzone do całkowitego wyginięcia."
 cstorms.1771.desc.swarm: "Czeka nas prawdziwa uczta."
 cstorms.1771.a: "Łatwy łup."
 cstorms.1771.b: "Nie ingerujmy w naturę."
 cstorms.1771.c: "Umieścić te stworzenia w rezerwacie."
 cstorms.1771.evopred: "Zachowajcie ich DNA, zanim nastąpi koniec."
 d_avian_reserve: "Rezerwat ptaków"
 d_avian_reserve_desc: "Odosobniony rezerwat przyrodniczy będący domem dla osłabionych ptaków."
 cstorms.1776.name: "Znów w locie"
 cstorms.1776.desc: "Po przejściu zjawiska o nazwie §Y$gravity_storm$§! tymczasowo uziemiona fauna planety [this.GetName] znów wzbiła się ku niebu po schronieniu się w naszym rezerwacie ptaków.\n\nChoć wiele stworzeń powróciło do swoich dawnych siedlisk, znaczna ich liczba pozostała w rezerwacie, zdając się cieszyć wygodą i ochroną, które im zapewnia.\n\nDzięki temu mamy wyjątkową okazję zbadania z bliska dzikich gatunków ptaków."
 cstorms.1776.a: "Znakomite wieści."
