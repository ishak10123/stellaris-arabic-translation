 #Ascension Perk
 ap_weather_control: "Galaktyczna kontrola pogody"
 ap_weather_control_desc: "Nasze ostatnie osiągnięcia na polu astrometeorologii pozwalają nam przywoływać burze kosmiczne. Dzięki odpowiedniej technologii możemy nawet wybrać, jaki rodzaj burzy stworzymy."
