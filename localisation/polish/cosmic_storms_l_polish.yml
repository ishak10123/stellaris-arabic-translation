 #Eye of the Storm
 cstorms.1801.name: "Centrum burzy"
 cstorms.1801.desc: "Ze skanów wynika, że [fromfrom.GetName] szalejąca w układzie [from.GetName] charakteryzuje się nieregularnościami w jej centrum. To sugeruje, że niesie ona jakąś dziwną masę. Te niezwykłe odczyty wymagają dokładniejszego zbadania tego zjawiska, zanim burza zaniknie lub opuści układ."
 EYE_OF_THE_STORM_PROJECT: "$cstorms.1801.name$"
 EYE_OF_THE_STORM_PROJECT_DESC: "Ze skanów wynika, że [fromfrom.GetName] w układzie [this.GetName] może przenosić w swoim wewnętrznym wirze dużą masę. Czujniki dalekiego zasięgu nie były w stanie dostarczyć jednoznacznych odpowiedzi na temat tego niezwykłego zjawiska. Ekspedycja do wnętrza burzy jest konieczna, aby lepiej je zrozumieć."
 cstorms.1805.name: "Do wnętrza wiru"
 cstorms.1805.desc: "Dzięki wyprawie, którą poprowadziliśmy do wnętrza kosmicznej burzy w układzie [from.GetName], udało się odkryć przyczynę zaburzeń naszych skanów. [leader.GetName] donosi, że ta niezwykła burza jest podtrzymywana przez znajdującą się w jej centrum ogromną koncentracji masy, na którą składa się [from.star.GetEarnedResources].\n\nNasz statek badawczy został gwałtownie wyrzucony z centrum burzy, ale zanim to nastąpiło, zdołał zgromadzić pewną ilość zasobów. Dane z czujników zarejestrowane podczas ryzykownej ucieczki pomogą naszym technikom usprawnić wydajność naszych statków w ekstremalnych, burzowych warunkach."
 cstorms.1805.desc.traumatized: "Niestety, [leader.GetName] borykać się będzie teraz z długotrwałymi skutkami tej niebezpiecznej wyprawy."
