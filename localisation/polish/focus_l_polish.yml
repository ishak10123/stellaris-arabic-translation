 development.220.desc: ""
 development.220.hint: "Odpowiedz na zaproszenie do dołączenia do ['concept_galactic_community', Wspólnoty Galaktycznej] lub otwórz §H['concept_galactic_community', Wspólnotę Galaktyczną]§! nad £interface£ ['concept_outliner', rejestrem] po jej utworzeniu i poproś o dołączenie."
 development.220.lore: "§L\"Kiedyś byliśmy pojedynczym nasionem. Teraz jesteśmy częścią ogrodu, który rozkwita wśród gwiazd\" - Płatki Czerni, pierwszy mówca Wspólnoty Galaktycznej§!"
