 core_focus_139.name: "Załóż filię"
 core_focus_139.desc: ""
 core_focus_139.hint: "Żeby założyć ['concept_branch_office', filię], zawrzyj ['concept_diplomatic_pacts', $PACT_commercial_pact$] z wybranym imperium. Jeżeli jesteś §Hsyndykatem przestępczym§!, ten krok nie jest konieczny (twoja działalność jest mniej jawna)."
 core_focus_139.lore: "§L\"Dzisiaj to tylko filia, a jutro fundament ich gospodarki\". - Prezes Ytella Cixi'dolf, dział ekspansji§!"
