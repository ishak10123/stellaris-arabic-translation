 development.215.name: "Wyznacz urzędnika na zarządcę"
 development.215.desc: ""
 development.215.hint: "Wykorzystując zakładkę $colony_view_tab_planet_summary$ w £interface£ ['concept_colony_view', oknie kolonii] lub £interface£ ['concept_planets_and_sector_view', oknie planet i sektorów], przydziel £official£ ['concept_official', urzędnikowi] rolę ['concept_governor', zarządcy] £sector£ ['concept_sector', sektora] lub £planet£ ['concept_planet', planety]."
 development.215.lore: "§L\"Władca jest chwalony. Generał wzbudza strach. Prawdziwy administrator nie jest ani jednym, ani drugim, ponieważ jego praca jest wykonywana najlepiej, gdy pozostaje niezauważona\" - prefekt Flent shar Astatenn§!"
