 core.100.name: "Załóż kolonię"
 core.100.desc: ""
 core.100.hint: "Wykorzystaj £colony_ship£ ['concept_colony_ship', statek kolonizacyjny], aby zdatna do zamieszkania £planet£ ['concept_planet'] stała się twoją kolonią."
 core.100.lore: "§L\"Nowy świat nie jest tylko zasobem - to odpowiedzialność\" - Podręcznik działań kolonialnych, 223. wydanie§!"
 core.100.req: "Założono kolonię"
 core.100.fail: "£trigger_no£ $core.100.req$"
