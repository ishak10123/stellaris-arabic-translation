 # CHRONICLES OF DENDRUS
 chronicles_of_dendrus_chain_title: "Kroniki Dendrusa"
 chronicles_of_dendrus_chain_desc: "Studiując \"Kroniki\", kolekcję skomplikowanych dowodów matematycznych znalezioną we wraku statku arki na planecie §Y[from.Planet.GetName]§!, staramy się dowiedzieć więcej na temat §YNowej Bratulli§! - rajskiego świata poszukiwanego przez Dendrytian."
 site_chronicles_of_dendrus: "$chronicles_of_dendrus_chain_title$"
 site_chronicles_of_dendrus_desc: "Skany planety §Y[from.Planet.GetName]§! odkryły na jej powierzchni wrak statku kosmicznego. Wygląda na to, że ta jednostka wykonała tu niekontrolowane lądowanie wiele lat temu.\n\nJej olbrzymie rozmiary sugerują, że na jej budowę przeznaczono niegdyś znaczne ilości zasobów. Ekspedycja archeologiczna pomoże nam określić w jaki sposób tu trafiła."
 extreme_frontiers.1400.title: "Ogromna jednostka transportowa"
 extreme_frontiers.1400.desc: "Zewnętrzna analiza statku rozbitego na planecie §Y[from.Planet.GetName]§! sugeruje, że jest to transportowiec o dużej pojemności. Jego systemy są nieaktywne i nie reagują na nasze sygnały, a w jego wnętrzu nie wykrywamy żadnych oznak życia. Analiza warstw osadów wykazuje, że spoczywa tu od około stu lat, co oznacza, że w skali galaktycznej trafił tu stosunkowo niedawno."
 extreme_frontiers.1400.a: "Zbadać wnętrze."
 extreme_frontiers.1405.title: "Kolonizacyjny statek widmo"
 extreme_frontiers.1405.desc: "Wewnątrz wraku statku na planecie §Y[from.Planet.GetName]§! odnaleźliśmy zaawansowane komory do hydroponicznych upraw roślin, rozległe banki nasion i gleb oraz ładownie pełne nietkniętych narzędzi i materiałów budowlanych. Wiele z terminali danych zawiera plany przyszłej kolonii o kryptonimie \"§YNowa Bratulla§!\".\n\nNa niższych pokładach znajdowały się tysiące komór kriohibernacyjnych, w których spoczywały zwłoki dawnych pasażerów statku."
 extreme_frontiers.1405.desc.phototrophic: "$extreme_frontiers.1405.desc$ Tak jak my, te istoty polegały na fotosyntezie w procesach wzrostu i regeneracji komórek. Ich ciała zwiędły i wyschły, co sugeruje, że zmarły w trakcie swej długiej hibernacji."
 extreme_frontiers.1405.desc.default: "$extreme_frontiers.1405.desc$ Ciała tych fototroficznych istot zwiędły i wyschły, co sugeruje, że zmarły w trakcie swej długiej hibernacji."
 extreme_frontiers.1405.a: "Kontynuować eksplorację."
 extreme_frontiers.1405.b: "Pożreć ich szczątki i kontynuować."
 extreme_frontiers.1410.title: "Kaplica świata macierzystego"
 extreme_frontiers.1410.desc: "We wraku statku kolonizacyjnego na planecie §Y[from.Planet.GetName]§! odkryliśmy wewnętrzne sanktuarium bogato ozdobione scenami z życia w miejscu zwanym \"§YBratulla§!\". Część obrazów przedstawia tętniący życiem świat pełen bujnej roślinności, zaś inne pokazują sceny katastrofy środowiskowej i masowego wymierania. Najokazalszy obraz przedstawia statek opuszczający pozbawione życia, jałowe pustkowie.\n\nCentralny terminal danych zawiera krótkie nagrania wideo wykonane przez załogę statku. Po dokładnym mapowaniu lingwistycznym udało nam się je przetłumaczyć.\n\n§SArborixxeum - Strąk 9721\n\nOdchodząc, cierpimy. Lecz zapuszczenie korzeni na Nowej Bratulli nas uzdrowi.\n\nDarkht Paam - Strąk 21301\n\nZawierzcie Kronikom, Dendrytianie. Nowa Bratulla będzie naszym wybawieniem.§!\n\nWciąż poszukujemy mostka dowodzenia na tym olbrzymim statku."
 extreme_frontiers.1410.a: "Szukajcie dalej."
 extreme_frontiers.1415.title: "Mostek dowodzenia"
 extreme_frontiers.1415.desc: "Po uzyskaniu dostępu do mostka dowodzenia, udało nam się pobrać i przetłumaczyć ostatni zapis z dziennika pokładowego.\n\n§SSTATEK ARKA DENDRUS I - ZAPIS AWARYJNY - XZ-47/9-113.5-AE\n\nObawiam się, że na próżno pokładaliśmy nadzieje w Kronikach. Przybyliśmy na miejsce, lecz nie ma tu obiecanej nam rajskiej planety, Nowej Bratulli. Żaden tutejszy glob nie ma warunków zdolnych podtrzymać dendrytiańskie życie.\n\nWydłużyliśmy kriohibernację wszystkich pasażerów. Będziemy kontynuować nasze poszukiwania...§!\n\nPrzeprowadziliśmy dalsze odzyskiwanie danych, aby pobrać z terminala naukowego owe Kroniki - okazało się, że to obszerny zbiór skomplikowanych dowodów matematycznych. Równania te wykorzystują osobliwą formę dendrytiańskiej matematyki i określają hipotetyczne położenie unikalnej, zdatnej do życia planety, §YNowej Bratulli§!."
 extreme_frontiers.1415.a: "Przestudiujmy te Kroniki."
 DENDRITIAN_CHRONICLES_PROJECT_DEFAULT: "Studia nad dendrytiańskimi Kronikami"
 DENDRITIAN_CHRONICLES_PROJECT_MACHINE: "$DENDRITIAN_CHRONICLES_PROJECT_DEFAULT$"
 DENDRITIAN_CHRONICLES_PROJECT_DEFAULT_DESC: "Studiując \"Kroniki\", kolekcję skomplikowanych dowodów matematycznych znalezioną we wraku statku arki na planecie §Y[from.Planet.GetName]§!, staramy się dowiedzieć więcej na temat §YNowej Bratulli§!, rajskiego świata poszukiwanego przez Dendrytian."
 DENDRITIAN_CHRONICLES_PROJECT_MACHINE_DESC: "$DENDRITIAN_CHRONICLES_PROJECT_DEFAULT_DESC$"
 extreme_frontiers.1420.title: "Zlokalizowano zaginioną hiperlinię"
 extreme_frontiers.1420.desc: "Dendrytiańskie Kroniki składają się z serii skomplikowanych matematycznych aksjomatów i abstrakcji. Te fascynujące twierdzenia sugerują, że układ §Y[from.solar_system.GetName]§! jest punktem startowym dla dodatkowej, dotąd niezmapowanej hiperlinii, prowadzącej do §YNowej Bratulli§!.\n\nPo wykonaniu dokładnych kwantowych skanów całego obszaru w końcu udało nam się zlokalizować punkt przełamania zaginionej hiperlinii, częściowo zamaskowany i poddany ciężkiej erozji przez oddziaływanie pobliskiej czarnej dziury. Jeśli uda nam się reaktywować ten punkt, będziemy pierwszą cywilizacją, która odkryje, co leży po drugiej stronie."
 extreme_frontiers.1420.a: "Odszukaliśmy to, czego nie byli w stanie znaleźć Dendrytianie."
 RESTORE_HYPERLANE_PROJECT: "Reaktywacja zdegradowanej hiperlinii"
 RESTORE_HYPERLANE_PROJECT_DESC: "Jeśli znajdziemy sposób na reaktywację zdegradowanej hiperlinii w układzie §Y[from.solar_system.GetName]§!, będziemy w stanie potwierdzić istnienie §YNowej Bratulli§!, rajskiej planety, której poszukiwali Dendrytianie."
 extreme_frontiers.1425.title: "Hiperlinia reaktywowana"
 extreme_frontiers.1425.desc: "Kierując energię do wnętrza czarnej dziury w układzie §Y[from.Planet.solar_system.GetName]§!, zmieniliśmy pozycję jej pól grawitacyjnych, uwalniając dotąd niszczejące wejście do hiperlinii.\n\nWstępne badania potwierdzają istnienie pojedynczej planety na drugim końcu hiperlinii, odpowiadającej charakterystyce §YNowej Bratulli§! opisywanej w dendrytiańskich Kronikach."
 extreme_frontiers.1425.a: "Nowy świat do zbadania."
 NAME_new_bratulla: "Nowa Bratulla"
 NAME_new_bratulla_star: "Kipos"
 extreme_frontiers.1430.title: "Nowa Bratulla"
 extreme_frontiers.1430.desc.common: "Potwierdziliśmy istnienie Nowej Bratulii, planety opisywanej w dendrytiańskich Kronikach. Posiada ona wyjątkowo bogaty i zróżnicowany roślinny ekosystem, a wstępne skany wykrywają miliony rozmaitych rodzimych gatunków."
 extreme_frontiers.1430.desc.begin: "Ten fascynujący świat jest szczególnie przyjaznym środowiskiem dla organizmów roślinnych z cechami genetycznymi takimi jak"
 extreme_frontiers.1430.desc.end: "W jej glebach żyją biliony rozmaitych bakterii, które nawożą, chronią i regenerują organiczne systemy korzeniowe.\n\nRośliny zdają się współdzielić substancjami odżywczymi, ratując najbardziej potrzebujące okazy. Te, które obecnie mają nadmiar związków odżywczych dzielą się swoimi nadwyżkami za pośrednictwem połączonej sieci korzeni."
 extreme_frontiers.1430.desc.default: "$extreme_frontiers.1430.desc.begin$ te obecne u Dendrytian. $extreme_frontiers.1430.desc.end$"
 extreme_frontiers.1430.desc.phototrophic: "$extreme_frontiers.1430.desc.begin$ nasze. $extreme_frontiers.1430.desc.end$"
 extreme_frontiers.1430.desc.respawn: "Dendrytianie mają jeszcze szansę się odrodzić - [Root.Owner.GetScientistPlural] z naszego imperium uważają, że w miejscowych warunkach zdołają odtworzyć gatunek Dendrytian, transplantując genetyczne próbki pobrane z pokładu ich statku arki do nietypowych gleb tej planety."
 extreme_frontiers.1430.a: "Dendrytianie zasługują na to miejsce."
 extreme_frontiers.1430.b.default: "Nowa Bratulla należy do nas."
 extreme_frontiers.1430.b.phototrophic: "Ten świat jest dla nas idealny."
 extreme_frontiers.1430.b.megacorp: "Możemy do woli eksploatować ten dziewiczy świat."
 NAME_buds_of_dendrus: "Szczep Dendrusa"
 NAME_dendritian: "Dendrytianin"
 NAME_dendritian_plural: "Dendrytianie"
 ADJECTIVE_dendritian: "Dendrytiańsk."
 opinion_dendrus: "Zbawcy Dendrytian"
 opinion_to_dendrus: "$opinion_dendrus$"
 extreme_frontiers.1435.title: "Propozycja wasalizacji"
 extreme_frontiers.1435.desc: "Trwało to całe wieki... lecz przepowiednia Dendrytiańskich Kronik wreszcie się ziściła. Oto zapuściliśmy korzenie w glebie §YNowej Bratulli§! i tam też rozkwitamy.\n\nNasze drugie życie w nowym domu zawdzięczamy imperium §Y[Root.GetName]§!. Nigdy nie zapomnimy o waszych zasługach.\n\nNiechaj dowodem naszej wdzięczności będą nie tylko słowa, ale i czyny. Pokornie składamy wam hołd jako wasi wasale."
 extreme_frontiers.1435.a: "Przyjmujemy was jako naszych wasali."
 extreme_frontiers.1435.b: "Musimy przekonać się, dokąd poprowadzi was przeznaczenie."
 extreme_frontiers.1435.b.tt: "Zagraj jako: §RSzczep Dendrusa§!."
 extreme_frontiers.1435.c: "Wystarczy nam wasza wiedza."
 extreme_frontiers.1435.c.tt: "Zyskaj [Root.GetDendrusGivenBiotechAmount] x £society£ §Ybiotechnologie§!"
 # GEORADIATION TERRAFORMING
 georadiation_terraforming_chain_title: "Terraformowanie geopromieniowaniem"
 georadiation_terraforming_chain_desc: "Szczątki niszczycielskiego urządzenia terraformującego z planety §Y[from.Planet.GetName]§! dalej nadają sygnały do kilku punktów rozsianych po galaktyce. Zbadanie tych miejsc pozwoli nam zgromadzić więcej informacji na temat tej niebezpiecznej technologii."
 site_georadiation_terraforming: "Podziemna sieć"
 site_georadiation_terraforming_desc: "Nasze sensory wykryły nieregularny sygnał komunikacyjny nadawany z głębi krateru na planecie §Y[from.Planet.GetName]§!.\n\nSkany topologii sejsmicznej wykryły tam całą sieć podziemnych jaskiń, do których prowadziło zawalone wejście w samym środku krateru. Oprócz tego, nasze instrumenty radiologiczne wykrywają ślady promieniowania grawitacyjnego emanujące z tego miejsca, co jedynie przysparza nam kolejnych niewyjaśnionych pytań."
 extreme_frontiers.1500.title: "Napromieniowane szczątki"
 extreme_frontiers.1500.desc: "W toku prac wykopaliskowych w kraterze na planecie §Y[from.Planet.GetName]§! odkryliśmy rozbite szczątki. Te roztrzaskane elementy emitują silne ślady promieniowania grawitacyjnego uprzednio wykrytego z orbity.\n\nSkoro udało nam się utorować i zabezpieczyć przejście do systemu podziemnych jaskiń, §Y[leader.GetName]§! może teraz wyśledzić źródło sygnału komunikacyjnego."
 extreme_frontiers.1500.a: "Wyśledzić sygnał."
 extreme_frontiers.1505.title: "Zardzewiałe urządzenie"
 extreme_frontiers.1505.desc: "Odszukaliśmy źródło sygnału komunikacyjnego na planecie §Y[from.Planet.GetName]§! - jest to wielki, uszkodzony mechanicznie konstrukt, który przebił się głęboko pod powierzchnię planety.\n\nObiekt jest mocno skorodowany pod wpływem działania kwasu, lecz jego aparatura komunikacyjna wciąż nadaje sygnał w nieznanym nam języku, próbując skontaktować się z odległym celem.\n\nMaszyna pozostaje mocno zakotwiczona w skalnym podłożu za pomocą wyspecjalizowanych zaczepów grawitacyjnych. Potrzebne będą dalsze badania, aby określić prawdziwe przeznaczenie tego obiektu."
 extreme_frontiers.1505.a: "Odszyfrować sygnał."
 extreme_frontiers.1510.title: "Dekonstrukcyjne terraformowanie"
 extreme_frontiers.1510.desc.common: "Przeprowadziwszy szczegółową analizę, udało nam się częściowo określić przeznaczenie konstruktu odkrytego na planecie §Y[from.Planet.GetName]§!. Ta maszyna jest tak naprawdę stosunkowo nieskomplikowanym, acz wysoce niszczycielskim urządzeniem terraformującym.\n\nZaprojektowano je tak, aby napromieniowywało rodzime biosfery planet i jednocześnie stymulowało promieniowaniem krystalizację określonych minerałów. Działanie maszyny wywołuje kaskadowy proces, który niemal doszczętnie niszczy ekosystem planety. Ostatecznie zapewnia swoim użytkownikom bogate złoża gotowych do wydobycia zasobów, jednak kosztem znacznego podwyższenia poziomu toksyczności całej planety.\n\nChoć tylko częściowo poznaliśmy zasady działania tego procesu, to z powodzeniem odszyfrowaliśmy częstotliwość komunikacyjną konstruktu, dzięki czemu namierzyliśmy jeszcze dwa dodatkowe miejsca, które transmitują identyczny sygnał."
 extreme_frontiers.1510.desc.default: "Zbadanie tych miejsc może dostarczyć nam dodatkowych informacji o tej technologii."
 extreme_frontiers.1510.desc.industrialist: "Przedsiębiorczy pionierzy stojący za tą technologią z pewnością byli biegli w optymalizacji zysków. Będziemy mogli wiele nauczyć się z dalszych badań nad tym odkryciem."
 extreme_frontiers.1510.a: "Rozpoczynamy poszukiwania."
 GEORADIATION_SIGNAL_1_PROJECT: "Śledzenie sygnału: §Y[planet.GetName]§!"
 GEORADIATION_SIGNAL_1_PROJECT_DESC: "Wyśledziliśmy źródło transmisji na tej samej częstotliwości komunikacyjnej, co sygnał z konstruktu z planety §Y[from.Planet.GetName]§!. Znaleźliśmy tu kolejne uszkodzone urządzenie. Przebadanie go dostarczy nam kolejnych informacji o niszczycielskim potencjale tej technologii terraformacyjnej."
 extreme_frontiers.1515.title: "Grawitacyjne paliwo"
 extreme_frontiers.1515.desc.common: "Udało nam się odnaleźć kolejne urządzenie terraformacyjne na planecie §Y[from.GetName]§!. W odróżnieniu od pierwszego egzemplarza, ta maszyna miała jeszcze niewielki zapas paliwa, które zdołaliśmy przebadać. Okazało się, że źródłem napędzającym jej potężny generator promieniotwórczy jest §Hciemna materia§!.\n\nUrządzenie przyspiesza wzrost określonych minerałów, tworząc kluczowe wiązania molekularne przyciągające z otoczenia kolejne atomy. To stymuluje ich krystalizację, jednocześnie stopniowo rozbijając komórki okolicznej biosfery."
 extreme_frontiers.1515.desc.industrialist: "Ta maszyna kompletnie lekceważy stabilność planetarną w pogoni za eksploatacją zasobów. Cóż za inspirujący wzór do naśladowania."
 extreme_frontiers.1515.desc.signal_2_done: "Kierując fale promieniowania przez krystaliczny układ ogniskująco-modulujący, ta maszyna potrafi terraformować wskazany świat przy użyciu grawitacyjnej manipulacji molekularnej, jednocześnie nie powodując zapadnięcia się jądra planety.\n\nSkopiowane rejestry wskazują położenie czwartej maszyny, która nie została zdetonowana."
 extreme_frontiers.1515.desc.signal_2_not_done: "Jak ta maszyna potrafi manipulować otoczeniem, jednocześnie nie wywołując grawitacyjnego kolapsu na globalną skalę? Odpowiedź być może znajdziemy w ostatnim źródle transmisji."
 GEORADIATION_SIGNAL_2_PROJECT: "Śledzenie sygnału: §Y[planet.GetName]§!"
 GEORADIATION_SIGNAL_2_PROJECT_DESC: "Wyśledziliśmy kolejne źródło transmisji sygnału nadawanego przez konstrukt z planety §Y[from.Planet.GetName]§!. Znaleźliśmy tu kolejne uszkodzone urządzenie. Przebadanie go dostarczy nam dalszych informacji o niszczycielskim potencjale tej technologii terraformacyjnej."
 extreme_frontiers.1520.title: "Stymulowane promieniowanie"
 extreme_frontiers.1520.desc.common: "Udało nam się odszukać kolejne uszkodzone urządzenie terraformacyjne na planecie §Y[from.GetName]§!. Spoczywa tam uwięzione w wykwitach kryształów wygenerowanych przez wadliwe działanie uszkodzonego układu ogniskująco-modulującego.\n\nBadając kompletny okaz maszyny, udało nam się zidentyfikować metody, dzięki którym potrafi precyzyjnie skupiać promieniowanie. Wykorzystując mechanizmy kontroli modulowanego sprzężenia zwrotnego, konstrukt może bezpośrednio wpływać na konkretny cel i stymulować wzrost zaprogramowanego minerału."
 extreme_frontiers.1520.desc.signal_1_done: "To umożliwia prowadzenie intensywnej terraformacji bez ryzyka planetarnego kolapsu grawitacyjnego.\n\nSkopiowane rejestry wskazują położenie czwartej maszyny, która nie została zdetonowana."
 extreme_frontiers.1520.desc.signal_1_not_done: "Dotąd jednak nie udało nam się zidentyfikować substancji wykorzystywanej do generowania takich ilości promieniowania. Pomimo awarii zapasy paliwa tej maszyny kompletnie się wyczerpały. Odpowiedź być może znajdziemy w ostatnim źródle transmisji."
 UNDETONATED_GEORADIATION_PROJECT: "Niezdetonowane urządzenie"
 UNDETONATED_GEORADIATION_PROJECT_DESC: "Znaleźliśmy czwarte, jeszcze niezdetonowane urządzenie terraformacyjne na planecie §Y[planet.GetName]§!. Odzyskanie go umożliwi nam kompletne zrozumienie użytej w nim technologii."
 extreme_frontiers.1525.title: "Niezdetonowane urządzenie"
 extreme_frontiers.1525.desc.common: "Udało nam się zlokalizować nienaruszone czwarte urządzenie, spoczywające na powierzchni planety §Y[from.GetName]§!. Analiza jego architektury sterującej zapewni nam ostatnie informacje potrzebne do odtworzenia tej technologii."
 extreme_frontiers.1525.desc.industrialist: "Po opanowaniu tej technologii będziemy w stanie eksploatować galaktykę na bezprecedensową skalę. Nasze oszałamiające zyski znacznie przeważą wszelkie banalne kwestie ekologiczne. To złota szansa dla imperium [controller.GetName]."
 extreme_frontiers.1520.desc.default.common: "Potencjalne konsekwencje swobodnego wykorzystania takiej technologii na galaktyczną skalę nasuwają poważne pytania."
 extreme_frontiers.1525.desc.default.default: "Być może będzie lepiej, jeśli zawczasu wyeliminujemy potencjalne ryzyko stwarzane przez te urządzenia."
 extreme_frontiers.1525.desc.default.homicidal: "Być może będzie lepiej, jeśli zawczasu wyeliminujemy ryzyko, zanim te urządzenia zostaną wykorzystane przeciw nam."
 extreme_frontiers.1525.a.default: "Zbadać urządzenie."
 extreme_frontiers.1525.a.industrialist: "Na co jeszcze czekamy? Czym prędzej rozpocząć badania!"
 extreme_frontiers.1525.b: "Ryzyko przewyższa korzyści. Zniszczyć to urządzenie."
 extreme_frontiers.1530.title: "Naruszenie warunków"
 extreme_frontiers.1530.desc.common: "W trakcie badań konstruktu prowadzonych na planecie §Y[from.GetName]§! nieopatrznie naruszyliśmy jego system zabezpieczeń, co uruchomiło ukrytą w nim \"syrenę alarmową\" nadającą na wszystkich częstotliwościach. Pomimo wstępnych prognoz mówiących, że ten alarm pozostanie bez odpowiedzi, na nasze terytorium przybywa zautomatyzowany dron.\n\nNa wszystkie nasze wywołania odpowiada tak samo:\n\n\"Dzień dobry, drogi kliencie. Nasze rejestry wskazują, że próbujesz skonstruować nieautoryzowaną wersję Matrycy Georadiacyjnej III generacji. Stanowi to jawne naruszenie warunków umowy licencyjnej z firmą $NAME_Geocorp$.\n\nZgodnie z obowiązującym prawem podejmiemy teraz niezbędne kroki, aby udaremnić ci próbę kradzieży naszej własności intelektualnej wszelkimi dostępnymi sposobami. Wszelkie skargi i zażalenia prosimy kierować do naszych dronów obsługi klienta.\""
 extreme_frontiers.1530.desc.industrialist: "Cóż za wzorowa postawa. Zasłużyłyby na pochwałę, gdyby tylko nie opóźniały naszych prac."
 extreme_frontiers.1530.a: "Nawiąż komunikację."
 extreme_frontiers.1530.b: "Nie będziemy negocjować z \"obsługą klienta\"."
 GEORADIATION_ANALYSIS_PROJECT: "Analiza urządzenia"
 GEORADIATION_ANALYSIS_PROJECT_DESC: "Analiza architektury sterującej urządzenia znalezionego na planecie §Y[planet.GetName]§! umożliwi nam odtworzenie tej technologii na nasz własny użytek."
 NAME_Geocorp: "CoburnCorp"
 geocorp_corvette: "Dron bojowy $NAME_Geocorp$"
 geocorp_corvette_plural: "Drony bojowe $NAME_Geocorp$"
 NAME_Geocorp_Combat_Drone: "$geocorp_corvette$"
 extreme_frontiers.1531.title: "Dron $NAME_Geocorp$"
 extreme_frontiers.1531.desc: "Tuż po nawiązaniu połączenia rozbrzmiewa staromodna muzyka, po czym uruchamia się zautomatyzowany dron działu wsparcia.\n\nDzień dobry, drogi kliencie. Widzimy, że próbujesz skonstruować nieautoryzowaną wersję Matrycy Georadiacyjnej III generacji. Jak możemy ci dziś pomóc?"
 extreme_frontiers.1531.a: "Skąd przybywacie?"
 extreme_frontiers.1531.a.reply: "\"Każdy zakup ze sklepu firmy $NAME_Geocorp$ dostarczany jest w pakiecie z operującym zdalnie orbitalnym satelitą ds. satysfakcji klienta, który monitoruje prawidłowe użytkowanie towaru oraz pomaga budować bazę stałych konsumentów. Nasze wewnętrzne baterie energetyczne umożliwiają nam działanie przez wiele stuleci.\""
 extreme_frontiers.1531.b: "Czy możemy pomówić z waszym administratorem?"
 extreme_frontiers.1531.b.reply: "\"Niestety, procesy życiowe ostatniego administratora ustały. Życie biologicznych organizmów przemija - co innego nasze zaangażowanie w dbanie o satysfakcję naszych klientów.\""
 extreme_frontiers.1531.c: "Myśleliśmy, że odzyskujemy wraki z ruin."
 extreme_frontiers.1531.c.reply: "\"Ignorancja nie usprawiedliwia łamania licencji. Warunki użytkowania państwa Matrycy Georadiacyjnej III generacji zostały dokładnie wyjaśnione w momencie zakupu.\""
 extreme_frontiers.1531.d: "Chcemy odnowić naszą subskrypcję."
 extreme_frontiers.1531.d.reply: "\"To fantastyczna wiadomość. Podpiszemy umowę bezpośrednio po uiszczeniu opłaty administracyjnej w wysokości 3000 §Ykredytów energetycznych§!. Po pokwitowaniu transakcji oznaczymy to zgłoszenie jako rozwiązane za obopólną zgodą i wycofamy siły ofensywne.\""
 extreme_frontiers.1531.e: "Nie kupowaliśmy tego urządzenia."
 extreme_frontiers.1531.e.reply: "\"Zatem przyznajecie się państwo do kradzieży? W takim razie unikniemy zbędnych komplikacji - wszak nasze protokoły antykradzieżowe są naprawdę zabójcze. Mamy nadzieję, że skorzystacie państwo z naszej oferty artykułów pogrzebowych adekwatnych do państwa zbliżających się potrzeb.\""
 extreme_frontiers.1531.f: "Wniesiemy opłatę"
 extreme_frontiers.1531.f.reply: "\"Dziękujemy państwu za odnowienie licencji Matrycy Georadiacyjnej III generacji. Mamy nadzieję, że to urządzenie przyniesie państwu korzyści proporcjonalne do naszych dochodów z jego sprzedaży.\"\n\nPo przyjęciu opłaty dron odlatuje w bezkresną przestrzeń galaktyczną."
 extreme_frontiers.1531.g: "Toż to szantaż. Przygotujcie się do bitwy."
 extreme_frontiers.1531.h: "Nie będziemy po nich płakać."
 extreme_frontiers.1531.i: "Przygotujcie się do bitwy."
 extreme_frontiers.1534.title: "Dron $NAME_Geocorp$"
 extreme_frontiers.1534.desc: "Gdy bitwa w układzie §Y[fromfrom.solar_system.GetName]§! dobiega końca, na naszych ekranach pojawia się nowy komunikat drona obsługi klienta.\n\n\"Odnotowaliśmy państwa zastrzeżenia wobec naszych prób wyegzekwowania warunków umowy licencyjnej. Z uwagi na zademonstrowaną przez państwo druzgocącą przewagę militarną niniejszym wycofujemy nasze zażalenie dotyczące naruszenia własności intelektualnej Matrycy Georadiacyjnej III generacji. Mamy nadzieję, że będą państwo zadowoleni z nowo pozyskanej technologii.\"\n\nDron eksploduje, zrywając połączenie komunikacyjne."
 extreme_frontiers.1534.a: "Nie będziemy po nich płakać."
 extreme_frontiers.1535.title: "Warunki zmodyfikowane"
 extreme_frontiers.1535.desc: "Skoro udało nam się rozwiązać problem z dronami obsługi klienta, możemy wznowić analizę konstrukcji Matrycy Georadiacyjnej."
 extreme_frontiers.1535.a: "Kontynuować analizę urządzenia."
 GEORADIATION_ANALYSIS_PROJECT_CONTINUED: "$GEORADIATION_ANALYSIS_PROJECT$"
 GEORADIATION_ANALYSIS_PROJECT_CONTINUED_DESC: "$GEORADIATION_ANALYSIS_PROJECT_DESC$"
 extreme_frontiers.1540.title: "Niezdetonowane urządzenie"
 extreme_frontiers.1540.desc.industrialist: "Dzięki naszej bezkompromisowej biznesowej skuteczności udało nam się przeanalizować i odtworzyć Matrycę Georadiacyjną III generacji, przy okazji usprawniając jej metody operacyjne w celu maksymalizacji zysków."
 extreme_frontiers.1540.desc.default: "Po dokładnym przebadaniu maszyny udało nam się odtworzyć projekt Matrycy Georadiacyjnej III generacji, a przy tym odblokować jej pełen potencjał dzięki usprawnieniom procesów działania."
 extreme_frontiers.1540.desc.common: "Dzięki zintegrowaniu technologii radioaktywnej destabilizacji molekularnej z naszym sprzętem do terraformowania możemy stymulować krystalizację cennych zasobów."
 extreme_frontiers.1540.a: "Znakomite wieści."
 tech_georadiation_terraforming: "Terraformowanie georadiacyjne"
 tech_georadiation_terraforming_desc: "Rozkładając biosferę planety promieniowaniem molekularnym, stymulujemy krystalizację określonych surowców, jednocześnie transformując cały glob w toksyczne pustkowie."
 tech_georadiation_terraforming_tt: "Odblokowuje §Ydecyzję planetarną:§! §H$decision_toxify_world$§!"
 extreme_frontiers.1545.title: "Urządzenie zniszczone"
 extreme_frontiers.1545.desc: "Udało nam się rozmontować urządzenie na planecie §Y[from.GetName]§!, odzyskując z niego wszelkie materiały, jakie moglibyśmy wykorzystać.\n\nSkoro maszyna została zniszczona, a jej poprzednie egzemplarze są krytycznie uszkodzone, sekrety tej niszczycielskiej technologii przepadły bezpowrotnie."
 extreme_frontiers.1545.a.default: "I bardzo dobrze."
 decision_toxify_world: "Zatruj świat"
 decision_toxify_world_desc: "Stymuluj krystalizację określonych zasobów, rozkładając biosferę planety promieniowaniem molekularnym, co z czasem przekształci cały świat w toksyczne pustkowie."
