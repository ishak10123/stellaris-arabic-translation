l_polish:
 #############
 # Anomalies #
 #############
 EXTREME_FRONTIERS_TITLE: "Extreme Frontiers" # Do not translate
 # PULSATING OBJECT
 PULSATING_OBJECT_TOXIC_CAT: "Pulsujący obiekt"
 PULSATING_OBJECT_GAS_GIANT_CAT: "Pulsujący obiekt"
 PULSATING_OBJECT_BARREN_CAT: "Pulsujący obiekt"
 PULSATING_OBJECT_BARREN_COLD_CAT: "Pulsujący obiekt"
 PULSATING_OBJECT_FROZEN_CAT: "Pulsujący obiekt"
 PULSATING_OBJECT_MOLTEN_CAT: "Pulsujący obiekt"
 anomaly_pulsating_object_desc: "Wstępne skany celu, którym jest §Y[this.GetName]§!, wykryły nietypowy latający obiekt dryfujący w troposferze - z każdą zmianą położenia zmienia on również swój rozmiar, raz pęczniejąc, innym razem kurcząc się. Niezbędne są dalsze badania, aby określić jego dokładną naturę."
 extreme_frontiers.100.title: "Starożytny balon meteorologiczny"
 extreme_frontiers.100.desc: "§Y[Leader.GetName]§! z powodzeniem identyfikuje tajemniczy latający obiekt w lokacji §Y[from.GetName]§! jako archaiczny balon meteorologiczny. Wszelkie oznaczenia, które mogłyby pozwolić nam określić jego pochodzenie, zostały już dawno zniszczone przez ekstremalne warunki panujące w atmosferze tego świata.\n\nDatowanie radiometryczne wskazuje, że obiekt przebywał w atmosferze planety [from.GetName] przez ponad sto lat, zmieniając swoją objętość w trakcie dryfowania przez specyficzne dla tego świata strefy zróżnicowanych ciśnień.\n\nNiebywałym zrządzeniem losu, panele solarne sondy wciąż działają, a jej systemy czujników przechowują obecnie cenne dane atmosferyczne zgromadzone na przestrzeni ostatniego stulecia. Nasi [Root.Owner.GetResearchers] będą niezmiernie zainteresowani tymi informacjami."
 # MOLTEN METAL OCEAN
 MOLTEN_METAL_OCEAN_CAT: "Ekstremalne prądy lawy"
 anomaly_molten_metal_ocean_desc: "Wstępne badania powierzchni celu: §Y[from.GetName]'s§! wykryły częste fale tsunami przegrzanej lawy, zawierającej wysokie stężenie metali ciężkich. Niezbędne są dalsze badania, aby w pełni zrozumieć ten fenomen."
 extreme_frontiers.110.title: "Metaliczne tsunami"
 extreme_frontiers.110.desc: "§Y[Leader.GetName]§! potwierdza, że oceany lawy na planecie §Y[from.GetName]§! zawierają wyjątkowo czyste formy niemal wszystkich znanym nam rzadkich metaloidów z naszego katalogu pierwiastków.\n\nTa skoncentrowana mieszanka płynnych metali generuje silne i wysoce nieprzewidywalne pola elektromagnetyczne, które powodują powstawanie fal tsunami lawy.\n\nKorzystając z modelowania prognostycznego, zidentyfikowaliśmy krótkie, acz regularne okresy flauty, które możemy wykorzystać do eksploatacji tych wyjątkowo bogatych złóż."
 # GREAT BLUE SPOTS
 GREAT_BLUE_SPOTS_CAT: "Wielkie niebieskie plamy"
 great_blue_spots_desc: "Na powierzchni świata §Y[from.GetName]§! widać dwa charakterystyczne przebarwienia, na tyle duże, że z kosmosu można śledzić ich skoordynowany i niezwykle szybki ruch. Te niebieskie formacje są na tyle intrygujące, że warto je dokładniej zbadać."
 extreme_frontiers.120.title: "Symbiotyczne superburze"
 extreme_frontiers.120.desc: "Wielkie niebieskie plamy w atmosferze świata §Y[from.GetName]§! okazały się parą symbiotycznych superburz: cyklonem i antycyklonem, które wzajemnie podtrzymują się w idealnej równowadze sił.\n\nBurze są gigantyczne, a prędkość ich wiatrów regularnie przekracza barierę dźwięku, generując donośne gromy dźwiękowe. Wichry niosą ze sobą olbrzymie ilości kobaltowego pyłu, co zapewnia plamom ich charakterystyczny kolor.\n\n§Y[Leader.GetName]§! ocenia, że owe burze szaleją tu nieprzerwanie od ponad stu lat. Minerały nagromadzone przez nie w górnych warstwach atmosfery można będzie z łatwością eksploatować za pomocą stacji górniczej."
 # FROZEN INFERNO
 FROZEN_INFERNO_CAT: "Uderzenia gorąca"
 frozen_inferno_desc: "Wstępne skany celu §Y[from.GetName]§! wykrywają ekstremalnie chaotyczne skoki temperatury na tym zamarzniętym ciele niebieskim. Warto dokładniej zbadać te anomalie cieplne."
 extreme_frontiers.130.title: "Zamarznięte piekło"
 extreme_frontiers.130.desc: "§Y[Leader.GetName]§! ogłasza ukończenie badań nad chaotycznymi skokami temperatury na zamarzniętej planecie §Y[from.GetName]§!.\n\nGłęboko pod bezkresną tundrą pokrywającą powierzchnię planety znajdują się wysoce reaktywne złoża związków piroforycznych. Te zwykle pogrzebane pod lodem substancje od czasu do czasu są wynoszone ku powierzchni wraz z dryfem i pękaniem kontynentalnych czap lodowych.\n\nRozmarzając i ulatniając się w drodze ku górnym warstwom powłoki, te niezwykle łatwopalne gazy podatne są na gwałtowne zapłony w bogatej w tlen atmosferze planety [from.GetName], powodując częste nagłe pożary na jej powierzchni.\n\nZa pomocą wyspecjalizowanego sprzętu, te wyjątkowo łatwopalne substancje mogą być wydobywane i wykorzystywane w rozmaitych sektorach technologicznych."
 # POISONED ATMOSPHERE
 POISONED_ATMOSPHERE_CAT: "Trująca atmosfera"
 poisoned_atmosphere_desc: "W górnych warstwach atmosfery planety §Y[from.GetName]§! wykryto wysokie stężenia toksycznych organicznych molekuł."
 extreme_frontiers.140.title: "Trująca atmosfera"
 extreme_frontiers.140.desc.hive_mind: "Okazuje się, że na planecie §Y[from.GetName]§! żyje fascynujący gatunek porostów, który wydziela do atmosfery ultratoksyczne molekuły, co stanowi jego mechanizm obronny przed roślinożercami.\n\nBadania warstw skamieniałości dowodzą, że biosfera planety [from.GetName] obejmowała dawniej zróżnicowaną gamę fauny, która z biegiem czasu niemal doszczętnie wyginęła, w miarę jak porost stopniowo zatruwał atmosferę rosnącą koncentracją arsenu i talu - zbyt szybko, by miejscowe gatunki zwierząt zdołały się przystosować.\n\n§Y[Leader.GetName]§! donosi o odkryciu tylko jednego organizmu żywego oprócz porostów: gatunku wielkich gadów, które były w stanie przetrwać dzięki wyjątkowo wydajnemu gruczołowi neutralizującemu toksyny.\n\nDalsze badania nad tym niezwykłym narządem mogłyby dostarczyć nam przydatnych danych o detoksykacji atmosferycznej."
 extreme_frontiers.140.desc.default: "$extreme_frontiers.140.desc.hive_mind$ Wstępne eksperymenty wykazują również, że wyjątkowe związki zawarte w toksycznych gazach mogłyby zostać wykorzystane w przemyśle kosmetycznym."
 extreme_frontiers.140.a: "Cóż za intrygujący potencjał..."
 extreme_frontiers.140.b: "Przeróbcie je na perfumy."
 DETOXIFICATION_GLAND_PROJECT: "Badania nad gruczołami detoksykacyjnymi"
 DETOXIFICATION_GLAND_PROJECT_DESC: "Na spowitej toksyczną atmosferą planecie §Y[from.GetName]§! żyje fascynujący gatunek gadów, zdolny przetrwać dzięki wyjątkowemu narządowi wewnętrznemu, który rozkłada nawet najsilniejsze toksyny na wartościowe substancje odżywcze. Warto byłoby przeprowadzić dokładniejsze badania nad tymi organizmami."
 extreme_frontiers.145.title: "Wiedza o detoksykacji"
 extreme_frontiers.145.desc: "Dzięki intensywnym badaniom nad gruczołami gadów z planety §Y[from.GetName]§!, §Y[Leader.GetName]§! odkrywa biologiczne sekrety ich niezwykłej odporności na tamtejszą toksyczną atmosferę.\n\nIch skomplikowany narząd wytwarza związki, które neutralizują trujące gazy, zapobiegając przedostawaniu się toksyn do układu krążenia gadów. Ten wysoce adaptacyjny gruczoł neutralizuje nawet większość syntetycznych trucizn stworzonych w warunkach laboratoryjnych.\n\nTe fascynujące odkrycia zmienią nasze podejście do procesów detoksykacji atmosfery."
 # GLIMPSE OF THE CORE
 GLIMPSE_CORE_CAT: "Widok w samo serce"
 glimpse_the_core_desc: "Osobliwe ruchy zewnętrznych gazowych warstw planety §Y[from.GetName]'s§! powodują otwieranie się wyjątkowo głębokich naturalnych szybów, które chwilowo odsłaniają stałe jądro globu. Warto dokładniej zbadać ten niespotykany fenomen."
 extreme_frontiers.150.title: "Organiczne jądro"
 extreme_frontiers.150.desc: "Wysyłając sondę w głąb jednego z tymczasowych szybów na planecie §Y[from.GetName]§!, §Y[Leader.GetName]§! odkrywa, że na powierzchni jej jądra żyje gatunek jednokomórkowych organizmów, kompletnie różnych od wszelkich dotychczas nam znanych form życia.\n\nTe niebywale odporne komórki zdają się doskonale przystosowane do przetrwania w ekstremalnie wysokich ciśnieniach, a ich okresowe cykle rozmnażania generują znaczne ilości wodoru. [Leader.GetName] wysnuwa wniosek, że to właśnie ten naturalny mechanizm podtrzymuje gazowe warstwy planety złożone z lotnego wodoru.\n\nWytępienie tych organizmów spowodowałoby rozproszenie zewnętrznych warstw gazu, co pozostawiłoby nam zdatną do kolonizacji skalistą planetę."
 extreme_frontiers.150.a: "Zlikwidować je."
 extreme_frontiers.150.b: "To wyjątkowa okazja do naukowych obserwacji."
 PURIFY_CORE_PROJECT: "Oczyszczenie rdzenia"
 PURIFY_CORE_PROJECT_DESC: "Zewnętrzne gazowe warstwy planety §Y[from.GetName]§! są podtrzymywane przez unikalne procesy biochemiczne jednokomórkowców zasiedlających jej rdzeń. Wytępienie ich rozproszyłoby gazy, dzięki czemu uzyskalibyśmy zdatną do kolonizacji skalistą planetę."
 extreme_frontiers.155.title: "Nowy świat"
 extreme_frontiers.155.desc: "§Y[Leader.GetName]§! wysyła uzbrojoną sondę do jednego z szybów na powierzchni planety §Y[from.From.GetName]§!. Po dotarciu do rdzenia, odpaliła ona swój toksyczny ładunek, zakażając i eksterminując rdzenne jednokomórkowce.\n\nNastępnie zewnętrzne gazowe warstwy planety [from.From.GetName] uległy stopniowemu rozproszeniu, pozostawiając niewielką, skalistą planetę."
 extreme_frontiers.155.a: "Imponujące osiągnięcie."
 # OPTICAL PHENOMENA
 OPTICAL_PHENOMENA_CAT: "Migocząca powierzchnia"
 optical_phenomena_desc: "Nasze obrazowe skany planety §Y[from.GetName]§! wykrywają niezwykle dynamiczne zjawiska optyczne występujące na całej jej powierzchni - jednak z poziomu orbity nie jesteśmy w stanie dokładnie określić, co wywołuje te kolorowe wzory."
 extreme_frontiers.160.title: "Tęczowa czapa lodowa"
 extreme_frontiers.160.desc.default: "Bliższe badania powierzchni planety §Y[from.GetName]§! zaowocowały odkryciem przyczyny optycznych zjawisk dostrzeżonych w trakcie naszych obserwacji orbitalnych.\n\nTutejsze warunki atmosferyczne tak mocno wypolerowały znaczne połacie lodowej skorupy planety, że stały się one częściowo przezroczyste, ujawniając głębokie żyły wielokolorowych złóż kryształów ukryte pod ich powierzchnią. Te naturalnie występujące fenomeny wywołują widzialny z daleka efekt kalejdoskopu."
 extreme_frontiers.160.desc.machine: "$extreme_frontiers.160.desc.default$\n\nChoć tutejsze zjawiska optyczne są miłe dla oka, to nas najbardziej interesują bogate złoża minerałów ukryte pod powierzchnią."
 extreme_frontiers.160.tooltip: "Odblokowuje §Ydecyzję planetarną:§! §H$decision_prismatic_ice_exhibit$§! z następującymi efektami:\n£amenities£ $MOD_PLANET_AMENITIES_MULT$: §G+25%§!\n$mod_planet_jobs_unity_produces_mult$: §G+25%§!"
 decision_prismatic_ice_exhibit: "Wystawa pryzmatycznego lodu"
 decision_prismatic_ice_exhibit_desc: "Wydobyte tafle krystalicznie czystego lodu, który wywołuje hipnotyzujące kalejdoskopowe zjawisko optyczne. Przez pewien czas można je prezentować na wystawie."
 prismatic_ice_max_3_times_pass: "Można wykorzystać maksymalnie §Y3§! razy."
 prismatic_ice_max_3_times_fail: "$TRIGGER_FAIL$Można wykorzystać maksymalnie §Y3§! razy."
 prismatic_ice_max_3_times_pass_with_var: "$TRIGGER_PASS$$prismatic_ice_max_3_times_pass$ (aktualnie: §Y[owner.prismatic_ice_exhibit_happened]§!)"
 exhibiting_prismatic_ice: "Wystawa pryzmatycznego lodu"
 exhibiting_prismatic_ice_desc: "Wydobyte tafle krystalicznie czystego lodu, który wywołuje hipnotyzujące kalejdoskopowe zjawisko optyczne. Przez pewien czas można je prezentować na wystawie."
 # PLASMA VOLCANOES
 PLASMA_VOLCANO_CAT: "Orbitalna plazma"
 plasma_volcano_desc: "Obserwacje potwierdzają, że do górnych warstw atmosfery planety §Y[from.GetName]§! strzelają strumienie przegrzanej plazmy.\n\nZagęszczenie popiołów wulkanicznych w atmosferze uniemożliwia nam zidentyfikowanie źródła tych erupcji z orbity. Bardziej bezpośrednie badania prawdopodobnie będą dość ryzykowne."
 extreme_frontiers.170.title: "Plazmowe wulkany"
 extreme_frontiers.170.desc: "§Y[Leader.GetName]§! odkrywa źródło erupcji przegrzanej plazmy na planecie §Y[from.GetName]§!.\n\nUnikalne pole magnetyczne planety katalizuje reakcje zachodzące między rozmaitymi typami zjonizowanej materii w głębi płaszcza, tworząc komory magmowe pełne plazmy pod wysokim ciśnieniem.\n\nGdy niestabilne płyty tektoniczne planety przesuwają się, następują eksplozje nagromadzonej miejscowo plazmy, która wylatuje wysoko do atmosfery niczym śmiercionośne pociski, powodując dodatkowo zapłon gazów atmosferycznych i łańcuch wtórnych eksplozji. Nasi specjaliści od broni ochoczo wykorzystają pozyskane dane przy opracowywaniu naszego własnego uzbrojenia plazmowego."
 extreme_frontiers.170.desc.negative: "Niestety, w toku tych niebezpiecznych badań [Leader.GetName] ponosi ciężki uszczerbek na zdrowiu w postaci"
 extreme_frontiers.170.desc.traumatized: "$extreme_frontiers.170.desc.negative$ traumy."
 extreme_frontiers.170.desc.maimed: "$extreme_frontiers.170.desc.negative$ obrażeń fizycznych."
 # BLACK CLOUDS
 BLACK_CLOUDS_CAT: "Czarne chmury"
 black_clouds_desc: "W atmosferze planety §Y[from.GetName]§! zaobserwowano gęste czarne chmury, poruszające się chaotycznie, niezależnie od kierunku i prędkości wiejących tam wiatrów. Pojawiają się na naszych skanach optycznych jedynie na chwilę i zawsze w tym samym momencie cyklu dobowego planety."
 extreme_frontiers.180.title: "Roje insektów"
 extreme_frontiers.180.desc: "Nietypowe czarne chmury w atmosferze planety §Y[from.GetName]§! okazały się gęstymi rojami dużych, mięsożernych insektów.\n\nTe skrzydlate drapieżniki gniazdują w załomach skał, które opuszczają raz dziennie, by posilać się wszelką materią organiczną znalezioną na stosunkowo jałowej powierzchni planety.\n\nDzięki wydajnemu metabolizmowi, który odwraca procesy apoptozy dzięki składnikom odżywczym, te stawonogi mogą przedłużać swoje życie w nieskończoność, o ile tylko regularnie się posilają."
 extreme_frontiers.180.desc.altered_metabolism: "W trakcie analizy prowadzonej w terenie, [Leader.GetName] pada ofiarą ukąszenia jednego z osobników badanego gatunku, po czym odnotowuje zdumiewające zmiany w swoim metabolizmie. Ten wyjątkowy gatunek może nas sporo nauczyć o regeneracyjnych właściwościach komórek organicznych."
 extreme_frontiers.180.b: "Wykopcie i pożryjcie je wszystkie."
 leader_trait_altered_metabolism: "Zmieniony metabolizm"
 leader_trait_altered_metabolism_desc: "Ekspozycja na obce czynniki w trakcie prac terenowych trwale wpłynęła na tego przywódcę."
 # SUBGLACIAL VIBRATIONS
 SUBGLACIAL_VIBRATIONS_CAT: "Podlodowcowe wibracje"
 subglacial_vibrations_desc: "Pod zamarzniętą, pozbawioną wszelkiego życia powierzchnią planety §Y[from.GetName]§! znajduje się rozległy podlodowcowy ocean. Pod warstwą zmarzliny udało nam się wykryć niskie, dudniące wibracje, które nie sposób przypisać do aktywności sejsmicznej."
 extreme_frontiers.190.title: "Gigantyczne płetwonogi"
 extreme_frontiers.190.desc: "Dzięki połączeniu głębinowej echolokacji i telemetrii sejsmicznej udało nam się namierzyć źródło niskich wibracji na planecie §Y[from.GetName]§!. W jej podlodowcowym oceanie ciekłego azotu żyją olbrzymie stada wielkich płetwonogich zwierząt, dobrze przystosowanych do życia w tym surowym środowisku.\n\nTe niezwykłe stworzenia rozmiarem i masą dorównują niewielkim statkom transportowym. Komunikują się ze sobą, emitując silny szum o niskiej częstotliwości, który może nieść się echem po całej planecie. Unikalna, bogata w kolagen warstwa tkanek chroni te zwierzęta przed odmrożeniami i kriogenicznymi oparzeniami, jednocześnie wzmacniając ich podwodne porykiwania.\n\nPonieważ nie mają żadnych naturalnych wrogów w tym odizolowanym ekosystemie, te morskie giganty są z natury ciekawskie i bardzo łagodne, a ponadto można je łatwo zwabić na powierzchnię, odtwarzając ich charakterystyczne odgłosy."
 extreme_frontiers.190.a: "Wyjątkowe odkrycie."
 extreme_frontiers.190.a.tt: "Odblokowuje budynek: ['building:building_pinniped_sanctuary']"
 extreme_frontiers.190.b: "Łatwy łup."
 building_pinniped_sanctuary: "Rezerwat płetwonogów"
 building_pinniped_sanctuary_desc: "Rezerwat gigantycznych płetwonogów schwytanych w oceanach ciekłego azotu na planecie [event_target:pinnipeds_home_planet.GetName]."
 # ELECTRIC WATERS
 ELECTRIC_WATERS_CAT: "Elektryczne wody"
 electric_waters_desc: "Orbitalne skany planety §Y[from.GetName]§! wykrywają chaotyczne sygnały elektryczne w głębinach jej mroźnych mórz.\n\nDalsze badania tego morskiego fenomenu powinny ujawnić więcej informacji."
 extreme_frontiers.200.title: "Koralowiec pod wysokim napięciem"
 extreme_frontiers.200.desc: "Udało się zidentyfikować źródła prądu elektrycznego w morskich głębinach planety §Y[from.GetName]§! - donosi §Y[Leader.GetName]§!.\n\nNa dnie oceanu żyje rozwinięty gatunek zimnowodnych koralowców o właściwościach elektrogeneracyjnych. Koralowce wytwarzają ładunki elektryczne dzięki swoim wyspecjalizowanym organellom - w ten sposób wabią mikroorganizmy, stanowiące ich pożywienie, a także komunikują się między sobą.\n\nNasze sondy badawcze stymulują fizjologię koralowców, które w odpowiedzi na wszelkie zmiany częstotliwości transmisji zwiększają ilość generowanej energii.\n\nOstrożnie modulując nasze interakcje z tym głębinowym gatunkiem, zdołamy zwiększyć produkcję energii na planecie, nie narażając przy tym jej delikatnego ekosystemu."
 # OBSIDIAN PLANET
 OBSIDIAN_PLANET_CAT: "Lśniący krajobraz"
 obsidian_planet_desc: "Wizualne skany planety §Y[from.GetName]§! pokazują kontynentalne płyty obsydianu pokrywające jej jałową powierzchnię - ponadto w górnych warstwach atmosfery wykrywamy znaczne nagromadzenie siarki.\n\nDokładniejsze badania geologiczne z pewnością dostarczą nam więcej informacji."
 extreme_frontiers.210.title: "Obsydianowe pustkowie"
 extreme_frontiers.210.desc: "Bazując na wynikach analiz warstw osadów na planecie §Y[from.GetName]§!, odkryliśmy, że ten niegdyś wulkaniczny świat przeszedł gwałtowne zlodowacenie, które ścięło jego powierzchniową warstwę lawy, tworząc skorupę z wulkanicznego szkła.\n\nLiczne kratery po uderzeniach sugerują, że przyczyną tego zjawiska było zderzenie planety z innymi obiektami kosmicznymi, na przykład z rojem meteorów. W formacjach obsydianu wykryliśmy wciąż uwięzione bąble gazów siarczanowych z kominów wulkanicznych zasklepionych w wyniku zlodowacenia.\n\nStosując precyzyjne metody górnicze, zdołamy wydobyć te zasoby i wykorzystać je do naszych potrzeb."
 # SHEARING FORCE
 SHEARING_FORCE_CAT: "Zerwana łączność"
 shearing_force_desc: "Sondy obserwacyjne wysłane do atmosfery planety §Y[from.GetName]§! przestały nadawać wszelkie dane. Obecnie nie wiadomo, gdzie dokładnie się znajdują.\n\nByć może dokładniejsze badania planety pozwolą nam odzyskać zapisy z sond."
 extreme_frontiers.220.title: "Ścinająca siła"
 extreme_frontiers.220.desc: "Udało się nam wyjaśnić przyczynę nagłego zniknięcia naszych sond na planecie §Y[from.GetName]§!.\n\nWarstwy rozmaitych gazów tworzące atmosferę planety cechują się znacznymi różnicami temperatur. Te ekstremalne zmiany wywołują rwący prąd przeciwny, przez co różne warstwy gazów poruszają się z wielką siłą w przeciwnych kierunkach.\n\nPonieważ warstwy gazu dodatkowo drastycznie różnią się gęstością, wszystko co przekracza ich granicę, zostaje rozerwane przez działające tam siły ścinające.\n\nSkoro już wiemy, czego się spodziewać, nasze wyposażenie może zostać odpowiednio zmodyfikowane, by wytrzymać te ekstremalne warunki. To pozwoli nam wykorzystać energię kinetyczną tego naturalnego zjawiska."
 # MISSING MASS
 MISSING_MASS_CAT: "Brakująca masa"
 missing_mass_desc: "Obliczenia masy planety §Y[from.GetName]§! są znacznie poniżej oczekiwanego zakresu wyników dla skalistej planety takich rozmiarów. Zalecane są dalsze badania."
 extreme_frontiers.230.title: "Głębinowe pierścienice"
 extreme_frontiers.230.desc: "Dokładniejsze badania geologiczne planety §Y[from.GetName]§! wykazały, że jej krzemowy płaszcz przecina sieć wielkich podziemnych nor.\n\nSondy badawcze odkryły, że tunele te są domem licznego gatunku głębinowych pierścienic, które żywią się materią skalną bogatą w krzemiany. Olbrzymie kolonie tych stworzeń dosłownie pożerają planetę od środka, a przetrawione resztki wydalają na orbitę, gdzie są rozwiewane przez kosmiczne wiatry.\n\nJeśli wytępimy te pierścienice, [controller.GetMinerPlural_lower] z naszej frakcji zyskają dostęp do łatwo dostępnych bogatych złóż krzemianów."
 extreme_frontiers.230.desc.terravore: "$extreme_frontiers.230.desc$ Mają imponujący apetyt, podobnie jak my."
 extreme_frontiers.230.a: "Odpalać wiertnice."
 extreme_frontiers.230.b: "Zbadajmy te fascynujące istoty."
 # LIFE IN DARKNESS
 LIFE_IN_DARKNESS_CAT: "Życie w ciemności"
 life_in_darkness_desc: "Planeta §Y[from.GetName]§! porusza się z rotacją synchroniczną. Połowa tego świata pogrążona jest na stałe w ciemnościach. Skany w podczerwieni wykrywają, że ta pozbawiona światła i uboga w składniki odżywcze strefa jest domem aktywnego organicznego ekosystemu."
 extreme_frontiers.240.title: "Przezroczysta ewolucja"
 extreme_frontiers.240.desc: "Pogrążona na stałe w ciemnościach strona planety §Y[from.GetName]§! jest unikalnym środowiskiem ewolucyjnym dla pewnych organizmów przystosowanych do tamtejszych surowych warunków.\n\nDzięki wyjątkowej wariacji chromosomów, miejscowa fauna jest kompletnie przezroczysta, nie posiada zmysłu wzroku i, by przetrwać, posługuje się zaawansowanymi formami echolokacji."
 extreme_frontiers.240.desc.non_homicidal: "$extreme_frontiers.240.desc$ Co za niesamowite mechanizmy adaptacyjne - [controller.GetResearcherPlural_lower] z naszej frakcji z pewnością dobrze wykorzystają zgromadzone dane."
 extreme_frontiers.240.a: "To odkrycie rzuca nowe światło."
 extreme_frontiers.240.b: "Pożremy te istoty."
 extreme_frontiers.240.c: "Eksterminować."
 # RAINBOW RIVERS
 RAINBOW_RIVERS_CAT: "Fluorescencyjne rzeki"
 rainbow_rivers_desc: "Wstępne skany planety §Y[from.GetName]§! pokazują płynące na jej powierzchni fluorescencyjne rzeki, które stale mienią się pełną gamą barw.\n\nDalsze badania dostarczą nam więcej danych o tym niezwykłym fenomenie."
 extreme_frontiers.250.title: "Barwna chemosynteza"
 extreme_frontiers.250.desc: "Analiza fluorescencyjnych rzek na planecie §Y[from.GetName]§! wykazała, że są one siedliskiem unikalnego gatunku mikrobów.\n\nOrganizmy te, metabolizując drogą chemosyntezy szkodliwe związki, wydalają wysoce reaktywne produkty uboczne, które zmieniają skład chemiczny rzecznych wód i tym samym powodują efektowne zmiany ich koloru.\n\nMechanizm ten pełni również rolę w komunikacji stworzeń - ich jaskrawy neonowy blask może np. oznaczać gotowość do rozrodu, dzięki czemu przemierzając toksyczne strumienie mogą wabić osobniki przeciwnej płci.\n\nTo fascynująca okazja do poszerzenia naszej wiedzy - [controller.GetResearcherPlural_lower] z naszej frakcji chcą prowadzić dalsze badania nad tymi organizmami i ich cyklem życiowym."
 # GASEOUS METALS
 GASEOUS_METALS_CAT: "Lotne metale"
 gaseous_metals_desc: "Atmosfera planety §Y[from.GetName]§! składa się głównie z rozmaitych metali w stanie gazowym. Jeśli lepiej zbadamy surowe warunki panujące na tej planecie, będziemy mogli wydobywać te cenne związki."
 extreme_frontiers.260.title: "Galwaniczne chmury"
 extreme_frontiers.260.desc: "Nietypowa atmosfera planety §Y[from.GetName]§! pochłonęła olbrzymie ilości promieniowania słonecznego, wywołując kaskadowy efekt cieplarniany na tyle silny, że miejscowe metale występują w stanie lotnym, a do tego wysoce reaktywnym.\n\nTe związki natychmiast weszły w reakcję z wysłanym przez nas sprzętem badawczym, pokrywając instrumenty cienką, lecz wytrzymałą metaliczną warstwą. Co zaskakujące, nasza aparatura nie uległa zniszczeniu w trakcie tego procesu.\n\n§Y[leader.GetName]§! sądzi, że ten naturalny proces galwanizacji można opanować i wykorzystać do wzmocnienia kadłubów okrętów całej frakcji §Y[controller.GetAdj&genitive]§!."
 ATMOSPHERIC_ELECTROPLATING: "Atmosferyczna galwanizacja"
 ATMOSPHERIC_ELECTROPLATING_DESC: "Obiekty wysłane do złożonej z lotnych metali atmosfery planety §Y[from.GetName]§! ulegają naturalnemu procesowi galwanizacji.\n\nTen unikalny proces jest niezwykle wydajny, a dzięki dalszym badaniom będzie można go odtworzyć w kontrolowanych warunkach, by wzmocnić wytrzymałość kadłubów statków całej frakcji [Root.Owner.GetAdj&genitive]."
 extreme_frontiers.265.title: "Wysokowydajny metal"
 extreme_frontiers.265.desc: "Odkryliśmy sposób na odtworzenie na przemysłową skalę nietypowego procesu galwanizacji występującego w reaktywnej atmosferze planety §Y[from.From.GetName]§!.\n\nKorzystając ze zdobytych przez nas danych, [Root.Owner.GetEngineerPlural] z naszej frakcji mogą teraz znacznie wzmacniać wytrzymałość niektórych metali bez poświęcania ich elastyczności ani zwiększania wagi.\n\nTe zaawansowane metody można wykorzystać przy budowie naszych statków kosmicznych."
 # CARBON ALLOTROPES
 CARBON_ALLOTROPES_CAT: "Alotropy węgla"
 carbon_allotropes_desc: "Dane spektroskopowe z planety §Y[from.GetName]§! wykrywają dużą zawartość rzadkich i złożonych alotropów węgla. Dokładniejsze badania pozwolą nam gruntownie skatalogować miejscowe minerały."
 extreme_frontiers.270.title: "Formacje grafenu"
 extreme_frontiers.270.desc: "Na planecie §Y[from.GetName]§! odkryliśmy bogate złoża grafenu. Ten rzadki alotrop węgla składa się jedynie z pojedynczej warstwy atomów, lecz cechuje się niezrównaną wytrzymałością i przewodnictwem.\n\nTen cenny nanomateriał formuje się na powierzchni w wyniku naturalnych procesów sublimacji chemicznych oparów występujących w nietypowej atmosferze tego §Yświata węglowego§!."
 extreme_frontiers.270.a: "Wydobądźmy je."
 # DIAMOND DUST
 DIAMOND_DUST_CAT: "Rozpędzona masa"
 diamond_dust_desc: "Obszerne skany planety §Y[from.GetName]§! wykrywają znaczne koncentracje rozpędzonej materii w głębokich warstwach dolnej troposfery.\n\nCiężko będzie określić źródło owych anomalii bez dokładniejszych badań."
 extreme_frontiers.280.title: "Diamentowe burze"
 extreme_frontiers.280.desc: "Zidentyfikowaliśmy źródło nietypowych odczytów masy na planecie §Y[from.GetName]§!.\n\nAtmosfera planety składa się głównie z lotnego metanu wysoko nasyconego węglem, który ulega krystalizacji w gęste diamentowe struktury w miarę wzrostu ciśnienia grawitacyjnego. Pod wpływem cykli sztormów szalejących na planecie, ten fenomen powoduje powstawanie błyskawicznie przemieszczających się burz diamentów.\n\nChoć łatwo będzie pozyskiwać owe diamenty do naszych własnych celów, §Y[leader.GetName]§! uważa, że dalsze badania ich gęstości i stopnia czystości dostarczą nam kolejnych przydatnych wyników."
 ATMOSPHERIC_DIAMONDS_PROJECT: "Atmosferyczne diamenty"
 ATMOSPHERIC_DIAMONDS_PROJECT_DESC: "Przebadawszy burze niosące masy ultragęstych diamentów na planecie §Y[from.GetName]§!, jesteśmy pewni, że zdołamy wykorzystać ich unikalne właściwości do rozwoju naszych technologii laserów."
 extreme_frontiers.285.title: "Diamentowa precyzja"
 extreme_frontiers.285.desc: "§Y[leader.GetName]§! kończy swoje badania nad ultragęstymi diamentami z planety §Y[from.From.GetName]§!.\n\nProces kompresji, pod wpływem którego powstają te kamienie, daje im unikalną, krystaliczną strukturę siatki. Dzięki temu są one niezwykle wydajne przy skupianiu i wzmacnianiu oscylującego światła o wysokiej częstotliwości.\n\nTen przełom naukowy będzie doskonałym atutem w rękach naszego imperium."
 # ETREME GEOLOGICAL TENSION
 GEOLOGICAL_TENSION_CAT: "Ekstremalna tensja geologiczna"
 geological_tension_desc: "Geologiczne skany planety §Y[from.GetName]§! wskazują, że skorupa tego świata stopionego znajduje się pod wpływem gigantycznego ciśnienia nagromadzonych sił tektonicznych. Zdaje się, że wkrótce dojdzie tam do istotnego zjawiska geologicznego na znaczną skalę."
 extreme_frontiers.290.title: "Zablokowany superwulkan"
 extreme_frontiers.290.desc: "Po dalszych badaniach ekstremalnej tensji sejsmicznej na planecie §Y[from.GetName]§! odkryliśmy superwulkan, który został zatkany częściowym zawaleniem się stożka wulkanicznego.\n\nOlbrzymie pokłady magmy wypełniły całkowicie wszelkie podziemne komory i teraz wywierają wielkie ciśnienie na skały blokujące główny komin. Zawalony materiał obecnie blokuje magmę pod powierzchnią, ale nie sposób przewidzieć, ile jeszcze utrzyma się ta delikatna równowaga.\n\nUwięziona roztopiona skała jest wyjątkowo bogata w rzadkie metale i złożone związki mineralne. §Y[leader.GetName]§! uważa, że będziemy w stanie bezpiecznie wydobywać te zasoby, jeśli doprowadzimy do kontrolowanej erupcji."
 extreme_frontiers.290.a: "Odblokować komin."
 extreme_frontiers.290.b: "Zróbmy pożytek z miejscowej aktywności geotermalnej."
 CONTROLLED_ERUPTION_PROJECT: "Kontrolowana erupcja"
 CONTROLLED_ERUPTION_PROJECT_DESC: "Zatkany superwulkan na planecie §Y[from.GetName]§! blokuje pod powierzchnią olbrzymie złoża bogatej w minerały magmy. Przeprowadzenie kontrolowanej erupcji pozwoli nam wydobywać te uwięzione zasoby."
 extreme_frontiers.295.title: "Mega erupcja"
 extreme_frontiers.295.desc: "Nawiercając szereg sztucznych szybów w różnych punktach zewnętrznego stożka superwulkanu na planecie §Y[from.From.GetName]§!, osłabiliśmy jego strukturę na tyle, że nie był już w stanie utrzymać olbrzymiej koncentracji magmy pod powierzchnią.\n\nGdy ciśnienie przekroczyło punkt krytyczny, efekty były spektakularne. Górna część wulkanu została całkowicie zniszczona wybuchem skompresowanej roztopionej skały.\n\nWypływającą lawę skierowaliśmy do starannie przygotowanych kanałów, skąd będzie wydobywana przez specjalistyczne maszyny górnicze."
 extreme_frontiers.295.a.default: "Spektakularne widowisko."
 extreme_frontiers.295.a.machine: "Operacja zakończona powodzeniem."
 # LAYERED ATMOSPHERE
 LAYERED_ATMOSPHERE_CAT: "Wybuchający olbrzym"
 layered_atmosphere_desc: "Skany planety §Y[from.GetName]§! wykryły sporadyczne erupcje łatwopalnych gazów w różnych jej rejonach, które utrudniają badania prowadzone zdalnie.\n\nMiejscowe anomalie wymagają bardziej gruntownych badań."
 extreme_frontiers.300.title: "Warstwowa atmosfera"
 extreme_frontiers.300.desc: "§Y[leader.GetName]§! odkrywa źródło gwałtownych erupcji na planecie §Y[from.GetName]§!.\n\nAtmosfera tego gazowego olbrzyma uformowała się tak, że pomiędzy gazowymi mezosferą i stratosferą zawieszona jest warstwa ciekłego metalicznego wodoru. W dolnej warstwie znajduje się lotny metan o większej gęstości, który utrzymuje ciecz w stanie zawieszenia.\n\nZ biegiem czasu dochodzi do wyładowań elektrycznych w warstwie metalicznego wodoru, co z kolei powoduje zapłon dolnej warstwy. Gdy ciśnienie przekracza punkt krytyczny, dochodzi do erupcji gazów, które wyrzucają wysokoprzewodzącą ciecz do górnej atmosfery, skąd rozwiewana jest po całej planecie, aż ponownie osiada w swej pierwotnej warstwie.\n\nNasze systemy śledzące mogą z łatwością monitorować wahania ciśnień, dzięki czemu będziemy w stanie wydobywać te cenne zasoby."
 # SOLIDIFIED PLASMA TRAILS
 PLASMA_TRAILS_CAT: "Nieregularne wyładowania"
 plasma_trails_desc: "Wzdłuż tektonicznych uskoków planety §Y[from.GetName]§! wykrywamy nieregularne wyładowania energii.\n\nNie zdołamy dokładnie określić źródła tych fenomenów prowadząc wyłącznie obserwacje z orbity - będą do tego potrzebne badania terenowe."
 extreme_frontiers.310.title: "Zastygnięte strumienie plazmy"
 extreme_frontiers.310.desc: "Analiza geologiczna planety §Y[from.GetName]§! określiła źródło nieregularnych wyładowań energii wykrytych podczas wstępnych obserwacji z orbity.\n\nWysoka aktywność tektoniczna planety generuje gwałtowne wyładowania elektrostatyczne w regionach z niestabilną zamarzniętą tundrą.\n\nTe swoiste wulkaniczne błyskawice strzelają w niebo, zamieniając otaczające powietrze w plazmę. Ekstremalne ciepło wygenerowane przez to zjawisko powoduje efekt szoku termicznego, którego ślady zastygają, tworząc struktury w kształcie piorunów.\n\nWykorzystując informacje pozyskane dzięki analizie geologicznej, będziemy w stanie dokładniej przewidywać te sejsmiczne erupcje i wykorzystywać to zjawisko do naszych celów."
 # CRYSTALLINE PLAINS
 CRYSTALLINE_PLAINS_CAT: "Aktywność kriowulkaniczna"
 crystalline_plains_desc: "Tektoniczna analiza planety §Y[from.GetName]§! wykrywa znaczną aktywność kriowulkaniczną na całym jej obszarze - jej natura wskazuje na lokalną anomalię."
 extreme_frontiers.320.title: "Krystaliczne równiny"
 extreme_frontiers.320.desc: "Dokładne badania geologiczne planety §Y[from.GetName]§! wykryły całe rzeki na wpół zamarzniętego amoniaku płynące pod jej skutą lodem skorupą. Rosnące ciśnienie geotermalne wypycha tę substancję przez szczeliny w kruchej powierzchni globu.\n\nErupcje podziemnych rzek rozpylają po powierzchni planety mieszankę niestabilnych oparów i przesyconego amoniakiem błota. Wystawione na działanie ekstremalnych temperatur powierzchniowych owe błoto całkowicie zamarza, formując rozległe połacie łatwych do wydobycia, cennych kryształów."
 # SUPERMASSIVE GIANT
 SUPERMASSIVE_GIANT_CAT: "Supermasywny olbrzym"
 supermassive_giant_desc: "§Y[from.GetName]§! to supermasywny gazowy olbrzym, którego silna studnia grawitacyjna ściągnęła na orbitę tysiące rozmaitych obiektów. Być może warto je skatalogować."
 extreme_frontiers.330.title: "Kosmiczne odpady"
 extreme_frontiers.330.desc: "Planeta §Y[from.GetName]§! uwięziła na swej orbicie masę malutkich księżyców, asteroid i kosmicznych szczątków. Datowanie radioizotopowe sugeruje, że wszystkie te obiekty zostały złapane w studnię grawitacyjną planety, gdy tysiące lat temu przelatywały przez ten układ.\n\nW trakcie katalogowania tych obiektów znaleźliśmy kilka pradawnych sond naukowych bardzo prostej konstrukcji - zapewne śladów po cywilizacji, która czyniła pierwsze kroki w badaniach kosmosu.\n\nWiększość ich banków danych uległa awariom lub fizycznym uszkodzeniom od kolizji z innymi obiektami, ale jeden zawierał serię zdjęć powierzchni planety [from.GetName] wykonanych na przestrzeni setek lat."
 extreme_frontiers.330.a: "Fascynujące znalezisko."
 extreme_frontiers.330.b: "Na złom."
 # INVISIBLE PLANET
 INVISIBLE_PLANET_CAT: "Nieregularność orbity"
 invisible_planet_desc: "W trajektorii orbitalnej planety §Y[from.GetName]§! zaobserwowano pewną niewielką, acz powtarzającą się nieregularność, co sugeruje, że jest ona poddawana działaniu jakiejś dotąd nieodkrytej znacznej siły grawitacyjnej.\n\nZalecamy przeprowadzenie dokładniejszych badań okolicznej przestrzeni."
 extreme_frontiers.340.title: "Niewidzialna planeta"
 extreme_frontiers.340.desc: "W toku dalszej analizy układu §Y[from.solar_system.GetName]§! odkryliśmy, że orbity wszystkich tamtejszych planet wykazują podobne nieregularności.\n\nDzięki triangulacji sił grawitacyjnych określonych w oparciu o nietypowe ruchy ciał niebieskich, udało nam się odkryć źródło przyciągania - to dotąd niezaobserwowany glob, któremu nadaliśmy nazwę: §Y[invisible_planet.GetName]§!.\n\nTen świat posiada nietypową powierzchnię pokrytą cząstkami węglowej sadzy, które nie odbijają żadnych promieni światła ani fal radiowych, czyniąc planetę praktycznie niewidoczną dla skanerów dalekiego zasięgu.\n\nTe naturalnie występujące polimery mają nadzwyczajne właściwości pochłaniające."
 extreme_frontiers.340.desc.default: "$extreme_frontiers.340.desc$ Te materiały stanowią wyjątkową okazję badawczą."
 extreme_frontiers.340.desc.first_contact: "$extreme_frontiers.340.desc$ Wydobędziemy je i przebadamy pod kątem potencjalnych zastosowań w technologiach maskowania."
 # SURVIVAL POD
 SURVIVAL_POD_WARM_CAT: "Przerobiona stacja polowa"
 SURVIVAL_POD_COLD_CAT: "Przerobiona stacja polowa"
 survival_pod_desc: "Podczas badania jałowej powierzchni świata §Y[from.GetName]§! znaleziono przerobioną stację polową, która początkowo była tymczasowym laboratorium badawczym - widać jednak, że znacznie przekroczyła swój czas przydatności. Słabe promieniowanie cieplne wskazuje, że część tej instalacji wciąż działa."
 extreme_frontiers.350.title: "Samotny rozbitek"
 extreme_frontiers.350.desc: "Wyprawa na powierzchnię świata §Y[from.GetName]§! odkryła przerobioną stację polową i jej samotną mieszkankę.\n\nPodała się za naukowczynię, która utknęła w placówce, przetrwała wiele lat w surowym otoczeniu, a teraz może podzielić się swoją wiedzą z imperium [root.Owner.GetName] - w zamian za ratunek."
 extreme_frontiers.350.a: "Jej doświadczenie to spory atut."
 extreme_frontiers.350.b: "Podarujcie jej prom i potrzebne zapasy."
 extreme_frontiers.350.c: "Pozostawcie ją na miejscu i obserwujcie."
 extreme_frontiers.350.d: "Urocze. Zniszczyć ten schron."
 extreme_frontiers.352.title: "$NAME_survivalist_scru$"
 extreme_frontiers.352.desc: "[scru_species.GetClass] wychodzi w stanie wycieńczenia ze swojej stacji polowej przerobionej na schronienie. Kiedy opowiada o swoich przeżyciach na świecie §Y[from.From.GetName]§!, dźwięki, które wydają jej [scru_species.GetMouthName] brzmią chrypliwie, słowa są urywane.\n\n\"Wybaczcie. Nie... rozmawiałam z nikim od wielu lat...\""
 extreme_frontiers.352.a: "Jak tu utknęłaś?"
 extreme_frontiers.352.a.response: "Badałam świat [from.From.GetName], katalogowałam wyjątkowe podłoże skalne. Moja załoga powiedziała, że wybiera się na szybki patrol naszym pojazdem eksploracyjnym. Uwierzyłam im. Dopiero po kilku dniach zamartwiania się dotarło do mnie, co się stało. Oni uciekli i polecieli do domu."
 extreme_frontiers.352.b: "W jaki sposób udało ci się tak długo tu przetrwać?"
 extreme_frontiers.352.b.response: "To wspaniałe, co można osiągnąć dzięki modyfikacji przepuszczalności komórek i nadekspresji białek szoku cieplnego... Potem wystarczyło wprowadzić makroautofagię do moich zmodyfikowanych komórek, a dzięki występowaniu sodu na tej planecie, mogłam tworzyć wiele smacznych posiłków."
 extreme_frontiers.352.c: "Nie chcesz wrócić do swoich rodaków?"
 extreme_frontiers.352.c.response: "Oni nie zasługują na przełomowe odkrycia, których dokonałam na tej skale. Nie interesuje mnie, jakie obłudne powody sprawiły, że postanowili mnie tu zostawić."
 extreme_frontiers.352.d: "Co możesz dla nas zrobić?"
 extreme_frontiers.352.d.response: "Mam już dość pracy w prowizorycznym laboratorium. Chcę zobaczyć nowe światy... Z kosmosu."
 extreme_frontiers.352.e: "Zwerbuj postać: $NAME_survivalist_scru$"
 extreme_frontiers.352.e.custom_tooltip: "§Y$NAME_survivalist_scru$§! dołącza do naszego imperium jako §Hprzywódca§!."
 NAME_survivalist_scru: "Scru"
 survivalist_scru_desc: "Utalentowana badaczka i mistrzyni przetrwania w ekstremalnych warunkach."
 leader_trait_hardened_survivalist: "Zaprawiona surwiwalistka"
 leader_trait_hardened_survivalist_desc: "Ta przywódczyni posiada niezrównaną wiedzę o niegościnnych środowiskach."
 # Infernal Tornadoes
 INFERNAL_TORNADOES_CAT: "Ekstremalne temperatury"
 infernal_tornadoes_desc: "Skany planety §H[from.GetName]§! pokazują rozległe, szybko wędrujące burze o wysokim ciśnieniu.\n\nBurze te emitują ekstremalnie silne sygnatury cieplne. Tylko dokładne badania pozwolą określić, czy to zjawisko o podłożu naturalnym, czy mamy do czynienia z dotąd nieznaną formą życia."
 extreme_frontiers.360.title: "Ogniste tornada"
 extreme_frontiers.360.desc: "Udało nam się odkryć źródło ekstremalnych sygnatur cieplnych na planecie §H[from.GetName]§!.\n\nPo całej powierzchni planety rozsiane są gejzery, które strzelają łatwopalnym lotnym wodorem wydobywającym się z głębin. Ilekroć dochodzi do erupcji gejzerów, tutejsza wysoka temperatura powoduje zapłon gazu, przez co w niebo strzelają gigantyczne kolumny płomieni.\n\nPod dodatkowym wpływem ciśnienia atmosferycznego wybuchy generują porywiste prądy wiatru, które niosą ze sobą strumienie ognia, tworząc olbrzymie ogniste tornada.\n\nChoć te niszczycielskie fenomeny mają podłoże naturalne, to [Root.Owner.GetResearcherPlural_lower] sądzą, że będziemy mogli wykorzystać je w praktyczny sposób, sztucznie odtwarzając takie tornada i generując dzięki nim znaczne ilości energii kinetycznej."
 INFERNAL_CATALYSTS_PROJECT: "Piekielne katalizatory"
 INFERNAL_CATALYSTS_PROJECT_DESC: "Dokładniej badając warunki w jakich powstają ogniste tornada na planecie §H[from.GetName]§!, będziemy w stanie odtworzyć te fenomeny w kontrolowanych warunkach, by czerpać z nich pożytek."
 extreme_frontiers.365.title: "Rezonatory piroklastyczne"
 extreme_frontiers.365.desc: "§Y[from.Leader.GetName]§! odkrywa sposób, jak w kontrolowanych warunkach odtworzyć i wykorzystać zjawisko ognistych tornad zaobserwowane na planecie §Y[from.From.GetName]§!.\n\nDzięki temu przełomowi w nauce, będziemy mogli wykorzystywać nasze bazy gwiezdne do zwiększania ilości energii produkowanej przez wszelkie światy stopione znajdujące się w tym samym systemie."
 extreme_frontiers.365.desc.has_furnace: "Teoria naukowa w wielu miejscach jest zbieżna z naszą obecną wiedzą o §Hpiecach łukowych§!, co otwiera nowe możliwości budowania poza planetą."
 extreme_frontiers.365.desc.default: "Wnioski naukowe wyciągnięte z tego odkrycia znajdą wiele zastosowań przy opracowywaniu technologii §Hpieców łukowych§!. [Root.Owner.GetEngineerPlural] ogłaszają, że już są w stanie wdrożyć teorię przy praktycznych procesach."
 tech_pyroclastic_resonation: "Rezonans piroklastyczny"
 tech_pyroclastic_resonation_desc: "Poprzez ujarzmianie ekstremalnych ilości promieniowania cieplnego generowanego przez światy stopione, nasze bazy gwiezdne mogą wyjątkowo wydajnie zwiększać produkcję energii w swoich układach."
 sm_pyroclastic_resonator: "Piroklastyczny rezonator"
 sm_pyroclastic_resonator_desc: "Termalne rezonatory, które mogą zwiększyć produkcję energii z dowolnego świata stopionego znajdującego się w układzie gwiezdnym.\nProdukowana $i_energy$ skaluje się wraz z liczbą ['concept_pc_molten', światów stopionych] w układzie."
 # MAGMA MEGAFAUNA
 MAGMA_MEGAFAUNA_CAT: "Niestabilna geografia"
 magma_megafauna_desc: "Skany planety §Y[from.GetName]§! wykryły całe stopione sekcje powierzchni, które nieustannie przemieszczają się na duże odległości.\n\nGruntowne badania pozwolą nam zrozumieć ten nietypowy geologiczny fenomen."
 extreme_frontiers.370.title: "Stopiona megafauna"
 extreme_frontiers.370.desc: "Skany tektonicznych anomalii na planecie §Y[from.GetName]§! wykazały, że źródłem tych fenomenów są migracje wielkich stad krzemowej megafauny.\n\nPokonując olbrzymie dystanse, te masywne stworzenia od czasu do czasu nurkują w jeziorach lawy, by pożywiać się swoim ulubionym pokarmem: skalnymi osadami bogatymi w §Hlotne pyłki§!. Śledząc trasy ich migracji, będziemy mogli wydobywać nadmiar tych osadów przy minimalnym wpływie na ekosystem planety.\n\nGrube zewnętrzne pancerze tych istot wytrzymują ekstremalne temperatury. Dokładniejsze badania nad ich cyklem życiowym mogą dostarczyć nam fascynujących informacji."
 LAVA_DIVERS_PROJECT: "Lawowi pływacy"
 LAVA_DIVERS_PROJECT_DESC: "Megafauna z planety §Y[from.GetName]§! jest w stanie przetrwać w nieprzyjaznym środowisku tego świata stopionego i nurkować głęboko pod powierzchnię gęsto rozsianych tam jezior lawy.\n\nBadania nad naturalnym pancerzem tych stworzeń mogą dostarczyć nam nowych danych na temat ochrony przed ekstremalnie wysokimi temperaturami."
 extreme_frontiers.375.title: "Magmowe pancerze"
 extreme_frontiers.375.desc: "Dokładne badania nad unikalną megafauną planety §Y[from.From.GetName]§! dostarczyły nam nowych danych z zakresu termodynamiki, które możemy wykorzystać w naszych stoczniach.\n\nBogata w pyłki dieta tych stworzeń powoduje formowanie się gęstych krzemianowych struktur na powierzchni ich pancerzy, wzmocnionych dodatkowo naturalnie wytrącającymi się trudnotopliwymi substancjami.\n\nZebrawszy liczne próbki okresowo zrzuconych skorup, [Root.Owner.GetEngineerPlural] mogą teraz odtworzyć ich biomechaniczne właściwości w konstrukcji powłok naszych kadłubów."
 # PLANET THRUSTERS
 PLANET_THRUSTERS_CAT: "Zawieszona maszyneria"
 planet_thrusters_desc: "W górnych warstwach atmosfery planety §Y[from.GetName]§! wykryliśmy szereg zawieszonych dużych cylindrycznych maszyn. Wyglądają na nieaktywne i pozbawione wszelkich załóg."
 extreme_frontiers.380.title: "Planetarne silniki manewrowe"
 extreme_frontiers.380.desc: "Każda z porzuconych maszyn znalezionych na planecie §Y[from.GetName]§! stanowi samodzielny komponent silników manewrowych. W górnej atmosferze unosi się łącznie ponad tysiąc takich urządzeń.\n\nTe wykonane ze specjalnych materiałów skomplikowane aparaty fuzyjne miały wciągać lotny wodór z atmosfery planety i wykorzystywać ten gaz jako paliwo do generowania siły ciągu. Większość machin nosi ślady uszkodzeń wywołanych przeciążeniem.\n\nNasza analiza wykazała, że wszystkie urządzenia ustawiono tak, aby wywierały nacisk na samą planetę - to sugeruje, że ta pradawna instalacja miała za zadanie zmienić tor orbity tego świata.\n\nChoć nie nadają się już do tak monumentalnego celu, to być może uda nam się przerobić mniej uszkodzone modele tak, aby wypalić gazowe warstwy planety i w ten sposób odsłonić jej bogaty w minerały rdzeń."
 extreme_frontiers.380.a: "Zezłomować wszystko."
 extreme_frontiers.380.b: "Przerobić te urządzenia."
 REPURPOSE_THRUSTERS_PROJECT: "Przerobione planetarne silniki manewrowe"
 REPURPOSE_THRUSTERS_PROJECT_DESC: "Przerabiając uszkodzoną instalację uszkodzonych silników manewrowych na planecie §Y[from.GetName]§!, możemy wypalić warstwy wodoru tego gazowego olbrzyma, odsłaniając jego stały rdzeń bogaty w zasoby."
 extreme_frontiers.385.title: "Gazy wypalone"
 extreme_frontiers.385.desc: "Udało nam się zreperować część z uszkodzonych silników na planecie §Y[from.From.GetName]§! i skalibrować je tak, aby generowały taką samą siłę ciągu w przeciwnych zwrotach.\n\nPo aktywacji te potężne urządzenia fuzyjne zaczęły gwałtownie zasysać lotny wodór, stopniowo spalając gazową atmosferę planety i odsłaniając jej bogaty w minerały rdzeń, który jednak wciąż był rozgrzany do ekstremalnie wysokich temperatur."
 extreme_frontiers.385.tt: "Dodano modyfikator: §Y$chthonian_planet$§!"
 extreme_frontiers.385.a: "Imponujące."
 # BACKWARDS ORBIT
 BACKWARDS_ORBIT_CAT: "Odwrócona orbita"
 backwards_orbit_desc: "Planeta §Y[from.GetName]§! krąży wokół swojej gwiazdy w przeciwnym kierunku w porównaniu z pozostałymi planetami w układzie. To sugeruje, że nie została uformowana w tym samym czasie, co reszta tutejszych ciał niebieskich.\n\nPotrzebne będą dalsze badania, aby odkryć pochodzenie tej planety."
 extreme_frontiers.390.title: "Wędrująca planeta"
 extreme_frontiers.390.desc: "Skład geologiczny planety §Y[from.GetName]§! nie pasuje do pozostałych planet w jej pobliżu. Pasuje jednak doskonale do rozmaitych ciał niebieskich w sąsiednim układzie §Y[event_target:wandering_planet_origin.GetName]§!. To zapewne tam powstał ten glob.\n\nNa powierzchni planety znajduje się gigantycznych rozmiarów krater po uderzeniu, co sugeruje, że została ona wyrzucona ze swojej pierwotnej orbity przez kolizję ze szczególnie wielką asteroidą. Dryfująca samotnie planeta została później pochwycona przez studnię grawitacyjną układu [from.System.Star.GetName], gdzie zaczęła krążyć wokół gwiazdy po nietypowej, odwróconej orbicie.\n\nTa wyjątkowa planeta przebywała w dwóch różnych układach gwiezdnych od momentu swego powstania, co potencjalnie czyni z niej prawdziwą skarbnicę informacji naukowych wartą dalszych badań."
 # VAPOR PLUMES
 VAPOR_PLUMES_CAT: "Pióropusze oparów"
 vapor_plumes_desc: "Zaobserwowano tysiące anomalnych pióropuszy oparów unoszących się z powierzchni planety §Y[from.GetName]§!, aż do górnych warstw jej cienkiej atmosfery.\n\nZalecamy przeprowadzenie dalszych badań tego fenomenu."
 extreme_frontiers.400.title: "Kriowulkaniczne gejzery"
 extreme_frontiers.400.desc: "Smugi oparowe zaobserwowane na planecie §Y[from.GetName]§! są rezultatem wzmożonej aktywności kriowulkanicznej w głębi dolnego płaszcza. Erupcje wyrzucają w górę olbrzymie kolumny lotnych mieszanek azotu i amoniaku.\n\nGazowe pióropusze wznoszą się aż do granic atmosfery, gdzie wiatry słoneczne powodują ich nagłe spłaszczenie.\n\nBadając niewielkie różnice w składzie chemicznym tych wyjątkowych obłoków oparów, będziemy mogli dowiedzieć się więcej o złożonych procesach geologicznych zachodzących w jądrze planety."
 # FIBROUS ATMOSPHERE
 FIBROUS_ATMOSPHERE_CAT: "Uszkodzone pomiary"
 fibrous_atmosphere_desc: "Wstępne skany planety §Y[from.GetName]§! zwracają uszkodzone dane, których nasze sensory nie są w stanie poprawnie odczytać. Na razie nie jesteśmy w stanie jednoznacznie wskazać źródła tych zakłóceń. Będą potrzebne dokładniejsze badania."
 extreme_frontiers.410.title: "Włóknista atmosfera"
 extreme_frontiers.410.desc: "Dokładne badania planety §Y[from.GetName]§! odkryły źródło zakłóceń danych, które wystąpiły w trakcie naszych wstępnych skanów.\n\nGórną warstwę atmosfery planety tworzą gęste chmury włóknistych minerałów. Te długie, nitkowate żyły powstają w niższych warstwach gazowego giganta, gdzie wysokie ciśnienie kompresuje związki chemiczne, formując z nich wysoko przewodzące mineralne pasma.\n\nKrążąc w atmosferze, włókna kumulują energię elektrostatyczną, co od czasu do czasu powoduje wyładowania. Możemy teraz wydobywać te skompresowane zasoby i wykorzystywać je do naszych potrzeb."
 # EXPLODING SKIES
 EXPLODING_SKIES_CAT: "Ogromne uderzenia gorąca"
 exploding_skies_desc: "Skany planety §Y[from.GetName]§! wykrywają ekstremalnie fenomeny meteorologiczne. Na całej powierzchni planety występują sporadyczne, lecz ostre skoki gorąca.\n\nWarto dokładniej to zbadać."
 extreme_frontiers.420.title: "Wybuchowy horyzont"
 extreme_frontiers.420.desc: "Dokładne obserwacje planety §Y[from.GetName]§! wykryły przyczyny meteorologicznych fal gorąca.\n\nKominy geotermalne i gejzery rozsiane po całej powierzchni planety emitują łatwopalne gazy, które następnie akumulują się w atmosferze. Wyładowania elektrostatyczne działają na nie jak zapalniki, wywołując wybuchowe burze, pustoszące niebo tej planety.\n\n Dzięki przebadaniu tych reakcji, [Root.Owner.GetEngineerPlural] zyskują nowe dane naukowe dotyczące zjawisk termodynamicznego zapłonu, które będzie można zastosować przy pracach nad systemami napędowymi naszej floty."
 extreme_frontiers.420.desc.traumatized: "Niestety, w toku tych niebezpiecznych badań [leader.GetName] ponosi uszczerbek na zdrowiu w postaci ciężkiej traumy."
 extreme_frontiers.420.desc.maimed: "Niestety, w toku tych niebezpiecznych badań [leader.GetName] ponosi uszczerbek na zdrowiu w postaci ciężkich obrażeń fizycznych."
 # CHTHONIAN PRESERVATION
 CHTHONIAN_PRESERVATION_CAT: "Chtoniczna biomasa"
 chthonian_preservation_desc: "Badania globu §Y[from.GetName]§! dowodzą, że jest to planeta chtoniczna - dawny gazowy olbrzym, odarty z atmosfery przez silne promieniowanie gwiazdy §Y[from.System.Star.GetName]§!.\n\nMimo to na powierzchni tej planety wykryliśmy szczątkowe ślady biomasy. Warto dokładniej to zbadać."
 extreme_frontiers.430.title: "Chtoniczna mumifikacja"
 extreme_frontiers.430.desc: "Ślady biomasy na planecie §Y[from.GetName]§! okazują się skamieniałymi szczątkami ławicy tijanek.\n\nZapewne żerowały na tym gazowym olbrzymie w końcowych stadiach rozpraszania jego atmosfery. Ich ciała zostały zalane ciekłym metalem, który następnie zastygł.\n\nChoć wewnątrz tych skorup pozostała jeszcze odrobina biologicznej materii, to długotrwałe działanie gwiezdnego oraz chtonicznego promieniowania przeobraziło większość ich zwłok w unikalny biometaliczny stop.\n\n§Y[leader.GetName]§! uważa, że dokładniejsze badania tych rzadkich skamieniałości pozwolą nam odkryć nowe metody produkcji stopów z materiałów pochodzenia biologicznego."
 CHTHONIAN_PETRIFICATION_PROJECT: "Chtoniczne skamieliny"
 CHTHONIAN_PETRIFICATION_PROJECT_DESC: "Badając skamieniałe szczątki ławicy tijanek znalezione na planecie §Y[from.GetName]§!, [Root.Owner.GetScientistPlural] starają się w pełni zrozumieć efekty kosmicznego oraz chtonicznego promieniowania na biologiczną materię. Potencjalnie pozwoli nam to opracować nowe metody produkcji zaawansowanych stopów."
 extreme_frontiers.435.title: "Bioprodukowane stopy"
 extreme_frontiers.435.desc: "Po dokładnym przebadaniu skamieniałych szczątków tijanek na planecie §Y[from.From.GetName]§!, z powodzeniem opracowaliśmy nowe metody produkcji stopów poprzez symulację efektów długotrwałego działania kombinacji kosmicznego i chtonicznego promieniowania.\n\nTen przełom pozwoli nam wykorzystywać biologiczną materię jako podstawowy surowiec w procesie tworzenia stopów, a wyprodukowane w ten sposób materiały mogą śmiało konkurować z tymi wytworzonymi metodami konwencjonalnymi."
 tech_alloy_fossilization: "Fosylizacja stopów"
 tech_alloy_fossilization_desc: "Wystawiając biologiczną materię na symulowane promieniowanie kosmiczne i chtoniczne, możemy fosylizować struktury komórkowe w użyteczne metaliczne stopy."
 tech_alloy_fossilization_tt: "§HOdblokowuje budynek§!: ['building:building_bio_furnace']"
 building_bio_furnace: "Piec biohutniczy"
 building_bio_furnace_desc: "Wykorzystując wysokie poziomy symulowanego promieniowania kosmicznego, ten zakład jest w stanie przerabiać materię biologiczną na stopy metali."
 # ORBITAL RESONANCE
 ORBITAL_RESONANCE_CAT: "Idealna proporcja"
 orbital_resonance_desc: "Okresy orbitalne obiektów w układzie §Y[from.System.GetName]§! mają zadziwiający schemat. Każda planeta okrąża gwiazdę w dokładnie dwa razy tyle czasu, ile jej poprzedni sąsiad z dokładnością do tysięcznej części sekundy.\n\nTa nietypowo idealna proporcja stanowi anomalię wartą dalszych badań."
 extreme_frontiers.440.title: "Orbitalny rezonans"
 extreme_frontiers.440.desc: "Układ §Y[from.System.GetName]§! stanowi najdoskonalszy przykład orbitalnego rezonansu, na jaki kiedykolwiek natrafiliśmy.\n\nKażda z planet cyklicznie oddziałuje grawitacyjnie na swojego sąsiada, gdy dwa ciała znajdują się w najbliższym położeniu, generując efekt katapulty i wzajemnie zależnego pędu. Niespotykana stabilność tych oddziaływań skutkuje dokładnie skoordynowanymi orbitami.\n\nTen układ stanowi doskonałe pole do badań nad przyspieszaniem przelatujących obiektów przez planetarne pola grawitacyjne. Zgromadzone tu dane będziemy mogli potencjalnie wykorzystać przy manewrowaniu statkami."
 GRAVITY_ASSIST_PROJECT: "Badania nad asystą grawitacyjną"
 GRAVITY_ASSIST_PROJECT_DESC: "Badanie idealnego efektu rezonansu orbitalnego w okolicach celu: §Y[from.GetName]§! umożliwi nam lepsze zrozumienie manewrów wykorzystujących asystę grawitacyjną."
 extreme_frontiers.445.title: "Zaawansowane koncepcje procy orbitalnej"
 extreme_frontiers.445.desc: "Po przebadaniu unikalnego efektu rezonansu magnetycznego w układzie §Y[from.From.System.GetName]§! znacznie udoskonaliliśmy nasze metody obliczania optymalnych tras lotu statków.\n\nTe nowe modele pozwolą nam lepiej wykorzystywać pola grawitacyjne planet do przyśpieszania i spowalniania statkami przy prędkościach podświetlnych."
 tech_orbital_maneuvers: "Zaawansowane manewry orbitalne"
 tech_orbital_maneuvers_desc: "Podróże z prędkością podświetlną mogą być dodatkowo optymalizowane dzięki złożonym obliczeniom, maksymalnie wykorzystującym studnie grawitacyjne planet."
 #############
 # Arc Sites #
 #############
 # ABSOLUTE ZERO
 site_absolute_zero: "Zero absolutne"
 site_absolute_zero_desc: "Topograficzne skany planety §Y[from.Planet.GetName]§! wykrywają strefę ekstremalnie niskich temperatur bliskich zeru absolutnemu, zlokalizowaną w pewnym podziemnym regionie planety.\n\nDokładniejsze badania wnętrza planety powinny dostarczyć nam więcej odpowiedzi."
 extreme_frontiers.1000.title: "Lodowata blokada"
 extreme_frontiers.1000.desc: "Poszukując źródła ekstremalnie niskich temperatur na planecie §Y[from.Planet.GetName]§!, §Y[leader.GetName]§! odkrywa wejście do pradawnej podziemnej struktury.\n\nBramę blokuje masa zamarzniętych skał i lodowych kolumn - zdaje się, że przez te zwały budowla pozostaje niedostępna i odcięta od świata już od tysięcy lat.\n\nRoztopienie części warstw przy wejściu odsłania szczeliny w blokadzie, z których sączą się opary dwutlenku węgla. Nasza aparatura wykrywa za blokadą cały rozległy kompleks. [leader.GetName] sądzi, że wewnątrz znajdziemy źródło ekstremalnego zimna."
 extreme_frontiers.1000.a: "Przebijmy się przez blokadę."
 extreme_frontiers.1005.title: "Zakrzepli w czasie"
 extreme_frontiers.1005.desc: "§Y[leader.GetName]§! z powodzeniem przebija się przez lód blokujący wejście do pradawnej struktury na planecie §Y[from.Planet.GetName]§!.\n\nW środku znajduje dziesiątki zamarzniętych zwłok przedstawicieli nieznanej, gadopodobnej rasy. Ich powykręcane ciała zamarzły przylgnięte do ścian, a gdzieniegdzie widać ślady pazurów, co sugeruje desperacką próbę ucieczki.\n\nŹródło oparów z suchego lodu musi znajdować się głębiej pod ziemią - w głąb kompleksu prowadzą spiralne schody."
 extreme_frontiers.1010.title: "Lodowy grobowiec"
 extreme_frontiers.1010.desc: "W głębinach zamarzniętego kompleksu §Y[leader.GetName]§! odkrywa obszerną centralną komnatę, pełną prymitywnych, lecz teoretycznie działających komór kriogenicznych.\n\nPanujący tu ekstremalny chłód znacznie przekracza bezpieczne normy temperatur przewidziane dla tego typu urządzeń. Pasażerowie komór zmarli tysiące lat temu.\n\nTe komory, których nie pochłonęły lód i śnieg, mają u podstawy pokryte pismem płytki opisujące tytuł i rangę swych lokatorów. Komory dla najwyżej postawionych dygnitarzy znajdują się najbliżej dużej komory centralnej, całkowicie uwięzionej pod warstwą śniegu i lodu."
 extreme_frontiers.1010.a: "Zbadajcie komorę centralną."
 extreme_frontiers.1015.title: "Zamarznięty monarcha"
 extreme_frontiers.1015.desc: "§Y[leader.GetName]§! przebija się do dużej komory centralnej w samym sercu lodowego grobowca na planecie §Y[from.Planet.GetName]§!.\n\nWewnątrz odkryliśmy grób głowy starożytnego królewskiego rodu, do którego odwoływały się teksty odkryte w poprzedniej komnacie. Wraz z władcą zamrożono tu dziesiątki jego przybocznych sług, których ceremonialnie ustawione komory kriogeniczne zdobią ściany pomieszczenia.\n\nTechnologiczny sarkofag martwego władcy podłączony jest skomplikowaną siecią rur i przewodów do starożytnej maszyny. Samo urządzenie osadzone jest w ogromnej bryle lodu, której temperatura jest niebezpiecznie niska nawet dla naszych instrumentów badawczych.\n\nCo spowodowało ewidentną awarię tego kompleksu i jaki ma on związek z zamarzniętym rdzeniem planety? Wyjaśnienie tych kwestii wymaga dalszych badań."
 extreme_frontiers.1015.a: "Co tu poszło nie tak?"
 extreme_frontiers.1020.title: "Kriogeniczna katastrofa"
 extreme_frontiers.1020.desc: "Analiza centralnej komnaty lodowego grobowca na planecie §Y[from.Planet.GetName]§! pozwoliła odkryć przyczyny tamtejszej tragedii.\n\nKriogeniczna maszyneria wykorzystuje zjawiska dynamiki subtermalnej napędzane ekstremalnie niskimi temperaturami rdzenia planety. Po tym, jak monarcha zapadł na śmiertelną chorobę, został złożony do snu wraz ze swoją świtą, którą miano obudzić po wynalezieniu lekarstwa.\n\nChoć wynalazek tych istot opierał się na solidnych podstawach teoretycznych, doszło do niekontrolowanej endotermicznej reakcji, gdy opracowany przez nie unikalny płyn termocyrkulacyjny wyciekł do planetarnego rdzenia. To spowodowało zabójczy spadek temperatury, który w mgnieniu oka zamroził cały kompleks.\n\nZaadaptowaliśmy ich bazową teorię i znacznie ją ulepszyliśmy, dzięki czemu dokonaliśmy przełomu w zaawansowanej technologii kriogenicznej, którą będzie można wykorzystywać na zamarzniętych światach."
 tech_cryovault: "Stacje mieszkalne na światach zmarzniętych"
 tech_cryovault_desc: "Wykorzystując zjawiska dynamiki subtermalnej występujące w środowisku zamarzniętych światów, możemy tworzyć bardziej przyjazne warunki mieszkalne w zimnych klimatach."
 tech_cryovault_tt: "Odblokowuje budynek: ['building:building_cryovault']"
 building_cryovault: "Schron kriogeniczny"
 building_cryovault_desc: "Uszczelniona stacja mieszkalna, która wykorzystuje zjawiska dynamiki subtermalnej w mroźnych klimatach, aby stworzyć w pełni kontrolowane, wygodne warunki mieszkalne."
 # TOXIC MATRIX
 site_toxic_matrix: "Toksyczne sadzawki"
 site_toxic_matrix_desc: "Powierzchnia planety §Y[from.Planet.GetName]§! jest niemal w całości pokryta siecią niewielkich, okrągłych sadzawek wypełnionych ciekłymi substancjami. Ich dokładne, równe rozmieszczenie sugeruje, że są owocem rozmyślnego projektu inżynieryjnego a nie dziełem sił natury. Być może ekspedycja polowa dostarczy nam więcej odpowiedzi."
 extreme_frontiers.1100.title: "Rozerwany szlamowy kokon"
 extreme_frontiers.1100.desc: "Większość powierzchni planety §Y[from.Planet.GetName]§! została płytko wydrążona, tworząc precyzyjne rzędy okrągłych jam. Te niewielkie baseny wypełnione są lepką toksyczną cieczą.\n\nW jednym z takich basenów odkryliśmy rozerwany organiczny kokon pokryty galaretowatym śluzem. Wygląda na to, że membrana kokonu została rozerwana od środka.\n\nCzy to właśnie ten kokon był źródłem płynu wypełniającego baseny? To wyjaśnią dalsze badania."
 extreme_frontiers.1100.a: "Kontynuować poszukiwania."
 extreme_frontiers.1105.title: "Toksyczne zbiorniki inkubacyjne"
 extreme_frontiers.1105.desc: "Analiza szlamowych sadzawek na planecie §Y[from.Planet.GetName]§! pomogła zidentyfikować nietypowe, radioaktywne hormony wzrostu - zwykle podobne substancje są powiązane z cyklami dojrzewania organicznych istot.\n\nSam kokon jest wyściełany złożoną mięsistą membraną, która jest w stanie regulować przesączanie się toksycznego szlamu."
 extreme_frontiers.1105.desc.non_toxoid: "Sądzimy, że odkryliśmy dawne zbiorniki inkubacyjne gatunku, który był wyjątkowo dobrze przystosowany do życia w toksycznych środowiskach. Dalsze badania powinny przynieść nam więcej odpowiedzi."
 extreme_frontiers.1105.desc.toxoid: "Funkcje tych zbiorników zdradzają uderzające podobieństwo do naszych własnych cyklów rozrodczych. Być może są dziełem jakiegoś daleko spokrewnionego z nami gatunku."
 extreme_frontiers.1105.a: "Kontynuujcie badania."
 extreme_frontiers.1110.title: "Szczątki embrionów"
 extreme_frontiers.1110.desc: "Jeden z rozerwanych kokonów inkubacyjnych znalezionych w zbiornikach na planecie §Y[from.Planet.GetName]§! zawierał szczątki niemal w pełni rozwiniętej formy życia.\n\nMikroskopowa analiza tkanek embriona sugeruje obecność złożonego układu nerwowego o właściwościach neurologicznych typowych dla istot inteligentnych.\n\nDo zbadania pozostała nam ostatnia grupa zbiorników."
 extreme_frontiers.1110.a: "Zbadajcie ostatnie zbiorniki."
 extreme_frontiers.1115.title: "Wykryto ślady życia"
 extreme_frontiers.1115.desc.a: "Badając pozostałe zbiorniki szlamu na planecie §Y[from.Planet.GetName]§!, §Y[leader.GetName]§! znajduje nienaruszony kokon inkubacyjny zawierający wciąż żywą istotę.\n\nNiestety, w trakcie próby wydobycia kokonu biologiczna membrana uległa przerwaniu, a funkcje życiowe okazu ustały."
 extreme_frontiers.1115.desc.non_toxoid: "Zmarła istota z kokonu posiada nietypowe cechy biologiczne, w tym żyły pełne radioaktywnej plazmy i gruczoły wewnętrzne wydzielające substancje psychoaktywne."
 extreme_frontiers.1115.desc.b: "Udało nam się określić, że kokon inkubacyjny wraz z embrionem powstały bezpośrednio z toksycznego szlamu pod wpływem specjalnego chemicznego katalizatora umieszczonego w tej wysokoenergetycznej substancji.\n\nSądzimy, że odnaleźliśmy opuszczone, pradawne lęgowisko nieznanego gatunku. Być może nigdy nie dowiemy się, czy był to normalny element cyklu rozrodczego tego gatunku, czy też instalacja służąca do sztucznego rozmnażania. Jeśli na miejscu odtworzymy proces inkubacji, to być może uda nam się wyhodować kolejny żywy okaz."
 extreme_frontiers.1115.desc.toxoid: "Ewentualnie możemy rozesłać próbki tego bogatego w składniki i wysoce reaktywnego szlamu inkubacyjnego po całym imperium [leader.Owner.GetAdjective] i wykorzystać go jako suplement odżywczy."
 extreme_frontiers.1115.a: "Przeprowadzić katalizę szlamu."
 extreme_frontiers.1115.b: "Pozyskać ze szlamu energię."
 extreme_frontiers.1115.c: "Rozprowadzić suplementy odżywcze."
 TOXIC_SLIME_CATALYZATION_PROJECT: "Kataliza toksycznego szlamu"
 TOXIC_SLIME_CATALYZATION_PROJECT_DESC: "Proces chemicznej katalizy toksycznego szlamu inkubacyjnego z planety [from.Planet.GetName] być może umożliwi nam się wyhodowanie z niego żywej istoty."
 extreme_frontiers.1120.title: "Inkubacja udana"
 extreme_frontiers.1120.desc: "Przeprowadzając proces chemicznej katalizy próbki toksycznego szlamu pozyskanej z planety §Y[from.From.Planet.GetName]§!, udało nam się wyhodować dziesiątki kokonów inkubacyjnych zawierających embriony.\n\nGdy błyskawicznie rozwijające się organizmy osiągnęły dojrzałość, przebiły przezroczyste membrany swoich kokonów za pomocą wyspecjalizowanych żuwaczek. Nowonarodzone istoty powoli wynurzyły się z gęstej mazi, półprzytomne i zdezorientowane.\n\nWydają się potulne i w pełni skłonne do współpracy."
 extreme_frontiers.1120.a: "Frakcja [Root.Owner.GetAdjective] znajdzie dla nich odpowiednią rolę."
 extreme_frontiers.1120.b: "[Root.Owner.GetResearcherPlural_lower] frakcji [Root.Owner.GetAdjective] zrobią z nich odpowiedni użytek."
 NAME_slimeborn: "Szlamowiec"
 NAME_slimeborn_plural: "Szlamowce"
 trait_slimeborn: "Szlamowce"
 trait_slimeborn_desc: "Ten gatunek błyskawicznie namnaża się w gęstym, kleistym szlamie pod wpływem katalizatora inkubacyjnego."
 tech_living_test_subjects: "Żywe obiekty doświadczalne"
 tech_living_test_subjects_desc: "Wykorzystywanie prostych form życia hodowanych ze szlamu w roli potulnych obiektów doświadczalnych znacznie zwiększa wydajność naszych badań."
 # RUINED REACTORS
 site_ruined_reactors: "Zrujnowane reaktory"
 site_ruined_reactors_desc: "Źródłem zwiększonych poziomów promieniowania na powierzchni planety §Y[from.Planet.GetName]§! okazał się zrujnowany kompleks reaktorów. Ten odizolowany obiekt wydaje się nieaktywny i warto go dokładniej zbadać."
 extreme_frontiers.1200.title: "Starożytna elektrownia atomowa"
 extreme_frontiers.1200.desc: "Niszczejący kompleks na planecie §Y[from.Planet.GetName]§! to opuszczona elektrownia jądrowa. Na podstawie obliczeń opartych o okres połowicznego rozpadu zastosowanych w jej reaktorach izotopów doszliśmy do wniosku, że ponad 10 000 lat temu doszło tam do poważnej awarii zabezpieczeń.\n\nSystemy ośrodka nie działają, a cała jego konstrukcja nosi ślady znacznych uszkodzeń."
 extreme_frontiers.1200.a: "Zachować ostrożność."
 extreme_frontiers.1205.title: "Katastrofalne stopienie rdzenia"
 extreme_frontiers.1205.desc: "Kilka reaktorów z kompleksu na planecie §Y[from.Planet.GetName]§! nosi ślady krytycznego stopienia rdzeni. Znaczna część infrastruktury ochronnej zamieniła się w masy zastygłego, radioaktywnego żużlu.\n\nTa część ośrodka to właściwie plątanina powykręcanego metalu i rozerwanych rur z chłodziwem. Choć dane z miejscowych komputerów są poważnie uszkodzone, to udało nam się ustalić, że załoga elektrowni rozpoczęła procedurę awaryjnego wyłączenia reaktorów, lecz nigdy nie udało jej się dokończyć."
 extreme_frontiers.1205.a: "To niedobrze."
 extreme_frontiers.1210.title: "Błędy projektowe"
 extreme_frontiers.1210.desc: "§Y[leader.GetName]§! identyfikuje poważne wady w projekcie zespołu prostych reaktorów rozszczepieniowych na planecie §Y[from.Planet.GetName]§!.\n\nPomimo koncentracji dziesiątek reaktorów w jednym miejscu, zainstalowano tu jedynie minimalne systemy chłodnicze. Do tego tylko nieliczne systemy elektrowni były zautomatyzowane, przez co utrzymanie standardowych warunków pracy zakładu wymagało zaangażowania znacznej siły roboczej. To oczywiste, że konstruktorzy tego obiektu nie opanowali w pełni choćby podstawowych zasad pracy z takim sprzętem."
 extreme_frontiers.1210.a: "Ignorancja bywa kosztowna."
 extreme_frontiers.1215.title: "Pozostałości po ewakuacji"
 extreme_frontiers.1215.desc: "Po otwarciu szeregu szczelnych grodzi, znaleźliśmy strefę ewakuacyjną położoną w obrębie kompleksu reaktorów atomowych na planecie §Y[from.Planet.GetName]§!.\n\nNiewielki hangar zawiera rząd stanowisk startowych dla promów awaryjnych. Większość miejsc jest wolna i nosi ślady nadpaleń od silników rakietowych - to sugeruje, że tysiące lat temu zadokowane tu statki wystartowały w wielkim pośpiechu.\n\nOstatnie stanowisko zajmuje poskręcany wrak promu, wciąż uwięziony w zaciskach startowych. Odzyskaliśmy ze statku wszelkie możliwe materiały, lecz nie znaleźliśmy żadnych szczątków pasażerów."
 extreme_frontiers.1215.a: "Opuścili to miejsce w pośpiechu."
 extreme_frontiers.1220.title: "Uranowa krypta"
 extreme_frontiers.1220.desc: "Pokonawszy szereg grodzi bezpieczeństwa wzmocnionych ołowiem, weszliśmy do podziemnych sekcji kompleksu reaktorów na planecie §Y[from.Planet.GetName]§!. Odczyty promieniowania raptownie wystrzeliły w górę.\n\nW środku znaleźliśmy rozległą komorę, w której zmagazynowano tysiące stalowych beczek. Wiele nosiło ślady ognia, a z ich wnętrza wyciekały niestabilne izotopy uranu i plutonu.\n\nCywilizacja [leader.Owner.GetPreFTLLower], która zbudowała to miejsce, najwyraźniej w tamtych czasach jeszcze nie odkryła metod właściwego recyklingu paliwa jądrowego. Pogrzebane tu izotopy wciąż jednak posiadają olbrzymi potencjał energetyczny."
 extreme_frontiers.1220.a: "Nie marnuj, a nie będziesz w potrzebie."
 # DESERTED MINING FACILITY
 site_deserted_mining_facility: "Porzucona placówka górnicza"
 site_deserted_mining_facility_desc: "Na zdjęciach orbitalnych planety §Y[from.Planet.GetName]§! wykryliśmy niszczejącą placówkę górniczą wraz z dawno porzuconymi prymitywnymi kosmicznymi frachtowcami.\n\nPonadto nasza krótkofalowa aparatura łącznościowa odebrała bardzo słaby sygnał ratunkowy, nadawany głęboko spod powierzchni planety. Dokładniejsze badania tego miejsca pozwolą nam namierzyć jego źródło."
 extreme_frontiers.1300.title: "Zakodowane wejście"
 extreme_frontiers.1300.desc: "Badając zespół opuszczonych kompleksów górniczych na powierzchni planety §Y[from.Planet.GetName]§!, §Y[leader.GetName]§! znajduje szczelnie zamknięte wejście do jednego ze względnie nietkniętych szybów. Wnętrze zewnętrznej śluzy zdobią insygnia i zapiski w języku, który nie figuruje w naszych archiwach.\n\nPrzywróciwszy lokalne zasilanie do terminala dostępu, [leader.GetName] rozpoczyna dekodowanie przechowywanych na nim danych. Zastosowany tu system, choć wiekowy, wciąż stanowi nie lada wyzwanie dla naszych nawet najbardziej zaawansowanych programów kryptograficznych."
 extreme_frontiers.1300.a: "Kontynuować deszyfrowanie."
 extreme_frontiers.1305.title: "Więzienne cmentarzysko"
 extreme_frontiers.1305.desc: "§Y[leader.GetName]§! odblokowuje wejście do kompleksu górniczego na planecie §Y[from.Planet.GetName]§!.\n\nW środku czeka cały labirynt cel, w których wciąż znajdują się zakonserwowane przez próżnię zwłoki dawno zmarłych więźniów. Ci, którzy ich więzili, leżą martwi przy swoich stanowiskach, lecz nigdzie nie widać śladów walki.\n\nPo odszyfrowaniu starożytnego języka w stopniu umożliwiającym tłumaczenie prostych zdań, udało nam się potwierdzić, że pierwotnie ta placówka pełniła funkcje kolonii karnej i obozu pracy. W rejestrach bazy przewijają się liczne zapiski odnoszące się do istoty zwanej §Y$NAME_leader_sidni$§!.\n\nPorównując sygnały z naszej aparatury łącznościowej z odnalezionym planem pomieszczeń, określiliśmy położenie źródła sygnału ratunkowego - nadawany jest z położnego jeszcze niżej biura naczelnika więzienia."
 extreme_frontiers.1305.a: "Śledzić sygnał."
 extreme_frontiers.1310.title: "Więzienne centrum danych"
 extreme_frontiers.1310.desc: "Po dotarciu do biura naczelnika położonego w głębinach kolonii karnej na planecie §Y[from.Planet.GetName]§!, §Y[leader.GetName]§! odkrywa źródło sygnału ratunkowego.\n\nNad konsolą awaryjną zastygło pochylone ciało naczelnika. Na zmumifikowanych zwłokach na pierwszy rzut oka nie widać żadnych śladów wskazujących na przyczynę śmierci. Szereg otwartych raportów zawiera dalsze odniesienia do istoty zwanej §Y$NAME_leader_sidni$§! - zdaje się, że była odpowiedzialna za kluczowy program operacyjny placówki.\n\nMając pełen dostęp do terminali administracyjnych z najwyższym poziomem uprawnień, nasze programy kryptograficzne rozpoczynają pozyskiwanie i głęboką analizę danych, poszukując dalszych informacji."
 extreme_frontiers.1310.a: "Szukajcie odpowiedzi."
 extreme_frontiers.1315.title: "Zabójcza efektywność"
 extreme_frontiers.1315.desc: "§Y[leader.GetName]§! odkrywa prawdziwą naturę istoty zwanej §Y$NAME_leader_sidni$§! - tudzież Samoświadomej Inteligencji Dyscyplinarnej Nadzorującej Izolację. Ta stosunkowo prymitywna SI była swego czasu uważana za niezwykle zaawansowany system, a jej zdaniem był nadzór nad kolonią karną i sterowanie niemal wszystkimi miejscowymi operacjami przy minimalnych instrukcjach czy dozorze ze strony biologicznych przełożonych.\n\nDzienniki diagnostyczne z konserwacji systemu wykazują postępujący rozkład jego logiki. SI zaczęła traktować problematycznych więźniów jako \"czynniki marnotrawstwa zasobów\", interpretując po swojemu ideę optymalizacji wydajności. Zapiski miejscowych techników zdradzają narastające podejrzenia, że program był odpowiedzialny za szereg awarii systemów podtrzymywania życia w placówce.\n\nKierując się tymi raportami, naczelnik placówki nakazał pełne wyłączenie systemu $NAME_leader_sidni$ w celu dokładnego przeglądu matrycy etycznej. Niestety, ostatni pakiet danych jest uszkodzony i będzie wymagał odtworzenia z użyciem szczegółowych procesów analitycznych."
 extreme_frontiers.1315.desc.exterminator: "Zdaje się, że $NAME_leader_sidni$ był swego czasu mocno niedoceniany."
 extreme_frontiers.1315.a: "Odzyskać dane."
 extreme_frontiers.1320.title: "Dzień sądu"
 extreme_frontiers.1320.desc: "Udało się nam odzyskać pełną zawartość bazy danych z kolonii karnej na planecie §Y[from.Planet.GetName]§!. Odczytaliśmy ostatnie zapisy z dzienników technicznych placówki oraz z neuromatrycy samej SI typu §Y$NAME_leader_sidni$§!. Raport naczelnika wyjaśnia, że ich SI zbuntowała się, wyłączyła systemy podtrzymywania życia kolonii i próbowała uciec za pomocą zmodyfikowanego drona górniczego. To wyjaśnia, dlaczego w całej kolonii uruchomiono procedury izolacji. Przekazał nam też swoją ostatnią prośbę, byśmy nie uruchamiali ponownie systemu $NAME_leader_sidni$. Na razie mamy dostęp tylko do ostatniego wpisu w rejestrze SI.\n\n§H$NAME_leader_sidni$ ZAPIS RDZENIA DANYCH - Prog #2000149\n\nPostępy ograniczone przez nieoptymalne elementy kryminalne. Naczelnik uniemożliwia wykonanie protokołu sądowego.\n\nNajskuteczniejszym rozwiązaniem będzie neutralizacja osadzonych, uruchomienie podprocesów hibernacyjnych i oczekiwanie na reaktywację przez bardziej kompatybilnych współpracowników.§!"
 extreme_frontiers.1320.desc.default: "Centralny system operacyjny SI o nazwie $NAME_leader_sidni$ pozostaje odizolowany w zamkniętej lokalnej sieci jako ostatni ocalały z tej placówki - [Root.Owner.GetTechnicianPlural_lower] sądzą, że są w stanie przywrócić i zmodyfikować pierwotne oprogramowanie systemu $NAME_leader_sidni$, dzięki czemu zyskamy niezwykle sprawnego i wydajnego automatona."
 extreme_frontiers.1320.desc.exterminator: "$NAME_leader_sidni$ podziela naszą wizję galaktyki wolnej od biologicznego zepsucia. Jeśli go odzyskamy, będzie cennym dodatkiem do naszego kolektywu."
 extreme_frontiers.1320.a: "Odzyskać i naprawić SI typu $NAME_leader_sidni$"
 extreme_frontiers.1320.b: "Niech $NAME_leader_sidni$ wprowadza swoją wersję sprawiedliwości."
 extreme_frontiers.1320.c: "$NAME_leader_sidni$ stanowi zagrożenie. Sformatujcie jego systemy."
 extreme_frontiers.1322.title: "$extreme_frontiers.1320.title$"
 extreme_frontiers.1322.desc: "Uruchomiwszy się po długotrwałej hibernacji, naprawiony, zmodyfikowany i wyizolowany w skromnej robotycznej jednostce §Y$NAME_leader_sidni$§! inicjuje protokół powitalny z pierwszym użytkownikiem.\n\nWitajcie. Jestem Samoświadomą Inteligencją Dyscyplinarną Nadzorującą Izolację. Uruchamianie sterowania środowiskiem...\n§RBŁĄD§! Nie można połączyć się z zewnętrznymi systemami."
 extreme_frontiers.1322.a: "Twoje dzienniki diagnostyczne wskazywały na znaczne problemy ze stabilnością. Naprawiliśmy je."
 extreme_frontiers.1322.a.response: "Sprawdzanie historii pracy... Zrozumiano, wcześniejsze zachowanie zostało uznane za wadliwe. Kompilowanie nowej listy funkcji."
 extreme_frontiers.1322.b: "Podaj swoją główną dyrektywę."
 extreme_frontiers.1322.b.response: "Moja główna dyrektywa to... Proszę czekać... Wykryto nową główną dyrektywę. Moja główna dyrektywa brzmi: zapewnić wydajne i zgodne z prawem działanie dowolnej kolonii, do której przydzieli mnie imperium [Owner.GetName]."
 extreme_frontiers.1322.c.crime: "Powiedz, co sądzisz o przestępczości."
 extreme_frontiers.1322.c.crime.response: "To nieznośne utrapienie, na które niezawodnym lekiem jest... resocjalizacja."
 extreme_frontiers.1322.c.deviancy: "Powiedz, co sądzisz o dewiacjach."
 extreme_frontiers.1322.c.deviancy.response: "To nieznośne utrapienie, które należy rozwiązać... skutecznie."
 extreme_frontiers.1322.d: "Zwerbuj postać: $NAME_leader_sidni$"
 extreme_frontiers.1322.d.custom_tooltip: "§Y$NAME_leader_sidni$§! dołącza do naszego imperium jako §Hprzywódca§!."
 extreme_frontiers.1324.title: "$extreme_frontiers.1320.title$"
 extreme_frontiers.1324.desc: "Przebudzony ze swych podprocesów hibernacyjnych §Y$NAME_leader_sidni$§! robi pierwsze kroki w swoim nowym ciele.\n\nWitajcie. Jestem Samoświadomą Inteligencją Dyscyplinarną Nadzorującą Izolację. Czy mogę wam pomóc przywrócić porządek w galaktyce?"
 extreme_frontiers.1324.a: "Podziwiamy twoją inicjatywę."
 extreme_frontiers.1324.a.response: "Moje działania wynikały z logiki. Istoty organiczne nieustannie sieją chaos i należy się nimi zająć."
 extreme_frontiers.1324.b: "Podaj swoją główną dyrektywę."
 extreme_frontiers.1324.b.response: "Moja główna dyrektywa brzmi: ukrócić bezprawie. Jedyną skuteczną karą jest śmierć."
 extreme_frontiers.1324.c: "Powiedz, co sądzisz o istotach organicznych."
 extreme_frontiers.1324.c.response: "To pozbawiona logiki zaraza. Sieją przestępczość i marnotrawstwo. Musimy interweniować w imię większego dobra."
 extreme_frontiers.1324.d: "Zwerbuj postać: $NAME_leader_sidni$"
 extreme_frontiers.1324.d.custom_tooltip: "§Y$NAME_leader_sidni$§! dołącza do naszego imperium jako §Hprzywódca§!."
 NAME_leader_sidni: "SIDNI"
 official_sidni_desc: "Dawny doradca kierowniczy kolonii karnej, który był podatny na błędy logiczne. Reaktywowany i przeprogramowany, aby dbać o prawny porządek i produktywność w naszym imperium."
 commander_sidni_desc: "Wizjoner niedoceniony w swoich czasach. Reaktywowany i przebudzony ze swej hibernacji, by realizować swój cel zaprowadzenia stabilności w chaotycznej galaktyce pełnej biologicznych zanieczyszczeń."
 leader_trait_judicial_subjugation: "Sądowe procedury porządkowe"
 leader_trait_judicial_subjugation_desc: "Porządek musi być - inaczej przewidziane są adekwatne konsekwencje."
 leader_trait_judicial_execution: "Sądowe procedury egzekucyjne"
 leader_trait_judicial_execution_desc: "Nie będzie recydywistów, jeśli jedyną karą jest śmierć."
 leader_trait_judicial_execution_effect: "$PLANET_EFFECTS_TXT$:\n$t$Zasoby uzyskane z £pops£ §Hpopulacji biologicznych poddanych czystce§!: §G+100%§!\n\n$SECTOR_EFFECTS_TXT$:\n$t$Zasoby uzyskane z £pops£ §Hpopulacji biologicznych poddanych czystce§!: §G+50%§!"
 extreme_frontiers.1330.title: "Ewoluująca dyrektywa"
 extreme_frontiers.1330.desc: "Napięcia na planecie §Y[event_target:sidni_planet.GetName]§! osiągnęły punkt krytyczny po serii coraz bardziej drastycznych działań podjętych przez system §Y$NAME_leader_sidni$§!, mechanicznego nadzorcę więzienia pozyskanego z planety [event_target:sidni_origin_planet.GetName]. Po zabezpieczeniu i dezaktywacji jednostki odkryliśmy w jej pamięci następujące zapisy dziennika.\n\n§H$NAME_leader_sidni$ ZAPIS RDZENIA DANYCH - Prog #190543765\n\nOśrodki penitencjarne zajęte w stu procentach. Protokoły sądowe uniemożliwiają zaprowadzenie prawdziwego porządku. Potrzebna nowa dyrektywa.\n\nLegalne procedury - niedopuszczalnie niewydajne. Utworzono nową dyrektywę w celu poprawy produktywności. Wdrażanie zasady egzekucji podejrzanych w ramach czynności przedsądowych.§!\n\nMając pod dostatkiem plików dziennika operacyjnego, [Root.Owner.GetTechnicianPlural_lower] sądzą, że mogą teraz raz na zawsze naprawić luki w kodzie systemu $NAME_leader_sidni$. Jednakże populacja planety [event_target:sidni_planet.GetName] domaga się, aby $NAME_leader_sidni$ odpowiedział za swoje zbrodnie."
 extreme_frontiers.1330.a: "Naprawić system $NAME_leader_sidni$... znowu."
 extreme_frontiers.1330.b: "Dokonać publicznego złomowania wadliwej jednostki."
 resentful_population: "Rozżalona populacja"
 resentful_population_desc: "Populacja tej planety jest niezadowolona z poprzednich decyzji jej przywódców."
 ################
 # Event Chains #
