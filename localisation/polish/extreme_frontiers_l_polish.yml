 extreme_frontiers.2005.title: "Toksyczne zasoby"
 extreme_frontiers.2005.desc.common: "Zakończyliśmy pierwsze pełne wdrożenie technologii §Ygeoradiacyjnej terraformacji§! na planecie §Y[target.GetName]§!.\n\nPrzemieniając powierzchnię świata w jałowe toksyczne pustkowie, udało nam się wydobyć niezrównane ilości materiałów dzięki usprawnieniom projektu Matrycy Georadiacyjnej."
 extreme_frontiers.2005.desc.industrialist: "Ten kamień milowy oznacza dla naszego imperium początek nowej ery eksploatacji i zysku."
 extreme_frontiers.2005.a.default: "Fantastycznie"
