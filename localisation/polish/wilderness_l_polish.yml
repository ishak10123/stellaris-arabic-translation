 ####################################
 # City Appearance
 ####################################
 WILDERNESS: "Dzicz"
 ####################################
 # Deposits
 ####################################
 d_wilderness_mining: "System wydrążonych jaskiń"
 d_wilderness_mining_desc: "Organizmy zamieszkujące kiedyś ten świat pospiesznie opuściły swoje kopalnie. Wiele z tych tuneli nie zostało zabezpieczonych i mogą się zawalić."
 d_wilderness_mining_2: "Dziurawe płaskowyże"
 d_wilderness_mining_2_desc: "Ten niebezpieczny region jest pełen bezwartościowych odpadów i potencjalnych zapadlisk, które są skutkami działania dawnych kopalń."
 d_wilderness_farming: "Wyschnięty las"
 d_wilderness_farming_desc: "Niegdyś rozległy i wydajny las jest teraz kompletnie martwy. Wyschnięte konary nie dają już żadnych plonów."
 d_wilderness_farming_2: "Skamieniały las"
 d_wilderness_farming_2_desc: "Pozostałości ogromnego zalesionego regionu. Niezliczone gatunki roślin i grzybów umarły tak szybko, że ich szczątki wyglądają jak kryształ i nie zachodzą w nich żadne procesy biochemiczne."
 d_wilderness_generator: "Spalone pole solarne"
 d_wilderness_generator_desc: "Uschnięte korony i kruche łodygi to jedyne co zostało z tej martwej farmy słonecznej."
 d_wilderness_generator_2: "Solarne pustkowie"
 d_wilderness_generator_2_desc: "Ten ogromny region pokrywają kolczaste pozostałości niegdyś tętniącego życiem lasu solarnego. Pył powstały z wyschniętej, lekko napromieniowanej materii liści unosi się teraz w powietrzu."
 d_wilderness_city: "Cuchnące bagno"
 d_wilderness_city_desc: "Ten niegdyś tętniący życiem habitat niezliczonych organizmów został opuszczony, dziś jest to tylko ziejąca, ropiejąca dziura."
 d_wilderness_city_2: "Ropiejące grzęzawisko"
 d_wilderness_city_2_desc: "Umarły tu niezliczone organizmy. Ich gnijące szczątki przesączyły się na okolicę, zalewając ją żrącymi i śmierdzącymi biochemikaliami."
 d_wilderness_industrial: "Metalowe trzęsawisko"
 d_wilderness_industrial_desc: "Pozostałości kilku otwartych basenów mineralnych, których zawartość stała się toksyczna i nieaktywna w wyniku zniszczenia otaczających je struktur geologicznych."
 d_wilderness_industrial_2: "Pustkowia biochemiczne"
 d_wilderness_industrial_2_desc: "Litowe niecki i wąwozy pełne chemicznego pyłu to jedyne, co zostało po rozległym łańcuchu na wpół organicznych przetwórni minerałów."
 d_scorched_plains: "Wypalone równiny"
 d_scorched_plains_desc: "Ten region niegdyś tętnił życiem, jednak został zniszczony w wyniku superrozbłysku słonecznego."
 concept_scorched_plains: "$d_scorched_plains$"
 concept_scorched_plains_desc: "- $MOD_PLANET_MAX_DISTRICTS_ADD$: §R-2§!\n- Czas oczyszczania: £time£ 180 §Idni§!\n- Koszt oczyszczania:\n$t$- 900 $i_energy$\n\n§L$d_scorched_plains_desc$§!"
 ####################################
 # Colony Types
 ####################################
 col_wilderness_default: "Kolonia dziczy"
 ####################################
 # Planet Designations
 ####################################
 col_wilderness_capital: "Świat serce"
 col_wilderness_capital_tt: "$col_wilderness_capital_desc$"
 col_wilderness_capital_desc: "Każde oblicze tego świata tętni symbiotycznym życiem zgromadzonym w takich ilościach, że tworzą żywe ciało gwiezdne."
 col_wilderness_generator: "Świat fotosyntezy"
 col_wilderness_generator_desc: "$col_generator_desc$"
 col_wilderness_generator_tt: "Niezliczone skupiska chloroplastycznych symbiontów zbierają i przechowują energię na tym świecie."
 col_wilderness_mining: "Świat litowy"
 col_wilderness_mining_desc: "$col_mining_desc$"
 col_wilderness_mining_tt: "Pod pozornie jałową powierzchnią tej planety znajduje się istna symfonia podziemnego życia, która z zapałem pozyskuje minerały."
 col_wilderness_farming: "Świat pyłków"
 col_wilderness_farming_desc: "$col_farming_desc$"
 col_wilderness_farming_tt: "Wyspecjalizowane symbionty utrzymują na całym tym świecie idealne warunki do rozwoju poprzez dostarczanie ogromnych ilości pożywnej fauny i flory."
 col_wilderness_fortress: "Świat łowców"
 col_wilderness_fortress_desc: "$col_fortress_desc$"
 col_wilderness_fortress_tt: "Powierzchnia tego świata drży, gdy przemierzają go stada silnie terytorialnej fauny, a w powietrzu rozbrzmiewają ryki straszliwych drapieżników."
 col_wilderness_tech: "Świat refleksji"
 col_wilderness_tech_desc: "$col_research_desc$"
 col_wilderness_tech_tt: "Ten pełen życia świat jest pełen osobliwości i dziwnych zjawisk, którym mogą przyglądać się mądre i dociekliwe umysły."
 col_wilderness_nest: "Świat tkaczy"
 col_wilderness_nest_desc: "$col_city_desc$"
 col_wilderness_nest_tt: "To schronienie dla tak ogromnej ilości organizmów symbiotycznych, że skład atmosfery może ulec zmianie w odpowiedzi na potrzeby i kaprysy dziczy."
 col_wilderness_refinery: "Świat rafinacji"
 col_wilderness_refinery_desc: "Specjalizuje się w produkcji: £exotic_gases£ §H$exotic_gases$§! i innych £strategic_resource£ §Hzasobów strategicznych§!."
 col_wilderness_refinery_tt: "Na tej planecie znajdują się liczne szyby geotermalne, w których mogą zbierać się przeróżne nanoorganizmy i inne egzotyczne symbionty przetwarzające surowce."
 col_wilderness_forge: "Świat-tygiel"
 col_wilderness_forge_desc: "$col_foundry_desc$"
 col_wilderness_forge_tt: "Tygiel wielkości planety służący do przetwarzania surowców w wydajne i uniwersalne stopy."
 col_wilderness_unification: "Spokojny świat"
 col_wilderness_unification_desc: "$col_bureau_desc$"
 col_wilderness_unification_tt: "Aura niespiesznego mutualizmu przelewa się przez ten świat i pogłębia skomplikowane powiązania między symbiontami."
 ####################################
 # Personalities
 ####################################
 personality_benevolent_wilderness: "Harmonijna dzicz"
 personality_benevolent_wilderness_desc: "Ta ogromna, świadoma biosfera pragnie jedynie połączyć się z gwiazdami. Jej korzenie rozciągają się cierpliwie po galaktyce, nie łapczywie, ale harmonijnie."
 personality_rampant_wilderness: "Nieokiełznana dzicz"
 personality_rampant_wilderness_desc: "Nieokiełznana dzicz nie wpada w szał, lecz rozszerza się, pochłania i trwa. Wszystko, co napotka, ożywione czy nieożywione, jest odzyskiwane w niekończącym się cyklu rozwoju i rozkładu."
 ####################################
 # Policies
 ####################################
 policy_symbiont_policy: "$policy_drone_policy$"
 policy_symbiont_policy_desc: "Nasza mutualistyczna wspólnota jest wyjątkowo zdolna i wydajna, ale ma pewne ograniczenia. Musimy postanowić kiedy i jak wykorzystywać nasze zasoby."
 symbiont_policy_balanced: "$drone_policy_balanced$"
 symbiont_policy_balanced_name: "$symbiont_policy_balanced$"
 symbiont_policy_balanced_desc: "Dzicz poświęca się w równym stopniu produkcji surowców, co wytwarzaniu gotowych towarów.\n\n§EBrak premii i kar do produkcji zasobów.§!"
 symbiont_policy_worker: "$drone_policy_worker$"
 symbiont_policy_worker_name: "$symbiont_policy_worker$"
 symbiont_policy_worker_desc: "Dzicz zajmuje się głównie wydobyciem surowców, a uczestniczące w tym symbionty stają się wydajniejsze kosztem bardziej specjalistycznej produkcji.\n\n"
 symbiont_policy_thinker: "$drone_policy_thinker$"
 symbiont_policy_thinker_name: "$symbiont_policy_thinker$"
 symbiont_policy_thinker_desc: "Dzicz zajmuje się głównie produkcją gotowych towarów, a swoją wydajność zwiększają kosztem wydobycia surowców.\n\n"
 ####################################
 # Edicts
 ####################################
 edict_capacity_subsidies_wilderness: "$edict_capacity_subsidies$"
 edict_capacity_subsidies_wilderness_desc: "Ten edykt zachęca nasze fotosyntetyczne symbionty do tworzenie migrujących stad, które podążają po naszej powierzchni za słońcem, w ten sposób zwiększając produkcję energii."
 edict_mining_subsidies_wilderness: "$edict_mining_subsidies$"
 edict_mining_subsidies_wilderness_desc: "Ten edykt wzmacnia nasze korzenie. Dzięki temu podziemne, kopiące symbionty mają mniejszą szansę na wywołanie tąpnięcia."
 edict_farming_subsidies_wilderness: "$edict_farming_subsidies$"
 edict_farming_subsidies_wilderness_desc: "Ten edykt wprowadza agresywne rozcieńczanie wysokoenergetycznych substancji chemicznych znajdujących się w naszej glebie, dzięki czemu pozyskujemy więcej substancji odżywczych."
 edict_forge_subsidies_wilderness: "$edict_forge_subsidies$"
 edict_forge_subsidies_wilderness_desc: "Napełnianie substancjami odżywczymi zbiorników z litotropowymi algami umożliwia ich sezonowy rozkwit oraz zwiększenie ilości pozyskiwanych produktów ubocznych stopów."
 edict_research_subsidies_wilderness: "$edict_research_subsidies$"
 edict_research_subsidies_wilderness_desc: "$edict_research_subsidies_desc$"
 edict_clearing_motes_wilderness: "$edict_clearing_motes$"
 edict_clearing_motes_wilderness_desc: "Suplementowanie diet symbiontów lotnymi pyłkami pozwala im trawić substancje organiczne i nieorganiczne. Nasz holobiont dostosuje nasze środowisko, zjadając je."
 edict_learning_campaign_wilderness: "$edict_learning_campaign$"
 edict_learning_campaign_wilderness_desc: "Dostarczając naszym symbiontom dodatkowych składników odżywczych, zwiększymy wydajność."
 edict_war_drone_campaign_wilderness: "Kampania symbiontów bojowych"
 edict_war_drone_campaign_wilderness_desc: "Dostarczając naszym symbiontom drapieżnym i stadnym dodatkowych składników odżywczych, zwiększymy ich siłę i gotowość do walki."
 edict_scientific_revolution_wilderness: "$edict_scientific_revolution$"
 edict_scientific_revolution_wilderness_desc: "$edict_scientific_revolution_desc$"
 edict_drone_overdrive_wilderness: "Przeciążenie symbiontów"
 edict_drone_overdrive_wilderness_desc: "Nasze biomy staną się ambitniejsze, bo potrzebujemy więcej zasobów."
