 job_wilderness_maintenance_drone: "Elastyczna biomasa"
 job_wilderness_maintenance_drone_plural: "$job_wilderness_maintenance_drone$"
 job_wilderness_maintenance_drone_desc: "Biomasa tętniąca potencjałem, przechowywana i podtrzymywana, dopóki nie stanie się potrzebna."
 job_heart_processing: "Nowo utworzona biomasa"
 job_heart_processing_plural: "$job_heart_processing$"
 job_heart_processing_desc: "Ta biomasa zostanie wkrótce zintegrowana. Jej przeznaczeniem jest pełnienie w nas wyższej funkcji."
 neurosymbiont: "$job_neurosymbiont$"
 job_neurosymbiont: "Neurosymbiont"
 job_neurosymbiont_plural: "Neurosymbionty"
