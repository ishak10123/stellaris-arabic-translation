 job_neurosymbiont_desc: "Te symbionty to obwody pomiędzy nami i behemotem. Ich życia gasną, gdy przekazują nasze jestestwo do ciała bestii."
 job_neurosymbiont_effect_desc: "£job_neurosymbiont£ $job_neurosymbiont_plural$ wytwarzają £energy£ §Y$energy$§!."
