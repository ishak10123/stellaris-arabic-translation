 job_gaseosymbiote_plural: "Gazosymbionty"
 job_gaseosymbiote_desc: "Te symbionty to mistrzowie alchemii drobnoustrojowej, utrzymują idealne warunki do naturalnego wytwarzania gazów egzotycznych."
