 ####################################
 # Traditions
 ####################################
 tr_adaptability_appropriation_wilderness: "Przywłaszczenie"
 tr_adaptability_appropriation_wilderness_delayed: "Źle wykorzystywane ekosystemy nie dają niczego naszemu imperium. [GetIndividualNamePluralCap] muszą trafiać na te planety, na których najbardziej ich potrzeba."
 tr_discovery_faith_in_science_wilderness: "Sieć grzybni"
 tr_discovery_faith_in_science_wilderness_delayed: "Okiełznanie wrodzonej ciekawości, którą wykazują [GetIndividualNamePlural], i wykorzystanie jej w rozległej sieci opartej na grzybach umożliwi wydajniejsze dokonywanie odkryć."
 tr_domination_wilderness_network: "Akceleracja makrometaboliczna"
 tr_domination_wilderness_network_delayed: "Zwiększenie szybkości wymiany energii w skali kontynentalnej znacznie zwiększa ilość pomocy, którą możemy zapewnić sobie nawzajem."
 tr_domination_wilderness_network_effect: "§YOdblokowuje edykt:§! $edict_drone_overdrive_wilderness$"
 tr_domination_imperious_architecture_wilderness: "Międzygatunkowa kompatybilność feromonów"
 tr_domination_imperious_architecture_wilderness_desc: "§Y$district_craglands_plural$§! zapewniają £defense_army£ §Y$defense_army_plural$§!: §G+1§!"
 tr_domination_imperious_architecture_wilderness_delayed: "Jeżeli [GetIndividualNamePlural] zaczną korzystać z komunikacji feromonowej, reakcje na zagrożenia zewnętrzne staną się szybsze."
 tr_expansion_colonization_fever_wilderness: "Umysł wielu światów"
 tr_expansion_colonization_fever_wilderness_desc: "Dodaj losową §Y£district£dzielnicę§! po skolonizowaniu nowego świata."
 tr_expansion_colonization_fever_wilderness_delayed: "[GetGestaltEntityName] to chór myśli, którego nie uciszy nawet zimna kosmiczna pustka."
 tr_expansion_a_new_life_wilderness: "Błyskawiczny rozwój"
 tr_expansion_a_new_life_wilderness_delayed: "[GetGestaltEntityName] tworzy rozwiązania własnych problemów."
 tr_expansion_courier_network_wilderness: "$tr_expansion_courier_network_hive$"
 tr_expansion_courier_network_wilderness_delayed: "Traktowanie każdego biomu jakby był częścią składową większej całości umożliwia prowadzenie selektywnej komunikacji bez angażowania pełnej uwagi umysłu planetarnego."
 tr_expansion_galactic_ambition_wilderness: "$tr_expansion_galactic_ambition_hive$"
 tr_expansion_galactic_ambition_wilderness_delayed: "Pierwszym niepewnym wiciom w mroku towarzyszył pierwotny strach; byliśmy z dala od naszej kolebki. Możemy się rozwijać, tylko pokonując ten strach dzięki podbojom i zasiedlaniu. [GetIndividualNamePlural] będą ginąć milionami, ale dzięki temu [GetGestaltEntityName] być może będzie żyć."
 tr_prosperity_pursuit_of_profit_wilderness: "Globalny transport płynów"
 tr_prosperity_pursuit_of_profit_wilderness_delayed: "Żyły oplatające cały kontynent dostarczają substancje odżywcze i ważne materiały budowlane do potrzebujących ich ekosystemów."
 tr_prosperity_public_works_wilderness: "Podziemne schronienia"
 tr_prosperity_public_works_wilderness_desc: "Wszystkie £district£ §Ydzielnice§! dają §G+50§! do: £housing£ §Y$MOD_PLANET_HOUSING_ADD$§!"
 tr_prosperity_public_works_wilderness_delayed: "Ponieważ [GetIndividualNamePlural] przenikają przez wierzchnie warstwy skorupy i uzupełniają swoje gniazda strukturami zbudowanymi z wosku, może zmieścić się tam więcej osobników."
 tr_synchronicity_kinship_wilderness: "Zsynchronizowane rytmy dobowe"
 tr_synchronicity_kinship_wilderness_delayed: "Dokładny nadzór nad cyklami odpoczynku sprawia, że [GetIndividualNamePlural] w naturalny sposób wykształcają na całej planecie naturalne schematy przenoszenia substancji odżywczych."
 ####################################
 # Ascension Perks
 ####################################
 ap_mastery_of_nature_wilderness: "$ap_mastery_of_nature$"
 ap_mastery_of_nature_wilderness_desc: "Istniejemy w cyklu zjadania i bycia zjadanymi. Od najmniejszej komórki, aż po najwyższe drzewo, żyjemy w zgodzie z tą zasadą. Jesteśmy naturą."
 ap_engineered_evolution_wilderness: "$ap_engineered_evolution$"
 ap_engineered_evolution_wilderness_desc: "Nasza świadomość ewoluowała tak, byśmy mogli mierzyć się z próbami, jakim poddaje nas środowisko. Środowisko zmieniło się, więc my też powinniśmy."
 engineered_evolution_wilderness_tt: "- Rozpoczyna §Ysytuację $genetic_ascension_situation$§!, która odblokowuje drzewko tradycji: ['tradition_category:tradition_purity'].$TABBED_NEW_LINE$- $REQUIRES_TRADITION_SLOT$\n- $UNLOCKS_AGENDA$ §Y$council_agenda_agenda_engineered_evolution_name$§!, która zapewnia technologie modyfikacji genetycznej jako opcje badań."
 ############
 # Espionage
 ############
 operation_embed_planetary_roots: "Zapuszczenie korzeni planetarnych" # literal roots, as in plantlife
 operation_embed_planetary_roots_desc: "Obecnie nasz wywiad ([owner.GetIndividualNamePlural]) zajmuje się ważniejszymi zadaniami. Jednak zasiewając na wpół świadomy mikrobiom na jednym ze światów należących do naszego celu, zdołamy zachować większą część naszej siatki szpiegowskiej i może nawet zakłócić działanie tamtejszego łańcucha dostaw żywności." # the Wilderness embeds a part of itself, hence 'microbiome'
 operation_embed_planetary_roots_on_success: "$operation_sleeper_cells_on_success$"
 espionage_planetary_roots: "Korzenie planetarne"
 espionage_planetary_roots_desc: "Zasadziliśmy częściowo świadomy mikrobiom, który informuje nas, co dzieje się w tym imperium. Te prymitywne symbionty są gotowe wspierać działania wywiadowcze prowadzone przez [owner.GetIndividualNamePlural]."
 operation_embed_planetary_roots_requires_blocker: "$TRIGGER_FAIL$ §RNasze $espionage_planetary_roots$ potrzebują ['concept_natural_blocker', naturalnej przeszkody terenowej] na jednym ze światów należących do celu.§!"
 operation_embed_planetary_roots_dont_stack_this: "$TRIGGER_FAIL$ §RJuż zapuściliśmy $espionage_planetary_roots$ na świecie [target.GetName]. Płynące z tego korzyści mogą trwać aż do: §Y[planet_roots_success]§!.§!"
 operation_embed_planetary_roots_not_cleared: "$TRIGGER_FAIL$ §RCzujemy, że nasze $espionage_planetary_roots$ wciąż znajdują się gdzieś na świecie [target.GetName].§!"
 d_wilderness_root_blocker: "Agresywny gąszcz"
 d_wilderness_root_blocker_desc: "Ciasna enklawa przedrozumnej, nierdzennej dziczy, która zapuściła korzenie na obrzeżach tych terenów wiejskich."
 wilderness.4500.name: "Przeczesywanie dziczy"
 wilderness.4500.desc: "[owner.GetOperativesLowerPlural] informują nas o zlokalizowaniu kilku miejsc nadających się dla naszego mikrobiomu. Teraz będą przez jakiś czas obserwować te habitaty, począwszy od tych, które dają nam największe szanse na sukces w dłuższej perspektywie."
 wilderness.4505.name: "Wyszukano potencjalną lokalizację"
 wilderness.4505.desc: "Zapewniliśmy sobie bezwiedną pomoc [target.GetSpeciesAdj&genitive]. Ich przedstawiciel uważa, że weźmie udział w prawdziwym chronieniu natury. W rzeczywistości dostarczy naszą mikrobiomową bombę nasienną w odległe miejsce (§H[roots_planet.GetPlanetMoon] [roots_planet.GetName]§!).\n\nChoć symbionty zrodzone w tym pakiecie będą żyć krótko i nigdy nie staną się pełnym przedłużeniem naszej świadomości, to czujemy, że jest w nich zapał do infiltrowania oraz obserwacji tego obcego miejsca."
 wilderness.4510.name: "$espionage_planetary_roots$ zapuszczone"
 wilderness.4510.desc: "Od chwili, gdy nasz mikrobiom znalazł nowy dom ([GetRootsBlockerName]), zaczęliśmy oddychać tamtejszym zakazanym powietrzem i widzieć świat znany jako §H[roots_planet.GetName]§!.\n\nNasza obecność tutaj będzie niezauważalna, dopóki te symbionty nie będą miały silnego połączenia z naszą ogólną jaźnią. Jednak dobrze się nam przysłużą, gdy nadejdzie czas wznowienia działań na terytorium [target.GetAdj&genitive]."
 wilderness.4510.a: "Nasze korzenie powinny sięgać głębiej i dłużej żyć."
 wilderness.4510.b: "Dajmy tu naszym korzeniom swobodę."
 ####################################
 # Technologies
 ####################################
 tech_wilderness_terraform: "Kiełkowanie planetarne"
 tech_wilderness_terraform_desc: "Jeśli chcemy zapuścić korzenie na nowym świecie, powinniśmy zacząć od przygotowania szkółki. Zacznijmy od terraformowania planety, żeby nasze kolonie mogły mieć dobry początek."
 tech_terrestrial_sculpting_wilderness: "$tech_terrestrial_sculpting$"
 tech_terrestrial_sculpting_wilderness_desc: "$tech_terrestrial_sculpting_desc$"
 tech_terrestrial_sculpting_wilderness_effect: "§HOdblokowuje element:§! Umożliwia terraformowanie wszystkich planet należących do wszystkich standardowych klas."
 tech_wilderness_node: "Centra istnienia"
 tech_wilderness_node_desc: "Wspierając rozwój głęboko myślących symbiontów na łąkach naszej rozproszonej jaźni, sprawimy, że wszyscy będą mocniej odczuwać naszą wspólnotę."
 tech_wilderness_cluster: "$tech_hive_cluster$"
 tech_wilderness_cluster_desc: "Możemy zwiększyć płynność globalnego, wspólnotowego myślenia, inwestując w gromady symbiontów, których jedynym życiowym celem będzie ułatwianie realizacji tej samej woli."
 tech_wilderness_confluence: "$tech_hive_confluence$"
 tech_wilderness_confluence_desc: "Nasza mutualistyczna wola zostanie wzmocniona przez duże gromady wysoce empatycznych symbiontów, które są tak zestrojone z otoczeniem, że koncentrują i przesyłają tam myśli naszej wspólnoty."
 tech_genome_mapping_wilderness: "$tech_genome_mapping$"
 tech_genome_mapping_wilderness_desc: "Mapowanie genomów niezliczonych szczepów naszego DNA poszerza naszą wiedzą o tym, jak się rozwijamy, i ułatwia pozbycie się czynników, które komplikują nasz rozwój."
 tech_mining_1_wilderness: "$tech_mining_1$"
 tech_mining_1_wilderness_desc: "Dzięki śluzowym substancjom zagęszczającym i ciśnieniu hydraulicznemu możemy dostać się jeszcze głębiej do istniejących złóż minerałów, by w ten sposób zwiększyć ich wydobycie."
 tech_powered_exoskeletons_wilderness: "$tech_powered_exoskeletons$"
 tech_powered_exoskeletons_wilderness_desc: "Wspomagane egzoszkielety zwiększają siłę i szybkość posługujących się nimi osób. Dlatego sprzęt ten ma oczywiste zastosowania bojowe, a także może zwiększyć wydajność pracy fizycznej."
 tech_colonization_1_wilderness: "Inicjatywa nowych światów"
 tech_colonization_1_wilderness_desc: "Koncentrujemy się na przeliczaniu zasobów oraz materiałów niezbędnych do przebudzenia nowych światów, w ten sposób szykujemy nasze pionierskie symbionty do trudnych podróży międzygwiezdnych."
 tech_wilderness_government: "$tech_planetary_government$"
 tech_wilderness_government_desc: "Od chwili przebudzenia nowej planety jej priorytetem musi być stworzenie stabilnego i kwitnącego środowiska - wyższym nawet niż szersze myślenie o naszej jaźni."
