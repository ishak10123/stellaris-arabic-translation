 job_broodsymbiont_desc: "Te symbionty nasycają dzicz elastyczną biomasą: surową, żywą materią gotową przekształcić się w to, czego planeta może potrzebować."
 job_broodsymbiont_effect_desc: "[spawning_drone.GetIcon] $job_broodsymbiont_plural$ zamieniają $r_food$ (lub $r_minerals$) w £mod_planet_amenities_no_happiness_add£ §Y$PLANET_AMENITIES_TITLE$§! i £biomass£ §Ybiomasę§!."
