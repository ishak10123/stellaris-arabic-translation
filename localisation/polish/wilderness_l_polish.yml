 job_immunosymbiont: "Immunosymbiont"
 job_immunosymbiont_plural: "Immunosymbionty"
 job_immunosymbiont_desc: "Te symbionty wykrywają dewiację i zakłócają odstępstwa, patrolują korzenie w dzikich ostępach. To przeciwciała w skali makro dla organizmu w skali makro."
 job_immunosymbiont_effect_desc: "[patrol_drone.GetIcon] $job_immunosymbiont_plural$ zmniejszają £crime£ §Y$PLANET_CRIME_NO_HAPPINESS_TITLE$§!, tworzą £defense_army£ §Yarmie obronne§! i generują £unity£ §Y$unity$§!."
 broodsymbiont: "$job_broodsymbiont$"
 job_broodsymbiont: "Symbiont lęgowy"
