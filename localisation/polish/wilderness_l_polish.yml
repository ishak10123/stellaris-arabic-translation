 district_photosynthesis_fields: "Pole fotosyntetyczne"
 district_photosynthesis_fields_plural: "Pola fotosyntetyczne"
 district_photosynthesis_fields_desc: "Rozczapierzone fotosyntetyczne pierzaste liście są podstawą tych ogromnych regionów gromadzących energię."
 mod_district_photosynthesis_fields_max_add: "Maks. $district_photosynthesis_fields_plural$"
 mod_planet_district_photosynthesis_fields_build_speed_mult: "$district_photosynthesis_fields$ - szybkość budowy"
 district_photosynthesis_fields_uncapped: "$district_photosynthesis_fields$"
 district_photosynthesis_fields_uncapped_plural: "$district_photosynthesis_fields_plural$"
 district_photosynthesis_fields_uncapped_desc: "$district_photosynthesis_fields_desc$"
 mod_district_photosynthesis_fields_uncapped_max: "Maks. $district_photosynthesis_fields_plural$"
 mod_planet_district_photosynthesis_fields_uncapped_build_speed_mult: "$mod_planet_district_photosynthesis_fields_build_speed_mult$"
 district_hollow_mountains: "Wydrążona góra"
 district_hollow_mountains_plural: "Wydrążone góry"
 district_hollow_mountains_desc: "Te skaliste okolice są usiane kopalniami, w których wytrwałe symbionty poszukują cennych minerałów."
 mod_district_hollow_mountains_max_add: "Maks. $district_hollow_mountains_plural$"
 mod_planet_district_hollow_mountains_build_speed_mult: "$district_hollow_mountains$ - szybkość budowy"
 district_hollow_mountains_uncapped: "$district_hollow_mountains$"
 district_hollow_mountains_uncapped_plural: "$district_hollow_mountains_plural$"
 district_hollow_mountains_uncapped_desc: "$district_hollow_mountains_desc$"
