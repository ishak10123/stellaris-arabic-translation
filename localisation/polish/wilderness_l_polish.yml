 choirsymbiont: "$job_choirsymbiont$"
 job_choirsymbiont: "Chóralny symbiont"
 job_choirsymbiont_plural: "Chóralne symbionty"
 job_choirsymbiont_with_icon: "£job_choirsymbiont£ $job_choirsymbiont$"
 job_choirsymbiont_plural_with_icon: "£job_choirsymbiont£ $job_choirsymbiont_plural$"
 job_choirsymbiont_desc: "Te symbionty wydają z siebie wielowarstwowe, melodyjne wołania, które rezonują w całej biosferze. Zawiła, żywa muzyka prowadzi i wzmacnia wszystko."
 job_choirsymbiont_effect_desc: "£job_choirsymbiont£ $job_choirsymbiont_plural$ zmieniają £energy£ §Y$energy$§! i £food£ §Y$food$§! (lub £minerals£ §Y$minerals$§!) w £unity£ §Y$unity$§!."
 mod_job_choirsymbiont_add: "Miejsca pracy: $job_choirsymbiont$"
