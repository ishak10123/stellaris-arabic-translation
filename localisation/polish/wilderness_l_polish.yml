 ####################################
 # Zones
 ####################################
 zone_urban_wilderness: "Sercogaj"
 zone_urban_wilderness_desc: "Pulsujący rdzeń biomasy i instynktu. Nieustannie rozszerzając się i przekształcając, dzicz zapuszcza korzenie wszerz i w głąb, gotowa wesprzeć każdą wyłaniającą się funkcjonalność."
 zone_foundry_wilderness: "Topitrzewia"
 zone_foundry_wilderness_desc: "Ta komora cieplna kipi stopioną skałą i siłą żywiołów. $job_forgesymbiont_plural$ kształtują tu metal w trawiennym rytmie, karmiąc rosnący szkielet świata."
 zone_research_wilderness: "Myślordzeń"
 zone_research_wilderness_desc: "Wzniesiony węzeł korzeni nerwowych i mutagennego zakwitu. $job_evosymbiont_plural$ wyłaniają się tutaj z nowymi kończynami, nowymi zmysłami i nowym zrozumieniem."
 zone_unity_wilderness: "Śpiewające klify"
 zone_unity_wilderness_desc: "Strzeliste formacje przeplatane wydrążonymi kośćmi i litym ciałem, w których wiatr niesie warstwowe dźwięki poprzez powierzchnię świata. $job_choirsymbiont_plural$ gromadzą się tutaj, by pozwolić śpiewać samemu światu."
 zone_fortress_wilderness: "Bulwa dowodzenia"
 zone_fortress_wilderness_desc: "Nabrzmiały węzeł sensoryczny. $job_tamersymbiont_plural$ zbierają się w nim, uwalniając impulsy zapachowe, które gromadzą i kierują przedrozumnymi hordami. Dzicz nie rozkazuje, ona wydziela."
 zone_minerals_wilderness: "Minerałosłup"
 zone_minerals_wilderness_desc: "Wysoka, żebrowana struktura z żywego kamienia - po części pasmo górskie, po części narząd. W jej przepastnych kościach gromadzą się minerały i pulsują w rytm powolnego oddechu dziczy."
 zone_energy_wilderness: "Słoneczne grzybopłuca"
 zone_energy_wilderness_desc: "Rozległe pola tkanki fotosyntetycznej pęcznieją od przechwyconego światła słonecznego, zwiększając ciśnienie, aż do wydechu w rytmicznych wybuchach. $job_photosymbiont_plural$ są wystrzeliwane tymi promiennymi impulsami w niebo i unoszą się na termicznych prądach w pogoni za łukiem gwiazd."
 zone_food_wilderness: "Krosno kwitnienia"
 zone_food_wilderness_desc: "Pachnący mózg z płatków i feromonów, tkający szlaki zapylania jak wątki w gobelinie. To tutaj organizowana jest płodność planety z wydajnością mechanicznej fabryki."
 zone_research_unity_wilderness: "Rdzeń harmoniczny"
 zone_research_unity_wilderness_desc: "Rytmiczny organ w sercu dziczy, w którym mądrość wibruje poprzez pamięć i wiedzę. Myśl nie ma tu swego początku. Ona tu rozbrzmiewa."
 zone_trade_wilderness: "Wiciotrakt"
 zone_trade_wilderness_desc: "Włókniste pętle, zwijające się kończyny i worki magazynowe tworzą niestrudzony ośrodek trasowania. $job_spindlesymbiont_plural$ tkają i wysyłają stąd wszystko, co niezbędne do życia. Dzicz zaopatruje się sama."
 ####################################
 # Decisions
 ####################################
 decision_wilderness_expand: "Powiększenie planety"
 decision_wilderness_expand_desc: "Powiększenie naszego świata poprzez ponowną absorpcję zebranej przez nas oczyszczonej biomasy."
 decision_wilderness_mastery_over_nature_desc: "Nasza zbiorowa świadomość potrzebuje przestrzeni, żeby się powiększać, więc damy jej tę przestrzeń. Powinniśmy zaadaptować się do wszystkich środowisk planetarnych."
