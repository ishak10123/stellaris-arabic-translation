l_polish:
 ####################################
 # Events
 ####################################
 # introduction event
 progress.2.desc.wilderness: "[from.GetPlanetMoon] [Root.GetName]: Statek [Root.GetName] dokonał zdumiewającego odkrycia - to ciało niebieskie tętni obcym życiem! Po raz pierwszy natrafiliśmy na organizmy żywe, które pochodzą spoza naszej jaźni.\n\nTo odkrycie potwierdza, że my, [root.owner.capital_scope.GetName], nie jesteśmy sami we wszechświecie. Żadna z odkrytych obcych istot nie jest inteligentna, ale zapewne wkrótce natrafimy także i na takie."
 # Colonization Events
 wilderness.1010.name: "[from.GetName] budzi się"
 wilderness.1010.desc.intro: "Nasze zarodniki terraformujące zrealizowały swój cel, dostarczyły po raz pierwszy część naszej jaźni na obcy świat, aby go skolonizować."
 wilderness.1010.desc.same: "[from.GetName] to my, podobnie świat [root.GetHomeWorldName]... To uczucie wydaje się nam znajome: to wygodne życie, choć przyjęliśmy tak wiele nowych form pod obcym słońcem. Zaadaptowaliśmy się łatwo do panujących tu wcześniej warunków." #e.g. 'becoming Mars as well as Earth...''
 wilderness.1010.desc.similar_cold: "Zaadaptowanie się do świata §Y[from.GetName]§! (typ: [from.GetClassAdj]) napotka różne przeszkody, ale mamy już sposoby, żeby sobie z nimi poradzić. Wici rosną, stacje mieszkalne powstają, a głodne usta polują." #e.g. 'Adapting our self to suit arctic Pluto...'
 wilderness.1010.desc.similar_dry: "Jako planeta [root.GetHomeWorldName] zawsze dobrze czuliśmy się w suchej atmosferze. Dlatego z pewnością sprostamy wyzwaniu, jakim jest zostanie światem §Y[from.GetName]§! (typ: [from.GetClassAdj]). Już znaleźliśmy nowe metody wyszukiwania i przechowywania wilgoci, nauczyliśmy się pracować w tak trudnych warunkach geologicznych, zamiast z nimi walczyć." #e.g. 'the challenge of becoming savannah Mars'
 wilderness.1010.desc.similar_wet: "Doskonale radziliśmy sobie w wodach świata [root.GetHomeWorldName], zatem podobny sukces odniesiemy jako świat §Y[from.GetName]§! typu: [from.GetClassAdj]. Minerały, prądy, a nawet ilość światła dziennego sprawiają, że dziwnie się tu czujemy, ale już znaleźliśmy sposoby na zdobycie tego, czego potrzebujemy." #e.g. 'we flourish as oceanic Neptune'
 wilderness.1010.desc.diff_cold: "Wiedzieliśmy, że zostanie §Y[from.GetAdj&genitive]§! będzie trudne. Rzeczywiście, fragmenty tego, co uczyniło nas planetą [root.GetHomeWorldName] ([root.capital_scope.GetClassAdj]) uschło. Jednak to, co zostało, jest silne i zaczęło się adaptować. Nieznane środowisko bardzo utrudnia pozyskiwanie podstawowych zasobów niezbędnych do życia, ale, trzymając się tego zimnego otoczenia, widzimy, że życie znalazło już sposób na przetrwanie." #e.g. 'becoming Earth'
 wilderness.1010.desc.diff_dry: "To miejsce wywołuje w nas pierwotny strach: jest tu tak sucho i gorąco, że powracają wspomnienia o Zgorzelinie. Jeżeli przystosujemy się do życia tutaj... jeśli staniemy się częścią §Y[from.GetAdj&genitive]§! może obudzi się w nas coś nowego. Tam, gdzie istnieje wilgoć, znaleźliśmy sposoby jej przechowywania. Tam, gdzie brakuje cienia, nauczyliśmy się tworzyć własny."
 wilderness.1010.desc.diff_wet: "Działania mające na celu zostanie częścią §Y[from.GetAdj&genitive]§! będą sporym wyzwaniem, ale potrafimy walczyć ze zgnilizną i potopami. Te z naszych części, które lepiej czują się w wodzie, pochłaniają ją dla tych, które są bardziej wrażliwe. Potrafimy wykorzystywać przepływające tu wyjątkowe prądy." #e.g. 'Our effort to become Mars'
 wilderness.1010.desc.other: "Przybierając formy §Y[from.GetAdj&genitive]§!, odnajdujemy te części naszego jestestwa, które rozkwitną, a które uschną. Ta egzystencja na świecie tego typu ([from.GetClassAdj]) ma wiele wspólnego z tym, co już znamy, a jednocześnie jest bardzo dziwna, więc wszystko obserwujemy i prowadzimy doświadczenia." #e.g. 'shape ourselves to become Luna'
 wilderness.1010.desc.outro: "Nasze superkonstrukcje, nasze składniki odżywcze i nasze DNA zaczęły się adaptować oraz łączyć z życiem istniejącym tu przed nami. [from.GetName] budzi się."
 wilderness.1010.a: "Niebawem nasze światy się zjednoczą."
 # Terraforming Events
 terra.25.desc.wilderness: "Nasz długotrwały projekt przebudzenia §Y[From.GetAdj&genitive]§! nie zakończył się zgodnie z naszymi oczekiwaniami. Pęknięcia w naszych konfiguratorach biomasy uwolniły niewielki strumień §Yresztek po terraformowaniu§!, które zatkały doliny oraz utworzyły lepką skorupę na niektórych strefach nadających się do zamieszkania.\n\nChociaż ten nadmiarowy materiał przypominający ropę nie stanowi dla nas bezpośredniego zagrożenia, nasze bardziej ruchliwe elementy mogą przez jakiś czas mieć pewne problemy."
 terra.80.desc.wilderness: "Uwolniliśmy przyszłych siebie od kolejnej warstwy promieniowania w atmosferze i glebie planety §Y[From.GetName]§!. Jednak nasi czujni [Root.GetTerraformerPlural] musieli interweniować i tymczasowo odizolowali część tego świata. Wygląda na to, że zakłóciliśmy egzystencję nieuchwytnego rdzennego gatunku, który żyje w napromieniowanym środowisku. Niestety, nasze działania sprawiły, że zaczął on słabnąć.\n\nCo ciekawsze, ten gatunek wygląda na przedrozumny, znajduje się o krok od uzyskania zdolności samodzielnego myślenia. Skoro [From.GetName] zamierza usunąć ze swego środowiska ostatnie pozostałości niebezpiecznego dziedzictwa, musimy postanowić, jak postępować z tą nową formą życia."
 terra.80.b.wilderness: "To ich świat. Dajmy im się przebudzić."
 terra.80.d.wilderness: "Pochłońmy ich."
 wilderness.2000.name: "Zaplanowane przebudzenie"
 #wilderness.2000.desc.reg: "We feel the tremendous potential of [from.GetName]. It seems proper to both fear and delight in the awesome power we are about to exert there: shaping this [from.GetPlanetMoon] with our will and the tools we have developed; laying the pattern for its eventual awakening.\n\nWe have long relied on natural processes to grow and sustain the [root.GetName]. But these trials also cost us dearly, and taught us much. Now we shall see what wonders emerge when a habitable world skips its own evolution and gains the wisdom of hard-earned growth and decay."
 wilderness.2000.desc.barren: "Trudno jest patrzeć na spustoszenie [from.GetAdj&genitive], ale to już nie potrwa długo. Życie galaktyczne jak dotąd ignorowało ten jałowy świat, ale my, [root.GetName], posiadamy narzędzia i wiedzę, które pozwolą to zmienić.\n\nMimo że wiele się już nauczyliśmy, czeka nas ciężkie zadanie odbudowy [from.GetAdj&genitive]. Dzięki naszej woli i odkrytym przez nas narzędziom wpływającym na klimat, życie pojawi się wkrótce w miejscach, w których wcześniej go nie było."
 wilderness.2000.desc.tomb_detox: "Chociaż życie, jakie znamy na świecie [from.GetName] zostało zniszczone, jesteśmy teraz przygotowani dać mu kolejną szansę. Zaczęliśmy odnawiać atmosferę, szlaki wodne oraz glebę, żeby ponownie mogło rozkwitnąć życie w postaci [root.GetAdj&genitive]."
 wilderness.2000.desc.gaia: "Tygiel ewolucji uczynił cuda dla nas, [root.GetAdj&genitive]. Ale teraz [from.GetPlanetMoon] [from.GetName] może dostać od nas o wiele więcej. Dzięki narzędziom oraz wiedzy, o których nasza dawna jaźń mogła tylko marzyć, zaczęliśmy kształtować świat [from.GetName] - teraz może stać się miejscem, które przebudzi się jak żadne inne.\n\nFundamenty [from.GetAdj&genitive] będą kiedyś pełne składników odżywczych, zostaną ożywione przez cykle życiowe wielu gatunków naszej flory i fauny. Doliny, pasma górskie i płaskowyże zapewnią wiele miejsca dla zbieractwa, polowania oraz budowy schronień. Rozkwitnie tu życie."
 wilderness.2000.a: "Zaczynajmy."
 wilderness_pre_sapient_defence_army: "Stado przedrozumnych"
 seq_wilderness_pre_sapient_defence_army: "Stado symbiontów $R$" # e.g. 'Symbiont Herd IV'
 wilderness_pre_sapient_defence_army_plural: "Stada przedrozumnych"
 wilderness_pre_sapient_defence_army_desc: "Wyjątkowo terytorialne stworzenia. Łagodne, dopóki nie zostaną sprowokowane. Gdy jednak poczują się zagrożone, kieruje nimi prymitywny instynkt - za wszelką cenę bronią tych, których uważają za swoją rodzinę."
 wilderness_pre_sapient_assault_army: "Horda przedrozumnych"
 seq_wilderness_pre_sapient_assault_army: "Horda symbiontów $R$" # e.g. 'Symbiont Horde IV'
 wilderness_pre_sapient_assault_army_plural: "Hordy przedrozumnych"
 wilderness_pre_sapient_assault_army_desc: "Dzikie stworzenia, które dzięki sprytowi i czystej wytrzymałości potrafią brutalnie zniszczyć każdego, kogo uznają za wroga."
 ####################################
 # Origins
 ####################################
 origin_wilderness: "Dzicz"
 origin_wilderness_desc: "§RUWAGA: Blokuje wszystkie drogi rozwoju oprócz: ['concept_purity_ascension'].§!\n\nTa istota to po prostu świadoma ekosfera: liczne, różne organizmy, które dawno temu zespoliły się, by stworzyć połączoną świadomość na skalę planetarną."
 origin_tooltip_wilderness_effects: "- Cecha gatunkowa: ['trait:trait_wilderness']\n- Zastępuje wszystkie standardowe £building£ ['concept_buildings', budynki], £district£ ['concept_districts', dzielnice] i £zone£ ['concept_district_specialization', specjalizacje dzielnicy] specjalnymi wersjami\n- Zastępuje kolonizację za pomocą statku kolonizacyjnego ['concept_terraforming', terraformowaniem]\n- Odblokowuje nowy zasób: £biomass£ ['concept_biomass', biomasę] \n- Świat macierzysty:$TABBED_NEW_LINE$- Wielkość: £planetsize£ 18$TABBED_NEW_LINE$- ['concept_scorched_plains', £blocker£ $d_scorched_plains$]"
 trait_wilderness: "Dzicz"
 trait_wilderness_desc: "§LTen gatunek istnieje jako część mutualistycznej istoty. Stał się nieodróżnialny od swojego środowiska w myśleniu i wydajności produkcji.§!"
 WILDERNESS_NATURAL_WORLDS_DECLINE: "§R§YDzicz§! nie może przetrwać na nienaturalnych światach.§!"
 WILDERNESS_DEAD_WORLD: "$TRIGGER_FAIL$§YDzicz§! nie może przetrwać w imperiach nie należących do Dziczy."
 country_virtual_jobs: "Wszystkie miejsca pracy w tym imperium są zapełniane automatycznie."
 concept_wilderness_trait: "$trait_wilderness$"
 concept_wilderness_trait_desc: "- $MOD_LOGISTIC_GROWTH_MULT$: §R-100%§!\n- §RNie może migrować ani przesiedlać się§! $NEW_LINE$- §RNie może się rozmnażać w sposób naturalny§!\n\n§L$trait_wilderness_desc$§!"
 PRESCRIPTED_adjective_zhardmehka: "Kwitnący"
 PRESCRIPTED_ship_prefix_zhardmehka: "ZMV"
 PRESCRIPTED_species_name_zhardmehka: "Zhard-Krellin"
 PRESCRIPTED_species_name_plural_zhardmehka: "Zhard-Krellini"
 PRESCRIPTED_species_adjective_zhardmehka: "Zhard-Krellinów"
 PRESCRIPTED_planet_name_zhardmehka: "Tellon"
 PRESCRIPTED_system_name_zhardmehka: "Tattla"
 PRESCRIPTED_ruler_name_zhardmehka: "$FUN3_CHR_Obanva$ $FUN3_CHR_uvi-Livve$"
 PRESCRIPTED_ruler_title_zhardmehka: "Awatar"
 START_SCREEN_WILDERNESS_INTRO: "Jak daleko sięgnąć pamięcią, imperium [root.GetHomeWorldName] było planetą [root.GetHomeWorldName]. Każda tutejsza łodyga, wić i enzym jest częścią jaźni: równą częścią rozwoju, rozkładu i drapieżnictwa. Przez wieki imperium [root.GetHomeWorldName] mogło tylko jak przez mgłę przypatrywać się galaktyce. Jednak gwiazdy od dawna są niespokojne.\n\nW przestworzach świata [root.GetHomeWorldName] rozegrała się bitwa. Szczątki wielkich okrętów spadały na jego powierzchnię. Te kosmiczne artefakty szybko znalazły inne zastosowanie. Potem doszło do syperrozbłysku..."
 START_SCREEN_WILDERNESS_DEFAULT: "Świat [root.GetHomeWorldName] odczuł to jako oślepiające, palące światło. Miliardy naszych symbiontów spłonęły i zostały pochłonięte przez burze ogniowe oraz promieniowanie. Życie zniknęło z całego kontynentu."
 START_SCREEN_WILDERNESS_COLD: "Świat [root.GetHomeWorldName] odczuł to jako oślepiające, palące światło. Lodowce zamieniły się w szalejące burze, a promieniowanie gwiezdne spaliło do cna świat [root.GetHomeWorldName]. Woda pochłonęła cały kontynent."
 START_SCREEN_WILDERNESS_DRY: "Świat [root.GetHomeWorldName] odczuł to jako oślepiające, palące światło. Wydmy rozpuściły się i zamieniły w szkło, a potężny wiatr wygładził skalne zbocza. Cały kontynent zamienił się w jałowe pustkowie."
 START_SCREEN_WILDERNESS_WET: "Świat [root.GetHomeWorldName] odczuł to jako oślepiające, palące światło. Jeziora zagotowały się, a pokrywy lodowe rozpuściły, gdy promieniowanie gwiezdne spaliło do cna świat [root.GetHomeWorldName]. Przepadł cały kontynent."
 START_SCREEN_WILDERNESS_OUTRO: "Obudził nas ból. Po raz pierwszy zrozumieliśmy, jak bardzo jesteśmy delikatni. Galaktyka to niebezpieczne miejsce, a jednocześnie pełne cudów. Wykorzystując zdobytą wiedzę, będziemy kiełkować i rozprzestrzeniać się. Wyruszymy ku gwiazdom."
 ####################################
 # Authorities
 ####################################
 auth_mutualistic_intelligence: "Mutualistyczna inteligencja"
 auth_mutualistic_intelligence_plural: "Mutualistyczne inteligencje"
 auth_mutualistic_intelligence_desc: "$auth_mutualistic_intelligence_plural$ wyłaniają się jako podzielone świadomości w skali planetarnej. Składają się one z gatunków symbiotycznych, pochodzących z najróżniejszych biot, wszystkie działają zgodnie ze wspólną wolą ich środowiska.\n\nWybrane symbionty mogą pracować częściowo autonomicznie przy specjalistycznych zadaniach, ale większość z nich musi mieć regularny kontakt ze swoim mutualistycznym środowiskiem. Jeżeli zostaną odizolowane, ponownie zdziczeją i będą kierowane wyłącznie czystym instynktem, aż w końcu umrą."
 tt_auth_mutualistic_intelligence: "Ma władzę: §Y$auth_mutualistic_intelligence$§! (§Y$auth_hive_mind$§!)"
 gov_wilderness: "$gov_hive_mind$"
 gov_wilderness_desc: "Ten ustrój działa jak pojedyncza świadoma istota, a populacja nie ma żadnych celów poza zaspokajaniem potrzeb i pragnień, które wyraża $RT_WILDERNESS$."
 RT_WILDERNESS: "Dzicz"
 RT_WILDERNESS_FEMALE: "$RT_WILDERNESS$"
 ####################################
 # Buildings
 ####################################
 building_colony_shelter_wilderness: "Wici planetarne"
 building_colony_shelter_wilderness_desc: "Wielokomórkowe pogranicze organizmów oplata ten świat, dzięki czemu dzicz może być tam nieustannie obecna."
 building_capital_wilderness: "Pakiet korzeni planetarnych"
 building_capital_wilderness_desc: "Rozległa, dynamiczna masa prostych organizmów, która współpracuje z ruchomymi symbiontami, by poprawić ich koordynację i produktywność."
 building_major_capital_wilderness: "Kompleks korzeni planetarnych"
 building_major_capital_wilderness_desc: "Skoncentrowana masa organiczna o gęstości, dzięki której symbionty mogą żyć, pracować i rozmnażać się w jednej, ściśle zlokalizowanej sferze."
 building_system_capital_wilderness: "Węzeł korzeni planetarnych"
 building_system_capital_wilderness_desc: "Niesamowite połączenie różnorodnych organizmów, które współpracują tak harmonijnie, że tworzą własne idealne mikroklimaty."
 requires_building_wilderness_capital: "§RNa planecie musi być §Y$building_capital_wilderness$§!.§!"
 requires_building_wilderness_major_capital: "§RNa planecie musi być §Y$building_major_capital_wilderness$§!.§!"
 requires_building_wilderness_system_capital: "§RNa planecie musi być §Y$building_system_capital_wilderness$§!.§!"
 building_imperial_capital_wilderness: "Kompleks imperialny"
 building_imperial_capital_wilderness_desc: "Ze swojej ogromnej i skomplikowanej struktury dzicz zarządza Imperium Galaktycznym. To tutaj ważą się losy galaktyki."
 building_tendril_cradle_1: "Kołyska wici"
 building_tendril_cradle_1_desc: "Skupisko krótkich, zakorzenionych włókien rozchodzi się z tego miejsca, przyciągając pobliskie surowce do kluczowych organów w bezpośrednim sąsiedztwie."
 building_tendril_cradle_2: "Wiciowe przęsło"
 building_tendril_cradle_2_desc: "Wydłużone wici rozciągają się w poprzek terenu, ściągając zasoby z sąsiednich przestrzeni przed ich przetworzeniem i redystrybucją."
 building_tendril_cradle_3: "Gniazdo pasokorzeni"
 building_tendril_cradle_3_desc: "Splecione korzenie pulsują i przesuwają się pod powierzchnią, przenosząc biomasę przez warstwowe kanały w kierunku odległych węzłów biotycznych."
 building_tendril_cradle_4: "Planetarne wicioserce"
 building_tendril_cradle_4_desc: "Ogromne logistyczne wici rozchodzą się promieniście po całym ciele planety, ciągnąc, przesuwając i ukierunkowując zasoby dziczy z niestrudzoną synchronizacją."
 planet_research_buildings: "Budowle badań planetarnych"
 mod_planet_research_buildings_upkeep_mult: "$planet_research_buildings$ - utrzymanie"
 building_brain_node_1: "Odrosty badawcze"
 building_brain_node_1_desc: "Praca swawolnych symbiontów badawczych tworzy podwaliny badań ogólnych."
 mod_planet_building_brain_node_1_build_speed_mult: "$building_brain_node_1$ - szybkość budowy"
 building_brain_node_2: "Zagajnik badawczy"
 building_brain_node_2_desc: "Wyjątkowy habitat przeznaczony do promowania dociekliwych zachowań. Ułatwia badania bardziej zaawansowanych zjawisk i artefaktów."
 mod_planet_building_brain_node_2_build_speed_mult: "$building_brain_node_2$ - szybkość budowy"
 building_brain_node_3: "Rezerwat badań egzotycznych"
 building_brain_node_3_desc: "Te wielkie rezerwaty umożliwiają wielu symbiontom-ekstremofilom eksperymentowanie z przeróżnymi niebezpiecznymi i egzotycznymi materiałami."
 mod_planet_building_brain_node_3_build_speed_mult: "$building_brain_node_3$ - szybkość budowy"
 building_brain_node_4: "Rezerwat badań zaawansowanych"
 building_brain_node_4_desc: "To połączenie egzotycznej technologii z wielkim rezerwatem porośniętym symbiontami. Ułatwia prowadzenie nowoczesnych badań w przeróżnych otwartych środowiskach."
 mod_planet_building_brain_node_4_build_speed_mult: "$building_brain_node_4$ - szybkość budowy"
 building_commensal_clearing_1: "Polana komensaliczna"
 building_commensal_clearing_1_desc: "Te ostoje spokoju umożliwiają wszelkiego rodzaju rzęskom gromadzenie się, odpoczynek i reorientację w dziczy."
 building_commensal_clearing_2: "Zagajnik komensaliczny"
 building_commensal_clearing_2_desc: "Idealne, osłonięte areny do masowego gromadzenia symbiontów. Tutaj ich interakcje pozwalają głębiej zrozumieć rozproszoną jaźń."
 building_commensal_clearing_3: "Dolina komensaliczna"
 building_commensal_clearing_3_desc: "Gęste oraz bardzo zróżnicowane społeczności symbiontów migrują przez te nieskazitelne formacje i wzmacniają łączące je więzi."
 building_commensal_clearing_4: "Biom komensaliczny"
 building_commensal_clearing_4_desc: "W rozległych, połączonych ze sobą habitatach dochodzi do niezliczonych spotkań, a każde z nich stanowi niezbędny impuls budujący mutualistyczną jedność."
 building_massive_growth_1: "Pożywna dolina"
 building_massive_growth_1_desc: "Niewielka struktura geologiczna z idealnym przez cały rok klimatem. Gwarantuje sprawny rozwój upraw."
 building_massive_growth_2: "Pożywne zarośla"
 building_massive_growth_2_desc: "Rozległa, częściowo przepuszczalna warstwa koron drzew zapewnia tym zaroślom pełną ochronę środowiskową niezbędną do wytwarzania wysokiej jakości pożywienia."
 building_massive_growth_3: "Megaplantacja warstwowa"
 building_massive_growth_3_desc: "Raj dla częściowo wodnych mikroorganizmów oraz fauny. Te rozległe tarasy dostarczają ogromnej ilości materii białkowej oraz zbóż."
 building_massive_growth_4: "Plantacja leśna"
 building_massive_growth_4_desc: "Zarośla ochraniane przez megaflorę liściastą dostarczają dużych zbiorów dla całej sieci żywnościowej."
 building_bioelectric_stimulator_1: "Aklimatyzator chloroplastyczny"
 building_bioelectric_stimulator_1_desc: "Zlepek bąbli przypominających soczewki. Koncentruje promienie słoneczne do wnętrza mieszaniny alg, gdzie światło zostaje zamienione w energię, którą przechowuje się do późniejszego użycia."
 building_bioelectric_stimulator_2: "Akcelerator chloroplastyczny"
 building_bioelectric_stimulator_2_desc: "Szkliste bąble pełne alg prowadzących fotosyntezę. Wykorzystują energię słoneczną do tworzenia silniejszych wiązań biochemicznych, co zmniejsza ich emisje."
 building_bioelectric_stimulator_3: "Soczewki chloroplastyczne"
 building_bioelectric_stimulator_3_desc: "Gałęzie z przeciwwagą, pełne kolektorów słonecznych. Mogą unosić się i obniżać wedle zapotrzebowania oraz pojemności, co czyni je uniwersalnym i niezawodnym węzłem zasilającym."
 building_bioelectric_stimulator_4: "Cysta chloroplastyczna"
 building_bioelectric_stimulator_4_desc: "Te szkliste worki wypełnione algami mogą migrować i mnożyć się, gdy ich energia jest najbardziej potrzebna, praktycznie nie tracąc mocy po drodze."
 building_churning_tunnels_1: "Wiertło litowe"
 building_churning_tunnels_1_desc: "Materia roślinna o twardości zbliżonej do kryształu zostaje wprowadzona do istniejących miejsc wydobycia oraz wokół nich, co zwiększa urobek przydatnych minerałów."
 building_churning_tunnels_2: "Filtry litowe"
 building_churning_tunnels_2_desc: "Kolonie półprzepuszczalnych błon biologicznych zbierają cenne minerały, które w innym razie przepadłyby wśród odpadów z mokrego wydobycia."
 building_churning_tunnels_3: "Rozdrabniarka litowa"
 building_churning_tunnels_3_desc: "Potężne płyty mielące oraz szczypce pozwalają rozbić materię gleby na zawiesinę chemiczną, z której można łatwiej pozyskać minerały."
 building_churning_tunnels_4: "Baseny litowe"
 building_churning_tunnels_4_desc: "Połączenie rozdrabniarek, środków biochemicznych i błon biologicznych umożliwia pozyskiwanie minerałów na miejscu, gdzie znajduje się bogata żyła."
 building_natural_furnace_0: "Zbiornik przetapiania"
 building_natural_furnace_0_desc: "Symbionty ciepłolubne pracują niestrudzenie, by wytwarzać stopy wysokiej jakości w tym naturalnym źródle ciepła i wokół niego."
 building_natural_furnace_1: "Piec do przetapiania"
 building_natural_furnace_1_desc: "Rośliny odporne na wysokie temperatury wydajniej używają ciepła, dzięki czemu pozwalają wytwarzać doskonałe stopy."
 building_natural_furnace_2: "Piec świetlny"
 building_natural_furnace_2_desc: "Skomplikowane piece litoorganiczne, wspomagane technologią holograficzną. Pozwalają wytwarzać bardzo uniwersalne stopy."
 building_natural_furnace_3: "Nanopiec"
 building_natural_furnace_3_desc: "W tych zbiornikach cieplnych i piecach znajdują się ciepłolubne nanoorganizmy, które usuwają z naszych stopów niepożądane zanieczyszczenia."
 building_avatar_chamber_1: "Kołyska awatara"
 building_avatar_chamber_1_desc: "Organ pączkowania, w którym dzicz zaczyna kształtować podstawowe formy. Przygotowuje swoje instynkty do nieznanego życia i terenu poza rodzimą biosferą."
 building_avatar_chamber_2: "Komora awatara"
 building_avatar_chamber_2_desc: "Symulowane ciała są hodowane i poddawane wewnętrznym próbom, naśladując obce organizmy i ekosystemy. Wiedza rozprzestrzenia się poprzez ucieleśnienie nieznanego."
 building_avatar_chamber_2_effect: "$building_avatar_chamber_1$ wytwarzają §G+200§! £amenities£ udogodnień"
 building_avatar_chamber_3: "Las awatara"
 building_avatar_chamber_3_desc: "Ten rozległy organ emituje szablony awatarów ukształtowane na wzór obcych form i krajobrazów. Dzicz uczy się, żyjąc tym, czego nigdy nie dotknęła."
 building_avatar_chamber_3_effect: "$building_avatar_chamber_1$ wytwarzają §G+400§! £amenities£ udogodnień"
 building_avatar_chamber_4: "Kora awatara"
 building_avatar_chamber_4_desc: "Konstrukt wcieleniowy na skalę planetarną zdolny do symulowania całych cywilizacji, ksenoekologii i ekstremów środowiskowych. Tutaj dzicz ćwiczy swoje spotkanie z galaktyką."
 building_avatar_chamber_4_effect: "$building_avatar_chamber_1$ wytwarzają §G+800§! £amenities£ udogodnień"
 building_mote_aggravator: "Warnik chemiczny"
 building_mote_aggravator_desc: "Elegancki system tkanek naczyniowych i metabolizatorów chemicznych wytwarza $volatile_motes$ ze zwykłej materii gleby."
 building_churning_stomach: "Filtry gazu egzotycznego"
 building_churning_stomach_desc: "Wysoce wyspecjalizowane mikroby i nanoorganizmy wchodzą w reakcję ze zwykłymi aerozolami, w wyniku czego powstają oczyszczone $exotic_gases$."
 building_crystal_growth: "Kryształowa grządka"
 building_crystal_growth_desc: "$rare_crystals$ potrzebują specyficznych warunków, by rosnąć. Specjalne sklepienia ułatwiają precyzyjną regulację wilgotności i temperatury wymaganych do ich pracochłonnej hodowli."
 building_planetary_carapace: "Kościany garnizon"
 building_planetary_carapace_desc: "Na tym osłoniętym poligonie może znaleźć się mnóstwo zajadle terytorialnych symbiontów, gotowych do użycia, gdy zajdzie taka potrzeba."
 mod_planet_building_planetary_carapace_build_speed_mult: "$building_planetary_carapace$ - szybkość budowy"
 building_planetary_carapace_2: "Kościana forteca"
 building_planetary_carapace_2_desc: "Ta ogromna placówka szkoleniowa i mieszkalna gwarantuje, że znajdujący się tam obrońcy są przygotowani na ewentualną inwazję planetarną."
 building_ozone_thickener: "Sklepienie osłon planetarnych"
 building_ozone_thickener_desc: "$tech_planetary_shield_generator_desc$"
 building_subterranean_cache: "Podziemny skład"
 building_subterranean_cache_desc: "$building_resource_silo_desc$"
 building_cradle_of_rebirth: "Kolebka odrodzenia"
 building_cradle_of_rebirth_desc: "Zakorzeniona głęboko struktura metabolizuje rozkładającą się materię i schwytaną zdobycz, przekształcając je w biomasę i odżywiając ciało świata z każdym cichym pulsem."
 building_wilderness_storm_relief: "$building_storm_resistant_production$"
 building_wilderness_storm_relief_desc: "Rozległa osłona ze wzmocnionych liści doładowanych bioelektrycznie zapewnia bezpieczeństwo pobliskim symbiontom i umożliwia błyskawiczne reagowanie na aktywność burzy kosmicznej, bez ryzyka dla życia oraz produktywności."
 building_wilderness_storm_relief_tt: "Negatywne efekty, które wywołuje §Y$default_storm$§!, a które wpływają na produkcję planetarną, zostają zmniejszone o §G25%§!"
 holding_wilderness_glade: "Polana dziczy"
 holding_wilderness_glade_plural: "Polany dziczy"
 holding_wilderness_glade_desc: "Region produkcyjny symbiotycznej dziczy, subtelnie połączony z macierzystą zbiorowością. Chociaż symbionty są w dużym stopniu zależne od lokalnych źródeł żywności, to te znajdujące się w tym kieszonkowym biomie potrafią pozyskiwać inne zasoby znajdujące się w pobliżu."
 holding_wilderness_glade_effect_desc: "Poddany zamienia [owner.WildernessGladeProvides] w $r_basic_plural$ dla suwerena.\nSuweren zmniejsza $mod_planet_jobs_productive_upkeep_mult$ na świecie poddanego.\nNa planecie pojawia się £blocker£ §Y$holding_wilderness_glade$§! i zajmuje miejsce na dzielnicę."
 no_free_district_for_wilderness_glade: "$TRIGGER_FAIL$§RNie ma na tej planecie wolnej dzielnicy dla naszego kieszonkowego biomu.§!"
 blocker_tied_to_wilderness_glade: "$TRIGGER_FAIL$§RTa przeszkoda pozostanie, dopóki na tym świecie istnieje posiadłość \"§Y$holding_wilderness_glade$§!\".§!"
 d_wilderness_glade_blocker: "$d_wilderness_root_blocker$"
 d_wilderness_glade_blocker_desc: "$holding_wilderness_glade$ potrzebuje rozległego systemu korzeniowego, aby się utrzymać. Dzięki niemu ten kieszonkowy biom przetrwa w naszym obcym dla niego środowisku."
 holding_wilderness_glade_modifier: "Rozproszone polany dziczy"
 holding_wilderness_glade_modifier_desc: "Światy poddanych są harmonijnie połączone z naszymi, każdy z partnerów dzieli się swoimi zyskami z mutualizmu." # appears in 'lore brown'
 holding_wilderness_glade_modifier_tt: "Ilości zależą od liczby światów poddanych, które są gospodarzami dla: §Y$holding_wilderness_glade_plural$§!."
 ####################################
 # Districts
 ####################################
 district_craglands: "Biom komunalny"
 district_craglands_plural: "Biomy komunalne"
 district_craglands_desc: "Te tętniące życiem polany są schronieniem dla symbiontów, które tworzą dzicz i jednocześnie są od niej zależne."
 mod_district_craglands_max_add: "Maks. $district_craglands_plural$"
 mod_planet_district_craglands_build_speed_mult: "$district_craglands$ - szybkość budowy"
 district_orchard_forests: "Las ogrodowy"
 district_orchard_forests_plural: "Lasy ogrodowe"
 district_orchard_forests_desc: "Regiony przeznaczone pod uprawy i polowanie. Pozyskuje się z nich wszystko, od żywności komórkowej, aż po jadalne ziarna oraz symbionty łowne."
 mod_district_orchard_forests_max_add: "Maks. $district_orchard_forests_plural$"
 mod_planet_district_orchard_forests_build_speed_mult: "$district_orchard_forests$ - szybkość budowy"
