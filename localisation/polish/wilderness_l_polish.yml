 photosymbiont: "$job_photosymbiont$"
 job_photosymbiont: "Fotosymbiont"
 job_photosymbiont_plural: "Fotosymbionty"
 job_photosymbiont_plural_with_icon: "£job_photosymbiont£ $job_photosymbiont_plural$"
 job_photosymbiont_desc: "Widoczne z orbity, cykle migracyjne tych symbiontów są zsynchronizowane z wędrówką słońca."
 job_photosymbiont_effect_desc: "£job_photosymbiont£ $job_photosymbiont_plural$ wytwarzają £energy£ §Y$energy$§!."
