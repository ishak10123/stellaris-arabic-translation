 job_spindlesymbiont: "Wrzecionosymbiont"
 job_spindlesymbiont_plural: "Wrzecionosymbionty"
 job_spindlesymbiont_desc: "Dzięki niezliczonym elastycznym kończynom i egzotycznym narządom zmysłów ten symbiont steruje przepływem zasobów, kierując składniki odżywcze, materię i materiały tam, gdzie są najbardziej potrzebne. Każdy ruch równoważy dzicz."
 job_spindlesymbiont_with_icon: "£job_spindlesymbiont£ $job_spindlesymbiont$"
 job_spindlesymbiont_plural_with_icon: "£job_spindlesymbiont£ $job_spindlesymbiont_plural$"
