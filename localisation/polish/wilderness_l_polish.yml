 pop_cat_wilderness_heart_strata: "$biomass$"
 pop_cat_wilderness_heart_strata_plural: "$biomass$"
 pop_cat_wilderness_heart_strata_desc: "Połączona wola całej ekosfery, wyrażana, jakby była wytworem jednego umysłu."
 mod_pop_cat_wilderness_heart_strata_bonus_workforce_mult: "Dodatkowa siła robocza dla: $pop_cat_wilderness_heart_strata_plural$"
 pop_cat_menial_symbiont: "Symbiont służący"
 pop_cat_complex_symbiont: "Zaawansowany symbiont"
 pollinosymbiont: "$job_pollinosymbiont$"
 job_pollinosymbiont: "Symbiont zapylacz"
 job_pollinosymbiont_plural: "Symbionty zapylacze"
 job_pollinosymbiont_plural_with_icon: "£job_pollinosymbiont£ $job_pollinosymbiont_plural$"
 job_pollinosymbiont_desc: "Ich zadaniem jest dbanie o płodność planety, zapylają nie tylko kwiaty, ale też lasy, łąki i rafy."
 job_pollinosymbiont_effect_desc: "£job_pollinosymbiont£ $job_pollinosymbiont_plural$ wytwarzają £food£ §Y$food$§!."
 mod_job_pollinosymbiont_add: "Miejsca pracy: $job_pollinosymbiont$"
