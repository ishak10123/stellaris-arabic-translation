 COLONIZATION_IMPOSSIBLE_WILDERNESS_TECH: "§RNie możemy kolonizować planet, które zanadto różnią się od naszego świata macierzystego, jeśli nie mamy: £society£ §H$tech_ecological_adaptation$§!.§!"
