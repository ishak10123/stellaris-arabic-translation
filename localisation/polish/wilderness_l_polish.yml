 grubsymbiont: "$job_grubsymbiont$"
 job_grubsymbiont: "Symbiont czerw"
 job_grubsymbiont_plural: "Symbionty czerwie"
 job_grubsymbiont_plural_with_icon: "£job_grubsymbiont£ $job_grubsymbiont_plural$"
 job_grubsymbiont_desc: "Te symbionty są ślepe i miękkie. Ryją, wywołując wibracje. Przyciąga je tylko rezonans metalu szlachetnego."
 job_grubsymbiont_effect_desc: "£job_grubsymbiont£ $job_grubsymbiont_plural$ wytwarzają £minerals£ §Y$minerals$§!."
