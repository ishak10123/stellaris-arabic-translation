 job_crystalsymbiote: "Kryształowy symbiont"
 job_crystalsymbiote_plural: "Kryształowe symbionty"
 job_crystalsymbiote_desc: "Te symbionty wytwarzają na swoich ciałach formacje rzadkich kryształów. Każda narośl jest kształtowana przez środowisko, funkcję i potrzeby wspólnoty."
 job_crystalsymbiote_effect_desc: "[translucer_drone.GetIcon] $job_crystalsymbiote_plural$ zamieniają [GetCatalyticMineralsOrFood] w £rare_crystals£ §Y$rare_crystals$§!."
