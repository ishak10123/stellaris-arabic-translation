 mod_job_choirsymbiont_per_pop_short: "\n§G+1§! £mod_job_choirsymbiont_add£ na $VALUE$ £pop£"
 forgesymbiont: "$job_forgesymbiont$"
 job_forgesymbiont: "Symbiont hutniczy"
 job_forgesymbiont_plural: "Symbionty hutnicze"
 job_forgesymbiont_plural_with_icon: "£job_forgesymbiont£ $job_forgesymbiont_plural$"
 job_forgesymbiont_desc: "Zrodzone z magmy i kierowane instynktem, te symbionty przetwarzają surowe rudy na stopy, czyniąc z nich dary dla dziczy."
 job_forgesymbiont_effect_desc: "£job_forgesymbiont£ $job_forgesymbiont_plural$ zamieniają £minerals£ §Y$minerals$§! w £alloys£ §Y$alloys$§!."
