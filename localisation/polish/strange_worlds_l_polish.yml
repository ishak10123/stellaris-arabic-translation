 pm_bd_creativity_desc: "$bacterial_drive_modifier_desc$"
 ladder_wars_pre_ftl: "Spuścizna wojen o drabiny"
 ladder_wars_pre_ftl_desc: "Ten rozdarty wojną świat odbudowuje się, a jednocześnie narasta paranoja jego populacji, co czyni ogromnym wyzwaniem kontakty z innymi."
 living_metal_mega_construction_insight: "Wiedza o superkonstrukcji z żywego metalu"
 living_metal_mega_construction_insight_desc: "Znaleziony przez nas artefakt z żywego metalu dostarczył nam ogromnej wiedzy o projektowaniu superkonstrukcji."
 living_metal_mega_construction_insight_ct: "Koszt podstawowy edyktu o superkonstrukcji z żywego metalu: §G-50%§!"
 d_coagulated_landscape: "Zakrzepły krajobraz"
 d_coagulated_landscape_desc: "Lepka ciecz wypływa rytmicznymi strumieniami spod powierzchni planety i krzepnie, tworząc prawie niezniszczalny niebezpieczny materiał. Nie zostawia to wiele miejsca pod bezpieczne budowanie."
 d_shimmering_structure: "Migająca budowla"
 d_shimmering_structure_desc: "Duża, migająca budowla nieznanego pochodzenia."
 d_geothermal_hotspot: "Centrum geotermalne"
 d_geothermal_hotspot_desc: "Ta planeta posiada wyjątkowe miejsce geotermiczne, które dostarcza zarówno energię, jak i możliwości badawcze."
 d_ancient_cloaking_array: "Starożytna macierz maskująca"
 d_ancient_cloaking_array_desc: "Ta kolonia korzysta z obecności starożytnej macierzy maskującej. Wrogom nie będzie łatwo nas zaatakować. Koloniści mogą czuć się tutaj bezpieczni."
 d_psionic_sands: "Piasek psioniczny"
 d_psionic_sands_desc: "Piasek na tej planecie zawiera duże stężenie zro. Można się z nim porozumiewać."
 d_mountains_of_steel: "Góry stali"
 d_mountains_of_steel_desc: "Te potężne, rozległe góry powstały w ogromnych temperaturach podczas terraformowania i mają bogate złoża zasobów."
 d_lava_tubes: "Tunele z lawą"
 d_lava_tubes_desc: "Przepływająca magma stworzyła tu głębokie tunele bogate w minerały. Te produkty uboczne to lukratywna okazja dla górnictwa."
 d_lava_tubes_ct: "$t$Koszt utrzymania (£energy£) za miejsca pracy: [miner.GetIcon] [miner.GetName]: §R+$@lava_tubes_mining_job_upkeep$§!"
 d_lava_tubes_ct_short: "§R+$@lava_tubes_mining_job_upkeep$§! Koszt utrzymania (£energy£) za miejsca pracy: [miner.GetIcon] [miner.GetName]"
 d_hydroactive_eggs: "Hydroaktywne jaja"
 d_hydroactive_eggs_desc: "W tutejszym środowisku naturalnym woda występuje powszechnie, dzięki czemu lokalna fauna rozmnaża się błyskawicznie."
 d_explosive_atmosphere: "Wybuchowa atmosfera"
 d_explosive_atmosphere_desc: "Duże stężenie lotnych pyłków w powietrzu sprawia, że atmosfera tej planety jest wysoce łatwopalna."
 d_explosive_atmosphere_ct: "$t$£volatile_motes£ §Y$volatile_motes$§! z miejsc pracy: [mote_harvester.GetIcon] $mote_harvester$: §G+50%§!"
 d_explosive_atmosphere_ct_short: "§G+50%§! £volatile_motes£ §Y$volatile_motes$§! z miejsc pracy: [mote_harvester.GetIcon] $mote_harvester$"
 d_blue_lava: "Niebieska lawa"
 d_blue_lava_desc: "Proces terraformowania wywołał w głębi planety reakcję między bogatymi złożami gazu oraz stopów i zamienił powierzchnię tego świata w hipnotyzującą niebieską lawę."
 d_crystaline_growths: "Skupisko kryształów"
 d_crystaline_growths_desc: "Na tej planecie jest mnóstwo skupisk kryształów, które można zebrać i wykorzystać."
 d_bogplants: "Rośliny bagienne"
 d_bogplants_desc: "Wysoce kwasowe bagna są zamieszkiwane przez wyjątkowy gatunek flory, który w trakcie odżywiania emituje gaz egzotyczny."
 d_liquid_dark_matter: "Płynna ciemna materia"
 d_liquid_dark_matter_desc: "Dziwny gejzer zapadł się i utworzył sadzawkę płynnej ciemnej materii."
 d_space_junk_hazards: "Niebezpieczny złom kosmiczny"
 d_space_junk_hazards_desc: "Orbitujące śmieci kosmiczne są zagrożeniem dla przelatujących promów, a jeśli wpadają w atmosferę, zagrażają też budowlom lądowym."
 trait_inner_darkness: "Wewnętrzna ciemność"
 trait_inner_darkness_desc: "Ich ciała zmieniły się po nasyceniu ciemną materią, uwalniają teraz w regularnych odstępach czasu śladowe ilości cząstek niebarionowych, ale ta zmiana skróciła też potencjalną długość ich życia."
 trait_inner_darkness_tt: "£sr_dark_matter£ $produced_per_pop_group_unit$ £pop£ populacje: §G+$@inner_darkness_dark_matter_production$§!"
 trait_geleboric_mutations: "Mutacje geleboryczne"
 trait_geleboric_mutations_desc: "Niefortunne reakcje na eksperymenty zmieniły dramatycznie fizjologię tego gatunku."
 trait_psionic_ephapse: "Efapsa psioniczna"
 trait_psionic_ephapse_desc: "Po długotrwałym kontakcie z bakteriami zmieniającymi stan umysłu, układ trawienny tego gatunku wytwarza probiotyki psioniczne, które umożliwiają telepatyczne porozumiewanie się osobników, na które działają te bakterie."
 trait_psionic_ephapse_modifier_tooltip: "Jeśli gatunek to §Y$trait_psionic$§! lub §Y$trait_latent_psionic$§!:\n$bureaucrat_jobs_bonus_workforce_mult$: §G+5%§!\n$researcher_jobs_bonus_workforce_mult$: §G+5%§!"
