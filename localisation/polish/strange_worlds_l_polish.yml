l_polish:
 ##THE WORLD IS BLEEDING
 strange_worlds.1.name: "Świat krwawi"
 strange_worlds.1.desc: "Powierzchnia świata §Y[Root.GetName]§! w niespotykany sposób reaguje na prowadzone przez nas prace budowlane. Z fundamentów najważniejszych budowli zaczęła sączyć się nieznana, lepka substancja.\n\nTa ciesz jest szkarłatna, wygląda galaretowato, a przy tym jest bardzo lepka.\n\nNasi [Owner.GetScientistPlural] bardzo chcieliby dokładniej zbadać tę wydzielinę. Teraz to tylko niedogodność, ale lepiej będzie, jeśli sprawimy, że nasi [Owner.GetColonistPlural] będą bezpieczni."
 strange_worlds.5.name: "Silny krwotok"
 strange_worlds.5.desc: "§Y[Root.GetName]§! donosi o niepokojących zdarzeniach związanych z dziwną, szkarłatną cieczą.\n\nSubstancja ta wymyka się spod kontroli, coraz większe jej ilości sączą się w obszarach dotkniętych tym zjawiskiem.\n\nPłyn ma też korzystne działanie. Kiedy krzepnie, staje się jeszcze bardziej lepki i działa jak naturalny cement, który może nam ułatwić prace budowlane.\n\nNiepokojącym jest jednak fakt, że [Owner.GetColonistPlural], którzy się zetknęli z tą substancją, nie mogą się jej pozbyć - nie da się jej usunąć z ich organizmów osób. Próba zbadania i leczenia tych osób może dać nam więcej informacji, ale spowolni postępy budowy."
 strange_worlds.5.a: "Zbadajmy i leczmy zakażonych."
 strange_worlds.5.b: "Budujmy dalej."
 strange_worlds.15.name: "Góra krwi"
 strange_worlds.15.desc: "§Y[Root.GetName]§!: Prace budowlane postępowały w niesamowitym tempie, jednak teraz lepka substancja pojawia nie tylko w fundamentach naszych budowli.\n\nW wielu miejscach pojawiły się krwawiące szczeliny. Początkowo substancja działała tylko na obiekty niepochodzące ze świata [Root.GetName], ale teraz rozprzestrzenia się na wszystko.\n\nPochłonęła już dużą część powierzchni świata [Root.GetName], szybko krzepnie i tworzy gruby mineralny koagulat.\n\nPo kosztownych próbach i wielu błędach nasi inżynierowie znaleźli sposób zapobieżenia dalszym szkodom oraz wydajnego zbierania tej substancji. Stało się to możliwe kosztem pozostawienia dużych terenów na pastwę tej wydzieliny."
 strange_worlds.15.a: "Ciekawa sytuacja."
 strange_worlds.20.name: "Pasożyt"
 strange_worlds.20.desc: "Po dokładnym przebadaniu pracowników ze świata §Y[Root.GetName]§! nasi naukowcy ustalili, co jest przyczyną problemu.\n\nTo, co początkowo wyglądało na lepką, galaretowatą substancję, jest tak naprawdę zbiorem pasożytniczych mikroorganizmów, które tworzą symbiotyczną więź z planetą. Te pasożyty rozkładają materię organiczną pod skorupą świata [Root.GetName] i przetwarzają ją na nowe materiały.\n\nRozwój planety [Root.GetName] zakłócił cykl życiowy tych stworzeń, przez co zareagowały na obce substancje, które wprowadziliśmy do ich ekosystemu.\n\nNasi naukowcy są pewni, że z czasem moglibyśmy znaleźć sposób na harmonijne współistnienie z tymi organizmami i zintegrowanie ich wyjątkowej biologii z kanałami produkcyjnymi planety [Root.GetName]."
 strange_worlds.20.a: "Fascynujące, kontynuujcie."
 strange_worlds.25.name: "Produktywny związek"
 strange_worlds.25.desc: "Dzięki dogłębnym badaniom nasi naukowcy stworzyli odmianę gatunku pasożytniczych mikroorganizmów ze świata §Y[Root.GetName]§!. Ta mutacja ma rozpoznawać nasze materiały jako nieszkodliwe dodatki do ich środowiska naturalnego, co pozwoli nam wznowić prace budowlane.\n\nPo wprowadzeniu tych pasożytów do biosfery tej planety doszło do ich szybkiej integracji.\n\nPonadto, po zmianie efektów rozkładu powodowanego przez te mikroorganizmy, zdołaliśmy zapanować nad lepkością owej substancji, dzięki czemu możemy przyspieszyć procesy produkcyjne na naszej planecie."
 strange_worlds.25.a.evopred: "A czego mogą nas nauczyć?"
 strange_worlds.30.name: "Zaskoczenie"
 strange_worlds.30.desc: "Kiedy przygotowywaliśmy się do dalszej ekspansji na świecie §Y[Root.GetName]§!, nagle pojawiła się jakaś duża budowla.\n\nWytwarza bardzo niestabilne fale energii, które powodują, że ciągle pojawia się i znika. To wyjaśnia dlaczego nie wykryliśmy jej podczas początkowego skanowania tego sektora.\n\nKiedy budowla jest widoczna, można dostrzec na jej zewnętrznej powierzchni nieznane symbole, które nie pasują do żadnego znanego nam języka. \n\nNie potrafimy ustalić, jaką rolę pełni ten budynek, ale na razie nie spowodował żadnych szkód, a jedynie utrudnia nam rozbudowę."
 strange_worlds.30.a: "Zbadajmy to."
 strange_worlds.35.name: "Anomalie wizualne"
 strange_worlds.35.desc.no_cloak: "§Y[Root.GetName]§!: Analiza migoczącego budynku wykazała, że w jakiś sposób zagina on lub zniekształca światło.$strange_worlds.35.desc.common_1$Lepiej rozumiemy właściwości tej budowli, ale wciąż nie potrafimy dostać się do środka. Nie wiemy nawet, czy jest to w ogóle możliwe.$strange_worlds.35.desc.common_2$"
 strange_worlds.35.desc.cloak: "§Y[Root.GetName]§!: Analiza migoczącego budynku wykazała, że w jakiś sposób wytwarza nieregularny efekt maskujący.$strange_worlds.35.desc.common_1$Lepiej rozumiemy efekty maskujące tę budowlę, ale wciąż nie potrafimy dostać się do środka. Nie wiemy nawet, czy jest to w ogóle możliwe.$strange_worlds.35.desc.common_2$"
 strange_worlds.35.desc.common_1: "\n\nW płaszczu krzemianowym planety wykryto wyjątkową aktywność geotermiczną. To potężne źródło energii zasila samotną budowlę, ale jego wydajność podlega potężnym fluktuacjom.\n\n"
 strange_worlds.35.desc.common_2: "\n\nJego zewnętrzne ściany są zbudowane z nieznanych materiałów szybko wchodzących w reakcje chemiczne. Pierwsze próby siłowego wejścia do środka doprowadziły jedynie do dalszej destabilizacji pól magnetycznych budynku. Możemy wyciąć jakieś wejście, żeby dowiedzieć się czegoś więcej, ale może to doprowadzić do nieprzewidywalnej destabilizacji."
 strange_worlds.35.a: "Użyjmy brutalnej siły."
 strange_worlds.35.b: "Kontynuujmy badania na zewnątrz."
 strange_worlds.40.name: "Niekontrolowane reakcja"
 strange_worlds.40.desc: "§Y[Root.GetName]§!: Próby siłowego wejścia do budowli zakończyły się katastrofą. Nasz sprzęt spowodował dalszą destabilizację wzorów energetycznych budynku, co doprowadziło do serii silnych wybuchów. Z konstrukcji został tylko szary szkielet.\n\nPrzypadkowe zniszczenie budowli przyniosło inny niespodziewany efekt. W pobliskiej dolinie ukazały się spalone ruiny dawno opuszczonej osady obcej cywilizacji.\n\nWygląda na to, że obiekt w jakiś sposób nakładał na dawną kolonię silne pole maskujące. Trudno powiedzieć, co chciano w ten sposób ukryć, ale wiemy na pewno, że mimo podjętych wysiłków kosmici nie przetrwali. Nie zachowało się w całości nic, co miałoby jakąkolwiek wartość archeologiczną.\n\nNie wiemy dokładnie, jak działa ta niecodzienna technologia, ale pewne rzeczy ustaliliśmy na podstawie dotychczasowych doświadczeń. Wykorzystamy to wydajne źródło energii geotermalnej na potrzeby naszej kolonii."
 strange_worlds.40.a: "To istotne odkrycie."
 strange_worlds.40.a_ct: "Przeszkoda terenowa (§Ymigocząca budowla§!) usunięta"
 strange_worlds.45.name: "Pomieszczenie dowodzenia"
 strange_worlds.45.desc.intro: "§Y[Root.GetName]§!: Dalsze badania dziwnych symboli na zewnętrznych ścianach budowli obcych wykazały, że jest to jakiś interfejs. Manipulując znakami, otworzyliśmy ukryte drzwi do opustoszałego wnętrza budynku, gdzie znajduje się ogromne pomieszczenie dowodzenia.\n\nNie wiemy dokładnie, jak działa, ale metodą prób i błędów nauczyliśmy się podstaw sterowania tym miejscem. Zakłócenie jego funkcjonowania przyniosło inny niespodziewany efekt. W pobliskiej dolinie ukazały się ruiny dawno opuszczonej osady obcej cywilizacji.\n\nWygląda na to, że obiekt w jakiś sposób nakładał na dawną kolonię silne pole maskujące. Trudno powiedzieć, co chciano w ten sposób ukryć, ale wiemy na pewno, że mimo podjętych wysiłków kosmici nie przetrwali. Choć nie zachowało się w całości nic, co miałoby jakąkolwiek wartość archeologiczną, nasi naukowcy świetnie wykorzystali tę sterownię."
 strange_worlds.45.desc.a: "$strange_worlds.45.desc.intro$\n\nMożemy teraz ustabilizować oraz rozszerzyć zasięg działania dziwnego pola maskującego i objąć nim całą dolinę. To znacznie zwiększy bezpieczeństwo naszej kolonii."
 strange_worlds.45.desc.b: "$strange_worlds.45.desc.intro$\n\nMożemy teraz ustabilizować oraz rozszerzyć zasięg pola maskującego budynku i objąć nim całą dolinę. Ponadto znacznie powiększyliśmy naszą wiedzę na temat technologii maskujących."
 strange_worlds.45.a: "To istotne odkrycie."
 strange_worlds.55.name: "Naturalny szok"
 strange_worlds.55.desc.intro: "§Y[Root.GetName]§!: Liczne gatunki roślinożernej megafauny zaczęły zakłócać produkcję energii. Dokonując dramatycznych aktów masowego samobójstwa, rzucają się na nasze elektrownie, by spłonąć żywcem.\n\nTe zwierzęta są niezwykle zdeterminowane, dążąc do swego celu, niszczą płoty chroniące sieć energetyczną. Na skutek tego niecodziennego zachowania wytwarzamy mniej energii.\n\n"
 strange_worlds.55.desc.outro: "Te gatunki pełnią istotną rolę w ekosystemie planety. Jeśli natężenie tych zdarzeń nie zmieni się, wszystkie wyginą."
 strange_worlds.55.desc.a: "$strange_worlds.55.desc.intro$Przyniosło to też niespodziewaną korzyść w postaci zwiększonej produkcji żywności, ponieważ [Owner.GetColonistPlural] przekonali się, że mięso tych stworzeń to prawdziwy przysmak.\n\n$strange_worlds.55.desc.outro$"
 strange_worlds.55.desc.b: "$strange_worlds.55.desc.intro$W ten sposób rośnie ilość biomasy, którą możemy zbierać, choć nie jest to zbyt wygodne.\n\n$strange_worlds.55.desc.outro$"
 strange_worlds.55.a: "Zbadajmy to zachowanie."
 strange_worlds.60.name: "Fizjologia katalityczna"
 strange_worlds.60.desc: "§Y[Root.GetName]§!: Zgromadziliśmy cenną wiedzę o samobójczych gatunkach fauny.\n\nTa megafauna nie posiada zmysłu wzroku, zamiast tego wykorzystuje echolokację, aby orientować się w terenie i rozpoznawać inne osobniki. Przypuszczamy, że nasza sieć energetyczna wytwarza dźwięki o częstotliwości szkodliwej dla ich słuchu i właśnie dlatego te zwierzęta zachowują się agresywnie wobec naszych elektrowni.\n\nPonadto odkryliśmy, że ich wyjątkowe enzymy trawienne mogą działać jako katalizator w procesie rafinacji metali. Pierwsze próby wykazały potencjał do usprawnienia naszej produkcji stopów.\n\nMimo tych odkryć wciąż jesteśmy daleko od powrotu do normalnego wytwarzania energii. Nasi naukowcy prowadzą dalsze badania na tym polu."
 strange_worlds.60.a: "$FASCINATING$"
 strange_worlds.65.name: "Zwierzęcy magnetyzm"
 strange_worlds.65.desc.intro: "Znaleźliśmy przyczynę agresywnych samobójczych impulsów kierujących istotami ze świata [Root.GetName].\n\nDalsze obserwacje badawcze ich echolokacji i zachowań społecznych pozwoliły odkryć wstrząsającą prawdę. Ich okrzyki godowe mają praktycznie taką samą częstotliwość, jak dźwięki emitowane przez naszą sieć energetyczną.\n\n"
 strange_worlds.65.desc.common: "Możemy odtworzyć okrzyki tych zwierząt, by zmienić drogi ich migracji tak, by omijały naszą kolonię, co doprowadzi do ustabilizowania ich populacji. Pozwoli nam to zbierać enzymy katalityczne z ich odchodów i wykorzystywać je do zwiększenia produkcji stopów, a jednocześnie umożliwi badanie wyjątkowej fizjologii tych istot.\n\nZ kolei\n\n"
 strange_worlds.65.desc.outro: "Moglibyśmy z łatwością stworzyć wyspecjalizowane kombajny elektryczne służące do wydajnego przetwarzania tych zwierząt tak, żeby nie zakłócać produkcji energii."
 strange_worlds.65.desc.devouring_swarm: "$strange_worlds.65.desc.intro$Moglibyśmy wykorzystać tę wiedzę, żeby nakierowywać te stworzenia na wyspecjalizowane kombajny. Czas na ucztę."
 strange_worlds.65.desc.food: "$strange_worlds.65.desc.intro$$strange_worlds.65.desc.common$Te stworzenia stały się głównym składnikiem diety na świecie §Y[Root.GetName]§!.\n\n$strange_worlds.65.desc.outro$"
 strange_worlds.65.desc.no_food: "$strange_worlds.65.desc.intro$te stworzenia są pewnym i odnawialnym źródłem biomasy świata §Y[Root.GetName]§!\n\n$strange_worlds.65.desc.outro$"
 strange_worlds.65.a: "Zbierajmy ich odchody."
 strange_worlds.65.b_devouring_swarm: "Ucztujmy!"
 strange_worlds.65.b_default: "Zbierajmy ich mięso."
 strange_worlds.75.name: "Dziwne piaski"
 strange_worlds.75.desc: "Nasi [Owner.GetColonistPlural] donoszą o dziwnym zachowaniu piasku na świecie §Y[Root.GetName]§!.\n\nOgromne burze piaskowe materializują się bez ostrzeżenia w pobliżu naszej kolonii nawet w spokojne dni. Rzeki szybko przemieszczającego się piasku pojawiają się znikąd, po czym ustają równie szybko, jak się zaczęły. Słyszeliśmy też doniesienia o wydmach przemieszczających się, gdy nie ma wiatru.\n\nNie znaleźliśmy jak dotąd geologicznych ani atmosferycznych wyjaśnień tych zdarzeń.\n\nTen dziwny piasek nie wyrządza nam bezpośrednio żadnych szkód, ale zakłóca działalność naszej kolonii. Trwają badania tego wyjątkowego zjawiska."
 strange_worlds.75.a: "Ciekawe."
 strange_worlds.80.name: "Śpiewające piaski"
 strange_worlds.80.desc: "§Y[Root.GetName]§!: Burze piaskowe zaczęły emitować głęboki warkot. Jego częstotliwość i natężenie zmieniają się regularnie według powtarzających się schematów.\n\nZjawisko \"śpiewającego piasku\" można przypisać znanym właściwościom cząstek swobodnych, ale regularności tych modulacji nie da się wyjaśnić jako efektów zjawiska tarcia.\n\nZnaleźliśmy dolinę, na której wydmach wyryto dziwne symbole. Te glify pojawiają się błyskawicznie na wzniesieniach, po czym prawie natychmiast znikają.\n\nNie wiemy, co kieruje piaskiem, ale powtarzalność tych schematów wskazuje na zamiar lub cel stojące za tym zachowaniem."
 strange_worlds.80.a: "Zbadajmy te schematy."
 strange_worlds.85.name: "Piasek psioniczny"
 strange_worlds.85.desc_part1_no_zro: "§Y[Root.GetName]§!: Nasi [Owner.GetScientistPlural] badający burze piaskowe odkryli, że tamtejszy materiał krzemowy przenosi nowy rodzaj materii egzotycznej."
 strange_worlds.85.desc_part1_zro: "§Y[Root.GetName]§!: Nasi [Owner.GetScientistPlural] badający burze piaskowe odkryli, że tamtejszy materiał krzemowy przenosi zro."
 strange_worlds.85.desc_part2_non_machine_common_no_psionic_zroni: "\nPodczas badania próbek [Owner.GetResearchers] doświadczyli krótkotrwałych, ale silnych wizji. Widzieli postacie Zroni przemierzające pokryte glifami wydmy."
 strange_worlds.85.desc_part2_non_machine_common_no_psionic_no_zroni: "\nPodczas badania próbek [Owner.GetResearchers] doświadczyli krótkotrwałych, ale silnych wizji. Widzieli postacie nieznanych obcych przemierzające pokryte glifami wydmy."
 strange_worlds.85.desc_part2_non_machine_common_psionic_zroni: "\nPodczas badania próbek [Owner.GetResearchers] doświadczyli krótkotrwałych, ale silnych wizji psionicznych. Widzieli postacie Zroni przemierzające pokryte glifami wydmy."
 strange_worlds.85.desc_part2_non_machine_common_psionic_no_zroni: "\nPodczas badania próbek [Owner.GetResearchers] doświadczyli krótkotrwałych, ale silnych wizji psionicznych. Widzieli postacie nieznanych obcych przemierzające pokryte glifami wydmy."
 strange_worlds.85.desc_part2_machine_common: "\nPodczas badania próbek [Owner.GetResearchers] doświadczyli zakłóceń działania ich obwodów wewnętrznych.\n\n"
 strange_worlds.85.desc_part2_machine_zroni: "$strange_worlds.85.desc_part2_machine_common$Te potężne zakłócenia spowodowały awarię przetwarzania obrazu, na skutek której zarejestrowano postacie Zroni przemierzające pokryte glifami wydmy."
 strange_worlds.85.desc_part2_machine_no_zroni: "$strange_worlds.85.desc_part2_machine_common$Te potężne zakłócenia spowodowały awarię przetwarzania obrazu, na skutek której zarejestrowano postacie nieznanych obcych przemierzające pokryte glifami wydmy."
 strange_worlds.85.desc_part3_common: "\nTo prawdopodobnie te widma odpowiadają za powstawanie glifów. Rozszyfrowywanie tych symboli zabiera dużo czasu, ale uważamy, że są one jakąś formą języka pisanego.\n\n"
 strange_worlds.85.desc_part3_zro: "$strange_worlds.85.desc_part3_common$Możemy po prostu wydobywać zro z piasku, ale widma mogą przez to zniknąć. Jednak jest tam duża ilość tej cennej substancji."
 strange_worlds.85.desc_part3_no_zro: "$strange_worlds.85.desc_part3_common$Możemy po prostu wydobywać z piasku materiał egzotyczny, ale widma mogą przez to zniknąć. Jednak tak wyjątkowa substancja przecząca prawom fizyki może okazać się bardzo wartościowa."
 strange_worlds.85.a: "Kontynuujmy tłumaczenie."
 strange_worlds.85.b_no_zro: "Natychmiast zacznijmy wydobycie materiału egzotycznego."
 strange_worlds.85.b_zro: "Natychmiast zacznijmy wydobycie zro."
 strange_worlds.90.name: "Piaskowy spektakl"
 strange_worlds.90.desc_intro_zroni: "Wykorzystaliśmy wcześniejszą znajomość kultury Zroni, aby stworzyć nowy glif na piaskach świata §Y[Root.GetName]§!. To symbol powitania Zroni. Odpowiedź otrzymaliśmy natychmiast."
 strange_worlds.90.desc_intro_no_zroni: "Wykorzystując nasze językowe bazy danych, stworzyliśmy na piaskach świata §Y[Root.GetName]§! setki symboli oznaczających powitanie we wszystkich znanych nam językach pisanych. W końcu otrzymaliśmy odpowiedź."
 strange_worlds.90.desc_common: "\nBurze piaskowe zniknęły, podłoże doliny ustabilizowało się, a pieśń wydm zamilkła. Następnie całe wydmy piaskowe uniosły się w powietrze i przeobraziły w nowe formy. W skomplikowanym powietrznym spektaklu pojawiły się postacie utworzone z wirującego piasku.\n\n"
 strange_worlds.90.desc_storyline_started: "$strange_worlds.90.desc_common$Natychmiast zrozumieliśmy, że była to historia Zroni, wizja nowo odkrytej mocy i straszliwego konfliktu. Piaski napędzane przez Zro stały się kosmicznym echem pradawnej rasy Zroni.$strange_worlds.90.desc_outro$"
 strange_worlds.90.desc_storyline_finished: "$strange_worlds.90.desc_common$Natychmiast zrozumieliśmy, że była to historia Zroni, ich wejścia w Woal i wywołanego przez to zniszczenia. Piaski napędzane przez zro stały się kosmicznym echem tragicznego losu Zroni.$strange_worlds.90.desc_outro$"
 strange_worlds.90.desc_storyline_not_started: "$strange_worlds.90.desc_common$Zrozumieliśmy tylko, że była to historia obcej rasy, która odkryła nową moc, co doprowadziło do podziałów wewnętrznych, a ostatecznie - do jej zniszczenia.$strange_worlds.90.desc_outro$"
 strange_worlds.90.desc_outro: "\n\nPotem piaski psioniczne znowu się uspokoiły. Burze nie wróciły, uważamy, że w pewnym sensie przyzwyczaiły się do naszej obecności na świecie §Y[Root.GetName]§!."
 strange_worlds.90.a: "$FASCINATING$"
 strange_worlds.95.name: "Zbiory"
 strange_worlds.95.desc_zroni_tech: "Dzięki doświadczeniu w destylacji zro, pozyskaliśmy jego znaczne ilości z piasków świata §Y[Root.GetName]§!, a przy okazji wiele się nauczyliśmy.$strange_worlds.95.desc_outro$"
 strange_worlds.95.desc_no_zroni_tech: "§Y[Root.GetName]§!: Próby zbierania zro przyniosły mieszane rezultaty. Zdołaliśmy pozyskać jego niewielką ilość, ale większość przepadła podczas naszych eksperymentów. Jednak wiele się przy tym nauczyliśmy.$strange_worlds.95.desc_outro$"
 strange_worlds.95.desc_outro: "\n\nPo usunięciu skażenia zro, stan tutejszego piasku prawdopodobnie wrócił do normy. Na naszą kolonię nie spadają już nieprzewidywalne burze piaskowe. Cokolwiek manipulowało wcześniej tymi piaskami, zniknęło."
 strange_worlds.105.name: "Nagłe zniknięcie"
 strange_worlds.105.desc_intro: "§Y[Root.GetName]§!: [Owner.GetExplorer] milczą od czasu powiadomienia nas o potencjalnym odkryciu §Ygazu egzotycznego§! we wcześniej nieznanej dolinie.\n\n"
 strange_worlds.105.desc_gestalt_non_machine: "Poczuliśmy krótki, a przy tym dojmujący ból, zanim węzły zamilkły."
 strange_worlds.105.desc_gestalt_machine: "Zanim doszło do wyłączenia węzłów, ich dane zostały uszkodzone. Nie są już połączone z naszą siecią."
 strange_worlds.105.desc_non_gestalt: "Co niepokojące, ich ostatnie połączenie zostało nagle przerwane dźwiękiem, który brzmiał jak krzyki cierpienia. Obawiamy się najgorszego."
 strange_worlds.105.a: "Niedobrze."
 strange_worlds.110.name: "Żrące stawy"
 strange_worlds.110.desc: "§Y[Root.GetName]§!: Badając ostatnie znane miejsce, w którym przebywali zaginieni [Owner.GetExplorer], natrafiliśmy na teren pokryty wyjątkowo żrącymi bagnami, z których wydobywa się czysty §Ygaz egzotyczny§!. W tych bagnach żyją gatunki bardzo wytrzymałej rdzennej flory zdolnej do przetrwania w silnie zakwaszonym środowisku.\n\nTo bardzo niebezpieczny teren, ale dalsze badania gazowej mgły mogą przynieść korzyści dla zasobów kolonii."
 strange_worlds.110.a: "Zbadajmy te mgły."
 strange_worlds.115.name: "Bagno trawienne"
 strange_worlds.115.desc: "§Y[Root.GetName]§!: Podczas badania żrących bagien, które prowadzą nasi [Owner.GetScientistPlural], jeden z nich został schwytany, wraz ze swoim sprzętem, przez wici miejscowej flory, a następnie wciągnięty do sadzawki wypełnionej substancją żrącą. Rozpuścił się błyskawicznie. Podejrzewamy, że zaginiony [Owner.GetExplorer] skończył tak samo.\n\nNiewiele później wici rośliny wyraźnie się powiększyły i pojawiło się dużo więcej §Ygazu egzotycznego§!. Wygląda na to, że drapieżna roślinność wykorzystuje żrące bagna jako zewnętrzny układ trawienny. Agresywne wici wciągają tam ofiary, żeby je rozpuścić, a następnie wchłonąć uwolnione składniki odżywcze. Ten proces uwalnia też niewielką ilość gazu egzotycznego, który można zebrać.\n\nPodejrzewamy, że możemy wykorzystać biologię tego organizmu poprzez karmienie go odpadkami z kolonii i w ten sposób stymulować wytwarzanie większej ilości gazu. Możemy też zneutralizować te kwasowe bagna, żeby stworzyć żyzne ziemie dla naszego rolnictwa."
 strange_worlds.115.a: "Hodujmy te organizmy."
 strange_worlds.115.b: "Zmieńmy przeznaczenie tej ziemi."
 strange_worlds.120.name: "Rośliny bagienne zneutralizowane"
 strange_worlds.120.desc: "§Y[Root.GetName]§!: Udało się nam zneutralizować kwasowe bagna, a jednocześnie zabić żyjące w nich gatunki flory. W skutek tego zniknęła mgła §Ygazu egzotycznego§!.\n\nPozyskane tereny mają niezwykle żyzną glebę, co zawdzięczają składnikom odżywczym pochodzącym z procesu odżywiania rdzennej flory. Stworzyliśmy dodatkową cenną przestrzeń rolną."
 strange_worlds.120.a_ct: "Dodaje §G2§! §Y$district_farming_plural$§! do: [This.GetName]"
 strange_worlds.120.b.evopred: "Doskonale, zbierzcie też te szczątki."
 strange_worlds.130.name: "Erupcja ciemnej materii"
 strange_worlds.130.desc: "§Y[Root.GetName]§!: To, co wcześniej uznano za dawno uśpiony gejzer, wybuchło gwałtownie, wyrzucając do atmosfery gaz wymieszany z §Yciemną materią§!.\n\nErupcja wypełniła niebo, co wywołało poważne anomalie grawitacyjne, które uniemożliwiają podróże poza świat i łączność z kosmosem.\n\nUważamy, że ciemna materia może pochodzić z wyjątkowego rdzenia tej planety. Rozmieściliśmy syfony orbitalne, które pobiorą wyziewy ze stratosfery, ponieważ w takich warunkach nasi [Owner.GetColonistPlural] są narażeni na niebezpieczeństwo."
 strange_worlds.130.a: "Bacznie obserwujmy tę sytuację."
 strange_worlds.135.name: "Płynna ciemność"
 strange_worlds.135.desc_common_1: "Udało się nam pobrać wyziewy §Yciemnej materii§! z atmosfery świata §Y[Root.GetName]§!, a teraz zaczynamy ocenę szkód."
 strange_worlds.135.desc_common_2: "\nPo ponownym nawiązaniu kontaktu z kolonią odkryliśmy, że [Owner.GetColonistPlural] ulegli skamienieniu w wyniku działania czegoś, co wygląda na zakrzepłą ciemną materię."
 strange_worlds.135.desc_organic_non_gestalt: "$strange_worlds.135.desc_common_2$ Wykryliśmy w tych skorupach ślady życia, więc wydobyliśmy je ostrożnie."
 strange_worlds.135.desc_machine: "$strange_worlds.135.desc_common_2$ Wykryliśmy w tych skorupach elektroniczne sygnały, więc je uwolniliśmy."
 strange_worlds.135.desc_gestalt: "$strange_worlds.135.desc_common_2$ Wyczuwając ich próby reintegracji ze zbiorowością, uwolniliśmy je z fizycznego grobowca."
 strange_worlds.135.desc_outro: "\nWbrew wszystkim oczekiwaniom [Owner.GetColonistPlural] nie doznali żadnych skutków ubocznych długiej ekspozycji i zastoju.\n\nGejzer, który spowodował pierwsze zdarzenie, zapadł się do jeziora płynnej ciemnej materii.\n\nTo bezprecedensowy przypadek, który wymaga dogłębnego zbadania. Nasi [Owner.GetScientistPlural] nie są pewni, na czym powinni skoncentrować swoje i tak już przeciążone zasoby."
 strange_worlds.135.a: "Umieśćmy populację w kwarantannie i zbadajmy ją."
 strange_worlds.135.b: "Połóżmy nacisk na badania ciemnej materii."
 strange_worlds.140.name: "Skażenie ciemną materią"
 strange_worlds.140_intro: "§Y[Root.GetName]§!: Nasi [Owner.GetScientistPlural] są przekonani, że jezioro §Yciemnej materii§! nie stanowi większego zagrożenie dla planety. Nie można powiedzieć tego samego o objawach, które zaczęły występować w populacji.\n\n[Owner.GetColonistPlural] przebywający w kwarantannie przeszli badania, które wykazały, że przechodzą oni zmiany fizyczne będące skutkiem uwięzienia w tej substancji."
 strange_worlds.140_common: "\nPrzedłużona ekspozycja nasyciła cząsteczki ich ciał ciemną materią, "
 strange_worlds.140_machine_1: "$strange_worlds.140_common$co doprowadziło do całkowitego uszkodzenia ich systemów."
 strange_worlds.140_non_machine_1: "$strange_worlds.140_common$co doprowadziło do skażenia ich układów krążenia."
 strange_worlds.140_machine_2: "\nTe skażenia mogą wywołać przedwczesną awarię systemu, ale dzięki nim jednostki powstałe na tym świecie będą mogły skutecznie zbierać i przetwarzać ciemną materię w ramach działania podprogramu, jeśli zostanie on zintegrowany z nimi w procesie montażu."
 strange_worlds.140_non_machine_2: "\nMożemy hodować te anomalie, dzięki czemu nasi [Owner.GetColonistPlural] mogą przetwarzać i wydzielać ciemną materię nadającą się do gromadzenia, odbywa się to jednak kosztem długości ich życia."
 strange_worlds.140.a.dc_empire: "Przyjmijmy ten dar."
 strange_worlds.140.a.machine_empire: "Hodujmy te anomalie."
 strange_worlds.140.a.normal: "Przetwarzajmy te zanieczyszczenia."
 strange_worlds.140.b: "Usuńmy te zanieczyszczenia."
 strange_worlds.145.name: "Mikro czarna dziura"
 strange_worlds.145.desc: "§Y[Root.GetName]§!: Dalsze badania jeziora ciemnej materii przyniosły bardzo ważne informacje geologiczne, które mogą wyjaśniać przyczyny pierwszego zdarzenia.\n\nW rdzeniu planetarnym znajduje się mikro czarna dziura, mająca mniej niż metr średnicy. Większa masa samej planety równoważy siły grawitacyjne, które w innych warunkach wykrylibyśmy w takiej anomalii. Wygląda na to, że związek pomiędzy tymi masami osiągnął delikatną równowagę, która zostanie zachowana przez jakiś czas.\n\nNiedawna aktywność sejsmiczna spowodowała przesunięcie płaszcza planetarnego, co wywołało pierwszą erupcję gejzera. Jezioro ciemnej materii zadziałało jak korek stabilizujący rdzeń planety i zapobiegło kolejnym wybuchom.\n\nJednakże długofalowe nasycenie ciemną materią nie było tak niegroźne, jak się początkowo wydawało.\n\n[Owner.GetColonistPlural] w samym środku swojej masy wygenerowali niestabilne mikro czarne dziury, które spowodowały gwałtowną implozję ciał. Po tych osobnikach postały tylko pozbawione życia skorupy ze skrystalizowanej ciemnej materii. Skanowanie nie wykryło wewnątrz żadnej aktywności.\n\nOstateczne liczenie wykazało, że w jednej chwili straciliśmy jedną czwartą populacji świata §Y[Root.GetName]§!. W miejsce tych istot pojawiły się posągi ze stwardniałej ciemnej materii, zastygłe w różnych pozach."
 strange_worlds.145.a.no_gestalt: "To niedobrze."
 strange_worlds.145.a.gestalt: "Przerażające."
 strange_worlds.155.name: "Bunt szkodników"
 strange_worlds.155.desc_homicidal: "§Y[Root.GetName]§!: Natrafiliśmy na szczególnie odrażający gatunek lokalnej fauny.\n\nWytworzył on mechanizm obronny, który jednocześnie służy jako główny sposób pozyskiwania żywności. Te organizmy nie wytwarzają enzymów trawiennych rozkładających pokarmy stałe, ale wydzielają intensywnie śmierdzący gaz, który wywołuje wymioty u innych organizmów posiadających układ trawienny. Te wydalone substancje stają się pożywieniem dla tej niecodziennej fauny.\n\nRegulacja populacji tych istot dostarczy nam §Ygazu egzotycznego§! i §Yżywności§!."
 strange_worlds.155.desc_normal: "§Y[Root.GetName]§!: Nasi [Owner.GetColonistPlural] natrafili na gatunek fauny, który w bardzo niecodzienny sposób zdobywa pożywienie.\n\nPoczątkowo istoty te były onieśmielone, ale z czasem przywykły do naszej obecności, a ich przyjazne usposobienie sprawiło, że przepadają za nimi mniej dojrzali [Root.Owner.GetSpeciesNamePlural].\n\nNie stanowią one bezpośredniego zagrożenia, ale wytworzyły mechanizm obronny, który jednocześnie służy jako główny sposób pozyskiwania żywności. Te organizmy nie wytwarzają enzymów trawiennych rozkładających pokarmy stałe, ale wydzielają intensywnie śmierdzący gaz, który wywołuje wymioty u innych organizmów posiadających układ trawienny. Te wydalone substancje stają się pożywieniem dla tej niecodziennej fauny.\n\nW tej sytuacji może dojść do rozprzestrzeniania się chorób zakaźnych, więc [Owner.GetColonistPlural] są zachęcani przez miejscowych liderów, aby trzymali się z dala od tych dziwnych stworzeń."
 strange_worlds.155.a: "Co za wyjątkowa ksenobiologia."
 strange_worlds.155.b_purifiers: "Ohydne."
 strange_worlds.155.b_swarm: "To dość specyficzny smak!"
 strange_worlds.155.b_normal: "Strzelać do każdego napotkanego osobnika."
 strange_worlds.160.name: "Odrażający rozwój wydarzeń"
 strange_worlds.160.desc: "§Y[Root.GetName]§!: Usunięcie odrażających szkodników okazało się trudnym zadaniem. Młodsi mieszkańcy kolonii nadal bawią się z tymi zwierzętami, mimo oficjalnych ostrzeżeń.\n\nNasze [Root.Owner.GetSpeciesOrganName] wytwarzają białka, które stały się ulubionym źródłem pożywienia tych stworzeń. Nasza kolonia jest teraz o wiele łatwiejszym celem niż reszta fauny planetarnej, która potrafi unikać szkodliwych gazów wydzielanych przez te istoty. Zaadaptowały się one do naszej obecności, samotni [Owner.GetColonistPlural] spacerujący po posiłkach wpadają w urządzane przez nich zasadzki.\n\nChoć trudno w to uwierzyć, ta sytuacja ma pewne zalety. Nasi naukowcy odkryli, że opary wydzielane przez te stworzenia zawierają cząsteczki cennego §Ygazu egzotycznego§!, które moglibyśmy gromadzić, udomawiając te zwierzęta i trzymając je odizolowane w naszych placówkach.\n\nJednak większość kolonii opowiada się za ich wytępieniem."
 strange_worlds.160.a: "Czas je zagonić."
 strange_worlds.160.b: "Dość tego. Strzelać do każdego napotkanego osobnika."
 strange_worlds.165.name: "Powiew świeżego powietrza"
 strange_worlds.165.desc: "§Y[Root.GetName]§!: Tamtejsze stworzenia nie wywołują już masowych wymiotów.\n\nDzięki opracowaniu syntetycznej pasty odżywczej dostosowanej do ich ksenobiologii udało się nam wyregulować ich cykle żywieniowe, w skutek czego nasi [Owner.GetColonistPlural] przestali padać ofiarą ich zasadzek.\n\nPrzenieśliśmy zwierzaki do pieczołowicie zaprojektowanego rezerwatu przyrody, gdzie nasi obywatele mogą je podziwiać w bezpiecznym środowisku. Wyszkoleni opiekunowie zajmują się zbieraniem §Ygazu egzotycznego §!tak, aby nie wyrządzić tym istotom żadnej krzywdy."
 strange_worlds.165.a: "Co za ulga."
 strange_worlds.165.a.evopred: "Pamiętajmy, żeby nie wykorzystywać tego smrodu w procesie ewolucji."
 strange_worlds.170.name: "Strzelać, żeby zabić"
 strange_worlds.170.desc: "§Y[Root.GetName]§!: Minęło kilka miesięcy od czasu wprowadzenia zasady strzelania do każdego napotkanego osobnika i w tym czasie żadnego z tych stworzeń nie widziano w pobliżu naszej kolonii.\n\nNiektórzy [Owner.GetColonistPlural] tęsknią za tymi kosmatymi stworzeniami, ale większość mieszkańców cieszy się, że może bezpiecznie podróżować i nie obawiać się wywołania u nich wymiotów.\n\nNasi naukowcy zebrali ciała zwierząt i pozyskali bezpośrednio z ich organów wewnętrznych pewną ilość §Ygazu egzotycznego§!."
 strange_worlds.170.a: "Same to na siebie ściągnęły."
 strange_worlds.185.name: "Wrogość między dzielnicami"
 strange_worlds.185.desc: "§Y[Root.GetName]§!: Pojawiły się doniesienia o alarmującym wzroście wrogości pomiędzy populacjami zamieszkującymi wiejskie i miejskie dzielnice. Trudno wskazać, co wywołało tę wrogość, poza niezależnym od nikogo położeniem geograficznym.\n\nNowi imigranci są początkowo traktowani wrogo, ale w ciągu kilku tygodni od pojawienia się w wyznaczonej dzielnicy spotykają się z akceptacją. W oparciu o ten schemat nasi naukowcy doszli do wniosku, że to dziwne zachowanie wywołują czynniki działające w poszczególnych dzielnicach.\n\nBadamy tę sprawę, a jednocześnie musimy ustabilizować sytuację, aby zapobiec dalszej eskalacji. Możemy oficjalnie poprzeć dzielnice wiejskie albo miejskie, ewentualnie wysłać tam więcej sił porządkowych."
 strange_worlds.185.a: "Wesprzyjmy dzielnice miejskie."
 strange_worlds.185.b: "Wesprzyjmy dzielnice wiejskie."
 strange_worlds.185.c: "Wyślijmy więcej sił porządkowych."
 strange_worlds.190.name: "Coś w wodzie"
 strange_worlds.190.desc_intro: "§Y[Root.GetName]§!: Po dokładnych badaniach środowiska nasi naukowcy znaleźli przyczynę wrogości pomiędzy dzielnicami.\n\nGłęboko w płaszczu planetarnym spoczywa rozkładające się ciało olbrzymiego organizmu. Po tysiącach lat rozkładu, płyn rdzeniowo-mózgowy tego martwego stworzenia przedostał się do wód gruntowych i skaził je bakteriami psionicznymi. Następnie nasi [Owner.GetColonistPlural] zostali zakażeni tymi mikrobami zmieniającymi świadomość, dostały się one do ich układów nerwowych i wywołały silne instynkty terytorialne, które prawdopodobnie posiadał ten martwy olbrzym.\n\n"
 strange_worlds.190.desc_non_psionic: "Ten problem można prawdopodobnie rozwiązać przepuszczając zapasy wody przez skomplikowany system nowoczesnych filtrów.\n\n"
 strange_worlds.190.desc_psionic: "To egzotyczne zanieczyszczenie zakłóca działanie naszych wrodzonych zdolności psionicznych.$strange_worlds.190.desc_non_psionic$"
 strange_worlds.190.desc_outro_non_psionic: "Ponadto, nasi naukowcy są pewni, że te bakterie można zmodyfikować genetycznie na poziomie komórkowym i zmienić instynkty terytorialne na bardziej produktywne tendencje."
 strange_worlds.190.a: "Przefiltrujmy wody gruntowe."
 strange_worlds.190.b: "Spróbujmy genetycznie zmodyfikować te bakterie."
 strange_worlds.195.name: "Nowe zdolności"
 strange_worlds.195.desc_intro: "§Y[Root.GetName]§!: Budowa stacji filtrujących wodę okazała się wielkim sukcesem.\n\n"
 strange_worlds.195.desc_psionic: "§Y[Root.GetName]§!: Ogromna agresja terytorialna zniknęła, a oprócz tego, że nasze zdolności psioniczne przestały być zakłócane, zostały też dodatkowo wzmocnione przez naturalne probiotyki, które wspomagają §Yefapsy psioniczne§! istniejące pomiędzy poszczególnymi osobnikami. To wzmacnia łączącą nas więź telepatyczną oraz pogłębia poczucie jedności i zwiększa produktywność."
 strange_worlds.195.desc_non_psionic: "§Y[Root.GetName]§!: Ogromna agresja terytorialna zniknęła, jednak populacja wciąż odczuwa słabe, ale potencjalnie użyteczne, efekty uboczne. Mają one postać naturalnych probiotyków, które wspomagają §Yefapsy psioniczne§! istniejące pomiędzy poszczególnymi osobnikami. Dzięki temu nasi [Owner.GetColonistPlural] mogą porozumiewać się ze sobą telepatycznie, co pogłębia poczucie jedności i zwiększa produktywność."
 strange_worlds.195.a: "Bardzo dobrze."
 strange_worlds.195.a_ct: "§Y[Root.GetName]§!: Wszystkie populacje otrzymują §Yefapsy psioniczne§!"
 strange_worlds.195.a.evopred: "Smakuje... §MDziwnie§!."
 strange_worlds.195.a_ct.evopred: "Nasz główny gatunek otrzymuje §Yefapsę psioniczną§!"
 strange_worlds.200.name: "Resekwencjonowanie bakterii"
 strange_worlds.200.desc: "§Y[Root.GetName]§!: Zneutralizowaliśmy negatywne efekty działania bakterii. Walki wewnętrzne między kolonistami ustały i już obserwujemy wzrost produktywności.\n\nNasi [Owner.GetColonistPlural] są przekonani, że mogą pójść jeszcze dalej w modyfikowaniu kodu genetycznego tego mikroba. Jeżeli dokonamy poprawnego sekwencjonowania jego genomu, będziemy mogli sprawić, że nasi [Owner.GetColonistPlural] staną się jeszcze wydajniejsi.\n\nJednak powstały mikroorganizm nie przetrwa długo, jeśli zostanie wywieziony z tego świata. Połączenia psioniczne między jego mitochondriami a zwłokami obcej istoty muszą działać, żeby bakteria mogła się rozmnażać. Jeszcze nie do końca rozumiemy, dlaczego tak jest."
 strange_worlds.200.a: "Zwiększmy zdolności rozrodcze."
 strange_worlds.200.b: "Zwiększmy siłę."
 strange_worlds.200.c: "Zwiększmy percepcję."
 strange_worlds.1000.name: "Tunele ze zmineralizowaną lawą"
 strange_worlds.1000.desc: "§Y[From.GetName]§!: Coraz bardziej suchy klimat przyczynił się do odsłonięcia dna oceanu, gdzie natrafiono na rozległą sieć tuneli, przez które przepływa lawa.\n\nStrumienie magmy, które stworzyły te głębokie tunele są w tej chwili uśpione i zostawiły po sobie bogate złoża minerałów powstałych dawno temu w wyniku działania wysokiej temperatury i ciśnienia panujących we wnętrzu świata płynnego rdzenia świata §Y[From.GetName]§!.\n\nTe złoża są ekstremalnie gęste, ich wydobycie będzie kosztowne, ale bardzo lukratywne."
 strange_worlds.1005.name: "Hydroaktywne jaja"
 strange_worlds.1005.desc: "§Y[From.GetName]§!: Terraformowanie wywołało niespodziewany wzrost populacji endemicznej fauny.\n\nOdkryliśmy, że cykle rozrodcze wielu miejscowych gatunków są ściśle powiązane z dostępnością wody w środowisku. Ich jaja, które wcześniej przez wiele miesięcy pozostawały zagrzebane w ziemi, wchłaniając wodę niezbędną do wyklucia się młodych, teraz leżą w ogromnych ilościach na powierzchni. Liczebność fauny planetarnej rośnie logarytmicznie.\n\nWiele z tych stworzeń ma dużą wartość odżywczą, będą obfitym źródłem żywności dla świata §Y[From.GetName]§!, a także pozwoli nam badać ten niezwykle aktywny ekosystem. Odwiedzający tę planetę, będą musieli przechodzić dokładne badania, zanim z niej odlecą, co zapobiegnie skażeniu innych światów."
 strange_worlds.1005.evopred: "Czy możemy powtórzyć takie tempo?"
 strange_worlds.1010.name: "Uwięzienie w lodzie"
 strange_worlds.1010.intro: "§Y[From.GetName]§!: Nasze działania terraformacyjne spowodowały odsłonięcie zaskakująco licznej endemicznej fauny znajdującej się w lodzie na powierzchni. Co bardziej zdumiewające, te istoty nadal żyją. \n\nTe gatunki musiały znajdować się w stanie głębokiej hibernacji, to skuteczna metoda na przetrwanie długich epok lodowych świata §Y[From.GetName]§!. Topnienie wywołane przez terraformowanie przedwcześnie przerwało ich sen.\n\nIstoty zbudzone z lodowego snu już zaczynają okazywać przebłyski inteligencji, posługują się prostymi narzędziami ułatwiającymi zbieranie żywności.\n\n"
 strange_worlds.1010.desc_exterminate: "$strange_worlds.1010.intro$Trzeba niezwłocznie eksterminować te stworzenia. Powstałą z nich biomasę wykorzystamy do naszych celów."
 strange_worlds.1010.desc_hunted: "$strange_worlds.1010.intro$Ich wyjątkowa fizjologia zapewni nam obfite źródło żywności."
 strange_worlds.1010.desc_tolerated: "$strange_worlds.1010.intro$Możemy zbadać wyjątkową zdolność hibernacji tego gatunku albo zebrać te istoty jako źródło biomasy."
 strange_worlds.1010.desc_protected: "$strange_worlds.1010.intro$Powinniśmy chronić te organizmy. Ich wyjątkowa zdolność hibernacji wymaga dokładniejszego zbadania."
 strange_worlds.1010.a.purge: "Zlikwidować."
 strange_worlds.1010.b.hunted: "Zapolujmy na nie."
 strange_worlds.1010.c.study: "Zbadajmy je."
 strange_worlds.1010.d.purge: "Zlikwidować."
 strange_worlds.1010.e.protect: "Chrońmy je."
 strange_worlds.1015.name: "Góry stali"
 strange_worlds.1015.desc: "§Y[From.GetName]§!: Nasi specjaliści od terraformowania poinformowali o zbliżającym się problemie.\n\nPod zamarzniętymi pasmami górskimi planety znajdują się ogromne, mocno skoncentrowane złoża żelaza i węgla, które zostały podgrzane w procesie terraformowania.\n\nTeraz możemy bezpiecznie wydobyć te prawie rozpuszczone zasoby. Natomiast jeśli pozwolimy na dalsze podgrzewanie, uzyskamy niewyczerpane źródło stopów. Oczywiście odbyłoby się to kosztem przestrzeni nadającej się do zamieszkania."
 strange_worlds.1015.a: "Najważniejsze są zasoby."
 strange_worlds.1015.b: "Nie róbmy nic."
 strange_worlds.1020.name: "Łatwopalna atmosfera"
 strange_worlds.1020.desc: "§Y[From.GetName]§!: Terraformowanie doprowadziło do nieprzewidzianych skutków. Nie wiedzieliśmy, że górna warstwa gleby była mieszaniną drobnych cząstek zawierających wysokie stężenie §Ylotnych pyłków§!, które zostały uwolnione do atmosfery w wyniku prowadzonego przez nas terraformowania.\n\nNiestety te cząstki wysokoenergetyczne zwiększają ryzyko przypadkowych zapłonów na powierzchni. Każda następna kolonia będzie musiała postawić na zapobieganie wypadkom i konfliktom, żeby uniknąć niszczycielskich skutków.\n\nAle rozważne zarządzanie zagrożeniami sprawi, że atmosfera świata §Y[From.GetName]§! stanie się bogatym źródłem tych rzadkich materiałów."
 strange_worlds.1025.name: "Niebieska lawa"
 strange_worlds.1025.desc: "§Y[From.GetName]§!: Skorupa planety zmieniła się w wyniku procesu terraformowania, co doprowadziło do pojawienia się niezwykłego zjawiska naturalnego.\n\nPrzemieszczanie się płyt tektonicznych spowodowało przesunięcie wielu złóż §Ygazów egzotycznych§!, które weszły w reakcję ze złożami minerałów bogatych w §Ystopy§! występującymi w wulkanach i barwiącymi ich erupcje na intensywnie niebieski kolor.\n\nNiestabilna natura tego zjawiska sprawiła, że planeta stała się mniej zdatna do zamieszkania, co wpłynęło na nasze plany stworzenia przestrzeni życiowej, z której skorzystają [Root.GetColonistPlural].\n\nPonadto, ziemia wokół tych wulkanów jest teraz bogata w zasoby, które możemy wykorzystać."
 strange_worlds.1030.name: "Niekończące się błyskawice"
 strange_worlds.1030.desc: "§Y[From.GetName]§!: Otrzymaliśmy doniesienia o pojawieniu się nowego zjawiska pogodowego.\n\nPodczas terraformowania odsłoniliśmy złoża kryształów w warstwie skalnej planety. Wchodzą one w reakcję z chemikaliami używanymi w tym procesie i stają się promieniotwórcze. Wywołane wahania temperatury powietrza stworzyły niekończącą się burzę z piorunami obejmującą całą planetę.\n\nTe wyjątkowe warunki pogodowe z pewnością wpłyną na rozwój infrastruktury, a napromieniowane kryształy niewątpliwie przyniosą konsekwencje dla długofalowej możliwości zamieszkania. Jednak nasi [Owner.GetScientistPlural] są pewni, że zdołają ujarzmić energię burz, gdy tylko zakończymy terraformowanie.\n\nZ kolei nasi [Owner.GetEngineerPlural] sporządzili plany bezpiecznej neutralizacji ładunku w złożach kryształów. Dzięki temu zakończyłyby się burze, a my moglibyśmy zebrać ich energię i wykorzystać ją w inny sposób."
 strange_worlds.1030.a: "Wykorzystajmy energię tych burz."
 strange_worlds.1030.b: "Zneutralizujmy te kryształy."
 strange_worlds.1035.name: "Hibernatory"
 strange_worlds.1035.desc: "Badania populacji istot przedrozumnych ze świata §Y[event_target:hibernator_planet.GetName]§! przyniosły nam wiedzę na temat ich niezwykłych zdolności hibernacyjnych. Są one regulowane przez pewien enzym, który zapoczątkowuje wejście i wyjście ciała w stan głębokiego uśpienia. W tym stanie reakcje chemiczne w ciałach tych stworzeń zwalniają tak bardzo, że są ledwie zauważalne.\n\nPozyskaliśmy ten enzym i z powodzeniem podaliśmy go różnym organizmom jako składnik środka uspokajającego. We wszystkich przypadkach gatunki, które wcześniej nie potrafiły hibernować, zyskały zdolność wejścia w głęboki sen, w czasie którego proces starzenia się ich komórek znacznie zwalniał.\n\nTen wyjątkowy przełom otworzył drogę do opracowania metod sztucznego wywoływania kriosnu, który znacznie zmniejsza fizyczne obciążenia, które oddziałują na gatunki organiczne podczas dalekich podróży kosmicznych."
 strange_worlds.1040.name: "Podniebne pogrzeby"
 strange_worlds.1040.desc: "§Y[From.GetName]§!: Kiedy zakończyliśmy terraformowanie, z nieba zaczęły spadać ciała.\n\nUderzając o ziemię z takiej wysokości te starożytne trupy zamieniają się w papkę. W tych szczątkach znaleźliśmy wiele mały przedmiotów, ozdobnych instrumentów oraz dziwnych reliktów, wszystkie spadły z tych samych gęstych chmur, które znajdowały się w górnych warstwach atmosfery.\n\nTe gęste obłoki, które naszym zdaniem służyły jako miejsce ostatniego spoczynku przedstawicieli nieznanej rasy kosmitów, teraz rzedną na skutek prowadzonego przez nas terraformowania i uwalniają swoją zawartość. Spodziewamy się, że zjawisko to będzie trwało w trakcie zmian zachodzących w atmosferze, ale w końcu te grobowce w chmurach w końcu całkowicie opustoszeją."
 strange_worlds.1040.a: "To makabra, ale potencjalnie lukratywna."
 strange_worlds.1040.b: "To niehigieniczne. Niezwłocznie usuńmy te szczątki."
 strange_worlds.1050.name: "Szczątki na orbicie"
 strange_worlds.1050.desc: "§Y[event_target:junk_moon_planet.GetName]§!: Nasi inżynierowie zajmujący się terraformowaniem pracują w niebezpiecznych warunkach, ponieważ na orbicie tej planety znajdują się różne fragmenty kosmicznych śmieci oraz drobne szczątki. Duża liczba tych obiektów stanowi zagrożenie nawigacyjne dla promów latających z i na powierzchnię.\n\nMając na uwadze samą gęstość materiału, przygotowaliśmy propozycje namagnetyzowania największych z tych obiektów, aby przyciągały do siebie inne, co stopniowo doprowadzi do zbicia wszystkich śmieci w pojedynczy obiekt. Przypuszczamy, że możliwe będzie stworzenie sztucznego księżyca.\n\nWydłuży to czas terraformowania, ale ułatwi promom docieranie na powierzchnię i zmniejszy ryzyko wchodzenia w atmosferę większych śmieci orbitalnych."
 strange_worlds.1050.a: "Zróbmy sobie księżyc."
 strange_worlds.1050.b: "To wszystko samo spłonie."
 strange_worlds.1060.name: "Śmieciowy księżyc"
 strange_worlds.1060.desc: "§Y[event_target:junk_moon_planet.GetName]§!: Próby zgromadzenia w jednym miejscu orbitujących kosmicznych śmieci zakończyła się powodzeniem.\n\nDzięki namagnetyzowaniu wielu większych obiektów udało się stopniowo zebrać wszystkie szczątki w jedną kulę złomu. Jej gęstość wzrosła tak bardzo, że obecnie ma własne pole grawitacyjne. Ten nowo powstały księżyc znalazł się na stabilnej orbicie.\n\nKiedy zniknęły niebezpieczne kosmiczne śmieci, dostęp do powierzchni świata §Y[event_target:junk_moon_planet.GetName]§! stał się o wiele łatwiejszy i nie musimy martwić się, że jakieś obiekty wpadną do atmosfery. Ponadto, nasi inżynierowie są pewni, że ten nowy księżyc może posiadać własną stację górniczą."
 strange_worlds.1060.create_moon_ct: "[event_target:junk_moon_planet.GetName] ma nowy księżyc: śmieciowy księżyc"
 site_abandoned_bio_lab: "Pradawna placówka"
 abandoned_bio_lab_desc: "Podczas skanowania świata §Y[fromfrom.planet.GetName]§! odkryliśmy samotną placówkę położoną w najbardziej niedostępnym regionie tej planety. Budowla wydaje się być uśpiona albo porzucona, nie wykryliśmy tam żadnej energii ani uszkodzeń spowodowanych przez warunki atmosferyczne. Wyprawa archeologiczna mogłaby zgromadzić więcej informacji."
 strange_worlds.2000.name: "Porzucone laboratorium biologiczne"
 strange_worlds.2000.desc: "We wnętrzu tej placówki znajduje się mnóstwo porzuconego sprzętu medycznego, pomieszczeń leczenia, a także kostnica. W pojemnikach do przechowywania zwłok znaleźliśmy częściowo zachowane szczątki organiczne noszące ślady chorób i deformacji. Są tam też drzwi bezpieczeństwa, sprzęt monitorujący oraz cele więzienne, więc §H[universal_macrophage_scientist.GetName]§! wnioskuje, że część istot trzymano tu wbrew ich woli.\n\nPozyskaliśmy trochę części wyposażenia, ale prawie wszystko jest w fatalnym stanie. W systemach komputerowych nie zostało zbyt wiele danych, pobraliśmy z nich pliki, które wymagają przekładu."
 strange_worlds.2005.name: "Starożytne badania odporności"
 strange_worlds.2005.desc: "§H[universal_macrophage_scientist.GetName]§! ma już częściowe tłumaczenie jednego z plików danych pozyskanych z placówki na świecie §Y[fromfrom.planet.GetName]§!.\n\n§LLaboratorium 17 - Raport z postępów - Kierownik badań Gelebor\n\nPoczątkowo nowy prototyp wyglądał obiecująco. Układy odpornościowe obiektów stały się milion razy silniejsze, a wszystkie patogeny zostały zlikwidowane. Nie zniknęły efekty uboczne: doszło do zabójczych mutacji, nikt nie ocalał. Spróbujemy jeszcze raz. Uniwersalny makrofag na pewno w końcu powstanie.§!"
 strange_worlds.2010.name: "Wybór Gelebora"
 strange_worlds.2010.desc: "§H[universal_macrophage_scientist.GetName]§! ma tłumaczenie kolejnego pliku z opuszczonego laboratorium na świecie §Y[fromfrom.planet.GetName]§!.\n\n§LLaboratorium 17 - Wewnętrzna notatka dla personelu - Kierownik badań Gelebor\n\nKoledzy, otrzymałem dziś polecenie zakończenie projektu. Cierpliwość władcy wyczerpała się. A przecież jesteśmy tak blisko celu! Uniwersalny makrofag jest ważniejszy od kaprysów jednej osoby. Przyszłość bez chorób może być nasza! Czymże jest jeszcze kilka istnień w obliczu tak ogromnego postępu?\n\nJeżeli nie otrzymamy więcej obiektów do badań, sam wypróbuję najnowszy prototyp. Dołączycie do mnie?§!"
 strange_worlds.2010.a: "Zachowajcie ostrożność."
 strange_worlds.2015.name: "Uniwersalny makrofag"
 strange_worlds.2015.desc: "§H[universal_macrophage_scientist.GetName]§! przekazuje tłumaczenie ostatniego wpisu z rejestru komputerów laboratorium biologicznego ze świata §Y[fromfrom.planet.GetName]§!.\n\n§LLaboratorium 17 - Raport końcowy - Asystent naukowy Filidor\n\nGelebor był tak pewny siebie, że ślepo za nim podążyliśmy.\n\nWypróbowaliśmy prototyp na sobie, początkowo nasze układy odpornościowe zostały wzmocnione, nie imały się nas praktycznie żadne patogeny. A potem zaczęły się mutacje.\n\nGelebor umarł pierwszy. Ciężko się na to patrzyło. Teraz cały zespół spoczywa w kostnicy, a ja wkrótce do nich dołączę.\n\nZawiedliśmy. Zawierzyliśmy nasze życia wadliwej odżywce Gelebora. Uniwersalny makrofag działa za dobrze, bo w końcu atakuje organizm gospodarza. Trzeba to wszystko zniszczyć.§!"
 strange_worlds.2015.a: "Zniszczmy wszystko."
 strange_worlds.2015.b: "Dokończmy pracę Gelebora. Jest w niej potencjał."
 strange_worlds.2015.b.mutation: "Jesteśmy mistrzami mutacji. Pozwólcie nam ukończyć nasze dzieło."
 has_tr_mutation_finish_tt: "Opcja ta jest dostępna, ponieważ ukończyliśmy drzewko tradycji §Y$Mutation$§!."
 strange_worlds.2015.c: "Te wadliwe badania można wykorzystać."
 strange_worlds.2030.name: "Zabójcze mutacje"
 strange_worlds.2030.desc: "Obywatele świata §Y[Root.GetName]§! doznają rozległych mutacji fizycznych, które zakłócają funkcjonowanie komórek oraz najważniejszych organów. W niektórych przypadkach te zmiany zwiększyły wydajność metabolizmu, ale najczęściej prowadzą do zgonów.\n\nTe efekty uboczne idealnie pokrywają się z tymi opisanymi w oryginalnych zapiskach z badań nad §Yuniwersalnym makrofagiem§!. Mimo naszych wysiłków zabójcze mutacje wywoływane przez tę formułę są nieuchronne. Nie możemy dłużej ufać tej technologii. Zniszczymy wszystkie zapasy odżywki i zaprzestaniemy jej stosowania."
 strange_worlds.2030.ct: "§Y[Root.GetName]§! traci 100 £pop£ populacji i dodatkowo 100 £pop£ populacji za każdą obecną $@macrophage_kill_pop_every_x$ £pop£ populację\nWszystkie £pop£ populacje organiczne świata §Y[Root.GetName]§! otrzymają §Ymutacje geleboryczne§!, a ich fizjologia drastycznie się zmieni."
 site_anomalous_cube: "Niecodzienny sześcian"
 anomalous_cube_desc: "Na planecie §Y[Planet.GetName]§! odkryto ogromny metaliczny sześcian. Jego idealna forma wskazuje na zaawansowane zdolności technologiczne jego twórców, jednak nie potrafimy powiedzieć, skąd pochodzi ani do czego służy. Wyprawa archeologiczna może znaleźć jakieś odpowiedzi."
 strange_worlds.2035.name: "Falujący metal"
 strange_worlds.2035.desc_intro: "[fromfrom.planet.GetName]: Bliższe zbadanie gigantycznego, tajemniczego sześcianu przyniosło więcej pytań niż odpowiedzi. Jego zewnętrzne powierzchnie są idealnie gładkie, nie mają spawów, a nasze skanery nie są w stanie zajrzeć do jego wnętrza. Kiedy zbliżyliśmy się do sześcianu, jego potężna fasada wydawała się lekko falować w reakcji na naszą obecność."
 strange_worlds.2035.desc_lm: "$strange_worlds.2035.desc_intro$ §H[event_target:anomalous_cube_scientist.GetName]§! uważa, że ten obiekt jest zbudowany z jakiejś postaci §Yżywego metalu§!."
 strange_worlds.2035.desc_no_lm: "$strange_worlds.2035.desc_intro$ §H[event_target:anomalous_cube_scientist.GetName]§! uważa, że ten obiekt jest zbudowany z jakiejś postaci dziwnego metalu, jakiego jeszcze nigdy nie widzieliśmy."
 strange_worlds.2035.a: "Kontynuujcie badania."
 strange_worlds.2040.name: "Do sześcianu"
 strange_worlds.2040.desc: "[fromfrom.planet.GetName]: §H[event_target:anomalous_cube_scientist.GetName]§! prowadzi badania metalicznego sześcianu, a podczas jednego z eksperymentów jedna z powierzchni tego obiektu niespodziewanie zafalowała, rozsunęła się i odsłoniła otwór prowadzący do wnętrza. Po wejściu znaleźliśmy konsolę dowodzenia, przy której wciąż znajdowały się szczątki mięczaka. Jego mięso już dawno zamieniło się w blady proszek.\n\nNa konsoli znaleźliśmy dziwny pojemnik, z którego od czasu do czasu dobiegały uderzenia i głuche pobrzękiwania, jakby coś poruszało się w środku. Jednak blokada na pojemniku jest skomplikowana, więc §H[event_target:anomalous_cube_scientist.GetName]§! jak dotąd nie znalazł sposoby, żeby ją otworzyć."
 strange_worlds.2040.evopred: "Na pewno możemy jeszcze zebrać ten pył."
 strange_worlds.2045.name: "Odkryto archiwum nagrań"
 strange_worlds.2045.desc: "Podczas pobierania danych z centralnej konsoli sześcianu §H[event_target:anomalous_cube_scientist.GetName]§! znalazł i rozszyfrował dwa krótkie archiwa dźwiękowe. Słychać na nich serię gardłowych trzasków i ostrych zwarć krtaniowych wydawanych przez jedną osobę mówiącą. Porównując ten zapis z naszą lingwistyczną bazą danych, §H[event_target:anomalous_cube_scientist.GetName]§! znalazł zbliżony starożytny język i stworzył robocze tłumaczenie pierwszego archiwum dźwiękowego:\n\n§L\"Szanowne prezydium, musicie mnie wysłuchać. Mamy jeszcze czas, żeby uniknąć tej wojny. Pewność siebie waszych władców to nieroztropność, nie możemy pokonać imperium [event_target:anomalous_cube_fallen_empire.GetName]. Oni nas zniszczą!\"\n\n\"Ustępstwa to jedyne rozwiązanie. W mojej skrzyni znajduje się dar: to sekrety tworzenia żywego metalu. Jeśli chcemy uniknąć zniszczenia, musimy im je dostarczyć\".§!"
 strange_worlds.2045.a: "Przetłumaczmy drugie archiwum dźwiękowe."
 strange_worlds.2050.name: "Cudowny żywy metal"
 strange_worlds.2050.desc_intro: "Drugie archiwum dźwiękowe z konsoli dowodzenia sześcianu zostało przetłumaczone.\n\n§L\"Szanowne prezydium, zawiodłem. Nasza anihilacja jest nieuchronna.\n\nDokonano sabotażu mojego sześciościennego statku kosmicznego. Spróbuję wylądować awaryjnie na świecie [fromfrom.planet.GetName]. Nawet jeśli przeżyję, pokojowy dar nie zostanie dostarczony. [event_target:anomalous_cube_fallen_empire.GetName] zaatakuje, tak jak się obawialiśmy\".§!\n\n§H[event_target:anomalous_cube_scientist.GetName]§! złamał szyfr mechanizmu zamykania skrzyni. W środku znajdowała się dziwna bryłka metalu. Jest bardzo elastyczna i hiperaktywna, ciągle zmienia kształt i co kilka sekund przyjmuje nowe, skomplikowane formy."
 strange_worlds.2050.desc_no_war_lm: "\nMożemy zatrzymać tę ciekawostkę, żeby jeszcze lepiej poznać żywy metal. Inna możliwość to zrobienie tego, co zamierzali jej poprzedni właściciele: przekazać ją imperium [event_target:anomalous_cube_fallen_empire.GetName], aby poprawić nasze stosunki."
 strange_worlds.2050.desc_no_war_no_lm: "\nMożemy zatrzymać tę ciekawostkę, żeby jeszcze lepiej poznać ten niezwykły metal. Inna możliwość to zrobienie tego, co zamierzali jej poprzedni właściciele: przekazać ją imperium [event_target:anomalous_cube_fallen_empire.GetName], aby poprawić nasze stosunki."
 strange_worlds.2050.desc_war_lm: "\nTen niezwykły przedmiot i prostopadłościenny statek posłużą nam do pogłębienia wiedzy o żywym metalu."
 strange_worlds.2050.desc_war_no_lm: "\nTen niezwykły przedmiot i prostopadłościenny statek posłużą nam do pogłębienia wiedzy o związkach i strukturach metali."
 strange_worlds.2050.a_no_war: "Przekażmy to imperium [event_target:anomalous_cube_fallen_empire.GetName]."
 strange_worlds.2050.b_fallen_not_defeated_no_war: "Zatrzymajmy to dla siebie."
 strange_worlds.3005.name: "Podejrzany prorok"
 strange_worlds.3005.desc: "§Y[event_target:pre_ftl_planet.GetName]§!: Prowadząc obserwację miejscowej populacji nasza ekipa dokonała ciekawego odkrycia.\n\nW stolicy krąży pogłoska o \"Wybrańcu\", który ponoć zstąpił z gwiazd, żeby wypełnić pradawne proroctwo i dać początek nowej złotej epoce, w której będą żyć [event_target:pre_ftl_planet.Owner.GetSpeciesNamePlural].\n\nNie zniknął nikt z naszego personelu, więc warto sprawdzić, kim jest osoba odwiedzająca tę planetę."
 strange_worlds.3005.a: "Ustalmy coś więcej."
 strange_worlds.3010.name: "Fałszywy prorok"
 strange_worlds.3010.desc_intro: "§Y[event_target:pre_ftl_planet.GetName]§!: Nasza ekipa badająca sprawę \"Wybrańca\" poznała prawdziwą tożsamość tej osoby.\n\n"
 strange_worlds.3010.desc_no_megacorp: "§YNamarański nomada§! udaje \"przybyłą z gwiazd\" najważniejszą postać z mitologii, którą wyznaje gatunek [event_target:pre_ftl_planet.Owner.GetSpeciesAdj&genitive]."
 strange_worlds.3010.desc_megacorp: "Przedstawiciel karawany z gatunku §Y[event_target:caravaneer_fleet3_country.GetSpeciesAdj&genitive]§! udaje \"przybyłą z gwiazd\" najważniejszą postać z mitologii, którą wyznaje gatunek [event_target:pre_ftl_planet.Owner.GetSpeciesAdj&genitive]."
 strange_worlds.3010.desc_outro: "\nDalsze badania planety wykazały, że rozbity i niedziałający statek tej osoby został ukryty w niedostępnej dolinie niedaleko stolicy. Patrząc na wiek hipernapędu, możemy zakładać, że jest tutaj już od jakiegoś czasu.\n\nOdkąd utknęła na planecie, wykorzystuje lokalne przesądy oraz ochoczo przyjmuje od miejscowych wyrazy czci i szacunku, a obecnie jest ich władcą posiadającym \"niebiańską wiedzę\".\n\nJeśli nic z tym nie zrobimy, obecność tego szarlatana z pewnością odciśnie piętno na tym rozwijającym się społeczeństwie. Chyba powinniśmy interweniować."
 strange_worlds.3010.a: "Ujawnijmy to oszustwo."
 strange_worlds.3010.b: "Zaproponujmy mu ratunek."
 strange_worlds.3015.name: "Ujawniono prawdę"
 strange_worlds.3015.desc_no_megacorp: "Pozbyliśmy się §Ynamarańskiego nomady§! z planety §Y[event_target:pre_ftl_planet.GetName]§!, który udawał \"Wybrańca\" z mitologii gatunku [event_target:pre_ftl_planet.Owner.GetSpeciesAdj&genitive]."
 strange_worlds.3015.desc_megacorp: "Pozbyliśmy się przedstawiciela gatunku §Y[event_target:caravaneer_fleet3_country.GetSpeciesAdj&genitive]§! z planety §Y[event_target:pre_ftl_planet.GetName]§!, który udawał \"Wybrańca\" z mitologii gatunku [event_target:pre_ftl_planet.Owner.GetSpeciesAdj&genitive]."
 strange_worlds.3015.desc_outro: "\nPo bliższym zapoznaniu się z miejscowymi legendami przekonaliśmy klasę rządzącą, że tak zwany \"Wybraniec\" to tak naprawdę demon przysłany, żeby ich zwodzić i pogrążyć planetę w tysiącletniej ciemności.\n\nRozebraliśmy wrak statku na części, nie został po niż żaden ślad, który mogłaby znaleźć miejscowa ludność. Jednak już wcześniej w jej ręce wpadło trochę przedmiotów osobistych, które pokazały tej cywilizacji ułamek technologii, której nie są w stanie pojąć."
 strange_worlds.3015.a: "To niedobrze."
 strange_worlds.3020.name: "Powrót do domu"
 strange_worlds.3020.desc_intro: "§Y[event_target:pre_ftl_planet.GetName]§!: Nasza ekipa spotkała się z \"Wybrańcem\" na prywatnej audiencji i zaproponowała mu pomoc w naprawie statku oraz powrocie do domu.\n\n"
 strange_worlds.3020.desc_no_megacorp: "§Y[event_target:pre_ftl_planet.GetName]§!: §YNamarański nomada§! chętnie skorzystał z naszej propozycji i wyjaśnił, że po wylądowaniu na tym świecie został omyłkowo uznany za boga i od tamtej pory bał się, że spotka go krzywda, jeśli wyjawi swoją prawdziwą tożsamość."
 strange_worlds.3020.desc_megacorp: "§Y[event_target:pre_ftl_planet.GetName]§!: Przedstawiciel gatunku §Y[event_target:caravaneer_fleet3_country.GetSpeciesAdj&genitive]§! chętnie skorzystał z naszej propozycji i wyjaśnił, że po wylądowaniu na tym świecie został omyłkowo uznany za boga i od tamtej pory bał się, że spotka go krzywda, jeśli wyjawi swoją prawdziwą tożsamość."
 strange_worlds.3020.desc_outro: "\nPo przewiezieniu go do naszej placówki naukowej i naprawieniu jego statku, wdzięczny podróżnik podarował nam na pożegnanie dużą część wyposażenia swojej jednostki.\n\nKiedy zniknął, pojawiła się próżnia władzy, która wywołała krótką, ale brutalną walkę sekt religijnych świata §Y[event_target:pre_ftl_planet.GetName]§!. Dobiegły już one jednak końca."
 strange_worlds.3020.a: "Fascynujące."
 strange_worlds.3025.name: "[event_target:nomad01_country.GetName]"
 strange_worlds.3025.desc: "Witajcie, [Owner.GetSpeciesNamePlural]. Wiemy, że zajęliście się zbuntowanym Namarańczykiem, który oddzielił się od naszej floty.\n\nWyświadczyliście nam przysługę. Ta zagubiona osoba ciągle nas irytowała, jej ogromne ambicje narażały naszą wyprawę.\n\nProsimy, przyjmijcie ten dar jako podziękowanie."
 strange_worlds.3025.a: "Bardzo dziękujemy."
 strange_worlds.3030.name: "[event_target:caravaneer_home_country.GetName]"
 strange_worlds.3030.desc: "[Owner.GetSpeciesNamePlural] zajęli się zaginionym §YOszustem§!? Bardzo dobrze! Ten głupiec tylko przysparzał nam bólów głowy. A jego brednie? Żenujące. Zrobił to już piąty raz. Szczerze? Cieszymy się, że już go nie ma.\nPrzyjmijcie ten dar w nagrodę za rozwiązanie naszego problemu. To jednorazowa transakcja, ale bardzo lukratywna."
 strange_worlds.3030.a: "Bardzo dziękujemy."
 strange_worlds.3040.name: "To, co zostawiliśmy"
 strange_worlds.3040.desc: "Nasz posterunek obserwacyjny nad światem §Y[event_target:pre_ftl_planet.GetName]§! poinformował o zaginięciu skrzyń z zaopatrzeniem, do którego doszło po przeprowadzeniu badań geologicznych na powierzchni.\n\nŚledząc geolokatory umieszczone w zapasach, ustaliliśmy, że mieszkańcy pewnej wioski znaleźli te zasoby i zatrzymali je dla siebie.\n\nKorzystanie z naszych kontenerów może negatywnie wpłynąć na społeczeństwo [event_target:pre_ftl_planet.Owner.GetSpeciesAdj&genitive] i jego rozwój."
 strange_worlds.3040.a: "To niedobrze."
 strange_worlds.3045.name: "Zwrot do nadawcy"
 strange_worlds.3045.desc_common: "§Y[event_target:pre_ftl_planet.GetName]§!: Wygląda na to, że zaginione wyposażenie w dziwny sposób wpłynęło na miejscową kulturę.\n\nTamtejsza populacja ([Root.GetPreFTLUpper]) stworzyła prymitywne imitacje naszych promów obserwacyjnych. Oczywiście te \"statki\" nie działają, ale dowodzą, że miejscowi zauważyli naszych badaczy podczas pracy.\n\nZa sprawą miejscowego starszego [event_target:pre_ftl_planet.Owner.GetSpeciesNamePlural] naśladują naszą procedurę geologicznego badania gruntu: napełniają nasze zagubione skrzynie ziemią oraz kamieniami, po czym umieszczają je na swoich statkach i cierpliwie czekają."
 strange_worlds.3045.desc_non_homicidal: "\n[event_target:pre_ftl_planet.Owner.GetSpeciesNamePlural] uważają, że, naśladując nasze procedury sprawią, że pojawi się więcej zasobów. Powinniśmy interweniować, zanim to zachowanie wpłynie na ogół ich społeczeństwa."
 strange_worlds.3045.desc_homicidal: "\nTo daremne działanie, czeka ich śmierć."
 strange_worlds.3045.a_normal: "Odzyskajmy skrycie nasze skrzynie."
 strange_worlds.3045.a_megacorp: "Odzyskajmy skrycie nasze aktywa."
 strange_worlds.3045.b_normal: "Wymieńmy zapasy żywności na ich minerały."
 strange_worlds.3045.b_megacorp: "Wymieńmy się!"
 strange_worlds.3045.c: "Zlikwidować te prymitywne istoty."
 strange_worlds.3045.ct: "Posterunek obserwacyjny nadzorujący świat §Y[event_target:pre_ftl_planet.GetName]§! wytwarza teraz $@observation_outpost_crate_minerals_production$ $i_minerals$, a kosz utrzymania wynosi $@observation_outpost_crate_food_upkeep$ $i_food$"
 strange_worlds.3050.name: "Obraźliwa nieobecność"
 strange_worlds.3050.desc: "§Y[event_target:pre_ftl_planet.GetName]§!: Po odzyskaniu naszych zaginionych skrzyń rytuały załadunkowe \"statku\" trwały jeszcze jakiś czas, aż wreszcie rozgniewani miejscowi [event_target:pre_ftl_planet.Owner.GetSpeciesNamePlural] zwrócili się przeciwko starszemu, wrzucili go na pokład makiety promu i spalili ją na popiół.\n\nChociaż populacja wróciła do dawnych zwyczajów, w tamtejszej kulturze zachowała się niechęć wobec \"ludzi z przestworzy\"."
 strange_worlds.3050.a: "Będziemy o tym pamiętać."
 strange_worlds.3060.name: "Anulowana usługa"
 strange_worlds.3060.desc: "Ponieważ [event_target:pre_ftl_planet.Owner.GetSpeciesNamePlural], społeczeństwo [Root.GetPreFTLLower], rozwijają się, wstrzymaliśmy wymianę racji żywnościowych na minerały z naszego posterunku obserwacyjnego.\n\nBył to ciekawy eksperyment, ale dalsze zakłócanie rozwoju ich cywilizacji może przedwcześnie ujawnić im fakt naszej obecności."
 strange_worlds.3060.a: "To rozsądne działanie."
 strange_worlds.3060.ct: "Posterunek obserwacyjny nie wytwarza już minerałów i nie wymaga kosztu utrzymania (żywność)."
 strange_worlds.3070.name: "Anomalia orbitalna"
 strange_worlds.3070.desc: "Anomalia grawitacyjna wytrąciła nasz posterunek obserwacyjny nad światem §Y[event_target:pre_ftl_planet.GetName]§!, przez co na krótki czas znalazł się on w dolnych warstwach atmosfery tej planety.\n\nZałodze nic się nie stało, a stacja wróciła na oryginalną trajektorię, ale pojawiły się obawy, że mogła być wykryta z powierzchni przez przedstawicieli gatunku [event_target:pre_ftl_planet.Owner.GetSpeciesAdj&genitive].\n\nCzas pokaże, czy miejscowi nas zauważyli i jak bardzo wpłynie to na ich społeczeństwo."
 strange_worlds.3070.a: "Kontynuujmy obserwację."
 strange_worlds.3075.name: "Drabiny do nieba"
 strange_worlds.3075.desc_common: "§Y[event_target:pre_ftl_planet.GetName]§!: Prymitywna technologia utrwalania obrazu zarejestrowała nasz posterunek obserwacyjny, gdy ten znajdował się na niskiej orbicie. Poza zeznaniami naocznych świadków te zdjęcia zachęciły niektóre kraje do budowania \"drabin do nieba\", które mają im pozwolić zbadać zjawisko, które widzieli.\n\nTo oczywiście daremny trud, jednak konkurencja między krajami działa destabilizująco. Dawne napięcia odżyły w wyścigu do ukończenia pierwszej \"drabiny\", podsycanego dumą narodową i trudnościami z dostępem do zasobów."
 strange_worlds.3075.desc_non_homicidal: "\nJeżeli zdyskredytujemy posiadane przez nich dowody naszego istnienia, być może rozładujemy napięcia, zanim przestaniemy mieć [Owner.GetSpeciesHandName] i wszystko wymknie się spod kontroli.\n\nJednak dyplomatyczne przepychanki między siłami politycznymi imperium [Root.GetPreFTLLower] mogą być przedmiotem ciekawych badań socjologicznych, chociaż niosłoby to ryzyko gwałtownej eskalacji."
 strange_worlds.3075.desc_homicidal: "\nNieuchronny chaos powinien dać nam niepowtarzalną okazję do badań naukowych."
 strange_worlds.3075.a: "Zdyskredytujmy dowód naszego istnienia."
 strange_worlds.3075.b: "Kontynuujmy obserwację."
 strange_worlds.3075.b_ct: "Produkcja badań £society£ §Ysocjologicznych§! przez posterunek obserwacyjny zostaje podwojona."
 strange_worlds.3080.name: "Prawda czeka na odkrycie"
 strange_worlds.3080.desc: "§Y[event_target:pre_ftl_planet.GetName]§!: Nasi agenci zdyskredytowali dowody naszego istnienia.\n\nAutentyczność obrazów została podważona, wiarygodność świadków zniszczona, a budowa \"drabin do nieba\" wstrzymana. Skonfliktowane wcześniej kraje wstydzą się swojej naiwności i postanowiły rozpocząć racjonalne dochodzenie stosując metodę naukową.\n\nMiejsca budowy drabin zamieniono w ośrodki szkolnictwa wyższego, gdy pojawiła się nowa rzesza uczonych dążąca do obalenia mitów \"Podniebnej Cytadeli\"."
 strange_worlds.3080.a: "$FASCINATING$"
 strange_worlds.3080.a_ct: "[event_target:pre_ftl_country.GetName] dokonuje 50% postępów ku następnej epoce\nPaństwo ([event_target:pre_ftl_country.GetName]) staje się materialistyczne."
 strange_worlds.3085.name: "Wielkie wojny o drabiny"
 strange_worlds.3085.desc: "§Y[event_target:pre_ftl_planet.GetName]§!: Tamtejsze nacje ([Root.GetPreFTLLower]) próbowały zbudować \"drabiny do nieba\", co doprowadziło do napięć, a ostatecznie do wybuchu globalnego konfliktu. Przez ostatnie dwa lata trwała brutalna walka o ciągle kurczące się zasoby, nazywana \"wielką wojną o drabiny\", ale wreszcie dobiegła końca.\n\nNajważniejsze punkty traktatu pokojowego sprowadzają się do wspólnego stawienia czoła wspólnemu wrogowi, czyli \"Podniebnej Cytadeli\". [event_target:pre_ftl_planet.Owner.GetSpeciesNamePlural] odbudowują rozdarty wojną świat, a narastająca wśród nich paranoja i nienawiść wobec nieznanego utrudnią przyszłe interakcje z tą cywilizacją."
 strange_worlds.3085.a: "To problemy na później."
 strange_worlds.3085.a_ct: "Produkcja badań £society£ §Ysocjologicznych§! przez posterunek obserwacyjny wraca do normalnego poziomu."
 create_hibernators_pops_ct: "Tworzenie populacji przedrozumnych ($@hibernators_pops_created|*0$ £job_pre_sapient£) za pomocą cechy §Y$trait_seasonal_dormancy$§!."
 pm_bleeding_planet: "Krwawiąca planeta"
 pm_bleeding_planet_desc: "Nawet ziemia krwawi. Zaleca się zachowanie ostrożności podczas rozkopywania ziemi pod kolonistami.\n"
 pm_contruction_coagulate: "Koagulant budowlany"
 pm_contruction_coagulate_desc: "Obecność kolonistów sprawia, że nawet ziemia krwawi - ta lepka ciecz działa jak naturalny, choć niebezpieczny, klej.\n"
 pm_hemosymbiosis: "Hemosymbioza"
 pm_hemosymbiosis_desc: "Dziwna ciecz wydobywająca się z wnętrza planety wpływa na dalszy rozwój. Czas budowy i wydobycia surowców ulegają skróceniu kosztem rozwoju kolonii.\n"
 pm_parasitic_production: "Produkcja pasożytnicza"
 pm_parasitic_production_desc: "Organizmy pasożytnicze pochodzące z tej planety zostały zmodyfikowane, teraz zwiększają wydajność wszystkich robotników.\n"
 pm_frying_fauna: "Smażona fauna"
 pm_frying_fauna_desc: "Megafauna tego świata rozkwitła w zoptymalizowanych warunkach. Jej wyjątkowe enzymy trawienne są przydatne w procesie rafinacji stopów."
 pm_frying_fauna_machine: "$pm_frying_fauna$"
 pm_frying_fauna_machine_desc: "$pm_frying_fauna_desc$"
 pm_frying_fauna_2: "$pm_frying_fauna$"
 pm_frying_fauna_2_desc: "Kombajny elektryczne przetwarzają megafaunę tego świata na stałe dostawy składników odżywczych."
 pm_frying_fauna_2_machine: "$pm_frying_fauna$"
 pm_frying_fauna_2_machine_desc: "$pm_frying_fauna_2_desc$"
 pm_catalytic_excrement: "Katalityczne ekskrementy"
 pm_catalytic_excrement_ct: "Megafauna tego świata rozkwitła w zoptymalizowanych warunkach. Jej wyjątkowe enzymy trawienne są przydatne w procesie rafinacji stopów."
 pm_strange_sandstorm: "Dziwne burze piaskowe"
 pm_strange_sandstorm_ct: "Wyjątkowe zjawiska związane z piaskami tej planety wpływają na funkcjonowanie tej kolonii."
 pm_perpetual_lightning: "Niekończące się błyskawice"
 pm_perpetual_lightning_desc: "Napromieniowane kryształy odkryte podczas anomalii terraformacyjnej wytworzyły idealne warunki pogodowe dla powstania niekończącej się burzy z piorunami, która obejmuje całą planetę."
 pm_dark_matter_geyser: "Gejzer ciemnej materii"
 pm_dark_matter_geyser_desc: "Planetą zalewają wyziewy ciemnej materii."
 pm_population_quarantine: "Kwarantanna populacji"
 pm_population_quarantine_desc: "Populacja jest objęta kwarantanną na czas badania efektów petryfikacji ciemnej materii."
 pm_dark_matter_statue: "Posągi z ciemnej materii"
 pm_dark_matter_statue_desc: "Na całej planecie można natrafić na skamieniałe skorupy ze stwardniałej ciemnej materii. Te ponure pozostałości po dawnej populacji to okazja do przeprowadzenia badań naukowych."
 pm_raining_corpses: "Deszcz zwłok"
 pm_raining_corpses_desc: "Rzedną gęste chmury, które niegdyś służyły za miejsce pochówku przedstawicieli rasy kosmitów, przez co zawartość chmurnych grobowców spada na powierzchnię planety."
 pm_raining_corpses_tt: "£minor_artifacts£ $minor_artifacts$ z $WORKERS$ £job£ miejsc pracy"
 pm_raining_corpses_no_ancrel: "$pm_raining_corpses$"
 pm_raining_corpses_no_ancrel_desc: "$pm_raining_corpses$"
 pm_raining_corpses_no_ancrel_tt: "£consumer_goods£ $consumer_goods$ z £pop_cat_worker£ $pop_cat_worker$ £job£ miejsc pracy"
 pm_revolting_pests: "Bunt szkodników"
 pm_revolting_pests_desc: "Zwierzęta na tej planecie są fascynujące, a przy tym obrzydliwe. Lepiej nie zbliżać się do nich."
 pm_gaseous_fauna: "Gazowa fauna"
 pm_gaseous_fauna_desc: "Udomowione gatunki rdzennej fauny są źródłem rozrywki oraz gazowych wydzielin, które może wykorzystywać populacja tej planety."
 pm_gaseous_fauna_ct: "Wszystkie £pop£ populacje wytwarzają §G$@gaseous_fauna_exotic_gases_production$§! $i_exotic_gases$"
 pm_urban_privilege_regular: "Przywilej dla miast"
 pm_urban_privilege_regular_desc: "Opowiedzenie się w lokalnym sporze po stronie dzielnic miejskich rozwścieczyło dzielnice wiejskie."
