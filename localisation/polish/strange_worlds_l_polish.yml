 tech_enhanced_cryosleep_sedatives_desc: "Środki uspokajające stworzone z rzadkiego enzymu zapewniające lepszy kriosen, znacznie poprawiające wytrzymałość istot żywych w dalekich podróżach kosmicznych."
 tech_universal_marcophage: "Uniwersalne makrofagi"
 tech_universal_marcophage_desc: "Te potężne wzmacniacze odporności powodują, że choroby stają się przeszłością, a populacje organiczne mogą żyć zdrowiej i pełniej. Makrofagi mogą jednak powodować poważne skutki uboczne."
