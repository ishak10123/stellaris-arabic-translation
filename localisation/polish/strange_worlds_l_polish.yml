 pm_peacekeeper_deployment: "Wysłanie rozjemców"
 pm_peacekeeper_deployment_desc: "W trakcie rozstrzygania sporów między dzielnicami prowadzimy dodatkowe działania rozjemcze."
 bacterial_drive_modifier_desc: "Woda z domieszką genetycznie zmodyfikowanych suplementów bakteryjnych budzi w populacji wyjątkowe zaangażowanie w jeden wspólny cel."
 pm_bd_reproduction: "Instynkt bakteryjny: Rozmnażanie"
