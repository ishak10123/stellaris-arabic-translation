 astral_rift.2720.name: "ﺮﻄﻔﻟﺍ ﻦﻴﺑ"
 astral_rift.2720.desc: ".ﻪﺴﻔﻧ ﺮﻄﻔﻟﺍ ﺀﺎﻘﺑ ﺭﺍﺮﻤﺘﺳﻻﻭ ،ﺔﻴﻠﻓﺎﻜﺘﻟﺍ ﺔﻗﻼﻌﻟﺍ ﻩﺬﻬﻟ ﺪﻳﺪﻬﺗ ﺪﺟﻮﻳ ،ﻚﻟﺫ ﻊﻣﻭ \n\n .ﺀﺍﺬﻐﻛ ﻪﺗﺎﻔﻠﺨﻣ ﺮﻄﻔﻟﺍ ﻚﻠﻬﺘﺴﻳ ،ﻞﺑﺎﻘﻤﻟﺍ ﻲﻓﻭ .ﺔﻳﺮﻄﻔﻟﺍ ﺕﺎﻋﻮﻤﺠﻤﻟﺍ ﺔﻄﺳﺍﻮﺑ ﺎﻬﺘﻳﺎﻤﺣﻭ ﺕﺎﻧﺍﻮﻴﺤﻟﺍﻭ ﺕﺎﺗﺎﺒﻨﻟﺍ ﻉﺍﻮﻧﺃ ﻊﻴﻤﺟ ﻰﻠﻋ ﻅﺎﻔﺤﻟﺍ ﻢﺘﻳ ،ﺢﻄﺴﻟﺍ ﺖﺤﺗ .ﺐﻛﻮﻜﻟﺍ ﻰﻠﻋ ﺔﻴﻠﺤﻤﻟﺍ ﻉﺍﻮﻧﻸﻟ ﺎﺳﺭﺎﺣ ﻪﺴﻔﻧ ﻯﺮﻳ ﺔﻴﻠﺧ ﻞﻘﻋ ﻦﻋ ﺓﺭﺎﺒﻋ ﻲﺤﻟﺍ ﻦﺋﺎﻜﻟﺍ \n\n .ﺮﻄﻔﻟﺍ ﻝﺎﻘﺘﻧﺍ ﺯﻮﻣﺭ ﻚﻓ ﻦﻣ ﺔﻳﺎﻬﻨﻟﺍ ﻲﻓ ﺎﻨﻜﻤﺗ ﺎﻨﻨﻜﻟ ،ﻚﻟﺫ ﻰﻠﻋ ﺍﺩﺭ ﺕﺍﺭﺎﺷﻹﺍ ﻦﻣ ﺔﺟﻮﻣ ﺎﻨﻴﻘﻠﺗ ﺪﻘﻟ .ﺔﻴﻠﺧﺍﺪﻟﺍ ﻢﻬﺘﻜﺒﺷ ﻰﻠﻋ ﺪﻳﺪﺟ ﻞﺜﻤﻣ ﻞﺒﻗ ﻦﻣ ﺎﻫﺮﻣﺃ ﻦﻣ ﺓﺮﻴﺣ ﻲﻓ ﺎﻬﻧﺃ ﺢﺿﺍﻮﻟﺍ ﻦﻣﻭ ،ﺓﺄﺠﻓ ﺮﻄﻓ ﺔﻌﺒﻗ ﻞﻛ ﺖﺒﻠﺼﺗ ؛ﺍﺮﻴﺼﻗ ﺍﺭﺎﻴﺗ ﺎﻧﺭﺪﺻﺃ ،ﺔﻜﺒﺸﻠﻟ ﺔﻳﺮﻄﻔﻟﺍ ﺔﻴﺒﺼﻌﻟﺍ ﻚﺑﺎﺸﻤﻟﺍ ﻦﻣ ﺓﺩﺎﻔﺘﺳﻻﺎﺑﻭ"
