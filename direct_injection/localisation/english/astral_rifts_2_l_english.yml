 astral_rift.2000.desc: ".ﻞﺋﺎﺴﻟﺍ ﺍﺬﻫ ﺍﻮﻨﻘﺣ ﺪﻗ ﻦﻴﺜﺣﺎﺒﻟﺍ ﻥﺄﺑ ﻦﻬﻜﺘﻧ ﺎﻨﻧﺈﻓ ،ﺾﻴﺒﻟﺍ ﺾﻌﺑ ﻰﻠﻋ ﺔﻴﻘﺒﺘﻤﻟﺍ ﺎﻳﺎﻘﺒﻟﺍ ﻰﻠﻋ ﻢﻜﺤﻟﺎﺑﻭ .ﺔﻴﻨﻴﻣﻷﺍ ﺽﺎﻤﺣﻷﺍﻭ ﺕﺎﻨﻴﺗﻭﺮﺒﻟﺍ ﻦﻣ ﺔﻴﻟﺎﻋ ﺕﺎﻴﻤﻛ ﻰﻠﻋ ﻱﻮﺘﺤﻳ ﻪﻧﺃ ﻞﺋﺎﺴﻟﺍ ﻞﻴﻠﺤﺗ ﻒﺸﻜﻳ .ﺝﺰﻟﻭ ﺐﺣﺎﺷ ﻞﺋﺎﺴﺑ ﺓﺀﻮﻠﻤﻣ ﺔﺣﻮﺘﻔﻣ ﺔﻳﻭﺎﺣ ﺪﺟﻮﺗ ﺔﻓﺮﻐﻟﺍ ﻩﺬﻫ ﻂﺳﻭ ﻲﻓ \n\n .ﺔﻴﺤﻟﺍ ﺕﺎﻨﻴﻌﻟﺍ ﻦﻣ ﻞﻴﻠﻗ ﺩﺪﻋ ﻙﺎﻨﻫ ﻝﺍﺰﻳ ﻻ ﻦﻜﻟﻭ ،ﻝﻼﺤﻤﺿﻻﺍ ﻦﻣ ﺔﻔﻠﺘﺨﻣ ﺕﻻﺎﺣ ﻲﻓ ﺎﻬﻤﻈﻌﻣ .ﺓﺮﻴﺒﻛ ﺔﻀﻴﺑ ﻞﻤﺤﻳ ﺎﻬﻨﻣ ﻞﻛ ،ﻥﺍﺭﺪﺠﻟﺍ ﻰﻠﻋ ﻞﻤﺤﺘﻟﺍ ﺓﺪﻳﺪﺷ ﻒﻓﺭﻷﺍ ﻒﻄﺼﺗ\n\n.ﺔﻠﻳﻮﻃ ﺓﺮﺘﻓ ﺬﻨﻣ ﺍﻮﻠﺣﺭ ﺪﻘﻓ ،ﻥﺎﻜﻤﻟﺍ ﺍﺬﻫ ﻰﻠﻋ ﻥﻮﻤﺋﺎﻘﻟﺍ ﻥﺎﻛ ﺎﻳﺃ .ﻚﻟﺫ ﺮﻴﻏ ﻭﺃ ﺀﺎﻴﺣﺃ ،ﻦﻴﺜﺣﺎﺑ ﻱﺃ ﻑﺎﺸﺘﻛﺍ ﺎﻨﻨﻜﻤﻳ ﻻ\n\n.ﺖﻗﻮﻟﺍ ﺾﻌﺒﻟ ﻡﺍﺪﺨﺘﺳﻻﺍ ﺪﻴﻗ ﻦﻜﺗ ﻢﻟ ﺎﻬﻧﺃ ﻰﻟﺇ ﺮﻴﺸﻳ ﺎﻤﻣ ،ﺭﺎﺒﻐﻟﺍ ﻦﻣ ﺔﻜﻴﻤﺳ ﺔﻘﺒﻄﺑ ﺓﺎﻄﻐﻣ ﺔﻓﺮﻐﻟﺍ ﻩﺬﻫ ﻲﻓ ﺢﻄﺳﻷﺍ\n\n.ﺓﺭﻮﺠﻬﻣ ﺔﻴﺜﺤﺑ ﺓﺄﺸﻨﻣ ﻞﺧﺍﺩ ﻦﺤﻧ"
