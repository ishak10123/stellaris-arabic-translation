 astral_rift.2015.name: "ﺔﻳﺎﻋﺮﻟﺍ ﻰﻠﻋ ﻥﻮﻤﺋﺎﻘﻟﺍ"
 astral_rift.2015.desc: ".ﺎﻨﻫ ﺙﺪﺣ ﺎﻣ ﻝﻮﺣ ﺕﺎﻣﻮﻠﻌﻤﻟﺍ ﺾﻌﺑ ﺮﻓﻮﺗ ﻥﺃ ﺎﻬﻧﺄﺷ ﻦﻣ ﺔﺒﺳﺎﻨﻤﻟﺍ ﺔﺳﺍﺭﺪﻟﺍ ﺀﺍﺮﺟﻹ ﻢﻬﺘﻳﺎﻋﺭ ﻰﻠﻋ ﻦﻴﻤﺋﺎﻘﻟﺍ ﺕﺎﻓﺭ ﺓﺩﺎﻋﺇ ﻥﺇ\n\nA ﺔﻤﻴﻠﺳ ﺎﻳﺎﻘﺒﻟﺍ ﻯﺪﺣﺇ .ﺔﻳﺰﻛﺮﻤﻟﺍ ﺺﺤﻔﻟﺍ ﺔﻟﻭﺎﻃ ﻰﻠﻋ ﺓﺩﻮﺟﻮﻣ ﺐﻟﺎﻐﻟﺍ ﻲﻓ ﺡﺮﺸﻤﻟﺍ ﺾﻴﺒﻟﺍ ﻦﻣ ﺔﻋﻮﻤﺠﻣ.\n\n .ﻥﺍﺭﺪﺠﻟﺍ ﻞﺧﺍﺩ ﺔﺠﻣﺪﻨﻣ ﻒﺼﻧ ﺚﺜﺠﻟﺍ ﺾﻌﺑ .ﺔﻓﻭﺮﻌﻣ ﺮﻴﻏ ﺓﻮﻗ ﺔﻄﺳﺍﻮﺑ ﻱﺭﺬﻟﺍ ﻯﻮﺘﺴﻤﻟﺍ ﻰﻠﻋ ﻒﻴﻈﻧ ﻞﻜﺸﺑ ﻢﻬﻓﺍﺮﻃﺃ ﻞﺼﻓ ﻢﺗ ﺪﻘﻟ .ﺚﺜﺠﻟﺎﺑ ﺔﺌﻴﻠﻣ ﺓﺭﻭﺎﺠﻣ ﺔﻓﺮﻏ\n\n.ﻢﻬﻨﻣ ﻰﻘﺒﺗ ﺎﻣ ﺎﻧﺪﺟﻭ ،ﺔﻗﺩ ﺮﺜﻛﺃ ﻞﻜﺸﺑﻭ .ﻥﺎﻜﻤﻟﺍ ﺍﺬﻫ ﻰﻠﻋ ﻦﻴﻤﺋﺎﻘﻟﺍ ﺎﻧﺪﺟﻭ ﺪﻘﻟ"
